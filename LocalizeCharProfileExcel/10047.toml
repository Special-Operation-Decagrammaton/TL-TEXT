10047-WeaponDescJp = "チセの大事なグレネードランチャー。\n\n今回は先生のアイディアを受け、チセが書いた夏にまつわる俳句を弾丸に刻んでいる。市販されていない、チセだけの大切な一品だ。"
10047-ProfileIntroductionJp = "百鬼夜行連合学院所属、夏の日差しの下でも相変わらずぼんやりしている陰陽部の電波系少女。\n\n水着に着替えた事でアイドル力（？）が上がったのか、彼女を見守るファンの叫びは夏の日差しに負けないほどの熱気を持っていたとか。しかし、本人は全く気にする気配もなく。今日もチセは先生と一緒にきらめきを探して充実した夏を過ごしている。"
