10047-WeaponDescJp = "O precioso lança-granadas da Chise.\n\nDesta vez, seguindo a ideia do Sensei, ela gravou haikus sobre o verão nas balas. É um item único e especial da Chise, que não é vendido comercialmente."
10047-ProfileIntroductionJp = "Membro da Academia Hyakkiyako, uma garota excêntrica do Clube Yin-Yang que continua distraída mesmo sob o sol escaldante do verão.\n\nCom a troca para o traje de banho, seu poder de ídolo (?) parece ter aumentado, e dizem que os gritos dos fãs que a observam têm um calor que não perde para o sol de verão. No entanto, ela não parece se importar nem um pouco. Hoje, Chise continua aproveitando um verão gratificante em busca de brilhos junto com o Sensei."
10047-CharacterSSRNewJp = "O mar está cheio de coisas maravilhosas, não é?"
