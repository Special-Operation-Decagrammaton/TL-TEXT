20005-WeaponDescJp = "O fuzil de assalto rosa que a Hifumi carrega sempre consigo.\n\nEsta arma de fogo, decorada com gravações fofas, é um item essencial até mesmo durante as férias na praia."
20005-ProfileIntroductionJp = "Uma garota sensível e emotiva do Clube de Reforço da Academia Trinity, que visitou o mar com suas amigas.\n\nPara ajudar Azusa, que nunca tinha ido à praia, ela tomou a atitude impensável de roubar (ou como ela diz, \"pegar emprestado\") um tanque Crusader de Trinity. Como esperado, ela foi descoberta pelo Comitê de Justiça, o que a levou a se envolver em um grande incidente. Mesmo dentro de um tanque, sua natureza desastrada continua a mesma, e o poder de fogo do veículo acaba apenas ajudando a tornar a confusão ainda maior."
20005-CharacterSSRNewJp = "Bem... é só um traje de banho comum, sabe?"
