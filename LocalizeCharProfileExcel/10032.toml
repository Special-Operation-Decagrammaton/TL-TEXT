10032-WeaponDescJp = "A metralhadora que a Mutsuki carrega sempre consigo.\n\nEmbora ela esteja vestida a rigor para o Ano Novo, a arma continua guardada dentro de sua bolsa. Segundo a Mutsuki, ela pode sacá-la instantaneamente se necessário, o que não atrapalha em nada suas travessuras."
10032-ProfileIntroductionJp = "Membro da Academia Gehenna e líder de campo e de ataque da Problem Solver 68.\n\nCom a chegada do Ano Novo, ela renovou seu visual para ir visitar o santuário (se divertir) com a Aru e as outras. Apesar de estar vestida com entusiasmo para a ocasião, sua personalidade continua a mesma de sempre; ela adora causar travessuras e problemas, rindo enquanto observa o caos. Ela continua observando a Aru, que sempre acaba se metendo em encrencas, de um lugar privilegiado bem ao lado dela. Fora isso, ela é uma garota diabólica e autêntica que está aproveitando o Ano Novo do seu próprio jeito."
10032-CharacterSSRNewJp = "Kufufu♪ Vamos nos divertir muito juntos este ano também, Sensei!"
