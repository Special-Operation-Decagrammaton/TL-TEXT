10058-WeaponDescJp = "ミネのショットガン。\n\n救護とは時に二面性を持つものであると彼女は主張する。この武器こそ彼女の主張の根拠になるのかもしれない……"
10058-ProfileIntroductionJp = "トリニティ総合学園所属、救護騎士団の団長。芯が強く実直な性格だが、過激な一面もある白衣の戦士。\n\n「ミネが壊して騎士団が治療する」という救護騎士団の噂はトリニティ全域に轟いているという。そんな彼女ではあるが、自身の装備を整備したり、知人を招いてお茶会を開く事で心を癒す一面も。また、紅茶に対する造詣が深く、正義実現委員会のハスミと匹敵するレベルなのだとか。"
10058-CharacterSSRNewJp = "救護騎士団団長、蒼森ミネと申します。\n救護が必要な方はどちらでしょうか？"
