10058-WeaponDescJp = "A espingarda de Mine.\n\nEla afirma que o socorro, às vezes, possui uma dualidade. Talvez esta arma seja a base para o seu argumento..."
10058-ProfileIntroductionJp = "Membro da Academia Trinity e líder do Esquadrão de Socorro. Uma guerreira de jaleco branco com uma personalidade forte e honesta, mas que também possui um lado radical.\n\nDizem que o boato de que \"Mine destrói e o Esquadrão de Socorro trata\" ecoa por toda Trinity. Apesar disso, ela também tem um lado que busca conforto ao fazer a manutenção de seus equipamentos ou ao convidar conhecidos para festas de chá. Além disso, ela possui um conhecimento profundo sobre chás, sendo dito que seu nível é comparável ao de Hasumi, do Comitê de Justiça."
10058-CharacterSSRNewJp = "Eu sou Aomori Mine, líder do Esquadrão de Socorro.\nQuem é que precisa de socorro?"
