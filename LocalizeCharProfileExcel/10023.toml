10023-WeaponDescJp = "O rifle de precisão que Iori usa ao lidar com infratores das regras.\n\nEle é carregado com balas que possuem uma aparência refrescante, semelhante a uma bebida gaseificada, e seu poder não deve ser subestimado."
10023-ProfileIntroductionJp = "Uma especialista implacável do Comitê Disciplinar da Academia Gehenna que participou do treinamento do acampamento de verão.\n\nPara garantir que os alunos problemáticos não se aproveitem do verão para fazer bagunça, ela está patrulhando principalmente a praia junto com outros membros do Comitê Disciplinar. Embora não demonstre, parece estar secretamente insatisfeita por ter vindo à praia apenas para lutar, tudo por causa dos alunos problemáticos que não param de aparecer."
10023-CharacterSSRNewJp = "Não há nenhum idiota que vá violar as regras da escola só porque está empolgado com o verão, certo?"
