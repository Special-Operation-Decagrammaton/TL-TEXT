10023-ProfileIntroductionJp = "ゲヘナ学園所属、夏季合宿トレーニングに参加した風紀委員会の冷酷なスペシャリスト。\n\n問題児たちが夏だからと言って調子に乗らないように、他の風紀委員たちと一緒に主に海辺での監視を行っている。表には出さないものの、問題児たちが絶えないせいでせっかく海に来たのに戦闘ばかりなことを、内心不満に思っている模様。"
10023-CharacterSSRNewJp = "夏で浮かれて、校則違反をするようなバカはいないだろうな？"
