10064-WeaponDescJp = "A pistola que Kayoko carrega consigo habitualmente.\n\nEsta arma, que emite um som considerável a cada disparo, é eficaz não apenas para afastar clientes rudes, mas também para afastar o azar no Ano Novo."
10064-ProfileIntroductionJp = "Chefe da Problem Solver 68, pertencente à Academia Gehenna, que dá as boas-vindas ao Ano Novo.\n\nEmbora ela tenha se vestido a rigor para o Ano Novo como os outros membros, sua postura é tão imponente que parece que ela usa essas roupas todos os dias. Apesar de achar toda a confusão um incômodo, ela sempre oferece sua sabedoria quando é pela Problem Solver 68."
