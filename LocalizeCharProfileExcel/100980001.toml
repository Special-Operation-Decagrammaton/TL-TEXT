100980001-ProfileIntroductionJp = "Pertencente à Escola de Ensino Médio Abydos, é a presidente do conselho estudantil de Abydos e a preguiçosa presidente do Comitê de Contramedidas.\n\nEquipada com o armamento que estava guardado, ela adotou um estilo mais adequado para o combate. Fora isso, não é diferente da Hoshino de sempre, mas, ao entrar em estado de combate, é possível vislumbrar um olhar sério."
