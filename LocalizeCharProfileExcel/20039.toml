20039-ProfileIntroductionJp = "山海経高級中学校所属、生徒会「玄龍門」の門主。\n\n古風で威厳のある言葉遣いと、どこか神秘的にも感じられる印象が相まって、近寄りがたい雰囲気を漂わせる少女。本人はむしろ、そのイメージを職務に活用しているのだとか。彼女が時折「お忍び」で市井に降りる姿に気づく者が少ないが、その実体を知る者からは微笑ましく見守られている。"
20039-CharacterSSRNewJp = "さて、妾に何を見せてくれるのじゃ？"
