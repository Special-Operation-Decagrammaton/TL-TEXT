10015-ProfileIntroductionJp = "Membro do Departamento de Desenvolvimento de Jogos da Millennium Science School.\n\nUma garota de identidade desconhecida encontrada em ruínas; todas as informações sobre ela, incluindo sua idade, são um mistério. Atualmente, ela se diverte com jogos junto com Momoi, Midori e Yuzu, tornando-se uma viciada em jogos. Sua fala é um pouco hesitante ou não natural, pois a maior parte do que ela diz é composta por falas de jogos retrô."
10015-CharacterSSRNewJp = "……Eu estive esperando todo esse tempo pelo momento em que seria chamada por essa voz."
