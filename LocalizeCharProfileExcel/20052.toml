20052-WeaponDescJp = "A pistola que Yakumo carrega consigo.\n\nYakumo costuma dizer que \"armas têm vários usos\". Dizem que, entre esses usos, está o de \"fazer cumprir os prazos\" de escritores preguiçosos."
20052-ProfileIntroductionJp = "Chefe do Departamento de Publicações da Academia Federal Red Winter.\n\nTambém atua como editora-chefe do \"Red Bear\". Ela tem um lado teimoso e não muda de ideia depois de decidir algo; quando se trata dos lucros do Departamento de Publicações, ela não mede esforços e demonstra uma capacidade de ação imbatível. No entanto, parece que ela também tem um lado dedicado...?"
20052-CharacterSSRNewJp = "Você não tem... interesse em livros?\nOra, não diga isso, vamos apenas conversar um pouco primeiro."
