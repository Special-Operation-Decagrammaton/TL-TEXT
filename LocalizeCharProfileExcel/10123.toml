10123-WeaponDescJp = "セイアが愛用する拳銃。\n\n服装が軽やかになったとはいえ、あの独特な話し方も、火力も、少しも鈍ってはいない。新しく拵えた衣装のように、銃も大胆に使いこなす。"
10123-ProfileIntroductionJp = "悠々自適に夏休みを満喫中のトリニティ総合学園所属、トリニティを構成している生徒連合「サンクトゥス」のリーダー。\n\nバカンスモードに切り替え、夏を満喫する準備は万端。元来マイペースな性分ではあったが、さらに自由奔放な側面が見え隠れしている模様。"
10123-CharacterSSRNewJp = "万物は常に変化する……それは外見だけに留まらないよ。"
