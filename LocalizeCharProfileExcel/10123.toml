10123-WeaponDescJp = "O revólver favorito de Seia.\n\nApesar das suas roupas estarem curtas e leves para o verão,\naquele seu jeito de falar e o seu poder de fogo não perderam a intensidade.\nAssim como a sua nova roupinha curta, ela maneja a arma de um jeito bem mais atrevido e ousado."
10123-ProfileIntroductionJp = "Líder da união de estudantes 'Sanctus', uma das facções\nque compõem a Academia Geral Trinity, atualmente\ndesfrutando das suas merecidas e deliciosas férias de verão.\n\nEla ativou o modo férias e está completamente pronta para sugar o máximo do verão.\nEmbora ela sempre tenha seguido o próprio ritmo,\nagora parece que aquele seu lado sapeca, livre e desimpedido\nestá ficando cada vez mais evidente."
10123-CharacterSSRNewJp = "Todas as coisas estão em constante mudança... e isso não se limita apenas ao meu corpo exposto."