10085-WeaponDescJp = "Um fuzil de assalto bullpup usado por Hare.\n\nPossui uma função de ignição que permite acender fogo facilmente mesmo ao ar livre, além de um sistema de mira automática que oferece suporte caso feras selvagens apareçam. No entanto, dizem que quando um urso realmente aparece, Hare entra em pânico e nunca consegue usar essas funções corretamente."
10085-ProfileIntroductionJp = "Uma integrante da Veritas que trocou de roupa para se agasalhar no inverno rigoroso.\n\nComo ela teve que sair de casa depois de muito tempo para ir a um acampamento onde o sinal de rede é quase inexistente, ela parece estar com o ânimo mais baixo que o normal. Embora consiga suportar a maioria dos inconvenientes de estar ao ar livre, parece que ela não consegue abrir mão de tomar seu energético."
