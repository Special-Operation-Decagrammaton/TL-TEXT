10085-WeaponDescJp = "ハレが使用するブルパップ方式のアサルトライフル。\n\n屋外でも簡単に点火できる着火機能が付いており、猛獣が現れた時は自動的にサポートしてくれる標的照準装置などが搭載されている。しかし、実際に熊が現れた時のハレは慌ててしまい、その機能をまともに使ったことはないのだとか。"
10085-ProfileIntroductionJp = "寒い冬にあわせて暖かい格好に着替えたヴェリタスのメンバー。\n\n久々に外出することになった上、電波がほとんど通じないキャンプ場に足を運ぶことになり、いつもよりテンションが下がっている様子。屋外の不便さには大体耐えられるものの、エナジードリンクを飲むことだけは諦められない模様。"
10085-CharacterSSRNewJp = "どんなに寒くても、ぬるい妖怪MAXだけは受け入れられないよ"
