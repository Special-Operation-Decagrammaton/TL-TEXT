10136-ProfileIntroductionJp = "Membro do Departamento de Investigação de Fenômenos Estranhos da Millennium Science School.\n\nEla trocou de roupa para atuar como atiradora de elite no suporte. Embora tenha pensado que cobrir o máximo de pele possível seria melhor para o suporte... parece que não aguentou o calor e acabou tirando a capa para amarrá-la na cintura.\n\nAssim como Toki, ela mudou sua arma principal para um rifle de energia. Como está usando um visor para suporte de mira, dizem que sua mochila é muito maior do que a de Toki."
