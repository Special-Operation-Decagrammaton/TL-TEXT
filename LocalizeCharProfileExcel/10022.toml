10022-ProfileIntroductionJp = "ゲヘナ学園所属、夏季合宿トレーニングのために海を訪れた風紀委員長。\n\n基本的には面倒くさがり屋さんな彼女だが、訓練だから仕方がないと今回は海へ訪れた。海で遊んだことがほとんど無いという彼女は、水着も浮き輪も全て昔の物を持ってきた様子。その理由について「勿体ないから」とは言いつつも、その水着がまだ着られるという事実を心の底では微かに気にしている。しかしどんな格好であっても、そして季節が夏で、たとえ場所が海であっても、彼女が風紀に厳しいことに変わりはない。"
10022-CharacterSSRNewJp = "夏だからって、別にやることは変わらない"
