10022-WeaponDescJp = "Uma metralhadora que Hina manuseia como se fosse uma extensão de seu próprio corpo.\n\nMesmo diante do mar, o rigor de seu poder não muda."
10022-ProfileIntroductionJp = "Presidente do Comitê Disciplinar da Academia Gehenna, que visitou a praia para o treinamento do acampamento de verão.\n\nBasicamente, ela é uma pessoa que evita problemas, mas como é um treinamento, ela veio à praia desta vez. Como ela quase nunca brincou no mar, parece que trouxe tudo o que tinha de antigamente, incluindo o traje de banho e a boia. Embora diga que o motivo é porque \"seria um desperdício jogar fora\", no fundo, ela está levemente preocupada com o fato de que aquele traje de banho ainda serve. No entanto, não importa o traje, a estação ou o fato de estar na praia, o seu rigor com a disciplina permanece inalterado."
10022-CharacterSSRNewJp = "Só porque é verão, não significa que as coisas que tenho que fazer mudem."
