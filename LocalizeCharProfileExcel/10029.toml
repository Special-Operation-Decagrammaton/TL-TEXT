10029-ProfileIntroductionJp = "Pertencente à Academia Trinity, é a principal encrenqueira do Clube de Doces do Pós-Escola e uma romântica autoproclamada.\n\nUma garota que, do nada, diz coisas estranhamente filosóficas e tende a comparar tudo com doces. Ela sempre começa a falar coisas absurdas e acaba envolvendo todos, mas, no fundo, o que a move é o desejo puro de \"compartilhar o romance com todos\". No entanto, como a definição dela de \"romance\" muda constantemente, é impossível negar a impressão de que os outros acabam sendo \"arrastados\" por ela."
