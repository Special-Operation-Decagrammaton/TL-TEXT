10029-WeaponDescJp = "ナツが手にしているサブマシンガン。\n\n基本的に思索を好む彼女にとって、この銃を持ち出すのは「最終手段」であることが多い。"
10029-ProfileIntroductionJp = "トリニティ総合学園所属、放課後スイーツ部のトラブルメーカー筆頭であり自称ロマンチスト。\n\nいきなり妙に哲学的なことを言ったり、何かとスイーツに例えがちな女の子。いつも突飛なことを言い出してみんなを巻き込む彼女だが、その根本にあるのは「みんなと一緒にロマンを共有したい」という純粋な気持ちである。ただしその「ロマン」の定義も常に変わり続けるため、逆の立場からするとやはり「振り回されている」という印象は否めない。"
10029-CharacterSSRNewJp = "……先生はショートケーキについて、深く考えてみたことある？"
