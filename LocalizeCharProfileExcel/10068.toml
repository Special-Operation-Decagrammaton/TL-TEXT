10068-WeaponDescJp = "A preciosa espingarda da Reisa. O cano cuidadosamente personalizado faz com que qualquer um reconheça que é a arma da Reisa.\n\nApesar da aparência fofa, é possível notar marcas que indicam que ela já passou por inúmeros campos de batalha."
10068-ProfileIntroductionJp = "Membro do grupo de vigilantes da Academia Trinity, que aparece por toda parte em Trinity realizando atividades de manutenção da ordem.\n\nComo ela diz coisas difíceis de entender, às vezes pensam que são trotes, mas dizem que ela leva as atividades de vigilante mais a sério do que qualquer outra pessoa. Parece que o seu discurso de apresentação muda um pouco a cada vez."
10068-CharacterSSRNewJp = "Onde houver alguém em busca de justiça... lá estarei eu... sim, eu mesma, a superestrela.\nUzawa Reisa, apresentando-se!"
