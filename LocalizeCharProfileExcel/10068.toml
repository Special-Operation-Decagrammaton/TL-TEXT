10068-ProfileIntroductionJp = "トリニティのあちこちに出没し、治安の維持活動をしているトリニティ総合学園所属、自警団のメンバー。\n\n掴みどころのない事を言うため、いたずら通報だと思われる時もあるが、誰よりも真剣に自警団活動をしているのだとか。名乗りあげる口上が、毎回少しずつ変わる模様。"
10068-CharacterSSRNewJp = "正義を求める人の元に……私あり……そう私こそがスーパースター。\n宇沢レイサ、見参です！"
