26006-ProfileIntroductionJp = "レッドウィンター連邦学園所属、ただし停学処分を受けて現在は旧校舎227号特別クラスで謹慎中の生徒。\n\n停学の理由は「望遠鏡などを使ったストーキング行為」とのこと。世の中の美しいものを直接その目で観察したいという欲求が強く、先生もその対象の一つ。227号特別クラスで長い間苦労をしてきたせいで、貧乏性が染みついている。"
