26006-WeaponDescJp = "Uma submetralhadora que Nodoka carrega consigo mesmo quando sai para observar as estrelas.\n\nPossui uma lanterna acoplada, que ilumina caminhos noturnos escuros."
26006-ProfileIntroductionJp = "Aluna da Academia Federal Red Winter, atualmente cumprindo suspensão na Classe Especial 227 do antigo prédio escolar.\n\nO motivo da suspensão foi \"atos de perseguição usando telescópios e outros equipamentos\". Ela tem um forte desejo de observar as coisas belas do mundo diretamente com seus próprios olhos, e o Sensei é um desses alvos. Por ter passado muito tempo sofrendo na Classe Especial 227, ela acabou desenvolvendo um hábito de ser excessivamente econômica."
