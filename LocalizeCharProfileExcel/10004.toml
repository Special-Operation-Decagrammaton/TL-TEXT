10004-WeaponDescJp = "ヒナがまるで自身の手足のように扱うマシンガン。\n\n校則に違反したり風紀を乱す者は、その無慈悲な破壊力によって吹き飛ばされてしまうことになる。"
10004-ProfileIntroductionJp = "ゲヘナ学園所属、誰もが恐れる風紀委員長。\n\n基本的には面倒くさがり屋さんなのだが、校則の話になると途端に厳しくなる。口では「面倒」と言いつつ、戦場では迷うことなく冷静で素早い判断をして行動する。その戦闘力は驚異的であり、そのためゲヘナに敵対する組織は彼女の登場を何よりも恐れている。"
10004-CharacterSSRNewJp = "面倒くさいけれど、やるべきことはやらないと\nそれが私の義務だから"
