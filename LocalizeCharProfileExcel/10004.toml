10004-WeaponDescJp = "Uma metralhadora que Hina manuseia como se fosse uma extensão de seu próprio corpo.\n\nAqueles que violam as regras escolares ou perturbam a disciplina pública acabam sendo varridos por seu poder destrutivo impiedoso."
10004-ProfileIntroductionJp = "Membro da Academia Gehenna e a temida presidente do Comitê Disciplinar.\n\nBasicamente, ela é uma pessoa que evita problemas, mas torna-se extremamente rigorosa quando o assunto é o regulamento escolar. Embora diga que tudo é um \"incômodo\", no campo de batalha ela toma decisões rápidas e calmas sem hesitar. Seu poder de combate é fenomenal, e é por isso que as organizações hostis a Gehenna temem sua aparição acima de tudo."
10004-CharacterSSRNewJp = "É um incômodo, mas preciso fazer o que deve ser feito.\nEsse é o meu dever."
