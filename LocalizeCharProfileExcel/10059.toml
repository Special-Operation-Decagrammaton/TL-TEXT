10059-WeaponDescJp = "ミカが愛用するサブマシンガン。\n\n何の変哲もないトリニティ製サブマシンガンを、ミカが心を込めて飾ったもの。今は暗闇の中でも星のように輝く特別な外観を持つようになった。いつでもどこでもミカのために活躍する。"
10059-ProfileIntroductionJp = "トリニティ総合学園所属、トリニティを構成している生徒連合「パテル」の元リーダーだった少女。\n\n元ティーパーティーの一人で、リーダーであるナギサとは幼馴染でもある。しかし、政治的には対立している立場のため、公私の区別はしっかりしている。いつも楽しそうに笑い、無邪気な姿を見せる彼女だが、人に言えない悩みを胸の裡に抱えているらしい。"
10059-CharacterSSRNewJp = "うん、お待たせ！\nこれからはなんでも私に任せてね☆"
