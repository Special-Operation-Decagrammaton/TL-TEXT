16006-ProfileIntroductionJp = "ゲヘナ学園所属、蒸し暑い夏でも食欲旺盛な美食研究会の食いしん坊少女。\n\n右手にスイカ、左手にはクーラーボックス。それでもさらなる夏のグルメを求めて、彼女は海へとやってきた。チョコ味のウナギのかば焼き、激辛かき氷、チョコミントをかけたスイカなど、夏ともなればシーズン特有の変なメニューには事欠かない。そんなゲテモノを含め、ありとあらゆる食べ物を追求しようとするその情熱は、夏の暑さに比肩するほど燃え盛っている。"
