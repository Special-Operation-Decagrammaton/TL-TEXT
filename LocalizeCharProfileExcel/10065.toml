10065-WeaponDescJp = "O rifle que Kaho usa habitualmente.\n\nFoi feito sob medida por Kaho para transmitir o esplendor de Hyakkiyako. Além de ser útil para a divulgação, seu poder é mais do que suficiente para acalmar os alunos problemáticos da academia."
10065-ProfileIntroductionJp = "Vice-chefe do Departamento Yin-Yang da Academia Hyakkiyako e líder estratégica do Departamento de Apoio à Indústria Cultural e Turística.\n\nUma garota que ama a cultura de Hyakkiyako mais do que ninguém e valoriza os alunos que ajudam a construí-la. Por causa disso, parece que alguns alunos de Hyakkiyako a chamam de 'Kaho-san, que parece mais uma chefe do que a própria chefe'. Aliás, dizem que ela ocupa a valiosa posição de pessoa sensata dentro do Departamento Yin-Yang."
10065-CharacterSSRNewJp = "Vou transmitir os vários encantos de Hyakkiyako\npara você também, Sensei."
