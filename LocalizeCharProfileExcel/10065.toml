10065-WeaponDescJp = "カホが普段使用するライフル。\n\n百鬼夜行の素晴らしさを伝えようと、カホがオーダーメイドして作った。広報に役立つのはもちろん、その威力は学院の問題児を落ち着かせるのにも十分な効果を発揮してくれる。"
10065-ProfileIntroductionJp = "百鬼夜行連合学院、陰陽部の副部長兼、観光文化産業広報支援部の戦略リーダー。\n\n誰よりも百鬼夜行の文化を愛し、文化を作りあげていく生徒を大切にする少女。このような姿から、一部の百鬼夜行の生徒からは「部長よりも部長らしいカホさん」と呼ばれることもある模様。ちなみに、陰陽部内では貴重な常識人ポジションなのだとか。"
10065-CharacterSSRNewJp = "百鬼夜行の様々な魅力を、\n先生にもお伝えいたしますね"
