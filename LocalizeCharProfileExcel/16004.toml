16004-ProfileIntroductionJp = "百鬼夜行連合学院所属、任侠に憧れる少女。\n\nいつも明朗快活で、人を助けることに喜びを覚えるタイプの女の子。任侠については全部映画から得た知識のため、色々とおかしいところがあるものの……。自分が夢見る任侠の道に真っすぐな少女。"
