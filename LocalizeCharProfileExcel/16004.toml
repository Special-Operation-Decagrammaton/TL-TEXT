16004-WeaponDescJp = "A metralhadora que pertence à Phina.\n\nA energia com que Phina manuseia essa arma, como se estivesse dançando, é impressionante, e ela mesma diz que seu coração ferve ao usá-la."
16004-ProfileIntroductionJp = "Aluna da Academia da União Hyakkiyako, uma garota que admira o código de honra yakuza.\n\nSempre alegre e vivaz, é o tipo de garota que sente alegria em ajudar os outros. Como todo o seu conhecimento sobre o estilo yakuza vem de filmes, há muitas coisas estranhas em seu comportamento... mas ela é uma garota que segue em frente com retidão pelo caminho da honra que ela mesma idealiza."
