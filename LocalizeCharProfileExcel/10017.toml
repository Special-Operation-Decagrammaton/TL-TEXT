10017-WeaponDescJp = "Uma pistola que Cherino usa quando precisa expurgar alguém.\n\nNem é preciso puxar o gatilho; basta apontar o cano e gritar \"Expurgo!\" para que o alvo seja considerado expurgado em Red Winter."
10017-ProfileIntroductionJp = "Presidente do conselho estudantil da Academia Federal de Red Winter, tirânica e infantil.\n\nPossui um desejo e apego ao poder extremamente fortes. Embora seja deposta por revoluções quase toda semana, ela sempre encontra uma maneira de retornar ao cargo de presidente do conselho estudantil. Segundo Cherino, seu bigode postiço é o \"símbolo da autoridade\", afirmando que \"a autoridade emana do bigode\"."
10017-CharacterSSRNewJp = "Sinta-se sortuda por ter conhecido a mim, a autoridade suprema!"
