10017-ProfileIntroductionJp = "レッドウィンター連邦学園所属、横暴で子供っぽい生徒会長。\n\n権力への執着と欲求が非常に強く、毎週のように革命によって失脚させられるものの、その度どうにかして生徒会長の座に復帰することを繰り返す。その付けヒゲはチェリノ曰く「権威の象徴」であり、「権威というものはヒゲから出るものだ」とのこと。"
10017-CharacterSSRNewJp = "この最高権力者たる私と出会えたこと、幸運に思うが良い！"
