20031-WeaponDescJp = "O lançador de granadas que Shigure carrega consigo o tempo todo.\n\nA forma como Shigure recarrega as granadas como se estivesse agitando uma coqueteleira tornou-se uma das atrações do Resort Termal 227, sendo muito elogiada pelos clientes."
20031-ProfileIntroductionJp = "Uma aluna suspensa da Classe Especial 227 da Academia Federal Red Winter, que administra o Resort Termal 227 junto com os outros alunos da classe especial.\n\nApós uma fonte termal brotar repentinamente do antigo prédio da escola, ela começou a administrar um enorme resort termal junto com Nodoka. Diferente de Nodoka, ela não parece muito interessada em tornar o resort um sucesso, mas parece satisfeita com o ambiente onde pode preparar à vontade várias bebidas e doces."
20031-CharacterSSRNewJp = "Depois de aquecer o corpo na fonte termal, é a vez de aquecer o coração"
