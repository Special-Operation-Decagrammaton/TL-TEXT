20031-WeaponDescJp = "シグレが常に携帯しているグレネードランチャー。\n\nシェーカーを振るように榴弾を見事にリロードするシグレの姿は227号温泉郷の見どころの一つとして、お客様から好評を博している。"
20031-ProfileIntroductionJp = "特別クラスの生徒と共に227号温泉郷を運営しているレッドウィンター連邦学園所属、227号特別クラスの停学生。\n\n旧校舎から突然温泉が沸き出し、ノドカと一緒に巨大な温泉郷を運営することになった。ノドカと違って温泉郷を繁盛させる気はあまりない様子だが、色々な飲み物とお菓子を存分に作れる環境には満足しているようだ。"
20031-CharacterSSRNewJp = "温泉で身体を温めたら、次は心の番だね"
