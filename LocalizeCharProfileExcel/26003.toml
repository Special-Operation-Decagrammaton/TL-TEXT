26003-ProfileIntroductionJp = "トリニティ総合学園所属、救護騎士団で献身する優しい少女。\n\nボランティア活動に奉仕する善良な性格の持ち主で、健康に関しては度が過ぎるほど心配性なこともあって、周りの生徒たちからは「お母さんみたい」とよく言われている。争いごとは嫌うものの、平和を脅かす敵に対しては毅然とした態度で立ち向かう。"
