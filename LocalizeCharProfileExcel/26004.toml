26004-ProfileIntroductionJp = "Membro da Academia Trinity e bibliotecária do Comitê da Biblioteca.\n\nUma leitora ávida que ama livros, sendo uma das poucas alunas que leu todo o vasto acervo da biblioteca de Trinity. Ela gosta tanto de recomendar livros quanto de lê-los, e sempre que conhece alguém, a primeira coisa que pensa é: \"Que tipo de livro combinaria com o gosto dessa pessoa?\""
