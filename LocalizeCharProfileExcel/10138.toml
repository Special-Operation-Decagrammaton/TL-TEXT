10138-WeaponDescJp = "Маленький пистолет, который идеально ложится в руку Рэны.\n\nПусть у него и милый кастомный дизайн, но если он попадёт в цель, то будет больно точно так же, как от любого другого оружия."
10138-ProfileIntroductionJp = "Член Клуба исследования оккультизма в Академии искусств «Вайлд Хант», где изучают мистические проявления в искусстве.\n\nЕё насильно заставили участвовать в деятельности клуба после того, как по чистой случайности заселили в комнату 404 корпуса №4. Хотя она вовсю твердит, что оккультизм — это сплошной обман, кажется, она сама того не замечая погружается в него с головой."
