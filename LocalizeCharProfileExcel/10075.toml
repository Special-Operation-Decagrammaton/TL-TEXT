10075-WeaponDescJp = "Uma pistola de fabricação especial feita exclusivamente para Meru.\n\nUma arma que personifica as preocupações da própria dona. Dizem que ela a nomeou assim por não conseguir pensar em nada melhor."
10075-ProfileIntroductionJp = "Membro do Comitê da Biblioteca \"Frente de Libertação do Conhecimento\" da Academia Federal de Red Winter.\n\nDiferente de Momiji, que também faz parte da Frente de Libertação do Conhecimento, Meru não apenas aprecia obras derivadas, mas também cria as suas próprias. Seu pseudônimo é \"Merury\". Ela frequentemente se inspira em relacionamentos entre estudantes que parecem ser próximos ou rivais, dedicando-se ao que chamam de doujin de pessoas reais. Estudantes de Trinity e Gehenna, que são rivais, também são \"alvos criativos\" de Meru, e como ela os desenha com frequência, sua má fama se espalhou para fora da academia."
10075-CharacterSSRNewJp = "Tenho que... acordar...\nTenho que... terminar o manuscrito..."
