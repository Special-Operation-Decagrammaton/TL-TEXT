10110-ProfileIntroductionJp = "トリニティ総合学園所属、トリニティを構成している生徒連合「サンクトゥス」のリーダー。\n\n衒学的でつかみどころのない口調で話す。本の虫で、大図書館にいることも多い。怪我が治ってからは、以前より子供っぽい一面を見せることも。"
