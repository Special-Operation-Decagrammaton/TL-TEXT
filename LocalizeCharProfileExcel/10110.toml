10110-WeaponDescJp = "O revólver favorito de Seia.\n\nPossui um design que exala a elegância digna de uma\nmembro do Tea Party. Assim como sua dona,\nque ocasionalmente tem uma língua bem afiada,\na arma está sempre carregada." 
10110-ProfileIntroductionJp = "Líder da união de estudantes 'Sanctus',\numa das facções que compõem a\nAcademia Geral Trinity.\n\nCostuma falar com um tom pedante e misterioso, sendo\nbem difícil de decifrar. É uma devoradora de livros e\npode ser encontrada frequentemente na Grande Biblioteca.\nDesde que se recuperou de seus ferimentos, às vezes acaba\ndeixando escapar um lado bem mais manhoso e infantil." 
