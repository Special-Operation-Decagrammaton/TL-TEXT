16007-WeaponDescJp = "O rifle de precisão usado por Tomoe.\n\nEquipado com uma mira de alta ampliação, ele permite localizar rebeldes que ousem questionar a autoridade da Presidente Cherino, mesmo a longas distâncias."
16007-ProfileIntroductionJp = "Membro da Academia Federal Red Winter, chefe do secretariado da administração de Red Winter e principal assessora de Cherino.\n\nUma mestre na arte da oratória, capaz de fazer qualquer coisa soar plausível, ela espalha regularmente sua lealdade à Presidente Cherino por vários lugares. A própria Cherino acredita que \"Tomoe é leal porque foi influenciada pelo meu carisma\", mas, na realidade, Tomoe apenas a adora cegamente."
