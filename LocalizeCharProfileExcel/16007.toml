16007-WeaponDescJp = "トモエが使用するスナイパーライフル。\n\n高倍率のサイトが付いており、チェリノ会長の権威を疑う反乱分子とあらば、かなりの遠距離からでも見つけ出すことができる。"
16007-ProfileIntroductionJp = "レッドウィンター連邦学園所属、レッドウィンター事務局の秘書室長にしてチェリノの側近筆頭。\n\nどんなことでも彼女が話すともっともらしく聞こえるという話術の達人的な存在で、チェリノ会長に対する忠誠心を定期的に様々な場所で吹き込んでいる。チェリノ自身は「トモエは自分のカリスマに感化されて忠誠心を持っているんだ」と考えているが、その実トモエはチェリノを盲目的に可愛がっているだけだったりする。"
