16010-ProfileIntroductionJp = "Membro do Clube de Engenharia da Millennium Science School, que se vestiu com um traje de líder de torcida para o Grande Festival Esportivo.\n\nAproveitando suas habilidades de costura, aprimoradas pelo seu hobby de cosplay, ela mesma confeccionou os trajes usados pelos membros do Clube de Engenharia. No entanto, como o traje de líder de torcida é uma versão reformada de um que ela fez há muito tempo, parece que ela está um pouco preocupada com o comprimento da saia."
