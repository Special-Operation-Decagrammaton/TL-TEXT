16010-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、大運動会を迎え、チアリーダーの衣装に身を包んだエンジニア部の部員。\n\n普段のコスプレ趣味で培った裁縫スキルを生かし、エンジニア部員が着る衣装を製作した。なお、チアリーダーの衣装は昔作ったものをリメイクしたからか、スカート丈が少し気になっている様子。"
