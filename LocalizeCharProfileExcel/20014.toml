20014-WeaponNameJp = "Metralhadora Leve RABBIT-26"
20014-WeaponDescJp = "Metralhadora de serviço fornecida a Saki pela Academia Especial SRT.\n\nSua principal desvantagem é a enorme dificuldade de manutenção devido a um problema em sua estrutura. Por outro lado, caso a manutenção seja executada corretamente, é uma arma que ostenta um imenso poder de fogo tático."
20014-ProfileIntroductionJp = "Batedora de vanguarda (Pointman) do Esquadrão RABBIT, pertencente à Academia Especial SRT.\n\nEla ingressou na SRT buscando uma vida baseada em regras e disciplina militar rigorosa, mas a academia acabou sendo fechada repentinamente. Atualmente, ela vive acampada em um parque junto com as outras integrantes de seu esquadrão. Ela está sempre carregando os manuais de táticas da SRT debaixo do braço e é do tipo que valoriza, acima de tudo, agir estritamente de acordo com os regulamentos. Ela tem o hobby de forragear plantas silvestres comestíveis e coletar materiais recicláveis/descartados, habilidades que têm se mostrado cruciais e extremamente úteis para a sobrevivência delas no parque, onde recursos são tão escassos. Seu call sign é «RABBIT2»."
20014-CharacterSSRNewJp = "Aqui é RABBIT2, copiando alto e claro."