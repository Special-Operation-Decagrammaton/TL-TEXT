20014-WeaponDescJp = "Uma metralhadora padrão fornecida a Saki pela Academia SRT.\n\nSua desvantagem é a dificuldade de manutenção devido a problemas estruturais, mas, por outro lado, se for bem cuidada, é uma arma que ostenta um poder de fogo formidável."
20014-ProfileIntroductionJp = "Ponta da equipe RABBIT, pertencente à Academia SRT.\n\nEntrou na Academia SRT em busca de uma vida baseada em regras rígidas, mas a academia foi subitamente fechada. Atualmente, vive em um parque com os outros membros de seu esquadrão. Ela sempre carrega consigo o manual de táticas da SRT e, basicamente, é do tipo que prioriza agir sempre de acordo com os princípios. Tem o hobby de coletar vegetais silvestres e sucatas, o que parece ser muito útil na atual vida no parque, onde os recursos costumam ser escassos. Seu codinome é 'RABBIT2'."
20014-CharacterSSRNewJp = "Aqui é RABBIT2, recepção clara"
