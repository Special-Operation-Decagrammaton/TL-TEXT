20014-WeaponDescJp = "A metralhadora padrão distribuída pela Academia Especial SRT para Saki.\n\nApresenta o defeito de ser difícil de limpar e manter devido à sua complexidade estrutural, mas, por outro lado, ostenta um poder de fogo colossal caso a manutenção seja feita corretamente." 
20014-ProfileIntroductionJp = "Membro da Academia Especial SRT e a operadora de vanguarda (Pointsman) do Esquadrão RABBIT.\n\nIngressou na Academia Especial SRT buscando uma vida baseada em regras rígidas, porém a academia foi subitamente fechada. Atualmente, ela vive num acampamento em um parque com as demais membras do esquadrão. Ela sempre carrega um manual contendo as táticas da SRT e é do tipo que prioriza agir estritamente de acordo com as regras. Possui o hobby de coletar ervas e plantas comestíveis, além de sucata, o que tem se mostrado de extrema utilidade para a atual vida no parque, onde recursos são escassos. Seu indicativo de chamada (Call Sign) é 'RABBIT 2'." 
20014-CharacterSSRNewJp = "Aqui é RABBIT 2. Recepção limpa e clara." 