20014-WeaponDescJp = "Metralhadora padrão fornecida à Saki pela Academia Especial SRT.\n\nSua principal desvantagem é a dificuldade de manutenção devido a um problema em sua estrutura, mas, se for bem cuidada, é uma arma que ostenta um poder de fogo devastador."
20014-ProfileIntroductionJp = "Aluna da Academia Especial SRT e Batedora (Pointman) do Esquadrão RABBIT.\n\nEla ingressou na SRT em busca de uma vida baseada em regras rígidas e disciplina, mas a academia foi fechada de repente. Atualmente, ela acampa e vive em um parque junto com as outras integrantes do seu esquadrão. Anda sempre com o manual de táticas da SRT debaixo do braço e é do tipo que faz questão de seguir os procedimentos à risca em qualquer situação. Tem como hobby coletar plantas nativas e reciclar materiais descartados, o que tem quebrado um galho enorme na vida atual do parque, onde os recursos são bem escassos. Callsign: RABBIT2."
20014-CharacterSSRNewJp = "Aqui é a RABBIT2. Sinal limpo e claro."
