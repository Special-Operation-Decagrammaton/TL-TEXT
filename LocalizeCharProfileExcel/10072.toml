10072-WeaponDescJp = "Metralhadora de serviço fornecida a Saki pela Academia Especial SRT.\n\nPor ser altamente vulnerável à umidade e ao salitre, ela sofre frequentemente com falhas mecânicas quando operada no mar. No entanto, graças à natureza extremamente dedicada e rigorosa de Saki com a manutenção, isso acaba não sendo um grande problema."
10072-ProfileIntroductionJp = "Batedora de vanguarda (Pointman) do Esquadrão RABBIT, pertencente à Academia Especial SRT, que visitou uma vila de pescadores para uma operação de infiltração.\n\nSendo alguém que valoriza os manuais militares acima de tudo, Saki carrega todos os equipamentos táticos necessários para o combate em sua bolsa, mesmo se tratando de uma missão de infiltração discreta. Parece que a sua personalidade séria e metódica permanece completamente inalterada, mesmo estando de maiô."
10072-CharacterSSRNewJp = "Aqui é RABBIT2.\nIniciando a operação de infiltração a partir deste exato momento."