10072-WeaponDescJp = "A metralhadora padrão distribuída pela Academia Especial SRT para Saki.\n\nPor ser frágil à umidade e ao sal, é comum que sofra falhas e panes constantes em regiões praianas. No entanto, para a dedicada e esforçada Saki, isso não é um problema tão grave assim." 
10072-ProfileIntroductionJp = "A operadora de vanguarda (Pointsman) do Esquadrão RABBIT da Academia Especial SRT, que visitou uma vila de pescadores para uma missão de infiltração.\n\nFiel aos ensinamentos do seu amado manual de operações, Saki embalou todo o equipamento militar tático de combate em sua mala de viagem, mesmo sendo uma missão de infiltração na praia. Sua natureza extremamente séria e rigorosa permanece inalterada mesmo quando está vestida com um traje de banho." 
