10050-ProfileIntroductionJp = "Uma aluna do 1º ano da Escola Secundária Shanhaijing que atua como instrutora no Departamento de Apoio Educacional \"Plum Blossom Garden\".\n\nEmbora tenha idade para estar no ensino fundamental, sua excelente capacidade de aprendizado foi reconhecida, permitindo que ela obtivesse autoridade como instrutora. As crianças do jardim a chamam carinhosamente de \"Kokona-chan\", mas ela não gosta muito desse apelido."
10050-CharacterSSRNewJp = "Sou a Kokona, do Departamento de Apoio Educacional \"Plum Blossom Garden\"!\nN-não é isso! Eu sou uma instrutora de verdade, entende!?"
