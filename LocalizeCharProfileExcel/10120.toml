10120-WeaponDescJp = "ナツのサブマシンガン。\n\n思索だけでは解決しない問題に対する「最終手段」。複雑な現代社会においては、これをも越える解決策が必要な時も……。"
10120-ProfileIntroductionJp = "トリニティ総合学園所属、放課後スイーツ部の部員であり、急遽結成されたバンド「シュガーラッシュ」のドラマー兼スケジュール管理担当。\n\n「ロック」の精神について深く洞察しているようだが、本人もきちんと説明してくれない。彼女曰く、それを説明することはロックじゃないから、だとか。"
10120-CharacterSSRNewJp = "ああ……共に進もう。「ロック」の道へと！"
