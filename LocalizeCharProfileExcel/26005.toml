26005-ProfileIntroductionJp = "Membro do Clube de Doces Depois da Aula da Academia Trinity.\n\nUma garota que parece um pequeno animal sempre na defensiva, que tem complexo com sua altura e físico. Ela sempre quer parecer mais madura, mas como seus pensamentos ficam estampados no rosto, todos ao seu redor a tratam como uma criança. Ela só mostra um sorriso radiante quando está saboreando doces de edição limitada durante suas visitas a cafés."
