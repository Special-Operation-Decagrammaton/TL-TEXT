26005-ProfileIntroductionJp = "トリニティ総合学園所属、放課後スイーツ部の部員。\n\n身長と体型がコンプレックスの、常に威嚇しっぱなしの小動物のような少女。常に大人っぽくなりたいと思っているが、考えていることが顔にそのまま表れてしまうため、周囲からはいつまでも可愛がられている。趣味のカフェ巡りをしながら、限定スイーツを味わう時だけは誰よりも明るい笑みを見せる。"
