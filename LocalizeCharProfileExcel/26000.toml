26000-ProfileIntroductionJp = "Membro da Academia Gehenna, responsável pelos primeiros socorros do Comitê Disciplinar.\n\nUma das poucas pessoas sensatas no Comitê Disciplinar, que valoriza regulamentos, disciplina e procedimentos. Ela atua como um freio quando outros membros, como Ako e Iori, perdem o controle. Sua linguagem formal e rígida tende a dar uma impressão fria de uma \"membro típica do comitê disciplinar\", mas ela é uma garota gentil que fica completamente derretida na frente de animais fofos."
