20023-WeaponDescJp = "Uma pistola de serviço fornecida pela Escola de Polícia Valkyrie.\n\nTem um design simples, mas como é leve e fácil de manusear, a Kanna, que faz mais trabalho de papelada do que trabalho de campo, adora usar esta pistola."
20023-ProfileIntroductionJp = "Aluna pertencente à Escola de Polícia Valkyrie, que atua como diretora do Departamento de Segurança Pública.\n\nEla é conhecida publicamente pelo apelido de 'Cão Louco' devido à sua persistência em interrogar suspeitos e esclarecer a verdade sobre os crimes que decide investigar, sem nunca conhecer a palavra 'desistir'. Por causa de sua aura rígida e do apelido, muitas vezes é mal interpretada como uma pessoa explosiva, mas, na realidade, ela é sempre calma e possui uma visão de mundo realista."
20023-CharacterSSRNewJp = "Pelo bem dos cidadãos, servirei de corpo e alma."