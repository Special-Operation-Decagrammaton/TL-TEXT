20023-WeaponDescJp = "Uma pistola padrão fornecida pela Academia de Polícia Valkyrie.\n\nEmbora tenha um design simples, é leve e fácil de manusear, por isso Kanna, que passa mais tempo com trabalho burocrático do que em campo, a utiliza como sua arma favorita."
20023-ProfileIntroductionJp = "Uma aluna da Academia de Polícia Valkyrie que atua como chefe do Departamento de Segurança Pública.\n\nEla é conhecida pelo apelido de \"Cão Raivoso\" por sua persistência implacável em interrogar suspeitos e revelar a verdade sobre os crimes que decide investigar, sem nunca desistir. Devido à sua postura rígida e ao apelido, é frequentemente mal interpretada como alguém de temperamento explosivo, mas, na realidade, ela é sempre calma e possui valores realistas."
20023-CharacterSSRNewJp = "Pelo bem dos cidadãos, servirei de todo o coração."
