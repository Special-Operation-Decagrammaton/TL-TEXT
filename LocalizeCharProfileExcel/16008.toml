16008-WeaponDescJp = "Um fuzil de serviço fornecido à Fubuki pela Escola de Polícia Valkyrie.\n\nPossui um poder de fogo excepcionalmente alto, mas como a Fubuki tende a negligenciar a sua manutenção, a arma não consegue demonstrar o seu verdadeiro desempenho."
16008-ProfileIntroductionJp = "Aluna pertencente à Escola de Polícia Valkyrie e a garota mais preguiçosa do Departamento de Segurança Pública.\n\nEla ingressou na Escola de Polícia Valkyrie sonhando com a vida tranquila de uma funcionária pública. Mesmo quando chegam reclamações ao Departamento de Segurança Pública, ela basicamente lida com tudo mantendo uma atitude consistentemente sem vontade, desfrutando de sua vida pacata na 'geladeira' do departamento, sem se deixar levar por dinheiro ou prestígio. O que ela mais gosta de fazer é comer donuts enquanto escuta o rádio."