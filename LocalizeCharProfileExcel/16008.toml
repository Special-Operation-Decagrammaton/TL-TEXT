16008-WeaponDescJp = "フブキがヴァルキューレ警察学校から支給されている制式ライフル。\n\n独自の高い威力を誇るが、フブキが管理を疎かにしがちなため、本来の性能を発揮できずにいる。"
16008-ProfileIntroductionJp = "ヴァルキューレ警察学校所属、生活安全局の怠け者の生徒。\n\nのんびりとした公務員の生活に憧れ、ヴァルキューレ警察学校に入学した。生活安全局に何か苦情などが舞い込んできても、基本的には一貫して誠意の無い態度で処理し、金や名誉に振り回されない窓際族の生活を楽しんでいる。一番好きなことはドーナッツを食べながらラジオを聞くこと。"
