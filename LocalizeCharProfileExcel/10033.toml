10033-WeaponDescJp = "O rifle favorito de Wakamo.\n\nApesar de sua aparência antiquada, ele sempre exala um cheiro de fogo e pólvora. Atualmente, é frequentemente disparado contra qualquer \"obstáculo\" ao redor do Sensei."
10033-ProfileIntroductionJp = "Uma das \"Sete Prisioneiras\", que pertence à Academia Hyakkiyako, mas foi suspensa, enviada para o Departamento Correcional e, posteriormente, escapou de lá.\n\nUma garota temida como a \"Raposa da Calamidade\" devido aos seus atos de destruição indiscriminados e em larga escala. Seus motivos e objetivos estão envoltos em mistério. Existem rumores constantes de que seu rosto escondido sob a máscara é assustador como o de um oni ou feio como o de um demônio, mas o desconhecido é quase sempre sentido como algo aterrorizante."
10033-CharacterSSRNewJp = "Ah... finalmente nos encontramos, meu querido...♡"
