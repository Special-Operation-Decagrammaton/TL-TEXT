13011-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、ゲーム開発部のシナリオライター。\n\n双子の妹、ミドリと共にゲーム開発部で文字通りゲームを開発している少女。陽気な性格もあって、もともと内気な妹とは相性が良くない方だったが、ゲームに対する情熱で意気投合し、今では大の仲良しになった。"
