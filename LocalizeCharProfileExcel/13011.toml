13011-WeaponDescJp = "O fuzil de assalto usado por Momoi.\n\nPossui um acessório dado por sua querida irmã mais nova, e dizem que, quando ela está em apuros, mexer nele a ajuda a ter ideias brilhantes."
13011-ProfileIntroductionJp = "Membro do Departamento de Desenvolvimento de Jogos da Millennium Science School, onde atua como roteirista.\n\nUma garota que, junto com sua irmã gêmea Midori, desenvolve jogos literalmente no Departamento de Desenvolvimento de Jogos. Devido à sua personalidade alegre, ela não se dava muito bem com sua irmã, que é naturalmente tímida, mas as duas se entenderam graças à paixão pelos jogos e, hoje em dia, são melhores amigas."
