10038-WeaponDescJp = "Submetralhadora padrão distribuída pela Academia Especial SRT para Miyako.\n\nÉ uma arma que ostenta altíssima confiabilidade e capaz de neutralizar inimigos de forma eficaz mesmo sob condições extremas."
10038-ProfileIntroductionJp = "Membro da Academia Especial SRT e comandante do Esquadrão RABBIT.\n\nIngressou na Academia Especial SRT inspirada pelas conquistas gloriosas de suas veteranas, porém a academia foi repentinamente encerrada. Atualmente, ela vive num acampamento num parque com as demais membras de seu esquadrão. Como raramente altera sua expressão e reprime suas emoções, os outros costumam julgá-la como uma pessoa fria e antipática. Contudo, em seu íntimo, possui um coração gentil e bondoso, sempre se preocupando com suas companheiras de equipe. Seu indicativo de chamada (Call Sign) é 'RABBIT 1'."
10038-CharacterSSRNewJp = "Aqui é RABBIT 1, iniciando a operação."