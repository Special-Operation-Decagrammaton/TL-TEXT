10038-WeaponDescJp = "A submetralhadora padrão fornecida a Miyako pela Academia SRT.\n\nÉ uma arma que ostenta alta confiabilidade, capaz de repelir inimigos efetivamente mesmo em situações extremas."
10038-ProfileIntroductionJp = "Líder do Esquadrão RABBIT, pertencente à Academia SRT.\n\nEmbora tenha ingressado na Academia SRT por admirar o desempenho de suas veteranas, a academia foi subitamente fechada. Atualmente, ela vive em um parque com os outros membros de seu esquadrão. Como raramente muda de expressão ou demonstra suas emoções, as pessoas ao seu redor tendem a achá-la fria. No entanto, ela possui um coração gentil e está sempre preocupada com seus companheiros de equipe. Seu codinome é \"RABBIT 1\"."
10038-CharacterSSRNewJp = "Aqui é RABBIT 1, iniciando a operação agora."
