10038-WeaponDescJp = "Submetralhadora de serviço fornecida a Miyako pela Academia Especial SRT.\n\nÉ uma arma de altíssima confiabilidade, capaz de repelir inimigos com eficácia mesmo sob as condições mais extremas de combate."
10038-ProfileIntroductionJp = "Líder do Esquadrão RABBIT, pertencente à Academia Especial SRT.\n\nEla ingressou na SRT inspirada pelas conquistas de suas veteranas, mas a academia acabou sendo fechada de forma repentina. Atualmente, ela vive acampada em um parque junto com as outras integrantes de seu esquadrão. Como raramente muda de expressão ou demonstra suas emoções, as pessoas ao seu redor costumam achá-la fria e antipática. No entanto, ela possui um coração gentil e está sempre se preocupando secretamente com o bem-estar de suas companheiras de equipe. Seu call sign é «RABBIT1»."
10038-CharacterSSRNewJp = "Aqui é RABBIT1, iniciando a operação agora."