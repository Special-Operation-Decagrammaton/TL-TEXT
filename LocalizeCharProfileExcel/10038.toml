10038-WeaponDescJp = "Submetralhadora padrão fornecida à Miyako pela Academia Especial SRT.\n\nÉ uma arma que ostenta uma altíssima confiabilidade, sendo capaz de repelir inimigos com extrema eficácia até mesmo nas situações mais adversas."
10038-ProfileIntroductionJp = "Aluna da Academia Especial SRT e Capitã do Esquadrão RABBIT.\n\nEla ingressou na SRT por admirar os grandes feitos das suas veteranas, mas a academia foi fechada de repente. Atualmente, ela vive acampada em um parque junto com as outras integrantes do seu esquadrão. Como suas expressões faciais quase não mudam e ela raramente demonstra emoções, as pessoas costumam achá-la fria e antipática. Porém, no fundo, ela é dona de um coração muito gentil e está sempre se preocupando com as meninas do esquadrão. Callsign: RABBIT1."
10038-CharacterSSRNewJp = "Aqui é a RABBIT1. Dando início à operação."
