20018-ProfileIntroductionJp = "Operadora do Esquadrão RABBIT, pertencente à Academia SRT. Seu codinome é \"RABBIT3\".\n\nEntrou na escola por admirar as armas de grande poder de fogo da Academia SRT, mas com o fechamento repentino da escola, ela agora vive ao relento em um parque junto com os outros membros do esquadrão. Ela possui um gosto peculiar por sentir prazer em explodir ou arruinar coisas, mas suas habilidades como operadora são inquestionáveis. É uma viciada em doces e está sempre com um pirulito na boca."
20018-CharacterSSRNewJp = "Aqui é a RABBIT3. Qual é o próximo local de bombardeio?"
