20018-WeaponDescJp = "Pistola de serviço fornecida a Moe pela Academia Especial SRT.\n\nApesar de ser uma arma de mão, possui uma cadência de tiro impressionantemente alta, sendo capaz de esvaziar todo o seu carregador em uma fração de segundos."
20018-ProfileIntroductionJp = "Operadora do Esquadrão RABBIT, pertencente à Academia Especial SRT. Call sign: «RABBIT3».\n\nEla ingressou na SRT por ser completamente fascinada pelo imenso poder de fogo e pelo arsenal pesado da academia. Contudo, após o fechamento repentino da instituição, ela agora vive acampada ao relento em um parque junto com as outras membras de seu esquadrão. É dona de gostos e hobbies bastante excêntricos, sentindo um prazer enorme ao explodir coisas ou arruinar completamente um cenário, mas suas habilidades técnicas como operadora tática são indiscutíveis. É uma formiga compulsiva para doces, sendo vista quase o tempo todo com um pirulito na boca."
20018-CharacterSSRNewJp = "Aqui é RABBIT3. Onde fica a nossa próxima zona de bombardeio?"