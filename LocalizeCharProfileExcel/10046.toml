10046-WeaponDescJp = "A submetralhadora favorita da Izuna.\n\nComo é uma ferramenta ninja de ponta, ela possui função totalmente à prova d'água! Ou seja, pode ser usada debaixo d'água enquanto ela nada. Quando se trata das ferramentas ninjas em prol do Meu Mestre, não há brecha para falhas."
10046-ProfileIntroductionJp = "Uma garota do Clube de Pesquisa de Ninjutsu da Academia Aliada Hyakkiyako, que visitou o mar sob a desculpa de fazer um 'treinamento'.\n\nA Izuna já costuma ser cheia de energia, mas desta vez, talvez por estar recebendo a energia do verão, ela interage com 200% de animação. Para se tornar uma ninja ainda mais apropriada para o verão, hoje a Izuna continua aproveitando o verão, que ela chama de treinamento, junto com o Meu Mestre."
10046-CharacterSSRNewJp = "Neste verão também! A humilde Izuna\nvai treinar arduamente junto com o Meu Mestre!"