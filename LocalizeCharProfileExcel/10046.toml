10046-WeaponDescJp = "A submetralhadora favorita da Izuna.\n\nComo é literalmente uma ferramenta ninja de ponta, ela vem equipada com uma função à prova d'água perfeita! Ou seja, pode ser usada até debaixo d'água. Não há brechas nas ferramentas ninja feitas para o Mestre."
10046-ProfileIntroductionJp = "Uma garota do Clube de Pesquisa de Ninjutsu da Academia Hyakkiyako que visitou o mar para treinar.\n\nIzuna já é cheia de energia normalmente, mas talvez por estar sob a influência do verão, ela está nos recebendo com 200% de vitalidade. Para se tornar uma ninja ainda mais digna do verão, hoje Izuna está aproveitando ao máximo o verão, que ela chama de treinamento, junto com o Mestre."
10046-CharacterSSRNewJp = "Neste verão também! Eu, a humilde Izuna,\ntreinarei com todo o meu esforço ao lado do Mestre!"
