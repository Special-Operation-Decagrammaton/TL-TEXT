10046-WeaponDescJp = "イズナが愛用しているサブマシンガン。\n\n文字通り最先端の忍者道具のため、防水機能もバッチリ完備！つまり海中でも使用可能。主殿のための忍具には隙がないのである。"
10046-ProfileIntroductionJp = "百鬼夜行連合学院所属、修行のために海を訪れた忍術研究部所属の少女。\n\n普段から活気に満ちているイズナだが、今回は夏のエネルギーを受けているからか、200％の元気でもって接してくれる。より夏にふさわしい忍者となるべく、今日もイズナは修行という名の夏を、主殿と共に満喫している。"
10046-CharacterSSRNewJp = "この夏も！不肖イズナ、\n主殿と共に一生懸命修行します！"
