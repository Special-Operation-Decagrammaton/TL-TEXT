23001-WeaponDescJp = "Uma submetralhadora que Fuuka carrega consigo o tempo todo.\n\nEmbora ela tente usá-la para conter os alunos problemáticos que ocasionalmente causam confusão no refeitório, na maioria das vezes eles se acalmam antes que ela precise disparar, então a arma raramente vê uso."
23001-ProfileIntroductionJp = "Membro do Clube de Merenda, responsável pela gestão do refeitório estudantil da Academia Gehenna.\n\nUma aluna gentil e séria, algo raro em Gehenna, que prepara uma quantidade imensa de comida para todos da academia todas as manhãs. Suas habilidades culinárias são bastante boas, mas como o refeitório está sempre com falta de pessoal, seu talento acaba sendo subestimado. Ainda assim, ela não desanima e continua se esforçando dia após dia para oferecer refeições cada vez mais deliciosas."
