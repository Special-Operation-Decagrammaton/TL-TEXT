23001-WeaponDescJp = "フウカが常に携帯しているサブマシンガン。\n\n時々食堂で暴れる問題児たちを制圧するためにも使おうとするものの、大抵の場合使用する前に相手がおとなしくなるのであまり出番は無い様子。"
23001-ProfileIntroductionJp = "ゲヘナ学園所属、学生食堂の管理を担当する給食部のメンバー。\n\n毎朝学園のみんなのためにすごい量の食事を作っている、ゲヘナでは珍しい、優しくて真面目な生徒。料理の腕前はそれなりに良い方だが、食堂の人手は基本的に足りてないこともあり、その実力は過小評価されがち。それでも彼女はめげることなく、より美味しい食事を提供するため日々こつこつ努力を重ねている。"
