10109-WeaponDescJp = "Uma pistola com kit de conversão usada pela Noa.\n\nAo retrair a coronha, ela se torna uma pistola do tamanho perfeito para servir como peso de papel. Ela a utiliza com carinho como companhia para suas leituras antes de dormir."
10109-ProfileIntroductionJp = "Pertencente ao Millennium Science School, a secretária do Seminar que trocou de roupa para um pijama para desfrutar de um descanso tranquilo.\n\nNoa observa silenciosamente enquanto sua adorável kouhai e seu colega de bom coração criam incidentes através de uma sucessão de mal-entendidos. É claro, sempre com um sorriso no rosto e sem esquecer de registrar tudo."
