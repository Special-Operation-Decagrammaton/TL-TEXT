13003-WeaponDescJp = "O rifle de precisão favorito de Hasumi.\n\nSua aparência esguia, que possui um charme antiquado, e seu poder de fogo surpreendentemente intenso, são ambos muito parecidos com sua dona."
13003-ProfileIntroductionJp = "Membro da Academia Trinity e a segunda no comando do Comitê de Justiça.\n\nEla assume o papel de comandante tática do Comitê de Justiça no lugar da presidente Tsurugi, que é o símbolo do caos. Por isso, à primeira vista, ela parece uma aluna exemplar, calma e inteligente — a própria definição de uma aluna de Trinity —, mas ela é um membro legítimo do Comitê de Justiça. Ela é mais calma que qualquer outra pessoa, embora, às vezes, tome atitudes imprudentes."
