26015-ProfileIntroductionJp = "海でも余裕のある姿を崩さぬよう奮闘中のトリニティ総合学園所属、正義実現委員会の一員。\n\nいつもにこやかで親切な、正義実現委員会の模範的なメンバーとして知られる彼女だが、人生最悪の天敵と再会したことで、かつてなく忍耐力を試されている。無自覚ではあるが、いつもより感情が顔に出やすくなっているようだ。"
