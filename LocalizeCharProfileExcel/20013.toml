20013-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、ハッカー集団「ヴェリタス」の副部長。\n\n卓越したプログラミング能力を持つハッカーであり、同時にその能力をなるべく乱用しないようにと心がける常識人。いたずらっ子の多いヴェリタスにおける良心的な存在で、常日頃から部員たちに「正しいハッカー倫理」について熱弁しているものの、いざとなれば現場への潜入なども辞さないアクティブなタイプでもある。"
