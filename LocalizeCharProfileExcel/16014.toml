16014-WeaponDescJp = "A arma que a Ibuki tanto estima.\n\nUm rifle padrão herdado de seus veteranos do \"Pandemonium\", ao qual a Ibuki colou seus adesivos favoritos e adicionou acessórios. Dizem que é um tesouro insubstituível para ela."
16014-ProfileIntroductionJp = "Membro do \"Pandemonium\" da Academia Gehenna e uma garota que atua como mascote.\n\nOriginalmente aluna do departamento primário da Academia Gehenna, suas habilidades foram reconhecidas e ela entrou para o \"Pandemonium\", onde apenas os alunos mais talentosos de Gehenna podem ingressar. Embora seja a mais jovem do \"Pandemonium\", ela é amada por todos devido à sua fofura dedicada. Por isso, ela se esforça todos os dias para ser uma garota exemplar e não causar problemas aos seus veteranos."
