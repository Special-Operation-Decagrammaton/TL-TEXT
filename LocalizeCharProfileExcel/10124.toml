10124-WeaponDescJp = "ハスミのお気に入りのスナイパーライフル。\n\nいつも輝く銃身は、どんな状況でも気を抜かない彼女の心構えが映し出されている。"
10124-ProfileIntroductionJp = "トリニティ総合学園所属、ティーパーティーの護衛としてビーチを訪れた正義実現委員会の副委員長。\n\n公私をはっきり分けるべく、顔にこそ出さないものの、こうして海に来られたことを心から喜んでいる。もしかすると、今回のバカンスを最も満喫しているのは彼女かもしれない。たゆまぬ努力の成果もあって、水着姿でも何も心配はない……はず。"
10124-CharacterSSRNewJp = "わ、私には少し可愛すぎる……でしょうか？"
