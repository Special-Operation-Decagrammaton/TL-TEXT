10124-WeaponDescJp = "O rifle de precisão favorito da Hasumi.\n\nO cano sempre brilhante reflete a determinação dela de nunca baixar a guarda, independentemente da situação."
10124-ProfileIntroductionJp = "Pertencente à Trinity General School, ela é a vice-presidente do Comitê de Justiça que visitou a praia como escolta do Tea Party.\n\nPara separar bem o trabalho da vida pessoal, ela não demonstra no rosto, mas está genuinamente feliz por ter vindo à praia. Talvez ela seja a pessoa que mais está aproveitando estas férias. Graças aos seus esforços incansáveis, não há com o que se preocupar, mesmo usando traje de banho... ou pelo menos é o que deveria ser."
10124-CharacterSSRNewJp = "V-você acha que está fofo demais para mim...?"
