10057-WeaponDescJp = "O rifle de precisão usado por Haruna.\n\nNão importa quanto tempo passe, não há parceiro melhor para sua busca gastronômica do que esta arma."
10057-ProfileIntroductionJp = "Membro da Academia Gehenna, a presidente do Clube de Pesquisa Gastronômica que trocou seu traje por um quimono para receber o Ano Novo.\n\nCom a convicção de que vestir-se de acordo com a estação é parte da exploração gastronômica, ela segue seu caminho vestindo trajes festivos. Apenas pela aparência, ela parece uma jovem extremamente elegante, mas... rezemos para que a comida digna de sua gastronomia seja preparada."
10057-CharacterSSRNewJp = "Os pratos desta época são todos fascinantes...\nFalando em Ano Novo, temos o Osechi, o Zoni, o Oshiruko...\nAh... já estou ficando com fome."
