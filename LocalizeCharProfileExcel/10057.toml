10057-WeaponDescJp = "ハルナが扱うスナイパーライフル。\n\n年が変わろうとも、彼女の美食探究にふさわしいパートナーはこの銃以外にいないだろう。"
10057-ProfileIntroductionJp = "ゲヘナ学園所属、新年を迎え、着物に着替えた美食研究会の会長。\n\n美食において、時節に合った装いをする事も美食探究の一環であるという信念のもと、晴れ着を纏って美食の道を歩む。見た目だけはこの上なく優雅なお嬢さんなのだが……彼女の美食に相応しい食べ物が用意される事を祈ろう。"
10057-CharacterSSRNewJp = "この時期のお料理はどれも魅力的ですね……。\nお正月といえば、おせちやお雑煮、お汁粉……。\nああ……お腹が空いてきましたわ"
