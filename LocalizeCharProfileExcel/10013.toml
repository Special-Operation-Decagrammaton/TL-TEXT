10013-ProfileIntroductionJp = "Membro da Academia Trinity, presidente do Comitê de Justiça e a arma estratégica de Trinity.\n\nPossui uma personalidade beligerante e violenta; é do tipo que destrói primeiro e pensa depois se algo não lhe agrada. Graças à vice-presidente Hasumi, o Comitê de Justiça consegue manter minimamente a ordem. Embora Tsurugi seja uma fera incontrolável, ela também mostra um lado de garota tímida que não consegue esconder o constrangimento na frente do Sensei."
