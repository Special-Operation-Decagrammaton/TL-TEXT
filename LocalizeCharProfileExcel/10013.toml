10013-ProfileIntroductionJp = "トリニティ総合学園所属、正義実現委員会の委員長でありトリニティの戦略兵器。\n\n好戦的で暴力的な性格であり、気に入らないものがあったらとりあえず壊してから考えるタイプ。副委員長であるハスミのお陰で正義実現委員会は辛うじて統制されている。制御不能の狂犬であるツルギだが、先生の前では気恥ずかしさを隠し切れない少女のような一面も見せる。"
