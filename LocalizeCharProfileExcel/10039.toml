10039-ProfileIntroductionJp = "Atiradora de elite (Sniper) do Esquadrão RABBIT, pertencente à Academia Especial SRT.\n\nEla ingressou na SRT após seu grande talento como franco-atiradora ser reconhecido, mas a academia acabou sendo fechada repentinamente. Atualmente, vive acampada em um parque junto com as outras integrantes de seu esquadrão. Sua presença é tão absurdamente fraca e imperceptível que, embora isso seja muito útil para missões de furtividade e tiros de precisão, não é raro que ela seja completamente esquecida não apenas pelos inimigos, mas até mesmo por suas próprias aliadas. Seu call sign é «RABBIT4»."
10039-CharacterSSRNewJp = "A-Aqui é RABBIT4...\nUhm, você... você me chamou agora pouco?"