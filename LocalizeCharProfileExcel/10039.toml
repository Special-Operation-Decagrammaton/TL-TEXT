10039-ProfileIntroductionJp = "Atiradora de elite do Esquadrão RABBIT da Academia Especial SRT.\n\nIngressou na Academia Especial SRT após seu talento inato como atiradora de elite ser descoberto, porém a academia foi repentinamente encerrada. Atualmente, ela vive em um acampamento no parque com as demais membras de seu esquadrão. Sua presença é tão fraca que, embora isso seja extremamente útil para missões de infiltração e franco-atirador, frequentemente até os seus próprios aliados se esquecem da sua existência, sem contar os inimigos. Seu indicativo de chamada (Call Sign) é 'RABBIT 4'." 
