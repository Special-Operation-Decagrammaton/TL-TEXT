10092-WeaponDescJp = "Um fuzil de assalto que Yoshimi carrega consigo o tempo todo.\n\nNormalmente, é usado como uma arma para vencer disputas por doces. O som dos disparos é tão leve e rítmico quanto o som da guitarra que Yoshimi toca."
10092-ProfileIntroductionJp = "Membro do Clube de Doces Depois da Escola da Academia Trinity e guitarrista da banda \"Sugar Rush\", formada às pressas.\n\nEmbora tenha começado a banda levada pelo clima do momento, ela mantém a mentalidade de que \"se é para fazer, que seja bem feito\". Ela também é responsável pela parte visual, como os ícones, símbolos e figurinos da banda."
