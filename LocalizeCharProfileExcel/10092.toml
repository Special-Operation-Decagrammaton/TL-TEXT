10092-WeaponDescJp = "ヨシミが常に持ち歩いているアサルトライフル。\n\n普段はスイーツを巡る争いに勝つための武器として使用されている。ヨシミが演奏するギターの音と同じくらい、軽快な銃声を響かせる代物。"
10092-ProfileIntroductionJp = "トリニティ総合学園所属、放課後スイーツ部の部員であり、急遽結成されたバンド「シュガーラッシュ」のギタリスト。\n\n場の空気に流されバンドを始めることになったが、「やるならきちんと」という心構えを持っている。バンドのアイコンやシンボル、衣装などのビジュアル面も担当している。"
