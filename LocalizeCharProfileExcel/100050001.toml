100050001-WeaponDescJp = "ホシノが愛用しているシンプルなデザインのショットガン。\n\n基本的に怠けたがりの彼女だが、銃の整備だけは絶対に怠らない。"
100050001-ProfileIntroductionJp = "アビドス高等学校所属、アビドス生徒会の生徒会長であり、対策委員会の委員長を務める怠け者の少女。\n\nおじさんのような口癖が特徴で、仕事よりは遊ぶ方が好き。そのため普段は委員会のメンバーに怒られてばかりだが、任務が始まると他のメンバーを守ろうと最前線で奮闘する。\n生徒会長の肩書を受け入れてから、少しずつ明るくなっている。こちらが本来のホシノなのかもしれない。"
100050001-CharacterSSRNewJp = "全然昼寝できてないんだけど、\nまあ、しょうがないか"
