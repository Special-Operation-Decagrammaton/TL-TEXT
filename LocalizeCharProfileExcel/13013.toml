13013-ProfileIntroductionJp = "Uma garota literária da \"Frente de Libertação do Conhecimento\", afiliada à Academia Federal de Red Winter.\n\nDiferente das outras alunas de Red Winter que lutam por pão e lanches, ela luta para colocar mais livros na biblioteca. É uma grande otaku, e a maior parte dos pedidos de compra de livros que ela envia à secretaria é por motivos pessoais. Por causa disso, quase todos os seus pedidos são rejeitados, mas mesmo assim, Momiji continua a enviá-los sem desistir."
