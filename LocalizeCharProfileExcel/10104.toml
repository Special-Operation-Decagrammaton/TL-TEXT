10104-ProfileIntroductionJp = "Gerente da sede da \"Associação Comercial Genbu\" e assistente e guarda-costas de Lumi, na Escola Secundária Shanhaijing.\n\nÉ uma grande entusiasta de Kung Fu e tem o hábito de tentar imitar as citações e ações de um famoso artista marcial em qualquer lugar. Ao contrário de sua aparência fria e calma, ela ocasionalmente demonstra uma paixão ardente."
