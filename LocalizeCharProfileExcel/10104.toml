10104-ProfileIntroductionJp = "山海経高級中学校所属、「玄武商会」本店のマネージャー兼ルミの補佐であり警備員。\n\nかなりのカンフーマニアであり、とある有名な武闘家の語録や行動を、ところ構わず真似しようとする一面がある。クールで冷静に見える外見と裏腹に、時折熱い情熱を見せることもある。"
