10020-ProfileIntroductionJp = "トリニティ総合学園所属、補習授業部の一員。\n\n本来は正義実現委員会の所属だったが成績が落ち、留年の危機に陥ってしまい、強制的に補習授業部へと入れられてしまった。本人は自分のことをエリートだと思っているが、実際には学校の授業に全くついていけないくらい頭が悪い。密かにエッチな雑誌を集めるという趣味（？）を持っており、日常の些細なことから妄想を膨らませては、しょっちゅう一人で恥ずかしがっている。"
