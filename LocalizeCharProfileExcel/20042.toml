20042-ProfileIntroductionJp = "寒い冬にあわせて暖かい格好に着替えたヴェリタスのメンバー。\n\n突如始まった山登りに乗り気ではなかったものの、新しい風景からインスピレーションを得たことでそれなりに楽しんでいる模様。ただ、それらをネットに共有できないことは残念に思っているのだとか。"
