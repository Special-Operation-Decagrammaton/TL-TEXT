10055-ProfileIntroductionJp = "レッドウィンター連邦学園所属、ただし停学処分を受けて現在は旧校舎227号特別クラスで謹慎中の生徒。\n\n停学の理由は「配給用カンポット」に密かにアルコールを混ぜた行為とのこと。227号特別クラスのノドカとは幼馴染で、噂によるとノドカが懲戒処分で特別クラス行きになったため、わざと事故を起こしたのだとか。事件の真相とは関係なく、自分で仕込んだカンポットが大好きで、ポケットウイスキーの瓶に入れていつも持ち歩いている。"
