10055-ProfileIntroductionJp = "Aluna da Academia Federal Red Winter, atualmente cumprindo suspensão na Classe Especial 227 do antigo prédio escolar.\n\nO motivo da suspensão foi ter misturado álcool secretamente na \"compota de ração\". Ela é amiga de infância de Nodoka, da Classe Especial 227, e há rumores de que ela causou o incidente de propósito porque Nodoka foi enviada para a classe especial após uma ação disciplinar. Independentemente da verdade sobre o incidente, ela adora a compota que ela mesma prepara e sempre a carrega em um frasco de uísque de bolso."
10055-CharacterSSRNewJp = "Precisa de algo para se aquecer?\nFufu... Deixe comigo."
