16016-WeaponDescJp = "ミネが愛用しているショットガン。\n\nアイドル活動が救護騎士団としての活動の延長線上にあるように、この銃もまた、アイドルのアクセサリーなのかもしれない。"
16016-ProfileIntroductionJp = "トリニティ総合学園所属、救護騎士団の団長であり、アイドルユニット「アンティーク・セラフィム」のメンバー。\n\n「親しみやすい救護騎士団長」になりたいという想いから、アイドルイベントに志願した。アイドル衣装に着替えても真面目で頑固な性格は変わらないが、可愛いもの好きである自分に少しだけ素直になった模様。"
