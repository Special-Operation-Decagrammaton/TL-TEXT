16016-ProfileIntroductionJp = "Pertencente à Trinity, ela é a líder da Brigada de Socorro e membro da unidade de idols \"Antique Seraphim\".\n\nCom o desejo de se tornar uma \"líder da Brigada de Socorro acessível\", ela se voluntariou para eventos de idol. Mesmo vestindo trajes de idol, sua personalidade séria e teimosa não mudou, mas parece que ela se tornou um pouco mais honesta sobre seu gosto por coisas fofas."
