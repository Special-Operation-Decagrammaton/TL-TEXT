16009-WeaponNameJp = "ミチル流オーバーフロー\nショットガン"
16009-WeaponDescJp = "ミチルが愛用しているショットガン。\n\n彼女自作の忍術に用いるため、特殊な弾丸が撃てるように様々な改造がされたり追加パーツが付けられている。かえって使いにくそうな気もするものの、ミチル曰く「それもまた味があって良いんだよ！」とのこと。"
16009-ProfileIntroductionJp = "百鬼夜行連合学院所属、基本的にいつも根拠のない自信に満ち溢れている忍術研究部の部長。\n\n映画もアニメもグッズも嗜む忍者オタクで、それが高じて「忍術研究部」を設立し、動画チャンネル「少女忍法帖ミチルっち」を立ち上げて動画投稿もするようになった。キヴォトス全域に忍者の良さを知ってもらうため、彼女は今日も忍術研究部の部員たちと共にあちこちを駆け回っている。"
