16009-StatusMessageJp = "「少女忍法帖ミチルっち」チャンネル登録よろしく！"
16009-FullNameJp = "千鳥ミチル"
16009-FamilyNameJp = "千鳥"
16009-PersonalNameJp = "ミチル"
16009-SchoolYearJp = "3年生"
