[translation]
16009-StatusMessageJp = "Não se esqueça de se inscrever no canal \"Crônicas Ninja da Michiru-chi\"!"
16009-FullNameJp = "Chidori Michiru"
16009-FamilyNameJp = "Chidori"
16009-PersonalNameJp = "Michiru"
16009-SchoolYearJp = "3º ano"
16009-CharacterAgeJp = "17 anos"
16009-BirthdayJp = "22 de fevereiro"
16009-HobbyJp = "Criar novos ninjutsus, produzir vídeos"
16009-WeaponNameJp = "Escopeta de Fluxo Transbordante Estilo Michiru"
16009-WeaponDescJp = "A escopeta favorita da Michiru.\n\nPara ser usada nos ninjutsus que ela mesma criou, a arma passou por várias modificações e recebeu peças adicionais para disparar munições especiais. Embora pareça difícil de manusear, Michiru insiste que \"isso também tem seu charme!\"."
16009-ProfileIntroductionJp = "Pertencente à Academia de Artes Híbridas Hyakkiyako, ela é a presidente do Clube de Pesquisa de Ninjutsu, sempre transbordando uma confiança sem fundamento.\n\nUma otaku ninja que aprecia filmes, animes e colecionáveis, o que a levou a fundar o \"Clube de Pesquisa de Ninjutsu\" e a criar o canal de vídeos \"Crônicas Ninja da Michiru-chi\". Para que todos em Kivotos conheçam as maravilhas dos ninjas, ela corre para todos os lados hoje também, junto com os membros do seu clube."
