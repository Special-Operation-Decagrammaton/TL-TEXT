26008-ProfileIntroductionJp = "百鬼夜行連合学院所属、夏でも変わらず野心に満ちたお祭り運営委員会の委員長。\n\n百夜堂をキヴォトスいちのフランチャイズに成長させるべく、今日も情熱を燃やしている。 どんな障害もアイドルパンチと一緒なら問題ない。手が届くものなら何でも掴み取る、夏の少女は無敵なのだ。"
