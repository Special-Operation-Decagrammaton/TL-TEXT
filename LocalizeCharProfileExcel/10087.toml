10087-WeaponDescJp = "アコが携帯している拳銃。\n\n行政官としての能力を証明するもの。アコがいつも大切に扱っている銃であると同時に、今はゲヘナの特別なエージェントの秘密兵器として活躍している……という設定が増えている。"
10087-ProfileIntroductionJp = "ゲヘナ学園所属、風紀委員会の行政官であり、風紀委員長ヒナにとって秘書のような存在。\n\nゲヘナのパーティーでもヒナを補佐すべく、ドレスを着ることになった。日頃から丁寧な仕事ぶりで多くの風紀委員から尊敬されている。今回は完璧なエージェントとして活躍する予定である……とアコは自信満々に語っている。"
10087-CharacterSSRNewJp = "今回のミッションに隙なんてありませんとも"
