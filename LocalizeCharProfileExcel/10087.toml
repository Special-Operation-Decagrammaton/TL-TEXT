10087-WeaponDescJp = "A pistola que Ako carrega consigo.\n\nEla serve como prova de sua capacidade como oficial administrativa. É uma arma que Ako sempre trata com muito cuidado e, ao mesmo tempo, tem ganhado a reputação de ser a arma secreta de uma agente especial de Gehenna... ou pelo menos, é isso que ela tem espalhado por aí."
10087-ProfileIntroductionJp = "Pertencente ao Colégio Gehenna, ela é a oficial administrativa do Comitê Disciplinar e atua como uma secretária para a presidente Hina.\n\nPara auxiliar Hina na festa de Gehenna, ela decidiu vestir um traje de gala. Graças ao seu trabalho diligente e constante, ela é respeitada por muitos membros do Comitê Disciplinar. Desta vez, ela planeja atuar como uma agente perfeita... ou é o que Ako afirma com total confiança."
10087-CharacterSSRNewJp = "Não há brechas nesta missão, pode ter certeza."
