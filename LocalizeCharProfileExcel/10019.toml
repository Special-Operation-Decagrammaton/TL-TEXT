10019-WeaponDescJp = "A arma que Azusa mantém sempre firme consigo.\n\nNo cano da arma está gravada a frase: \"Tudo é vaidade. Não importa o quão longe você vá, tudo é apenas vaidade\"."
10019-ProfileIntroductionJp = "Membro da Escola Particular Trinity e a Bruxa de Gelo do Clube de Estudos Suplementares.\n\nOriginalmente, ela havia abandonado outra escola, mas devido a certas circunstâncias, acabou se transferindo para Trinity e está se dedicando aos estudos novamente. No fundo, ela é uma pessoa solitária, mas por medo de incomodar os outros, mantém distância voluntariamente, o que preocupa as outras alunas do Clube de Estudos Suplementares."
10019-CharacterSSRNewJp = "Todas as coisas são vãs, e a vida não tem sentido.\nMas, eu quero acreditar... nas suas palavras."
