13005-WeaponDescJp = "A pistola que Kayoko carrega consigo habitualmente.\n\nComo o nome sugere, ela emite um estrondo considerável a cada disparo se usada normalmente, por isso, ela geralmente a utiliza com um silenciador acoplado."
13005-ProfileIntroductionJp = "Membro da Academia Gehenna e chefe da Problem Solver 68.\n\nApesar de não ter más intenções, ao contrário dos outros membros da Problem Solver 68, ela é frequentemente confundida com uma delinquente apenas por causa de sua expressão facial intimidadora. Kayoko mantém o silêncio diante desses mal-entendidos, o que acaba criando um ciclo vicioso que reforça ainda mais a imagem de pessoa assustadora."
