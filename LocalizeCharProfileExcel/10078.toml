10078-WeaponDescJp = "A pistola que Kasumi carrega consigo.\n\nNormalmente, ela a usa para disparar para o alto e animar o ambiente. Apesar de sua aparência pequena e adorável, seu poder de fogo real é impecável."
10078-ProfileIntroductionJp = "Membro da Academia Gehenna e chefe do Departamento de Desenvolvimento de Fontes Termais.\n\nEla defende que qualquer terreno com uma fonte de água deve ser transformado em uma fonte termal e, uma vez decidido, não mede esforços para explodir o local, não importa onde seja. Embora conte com o apoio total de seus membros, suas palavras e ações a tornam uma criminosa procurada."
