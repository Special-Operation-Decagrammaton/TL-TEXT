10078-WeaponDescJp = "カスミが持ち歩いている拳銃。\n\n普段は場を盛り上げるために空に向けて発砲することが多い。小さくて可愛らしい見た目とは裏腹に、実際の火力も申し分ない。"
10078-ProfileIntroductionJp = "ゲヘナ学園所属、温泉開発部の部長。\n\n源泉が流れる土地は全て温泉にしなければならないと主張し、一度決めたらどこであろうと手段を選ばず爆破してしまう。部員からは全面的な支持を得ているが、実際の言動や行動は指名手配中の犯罪者である。"
10078-CharacterSSRNewJp = "温泉開発の定義なんて、話したことあっただろうか？"
