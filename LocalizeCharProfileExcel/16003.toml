16003-ProfileIntroductionJp = "トリニティ総合学園所属、生徒たちの安全を守る自警団のメンバー。\n\nトリニティの生徒が他の学園に襲われる事件が頻繁に発生したため、これらを防ぐために街中の巡回を始めた。燃え上がる正義感のせいで冷たい性格だと誤解されがちだが、本当は優しい女の子。"
