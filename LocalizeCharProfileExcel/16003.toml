16003-WeaponDescJp = "O fuzil de assalto que Suzumi carrega.\n\nPara Suzumi, que frequentemente patrulha a cidade sozinha, ele é, de certa forma, como um parceiro."
16003-ProfileIntroductionJp = "Membro do comitê de vigilância da Academia Trinity, responsável por proteger a segurança dos alunos.\n\nComo incidentes de alunos da Trinity sendo atacados por outras academias começaram a ocorrer com frequência, ela começou a patrulhar a cidade para evitá-los. Devido ao seu senso de justiça ardente, ela é frequentemente mal interpretada como alguém de personalidade fria, mas, na verdade, é uma garota gentil."
