26012-ProfileIntroductionJp = "A aluna de sangue quente do Departamento de Segurança Pública, pertencente à Escola de Polícia Valkyrie, enviada como salva-vidas.\n\nEmbora sua motivação seja inquestionável, infelizmente as suas habilidades não parecem acompanhá-la. No entanto, ela não se deixa abater e está enfrentando a sua missão de salva-vidas com todas as suas forças."