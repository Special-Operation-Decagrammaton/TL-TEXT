10063-WeaponDescJp = "コユキと共にあらゆる苦難を乗り越えてきたマシンガン。\n\n一度修理に出した際に色を変えた。些細なことを気にしないコユキに似て頑丈な銃だ。"
10063-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、生徒会「セミナー」のトラブルメーカーな天才少女。\n\n数学的な暗号の解読に関して、天賦の才を持っているが、本人にはその自覚が全くない。また、自分では制御できない運が絡む要素が好きで、様々な方法で自分の運を試している。苦難にあっても諦めない。"
10063-CharacterSSRNewJp = "思い通りにいかない時こそ、\n人生は面白くなるんですよ！"
