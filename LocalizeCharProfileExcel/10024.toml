10024-ProfileIntroductionJp = "アビドス高等学校所属、ライディング用の本格的な格好に着替えた、アビドス対策委員会の切り込み隊長。\n\nいつもの制服を脱ぎ、気合を入れてサイクルジャージへと着替えた彼女は、心なしか普段より晴れやかな顔をしている。「キヴォトス縦断」というとんでもない目標を口にした彼女だったが、頼れるパートナーがいるからか、どうやら本人には不安も心配も無い様子。"
