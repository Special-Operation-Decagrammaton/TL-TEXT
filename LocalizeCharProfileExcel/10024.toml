10024-WeaponDescJp = "O fuzil de assalto favorito da Shiroko.\n\nEle foi cuidadosamente mantido e passou por várias modificações para suportar viagens de longa distância ao ar livre."
10024-ProfileIntroductionJp = "Pertencente à Escola Secundária Abydos, ela é a líder de ataque do Comitê de Contramedidas de Abydos, vestida com trajes profissionais para ciclismo.\n\nTendo deixado de lado seu uniforme habitual e vestindo sua roupa de ciclista com entusiasmo, ela parece estar com uma expressão mais radiante do que o normal. Embora tenha mencionado o objetivo absurdo de \"atravessar Kivotos\", parece que ela não tem qualquer preocupação ou medo, talvez por ter um parceiro de confiança ao seu lado."
10024-CharacterSSRNewJp = "Certo, Sensei. Entrarei em contato assim que eu chegar."
