10139-ProfileIntroductionJp = "SRT特殊学園所属、FOX小隊の副小隊長。コールサイン「FOX2」。\n\n優しく穏やかな性格で、誰とでもすぐに打ち解けられる。そのため、SRT学園では小隊を越えて彼女を頼る後輩が多い。潜入や偽装工作が得意で、小隊の管理運営を兼任している。\n\n特技はいなり寿司を作ること。小隊員の弁当としてよく作っているが、非常に味が良いのでSRT学園内でも好評を得ている。"
