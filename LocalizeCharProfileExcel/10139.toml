10139-WeaponDescJp = "Стандартный дробовик, выданный Особой академией SRT.\n\nЭта помповая модель демонстрирует превосходную эффективность при операциях по прорыву укреплений."
10139-ProfileIntroductionJp = "Студентка Особой академии SRT и заместитель командира взвода FOX. Позывной — «FOX2».\n\nУ неё добрый и мягкий характер, что позволяет ей сразу ладить с кем угодно. Из-за этого на неё полагаются многие младшеклассники по всей академии SRT. Она сильна в операциях по проникновению и маскировке, а также берёт на себя административное управление взводом.\n\nЕё визитная карточка — приготовление инари-суши. Она часто готовит их на обед для членов своего отряда, и они настолько вкусные, что завоевали популярность во всей академии SRT."
10139-CharacterSSRNewJp = "FOX2, подготовка припасов завершена."