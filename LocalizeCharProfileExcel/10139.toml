10139-ProfileIntroductionJp = "Membro da Academia SRT, vice-líder do Esquadrão FOX. Codinome \"FOX2\".\n\nPossui uma personalidade gentil e calma, conseguindo se dar bem com qualquer pessoa rapidamente. Por isso, muitos alunos mais novos na Academia SRT recorrem a ela, independentemente do esquadrão. É especialista em infiltração e operações de disfarce, além de ser responsável pela gestão e administração do esquadrão.\n\nSua especialidade é fazer Inari-zushi. Ela costuma preparar marmitas para os membros do esquadrão, e como o sabor é excelente, o prato é muito popular dentro da Academia SRT."
10139-CharacterSSRNewJp = "FOX2, os preparativos para o suprimento estão prontos."
