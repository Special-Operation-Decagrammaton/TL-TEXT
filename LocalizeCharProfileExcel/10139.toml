10139-WeaponDescJp = "Escopeta padrão fornecida pela Academia Especial SRT.\n\nCom sistema pump-action, ela apresenta um excelente desempenho em táticas de arrombamento (breaching)."
10139-ProfileIntroductionJp = "Aluna da Academia Especial SRT e Subcapitã do Esquadrão FOX. Callsign: FOX2.\n\nCom uma personalidade gentil e tranquila, ela faz amizade rápido com qualquer pessoa. Por conta disso, várias alunas mais novas da SRT, até mesmo de outros esquadrões, vivem pedindo a ajuda dela. É especialista em infiltração e disfarces, além de cuidar de toda a parte administrativa do esquadrão.\n\nSua maior especialidade é preparar inarizushi. Ela vive fazendo esse prato para as marmitas das meninas do esquadrão, e o tempero é tão bom que a receita ganhou uma fama incrível por toda a SRT."
10139-CharacterSSRNewJp = "FOX2 na escuta. Os suprimentos já estão preparados."