10139-ProfileIntroductionJp = "A member of SRT Special Academy and the vice-leader of FOX Platoon. Call sign 'FOX2'.\n\nShe has a kind and gentle personality, allowing her to get along with anyone immediately. Because of this, many underclassmen across SRT Academy rely on her. She excels at infiltration and camouflage operations, and also handles the platoon's administrative management.\n\nHer specialty is making Inari sushi. She often makes it for her platoon members' lunches, and it is so delicious that it has gained popularity throughout SRT Academy."
