20036-WeaponDescJp = "O fuzil de assalto de Serika, que ela carrega consigo mesmo durante as férias no resort.\n\nMesmo estando de folga, ela não baixa a guarda. Pelo contrário, ela mantém a melhor condição possível para aproveitar suas férias ao máximo."
20036-ProfileIntroductionJp = "Membro do Comitê de Contramedidas de Abydos e responsável pelas finanças, que visitou o resort para aproveitar as melhores férias possíveis.\n\nSem se deixar abater por falhas recorrentes, ela tenta levar as férias tão a sério quanto seus trabalhos de meio período. À primeira vista, parece até que ela está sendo perseguida por algo, mas ela está apenas aproveitando um tempo divertido com o pessoal do Comitê de Contramedidas."
20036-CharacterSSRNewJp = "Essas férias! Eu vou aproveitar cada segundo, pode apostar!"
