20036-WeaponDescJp = "休暇で訪れたリゾートでも欠かさずに携帯するセリカのアサルトライフル。\n\n休暇中であっても気が緩むことはない。むしろ、最高に充実した休暇を楽しむべく、最上のコンディションを維持している。"
20036-ProfileIntroductionJp = "最高の休暇を楽しむべくリゾートを訪れた、アビドス高等学校所属、アビドス対策委員会の会計担当。\n\n度重なる失敗にも屈する事なく、休暇に対してもアルバイトと同じくらい真剣に向き合おうとしている。一見、何かに追われているようにさえ見えるが、対策委員会の皆と楽しい時間を過ごしている。"
20036-CharacterSSRNewJp = "この休暇！必ず楽しんでみせるんだから！"
