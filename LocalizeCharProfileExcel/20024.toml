20024-WeaponDescJp = "A pistola favorita de Nagisa.\n\nDevido ao seu design clássico, ela se harmoniza com a festa do chá sem chamar atenção. É frequentemente usada para afastar convidados indesejados que possam comprometer a dignidade da festa."
20024-ProfileIntroductionJp = "Membro da Trinity General School, líder da união de estudantes \"Filius\" que compõe a Trinity, e anfitriã do conselho estudantil \"Tea Party\".\n\nEmbora use uma linguagem calma e gentil, ela raramente revela seus verdadeiros sentimentos, sendo descrita como uma pessoa difícil e cheia de mistérios. Seus hobbies incluem preparar folhas de chá e doces para as festas do chá. Muitas alunas da Trinity sonham com o dia em que serão convidadas para uma de suas festas."
20024-CharacterSSRNewJp = "……Saudações.\nRepresentando a Trinity, gostaria de lhe dar as boas-vindas."
