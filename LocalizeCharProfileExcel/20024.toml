20024-WeaponDescJp = "ナギサが愛用する拳銃。\n\nクラシカルなデザインのため、お茶会でも目立つことなく調和している。お茶会の品位を落とすような招かざる客を追い払う用途としてよく使われている。"
20024-ProfileIntroductionJp = "トリニティ総合学園所属、トリニティを構成している生徒連合「フィリウス」のリーダーであり、生徒会「ティーパーティー」のホスト。\n\n穏やかで優しい言葉遣いだが、本音をほとんど明かさないため、気難しく謎の多い人物と評されている。趣味はお茶会に使う茶葉やお茶菓子を用意すること。多くのトリニティ生が彼女のお茶会に招待される日を夢見ている。"
20024-CharacterSSRNewJp = "……ごきげんよう。\nトリニティを代表してご挨拶申し上げます"
