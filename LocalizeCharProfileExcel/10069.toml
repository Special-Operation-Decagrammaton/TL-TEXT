10069-WeaponDescJp = "A submetralhadora favorita da Rumi.\n\nO nome significa \"estudar o passado para aprender o novo\", mas parece que ela está mais interessada na parte das \"novidades\"."
10069-ProfileIntroductionJp = "Presidente da Associação Genbu, o distrito gastronômico da Academia Shanhaijing.\n\nEla possui uma capacidade de gestão excepcional, tendo transformado a Associação Genbu, que antes era apenas um distrito comercial comum, em um dos principais polos gastronômicos de Kivotos. Embora seja vista como um incômodo pelo conselho estudantil de Shanhaijing, que teme o crescimento de sua influência, Rumi parece não ter interesse em nada além de expandir sua associação."
