10069-ProfileIntroductionJp = "山海経高級中学校所属、グルメ街「玄武商会」の会長。\n\n平凡な商店街だった玄武商会をキヴォトス屈指のグルメ街へと成長させた卓越した運営能力を持つ。独自勢力の成長を警戒する山海経の生徒会からは目の敵にされているが、ルミ本人は商会を発展させる以外のことには興味がない模様。"
