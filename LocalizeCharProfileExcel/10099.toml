10099-WeaponDescJp = "Uma combinação da espingarda favorita da Hoshino com uma pistola que ela guardou com muito cuidado.\n\nÉ a sua arma secreta, usada quando ela muda seu estilo de combate habitual para uma postura ofensiva."
10099-ProfileIntroductionJp = "Uma garota preguiçosa que pertence à Escola Secundária Abydos, ex-vice-presidente do conselho estudantil e atual presidente do Comitê de Contramedidas.\n\nEla equipou o armamento que mantinha guardado, adotando um estilo mais voltado para o combate. Fora isso, ela continua sendo a mesma Hoshino de sempre, mas, ao entrar em seu estado armado, é possível vislumbrar um olhar sério em seu rosto."
10099-CharacterSSRNewJp = "Tio aqui vai levar as coisas um pouco a sério.\nUhe~, isso é um pouco vergonhoso, na verdade."
