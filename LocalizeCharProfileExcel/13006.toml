13006-ProfileIntroductionJp = "Membro da Academia Gehenna e a pessoa de ação da Problem Solver 68.\n\nAo contrário de Aru, que costuma se preocupar com sentimentos de culpa, ela comete maldades sem hesitar e é como uma pequena diabinha que adora confusão. Como é amiga de infância de Aru, ela entende os blefes dela melhor do que ninguém, mas não é como se ela fosse pegar leve por causa disso."
