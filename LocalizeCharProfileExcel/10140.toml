10140-WeaponDescJp = "Submetralhadora de serviço fornecida pela Academia Especial SRT.\n\nLeve e altamente estável, projetada para ser operada com precisão em conjunto com um escudo balístico. Possui uma capacidade de supressão de ruído superior à de outras submetralhadoras, tornando-a ideal para infiltrações e abates sorrateiros nas sombras."
10140-ProfileIntroductionJp = "Batedora de vanguarda (Pointman) do Esquadrão FOX, da Academia Especial SRT. Call sign: «FOX3».\n\nPossui capacidades físicas excepcionais e alta adaptabilidade em campo, operando como a ponta de lança da equipe focada puramente em combate. Tem um temperamento explosivo e uma personalidade extremamente direta e franca. No entanto, é exatamente essa intensidade emocional implacável que já garantiu a sobrevivência e o sucesso do esquadrão em incontáveis operações táticas difíceis.\n\nEmbora tente disfarçar e quase nunca fale sobre o assunto, ela guarda um forte complexo de inferioridade em relação à própria figura corporal."
10140-CharacterSSRNewJp = "É melhor não ficar secando o meu escudo, senão o clarão vai te deixar cego!"