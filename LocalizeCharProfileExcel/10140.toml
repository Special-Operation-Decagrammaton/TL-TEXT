10140-WeaponDescJp = "A standard-issue submachine gun provided by SRT Academy.\n\nIt is lightweight and highly stable, allowing for use in conjunction with a shield. Because it is quieter than other submachine guns, it is also well-suited for covertly neutralizing enemies."
10140-ProfileIntroductionJp = "A point man for FOX Platoon at SRT Academy. Call sign: \"FOX3\".\n\nPossesses excellent physical abilities and high adaptability in the field. A point man specialized for combat. She is prone to intense emotional swings and has a straightforward personality, but that has helped her overcome countless operations.\n\nThough she rarely speaks of it, she has a complex about her physique."
10140-CharacterSSRNewJp = "It's going to be blinding, so you'd better not look at my shield!"