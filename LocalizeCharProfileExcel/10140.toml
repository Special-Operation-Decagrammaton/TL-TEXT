10140-WeaponDescJp = "Submetralhadora padrão fornecida pela Academia Especial SRT.\n\nLeve e com alta estabilidade, pode ser empunhada em conjunto com um escudo.\nPor ter um silenciador muito mais eficiente do que o de outras submetralhadoras, ela também é perfeita para neutralizar inimigos de forma furtiva."
10140-ProfileIntroductionJp = "Aluna da Academia Especial SRT e Batedora (Pointman) do Esquadrão FOX. Callsign: FOX3.\n\nDona de um preparo físico excelente e uma alta capacidade de adaptação em campo, é uma batedora totalmente focada em combate. Tem um temperamento bem forte e sempre fala o que pensa, mas essa mesma impulsividade já foi a chave para o sucesso de inúmeras missões difíceis.\n\nEmbora não fale muito sobre o assunto, ela tem um certo complexo com o próprio corpo."
10140-CharacterSSRNewJp = "É melhor não olhar direto pro meu escudo, senão o brilho vai te cegar!"