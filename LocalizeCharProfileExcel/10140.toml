10140-WeaponDescJp = "Submetralhadora de serviço fornecida pela Academia Especial SRT.\n\nLeve e altamente estável, projetada para ser operada\ncom precisão em conjunto com um escudo balístico.\nPossui uma capacidade de supressão de ruído superior\nà de outras submetralhadoras, tornando-a ideal para\ninfiltrações e abates sorrateiros nas sombras." 
10140-ProfileIntroductionJp = "Batedora de vanguarda (Pointman) do Esquadrão FOX,\nda Academia Especial SRT. Call sign: «FOX3».\n\nPossui capacidades físicas excepcionais e alta\nadaptabilidade em campo, operando como a ponta de\nlança da equipe focada puramente em combate.\nTem um temperamento explosivo e uma personalidade\nextremamente direta e franca. No entanto, é exatamente\nessa intensidade emocional implacável que já garantiu a\nsobrevivência e o sucesso do esquadrão em incontáveis\noperações táticas difíceis.\n\nEmbora tente disfarçar e quase nunca fale sobre o assunto,\nela guarda um forte complexo de inferioridade em\nrelação à própria figura corporal." 
10140-CharacterSSRNewJp = "É melhor não ficar secando o meu escudo,\nsenão o clarão vai te deixar cego!" 