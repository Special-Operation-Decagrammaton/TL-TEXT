10140-WeaponDescJp = "SRT特殊学園から支給された制式短機関銃。\n\n軽量で高い安定性を持ち、盾との併用が可能。\n他のサブマシンガンと比べて消音性が高いため、裏で敵を処理するのにも適している。"
10140-ProfileIntroductionJp = "SRT特殊学園所属、FOX小隊のポイントマン。コールサイン「FOX3」。\n\n優れた身体能力を持ち、現場対応力が高い。戦闘に特化したポイントマン。感情の起伏が激しく、真っ直ぐな性格だが、それが功を奏して作戦を乗り越えられたことは数しれず。\n\nあまり口にしていないが、自身の体型にコンプレックスを抱えている。"
