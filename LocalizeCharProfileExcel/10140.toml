10140-ProfileIntroductionJp = "Membro da Academia SRT, ponto de lança do Esquadrão FOX. Codinome \"FOX3\".\n\nPossui excelente capacidade física e grande adaptabilidade em campo. Uma ponto de lança especializada em combate. Tem oscilações emocionais intensas e uma personalidade direta, mas isso já a ajudou a superar inúmeras operações.\n\nEmbora não comente muito, ela tem um complexo com o próprio físico."
