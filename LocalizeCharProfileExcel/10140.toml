10140-WeaponDescJp = "Стандартный пистолет-пулемёт, выданный академией SRT.\n\nОн лёгкий и крайне стабильный, что позволяет использовать его в сочетании со щитом. Поскольку он тише других пистолетов-пулемётов, он также отлично подходит для скрытной нейтрализации врагов."
10140-ProfileIntroductionJp = "Поинтмен отряда FOX в академии SRT. Позывной — «FOX3».\n\nОбладает превосходными физическими данными и высокой адаптируемостью на поле боя. Поинтмен, специализирующийся исключительно на боевых действиях. Она склонна к резким перепадам настроения и обладает прямолинейным характером, но именно это помогало ей справляться с бесчисленными операциями.\n\nХотя она редко говорит об этом, у неё есть комплекс по поводу своего телосложения."
10140-CharacterSSRNewJp = "Сейчас знатно бабахнет вспышкой, так что лучше не смотри на мой щит!"