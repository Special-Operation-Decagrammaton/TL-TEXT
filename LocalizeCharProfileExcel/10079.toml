10079-ProfileIntroductionJp = "Uma estudante do ensino fundamental que frequenta a Escola Secundária Tokiwadai.\n\nDentro da \"Cidade Acadêmica\", onde existem muitos superpoderosos, ela é uma das sete pessoas que possuem o nível mais alto de habilidade, o \"Nível 5\". O superpoder que ela utiliza é o \"Electromaster\", que permite manipular livremente eletricidade poderosa. No entanto, desde que foi transferida para Kivotos, parece que ela não consegue usar suas habilidades como gostaria. Ela trata todos com uma linguagem franca e, por ter um coração gentil, é muito querida pelos outros alunos. É fã do personagem sapo, \"Gekota\"."
10079-CharacterSSRNewJp = "Francamente... parece que as coisas não mudam, mesmo aqui."
