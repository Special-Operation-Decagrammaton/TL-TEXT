10079-ProfileIntroductionJp = "常盤台中学所属の女子中学生。\n\n多くの超能力者が存在する「学園都市」の中で7人しか存在しないトップクラスの超能力者「レベル5」の一人。使用する超能力は、強力な電気を自在に操る「電撃使い（エレクトロマスター）」。しかし、キヴォトスに転移してからは能力を思いのまま発揮できていない様子。誰にでもフランクな言葉遣いで接し、優しい心の持ち主のため他の生徒からは親しまれている。カエルのキャラクター、「ゲコ太」のファン。"
