16020-WeaponDescJp = "Fuzil de precisão de serviço fornecido pela Academia Especial SRT.\n\nCom seu alto poder de penetração, é capaz de atingir\nalvos escondidos atrás de coberturas. Além disso,\na altíssima velocidade de seus projéteis permite disparos de precisão\nem distâncias extremas. O único defeito é ser uma arma incrivelmente pesada,\no que faz Otogi viver reclamando de dores e tensão muscular nos ombros." 
16020-ProfileIntroductionJp = "Atiradora de Elite (Sniper) do Esquadrão FOX,\npertencente à Academia Especial SRT. Call sign: «FOX4».\n\nSendo uma rara exceção em um meio onde atiradores costumam\nser lobos solitários, ela consegue se enturmar facilmente\ne quebrar o gelo com qualquer pessoa logo no primeiro encontro.\nEla atua como o principal pilar de ânimo e descontração dentro do esquadrão.\nNo campo de batalha, ela também cumpre a importante função\nde abater a moral e o psicológico das tropas inimigas.\n\nPossui grande habilidade com aparelhos eletrônicos, sendo perfeitamente\ncapaz de consertar e realizar manutenção em equipamentos\nde infraestrutura geral sem grandes dificuldades." 