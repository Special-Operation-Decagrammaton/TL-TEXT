16020-WeaponDescJp = "Fuzil de precisão de serviço fornecido pela Academia Especial SRT.\n\nCom seu alto poder de penetração, é capaz de atingir alvos escondidos atrás de coberturas. Além disso, a altíssima velocidade de seus projéteis permite disparos de precisão em distâncias extremas. O único defeito é ser uma arma incrivelmente pesada, o que faz Otogi viver reclamando de dores e tensão muscular nos ombros."
16020-ProfileIntroductionJp = "Atiradora de Elite (Sniper) do Esquadrão FOX, pertencente à Academia Especial SRT. Call sign: «FOX4».\n\nSendo uma rara exceção em um meio onde atiradores costumam ser lobos solitários, ela consegue se enturmar facilmente e quebrar o gelo com qualquer pessoa logo no primeiro encontro. Ela atua como o principal pilar de ânimo e descontração dentro do esquadrão.\nNo campo de batalha, ela também cumpre a importante função de abater a moral e o psicológico das tropas inimigas.\n\nPossui grande habilidade com aparelhos eletrônicos, sendo perfeitamente capaz de consertar e realizar manutenção em equipamentos de infraestrutura geral sem grandes dificuldades."