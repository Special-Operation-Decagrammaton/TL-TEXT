16020-WeaponDescJp = "Fuzil de precisão padrão fornecido pela Academia Especial SRT.\n\nCom seu alto poder de perfuração, é capaz de abater alvos escondidos atrás de coberturas. Além disso, a altíssima velocidade dos projéteis permite realizar disparos a distâncias extremas. O único problema é que a arma é absurdamente pesada, e por isso a Otogi vive reclamando de dor nos ombros."
16020-ProfileIntroductionJp = "Aluna da Academia Especial SRT e Atiradora de Elite (Sniper) do Esquadrão FOX. Callsign: FOX4.\n\nDiferente da maioria dos franco-atiradores, que preferem agir como \"lobos solitários\", a Otogi é uma raridade que consegue fazer amizade logo de cara até com quem acabou de conhecer. É ela quem dita o clima animado do esquadrão.\nNo campo de batalha, ela também cumpre o papel tático de destruir o moral dos inimigos.\n\nEla manja muito de eletrônicos e dizem que consegue consertar qualquer equipamento padrão sem a menor dificuldade."
