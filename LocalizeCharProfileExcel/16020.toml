16020-WeaponDescJp = "Стандартная снайперская винтовка, выданный Особой академией SRT.\n\nВысокая пробивная способность позволяет ей поражать цели, прячущиеся за укрытиями. Благодаря высокой начальной скорости пули она также способна вести огонь на сверхдальние дистанции. Однако у неё есть существенный недостаток — она чрезвычайно тяжёлая, из-за чего Отоги, судя по всему, часто страдает от боли и напряжения в плечах."
16020-ProfileIntroductionJp = "Снайпер взвода FOX, принадлежащая к Особой академии SRT. Позывной — «FOX4».\n\nСреди снайперов, которые зачастую являются волками-одиночками, она — редкое исключение, способное быстро ладить с едва знакомыми людьми. Отоги выступает главным создателем настроения в своём взводе.\nНа поле боя она также выполняет задачу по подавлению боевого духа противника.\n\nОна умело обращается с электронными устройствами и, как говорят, способна самостоятельно чинить стандартное снаряжение."