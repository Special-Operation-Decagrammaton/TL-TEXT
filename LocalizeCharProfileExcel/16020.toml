16020-WeaponDescJp = "SRT特殊学園から支給された制式スナイパーライフル。\n\n高い貫通力で遮蔽物に隠れた相手を狙撃できる。また、弾速の速さを活かした超長距離の狙撃も可能。しかし非常に重いという欠点があり、オトギは肩凝りに悩まされているとか。"
16020-ProfileIntroductionJp = "SRT特殊学園所属、FOX小隊のスナイパー。コールサイン「FOX4」。\n\n一匹狼が多いスナイパーの中で、初対面ともすぐに打ち解けられる稀有な存在。小隊ではムードメーカー的なポジション。\n戦場では敵士気を下げる役割も果たしている。\n\n電子機器の扱いが得意で、一般的な設備程度であれば修理もできるのだとか。"
