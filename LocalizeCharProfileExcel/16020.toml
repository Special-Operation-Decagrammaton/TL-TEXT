16020-WeaponDescJp = "A standard-issue sniper rifle provided by SRT Special Academy.\n\nIts high penetration power allows it to snipe targets hiding behind cover. It is also capable of ultra-long-range sniping by taking advantage of its high muzzle velocity. However, it has the drawback of being extremely heavy, which apparently leaves Otogi suffering from stiff shoulders."
16020-ProfileIntroductionJp = "A sniper of FOX Platoon, belonging to SRT Special Academy. Call sign 'FOX4'.\n\nAmong snipers, who are often lone wolves, she is a rare individual who can quickly get along with people she has just met. She acts as the mood maker of the platoon.\nOn the battlefield, she also plays the role of lowering enemy morale.\n\nShe is skilled at handling electronic devices and is said to be able to repair standard equipment."