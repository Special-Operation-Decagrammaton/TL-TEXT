20056-WeaponDescJp = "Uma metralhadora que superou todas as dificuldades junto com Koyuki.\n\nDiferente de sua dona, que causa problemas, é uma parceira confiável que a auxilia calmamente... embora, na verdade, talvez ela só não esteja pensando em nada."
20056-ProfileIntroductionJp = "Pertencente ao Millennium Science School, é a garota genial e causadora de problemas do conselho estudantil, o \"Seminar\".\n\nO pijama foi um presente da Yuuka. Mesmo que ela troque de roupa, Kurosaki Koyuki continua a mesma. Parece que ela escapou da sala de detenção como sempre e está agindo de forma livre e despreocupada."
