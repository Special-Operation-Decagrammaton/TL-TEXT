20056-WeaponDescJp = "コユキと共にあらゆる苦難を乗り越えてきたマシンガン。\n\nトラブルを起こす持ち主とは違い、淡々と補佐してくれる頼もしい相棒……実は何も考えてないだけかもしれない。"
20056-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、生徒会「セミナー」のトラブルメーカーな天才少女。\n\nパジャマはユウカからプレゼントされたもの。着替えたとしても黒崎コユキは変わらない。いつも通り反省部屋から抜け出し、自由気ままに振る舞っている模様。"
