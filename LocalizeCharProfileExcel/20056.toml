20056-WeaponDescJp = "Пулемёт, который преодолел все невзгоды бок о бок с Коюки.\n\nВ отличие от своей вечно сеющей хаос хозяйки, этот надёжный напарник стоически помогает ей в бою... хотя, возможно, он просто ни о чём не думает."
20056-ProfileIntroductionJp = "Гениальная девчонка и главная нарушительница спокойствия из студенческого совета академии Миллениум — «Семинара».\n\nЭту пижаму ей подарила Юука. Но даже если Коюки меняет одежду, сама она ни капли не меняется. Похоже, она как обычно сбежала из комнаты размышлений и теперь развлекается на всю катушку, как ей вздумается."
20056-CharacterSSRNewJp = "Сначала действуем, разгребаем потом!"