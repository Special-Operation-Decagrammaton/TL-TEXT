10077-ProfileIntroductionJp = "Membro do Comitê de Justiça da Academia Trinity, sempre com uma expressão serena.\n\nDentro do Comitê de Justiça, onde pertencem alunas diversas, ela é a principal responsável pela mediação. Seu relacionamento com outras academias também é relativamente bom. Dizem que sua personalidade sociável não é algo natural, mas sim fruto de muito esforço."
