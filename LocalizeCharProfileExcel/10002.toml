10002-WeaponDescJp = "O rifle de precisão usado por Haruna.\n\nSegundo ela, através de sua mira, encontra-se o caminho para a gastronomia suprema."
10002-ProfileIntroductionJp = "Membro da Academia Gehenna e presidente do Clube de Pesquisa Gastronômica.\n\nÀ primeira vista, ela possui uma elegância solitária que lembra uma jovem rica, mas quando se trata de comida, ela se torna uma gourmet apaixonada que perde o bom senso. Ao contrário de sua gula, ela tem pouco apetite e não consegue comer grandes quantidades. Suas comidas favoritas são pratos gordurosos, como motsunabe e miúdos."
