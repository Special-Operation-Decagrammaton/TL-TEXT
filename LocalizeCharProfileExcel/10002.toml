10002-ProfileIntroductionJp = "ゲヘナ学園所属、美食研究会の会長。\n\n一見すると金持ちのお嬢様のような孤高な気品を思わせるが、食べ物に関わることになると分別がつかなくなってしまう熱血属性の美食家。その食い意地に反して食は細く、あまり量は食べられない方。好きな食べ物は、もつ鍋やホルモンのような脂っこい食べ物。"
