20016-WeaponDescJp = "A pistola que Iroha carrega consigo.\n\nComo comandante de tanque do Pandemonium, ela raramente tem a oportunidade de usá-la e sempre reclama que até esse tamanho é um incômodo para carregar, mas o fato de estar sempre bem cuidada revela um pouco da personalidade de Iroha."
20016-ProfileIntroductionJp = "Membro do conselho estudantil \"Pandemonium\" da Academia Gehenna.\n\nEmbora seja fundamentalmente preguiçosa, os dias em Gehenna são cheios de problemas, e o próprio conselho estudantil \"Pandemonium\" (mais precisamente, Makoto) certamente não a deixa em paz. Como uma gerente de nível médio, ela lida calmamente com problemas e tarefas intermináveis, mesmo enquanto reclama que é um incômodo. Enquanto encontra conforto em \"Ibuki\", a mascote que também pertence ao \"Pandemonium\", ela continua a realizar seu trabalho diário soltando suspiros."
20016-CharacterSSRNewJp = "……Você precisa de mim?\nFrancamente, não tem jeito mesmo."
