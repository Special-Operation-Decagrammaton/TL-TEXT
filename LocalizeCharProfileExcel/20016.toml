20016-WeaponDescJp = "イロハが携行している拳銃。\n\n万魔殿の戦車長である彼女がこれを使う機会は少なく、このサイズでも持ち歩きが面倒だと常々口にしているが、それでも日々綺麗に整備されているところからイロハらしさが垣間見える。"
20016-ProfileIntroductionJp = "ゲヘナ学園所属、「万魔殿」の議員のひとり。\n\n基本的にめんどくさがりな彼女ではあるが、彼女のいるゲヘナでの日々は問題だらけであり、またその生徒会「万魔殿」（正確にはマコト）も勿論そうはさせてくれない。仕方ない、めんどくさいと口にしながらも、無限に生じる問題や業務やら淡々とこなす中間管理職。同じ「万魔殿」に所属するマスコット的な存在である「イブキ」に癒されながら、彼女は今日もため息を吐きつつ実務をこなしていく。"
20016-CharacterSSRNewJp = "……私のことが必要？\n全く、仕方ありませんね"
