20046-ProfileIntroductionJp = "Membro da Academia Hyakkiyako e presidente do Clube Yin-Yang.\n\nPara quem é de fora, ela é conhecida como a presidente do conselho estudantil, mas devido à estrutura da academia, ela está presa a circunstâncias muito mais complexas. Por isso, ela é vista como uma \"presidente que não trabalha\"... ou pelo menos é essa a desculpa que ela dá, mas sua aversão ao trabalho é algo natural. Ela sempre parece causar incidentes por pura curiosidade, mas parece haver intenções ocultas por trás disso que ela não revela a ninguém."
20046-CharacterSSRNewJp = "Nya-ha, eu realmente tenho que fazer isso, não é~?\nCerto, certo, eu vou trabalhar~"
