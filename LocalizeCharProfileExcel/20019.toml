20019-ProfileIntroductionJp = "Uma agente da \"C&C\" pertencente ao Millennium Science School, que trocou de roupa para um traje de coelhinha para uma missão de infiltração.\n\nMesmo em um ambiente pouco familiar, ela demonstra sua calma habitual ao executar a operação, seja preparando os trajes de coelhinha por iniciativa própria ou usando C4 para explodir obstáculos e abrir caminho. Talvez por estar um pouco animada com o traje diferente do habitual, é possível vislumbrar expressões de empolgação em vários momentos."
