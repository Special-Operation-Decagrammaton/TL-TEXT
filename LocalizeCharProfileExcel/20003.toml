20003-WeaponDescJp = "マシロが正義実現委員会としての活動をする際に使用するスナイパーライフル。\n\n本来持ち歩くには不向きな大きさであるものの、マシロ曰くそのようなことは正義の前には無意味ですとのこと。"
20003-ProfileIntroductionJp = "トリニティ総合学園所属、正義実現委員会の実直な部員。\n\n背丈ほどもある、不釣り合いなほど大きいスナイパーライフルを持ち歩き、黙々と火力支援任務を遂行する少女。普段の口数は少ないものの、人見知りだったり対人関係が苦手だったりというわけではなく、正義に関する話題が始まると急に饒舌になったりする。"
20003-CharacterSSRNewJp = "正義が必要とされているのであれば、どこへでも"
