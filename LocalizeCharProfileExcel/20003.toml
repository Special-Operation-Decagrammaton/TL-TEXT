20003-WeaponDescJp = "O rifle de precisão que Mashiro usa durante suas atividades no Comitê de Implementação da Justiça.\n\nEmbora seja grande demais para ser carregado normalmente, Mashiro diz que tais detalhes não têm significado diante da justiça."
20003-ProfileIntroductionJp = "Uma integrante honesta do Comitê de Implementação da Justiça da Academia Trinity.\n\nUma garota que carrega um rifle de precisão desproporcionalmente grande, quase do tamanho de sua própria altura, enquanto cumpre silenciosamente suas missões de suporte de fogo. Embora seja geralmente quieta, não é por timidez ou dificuldade em se relacionar, mas sim porque ela se torna subitamente falante sempre que o assunto é justiça."
20003-CharacterSSRNewJp = "Se a justiça for necessária, irei a qualquer lugar"
