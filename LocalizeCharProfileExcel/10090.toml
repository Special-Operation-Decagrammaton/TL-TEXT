10090-WeaponDescJp = "O fuzil de assalto favorito da Umika.\n\nEla insiste que é o item de festival perfeito para qualquer ocasião, seja para anunciar o início de um festival ou para resolver pequenos problemas que ocorrem durante eles."
10090-ProfileIntroductionJp = "Aluna do 1º ano da Academia de Artes Hanamura, membro do Comitê de Operações de Festivais.\n\nVinda do interior, ela sempre teve muito interesse nos festivais realizados na cidade grande. É uma especialista que conhece todos os festivais realizados em Kivotos. Quando abre a boca, tende a falar rápido sobre festivais obscuros, e costumam dizer que ela é uma beldade, desde que fique calada."
10090-CharacterSSRNewJp = "Ouvi dizer que um festival ia começar e vim correndo!\nUé... não é isso?"
