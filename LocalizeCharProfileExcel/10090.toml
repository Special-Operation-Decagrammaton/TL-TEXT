10090-ProfileIntroductionJp = "百鬼夜行連合学院所属、お祭り運営委員会の1年生部員。\n\n田舎出身で、昔から都会で開催されるお祭りに興味津々だという。キヴォトス全域で行われるお祭りは全て覚えているほどの専門家。口を開けばマイナーなお祭りの話題で早口になりがちで、黙っていれば美人だとよく言われる。"
10090-CharacterSSRNewJp = "お祭りが開かれるって聞いて駆けつけてきました！\nあれ……違いますか？"
