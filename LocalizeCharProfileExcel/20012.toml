20012-ProfileIntroductionJp = "Membro da Academia Gehenna, chefe do Departamento de Medicina de Emergência.\n\nEm meio aos incidentes e acidentes que ocorrem diariamente em Gehenna, ela transporta os feridos com uma expressão sempre indiferente, sem nunca reclamar, independentemente da situação. Embora tenha um histórico de salvar inúmeros feridos, ela é mantida um pouco à distância por alguns alunos devido ao seu hábito de chamar os feridos de \"cadáveres\" por engano e pelo seu jeito bruto de manuseá-los."
