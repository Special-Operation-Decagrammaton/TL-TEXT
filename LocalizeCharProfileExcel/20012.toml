20012-ProfileIntroductionJp = "ゲヘナ学園所属、救急医学部の部長。\n\nゲヘナで日々起こり続ける事件・事故の中、どんな状況でも不平不満を漏らすことなく、いつも無愛想な顔で負傷者を運んでいる。数多くの負傷者を救ってきた経歴の持ち主だが、負傷者を「死体」と呼び間違える癖やその手荒な扱い方のせいで、一部の生徒からはやや遠巻きにされている。"
20012-CharacterSSRNewJp = "死体……いえ、負傷者はどこですか？"
