20007-ProfileIntroductionJp = "いつも明るくて、歌うことが大好きなバーチャル・シンガー。\n\n本来は現実の身体を持たない電子的な存在だったが、キヴォトスの技術を利用することで肉体を得てこの世界に降り立つことができた。時間と空間を超えて歌を届けることができるバーチャル・シンガーという特性上、やはりここキヴォトスにも彼女の隠れファンたちがたくさんいるようで、この世界で開催される予定のライブをとても楽しみにしている様子。"
20007-CharacterSSRNewJp = "私の歌、聞いてください！"
