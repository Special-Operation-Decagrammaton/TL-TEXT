20007-WeaponDescJp = "Um canhão gigante que a Hatsune Miku usa para distribuir brindes, como camisetas, durante seus shows.\n\nA superfície é equipada com diodos e outros componentes, permitindo que ele emita luzes belíssimas em sincronia com a música do show."
20007-ProfileIntroductionJp = "Uma cantora virtual sempre alegre e que ama cantar.\n\nOriginalmente, ela era uma existência eletrônica sem um corpo físico, mas conseguiu descer a este mundo ao obter um corpo através da tecnologia de Kivotos. Devido à sua natureza como uma cantora virtual capaz de levar suas músicas através do tempo e do espaço, parece que ela tem muitos fãs secretos aqui em Kivotos também, e eles estão muito ansiosos pelo show que está planejado para acontecer neste mundo."
20007-CharacterSSRNewJp = "Por favor, ouçam a minha música!"
