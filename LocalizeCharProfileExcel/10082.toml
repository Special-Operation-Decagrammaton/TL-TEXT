10082-WeaponDescJp = "O rifle favorito de Renge.\n\nUma versão modificada por ela mesma do rifle padrão da Hyakka Ryoran. Dizem que é sua parceira de confiança na hora de avançar. As técnicas de tiro da Hyakka Ryoran que utilizam esta arma não permitem que outros as alcancem."
10082-ProfileIntroductionJp = "Membro da Academia Hyakkiyako e capitã de vanguarda do Comitê de Mediação de Conflitos Hyakka Ryoran.\n\nPossui um forte senso de justiça e é muito sentimental. Embora cuide bem de seus veteranos, ela não pega leve no treinamento como membro da Hyakka Ryoran, o que a torna uma instrutora rigorosa. Ela não se arrepende de ter entrado para a Hyakka Ryoran, mas carrega a insegurança de não estar aproveitando sua juventude como deveria. Talvez como reação a isso, ela vive em busca da juventude que vê em mangás e romances. Uma garota sonhadora que, hoje também, enche o peito de esperança por um encontro fatídico enquanto se dedica ao treinamento."
10082-CharacterSSRNewJp = "A minha história de juventude começa agora!"
