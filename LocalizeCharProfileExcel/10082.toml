10082-WeaponDescJp = "レンゲが愛用するライフル。\n\n百花繚乱の制式ライフルをレンゲ自身が改造した物。突撃する時の頼もしい相棒なのだとか。この銃を活用した百花繚乱の射撃術は、他の追随を許さない。"
10082-ProfileIntroductionJp = "百鬼夜行連合学院所属、百花繚乱紛争調停委員会の切り込み隊長。\n\n正義感が強く情に厚い。後輩を大切にしている反面、百花繚乱としての指導は手を抜かないため鬼教官となることも。百花繚乱に入部したこと自体は後悔していないが、青春を謳歌できていないのではないかという不安を抱いている。その反動なのか、漫画や小説に出てくるような青春を追い求めている。今日も運命の出会いに胸を膨らませ、訓練に邁進する夢見がちな少女。"
10082-CharacterSSRNewJp = "アタシの青春物語、始めるよ！"
