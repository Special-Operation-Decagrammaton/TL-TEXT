10021-ProfileIntroductionJp = "トリニティ総合学園所属、初めて海に遊びに来ることになった補習授業部の氷の魔女。\n\n誰にも迷惑をかけないように「普段通り冷静な自分でいよう」と思ってはいたが、初めての海と一緒に来た友人が、どうやら彼女をジッとはさせてくれない模様。ただでさえ初めての海、周囲からの視線、それらに対する少しの緊張も相まって、普段の彼女に比べるとそれなりにそわそわしている。"
10021-CharacterSSRNewJp = "……まずは、海に慣れることから"
