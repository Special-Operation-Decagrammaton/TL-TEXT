10021-WeaponDescJp = "O fuzil de assalto que Azusa carrega.\n\nDiferente de sua dona, que na verdade está muito animada por ver o mar, a arma mantém seu brilho habitual."
10021-ProfileIntroductionJp = "Membro da Academia Trinity, a Bruxa de Gelo do Esquadrão de Reforço que veio à praia pela primeira vez.\n\nEla pensou em \"manter sua calma habitual\" para não incomodar ninguém, mas parece que o mar e as amigas que a acompanham não a deixarão ficar parada. Entre a novidade do mar, os olhares ao redor e um pouco de tensão, ela está visivelmente mais inquieta do que o normal."
10021-CharacterSSRNewJp = "……Primeiro, preciso me acostumar com o mar."
