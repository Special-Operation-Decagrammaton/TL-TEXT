20047-ProfileIntroductionJp = "Estrategista da Comissão de Mediação de Conflitos Hyakkaryouran, da Academia Hyakkiyako, que trocou seu uniforme pelo traje de banho para o verão.\n\nEmbora tenha começado a mostrar um lado seu que antes não revelava, ela ainda mantém em segredo o fato de que não sabe nadar. Ela acabou sendo levada pela correnteza para participar do Festival Aquático de Hyakki."
