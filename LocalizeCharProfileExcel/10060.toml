10060-WeaponDescJp = "現場ではメグと一心同体と言っても過言ではない、メグ専用の火炎放射器。\n\nものすごい熱を放つため、他の人は手に負えないしろもの。独特な名前は、他人に言われた言葉遊びを気に入ってそのまま名付けたもの。"
10060-ProfileIntroductionJp = "ゲヘナ学園所属、温泉開発部の心臓であり、開発現場の作業班長。\n\nすべての問題事を「撤去する」ことで解決できると心の底から信じている。豪快で竹を割ったような性格、抜群の撤去能力で温泉開発部員から厚い信頼を得ている。"
10060-CharacterSSRNewJp = "障害物？私に任せて！撤去しちゃうよ～！"
