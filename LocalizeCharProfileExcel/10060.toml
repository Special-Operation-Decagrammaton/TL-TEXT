10060-WeaponDescJp = "Um lança-chamas exclusivo da Meg que, no local de trabalho, não é exagero dizer que é um só com ela.\n\nComo libera um calor imenso, é um item que ninguém mais consegue manusear. O nome peculiar foi escolhido porque ela gostou de um jogo de palavras que alguém disse a ela."
10060-ProfileIntroductionJp = "Pertencente à Academia Gehenna, é o coração do Departamento de Desenvolvimento de Fontes Termais e a líder da equipe de trabalho no local.\n\nEla acredita do fundo do coração que todos os problemas podem ser resolvidos \"demolindo-os\". Com uma personalidade extravagante e direta, ela conquistou a profunda confiança dos membros do Departamento de Desenvolvimento de Fontes Termais graças à sua excelente capacidade de demolição."
10060-CharacterSSRNewJp = "Obstáculos? Deixe comigo! Vou demolir tudo!"
