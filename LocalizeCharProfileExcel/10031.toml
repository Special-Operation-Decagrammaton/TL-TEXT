10031-WeaponDescJp = "Um rifle de precisão com design clássico que Aru valoriza muito.\n\nSegundo ela, com a chegada do ano novo, a arma ficou ainda mais experiente e, assim como ela, parece ter se tornado ainda mais 'hard-boiled'."
10031-ProfileIntroductionJp = "Pertencente à Academia Gehenna, a autoproclamada presidente da Problem Solver 68, pronta para o Ano Novo.\n\nPara desejar prosperidade à Problem Solver no novo ano, ela decidiu começar pelo visual, gastando uma boa quantia para arrumar o cabelo e até alugando um quimono, estando cheia de motivação desde o primeiro dia. Por causa do traje, ela está ainda mais tensa que o normal e seu ânimo está nas alturas. Ela tenta agir com uma postura relaxada e um tom de voz calmo, interpretando o papel de uma presidente elegante (embora, por dentro, continue sendo a mesma de sempre)."
10031-CharacterSSRNewJp = "Entendo, então esse é o primeiro trabalho do ano? Observe, vou resolvê-lo com maestria."
