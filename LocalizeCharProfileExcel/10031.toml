10031-WeaponDescJp = "アルが普段から大事にしている、古風なデザインのスナイパーライフル。\n\n彼女曰く新たな年を迎えてさらに年季が入り、この銃もまるで自分のようによりハードボイルドさが増してきた……らしい。"
10031-ProfileIntroductionJp = "ゲヘナ学園所属、正月を迎えた便利屋68の自称社長。\n\n新年を迎えて今後の便利屋の繁盛を願うため、まずは形から入ろうと高いお金をかけて髪をセットし、着物まで借りて新年からやる気満々の彼女。その装いもあって普段以上に肩に力が入っており、テンションもいつもより上がり気味。彼女自身の意識としても余裕あふれる歩き方、そしてゆったりとした口調を心掛け、気品のある社長を演じている（が、中身はいつも通りである）。"
10031-CharacterSSRNewJp = "なるほど、今年一発目の依頼ね？見てなさい、鮮やかに解決してあげるわ"
