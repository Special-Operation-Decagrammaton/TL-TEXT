10036-ProfileIntroductionJp = "トリニティ総合学園所属、シスターフッドの真面目でひたむきな少女。\n\nシスターフッドにおいて「聖堂などの物品管理」という責務を担っており、その仕事も日々誠実にこなしている。しかしながら少々おっちょこちょいな部分があり、ミスを重ねては自信を失うこともしばしば。普段から持ち歩いている大きなカバンにはグレネードランチャーなどが色々と入っているものの、彼女はそれを軽々と運んでいる。"
10036-CharacterSSRNewJp = "何か、私にできることはありますでしょうか？"
