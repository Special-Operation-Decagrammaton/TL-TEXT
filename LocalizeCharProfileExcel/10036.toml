10036-ProfileIntroductionJp = "Uma garota séria e dedicada da Sisterhood, pertencente à Trinity General School.\n\nEla é responsável pela \"gestão de itens da catedral e outros locais\" na Sisterhood, e realiza seu trabalho com sinceridade todos os dias. No entanto, ela é um pouco desastrada e, por cometer erros repetidamente, muitas vezes acaba perdendo a confiança em si mesma. Embora sua bolsa grande, que ela carrega para todos os lugares, contenha vários itens, como um lançador de granadas, ela os carrega com facilidade."
