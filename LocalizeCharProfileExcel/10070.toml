10070-WeaponDescJp = "As pistolas duplas favoritas de Mina.\n\nByakko na mão direita, Genryu na esquerda. Ela insiste que estes são seus melhores companheiros de batalha... Talvez haja momentos em que a intuição seja mais importante que a razão."
10070-ProfileIntroductionJp = "Membro da Shanhaijing Senior High School, atua como chefe executiva do conselho estudantil 'Genryumon' e guarda-costas da presidente do conselho.\n\nApesar de sua aparência fria e calculista, ela é, na verdade, uma entusiasta de filmes noir clássicos. Ela admira situações e falas marcantes como as dos filmes. Frequentemente, ela tenta agir de forma descolada e acaba se dando mal ao dizer frases dignas de cinema, mas parece que os membros da 'Genryumon' tentam ignorar isso."
10070-CharacterSSRNewJp = "Eu mesma lidarei com as faíscas.\n――Essa é a melhor estratégia."
