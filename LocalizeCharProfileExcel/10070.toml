10070-WeaponDescJp = "ミナの愛用する二丁拳銃。\n\n右手に白虎、左手に玄龍。これこそが最高の戦友である……と彼女は主張する。理性より感性が重要な時があるのかもしれない。"
10070-ProfileIntroductionJp = "山海経高級中学校所属、生徒会「玄龍門」の執行部長兼、生徒会長の護衛。\n\nクールで冷徹な印象の外見とは裏腹に、実は古いノワール映画のマニア。映画に出るようなかっこいい状況やセリフに憧れている。カッコつけて映画のようなセリフを口にして痛い目にあうこともしばしばだが、「玄龍門」の部員は気にしないようにしているらしい。"
10070-CharacterSSRNewJp = "火の粉は一人で受け止めよう。\n――それが最善策だからな"
