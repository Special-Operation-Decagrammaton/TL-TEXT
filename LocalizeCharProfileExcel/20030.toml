20030-ProfileIntroductionJp = "A presidente do Clube de Pesquisa Gastronômica da Academia Gehenna, que trocou seu uniforme por roupas de ginástica para o Festival Esportivo Halo.\n\nSua busca pela gastronomia continua a qualquer hora e em qualquer lugar, e ela vaga em busca de iguarias que só podem ser saboreadas no maior festival esportivo de Kivotos. Talvez contagiada pela atmosfera vibrante do evento, ela parece um pouco mais animada do que o habitual."
20030-CharacterSSRNewJp = "Imagino que, com tanto exercício, você também tenha ficado com fome.\nVamos, partamos juntos em uma jornada gastronômica."
