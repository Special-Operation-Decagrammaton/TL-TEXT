26010-WeaponDescJp = "O rifle de precisão padrão fornecido a Miyu pela Academia SRT.\n\nGraças à estrutura simples e robusta típica de um ferrolho, ela consegue mirar nos inimigos sem que a arma falhe, mesmo sob a forte brisa do mar."
26010-ProfileIntroductionJp = "Uma atiradora do RABBIT Squad da Academia SRT que visitou uma vila de pescadores para uma missão de infiltração.\n\nEla trouxe seu equipamento de pesca e passa o tempo relaxando enquanto lança sua linha no píer. Às vezes, ela pesca algo grande e acaba atraindo a atenção de todos ao redor, mas... parece que sua falta de presença natural continua intacta, mesmo nesta vila misteriosa."
