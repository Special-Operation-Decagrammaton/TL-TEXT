26010-WeaponDescJp = "ミユがSRT特殊学園から支給された、制式スナイパーライフル。\n\nボルトアクション特有のシンプルで頑丈な構造のおかげで、潮風が強い中でも故障することなく敵を狙撃することができる。"
26010-ProfileIntroductionJp = "潜入作戦のため漁村を訪れたSRT特殊学園所属RABBIT小隊のスナイパー。\n\n釣り道具を持参し、船着き場でまったりと釣り糸を垂らしている。たまに大物を釣り上げ、周囲の注目を集めることもあるが……天性の存在感の薄さは、この不思議な村でも健在の模様。"
