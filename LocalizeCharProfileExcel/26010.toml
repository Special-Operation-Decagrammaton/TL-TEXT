26010-WeaponDescJp = "Fuzil de precisão padrão distribuído pela Academia Especial SRT para Miyu.\n\nGraças à sua estrutura de ação por ferrolho (bolt-action) simples e robusta, é capaz de alvejar inimigos sem falhar, mesmo sob a forte brisa marítima." 
26010-ProfileIntroductionJp = "Atiradora de elite do Esquadrão RABBIT da Academia Especial SRT, que visitou uma vila de pescadores para uma missão de infiltração.\n\nEla trouxe seu equipamento de pesca e está relaxando, jogando a linha no píer. Às vezes, ela pesca algo grande e atrai a atenção de todos ao redor, mas... sua inerente falta de presença parece continuar firme e forte, mesmo nesta vila misteriosa." 