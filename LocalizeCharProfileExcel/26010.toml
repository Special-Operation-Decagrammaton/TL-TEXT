26010-WeaponDescJp = "Fuzil de precisão de serviço fornecido a Miyu pela Academia Especial SRT.\n\nGraças à sua estrutura simples e robusta, característica marcante dos rifles de ferrolho (bolt-action), ela consegue abater seus alvos sem que a arma sofra com falhas mecânicas, mesmo sob os ventos fortes e a maresia densa da praia."
26010-ProfileIntroductionJp = "Atiradora de elite (Sniper) do Esquadrão RABBIT, pertencente à Academia Especial SRT, que visitou uma vila de pescadores para uma operação de infiltração.\n\nEla trouxe seu próprio equipamento de pesca e passa o tempo relaxando, com a linha jogada no píer. De vez em quando, ela consegue pescar algo gigantesco e acaba atraindo os olhares de todos ao seu redor... no entanto, parece que a sua natural e crônica 'falta de presença' continua intacta e operante, mesmo no meio dessa vila misteriosa."