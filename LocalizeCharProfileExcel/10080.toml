10080-ProfileIntroductionJp = "Uma estudante elegante da Escola Secundária Tokiwadai.\n\nEla é uma pessoa influente que lidera a maior facção dentro da prestigiada Escola Secundária Tokiwadai e é uma das sete Esper de nível 5 existentes na Cidade Acadêmica. O poder que ela utiliza é o 'Mental Out', que permite manipular a mente dos outros. No entanto, parece que ela não tem conseguido usar seus poderes como deseja desde que foi transferida para Kivotos. Ela, na verdade, tem um pouco de dificuldade em lidar com Misaka Mikoto, outra Esper de nível 5 cujos poderes não são afetados pelas suas habilidades."
