10048-ProfileIntroductionJp = "アリウス分校所属、学園内でエリート特殊部隊と呼ばれているアリウススクワッドのリーダー。\n\n目的のためなら手段と方法を選ばない冷徹な姿と、時には激情を露わにする姿が共存した少女。ゲリラ戦術に関しては他の追随を許さない専門家だが、日常生活ではやや世間知らずな一面を見せることも。アリウススクワッドの戦闘力は彼女が訓練を見ていた結果なのだとか。"
10048-CharacterSSRNewJp = "まだ、道半ばで迷っている――\nそれでも、いつかは……"
