10048-WeaponDescJp = "O rifle de assalto usado por Saori.\n\nCustomizado por ela mesma com foco total em eficiência. Uma vez que a presa é capturada, o alvo nunca escapa até ser derrotado."
10048-ProfileIntroductionJp = "Pertencente à filial de Arius, é a líder do Esquadrão de Arius, uma unidade de elite dentro da escola.\n\nUma garota que possui um lado frio, que não mede esforços para atingir seus objetivos, coexistindo com momentos de intensa paixão. É uma especialista em táticas de guerrilha sem igual, mas, na vida cotidiana, demonstra ser um pouco ingênua sobre o mundo. Dizem que o poder de combate do Esquadrão de Arius é resultado do treinamento que ela supervisionou."
10048-CharacterSSRNewJp = "Ainda estou perdida no meio do caminho—\nMesmo assim, algum dia..."
