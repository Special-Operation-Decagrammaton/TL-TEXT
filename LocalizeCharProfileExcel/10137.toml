10137-ProfileIntroductionJp = "Membro da Academia de Polícia Valkyrie e vice-diretora do Departamento de Segurança Pública.\n\nEmbora sua aparência às vezes faça com que a confundam com uma suspeita, ela é uma policial competente. Ela consegue rastrear a psicologia e o comportamento de criminosos melhor do que qualquer outra pessoa no Departamento de Segurança Pública, mas não parece fazer isso de forma consciente.\n\nDizem que ela é a aluna que mais recebeu promoções e, ao mesmo tempo, a que mais sofreu rebaixamentos no Departamento de Segurança Pública."
