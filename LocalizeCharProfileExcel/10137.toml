10137-ProfileIntroductionJp = "Заместитель директора Бюро общественной безопасности Полицейской академии Валькирии.\n\nНесмотря на то, что из-за внешнего вида её порой принимают за подозреваемую, она крайне способный офицер. Конока способна просчитать психологию и поведение преступников лучше, чем кто-либо другой в Бюро, хотя сама, кажется, делает это неосознанно.\n\nГоворят, что она — студентка, которую продвигали по службе и разжаловали самое большое количество раз за всю историю Бюро."
