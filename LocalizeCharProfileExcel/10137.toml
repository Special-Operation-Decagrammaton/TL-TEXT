10137-ProfileIntroductionJp = "Aluna da Escola de Polícia Valkyrie, vice-diretora do Departamento de Segurança Pública.\n\nEmbora sua aparência faça com que ela seja confundida com uma suspeita às vezes, ela é uma policial competente. Ela consegue rastrear a psicologia e o comportamento dos criminosos melhor do que qualquer um no Departamento de Segurança Pública, embora não pareça que ela faz isso conscientemente.\n\nDizem que ela é a aluna que mais recebeu promoções na história do departamento — e também a que mais recebeu rebaixamentos."
