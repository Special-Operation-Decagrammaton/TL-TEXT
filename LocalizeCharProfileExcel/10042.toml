10042-WeaponDescJp = "Uma submetralhadora usada por Atsuko.\n\nApesar do cano curto, possui um poder de fogo intenso, sendo especialmente adequada para combates de curta distância."
10042-ProfileIntroductionJp = "Pertencente à Escola de Arius, é uma garota misteriosa do Esquadrão de Arius que está sempre usando uma máscara de gás, tornando impossível ver suas expressões.\n\nEmbora não tente esconder o rosto intencionalmente, ela vive quase todo o tempo com a máscara, exceto durante as refeições e ao dormir. É chamada de \"Princesa\" por Saori, a líder do esquadrão, mas ela mesma é uma pessoa cheia de mistérios que prefere não falar muito."
