10014-WeaponDescJp = "A submetralhadora favorita de Izuna.\n\nÉ uma ferramenta ninja de ponta que, quando usada em conjunto com o ninjutsu estilo Izuna, possui usos infinitos, como disparar contra bombas de fumaça lançadas ou até mesmo massagear os ombros do Mestre."
10014-ProfileIntroductionJp = "Uma garota do Clube de Pesquisa de Ninjutsu da Academia Hyakkiyako.\n\nUma garota alegre e cheia de energia, mas que viveu sozinha por muito tempo por perseguir um sonho que poucos compreendem. Esse sonho é \"se tornar a melhor ninja de Kivotos\". Para se tornar uma ninja exemplar, hoje ela continua chamando o Sensei de \"Mestre!\" enquanto o escolta (ou, como alguns diriam, o persegue por toda parte), dedicando-se a diversas atividades."
10014-CharacterSSRNewJp = "Se for pelo Mestre!"
