10014-WeaponDescJp = "A submetralhadora favorita da Izuna.\n\nÉ uma ferramenta ninja de ponta. Quando usada em conjunto com as artes ninjas do Estilo Izuna, as suas utilidades são infinitas: desde atirar em bombas de fumaça arremessadas no ar até massagear os ombros do Meu Mestre."
10014-ProfileIntroductionJp = "Uma jovem do Clube de Pesquisa de Ninjutsu da Academia Aliada Hyakkiyako.\n\nÉ uma garota brilhante e cheia de energia, mas, por perseguir um sonho que a maioria das pessoas não compreende, acabou vivendo sozinha a maior parte do tempo. O seu sonho é 'se tornar a melhor ninja de Kivotos'. Para se tornar uma ninja esplêndida, ela passa os seus dias engajada em várias atividades, incluindo escoltar (ou simplesmente perseguir) o Sensei, a quem ela chama afetuosamente de 'Meu Mestre!'."
10014-CharacterSSRNewJp = "Se for para o bem do Meu Mestre!"