10014-WeaponDescJp = "イズナが愛用するサブマシンガン。\n\n最先端の忍具であり、イズナ流忍法と絡めて使用することで投擲した煙幕弾を打ち抜いたり、主殿の肩をマッサージすることも可能だったりと用途は無限大。"
10014-ProfileIntroductionJp = "百鬼夜行連合学院所属、忍術研究部の少女。\n\n明るくて活気溢れる性格の女の子だが、他の人にはあまり理解されない夢を追求してきた結果、これまでずっと独りぼっちで生きてきた。その夢とは「キヴォトス最高の忍者になる」こと。立派な忍者になるため、今日も先生を「主殿！」と呼びながら護衛（単に追いかけ回すとも言う）をし、様々な活動に明け暮れている。"
10014-CharacterSSRNewJp = "主殿のためでしたら！"
