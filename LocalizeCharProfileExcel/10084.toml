10084-WeaponDescJp = "A pistola que Kotama carrega consigo o tempo todo.\n\nCom o som do disparo reduzido ao limite, esta pistola permite realizar operações em montanhas silenciosas sem alertar os animais selvagens."
10084-ProfileIntroductionJp = "Uma integrante da Veritas que trocou de roupa para um traje mais quente, adequado ao inverno rigoroso.\n\nEmbora não tivesse intenção de sair, ela encarou a situação de forma positiva, vendo como uma oportunidade de gravar sons ambientes que normalmente são difíceis de captar. Ela gosta de todos os sons que podem ser gravados na natureza, mas dizem que o que ela mais gosta é, sem dúvida, a voz do Sensei."
10084-CharacterSSRNewJp = "Eu estava esperando pelos seus passos se aproximando, Sensei"
