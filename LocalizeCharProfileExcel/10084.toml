10084-ProfileIntroductionJp = "寒い冬にあわせて暖かい格好に着替えたヴェリタスのメンバー。\n\n外出する気はなかったものの、普段は録音しづらい環境音を収録するチャンスだとポジティブに切り替えている。自然環境で収録できるあらゆる音が好きだが、一番好きなのはやはり先生の声なのだとか。"
