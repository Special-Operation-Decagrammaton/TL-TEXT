10037-WeaponDescJp = "Uma submetralhadora com carregador de tambor, muito utilizada por Marina.\n\nSua velocidade de disparo fenomenal ataca impiedosamente aqueles que ousam questionar a autoridade de Red Winter."
10037-ProfileIntroductionJp = "Presidente do Comitê de Segurança da Academia Federal de Red Winter, responsável pela manutenção da ordem.\n\nComo ela aplica punições impiedosas e sem questionamentos a qualquer um que viole as regras escolares, é famosa por ser uma pessoa de sangue frio, sem sentimentos... ou pelo menos é o que dizem. Na verdade, ela é do tipo impulsiva que, quando decide algo, segue em frente sem hesitar, cumprindo fielmente as ordens da Presidente Cherino. Ela adora a palavra \"ataque\" e, para qualquer situação, ela acaba recorrendo a um ataque. Como é a primeira a se lançar em ação sempre que surge um problema em Red Winter, pode-se dizer que é fiel ao seu dever, mas, como resultado de seus ataques, ela acaba se perdendo com frequência."
10037-CharacterSSRNewJp = "Eu não vou fugir nem me esconder!"
