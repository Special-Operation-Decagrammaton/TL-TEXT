10037-WeaponDescJp = "マリナが愛用している、ドラムマガジン付きのサブマシンガン。\n\nその驚異的な発射速度は、レッドウィンターの権威を疑う者たちに容赦なく襲い掛かる。"
10037-ProfileIntroductionJp = "レッドウィンター連邦学園所属、治安の維持を担当する保安委員会における委員長。\n\n校則違反をすれば問答無用で無慈悲な懲罰を下すことから、血も涙もない冷血漢として有名……とも言われるが、実際には思い込んだら一直線、基本的にはチェリノ会長の命令を着実に遂行していく直情タイプ。「突撃」という言葉が好きで、何につけても突撃を繰り返す。レッドウィンターで何か問題があれば真っ先に飛び出すため、職務に忠実とも言えるものの、突撃した結果として道に迷うことも多い。"
10037-CharacterSSRNewJp = "私は、逃げも隠れもしない！"
