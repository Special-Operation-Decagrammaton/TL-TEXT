26011-ProfileIntroductionJp = "Uma estudante alegre do ensino fundamental que frequenta a Escola Secundária Sakugawa.\n\nÉ a melhor amiga de sua colega de classe, Kazari Uiharu, que a apresentou a Mikoto Misaka, uma veterana da Escola Secundária Tokiwadai. Embora seja uma Level 0 sem habilidades, ela tem uma boa intuição e frequentemente encontra pistas decisivas. Ela gosta de lendas urbanas e doces. Dizem que, nos dias de folga, ela costuma sair para pesquisar novos doces."
