16015-ProfileIntroductionJp = "Membro do Clube de Doces Depois da Aula da Academia Trinity e líder da banda \"Sugar Rush\", formada às pressas.\n\nQuerendo mudar seu jeito reservado, ela lidera o grupo para participar de um evento de bandas. Embora seja, na verdade, a figura central que mantém o clube unido, parece que ela é a única que não percebeu isso."
