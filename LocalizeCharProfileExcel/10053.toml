10053-WeaponDescJp = "Duas submetralhadoras usadas por Yuuka.\n\nNeste Festival Esportivo de Halo, Lógica & Razão continuam a representar o julgamento racional e lógico de Yuuka."
10053-ProfileIntroductionJp = "Membro do Millennium Science School e tesoureira do Seminar, que trocou seu uniforme pelo traje de ginástica para participar do Festival Esportivo de Halo.\n\nEmbora estivesse sobrecarregada com os preparativos para o grande evento organizado pelo Millennium, ela conseguiu dormir bem na véspera da abertura graças à consideração das outras alunas, estando agora em sua melhor forma. Como oficial do conselho estudantil da escola anfitriã e membro do comitê executivo, Yuuka pretendia encarar o festival de forma racional, mas a paixão pela vitória das outras escolas parece ter despertado seu espírito competitivo."
10053-CharacterSSRNewJp = "Os preparativos para o Festival Esportivo de Halo estão perfeitos!"
