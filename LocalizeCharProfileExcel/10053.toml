10053-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、晄輪大祭参加のために体操服に着替えたセミナーの会計。\n\nミレニアム主催のビッグイベントの準備で激務に追われていたものの、開会前日だけは他の生徒たちの配慮でぐっすり眠ったため、最高のコンディションとなっている。主催校の生徒会役員であり、実行委員のユウカは理性的に大会に臨もうとしていたが、周囲の学校の勝利への情熱が、彼女の負けず嫌いを刺激している様子。"
