10081-WeaponDescJp = "ユカリが使用する百花繚乱の制式ライフル。\n\nかつての憧れの象徴であり、理想を追いかけ努力し手に入れた決意の証。そこに込められた心は、誰にも手折ることなどできない。"
10081-ProfileIntroductionJp = "百鬼夜行連合学院所属、百花繚乱紛争調停委員会の1年生。\n\n由緒正しい勘解由小路家の跡継ぎ。家業を継ぐよりも、憧れの百花繚乱に入った少女。百花繚乱であることに誇りを持っており、行動力がある。時には挫けることもあるが、すぐに立ち上がれる芯の強さを持っている。先輩を尊敬しており、その中でも特にナグサを慕っている。"
10081-CharacterSSRNewJp = "ユカリ快進撃ですの～！"
