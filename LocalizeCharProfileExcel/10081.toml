10081-WeaponDescJp = "O rifle padrão da Hyakkaryouran usado por Yukari.\n\nÉ um símbolo do que ela um dia admirou, e uma prova da determinação que ela obteve ao perseguir seus ideais com esforço. O coração contido nele é algo que ninguém jamais poderá quebrar."
10081-ProfileIntroductionJp = "Aluna do 1º ano da Academia Hyakkiyako, membro do Comitê de Mediação de Conflitos Hyakkaryouran.\n\nHerdeira da tradicional família Kageharu. Em vez de seguir os negócios da família, ela entrou para a Hyakkaryouran, por quem nutre grande admiração. Ela tem orgulho de ser parte da Hyakkaryouran e possui muita iniciativa. Embora às vezes se sinta desanimada, ela tem uma força interior que a permite se levantar rapidamente. Ela respeita seus veteranos, e entre eles, é especialmente apegada a Nagusa."
10081-CharacterSSRNewJp = "O avanço de Yukari começou!"
