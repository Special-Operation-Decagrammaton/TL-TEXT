20054-WeaponDescJp = "A pistola que Himari possui.\n\nComo ela passou a usar uma cadeira de rodas, ou melhor, uma moto, talvez seja possível vê-la usando armas mais do que o habitual."
20054-ProfileIntroductionJp = "Pertencente ao Millennium Science School, ex-presidente do grupo de hackers \"Veritas\" e atual presidente do Departamento de Investigação de Fenômenos Especiais.\n\nPara lidar com crises sem precedentes, ela vestiu um traje especial. Além disso, graças à sua nova \"cadeira de rodas\", parece que agora ela é capaz de correr livremente por toda parte.\n\nEla insiste que é uma cadeira de rodas, mas, por qualquer ângulo, parece uma moto."
20054-CharacterSSRNewJp = "O que esta super gênio, pura e frágil bela garota faz não muda.\nVamos lidar com isso de forma elegante e calma, um passo de cada vez."
