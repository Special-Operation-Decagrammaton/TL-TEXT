20009-WeaponDescJp = "チェリノが誰かを粛清する時などに使用する拳銃。\n\n温泉郷のように高温多湿な環境でも錆びないよう、トモエが改造を施してくれた模様。"
20009-ProfileIntroductionJp = "レッドウィンター連邦学園所属、227号温泉郷を伸び伸びと楽しんでいる生徒会長。\n\n最初は温泉郷が自分の許可も無しに建てられたという事実が気に食わず、そんなものは撤去して粛清せねばと考えて、温泉地へとやってきたチェリノ。しかし到着早々ノドカたちの懐柔によって一転、温泉郷を満喫することになった。温泉郷そのものや食べ物には満足しているものの、どうやら温泉自体はさほど好きではない様子。"
20009-CharacterSSRNewJp = "「粛清君1号」の前に、跪くが良い！"
