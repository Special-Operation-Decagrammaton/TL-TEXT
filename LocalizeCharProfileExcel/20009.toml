20009-WeaponDescJp = "A pistola que Cherino usa quando precisa expurgar alguém.\n\nAo que parece, Tomoe a modificou para que não enferruje mesmo em ambientes quentes e úmidos, como o resort de águas termais."
20009-ProfileIntroductionJp = "Presidente do conselho estudantil da Academia Federal Red Winter, que está aproveitando ao máximo o Resort de Águas Termais 227.\n\nInicialmente, Cherino veio ao resort insatisfeita com o fato de ele ter sido construído sem sua permissão, decidida a removê-lo e realizar um expurgo. No entanto, logo após sua chegada, ela foi convencida por Nodoka e as outras, passando a aproveitar o resort. Embora esteja satisfeita com o local e a comida, parece que ela não gosta muito das águas termais em si."
