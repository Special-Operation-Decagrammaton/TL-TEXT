20035-ProfileIntroductionJp = "いつでも何処でも眠る修行をやめない百鬼夜行連合学院所属、修行部の部長。\n\n修学旅行を迎え百鬼夜行を案内するガイドの役割につくが、睡眠の修行も諦めない。時には居眠りをしたり、時には鋭く核心を突いたりするなど、さりげなく両方をこなしている。"
