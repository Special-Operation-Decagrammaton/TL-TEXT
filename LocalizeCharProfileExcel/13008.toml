13008-WeaponDescJp = "セリカがバイトに出る時も携帯しているアサルトライフル。\n\nいつも丁寧に整備されており、セリカの几帳面さや誠実な部分が窺える。"
13008-ProfileIntroductionJp = "アビドス高等学校所属、アビドス対策委員会の気難し屋さんな会計担当。\n\n小言が多く、自分の感情を表すことに躊躇しないタイプ。日々口癖のように「こんな学校なんか、潰れちゃえばいいのに！」と言ってしまうが、実は学校の借金を返すために他のみんなに隠れてバイトをしているほど、学校に対する愛情が深い子である。"
