13008-ProfileIntroductionJp = "Membro da Escola Secundária Abydos e a tesoureira rabugenta do Comitê de Contramedidas de Abydos.\n\nÉ do tipo que reclama bastante e não hesita em expressar seus sentimentos. Ela costuma dizer \"Eu queria que essa escola falisse logo!\" como um hábito, mas, na verdade, ela tem um carinho profundo pela escola, tanto que trabalha escondida dos outros para ajudar a pagar as dívidas da instituição."
