16017-WeaponDescJp = "アオバが愛用しているショットガン。\n\n「期待しない」という彼女の価値観を逆説的に表している。気に障るものを消し飛ばすのに最適だとか……。"
16017-ProfileIntroductionJp = "ハイランダー鉄道学園所属、貨物輸送管理部のエンジニア。\n\n内気で怖がりな性格だが、さりげなく毒舌発言をする一面も。声を落として喋るせいか、彼女が発する言葉が悪口かどうか聞き分けるのは少々難しい。常に激務に追われ、理不尽な思いをすることが多く、この世の中に強い不満を抱いている。"
