16017-ProfileIntroductionJp = "Uma engenheira do Departamento de Gestão de Transporte de Carga da Academia Ferroviária Highlander.\n\nEmbora seja tímida e medrosa, ela também tem um lado que faz comentários sarcásticos de forma discreta. Talvez por falar baixo, seja um pouco difícil distinguir se o que ela diz é um insulto ou não. Constantemente sobrecarregada de trabalho e enfrentando situações irracionais, ela nutre uma forte insatisfação com o mundo."
