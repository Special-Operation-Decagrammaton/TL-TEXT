16001-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、秘密組織「C&C」のエージェント。\n\nコールサインは「ゼロワン」で、卓越した動物的な感覚と直感とで数々の難関を乗り越えてきたベテランである。任務中、勝手に人を信じて正体を明かしたり、疑わしいものは全て壊してしまうなど、理解し難い行動も多々あるが、最終的にはきちんと成果を収める。"
