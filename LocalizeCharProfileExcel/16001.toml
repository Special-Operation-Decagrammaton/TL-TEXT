16001-ProfileIntroductionJp = "Agente da C&C, uma organização secreta pertencente ao Millennium Science School.\n\nSeu codinome é \"Zero-One\", e ela é uma veterana que superou inúmeros desafios graças aos seus sentidos animais e intuição excepcionais. Durante as missões, ela frequentemente toma atitudes difíceis de entender, como confiar em pessoas por conta própria e revelar sua identidade, ou destruir tudo o que parece suspeito, mas, no final, ela sempre entrega resultados."
