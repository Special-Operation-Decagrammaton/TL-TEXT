20021-ProfileIntroductionJp = "トリニティ総合学園所属、クリスマスを迎えてサンタ姿に着替えた救護騎士団の団員。\n\n普段活発なハナエらしく、サンタ服も動きやすいものを選んでいる。なんでも楽しめるハナエにとって、クリスマスはまさにお祭りそのものなのだとか。プレゼントの包みを持って鐘を鳴らし、みんなに幸せを伝えるべくボランティアに参加している。"
