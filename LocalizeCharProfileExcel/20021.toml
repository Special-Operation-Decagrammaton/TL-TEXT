20021-ProfileIntroductionJp = "Membro do Esquadrão de Socorro da Academia Trinity, que se vestiu de Papai Noel para celebrar o Natal.\n\nComo é típico da Hanae, que é sempre ativa, ela escolheu uma roupa de Papai Noel que permite facilidade de movimento. Para a Hanae, que consegue se divertir com qualquer coisa, o Natal é como um festival. Carregando pacotes de presentes e tocando um sino, ela participa do voluntariado para levar felicidade a todos."
