101350001-ProfileIntroductionJp = "Kei, que definiu a si mesma como ela é.\n\nDe inteligência artificial para AMAS, de um sacrifício com falhas para o corpo atual. Após muitas reviravoltas, ela está aqui.\n\nComo a Millennium Science School permite que os alunos participem de mais de um clube, embora ela pertença ao Departamento de Investigação de Fenômenos Singulares, ela passa a maior parte do tempo no Departamento de Desenvolvimento de Jogos.\n\nNa prática, ela atua como a nova produtora do Departamento de Desenvolvimento de Jogos, mas... parece que ela nega isso."
