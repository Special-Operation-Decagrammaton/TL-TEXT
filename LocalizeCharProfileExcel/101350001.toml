101350001-ProfileIntroductionJp = "Kei, que agora definiu sua própria identidade.\n\nDe inteligência artificial a AMAS, de um sacrifício defeituoso até o corpo que possui agora. Ela chegou aqui através de muitas provações e reviravoltas.\n\nComo a Escola de Ciências Millennium permite a participação em múltiplos clubes, embora ela pertença ao Departamento de Investigação de Fenômenos Sobrenaturais, ela passa a maior parte do tempo no Departamento de Desenvolvimento de Jogos.\n\nNa prática, ela atua como a nova produtora do Departamento de Desenvolvimento de Jogos... mas ela nega isso." 
