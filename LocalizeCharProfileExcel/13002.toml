13002-ProfileIntroductionJp = "Membro do Clube de Pesquisa Gastronômica da Academia Gehenna.\n\nEmbora pareça uma garota quieta, ela é uma competidora nata que sempre mantém o título de campeã nos torneios de comer de Kivotos. Basicamente, possui uma personalidade calma e bondosa, mas, como uma típica aluna de Gehenna, também tem um lado que não hesita em colocar os outros em situações terríveis quando necessário."
