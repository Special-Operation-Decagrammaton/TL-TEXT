13002-ProfileIntroductionJp = "ゲヘナ学園所属、美食研究会の部員。\n\nおとなしい少女かと思いきや、キヴォトスの大食い大会で常にチャンピオンの座に座り続けるフードファイター。基本的には穏やかで善良な性格だが、ゲヘナ学園の生徒らしく時には他人をひどい目にあわせることも辞さない一面も持ち合わせている。"
