10086-WeaponDescJp = "Uma metralhadora que Hina manuseia como se fosse uma extensão de seu próprio corpo.\n\nNormalmente, é um item que demonstra impiedade contra aqueles que violam as regras escolares ou perturbam a disciplina, mas, desta vez, ela a trata com cuidado e carinho por causa de alguém."
10086-ProfileIntroductionJp = "A presidente do Comitê Disciplinar da Academia Gehenna, que trocou seu uniforme por um vestido para participar da festa.\n\nEmbora seja uma garota que, no fundo, prefere evitar problemas, ela está um pouco mais entusiasmada que o habitual após ouvir que o Sensei estava ansioso pela festa de Gehenna. Dizem que, desde o dia em que decidiu tocar para o Sensei, ela tem se esforçado mais do que nunca nos treinos de piano, algo que ela não domina muito bem."
10086-CharacterSSRNewJp = "Vou me esforçar por você."
