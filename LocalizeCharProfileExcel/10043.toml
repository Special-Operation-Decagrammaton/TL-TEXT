10043-WeaponDescJp = "O rifle favorito de Wakamo.\n\nAssim como o ânimo de Wakamo ao receber o verão, seu cano dispara faíscas carmesins intensas como o calor escaldante contra qualquer um que atrapalhe."
10043-ProfileIntroductionJp = "Pertencente à Academia Hyakkiyako, uma das \"Sete Prisioneiras\", uma garota que floresceu ainda mais radiante com a chegada do verão.\n\nEla visitou a praia de roupa de banho apenas para mostrar seu visual ao Sensei. O motivo de ela estar sorrindo é puramente por ter conhecido o Sensei. Mesmo sob o sol escaldante de verão, ela investe contra o Sensei com uma paixão que não perde para o calor. Uma versão de verão da garota que, como sempre, se dedica de corpo e alma ao amor mais do que qualquer outra pessoa."
10043-CharacterSSRNewJp = "Fufufu... Não ouse desviar o olhar\npor um segundo sequer desta minha forma.\nMeu... que-ri-do♡"
