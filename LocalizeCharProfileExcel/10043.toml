10043-WeaponDescJp = "ワカモが愛用するライフル。\n\n夏を迎え浮足立ったワカモの気分のように、その銃口は邪魔者すべてに向けて灼熱の如く激しい真紅の火花を放つ。"
10043-ProfileIntroductionJp = "百鬼夜行連合学院所属、「七囚人」の一人であり、夏を迎えてより艶やかに咲いた少女。\n\n彼女が水着姿で海を訪れたのは、ただその姿を先生に見せるため。彼女が笑顔でいられるのは、ひとえに先生と出会えたため。どんなに暑い夏の日差しの下でも、それに負けないほどの情熱的なアプローチで先生を襲う。相変わらず誰よりも恋心に全力投球な少女、夏バージョン。"
10043-CharacterSSRNewJp = "ふふふっ……このワカモの姿、\n一瞬たりとも見逃さないでくださいませ。\nあ・な・た・様♡"
