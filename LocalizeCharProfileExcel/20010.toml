20010-WeaponDescJp = "ノドカが常に携帯しているサブマシンガン。\n\n主に温泉郷周辺の暗い夜道を案内する時に使っていたらしいが、迷惑なお客様にお帰りいただく際にも使われていたとか。"
20010-ProfileIntroductionJp = "レッドウィンター連邦学園所属、停学処分を受けて旧校舎227号特別クラスで謹慎中だったのだが、ひょんなことから「227号温泉郷」の女将となった生徒。\n\n突如として旧校舎に湧いた温泉、それによって彼女は一気にお金持ちになることに。しかしその温泉にはレッドウィンターを始めとして個性的な生徒たちが次々と訪れ、あるいは様々な理由で営業妨害をしてくるために、相変わらず彼女の気苦労は絶えない様子。"
20010-CharacterSSRNewJp = "真心を込めて、お客様をお迎えいたします！"
