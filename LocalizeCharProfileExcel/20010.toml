20010-WeaponDescJp = "A submetralhadora que Nodoka carrega consigo o tempo todo.\n\nDizem que ela a usava principalmente para iluminar os caminhos escuros ao redor do resort, mas também era usada para pedir gentilmente que clientes inconvenientes fossem embora."
20010-ProfileIntroductionJp = "Uma aluna da Academia Red Winter que estava cumprindo suspensão na Classe Especial 227 do antigo prédio escolar, mas que, por uma reviravolta do destino, tornou-se a gerente do \"Resort de Fontes Termais 227\".\n\nCom o surgimento repentino de uma fonte termal no antigo prédio, ela acabou ficando rica da noite para o dia. No entanto, como alunas excêntricas da Red Winter e de outros lugares continuam aparecendo, ou tentando sabotar o negócio por vários motivos, ela continua tendo muitas preocupações."
20010-CharacterSSRNewJp = "Receberei nossos clientes com toda a minha sinceridade!"
