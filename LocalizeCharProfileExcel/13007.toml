13007-ProfileIntroductionJp = "ゲヘナ学園所属、美食研究会のお澄ましさんな暴食家。\n\nゲテモノを食べたり暴食を繰り返す他の美食研究会のメンバー達と違い、ある程度常識的な美食を楽しむ方だが、美味しい食べ物を目の前にすると理性を失ってしまうこともある。"
