13007-WeaponDescJp = "Um par de rifles de assalto usados por Junko.\n\nPossuem uma capacidade de disparo rápido poderosa e, no caso de Junko, isso é proporcional ao seu nível de fome, fazendo com que ela suprima inimigos mais rapidamente quando está com o estômago vazio."
13007-ProfileIntroductionJp = "Membro do Clube de Pesquisa Gastronômica da Academia Gehenna, uma comilona que tenta manter a compostura.\n\nDiferente dos outros membros do clube, que comem coisas estranhas e exageram na gula, ela prefere desfrutar de uma gastronomia mais sensata, embora possa perder a razão quando se depara com uma comida deliciosa."
