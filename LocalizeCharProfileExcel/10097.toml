10097-WeaponDescJp = "Pistola de serviço fornecida a Moe pela Academia Especial SRT.\n\nSua armação é forjada em uma robusta liga de molibdênio, o que lhe permite manter uma alta cadência de fogo em disparos contínuos, suportando perfeitamente a umidade e o calor extremo do litoral."
10097-ProfileIntroductionJp = "Operadora do Esquadrão RABBIT, pertencente à Academia Especial SRT, que visitou uma vila de pescadores para uma operação de infiltração.\n\nEla parece extremamente entusiasmada com a oportunidade de testar seu arsenal em um ambiente diferente do habitual. Ao contrário das outras integrantes do esquadrão, ela veste um maiô com um design bastante ousado, mas ela mesma insiste em afirmar e justificar que isso também 'faz parte da ruína'."
