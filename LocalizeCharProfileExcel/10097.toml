10097-ProfileIntroductionJp = "潜入作戦のため漁村を訪れたSRT特殊学園所属RABBIT小隊のオペレーター。\n\n普段とは違う環境で武器を試せることに興奮している様子。他の小隊員とは違い、際どいデザインの水着を着ているが、本人曰くこれも破滅の一部だと主張しているのだとか。"
