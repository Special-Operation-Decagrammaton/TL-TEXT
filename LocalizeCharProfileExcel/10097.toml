10097-WeaponDescJp = "Pistola padrão distribuída pela Academia Especial SRT para Moe.\n\nSeu corpo principal é forjado numa liga de molibdênio ultra-resistente, sendo capaz de disparar rajadas em altíssima velocidade mesmo no ambiente litorâneo super quente e úmido." 
10097-ProfileIntroductionJp = "Operadora do Esquadrão RABBIT da Academia Especial SRT, que visitou uma vila de pescadores para uma missão de infiltração.\n\nEla está super excitada com a chance de poder testar as suas armas de destruição em massa em um ambiente totalmente diferente do habitual. Diferente das outras membras do esquadrão, ela veste um traje de banho com um design bem ousado e provocante, mas, segundo ela mesma, isso também faz parte da sua amada 'ruína e perdição'." 
