10097-WeaponDescJp = "A pistola oficial fornecida a Moe pela Academia SRT.\n\nSua estrutura é feita de uma liga de molibdênio resistente, permitindo disparos rápidos mesmo em ambientes litorâneos quentes e úmidos."
10097-ProfileIntroductionJp = "Operadora do Esquadrão RABBIT da Academia SRT que visitou uma vila de pescadores para uma missão de infiltração.\n\nEla parece empolgada por poder testar suas armas em um ambiente diferente do habitual. Ao contrário dos outros membros do esquadrão, ela usa um traje de banho com um design ousado, alegando, segundo ela, que isso também faz parte da destruição."
