23006-WeaponDescJp = "Uma espingarda de ação por bombeamento usada por Shizuko.\n\nSegundo Shizuko, é \"uma obra-prima única no mundo, que traz um leve aroma do famoso Anmitsu da Hyakkiyako\"."
23006-ProfileIntroductionJp = "Membro da Academia Hyakkiyako e presidente do Comitê de Operações de Festivais.\n\nAo mesmo tempo, é a garota-propaganda e proprietária da tradicional cafeteria \"Hyakkiyako\". Embora costume agir como uma \"garota desastrada que trabalha na Hyakkiyako\", esse é apenas um dos seus lados como garota-propaganda. Na verdade, ela é uma garota com espírito profissional, capaz de fazer qualquer coisa pelo sucesso dos festivais e pelas vendas da Hyakkiyako. No entanto, se ela se descuidar, suas emoções transparecem facilmente, algo que seus amigos próximos e até mesmo o Sensei já perceberam."
