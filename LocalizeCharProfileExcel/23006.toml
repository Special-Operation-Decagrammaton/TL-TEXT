23006-WeaponDescJp = "シズコが使用するポンプアクション式のショットガン。\n\nシズコ曰く「百夜堂名物である餡蜜の匂いもほのかに香る、この世にただ一つの逸品」とのこと。"
23006-ProfileIntroductionJp = "百鬼夜行連合学院所属、お祭り運営委員会の委員長。\n\n同時に、伝統的な喫茶店「百夜堂」の看板娘兼オーナーでもある。普段は「百夜堂で働いているドジっ子な女の子」だが、それはあくまでも看板娘としての一面に過ぎない。実際はお祭りの成功と百夜堂の売上のためなら何でも成し遂げてみせる、プロフェッショナル気質な少女。ただし油断すると感情表現が素直に出てしまうため、親しい友人はもちろん、先生にも全てバレてしまっている。"
