13001-WeaponDescJp = "チセが普段から持ち歩いているグレネードランチャー。\n\n弾丸の一つ一つにチセが作った俳句が書かれているらしい。陰陽部にて現在販売中。"
13001-ProfileIntroductionJp = "百鬼夜行連合学院所属、陰陽部の天然な電波系少女。\n\n俳句のような伝統文化が好きで、陰陽部に入部した。その外見や仕草から滲み出る神秘的な雰囲気を纏っており、そのせいで百鬼夜行の生徒たちから羨望の的になっているが、本人はそのことをほとんど自覚していない。"
