13001-ProfileIntroductionJp = "Uma garota excêntrica e aérea do Departamento Yin-Yang, da Academia Hyakkiyako.\n\nEla gosta de cultura tradicional, como haikus, e por isso entrou para o Departamento Yin-Yang. Ela possui uma aura misteriosa que transparece em sua aparência e gestos, o que a torna alvo de admiração entre os alunos de Hyakkiyako, embora ela mesma quase não tenha consciência disso."
