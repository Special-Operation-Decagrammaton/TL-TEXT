10132-WeaponDescJp = "Uma submetralhadora que Tsukuyo estima muito.\n\nEla não a decora de forma especial quando a leva para o palco. Provavelmente, o visual que Michiru e Izuna criaram para ela anteriormente é o estado perfeito para a Tsukuyo."
10132-ProfileIntroductionJp = "Membro do Clube de Pesquisa de Ninjutsu da Academia Hyakkiyako.\n\nEmbora tenha sido contratada como segurança para um desfile de moda, acabou estreando como modelo. Sua altura, que antes era um complexo, tornou-se uma grande vantagem na indústria da moda. Pelo que parece, ela está preocupada em como conciliar a carreira de modelo com as atividades do clube."
