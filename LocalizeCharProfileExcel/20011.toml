20011-WeaponDescJp = "O fuzil de assalto que Serika carrega consigo mesmo quando vai trabalhar.\n\nNem mesmo o trabalho de meio período como sacerdotisa é uma exceção, e parece que ela também o utiliza para acalmar alunos problemáticos que causam confusão durante o Ano Novo."
20011-ProfileIntroductionJp = "Membro do Comitê de Contramedidas de Abydos e a responsável pelas finanças, que é uma pessoa sensata (?) mesmo vestida de sacerdotisa.\n\nPara ser útil ao Comitê de Contramedidas, Serika sempre se esforçou seriamente em vários trabalhos de meio período. Ao chegar o Ano Novo, o trabalho que ela escolheu foi o de sacerdotisa. Embora ela não tenha um interesse especial ou conhecimento profundo sobre o papel, devido à sua personalidade de sempre tentar concluir com perfeição qualquer tarefa que lhe seja confiada, ela está se dedicando ao máximo desta vez também (aparentemente, há um motivo oculto de que o salário por hora aumenta se ela agir mais como uma sacerdotisa de verdade)."
20011-CharacterSSRNewJp = "Bem, se for por você, Sensei, eu posso fazer quantas orações forem necessárias..."
