20011-WeaponDescJp = "セリカがバイトに出る時も携帯しているアサルトライフル。\n\n巫女さんのアルバイトであってもそれは例外ではなく、新年だからと他者に迷惑をかける問題児の沈静化にも使われている模様。"
20011-ProfileIntroductionJp = "アビドス対策委員会所属、巫女さん姿のしっかり者（？）の会計担当。\n\n少しでも対策委員会の役に立つために、これまでも色々とアルバイトを掛け持ちして真面目に頑張ってきたセリカ。新年を迎えて彼女が選んだのは巫女さんのアルバイトだった。特別巫女さんが好きだったり造詣が深いわけではないものの、基本的に任せられればしっかりやり遂げようとする彼女の性格もあって、今回もまた全力で頑張っている様子（どうやら、より巫女っぽく振舞えれば時給が上がるという裏事情もある模様）。"
20011-CharacterSSRNewJp = "別にお祈りくらい、先生のためなら幾らでも……"
