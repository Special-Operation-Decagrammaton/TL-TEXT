10035-ProfileIntroductionJp = "Membro da Academia Trinity e presidente do Comitê da Biblioteca.\n\nUma garota que ama livros acima de tudo. Embora não se saiba o que veio primeiro, se o ovo ou a galinha, ela também é bastante antissocial. Ela prefere livros antigos a qualquer outro tipo e passa seus dias reclusa no local conhecido como \"Biblioteca Antiga\", onde se dedica à decifração e organização de manuscritos. Sua curiosidade intelectual, bem como seu conhecimento e habilidades relacionados a livros antigos, são de primeira linha, o que lhe rendeu o apelido de \"Maga da Biblioteca Antiga\" entre aqueles ao seu redor."
10035-CharacterSSRNewJp = "A-ah, por favor, um pouco mais de silêncio..."
