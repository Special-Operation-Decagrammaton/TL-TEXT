10035-ProfileIntroductionJp = "トリニティ総合学園所属、図書委員会の委員長。\n\nこよなく本を愛する少女であり、鶏が先か卵が先かは不明なものの、同時に中々の人嫌いでもある。本の中でも特に古書を好んでおり、彼女自身も日々「古書館」と呼ばれる場所で古書の解読や管理を行いつつ、引きこもるようにして日々を過ごしている。その知的好奇心や、古書に関する知識および技術は一級品であり、周囲から二つ名として「古書館の魔術師」と呼ばれるほど。"
