10118-ProfileIntroductionJp = "ハイランダー鉄道学園所属、CCC（中央管制センター）の幹部。\n\n陽気かつハツラツとした性格で、細かいことは気にしない。そのせいか、双子の姉であるヒカリと一緒にトラブルを引き起こすこともしばしば。面白そうなものにはとりあえず飛び込む性格だが、列車運行に関しては責任を持って臨んでいる。"
