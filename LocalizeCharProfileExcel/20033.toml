20033-WeaponDescJp = "マコトが使用するスナイパーライフル。\n\n自身の権威を示すべく、ゲヘナでも有名な職人に直接依頼して作った正真正銘の逸品である。だが、マコト自身は表に出るより、後ろから指示するのを好むことから、実際に使用することは滅多にない模様。"
20033-ProfileIntroductionJp = "ゲヘナ学園所属、「万魔殿」の議長。\n\n欲しいものがあれば、どんな謀も厭わない、欲望に忠実な野心家であり陰謀家。時にはその態度のせいで痛い目に遭い挫けることも多いが、すぐさま立ち直る芯の強い少女。イブキを妹のように可愛がっており、同じくイロハのことも妹のようにこき使っている。"
20033-CharacterSSRNewJp = "さあ！先生よ！\n我々「万魔殿」と共に邁進する時だ！"
