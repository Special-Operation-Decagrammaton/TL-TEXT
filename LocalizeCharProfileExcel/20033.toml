20033-WeaponDescJp = "O rifle de precisão usado por Makoto.\n\nUma obra-prima genuína, encomendada diretamente a um artesão famoso de Gehenna para demonstrar sua autoridade. No entanto, como Makoto prefere dar ordens de trás das linhas em vez de aparecer na linha de frente, parece que ela raramente o utiliza."
20033-ProfileIntroductionJp = "Membro da Academia Gehenna e presidente do \"Pandemonium\".\n\nUma ambiciosa e conspiradora fiel aos seus desejos, que não hesita em usar qualquer estratagema para conseguir o que quer. Embora muitas vezes acabe se dando mal e se frustrando por causa de sua atitude, ela é uma garota de fibra que se recupera rapidamente. Ela trata Ibuki como uma irmã mais nova e, da mesma forma, vive dando ordens a Iroha como se fosse sua irmã mais nova também."
20033-CharacterSSRNewJp = "Vamos lá! Sensei!\nÉ hora de avançarmos juntos com o \"Pandemonium\"!"
