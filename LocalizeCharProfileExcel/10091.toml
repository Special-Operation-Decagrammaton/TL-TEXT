10091-ProfileIntroductionJp = "Aluna da Academia Trinity, membro do Clube de Doces Depois da Aula e vocalista principal e baixista da banda formada às pressas, \"Sugar Rush\".\n\nAcabou ficando responsável pelos vocais principais por ter deixado escapar algo que não devia. No entanto, devido à sua personalidade, ela não foge de suas responsabilidades. Ela já se acostumou completamente com os eventos barulhentos que vive com todos e aceita a banda com naturalidade."
