10091-ProfileIntroductionJp = "トリニティ総合学園所属、放課後スイーツ部の部員であり、急遽結成されたバンド「シュガーラッシュ」のメインボーカル兼ベース。\n\n口が滑ったせいで、メインボーカルを担当することになる。しかし彼女の性格上、逃げたりはしない。みんなと駆け抜ける騒がしい出来事も今はすっかり慣れていて、バンドのことも平然と受け入れている。"
