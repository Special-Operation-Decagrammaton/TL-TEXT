10054-WeaponDescJp = "A pistola que Mari carrega.\n\nNormalmente, é usada para fins pacíficos, como disparar o sinal de início de uma partida, mas... ocasionalmente, o cano acaba sendo apontado para alunos delinquentes sem intenção."
10054-ProfileIntroductionJp = "Uma irmã da Sisterhood da Academia Trinity, que trocou seu traje por roupas de ginástica para participar do Festival Esportivo de Kivotos.\n\nAo ouvir que o festival era para rezar pela paz em Kivotos, ela se voluntariou para o comitê executivo, mas, ao começar, percebeu que conflitos e problemas surgiam constantemente. Além disso, devido à sua natureza gentil e incapaz de ignorar os outros, Mari acaba se envolvendo em diversos problemas."
10054-CharacterSSRNewJp = "Que todos possam passar este grande festival esportivo\ncom sorrisos e muita alegria..."
