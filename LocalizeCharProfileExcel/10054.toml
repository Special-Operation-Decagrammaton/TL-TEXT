10054-WeaponDescJp = "マリーが所持している拳銃。\n\n普段は試合開始を告げる信号弾といった平和な用途だが……時折、意図せず不良生徒にその銃口が向くこともある。"
10054-ProfileIntroductionJp = "トリニティ総合学園所属、晄輪大祭に参加するため、体操服に着替えたシスターフッドのシスター。\n\nキヴォトスの平和を祈るお祭りと聞いて、実行委員の仕事に志願したものの、蓋を開けてみれば絶えず争いとトラブルが発生していた。それに加え、元来他人を放っておけない優しい性格も相まって、マリーは様々なトラブルに巻き込まれ続けている様子。"
10054-CharacterSSRNewJp = "この大運動会で\nみんなが笑顔で楽しく過ごせますように……"
