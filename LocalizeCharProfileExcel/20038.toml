20038-ProfileIntroductionJp = "山海経との交流会でチーパオに着替えたレッドウィンター連邦学園、秘書室長のトモエ。\n\nレッドウィンターとは異なる環境に戸惑いながらも交流会を楽しんでいる様子。新しい衣装も、とても興味深そうに袖を通している。\n今回の交流会において、彼女の巧みな話術と洞察力は健在のようだ。"
20038-CharacterSSRNewJp = "新たな土地、新たな装い……。\nでは、何からお話しましょうか？"
