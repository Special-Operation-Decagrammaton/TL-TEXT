20026-WeaponDescJp = "O fuzil de assalto robusto que Minori usa com frequência.\n\nCom uma estrutura simples, este fuzil de assalto tem, como o nome sugere, mantido a chama acesa silenciosamente diante do caminho de luta que Minori percorre."
20026-ProfileIntroductionJp = "Chefe do Departamento de Obras Públicas da Academia Federal Red Winter.\n\nEla envia pessoas e comanda o local onde quer que seja necessária mão de obra, como em grandes obras de engenharia civil ou construção. Embora sua habilidade no trabalho seja inquestionável, ela é notória entre seus empregadores por iniciar greves e manifestações por qualquer motivo trivial."
