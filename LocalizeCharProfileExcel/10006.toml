10006-WeaponDescJp = "イオリが規則違反者たちの起こす問題に対処する時に使うスナイパーライフル。\n\nスコープも付いていないシンプルな形だが、イオリ曰く「スペシャリストは道具を選ばない」とのこと。"
10006-ProfileIntroductionJp = "ゲヘナ学園所属、風紀委員会の冷酷なスペシャリスト。\n\n風紀委員会の切り込み隊長として、規則違反の生徒を見つけると圧倒的な力で即座に処罰する。頭の回転も速く、仕事もでき、戦闘センスも悪くない方だが、敵を発見すると周囲が見えなくなる無鉄砲な一面もあるため、単純な落とし穴にも結構簡単にはまる。"
10006-CharacterSSRNewJp = "校則違反をする奴らは許さない！"
