10006-WeaponDescJp = "O rifle de precisão que Iori usa para lidar com os problemas causados por quem viola as regras.\n\nÉ um modelo simples, sem nem mesmo uma mira telescópica, mas, segundo Iori, \"um especialista não escolhe suas ferramentas\"."
10006-ProfileIntroductionJp = "Uma especialista implacável do Comitê Disciplinar da Academia Gehenna.\n\nComo capitã de vanguarda do Comitê Disciplinar, ela pune imediatamente qualquer aluno que viole as regras com um poder avassalador. Ela é rápida, eficiente e tem um bom senso de combate, mas também tem um lado imprudente que a faz perder a noção do que está ao seu redor quando encontra um inimigo, o que a faz cair facilmente em armadilhas simples."
10006-CharacterSSRNewJp = "Eu não vou perdoar quem violar as regras da escola!"
