20057-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、ミレニアムEXPOのガイドを務めることになった「C&C」のエージェント。\n\n潜入作戦のために制服に着替えているのだとか。メイドやエージェントでなく、普通の生徒として行動できるようになったことで、より一層穏やかな空気を纏っている。\n\nだが、「お掃除」のやり方を忘れたわけではない模様。"
