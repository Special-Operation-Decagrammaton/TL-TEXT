20057-ProfileIntroductionJp = "Агент C&C из академии Миллениум, назначенная в качестве гида на выставку Millennium EXPO.\n\nОна говорит, что переоделась в школьную форму ради миссии по проникновению. Возможность побыть обычной студенткой, а не горничной или секретным агентом, придаёт ей ещё более нежный и кроткий вид.\n\nВпрочем, кажется, она ни капли не забыла, как именно нужно проводить «уборку»."
20057-CharacterSSRNewJp = "Если не возражаете, не желаете ли вы прогуляться по Миллениуму вместе со мной?"