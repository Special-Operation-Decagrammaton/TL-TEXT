10003-ProfileIntroductionJp = "トリニティ総合学園所属、補習授業部の多情多感な少女。\n\n外見も成績も普通だが、穏やかで優しい性格なため周囲から人気がある。周りの人々の悩みや話をよく聞いてくれるものの、そのせいで雰囲気に流されてしまい、意図せずトラブルを起こしてしまうこともある。"
