26014-ProfileIntroductionJp = "Uma agente da \"C&C\" pertencente ao Millennium Science School, que foi designada como guia da Millennium EXPO.\n\nEla trocou seu traje habitual para atuar simultaneamente como guia do evento e guarda-costas de autoridades. Devido à natureza de seu clube, ela geralmente usa um uniforme de empregada, então não consegue esconder sua empolgação com esta oportunidade rara. Por ser calma e sociável, parece ter conquistado a confiança de todos como guia."
