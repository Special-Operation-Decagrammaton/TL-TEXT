20015-WeaponDescJp = "カエデがいつも持ち歩いている拳銃。\n\nその実態としては信号拳銃であり、何か問題を起こしている生徒や、あるいは珍しいムシクイーンのカードを発見した時などに使用される。"
20015-ProfileIntroductionJp = "百鬼夜行連合学院所属、修行部の元気な部員。\n\n元々は百鬼夜行でもかなり田舎の方に住んでいたいたずらっ子だったが、ふとしたタイミングでツバキとミモリに出会い、「あんな素敵なレディーになりたい！」と修行部へ入ることに。理想に近づくために日々研鑽を積んでいるが、その修行の大半はなぜかトラブルに繋がってしまう。"
20015-CharacterSSRNewJp = "素敵なレディーになるために！\nさあ先生、今日も張り切って行こう！"
