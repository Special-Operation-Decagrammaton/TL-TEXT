20015-WeaponDescJp = "A pistola que Kaede carrega consigo o tempo todo.\n\nNa verdade, é uma pistola sinalizadora, usada quando ela encontra alunos causando problemas ou quando descobre uma carta rara de Mushiking."
20015-ProfileIntroductionJp = "Uma integrante enérgica do Clube de Treinamento da Academia Hyakkiyako.\n\nOriginalmente, ela era uma criança travessa que vivia em uma área bem rural de Hyakkiyako, mas após conhecer Tsubaki e Mimori por acaso, ela decidiu entrar para o Clube de Treinamento pensando: \"Eu quero me tornar uma dama maravilhosa como elas!\". Ela se dedica aos estudos diariamente para se aproximar de seu ideal, mas, por algum motivo, a maior parte de seu treinamento acaba resultando em problemas."
20015-CharacterSSRNewJp = "Para me tornar uma dama maravilhosa!\nVamos lá, Sensei, vamos dar o nosso melhor hoje também!"
