10108-ProfileIntroductionJp = "Membro do Millennium Science School, a tesoureira do Seminar que trocou de roupa para um pijama na esperança de ter um descanso tranquilo.\n\nEmbora ela demonstre um trabalho perfeito todos os dias, é difícil dizer que ela está descansando bem devido ao estresse e à insônia causados por problemas incessantes.\nEla preparou um travesseiro fofinho e um pijama confortável, mas... por causa de certa pessoa que vive causando confusão em Millennium dia e noite, parece que o dia em que ela terá uma noite de sono profundo ainda está longe."
