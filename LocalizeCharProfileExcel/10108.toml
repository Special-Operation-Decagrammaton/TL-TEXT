10108-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、ゆったりとした休息をとるべくパジャマに着替えたセミナーの会計。\n\n日々、完璧な仕事ぶりを見せる彼女だが、絶えないトラブルによるストレスと不眠症のため、しっかり休めているとは言い難い。\nふわふわの枕と肌触りの良いパジャマを用意したものの……昼夜を問わずミレニアムを騒がす誰かさんのせいで、熟睡できる日はまだ先になりそうだ。"
