10119-WeaponDescJp = "Um rifle antigo que emana uma atmosfera misteriosa.\n\nÉ uma arma transmitida de geração em geração pela Grande Profetisa Kuzunoha, e ser capaz de manejar a Hyakuren é a prova de ser a sucessora legítima do Hyakka Ryoran. Inúmeras cicatrizes e marcas de reparo contam a história e os sentimentos que foram tecidos ao longo do tempo."
10119-ProfileIntroductionJp = "Uma garota pertencente à Academia Hyakkiyako, membro do Comitê de Mediação de Conflitos Hyakka Ryoran.\n\nOriginalmente, era a vice-presidente do Hyakka Ryoran. Após o desaparecimento da presidente anterior, Ayame, ela herdou a Hyakuren. Embora seja tímida, tenha baixa autoestima e uma personalidade indecisa, ela ainda guarda dentro de si a força para superar o medo e seguir em frente por aqueles que são importantes para ela."
10119-CharacterSSRNewJp = "Aguardando ansiosamente pelo momento em que cem flores desabrocharão"
