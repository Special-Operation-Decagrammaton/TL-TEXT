10119-WeaponNameJp = "百蓮"
10119-WeaponDescJp = "どこか神秘的な雰囲気を放つ、古びたライフル。\n\n大預言者クズノハから代々受け継がれてきた銃であり、この百蓮を扱えることが、百花繚乱の正統な継承者の証となる。無数の傷と補修痕が、紡がれてきた歴史と想いを物語る。"
10119-ProfileIntroductionJp = "百鬼夜行連合学院所属、百花繚乱紛争調停委員会の少女。\n\nもとは百花繚乱の副委員長。先代の委員長であるアヤメが姿を消した後、百蓮を譲り受けた。臆病で自尊心が低く、優柔不断な性格ではあるが、それでも大切な者のためなら恐怖を乗り越え、前に進む強さを内に秘めている。"
10119-CharacterSSRNewJp = "百の花が咲き誇る、その瞬間を待ち詫びて"
