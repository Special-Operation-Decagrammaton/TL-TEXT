26002-ProfileIntroductionJp = "ゲヘナ学園所属、学生食堂の管理を担当する給食部のメンバー。\n\nフウカと同じく、生徒達のため頑張って食事を作っている少女なのだが、彼女の料理の腕前は悪いという水準を超えて壊滅的であるため、給食づくりにはあまり役に立たずにいる。しかしフウカの励ましと指導を受け、彼女は今日もよりいい料理を作るために努力を重ねている。"
