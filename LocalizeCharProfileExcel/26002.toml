26002-WeaponDescJp = "A espingarda que Juri possui.\n\nEla foi dada a ela para subjugar os alunos problemáticos que causam confusão no refeitório, mas, por algum motivo, ela a usa frequentemente como utensílio de cozinha."
26002-ProfileIntroductionJp = "Membro do Clube de Merenda, responsável pela gestão do refeitório estudantil da Academia Gehenna.\n\nAssim como Fuuka, ela é uma garota que se esforça para preparar refeições para os alunos, mas suas habilidades culinárias são tão desastrosas que vão além do nível de \"ruim\", tornando-a pouco útil na preparação da merenda. No entanto, incentivada e orientada por Fuuka, ela continua se esforçando todos os dias para fazer pratos melhores."
