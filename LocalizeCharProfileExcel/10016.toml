10016-WeaponDescJp = "O rifle de precisão usado por Midori.\n\nPossui um acessório dado por sua querida irmã mais velha, e dizem que, quando ela está em apuros, mexer nele faz com que a inspiração surja."
10016-ProfileIntroductionJp = "Ilustradora do Departamento de Desenvolvimento de Jogos, pertencente ao Millennium Science School.\n\nUma garota que, junto com sua irmã gêmea Momoi, desenvolve jogos literalmente no Departamento de Desenvolvimento de Jogos. Devido à sua personalidade tímida, ela não se dava muito bem com sua irmã naturalmente alegre, mas elas se conectaram através da paixão pelos jogos e agora são melhores amigas."
10016-CharacterSSRNewJp = "Esta ilustração é uma das minhas melhores!"
