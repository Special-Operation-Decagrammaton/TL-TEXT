10067-WeaponDescJp = "Um rifle de assalto exclusivo da Toki.\n\nEla afirma que é adequado não apenas para missões comuns, mas também para operações secretas. Ela mesma provará que essa afirmação é verdadeira."
10067-ProfileIntroductionJp = "Uma agente da C&C, a organização secreta do Millennium Science School, que acredita piamente que o traje de coelhinha é o ideal para missões de infiltração.\n\nTalvez por ter ocupado uma posição especial, ela parece um pouco mais animada do que o habitual por ter sido designada para uma missão de infiltração, algo com que não estava acostumada. Embora demonstre estar secretamente feliz por poder realizar uma missão semelhante à de suas veteranas da C&C, ela tenta manter uma aparência calma."
10067-CharacterSSRNewJp = "Preparativos para a missão concluídos. Podemos ir a qualquer momento.\nEste traje...? Algum problema?"
