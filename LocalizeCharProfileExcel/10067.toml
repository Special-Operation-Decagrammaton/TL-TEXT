10067-WeaponDescJp = "トキ専用のアサルトライフル。\n\n通常の任務だけでなく秘密作戦にも適していると彼女は主張している。彼女自身の手によって、その主張が正しいものであると証明してくれる。"
10067-ProfileIntroductionJp = "潜入作戦なら当然バニーガール服だと信じてやまない、ミレニアムサイエンススクール所属、秘密組織「C&C」のエージェント。\n\n普段特殊な立ち位置にいたからか、あまり縁がなかった潜入任務を任されたことに、いつもより少しテンションが上がっている模様。C&Cの先輩と同じような任務ができる事に内心嬉しそうな姿を見せるが、本人は平静を装っている。"
10067-CharacterSSRNewJp = "作戦遂行準備、完了。いつでも行けます。\nこの格好……？何か問題でも？"
