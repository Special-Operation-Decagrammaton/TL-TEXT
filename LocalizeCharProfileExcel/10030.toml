10030-WeaponDescJp = "A pistola favorita de Chinatsu.\n\nÉ pequena e fácil de carregar, sendo perfeita para missões de infiltração em locais como a estância termal."
10030-ProfileIntroductionJp = "Membro do Comitê Disciplinar de Gehenna, responsável pelos primeiros socorros, que visitava a estância termal de Red Winter por acaso durante uma missão.\n\nDesde encomendar novos suprimentos médicos até lidar com o Departamento de Desenvolvimento de Fontes Termais de Gehenna, os problemas que a preocupam continuam se acumulando, mesmo estando na estância. Ainda assim, talvez por causa da bela paisagem e da atmosfera relaxante do local, sua expressão está mais suave do que o habitual."
10030-CharacterSSRNewJp = "……Que tal relaxarmos um pouco, pelo menos por hoje?"
