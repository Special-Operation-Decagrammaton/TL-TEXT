10030-ProfileIntroductionJp = "ゲヘナ学園所属、任務として偶然レッドウィンターの温泉郷を訪れていたゲヘナ風紀委員会の救護担当。\n\n新たな医薬品の発注から、ゲヘナ温泉開発部の対処まで、たとえ温泉郷にいても彼女を悩ませる問題は山積みである。それでも温泉郷の綺麗な景色やそのゆったりとした雰囲気のせいか、彼女の表情はいつもよりも柔らかい。"
