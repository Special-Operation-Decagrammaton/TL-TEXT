16000-ProfileIntroductionJp = "Membro da Academia Gehenna e funcionária da Problem Solver 68.\n\nDevido à sua personalidade sombria e melancólica, ela sofreu bullying desde a infância, mas graças a Aru, conseguiu escapar dessa situação. Desde então, ela atua na Problem Solver 68 ocupando a posição de caçula. Embora seja tímida e tenha baixa autoestima, não é exagero dizer que suas ideias excêntricas são as mais assustadoras dentro do grupo."
