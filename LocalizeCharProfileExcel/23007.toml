23007-ProfileIntroductionJp = "Uma garota de sensibilidade aguçada que pertence à Escola Trinity e ao Clube de Aulas de Reforço.\n\nÀ primeira vista, ela parece uma jovem recatada e elegante... mas, na verdade, é uma aluna problemática que não consegue parar de dizer coisas sugestivas quando abre a boca. Os membros do Clube de Aulas de Reforço, que sabem disso, ficam sempre tensos toda vez que a Hanako tenta dizer algo."
