10071-WeaponDescJp = "Submetralhadora de serviço fornecida a Miyako pela Academia Especial SRT.\n\nÉ uma arma de altíssima confiabilidade, permitindo a execução eficiente de operações mesmo em ambientes de praia com alta temperatura e umidade."
10071-ProfileIntroductionJp = "Líder do Esquadrão RABBIT, pertencente à Academia Especial SRT, que visitou uma pacata vila de pescadores para uma operação de infiltração.\n\nPara investigar o misterioso sumiço dos camarões das marmitas (bentos) das lojas de conveniência, ela precisou trocar seu uniforme por trajes de banho. Embora a vila costeira em que se infiltraram seja um lugar suspeito e bem longe de ser um ponto turístico badalado, parece que ela não abriu mão de usar um maiô fofinho para a ocasião."
10071-CharacterSSRNewJp = "Aqui é RABBIT1.\nAcabei de chegar ao mar."