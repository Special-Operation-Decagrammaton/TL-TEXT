10071-WeaponDescJp = "A submetralhadora padrão fornecida a Miyako pela Academia SRT.\n\nÉ uma arma que ostenta alta confiabilidade, permitindo a execução eficiente de missões mesmo em ambientes litorâneos quentes e úmidos."
10071-ProfileIntroductionJp = "Líder do Esquadrão RABBIT, pertencente à Academia SRT, que visitou uma vila de pescadores para uma missão de infiltração.\n\nPara investigar o motivo do desaparecimento dos camarões das marmitas da loja de conveniência, ela decidiu trocar de roupa para um traje de banho. Embora a vila de pescadores onde se infiltrou fosse um lugar suspeito, longe de ser um ponto turístico, parece que ela não abre mão de um traje de banho fofo."
10071-CharacterSSRNewJp = "Aqui é RABBIT 1.\nAcabei de chegar ao mar."
