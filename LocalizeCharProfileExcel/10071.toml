10071-WeaponDescJp = "Submetralhadora padrão distribuída pela Academia Especial SRT para Miyako.\n\nÉ uma arma de altíssima confiabilidade, capaz de conduzir operações de forma eficaz mesmo em litorais quentes e úmidos." 
10071-ProfileIntroductionJp = "Comandante do Esquadrão RABBIT da Academia Especial SRT, que visitou uma vila de pescadores para uma missão de infiltração.\n\nPara investigar o motivo pelo qual os camarões desapareceram das marmitas das lojas de conveniência, ela teve que trocar de roupa para um traje de banho. Embora a vila de pescadores fosse um lugar suspeito e longe de ser um destino turístico, parece que ela não abre mão de usar um traje de banho fofo." 
