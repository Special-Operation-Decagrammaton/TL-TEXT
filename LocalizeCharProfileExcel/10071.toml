10071-ProfileIntroductionJp = "潜入作戦のため漁村を訪れたSRT特殊学園所属RABBIT小隊の小隊長。\n\nコンビニのお弁当からエビが消えた理由を調査すべく、水着に着替える事に。潜入先の漁村は観光とはかけ離れた怪しい場所だったものの、それでもかわいい水着だけは譲れない模様。"
