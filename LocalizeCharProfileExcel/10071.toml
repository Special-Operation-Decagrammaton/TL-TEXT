10071-WeaponDescJp = "Submetralhadora padrão fornecida à Miyako pela Academia Especial SRT.\n\nÉ uma arma que ostenta uma altíssima confiabilidade, permitindo a execução eficiente de operações até mesmo em áreas litorâneas com altas temperaturas e muita umidade."
10071-ProfileIntroductionJp = "Aluna da Academia Especial SRT e Capitã do Esquadrão RABBIT, que visitou uma vila de pescadores para uma operação de infiltração.\n\nPara investigar o misterioso sumiço dos camarões das marmitas das lojas de conveniência, ela precisou vestir trajes de banho. Embora a vila pesqueira da missão seja um lugar suspeito que passa longe de ser um ponto turístico, parece que ela fez questão de não abrir mão de usar um biquíni fofo."
