10005-WeaponDescJp = "Uma espingarda de design simples que Hoshino adora usar.\n\nEmbora ela seja basicamente preguiçosa, ela nunca negligencia a manutenção de sua arma."
10005-ProfileIntroductionJp = "Pertencente à Escola Secundária Abydos, ela é a ex-vice-presidente do conselho estudantil de Abydos e atualmente atua como presidente do Comitê de Contramedidas, sendo uma garota preguiçosa.\n\nSua característica marcante é falar como uma pessoa mais velha e ela prefere brincar a trabalhar. Por causa disso, ela vive levando bronca dos membros do comitê, mas quando uma missão começa, ela luta na linha de frente para proteger os outros membros."
10005-CharacterSSRNewJp = "Eu não consegui tirar minha soneca nem um pouco,\nmas bem, não tem jeito, né?"
