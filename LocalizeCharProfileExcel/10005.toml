10005-ProfileIntroductionJp = "アビドス高等学校所属、アビドス生徒会の元副会長であり、現在は対策委員会の委員長を務める怠け者の少女。\n\nおじさんのような口癖が特徴で、仕事よりは遊ぶ方が好き。そのため普段は委員会のメンバーに怒られてばかりだが、任務が始まると他のメンバーを守ろうと最前線で奮闘する。"
