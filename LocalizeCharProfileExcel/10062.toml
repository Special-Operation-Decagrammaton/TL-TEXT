10062-WeaponDescJp = "O fuzil de assalto exclusivo da Toki.\n\nPossui um desempenho condizente com sua aparência, eliminando todos os alvos que interferem na missão. Dizem que o nome não foi escolhido por ela, mas sim por quem a nomeou."
10062-ProfileIntroductionJp = "Membro da Millennium Science School e a quinta agente da organização secreta \"C&C\".\n\nEmbora pertença à C&C, ela atuava anteriormente como empregada e guarda-costas exclusiva de Rio, por isso quase ninguém conhece o rosto de Toki. Uma agente excelente que luta com base em armas e tecnologias de ponta. Até agora, suas operações eram principalmente solo, mas, na verdade, ela tem um lado solitário."
10062-CharacterSSRNewJp = "Por favor, sinta-se à vontade para me pedir o que desejar.\nAfinal, sou uma agente e empregada perfeita."
