10083-WeaponDescJp = "キキョウが肌身離さず持ち歩いているライフル。\n\n作戦参謀を務めているため、実際にこれを使うことは稀である。しかし、完璧な勝利のためなら自ら囮になるのも厭わないキキョウは、この銃に助けられたことも多々あるのだとか。"
10083-ProfileIntroductionJp = "百鬼夜行連合学院所属、百花繚乱紛争調停委員会の作戦参謀。\n\n常識と論理、理性を重んじる少女。作戦参謀として勝利を重視するが、それ以上に大切にするのは味方の安全である。冷酷なようでいて優しい少女。"
10083-CharacterSSRNewJp = "あんたの判断が間違ってないってこと、証明して見せて"
