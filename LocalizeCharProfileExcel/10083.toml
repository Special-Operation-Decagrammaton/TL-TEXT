10083-WeaponDescJp = "O rifle que Kikyou carrega consigo o tempo todo.\n\nComo ela atua como estrategista de operações, é raro que ela precise usá-lo. No entanto, dizem que Kikyou, que não se importa em servir de isca se for para garantir uma vitória perfeita, já foi salva por esta arma inúmeras vezes."
10083-ProfileIntroductionJp = "Membro da Academia Hyakkiyako, estrategista de operações do Comitê de Mediação de Conflitos Hyakkaryouran.\n\nUma garota que valoriza o bom senso, a lógica e a razão. Como estrategista, ela prioriza a vitória, mas valoriza a segurança de seus aliados acima de tudo. Uma garota que parece fria, mas é gentil."
10083-CharacterSSRNewJp = "Mostre-me que o seu julgamento não está errado."
