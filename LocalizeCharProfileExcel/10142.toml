10142-WeaponDescJp = "Старая винтовка, источающая едва уловимую мистическую атмосферу.\n\nУнаследованный от Великой пророчицы Кузунохи, этот символ председателя Хякарюран тихо сияет даже посреди синего моря."
10142-ProfileIntroductionJp = "Председатель следственного комитета Хякарюран из академии Хяккияко, которая переоделась в купальник, чтобы встретить лето.\n\nОна принимает участие в Водном фестивале Хякки, чтобы укрепить единство между всеми. Её лидерство, подобное изящно распускающемуся цветку, символизирует возрождение Хякарюран."
10142-CharacterSSRNewJp = "Печать на моей правой руке... сорвана. Ладно, шучу."