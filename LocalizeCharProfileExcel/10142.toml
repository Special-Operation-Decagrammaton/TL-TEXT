10142-WeaponDescJp = "Um rifle antigo que emana uma aura misteriosa.\n\nA prova da presidente da Hyakkaryouran herdada da grande profetisa Kuzunoha brilha silenciosamente mesmo no mar azul."
10142-ProfileIntroductionJp = "A presidente do Comitê de Resolução de Conflitos Hyakkaryouran, pertencente à Academia Combinada Hyakkiyako, que trocou sua roupa por um traje de banho para o verão.\n\nEla participa do Festival Aquático de Hyakuya com o objetivo de promover a união com todos. Sua liderança, como uma flor que desabrocha de forma encantadora, simboliza o renascimento da Hyakkaryouran."
