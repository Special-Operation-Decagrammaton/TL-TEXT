10142-WeaponDescJp = "どこか神秘的な雰囲気を放つ、古びたライフル。\n\n大預言者クズノハから受け継がれた百花繚乱の部長の証は、青い海でも静かに輝いている。"
10142-ProfileIntroductionJp = "夏を迎え水着に着替えた百鬼夜行連合学院所属、百花繚乱紛争調停委員会の委員長。\n\nみんなと団結を図るため、百夜水上祭に参加する。可憐に咲く花のような彼女のリーダーシップは、百花繚乱の復活を象徴している。"
