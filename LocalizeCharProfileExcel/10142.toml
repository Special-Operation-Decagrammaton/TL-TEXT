10142-WeaponDescJp = "Um rifle antigo que emana uma aura misteriosa.\n\nA prova de liderança da Hyakkaryouran, herdada\ndo Grande Profeta Kuzunoha, continua brilhando\nsilenciosamente, mesmo no mar azul." 
10142-ProfileIntroductionJp = "Presidente do Comitê de Mediação de Conflitos Hyakkaryouran,\nda Academia Aliada Hyakkiyako, que vestiu um maiô para receber o verão.\n\nPara tentar promover a união entre as alunas, ela participa do\nFestival Aquático das Cem Noites. Sua liderança, que lembra uma\nbela flor desabrochando, simboliza o renascimento da Hyakkaryouran." 
