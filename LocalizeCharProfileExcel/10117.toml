10117-ProfileIntroductionJp = "ハイランダー鉄道学園所属、CCC（中央管制センター）の幹部。\n\n列車の運転においてずば抜けた才能を持ち、双子の妹であるノゾミと一緒に幹部に選ばれた。しかし、書類や管理業務は大の苦手。その時々の欲求に忠実かつ、他人の視線を気にしないマイペースな性格のため、あらゆる事件を巻き起こす。"
