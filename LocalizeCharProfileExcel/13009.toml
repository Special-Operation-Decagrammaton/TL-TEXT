13009-WeaponDescJp = "A submetralhadora usada por Tsubaki.\n\nParece que ela escolheu um modelo menor para não atrapalhar durante seu treinamento diário. A propósito, a I seria o travesseiro que fica dentro do escudo."
13009-ProfileIntroductionJp = "Membro da Academia Hyakkiyako e chefe do Clube de Treinamento.\n\nEla treina constantemente em busca do \"sono mais tranquilo e perfeito\". Sua dedicação é tamanha que ela consegue dormir sentada, em pé e até mesmo enquanto come. Por isso, recebeu o apelido de \"Bela Adormecida\". Embora esteja sempre cochilando, quando a noite cai, ela age secretamente nas sombras para proteger a cidade."
