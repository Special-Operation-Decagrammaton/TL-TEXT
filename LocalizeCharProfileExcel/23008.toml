23008-ProfileIntroductionJp = "トリニティ総合学園所属、シスターフッドの敬虔で誠実な少女。\n\n一見して可愛らしい印象も受けるが、それ以上にその落ち着いた雰囲気と常に絶やさない柔らかい笑みに惹かれ、相談にやってくる生徒は数知れず。まだまだ自分は未熟だと感じており、早く他の先輩たちのような立派なシスターになりたいと思い続けている。"
