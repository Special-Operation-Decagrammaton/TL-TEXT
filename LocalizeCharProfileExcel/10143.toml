10143-ProfileIntroductionJp = "Инструктор Сада цветущей сливы — отдела поддержки и воспитания в Старшей академии Шаньхайцзин, переодевшаяся в купальник ради лета.\n\nПо какой-то причине она оказалась в роли сопровождающей вместе с Сенсеем. Она выглядит более расслабленной и излучает ещё более зрелую ауру, чем обычно. Возможно, за этим скрывается её совсем иная сторона."
