10011-WeaponDescJp = "シュンが使用するスナイパーライフル。\n\nどんな問題児であっても、シュンがこの銃を持ち出すとたちまち優しい子に早変わり。もちろん園児たちに向けることは無い。"
10011-ProfileIntroductionJp = "山海経高級中学校所属、訓育支援部「梅花園」の教官。\n\n「梅花園」は園の名前であると同時に、部活名でもある。優しくて寛大な人柄であり、梅花園の園児たちだけでなく、山海経の他の生徒たちからも信頼されている。教官として長く働いていることもあり、園児たちのいたずらにもめったに怒ることはないが、自分の年齢について言及されると敏感な反応を示す。"
10011-CharacterSSRNewJp = "おとなしく待っていましたか？\nいい子ですね～"
