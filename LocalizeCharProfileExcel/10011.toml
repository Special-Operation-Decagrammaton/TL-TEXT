10011-WeaponDescJp = "O rifle de precisão usado por Shun.\n\nNão importa o quão problemático seja o aluno, assim que Shun saca esta arma, eles se tornam crianças gentis num piscar de olhos. É claro que ela nunca a aponta para as crianças do jardim de infância."
10011-ProfileIntroductionJp = "Instrutora do Departamento de Apoio Educacional 'Plum Blossom Garden', pertencente à Academia Shanhaijing.\n\n'Plum Blossom Garden' é tanto o nome do jardim de infância quanto o nome do clube. Com uma personalidade gentil e generosa, ela é confiada não apenas pelas crianças do jardim, mas também por outros alunos de Shanhaijing. Como trabalha como instrutora há muito tempo, ela raramente se irrita com as travessuras das crianças, mas reage de forma sensível quando mencionam sua idade."
10011-CharacterSSRNewJp = "Você estava esperando pacientemente?\nQue criança exemplar."
