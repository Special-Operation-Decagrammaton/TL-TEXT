16011-ProfileIntroductionJp = "Vice-presidente do Comitê de Justiça da Academia Trinity, que trocou seu uniforme pelo traje de ginástica para participar do Festival Esportivo de Halo.\n\nEla assumiu o papel de membro do comitê executivo no lugar de Tsurugi, que não está acostumada com tarefas externas. Mesmo em meio à atmosfera agitada do local, Hasumi tentava cumprir suas obrigações com calma, mas... os alunos delinquentes que aparecem sem parar e as doces tentações que vêm das barracas de comida estão lhe causando problemas."
