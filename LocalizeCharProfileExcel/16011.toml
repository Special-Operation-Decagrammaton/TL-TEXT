16011-ProfileIntroductionJp = "トリニティ総合学園所属、晄輪大祭参加のために体操服に着替えた正義実現委員会の副委員長。\n\n対外業務に不慣れなツルギに代わって実行委員を務めることになった。会場の浮き立った空気の中でも、ハスミは冷静に実行委員としての責務を果たそうとしていたが……休む間もなく現れる不良生徒や屋台から漂ってくる甘い誘惑が彼女を苦しませている。"
