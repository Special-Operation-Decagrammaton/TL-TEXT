20020-StatusMessageJp = "ミレニアム最高峰の超天才清楚系病弱美少女 "
20020-FullNameJp = "明星ヒマリ"
20020-FamilyNameJp = "明星"
20020-PersonalNameJp = "ヒマリ"
20020-SchoolYearJp = "3年生"
20020-CharacterAgeJp = "17歳"
20020-BirthdayJp = "12月10日"
20020-HobbyJp = "今日の運勢の確認、オカルト全般"
20020-WeaponNameJp = "高嶺の花"
20020-WeaponDescJp = "ヒマリが所持している拳銃。\n\nシンプルで美しいつくりの銃。普段ヒマリが使う姿を見るのは難しい。「本来、高嶺の花というのは簡単に目にすることができないものですから……まるで私のようでしょう？」とはヒマリの談である。"
20020-ProfileIntroductionJp = "ミレニアムサイエンススクール所属、ハッカー集団「ヴェリタス」の元部長で、現特異現象捜査部の部長。\n\n自称超天才病弱美少女ハッカーであり、ミレニアム史上たった3人しか名乗ることを許されていない学位「全知」の所有者らしい……それが真実なのか、そのような学位が実在するのかさえ、全てベールに包まれている。ヒマリ曰く、秘密の多い少女は美しいもの……なのだとか。また、指折りの実力を持つ天才ハッカーであり、同時にオカルトに目がない奇妙な趣向を持つ少女でもある。"
20020-CharacterSSRNewJp = "ふふっ、これはミレニアムの超天才清楚系病弱美少女ハッカーの\n出番ということですね？"
