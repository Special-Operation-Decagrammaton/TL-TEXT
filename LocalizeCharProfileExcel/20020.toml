20020-WeaponNameJp = "Flor Inalcançável"
20020-WeaponDescJp = "A pistola que Himari possui.\n\nUma arma de design simples e belo. É raro vê-la usando-a no dia a dia. \"Afinal, uma flor inalcançável não é algo que se possa ver facilmente... é exatamente como eu, não acha?\", diz Himari."
20020-ProfileIntroductionJp = "Pertencente ao Millennium Science School, é a ex-presidente do grupo de hackers \"Veritas\" e atual presidente do Departamento de Investigação de Fenômenos Estranhos.\n\nAutoproclamada super gênio, hacker delicada e bela, ela também seria a detentora do título acadêmico de \"Onisciência\", um grau que apenas três pessoas na história de Millennium tiveram permissão para ostentar... Se isso é verdade, ou se tal grau sequer existe, tudo permanece envolto em mistério. Segundo Himari, uma garota cheia de segredos é algo belo... Além disso, ela é uma hacker genial de primeira linha e, ao mesmo tempo, uma garota com um gosto peculiar por ocultismo."
20020-CharacterSSRNewJp = "Fufu, isso significa que chegou a hora da super gênio, pura e delicada, hacker doente mais bela de Millennium, não é?"
