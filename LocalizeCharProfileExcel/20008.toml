20008-WeaponDescJp = "アコが携帯している拳銃。\n\n骨身を削るような努力を重ね、アコが行政官の地位に就いた際に手渡された大切なもの。いつも持ち歩きながら、とても大事に扱っている。"
20008-ProfileIntroductionJp = "ゲヘナ学園所属、風紀委員会の行政官であり、風紀委員長ヒナにとって秘書のような存在。\n\n一見すると親切で善良そうな印象だが、規則に違反した生徒などに対してはかなり容赦が無い。いつも風紀委員長であるヒナの傍におり、彼女のことを補佐している。それもあってゲヘナの生徒たちからは「ヒナのペット」などと呼ばれることもあるが、本人は特に気にしていない。"
20008-CharacterSSRNewJp = "私が協力する以上、ミスは許しませんよ？"
