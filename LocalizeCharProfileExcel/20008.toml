20008-WeaponDescJp = "A pistola que Ako carrega consigo.\n\nUm item precioso que lhe foi entregue quando ela assumiu o cargo de oficial administrativa após muito esforço e dedicação. Ela a carrega sempre e a trata com muito cuidado."
20008-ProfileIntroductionJp = "Oficial administrativa do Comitê Disciplinar da Academia Gehenna e uma espécie de secretária para a presidente do comitê, Hina.\n\nÀ primeira vista, ela parece gentil e bondosa, mas não demonstra qualquer misericórdia com alunos que violam as regras. Ela está sempre ao lado da presidente Hina, auxiliando-a em suas funções. Por causa disso, alguns alunos de Gehenna a chamam de \"animal de estimação da Hina\", mas ela não se importa nem um pouco com isso."
20008-CharacterSSRNewJp = "Já que estou colaborando, não tolerarei erros, entendeu?"
