10103-WeaponDescJp = "マリナが愛用している、ドラムマガジン付きのサブマシンガン。\n\n何処であろうが、どんな服装になろうが、レッドウィンターの権威を疑う者たちに容赦なく襲い掛かる。"
10103-ProfileIntroductionJp = "山海経との交流会でチーパオに着替えたレッドウィンター連邦学園、保安委員長のマリナ。\n\nパンダの可愛さにメロメロになったり、山海経のおもてなしに感銘を受けるなど、交流会をとても楽しんでいる様子。\nレッドウィンターとは異なる衣装に戸惑っているが、周囲からは似合っていると好評。"
10103-CharacterSSRNewJp = "だ、大丈夫……だろうか？\nこんな格好で？"
