10103-WeaponDescJp = "A submetralhadora com carregador de tambor favorita da Marina.\n\nNão importa onde ela esteja ou que roupa esteja vestindo, ela ataca impiedosamente aqueles que duvidam da autoridade de Red Winter."
10103-ProfileIntroductionJp = "Marina, a presidente do Comitê de Segurança da Academia Federal de Red Winter, que trocou seu uniforme por um qipao durante o intercâmbio com Shanhaijing.\n\nEla parece estar aproveitando muito o evento, ficando encantada com a fofura dos pandas e impressionada com a hospitalidade de Shanhaijing.\nEmbora esteja um pouco confusa com o traje diferente do de Red Winter, ela tem recebido elogios de todos ao seu redor por como a roupa lhe cai bem."
