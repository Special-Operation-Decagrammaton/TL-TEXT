10145-ProfileIntroductionJp = "Глава студенческого совета Генрюмон в Старшей академии Шаньхайцзин, переодевшаяся в купальник ради лета.\n\nС помощью своего окружения она наконец смогла отправиться в летний отпуск. Её самочувствие лучше обычного, и она ощущает небывалую свободу. Поскольку такое свободное время для неё — огромная редкость, она намерена «насладиться им» на полную катушку."
