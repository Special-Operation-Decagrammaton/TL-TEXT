10145-ProfileIntroductionJp = "A líder do conselho estudantil 'Xuanlong Office' da Academia de Shanhaijing, que vestiu seu traje de banho para a chegada do verão.\n\nCom o apoio e a ajuda das pessoas ao seu redor, ela finalmente conseguiu tirar suas sonhadas férias de verão. Como sua saúde está bem melhor do que o habitual, ela parece estar sentindo uma sensação de liberdade ainda maior. Uma vez que um tempo livre como este é extremamente raro para ela, Kisaki planeja 'aproveitar de tudo um pouco'."
