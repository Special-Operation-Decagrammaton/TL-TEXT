10098-ProfileIntroductionJp = "Pertencente ao Colégio Abydos, é uma garota preguiçosa que foi vice-presidente do conselho estudantil de Abydos e atua como presidente do Comitê de Contramedidas.\n\nEla equipou o armamento que estava guardado, adotando um estilo mais adequado para o combate. Fora isso, não é diferente da Hoshino de sempre, mas ao entrar em estado de combate, é possível vislumbrar um olhar sério."
