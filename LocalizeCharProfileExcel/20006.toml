20006-WeaponDescJp = "サヤが自ら改造した特製の拳銃。\n\nピンク色のデザインが施されており、久々の休日を過ごす彼女にとってはファッションアイテムの一つでもある。"
20006-ProfileIntroductionJp = "山海経高級中学校所属、忙しい日常から抜け出して久々の休日を満喫している天才発明家。\n\n研究室に閉じこもって新薬の研究に没頭する普段の姿とは異なり、休日のサヤはスケートボードで街を駆け回るような活動的な様を見せる。しかし休日だからと言って、絶えず新しいものを追求し続ける彼女の知的好奇心が変わることはない。"
20006-CharacterSSRNewJp = "ふっふっふ……いくら天才と言えども、休息は必要なのだ！"
