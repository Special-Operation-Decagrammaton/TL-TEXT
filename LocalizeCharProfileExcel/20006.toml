20006-ProfileIntroductionJp = "Uma inventora genial da Academia Shanhaijing que escapou de sua rotina agitada para aproveitar um raro dia de folga.\n\nAo contrário de sua aparência habitual, trancada no laboratório e imersa na pesquisa de novos medicamentos, a Saya de folga mostra um lado ativo, andando pela cidade em seu skate. No entanto, mesmo sendo um dia de folga, sua curiosidade intelectual por buscar constantemente coisas novas não muda."
