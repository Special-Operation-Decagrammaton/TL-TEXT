23002-ProfileIntroductionJp = "Uma aluna novata alegre e cheia de energia do Esquadrão de Socorro da Academia Trinity.\n\nÉ uma garota positiva e vibrante, mas quando encontra um paciente, ela costuma se empolgar demais e acabar piorando a situação. Embora seja um pouco distraída, é um mistério o fato de que todos os pacientes que ela cuida se recuperam rapidamente de qualquer doença."
