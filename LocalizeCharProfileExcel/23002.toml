23002-ProfileIntroductionJp = "トリニティ総合学園所属、救護騎士団の元気で明るい新入生。\n\n何事にも前向きで元気溢れる少女だが、患者を見つけると度を超して騒ぎ立ててしまい状況を悪化させたりすることも。ちょっと抜けているところもあるが、彼女にお世話してもらった患者は不思議なことにどんな病気でもたちまち治ってしまうという。"
