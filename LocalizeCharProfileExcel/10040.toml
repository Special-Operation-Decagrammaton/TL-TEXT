10040-WeaponDescJp = "ツクヨが大事にしているサブマシンガン。\n\n銃の扱いが得意ではないツクヨのために、ミチルやイズナが色んな飾りつけや改造を施した一品。ツクヨにとっては何にも代えがたいものであり、大事な瞬間、彼女はいっそう優しく銃身を握りしめる。"
10040-ProfileIntroductionJp = "百鬼夜行連合学院所属、忍術研究部の部員。\n\n幼い頃から成長が早かったこともあり、その体躯をからかわれてしまうことが多く、結果として今の引っ込み思案な性格が形成された。基本的に他者との会話が苦手な小心者タイプの彼女だが、一度決心をするとどんな状況にでも飛び込んでいくという強さも持ち合わせている。忍者のことにはまだ詳しくないものの、尊敬するミチル、そしてイズナと共に、現在は楽しく忍術研究部の活動に勤しんでいる模様。"
10040-CharacterSSRNewJp = "こんな、大きいだけの、私ですが……\n先生のお役に立てるよう、精一杯頑張ります……！"
