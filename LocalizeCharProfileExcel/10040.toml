10040-WeaponDescJp = "Uma submetralhadora que Tsukuyo estima muito.\n\nComo Tsukuyo não é boa em manusear armas, Michiru e Izuna fizeram várias decorações e modificações nela. Para Tsukuyo, é algo insubstituível, e nos momentos importantes, ela aperta o cano da arma com ainda mais carinho."
10040-ProfileIntroductionJp = "Membro do Clube de Pesquisa de Ninjutsu da Academia Hyakkiyako.\n\nComo cresceu muito rápido desde pequena, ela era frequentemente alvo de provocações por causa de seu porte físico, o que acabou moldando sua personalidade tímida atual. Embora seja uma pessoa cautelosa que, basicamente, não gosta de conversar com os outros, ela também possui a força de se lançar em qualquer situação quando toma uma decisão. Apesar de ainda não conhecer muito sobre ninjas, parece que ela está se divertindo muito com as atividades do Clube de Pesquisa de Ninjutsu ao lado de Michiru, a quem admira, e de Izuna."
10040-CharacterSSRNewJp = "Eu sou apenas alguém grande e desajeitada, mas...\nFarei o meu melhor para ser útil ao Sensei...!"
