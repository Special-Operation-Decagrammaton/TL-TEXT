20058-WeaponDescJp = "Дробовик, который носит с собой Эрика.\n\nЗа ним ухаживают с особой тщательностью. Благодаря яркому леопардовому кастому его легко заметить, где бы она ни находилась."
20058-ProfileIntroductionJp = "Старшеклассница из академии Геенна с невероятно добрым характером.\n\nВопреки её первому обманчивому впечатлению — прохладному и интеллектуальному — она очень общительна, дружелюбна и способна поладить с кем угодно. Вместе со своей незаменимой лучшей подругой Кирарой она проводит дни напролёт в поисках весёлых развлечений."
20058-CharacterSSRNewJp = "Ой, прости-прости! Я заставила тебя ждать?"