100990001-ProfileIntroductionJp = "Uma garota preguiçosa que pertence à Escola de Ensino Médio Abydos, onde atua como presidente do conselho estudantil e presidente do comitê de contramedidas.\n\nEla equipou o armamento que estava guardado, adotando um estilo mais adequado para o combate. Fora isso, ela continua sendo a mesma Hoshino de sempre, mas, ao entrar em estado de combate, é possível vislumbrar um olhar sério."
100990001-CharacterSSRNewJp = "Tio aqui vai levar as coisas um pouco a sério.\nUhe~, isso é um pouco vergonhoso, na verdade."
