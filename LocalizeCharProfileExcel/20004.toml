20004-ProfileIntroductionJp = "トリニティ総合学園所属、ツルギ委員長に帯同する形で海にやってきた、正義実現委員会の実直な委員。\n\n輝く海に、煌めく砂浜。そんな誰もがはしゃぐシチュエーションへと向かう中でも、マシロが考えるのはまず正義と訓練。なぜならそれが、彼女の信じる正義だからだ。"
