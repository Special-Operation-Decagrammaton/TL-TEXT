20004-ProfileIntroductionJp = "Uma membro dedicada do Comitê de Implementação da Justiça da Academia Trinity, que veio à praia acompanhando a presidente Tsurugi.\n\nO mar brilhante, a areia cintilante. Mesmo em uma situação em que todos se divertem, a primeira coisa em que Mashiro pensa é na justiça e no treinamento. Afinal, é nisso que consiste a justiça em que ela acredita."
