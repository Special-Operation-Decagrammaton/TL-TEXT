10034-WeaponDescJp = "A pistola automática que Mimori carrega consigo habitualmente.\n\nFoi comprada quando ela teve pela primeira vez o sonho de se tornar uma dama maravilhosa, e é cuidada com muito carinho todos os dias."
10034-ProfileIntroductionJp = "Membro da Academia Hyakkiyako, a gentil vice-presidente do Clube de Treinamento.\n\nSempre com um sorriso radiante e uma postura serena, ela é muito admirada por todos. Influenciada pelos mangás shoujo que lia quando criança, ela abraçou o sonho de se tornar uma \"Yamato Nadeshiko\" e entrou para o Clube de Treinamento. Junto com Tsubaki, sua amiga de infância e presidente do clube, ela se dedica diariamente ao treinamento de culinária, limpeza e outras tarefas."
10034-CharacterSSRNewJp = "Ainda sou inexperiente, mas...\nIrei mostrar os resultados do meu treinamento"
