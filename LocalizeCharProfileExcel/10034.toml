10034-ProfileIntroductionJp = "百鬼夜行連合学院所属、修行部の優しい副部長。\n\nいつも朗らかな笑顔と穏やかな物腰で、皆からの人望が非常に厚い。幼い頃に読んだ少女漫画の影響で「大和撫子」になりたいという夢を抱き、修行部へと入った。幼馴染であり部長でもあるツバキとともに、料理や掃除などの修行に日々邁進している。"
10034-CharacterSSRNewJp = "まだまだ未熟者ですが……\n修行の成果、お見せいたします"
