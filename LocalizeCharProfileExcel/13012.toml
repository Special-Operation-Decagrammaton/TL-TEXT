13012-WeaponDescJp = "キリノがヴァルキューレ警察学校から支給されている制式拳銃。\n\nキリノは自分の射撃の腕がおかしいのはこの銃のせいではと思っているが、特に銃に異常は無い。"
13012-ProfileIntroductionJp = "ヴァルキューレ警察学校所属、生活安全局の熱血系生徒。\n\n学園都市の治安を維持する警察の姿に憧れてヴァルキューレ警察学校に入学したものの、射撃の腕前が致命的だったために生活安全局の所属になってしまった。それでも彼女は諦めず、犯人を鮮やかに制圧できるような警察になろうと、夢を諦めることなく日々努力を続けている。"
