13012-WeaponDescJp = "Uma pistola de serviço fornecida à Kirino pela Escola de Polícia Valkyrie.\n\nKirino suspeita que a sua péssima habilidade de tiro seja culpa desta arma, mas não há absolutamente nada de errado com ela."
13012-ProfileIntroductionJp = "A aluna de sangue quente do Departamento de Segurança Pública, pertencente à Escola de Polícia Valkyrie.\n\nEla ingressou na Escola de Polícia Valkyrie admirando a imagem dos policiais que mantêm a ordem pública na cidade acadêmica, mas devido à sua habilidade de tiro ser letalmente ruim, acabou sendo designada para o Departamento de Segurança Pública. Mesmo assim, ela não desiste e continua se esforçando todos os dias sem abandonar o seu sonho de se tornar uma policial capaz de subjugar criminosos de forma brilhante."