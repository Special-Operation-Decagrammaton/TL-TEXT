13012-WeaponDescJp = "A pistola padrão fornecida a Kirino pela Academia de Polícia Valkyrie.\n\nKirino acredita que sua péssima pontaria é culpa desta arma, mas não há nada de errado com ela."
13012-ProfileIntroductionJp = "Uma aluna entusiasmada do Departamento de Segurança Pública da Academia de Polícia Valkyrie.\n\nEla entrou na Academia de Polícia Valkyrie por admirar a imagem dos policiais que mantêm a ordem na cidade acadêmica, mas, devido à sua pontaria fatalmente ruim, acabou sendo designada para o Departamento de Segurança Pública. Mesmo assim, ela não desiste e continua se esforçando todos os dias, sem abandonar seu sonho de se tornar uma policial capaz de subjugar criminosos com maestria."
