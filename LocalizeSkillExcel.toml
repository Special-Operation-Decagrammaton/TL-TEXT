1037513558-DescriptionJp = "O Caranguejo Tambor assume uma postura defensiva, e as Garras de Aço recebem todos os ataques em seu lugar.\nDurante a postura defensiva, acumula [c][007eff]6 vezes[-][/c] o dano recebido (máximo de [c][007eff]300000[-][/c]).\nApós um tempo, concede estado de Imortalidade a todos os aliados (por [c][007eff]10s[-][/c]) e causa dano igual a [c][007eff]10%[-][/c] do valor acumulado.\nSe entrar em estado de Atordoamento antes de causar dano, em vez disso, causa dano igual a [c][007eff]100%[-][/c] do valor acumulado ao Caranguejo Tambor.\nApós aplicar o dano, o valor acumulado é resetado e o máximo de acúmulo aumenta em [c][007eff]2 vezes[-][/c]."
