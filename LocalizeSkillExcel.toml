3938689614-DescriptionJp = "O Caranguejo Tambor é composto pelo Fundoshi, Garras e Casco, cada um com tipo de defesa e habilidades de fortalecimento individuais.\nQuando ambas as garras e o casco são destruídos, o dano recebido por todas as partes aumenta em [c][007eff]50%[-][/c] até o final da batalha."
1791955019-NameJp = "Exoesqueleto Separado"
