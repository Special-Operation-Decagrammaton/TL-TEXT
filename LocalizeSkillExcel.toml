2285676125-NameJp = "Pilar do Julgamento"
2285676125-DescriptionJp = "Após usar \"No Fogo e nas Profundezas da Água\", cria um pilar de gelo.\n- O pilar de gelo, ao ser criado, fica em estado de Imortalidade (por [c][007eff]2.5s[-][/c]) e aplica um escudo igual a [c][007eff]400%[-][/c] de seu HP máximo (por [c][007eff]20s[-][/c]).\n- [c][007eff]20s[-][/c] após a criação, o pilar sofre dano igual a [c][007eff]70%[-][/c] de seu HP máximo.\n- Enquanto o pilar existir, a Defesa de todos os aliados é reduzida em [c][007eff]45%[-][/c], o efeito de cura recebida é fixado em [c][007eff]1[-][/c] e a cada [c][007eff]4s[-][/c] sofrem dano igual a [c][007eff]30%[-][/c] do Ataque.\n- Ao destruir o pilar, a Taxa de Cura Recebida do Radiador aumenta em [c][007eff]100%[-][/c] e a Cura de todos os aliados aumenta em [c][007eff]200%[-][/c] (por [c][007eff]20s[-][/c]).\n- Quando o HP de Gebura fica abaixo de [c][007eff]60%[-][/c] e o terreno é alterado, o pilar de gelo é destruído.\n- O pilar de gelo só pode ser atacado com Habilidades EX."
1996187408-NameJp = "Mão da Purificação (Vermelha)"
1996187408-DescriptionJp = "Yesod emite uma luz [c][007eff]vermelha[-][/c], levanta a mão direita e bate no chão, causando dano igual a [c][007eff]1500%[-][/c] do Ataque a todos os aliados.\nSe no momento do golpe houver uma área [c][007eff]azul[-][/c] por todo o chão, a habilidade é prevenida e:\n- Em vez do dano original, aplica Dano Contínuo igual a [c][007eff]15%[-][/c] do Ataque a todos os aliados (por 20 segundos).\n- Até o próximo uso de Habilidade EX de Yesod, a Recuperação de Custo dos aliados Strikers aumenta em [c][007eff]100%[-][/c]."
2037934155-NameJp = "Mão da Purificação (Vermelha)"
2037934155-DescriptionJp = "Yesod emite uma luz [c][007eff]vermelha[-][/c], levanta a mão direita e bate no chão, causando dano igual a [c][007eff]3000%[-][/c] do Ataque a todos os aliados.\nSe no momento do golpe houver uma área [c][007eff]azul[-][/c] por todo o chão, a habilidade é prevenida e:\n- Em vez do dano original, aplica Dano Contínuo igual a [c][007eff]30%[-][/c] do Ataque a todos os aliados (por 20 segundos).\n- Até o próximo uso de Habilidade EX de Yesod, a Recuperação de Custo dos aliados Strikers aumenta em [c][007eff]100%[-][/c]."
