649561091-NameJp = "Tremor do Gato-Oni"
649561091-DescriptionJp = "Causa [c][007eff]200%[-][/c] do dano de ataque aos aliados dentro da área circular."
1954578173-NameJp = "Rugido do Gato-Oni"
1954578173-DescriptionJp = "Causa [c][007eff]250%[-][/c] do dano de ataque a vários aliados dentro da área circular; o dano não é acumulado."
26182966-NameJp = "Grito do Oni que Invoca Encarnações"
26182966-DescriptionJp = "Invoca uma encarnação de Kurokage.\nA encarnação avança contra o aliado mais próximo e depois explode, causando [c][007eff]200%[-][/c] do dano de ataque aos aliados dentro da área circular."
25185491-NameJp = "Grito do Oni que Invoca Encarnações"
25185491-DescriptionJp = "Invoca uma encarnação de Kurokage.\nA encarnação avança contra o aliado mais próximo e depois explode, causando [c][007eff]400%[-][/c] do dano de ataque aos aliados dentro da área circular e aumentando o valor de intimidação em 500."
3946773883-NameJp = "Procissão Noturna do Gato-Oni"
3946773883-DescriptionJp = "Kurokage avança, causando [c][007eff]300%[-][/c] do dano de ataque aos aliados no caminho e empurrando-os."
60897689-NameJp = "Lendas Urbanas que se Espalham"
60897689-DescriptionJp = "Kurokage queima a área, causando [c][007eff]250%[-][/c] do dano de ataque a todos os aliados enquanto os atrai, e finalmente os empurra causando [c][007eff]250%[-][/c] do dano de ataque.\nSe o alvo estiver sob efeito da Intimidação do Gato-Oni, o valor de intimidação diminui em [c][007eff]300[-][/c] a cada segundo, causando dano equivalente a [c][007eff]20%[-][/c] do HP máximo reduzido pelo valor atual de intimidação (máximo de [c][007eff]20 segundos[-][/c])."
3793078108-NameJp = "Intimidação do Gato-Oni"
3793078108-DescriptionJp = "Durante a batalha contra Kurokage, a Intimidação do Gato-Oni aumenta devido a ataques específicos:\n- Ao estar na área dos olhos de Kurokage que aparecem no chão.\n- Ao estar dentro da área de Kurokage.\nA Intimidação do Gato-Oni corrói o HP gradualmente, impedindo a recuperação até o HP máximo. Efeitos de cura podem reduzir a Intimidação do Gato-Oni, diminuindo o valor equivalente ao [c][007eff]excesso de cura[-][/c]."
3908389644-NameJp = "Intimidação do Gato-Oni"
3908389644-DescriptionJp = "Durante a batalha contra Kurokage, a Intimidação do Gato-Oni aumenta devido a ataques específicos:\n- Ao estar na área dos olhos de Kurokage que aparecem no chão.\n- Ao estar dentro da área de Kurokage.\nA Intimidação do Gato-Oni corrói o HP gradualmente, impedindo a recuperação até o HP máximo. Efeitos de cura podem reduzir a Intimidação do Gato-Oni, diminuindo o valor equivalente a [c][007eff]1/2 do excesso de cura[-][/c]."
