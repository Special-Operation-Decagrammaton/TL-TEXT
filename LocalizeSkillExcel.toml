1155695544-NameJp = "Three-Light Monte"
1155695544-DescriptionJp = "Usa a habilidade quando o valor de ATG está no máximo.\nGoz e o clone iluminam a área à sua frente. A luz projetada pelo clone explode após um certo tempo, causando dano equivalente a [c][007eff]1500%[-][/c] do poder de ataque a todos os aliados na área, exceto na área iluminada pelo corpo principal de Goz."
3117980178-NameJp = "Three-Light Monte"
3117980178-DescriptionJp = "Usa a habilidade quando o valor de ATG está no máximo.\nGoz e o clone iluminam a área à sua frente. A luz projetada pelo clone explode após um certo tempo, causando dano equivalente a [c][007eff]7500%[-][/c] do poder de ataque a todos os aliados na área, exceto na área iluminada pelo corpo principal de Goz, e aumenta o medidor de grogue de Goz em [c][007eff]12.5%[-][/c].\nApós um certo tempo, aumenta a recuperação de custo dos alunos Striker aliados na área iluminada pelo corpo principal de Goz em [c][007eff]750[-][/c] (por [c][007eff]5 segundos[-][/c])."
993387228-NameJp = "Magical Coin Hat"
