1487001851-NameJp = "Agonia do Deserto"
1487001851-DescriptionJp = "A cada [c][007eff]10s[-][/c], causa dano igual a [c][007eff]30%[-][/c] do Ataque a todos os aliados.\nQuando o valor de ATG está no máximo, concede estado de Imortalidade a todos os aliados (por [c][007eff]10s[-][/c]) e, em seguida, causa dano igual a [c][007eff]1000%[-][/c] do HP.\nAumenta a Taxa de Cura Recebida em [c][007eff]2000[-][/c] (por [c][007eff]10s[-][/c])."
1022489281-NameJp = "Luz Impura (Relíquia Sagrada)"
1022489281-DescriptionJp = "Ativado quando o HP da Relíquia Sagrada chega a [c][007eff]0%[-][/c].\nNo caso de uma Relíquia Roxa, aumenta o Ataque dos aliados Strikers e alunos especiais em [c][007eff]25%[-][/c] e reduz a Taxa de Cura Recebida em [c][007eff]7000[-][/c] (este efeito de enfraquecimento não pode ser removido por habilidades de remoção de enfraquecimento).\nAlém disso, reduz a Defesa de Hieronymus em [c][007eff]1500[-][/c].\nApós a ativação, aumenta a Taxa de Cura Recebida dos aliados com Maldição em [c][007eff]4000[-][/c] (por [c][007eff]10s[-][/c]).\n(A Relíquia Roxa só pode ser atacada com Habilidades EX)."
2735860775-NameJp = "Luz Impura (Relíquia Sagrada)"
