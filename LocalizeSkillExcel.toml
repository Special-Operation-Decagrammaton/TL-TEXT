2022803589-NameJp = "Fortalecimento Separado"
2022803589-DescriptionJp = "O Caranguejo Tambor é composto pelo Fundoshi e Garras de Aço, cada um com tipo de defesa e habilidades de fortalecimento individuais.\nUsar o Guindaste de Carga no Caranguejo Tambor aplica estado de Atordoamento."
2440199630-NameJp = "Fundoshi Fortalecido"
2440199630-DescriptionJp = "Tipo de Defesa: Armadura Especial\nCada vez que o Fundoshi é atacado, carrega a energia do Guindaste de Carga."
1713743675-NameJp = "Fundoshi Fortalecido"
1713743675-DescriptionJp = "Tipo de Defesa: Armadura Especial\nReduz em [c][007eff]40%[-][/c] o dano recebido pelo Fundoshi de Habilidades EX.\nCada vez que o Fundoshi é atacado, carrega a energia do Guindaste de Carga."
3839465692-NameJp = "Fundoshi Fortalecido"
3839465692-DescriptionJp = "Tipo de Defesa: Armadura Especial\nReduz em [c][007eff]80%[-][/c] o dano recebido pelo Fundoshi de Habilidades EX.\nCada vez que o Fundoshi é atacado, carrega a energia do Guindaste de Carga."
4294240786-NameJp = "Garras de Aço Enferrujadas"
4294240786-DescriptionJp = "Tipo de Defesa: Equipamento Leve\nSó podem ser atacadas com Habilidades EX enquanto o Caranguejo Tambor estiver usando \"Varredura de Garras\", \"Contra-Garras\" ou estiver em estado de Atordoamento.\nEm compensação, a quantidade de dano Weak aumenta em [c][007eff]2 vezes[-][/c]."
4175928013-NameJp = "Garras de Aço Enferrujadas"
4175928013-DescriptionJp = "Tipo de Defesa: Equipamento Leve\nSó podem ser atacadas com Habilidades EX enquanto o Caranguejo Tambor estiver usando \"Varredura de Garras\", \"Contra-Garras\" ou estiver em estado de Atordoamento.\nA Defesa das Garras de Aço aumenta em [c][007eff]400%[-][/c].\nEm compensação, a quantidade de dano Weak aumenta em [c][007eff]4 vezes[-][/c]."
3305531435-NameJp = "Tambor Enferrujado"
3305531435-DescriptionJp = "A cada [c][007eff]10s[-][/c], aplica [c][007eff]1[-][/c] fluido adesivo ao Tambor Enferrujado (por [c][007eff]60s[-][/c]).\nA cada [c][007eff]4s[-][/c], causa dano igual a [c][007eff]20%[-][/c] do Ataque a todos os aliados. Se houver fluido adesivo no Tambor, causa [c][007eff]40%[-][/c] do Ataque.\nAo remover o fluido adesivo, o Ataque de todos os aliados aumenta em [c][007eff]25%[-][/c] e a Velocidade de Ataque em [c][007eff]75%[-][/c] (por [c][007eff]35s[-][/c]).\nAlém disso, para cada fluido adesivo removido, o dano recebido por todas as partes do Caranguejo Tambor aumenta em [c][007eff]5%[-][/c]."
289446290-NameJp = "Tambor Enferrujado"
289446290-DescriptionJp = "A cada [c][007eff]10s[-][/c], aplica [c][007eff]1[-][/c] fluido adesivo ao Tambor Enferrujado (por [c][007eff]60s[-][/c]) (máximo de [c][007eff]3[-][/c] acúmulos).\nA cada [c][007eff]4s[-][/c], causa dano igual a [c][007eff]20%[-][/c] do Ataque a todos os aliados. Se houver fluido adesivo no Tambor, para cada um, a quantidade de dano aumenta em [c][007eff]20%[-][/c] (máximo de [c][007eff]80%[-][/c]).\nAo remover o fluido adesivo, o Ataque de todos os aliados aumenta em [c][007eff]25%[-][/c] e a Velocidade de Ataque em [c][007eff]75%[-][/c] (por [c][007eff]35s[-][/c]).\nAlém disso, para cada fluido adesivo removido, o dano recebido por todas as partes do Caranguejo Tambor aumenta em [c][007eff]5%[-][/c]."
2580659348-NameJp = "Tambor Enferrujado"
2580659348-DescriptionJp = "A cada [c][007eff]10s[-][/c], aplica [c][007eff]1[-][/c] fluido adesivo ao Tambor Enferrujado (por [c][007eff]60s[-][/c]) (máximo de [c][007eff]5[-][/c] acúmulos).\nA cada [c][007eff]4s[-][/c], causa dano igual a [c][007eff]20%[-][/c] do Ataque a todos os aliados. Se houver fluido adesivo no Tambor, para cada um, a quantidade de dano aumenta em [c][007eff]20%[-][/c] (máximo de [c][007eff]120%[-][/c]).\nAo remover o fluido adesivo, o Ataque de todos os aliados aumenta em [c][007eff]25%[-][/c] e a Velocidade de Ataque em [c][007eff]75%[-][/c] (por [c][007eff]35s[-][/c]).\nAlém disso, para cada fluido adesivo removido, o dano recebido por todas as partes do Caranguejo Tambor aumenta em [c][007eff]5%[-][/c]."
209132904-NameJp = "Carga Expressa"
209132904-DescriptionJp = "Cada vez que o Fundoshi do Caranguejo é atacado, carrega a energia do Guindaste de Carga.\nQuando a energia está no máximo, o Guindaste de Carga pode ser usado.\nUsar o Guindaste de Carga faz o Caranguejo Tambor entrar em estado de Atordoamento e, até o fim do estado, a Recuperação de Custo de todos os aliados aumenta em [c][007eff]100%[-][/c].\nCada vez que o Guindaste de Carga é usado, a quantidade de energia necessária dobra."
3529168081-NameJp = "Carga Expressa"
3529168081-DescriptionJp = "Ao usar no Caranguejo Tambor,\na barra de Atordoamento aumenta em [c][007eff]100%[-][/c]."