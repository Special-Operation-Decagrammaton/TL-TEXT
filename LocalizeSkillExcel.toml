1509755725-NameJp = "Magical Coin Hat"
1509755725-DescriptionJp = "Coloca cartolas, esconde moedas e as embaralha. Aplica os seguintes efeitos aos aliados na área sem moedas:\n- Aplica empurrão (knockback) e atordoamento por [c][007eff]5 segundos[-][/c], causa dano equivalente a [c][007eff]800%[-][/c] do poder de ataque e reduz a velocidade de ataque em [c][007eff]50%[-][/c] (por [c][007eff]30 segundos[-][/c]).\nÁreas com moedas aplicam os seguintes efeitos dependendo da moeda:\n- Moeda Amarela: Aumenta a recuperação de custo dos alunos Striker aliados na área em [c][007eff]350[-][/c] por aluno presente (por [c][007eff]5 segundos[-][/c]) (máximo de 4 acúmulos).\n- Moeda Azul: Aumenta o dano causado pelos alunos Striker aliados na área em [c][007eff]7.5%[-][/c] por aluno presente (por [c][007eff]20 segundos[-][/c]) (máximo de 4 acúmulos)."
