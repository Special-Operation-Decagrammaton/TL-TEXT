712573112-DescriptionJp = "Durante a batalha com Kurokage, a Intimidação do Demônio Felino aumenta com certos ataques:\n- Quando está na área dos olhos de Kurokage que aparecem no chão.\n- Quando está dentro do território de Kurokage.\nA Intimidação do Demônio Felino corrói gradualmente o HP, impedindo que seja recuperado até o máximo. Pode-se reduzir a Intimidação com efeitos de cura, diminuindo-a em [c][007eff]1/5 do Excesso de Cura[-][/c]."
3378579970-NameJp = "Intimidação do Demônio Felino"
3378579970-DescriptionJp = "Durante a batalha com Kurokage, a Intimidação do Demônio Felino aumenta com certos ataques:\n- Quando está na área dos olhos de Kurokage que aparecem no chão.\n- Quando está dentro do território de Kurokage.\nA Intimidação do Demônio Felino corrói gradualmente o HP, impedindo que seja recuperado até o máximo. Pode-se reduzir a Intimidação com efeitos de cura, diminuindo-a em [c][007eff]1/6 do Excesso de Cura[-][/c]."
525845510-NameJp = "Intimidação do Demônio Felino"
525845510-DescriptionJp = "Durante a batalha com Kurokage, a Intimidação do Demônio Felino aumenta com certos ataques:\n- Quando está na área dos olhos de Kurokage que aparecem no chão.\n- Quando está dentro do território de Kurokage.\n- Quando recebe o ataque de autodestruição dos avatares.\nA Intimidação do Demônio Felino corrói gradualmente o HP, impedindo que seja recuperado até o máximo. Pode-se reduzir a Intimidação com efeitos de cura, diminuindo-a em [c][007eff]1/9 do Excesso de Cura[-][/c]."
3600210741-NameJp = "Intimidação do Demônio Felino"
3600210741-DescriptionJp = "Durante a batalha com Kurokage, a Intimidação do Demônio Felino aumenta com certos ataques:\n- Quando está na área dos olhos de Kurokage que aparecem no chão (o centro da área aumenta mais a Intimidação).\n- Quando está dentro do território de Kurokage.\n- Quando recebe o ataque de autodestruição dos avatares.\nA Intimidação do Demônio Felino corrói gradualmente o HP, impedindo que seja recuperado até o máximo. Pode-se reduzir a Intimidação com efeitos de cura, diminuindo-a em [c][007eff]1/11 do Excesso de Cura[-][/c]."
1588445501-NameJp = "Sensação de Intimidação Crescente"
1588445501-DescriptionJp = "Se o efeito de Intimidação do Demônio Felino corroer [c][007eff]50%[-][/c] ou mais do HP, o alvo entra em estado de Confusão.\nEste estado de Confusão é removido quando o valor de Intimidação chega a 0."
4199421037-NameJp = "Drama de Histórias de Fantasmas se Aproximando do Fim"
4199421037-DescriptionJp = "Todos os ataques de Kurokage penetram escudos."
3310561862-NameJp = "Drama de Histórias de Fantasmas se Aproximando do Fim"
3310561862-DescriptionJp = "Todos os ataques de Kurokage penetram escudos.\nSe um aluno for derrotado, o ATG de Kurokage aumenta até o valor máximo."
4018012511-NameJp = "Fragmentos do Demônio Felino"
4018012511-DescriptionJp = "Fragmentos do Demônio Felino existem ao redor de Kurokage. O dano recebido pelos fragmentos é transferido para Kurokage.\nA barra de Atordoamento não aumenta antes de se mover para dentro do território de Kurokage.\nDentro do território, se Kurokage entrar em estado de Atordoamento, ele se divide em 4 fragmentos, que passam a receber ataques. Durante esse período, a Taxa de Crítico de todos os aliados aumenta até o valor máximo."
3469497636-NameJp = "Caminho para a Verdade"
3469497636-DescriptionJp = "Causa dano igual a [c][007eff]220%[-][/c] do Ataque a todos os aliados."
2170849381-NameJp = "No Fogo e nas Profundezas da Água"
2170849381-DescriptionJp = "Causa dano igual a [c][007eff]100%[-][/c] do Ataque a todos os aliados.\nEm seguida, Gebura lança água do mar que causa dano aos aliados 3 vezes.\n1º jato: dano igual a [c][007eff]25%[-][/c] do Ataque a todos os aliados.\n2º jato: dano igual a [c][007eff]50%[-][/c] do Ataque a todos os aliados.\n3º jato: dano igual a [c][007eff]140%[-][/c] do Ataque a todos os aliados."
103631606-NameJp = "Bravura Além da Razão"
103631606-DescriptionJp = "Gebura usa torpedos para causar dano igual a [c][007eff]125%[-][/c] do Ataque ao Radiador.\nEm seguida, causa dano igual a [c][007eff]250%[-][/c] do Ataque a até 4 aliados, exceto o Radiador, sequencialmente."
3213688088-NameJp = "Árbitro Divino"
3213688088-DescriptionJp = "Quando o valor de ATG está no máximo, Gebura puxa um iceberg e o faz colidir, causando dano igual a [c][007eff]320%[-][/c] do Ataque a todos os aliados.\nDurante o uso desta habilidade, a barra de Atordoamento de Gebura não aumenta."
1278892157-NameJp = "Raiz da Inteligência"
1278892157-DescriptionJp = "A quantidade de dano causado pelos alunos especiais aliados aumenta em [c][007eff]80%[-][/c].\nA quantidade de dano causado pelos outros aliados diminui em [c][007eff]75%[-][/c] e a Recuperação de Custo aumenta em [c][007eff]25%[-][/c].\nAdiciona [c][007eff]75%[-][/c] de Eficácia Mística a Gebura."
211534980-NameJp = "Raiz da Inteligência"
211534980-DescriptionJp = "A quantidade de dano causado pelos alunos especiais aliados aumenta em [c][007eff]80%[-][/c].\nA quantidade de dano causado pelos outros aliados diminui em [c][007eff]75%[-][/c] e a Recuperação de Custo aumenta em [c][007eff]25%[-][/c].\nAdiciona [c][007eff]75%[-][/c] de Eficácia Mística a Gebura.\nExceto o Radiador, se qualquer aliado ficar parado, o medidor de Hipotermia aumenta em [c][007eff]1 barra[-][/c] a cada [c][007eff]5s[-][/c].\nQuando o medidor de Hipotermia atinge [c][007eff]10 barras[-][/c], o alvo sofre Congelamento irrevogável, o dano recebido aumenta em [c][007eff]80%[-][/c] e o efeito de cura recebida é fixado em [c][007eff]1[-][/c]."
3373023280-NameJp = "Resposta de Emergência: Radiador Operacional"
3373023280-DescriptionJp = "A saída do Radiador diminui periodicamente, e os efeitos aplicados variam conforme a saída (proporcional ao HP atual do Radiador):\n- Saída abaixo de [c][007eff]30%[-][/c]: sem efeito.\n- Saída entre [c][007eff]30%[-][/c] e menos de [c][007eff]70%[-][/c]: a cada [c][007eff]6s[-][/c], recupera [c][007eff]1200[-][/c] de HP de todos os aliados, exceto o Radiador.\n- Saída [c][007eff]70%[-][/c] ou mais: a cada [c][007eff]6s[-][/c], recupera [c][007eff]2200[-][/c] de HP de todos os aliados, exceto o Radiador, e reduz o dano recebido por eles em [c][007eff]25%[-][/c].\nO Radiador só pode ser alvo de Habilidades EX e não pode receber efeitos de escudo."
3268840974-NameJp = "Resposta de Emergência: Radiador Operacional"
3268840974-DescriptionJp = "A saída do Radiador diminui periodicamente, e os efeitos aplicados variam conforme a saída (proporcional ao HP atual do Radiador):\n- Saída abaixo de [c][007eff]30%[-][/c]: sem efeito.\n- Saída entre [c][007eff]30%[-][/c] e menos de [c][007eff]70%[-][/c]: a cada [c][007eff]6s[-][/c], recupera [c][007eff]2000[-][/c] de HP de todos os aliados, exceto o Radiador.\n- Saída [c][007eff]70%[-][/c] ou mais: a cada [c][007eff]6s[-][/c], recupera [c][007eff]3200[-][/c] de HP de todos os aliados, exceto o Radiador, e reduz o dano recebido por eles em [c][007eff]25%[-][/c].\nO Radiador só pode ser alvo de Habilidades EX e não pode receber efeitos de escudo."
