2003239472-DescriptionJp = "Causa dano equivalente a [c][007eff]250%[-][/c] do seu ataque a todos os aliados.\nMalkuth entra em estado de conclusão enquanto utiliza esta habilidade."
109238676-NameJp = "Peregrino do Reino"
109238676-DescriptionJp = "Quando o valor de ATG estiver no MÁX, Malkuth alça voo e realiza um bombardeio, causando [c][007eff]300%[-][/c] do seu ataque como dano a todos os aliados.\nEnquanto Malkuth utiliza esta habilidade:\n- Malkuth entra em estado de imortalidade e não pode ser alvo de nenhuma habilidade aliada.\n- Invoca abas que atacam os aliados.\n- Entra em estado de conclusão."
2250379265-NameJp = "Aquele que se Manifesta"
2250379265-DescriptionJp = "Usado apenas uma vez quando o HP de Malkuth cai para [c][007eff]75%[-][/c] ou menos.\nMalkuth desperta, utiliza a habilidade \"Espelho Sagrado\" e, independentemente do valor de ATG, utiliza a habilidade \"Peregrino do Reino\" [c][007eff]1 vez[-][/c].\nAté que a habilidade \"Espelho Sagrado\" seja utilizada, todo o dano recebido por Malkuth é anulado."
2307000319-NameJp = "Espelho Sagrado"
2307000319-DescriptionJp = "Malkuth entra em um estado de adaptação aos ataques de atributo recebidos.\nDurante a batalha, a adaptabilidade de atributo é exibida em uma barra, e cada barra aumenta de acordo com o dano de ataques Explosivos, Perfurantes, Místicos e de Vibração recebidos por Malkuth.\nQuando a adaptabilidade de um atributo específico atinge [c][007eff]100%[-][/c], os ataques desse atributo são recebidos como dano Resist.\nAo final do estado de Grogue, a adaptabilidade de todos os atributos é reiniciada para [c][007eff]0%[-][/c]."
1817512679-NameJp = "Espelho Sagrado"
1817512679-DescriptionJp = "Aumenta o ataque de Malkuth em [c][007eff]100%[-][/c] e reduz o dano recebido em [c][007eff]10%[-][/c].\nMalkuth entra em um estado de adaptação aos ataques de atributo recebidos.\nDurante a batalha, a adaptabilidade de atributo é exibida em uma barra, e cada barra aumenta de acordo com o dano de ataques Explosivos, Perfurantes, Místicos e de Vibração recebidos por Malkuth.\nQuando a adaptabilidade de um atributo específico atinge [c][007eff]100%[-][/c], os ataques desse atributo são recebidos como dano Resist.\nAo final do estado de Grogue, a adaptabilidade de todos os atributos é reiniciada para [c][007eff]0%[-][/c]."
259148531-NameJp = "Aquele que se Desvia do Caminho"
259148531-DescriptionJp = "Quando [c][007eff]2[-][/c] das adaptabilidades de atributo atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Grogue. Durante este estado:\n- Todo dano de ataques Explosivos, Perfurantes, Místicos e de Vibração recebido por Malkuth torna-se dano Weak.\n- Aumenta a recuperação de custo de todos os aliados em [c][007eff]50%[-][/c].\nSe ao final do estado de Grogue todas as adaptabilidades de atributo estiverem em [c][007eff]100%[-][/c], Malkuth recebe dano equivalente a [c][007eff]30%[-][/c] de seu HP máximo e o valor de ATG é reduzido adicionalmente."
3447434770-NameJp = "Aquele que se Desvia do Caminho"
3447434770-DescriptionJp = "Quando [c][007eff]3[-][/c] das adaptabilidades de atributo atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Grogue. Durante este estado:\n- Todo dano de ataques Explosivos, Perfurantes, Místicos e de Vibração recebido por Malkuth torna-se dano Weak.\n- Aumenta a recuperação de custo de todos os aliados em [c][007eff]50%[-][/c].\nSe ao final do estado de Grogue todas as adaptabilidades de atributo estiverem em [c][007eff]100%[-][/c], Malkuth recebe dano equivalente a [c][007eff]30%[-][/c] de seu HP máximo e o valor de ATG é reduzido adicionalmente."
94465433-NameJp = "Aquele que se Desvia do Caminho"
94465433-DescriptionJp = "Quando todas as adaptabilidades de atributo atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Grogue. Durante este estado:\n- Todo dano de ataques Explosivos, Perfurantes, Místicos e de Vibração recebido por Malkuth torna-se dano Weak.\n- Aumenta a recuperação de custo de todos os aliados em [c][007eff]50%[-][/c].\nApós o fim do estado de Grogue, Malkuth recebe dano equivalente a [c][007eff]30%[-][/c] de seu HP máximo e o valor de ATG é reduzido adicionalmente."
856686295-NameJp = "Aquele que se Desvia do Caminho"
856686295-DescriptionJp = "Quando todas as adaptabilidades de atributo atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Grogue. Durante este estado:\n- Todo dano de ataques Explosivos, Perfurantes, Místicos e de Vibração recebido por Malkuth torna-se dano Weak.\n- Aumenta a recuperação de custo de todos os aliados em [c][007eff]50%[-][/c].\nApós o fim do estado de Grogue, Malkuth recebe dano equivalente a [c][007eff]30%[-][/c] de seu HP máximo e o valor de ATG é reduzido adicionalmente."
1846470235-NameJp = "Aquele que se Mantém na Terra"
1846470235-DescriptionJp = "Malkuth entra em estado de conclusão ao utilizar certas habilidades.\nEnquanto Malkuth estiver no estado de conclusão, nenhuma adaptabilidade de atributo pode atingir [c][007eff]100%[-][/c] (exceto barras que já tenham atingido [c][007eff]100%[-][/c])."
3240340266-NameJp = "Sacrifício Determinado"
3240340266-DescriptionJp = "Decagrammaton invoca Labor.\nProporcionalmente aos [c][007eff]Labor absorvidos[-][/c], expulsa aliados e causa [c][007eff]100% a 700%[-][/c] de dano de ataque.\n\n[c][a0201f]Labor Vermelho[-][/c]: Ao morrer, causa [c][007eff]1000%[-][/c] de dano de ataque a todos, inimigos ou aliados; se o alvo for um Labor, ele é derrotado.\n[c][336e9b]Labor Azul[-][/c]: Enquanto estiver vivo, reduz o dano recebido pelos Labor ao redor (exceto ele mesmo) em [c][007eff]80%[-][/c] e aumenta a defesa em [c][007eff]10000[-][/c]."
2083655618-NameJp = "Sacrifício da Harmonia"
2083655618-DescriptionJp = "Decagrammaton absorve Labor e atrai os aliados."
932757445-NameJp = "Ipsum Esse"
932757445-DescriptionJp = "Decagrammaton anula habilidades de suporte e dano de autodestruição de Labor, recebendo Resist a todo dano.\n\nQuando a barra de Grogue estiver no MÁX:\nPor [c][007eff]20 segundos[-][/c], recebe Weak a todo dano e a anulação de habilidades de suporte é removida."
2217822351-NameJp = "De Pé na Terra"
2217822351-DescriptionJp = "Quando aliados suprimem o dano de habilidade de Decagrammaton ou derrotam Labor devido à influência do [c][007eff][Núcleo de Suporte: Hod][-][/c], a barra de Grogue aumenta e Decagrammaton recebe dano equivalente a [c][007eff]0.1% a 0.7%[-][/c] de seu HP máximo."
691417961-NameJp = "Início e Fim"
691417961-DescriptionJp = "Todos os estudantes entram em estado de imortalidade e o dano causado aumenta em [c][007eff]50%[-][/c].\n\nDecagrammaton marca aliados com [c][007eff]Mishnah[-][/c] se o HP estiver abaixo de [c][007eff]5%[-][/c],\ncausando [c][007eff]5%[-][/c] de dano do HP máximo.\n(Este ataque ignora imortalidade e efeitos de escudo)."
