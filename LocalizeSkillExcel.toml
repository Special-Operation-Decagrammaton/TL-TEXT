3034918095-NameJp = "Luz e Sombra do Anjo"
3034918095-DescriptionJp = "Invoca Chokmah e Geburah para disparar feixes, causando [c][007eff]200%[-][/c] de dano de ataque aos aliados na área.\nApós o cruzamento dos feixes, causa [c][007eff]800%[-][/c] de dano de ataque aos aliados na área afetada."
1261511103-NameJp = "Luz e Sombra da Matéria"
