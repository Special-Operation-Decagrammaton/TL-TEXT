3772217190-NameJp = "Nova Fundação"
3772217190-DescriptionJp = "Yesod ataca os arredores com os detritos expelidos do inalador no peito, causando dano igual a [c][007eff]1500%[-][/c] do Ataque a todos os aliados.\nSe no momento do ataque não houver área gerada por todo o chão, a habilidade é prevenida e:\n- Em vez do dano original, aplica Dano Contínuo igual a [c][007eff]15%[-][/c] do Ataque a todos os aliados (por 20 segundos).\n- Até o próximo uso de Habilidade EX de Yesod, a Recuperação de Custo dos aliados Strikers aumenta em [c][007eff]100%[-][/c]."
3301408861-NameJp = "Nova Fundação"
3301408861-DescriptionJp = "Yesod ataca os arredores com os detritos expelidos do inalador no peito, causando dano igual a [c][007eff]3000%[-][/c] do Ataque a todos os aliados.\nSe no momento do ataque não houver área gerada por todo o chão, a habilidade é prevenida e:\n- Em vez do dano original, aplica Dano Contínuo igual a [c][007eff]30%[-][/c] do Ataque a todos os aliados (por 20 segundos).\n- Até o próximo uso de Habilidade EX de Yesod, a Recuperação de Custo dos aliados Strikers aumenta em [c][007eff]100%[-][/c]."
2366320942-NameJp = "Terreno Inabalável"
2366320942-DescriptionJp = "Ao usar uma Habilidade EX, Yesod invoca [c][007eff]3[-][/c] luzes [c][007eff]azuis[-][/c] e [c][007eff]3[-][/c] luzes [c][007eff]vermelhas[-][/c].\nAo destruir uma luz, causa dano igual a [c][007eff]0.1%[-][/c] do HP máximo de Yesod a ele.\nSe um aliado destruir [c][007eff]2[-][/c] ou mais luzes em [c][007eff]2s[-][/c], a Recuperação de Custo de todos os aliados é reduzida em 50% (por [c][007eff]50s[-][/c]) e todos os aliados Strikers recebem estado de Atordoamento (por [c][007eff]10s[-][/c]).\nO dano recebido por Yesod é reduzido em [c][007eff]95%[-][/c], o dano recebido pela mão direita de Yesod é reduzido em [c][007eff]99%[-][/c], e a barra de Atordoamento não aumenta."
1717409985-NameJp = "Terreno Inabalável"
1717409985-DescriptionJp = "Ao usar uma Habilidade EX, Yesod invoca [c][007eff]3[-][/c] luzes [c][007eff]azuis[-][/c] e [c][007eff]3[-][/c] luzes [c][007eff]vermelhas[-][/c].\nAo destruir uma luz, causa dano igual a [c][007eff]0.1%[-][/c] do HP máximo de Yesod a ele.\nSe um aliado destruir [c][007eff]2[-][/c] ou mais luzes em [c][007eff]2s[-][/c], a Recuperação de Custo de todos os aliados é bloqueada (por [c][007eff]50s[-][/c]) e todos os aliados Strikers recebem estado de Atordoamento (por [c][007eff]10s[-][/c]).\nO dano recebido por Yesod e sua mão direita é reduzido em [c][007eff]99%[-][/c], e a barra de Atordoamento não aumenta."
2684712354-NameJp = "Terreno Inabalável"
2684712354-DescriptionJp = "Ao usar uma Habilidade EX, Yesod invoca [c][007eff]3[-][/c] luzes [c][007eff]azuis[-][/c] e [c][007eff]3[-][/c] luzes [c][007eff]vermelhas[-][/c].\nAo destruir uma luz, causa dano igual a [c][007eff]0.1%[-][/c] do HP máximo de Yesod a ele.\nSe um aliado destruir [c][007eff]2[-][/c] ou mais luzes em [c][007eff]2s[-][/c], a Recuperação de Custo de todos os aliados é bloqueada (por [c][007eff]50s[-][/c]) e todos os aliados Strikers recebem estado de Atordoamento (por [c][007eff]10s[-][/c]).\nO dano recebido por Yesod e sua mão direita é reduzido em [c][007eff]99%[-][/c], a barra de Atordoamento não aumenta e a Resistência a Dano Crítico aumenta em [c][007eff]25000[-][/c]."
2039962385-NameJp = "Revelação"
2039962385-DescriptionJp = "Adiciona [c][007eff]200%[-][/c] de Eficácia de Vibração aos aliados Strikers, veículos de Suporte Tático e invocações.\nNa batalha contra Yesod, existe uma \"Fase de Análise\".\n- A cada estágio, o Ataque dos aliados Strikers, veículos de Suporte Tático e invocações aumenta em [c][007eff]20%[-][/c], a Taxa de Crítico em [c][007eff]20%[-][/c], adiciona [c][007eff]25%[-][/c] à quantidade de dano da Habilidade EX e aumenta a Taxa de Dano Crítico em [c][007eff]25%[-][/c] (máximo de 5 estágios). (No entanto, esses efeitos são aplicados de acordo com o estágio alcançado quando a Fase de Análise atinge o estágio 5 ou quando uma habilidade de Yesod é prevenida).\nA Fase de Análise é reiniciada quando não se consegue prevenir uma Habilidade EX de Yesod ou quando Yesod usa a próxima Habilidade EX."
1762546744-NameJp = "Revelação"
1762546744-DescriptionJp = "Adiciona [c][007eff]200%[-][/c] de Eficácia de Vibração aos aliados Strikers, veículos de Suporte Tático e invocações.\nNa batalha contra Yesod, existe uma \"Fase de Análise\".\n- A cada estágio, o Ataque dos aliados Strikers, veículos de Suporte Tático e invocações aumenta em [c][007eff]40%[-][/c], a Taxa de Crítico em [c][007eff]20%[-][/c], adiciona [c][007eff]50%[-][/c] à quantidade de dano da Habilidade EX e aumenta a Taxa de Dano Crítico em [c][007eff]50%[-][/c] (máximo de 5 estágios). (No entanto, esses efeitos são aplicados de acordo com o estágio alcançado quando a Fase de Análise atinge o estágio 5 ou quando uma habilidade de Yesod é prevenida).\nA Fase de Análise é reiniciada quando não se consegue prevenir uma Habilidade EX de Yesod ou quando Yesod usa a próxima Habilidade EX."
2872121469-NameJp = "Luz Azul"
2872121469-DescriptionJp = "Ao destruir uma luz [c][007eff]azul[-][/c], a Fase de Análise sobe [c][007eff]1 estágio[-][/c] e causa dano igual a [c][007eff]30%[-][/c] do Ataque a todos os aliados.\nO custo de Habilidade EX do aliado que a destruiu é reduzido em até [c][007eff]50%[-][/c] (para 1 uso de Habilidade EX) (o valor reduzido é arredondado para baixo), e ganha [c][007eff]0.6[-][/c] de Custo de Habilidade para cada aluno na equipe que não foi retirado (exceto destruição por veículos de Suporte Tático).\nDependendo da área existente, aplicam-se os seguintes efeitos:\n- Se houver área [c][007eff]vermelha[-][/c]: Remove a área [c][007eff]vermelha[-][/c].\n- Se não houver área: Gera uma área [c][007eff]azul[-][/c] que causa Dano Contínuo igual a [c][007eff]15%[-][/c] do Ataque a todos os aliados.\n- Se houver área [c][007eff]azul[-][/c]: Causa Dano Contínuo adicional igual a [c][007eff]100%[-][/c] do Ataque a todos os aliados (por 10 segundos)."
4085667492-NameJp = "Luz Vermelha"
4085667492-DescriptionJp = "Ao destruir uma luz [c][007eff]vermelha[-][/c], a Fase de Análise sobe [c][007eff]1 estágio[-][/c] e causa dano igual a [c][007eff]30%[-][/c] do Ataque a todos os aliados.\nO custo de Habilidade EX do aliado que a destruiu é reduzido em até [c][007eff]50%[-][/c] (para 1 uso de Habilidade EX) (o valor reduzido é arredondado para baixo), e ganha [c][007eff]0.6[-][/c] de Custo de Habilidade para cada aluno na equipe que não foi retirado (exceto destruição por veículos de Suporte Tático).\nDependendo da área existente, aplicam-se os seguintes efeitos:\n- Se houver área [c][007eff]vermelha[-][/c]: Causa Dano Contínuo adicional igual a [c][007eff]100%[-][/c] do Ataque a todos os aliados (por 10 segundos).\n- Se não houver área: Gera uma área [c][007eff]vermelha[-][/c] que causa Dano Contínuo igual a [c][007eff]15%[-][/c] do Ataque a todos os aliados.\n- Se houver área [c][007eff]azul[-][/c]: Remove a área [c][007eff]azul[-][/c]."
566370604-NameJp = "Sinal que Evoca a Profecia"
566370604-DescriptionJp = "Entre as luzes invocadas, uma luz com o \"Sinal que Evoca a Profecia\" é gerada aleatoriamente.\nAo destruir uma luz com o \"Sinal que Evoca a Profecia\", a Fase de Análise sobe [c][007eff]1 estágio[-][/c] e, a partir de então, a Fase de Análise não sobe mais.\nEste efeito desaparece quando não se consegue prevenir uma Habilidade EX de Yesod ou quando Yesod usa a próxima Habilidade EX."
1300016116-NameJp = "Sinal que Evoca o Fim"
1300016116-DescriptionJp = "Entre as luzes invocadas, uma luz com o \"Sinal que Evoca o Fim\" é gerada aleatoriamente.\nAo destruir uma luz com o \"Sinal que Evoca o Fim\", a Fase de Análise muda para [c][007eff]1 estágio[-][/c]."
2773586851-NameJp = "Julgamento da Grande Vontade"
2773586851-DescriptionJp = "Quando Yesod está bloqueando o caminho com a mão direita e o valor de ATG está no máximo, Yesod bate no chão com a mão esquerda, causando dano igual a [c][007eff]200%[-][/c] do Ataque a todos os aliados."
2016677634-NameJp = "Pilar do Poder"
2016677634-DescriptionJp = "Pilar invocado no lado esquerdo do campo.\nO Pilar do Poder é imortal, só pode ser alvo de Habilidades EX e não recebe dano de ataques aliados.\nA cada [c][007eff]4s[-][/c], recupera uma certa quantidade de seu HP. Se o HP estiver em [c][007eff]99%[-][/c] ou mais, causa dano igual a [c][007eff]100%[-][/c] do Ataque a todos os aliados e reduz a Recuperação de Custo dos aliados Strikers em [c][007eff]400[-][/c] (por [c][007eff]10s[-][/c]).\nO Pilar do Poder não é afetado por estados de CC, mas a duração do CC é acumulada. Ao acumular [c][007eff]3s[-][/c], causa dano a si mesmo.\n- Ao acumular [c][007eff]3s[-][/c], se o HP do pilar estiver em [c][007eff]50%[-][/c] ou mais, adiciona [c][007eff]10%[-][/c] à quantidade de dano dos Drones de Suporte (por [c][007eff]40s[-][/c]) (máximo de 4 acúmulos)."
2720451846-NameJp = "Pilar do Poder"
2720451846-DescriptionJp = "Pilar invocado no lado esquerdo do campo.\nO Pilar do Poder é imortal, só pode ser alvo de Habilidades EX e não recebe dano de ataques aliados.\nA cada [c][007eff]4s[-][/c], recupera uma certa quantidade de seu HP. Se o HP estiver em [c][007eff]99%[-][/c] ou mais, causa dano igual a [c][007eff]100%[-][/c] do Ataque a todos os aliados e reduz a Recuperação de Custo dos aliados Strikers em [c][007eff]400[-][/c] (por [c][007eff]10s[-][/c]).\nO Pilar do Poder não é afetado por estados de CC, mas a duração do CC é acumulada. Ao acumular [c][007eff]5s[-][/c], causa dano a si mesmo.\n- Ao acumular [c][007eff]5s[-][/c], se o HP do pilar estiver em [c][007eff]50%[-][/c] ou mais, adiciona [c][007eff]10%[-][/c] à quantidade de dano dos Drones de Suporte (por [c][007eff]40s[-][/c]) (máximo de 4 acúmulos)."
3977569703-NameJp = "Pilar da Fundação"
3977569703-DescriptionJp = "Pilar invocado no lado direito do campo.\nAo destruir o Pilar da Fundação, o dano recebido pela mão direita de Yesod aumenta em [c][007eff]1000%[-][/c] (máximo de 2 acúmulos).\nAdiciona [c][007eff]900%[-][/c] ao dano recebido de Habilidades EX pelo Pilar da Fundação."
3448455875-NameJp = "Pilar da Fundação"
3448455875-DescriptionJp = "Pilar invocado no lado direito do campo.\nAo destruir o Pilar da Fundação, o dano recebido pela mão direita de Yesod aumenta em [c][007eff]1000%[-][/c] (máximo de 2 acúmulos)."
1016827640-NameJp = "Drone de Suporte: Ressonância"
1016827640-DescriptionJp = "Durante a batalha com a mão direita de Yesod, invoca Drones de Suporte para auxiliar os alunos.\nOs Drones de Suporte não podem ser alvo de nenhuma habilidade, e o dano deles não pode ser crítico.\nOs efeitos de buff recebidos pelas Habilidades EX e Habilidades Normais dos alunos, exibidos ao lado da barra de HP do Drone de Suporte, são transferidos em tempo real (no entanto, efeitos recebidos antes da invocação do Drone de Suporte não são transferidos).\nO Ataque dos Drones de Suporte aumenta em [c][007eff]100%[-][/c], e contra alvos em estado de [c][007eff]Fogo Concentrado[-][/c], causam dano adicional igual a [c][007eff]100%[-][/c] do Ataque."
1323423593-NameJp = "O antigo prédio da escola, desde sempre\nfoi um ponto de encontro de alunos problemáticos."
1157251793-NameJp = "Desta vez, algo está estranho...\nVamos interrogá-lo um pouco."
16069185-NameJp = "Hah...\nRealmente, isso não tem fim."
2394298534-NameJp = "Hm?\nO que será que está além desta sala...?"
2725798992-NameJp = "Rugido do Relâmpago Azul"
2725798992-DescriptionJp = "Faz correr eletricidade pelo chão, causando dano igual a [c][007eff]230%[-][/c] do Ataque a todos os aliados, exceto os Obeliscos."
2191506557-NameJp = "Rugido do Relâmpago Azul"
2191506557-DescriptionJp = "Faz correr eletricidade pelo chão, causando dano igual a [c][007eff]230%[-][/c] do Ataque a todos os aliados, exceto os Obeliscos.\nAlém disso, se o valor de ATG for 66% ou mais, lança um raio que causa dano igual a [c][007eff]450%[-][/c] do Ataque ao Obelisco com maior HP."
150344570-NameJp = "Flecha que Atravessa o Instante"
150344570-DescriptionJp = "Lança um raio, causando dano igual a [c][007eff]315%[-][/c] do Ataque a todos os aliados."
332682837-NameJp = "Flecha que Atravessa o Instante"
332682837-DescriptionJp = "Lança um raio e, após invocar uma Esfera de Relâmpago Vermelha, causa dano igual a [c][007eff]475%[-][/c] do Ataque a todos os aliados.\n- A Esfera de Relâmpago Vermelha só pode ser atacada com Habilidades EX, e causa dano igual a [c][007eff]45%[-][/c] do Ataque aos aliados próximos.\n- Ao destruir a Esfera de Relâmpago Vermelha, a quantidade de dano causado pelos aliados na área circular aumenta em [c][007eff]30%[-][/c] (por [c][007eff]35s[-][/c]).\n- Se a Esfera de Relâmpago Vermelha alcançar a Fúria de Set, o medidor de Relâmpago aumenta significativamente."
2214992311-NameJp = "Explosão de Luzes Coloridas"
2214992311-DescriptionJp = "Faz fluir eletricidade entre as mãos, causando dano igual a [c][007eff]480%[-][/c] do Ataque aos aliados na área em linha reta."
1285308614-NameJp = "Redemoinho do Relâmpago Azul"
1285308614-DescriptionJp = "Absorve a eletricidade ao redor, causando dano igual a [c][007eff]390%[-][/c] do Ataque a todos os aliados, exceto os Obeliscos.\nO medidor de Relâmpago aumenta significativamente."
523310052-NameJp = "Redemoinho do Relâmpago Azul"
523310052-DescriptionJp = "Absorve a eletricidade ao redor, causando dano igual a [c][007eff]390%[-][/c] do Ataque a todos os aliados, exceto os Obeliscos.\nO medidor de Relâmpago aumenta significativamente.\nAlém disso, se o valor de ATG for 66% ou mais, lança um raio que causa dano igual a [c][007eff]450%[-][/c] do Ataque ao Obelisco com maior HP."
1823851730-NameJp = "Lança de Relâmpago da Fúria"
1823851730-DescriptionJp = "Quando o valor de ATG está no máximo, arremessa uma Lança de Relâmpago, causando dano igual a [c][007eff]410%[-][/c] do Ataque a todos os aliados.\nApós usar \"Lança de Relâmpago da Fúria\", a barra de Atordoamento sobe até o valor máximo."
1433021264-NameJp = "Tempestade que Devora a Aurora"
1433021264-DescriptionJp = "Envolve-se em uma tempestade, reduzindo em [c][007eff]80%[-][/c] o dano recebido pela Fúria de Set de Habilidades EX.\nA quantidade de dano causado pela Fúria de Set varia conforme o valor de ATG:\nAbaixo de [c][007eff]33%[-][/c]: a quantidade de dano causado diminui em [c][007eff]70%[-][/c].\nAcima de [c][007eff]66%[-][/c]: a quantidade de dano causado aumenta em [c][007eff]80%[-][/c]."
1821539935-NameJp = "Poder que Conduz à Eternidade"
1821539935-DescriptionJp = "A Fúria de Set absorve energia da atmosfera, e o medidor de Relâmpago aumenta continuamente.\nQuando a Fúria de Set recebe dano, o medidor de Relâmpago diminui. Ao chegar a 0%, invoca uma Esfera de Relâmpago Azul.\n- Enquanto a Esfera de Relâmpago Azul está invocada, a quantidade de dano causado por todos os aliados aumenta em [c][007eff]30%[-][/c] (por [c][007eff]30s[-][/c]).\n\nQuando a Fúria de Set está em estado de Atordoamento, a Recuperação de Custo de todos os aliados aumenta em [c][007eff]500[-][/c] e o dano máximo é aplicado sem ser afetado pelo valor de Estabilidade."
4182767414-NameJp = "Poder que Conduz à Eternidade"
4182767414-DescriptionJp = "A Fúria de Set absorve energia da atmosfera, e o medidor de Relâmpago aumenta continuamente.\nQuando a Fúria de Set recebe dano, o medidor de Relâmpago diminui. Ao chegar a 0%, invoca uma Esfera de Relâmpago Azul.\n- Enquanto a Esfera de Relâmpago Azul está invocada, a quantidade de dano causado por todos os aliados aumenta em [c][007eff]30%[-][/c] (por [c][007eff]30s[-][/c]).\n\nQuando a Fúria de Set está em estado de Atordoamento, a Recuperação de Custo de todos os aliados aumenta em [c][007eff]500[-][/c] e o dano máximo é aplicado sem ser afetado pelo valor de Estabilidade. Além disso, invoca uma Esfera de Relâmpago Vermelha."
1760763215-NameJp = "Clarão que Atravessa a Águia"
1760763215-DescriptionJp = "Periodicamente, um relâmpago cai. Causa dano igual a [c][007eff]35%[-][/c] do Ataque ao Obelisco com maior HP e aos aliados na área circular ao redor, e reduz a quantidade de dano causado em [c][007eff]70%[-][/c] (por [c][007eff]40s[-][/c]) (este efeito de enfraquecimento não pode ser removido por habilidades de remoção de enfraquecimento).\n- O relâmpago causa dano adicional igual a [c][007eff]200%[-][/c] do Ataque ao Obelisco.\n- O Obelisco atingido entra em estado \"Carregado\" até que seu HP esteja no máximo, e não será mais alvo de relâmpagos.\n- Se ambos os Obeliscos estiverem no estado \"Carregado\", o aliado com maior HP se torna o alvo do relâmpago.\n- Os Obeliscos só podem ser recuperados com Habilidades EX.\n(Esta habilidade não é afetada por \"Tempestade que Devora a Aurora\")."
1270176938-NameJp = "Vontade Aguçada"
1270176938-DescriptionJp = "Dispara projéteis de fogo sequencialmente em até 9 aliados, incluindo coberturas. Causa dano igual a [c][007eff]288%[-][/c] do Ataque a cada alvo e aos aliados na área circular ao redor do alvo."
2121264501-NameJp = "Vontade Aguçada"
2121264501-DescriptionJp = "Dispara projéteis de fogo sequencialmente em até 9 aliados, incluindo coberturas. Causa dano igual a [c][007eff]288%[-][/c] do Ataque a cada alvo e aos aliados na área circular ao redor do alvo.\nAliados (exceto coberturas) que receberem ataques sobrepostos dos projéteis sofrem dano adicional igual a [c][007eff]900%[-][/c] do Ataque (máximo de [c][007eff]1[-][/c] vez)."
293055446-NameJp = "Sabedoria Lapidada"
293055446-DescriptionJp = "Dispara 20 esferas de fogo em linha reta em direção ao aliado mais distante.\nOs seguintes efeitos são aplicados ao alvo atingido pelas esferas de fogo:\n- Cobertura: dano igual a [c][007eff]8%[-][/c] do Ataque.\n- Alvo em estado de Cobertura: dano igual a [c][007eff]8%[-][/c] do Ataque e Imobilização (por [c][007eff]2s[-][/c]).\n- Outros alvos: dano igual a [c][007eff]8.5%[-][/c] do Ataque e Dano Contínuo de Queimadura igual a [c][007eff]15%[-][/c] do Ataque (por [c][007eff]40s[-][/c]).\nQuando a esfera de fogo atinge uma cobertura, o fogo é bloqueado."
1114721381-NameJp = "Sabedoria Lapidada"
1114721381-DescriptionJp = "Dispara 20 esferas de fogo em linha reta em direção ao aliado mais distante.\nOs seguintes efeitos são aplicados ao alvo atingido pelas esferas de fogo:\n- Cobertura: dano igual a [c][007eff]8%[-][/c] do Ataque.\n- Alvo em estado de Cobertura: dano igual a [c][007eff]8%[-][/c] do Ataque e Imobilização (por [c][007eff]2s[-][/c]).\n- Outros alvos: dano igual a [c][007eff]45%[-][/c] do Ataque e Dano Contínuo de Queimadura igual a [c][007eff]15%[-][/c] do Ataque (por [c][007eff]40s[-][/c]).\nQuando a esfera de fogo atinge uma cobertura, o fogo é bloqueado."
2864338029-NameJp = "Sabedoria Lapidada"
2864338029-DescriptionJp = "Dispara 20 esferas de fogo em linha reta em direção ao aliado mais distante.\nOs seguintes efeitos são aplicados ao alvo atingido pelas esferas de fogo:\n- Cobertura: dano igual a [c][007eff]8%[-][/c] do Ataque.\n- Alvo em estado de Cobertura: dano igual a [c][007eff]8%[-][/c] do Ataque e Imobilização (por [c][007eff]2s[-][/c]).\n- Outros alvos: dano igual a [c][007eff]45%[-][/c] do Ataque e Dano Contínuo de Queimadura igual a [c][007eff]120%[-][/c] do Ataque (por [c][007eff]40s[-][/c]).\nQuando a esfera de fogo atinge uma cobertura, o fogo é bloqueado."
2006646976-NameJp = "Guardião do Reino"
2006646976-DescriptionJp = "Causa dano igual a [c][007eff]100%[-][/c] do Ataque aos aliados na área circular e aplica Dano Contínuo de Queimadura igual a [c][007eff]90%[-][/c] do Ataque (por [c][007eff]20s[-][/c])."
113056142-NameJp = "Guardião do Reino"
113056142-DescriptionJp = "Causa dano igual a [c][007eff]100%[-][/c] do Ataque aos aliados na área circular, aplica Dano Contínuo de Queimadura igual a [c][007eff]90%[-][/c] do Ataque e Dano Contínuo de Choque igual a [c][007eff]183%[-][/c] do Ataque (por [c][007eff]20s[-][/c])."
3959680911-NameJp = "Inteligência Iluminada pela Luz"
3959680911-DescriptionJp = "Destrói todas as coberturas e invoca 1 Roda de Aço que se move em direção à Grande Balista (por [c][007eff]20s[-][/c]).\nQuando a Roda de Aço atinge a Grande Balista, causa dano igual a [c][007eff]50%[-][/c] do HP máximo da Grande Balista.\nA Roda de Aço para ao colidir com coberturas, causando dano do tipo Místico igual a [c][007eff]9.6%[-][/c] do Ataque por hit ao alvo.\nAlvos em estado de Cobertura atingidos pela Roda de Aço ficam Imobilizados (por [c][007eff]1.2s[-][/c])."
2910754825-NameJp = "Inteligência Iluminada pela Luz"
2910754825-DescriptionJp = "Destrói todas as coberturas e invoca 2 Rodas de Aço que se movem em direção à Grande Balista (por [c][007eff]20s[-][/c]).\nQuando uma Roda de Aço atinge a Grande Balista, causa dano igual a [c][007eff]100%[-][/c] do HP máximo da Grande Balista.\nA Roda de Aço para ao colidir com coberturas, causando dano do tipo Místico igual a [c][007eff]9.6%[-][/c] do Ataque por hit ao alvo.\nAlvos em estado de Cobertura atingidos pela Roda de Aço ficam Imobilizados (por [c][007eff]1.2s[-][/c])."
4028542298-NameJp = "Aguardando o Amanhecer"
4028542298-DescriptionJp = "Kokuma destrói todas as coberturas e entra em estado de Frenesi.\nSeu Ataque Normal muda para uma emissão contínua de fogo pela boca, causando dano igual a [c][007eff]50%[-][/c] do Ataque por hit aos aliados na área em leque.\nQuando o fogo atinge uma cobertura, causa dano igual a [c][007eff]3%[-][/c] do Ataque e, em seguida, é bloqueado.\nAlvos em estado de Cobertura atingidos pelo fogo ficam Imobilizados (por [c][007eff]1s[-][/c]).\n\nEnquanto Kokuma está em estado de Frenesi, aplicam-se os seguintes efeitos:\n- Mesmo que o medidor do Reator chegue a [c][007eff]0%[-][/c], não muda para o estado de Recuperação; quanto mais baixo o medidor, maior a velocidade de recuperação.\n- Se o medidor do Reator estiver abaixo de [c][007eff]70%[-][/c], o dano recebido aumenta em [c][007eff]100%[-][/c].\n- Remove todos os efeitos de Chamas Instáveis e reduz o Valor de Resistência a Crítico em [c][007eff]100%[-][/c].\n- Se um aliado Striker for retirado, o medidor do Reator aumenta significativamente."
3980173347-NameJp = "Engrenagem Inseparável"
3980173347-DescriptionJp = "Quando Kokuma recebe Dano Contínuo de enfraquecimentos, o medidor do Reator diminui. Ao chegar a [c][007eff]0%[-][/c], muda para o estado de Recuperação (por [c][007eff]20s[-][/c]) (Tempo de Recarga [c][007eff]25s[-][/c]).\nCada vez que o medidor do Reator muda para o estado de Recuperação, aplicam-se os seguintes efeitos:\n- A Resistência a Dano Crítico diminui em [c][007eff]5000[-][/c] (máximo de 6 acúmulos).\n- O Valor de Resistência a Crítico diminui em [c][007eff]100%[-][/c] (por [c][007eff]20s[-][/c]).\n- Obtém efeito de Chamas Instáveis (máximo de 3 acúmulos)."
1893667434-NameJp = "Engrenagem da Quietude"
1893667434-DescriptionJp = "Reduz o dano recebido por Kokuma em [c][007eff]50%[-][/c]."
1616649841-NameJp = "Engrenagem da Quietude"
1616649841-DescriptionJp = "Reduz o dano recebido por Kokuma em [c][007eff]50%[-][/c].\nAumenta a quantidade do medidor do Reator de Kokuma."
2167520749-NameJp = "Engrenagem da Quietude"
2167520749-DescriptionJp = "Reduz o dano recebido por Kokuma em [c][007eff]80%[-][/c].\nAumenta a quantidade do medidor do Reator de Kokuma.\nCada vez que recebe Dano Contínuo de enfraquecimentos, o dano recebido aumenta em [c][007eff]10%[-][/c] (por [c][007eff]10s[-][/c]) (máximo de 5 acúmulos).\nTodos os efeitos de aumento de dano recebido aplicados a Kokuma não podem exceder [c][007eff]160%[-][/c] somados."
967237320-NameJp = "Prova da Sabedoria"
967237320-DescriptionJp = "Devido ao calor de Kokuma, todos os aliados não podem se esconder em coberturas, e não é possível atacar ou usar habilidades tendo coberturas como alvo.\nNo entanto, isso não afeta os efeitos que concedem estado de Cobertura."
820375476-NameJp = "Dispositivo de Controle: Balista"
820375476-DescriptionJp = "Quando a balista é disparada pelo Dispositivo de Controle, Kokuma entra em estado de Atordoamento e os seguintes efeitos são aplicados.\nDurante o estado de Atordoamento, o dano recebido aumenta em [c][007eff]50%[-][/c] (não se aplica quando Kokuma está em estado de Frenesi). Remove todos os efeitos de Chamas Instáveis e, para cada Chama Instável removida, o dano recebido aumenta adicionalmente em [c][007eff]25%[-][/c]."
2060423553-NameJp = "Dispositivo de Controle: Disparo da Balista"
2060423553-DescriptionJp = "Periodicamente, ativa o Dispositivo de Controle da Balista (pode ser ativado até [c][007eff]2[-][/c] vezes).\nO Dispositivo de Controle ativado só pode ser atacado com Habilidades EX. Quando seu HP fica abaixo de 1%, a balista é disparada (se a Grande Balista estiver destruída, a balista não é disparada).\nAlém disso, a Taxa de Crítico dos aliados Strikers atinge o valor máximo e a Recuperação de Custo aumenta em [c][007eff]1000[-][/c] (por [c][007eff]22s[-][/c])."
3905780948-NameJp = "Trono Central"
3905780948-DescriptionJp = "O Ataque Normal causa dano igual a [c][007eff]100%[-][/c] do Ataque a até 6 aliados sequencialmente. Contra alvos sem escudo, causa dano adicional igual a [c][007eff]100%[-][/c] do Ataque."
2581051694-NameJp = "Trono Central"
2581051694-DescriptionJp = "O Ataque Normal causa dano igual a [c][007eff]100%[-][/c] do Ataque a até 6 aliados sequencialmente. Contra alvos sem escudo, causa dano adicional igual a [c][007eff]100%[-][/c] do Ataque.\nTodo dano causado diretamente por Tiferet recebe dano adicional igual a [c][007eff]100%[-][/c] do Ataque (Tempo de Recarga [c][007eff]5s[-][/c])."
277873227-NameJp = "Oferenda Brilhante"
277873227-DescriptionJp = "Tiferet ativa 2 dos 3 núcleos e invoca 4 Raybors ao redor deles.\nAté usar \"Sacrifício Oferecido\", reduz o dano recebido em [c][007eff]50%[-][/c].\nQuando um Raybor é derrotado, causa dano igual a [c][007eff]1%[-][/c] do HP máximo de Tiferet e a barra de Atordoamento aumenta."
450642269-NameJp = "Núcleo Azul: Técnica Secreta da Aflição"
450642269-DescriptionJp = "O [c][336e9b]Núcleo Azul à esquerda[-][/c] expande um Campo de Proteção ao redor de si que reduz o dano recebido em [c][007eff]50%[-][/c].\nDispara uma bomba adesiva no aliado Striker com menor alcance. Após 8 segundos, ela explode, causando dano igual a [c][007eff]600%[-][/c] do Ataque a todos os alvos na área.\nSe o alvo atingido pela bomba adesiva entrar no Campo de Proteção, o Campo é cancelado e a bomba explode imediatamente."
3355460818-NameJp = "Núcleo Vermelho: Holocausto Visitante"
3355460818-DescriptionJp = "O [c][a0201f]Núcleo Vermelho frontal[-][/c] mira por 8 segundos no aliado Striker com menor alcance.\nEm seguida, emite micro-ondas que causam dano igual a [c][007eff]2800%[-][/c] do Ataque, ignorando [c][007eff]50%[-][/c] do escudo, a todos os alvos na área em leque."
2074242949-NameJp = "Núcleo Amarelo: Cenário de Harmonia"
2074242949-DescriptionJp = "O [c][ac7028]Núcleo Amarelo à direita[-][/c] dispara um míssil, causando dano igual a [c][007eff]100%[-][/c] do Ataque a até 6 aliados sequencialmente.\nSe o alvo não tiver escudo: explode e causa dano adicional igual a [c][007eff]300%[-][/c] do Ataque.\nSe o alvo tiver escudo: é refletido de volta ao Núcleo Amarelo, causando dano e aumentando a barra de Atordoamento."
2180621774-NameJp = "Sacrifício Oferecido"
2180621774-DescriptionJp = "Tiferet desativa os núcleos ativados e recolhe os Raybors invocados.\nPara cada Raybor recolhido, recupera HP igual a [c][007eff]1%[-][/c] do HP máximo de Tiferet.\nAté usar \"Oferenda Brilhante\", aumenta o Ataque de Tiferet em [c][007eff]100%[-][/c]."
538675197-NameJp = "Poder dos Seis Reinos"
538675197-DescriptionJp = "Tiferet causa dano igual a [c][007eff]200%[-][/c] do Ataque a até 6 aliados sequencialmente. Se o alvo não tiver escudo, reduz sua Taxa de Cura Recebida em [c][007eff]50%[-][/c] (por [c][007eff]15s[-][/c])."
1813686770-NameJp = "Vontade que Abraça a Vida"
1813686770-DescriptionJp = "Tiferet entra em estado de Despertar, aumentando o Ataque em [c][007eff]100%[-][/c].\n\"Oferenda Brilhante\" é alterada para ativar todos os núcleos.\n\"Poder dos Seis Reinos\" é fortalecido para causar dano adicional igual a [c][007eff]200%[-][/c] do Ataque."
848656337-NameJp = "Oração do Rei Iluminado"
848656337-DescriptionJp = "Quando o ATG atinge o máximo, carrega energia por 10 segundos e depois dispara um poderoso raio de 999999 de dano (este ataque remove o estado de Imortalidade).\nDurante o disparo, Tiferet ativa uma barreira que impede a fuga.\nOs aliados Strikers não podem usar Habilidades Normais, mas em compensação sua Velocidade de Movimento aumenta em [c][007eff]30%[-][/c] e a Recuperação de Custo aumenta em [c][007eff]1000[-][/c].\nQuando a habilidade termina, Tiferet entra em estado de Atordoamento."
2836065005-NameJp = "Amanhecer do Ritual"
2836065005-DescriptionJp = "Tiferet dispara um raio explosivo em direção ao centro dos aliados, removendo os escudos aliados e causando dano igual a [c][007eff]300%[-][/c] do Ataque aos aliados na área."
3631629694-NameJp = "Aquele que Aparece na Aurora"
3631629694-DescriptionJp = "Quando Tiferet entra em estado de Atordoamento, o dano recebido aumenta em [c][007eff]100%[-][/c] e a Recuperação de Custo dos aliados Strikers aumenta em [c][007eff]1000[-][/c] (por [c][007eff]20s[-][/c]).\nCada vez que Tiferet entra em estado de Atordoamento, o dano recebido aumenta em [c][007eff]50%[-][/c] até o final da batalha."
3251095476-NameJp = "Aquele que Aparece na Aurora"
3251095476-DescriptionJp = "Quando Tiferet entra em estado de Atordoamento, o dano recebido aumenta em [c][007eff]100%[-][/c] e a Recuperação de Custo dos aliados Strikers aumenta em [c][007eff]1000[-][/c] (por [c][007eff]20s[-][/c]), e invoca 8 Drones de Suporte (por [c][007eff]20s[-][/c]) (apenas [c][007eff]1[-][/c] vez por batalha).\nPara cada Drone de Suporte, o dano recebido por Tiferet diminui em [c][007eff]10%[-][/c].\nCada vez que Tiferet entra em estado de Atordoamento, o dano recebido aumenta em [c][007eff]50%[-][/c] até o final da batalha."
1351937543-NameJp = "Devoção ao Esplendor"
1351937543-DescriptionJp = "Reduz em [c][007eff]50%[-][/c] o dano recebido pelos núcleos inativos."
43139917-NameJp = "Orgulho Superado"
43139917-DescriptionJp = "Os núcleos podem ser atacados pelas habilidades dos próprios núcleos; nesse caso, a barra de Atordoamento de Tiferet aumenta.\nO dano recebido pelos núcleos é transferido para Tiferet (este dano ignora os efeitos de aumento e redução de dano recebido de Tiferet)."
2071383327-NameJp = "Luz que Atravessa o Instante"
2071383327-DescriptionJp = "Após um núcleo ser atacado por uma habilidade de núcleo, se dentro de [c][007eff]20s[-][/c] for atacado por outra habilidade de núcleo, muda para o estado de Ponto Fraco Exposto (por [c][007eff]20s[-][/c]).\nQuando um núcleo no estado de Ponto Fraco Exposto é atacado por uma Habilidade EX de um aliado, muda para o estado de Atordoamento (por [c][007eff]20s[-][/c]) e o dano recebido aumenta em [c][007eff]100%[-][/c] (por [c][007eff]10s[-][/c])."
900259980-NameJp = "Sacrifício Oferecido"
900259980-DescriptionJp = "Tiferet desativa os núcleos ativados e recolhe os Raybors invocados.\nPara cada Raybor recolhido, aumenta a Defesa de Tiferet em [c][007eff]10[-][/c].\nAté usar \"Oferenda Brilhante\", aumenta o Ataque em [c][007eff]100%[-][/c]."
397050854-NameJp = "[Núcleo de Suporte: Kesed]"
397050854-DescriptionJp = "O Golias invocado com dados analisados do núcleo do Profeta bombardeia o inimigo.\nCausa [c][3cbcff]Dano Mínimo[-][/c] aos inimigos na área circular.\n(Tempo de Recarga [c][3cbcff]30[-][/c]s)"
1589429638-NameJp = "[Núcleo de Suporte: Kesed]"
1589429638-DescriptionJp = "O Golias invocado com dados analisados do núcleo do Profeta bombardeia o inimigo.\nCausa [c][3cbcff]Dano Pequeno[-][/c] aos inimigos na área circular.\n(Tempo de Recarga [c][3cbcff]30[-][/c]s)"
4066321905-NameJp = "[Núcleo de Suporte: Kesed]"
4066321905-DescriptionJp = "O Golias invocado com dados analisados do núcleo do Profeta bombardeia o inimigo.\nCausa [c][3cbcff]Dano Médio[-][/c] aos inimigos na área circular.\n(Tempo de Recarga [c][3cbcff]30[-][/c]s)"
2597154691-NameJp = "[Núcleo de Suporte: Kesed]"
2597154691-DescriptionJp = "O Golias invocado com dados analisados do núcleo do Profeta bombardeia o inimigo.\nCausa [c][3cbcff]Dano Grande[-][/c] aos inimigos na área circular.\n(Tempo de Recarga [c][3cbcff]30[-][/c]s)"
2370637859-NameJp = "[Núcleo de Suporte: Kesed]"
