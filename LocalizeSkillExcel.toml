2307000319-NameJp = "Holy Mirror"
2307000319-DescriptionJp = "Malkuth adapts to incoming elemental attacks.\nElemental adaptation is displayed via gauges during battle. Each gauge increases based on Explosive, Piercing, Mystic, and Sonic damage received.\nWhen an adaptation gauge reaches [c][007eff]100%[-][/c], attacks of that element result in Resist damage.\nUpon ending a Grogginess state, all adaptation gauges are reset to [c][007eff]0%[-][/c]."
1817512679-NameJp = "Holy Mirror"
1817512679-DescriptionJp = "Increases Malkuth's ATK by [c][007eff]100%[-][/c] and reduces damage taken by [c][007eff]10%[-][/c].\nMalkuth adapts to incoming elemental attacks.\nElemental adaptation is displayed via gauges. Each gauge increases based on Explosive, Piercing, Mystic, and Sonic damage received.\nWhen an adaptation gauge reaches [c][007eff]100%[-][/c], attacks of that element result in Resist damage.\nUpon ending a Grogginess state, all adaptation gauges are reset to [c][007eff]0%[-][/c]."
259148531-NameJp = "One Who Deviated from the Path"
259148531-DescriptionJp = "When [c][007eff]2[-][/c] adaptation gauges reach [c][007eff]100%[-][/c], the ATG gauge decreases and Malkuth suffers an overload, entering a Grogginess state. During this state:\n-All Explosive, Piercing, Mystic, and Sonic damage to Malkuth results in Weak damage.\n-All allies' Cost Recovery increases by [c][007eff]50%[-][/c].\nIf all gauges are at [c][007eff]100%[-][/c] when Grogginess ends, deals [c][007eff]30%[-][/c] of Malkuth's Max HP as damage and further reduces the ATG gauge."
