523310052-DescriptionJp = "Absorve a eletricidade ao redor, causando dano equivalente a [c][007eff]390%[-][/c] do poder de ataque a todos os aliados, exceto o obelisco.\nA barra de raio aumenta drasticamente.\nAlém disso, se o valor de ATG for 66% ou mais, invoca um raio que causa dano equivalente a [c][007eff]450%[-][/c] do poder de ataque ao obelisco com o maior HP."
