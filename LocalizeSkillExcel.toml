1094164483-DescriptionJp = "Durante a batalha contra Kurokage, a Intimidação do Gato-Oni aumenta devido a ataques específicos:\n- Ao estar na área dos olhos de Kurokage que aparecem no chão.\n- Ao estar dentro da área de Kurokage.\nA Intimidação do Gato-Oni corrói o HP gradualmente, impedindo a recuperação até o HP máximo. Efeitos de cura podem reduzir a Intimidação do Gato-Oni, diminuindo o valor equivalente a [c][007eff]1/3 do excesso de cura[-][/c]."
