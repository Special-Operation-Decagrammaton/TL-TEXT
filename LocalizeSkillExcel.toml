2285676125-NameJp = "Pilar do julgamento"
2285676125-DescriptionJp = "Após usar \"No fogo, no fundo da água\", gera um pilar de gelo.\n- O pilar de gelo, ao ser gerado, entra em estado imortal (por [c][007eff]2.5 segundos[-][/c]) e aplica um escudo equivalente a [c][007eff]400%[-][/c] do seu HP máximo (por [c][007eff]20 segundos[-][/c]).\n- [c][007eff]20 segundos[-][/c] após a geração do pilar de gelo, ele causa dano equivalente a [c][007eff]70%[-][/c] do seu HP máximo a si mesmo.\n- Enquanto o pilar de gelo existir, reduz a defesa de todos os aliados em [c][007eff]45%[-][/c], fixa o efeito de cura recebida em [c][007eff]1[-][/c] e causa dano equivalente a [c][007eff]30%[-][/c] do poder de ataque a cada [c][007eff]4 segundos[-][/c].\n- Ao destruir o pilar de gelo, aumenta a cura recebida pelo radiador em [c][007eff]100%[-][/c] e aumenta o poder de cura de todos os aliados em [c][007eff]200%[-][/c] (por [c][007eff]20 segundos[-][/c]).\n- Quando o HP de Geburah cai para [c][007eff]60%[-][/c] ou menos e o terreno muda, o pilar de gelo é destruído.\n- O pilar de gelo só pode ser atacado com habilidades EX."
1996187408-NameJp = "Mão da Purificação (Vermelha)"
1996187408-DescriptionJp = "Yesod libera uma luz [c][007eff]vermelha[-][/c], levanta a mão direita e golpeia o chão, causando [c][007eff]1500%[-][/c] de dano de ataque a todos os aliados.\nAo golpear o chão, se uma área [c][007eff]azul[-][/c] estiver gerada em todo o chão, bloqueia a habilidade e:\n- Causa [c][007eff]15%[-][/c] de dano contínuo de ataque a todos os aliados em vez do dano original (por 20 segundos).\n- Aumenta a recuperação de custo dos alunos Striker aliados em [c][007eff]100%[-][/c] até o uso da próxima EX Skill de Yesod."
