118391937-NameJp = "Resposta de emergência: Sobrecarga do radiador"
118391937-DescriptionJp = "Quando a potência do radiador atinge [c][007eff]100%[-][/c], ocorre sobrecarga.\n- Em estado de sobrecarga, aumenta a recuperação de custo de todos os aliados em [c][007eff]500[-][/c], o poder de ataque em [c][007eff]30%[-][/c] e a taxa de dano crítico em [c][007eff]60%[-][/c].\n- Em estado de sobrecarga, a taxa de redução da potência do radiador aumenta.\n- Quanto mais tempo o estado de sobrecarga durar, maior será a redução adicional da potência e menor será o ciclo de redução.\n- Quando a potência do radiador fica abaixo de [c][007eff]30%[-][/c], o estado de sobrecarga é cancelado."
