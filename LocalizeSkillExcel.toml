118391937-NameJp = "Resposta de Emergência: Sobrecarga do Radiador"
118391937-DescriptionJp = "Quando a saída do Radiador atinge [c][007eff]100%[-][/c], ocorre uma sobrecarga.\n- Durante a sobrecarga, a Recuperação de Custo de todos os aliados aumenta em [c][007eff]500[-][/c], o Ataque em [c][007eff]30%[-][/c] e a Taxa de Dano Crítico em [c][007eff]60%[-][/c].\n- Durante a sobrecarga, a diminuição da saída do Radiador aumenta.\n- Quanto mais durar a sobrecarga, maior será a diminuição adicional da saída e mais curto será o ciclo de diminuição.\n- Quando a saída do Radiador fica abaixo de [c][007eff]30%[-][/c], o estado de sobrecarga é cancelado."
