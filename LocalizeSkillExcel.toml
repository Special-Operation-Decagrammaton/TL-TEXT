3376901914-NameJp = "Apenas por Você, Meu Senhor"
3376901914-DescriptionJp = "A cada 60 segundos, todos os efeitos abaixo são aplicados a Wakamo (total de 3 estágios):\nAtaque: aumenta em [c][007eff]30%/60%/90%[-][/c]\nValor Crítico: aumenta em [c][007eff]35%/70%/105%[-][/c]\nDano Recebido: aumenta em [c][007eff]10%/20%/50%[-][/c]\nVelocidade de Recuperação de ATG: aumenta em [c][007eff]15%/30%/80%[-][/c]"
222512162-NameJp = "Eliminarei os Intrusos"
222512162-DescriptionJp = "Aliados atingidos pelas habilidades de Wakamo recebem o Selo de Wakamo.\nAo acumular [c][007eff]5[-][/c] Selos de Wakamo, o aliado em questão sofre dano igual a [c][007eff]1000%[-][/c] do seu HP máximo."
