3519203297-NameJp = "Echo of Color - Alpha"
3519203297-DescriptionJp = "Shiroko*Terror e Phrenapates usam habilidades simultaneamente.\nShiroko*Terror: Causa dano equivalente a [c][007eff]2500%[-][/c] do poder de ataque aos inimigos em uma linha reta.\nPhrenapates: Causa dano equivalente a [c][007eff]6000%[-][/c] do poder de ataque aos inimigos em uma área circular.\nDurante o uso da habilidade, um medidor de estado CC é gerado em Phrenapates. Ao acumular [c][007eff]4.5 segundos[-][/c] de estado CC, a habilidade de Phrenapates é interrompida e o poder de ataque de todos os inimigos aumenta em [c][007eff]100%[-][/c] (por [c][007eff]17 segundos[-][/c])."
905682378-NameJp = "Echo of Color - Beta"
905682378-DescriptionJp = "Shiroko*Terror e Phrenapates usam habilidades simultaneamente.\nShiroko*Terror: Causa dano equivalente a [c][007eff]2500%[-][/c] do poder de ataque aos inimigos em uma área circular.\nPhrenapates: Causa dano equivalente a [c][007eff]2500%[-][/c] do poder de ataque aos inimigos em uma linha reta.\nDurante o uso da habilidade, um medidor de estado CC é gerado em Phrenapates. Ao acumular [c][007eff]4.5 segundos[-][/c] de estado CC, a habilidade de Phrenapates é interrompida e o poder de ataque de todos os inimigos aumenta em [c][007eff]100%[-][/c] (por [c][007eff]17 segundos[-][/c])."
