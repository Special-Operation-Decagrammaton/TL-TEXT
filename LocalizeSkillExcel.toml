354185713-NameJp = "Garras Robustas"
354185713-DescriptionJp = "Tipo de Defesa: Armadura Especial\nApós o Caranguejo Tambor usar \"Estocada Direita\" ou \"Estocada Esquerda\", pode ser atacado com Habilidades EX apenas por um tempo limitado.\nReduz o dano recebido pela garra em [c][007eff]10%[-][/c].\nQuando o HP chega a [c][007eff]0[-][/c], a carapaça é destruída e o efeito de redução de dano de [c][007eff]10%[-][/c] é removido."
3087154065-NameJp = "Garras Robustas"
3087154065-DescriptionJp = "Tipo de Defesa: Armadura Especial\nApós o Caranguejo Tambor usar \"Estocada Direita\" ou \"Estocada Esquerda\", pode ser atacado com Habilidades EX apenas por um tempo limitado.\nReduz o dano recebido pela garra em [c][007eff]30%[-][/c].\nQuando o HP chega a [c][007eff]0[-][/c], a carapaça é destruída e o efeito de redução de dano de [c][007eff]30%[-][/c] é removido."
134171379-NameJp = "Casco Envelhecido"
134171379-DescriptionJp = "Tipo de Defesa: Equipamento Leve\nReduz o dano recebido pelo casco em [c][007eff]10%[-][/c].\nQuando o HP chega a [c][007eff]0[-][/c], a blindagem do casco é destruída e o efeito de redução de dano de [c][007eff]10%[-][/c] é removido."
2604885501-NameJp = "Casco Envelhecido"
2604885501-DescriptionJp = "Tipo de Defesa: Equipamento Leve\nReduz o dano recebido pelo casco em [c][007eff]30%[-][/c]. Reduz o dano recebido de Habilidades EX em [c][007eff]40%[-][/c].\nEm compensação, a quantidade de dano Weak aumenta em [c][007eff]2 vezes[-][/c].\nQuando o HP chega a [c][007eff]0[-][/c], a blindagem do casco é destruída e o efeito de redução de dano de [c][007eff]30%[-][/c] é removido."
3977968983-NameJp = "Casco Envelhecido"
3977968983-DescriptionJp = "Tipo de Defesa: Equipamento Leve\nReduz o dano recebido pelo casco em [c][007eff]30%[-][/c]. Reduz o dano recebido de Habilidades EX em [c][007eff]80%[-][/c].\nEm compensação, a quantidade de dano Weak aumenta em [c][007eff]2 vezes[-][/c].\nQuando o HP chega a [c][007eff]0[-][/c], a blindagem do casco é destruída e o efeito de redução de dano de [c][007eff]30%[-][/c] é removido."
1546810451-NameJp = "Painel de Controle"
1546810451-DescriptionJp = "O Painel de Controle pode ser alvo de Habilidades EX apenas enquanto o Caranguejo Tambor estiver usando \"Estocada Direita\" ou \"Estocada Esquerda\".\nAo remover o fluido adesivo, o guindaste se move na direção do Painel de Controle limpo."
1844023534-NameJp = "Pistola d'Água Venenosa"
1844023534-DescriptionJp = "Causa dano igual a [c][007eff]70%[-][/c] do Ataque aos aliados na área em leque.\nAplica [c][007eff]1[-][/c] fluido adesivo ao Tambor Enferrujado (por [c][007eff]60s[-][/c])."
822231762-NameJp = "Pistola d'Água Venenosa"
822231762-DescriptionJp = "Causa dano igual a [c][007eff]70%[-][/c] do Ataque aos aliados na área em leque.\nAplica [c][007eff]1[-][/c] fluido adesivo ao Tambor Enferrujado (por [c][007eff]60s[-][/c]) (máximo de [c][007eff]3[-][/c] acúmulos)."
503231848-NameJp = "Pistola d'Água Venenosa"
503231848-DescriptionJp = "Causa dano igual a [c][007eff]70%[-][/c] do Ataque aos aliados na área em leque.\nAplica [c][007eff]1[-][/c] fluido adesivo ao Tambor Enferrujado (por [c][007eff]60s[-][/c]) (máximo de [c][007eff]5[-][/c] acúmulos)."
3488084970-NameJp = "Varredura de Garras"
3488084970-DescriptionJp = "Gera uma onda de choque com as Garras de Aço, causando dano igual a [c][007eff]100%[-][/c] do Ataque aos aliados na área em leque.\nAo usar esta habilidade, as Garras de Aço podem ser atacadas com Habilidades EX."
3017968882-NameJp = "Disparo do Canhão Principal"
3017968882-DescriptionJp = "Dispara o canhão gigante, causando dano igual a [c][007eff]85%[-][/c] do Ataque a todos os aliados."
1322851606-NameJp = "Contra-Garras"
1322851606-DescriptionJp = "O Caranguejo Tambor assume uma postura defensiva, e as Garras de Aço recebem todos os ataques em seu lugar.\nDurante a postura defensiva, acumula [c][007eff]6 vezes[-][/c] o dano recebido (máximo de [c][007eff]90000[-][/c]).\nApós um tempo, concede estado de Imortalidade a todos os aliados (por [c][007eff]10s[-][/c]) e causa dano igual a [c][007eff]10%[-][/c] do valor acumulado.\nSe entrar em estado de Atordoamento antes de causar dano, em vez disso, causa dano igual a [c][007eff]100%[-][/c] do valor acumulado ao Caranguejo Tambor.\nApós aplicar o dano, o valor acumulado é resetado e o máximo de acúmulo aumenta em [c][007eff]2 vezes[-][/c]."
1237644973-NameJp = "Contra-Garras"
1237644973-DescriptionJp = "O Caranguejo Tambor assume uma postura defensiva, e as Garras de Aço recebem todos os ataques em seu lugar.\nDurante a postura defensiva, acumula [c][007eff]6 vezes[-][/c] o dano recebido (máximo de [c][007eff]160000[-][/c]).\nApós um tempo, concede estado de Imortalidade a todos os aliados (por [c][007eff]10s[-][/c]) e causa dano igual a [c][007eff]10%[-][/c] do valor acumulado.\nSe entrar em estado de Atordoamento antes de causar dano, em vez disso, causa dano igual a [c][007eff]100%[-][/c] do valor acumulado ao Caranguejo Tambor.\nApós aplicar o dano, o valor acumulado é resetado e o máximo de acúmulo aumenta em [c][007eff]2 vezes[-][/c]."
