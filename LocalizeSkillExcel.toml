2518394088-NameJp = "Urgata"
2518394088-DescriptionJp = "Aplica estado de Maldição a 1 aliado.\nO estado de Maldição causa Dano Contínuo igual a [c][007eff]20%[-][/c] do Ataque e, após [c][007eff]10s[-][/c], explode causando dano igual a [c][007eff]325%[-][/c] do Ataque aos aliados na área circular.\nSe o HP do alvo com Maldição estiver em [c][007eff]100%[-][/c], ou for recuperado para 100%, a Maldição é cancelada imediatamente."
