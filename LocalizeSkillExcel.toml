2745759469-DescriptionJp = "Kether Type.E gera um EMP azul.\nCausa dano equivalente a [c][007eff]100%[-][/c] do seu ataque aos aliados em uma área circular (o dano diminui conforme a distância aumenta) (máximo de 1x, mínimo de 0,2x).\nRemove o efeito de aumento de dano causado dos aliados na área circular e reduz o dano causado em [c][007eff]50%[-][/c].\nO efeito de redução de dano causado pode ser removido por habilidades de remoção de efeitos negativos; ao remover, aumenta o dano causado pelos alunos Striker aliados em [c][007eff]50%[-][/c] (por [c][007eff]60 segundos[-][/c]) e aumenta a velocidade de recuperação de custo em [c][007eff]350[-][/c] (por [c][007eff]15 segundos[-][/c])."
