316806130-NameJp = "Alma de Fogo"
316806130-DescriptionJp = "Causa dano equivalente a [c][007eff]200%[-][/c] do seu ataque a todos os aliados.\nMalkuth entra em estado de conclusão enquanto utiliza esta habilidade."
