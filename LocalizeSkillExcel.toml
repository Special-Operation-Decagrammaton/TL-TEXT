2191506557-DescriptionJp = "Conduz eletricidade pelo chão, causando [c][007eff]230%[-][/c] de dano de ataque a todos os aliados, exceto ao Obelisco.\nAlém disso, se o valor de ATG estiver em 66% ou mais, invoca um raio que causa [c][007eff]450%[-][/c] de dano de ataque ao Obelisco com o maior HP."
