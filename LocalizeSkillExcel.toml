2003239472-NameJp = "Alma de Fogo"
2003239472-DescriptionJp = "Causa dano igual a [c][007eff]250%[-][/c] do Ataque a todos os aliados.\nEnquanto Malkuth usa esta habilidade, ele fica em estado de Completude."
109238676-NameJp = "Peregrino do Reino"
109238676-DescriptionJp = "Quando o valor de ATG está no máximo, Malkuth alça voo e realiza um bombardeio, causando dano igual a [c][007eff]300%[-][/c] do Ataque a todos os aliados.\nEnquanto Malkuth usa esta habilidade:\n- Malkuth fica em estado de Imortalidade e não pode ser alvo de nenhuma habilidade aliada.\n- Invoca um Tab que ataca os aliados.\n- Fica em estado de Completude."
2250379265-NameJp = "Aquele que se Manifesta"
2250379265-DescriptionJp = "Usado uma única vez quando o HP de Malkuth fica abaixo de [c][007eff]75%[-][/c].\nMalkuth desperta, usa a habilidade \"Espelho Sagrado\" e, independentemente do valor de ATG, usa a habilidade \"Peregrino do Reino\" [c][007eff]1 vez[-][/c].\nAté que a habilidade \"Espelho Sagrado\" seja usada, todo o dano recebido por Malkuth é anulado."
2307000319-NameJp = "Espelho Sagrado"
2307000319-DescriptionJp = "Malkuth se adapta aos ataques elementais recebidos.\nDurante a batalha, o grau de adaptação elemental é exibido em um medidor, e cada medidor aumenta de acordo com o dano de Explosivo, Penetração, Místico e Vibração recebido por Malkuth.\nQuando o grau de adaptação de um elemento específico atinge [c][007eff]100%[-][/c], os ataques desse elemento são recebidos como dano Resist.\nAo final do estado de Atordoamento, todos os graus de adaptação elemental são reiniciados para [c][007eff]0%[-][/c]."
1817512679-NameJp = "Espelho Sagrado"
1817512679-DescriptionJp = "Aumenta o Ataque de Malkuth em [c][007eff]100%[-][/c] e reduz o dano recebido em [c][007eff]10%[-][/c].\nMalkuth se adapta aos ataques elementais recebidos.\nDurante a batalha, o grau de adaptação elemental é exibido em um medidor, e cada medidor aumenta de acordo com o dano de Explosivo, Penetração, Místico e Vibração recebido por Malkuth.\nQuando o grau de adaptação de um elemento específico atinge [c][007eff]100%[-][/c], os ataques desse elemento são recebidos como dano Resist.\nAo final do estado de Atordoamento, todos os graus de adaptação elemental são reiniciados para [c][007eff]0%[-][/c]."
259148531-NameJp = "Aquele que se Desviou do Caminho"
259148531-DescriptionJp = "Quando [c][007eff]2[-][/c] graus de adaptação elemental atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Atordoamento. Durante este estado:\n- Todo dano de Explosivo, Penetração, Místico e Vibração recebido por Malkuth é considerado dano Weak.\n- A Recuperação de Custo de todos os aliados aumenta em [c][007eff]50%[-][/c].\nSe, ao final do estado de Atordoamento, todos os graus de adaptação elemental estiverem em [c][007eff]100%[-][/c], Malkuth sofre dano igual a [c][007eff]30%[-][/c] do seu HP máximo e o valor de ATG é reduzido adicionalmente."
3447434770-NameJp = "Aquele que se Desviou do Caminho"
3447434770-DescriptionJp = "Quando [c][007eff]3[-][/c] graus de adaptação elemental atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Atordoamento. Durante este estado:\n- Todo dano de Explosivo, Penetração, Místico e Vibração recebido por Malkuth é considerado dano Weak.\n- A Recuperação de Custo de todos os aliados aumenta em [c][007eff]50%[-][/c].\nSe, ao final do estado de Atordoamento, todos os graus de adaptação elemental estiverem em [c][007eff]100%[-][/c], Malkuth sofre dano igual a [c][007eff]30%[-][/c] do seu HP máximo e o valor de ATG é reduzido adicionalmente."
94465433-NameJp = "Aquele que se Desviou do Caminho"
94465433-DescriptionJp = "Quando todos os graus de adaptação elemental atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Atordoamento. Durante este estado:\n- Todo dano de Explosivo, Penetração, Místico e Vibração recebido por Malkuth é considerado dano Weak.\n- A Recuperação de Custo de todos os aliados aumenta em [c][007eff]50%[-][/c].\nApós o estado de Atordoamento, Malkuth sofre dano igual a [c][007eff]30%[-][/c] do seu HP máximo e o valor de ATG é reduzido adicionalmente."
856686295-NameJp = "Aquele que se Desviou do Caminho"
856686295-DescriptionJp = "Quando todos os graus de adaptação elemental atingem [c][007eff]100%[-][/c], o valor de ATG diminui e Malkuth sofre uma sobrecarga, entrando em estado de Atordoamento. Durante este estado:\n- Todo dano de Explosivo, Penetração, Místico e Vibração recebido por Malkuth é considerado dano Weak.\n- A Recuperação de Custo de todos os aliados aumenta em [c][007eff]50%[-][/c].\nApós o estado de Atordoamento, Malkuth sofre dano igual a [c][007eff]30%[-][/c] do seu HP máximo e o valor de ATG é reduzido adicionalmente."
1846470235-NameJp = "Aquele que se Ergue sobre a Terra"
1846470235-DescriptionJp = "Quando Malkuth usa certas habilidades, ele fica em estado de Completude.\nEnquanto Malkuth está em estado de Completude, todos os graus de adaptação elemental não podem atingir [c][007eff]100%[-][/c] (exceto os medidores que já atingiram [c][007eff]100%[-][/c])."
3240340266-NameJp = "Sacrifício Determinado"
3240340266-DescriptionJp = "Dekagramaton invoca Raybors.\nDependendo do [c][007eff]Raybor absorvido[-][/c], empurra ainda mais os aliados e causa dano igual a [c][007eff]100% a 700%[-][/c] do Ataque.\n\nO [c][a0201f]Raybor Vermelho[-][/c], ao morrer, causa dano igual a [c][007eff]1000%[-][/c] do Ataque a aliados e inimigos sem distinção; se o alvo for um Raybor, ele é derrotado.\nO [c][336e9b]Raybor Azul[-][/c], enquanto vivo, reduz o dano recebido pelos Raybors ao redor (exceto a si mesmo) em [c][007eff]80%[-][/c] e aumenta a Defesa em [c][007eff]10000[-][/c]."
2083655618-NameJp = "Sacrifício da Harmonia"
2083655618-DescriptionJp = "Dekagramaton absorve Raybors e puxa os aliados."
932757445-NameJp = "Ipsum Esse"
932757445-DescriptionJp = "Dekagramaton anula o dano de habilidades de suporte e o dano de autodestruição dos Raybors; todo dano é Resist.\n\nQuando a barra de Atordoamento atinge o máximo:\nPor [c][007eff]20s[-][/c], todo dano é Weak e a anulação das habilidades de suporte é removida."
2217822351-NameJp = "Erguendo-se sobre a Terra"
2217822351-DescriptionJp = "Quando os aliados suprimem o dano das habilidades de Dekagramaton ou derrotam Raybors sob a influência do [c][007eff][Núcleo de Suporte: Hod][-][/c], a barra de Atordoamento aumenta e Dekagramaton sofre dano igual a [c][007eff]0.1% a 0.7%[-][/c] do seu HP máximo."
691417961-NameJp = "Começo e Fim"
691417961-DescriptionJp = "Todos os alunos ficam em estado de Imortalidade e a quantidade de dano causado aumenta em [c][007eff]50%[-][/c].\n\nDekagramaton aplica [c][007eff]Mishuna[-][/c] em aliados com HP [c][007eff]5%[-][/c] ou menos, causando dano igual a [c][007eff]5%[-][/c] do HP máximo.\n(Este ataque ignora estado de Imortalidade e efeitos de escudo)."
3514022694-NameJp = "Lacrimosa"
3514022694-DescriptionJp = "Dekagramaton ataca diretamente os aliados, causando dano em uma grande área."
2744501322-NameJp = "Aquele que Tudo Sabe"
2744501322-DescriptionJp = "Dekagramaton causa dano igual a [c][007eff]400%[-][/c] do Ataque a até 4 aliados sequencialmente, empurra os aliados e invoca Raybors."
1543540790-NameJp = "Aquele que Tudo Governa"
1543540790-DescriptionJp = "Dekagramaton lança um comprimento de onda de energia que causa dano igual a [c][007eff]10%[-][/c] do HP máximo aos alvos dentro da esfera.\nO comprimento de onda dispara projéteis secundários que causam dano igual a [c][007eff]100%[-][/c] do Ataque aos alvos na área.\n(Este ataque causa dano independentemente de ser aliado ou inimigo)."
3454195062-NameJp = "Aquele que Tudo Vê"
3454195062-DescriptionJp = "Dekagramaton causa [c][007eff]1000000[-][/c] de dano a todos os aliados (este ataque ignora o estado de Imortalidade)."
951246601-NameJp = "Olho da Providência"
951246601-DescriptionJp = "Dekagramaton invoca um Profeta para causar dano aos aliados na área.\nContra Strikers sob a influência do [c][007eff][Núcleo de Suporte: Hod][-][/c], a habilidade é suprimida e o dano recebido é reduzido pela metade.\n(A supressão tem um Tempo de Recarga de [c][007eff]0.5s[-][/c] por alvo)."
1325324414-NameJp = "Luz e Sombra da Criação"
1325324414-DescriptionJp = "Invoca Binah para causar dano igual a [c][007eff]700%[-][/c] do Ataque aos aliados na área em linha reta."
3034918095-NameJp = "Luz e Sombra do Anjo"
3034918095-DescriptionJp = "Invoca Kokuma e Gebra para dispararem raios cada um, causando dano igual a [c][007eff]200%[-][/c] do Ataque aos aliados na área.\nNa área onde os raios se cruzam, causa dano igual a [c][007eff]800%[-][/c] do Ataque aos aliados."
1261511103-NameJp = "Luz e Sombra da Matéria"
1261511103-DescriptionJp = "Invoca Hod para causar dano igual a [c][007eff]1200%[-][/c] do Ataque a todos os aliados."
4134697715-NameJp = "Criação do Céu e da Terra: Atsiluth"
4134697715-DescriptionJp = "Dekagramaton cria a faixa de Atsiluth, causando dano igual a [c][007eff]1000%[-][/c] do HP máximo do alvo a todos os aliados."
4127739943-NameJp = "Aquele que Juntos Concedem Misericórdia"
4127739943-DescriptionJp = "Rio usa o poder do Profeta Kesed e causa [c][007eff]5000000[-][/c] de dano a Dekagramaton.\nAlém disso, Dekagramaton entra em estado de Atordoamento."
1878784047-NameJp = "Aquele que Juntos Aperfeiçoam a Sabedoria"
