1433021264-NameJp = "Tempestade que devora a alvorada"
1433021264-DescriptionJp = "Envolve-se em uma tempestade, reduzindo o dano recebido da habilidade EX da Fúria de Set em [c][007eff]80%[-][/c].\nO dano causado pela Fúria de Set muda de acordo com o valor de ATG:\nAbaixo de [c][007eff]33%[-][/c]: Dano causado reduzido em [c][007eff]70%[-][/c].\n[c][007eff]66%[-][/c] ou mais: Dano causado aumentado em [c][007eff]80%[-][/c]."
1821539935-NameJp = "Poder que alcança a eternidade"
1821539935-DescriptionJp = "A Fúria de Set absorve energia da atmosfera e a barra de raio aumenta continuamente.\nSe a Fúria de Set sofrer dano, a barra de raio diminui; ao chegar a 0%, convoca uma esfera de raio azul.\n- Enquanto a esfera de raio azul estiver convocada, o dano causado por todos os aliados aumenta em [c][007eff]30%[-][/c] (por [c][007eff]30 segundos[-][/c]).\n\nSe a Fúria de Set estiver em estado de grogue, todos os aliados têm a recuperação de custo aumentada em [c][007eff]500[-][/c] e o dano máximo é aplicado, sem ser afetado pelo valor de estabilidade."
4182767414-NameJp = "Poder que alcança a eternidade"
4182767414-DescriptionJp = "A Fúria de Set absorve energia da atmosfera e a barra de raio aumenta continuamente.\nSe a Fúria de Set sofrer dano, a barra de raio diminui; ao chegar a 0%, convoca uma esfera de raio azul.\n- Enquanto a esfera de raio azul estiver convocada, o dano causado por todos os aliados aumenta em [c][007eff]30%[-][/c] (por [c][007eff]30 segundos[-][/c]).\n\nSe a Fúria de Set estiver em estado de grogue, todos os aliados têm a recuperação de custo aumentada em [c][007eff]500[-][/c] e o dano máximo é aplicado, sem ser afetado pelo valor de estabilidade. Além disso, convoca uma esfera de raio vermelha."
1760763215-NameJp = "Clarão que abate o falcão"
1760763215-DescriptionJp = "Relâmpagos ocorrem periodicamente. Causa dano equivalente a [c][007eff]35%[-][/c] do poder de ataque ao obelisco com o maior HP e aos aliados na área circular ao redor, além de reduzir o dano causado em [c][007eff]70%[-][/c] (por [c][007eff]40 segundos[-][/c]) (este efeito de enfraquecimento não pode ser removido por habilidades de remoção de debuff).\n- O relâmpago causa [c][007eff]200%[-][/c] de dano adicional ao obelisco.\n- O obelisco alvo entra em estado de \"Eletrizado\" até atingir o HP máximo e não será mais alvo de relâmpagos.\n- Se ambos os obeliscos estiverem \"Eletrizados\", o aliado com o maior HP torna-se o alvo do relâmpago.\n- Os obeliscos só podem ser curados com habilidades do tipo EX.\n(Esta habilidade não é afetada por \"Tempestade que devora a alvorada\".)"
1270176938-NameJp = "Vontade aguçada"
1270176938-DescriptionJp = "Dispara projéteis de fogo sequencialmente contra até 9 aliados (incluindo coberturas), causando dano equivalente a [c][007eff]288%[-][/c] do poder de ataque aos aliados na área circular ao redor de cada alvo."
2121264501-NameJp = "Vontade aguçada"
2121264501-DescriptionJp = "Dispara projéteis de fogo sequencialmente contra até 9 aliados (incluindo coberturas), causando dano equivalente a [c][007eff]288%[-][/c] do poder de ataque aos aliados na área circular ao redor de cada alvo.\n- Aliados que receberem ataques repetidos de projéteis de fogo (exceto coberturas) recebem dano adicional equivalente a [c][007eff]900%[-][/c] do poder de ataque (máximo de [c][007eff]1[-][/c] vez)."
293055446-NameJp = "Sabedoria polida"
293055446-DescriptionJp = "Dispara 20 esferas de fogo em uma área linear contra o aliado mais distante.\nAo atingir o alvo, os seguintes efeitos são aplicados:\n- Cobertura: Dano equivalente a [c][007eff]8%[-][/c] do poder de ataque.\n- Alvo em cobertura: Dano equivalente a [c][007eff]8%[-][/c] do poder de ataque e imobilização (por [c][007eff]2 segundos[-][/c]).\n- Outros alvos: Dano equivalente a [c][007eff]8.5%[-][/c] do poder de ataque e aplicação de dano contínuo de queimadura equivalente a [c][007eff]15%[-][/c] do poder de ataque (por [c][007eff]40 segundos[-][/c]).\nAs esferas de fogo são bloqueadas ao atingir uma cobertura."
1114721381-NameJp = "Sabedoria polida"
1114721381-DescriptionJp = "Dispara 20 esferas de fogo em uma área linear contra o aliado mais distante.\nAo atingir o alvo, os seguintes efeitos são aplicados:\n- Cobertura: Dano equivalente a [c][007eff]8%[-][/c] do poder de ataque.\n- Alvo em cobertura: Dano equivalente a [c][007eff]8%[-][/c] do poder de ataque e imobilização (por [c][007eff]2 segundos[-][/c]).\n- Outros alvos: Dano equivalente a [c][007eff]45%[-][/c] do poder de ataque e aplicação de dano contínuo de queimadura equivalente a [c][007eff]15%[-][/c] do poder de ataque (por [c][007eff]40 segundos[-][/c]).\nAs esferas de fogo são bloqueadas ao atingir uma cobertura."
2864338029-NameJp = "Sabedoria polida"
2864338029-DescriptionJp = "Dispara 20 esferas de fogo em uma área linear contra o aliado mais distante.\nAo atingir o alvo, os seguintes efeitos são aplicados:\n- Cobertura: Dano equivalente a [c][007eff]8%[-][/c] do poder de ataque.\n- Alvo em cobertura: Dano equivalente a [c][007eff]8%[-][/c] do poder de ataque e imobilização (por [c][007eff]2 segundos[-][/c]).\n- Outros alvos: Dano equivalente a [c][007eff]45%[-][/c] do poder de ataque e aplicação de dano contínuo de queimadura equivalente a [c][007eff]120%[-][/c] do poder de ataque (por [c][007eff]40 segundos[-][/c]).\nAs esferas de fogo são bloqueadas ao atingir uma cobertura."
2006646976-NameJp = "Guardião do reino"
2006646976-DescriptionJp = "Causa dano equivalente a [c][007eff]100%[-][/c] do poder de ataque aos aliados na área circular e aplica dano contínuo de queimadura equivalente a [c][007eff]90%[-][/c] do poder de ataque (por [c][007eff]20 segundos[-][/c])."
113056142-NameJp = "Guardião do reino"
113056142-DescriptionJp = "Causa dano equivalente a [c][007eff]100%[-][/c] do poder de ataque aos aliados na área circular, aplica dano contínuo de queimadura equivalente a [c][007eff]90%[-][/c] do poder de ataque e dano contínuo de eletrocussão equivalente a [c][007eff]183%[-][/c] do poder de ataque (por [c][007eff]20 segundos[-][/c])."
3959680911-NameJp = "Inteligência que a luz ilumina"
3959680911-DescriptionJp = "Destrói todas as coberturas e convoca uma roda de aço que se move em direção à grande balista (por [c][007eff]20 segundos[-][/c]).\nQuando a roda de aço atinge a grande balista, causa dano equivalente a [c][007eff]50%[-][/c] do HP máximo da grande balista.\nA roda de aço para ao colidir com coberturas, causando dano do tipo místico equivalente a [c][007eff]9.6%[-][/c] do poder de ataque por acerto.\nSe um alvo em cobertura for atingido pela roda de aço, ele ficará imobilizado (por [c][007eff]1.2 segundos[-][/c])."
2910754825-NameJp = "Inteligência que a luz ilumina"
2910754825-DescriptionJp = "Destrói todas as coberturas e convoca duas rodas de aço que se movem em direção à grande balista (por [c][007eff]20 segundos[-][/c]).\nQuando a roda de aço atinge a grande balista, causa dano equivalente a [c][007eff]100%[-][/c] do HP máximo da grande balista.\nA roda de aço para ao colidir com coberturas, causando dano do tipo místico equivalente a [c][007eff]9.6%[-][/c] do poder de ataque por acerto.\nSe um alvo em cobertura for atingido pela roda de aço, ele ficará imobilizado (por [c][007eff]1.2 segundos[-][/c])."
4028542298-NameJp = "Esperando o amanhecer"
4028542298-DescriptionJp = "Kukmar destrói todas as coberturas e entra em estado de fúria.\nSeu ataque normal passa a disparar fogo continuamente pela boca, causando dano equivalente a [c][007eff]50%[-][/c] do poder de ataque por acerto aos aliados em uma área em leque.\nAo atingir uma cobertura, o fogo causa [c][007eff]3%[-][/c] de dano e é bloqueado.\nSe um alvo em cobertura for atingido pelo fogo, ele ficará imobilizado (por [c][007eff]1 segundo[-][/c]).\n\nQuando Kukmar está em estado de fúria, os seguintes efeitos são aplicados:\n- Mesmo que a barra do reator chegue a [c][007eff]0%[-][/c], ele não muda para o estado de recuperação, e quanto menor a barra do reator, maior a velocidade de recuperação.\n- Se a barra do reator estiver abaixo de [c][007eff]70%[-][/c], o dano recebido aumenta em [c][007eff]100%[-][/c].\n- Remove todos os efeitos de fogo instável e a resistência a críticos é reduzida em [c][007eff]100%[-][/c].\n- Se um aluno striker aliado recuar, a barra do reator aumenta drasticamente."
3980173347-NameJp = "Engrenagem inseparável"
3980173347-DescriptionJp = "Quando Kukmar recebe dano contínuo por enfraquecimento, a barra do reator diminui; ao chegar a [c][007eff]0%[-][/c], ele muda para o estado de recuperação (por [c][007eff]20 segundos[-][/c]) (tempo de recarga de [c][007eff]25 segundos[-][/c]).\nSempre que a barra do reator muda para o estado de recuperação, os seguintes efeitos são aplicados:\n- Resistência a dano crítico reduzida em [c][007eff]5000[-][/c] (máximo de 6 acúmulos).\n- Resistência a críticos reduzida em [c][007eff]100%[-][/c] (por [c][007eff]20 segundos[-][/c]).\n- Obtém o efeito de fogo instável (máximo de 3 acúmulos)."
1893667434-NameJp = "Engrenagem da aniquilação"
1893667434-DescriptionJp = "Reduz o dano recebido por Kukmar em [c][007eff]50%[-][/c]."
1616649841-NameJp = "Engrenagem da aniquilação"
1616649841-DescriptionJp = "Reduz o dano recebido por Kukmar em [c][007eff]50%[-][/c].\nAumenta a barra do reator de Kukmar."
2167520749-NameJp = "Engrenagem da aniquilação"
2167520749-DescriptionJp = "Reduz o dano recebido por Kukmar em [c][007eff]80%[-][/c].\nAumenta a barra do reator de Kukmar.\nA cada dano contínuo recebido por enfraquecimento, o dano recebido aumenta em [c][007eff]10%[-][/c] (por [c][007eff]10 segundos[-][/c]) (máximo de 5 acúmulos).\nTodos os efeitos de aumento de dano recebido aplicados a Kukmar não podem exceder um total de [c][007eff]160%[-][/c]."
967237320-NameJp = "Prova de sabedoria"
967237320-DescriptionJp = "Devido ao calor de Kukmar, todos os aliados não podem se esconder em coberturas, e não podem atacar ou usar habilidades tendo coberturas como alvo.\nNo entanto, efeitos que concedem o estado de cobertura não são afetados."
820375476-NameJp = "Dispositivo de Controle: Balista"
820375476-DescriptionJp = "Quando a balista é disparada pelo dispositivo de controle, Hokma entra em estado de atordoamento e os seguintes efeitos são aplicados:\nDurante o estado de atordoamento, o dano recebido aumenta em [c][007eff]50%[-][/c] (não aplicado quando Hokma está em estado de fúria), todos os efeitos de chamas instáveis são removidos e, para cada chama instável removida, o dano recebido aumenta adicionalmente em [c][007eff]25%[-][/c]"
2060423553-NameJp = "Dispositivo de Controle: Disparo de Balista"
2060423553-DescriptionJp = "Ativa o dispositivo de controle da balista em intervalos regulares (máximo de [c][007eff]2[-][/c] ativações possíveis)/\nO dispositivo de controle ativado só pode ser atacado com habilidades EX, e se o HP estiver abaixo de 1%, a balista é disparada (se a balista grande estiver destruída, a balista não será disparada)/\nAlém disso, a taxa de crítico dos estudantes strikers aliados atinge o valor máximo e a regeneração de custo aumenta em [c][007eff]1000[-][/c] (por [c][007eff]22 segundos[-][/c])"
3905780948-NameJp = "Assento Central"
3905780948-DescriptionJp = "O ataque normal causa dano equivalente a [c][007eff]100%[-][/c] do poder de ataque a até 6 aliados, um por um, e dano adicional de [c][007eff]100%[-][/c] do poder de ataque a alvos sem escudo"
2581051694-NameJp = "Assento Central"
2581051694-DescriptionJp = "O ataque normal causa dano equivalente a [c][007eff]100%[-][/c] do poder de ataque a até 6 aliados, um por um, e dano adicional de [c][007eff]100%[-][/c] do poder de ataque a alvos sem escudo/\nTodo dano causado diretamente por Tiphereth recebe um dano adicional de [c][007eff]100%[-][/c] do poder de ataque (tempo de recarga de [c][007eff]5 segundos[-][/c])"
277873227-NameJp = "Oferenda Requintada"
277873227-DescriptionJp = "Tiphereth ativa 2 dos 3 núcleos e invoca 4 Labor ao seu redor/\nO dano recebido é reduzido em [c][007eff]50%[-][/c] até que \"Sacrifício Oferecido\" seja usado/\nQuando um Labor é derrotado, causa dano equivalente a [c][007eff]1%[-][/c] do HP máximo de Tiphereth e a barra de atordoamento aumenta"
450642269-NameJp = "Núcleo Azul: Técnica Secreta do Sofrimento"
450642269-DescriptionJp = "O [c][336e9b]núcleo azul à esquerda[-][/c] expande um campo de proteção ao seu redor que reduz o dano recebido em [c][007eff]50%[-][/c]/\nDispara uma bomba adesiva no estudante striker aliado com o menor alcance, causando dano equivalente a [c][007eff]600%[-][/c] do poder de ataque a todos os alvos na área após 8 segundos/\nSe o alvo atingido pela bomba adesiva entrar no campo de proteção, o campo é removido e a bomba explode imediatamente"
3355460818-NameJp = "Núcleo Vermelho: Holocausto Visitante"
3355460818-DescriptionJp = "O [c][a0201f]núcleo vermelho frontal[-][/c] mira no estudante striker aliado com o menor alcance por 8 segundos/\nEm seguida, emite micro-ondas que causam dano equivalente a [c][007eff]2800%[-][/c] do poder de ataque a todos os alvos em uma área em forma de leque, ignorando [c][007eff]50%[-][/c] do escudo"
2074242949-NameJp = "Núcleo Amarelo: Cenário Harmonioso"
2074242949-DescriptionJp = "O [c][ac7028]núcleo amarelo à direita[-][/c] dispara mísseis, causando dano equivalente a [c][007eff]100%[-][/c] do poder de ataque a até 6 aliados, um por um/\nSe o alvo não tiver escudo: explode causando dano adicional de [c][007eff]300%[-][/c] do poder de ataque/\nSe o alvo tiver escudo: o ataque é refletido em direção ao núcleo amarelo, causando dano e aumentando a barra de atordoamento"
2180621774-NameJp = "Sacrifício Oferecido"
2180621774-DescriptionJp = "Tiphereth desativa os núcleos ativados e recupera os Labor invocados/\nPara cada Labor recuperado, recupera [c][007eff]1%[-][/c] do HP máximo de Tiphereth/\nO poder de ataque de Tiphereth aumenta em [c][007eff]100%[-][/c] até que \"Oferenda Requintada\" seja usado"
538675197-NameJp = "Poder dos Seis Reinos"
538675197-DescriptionJp = "Tiphereth causa dano equivalente a [c][007eff]200%[-][/c] do poder de ataque a até 6 aliados, um por um; se o alvo não tiver escudo, a taxa de recuperação recebida do alvo é reduzida em [c][007eff]50%[-][/c] (por [c][007eff]15 segundos[-][/c])"
1813686770-NameJp = "Vontade que Abriga a Vida"
1813686770-DescriptionJp = "Tiphereth entra em estado de despertar e aumenta o poder de ataque em [c][007eff]100%[-][/c]/\n\"Oferenda Requintada\" passa a ativar todos os núcleos/\n\"Poder dos Seis Reinos\" é fortalecido para causar dano adicional de [c][007eff]200%[-][/c] do poder de ataque"
848656337-NameJp = "Oração do Rei Iluminado"
848656337-DescriptionJp = "Quando o ATG está cheio, carrega energia por 10 segundos e dispara um feixe poderoso que causa 999999 de dano (este ataque remove o estado de imortalidade)/\nEnquanto dispara o feixe, Tiphereth ativa uma barreira para impedir a fuga/\nOs estudantes strikers aliados não podem usar habilidades normais, mas a velocidade de movimento aumenta em [c][007eff]30%[-][/c] e a regeneração de custo aumenta em [c][007eff]1000[-][/c]/\nQuando a habilidade termina, Tiphereth entra em estado de atordoamento"
2836065005-NameJp = "Alvorecer do Ritual"
