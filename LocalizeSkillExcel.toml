649561091-NameJp = "Estrondo do Demônio Felino"
649561091-DescriptionJp = "Causa dano igual a [c][007eff]200%[-][/c] do Ataque aos aliados na área circular."
1954578173-NameJp = "Rugido do Demônio Felino"
1954578173-DescriptionJp = "Causa dano igual a [c][007eff]250%[-][/c] do Ataque aos aliados em múltiplas áreas circulares. O dano não se acumula."
26182966-NameJp = "Lamento Demoníaco que Invoca Avatares"
26182966-DescriptionJp = "Invoca avatares de Kurokage.\nOs avatares avançam contra o aliado mais próximo e se autodestroem, causando dano igual a [c][007eff]200%[-][/c] do Ataque aos aliados na área circular."
25185491-NameJp = "Lamento Demoníaco que Invoca Avatares"
25185491-DescriptionJp = "Invoca avatares de Kurokage.\nOs avatares avançam contra o aliado mais próximo e se autodestroem, causando dano igual a [c][007eff]400%[-][/c] do Ataque aos aliados na área circular, e o valor de Intimidação aumenta em 500."
3946773883-NameJp = "Procissão Noturna do Demônio Felino em Disparada"
3946773883-DescriptionJp = "Kurokage avança, causando dano igual a [c][007eff]300%[-][/c] do Ataque aos aliados em seu caminho e os empurra."
60897689-NameJp = "Boatos que se Espalham"
60897689-DescriptionJp = "Kurokage queima a área, puxando todos os aliados enquanto causa dano igual a [c][007eff]250%[-][/c] do Ataque e, ao final, os empurra causando dano igual a [c][007eff]250%[-][/c] do Ataque.\nSe o alvo ainda tiver Intimidação do Demônio Felino, em vez de a Intimidação diminuir em [c][007eff]300[-][/c] por segundo, causa dano igual a [c][007eff]20%[-][/c] do HP máximo reduzido pelo valor atual de Intimidação (máx. [c][007eff]20s[-][/c])."
3793078108-NameJp = "Intimidação do Demônio Felino"
3793078108-DescriptionJp = "Durante a batalha com Kurokage, a Intimidação do Demônio Felino aumenta com certos ataques:\n- Quando está na área dos olhos de Kurokage que aparecem no chão.\n- Quando está dentro do território de Kurokage.\nA Intimidação do Demônio Felino corrói gradualmente o HP, impedindo que seja recuperado até o máximo. Pode-se reduzir a Intimidação com efeitos de cura, diminuindo-a na proporção do [c][007eff]Excesso de Cura[-][/c]."
3908389644-NameJp = "Intimidação do Demônio Felino"
3908389644-DescriptionJp = "Durante a batalha com Kurokage, a Intimidação do Demônio Felino aumenta com certos ataques:\n- Quando está na área dos olhos de Kurokage que aparecem no chão.\n- Quando está dentro do território de Kurokage.\nA Intimidação do Demônio Felino corrói gradualmente o HP, impedindo que seja recuperado até o máximo. Pode-se reduzir a Intimidação com efeitos de cura, diminuindo-a em [c][007eff]1/2 do Excesso de Cura[-][/c]."
1094164483-NameJp = "Intimidação do Demônio Felino"
