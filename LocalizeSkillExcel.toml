332682837-NameJp = "Flecha que atravessa o instante"
332682837-DescriptionJp = "Invoca um raio e, após convocar uma esfera de raio vermelha, causa dano equivalente a [c][007eff]475%[-][/c] do poder de ataque a todos os aliados.\n- A esfera de raio vermelha só pode ser atacada com habilidades do tipo EX e causa dano equivalente a [c][007eff]45%[-][/c] do poder de ataque aos aliados próximos.\n- Ao destruir a esfera de raio vermelha, o dano causado pelos aliados dentro da área circular aumenta em [c][007eff]30%[-][/c] (por [c][007eff]35 segundos[-][/c]).\n- Se a esfera de raio vermelha atingir a Fúria de Set, a barra de raio aumenta drasticamente."
