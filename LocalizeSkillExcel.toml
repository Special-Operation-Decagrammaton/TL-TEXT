1717409985-DescriptionJp = "Ao usar a EX Skill, Yesod invoca [c][007eff]3[-][/c] chamas [c][007eff]azuis[-][/c] e [c][007eff]3[-][/c] chamas [c][007eff]vermelhas[-][/c].\nAo destruir uma chama, causa dano a Yesod equivalente a [c][007eff]0.1%[-][/c] de seu HP máximo.\nSe um aliado destruir [c][007eff]2[-][/c] ou mais chamas em [c][007eff]2 segundos[-][/c], a recuperação de custo de todos os aliados é desativada (por [c][007eff]50 segundos[-][/c]) e todos os alunos Striker aliados recebem o estado de Atordoamento (por [c][007eff]10 segundos[-][/c]).\nO dano recebido por Yesod e pela mão direita de Yesod é reduzido em [c][007eff]99%[-][/c], e a barra de Grogginess não aumenta."
