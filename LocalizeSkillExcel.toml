2745759469-DescriptionJp = "Keter Type.E gera um EMP azul.\nCausa dano igual a [c][007eff]100%[-][/c] do Ataque aos aliados na área circular (quanto mais distante, mais fraco o dano; máximo de 1x, mínimo de 0.2x).\nRemove os efeitos de aumento de dano causado dos aliados na área circular e reduz a quantidade de dano causado em [c][007eff]50%[-][/c].\nO efeito de redução de dano causado pode ser removido por habilidades de remoção de enfraquecimento. Ao remover, a quantidade de dano causado pelos aliados Strikers aumenta em [c][007eff]50%[-][/c] (por [c][007eff]60s[-][/c]) e a Recuperação de Custo aumenta em [c][007eff]350[-][/c] (por [c][007eff]15s[-][/c])."
