1611834664-NameJp = "Corrente de Secreção Anormal"
1611834664-DescriptionJp = "Aumenta o Ataque do Caranguejo Tambor em [c][007eff]100%[-][/c] e adiciona [c][007eff]300%[-][/c] de Eficácia de Penetração.\nSe um aluno aplicar um enfraquecimento que altere os atributos do Caranguejo Tambor, o mesmo efeito é duplicado em todas as partes.\nNa transição de fase, todos os enfraquecimentos aplicados ao Caranguejo Tambor são removidos."
4077326515-NameJp = "Estocada Direita"
4077326515-DescriptionJp = "Com a garra direita, causa dano igual a [c][007eff]500%[-][/c] do Ataque e empurra os aliados na área em linha reta.\nSe o ataque atingir o Painel de Controle, aplica estado de Atordoamento a todos os aliados (por [c][007eff]20s[-][/c])."
404156238-NameJp = "Estocada Esquerda"
404156238-DescriptionJp = "Com a garra esquerda, causa dano igual a [c][007eff]500%[-][/c] do Ataque e empurra os aliados na área em linha reta.\nSe o ataque atingir o Painel de Controle, aplica estado de Atordoamento a todos os aliados (por [c][007eff]20s[-][/c])."
3028018974-NameJp = "Pistola d'Água"
