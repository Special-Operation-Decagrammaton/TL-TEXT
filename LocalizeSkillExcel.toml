2682702008-DescriptionJp = "Aplica os seguintes efeitos dependendo do número de debuffs que o Gregorio possui:\n- 4 debuffs ou menos: Remove [c][007eff]1[-][/c] debuff do Gregorio e do Coro.\n- 5 debuffs ou mais: Reduz o poder de ataque do Gregorio e do Coro em [c][007eff]10%[-][/c] (por [c][007eff]120 segundos[-][/c])."
535653506-NameJp = "Arrependimento Solene"
535653506-DescriptionJp = "Aplica os seguintes efeitos dependendo do número de debuffs que o Gregorio possui:\n- 5 debuffs ou menos: Remove [c][007eff]1[-][/c] debuff do Gregorio e do Coro.\n- 6 debuffs ou mais: Reduz o poder de ataque do Gregorio e do Coro em [c][007eff]10%[-][/c] (por [c][007eff]120 segundos[-][/c])."
1675678518-NameJp = "Arrependimento Solene"
1675678518-DescriptionJp = "Aplica os seguintes efeitos dependendo do número de debuffs que o Gregorio possui:\n- 6 debuffs ou menos: Remove [c][007eff]1[-][/c] debuff do Gregorio e do Coro.\n- 7 debuffs ou mais: Reduz o poder de ataque do Gregorio e do Coro em [c][007eff]10%[-][/c] (por [c][007eff]120 segundos[-][/c])."
746849898-NameJp = "Canto Gregoriano"
746849898-DescriptionJp = "Usa uma habilidade nos aliados ou no Gregorio dependendo da direção para a qual o órgão de tubos central está voltado; o efeito da habilidade muda a cada uso:\n- 1º: Aumenta o dano recebido por toda a equipe voltada para o tubo preto em [c][007eff]50%[-][/c] (por [c][007eff]60 segundos[-][/c]).\n- 2º: Remove [c][007eff]1[-][/c] debuff de toda a equipe voltada para o tubo branco.\n- 3º: Aumenta o dano recebido por toda a equipe voltada para o tubo branco em [c][007eff]50%[-][/c] (por [c][007eff]60 segundos[-][/c]).\n- 4º: Remove [c][007eff]1[-][/c] debuff de toda a equipe voltada para o tubo preto.\n(Após isso, o ciclo recomeça a partir do 1º uso da habilidade)."
4228737887-NameJp = "Canto Gregoriano"
4228737887-DescriptionJp = "Usa uma habilidade nos aliados ou no Gregorio dependendo da direção para a qual o órgão de tubos central está voltado; o efeito da habilidade muda a cada uso:\n- 1º: Aumenta o dano recebido por toda a equipe voltada para o tubo preto em [c][007eff]50%[-][/c] (por [c][007eff]60 segundos[-][/c]).\n- 2º: Remove [c][007eff]1[-][/c] debuff de toda a equipe voltada para o tubo branco e adiciona [c][007eff]70%[-][/c] ao dano causado por habilidades EX (por [c][007eff]120 segundos[-][/c]).\n- 3º: Aumenta o dano recebido por toda a equipe voltada para o tubo branco em [c][007eff]50%[-][/c] (por [c][007eff]60 segundos[-][/c]).\n- 4º: Remove [c][007eff]1[-][/c] debuff de toda a equipe voltada para o tubo preto e adiciona [c][007eff]70%[-][/c] ao dano causado por habilidades EX (por [c][007eff]120 segundos[-][/c]).\n(Após isso, o ciclo recomeça a partir do 1º uso da habilidade)."
204042605-NameJp = "Salvação de Todos"
204042605-DescriptionJp = "Causa [c][007eff]999999[-][/c] de dano a todos os aliados (este ataque remove o estado de imortalidade)."
469611631-NameJp = "Servo do Servo do Santo"
469611631-DescriptionJp = "Aplica efeitos ao Gregorio e ao Coro dependendo do número de debuffs que o Gregorio possui:\n- Seguro (de [c][007eff]4 a 5[-][/c] debuffs): Aumenta o dano recebido em [c][007eff]200%[-][/c].\n- Aviso (de [c][007eff]2 a 3[-][/c] ou [c][007eff]6 a 7[-][/c] debuffs): Aumenta o dano recebido em [c][007eff]100%[-][/c] / Aumenta o poder de ataque em [c][007eff]20%[-][/c].\n- Perigo ([c][007eff]1[-][/c] debuff ou menos, ou [c][007eff]8[-][/c] ou mais): Aumenta o poder de ataque em [c][007eff]40%[-][/c]."
2910060456-NameJp = "Servo do Servo do Santo"
2910060456-DescriptionJp = "Aplica efeitos ao Gregorio e ao Coro dependendo do número de debuffs que o Gregorio possui:\n- Seguro (de [c][007eff]5 a 6[-][/c] debuffs): Aumenta o dano recebido em [c][007eff]200%[-][/c].\n- Aviso (de [c][007eff]3 a 4[-][/c] ou [c][007eff]7 a 8[-][/c] debuffs): Aumenta o dano recebido em [c][007eff]100%[-][/c] / Aumenta o poder de ataque em [c][007eff]20%[-][/c].\n- Perigo ([c][007eff]2[-][/c] debuffs ou menos, ou [c][007eff]9[-][/c] ou mais): Aumenta o poder de ataque em [c][007eff]40%[-][/c]."
2233558267-NameJp = "Servo do Servo do Santo"
2233558267-DescriptionJp = "Aplica efeitos ao Gregorio e ao Coro dependendo do número de debuffs que o Gregorio possui:\n- Seguro (de [c][007eff]6 a 7[-][/c] debuffs): Aumenta o dano recebido em [c][007eff]250%[-][/c].\n- Aviso (de [c][007eff]4 a 5[-][/c] ou [c][007eff]8 a 9[-][/c] debuffs): Aumenta o dano recebido em [c][007eff]100%[-][/c] / Aumenta o poder de ataque em [c][007eff]20%[-][/c].\n- Perigo ([c][007eff]3[-][/c] debuffs ou menos, ou [c][007eff]10[-][/c] ou mais): Aumenta o poder de ataque em [c][007eff]40%[-][/c]."
3650862421-NameJp = "Coro Solene"
3650862421-DescriptionJp = "O coro nos palcos esquerdo e direito aumenta seu poder de ataque em [c][007eff]100%[-][/c] após terminar o canto de [c][007eff]40 segundos[-][/c] após aparecer.\nO coro cai e fica incapaz de atacar quando seu HP fica abaixo de 1%."
2523903484-NameJp = "Sanctus"
2523903484-DescriptionJp = "Se um debuff que altera os atributos do Gregorio for aplicado, o mesmo efeito é replicado no Coro.\nTransfere o dano recebido pelo Coro para o Gregorio.\nLogo após o início da batalha, reduz o poder de ataque do Gregorio e do Coro em [c][007eff]30%[-][/c] (por [c][007eff]30 segundos[-][/c]).\nNa parte final da apresentação, todo o Coro se move para o lado do Gregorio para cantar, fortalecendo gradualmente o Coro e os aliados:\n- Todo o Coro aumenta a velocidade de ataque em [c][007eff]10%[-][/c] a cada [c][007eff]10 segundos[-][/c] (este efeito pode ser acumulado).\n- Todos os aliados aumentam a recuperação de custo em [c][007eff]300[-][/c] a cada [c][007eff]10 segundos[-][/c] (este efeito pode ser acumulado)."
2975191111-NameJp = "Sanctus"
2975191111-DescriptionJp = "Se um debuff que altera os atributos do Gregorio for aplicado, o mesmo efeito é replicado no Coro.\nTransfere o dano recebido pelo Coro para o Gregorio.\nLogo após o início da batalha, reduz o poder de ataque do Gregorio e do Coro em [c][007eff]30%[-][/c] (por [c][007eff]30 segundos[-][/c]).\nNa parte final da apresentação, todo o Coro se move para o lado do Gregorio para cantar, fortalecendo gradualmente o Coro e os aliados:\n- Todo o Coro aumenta a resistência a dano crítico em [c][007eff]100%[-][/c] e aumenta a velocidade de ataque em [c][007eff]10%[-][/c] a cada [c][007eff]10 segundos[-][/c] (este efeito pode ser acumulado).\n- A taxa crítica de todos os estudantes especiais aliados atinge o valor máximo e todos os aliados aumentam a recuperação de custo em [c][007eff]300[-][/c] a cada [c][007eff]10 segundos[-][/c] (este efeito pode ser acumulado)."
1789628881-NameJp = "Órgão do Sofrimento"
1789628881-DescriptionJp = "O órgão de tubos central só pode ser atacado com habilidades EX; se o HP estiver abaixo de 1%, ele gira 180 graus.\nLogo após girar, o HP é totalmente restaurado e ele não pode ser atacado por [c][007eff]30 segundos[-][/c]."
2332344306-NameJp = "Canhão Duplo / Foguete de Chamas"
2332344306-DescriptionJp = "Causa dano equivalente a [c][007eff]300%[-][/c] do poder de ataque a até 4 aliados, um por um.\nCausa dano equivalente a [c][007eff]450%[-][/c] do poder de ataque a até 2 aliados, um por um."
1475673708-NameJp = "Já que chegamos a isso...!"
1475673708-DescriptionJp = "Invoca um dispositivo de orientação de mísseis para destruir o resort e entra no modo de mísseis fora de controle.\nDerrota se o resort for destruído.\n[c][007eff]100%[-][/c] do dano causado ao dispositivo de orientação de mísseis é transferido para o Hovercraft.\nAo destruir o dispositivo de orientação de mísseis, o modo de mísseis fora de controle termina e aumenta o medidor de atordoamento do Hovercraft em [c][007eff]50%[-][/c].\nQuando em estado de atordoamento, a resistência a crítico do Hovercraft é reduzida em [c][007eff]50%[-][/c]."
1173051790-NameJp = "Míssil Artesanal do Grupo Capacete"
1173051790-DescriptionJp = "Quando o Hovercraft entra no modo de mísseis fora de controle, ele dispara vários mísseis.\nOs mísseis voam visando apenas o resort.\nSe atingirem o resort, o HP do resort diminui em [c][007eff]1[-][/c].\n(Os mísseis só podem ser atacados com habilidades EX)."
730354104-NameJp = "Operação de Desembarque Surpresa"
730354104-DescriptionJp = "A cada 15 ataques recebidos pelo Hovercraft, aumenta o dano recebido em [c][007eff]10%[-][/c] (por [c][007eff]10 segundos[-][/c]).\n(Acumulável até [c][007eff]30[-][/c] vezes)."
3459472293-NameJp = "Sistema de Defesa Ativo"
3459472293-DescriptionJp = "Dispositivo de defesa que derruba mísseis automaticamente.\nCausa dano equivalente a [c][007eff]100%[-][/c] do poder de ataque aos mísseis."
2866159976-NameJp = "Cartomancia da Flor de Cor Secreta"
2866159976-DescriptionJp = "Usa a habilidade quando o valor de ATG está no máximo.\nCausa dano equivalente a [c][007eff]150%[-][/c] do poder de ataque por golpe a 1 aliado e aplica atordoamento (por [c][007eff]5 segundos[-][/c]).\nNo último ataque, causa dano equivalente a [c][007eff]300%[-][/c] do poder de ataque e aplica atordoamento (por [c][007eff]5 segundos[-][/c])."
1348468842-NameJp = "Disparo de Espingarda Ansioso"
1348468842-DescriptionJp = "Usa a habilidade quando o valor de ATG está no máximo.\nCausa dano equivalente a [c][007eff]750%[-][/c] do poder de ataque aos aliados dentro do alcance linear."
1705667154-NameJp = "Granada de Precisão"
1705667154-DescriptionJp = "Quando o valor de ATG estiver no MÁX, usa a habilidade.\nDispara um míssil contra o aliado mais distante de Wakamo, causando [c][007eff]750%[-][/c] do dano de ataque.\n(O míssil pode ser bloqueado por outros estudantes, invocações ou coberturas.)"
4020915574-NameJp = "Apenas por você"
4020915574-DescriptionJp = "Wakamo não é afetada por estados de CC, mas o tempo de duração dos estados de CC é acumulado.\nAo acumular [c][007eff]6 segundos/7 segundos/8 segundos[-][/c] por estágio, Wakamo entra em estado de atordoamento e (total de [c][007eff]3[-][/c] vezes) todas as Marcas de Wakamo aplicadas aos aliados são removidas.\n(Quanto maior a força de reforço de CC, mais tempo é aplicado.)\n\nApós entrar em estado de atordoamento, os seguintes efeitos são aplicados a Wakamo (total de 3 estágios):\nAtaque: aumenta em [c][007eff]25%/50%/75%[-][/c].\nDano recebido: aumenta em [c][007eff]100%/200%/300%[-][/c]."
3038350997-NameJp = "Eliminarei os intrusos"
3038350997-DescriptionJp = "Aliados atacados pela habilidade de Wakamo geram [c][007eff]2[-][/c] Marcas de Wakamo.\nSe as Marcas de Wakamo chegarem a [c][007eff]5[-][/c] ou mais, o aliado em questão retira-se imediatamente.\n(Ignora efeitos como escudo, invencibilidade, etc.)"
3144091492-NameJp = "Cartomancia da Flor de Cor Secreta"
3144091492-DescriptionJp = "Quando o valor de ATG estiver no MÁX, usa a habilidade.\nCausa [c][007eff]150%[-][/c] do dano de ataque por golpe a 1 aliado e aplica atordoamento ([c][007eff]5 segundos[-][/c]).\nNo último golpe, causa [c][007eff]300%[-][/c] do dano de ataque e aplica atordoamento ([c][007eff]5 segundos[-][/c]).\nTodos os ataques ricocheteiam para o aliado mais próximo do alvo, causando o mesmo dano.\n(Os ataques que ricocheteiam não aplicam atordoamento nem Marcas de Wakamo.)"
2012876967-NameJp = "Apenas por você"
2012876967-DescriptionJp = "Wakamo não é afetada por estados de CC, mas o tempo de duração dos estados de CC é acumulado.\nAo acumular [c][007eff]10 segundos/14 segundos/18 segundos[-][/c] por estágio, Wakamo entra em estado de atordoamento e (total de [c][007eff]3[-][/c] vezes) todas as Marcas de Wakamo aplicadas aos aliados são removidas.\n(Quanto maior a força de reforço de CC, mais tempo é aplicado.)\n\nApós entrar em estado de atordoamento, os seguintes efeitos são aplicados a Wakamo (total de 3 estágios):\nAtaque: aumenta em [c][007eff]25%/50%/75%[-][/c].\nDano recebido: aumenta em [c][007eff]100%/200%/300%[-][/c]."
2789078643-NameJp = "Eliminarei os intrusos"
2789078643-DescriptionJp = "Aliados atacados pela habilidade de Wakamo geram [c][007eff]2[-][/c] Marcas de Wakamo.\nSe as Marcas de Wakamo chegarem a [c][007eff]5[-][/c] ou mais, o aliado em questão retira-se imediatamente.\n(Ignora efeitos como escudo, invencibilidade, etc.)\nAlém disso, os ataques básicos de Wakamo ricocheteiam para o aliado mais próximo do alvo, causando o mesmo dano."
2287219665-NameJp = "Sistema de Defesa Ativo"
2287219665-DescriptionJp = "Dispositivo de defesa que abate mísseis automaticamente.\nCausa [c][007eff]100%[-][/c] do dano de ataque ao míssil e, simultaneamente, causa [c][007eff]5000[-][/c] de dano a si mesma.\nSe o HP ficar abaixo de [c][007eff]1%[-][/c], entra em estado de atordoamento; se o HP for recuperado, o atordoamento é removido."
3634787929-NameJp = "Apenas por você"
3634787929-DescriptionJp = "Wakamo não é afetada por estados de CC, mas o tempo de duração dos estados de CC é acumulado.\nAo acumular [c][007eff]16 segundos/18 segundos/20 segundos[-][/c] por estágio, Wakamo entra em estado de atordoamento e (total de [c][007eff]3[-][/c] vezes) todas as Marcas de Wakamo aplicadas aos aliados são removidas.\n(Quanto maior a força de reforço de CC, mais tempo é aplicado.)\n\nApós entrar em estado de atordoamento, os seguintes efeitos são aplicados a Wakamo (total de 3 estágios):\nAtaque: aumenta em [c][007eff]25%/50%/75%[-][/c].\nDano recebido: aumenta em [c][007eff]100%/200%/300%[-][/c]."
