2965923968-NameJp = "Altar de Proteção e Seleção"
2965923968-DescriptionJp = "Malkuth invoca um Midrash de cada tipo: Armadura Leve, Pesada, Especial e Elástica.\nOs Midrash só podem ser alvos de habilidades EX e causam dano contínuo equivalente a [c][007eff]10%[-][/c] do seu ataque a todos os aliados.\nAo destruir [c][007eff]2[-][/c] dos Midrash invocados, todos os Midrash são destruídos:\n- Causa dano equivalente a [c][007eff]4%[-][/c] do HP máximo de Malkuth a Malkuth.\n- Aumenta o dano causado por todos os aliados em [c][007eff]50%[-][/c] e a recuperação de custo em [c][007eff]50%[-][/c] (por 90 segundos)."
1246829313-NameJp = "Altar de Proteção e Seleção"
