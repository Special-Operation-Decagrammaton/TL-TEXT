2684712354-DescriptionJp = "Ao usar a EX Skill, Yesod invoca [c][007eff]3[-][/c] chamas [c][007eff]azuis[-][/c] e [c][007eff]3[-][/c] chamas [c][007eff]vermelhas[-][/c].\nAo destruir uma chama, causa dano a Yesod equivalente a [c][007eff]0.1%[-][/c] de seu HP máximo.\nSe um aliado destruir [c][007eff]2[-][/c] ou mais chamas em [c][007eff]2 segundos[-][/c], a recuperação de custo de todos os aliados é desativada (por [c][007eff]50 segundos[-][/c]) e todos os alunos Striker aliados recebem o estado de Atordoamento (por [c][007eff]10 segundos[-][/c]).\nO dano recebido por Yesod e pela mão direita de Yesod é reduzido em [c][007eff]99%[-][/c], a barra de Grogginess não aumenta e a Resistência a Crítico aumenta em [c][007eff]25000[-][/c]."
2039962385-NameJp = "Revelação"
2039962385-DescriptionJp = "Adiciona [c][007eff]200%[-][/c] de Efeito de Vibração aos alunos Striker, veículos de Suporte Tático e invocações aliados.\nExiste uma \"Fase de Análise\" na batalha contra Yesod:\n- A cada fase, aumenta o Ataque dos alunos Striker, veículos de Suporte Tático e invocações aliados em [c][007eff]20%[-][/c], a Taxa de Crítico em [c][007eff]20%[-][/c], o dano da EX Skill em [c][007eff]25%[-][/c] e o Dano Crítico em [c][007eff]25%[-][/c] (máximo de 5 fases) (o efeito é aplicado de acordo com a fase alcançada ao atingir 5 fases ou ao bloquear a habilidade de Yesod).\nA Fase de Análise é reiniciada se a EX Skill de Yesod não for bloqueada ou quando Yesod usar a próxima EX Skill."
1762546744-NameJp = "Revelação"
1762546744-DescriptionJp = "Adiciona [c][007eff]200%[-][/c] de Efeito de Vibração aos alunos Striker, veículos de Suporte Tático e invocações aliados.\nExiste uma \"Fase de Análise\" na batalha contra Yesod:\n- A cada fase, aumenta o Ataque dos alunos Striker, veículos de Suporte Tático e invocações aliados em [c][007eff]40%[-][/c], a Taxa de Crítico em [c][007eff]20%[-][/c], o dano da EX Skill em [c][007eff]50%[-][/c] e o Dano Crítico em [c][007eff]50%[-][/c] (máximo de 5 fases) (o efeito é aplicado de acordo com a fase alcançada ao atingir 5 fases ou ao bloquear a habilidade de Yesod).\nA Fase de Análise é reiniciada se a EX Skill de Yesod não for bloqueada ou quando Yesod usar a próxima EX Skill."
2872121469-NameJp = "Chama Azul"
2872121469-DescriptionJp = "Ao destruir uma chama [c][007eff]azul[-][/c], a Fase de Análise aumenta em [c][007eff]1 fase[-][/c] e causa [c][007eff]30%[-][/c] de dano de ataque a todos os aliados.\nReduz o custo da EX Skill do aliado que destruiu a chama em até [c][007eff]50%[-][/c] (para 1 uso de EX Skill) (valores decimais arredondados para baixo) e recupera [c][007eff]0.6[-][/c] de custo de habilidade para cada aluno não retirado da formação (exceto destruição por veículos de Suporte Tático).\nDependendo da situação da área existente, aplica os seguintes efeitos:\n- Se uma área [c][007eff]vermelha[-][/c] estiver gerada: Remove a área [c][007eff]vermelha[-][/c].\n- Se nenhuma área estiver gerada: Gera uma área [c][007eff]azul[-][/c] que causa [c][007eff]15%[-][/c] de dano contínuo de ataque a todos os aliados.\n- Se uma área [c][007eff]azul[-][/c] estiver gerada: Causa [c][007eff]100%[-][/c] de dano contínuo adicional a todos os aliados (por 10 segundos)."
4085667492-NameJp = "Chama Vermelha"
4085667492-DescriptionJp = "Ao destruir uma chama [c][007eff]vermelha[-][/c], a Fase de Análise aumenta em [c][007eff]1 fase[-][/c] e causa [c][007eff]30%[-][/c] de dano de ataque a todos os aliados.\nReduz o custo da EX Skill do aliado que destruiu a chama em até [c][007eff]50%[-][/c] (para 1 uso de EX Skill) (valores decimais arredondados para baixo) e recupera [c][007eff]0.6[-][/c] de custo de habilidade para cada aluno não retirado da formação (exceto destruição por veículos de Suporte Tático).\nDependendo da situação da área existente, aplica os seguintes efeitos:\n- Se uma área [c][007eff]vermelha[-][/c] estiver gerada: Causa [c][007eff]100%[-][/c] de dano contínuo adicional a todos os aliados (por 10 segundos).\n- Se nenhuma área estiver gerada: Gera uma área [c][007eff]vermelha[-][/c] que causa [c][007eff]15%[-][/c] de dano contínuo de ataque a todos os aliados.\n- Se uma área [c][007eff]azul[-][/c] estiver gerada: Remove a área [c][007eff]azul[-][/c]."
566370604-NameJp = "Sinal que Evoca a Profecia"
566370604-DescriptionJp = "Entre as chamas invocadas, uma chama com o \"Sinal que Evoca a Profecia\" é gerada aleatoriamente.\nAo destruir uma chama com o \"Sinal que Evoca a Profecia\", a Fase de Análise aumenta em [c][007eff]1 fase[-][/c], e a Fase de Análise não aumentará mais após isso.\nEste efeito desaparece se a EX Skill de Yesod não for bloqueada ou quando Yesod usar a próxima EX Skill."
1300016116-NameJp = "Sinal que Evoca o Fim"
1300016116-DescriptionJp = "Entre as chamas invocadas, uma chama com o \"Sinal que Evoca o Fim\" é gerada aleatoriamente.\nAo destruir uma chama com o \"Sinal que Evoca o Fim\", a Fase de Análise muda para [c][007eff]1 fase[-][/c]."
2773586851-NameJp = "Julgamento da Grande Vontade"
2773586851-DescriptionJp = "Quando Yesod bloqueia o caminho com a mão direita e o valor de ATG está no MÁXIMO, Yesod golpeia o chão com a mão esquerda, causando [c][007eff]200%[-][/c] de dano de ataque a todos os aliados."
2016677634-NameJp = "Pilar de Poder"
2016677634-DescriptionJp = "Um pilar invocado no lado esquerdo do campo.\nO Pilar de Poder é imortal, só pode ser alvo de EX Skills e não recebe dano de ataques aliados.\nO Pilar de Poder recupera uma certa quantidade de HP a cada [c][007eff]4 segundos[-][/c]. Se o HP estiver em [c][007eff]99%[-][/c] ou mais, causa [c][007eff]100%[-][/c] de dano de ataque a todos os aliados e reduz a recuperação de custo dos alunos Striker aliados em [c][007eff]400[-][/c] (por [c][007eff]10 segundos[-][/c]).\nO Pilar de Poder não é afetado por estados de CC, mas a duração do estado de CC é acumulada. Ao acumular [c][007eff]3 segundos[-][/c], causa dano a si mesmo.\n- Ao acumular [c][007eff]3 segundos[-][/c], se o HP do pilar estiver em [c][007eff]50%[-][/c] ou mais, aumenta o dano causado pelo Drone de Suporte em [c][007eff]10%[-][/c] (por [c][007eff]40 segundos[-][/c]) (máximo de 4 acúmulos)."
2720451846-NameJp = "Pilar de Poder"
2720451846-DescriptionJp = "Um pilar invocado no lado esquerdo do campo.\nO Pilar de Poder é imortal, só pode ser alvo de EX Skills e não recebe dano de ataques aliados.\nO Pilar de Poder recupera uma certa quantidade de HP a cada [c][007eff]4 segundos[-][/c]. Se o HP estiver em [c][007eff]99%[-][/c] ou mais, causa [c][007eff]100%[-][/c] de dano de ataque a todos os aliados e reduz a recuperação de custo dos alunos Striker aliados em [c][007eff]400[-][/c] (por [c][007eff]10 segundos[-][/c]).\nO Pilar de Poder não é afetado por estados de CC, mas a duração do estado de CC é acumulada. Ao acumular [c][007eff]5 segundos[-][/c], causa dano a si mesmo.\n- Ao acumular [c][007eff]5 segundos[-][/c], se o HP do pilar estiver em [c][007eff]50%[-][/c] ou mais, aumenta o dano causado pelo Drone de Suporte em [c][007eff]10%[-][/c] (por [c][007eff]40 segundos[-][/c]) (máximo de 4 acúmulos)."
3977569703-NameJp = "Pilar do Alicerce"
3977569703-DescriptionJp = "Um pilar invocado no lado direito do campo.\nAo destruir o Pilar do Alicerce, o dano recebido pela mão direita de Yesod aumenta em [c][007eff]1000%[-][/c] (máximo de 2 acúmulos).\nAumenta o dano recebido pela EX Skill do Pilar do Alicerce em [c][007eff]900%[-][/c]."
3448455875-NameJp = "Pilar do Alicerce"
3448455875-DescriptionJp = "Um pilar invocado no lado direito do campo.\nAo destruir o Pilar do Alicerce, o dano recebido pela mão direita de Yesod aumenta em [c][007eff]1000%[-][/c] (máximo de 2 acúmulos)."
1016827640-NameJp = "Drone de Suporte: Ressonância"
1016827640-DescriptionJp = "Invoca um Drone de Suporte para ajudar os alunos durante a batalha contra a mão direita de Yesod.\nO Drone de Suporte não é alvo de nenhuma habilidade e o dano do Drone de Suporte não causa crítico.\nOs efeitos de buff recebidos pelas EX Skills e habilidades normais dos alunos exibidos ao lado da barra de HP do Drone de Suporte são transferidos em tempo real (no entanto, efeitos recebidos antes da invocação do Drone de Suporte não são transferidos).\nO Ataque do Drone de Suporte aumenta em [c][007eff]100%[-][/c] e causa [c][007eff]100%[-][/c] de dano adicional de ataque a alvos em estado de [c][007eff]Fogo Concentrado[-][/c]."
