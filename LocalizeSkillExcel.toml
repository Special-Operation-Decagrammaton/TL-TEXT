3373023280-DescriptionJp = "A potência do radiador diminui a cada certo período, e os efeitos aplicados variam conforme a potência (a potência é proporcional ao HP atual do radiador).\n- Potência abaixo de [c][007eff]30%[-][/c]: Sem efeito.\n- Potência entre [c][007eff]30%[-][/c] e [c][007eff]70%[-][/c]: Recupera [c][007eff]1200[-][/c] de HP de todos os aliados, exceto o radiador, a cada [c][007eff]6 segundos[-][/c].\n- Potência acima de [c][007eff]70%[-][/c]: Recupera [c][007eff]2200[-][/c] de HP de todos os aliados, exceto o radiador, a cada [c][007eff]6 segundos[-][/c] / Reduz o dano recebido por todos os aliados, exceto o radiador, em [c][007eff]25%[-][/c].\nO radiador só pode ser alvo de habilidades EX e não pode receber efeitos de escudo."
