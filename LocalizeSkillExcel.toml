4226150726-NameJp = "Burn Your Heart... You Can Still Spin!"
4226150726-DescriptionJp = "Every [c][007eff]20 seconds[/c], parts are activated in the order of Right Arm (Pink), Chest (Red), and Left Arm (Green)\n-Right Arm (Pink): Increases Attack by [c][007eff]100%[-][/c]\n-Chest (Red): When using an EX skill, inflicts Stun on the target ([c][007eff]5 seconds[/c])\n-Left Arm (Green): Increases Defense by [c][007eff]1000[-][/c], and when using an EX skill, reduces the target's Healing Received by [c][007eff]80%[-][/c] ([c][007eff]30 seconds[/c]) (this debuff effect cannot be removed by debuff removal skills)\nWhen a certain amount of damage is accumulated while a part is activated, that part is destroyed and can no longer be activated\nAdditionally, the skills of destroyed parts cannot be used thereafter"
