712573112-DescriptionJp = "Durante a batalha contra Kurokage, a Intimidação do Gato-Oni aumenta devido a ataques específicos:\n- Ao estar na área dos olhos de Kurokage que aparecem no chão.\n- Ao estar dentro da área de Kurokage.\nA Intimidação do Gato-Oni corrói o HP gradualmente, impedindo a recuperação até o HP máximo. Efeitos de cura podem reduzir a Intimidação do Gato-Oni, diminuindo o valor equivalente a [c][007eff]1/5 do excesso de cura[-][/c]."
3378579970-NameJp = "Intimidação do Gato-Oni"
3378579970-DescriptionJp = "Durante a batalha contra Kurokage, a Intimidação do Gato-Oni aumenta devido a ataques específicos:\n- Ao estar na área dos olhos de Kurokage que aparecem no chão.\n- Ao estar dentro da área de Kurokage.\nA Intimidação do Gato-Oni corrói o HP gradualmente, impedindo a recuperação até o HP máximo. Efeitos de cura podem reduzir a Intimidação do Gato-Oni, diminuindo o valor equivalente a [c][007eff]1/6 do excesso de cura[-][/c]."
525845510-NameJp = "Intimidação do Gato-Oni"
525845510-DescriptionJp = "Durante a batalha contra Kurokage, a Intimidação do Gato-Oni aumenta devido a ataques específicos:\n- Ao estar na área dos olhos de Kurokage que aparecem no chão.\n- Ao estar dentro da área de Kurokage.\n- Ao receber o ataque de autodestruição da encarnação.\nA Intimidação do Gato-Oni corrói o HP gradualmente, impedindo a recuperação até o HP máximo. Efeitos de cura podem reduzir a Intimidação do Gato-Oni, diminuindo o valor equivalente a [c][007eff]1/9 do excesso de cura[-][/c]."
3600210741-NameJp = "Intimidação do Gato-Oni"
3600210741-DescriptionJp = "Durante a batalha contra Kurokage, a Intimidação do Gato-Oni aumenta devido a ataques específicos:\n- Ao estar na área dos olhos de Kurokage que aparecem no chão (o centro da área aumenta mais a Intimidação do Gato-Oni).\n- Ao estar dentro da área de Kurokage.\n- Ao receber o ataque de autodestruição da encarnação.\nA Intimidação do Gato-Oni corrói o HP gradualmente, impedindo a recuperação até o HP máximo. Efeitos de cura podem reduzir a Intimidação do Gato-Oni, diminuindo o valor equivalente a [c][007eff]1/11 do excesso de cura[-][/c]."
1588445501-NameJp = "Sensação de Intimidação Crescente"
1588445501-DescriptionJp = "Se o efeito da Intimidação do Gato-Oni corroer [c][007eff]50%[-][/c] ou mais do HP, o alvo entra em estado de confusão.\nEste estado de confusão é removido quando o valor de intimidação chega a 0."
4199421037-NameJp = "Peça de Teatro que se Aproxima do Fim"
4199421037-DescriptionJp = "Todos os ataques de Kurokage perfuram escudos."
3310561862-NameJp = "Peça de teatro de histórias de fantasmas que se aproxima do fim"
3310561862-DescriptionJp = "Todos os ataques de Kurokage ignoram escudos.\nSe um aluno for derrotado, o ATG de Kurokage aumenta até o valor máximo."
4018012511-NameJp = "Fragmento do Gato-Oni"
4018012511-DescriptionJp = "Fragmentos do Gato-Oni existem ao redor de Kurokage; quando recebem dano, os fragmentos se transferem para Kurokage.\nAntes de se mover para dentro da área de Kurokage, a barra de atordoamento não aumenta.\nSe ficar em estado de atordoamento dentro da área de Kurokage, Kurokage se dividirá em 4 fragmentos, cada um recebendo ataques, e durante esse tempo, a taxa de acerto crítico de todos os aliados aumenta até o valor máximo."
3469497636-NameJp = "Caminho para a verdade"
3469497636-DescriptionJp = "Causa dano equivalente a [c][007eff]220%[-][/c] do poder de ataque a todos os aliados."
2170849381-NameJp = "No fogo, no fundo da água"
2170849381-DescriptionJp = "Causa dano equivalente a [c][007eff]100%[-][/c] do poder de ataque a todos os aliados.\nEm seguida, Geburah dispara água do mar que causa dano aos aliados 3 vezes.\nA 1ª onda causa dano equivalente a [c][007eff]25%[-][/c] do poder de ataque a todos os aliados.\nA 2ª onda causa dano equivalente a [c][007eff]50%[-][/c] do poder de ataque a todos os aliados.\nA 3ª onda causa dano equivalente a [c][007eff]140%[-][/c] do poder de ataque a todos os aliados."
103631606-NameJp = "Valentia além da razão"
103631606-DescriptionJp = "Geburah usa torpedos para causar dano equivalente a [c][007eff]125%[-][/c] do poder de ataque ao radiador.\nEm seguida, causa dano equivalente a [c][007eff]250%[-][/c] do poder de ataque, em sequência, a até 4 aliados, exceto o radiador."
3213688088-NameJp = "Árbitro sagrado"
3213688088-DescriptionJp = "Quando o valor de ATG está no máximo, Geburah puxa um iceberg para colidir, causando dano equivalente a [c][007eff]320%[-][/c] do poder de ataque a todos os aliados.\nEnquanto usa essa habilidade, a barra de atordoamento de Geburah não aumenta."
1278892157-NameJp = "Fonte da inteligência"
1278892157-DescriptionJp = "Aumenta o dano causado por alunos especiais aliados em [c][007eff]80%[-][/c].\nReduz o dano causado pelos outros aliados em [c][007eff]75%[-][/c] e aumenta a recuperação de custo em [c][007eff]25%[-][/c].\nAdiciona [c][007eff]75%[-][/c] de eficácia contra místico a Geburah."
211534980-NameJp = "Fonte da inteligência"
211534980-DescriptionJp = "Aumenta o dano causado por alunos especiais aliados em [c][007eff]80%[-][/c].\nReduz o dano causado pelos outros aliados em [c][007eff]75%[-][/c] e aumenta a recuperação de custo em [c][007eff]25%[-][/c].\nAdiciona [c][007eff]75%[-][/c] de eficácia contra místico a Geburah.\nTodos os aliados, exceto o radiador, acumulam [c][007eff]1 nível[-][/c] de hipotermia a cada [c][007eff]5 segundos[-][/c] se não se moverem.\nAo acumular [c][007eff]10 níveis[-][/c] de hipotermia, o alvo sofre congelamento incurável, aumenta o dano recebido em [c][007eff]80%[-][/c] e fixa o efeito de cura recebida em [c][007eff]1[-][/c]."
