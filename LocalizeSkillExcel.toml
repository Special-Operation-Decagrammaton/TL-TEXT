3769351911-NameJp = "Pistola d'Água"
3769351911-DescriptionJp = "Causa dano igual a [c][007eff]100%[-][/c] do Ataque aos aliados na área em leque.\nContra aliados com Armadura Pesada, causa dano adicional igual a [c][007eff]500%[-][/c] do Ataque.\nAplica fluido adesivo no Painel de Controle (por [c][007eff]20s[-][/c])."
3406901480-NameJp = "Bolhas de Caranguejo"
