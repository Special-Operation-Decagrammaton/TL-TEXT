3631629694-NameJp = "Aquele que Surge na Aurora"
3631629694-DescriptionJp = "Quando Tiphereth entra em estado de atordoamento, o dano recebido aumenta em [c][007eff]100%[-][/c] e a regeneração de custo dos estudantes strikers aliados aumenta em [c][007eff]1000[-][/c] (por [c][007eff]20 segundos[-][/c])\nA cada vez que Tiphereth entra em estado de atordoamento, o dano recebido aumenta em [c][007eff]50%[-][/c] até o fim da batalha"
3251095476-NameJp = "Aquele que Surge na Aurora"
