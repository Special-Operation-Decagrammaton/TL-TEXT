1155695544-NameJp = "Três Luzes Monte"
1155695544-DescriptionJp = "Quando o valor de ATG está no máximo, usa a habilidade.\nGoz e seus clones iluminam a área à sua frente. A luz dos clones explode após um tempo, causando dano igual a [c][007eff]1500%[-][/c] do Ataque a todos os aliados na área, exceto na área iluminada pelo Goz verdadeiro."
3117980178-NameJp = "Três Luzes Monte"
3117980178-DescriptionJp = "Quando o valor de ATG está no máximo, usa a habilidade.\nGoz e seus clones iluminam a área à sua frente. A luz dos clones explode após um tempo, causando dano igual a [c][007eff]7500%[-][/c] do Ataque a todos os aliados na área, exceto na área iluminada pelo Goz verdadeiro, e aumenta a barra de Atordoamento de Goz em [c][007eff]12.5%[-][/c].\nApós um tempo, os aliados Strikers na área iluminada pelo Goz verdadeiro recebem um aumento de Recuperação de Custo de [c][007eff]750[-][/c] (por [c][007eff]5s[-][/c])."
993387228-NameJp = "Chapéu de Moeda Mágica"
993387228-DescriptionJp = "Tira um chapéu, esconde uma moeda e embaralha. Aplica os seguintes efeitos aos aliados na área sem a moeda:\n- Empurrão, estado de Atordoamento (por [c][007eff]5s[-][/c]), e dano igual a [c][007eff]800%[-][/c] do Ataque."
633666403-NameJp = "Chapéu de Moeda Mágica"
633666403-DescriptionJp = "Tira um chapéu, esconde uma moeda e embaralha. Aplica os seguintes efeitos aos aliados na área sem a moeda:\n- Empurrão, estado de Atordoamento (por [c][007eff]5s[-][/c]), dano igual a [c][007eff]800%[-][/c] do Ataque, e redução da Velocidade de Ataque em [c][007eff]50%[-][/c] (por [c][007eff]30s[-][/c])."
1509755725-NameJp = "Chapéu de Moeda Mágica"
1509755725-DescriptionJp = "Tira um chapéu, esconde uma moeda e embaralha. Aplica os seguintes efeitos aos aliados na área sem a moeda:\n- Empurrão, estado de Atordoamento (por [c][007eff]5s[-][/c]), dano igual a [c][007eff]800%[-][/c] do Ataque, e redução da Velocidade de Ataque em [c][007eff]50%[-][/c] (por [c][007eff]30s[-][/c]).\nNa área com a moeda, os seguintes efeitos são aplicados dependendo da moeda que aparece:\n- Moeda Amarela: Aumenta a Recuperação de Custo dos aliados Strikers na área em [c][007eff]350[-][/c] (por [c][007eff]5s[-][/c]) para cada aliado Striker na área (máximo de 4 acúmulos).\n- Moeda Azul: Aumenta a quantidade de dano causado pelos aliados Strikers na área em [c][007eff]7.5%[-][/c] (por [c][007eff]20s[-][/c]) para cada aliado Striker na área (máximo de 4 acúmulos)."
2382082047-NameJp = "Presente Surpresa"
2382082047-DescriptionJp = "Mira em um aliado, tira uma bomba do chapéu e causa dano igual a [c][007eff]900%[-][/c] do Ataque."
1475514238-NameJp = "Scream Rider"
1475514238-DescriptionJp = "Periodicamente, um Scream Rider aparece e causa dano igual a [c][007eff]1200%[-][/c] do Ataque aos aliados na área em linha reta.\nNos locais por onde o Scream Rider passa, soldados de Slumpia são invocados."
38402494-NameJp = "Scream Rider"
38402494-DescriptionJp = "Periodicamente, um Scream Rider aparece e causa dano igual a [c][007eff]1200%[-][/c] do Ataque aos aliados na área em linha reta.\nCausa dano igual a [c][007eff]600%[-][/c] do Ataque aos aliados próximos ao Scream Rider.\nNos locais por onde o Scream Rider passa, soldados de Slumpia são invocados."
143124999-NameJp = "Prank or Protect"
143124999-DescriptionJp = "Reduz a Taxa de Cura Recebida de todos os aliados em [c][007eff]50%[-][/c] (este efeito de enfraquecimento não pode ser removido por habilidades de remoção de enfraquecimento).\nTodo o dano causado por Goz a aliados com efeito de escudo é reduzido em [c][007eff]75%[-][/c]."
2904061954-NameJp = "Prank or Protect"
2904061954-DescriptionJp = "Reduz a Taxa de Cura Recebida de todos os aliados em [c][007eff]50%[-][/c] (este efeito de enfraquecimento não pode ser removido por habilidades de remoção de enfraquecimento).\nTodo o dano causado por Goz a aliados com efeito de escudo é reduzido em [c][007eff]50%[-][/c]."
2725301536-NameJp = "Prank or Protect"
2725301536-DescriptionJp = "Reduz a Taxa de Cura Recebida de todos os aliados em [c][007eff]90%[-][/c] (este efeito de enfraquecimento não pode ser removido por habilidades de remoção de enfraquecimento).\nTodo o dano causado por Goz a aliados com efeito de escudo é reduzido em [c][007eff]50%[-][/c].\nO valor máximo da barra de Atordoamento de Goz aumenta significativamente."
1842409822-NameJp = "Invocação de Drone: Suporte de Fogo"
1842409822-DescriptionJp = "Causa dano igual a [c][007eff]800%[-][/c] do Ataque a 1 inimigo."
39180060-NameJp = "Ride & Grenade"
39180060-DescriptionJp = "Causa dano igual a [c][007eff]350%[-][/c] do Ataque a 1 inimigo.\nCausa dano igual a [c][007eff]550%[-][/c] do Ataque aos inimigos na área circular."
2358241741-NameJp = "Supressão Estratégica"
2358241741-DescriptionJp = "Causa dano igual a [c][007eff]650%[-][/c] do Ataque aos inimigos na área em leque.\nAplica estado de Atordoamento (por [c][007eff]1.5s[-][/c])."
1144709270-NameJp = "Hora da Punição"
1144709270-DescriptionJp = "Causa dano igual a [c][007eff]400%[-][/c] do Ataque aos inimigos na área em leque."
3407764084-NameJp = "Obstrução"
3407764084-DescriptionJp = "Causa dano crítico garantido igual a [c][007eff]250%[-][/c] do Ataque a todos os inimigos."
3519203297-NameJp = "Ressonância de Cores - Alfa"
3519203297-DescriptionJp = "Shiroko＊Terror e Plenapates usam a habilidade simultaneamente.\nShiroko＊Terror: Causa dano igual a [c][007eff]2500%[-][/c] do Ataque aos inimigos na área em linha reta.\nPlenapates: Causa dano igual a [c][007eff]6000%[-][/c] do Ataque aos inimigos na área em anel.\nDurante o uso da habilidade, uma barra de CC é gerada em Plenapates. Ao acumular [c][007eff]4.5s[-][/c] de CC, a habilidade de Plenapates é interrompida e o Ataque de todos os inimigos aumenta em [c][007eff]100%[-][/c] (por [c][007eff]17s[-][/c])."
905682378-NameJp = "Ressonância de Cores - Beta"
905682378-DescriptionJp = "Shiroko＊Terror e Plenapates usam a habilidade simultaneamente.\nShiroko＊Terror: Causa dano igual a [c][007eff]2500%[-][/c] do Ataque aos inimigos na área em anel.\nPlenapates: Causa dano igual a [c][007eff]2500%[-][/c] do Ataque aos inimigos na área em linha reta.\nDurante o uso da habilidade, uma barra de CC é gerada em Plenapates. Ao acumular [c][007eff]4.5s[-][/c] de CC, a habilidade de Plenapates é interrompida e o Ataque de todos os inimigos aumenta em [c][007eff]100%[-][/c] (por [c][007eff]17s[-][/c])."
469045361-NameJp = "Arca de Atra-Hasis・Sistema de Defesa"
469045361-DescriptionJp = "Plenapates dispara toda a energia da \"Arca de Atra-Hasis\" no oponente.\nCausa dano igual a [c][007eff]1000%[-][/c] do HP do alvo a todos os inimigos."
1309155751-NameJp = "Ruína do Guia"
1309155751-DescriptionJp = "Plenapates acumula energia e depois a explode.\nCausa dano igual a [c][007eff]1000%[-][/c] do HP do alvo a todos os inimigos."
3410128716-NameJp = "Canhão Principal de Utnapishtim"
3410128716-DescriptionJp = "Dispara o canhão principal de Utnapishtim no alvo.\nCausa [c][007eff]100000000[-][/c] de dano a 1 inimigo."
2129321799-NameJp = "Sequência de Escape"
2129321799-DescriptionJp = "Faz o alvo designado escapar da arca e o move em segurança para o solo."
2373347322-NameJp = "Sussurro do Santo"
2373347322-DescriptionJp = "Causa dano crítico garantido igual a [c][007eff]500%[-][/c] do Ataque a todos os aliados e reduz o Ataque em [c][007eff]40%[-][/c] (por [c][007eff]120s[-][/c])."
4049043471-NameJp = "Sussurro do Santo"
4049043471-DescriptionJp = "Causa dano crítico garantido igual a [c][007eff]500%[-][/c] do Ataque a todos os aliados e reduz o Ataque em [c][007eff]70%[-][/c] (por [c][007eff]120s[-][/c]) (este efeito de enfraquecimento não pode ser removido por habilidades de remoção de enfraquecimento)."
2682702008-NameJp = "Contrição Solene"
2682702008-DescriptionJp = "Aplica os seguintes efeitos com base no número de enfraquecimentos que Gregorio possui:\n- 4 ou menos enfraquecimentos: Remove [c][007eff]1[-][/c] enfraquecimento de Gregorio e do Coro.\n- 5 ou mais enfraquecimentos: Reduz o Ataque de Gregorio e do Coro em [c][007eff]10%[-][/c] (por [c][007eff]120s[-][/c])."
535653506-NameJp = "Contrição Solene"
535653506-DescriptionJp = "Aplica os seguintes efeitos com base no número de enfraquecimentos que Gregorio possui:\n- 5 ou menos enfraquecimentos: Remove [c][007eff]1[-][/c] enfraquecimento de Gregorio e do Coro.\n- 6 ou mais enfraquecimentos: Reduz o Ataque de Gregorio e do Coro em [c][007eff]10%[-][/c] (por [c][007eff]120s[-][/c])."
1675678518-NameJp = "Contrição Solene"
1675678518-DescriptionJp = "Aplica os seguintes efeitos com base no número de enfraquecimentos que Gregorio possui:\n- 6 ou menos enfraquecimentos: Remove [c][007eff]1[-][/c] enfraquecimento de Gregorio e do Coro.\n- 7 ou mais enfraquecimentos: Reduz o Ataque de Gregorio e do Coro em [c][007eff]10%[-][/c] (por [c][007eff]120s[-][/c])."
746849898-NameJp = "Canto Gregoriano"
746849898-DescriptionJp = "Dependendo da direção para a qual o órgão de tubos central está voltado, usa a habilidade nos aliados ou em Gregorio. O efeito da habilidade muda a cada uso:\n- 1º: Aumenta o dano recebido por toda a equipe para a qual o tubo preto está voltado em [c][007eff]50%[-][/c] (por [c][007eff]60s[-][/c]).\n- 2º: Remove [c][007eff]1[-][/c] enfraquecimento de toda a equipe para a qual o tubo branco está voltado.\n- 3º: Aumenta o dano recebido por toda a equipe para a qual o tubo branco está voltado em [c][007eff]50%[-][/c] (por [c][007eff]60s[-][/c]).\n- 4º: Remove [c][007eff]1[-][/c] enfraquecimento de toda a equipe para a qual o tubo preto está voltado.\n(Após isso, repete a partir do 1º)."
4228737887-NameJp = "Canto Gregoriano"
4228737887-DescriptionJp = "Dependendo da direção para a qual o órgão de tubos central está voltado, usa a habilidade nos aliados ou em Gregorio. O efeito da habilidade muda a cada uso:\n- 1º: Aumenta o dano recebido por toda a equipe para a qual o tubo preto está voltado em [c][007eff]50%[-][/c] (por [c][007eff]60s[-][/c]).\n- 2º: Remove [c][007eff]1[-][/c] enfraquecimento de toda a equipe para a qual o tubo branco está voltado e adiciona [c][007eff]70%[-][/c] à quantidade de dano da Habilidade EX (por [c][007eff]120s[-][/c]).\n- 3º: Aumenta o dano recebido por toda a equipe para a qual o tubo branco está voltado em [c][007eff]50%[-][/c] (por [c][007eff]60s[-][/c]).\n- 4º: Remove [c][007eff]1[-][/c] enfraquecimento de toda a equipe para a qual o tubo preto está voltado e adiciona [c][007eff]70%[-][/c] à quantidade de dano da Habilidade EX (por [c][007eff]120s[-][/c]).\n(Após isso, repete a partir do 1º)."
204042605-NameJp = "Salvação de Todos"
204042605-DescriptionJp = "Causa dano igual a [c][007eff]999999[-][/c] do Ataque a todos os aliados (este ataque remove o estado de Imortalidade)."
469611631-NameJp = "Servo do Servo do Santo"
469611631-DescriptionJp = "Aplica efeitos a Gregorio e ao Coro com base no número de enfraquecimentos que Gregorio possui:\n- Seguro (4~5 enfraquecimentos): Aumenta o dano recebido em [c][007eff]200%[-][/c].\n- Alerta (2~3 ou 6~7 enfraquecimentos): Aumenta o dano recebido em [c][007eff]100%[-][/c] / Aumenta o Ataque em [c][007eff]20%[-][/c].\n- Perigo (1 ou menos, ou 8 ou mais enfraquecimentos): Aumenta o Ataque em [c][007eff]40%[-][/c]."
2910060456-NameJp = "Servo do Servo do Santo"
2910060456-DescriptionJp = "Aplica efeitos a Gregorio e ao Coro com base no número de enfraquecimentos que Gregorio possui:\n- Seguro (5~6 enfraquecimentos): Aumenta o dano recebido em [c][007eff]200%[-][/c].\n- Alerta (3~4 ou 7~8 enfraquecimentos): Aumenta o dano recebido em [c][007eff]100%[-][/c] / Aumenta o Ataque em [c][007eff]20%[-][/c].\n- Perigo (2 ou menos, ou 9 ou mais enfraquecimentos): Aumenta o Ataque em [c][007eff]40%[-][/c]."
2233558267-NameJp = "Servo do Servo do Santo"
2233558267-DescriptionJp = "Aplica efeitos a Gregorio e ao Coro com base no número de enfraquecimentos que Gregorio possui:\n- Seguro (6~7 enfraquecimentos): Aumenta o dano recebido em [c][007eff]250%[-][/c].\n- Alerta (4~5 ou 8~9 enfraquecimentos): Aumenta o dano recebido em [c][007eff]100%[-][/c] / Aumenta o Ataque em [c][007eff]20%[-][/c].\n- Perigo (3 ou menos, ou 10 ou mais enfraquecimentos): Aumenta o Ataque em [c][007eff]40%[-][/c]."
3650862421-NameJp = "Coro Solene"
3650862421-DescriptionJp = "O Coro nos púlpitos esquerdo e direito, após terminar o canto por [c][007eff]40s[-][/c] desde o aparecimento, aumenta o Ataque em [c][007eff]100%[-][/c].\nQuando o HP do Coro fica abaixo de 1%, eles caem e ficam impossibilitados de atacar."
2523903484-NameJp = "Sanctus"
2523903484-DescriptionJp = "Se um efeito de enfraquecimento que altera os atributos de Gregorio for aplicado, o mesmo efeito é duplicado no Coro.\nO dano recebido pelo Coro é transferido para Gregorio.\nLogo no início da batalha, reduz o Ataque de Gregorio e do Coro em [c][007eff]30%[-][/c] (por [c][007eff]30s[-][/c]).\nNa segunda metade da apresentação, todo o Coro se move para o lado de Gregorio e canta, fortalecendo gradualmente o Coro e os aliados:\n- Todo o Coro aumenta a Velocidade de Ataque em [c][007eff]10%[-][/c] a cada [c][007eff]10s[-][/c] (este efeito pode acumular).\n- Todos os aliados aumentam a Recuperação de Custo em [c][007eff]300[-][/c] a cada [c][007eff]10s[-][/c] (este efeito pode acumular)."
2975191111-NameJp = "Sanctus"
2975191111-DescriptionJp = "Se um efeito de enfraquecimento que altera os atributos de Gregorio for aplicado, o mesmo efeito é duplicado no Coro.\nO dano recebido pelo Coro é transferido para Gregorio.\nLogo no início da batalha, reduz o Ataque de Gregorio e do Coro em [c][007eff]30%[-][/c] (por [c][007eff]30s[-][/c]).\nNa segunda metade da apresentação, todo o Coro se move para o lado de Gregorio e canta, fortalecendo gradualmente o Coro e os aliados:\n- A Resistência a Dano Crítico de todo o Coro aumenta em [c][007eff]100%[-][/c], e a Velocidade de Ataque aumenta em [c][007eff]10%[-][/c] a cada [c][007eff]10s[-][/c] (este efeito pode acumular).\n- A Taxa de Crítico de todos os alunos especiais aliados atinge o valor máximo, e todos os aliados aumentam a Recuperação de Custo em [c][007eff]300[-][/c] a cada [c][007eff]10s[-][/c] (este efeito pode acumular)."
1789628881-NameJp = "Órgão da Aflição"
1789628881-DescriptionJp = "O órgão de tubos central só pode ser atacado com Habilidades EX. Quando seu HP fica abaixo de 1%, ele gira 180 graus.\nImediatamente após girar, recupera todo o HP e fica invulnerável a ataques por [c][007eff]30s[-][/c]."
2332344306-NameJp = "Canhão Duplo / Foguete Incendiário"
2332344306-DescriptionJp = "Causa dano igual a [c][007eff]300%[-][/c] do Ataque a até 4 aliados, sequencialmente.\nCausa dano igual a [c][007eff]450%[-][/c] do Ataque a até 2 aliados, sequencialmente."
1475673708-NameJp = "Já que é Assim...!"
1475673708-DescriptionJp = "Invoca um dispositivo de orientação de mísseis para destruir o resort e entra em Modo Frenesi de Mísseis.\nSe o resort for destruído, é derrota.\n100% do dano causado ao dispositivo de orientação de mísseis é transferido para o Hovercraft.\nQuando o dispositivo é destruído, o Modo Frenesi de Mísseis termina e a barra de Atordoamento do Hovercraft aumenta em [c][007eff]50%[-][/c].\nNo estado de Atordoamento, o Valor de Resistência a Crítico do Hovercraft diminui em [c][007eff]50%[-][/c]."
1173051790-NameJp = "Míssil Artesanal do Esquadrão Capacete"
1173051790-DescriptionJp = "Quando o Hovercraft entra em Modo Frenesi de Mísseis, ele dispara vários mísseis.\nOs mísseis miram apenas no resort.\nSe atingirem o resort, o HP do resort diminui em [c][007eff]1[-][/c].\n(Os mísseis só podem ser atacados com Habilidades EX)."
730354104-NameJp = "Operação de Desembarque Surpresa"
730354104-DescriptionJp = "Cada vez que o Hovercraft é atacado 15 vezes, o dano recebido aumenta em [c][007eff]10%[-][/c] (por [c][007eff]10s[-][/c]).\n(Acumula até [c][007eff]30[-][/c] vezes)."
3459472293-NameJp = "Sistema de Proteção Ativa"
3459472293-DescriptionJp = "Dispositivo de defesa que abate mísseis automaticamente.\nCausa dano igual a [c][007eff]100%[-][/c] do Ataque ao míssil."
2866159976-NameJp = "Adivinhação Floral de Cor Secreta"
2866159976-DescriptionJp = "Quando o valor de ATG está no máximo, usa a habilidade.\nPara 1 aliado, cada golpe causa dano igual a [c][007eff]150%[-][/c] do Ataque e aplica estado de Atordoamento (por [c][007eff]5s[-][/c]).\nO último golpe causa dano igual a [c][007eff]300%[-][/c] do Ataque e aplica estado de Atordoamento (por [c][007eff]5s[-][/c])."
1348468842-NameJp = "Chumbo Grosso da Paixão Ardente"
1348468842-DescriptionJp = "Quando o valor de ATG está no máximo, usa a habilidade.\nCausa dano igual a [c][007eff]750%[-][/c] do Ataque aos aliados na área em linha reta."
1705667154-NameJp = "Granada Certeira"
1705667154-DescriptionJp = "Quando o valor de ATG está no máximo, usa a habilidade.\nDispara um míssil no aliado mais distante de Wakamo, causando dano igual a [c][007eff]750%[-][/c] do Ataque.\n(O míssil pode ser bloqueado por outros alunos, invocações ou coberturas)."
4020915574-NameJp = "Apenas por Você, Meu Senhor"
4020915574-DescriptionJp = "Wakamo não é afetado por estados de CC, mas apenas a duração do CC é acumulada.\nAo acumular [c][007eff]6s/7s/8s[-][/c] de CC em cada estágio (total de [c][007eff]3[-][/c] vezes), Wakamo entra em estado de Atordoamento e todos os Selos de Wakamo nos aliados são removidos.\n(Quanto maior o Poder de Fortalecimento de CC, mais duração é aplicada).\n\nApós entrar em estado de Atordoamento, os seguintes efeitos são aplicados a Wakamo (total de 3 estágios):\nAtaque: aumenta em [c][007eff]25%/50%/75%[-][/c]\nDano Recebido: aumenta em [c][007eff]100%/200%/300%[-][/c]"
3038350997-NameJp = "Eliminarei os Intrusos"
3038350997-DescriptionJp = "Aliados atingidos pelas habilidades de Wakamo recebem [c][007eff]2[-][/c] Selos de Wakamo.\nSe um aliado acumular [c][007eff]5[-][/c] ou mais Selos de Wakamo, ele será retirado instantaneamente.\n(Ignora efeitos de escudo, Imortalidade, etc.)"
3144091492-NameJp = "Adivinhação Floral de Cor Secreta"
3144091492-DescriptionJp = "Quando o valor de ATG está no máximo, usa a habilidade.\nPara 1 aliado, cada golpe causa dano igual a [c][007eff]150%[-][/c] do Ataque e aplica estado de Atordoamento (por [c][007eff]5s[-][/c]).\nO último golpe causa dano igual a [c][007eff]300%[-][/c] do Ataque e aplica estado de Atordoamento (por [c][007eff]5s[-][/c]).\nTodos os ataques ricocheteiam para o aliado mais próximo do alvo, causando o mesmo dano.\n(Os ataques de ricochete não aplicam estado de Atordoamento nem Selo de Wakamo)."
2012876967-NameJp = "Apenas por Você, Meu Senhor"
2012876967-DescriptionJp = "Wakamo não é afetado por estados de CC, mas apenas a duração do CC é acumulada.\nAo acumular [c][007eff]10s/14s/18s[-][/c] de CC em cada estágio (total de [c][007eff]3[-][/c] vezes), Wakamo entra em estado de Atordoamento e todos os Selos de Wakamo nos aliados são removidos.\n(Quanto maior o Poder de Fortalecimento de CC, mais duração é aplicada).\n\nApós entrar em estado de Atordoamento, os seguintes efeitos são aplicados a Wakamo (total de 3 estágios):\nAtaque: aumenta em [c][007eff]25%/50%/75%[-][/c]\nDano Recebido: aumenta em [c][007eff]100%/200%/300%[-][/c]"
2789078643-NameJp = "Eliminarei os Intrusos"
2789078643-DescriptionJp = "Aliados atingidos pelas habilidades de Wakamo recebem [c][007eff]2[-][/c] Selos de Wakamo.\nSe um aliado acumular [c][007eff]5[-][/c] ou mais Selos de Wakamo, ele será retirado instantaneamente.\n(Ignora efeitos de escudo, Imortalidade, etc.)\nAlém disso, o Ataque Normal de Wakamo ricocheteia para o aliado mais próximo do alvo, causando o mesmo dano."
2287219665-NameJp = "Sistema de Proteção Ativa"
2287219665-DescriptionJp = "Dispositivo de defesa que abate mísseis automaticamente.\nCausa dano igual a [c][007eff]100%[-][/c] do Ataque ao míssil e, ao mesmo tempo, causa [c][007eff]5000[-][/c] de dano a si mesmo.\nSe o HP ficar abaixo de [c][007eff]1%[-][/c], entra em estado de Atordoamento. Se o HP for recuperado, o estado de Atordoamento é removido."
3634787929-NameJp = "Apenas por Você, Meu Senhor"
3634787929-DescriptionJp = "Wakamo não é afetado por estados de CC, mas apenas a duração do CC é acumulada.\nAo acumular [c][007eff]16s/18s/20s[-][/c] de CC em cada estágio (total de [c][007eff]3[-][/c] vezes), Wakamo entra em estado de Atordoamento e todos os Selos de Wakamo nos aliados são removidos.\n(Quanto maior o Poder de Fortalecimento de CC, mais duração é aplicada).\n\nApós entrar em estado de Atordoamento, os seguintes efeitos são aplicados a Wakamo (total de 3 estágios):\nAtaque: aumenta em [c][007eff]25%/50%/75%[-][/c]\nDano Recebido: aumenta em [c][007eff]100%/200%/300%[-][/c]"
