3663303598-DescriptionJp = "Yesod emite uma luz [c][007eff]azul[-][/c], levanta a mão esquerda e bate no chão, causando dano igual a [c][007eff]1500%[-][/c] do Ataque a todos os aliados.\nSe no momento do golpe houver uma área [c][007eff]vermelha[-][/c] por todo o chão, a habilidade é prevenida e:\n- Em vez do dano original, aplica Dano Contínuo igual a [c][007eff]15%[-][/c] do Ataque a todos os aliados (por 20 segundos).\n- Até o próximo uso de Habilidade EX de Yesod, a Recuperação de Custo dos aliados Strikers aumenta em [c][007eff]100%[-][/c]."
