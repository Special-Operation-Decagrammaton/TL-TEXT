654060030-NameJp = "Luz Sagrada (Relíquia Sagrada)"
654060030-DescriptionJp = "Ativado quando o HP da Relíquia Sagrada é recuperado para [c][007eff]100%[-][/c].\nApós a ativação, reduz a Taxa de Cura Recebida da Relíquia em [c][007eff]50%[-][/c] (por [c][007eff]20s[-][/c]).\nNo caso de uma Relíquia Verde, o dano recebido por Hieronymus aumenta em [c][007eff]55%[-][/c] (efeito acumula até 5 vezes).\nNo caso de uma Relíquia Vermelha, impede a ativação de habilidades de Hieronymus.\nQuando a interrupção é bem-sucedida, aumenta a Recuperação de Custo dos aliados Strikers em [c][007eff]2500[-][/c] (por [c][007eff]1s[-][/c]) (até 4 pessoas)."
1033389970-NameJp = "Urgata"
1033389970-DescriptionJp = "Aplica estado de Maldição a 1 aliado.\nO estado de Maldição causa Dano Contínuo igual a [c][007eff]20%[-][/c] do Ataque e, após [c][007eff]10s[-][/c], explode causando dano igual a [c][007eff]325%[-][/c] do Ataque aos aliados na área circular.\nSe o HP do alvo com Maldição estiver em [c][007eff]100%[-][/c], ou for recuperado para 100%, a Maldição é cancelada imediatamente.\nAlém disso, aumenta a Taxa de Cura Recebida do alvo com Maldição em [c][007eff]3000[-][/c] (por [c][007eff]10s[-][/c])."
2185969910-NameJp = "Luz Sagrada (Relíquia Sagrada)"
