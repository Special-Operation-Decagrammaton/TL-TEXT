[translation]
10004-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10004-CVGroup_CharacterGet_Idle1-1 = "風紀委員長のヒナ。\n私の名前は知ってると思うけど……。よろしく。"
10004-CVGroup_Cafe_Idle1-1 = "カワイイ物……。"
10004-CVGroup_Cafe_Idle2-1 = "昼寝したいけど……。"
10004-CVGroup_Cafe_Idle3-1 = "大きな問題はなさそうだね。幸い。"
10004-CVGroup_Cafe_Idle4-1 = "ゆっくりしててもいいよね？"
10004-CVGroup_Cafe_Idle5-1 = "ちょっと恥ずかしいな……。"
10004-CVGroup_WeaponGet_Idle1-1 = "どんな物語でも終わりはある。\n私がその最後まで見届けてあげる。"
10004-CVGroup_UIEventFieldMission_Enter1-1 = "あ、先生。\nちょうど解決してほしい仕事が溜まってたの。"
10004-CVGroup_UIEventFieldMission_Enter1-2 = "少し手伝ってくれるかしら？"
10004-CVGroup_UIEventFieldMission_Enter2-1 = "いらっしゃい、先生。"
10004-CVGroup_UIEventFieldMission_Enter2-2 = "パーティーとは別に、\n風紀委員としてやるべきことがあるの。"
10004-CVGroup_UIEventFieldMission_Idle1-1 = "仕事って、いつまでたっても終わらないものね。"
10004-CVGroup_UIEventFieldMission_Idle1-2 = "ん、本当に、心から共感する？\nふふっ、先生も大変なんだね……。"
10004-CVGroup_UIEventFieldMission_Idle2-1 = "仕事の手を抜くつもりはないよ。"
10004-CVGroup_UIEventFieldMission_Idle2-2 = "私は、ゲヘナの風紀委員長だから。"
10004-CVGroup_UIEventFieldMission_Buy1-1 = "あ、ありがとう。"
10004-CVGroup_UIEventFieldMission_Buy1-2 = "これは手伝ってくれたお礼。受け取って。"
10004-CVGroup_UIEventFieldMission_Buy2-1 = "さすが先生。完璧だった。\nおかげで安心できそう……"
10004-CVGroup_UIEventFieldMission_Buy2-2 = "これは手伝ってくれたお礼。はい。"
10004-CVGroup_UIEventFieldMission_Interaction1-1 = "今日はここまで、かな。\nお疲れ様、先生。"
10004-CVGroup_UIEventFieldMission_Interaction1-2 = "よかったら……少し一緒にお茶でもしない？"
