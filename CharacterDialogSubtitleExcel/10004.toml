[translation]
10004-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10004-CVGroup_CharacterGet_Idle1-1 = "Sou Hina, a presidente do Comitê Disciplinar.\nImagino que já saiba meu nome... Prazer em conhecê-lo."
10004-CVGroup_Cafe_Idle1-1 = "Coisas fofas..."
10004-CVGroup_Cafe_Idle2-1 = "Eu queria tirar uma soneca, mas..."
10004-CVGroup_Cafe_Idle3-1 = "Parece que não há grandes problemas. Que sorte."
10004-CVGroup_Cafe_Idle4-1 = "Tudo bem se eu relaxar um pouco, né?"
10004-CVGroup_Cafe_Idle5-1 = "Isso é um pouco embaraçoso..."
10004-CVGroup_WeaponGet_Idle1-1 = "Toda história tem um fim.\nEu vou acompanhar você até o último momento."
10004-CVGroup_UIEventFieldMission_Enter1-1 = "Ah, Sensei.\nJusto agora, acumularam-se alguns trabalhos que preciso resolver."
10004-CVGroup_UIEventFieldMission_Enter1-2 = "Poderia me ajudar um pouco?"
10004-CVGroup_UIEventFieldMission_Enter2-1 = "Bem-vindo, Sensei."
10004-CVGroup_UIEventFieldMission_Enter2-2 = "Além da festa,\ntenho coisas que preciso fazer como presidente do Comitê Disciplinar."
10004-CVGroup_UIEventFieldMission_Idle1-1 = "O trabalho nunca acaba, não é mesmo?"
10004-CVGroup_UIEventFieldMission_Idle1-2 = "Hm, você realmente concorda de coração?\nFufu, parece que você também tem uma vida difícil, Sensei..."
10004-CVGroup_UIEventFieldMission_Idle2-1 = "Não pretendo negligenciar meu trabalho."
10004-CVGroup_UIEventFieldMission_Idle2-2 = "Afinal, eu sou a presidente do Comitê Disciplinar de Gehenna."
10004-CVGroup_UIEventFieldMission_Buy1-1 = "Ah, obrigada."
10004-CVGroup_UIEventFieldMission_Buy1-2 = "Isto é um agradecimento por ter me ajudado. Aceite."
10004-CVGroup_UIEventFieldMission_Buy2-1 = "Como esperado do Sensei. Foi perfeito.\nGraças a isso, poderei ficar tranquila..."
10004-CVGroup_UIEventFieldMission_Buy2-2 = "Isto é um agradecimento por ter me ajudado. Aqui está."
10004-CVGroup_UIEventFieldMission_Interaction1-1 = "Por hoje é só, eu acho.\nBom trabalho, Sensei."
10004-CVGroup_UIEventFieldMission_Interaction1-2 = "Se não se importar... gostaria de tomar um chá comigo?"
