[translation]
10115-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10115-CVGroup_CharacterGet_Idle1-1 = "Millennium Science School, rebatedora número 4, Raye Nozomasa aqui.\nMeu objetivo é... 10% de aproveitamento no bastão!"
10115-CVGroup_Cafe_Idle1-1 = "Sumire-senpai... ela não está por aqui, né...?"
10115-CVGroup_Cafe_Idle2-1 = "Para um treino eficiente, o descanso também é importante..."
10115-CVGroup_Cafe_Idle3-1 = "A cafeína ajuda a melhorar o desempenho nos exercícios, não ajuda?"
10115-CVGroup_Cafe_Idle4-1 = "(Não posso... faltar ao treino de hoje, né?)"
10115-CVGroup_Cafe_Idle5-1 = "Aquele chantilly parece tão gostoso... não, preciso resistir."
10115-CVGroup_WeaponGet_Idle1-1 = "Muito obrigada por me orientar com tanto cuidado!\nVou me tornar uma rebatedora de 30% de aproveitamento logo e retribuir o favor, Sensei!\n...\n...Ei, podemos começar pelos 10%?"
10115-CVGroup_UIEventLobby_Enter1-1 = "Sensei! Você gosta de beisebol?"
10115-CVGroup_UIEventLobby_Enter1-2 = "Eu adoro!"
10115-CVGroup_UIEventLobby_Enter2-1 = "Hoje é um jogo importante!"
10115-CVGroup_UIEventLobby_Enter2-2 = "Não, na verdade, não existe jogo que não seja!"
10115-CVGroup_UIEventLobby_Enter3-1 = "Um clima tenso..."
10115-CVGroup_UIEventLobby_Enter3-2 = "Mas eu acredito! Vamos virar esse jogo agora mesmo!"
10115-CVGroup_UIEventLobby_Enter4-1 = "O beisebol só começa de verdade na parte baixa da nona entrada com dois eliminados!"
10115-CVGroup_UIEventLobby_Enter4-2 = "A deusa da sorte sorri para aqueles que não negligenciam a preparação!"
10115-CVGroup_UIEventLobby_Enter5-1 = "Não consigo acreditar..."
10115-CVGroup_UIEventLobby_Enter5-2 = "Eu... consegui um home run..."
10115-CVGroup_UIEventLobby_Enter5-3 = "Beisebol é... realmente incrível!"
10115-CVGroup_UIEventLobby_Idle1-1 = "Se tiver dúvidas sobre as regras, pode me perguntar qualquer coisa!"
10115-CVGroup_UIEventLobby_Idle2-1 = "...Eu estava olhando os registros das partidas."
10115-CVGroup_UIEventLobby_Idle2-2 = "Dizem que, antigamente, esses registros imensos eram gerenciados no papel."
10115-CVGroup_UIEventLobby_Idle2-3 = "...Hoje em dia é impossível imaginar isso..."
10115-CVGroup_UIEventLobby_Idle3-1 = "Uau, que cócegas!"
10115-CVGroup_UIEventLobby_Idle3-2 = "Sensei! Não toque em lugares estranhos!"
10115-CVGroup_UIEventLobby_Idle3-3 = "Poxa... estamos no meio de um jogo...!?\nTem gente olhando, sabia?"
10115-CVGroup_UIEventLobby_Idle4-1 = "Comida de estádio! Isso sim é uma iguaria!"
10115-CVGroup_UIEventLobby_Idle4-2 = "Sensei, vamos comer alguma coisa!"
10115-CVGroup_UIEventLobby_Idle4-3 = "O preço... se você se preocupar com isso, já perdeu!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-1 = "Sensei! Estão fazendo um sorteio no estádio!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-2 = "Na verdade, eu acabei sendo escalada para ajudar..."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-1 = "O sorteio está acontecendo agora!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-2 = "Por favor, venha conferir!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-3 = "Como foi? Pareci uma funcionária de verdade?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter3-1 = "Use todos os seus bilhetes de sorteio que sobraram!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-1 = "Parece que vou receber um pagamento pelo trabalho!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-2 = "Hehe, será que compro uma luva nova?"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-1 = "O que se exige de um jogador é técnica e sorte."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-2 = "...Talvez eu não tenha conseguido o home run porque minha sorte estava ruim!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck5-1 = "Uau! Primeiro prêmio!\nÉ o primeiro prêmio! Incrível!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck4-1 = "Segundo prêmio! Como esperado do Sensei!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-1 = "É um prêmio de sorte, Sensei!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-2 = "Sinto que, agora, eu conseguiria rebater um home run!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-1 = "Terceiro prêmio."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-2 = "Ganhar um prêmio é sempre bom!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-1 = "Prêmio de participação, hein..."
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-2 = "Está tudo bem, Sensei!\nComo dizem, o que importa é participar!"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck0-1 = "............\nNão aconteceu nada agora. Né, Sensei?"
10115-CVGroup_UIEventMission_Enter1-1 = "O importante é... continuar se esforçando um pouco todo dia!"
10115-CVGroup_UIEventMission_Enter1-2 = "É igual ao treino!"
10115-CVGroup_UIEventMission_Enter2-1 = "A rotina também fica tranquila quando a gente se acostuma!"
10115-CVGroup_UIEventMission_Enter2-2 = "Com o esforço diário, acaba não sendo um fardo."
10115-CVGroup_UIEventMission_Idle1-1 = "Dizem que grandes atletas planejam tudo, desde a hora de acordar até o menu de treino,\nchegando até a planejar o cardápio das refeições,"
10115-CVGroup_UIEventMission_Idle1-2 = "e seguem tudo à risca."
10115-CVGroup_UIEventMission_Idle1-3 = "Eu... não sinto que conseguiria fazer isso..."
10115-CVGroup_UIEventMission_Idle2-1 = "É um pouco tarde para dizer isso, mas... o Sensei é incrível, né?"
10115-CVGroup_UIEventMission_Idle2-2 = "Chegar de manhã, trabalhar o dia todo..."
10115-CVGroup_UIEventMission_Idle2-3 = "É a mesma coisa que ir para a escola todo dia...?"
10115-CVGroup_UIEventMission_Idle2-4 = "Mas ouvi dizer que a vida adulta é muito mais difícil que a escola, não é?"
10115-CVGroup_UIEventMission_Buy1-1 = "Significa que o esforço deu frutos, não é!"
10115-CVGroup_UIEventMission_Buy1-2 = "Parabéns, Sensei!"
10115-CVGroup_UIEventMission_Buy2-1 = "Conseguimos, Sensei!"
10115-CVGroup_UIEventMission_Buy2-2 = "Vou me esforçar ao máximo para não ficar para trás também!"
10115-CVGroup_UIEventMission_Interaction1-1 = "Por hoje é só! Bom trabalho!"
10115-CVGroup_UIEventMission_Interaction1-2 = "Sensei! Você tem um tempinho depois disso?"
