[translation]
10115-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ！"
10115-CVGroup_CharacterGet_Idle1-1 = "ミレニアムサイエンススクール、\n4番バッター、野正レイです。\n目指すは……打率1割、です！"
10115-CVGroup_Cafe_Idle1-1 = "スミレ先輩……さすがにここにはいませんよね……？"
10115-CVGroup_Cafe_Idle2-1 = "効率的な練習のためには休息も大事……。"
10115-CVGroup_Cafe_Idle3-1 = "カフェインは運動効果を上げてくれるんでしたっけ。"
10115-CVGroup_Cafe_Idle4-1 = "（今日の練習、サボっちゃ……ダメだよなぁ）"
10115-CVGroup_Cafe_Idle5-1 = "あのホイップクリーム、美味しそう……いや、我慢我慢。"
10115-CVGroup_WeaponGet_Idle1-1 = "ここまで丁寧にご指導くださり、ありがとうございます！\n早く3割打者になって、先生に恩返ししますね！\n……\n……えっと、1割からでいいですか？"
10115-CVGroup_UIEventLobby_Enter1-1 = "先生！野球はお好きですか？"
10115-CVGroup_UIEventLobby_Enter1-2 = "私は、大好きです！"
10115-CVGroup_UIEventLobby_Enter2-1 = "今日は重要な試合ですよ！"
10115-CVGroup_UIEventLobby_Enter2-2 = "いえ、そうでない試合などありませんが！"
10115-CVGroup_UIEventLobby_Enter3-1 = "不穏な空気……"
10115-CVGroup_UIEventLobby_Enter3-2 = "でも、私は信じてます！今からでも逆転劇を起こしてやりましょう！"
10115-CVGroup_UIEventLobby_Enter4-1 = "野球は9回裏2アウトからが本番ですよ！"
10115-CVGroup_UIEventLobby_Enter4-2 = "準備を怠らない者に、チャンスの女神がほほ笑むんですから！"
10115-CVGroup_UIEventLobby_Enter5-1 = "信じられません……"
10115-CVGroup_UIEventLobby_Enter5-2 = "私が……ホームランを……"
10115-CVGroup_UIEventLobby_Enter5-3 = "野球って……本当に最高ですね！"
10115-CVGroup_UIEventLobby_Idle1-1 = "ルールのことでしたらなんでも私に聞いてください！"
10115-CVGroup_UIEventLobby_Idle2-1 = "……試合記録を見ていました。"
10115-CVGroup_UIEventLobby_Idle2-2 = "この膨大な記録を、昔は紙で管理していたんだそうです。"
10115-CVGroup_UIEventLobby_Idle2-3 = "……今では考えられないですよね……。"
10115-CVGroup_UIEventLobby_Idle3-1 = "わわっ、くすぐったい！"
10115-CVGroup_UIEventLobby_Idle3-2 = "先生！変なところ触らないでください！"
10115-CVGroup_UIEventLobby_Idle3-3 = "もう……試合中ですよ……！？\n人目もありますからね？"
10115-CVGroup_UIEventLobby_Idle4-1 = "球場飯！これがまた絶品なんですよ！"
10115-CVGroup_UIEventLobby_Idle4-2 = "先生、何か食べましょう！"
10115-CVGroup_UIEventLobby_Idle4-3 = "値段は……気にしたら負けです！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-1 = "先生！スタジアムで抽選会をやってます！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter1-2 = "実は私、その手伝いをすることになりまして……。"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-1 = "ただいま、抽選会開催中です！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-2 = "どうぞお立ち寄りください！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter2-3 = "どうでした？スタッフっぽかったですか？"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Enter3-1 = "余ってる抽選券、全部使ってってくださいね！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-1 = "ちゃんとバイト代も出るみたいです！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle1-2 = "へへ、グローブ、買い替えよっかな！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-1 = "選手に求められるのは、テクニックと、運です。"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Idle2-2 = "……ホームランが打てなかったのは、運が悪かったからかも！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck5-1 = "うわあ！1等賞！\n1等賞ですよ！すごいです！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck4-1 = "2等賞ですね！さすがです、先生！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-1 = "ラッキー賞だそうです！先生！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck3-2 = "なんだか今ならホームランが打てそうな気がします！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-1 = "3等賞ですね。"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck2-2 = "賞があるのは良いことです！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-1 = "参加賞かぁ……"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck1-2 = "大丈夫ですよ、先生！\n参加することに意義がある、って言うじゃないですか！"
10115-CVGroup_UIEventFortuneGachashop_Garapon_Luck0-1 = "…………\nいま、何も起きませんでした。ね？先生？"
10115-CVGroup_UIEventMission_Enter1-1 = "大切なのは……毎日コツコツ続けること！"
10115-CVGroup_UIEventMission_Enter1-2 = "練習と同じですね！"
10115-CVGroup_UIEventMission_Enter2-1 = "ルーティンも、慣れれば大丈夫です！"
10115-CVGroup_UIEventMission_Enter2-2 = "毎日の積み重ねで苦にならなくなりますよ。"
10115-CVGroup_UIEventMission_Idle1-1 = "偉大な選手は起床時間から訓練メニュー、\n果ては献立一つに至るまで全てスケジュールし、"
10115-CVGroup_UIEventMission_Idle1-2 = "その通りにこなすそうです。"
10115-CVGroup_UIEventMission_Idle1-3 = "私には……できる気がしません……。"
10115-CVGroup_UIEventMission_Idle2-1 = "今更ですけど……先生ってすごいんですね。"
10115-CVGroup_UIEventMission_Idle2-2 = "朝出勤して、一日中お仕事して……"
10115-CVGroup_UIEventMission_Idle2-3 = "毎日登校するのと一緒……？"
10115-CVGroup_UIEventMission_Idle2-4 = "でも大人は学校の何倍も大変って聞きますよ？違うんですか？"
10115-CVGroup_UIEventMission_Buy1-1 = "努力が実を結んだ、ってことですよね！"
10115-CVGroup_UIEventMission_Buy1-2 = "おめでとうございます、先生！"
10115-CVGroup_UIEventMission_Buy2-1 = "やりましたね、先生！"
10115-CVGroup_UIEventMission_Buy2-2 = "私も負けないよう、気合入れていきます！"
10115-CVGroup_UIEventMission_Interaction1-1 = "今日はここまで！お疲れさまでした！"
10115-CVGroup_UIEventMission_Interaction1-2 = "先生！このあとお時間、ありますか？"
