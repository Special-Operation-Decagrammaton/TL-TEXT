[translation]
10089-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10089-CVGroup_CharacterGet_Idle1-1 = "あら、今回はどんな依頼？\nそれともビジネスの提案かしら？\nまあどちらにしても……来てくれて嬉しいわ、先生。"
10089-CVGroup_Cafe_Idle1-1 = "あ、あの人はっ……！？\nでもここなら……大丈夫よね……？"
10089-CVGroup_Cafe_Idle2-1 = "ここの雰囲気……嫌いじゃないわ。"
10089-CVGroup_Cafe_Idle3-1 = "そろそろ大きめの仕事を一つ、\nキメたいところだけど……。"
10089-CVGroup_Cafe_Idle4-1 = "どこかにいい取引先、ないかしら……。"
10089-CVGroup_Cafe_Idle5-1 = "うーん……今月の運営費、どうしよう……。"
10089-CVGroup_WeaponGet_Idle1-1 = "長い付き合いだもの。信頼してる、なんて言葉……今更よね。\nそうね……これからもよろしく、先生。\n……ええ、これだけで十分よ。"
10089-CVGroup_UIEventLobby_Enter1-1 = "さあ、仕事の時間よ、先生。"
10089-CVGroup_UIEventLobby_Enter2-1 = "ちょうどいいわ、\n先生に見せたいものがあるの。"
10089-CVGroup_UIEventLobby_Enter3-1 = "もうこんな時間……。"
10089-CVGroup_UIEventLobby_Enter4-1 = "早いものね。\nそろそろ幕引きかしら……？"
10089-CVGroup_UIEventLobby_Enter5-1 = "仕上げまで手を抜いちゃだめよ。"
10089-CVGroup_UIEventLobby_Idle1-1 = "ん……？先生？\n何か話でもあるのかしら……？"
10089-CVGroup_UIEventLobby_Idle2-1 = "し、しーっ！静かに！"
10089-CVGroup_UIEventLobby_Idle2-2 = "潜入がバレちゃうでしょう……！"
10089-CVGroup_UIEventLobby_Idle3-1 = "ひいっ……！？"
10089-CVGroup_UIEventLobby_Idle3-2 = "あ……先生じゃないの。"
10089-CVGroup_UIEventLobby_Idle4-1 = "こ、ここはまずいわ……\n外で話しましょう。"
10089-CVGroup_UIEventBoxGachaShop_Enter1-1 = "それじゃ、手がかりを集めるわよ。"
10089-CVGroup_UIEventBoxGachaShop_Enter2-1 = "先生、資料をまとめたいの。"
10089-CVGroup_UIEventBoxGachaShop_Enter2-2 = "付き合ってもらえるかしら？"
10089-CVGroup_UIEventBoxGachaShop_Enter3-1 = "ターゲットのことを、\nもうちょっと調べたいわね。"
10089-CVGroup_UIEventBoxGachaShop_Idle1-1 = "しゅ、集中しなさい。\nいや、私じゃなくて、資料に！"
10089-CVGroup_UIEventBoxGachaShop_Idle2-1 = "ん、ん？\nわ、私に何か用なの……？"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "ああ、そういうことだったのね。"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "完全に、理解したわ。"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "さすが、私の見込んだパートナーだわ。"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "情報は揃ったけど……\n念のため、もう少し見てみましょう。"
