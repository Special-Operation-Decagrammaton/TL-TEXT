[translation]
10089-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10089-CVGroup_CharacterGet_Idle1-1 = "Ora, que tipo de pedido é este desta vez?\nOu seria uma proposta de negócios?\nBem, de qualquer forma... fico feliz que tenha vindo, Sensei."
10089-CVGroup_Cafe_Idle1-1 = "A-aquela pessoa...!?\nMas aqui... deve estar tudo bem, né...?"
10089-CVGroup_Cafe_Idle2-1 = "A atmosfera deste lugar... eu não desgosto."
10089-CVGroup_Cafe_Idle3-1 = "Já está na hora de fechar um trabalho grande,\nmas..."
10089-CVGroup_Cafe_Idle4-1 = "Será que não tem um bom cliente em algum lugar...?"
10089-CVGroup_Cafe_Idle5-1 = "Hmm... o que eu faço com o custo operacional deste mês...?"
10089-CVGroup_WeaponGet_Idle1-1 = "Já nos conhecemos há muito tempo. Dizer que confio em você... é redundante, não é?\nÉ verdade... conto com você daqui para frente também, Sensei.\n...Sim, isso é o suficiente."
10089-CVGroup_UIEventLobby_Enter1-1 = "Muito bem, é hora de trabalhar, Sensei."
10089-CVGroup_UIEventLobby_Enter2-1 = "Que bom que chegou,\ntenho algo para te mostrar, Sensei."
10089-CVGroup_UIEventLobby_Enter3-1 = "Já é essa hora..."
10089-CVGroup_UIEventLobby_Enter4-1 = "Como o tempo voa.\nSerá que já está na hora de encerrar...?"
10089-CVGroup_UIEventLobby_Enter5-1 = "Não relaxe até finalizar tudo."
10089-CVGroup_UIEventLobby_Idle1-1 = "Hm...? Sensei?\nTem algo que queira me dizer...?"
10089-CVGroup_UIEventLobby_Idle2-1 = "Shh, shh! Silêncio!"
10089-CVGroup_UIEventLobby_Idle2-2 = "A infiltração vai ser descoberta...!"
10089-CVGroup_UIEventLobby_Idle3-1 = "Iiiih...!?"
10089-CVGroup_UIEventLobby_Idle3-2 = "Ah... é só você, Sensei."
10089-CVGroup_UIEventLobby_Idle4-1 = "A-aqui é um lugar ruim...\nVamos conversar lá fora."
10089-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Então, vamos coletar as pistas."
10089-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Sensei, preciso organizar os documentos."
10089-CVGroup_UIEventBoxGachaShop_Enter2-2 = "Pode me acompanhar?"
10089-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Quero investigar um pouco mais\nsobre o alvo."
10089-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Con-concentre-se.\nNão em mim, nos documentos!"
10089-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Hm, hm?\nVo-você quer algo de mim...?"
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Ah, então era isso."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Entendi perfeitamente."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Como esperado do parceiro que eu escolhi."
10089-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "As informações estão completas, mas...\nPor precaução, vamos dar mais uma olhada."
