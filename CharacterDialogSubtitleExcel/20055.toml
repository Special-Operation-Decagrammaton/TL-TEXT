[translation]
20055-CVGroup_UITitle_Idle1-1 = "Blue…… suu……! Archive!"
20055-CVGroup_CharacterGet_Idle1-1 = "Do Millennium Science School……\nSou Yuzu, do Departamento de Desenvolvimento de Jogos…….\nE-estou vestida assim, mas……\nPrazer em conhecê-lo……."
20055-CVGroup_Cafe_Idle1-1 = "(Uma rotina pacífica……\nAgora eu entendo bem\no valor\ndisso)"
20055-CVGroup_Cafe_Idle2-1 = "O sofá……\nEle não vai disparar de repente,\nvai……?"
20055-CVGroup_Cafe_Idle3-1 = "É quentinho e\ntem um cheiro bom……\nÉ muito bom.\nEhehe."
20055-CVGroup_Cafe_Idle4-1 = "Eu não quero……\nentrar num armário\npor um bom tempo…… uuu."
20055-CVGroup_Cafe_Idle5-1 = "No fim das contas, isso……\nnão está um pouco\nchamativo demais……?\nUuuu……."
20055-CVGroup_WeaponGet_Idle1-1 = "Treine como se fosse pra valer. E leve o jogo a sério como se fosse a vida real……! Eu farei o meu melhor……!"
20055-CVGroup_UICarrierLobby_Enter1-1 = "Será que tem…… algum lugar pra se esconder……?"
20055-CVGroup_UICarrierLobby_Enter2-1 = "Tem um console de videogame aqui também……."
20055-CVGroup_UICarrierLobby_Enter3-1 = "Eu não quero…… descer mais……."
20055-CVGroup_UICarrierLobby_Enter4-1 = "Sensei…… então foi contra inimigos assim que você lutou……."
20055-CVGroup_UICarrierLobby_Enter5-1 = "Tanto a presidente Rio quanto a Himari-senpai…… são incríveis……."
20055-CVGroup_UICarrierLobby_Idle1-1 = "É, no fim das contas, fora do armário é perigoso……."
20055-CVGroup_UICarrierLobby_Idle2-1 = "(Que tipo de jogo será que está baixado aqui……?)"
20055-CVGroup_UICarrierLobby_Idle3-1 = "Sensei…… você vai ficar comigo, né……?"
20055-CVGroup_UICarrierLobby_Idle4-1 = "Não sei por que, mas quando estou com o Sensei…… não sinto medo…… ehehe……."
20055-CVGroup_UICarrierLobby_Idle5-1 = "Você tem me ensinado várias coisas, mas……"
20055-CVGroup_UICarrierLobby_Idle5-2 = "Eu sinto que entendo, mas ao mesmo tempo não entendo……."
20055-CVGroup_UIEventShop_Enter1-1 = "B-bem-vindo,\nSensei……."
20055-CVGroup_UIEventShop_Enter2-1 = "Para um lugar que parece uma loja……\né um pouco solitário."
20055-CVGroup_UIEventShop_Idle1-1 = "Uuu…… estou com um pouco de medo……\nuuuu……."
20055-CVGroup_UIEventShop_Idle1-2 = "Sensei……\nvocê não vai\nme esquecer, né……?"
20055-CVGroup_UIEventShop_Idle2-1 = "Eu queria fazer\nalgo que estivesse ao meu alcance……."
20055-CVGroup_UIEventShop_Idle2-2 = "Todos aqui\nsão pessoas tão incríveis……."
20055-CVGroup_UIEventShop_Buy1-1 = "Ah, sim……!\nÉ isso que você quer, né……!"
20055-CVGroup_UIEventShop_Buy2-1 = "Agir como uma atendente……\nAgir como uma atendente……."
20055-CVGroup_UIEventShop_Buy2-2 = "Muito obrigada pela preferência!"
20055-CVGroup_UIEventShop_Buy3-1 = "S-sim…… aqui está,\npode pegar……."
20055-CVGroup_UIEventShop_Buy4-1 = "E-espero que isso……."
20055-CVGroup_UIEventShop_Buy4-2 = "seja útil para\ntodos vocês……."
20055-CVGroup_UIEventMission_Enter1-1 = "Está tudo bem……\nEu estou bem, então……!"
20055-CVGroup_UIEventMission_Enter2-1 = "Não posso fugir,\nnão posso fugir……"
20055-CVGroup_UIEventMission_Enter2-2 = "Não posso, fugir……!"
20055-CVGroup_UIEventMission_Idle1-1 = "Não importa a situação…… as missões são\nimportantes, afinal……."
20055-CVGroup_UIEventMission_Idle2-1 = "Por que as coisas chegaram a esse ponto……."
20055-CVGroup_UIEventMission_Idle3-1 = "Se pudéssemos conversar um pouco mais……\nteria sido bom……."
20055-CVGroup_UIEventMission_Idle4-1 = "Se houver algo que eu\npossa fazer……"
20055-CVGroup_UIEventMission_Idle4-2 = "por favor, me diga\na qualquer momento……!"
20055-CVGroup_UIEventMission_Buy1-1 = "Se fosse um sistema de jogo,\neu diria assim."
20055-CVGroup_UIEventMission_Buy1-2 = "Missão cumprida!"
20055-CVGroup_UIEventMission_Buy1-3 = "Ehehe……\nDepois de dizer isso,"
20055-CVGroup_UIEventMission_Buy1-4 = "sinto que a tensão\ndiminuiu um pouco."
20055-CVGroup_UIEventMission_Buy2-1 = "Sensei……\nvocê não está com medo?"
20055-CVGroup_UIEventMission_Buy2-2 = "……"
20055-CVGroup_UIEventMission_Buy2-3 = "Eu, como o Sensei está aqui……"
20055-CVGroup_UIEventMission_Buy2-4 = "vou tentar me esforçar um pouco mais."
20055-CVGroup_UIEventMission_Interaction1-1 = "Bom trabalho……!\nComo esperado do Sensei……!"
