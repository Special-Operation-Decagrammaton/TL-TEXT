[translation]
20045-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
20045-CVGroup_CharacterGet_Idle1-1 = "Da Academia Hyakkiyako, do Comitê de Gestão de Festivais, Asahina Fina! Vou guiar todos vocês!"
20045-CVGroup_Cafe_Idle1-1 = "Uau~, parece o cenário de um filme de yakuza, que legal!"
20045-CVGroup_Cafe_Idle2-1 = "(Essa TV... dá para assistir filmes nela!)"
20045-CVGroup_Cafe_Idle3-1 = "Sinto que já vi isso em algum lugar!"
20045-CVGroup_Cafe_Idle4-1 = "Tem muita gente incrível aqui... A Fina não pode ficar para trás!"
20045-CVGroup_Cafe_Idle5-1 = "Estou começando a ficar com sono..."
20045-CVGroup_WeaponGet_Idle1-1 = "Sinto que cresci um nível, não, quinhentos níveis!"
20045-CVGroup_UIEventLobby_Enter1-1 = "Welcome to~ Hyakkiyako!"
20045-CVGroup_UIEventLobby_Enter2-1 = "Seja muito bem-vindo a Hyakkiyako!"
20045-CVGroup_UIEventLobby_Enter3-1 = "Sensei! Está se divertindo?"
20045-CVGroup_UIEventLobby_Enter4-1 = "Já me acostumei bastante a ser guia! Vou dar o meu melhor até o fim!"
20045-CVGroup_UIEventLobby_Enter5-1 = "Quando vier a Hyakkiyako novamente, chame a Fina, viu!"
20045-CVGroup_UIEventLobby_Idle1-1 = "Tcharam! Pode deixar a guia comigo! É isso!"
20045-CVGroup_UIEventLobby_Idle2-1 = "Tome cuidado para não se perder, viu!"
20045-CVGroup_UIEventLobby_Idle3-1 = "Com o Sensei aqui, tudo fica mais animado e divertido!"
20045-CVGroup_UIEventLobby_Idle4-1 = "Ver todo mundo se divertindo deixa a Fina feliz também!"
