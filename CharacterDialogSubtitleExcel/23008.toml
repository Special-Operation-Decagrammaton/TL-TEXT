[translation]
23008-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
23008-CVGroup_CharacterGet_Idle1-1 = "全ての出会いは必然……\nこれからどうぞよろしくお願いします、先生。"
23008-CVGroup_Cafe_Idle1-1 = "神聖な気配が感じられます、\n素晴らしい場所ですね。"
23008-CVGroup_Cafe_Idle2-1 = "今日も良いお天気ですね。"
23008-CVGroup_Cafe_Idle3-1 = "少しくらいでしたら……\nここで、休憩していっても良いでしょうか？"
23008-CVGroup_Cafe_Idle4-1 = "これから先ずっと、\nこの場所に祝福がありますように。"
23008-CVGroup_Cafe_Idle5-1 = "この世が、少しでも平和でありますように……"
23008-CVGroup_WeaponGet_Idle1-1 = "あまり、武器は使いたくないのですが……\n平和のためでしたら。"
