[translation]
23008-CVGroup_UITitle_Idle1-1 = "Blue Archive."
23008-CVGroup_CharacterGet_Idle1-1 = "Todo encontro é inevitável... \nDe agora em diante, conto com você, Sensei."
23008-CVGroup_Cafe_Idle1-1 = "Sinto uma presença sagrada, \né um lugar maravilhoso."
23008-CVGroup_Cafe_Idle2-1 = "O tempo está bom hoje também."
23008-CVGroup_Cafe_Idle3-1 = "Se não for pedir muito... \nPosso descansar um pouco aqui?"
23008-CVGroup_Cafe_Idle4-1 = "Que este lugar seja abençoado \npor todo o futuro."
23008-CVGroup_Cafe_Idle5-1 = "Que este mundo possa ser, ao menos um pouco, pacífico..."
23008-CVGroup_WeaponGet_Idle1-1 = "Eu realmente não gostaria de usar armas... \nMas se for pela paz, farei o necessário."
