[translation]
10107-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10107-CVGroup_CharacterGet_Idle1-1 = "Edição extra! Edição extra!\nA secretária do Pandemonium, Motomiya Chiaki,\nacaba de chegar ao Schale!"
10107-CVGroup_Cafe_Idle1-1 = "Este lugar é interessante!"
10107-CVGroup_Cafe_Idle2-1 = "Sinto que um furo de reportagem está por vir!"
10107-CVGroup_Cafe_Idle3-1 = "Ah! Eu quero ser amiga daquela pessoa!"
10107-CVGroup_Cafe_Idle4-1 = "Se eu colocasse um expositor do 'Semanal Pandemonium' aqui..."
10107-CVGroup_Cafe_Idle5-1 = "Isso é incrível!\nA Ibuki-chan com certeza vai adorar!"
10107-CVGroup_WeaponGet_Idle1-1 = "Eba! Estou tão feliz!\nTanto quanto, ou até mais, do que quando consigo um furo de reportagem!"
10107-CVGroup_UIEventLobby_Enter1-1 = "Uau!\nQuanta diversão!"
10107-CVGroup_UIEventLobby_Enter2-1 = "Sensei! Por aqui! Do meu lado!"
10107-CVGroup_UIEventLobby_Enter2-2 = "Reservei um lugar para você, Sensei!"
10107-CVGroup_UIEventLobby_Enter3-1 = "Está bem animado, não é?"
10107-CVGroup_UIEventLobby_Enter3-2 = "Sensei, está se divertindo?"
10107-CVGroup_UIEventLobby_Enter4-1 = "A festa divertida está chegando ao fim!"
10107-CVGroup_UIEventLobby_Enter4-2 = "Vamos aproveitar até o último momento!"
10107-CVGroup_UIEventLobby_Enter5-1 = "Aconteceram tantas coisas, mas..."
10107-CVGroup_UIEventLobby_Enter5-2 = "Foi um tempo incrível e divertido!"
10107-CVGroup_UIEventLobby_Idle1-1 = "Sim!\nVocê me chamou?"
10107-CVGroup_UIEventLobby_Idle2-1 = "Vou tirar algumas fotos\nque podem servir para a próxima edição!"
10107-CVGroup_UIEventLobby_Idle3-1 = "Sensei, diga 'ah'!"
10107-CVGroup_UIEventLobby_Idle3-2 = "Pronto, isso foi um 'Chocolate Especial do Pandemonium'!"
10107-CVGroup_UIEventLobby_Idle3-3 = "O que achou? É doce e delicioso, não é?"
10107-CVGroup_UIEventLobby_Idle4-1 = "Eu gosto de músicas maravilhosas e comidas deliciosas, mas..."
10107-CVGroup_UIEventLobby_Idle4-2 = "Sinceramente, é diferente quando estou com você, Sensei!"
