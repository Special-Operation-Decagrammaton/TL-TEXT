[translation]
10107-CVGroup_UITitle_Idle1-1 = "ブル～アーカイブ～！"
10107-CVGroup_CharacterGet_Idle1-1 = "号外！ごうが～い！\n万魔殿の書記、元宮チアキが\nシャーレに到着しましたよ～！"
10107-CVGroup_Cafe_Idle1-1 = "ここ、面白いですね～！"
10107-CVGroup_Cafe_Idle2-1 = "これはスクープの予感がします！"
10107-CVGroup_Cafe_Idle3-1 = "あ！あの方と友達になりたいです！"
10107-CVGroup_Cafe_Idle4-1 = "ここに「週刊万魔殿」のスタンドを置いたら……。"
10107-CVGroup_Cafe_Idle5-1 = "これは！\nイブキちゃん大喜び間違いなしですね！"
10107-CVGroup_WeaponGet_Idle1-1 = "やった～！すっごく嬉しいです！\n特ダネゲットした時と同じかそれ以上に……！"
10107-CVGroup_UIEventLobby_Enter1-1 = "わ～！\nお楽しみがいっぱい！"
10107-CVGroup_UIEventLobby_Enter2-1 = "先生！こっちです！私の隣！"
10107-CVGroup_UIEventLobby_Enter2-2 = "先生の席、とってありますよ～！"
10107-CVGroup_UIEventLobby_Enter3-1 = "盛り上がってますね～！"
10107-CVGroup_UIEventLobby_Enter3-2 = "先生、楽しんでますか～？"
10107-CVGroup_UIEventLobby_Enter4-1 = "楽しいパーティーも大詰め！"
10107-CVGroup_UIEventLobby_Enter4-2 = "最後まで満喫していきましょ～！"
10107-CVGroup_UIEventLobby_Enter5-1 = "いろいろありましたけど……"
10107-CVGroup_UIEventLobby_Enter5-2 = "最っ高に！楽しい時間でした！"
10107-CVGroup_UIEventLobby_Idle1-1 = "は～い！\nお呼びですか～？"
10107-CVGroup_UIEventLobby_Idle2-1 = "次号に使えそうな写真、\n撮っていきますよ～"
10107-CVGroup_UIEventLobby_Idle3-1 = "先生、あ～んしてください！"
10107-CVGroup_UIEventLobby_Idle3-2 = "はいっ、今のは「万魔殿特製チョコ」でした！"
10107-CVGroup_UIEventLobby_Idle3-3 = "どうですか？甘くておいしいですよね！"
10107-CVGroup_UIEventLobby_Idle4-1 = "素敵な音楽も、美味しい料理も好きですけど……"
10107-CVGroup_UIEventLobby_Idle4-2 = "やっぱり、先生と一緒だとなんか違いますね！"
