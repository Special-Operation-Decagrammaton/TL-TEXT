[translation]
10040-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ……。"
10040-CVGroup_CharacterGet_Idle1-1 = "こんにちは……大野ツクヨ、です……。\n一応、忍術研究部の部員で……\nよろしく、お願いします……。"
10040-CVGroup_Cafe_Idle1-1 = "（私は木……私はただの木……）"
10040-CVGroup_Cafe_Idle2-1 = "（私は背景……私は、ひとつの家具……）"
10040-CVGroup_Cafe_Idle3-1 = "（いっそ、あの家具みたいになれたら……羨ましい）"
10040-CVGroup_Cafe_Idle4-1 = "あ、申し訳ありません……\n邪魔、ですよね……？"
10040-CVGroup_Cafe_Idle5-1 = "何だか、目立ってしまってるような……。"
10040-CVGroup_WeaponGet_Idle1-1 = "こんなにすごいものを、私が、受け取っても……？\n私にそんな、資格、あるんでしょうか……？十分、ですか？\n……ありがとうございます、先生。引き続き、精進、します。先生の、ために……！"
10040-CVGroup_UIEventLobby_Enter1-1 = "忍術研究部、出動です……！"
10040-CVGroup_UIEventLobby_Enter1-2 = "きっと何とか、なります……よね？"
10040-CVGroup_UIEventLobby_Enter2-1 = "この事件は、私たちが、解決します……！"
10040-CVGroup_UIEventLobby_Enter2-2 = "今ので、決まってました……？"
10040-CVGroup_UIEventLobby_Enter3-1 = "簡単には、解決できなさそう、ですね……\n頑張り、ます……！"
10040-CVGroup_UIEventLobby_Enter4-1 = "そろそろ、落ち着きそうな、感じが……。"
10040-CVGroup_UIEventLobby_Enter4-2 = "これもみんなと、先生のお陰、です……。"
10040-CVGroup_UIEventLobby_Enter5-1 = "お疲れ様でした、先生。\n私……少しは役に、立てましたか……？"
10040-CVGroup_UIEventLobby_Idle1-1 = "大きくって、ごめんなさい……。"
10040-CVGroup_UIEventLobby_Idle2-1 = "どうして、こんなことに……。"
10040-CVGroup_UIEventLobby_Idle3-1 = "忍術研究部が、解決して、みせます……\n多分……。"
10040-CVGroup_UIEventLobby_Idle4-1 = "私に何とか、できるので、しょうか……。"
10040-CVGroup_UIEventShop_Enter1-1 = "忍具など、色々揃ってますので……どうぞ。"
10040-CVGroup_UIEventShop_Enter2-1 = "何か必要でしたら、こちらで。\nお役に立てると、良いのですが……。"
10040-CVGroup_UIEventShop_Enter3-1 = "事件は無事、終わりましたが……\n何か、気になるようでしたら、あっはい。\nまだ、間に合いますので……。"
10040-CVGroup_UIEventShop_Idle1-1 = "ん……？\nえっと、私はその、売り物ではなく……。"
10040-CVGroup_UIEventShop_Idle2-1 = "もしかして、邪魔、ですか？\nごめんなさい、どきますね……。"
10040-CVGroup_UIEventShop_Buy1-1 = "はい、良い忍具だと、思います……！"
10040-CVGroup_UIEventShop_Buy2-1 = "少しでも、お役に立てればと……。"
10040-CVGroup_UIEventShop_Buy3-1 = "ありがとう、ございます、先生。"
10040-CVGroup_UIEventShop_Buy4-1 = "なるほど、それと、それと……\n流石は先生、です！"
