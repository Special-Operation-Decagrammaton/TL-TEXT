[translation]
10040-CVGroup_UITitle_Idle1-1 = "Blue Archive..."
10040-CVGroup_CharacterGet_Idle1-1 = "Olá... sou Tsukuyo Oono...\nSou, por assim dizer, um membro do Clube de Pesquisa Ninja...\nMuito prazer..."
10040-CVGroup_Cafe_Idle1-1 = "（Eu sou uma árvore... Eu sou apenas uma árvore...）"
10040-CVGroup_Cafe_Idle2-1 = "（Eu sou o cenário... Eu sou uma peça de mobília...）"
10040-CVGroup_Cafe_Idle3-1 = "（Se eu pudesse ser como aquele móvel... Que inveja...）"
10040-CVGroup_Cafe_Idle4-1 = "Ah, me desculpe...\nEstou no caminho, não estou...?"
10040-CVGroup_Cafe_Idle5-1 = "De alguma forma, sinto que estou chamando muita atenção..."
10040-CVGroup_WeaponGet_Idle1-1 = "Eu realmente posso... aceitar algo tão incrível...?\nSerá que eu tenho... qualificações para isso...? Eu sou boa o bastante?\n...Muito obrigada, Sensei. Continuarei me dedicando. Por você, Sensei...!"
10040-CVGroup_UIEventLobby_Enter1-1 = "Clube de Pesquisa Ninja, em ação...!"
10040-CVGroup_UIEventLobby_Enter1-2 = "Vai dar tudo certo... não vai?"
10040-CVGroup_UIEventLobby_Enter2-1 = "Nós vamos resolver... este caso...!"
10040-CVGroup_UIEventLobby_Enter2-2 = "Isso que eu disse agora... soou legal...?"
10040-CVGroup_UIEventLobby_Enter3-1 = "Parece que não vai ser fácil... de resolver, não é...\nVou dar o meu... melhor...!"
10040-CVGroup_UIEventLobby_Enter4-1 = "Sinto que as coisas... estão prestes a se acalmar..."
10040-CVGroup_UIEventLobby_Enter4-2 = "Isso é graças a todas... e ao Sensei..."
10040-CVGroup_UIEventLobby_Enter5-1 = "Bom trabalho, Sensei.\nEu... fui pelo menos um pouco útil...?"
10040-CVGroup_UIEventLobby_Idle1-1 = "Me desculpe... por ser tão grande..."
10040-CVGroup_UIEventLobby_Idle2-1 = "Como as coisas... chegaram a esse ponto..."
10040-CVGroup_UIEventLobby_Idle3-1 = "O Clube de Pesquisa Ninja vai... resolver isso...\nProvavelmente..."
10040-CVGroup_UIEventLobby_Idle4-1 = "Será que... eu consigo fazer alguma coisa...?"
10040-CVGroup_UIEventShop_Enter1-1 = "Temos várias ferramentas ninjas e afins... por favor, fique à vontade."
10040-CVGroup_UIEventShop_Enter2-1 = "Se precisar de algo, é por aqui.\nEspero que eu possa... ser de alguma utilidade..."
10040-CVGroup_UIEventShop_Enter3-1 = "O incidente terminou em segurança, mas...\nSe houver algo que lhe interesse, ah, sim.\nAinda dá tempo..."
10040-CVGroup_UIEventShop_Idle1-1 = "Hum...?\nEr, eu... não estou à venda..."
10040-CVGroup_UIEventShop_Idle2-1 = "Por acaso... estou no caminho?\nMe desculpe, vou sair de perto..."
10040-CVGroup_UIEventShop_Buy1-1 = "Sim, acho que é... uma boa ferramenta ninja...!"
10040-CVGroup_UIEventShop_Buy2-1 = "Espero que isso possa ajudar... nem que seja um pouquinho..."
10040-CVGroup_UIEventShop_Buy3-1 = "Muito... obrigada, Sensei."
10040-CVGroup_UIEventShop_Buy4-1 = "Entendo, isso e... isso...\nComo esperado do Sensei...!"