[translation]
20009-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20009-CVGroup_CharacterGet_Idle1-1 = "Não importa o quão frio seja o lugar! Afinal, eu sou a grande Secretária-Geral da Academia Red Winter!"
20009-CVGroup_Cafe_Idle1-1 = "Munya... estou com sono..."
20009-CVGroup_Cafe_Idle2-1 = "Quem estiver vadiando será expurgado!"
20009-CVGroup_Cafe_Idle3-1 = "O desenvolvimento do novo resort está indo bem?"
20009-CVGroup_Cafe_Idle4-1 = "(Hehe! Parece que todos não conseguem tirar os olhos da minha figura cheia de dignidade!)"
20009-CVGroup_Cafe_Idle5-1 = "(...Será que eu deveria ter trazido mais medalhas?)"
20009-CVGroup_WeaponGet_Idle1-1 = "Oh, perigo, perigo, quase me esqueci. Mesmo que seja um resort, não posso abrir mão do símbolo da minha autoridade. O bigode, o bigode... e mais bigode!"
20009-CVGroup_UIEventLobby_Enter1-1 = "Quem duvidar da minha autoridade será expurgado, mesmo durante as férias!"
20009-CVGroup_UIEventLobby_Enter2-1 = "Hum! Umas férias como estas de vez em quando não são nada mal!"
20009-CVGroup_UIEventLobby_Idle1-1 = "Abrir uma fonte termal sem a minha permissão... que ultraje!"
20009-CVGroup_UIEventLobby_Idle1-2 = "Expurgo em todos, expurgo!"
20009-CVGroup_UIEventLobby_Idle2-1 = "Hm? O que foi, camarada?"
20009-CVGroup_UIEventLobby_Idle3-1 = "E-eu não estou aproveitando! Como Secretária-Geral, estou apenas fazendo uma inspeção!"
20009-CVGroup_UIEventLobby_Idle4-1 = "Aquele pessoal do Departamento de Desenvolvimento de Fontes Termais de Gehenna... eles foram impressionantes..."
20009-CVGroup_UIEventLobby_Enter3-1 = "Quando eu voltar para a secretaria, vou planejar uma fonte termal ainda mais luxuosa que esta..."
20009-CVGroup_UIEventLobby_Enter3-2 = "Hehe..."
20009-CVGroup_UIEventLobby_Enter4-1 = "Era para eu estar aproveitando as férias, mas me sinto exausta..."
20009-CVGroup_UIEventLobby_Enter5-1 = "Já chega de fontes termais por um tempo..."
20009-CVGroup_UIEventLobby_Enter5-2 = "Camarada, vamos voltar para a secretaria e descansar..."
