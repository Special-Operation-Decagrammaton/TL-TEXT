[translation]
20009-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20009-CVGroup_CharacterGet_Idle1-1 = "どれだけ寒い場所だとしても関係ない！\nなんたっておいらは、レッドウィンター連邦学園の偉大な書記長だからな！"
20009-CVGroup_Cafe_Idle1-1 = "むにゃ……ねむい……。"
20009-CVGroup_Cafe_Idle2-1 = "怠けてるやつらは、全員粛清だ！"
20009-CVGroup_Cafe_Idle3-1 = "新しいリゾート地の開発は順調か？"
20009-CVGroup_Cafe_Idle4-1 = "（ふふっ！みんな、おいらの威厳に溢れた姿から目が離せないようだな！）"
20009-CVGroup_Cafe_Idle5-1 = "（……もっとたくさん勲章を付けてきた方が良かったかな？）"
20009-CVGroup_WeaponGet_Idle1-1 = "おお、危ない危ない、うっかりしていた。\nリゾート地だとしても、権威の象徴を手放すわけにはいかない。\n髭とか、髭とか……あと髭とかな！"
20009-CVGroup_UIEventLobby_Enter1-1 = "おいらの権威を疑うやつらは、\nたとえ休暇中でも粛清だ！"
20009-CVGroup_UIEventLobby_Enter2-1 = "ふむ！\nたまにはこういう休暇も悪くないな！"
20009-CVGroup_UIEventLobby_Idle1-1 = "おいらの許可も無しに温泉を開くだなんて……\nけしからん！"
20009-CVGroup_UIEventLobby_Idle1-2 = "みんな粛清だ、粛清！"
20009-CVGroup_UIEventLobby_Idle2-1 = "ん？どうかしたか、カムラッド？"
20009-CVGroup_UIEventLobby_Idle3-1 = "ま、満喫なんてしてない！\nあくまで、書記長として、視察をしているんだ！"
20009-CVGroup_UIEventLobby_Idle4-1 = "あのゲヘナの温泉開発部のやつら、\nすごかったな……。"
20009-CVGroup_UIEventLobby_Enter3-1 = "事務局に戻ったら、\nここよりもっと豪勢な温泉の計画を……。"
20009-CVGroup_UIEventLobby_Enter3-2 = "ふふっ……。"
20009-CVGroup_UIEventLobby_Enter4-1 = "なんだか休暇を楽しむはずだったのに、\nどっと疲れたな……。"
20009-CVGroup_UIEventLobby_Enter5-1 = "もうしばらく温泉はいいや……。"
20009-CVGroup_UIEventLobby_Enter5-2 = "カムラッド、事務局に戻って休もう……。"
