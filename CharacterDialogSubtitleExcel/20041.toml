[translation]
20041-CVGroup_UIMiniEventLobby_Enter1-1 = "途中参加という形になるのかしら。"
20041-CVGroup_UIMiniEventLobby_Enter1-2 = "……これからよろしく頼むわね、先生。"
20041-CVGroup_UIMiniEventLobby_Enter2-1 = "貴方は、時間を厳守できる人なのね。"
20041-CVGroup_UIMiniEventLobby_Enter2-2 = "まさに合理的な行動よ。"
20041-CVGroup_UIMiniEventLobby_Enter3-1 = "ここがヒマリの……"
20041-CVGroup_UIMiniEventLobby_Enter3-2 = "いえ、私たちの基地なのね。"
20041-CVGroup_UIMiniEventLobby_Idle1-1 = "……まだ、実感がわかないの。"
20041-CVGroup_UIMiniEventLobby_Idle1-2 = "先生と……同じ作戦に身を置いていることが。"
20041-CVGroup_UIMiniEventLobby_Idle2-1 = "……みんなには、気兼ねなく接してもらっているわ。"
20041-CVGroup_UIMiniEventLobby_Idle2-2 = "嫌というわけでは、ないのだけれど……"
20041-CVGroup_UIMiniEventLobby_Idle2-3 = "少し戸惑っているのは、事実よ。"
20041-CVGroup_UIMiniEventLobby_Idle3-1 = "工学の分野以外は……"
20041-CVGroup_UIMiniEventLobby_Idle3-2 = "ごめんなさい、それほど詳しくないの。"
20041-CVGroup_UIMiniEventLobby_Idle4-1 = "……なにかしら？……話しかけてみたかっただけ？"
20041-CVGroup_UIMiniEventLobby_Idle4-2 = "そういう非合理的な行動は控えて頂戴、先生。"
20041-CVGroup_UIMiniEventLobby_Idle4-3 = "……不愉快とまでは、言ってないわ。"
20041-CVGroup_UIMiniEventLobby_Idle5-1 = "以前は、すべてを掌握しなければならないと考えていたの。"
20041-CVGroup_UIMiniEventLobby_Idle5-2 = "でも、今は……人間一人に掌握できる範疇の限界に気がつけたわ。"
20041-CVGroup_UIMiniEventLobby_Idle5-3 = "……先生のおかげ、かしら。"
20041-CVGroup_UIMiniEventShop_Enter1-1 = "ヒマリから引き継ぎがあったわ。"
20041-CVGroup_UIMiniEventShop_Enter1-2 = "現在、各地から「名も無き神」による"
20041-CVGroup_UIMiniEventShop_Enter1-3 = "謎の物質が見つかっている、と。"
20041-CVGroup_UIMiniEventShop_Enter2-1 = "サンプルがあれば、\n再補給も可能になるわ。"
20041-CVGroup_UIMiniEventShop_Enter3-1 = "集めたサンプルを見せてちょうだい。"
20041-CVGroup_UIMiniEventShop_Idle1-1 = "協力、感謝するわ。"
20041-CVGroup_UIMiniEventShop_Idle2-1 = "「物質」の分析中よ。\nそこから副産物を生産しているの。"
20041-CVGroup_UIMiniEventShop_Idle3-1 = "この装置、かなり熱を放っているわね……"
20041-CVGroup_UIMiniEventShop_Idle3-2 = "エイミには少し厳しいんじゃないかしら。"
20041-CVGroup_UIMiniEventShop_Idle4-1 = "装置の構造に不満はないの。"
20041-CVGroup_UIMiniEventShop_Idle4-2 = "意外？ふふ、私だって、優れたものは素直に認めるわ。"
20041-CVGroup_UIMiniEventShop_Idle4-3 = "ああでも、デザインと細部にもう少し合理性を……"
20041-CVGroup_UIMiniEventShop_Idle5-1 = "……そんなことをしても、得られるものは何もないと思うわ。"
20041-CVGroup_UIMiniEventShop_Idle5-2 = "……私の表情の変化が見られる？"
20041-CVGroup_UIMiniEventShop_Idle5-3 = "……貴方が変わっていると言われる理由が、分かったわ。"
20041-CVGroup_UIMiniEventShop_Buy1-1 = "今回の分析結果よ。"
20041-CVGroup_UIMiniEventShop_Buy2-1 = "いらっしゃいませ、どちらになさいますか？"
20041-CVGroup_UIMiniEventShop_Buy2-2 = "……真似してみただけよ。今のは忘れなさい。"
20041-CVGroup_UIMiniEventShop_Buy3-1 = "過去にあった「物々交換」も、"
20041-CVGroup_UIMiniEventShop_Buy3-2 = "こうだったのかしら。"
20041-CVGroup_UIMiniEventShop_Buy4-1 = "合理的な選択ね。"
20041-CVGroup_UIMiniEventShop_Buy5-1 = "最終選択は貴方に委ねるわ。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "ここでは、少し変わった分析方法を採用しているの。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-2 = "一言でいうと――「偶然に基づいた抽出」よ。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "「くじ」で損をする可能性は、確率論でも立証済み。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "……けれど、今は仕方ないわね。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "……ヒマリの嗜好は変わらないのね。"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "……多面的考察は必要だもの。ええ。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "分析結果の予測が正確にできないというのは……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "セミナーの人間として、少し遺憾ね。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "もし期待通りの結果が得られなかったとしても……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "私にできることはないの。先に謝っておくわね。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "「神はサイコロを振らない」……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "この命題は誤りだとされているのだけれども、"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-3 = "私は――ある側面においては、同意しているわ。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "量子力学という学問は、理解するものではないわ。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "……暗記するものよ。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "世界とは、人間の認知の外にあるもの。"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "……そうね、この運任せの分析と一緒。"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "……それは……！本当に……？"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "大数の法則、ね。"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "当たるまで引き続ける…？"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "理論上、間違ってはないのだけれど……。"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "世界の大半は正規分布の中に存在する……"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "成し遂げたわね、先生。おめでとう。"
20041-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
20041-CVGroup_CharacterGet_Idle1-1 = "ミレニアムサイエンススクール、\nセミナーの調月リオよ。\n最も合理的な答えを、提示してあげる。"
20041-CVGroup_Cafe_Idle1-1 = "合理的な配置を\n追求するなら……。"
20041-CVGroup_Cafe_Idle2-1 = "あの置物、実用性が欠けていると思うのだけれど……"
20041-CVGroup_Cafe_Idle3-1 = "カフェインはカプセルで摂取すれば良いのではないかしら？"
20041-CVGroup_Cafe_Idle4-1 = "最大多数の最大幸福……\nここでも適用できるかしら。"
20041-CVGroup_Cafe_Idle5-1 = "……人混みは避けましょう。"
20041-CVGroup_WeaponGet_Idle1-1 = "射撃は不得手だけれど……\n自分の身程度は守ってみせるわ。\nそれから……先生、貴方のことも。"
20041-CVGroup_UIEventLobby_Enter1-1 = "適切なタイミングね。"
20041-CVGroup_UIEventLobby_Enter2-1 = "そろそろ来る頃だと思っていたわ。"
20041-CVGroup_UIEventLobby_Enter3-1 = "全て順調よ。\nでも、安心できる段階ではないわ。"
20041-CVGroup_UIEventLobby_Enter4-1 = "近々、まとまった報告ができそうよ。"
20041-CVGroup_UIEventLobby_Enter4-2 = "もう少し待ってちょうだい。"
20041-CVGroup_UIEventLobby_Enter5-1 = "解決できてよかったわ。"
20041-CVGroup_UIEventLobby_Enter5-2 = "……これは本心よ。"
20041-CVGroup_UIEventLobby_Idle1-1 = "……突然私に触れて、\nどうしたのかしら？"
20041-CVGroup_UIEventLobby_Idle2-1 = "言葉で伝えてくれるかしら。"
20041-CVGroup_UIEventLobby_Idle3-1 = "だから……その……"
20041-CVGroup_UIEventLobby_Idle4-1 = "私に……何を、求めているの？"
20041-CVGroup_UIEventMission_Enter1-1 = "リストアップは済んでいるわ。"
20041-CVGroup_UIEventMission_Enter2-1 = "これが今日のタスクよ。"
20041-CVGroup_UIEventMission_Idle1-1 = "……先生の意図が理解できないわ。"
20041-CVGroup_UIEventMission_Idle1-2 = "無言で触れるだけでは、伝わらないのよ。"
20041-CVGroup_UIEventMission_Idle2-1 = "……もしかして、"
20041-CVGroup_UIEventMission_Idle2-2 = "同じことをしてほしいの？"
20041-CVGroup_UIEventMission_Buy1-1 = "確認するわね。"
20041-CVGroup_UIEventMission_Buy2-1 = "リストを更新しておいたわ。"
20041-CVGroup_UIEventMission_Interaction1-1 = "今日はこれで終了よ。"
20041-CVGroup_UIEventMission_Interaction1-2 = "……流石、\nといったところかしら。"
