[translation]
20041-CVGroup_UIMiniEventLobby_Enter1-1 = "Suponho que minha participação seja considerada tardia."
20041-CVGroup_UIMiniEventLobby_Enter1-2 = "……Conto com você a partir de agora, Sensei."
20041-CVGroup_UIMiniEventLobby_Enter2-1 = "Vejo que você é alguém que cumpre horários rigorosamente."
20041-CVGroup_UIMiniEventLobby_Enter2-2 = "Uma atitude deveras racional."
20041-CVGroup_UIMiniEventLobby_Enter3-1 = "Este é o lugar da Himari……"
20041-CVGroup_UIMiniEventLobby_Enter3-2 = "Não, é a nossa base."
20041-CVGroup_UIMiniEventLobby_Idle1-1 = "……Ainda não caiu a ficha."
20041-CVGroup_UIMiniEventLobby_Idle1-2 = "De que estou…… na mesma operação que o Sensei."
20041-CVGroup_UIMiniEventLobby_Idle2-1 = "……Todos estão me tratando com muita naturalidade."
20041-CVGroup_UIMiniEventLobby_Idle2-2 = "Não é que eu não goste, mas……"
20041-CVGroup_UIMiniEventLobby_Idle2-3 = "É um fato que estou um pouco confusa."
20041-CVGroup_UIMiniEventLobby_Idle3-1 = "Fora da área de engenharia……"
20041-CVGroup_UIMiniEventLobby_Idle3-2 = "Desculpe, não entendo muito bem."
20041-CVGroup_UIMiniEventLobby_Idle4-1 = "……O que foi? Só queria puxar assunto?"
20041-CVGroup_UIMiniEventLobby_Idle4-2 = "Por favor, evite esse tipo de comportamento irracional, Sensei."
20041-CVGroup_UIMiniEventLobby_Idle4-3 = "……Não cheguei a dizer que é desagradável."
20041-CVGroup_UIMiniEventLobby_Idle5-1 = "Antigamente, eu pensava que precisava dominar tudo."
20041-CVGroup_UIMiniEventLobby_Idle5-2 = "Mas agora…… percebi o limite do que um único ser humano pode dominar."
20041-CVGroup_UIMiniEventLobby_Idle5-3 = "……Será que foi graças ao Sensei?"
20041-CVGroup_UIMiniEventShop_Enter1-1 = "Recebi as instruções da Himari."
20041-CVGroup_UIMiniEventShop_Enter1-2 = "Atualmente, substâncias misteriosas provenientes"
20041-CVGroup_UIMiniEventShop_Enter1-3 = "do \"Deus Sem Nome\" foram encontradas em vários locais."
20041-CVGroup_UIMiniEventShop_Enter2-1 = "Se tivermos amostras, \nserá possível realizar o reabastecimento."
20041-CVGroup_UIMiniEventShop_Enter3-1 = "Mostre-me as amostras que você coletou."
20041-CVGroup_UIMiniEventShop_Idle1-1 = "Agradeço pela cooperação."
20041-CVGroup_UIMiniEventShop_Idle2-1 = "Estou analisando a \"substância\".\nEstou produzindo subprodutos a partir dela."
20041-CVGroup_UIMiniEventShop_Idle3-1 = "Este dispositivo está emitindo muito calor……"
20041-CVGroup_UIMiniEventShop_Idle3-2 = "Não será um pouco rigoroso demais para a Eimi?"
20041-CVGroup_UIMiniEventShop_Idle4-1 = "Não tenho reclamações sobre a estrutura do dispositivo."
20041-CVGroup_UIMiniEventShop_Idle4-2 = "Surpreso? Fufu, eu também sei reconhecer algo excelente quando vejo."
20041-CVGroup_UIMiniEventShop_Idle4-3 = "Ah, mas o design e os detalhes poderiam ser um pouco mais racionais……"
20041-CVGroup_UIMiniEventShop_Idle5-1 = "……Acho que não há nada a ganhar fazendo isso."
20041-CVGroup_UIMiniEventShop_Idle5-2 = "……Você quer ver as mudanças nas minhas expressões?"
20041-CVGroup_UIMiniEventShop_Idle5-3 = "……Entendi o motivo de dizerem que você é estranho."
20041-CVGroup_UIMiniEventShop_Buy1-1 = "Aqui está o resultado da análise desta vez."
20041-CVGroup_UIMiniEventShop_Buy2-1 = "Bem-vindo, o que deseja?"
20041-CVGroup_UIMiniEventShop_Buy2-2 = "……Só estava imitando. Esqueça o que eu disse."
20041-CVGroup_UIMiniEventShop_Buy3-1 = "Será que o \"escambo\" do passado"
20041-CVGroup_UIMiniEventShop_Buy3-2 = "era assim também?"
20041-CVGroup_UIMiniEventShop_Buy4-1 = "Uma escolha racional."
20041-CVGroup_UIMiniEventShop_Buy5-1 = "Deixo a decisão final com você."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "Aqui, adotamos um método de análise um pouco diferente."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter1-2 = "Em resumo — é uma \"extração baseada no acaso\"."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "A possibilidade de sair perdendo em um \"sorteio\" já foi comprovada pela teoria das probabilidades."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "……Mas, não há o que fazer agora."
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "……Os gostos da Himari não mudam, não é?"
20041-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "……Uma análise multifacetada é necessária. Sim."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "Não conseguir prever os resultados da análise com precisão é……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "Como alguém do Seminar, é um pouco lamentável."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "Mesmo que não obtenha o resultado esperado……"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "Não há nada que eu possa fazer? Já peço desculpas de antemão."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "“Deus não joga dados”..."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "Embora essa premissa seja considerada incorreta,"
20041-CVGroup_UIMiniEventBoxGachaShop_Idle3-3 = "eu... em certos aspectos, concordo com ela."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "A mecânica quântica não é uma disciplina para se entender."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "...É para se decorar."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "O mundo é algo que existe fora da cognição humana."
20041-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "...Pois é, assim como essa análise baseada na sorte."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "...Isso é...! É verdade...?"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "A lei dos grandes números, entendo."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "Continuar puxando até conseguir...?"
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "Teoricamente, não está errado, mas..."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "A maior parte do mundo existe dentro de uma distribuição normal..."
20041-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "Você conseguiu, Sensei. Meus parabéns."
20041-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20041-CVGroup_CharacterGet_Idle1-1 = "Do Millennium Science School, do Seminar, eu sou Rio Tsukatsuki.\nEu lhe apresentarei a resposta mais racional."
20041-CVGroup_Cafe_Idle1-1 = "Se formos buscar\numa disposição racional..."
20041-CVGroup_Cafe_Idle2-1 = "Acho que aquele enfeite carece de utilidade prática..."
20041-CVGroup_Cafe_Idle3-1 = "Não seria melhor ingerir cafeína em cápsulas?"
20041-CVGroup_Cafe_Idle4-1 = "A maior felicidade para o maior número de pessoas...\nSerá que isso se aplica aqui também?"
20041-CVGroup_Cafe_Idle5-1 = "...Vamos evitar multidões."
20041-CVGroup_WeaponGet_Idle1-1 = "Não sou boa com tiro, mas...\nConsigo proteger a mim mesma.\nE também... Sensei, a você."
20041-CVGroup_UIEventLobby_Enter1-1 = "O momento é oportuno."
20041-CVGroup_UIEventLobby_Enter2-1 = "Eu já esperava que você viesse por volta desta hora."
20041-CVGroup_UIEventLobby_Enter3-1 = "Está tudo em ordem.\nMas ainda não é hora de baixar a guarda."
20041-CVGroup_UIEventLobby_Enter4-1 = "Em breve, poderei lhe dar um relatório completo."
20041-CVGroup_UIEventLobby_Enter4-2 = "Espere só mais um pouco."
20041-CVGroup_UIEventLobby_Enter5-1 = "Fico feliz que tenha sido resolvido."
20041-CVGroup_UIEventLobby_Enter5-2 = "...Digo isso de coração."
20041-CVGroup_UIEventLobby_Idle1-1 = "...Me tocar de repente,\no que houve?"
20041-CVGroup_UIEventLobby_Idle2-1 = "Poderia me dizer com palavras?"
20041-CVGroup_UIEventLobby_Idle3-1 = "Por isso... é que..."
20041-CVGroup_UIEventLobby_Idle4-1 = "O que você... quer de mim?"
20041-CVGroup_UIEventMission_Enter1-1 = "A lista já está pronta."
20041-CVGroup_UIEventMission_Enter2-1 = "Estas são as tarefas de hoje."
20041-CVGroup_UIEventMission_Idle1-1 = "...Não consigo entender a sua intenção, Sensei."
20041-CVGroup_UIEventMission_Idle1-2 = "Apenas me tocar em silêncio não transmite nada."
20041-CVGroup_UIEventMission_Idle2-1 = "...Por acaso,"
20041-CVGroup_UIEventMission_Idle2-2 = "você quer que eu faça o mesmo?"
20041-CVGroup_UIEventMission_Buy1-1 = "Vou verificar."
20041-CVGroup_UIEventMission_Buy2-1 = "Atualizei a lista."
20041-CVGroup_UIEventMission_Interaction1-1 = "Por hoje é só."
20041-CVGroup_UIEventMission_Interaction1-2 = "...Como esperado,\neu diria."
