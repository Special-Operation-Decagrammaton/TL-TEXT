[translation]
20048-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ。"
20048-CVGroup_CharacterGet_Idle1-1 = "ごきげんよう、先生。\nこのたびの休息が、心穏やかなものとなりますよう祈っております。"
20048-CVGroup_Cafe_Idle1-1 = "（少し、横になりたいですね……）"
20048-CVGroup_Cafe_Idle2-1 = "皆さん、自由ですね……。"
20048-CVGroup_Cafe_Idle3-1 = "優しい風の通る、素敵な場所ですね。"
20048-CVGroup_Cafe_Idle4-1 = "このインテリア……内装の良い参考になりそうです。"
20048-CVGroup_Cafe_Idle5-1 = "コーヒー……この機に試してみましょうか。"
20048-CVGroup_WeaponGet_Idle1-1 = "小型の銃ではありますが……\nこれが担う責任は、決して軽くありません。\nその重さに押しつぶされてしまわぬように。\n私を、どうか見守っていてください。"
20048-CVGroup_UIEventLobby_Enter1-1 = "先生、ようこそお越しくださいました。\nこちらへおかけください。"
20048-CVGroup_UIEventLobby_Enter2-1 = "バレないように手を抜くためには技術が求められます。"
20048-CVGroup_UIEventLobby_Enter2-2 = "ふふ……コツを教えて差し上げましょうか？"
20048-CVGroup_UIEventLobby_Enter3-1 = "残してきた業務が気がかりで……。"
20048-CVGroup_UIEventLobby_Enter3-2 = "上手く回っていると良いのですが……。"
20048-CVGroup_UIEventLobby_Enter4-1 = "なにかと事件が続きますね……。"
20048-CVGroup_UIEventLobby_Enter4-2 = "ただの悪い夢だったら良かったのですが……。"
20048-CVGroup_UIEventLobby_Enter5-1 = "もう帰る時間ですか。"
20048-CVGroup_UIEventLobby_Enter5-2 = "ここで起きたことも、いつの日か良い思い出話になるのでしょうね。"
20048-CVGroup_UIEventLobby_Idle1-1 = "何かご用ですか？"
20048-CVGroup_UIEventLobby_Idle2-1 = "暑いですね……。"
20048-CVGroup_UIEventLobby_Idle2-2 = "何か冷たい飲み物を用意させましょう。"
20048-CVGroup_UIEventLobby_Idle2-3 = "ええ、アイスティー以外の、ですが。"
20048-CVGroup_UIEventLobby_Idle3-1 = "あら先生、この本にご興味が？"
20048-CVGroup_UIEventLobby_Idle4-1 = "先生、そこでは肌が焼けてしまいます。"
20048-CVGroup_UIEventLobby_Idle4-2 = "どうぞこちらへ。パラソルの下は涼しいですよ。"
20048-CVGroup_UIEventShop_Enter1-1 = "ゆっくりご覧ください。"
20048-CVGroup_UIEventShop_Enter1-2 = "在庫は十分にご用意しております。"
20048-CVGroup_UIEventShop_Enter2-1 = "なにぶん、店番は初めてでして。"
20048-CVGroup_UIEventShop_Enter2-2 = "何卒……お手柔らかにお願いします。"
20048-CVGroup_UIEventShop_Enter3-1 = "お買い物、ご満足いただけましたか？"
20048-CVGroup_UIEventShop_Enter3-2 = "では、そろそろ帰りましょう、先生。"
20048-CVGroup_UIEventShop_Idle1-1 = "接客もいわば、交渉事の一種……？"
20048-CVGroup_UIEventShop_Idle1-2 = "なるほど、そう聞くと、緊張が少しほぐれそうです。"
20048-CVGroup_UIEventShop_Idle2-1 = "接客に会計、陳列……。"
20048-CVGroup_UIEventShop_Idle2-2 = "思ったよりも業務範囲が多岐にわたるのですね。"
20048-CVGroup_UIEventShop_Buy1-1 = "お目が高いですね、先生。"
20048-CVGroup_UIEventShop_Buy2-1 = "少々お待ちください。包装してまいります。"
20048-CVGroup_UIEventShop_Buy3-1 = "えっ！？私が欲しいもの……？"
20048-CVGroup_UIEventShop_Buy3-2 = "ふふっ、お気持ちだけいただいておきますね。"
20048-CVGroup_UIEventShop_Buy4-1 = "ふふ、店番の勘所を押さえられた気がします。"
