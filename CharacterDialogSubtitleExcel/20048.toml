[translation]
20048-CVGroup_UITitle_Idle1-1 = "Blue... Archive."
20048-CVGroup_CharacterGet_Idle1-1 = "Saudações, Sensei.\nEspero que este descanso seja um momento de paz para o seu coração."
20048-CVGroup_Cafe_Idle1-1 = "(Eu gostaria de me deitar um pouco...)"
20048-CVGroup_Cafe_Idle2-1 = "Todos são tão livres, não é...?"
20048-CVGroup_Cafe_Idle3-1 = "Este é um lugar maravilhoso, onde sopra uma brisa suave."
20048-CVGroup_Cafe_Idle4-1 = "Esta decoração... parece uma ótima referência para interiores."
20048-CVGroup_Cafe_Idle5-1 = "Café... talvez eu deva aproveitar esta oportunidade para experimentar."
20048-CVGroup_WeaponGet_Idle1-1 = "Embora seja uma arma pequena...\nA responsabilidade que ela carrega não é nada leve.\nPara que eu não seja esmagada por esse peso...\nPor favor, continue olhando por mim."
20048-CVGroup_UIEventLobby_Enter1-1 = "Sensei, seja bem-vindo.\nPor favor, sente-se aqui."
20048-CVGroup_UIEventLobby_Enter2-1 = "É preciso técnica para conseguir relaxar sem ser notado."
20048-CVGroup_UIEventLobby_Enter2-2 = "Fufu... quer que eu lhe ensine o truque?"
20048-CVGroup_UIEventLobby_Enter3-1 = "Estou preocupada com o trabalho que deixei para trás..."
20048-CVGroup_UIEventLobby_Enter3-2 = "Espero que tudo esteja correndo bem..."
20048-CVGroup_UIEventLobby_Enter4-1 = "Incidentes continuam acontecendo, não é..."
20048-CVGroup_UIEventLobby_Enter4-2 = "Teria sido melhor se fosse apenas um pesadelo..."
20048-CVGroup_UIEventLobby_Enter5-1 = "Já está na hora de ir embora?"
20048-CVGroup_UIEventLobby_Enter5-2 = "O que aconteceu aqui também se tornará uma boa lembrança algum dia, não é?"
20048-CVGroup_UIEventLobby_Idle1-1 = "Precisa de algo?"
20048-CVGroup_UIEventLobby_Idle2-1 = "Está quente, não é..."
20048-CVGroup_UIEventLobby_Idle2-2 = "Vou pedir para prepararem algo gelado para beber."
20048-CVGroup_UIEventLobby_Idle2-3 = "Sim, mas nada de chá gelado."
20048-CVGroup_UIEventLobby_Idle3-1 = "Ora, Sensei, está interessado neste livro?"
20048-CVGroup_UIEventLobby_Idle4-1 = "Sensei, sua pele vai queimar se ficar aí."
20048-CVGroup_UIEventLobby_Idle4-2 = "Venha para cá. Debaixo do guarda-sol é fresco."
20048-CVGroup_UIEventShop_Enter1-1 = "Fique à vontade para olhar."
20048-CVGroup_UIEventShop_Enter1-2 = "Temos estoque suficiente disponível."
20048-CVGroup_UIEventShop_Enter2-1 = "Sabe, é a minha primeira vez cuidando de uma loja."
20048-CVGroup_UIEventShop_Enter2-2 = "Por favor... seja gentil comigo."
20048-CVGroup_UIEventShop_Enter3-1 = "Ficou satisfeito com as compras?"
20048-CVGroup_UIEventShop_Enter3-2 = "Então, vamos voltar, Sensei."
20048-CVGroup_UIEventShop_Idle1-1 = "Atender clientes também é um tipo de negociação...?"
20048-CVGroup_UIEventShop_Idle1-2 = "Entendo, ouvir isso me deixa um pouco menos tensa."
20048-CVGroup_UIEventShop_Idle2-1 = "Atendimento, caixa, organização..."
20048-CVGroup_UIEventShop_Idle2-2 = "O escopo do trabalho é mais amplo do que eu pensava."
20048-CVGroup_UIEventShop_Buy1-1 = "Você tem bom gosto, Sensei."
20048-CVGroup_UIEventShop_Buy2-1 = "Espere um momento, por favor. Vou embrulhar para você."
20048-CVGroup_UIEventShop_Buy3-1 = "Ah!? Algo que eu queira...?"
20048-CVGroup_UIEventShop_Buy3-2 = "Fufu, aceitarei apenas o seu gesto."
20048-CVGroup_UIEventShop_Buy4-1 = "Fufu, sinto que peguei o jeito de cuidar da loja."
