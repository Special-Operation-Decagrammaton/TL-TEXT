[translation]
26010-CVGroup_UITitle_Idle1-1 = "ブルー……ア、アーカイブ……。"
26010-CVGroup_CharacterGet_Idle1-1 = "R……RABBIT4、準備完了しました。\n本当に……こんな格好でいいのですか……？"
26010-CVGroup_Cafe_Idle1-1 = "素敵な格好の人がいっぱい……。"
26010-CVGroup_Cafe_Idle2-1 = "う、うううぅ……。"
26010-CVGroup_Cafe_Idle3-1 = "水着なのに……\n誰にも気づかれないんです……。"
26010-CVGroup_Cafe_Idle4-1 = "（一体どんなお話をしているのでしょうか……？）"
26010-CVGroup_Cafe_Idle5-1 = "みんな……どこに行ったの……？"
26010-CVGroup_WeaponGet_Idle1-1 = "RABBIT39式小銃……う、受け取りました。\n海辺での狙撃は風も、湿気も強くて……色々と、難しいのですが……\nそれでも、1kmまででしたら……なんとかなりそうです……。"
26010-CVGroup_UIEventLobby_Enter1-1 = "ひぃ……\nホラー小説に出てくる漁村みたい……。"
26010-CVGroup_UIEventLobby_Enter2-1 = "早く学園に戻りたい……"
26010-CVGroup_UIEventLobby_Enter2-2 = "あ、私たちの学園は、もう……。"
26010-CVGroup_UIEventLobby_Enter3-1 = "ここの住民はすごく怖くて……\n調査のために話していると……"
26010-CVGroup_UIEventLobby_Enter3-2 = "に、逃げてしまいたくなるのです……。"
26010-CVGroup_UIEventLobby_Enter4-1 = "さきほど、船長さんから\n温かいコーヒーをいただきました。"
26010-CVGroup_UIEventLobby_Enter4-2 = "思ったより……怖くない人なのかも……。"
26010-CVGroup_UIEventLobby_Enter5-1 = "この村にも、少し愛着が湧いてきました。"
26010-CVGroup_UIEventLobby_Enter5-2 = "……でもやっぱり、私にとっては\n子ウサギ公園が一番落ち着く場所です。"
26010-CVGroup_UIEventLobby_Idle1-1 = "も、も、もしかしてお呼びですか……？"
26010-CVGroup_UIEventLobby_Idle2-1 = "（どうしてこんなへんぴな村まで来てしまったのかな……）"
26010-CVGroup_UIEventLobby_Idle3-1 = "この髪型、ミヤコちゃんが作戦に出る直前に編んでくれたんです。"
26010-CVGroup_UIEventLobby_Idle3-2 = "ふふっ……これ、可愛いかも……。"
26010-CVGroup_UIEventLobby_Idle4-1 = "スズメも、イタチも、カモメも……。"
26010-CVGroup_UIEventLobby_Idle4-2 = "野生の動物たちが私に寄ってくる理由はなんなんでしょう……？"
26010-CVGroup_UIEventShop_Enter1-1 = "あの……きれいな石とか、貝殻を見つけたら、\n私に持ってきてください。"
26010-CVGroup_UIEventShop_Enter2-1 = "あ、先生。\n私と一緒に小石集め……しませんか？"
26010-CVGroup_UIEventShop_Enter3-1 = "そろそろ帰る時間みたいですが……"
26010-CVGroup_UIEventShop_Enter3-2 = "小石集め……\n戻ってもまた、付き合ってくださいね。"
26010-CVGroup_UIEventShop_Idle1-1 = "えっ、あの、その……"
26010-CVGroup_UIEventShop_Idle1-2 = "私が小石ほど存在感が薄いのはわかりますが……。"
26010-CVGroup_UIEventShop_Idle2-1 = "そんなに触っても……\n存在感が強くなることはないと思いますよ……？"
26010-CVGroup_UIEventShop_Buy1-1 = "この小石……本当にきれいですね……！"
26010-CVGroup_UIEventShop_Buy2-1 = "すみません……\nこれくらいしかなくて……。"
26010-CVGroup_UIEventShop_Buy3-1 = "白くて……きらきらしてる……。"
26010-CVGroup_UIEventShop_Buy4-1 = "ささやかですが、これも……\n受け取ってくれますか……？"
