[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
26010-CVGroup_UITitle_Idle1-1 = "B-Blue... A-Archive..." 
26010-CVGroup_CharacterGet_Idle1-1 = "R... RABBIT 4, preparativos concluídos.\nTem certeza... de que está tudo bem eu me vestir assim...?" 
26010-CVGroup_Cafe_Idle1-1 = "Tantas pessoas vestidas tão bem..." 
26010-CVGroup_Cafe_Idle2-1 = "U-Uuuu..." 
26010-CVGroup_Cafe_Idle3-1 = "Mesmo de traje de banho...\nninguém me nota..." 
26010-CVGroup_Cafe_Idle4-1 = "（Que tipo de conversa será que eles estão tendo...?）" 
26010-CVGroup_Cafe_Idle5-1 = "Para onde... todo mundo foi...?" 
26010-CVGroup_WeaponGet_Idle1-1 = "Fuzil RABBIT Tipo-39... r-recebido.\nAtirar perto do mar é difícil por causa da forte brisa e umidade, mas...\nAinda assim, se for até 1km... acho que dou um jeito..." 
26010-CVGroup_UIEventLobby_Enter1-1 = "Hiii...\nParece uma vila de pescadores de um romance de terror..." 
26010-CVGroup_UIEventLobby_Enter2-1 = "Eu quero voltar para a academia logo..." 
26010-CVGroup_UIEventLobby_Enter2-2 = "Ah, é verdade, a nossa academia já..." 
26010-CVGroup_UIEventLobby_Enter3-1 = "Os moradores daqui são muito assustadores...\nEnquanto converso com eles para a investigação..." 
26010-CVGroup_UIEventLobby_Enter3-2 = "E-Eu só sinto vontade de sair correndo..." 
26010-CVGroup_UIEventLobby_Enter4-1 = "Um pouco mais cedo, o capitão do barco\nme deu um café quentinho." 
26010-CVGroup_UIEventLobby_Enter4-2 = "Talvez... ele não seja uma pessoa tão assustadora assim..." 
26010-CVGroup_UIEventLobby_Enter5-1 = "Acabei me apegando um pouco a essa vila também." 
26010-CVGroup_UIEventLobby_Enter5-2 = "......Mas, no fim das contas, para mim,\no Parque dos Coelhinhos continua sendo o lugar mais reconfortante." 
26010-CVGroup_UIEventLobby_Idle1-1 = "P-P-Por acaso você me chamou...?" 
26010-CVGroup_UIEventLobby_Idle2-1 = "（Por que eu vim parar numa vila tão isolada como esta...）" 
26010-CVGroup_UIEventLobby_Idle3-1 = "Foi a Miyako-chan que trançou o meu cabelo logo antes de sairmos para a operação." 
26010-CVGroup_UIEventLobby_Idle3-2 = "Fufu... até que ficou fofinho..." 
26010-CVGroup_UIEventLobby_Idle4-1 = "Pardais, doninhas, gaivotas..." 
26010-CVGroup_UIEventLobby_Idle4-2 = "Por que será que os animais selvagens sempre se aproximam de mim...?" 
26010-CVGroup_UIEventShop_Enter1-1 = "Ahm... se você encontrar alguma pedra bonita ou conchas,\npor favor, traga para mim." 
26010-CVGroup_UIEventShop_Enter2-1 = "Ah, Sensei.\nGostaria de procurar pedrinhas... comigo?" 
26010-CVGroup_UIEventShop_Enter3-1 = "Parece que já está na hora de irmos embora, mas..." 
26010-CVGroup_UIEventShop_Enter3-2 = "A procura por pedrinhas...\nPor favor, me acompanhe de novo quando voltarmos." 
26010-CVGroup_UIEventShop_Idle1-1 = "Eh, ahm, veja bem..." 
26010-CVGroup_UIEventShop_Idle1-2 = "Eu sei que a minha presença é tão fraca quanto uma pedrinha, mas..." 
26010-CVGroup_UIEventShop_Idle2-1 = "Mesmo que você me toque tanto assim...\neu não acho que a minha presença vai ficar mais forte... sabia?" 
26010-CVGroup_UIEventShop_Buy1-1 = "Esta pedrinha... é muito bonita mesmo...!" 
26010-CVGroup_UIEventShop_Buy2-1 = "Me desculpe...\nEu só tenho isso aqui..." 
26010-CVGroup_UIEventShop_Buy3-1 = "É branquinha... e tão brilhante..." 
26010-CVGroup_UIEventShop_Buy4-1 = "É algo muito singelo, mas... você...\nAceitaria isto também...?" 
