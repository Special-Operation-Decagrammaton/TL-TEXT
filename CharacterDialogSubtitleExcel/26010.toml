[translation]
26010-CVGroup_UITitle_Idle1-1 = "Blu…… A, Archive……."
26010-CVGroup_CharacterGet_Idle1-1 = "R……RABBIT4, pronto para a ação.\nSério…… esse visual está mesmo bom……?"
26010-CVGroup_Cafe_Idle1-1 = "Tem tanta gente com visuais incríveis……."
26010-CVGroup_Cafe_Idle2-1 = "U, uuuu……."
26010-CVGroup_Cafe_Idle3-1 = "Mesmo estando de roupa de banho……\nNinguém me nota……."
26010-CVGroup_Cafe_Idle4-1 = "(Sobre o que será que eles estão conversando……?)"
26010-CVGroup_Cafe_Idle5-1 = "Pessoal…… para onde vocês foram……?"
26010-CVGroup_WeaponGet_Idle1-1 = "Rifle RABBIT39…… e, eu recebi.\nAtirar na praia é difícil por causa do vento e da umidade……\nMas, mesmo assim, até 1km…… acho que consigo dar um jeito……."
26010-CVGroup_UIEventLobby_Enter1-1 = "Hii……\nParece uma vila de pescadores de um romance de terror……."
26010-CVGroup_UIEventLobby_Enter2-1 = "Quero voltar logo para a escola……"
26010-CVGroup_UIEventLobby_Enter2-2 = "Ah, nossa escola já……."
26010-CVGroup_UIEventLobby_Enter3-1 = "Os moradores daqui são muito assustadores……\nQuando tento falar com eles para investigar……"
26010-CVGroup_UIEventLobby_Enter3-2 = "D, dá vontade de sair correndo……."
26010-CVGroup_UIEventLobby_Enter4-1 = "Agora pouco, o capitão\nme deu um café quentinho."
26010-CVGroup_UIEventLobby_Enter4-2 = "Talvez ele não seja uma pessoa tão assustadora quanto eu pensava……."
26010-CVGroup_UIEventLobby_Enter5-1 = "Comecei a criar um certo apego por esta vila."
26010-CVGroup_UIEventLobby_Enter5-2 = "……Mas, ainda assim, para mim,\no Parque dos Coelhinhos é o lugar mais tranquilo."
26010-CVGroup_UIEventLobby_Idle1-1 = "V, v, você está me chamando……?"
26010-CVGroup_UIEventLobby_Idle2-1 = "(Por que será que eu vim parar em uma vila tão remota……)"
26010-CVGroup_UIEventLobby_Idle3-1 = "Este penteado, a Miyako-chan fez para mim logo antes de sairmos para a missão."
26010-CVGroup_UIEventLobby_Idle3-2 = "Fufu…… talvez isso seja fofo……."
26010-CVGroup_UIEventLobby_Idle4-1 = "Pardais, doninhas, gaivotas……."
26010-CVGroup_UIEventLobby_Idle4-2 = "Por que será que os animais selvagens se aproximam tanto de mim……?"
26010-CVGroup_UIEventShop_Enter1-1 = "Ei…… se encontrar pedras bonitas ou conchas,\npor favor, traga para mim."
26010-CVGroup_UIEventShop_Enter2-1 = "Ah, Sensei.\nQuer colecionar pedrinhas comigo……?"
26010-CVGroup_UIEventShop_Enter3-1 = "Parece que já está na hora de voltar, mas……"
26010-CVGroup_UIEventShop_Enter3-2 = "Colecionar pedrinhas……\nQuando voltarmos, continue me acompanhando, tá bom?"
26010-CVGroup_UIEventShop_Idle1-1 = "Eh, bem, é que……"
26010-CVGroup_UIEventShop_Idle1-2 = "Eu sei que minha presença é tão discreta quanto uma pedrinha, mas……."
26010-CVGroup_UIEventShop_Idle2-1 = "Mesmo que você me toque tanto assim……\nNão acho que minha presença vá aumentar……?"
26010-CVGroup_UIEventShop_Buy1-1 = "Esta pedrinha…… é realmente linda……!"
26010-CVGroup_UIEventShop_Buy2-1 = "Desculpe……\nÉ só isso que eu tenho……."
26010-CVGroup_UIEventShop_Buy3-1 = "Branca…… e brilhante……."
26010-CVGroup_UIEventShop_Buy4-1 = "É algo simples, mas, isso também……\nVocê aceitaria……?"
