[translation]
26010-CVGroup_UITitle_Idle1-1 = "B-Blue... A-Archive..."
26010-CVGroup_CharacterGet_Idle1-1 = "R... RABBIT4, preparativos concluídos.\nTem certeza... de que eu posso mesmo usar esse tipo de roupa...?"
26010-CVGroup_Cafe_Idle1-1 = "Tem tanta gente vestindo roupas maravilhosas aqui..."
26010-CVGroup_Cafe_Idle2-1 = "U-Uuuuh..."
26010-CVGroup_Cafe_Idle3-1 = "Eu estou de maiô...\ne mesmo assim ninguém consegue notar a minha presença..."
26010-CVGroup_Cafe_Idle4-1 = "(Sobre o que será que eles estão conversando...?)"
26010-CVGroup_Cafe_Idle5-1 = "Para onde... todo mundo foi...?"
26010-CVGroup_WeaponGet_Idle1-1 = "Fuzil RABBIT-39... r-recebido.\nO vento e a umidade são muito fortes para atirar na beira do mar... é bem complicado...\nMas mesmo assim, se o alvo estiver a até 1km de distância... acho que dou um jeito..."
26010-CVGroup_UIEventLobby_Enter1-1 = "Hii...\nParece uma daquelas vilas de pescadores de livros de terror..."
26010-CVGroup_UIEventLobby_Enter2-1 = "Queria voltar logo pra nossa Academia..."
26010-CVGroup_UIEventLobby_Enter2-2 = "Ah, a nossa Academia... não existe mais..."
26010-CVGroup_UIEventLobby_Enter3-1 = "Os moradores daqui dão muito medo...\nQuando eu tento conversar com eles pra investigar..."
26010-CVGroup_UIEventLobby_Enter3-2 = "E-Eu sinto uma vontade imensa de sair correndo..."
26010-CVGroup_UIEventLobby_Enter4-1 = "Agorinha pouco, eu recebi um café quentinho do capitão do barco."
26010-CVGroup_UIEventLobby_Enter4-2 = "Talvez ele... não seja uma pessoa tão assustadora quanto eu pensei..."
26010-CVGroup_UIEventLobby_Enter5-1 = "Acho que acabei criando um pouco de apego a esta vila também."
26010-CVGroup_UIEventLobby_Enter5-2 = "...Mas como eu imaginava, para mim,\no Parque dos Coelhinhos é o lugar onde eu me sinto mais calma."
26010-CVGroup_UIEventLobby_Idle1-1 = "P-P-Por acaso você me chamou...?"
26010-CVGroup_UIEventLobby_Idle2-1 = "(Por que será que eu vim parar numa vila tão remota como essa...?)"
26010-CVGroup_UIEventLobby_Idle3-1 = "Esse penteado no meu cabelo, a Miyako trançou pra mim logo antes da gente sair pra missão."
26010-CVGroup_UIEventLobby_Idle3-2 = "Fufu... acho que ficou bonitinho..."
26010-CVGroup_UIEventLobby_Idle4-1 = "Os pardais, as doninhas, as gaivotas..."
26010-CVGroup_UIEventLobby_Idle4-2 = "Por qual motivo será que os animais selvagens se aproximam tanto de mim...?"
26010-CVGroup_UIEventShop_Enter1-1 = "Uhm... se o senhor encontrar alguma pedra bonita ou conchas,\npor favor, traga para mim."
26010-CVGroup_UIEventShop_Enter2-1 = "Ah, Sensei.\nO senhor quer... catar pedrinhas comigo?"
26010-CVGroup_UIEventShop_Enter3-1 = "Parece que já está quase na hora de ir embora..."
26010-CVGroup_UIEventShop_Enter3-2 = "Catar pedrinhas...\nPor favor, me acompanhe de novo quando voltarmos, tá bom?"
26010-CVGroup_UIEventShop_Idle1-1 = "Eh, uhm, sabe..."
26010-CVGroup_UIEventShop_Idle1-2 = "Eu sei que a minha presença é tão fraca quanto a de uma pedrinha, mas..."
26010-CVGroup_UIEventShop_Idle2-1 = "Acho que mesmo se o senhor me cutucar tanto assim...\na minha presença não vai ficar mais forte, sabia...?"
26010-CVGroup_UIEventShop_Buy1-1 = "Essa pedrinha... é realmente linda...!"
26010-CVGroup_UIEventShop_Buy2-1 = "Me desculpe...\neu só tenho isso para oferecer..."
26010-CVGroup_UIEventShop_Buy3-1 = "É tão branca... e brilhante..."
26010-CVGroup_UIEventShop_Buy4-1 = "É muito simples, mas... o senhor aceitaria isso aqui também...?"