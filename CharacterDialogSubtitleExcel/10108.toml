[translation]
10108-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10108-CVGroup_CharacterGet_Idle1-1 = "こんな時間に呼び出すなんて……\nも、もちろん全然大丈夫ですけど！\n今日の件は、後日ちゃんと埋め合わせしてもらいますから、覚悟しててくださいね？"
10108-CVGroup_Cafe_Idle1-1 = "ちょっと眠い……かも。"
10108-CVGroup_Cafe_Idle2-1 = "どこかに休める場所は……。"
10108-CVGroup_Cafe_Idle3-1 = "暑すぎず寒すぎない場所は……。"
10108-CVGroup_Cafe_Idle4-1 = "（先生と一緒に横になったり、とか……）"
10108-CVGroup_Cafe_Idle5-1 = "リラックスできるお茶って、何があったかな……？"
10108-CVGroup_WeaponGet_Idle1-1 = "ありがとうございます、先生。\nこれで睡眠を邪魔する要素を\n合理的に排除できそうです。"
10108-CVGroup_UIEventLobby_Enter1-1 = "いらっしゃったんですね、先生！"
10108-CVGroup_UIEventLobby_Enter1-2 = "まさか先生が来るとは思いませんでした。"
10108-CVGroup_UIEventLobby_Enter2-1 = "こんにちは、先生。"
10108-CVGroup_UIEventLobby_Enter2-2 = "せっかくだからパジャマパーティーを、\nと思ったんですが……"
10108-CVGroup_UIEventLobby_Enter2-3 = "ちょっと厄介なことになってしまって……。"
10108-CVGroup_UIEventLobby_Enter3-1 = "コ～ユ～キ～！！"
10108-CVGroup_UIEventLobby_Enter3-2 = "今度こそ許さないんだから！"
10108-CVGroup_UIEventLobby_Enter3-3 = "先生も止めないでくださいね！？"
10108-CVGroup_UIEventLobby_Enter4-1 = "なんとか解決できましたね……"
10108-CVGroup_UIEventLobby_Enter4-2 = "今回も先生にはお世話になりました。"
10108-CVGroup_UIEventLobby_Enter4-3 = "コユキ、ですか？"
10108-CVGroup_UIEventLobby_Enter4-4 = "……今回は、大目に見てあげるつもりです。"
10108-CVGroup_UIEventLobby_Enter5-1 = "あ、いらしたんですね。先生。\nよかったら……少し休んでいきませんか？"
10108-CVGroup_UIEventLobby_Idle1-1 = "えっ？\nこういう私も新鮮……？"
10108-CVGroup_UIEventLobby_Idle1-2 = "あ、ありがとうございます。"
10108-CVGroup_UIEventLobby_Idle1-3 = "……先生にそう言われると……"
10108-CVGroup_UIEventLobby_Idle1-4 = "嬉しいですね、すごく。"
10108-CVGroup_UIEventLobby_Idle2-1 = "あらためて私が女子高生だって実感した……？"
10108-CVGroup_UIEventLobby_Idle2-2 = "普段は私のこと、どう思っていたんですか！？"
10108-CVGroup_UIEventLobby_Idle3-1 = "ボードゲームは現実味があって楽しいけど、\n駒の管理が大変ですね。"
10108-CVGroup_UIEventLobby_Idle3-2 = "ミレニアムには、整理整頓が苦手な子、多いんですよね……。"
10108-CVGroup_UIEventLobby_Idle4-1 = "あの、先生？\nお腹周り、つつくの、やめてくれませんか……？"
10108-CVGroup_UIEventLobby_Idle4-2 = "……太ったとか言ったら、本気で怒りますからね。"
10108-CVGroup_UIEventShop_Enter1-1 = "必要なものはありましたか？"
10108-CVGroup_UIEventShop_Enter1-2 = "年末を迎えて備品を整理しているので、\nよかったら持っていってください。"
10108-CVGroup_UIEventShop_Enter2-1 = "パジャマパーティーのために備品を整理してるんです。"
10108-CVGroup_UIEventShop_Enter2-2 = "先生も必要なものがあれば言ってくださいね。"
10108-CVGroup_UIEventShop_Enter3-1 = "こんにちは、先生。"
10108-CVGroup_UIEventShop_Enter3-2 = "やり残したことはないか、\n最後までチェックしていってくださいね！"
10108-CVGroup_UIEventShop_Idle1-1 = "パーティー準備のはずなのに、\nなんだか会計の仕事をしているみたいです……。"
10108-CVGroup_UIEventShop_Idle2-1 = "そういえばシャーレのコンビニも、"
10108-CVGroup_UIEventShop_Idle2-2 = "女の子が１人で売り場管理をしてましたよね……？"
10108-CVGroup_UIEventShop_Idle2-3 = "ほとんど席を外してなかったのですが、\nちゃんと休めてるのでしょうか。"
10108-CVGroup_UIEventShop_Buy1-1 = "それにしますか？"
10108-CVGroup_UIEventShop_Buy2-1 = "合理的な消費ですね。"
10108-CVGroup_UIEventShop_Buy3-1 = "領収証は……あ、こっちで取っておきますね。"
10108-CVGroup_UIEventShop_Buy3-2 = "シャーレの家計簿に書いておきます。"
10108-CVGroup_UIEventShop_Buy4-1 = "ふふっ、先生の消費パターンが分析できそうです。"
