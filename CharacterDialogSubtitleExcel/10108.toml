[translation]
10108-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10108-CVGroup_CharacterGet_Idle1-1 = "Me chamar a essa hora... \nB-bom, claro que não tem problema! \nMas saiba que vou cobrar uma compensação por isso depois, então esteja preparado, viu?"
10108-CVGroup_Cafe_Idle1-1 = "Estou um pouco... com sono."
10108-CVGroup_Cafe_Idle2-1 = "Onde será que tem um lugar para descansar..."
10108-CVGroup_Cafe_Idle3-1 = "Um lugar que não seja nem muito quente, nem muito frio..."
10108-CVGroup_Cafe_Idle4-1 = "(Talvez deitar um pouco com o Sensei...)"
10108-CVGroup_Cafe_Idle5-1 = "Que tipo de chá será que ajuda a relaxar...?"
10108-CVGroup_WeaponGet_Idle1-1 = "Obrigada, Sensei. \nCom isso, poderei eliminar racionalmente \nqualquer coisa que atrapalhe meu sono."
10108-CVGroup_UIEventLobby_Enter1-1 = "Você veio, Sensei!"
10108-CVGroup_UIEventLobby_Enter1-2 = "Não esperava que o Sensei viesse."
10108-CVGroup_UIEventLobby_Enter2-1 = "Olá, Sensei."
10108-CVGroup_UIEventLobby_Enter2-2 = "Eu estava pensando em fazer uma festa do pijama, \nmas..."
10108-CVGroup_UIEventLobby_Enter2-3 = "Acabou acontecendo um problema um tanto incômodo..."
10108-CVGroup_UIEventLobby_Enter3-1 = "KOYUKI!!"
10108-CVGroup_UIEventLobby_Enter3-2 = "Desta vez eu não vou perdoar!"
10108-CVGroup_UIEventLobby_Enter3-3 = "Sensei, não tente me impedir, ouviu!?"
10108-CVGroup_UIEventLobby_Enter4-1 = "Conseguimos resolver de alguma forma..."
10108-CVGroup_UIEventLobby_Enter4-2 = "Mais uma vez, o Sensei me ajudou muito."
10108-CVGroup_UIEventLobby_Enter4-3 = "A Koyuki, você pergunta?"
10108-CVGroup_UIEventLobby_Enter4-4 = "...Desta vez, vou deixar passar."
10108-CVGroup_UIEventLobby_Enter5-1 = "Ah, você chegou, Sensei. \nSe quiser... por que não descansa um pouco?"
10108-CVGroup_UIEventLobby_Idle1-1 = "Hã? \nMe ver assim é algo novo...?"
10108-CVGroup_UIEventLobby_Idle1-2 = "Ah, obrigada."
10108-CVGroup_UIEventLobby_Idle1-3 = "...Quando o Sensei diz isso..."
10108-CVGroup_UIEventLobby_Idle1-4 = "Eu fico muito feliz."
10108-CVGroup_UIEventLobby_Idle2-1 = "Você percebeu que eu sou uma estudante do ensino médio?"
10108-CVGroup_UIEventLobby_Idle2-2 = "O que você pensava de mim normalmente!?"
10108-CVGroup_UIEventLobby_Idle3-1 = "Jogos de tabuleiro são divertidos por serem realistas, \nmas é difícil organizar as peças."
10108-CVGroup_UIEventLobby_Idle3-2 = "Tem muita gente no Millennium que não sabe se organizar..."
10108-CVGroup_UIEventLobby_Idle4-1 = "Ei, Sensei? \nPode parar de cutucar minha barriga...?"
10108-CVGroup_UIEventLobby_Idle4-2 = "...Se disser que eu engordei, eu vou ficar muito brava."
10108-CVGroup_UIEventShop_Enter1-1 = "Encontrou o que precisava?"
10108-CVGroup_UIEventShop_Enter1-2 = "Estou organizando os suprimentos para o fim de ano, \nentão fique à vontade para levar o que quiser."
10108-CVGroup_UIEventShop_Enter2-1 = "Estou organizando os suprimentos para a festa do pijama."
10108-CVGroup_UIEventShop_Enter2-2 = "Sensei, me avise se precisar de alguma coisa."
10108-CVGroup_UIEventShop_Enter3-1 = "Olá, Sensei."
10108-CVGroup_UIEventShop_Enter3-2 = "Verifique tudo até o final para garantir que não esqueceu de nada!"
10108-CVGroup_UIEventShop_Idle1-1 = "Era para ser preparação para uma festa, \nmas parece que estou trabalhando na contabilidade..."
10108-CVGroup_UIEventShop_Idle2-1 = "Falando nisso, a loja de conveniência do Schale também..."
10108-CVGroup_UIEventShop_Idle2-2 = "Era uma garota que cuidava de tudo sozinha, não era...?"
10108-CVGroup_UIEventShop_Idle2-3 = "Ela quase nunca saía do posto, será que ela consegue descansar direito?"
10108-CVGroup_UIEventShop_Buy1-1 = "Vai levar esse?"
10108-CVGroup_UIEventShop_Buy2-1 = "Um consumo racional."
10108-CVGroup_UIEventShop_Buy3-1 = "O recibo... ah, eu guardo aqui."
10108-CVGroup_UIEventShop_Buy3-2 = "Vou anotar no livro de contas do Schale."
10108-CVGroup_UIEventShop_Buy4-1 = "Fufu, acho que já consigo analisar o seu padrão de consumo, Sensei."
