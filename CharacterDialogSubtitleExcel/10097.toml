[translation]
10097-CVGroup_UITitle_Idle1-1 = "Blu~~~ Archive!"
10097-CVGroup_CharacterGet_Idle1-1 = "RABBIT3, chegando no local~\nKuhihi... Se for no mar, não tem problema usar bombas à vontade, né?"
10097-CVGroup_Cafe_Idle1-1 = "Será que não tem nenhuma granada caída por aí..."
10097-CVGroup_Cafe_Idle2-1 = "Ah... que cansaço..."
10097-CVGroup_Cafe_Idle3-1 = "Sinto cheiro de destruição..."
10097-CVGroup_Cafe_Idle4-1 = "Kuhihi. Com o que será que\neste botão está conectado..."
10097-CVGroup_Cafe_Idle5-1 = "A parede corta-fogo do café\né desnecessariamente resistente, né..."
10097-CVGroup_WeaponGet_Idle1-1 = "Pistola RABBIT-224 recebida.\nQuer dizer, eu nem vou entrar na água, por que preciso de proteção à prova d'água?\nQue saco..."
10097-CVGroup_UIEventLobby_Enter1-1 = "Então este é o vilarejo de Yotoura, famoso pelos camarões..."
10097-CVGroup_UIEventLobby_Enter1-2 = "Talvez seja a primeira vez que venho aqui de verdade."
10097-CVGroup_UIEventLobby_Enter2-1 = "O que será que está acontecendo neste vilarejo?"
10097-CVGroup_UIEventLobby_Enter3-1 = "Os \"Profundos\"..."
10097-CVGroup_UIEventLobby_Enter3-2 = "Se aquele boato for verdade, será que eles aguentariam\numa bomba bem grande?"
10097-CVGroup_UIEventLobby_Enter4-1 = "O \"Kusaya\" fica com aquele cheiro\nsó por causa da fermentação?"
10097-CVGroup_UIEventLobby_Enter4-2 = "Talvez eu queira tentar fazer um dia... kuhihi."
10097-CVGroup_UIEventLobby_Enter5-1 = "Fufu. Com isso, finalmente"
10097-CVGroup_UIEventLobby_Enter5-2 = "vou poder comer um delicioso sanduíche de camarão com manjericão, né?"
10097-CVGroup_UIEventLobby_Idle1-1 = "Será por causa da neblina...?"
10097-CVGroup_UIEventLobby_Idle1-2 = "Mesmo sendo verão, está um pouco frio..."
10097-CVGroup_UIEventLobby_Idle2-1 = "Hmm.\nRealmente, sinto como se houvesse um cheiro de destruição em algum lugar..."
10097-CVGroup_UIEventLobby_Idle3-1 = "Embora seja uma operação da SRT,"
10097-CVGroup_UIEventLobby_Idle3-2 = "o mar no verão é diferente do habitual, então serve como uma mudança de ares."
10097-CVGroup_UIEventLobby_Idle4-1 = "Esta boia é suspeita?"
10097-CVGroup_UIEventLobby_Idle4-2 = "Bem, com certeza ela não é para uso comum. Kuhihi..."
