[translation]
10097-CVGroup_UITitle_Idle1-1 = "ブル～～～アーカイブ！"
10097-CVGroup_CharacterGet_Idle1-1 = "RABBIT3、現場に到着～\nくひひ……海の上なら、思いっきり爆弾を使っても問題ないよね？"
10097-CVGroup_Cafe_Idle1-1 = "どこかに手榴弾落ちてないかな……。"
10097-CVGroup_Cafe_Idle2-1 = "はぁ……疲れた……。"
10097-CVGroup_Cafe_Idle3-1 = "破滅の匂いが……。"
10097-CVGroup_Cafe_Idle4-1 = "くひひ。このボタン、\n何と繋がってるんだろう……。"
10097-CVGroup_Cafe_Idle5-1 = "カフェの防火壁、\n無駄に硬いんだよね……。"
10097-CVGroup_WeaponGet_Idle1-1 = "RABBIT-224式拳銃、受領したよ。\nていうか、私は水に入らないのに、防水対策しなきゃダメなの？\nめんど……。"
10097-CVGroup_UIEventLobby_Enter1-1 = "ここがエビで有名な夜戸浦村……"
10097-CVGroup_UIEventLobby_Enter1-2 = "実際に来てみたのは、初めてかも。"
10097-CVGroup_UIEventLobby_Enter2-1 = "一体、この村で何が起きてるの？"
10097-CVGroup_UIEventLobby_Enter3-1 = "「深きもの」……"
10097-CVGroup_UIEventLobby_Enter3-2 = "あの噂が本当なら、すっごい大きな爆弾にも\n耐えられるのかな？"
10097-CVGroup_UIEventLobby_Enter4-1 = "「くさや」って発酵させるだけで、\nあんなニオイになるの？"
10097-CVGroup_UIEventLobby_Enter4-2 = "一度、作ってみたいかも……くひひ。"
10097-CVGroup_UIEventLobby_Enter5-1 = "ふふ。これでやっと、"
10097-CVGroup_UIEventLobby_Enter5-2 = "おいしいバジルシュリンプのサンドイッチが\n食べられるんだよね？"
10097-CVGroup_UIEventLobby_Idle1-1 = "霧のせいかな……？"
10097-CVGroup_UIEventLobby_Idle1-2 = "夏なのにちょっと寒い……。"
10097-CVGroup_UIEventLobby_Idle2-1 = "うーん。\nたしかに、どこか破滅の匂いがするような……。"
10097-CVGroup_UIEventLobby_Idle3-1 = "SRTの作戦とはいえ、"
10097-CVGroup_UIEventLobby_Idle3-2 = "夏の海っていつもと違うから気分転換になるね。"
10097-CVGroup_UIEventLobby_Idle4-1 = "この浮き輪が怪しい？"
10097-CVGroup_UIEventLobby_Idle4-2 = "まぁ、普段用じゃないことは間違いないね。くひひ……。"
