[translation]
10097-CVGroup_UITitle_Idle1-1 = "Blue~~~ Archive!"
10097-CVGroup_CharacterGet_Idle1-1 = "RABBIT3, chegando ao local~\nKuhihi... Já que estamos no meio do mar, não tem problema se eu usar o quanto de bombas eu quiser, né?"
10097-CVGroup_Cafe_Idle1-1 = "Será que não tem nenhuma granada de mão caída por aqui...?"
10097-CVGroup_Cafe_Idle2-1 = "Haa... Que cansaço..."
10097-CVGroup_Cafe_Idle3-1 = "Sinto um cheiro de ruína no ar..."
10097-CVGroup_Cafe_Idle4-1 = "Kuhihi. Eu me pergunto em que será que\nesse botão aqui está conectado..."
10097-CVGroup_Cafe_Idle5-1 = "As paredes corta-fogo deste Café\nsão resistentes até demais, sabia..."
10097-CVGroup_WeaponGet_Idle1-1 = "Pistola RABBIT-224, recebida.\nMas vem cá, eu nem vou entrar na água, por que eu sou obrigada a impermeabilizar o equipamento?\nQue saco..."
10097-CVGroup_UIEventLobby_Enter1-1 = "Então esta é a Vila Yotoura, famosa pelos seus camarões..."
10097-CVGroup_UIEventLobby_Enter1-2 = "Acho que é a primeira vez que venho aqui pessoalmente."
10097-CVGroup_UIEventLobby_Enter2-1 = "O que diabos está acontecendo nessa vila?"
10097-CVGroup_UIEventLobby_Enter3-1 = "Os 'Profundos'..."
10097-CVGroup_UIEventLobby_Enter3-2 = "Se esses boatos forem mesmo verdade, será que eles\nconseguem resistir a uma bomba gigante?"
10097-CVGroup_UIEventLobby_Enter4-1 = "Então quer dizer que o 'Kusaya' fica com aquele cheiro\nhorrível só pelo processo de fermentação?"
10097-CVGroup_UIEventLobby_Enter4-2 = "Acho que me deu vontade de tentar fabricar um... kuhihi."
10097-CVGroup_UIEventLobby_Enter5-1 = "Fufu. Com isso, finalmente,"
10097-CVGroup_UIEventLobby_Enter5-2 = "Nós vamos poder comer um delicioso\nsanduíche de camarão com manjericão, não é?"
10097-CVGroup_UIEventLobby_Idle1-1 = "Será que é por causa da neblina...?"
10097-CVGroup_UIEventLobby_Idle1-2 = "Mesmo sendo verão, está fazendo um pouco de frio..."
10097-CVGroup_UIEventLobby_Idle2-1 = "Hmm.\nRealmente, tem um cheirinho de ruína vindo de algum lugar..."
10097-CVGroup_UIEventLobby_Idle3-1 = "Apesar de estarmos no meio de uma operação da SRT,"
10097-CVGroup_UIEventLobby_Idle3-2 = "O mar no verão tem um clima diferente do habitual, então é bom para mudar de ares."
10097-CVGroup_UIEventLobby_Idle4-1 = "Você achou essa boia suspeita?"
10097-CVGroup_UIEventLobby_Idle4-2 = "Bom, não há dúvidas de que ela não é para uso recreativo comum. Kuhihi..."