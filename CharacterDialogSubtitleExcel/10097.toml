10097-CVGroup_UITitle_Idle1-1 = "Blue~~~ Archive!" 
10097-CVGroup_CharacterGet_Idle1-1 = "RABBIT 3, chegando no local~\nKuhihi... Já que estamos no mar, eu posso usar e abusar dos explosivos sem problemas, né?" 
10097-CVGroup_Cafe_Idle1-1 = "Será que não tem nenhuma granada dando sopa por aí..." 
10097-CVGroup_Cafe_Idle2-1 = "Haa... Que cansaço..." 
10097-CVGroup_Cafe_Idle3-1 = "Tô sentindo o cheiro da ruína..." 
10097-CVGroup_Cafe_Idle4-1 = "Kuhihi. Com o que será que\nesse botão tá conectado..." 
10097-CVGroup_Cafe_Idle5-1 = "A parede corta-fogo desse café\né desnecessariamente dura, sabia..." 
10097-CVGroup_WeaponGet_Idle1-1 = "Pistola RABBIT Tipo-224, recebida com sucesso.\nFalando nisso, se eu nem vou entrar na água, por que preciso fazer a impermeabilização?\nQue saco..." 
10097-CVGroup_UIEventLobby_Enter1-1 = "Então essa é a Vila Yadoura, famosa pelos camarões..." 
10097-CVGroup_UIEventLobby_Enter1-2 = "Acho que é a minha primeira vez vindo aqui de verdade." 
10097-CVGroup_UIEventLobby_Enter2-1 = "O que diabos tá rolando nessa vila?" 
10097-CVGroup_UIEventLobby_Enter3-1 = "'Os Profundos'..." 
10097-CVGroup_UIEventLobby_Enter3-2 = "Se esses boatos forem reais, será que eles\nconseguiriam tankar uma bomba gigante?" 
10097-CVGroup_UIEventLobby_Enter4-1 = "Dá mesmo pra chegar naquele cheiro absurdo\ndo Kusaya só fermentando o peixe?" 
10097-CVGroup_UIEventLobby_Enter4-2 = "Acho que me deu vontade de preparar um...\nKuhihi." 
10097-CVGroup_UIEventLobby_Enter5-1 = "Fufu. Com isso, finalmente..." 
10097-CVGroup_UIEventLobby_Enter5-2 = "Vamos poder comer aquele delicioso sanduíche\nde camarão com manjericão, né?" 
10097-CVGroup_UIEventLobby_Idle1-1 = "Será que é por causa dessa neblina...?" 
10097-CVGroup_UIEventLobby_Idle1-2 = "Tá meio frio pra quem tá no meio do verão..." 
10097-CVGroup_UIEventLobby_Idle2-1 = "Hmm.\nRealmente, tem um cheirinho de ruína e caos no ar..." 
10097-CVGroup_UIEventLobby_Idle3-1 = "Pode ser uma operação da SRT, mas..." 
10097-CVGroup_UIEventLobby_Idle3-2 = "O mar no verão sempre tem uma vibe diferente, então serve pra dar uma espairecida." 
10097-CVGroup_UIEventLobby_Idle4-1 = "Achou essa boia de natação suspeita?" 
10097-CVGroup_UIEventLobby_Idle4-2 = "Bom, não dá pra negar que ela não é pro uso convencional. Kuhihi..." 