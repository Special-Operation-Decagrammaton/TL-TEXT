[translation]
10079-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10079-CVGroup_CharacterGet_Idle1-1 = "Segunda série da Tokiwadai, Misaka Mikoto.\nSe precisar da minha ajuda, é só falar."
10079-CVGroup_Cafe_Idle1-1 = "Então este é o café do Schale..."
10079-CVGroup_Cafe_Idle2-1 = "Q-que foi?\nAquilo é...!?"
10079-CVGroup_Cafe_Idle3-1 = "Tem um monte de coisas estranhas aqui, né."
10079-CVGroup_Cafe_Idle4-1 = "I-isso aqui até que é bem fofinho..."
10079-CVGroup_Cafe_Idle5-1 = "Hm? Alguém me chamou?"
10079-CVGroup_WeaponGet_Idle1-1 = "Para ser sincera, é um pouco incomum, por assim dizer...\nEu não costumo andar por aí com algo assim.\nObrigada por ter preparado isso especialmente para mim...\nVou fazer o meu melhor para corresponder às expectativas."
10079-CVGroup_UIEventLobby_Enter1-1 = "Será que já podemos começar?"
10079-CVGroup_UIEventLobby_Enter2-1 = "Eu estou pronta.\nE você, Sensei?"
10079-CVGroup_UIEventLobby_Enter3-1 = "Progredimos bastante, hein."
10079-CVGroup_UIEventLobby_Enter4-1 = "Já está quase tudo terminado, não é?"
10079-CVGroup_UIEventLobby_Enter5-1 = "Dê uma conferida mais uma vez, só por precaução."
10079-CVGroup_UIEventLobby_Idle1-1 = "...Hm, chamou?"
10079-CVGroup_UIEventLobby_Idle2-1 = "Ah, era só brincadeira?"
10079-CVGroup_UIEventLobby_Idle3-1 = "Não tem mais nada que você precise fazer?"
10079-CVGroup_UIEventLobby_Idle4-1 = "Ah... tá bom, tá bom.\nQuer que eu ajude em algo?"
10079-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Nos encontramos de novo, Sensei.\nVai girar um pouco?"
10079-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Não parece estar bom?\nTalvez você tire algo legal agora."
10079-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Ei, se ainda restam itens,\npor que não gira tudo antes que seja tarde?"
10079-CVGroup_UIEventBoxGachaShop_Enter3-2 = "É um desperdício."
10079-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Não é em mim que você tem que apertar!"
10079-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Ahahaha!\nQ-que isso!? Faz cócegas!!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Ora, você tirou o prêmio principal! Parabéns!"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Isso não é bem raro?"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Isso não é algo bem legal?"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Acho que por aqui terminamos.\nBom trabalho, Sensei!"
