[translation]
10079-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10079-CVGroup_CharacterGet_Idle1-1 = "常盤台中学2年、御坂美琴。\n私の手伝いが必要なら言ってちょうだい。"
10079-CVGroup_Cafe_Idle1-1 = "ここがシャーレのカフェ……。"
10079-CVGroup_Cafe_Idle2-1 = "な、なんなの。\nあれ……！？"
10079-CVGroup_Cafe_Idle3-1 = "ヘンな物がたくさんあるわね。"
10079-CVGroup_Cafe_Idle4-1 = "こ、これは結構かわいいかも……。"
10079-CVGroup_Cafe_Idle5-1 = "ん？誰かに呼ばれてる？"
10079-CVGroup_WeaponGet_Idle1-1 = "正直言って、ちょっと珍しいというか……。\n普段はこういうの、持ち歩いてないからさ。\nわざわざ用意してもらっちゃって……ありがと。\n期待に応えられるよう、ちゃんとやるわね。"
10079-CVGroup_UIEventLobby_Enter1-1 = "そろそろ始めようかしら。"
10079-CVGroup_UIEventLobby_Enter2-1 = "私は準備オッケー。\n先生は？"
10079-CVGroup_UIEventLobby_Enter3-1 = "かなり進んだわね。"
10079-CVGroup_UIEventLobby_Enter4-1 = "もうほとんど終わった感じよね？"
10079-CVGroup_UIEventLobby_Enter5-1 = "一応、もっかい確認してみて。"
10079-CVGroup_UIEventLobby_Idle1-1 = "……ん、なんか呼んだ？"
10079-CVGroup_UIEventLobby_Idle2-1 = "なんだ、冷やかしか。"
10079-CVGroup_UIEventLobby_Idle3-1 = "他にやんなきゃいけない事、\nあるんじゃないの？"
10079-CVGroup_UIEventLobby_Idle4-1 = "はあ……わかった、わかった。\n何か手伝おうか？"
10079-CVGroup_UIEventBoxGachaShop_Enter1-1 = "また会ったわね、先生。\nちょっと回していく？"
10079-CVGroup_UIEventBoxGachaShop_Enter2-1 = "いい感じじゃない？\n今ならいいの出るかもね。"
10079-CVGroup_UIEventBoxGachaShop_Enter3-1 = "ほら、まだ残ってるなら\n手遅れになる前に全部回したら？"
10079-CVGroup_UIEventBoxGachaShop_Enter3-2 = "もったいないわよ。"
10079-CVGroup_UIEventBoxGachaShop_Idle1-1 = "私じゃなくてあっち押しなさいよ！"
10079-CVGroup_UIEventBoxGachaShop_Idle2-1 = "あははは！\nな、なに！？くすぐったい！！"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "あら、当たりじゃない！おめでと！"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "これ、結構レアなんじゃない？"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "そこそこいいものなんじゃない？"
10079-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "これで大体終了かな。\nお疲れ様、先生！"
