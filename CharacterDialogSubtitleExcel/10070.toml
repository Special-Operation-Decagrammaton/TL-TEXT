[translation]
10070-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10070-CVGroup_CharacterGet_Idle1-1 = "Sou da Escola Superior Shanhaijing, Chefe Executiva da Genryumon, Konoe Mina.\nQualquer um que bloqueie nosso caminho, eu mesma cuidarei!"
10070-CVGroup_Cafe_Idle1-1 = "Um navio perdido precisa de um farol para se guiar.\nPor isso, Sensei... é que... ah, esqueça o que eu disse!"
10070-CVGroup_Cafe_Idle2-1 = "Que aroma de chá agradável...\nAinda não estou muito acostumada, mas é algo bom."
10070-CVGroup_Cafe_Idle3-1 = "Um lugar onde se sente o movimento dentro da quietude...\nDeve ser exatamente aqui."
10070-CVGroup_Cafe_Idle4-1 = "O café de Shanhaijing, na verdade, é mais parecido com uma casa de chá..."
10070-CVGroup_Cafe_Idle5-1 = "Que aroma bom...\nTalvez eu deva relaxar um pouco os ombros."
10070-CVGroup_WeaponGet_Idle1-1 = "Incrível... não é perfeito?\nÉ como se fosse meu desde o início...\nHum, estou pronta. Vamos nessa."
10070-CVGroup_UIEventLobby_Enter1-1 = "Sensei. Bem-vindo a Shanhaijing."
10070-CVGroup_UIEventLobby_Enter1-2 = "Ah, aliás...\nNão recomendo ir à Associação Genbu."
10070-CVGroup_UIEventLobby_Enter2-1 = "Aqui é Shanhaijing."
10070-CVGroup_UIEventLobby_Enter2-2 = "Hum. Não fique olhando para os lados,\nseria um problema se você se perdesse."
10070-CVGroup_UIEventLobby_Enter3-1 = "Deve ser obra do pessoal da Associação Genbu."
10070-CVGroup_UIEventLobby_Enter3-2 = "Não preciso nem investigar para saber disso."
10070-CVGroup_UIEventLobby_Enter4-1 = "Como, exatamente, as coisas chegaram a esse ponto..."
10070-CVGroup_UIEventLobby_Enter4-2 = "Droga...\nNão sou boa com coisas complicadas...!"
10070-CVGroup_UIEventLobby_Enter5-1 = "Eu nem imaginava que terminaria assim..."
10070-CVGroup_UIEventLobby_Enter5-2 = "Bem, pelo menos terminou tudo bem, suponho."
10070-CVGroup_UIEventLobby_Idle1-1 = "Hm? Tem algo que queira me dizer?\n— Então, esquece."
10070-CVGroup_UIEventLobby_Idle1-2 = "Às vezes... as pessoas só sentem vontade de chamar o nome de alguém."
10070-CVGroup_UIEventLobby_Idle2-1 = "Aconteceu alguma coisa?"
10070-CVGroup_UIEventLobby_Idle2-2 = "Ainda temos coisas a fazer, não temos?"
10070-CVGroup_UIEventLobby_Idle2-3 = "Mesmo que isso seja chamado de \"mal\"... é o que faremos."
10070-CVGroup_UIEventLobby_Idle2-4 = "— Ei, essa frase não soou legal agora?"
10070-CVGroup_UIEventLobby_Idle3-1 = "Shanhaijing está mais barulhenta do que o normal."
10070-CVGroup_UIEventLobby_Idle3-2 = "Será que é porque o Sensei está aqui...?"
10070-CVGroup_UIEventLobby_Idle4-1 = "Quando um incidente ocorre, nós do Departamento Executivo somos os primeiros a agir."
10070-CVGroup_UIEventLobby_Idle4-2 = "É isso, vamos lá."
10070-CVGroup_UIEventMission_Enter1-1 = "Objetivo, tarefa, missão, dever —\ntudo significa a mesma coisa."
10070-CVGroup_UIEventMission_Enter1-2 = "Não se preocupe, é só fazer uma por uma."
10070-CVGroup_UIEventMission_Enter2-1 = "Quando houver várias missões, comece pelas mais fáceis.\nÉ muito mais tranquilo assim."
10070-CVGroup_UIEventMission_Idle1-1 = "Se achar as tarefas diárias difíceis, me avise imediatamente."
10070-CVGroup_UIEventMission_Idle1-2 = "Sempre estarei do lado do Sensei."
10070-CVGroup_UIEventMission_Idle2-1 = "Isso deveria ser difícil até para o pessoal da Genryumon...\nSinceramente, estou surpresa, Sensei."
10070-CVGroup_UIEventMission_Buy1-1 = "Concluir isso... como esperado do Sensei.\nEu não estava enganada sobre você."
10070-CVGroup_UIEventMission_Buy2-1 = "Você tem feito um ótimo trabalho até nas missões difíceis."
10070-CVGroup_UIEventMission_Buy2-2 = "M-mas...!\nIsso é normal para a Genryumon!"
10070-CVGroup_UIEventMission_Interaction1-1 = "Parece que o trabalho de hoje acabou.\nConto com você amanhã também, Sensei."
