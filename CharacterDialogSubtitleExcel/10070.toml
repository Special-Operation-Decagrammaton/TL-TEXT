[translation]
10070-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
10070-CVGroup_CharacterGet_Idle1-1 = "山海経高級中学校所属、玄龍門の執行部長、近衛ミナだ。\n我々の行く手を阻むものは、全て私が処理しよう！"
10070-CVGroup_Cafe_Idle1-1 = "迷う船には、拠り所となる灯台が必要だ。\nだから、先生が……その……や、やっぱり聞かなかったことにしてくれ！"
10070-CVGroup_Cafe_Idle2-1 = "かぐわしい茶の香りだ……\nまだあまり得意ではないが、いいものだな。"
10070-CVGroup_Cafe_Idle3-1 = "静中の動を感じる場所とは……\nまさにここを指すのだろうな。"
10070-CVGroup_Cafe_Idle4-1 = "山海経のカフェは、実際は茶屋に近いんだよな……。"
10070-CVGroup_Cafe_Idle5-1 = "良い香りだ……\n少し、肩の力を抜こうかな。"
10070-CVGroup_WeaponGet_Idle1-1 = "素晴らしい……ピッタリじゃないか、\nまるで最初から私の物であったかのようだ……\nフッ、準備はできた。さあ、行こうじゃないか。"
10070-CVGroup_UIEventLobby_Enter1-1 = "先生か。ようこそ山海経へ。"
10070-CVGroup_UIEventLobby_Enter1-2 = "ああ、ちなみに……\n玄武商会に行くのはオススメしないぞ。"
10070-CVGroup_UIEventLobby_Enter2-1 = "ここが山海経だ。"
10070-CVGroup_UIEventLobby_Enter2-2 = "ふっ。あまりキョロキョロするな、\n迷子になられても困る。"
10070-CVGroup_UIEventLobby_Enter3-1 = "玄武商会の奴らの仕業だろう。"
10070-CVGroup_UIEventLobby_Enter3-2 = "この程度、調べなくとも分かる。"
10070-CVGroup_UIEventLobby_Enter4-1 = "いったい、どうしてこうなったんだ……"
10070-CVGroup_UIEventLobby_Enter4-2 = "くっ……\n小難しいことは苦手だ……！"
10070-CVGroup_UIEventLobby_Enter5-1 = "こんな終わり方、想像すらしていなかった……。"
10070-CVGroup_UIEventLobby_Enter5-2 = "まあ、無事に終わって良かったといえばそうだが。"
10070-CVGroup_UIEventLobby_Idle1-1 = "ん？何か話したいことでもあるのか？\n――なら、いい。"
10070-CVGroup_UIEventLobby_Idle1-2 = "人には……ただ名前を呼びたくなる日もあるものだからな。"
10070-CVGroup_UIEventLobby_Idle2-1 = "どうかしたのか？"
10070-CVGroup_UIEventLobby_Idle2-2 = "我々には、まだやるべきことが残ってるだろう。"
10070-CVGroup_UIEventLobby_Idle2-3 = "たとえそれが、「悪」と呼ばれるものだとしても……な。"
10070-CVGroup_UIEventLobby_Idle2-4 = "――ちょっと今の台詞、格好良くなかったか？"
10070-CVGroup_UIEventLobby_Idle3-1 = "いつにも増して山海経が騒がしいな。"
10070-CVGroup_UIEventLobby_Idle3-2 = "これも、先生がいるからなのか……？"
10070-CVGroup_UIEventLobby_Idle4-1 = "事件が起きたらまず最初に動くのが、我々執行部だ。"
10070-CVGroup_UIEventLobby_Idle4-2 = "そういうことだ、行くぞ。"
10070-CVGroup_UIEventMission_Enter1-1 = "目的、課題、任務、ミッション――\nすべて同じ意味の言葉だ。"
10070-CVGroup_UIEventMission_Enter1-2 = "心配するな、一つずつこなしていけばいい。"
10070-CVGroup_UIEventMission_Enter2-1 = "複数の任務がある時は、まず簡単なものから片付ける。\nその方が色々とスムーズだぞ。"
10070-CVGroup_UIEventMission_Idle1-1 = "日課が難しいと感じたら、すぐに言ってくれ。"
10070-CVGroup_UIEventMission_Idle1-2 = "いつでも先生の味方になるぞ。"
10070-CVGroup_UIEventMission_Idle2-1 = "これは、玄龍門の者でも難しい内容のはずだが……\n正直驚いたぞ、先生。"
10070-CVGroup_UIEventMission_Buy1-1 = "それをこなすとは、流石、先生だ。\n私の目に狂いは無かったな。"
10070-CVGroup_UIEventMission_Buy2-1 = "難しい任務もよくやってくれている。"
10070-CVGroup_UIEventMission_Buy2-2 = "だ、だが……！\nこの程度、玄龍門では普通のことだ！"
10070-CVGroup_UIEventMission_Interaction1-1 = "今日の仕事はこれで全部みたいだな。\n明日もよろしく頼む、先生。"
