[translation]
10051-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10051-CVGroup_CharacterGet_Idle1-1 = "Líder de torcida do Millennium, Shiraishi Utaha.\nCom razão fria e paixão ardente, vamos torcer por todos."
10051-CVGroup_Cafe_Idle1-1 = "Este é um espaço cheio de paixão."
10051-CVGroup_Cafe_Idle2-1 = "Se eu começar a torcer aqui, até onde minha voz chegará?"
10051-CVGroup_Cafe_Idle3-1 = "Eu adoraria fazer uma ginástica coletiva com todos aqui..."
10051-CVGroup_Cafe_Idle4-1 = "(Hehe, acabei de pensar em um plano de torcida interessante.)"
10051-CVGroup_Cafe_Idle5-1 = "O que será... parece que falta um pouco de energia."
10051-CVGroup_WeaponGet_Idle1-1 = "O aroma da paixão é o combustível que aguça a inspiração de um mestre."
10051-CVGroup_UIEventLobby_Enter1-1 = "Vamos lá, vamos unir forças para tornar este o melhor Festival Esportivo!"
10051-CVGroup_UIEventLobby_Enter2-1 = "Que interessante..."
10051-CVGroup_UIEventLobby_Enter2-2 = "Afinal, a honra do Millennium está em jogo."
10051-CVGroup_UIEventLobby_Enter2-3 = "É natural que nós, do Departamento de Engenharia, ajudemos."
10051-CVGroup_UIEventLobby_Enter3-1 = "Hum, os preparativos para o Festival Esportivo estão avançando firmemente."
10051-CVGroup_UIEventLobby_Enter4-1 = "Falta pouco para o início do Festival Esportivo."
10051-CVGroup_UIEventLobby_Enter4-2 = "Não consigo conter a empolgação desde já."
10051-CVGroup_UIEventLobby_Enter5-1 = "Bom trabalho, Sensei.\nEstarei esperando na arquibancada."
10051-CVGroup_UIEventLobby_Idle1-1 = "Ainda não estou acostumada a torcer, mas..."
10051-CVGroup_UIEventLobby_Idle1-2 = "Não tem jeito, vou dar o meu melhor."
10051-CVGroup_UIEventLobby_Idle1-3 = "Um pedido que aceitei, vou levar até o fim."
10051-CVGroup_UIEventLobby_Idle1-4 = "Esse é o lema do nosso Departamento de Engenharia!"
10051-CVGroup_UIEventLobby_Idle2-1 = "Falando nisso, a contadora responsável do Seminar...\nNão a vejo por aqui."
10051-CVGroup_UIEventLobby_Idle2-2 = "Espero que ela não esteja se sentindo mal."
10051-CVGroup_UIEventLobby_Idle3-1 = "(Espero que todos possam aproveitar o festival com tranquilidade...)"
10051-CVGroup_UIEventLobby_Idle4-1 = "Embora a gente não se exercite muito no dia a dia,"
10051-CVGroup_UIEventLobby_Idle4-2 = "eu não esperava que a resistência da Kotori e da Hibiki estivesse tão baixa..."
10051-CVGroup_UIEventLobby_Idle4-3 = "Quando o festival acabar, acho que vou criar um robô"
10051-CVGroup_UIEventLobby_Idle4-4 = "de suporte físico e deixá-lo na sala do Departamento de Engenharia."
