[translation]
10051-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10051-CVGroup_CharacterGet_Idle1-1 = "ミレニアムの応援団長、白石ウタハ。\n冷たい理性と熱い情熱で、皆を応援するとしよう。"
10051-CVGroup_Cafe_Idle1-1 = "情熱でいっぱいの空間だね。"
10051-CVGroup_Cafe_Idle2-1 = "ここで応援を始めたら、どこまで声が届くかな。"
10051-CVGroup_Cafe_Idle3-1 = "ここで皆と一緒に、マスゲームをしてみたい……。"
10051-CVGroup_Cafe_Idle4-1 = "（ふふ、面白い応援計画を思いついたよ）"
10051-CVGroup_Cafe_Idle5-1 = "なんだろう……気合いが足りないような。"
10051-CVGroup_WeaponGet_Idle1-1 = "情熱の香りこそ、\nマイスターのインスピレーションを研ぎ澄ませる動力さ。"
10051-CVGroup_UIEventLobby_Enter1-1 = "さあ、皆で最高の「晄輪大祭」にするために、力を合わせよう！"
10051-CVGroup_UIEventLobby_Enter2-1 = "なんて面白そうな……"
10051-CVGroup_UIEventLobby_Enter2-2 = "ミレニアムの名誉がかかっているからね。"
10051-CVGroup_UIEventLobby_Enter2-3 = "私たちエンジニア部が手伝うのは当然の事だよ。"
10051-CVGroup_UIEventLobby_Enter3-1 = "うむ、「晄輪大祭」の準備は着実に進んでいるね。"
10051-CVGroup_UIEventLobby_Enter4-1 = "「晄輪大祭」の開催まであと少し。"
10051-CVGroup_UIEventLobby_Enter4-2 = "今から興奮が収まらないよ。"
10051-CVGroup_UIEventLobby_Enter5-1 = "お疲れ様、先生。\n先に応援席で待ってるね。"
10051-CVGroup_UIEventLobby_Idle1-1 = "応援はまだ慣れてないけど……"
10051-CVGroup_UIEventLobby_Idle1-2 = "仕方ない、精一杯頑張るよ。"
10051-CVGroup_UIEventLobby_Idle1-3 = "一度引き受けた依頼は、最後まで成し遂げる。"
10051-CVGroup_UIEventLobby_Idle1-4 = "それが私たちエンジニア部のモットーだからね！"
10051-CVGroup_UIEventLobby_Idle2-1 = "そういえば、セミナーのしっかり者の会計……\n彼女の姿が見えないね。"
10051-CVGroup_UIEventLobby_Idle2-2 = "体調を崩してないと良いけれど。"
10051-CVGroup_UIEventLobby_Idle3-1 = "（皆が穏やかに、祭りを楽しめるといいな……)"
10051-CVGroup_UIEventLobby_Idle4-1 = "普段動くことが少ないとは言え、"
10051-CVGroup_UIEventLobby_Idle4-2 = "コトリとヒビキの体力がここまで落ちていたとは……"
10051-CVGroup_UIEventLobby_Idle4-3 = "祭りが終わったら、エンジニア部の部室に"
10051-CVGroup_UIEventLobby_Idle4-4 = "体づくりサポートのロボットでも作って置いておこうかな。"
