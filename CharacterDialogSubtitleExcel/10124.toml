[translation]
10124-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10124-CVGroup_CharacterGet_Idle1-1 = "Trinity Integral, Comitê de Realização da Justiça... \nNão. Saudações formais não combinam com um lugar como este. \nSou Hasumi Hanekawa. Mais uma vez, é um prazer conhecê-lo."
10124-CVGroup_Cafe_Idle1-1 = "Este traje... realmente chama muita atenção."
10124-CVGroup_Cafe_Idle2-1 = "Desta vez, no verão, eu preciso fazer dieta... \nEmbora existam muitas tentações por aqui..."
10124-CVGroup_Cafe_Idle3-1 = "Um descanso adequado aumenta a eficiência do trabalho. \nEu sei disso na teoria, mas..."
10124-CVGroup_Cafe_Idle4-1 = "Por que será que tudo o que comemos na praia parece tão delicioso?"
10124-CVGroup_Cafe_Idle5-1 = "Da próxima vez que eu vier, devo convidar o pessoal do comitê também?"
10124-CVGroup_WeaponGet_Idle1-1 = "Desde que entrei para o Comitê de Realização da Justiça, o que desejo proteger nunca mudou. \nMas... com o tempo, o número de coisas que quero proteger só aumenta. \nJuro por esta arma: \nEnquanto eu estiver viva, não permitirei que ninguém cause mal ao Sensei."
10124-CVGroup_UIEventLobby_Enter1-1 = "Eu nunca imaginei que conseguiria vir à praia."
10124-CVGroup_UIEventLobby_Enter1-2 = "Hã? Parece divertido?"
10124-CVGroup_UIEventLobby_Enter1-3 = "Fufu, deixarei que você imagine."
10124-CVGroup_UIEventLobby_Enter2-1 = "Quando o lugar muda, o sentimento em relação à missão também muda, não é?"
10124-CVGroup_UIEventLobby_Enter2-2 = "Estou um pouco ansiosa pelo que virá a seguir."
10124-CVGroup_UIEventLobby_Enter3-1 = "Ah, Sensei. Você viu a Mika-sama ou a Ichika por aí?"
10124-CVGroup_UIEventLobby_Enter3-2 = "Não as vejo há algum tempo."
10124-CVGroup_UIEventLobby_Enter3-3 = "Espero que não tenham se metido em problemas..."
10124-CVGroup_UIEventLobby_Enter3-4 = "Não preciso me preocupar...?"
10124-CVGroup_UIEventLobby_Enter3-5 = "Se você diz, Sensei, eu acredito..."
10124-CVGroup_UIEventLobby_Enter4-1 = "Quem diria que houve toda aquela confusão nos bastidores."
10124-CVGroup_UIEventLobby_Enter4-2 = "Sinto vergonha por não ter percebido."
10124-CVGroup_UIEventLobby_Enter4-3 = "Se eu consegui me divertir, então está tudo bem...?"
10124-CVGroup_UIEventLobby_Enter4-4 = "Você é o único que me diria algo assim, Sensei."
10124-CVGroup_UIEventLobby_Enter5-1 = "Houve imprevistos, mas a missão desta vez terminou em segurança."
10124-CVGroup_UIEventLobby_Enter5-2 = "Foi graças à sua ajuda, Sensei."
10124-CVGroup_UIEventLobby_Enter5-3 = "Em nome do Comitê de Realização da Justiça, gostaria de agradecer novamente."
10124-CVGroup_UIEventLobby_Enter5-4 = "Parece que a Ichika também mudou um pouco."
10124-CVGroup_UIEventLobby_Enter5-5 = "Muito obrigada mesmo."
10124-CVGroup_UIEventLobby_Idle1-1 = "Desta vez, acabamos dependendo de você novamente, Sensei."
10124-CVGroup_UIEventLobby_Idle1-2 = "Para não me preocupar, é...?"
10124-CVGroup_UIEventLobby_Idle1-3 = "Sendo você, Sensei, eu já imaginava que diria isso..."
10124-CVGroup_UIEventLobby_Idle1-4 = "Pelo menos, aceite meus sentimentos."
10124-CVGroup_UIEventLobby_Idle1-5 = "Muito obrigada, de verdade."
10124-CVGroup_UIEventLobby_Idle2-1 = "Para o Comitê de Realização da Justiça, \neste plano tem um significado importante."
10124-CVGroup_UIEventLobby_Idle2-2 = "Porque aquela criança também terá que seguir seu próprio caminho um dia."
10124-CVGroup_UIEventLobby_Idle3-1 = "Como você sabe, Tsurugi não é boa em negociações ou acordos."
10124-CVGroup_UIEventLobby_Idle3-2 = "Por isso, o contato com o Tea Party,"
10124-CVGroup_UIEventLobby_Idle3-3 = "acaba ficando principalmente sob minha responsabilidade."
10124-CVGroup_UIEventLobby_Idle3-4 = "...Pensando bem, já faz bastante tempo que convivo com aquelas três."
10124-CVGroup_UIEventLobby_Idle4-1 = "Na verdade... eu tinha desistido de vir à praia."
10124-CVGroup_UIEventLobby_Idle4-2 = "Preciso agradecer à Mika-sama por isso."
