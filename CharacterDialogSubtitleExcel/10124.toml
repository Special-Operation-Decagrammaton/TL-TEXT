[translation]
10124-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10124-CVGroup_CharacterGet_Idle1-1 = "トリニティ総合学園、正義実現委員……\nいえ。このような場に、堅苦しい挨拶は不釣り合いですね。\n羽川ハスミです。改めまして、よろしくお願いいたします。"
10124-CVGroup_Cafe_Idle1-1 = "この格好は……さすがに目立ちますね。"
10124-CVGroup_Cafe_Idle2-1 = "この夏こそダイエットを……\nとはいえ、ここには誘惑が多すぎますね……。"
10124-CVGroup_Cafe_Idle3-1 = "適切な休息こそが、仕事の効率を上昇させる。\n頭では分かっているのですが……。"
10124-CVGroup_Cafe_Idle4-1 = "海で食べるものを何でも美味しく感じてしまうのは……\nなぜなのでしょう？"
10124-CVGroup_Cafe_Idle5-1 = "今度来るときは、委員会の皆さんもお誘いしましょうか。"
10124-CVGroup_WeaponGet_Idle1-1 = "正義実現委員会に入ってから、私の守りたいものはずっと変わりません。\nですが……そのうちに、守りたい対象がどんどん増えているのです。\nこの銃に誓いましょう。\n私の眼が黒いうちは、誰であろうと、先生に危害を加えることは許さない、と。"
10124-CVGroup_UIEventLobby_Enter1-1 = "まさか、海に来られるだなんて思いもしませんでした。"
10124-CVGroup_UIEventLobby_Enter1-2 = "え？楽しそう？"
10124-CVGroup_UIEventLobby_Enter1-3 = "ふふっ、ご想像にお任せします。"
10124-CVGroup_UIEventLobby_Enter2-1 = "場所が違えば、任務への気持ちも変わってくるものですね。"
10124-CVGroup_UIEventLobby_Enter2-2 = "少しだけ、これからの事が楽しみです。"
10124-CVGroup_UIEventLobby_Enter3-1 = "あ、先生。ミカ様とイチカを見かけませんでしたか？"
10124-CVGroup_UIEventLobby_Enter3-2 = "先ほどから姿が見えなくて。"
10124-CVGroup_UIEventLobby_Enter3-3 = "面倒事に巻き込まれてないといいのですが……。"
10124-CVGroup_UIEventLobby_Enter3-4 = "心配しなくて大丈夫……？"
10124-CVGroup_UIEventLobby_Enter3-5 = "先生が仰るなら、信じますが……。"
10124-CVGroup_UIEventLobby_Enter4-1 = "まさか、裏であのような騒動があっただなんて。"
10124-CVGroup_UIEventLobby_Enter4-2 = "気付けなかった自分が恥ずかしいです。"
10124-CVGroup_UIEventLobby_Enter4-3 = "楽しめてたならそれでいい……？"
10124-CVGroup_UIEventLobby_Enter4-4 = "私にそんなことを言ってくれるのは、先生だけでしょうね。"
10124-CVGroup_UIEventLobby_Enter5-1 = "イレギュラーはありましたが、今回の任務も無事終了しました。"
10124-CVGroup_UIEventLobby_Enter5-2 = "先生が手助けして下さったおかげです。"
10124-CVGroup_UIEventLobby_Enter5-3 = "正義実現委員会を代表して、改めてお礼申し上げます。"
10124-CVGroup_UIEventLobby_Enter5-4 = "イチカも、少しは変わったようですし。"
10124-CVGroup_UIEventLobby_Enter5-5 = "本当にありがとうございました。"
10124-CVGroup_UIEventLobby_Idle1-1 = "今回も、先生を頼る結果になってしまいましたね。"
10124-CVGroup_UIEventLobby_Idle1-2 = "気にするな、ですか……。"
10124-CVGroup_UIEventLobby_Idle1-3 = "先生の事ですから、そうおっしゃると思っていましたが……。"
10124-CVGroup_UIEventLobby_Idle1-4 = "せめて、気持ちだけでも受け取ってください。"
10124-CVGroup_UIEventLobby_Idle1-5 = "本当に、ありがとうございます。"
10124-CVGroup_UIEventLobby_Idle2-1 = "正義実現委員会にとっても、\n今回の計画は重要な意味を持ちます。"
10124-CVGroup_UIEventLobby_Idle2-2 = "あの子も、いつかは独り立ちすることになりますから。"
10124-CVGroup_UIEventLobby_Idle3-1 = "ご存知の通り、ツルギは折衝や交渉を不得手としています。"
10124-CVGroup_UIEventLobby_Idle3-2 = "ですので、ティーパーティーとの連絡も、"
10124-CVGroup_UIEventLobby_Idle3-3 = "主に私が担当することになっているんです。"
10124-CVGroup_UIEventLobby_Idle3-4 = "……思えば、あのお三方との付き合いも長くなったものです。"
10124-CVGroup_UIEventLobby_Idle4-1 = "本当は……海に来るのを諦めていたんです。"
10124-CVGroup_UIEventLobby_Idle4-2 = "ミカ様には、感謝しないとですね。"
