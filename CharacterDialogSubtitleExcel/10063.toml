[translation]
10063-CVGroup_UITitle_Idle1-1 = "ブルー！アーカイブ！"
10063-CVGroup_CharacterGet_Idle1-1 = "なんか面白いことないですか～？\n黒崎コユキ、来ちゃいました！！\nに・は・は・は！！"
10063-CVGroup_Cafe_Idle1-1 = "うわぁ！なんだか不思議なものがいっぱいですね！"
10063-CVGroup_Cafe_Idle2-1 = "こ、ここって安全地帯ですよね！？\n誰かに連れていかれたりとかしませんよね！？"
10063-CVGroup_Cafe_Idle3-1 = "へぇ、ここが噂の……。"
10063-CVGroup_Cafe_Idle4-1 = "もしかしてここって……\n騒がしい人は追い出されるシステムだったりします！？"
10063-CVGroup_Cafe_Idle5-1 = "はっ……！！\n……お腹空いたぁ。"
10063-CVGroup_WeaponGet_Idle1-1 = "えっ……んん？？いいんですか？\nこれ、本当に大丈夫ですか！？\n先生、もしかして私のこと……本当に、信じてくれるんですか……？"
