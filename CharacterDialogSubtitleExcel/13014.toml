[translation]
13014-CVGroup_UITitle_Idle1-1 = "Blue Archive! Haha!"
13014-CVGroup_CharacterGet_Idle1-1 = "Quando se fala em atividades de juventude no verão, só pode ser a praia! Todos, estão prontos?"
13014-CVGroup_Cafe_Idle1-1 = "Então é assim que o Sensei monta um quarto..."
13014-CVGroup_Cafe_Idle2-1 = "Humm, tem isso aqui também."
13014-CVGroup_Cafe_Idle3-1 = "Aquela Kikyou... o que será que ela está planejando agora?"
13014-CVGroup_Cafe_Idle4-1 = "Nossa sala de mediação... será que não dá para mudar para cá?"
13014-CVGroup_Cafe_Idle5-1 = "A praia é realmente o máximo, não é?"
13014-CVGroup_WeaponGet_Idle1-1 = "Oh, uau...! A juventude com o mestre tomou forma! Obrigado! Vou guardar como um tesouro para a vida toda!"
13014-CVGroup_UIEventLobby_Enter1-1 = "Mar azul! Céu azul! Nuvens brancas! Que combinação perfeita!"
13014-CVGroup_UIEventLobby_Enter2-1 = "Claro que a vitória será nossa. Sensei, conto com a sua torcida!"
13014-CVGroup_UIEventLobby_Enter3-1 = "Vamos dar o nosso melhor pelo resto do período!"
13014-CVGroup_UIEventLobby_Enter4-1 = "Não podemos baixar a guarda até o último segundo!"
13014-CVGroup_UIEventLobby_Enter5-1 = "O festival acabou, mas... a juventude continua!"
13014-CVGroup_UIEventLobby_Idle1-1 = "Atividade de juventude exclusiva de verão! Mestre, estou animada!"
13014-CVGroup_UIEventLobby_Idle2-1 = "Mestre, você quer nadar comigo?"
13014-CVGroup_UIEventLobby_Idle2-2 = "Tudo bem, vamos ver quem é mais rápido!"
13014-CVGroup_UIEventLobby_Idle3-1 = "Não podemos vacilar. Vamos manter o foco."
13014-CVGroup_UIEventLobby_Idle4-1 = "Estou contando com a sua explicação, mestre!"
13014-CVGroup_UIEventTreasure_Enter1-1 = "Caça ao tesouro na praia! O que será que está escondido aqui?"
13014-CVGroup_UIEventTreasure_Enter2-1 = "Caçar tesouros juntos também é bem a cara da juventude, né! Muito bem, vamos nessa!"
13014-CVGroup_UIEventTreasure_Enter3-1 = "Ah, foi divertido! Quero fazer de novo."
13014-CVGroup_UIEventTreasure_Enter4-1 = "Virou uma lembrança preciosa. Obrigado, mestre."
13014-CVGroup_UIEventTreasure_Idle1-1 = "Tem tantos tesouros que nem sei para onde olhar."
13014-CVGroup_UIEventTreasure_Idle1-2 = "Hum? Quer saber qual é o meu tesouro mais precioso?"
13014-CVGroup_UIEventTreasure_Idle1-3 = "I-Isso é..."
13014-CVGroup_UIEventTreasure_Idle1-4 = "Não posso contar! É segredo absoluto!"
13014-CVGroup_UIEventTreasure_Idle2-1 = "A juventude com a qual eu sonhava, tornando-se realidade mais uma vez..."
13014-CVGroup_UIEventTreasure_Idle2-2 = "Mu-Muito obrigada, mestre...!"
13014-CVGroup_UIEventTreasure_FindTreasure1-1 = "Oh! Isso não é um tesouro!?"
13014-CVGroup_UIEventTreasure_FindTreasure2-1 = "Mestre! Encontrei uma pista!"
13014-CVGroup_UIEventTreasure_GetTreasure1-1 = "Tesouro conseguido! Agora, qual será a recompensa...!"
13014-CVGroup_UIEventTreasure_GetTreasure2-1 = "Como esperado do mestre! Que habilidade!"
13014-CVGroup_UIEventTreasure_RoundRenewal1-1 = "Vamos procurar o próximo tesouro!"
