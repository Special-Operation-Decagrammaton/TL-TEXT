[translation]
13014-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！ははっ！"
13014-CVGroup_CharacterGet_Idle1-1 = "夏の青春活動っていえば、海しかないよな！\n皆、準備はいい？"
13014-CVGroup_Cafe_Idle1-1 = "先生はこういう部屋を作るんだなぁ……。"
13014-CVGroup_Cafe_Idle2-1 = "へぇ、こんなのもあるんだ。"
13014-CVGroup_Cafe_Idle3-1 = "キキョウのやつ……今度は何を企んでるんだか。"
13014-CVGroup_Cafe_Idle4-1 = "アタシらの調停室……\nここに引っ越せないかな……。"
13014-CVGroup_Cafe_Idle5-1 = "やっぱ海って最高だよな！"
13014-CVGroup_WeaponGet_Idle1-1 = "おっ、おぉ……！師匠との青春が形になってる！\nありがとう！一生の宝物にするよ！"
13014-CVGroup_UIEventLobby_Enter1-1 = "青い海！青い空！白い雲！\n最高の響きだよな！"
13014-CVGroup_UIEventLobby_Enter2-1 = "もちろん、優勝はいただくよ。\n先生も応援よろしくな！"
13014-CVGroup_UIEventLobby_Enter3-1 = "残りの期間も全力を尽くそう！"
13014-CVGroup_UIEventLobby_Enter4-1 = "最後の最後まで気は抜けないな！"
13014-CVGroup_UIEventLobby_Enter5-1 = "お祭りは終わったけど……青春はまだまだ続くよ！"
13014-CVGroup_UIEventLobby_Idle1-1 = "夏限定の青春活動！\n師匠、楽しみだな！"
13014-CVGroup_UIEventLobby_Idle2-1 = "師匠、アタシと泳ぎたいのか？"
13014-CVGroup_UIEventLobby_Idle2-2 = "いいよ、どっちが速いか勝負だ！"
13014-CVGroup_UIEventLobby_Idle3-1 = "油断大敵だな。\n気を引き締めていこう。"
13014-CVGroup_UIEventLobby_Idle4-1 = "師匠の解説、期待してるからね！"
13014-CVGroup_UIEventTreasure_Enter1-1 = "海辺の宝探し！\nどんなものが隠されてるのかな？"
13014-CVGroup_UIEventTreasure_Enter2-1 = "一緒に宝探しするのも青春っぽいよな！\nよ～っし、やってみよう！"
13014-CVGroup_UIEventTreasure_Enter3-1 = "あ～楽しかった！\nまたやりたいね。"
13014-CVGroup_UIEventTreasure_Enter4-1 = "大切な思い出になったよ。\n師匠、ありがとな。"
13014-CVGroup_UIEventTreasure_Idle1-1 = "色んな宝物があって目移りしちゃうなぁ。"
13014-CVGroup_UIEventTreasure_Idle1-2 = "うん？アタシの一番大切な宝物は何かって？"
13014-CVGroup_UIEventTreasure_Idle1-3 = "そ、それは……。"
13014-CVGroup_UIEventTreasure_Idle1-4 = "言えない！\n絶対に秘密！"
13014-CVGroup_UIEventTreasure_Idle2-1 = "夢見てた青春が、また一つ現実に……。"
13014-CVGroup_UIEventTreasure_Idle2-2 = "ほ、本当にありがとう、師匠……！"
13014-CVGroup_UIEventTreasure_FindTreasure1-1 = "お！これ、お宝じゃないか！？"
13014-CVGroup_UIEventTreasure_FindTreasure2-1 = "師匠！手がかりを見つけたよ！"
13014-CVGroup_UIEventTreasure_GetTreasure1-1 = "お宝ゲット！さぁて、報酬は……！"
13014-CVGroup_UIEventTreasure_GetTreasure2-1 = "さすが師匠！\nいい手際だったよ！"
13014-CVGroup_UIEventTreasure_RoundRenewal1-1 = "次のお宝を見つけに行こう！"
