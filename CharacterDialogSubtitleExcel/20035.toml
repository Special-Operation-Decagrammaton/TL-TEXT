[translation]
20035-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～ふぁ～……。"
20035-CVGroup_CharacterGet_Idle1-1 = "今回はガイドだよ……\n修行も案内も、頑張るね～ふぁー……。"
20035-CVGroup_Cafe_Idle1-1 = "みんな……こっちだよ……\nあれ……私一人？"
20035-CVGroup_Cafe_Idle2-1 = "人を案内する夢……\n夢じゃなかったのかな……？"
20035-CVGroup_Cafe_Idle3-1 = "人は……人生の3分の1を寝て過ごすんだって……。"
20035-CVGroup_Cafe_Idle4-1 = "よく寝るのは大事だよ……\n思ってる以上にね……。"
20035-CVGroup_Cafe_Idle5-1 = "百鬼夜行のことなら……任せて……。"
20035-CVGroup_WeaponGet_Idle1-1 = "ありがとう、先生……\n先生の睡眠を遮る敵は……\n私が倒してあげる……。"
20035-CVGroup_UIEventLobby_Enter1-1 = "おかえり、先生……\n百鬼夜行にようこそ……。"
20035-CVGroup_UIEventLobby_Enter2-1 = "今日は私が先生を案内してあげる。"
20035-CVGroup_UIEventLobby_Enter2-2 = "ガイド春日ツバキ、頑張ります。ふぁ……。"
20035-CVGroup_UIEventLobby_Enter3-1 = "百鬼夜行はどうだった……？\nちゃんと楽しんでる……？"
20035-CVGroup_UIEventLobby_Enter4-1 = "行きたいところがあったらいつでも言って……"
20035-CVGroup_UIEventLobby_Enter4-2 = "百鬼夜行なら案内できるから……。"
20035-CVGroup_UIEventLobby_Enter5-1 = "お祭り……すごかったね？"
20035-CVGroup_UIEventLobby_Enter5-2 = "百鬼夜行にはまた他のお祭りも\nたくさんあるよ……待ってるね？"
20035-CVGroup_UIEventLobby_Idle1-1 = "ふえ……どうしたの先生？"
20035-CVGroup_UIEventLobby_Idle1-2 = "居眠りしてるように見えたから、起こしてみたって？"
20035-CVGroup_UIEventLobby_Idle2-1 = "んん……くすぐったい……"
20035-CVGroup_UIEventLobby_Idle2-2 = "でも、その程度で私の修行を止めることはできないよ……。"
20035-CVGroup_UIEventLobby_Idle3-1 = "ずっとそうやっていたずらしたら……"
20035-CVGroup_UIEventLobby_Idle3-2 = "ベッドで一緒に横になっちゃうよ……？"
20035-CVGroup_UIEventLobby_Idle3-3 = "ん……？むしろそうしたいの……？"
20035-CVGroup_UIEventLobby_Idle4-1 = "もしかして気にしてほしいの……？"
20035-CVGroup_UIEventLobby_Idle4-2 = "……そんなことしなくても、\n私は十分先生のことを気にしてるのに……。"
20035-CVGroup_UIEventMission_Enter1-1 = "毎日の日課をちゃんとやらないと……"
20035-CVGroup_UIEventMission_Enter1-2 = "いい夢は見られないんだって……。"
20035-CVGroup_UIEventMission_Enter2-1 = "日程表は確認した……？\nじゃあ、私がガイドしてあげる。"
20035-CVGroup_UIEventMission_Idle1-1 = "うーん……そんなに揺らさないで、先生……"
20035-CVGroup_UIEventMission_Idle1-2 = "ん……？\nいや。寝てない。寝てないってば……。"
20035-CVGroup_UIEventMission_Idle2-1 = "次の目的地に案内してあげる、先生……"
20035-CVGroup_UIEventMission_Idle2-2 = "その前に、少しだけ寝てから……。"
20035-CVGroup_UIEventMission_Buy1-1 = "はい、これ……受け取って。\nお疲れ様、先生。ふふっ。"
20035-CVGroup_UIEventMission_Buy2-1 = "先生も修行を頑張っているんだね……"
20035-CVGroup_UIEventMission_Buy2-2 = "私も負けられない。ぐぅ……。"
20035-CVGroup_UIEventMission_Interaction1-1 = "うん。今日の日課はこれで終わりだね……"
20035-CVGroup_UIEventMission_Interaction1-2 = "そのまま帰るの……？\n一緒にいいとこで眠らない……？"
