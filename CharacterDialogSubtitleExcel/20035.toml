[translation]
20035-CVGroup_UITitle_Idle1-1 = "Blue Archive... Ahh..."
20035-CVGroup_CharacterGet_Idle1-1 = "Desta vez eu serei sua guia... Vou me esforçar tanto no treinamento quanto na orientação... Ahh..."
20035-CVGroup_Cafe_Idle1-1 = "Pessoal... é por aqui... Ué... Estou sozinha?"
20035-CVGroup_Cafe_Idle2-1 = "O sonho de guiar alguém... Será que não foi só um sonho...?"
20035-CVGroup_Cafe_Idle3-1 = "Dizem que as pessoas passam um terço da vida dormindo..."
20035-CVGroup_Cafe_Idle4-1 = "Dormir bem é importante... Mais do que você imagina..."
20035-CVGroup_Cafe_Idle5-1 = "Se for sobre Hyakkiyako... pode deixar comigo..."
20035-CVGroup_WeaponGet_Idle1-1 = "Obrigada, Sensei... Qualquer inimigo que atrapalhe o seu sono... eu vou derrotar..."
20035-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo de volta, Sensei... Bem-vindo a Hyakkiyako..."
20035-CVGroup_UIEventLobby_Enter2-1 = "Hoje eu vou ser sua guia, Sensei."
20035-CVGroup_UIEventLobby_Enter2-2 = "Guia Kasuga Tsubaki, farei o meu melhor. Ahh..."
20035-CVGroup_UIEventLobby_Enter3-1 = "Como foi Hyakkiyako...? Está se divertindo de verdade...?"
20035-CVGroup_UIEventLobby_Enter4-1 = "Se tiver algum lugar que queira ir, é só me falar..."
20035-CVGroup_UIEventLobby_Enter4-2 = "Eu posso te guiar por Hyakkiyako..."
20035-CVGroup_UIEventLobby_Enter5-1 = "O festival... foi incrível, né?"
20035-CVGroup_UIEventLobby_Enter5-2 = "Hyakkiyako ainda tem muitos outros festivais... Estou te esperando, viu?"
20035-CVGroup_UIEventLobby_Idle1-1 = "Eh... O que foi, Sensei?"
20035-CVGroup_UIEventLobby_Idle1-2 = "Você me acordou porque achou que eu estava cochilando?"
20035-CVGroup_UIEventLobby_Idle2-1 = "Hmm... isso faz cócegas..."
20035-CVGroup_UIEventLobby_Idle2-2 = "Mas nem isso vai me fazer parar o meu treinamento..."
20035-CVGroup_UIEventLobby_Idle3-1 = "Se continuar brincando assim comigo..."
20035-CVGroup_UIEventLobby_Idle3-2 = "Vou acabar deitando na cama com você, sabia...?"
20035-CVGroup_UIEventLobby_Idle3-3 = "Hmm...? Ou será que é isso que você quer...?"
20035-CVGroup_UIEventLobby_Idle4-1 = "Será que você quer que eu preste atenção em você...?"
20035-CVGroup_UIEventLobby_Idle4-2 = "...Mesmo sem você fazer isso, eu já presto atenção em você o suficiente..."
20035-CVGroup_UIEventMission_Enter1-1 = "Se não cumprir as tarefas diárias..."
20035-CVGroup_UIEventMission_Enter1-2 = "Dizem que você não terá bons sonhos..."
20035-CVGroup_UIEventMission_Enter2-1 = "Já conferiu a agenda...? Então, eu vou te guiar."
20035-CVGroup_UIEventMission_Idle1-1 = "Umm... Não me balance tanto, Sensei..."
20035-CVGroup_UIEventMission_Idle1-2 = "Hmm...? Não. Eu não estou dormindo. Eu disse que não estou..."
20035-CVGroup_UIEventMission_Idle2-1 = "Vou te levar ao próximo destino, Sensei..."
20035-CVGroup_UIEventMission_Idle2-2 = "Mas antes, só um cochilo rápido..."
20035-CVGroup_UIEventMission_Buy1-1 = "Aqui, pegue isto... Bom trabalho, Sensei. Fufu."
20035-CVGroup_UIEventMission_Buy2-1 = "Vejo que você também está se esforçando no treinamento..."
20035-CVGroup_UIEventMission_Buy2-2 = "Eu não posso perder. Zzz..."
20035-CVGroup_UIEventMission_Interaction1-1 = "Certo. As tarefas de hoje acabaram..."
20035-CVGroup_UIEventMission_Interaction1-2 = "Vai embora agora...? Que tal dormirmos em um lugar confortável juntos...?"
