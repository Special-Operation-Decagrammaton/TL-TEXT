[translation]
10002-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10002-CVGroup_CharacterGet_Idle1-1 = "美食研究会へようこそ。\n究極の味を求めて、共に冒険に出かけましょうか？"
10002-CVGroup_Cafe_Idle1-1 = "美食への道のりはやはり険しいものですわね。"
10002-CVGroup_Cafe_Idle2-1 = "美味しいとは一体何なのでしょう？\n私たちにとってそれは、どのような意味なのかしら？"
10002-CVGroup_Cafe_Idle3-1 = "美味しい。\nそれは尊いものですわね。"
10002-CVGroup_Cafe_Idle4-1 = "究極の味を追求させて頂くため、今日も一生懸命に……。"
10002-CVGroup_Cafe_Idle5-1 = "食べ物に関して気になることがおありでしたら、\nいつでも私をお訪ねください。"
10002-CVGroup_WeaponGet_Idle1-1 = "美食家の道は、修行者の道と同じですわね。\n究極というものを追求し、探求し、そして前に進んで行くこと。\nうふふっ……これで私もまた少し、前に進めそうですわ。"
