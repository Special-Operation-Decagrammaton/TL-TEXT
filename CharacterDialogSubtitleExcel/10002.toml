[translation]
10002-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10002-CVGroup_CharacterGet_Idle1-1 = "Bem-vindo ao Clube de Pesquisa Gastronômica.\nQue tal partirmos em uma aventura em busca do sabor supremo?"
10002-CVGroup_Cafe_Idle1-1 = "O caminho para a gastronomia é realmente árduo, não é?"
10002-CVGroup_Cafe_Idle2-1 = "O que será que realmente significa ser delicioso?\nPara nós, que tipo de significado isso teria?"
10002-CVGroup_Cafe_Idle3-1 = "Delicioso.\nÉ algo precioso, não é?"
10002-CVGroup_Cafe_Idle4-1 = "Para que eu possa continuar buscando o sabor supremo, hoje também me esforçarei ao máximo..."
10002-CVGroup_Cafe_Idle5-1 = "Se tiver alguma dúvida sobre comida,\nsinta-se à vontade para me procurar a qualquer momento."
10002-CVGroup_WeaponGet_Idle1-1 = "O caminho de um gourmet é o mesmo caminho de um praticante.\nBuscar o que é supremo, explorar e seguir em frente.\nUfufu... Com isso, sinto que poderei avançar um pouco mais."
