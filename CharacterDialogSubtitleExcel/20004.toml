[translation]
20004-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20004-CVGroup_CharacterGet_Idle1-1 = "トリニティの正義実現委員会１年、マシロ。\nどんな場所でも、いついかなる状況でも、\n全力で先生のことを支援します。"
20004-CVGroup_Cafe_Idle1-1 = "なんだか視線を感じます……。"
20004-CVGroup_Cafe_Idle2-1 = "まさか、こんなところで問題を起こそうとする問題児はいませんよね？"
20004-CVGroup_Cafe_Idle3-1 = "（次は、先輩たちみんなと一緒に……）"
20004-CVGroup_Cafe_Idle4-1 = "（ここ、狙撃ポイントとして良さそうですね）"
20004-CVGroup_Cafe_Idle5-1 = "（心は水面のように。揺れを徐々に、静かに……）"
20004-CVGroup_WeaponGet_Idle1-1 = "これもまた……\n真の正義……？"
20004-CVGroup_UIEventLobby_Enter1-1 = "今日も蒸し暑いですね……。\n熱中症には十分気をつけてください。"
20004-CVGroup_UIEventLobby_Enter2-1 = "さあ、夏季特別訓練を始めましょう！"
20004-CVGroup_UIEventLobby_Idle1-1 = "トリニティの他の方たちと海に来るなんて初めてで……\n少し、緊張してしまいますね。"
20004-CVGroup_UIEventLobby_Idle2-1 = "知者楽水……\n知恵ある者は水を楽しむ、と言います。"
20004-CVGroup_UIEventLobby_Idle3-1 = "（水着くらい、黒じゃなくても良かったかな……）"
20004-CVGroup_UIEventLobby_Idle4-1 = "今、どこからかツルギ先輩の叫び声が……。"
20004-CVGroup_UIEventMission_Enter1-1 = "任務も休息も、しっかりとやります。"
20004-CVGroup_UIEventMission_Idle1-1 = "まさか、こんなところで\n問題を起こそうとする問題児はいませんよね？"
20004-CVGroup_UIEventMission_Idle2-1 = "リゾート地でも、油断は禁物です。"
