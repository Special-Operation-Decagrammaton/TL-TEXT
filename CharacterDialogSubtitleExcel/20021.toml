[translation]
20021-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20021-CVGroup_CharacterGet_Idle1-1 = "メリークリスマ～ス！\nサンタさんの代わりに、ハナエが来ましたよ！"
20021-CVGroup_Cafe_Idle1-1 = "こんにちは！\nサンタ服だけどハナエですよ～！"
20021-CVGroup_Cafe_Idle2-1 = "手術とプレゼントが必要な人～、いませんか～？"
20021-CVGroup_Cafe_Idle3-1 = "クリスマスでも救護騎士団の準備はバッチリです！"
20021-CVGroup_Cafe_Idle4-1 = "煙突は……どこにあるのでしょう？"
20021-CVGroup_Cafe_Idle5-1 = "クリスマスにチャリティーイベントがあるんです。\n私もそこでみんなと一緒に歌いますよ～"
20021-CVGroup_WeaponGet_Idle1-1 = "よし、準備オッケーです！"
20021-CVGroup_UIEventLobby_Enter1-1 = "先生、いよいよクリスマスがやってきました！"
20021-CVGroup_UIEventLobby_Enter1-2 = "私もクリスマスモードですよ～！"
20021-CVGroup_UIEventLobby_Enter2-1 = "先生は何か欲しいものありますか？"
20021-CVGroup_UIEventLobby_Enter2-2 = "私がサンタさんにお願いの手紙を書きますよ！"
20021-CVGroup_UIEventLobby_Idle1-1 = "先生、どうしました？\n何かありましたか？"
20021-CVGroup_UIEventLobby_Idle2-1 = "そんなにジッと見つめられると……"
20021-CVGroup_UIEventLobby_Idle2-2 = "この格好、変ですか？"
20021-CVGroup_UIEventLobby_Idle3-1 = "どうしました？\n何か忘れ物でも……？\nえっ、違う？"
20021-CVGroup_UIEventLobby_Idle4-1 = "ううう……\nそんなにあちこち触ってくるなら……"
20021-CVGroup_UIEventLobby_Idle4-2 = "私だって先生のこと、いっぱい触りかえしちゃいます！"
20021-CVGroup_UIEventLobby_Enter3-1 = "一緒に頑張りましょう、先生！"
20021-CVGroup_UIEventLobby_Enter4-1 = "あと少しです！\n達成感はありますけど……"
20021-CVGroup_UIEventLobby_Enter4-2 = "ちょっと寂しくもなりますね。"
20021-CVGroup_UIEventLobby_Enter5-1 = "もうお開きのお時間ですね。"
20021-CVGroup_UIEventLobby_Enter5-2 = "後片付け、お手伝いしますよ！"
20021-CVGroup_UIEventBoxGachaShop_Enter1-1 = "救護騎士団主催のチャリティーイベントを\n開催中でーす！"
20021-CVGroup_UIEventBoxGachaShop_Enter2-1 = "あっ、先生！ようこそ！\nくじはいかがですか？"
20021-CVGroup_UIEventBoxGachaShop_Idle1-1 = "あれっ、何かありましたか？"
20021-CVGroup_UIEventBoxGachaShop_Idle2-1 = "今日のハナエサンタは幸せをお届けしますよ～！"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "わあっ、大当たり！"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "えへへ。\n私のプレゼント、気に入ってもらえたら嬉しいです！"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "わあっ……！\nこんなものが入ってたなんて……！"
20021-CVGroup_UIEventBoxGachaShop_Enter3-1 = "チャリティーイベントは終了しました！"
20021-CVGroup_UIEventBoxGachaShop_Enter3-2 = "まだ手元に抽選券があるなら、\n私が引き換えますよ！"
20021-CVGroup_UIEventMission_Enter1-1 = "今日のやる事はこちらです！"
20021-CVGroup_UIEventMission_Enter2-1 = "一つずつ、焦らずいきましょう！"
20021-CVGroup_UIEventMission_Idle1-1 = "このリスト、ここで合ってたっけ？\n……あれ、どっちだろ？"
20021-CVGroup_UIEventMission_Idle2-1 = "なんだかお仕事がいっぱいですね……。"
20021-CVGroup_UIEventMission_Idle2-2 = "これも手術できちゃえばいいのに。"
20021-CVGroup_UIEventMission_Buy1-1 = "すごい！さすが先生です！"
20021-CVGroup_UIEventMission_Buy2-1 = "お疲れさまでした、先生。\n私もうれしいです！"
20021-CVGroup_UIEventMission_Interaction1-1 = "目標は毎日コツコツ達成するのが大切ですよね。"
20021-CVGroup_UIEventMission_Interaction1-2 = "今日もよく頑張りました、先生！"
