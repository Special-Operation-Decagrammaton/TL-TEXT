[translation]
20021-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20021-CVGroup_CharacterGet_Idle1-1 = "Feliz Natal!\nNo lugar do Papai Noel, a Hanae chegou!"
20021-CVGroup_Cafe_Idle1-1 = "Olá!\nEstou com roupa de Papai Noel, mas sou a Hanae!"
20021-CVGroup_Cafe_Idle2-1 = "Alguém precisa de uma cirurgia ou de um presente?"
20021-CVGroup_Cafe_Idle3-1 = "Mesmo no Natal, a preparação do Esquadrão de Socorro está impecável!"
20021-CVGroup_Cafe_Idle4-1 = "Onde... será que fica a chaminé?"
20021-CVGroup_Cafe_Idle5-1 = "Teremos um evento de caridade no Natal.\nEu também vou cantar lá com todo mundo!"
20021-CVGroup_WeaponGet_Idle1-1 = "Certo, preparação concluída!"
20021-CVGroup_UIEventLobby_Enter1-1 = "Professor, finalmente o Natal chegou!"
20021-CVGroup_UIEventLobby_Enter1-2 = "Eu também entrei no clima natalino!"
20021-CVGroup_UIEventLobby_Enter2-1 = "Professor, tem algo que você queira?"
20021-CVGroup_UIEventLobby_Enter2-2 = "Eu vou escrever uma carta pedindo ao Papai Noel para você!"
20021-CVGroup_UIEventLobby_Idle1-1 = "Professor, o que houve?\nAconteceu alguma coisa?"
20021-CVGroup_UIEventLobby_Idle2-1 = "Se você ficar me encarando assim..."
20021-CVGroup_UIEventLobby_Idle2-2 = "Esse visual está estranho?"
20021-CVGroup_UIEventLobby_Idle3-1 = "O que foi?\nEsqueceu de algo...?\nAh, não?"
20021-CVGroup_UIEventLobby_Idle4-1 = "Uuuu...\nSe você continuar me tocando por toda parte..."
20021-CVGroup_UIEventLobby_Idle4-2 = "Eu também vou te tocar de volta, professor!"
20021-CVGroup_UIEventLobby_Enter3-1 = "Vamos nos esforçar juntos, professor!"
20021-CVGroup_UIEventLobby_Enter4-1 = "Falta pouco!\nSinto uma sensação de dever cumprido, mas..."
20021-CVGroup_UIEventLobby_Enter4-2 = "Também dá um pouco de tristeza."
20021-CVGroup_UIEventLobby_Enter5-1 = "Já está na hora de encerrar."
20021-CVGroup_UIEventLobby_Enter5-2 = "Eu ajudo a arrumar tudo!"
20021-CVGroup_UIEventBoxGachaShop_Enter1-1 = "O evento de caridade organizado pelo Esquadrão de Socorro está acontecendo!"
20021-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Ah, professor! Bem-vindo!\nQuer participar do sorteio?"
20021-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Ué, aconteceu alguma coisa?"
20021-CVGroup_UIEventBoxGachaShop_Idle2-1 = "A Hanae Noel de hoje vai trazer felicidade para você!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Uau, prêmio máximo!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Hehe.\nFico feliz que tenha gostado do meu presente!"
20021-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Uau...!\nNão acredito que tinha isso aqui dentro...!"
20021-CVGroup_UIEventBoxGachaShop_Enter3-1 = "O evento de caridade terminou!"
20021-CVGroup_UIEventBoxGachaShop_Enter3-2 = "Se você ainda tiver bilhetes de sorteio,\neu troco para você!"
20021-CVGroup_UIEventMission_Enter1-1 = "Aqui estão as tarefas de hoje!"
20021-CVGroup_UIEventMission_Enter2-1 = "Vamos fazer uma por uma, sem pressa!"
20021-CVGroup_UIEventMission_Idle1-1 = "Essa lista, era aqui mesmo?\n...Ué, qual será?"
20021-CVGroup_UIEventMission_Idle2-1 = "Tem bastante trabalho, não é..."
20021-CVGroup_UIEventMission_Idle2-2 = "Seria ótimo se pudéssemos resolver isso com uma cirurgia."
20021-CVGroup_UIEventMission_Buy1-1 = "Incrível! Como esperado do professor!"
20021-CVGroup_UIEventMission_Buy2-1 = "Bom trabalho, professor.\nEu também estou feliz!"
20021-CVGroup_UIEventMission_Interaction1-1 = "É importante alcançar os objetivos um pouco a cada dia, né?"
20021-CVGroup_UIEventMission_Interaction1-2 = "Você se esforçou muito hoje, professor!"
