[translation]
20028-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20028-CVGroup_CharacterGet_Idle1-1 = "わ、若葉ヒナタと申します！\n頑張りますので、何なりと仰ってください！"
20028-CVGroup_Cafe_Idle1-1 = "ここの内装、とっても可愛いです……！"
20028-CVGroup_Cafe_Idle2-1 = "あの、荷物運びでしたら、いつでも！"
20028-CVGroup_Cafe_Idle3-1 = "あれ？名前を呼ばれたような気が……。"
20028-CVGroup_Cafe_Idle4-1 = "リラックスできる、素敵な場所ですね。"
20028-CVGroup_Cafe_Idle5-1 = "先生は……どちらにいらっしゃるのでしょう……？"
20028-CVGroup_WeaponGet_Idle1-1 = "その……なんとお礼を言えば良いのか……。\nいえ、言葉だけでは伝えきれません……。\nこのご恩は……必ず行動で示してみせます、先生。"
20028-CVGroup_UIEventLobby_Enter1-1 = "お、お待ちしておりました、先生！"
20028-CVGroup_UIEventLobby_Enter2-1 = "じゅ、準備はできております！"
20028-CVGroup_UIEventLobby_Enter2-2 = "いつでもお声がけください！"
20028-CVGroup_UIEventLobby_Enter3-1 = "あと少しです！\n頑張りましょう！"
20028-CVGroup_UIEventLobby_Enter4-1 = "最後まで、気を引き締めていきましょう……！"
20028-CVGroup_UIEventLobby_Enter5-1 = "後片付けならお任せください。ふふ。"
20028-CVGroup_UIEventLobby_Idle1-1 = "暑いですね……\n日差しも強くて……"
20028-CVGroup_UIEventLobby_Idle1-2 = "その、よろしければ帽子、いかがですか？"
20028-CVGroup_UIEventLobby_Idle2-1 = "あれっ、先生？\nどうされました？"
20028-CVGroup_UIEventLobby_Idle3-1 = "え、えっと……先生？\nその……用件がありましたらお話を……。"
20028-CVGroup_UIEventLobby_Idle4-1 = "ひゃっ！せ、先生！\nく、くすぐったいです！"
20028-CVGroup_UIEventLobby_Idle4-2 = "ひゃっ、あははっ！"
20028-CVGroup_UIEventShop_Enter1-1 = "何かお探しですか？"
20028-CVGroup_UIEventShop_Enter2-1 = "どうぞ、お選びください！"
20028-CVGroup_UIEventShop_Enter3-1 = "まだ時間がありますから、\n一緒に見てまわりませんか？"
20028-CVGroup_UIEventShop_Idle1-1 = "せ、先生……ふふっ！\nわ、私の事はいいですから……ふふ！"
20028-CVGroup_UIEventShop_Idle2-1 = "えっと……\n何かご用でしょうか……？"
20028-CVGroup_UIEventShop_Buy1-1 = "す、素敵ですね！\n私も良いと思います。"
20028-CVGroup_UIEventShop_Buy2-1 = "はい！こちらになります！"
20028-CVGroup_UIEventShop_Buy3-1 = "それはとても良いものですね……！\nさすがです、先生。"
20028-CVGroup_UIEventShop_Buy4-1 = "お探しのものが見つかって、よかったです！"
