[translation]
20028-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20028-CVGroup_CharacterGet_Idle1-1 = "Ah, meu nome é Hinata Wakaba!\nFarei o meu melhor, então, por favor, me peça o que precisar!"
20028-CVGroup_Cafe_Idle1-1 = "A decoração daqui é tão fofa...!"
20028-CVGroup_Cafe_Idle2-1 = "Hum, se precisar de ajuda para carregar bagagens, estou à disposição!"
20028-CVGroup_Cafe_Idle3-1 = "Hm? Tive a impressão de que me chamaram..."
20028-CVGroup_Cafe_Idle4-1 = "Este é um lugar maravilhoso para relaxar."
20028-CVGroup_Cafe_Idle5-1 = "Onde será que o Sensei está...?"
20028-CVGroup_WeaponGet_Idle1-1 = "Eu... nem sei como agradecer...\nNão, palavras não são suficientes...\nEu retribuirei essa gentileza... com ações, Sensei."
20028-CVGroup_UIEventLobby_Enter1-1 = "E-estávamos esperando por você, Sensei!"
20028-CVGroup_UIEventLobby_Enter2-1 = "E-estou pronta!"
20028-CVGroup_UIEventLobby_Enter2-2 = "Pode me chamar a qualquer momento!"
20028-CVGroup_UIEventLobby_Enter3-1 = "Falta pouco!\nVamos nos esforçar!"
20028-CVGroup_UIEventLobby_Enter4-1 = "Vamos manter o foco até o fim...!"
20028-CVGroup_UIEventLobby_Enter5-1 = "Pode deixar a limpeza comigo. Fufu."
20028-CVGroup_UIEventLobby_Idle1-1 = "Está quente, não é...\nO sol está muito forte..."
20028-CVGroup_UIEventLobby_Idle1-2 = "Hum, se não se importar, gostaria de um chapéu?"
20028-CVGroup_UIEventLobby_Idle2-1 = "Ah, Sensei?\nO que houve?"
20028-CVGroup_UIEventLobby_Idle3-1 = "E-err... Sensei?\nSe... se precisar de algo, pode falar..."
20028-CVGroup_UIEventLobby_Idle4-1 = "Hya! S-Sensei!\nI-isso faz cócegas!"
20028-CVGroup_UIEventLobby_Idle4-2 = "Hya, ahaha!"
20028-CVGroup_UIEventShop_Enter1-1 = "Está procurando por algo?"
20028-CVGroup_UIEventShop_Enter2-1 = "Por favor, fique à vontade para escolher!"
20028-CVGroup_UIEventShop_Enter3-1 = "Ainda temos tempo, que tal\ndarmos uma olhada juntos?"
20028-CVGroup_UIEventShop_Idle1-1 = "S-Sensei... fufu!\nN-não se preocupe comigo... fufu!"
20028-CVGroup_UIEventShop_Idle2-1 = "Err...\nPrecisa de alguma coisa...?"
20028-CVGroup_UIEventShop_Buy1-1 = "É maravilhoso!\nEu também acho uma boa escolha."
20028-CVGroup_UIEventShop_Buy2-1 = "Sim! Aqui está!"
20028-CVGroup_UIEventShop_Buy3-1 = "Isso é algo muito bom...!\nComo esperado do Sensei."
20028-CVGroup_UIEventShop_Buy4-1 = "Fico feliz que tenha encontrado o que procurava!"
