[translation]
10062-CVGroup_UIMiniEventLobby_Enter1-1 = "Estava à sua espera, Sensei."
10062-CVGroup_UIMiniEventLobby_Enter1-2 = "Não importa o terreno ou o clima,"
10062-CVGroup_UIMiniEventLobby_Enter1-3 = "garanto-lhe um suporte perfeito."
10062-CVGroup_UIMiniEventLobby_Enter2-1 = "Pode ficar tranquilo e deixar tudo comigo."
10062-CVGroup_UIMiniEventLobby_Enter2-2 = "……Caso contrário, eu ficaria solitária."
10062-CVGroup_UIMiniEventLobby_Enter3-1 = "Você me fez esperar, Sensei. Não que eu me importe."
10062-CVGroup_UIMiniEventLobby_Enter3-2 = "Não estou fazendo bico. Quando o Sensei voltar,"
10062-CVGroup_UIMiniEventLobby_Enter3-3 = "eu nem sequer pensei em nunca mais sair do seu lado, então"
10062-CVGroup_UIMiniEventLobby_Enter3-4 = "fique tranquilo."
10062-CVGroup_UIMiniEventLobby_Idle1-1 = "Há o céu, há a terra, e há Toki Asuma."
10062-CVGroup_UIMiniEventLobby_Idle1-2 = "……Não tem um significado especial. Só quis dizer isso."
10062-CVGroup_UIMiniEventLobby_Idle2-1 = "Sempre me perguntam se não estou com frio,"
10062-CVGroup_UIMiniEventLobby_Idle2-2 = "e respondo que estou bem, mas, na verdade, estou com frio."
10062-CVGroup_UIMiniEventLobby_Idle2-3 = "Por isso, Sensei, por favor, me aqueça."
10062-CVGroup_UIMiniEventLobby_Idle3-1 = "Minha missão é a gestão e segurança da base."
10062-CVGroup_UIMiniEventLobby_Idle3-2 = "Em outras palavras, é agir grudada no Sensei."
10062-CVGroup_UIMiniEventLobby_Idle3-3 = "……A lógica está estranha? Você ainda tem muito o que aprender, Sensei."
10062-CVGroup_UIMiniEventLobby_Idle4-1 = "Serei direta."
10062-CVGroup_UIMiniEventLobby_Idle4-2 = "Agora, o Sensei deve se concentrar em mim."
10062-CVGroup_UIMiniEventLobby_Idle4-3 = "O motivo é que só estamos nós dois aqui."
10062-CVGroup_UIMiniEventLobby_Idle5-1 = "Sensei, dê-me sua mão. Eu vou aquecê-la para você."
10062-CVGroup_UIMiniEventLobby_Idle5-2 = "……!……Sua mão…… não está fria……!?"
10062-CVGroup_UIMiniEventLobby_Idle5-3 = "Droga…… eu deveria ter escondido as luvas do Sensei naquela hora."
10062-CVGroup_UIMiniEventShop_Enter1-1 = "Bem-vindo de volta, Sensei. Por favor, deixe as amostras coletadas aqui."
10062-CVGroup_UIMiniEventShop_Enter2-1 = "A análise requer uma grande quantidade de 'material'. Ou seja, é a sua vez, Sensei."
10062-CVGroup_UIMiniEventShop_Enter3-1 = "Sensei, gostaria de tomar um chá?"
10062-CVGroup_UIMiniEventShop_Enter3-2 = "Este foi feito com água de geleira derretida."
10062-CVGroup_UIMiniEventShop_Enter3-3 = "……Talvez você consiga sentir um gosto ancestral."
10062-CVGroup_UIMiniEventShop_Idle1-1 = "A Rio-sama já realizou experimentos parecidos com este antes."
10062-CVGroup_UIMiniEventShop_Idle1-2 = "Sinto uma certa nostalgia com esta missão."
10062-CVGroup_UIMiniEventShop_Idle2-1 = "Sensei, você roubou algo imperdoável…… Isso é…… o meu coração."
10062-CVGroup_UIMiniEventShop_Idle2-2 = "……Não entre em pânico. Só quis dizer isso, sim."
10062-CVGroup_UIMiniEventShop_Idle3-1 = "……Você quer que eu faça 'aquilo'? Tem certeza absoluta……?"
10062-CVGroup_UIMiniEventShop_Idle3-2 = "Entendido…… *pulo*."
10062-CVGroup_UIMiniEventShop_Idle4-1 = "Estou analisando as amostras agora. Ou seja, estou livre."
10062-CVGroup_UIMiniEventShop_Idle4-2 = "……Você sabe o que deve fazer, não sabe, Sensei?"
10062-CVGroup_UIMiniEventShop_Idle5-1 = "Eu protegerei o Sensei, não importa o que aconteça."
10062-CVGroup_UIMiniEventShop_Idle5-2 = "Pois esse é o único motivo de eu estar aqui."
10062-CVGroup_UIMiniEventShop_Buy1-1 = "Ótima escolha."
10062-CVGroup_UIMiniEventShop_Buy2-1 = "Eu também acho que essa é uma boa escolha."
10062-CVGroup_UIMiniEventShop_Buy3-1 = "Se for útil para o Sensei, por favor, fique à vontade para levar."
10062-CVGroup_UIMiniEventShop_Buy4-1 = "Como foi o Sensei quem escolheu, certamente tem valor."
10062-CVGroup_UIMiniEventShop_Buy4-2 = "Claro, não se compara a mim."
10062-CVGroup_UIMiniEventShop_Buy5-1 = "Prepararei imediatamente. Espere um momento."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "Este é o lugar onde a Chefe Himari fez 'alguns ajustes'."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "Aleatoriedade ou garantia…… Qual você escolhe, Sensei?"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "É um teste de sorte."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "Eu absorverei a má sorte, então a boa sorte deve vir até você, Sensei."
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "……Você não quer que seja o contrário……? É mesmo?"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "Estou começando a entender a diferença entre a Chefe Himari e a Rio-sama."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "Eu ainda não sei dizer qual é o correto, mas..."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "Ao pensar em vocês dois, sinto algo... uma emoção que não consigo colocar em palavras."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "Ouvi dizer em algum lugar que..."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "A vida precisa de um pouco de sorte."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "Caso contrário, seria difícil demais seguir por um caminho tão árduo."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "Não importa qual seja o resultado, eu estou do seu lado, Sensei."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "Portanto, por favor, fique do meu lado também."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "Quando esta missão terminar... eu vou viver feliz com o Sensei."
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "Flag...? O que é isso?"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "Por favor, escolha como desejar, Sensei. Essa é a resposta correta."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "Oh, palmas, palmas, palmas, palmas, palmas, palmas."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "...Isso foi o máximo que pude fazer para comemorar."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-3 = "O que achou? Ficou emocionado?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "Excelente, Sensei. Vamos aproveitar esse embalo e ir de novo."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "Parabéns pelo 2º prêmio."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "O conteúdo do 1º prêmio? É um cupom para eu te auxiliar pessoalmente o dia todo."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "Esse seu espírito indomável... eu também gostaria de aprender com ele."
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "...Uma aluna que expressa respeito com um olhar tão puro,"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "não acha que é admirável?"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-4 = "Por favor, me elogie rapidamente."
10062-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10062-CVGroup_CharacterGet_Idle1-1 = "Millennium Science School, pertencente à C&C, codinome 04. Asuma Toki. Prometo oferecer um suporte perfeito."
10062-CVGroup_Cafe_Idle1-1 = "Este lugar... que tipo de espaço seria?"
10062-CVGroup_Cafe_Idle2-1 = "Café... já ouvi falar sobre isso."
10062-CVGroup_Cafe_Idle3-1 = "Bebidas com açúcar são extremamente eficazes para a recuperação da fadiga."
10062-CVGroup_Cafe_Idle4-1 = "Eu também sei preparar chá... ou melhor, estou acostumada."
10062-CVGroup_Cafe_Idle5-1 = "A decoração daqui parece ser uma boa referência."
10062-CVGroup_WeaponGet_Idle1-1 = "Cuidar de mim a esse ponto... decidi. De agora em diante, deixe toda a sua segurança pessoal comigo."
