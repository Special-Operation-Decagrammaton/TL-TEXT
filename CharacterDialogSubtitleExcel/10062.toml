[translation]
10062-CVGroup_UIMiniEventLobby_Enter1-1 = "お待ちしておりました。先生。"
10062-CVGroup_UIMiniEventLobby_Enter1-2 = "どのような地形や気候であっても"
10062-CVGroup_UIMiniEventLobby_Enter1-3 = "完璧な補佐をお約束させていただきます。"
10062-CVGroup_UIMiniEventLobby_Enter2-1 = "大船に乗ったつもりで、私に任せてください。"
10062-CVGroup_UIMiniEventLobby_Enter2-2 = "……そうでないと、寂しいです。"
10062-CVGroup_UIMiniEventLobby_Enter3-1 = "私を待たせましたね、先生。\n別に平気です。"
10062-CVGroup_UIMiniEventLobby_Enter3-2 = "拗ねてなんかいません。\n先生が戻ったら"
10062-CVGroup_UIMiniEventLobby_Enter3-3 = "絶対におそばを離れないでいようなんてことも\n思っていませんので、"
10062-CVGroup_UIMiniEventLobby_Enter3-4 = "ご安心を。"
10062-CVGroup_UIMiniEventLobby_Idle1-1 = "天あり、地あり、飛鳥馬トキあり。"
10062-CVGroup_UIMiniEventLobby_Idle1-2 = "……意味はありません。言ってみただけです。"
10062-CVGroup_UIMiniEventLobby_Idle2-1 = "寒くないのかとよく聞かれるので、"
10062-CVGroup_UIMiniEventLobby_Idle2-2 = "大丈夫だと答えていますが実は寒いです。"
10062-CVGroup_UIMiniEventLobby_Idle2-3 = "なので先生、温めてください。"
10062-CVGroup_UIMiniEventLobby_Idle3-1 = "私の任務は基地の管理と警備です。"
10062-CVGroup_UIMiniEventLobby_Idle3-2 = "言い換えれば、先生にくっついて行動すること、です。"
10062-CVGroup_UIMiniEventLobby_Idle3-3 = "……理屈が変？先生はまだまだですね。"
10062-CVGroup_UIMiniEventLobby_Idle4-1 = "単刀直入に申し上げます。"
10062-CVGroup_UIMiniEventLobby_Idle4-2 = "今、先生は私に集中しなければなりません。"
10062-CVGroup_UIMiniEventLobby_Idle4-3 = "理由は、この場にいるのが先生と私だけだからです。"
10062-CVGroup_UIMiniEventLobby_Idle5-1 = "先生、手をこちらへ。私が温めて差し上げます。"
10062-CVGroup_UIMiniEventLobby_Idle5-2 = "……！……手が……冷たくない……！？"
10062-CVGroup_UIMiniEventLobby_Idle5-3 = "クッ……やはりあの時、先生の手袋を隠しておくべきでした。"
10062-CVGroup_UIMiniEventShop_Enter1-1 = "おかえりなさい、先生。\n集めたサンプルは、こちらにお願いします。"
10062-CVGroup_UIMiniEventShop_Enter2-1 = "分析には大量の「物質」が必要です。\nつまり、先生の出番ということです。"
10062-CVGroup_UIMiniEventShop_Enter3-1 = "先生、お茶でも飲まれますか？"
10062-CVGroup_UIMiniEventShop_Enter3-2 = "こちら、氷河を溶かしたお湯で淹れたものです。"
10062-CVGroup_UIMiniEventShop_Enter3-3 = "……古代の味が……するかもしれません。"
10062-CVGroup_UIMiniEventShop_Idle1-1 = "以前、リオ様がこれに似た実験をされたことがありますので。"
10062-CVGroup_UIMiniEventShop_Idle1-2 = "この任務に、少し懐かしさを覚えます。"
10062-CVGroup_UIMiniEventShop_Idle2-1 = "先生はとんでもないものを盗んでいきました……\nそれは……私の心です。"
10062-CVGroup_UIMiniEventShop_Idle2-2 = "……そんなに慌てないでください。言ってみただけです、はい。"
10062-CVGroup_UIMiniEventShop_Idle3-1 = "……「アレ」をやってほしい、ですか？\n本当に、よろしいのですね……？"
10062-CVGroup_UIMiniEventShop_Idle3-2 = "承知しました……ぴょん。"
10062-CVGroup_UIMiniEventShop_Idle4-1 = "ただいまサンプルの分析中です。\nつまり、私は暇ということです。"
10062-CVGroup_UIMiniEventShop_Idle4-2 = "……何をすべきか、先生なら分かりますよね？"
10062-CVGroup_UIMiniEventShop_Idle5-1 = "何があっても先生を守ります。"
10062-CVGroup_UIMiniEventShop_Idle5-2 = "それだけがここにいる理由ですので。"
10062-CVGroup_UIMiniEventShop_Buy1-1 = "良いですね。"
10062-CVGroup_UIMiniEventShop_Buy2-1 = "私もそれが良いと思います。"
10062-CVGroup_UIMiniEventShop_Buy3-1 = "先生のお役に立つのなら\nどうぞ、ご自由にお持ちください。"
10062-CVGroup_UIMiniEventShop_Buy4-1 = "先生の選ばれたものですから、\n価値があるに決まっています。"
10062-CVGroup_UIMiniEventShop_Buy4-2 = "もちろん、私には及びませんが。"
10062-CVGroup_UIMiniEventShop_Buy5-1 = "すぐにご用意いたします。\n少々お待ちを。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "ここは……ヒマリ部長が「多少の調整」を入れた場所になります。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "乱数と確定……\n先生はどちらを選びますか？"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "運試しですね。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "不運は私が引き受けますので、先生には幸運が巡ってくるはずです。"
10062-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "……逆じゃないと嫌……？そう、ですか？"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "ヒマリ部長とリオ様の違いが、だんだん分かってきました。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "どちらが正しいかは、私にはまだ分かりませんが……"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "お二方のことを思うと、なんだか……言葉にできない感情がこみ上げてきます。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "どこかで聞いた話なのですが……"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "人生には、小さな幸運が必要だといいます。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "でなければ、辛く苦しい道のりを生きることになってしまいますので。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "結果がどのようなものになろうとも、私は先生の味方です。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "ですので、先生も私の味方をしてくださいね。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "私、この任務が終わったら……先生と幸せに暮らすんです。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "フラグ……？\nなんですか、それは。"
10062-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "先生の気の向くままにお選びください。\nそれが正解ですから。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "おお、パチパチパチパチパチパチ。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "……今のは、私の精一杯のお祝いです。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-3 = "どうですか？感動しましたか？"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "お見事です。先生。\nその勢いでもう一回、いきましょう。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "2等当選、おめでとうございます。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "1等の内容？一日中私が身の回りを補佐して差し上げる券です。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "その不屈の精神……私も見習いたいと思います。"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "……こんなに純粋な目で尊敬を伝えてくる生徒、"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "えらいと思いませんか？"
10062-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-4 = "迅速に褒めてください。"
10062-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10062-CVGroup_CharacterGet_Idle1-1 = "ミレニアムサイエンススクール、C&C所属、コールサイン04。\n飛鳥馬トキです。\n完璧な補佐をお約束いたします。"
10062-CVGroup_Cafe_Idle1-1 = "ここは……どのような空間なのでしょう。"
10062-CVGroup_Cafe_Idle2-1 = "カフェ……聞いたことはあります。"
10062-CVGroup_Cafe_Idle3-1 = "糖分が含まれた飲料は、疲労回復に非常に有効です。"
10062-CVGroup_Cafe_Idle4-1 = "私だってお茶くらいは淹れられます……\nと言いますか、慣れております。"
10062-CVGroup_Cafe_Idle5-1 = "ここのインテリアは参考になりそうですね。"
10062-CVGroup_WeaponGet_Idle1-1 = "ここまで目をかけてくださるなんて……決めました。\nこの先、身辺警護の一切をお任せください。"
