[translation]
10078-CVGroup_UITitle_Idle1-1 = "Blue Archive~!!\nHa-ha-ha-ha-ha!"
10078-CVGroup_CharacterGet_Idle1-1 = "Ha-ha-ha-ha-ha! We are here because there is a hot spring! \nNo, even if there isn't a hot spring, we are here! \nNow, the preparations for the demolition are ready!"
10078-CVGroup_Cafe_Idle1-1 = "Oh? If it's here...?"
10078-CVGroup_Cafe_Idle2-1 = "If I dig a hot spring here..."
10078-CVGroup_Cafe_Idle3-1 = "...Oops, that's dangerous.\nThere are some troublesome folks around."
10078-CVGroup_Cafe_Idle4-1 = "Do I have to hide again even here?"
10078-CVGroup_Cafe_Idle5-1 = "Hmm... I'm bored...\nWhy don't we study something?"
10078-CVGroup_WeaponGet_Idle1-1 = "Sensei... are you really sure about this?\nContinuing to hang out with me is going to be quite a handful, you know? I've warned you!\nDon't come crying to me if things go wrong! Ha-ha-ha-ha-ha!"
10078-CVGroup_UIEventLobby_Enter1-1 = "Ha-ha-ha-ha-ha!\nWe meet again, Sensei!"
10078-CVGroup_UIEventLobby_Enter2-1 = "Sensei! Over here, over here!\nI've been waiting for you~!"
10078-CVGroup_UIEventLobby_Enter3-1 = "Isn't it just about the time things are getting busy?"
10078-CVGroup_UIEventLobby_Enter3-2 = "Come on, let me help you out a bit."
10078-CVGroup_UIEventLobby_Enter4-1 = "Come now, the end of the workday is almost here!"
10078-CVGroup_UIEventLobby_Enter4-2 = "We don't have the luxury of taking it easy! Let's go!"
10078-CVGroup_UIEventLobby_Enter5-1 = "Good work today, Sensei.\nWhy don't we take a quick look before we finish?"
10078-CVGroup_UIEventLobby_Idle1-1 = "Hmm? Do you need something?"
10078-CVGroup_UIEventLobby_Idle2-1 = "Just because you think I won't fight back, you're doing whatever you want...\nBe prepared for the consequences!"
10078-CVGroup_UIEventLobby_Idle3-1 = "Are you rushing me?"
10078-CVGroup_UIEventLobby_Idle3-2 = "...You'll be able to take responsibility for this later, right?"
10078-CVGroup_UIEventLobby_Idle4-1 = "Ha-ha-ha-ha-ha!\nStop tickling me! That tickles!"
10078-CVGroup_UIEventShop_Enter1-1 = "Now then, what are you looking for?"
10078-CVGroup_UIEventShop_Enter2-1 = "Come on! We have everything here!\nExcept for what we don't have! Ha-ha-ha-ha!"
10078-CVGroup_UIEventShop_Enter3-1 = "We're closing up shop soon!\nTake whatever you can get~!"
10078-CVGroup_UIEventShop_Idle1-1 = "Hmm? What's wrong?"
10078-CVGroup_UIEventShop_Idle2-1 = "If you keep looking away, it'll be sold out!"
10078-CVGroup_UIEventShop_Buy1-1 = "Hmm, so you chose that after all.\nSensei has a good eye for quality."
10078-CVGroup_UIEventShop_Buy2-1 = "Wonderful!"
10078-CVGroup_UIEventShop_Buy3-1 = "I see!\nThat's not bad either!"
10078-CVGroup_UIEventShop_Buy4-1 = "So that's what you wanted!"
