[translation]
10078-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！！\nハーハッハッハッハ！"
10078-CVGroup_CharacterGet_Idle1-1 = "ハーッハッハッハッ！そこに温泉があるから我々がいる！\nいや、たとえ温泉がなくとも我々がいる！\nさあ、発破の準備はできているぞ！"
10078-CVGroup_Cafe_Idle1-1 = "おっ？ここなら……？"
10078-CVGroup_Cafe_Idle2-1 = "ここに温泉を掘ったら……。"
10078-CVGroup_Cafe_Idle3-1 = "……おっと、危ない。\n困ったやつらがいるな。"
10078-CVGroup_Cafe_Idle4-1 = "ここでもまた隠れなければならないのか？"
10078-CVGroup_Cafe_Idle5-1 = "うむ……暇だ……\n勉強でもしようじゃあないか。"
10078-CVGroup_WeaponGet_Idle1-1 = "先生……本当に良いのか？\n私に付き合い続けるのは、かなり骨が折れるぞ？忠告はしたぞ！\nどうなっても私は知らないからな！ハーハッハッハッハ！"
10078-CVGroup_UIEventLobby_Enter1-1 = "ハーハッハッハッハ！\nまた会ったな、先生！"
10078-CVGroup_UIEventLobby_Enter2-1 = "先生！こっちだこっち！\n待ちわびていたぞ～！"
10078-CVGroup_UIEventLobby_Enter3-1 = "ちょうど忙しくなってきた頃合いじゃあないか？"
10078-CVGroup_UIEventLobby_Enter3-2 = "どれ、少し手伝ってやろう。"
10078-CVGroup_UIEventLobby_Enter4-1 = "さあ、もう業務終了時間が近いぞ！"
10078-CVGroup_UIEventLobby_Enter4-2 = "あまりのんびりしている余裕はない！行こう！"
10078-CVGroup_UIEventLobby_Enter5-1 = "お疲れ様だな、先生。\n最後にざっと見ていこうじゃあないか。"
10078-CVGroup_UIEventLobby_Idle1-1 = "うん？何か用かな？"
10078-CVGroup_UIEventLobby_Idle2-1 = "私が反撃しないと思って好き放題しおってからに……\n覚悟しておくのだな！"
10078-CVGroup_UIEventLobby_Idle3-1 = "それは急かしているのかな？"
10078-CVGroup_UIEventLobby_Idle3-2 = "……後でちゃ～んと責任、\n取れるんだろうな？"
10078-CVGroup_UIEventLobby_Idle4-1 = "ハーハッハッハッハ！\nくすぐるのをやめてくれ！くすぐったい！"
10078-CVGroup_UIEventShop_Enter1-1 = "さあ、何をお探しかな？"
10078-CVGroup_UIEventShop_Enter2-1 = "さあ！ここにはなんでもあるぞ！\n無いもの以外はな！ハーッハッハッハッ！"
10078-CVGroup_UIEventShop_Enter3-1 = "もう店じまいだからな！\nあるだけ持っていけ～！"
10078-CVGroup_UIEventShop_Idle1-1 = "ん？どうしたんだ？"
10078-CVGroup_UIEventShop_Idle2-1 = "よそ見をしていたら売り切れてしまうぞ！"
10078-CVGroup_UIEventShop_Buy1-1 = "うむ、やはりそれにしたのだな。\n先生は良い審美眼を持っている。"
10078-CVGroup_UIEventShop_Buy2-1 = "素晴らしい！"
10078-CVGroup_UIEventShop_Buy3-1 = "なるほど！\nそれも悪くないな！"
10078-CVGroup_UIEventShop_Buy4-1 = "それが欲しかったのだな！"
