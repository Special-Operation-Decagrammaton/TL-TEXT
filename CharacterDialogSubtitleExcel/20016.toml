[translation]
20016-CVGroup_UITitle_Idle1-1 = "はぁ……ブルーアーカイブ……。"
20016-CVGroup_CharacterGet_Idle1-1 = "はあ、どうしてこんなことに……。\nまあこうなった以上、やることはやりますよ。"
20016-CVGroup_Cafe_Idle1-1 = "静かに本を読めるところは……。"
20016-CVGroup_Cafe_Idle2-1 = "あぁ、めんどくさい……。"
20016-CVGroup_Cafe_Idle3-1 = "あんまり騒がしいのはちょっと……。"
20016-CVGroup_Cafe_Idle4-1 = "どこか、バレなさそうなところは……。"
20016-CVGroup_Cafe_Idle5-1 = "なるほど、ここなら見つからないかもしれませんね。"
20016-CVGroup_WeaponGet_Idle1-1 = "はぁ、全く……ここまでしてもらって、\n本気を出さないわけにはいかないじゃないですか。"
20016-CVGroup_UIEventLobby_Enter1-1 = "全く、問題が山積みですね。"
20016-CVGroup_UIEventLobby_Enter2-1 = "はぁ……やってられませんねー……。"
20016-CVGroup_UIEventLobby_Enter3-1 = "結構時間も経っていますが、\n間に合いそうですか？"
20016-CVGroup_UIEventLobby_Enter4-1 = "そろそろ仕上げですね……\n最後まで油断しないように。"
20016-CVGroup_UIEventLobby_Enter4-2 = "面倒ごとは嫌なので。"
20016-CVGroup_UIEventLobby_Enter5-1 = "どうやら落ち着いたようですね。\nお疲れ様でした、先生。"
20016-CVGroup_UIEventLobby_Idle1-1 = "交流会、何だかめちゃくちゃになってしまいましたね。"
20016-CVGroup_UIEventLobby_Idle2-1 = "はぁ……少しは後処理をする人の立場も考えてほしいものです。"
20016-CVGroup_UIEventLobby_Idle3-1 = "どうして他所の自治区に来てまで、後始末を……。"
20016-CVGroup_UIEventLobby_Idle4-1 = "こういうのが、中間管理職の辛いところですね。"
20016-CVGroup_UIEventMission_Enter1-1 = "この辺りが、解決しなくてはいけないものですね。"
20016-CVGroup_UIEventMission_Enter2-1 = "リストの確認、\nよろしくお願いしますよ。先生。"
20016-CVGroup_UIEventMission_Idle1-1 = "めんどくさいですが……\nだからこそ、先生がいて良かったですね。"
20016-CVGroup_UIEventMission_Idle2-1 = "だーーーるい……。"
20016-CVGroup_UIEventMission_Buy1-1 = "ふぅ……\n一件落着、ですかね。"
20016-CVGroup_UIEventMission_Buy2-1 = "解決しましたか、お疲れ様です。"
20016-CVGroup_UIEventMission_Interaction1-1 = "今日はこんなところでしょうか。\nま、お疲れ様ですと言っておきます。"
