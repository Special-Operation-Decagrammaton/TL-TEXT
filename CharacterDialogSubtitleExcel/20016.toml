[translation]
20016-CVGroup_UITitle_Idle1-1 = "Haa... Blue Archive..."
20016-CVGroup_CharacterGet_Idle1-1 = "Haa, por que as coisas terminaram assim...\nBem, já que chegamos a esse ponto, farei o que precisa ser feito."
20016-CVGroup_Cafe_Idle1-1 = "Algum lugar onde eu possa ler um livro em silêncio..."
20016-CVGroup_Cafe_Idle2-1 = "Ah, que incômodo..."
20016-CVGroup_Cafe_Idle3-1 = "Não gosto muito de lugares barulhentos..."
20016-CVGroup_Cafe_Idle4-1 = "Algum lugar onde eu não seja descoberta..."
20016-CVGroup_Cafe_Idle5-1 = "Entendo, talvez aqui eu não seja encontrada."
20016-CVGroup_WeaponGet_Idle1-1 = "Haa, francamente... Depois de fazerem tudo isso por mim,\nnão tem como eu não levar a sério, não é?"
20016-CVGroup_UIEventLobby_Enter1-1 = "Francamente, os problemas estão se acumulando."
20016-CVGroup_UIEventLobby_Enter2-1 = "Haa... Não dá para aguentar isso..."
20016-CVGroup_UIEventLobby_Enter3-1 = "Já faz um bom tempo, mas\nserá que vamos conseguir chegar a tempo?"
20016-CVGroup_UIEventLobby_Enter4-1 = "Está quase na hora de finalizar...\nNão baixe a guarda até o fim."
20016-CVGroup_UIEventLobby_Enter4-2 = "Porque eu detesto problemas."
20016-CVGroup_UIEventLobby_Enter5-1 = "Parece que as coisas se acalmaram.\nBom trabalho, Sensei."
20016-CVGroup_UIEventLobby_Idle1-1 = "A reunião de intercâmbio acabou virando uma bagunça, não é?"
20016-CVGroup_UIEventLobby_Idle2-1 = "Haa... Eu gostaria que pensassem um pouco em quem tem que lidar com a limpeza depois."
20016-CVGroup_UIEventLobby_Idle3-1 = "Por que temos que limpar a bagunça dos outros até mesmo em distritos diferentes..."
20016-CVGroup_UIEventLobby_Idle4-1 = "É esse o lado difícil de ser um gerente de nível médio."
20016-CVGroup_UIEventMission_Enter1-1 = "É por aqui que precisamos resolver as coisas, certo?"
20016-CVGroup_UIEventMission_Enter2-1 = "Por favor, verifique a lista.\nConto com você, Sensei."
20016-CVGroup_UIEventMission_Idle1-1 = "É um incômodo, mas...\nÉ por isso que é bom ter você aqui, Sensei."
20016-CVGroup_UIEventMission_Idle2-1 = "Que preguuuuiça..."
20016-CVGroup_UIEventMission_Buy1-1 = "Ufa...\nCaso encerrado, eu suponho."
20016-CVGroup_UIEventMission_Buy2-1 = "Resolveu? Bom trabalho."
20016-CVGroup_UIEventMission_Interaction1-1 = "Acho que por hoje é só.\nBem, bom trabalho para você."
