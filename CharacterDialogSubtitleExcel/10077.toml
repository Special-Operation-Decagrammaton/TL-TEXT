[translation]
10077-CVGroup_UITitle_Idle1-1 = "Blue Archive~"
10077-CVGroup_CharacterGet_Idle1-1 = "Ué, veio me buscar? \nSe tivesse avisado, eu mesma teria ido até você~ \nMais uma vez, sou Ichika, do Comitê de Realização da Justiça da Academia Trinity. Prazer em conhecê-lo!"
10077-CVGroup_Cafe_Idle1-1 = "Oh, é aqui? \nO café do Sensei!"
10077-CVGroup_Cafe_Idle2-1 = "Entendi, então esse é o seu gosto pessoal..."
10077-CVGroup_Cafe_Idle3-1 = "Aqui é tão pacífico, é muito bom!"
10077-CVGroup_Cafe_Idle4-1 = "Que relaxante..."
10077-CVGroup_Cafe_Idle5-1 = "Quer que eu ajude a organizar as coisas?..."
10077-CVGroup_WeaponGet_Idle1-1 = "Como posso dizer... bem... sou muito grata por ser tratada tão bem, \nmas não sei se tenho valor suficiente para isso... \nMas... estou feliz. De verdade."
10077-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo! \nJá estou com tudo pronto por aqui!"
10077-CVGroup_UIEventLobby_Enter2-1 = "Bom, vamos começar logo!"
10077-CVGroup_UIEventLobby_Enter3-1 = "Com isso, falta só a metade, né?"
10077-CVGroup_UIEventLobby_Enter4-1 = "Falta só um pouquinho. \nSe precisar de ajuda com qualquer coisa, é só falar!"
10077-CVGroup_UIEventLobby_Enter5-1 = "Então, vou dar uma olhadinha rápida!"
10077-CVGroup_UIEventLobby_Idle1-1 = "Sim, estou aqui."
10077-CVGroup_UIEventLobby_Idle2-1 = "Hm...? O que houve, está me encarando faz tempo?"
10077-CVGroup_UIEventLobby_Idle3-1 = "Essas brincadeiras não são legais, sabia? \nHehe."
10077-CVGroup_UIEventLobby_Idle4-1 = "Haha, Sensei, não precisa me chamar tantas vezes. \nEu estou sempre aqui esperando por você."
10077-CVGroup_UIEventMission_Enter1-1 = "Ah! Sensei! \nChegou na hora certa!"
10077-CVGroup_UIEventMission_Enter2-1 = "É para checar a lista, né? \nJá deixei tudo preparado aqui!"
10077-CVGroup_UIEventMission_Idle1-1 = "Opa! O que foi, Sensei? \nPosso revidar na mesma moeda?"
10077-CVGroup_UIEventMission_Idle2-1 = "...Da próxima vez, prepare-se!"
10077-CVGroup_UIEventMission_Buy1-1 = "Certo! Verificação concluída~!"
10077-CVGroup_UIEventMission_Buy2-1 = "É isso que você quer? \nJá vou garantir!"
10077-CVGroup_UIEventMission_Interaction1-1 = "Por hoje é só! \nHaha! Sensei, o que vamos fazer agora?"
