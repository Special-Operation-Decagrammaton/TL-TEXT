[translation]
10077-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～"
10077-CVGroup_CharacterGet_Idle1-1 = "あれっ、迎えに来てくれたっすか？\n言ってくれたらこっちから向かったのに～\n改めまして、トリニティ総合学園、正義実現委員会のイチカっす。よろしくっす！"
10077-CVGroup_Cafe_Idle1-1 = "おっ、ここっすか？\n先生のカフェ！"
10077-CVGroup_Cafe_Idle2-1 = "なるほど、こういう趣味だったんすね……。"
10077-CVGroup_Cafe_Idle3-1 = "ここ、平和でいいっすね！"
10077-CVGroup_Cafe_Idle4-1 = "落ち着く……。"
10077-CVGroup_Cafe_Idle5-1 = "片付けでも手伝いますか……。"
10077-CVGroup_WeaponGet_Idle1-1 = "なんというか……ええっと……こんなに良くしてもらえるのは、\nとてもありがたいのですけど、私にそんな価値があるかどうかは……。\nでも……嬉しいです。本当に。"
10077-CVGroup_UIEventLobby_Enter1-1 = "ようこそ！\nこっちは準備万端っすよ！"
10077-CVGroup_UIEventLobby_Enter2-1 = "さて、ぼちぼち始めるっす！"
10077-CVGroup_UIEventLobby_Enter3-1 = "これであと半分、っすかね？"
10077-CVGroup_UIEventLobby_Enter4-1 = "あと少しっすね。\n手伝えるものがあれば、なんでも言ってほしいっす！"
10077-CVGroup_UIEventLobby_Enter5-1 = "じゃ、さーっと見てみるっす！"
10077-CVGroup_UIEventLobby_Idle1-1 = "はい、私はここっすよ。"
10077-CVGroup_UIEventLobby_Idle2-1 = "ん……？さっきからどうしたんすか？"
10077-CVGroup_UIEventLobby_Idle3-1 = "そんなイタズラ、よくないっすよ～\nひひっ。"
10077-CVGroup_UIEventLobby_Idle4-1 = "はは、先生、そんな何度も呼ばなくても。\n私はここで常時待機してるっすよ。"
10077-CVGroup_UIEventMission_Enter1-1 = "はっ！先生！\nちょうどいいところに！"
10077-CVGroup_UIEventMission_Enter2-1 = "リストのチェックっすね？\nこっちに用意してありますんで！"
10077-CVGroup_UIEventMission_Idle1-1 = "おっと！なんすか、先生。\n同じこと、やり返しちゃってもいいんすか？"
10077-CVGroup_UIEventMission_Idle2-1 = "……今度、覚悟しておくっすよ！"
10077-CVGroup_UIEventMission_Buy1-1 = "はい！確認完了っす～！"
10077-CVGroup_UIEventMission_Buy2-1 = "それっすか？\n押さえておくっす！"
10077-CVGroup_UIEventMission_Interaction1-1 = "今日はこれで終わりっと！\nははっ！先生、この後は何するんすか？"
