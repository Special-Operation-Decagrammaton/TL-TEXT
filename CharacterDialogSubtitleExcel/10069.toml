[translation]
10069-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10069-CVGroup_CharacterGet_Idle1-1 = "あたしの名前は朱城ルミ。\n山海経高級中学校の玄武商会で会長をやってるんだ。\n気軽にルミって呼んでね。"
10069-CVGroup_Cafe_Idle1-1 = "ここの内装……\n商会にも活用してみようかな。"
10069-CVGroup_Cafe_Idle2-1 = "ここの茶菓は、参考になるね。"
10069-CVGroup_Cafe_Idle3-1 = "こんなのどかな時間、いつぶりだろう……？"
10069-CVGroup_Cafe_Idle4-1 = "ここで玄龍門の子たちと戦うのだけは、勘弁だなぁ。"
10069-CVGroup_Cafe_Idle5-1 = "平和だなぁ……\nん、いいこと。"
10069-CVGroup_WeaponGet_Idle1-1 = "手に馴染む道具って大事だと思う。\n調理器具も、銃も、ね。"
10069-CVGroup_UIEventLobby_Enter1-1 = "ああ、先生。待ってたよ。\nどう？山海経は？"
10069-CVGroup_UIEventLobby_Enter2-1 = "迷子にならなくてよかったね。"
10069-CVGroup_UIEventLobby_Enter2-2 = "山海経の道は入り組んでるからさ。"
10069-CVGroup_UIEventLobby_Enter3-1 = "玄龍門の子たち……\n変わらないな。よくも悪くも。"
10069-CVGroup_UIEventLobby_Enter4-1 = "心配ご無用。\nあたしは……「玄武商会」は先生の味方だから。"
10069-CVGroup_UIEventLobby_Enter5-1 = "なんだかんだ無事に終わってよかったよ。"
10069-CVGroup_UIEventLobby_Enter5-2 = "全部先生のおかげ。\n忘れ物は大丈夫？\nあったら探してくるよ。"
10069-CVGroup_UIEventLobby_Idle1-1 = "最近肩が凝っててさ……\n誰か揉んでくれないかなあ。"
10069-CVGroup_UIEventLobby_Idle1-2 = "先生とか……チラッ……。"
10069-CVGroup_UIEventLobby_Idle2-1 = "あはは、そんなにくすぐっても、なんも出ないよ？"
10069-CVGroup_UIEventLobby_Idle2-2 = "研究中の料理なら、いくらでも出すけど。"
10069-CVGroup_UIEventLobby_Idle3-1 = "お客にはいつだって最高の料理を提供するよ！"
10069-CVGroup_UIEventLobby_Idle3-2 = "まぁ……研究中の料理は、\nちょっと違うけどね。"
10069-CVGroup_UIEventLobby_Idle4-1 = "あたしにとっての先生は、何にでもなれる存在なんだ。"
10069-CVGroup_UIEventLobby_Idle4-2 = "お客様にも、仲間にも、それから……ん……"
10069-CVGroup_UIEventLobby_Idle4-3 = "ごめん、話はここまで。"
10069-CVGroup_UIEventShop_Enter1-1 = "料理で有名になっちゃったけど、"
10069-CVGroup_UIEventShop_Enter1-2 = "玄武商会の本質は商業なんだよね。"
10069-CVGroup_UIEventShop_Enter1-3 = "物品管理は、安心して任せてよ。"
10069-CVGroup_UIEventShop_Enter2-1 = "商品の発注、流通……それも大事だけど、"
10069-CVGroup_UIEventShop_Enter2-2 = "同じくらい重要なのは、商品の配置と並び。\nさ、ゆっくり見てって。"
10069-CVGroup_UIEventShop_Enter3-1 = "事は片付いたけど、まだしばらくは店を続けるつもり。"
10069-CVGroup_UIEventShop_Enter3-2 = "「九仞の功を一簣に虧く」って言うからね。"
10069-CVGroup_UIEventShop_Idle1-1 = "ん、どうしたのさ？\nなんか気になるとこでもあった？"
10069-CVGroup_UIEventShop_Idle2-1 = "必要なもの、足りないものがあったら、何でも言って。"
10069-CVGroup_UIEventShop_Idle2-2 = "……次回までには、ちゃんと仕入れとくから。"
10069-CVGroup_UIEventShop_Buy1-1 = "毎度あり！\nはは、店番なんて久しぶりだなあ。"
10069-CVGroup_UIEventShop_Buy2-1 = "それにする？良いよ。\n商品の質には、自信があるんだ。"
10069-CVGroup_UIEventShop_Buy3-1 = "売り切れる前に選んでって。\n入荷待ちほどつらいことは……ないからね。"
10069-CVGroup_UIEventShop_Buy4-1 = "先生も知ってる通り、取引にタダはない。"
10069-CVGroup_UIEventShop_Buy4-2 = "何かが無償で与えられたのなら……"
10069-CVGroup_UIEventShop_Buy4-3 = "それは知らないうちに、先生自身が商品になってるんだよ。"
10069-CVGroup_UIEventCardShop_Enter1-1 = "はい、先生。\n運試しの時間だよ。"
10069-CVGroup_UIEventCardShop_Enter2-1 = "さ、選んで選んで。\n何が出るかな？"
10069-CVGroup_UIEventCardShop_Enter3-1 = "後悔しないよう、ここで全部使っていって。"
10069-CVGroup_UIEventCardShop_Idle1-1 = "商会の仕事も色々あるんだ。\nこれもその一つ。"
10069-CVGroup_UIEventCardShop_Idle2-1 = "何事も、運は大事。"
10069-CVGroup_UIEventCardShop_Prize3-1 = "すごい！これは驚いたよ。\nおめでとう、先生。"
10069-CVGroup_UIEventCardShop_Prize2-1 = "なかなか出ないカードなのに、やるね。"
10069-CVGroup_UIEventCardShop_Prize2-2 = "こっちも楽しくなってきた。"
10069-CVGroup_UIEventCardShop_Prize1-1 = "どれどれ……結果は……？\nま、いいんじゃない？"
10069-CVGroup_UIEventCardShop_Prize0-1 = "ありゃあ……\nまぁまぁ、そう落ち込まないで、先生。\n次があるからさ。"
