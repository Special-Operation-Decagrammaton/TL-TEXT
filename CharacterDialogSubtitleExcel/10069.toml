[translation]
10069-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10069-CVGroup_CharacterGet_Idle1-1 = "Meu nome é Akeshiro Rumi.\nSou a presidente da Associação Genbu da Academia Shanhaijing.\nPode me chamar de Rumi, sem cerimônia."
10069-CVGroup_Cafe_Idle1-1 = "Essa decoração interna...\nSerá que eu deveria usar algo assim na associação?"
10069-CVGroup_Cafe_Idle2-1 = "Os doces daqui servem como uma boa referência."
10069-CVGroup_Cafe_Idle3-1 = "Faz quanto tempo que não tenho um momento tão tranquilo assim...?"
10069-CVGroup_Cafe_Idle4-1 = "A única coisa que eu não gostaria é ter que lutar contra o pessoal da Genryumon aqui."
10069-CVGroup_Cafe_Idle5-1 = "Que paz...\nHum, é muito bom."
10069-CVGroup_WeaponGet_Idle1-1 = "Acho importante ter ferramentas que se encaixam bem na mão.\nSejam utensílios de cozinha ou armas."
10069-CVGroup_UIEventLobby_Enter1-1 = "Ah, Sensei. Estava te esperando.\nE então? O que achou de Shanhaijing?"
10069-CVGroup_UIEventLobby_Enter2-1 = "Que bom que não se perdeu."
10069-CVGroup_UIEventLobby_Enter2-2 = "As ruas de Shanhaijing são bem complicadas, afinal."
10069-CVGroup_UIEventLobby_Enter3-1 = "O pessoal da Genryumon...\nEles não mudam. Para o bem ou para o mal."
10069-CVGroup_UIEventLobby_Enter4-1 = "Não se preocupe.\nEu... a Associação Genbu está do lado do Sensei."
10069-CVGroup_UIEventLobby_Enter5-1 = "No fim das contas, fico feliz que tudo tenha terminado bem."
10069-CVGroup_UIEventLobby_Enter5-2 = "Tudo graças ao Sensei. Esqueceu alguma coisa?\nSe tiver esquecido, eu vou buscar para você."
10069-CVGroup_UIEventLobby_Idle1-1 = "Meus ombros estão tensos ultimamente...\nSerá que alguém poderia massageá-los?"
10069-CVGroup_UIEventLobby_Idle1-2 = "Como o Sensei, por exemplo... *olhadinha*."
10069-CVGroup_UIEventLobby_Idle2-1 = "Ahaha, não adianta fazer cócegas, não vai sair nada daqui!"
10069-CVGroup_UIEventLobby_Idle2-2 = "Se for sobre a comida que estou pesquisando, posso te dar o quanto quiser."
10069-CVGroup_UIEventLobby_Idle3-1 = "Sempre ofereço a melhor comida para os clientes!"
10069-CVGroup_UIEventLobby_Idle3-2 = "Bem... a comida que estou pesquisando é um pouco diferente, claro."
10069-CVGroup_UIEventLobby_Idle4-1 = "Para mim, o Sensei é alguém que pode ser qualquer coisa."
10069-CVGroup_UIEventLobby_Idle4-2 = "Um cliente, um companheiro, e então... hum..."
10069-CVGroup_UIEventLobby_Idle4-3 = "Desculpe, vamos parar por aqui."
10069-CVGroup_UIEventShop_Enter1-1 = "Fiquei famosa pela minha comida, mas..."
10069-CVGroup_UIEventShop_Enter1-2 = "A essência da Associação Genbu é o comércio."
10069-CVGroup_UIEventShop_Enter1-3 = "Pode deixar a gestão dos itens comigo, sem preocupações."
10069-CVGroup_UIEventShop_Enter2-1 = "Fazer pedidos e gerenciar o estoque é importante, mas..."
10069-CVGroup_UIEventShop_Enter2-2 = "Tão importante quanto isso é a disposição e a organização dos produtos.\nVamos, dê uma olhada com calma."
10069-CVGroup_UIEventShop_Enter3-1 = "As coisas se resolveram, mas pretendo continuar com a loja por mais um tempo."
10069-CVGroup_UIEventShop_Enter3-2 = "Como dizem, 'não se deve desistir quando se está perto do objetivo'."
10069-CVGroup_UIEventShop_Idle1-1 = "Hum, o que foi?\nTem algo que te chamou a atenção?"
10069-CVGroup_UIEventShop_Idle2-1 = "Se precisar de algo ou se algo estiver faltando, é só me dizer."
10069-CVGroup_UIEventShop_Idle2-2 = "...Da próxima vez, eu garanto que terei em estoque."
10069-CVGroup_UIEventShop_Buy1-1 = "Obrigada pela preferência!\nHaha, faz tempo que não fico no balcão."
10069-CVGroup_UIEventShop_Buy2-1 = "Vai levar esse? Ótima escolha.\nTenho confiança na qualidade dos meus produtos."
10069-CVGroup_UIEventShop_Buy3-1 = "Escolha antes que acabe.\nNão há nada pior do que ficar esperando reposição..."
10069-CVGroup_UIEventShop_Buy4-1 = "Como o Sensei bem sabe, não existe almoço grátis nas negociações."
10069-CVGroup_UIEventShop_Buy4-2 = "Se algo foi dado de graça..."
10069-CVGroup_UIEventShop_Buy4-3 = "É porque, sem perceber, o próprio Sensei se tornou o produto."
10069-CVGroup_UIEventCardShop_Enter1-1 = "Aqui está, Sensei.\nÉ hora de testar a sorte."
10069-CVGroup_UIEventCardShop_Enter2-1 = "Vamos, escolha, escolha.\nO que será que vai sair?"
10069-CVGroup_UIEventCardShop_Enter3-1 = "Para não se arrepender, gaste tudo aqui."
10069-CVGroup_UIEventCardShop_Idle1-1 = "O trabalho da associação envolve muitas coisas.\nIsso é apenas uma delas."
10069-CVGroup_UIEventCardShop_Idle2-1 = "Em tudo, a sorte é importante."
10069-CVGroup_UIEventCardShop_Prize3-1 = "Incrível! Fiquei surpresa.\nParabéns, Sensei."
10069-CVGroup_UIEventCardShop_Prize2-1 = "É uma carta difícil de sair, você manda bem."
10069-CVGroup_UIEventCardShop_Prize2-2 = "Até eu estou me divertindo agora."
10069-CVGroup_UIEventCardShop_Prize1-1 = "Vejamos... o resultado é...?\nBem, não está ruim, não é?"
10069-CVGroup_UIEventCardShop_Prize0-1 = "Ah, puxa...\nBem, não fique tão desanimado, Sensei.\nSempre haverá uma próxima vez."
