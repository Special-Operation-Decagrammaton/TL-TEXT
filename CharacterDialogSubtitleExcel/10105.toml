[translation]
10105-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10105-CVGroup_CharacterGet_Idle1-1 = "Eu não tenho muita experiência como idol, mas...\nFarei o meu melhor.\nConto com você, Sensei!"
10105-CVGroup_Cafe_Idle1-1 = "Este é um lugar muito confortável."
10105-CVGroup_Cafe_Idle2-1 = "Sinto como se estivessem me observando...?"
10105-CVGroup_Cafe_Idle3-1 = "O que faremos agora...?"
10105-CVGroup_Cafe_Idle4-1 = "Há algo em que eu possa ajudar?"
10105-CVGroup_Cafe_Idle5-1 = "Sessão de autógrafos...?\nCheki...?"
10105-CVGroup_WeaponGet_Idle1-1 = "Sinto que agora posso dizer qualquer coisa para você, Sensei.\nEntão... por favor, ouça e depois esqueça.\n...Fique sempre ao meu lado, de agora em diante.\nÉ uma promessa."
10105-CVGroup_UIEventLobby_Enter1-1 = "Olá, Sensei."
10105-CVGroup_UIEventLobby_Enter1-2 = "Se quiser, por favor...\nAssista ao meu show!"
10105-CVGroup_UIEventLobby_Enter2-1 = "Está pronto?"
10105-CVGroup_UIEventLobby_Enter2-2 = "O show vai começar em breve!"
10105-CVGroup_UIEventLobby_Enter3-1 = "O show ainda vai continuar!"
10105-CVGroup_UIEventLobby_Enter4-1 = "Vamos dar o nosso melhor\nna segunda parte do show!"
10105-CVGroup_UIEventLobby_Enter5-1 = "Ufa... Dei tudo de mim!"
10105-CVGroup_UIEventLobby_Enter5-2 = "Será que o Sensei se divertiu?"
10105-CVGroup_UIEventLobby_Idle1-1 = "Ah, Sensei,\no que houve?"
10105-CVGroup_UIEventLobby_Idle2-1 = "Uau! E-espere um pouco!"
10105-CVGroup_UIEventLobby_Idle2-2 = "É-é que agora, b-bem...\nEu estou suada..."
10105-CVGroup_UIEventLobby_Idle3-1 = "Um autógrafo... quer dizer?"
10105-CVGroup_UIEventLobby_Idle3-2 = "D-desculpe, eu não pensei em nada disso...!"
10105-CVGroup_UIEventLobby_Idle4-1 = "Vou fazer deste o melhor show, sem arrependimentos!"
10105-CVGroup_UIEventShop_Enter1-1 = "O que está procurando?"
10105-CVGroup_UIEventShop_Enter2-1 = "Escolha o que quiser!\nMinha recomendação é..."
10105-CVGroup_UIEventShop_Enter3-1 = "Cuidado para não\nesquecer nada!"
10105-CVGroup_UIEventShop_Idle1-1 = "S-Sensei...?"
10105-CVGroup_UIEventShop_Idle2-1 = "N-não olhe para mim... olhe para lá..."
10105-CVGroup_UIEventShop_Idle2-2 = "Fufu, ahaha...!"
10105-CVGroup_UIEventShop_Buy1-1 = "Esse, então.\nAcho uma escolha maravilhosa!"
10105-CVGroup_UIEventShop_Buy2-1 = "Eu também estava de olho nesse."
10105-CVGroup_UIEventShop_Buy3-1 = "Vai levar esse?\nSim, aqui está."
10105-CVGroup_UIEventShop_Buy4-1 = "Este aqui, certo?\nSim, aqui está."
