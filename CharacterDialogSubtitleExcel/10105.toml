[translation]
10105-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10105-CVGroup_CharacterGet_Idle1-1 = "アイドルはあまりやったことがありませんが……\n精いっぱい努めて参りますね。\nよろしくお願いいたします、先生！"
10105-CVGroup_Cafe_Idle1-1 = "とても心地よい空間ですね。"
10105-CVGroup_Cafe_Idle2-1 = "何か視線を感じるような……？"
10105-CVGroup_Cafe_Idle3-1 = "次はなにをしましょう……？"
10105-CVGroup_Cafe_Idle4-1 = "何かお手伝いできることはありませんか？"
10105-CVGroup_Cafe_Idle5-1 = "握手会……？\nチェキ……？"
10105-CVGroup_WeaponGet_Idle1-1 = "今なら、なんでも先生に言えるような気がするんです。\nその……なので、聞いても忘れてくださいね。\n……これからも、ずっと私のそばにいてください。\n約束ですよ。"
10105-CVGroup_UIEventLobby_Enter1-1 = "こんにちは、先生。"
10105-CVGroup_UIEventLobby_Enter1-2 = "よろしければ、私のステージ……\n見ていってください！"
10105-CVGroup_UIEventLobby_Enter2-1 = "準備はよろしいですか？"
10105-CVGroup_UIEventLobby_Enter2-2 = "間もなく、ライブがはじまります！"
10105-CVGroup_UIEventLobby_Enter3-1 = "まだまだライブは続きますよ！"
10105-CVGroup_UIEventLobby_Enter4-1 = "ライブ後半戦、\n頑張りましょう！"
10105-CVGroup_UIEventLobby_Enter5-1 = "ふぅ……目一杯出し切りました！"
10105-CVGroup_UIEventLobby_Enter5-2 = "先生は楽しめたでしょうか？"
10105-CVGroup_UIEventLobby_Idle1-1 = "あら先生、\nどうなさいました？"
10105-CVGroup_UIEventLobby_Idle2-1 = "わっ！ま、待ってください！"
10105-CVGroup_UIEventLobby_Idle2-2 = "い、今は、そ、その……\n汗をかいてますから……"
10105-CVGroup_UIEventLobby_Idle3-1 = "サイン……ですか？"
10105-CVGroup_UIEventLobby_Idle3-2 = "す、すみません全然考えてなくて……！"
10105-CVGroup_UIEventLobby_Idle4-1 = "悔いの残らない、最高のステージにしてみせます！"
10105-CVGroup_UIEventShop_Enter1-1 = "何をお探しでしょうか？"
10105-CVGroup_UIEventShop_Enter2-1 = "お好きなものをどうぞ！\n私のオススメは……"
10105-CVGroup_UIEventShop_Enter3-1 = "お忘れ物がないよう、\nお気をつけください！"
10105-CVGroup_UIEventShop_Idle1-1 = "せ、先生……？"
10105-CVGroup_UIEventShop_Idle2-1 = "わ、私ではなく……あちらを……"
10105-CVGroup_UIEventShop_Idle2-2 = "ふふ、あははっ……！"
10105-CVGroup_UIEventShop_Buy1-1 = "そちらですね。\nとても素敵だと思います！"
10105-CVGroup_UIEventShop_Buy2-1 = "私もそれ気になっていました。"
10105-CVGroup_UIEventShop_Buy3-1 = "そちらになさいますか？\nはい、どうぞ。"
10105-CVGroup_UIEventShop_Buy4-1 = "こちらですね。\nはい、どうぞ。"
