[translation]
13010-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
13010-CVGroup_CharacterGet_Idle1-1 = "条件はクリアされました。\n私たちは今日この瞬間を絆と定義し、\n証明することになるでしょう。"
13010-CVGroup_Cafe_Idle1-1 = "あれ？こんな空間あったっけ？"
13010-CVGroup_Cafe_Idle2-1 = "このままだと破産する……。\n出費を減らさないと……。"
13010-CVGroup_Cafe_Idle3-1 = "うん？少し休んでいきますか？\n私も、約1890秒くらいの余裕はありますから。"
13010-CVGroup_Cafe_Idle4-1 = "なんだか今日は楽しいことがありそうな気がする。\n確率的に～"
13010-CVGroup_WeaponGet_Idle1-1 = "これは……\nものすごいプラスになるやつだ！"
