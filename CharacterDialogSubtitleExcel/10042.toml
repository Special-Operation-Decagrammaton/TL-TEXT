[translation]
10042-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10042-CVGroup_CharacterGet_Idle1-1 = "……私の名前は秤アツコ。\n先生は、私に何を望むの？\nそれが私にできることなら良いけど。"
10042-CVGroup_Cafe_Idle1-1 = "ふーん？"
10042-CVGroup_Cafe_Idle2-1 = "少し落ち着かないけど……\nうん、嫌じゃない。"
10042-CVGroup_Cafe_Idle3-1 = "これが、普通の会話……？"
10042-CVGroup_Cafe_Idle4-1 = "ここ……花を置いたら良さそう。"
10042-CVGroup_WeaponGet_Idle1-1 = "考えることを諦めて、決めることを諦めて……\nただ、決まった運命をなぞって生きてきた。\nでも、これからは……うん。ありがとう、先生。"
