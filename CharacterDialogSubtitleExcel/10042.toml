[translation]
10042-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10042-CVGroup_CharacterGet_Idle1-1 = "……Meu nome é Atsuko Hakarime.\nO que você deseja de mim, Sensei?\nEspero que seja algo que eu possa fazer."
10042-CVGroup_Cafe_Idle1-1 = "Hmm?"
10042-CVGroup_Cafe_Idle2-1 = "É um pouco inquietante, mas……\nSim, eu não desgosto."
10042-CVGroup_Cafe_Idle3-1 = "Isso é uma conversa normal……?"
10042-CVGroup_Cafe_Idle4-1 = "Aqui…… seria bom colocar algumas flores."
10042-CVGroup_WeaponGet_Idle1-1 = "Desisti de pensar, desisti de decidir……\nE apenas vivi seguindo um destino traçado.\nMas, de agora em diante…… Sim. Obrigada, Sensei."
