[translation]
10091-CVGroup_UITitle_Idle1-1 = "あ、あー……ブルーアーカイブ。"
10091-CVGroup_CharacterGet_Idle1-1 = "ボーカルか……まぁ、こうなった以上頑張るよ。\nよろしくね、先生。"
10091-CVGroup_Cafe_Idle1-1 = "うわっ……人多っ！\n大丈夫？ここ。"
10091-CVGroup_Cafe_Idle2-1 = "ここで歌ったら浮いちゃうよね？"
10091-CVGroup_Cafe_Idle3-1 = "ちょっと歌ったら、お腹空いてきたな。"
10091-CVGroup_Cafe_Idle4-1 = "目立ったりしないよね？\n……まぁ、考えすぎか。"
10091-CVGroup_Cafe_Idle5-1 = "みんな、どこに居るんだろ。"
10091-CVGroup_WeaponGet_Idle1-1 = "ほんと、まさかこんなことになるなんて。\nふふ……今更だけど、先生に会えて本当に良かった。\n……ありがとうございます。"
10091-CVGroup_UIEventLobby_Enter1-1 = "いらっしゃい、先生！"
10091-CVGroup_UIEventLobby_Enter1-2 = "ちょっと練習手伝ってくれない？"
10091-CVGroup_UIEventLobby_Enter2-1 = "あ、あ、ああぁー"
10091-CVGroup_UIEventLobby_Enter2-2 = "……うわっ！？先生！？\nいつから……！"
10091-CVGroup_UIEventLobby_Enter3-1 = "上手くいくような気が……"
10091-CVGroup_UIEventLobby_Enter3-2 = "するような、しないような……。"
10091-CVGroup_UIEventLobby_Enter4-1 = "集中！集中！"
10091-CVGroup_UIEventLobby_Enter4-2 = "まだ終わってないんだし！"
10091-CVGroup_UIEventLobby_Enter5-1 = "ふぅ……。"
10091-CVGroup_UIEventLobby_Enter5-2 = "先生、その……"
10091-CVGroup_UIEventLobby_Enter5-3 = "ど、どうだった……？"
10091-CVGroup_UIEventLobby_Idle1-1 = "……ん？マイクに興味あるの？"
10091-CVGroup_UIEventLobby_Idle1-2 = "先生も一曲、歌ってみる？"
10091-CVGroup_UIEventLobby_Idle2-1 = "ん？何か必要なものでも？"
10091-CVGroup_UIEventLobby_Idle3-1 = "もう……またつついて……"
10091-CVGroup_UIEventLobby_Idle3-2 = "今度こそ怒るよ？"
10091-CVGroup_UIEventLobby_Idle4-1 = "ああ、もう！"
10091-CVGroup_UIEventLobby_Idle4-2 = "用があるなら、ちゃんと言葉にして！"
10091-CVGroup_UIEventMission_Enter1-1 = "こんにちは、今日も様子見？"
10091-CVGroup_UIEventMission_Enter2-1 = "進捗状況を見に来たの？"
10091-CVGroup_UIEventMission_Idle1-1 = "私ばっか見てないで、\nちゃんと集中してよね。"
10091-CVGroup_UIEventMission_Idle2-1 = "こらっ！ダメ。"
10091-CVGroup_UIEventMission_Buy1-1 = "うん、オッケー！"
10091-CVGroup_UIEventMission_Buy2-1 = "おお、良かったね。"
10091-CVGroup_UIEventMission_Interaction1-1 = "今日はこれでおしまい！\nお疲れ、先生。"
