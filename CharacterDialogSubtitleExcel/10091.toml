[translation]
10091-CVGroup_UITitle_Idle1-1 = "Ah, ah... Blue Archive."
10091-CVGroup_CharacterGet_Idle1-1 = "Vocalista, hein... Bem, já que as coisas chegaram a esse ponto, vou dar o meu melhor.\nPrazer em conhecê-lo, Sensei."
10091-CVGroup_Cafe_Idle1-1 = "Uau... quanta gente!\nIsso aqui é seguro?"
10091-CVGroup_Cafe_Idle2-1 = "Se eu cantar aqui, vou acabar chamando muita atenção, né?"
10091-CVGroup_Cafe_Idle3-1 = "Cantei um pouco e já estou com fome."
10091-CVGroup_Cafe_Idle4-1 = "Não vou acabar me destacando demais, né?\n...Bem, talvez eu esteja pensando demais."
10091-CVGroup_Cafe_Idle5-1 = "Onde será que todo mundo está?"
10091-CVGroup_WeaponGet_Idle1-1 = "Sério, quem diria que as coisas terminariam assim.\nHehe... é um pouco tarde para dizer, mas estou muito feliz por ter conhecido você, Sensei.\n...Muito obrigada."
10091-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo, Sensei!"
10091-CVGroup_UIEventLobby_Enter1-2 = "Pode me ajudar com um pouco de treino?"
10091-CVGroup_UIEventLobby_Enter2-1 = "Ah, ah, ahhh..."
10091-CVGroup_UIEventLobby_Enter2-2 = "...Ué!? Sensei!?\nDesde quando você está aí...!"
10091-CVGroup_UIEventLobby_Enter3-1 = "Sinto que vai dar certo..."
10091-CVGroup_UIEventLobby_Enter3-2 = "Ou talvez não, quem sabe..."
10091-CVGroup_UIEventLobby_Enter4-1 = "Foco! Foco!"
10091-CVGroup_UIEventLobby_Enter4-2 = "Ainda não terminamos!"
10091-CVGroup_UIEventLobby_Enter5-1 = "Ufa..."
10091-CVGroup_UIEventLobby_Enter5-2 = "Sensei, sobre aquilo..."
10091-CVGroup_UIEventLobby_Enter5-3 = "O-o que você achou...?"
10091-CVGroup_UIEventLobby_Idle1-1 = "...Hm? Está interessado no microfone?"
10091-CVGroup_UIEventLobby_Idle1-2 = "Quer cantar uma música também, Sensei?"
10091-CVGroup_UIEventLobby_Idle2-1 = "Hm? Precisa de alguma coisa?"
10091-CVGroup_UIEventLobby_Idle3-1 = "Qual é... de novo cutucando..."
10091-CVGroup_UIEventLobby_Idle3-2 = "Desta vez eu vou ficar brava, viu?"
10091-CVGroup_UIEventLobby_Idle4-1 = "Ah, chega!"
10091-CVGroup_UIEventLobby_Idle4-2 = "Se precisa de algo, fale logo!"
10091-CVGroup_UIEventMission_Enter1-1 = "Olá, veio ver como as coisas estão hoje?"
10091-CVGroup_UIEventMission_Enter2-1 = "Veio conferir o progresso?"
10091-CVGroup_UIEventMission_Idle1-1 = "Não fique só me olhando,\nconcentre-se no que precisa fazer."
10091-CVGroup_UIEventMission_Idle2-1 = "Ei! Não pode."
10091-CVGroup_UIEventMission_Buy1-1 = "Certo, ok!"
10091-CVGroup_UIEventMission_Buy2-1 = "Oh, que bom."
10091-CVGroup_UIEventMission_Interaction1-1 = "Por hoje é só!\nBom trabalho, Sensei."
