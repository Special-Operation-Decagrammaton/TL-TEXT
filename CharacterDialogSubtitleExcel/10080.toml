[translation]
10080-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10080-CVGroup_CharacterGet_Idle1-1 = "Ora, eu já deveria ter me apresentado... \nSerá que você não se lembra? Ufufu."
10080-CVGroup_Cafe_Idle1-1 = "Ora, não é uma decoração bem bonitinha?"
10080-CVGroup_Cafe_Idle2-1 = "Você tem bom gosto, não tem?"
10080-CVGroup_Cafe_Idle3-1 = "Tem muita gente interessante por aqui, né."
10080-CVGroup_Cafe_Idle4-1 = "De alguma forma... é um lugar relaxante."
10080-CVGroup_Cafe_Idle5-1 = "Será porque é um lugar onde não preciso me preocupar com nada... \nNão é nada mal."
10080-CVGroup_WeaponGet_Idle1-1 = "Você também é uma pessoa peculiar. Ah, não digo isso de um jeito ruim. \n...Normalmente, eu não confiaria em alguém cujos pensamentos não consigo ler... \nMas acho que vou considerar que você não está me suspeitando, certo?"
10080-CVGroup_UIEventLobby_Enter1-1 = "Eu estava te esperando, Sensei. \nEntão, vamos começar?"
10080-CVGroup_UIEventLobby_Enter2-1 = "Quer que eu ajude com alguma coisa?"
10080-CVGroup_UIEventLobby_Enter2-2 = "Isso é assunto meu também, então vou cooperar☆"
10080-CVGroup_UIEventLobby_Enter3-1 = "Está indo tudo bem?"
10080-CVGroup_UIEventLobby_Enter4-1 = "Será que já estamos vendo o fim disso?"
10080-CVGroup_UIEventLobby_Enter5-1 = "É bom verificar mais uma vez \npara ver se não esqueceu de nada, viu☆"
10080-CVGroup_UIEventLobby_Idle1-1 = "Hã? Você vai fazer isso mesmo?"
10080-CVGroup_UIEventLobby_Idle2-1 = "Não tem mais nada para fazer, não?"
10080-CVGroup_UIEventLobby_Idle3-1 = "...Minha paciência também tem limites, viu☆"
10080-CVGroup_UIEventLobby_Idle4-1 = "...Ora, ora. \nIsso aqui vai dar certo?"
10080-CVGroup_UIEventMission_Enter1-1 = "Vamos verificar o progresso."
10080-CVGroup_UIEventMission_Enter2-1 = "Veio conferir, né? \nQuer que eu ajude com alguma coisa?"
10080-CVGroup_UIEventMission_Idle1-1 = "Parece que você não conhece a palavra 'desistir', né?"
10080-CVGroup_UIEventMission_Idle2-1 = "Hã...?"
10080-CVGroup_UIEventMission_Buy1-1 = "Você se esforçou bastante, não foi? \nVou te elogiar por isso☆"
10080-CVGroup_UIEventMission_Buy2-1 = "Até que você é útil, não é?"
