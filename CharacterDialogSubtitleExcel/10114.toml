[translation]
10114-CVGroup_UITitle_Idle1-1 = "ブル～ア～カイブ！"
10114-CVGroup_CharacterGet_Idle1-1 = "いらっしゃいませ！先生！\nお決まりになりましたらお呼びください！\n愛情を込めて、おもてなしいたします！"
10114-CVGroup_Cafe_Idle1-1 = "わぁ！素敵なカフェですね！\n是非見学させてください！"
10114-CVGroup_Cafe_Idle2-1 = "わあ……この内装素敵……"
10114-CVGroup_Cafe_Idle3-1 = "（あっ、このレシピは……！）"
10114-CVGroup_Cafe_Idle4-1 = "導線はこう……でしょうか。\n勉強になります。"
10114-CVGroup_Cafe_Idle5-1 = "ウェイトレスなのに、カフェで一休み……\nなんだか変な感じですね……"
10114-CVGroup_WeaponGet_Idle1-1 = "キヴォトスでは当たり前ですが\nウェイトレスも、銃を携帯すべきだと思うんです！\n無茶なオーダーをするお客様の対応や、\n暴れ始めた食材を鎮めるための――え、違うんですか？"
10114-CVGroup_UIEventLobby_Enter1-1 = "ゲヘナ学園までお越しくださり……ありがとうございます！"
10114-CVGroup_UIEventLobby_Enter1-2 = "どうか楽しいひと時をお過ごしくださいね。"
10114-CVGroup_UIEventLobby_Enter2-1 = "わあ！先生、来てくださったんですね！"
10114-CVGroup_UIEventLobby_Enter2-2 = "この制服……に、似合ってますか？"
10114-CVGroup_UIEventLobby_Enter3-1 = "ひぃん……うう……"
10114-CVGroup_UIEventLobby_Enter3-2 = "パンちゃんが……\n私のせいです……なんとかしないと……！"
10114-CVGroup_UIEventLobby_Enter4-1 = "このまま放っておくわけにはいきません……"
10114-CVGroup_UIEventLobby_Enter4-2 = "私は、ゲヘナの生徒ですから！"
10114-CVGroup_UIEventLobby_Enter5-1 = "一時はどうなることかと思いましたが……"
10114-CVGroup_UIEventLobby_Enter5-2 = "先生のおかげでどうにかなりました！ありがとうございます！"
10114-CVGroup_UIEventLobby_Idle1-1 = "カフェのアルバイトで、\n制服を着ることになったんです。"
10114-CVGroup_UIEventLobby_Idle2-1 = "よろしければ……一息ついていきませんか？"
10114-CVGroup_UIEventLobby_Idle3-1 = "カフェのお仕事、すごく楽しいです。"
10114-CVGroup_UIEventLobby_Idle3-2 = "でもお料理はあまりしないので……"
10114-CVGroup_UIEventLobby_Idle3-3 = "給食部のお仕事をもっと頑張らなきゃって思いました！"
10114-CVGroup_UIEventLobby_Idle4-1 = "あはは！先生！くすぐったいです……！"
10114-CVGroup_UIEventLobby_Idle4-2 = "……ふぅ、ありがとうございます。"
10114-CVGroup_UIEventLobby_Idle4-3 = "おかげさまで、少しリラックスできました。"
10114-CVGroup_UIEventShop_Enter1-1 = "お待ちしておりました、先生！こちらへどうぞ！"
10114-CVGroup_UIEventShop_Enter2-1 = "メニューをお持ちしましょうか？"
10114-CVGroup_UIEventShop_Enter3-1 = "ふふっ、先生。"
10114-CVGroup_UIEventShop_Enter3-2 = "最後まで、ごゆっくりお楽しみください！"
10114-CVGroup_UIEventShop_Idle1-1 = "アルバイト中、動きを褒めていただけることが多いんです……"
10114-CVGroup_UIEventShop_Idle1-2 = "給食部での経験が活きているのでしょうか？"
10114-CVGroup_UIEventShop_Idle2-1 = "はい先生、何かご注文ですか？"
10114-CVGroup_UIEventShop_Idle2-2 = "先生にお呼びいただいただけで……"
10114-CVGroup_UIEventShop_Idle2-3 = "私はとても嬉しいです！"
10114-CVGroup_UIEventShop_Buy1-1 = "分かりました！今すぐご用意します！"
10114-CVGroup_UIEventShop_Buy2-1 = "そちらですね！\nただいまお持ちしますので、少々お待ちください。"
10114-CVGroup_UIEventShop_Buy3-1 = "在庫は十分にあります！ご心配なく！"
10114-CVGroup_UIEventShop_Buy4-1 = "もし足りないものがありましたら、\nいつでも仰ってくださいね！"
10114-CVGroup_UIEventMission_Enter1-1 = "カフェでも仕込みは大事です！\n給食部との共通点ですね。"
10114-CVGroup_UIEventMission_Enter2-1 = "日課……コツコツできて、私は好きです。"
10114-CVGroup_UIEventMission_Idle1-1 = "注文を受けて、お料理を運ぶ……"
10114-CVGroup_UIEventMission_Idle1-2 = "これがウェイトレスの「ミッション」です。"
10114-CVGroup_UIEventMission_Idle2-1 = "先生、何かお手伝いできること、ありますか？"
10114-CVGroup_UIEventMission_Buy1-1 = "すごいです！先生！\nはいこちら、受け取ってください！"
10114-CVGroup_UIEventMission_Buy2-1 = "努力が報われるって……\n素敵ですよね。"
10114-CVGroup_UIEventMission_Interaction1-1 = "今日も一日、お疲れ様でした！"
10114-CVGroup_UIEventMission_Interaction1-2 = "先生のお手伝いができて、嬉しかったです！"
