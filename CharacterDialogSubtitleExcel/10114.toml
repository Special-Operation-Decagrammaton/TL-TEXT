[translation]
10114-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10114-CVGroup_CharacterGet_Idle1-1 = "Seja bem-vindo, Sensei!\nPor favor, me chame quando já tiver decidido o que quer!\nIrei atendê-lo com todo o meu carinho!"
10114-CVGroup_Cafe_Idle1-1 = "Uau! Que café maravilhoso!\nPor favor, deixe-me dar uma olhada!"
10114-CVGroup_Cafe_Idle2-1 = "Uau... essa decoração é linda..."
10114-CVGroup_Cafe_Idle3-1 = "(Ah, essa receita é...!)"
10114-CVGroup_Cafe_Idle4-1 = "O fluxo de atendimento é assim... entendi.\nEstou aprendendo muito."
10114-CVGroup_Cafe_Idle5-1 = "Mesmo sendo uma garçonete, tirar uma folga no café...\nÉ uma sensação um pouco estranha..."
10114-CVGroup_WeaponGet_Idle1-1 = "É algo comum em Kivotos, mas\neu acho que garçonetes também deveriam portar armas!\nPara lidar com clientes que fazem pedidos absurdos ou\npara acalmar ingredientes que começam a se rebelar... hein, não é assim?"
10114-CVGroup_UIEventLobby_Enter1-1 = "Obrigada por vir até a Academia Gehenna..."
10114-CVGroup_UIEventLobby_Enter1-2 = "Por favor, aproveite um momento agradável aqui."
10114-CVGroup_UIEventLobby_Enter2-1 = "Uau! Sensei, você veio me ver!"
10114-CVGroup_UIEventLobby_Enter2-2 = "Este uniforme... e-está bom em mim?"
10114-CVGroup_UIEventLobby_Enter3-1 = "Hiiin... uuu..."
10114-CVGroup_UIEventLobby_Enter3-2 = "O Pan-chan... \né culpa minha... preciso dar um jeito nisso...!"
10114-CVGroup_UIEventLobby_Enter4-1 = "Não posso simplesmente deixar as coisas como estão..."
10114-CVGroup_UIEventLobby_Enter4-2 = "Afinal, eu sou uma aluna de Gehenna!"
10114-CVGroup_UIEventLobby_Enter5-1 = "Por um momento, achei que tudo estava perdido..."
10114-CVGroup_UIEventLobby_Enter5-2 = "Graças ao Sensei, tudo deu certo! Muito obrigada!"
10114-CVGroup_UIEventLobby_Idle1-1 = "Comecei a trabalhar meio período no café,\nentão acabei usando este uniforme."
10114-CVGroup_UIEventLobby_Idle2-1 = "Se não se importar... gostaria de descansar um pouco?"
10114-CVGroup_UIEventLobby_Idle3-1 = "O trabalho no café é muito divertido."
10114-CVGroup_UIEventLobby_Idle3-2 = "Mas como não cozinho muito..."
10114-CVGroup_UIEventLobby_Idle3-3 = "Pensei que preciso me esforçar mais no Clube de Merenda!"
10114-CVGroup_UIEventLobby_Idle4-1 = "Ahaha! Sensei! Isso faz cócegas...!"
10114-CVGroup_UIEventLobby_Idle4-2 = "...Ufa, obrigada."
10114-CVGroup_UIEventLobby_Idle4-3 = "Graças a você, consegui relaxar um pouco."
10114-CVGroup_UIEventShop_Enter1-1 = "お待ちしておりました、先生！こちらへどうぞ！"
10114-CVEventShop_Enter1-1 = "Estava à sua espera, Sensei! Por aqui, por favor!"
10114-CVGroup_UIEventShop_Enter2-1 = "Gostaria que eu trouxesse o menu?"
10114-CVGroup_UIEventShop_Enter3-1 = "Fufu, Sensei."
10114-CVGroup_UIEventShop_Enter3-2 = "Por favor, aproveite com calma até o final!"
10114-CVGroup_UIEventShop_Idle1-1 = "Muitas vezes elogiam meus movimentos durante o trabalho..."
10114-CVGroup_UIEventShop_Idle1-2 = "Será que é a experiência do Clube de Merenda fazendo efeito?"
10114-CVGroup_UIEventShop_Idle2-1 = "Sim, Sensei, gostaria de pedir algo?"
10114-CVGroup_UIEventShop_Idle2-2 = "Só de você me chamar, Sensei..."
10114-CVGroup_UIEventShop_Idle2-3 = "Eu fico muito feliz!"
10114-CVGroup_UIEventShop_Buy1-1 = "Entendido! Vou preparar agora mesmo!"
10114-CVGroup_UIEventShop_Buy2-1 = "É isso, certo?\nVou trazer agora, por favor, aguarde um momento."
10114-CVGroup_UIEventShop_Buy3-1 = "Temos estoque suficiente! Não se preocupe!"
10114-CVGroup_UIEventShop_Buy4-1 = "Se precisar de algo que esteja faltando,\npor favor, não hesite em me pedir!"
10114-CVGroup_UIEventMission_Enter1-1 = "O preparo é importante até no café!\nÉ um ponto em comum com o Clube de Merenda."
10114-CVGroup_UIEventMission_Enter2-1 = "Rotina... eu gosto de fazer as coisas com constância."
10114-CVGroup_UIEventMission_Idle1-1 = "Receber pedidos e servir a comida..."
10114-CVGroup_UIEventMission_Idle1-2 = "Essa é a minha \"missão\" como garçonete."
10114-CVGroup_UIEventMission_Idle2-1 = "Sensei, tem algo em que eu possa ajudar?"
10114-CVGroup_UIEventMission_Buy1-1 = "Incrível! Sensei!\nAqui está, por favor, aceite!"
10114-CVGroup_UIEventMission_Buy2-1 = "Ver que o esforço é recompensado...\nÉ maravilhoso, não é?"
10114-CVGroup_UIEventMission_Interaction1-1 = "Obrigada pelo seu trabalho duro hoje!"
10114-CVGroup_UIEventMission_Interaction1-2 = "Fiquei muito feliz em poder ajudar o Sensei!"
