[translation]
20054-CVGroup_UITitle_Idle1-1 = "Blue Archive"
20054-CVGroup_CharacterGet_Idle1-1 = "Chefe, infiltração, suporte na retaguarda.\nA super gênio, pura, frágil e versátil garota hacker capaz de fazer tudo,\nAkeboshi Himari — chegando com tudo.\nSensei, esperei por você."
20054-CVGroup_Cafe_Idle1-1 = "(A temperatura do ar-condicionado não está baixa demais?)"
20054-CVGroup_Cafe_Idle2-1 = "Este é um ótimo lugar para fazer uma pausa."
20054-CVGroup_Cafe_Idle3-1 = "O consumo moderado de cafeína traz muitos benefícios, sabia?"
20054-CVGroup_Cafe_Idle4-1 = "Um lugar onde se pode relaxar é muito importante."
20054-CVGroup_Cafe_Idle5-1 = "Vou dispensar bebidas geladas."
20054-CVGroup_WeaponGet_Idle1-1 = "Muito obrigada.\nNa verdade, o ideal seria não precisar usar armas...\nMas, estar preparado é essencial."
20054-CVGroup_UICarrierBridge_Enter1-1 = "A prioridade é entender e analisar a situação."
20054-CVGroup_UICarrierBridge_Enter1-2 = "Embora nem isso seja fácil."
20054-CVGroup_UICarrierBridge_Enter2-1 = "O Continente de Aço... é um verdadeiro 'fenômeno singular'."
20054-CVGroup_UICarrierBridge_Enter2-2 = "Embora seja um pouco diferente do que eu esperava."
20054-CVGroup_UICarrierBridge_Enter3-1 = "Sensei. Por favor, dê o golpe final."
20054-CVGroup_UICarrierBridge_Enter4-1 = "Preciso encontrar o que posso fazer aqui."
20054-CVGroup_UICarrierBridge_Enter5-1 = "(O Sensei deve ter um motivo)"
20054-CVGroup_UICarrierBridge_Enter5-2 = "(para ter pedido para voltar ao navio de transporte.)"
20054-CVGroup_UICarrierBridge_Enter6-1 = "É hora de acabar com tudo."
20054-CVGroup_UICarrierBridge_Enter6-2 = "Nós também daremos o nosso melhor."
20054-CVGroup_UICarrierBridge_Enter7-1 = "A longa jornada finalmente chegou ao clímax."
20054-CVGroup_UICarrierBridge_Idle1-1 = "Finalmente chegamos até aqui."
20054-CVGroup_UICarrierBridge_Idle2-1 = "Nós... certamente encontraremos um caminho."
20054-CVGroup_UICarrierBridge_Idle3-1 = "(O Sensei disse que, em caso de emergência...)"
20054-CVGroup_UICarrierBridge_Idle3-2 = "(Isso significa que...)"
20054-CVGroup_UICarrierBridge_Idle4-1 = "Pessoal... por favor, fiquem bem..."
20054-CVGroup_UICarrierBridge_Idle5-1 = "Você sabia? A astrologia não tem fim."
20054-CVGroup_UICarrierBridge_Idle5-2 = "Tudo está em constante ciclo."
20054-CVGroup_UICarrierLobby_Enter1-1 = "A calma é essencial, especialmente em momentos decisivos."
20054-CVGroup_UICarrierLobby_Enter2-1 = "Doces ajudam a reduzir o estresse, sabia?"
20054-CVGroup_UICarrierLobby_Enter3-1 = "Para relaxar..."
20054-CVGroup_UICarrierLobby_Enter3-2 = "Quer que eu prepare algo quente para beber?"
20054-CVGroup_UICarrierLobby_Enter4-1 = "Que bom... fico feliz que todos estejam bem."
20054-CVGroup_UICarrierLobby_Idle1-1 = "Quer que eu leia o futuro na astrologia...?"
20054-CVGroup_UICarrierLobby_Idle2-1 = "Uma bebida da mesma cor que a sorte de hoje é..."
20054-CVGroup_UICarrierLobby_Idle3-1 = "Dizem que dá para ler a sorte até no café."
20054-CVGroup_UICarrierLobby_Idle4-1 = "Não se preocupe. Eu ainda estou muito bem."
