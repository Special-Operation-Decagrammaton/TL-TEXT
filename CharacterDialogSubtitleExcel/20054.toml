20054-CVGroup_UICarrierBridge_Enter6-1 = "It is time to end everything."
20054-CVGroup_UICarrierBridge_Enter6-2 = "We will also give it our all."
20054-CVGroup_UICarrierBridge_Enter7-1 = "The long journey is finally reaching its climax."
20054-CVGroup_UICarrierBridge_Idle3-1 = "(Sensei said... 'in case of emergency'.)"
20054-CVGroup_UICarrierBridge_Idle3-2 = "(That means...)"
20054-CVGroup_UICarrierBridge_Idle4-1 = "Everyone... please stay safe..."
20054-CVGroup_UICarrierBridge_Idle5-1 = "Did you know? There is no end to astrology."
20054-CVGroup_UICarrierBridge_Idle5-2 = "Everything is cyclical."