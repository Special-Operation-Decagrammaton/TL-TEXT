[translation]
10127-CVGroup_UITitle_Idle1-1 = "Blue, Archi...ve?"
10127-CVGroup_CharacterGet_Idle1-1 = "Eu, eu sou Miyu Sakurai, da Academia de Artes Wildhunt.\nEu, eu não sei bem por que fui chamada, mas... prazer em conhecê-lo."
10127-CVGroup_Cafe_Idle1-1 = "(Será que não tem um lugar onde eu possa escrever meu manuscrito com calma...)"
10127-CVGroup_Cafe_Idle2-1 = "Será que incomodaria se eu usasse minha máquina de escrever...?"
10127-CVGroup_Cafe_Idle3-1 = "Todos aqui estão tão relaxados...\nÉ bem diferente de Wildhunt."
10127-CVGroup_Cafe_Idle4-1 = "(Sensei... que tipo de café será que você gosta?)"
10127-CVGroup_Cafe_Idle5-1 = "Bem, eu entro por ali, e a rota de fuga é...\nAh, não preciso procurar por essas coisas aqui..."
10127-CVGroup_WeaponGet_Idle1-1 = "Se fosse possível, eu gostaria de transformar este momento em um livro.\nPara que nossas memórias... possam ser lidas a qualquer momento."
10127-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo, Sensei.\nAcabei de terminar de escrever o enredo."
10127-CVGroup_UIEventLobby_Enter2-1 = "Fiquei muito aliviada ao ver você, Sensei."
10127-CVGroup_UIEventLobby_Enter3-1 = "Quando entrei em Wildhunt,\nnunca imaginei que acabaria me metendo em algo assim."
10127-CVGroup_UIEventLobby_Enter4-1 = "A situação ficou complicada, não é...\n...Mas não posso desistir. Uma história só tem valor se for concluída."
10127-CVGroup_UIEventLobby_Enter5-1 = "Que bom que terminou tudo bem.\n...Ah. Já chega de pedidos como este."
10127-CVGroup_UIEventLobby_Idle1-1 = "Ah... o barulho da digitação estava muito alto?"
10127-CVGroup_UIEventLobby_Idle2-1 = "Por que será que eu acabei me envolvendo nisso tudo..."
10127-CVGroup_UIEventLobby_Idle3-1 = "V-você está me encarando tanto... hehe. Fico feliz."
10127-CVGroup_UIEventLobby_Idle4-1 = "Depois do trabalho,\npor favor, venha visitar nosso dormitório."
10127-CVGroup_UIEventCardShop_Enter1-1 = "Bem-vindo, Sensei.\nÉ por aqui."
10127-CVGroup_UIEventCardShop_Enter2-1 = "Dê-me sua mão.\n...Vamos tirar uma carta juntos?"
10127-CVGroup_UIEventCardShop_Enter3-1 = "Até o final da história...\nCertifique-se de acompanhar tudo sem arrependimentos."
10127-CVGroup_UIEventCardShop_Idle1-1 = "Houve algum problema?"
10127-CVGroup_UIEventCardShop_Idle2-1 = "Tem alguma carta que você está procurando?"
10127-CVGroup_UIEventCardShop_Prize3-1 = "Incrível! É a primeira vez que vejo essa carta com meus próprios olhos!"
10127-CVGroup_UIEventCardShop_Prize2-1 = "Você tem sorte, Sensei!\nAproveite esse momento e continue assim...!"
10127-CVGroup_UIEventCardShop_Prize1-1 = "O comum também tem sua própria estética."
10127-CVGroup_UIEventCardShop_Prize0-1 = "Não desanime, Sensei.\nO azar é apenas um presságio para a próxima sorte."
