[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10123-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10123-CVGroup_CharacterGet_Idle1-1 = "O mar... Ah, como eu ansiei por esse momento em que ficaríamos com pouca roupa.\nVamos aproveitar esse tempo efêmero e suado, o que me diz?"
10123-CVGroup_Cafe_Idle1-1 = "Este é um espaço...\nexatamente do tamanho das minhas medidas."
10123-CVGroup_Cafe_Idle2-1 = "Entendo... Então é esse tipo de clima\nque paira por aqui."
10123-CVGroup_Cafe_Idle3-1 = "Aquilo ali é..."
10123-CVGroup_Cafe_Idle4-1 = "Fufu, vou lá tentar\npuxar uma conversinha."
10123-CVGroup_Cafe_Idle5-1 = "Estou sentindo muitos olhares sobre mim...\nSerá que é por causa da falta de tecido?"
10123-CVGroup_WeaponGet_Idle1-1 = "Eu estou me expondo e sendo muito egoísta aqui.\nAté achei que alguém fosse tentar me parar pelo menos uma vez...\nFufu, mas não tem problema.\nSe é isso que você quer, eu vou fazer você me acompanhar (e me olhar) até o fim do nosso destino."
10123-CVGroup_UIEventLobby_Enter1-1 = "Hoje o dia está perfeitamente calmo e favorável."
10123-CVGroup_UIEventLobby_Enter1-2 = "……Ora, não há problema nenhum em apenas dizer, não é mesmo?"
10123-CVGroup_UIEventLobby_Enter2-1 = "A partir daqui... eu vou assumir o controle e te guiar."
10123-CVGroup_UIEventLobby_Enter3-1 = "Me divertir de forma pura e inocente como uma criança..."
10123-CVGroup_UIEventLobby_Enter3-2 = "E deixar esses desejos transbordarem sem nenhum pudor... acho que é a maior das felicidades."
10123-CVGroup_UIEventLobby_Enter4-1 = "Não pretendo tirar o pé do acelerador até chegarmos ao clímax final."
10123-CVGroup_UIEventLobby_Enter5-1 = "Um sentimento radiante, misturado com um leve apego tentador――"
10123-CVGroup_UIEventLobby_Enter5-2 = "Ficar no meio desse limiar... não é uma sensação nada má."
10123-CVGroup_UIEventLobby_Idle1-1 = "Por que ficar com essa vergonha toda?"
10123-CVGroup_UIEventLobby_Idle1-2 = "Se o seu corpo tem um desejo, use a sua boca e me peça logo."
10123-CVGroup_UIEventLobby_Idle2-1 = "Kuh... fufu..."
10123-CVGroup_UIEventLobby_Idle2-2 = "Fazer cócegas no meu corpo... Você é bem ousado e atrevidinho, não é?"
10123-CVGroup_UIEventLobby_Idle3-1 = "Ainda existem expressões (e lados) do Sensei que eu não conheço a fundo..."
10123-CVGroup_UIEventLobby_Idle3-2 = "Você não quer se abrir e me mostrar muito mais?"
10123-CVGroup_UIEventLobby_Idle4-1 = "Isso aqui... Eu só escolhi uma roupa de banho que fosse apropriada pra estação."
10123-CVGroup_UIEventLobby_Idle4-2 = "O verão, pelo visto... é uma estação que odeia pedaços de pano cobrindo o nosso corpo."