[translation]
10123-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10123-CVGroup_CharacterGet_Idle1-1 = "海……この時をどれほど待ちわびたことか。\n泡沫のひと時を楽しもうじゃないか。"
10123-CVGroup_Cafe_Idle1-1 = "まさに過不足のない空間だね。"
10123-CVGroup_Cafe_Idle2-1 = "成程……ここは、こういう雰囲気なのか。"
10123-CVGroup_Cafe_Idle3-1 = "あれは……。"
10123-CVGroup_Cafe_Idle4-1 = "ふふ、声をかけてみるとしよう。"
10123-CVGroup_Cafe_Idle5-1 = "視線を感じるな……服装のせいか？"
10123-CVGroup_WeaponGet_Idle1-1 = "これだけあからさまに勝手をしているんだ。\n一度くらいは引き留められるものだと思っていたが……。\nふふ、構わないよ。\n君がそのつもりなら、命運果てるその時まで、付き合ってもらうとしよう。"
10123-CVGroup_UIEventLobby_Enter1-1 = "今日も穏やかな一日だね。"
10123-CVGroup_UIEventLobby_Enter1-2 = "……なに、言うだけなら自由だろう？"
10123-CVGroup_UIEventLobby_Enter2-1 = "ここからは私が導くとしよう。"
10123-CVGroup_UIEventLobby_Enter3-1 = "子供のように無邪気に楽しむ……。"
10123-CVGroup_UIEventLobby_Enter3-2 = "忌憚なくそれが発露できるのは、何よりの幸せだといえよう。"
10123-CVGroup_UIEventLobby_Enter4-1 = "最後まで、アクセルを緩めるつもりはないよ。"
10123-CVGroup_UIEventLobby_Enter5-1 = "晴れやかな気持ちと、僅かな未練――"
10123-CVGroup_UIEventLobby_Enter5-2 = "その狭間というのも悪くないものだね。"
10123-CVGroup_UIEventLobby_Idle1-1 = "何を恥じらうことがある。"
10123-CVGroup_UIEventLobby_Idle1-2 = "望みがあるのなら、言葉にしたまえよ。"
10123-CVGroup_UIEventLobby_Idle2-1 = "くっ……ふふっ……。"
10123-CVGroup_UIEventLobby_Idle2-2 = "くすぐりとは、大胆なことをするじゃないか。"
10123-CVGroup_UIEventLobby_Idle3-1 = "まだ知らない先生の表情……。"
10123-CVGroup_UIEventLobby_Idle3-2 = "もっと見せてくれないかい？"
10123-CVGroup_UIEventLobby_Idle4-1 = "これは……季節に適した装いを選んだだけさ。"
10123-CVGroup_UIEventLobby_Idle4-2 = "夏というものは、身を包む布を好まないらしい。"
