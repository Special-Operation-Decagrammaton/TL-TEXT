[translation]
10123-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10123-CVGroup_CharacterGet_Idle1-1 = "O mar... quanto tempo esperei por este momento.\nPor que não aproveitamos este breve instante?"
10123-CVGroup_Cafe_Idle1-1 = "Um espaço sem tirar nem pôr, exatamente como deve ser."
10123-CVGroup_Cafe_Idle2-1 = "Entendo... então este é o tipo de atmosfera que este lugar tem."
10123-CVGroup_Cafe_Idle3-1 = "Aquilo é..."
10123-CVGroup_Cafe_Idle4-1 = "Hehe, acho que vou falar com eles."
10123-CVGroup_Cafe_Idle5-1 = "Sinto um olhar sobre mim... será por causa da minha roupa?"
10123-CVGroup_WeaponGet_Idle1-1 = "Estou agindo de forma tão descarada que pensei que tentariam me impedir pelo menos uma vez...\nHehe, não importa.\nSe é isso que você quer, então vamos ficar juntos até o fim dos nossos dias."
10123-CVGroup_UIEventLobby_Enter1-1 = "Hoje também é um dia tranquilo."
10123-CVGroup_UIEventLobby_Enter1-2 = "...O quê? Falar é de graça, não é?"
10123-CVGroup_UIEventLobby_Enter2-1 = "Deixe que eu guie o caminho a partir daqui."
10123-CVGroup_UIEventLobby_Enter3-1 = "Divertir-se com a inocência de uma criança..."
10123-CVGroup_UIEventLobby_Enter3-2 = "Poder expressar isso sem reservas é a maior das felicidades."
10123-CVGroup_UIEventLobby_Enter4-1 = "Não pretendo tirar o pé do acelerador até o fim."
10123-CVGroup_UIEventLobby_Enter5-1 = "Um sentimento radiante e um leve arrependimento..."
10123-CVGroup_UIEventLobby_Enter5-2 = "Estar entre esses dois sentimentos não é nada mal."
10123-CVGroup_UIEventLobby_Idle1-1 = "Por que você está tão envergonhado?"
10123-CVGroup_UIEventLobby_Idle1-2 = "Se você tem um desejo, coloque-o em palavras."
10123-CVGroup_UIEventLobby_Idle2-1 = "Ah... hehe..."
10123-CVGroup_UIEventLobby_Idle2-2 = "Fazer cócegas... você é bem ousado, não é?"
10123-CVGroup_UIEventLobby_Idle3-1 = "Ainda há expressões do Sensei que eu não conheço..."
10123-CVGroup_UIEventLobby_Idle3-2 = "Você não poderia me mostrar mais?"
10123-CVGroup_UIEventLobby_Idle4-1 = "Isso é... eu só escolhi um traje adequado para a estação."
10123-CVGroup_UIEventLobby_Idle4-2 = "Parece que o verão não gosta de muitas roupas."
