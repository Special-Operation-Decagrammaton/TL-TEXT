[translation]
10083-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10083-CVGroup_CharacterGet_Idle1-1 = "百鬼夜行連合学院所属、百花繚乱の作戦参謀、桐生キキョウ。\n今後も良好な関係でいるために、シャーレの仕事を手伝うよ。\n……もちろんその分、こっちも手伝ってもらうつもりだけど。\nそういうことだから……よろしくね、先生。"
10083-CVGroup_Cafe_Idle1-1 = "次の作戦、今のうちに立てておこう。"
10083-CVGroup_Cafe_Idle2-1 = "どこか、落ち着ける場所は……。"
10083-CVGroup_Cafe_Idle3-1 = "私は百花繚乱だもの……\n半端なことはできない。"
10083-CVGroup_Cafe_Idle4-1 = "先生……仕事終わったかな……。"
10083-CVGroup_Cafe_Idle5-1 = "退屈。\nシャーレといっても、この程度なんだ。"
10083-CVGroup_WeaponGet_Idle1-1 = "これは私への信頼の証？それともあんたの気の迷い？……どっちでもいいけどね。\n私、こういうのはちゃんと倍にして返すタイプだから。\n覚悟しておいて。ふふ。面白くなってきたかも。"
