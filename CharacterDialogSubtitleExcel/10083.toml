[translation]
10083-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10083-CVGroup_CharacterGet_Idle1-1 = "Pertencente à Academia Hyakkiyako, estrategista do Hyakkiyoran, Kiryu Kikyou.\nPara mantermos um bom relacionamento daqui em diante, vou ajudar com o trabalho do Schale.\n...Claro que, em troca, espero que você também me ajude.\nÉ isso... conto com você, Sensei."
10083-CVGroup_Cafe_Idle1-1 = "Vamos planejar a próxima operação enquanto temos tempo."
10083-CVGroup_Cafe_Idle2-1 = "Algum lugar... onde eu possa relaxar..."
10083-CVGroup_Cafe_Idle3-1 = "Eu sou do Hyakkiyoran, afinal...\nNão posso fazer nada pela metade."
10083-CVGroup_Cafe_Idle4-1 = "Sensei... será que o trabalho já acabou?..."
10083-CVGroup_Cafe_Idle5-1 = "Tédio.\nMesmo sendo o Schale, é só isso?"
10083-CVGroup_WeaponGet_Idle1-1 = "Isso é uma prova de confiança em mim? Ou foi apenas um momento de hesitação seu? ...Tanto faz, na verdade.\nEu sou do tipo que retribui tudo em dobro.\nEsteja preparado. Hehe. Isso está começando a ficar interessante."
