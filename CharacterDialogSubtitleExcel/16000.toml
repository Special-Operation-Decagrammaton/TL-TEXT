16000-CVGroup_Cafe_Idle4-1 = "A-ano...\nEhehe... h-há algo em que eu possa ajudar?"
16000-CVGroup_Cafe_Idle5-1 = "Se, Sensei.\nO-obri... gada...\nN-não! Desculpe!"
16000-CVGroup_WeaponGet_Idle1-1 = "Tudo o que o Sensei detesta, eu...\nVou apagar tudo!"
