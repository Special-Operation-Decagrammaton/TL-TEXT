[translation]
16000-CVGroup_UITitle_Idle1-1 = "ぶ、ブルー、アーカイブ。"
16000-CVGroup_CharacterGet_Idle1-1 = "あの、私が来てもよかったんでしょうか？\n邪魔だと思いましたら、い、いつでも仰ってください……。"
16000-CVGroup_Cafe_Idle1-1 = "隠れる場所はどこに……。"
16000-CVGroup_Cafe_Idle2-1 = "ここにいてもいいんでしょうか。"
16000-CVGroup_Cafe_Idle3-1 = "人が多い所は苦手……。\n隠れたい……。"
16000-CVGroup_Cafe_Idle4-1 = "あ、あの……。\nえへへ……わ、私が手伝うことありますか？"
16000-CVGroup_Cafe_Idle5-1 = "せ、先生。\nあ、りが……とうござい……\nい、いえ！すみません！"
16000-CVGroup_WeaponGet_Idle1-1 = "先生が嫌いなものは、私が……\n全部消しちゃいます！"
