[translation]
20030-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20030-CVGroup_CharacterGet_Idle1-1 = "運動……そして食欲の季節！\nまさに美食の祭典……。\nこの絶好の機会、堪能するより他ありませんわ。"
20030-CVGroup_Cafe_Idle1-1 = "さあ、美食の探検と洒落込みましょうか。"
20030-CVGroup_Cafe_Idle2-1 = "さて、どこから行きましょう……？"
20030-CVGroup_Cafe_Idle3-1 = "食事とは、至高の行為。"
20030-CVGroup_Cafe_Idle4-1 = "運動効果を高めるためにも、\nきちんとした食事は必要不可欠ですわ。"
20030-CVGroup_Cafe_Idle5-1 = "休憩が終わりましたら、\n屋台巡りにいきませんか？"
20030-CVGroup_WeaponGet_Idle1-1 = "こちらも総力を挙げて参りましょう。\nこのように目をかけてくださる、先生のためにも。"
20030-CVGroup_UIEventLobby_Enter1-1 = "「晄輪大祭」……。\n新たな美食の地平が、やって参りましたわ。"
20030-CVGroup_UIEventLobby_Enter2-1 = "いらしたのですね、先生。"
20030-CVGroup_UIEventLobby_Enter2-2 = "それでは、今から私と――"
20030-CVGroup_UIEventLobby_Enter2-3 = "屋台征服と洒落込みましょうか。"
20030-CVGroup_UIEventLobby_Enter3-1 = "うふふ。\n先生、楽しんでおりますか？"
20030-CVGroup_UIEventLobby_Enter3-2 = "私はこの上なく謳歌しておりますわ。"
20030-CVGroup_UIEventLobby_Enter4-1 = "気がついたら「晄輪大祭」も終盤に……"
20030-CVGroup_UIEventLobby_Enter4-2 = "楽しい時間はあっという間、と言いますけれども……"
20030-CVGroup_UIEventLobby_Enter4-3 = "思い出はいつまでも残るものですわ。"
20030-CVGroup_UIEventLobby_Enter5-1 = "ごきげんよう、先生。\n屋台の制覇なら済んでおりますわ。"
20030-CVGroup_UIEventLobby_Idle1-1 = "私は太らない体質ですが、\nたくさん食べられるわけではなく……。"
20030-CVGroup_UIEventLobby_Idle1-2 = "いつも、もどかしい気持ちでいっぱいです。"
20030-CVGroup_UIEventLobby_Idle2-1 = "少し、身体を動かしたくなりました。"
20030-CVGroup_UIEventLobby_Idle2-2 = "私も、参加してよろしいでしょうか？\n……「パン食い競争」に。"
20030-CVGroup_UIEventLobby_Idle3-1 = "「晄輪大祭」の屋台はまさに、\n「美食の博覧会」そのもの！"
20030-CVGroup_UIEventLobby_Idle3-2 = "ああ、究極の味わいが、きっとそこに……！"
20030-CVGroup_UIEventLobby_Idle4-1 = "先生……少しだけ、一緒に歩きませんか？"
20030-CVGroup_UIEventLobby_Idle4-2 = "……いつもと違う格好も、乙なものですよ。"
