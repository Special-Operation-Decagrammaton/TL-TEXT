[translation]
20030-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20030-CVGroup_CharacterGet_Idle1-1 = "A estação dos exercícios... e do apetite!\nÉ um verdadeiro festival gastronômico.\nNão há outra escolha a não ser aproveitar esta oportunidade perfeita."
20030-CVGroup_Cafe_Idle1-1 = "Vamos nos aventurar em busca da gastronomia?"
20030-CVGroup_Cafe_Idle2-1 = "Bem, por onde devemos começar...?"
20030-CVGroup_Cafe_Idle3-1 = "Comer é um ato supremo."
20030-CVGroup_Cafe_Idle4-1 = "Para aumentar a eficácia dos exercícios,\numa refeição adequada é indispensável."
20030-CVGroup_Cafe_Idle5-1 = "Quando o descanso terminar,\nque tal irmos visitar as barracas?"
20030-CVGroup_WeaponGet_Idle1-1 = "Vamos dar o nosso melhor aqui também.\nPelo bem do Sensei, que cuida tão bem de nós."
20030-CVGroup_UIEventLobby_Enter1-1 = "O Festival Esportivo de Kivotos...\nUm novo horizonte gastronômico chegou."
20030-CVGroup_UIEventLobby_Enter2-1 = "Você chegou, Sensei."
20030-CVGroup_UIEventLobby_Enter2-2 = "Então, a partir de agora, comigo..."
20030-CVGroup_UIEventLobby_Enter2-3 = "Vamos conquistar as barracas de comida?"
20030-CVGroup_UIEventLobby_Enter3-1 = "Ufufu.\nSensei, está se divertindo?"
20030-CVGroup_UIEventLobby_Enter3-2 = "Eu estou aproveitando ao máximo."
20030-CVGroup_UIEventLobby_Enter4-1 = "Quando percebi, o Festival Esportivo de Kivotos já estava chegando ao fim..."
20030-CVGroup_UIEventLobby_Enter4-2 = "Dizem que o tempo voa quando nos divertimos, mas..."
20030-CVGroup_UIEventLobby_Enter4-3 = "As memórias permanecem para sempre."
20030-CVGroup_UIEventLobby_Enter5-1 = "Olá, Sensei.\nA conquista das barracas já foi concluída."
20030-CVGroup_UIEventLobby_Idle1-1 = "Eu tenho um metabolismo que não me deixa engordar,\nmas não significa que eu consiga comer muito..."
20030-CVGroup_UIEventLobby_Idle1-2 = "Sempre fico com uma sensação de frustração."
20030-CVGroup_UIEventLobby_Idle2-1 = "Senti vontade de me exercitar um pouco."
20030-CVGroup_UIEventLobby_Idle2-2 = "Eu também poderia participar?\n...Da corrida do pão."
20030-CVGroup_UIEventLobby_Idle3-1 = "As barracas do Festival Esportivo de Kivotos são, de fato,\numa verdadeira 'exposição gastronômica'!"
20030-CVGroup_UIEventLobby_Idle3-2 = "Ah, o sabor supremo certamente está lá...!"
20030-CVGroup_UIEventLobby_Idle4-1 = "Sensei... podemos caminhar um pouco juntos?"
20030-CVGroup_UIEventLobby_Idle4-2 = "...Estar com um visual diferente do habitual também tem seu charme."
