[translation]
10066-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10066-CVGroup_CharacterGet_Idle1-1 = "メイドにジョブチェンジしても、アリスはアリスです。\n見ていてください、先生！"
10066-CVGroup_Cafe_Idle1-1 = "……どこからお掃除しましょう？"
10066-CVGroup_Cafe_Idle2-1 = "サブクエストが発生しそうな場所です……！"
10066-CVGroup_Cafe_Idle3-1 = "アリス、知ってます。\n世の中にはメイドカフェというものがあるらしいです！"
10066-CVGroup_Cafe_Idle4-1 = "メイドにはご主人様が必要です。\nアリスのご主人様は……もちろん先生です！"
10066-CVGroup_Cafe_Idle5-1 = "メイドレベルが上がりました！\nアリスとメイド服の相性は、少し良くなってきました。"
10066-CVGroup_WeaponGet_Idle1-1 = "これは……アリスと先生の力で強化した伝説の聖剣……！\nありがとうございます、先生！\nアリス、もっとメイドレベルを上げて、メイド勇者になります！"
10066-CVGroup_UIEventLobby_Enter1-1 = "先生、急いでください！\nイベントですよ、イベント！"
10066-CVGroup_UIEventLobby_Enter2-1 = "アリスなら、いつでもOKです！\n先生の準備は終わりましたか？"
10066-CVGroup_UIEventLobby_Enter3-1 = "アリス、掃除も警備も頑張りました。\n褒めてください！"
10066-CVGroup_UIEventLobby_Enter4-1 = "うぅ……大変なことになってしまいました。"
10066-CVGroup_UIEventLobby_Enter4-2 = "でもアリスは大丈夫です。\nメイド勇者ですから！"
10066-CVGroup_UIEventLobby_Enter5-1 = "すごい冒険でした！"
10066-CVGroup_UIEventLobby_Enter5-2 = "先生と一緒なら、アリスは何も怖くありません！"
10066-CVGroup_UIEventLobby_Idle1-1 = "まだメイド克服レベルは高くないですが……"
10066-CVGroup_UIEventLobby_Idle1-2 = "アリス、頑張ります！"
10066-CVGroup_UIEventLobby_Idle2-1 = "先生、どこかでネル先輩を発見したら、\nすぐに教えてくださいね。"
10066-CVGroup_UIEventLobby_Idle2-2 = "絶対ですよ？アリスとの約束です！"
10066-CVGroup_UIEventLobby_Idle3-1 = "お料理、お掃除、お洗濯！\nどれもメイドの基本です！"
10066-CVGroup_UIEventLobby_Idle3-2 = "先生もクエストに参加しますか？"
10066-CVGroup_UIEventLobby_Idle4-1 = "そ、そんなに突っついても何もドロップしませんよ……？"
10066-CVGroup_UIEventLobby_Idle4-2 = "アリスはモンスターではありません！"
10066-CVGroup_UIEventShop_Enter1-1 = "いらっしゃいませ、先生！"
10066-CVGroup_UIEventShop_Enter1-2 = "メイド勇者はお店番も出来ます！"
10066-CVGroup_UIEventShop_Enter2-1 = "交換アイテムの在庫は、たっぷりあります！"
10066-CVGroup_UIEventShop_Enter2-2 = "でも先生だったら全部ゲット出来ちゃうかもしれません。"
10066-CVGroup_UIEventShop_Enter3-1 = "イベントは終了しましたが、まだ営業中です。"
10066-CVGroup_UIEventShop_Enter3-2 = "期間限定なので忘れないでください。\nアリスとの約束ですよ？"
10066-CVGroup_UIEventShop_Idle1-1 = "ようこそ、アリスの道具屋へ！"
10066-CVGroup_UIEventShop_Idle1-2 = "ここでは冒険に役立つアイテムやポーションが買えますよ！"
10066-CVGroup_UIEventShop_Idle2-1 = "ん……先生、スマイルですか？"
10066-CVGroup_UIEventShop_Idle2-2 = "分かりました。\nスマイルは0クレジットだと、モモイが言ってました！"
10066-CVGroup_UIEventShop_Buy1-1 = "パンパカパーン！\n先生がアイテムを購入しました！"
10066-CVGroup_UIEventShop_Buy1-2 = "プレミアムスマイルをおまけしておきます！"
10066-CVGroup_UIEventShop_Buy2-1 = "ほほう……お客さん、お目が高いですね。"
10066-CVGroup_UIEventShop_Buy2-2 = "こういう時に言うセリフです！\nアリス、覚えました！"
10066-CVGroup_UIEventShop_Buy3-1 = "旅人よ、それが汝の選択か……？"
10066-CVGroup_UIEventShop_Buy3-2 = "先生、どうですか？\nこのセリフ、言ってみたかったんです！"
10066-CVGroup_UIEventShop_Buy4-1 = "アイテム倉庫の管理もメイドのお仕事です！"
10066-CVGroup_UIEventShop_Buy4-2 = "アリス、今日も頑張ります！"
