[translation]
10066-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10066-CVGroup_CharacterGet_Idle1-1 = "Mesmo mudando de classe para empregada, a Alice continua sendo a Alice.\nObserve, Sensei!"
10066-CVGroup_Cafe_Idle1-1 = "……Por onde devo começar a limpar?"
10066-CVGroup_Cafe_Idle2-1 = "Este é um lugar onde parece que uma subquest vai começar……!"
10066-CVGroup_Cafe_Idle3-1 = "A Alice sabe.\nParece que existe algo no mundo chamado Maid Cafe!"
10066-CVGroup_Cafe_Idle4-1 = "Uma empregada precisa de um mestre.\nO mestre da Alice é…… claro, o Sensei!"
10066-CVGroup_Cafe_Idle5-1 = "Meu nível de empregada subiu!\nA compatibilidade da Alice com o uniforme de empregada melhorou um pouco."
10066-CVGroup_WeaponGet_Idle1-1 = "Esta é…… a espada sagrada lendária que a Alice e o Sensei fortaleceram com seu poder……!\nMuito obrigada, Sensei!\nA Alice vai aumentar ainda mais o nível de empregada e se tornar uma Empregada Heroína!"
10066-CVGroup_UIEventLobby_Enter1-1 = "Sensei, apresse-se!\nÉ um evento, um evento!"
10066-CVGroup_UIEventLobby_Enter2-1 = "Se for com a Alice, está tudo bem a qualquer momento!\nO Sensei já terminou de se preparar?"
10066-CVGroup_UIEventLobby_Enter3-1 = "A Alice se esforçou na limpeza e na segurança.\nPor favor, me elogie!"
10066-CVGroup_UIEventLobby_Enter4-1 = "Uuu…… algo terrível aconteceu."
10066-CVGroup_UIEventLobby_Enter4-2 = "Mas a Alice está bem.\nPorque eu sou uma Empregada Heroína!"
10066-CVGroup_UIEventLobby_Enter5-1 = "Foi uma aventura incrível!"
10066-CVGroup_UIEventLobby_Enter5-2 = "Se estiver com o Sensei, a Alice não tem medo de nada!"
10066-CVGroup_UIEventLobby_Idle1-1 = "Ainda não tenho um nível alto de maestria como empregada, mas……"
10066-CVGroup_UIEventLobby_Idle1-2 = "A Alice vai se esforçar!"
10066-CVGroup_UIEventLobby_Idle2-1 = "Sensei, se encontrar a Neru-senpai em algum lugar,\nme avise imediatamente."
10066-CVGroup_UIEventLobby_Idle2-2 = "É sério, viu? É uma promessa com a Alice!"
10066-CVGroup_UIEventLobby_Idle3-1 = "Cozinhar, limpar, lavar roupas!\nTudo isso é o básico de uma empregada!"
10066-CVGroup_UIEventLobby_Idle3-2 = "O Sensei também vai participar da quest?"
10066-CVGroup_UIEventLobby_Idle4-1 = "A-aí, mesmo que você me cutuque tanto, nada vai dropar……?"
10066-CVGroup_UIEventLobby_Idle4-2 = "A Alice não é um monstro!"
10066-CVGroup_UIEventShop_Enter1-1 = "Bem-vindo, Sensei!"
10066-CVGroup_UIEventShop_Enter1-2 = "Uma Empregada Heroína também sabe cuidar da loja!"
10066-CVGroup_UIEventShop_Enter2-1 = "O estoque de itens de troca está cheio!"
10066-CVGroup_UIEventShop_Enter2-2 = "Mas se for o Sensei, talvez consiga pegar tudo."
10066-CVGroup_UIEventShop_Enter3-1 = "O evento terminou, mas ainda estamos abertos."
10066-CVGroup_UIEventShop_Enter3-2 = "É por tempo limitado, então não se esqueça.\nÉ uma promessa com a Alice, ok?"
10066-CVGroup_UIEventShop_Idle1-1 = "Bem-vindo à loja de itens da Alice!"
10066-CVGroup_UIEventShop_Idle1-2 = "Aqui você pode comprar itens e poções úteis para a aventura!"
10066-CVGroup_UIEventShop_Idle2-1 = "Hmm…… Sensei, um sorriso?"
10066-CVGroup_UIEventShop_Idle2-2 = "Entendi.\nA Momoi disse que um sorriso custa 0 créditos!"
10066-CVGroup_UIEventShop_Buy1-1 = "Tan-tan-tan!\nO Sensei comprou um item!"
10066-CVGroup_UIEventShop_Buy1-2 = "Vou dar um sorriso premium de brinde!"
10066-CVGroup_UIEventShop_Buy2-1 = "Hoho…… cliente, você tem um bom olho."
10066-CVGroup_UIEventShop_Buy2-2 = "É uma fala que se diz nessas horas!\nA Alice aprendeu!"
10066-CVGroup_UIEventShop_Buy3-1 = "Viajante, essa é a sua escolha……?"
10066-CVGroup_UIEventShop_Buy3-2 = "Sensei, o que achou?\nEu queria muito dizer essa frase!"
10066-CVGroup_UIEventShop_Buy4-1 = "Gerenciar o estoque de itens também é trabalho de empregada!"
10066-CVGroup_UIEventShop_Buy4-2 = "A Alice vai se esforçar hoje também!"
