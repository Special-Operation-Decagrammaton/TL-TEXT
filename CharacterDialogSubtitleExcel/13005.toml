[translation]
13005-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
13005-CVGroup_CharacterGet_Idle1-1 = "怒ってないから、誤解しないでね。先生。\n顔が怖いってよく言われるんだ。"
13005-CVGroup_Cafe_Idle1-1 = "はあ……心配。"
13005-CVGroup_Cafe_Idle2-1 = "ふーん、少しは興味が沸いてきた。"
13005-CVGroup_Cafe_Idle3-1 = "これからの計画は……\nまあ、いいか。"
13005-CVGroup_Cafe_Idle4-1 = "意外と……可愛い？\nふうん、つまらない冗談……だね。"
13005-CVGroup_Cafe_Idle5-1 = "まあ、怖い顔だっていうのはわかってる。"
13005-CVGroup_WeaponGet_Idle1-1 = "先生が決めたことなら異論はないけど……。\nはあ……何でもない。\n期待されてる分、頑張るよ。"
