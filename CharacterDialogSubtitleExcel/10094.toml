[translation]
10094-CVGroup_UITitle_Idle1-1 = "ブルー！アーカイブ！"
10094-CVGroup_CharacterGet_Idle1-1 = "メイドって先生はどう思う？\n物語のネタとして、最高じゃない？"
10094-CVGroup_Cafe_Idle1-1 = "カフェ……メイド……\n関係がありそうな、無さそうな……。"
10094-CVGroup_Cafe_Idle2-1 = "もし私がここで働いてたら……\nここの床、全部掃除しなきゃなんないんだよね……うぅぅ。"
10094-CVGroup_Cafe_Idle3-1 = "ケーキ……紅茶……美味しそう……あれ？\nもしかして、私が用意する側？"
10094-CVGroup_Cafe_Idle4-1 = "どこかでこっそり寝たいなぁ……。"
10094-CVGroup_Cafe_Idle5-1 = "カフェから始まるメイドの旅！\nみたいなお話はどうかな……？"
10094-CVGroup_WeaponGet_Idle1-1 = "聞いて、先生！メイドには何よりも装備が大事なんだって！\n潜入、爆破、機密確保。そして、世界平和……\nそういう仕事をするには、いい装備がなくちゃね！"
10094-CVGroup_UIEventLobby_Enter1-1 = "来た！見た！\nそして勝った……っけ？"
10094-CVGroup_UIEventLobby_Enter1-2 = "とにかく！メイドの才羽モモイ、出陣だよ！"
10094-CVGroup_UIEventLobby_Enter2-1 = "あ、先生！準備ならとっくに……！"
10094-CVGroup_UIEventLobby_Enter2-2 = "あれぇ……？\nちょ、ちょっと待っててね、先生！"
10094-CVGroup_UIEventLobby_Enter3-1 = "うえぇん、仕事が多すぎるよぉ！"
10094-CVGroup_UIEventLobby_Enter3-2 = "こんな事になるなんて、知らなかったのにぃ……。"
10094-CVGroup_UIEventLobby_Enter4-1 = "理解できない、理解できないよ……"
10094-CVGroup_UIEventLobby_Enter4-2 = "怪盗？オークション？美術品？\n何それ！なんかのゲームの設定！？"
10094-CVGroup_UIEventLobby_Enter5-1 = "多くの事があったが、勇者たちは悪を倒し、"
10094-CVGroup_UIEventLobby_Enter5-2 = "堂々と故郷へと帰還したのであった……！"
10094-CVGroup_UIEventLobby_Enter5-3 = "ま、そんなエンディングだったよね。\nん？先生？お疲れ様！"
10094-CVGroup_UIEventLobby_Idle1-1 = "ん～？メイドらしい働きぶりを見たい……？"
10094-CVGroup_UIEventLobby_Idle1-2 = "まあ一応、メイド服になっているからね！うん！"
10094-CVGroup_UIEventLobby_Idle2-1 = "メイドの科目にはどうして、\nサボって昼寝する授業がないの？"
10094-CVGroup_UIEventLobby_Idle2-2 = "これって、問題だと思わない？"
10094-CVGroup_UIEventLobby_Idle3-1 = "そうだ！ねえ、先生。知ってる？このお屋敷には……"
10094-CVGroup_UIEventLobby_Idle3-2 = "すっごい秘密が隠されているんだって！\n私の直感が、そう言ってるの！"
10094-CVGroup_UIEventLobby_Idle4-1 = "く、くすぐったいよ！先生！\n私、くすぐりに弱いんだから"
10094-CVGroup_UIEventLobby_Idle4-2 = "イヤなわけじゃないけどさぁ！？"
