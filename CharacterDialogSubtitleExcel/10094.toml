[translation]
10094-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
10094-CVGroup_CharacterGet_Idle1-1 = "O que você acha de maids, Sensei?\nNão é um tema perfeito para uma história?"
10094-CVGroup_Cafe_Idle1-1 = "Café... maids...\nSinto que tem uma relação, mas ao mesmo tempo não..."
10094-CVGroup_Cafe_Idle2-1 = "Se eu estivesse trabalhando aqui...\nEu teria que limpar todo esse chão, né... ugh."
10094-CVGroup_Cafe_Idle3-1 = "Bolo... chá... parece delicioso... ué?\nSerá que sou eu quem deveria estar servindo?"
10094-CVGroup_Cafe_Idle4-1 = "Queria tirar um cochilo escondida em algum lugar..."
10094-CVGroup_Cafe_Idle5-1 = "Que tal uma história sobre uma jornada de uma maid que começa em um café...?"
10094-CVGroup_WeaponGet_Idle1-1 = "Escuta, Sensei! Dizem que para uma maid, o equipamento é o mais importante!\nInfiltração, explosões, segurança de dados. E, claro, a paz mundial...\nPara fazer esse tipo de trabalho, preciso de um bom equipamento, né!"
10094-CVGroup_UIEventLobby_Enter1-1 = "Vim! Vi!\nE venci... ou será que não?"
10094-CVGroup_UIEventLobby_Enter1-2 = "Enfim! Momoi, a maid, está pronta para a ação!"
10094-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei! Se for sobre a preparação, já faz tempo que..."
10094-CVGroup_UIEventLobby_Enter2-2 = "Ué...?\nEs-espera um pouquinho, Sensei!"
10094-CVGroup_UIEventLobby_Enter3-1 = "Waaah, tem trabalho demais!"
10094-CVGroup_UIEventLobby_Enter3-2 = "Eu não sabia que ia acabar assim..."
10094-CVGroup_UIEventLobby_Enter4-1 = "Não entendo, não entendo nada..."
10094-CVGroup_UIEventLobby_Enter4-2 = "Ladrão fantasma? Leilão? Obras de arte?\nO que é isso! É algum cenário de jogo!?"
10094-CVGroup_UIEventLobby_Enter5-1 = "Muitas coisas aconteceram, mas os heróis derrotaram o mal,"
10094-CVGroup_UIEventLobby_Enter5-2 = "e retornaram triunfantes para sua terra natal...!"
10094-CVGroup_UIEventLobby_Enter5-3 = "Bom, esse foi o final, né.\nHã? Sensei? Bom trabalho!"
10094-CVGroup_UIEventLobby_Idle1-1 = "Hmm~? Quer ver como uma maid trabalha...?"
10094-CVGroup_UIEventLobby_Idle1-2 = "Bem, eu estou vestida de maid, afinal! Sim!"
10094-CVGroup_UIEventLobby_Idle2-1 = "Por que não tem uma aula de como faltar e tirar um cochilo\nno currículo de maid?"
10094-CVGroup_UIEventLobby_Idle2-2 = "Você não acha que isso é um problema?"
10094-CVGroup_UIEventLobby_Idle3-1 = "Já sei! Ei, Sensei. Você sabia? Dizem que nesta mansão..."
10094-CVGroup_UIEventLobby_Idle3-2 = "Existe um segredo incrível escondido!\nMeu instinto está me dizendo isso!"
10094-CVGroup_UIEventLobby_Idle4-1 = "I-isso faz cócegas, Sensei!\nEu sou sensível a cócegas, sabia?"
10094-CVGroup_UIEventLobby_Idle4-2 = "Não é que eu não goste, mas né!?"
