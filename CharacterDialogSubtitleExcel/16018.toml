[translation]
16018-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16018-CVGroup_CharacterGet_Idle1-1 = "Eu sou Kawakoma Love, a líder do Bando do Capacete Jab-Jab.\nEi, Sensei!! Você está muito perto! Afaste-se!!"
16018-CVGroup_Cafe_Idle1-1 = "Será que não tem um lugar para pendurar o capacete?"
16018-CVGroup_Cafe_Idle2-1 = "Eu sinto que... já vi isso em algum lugar...?"
16018-CVGroup_Cafe_Idle3-1 = "(Será que eu deveria falar com ele...?)"
16018-CVGroup_Cafe_Idle4-1 = "Aqui é um lugar bem legal, não é? Dá até para se proteger da chuva."
16018-CVGroup_Cafe_Idle5-1 = "Eu deveria ter trazido o pessoal do Bando do Capacete também..."
16018-CVGroup_WeaponGet_Idle1-1 = "Ah! Era isso que eu queria! Obrigada, Sensei♪"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "Ei, Sensei, você sabe o que é isso?"
16018-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "...Parece uma máquina de venda automática, mas..."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "Parece que só aceita um tipo específico de ficha."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "Bem, provavelmente só serve para isso mesmo... Tente colocar uma aí para ver."
16018-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "Ah, parece que está na hora de fechar. Vamos usar tudo o que sobrou."
16018-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "Esse desenho colado do lado... não é a mesma roupa daquelas crianças?"
16018-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "Não vai me dizer que alguém vai pular de dentro para me atacar de surpresa, né...?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "Uau, está brilhando... será que isso é super raro?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "Nunca vi esse antes. Será que é raro?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "Dourado... hehe, parece que tirei a sorte grande! Será que tem mais?"
16018-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "Hmm, não faço ideia de qual é raro e qual é o prêmio de consolação..."
16018-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "Ah, preto! É a minha cor favorita!"
16018-CVGroup_UIEventMission_Enter1-1 = "Hah, hah... Ei, quem são vocês, afinal!?"
16018-CVGroup_UIEventMission_Enter2-1 = "Garotas mágicas... não me diga que vocês realmente conseguem usar magia!?"
16018-CVGroup_UIEventMission_Idle1-1 = "...O que vocês estão fazendo?! Vão logo cuidar do trabalho de vocês!"
16018-CVGroup_UIEventMission_Idle1-2 = "(Ai, ai... o Sensei é bom demais, esse é o seu maior defeito...)"
16018-CVGroup_UIEventMission_Idle2-1 = "Hah... como você provavelmente não sabe, vou te avisar."
16018-CVGroup_UIEventMission_Idle2-2 = "Quando tocam no meu capacete, o som ecoa e fica muito barulhento."
16018-CVGroup_UIEventMission_Idle2-3 = "..."
16018-CVGroup_UIEventMission_Idle2-4 = "Só um pouquinho, então... que seja."
16018-CVGroup_UIEventMission_Buy1-1 = "Se não ganharmos pelo menos isso, não vale o esforço!"
16018-CVGroup_UIEventMission_Buy2-1 = "Incrível! Era exatamente isso que eu estava esperando!"
16018-CVGroup_UIEventMission_Interaction1-1 = "Pronto, cota de hoje finalizada! Foi moleza."
16018-CVGroup_UIEventMission_Interaction1-2 = "Para mim, isso é fichinha♪"
