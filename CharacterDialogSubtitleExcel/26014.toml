[translation]
26014-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
26014-CVGroup_CharacterGet_Idle1-1 = "ミレニアムサイエンススクールの角楯カリン、準備はできてる。\n……こ、この服装、大丈夫そうか？"
26014-CVGroup_Cafe_Idle1-1 = "どこかに鏡は……"
26014-CVGroup_Cafe_Idle2-1 = "時間ができた……\n先生はどこに……"
26014-CVGroup_Cafe_Idle3-1 = "ここは可愛い家具が多いな……\n気に入った。"
26014-CVGroup_Cafe_Idle4-1 = "敵の気配はなさそうだ。\n警戒を少し緩める。"
26014-CVGroup_Cafe_Idle5-1 = "この辺の掃除を……\n……いや、制服のときは止めておこう。"
26014-CVGroup_WeaponGet_Idle1-1 = "いつでも、どんな姿でも、\n先生のために駆けつけると誓おう。"
26014-CVGroup_UIEventLobby_Enter1-1 = "お、お疲れ、先生。"
26014-CVGroup_UIEventLobby_Enter1-2 = "……言い慣れないな。"
26014-CVGroup_UIEventLobby_Enter2-1 = "もう少し可愛い挨拶を……"
26014-CVGroup_UIEventLobby_Enter2-2 = "……い、今のは独り言だ！"
26014-CVGroup_UIEventLobby_Enter3-1 = "まったく……\n気が休まらない。"
26014-CVGroup_UIEventLobby_Enter4-1 = "あと少しだ、先生。\n一緒に頑張ろう。"
26014-CVGroup_UIEventLobby_Enter5-1 = "終わったんだな。"
26014-CVGroup_UIEventLobby_Enter5-2 = "終わってみると逆に……\n名残惜しく感じる。"
26014-CVGroup_UIEventLobby_Idle1-1 = "ど、どうしたんだ？\n依頼か？"
26014-CVGroup_UIEventLobby_Idle2-1 = "こ、これはミレニアム指定の制服だけど……？"
26014-CVGroup_UIEventLobby_Idle2-2 = "何か変なところでもあるのか？"
26014-CVGroup_UIEventLobby_Idle3-1 = "えっと……先生。"
26014-CVGroup_UIEventLobby_Idle3-2 = "せっかくの制服だ、からその、"
26014-CVGroup_UIEventLobby_Idle3-3 = "私と一緒に……"
26014-CVGroup_UIEventLobby_Idle4-1 = "……や、やはり、何でもない。\n気にしないでくれ。"
