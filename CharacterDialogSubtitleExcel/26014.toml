[translation]
26014-CVGroup_UITitle_Idle1-1 = "Blue Archive."
26014-CVGroup_CharacterGet_Idle1-1 = "Karin Kakudate, da Millennium Science School, pronta para o serviço.\n……E-esta roupa, está tudo bem?"
26014-CVGroup_Cafe_Idle1-1 = "Onde tem um espelho……"
26014-CVGroup_Cafe_Idle2-1 = "Consegui um tempo livre……\nOnde está o Sensei……"
26014-CVGroup_Cafe_Idle3-1 = "Tem muitos móveis fofos aqui……\nGostei."
26014-CVGroup_Cafe_Idle4-1 = "Não parece haver sinal de inimigos.\nVou relaxar um pouco a vigilância."
26014-CVGroup_Cafe_Idle5-1 = "Vou limpar por aqui……\n……Não, melhor não, já que estou de uniforme."
26014-CVGroup_WeaponGet_Idle1-1 = "Prometo que, a qualquer momento e em qualquer situação, correrei para ajudar o Sensei."
26014-CVGroup_UIEventLobby_Enter1-1 = "O-olá, Sensei."
26014-CVGroup_UIEventLobby_Enter1-2 = "……Ainda não me acostumei a dizer isso."
26014-CVGroup_UIEventLobby_Enter2-1 = "Eu queria uma saudação um pouco mais fofa……"
26014-CVGroup_UIEventLobby_Enter2-2 = "……I-isso foi só um pensamento em voz alta!"
26014-CVGroup_UIEventLobby_Enter3-1 = "Francamente……\nNão consigo descansar."
26014-CVGroup_UIEventLobby_Enter4-1 = "Falta pouco, Sensei.\nVamos nos esforçar juntos."
26014-CVGroup_UIEventLobby_Enter5-1 = "Então acabou."
26014-CVGroup_UIEventLobby_Enter5-2 = "Agora que terminou, sinto……\nUma certa nostalgia."
26014-CVGroup_UIEventLobby_Idle1-1 = "O-o que foi?\nÉ uma missão?"
26014-CVGroup_UIEventLobby_Idle2-1 = "E-este é o uniforme padrão da Millennium, mas……?"
26014-CVGroup_UIEventLobby_Idle2-2 = "Tem algo de estranho nele?"
26014-CVGroup_UIEventLobby_Idle3-1 = "Bem…… Sensei."
26014-CVGroup_UIEventLobby_Idle3-2 = "Já que estou usando este uniforme, então, bem,"
26014-CVGroup_UIEventLobby_Idle3-3 = "Você poderia……"
26014-CVGroup_UIEventLobby_Idle4-1 = "……N-não, esqueça. Não é nada.\nNão se preocupe com isso."
