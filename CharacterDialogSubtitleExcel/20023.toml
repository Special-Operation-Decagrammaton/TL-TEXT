[translation]
20023-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20023-CVGroup_CharacterGet_Idle1-1 = "ヴァルキューレ警察学校、公安局局長の尾刃カンナです。\n犯罪者の尋問なら、お任せを。"
20023-CVGroup_Cafe_Idle1-1 = "ここのコーヒー……\nなかなかいい香りだ。"
20023-CVGroup_Cafe_Idle2-1 = "疲れた……。"
20023-CVGroup_Cafe_Idle3-1 = "こんなところに探偵ウサギシリーズの新作が……？"
20023-CVGroup_Cafe_Idle4-1 = "うっ、防衛室から連絡が……。"
20023-CVGroup_Cafe_Idle5-1 = "今日もキヴォトスが平和でありますよう。"
20023-CVGroup_WeaponGet_Idle1-1 = "そういえば、この銃が扱えず苦労をしていた時もありました。\n銃に慣れてきた今は、ほとんど使う機会がなくなって残念ですが……。"
