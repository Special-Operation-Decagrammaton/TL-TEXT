[translation]
16016-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
16016-CVGroup_CharacterGet_Idle1-1 = "救護騎士団……いえ、アンティーク・セラフィムのメンバー。\n蒼森ミネと申します。どうぞよろしくお願いいたします。"
16016-CVGroup_Cafe_Idle1-1 = "ここは……。"
16016-CVGroup_Cafe_Idle2-1 = "大変気に入りました。"
16016-CVGroup_Cafe_Idle3-1 = "振り付けの練習をしたいのですが……。"
16016-CVGroup_Cafe_Idle4-1 = "ふふ、オーディエンスがたくさんいますね……。"
16016-CVGroup_Cafe_Idle5-1 = "ご期待に応えられるよう、練習しなければ……！"
16016-CVGroup_WeaponGet_Idle1-1 = "この関係……まるで、アイドルとマネージャーのようですね。\n先生が支援し、私が表舞台に立つ。\n本当にそうなら、よかったのですが……残念です。"
16016-CVGroup_UIEventLobby_Enter1-1 = "こんにちは、先生。"
16016-CVGroup_UIEventLobby_Enter1-2 = "私…ではなく、ステージを見に来られたのですよね。"
16016-CVGroup_UIEventLobby_Enter2-1 = "お待ちしておりました、先生。"
16016-CVGroup_UIEventLobby_Enter2-2 = "お席をご用意しております。\nどうぞおかけください。"
16016-CVGroup_UIEventLobby_Enter3-1 = "ステージは続いておりますよ、集中してください！"
16016-CVGroup_UIEventLobby_Enter4-1 = "最後まで、\n聞いていってくださいね。"
16016-CVGroup_UIEventLobby_Enter5-1 = "ふふ、とても素敵なステージでした。"
16016-CVGroup_UIEventLobby_Idle1-1 = "先生……\nなにか御用でしょうか？"
16016-CVGroup_UIEventLobby_Idle2-1 = "これもファンサービス……\nなのでしょうか？"
16016-CVGroup_UIEventLobby_Idle3-1 = "先生に楽しんでいただけたのなら、それで十分です。"
16016-CVGroup_UIEventLobby_Idle4-1 = "あ、あ―、あ―。"
16016-CVGroup_UIEventLobby_Idle4-2 = "……いつでも歌えるよう、\n発声練習をしておりました。"
