[translation]
16016-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16016-CVGroup_CharacterGet_Idle1-1 = "Da Ordem dos Enfermeiros... não, sou um membro do Antique Seraphim.\nMeu nome é Mine Aomori. É um prazer conhecê-lo."
16016-CVGroup_Cafe_Idle1-1 = "Onde é que estamos...?"
16016-CVGroup_Cafe_Idle2-1 = "Gostei muito daqui."
16016-CVGroup_Cafe_Idle3-1 = "Eu gostaria de praticar a coreografia..."
16016-CVGroup_Cafe_Idle4-1 = "Fufu, há muitos espectadores aqui..."
16016-CVGroup_Cafe_Idle5-1 = "Preciso praticar para conseguir atender às expectativas...!"
16016-CVGroup_WeaponGet_Idle1-1 = "Essa relação... parece muito com a de um ídolo e seu empresário.\nO Sensei dá o suporte e eu fico no palco.\nSeria ótimo se fosse realmente assim... mas, infelizmente, não é."
16016-CVGroup_UIEventLobby_Enter1-1 = "Olá, Sensei."
16016-CVGroup_UIEventLobby_Enter1-2 = "Você veio para ver o palco... e não a mim, certo?"
16016-CVGroup_UIEventLobby_Enter2-1 = "Eu estava esperando por você, Sensei."
16016-CVGroup_UIEventLobby_Enter2-2 = "Preparei um assento para você.\nPor favor, sente-se."
16016-CVGroup_UIEventLobby_Enter3-1 = "O show continua, por favor, concentre-se!"
16016-CVGroup_UIEventLobby_Enter4-1 = "Fique até o final,\npara ouvir tudo."
16016-CVGroup_UIEventLobby_Enter5-1 = "Fufu, foi um show maravilhoso."
16016-CVGroup_UIEventLobby_Idle1-1 = "Sensei...\nPrecisa de alguma coisa?"
16016-CVGroup_UIEventLobby_Idle2-1 = "Será que isso também conta... como serviço de fã?"
16016-CVGroup_UIEventLobby_Idle3-1 = "Se você se divertiu, Sensei, isso é o suficiente para mim."
16016-CVGroup_UIEventLobby_Idle4-1 = "Ah, ah... ah."
16016-CVGroup_UIEventLobby_Idle4-2 = "...Eu estava fazendo exercícios vocais,\npara poder cantar a qualquer momento."
