[translation]
20057-CVGroup_UITitle_Idle1-1 = "Blue Archive. Хе-хе."
20057-CVGroup_CharacterGet_Idle1-1 = "Академия Миллениум, позывной «ноль-три», Мурокаса Акане. Приветствую вас в качестве обычной ученицы. Хе-хе, впрочем, я ведь с самого начала ею и была, не так ли?"
20057-CVGroup_Cafe_Idle1-1 = "Думаю, пока что нам стоит приготовить немного тортика."
20057-CVGroup_Cafe_Idle2-1 = "Здесь так приятно отдыхать."
20057-CVGroup_Cafe_Idle3-1 = "Мне бы тоже хотелось поставить такую мебель в нашей клубной комнате."
20057-CVGroup_Cafe_Idle4-1 = "(Убрано здесь на совесть, но... вниманию к деталям всё же не хватает.)"
20057-CVGroup_Cafe_Idle5-1 = "(Учитывая эти размеры... количество взрывчатки, которое потребуется, будет...)"
20057-CVGroup_WeaponGet_Idle1-1 = "В Кивотосе оружие — это необходимость. И это не меняется, будь ты горничной или обычной ученицей. Среди огромного множества пушек... я продолжу оттачивать свои навыки именно с этим «инструментом для уборки», который получила от вас."
20057-CVGroup_UIEventLobby_Enter1-1 = "Я ждала тебя, Сенсей."
20057-CVGroup_UIEventLobby_Enter1-2 = "Предоставь экскурсию по Миллениуму мне."
20057-CVGroup_UIEventLobby_Enter2-1 = "Если есть какое-то место, куда бы тебе хотелось пойти, пожалуйста, не стесняйся спрашивать."
20057-CVGroup_UIEventLobby_Enter3-1 = "Обычно у нас и так оживлённо, но..."
20057-CVGroup_UIEventLobby_Enter3-2 = "Сегодня в Тысячелетии как-то особенно шумно."
20057-CVGroup_UIEventLobby_Enter3-3 = "Впрочем, иметь такой прилив энергии — это очень здорово."
20057-CVGroup_UIEventLobby_Enter4-1 = "Мы наконец-то приближаемся к кульминации."
20057-CVGroup_UIEventLobby_Enter4-2 = "Как самой выставки EXPO, так и всех этих хлопотных инцидентов."
20057-CVGroup_UIEventLobby_Enter5-1 = "Тебе понравилась выставка Миллениум EXPO?"
20057-CVGroup_UIEventLobby_Enter5-2 = "Для меня было честью провести это время с тобой, Сенсей."
20057-CVGroup_UIEventLobby_Enter5-3 = "...Да, очень большой честью."
20057-CVGroup_UIEventLobby_Idle1-1 = "Возможность вот так проводить время вместе с тобой..."
20057-CVGroup_UIEventLobby_Idle1-2 = "Я искренне счастлива этому."
20057-CVGroup_UIEventLobby_Idle2-1 = "Пожалуйста, дай мне знать, если проголодаешься."
20057-CVGroup_UIEventLobby_Idle2-2 = "Я знаю одну отличную школьную столовую."
20057-CVGroup_UIEventLobby_Idle2-3 = "Если бы я выступала в роли «горничной», я бы приготовила для тебя домашнюю еду, но..."
20057-CVGroup_UIEventLobby_Idle2-4 = "Прямо сейчас я ведь всего лишь «студент»."
20057-CVGroup_UIEventLobby_Idle3-1 = "Ты звал меня, Сенсей?"
20057-CVGroup_UIEventLobby_Idle3-2 = "Ты просто позвал меня... без какой-либо причины?"
20057-CVGroup_UIEventLobby_Idle3-3 = "Хе-хе, надо же."
20057-CVGroup_UIEventLobby_Idle4-1 = "Хе-хе."
20057-CVGroup_UIEventLobby_Idle4-2 = "На самом деле я довольно устойчива к щекотке."
20057-CVGroup_UIEventLobby_Idle4-3 = "Не откажешься ли ты рассказать... как с этим дела обстоят у тебя, Сенсей?"