[translation]
20057-CVGroup_UITitle_Idle1-1 = "Blue Archive. Ufufu."
20057-CVGroup_CharacterGet_Idle1-1 = "Millennium Science School, call sign 03, Murokasa Akane.\nSaúdo-o como aluna. Fufu, embora eu já seja uma aluna, não é?"
20057-CVGroup_Cafe_Idle1-1 = "Por enquanto, seria bom preparar um bolo."
20057-CVGroup_Cafe_Idle2-1 = "Este lugar é bem relaxante, não é?"
20057-CVGroup_Cafe_Idle3-1 = "Eu gostaria de colocar aquele móvel na nossa sala do clube também."
20057-CVGroup_Cafe_Idle4-1 = "(A limpeza está em dia, mas... ainda falta um pouco de atenção aos detalhes.)"
20057-CVGroup_Cafe_Idle5-1 = "(Este espaço... a quantidade de explosivos necessária seria...)"
20057-CVGroup_WeaponGet_Idle1-1 = "Em Kivotos, uma arma é um item essencial.\nIsso não muda, seja você uma maid ou uma aluna.\nEntre tantas armas...\nContinuarei me dedicando com esta \"ferramenta de limpeza\" que recebi do Sensei."
20057-CVGroup_UIEventLobby_Enter1-1 = "Eu estava à sua espera, Sensei."
20057-CVGroup_UIEventLobby_Enter1-2 = "Deixe a orientação de Millennium comigo."
20057-CVGroup_UIEventLobby_Enter2-1 = "Se houver algum lugar que queira ir, não hesite em me dizer."
20057-CVGroup_UIEventLobby_Enter3-1 = "Já costuma ser movimentado, mas..."
20057-CVGroup_UIEventLobby_Enter3-2 = "Millennium está especialmente agitada hoje."
20057-CVGroup_UIEventLobby_Enter3-3 = "É bom ver tanta energia, mas..."
20057-CVGroup_UIEventLobby_Enter4-1 = "Estamos chegando na reta final."
20057-CVGroup_UIEventLobby_Enter4-2 = "Tanto a EXPO quanto os incidentes problemáticos."
20057-CVGroup_UIEventLobby_Enter5-1 = "Você aproveitou a Millennium EXPO?"
20057-CVGroup_UIEventLobby_Enter5-2 = "Foi uma honra poder acompanhar o Sensei."
20057-CVGroup_UIEventLobby_Enter5-3 = "...Sim, muito."
20057-CVGroup_UIEventLobby_Idle1-1 = "Poder passar este tempo com o Sensei..."
20057-CVGroup_UIEventLobby_Idle1-2 = "Eu fico realmente feliz com isso."
20057-CVGroup_UIEventLobby_Idle2-1 = "Se estiver com fome, me avise."
20057-CVGroup_UIEventLobby_Idle2-2 = "Conheço um refeitório que recomendo."
20057-CVGroup_UIEventLobby_Idle2-3 = "Se eu estivesse como \"maid\", eu mesma prepararia algo, mas..."
20057-CVGroup_UIEventLobby_Idle2-4 = "Agora, sou uma \"aluna\"."
20057-CVGroup_UIEventLobby_Idle3-1 = "Chamou, Sensei?"
20057-CVGroup_UIEventLobby_Idle3-2 = "Foi só por chamar mesmo...?"
20057-CVGroup_UIEventLobby_Idle3-3 = "うふふっ、あらあら。"
20057-CVEventLobby_Idle3-3 = "Ufufu, ora, ora."
20057-CVGroup_UIEventLobby_Idle4-1 = "Fufu."
20057-CVGroup_UIEventLobby_Idle4-2 = "Eu sou bem resistente a cócegas."
20057-CVGroup_UIEventLobby_Idle4-3 = "O Sensei... poderia me dizer como é com você?"
