[translation]
20057-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。うふふっ。"
20057-CVGroup_CharacterGet_Idle1-1 = "ミレニアムサイエンススクール、コールサインゼロスリー室笠アカネ。\n生徒としてご挨拶申し上げます。ふふっ、もともと生徒なのですけどね？"
20057-CVGroup_Cafe_Idle1-1 = "ひとまずケーキを用意したいところですね。"
20057-CVGroup_Cafe_Idle2-1 = "ここはなんだか落ち着きますね。"
20057-CVGroup_Cafe_Idle3-1 = "あの家具、部室にも置きたいですね。"
20057-CVGroup_Cafe_Idle4-1 = "（掃除が行き届いてはいますが……詰めが甘いですね）"
20057-CVGroup_Cafe_Idle5-1 = "（この広さ……必要な爆薬の量は……）"
20057-CVGroup_WeaponGet_Idle1-1 = "キヴォトスにおいて、銃は必需品です。\nそれはメイドだろうと、生徒だろうと変わりません。\n数多ある銃の中……\n先生から頂戴したこの「掃除道具」と共に、これからも精進いたしますね。"
20057-CVGroup_UIEventLobby_Enter1-1 = "お待ちしておりました、先生。"
20057-CVGroup_UIEventLobby_Enter1-2 = "ミレニアムの案内はお任せください。"
20057-CVGroup_UIEventLobby_Enter2-1 = "行きたい場所があれば、遠慮なく仰ってくださいね。"
20057-CVGroup_UIEventLobby_Enter3-1 = "普段から賑やかですが……。"
20057-CVGroup_UIEventLobby_Enter3-2 = "今日のミレニアムは一入ですね。"
20057-CVGroup_UIEventLobby_Enter3-3 = "活気があるのは、良いことですが。"
20057-CVGroup_UIEventLobby_Enter4-1 = "いよいよ大詰めですね。"
20057-CVGroup_UIEventLobby_Enter4-2 = "EXPOも、人騒がせな事件も。"
20057-CVGroup_UIEventLobby_Enter5-1 = "ミレニアムEXPO、お楽しみいただけましたか？"
20057-CVGroup_UIEventLobby_Enter5-2 = "私は先生とご一緒できて光栄でした。"
20057-CVGroup_UIEventLobby_Enter5-3 = "……ええ、とても。"
20057-CVGroup_UIEventLobby_Idle1-1 = "こうして先生と時間を過ごせること……。"
20057-CVGroup_UIEventLobby_Idle1-2 = "私は、それが本当に嬉しいのです。"
20057-CVGroup_UIEventLobby_Idle2-1 = "お腹が空いたら仰ってくださいね。"
20057-CVGroup_UIEventLobby_Idle2-2 = "オススメの学食があるんです。"
20057-CVGroup_UIEventLobby_Idle2-3 = "「メイド」の私であれば手料理をご用意するところですが……。"
20057-CVGroup_UIEventLobby_Idle2-4 = "今は、「生徒」ですから。"
20057-CVGroup_UIEventLobby_Idle3-1 = "お呼びでしょうか、先生？"
20057-CVGroup_UIEventLobby_Idle3-2 = "呼んだだけ、ですか……？"
20057-CVGroup_UIEventLobby_Idle3-3 = "うふふっ、あらあら。"
20057-CVGroup_UIEventLobby_Idle4-1 = "ふふっ。"
20057-CVGroup_UIEventLobby_Idle4-2 = "私、くすぐりには強い方でして。"
20057-CVGroup_UIEventLobby_Idle4-3 = "先生は……どうなのか教えていただけますか？"
