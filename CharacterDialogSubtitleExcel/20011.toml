[translation]
20011-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20011-CVGroup_CharacterGet_Idle1-1 = "これ？巫女さんの格好だよ。\nえっ……コスプレ？\nち、違うってば！れっきとしたアルバイト！"
20011-CVGroup_Cafe_Idle1-1 = "祓いたまえ、清めたまえ～！\n……なんちゃって。"
20011-CVGroup_Cafe_Idle2-1 = "なんか、頻繁に除霊を頼まれるんだけど……\n除霊って実際、どうすればいいんだろ。"
20011-CVGroup_Cafe_Idle3-1 = "巫女巫女ニャンニャン♪巫女巫女ニャンニャン♪\n……ちょぉっ！？いつからそこに！？\n忘れて！今すぐ！！"
20011-CVGroup_Cafe_Idle4-1 = "あ、今月結構残業したし、\nバイト代期待できるかもふふっ♪"
20011-CVGroup_Cafe_Idle5-1 = "バイトが終わったら、\nみんなをここに誘ってみようかな。"
20011-CVGroup_WeaponGet_Idle1-1 = "まったく、こんなものまで用意してくれちゃって……\nしょうがないから、その……うん。\nもっと頑張って、恩返しするからね。先生。"
20011-CVGroup_UIEventLobby_Enter1-1 = "あっ、いらっしゃい。先生。\nもう新年のお願いごとはしてきた？"
20011-CVGroup_UIEventLobby_Enter2-1 = "せ、先生、どうしてここに！？\nも、もしかしてわざわざ私に……！？"
20011-CVGroup_UIEventLobby_Enter2-2 = "やっ、ごめん、今の無し……。"
20011-CVGroup_UIEventLobby_Idle1-1 = "な、何度も言ってるけど、\nこれコスプレじゃないから！"
20011-CVGroup_UIEventLobby_Idle1-2 = "バイト用のちゃんとした格好だから！"
20011-CVGroup_UIEventLobby_Idle2-1 = "な、なに、先生？\nそんなにじっと見て……。"
20011-CVGroup_UIEventLobby_Idle2-2 = "ま、真面目に働いてるだけじゃん。"
20011-CVGroup_UIEventLobby_Idle3-1 = "バイトが終わったら、\nアヤネちゃんとか先輩たちを呼んで食べ歩きとかしたいなー……。"
20011-CVGroup_UIEventLobby_Idle4-1 = "え、もう一回やってほしい？また？"
20011-CVGroup_UIEventLobby_Idle4-2 = "うっ……分かった、分かったわよ！\nやればいいんでしょ！"
20011-CVGroup_UIEventLobby_Idle4-3 = "……あ、悪霊退散ー！\nほら、これで満足！？"
20011-CVGroup_UIEventLobby_Enter3-1 = "新年とはいえ、騒がしいわね～"
20011-CVGroup_UIEventLobby_Enter3-2 = "まあ、活気があって良いと思うけど。"
20011-CVGroup_UIEventLobby_Enter4-1 = "はぁ……黒亀組とか、カイテンジャーとか……\nどうしてこう次から次へと……"
20011-CVGroup_UIEventLobby_Enter4-2 = "バイト代、ちゃんともらえるのかな……？"
20011-CVGroup_UIEventLobby_Enter5-1 = "新年早々バタバタだったけど、\nそろそろ落ち着いてきたかな。"
20011-CVGroup_UIEventLobby_Enter5-2 = "お疲れ様、先生。\n一緒に帰って、おせちでも食べる？"
20011-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "あっ、先生。\nおみくじ引きにきたの？\nおみくじならここだよ。"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "おみくじはいかがですかー！"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "……おみくじって、\nこうやって宣伝して良いものなのかな？"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "新年の運試しだよ、\n決まっちゃうんだよ、先生！"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "何だかドキドキしてきた……！"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "まあ、悪い結果が出ても大丈夫よ。\nほら、巫女さんの私がいるんだし……！"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "……そ、そんなに笑わないで！\n頑張って言ったのに！"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "え、大吉！？\nすごいじゃん先生！"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "大吉を引くと、特別な商品が貰えるんだよ！はい！"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "吉だって！\n先生、おめでと！"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "というわけでここで、\n幸運の巫女から賞品の贈呈～！"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "中吉かー、\nうん、良いんじゃない？"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-2 = "じゃあ中吉を当てた先生には、これをあげる！"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "うん？小吉？"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "ガッカリしないで、先生。\nほら、先生にこれあげるから。"
20011-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "末吉かぁ……\n何となく先生っぽいっていうか……。"
20011-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "あ、いや、悪口じゃなくて！\nとにかくはいこれ、末吉の賞品ね。"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "きょ、凶！？\nあ、あはは……その、だ、大丈夫！"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "ほら、これあげるから！\n気にしないで、ね？"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "あ、新年のイベントはもう終わっちゃったけど、\nまだおみくじは引けるよ"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-2 = "ほい、先生！"
