[translation]
20011-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20011-CVGroup_CharacterGet_Idle1-1 = "Is this? It's a shrine maiden outfit.\nEh... cosplay?\nN-No, it's not! It's a legitimate part-time job!"
20011-CVGroup_Cafe_Idle1-1 = "Begone, evil spirits, be purified~!\n...Just kidding."
20011-CVGroup_Cafe_Idle2-1 = "I keep getting asked to perform exorcisms lately...\nI wonder how you're actually supposed to do that."
20011-CVGroup_Cafe_Idle3-1 = "Miko miko nyan nyan♪ Miko miko nyan nyan♪\n...Whaaa!? Since when were you there!?\nForget it! Forget it right now!!"
20011-CVGroup_Cafe_Idle4-1 = "Ah, I worked a lot of overtime this month,\nso I might be able to expect a good paycheck, hehe♪"
20011-CVGroup_Cafe_Idle5-1 = "When my shift is over,\nmaybe I'll invite everyone here."
20011-CVGroup_WeaponGet_Idle1-1 = "Geez, you even went and prepared something like this for me...\nWell, I guess I have no choice, so... yeah.\nI'll work even harder to pay you back, Sensei."
20011-CVGroup_UIEventLobby_Enter1-1 = "Ah, welcome, Sensei.\nHave you already made your New Year's wishes?"
20011-CVGroup_UIEventLobby_Enter2-1 = "S-Sensei, why are you here!?\nD-Did you come all this way just for me...!?"
20011-CVGroup_UIEventLobby_Enter2-2 = "Ah, sorry, ignore what I just said..."
20011-CVGroup_UIEventLobby_Idle1-1 = "L-Like I've said a million times,\nthis isn't cosplay!"
20011-CVGroup_UIEventLobby_Idle1-2 = "It's a proper outfit for my part-time job!"
20011-CVGroup_UIEventLobby_Idle2-1 = "W-What is it, Sensei?\nStaring at me like that..."
20011-CVGroup_UIEventLobby_Idle2-2 = "I'm just working hard, you know."
20011-CVGroup_UIEventLobby_Idle3-1 = "When my shift ends, I want to call Ayane-chan and the others to go out and eat something..."
20011-CVGroup_UIEventLobby_Idle4-1 = "Eh, you want me to do it again? Again?"
20011-CVGroup_UIEventLobby_Idle4-2 = "Ugh... fine, fine, I get it!\nI'll do it, okay!"
20011-CVGroup_UIEventLobby_Idle4-3 = "...A-Away with evil spirits!\nThere, are you satisfied now!?"
20011-CVGroup_UIEventLobby_Enter3-1 = "Even if it is New Year's, it's pretty noisy, isn't it?"
20011-CVGroup_UIEventLobby_Enter3-2 = "Well, I suppose the liveliness is nice, though."
20011-CVGroup_UIEventLobby_Enter4-1 = "Haa... the Kurokame-gumi, the Kaitengers...\nWhy does one thing after another keep happening..."
20011-CVGroup_UIEventLobby_Enter4-2 = "I wonder if I'll actually get paid for this..."
20011-CVGroup_UIEventLobby_Enter5-1 = "It's been hectic since the start of the New Year,\nbut I think things are finally settling down."
20011-CVGroup_UIEventLobby_Enter5-2 = "Good work, Sensei.\nShall we head home together and eat some Osechi?"
20011-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "Ah, Sensei.\nDid you come to draw an Omikuji?\nThe Omikuji are right here."
20011-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "Get your Omikuji here!"
20011-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "...Is it really okay to advertise Omikuji\nlike this?"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "It's a test of your luck for the New Year,\nit's all going to be decided now, Sensei!"
20011-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "I'm starting to get nervous...!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "Well, it's okay even if you get a bad result.\nLook, you've got me, the shrine maiden, right here...!"
20011-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "...D-Don't laugh so much!\nI tried really hard to say that!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "Eh, Daikichi (Great Blessing)!?\nThat's amazing, Sensei!"
20011-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "If you draw a Daikichi, you get a special prize! Here!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "It's a Kichi (Blessing)!\nCongrats, Sensei!"
20011-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "And so, here is a prize\npresented by your lucky shrine maiden~!"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "Chukichi (Middle Blessing), huh?\nYeah, that's not bad, right?"
20011-CVGroup_UIEventFortuneGachaShop_Luck3-2 = "Alright, here's something for you, Sensei, since you got a Chukichi!"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "Hmm? Shokichi (Small Blessing)?"
20011-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "Don't be disappointed, Sensei.\nHere, take this."
20011-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "Suekichi (Future Blessing), huh...\nIt's kind of... very 'you', Sensei..."
20011-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "Ah, no, I didn't mean that as an insult!\nAnyway, here's your Suekichi prize."
20011-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "K-Kyo (Great Curse)!?\nAh, ahaha... well, it's, it's okay!"
20011-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "Look, I'll give you this!\nDon't worry about it, okay?"
20011-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "Ah, the New Year's event is already over,\nbut you can still draw an Omikuji."
20011-CVGroup_UIEventFortuneGachaShop_Enter3-2 = "Here you go, Sensei!"
