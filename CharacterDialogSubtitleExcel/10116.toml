[translation]
10116-CVGroup_UITitle_Idle1-1 = "ブ、ブルー、アーカイブ。"
10116-CVGroup_CharacterGet_Idle1-1 = "アリウススクワッドのサオリだ……\nこれは、任務のために着ている。\n……本当だ。"
10116-CVGroup_Cafe_Idle1-1 = "潜入作戦の練習にちょうど良さそうだ。"
10116-CVGroup_Cafe_Idle2-1 = "いつか、あの子たちにも……ドレスを。"
10116-CVGroup_Cafe_Idle3-1 = "任務以外でこれを着る機会があるのだろうか……。"
10116-CVGroup_Cafe_Idle4-1 = "視線を感じる……\nもしかして、目立っているのか？"
10116-CVGroup_Cafe_Idle5-1 = "便利屋68……\nやはり、只者ではないな……。"
10116-CVGroup_WeaponGet_Idle1-1 = "おかげで遂行できる仕事の幅が増えた。\n依頼でもなんでも、応えてみせよう。"
10116-CVGroup_UIEventLobby_Enter1-1 = "特殊任務の時間だ。"
10116-CVGroup_UIEventLobby_Enter1-2 = "では、はじめよう。"
10116-CVGroup_UIEventLobby_Enter2-1 = "先生がいるのなら、問題ないな。"
10116-CVGroup_UIEventLobby_Enter3-1 = "順調だな。\nこのあとの指揮も、よろしく頼む。"
10116-CVGroup_UIEventLobby_Enter4-1 = "作戦は終盤に差しかかっている。"
10116-CVGroup_UIEventLobby_Enter4-2 = "時間配分に注意してくれ。"
10116-CVGroup_UIEventLobby_Enter5-1 = "この後も……ずっとこれを着ていたいのだが。\n難しいのだろうか。"
10116-CVGroup_UIEventLobby_Idle1-1 = "どうかしたのか？"
10116-CVGroup_UIEventLobby_Idle2-1 = "何も無いのか……？"
10116-CVGroup_UIEventLobby_Idle3-1 = "私が、きれい……？"
10116-CVGroup_UIEventLobby_Idle3-2 = "先生は……変な冗談を言うんだな。"
10116-CVGroup_UIEventLobby_Idle4-1 = "っ、そういうことを軽々しく言うな。"
