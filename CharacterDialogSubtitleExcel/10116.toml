[translation]
10116-CVGroup_UITitle_Idle1-1 = "Blu, Blue, Archive."
10116-CVGroup_CharacterGet_Idle1-1 = "Sou Saori, do Esquadrão Arius... Estou vestindo isso por causa da missão. ...É verdade."
10116-CVGroup_Cafe_Idle1-1 = "Parece ser perfeito para praticar operações de infiltração."
10116-CVGroup_Cafe_Idle2-1 = "Quem sabe um dia, para elas também... um vestido."
10116-CVGroup_Cafe_Idle3-1 = "Será que terei outra oportunidade de usar isso fora de uma missão...?"
10116-CVGroup_Cafe_Idle4-1 = "Sinto olhares sobre mim... Será que estou chamando muita atenção?"
10116-CVGroup_Cafe_Idle5-1 = "Problem Solver 68... Como esperado, não são pessoas comuns..."
10116-CVGroup_WeaponGet_Idle1-1 = "Graças a isso, a gama de trabalhos que posso realizar aumentou. Aceitarei qualquer pedido ou tarefa."
10116-CVGroup_UIEventLobby_Enter1-1 = "É hora da missão especial."
10116-CVGroup_UIEventLobby_Enter1-2 = "Então, vamos começar."
10116-CVGroup_UIEventLobby_Enter2-1 = "Se o Sensei está aqui, não há problema."
10116-CVGroup_UIEventLobby_Enter3-1 = "Estamos indo bem. Conto com o seu comando daqui em diante também."
10116-CVGroup_UIEventLobby_Enter4-1 = "A operação está chegando na fase final."
10116-CVGroup_UIEventLobby_Enter4-2 = "Por favor, preste atenção na distribuição do tempo."
10116-CVGroup_UIEventLobby_Enter5-1 = "Eu gostaria de continuar... usando isso por mais tempo. Será que é pedir demais?"
10116-CVGroup_UIEventLobby_Idle1-1 = "Aconteceu alguma coisa?"
10116-CVGroup_UIEventLobby_Idle2-1 = "Não há nada...?"
10116-CVGroup_UIEventLobby_Idle3-1 = "Eu estou... bonita?"
10116-CVGroup_UIEventLobby_Idle3-2 = "Sensei... você faz umas piadas estranhas."
10116-CVGroup_UIEventLobby_Idle4-1 = "Ah, não diga essas coisas tão levianamente."
