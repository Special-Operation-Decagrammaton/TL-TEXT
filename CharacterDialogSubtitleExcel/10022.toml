[translation]
10022-CVGroup_UITitle_Idle1-1 = "……ブルーアーカイブ。"
10022-CVGroup_CharacterGet_Idle1-1 = "ゲヘナの風紀委員長、ヒナ。\n……これはあくまで、夏のトレーニング合宿のための格好だから。"
10022-CVGroup_Cafe_Idle1-1 = "この水着、変じゃないかな……？"
10022-CVGroup_Cafe_Idle2-1 = "トレーニングのせいか……\n少し体がだるい。"
10022-CVGroup_Cafe_Idle3-1 = "可愛い水着なんて、私には似合わない……。"
10022-CVGroup_Cafe_Idle4-1 = "ここは涼しいね……\nトレーニングにぴったり。"
10022-CVGroup_Cafe_Idle5-1 = "次のトレーニングの内容を考えないと……。"
10022-CVGroup_WeaponGet_Idle1-1 = "これを、私に……？分かった、ありがたく受け取る。\n最後の瞬間、その時まで……\n先生の期待に応えてみせるから。"
10022-CVGroup_UIEventLobby_Enter1-1 = "いらっしゃい、先生。\n見ての通り、夏合宿の準備は完璧。\n何でも言って。"
10022-CVGroup_UIEventLobby_Enter2-1 = "ああ、先生。\n合宿のスケジュールはちゃんと確認した？"
10022-CVGroup_UIEventLobby_Enter2-2 = "今日もこんなに暑いし、水分補給はこまめにね。"
10022-CVGroup_UIEventLobby_Idle1-1 = "夏……。\n蒸し暑くて、だるくて、何もかもめんどうだけど……。"
10022-CVGroup_UIEventLobby_Idle1-2 = "これもトレーニングの一環、仕方ない。"
10022-CVGroup_UIEventLobby_Idle2-1 = "海には常に危険が伴う。"
10022-CVGroup_UIEventLobby_Idle2-2 = "いつどこで事故が起こるか分からないから、気を付けて。"
10022-CVGroup_UIEventLobby_Idle2-3 = "その……何かあったら、\n私のことを呼んでくれれば。"
10022-CVGroup_UIEventLobby_Idle3-1 = "夏のトレーニング合宿。\nまさか今年は、先生と一緒だなんて……。"
10022-CVGroup_UIEventLobby_Idle3-2 = "……ちょっと新鮮。"
10022-CVGroup_UIEventLobby_Idle4-1 = "この水着はあくまで、トレーニングのためで……。"
10022-CVGroup_UIEventLobby_Idle4-2 = "新しい物を買わなくても、"
10022-CVGroup_UIEventLobby_Idle4-3 = "そのまま使えば効率的かなって……。"
10022-CVGroup_UIEventMission_Enter1-1 = "これより、夏合宿のトレーニングを始める。"
10022-CVGroup_UIEventMission_Idle1-1 = "面倒だけど、これもトレーニングの一環。"
10022-CVGroup_UIEventMission_Idle2-1 = "暑い、めんどくさい……。"
10022-CVGroup_UIEventMission_Buy1-1 = "ちゃんと合宿の効果があったみたい。"
10022-CVGroup_UIEventMission_Interaction1-1 = "作戦成功……でも、少し簡単すぎ。\nトレーニングにしては物足りない……。"
