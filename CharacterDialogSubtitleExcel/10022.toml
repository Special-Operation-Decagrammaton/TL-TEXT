[translation]
10022-CVGroup_UITitle_Idle1-1 = "……Blue Archive."
10022-CVGroup_CharacterGet_Idle1-1 = "Sou Hina, a presidente do Comitê Disciplinar de Gehenna.\n……Isto é apenas um traje para o nosso acampamento de treinamento de verão."
10022-CVGroup_Cafe_Idle1-1 = "Este traje de banho... não está estranho?"
10022-CVGroup_Cafe_Idle2-1 = "Será por causa do treinamento……\nMeu corpo está um pouco pesado."
10022-CVGroup_Cafe_Idle3-1 = "Trajes de banho fofos não combinam comigo……."
10022-CVGroup_Cafe_Idle4-1 = "Aqui é fresco, não é……\nPerfeito para treinar."
10022-CVGroup_Cafe_Idle5-1 = "Preciso pensar no conteúdo do próximo treinamento……."
10022-CVGroup_WeaponGet_Idle1-1 = "Isto é para mim……? Entendido, aceito com gratidão.\nAté o último momento, até aquele instante……\nEu irei corresponder às expectativas do Sensei."
10022-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo, Sensei.\nComo pode ver, os preparativos para o acampamento de verão estão perfeitos.\nPode me pedir o que precisar."
10022-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei.\nVocê conferiu o cronograma do acampamento?"
10022-CVGroup_UIEventLobby_Enter2-2 = "Está muito quente hoje também, então não se esqueça de se hidratar."
10022-CVGroup_UIEventLobby_Idle1-1 = "Verão…….\nÉ abafado, cansativo e tudo dá trabalho, mas……."
10022-CVGroup_UIEventLobby_Idle1-2 = "Isso também faz parte do treinamento, não tem jeito."
10022-CVGroup_UIEventLobby_Idle2-1 = "O mar sempre traz perigos."
10022-CVGroup_UIEventLobby_Idle2-2 = "Nunca se sabe quando ou onde um acidente pode ocorrer, então tome cuidado."
10022-CVGroup_UIEventLobby_Idle2-3 = "E…… se algo acontecer,\npor favor, me chame."
10022-CVGroup_UIEventLobby_Idle3-1 = "Acampamento de treinamento de verão.\nEu nunca imaginei que este ano seria com o Sensei……."
10022-CVGroup_UIEventLobby_Idle3-2 = "……É um pouco diferente."
10022-CVGroup_UIEventLobby_Idle4-1 = "Este traje de banho é apenas para o treinamento……."
10022-CVGroup_UIEventLobby_Idle4-2 = "Pensei que, em vez de comprar algo novo,"
10022-CVGroup_UIEventLobby_Idle4-3 = "usar o que já tenho seria mais eficiente……."
10022-CVGroup_UIEventMission_Enter1-1 = "Daremos início ao treinamento do acampamento de verão."
10022-CVGroup_UIEventMission_Idle1-1 = "É trabalhoso, mas isso também faz parte do treinamento."
10022-CVGroup_UIEventMission_Idle2-1 = "Que calor, que preguiça……."
10022-CVGroup_UIEventMission_Buy1-1 = "Parece que o acampamento teve bons resultados."
10022-CVGroup_UIEventMission_Interaction1-1 = "Missão concluída…… mas foi um pouco fácil demais.\nPara um treinamento, deixou a desejar……."
