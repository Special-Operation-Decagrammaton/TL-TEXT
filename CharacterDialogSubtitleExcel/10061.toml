[translation]
10061-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10061-CVGroup_CharacterGet_Idle1-1 = "トリニティ総合学園、シスターフッド所属の歌住サクラコです。\n日々に安寧があらんことを。"
10061-CVGroup_Cafe_Idle1-1 = "ここが、先生が飾りつけているという……。"
10061-CVGroup_Cafe_Idle2-1 = "いろんな方がいらしていますね。"
10061-CVGroup_Cafe_Idle3-1 = "聖堂とは雰囲気が随分と違いますね。"
10061-CVGroup_Cafe_Idle4-1 = "たまには……こういう場所にいるのも良いものです。"
10061-CVGroup_Cafe_Idle5-1 = "形は違いますが、穏やかな気持ちになります。"
10061-CVGroup_WeaponGet_Idle1-1 = "私に慈悲を与えてくださるのですね。有難く頂戴いたします。\nいつか、このご恩をお返しできる日が訪れますように。"
