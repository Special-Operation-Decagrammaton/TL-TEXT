[translation]
10061-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10061-CVGroup_CharacterGet_Idle1-1 = "Sou Utazumi Sakurako, da Sisterhood da Academia Trinity.\nQue haja paz em seus dias."
10061-CVGroup_Cafe_Idle1-1 = "Então este é o lugar que o Sensei decora..."
10061-CVGroup_Cafe_Idle2-1 = "Muitas pessoas vêm aqui, não é?"
10061-CVGroup_Cafe_Idle3-1 = "A atmosfera é bem diferente da catedral."
10061-CVGroup_Cafe_Idle4-1 = "De vez em quando... é bom estar em um lugar como este."
10061-CVGroup_Cafe_Idle5-1 = "Embora a forma seja diferente, sinto uma paz interior."
10061-CVGroup_WeaponGet_Idle1-1 = "Você está me concedendo misericórdia. Aceitarei com gratidão.\nEspero que um dia chegue o momento em que eu possa retribuir este favor."
