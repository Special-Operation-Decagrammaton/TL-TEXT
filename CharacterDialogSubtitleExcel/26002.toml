[translation]
26002-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～"
26002-CVGroup_CharacterGet_Idle1-1 = "ゲヘナ学園、給食部のジュリといいます。\nお腹が空いたら、いつでも私に言ってくださいね？"
26002-CVGroup_Cafe_Idle1-1 = "う～ん、甘い香り……。"
26002-CVGroup_Cafe_Idle2-1 = "これも食べられますかね？"
26002-CVGroup_Cafe_Idle3-1 = "とりあえず一回、揚げてみようかな……。"
26002-CVGroup_Cafe_Idle4-1 = "あら。とても良いところですね。"
26002-CVGroup_Cafe_Idle5-1 = "ここなら美味しいお料理が作れそうです。"
26002-CVGroup_WeaponGet_Idle1-1 = "ふふ、この銃をお料理に使うと、\nお肉の食感がぐんと柔らかくなりますね！"
