[translation]
20051-CVGroup_UITitle_Idle1-1 = "Blue Archive!!"
20051-CVGroup_CharacterGet_Idle1-1 = "Chamada e atendida! Estou de volta!\nA garota mágica, Magical Uzawa Reisa, chegou!"
20051-CVGroup_Cafe_Idle1-1 = "Ho, hoje também... tem muita gente..."
20051-CVGroup_Cafe_Idle2-1 = "T-tentar agir normalmente, o máximo possível..."
20051-CVGroup_Cafe_Idle3-1 = "(Ah! Isso... eu conheço esse assunto!)"
20051-CVGroup_Cafe_Idle4-1 = "Vocês todos parecem estar se divertindo!"
20051-CVGroup_Cafe_Idle5-1 = "(Ah... meu assento, foi ocupado...)"
20051-CVGroup_WeaponGet_Idle1-1 = "Sensei, você é sempre tão gentil comigo...\nEstando aqui com você... sinto que posso me tornar a mais forte...!"
20051-CVGroup_UIEventLobby_Enter1-1 = "Sensei! Por aqui! Por aqui!"
20051-CVGroup_UIEventLobby_Enter1-2 = "Fufu, seus olhos não conseguiram acompanhar minha velocidade, não é?"
20051-CVGroup_UIEventLobby_Enter2-1 = "A super guerreira mágica do esquadrão de vigilância!"
20051-CVGroup_UIEventLobby_Enter2-2 = "Thermite... Pink! É isso!"
20051-CVGroup_UIEventLobby_Enter3-1 = "Uau! Tem muitos clientes aqui!"
20051-CVGroup_UIEventLobby_Enter4-1 = "Fufufu... parece que ninguém percebeu..."
20051-CVGroup_UIEventLobby_Enter4-2 = "Que eu, uma pessoa comum, sou na verdade a super ás do esquadrão de vigilância,"
20051-CVGroup_UIEventLobby_Enter4-3 = "e uma garota mágica...!"
20051-CVGroup_UIEventLobby_Enter5-1 = "A transformação acabou, mas..."
20051-CVGroup_UIEventLobby_Enter5-2 = "A magia não acaba! \nEhehe!"
20051-CVGroup_UIEventLobby_Idle1-1 = "Sim! Sou a Thermite Pink!\nE também sou a Uzawa Reisa!"
20051-CVGroup_UIEventLobby_Idle2-1 = "Fufu, a pose de transformação que venho praticando há tanto tempo..."
20051-CVGroup_UIEventLobby_Idle2-2 = "Vou mostrar aqui! \nPrimeiro..."
20051-CVGroup_UIEventLobby_Idle2-3 = "Hyaaa!?"
20051-CVGroup_UIEventLobby_Idle2-4 = "A-acho que... acabei de cruzar o olhar com alguém que conheço..."
20051-CVGroup_UIEventLobby_Idle3-1 = "Isso? É o bastão da Thermite Pink!"
20051-CVGroup_UIEventLobby_Idle3-2 = "O bastão oficial é um pouco caro..."
20051-CVGroup_UIEventLobby_Idle3-3 = "Então, eu mesma decorei um que eu já tinha!"
20051-CVGroup_UIEventLobby_Idle4-1 = "Thermite Pink! Transformar!"
20051-CVGroup_UIEventLobby_Idle4-2 = "Vamos! Vamos proteger a paz!"
20051-CVGroup_UIEventShop_Enter1-1 = "Shururu~ Shakiin Shakiin!! Kira!"
20051-CVGroup_UIEventShop_Enter2-1 = "Bem-vindo! Ao mercado mágico!"
20051-CVGroup_UIEventShop_Enter3-1 = "Não tem etiqueta de metade do preço aqui, viu!?\nIsso não é um supermercado!"
20051-CVGroup_UIEventShop_Idle1-1 = "Ah, essa roupa não está à venda! \nSó tem uma!"
20051-CVGroup_UIEventShop_Idle2-1 = "Parece uma loja de lembranças, é divertido!"
20051-CVGroup_UIEventShop_Buy1-1 = "Uma transação... ou seja, selar um contrato!"
20051-CVGroup_UIEventShop_Buy2-1 = "Isso é o poder financeiro de um adulto...! Parece um herói!"
20051-CVGroup_UIEventShop_Buy3-1 = "Isso, de alguma forma, parece um item mágico!"
20051-CVGroup_UIEventShop_Buy4-1 = "É uma compra mágica!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "Uau! Isso é! É aquela máquina de tirar cartas, né?\nQue nostalgia!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "É assim! É só girar, gakogako!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "Ainda existem coisas assim por aí!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "Vamos, Sensei! Gire logo!"
20051-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "Vamos, use tudo o que sobrou e gire!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "O que será que vai sair! Estou ansiosa!"
20051-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "Aqui é tão maravilhoso!\nQuem dera se aqui fosse minha casa..."
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "Ah! Isso é! Ultra Raro!?"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck4-2 = "Essa é uma carta super rara que eu só tirei uma vez na vida!?"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "Ooh! Super Raro!\nNão vejo muito por aí!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "Dourado!! Que bom! Está brilhando!"
20051-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "Ah, ah..."
20051-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "Essa é uma carta de azar, né?\nÉ a primeira vez que vejo uma de verdade!"
