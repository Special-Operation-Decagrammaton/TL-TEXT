[translation]
10041-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10041-CVGroup_CharacterGet_Idle1-1 = "……アリウススクワッドのミサキ。\n今は主のいない猟犬みたいなものだから……\nリードはあげる。好きに命令して。"
10041-CVGroup_Cafe_Idle1-1 = "少し騒がしいね。"
10041-CVGroup_Cafe_Idle2-1 = "……初めて見るものばっかり。"
10041-CVGroup_Cafe_Idle3-1 = "……それ、楽しいの？"
10041-CVGroup_Cafe_Idle4-1 = "別に興味ない。"
10041-CVGroup_Cafe_Idle5-1 = "……何をしてるの？"
10041-CVGroup_WeaponGet_Idle1-1 = "もう理由なんて聞かないけど、私にわざわざこんなものを渡すなんて\n私の知ってた世界に、あなたみたいな人はいなかった。変な人。\n……この力は、今は先生に託すとするよ。"
