[translation]
20000-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ……。"
20000-CVGroup_CharacterGet_Idle1-1 = "今頃だと予測して、待ってた。\n先生が私の名前を呼んでくれる……今この瞬間を。"
20000-CVGroup_Cafe_Idle1-1 = "「今少し時間と予算をいただければ」……？\n自分の能力不足に対する言い訳に過ぎない。"
20000-CVGroup_Cafe_Idle2-1 = "与えられた時間と予算内でベストな結果を出すこと。\nそれがマイスターというもの。"
20000-CVGroup_Cafe_Idle3-1 = "ここに先生の銅像を建てるのはどうかな？\n手足の関節が動くように作れるよ。"
20000-CVGroup_Cafe_Idle4-1 = "ん……内部のいくつかの項目から修理と改善事項を発見……\nえ？修理しちゃダメ？"
20000-CVGroup_Cafe_Idle5-1 = "お望みなら、来た人がびっくりするような罠を設置してあげるけど。\nうん？ダメって？"
20000-CVGroup_WeaponGet_Idle1-1 = "もっとたくさんの物が作りたい。\nそうして……もっと先生の力になりたい。"
