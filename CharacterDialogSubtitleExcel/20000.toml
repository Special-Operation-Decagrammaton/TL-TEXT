[translation]
20000-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
20000-CVGroup_CharacterGet_Idle1-1 = "Eu previ que seria agora e fiquei esperando. O momento em que você, Sensei, chamaria o meu nome... este exato instante."
20000-CVGroup_Cafe_Idle1-1 = "'Se você me der um pouco mais de tempo e orçamento'...? Isso não passa de uma desculpa para a própria falta de competência."
20000-CVGroup_Cafe_Idle2-1 = "Obter o melhor resultado dentro do tempo e orçamento concedidos. É isso que define um Meister."
20000-CVGroup_Cafe_Idle3-1 = "O que acha de construirmos uma estátua sua aqui, Sensei? Posso fazê-la com articulações móveis nos braços e pernas."
20000-CVGroup_Cafe_Idle4-1 = "Hmm... Encontrei alguns itens internos que precisam de reparos e melhorias... Hein? Não posso consertar?"
20000-CVGroup_Cafe_Idle5-1 = "Se quiser, posso instalar algumas armadilhas para surpreender quem chegar aqui. Hm? Não pode?"
20000-CVGroup_WeaponGet_Idle1-1 = "Quero criar muitas outras coisas. E assim... quero ser ainda mais útil para você, Sensei."
