[translation]
10092-CVGroup_UITitle_Idle1-1 = "Blue Archive～！！"
10092-CVGroup_CharacterGet_Idle1-1 = "Pode criar expectativas... \nNão, crie expectativas! Na minha apresentação!!"
10092-CVGroup_Cafe_Idle1-1 = "É bem espaçoso, né... \nTalvez seja perfeito para tocar."
10092-CVGroup_Cafe_Idle2-1 = "Eu queria praticar, mas tem muita gente aqui..."
10092-CVGroup_Cafe_Idle3-1 = "Estou com fome, será que tem algum doce por perto?"
10092-CVGroup_Cafe_Idle4-1 = "Acho que vou descansar um pouco..."
10092-CVGroup_Cafe_Idle5-1 = "Ué. Não disseram que iam se reunir aqui?"
10092-CVGroup_WeaponGet_Idle1-1 = "Não importa a situação, o Sensei continua sendo o Sensei, né... \nEntendi. Eu também sou assim, não sou? \nNão importa a situação... se precisar, me chame! Eu vou!"
10092-CVGroup_UIEventLobby_Enter1-1 = "Você está atrasado, Sensei! \nVamos logo!"
10092-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei! \nPor aqui, por aqui!"
10092-CVGroup_UIEventLobby_Enter3-1 = "A apresentação já começou! \nVenha comigo!"
10092-CVGroup_UIEventLobby_Enter4-1 = "Será que é o clímax? \nDeixe comigo!"
10092-CVGroup_UIEventLobby_Enter5-1 = "Ufa, que sensação boa. \nNé, Sensei?"
10092-CVGroup_UIEventLobby_Idle1-1 = "Ah, o-o que você está fazendo!? \nUse palavras, fale comigo!"
10092-CVGroup_UIEventLobby_Idle2-1 = "Pare com as brincadeiras...! \nEu vou ficar brava!!"
10092-CVGroup_UIEventLobby_Idle3-1 = "Hm? ...Me chamou?"
10092-CVGroup_UIEventLobby_Idle4-1 = "Quer tocar na guitarra? Toma."
10092-CVGroup_UIEventShop_Enter1-1 = "Sim, sim! Não temos tempo! \nPegue logo o que precisa!"
10092-CVGroup_UIEventShop_Enter2-1 = "Ah, Sensei! \nPor aqui, por aqui!"
10092-CVGroup_UIEventShop_Enter3-1 = "É um desperdício deixar sobrando, não acha?"
10092-CVGroup_UIEventShop_Enter3-2 = "Tente pegar tudo o que puder."
10092-CVGroup_UIEventShop_Idle1-1 = "O-o que foi!? \nQue susto!"
10092-CVGroup_UIEventShop_Idle2-1 = "Eu disse para parar com as brincadeiras! \nVocê me deu um susto!!"
10092-CVGroup_UIEventShop_Buy1-1 = "Hmm? \nNão é que é bom?"
10092-CVGroup_UIEventShop_Buy2-1 = "Não é uma má escolha."
10092-CVGroup_UIEventShop_Buy3-1 = "Legal. \nEu também estava de olho nisso."
10092-CVGroup_UIEventShop_Buy4-1 = "Vai levar isso? Ok."
