[translation]
10092-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！！"
10092-CVGroup_CharacterGet_Idle1-1 = "期待していいから……\nいや期待して！私の演奏！！"
10092-CVGroup_Cafe_Idle1-1 = "結構広いわね……\n演奏するのにちょうど良いかも。"
10092-CVGroup_Cafe_Idle2-1 = "練習しようと思ったのに、人が多い……。"
10092-CVGroup_Cafe_Idle3-1 = "お腹空いた、どこかに甘い物無いかな？"
10092-CVGroup_Cafe_Idle4-1 = "ちょっと休もうかな……。"
10092-CVGroup_Cafe_Idle5-1 = "あれ。ここに集まるって言ってなかった？"
10092-CVGroup_WeaponGet_Idle1-1 = "どんな状況でも先生は先生なんだね……。\nそっか。私も同じなんだよね？\nどんな状況でも……必要なら呼んでよね！私、行くから！"
10092-CVGroup_UIEventLobby_Enter1-1 = "遅いよ、先生！\n早く行くよ！"
10092-CVGroup_UIEventLobby_Enter2-1 = "あ、先生！\nこっちよ、こっち！"
10092-CVGroup_UIEventLobby_Enter3-1 = "演奏が始まってるわよ！\nついてきて！"
10092-CVGroup_UIEventLobby_Enter4-1 = "クライマックスかしら？\n任せて！"
10092-CVGroup_UIEventLobby_Enter5-1 = "ふう、気持ちよかった。\nね、先生？"
10092-CVGroup_UIEventLobby_Idle1-1 = "あ、な、何するのよ！？\n言葉にしてよ、言葉に！"
10092-CVGroup_UIEventLobby_Idle2-1 = "いたずらはやめて……！\n怒るよ！！"
10092-CVGroup_UIEventLobby_Idle3-1 = "ん？……呼んだ？"
10092-CVGroup_UIEventLobby_Idle4-1 = "ギター触ってみたいの？はい。"
10092-CVGroup_UIEventShop_Enter1-1 = "はい、はい！時間ないよ！\nとっとと持ってって！"
10092-CVGroup_UIEventShop_Enter2-1 = "あ、先生！\nこっちよ、こっち！"
10092-CVGroup_UIEventShop_Enter3-1 = "余らせとくのも勿体ないでしょ？"
10092-CVGroup_UIEventShop_Enter3-2 = "なるべく取れるもの取っていきなさいよ。"
10092-CVGroup_UIEventShop_Idle1-1 = "な、何よ！？\nビックリしたじゃない！"
10092-CVGroup_UIEventShop_Idle2-1 = "いたずらはやめてってば！\nビックリするじゃない！！"
10092-CVGroup_UIEventShop_Buy1-1 = "ふ～ん？\nいいんじゃない？"
10092-CVGroup_UIEventShop_Buy2-1 = "悪くない選択ね。"
10092-CVGroup_UIEventShop_Buy3-1 = "いいね。\n私もそれ狙ってたんだ。"
10092-CVGroup_UIEventShop_Buy4-1 = "それでいくの？オッケー。"
