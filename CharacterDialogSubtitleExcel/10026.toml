[translation]
10026-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10026-CVGroup_CharacterGet_Idle1-1 = "ったく、なんでこんな変な服を……\nま、意外と動きやすいから良いけどな、ははっ！"
10026-CVGroup_Cafe_Idle1-1 = "何だか、いつも以上に視線が……\nこの服のせいか？"
10026-CVGroup_Cafe_Idle2-1 = "メイド服よりも動きやすいな、悪くねぇ。"
10026-CVGroup_Cafe_Idle3-1 = "あぁん？\n何見てんだこら？\nやる気か？あん？"
10026-CVGroup_Cafe_Idle4-1 = "……ふん、悪くねぇ場所だなまた今度来てやるとするか。"
10026-CVGroup_Cafe_Idle5-1 = "先生は……いねぇのか、出張中か？\nい、いや、別にどうでも良いけど……"
10026-CVGroup_WeaponGet_Idle1-1 = "はっ、ここまでおぜん立てしてもらったら、\n思いっきり派手にやらねーとな……\nさあ、どこまで耐えられる？"
10026-CVGroup_UIEventLobby_Enter1-1 = "おらっ！\n仕事の時間だぞ、先生！"
10026-CVGroup_UIEventLobby_Enter2-1 = "油売ってる暇はねぇ、行くぞ！"
10026-CVGroup_UIEventLobby_Idle1-1 = "何か手伝うことでもあるか、先生？"
10026-CVGroup_UIEventLobby_Idle2-1 = "ははっ！悪くねぇな！"
10026-CVGroup_UIEventLobby_Idle3-1 = "さて、こうしてる場合じゃねぇな。"
10026-CVGroup_UIEventLobby_Idle4-1 = "なっ、何をそんなじっと見てんだよ……。\nほら、さっさと仕事始めんぞ。"
10026-CVGroup_UIEventLobby_Enter3-1 = "やるからには徹底的にやるタイプでなぁ。"
10026-CVGroup_UIEventLobby_Enter4-1 = "おらっ、片付け始めんぞ！"
10026-CVGroup_UIEventLobby_Enter5-1 = "後片付けなら任せとけ、\nあたしの専門分野だ！"
10026-CVGroup_UIEventMission_Enter1-1 = "さあ～て、掃除でもしに行くか？"
10026-CVGroup_UIEventMission_Enter2-1 = "さあ、早く始めようぜっ！"
10026-CVGroup_UIEventMission_Idle1-1 = "なんだ？応援でもしてくれてんのか？\nはっ！面白いじゃん。"
10026-CVGroup_UIEventMission_Idle2-1 = "あたしにかかれば、\nこれくれぇ朝飯前だ！"
10026-CVGroup_UIEventMission_Buy1-1 = "へえ、なかなかセンスあるじゃねえか？"
10026-CVGroup_UIEventMission_Buy2-1 = "仕事はきっちりやるぞ。"
10026-CVGroup_UIEventMission_Interaction1-1 = "清掃完了だ。"
