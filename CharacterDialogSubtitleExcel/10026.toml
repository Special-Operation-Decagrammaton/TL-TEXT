[translation]
10026-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10026-CVGroup_CharacterGet_Idle1-1 = "Poxa, por que eu tenho que usar uma roupa tão estranha assim... \nBem, até que é fácil de se mover com ela, então tudo bem, haha!"
10026-CVGroup_Cafe_Idle1-1 = "Sinto que tem mais gente olhando do que o normal... \nÉ por causa dessa roupa?"
10026-CVGroup_Cafe_Idle2-1 = "É mais fácil de se mover do que com o uniforme de empregada, não é ruim."
10026-CVGroup_Cafe_Idle3-1 = "Ah? \nO que você está olhando, hein? \nQuer brigar?"
10026-CVGroup_Cafe_Idle4-1 = "...Hum, não é um lugar ruim. Acho que volto aqui outra hora."
10026-CVGroup_Cafe_Idle5-1 = "O Sensei... não está aqui? Está em uma viagem de negócios? \nN-não que eu me importe, mas..."
10026-CVGroup_WeaponGet_Idle1-1 = "Hah, se tudo já está preparado assim, \neu tenho que fazer um estrago daqueles... \nVamos lá, até onde você aguenta?"
10026-CVGroup_UIEventLobby_Enter1-1 = "Ei! \nHora de trabalhar, Sensei!"
10026-CVGroup_UIEventLobby_Enter2-1 = "Não temos tempo a perder, vamos nessa!"
10026-CVGroup_UIEventLobby_Idle1-1 = "Tem algo em que eu possa ajudar, Sensei?"
10026-CVGroup_UIEventLobby_Idle2-1 = "Haha! Nada mal!"
10026-CVGroup_UIEventLobby_Idle3-1 = "Bem, não dá para ficar parado aqui."
10026-CVGroup_UIEventLobby_Idle4-1 = "O-o que você está encarando tanto assim...? \nAnda logo, vamos começar o trabalho."
10026-CVGroup_UIEventLobby_Enter3-1 = "Quando eu faço algo, eu faço até o fim."
10026-CVGroup_UIEventLobby_Enter4-1 = "Ei, vamos começar a limpeza!"
10026-CVGroup_UIEventLobby_Enter5-1 = "Se for para limpar, pode deixar comigo, \né a minha especialidade!"
10026-CVGroup_UIEventMission_Enter1-1 = "Muito bem, vamos fazer uma faxina?"
10026-CVGroup_UIEventMission_Enter2-1 = "Vamos, vamos começar logo!"
10026-CVGroup_UIEventMission_Idle1-1 = "O que foi? Está me torcendo? \nHah! Que divertido."
10026-CVGroup_UIEventMission_Idle2-1 = "Comigo no comando, \nisso é moleza!"
10026-CVGroup_UIEventMission_Buy1-1 = "Heh, você até que tem bom gosto, não é?"
10026-CVGroup_UIEventMission_Buy2-1 = "Vou fazer o trabalho direitinho."
10026-CVGroup_UIEventMission_Interaction1-1 = "Limpeza concluída."
