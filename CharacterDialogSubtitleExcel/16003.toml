[translation]
16003-CVGroup_UITitle_Idle1-1 = "Blue Archive."
16003-CVGroup_CharacterGet_Idle1-1 = "É uma extensão das tarefas do comitê de vigilância, certo?\nSe for pela segurança de Trinity, cooperarei o quanto for preciso."
16003-CVGroup_Cafe_Idle1-1 = "(Este lugar é tão pacífico.)"
16003-CVGroup_Cafe_Idle2-1 = "(Ah... este enfeite, que fofo...)"
16003-CVGroup_Cafe_Idle3-1 = "(Talvez, coisas tão fofas não combinem comigo...)"
16003-CVGroup_Cafe_Idle4-1 = "A segurança deste lugar é...\nIncrível. Não há nada a apontar."
16003-CVGroup_Cafe_Idle5-1 = "Descansar também faz parte da missão."
16003-CVGroup_WeaponGet_Idle1-1 = "Como esperado, usar uma arma com a qual estou acostumada é o melhor."
