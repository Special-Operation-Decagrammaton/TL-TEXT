[translation]
16003-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
16003-CVGroup_CharacterGet_Idle1-1 = "自警団任務の延長ですね。\nトリニティの安全のためなら、いくらでも協力します。"
16003-CVGroup_Cafe_Idle1-1 = "（ここは平和ですね）"
16003-CVGroup_Cafe_Idle2-1 = "（あ……この飾り、可愛い……）"
16003-CVGroup_Cafe_Idle3-1 = "（多分、こんな可愛い物は私には似合わない……）"
16003-CVGroup_Cafe_Idle4-1 = "ここのセキュリティは……\n素晴らしいですね。非の打ち所がありません。"
16003-CVGroup_Cafe_Idle5-1 = "休憩も任務の一部です。"
16003-CVGroup_WeaponGet_Idle1-1 = "やはり、手慣れた武器を使うのが一番ですね。"
