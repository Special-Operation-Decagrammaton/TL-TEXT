[translation]
16008-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
16008-CVGroup_CharacterGet_Idle1-1 = "……Hã, eu? Tem certeza de que não confundiu de pessoa?\nHaa. O que diabos você quer com uma preguiçosa como eu...?"
16008-CVGroup_Cafe_Idle1-1 = "Ah, esse sofá não é nada mau, né?"
16008-CVGroup_Cafe_Idle2-1 = "Acho que eu queria um desses lá no escritório do Departamento de Segurança Pública."
16008-CVGroup_Cafe_Idle3-1 = "Eu não quero fazer absolutamente mais nada..."
16008-CVGroup_Cafe_Idle4-1 = "Aaah... Por algum motivo, acho que estou ouvindo o som de uma sirene..."
16008-CVGroup_Cafe_Idle5-1 = "Acho que o alto escalão não viria até aqui, mas..."
16008-CVGroup_WeaponGet_Idle1-1 = "A arma de serviço da Escola de Polícia Valkyrie é bem resistente e dá pro gasto.\nBom, a taxa de acerto não é lá grandes coisas, mas..."
16008-CVGroup_UIEventLobby_Enter1-1 = "Parece que você está ocupado hoje também, Sensei."
16008-CVGroup_UIEventLobby_Enter1-2 = "Eu comprei agorinha pouco, mas...\nQuer um donut de chocolate?"
16008-CVGroup_UIEventLobby_Enter2-1 = "Patrulhar dá tanta preguiça..."
16008-CVGroup_UIEventLobby_Enter3-1 = "Nossa, que juventude...\nÉ muito bom que eles estejam tão animados e se divertindo..."
16008-CVGroup_UIEventLobby_Enter4-1 = "Estou com um pressentimento de que vai dar problema..."
16008-CVGroup_UIEventLobby_Enter5-1 = "No fim das contas, as coisas se acalmaram de algum jeito."
16008-CVGroup_UIEventLobby_Enter5-2 = "Queria que essa paz durasse pra sempre..."
16008-CVGroup_UIEventLobby_Idle1-1 = "Ufa, que paz."
16008-CVGroup_UIEventLobby_Idle2-1 = "Esse clima animado de Dia dos Namorados não é nada mau."
16008-CVGroup_UIEventLobby_Idle2-2 = "Mas acima de tudo... assim que essa época acabar,"
16008-CVGroup_UIEventLobby_Idle2-3 = "Um monte de donuts de chocolate encalhados vão entrar em liquidação!"
16008-CVGroup_UIEventLobby_Idle3-1 = "A menos que algo muito grave aconteça,"
16008-CVGroup_UIEventLobby_Idle3-2 = "Eu acho que não vai ter nenhum motivo pra nós da Segurança Pública entrarmos em ação."
16008-CVGroup_UIEventLobby_Idle3-3 = "Por exemplo..."
16008-CVGroup_UIEventLobby_Idle3-4 = "A Raposa da Calamidade roubar um carro-forte ou algo do tipo."
16008-CVGroup_UIEventLobby_Idle3-5 = "Haha, brincadeira, brincadeira. Uma coisa dessas nunca vai acontecer."