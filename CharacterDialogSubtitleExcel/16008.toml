[translation]
16008-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
16008-CVGroup_CharacterGet_Idle1-1 = "……Eh, eu? Não está me confundindo com outra pessoa?\nAh. O que você quer com uma preguiçosa como eu, afinal……."
16008-CVGroup_Cafe_Idle1-1 = "Ah, esse sofá não é nada mal, né?"
16008-CVGroup_Cafe_Idle2-1 = "Talvez eu devesse pedir um desses para o escritório do Departamento de Segurança Pública."
16008-CVGroup_Cafe_Idle3-1 = "Não quero fazer absolutamente nada agora……."
16008-CVGroup_Cafe_Idle4-1 = "Ah…… sinto que estou ouvindo o som de uma sirene……."
16008-CVGroup_Cafe_Idle5-1 = "Duvido muito que o alto escalão venha até aqui, mas……."
16008-CVGroup_WeaponGet_Idle1-1 = "A arma padrão da Academia de Polícia Valkyrie é resistente e parece ser boa.\nBem, a precisão não é lá essas coisas, mas……."
16008-CVGroup_UIEventLobby_Enter1-1 = "Parece que você está ocupado hoje também, Sensei."
16008-CVGroup_UIEventLobby_Enter1-2 = "Acabei de comprar, \nquer comer um donut de chocolate?"
16008-CVGroup_UIEventLobby_Enter2-1 = "Patrulhar é tão chato……."
16008-CVGroup_UIEventLobby_Enter3-1 = "Ah, isso é a juventude, né…….\nÉ bom ver que vocês estão animados e se divertindo……."
16008-CVGroup_UIEventLobby_Enter4-1 = "Sinto que vem problemas por aí……."
16008-CVGroup_UIEventLobby_Enter5-1 = "No fim, as coisas se acalmaram."
16008-CVGroup_UIEventLobby_Enter5-2 = "Espero que essa paz dure para sempre……."
16008-CVGroup_UIEventLobby_Idle1-1 = "Ufa, que paz."
16008-CVGroup_UIEventLobby_Idle2-1 = "Essa atmosfera agitada do Dia dos Namorados não é nada mal."
16008-CVGroup_UIEventLobby_Idle2-2 = "E o melhor de tudo…… assim que essa época acaba,"
16008-CVGroup_UIEventLobby_Idle2-3 = "os donuts de chocolate que sobram ficam super baratos!"
16008-CVGroup_UIEventLobby_Idle3-1 = "A menos que aconteça algo muito grave,"
16008-CVGroup_UIEventLobby_Idle3-2 = "não acho que nós do Departamento de Segurança Pública precisaremos entrar em ação."
16008-CVGroup_UIEventLobby_Idle3-3 = "Por exemplo……"
16008-CVGroup_UIEventLobby_Idle3-4 = "uma raposa desastrosa roubar um veículo blindado."
16008-CVGroup_UIEventLobby_Idle3-5 = "Haha, brincadeira, brincadeira. Isso nunca aconteceria."
