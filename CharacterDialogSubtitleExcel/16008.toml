[translation]
16008-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ……。"
16008-CVGroup_CharacterGet_Idle1-1 = "……え、私？人違いじゃないの？\nはぁ。こんな怠け者に、いったい何の用なんだか……。"
16008-CVGroup_Cafe_Idle1-1 = "ああ、このソファーは悪くないね？"
16008-CVGroup_Cafe_Idle2-1 = "こういうの、生活安全局の事務所にも欲しいかも。"
16008-CVGroup_Cafe_Idle3-1 = "もう一切何もしたくない……。"
16008-CVGroup_Cafe_Idle4-1 = "あー……なんか、サイレンの音が聞こえる気が……。"
16008-CVGroup_Cafe_Idle5-1 = "まさか、上層部がここまで来ることは無いと思うけど……。"
16008-CVGroup_WeaponGet_Idle1-1 = "ヴァルキューレ警察学校の制式銃は丈夫で良い感じなんだよね。\nまあ、命中率はイマイチだけど……。"
16008-CVGroup_UIEventLobby_Enter1-1 = "今日も忙しそうだね、先生。"
16008-CVGroup_UIEventLobby_Enter1-2 = "さっき買ってきたんだけど、\nチョコドーナッツでも食べる？"
16008-CVGroup_UIEventLobby_Enter2-1 = "パトロールめんどくさ……。"
16008-CVGroup_UIEventLobby_Enter3-1 = "いやぁ、青春だねぇ……。\n熱くて楽しそうで結構なことだ……。"
16008-CVGroup_UIEventLobby_Enter4-1 = "なーんかトラブルの予感が……。"
16008-CVGroup_UIEventLobby_Enter5-1 = "最終的に何とか落ち着いたね。"
16008-CVGroup_UIEventLobby_Enter5-2 = "この平和がずっと続いてほしいもんだけど……。"
16008-CVGroup_UIEventLobby_Idle1-1 = "ふぅ、平和だねぇ。"
16008-CVGroup_UIEventLobby_Idle2-1 = "バレンタインデーのこういう賑やかな雰囲気は、悪くないね。"
16008-CVGroup_UIEventLobby_Idle2-2 = "何より……この時期が終わるとすぐに、"
16008-CVGroup_UIEventLobby_Idle2-3 = "売れ残ったチョコドーナッツが大量に安売りされるから！"
16008-CVGroup_UIEventLobby_Idle3-1 = "よっぽどのことがない限り、"
16008-CVGroup_UIEventLobby_Idle3-2 = "私たち生活安全局まで出動するようなことは無いと思うけどね。"
16008-CVGroup_UIEventLobby_Idle3-3 = "例えば……"
16008-CVGroup_UIEventLobby_Idle3-4 = "災厄の狐が装甲車を盗むとか。"
16008-CVGroup_UIEventLobby_Idle3-5 = "ははっ、冗談冗談。そんなこと起きっこないって。"
