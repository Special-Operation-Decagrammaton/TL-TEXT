[translation]
20044-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
20044-CVGroup_CharacterGet_Idle1-1 = "いらしていたのですね、トレーナー。\n喉が渇いた時は、遠慮なく声をかけてください。"
20044-CVGroup_Cafe_Idle1-1 = "運動に集中できそうな場所は……。"
20044-CVGroup_Cafe_Idle2-1 = "カフェはドリンクを提供する場所……\nそれなら、私も……。"
20044-CVGroup_Cafe_Idle3-1 = "スペシャルメニューに、プロテインドリンクを追加して……"
20044-CVGroup_Cafe_Idle4-1 = "よろしければいかがですか？"
20044-CVGroup_Cafe_Idle5-1 = "ここなら、筋トレも捗りそうです。"
20044-CVGroup_WeaponGet_Idle1-1 = "細やかなご指導、感謝します。\nこれに満足せず、これからも精進していきます。\nさあトレーナー、もうワンセットいきましょう！"
20044-CVGroup_UIEventLobby_Enter1-1 = "野球のルールに詳しくはありませんが……"
20044-CVGroup_UIEventLobby_Enter1-2 = "この盛り上がり……私まで胸が高鳴ってきました。"
20044-CVGroup_UIEventLobby_Enter2-1 = "……凄まじい熱気ですね。"
20044-CVGroup_UIEventLobby_Enter2-2 = "脱水症状に気をつけないと。"
20044-CVGroup_UIEventLobby_Enter3-1 = "スポーツマンシップとは程遠い――\n何か良からぬことが起きているようです。"
20044-CVGroup_UIEventLobby_Enter3-2 = "行きましょう、トレーナー。"
20044-CVGroup_UIEventLobby_Enter4-1 = "勝利への執着が度を過ぎると、"
20044-CVGroup_UIEventLobby_Enter4-2 = "予期せぬ問題を引き起こしてしまうのですね。"
20044-CVGroup_UIEventLobby_Enter4-3 = "新たな学びです。"
20044-CVGroup_UIEventLobby_Enter5-1 = "それではトレーナー、\n事態も収束したことですし、"
20044-CVGroup_UIEventLobby_Enter5-2 = "今からトレーニングにいくとしましょう。"
20044-CVGroup_UIEventLobby_Idle1-1 = "この制服……\n機能性を兼ね備えていて、いいですね。"
20044-CVGroup_UIEventLobby_Idle2-1 = "トレーナー？\nお呼びでしょうか？"
20044-CVGroup_UIEventLobby_Idle3-1 = "……私の足の筋肉を確かめたいんですか？"
20044-CVGroup_UIEventLobby_Idle3-2 = "ふふ、そういうことでしたら、好きなだけどうぞ。"
20044-CVGroup_UIEventLobby_Idle4-1 = "このドリンクサーバー？"
20044-CVGroup_UIEventLobby_Idle4-2 = "25kgくらいでしょうか。"
20044-CVGroup_UIEventLobby_Idle4-3 = "低負荷のトレーニングにちょうど良いです。"
20044-CVGroup_UIEventShop_Enter1-1 = "どうぞ、ゆっくりご覧ください。"
20044-CVGroup_UIEventShop_Enter1-2 = "お気に入りの品が見つかると良いですね。"
20044-CVGroup_UIEventShop_Enter2-1 = "棚だし、想定より早く終えることができました。"
20044-CVGroup_UIEventShop_Enter2-2 = "トレーニング部の備品管理に少し似ていたので。"
20044-CVGroup_UIEventShop_Enter3-1 = "買い逃しがないか、もう一度確認してみてください。"
20044-CVGroup_UIEventShop_Idle1-1 = "品数を把握し、素早く提供する……"
20044-CVGroup_UIEventShop_Idle1-2 = "瞬発力が鍛えられそうです。"
20044-CVGroup_UIEventShop_Idle2-1 = "仕事中も、正しい姿勢を意識しています。"
20044-CVGroup_UIEventShop_Idle2-2 = "私はトレーニング部の部長ですから。"
20044-CVGroup_UIEventShop_Buy1-1 = "はい、お受け取りください。"
20044-CVGroup_UIEventShop_Buy2-1 = "他に必要なものはありませんか？"
20044-CVGroup_UIEventShop_Buy3-1 = "かしこまりました、少々お待ちください。"
20044-CVGroup_UIEventShop_Buy4-1 = "ドリンクをサービスさせていただいてますが、どうでしょう？"
