[translation]
20044-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20044-CVGroup_CharacterGet_Idle1-1 = "Você veio, treinador.\nQuando estiver com sede, não hesite em me chamar."
20044-CVGroup_Cafe_Idle1-1 = "Um lugar onde eu possa me concentrar no exercício..."
20044-CVGroup_Cafe_Idle2-1 = "O café é um lugar que serve bebidas...\nSendo assim, eu também..."
20044-CVGroup_Cafe_Idle3-1 = "Vou adicionar um shake de proteína ao menu especial..."
20044-CVGroup_Cafe_Idle4-1 = "Se quiser, gostaria de experimentar?"
20044-CVGroup_Cafe_Idle5-1 = "Aqui, o treino de força parece que vai render bem."
20044-CVGroup_WeaponGet_Idle1-1 = "Agradeço pela sua orientação detalhada.\nNão vou me contentar com isso e continuarei me esforçando.\nVamos lá, treinador, mais uma série!"
20044-CVGroup_UIEventLobby_Enter1-1 = "Não entendo muito das regras do beisebol, mas..."
20044-CVGroup_UIEventLobby_Enter1-2 = "Essa empolgação... meu coração também começou a bater mais forte."
20044-CVGroup_UIEventLobby_Enter2-1 = "...Que energia incrível."
20044-CVGroup_UIEventLobby_Enter2-2 = "Precisamos tomar cuidado com a desidratação."
20044-CVGroup_UIEventLobby_Enter3-1 = "Isso está longe de ser espírito esportivo —\nparece que algo ruim está acontecendo."
20044-CVGroup_UIEventLobby_Enter3-2 = "Vamos, treinador."
20044-CVGroup_UIEventLobby_Enter4-1 = "Quando a obsessão pela vitória passa dos limites,"
20044-CVGroup_UIEventLobby_Enter4-2 = "acaba causando problemas inesperados."
20044-CVGroup_UIEventLobby_Enter4-3 = "É um novo aprendizado."
20044-CVGroup_UIEventLobby_Enter5-1 = "Bem, treinador,\njá que a situação foi resolvida,"
20044-CVGroup_UIEventLobby_Enter5-2 = "vamos treinar agora."
20044-CVGroup_UIEventLobby_Idle1-1 = "Este uniforme...\nEle combina funcionalidade, é muito bom."
20044-CVGroup_UIEventLobby_Idle2-1 = "Treinador?\nVocê me chamou?"
20044-CVGroup_UIEventLobby_Idle3-1 = "...Você quer verificar os músculos das minhas pernas?"
20044-CVGroup_UIEventLobby_Idle3-2 = "Fufu, se é isso, pode olhar o quanto quiser."
20044-CVGroup_UIEventLobby_Idle4-1 = "Este servidor de bebidas?"
20044-CVGroup_UIEventLobby_Idle4-2 = "Deve pesar uns 25kg."
20044-CVGroup_UIEventLobby_Idle4-3 = "É perfeito para um treino de baixa carga."
20044-CVGroup_UIEventShop_Enter1-1 = "Por favor, fique à vontade para olhar."
20044-CVGroup_UIEventShop_Enter1-2 = "Espero que encontre algo que goste."
20044-CVGroup_UIEventShop_Enter2-1 = "Consegui terminar de organizar as prateleiras mais rápido do que o esperado."
20044-CVGroup_UIEventShop_Enter2-2 = "É um pouco parecido com o gerenciamento de equipamentos do Clube de Treinamento."
20044-CVGroup_UIEventShop_Enter3-1 = "Verifique mais uma vez se não esqueceu de comprar nada."
20044-CVGroup_UIEventShop_Idle1-1 = "Saber a quantidade de itens e servir rapidamente..."
20044-CVGroup_UIEventShop_Idle1-2 = "Isso parece treinar a agilidade."
20044-CVGroup_UIEventShop_Idle2-1 = "Mesmo durante o trabalho, mantenho a postura correta."
20044-CVGroup_UIEventShop_Idle2-2 = "Afinal, sou a presidente do Clube de Treinamento."
20044-CVGroup_UIEventShop_Buy1-1 = "Sim, aqui está."
20044-CVGroup_UIEventShop_Buy2-1 = "Precisa de mais alguma coisa?"
20044-CVGroup_UIEventShop_Buy3-1 = "Entendido, por favor, aguarde um momento."
20044-CVGroup_UIEventShop_Buy4-1 = "Estou oferecendo uma bebida como cortesia, o que acha?"
