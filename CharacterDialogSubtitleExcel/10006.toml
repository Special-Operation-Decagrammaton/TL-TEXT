[translation]
10006-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10006-CVGroup_CharacterGet_Idle1-1 = "あなたが先生か？\n今日から私が一緒にいてあげる。\n任務なら、私に任せて。"
10006-CVGroup_Cafe_Idle1-1 = "へえ、中々いい感じ。"
10006-CVGroup_Cafe_Idle2-1 = "少し休んでから行くとしよう。"
10006-CVGroup_Cafe_Idle3-1 = "正義実現委員会のやつらは、めんどくさいんだよな……。"
10006-CVGroup_Cafe_Idle4-1 = "まったく、仕方ないな。\n手伝うよ。"
10006-CVGroup_Cafe_Idle5-1 = "はあ、どうしてこうなったんだ。\nまあ……別に悪くはないけど。"
10006-CVGroup_WeaponGet_Idle1-1 = "成果で応える。\n今の私の気持ちを証明できるのは、それしかないから。"
