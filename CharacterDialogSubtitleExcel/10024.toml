[translation]
10024-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10024-CVGroup_CharacterGet_Idle1-1 = "Ah. Sim, eu estava andando de moto.\nQuer vir junto, Sensei? Vamos começar com uns 200km, só para aquecer."
10024-CVGroup_Cafe_Idle1-1 = "A velocidade média de hoje foi...\nÉ, sinto que ficou um pouco mais rápida..."
10024-CVGroup_Cafe_Idle2-1 = "Hmm...\nEu queria secar o suor."
10024-CVGroup_Cafe_Idle3-1 = "Onde será que eu deveria ir agora..."
10024-CVGroup_Cafe_Idle4-1 = "Preciso repor as calorias\npara não ficar exausta no meio do caminho."
10024-CVGroup_Cafe_Idle5-1 = "Um passeio em grupo também parece divertido, mas..."
10024-CVGroup_WeaponGet_Idle1-1 = "Esta é uma arma de fogo pessoal leve, modificada especialmente para pilotagem.\nComo é leve, permite ações táticas rápidas e, claro, não é um fardo durante viagens de longa distância."
