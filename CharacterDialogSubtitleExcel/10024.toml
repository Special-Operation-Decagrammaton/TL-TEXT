[translation]
10024-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10024-CVGroup_CharacterGet_Idle1-1 = "あっ。うん、ライディング中だったの。\n先生も一緒にどう？まずは軽く200kmくらい。"
10024-CVGroup_Cafe_Idle1-1 = "今日の平均速度は……\nうん、ちょっと速くなった感じ……。"
10024-CVGroup_Cafe_Idle2-1 = "うーん……\n汗を乾かしたいけど。"
10024-CVGroup_Cafe_Idle3-1 = "次はどこに行ってみようかな……。"
10024-CVGroup_Cafe_Idle4-1 = "途中でバテないように、\nカロリーを摂取しておかないと。"
10024-CVGroup_Cafe_Idle5-1 = "グループライディングも楽しそうだけど……。"
10024-CVGroup_WeaponGet_Idle1-1 = "これはライディング用に特別に改造された軽量型個人向け火器。\n軽いから素早い戦術行動が可能になるし、\nもちろん長距離のライディングの時も負担にならないの。"
