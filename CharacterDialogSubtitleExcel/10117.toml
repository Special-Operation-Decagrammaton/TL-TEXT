[translation]
10117-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10117-CVGroup_CharacterGet_Idle1-1 = "Academia Ferroviária Highlander\nTachibana Hikari... chegando."
10117-CVGroup_Cafe_Idle1-1 = "Uau, parece que dá para brincar bastante..."
10117-CVGroup_Cafe_Idle2-1 = "Sensei, cadê você?"
10117-CVGroup_Cafe_Idle3-1 = "Hoje é dia de folga, decidido!"
10117-CVGroup_Cafe_Idle4-1 = "Não tem doces? E suco?"
10117-CVGroup_Cafe_Idle5-1 = "Não tem nada de divertido por aqui?"
10117-CVGroup_WeaponGet_Idle1-1 = "É para mim? Obrigada.\nEm troca, vou proteger você, Sensei."
10117-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo."
10117-CVGroup_UIEventLobby_Enter1-2 = "Preparação concluída."
10117-CVGroup_UIEventLobby_Enter2-1 = "Sensei, perigo!"
10117-CVGroup_UIEventLobby_Enter2-2 = "Help me, me ajuda!"
10117-CVGroup_UIEventLobby_Enter3-1 = "Preparação para partida, tudo certo."
10117-CVGroup_UIEventLobby_Enter3-2 = "Sensei, vou aumentar a velocidade!"
10117-CVGroup_UIEventLobby_Enter4-1 = "Já acabou? Quero brincar mais."
10117-CVGroup_UIEventLobby_Enter5-1 = "Foi divertido, vamos brincar de novo."
10117-CVGroup_UIEventLobby_Idle1-1 = "Hã? Quer brincar com a Hikari?"
10117-CVGroup_UIEventLobby_Idle2-1 = "Isso faz cócegas!"
10117-CVGroup_UIEventLobby_Idle2-2 = "Uuu... vou te dar o troco!"
10117-CVGroup_UIEventLobby_Idle3-1 = "Um carinho, por favor, me elogia, me elogia!"
10117-CVGroup_UIEventLobby_Idle3-2 = "Me elogia... mesmo que eu não tenha feito nada."
10117-CVGroup_UIEventLobby_Idle4-1 = "Quer comer um doce? Espera um pouquinho."
10117-CVGroup_UIEventLobby_Idle4-2 = "Ah... eu comi tudo... sorry."
10117-CVGroup_UIEventShop_Enter1-1 = "Loja do trem, o que você quer?"
10117-CVGroup_UIEventShop_Enter2-1 = "Bem-vindo. Dê uma olhadinha, é o que dizem, né?"
10117-CVGroup_UIEventShop_Enter3-1 = "Os trilhos continuam por toda parte, e a loja também."
10117-CVGroup_UIEventShop_Idle1-1 = "Uma recomendação? Hmm..."
10117-CVGroup_UIEventShop_Idle1-2 = "Escolha você mesmo."
10117-CVGroup_UIEventShop_Idle2-1 = "A Hikari também quer brincar, mas está se segurando, o Sensei também deveria."
10117-CVGroup_UIEventShop_Buy1-1 = "Oh, isso é bom, né?"
10117-CVGroup_UIEventShop_Buy2-1 = "Você tem bom gosto, uau!"
10117-CVGroup_UIEventShop_Buy3-1 = "Sensei, você é esperto."
10117-CVGroup_UIEventShop_Buy4-1 = "O meu também! O meu também!"
