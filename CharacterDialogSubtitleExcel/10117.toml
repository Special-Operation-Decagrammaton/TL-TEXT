[translation]
10117-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブー。"
10117-CVGroup_CharacterGet_Idle1-1 = "ハイランダー鉄道がくえーん\n橘ヒカリ……さんじょー。"
10117-CVGroup_Cafe_Idle1-1 = "うぉー、いっぱい遊べそう……。"
10117-CVGroup_Cafe_Idle2-1 = "せんせーどこー。"
10117-CVGroup_Cafe_Idle3-1 = "今日はおサボリデーに決定ー。"
10117-CVGroup_Cafe_Idle4-1 = "お菓子ないのー？ジュースは？"
10117-CVGroup_Cafe_Idle5-1 = "面白いことなーいー？"
10117-CVGroup_WeaponGet_Idle1-1 = "くれるのー？ありがとー。\n代わりに、先生の事まもってあげるー。"
10117-CVGroup_UIEventLobby_Enter1-1 = "ようこそー。"
10117-CVGroup_UIEventLobby_Enter1-2 = "じゅんびかんりょー。"
10117-CVGroup_UIEventLobby_Enter2-1 = "せんせーぴんち！"
10117-CVGroup_UIEventLobby_Enter2-2 = "へるぷみー、たすけてー。"
10117-CVGroup_UIEventLobby_Enter3-1 = "走行準備ー、問題なーし。"
10117-CVGroup_UIEventLobby_Enter3-2 = "せんせースピード上げるよー。"
10117-CVGroup_UIEventLobby_Enter4-1 = "もう終わりー？もっと遊びたいー。"
10117-CVGroup_UIEventLobby_Enter5-1 = "楽しかったねーまたあそぼ。"
10117-CVGroup_UIEventLobby_Idle1-1 = "えー？ヒカリとあそびたいの？"
10117-CVGroup_UIEventLobby_Idle2-1 = "くすぐったーいー。"
10117-CVGroup_UIEventLobby_Idle2-2 = "ううーやりかえしてやるー！"
10117-CVGroup_UIEventLobby_Idle3-1 = "なでなでプリーズ、ほめてほめてー。"
10117-CVGroup_UIEventLobby_Idle3-2 = "ほめてー……何もしてないけど。"
10117-CVGroup_UIEventLobby_Idle4-1 = "お菓子たべるー？ちょっとまってねー。"
10117-CVGroup_UIEventLobby_Idle4-2 = "あー……全部食べちゃった……ソーリー。"
10117-CVGroup_UIEventShop_Enter1-1 = "トレインショップーなにがほしいー？"
10117-CVGroup_UIEventShop_Enter2-1 = "いらっしゃーい。みていってくださーい、だって？"
10117-CVGroup_UIEventShop_Enter3-1 = "線路はどこまでもつづくーよーお店もいっしょー。"
10117-CVGroup_UIEventShop_Idle1-1 = "おすすめ？うーん……。"
10117-CVGroup_UIEventShop_Idle1-2 = "自分で選ぶのだー。"
10117-CVGroup_UIEventShop_Idle2-1 = "ヒカリも遊びたいけどがまんしてるーせんせーもがまんしてー。"
10117-CVGroup_UIEventShop_Buy1-1 = "おー、それいいよねー。"
10117-CVGroup_UIEventShop_Buy2-1 = "センスあるーひゅーひゅー。"
10117-CVGroup_UIEventShop_Buy3-1 = "せんせい、かしこーい。"
10117-CVGroup_UIEventShop_Buy4-1 = "ヒカリのぶんも！ヒカリのぶんも！"
