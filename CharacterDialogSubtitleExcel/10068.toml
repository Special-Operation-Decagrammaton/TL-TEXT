[translation]
10068-CVGroup_UITitle_Idle1-1 = "ブルー！アーカイブ！！"
10068-CVGroup_CharacterGet_Idle1-1 = "呼ばれて飛び出て！参りました！\nみんなのスーパースター、宇沢レイサ、登場です！"
10068-CVGroup_Cafe_Idle1-1 = "ひ、人が多い……。"
10068-CVGroup_Cafe_Idle2-1 = "どこにいればいいんだろう……。"
10068-CVGroup_Cafe_Idle3-1 = "いや、逆にこういう時こそ普段どおりに……！"
10068-CVGroup_Cafe_Idle4-1 = "や、やっぱ止めとこう……\n変な人だと思われちゃう。"
10068-CVGroup_Cafe_Idle5-1 = "居心地の良い場所ですね！"
10068-CVGroup_WeaponGet_Idle1-1 = "本当は、まだ実感がありません。\n私は……ちゃんと先生のお役に立てているのでしょうか……\nそうだといいなあって、いつも心から願っています。"
10068-CVGroup_UIEventLobby_Enter1-1 = "あっ、先生！\nこっちですよ！"
10068-CVGroup_UIEventLobby_Enter2-1 = "自警団のスーパーヒーロー！"
10068-CVGroup_UIEventLobby_Enter2-2 = "宇沢レイサ、ご挨拶申し上げます！"
10068-CVGroup_UIEventLobby_Enter3-1 = "おおおっ！\n盛り上がってまいりました！"
10068-CVGroup_UIEventLobby_Enter4-1 = "ラストスパート！です！"
10068-CVGroup_UIEventLobby_Enter5-1 = "最後まで、駆けぬけましょう！"
10068-CVGroup_UIEventLobby_Idle1-1 = "はい！\n宇沢レイサ、待機中です！"
10068-CVGroup_UIEventLobby_Idle2-1 = "どうかしましたか？\nいつでもお声がけください！"
10068-CVGroup_UIEventLobby_Idle3-1 = "事件ですか！？\nどこですか！？\n誰の事ですか！？"
10068-CVGroup_UIEventLobby_Idle4-1 = "んん……\nじっとしているのが、\n一番、難しいです……。"
10068-CVGroup_UIEventShop_Enter1-1 = "パトロール中に集めた物です！先生もご覧になりますか？"
10068-CVGroup_UIEventShop_Enter2-1 = "この仕事をしていると、\n落とし物をよく見かけるんですよね……"
10068-CVGroup_UIEventShop_Enter2-2 = "無事持ち主が見つかるといいんですが。"
10068-CVGroup_UIEventShop_Enter3-1 = "他に何か必要なものはありますか？\n確認してまいります！"
10068-CVGroup_UIEventShop_Idle1-1 = "うん？何かお探しですか？"
10068-CVGroup_UIEventShop_Idle1-2 = "それはここにはないものでしょうか？"
10068-CVGroup_UIEventShop_Idle2-1 = "必要な物がありましたら何なりと！"
10068-CVGroup_UIEventShop_Idle2-2 = "すぐにお持ちしますので！"
10068-CVGroup_UIEventShop_Buy1-1 = "ほお、なるほどなるほど。"
10068-CVGroup_UIEventShop_Buy2-1 = "んむ！それもいいですね。"
10068-CVGroup_UIEventShop_Buy3-1 = "お探しのものは、そちらでしたか！"
10068-CVGroup_UIEventShop_Buy4-1 = "はい、こちらです、どうぞー！"
10068-CVGroup_UIEventMission_Enter1-1 = "あっ！こんにちは、先生！"
10068-CVGroup_UIEventMission_Enter1-2 = "解決しなきゃいけない事件が山積みです！"
10068-CVGroup_UIEventMission_Enter2-1 = "リストをご用意しました！\n一緒にチェックしていきましょう！"
10068-CVGroup_UIEventMission_Idle1-1 = "うん……？先生？\nどうしました？"
10068-CVGroup_UIEventMission_Idle2-1 = "集中！作業に集中してください！"
10068-CVGroup_UIEventMission_Buy1-1 = "おおー！さすが先生です！"
10068-CVGroup_UIEventMission_Buy2-1 = "いいですね！順調です！！"
10068-CVGroup_UIEventMission_Interaction1-1 = "今日のやることは、これで終わり！"
10068-CVGroup_UIEventMission_Interaction1-2 = "ふう！この達成感！\nいいですね！"
