[translation]
10068-CVGroup_UITitle_Idle1-1 = "Blue Archive!!"
10068-CVGroup_CharacterGet_Idle1-1 = "Chamada e atendida! Cheguei!\nA superestrela de todos, Uzawa Reisa, está na área!"
10068-CVGroup_Cafe_Idle1-1 = "T-tem muita gente aqui..."
10068-CVGroup_Cafe_Idle2-1 = "Onde será que eu deveria ficar?..."
10068-CVGroup_Cafe_Idle3-1 = "Não, na verdade, é nessas horas que eu deveria agir normalmente...!"
10068-CVGroup_Cafe_Idle4-1 = "A-acho melhor não...\nVão achar que sou uma pessoa estranha."
10068-CVGroup_Cafe_Idle5-1 = "É um lugar bem aconchegante!"
10068-CVGroup_WeaponGet_Idle1-1 = "Sinceramente, ainda não caiu a ficha.\nSerá que eu... estou sendo realmente útil para o Sensei?...\nEspero do fundo do coração que sim."
10068-CVGroup_UIEventLobby_Enter1-1 = "Ah, Sensei!\nÉ por aqui!"
10068-CVGroup_UIEventLobby_Enter2-1 = "A super-heroína do comitê de vigilância!"
10068-CVGroup_UIEventLobby_Enter2-2 = "Uzawa Reisa, às suas ordens!"
10068-CVGroup_UIEventLobby_Enter3-1 = "Oooooh!\nO clima está esquentando!"
10068-CVGroup_UIEventLobby_Enter4-1 = "Reta final! Vamos lá!"
10068-CVGroup_UIEventLobby_Enter5-1 = "Vamos correr até o fim!"
10068-CVGroup_UIEventLobby_Idle1-1 = "Sim!\nUzawa Reisa, em prontidão!"
10068-CVGroup_UIEventLobby_Idle2-1 = "Aconteceu alguma coisa?\nPode me chamar a qualquer momento!"
10068-CVGroup_UIEventLobby_Idle3-1 = "Algum incidente!?\nOnde!?\nQuem está envolvido!?"
10068-CVGroup_UIEventLobby_Idle4-1 = "Hmm...\nFicar parada é a coisa...\nmais difícil de todas..."
10068-CVGroup_UIEventShop_Enter1-1 = "São coisas que coletei durante a patrulha! O Sensei quer dar uma olhada?"
10068-CVGroup_UIEventShop_Enter2-1 = "Fazendo esse trabalho, a gente acaba encontrando muitos itens perdidos..."
10068-CVGroup_UIEventShop_Enter2-2 = "Espero que os donos consigam recuperá-los."
10068-CVGroup_UIEventShop_Enter3-1 = "Precisa de mais alguma coisa?\nVou verificar para você!"
10068-CVGroup_UIEventShop_Idle1-1 = "Hum? Está procurando algo?"
10068-CVGroup_UIEventShop_Idle1-2 = "Será que não é algo que não temos aqui?"
10068-CVGroup_UIEventShop_Idle2-1 = "Se precisar de algo, é só pedir!"
10068-CVGroup_UIEventShop_Idle2-2 = "Trarei para você imediatamente!"
10068-CVGroup_UIEventShop_Buy1-1 = "Oh, entendo, entendo."
10068-CVGroup_UIEventShop_Buy2-1 = "Hum! Essa também é uma boa escolha."
10068-CVGroup_UIEventShop_Buy3-1 = "Então era isso que você estava procurando!"
10068-CVGroup_UIEventShop_Buy4-1 = "Sim, aqui está, pode pegar!"
10068-CVGroup_UIEventMission_Enter1-1 = "Ah! Olá, Sensei!"
10068-CVGroup_UIEventMission_Enter1-2 = "Temos uma pilha de incidentes para resolver!"
10068-CVGroup_UIEventMission_Enter2-1 = "Preparei a lista!\nVamos conferir juntos!"
10068-CVGroup_UIEventMission_Idle1-1 = "Hum...? Sensei?\nO que houve?"
10068-CVGroup_UIEventMission_Idle2-1 = "Foco! Por favor, foque no trabalho!"
10068-CVGroup_UIEventMission_Buy1-1 = "Ooooh! Como esperado do Sensei!"
10068-CVGroup_UIEventMission_Buy2-1 = "Muito bom! Estamos indo bem!!"
10068-CVGroup_UIEventMission_Interaction1-1 = "As tarefas de hoje acabaram!"
10068-CVGroup_UIEventMission_Interaction1-2 = "Ufa! Essa sensação de dever cumprido!\nÉ muito boa!"
