[translation]
20005-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20005-CVGroup_CharacterGet_Idle1-1 = "Ah, continuo sendo uma pessoa bem discreta, mas... \nConto com você!"
20005-CVGroup_Cafe_Idle1-1 = "Estar vestida assim no café... \né um pouco vergonhoso."
20005-CVGroup_Cafe_Idle2-1 = "Tantos móveis com cara de verão..."
20005-CVGroup_Cafe_Idle3-1 = "(E-estou sendo observada por alguém...?)"
20005-CVGroup_Cafe_Idle4-1 = "(A luz quente do sol de verão... que sensação boa...)"
20005-CVGroup_Cafe_Idle5-1 = "(Será que não tem nenhum item do Peroro-sama de edição limitada de verão...?)"
20005-CVGroup_WeaponGet_Idle1-1 = "Será que esta arma de fogo é à prova d'água...?"
20005-CVGroup_UIEventLobby_Enter1-1 = "Sinto um cheiro refrescante de mar~"
20005-CVGroup_UIEventLobby_Enter2-1 = "Espero que tenhamos umas férias divertidas!"
20005-CVGroup_UIEventLobby_Idle1-1 = "Estou pronta! \nAté a boia do Peroro-sama eu trouxe!"
20005-CVGroup_UIEventLobby_Idle2-1 = "Ué? A chave do vestiário, \neu tinha certeza que deixei aqui...?"
20005-CVGroup_UIEventLobby_Idle3-1 = "Ei, hum... \nS-se você ficar me encarando assim, eu fico com vergonha..."
20005-CVGroup_UIEventLobby_Idle4-1 = "Finalmente chegamos! \nO mar, é o mar!"
