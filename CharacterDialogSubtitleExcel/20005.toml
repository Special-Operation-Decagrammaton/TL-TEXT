[translation]
20005-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20005-CVGroup_CharacterGet_Idle1-1 = "あ、相変わらず地味めな私ですが……\nよろしくお願いします！"
20005-CVGroup_Cafe_Idle1-1 = "カフェでこの格好は……\nちょっと恥ずかしいですね。"
20005-CVGroup_Cafe_Idle2-1 = "夏っぽい家具がたくさん……。"
20005-CVGroup_Cafe_Idle3-1 = "（な、なんだか注目されてるような……？）"
20005-CVGroup_Cafe_Idle4-1 = "（夏の暖かい日差し……気持ち良い……）"
20005-CVGroup_Cafe_Idle5-1 = "（夏限定のペロロ様グッズは無いのかな……？）"
20005-CVGroup_WeaponGet_Idle1-1 = "この銃器、防水加工はされてるんでしょうか……？"
20005-CVGroup_UIEventLobby_Enter1-1 = "爽やかな海の香りがしますね～"
20005-CVGroup_UIEventLobby_Enter2-1 = "楽しいバカンスになると良いですね！"
20005-CVGroup_UIEventLobby_Idle1-1 = "準備万端です！\nペロロ様の浮き輪もしっかり持ちました！"
20005-CVGroup_UIEventLobby_Idle2-1 = "あれ？脱衣所のカギ、\n確かここに置いたはず……？"
20005-CVGroup_UIEventLobby_Idle3-1 = "あの、えっと……\nそ、そんなにじっと見られると、恥ずかしいです……。"
20005-CVGroup_UIEventLobby_Idle4-1 = "ついに来ました！\n海ですよ、海！"
