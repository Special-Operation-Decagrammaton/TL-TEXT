[translation]
13003-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
13003-CVGroup_CharacterGet_Idle1-1 = "正義実現委員会、羽川ハスミ。\n先生の指示をお待ちしております。"
13003-CVGroup_Cafe_Idle1-1 = "私もいつか可愛いミニスカートを……。"
13003-CVGroup_Cafe_Idle2-1 = "この空間、気に入りました。\n何度でも来たくなりますね。"
13003-CVGroup_Cafe_Idle3-1 = "たまにはこういった余暇も良いですね。"
13003-CVGroup_Cafe_Idle4-1 = "美味しそうなものがありますが……\n我慢しなければです。"
13003-CVGroup_Cafe_Idle5-1 = "正義実現委員会の原則はシンプルです。\n不義を許さないこと、です。"
13003-CVGroup_WeaponGet_Idle1-1 = "先生がくれたこの力……\n大切に使います。"
