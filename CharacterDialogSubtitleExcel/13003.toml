[translation]
13003-CVGroup_UITitle_Idle1-1 = "Blue Archive."
13003-CVGroup_CharacterGet_Idle1-1 = "Comitê de Justiça, Hasumi Hanekawa.\nEstou aguardando as instruções do Sensei."
13003-CVGroup_Cafe_Idle1-1 = "Eu também gostaria de usar uma minissaia fofa algum dia..."
13003-CVGroup_Cafe_Idle2-1 = "Gostei deste lugar.\nDá vontade de vir aqui sempre."
13003-CVGroup_Cafe_Idle3-1 = "Às vezes, um pouco de lazer como este é bom."
13003-CVGroup_Cafe_Idle4-1 = "Tem coisas deliciosas aqui, mas...\nPreciso me controlar."
13003-CVGroup_Cafe_Idle5-1 = "O princípio do Comitê de Justiça é simples.\nNão tolerar a injustiça."
13003-CVGroup_WeaponGet_Idle1-1 = "Este poder que o Sensei me deu...\nEu o usarei com cuidado."
