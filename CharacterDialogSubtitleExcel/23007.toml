[translation]
23007-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
23007-CVGroup_CharacterGet_Idle1-1 = "浦和ハナコです。\nこれから色々とよろしくお願いしますね。\n……はい、それはもう「色々」と。"
23007-CVGroup_Cafe_Idle1-1 = "あら、可愛らしいところですね。"
23007-CVGroup_Cafe_Idle2-1 = "この内装は先生が？\n素敵ですね。"
23007-CVGroup_Cafe_Idle3-1 = "ここに置いていったら、誰かが驚くでしょうか……？"
23007-CVGroup_Cafe_Idle4-1 = "……ふふっ、ちょっといたずらでもしておきましょうか。"
23007-CVGroup_Cafe_Idle5-1 = "この空間、見ているだけで楽しいですね。"
23007-CVGroup_WeaponGet_Idle1-1 = "……先生は困った方ですね。そんなに「私の全部」が見たいのですか？\nふふっ……実力のお話です。\n今、一体何を考えていたのでしょう？"
