[translation]
23007-CVGroup_UITitle_Idle1-1 = "Blue Archive."
23007-CVGroup_CharacterGet_Idle1-1 = "Sou a Urawa Hanako.\nDe agora em diante, conto com você para muitas coisas.\n...Sim, para muitas \"coisas\" mesmo."
23007-CVGroup_Cafe_Idle1-1 = "Ora, que lugar adorável."
23007-CVGroup_Cafe_Idle2-1 = "Foi você quem fez esta decoração, Sensei?\nÉ maravilhosa."
23007-CVGroup_Cafe_Idle3-1 = "Se eu deixar isso aqui, será que alguém vai se surpreender...?"
23007-CVGroup_Cafe_Idle4-1 = "...Hehe, talvez eu deva pregar uma peça."
23007-CVGroup_Cafe_Idle5-1 = "Só de olhar para este espaço, já me divirto."
23007-CVGroup_WeaponGet_Idle1-1 = "...Sensei, você é uma pessoa problemática. Quer tanto assim ver \"tudo sobre mim\"?\nHehe... estou falando das minhas habilidades.\nO que será que você estava pensando agora mesmo?"
