[translation]
26015-CVGroup_UITitle_Idle1-1 = "Blue Archive, é isso aí~"
26015-CVGroup_CharacterGet_Idle1-1 = "Ta-dã! Ichika, apresentando-se! Nunca imaginei que poderia vir à praia com o Sensei~ Bem, conto com você desta vez também!"
26015-CVGroup_Cafe_Idle1-1 = "Ufa... finalmente posso respirar um pouco..."
26015-CVGroup_Cafe_Idle2-1 = "Este visual... será que exagerei na empolgação?"
26015-CVGroup_Cafe_Idle3-1 = "Ficar sem fazer nada... é algo que me deixa inquieta..."
26015-CVGroup_Cafe_Idle4-1 = "Nossa, todo mundo está brilhando tanto~"
26015-CVGroup_Cafe_Idle5-1 = "Todos aqui são bem únicos, né~"
26015-CVGroup_WeaponGet_Idle1-1 = "Bem... farei o meu melhor. Mesmo que não saia como o esperado, não vale reclamar, viu? Afinal, foi você, Sensei, quem me fez levar isso a sério."
26015-CVGroup_UIEventLobby_Enter1-1 = "Ah, puxa... o tempo já está ficando estranho, né~"
26015-CVGroup_UIEventLobby_Enter1-2 = "Bem, acho que vai dar tudo certo, não vai?"
26015-CVGroup_UIEventLobby_Enter1-3 = "Já que o Sensei está aqui."
26015-CVGroup_UIEventLobby_Enter2-1 = "Nunca pensei que acabaríamos vindo à praia assim."
26015-CVGroup_UIEventLobby_Enter2-2 = "A gente nunca sabe o que vai acontecer, né~"
26015-CVGroup_UIEventLobby_Enter3-1 = "Mika-sama..."
26015-CVGroup_UIEventLobby_Enter3-2 = "Foi um pouco diferente do que eu imaginava~"
26015-CVGroup_UIEventLobby_Enter3-3 = "Claro, no bom sentido! Entendeu?"
26015-CVGroup_UIEventLobby_Enter4-1 = "Minha impressão sobre a praia?"
26015-CVGroup_UIEventLobby_Enter4-2 = "Bem..."
26015-CVGroup_UIEventLobby_Enter4-3 = "Talvez eu tenha passado a odiar um pouquinho a praia! Ahaha!"
26015-CVGroup_UIEventLobby_Enter5-1 = "Já está na hora de ir embora?"
26015-CVGroup_UIEventLobby_Enter5-2 = "Não é como se eu estivesse com saudades――"
26015-CVGroup_UIEventLobby_Enter5-3 = "――de ficar aqui."
26015-CVGroup_UIEventLobby_Enter5-4 = "Ah! Fim do trabalho! Finalmente livre! É essa a sensação!"
26015-CVGroup_UIEventLobby_Idle1-1 = "O som das ondas, o grasnido das gaivotas, o cheiro da maresia..."
26015-CVGroup_UIEventLobby_Idle1-2 = "Sinto que finalmente estou na praia."
26015-CVGroup_UIEventLobby_Idle2-1 = "Haha, todo mundo está tão animado~"
26015-CVGroup_UIEventLobby_Idle2-2 = "Eu gostaria de ter conseguido me divertir como eles."
26015-CVGroup_UIEventLobby_Idle3-1 = "Sensei, aqui está tudo sob controle~"
26015-CVGroup_UIEventLobby_Idle3-2 = "No fim das contas, não ter problemas é o melhor, né."
26015-CVGroup_UIEventLobby_Idle4-1 = "Ei, Sensei? Você só vai ficar entediado se ficar comigo, sabe?"
26015-CVGroup_UIEventLobby_Idle4-2 = "Para mim... é bem conveniente estar com você, Sensei."
26015-CVGroup_UIEventMiniGameMission_Enter1-1 = "Sensei! Por acaso você veio me ajudar?"
26015-CVGroup_UIEventMiniGameMission_Enter1-2 = "Nossa, eu estava meio travada aqui... que alívio~"
26015-CVGroup_UIEventMiniGameMission_Enter2-1 = "Haha, nossa, que bagunça..."
26015-CVGroup_UIEventMiniGameMission_Enter2-2 = "Ah, Sensei, olá."
26015-CVGroup_UIEventMiniGameMission_Enter2-3 = "Desculpe pedir logo de cara, mas você poderia me ajudar...?"
26015-CVGroup_UIEventMiniGameMission_Enter2-4 = "Considere isso como uma boa ação!"
26015-CVGroup_UIEventMiniGameMission_Idle1-1 = "Haa... tem tanta coisa para fazer..."
26015-CVGroup_UIEventMiniGameMission_Idle1-2 = "Bem, não adianta ficar só olhando, se eu começar, uma hora termina."
26015-CVGroup_UIEventMiniGameMission_Idle2-1 = "...Eu entendo muito bem o que você sente, Sensei."
26015-CVGroup_UIEventMiniGameMission_Idle2-2 = "Dá vontade de desviar o olhar dessa pilha de trabalho, né..."
26015-CVGroup_UIEventMiniGameMission_Buy1-1 = "Com isso, resolvemos uma coisa~ Bom trabalho~"
26015-CVGroup_UIEventMiniGameMission_Buy2-1 = "Você é bem eficiente, Sensei~"
26015-CVGroup_UIEventMiniGameMission_Buy2-2 = "Ah... isso não foi sarcasmo, é a verdade."
26015-CVGroup_UIEventMiniGameMission_Interaction1-1 = "Estou exausta..."
26015-CVGroup_UIEventMiniGameMission_Interaction1-2 = "Sensei, descanse cedo hoje também, viu!"
