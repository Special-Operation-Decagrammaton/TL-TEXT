[translation]
26015-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブっす～"
26015-CVGroup_CharacterGet_Idle1-1 = "じゃじゃーん！イチカ、登場っす！\n先生と一緒に海にこられるなんて思いもしなかったっすよ～\nま、今回もよろしくっす！"
26015-CVGroup_Cafe_Idle1-1 = "ふぅ……やっと一息つけるっすね……。"
26015-CVGroup_Cafe_Idle2-1 = "この格好……張り切りすぎっすかね？"
26015-CVGroup_Cafe_Idle3-1 = "暇だと……それはそれで落ち着かないっすね……。"
26015-CVGroup_Cafe_Idle4-1 = "いや～みんなキラキラしてるっすね～"
26015-CVGroup_Cafe_Idle5-1 = "皆さん個性的っすよね～"
26015-CVGroup_WeaponGet_Idle1-1 = "えっと……まぁ、尽力するっす。\n期待通りじゃなくっても、文句言いっこなしっすよ？\n私を本気にさせたのは、先生なんすから。"
26015-CVGroup_UIEventLobby_Enter1-1 = "あ～あ……早速、雲行き怪しいっすね～"
26015-CVGroup_UIEventLobby_Enter1-2 = "ま、なんとかなるんじゃないっすか？"
26015-CVGroup_UIEventLobby_Enter1-3 = "先生もいるっすから。"
26015-CVGroup_UIEventLobby_Enter2-1 = "こんな風に海にくることになるとは思わなかったっす。"
26015-CVGroup_UIEventLobby_Enter2-2 = "何が起きるかなんて、分からないもんっすね～"
26015-CVGroup_UIEventLobby_Enter3-1 = "ミカ様……。"
26015-CVGroup_UIEventLobby_Enter3-2 = "なんか思ってたのと違ったんすよね～"
26015-CVGroup_UIEventLobby_Enter3-3 = "もちろん、いい意味で！っすよ？"
26015-CVGroup_UIEventLobby_Enter4-1 = "海に来た感想っすか？"
26015-CVGroup_UIEventLobby_Enter4-2 = "そうっすね……。"
26015-CVGroup_UIEventLobby_Enter4-3 = "ちょっとだけ、海が嫌いになったかもっす！\nあはは！"
26015-CVGroup_UIEventLobby_Enter5-1 = "もう帰る時間っすか。"
26015-CVGroup_UIEventLobby_Enter5-2 = "名残惜し――"
26015-CVGroup_UIEventLobby_Enter5-3 = "――くはないっすね。"
26015-CVGroup_UIEventLobby_Enter5-4 = "あー！仕事終わり！やっと解放！って感じっす！"
26015-CVGroup_UIEventLobby_Idle1-1 = "波の音に、カモメの鳴き声、潮の香り……。"
26015-CVGroup_UIEventLobby_Idle1-2 = "海に来てるって、実感が湧くっす。"
26015-CVGroup_UIEventLobby_Idle2-1 = "はは、みんな浮かれてるっすね～"
26015-CVGroup_UIEventLobby_Idle2-2 = "私もああやって楽しめたら、よかったんすけど。"
26015-CVGroup_UIEventLobby_Idle3-1 = "先生、ここは異常なしっす～"
26015-CVGroup_UIEventLobby_Idle3-2 = "やっぱ、何事もないのが一番っすよね。"
26015-CVGroup_UIEventLobby_Idle4-1 = "あの、先生？\n私といても、退屈するだけっすよ？"
26015-CVGroup_UIEventLobby_Idle4-2 = "私は……先生といられて、好都合っすけど。"
26015-CVGroup_UIEventMiniGameMission_Enter1-1 = "先生！もしかして、手伝いにきてくれたんすか？"
26015-CVGroup_UIEventMiniGameMission_Enter1-2 = "いや～ちょっと行き詰ってたんで……助かるっす～"
26015-CVGroup_UIEventMiniGameMission_Enter2-1 = "はは、もーめちゃくちゃ……。"
26015-CVGroup_UIEventMiniGameMission_Enter2-2 = "あ、先生、どうもっす。"
26015-CVGroup_UIEventMiniGameMission_Enter2-3 = "早速で悪いんすけど、手伝ってもらえないっすか……？"
26015-CVGroup_UIEventMiniGameMission_Enter2-4 = "これも人助けだと思って！"
26015-CVGroup_UIEventMiniGameMission_Idle1-1 = "はぁ……やることてんこ盛りっすね……。"
26015-CVGroup_UIEventMiniGameMission_Idle1-2 = "ま、眺めてても仕方ないし、やってりゃいつか終わるっすよね。"
26015-CVGroup_UIEventMiniGameMission_Idle2-1 = "……先生の気持ち、よ～く分かるっす。"
26015-CVGroup_UIEventMiniGameMission_Idle2-2 = "山積みの仕事からは、目をそらしたくなるっすよね……。"
26015-CVGroup_UIEventMiniGameMission_Buy1-1 = "これで一個片づいたっすね～お疲れ様っす～"
26015-CVGroup_UIEventMiniGameMission_Buy2-1 = "先生って結構要領いいっすよね～"
26015-CVGroup_UIEventMiniGameMission_Buy2-2 = "あ……今のは皮肉じゃなくて、本心っすよ。"
26015-CVGroup_UIEventMiniGameMission_Interaction1-1 = "つっかれた～……。"
26015-CVGroup_UIEventMiniGameMission_Interaction1-2 = "先生も、今日は早めに休むっすよ！"
