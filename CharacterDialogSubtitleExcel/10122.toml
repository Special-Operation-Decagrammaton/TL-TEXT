[translation]
10122-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～あはは☆"
10122-CVGroup_CharacterGet_Idle1-1 = "聖園ミカ、水着姿で再登場～☆\nって感じかな？\nこれからもよろしくね、先生！"
10122-CVGroup_Cafe_Idle1-1 = "あははっ、変なの～"
10122-CVGroup_Cafe_Idle2-1 = "ふーん、みんなこんな風にシャーレに来てるんだ。"
10122-CVGroup_Cafe_Idle3-1 = "（きっとみんなにも、悩みはあるんだよね。私みたいに……）"
10122-CVGroup_Cafe_Idle4-1 = "先生、いつ来るのかな～"
10122-CVGroup_Cafe_Idle5-1 = "これ、触っても大丈夫かな……？"
10122-CVGroup_WeaponGet_Idle1-1 = "これを……私に？うっそだ～！\n……え、本当に？\nもう……先生、本当にずるいよね。いつも何食わぬ顔でこんなことしちゃってさ。\n反則だよ……。\n私もお返しできたらよかったのに……。"
10122-CVGroup_UIEventLobby_Enter1-1 = "やっほー先生。\n楽しんでる？"
10122-CVGroup_UIEventLobby_Enter2-1 = "う～ん……こんな時、\n先生だったらどうするのかな……？"
10122-CVGroup_UIEventLobby_Enter3-1 = "ちょっと予想外の展開なんだけど……。"
10122-CVGroup_UIEventLobby_Enter3-2 = "ま、何とかなるよね。多分！"
10122-CVGroup_UIEventLobby_Enter4-1 = "しっかりしないと。"
10122-CVGroup_UIEventLobby_Enter4-2 = "また何が起こるか分からないわけだし！"
10122-CVGroup_UIEventLobby_Enter5-1 = "ふぅ～なんとか終わってよかった。"
10122-CVGroup_UIEventLobby_Enter5-2 = "先生がいなかったらどうなっちゃってたんだろ……。"
10122-CVGroup_UIEventLobby_Enter5-3 = "考えたくもないなぁ……。"
10122-CVGroup_UIEventLobby_Idle1-1 = "先生と一緒でよかった～"
10122-CVGroup_UIEventLobby_Idle1-2 = "知ってると思うけど、"
10122-CVGroup_UIEventLobby_Idle1-3 = "私ってちょっとそそっかしいところがあるからさ……。"
10122-CVGroup_UIEventLobby_Idle2-1 = "なになに？"
10122-CVGroup_UIEventLobby_Idle2-2 = "もしかして、私が必要？"
10122-CVGroup_UIEventLobby_Idle3-1 = "あはは、く、くすぐったいよ、先生！"
10122-CVGroup_UIEventLobby_Idle3-2 = "いいのかな～？私もやっちゃうよ～？"
10122-CVGroup_UIEventLobby_Idle4-1 = "先生……？そろそろやめて欲しいかな……って。"
10122-CVGroup_UIEventLobby_Idle4-2 = "あっ！嫌じゃないよ！ぜんぜん！"
10122-CVGroup_UIEventLobby_Idle4-3 = "でも……勘違いしちゃいそうだから。"
10122-CVGroup_UIEventMission_Enter1-1 = "うわぁ、やることいっぱいだね……。"
10122-CVGroup_UIEventMission_Enter2-1 = "せっかく海に来てるのに……まだお仕事するの……？"
10122-CVGroup_UIEventMission_Idle1-1 = "めんどくさいよぉ……。"
10122-CVGroup_UIEventMission_Idle1-2 = "ご褒美があったら、やる気出るかもなんだけどな～"
10122-CVGroup_UIEventMission_Idle2-1 = "ね、先生。"
10122-CVGroup_UIEventMission_Idle2-2 = "……一緒に、サボっちゃお♪"
10122-CVGroup_UIEventMission_Buy1-1 = "わーお！さすが、先生だね☆"
10122-CVGroup_UIEventMission_Buy2-1 = "おぉっ、良い波乗れてるじゃん！"
10122-CVGroup_UIEventMission_Interaction1-1 = "お仕事おーわりっ！"
10122-CVGroup_UIEventMission_Interaction1-2 = "先生、これから……どうする？"
10122-CVGroup_UIEventMission_Interaction1-3 = "私は……特に予定、ないけど。"
