[translation]
20058-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20058-CVGroup_CharacterGet_Idle1-1 = "E aí. Erika Hatami, segundo ano de Gehenna. Prazer."
20058-CVGroup_Cafe_Idle1-1 = "Nossa, tem bastante gente aqui. É sempre assim?"
20058-CVGroup_Cafe_Idle2-1 = "Seria divertido fazer alguma coisa junto com o Sensei."
20058-CVGroup_Cafe_Idle3-1 = "Será que isso é do gosto do Sensei?"
20058-CVGroup_Cafe_Idle4-1 = "(Isso é... de quem será?)"
20058-CVGroup_Cafe_Idle5-1 = "Hum...? Tô sentindo um olhar..."
20058-CVGroup_WeaponGet_Idle1-1 = "Ah, você lembrou do meu gosto? Ahaha, valeu sempre. Então... vou ter que te agradecer de alguma forma, né."
20058-CVGroup_UIEventLobby_Enter1-1 = "Tá uma bagunça, né."
20058-CVGroup_UIEventLobby_Enter1-2 = "Vai ser meio correria, mas pode contar comigo, Sensei."
20058-CVGroup_UIEventLobby_Enter2-1 = "Opa, Sensei. Tava justamente atrás de você."
20058-CVGroup_UIEventLobby_Idle1-1 = "As minhas alunas são muito inquietas, hein... não é fácil."
20058-CVGroup_UIEventLobby_Idle1-2 = "Se eu puder ajudar em alguma coisa, é só falar. Tô dentro."
20058-CVGroup_UIEventLobby_Idle2-1 = "Será que com isso resolve...?"
20058-CVGroup_UIEventLobby_Idle2-2 = "Tô meio preocupada."
20058-CVGroup_UIEventLobby_Idle3-1 = "Eita... isso aí, o que é que a gente faz?"
20058-CVGroup_UIEventLobby_Idle3-2 = "Se a gente deixar quieto, vai dar ruim, né?"
20058-CVGroup_UIEventLobby_Idle4-1 = "Teve de tudo, mas foi divertido."
20058-CVGroup_UIEventLobby_Idle4-2 = "E o Sensei, gostou?"