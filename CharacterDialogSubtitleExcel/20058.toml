[translation]
20058-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20058-CVGroup_CharacterGet_Idle1-1 = "やっほ。ゲヘナ学園2年、旗見エリカ。\nよろしくね。"
20058-CVGroup_Cafe_Idle1-1 = "わ、結構人いるんだね。\nいつもこうなのかな？"
20058-CVGroup_Cafe_Idle2-1 = "先生と一緒にやったら楽しそう。"
20058-CVGroup_Cafe_Idle3-1 = "これって先生の趣味なのかな？"
20058-CVGroup_Cafe_Idle4-1 = "（これ、誰のなんだろ？）"
20058-CVGroup_Cafe_Idle5-1 = "ん……？なんか視線を感じる。"
20058-CVGroup_WeaponGet_Idle1-1 = "あれ、私の好み覚えててくれたんだ？\nあははっ、いつもありがとね。\nそしたら……なにかお礼、しないとね。"
20058-CVGroup_UIEventLobby_Enter1-1 = "賑やかだよね。"
20058-CVGroup_UIEventLobby_Enter1-2 = "ちょっとバタバタすると思うけど、よろしく先生。"
20058-CVGroup_UIEventLobby_Enter2-1 = "やっほ、先生。ちょうど探してたんだ。"
20058-CVGroup_UIEventLobby_Idle1-1 = "うちの生徒ってあんまり落ち着きないから大変だよね……。"
20058-CVGroup_UIEventLobby_Idle1-2 = "手伝えることあったら言って。なんでもするよ。"
20058-CVGroup_UIEventLobby_Idle2-1 = "これで大丈夫、かな……。"
20058-CVGroup_UIEventLobby_Idle2-2 = "ちょっと心配。"
20058-CVGroup_UIEventLobby_Idle3-1 = "げ……どうすんのさアレ。"
20058-CVGroup_UIEventLobby_Idle3-2 = "ほっといたらまずい、よね？"
20058-CVGroup_UIEventLobby_Idle4-1 = "色々あったけど、楽しかったなぁ。"
20058-CVGroup_UIEventLobby_Idle4-2 = "先生はどうだった？"
