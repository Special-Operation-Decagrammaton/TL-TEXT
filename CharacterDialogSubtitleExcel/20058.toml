[translation]
20058-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20058-CVGroup_CharacterGet_Idle1-1 = "Привет-привет. Я Хатами Эрика, второгодка из академии Геенна.\nПриятно познакомиться."
20058-CVGroup_Cafe_Idle1-1 = "Ого, тут довольно много народу.\nЗдесь всегда так?"
20058-CVGroup_Cafe_Idle2-1 = "Кажется, заниматься этим вместе с Сенсеем было бы весело."
20058-CVGroup_Cafe_Idle3-1 = "Это одно из увлечений Сенсея?"
20058-CVGroup_Cafe_Idle4-1 = "(Интересно, чьё это?)"
20058-CVGroup_Cafe_Idle5-1 = "Хм-м..? Такое чувство, будто за мной кто-то наблюдает."
20058-CVGroup_WeaponGet_Idle1-1 = "О, ты помнишь, что мне нравится?\nАхаха, спасибо как и всегда.\nВ таком случае... Я просто обязана сделать тебе какой-нибудь подарок, верно?"
20058-CVGroup_UIEventLobby_Enter1-1 = "Тут оживлённо, правда?"
20058-CVGroup_UIEventLobby_Enter1-2 = "Всё может стать немного суматошным, но я рассчитываю на тебя, Сенсей."
20058-CVGroup_UIEventLobby_Enter2-1 = "Привет, Сенсей. Я как раз тебя искала."
20058-CVGroup_UIEventLobby_Idle1-1 = "Мои девочки далеко не самые спокойные, так что тебе, должно быть, непросто, да...?"
20058-CVGroup_UIEventLobby_Idle1-2 = "Если я могу чем-то помочь, просто дай знать. Я сделаю всё, что потребуется."
20058-CVGroup_UIEventLobby_Idle2-1 = "Интересно... всё точно хорошо?"
20058-CVGroup_UIEventLobby_Idle2-2 = "Я немного волнуюсь."
20058-CVGroup_UIEventLobby_Idle3-1 = "Угх... и что нам с этим делать?"
20058-CVGroup_UIEventLobby_Idle3-2 = "Если мы просто оставим всё как есть, будет плохо, верно?"
20058-CVGroup_UIEventLobby_Idle4-1 = "Много чего произошло, но было весело."
20058-CVGroup_UIEventLobby_Idle4-2 = "А тебе как, Сенсей?"