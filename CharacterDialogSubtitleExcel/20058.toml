[translation]
20058-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20058-CVGroup_CharacterGet_Idle1-1 = "Hey there. I'm Erika Hatami, a second-year at Gehenna Academy.\nNice to meet you."
20058-CVGroup_Cafe_Idle1-1 = "Whoa, there are quite a lot of people here.\nIs it always like this?"
20058-CVGroup_Cafe_Idle2-1 = "It looks like it would be fun to do this with Sensei."
20058-CVGroup_Cafe_Idle3-1 = "Is this one of Sensei's hobbies?"
20058-CVGroup_Cafe_Idle4-1 = "(I wonder whose this is?)"
20058-CVGroup_Cafe_Idle5-1 = "Hmm...? I feel like someone's watching me."
20058-CVGroup_WeaponGet_Idle1-1 = "Oh, you remembered what I like?\nAhaha, thanks as always.\nIn that case... I'll have to give you a reward, won't I?"
20058-CVGroup_UIEventLobby_Enter1-1 = "It's lively, isn't it?"
20058-CVGroup_UIEventLobby_Enter1-2 = "It might get a little hectic, but I'm counting on you, Sensei."
20058-CVGroup_UIEventLobby_Enter2-1 = "Hey, Sensei. I was just looking for you."
20058-CVGroup_UIEventLobby_Idle1-1 = "Our students aren't very good at sitting still, so it's a handful, isn't it..."
20058-CVGroup_UIEventLobby_Idle1-2 = "Let me know if there's anything I can help with. I'll do whatever it takes."
20058-CVGroup_UIEventLobby_Idle2-1 = "Is this... going to be okay?"
20058-CVGroup_UIEventLobby_Idle2-2 = "I'm a little worried."
20058-CVGroup_UIEventLobby_Idle3-1 = "Ugh... what are we supposed to do about that?"
20058-CVGroup_UIEventLobby_Idle3-2 = "It'd be bad if we just left it alone, right?"
20058-CVGroup_UIEventLobby_Idle4-1 = "A lot happened, but it was fun."
20058-CVGroup_UIEventLobby_Idle4-2 = "How about you, Sensei?"