[translation]
20050-CVGroup_UITitle_Idle1-1 = "Blue! Ar, Kai, Bu!"
20050-CVGroup_CharacterGet_Idle1-1 = "Eu sou Ritsu Usuba, da Academia de Artes Wild Hunt!\nPrazer em te conhecer!"
20050-CVGroup_Cafe_Idle1-1 = "Será que dá para colocar uma obra de arte ali?"
20050-CVGroup_Cafe_Idle2-1 = "Será que não dá para deixar este lugar um pouco mais arejado?\nAh! ...Talvez dê para fazer um buraco ali!"
20050-CVGroup_Cafe_Idle3-1 = "Que cheirinho bom de café... Será que consigo expressar isso?"
20050-CVGroup_Cafe_Idle4-1 = "Hmm, vejamos... qual será a próxima importação?"
20050-CVGroup_Cafe_Idle5-1 = "Se eu levar este bolo daqui para casa...\nTenho certeza de que o pessoal da academia vai adorar!"
20050-CVGroup_WeaponGet_Idle1-1 = "Uau! Eu queria isso há tanto tempo!\nObrigada, Sensei! Estou tão feliz!"
20050-CVGroup_UIEventLobby_Enter1-1 = "Sensei! Por aqui, por aqui!"
20050-CVGroup_UIEventLobby_Enter2-1 = "As coisas parecem estar um pouco confusas, né...\nBem, vou fazer o que puder!"
20050-CVGroup_UIEventLobby_Enter3-1 = "É a primeira vez que pego um pedido assim, mas...\nCom o plano da Miyo-chan, vai dar tudo certo!"
20050-CVGroup_UIEventLobby_Enter4-1 = "Este pedido de agora...\nAté que pode ser interessante, não é?"
20050-CVGroup_UIEventLobby_Enter5-1 = "Ahhh, finalmente acabou~\n...Ué? Por que todo mundo está tão exausto?"
20050-CVGroup_UIEventLobby_Idle1-1 = "Hm, Sensei? Tem algo no meu rosto? Algum pó?"
20050-CVGroup_UIEventLobby_Idle2-1 = "Ah! Ahahaha!\nAi! Se você continuar me cutucando assim... vou ter que revidar!"
20050-CVGroup_UIEventLobby_Idle3-1 = "P-pessoal, não fiquem tão desanimados..."
20050-CVGroup_UIEventLobby_Idle4-1 = "Não importa o quão difícil seja a situação, o Departamento de Comércio Especial...\nSempre encontra uma saída!"
20050-CVGroup_UIEventMission_Enter1-1 = "Tem tanta coisa divertida acontecendo!\nHehe, pode esperar, Sensei!"
20050-CVGroup_UIEventMission_Enter2-1 = "Mesmo que as coisas fiquem difíceis,\nnão existe nada impossível!"
20050-CVGroup_UIEventMission_Buy1-1 = "Incríveeeel! Sensei, você consegue fazer de tudo, né!"
20050-CVGroup_UIEventMission_Buy2-1 = "Não se esqueça da minha recompensa, hein!"
20050-CVGroup_UIEventMission_Idle1-1 = "Hm? O que foi?"
20050-CVGroup_UIEventMission_Idle2-1 = "Foi trabalhoso, mas você se divertiu?\nEhehe, estamos na mesma então!"
20050-CVGroup_UIEventMission_Interaction1-1 = "Já fechamos as portas por hoje! Até amanhã!"
