[translation]
10125-CVGroup_UITitle_Idle1-1 = "Nyu-fu-fu... Blue Archive!"
10125-CVGroup_CharacterGet_Idle1-1 = "Sou Eri, do Clube de Pesquisa Oculta da Academia de Artes Wild Hunt.\nO mundo está repleto de magia.\nSim, exatamente como este nosso encontro!"
10125-CVGroup_Cafe_Idle1-1 = "Será que não vai acontecer um poltergeist em algum lugar..."
10125-CVGroup_Cafe_Idle2-1 = "Nyu-fu... Acho que estou prestes a ter uma nova ideia mágica..."
10125-CVGroup_Cafe_Idle3-1 = "Mumu... Detectei uma mana densa aqui."
10125-CVGroup_Cafe_Idle4-1 = "Nyu-fu-fu... Sair para passear é tão empolgante!"
10125-CVGroup_Cafe_Idle5-1 = "Se eu transformar este lugar em um ateliê... talvez eu crie uma obra-prima...!"
10125-CVGroup_WeaponGet_Idle1-1 = "Nyu-fu-fu, minha varinha mágica exclusiva!\nCom uma magia perfeita, atenderei às suas expectativas!"
10125-CVGroup_UIEventLobby_Enter1-1 = "Você, que foi guiado pelos arcanos... venha por aqui."
10125-CVGroup_UIEventLobby_Enter2-1 = "Vamos, os segredos que dormem em Wild Hunt..."
10125-CVGroup_UIEventLobby_Enter2-2 = "Vamos desvendá-los juntos."
10125-CVGroup_UIEventLobby_Enter3-1 = "Uuu... Espero que o comitê disciplinar não descubra..."
10125-CVGroup_UIEventLobby_Enter4-1 = "Só mais um pouco! Vamos ter um final sem arrependimentos!"
10125-CVGroup_UIEventLobby_Enter5-1 = "Mestre! Vamos juntos novamente..."
10125-CVGroup_UIEventLobby_Enter5-2 = "Vamos criar uma arte maravilhosa!"
10125-CVGroup_UIEventLobby_Idle1-1 = "Nyu-fu-fu, você tem interesse em magia?"
10125-CVGroup_UIEventLobby_Idle2-1 = "Mestre, quer que eu leia sua sorte?"
10125-CVGroup_UIEventLobby_Idle2-2 = "Claro, não precisa pagar nada."
10125-CVGroup_UIEventLobby_Idle2-3 = "Sinta-se à vontade para me pedir!"
10125-CVGroup_UIEventLobby_Idle3-1 = "N-não, o chapéu não pode."
10125-CVGroup_UIEventLobby_Idle3-2 = "E-este é o símbolo de um mago, então... não posso tirar!"
10125-CVGroup_UIEventLobby_Idle4-1 = "Ah, tem uma marca mágica ali...!"
10125-CVGroup_UIEventLobby_Idle4-2 = "Se cutucar muito... pode acabar explodindo. Nyu-fu-fu."
10125-CVGroup_UIEventShop_Enter1-1 = "Vamos, vamos conseguir itens mágicos!"
10125-CVGroup_UIEventShop_Enter2-1 = "Oh, essa seleção... só de olhar, sinto a energia mágica...!"
10125-CVGroup_UIEventShop_Enter3-1 = "Não podemos mais coletar itens mágicos aqui, mas..."
10125-CVGroup_UIEventShop_Enter3-2 = "Não tem problema!"
10125-CVGroup_UIEventShop_Enter3-3 = "Tanto as memórias com o Mestre quanto os itens mágicos,"
10125-CVGroup_UIEventShop_Enter3-4 = "poderemos encontrar muitos deles daqui para frente!"
10125-CVGroup_UIEventShop_Idle1-1 = "Encontrou algo que lhe agrade?"
10125-CVGroup_UIEventShop_Idle2-1 = "Mestre, estou ansiosa pelo seu bom gosto!"
10125-CVGroup_UIEventShop_Buy1-1 = "Sinto uma energia mágica forte vindo daqui...!"
10125-CVGroup_UIEventShop_Buy2-1 = "Como esperado do Mestre! Você tem um ótimo olho!"
10125-CVGroup_UIEventShop_Buy3-1 = "Então, vamos testar logo!"
10125-CVGroup_UIEventShop_Buy4-1 = "Ah, eu também estava pensando que esse era o melhor!"
