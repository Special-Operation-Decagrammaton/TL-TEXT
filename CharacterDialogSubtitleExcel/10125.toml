[translation]
10125-CVGroup_UITitle_Idle1-1 = "にゅっふっふ～……ブルーアーカイブ！"
10125-CVGroup_CharacterGet_Idle1-1 = "ワイルドハント芸術学院、\nオカルト研究会の白尾エリと申します。\n世界は魔法に満ちているんです。\nそう、この出会いのように！"
10125-CVGroup_Cafe_Idle1-1 = "どこかでポルターガイストでも起きないかな……。"
10125-CVGroup_Cafe_Idle2-1 = "にゅふ……新しい魔法が思い浮かびそう……。"
10125-CVGroup_Cafe_Idle3-1 = "むむっ……濃厚なマナを感知しましたよ。"
10125-CVGroup_Cafe_Idle4-1 = "にゅっふっふ……お出かけはワクワクしますね！"
10125-CVGroup_Cafe_Idle5-1 = "ここをアトリエにしたら……傑作が生まれるかも……！"
10125-CVGroup_WeaponGet_Idle1-1 = "にゅふふふ、私専用の魔法の杖！\n完璧な魔法で、期待にお応えしますとも！"
10125-CVGroup_UIEventLobby_Enter1-1 = "アルカナに導かれし者よ……こちらへ。"
10125-CVGroup_UIEventLobby_Enter2-1 = "さあ、ワイルドハントに眠る秘密を……。"
10125-CVGroup_UIEventLobby_Enter2-2 = "共に解き明かしましょう。"
10125-CVGroup_UIEventLobby_Enter3-1 = "うう……寮監隊にバレませんように……。"
10125-CVGroup_UIEventLobby_Enter4-1 = "あと少し！悔いなきフィナーレを迎えましょう！"
10125-CVGroup_UIEventLobby_Enter5-1 = "マスター！また一緒に……。"
10125-CVGroup_UIEventLobby_Enter5-2 = "素晴らしい芸術を作りましょう！"
10125-CVGroup_UIEventLobby_Idle1-1 = "にゅふふ、魔法に興味がおありですか？"
10125-CVGroup_UIEventLobby_Idle2-1 = "マスター、占ってさしあげましょうか？"
10125-CVGroup_UIEventLobby_Idle2-2 = "もちろんお代はいりません。"
10125-CVGroup_UIEventLobby_Idle2-3 = "お気軽にお声がけください！"
10125-CVGroup_UIEventLobby_Idle3-1 = "ぼ、帽子はダメですからっ。"
10125-CVGroup_UIEventLobby_Idle3-2 = "こ、これは魔法使いの象徴なので……脱げないんです！"
10125-CVGroup_UIEventLobby_Idle4-1 = "あっ、そこには魔法刻印が……！"
10125-CVGroup_UIEventLobby_Idle4-2 = "何度も突っつくと……暴発しちゃうかも。にゅふふっ。"
10125-CVGroup_UIEventShop_Enter1-1 = "さぁ、魔道具を手に入れましょう！"
10125-CVGroup_UIEventShop_Enter2-1 = "おお、この品揃え……眺めるだけでも魔力が……！"
10125-CVGroup_UIEventShop_Enter3-1 = "ここではもう魔道具を集められなくなってしまいましたが、"
10125-CVGroup_UIEventShop_Enter3-2 = "構いません！"
10125-CVGroup_UIEventShop_Enter3-3 = "マスターとの思い出も魔道具も、"
10125-CVGroup_UIEventShop_Enter3-4 = "これからいっぱい見つけていけますから！"
10125-CVGroup_UIEventShop_Idle1-1 = "お気に召すものはありましたか？"
10125-CVGroup_UIEventShop_Idle2-1 = "マスターの審美眼、期待しています！"
10125-CVGroup_UIEventShop_Buy1-1 = "これは強い魔力を感じますね……！"
10125-CVGroup_UIEventShop_Buy2-1 = "さすがマスター！お目が高い！"
10125-CVGroup_UIEventShop_Buy3-1 = "では、早速試してみましょうか！"
10125-CVGroup_UIEventShop_Buy4-1 = "あっ、私もそれがいいと思っていたんです！"
