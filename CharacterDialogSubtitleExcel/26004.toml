[translation]
26004-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
26004-CVGroup_CharacterGet_Idle1-1 = "本の中の物語のように、\n私たちの物語が、始まります！"
26004-CVGroup_Cafe_Idle1-1 = "本が足りていませんね。\n本棚をいっぱいにしないとです。"
26004-CVGroup_Cafe_Idle2-1 = "わあ、本を読むのには最適なお部屋ですね。"
26004-CVGroup_Cafe_Idle3-1 = "あっ、この本見たことありません！"
26004-CVGroup_Cafe_Idle4-1 = "ふふふふふっ！\nフラグが立ちましたよ～。"
26004-CVGroup_Cafe_Idle5-1 = "ふふ、うふふ！\n良いアイデアが浮かびました！"
26004-CVGroup_WeaponGet_Idle1-1 = "ふふ、返却期限を延滞してしまった方は\n覚悟してくださいね。"
