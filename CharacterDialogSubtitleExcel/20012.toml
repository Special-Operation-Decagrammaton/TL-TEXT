[translation]
20012-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20012-CVGroup_CharacterGet_Idle1-1 = "Sou Sena Himuro, chefe do Departamento de Medicina de Emergência da Academia Gehenna.\nPrazer em conhecê-lo."
20012-CVGroup_Cafe_Idle1-1 = "Hmm... não parece haver nada de anormal por aqui."
20012-CVGroup_Cafe_Idle2-1 = "Houve... não, parece que não há feridos, certo?"
20012-CVGroup_Cafe_Idle3-1 = "Este parece ser um bom lugar para descansar."
20012-CVGroup_Cafe_Idle4-1 = "De vez em quando, momentos como este não são nada mal."
20012-CVGroup_Cafe_Idle5-1 = "Onde será que o Sensei está...?"
20012-CVGroup_WeaponGet_Idle1-1 = "Recebi este equipamento. \nAgora poderei oferecer um suporte mais completo. \n...Conto com você daqui em diante."
20012-CVGroup_UIEventShop_Enter1-1 = "Bom trabalho, Sensei."
20012-CVGroup_UIEventShop_Enter1-2 = "Se precisar de algo, pode me chamar a qualquer momento."
20012-CVGroup_UIEventShop_Enter2-1 = "...Que lugar barulhento. \nTalvez seja melhor eu me preparar."
20012-CVGroup_UIEventShop_Enter3-1 = "Pensei que pudesse haver algum incidente para resolver, \nentão fiquei por aqui."
20012-CVGroup_UIEventShop_Enter3-2 = "Se precisar de algo, pode me chamar a qualquer momento."
20012-CVGroup_UIEventShop_Idle1-1 = "...Só por precaução, \neu não sou um produto, viu?"
20012-CVGroup_UIEventShop_Idle2-1 = "Sinto muito, mas por questões de regulamento, \nnão posso entregar nada de graça."
20012-CVGroup_UIEventShop_Buy1-1 = "Uma boa escolha."
20012-CVGroup_UIEventShop_Buy2-1 = "Parece ser uma boa opção."
20012-CVGroup_UIEventShop_Buy3-1 = "Vou preparar agora mesmo."
20012-CVGroup_UIEventShop_Buy4-1 = "Certo, por favor, aguarde um momento."
20012-CVGroup_UIEventMission_Enter1-1 = "Bom trabalho, Sensei. \nAqui está a lista de tarefas, conto com você."
20012-CVGroup_UIEventMission_Enter2-1 = "Aqui está o progresso das tarefas. \nPor favor, dê uma olhada."
20012-CVGroup_UIEventMission_Idle1-1 = "...Sensei? \nPor favor, concentre-se no trabalho."
20012-CVGroup_UIEventMission_Idle2-1 = "...Sinto muito, \nmas não posso assumir o seu trabalho por você."
20012-CVGroup_UIEventMission_Buy1-1 = "Certo, verificado."
20012-CVGroup_UIEventMission_Buy2-1 = "Parece que terminou sem problemas."
20012-CVGroup_UIEventMission_Interaction1-1 = "Bem, o trabalho de hoje termina aqui. \nSensei, bom trabalho."
