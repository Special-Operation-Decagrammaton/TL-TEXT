[translation]
20012-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20012-CVGroup_CharacterGet_Idle1-1 = "ゲヘナ学園救急医学部の部長、氷室セナです。\n以後お見知りおきを。"
20012-CVGroup_Cafe_Idle1-1 = "ふむ……特に異常は無さそうですね。"
20012-CVGroup_Cafe_Idle2-1 = "した……いえ、負傷者はいなさそうですね？"
20012-CVGroup_Cafe_Idle3-1 = "休息にはちょうど良さそうな場所ですね。"
20012-CVGroup_Cafe_Idle4-1 = "たまにはこういった時間も、悪くありません。"
20012-CVGroup_Cafe_Idle5-1 = "先生は、どこに……。"
20012-CVGroup_WeaponGet_Idle1-1 = "こちらの装備、確かに受け取りました。\nこれからはより本格的な支援ができるはずです\n……これからも、どうかよろしくお願いいたします。"
20012-CVGroup_UIEventShop_Enter1-1 = "お疲れ様です、先生。"
20012-CVGroup_UIEventShop_Enter1-2 = "何かありましたらいつでも声をかけてください。"
20012-CVGroup_UIEventShop_Enter2-1 = "……騒がしい現場ですね。\n準備をしておいた方が良いかもしれません。"
20012-CVGroup_UIEventShop_Enter3-1 = "事後処理が発生するのではと思い、\nここに残っておりました。"
20012-CVGroup_UIEventShop_Enter3-2 = "何かありましたらいつでもお声がけください。"
20012-CVGroup_UIEventShop_Idle1-1 = "……念のため、ですが。\n私は商品ではありませんので。"
20012-CVGroup_UIEventShop_Idle2-1 = "申し訳ありませんが規則ですので、\n無料で差し上げるわけにはいきません。"
20012-CVGroup_UIEventShop_Buy1-1 = "悪くない判断です。"
20012-CVGroup_UIEventShop_Buy2-1 = "それが良さそうですね。"
20012-CVGroup_UIEventShop_Buy3-1 = "すぐに用意します。"
20012-CVGroup_UIEventShop_Buy4-1 = "はい、では少々お待ちください。"
20012-CVGroup_UIEventMission_Enter1-1 = "お疲れ様です、先生。\nこちらお仕事のリストですので、よろしくお願いします。"
20012-CVGroup_UIEventMission_Enter2-1 = "こちら、お仕事の進捗状況です。\nご確認をお願いします。"
20012-CVGroup_UIEventMission_Idle1-1 = "……先生？\nお仕事に集中してください。"
20012-CVGroup_UIEventMission_Idle2-1 = "……すみませんが、\n私がお仕事を肩代わりすることはできませんので。"
20012-CVGroup_UIEventMission_Buy1-1 = "はい、確認しました。"
20012-CVGroup_UIEventMission_Buy2-1 = "問題なく終えられたようですね。"
20012-CVGroup_UIEventMission_Interaction1-1 = "では、本日のお仕事は以上です。\n先生、お疲れ様でした。"
