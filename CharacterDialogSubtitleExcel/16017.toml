[translation]
16017-CVGroup_UITitle_Idle1-1 = "ブ、ブルーアーカイブ……でいいんですか……？"
16017-CVGroup_CharacterGet_Idle1-1 = "ハ、ハイランダー鉄道学園……\nう、内海、アオバです……\nよろしくしないで、いいですけど……。"
16017-CVGroup_Cafe_Idle1-1 = "み、みんな、笑顔……\n人生、楽しそうで いいですね……。"
16017-CVGroup_Cafe_Idle2-1 = "ここは……広いですね……\nうちの宿直室もこれくらいスペースがあれば……。"
16017-CVGroup_Cafe_Idle3-1 = "わ、私ここにいていいんでしょうか……？"
16017-CVGroup_Cafe_Idle4-1 = "（なんだか油の臭いが染みついちゃってる気が……最悪ですけど）"
16017-CVGroup_Cafe_Idle5-1 = "落ち着いて深呼吸……すー、はー！"
16017-CVGroup_WeaponGet_Idle1-1 = "む、ムカつく人がいたら……\nこ、これで撃ち抜いちゃえばいいんですよね……？"
16017-CVGroup_UIEventLobby_Enter1-1 = "き、来てくださりありがとうございます……。"
16017-CVGroup_UIEventLobby_Enter1-2 = "お、大人が一緒にいてくださると……安心、します。"
16017-CVGroup_UIEventLobby_Enter2-1 = "いつもはこうじゃないんですけどっ！今回が特殊なだけで……。"
16017-CVGroup_UIEventLobby_Enter2-2 = "あー……いえ、そうでもないかもしれないですけど……。"
16017-CVGroup_UIEventLobby_Enter2-3 = "で、でも修羅場ってほどじゃないし……たぶん……知りませんけど。"
16017-CVGroup_UIEventLobby_Enter3-1 = "うう……な、なんだか面倒なことになってる気がするんですけど……。"
16017-CVGroup_UIEventLobby_Enter3-2 = "幹部の皆さん……信じて大丈夫なんですよね……？"
16017-CVGroup_UIEventLobby_Enter4-1 = "ふぅ……こ、ここまで来たら、もう大丈夫ですよね……？"
16017-CVGroup_UIEventLobby_Enter5-1 = "はぁ……やっと終わりましたけど……。"
16017-CVGroup_UIEventLobby_Enter5-2 = "先生も本当に……お疲れさまでした。"
16017-CVGroup_UIEventLobby_Idle1-1 = "な、なんですか？"
16017-CVGroup_UIEventLobby_Idle1-2 = "えっ……も、もしかして私何かしました……？"
16017-CVGroup_UIEventLobby_Idle2-1 = "く、雲行きが怪しいんですけどぉ……。"
16017-CVGroup_UIEventLobby_Idle2-2 = "何事もないといいんですけど……。"
16017-CVGroup_UIEventLobby_Idle3-1 = "ど、どうして幹部連中ってあんなんばっかなんですか……。"
16017-CVGroup_UIEventLobby_Idle3-2 = "現場の事なんか全然見てないんですけど……。"
16017-CVGroup_UIEventLobby_Idle4-1 = "……ど、どうしたんですか？"
16017-CVGroup_UIEventLobby_Idle4-2 = "く、くすぐったいんですけど……そこ、あんまり……ひゃっ。"
16017-CVGroup_UIEventMission_Enter1-1 = "本当に終わる気がしないんですけど……。"
16017-CVGroup_UIEventMission_Enter2-1 = "せ、先生がいてくれて、よかったです……。"
16017-CVGroup_UIEventMission_Enter2-2 = "心強いっていうか……安心できるっていうか……。"
16017-CVGroup_UIEventMission_Enter2-3 = "えへへ。"
16017-CVGroup_UIEventMission_Idle1-1 = "さ、触ってもなんもないんですけどっ！？"
16017-CVGroup_UIEventMission_Idle2-1 = "ど、どうにかしないと……うう……。"
16017-CVGroup_UIEventMission_Buy1-1 = "わ、わあ…… ！"
16017-CVGroup_UIEventMission_Buy2-1 = "す、すごすぎるんですけど！？"
16017-CVGroup_UIEventMission_Interaction1-1 = "こ、これが……大人の力……。"
