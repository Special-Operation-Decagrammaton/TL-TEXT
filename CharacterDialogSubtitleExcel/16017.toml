[translation]
16017-CVGroup_UITitle_Idle1-1 = "B-Blue Archive... é isso mesmo...?"
16017-CVGroup_CharacterGet_Idle1-1 = "A-Academia Ferroviária Highlander...\nE-Eu sou Utsumi Aoba...\nNão precisa ser legal comigo, mas..."
16017-CVGroup_Cafe_Idle1-1 = "T-Todos, sorrindo...\nA vida parece ser bem divertida para vocês..."
16017-CVGroup_Cafe_Idle2-1 = "Aqui é... bem espaçoso...\nSe o meu dormitório tivesse esse tamanho também..."
16017-CVGroup_Cafe_Idle3-1 = "E-Eu posso mesmo ficar aqui...?"
16017-CVGroup_Cafe_Idle4-1 = "(Sinto que o cheiro de óleo impregnou em mim... que horror)"
16017-CVGroup_Cafe_Idle5-1 = "Respire fundo e mantenha a calma... inspira, expira!"
16017-CVGroup_WeaponGet_Idle1-1 = "Se tiver alguém que me irrite...\nE-Eu só preciso atirar nessa pessoa, certo...?"
16017-CVGroup_UIEventLobby_Enter1-1 = "O-Obrigada por vir..."
16017-CVGroup_UIEventLobby_Enter1-2 = "Ter um adulto por perto... me deixa mais tranquila."
16017-CVGroup_UIEventLobby_Enter2-1 = "Não é sempre assim! É só desta vez que está sendo especial..."
16017-CVGroup_UIEventLobby_Enter2-2 = "Ah... não, talvez não seja bem assim..."
16017-CVGroup_UIEventLobby_Enter2-3 = "M-Mas não chega a ser um campo de batalha... provavelmente... não sei dizer."
16017-CVGroup_UIEventLobby_Enter3-1 = "Uuu... s-sinto que algo problemático está acontecendo..."
16017-CVGroup_UIEventLobby_Enter3-2 = "Pessoal da diretoria... podemos confiar neles, né...?"
16017-CVGroup_UIEventLobby_Enter4-1 = "Ufa... c-chegando até aqui, já está tudo bem, né...?"
16017-CVGroup_UIEventLobby_Enter5-1 = "Ah... finalmente acabou..."
16017-CVGroup_UIEventLobby_Enter5-2 = "Sensei, você também... bom trabalho."
16017-CVGroup_UIEventLobby_Idle1-1 = "O-O que foi?"
16017-CVGroup_UIEventLobby_Idle1-2 = "Ei... s-será que eu fiz alguma coisa...?"
16017-CVGroup_UIEventLobby_Idle2-1 = "O-O clima está ficando estranho..."
16017-CVGroup_UIEventLobby_Idle2-2 = "Espero que não aconteça nada de ruim..."
16017-CVGroup_UIEventLobby_Idle3-1 = "P-Por que o pessoal da diretoria é sempre assim..."
16017-CVGroup_UIEventLobby_Idle3-2 = "Eles não olham nem um pouco para o que acontece no campo..."
16017-CVGroup_UIEventLobby_Idle4-1 = "...... O-O que foi?"
16017-CVGroup_UIEventLobby_Idle4-2 = "C-Cegueira... digo, cócegas... não toque aí... hya!"
16017-CVGroup_UIEventMission_Enter1-1 = "Sinto que isso nunca vai acabar..."
16017-CVGroup_UIEventMission_Enter2-1 = "F-Fico feliz que o Sensei esteja aqui..."
16017-CVGroup_UIEventMission_Enter2-2 = "É reconfortante... ou melhor, me sinto segura..."
16017-CVGroup_UIEventMission_Enter2-3 = "Ehehe."
16017-CVGroup_UIEventMission_Idle1-1 = "N-Não tem nada aqui, mesmo que você toque!"
16017-CVGroup_UIEventMission_Idle2-1 = "T-Tenho que dar um jeito nisso... uuu..."
16017-CVGroup_UIEventMission_Buy1-1 = "U-Uau...!"
16017-CVGroup_UIEventMission_Buy2-1 = "I-Isso é incrível demais, não é!?"
16017-CVGroup_UIEventMission_Interaction1-1 = "E-Esse é... o poder de um adulto..."
