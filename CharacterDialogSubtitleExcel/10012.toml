[translation]
10012-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10012-CVGroup_CharacterGet_Idle1-1 = "O treinamento com pesos é uma ciência.\nAs teorias de ponta do Millennium são um campo que brilha intensamente."
10012-CVGroup_Cafe_Idle1-1 = "Hmm..."
10012-CVGroup_Cafe_Idle2-1 = "Será que tem algum lugar onde eu possa treinar por aqui..."
10012-CVGroup_Cafe_Idle3-1 = "Este parece ser um bom lugar para fazer exercícios com pesos livres."
10012-CVGroup_Cafe_Idle4-1 = "Hã? Fazer alongamento juntos?"
10012-CVGroup_Cafe_Idle5-1 = "Sim, vamos fazer uma corrida juntos em seguida?"
10012-CVGroup_WeaponGet_Idle1-1 = "Ser capaz de manusear algo assim também é um resultado do meu treinamento.\nMas não vou me contentar com o presente, continuarei me esforçando. Treinador."
