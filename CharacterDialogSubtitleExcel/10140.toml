[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10140-CVGroup_UITitle_Idle1-1 = "Blue Archive." 
10140-CVGroup_CharacterGet_Idle1-1 = "Academia Especial SRT, a batedora e\nescudo do Esquadrão FOX, Takakura Kurumi.\nDeixa a sua escolta e o seu corpo\nnas minhas mãos. Vou te proteger\ncom tudo que eu tenho.\nÉ isso aí, então vê se não me atrapalha." 
10140-CVGroup_Cafe_Idle1-1 = "（A-Ah... aquele chaveirinho pendurado\nna arma é tão fofinho...\nem qual beco será que vende um daquele?）" 
10140-CVGroup_Cafe_Idle2-1 = "（Será que... eu sou a que tem\no corpo mais maduro e adulto daqui...?）" 
10140-CVGroup_Cafe_Idle3-1 = "Os vidros dessa janela são tão limpos...\niguaizinhos à blindagem do meu escudo." 
10140-CVGroup_Cafe_Idle4-1 = "Ugh, meus músculos tão doendo...\nAcho que peguei pesado demais\nno treino de quadril hoje..." 
10140-CVGroup_Cafe_Idle5-1 = "Postura firme... estufa bem o peito...\neu sou uma veterana de elite!" 
10140-CVGroup_WeaponGet_Idle1-1 = "Submetralhadora de Combate FOX-45,\nrecebida e engatilhada.\nEu até prefiro quando os canos cospem\numa cadência de fogo mais letal, sabe...\nMas puxar o gatilho dessa réplica me lembra\nmuito as partidas táticas de Airsoft,\ncom o tranco macio de uma UMP45 nas mãos...\nMas beleza. O meu papel é ser o Escudo\ne Ponto de Vanguarda. A meta é blindar\no seu corpo, não rasgar a linha de frente." 
10140-CVGroup_UIEventLobby_Enter1-1 = "«Operação Rastreio das Lores Ocultas»……\nFinalmente chegou a hora." 
10140-CVGroup_UIEventLobby_Enter2-1 = "Vou esmagar com força letal total――\nNão vou deixar que sujem a placa\nda SRT de lama de novo!" 
10140-CVGroup_UIEventLobby_Idle1-1 = "Antes que a contagem de\ncorpos orgânicos suba..." 
10140-CVGroup_UIEventLobby_Idle1-2 = "Acelera a marcha, Sensei.\nNão me atrasa!" 
10140-CVGroup_UIEventLobby_Idle2-1 = "Devorar Inarizushi no meio do\ntiroteio tático... é um tesão absurdo." 
10140-CVGroup_UIEventLobby_Idle2-2 = "E-Ei, não me olha assim!\nMesmo sem o sushi de suborno,\neu ainda massacro o alvo, ouviu bem?!" 
10140-CVGroup_UIEventLobby_Idle3-1 = "Seja assombração ou demônio orgânico...\nEu vou socar a baioneta na fuça\ne quebrar no meio!" 
10140-CVGroup_UIEventLobby_Idle4-1 = "HIIIE?! Por que diabos sua mão tá apalpando\na minha barriga do nada?!\nTira a mão daí, sádico!!" 
10140-CVGroup_ClueSearch_Login_1-1 = "Maldição...\no que eu faço com isso?" 
10140-CVGroup_ClueSearch_Login_1-2 = "Opa, Sensei! O seu radar apitou\nna hora perfeita pra mim!" 
10140-CVGroup_ClueSearch_Login_1-3 = "Tô empilhando o lixo de pistas que a gente\npeneirou nas vielas. Empresta o seu\ncérebro pra cruzar os dados comigo?" 
10140-CVGroup_ClueSearch_Login_2-1 = "Demorou, Comandante.\nBota a cabeça pra fritar, hora\nde engatilhar a dedução letal!" 
10140-CVGroup_ClueSearch_1-1 = "Cruzando os laudos orgânicos atuais...\na tese dita que..." 
10140-CVGroup_ClueSearch_2-1 = "EI! TIRA OS DEDOS DAÍ!\nEu já alinhei a porra das provas!\nVai bagunçar o tabuleiro, inútil!" 
10140-CVGroup_ClueSearch_Find_1-1 = "Esse dossiê sujo... O meu HD bate que eu\njá escaneei isso em algum lugar..." 
10140-CVGroup_ClueSearch_Registration_1-1 = "Caralho, genial! A sua dedução atômica\ncravou no alvo perfeito!" 
10140-CVGroup_ClueSearch_Completion_1-1 = "Xeque-mate!\nA autópsia tá cravada e comprovada!" 