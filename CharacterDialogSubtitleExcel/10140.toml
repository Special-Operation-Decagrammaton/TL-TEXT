[translation]
10140-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10140-CVGroup_CharacterGet_Idle1-1 = "Academia Especial SRT, a batedora e escudo do Esquadrão FOX, Takakura Kurumi.\nDeixa a sua escolta e o seu corpo nas minhas mãos. Vou te proteger com tudo que eu tenho.\nÉ isso aí, então vê se não me atrapalha."
10140-CVGroup_Cafe_Idle1-1 = "（A-Ah... aquele chaveirinho pendurado na arma é tão fofinho... em qual beco será que vende um daquele?）"
10140-CVGroup_Cafe_Idle2-1 = "（Será que... eu sou a que tem o corpo mais maduro e adulto daqui...?）"
10140-CVGroup_Cafe_Idle3-1 = "Os vidros dessa janela são tão limpos... iguaizinhos à blindagem do meu escudo."
10140-CVGroup_Cafe_Idle4-1 = "Ugh, meus músculos tão doendo...\nAcho que peguei pesado demais no treino de quadril hoje..."
10140-CVGroup_Cafe_Idle5-1 = "Postura firme... estufa bem o peito... eu sou uma veterana de elite!"
10140-CVGroup_WeaponGet_Idle1-1 = "Submetralhadora de Combate FOX-45, recebida e engatilhada.\nEu até prefiro quando os canos cospem uma cadência de fogo mais letal, sabe...\nMas puxar o gatilho dessa réplica me lembra muito as partidas táticas de Airsoft, com o tranco macio de uma UMP45 nas mãos...\nMas beleza. O meu papel é ser o Escudo e Ponto de Vanguarda. A meta é blindar o seu corpo, não rasgar a linha de frente."
10140-CVGroup_UIEventLobby_Enter1-1 = "«Operação Rastreio das Lores Ocultas»…… Finalmente chegou a hora."
10140-CVGroup_UIEventLobby_Enter2-1 = "Vou esmagar com força letal total―― Não vou deixar que sujem a placa da SRT de lama de novo!"
10140-CVGroup_UIEventLobby_Idle1-1 = "Antes que a contagem de corpos orgânicos suba..."
10140-CVGroup_UIEventLobby_Idle1-2 = "Acelera a marcha, Sensei. Não me atrasa!"
10140-CVGroup_UIEventLobby_Idle2-1 = "Devorar Inarizushi no meio do tiroteio tático... é um tesão absurdo."
10140-CVGroup_UIEventLobby_Idle2-2 = "E-Ei, não me olha assim! Mesmo sem o sushi de suborno, eu ainda massacro o alvo, ouviu bem?!"
10140-CVGroup_UIEventLobby_Idle3-1 = "Seja assombração ou demônio orgânico... Eu vou socar a baioneta na fuça e quebrar no meio!"
10140-CVGroup_UIEventLobby_Idle4-1 = "HIIIE?! Por que diabos sua mão tá apalpando a minha barriga do nada?! Tira a mão daí, sádico!!"
10140-CVGroup_ClueSearch_Login_1-1 = "Maldição... o que eu faço com isso?"
10140-CVGroup_ClueSearch_Login_1-2 = "Opa, Sensei! O seu radar apitou na hora perfeita pra mim!"
10140-CVGroup_ClueSearch_Login_1-3 = "Tô empilhando o lixo de pistas que a gente peneirou nas vielas. Empresta o seu cérebro pra cruzar os dados comigo?"
10140-CVGroup_ClueSearch_Login_2-1 = "Demorou, Comandante.\nBota a cabeça pra fritar, hora de engatilhar a dedução letal!"
10140-CVGroup_ClueSearch_1-1 = "Cruzando os laudos orgânicos atuais... a tese dita que..."
10140-CVGroup_ClueSearch_2-1 = "EI! TIRA OS DEDOS DAÍ!\nEu já alinhei a porra das provas! Vai bagunçar o tabuleiro, inútil!"
10140-CVGroup_ClueSearch_Find_1-1 = "Esse dossiê sujo... O meu HD bate que eu já escaneei isso em algum lugar..."
10140-CVGroup_ClueSearch_Registration_1-1 = "Caralho, genial! A sua dedução atômica cravou no alvo perfeito!"
10140-CVGroup_ClueSearch_Completion_1-1 = "Xeque-mate! A autópsia tá cravada e comprovada!"