[translation]
10140-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10140-CVGroup_CharacterGet_Idle1-1 = "I'm Takakura Kurumi, point man for the FOX Platoon of SRT Special Academy.\nLeave your protection to me, Sensei. I'll guard you with everything I've got.\nThat's the deal, so I'm counting on you."
10140-CVGroup_Cafe_Idle1-1 = "(Oh, that gun decoration is so cute... I wonder where they sell those?)"
10140-CVGroup_Cafe_Idle2-1 = "(Wait... do I look the most mature out of everyone...?)"
10140-CVGroup_Cafe_Idle3-1 = "The windows here are so clean... they're almost like my shield."
10140-CVGroup_Cafe_Idle4-1 = "Ugh, my muscles are so sore...\nDid I overdo it at training...?"
10140-CVGroup_Cafe_Idle5-1 = "Stand tall... chest out... I am a veteran!"
10140-CVGroup_WeaponGet_Idle1-1 = "I've received the FOX-45 submachine gun.\nI would've preferred a bit more firepower, but...\nOh well. My role is the platoon's point man.\nIt's about defense, not destruction."
10140-CVGroup_UIEventLobby_Enter1-1 = "Operation Roar Pursuit... it's finally time."
10140-CVGroup_UIEventLobby_Enter2-1 = "I'm going all out—I won't let anyone tarnish the name of SRT!"
10140-CVGroup_UIEventLobby_Idle1-1 = "Before the damage spreads..."
10140-CVGroup_UIEventLobby_Idle1-2 = "We need to hurry, Sensei."
10140-CVGroup_UIEventLobby_Idle2-1 = "Inari sushi during an operation... it's the best."
10140-CVGroup_UIEventLobby_Idle2-2 = "I-I mean, of course I'll still do my job properly even without it!"
10140-CVGroup_UIEventLobby_Idle3-1 = "Ghost or not, I won't let you do as you please!"
10140-CVGroup_UIEventLobby_Idle4-1 = "Hey! Don't just go poking my stomach like that!?"
10140-CVGroup_ClueSearch_Login_1-1 = "What should I do..."
10140-CVGroup_ClueSearch_Login_1-2 = "Oh, Sensei! You've come at the perfect time!"
10140-CVGroup_ClueSearch_Login_1-3 = "I'm organizing the clues we've gathered, could you give me a hand?"
10140-CVGroup_ClueSearch_Login_2-1 = "You're here, Sensei.\nLet's start the investigation!"
10140-CVGroup_ClueSearch_1-1 = "Based on the current information..."
10140-CVGroup_ClueSearch_2-1 = "Hey! Don't touch that!\nI'm trying to organize them properly!"
10140-CVGroup_ClueSearch_Find_1-1 = "I feel like I've seen this document somewhere before..."
10140-CVGroup_ClueSearch_Registration_1-1 = "That's amazing! Your deduction was perfect!"
10140-CVGroup_ClueSearch_Completion_1-1 = "Alright! Case closed!"