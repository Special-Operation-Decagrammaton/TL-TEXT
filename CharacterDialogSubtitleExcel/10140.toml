[translation]
10140-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10140-CVGroup_CharacterGet_Idle1-1 = "Я Такакура Куруми, штурмовик отряда FOX Особой академии SRT.\nПоложись на мою защиту, Сенсей. Я буду оберегать тебя изо всех сил.\nМы договорились, так что я на тебя рассчитываю."
10140-CVGroup_Cafe_Idle1-1 = "(Ой, это украшение на пушку такое милое... Интересно, где такие продаются?)"
10140-CVGroup_Cafe_Idle2-1 = "(Погодите... неужели я выгляжу взрослее всех остальных?..)"
10140-CVGroup_Cafe_Idle3-1 = "Окна здесь такие чистые... прямо как мой щит."
10140-CVGroup_Cafe_Idle4-1 = "Угх, мышцы так затекли...\nНеужели я переборщила на тренировке?.."
10140-CVGroup_Cafe_Idle5-1 = "Спину прямо... грудь вперёд... Я ветеран!"
10140-CVGroup_WeaponGet_Idle1-1 = "Пистолет-пулемёт FOX-45 получен.\nЯ бы, конечно, предпочла пушку помощнее, но...\nНу да ладно. Моя роль в отряде — идти в авангарде.\nСуть в защите, а не в разрушении."
10140-CVGroup_UIEventLobby_Enter1-1 = "Операция по преследованию Роа... наконец-то это время пришло."
10140-CVGroup_UIEventLobby_Enter2-1 = "Я выложусь на полную — я никому не позволю запятнать имя SRT!"
10140-CVGroup_UIEventLobby_Idle1-1 = "Пока ущерб не распространился дальше..."
10140-CVGroup_UIEventLobby_Idle1-2 = "Нам нужно поторопиться, Сенсей."
10140-CVGroup_UIEventLobby_Idle2-1 = "Инари-суши во время операции — это лучшее, что можно придумать."
10140-CVGroup_UIEventLobby_Idle2-2 = "Я-я имела в виду, что, конечно же, я буду выполнять свою работу как надо и без них!"
10140-CVGroup_UIEventLobby_Idle3-1 = "Призрак или нет, я не позволю тебе творить всё, что вздумается!"
10140-CVGroup_UIEventLobby_Idle4-1 = "Эй! Не надо вот так просто тыкать меня в живот?!"
10140-CVGroup_ClueSearch_Login_1-1 = "Что же мне делать..."
10140-CVGroup_ClueSearch_Login_1-2 = "О, Сенсей! Ты пришёл как раз вовремя!"
10140-CVGroup_ClueSearch_Login_1-3 = "Я тут разбираю собранные улики, не поможешь мне немного?"
10140-CVGroup_ClueSearch_Login_2-1 = "Ты здесь, Сенсей.\nДавай начнём расследование!"
10140-CVGroup_ClueSearch_1-1 = "Исходя из текущей информации..."
10140-CVGroup_ClueSearch_2-1 = "Эй! Не трогай это!\\nЯ пытаюсь разложить всё\\nкак следует!"
10140-CVGroup_ClueSearch_Find_1-1 = "У меня такое чувство, будто я уже видела этот документ где-то раньше..."
10140-CVGroup_ClueSearch_Registration_1-1 = "Потрясающе! Твоя дедукция была безупречной!"
10140-CVGroup_ClueSearch_Completion_1-1 = "Отлично! Дело закрыто!"
