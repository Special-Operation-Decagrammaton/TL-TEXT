[translation]
10140-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10140-CVGroup_CharacterGet_Idle1-1 = "Sou a Kurumi Takakura, a ponta de lança do FOX Squad da Academia SRT.\nDeixe a escolta do Sensei comigo. Vou protegê-lo com tudo o que tenho.\nÉ isso, conto com você."
10140-CVGroup_Cafe_Idle1-1 = "（Ah, aquela decoração de arma é tão fofa... Onde será que vendem?）"
10140-CVGroup_Cafe_Idle2-1 = "（Será que... eu sou a que parece mais madura aqui...?）"
10140-CVGroup_Cafe_Idle3-1 = "Esta janela é tão bonita... parece o meu escudo."
10140-CVGroup_Cafe_Idle4-1 = "Ugh, que dor muscular...\nSerá que exagerei no treinamento...?"
10140-CVGroup_Cafe_Idle5-1 = "Com confiança... de cabeça erguida... eu sou uma veterana!"
10140-CVGroup_WeaponGet_Idle1-1 = "Recebi a submetralhadora FOX-45.\nEu preferiria um pouco mais de poder de fogo, mas...\nBem, tudo bem. Meu papel é ser a ponta de lança do esquadrão.\nMeu foco é a defesa, não a destruição."
10140-CVGroup_UIEventLobby_Enter1-1 = "A \"Operação de Perseguição ao Roa\"... finalmente começou."
10140-CVGroup_UIEventLobby_Enter2-1 = "Vou dar o meu melhor — não posso manchar o nome da SRT!"
10140-CVGroup_UIEventLobby_Idle1-1 = "Antes que os danos aumentem..."
10140-CVGroup_UIEventLobby_Idle1-2 = "Vamos nos apressar, Sensei."
10140-CVGroup_UIEventLobby_Idle2-1 = "Comer Inari Sushi durante a operação... é o melhor."
10140-CVGroup_UIEventLobby_Idle2-2 = "E-eu, é claro, farei a operação direitinho mesmo sem isso!"
10140-CVGroup_UIEventLobby_Idle3-1 = "Seja um fantasma ou o que for, não vou deixar que façam o que quiserem!"
10140-CVGroup_UIEventLobby_Idle4-1 = "Ei! Não toque na barriga dos outros de repente!?"
10140-CVGroup_ClueSearch_Login_1-1 = "O que eu faço..."
10140-CVGroup_ClueSearch_Login_1-2 = "Ah, Sensei! Que bom que você chegou!"
10140-CVGroup_ClueSearch_Login_1-3 = "Estou organizando as pistas que coletamos, pode me dar uma mão?"
10140-CVGroup_ClueSearch_Login_2-1 = "Você chegou, Sensei.\nVamos começar a dedução!"
10140-CVGroup_ClueSearch_1-1 = "Com as informações atuais, o que podemos concluir é..."
10140-CVGroup_ClueSearch_2-1 = "Ah! Não toque nisso!\nEstou organizando tudo certinho!"
10140-CVGroup_ClueSearch_Find_1-1 = "Eu sinto que já vi esse documento em algum lugar..."
10140-CVGroup_ClueSearch_Registration_1-1 = "Incrível! Foi uma dedução perfeita!"
10140-CVGroup_ClueSearch_Completion_1-1 = "Isso! Prova concluída!"
