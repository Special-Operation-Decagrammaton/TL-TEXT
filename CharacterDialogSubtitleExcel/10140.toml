[translation]
10140-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10140-CVGroup_CharacterGet_Idle1-1 = "SRT特殊学園、FOX小隊のポイントマン、高倉クルミよ。\n先生の護衛は私に任せて。全力で守るわ。\nそういうことだから、よろしくね。"
10140-CVGroup_Cafe_Idle1-1 = "（あ、あの銃のデコレーション可愛い……どこで売ってるんだろ？）"
10140-CVGroup_Cafe_Idle2-1 = "（なんか……私が一番大人っぽく見えたり……？）"
10140-CVGroup_Cafe_Idle3-1 = "ここの窓って綺麗ね……まるで私の盾みたい。"
10140-CVGroup_Cafe_Idle4-1 = "うう、筋肉痛……。\n訓練やりすぎちゃったかな……。"
10140-CVGroup_Cafe_Idle5-1 = "堂々と……胸を張って……私はベテラン！"
10140-CVGroup_WeaponGet_Idle1-1 = "FOX-45式サブマシンガン、受け取ったわ。\nもうちょっと火力が高い方が嬉しいけど……。\nまあいっか。私の役割は小隊のポイントマン。\n守りであって、撃破じゃないし。"
10140-CVGroup_UIEventLobby_Enter1-1 = "「ロア追跡作戦」……いよいよね。"
10140-CVGroup_UIEventLobby_Enter2-1 = "全力で行くわ――SRTの名に泥を塗れないもの！"
10140-CVGroup_UIEventLobby_Idle1-1 = "被害が増える前に……。"
10140-CVGroup_UIEventLobby_Idle1-2 = "急ぐわよ、先生。"
10140-CVGroup_UIEventLobby_Idle2-1 = "作戦中に食べるいなり寿司……最高。"
10140-CVGroup_UIEventLobby_Idle2-2 = "も、もちろん、それがなくても作戦はちゃんとやるわよ！"
10140-CVGroup_UIEventLobby_Idle3-1 = "お化けだろうがなんだろうが、好きにはさせないわ！"
10140-CVGroup_UIEventLobby_Idle4-1 = "ちょっと！急に人のお腹触らないでよ！？"
10140-CVGroup_ClueSearch_Login_1-1 = "どうしよう……。"
10140-CVGroup_ClueSearch_Login_1-2 = "あ、先生！いいところに来たじゃない！"
10140-CVGroup_ClueSearch_Login_1-3 = "集めた手がかりをまとめてるんだけど、ちょっと手伝ってくれない？"
10140-CVGroup_ClueSearch_Login_2-1 = "来たわね、先生。\n推理をはじめていくわよ！"
10140-CVGroup_ClueSearch_1-1 = "今の情報で分かることは……。"
10140-CVGroup_ClueSearch_2-1 = "あっ！触らないでよ！\nちゃんと並び替えてるんだから！"
10140-CVGroup_ClueSearch_Find_1-1 = "この資料、どこかで見たことあるような……。"
10140-CVGroup_ClueSearch_Registration_1-1 = "すごいじゃない！完璧な推理だったわ！"
10140-CVGroup_ClueSearch_Completion_1-1 = "よし！証明完了よ！"
