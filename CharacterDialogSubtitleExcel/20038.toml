[translation]
20038-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20038-CVGroup_CharacterGet_Idle1-1 = "Bem-vindo a Red Winter... ou melhor, a Shanhaijing. Para não manchar a dignidade do meu bigode, farei o possível para ajudá-lo com toda a minha sinceridade."
20038-CVGroup_Cafe_Idle1-1 = "Ufa... que bom que aqui é fresco."
20038-CVGroup_Cafe_Idle2-1 = "(Chá sem geleia...? Que jeito peculiar de beber...)"
20038-CVGroup_Cafe_Idle3-1 = "Vou usar este design como referência para os produtos da Cherino-chan."
20038-CVGroup_Cafe_Idle4-1 = "Será por causa da roupa leve? Ficou mais fácil de me mover."
20038-CVGroup_Cafe_Idle5-1 = "A partir de agora, trarei as últimas notícias da grande Presidente Cherino!"
20038-CVGroup_WeaponGet_Idle1-1 = "Dizem que as palavras são mais poderosas que as armas, mas... bem, as armas convencem muito mais rápido."
20038-CVGroup_UIEventLobby_Enter1-1 = "O grande encontro de intercâmbio é a primeira tentativa da Secretaria de Red Winter."
20038-CVGroup_UIEventLobby_Enter1-2 = "Eu também estou muito animada."
20038-CVGroup_UIEventLobby_Enter2-1 = "Sensei, você já viu a Cherino-chan vestida de qipao?"
20038-CVGroup_UIEventLobby_Enter2-2 = "Fufu, não acha que ela está muito fofa?"
20038-CVGroup_UIEventLobby_Enter2-3 = "Ah... você acha que combina comigo também?"
20038-CVGroup_UIEventLobby_Enter2-4 = "...Muito obrigada."
20038-CVGroup_UIEventLobby_Enter3-1 = "(A soberana negra de Shanhaijing... ela era muito mais forte do que eu imaginava.)"
20038-CVGroup_UIEventLobby_Enter3-2 = "(...Então ela não é apenas fofa. Fufu.)"
20038-CVGroup_UIEventLobby_Enter4-1 = "Eu achava que já estava acostumada com confusões, mas..."
20038-CVGroup_UIEventLobby_Enter4-2 = "Ao ver as coisas de outra escola de perto..."
20038-CVGroup_UIEventLobby_Enter4-3 = "Sinto uma sensação estranha."
20038-CVGroup_UIEventLobby_Enter5-1 = "O encontro de intercâmbio foi muito divertido."
20038-CVGroup_UIEventLobby_Enter5-2 = "Da próxima vez, preciso convidar a Mestra do Portão para a nossa Red Winter, fufu."
20038-CVGroup_UIEventLobby_Idle1-1 = "O parque de Shanhaijing é amplo e bonito."
20038-CVGroup_UIEventLobby_Idle1-2 = "É perfeito para um discurso de rua."
20038-CVGroup_UIEventLobby_Idle1-3 = "Falar sobre a grandeza da Presidente Cherino aqui..."
20038-CVGroup_UIEventLobby_Idle1-4 = "Acabaria virando um problema diplomático, não é..."
20038-CVGroup_UIEventLobby_Idle2-1 = "O que muda, o que permanece igual."
20038-CVGroup_UIEventLobby_Idle2-2 = "...É difícil escolher."
20038-CVGroup_UIEventLobby_Idle2-3 = "...Embora a Academia Federal de Red Winter só mude cada vez mais."
20038-CVGroup_UIEventLobby_Idle3-1 = "Recebi da Presidente Lumi um chá com propriedades relaxantes para dormir."
20038-CVGroup_UIEventLobby_Idle3-2 = "Pretendo preparar um chá com leite para a Cherino-chan esta noite."
20038-CVGroup_UIEventLobby_Idle4-1 = "Dizem que o clube de 'Pesquisa de Alquimia' estuda um elixir da juventude."
20038-CVGroup_UIEventLobby_Idle4-2 = "Isso... preciso registrar."
20038-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Para comemorar o encontro de intercâmbio, estamos realizando um evento de troca de cupons!"
20038-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Se você tiver bonecos da Mestra do Portão, eu os trocarei por prêmios!"
20038-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Ainda estamos aceitando a troca de bonecos."
20038-CVGroup_UIEventBoxGachaShop_Enter3-2 = "Por favor, aproveite para não esquecer de trocar."
20038-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Fui eu quem desenhei este boneco."
20038-CVGroup_UIEventBoxGachaShop_Idle1-2 = "A experiência que ganhei fazendo bonecos da Presidente Cherino foi muito útil."
20038-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Eu os fiz para serem cupons de troca, mas..."
20038-CVGroup_UIEventBoxGachaShop_Idle2-2 = "Muitas alunas querem guardá-los, então está difícil recolhê-los."
20038-CVGroup_UIEventBoxGachaShop_Idle2-3 = "...Será que há algo de errado com os prêmios?"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Parabéns, você ganhou!"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Você ganhou! O Sensei tem muita sorte."
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Isso é... o primeiro prêmio! Como esperado do Sensei!"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Ora, tantos assim..."
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "Vou trazer os prêmios. Por favor, aguarde um momento."
20038-CVGroup_UIEventMission_Enter1-1 = "Olá, Sensei. Organizei o cronograma do encontro de intercâmbio."
20038-CVGroup_UIEventMission_Enter2-1 = "Como as alunas de ambas as escolas se reuniram, há uma montanha de trabalho para processar."
20038-CVGroup_UIEventMission_Idle1-1 = "Aconteceu alguma coisa?"
20038-CVGroup_UIEventMission_Idle2-1 = "Nada disso. Agora você precisa se concentrar no trabalho."
20038-CVGroup_UIEventMission_Buy1-1 = "Excelente trabalho.\nSe estivéssemos em Red Winter, eu lhe daria uma medalha..."
20038-CVGroup_UIEventMission_Buy2-1 = "Obrigada por sua cooperação."
20038-CVGroup_UIEventMission_Interaction1-1 = "O cronograma de hoje termina aqui.\nBom trabalho."
