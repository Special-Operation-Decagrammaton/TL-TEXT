[translation]
20038-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20038-CVGroup_CharacterGet_Idle1-1 = "レッドウィンター……いや、山海経へようこそ。\n髭の威厳に恥じぬよう、\n誠心誠意、お力添えいたしますね。"
20038-CVGroup_Cafe_Idle1-1 = "ふぅ……ここは涼しくて助かりました。"
20038-CVGroup_Cafe_Idle2-1 = "（ジャムなしで紅茶を……？変わった飲み方ですね……）"
20038-CVGroup_Cafe_Idle3-1 = "このデザイン、チェリノちゃんグッズの参考にいたします。"
20038-CVGroup_Cafe_Idle4-1 = "軽装だからでしょうか？\n動きが楽になりました。"
20038-CVGroup_Cafe_Idle5-1 = "これより、偉大なるチェリノ様の\n最新情報をお届けします！"
20038-CVGroup_WeaponGet_Idle1-1 = "言葉は銃より優れる、と言いますが……\n……銃のほうが説得は早いですから。"
20038-CVGroup_UIEventLobby_Enter1-1 = "大規模交流会は、レッドウィンター事務局としても初の試みです。"
20038-CVGroup_UIEventLobby_Enter1-2 = "私もとっても楽しみです。"
20038-CVGroup_UIEventLobby_Enter2-1 = "先生、チーパオ姿のチェリノちゃんにはもう会いました？"
20038-CVGroup_UIEventLobby_Enter2-2 = "ふふっ、とっても可愛いと思いませんか？"
20038-CVGroup_UIEventLobby_Enter2-3 = "あ……私も似合ってる、ですか？"
20038-CVGroup_UIEventLobby_Enter2-4 = "……それは、ありがとうございます。"
20038-CVGroup_UIEventLobby_Enter3-1 = "（山海経の黒い君主……想像よりもずっと強いお方でした）"
20038-CVGroup_UIEventLobby_Enter3-2 = "（……可愛いだけではないのですね。ふふっ）"
20038-CVGroup_UIEventLobby_Enter4-1 = "騒動には慣れていたつもりでしたが……"
20038-CVGroup_UIEventLobby_Enter4-2 = "他校のものを目の当たりにすると……"
20038-CVGroup_UIEventLobby_Enter4-3 = "なんだか不思議な気分です。"
20038-CVGroup_UIEventLobby_Enter5-1 = "交流会、とっても楽しかったです。"
20038-CVGroup_UIEventLobby_Enter5-2 = "今度は門主様を\n我がレッドウィンターに招待しなくては、ふふ。"
20038-CVGroup_UIEventLobby_Idle1-1 = "山海経の公園は広くてきれいですね。"
20038-CVGroup_UIEventLobby_Idle1-2 = "街頭演説にぴったりです。"
20038-CVGroup_UIEventLobby_Idle1-3 = "ここでチェリノ会長の偉大さを語るのは……"
20038-CVGroup_UIEventLobby_Idle1-4 = "外交問題になってしまいますよね……。"
20038-CVGroup_UIEventLobby_Idle2-1 = "変わるもの、変わらぬもの。"
20038-CVGroup_UIEventLobby_Idle2-2 = "……選ぶのは難しいですね。"
20038-CVGroup_UIEventLobby_Idle2-3 = "……レッドウィンター連邦学園は変わっていくばかりではありますが。"
20038-CVGroup_UIEventLobby_Idle3-1 = "先ほどルミ会長から、安眠効果のある茶葉をいただきました。"
20038-CVGroup_UIEventLobby_Idle3-2 = "今晩はこちらで、チェリノちゃんに\nミルクティーを淹れようと思っているんです。"
20038-CVGroup_UIEventLobby_Idle4-1 = "「錬丹術研究会」という部活では、\n若返りの薬を研究しているそうです。"
20038-CVGroup_UIEventLobby_Idle4-2 = "これは……記録しておかないとですね。"
20038-CVGroup_UIEventBoxGachaShop_Enter1-1 = "交流会を記念して、\n交換券イベントを行っております！"
20038-CVGroup_UIEventBoxGachaShop_Enter2-1 = "門主様の人形をお持ちでしたら、\n景品と交換させていただきます！"
20038-CVGroup_UIEventBoxGachaShop_Enter3-1 = "まだ人形の交換は承っておりますよ。"
20038-CVGroup_UIEventBoxGachaShop_Enter3-2 = "交換忘れのないよう、ご利用ください。"
20038-CVGroup_UIEventBoxGachaShop_Idle1-1 = "この人形、私がデザインしたのですよ。"
20038-CVGroup_UIEventBoxGachaShop_Idle1-2 = "チェリノ会長の人形を作っていた日頃の経験が\n役立ってよかったです。"
20038-CVGroup_UIEventBoxGachaShop_Idle2-1 = "交換券として作ったものですが……"
20038-CVGroup_UIEventBoxGachaShop_Idle2-2 = "どうしたものか手元に残したいという生徒が多くて、なかなか回収できません。"
20038-CVGroup_UIEventBoxGachaShop_Idle2-3 = "……景品に何か問題でもあったのでしょうか？"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "おめでとうございます、当たりです！"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "当たりです！\n先生は運がいいのですね。"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "これは……1等ですね！\n流石先生です！"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "あら、こんなにたくさん……"
20038-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "景品をお持ちしますね。\n少々お待ちください。"
20038-CVGroup_UIEventMission_Enter1-1 = "こんにちは、先生。\n交流会のスケジュールをまとめておきました。"
20038-CVGroup_UIEventMission_Enter2-1 = "両校の生徒が集結しておりますので\n処理すべきお仕事が山積みです。"
20038-CVGroup_UIEventMission_Idle1-1 = "どうかされましたか？"
20038-CVGroup_UIEventMission_Idle2-1 = "めっ、ですよ。\n今はお仕事に集中していただかないと。"
20038-CVGroup_UIEventMission_Buy1-1 = "お見事です。\nここがレッドウィンターでしたら勲章を差し上げたのに……。"
20038-CVGroup_UIEventMission_Buy2-1 = "ご協力くださり、ありがとうございます。"
20038-CVGroup_UIEventMission_Interaction1-1 = "本日の予定はこれにて終了です。\nお疲れ様でした。"
