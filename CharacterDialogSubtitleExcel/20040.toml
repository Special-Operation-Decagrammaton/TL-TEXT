[translation]
20040-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ～"
20040-CVGroup_CharacterGet_Idle1-1 = "待たせたわね、先生。\n万魔殿の情報部長、京極サツキよ。\nふふっ、よろしく。"
20040-CVGroup_Cafe_Idle1-1 = "シャーレの情報収集といきましょう。"
20040-CVGroup_Cafe_Idle2-1 = "ふ～ん？\nいい感じじゃない。"
20040-CVGroup_Cafe_Idle3-1 = "ここにあの子たちを潜入させて……"
20040-CVGroup_Cafe_Idle4-1 = "うち以外の尋問技術、気になるわね……。"
20040-CVGroup_Cafe_Idle5-1 = "催眠術の練習台……\n誰かなってくれないかしら？"
20040-CVGroup_WeaponGet_Idle1-1 = "あら、用意がいいじゃない。\nふふ、助かるわ先生。"
20040-CVGroup_UIEventLobby_Enter1-1 = "いらっしゃい、先生。\n好きなだけ見ていって頂戴。"
20040-CVGroup_UIEventLobby_Enter2-1 = "私たち万魔殿が手掛けたパーティーだもの。"
20040-CVGroup_UIEventLobby_Enter2-2 = "先生も気に入るに決まってるわ。"
20040-CVGroup_UIEventLobby_Enter3-1 = "あら、進捗が芳しくないようね。"
20040-CVGroup_UIEventLobby_Enter3-2 = "まあ、マコトちゃんがなんとかするんじゃない？"
20040-CVGroup_UIEventLobby_Enter4-1 = "ここで先生の手を借りることになるなんてね。"
20040-CVGroup_UIEventLobby_Enter4-2 = "ふふっ、頼んだわよ、先生？"
20040-CVGroup_UIEventLobby_Enter5-1 = "パーティーはこれで終わり。"
20040-CVGroup_UIEventLobby_Enter5-2 = "ね？私の言ったとおり、なんとかなったでしょう？"
20040-CVGroup_UIEventLobby_Idle1-1 = "ふ～ん、そんなにちょっかいを出して……"
20040-CVGroup_UIEventLobby_Idle1-2 = "何をされたいの？"
20040-CVGroup_UIEventLobby_Idle2-1 = "先生は、なにをご所望かしら？"
20040-CVGroup_UIEventLobby_Idle3-1 = "ふふっ、先生……私に催眠をかけてみなさい。"
20040-CVGroup_UIEventLobby_Idle3-2 = "もちろん私には効かな……"
20040-CVGroup_UIEventLobby_Idle3-3 = "うん？遠慮しておく？"
20040-CVGroup_UIEventLobby_Idle3-4 = "ふふっ、そんなこと言わずに……ほらほら。"
20040-CVGroup_UIEventLobby_Idle4-1 = "そんな風にぼんやりしていたら、\nマコトちゃんに絡まれてしまうわよ？"
20040-CVGroup_UIEventLobby_Idle4-2 = "ほら、こっちに来なさい。"
