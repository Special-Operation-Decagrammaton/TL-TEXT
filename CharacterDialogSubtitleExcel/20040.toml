[translation]
20040-CVGroup_UITitle_Idle1-1 = "Blue Archive~"
20040-CVGroup_CharacterGet_Idle1-1 = "Fez você esperar, Sensei.\nSou Kyogoku Satsuki, chefe do departamento de inteligência do Pandemonium.\nHehe, prazer em conhecê-lo."
20040-CVGroup_Cafe_Idle1-1 = "Vamos coletar algumas informações para o Schale."
20040-CVGroup_Cafe_Idle2-1 = "Hmm?\nNão parece nada mal."
20040-CVGroup_Cafe_Idle3-1 = "Vou infiltrar aquelas crianças aqui..."
20040-CVGroup_Cafe_Idle4-1 = "Estou curiosa sobre as técnicas de interrogatório de outros lugares..."
20040-CVGroup_Cafe_Idle5-1 = "Alguém gostaria de ser minha cobaia...\npara praticar hipnose?"
20040-CVGroup_WeaponGet_Idle1-1 = "Ora, que preparado você é.\nHehe, isso ajuda muito, Sensei."
20040-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo, Sensei.\nFique à vontade para olhar o quanto quiser."
20040-CVGroup_UIEventLobby_Enter2-1 = "É uma festa organizada por nós do Pandemonium, afinal."
20040-CVGroup_UIEventLobby_Enter2-2 = "Tenho certeza de que você vai gostar, Sensei."
20040-CVGroup_UIEventLobby_Enter3-1 = "Ora, parece que o progresso não está muito bom."
20040-CVGroup_UIEventLobby_Enter3-2 = "Bem, a Makoto-chan deve dar um jeito nisso, não acha?"
20040-CVGroup_UIEventLobby_Enter4-1 = "Quem diria que precisaríamos da sua ajuda aqui, Sensei."
20040-CVGroup_UIEventLobby_Enter4-2 = "Hehe, conto com você, está bem?"
20040-CVGroup_UIEventLobby_Enter5-1 = "A festa termina aqui."
20040-CVGroup_UIEventLobby_Enter5-2 = "Viu? Como eu disse, deu tudo certo, não deu?"
20040-CVGroup_UIEventLobby_Idle1-1 = "Hmm, você está me provocando tanto assim..."
20040-CVGroup_UIEventLobby_Idle1-2 = "O que você quer que eu faça?"
20040-CVGroup_UIEventLobby_Idle2-1 = "O que você deseja, Sensei?"
20040-CVGroup_UIEventLobby_Idle3-1 = "Hehe, Sensei... tente me hipnotizar."
20040-CVGroup_UIEventLobby_Idle3-2 = "Claro que não vai funcionar em m..."
20040-CVGroup_UIEventLobby_Idle3-3 = "Hm? Vai recusar?"
20040-CVGroup_UIEventLobby_Idle3-4 = "Hehe, não diga isso... vamos, vamos."
20040-CVGroup_UIEventLobby_Idle4-1 = "Se você ficar aí parado desse jeito,\na Makoto-chan vai acabar te incomodando, sabia?"
20040-CVGroup_UIEventLobby_Idle4-2 = "Venha aqui."
