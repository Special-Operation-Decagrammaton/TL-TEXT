[translation]
10027-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10027-CVGroup_CharacterGet_Idle1-1 = "Não importa o traje, o que eu preciso fazer não muda. Cumprir a missão que me foi dada... é só isso."
10027-CVGroup_Cafe_Idle1-1 = "É um lugar bonito, não é ruim."
10027-CVGroup_Cafe_Idle2-1 = "...Sinto que tem alguém me olhando fixamente."
10027-CVGroup_Cafe_Idle3-1 = "Falando nisso, sobre este traje... ainda não ouvi a sua opinião, Sensei..."
10027-CVGroup_Cafe_Idle4-1 = "Hm...? Aquela pessoa ali, não pode ser...?"
10027-CVGroup_Cafe_Idle5-1 = "...Não tenho nada para fazer, mas, de vez em quando, esse tipo de tempo não é ruim."
10027-CVGroup_WeaponGet_Idle1-1 = "Recebendo algo tão bom assim, não posso me dar ao luxo de cometer erros daqui para frente. ...Está tudo bem. Deixe as suas costas comigo, Sensei."
10027-CVGroup_UIEventLobby_Enter1-1 = "Estou pronta. Vamos lá, Sensei."
10027-CVGroup_UIEventLobby_Enter2-1 = "...Já está na hora da operação?"
10027-CVGroup_UIEventLobby_Enter2-2 = "Tudo bem, posso ir a qualquer momento."
10027-CVGroup_UIEventLobby_Idle1-1 = "...Hm, aconteceu alguma coisa? É algo sobre a operação?"
10027-CVGroup_UIEventLobby_Idle2-1 = "Ei, já está na hora de partir... Deixe isso para depois."
10027-CVGroup_UIEventLobby_Idle3-1 = "Me avise quando for partir. Já estou pronta."
10027-CVGroup_UIEventLobby_Idle4-1 = "...Hm? Sensei, você me chamou agora pouco?"
10027-CVGroup_UIEventLobby_Enter3-1 = "Não baixe a guarda. Afinal, o tempo que começou a correr não espera por ninguém."
10027-CVGroup_UIEventLobby_Enter4-1 = "Já estamos começando a ver o fim disso..."
10027-CVGroup_UIEventLobby_Enter4-2 = "Eu estou pronta a qualquer momento, pode deixar comigo."
10027-CVGroup_UIEventLobby_Enter5-1 = "Vamos finalizar isso com precisão até o fim."
10027-CVGroup_UIEventLobby_Enter5-2 = "Sensei, tem algo em que eu possa ajudar?"
10027-CVGroup_UIEventShop_Enter1-1 = "Recompensas da operação, hein..."
10027-CVGroup_UIEventShop_Enter1-2 = "Primeiro, vamos dar uma olhada no conteúdo."
10027-CVGroup_UIEventShop_Enter2-1 = "Preciso pensar na eficiência... Não sou boa com números..."
10027-CVGroup_UIEventShop_Idle1-1 = "Eh, calcular no seu lugar...?"
10027-CVGroup_UIEventShop_Idle1-2 = "S-Sensei, você sabe que eu não sou boa com matemática, não sabe...!?"
10027-CVGroup_UIEventShop_Idle2-1 = "Desculpe, não consigo ajudar com cálculos e coisas do tipo..."
10027-CVGroup_UIEventShop_Buy1-1 = "Ah, acho que é uma boa escolha."
10027-CVGroup_UIEventShop_Buy2-1 = "Você escolheu isso. Sim, acho que é bom."
10027-CVGroup_UIEventShop_Buy3-1 = "Sim, não é ruim."
10027-CVGroup_UIEventShop_Buy4-1 = "Como esperado do Sensei, uma boa decisão."
10027-CVGroup_UIEventShop_Enter3-1 = "Sensei, olhe. Parece que ainda dá tempo."
