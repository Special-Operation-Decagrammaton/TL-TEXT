[translation]
10027-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10027-CVGroup_CharacterGet_Idle1-1 = "どんな衣装だとしても、やることは変わらない。\n与えられたミッションを遂行する……それだけだ。"
10027-CVGroup_Cafe_Idle1-1 = "綺麗な場所だ、悪くない。"
10027-CVGroup_Cafe_Idle2-1 = "……なんだか、すごく視線を感じる。"
10027-CVGroup_Cafe_Idle3-1 = "そういえばこの衣装……\n先生の感想を聞いてないな……"
10027-CVGroup_Cafe_Idle4-1 = "ん……？\nあそこにいるのは、まさか……？"
10027-CVGroup_Cafe_Idle5-1 = "……やることが無いけど、\nたまにはこういう時間も悪くない、か。"
10027-CVGroup_WeaponGet_Idle1-1 = "こんな良いものを貰ったら、\n次からは余計にミスなんて出来ないな。\n……大丈夫。先生の背中は、私に任せて。"
10027-CVGroup_UIEventLobby_Enter1-1 = "準備はできてる。\nさあ行こう、先生。"
10027-CVGroup_UIEventLobby_Enter2-1 = "……そろそろ作戦の時間？"
10027-CVGroup_UIEventLobby_Enter2-2 = "大丈夫、いつでも行ける。"
10027-CVGroup_UIEventLobby_Idle1-1 = "……ん、どうかした？\n何か作戦に関する話？"
10027-CVGroup_UIEventLobby_Idle2-1 = "ほら、そろそろ出発の時間だから……\nそういうのは後で。"
10027-CVGroup_UIEventLobby_Idle3-1 = "出発する時は声をかけて。\nこっちは準備出来てるから。"
10027-CVGroup_UIEventLobby_Idle4-1 = "……ん？\n先生、今私のことを呼んだ？"
10027-CVGroup_UIEventLobby_Enter3-1 = "油断は禁物。\nなにせ、進み始めた時間は待ってくれない。"
10027-CVGroup_UIEventLobby_Enter4-1 = "そろそろ終わりが見えてきたな……。"
10027-CVGroup_UIEventLobby_Enter4-2 = "私の方はいつでも準備できてるから、任せて。"
10027-CVGroup_UIEventLobby_Enter5-1 = "仕上げは最後まで、確実に。"
10027-CVGroup_UIEventLobby_Enter5-2 = "先生、何か手伝えることはある？"
10027-CVGroup_UIEventShop_Enter1-1 = "作戦の報酬か……。"
10027-CVGroup_UIEventShop_Enter1-2 = "まずは中身をざっと確認してみよう。"
10027-CVGroup_UIEventShop_Enter2-1 = "これは、効率を考えないと……\n数字を扱うのは苦手だ……"
10027-CVGroup_UIEventShop_Idle1-1 = "え、代わりに計算……？"
10027-CVGroup_UIEventShop_Idle1-2 = "せ、先生は私が数学苦手なの、\n知ってるだろう……！？"
10027-CVGroup_UIEventShop_Idle2-1 = "ごめん、計算とかはちょっと、\n手助けしてあげられない……。"
10027-CVGroup_UIEventShop_Buy1-1 = "ああ、良い選択だと思う。"
10027-CVGroup_UIEventShop_Buy2-1 = "それを選んだんだ。\nうん、良いと思う。"
10027-CVGroup_UIEventShop_Buy3-1 = "うん、悪くない。"
10027-CVGroup_UIEventShop_Buy4-1 = "流石は先生、良い判断だ。"
10027-CVGroup_UIEventShop_Enter3-1 = "先生、見て。\nどうやらまだ間に合うみたいだ。"
