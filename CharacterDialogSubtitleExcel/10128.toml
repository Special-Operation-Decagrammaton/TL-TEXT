[translation]
10128-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！ですよ～！"
10128-CVGroup_CharacterGet_Idle1-1 = "おや…お目が高いですね、お客様……いえ、先生！\n……申し遅れました。ワイルドハント芸術学院2年、\n若狭フユです。以後、お見知りおきを！"
10128-CVGroup_Cafe_Idle1-1 = "へぇ、打ち合わせ場所に良さそうだね。"
10128-CVGroup_Cafe_Idle2-1 = "スクリーンを設置するならどこがいいかな……。"
10128-CVGroup_Cafe_Idle3-1 = "（ここのコーヒー、中々いい豆を使ってるね……これも仕入れてみようかな？）"
10128-CVGroup_Cafe_Idle4-1 = "ところで……先生は来ないのかな。"
10128-CVGroup_Cafe_Idle5-1 = "（あれは……寮監隊！？どうしよう……逃げる！？）"
10128-CVGroup_WeaponGet_Idle1-1 = "受けた投資にはそれ以上のリターンを。\nそれがビジネスですからね！\nなので……いつか恩返しできるその時まで、そばにいてください、先生。"
10128-CVGroup_UIEventLobby_Enter1-1 = "特殊交易部の営業室長！若狭フユです！"
10128-CVGroup_UIEventLobby_Enter2-1 = "なにか欲しいものがありましたら、お気軽にご相談ください。"
10128-CVGroup_UIEventLobby_Enter3-1 = "ふ、ふふ……いつも通りですね。問題ありません。"
10128-CVGroup_UIEventLobby_Enter4-1 = "（どうして……？どこで間違えちゃったの……？\nもう終わり？そうだよね？やっぱ終わりだよね！？）"
10128-CVGroup_UIEventLobby_Enter5-1 = "ふ……ふふ……この手の依頼、しばらくはやめとこうかな……。"
10128-CVGroup_UIEventLobby_Idle1-1 = "ええ、特殊交易部の窓口担当は私です。"
10128-CVGroup_UIEventLobby_Idle2-1 = "接触し、依頼につなげて、お客様に満足を提供する……。\nそれが、私の役割です。"
10128-CVGroup_UIEventLobby_Idle3-1 = "ミヨとリッちゃんのサポートがなかったら、\n私なんてただの一芸術学院生にすぎませんから。"
10128-CVGroup_UIEventLobby_Idle4-1 = "……芸術って、難しいんですよね。"
10128-CVGroup_UIEventShop_Enter1-1 = "在庫は十分ありますよ。\nどうぞ、心ゆくまで見て行ってください。"
10128-CVGroup_UIEventShop_Enter2-1 = "欲しいものは見つかりましたか？"
10128-CVGroup_UIEventShop_Enter3-1 = "まだしばらくは大丈夫ですよ。\nごゆっくりどうぞ。"
10128-CVGroup_UIEventShop_Idle1-1 = "ここには無いものが欲しい……？\n……お話はあちらで伺いましょうか。"
10128-CVGroup_UIEventShop_Idle2-1 = "ははっ！つっついても、安くなりませんよ？"
10128-CVGroup_UIEventShop_Buy1-1 = "さすが先生。お目が高いですね。"
10128-CVGroup_UIEventShop_Buy2-1 = "それ、私のイチオシなんです。"
10128-CVGroup_UIEventShop_Buy3-1 = "返品交換はできませんので。ご了承ください。"
10128-CVGroup_UIEventShop_Buy4-1 = "ナイスチョイスです。\nこちら、お包みしますか？"
