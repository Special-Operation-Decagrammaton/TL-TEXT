[translation]
10128-CVGroup_UITitle_Idle1-1 = "Blue Archive! É isso aí~!"
10128-CVGroup_CharacterGet_Idle1-1 = "Ora... você tem um bom olho, cliente... não, Sensei!\n...Peço desculpas pela demora. Sou Wakasa Fuyu, do segundo ano da Academia de Artes Wild Hunt. Prazer em conhecê-lo!"
10128-CVGroup_Cafe_Idle1-1 = "Hmm, parece um bom lugar para uma reunião."
10128-CVGroup_Cafe_Idle2-1 = "Onde seria o melhor lugar para instalar uma tela, eu me pergunto..."
10128-CVGroup_Cafe_Idle3-1 = "(O café daqui usa grãos muito bons... será que eu deveria comprar alguns também?)"
10128-CVGroup_Cafe_Idle4-1 = "Aliás... o Sensei não vem?"
10128-CVGroup_Cafe_Idle5-1 = "(Aquilo é... a Equipe de Supervisão do Dormitório!? O que eu faço... fujo!?)"
10128-CVGroup_WeaponGet_Idle1-1 = "Para cada investimento recebido, um retorno ainda maior.\nPorque isso é um negócio!\nEntão... até o dia em que eu possa retribuir o favor, por favor, fique ao meu lado, Sensei."
10128-CVGroup_UIEventLobby_Enter1-1 = "Chefe de Vendas do Departamento de Comércio Especial! Sou Wakasa Fuyu!"
10128-CVGroup_UIEventLobby_Enter2-1 = "Se houver algo que você queira, sinta-se à vontade para consultar."
10128-CVGroup_UIEventLobby_Enter3-1 = "He, hehe... como sempre. Sem problemas."
10128-CVGroup_UIEventLobby_Enter4-1 = "(Por que...? Onde foi que eu errei...?\nJá acabou? É isso, né? É o fim mesmo, né!?)"
10128-CVGroup_UIEventLobby_Enter5-1 = "He... hehe... acho que vou dar um tempo desse tipo de pedido por enquanto..."
10128-CVGroup_UIEventLobby_Idle1-1 = "Sim, a responsável pelo atendimento do Departamento de Comércio Especial sou eu."
10128-CVGroup_UIEventLobby_Idle2-1 = "Fazer contato, conectar com pedidos e oferecer satisfação ao cliente...\nEsse é o meu papel."
10128-CVGroup_UIEventLobby_Idle3-1 = "Se não fosse pelo apoio da Miyo e da Ritchan,\nEu não passaria de uma simples estudante da Academia de Artes."
10128-CVGroup_UIEventLobby_Idle4-1 = "...A arte é algo difícil, não é?"
10128-CVGroup_UIEventShop_Enter1-1 = "Temos estoque suficiente.\nPor favor, fique à vontade para olhar o quanto quiser."
10128-CVGroup_UIEventShop_Enter2-1 = "Encontrou o que estava procurando?"
10128-CVGroup_UIEventShop_Enter3-1 = "Ainda temos bastante tempo.\nFique à vontade."
10128-CVGroup_UIEventShop_Idle1-1 = "Quer algo que não temos aqui...?\n...Vamos conversar sobre isso ali."
10128-CVGroup_UIEventShop_Idle2-1 = "Haha! Mesmo que você cutuque, não vai ficar mais barato, viu?"
10128-CVGroup_UIEventShop_Buy1-1 = "Como esperado do Sensei. Você tem um bom olho."
10128-CVGroup_UIEventShop_Buy2-1 = "Essa é a minha recomendação principal."
10128-CVGroup_UIEventShop_Buy3-1 = "Não aceitamos devoluções ou trocas. Por favor, entenda."
10128-CVGroup_UIEventShop_Buy4-1 = "Bela escolha.\nQuer que eu embrulhe para você?"
