[translation]
10129-CVGroup_UITitle_Idle1-1 = "Blue Ar... chive."
10129-CVGroup_CharacterGet_Idle1-1 = "I-isso também é uma extensão da missão do comitê de segurança... Farei o meu melhor pela segurança da Trinity e do Sensei."
10129-CVGroup_Cafe_Idle1-1 = "Aqui é tão pacífico... É algo muito bom."
10129-CVGroup_Cafe_Idle2-1 = "(Aquela pessoa, será que ela está tentando puxar assunto?)"
10129-CVGroup_Cafe_Idle3-1 = "(P-preciso de algum assunto... Não vem nada... E olha que eu pensei nisso ontem à noite...!)"
10129-CVGroup_Cafe_Idle4-1 = "(Será que eu deveria ter trocado de roupa, afinal...)"
10129-CVGroup_Cafe_Idle5-1 = "Já verifiquei as rotas de evacuação."
10129-CVGroup_WeaponGet_Idle1-1 = "Bem... acho que esse tipo de acessório é fofo, mas... Será que combina comigo?"
10129-CVGroup_UIEventLobby_Enter1-1 = "S-se você ficar me encarando assim, eu fico nervosa..."
10129-CVGroup_UIEventLobby_Enter2-1 = "Estou vestindo isso apenas para fins de investigação."
10129-CVGroup_UIEventLobby_Enter2-2 = "Acho que é um traje fofo, mas..."
10129-CVGroup_UIEventLobby_Enter3-1 = "Sinto que o número de espectadores está aumentando cada vez mais..."
10129-CVGroup_UIEventLobby_Enter4-1 = "Todos parecem felizes, não é?"
10129-CVGroup_UIEventLobby_Enter4-2 = "Seja qual for a forma, fico feliz em poder ser útil."
10129-CVGroup_UIEventLobby_Enter5-1 = "Agora consigo ter confiança no que estou fazendo."
10129-CVGroup_UIEventLobby_Enter5-2 = "Obrigada, Sensei."
10129-CVGroup_UIEventLobby_Enter5-3 = "A investigação secreta terminou, mas as patrulhas continuarão."
10129-CVGroup_UIEventLobby_Enter5-4 = "Conto com você daqui para frente."
10129-CVGroup_UIEventLobby_Idle1-1 = "N-não puxe isso! Não é um enfeite!"
10129-CVGroup_UIEventLobby_Idle2-1 = "A magia do giro à direita da 6ª linha, hum... bem..."
10129-CVGroup_UIEventLobby_Idle2-2 = "Tem muitas falas que não estou acostumada... é difícil de decorar."
10129-CVGroup_UIEventLobby_Idle3-1 = "Kya! H-hyaha! Hyaaa...! É cócegas...!"
10129-CVGroup_UIEventLobby_Idle3-2 = "Eu sou realmente muito sensível a cócegas...!"
10129-CVGroup_UIEventLobby_Idle4-1 = "Eu gosto muito da atmosfera do parque de diversões."
10129-CVGroup_UIEventLobby_Idle4-2 = "Porque é muito... pacífico."
10129-CVGroup_UIEventShop_Enter1-1 = "B-bem-vindo. Sensei..."
10129-CVGroup_UIEventShop_Enter2-1 = "Há algo que esteja procurando...?"
10129-CVGroup_UIEventShop_Enter3-1 = "Foi uma missão memorável. Obrigada."
10129-CVGroup_UIEventShop_Idle1-1 = "Espero que encontre o que está procurando."
10129-CVGroup_UIEventShop_Idle2-1 = "Isso me lembra do que aconteceu na loja de conveniência."
10129-CVGroup_UIEventShop_Buy1-1 = "Sim, aqui está."
10129-CVGroup_UIEventShop_Buy2-1 = "Sim, aqui tem."
10129-CVGroup_UIEventShop_Buy3-1 = "Obrigada por sempre colaborar."
10129-CVGroup_UIEventShop_Buy4-1 = "Espero que seja útil para o Sensei."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-1 = "É uma máquina antiga. Será que ainda funciona direito...?"
10129-CVGroup_UIEventFortuneGachashop_Card_Enter1-2 = "Parece que funciona se eu inserir isto."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-1 = "Fico feliz que a Reisa pareça estar se divertindo."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter2-2 = "Raridade alta? Espero que saia uma carta boa."
10129-CVGroup_UIEventFortuneGachashop_Card_Enter3-1 = "Já está na hora de fechar o parque. Vamos verificar se sobrou algo."
10129-CVGroup_UIEventFortuneGachashop_Card_Idle1-1 = "Sinto que estou sendo observada pelas pessoas ao redor..."
10129-CVGroup_UIEventFortuneGachashop_Card_Idle2-1 = "Vamos tirar logo antes que atraia olhares...!"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck4-1 = "É cor de arco-íris. Isso é algo bom?"
10129-CVGroup_UIEventFortuneGachashop_Card_Luck3-1 = "Rosa... né."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck2-1 = "Dourado, né."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck1-1 = "Azul claro? É refrescante."
10129-CVGroup_UIEventFortuneGachashop_Card_Luck0-1 = "Preto... um pouco sinistro."
