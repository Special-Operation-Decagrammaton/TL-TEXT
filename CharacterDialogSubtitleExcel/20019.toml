[translation]
20019-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20019-CVGroup_CharacterGet_Idle1-1 = "ご主人様のメイド、アカネです。\nいえ……今はご主人様のウサギさん、と申し上げるべきでしょうか？"
20019-CVGroup_Cafe_Idle1-1 = "綺麗に整頓されていますね。\n掃除は……大切です。"
20019-CVGroup_Cafe_Idle2-1 = "いらっしゃいませ。\nご注文は紅茶ですか？\n……ふふっ。"
20019-CVGroup_Cafe_Idle3-1 = "ご主人様は本当に……特別なお方なのです。"
20019-CVGroup_Cafe_Idle4-1 = "もう少し整理できるところは……。"
20019-CVGroup_Cafe_Idle5-1 = "この際、ご主人様と一緒にウサギの道を歩んでみるのも……？"
20019-CVGroup_WeaponGet_Idle1-1 = "これでもっと完璧な……\n「ウサギ」になれますね。"
