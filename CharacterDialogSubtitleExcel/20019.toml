[translation]
20019-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20019-CVGroup_CharacterGet_Idle1-1 = "Sou Akane, a empregada do mestre.\nNão... devo dizer que agora sou a coelhinha do mestre?"
20019-CVGroup_Cafe_Idle1-1 = "Está tudo muito bem organizado.\nA limpeza... é essencial."
20019-CVGroup_Cafe_Idle2-1 = "Bem-vindo.\nGostaria de um chá?\n...Fufu."
20019-CVGroup_Cafe_Idle3-1 = "O mestre é, de fato... uma pessoa muito especial."
20019-CVGroup_Cafe_Idle4-1 = "Ainda há lugares que posso organizar melhor..."
20019-CVGroup_Cafe_Idle5-1 = "Já que estamos aqui, que tal seguir o caminho do coelho junto comigo, mestre...?"
20019-CVGroup_WeaponGet_Idle1-1 = "Com isto, poderei me tornar uma...\n'coelhinha' ainda mais perfeita."
