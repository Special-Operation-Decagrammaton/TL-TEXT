[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10143-CVGroup_UITitle_Idle1_Shun-1 = "Blue, Archive."
10143-CVGroup_CharacterGet_Idle1-1 = "Já fez os seus exercícios de alongamento e aquecimento?\nSe não fizer direito, eu vou te dar bronca."
10143-CVGroup_Cafe_Idle1-1 = "Nossa... Que lugar mais adorável."
10143-CVGroup_Cafe_Idle2-1 = "Este chá... parece fazer muito bem para a pele."
10143-CVGroup_Cafe_Idle3-1 = "(Será que tem algum problema eu vir aqui vestida de maiô... assim do nada?)"
10143-CVGroup_Cafe_Idle4-1 = "Uuh... Sinto que os meus ombros vão ficar muito tensos..."
10143-CVGroup_Cafe_Idle5-1 = "Aqui é tudo tão confortável... Eu gostaria de ficar aqui para sempre..."
10143-CVGroup_WeaponGet_Idle1_Shun-1 = "Quando estamos aproveitando as férias assim, é normal que a gente acabe relaxando um pouco.\nMas é exatamente nesses momentos que precisamos manter a postura, sabia?\nSe você não seguir as regras, eu terei que puni-lo."
10143-CVGroup_UITitle_Idle1_ShunSmall-1 = "Blue Archive! Ehehe."
10143-CVGroup_UIEventLobby_Enter1_Shun-1 = "Chegamos ao lugar secreto...\nFufu, o que achou da vista, Sensei?"
10143-CVGroup_UIEventLobby_Enter1_Shun-2 = "Se eu estou gostando? É tudo tão novo e fresco. É muito divertido."
10143-CVGroup_UIEventLobby_Enter2_Shun-1 = "Você estaria livre um pouco mais tarde...?"
10143-CVGroup_UIEventLobby_Enter2_Shun-2 = "Não, não se preocupe, não é nada demais."
10143-CVGroup_UIEventLobby_Enter2_Shun-3 = "É só que... eu queria ver esse lugar com você,"
10143-CVGroup_UIEventLobby_Enter2_Shun-4 = "Apenas nós dois."
10143-CVGroup_UIEventLobby_Enter3_Shun-1 = "Poder viajar com você e com todas as meninas...\nMe deixa tão feliz."
10143-CVGroup_UIEventLobby_Enter3_Shun-2 = "Com certeza, eu nunca vou esquecer este dia, para todo o sempre..."
10143-CVGroup_UIEventLobby_Enter4_Shun-1 = "Crianças são serzinhos muito puros."
10143-CVGroup_UIEventLobby_Enter4_Shun-2 = "Elas absorvem e sentem muito mais coisas do que nós adultos imaginamos."
10143-CVGroup_UIEventLobby_Enter4_Shun-3 = "É por isso que precisamos sempre guiá-las e ensiná-las o caminho."
10143-CVGroup_UIEventLobby_Enter4_Shun-4 = "Exatamente como o Sensei sempre faz,"
10143-CVGroup_UIEventLobby_Enter4_Shun-5 = "Cuidando tão bem de todas nós."
10143-CVGroup_UIEventLobby_Enter5_Shun-1 = "Bom trabalho hoje, Sensei.\nSim... você foi ótimo."
10143-CVGroup_UIEventLobby_Enter6_Shun-1 = "Sabe... se não se importar, o que acha de agora..."
10143-CVGroup_UIEventLobby_Enter6_Shun-2 = "Aproveitarmos a nossa verdadeira viagem a dois?"
10143-CVGroup_UIEventLobby_Idle1_Shun-1 = "Fez os seus exercícios de aquecimento direito?"
10143-CVGroup_UIEventLobby_Idle1_Shun-2 = "Na hora de entrar na água,"
10143-CVGroup_UIEventLobby_Idle1_Shun-3 = "Você deve molhar os pés primeiro para se acostumar com a temperatura antes de mergulhar."
10143-CVGroup_UIEventLobby_Idle2_Shun-1 = "Sim, eu estou bem aqui."
10143-CVGroup_UIEventLobby_Idle2_Shun-2 = "Se estiver com muito frio na água...\nEu posso te esquentar um pouquinho."
10143-CVGroup_UIEventLobby_Idle3_Shun-1 = "Ah, aí não pode, Sensei...!"
10143-CVGroup_UIEventLobby_Idle3_Shun-2 = "Uhn..."
10143-CVGroup_UIEventLobby_Idle3_Shun-3 = "Só um pouquinho, viu..."
10143-CVGroup_UIEventLobby_Idle4_Shun-1 = "Nossa! Sensei... Eu já disse que não!"
10143-CVGroup_UIEventLobby_Idle4_Shun-2 = "Vamos deixar isso para quando estivermos completamente a sós."
10143-CVGroup_UIEventCardShop_Enter1_ShunSmall-1 = "Oii! Eu tava te esperando!"
10143-CVGroup_UIEventCardShop_Enter1_ShunSmall-2 = "É a Shunzinha do Sensei!"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-1 = "Sensei, bem-vindo de volta!"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-2 = "Ué? Tem certeza de que pode ser a Shunzinha...?"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-3 = "Fufu, por mim tudo bem a qualquer hora!"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-1 = "Ehehe, o que você acha? Não parece diferente?"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-2 = "Ué, aconteceu alguma coisa?"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-3 = "Por acaso você... não gosta da 'Shunzinha'..."
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-4 = "Não quer mais brincar comigo?"
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-1 = "O tempo que eu passo com você,"
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-2 = "É o momento em que sou mais feliz."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-3 = "Sabe por quê...?"
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-4 = "Porque eu posso ser honesta com os meus próprios sentimentos."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-5 = "Ter um corpo de criança é muiitooo legal!"
10143-CVGroup_UIEventCardShop_Prize3_ShunSmall-1 = "Acertou! Incrível!"
10143-CVGroup_UIEventCardShop_Prize3_ShunSmall-2 = "Dá pra trocar isso por um prêmio lá na frente!"
10143-CVGroup_UIEventCardShop_Prize2_ShunSmall-1 = "Uau! Que demais!\nSensei, deixa eu ver mais de pertinho!"
10143-CVGroup_UIEventCardShop_Prize1_ShunSmall-1 = "O que será que é isso...?\nCom certeza é algo muito legal!"
10143-CVGroup_UIEventCardShop_Prize0_ShunSmall-1 = "Já completou tudo, não foi?\nBom trabalho, Sensei!"
10143-CVGroup_UIEventCardShop_Enter3_ShunSmall-1 = "Ah, Sensei! Ehehe. Eu tava te esperando!"
10143-CVGroup_UIEventCardShop_Enter4_ShunSmall-1 = "Se você já terminou t-u-d-i-n-h-o o que tinha pra fazer...\nVamos brincar!?"
10143-CVGroup_UIEventCardShop_Enter4_ShunSmall-2 = "É claro... Só nós dois."
10143-CVGroup_UIEventMission_Enter1_Shun-1 = "Bem, isso também faz parte da nossa inspeção."
10143-CVGroup_UIEventMission_Enter1_Shun-2 = "O que acha de darmos uma olhada na agenda de hoje?"
10143-CVGroup_UIEventMission_Enter2_Shun-1 = "Pensar que o alvo da nossa inspeção é um desfiladeiro tão lindo... "
10143-CVGroup_UIEventMission_Enter2_Shun-2 = "Me sinto até um pouco ansiosa."
10143-CVGroup_UIEventMission_Buy3_Shun-1 = "Sensei, se não se importar, gostaria de comer algumas frutas?"
10143-CVGroup_UIEventMission_Buy3_Shun-2 = "Para dar uma descansadinha... Aqui está, pode pegar."
10143-CVGroup_UIEventMission_Buy4_Shun-1 = "Bom trabalho hoje."
10143-CVGroup_UIEventMission_Buy4_Shun-2 = "Parece que o pessoal está preparando um monte de coisas logo ali."
10143-CVGroup_UIEventMission_Idle1_Shun-1 = "Sabe... o tempo do Sensei é, obviamente, apenas seu, mas..."
10143-CVGroup_UIEventMission_Idle1_Shun-2 = "Só um pouquinho... Mesmo que seja por um breve momento."
10143-CVGroup_UIEventMission_Idle1_Shun-3 = "Às vezes, eu só queria poder passar um tempinho sozinha com você."
10143-CVGroup_UIEventMission_Idle2_Shun-1 = "De vez em quando, as pessoas me dizem que eu sou um pouquinho desastrada, mas..."
10143-CVGroup_UIEventMission_Idle2_Shun-2 = "Às vezes, até isso acaba trazendo coisas boas."
10143-CVGroup_UIEventMission_Idle2_Shun-3 = "Fufu. Sim."
10143-CVGroup_UIEventMission_Idle2_Shun-4 = "Graças a isso, conseguimos arrumar um tempinho para ficarmos assim, não é?"
10143-CVGroup_UIEventMission_Interaction5-1 = "A nossa inspeção de hoje termina por aqui."
10143-CVGroup_UIEventMission_Interaction5-2 = "Daqui em diante... é tempo livre."