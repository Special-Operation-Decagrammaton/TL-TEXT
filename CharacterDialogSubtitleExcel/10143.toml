[translation]
10143-CVGroup_UITitle_Idle1_Shun-1 = "Blue Archive."
10143-CVGroup_CharacterGet_Idle1-1 = "Did you do your warm-up exercises?\nIf you don't do them properly, you'll get a scolding!"
10143-CVGroup_Cafe_Idle1-1 = "Oh my... what a lovely place."
10143-CVGroup_Cafe_Idle2-1 = "This tea... it looks like it would be good for my skin."
10143-CVGroup_Cafe_Idle3-1 = "(I wonder... would it have been alright to come here in a swimsuit?)"
10143-CVGroup_Cafe_Idle4-1 = "Ugh... my shoulders are starting to feel stiff..."
10143-CVGroup_Cafe_Idle5-1 = "It's so comfortable here... I want to stay forever..."
10143-CVGroup_WeaponGet_Idle1_Shun-1 = "When you go on vacation like this, it's easy to let your guard down. But that's exactly when you need to stay sharp. If you don't follow the rules, you'll get a scolding, you know."
10143-CVGroup_UITitle_Idle1_ShunSmall-1 = "Blue Archive! Ehehe."
10143-CVGroup_UIEventLobby_Enter1_Shun-1 = "We've arrived at the hidden spot...\nHehe, what do you think, Sensei?"
10143-CVGroup_UIEventLobby_Enter1_Shun-2 = "Me? I feel refreshed and it's quite fun."
10143-CVGroup_UIEventLobby_Enter2_Shun-1 = "Do you have a moment later...?"
10143-CVGroup_UIEventLobby_Enter2_Shun-2 = "No, it's nothing major."
10143-CVGroup_UIEventLobby_Enter2_Shun-3 = "It's just that... I wanted to look around here..."
10143-CVGroup_UIEventLobby_Enter2_Shun-4 = "with just the two of us, Sensei."
10143-CVGroup_UIEventLobby_Enter3_Shun-1 = "Being able to come on this trip with you and everyone else...\nI'm so happy."
10143-CVGroup_UIEventLobby_Enter3_Shun-2 = "I'm sure I'll never forget this day, not ever..."
10143-CVGroup_UIEventLobby_Enter4_Shun-1 = "Children are so pure."
10143-CVGroup_UIEventLobby_Enter4_Shun-2 = "They absorb so much more than we realize."
10143-CVGroup_UIEventLobby_Enter4_Shun-3 = "That's why we have to guide them."
10143-CVGroup_UIEventLobby_Enter4_Shun-4 = "Just as you, Sensei,"
10143-CVGroup_UIEventLobby_Enter4_Shun-5 = "think of us."
10143-CVGroup_UIEventLobby_Enter5_Shun-1 = "Thank you for your hard work, Sensei.\nYes... truly."
10143-CVGroup_UIEventLobby_Enter6_Shun-1 = "Um... if you'd like, would you like to..."
10143-CVGroup_UIEventLobby_Enter6_Shun-2 = "enjoy a real vacation with me now?"
10143-CVGroup_UIEventLobby_Idle1_Shun-1 = "Did you do your warm-up exercises properly?"
10143-CVGroup_UIEventLobby_Idle1_Shun-2 = "When you enter the water,"
10143-CVGroup_UIEventLobby_Idle1_Shun-3 = "you should splash it on your feet first to get used to the temperature."
10143-CVGroup_UIEventLobby_Idle2_Shun-1 = "Yes, I'm right here."
10143-CVGroup_UIEventLobby_Idle2_Shun-2 = "If you're feeling cold... I'll warm you up."
10143-CVGroup_UIEventLobby_Idle3_Shun-1 = "Whoa, not there, Sensei...!"
10143-CVGroup_UIEventLobby_Idle3_Shun-2 = "..."
10143-CVGroup_UIEventLobby_Idle3_Shun-3 = "Just a little bit, okay..."
10143-CVGroup_UIEventLobby_Idle4_Shun-1 = "Honestly! Sensei... you're getting a scolding!"
10143-CVGroup_UIEventLobby_Idle4_Shun-2 = "Let's save that for when we're alone."
10143-CVGroup_UIEventCardShop_Enter1_ShunSmall-1 = "Hello! I've been waiting for you!"
10143-CVGroup_UIEventCardShop_Enter1_ShunSmall-2 = "It's your Shun, Sensei!"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-1 = "Welcome back, Sensei!"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-2 = "Eh? Is it okay to be Shun...?"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-3 = "Hehe, I'm always okay!"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-1 = "Ehehe, what do you think? Is it a fresh look?"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-2 = "Oh, is something the matter?"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-3 = "Could it be that you don't want to..."
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-4 = "play with 'Shun'?"
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-1 = "When I'm with you, Sensei,"
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-2 = "I'm at my happiest."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-3 = "Because..."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-4 = "I can be honest with my feelings."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-5 = "Being in a child's body is the best!"
10143-CVGroup_UIEventCardShop_Prize3_ShunSmall-1 = "You won! That's amazing!"
10143-CVGroup_UIEventCardShop_Prize3_ShunSmall-2 = "It looks like you can exchange it for a prize over there!"
10143-CVGroup_UIEventCardShop_Prize2_ShunSmall-1 = "Wow! Amazing!\nSensei, show me closer!"
10143-CVGroup_UIEventCardShop_Prize1_ShunSmall-1 = "I wonder what this is...?\nIt must be something incredible!"
10143-CVGroup_UIEventCardShop_Prize0_ShunSmall-1 = "Is this a complete set?\nGreat work, Sensei!"
10143-CVGroup_UIEventCardShop_Enter3_ShunSmall-1 = "Ah, Sensei! Ehehe. I've been waiting!"
10143-CVGroup_UIEventCardShop_Enter4_ShunSmall-1 = "If you're all done with your work...\nwould you like to go play?"
10143-CVGroup_UIEventCardShop_Enter4_ShunSmall-2 = "Of course... just the two of us."
10143-CVGroup_UIEventMission_Enter1_Shun-1 = "Technically, this is part of the inspection."
10143-CVGroup_UIEventMission_Enter1_Shun-2 = "Let's take a look at today's schedule."
10143-CVGroup_UIEventMission_Enter2_Shun-1 = "To think the inspection site would be such a beautiful valley..."
10143-CVGroup_UIEventMission_Enter2_Shun-2 = "I'm actually looking forward to it."
10143-CVGroup_UIEventMission_Buy3_Shun-1 = "Sensei, would you like some fruit?"
10143-CVGroup_UIEventMission_Buy3_Shun-2 = "Take a break... here you go."
10143-CVGroup_UIEventMission_Buy4_Shun-1 = "Thank you for your hard work."
10143-CVGroup_UIEventMission_Buy4_Shun-2 = "It seems they're preparing various things over there."
10143-CVGroup_UIEventMission_Idle1_Shun-1 = "Um... Sensei's time is, of course, your own, but..."
10143-CVGroup_UIEventMission_Idle1_Shun-2 = "Even if it's just a part of it... even just a little bit,"
10143-CVGroup_UIEventMission_Idle1_Shun-3 = "there are times I wish we could spend it together."
10143-CVGroup_UIEventMission_Idle2_Shun-1 = "I'm sometimes told that I'm too careless..."
10143-CVGroup_UIEventMission_Idle2_Shun-2 = "but sometimes that works in my favor."
10143-CVGroup_UIEventMission_Idle2_Shun-3 = "Hehe. Yes."
10143-CVGroup_UIEventMission_Idle2_Shun-4 = "Because it allowed me to make time to be with you like this."
10143-CVGroup_UIEventMission_Interaction5-1 = "That concludes today's inspection."
10143-CVGroup_UIEventMission_Interaction5-2 = "The rest... is free time."