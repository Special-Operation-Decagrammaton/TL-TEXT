[translation]
10143-CVGroup_UITitle_Idle1_Shun-1 = "Blue Archive."
10143-CVGroup_CharacterGet_Idle1-1 = "Вы сделали разминку?\\nЕсли не разомнётесь как следует, я буду ругаться!"
10143-CVGroup_Cafe_Idle1-1 = "Ох надо же... какое прелестное место."
10143-CVGroup_Cafe_Idle2-1 = "Этот чай... кажется, он очень полезен для кожи."
10143-CVGroup_Cafe_Idle3-1 = "(Интересно... нормально ли было приходить сюда прямо в купальнике?)"
10143-CVGroup_Cafe_Idle4-1 = "Уф... плечи начинают потихоньку затекать..."
10143-CVGroup_Cafe_Idle5-1 = "Здесь так уютно... Я бы осталась тут навсегда..."
10143-CVGroup_WeaponGet_Idle1_Shun-1 = "Когда выбираешься в такой отпуск, очень легко потерять бдительность. Но именно в такие моменты нужно оставаться начеку. Если не будешь соблюдать правила, то получишь нагоняй, имей в виду."
10143-CVGroup_UITitle_Idle1_ShunSmall-1 = "Blue Archive! Хе-хе."
10143-CVGroup_UIEventLobby_Enter1_Shun-1 = "Мы добрались до этого секретного местечка...\nХе-хе, ну и как тебе, Сенсей?"
10143-CVGroup_UIEventLobby_Enter1_Shun-2 = "Я? Чувствую себя посвежевшей, и здесь довольно весело."
10143-CVGroup_UIEventLobby_Enter2_Shun-1 = "У тебя найдётся время чуть позже...?"
10143-CVGroup_UIEventLobby_Enter2_Shun-2 = "Нет, ничего серьёзного."
10143-CVGroup_UIEventLobby_Enter2_Shun-3 = "Просто... мне хотелось осмотреться здесь..."
10143-CVGroup_UIEventLobby_Enter2_Shun-4 = "только вдвоём, Сенсей."
10143-CVGroup_UIEventLobby_Enter3_Shun-1 = "Я так счастлива, что смогла отправиться в эту поездку вместе с тобой и остальными..."
10143-CVGroup_UIEventLobby_Enter3_Shun-2 = "Я уверена, что никогда не забуду этот день, ни за что на свете..."
10143-CVGroup_UIEventLobby_Enter4_Shun-1 = "Дети такие чистые существа."
10143-CVGroup_UIEventLobby_Enter4_Shun-2 = "Они впитывают гораздо больше, \\nчем мы думаем."
10143-CVGroup_UIEventLobby_Enter4_Shun-3 = "Вот почему мы должны направлять их."
10143-CVGroup_UIEventLobby_Enter4_Shun-4 = "Точно так же, как ты, Сенсей,"
10143-CVGroup_UIEventLobby_Enter4_Shun-5 = "заботишься о нас."
10143-CVGroup_UIEventLobby_Enter5_Shun-1 = "Спасибо за твой усердный труд, Сенсей.\nДа... правда."
10143-CVGroup_UIEventLobby_Enter6_Shun-1 = "Эм... если хочешь, не желаешь ли ты..."
10143-CVGroup_UIEventLobby_Enter6_Shun-2 = "насладиться настоящим отпуском вместе со мной прямо сейчас?"
10143-CVGroup_UIEventLobby_Idle1_Shun-1 = "Ты ведь сделал разминку как следует?"
10143-CVGroup_UIEventLobby_Idle1_Shun-2 = "Прежде чем заходить в воду,"
10143-CVGroup_UIEventLobby_Idle1_Shun-3 = "нужно сначала побрызгать на ноги, чтобы привыкнуть к температуре."
10143-CVGroup_UIEventLobby_Idle2_Shun-1 = "Да, \\nя прямо здесь."
10143-CVGroup_UIEventLobby_Idle2_Shun-2 = "Если тебе станет холодно... я согрею тебя."
10143-CVGroup_UIEventLobby_Idle3_Shun-1 = "Ой, только не там, \\nСенсей...!"
10143-CVGroup_UIEventLobby_Idle3_Shun-2 = "..."
10143-CVGroup_UIEventLobby_Idle3_Shun-3 = "Ну, если совсем чуть-чуть, тогда ладно..."
10143-CVGroup_UIEventLobby_Idle4_Shun-1 = "Честное слово! Сенсей... сейчас ты у меня получишь нагоняй!"
10143-CVGroup_UIEventLobby_Idle4_Shun-2 = "Давай оставим это до тех пор, пока мы не останемся наедине."
10143-CVGroup_UIEventCardShop_Enter1_ShunSmall-1 = "Привет! Я так тебя ждала!"
10143-CVGroup_UIEventCardShop_Enter1_ShunSmall-2 = "Это твоя Шун, Сенсей!"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-1 = "С возвращением, \\nСенсей!"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-2 = "А? Точно можно побыть просто Шун...?"
10143-CVGroup_UIEventCardShop_Enter2_ShunSmall-3 = "Хе-хе, я всегда \\nтолько за!"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-1 = "Хе-хе, ну как тебе? Выглядит свежо?"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-2 = "Ой, что-то не так?"
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-3 = "Неужели ты совсем не хочешь..."
10143-CVGroup_UIEventCardShop_Idle1_ShunSmall-4 = "поиграть с Шун?"
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-1 = " Когда я рядом с тобой, Сенсей,"
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-2 = "я счастливее всех на свете."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-3 = "Потому что..."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-4 = "я могу не прятать свои настоящие чувства."
10143-CVGroup_UIEventCardShop_Idle2_ShunSmall-5 = "Быть в теле ребёнка — \\nлучше всего!"
10143-CVGroup_UIEventCardShop_Prize3_ShunSmall-1 = "Ты выиграл! Это потрясающе!"
10143-CVGroup_UIEventCardShop_Prize3_ShunSmall-2 = "Похоже, вон там можно обменять это на приз!"
10143-CVGroup_UIEventCardShop_Prize2_ShunSmall-1 = "Ого! Здорово! \\nСенсей, покажи мне поближе!"
10143-CVGroup_UIEventCardShop_Prize1_ShunSmall-1 = "Интересно, что же это такое...?\nНаверняка что-то совершенно невероятное!"
10143-CVGroup_UIEventCardShop_Prize0_ShunSmall-1 = "Это полный комплект?\nОтличная работа, Сенсей!"
10143-CVGroup_UIEventCardShop_Enter3_ShunSmall-1 = "Ах, Сенсей! Хе-хе. Я ждала тебя!"
10143-CVGroup_UIEventCardShop_Enter4_ShunSmall-1 = "Если ты закончил \\nсо всей работой... \\nможет, пойдём поиграем?"
10143-CVGroup_UIEventCardShop_Enter4_ShunSmall-2 = "Конечно же... только мы вдвоём."
10143-CVGroup_UIEventMission_Enter1_Shun-1 = "Формально говоря, это часть нашей инспекции."
10143-CVGroup_UIEventMission_Enter1_Shun-2 = "Давай взглянем на сегодняшнее расписание."
10143-CVGroup_UIEventMission_Enter2_Shun-1 = "Подумать только, что местом инспекции \\nокажется такая красивая долина..."
10143-CVGroup_UIEventMission_Enter2_Shun-2 = "Я даже сама с нетерпением жду начала."
10143-CVGroup_UIEventMission_Buy3_Shun-1 = "Сенсей, не хочешь немного фруктов?"
10143-CVGroup_UIEventMission_Buy3_Shun-2 = "Сделай перерыв... держи."
10143-CVGroup_UIEventMission_Buy4_Shun-1 = "Спасибо за твой усердный труд."
10143-CVGroup_UIEventMission_Buy4_Shun-2 = "Похоже, вон там готовят много всего разного."
10143-CVGroup_UIEventMission_Idle1_Shun-1 = "Эм... время Сенсея, разумеется, принадлежит тебе самому, но..."
10143-CVGroup_UIEventMission_Idle1_Shun-2 = "Пусть даже самую малость... хотя бы крошечную часть,"
10143-CVGroup_UIEventMission_Idle1_Shun-3 = "иногда мне так хочется, чтобы мы проводили его вместе."
10143-CVGroup_UIEventMission_Idle2_Shun-1 = "Мне порой говорят, что я бываю слишком беспечной..."
10143-CVGroup_UIEventMission_Idle2_Shun-2 = "но иногда это играет мне только на руку."
10143-CVGroup_UIEventMission_Idle2_Shun-3 = "Хе-хе. Да."
10143-CVGroup_UIEventMission_Idle2_Shun-4 = "Ведь именно благодаря этому я смогла выкроить время, чтобы побыть с тобой вот так."
10143-CVGroup_UIEventMission_Interaction5-1 = "На этом сегодняшняя инспекция завершена."
10143-CVGroup_UIEventMission_Interaction5-2 = "Всё оставшееся время... полностью свободно."
