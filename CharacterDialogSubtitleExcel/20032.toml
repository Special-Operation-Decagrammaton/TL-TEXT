[translation]
20032-CVGroup_UIMiniEventLobby_Enter1-1 = "Olá, Sensei.\nO que achou da nova base?"
20032-CVGroup_UIMiniEventLobby_Enter2-1 = "Tem tanta coisa para fazer..."
20032-CVGroup_UIMiniEventLobby_Enter2-2 = "Vamos resolver uma por uma, certo?"
20032-CVGroup_UIMiniEventLobby_Enter3-1 = "Bem-vindo de volta, Sensei.\nPode me pedir o que precisar."
20032-CVGroup_UIMiniEventLobby_Idle1-1 = "A Himari-buchou parece ocupada."
20032-CVGroup_UIMiniEventLobby_Idle1-2 = "...Mas ela parece feliz, então acho que está tudo bem."
20032-CVGroup_UIMiniEventLobby_Idle2-1 = "Se estiver com frio, venha aqui, Sensei."
20032-CVGroup_UIMiniEventLobby_Idle2-2 = "Acho que é mais eficiente para nós dois, não acha?"
20032-CVGroup_UIMiniEventLobby_Idle3-1 = "A temperatura e a disposição estão intimamente ligadas."
20032-CVGroup_UIMiniEventLobby_Idle3-2 = "Por isso, gosto daqui, é confortável."
20032-CVGroup_UIMiniEventLobby_Idle4-1 = "Bom trabalho, Sensei.\nPosso dar uma olhadinha nisso?"
20032-CVGroup_UIMiniEventLobby_Idle5-1 = "Quando você está por perto, a taxa de sucesso das operações aumenta."
20032-CVGroup_UIMiniEventLobby_Idle5-2 = "...Eu também me sinto melhor assim."
20032-CVGroup_UIMiniEventShop_Enter1-1 = "Este é o lugar onde analisamos...\no que você coletou, Sensei. Provavelmente."
20032-CVGroup_UIMiniEventShop_Enter2-1 = "Quanto mais amostras, melhor. Conto com você."
20032-CVGroup_UIMiniEventShop_Enter3-1 = "Que bom que veio. Já entendeu que a eficiência é importante, Sensei?"
20032-CVGroup_UIMiniEventShop_Idle1-1 = "Hm? O que foi?"
20032-CVGroup_UIMiniEventShop_Idle1-2 = "...Só me chamou? Por quê...?"
20032-CVGroup_UIMiniEventShop_Idle1-3 = "...Bem, se é isso que você quer, tudo bem."
20032-CVGroup_UIMiniEventShop_Idle2-1 = "Dizem que se você pegar isso e fizer aquilo, algo acontece."
20032-CVGroup_UIMiniEventShop_Idle2-2 = "...Eu não entendo muito bem, mas,"
20032-CVGroup_UIMiniEventShop_Idle2-3 = "pela explicação da Buchou, parece ser por aí."
20032-CVGroup_UIMiniEventShop_Idle3-1 = "Não tenho muito o que fazer durante a análise."
20032-CVGroup_UIMiniEventShop_Idle3-2 = "...Posso sentar no seu colo, Sensei?"
20032-CVGroup_UIMiniEventShop_Idle4-1 = "Me disseram para não chegar perto durante a análise,"
20032-CVGroup_UIMiniEventShop_Idle4-2 = "porque a temperatura corporal vira uma variável..."
20032-CVGroup_UIMiniEventShop_Idle4-3 = "Eu entendo, mas é um pouco solitário."
20032-CVGroup_UIMiniEventShop_Idle5-1 = "Eu acho que... gosto deste lugar."
20032-CVGroup_UIMiniEventShop_Idle5-2 = "Será que posso trazer uma parte da nossa sala do clube para cá?"
20032-CVGroup_UIMiniEventShop_Buy1-1 = "Aqui, pode pegar."
20032-CVGroup_UIMiniEventShop_Buy1-2 = "...Isso se chama \"troca de mercadorias\", não é?"
20032-CVGroup_UIMiniEventShop_Buy2-1 = "O resultado saiu. Qual você vai escolher?"
20032-CVGroup_UIMiniEventShop_Buy3-1 = "Sim. Essa é uma boa escolha."
20032-CVGroup_UIMiniEventShop_Buy4-1 = "Seria bom se houvesse mais variedade nos resultados."
20032-CVGroup_UIMiniEventShop_Buy4-2 = "...O que temos já é o suficiente? Entendi."
20032-CVGroup_UIMiniEventShop_Buy5-1 = "Não entendo muito bem, mas,"
20032-CVGroup_UIMiniEventShop_Buy5-2 = "espero que isso seja útil para você, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "A partir daqui, vou mudar um pouco o método de análise das amostras."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "Dizem que este é um lugar para testar a sorte..."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "Já basta o futuro ser incerto, não é?"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "Vamos apostar na sua sorte, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "Então, cuide da minha parte também."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "Parece que a Himari-buchou mudou alguma coisa..."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "Para mim, isso deixa um pouco a desejar."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "Eu prefiro quando os resultados são claros."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "Dizem que a Toki gosta desse método."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "...Mesmo que ela não demonstre,"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "a Toki é do tipo que aproveita quase tudo, não é?"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "Não entendo muito de metodologia,"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "mas dá para perceber que algo mudou."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "Se você tirar um azar, talvez eu te deixe para trás?"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "……Era brincadeira. Tendo sorte ou não, eu estarei ao seu lado, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "Se não gostar do resultado, me conte."
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "Eu vou te consolar."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "É um prêmio.\nParabéns, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "Então o grande prêmio realmente existia……."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "Que surpresa…… Você realmente tem muita sorte, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "É um resultado alcançado pelo nosso esforço, Sensei."
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "Parabéns, Sensei. Quer brindar?"
20032-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20032-CVGroup_CharacterGet_Idle1-1 = "Sinto meu corpo um pouco mais leve que o normal.\nSerá por causa do frescor?"
20032-CVGroup_Cafe_Idle1-1 = "Enquanto a Himari-senpai não está aqui……"
20032-CVGroup_Cafe_Idle2-1 = "Se tivesse uma raspadinha aqui, seria perfeito."
20032-CVGroup_Cafe_Idle3-1 = "Onde está o interruptor do ar-condicionado……"
20032-CVGroup_Cafe_Idle4-1 = "Começou a ficar quente……\nTem muita gente aqui."
20032-CVGroup_Cafe_Idle5-1 = "Daria para viver aqui para sempre."
20032-CVGroup_WeaponGet_Idle1-1 = "Mesmo que minhas roupas ou o ambiente mudem……\nCom isso aqui, já estou segura."
