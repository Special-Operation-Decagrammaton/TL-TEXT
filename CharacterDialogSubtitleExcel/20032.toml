[translation]
20032-CVGroup_UIMiniEventLobby_Enter1-1 = "先生、こんにちは。\n新しい基地はどう？"
20032-CVGroup_UIMiniEventLobby_Enter2-1 = "やることがたくさん……"
20032-CVGroup_UIMiniEventLobby_Enter2-2 = "一つずつ、片づけていこっか。"
20032-CVGroup_UIMiniEventLobby_Enter3-1 = "おかえり、先生。\nなんでも言ってね。"
20032-CVGroup_UIMiniEventLobby_Idle1-1 = "ヒマリ部長、忙しそう。"
20032-CVGroup_UIMiniEventLobby_Idle1-2 = "……でも楽しそうだから、大丈夫か。"
20032-CVGroup_UIMiniEventLobby_Idle2-1 = "寒かったらこっちにおいで、先生。"
20032-CVGroup_UIMiniEventLobby_Idle2-2 = "そのほうが、お互い効率が良いと思うし？"
20032-CVGroup_UIMiniEventLobby_Idle3-1 = "気温とコンディションは密接な関係にあるんだ。"
20032-CVGroup_UIMiniEventLobby_Idle3-2 = "だから、ここは快適で気に入ってる。"
20032-CVGroup_UIMiniEventLobby_Idle4-1 = "お疲れ様、先生。\nそれ、ちょっと見せて？"
20032-CVGroup_UIMiniEventLobby_Idle5-1 = "先生がいてくれると、作戦の成功率が上昇するの。"
20032-CVGroup_UIMiniEventLobby_Idle5-2 = "……私も、調子良いし。"
20032-CVGroup_UIMiniEventShop_Enter1-1 = "ここは先生が集めてくれたものを……\n分析する場所。多分。"
20032-CVGroup_UIMiniEventShop_Enter2-1 = "サンプルが多いに越したことはないから。よろしくね。"
20032-CVGroup_UIMiniEventShop_Enter3-1 = "いいところに来てくれたね。\n効率が大事って、先生も分かってくれた？"
20032-CVGroup_UIMiniEventShop_Idle1-1 = "うん？どうしたの？"
20032-CVGroup_UIMiniEventShop_Idle1-2 = "……呼んでみただけ？なんで……？"
20032-CVGroup_UIMiniEventShop_Idle1-3 = "……まぁ、先生がそうしたいなら、いっか。"
20032-CVGroup_UIMiniEventShop_Idle2-1 = "コレを持って、アレすると、ナンカでるんだって。"
20032-CVGroup_UIMiniEventShop_Idle2-2 = "……私もよく分かってないんだけど、"
20032-CVGroup_UIMiniEventShop_Idle2-3 = "部長の説明によるとそんなところらしいよ。"
20032-CVGroup_UIMiniEventShop_Idle3-1 = "分析中はやることがあんまりないんだ。"
20032-CVGroup_UIMiniEventShop_Idle3-2 = "……先生の膝の上、座っていい？"
20032-CVGroup_UIMiniEventShop_Idle4-1 = "体温が変数になっちゃうから、"
20032-CVGroup_UIMiniEventShop_Idle4-2 = "分析中は近寄らないように、って言われたの……"
20032-CVGroup_UIMiniEventShop_Idle4-3 = "分かってはいるんだけど、ちょっと寂しいかも。"
20032-CVGroup_UIMiniEventShop_Idle5-1 = "この場所……好きかも。"
20032-CVGroup_UIMiniEventShop_Idle5-2 = "部室の一部、ここに持ってきたらダメかな？"
20032-CVGroup_UIMiniEventShop_Buy1-1 = "はい、どうぞ。"
20032-CVGroup_UIMiniEventShop_Buy1-2 = "……こういうの、「物々交換」って言うんだっけ？"
20032-CVGroup_UIMiniEventShop_Buy2-1 = "結果が出たよ。\nどれにする？"
20032-CVGroup_UIMiniEventShop_Buy3-1 = "うん。それ、いいね。"
20032-CVGroup_UIMiniEventShop_Buy4-1 = "結果にもバリエーションがあったらいいんだけど。"
20032-CVGroup_UIMiniEventShop_Buy4-2 = "……現状で十分？そっか。"
20032-CVGroup_UIMiniEventShop_Buy5-1 = "あんまりよく分からないけど、"
20032-CVGroup_UIMiniEventShop_Buy5-2 = "これが先生の役に立つといいな。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "ここからは、サンプルの調べ方をちょっと変えてみるね。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "運を試せる場所……なんだって。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "不確かなのは、未来だけでいいのにね"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "先生の運にかけてみよっか。"
20032-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "じゃあ、私の分もよろしくね。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "ヒマリ部長がなにかを変えたみたい……"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "私としてはちょっと物足りないかも。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle1-3 = "結果がハッキリしてる方が好きだし。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "この方式、トキは気に入ってるんだって。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "……顔に出ないだけで、"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "トキって大抵のことはなんでも楽しむタイプだよね。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "方法論……にはあまり詳しくないけど、"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle3-2 = "何かが変わったってことは、わかるよ。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "ハズレを引いたら、先生をおいていっちゃうかも？"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "……今のは冗談。運がよくても悪くても、私は先生の隣にいるよ。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "結果が気に入らなかったら、私に言って。"
20032-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "慰めてあげる。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "当たりだね。\nおめでとう、先生。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "大当たりって、本当にあったんだ……。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "驚いた……先生は本当に運がいいんだね。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "先生と私たちの努力で得られた結果、だね。"
20032-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "おめでとう、先生。乾杯でもする？"
20032-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
20032-CVGroup_CharacterGet_Idle1-1 = "いつもよりちょっと身体が軽いかも。\n涼しいからかな。"
20032-CVGroup_Cafe_Idle1-1 = "ヒマリ先輩がいない、いまのうちに……。"
20032-CVGroup_Cafe_Idle2-1 = "ここにかき氷があれば、完璧なんだけど。"
20032-CVGroup_Cafe_Idle3-1 = "エアコンのスイッチは……。"
20032-CVGroup_Cafe_Idle4-1 = "暑くなってきた……\nここ、人多いし。"
20032-CVGroup_Cafe_Idle5-1 = "ここなら、一生暮らせそう。"
20032-CVGroup_WeaponGet_Idle1-1 = "服や環境が変わっても……\nこれがあればもう大丈夫。"
