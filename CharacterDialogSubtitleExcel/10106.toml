[translation]
10106-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10106-CVGroup_CharacterGet_Idle1-1 = "Fufu, ficou surpreso?\nO que acha...\nEu estou diferente de como era antes, não estou?"
10106-CVGroup_Cafe_Idle1-1 = "S-será que você percebeu que sou eu...?"
10106-CVGroup_Cafe_Idle2-1 = "Será que seria melhor se eu tivesse cantado...?"
10106-CVGroup_Cafe_Idle3-1 = "Sinto-me um pouco inquieta e sem saber como agir."
10106-CVGroup_Cafe_Idle4-1 = "Fufu... sinto-me um pouco mais leve."
10106-CVGroup_Cafe_Idle5-1 = "Será que...\nVocê está me olhando?"
10106-CVGroup_WeaponGet_Idle1-1 = "Isso é para mim...?\nNão, não importa a aparência, eu continuo sendo eu.\nComo você disse, tem razão. Aceitarei com gratidão.\nMuito obrigada, Sensei."
10106-CVGroup_UIEventLobby_Enter1-1 = "Ah, ah, ah, ah."
10106-CVGroup_UIEventLobby_Enter1-2 = "Ah... S-Sensei!?"
10106-CVGroup_UIEventLobby_Enter2-1 = "Obrigada por vir, Sensei."
10106-CVGroup_UIEventLobby_Enter2-2 = "Eu, Sakurako, estou muito feliz!"
10106-CVGroup_UIEventLobby_Enter3-1 = "Já se passou metade do tempo, não é...?"
10106-CVGroup_UIEventLobby_Enter4-1 = "Dizem que os momentos maravilhosos passam num piscar de olhos..."
10106-CVGroup_UIEventLobby_Enter4-2 = "Mas sinto como se tudo tivesse passado rápido demais."
10106-CVGroup_UIEventLobby_Enter5-1 = "Fufu, está com saudades?"
10106-CVGroup_UIEventLobby_Enter5-2 = "...Que coincidência, eu também."
10106-CVGroup_UIEventLobby_Idle1-1 = "Sensei, precisa de algo?"
10106-CVGroup_UIEventLobby_Idle1-2 = "...Ah, um aperto de mão... seria isso?"
10106-CVGroup_UIEventLobby_Idle2-1 = "Sinto que me tornei mais próxima de todos\ndo que quando usava o hábito de irmã."
10106-CVGroup_UIEventLobby_Idle2-2 = "Fufu, este traje também é muito bom."
10106-CVGroup_UIEventLobby_Idle3-1 = "Diga-me... você precisa de algo?"
10106-CVGroup_UIEventLobby_Idle3-2 = "Se você me chamar tantas vezes...\nEu, bem, não sei o que devo fazer."
10106-CVGroup_UIEventLobby_Idle4-1 = "Tenho uma coreografia especial que estou praticando..."
10106-CVGroup_UIEventLobby_Idle4-2 = "S-se quiser, gostaria de ver?"
10106-CVGroup_UIEventMission_Enter1-1 = "Organizei as tarefas\ndo Sensei."
10106-CVGroup_UIEventMission_Enter2-1 = "Você chegou,\nSensei."
10106-CVGroup_UIEventMission_Idle1-1 = "Falando nisso, Sensei... estamos sozinhos agora."
10106-CVGroup_UIEventMission_Idle1-2 = "Eh? N-não... foi só uma observação,"
10106-CVGroup_UIEventMission_Idle1-3 = "não tem nenhum significado profundo... mas..."
10106-CVGroup_UIEventMission_Idle2-1 = "Essa roupa combina comigo...?\nFufu, obrigada."
10106-CVGroup_UIEventMission_Buy1-1 = "Sim, verifiquei aqui."
10106-CVGroup_UIEventMission_Buy2-1 = "Sim, muito bem."
10106-CVGroup_UIEventMission_Interaction1-1 = "Bom trabalho, Sensei."
10106-CVGroup_UIEventMission_Interaction1-2 = "Uma recompensa para o Sensei\nque se esforçou... n-,\nbrincadeirinha."
