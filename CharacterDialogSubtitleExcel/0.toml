[translation]
0-CVGroup_UIEventLobby_Enter1-1 = "A Operação de Conquista do Sanctum da Falsidade,\ncomeçará agora."
0-CVGroup_UIEventLobby_Enter2-1 = "Estávamos à sua espera, Sensei."
0-CVGroup_UIEventLobby_Idle1-1 = "No momento, a Operação de Conquista do Sanctum da Falsidade está em andamento."
0-CVGroup_UIEventLobby_Idle2-1 = "Continuamos analisando os dados dos inimigos\ncoletados no Sanctum da Falsidade."
0-CVGroup_UIEventLobby_Idle3-1 = "Se não nos apressarmos para destruir o Sanctum da Falsidade,\no futuro da cidade acadêmica estará..."
0-CVGroup_UIEventLobby_Idle4-1 = "Esta é uma calamidade que caiu sobre todo o Kivotos..."
0-CVGroup_UIEventLobby_Idle4-2 = "A Operação de Conquista do Sanctum da Falsidade\nprecisa do poder do Schale."
0-CVGroup_UIEventLobby_Idle5-1 = "Não temos muito tempo, mas... vamos manter a calma,"
0-CVGroup_UIEventLobby_Idle5-2 = "e resolver as coisas uma por uma."
0-CVGroup_UIEventLobby_Enter1-2 = "O-olá, Sensei... bom trabalho."
0-CVGroup_UIEventLobby_Enter2-2 = "Temos uma montanha de problemas, mas...\ne-eu também vou dar o meu melhor!"
0-CVGroup_UIEventLobby_Idle1-2 = "Sensei... você parece cansado, está se sentindo bem?"
0-CVGroup_UIEventLobby_Idle2-2 = "Você tem dormido o suficiente?"
0-CVGroup_UIEventLobby_Idle2-3 = "Parece que você está se esforçando demais..."
0-CVGroup_UIEventLobby_Enter1-3 = "E aí, bom trabalho, Sensei.\nVocê continua ocupado como sempre, hein."
0-CVGroup_UIEventLobby_Idle1-3 = "Não, não, mesmo que você me leve junto,\neu não serei de muita utilidade."
0-CVGroup_UIEventShop_Enter1-1 = "Nem eu consigo ficar de preguiça agora.\nBem, vou me esforçar pelo menos desta vez."
0-CVGroup_UIEventShop_Idle1-1 = "Ahaha. É uma pena, mas meu posto é aqui.\nEntendo que queira me levar, mas... fufu."
0-CVGroup_UIEventShop_Buy1-1 = "Vai querer esse? Tudo bem."
0-CVGroup_UIEventShop_Buy2-1 = "Pronto, aqui está."
0-CVGroup_UIEventShop_Buy3-1 = "Oh, legal~\nSensei, você tem bom gosto."
0-CVGroup_UIEventShop_Buy4-1 = "Oh, então você vai escolher esse."
0-CVGroup_UIEventMission_Buy1-1 = "Bom trabalho...!"
0-CVGroup_UIEventMission_Buy2-1 = "V-você já resolveu tudo...?"
0-CVGroup_UIEventLobby_Enter1-4 = "Sensei, a Ponte Utnapishtim está em espera no momento."
0-CVGroup_UIEventLobby_Enter2-3 = "A Operação de Conquista da Arca de Atra-Hasis está em andamento."
0-CVGroup_UIEventLobby_Enter3-1 = "Mesmo agora, enquanto fazemos isso, o tempo continua passando."
0-CVGroup_UIEventLobby_Enter4-1 = "Resta pouco tempo."
0-CVGroup_UIEventLobby_Enter4-2 = "Vamos realizar a missão rapidamente."
0-CVGroup_UIEventLobby_Idle1-4 = "Este traje, você diz?"
0-CVGroup_UIEventLobby_Idle1-5 = "...S-sim.\nObrigada."
0-CVGroup_UIEventLobby_Idle2-4 = "Seria mentira dizer que não estou cansada, mas..."
0-CVGroup_UIEventLobby_Idle2-5 = "Estou bem. Isso não atrapalhará a missão."
0-CVGroup_UIEventLobby_Idle3-2 = "Conquistar um Oopart deste tamanho\nnão é nada fácil, mas..."
0-CVGroup_UIEventLobby_Idle3-3 = "Pelo futuro de Kivotos,"
0-CVGroup_UIEventLobby_Idle3-4 = "esta missão precisa ser um sucesso."
0-CVGroup_UIEventShop_Enter1-2 = "Hmm, precisa de suprimentos?"
0-CVGroup_UIEventShop_Enter2-1 = "Me avise se precisar de algo."
0-CVGroup_UIEventShop_Idle1-2 = "Pensando bem, é incrível, né~"
0-CVGroup_UIEventShop_Idle1-3 = "Nunca pensei que chegaríamos\naté um lugar como este."
0-CVGroup_UIEventShop_Idle2-1 = "Ahaha.\nNão se machuque até descermos ao solo, Sensei."
0-CVGroup_UIEventShop_Buy1-2 = "Oh, boa escolha."
0-CVGroup_UIEventShop_Buy2-2 = "Aqui, pegue.\nBoa sorte."
0-CVGroup_UIEventShop_Buy3-2 = "Oh, entendi.\nEntão você escolheu esse."
0-CVGroup_UIEventShop_Buy4-2 = "É assim que se fala."
0-CVGroup_UIEventMission_Enter1-1 = "A Operação de Conquista da Arca de Atra-Hasis..."
0-CVGroup_UIEventMission_Enter1-2 = "Eu também farei o meu melhor para ajudar."
0-CVGroup_UIEventMission_Enter2-1 = "Sensei... se precisar de algo,\npor favor, me diga."
0-CVGroup_UIEventMission_Idle1-1 = "Ugh... este traje, o decote está um pouco..."
0-CVGroup_UIEventMission_Idle2-1 = "Ao ver o esforço de todos..."
0-CVGroup_UIEventMission_Idle2-2 = "Eu também gostaria de ser mais útil para o Sensei."
0-CVGroup_UIEventMission_Buy1-2 = "Bom trabalho, Sensei."
0-CVGroup_UIEventMission_Buy1-3 = "……A estratégia é importante, mas\npor favor, cuide de si mesmo."
0-CVGroup_UIEventMission_Buy2-2 = "Sim, bom trabalho!"
0-CVGroup_UIEventLobby_Enter1-5 = "Esta é a batalha final, Sensei!"
0-CVGroup_UIEventLobby_Enter2-4 = "Finalmente chegamos até aqui……\nA batalha decisiva na Arca de Atra-Hasis!"
0-CVGroup_UIEventLobby_Idle1-6 = "Darei suporte até o fim!"
0-CVGroup_UIEventLobby_Idle2-6 = "Sim…… eu também farei o meu melhor!"
0-CVGroup_UIEventShop_Enter1-3 = "Por favor, reabasteça seus suprimentos aqui!"
0-CVGroup_UIEventShop_Idle1-4 = "Darei suporte até o fim!"
0-CVGroup_UIEventShop_Idle2-2 = "Sim…… eu também farei o meu melhor!"
0-CVGroup_UIEventShop_Buy1-3 = "É isto aqui, Sensei."
0-CVGroup_UIEventShop_Buy2-3 = "Confirmado. Aqui está!"
0-CVGroup_UIEventLobby_Enter1-6 = "Olá, Sensei.\nEstamos realizando o trabalho de restauração do Distrito Shiratori de D.U. aqui."
0-CVGroup_UIEventLobby_Enter2-5 = "Este é o Distrito Shiratori de D.U."
0-CVGroup_UIEventLobby_Enter2-6 = "A situação é parecida em todos os lugares, mas\nprecisamos nos apressar com a restauração deste distrito também."
0-CVGroup_UIEventLobby_Idle1-7 = "Chamou, Sensei?\nE então, qual é o assunto……?"
0-CVGroup_UIEventLobby_Idle2-7 = "Graças à cooperação de muitos alunos, a reconstrução está indo bem."
0-CVGroup_UIEventLobby_Idle2-8 = "Pedir ajuda ao Schale foi a decisão certa."
0-CVGroup_UIEventLobby_Idle3-5 = "……Pelo seu semblante, parece que sua saúde está bem."
0-CVGroup_UIEventLobby_Idle3-6 = "……Fiquei aliviada."
0-CVGroup_UIEventLobby_Idle4-3 = "Edifícios destruídos podem ser reconstruídos, mas"
0-CVGroup_UIEventLobby_Idle4-4 = "a saúde perdida não pode ser recuperada."
0-CVGroup_UIEventLobby_Idle4-5 = "Por favor, nunca se esforce demais."
0-CVGroup_UIEventLobby_Enter3-2 = "A restauração está progredindo bem."
0-CVGroup_UIEventLobby_Enter3-3 = "Neste ritmo, logo poderemos recuperar a paisagem original da cidade."
0-CVGroup_UIEventLobby_Enter4-3 = "O trabalho de restauração já está chegando ao fim."
0-CVGroup_UIEventLobby_Enter4-4 = "Agradeço pelos seus esforços, Sensei."
0-CVGroup_UIEventLobby_Enter5-1 = "O trabalho de restauração do Distrito Shiratori foi concluído."
0-CVGroup_UIEventLobby_Enter5-2 = "Se não se importar, gostaria de verificar o local comigo?"
0-CVGroup_UIEventShop_Enter1-4 = "Ah, Sensei.\nBem-vindo."
0-CVGroup_UIEventShop_Enter1-5 = "Vou recolher os materiais que sobraram~"
0-CVGroup_UIEventShop_Enter2-2 = "Mastigando……."
0-CVGroup_UIEventShop_Enter2-3 = "Hum, é o Sensei."
0-CVGroup_UIEventShop_Enter2-4 = "Fufu, será que o Sensei também está matando aula?"
0-CVGroup_UIEventShop_Idle1-5 = "Ah. Restaurar a cidade é tão trabalhoso……."
0-CVGroup_UIEventShop_Idle1-6 = "Seria bom se todos os prédios de D.U. fossem feitos de doces."
0-CVGroup_UIEventShop_Idle1-7 = "Aí eu poderia ter sabor de menta a qualquer hora……!"
0-CVGroup_UIEventShop_Idle2-3 = "É a primeira vez na minha vida que fico tão ocupada……."
0-CVGroup_UIEventShop_Idle2-4 = "Mas bem, já que recebi ajuda, não é ruim movimentar o corpo de vez em quando."
0-CVGroup_UIEventShop_Buy1-4 = "Você precisa disso?"
0-CVGroup_UIEventShop_Buy1-5 = "Tudo bem~.\nPode levar o que quiser."
0-CVGroup_UIEventShop_Buy2-4 = "Eu também estava curiosa sobre isso~"
0-CVGroup_UIEventShop_Buy3-3 = "Sim, sim, pode levar.\nVolte sempre~"
0-CVGroup_UIEventShop_Buy4-3 = "Se precisar de algo, troque você mesmo~"
0-CVGroup_UIEventShop_Buy4-4 = "Ah, e não esqueça de anotar no livro de registros."
0-CVGroup_UIEventMission_Enter1-3 = "O-olá, Sensei."
0-CVGroup_UIEventMission_Enter1-4 = "Vamos nos esforçar hoje também……."
0-CVGroup_UIEventMission_Enter2-2 = "Espero que o trabalho de restauração siga conforme o planejado."
0-CVGroup_UIEventMission_Enter2-3 = "Embora, com o Sensei aqui, não estou preocupada."
0-CVGroup_UIEventMission_Idle1-2 = "Tem materiais de trabalho espalhados por toda parte..."
0-CVGroup_UIEventMission_Idle1-3 = "Professor, por favor, tome cuidado onde pisa."
0-CVGroup_UIEventMission_Idle2-3 = "Parece que a Rin-senpai tem se esforçado\ndemais ultimamente..."
0-CVGroup_UIEventMission_Idle2-4 = "Estou um pouco preocupada."
0-CVGroup_UIEventMission_Buy1-4 = "J-já terminou? Como esperado do senhor, Professor!"
0-CVGroup_UIEventMission_Buy2-3 = "Bom trabalho, Professor! É apenas uma pequena lembrança, mas aceite como agradecimento do Conselho Estudantil Geral...!"
0-CVGroup_UIEventMission_Interaction1-1 = "O trabalho de hoje termina aqui."
0-CVGroup_UIEventMission_Interaction1-2 = "Bom trabalho. Conto com o senhor novamente amanhã!"
