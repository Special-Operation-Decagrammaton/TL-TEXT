[translation]
0-CVGroup_UIEventLobby_Enter1-1 = "虚妄のサンクトゥム攻略戦、\n開始いたします。"
0-CVGroup_UIEventLobby_Enter2-1 = "お待ちしておりました、先生。"
0-CVGroup_UIEventLobby_Idle1-1 = "現在、虚妄のサンクトゥム攻略戦が進行中です。"
0-CVGroup_UIEventLobby_Idle2-1 = "虚妄のサンクトゥムで収集した敵のデータは、\n引き続き分析を行っております。"
0-CVGroup_UIEventLobby_Idle3-1 = "虚妄のサンクトゥムの破壊を急がなければ、\n学園都市の未来は……。"
0-CVGroup_UIEventLobby_Idle4-1 = "これはキヴォトス全域に降りかかった災禍……。"
0-CVGroup_UIEventLobby_Idle4-2 = "虚妄のサンクトゥム攻略戦には、\nシャーレの力が必要です。"
0-CVGroup_UIEventLobby_Idle5-1 = "時間に余裕はありませんが……。落ち着いて、"
0-CVGroup_UIEventLobby_Idle5-2 = "一つひとつ解決していきましょう。"
0-CVGroup_UIEventLobby_Enter1-2 = "お、お疲れさまです、先生……。"
0-CVGroup_UIEventLobby_Enter2-2 = "問題は山積みですが……\nわ、私も頑張ります！"
0-CVGroup_UIEventLobby_Idle1-2 = "先生……お疲れのようですが、\nお身体のほうは大丈夫ですか？"
0-CVGroup_UIEventLobby_Idle2-2 = "睡眠はちゃんと取られていますか？"
0-CVGroup_UIEventLobby_Idle2-3 = "どうも、ご無理されているようなので……。"
0-CVGroup_UIEventLobby_Enter1-3 = "いや～お疲れ、先生。\n相変わらず忙しそうだね。"
0-CVGroup_UIEventLobby_Idle1-3 = "いやいや、私を連れてったところで\n役に立たないからね。"
0-CVGroup_UIEventShop_Enter1-1 = "流石の私もサボれなくてさ。\nま、こんな時くらい頑張るよ。"
0-CVGroup_UIEventShop_Idle1-1 = "あははっ。残念だけど、私の持ち場はここだからさ。\n連れていきたい気持ちは分かるけどね。ふふ。"
0-CVGroup_UIEventShop_Buy1-1 = "それにする？いいよ。"
0-CVGroup_UIEventShop_Buy2-1 = "はい、ちゃんと渡したからね。"
0-CVGroup_UIEventShop_Buy3-1 = "おっ、いいね～\n先生、見る目あるじゃん。"
0-CVGroup_UIEventShop_Buy4-1 = "ほ～、それにするんだ。"
0-CVGroup_UIEventMission_Buy1-1 = "お疲れさまでした……！"
0-CVGroup_UIEventMission_Buy2-1 = "も、もう解決されたのですか……？"
0-CVGroup_UIEventLobby_Enter1-4 = "先生、ウトナピシュティムブリッジは現在待機中です。"
0-CVGroup_UIEventLobby_Enter2-3 = "アトラ・ハシースの箱舟占領戦、進行中です。"
0-CVGroup_UIEventLobby_Enter3-1 = "こうしている今も、時間は刻一刻と過ぎていきます。"
0-CVGroup_UIEventLobby_Enter4-1 = "残された時間はあと僅かです。"
0-CVGroup_UIEventLobby_Enter4-2 = "迅速に任務を遂行しましょう。"
0-CVGroup_UIEventLobby_Idle1-4 = "この格好、ですか？"
0-CVGroup_UIEventLobby_Idle1-5 = "……は、はい。\nありがとうございます。"
0-CVGroup_UIEventLobby_Idle2-4 = "疲れていないといえば嘘になりますが……"
0-CVGroup_UIEventLobby_Idle2-5 = "大丈夫です。任務には支障をきたしませんので。"
0-CVGroup_UIEventLobby_Idle3-2 = "この規模のオーパーツを占領するのは、\n決して簡単ではありませんが……。"
0-CVGroup_UIEventLobby_Idle3-3 = "キヴォトスの未来のため、"
0-CVGroup_UIEventLobby_Idle3-4 = "この任務は必ず成功させなければなりません。"
0-CVGroup_UIEventShop_Enter1-2 = "ん、補給物資がいるの？"
0-CVGroup_UIEventShop_Enter2-1 = "必要なものがあったら言ってね。"
0-CVGroup_UIEventShop_Idle1-2 = "考えてみるとすごいよね～"
0-CVGroup_UIEventShop_Idle1-3 = "こんなとこまで来ちゃうなんて、\n思ってもみなかったよ。"
0-CVGroup_UIEventShop_Idle2-1 = "あははっ。\n地上に降りるまで怪我しないでよね、先生。"
0-CVGroup_UIEventShop_Buy1-2 = "お、いいの選んだね。"
0-CVGroup_UIEventShop_Buy2-2 = "はい、これ。\n頑張ってね。"
0-CVGroup_UIEventShop_Buy3-2 = "おー、なるほど。\nそれにしたんだ。"
0-CVGroup_UIEventShop_Buy4-2 = "そうこなくっちゃね。"
0-CVGroup_UIEventMission_Enter1-1 = "アトラ・ハシースの箱舟占領戦……"
0-CVGroup_UIEventMission_Enter1-2 = "私も精一杯お手伝いします。"
0-CVGroup_UIEventMission_Enter2-1 = "先生……必要なものがありましたら、\n何でも仰ってください。"
0-CVGroup_UIEventMission_Idle1-1 = "うぅ……この服、少し胸元が……。"
0-CVGroup_UIEventMission_Idle2-1 = "皆さんの頑張りを見ていると……"
0-CVGroup_UIEventMission_Idle2-2 = "私も、もっと先生のお力になりたいと思うのです。"
0-CVGroup_UIEventMission_Buy1-2 = "お疲れさまでした、先生。"
0-CVGroup_UIEventMission_Buy1-3 = "……作戦も大切ですが、\nどうかご自愛くださいね。"
0-CVGroup_UIEventMission_Buy2-2 = "はい、お疲れさまでした！"
0-CVGroup_UIEventLobby_Enter1-5 = "これが最後の戦いですよ、先生！"
0-CVGroup_UIEventLobby_Enter2-4 = "ついにここまできました……\nアトラ・ハシースの箱舟での決戦です！"
0-CVGroup_UIEventLobby_Idle1-6 = "最後までサポートします！"
0-CVGroup_UIEventLobby_Idle2-6 = "はい……私も、頑張ります！"
0-CVGroup_UIEventShop_Enter1-3 = "こちらで物資を補給していってください！"
0-CVGroup_UIEventShop_Idle1-4 = "最後までサポートします！"
0-CVGroup_UIEventShop_Idle2-2 = "はい……私も、頑張ります！"
0-CVGroup_UIEventShop_Buy1-3 = "こちらですね、先生。"
0-CVGroup_UIEventShop_Buy2-3 = "確認しました。どうぞ！"
0-CVGroup_UIEventLobby_Enter1-6 = "こんにちは、先生。\nこちらでD.U.シラトリ区の復旧作業を行っております。"
0-CVGroup_UIEventLobby_Enter2-5 = "ここがD.U.シラトリ区です。"
0-CVGroup_UIEventLobby_Enter2-6 = "どこも状況は似たようなものですが、\nこちらの区も復旧を急がなければいけませんね。"
0-CVGroup_UIEventLobby_Idle1-7 = "お呼びですか、先生？\nそれで、ご用件は……？"
0-CVGroup_UIEventLobby_Idle2-7 = "多くの生徒が協力してくれたおかげで、復興は順調です。"
0-CVGroup_UIEventLobby_Idle2-8 = "シャーレにお願いして正解でした。"
0-CVGroup_UIEventLobby_Idle3-5 = "……そのご様子ですと、体調は問題なさそうですね。"
0-CVGroup_UIEventLobby_Idle3-6 = "……安心、しました。"
0-CVGroup_UIEventLobby_Idle4-3 = "崩れた建物は建て直すことができますが、"
0-CVGroup_UIEventLobby_Idle4-4 = "失った健康は取り戻せません。"
0-CVGroup_UIEventLobby_Idle4-5 = "決して、ご無理はなさらずに。"
0-CVGroup_UIEventLobby_Enter3-2 = "復旧は順調に進んでいますね。"
0-CVGroup_UIEventLobby_Enter3-3 = "この調子でしたら、じきに元の町並みを取り戻せるでしょう。"
0-CVGroup_UIEventLobby_Enter4-3 = "復旧作業も終わりが見えてきました。"
0-CVGroup_UIEventLobby_Enter4-4 = "先生のご尽力に感謝いたします。"
0-CVGroup_UIEventLobby_Enter5-1 = "シラトリ区の復旧作業は完了いたしました。"
0-CVGroup_UIEventLobby_Enter5-2 = "よろしければ、ご一緒に現場を確認しませんか？"
0-CVGroup_UIEventShop_Enter1-4 = "あ、先生。\nいらっしゃい。"
0-CVGroup_UIEventShop_Enter1-5 = "残った資材、回収するよ～"
0-CVGroup_UIEventShop_Enter2-2 = "もぐもぐ……。"
0-CVGroup_UIEventShop_Enter2-3 = "ん、先生じゃん。"
0-CVGroup_UIEventShop_Enter2-4 = "ふふっ、もしかして先生もサボり？"
0-CVGroup_UIEventShop_Idle1-5 = "はぁ。都市の復旧なんてめんど……。"
0-CVGroup_UIEventShop_Idle1-6 = "D.U.の建物が全部お菓子だったらいいのに。"
0-CVGroup_UIEventShop_Idle1-7 = "そしたらいつでも明太子味が……！"
0-CVGroup_UIEventShop_Idle2-3 = "こんなに忙しいのは生まれて初めてだよ……。"
0-CVGroup_UIEventShop_Idle2-4 = "でもまぁ、世話になったわけだし、\nたまには身体を動かすのも悪くないからね。"
0-CVGroup_UIEventShop_Buy1-4 = "それが必要なの？"
0-CVGroup_UIEventShop_Buy1-5 = "いいよ～。\n好きに持ってって。"
0-CVGroup_UIEventShop_Buy2-4 = "それ、私も気になってたんだよね～"
0-CVGroup_UIEventShop_Buy3-3 = "はいはい、持ってっていいよ。\nまたどうぞ～"
0-CVGroup_UIEventShop_Buy4-3 = "必要なものがあったら、自分で交換してって～"
0-CVGroup_UIEventShop_Buy4-4 = "あ、帳簿もちゃんと書いといてよ。"
0-CVGroup_UIEventMission_Enter1-3 = "こ、こんにちは、先生。"
0-CVGroup_UIEventMission_Enter1-4 = "今日もお互い、頑張りましょう……。"
0-CVGroup_UIEventMission_Enter2-2 = "復旧作業、計画通り進むといいですね。"
0-CVGroup_UIEventMission_Enter2-3 = "先生がいらっしゃるので、心配はしておりませんが。"
0-CVGroup_UIEventMission_Idle1-2 = "作業中の資材があちこちに……。"
0-CVGroup_UIEventMission_Idle1-3 = "先生も足元にお気をつけください。"
0-CVGroup_UIEventMission_Idle2-3 = "ここ最近のリン先輩は、\n特に無理をされているみたいで……"
0-CVGroup_UIEventMission_Idle2-4 = "ちょっと心配です。"
0-CVGroup_UIEventMission_Buy1-4 = "も、もう終わったのですか？\n流石です、先生！"
0-CVGroup_UIEventMission_Buy2-3 = "お疲れさまでした、先生！\nささやかではありますが、連邦生徒会からのお礼です……！"
0-CVGroup_UIEventMission_Interaction1-1 = "今日のお仕事は、これで終わりですね。"
0-CVGroup_UIEventMission_Interaction1-2 = "お疲れさまでした。\nまた明日もお願いいたします！"
