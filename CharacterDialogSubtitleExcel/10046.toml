[translation]
10046-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブー！"
10046-CVGroup_CharacterGet_Idle1-1 = "主殿！夏です、海です、イズナです！\nイズナと一緒に、たくさん遊んでくれますよね！？\nニンニン！"
10046-CVGroup_Cafe_Idle1-1 = "次は何をして遊びましょう？\nスイカ割りでしょうか？水鉄砲でしょうか？\nイズナ、どれも楽しみです！"
10046-CVGroup_Cafe_Idle2-1 = "イズナイズナ～\nコンココン♪"
10046-CVGroup_Cafe_Idle3-1 = "部長とツクヨ殿は、今頃何をしてるんでしょう？"
10046-CVGroup_Cafe_Idle4-1 = "イズナ流忍法・夏バージョンが完成しましたが\n次は冬バージョンも考えておかないとですね……。"
10046-CVGroup_Cafe_Idle5-1 = "エアコンってすごいですね！\n夏でもこんなに涼しいとは……！\nも、もちろん！忍者はこのくらい耐えられますが！"
10046-CVGroup_WeaponGet_Idle1-1 = "主殿が手ずから用意してくださった……\nイズナのための夏用忍具……！嬉しいです、主殿！\nイズナ、これからも主殿の期待に応えるべく、全力を尽くしますね！えへへっ！"
10046-CVGroup_UIEventLobby_Enter1-1 = "主殿～！こっち！こっちですー！\nこちらにイズナが、お席をご用意しました！"
10046-CVGroup_UIEventLobby_Enter2-1 = "あっ、お待ちしておりました！\n主殿！イズナは準備できております！\nどうぞご用命を！"
10046-CVGroup_UIEventLobby_Idle1-1 = "海の家が、今回の拠点……！"
10046-CVGroup_UIEventLobby_Idle1-2 = "拠点と聞くと、何だか忍者っぽいですね！"
10046-CVGroup_UIEventLobby_Idle2-1 = "ふんふんふん～♪\n海の家は色んな料理がいっぱいですね！"
10046-CVGroup_UIEventLobby_Idle2-2 = "主殿はどんなものが好きですか？\nかき氷？たこ焼き？"
10046-CVGroup_UIEventLobby_Idle2-3 = "イズナは、主殿と一緒なら何でも美味しいです！"
10046-CVGroup_UIEventLobby_Idle3-1 = "どんな危険や苦難に直面しても\n真正面から立ち向かうあの姿……。"
10046-CVGroup_UIEventLobby_Idle3-2 = "もしかして……シズコ殿は、忍者なのでは？"
10046-CVGroup_UIEventLobby_Idle4-1 = "何でもご用命ください！"
10046-CVGroup_UIEventLobby_Idle4-2 = "忍者のようにサササッと解決してみせましょう！"
10046-CVGroup_UIEventLobby_Enter3-1 = "今回はイズナと主殿だけでなく\nたくさんの方々が協力してくださいました。"
10046-CVGroup_UIEventLobby_Enter3-2 = "何だかにぎやかで楽しいですね、主殿！"
10046-CVGroup_UIEventLobby_Enter4-1 = "ごくり……主殿と一緒にこなしてきた任務も、\n遂に佳境へと差し掛かりつつありますね……！"
10046-CVGroup_UIEventLobby_Enter4-2 = "イズナもみんなに負けないよう頑張ります！\nニンニン！"
10046-CVGroup_UIEventLobby_Enter5-1 = "この夏は、すごいことがたくさんでした！\nもうイズナの目は回ってしまいそうなほどで……。"
10046-CVGroup_UIEventLobby_Enter5-2 = "……イズナは毎日、とっても楽しかったです！\nえへへっ！ありがとうございました！主殿！"
