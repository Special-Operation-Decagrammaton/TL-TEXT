[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10046-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
10046-CVGroup_CharacterGet_Idle1-1 = "Meu Mestre! É verão, é o mar, é a Izuna!\nVocê vai brincar bastante com a Izuna, não vai!?\nNin-nin!"
10046-CVGroup_Cafe_Idle1-1 = "O que vamos fazer agora?\nQuebrar melancia? Brincar com arminhas de água?\nA Izuna está ansiosa por tudo!"
10046-CVGroup_Cafe_Idle2-1 = "Izuna, Izuna~\nKon-kokon♪"
10046-CVGroup_Cafe_Idle3-1 = "A Presidente e a Senhorita Tsukuyo, o que será que elas estão fazendo agora?"
10046-CVGroup_Cafe_Idle4-1 = "Eu aperfeiçoei a Arte Ninja do Estilo Izuna versão de verão,\nmas acho que vou precisar pensar numa versão de inverno também..."
10046-CVGroup_Cafe_Idle5-1 = "O ar condicionado é incrível, né!\nAté no verão ele nos deixa bem fresquinhos...!\nC-Claro! Como ninja, eu consigo aguentar perfeitamente o calor!"
10046-CVGroup_WeaponGet_Idle1-1 = "O traje ninja de verão que o Meu Mestre preparou especialmente pra mim...! Estou tão feliz, Meu Mestre!\nA Izuna vai continuar dando tudo de si para atender a todas as suas expectativas! Ehehe!"
10046-CVGroup_UIEventLobby_Enter1-1 = "Meu Mestre~! Aqui! É aqui!\nA Izuna preparou um lugarzinho especial pra gente!"
10046-CVGroup_UIEventLobby_Enter2-1 = "Ah, eu estava te esperando!\nMeu Mestre! A Izuna já está pronta!\nPor favor, me dê as suas ordens!"
10046-CVGroup_UIEventLobby_Idle1-1 = "Uma casa de praia como nossa base desta vez...!"
10046-CVGroup_UIEventLobby_Idle1-2 = "Ouvir a palavra 'base' dá um toque tão ninja à missão!"
10046-CVGroup_UIEventLobby_Idle2-1 = "Humhumhum~♪\nTem taaaanta comida gostosa na casa de praia!"
10046-CVGroup_UIEventLobby_Idle2-2 = "O que o Meu Mestre quer comer primeiro?\nRaspadinha? Takoyaki?"
10046-CVGroup_UIEventLobby_Idle2-3 = "Desde que eu esteja com o Meu Mestre, a Izuna vai achar tudo delicioso!"
10046-CVGroup_UIEventLobby_Idle3-1 = "Aquela postura de quem enfrenta qualquer perigo ou dificuldade de frente..."
10046-CVGroup_UIEventLobby_Idle3-2 = "Será que... a Senhorita Shizuko, também é uma ninja nas sombras?"
10046-CVGroup_UIEventLobby_Idle4-1 = "Por favor, me dê qualquer ordem!"
10046-CVGroup_UIEventLobby_Idle4-2 = "Eu vou resolver tudo rapidinho como uma verdadeira ninja!"
10046-CVGroup_UIEventLobby_Enter3-1 = "Desta vez, não fomos apenas a Izuna e o Meu Mestre,\nmas muitas outras pessoas nos ajudaram com o festival."
10046-CVGroup_UIEventLobby_Enter3-2 = "Ficou tudo bem barulhento e divertido, não é, Meu Mestre!"
10046-CVGroup_UIEventLobby_Enter4-1 = "Gulp... A missão que a Izuna cumpriu com o Meu Mestre,\nfinalmente está chegando ao seu grande clímax...!"
10046-CVGroup_UIEventLobby_Enter4-2 = "A Izuna vai se esforçar pra não perder pra ninguém!\nNin-nin!"
10046-CVGroup_UIEventLobby_Enter5-1 = "Este verão foi recheado de coisas incríveis!\nMeus olhos estão até girando de tanta emoção e diversão..."
10046-CVGroup_UIEventLobby_Enter5-2 = "...Eu me diverti tanto todos os dias!\nEhehe! Muito obrigada por brincar comigo, Meu Mestre!"