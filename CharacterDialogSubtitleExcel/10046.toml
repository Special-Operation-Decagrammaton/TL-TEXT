[translation]
10046-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10046-CVGroup_CharacterGet_Idle1-1 = "Meu senhor! É verão, é praia, é a Izuna!\nVocê vai brincar bastante comigo, não vai!?\nNin-nin!"
10046-CVGroup_Cafe_Idle1-1 = "O que vamos fazer agora?\nQuebrar melancias? Brincar com pistolas d'água?\nIzuna está animada para qualquer coisa!"
10046-CVGroup_Cafe_Idle2-1 = "Izuna-Izuna~\nKon-ko-kon♪"
10046-CVGroup_Cafe_Idle3-1 = "O que será que a chefe e a Tsukuyo estão fazendo agora?"
10046-CVGroup_Cafe_Idle4-1 = "A versão de verão do Ninjutsu Estilo Izuna está pronta, mas... acho que preciso pensar na versão de inverno também."
10046-CVGroup_Cafe_Idle5-1 = "O ar-condicionado é incrível! Como pode ser tão fresco mesmo no verão...!\nE-eu, claro! Como uma ninja, eu aguento isso!"
10046-CVGroup_WeaponGet_Idle1-1 = "Preparado pessoalmente pelo meu senhor... um equipamento ninja de verão para a Izuna...! Estou tão feliz, meu senhor!\nContinuarei dando o meu melhor para atender às suas expectativas! Ehehe!"
10046-CVGroup_UIEventLobby_Enter1-1 = "Meu senhor~! Aqui! Por aqui!\nEu preparei um lugar para você!"
10046-CVGroup_UIEventLobby_Enter2-1 = "Ah, eu estava esperando por você!\nMeu senhor! A Izuna está pronta!\nPor favor, pode me dar uma ordem!"
10046-CVGroup_UIEventLobby_Idle1-1 = "A casa de praia é a nossa base desta vez...!"
10046-CVGroup_UIEventLobby_Idle1-2 = "Ouvir a palavra 'base' me faz sentir como uma ninja!"
10046-CVGroup_UIEventLobby_Idle2-1 = "Fun-fun-fun~♪\nA casa de praia tem muitas comidas diferentes!"
10046-CVGroup_UIEventLobby_Idle2-2 = "Do que você gosta, meu senhor?\nRaspadinha? Takoyaki?"
10046-CVGroup_UIEventLobby_Idle2-3 = "Para a Izuna, qualquer coisa fica deliciosa se for com você!"
10046-CVGroup_UIEventLobby_Idle3-1 = "Aquele jeito de enfrentar qualquer perigo ou dificuldade de frente..."
10046-CVGroup_UIEventLobby_Idle3-2 = "Será que... a Shizuko-dono é uma ninja?"
10046-CVGroup_UIEventLobby_Idle4-1 = "Pode me pedir qualquer coisa!"
10046-CVGroup_UIEventLobby_Idle4-2 = "Vou resolver tudo num piscar de olhos, como uma ninja!"
10046-CVGroup_UIEventLobby_Enter3-1 = "Desta vez, não fomos apenas eu e você, meu senhor.\nMuitas pessoas nos ajudaram."
10046-CVGroup_UIEventLobby_Enter3-2 = "É tão animado e divertido, não é, meu senhor!"
10046-CVGroup_UIEventLobby_Enter4-1 = "Gulp... As missões que realizamos juntos estão finalmente chegando ao clímax...!"
10046-CVGroup_UIEventLobby_Enter4-2 = "Vou me esforçar para não perder para ninguém! Nin-nin!"
10046-CVGroup_UIEventLobby_Enter5-1 = "Este verão foi cheio de coisas incríveis! A Izuna está até tonta de tanta emoção..."
10046-CVGroup_UIEventLobby_Enter5-2 = "...Eu me diverti muito todos os dias! Ehehe! Muito obrigada, meu senhor!"
