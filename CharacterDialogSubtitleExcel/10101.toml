[translation]
10101-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
10101-CVGroup_CharacterGet_Idle1-1 = "ここが今回のアルバイト先か……\n海は初めてだが、任せてくれ。"
10101-CVGroup_Cafe_Idle1-1 = "ここで練習してもいいか？"
10101-CVGroup_Cafe_Idle2-1 = "あの装飾……アツコに似合いそうだ。"
10101-CVGroup_Cafe_Idle3-1 = "この辺りは騒々しいな。\nミサキには不向きかもしれない。"
10101-CVGroup_Cafe_Idle4-1 = "カフェか……\nヒヨリのお気に入りの雑誌が、見つかるといいのだが。"
10101-CVGroup_Cafe_Idle5-1 = "たしかここに、家計簿が……。"
10101-CVGroup_WeaponGet_Idle1-1 = "将来は不確かだが、一つだけ断言できる。\n先生からもらったこの信頼の証は……最後まで、大切にする。"
10101-CVGroup_UIEventLobby_Enter1-1 = "次の仕事は……"
10101-CVGroup_UIEventLobby_Enter1-2 = "あ、先生、何か手伝ってほしいのか？"
10101-CVGroup_UIEventLobby_Enter2-1 = "い、いらっしゃいませ！何名様……"
10101-CVGroup_UIEventLobby_Enter2-2 = "……あ、先生だったか。\nすまない。反射でつい。"
10101-CVGroup_UIEventLobby_Enter3-1 = "アルバイトはまだ終わっていない。"
10101-CVGroup_UIEventLobby_Enter3-2 = "最後まで、気を引き締めていこう。"
10101-CVGroup_UIEventLobby_Enter4-1 = "お祭りも終盤だな。\n楽しめたか？先生。"
10101-CVGroup_UIEventLobby_Enter5-1 = "今回の仕事も、無事に終わったな。"
10101-CVGroup_UIEventLobby_Enter5-2 = "先生のおかげだ。\n恩に着る。"
10101-CVGroup_UIEventLobby_Idle1-1 = "海は……果てしなく広くて、\n驚くほど水が多いのだな。"
10101-CVGroup_UIEventLobby_Idle1-2 = "感心した。"
10101-CVGroup_UIEventLobby_Idle2-1 = "もう少し時間があったら、\nステージの完成度をあげられたのに……。"
10101-CVGroup_UIEventLobby_Idle3-1 = "海風は涼しいな。"
10101-CVGroup_UIEventLobby_Idle3-2 = "熱を冷ますのにちょうどいい。"
10101-CVGroup_UIEventLobby_Idle4-1 = "楽しいお祭りになるよう、最善を尽くそう。"
10101-CVGroup_UIEventLobby_Idle4-2 = "先生も、どうかお祭りを楽しんでくれ。"
10101-CVGroup_UIEventMiniGameMission_Enter1-1 = "悪いが先生、少し力を貸してくれ。"
10101-CVGroup_UIEventMiniGameMission_Enter1-2 = "私一人では手が回らなくてな。"
10101-CVGroup_UIEventMiniGameMission_Enter2-1 = "今日の業務リストだ。\n先生、手伝ってもらえるか？"
10101-CVGroup_UIEventMiniGameMission_Idle1-1 = "アルバイトで生計を立てている身だ。"
10101-CVGroup_UIEventMiniGameMission_Idle1-2 = "仕事の案件は、しっかり管理しなければならない。"
10101-CVGroup_UIEventMiniGameMission_Idle2-1 = "せ、先生、私に用か？"
10101-CVGroup_UIEventMiniGameMission_Buy1-1 = "おかげで助かった。先生は敏腕だな。"
10101-CVGroup_UIEventMiniGameMission_Buy2-1 = "もう片付けたのか……？"
10101-CVGroup_UIEventMiniGameMission_Buy2-2 = "お礼にこれを……受け取ってくれ。"
10101-CVGroup_UIEventMiniGameMission_Interaction1-1 = "今日はここまでだ。\n協力に感謝する。"
10101-CVGroup_UIEventMiniGameMission_Interaction1-2 = "先生、一緒に飲み物でも飲まないか？"
