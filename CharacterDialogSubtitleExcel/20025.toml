[translation]
20025-CVGroup_UITitle_Idle1-1 = "ぶ、ブルー……アーカイブ……。"
20025-CVGroup_CharacterGet_Idle1-1 = "あ、あの……ま、また来ることになりました……\n新年早々……すみません……。"
20025-CVGroup_Cafe_Idle1-1 = "あ、す、すみません。\n私なんかがこんな綺麗な服を着るなんて……。"
20025-CVGroup_Cafe_Idle2-1 = "せ、先生……？\nいらっしゃらないのかな……。"
20025-CVGroup_Cafe_Idle3-1 = "ここが先生の……。\nど、どうして私なんかがここに……。"
20025-CVGroup_Cafe_Idle4-1 = "も、もしかして浮いてしまっているんでしょうか……。"
20025-CVGroup_Cafe_Idle5-1 = "隠れたい……。"
20025-CVGroup_WeaponGet_Idle1-1 = "今年も、来年も……。\nそして来世も……！\n先生が嫌いなものは、私がすべて消しちゃいますから！"
20025-CVGroup_UIEventLobby_Enter1-1 = "せ、せせせ、先生！？\nお、おかえりなさい！\nそして、す、すみません！"
20025-CVGroup_UIEventLobby_Enter2-1 = "……へへ……\nここで先生に会えるなんて……。"
20025-CVGroup_UIEventLobby_Enter2-2 = "い、いいえ！\nなにか特別な意味があるとかではなく……！"
20025-CVGroup_UIEventLobby_Idle1-1 = "は、はいっ！？\nど、どどど、どうしましたか、先生！？"
20025-CVGroup_UIEventLobby_Idle2-1 = "へ……？ただ……呼んでみただけ？"
20025-CVGroup_UIEventLobby_Idle2-2 = "そ、そうなんですね。\nえ、へへ……。"
20025-CVGroup_UIEventLobby_Idle3-1 = "新年を迎えて……\n便利屋のみんなと……先生とこうして……。"
20025-CVGroup_UIEventLobby_Idle3-2 = "えへへ……少し、特別な、気持ちです。"
20025-CVGroup_UIEventLobby_Idle4-1 = "先生。やはり、わ、私なんかといても……\nそんな楽しく……。"
20025-CVGroup_UIEventLobby_Idle4-2 = "そんなことない……ですか？そう、ですか……。"
20025-CVGroup_UIEventLobby_Idle4-3 = "……あ、ありがとう、ございます。先生。"
20025-CVGroup_UIEventLobby_Enter3-1 = "よくわからないですが……\nとんでもないことになってしまったみたいです……。"
20025-CVGroup_UIEventLobby_Enter3-2 = "ぜ、全部壊しちゃいましょうか？"
20025-CVGroup_UIEventLobby_Enter4-1 = "アル様は……楽しんでるみたいです……。"
20025-CVGroup_UIEventLobby_Enter4-2 = "よかったです。へ、へへ……。"
20025-CVGroup_UIEventLobby_Enter5-1 = "やっと騒動が落ち着いたみたいです……。"
20025-CVGroup_UIEventLobby_Enter5-2 = "えっと、あのロボットは……\n何だったんでしょうか……？"
