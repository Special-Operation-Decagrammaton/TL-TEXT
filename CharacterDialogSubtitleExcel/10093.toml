[translation]
10093-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～"
10093-CVGroup_CharacterGet_Idle1-1 = "あっ！先生だ！ヤッホー！キララだよ！\nあたしのこと待ってたの？\nあははっ！嬉しいな！"
10093-CVGroup_Cafe_Idle1-1 = "どっかに友達になれそうな子、居ないかな～"
10093-CVGroup_Cafe_Idle2-1 = "結構広い場所だね！\n超気に入ったかも！"
10093-CVGroup_Cafe_Idle3-1 = "あっ？先生！\n先生！こっち！"
10093-CVGroup_Cafe_Idle4-1 = "角度をこうしたら……\nうん！自撮りにぴったりかも！"
10093-CVGroup_Cafe_Idle5-1 = "ここのカフェ、パフェも売ってるのかな？\n甘いもの食べたいんだけど～"
10093-CVGroup_WeaponGet_Idle1-1 = "先生……これ、あたしにくれるの？さ、サンキュー！\nううん、こういう時は真面目に言うべきだね。\nありがとう、先生。"
10093-CVGroup_UIEventLobby_Enter1-1 = "楽しい楽しい修学旅行だね！\n先生も準備できた？"
10093-CVGroup_UIEventLobby_Enter2-1 = "夜桜キララ、楽しむ準備完了～！"
10093-CVGroup_UIEventLobby_Enter3-1 = "先生も旅行楽しんでる？"
10093-CVGroup_UIEventLobby_Enter3-2 = "いいね！\nあたしも超満喫してるよ！"
10093-CVGroup_UIEventLobby_Enter4-1 = "旅行が終わっちゃうのは名残惜しいけど……"
10093-CVGroup_UIEventLobby_Enter4-2 = "大丈夫。\n楽しいことは、まだまだあるからね！"
10093-CVGroup_UIEventLobby_Enter5-1 = "ふわぁ！最後まで休む暇なかったね！\n超楽しかった！"
10093-CVGroup_UIEventLobby_Idle1-1 = "楽しみにしてること？"
10093-CVGroup_UIEventLobby_Idle1-2 = "新しい場所、新しいグルメ、そして何よりも……\n新しい友達でしょ！"
10093-CVGroup_UIEventLobby_Idle2-1 = "いい写真が撮れそうなとこ見つかったけど、先生もどう？"
10093-CVGroup_UIEventLobby_Idle2-2 = "あそこのすっごい大きい木なんだけどさ……！"
10093-CVGroup_UIEventLobby_Idle3-1 = "うん？どうしたの？\n何か面白そうなことでもあった？"
10093-CVGroup_UIEventLobby_Idle4-1 = "あははっ！偶然だね！\nあたしも先生のこと見てたんだ！"
10093-CVGroup_UIEventCardShop_Enter1-1 = "いらっしゃい、先生！\n準備はいい？"
10093-CVGroup_UIEventCardShop_Enter2-1 = "何が出るかな～ワクワクしない？"
10093-CVGroup_UIEventCardShop_Enter3-1 = "最後まで頑張ろう、先生！"
10093-CVGroup_UIEventCardShop_Idle1-1 = "どれが当たりかな～"
10093-CVGroup_UIEventCardShop_Idle2-1 = "引いてみないと分かんないし、スパッと行こう！"
10093-CVGroup_UIEventCardShop_Prize3-1 = "わぁ！超レアカードじゃん！\n先生、すっごい！"
10093-CVGroup_UIEventCardShop_Prize2-1 = "いいカードだね！\nおめでとう！"
10093-CVGroup_UIEventCardShop_Prize1-1 = "よく見るカードだけど……\n絵柄も可愛いし、別にいんじゃない？"
10093-CVGroup_UIEventCardShop_Prize0-1 = "あっ、こ、これは予想外だなぁ……"
10093-CVGroup_UIEventCardShop_Prize0-2 = "が、がっかりしないで！先生！\n次あるから！"
