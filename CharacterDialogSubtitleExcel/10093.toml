[translation]
10093-CVGroup_UITitle_Idle1-1 = "Blue Archive~"
10093-CVGroup_CharacterGet_Idle1-1 = "Ah! Sensei! Yahoo! É a Kirara!\nVocê estava me esperando?\nAhaha! Que felicidade!"
10093-CVGroup_Cafe_Idle1-1 = "Será que tem alguém por aqui que daria uma boa amiga?"
10093-CVGroup_Cafe_Idle2-1 = "É um lugar bem espaçoso, né!\nAcho que adorei!"
10093-CVGroup_Cafe_Idle3-1 = "Ah? Sensei!\nSensei! Aqui!"
10093-CVGroup_Cafe_Idle4-1 = "Se eu colocar o ângulo assim...\nIsso! Perfeito para uma selfie!"
10093-CVGroup_Cafe_Idle5-1 = "Será que esse café vende parfait?\nEstou com vontade de comer algo doce~"
10093-CVGroup_WeaponGet_Idle1-1 = "Sensei... isso é para mim? O-obrigada!\nNão, nessas horas eu deveria falar sério.\nObrigada, Sensei."
10093-CVGroup_UIEventLobby_Enter1-1 = "Uma viagem escolar super divertida! \nVocê também está pronto, Sensei?"
10093-CVGroup_UIEventLobby_Enter2-1 = "Kirara Yozakura, pronta para aproveitar~!"
10093-CVGroup_UIEventLobby_Enter3-1 = "Você também está curtindo a viagem, Sensei?"
10093-CVGroup_UIEventLobby_Enter3-2 = "Que bom!\nEu também estou aproveitando ao máximo!"
10093-CVGroup_UIEventLobby_Enter4-1 = "É uma pena que a viagem esteja acabando, mas..."
10093-CVGroup_UIEventLobby_Enter4-2 = "Está tudo bem.\nAinda tem muita coisa divertida por vir!"
10093-CVGroup_UIEventLobby_Enter5-1 = "Uau! Não tivemos tempo nem de descansar até o fim!\nFoi super divertido!"
10093-CVGroup_UIEventLobby_Idle1-1 = "O que eu estou esperando?"
10093-CVGroup_UIEventLobby_Idle1-2 = "Lugares novos, comidas novas e, acima de tudo...\nNovas amigas, é claro!"
10093-CVGroup_UIEventLobby_Idle2-1 = "Achei um lugar que daria uma ótima foto, o que acha, Sensei?"
10093-CVGroup_UIEventLobby_Idle2-2 = "É aquela árvore enorme ali...!"
10093-CVGroup_UIEventLobby_Idle3-1 = "Hm? O que foi?\nAconteceu algo interessante?"
10093-CVGroup_UIEventLobby_Idle4-1 = "Ahaha! Que coincidência!\nEu também estava olhando para você, Sensei!"
10093-CVGroup_UIEventCardShop_Enter1-1 = "Bem-vindo, Sensei!\nEstá pronto?"
10093-CVGroup_UIEventCardShop_Enter2-1 = "O que será que vai sair? Não é empolgante?"
10093-CVGroup_UIEventCardShop_Enter3-1 = "Vamos dar o nosso melhor até o fim, Sensei!"
10093-CVGroup_UIEventCardShop_Idle1-1 = "Qual será a carta premiada~"
10093-CVGroup_UIEventCardShop_Idle2-1 = "Não dá para saber sem tirar, então vamos logo com isso!"
10093-CVGroup_UIEventCardShop_Prize3-1 = "Uau! É uma carta super rara!\nSensei, você é incrível!"
10093-CVGroup_UIEventCardShop_Prize2-1 = "Que carta boa!\nParabéns!"
10093-CVGroup_UIEventCardShop_Prize1-1 = "É uma carta comum, mas...\nA arte é fofa, então não tem problema, né?"
10093-CVGroup_UIEventCardShop_Prize0-1 = "Ah, i-isso foi inesperado..."
10093-CVGroup_UIEventCardShop_Prize0-2 = "N-não fique desapontado! Sensei!\nVai ter uma próxima!"
