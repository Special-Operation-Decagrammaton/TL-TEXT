[translation]
10120-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ！"
10120-CVGroup_CharacterGet_Idle1-1 = "やあやあ、先生。私のステージへようこそ。\n……このリズムについて来れるかな？"
10120-CVGroup_Cafe_Idle1-1 = "美しい響きが奏でられそうな場所だ。"
10120-CVGroup_Cafe_Idle2-1 = "私の演奏を披露するときが……ついに！"
10120-CVGroup_Cafe_Idle3-1 = "どこにドラムを置こう……。"
10120-CVGroup_Cafe_Idle4-1 = "甘いもの……どこだ……！"
10120-CVGroup_Cafe_Idle5-1 = "先生も来るのだろうか……。"
10120-CVGroup_WeaponGet_Idle1-1 = "おぉー……まるで指先と一心同体のスティックを手に入れたような気持ち……。\n先生のセンスに惚れ惚れしてしまうな。"
10120-CVGroup_UIEventLobby_Enter1-1 = "ふふ、よくぞ来てくれた、先生。"
10120-CVGroup_UIEventLobby_Enter2-1 = "楽にしていてくれて構わない。"
10120-CVGroup_UIEventLobby_Enter2-2 = "もうすぐ演奏が始まるよ。"
10120-CVGroup_UIEventLobby_Enter3-1 = "もっとお菓子が……"
10120-CVGroup_UIEventLobby_Enter3-2 = "いや、練習が必要だ……！"
10120-CVGroup_UIEventLobby_Enter4-1 = "さあ、フィナーレまであと一歩……！"
10120-CVGroup_UIEventLobby_Enter5-1 = "……あぁ、すごかったよ。\nお疲れ様、先生。"
10120-CVGroup_UIEventLobby_Idle1-1 = "ん？どうしたの、先生？"
10120-CVGroup_UIEventLobby_Idle2-1 = "つつくなら、こっちもお願い……。"
10120-CVGroup_UIEventLobby_Idle2-2 = "練習で肩がひどく凝っててね……。"
10120-CVGroup_UIEventLobby_Idle3-1 = "そんなにつついても、マカロンは出ないよ。"
10120-CVGroup_UIEventLobby_Idle4-1 = "そこ座って、先生。"
10120-CVGroup_UIEventLobby_Idle4-2 = "ドラムの真髄、見せてあげようじゃないか……！"
