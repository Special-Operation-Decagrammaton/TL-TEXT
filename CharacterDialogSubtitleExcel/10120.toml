[translation]
10120-CVGroup_UITitle_Idle1-1 = "Blue... Archive!"
10120-CVGroup_CharacterGet_Idle1-1 = "Olá, olá, Sensei. Bem-vindo ao meu palco.\n...Será que você consegue acompanhar este ritmo?"
10120-CVGroup_Cafe_Idle1-1 = "Este é um lugar onde belas melodias poderiam ser tocadas."
10120-CVGroup_Cafe_Idle2-1 = "O momento de apresentar minha performance... finalmente chegou!"
10120-CVGroup_Cafe_Idle3-1 = "Onde eu deveria colocar a bateria..."
10120-CVGroup_Cafe_Idle4-1 = "Doces... onde estão eles...!"
10120-CVGroup_Cafe_Idle5-1 = "Será que o Sensei também virá...?"
10120-CVGroup_WeaponGet_Idle1-1 = "Oh... é como se eu tivesse conseguido baquetas que são uma extensão dos meus dedos...\nEstou encantada com o seu bom gosto, Sensei."
10120-CVGroup_UIEventLobby_Enter1-1 = "Fufu, que bom que você veio, Sensei."
10120-CVGroup_UIEventLobby_Enter2-1 = "Pode ficar à vontade."
10120-CVGroup_UIEventLobby_Enter2-2 = "A apresentação vai começar em breve."
10120-CVGroup_UIEventLobby_Enter3-1 = "Preciso de mais doces..."
10120-CVGroup_UIEventLobby_Enter3-2 = "Não, preciso praticar...!"
10120-CVGroup_UIEventLobby_Enter4-1 = "Vamos lá, estamos a um passo do final...!"
10120-CVGroup_UIEventLobby_Enter5-1 = "...Ah, foi incrível.\nBom trabalho, Sensei."
10120-CVGroup_UIEventLobby_Idle1-1 = "Hm? O que foi, Sensei?"
10120-CVGroup_UIEventLobby_Idle2-1 = "Se for para cutucar, por favor, aqui também..."
10120-CVGroup_UIEventLobby_Idle2-2 = "Meus ombros estão muito tensos por causa do treino..."
10120-CVGroup_UIEventLobby_Idle3-1 = "Não adianta me cutucar, não vão sair macarons daqui."
10120-CVGroup_UIEventLobby_Idle4-1 = "Sente-se ali, Sensei."
10120-CVGroup_UIEventLobby_Idle4-2 = "Vou te mostrar a essência da bateria...!"
