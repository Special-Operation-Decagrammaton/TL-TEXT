10025-CVGroup_UIEventMission_Enter1-1 = "Bem-vindo de volta! Sensei! Conto com você na aula de hoje também!"
10025-CVGroup_UIEventMission_Idle1-1 = "Hehe, este tamanho também é útil às vezes!"
10025-CVGroup_UIEventMission_Idle2-1 = "Hmm... estou ficando com sono..."
10025-CVGroup_UIEventMission_Buy1-1 = "Muito obrigada!"
