10025-CVGroup_Cafe_Idle3-1 = "(S-só mais um pouco... se eu me esticar, talvez consiga...!)"
10025-CVGroup_Cafe_Idle4-1 = "Hmm... estou ficando com sono..."
10025-CVGroup_Cafe_Idle5-1 = "Já que estou com este corpo agora... tudo bem tirar uma soneca, né?"
