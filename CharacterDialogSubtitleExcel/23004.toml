[translation]
23004-CVGroup_UITitle_Idle1-1 = "Blue Archive."
23004-CVGroup_CharacterGet_Idle1-1 = "O que torna uma garota bela não é a maquiagem, mas a paixão."
23004-CVGroup_Cafe_Idle1-1 = "……Se eu fizer um robô do Sensei……\nTalvez eu fique rica."
23004-CVGroup_Cafe_Idle2-1 = "Falando nisso, já está na hora de fazer a manutenção do helicóptero."
23004-CVGroup_Cafe_Idle3-1 = "Hmm……\nO que acha de um assento sanitário com funções de combate?"
23004-CVGroup_Cafe_Idle4-1 = "Por que ninguém precisa de roupas íntimas com camuflagem óptica……?\nE olha que eu estava tão confiante nisso……"
23004-CVGroup_Cafe_Idle5-1 = "Hmm……\nSerá que não tem nada precisando de conserto?"
23004-CVGroup_WeaponGet_Idle1-1 = "O milagre que se concretiza na ponta dos meus dedos.\nDesign e fabricação.\nSensei, pode esperar grandes coisas de mim daqui para frente."
