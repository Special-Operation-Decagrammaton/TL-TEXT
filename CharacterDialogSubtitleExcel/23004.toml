[translation]
23004-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
23004-CVGroup_CharacterGet_Idle1-1 = "少女を美しくするのは化粧ではなく熱情さ。"
23004-CVGroup_Cafe_Idle1-1 = "……先生のロボットを作ったら……\nお金持ちになれるかも。"
23004-CVGroup_Cafe_Idle2-1 = "そういえば、そろそろヘリの整備もしなきゃ。"
23004-CVGroup_Cafe_Idle3-1 = "うーん……\n戦闘機能を持った洗浄便座なんてどうかな。"
23004-CVGroup_Cafe_Idle4-1 = "どうして誰も光学迷彩下着を必要としないのだろう……。\n自信作だったのに……。"
23004-CVGroup_Cafe_Idle5-1 = "うーん……。\n何か修理が必要なものは、ないのかな。"
23004-CVGroup_WeaponGet_Idle1-1 = "私の指先で成り立つ奇跡。\n設計と製作。\n先生。これからの私に期待していて。"
