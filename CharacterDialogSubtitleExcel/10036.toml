[translation]
10036-CVGroup_UITitle_Idle1-1 = "B-Blue Archive……！"
10036-CVGroup_CharacterGet_Idle1-1 = "E-eu me chamo Wakaba Hinata……\nMuito prazer……."
10036-CVGroup_Cafe_Idle1-1 = "A-alguma coisa, tipo……\nEu fico nervosa……."
10036-CVGroup_Cafe_Idle2-1 = "Incrível, tantas coisas……."
10036-CVGroup_Cafe_Idle3-1 = "D-de vez em quando, é bom relaxar\nem lugares assim, não é……?"
10036-CVGroup_Cafe_Idle4-1 = "Hmm, estou cansada……."
10036-CVGroup_Cafe_Idle5-1 = "E-eu posso mesmo relaxar tanto assim……?"
10036-CVGroup_WeaponGet_Idle1-1 = "E-esperar tanto de mim assim…….\n……Eu fico feliz.\nVou me esforçar para corresponder às suas expectativas……!"
10036-CVGroup_UIEventLobby_Enter1-1 = "Bom trabalho, Sensei!\nEu estava esperando por você……!"
10036-CVGroup_UIEventLobby_Enter2-1 = "Que a paz possa te encontrar……"
10036-CVGroup_UIEventLobby_Enter2-2 = "Bem…… será que isso realmente\nnão combina comigo……?"
10036-CVGroup_UIEventLobby_Enter3-1 = "Então, vamos renovar nossas energias e dar o nosso melhor!"
10036-CVGroup_UIEventLobby_Enter4-1 = "Ah, talvez seja melhor nos apressarmos um pouco……?"
10036-CVGroup_UIEventLobby_Enter4-2 = "E-eu vou me esforçar!"
10036-CVGroup_UIEventLobby_Enter5-1 = "É hora de organizar, vou ajudar com todas as minhas forças!"
10036-CVGroup_UIEventLobby_Idle1-1 = "……? Sensei, aconteceu alguma coisa?\nPrecisa de alguma coisa?"
10036-CVGroup_UIEventLobby_Idle2-1 = "E-e-então……?\nAconteceu alguma coisa?"
10036-CVGroup_UIEventLobby_Idle3-1 = "Sensei……?\nTem algo de estranho em mim?"
10036-CVGroup_UIEventLobby_Idle4-1 = "É divertido conversar com você, Sensei, mas, tipo,"
10036-CVGroup_UIEventLobby_Idle4-2 = "não deveríamos partir logo……?"
10036-CVGroup_UIEventShop_Enter1-1 = "N-na verdade, eu preparei com antecedência as coisas que podem ser necessárias!\nPor favor, dê uma olhada……!"
10036-CVGroup_UIEventShop_Enter2-1 = "Se for sobre organização ou gerenciamento, pode deixar comigo……!\nAqui está!"
10036-CVGroup_UIEventShop_Enter3-1 = "Ainda temos um pouco de tempo, \nquer dar uma conferida?"
10036-CVGroup_UIEventShop_Idle1-1 = "E-e-então, o que eu devo fazer……?"
10036-CVGroup_UIEventShop_Idle2-1 = "N-não olhe para mim, mas sim,\npara isso aqui……!"
10036-CVGroup_UIEventShop_Buy1-1 = "Ah, isso é bom!"
10036-CVGroup_UIEventShop_Buy2-1 = "Sim, eu também acho que essa é uma boa escolha."
10036-CVGroup_UIEventShop_Buy3-1 = "Como esperado do Sensei!"
10036-CVGroup_UIEventShop_Buy4-1 = "Fufu, foi uma ótima compra, não foi!"
