[translation]
10036-CVGroup_UITitle_Idle1-1 = "ぶ、ブルーアーカイブ……！"
10036-CVGroup_CharacterGet_Idle1-1 = "わ、若葉ヒナタと申します……\nよろしくお願いします……。"
10036-CVGroup_Cafe_Idle1-1 = "な、何だかその……\n緊張、してしまいますね……。"
10036-CVGroup_Cafe_Idle2-1 = "すごい、色んな物が……。"
10036-CVGroup_Cafe_Idle3-1 = "た、たまにはこういうところで、\nゆっくりしてても良いですよね……？"
10036-CVGroup_Cafe_Idle4-1 = "んん、疲れた……。"
10036-CVGroup_Cafe_Idle5-1 = "こ、こんなにゆっくりしてて良いんでしょうか……？"
10036-CVGroup_WeaponGet_Idle1-1 = "こ、ここまで期待してくださるなんて……。\n……嬉しいです。\n頑張って、期待にお応えしてみせます……！"
10036-CVGroup_UIEventLobby_Enter1-1 = "お疲れ様です、先生！\nお待ちしておりました……！"
10036-CVGroup_UIEventLobby_Enter2-1 = "どうか、安らぎが訪れますように……"
10036-CVGroup_UIEventLobby_Enter2-2 = "えっと……やっぱり私にはこういうの、\n似合わないでしょうか……？"
10036-CVGroup_UIEventLobby_Enter3-1 = "では、気合を入れ直して頑張りましょう！"
10036-CVGroup_UIEventLobby_Enter4-1 = "あ、少し急いだほうが良いかもしれませんね……？"
10036-CVGroup_UIEventLobby_Enter4-2 = "が、頑張ります！"
10036-CVGroup_UIEventLobby_Enter5-1 = "お片付けの時間ですね、\n全力でお手伝いします！"
10036-CVGroup_UIEventLobby_Idle1-1 = "……？先生、どうかされましたか？\n何か必要なものでもありました？"
10036-CVGroup_UIEventLobby_Idle2-1 = "え、えっと……？\nどうかされましたか？"
10036-CVGroup_UIEventLobby_Idle3-1 = "先生……？\n何か私に、変なものでもついてましたか？"
10036-CVGroup_UIEventLobby_Idle4-1 = "こうして先生とお話しするのは楽しいのですが、その、"
10036-CVGroup_UIEventLobby_Idle4-2 = "そろそろ出発した方が……？"
10036-CVGroup_UIEventShop_Enter1-1 = "じ、実は、必要になりそうなものを、事前にまとめておきました！\nご確認、よろしくお願いいたします……！"
10036-CVGroup_UIEventShop_Enter2-1 = "整理や管理でしたら、ぜひ私に任せてください……！\nこちらをどうぞ！"
10036-CVGroup_UIEventShop_Enter3-1 = "まだもう少し時間がありそうです、\n確認されていきますか？"
10036-CVGroup_UIEventShop_Idle1-1 = "え、えっと、私は一体どうしたら……？"
10036-CVGroup_UIEventShop_Idle2-1 = "わ、私ではなくその、\nこちらを見ていただきたく……！"
10036-CVGroup_UIEventShop_Buy1-1 = "あっ、良いですね、それ！"
10036-CVGroup_UIEventShop_Buy2-1 = "はい、私もそれが良いと思います。"
10036-CVGroup_UIEventShop_Buy3-1 = "さすがは先生です！"
10036-CVGroup_UIEventShop_Buy4-1 = "ふふっ、良いお買い物でしたね！"
