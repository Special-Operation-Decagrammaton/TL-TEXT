[translation]
10053-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10053-CVGroup_CharacterGet_Idle1-1 = "ふふっ……準備万端です。\n今日の私の計算に、ミスはありませんよ！"
10053-CVGroup_Cafe_Idle1-1 = "ちょっと疲れた……\nここで休めるかな。"
10053-CVGroup_Cafe_Idle2-1 = "普段から体調管理に気をつけないと……。"
10053-CVGroup_Cafe_Idle3-1 = "このカフェ、面白い。\nちょっと計算外かも。"
10053-CVGroup_Cafe_Idle4-1 = "分かってはいたけど\n運動って簡単じゃないわね。"
10053-CVGroup_Cafe_Idle5-1 = "破産しないといいんだけど……。"
10053-CVGroup_WeaponGet_Idle1-1 = "合理的で……とても運動に適した装備ですね。\nありがとうございます、先生。"
10053-CVGroup_UIEventLobby_Enter1-1 = "「晄輪大祭」へようこそ！\n今日のために、頑張って準備しましたよ！"
10053-CVGroup_UIEventLobby_Enter2-1 = "実行委員ではありますが、いくつかの種目に出場する予定です。"
10053-CVGroup_UIEventLobby_Enter2-2 = "先生、私の活躍、ちゃんと見ててくださいね？"
10053-CVGroup_UIEventLobby_Enter3-1 = "大運動会が始まってから気づいたことですが……"
10053-CVGroup_UIEventLobby_Enter3-2 = "……思ったよりずっと忙しいですね。\n色んな意味で……。"
10053-CVGroup_UIEventLobby_Enter4-1 = "晄輪大祭も、もう終盤……\n最後まで気を緩めないでくださいね！"
10053-CVGroup_UIEventLobby_Enter5-1 = "晄輪大祭もこれで終わりですね。\n先生、お疲れ様でした。"
10053-CVGroup_UIEventLobby_Enter5-2 = "その、もしよかったら……。"
10053-CVGroup_UIEventLobby_Enter5-3 = "後夜祭のキャンプファイヤー、一緒に行きませんか？"
10053-CVGroup_UIEventLobby_Idle1-1 = "コンディションチェックよし、装備よし。"
10053-CVGroup_UIEventLobby_Idle1-2 = "「晄輪大祭」の計画は……完璧！"
10053-CVGroup_UIEventLobby_Idle2-1 = "今なんだか、物騒な生徒の集団が……。"
10053-CVGroup_UIEventLobby_Idle3-1 = "あ、ほっぺたの星マークのことですか？"
10053-CVGroup_UIEventLobby_Idle3-2 = "さっきマキに描いてもらったんです。"
10053-CVGroup_UIEventLobby_Idle3-3 = "せっかくのお祭りですから、フェイスペイントをしてあげる、と。"
10053-CVGroup_UIEventLobby_Idle3-4 = "やっぱり、ちょっと……浮かれているように見えます……？"
