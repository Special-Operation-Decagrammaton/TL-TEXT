[translation]
10053-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10053-CVGroup_CharacterGet_Idle1-1 = "Fufu... Estou pronta.\nNão há erros nos meus cálculos de hoje!"
10053-CVGroup_Cafe_Idle1-1 = "Estou um pouco cansada...\nSerá que posso descansar aqui?"
10053-CVGroup_Cafe_Idle2-1 = "Preciso cuidar da minha saúde no dia a dia..."
10053-CVGroup_Cafe_Idle3-1 = "Este café é interessante.\nTalvez esteja fora dos meus cálculos."
10053-CVGroup_Cafe_Idle4-1 = "Eu já sabia, mas...\nExercícios não são nada fáceis."
10053-CVGroup_Cafe_Idle5-1 = "Espero não acabar falindo..."
10053-CVGroup_WeaponGet_Idle1-1 = "É um equipamento racional e muito adequado para exercícios.\nObrigada, Sensei."
10053-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo ao Festival Esportivo de Halo!\nEu me esforcei muito para preparar tudo para hoje!"
10053-CVGroup_UIEventLobby_Enter2-1 = "Embora eu seja do comitê executivo, pretendo participar de algumas modalidades."
10053-CVGroup_UIEventLobby_Enter2-2 = "Sensei, certifique-se de observar meu desempenho, está bem?"
10053-CVGroup_UIEventLobby_Enter3-1 = "Percebi algo desde que o grande festival esportivo começou..."
10053-CVGroup_UIEventLobby_Enter3-2 = "...está muito mais agitado do que eu pensava.\nEm vários sentidos..."
10053-CVGroup_UIEventLobby_Enter4-1 = "O Festival Esportivo de Halo já está chegando ao fim...\nNão baixe a guarda até o último momento!"
10053-CVGroup_UIEventLobby_Enter5-1 = "O Festival Esportivo de Halo termina aqui.\nSensei, bom trabalho."
10053-CVGroup_UIEventLobby_Enter5-2 = "Digo, se você não se importar..."
10053-CVGroup_UIEventLobby_Enter5-3 = "Gostaria de ir comigo à fogueira do festival noturno?"
10053-CVGroup_UIEventLobby_Idle1-1 = "Verificação de condição concluída, equipamento pronto."
10053-CVGroup_UIEventLobby_Idle1-2 = "O plano para o Festival Esportivo de Halo está... perfeito!"
10053-CVGroup_UIEventLobby_Idle2-1 = "Sinto que um grupo de alunas perigosas acabou de passar por aqui..."
10053-CVGroup_UIEventLobby_Idle3-1 = "Ah, está falando da marca de estrela na minha bochecha?"
10053-CVGroup_UIEventLobby_Idle3-2 = "A Maki desenhou para mim agorinha."
10053-CVGroup_UIEventLobby_Idle3-3 = "Ela disse que, como é um festival, ela faria uma pintura facial em mim."
10053-CVGroup_UIEventLobby_Idle3-4 = "Será que... eu pareço um pouco animada demais...?"
