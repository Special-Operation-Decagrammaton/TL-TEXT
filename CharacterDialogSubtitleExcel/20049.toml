[translation]
20049-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20049-CVGroup_CharacterGet_Idle1-1 = "Está quente e tudo está pegajoso...\nE então, o que vamos fazer?"
20049-CVGroup_Cafe_Idle1-1 = "Que tédio..."
20049-CVGroup_Cafe_Idle2-1 = "(Hm... o que é isso?)"
20049-CVGroup_Cafe_Idle3-1 = "Então é assim que as outras pessoas passam o tempo..."
20049-CVGroup_Cafe_Idle4-1 = "Eu já disse que não tenho interesse.\n...Sério mesmo."
20049-CVGroup_Cafe_Idle5-1 = "(Sensei... o que será que ele está fazendo?)"
20049-CVGroup_WeaponGet_Idle1-1 = "Será que vou usar isso aqui mesmo...\n'Armas também têm seu uso'?\nHaa... você é bom de lábia, hein.\nEntendi... obrigada."
20049-CVGroup_UIEventLobby_Enter1-1 = "Ah, você chegou.\nAh... bem, estou me divertindo até que razoavelmente."
20049-CVGroup_UIEventLobby_Enter2-1 = "Então o mar é um lugar assim..."
20049-CVGroup_UIEventLobby_Enter3-1 = "Haa... eu queria passar o tempo em silêncio."
20049-CVGroup_UIEventLobby_Enter3-2 = "Dê um jeito nisso, Sensei."
20049-CVGroup_UIEventLobby_Enter4-1 = "O que é essa multidão...\nEmbora não pareça haver perigo."
20049-CVGroup_UIEventLobby_Enter5-1 = "Já acabou...\n...Sim, na verdade não foi ruim.\nEu admito. Só desta vez, hein."
20049-CVGroup_UIEventLobby_Idle1-1 = "O quê?"
20049-CVGroup_UIEventLobby_Idle1-2 = "Não importa o que o Sensei diga, eu não pretendo me divertir."
20049-CVGroup_UIEventLobby_Idle2-1 = "(...Talvez esteja mais refrescante que o normal.)"
20049-CVGroup_UIEventLobby_Idle3-1 = "Q-quê? Por que você me cutucou?\nEu não sou um bicho de pelúcia, sabia...!"
20049-CVGroup_UIEventLobby_Idle4-1 = "...Está sem fazer nada?\nPor que não vai ver o palco?"
20049-CVGroup_UIEventLobby_Idle4-2 = "Eu? Não tenho interesse, mas...\nBem, se o Sensei quer ir."
20049-CVGroup_UIEventLobby_Idle4-3 = "Eu te acompanho."
