[translation]
20049-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
20049-CVGroup_CharacterGet_Idle1-1 = "暑いし、ベタベタする……。\nで、何するの？"
20049-CVGroup_Cafe_Idle1-1 = "退屈……。"
20049-CVGroup_Cafe_Idle2-1 = "（あれ……何？）"
20049-CVGroup_Cafe_Idle3-1 = "他の人は普段こう過ごしてるんだ……。"
20049-CVGroup_Cafe_Idle4-1 = "だから、興味ないってば。\n……本当に。"
20049-CVGroup_Cafe_Idle5-1 = "（先生……何してるんだろ）"
20049-CVGroup_WeaponGet_Idle1-1 = "こんなとこで使うかな……。\n「武器も使いよう」？\nはぁ……そういうとこ、口回るよね。\nわかった……ありがとう。"
20049-CVGroup_UIEventLobby_Enter1-1 = "あ、来たんだ。\nあー……まあ、それなりに楽しんでるよ。"
20049-CVGroup_UIEventLobby_Enter2-1 = "海って、こういうところなんだ……。"
20049-CVGroup_UIEventLobby_Enter3-1 = "はあ……静かに過ごしたい。"
20049-CVGroup_UIEventLobby_Enter3-2 = "なんとかしてよ、先生。"
20049-CVGroup_UIEventLobby_Enter4-1 = "何、この人混み……。\n危険はないみたいだけど。"
20049-CVGroup_UIEventLobby_Enter5-1 = "もう終わりなんだ……。\n……うん、たしかに悪くなかった。\n認めるよ。今回だけね。"
20049-CVGroup_UIEventLobby_Idle1-1 = "なに？"
20049-CVGroup_UIEventLobby_Idle1-2 = "先生がなんと言おうと楽しむつもりはないよ。"
20049-CVGroup_UIEventLobby_Idle2-1 = "（……いつもより、新鮮かも）"
20049-CVGroup_UIEventLobby_Idle3-1 = "な、なに？なんで突っついたの？\n私、ぬいぐるみじゃないんだけど……！"
20049-CVGroup_UIEventLobby_Idle4-1 = "……暇なの？\nステージでも見てきたら？"
20049-CVGroup_UIEventLobby_Idle4-2 = "私？興味ないけど……\nまあ、先生が行きたいなら。"
20049-CVGroup_UIEventLobby_Idle4-3 = "付き合ってあげるよ。"
