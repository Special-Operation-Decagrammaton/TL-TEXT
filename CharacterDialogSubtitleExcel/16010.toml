[translation]
16010-CVGroup_UITitle_Idle1-1 = "B-Blue Archive……！"
16010-CVGroup_CharacterGet_Idle1-1 = "Sensei…… o-o que achou……?\nÉ a primeira vez que faço um traje de líder de torcida, mas……\nNão está…… tão ruim, está?"
16010-CVGroup_Cafe_Idle1-1 = "Tem alguém…… precisando de apoio?"
16010-CVGroup_Cafe_Idle2-1 = "Essa atmosfera animada…… não é ruim."
16010-CVGroup_Cafe_Idle3-1 = "Estou cansada…… acho que fiquei com um pouco de sede."
16010-CVGroup_Cafe_Idle4-1 = "Aquilo ali…… talvez eu deva tentar modificar um pouco."
16010-CVGroup_Cafe_Idle5-1 = "Será que aqui está bom?\nOu talvez…… por aqui?"
16010-CVGroup_WeaponGet_Idle1-1 = "Obrigada, Sensei……\nContinuarei te mostrando.\n……Novas paisagens que você nunca viu antes."
16010-CVGroup_UIEventLobby_Enter1-1 = "Ainda não estou acostumada com esse visual, mas……"
16010-CVGroup_UIEventLobby_Enter1-2 = "Mas se for para o sucesso do Festival Esportivo de Halo……."
16010-CVGroup_UIEventLobby_Enter2-1 = "Fufu, espero que seja um festival divertido."
16010-CVGroup_UIEventLobby_Enter3-1 = "(Liderança de torcida, não importa o quanto eu pratique, não consigo me acostumar……)"
16010-CVGroup_UIEventLobby_Enter4-1 = "Parece que os preparativos para o Festival Esportivo de Halo quase terminaram.\nSó mais um pouco…… vamos nos esforçar."
16010-CVGroup_UIEventLobby_Enter5-1 = "Obrigada por ajudar, Sensei."
16010-CVGroup_UIEventLobby_Enter5-2 = "Aproveite nossa torcida no evento principal também."
16010-CVGroup_UIEventLobby_Idle1-1 = "F-força, força……! Sensei!"
16010-CVGroup_UIEventLobby_Idle2-1 = "A roupa que eu fiz……\nSerá que…… ninguém ligou muito para ela……."
16010-CVGroup_UIEventLobby_Idle3-1 = "Você está curioso sobre a parte da cauda desta roupa……?"
16010-CVGroup_UIEventLobby_Idle3-2 = "Agora… eu não posso dizer……"
16010-CVGroup_UIEventLobby_Idle3-3 = "Depois, eu te conto a estrutura em segredo……"
16010-CVGroup_UIEventLobby_Idle4-1 = "No fim das contas, queimar de paixão…… é um romance, não é?"
16010-CVGroup_UIEventShop_Enter1-1 = "Sensei, bem-vindo.\nEu estava coletando os materiais necessários para os preparativos do Festival Esportivo de Halo."
16010-CVGroup_UIEventShop_Enter2-1 = "Traga os suprimentos necessários para o Festival Esportivo de Halo para cá."
16010-CVGroup_UIEventShop_Idle1-1 = "Hm? O que foi?"
16010-CVGroup_UIEventShop_Idle2-1 = "Ah…… se for para torcer, eu faço isso depois.\nAgora estou um pouco……."
16010-CVGroup_UIEventShop_Buy1-1 = "Sim, é um bom item.\nObrigada por ajudar."
16010-CVGroup_UIEventShop_Buy2-1 = "É algo simples, mas…… um agradecimento por ter me ajudado.\nPor favor, aceite."
16010-CVGroup_UIEventShop_Buy3-1 = "Com isso…… acho que todos ficarão felizes."
16010-CVGroup_UIEventShop_Buy4-1 = "Foi muito útil.\nObrigada, Sensei."
16010-CVGroup_UIEventShop_Enter3-1 = "Bom trabalho, Sensei.\nSe tiver sobrado algum suprimento, eu troco para você."
