[translation]
16010-CVGroup_UITitle_Idle1-1 = "ブ、ブルーアーカイブ……！"
16010-CVGroup_CharacterGet_Idle1-1 = "先生……ど、どう……？\nチアリーダーの衣装を作ったのは、初めてだけど……\nそんなに悪くは……ない？"
16010-CVGroup_Cafe_Idle1-1 = "応援が必要な人……いる？"
16010-CVGroup_Cafe_Idle2-1 = "この賑やかな雰囲気……悪くない。"
16010-CVGroup_Cafe_Idle3-1 = "疲れた……少し喉乾いてきたかも。"
16010-CVGroup_Cafe_Idle4-1 = "あれは……ちょっと改造してみようかな。"
16010-CVGroup_Cafe_Idle5-1 = "ここら辺でいいかな？\nそれとも……この辺？"
16010-CVGroup_WeaponGet_Idle1-1 = "ありがとう、先生……\nこれからも見せ続けてあげる。\n……今まで見られなかったような、新しい景色を。"
16010-CVGroup_UIEventLobby_Enter1-1 = "この格好、ちょっと慣れないけど……"
16010-CVGroup_UIEventLobby_Enter1-2 = "でも「晄輪大祭」が成功するためなら……。"
16010-CVGroup_UIEventLobby_Enter2-1 = "ふふ、楽しいお祭りになると良いね。"
16010-CVGroup_UIEventLobby_Enter3-1 = "（チアリーディング、どれだけ練習してもあんまり慣れない……）"
16010-CVGroup_UIEventLobby_Enter4-1 = "「晄輪大祭」の準備もほとんど終わったみたい。\nあともう少し……頑張ろう。"
16010-CVGroup_UIEventLobby_Enter5-1 = "手伝ってくれてありがとう、先生。"
16010-CVGroup_UIEventLobby_Enter5-2 = "本祭でも私たちの応援を楽しんでね。"
16010-CVGroup_UIEventLobby_Idle1-1 = "が、頑張れ、頑張れ……！先生！"
16010-CVGroup_UIEventLobby_Idle2-1 = "私が作った服だけど……\nみんな……あんまり気にしてないのかな……。"
16010-CVGroup_UIEventLobby_Idle3-1 = "この服のしっぽの辺りが気になるって……？"
16010-CVGroup_UIEventLobby_Idle3-2 = "今は…ちょっと言えないけど……"
16010-CVGroup_UIEventLobby_Idle3-3 = "後でこっそり、構造を教えてあげる……"
16010-CVGroup_UIEventLobby_Idle4-1 = "やっぱり情熱を燃やすのは……ロマンだね。"
16010-CVGroup_UIEventShop_Enter1-1 = "先生、いらっしゃい。\n「晄輪大祭」の準備に必要な資材を集めていたところ。"
16010-CVGroup_UIEventShop_Enter2-1 = "「晄輪大祭」の準備に必要な物資は、ここに持ってきてね。"
16010-CVGroup_UIEventShop_Idle1-1 = "ん？どうしたの？"
16010-CVGroup_UIEventShop_Idle2-1 = "あの……応援なら後でしてあげる。\n今はちょっと……。"
16010-CVGroup_UIEventShop_Buy1-1 = "うん、良いものだね。\n手伝ってくれてありがとう。"
16010-CVGroup_UIEventShop_Buy2-1 = "ささやかだけど……手伝ってくれたお礼。\n受けとってほしい。"
16010-CVGroup_UIEventShop_Buy3-1 = "これなら……みんな喜ぶと思う。"
16010-CVGroup_UIEventShop_Buy4-1 = "すごく役に立ったよ。\nありがとう、先生。"
16010-CVGroup_UIEventShop_Enter3-1 = "お疲れさま、先生。\nもし残った物資があったら、私が交換してあげる。"
