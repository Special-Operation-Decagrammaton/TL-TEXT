[translation]
20003-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20003-CVGroup_CharacterGet_Idle1-1 = "正義実現委員会1年生マシロ、お呼びが掛かりましたのでこちらに。\n未熟者ですが、いついかなる時もベストを尽くします。"
20003-CVGroup_Cafe_Idle1-1 = "こういう装飾、\nツルギ先輩は好きじゃないかな……。"
20003-CVGroup_Cafe_Idle2-1 = "ハスミ先輩の羽、\nこの家具みたいにフワフワしてそうだったな。"
20003-CVGroup_Cafe_Idle3-1 = "明鏡止水……。"
20003-CVGroup_Cafe_Idle4-1 = "ツルギ先輩の首、大丈夫なのかな……？"
20003-CVGroup_Cafe_Idle5-1 = "たまにはこういうとこも悪くないですね。"
20003-CVGroup_Cafe_Idle6-1 = "可愛いな……。ふふっ。"
20003-CVGroup_WeaponGet_Idle1-1 = "これぞ……本当の正義……。"
