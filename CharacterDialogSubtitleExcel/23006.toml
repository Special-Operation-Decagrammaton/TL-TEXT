[translation]
23006-CVGroup_UITitle_Idle1-1 = "ブル～アーカイブ！"
23006-CVGroup_CharacterGet_Idle1-1 = "えへへ、お祭り運営委員会のシズコです～。\nこれからよろしくお願いしますね、先生？\nえ？……ああ、はいはいそうですよ、営業用の台詞です！"
23006-CVGroup_Cafe_Idle1-1 = "萌え萌えきゅ～ん……\nこれで合ってるかな？"
23006-CVGroup_Cafe_Idle2-1 = "次のお祭りに向けて、\nしっかりと計画を立てなくちゃ。"
23006-CVGroup_Cafe_Idle3-1 = "百夜堂の新メニュー、\n何にしようかな……？"
23006-CVGroup_Cafe_Idle4-1 = "次のお祭りに、何か新しくて大胆な試みを……\n全員で着物風バニーガール、とか？"
23006-CVGroup_Cafe_Idle5-1 = "ここ、百夜堂の出張店舗の場所に良さそう！"
23006-CVGroup_WeaponGet_Idle1-1 = "これ、どんなお祭りでも手に入らない非売品、ですね。\nえへへっ、大切にします！先生！"
23006-CVGroup_UIEventShop_Enter1-1 = "百夜堂の出張販売です！\nさあご主人様、必要な物は何でしょうか？"
23006-CVGroup_UIEventShop_Enter2-1 = "あ、先生！\nいらっしゃいませ～！"
23006-CVGroup_UIEventShop_Enter2-2 = "さあさあ、お好きなだけ見ていってください！"
23006-CVGroup_UIEventShop_Enter3-1 = "お祭りは終わってしまいましたが、\nまだまだ営業中です。"
23006-CVGroup_UIEventShop_Enter3-2 = "残り物には福があるって言いますから、\nさあ先生、どうぞ！"
23006-CVGroup_UIEventShop_Idle1-1 = "お祭りでも、いえお祭りだからこそ、\n百夜堂は止まりませんよ！"
23006-CVGroup_UIEventShop_Idle1-2 = "……まぁ、私たちは同時にお祭り運営委員会でもあるので、\n当たり前なんですけどね、えへっ。"
23006-CVGroup_UIEventShop_Idle2-1 = "よし、ここは……\n萌え萌え～、キュン♪"
23006-CVGroup_UIEventShop_Idle2-2 = "……えっ、これちょっと古いんですか？\nそうなんですか！？"
23006-CVGroup_UIEventShop_Buy1-1 = "あっ、それ……！\nい、いえいえ、どうぞどうぞ。\n別に余ったら貰おうとか思っていたわけではなく……！"
23006-CVGroup_UIEventShop_Buy2-1 = "それを選ぶとは、さすが先生！\nお目が高いです！"
23006-CVGroup_UIEventShop_Buy3-1 = "お買い上げありがとうございます、ご主人様♪"
23006-CVGroup_UIEventShop_Buy4-1 = "あ、それやっぱり良い品だと思いますよね？\nえへへっ。"
