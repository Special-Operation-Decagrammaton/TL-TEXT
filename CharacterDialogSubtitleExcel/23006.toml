[translation]
23006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
23006-CVGroup_CharacterGet_Idle1-1 = "Hehe, eu sou a Shizuko, do Comitê Organizador de Festivais.\nDe agora em diante, conto com você, Sensei.\nHã? ...Ah, sim, sim, é isso mesmo, é uma fala de vendas!"
23006-CVGroup_Cafe_Idle1-1 = "Moe moe kyun...\nSerá que é assim que se faz?"
23006-CVGroup_Cafe_Idle2-1 = "Preciso planejar tudo direitinho\npara o próximo festival."
23006-CVGroup_Cafe_Idle3-1 = "O que será que eu deveria colocar\nno novo menu da Hyakkiyako?"
23006-CVGroup_Cafe_Idle4-1 = "Para o próximo festival, que tal algo novo e ousado...\nTipo, todas nós vestidas de coelhinhas com quimono?"
23006-CVGroup_Cafe_Idle5-1 = "Este lugar parece ótimo para uma\nloja itinerante da Hyakkiyako!"
23006-CVGroup_WeaponGet_Idle1-1 = "Isso é um item exclusivo que não se encontra em nenhum festival, né?\nHehehe, vou cuidar muito bem disso! Sensei!"
23006-CVGroup_UIEventShop_Enter1-1 = "É a loja itinerante da Hyakkiyako!\nVamos lá, mestre, o que você precisa?"
23006-CVGroup_UIEventShop_Enter2-1 = "Ah, Sensei!\nSeja bem-vindo!"
23006-CVGroup_UIEventShop_Enter2-2 = "Vamos, vamos, fique à vontade para olhar tudo o que quiser!"
23006-CVGroup_UIEventShop_Enter3-1 = "O festival já acabou, mas\nnós ainda estamos abertos."
23006-CVGroup_UIEventShop_Enter3-2 = "Dizem que quem chega por último leva o melhor, então\nvamos lá, Sensei, pode escolher!"
23006-CVGroup_UIEventShop_Idle1-1 = "Mesmo durante o festival, ou melhor, justamente por ser festival,\na Hyakkiyako não para!"
23006-CVGroup_UIEventShop_Idle1-2 = "Bem, como também somos o Comitê Organizador do Festival,\nisso é o esperado, né? Ehe."
23006-CVGroup_UIEventShop_Idle2-1 = "Certo, aqui vai...\nMoe moe, kyun♪"
23006-CVGroup_UIEventShop_Idle2-2 = "...Hã? Isso é um pouco antigo?\nSério mesmo!?"
23006-CVGroup_UIEventShop_Buy1-1 = "Ah, isso...! \nN-não, não, pode levar, pode levar.\nNão é como se eu estivesse pensando em ficar com o que sobrasse nem nada disso...!"
23006-CVGroup_UIEventShop_Buy2-1 = "Escolher isso... como esperado do Sensei!\nVocê tem um ótimo olho!"
23006-CVGroup_UIEventShop_Buy3-1 = "Obrigada pela compra, mestre♪"
23006-CVGroup_UIEventShop_Buy4-1 = "Ah, você também acha que esse é um bom produto, né?\nHehehe."
