[translation]
20037-CVGroup_UITitle_Idle1-1 = "Blue Archive……。"
20037-CVGroup_CharacterGet_Idle1-1 = "Ugh, vai me dar mais trabalho chato de novo...? \nBem, se é um pedido do Sensei, eu até ajudo..."
20037-CVGroup_Cafe_Idle1-1 = "Será que tem algum lugar aqui onde eu possa comer donuts escondida?"
20037-CVGroup_Cafe_Idle2-1 = "Não me diga que tem trabalho aqui também...? \nSério mesmo?"
20037-CVGroup_Cafe_Idle3-1 = "(Se eu dormir de óculos escuros... será que vai parecer que estou trabalhando...?)"
20037-CVGroup_Cafe_Idle4-1 = "Esse traje de banho é bem discreto, não chama muita atenção."
20037-CVGroup_Cafe_Idle5-1 = "Bem, hoje eu não vou entrar na piscina mesmo... então tudo bem."
20037-CVGroup_WeaponGet_Idle1-1 = "Hmm. Não esperava que fosse fazer tudo isso por mim. \nSe algo acontecer com o Sensei, eu vou te proteger com tudo o que tenho. \n...Posso descansar até que esse momento chegue?"
20037-CVGroup_UIEventLobby_Enter1-1 = "Ei, Sensei. Bom trabalho."
20037-CVGroup_UIEventLobby_Enter2-1 = "Parque aquático... \nSe não fosse trabalho, seria um lugar que eu adoraria..."
20037-CVGroup_UIEventLobby_Enter3-1 = "Todo mundo está tão animado~ \nDeve ser porque vieram se divertir."
20037-CVGroup_UIEventLobby_Enter4-1 = "Vamos lá, já está quase na hora de bater o ponto!"
20037-CVGroup_UIEventLobby_Enter5-1 = "Aconteceu de tudo, mas finalmente terminamos. \nBom trabalho para você também, Sensei."
20037-CVGroup_UIEventLobby_Idle1-1 = "Toboágua?"
20037-CVGroup_UIEventLobby_Idle1-2 = "Não é que eu tenha medo... \nÉ que, ah, é meio trabalhoso..."
20037-CVGroup_UIEventLobby_Idle2-1 = "Que calor... \nTer que trabalhar num dia desses é o fim da picada~"
20037-CVGroup_UIEventLobby_Idle3-1 = "Repor o açúcar é essencial em dias quentes como este."
20037-CVGroup_UIEventLobby_Idle3-2 = "Exato, donuts são itens de primeira necessidade."
20037-CVGroup_UIEventLobby_Idle4-1 = "Ah! N-nenhuma anormalidade no local! \n...Ah, Sensei? Que susto."
20037-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Veio trocar alguma coisa? \nTem bastante coisa aqui, dá uma olhada~"
20037-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Ahhh, que refrescante~ \nFique à vontade, Sensei."
20037-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Expediente encerrado~ E aí, Sensei. \nQue tal irmos comemorar?"
20037-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Mesmo sendo você, Sensei, não posso entregar de graça, né?"
20037-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Olha para os produtos, não para mim~"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Uau!? \nNem sabia que tinha isso aqui!"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "S-Sensei. \nVocê tem mais sorte do que eu pensava, hein?"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Parabéns~ \nIsso aqui é o primeiro prêmio."
20037-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Acho que acabou tudo por aqui. \nNossa, nós dois nos esforçamos bastante."
