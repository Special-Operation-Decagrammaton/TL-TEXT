[translation]
20037-CVGroup_UITitle_Idle1-1 = "Blue~ Archive..."
20037-CVGroup_CharacterGet_Idle1-1 = "Ugeh, quer me fazer trabalhar em mais um serviço problemático...?\\nBom, se é um pedido do Sensei, eu posso te acompanhar por enquanto..."
20037-CVGroup_Cafe_Idle1-1 = "Será que tem algum lugar por aqui onde eu possa comer donuts escondida?"
20037-CVGroup_Cafe_Idle2-1 = "Não me diga que tem trabalho até aqui...?\\nNão pode ser, sério~?"
20037-CVGroup_Cafe_Idle3-1 = "（Se eu dormir de óculos de sol... será que vai parecer que estou trabalhando...?）"
20037-CVGroup_Cafe_Idle4-1 = "Este maiô é bem simples e não chama muito a atenção, né."
20037-CVGroup_Cafe_Idle5-1 = "Bom, hoje eu não vou entrar na piscina mesmo... então tudo bem."
20037-CVGroup_WeaponGet_Idle1-1 = "Hmm. Não achava que você iria tão longe por mim.\\nSe acontecer alguma coisa com o senhor, Sensei, eu vou te salvar com todas as minhas forças.\\n...Mas posso descansar até esse momento chegar?"
20037-CVGroup_UIEventLobby_Enter1-1 = "E aí, Sensei. Bom trabalho~"
20037-CVGroup_UIEventLobby_Enter2-1 = "Parque aquático...\\nSe não fosse a trabalho, seria um lugar que eu adoraria..."
20037-CVGroup_UIEventLobby_Enter3-1 = "Todo mundo tá bem animado, né~\\nDeve ser porque vieram para se divertir."
20037-CVGroup_UIEventLobby_Enter4-1 = "Olha só, já está quase na hora de largar o expediente!"
20037-CVGroup_UIEventLobby_Enter5-1 = "Aconteceu muita coisa, mas conseguimos terminar de algum jeito.\\nBom trabalho para você também, Sensei."
20037-CVGroup_UIEventLobby_Idle1-1 = "Toboágua?"
20037-CVGroup_UIEventLobby_Idle1-2 = "Não é bem medo, é mais que...\\nS-Sabe, dá uma preguiça..."
20037-CVGroup_UIEventLobby_Idle2-1 = "Que calor...\\nTrabalhar num dia quente assim é a pior coisa do mundo~"
20037-CVGroup_UIEventLobby_Idle3-1 = "É exatamente nesses dias quentes que repor o açúcar é importante."
20037-CVGroup_UIEventLobby_Idle3-2 = "So, donuts são itens de primeira necessidade."
20037-CVGroup_UIEventLobby_Idle4-1 = "Ah! N-Nenhuma anormalidade no local!\\n...Ah, era você, Sensei? Que susto."
20037-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Veio fazer trocas?\\nTem várias coisas, dá uma olhada~"
20037-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Ha~ah, que fresquinho~~\\nAproveita para relaxar também, Sensei."
20037-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Expediente encerrado~ E aí, Sensei.\\nQue tal sairmos para comemorar?"
20037-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Por mais que seja você, Sensei, não posso te dar isso de graça, sabe?"
20037-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Não olhe para mine, olhe para os produtos~"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Uau!?\\nTinha uma coisa dessas aí!"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "S-Sensei.\\nVocê tem mais sorte do que eu imaginava, hein?"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Parabéns~\\nEsse é o primeiro prêmio."
20037-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Acho que com isso acabou tudo.\\nUfa, nós dois nos esforçamos bastante, né."