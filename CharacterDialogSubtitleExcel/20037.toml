[translation]
20037-CVGroup_UITitle_Idle1-1 = "ぶる～あ～かいぶ……。"
20037-CVGroup_CharacterGet_Idle1-1 = "うげっ、ま～た面倒な仕事させる気……？\nまぁ、先生の頼みなら一応付き合うけどさぁ……。"
20037-CVGroup_Cafe_Idle1-1 = "ドーナッツを隠れて食べられそうな場所はないかなぁ？"
20037-CVGroup_Cafe_Idle2-1 = "まさか、ここでも仕事……？\nまさかまさか～？"
20037-CVGroup_Cafe_Idle3-1 = "（サングラスをかけたまま寝たら……仕事中に見えるかな……？）"
20037-CVGroup_Cafe_Idle4-1 = "この水着、わりと地味で目立たないんだよね。"
20037-CVGroup_Cafe_Idle5-1 = "まぁ、今日はプールに入ることないし……いっか。"
20037-CVGroup_WeaponGet_Idle1-1 = "うーん。まさか、ここまでしてくれるとは。\n先生に何かあったら、全力で助けてあげるね。\n……その時が来るまでは休んでもいい？"
20037-CVGroup_UIEventLobby_Enter1-1 = "やぁ、先生。お疲れー"
20037-CVGroup_UIEventLobby_Enter2-1 = "ウォーターパーク……\n仕事じゃなきゃ、好きな場所なのに……。"
20037-CVGroup_UIEventLobby_Enter3-1 = "みんな元気いいね～\n遊びに来てるからか。"
20037-CVGroup_UIEventLobby_Enter4-1 = "さあ、もうすぐ退勤時間だよ！"
20037-CVGroup_UIEventLobby_Enter5-1 = "色々あったけど、なんとか終わったね。\n先生もお疲れさん。"
20037-CVGroup_UIEventLobby_Idle1-1 = "ウォータースライダー？"
20037-CVGroup_UIEventLobby_Idle1-2 = "いや、怖いというより……\nめ、めんどくさいかなぁ……。"
20037-CVGroup_UIEventLobby_Idle2-1 = "あっつい……\nこんな日に仕事だなんて、最悪だよ～"
20037-CVGroup_UIEventLobby_Idle3-1 = "こういう熱い日にこそ糖分補給は大事だからね。"
20037-CVGroup_UIEventLobby_Idle3-2 = "そう、ドーナッツは生活必需品ってわけ。"
20037-CVGroup_UIEventLobby_Idle4-1 = "はっ！げ、現場異常無し！\n……って、先生？びっくりしたぁ。"
20037-CVGroup_UIEventBoxGachaShop_Enter1-1 = "交換しに来たの？\n色々あるから見てって～"
20037-CVGroup_UIEventBoxGachaShop_Enter2-1 = "は～ぁ、すずし～～\n先生もゆっくりしていってよ。"
20037-CVGroup_UIEventBoxGachaShop_Enter3-1 = "営業終了～っとさぁ、先生。\n打ち上げにでも行こっか？"
20037-CVGroup_UIEventBoxGachaShop_Idle1-1 = "いくら先生でも、タダでは渡せないなぁ？"
20037-CVGroup_UIEventBoxGachaShop_Idle2-1 = "私じゃなくて、商品を見なよ～"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "うわぁ！？\nそんなのあったんだ！"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "せ、先生。\n思ったより運がいいんだね？"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "おめでと～\nこれ、1等だよ。"
20037-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "これで全部終わりかな。\nいやぁ、2人とも頑張ったね。"
