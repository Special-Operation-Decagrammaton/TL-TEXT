[translation]
20036-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20036-CVGroup_CharacterGet_Idle1-1 = "「最高の休暇」にするんだから！\n妥協はしないわよ！"
20036-CVGroup_Cafe_Idle1-1 = "なんか……みんな忙しそうね。"
20036-CVGroup_Cafe_Idle2-1 = "水鉄砲で遊びたいかも。"
20036-CVGroup_Cafe_Idle3-1 = "バーベキューしようかな？"
20036-CVGroup_Cafe_Idle4-1 = "……掃除でもしよっかな。"
20036-CVGroup_Cafe_Idle5-1 = "ふう……気持ち良い。"
20036-CVGroup_WeaponGet_Idle1-1 = "こんなに遊んでばっかで良いのかな……\nせ、先生が良いって言ったんだからね！\nちゃんと責任とってよ！？"
20036-CVGroup_UIEventLobby_Enter1-1 = "さあ、先生！\n時間なんて無いわよ！\n早く行きましょう！"
20036-CVGroup_UIEventLobby_Enter2-1 = "あ、先生！\nこっち、こっち！"
20036-CVGroup_UIEventLobby_Idle1-1 = "ん？どうしたの？\nなにかやることある？"
20036-CVGroup_UIEventLobby_Idle2-1 = "先生……何してんの。"
20036-CVGroup_UIEventLobby_Idle3-1 = "それ、面白いと思ってんの？ねぇ？"
20036-CVGroup_UIEventLobby_Idle4-1 = "変なことばっかしてないで\nやることやって！早く！"
