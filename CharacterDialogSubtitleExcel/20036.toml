[translation]
20036-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20036-CVGroup_CharacterGet_Idle1-1 = "Vou fazer disso as \"melhores férias\"!\nNão vou aceitar nada menos que isso!"
20036-CVGroup_Cafe_Idle1-1 = "Parece que... todo mundo está ocupado."
20036-CVGroup_Cafe_Idle2-1 = "Talvez eu queira brincar com pistolas d'água."
20036-CVGroup_Cafe_Idle3-1 = "Será que eu faço um churrasco?"
20036-CVGroup_Cafe_Idle4-1 = "...Acho que vou limpar alguma coisa."
20036-CVGroup_Cafe_Idle5-1 = "Ufa... que sensação boa."
20036-CVGroup_WeaponGet_Idle1-1 = "Será que está tudo bem ficar brincando tanto assim...?\nB-bem, o Sensei disse que estava tudo bem, então!\nVocê vai assumir a responsabilidade, né!?"
20036-CVGroup_UIEventLobby_Enter1-1 = "Vamos lá, Sensei!\nNão temos tempo a perder!\nVamos logo!"
20036-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei!\nPor aqui, por aqui!"
20036-CVGroup_UIEventLobby_Idle1-1 = "Hm? O que foi?\nTem algo para fazer?"
20036-CVGroup_UIEventLobby_Idle2-1 = "Sensei... o que você está fazendo?"
20036-CVGroup_UIEventLobby_Idle3-1 = "Você acha isso engraçado? Hein?"
20036-CVGroup_UIEventLobby_Idle4-1 = "Para de fazer besteira e\nvai fazer o que tem que fazer! Rápido!"
