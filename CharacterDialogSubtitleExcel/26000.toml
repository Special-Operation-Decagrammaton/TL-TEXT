[translation]
26000-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
26000-CVGroup_CharacterGet_Idle1-1 = "試練が怖いとき、苦難に負けそうなとき、\n私が一緒に立ち向かってあげましょう。"
26000-CVGroup_Cafe_Idle1-1 = "そろそろ医薬品を確保しないと。"
26000-CVGroup_Cafe_Idle2-1 = "ふむ。\nまあ、悪くはないです。"
26000-CVGroup_Cafe_Idle3-1 = "居心地が良いですね。"
26000-CVGroup_Cafe_Idle4-1 = "ここの衛生状態は……\n素晴らしいですね。"
26000-CVGroup_Cafe_Idle5-1 = "体温平熱、脈拍正常。\nふむ。問題ないですね。"
26000-CVGroup_WeaponGet_Idle1-1 = "より多くの人を治療するためにはもっと多くの力が必要だ、\nという現実は、面白くない皮肉ですね。\nそれでも私の能力でできる限り……最善を尽くします。"
