10059-CVGroup_Cafe_Idle3-1 = "Eu também tinha algo parecido com isso antigamente..."
10059-CVGroup_Cafe_Idle4-1 = "Não parece que vou ficar entediada aqui."
10059-CVGroup_Cafe_Idle5-1 = "O professor não está aqui, né..."
