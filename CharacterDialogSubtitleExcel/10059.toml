[translation]
10059-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～☆"
10059-CVGroup_CharacterGet_Idle1-1 = "聖園ミカ、ついに登場～☆って感じかな？\nあっ、私と先生の仲だしアイスブレイクとかはいらないよね？\nこれからよろしくね、先生。"
10059-CVGroup_Cafe_Idle1-1 = "ふーん。ちょっと狭いけど……\nこれはこれで良いんじゃない？"
10059-CVGroup_Cafe_Idle2-1 = "あははっ！\n何これ、おもしろーい☆"
10059-CVGroup_Cafe_Idle3-1 = "私も昔、これと似たようなの持ってたなぁ……。"
10059-CVGroup_Cafe_Idle4-1 = "ここは退屈しなさそう。"
10059-CVGroup_Cafe_Idle5-1 = "先生は居ないのかぁ……。"
10059-CVGroup_WeaponGet_Idle1-1 = "あー……こんなに良くしてくれるのは嬉しいけど…\nこのままじゃ、取り返しのつかないことになっちゃうかもしれないよ？先生。\n……いいの？私は……いいんだけどさ☆"
