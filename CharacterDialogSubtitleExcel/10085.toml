[translation]
10085-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10085-CVGroup_CharacterGet_Idle1-1 = "Sem sinal de rede... É um ambiente hostil para um hacker, mas como sou membro da Veritas, não vou desistir por causa disso."
10085-CVGroup_Cafe_Idle1-1 = "Aqui é quentinho, é bom..."
10085-CVGroup_Cafe_Idle2-1 = "(Aquele traje... será que não está com frio?)"
10085-CVGroup_Cafe_Idle3-1 = "Um \"Youkai MAX\". Sem misturar... puro."
10085-CVGroup_Cafe_Idle4-1 = "(Confortável demais... não quero sair daqui nunca mais...)"
10085-CVGroup_Cafe_Idle5-1 = "(Tem um monte de Wi-Fi com nomes estranhos...)"
10085-CVGroup_WeaponGet_Idle1-1 = "Subir a montanha me fez perceber o peso da arma novamente... Talvez eu a modifique para um modelo mais leve da próxima vez."
10085-CVGroup_UIEventLobby_Enter1-1 = "Que frio... Quero voltar logo para um ambiente fechado e aquecido..."
10085-CVGroup_UIEventLobby_Enter2-1 = "Acampar logo nesta época..."
10085-CVGroup_UIEventLobby_Enter2-2 = "A vice-presidente é cruel."
10085-CVGroup_UIEventLobby_Enter3-1 = "Aqui... não tem nada... que eu possa fazer..."
10085-CVGroup_UIEventLobby_Enter4-1 = "A-apareceu um urso por perto...?"
10085-CVGroup_UIEventLobby_Enter4-2 = "É realmente seguro ficar aqui?"
10085-CVGroup_UIEventLobby_Enter5-1 = "Foi um sufoco, mas, de vez em quando, esse tipo de experiência não é tão..."
10085-CVGroup_UIEventLobby_Enter5-2 = "D-de vez em quando, realmente, só de vez em quando...!"
10085-CVGroup_UIEventLobby_Idle1-1 = "A loja de conveniência mais próxima fica... depois daquela montanha..."
10085-CVGroup_UIEventLobby_Idle2-1 = "(O Wi-Fi... sumiu?)"
10085-CVGroup_UIEventLobby_Idle3-1 = "Energético quente..."
10085-CVGroup_UIEventLobby_Idle3-2 = "Normalmente seria fora de cogitação, mas só por hoje, talvez até que vá bem..."
10085-CVGroup_UIEventLobby_Idle4-1 = "O Sensei também sofre, né? Mesmo sendo fim de ano, ser trazido até um lugar desses."
10085-CVGroup_UIEventLobby_Idle4-2 = "Hã? Você acha a situação atual divertida...?"
10085-CVGroup_UIEventLobby_Idle4-3 = "...É, o Sensei é mesmo uma pessoa extrovertida."
10085-CVGroup_UIEventShop_Enter1-1 = "...O Sensei também veio porque a vice-presidente mandou?"
10085-CVGroup_UIEventShop_Enter1-2 = "Se não se importar, poderia me ajudar um pouco...?"
10085-CVGroup_UIEventShop_Enter2-1 = "A-ah! ...Ah, Sensei..."
10085-CVGroup_UIEventShop_Enter2-2 = "Desculpa, achei que fosse um urso..."
10085-CVGroup_UIEventShop_Enter3-1 = "Precisamos arrumar tudo direitinho."
10085-CVGroup_UIEventShop_Enter3-2 = "Não quero levar bronca da vice-presidente depois."
10085-CVGroup_UIEventShop_Idle1-1 = "Coletar... Se fosse um jogo, teria terminado com um toque..."
10085-CVGroup_UIEventShop_Idle2-1 = "O que foi? Tem algo na minha roupa?"
10085-CVGroup_UIEventShop_Buy1-1 = "Entendi, acho que isso serve."
10085-CVGroup_UIEventShop_Buy2-1 = "Isso é para mim?"
10085-CVGroup_UIEventShop_Buy2-2 = "Obrigada, vou te dar o que eu coletei também."
10085-CVGroup_UIEventShop_Buy3-1 = "Já coletou tudo isso?"
10085-CVGroup_UIEventShop_Buy3-2 = "...Sensei, você tem talento para acampar..."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter1-1 = "Ah, Sensei. Estou fazendo curry agora."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-1 = "Ficar olhando para a panela borbulhando..."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-2 = "Sinto que é relaxante."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-1 = "O curry está pronto, mas..."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-2 = "Se tiver mais algum ingrediente que queira colocar, é só falar."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-1 = "Hum... será que ficou bom?"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-2 = "Sensei, pode provar?"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-1 = "Dizem que às vezes colocam chocolate no curry como ingrediente secreto."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-2 = "...Nesse caso, será que colocar energético também..."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-1 = "Ah...! Está muito gostoso!"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-2 = "Não acredito que um curry pode ter esse sabor..."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck3-1 = "Sim, está gostoso."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck2-1 = "Comparado ao curry de pacote, acho que está mais ou menos bom."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck1-1 = "É... um sabor marcante, né..."
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck0-1 = "Ugh... desculpe,\nisso não dá para comer..."
