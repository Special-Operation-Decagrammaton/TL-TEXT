[translation]
10085-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10085-CVGroup_CharacterGet_Idle1-1 = "電波が届かない状況……\nハッカーにとっては過酷な環境だけど、ヴェリタスのメンバーだもの、\nこの程度で諦めたりしないよ。"
10085-CVGroup_Cafe_Idle1-1 = "ここ、暖かくていいな……。"
10085-CVGroup_Cafe_Idle2-1 = "（あの格好……寒くないのかな……）"
10085-CVGroup_Cafe_Idle3-1 = "「妖怪MAX」を一杯。\n割らずに……ストレートで。"
10085-CVGroup_Cafe_Idle4-1 = "（快適過ぎる……ここから永遠に出たくないなぁ……）"
10085-CVGroup_Cafe_Idle5-1 = "（変な名前のWi-Fiがいっぱい……）"
10085-CVGroup_WeaponGet_Idle1-1 = "山登りで改めて銃の重さを思い知った……\n今度、軽量モデルに改造してみようかな。"
10085-CVGroup_UIEventLobby_Enter1-1 = "寒い…早く暖かい室内に戻りたい……。"
10085-CVGroup_UIEventLobby_Enter2-1 = "こんな時期にキャンプだなんて……"
10085-CVGroup_UIEventLobby_Enter2-2 = "副部長、ひどい。"
10085-CVGroup_UIEventLobby_Enter3-1 = "ここ……やれることが……\n何もない……。"
10085-CVGroup_UIEventLobby_Enter4-1 = "ち、近くに熊が出たの……？"
10085-CVGroup_UIEventLobby_Enter4-2 = "ここにいて本当に大丈夫？"
10085-CVGroup_UIEventLobby_Enter5-1 = "大変な思いをしたけど、\nたまにはこういう経験も悪くな……"
10085-CVGroup_UIEventLobby_Enter5-2 = "た、たまには、本当に、たまになら……！"
10085-CVGroup_UIEventLobby_Idle1-1 = "一番近いコンビニが……あの山の先……。"
10085-CVGroup_UIEventLobby_Idle2-1 = "（Wi-Fiが……消えた？）"
10085-CVGroup_UIEventLobby_Idle3-1 = "暖かいエナドリ……"
10085-CVGroup_UIEventLobby_Idle3-2 = "普段なら論外だけど、\n今日だけは、あってもいいかも……。"
10085-CVGroup_UIEventLobby_Idle4-1 = "先生も大変だね。\n年末なのに、こんなところまで連れて来られちゃって。"
10085-CVGroup_UIEventLobby_Idle4-2 = "え？今の状況も楽しい……？"
10085-CVGroup_UIEventLobby_Idle4-3 = "……やっぱり先生は、陽キャだったかぁ。"
10085-CVGroup_UIEventShop_Enter1-1 = "……先生も副部長に言われてきたの？"
10085-CVGroup_UIEventShop_Enter1-2 = "よかったら、ちょっと手伝ってもらっても、いい……？"
10085-CVGroup_UIEventShop_Enter2-1 = "う、うわっ！\n……あ、先生……"
10085-CVGroup_UIEventShop_Enter2-2 = "ごめん、熊かと思って……。"
10085-CVGroup_UIEventShop_Enter3-1 = "片付けはしっかりしないと。"
10085-CVGroup_UIEventShop_Enter3-2 = "あとで副部長に怒られたら、いやだし。"
10085-CVGroup_UIEventShop_Idle1-1 = "採集……\nこれがゲームなら1タップで終わったのに……。"
10085-CVGroup_UIEventShop_Idle2-1 = "どうしたの？\n服になんかついてる？"
10085-CVGroup_UIEventShop_Buy1-1 = "そうだね、これならいけそう。"
10085-CVGroup_UIEventShop_Buy2-1 = "これを私に？"
10085-CVGroup_UIEventShop_Buy2-2 = "ありがとう、私が集めたものもあげる。"
10085-CVGroup_UIEventShop_Buy3-1 = "もうこんなに集めたの？"
10085-CVGroup_UIEventShop_Buy3-2 = "……先生って、キャンプの才能があるんだね……。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter1-1 = "あ、先生。\nいま、カレー作ってたところ。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-1 = "ぶくぶくしてる鍋を見てると……"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter2-2 = "なんか和む気がする。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-1 = "カレーの準備はできたけど……"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Enter3-2 = "他に入れたい具材があれば、言って。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-1 = "ん……これ、ちゃんと出来てるのかな。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle1-2 = "先生、味見してくれる？"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-1 = "カレーの隠し味に\nチョコを入れることもあるみたい。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Idle2-2 = "……それならエナドリを入れても……。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-1 = "あっ……！すごく美味しい！"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck4-2 = "カレーでこんな味が出せるなんて……。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck3-1 = "うん、これは美味しい。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck2-1 = "レトルトカレーと比べたら、\nまあまあ美味しいかも。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck1-1 = "い、印象深い味、だね……。"
10085-CVGroup_UIEventFortuneGachashop_Cooking_Luck0-1 = "うっ……ごめん、\nこれは、食べられない……。"
