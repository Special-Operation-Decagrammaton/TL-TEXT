[translation]
20024-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
20024-CVGroup_CharacterGet_Idle1-1 = "ごきげんよう。\nトリニティ総合学園、ティーパーティーのホストを務めております桐藤ナギサと申します。\n微力ながら先生のお役に立てるよう尽力してまいります。"
20024-CVGroup_Cafe_Idle1-1 = "ふふっ。ごきげんよう。"
20024-CVGroup_Cafe_Idle2-1 = "コーヒーの香りも……\nたまには、いいものですね。"
20024-CVGroup_Cafe_Idle3-1 = "(ここは大勢の生徒が集う場。より一層、気を引き締めねば……)"
20024-CVGroup_Cafe_Idle4-1 = "あら、なんて可愛らしいお茶菓子なのでしょう。"
20024-CVGroup_Cafe_Idle5-1 = "（ここの椅子はずいぶんと柔らかそうですね）"
20024-CVGroup_WeaponGet_Idle1-1 = "この拳銃は小さいですから、お茶を淹れる際の邪魔にならず愛用しておりました。\nですが、護身にはあまり向いていないのかもしれません。\nもしもの時は……よろしくお願い致しますね、先生。"
