[translation]
20024-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20024-CVGroup_CharacterGet_Idle1-1 = "Saudações.\nSou Kirifuji Nagisa, anfitriã do Chá das Partes da Academia Trinity.\nFarei o meu melhor para ser útil ao Sensei, mesmo que de forma modesta."
20024-CVGroup_Cafe_Idle1-1 = "Fufu. Saudações."
20024-CVGroup_Cafe_Idle2-1 = "O aroma do café também...\nÀs vezes, é algo muito bom."
20024-CVGroup_Cafe_Idle3-1 = "(Este é um lugar onde muitos alunos se reúnem. Devo ficar ainda mais alerta...)"
20024-CVGroup_Cafe_Idle4-1 = "Ora, que doces adoráveis para o chá."
20024-CVGroup_Cafe_Idle5-1 = "(As cadeiras daqui parecem ser bem macias.)"
20024-CVGroup_WeaponGet_Idle1-1 = "Como esta pistola é pequena, eu a usava com frequência por não atrapalhar ao servir o chá.\nNo entanto, talvez ela não seja muito adequada para autodefesa.\nSe algo acontecer... conto com você, Sensei."
