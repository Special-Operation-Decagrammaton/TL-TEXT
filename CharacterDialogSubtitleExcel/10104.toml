[translation]
10104-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ、ですね。"
10104-CVGroup_CharacterGet_Idle1-1 = "山海経高級中学校、玄武商会本店のマネージャー兼、\n護衛の鹿山レイジョです。\n改めまして、よろしくお願いします。先生。"
10104-CVGroup_Cafe_Idle1-1 = "ここの物流管理は、\nどうなっているのでしょう？"
10104-CVGroup_Cafe_Idle2-1 = "玄武商会との相違点\n勉強になります。"
10104-CVGroup_Cafe_Idle3-1 = "市場調査といきましょう。"
10104-CVGroup_Cafe_Idle4-1 = "（ここで玄武商会の販路を広げるには……。）"
10104-CVGroup_Cafe_Idle5-1 = "ストレッチできる場所を、確保したいのですが……。"
10104-CVGroup_WeaponGet_Idle1-1 = "大半は銃と火薬で解決できる、といいますが……\n背中を押してくださった先生のためにも！銃と拳の融合を……いつか成し遂げてみせます！"
10104-CVGroup_UIEventLobby_Enter1-1 = "ようこそ、先生。\nまもなく、月影祭が開催されます。"
10104-CVGroup_UIEventLobby_Enter2-1 = "来てくださってありがとうございます。"
10104-CVGroup_UIEventLobby_Enter2-2 = "山海経が誇る月影祭をご堪能ください。"
10104-CVGroup_UIEventLobby_Enter3-1 = "予想外の状況ですが……"
10104-CVGroup_UIEventLobby_Enter3-2 = "玄龍門、玄武商会、そして山海経にとって……"
10104-CVGroup_UIEventLobby_Enter3-3 = "先生の存在はとても励みになります。"
10104-CVGroup_UIEventLobby_Enter4-1 = "無事、月影祭を開催することができました。"
10104-CVGroup_UIEventLobby_Enter4-2 = "……あの騒動は、一旦、気にしないでおきましょう。"
10104-CVGroup_UIEventLobby_Enter5-1 = "お祭りはいかがでしたか？"
10104-CVGroup_UIEventLobby_Enter5-2 = "山海経と玄武商会は、\nいつでも先生のお越しをお待ちしております。"
10104-CVGroup_UIEventLobby_Idle1-1 = "月影祭こそ、玄武商会の腕の見せ所です。"
10104-CVGroup_UIEventLobby_Idle1-2 = "先生はゆっくりなさってください。"
10104-CVGroup_UIEventLobby_Idle2-1 = "……イタズラには、肉体言語で\nお返ししますよ。"
10104-CVGroup_UIEventLobby_Idle2-2 = "冗談です、先生。\nイタズラでしたら、いくらでも。"
10104-CVGroup_UIEventLobby_Idle2-3 = "……あまり頻繁だと困りますので。ほどほどに。"
10104-CVGroup_UIEventLobby_Idle3-1 = "なんでしょうか、先生？"
10104-CVGroup_UIEventLobby_Idle3-2 = "…え？\n呼んでみただけ…？"
10104-CVGroup_UIEventLobby_Idle3-3 = "…何度も気を引き続けたら、そのうち、\n誰にも信じてもらえなくなりますよ？"
10104-CVGroup_UIEventLobby_Idle3-4 = "……私はいつまでも、先生を信じますが。"
10104-CVGroup_UIEventLobby_Idle4-1 = "わ、私は、くすぐっても効かない体質ですので。ほ、本当です。"
10104-CVGroup_UIEventLobby_Idle4-2 = "やっても無駄ですから、だから、やめ……！"
10104-CVGroup_UIEventLobby_Idle4-3 = "あ、ははははは！"
10104-CVGroup_UIEventLobby_Idle4-4 = "……もう、やめてくださいってば。"
10104-CVGroup_UIEventShop_Enter1-1 = "店番は得意な方です。"
10104-CVGroup_UIEventShop_Enter1-2 = "さて……今日は何をお探しですか？"
10104-CVGroup_UIEventShop_Enter2-1 = "お声掛けいただければ\nどこでも、玄武商会は参ります。"
10104-CVGroup_UIEventShop_Enter2-2 = "……いつかは、キヴォトスの果てまでも！"
10104-CVGroup_UIEventShop_Enter3-1 = "買い逃しはありませんか？"
10104-CVGroup_UIEventShop_Enter3-2 = "後悔のないよう、どうぞ最後まで\nゆっくりとご覧ください。"
10104-CVGroup_UIEventShop_Idle1-1 = "玄武商会の秘蔵品？隠しメニュー……？"
10104-CVGroup_UIEventShop_Idle1-2 = "えっと……そんなものはないのですが……"
10104-CVGroup_UIEventShop_Idle1-3 = "そんな顔をされましても……。"
10104-CVGroup_UIEventShop_Idle2-1 = "足りないものがありましたら、\nおっしゃってください。"
10104-CVGroup_UIEventShop_Idle2-2 = "……売り切れてしまったものは\nどうしようもないのですが。"
10104-CVGroup_UIEventShop_Buy1-1 = "はい、私のオススメの品ですね。"
10104-CVGroup_UIEventShop_Buy2-1 = "こちら、ご自宅用ですか？\nプレゼント用ですか？"
10104-CVGroup_UIEventShop_Buy3-1 = "毎度ありがとうございます！"
10104-CVGroup_UIEventShop_Buy3-2 = "……いつも口にしている言葉なのに\n先生相手だとなんだか新鮮ですね。"
10104-CVGroup_UIEventShop_Buy4-1 = "会長はおっしゃっていました。"
10104-CVGroup_UIEventShop_Buy4-2 = "何かが無償で与えられたのなら、それはすなわち、\n自身が商品になっていることを意味すると。"
10104-CVGroup_UIEventShop_Buy4-3 = "ですがもし先生が商品なのでしたら……"
10104-CVGroup_UIEventShop_Buy4-4 = "あ、いえ、なんでもありません。"
