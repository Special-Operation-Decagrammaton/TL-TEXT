[translation]
10104-CVGroup_UITitle_Idle1-1 = "Blue Archive, é isso."
10104-CVGroup_CharacterGet_Idle1-1 = "Sou Reijo Kayama, gerente e guarda-costas da sede da Associação Genbu, da Escola Secundária Shanhaijing.\nPrazer em conhecê-lo novamente, Sensei."
10104-CVGroup_Cafe_Idle1-1 = "Como será que funciona a gestão logística aqui?"
10104-CVGroup_Cafe_Idle2-1 = "As diferenças em relação à Associação Genbu são um bom aprendizado."
10104-CVGroup_Cafe_Idle3-1 = "Vamos fazer uma pesquisa de mercado."
10104-CVGroup_Cafe_Idle4-1 = "(Como será que posso expandir os canais de venda da Associação Genbu a partir daqui...)"
10104-CVGroup_Cafe_Idle5-1 = "Eu gostaria de encontrar um lugar para me alongar..."
10104-CVGroup_WeaponGet_Idle1-1 = "Dizem que a maioria das coisas pode ser resolvida com armas e pólvora, mas... pelo bem do Sensei, que me deu coragem, eu vou... um dia, conseguir fundir armas e artes marciais!"
10104-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo, Sensei.\nO Festival do Luar começará em breve."
10104-CVEventLobby_Enter2-1 = "Obrigada por vir."
10104-CVGroup_UIEventLobby_Enter2-2 = "Por favor, aproveite o Festival do Luar, o orgulho de Shanhaijing."
10104-CVGroup_UIEventLobby_Enter3-1 = "É uma situação inesperada, mas..."
10104-CVGroup_UIEventLobby_Enter3-2 = "Para a Genryumon, a Associação Genbu e toda Shanhaijing..."
10104-CVGroup_UIEventLobby_Enter3-3 = "A presença do Sensei é um grande incentivo."
10104-CVGroup_UIEventLobby_Enter4-1 = "Conseguimos realizar o Festival do Luar com sucesso."
10104-CVGroup_UIEventLobby_Enter4-2 = "...Vamos tentar não nos preocupar com aquela confusão por enquanto."
10104-CVGroup_UIEventLobby_Enter5-1 = "O que achou do festival?"
10104-CVGroup_UIEventLobby_Enter5-2 = "Shanhaijing e a Associação Genbu estarão sempre esperando pela sua visita, Sensei."
10104-CVGroup_UIEventLobby_Idle1-1 = "O Festival do Luar é a chance da Associação Genbu mostrar o seu valor."
10104-CVGroup_UIEventLobby_Idle1-2 = "Sensei, por favor, fique à vontade."
10104-CVGroup_UIEventLobby_Idle2-1 = "...Se você fizer brincadeiras, eu responderei com a linguagem corporal."
10104-CVGroup_UIEventLobby_Idle2-2 = "É brincadeira, Sensei. Se quiser fazer pegadinhas, pode fazer quantas quiser."
10104-CVGroup_UIEventLobby_Idle2-3 = "...Mas se for muito frequente, eu fico preocupada. Tente pegar leve."
10104-CVGroup_UIEventLobby_Idle3-1 = "O que foi, Sensei?"
10104-CVGroup_UIEventLobby_Idle3-2 = "...Hã? Só me chamou por chamar...?"
10104-CVGroup_UIEventLobby_Idle3-3 = "...Se você continuar chamando minha atenção à toa, uma hora ninguém mais vai acreditar em você, sabia?"
10104-CVGroup_UIEventLobby_Idle3-4 = "...Embora eu sempre vá acreditar no Sensei."
10104-CVGroup_UIEventLobby_Idle4-1 = "E-eu tenho um corpo que não faz cócegas, então... é verdade, juro."
10104-CVGroup_UIEventLobby_Idle4-2 = "Não adianta tentar, então, por favor, pare...!"
10104-CVGroup_UIEventLobby_Idle4-3 = "Ah, hahahahaha!"
10104-CVGroup_UIEventLobby_Idle4-4 = "...Chega, eu disse para parar."
10104-CVGroup_UIEventShop_Enter1-1 = "Sou boa em cuidar da loja."
10104-CVGroup_UIEventShop_Enter1-2 = "Bem... o que está procurando hoje?"
10104-CVGroup_UIEventShop_Enter2-1 = "Se nos chamar, a Associação Genbu irá a qualquer lugar."
10104-CVGroup_UIEventShop_Enter2-2 = "...Quem sabe, até os confins de Kivotos!"
10104-CVGroup_UIEventShop_Enter3-1 = "Não esqueceu de nada?"
10104-CVGroup_UIEventShop_Enter3-2 = "Para não se arrepender, por favor, olhe com calma até o fim."
10104-CVGroup_UIEventShop_Idle1-1 = "Itens secretos da Associação Genbu? Menu escondido...?"
10104-CVGroup_UIEventShop_Idle1-2 = "Bem... nós não temos nada disso..."
10104-CVGroup_UIEventShop_Idle1-3 = "Mesmo que me olhe assim..."
10104-CVGroup_UIEventShop_Idle2-1 = "Se faltar alguma coisa, por favor, me avise."
10104-CVGroup_UIEventShop_Idle2-2 = "...Embora não haja nada que eu possa fazer se o estoque tiver acabado."
10104-CVGroup_UIEventShop_Buy1-1 = "Sim, esta é a minha recomendação."
10104-CVGroup_UIEventShop_Buy2-1 = "Isto é para uso pessoal? Ou para presente?"
10104-CVGroup_UIEventShop_Buy3-1 = "Obrigada pela preferência!"
10104-CVGroup_UIEventShop_Buy3-2 = "...É uma frase que digo sempre, mas quando é para o Sensei, parece algo novo."
10104-CVGroup_UIEventShop_Buy4-1 = "A presidente costumava dizer."
10104-CVGroup_UIEventShop_Buy4-2 = "Se algo é dado de graça, isso significa que você mesmo se tornou o produto."
10104-CVGroup_UIEventShop_Buy4-3 = "Mas se o Sensei fosse o produto..."
10104-CVGroup_UIEventShop_Buy4-4 = "Ah, não, esqueça o que eu disse."
