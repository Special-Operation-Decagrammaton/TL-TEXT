[translation]
10037-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10037-CVGroup_CharacterGet_Idle1-1 = "私を呼んだのは先生か。\nチェリノ会長からの指示書は持っているな？"
10037-CVGroup_Cafe_Idle1-1 = "冷たいカンポットでも、\n一杯飲めたらいいのだが……。"
10037-CVGroup_Cafe_Idle2-1 = "暖かくてふかふかしていて、眠くなるな………。"
10037-CVGroup_Cafe_Idle3-1 = "おっと、いけない。\n早く過酷な訓練をしなくては……！"
10037-CVGroup_Cafe_Idle4-1 = "この空間は広くて、突撃訓練にちょうど良さそうだ。"
10037-CVGroup_Cafe_Idle5-1 = "この中で迷子になったらどうしよう……？"
10037-CVGroup_WeaponGet_Idle1-1 = "立派な装備だな、これなら敵を一掃できそうだ。"
