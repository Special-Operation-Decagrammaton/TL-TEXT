[translation]
10110-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10110-CVGroup_CharacterGet_Idle1-1 = "久方ぶりの邂逅……きっと、\nこう言うべきなのだろうね。\n待ちわびたよ、先生。"
10110-CVGroup_Cafe_Idle1-1 = "ふむ、有るべき\n姿に調っているね。"
10110-CVGroup_Cafe_Idle2-1 = "こういった装飾も\nどこか気持ちが\n華やぐね。"
10110-CVGroup_Cafe_Idle3-1 = "成程、これが…\nふむ、私の部屋とは\n趣が異なるな。"
10110-CVGroup_Cafe_Idle4-1 = "ここにいる\n誰もが、君の声に\n応じたのだね。"
10110-CVGroup_Cafe_Idle5-1 = "構成の妙、\n興味は尽きないね。"
10110-CVGroup_WeaponGet_Idle1-1 = "これを私に……君から？\nいや、単に思いもしなかったものだから。\n参ったね、継ぐべき言葉が見当たらないよ。\nしかし……それも好意的に思えるな、今なら。"
10110-CVGroup_UIEventLobby_Enter1-1 = "やぁ、先生。"
10110-CVGroup_UIEventLobby_Enter1-2 = "相も変わらず忙しないね。"
10110-CVGroup_UIEventLobby_Enter2-1 = "良いところに来たね、先生。"
10110-CVGroup_UIEventLobby_Enter2-2 = "渇望もかくやというところさ。"
10110-CVGroup_UIEventLobby_Enter3-1 = "ふむ、気運の高まりが……。"
10110-CVGroup_UIEventLobby_Enter3-2 = "何、まだ気にすることは無いさ。"
10110-CVGroup_UIEventLobby_Enter4-1 = "終幕も近いか……。"
10110-CVGroup_UIEventLobby_Enter4-2 = "言わずとも、すぐその目に映るとも。"
10110-CVGroup_UIEventLobby_Enter5-1 = "君の行いに感謝を。"
10110-CVGroup_UIEventLobby_Enter5-2 = "たとえその過程で、君が何を視たとしてもね。"
10110-CVGroup_UIEventLobby_Idle1-1 = "うん？"
10110-CVGroup_UIEventLobby_Idle1-2 = "私に何か話すべき事柄でも？"
10110-CVGroup_UIEventLobby_Idle2-1 = "ここに在るという事実が必要かい？"
10110-CVGroup_UIEventLobby_Idle3-1 = "時には、こういった例外も悪くは無い。"
10110-CVGroup_UIEventLobby_Idle3-2 = "普段のトリニティと異なる環境に。"
10110-CVGroup_UIEventLobby_Idle4-1 = "……こそばゆいものだね。"
10110-CVGroup_UIEventLobby_Idle4-2 = "いや、否定の意味ではないよ。"
10110-CVGroup_UIEventShop_Enter1-1 = "事前に見越していたからね。"
10110-CVGroup_UIEventShop_Enter1-2 = "意のままに見ると良い。"
10110-CVGroup_UIEventShop_Enter2-1 = "君の欲望の形を教えてくれるかい？"
10110-CVGroup_UIEventShop_Enter2-2 = "何、躊躇うことは無いとも。"
10110-CVGroup_UIEventShop_Enter3-1 = "刮目したまえ、"
10110-CVGroup_UIEventShop_Enter3-2 = "瞬きの間に消えてしまわぬように。"
10110-CVGroup_UIEventShop_Idle1-1 = "……成程？"
10110-CVGroup_UIEventShop_Idle1-2 = "私を金銭で飼い馴らせるとでも？"
10110-CVGroup_UIEventShop_Idle2-1 = "そうして君が伸ばした手は、"
10110-CVGroup_UIEventShop_Idle2-2 = "私の手を拒まないことを意味するのだろう？"
10110-CVGroup_UIEventShop_Buy1-1 = "それを選び取るのだね。"
10110-CVGroup_UIEventShop_Buy2-1 = "最初から悪い選択など在りはしないよ。"
10110-CVGroup_UIEventShop_Buy3-1 = "見つけたものと手にしたものは、\nきちんと同じかな？"
10110-CVGroup_UIEventShop_Buy4-1 = "さあ、その実存を握りしめると良い。"
10110-CVGroup_UIEventFieldMission_Enter1-1 = "君の目を必要とするものが多いようだね。"
10110-CVGroup_UIEventFieldMission_Enter2-1 = "ああ、待ち侘びていたよ……"
10110-CVGroup_UIEventFieldMission_Enter2-2 = "なに、勘のようなものさ。"
10110-CVGroup_UIEventFieldMission_Idle1-1 = "君という存在の解釈を\n揺らがせないでくれ。"
10110-CVGroup_UIEventFieldMission_Idle2-1 = "……変化しないということに、\n安堵を覚えるものだよ先生。"
10110-CVGroup_UIEventFieldMission_Buy1-1 = "君の労苦に感謝を。"
10110-CVGroup_UIEventFieldMission_Buy2-1 = "実に見事だ。"
10110-CVGroup_UIEventFieldMission_Interaction1-1 = "早く終わらせるに\n越したことはない。\nこういうものは特に。"
