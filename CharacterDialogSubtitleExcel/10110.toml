[translation]
10110-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10110-CVGroup_CharacterGet_Idle1-1 = "Um reencontro após tanto tempo... Certamente, é assim que devo dizer, não é? Eu estava esperando por você, Sensei."
10110-CVGroup_Cafe_Idle1-1 = "Hum, as coisas estão organizadas como deveriam estar."
10110-CVGroup_Cafe_Idle2-1 = "Esse tipo de decoração também faz o coração se alegrar um pouco."
10110-CVGroup_Cafe_Idle3-1 = "Entendo, então é isso... Hum, tem um charme diferente do meu quarto."
10110-CVGroup_Cafe_Idle4-1 = "Todos que estão aqui responderam ao seu chamado, não foi?"
10110-CVGroup_Cafe_Idle5-1 = "A beleza da composição, o interesse nunca acaba."
10110-CVGroup_WeaponGet_Idle1-1 = "Isso é para mim... vindo de você? Não, é que eu simplesmente não esperava por isso. Que situação, não encontro as palavras certas para expressar. Mas... agora, isso parece algo positivo."
10110-CVGroup_UIEventLobby_Enter1-1 = "Olá, Sensei."
10110-CVGroup_UIEventLobby_Enter1-2 = "Você continua sempre tão ocupado."
10110-CVGroup_UIEventLobby_Enter2-1 = "Você veio na hora certa, Sensei."
10110-CVGroup_UIEventLobby_Enter2-2 = "É como se fosse um desejo ardente."
10110-CVGroup_UIEventLobby_Enter3-1 = "Hum, a atmosfera está ficando tensa..."
10110-CVGroup_UIEventLobby_Enter3-2 = "Ora, não há nada com que se preocupar ainda."
10110-CVGroup_UIEventLobby_Enter4-1 = "O ato final está próximo, então..."
10110-CVGroup_UIEventLobby_Enter4-2 = "Mesmo que eu não diga, você verá com seus próprios olhos em breve."
10110-CVGroup_UIEventLobby_Enter5-1 = "Agradeço pelas suas ações."
10110-CVGroup_UIEventLobby_Enter5-2 = "Mesmo que, no processo, você tenha visto o que quer que seja."
10110-CVGroup_UIEventLobby_Idle1-1 = "Hum?"
10110-CVGroup_UIEventLobby_Idle1-2 = "Tem algo que você queira me dizer?"
10110-CVGroup_UIEventLobby_Idle2-1 = "Você precisa do fato de eu estar aqui?"
10110-CVGroup_UIEventLobby_Idle3-1 = "Às vezes, esse tipo de exceção não é ruim."
10110-CVGroup_UIEventLobby_Idle3-2 = "Estar em um ambiente diferente da Trinity habitual."
10110-CVGroup_UIEventLobby_Idle4-1 = "…É uma sensação estranha."
10110-CVGroup_UIEventLobby_Idle4-2 = "Não, não estou negando."
10110-CVGroup_UIEventShop_Enter1-1 = "Eu já tinha previsto isso."
10110-CVGroup_UIEventShop_Enter1-2 = "Sinta-se à vontade para ver como quiser."
10110-CVGroup_UIEventShop_Enter2-1 = "Pode me mostrar a forma dos seus desejos?"
10110-CVGroup_UIEventShop_Enter2-2 = "Ora, não há motivo para hesitar."
10110-CVGroup_UIEventShop_Enter3-1 = "Preste muita atenção,"
10110-CVGroup_UIEventShop_Enter3-2 = "para não perder nada num piscar de olhos."
10110-CVGroup_UIEventShop_Idle1-1 = "…Entendo?"
10110-CVGroup_UIEventShop_Idle1-2 = "Você acha mesmo que pode me domesticar com dinheiro?"
10110-CVGroup_UIEventShop_Idle2-1 = "A mão que você estendeu assim,"
10110-CVGroup_UIEventShop_Idle2-2 = "significa que você não recusará a minha, certo?"
10110-CVGroup_UIEventShop_Buy1-1 = "Então você escolheu isso."
10110-CVGroup_UIEventShop_Buy2-1 = "Desde o início, não existe escolha ruim."
10110-CVGroup_UIEventShop_Buy3-1 = "O que você encontrou e o que você pegou, são realmente a mesma coisa?"
10110-CVGroup_UIEventShop_Buy4-1 = "Vamos, segure essa existência com firmeza."
10110-CVGroup_UIEventFieldMission_Enter1-1 = "Parece que há muitas coisas que precisam do seu olhar."
10110-CVGroup_UIEventFieldMission_Enter2-1 = "Ah, eu estava esperando por isso..."
10110-CVGroup_UIEventFieldMission_Enter2-2 = "Bem, é apenas um palpite."
10110-CVGroup_UIEventFieldMission_Idle1-1 = "Não deixe que a interpretação da sua existência vacile."
10110-CVGroup_UIEventFieldMission_Idle2-1 = "…Sinto um alívio pelo fato de você não mudar, Sensei."
10110-CVGroup_UIEventFieldMission_Buy1-1 = "Agradeço pelo seu esforço."
10110-CVGroup_UIEventFieldMission_Buy2-1 = "Realmente impressionante."
10110-CVGroup_UIEventFieldMission_Interaction1-1 = "Não há nada melhor do que terminar logo. Especialmente com coisas assim."
