[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10110-CVGroup_UITitle_Idle1-1 = "Blue Archive." 
10110-CVGroup_CharacterGet_Idle1-1 = "Um encontro após tanto tempo... Acho que é isso que eu deveria dizer, não?\nEu estava ansiosa por você, Sensei... fufu." 
10110-CVGroup_Cafe_Idle1-1 = "Hmm... Tudo está arrumadinho\ne no seu devido lugar, como deve ser." 
10110-CVGroup_Cafe_Idle2-1 = "Decorações como essa...\ndão um calorzinho bem gostoso no coração, né?" 
10110-CVGroup_Cafe_Idle3-1 = "Entendi, então é aqui...\nHmm, tem um sabor bem diferente do meu quarto... gostei." 
10110-CVGroup_Cafe_Idle4-1 = "Parece que todo mundo aqui...\nfica bem obediente quando ouve a sua voz, não?" 
10110-CVGroup_Cafe_Idle5-1 = "A forma como você organizou tudo...\nme deixa cada vez mais curiosa e intrigada." 
10110-CVGroup_WeaponGet_Idle1-1 = "Isso é pra mim...? De você?\nNossa, me pegou de surpresa agora.\nEstou sem palavras pra te agradecer...\nMas, vindo de você, eu aceito de muito bom grado~" 
10110-CVGroup_UIEventLobby_Enter1-1 = "Olá, Sensei." 
10110-CVGroup_UIEventLobby_Enter1-2 = "Sempre tão atarefado e suadinho, não é?" 
10110-CVGroup_UIEventLobby_Enter2-1 = "Chegou em uma ótima hora, meu querido Sensei." 
10110-CVGroup_UIEventLobby_Enter2-2 = "Eu já estava sedenta... esperando por você." 
10110-CVGroup_UIEventLobby_Enter3-1 = "Hmm, parece que o clima... está esquentando por aqui." 
10110-CVGroup_UIEventLobby_Enter3-2 = "Fufu, não precisa se preocupar com isso agora." 
10110-CVGroup_UIEventLobby_Enter4-1 = "O clímax já está próximo...?" 
10110-CVGroup_UIEventLobby_Enter4-2 = "Nem preciso dizer, isso logo vai refletir nesses seus olhos." 
10110-CVGroup_UIEventLobby_Enter5-1 = "Agradeço por tudo o que você fez comigo." 
10110-CVGroup_UIEventLobby_Enter5-2 = "Não importa o que esses seus olhos curiosos acabaram vendo no processo..." 
10110-CVGroup_UIEventLobby_Idle1-1 = "Hmm?" 
10110-CVGroup_UIEventLobby_Idle1-2 = "Tem algum segredinho que você queira sussurrar pra mim?" 
10110-CVGroup_UIEventLobby_Idle2-1 = "Saber que eu estou aqui... é o suficiente pra te satisfazer?" 
10110-CVGroup_UIEventLobby_Idle3-1 = "De vez em quando, abrir uma exceção e quebrar as regras não é nada mau." 
10110-CVGroup_UIEventLobby_Idle3-2 = "Estar num ambiente diferente da Trinity de sempre..." 
10110-CVGroup_UIEventLobby_Idle4-1 = "...Me dá um friozinho bem gostoso na barriga." 
10110-CVGroup_UIEventLobby_Idle4-2 = "Fufu, e eu definitivamente não estou reclamando disso." 
10110-CVGroup_UIEventShop_Enter1-1 = "Eu já tinha previsto que você viria aqui." 
10110-CVGroup_UIEventShop_Enter1-2 = "Pode me olhar o quanto quiser." 
10110-CVGroup_UIEventShop_Enter2-1 = "Você poderia me mostrar... qual é a verdadeira forma dos seus desejos?" 
10110-CVGroup_UIEventShop_Enter2-2 = "Vamos, não precisa ter vergonha de mim." 
10110-CVGroup_UIEventShop_Enter3-1 = "Preste muita atenção," 
10110-CVGroup_UIEventShop_Enter3-2 = "Para que eu não suma num piscar de olhos." 
10110-CVGroup_UIEventShop_Idle1-1 = "......Ah, entendi." 
10110-CVGroup_UIEventShop_Idle1-2 = "Você realmente acha que pode... me domar só com esse dinheiro?" 
10110-CVGroup_UIEventShop_Idle2-1 = "Se você estender a mão assim," 
10110-CVGroup_UIEventShop_Idle2-2 = "Isso significa que você... não vai rejeitar a minha mãozinha?" 
10110-CVGroup_UIEventShop_Buy1-1 = "Então é isso que você escolheu." 
10110-CVGroup_UIEventShop_Buy2-1 = "Desde o começo, nunca existiu uma escolha ruim para nós." 
10110-CVGroup_UIEventShop_Buy3-1 = "O que você achou... é exatamente aquilo que você queria pegar?" 
10110-CVGroup_UIEventShop_Buy4-1 = "Vamos, pode segurar isso bem firme." 
10110-CVGroup_UIEventFieldMission_Enter1-1 = "Parece que muitas coisas estão precisando da sua atenção hoje, não?" 
10110-CVGroup_UIEventFieldMission_Enter2-1 = "Ahh, eu estava sedenta te esperando..." 
10110-CVGroup_UIEventFieldMission_Enter2-2 = "Fufu, foi só uma intuição feminina." 
10110-CVGroup_UIEventFieldMission_Idle1-1 = "Por favor, não balance tanto a imagem que eu tenho de você." 
10110-CVGroup_UIEventFieldMission_Idle2-1 = "......Saber que você não muda, me traz um alívio imenso, meu querido Sensei." 
10110-CVGroup_UIEventFieldMission_Buy1-1 = "Agradeço por todo o seu suor e esforço de hoje." 
10110-CVGroup_UIEventFieldMission_Buy2-1 = "Você foi esplêndido." 
10110-CVGroup_UIEventFieldMission_Interaction1-1 = "Terminar isso rapidinho é sempre a melhor escolha.\nEspecialmente quando se trata dessas coisas..." 