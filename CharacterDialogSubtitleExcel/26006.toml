[translation]
26006-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
26006-CVGroup_CharacterGet_Idle1-1 = "ずっと望遠鏡越しで見ていた、あの先生で合ってますか……？\n私、感激です……！"
26006-CVGroup_Cafe_Idle1-1 = "ふふ、素敵な家具を発見しました！"
26006-CVGroup_Cafe_Idle2-1 = "あの向こうには何があるのかな……？"
26006-CVGroup_Cafe_Idle3-1 = "早く特別クラスから抜け出さないと……。"
26006-CVGroup_Cafe_Idle4-1 = "ここは綺麗なところですね～"
26006-CVGroup_Cafe_Idle5-1 = "先生は……どこにいるのかな？"
26006-CVGroup_WeaponGet_Idle1-1 = "ありがとうございます、先生！\nこの望遠鏡と同じくらい、大切に扱いますね！"
26006-CVGroup_UIEventShop_Enter1-1 = "あれ、先生？\n何か食べ物を持ってきてくれたんですか！？"
26006-CVGroup_UIEventShop_Enter2-1 = "お疲れ様です！\n頂いた支援物資に応じて、"
26006-CVGroup_UIEventShop_Enter2-2 = "私たちからも何かお返しをしますね！"
26006-CVGroup_UIEventShop_Enter3-1 = "お祭りも、残すところ半分くらいになってしまいましたね。"
26006-CVGroup_UIEventShop_Enter3-2 = "……まあ、もともと私たちにはほとんど関係無いのですが。"
26006-CVGroup_UIEventShop_Enter4-1 = "イワン・クパーラももう残り僅かですね。"
26006-CVGroup_UIEventShop_Enter4-2 = "何か美味しそうなものや、\nここでの生活に役立ちそうなものがありましたら"
26006-CVGroup_UIEventShop_Enter4-3 = "ぜひ持ってきていただけますと！"
26006-CVGroup_UIEventShop_Enter5-1 = "今日が最終日ですね、先生。\n何か忘れ物はありませんか？"
26006-CVGroup_UIEventShop_Enter6-1 = "お祭りは終わりましたが、\nもしまだ何か持っていたら、ぜひ私にください……！"
26006-CVGroup_UIEventShop_Idle1-1 = "227号特別クラスには、\nいつも甘い物が足りなくって……。"
26006-CVGroup_UIEventShop_Idle2-1 = "いつになったら、本校舎に帰れるのかな……。"
26006-CVGroup_UIEventShop_Buy1-1 = "あっ……美味しそう……。"
26006-CVGroup_UIEventShop_Buy2-1 = "えっ？\nこ、これ、貰っても良いんですか？"
