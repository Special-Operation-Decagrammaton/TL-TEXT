[translation]
26006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26006-CVGroup_CharacterGet_Idle1-1 = "Você é o Sensei que eu sempre observava pelo telescópio, não é...? \nEstou tão emocionada...!"
26006-CVGroup_Cafe_Idle1-1 = "Fufu, encontrei um móvel adorável!"
26006-CVGroup_Cafe_Idle2-1 = "O que será que tem ali do outro lado...?"
26006-CVGroup_Cafe_Idle3-1 = "Preciso sair da classe especial logo..."
26006-CVGroup_Cafe_Idle4-1 = "Este lugar é tão bonito~"
26006-CVGroup_Cafe_Idle5-1 = "Onde será que o Sensei está...?"
26006-CVGroup_WeaponGet_Idle1-1 = "Muito obrigada, Sensei! \nVou cuidar disso com tanto carinho quanto cuido do meu telescópio!"
26006-CVGroup_UIEventShop_Enter1-1 = "Ah, Sensei? \nVocê trouxe algo para comer!?"
26006-CVGroup_UIEventShop_Enter2-1 = "Bom trabalho! \nDependendo dos suprimentos que você nos trouxer,"
26006-CVGroup_UIEventShop_Enter2-2 = "nós também daremos algo em troca!"
26006-CVGroup_UIEventShop_Enter3-1 = "O festival já está quase na metade, não é?"
26006-CVGroup_UIEventShop_Enter3-2 = "Bem... na verdade, isso quase não tem nada a ver com a gente."
26006-CVGroup_UIEventShop_Enter4-1 = "O Ivan Kupala já está quase acabando."
26006-CVGroup_UIEventShop_Enter4-2 = "Se tiver algo gostoso ou algo que possa ser útil \npara a nossa vida aqui,"
26006-CVGroup_UIEventShop_Enter4-3 = "por favor, traga para nós!"
26006-CVGroup_UIEventShop_Enter5-1 = "Hoje é o último dia, Sensei. \nEsqueceu de alguma coisa?"
26006-CVGroup_UIEventShop_Enter6-1 = "O festival acabou, mas \nse você ainda tiver algo, por favor, me dê...!"
26006-CVGroup_UIEventShop_Idle1-1 = "Na classe especial 227, \nsempre faltam doces..."
26006-CVGroup_UIEventShop_Idle2-1 = "Quando será que vamos poder voltar para o prédio principal...?"
26006-CVGroup_UIEventShop_Buy1-1 = "Ah... parece delicioso..."
26006-CVGroup_UIEventShop_Buy2-1 = "Hã? \nE-eu posso ficar com isso mesmo?"
