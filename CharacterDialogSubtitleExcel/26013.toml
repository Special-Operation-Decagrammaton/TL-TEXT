[translation]
26013-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
26013-CVGroup_CharacterGet_Idle1-1 = "アリウススクワッド、秤アツコ。\n……ふふ、畏まりすぎたかな？"
26013-CVGroup_Cafe_Idle1-1 = "いい写真、撮れるかな？"
26013-CVGroup_Cafe_Idle2-1 = "（サッちゃん、元気にしてるといいな）"
26013-CVGroup_Cafe_Idle3-1 = "どこかで、お花の香りがする。"
26013-CVGroup_Cafe_Idle4-1 = "ここ、ゆっくりできそう。"
26013-CVGroup_Cafe_Idle5-1 = "これは……？初めてみた。"
26013-CVGroup_WeaponGet_Idle1-1 = "あ、これ……ありがとう、先生。\nすごく、気に入ったよ。\nこれは先生のために、使うから。"
26013-CVGroup_UIEventLobby_Enter1-1 = "海のお祭り……\nこんなの、はじめて。"
26013-CVGroup_UIEventLobby_Enter2-1 = "先生、楽しんでる？"
26013-CVGroup_UIEventLobby_Enter3-1 = "お祭りの間は、何も起こらないといいな……"
26013-CVGroup_UIEventLobby_Enter3-2 = "こんなに楽しい時間、めったにないから。"
26013-CVGroup_UIEventLobby_Enter4-1 = "お祭りはあと少しで……"
26013-CVGroup_UIEventLobby_Enter4-2 = "はじまりがあれば終わりがある、っていうけど……"
26013-CVGroup_UIEventLobby_Enter4-3 = "ちょっと、寂しいな。"
26013-CVGroup_UIEventLobby_Enter5-1 = "お祭り、終わっちゃったね……"
26013-CVGroup_UIEventLobby_Enter5-2 = "でも大丈夫だよ。\n海は、変わらずきれいだから。"
26013-CVGroup_UIEventLobby_Idle1-1 = "砂に触れたり、波を追いかけたり……"
26013-CVGroup_UIEventLobby_Idle1-2 = "海って、楽しいね。"
26013-CVGroup_UIEventLobby_Idle2-1 = "野外ステージ……楽しそう。"
26013-CVGroup_UIEventLobby_Idle2-2 = "先生、一緒に見に行こう。"
26013-CVGroup_UIEventLobby_Idle3-1 = "みんなと一緒だから、楽しいんだと思う。"
26013-CVGroup_UIEventLobby_Idle3-2 = "もちろん「みんな」の中には、先生もいるよ。"
26013-CVGroup_UIEventLobby_Idle4-1 = "お祭りに連れてきてくれて、ありがとう。"
26013-CVGroup_UIEventLobby_Idle4-2 = "先生も、楽しんでね。"
26013-CVGroup_UIEventMission_Enter1-1 = "こんにちは、先生。"
26013-CVGroup_UIEventMission_Enter1-2 = "はい、これ、やることリストだよ。"
26013-CVGroup_UIEventMission_Enter2-1 = "……多いね。\n一つずつ、終わらせていこう。"
26013-CVGroup_UIEventMission_Idle1-1 = "呼んだ？"
26013-CVGroup_UIEventMission_Idle2-1 = "ふふ、私じゃなくて隣を見て。"
26013-CVGroup_UIEventMission_Buy1-1 = "お疲れ様、先生。"
26013-CVGroup_UIEventMission_Buy2-1 = "先生、頑張ってるね。\n私もやる気出てきた。"
26013-CVGroup_UIEventMission_Interaction1-1 = "今日のお仕事は、これで終わり。\n少し休もっか、先生。"
