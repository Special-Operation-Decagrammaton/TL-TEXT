[translation]
26013-CVGroup_UITitle_Idle1-1 = "Blue Archive."
26013-CVGroup_CharacterGet_Idle1-1 = "Esquadrão Arius, Joumae Atsuko.\n……Hehe, será que fui formal demais?"
26013-CVGroup_Cafe_Idle1-1 = "Será que consigo tirar uma boa foto?"
26013-CVGroup_Cafe_Idle2-1 = "(Espero que a Sa-chan esteja bem.)"
26013-CVGroup_Cafe_Idle3-1 = "Sinto cheiro de flores em algum lugar."
26013-CVGroup_Cafe_Idle4-1 = "Parece que dá para relaxar aqui."
26013-CVGroup_Cafe_Idle5-1 = "Isto é……? Nunca vi antes."
26013-CVGroup_WeaponGet_Idle1-1 = "Ah, isto…… obrigada, Sensei.\nGostei muito.\nVou usar isto pelo Sensei."
26013-CVGroup_UIEventLobby_Enter1-1 = "Festival na praia……\nÉ a primeira vez que vejo algo assim."
26013-CVGroup_UIEventLobby_Enter2-1 = "Sensei, está se divertindo?"
26013-CVGroup_UIEventLobby_Enter3-1 = "Espero que nada aconteça durante o festival……"
26013-CVGroup_UIEventLobby_Enter3-2 = "Porque momentos tão divertidos assim são raros."
26013-CVGroup_UIEventLobby_Enter4-1 = "O festival já vai acabar……"
26013-CVGroup_UIEventLobby_Enter4-2 = "Dizem que tudo que tem um começo tem um fim, mas……"
26013-CVGroup_UIEventLobby_Enter4-3 = "É um pouco triste."
26013-CVGroup_UIEventLobby_Enter5-1 = "O festival acabou, né……"
26013-CVGroup_UIEventLobby_Enter5-2 = "Mas está tudo bem.\nO mar continua lindo como sempre."
26013-CVGroup_UIEventLobby_Idle1-1 = "Tocar na areia, correr atrás das ondas……"
26013-CVGroup_UIEventLobby_Idle1-2 = "O mar é divertido, né?"
26013-CVGroup_UIEventLobby_Idle2-1 = "Palco ao ar livre…… parece divertido."
26013-CVGroup_UIEventLobby_Idle2-2 = "Sensei, vamos lá ver juntos."
26013-CVGroup_UIEventLobby_Idle3-1 = "Acho que é divertido porque estou com todos."
26013-CVGroup_UIEventLobby_Idle3-2 = "Claro que, nesse \"todos\", o Sensei também está incluído."
26013-CVGroup_UIEventLobby_Idle4-1 = "Obrigada por me trazer ao festival."
26013-CVGroup_UIEventLobby_Idle4-2 = "Divirta-se também, Sensei."
26013-CVGroup_UIEventMission_Enter1-1 = "Olá, Sensei."
26013-CVGroup_UIEventMission_Enter1-2 = "Aqui, esta é a lista de tarefas."
26013-CVGroup_UIEventMission_Enter2-1 = "……É bastante coisa.\nVamos terminar uma por uma."
26013-CVGroup_UIEventMission_Idle1-1 = "Me chamou?"
26013-CVGroup_UIEventMission_Idle2-1 = "Hehe, não olhe para mim, olhe para o lado."
26013-CVGroup_UIEventMission_Buy1-1 = "Bom trabalho, Sensei."
26013-CVGroup_UIEventMission_Buy2-1 = "O Sensei está se esforçando bastante.\nAté me sinto mais motivada."
26013-CVGroup_UIEventMission_Interaction1-1 = "O trabalho de hoje termina aqui.\nVamos descansar um pouco, Sensei?"
