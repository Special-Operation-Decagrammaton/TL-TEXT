[translation]
26005-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
26005-CVGroup_CharacterGet_Idle1-1 = "小さいからって舐めないで！\n将来性はものすっごいんだから！"
26005-CVGroup_Cafe_Idle1-1 = "……私の成長はまだ終わってないの！\n信じて！"
26005-CVGroup_Cafe_Idle2-1 = "ふふっ。\n一眠りしていこっかな。"
26005-CVGroup_Cafe_Idle3-1 = "はあ……\n先生はなんであんなに空気が読めないんだろう。"
26005-CVGroup_Cafe_Idle4-1 = "美味しいスイーツが食べたーい、\nあっ！先生！"
26005-CVGroup_Cafe_Idle5-1 = "ん？えー……牛乳は、嫌い。\n飲まなきゃいけないって分かってるから、尚更！\nえ？それ、い、イチゴ牛乳？"
26005-CVGroup_WeaponGet_Idle1-1 = "こんなの貰っちゃったら……\n本気で頑張るしかないじゃん！"
