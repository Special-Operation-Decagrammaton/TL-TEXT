[translation]
26005-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26005-CVGroup_CharacterGet_Idle1-1 = "Não me subestime só porque sou pequena!\nMeu potencial para o futuro é incrível!"
26005-CVGroup_Cafe_Idle1-1 = "……Meu crescimento ainda não acabou!\nAcredite em mim!"
26005-CVGroup_Cafe_Idle2-1 = "Hehe.\nTalvez eu tire uma soneca."
26005-CVGroup_Cafe_Idle3-1 = "Ah……\nPor que o Sensei é tão sem noção?"
26005-CVGroup_Cafe_Idle4-1 = "Quero comer uns doces deliciosos,\nAh! Sensei!"
26005-CVGroup_Cafe_Idle5-1 = "Hm? Eh... Eu odeio leite.\nEu sei que preciso beber, e é justamente por isso que odeio! \nEh? Isso é... l-leite de morango?"
26005-CVGroup_WeaponGet_Idle1-1 = "Se eu ganhei algo assim……\nNão tenho escolha a não ser me esforçar de verdade!"
