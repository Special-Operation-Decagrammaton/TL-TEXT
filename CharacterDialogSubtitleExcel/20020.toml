[translation]
20020-CVGroup_UISpecialOperationLobby_Enter1-1 = "では、特異現象捜査部としての活動を始めましょうか。"
20020-CVGroup_UISpecialOperationLobby_Enter2-1 = "ふふっ。お待ちしておりましたよ、先生。"
20020-CVGroup_UISpecialOperationLobby_Idle1-1 = "……ああ、只今データの分析中ですので少々お待ちを。"
20020-CVGroup_UISpecialOperationLobby_Idle2-1 = "なるほど、興味深いですね……"
20020-CVGroup_UISpecialOperationLobby_Idle2-2 = "これがこうなって、ふむ……。"
20020-CVGroup_UISpecialOperationLobby_Idle3-1 = "デカグラマトン……\n厄介な相手ですね。"
20020-CVGroup_UISpecialOperationLobby_Idle4-1 = "リスクはありそうですが……"
20020-CVGroup_UISpecialOperationLobby_Idle4-2 = "ふふっ、尚のこと興味深いですね。"
20020-CVGroup_UISpecialOperationLobby_CollectionOpen1-1 = "新たなデータが入手できたようですね。"
20020-CVGroup_UISpecialOperationLobby_CollectionOpen2-1 = "さて、今回はどんなデータなのでしょうか。"
20020-CVGroup_UISpecialOperationLobby_StoryOpen1-1 = "次の目標が決まりましたね。"
20020-CVGroup_UISpecialOperationLobby_StoryOpen2-1 = "では、次の段階に進みましょう。"
20020-CVGroup_UIMiniEventLobby_Enter1-1 = "新たな任務、そして新たな環境……"
20020-CVGroup_UIMiniEventLobby_Enter1-2 = "……さあ、はじめましょう。先生。"
20020-CVGroup_UIMiniEventLobby_Enter2-1 = "先生、手を貸していただけますか？"
20020-CVGroup_UIMiniEventLobby_Enter2-2 = "あら、超天才清楚系病弱美少女だって、"
20020-CVGroup_UIMiniEventLobby_Enter2-3 = "人の手が必要なんですよ？"
20020-CVGroup_UIMiniEventLobby_Enter3-1 = "こんにちは、先生。"
20020-CVGroup_UIMiniEventLobby_Enter3-2 = "ここが私たちの新しい基地です。"
20020-CVGroup_UIMiniEventLobby_Idle1-1 = "条件の増加を確認しました。"
20020-CVGroup_UIMiniEventLobby_Idle1-2 = "どこまで変数を抑えられるか……\n慎重にいきましょう。"
20020-CVGroup_UIMiniEventLobby_Idle2-1 = "情報は多いほど歓迎、ではありますが……"
20020-CVGroup_UIMiniEventLobby_Idle2-2 = "あまり一気に渡されると、それはそれで困ってしまいます。"
20020-CVGroup_UIMiniEventLobby_Idle3-1 = "少し疲れましたね……"
20020-CVGroup_UIMiniEventLobby_Idle3-2 = "こんな時に甘えさせてくれる先生がいたらとても嬉しいのですが。"
20020-CVGroup_UIMiniEventLobby_Idle4-1 = "最高のハッカーであり、最高の美少女である私に"
20020-CVGroup_UIMiniEventLobby_Idle4-2 = "最高のパートナーが不在だなんて、"
20020-CVGroup_UIMiniEventLobby_Idle4-3 = "由々しき事態です。\nですので先生には私の…"
20020-CVGroup_UIMiniEventLobby_Idle4-4 = "なんでもありません…今のは忘れてください。"
20020-CVGroup_UIMiniEventLobby_Idle5-1 = "新しい局面に入った……\nといったところでしょうか。"
20020-CVGroup_UIMiniEventShop_Enter1-1 = "ここでは、先生に集めていただいた"
20020-CVGroup_UIMiniEventShop_Enter1-2 = "「物質」の分析を行っております。"
20020-CVGroup_UIMiniEventShop_Enter2-1 = "おかえりなさい、先生。\nはぁ……待ちくたびれましたよ。"
20020-CVGroup_UIMiniEventShop_Enter3-1 = "サンプルの収集は進みましたか？\nこちらにお願いしますね。"
20020-CVGroup_UIMiniEventShop_Idle1-1 = "いつもご協力\nありがとうございます、先生。"
20020-CVGroup_UIMiniEventShop_Idle2-1 = "さて、どんな情報が出てくることやら。"
20020-CVGroup_UIMiniEventShop_Idle3-1 = "おかげさまで調査は順調です。\nそれにしてもこの現象……実に興味深いですね。"
20020-CVGroup_UIMiniEventShop_Idle4-1 = "はぁ、まさか分析が追いつかなくなるとは……"
20020-CVGroup_UIMiniEventShop_Idle4-2 = "なんて贅沢な環境なのでしょう。"
20020-CVGroup_UIMiniEventShop_Idle5-1 = "探求とは、いつも胸躍るもの。"
20020-CVGroup_UIMiniEventShop_Idle5-2 = "そこに先生がご一緒してくださるのであれば……\nふふっ、言うまでもありません。"
20020-CVGroup_UIMiniEventShop_Buy1-1 = "分析完了です。\nどうぞ持っていってください。"
20020-CVGroup_UIMiniEventShop_Buy2-1 = "解釈結果はお気に召しましたか？\nふふ、またお越しください。"
20020-CVGroup_UIMiniEventShop_Buy3-1 = "先生のために丹精込めて分析いたしました。\nはい、受け取ってください。"
20020-CVGroup_UIMiniEventShop_Buy3-2 = "……こ、公私は分けているつもりですとも、ええ。"
20020-CVGroup_UIMiniEventShop_Buy4-1 = "先生にサンプルを集めていただいて、"
20020-CVGroup_UIMiniEventShop_Buy4-2 = "私たちはそれを分析し、お渡しする……"
20020-CVGroup_UIMiniEventShop_Buy4-3 = "「物々交換」の成立ですね。"
20020-CVGroup_UIMiniEventShop_Buy5-1 = "毎度ありがとうございます。\n……いかがでしたか？"
20020-CVGroup_UIMiniEventShop_Buy5-2 = "超天才清楚系病弱美少女の一日店番サービスは。"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "分析の方向を少し変えてみました。"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "偶然と必然、絶対論と相対論……"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "魅力的な題材です。そうは思いませんか？先生。"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "先生も運試しをしてみては？"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "占星術によると今日のラッキーカラーは……"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "……え？それは大丈夫……？"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "確率や統計は、物事の大半を決定づけるものです。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "占星術はもちろん、「くじ引き」とて……例外ではありません。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "全ては統制されるべき……という言葉に、私は反対です。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "まだ見ぬ世界との遭遇にこそ、"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "価値があると思っておりますので。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "未知の領域……\n心惹かれるものです。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "科学によって多くの謎が解き明かされたとしても、"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "未知の領域というのは依然として残り続けるものです。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-3 = "……そうでないと、退屈してしまいますから。"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "いつしか私たちは、目標地点にたどり着き、"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "そして……更なる目標の誕生を目撃することでしょう。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "おめでとうございます、先生。\n結果を予想できたとはいえ、"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "成果を実感する瞬間は、喜んでも良いのではないでしょうか？"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "あら、これはいわゆる「当たり」、なのですね？"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "統計学上、当たり前の結果だとしても"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "そこから喜びを感じるのは私たちの自由……。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-3 = "素晴らしいです、先生。私も嬉しいです。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-1 = "「特別」を感じられるのは、「普通」があるから。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-2 = "ですので、「普通」を大切にしてくださいね。先生。"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaFinish1-3 = "……ついでに、苦労してる超天才清楚系病弱美少女のことも。"
20020-CVGroup_UITitle_Idle1-1 = "ブル～アーカイブ～。ふふっ。"
20020-CVGroup_CharacterGet_Idle1-1 = "ヴェリタスの部長兼、特異現象捜査部の部長……\nミレニアム最高の天才清楚系病弱美少女ハッカーの明星ヒマリと申します。\nふふっ、よろしくお願いしますね、先生。"
20020-CVGroup_Cafe_Idle1-1 = "（この部屋、少々冷えますね……）"
20020-CVGroup_Cafe_Idle2-1 = "たくさんの方がいますね……\n少々疲れます。"
20020-CVGroup_Cafe_Idle3-1 = "あら、こんなものがあるなんて。\nなんだか面白いですね。"
20020-CVGroup_Cafe_Idle4-1 = "ふふっ。\nこの広さなら、ヴェリタスのみんなやエイミと一緒に\nピクニックができそうですね。"
20020-CVGroup_Cafe_Idle5-1 = "悪くない場所ですね。\nもう少し便利機能も充実しているといいのですが。\n……軽くハッキングしてみましょうか。"
20020-CVGroup_WeaponGet_Idle1-1 = "まあ、こんなに貴重なものをいただけるなんて。なにかお願い事でもあるのですか？\n私は超天才美少女ですから、何でも叶えて差し上げ……\nえ？いつも頼りにしているから……？そ、そうでしたか…ありがとうございます……先生。"
