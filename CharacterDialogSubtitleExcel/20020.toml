[translation]
20020-CVGroup_UISpecialOperationLobby_Enter1-1 = "Então, vamos começar nossas atividades como o Departamento de Investigação de Fenômenos Singulares?"
20020-CVGroup_UISpecialOperationLobby_Enter2-1 = "Fufu. Eu estava esperando por você, Sensei."
20020-CVGroup_UISpecialOperationLobby_Idle1-1 = "……Ah, estou analisando dados agora, então espere um pouco."
20020-CVGroup_UISpecialOperationLobby_Idle2-1 = "Entendo, isso é interessante……"
20020-CVGroup_UISpecialOperationLobby_Idle2-2 = "Isso se torna aquilo, hum……."
20020-CVGroup_UISpecialOperationLobby_Idle3-1 = "Decagrammaton……\nUm oponente problemático."
20020-CVGroup_UISpecialOperationLobby_Idle4-1 = "Parece haver riscos, mas……"
20020-CVGroup_UISpecialOperationLobby_Idle4-2 = "Fufu, isso o torna ainda mais interessante."
20020-CVGroup_UISpecialOperationLobby_CollectionOpen1-1 = "Parece que novos dados foram obtidos."
20020-CVGroup_UISpecialOperationLobby_CollectionOpen2-1 = "Bem, que tipo de dados são desta vez?"
20020-CVGroup_UISpecialOperationLobby_StoryOpen1-1 = "O próximo objetivo foi decidido."
20020-CVGroup_UISpecialOperationLobby_StoryOpen2-1 = "Então, vamos avançar para a próxima etapa."
20020-CVGroup_UIMiniEventLobby_Enter1-1 = "Uma nova missão e um novo ambiente……"
20020-CVGroup_UIMiniEventLobby_Enter1-2 = "……Vamos começar, Sensei."
20020-CVGroup_UIMiniEventLobby_Enter2-1 = "Sensei, poderia me dar uma mão?"
20020-CVGroup_UIMiniEventLobby_Enter2-2 = "Ora, até mesmo uma super gênio, pura e delicada garota doente,"
20020-CVGroup_UIMiniEventLobby_Enter2-3 = "precisa da ajuda de alguém, sabe?"
20020-CVGroup_UIMiniEventLobby_Enter3-1 = "Olá, Sensei."
20020-CVGroup_UIMiniEventLobby_Enter3-2 = "Esta é a nossa nova base."
20020-CVGroup_UIMiniEventLobby_Idle1-1 = "Confirmei um aumento nas condições."
20020-CVGroup_UIMiniEventLobby_Idle1-2 = "Até onde conseguiremos controlar as variáveis……\nVamos com cautela."
20020-CVGroup_UIMiniEventLobby_Idle2-1 = "Quanto mais informações, melhor, mas……"
20020-CVGroup_UIMiniEventLobby_Idle2-2 = "Se me derem tudo de uma vez, isso acaba sendo um problema."
20020-CVGroup_UIMiniEventLobby_Idle3-1 = "Estou um pouco cansada……"
20020-CVGroup_UIMiniEventLobby_Idle3-2 = "Eu ficaria muito feliz se tivesse um Sensei para me mimar em momentos assim."
20020-CVGroup_UIMiniEventLobby_Idle4-1 = "Para mim, que sou a melhor hacker e a melhor garota,"
20020-CVGroup_UIMiniEventLobby_Idle4-2 = "não ter o melhor parceiro por perto,"
20020-CVGroup_UIMiniEventLobby_Idle4-3 = "é uma situação grave.\nPor isso, Sensei, a minha…"
20020-CVGroup_UIMiniEventLobby_Idle4-4 = "Não é nada… esqueça o que eu disse."
20020-CVGroup_UIMiniEventLobby_Idle5-1 = "Entramos em uma nova fase……\nEu diria."
20020-CVGroup_UIMiniEventShop_Enter1-1 = "Aqui, realizamos a análise das"
20020-CVGroup_UIMiniEventShop_Enter1-2 = "“substâncias” que você coletou, Sensei."
20020-CVGroup_UIMiniEventShop_Enter2-1 = "Bem-vindo de volta, Sensei.\nAh…… eu estava cansada de esperar."
20020-CVGroup_UIMiniEventShop_Enter3-1 = "A coleta de amostras avançou? \nPor favor, deixe-as aqui."
20020-CVGroup_UIMiniEventShop_Idle1-1 = "Obrigada pela sua cooperação\nde sempre, Sensei."
20020-CVGroup_UIMiniEventShop_Idle2-1 = "Bem, vamos ver que tipo de informação vai surgir."
20020-CVGroup_UIMiniEventShop_Idle3-1 = "Graças a você, a investigação está indo bem.\nMas, ainda assim, esse fenômeno…… é realmente interessante."
20020-CVGroup_UIMiniEventShop_Idle4-1 = "Ah, quem diria que eu não conseguiria acompanhar as análises……"
20020-CVGroup_UIMiniEventShop_Idle4-2 = "Que ambiente luxuoso."
20020-CVGroup_UIMiniEventShop_Idle5-1 = "A busca pelo conhecimento é sempre empolgante."
20020-CVGroup_UIMiniEventShop_Idle5-2 = "Se o Sensei estiver comigo nisso……\nFufu, nem preciso dizer."
20020-CVGroup_UIMiniEventShop_Buy1-1 = "Análise concluída.\nPor favor, pode levar."
20020-CVGroup_UIMiniEventShop_Buy2-1 = "Gostou do resultado da interpretação?\nFufu, volte sempre."
20020-CVGroup_UIMiniEventShop_Buy3-1 = "Analisei com todo o cuidado para você, Sensei.\nAqui, pode pegar."
20020-CVGroup_UIMiniEventShop_Buy3-2 = "……E-eu pretendo separar o pessoal do profissional, sim, é claro."
20020-CVGroup_UIMiniEventShop_Buy4-1 = "O Sensei coleta as amostras,"
20020-CVGroup_UIMiniEventShop_Buy4-2 = "nós as analisamos e entregamos a você……"
20020-CVGroup_UIMiniEventShop_Buy4-3 = "É uma “troca comercial” estabelecida."
20020-CVGroup_UIMiniEventShop_Buy5-1 = "Obrigada pela preferência de sempre.\n……O que achou?"
20020-CVGroup_UIMiniEventShop_Buy5-2 = "Do serviço de atendente de um dia da super gênio, pura e delicada garota doente?"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter1-1 = "Mudei um pouco a direção da minha análise."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-1 = "Acaso e necessidade, absolutismo e relativismo..."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter2-2 = "São temas fascinantes. Não concorda, Sensei?"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-1 = "Por que não tenta a sorte também, Sensei?"
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-2 = "De acordo com a astrologia, a cor da sorte de hoje é..."
20020-CVGroup_UIMiniEventBoxGachaShop_Enter3-3 = "...Hã? Isso é seguro...?"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-1 = "Probabilidade e estatística determinam a maior parte das coisas."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle1-2 = "A astrologia, e até mesmo um 'sorteio', não são exceções."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-1 = "Eu discordo da ideia de que tudo deve ser controlado."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-2 = "Pois acredito que é no encontro com o desconhecido"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle2-3 = "que reside o verdadeiro valor."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle3-1 = "Territórios desconhecidos... são algo que me fascina."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-1 = "Mesmo que muitos mistérios tenham sido desvendados pela ciência,"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-2 = "o território do desconhecido ainda permanece."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle4-3 = "...Se não fosse assim, seria entediante."
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-1 = "Um dia, chegaremos ao nosso objetivo,"
20020-CVGroup_UIMiniEventBoxGachaShop_Idle5-2 = "e então... testemunharemos o nascimento de novos objetivos."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-1 = "Parabéns, Sensei. Embora eu pudesse prever o resultado,"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize1-2 = "não há problema em se alegrar ao ver os frutos do esforço, não é?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize2-1 = "Ora, então isso é o que chamam de 'prêmio principal'?"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-1 = "Mesmo que seja um resultado óbvio estatisticamente,"
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-2 = "sentir alegria por isso é um direito nosso..."
20020-CVGroup_UIMiniEventBoxGachaShop_BoxGachaPrize3-3 = "É maravilhoso, Sensei. Eu também estou feliz."
20020-CVGroup_UIMiniEventBoxGachaFinish1-1 = "Só podemos sentir o 'especial' porque o 'comum' existe."
20020-CVGroup_UIMiniEventBoxGachaFinish1-2 = "Por isso, valorize o 'comum', Sensei."
20020-CVGroup_UIMiniEventBoxGachaFinish1-3 = "...E, de quebra, valorize também esta super gênio, pura e frágil garota que tanto se esforça."
20020-CVGroup_UITitle_Idle1-1 = "Blue Archive~. Fufu."
20020-CVGroup_CharacterGet_Idle1-1 = "Sou a chefe do Veritas e também do Departamento de Investigação de Fenômenos Singulares... a maior super gênio, pura e frágil garota hacker de Millennium, Akeboshi Himari. Fufu, conto com você, Sensei."
20020-CVGroup_Cafe_Idle1-1 = "(Este quarto está um pouco frio...)"
20020-CVGroup_Cafe_Idle2-1 = "Tem muita gente aqui... é um pouco cansativo."
20020-CVGroup_Cafe_Idle3-1 = "Ora, não sabia que isso existia aqui. É bem interessante."
20020-CVGroup_Cafe_Idle4-1 = "Fufu. Com esse espaço todo, daria para fazer um piquenique com o pessoal do Veritas e a Eimi."
20020-CVGroup_Cafe_Idle5-1 = "Não é um lugar ruim. Seria melhor se tivesse mais funções convenientes... Talvez eu deva hackear um pouco."
20020-CVGroup_WeaponGet_Idle1-1 = "Nossa, receber algo tão valioso assim... Você tem algum pedido? Como sou uma super gênio, posso realizar qualquer coisa... Hã? Porque você sempre conta comigo...? Ah, é mesmo...? Obrigado... Sensei."
