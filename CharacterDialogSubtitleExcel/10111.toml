[translation]
10111-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10111-CVGroup_CharacterGet_Idle1-1 = "Nerum Mikamo, da Millennium Science School,\nacabei de chegar, e... \nAh? Essa roupa? Tem algo de errado com ela?"
10111-CVGroup_Cafe_Idle1-1 = "(O que é aquilo? Que legal!)"
10111-CVGroup_Cafe_Idle2-1 = "Bom, não é nada mal.\nVou descansar um pouco."
10111-CVGroup_Cafe_Idle3-1 = "Sinto que algo está estranho... será porque estou sem o casaco?"
10111-CVGroup_Cafe_Idle4-1 = "Quando é que o Sensei vai chegar...?"
10111-CVGroup_Cafe_Idle5-1 = "Oh, isso é legal! \nDá até vontade de decorar a sala do clube com isso."
10111-CVGroup_WeaponGet_Idle1-1 = "Pensando bem, não é nada diferente do habitual... \nMas, de alguma forma, parece especial. \n...Bem, é entre mim e o Sensei, então não adianta se preocupar com isso!"
10111-CVGroup_UIEventLobby_Enter1-1 = "Ei, Sensei! \nPor aqui, por aqui!"
10111-CVGroup_UIEventLobby_Enter2-1 = "Ah, é o Sensei! \nVocê está atrasado!"
10111-CVGroup_UIEventLobby_Enter3-1 = "Vamos, mantenha a calma!"
10111-CVGroup_UIEventLobby_Enter4-1 = "Falta só um pouco, né?"
10111-CVGroup_UIEventLobby_Enter4-2 = "Quando terminar, vou brincar com você, então aguenta firme!"
10111-CVGroup_UIEventLobby_Enter5-1 = "Ah! Foi divertido! \nComo foi para você, Sensei?"
10111-CVGroup_UIEventLobby_Idle1-1 = "O que foi? \nSe tem algo para falar, diga logo."
10111-CVGroup_UIEventLobby_Idle2-1 = "Hã? Só estava cutucando? \nQue coisa é essa."
10111-CVGroup_UIEventLobby_Idle3-1 = "...Ah, agindo como uma criança."
10111-CVGroup_UIEventLobby_Idle4-1 = "Haha! Agora é a minha vez. \nEsteja preparado."
