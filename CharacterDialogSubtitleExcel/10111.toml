[translation]
10111-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10111-CVGroup_CharacterGet_Idle1-1 = "ミレニアムサイエンススクールの美甘ネル、\nただいま参上したぜ、っと……。\nあぁ？この服？なにかおかしいっていうのか？"
10111-CVGroup_Cafe_Idle1-1 = "（なんだあれ？カッケェ！）"
10111-CVGroup_Cafe_Idle2-1 = "まあ、悪くねぇな。\nちっと一休みするか。"
10111-CVGroup_Cafe_Idle3-1 = "なんか落ち着かねえんだよな……上着がないからか？"
10111-CVGroup_Cafe_Idle4-1 = "先生はいつ来るんだ……？"
10111-CVGroup_Cafe_Idle5-1 = "お、これいいな！\n部室に飾りたいくらいだ。"
10111-CVGroup_WeaponGet_Idle1-1 = "考えてみたら全然普段と変わんねぇんだけど……\nなーんか、特別に感じるんだよな。\n……ま、あたしと先生の仲だし、気にしてもしょうがないか！"
10111-CVGroup_UIEventLobby_Enter1-1 = "よお、先生！\nこっち、こっち！"
10111-CVGroup_UIEventLobby_Enter2-1 = "あ、先生じゃん！\n遅いぞ！"
10111-CVGroup_UIEventLobby_Enter3-1 = "ほら、気をしっかり持ってくれ！"
10111-CVGroup_UIEventLobby_Enter4-1 = "あとちょっとだろ？"
10111-CVGroup_UIEventLobby_Enter4-2 = "終わったら遊んでやるから、ちったあ我慢しな！"
10111-CVGroup_UIEventLobby_Enter5-1 = "はぁー！楽しかった！\n先生はどうだった？"
10111-CVGroup_UIEventLobby_Idle1-1 = "なんだ？\n用事があるならさっさと言ってくれ。"
10111-CVGroup_UIEventLobby_Idle2-1 = "はぁ？つついてみただけ？\nなんだそりゃ。"
10111-CVGroup_UIEventLobby_Idle3-1 = "……はぁ、ガキみてぇなことしやがって。"
10111-CVGroup_UIEventLobby_Idle4-1 = "ははっ！次はあたしの番だからな。\n覚悟しとけよ。"
