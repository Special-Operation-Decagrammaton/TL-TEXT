[translation]
10126-CVGroup_UITitle_Idle1-1 = "Blue... Archive... Ihi."
10126-CVGroup_CharacterGet_Idle1-1 = "Itagaki Kanoe da Academia de Artes Wildhunt...\nEu já sabia... que nos encontraríamos hoje.\nPorque nós estamos ligados por um fio vermelho... Ihi."
10126-CVGroup_Cafe_Idle1-1 = "Na minha vida passada... eu nunca vim a um lugar como este..."
10126-CVGroup_Cafe_Idle2-1 = "Eu deveria... colocar alguns itens ocultos aqui também."
10126-CVGroup_Cafe_Idle3-1 = "Ali... tem 'alguma coisa', sabe."
10126-CVGroup_Cafe_Idle4-1 = "Não tem um lugar... escuro e apertado por aqui?"
10126-CVGroup_Cafe_Idle5-1 = "O ritual de invocação... será que posso fazer aqui?"
10126-CVGroup_WeaponGet_Idle1-1 = "Como esperado do Sensei... você entende, não é? Ihihi."
10126-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo ao clube de ocultismo... Sensei."
10126-CVGroup_UIEventLobby_Enter2-1 = "...Os segredos da academia estão esperando por você."
10126-CVGroup_UIEventLobby_Enter3-1 = "Existem tantos... segredos adormecidos, sabe?"
10126-CVGroup_UIEventLobby_Enter4-1 = "AVISO, AVISO! O EVENTO TERMINARÁ EM BREVE!"
10126-CVGroup_UIEventLobby_Enter4-2 = "...Foi o que disseram."
10126-CVGroup_UIEventLobby_Enter5-1 = "Bom trabalho, Sensei."
10126-CVGroup_UIEventLobby_Enter5-2 = "Essas memórias... eu levarei até a minha próxima vida. Ihi."
10126-CVGroup_UIEventLobby_Idle1-1 = "As mãos do Sensei... são quentes."
10126-CVGroup_UIEventLobby_Idle2-1 = "Aquele corvo... não é um que eu conheça."
10126-CVGroup_UIEventLobby_Idle3-1 = "Você gosta de mim?"
10126-CVGroup_UIEventLobby_Idle3-2 = "Diga isso... com palavras?\nIhi..."
10126-CVGroup_UIEventLobby_Idle4-1 = "Pode me acariciar o quanto quiser... como na vida passada."
10126-CVGroup_UIEventMission_Enter1-1 = "Para o Sensei... eu compilei os segredos da academia."
10126-CVGroup_UIEventMission_Enter2-1 = "Vamos... desvendá-los juntos."
10126-CVGroup_UIEventMission_Buy1-1 = "Conseguir desvendar este segredo..."
10126-CVGroup_UIEventMission_Buy1-2 = "O Sensei é incrível."
10126-CVGroup_UIEventMission_Buy2-1 = "Bom trabalho... todos ficarão felizes. Ihi."
10126-CVGroup_UIEventMission_Idle1-1 = "Em Wildhunt... ainda existem muitos segredos desconhecidos."
10126-CVGroup_UIEventMission_Idle2-1 = "Você gosta de mim...?"
10126-CVGroup_UIEventMission_Idle2-2 = "Estou tão feliz... Ihihi!"
10126-CVGroup_UIEventMission_Interaction1-1 = "Por hoje... é só isso..."
10126-CVGroup_UIEventMission_Interaction1-2 = "Bom trabalho."
