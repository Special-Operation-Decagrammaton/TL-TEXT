[translation]
10126-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ……イヒッ。"
10126-CVGroup_CharacterGet_Idle1-1 = "ワイルドハント芸術学院の板垣カノエ……。\n今日、会えることも……知ってたよ。\n私たち、赤い糸で結ばれてるからね……イヒッ。"
10126-CVGroup_Cafe_Idle1-1 = "前世で……こんなとこには来てない……。"
10126-CVGroup_Cafe_Idle2-1 = "オカルトグッズも……置いとかなきゃ。"
10126-CVGroup_Cafe_Idle3-1 = "あそこ……『何か』いるねぇ。"
10126-CVGroup_Cafe_Idle4-1 = "狭くて暗い場所……ないかな……。"
10126-CVGroup_Cafe_Idle5-1 = "召喚の儀……ここでやってもいいかな？"
10126-CVGroup_WeaponGet_Idle1-1 = "さすが先生……わかってる、ねぇ。イヒヒッ。"
10126-CVGroup_UIEventLobby_Enter1-1 = "オカ研にようこそぉ……先生。"
10126-CVGroup_UIEventLobby_Enter2-1 = "……学院の秘密が、待ってるよ。"
10126-CVGroup_UIEventLobby_Enter3-1 = "眠っている秘密が……たくさんあるんだよ？"
10126-CVGroup_UIEventLobby_Enter4-1 = "ケイコク、ケイコク！マモナクイベントガ終了シマス！"
10126-CVGroup_UIEventLobby_Enter4-2 = "……だってさぁ。"
10126-CVGroup_UIEventLobby_Enter5-1 = "お疲れ様、先生。"
10126-CVGroup_UIEventLobby_Enter5-2 = "この思い出は……来世まで持ってくよぉ。イヒッ。"
10126-CVGroup_UIEventLobby_Idle1-1 = "先生の手……あったかい。"
10126-CVGroup_UIEventLobby_Idle2-1 = "そのカラス……知らない子だねぇ。"
10126-CVGroup_UIEventLobby_Idle3-1 = "私のこと、好きぃ？"
10126-CVGroup_UIEventLobby_Idle3-2 = "ちゃんと……言葉にして？\nイヒッ……。"
10126-CVGroup_UIEventLobby_Idle4-1 = "好きなだけ撫でなよ……前世みたいにさ。"
10126-CVGroup_UIEventMission_Enter1-1 = "先生のために……学院の秘密をまとめたよぉ。"
10126-CVGroup_UIEventMission_Enter2-1 = "さ……一緒に解き明かそうかぁ。"
10126-CVGroup_UIEventMission_Buy1-1 = "この秘密を解けるなんて……。"
10126-CVGroup_UIEventMission_Buy1-2 = "先生はすごいねぇ。"
10126-CVGroup_UIEventMission_Buy2-1 = "お疲れ様ぁ……みんなも喜ぶよぉ。イヒッ。"
10126-CVGroup_UIEventMission_Idle1-1 = "ワイルドハントには……まだ知られざる秘密がいっぱいあるよぉ。"
10126-CVGroup_UIEventMission_Idle2-1 = "私のこと、好きなんだ……？"
10126-CVGroup_UIEventMission_Idle2-2 = "嬉しい……イヒヒッ！"
10126-CVGroup_UIEventMission_Interaction1-1 = "今日は……このへんで……。"
10126-CVGroup_UIEventMission_Interaction1-2 = "お疲れ様ぁ。"
