[translation]
13002-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！"
13002-CVGroup_CharacterGet_Idle1-1 = "美食研究会のアカリです。\nこれから一緒に美味しい物を食べに行きましょうか?"
13002-CVGroup_Cafe_Idle1-1 = "うーん、どこかに食べ物はないですかね。"
13002-CVGroup_Cafe_Idle2-1 = "うーん……どう考えても……\n先生の周りには女の子が多すぎます……。"
13002-CVGroup_Cafe_Idle3-1 = "フフフフ……。"
13002-CVGroup_Cafe_Idle4-1 = "今日もみんなで一緒に～、\n美味しい物を食べに行くのです！"
13002-CVGroup_Cafe_Idle5-1 = "わあ～、今日のメニューはステーキですって！\n早く食堂に行きましょう！"
13002-CVGroup_WeaponGet_Idle1-1 = "みんな、大食い大会で勝負を決めればいいのに。\n力で解決するのは嫌なんですが、\n私もこれで、準備完了です！"
