[translation]
10031-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10031-CVGroup_CharacterGet_Idle1-1 = "Fufu, quer me contratar de novo este ano?\nVocê não tem jeito mesmo, Sensei.\nÉ melhor ficar bem de perto para ver o meu sucesso este ano."
10031-CVGroup_Cafe_Idle1-1 = "Ugh... logo no início do ano e minha carteira já está leve..."
10031-CVGroup_Cafe_Idle2-1 = "O que é essencial para uma líder? É ter compostura."
10031-CVGroup_Cafe_Idle3-1 = "Hã? O presidente normalmente tem que dar um presente de Ano Novo para os funcionários!?"
10031-CVGroup_Cafe_Idle4-1 = "Um quimono caro... que tensão...\nTenho que tomar cuidado ao andar..."
10031-CVGroup_Cafe_Idle5-1 = "Estou cansada...\nA propósito, onde estão os meus funcionários?"
10031-CVGroup_WeaponGet_Idle1-1 = "Isso é o que chamam de 'tigre com asas'.\n...Está correto, né?"
10031-CVGroup_UIEventLobby_Enter1-1 = "Ora, Sensei.\nEu estava te esperando."
10031-CVGroup_UIEventLobby_Enter1-2 = "Logo no início do ano, algo que precisa ser resolvido aconteceu..."
10031-CVGroup_UIEventLobby_Enter1-3 = "Fufu, acho que vou pedir a ajuda do Sensei também."
10031-CVGroup_UIEventLobby_Enter2-1 = "As mãos do Sensei estão frias, não estão?"
10031-CVGroup_UIEventLobby_Enter2-2 = "...Não importa quanto trabalho você tenha,\nvocê precisa descansar direito, entendeu?"
10031-CVGroup_UIEventLobby_Idle1-1 = "Eu só queria rezar pelo desenvolvimento dos negócios da Problem Solver 68 ao receber o Ano Novo..."
10031-CVGroup_UIEventLobby_Idle1-2 = "Por que as coisas terminaram assim..."
10031-CVGroup_UIEventLobby_Idle2-1 = "Este ano, nós da Problem Solver 68,\nvamos renascer ainda mais."
10031-CVGroup_UIEventLobby_Idle2-2 = "Vamos lá, vamos nos esforçar para fazer deste um ano de grandes saltos!"
10031-CVGroup_UIEventLobby_Idle3-1 = "Não se preocupe, Sensei.\nSe nós da Problem Solver 68 estivermos juntos,"
10031-CVGroup_UIEventLobby_Idle3-2 = "podemos superar qualquer obstáculo."
10031-CVGroup_UIEventLobby_Idle3-3 = "...Hã? Um plano?\nB-bem, esse tipo de coisa, eu ainda não tenho nada em especial..."
10031-CVGroup_UIEventLobby_Idle4-1 = "Ufa, as coisas ficaram bem extravagantes, não é?"
10031-CVGroup_UIEventLobby_Idle4-2 = "...Será que os meus funcionários\nse machucaram ou algo assim?"
10031-CVGroup_UIEventLobby_Enter3-1 = "Quem diria que chegaria a esse nível de confusão...\nAh, foi inesperado..."
10031-CVGroup_UIEventLobby_Enter4-1 = "...Já que chegamos até aqui, é uma questão de orgulho."
10031-CVGroup_UIEventLobby_Enter4-2 = "Nós, da Problem Solver 68,\nvamos acompanhar isso até o fim!"
10031-CVGroup_UIEventLobby_Enter4-3 = "Ah, claro que o Sensei vai colaborar também, né?"
10031-CVGroup_UIEventLobby_Enter5-1 = "Afinal, o que era aquele 'KAITENFX Mk.1'!?"
10031-CVGroup_UIEventLobby_Enter5-2 = "Nossa, estou tão perplexa que nem consigo mais reclamar..."
10031-CVGroup_UIEventLobby_Enter5-3 = "Ah... bem, não adianta ficar falando sobre o que já passou..."
10031-CVGroup_UIEventLobby_Enter5-4 = "Sensei, estou cansada, que tal irmos comer alguma coisa depois disso?"
10031-CVGroup_UIEventShop_Enter1-1 = "Bem-vindo, Sensei.\nA preparação para o trabalho está perfeita."
10031-CVGroup_UIEventShop_Enter2-1 = "Nós, da Problem Solver 68,\npreparamos várias coisas para o Ano Novo."
10031-CVGroup_UIEventShop_Enter2-2 = "Fique à vontade para escolher com calma."
10031-CVGroup_UIEventShop_Idle1-1 = "Fufu, o que achou?\nUma seleção tão incrível que dá até para ficar indeciso, né?"
10031-CVGroup_UIEventShop_Idle1-2 = "Não é exagero dizer que isso é o verdadeiro potencial da Problem Solver 68♪"
10031-CVGroup_UIEventShop_Idle2-1 = "Sensei, tem algo que te chamou a atenção?"
10031-CVGroup_UIEventShop_Idle2-2 = "...Uma foto de grupo de todo mundo da Problem Solver 68 usando quimono?"
10031-CVGroup_UIEventShop_Idle2-3 = "N-não existe nada disso!"
10031-CVGroup_UIEventShop_Buy1-1 = "Como esperado, você tem bom gosto, Sensei.\nÉ maravilhoso."
10031-CVGroup_UIEventShop_Buy2-1 = "Ora, escolher isso é típico de você."
10031-CVGroup_UIEventShop_Buy2-2 = "É algo muito bom, então\ncuidar bem disso, entendeu?"
10031-CVGroup_UIEventShop_Buy3-1 = "Escolher isso... você é bom, Sensei.\nÉ por isso que você é meu parceiro de negócios."
10031-CVGroup_UIEventShop_Buy4-1 = "É legal, né?!\nEu também queria comprar um para mim e levar para o escritório..."
10031-CVGroup_UIEventShop_Buy4-2 = "Ah, não, espere, eu não estou pedindo...!"
10031-CVGroup_UIEventShop_Enter3-1 = "Ufa...\nO início de ano agitado finalmente se acalmou."
10031-CVGroup_UIEventShop_Enter3-2 = "Fufu, mas ainda estamos funcionando por aqui."
10031-CVGroup_UIEventShop_Enter3-3 = "Vamos lá, dê uma olhada com calma, Sensei♪"
