[translation]
10031-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10031-CVGroup_CharacterGet_Idle1-1 = "ふふっ、今年も私に依頼したいと？\n全くしょうがないわね、先生は。\n私の活躍、今年もすぐそばで見届けると良いわ。"
10031-CVGroup_Cafe_Idle1-1 = "うっ……新年早々、お財布が軽い……。"
10031-CVGroup_Cafe_Idle2-1 = "リーダーとして大事なもの、それは余裕よ。"
10031-CVGroup_Cafe_Idle3-1 = "えっ、社長って普通、社員にお年玉あげないといけないの！？"
10031-CVGroup_Cafe_Idle4-1 = "高い着物、緊張するわね……\n気をつけて歩かないと……。"
10031-CVGroup_Cafe_Idle5-1 = "疲れたわね……\nところで、うちの社員はどこ？"
10031-CVGroup_WeaponGet_Idle1-1 = "これぞ、虎に翼ってやつね。\n……合ってるわよね？"
10031-CVGroup_UIEventLobby_Enter1-1 = "あら、先生。\n待ってたわよ。"
10031-CVGroup_UIEventLobby_Enter1-2 = "新年早々解決しなきゃいけないことが起きたことだし……。"
10031-CVGroup_UIEventLobby_Enter1-3 = "ふふ、先生にも手伝ってもらおうかしら。"
10031-CVGroup_UIEventLobby_Enter2-1 = "先生の手、冷たいわね？"
10031-CVGroup_UIEventLobby_Enter2-2 = "……いくら仕事が多くても、\nちゃんと休まないとダメよ？"
10031-CVGroup_UIEventLobby_Idle1-1 = "新年を迎えて、\n便利屋68の事業の発展を祈ろうと思っただけだったのに……。"
10031-CVGroup_UIEventLobby_Idle1-2 = "どうしてこんなことに……。"
10031-CVGroup_UIEventLobby_Idle2-1 = "今年は我々便利屋68が、\nさらに新しく生まれ変わる年よ。"
10031-CVGroup_UIEventLobby_Idle2-2 = "さあ、頑張って飛躍の年にしましょう！"
10031-CVGroup_UIEventLobby_Idle3-1 = "心配しないで、先生。\n私たち便利屋68が一緒なら、"
10031-CVGroup_UIEventLobby_Idle3-2 = "どんな障害でも乗り越えられるわ。"
10031-CVGroup_UIEventLobby_Idle3-3 = "……え？計画？\nや、そ、そういうのはまだ、特に無いのだけれど……。"
10031-CVGroup_UIEventLobby_Idle4-1 = "ふぅ、何だか派手になってきたわね。"
10031-CVGroup_UIEventLobby_Idle4-2 = "……うちの社員たち、\n怪我とかしてないかしら？"
10031-CVGroup_UIEventLobby_Enter3-1 = "ここまでの騒ぎになるだなんて……\nはぁ、予想外だったわ……。"
10031-CVGroup_UIEventLobby_Enter4-1 = "……もうここまで来たら意地よ。"
10031-CVGroup_UIEventLobby_Enter4-2 = "我ら便利屋68、\nこうなったら最後まで付き合ってあげるわ！"
10031-CVGroup_UIEventLobby_Enter4-3 = "あ、もちろん先生も協力してくれるわよね？"
10031-CVGroup_UIEventLobby_Enter5-1 = "結局あの「KAITENFXMk.1」って何だったのよ！？"
10031-CVGroup_UIEventLobby_Enter5-2 = "もう、呆れてこれ以上文句も出てこないわ……。"
10031-CVGroup_UIEventLobby_Enter5-3 = "はぁ……\nまあ、もう終わったことにあれこれ言っても仕方ないわね……。"
10031-CVGroup_UIEventLobby_Enter5-4 = "先生、疲れたしこの後、\n一緒にご飯でもどうかしら？"
10031-CVGroup_UIEventShop_Enter1-1 = "ようこそ、先生。\n仕事に向けての準備は完璧よ。"
10031-CVGroup_UIEventShop_Enter2-1 = "私たち便利屋68で、\n新年のために色々と準備したの。"
10031-CVGroup_UIEventShop_Enter2-2 = "ゆっくり選ぶと良いわ。"
10031-CVGroup_UIEventShop_Idle1-1 = "ふふっ、どう？\n目移りしちゃうほど素晴らしい品揃えでしょう？"
10031-CVGroup_UIEventShop_Idle1-2 = "これぞ便利屋68の底力と言っても過言ではないわ♪"
10031-CVGroup_UIEventShop_Idle2-1 = "先生、何か気になるものはあった？"
10031-CVGroup_UIEventShop_Idle2-2 = "……便利屋68のみんなが着物で写ってる、集合写真？"
10031-CVGroup_UIEventShop_Idle2-3 = "な、無いわよそんなの！？"
10031-CVGroup_UIEventShop_Buy1-1 = "流石、見る目があるわね、先生。\n素晴らしいわ。"
10031-CVGroup_UIEventShop_Buy2-1 = "あら、それを選ぶとは流石ね。"
10031-CVGroup_UIEventShop_Buy2-2 = "すごく良いものだから、\nちゃんと大事にしなさい？"
10031-CVGroup_UIEventShop_Buy3-1 = "それを選ぶとは、やるわね先生。\nそれでこそ私のビジネスパートナーだわ。"
10031-CVGroup_UIEventShop_Buy4-1 = "良いわよね、それ！\n私もひとつくらい自分で買って、事務所に……"
10031-CVGroup_UIEventShop_Buy4-2 = "あっ、違うわ、ねだってるわけでは無くて……！"
10031-CVGroup_UIEventShop_Enter3-1 = "ふぅ……\n大騒ぎの年明けもようやく落ち着いたわね。"
10031-CVGroup_UIEventShop_Enter3-2 = "ふふっ、でもまだまだここは営業してるわよ。"
10031-CVGroup_UIEventShop_Enter3-3 = "さあ、落ち着いて見ていきなさい、先生♪"
