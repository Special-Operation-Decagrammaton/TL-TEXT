[translation]
10084-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
10084-CVGroup_CharacterGet_Idle1-1 = "こちらにいらしたんですね。\n山でも、海でも……\n先生の音は、どこにいても聞き逃しません。"
10084-CVGroup_Cafe_Idle1-1 = "これが……SNSで話題のインテリア、ですか…。"
10084-CVGroup_Cafe_Idle2-1 = "今流れているこれ……\n曲名が思い出せません……。"
10084-CVGroup_Cafe_Idle3-1 = "……この辺に置いたはずなのに……。"
10084-CVGroup_Cafe_Idle4-1 = "……録音、完了です。"
10084-CVGroup_Cafe_Idle5-1 = "（うーん……？いま、気になる話を耳にしたような……）"
10084-CVGroup_WeaponGet_Idle1-1 = "銃声の代わりに先生の声がするようになればいいのに……\n実現できないか工夫してみようと思います。"
10084-CVGroup_UIEventLobby_Enter1-1 = "服に隙間風が入ってくるので……"
10084-CVGroup_UIEventLobby_Enter1-2 = "つい身体を丸めてしまいます。"
10084-CVGroup_UIEventLobby_Enter2-1 = "わざわざ外で年越しするなんて……\n効率性に欠けます。"
10084-CVGroup_UIEventLobby_Enter3-1 = "（いくら副部長でも、こんなところに盗聴器を隠してるだなんて思ってもいないでしょう。）"
10084-CVGroup_UIEventLobby_Enter3-2 = "（ふふ……）"
10084-CVGroup_UIEventLobby_Enter4-1 = "どうしてこのタイミングで熊が……"
10084-CVGroup_UIEventLobby_Enter4-2 = "世界の悪意を感じます……。"
10084-CVGroup_UIEventLobby_Enter5-1 = "早く戻って、録音した先生の音声ファイルを編集し……"
10084-CVGroup_UIEventLobby_Enter5-2 = "で、ではなく、早く休憩を取りたいと思います！"
10084-CVGroup_UIEventLobby_Idle1-1 = "沈黙と静寂……\n私が最も苦手とする環境です……。"
10084-CVGroup_UIEventLobby_Idle2-1 = "唯一の利点は……"
10084-CVGroup_UIEventLobby_Idle2-2 = "先生の声が雑音なくはっきり聴こえること、でしょうか。"
10084-CVGroup_UIEventLobby_Idle3-1 = "この風……\n少し……泣いているような。"
10084-CVGroup_UIEventLobby_Idle4-1 = "周波数検索中……半径3km内の通信記録は……"
10084-CVGroup_UIEventLobby_Idle4-2 = "0件。"
10084-CVGroup_UIEventMission_Enter1-1 = "せ、先生……もしよろしければ……"
10084-CVGroup_UIEventMission_Enter1-2 = "キャンプの設営にご協力、\nいただけますでしょうか……。"
10084-CVGroup_UIEventMission_Enter2-1 = "あ、先生。\n副部長の指示で、キャンプの設営をしているところです。"
10084-CVGroup_UIEventMission_Idle1-1 = "たしか「超カンタン設営」のキャンプ装備、\nと聞いていたのですが……"
10084-CVGroup_UIEventMission_Idle1-2 = "設置は全然簡単じゃなかったような……。"
10084-CVGroup_UIEventMission_Idle2-1 = "何か仰りたい事が……？"
10084-CVGroup_UIEventMission_Idle2-2 = "少々お待ちください、\n録音の準備をしますので。"
10084-CVGroup_UIEventMission_Buy1-1 = "なるほど、参考にします。"
10084-CVGroup_UIEventMission_Buy2-1 = "今の、もう一度見せていただけますか？"
10084-CVGroup_UIEventMission_Buy2-2 = "できれば、口頭での解説も一緒に、お願いします。"
10084-CVGroup_UIEventMission_Interaction1-1 = "これなら、今晩は快適に過ごせるかと。"
