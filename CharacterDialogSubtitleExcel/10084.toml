[translation]
10084-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10084-CVGroup_CharacterGet_Idle1-1 = "Você veio até aqui.\nSeja na montanha ou no mar...\nEu nunca deixaria de ouvir a voz do Sensei, não importa onde esteja."
10084-CVGroup_Cafe_Idle1-1 = "Então... este é o item de decoração que está fazendo sucesso nas redes sociais..."
10084-CVGroup_Cafe_Idle2-1 = "Essa música que está tocando agora...\nNão consigo me lembrar do nome dela..."
10084-CVGroup_Cafe_Idle3-1 = "...Eu tinha certeza de que tinha colocado por aqui..."
10084-CVGroup_Cafe_Idle4-1 = "...Gravação concluída."
10084-CVGroup_Cafe_Idle5-1 = "(Hmm...? Senti como se tivesse ouvido algo interessante agora pouco...)"
10084-CVGroup_WeaponGet_Idle1-1 = "Seria ótimo se, em vez do som de tiros, eu pudesse ouvir a voz do Sensei...\nVou tentar bolar um jeito de tornar isso realidade."
10084-CVGroup_UIEventLobby_Enter1-1 = "O vento está entrando pelas frestas da roupa, então..."
10084-CVGroup_UIEventLobby_Enter1-2 = "Acabo me encolhendo sem querer."
10084-CVGroup_UIEventLobby_Enter2-1 = "Passar a virada do ano ao ar livre de propósito...\nIsso é pouco eficiente."
10084-CVGroup_UIEventLobby_Enter3-1 = "(Mesmo sendo a vice-presidente, ela nunca imaginaria que escondi um microfone aqui.)"
10084-CVGroup_UIEventLobby_Enter3-2 = "(Hehe...)"
10084-CVGroup_UIEventLobby_Enter4-1 = "Por que um urso apareceria justamente agora..."
10084-CVGroup_UIEventLobby_Enter4-2 = "Sinto a malícia do mundo..."
10084-CVGroup_UIEventLobby_Enter5-1 = "Vou voltar logo para editar o arquivo de áudio do Sensei que gravei..."
10084-CVGroup_UIEventLobby_Enter5-2 = "D-digo, quero dizer que vou tirar uma folga logo!"
10084-CVGroup_UIEventLobby_Idle1-1 = "Silêncio e calmaria...\nÉ o ambiente que eu menos gosto..."
10084-CVGroup_UIEventLobby_Idle2-1 = "A única vantagem é..."
10084-CVGroup_UIEventLobby_Idle2-2 = "Que a voz do Sensei fica clara, sem nenhum ruído, não é?"
10084-CVGroup_UIEventLobby_Idle3-1 = "Este vento...\nParece que está... chorando um pouco."
10084-CVGroup_UIEventLobby_Idle4-1 = "Buscando frequências... registros de comunicação num raio de 3km..."
10084-CVGroup_UIEventLobby_Idle4-2 = "0 resultados."
10084-CVGroup_UIEventMission_Enter1-1 = "S-Sensei... se não for pedir muito..."
10084-CVGroup_UIEventMission_Enter1-2 = "Poderia me ajudar a montar o acampamento...?"
10084-CVGroup_UIEventMission_Enter2-1 = "Ah, Sensei. Estou montando o acampamento seguindo as instruções da vice-presidente."
10084-CVGroup_UIEventMission_Idle1-1 = "Disseram que era um equipamento de acampamento de \"montagem super fácil\"..."
10084-CVGroup_UIEventMission_Idle1-2 = "Mas não me pareceu nada fácil de montar..."
10084-CVGroup_UIEventMission_Idle2-1 = "Tem algo que gostaria de dizer...?"
10084-CVGroup_UIEventMission_Idle2-2 = "Por favor, espere um pouco, vou preparar a gravação."
10084-CVGroup_UIEventMission_Buy1-1 = "Entendido, vou levar isso em consideração."
10084-CVGroup_UIEventMission_Buy2-1 = "Poderia me mostrar isso de novo?"
10084-CVGroup_UIEventMission_Buy2-2 = "Se possível, gostaria que explicasse verbalmente também."
10084-CVGroup_UIEventMission_Interaction1-1 = "Com isso, acho que poderemos passar a noite confortavelmente."
