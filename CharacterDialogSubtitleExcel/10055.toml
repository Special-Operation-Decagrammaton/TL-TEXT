[translation]
10055-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10055-CVGroup_CharacterGet_Idle1-1 = "Ah, Sensei.\nQue tal uma xícara antes do trabalho?\nHehe... não é bebida alcoólica, pode ficar tranquilo."
10055-CVGroup_Cafe_Idle1-1 = "Tem tantas coisas fofas aqui."
10055-CVGroup_Cafe_Idle2-1 = "Aquilo é...?"
10055-CVGroup_Cafe_Idle3-1 = "A temperatura está perfeita para a fermentação."
10055-CVGroup_Cafe_Idle4-1 = "Aqui é tão quentinho.\n...Queria ficar aqui só mais um pouco."
10055-CVGroup_Cafe_Idle5-1 = "Misturando um pouco daquilo com isto..."
10055-CVGroup_WeaponGet_Idle1-1 = "Este lança-granadas é bom para acender fogo, mas não é lá essas coisas para caçar.\n...Mas bem, acho que serve para espantar ursos."
10055-CVGroup_UIEventMission_Enter1-1 = "Ei, Sensei.\nSe não se importar, poderia me ajudar com o trabalho na estância termal?"
10055-CVGroup_UIEventMission_Enter2-1 = "Tem um minuto?\nQueria fazer um exercício leve antes de entrar na fonte termal."
10055-CVGroup_UIEventMission_Idle1-1 = "A Nodoka é tão esforçada."
10055-CVGroup_UIEventMission_Idle2-1 = "Hehe, o mors desta vez ficou muito bom."
10055-CVGroup_UIEventMission_Idle3-1 = "Hm?\nQuer ir ao banho comigo?"
10055-CVGroup_UIEventMission_Idle3-2 = "Brincadeira.\nNão precisa ficar com essa cara séria."
10055-CVGroup_UIEventMission_Buy1-1 = "Bom trabalho.\nAceita um gole de mors?"
10055-CVGroup_UIEventMission_Buy2-1 = "Como esperado do Sensei.\nEntendi por que você é tão popular com todos."
10055-CVGroup_UIEventMission_Interaction1-1 = "Por hoje é só.\nQue tal relaxar um pouco e entrar no banho?"
