[translation]
10055-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10055-CVGroup_CharacterGet_Idle1-1 = "あ、先生。\n仕事前に一杯どうかな？\nふふっ……お酒じゃないから安心して。"
10055-CVGroup_Cafe_Idle1-1 = "かわいいものがいっぱいだね。"
10055-CVGroup_Cafe_Idle2-1 = "あれは……？"
10055-CVGroup_Cafe_Idle3-1 = "発酵に最適な温度だね。"
10055-CVGroup_Cafe_Idle4-1 = "ここは温かいね。\n……もう少しだけここにいたいな。"
10055-CVGroup_Cafe_Idle5-1 = "これにアレを少し混ぜて……。"
10055-CVGroup_WeaponGet_Idle1-1 = "このグレネードランチャー、\n火を起こす時はいいんだけど狩りでは微妙なんだよね。\n……でもまぁ、熊を追い返すには十分なのかな。"
10055-CVGroup_UIEventMission_Enter1-1 = "やっほー、先生。\nよかったら温泉郷の仕事を手伝ってもらえないかな。"
10055-CVGroup_UIEventMission_Enter2-1 = "ちょっといい？\n温泉に浸かる前に軽く運動したくて。"
10055-CVGroup_UIEventMission_Idle1-1 = "ノドカは頑張り屋さんなんだから。"
10055-CVGroup_UIEventMission_Idle2-1 = "ふふ、今回のモルスはよく出来てる。"
10055-CVGroup_UIEventMission_Idle3-1 = "ん？\n一緒にお風呂に行きたいの？"
10055-CVGroup_UIEventMission_Idle3-2 = "冗談。\nそんな真顔にならないで。"
10055-CVGroup_UIEventMission_Buy1-1 = "お疲れ様。\nよかったらモルス一口、どう？"
10055-CVGroup_UIEventMission_Buy2-1 = "さすが先生。\n皆に人気の理由が分かったよ。"
10055-CVGroup_UIEventMission_Interaction1-1 = "今日はこれでおしまい。\nあとはお風呂にでも浸かって、\nのんびりするのはどうかな。"
