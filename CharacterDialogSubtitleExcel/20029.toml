[translation]
20029-CVGroup_UITitle_Idle1-1 = "Blue Archive~"
20029-CVGroup_CharacterGet_Idle1-1 = "Verão... mar... estou cheia de expectativas, Sensei.\nE, claro, não me esqueci do meu treinamento."
20029-CVGroup_Cafe_Idle1-1 = "Que tal tentarmos criar um lugar onde todos possam relaxar?"
20029-CVGroup_Cafe_Idle2-1 = "Um lugar fresco, não é?\nParece que dá para descansar tranquilamente."
20029-CVGroup_Cafe_Idle3-1 = "Parece que todos estão se divertindo...\nFico feliz."
20029-CVGroup_Cafe_Idle4-1 = "O que será que a Tsubaki e a Kaede estão fazendo agora...?"
20029-CVGroup_Cafe_Idle5-1 = "Acabar cozinhando sem nem perceber...\nO verão... é assustador, não é!"
20029-CVGroup_WeaponGet_Idle1-1 = "Receber um presente tão maravilhoso assim... Eu queria conseguir expressar em palavras o que transborda no meu peito, mas... não consigo organizar meus pensamentos... então... obrigada, Sensei."
20029-CVGroup_UIEventLobby_Enter1-1 = "Ah, bem-vindo de volta, Sensei."
20029-CVGroup_UIEventLobby_Enter1-2 = "É a casa de praia.\nMe esforcei muito para preparar tudo!"
20029-CVGroup_UIEventLobby_Enter2-1 = "Estava à sua espera, Sensei."
20029-CVGroup_UIEventLobby_Enter2-2 = "Hehe. Ajudar o pessoal do Comitê Organizador do Festival também é divertido."
20029-CVGroup_UIEventLobby_Enter3-1 = "Caça ao resort...\nAs coisas saíram completamente do controle, não é..."
20029-CVGroup_UIEventLobby_Enter3-2 = "Não, é justamente nessas horas que precisamos manter o foco."
20029-CVGroup_UIEventLobby_Enter4-1 = "Seria mentira dizer que não estava preocupada desde o início, mas..."
20029-CVGroup_UIEventLobby_Enter4-2 = "Tudo isso é graças à sua presença, Sensei."
20029-CVGroup_UIEventLobby_Enter5-1 = "Memórias de um verão no mar... Que palavras maravilhosas."
20029-CVGroup_UIEventLobby_Enter5-2 = "Este ano, em especial, senti isso com muita força."
20029-CVGroup_UIEventLobby_Idle1-1 = "Sensei? Me chamou?"
20029-CVGroup_UIEventLobby_Idle1-2 = "Sinta-se à vontade para me chamar a qualquer momento."
20029-CVGroup_UIEventLobby_Idle2-1 = "Está bem quente, não é... Por favor, tome cuidado com a insolação, Sensei."
20029-CVGroup_UIEventLobby_Idle2-2 = "...Se for preciso, eu cuidarei de você."
20029-CVGroup_UIEventLobby_Idle3-1 = "Shizuko-chan... será que ela está bem?\nEstou um pouco preocupada."
20029-CVGroup_UIEventLobby_Idle4-1 = "Resolver o incidente... sinto que pode ser difícil, mas,"
20029-CVGroup_UIEventLobby_Idle4-2 = "se cooperarmos com todos, com certeza vai dar tudo certo, não é?"
20029-CVGroup_UIEventLobby_Idle5-1 = "Talvez este seja o momento de mostrar os resultados do meu treinamento."
