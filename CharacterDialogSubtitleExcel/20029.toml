[translation]
20029-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ～"
20029-CVGroup_CharacterGet_Idle1-1 = "夏……海……楽しみでいっぱいですね、先生。\nも、もちろん修行も忘れていませんよ。"
20029-CVGroup_Cafe_Idle1-1 = "皆さんが寛げる場所を作ってみましょうか。"
20029-CVGroup_Cafe_Idle2-1 = "涼しいところですね。\nゆっくり休めそうです。"
20029-CVGroup_Cafe_Idle3-1 = "皆さん楽しんでるみたいで……\n良かったです。"
20029-CVGroup_Cafe_Idle4-1 = "ツバキちゃんとカエデちゃんは、\n今頃何をしているんでしょう……。"
20029-CVGroup_Cafe_Idle5-1 = "知らずにゆだってしまう……\n夏……怖いですね！"
20029-CVGroup_WeaponGet_Idle1-1 = "こんな素敵なプレゼントをいただけるなんて……\n胸にあふれる私の気持ちを、きちんと言葉にして伝えたいのですが……\n上手く、まとまらなくて……その……ありがとうございます、先生。"
20029-CVGroup_UIEventLobby_Enter1-1 = "あ、おかえりなさい、先生。"
20029-CVGroup_UIEventLobby_Enter1-2 = "海の家ですよ。\n頑張って準備いたしました！"
20029-CVGroup_UIEventLobby_Enter2-1 = "お待ちしておりました。先生。"
20029-CVGroup_UIEventLobby_Enter2-2 = "ふふ。お祭り運営委員会の\nみなさんを手伝うのも楽しいですね。"
20029-CVGroup_UIEventLobby_Enter3-1 = "リゾート狩り……\nとんでもないことになってしまっていますね……"
20029-CVGroup_UIEventLobby_Enter3-2 = "いいえ、こういう時こそ気を引き締めなければなりませんね。"
20029-CVGroup_UIEventLobby_Enter4-1 = "最初から、不安じゃなかったといえば嘘ですが……"
20029-CVGroup_UIEventLobby_Enter4-2 = "これもすべて、先生がいてくださったおかげです。"
20029-CVGroup_UIEventLobby_Enter5-1 = "夏の海の思い出……素敵な言葉ですね。"
20029-CVGroup_UIEventLobby_Enter5-2 = "今年は特に、強くそう思いました。"
20029-CVGroup_UIEventLobby_Idle1-1 = "先生？お呼びでしょうか？"
20029-CVGroup_UIEventLobby_Idle1-2 = "いつでもお声がけくださいね。"
20029-CVGroup_UIEventLobby_Idle2-1 = "結構暑いですね……熱中症にはお気をつけください、先生。"
20029-CVGroup_UIEventLobby_Idle2-2 = "……いざとなったら私がお世話しますよ。"
20029-CVGroup_UIEventLobby_Idle3-1 = "シズコちゃん……大丈夫でしょうか？\n少し、心配です。"
20029-CVGroup_UIEventLobby_Idle4-1 = "事件を解決するのは……難しい気もしますが、"
20029-CVGroup_UIEventLobby_Idle4-2 = "皆さんと協力すれば、きっと大丈夫ですよね。"
20029-CVGroup_UIEventLobby_Idle5-1 = "今こそ修行の成果を見せるとき、かもしれませんね。"
