[translation]
26009-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ……。"
26009-CVGroup_CharacterGet_Idle1-1 = "花岡ユズ……です。\n色々あって……今はこの格好をしています。\nよろしく、お願いします……。"
26009-CVGroup_Cafe_Idle1-1 = "今のわたしはメイドだし……\n掃除でもしてみようかな……。"
26009-CVGroup_Cafe_Idle2-1 = "ゲームを作るメイド……新しいかも？"
26009-CVGroup_Cafe_Idle3-1 = "うう……どこかに隠れたい……。"
26009-CVGroup_Cafe_Idle4-1 = "段ボールは、潜入の必須アイテムだけど……。"
26009-CVGroup_Cafe_Idle5-1 = "おかえりなさい、ご主人様。\nうう、やっぱり恥ずかしい……。"
26009-CVGroup_WeaponGet_Idle1-1 = "こ、ここまでしてもらえるなんて……そんな……すごく、嬉しいです。\n……わたし、もっと頑張りますね。\n……見ていてください、先生！"
26009-CVGroup_UIEventLobby_Enter1-1 = "先生！えっと……"
26009-CVGroup_UIEventLobby_Enter1-2 = "おかえりなさいませ、ご主人様。"
26009-CVGroup_UIEventLobby_Enter2-1 = "こんなに人がいるところは、慣れてなくて……。"
26009-CVGroup_UIEventLobby_Enter2-2 = "これもある意味、イベントだとは思いますが……。"
26009-CVGroup_UIEventLobby_Enter3-1 = "掃除におもてなし……"
26009-CVGroup_UIEventLobby_Enter3-2 = "うう、お客さんがもうちょっと少なかったら……。"
26009-CVGroup_UIEventLobby_Enter4-1 = "た、大変なことになってしまいました……！"
26009-CVGroup_UIEventLobby_Enter4-2 = "先生……助けてください……！"
26009-CVGroup_UIEventLobby_Enter5-1 = "あんなことが起きたなんて、\n未だに信じられません……"
26009-CVGroup_UIEventLobby_Enter5-2 = "解決できたのは、全部先生のお陰です。"
26009-CVGroup_UIEventLobby_Idle1-1 = "は、箱は？箱はどこに？あれがないと、わたし……"
26009-CVGroup_UIEventLobby_Idle1-2 = "あ、見つけてくださったんですね！"
26009-CVGroup_UIEventLobby_Idle1-3 = "ありがとうございます、先生。"
26009-CVGroup_UIEventLobby_Idle2-1 = "その……すごく、怖いですが……"
26009-CVGroup_UIEventLobby_Idle2-2 = "この体験は、ゲームに生かせるかもしれませんし……。"
26009-CVGroup_UIEventLobby_Idle3-1 = "先生。わたし……\n上手くできるでしょうか？"
26009-CVGroup_UIEventLobby_Idle4-1 = "うう……帰ってゲームしたい……"
26009-CVGroup_UIEventLobby_Idle4-2 = "でも、震えてばかりじゃいけませんよね。"
26009-CVGroup_UIEventLobby_Idle4-3 = "わたしにできることをしないと……。"
