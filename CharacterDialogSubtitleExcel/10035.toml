[translation]
10035-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ……。"
10035-CVGroup_CharacterGet_Idle1-1 = "うあぁっ……！？\nあ、先生、でしたか……。\n誰かと思って、ビックリしました……。"
10035-CVGroup_Cafe_Idle1-1 = "こ、ここは……一体……？"
10035-CVGroup_Cafe_Idle2-1 = "し、視線を感じる……\nうぅっ……。"
10035-CVGroup_Cafe_Idle3-1 = "そ、外にいるよりは、マシかもしれません……。"
10035-CVGroup_Cafe_Idle4-1 = "えっと……\nあ、あれは……？"
10035-CVGroup_Cafe_Idle5-1 = "で、できるだけ話しかけないでもらえると……。\nあ、せ、先生は例外です……。"
10035-CVGroup_WeaponGet_Idle1-1 = "しょ、正直なことを言うと、まだよく分かっていません……\nどうしてこんな私に、ここまでのことを……で、ですが……\nこんなに良くしていただいたからには、はい……！が、頑張ってみます……！"
10035-CVGroup_UIEventLobby_Enter1-1 = "あ、せ、先生……。"
10035-CVGroup_UIEventLobby_Enter1-2 = "お、お待ちしておりました……。"
10035-CVGroup_UIEventLobby_Enter2-1 = "いらっしゃいましたか、先生……。"
10035-CVGroup_UIEventLobby_Enter2-2 = "ま、またお会いできるとは……。"
10035-CVGroup_UIEventLobby_Enter3-1 = "もう期間も残り半分ですか……。"
10035-CVGroup_UIEventLobby_Enter3-2 = "何だか少し……"
10035-CVGroup_UIEventLobby_Enter3-3 = "いえ、気にしないでください。"
10035-CVGroup_UIEventLobby_Enter4-1 = "あと少し、ですね……"
10035-CVGroup_UIEventLobby_Enter4-2 = "ふぅ……。"
10035-CVGroup_UIEventLobby_Enter5-1 = "ずっとこうやって……\n傍にいられたら……。"
10035-CVGroup_UIEventLobby_Idle1-1 = "あっ、は、はい……\nお呼びでしょうか？"
10035-CVGroup_UIEventLobby_Idle1-2 = "ど、どうかされましたか……？"
10035-CVGroup_UIEventLobby_Idle2-1 = "ひぇっ……！？"
10035-CVGroup_UIEventLobby_Idle3-1 = "あの……先生……。\nそろそろ……動かれた方が……？"
10035-CVGroup_UIEventLobby_Idle4-1 = "えっと……\nもしかして私に、何かご用事が……？"
10035-CVGroup_UIEventMission_Enter1-1 = "や、やることリストをまとめてみました……。"
10035-CVGroup_UIEventMission_Enter2-1 = "こ、こちらです。\n先生には、お手数をおかけしますが……。"
10035-CVGroup_UIEventMission_Idle1-1 = "せ、先生？\nこれは、どういう……？"
10035-CVGroup_UIEventMission_Idle1-2 = "あ、いえ、お気になさらず……。"
10035-CVGroup_UIEventMission_Idle2-1 = "こ、こうやってただ、ふたりでリストを確認しているだけで……\n何だか、楽しいですね……。"
10035-CVGroup_UIEventMission_Buy1-1 = "あ、お疲れ様です……\n何とか上手くいったようですね。"
10035-CVGroup_UIEventMission_Buy2-1 = "あ、そうでしたか……\nでは、チェックしておきますね。\nお疲れ様でした。"
10035-CVGroup_UIEventMission_Interaction1-1 = "きょ、今日の分は、これで終わり……ですね。\nあ、ありがとうございました、先生。"
