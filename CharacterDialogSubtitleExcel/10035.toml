[translation]
10035-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
10035-CVGroup_CharacterGet_Idle1-1 = "Aah...!?\nAh, era você, Sensei...\nLevei um susto, achei que fosse outra pessoa..."
10035-CVGroup_Cafe_Idle1-1 = "O-onde... é aqui...?"
10035-CVGroup_Cafe_Idle2-1 = "E-estou sentindo olhares...\nUgh..."
10035-CVGroup_Cafe_Idle3-1 = "T-talvez seja melhor do que ficar lá fora..."
10035-CVGroup_Cafe_Idle4-1 = "Hum...\nAh, o que é aquilo...?"
10035-CVGroup_Cafe_Idle5-1 = "P-por favor, tente não falar comigo se possível...\nAh, s-sensei, você é uma exceção..."
10035-CVGroup_WeaponGet_Idle1-1 = "S-sendo sincera, ainda não entendo muito bem...\nPor que alguém como você faria tanto por mim... M-mas...\nJá que você foi tão gentil comigo, sim...! E-eu vou me esforçar...!"
10035-CVGroup_UIEventLobby_Enter1-1 = "Ah, s-sensei..."
10035-CVGroup_UIEventLobby_Enter1-2 = "E-estava esperando por você..."
10035-CVGroup_UIEventLobby_Enter2-1 = "Você chegou, Sensei..."
10035-CVGroup_UIEventLobby_Enter2-2 = "N-não acredito que podemos nos encontrar de novo..."
10035-CVGroup_UIEventLobby_Enter3-1 = "Já estamos na metade do período, não é..."
10035-CVGroup_UIEventLobby_Enter3-2 = "De alguma forma, um pouco..."
10035-CVGroup_UIEventLobby_Enter3-3 = "Não, não se preocupe com isso."
10035-CVGroup_UIEventLobby_Enter4-1 = "Falta pouco, né..."
10035-CVGroup_UIEventLobby_Enter4-2 = "Phew..."
10035-CVGroup_UIEventLobby_Enter5-1 = "Se pudéssemos ficar assim...\nAo seu lado para sempre..."
10035-CVGroup_UIEventLobby_Idle1-1 = "Ah, s-sim...\nVocê me chamou?"
10035-CVGroup_UIEventLobby_Idle1-2 = "A-aconteceu alguma coisa...?"
10035-CVGroup_UIEventLobby_Idle2-1 = "Hieee...!?"
10035-CVGroup_UIEventLobby_Idle3-1 = "Ei... Sensei...\nNão seria melhor... a gente se mexer...?"
10035-CVGroup_UIEventLobby_Idle4-1 = "Hum...\nPor acaso você tem... algum assunto comigo...?"
10035-CVGroup_UIEventMission_Enter1-1 = "E-eu organizei a lista de tarefas..."
10035-CVGroup_UIEventMission_Enter2-1 = "A-aqui está.\nDesculpe te dar esse trabalho, Sensei..."
10035-CVGroup_UIEventMission_Idle1-1 = "S-sensei?\nO que é isso...?"
10035-CVGroup_UIEventMission_Idle1-2 = "Ah, não, não se preocupe..."
10035-CVGroup_UIEventMission_Idle2-1 = "S-só de estarmos aqui, conferindo a lista juntos...\nÉ um pouco divertido, não é..."
10035-CVGroup_UIEventMission_Buy1-1 = "Ah, bom trabalho...\nParece que deu tudo certo."
10035-CVGroup_UIEventMission_Buy2-1 = "Ah, era isso...\nEntão, vou marcar aqui.\nBom trabalho."
10035-CVGroup_UIEventMission_Interaction1-1 = "A-acabamos com as tarefas de hoje... né.\nAh, muito obrigada, Sensei."
