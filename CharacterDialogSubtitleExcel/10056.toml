[translation]
10056-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10056-CVGroup_CharacterGet_Idle1-1 = "メリークリスマス！\n救護騎士団のセリナです！\n特別なクリスマスにしましょうね！"
10056-CVGroup_Cafe_Idle1-1 = "皆さん、風邪には気を付けてくださいね。"
10056-CVGroup_Cafe_Idle2-1 = "救急薬もプレゼントになるかな……。"
10056-CVGroup_Cafe_Idle3-1 = "良い子に贈るプレゼント……\n何がいいでしょう？"
10056-CVGroup_Cafe_Idle4-1 = "無理しちゃダメですよ。\n健康が一番です。"
10056-CVGroup_Cafe_Idle5-1 = "皆さんの健康を心から祈っています。"
10056-CVGroup_WeaponGet_Idle1-1 = "わぁ、ありがとうございます。\n知っていますか？サンタさんは泣いている子にはプレゼントは渡せないんです。\nだから、先生は泣かないでくださいね？"
10056-CVGroup_UIEventLobby_Enter1-1 = "先生！クリスマスですよ！"
10056-CVGroup_UIEventLobby_Enter2-1 = "私までワクワクしてきます。"
10056-CVGroup_UIEventLobby_Enter2-2 = "皆さんに「幸せ」という名のプレゼントが届きますように……"
10056-CVGroup_UIEventLobby_Enter2-3 = "今年のクリスマス、何かご予定はありますか？"
10056-CVGroup_UIEventLobby_Enter2-4 = "その……もしよろしければ、私と二人で……"
10056-CVGroup_UIEventLobby_Enter2-5 = "い、いえっ、なんでもありません！"
10056-CVGroup_UIEventLobby_Idle1-1 = "はい！サンタのセリナですよ！"
10056-CVGroup_UIEventLobby_Idle2-1 = "何かお手伝いすることはありますか？"
10056-CVGroup_UIEventLobby_Idle3-1 = "クリスマスには、\nサンタのセリナを呼んでくださいね！"
10056-CVGroup_UIEventLobby_Idle4-1 = "先生？どうかしましたか？"
10056-CVGroup_UIEventShop_Enter1-1 = "クリスマスのチャリティー募金はこちらです！"
10056-CVGroup_UIEventShop_Enter2-1 = "困っている方々のために、\nどうか寄付をお願いします！"
10056-CVGroup_UIEventShop_Idle1-1 = "先生、何かお手伝いさせてください。"
10056-CVGroup_UIEventShop_Idle2-1 = "ハナエちゃん、大丈夫かな……。"
10056-CVGroup_UIEventShop_Buy1-1 = "ありがとうございます。\nはい、こちらがプレゼントですよ。"
10056-CVGroup_UIEventShop_Buy2-1 = "メリークリスマス！\n素敵な一日をお過ごしください！"
10056-CVGroup_UIEventShop_Buy3-1 = "こんなに貴重なものまで……\n寄付していただいていいんですか？"
10056-CVGroup_UIEventShop_Enter3-1 = "クリスマスのチャリティー募金は終了しました。"
10056-CVGroup_UIEventShop_Enter3-2 = "やり残した事はないか、確認してくださいね。"
