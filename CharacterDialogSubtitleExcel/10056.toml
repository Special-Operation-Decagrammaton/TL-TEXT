[translation]
10056-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10056-CVGroup_CharacterGet_Idle1-1 = "Feliz Natal!\nSou a Serina, do Esquadrão de Primeiros Socorros!\nVamos tornar este um Natal especial!"
10056-CVGroup_Cafe_Idle1-1 = "Pessoal, tomem cuidado para não pegarem um resfriado."
10056-CVGroup_Cafe_Idle2-1 = "Será que remédios de emergência também servem como presente...?"
10056-CVGroup_Cafe_Idle3-1 = "Um presente para as crianças boazinhas...\nO que seria bom?"
10056-CVGroup_Cafe_Idle4-1 = "Não se esforce demais.\nA saúde vem em primeiro lugar."
10056-CVGroup_Cafe_Idle5-1 = "Rezo do fundo do meu coração pela saúde de todos vocês."
10056-CVGroup_WeaponGet_Idle1-1 = "Uau, muito obrigada.\nVocê sabia? O Papai Noel não pode dar presentes para crianças que estão chorando.\nEntão, Sensei, por favor, não chore, está bem?"
10056-CVGroup_UIEventLobby_Enter1-1 = "Sensei! É Natal!"
10056-CVGroup_UIEventLobby_Enter2-1 = "Até eu estou ficando empolgada."
10056-CVGroup_UIEventLobby_Enter2-2 = "Espero que um presente chamado \"felicidade\" chegue a todos vocês..."
10056-CVGroup_UIEventLobby_Enter2-3 = "Você tem algum plano para o Natal deste ano?"
10056-CVGroup_UIEventLobby_Enter2-4 = "Bem... se não for incômodo, talvez você pudesse..."
10056-CVGroup_UIEventLobby_Enter2-5 = "N-não, não é nada!"
10056-CVGroup_UIEventLobby_Idle1-1 = "Sim! É a Serina Noel!"
10056-CVGroup_UIEventLobby_Idle2-1 = "Há algo em que eu possa ajudar?"
10056-CVGroup_UIEventLobby_Idle3-1 = "No Natal,\nchame a Serina Noel!"
10056-CVGroup_UIEventLobby_Idle4-1 = "Sensei? Aconteceu alguma coisa?"
10056-CVGroup_UIEventShop_Enter1-1 = "As doações de caridade de Natal são aqui!"
10056-CVGroup_UIEventShop_Enter2-1 = "Por favor, faça uma doação\npara ajudar aqueles que precisam!"
10056-CVGroup_UIEventShop_Idle1-1 = "Sensei, deixe-me ajudar com algo."
10056-CVGroup_UIEventShop_Idle2-1 = "Será que a Hanae está bem...?"
10056-CVGroup_UIEventShop_Buy1-1 = "Muito obrigada.\nAqui está o seu presente."
10056-CVGroup_UIEventShop_Buy2-1 = "Feliz Natal!\nTenha um dia maravilhoso!"
10056-CVGroup_UIEventShop_Buy3-1 = "Até algo tão valioso assim...\nTem certeza de que quer doar?"
10056-CVGroup_UIEventShop_Enter3-1 = "A arrecadação de caridade de Natal terminou."
10056-CVGroup_UIEventShop_Enter3-2 = "Verifique se não deixou nada pendente."
