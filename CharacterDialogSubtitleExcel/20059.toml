[translation]
20059-CVGroup_UITitle_Idle1-1 = "Blue Archive! Куфуфу!"
20059-CVGroup_CharacterGet_Idle1-1 = "Куфуфу, трансформация Муцуки-тян завершена!\nНу и что ты хочешь, чтобы я сделала? Просто скажи мне что угодно, ладно?"
20059-CVGroup_Cafe_Idle1-1 = "Я хочу устроить здесь вечеринку в платьях со всеми~"
20059-CVGroup_Cafe_Idle2-1 = "Куфуфу, так вот какие вещи тебе нравятся, Сенсей?"
20059-CVGroup_Cafe_Idle3-1 = "Интересно, хочет ли кто-нибудь поиграть со мной~?"
20059-CVGroup_Cafe_Idle4-1 = "О, а вот с этой штукой явно было бы весело поиграться♪"
20059-CVGroup_Cafe_Idle5-1 = "Куфуфу! Это так весело~ Сама не знаю почему, но мне здесь просто ужасно нравится."
20059-WeaponGet_Idle1-1 = "Куфуфу♪ Вот оно~ Мне так нравится, как это лежит в моих руках~"
20059-CVGroup_UIEventLobby_Enter1-1 = "Ну что ж, интересно, какие происшествия нас ждут?"
20059-CVGroup_UIEventLobby_Enter2-1 = "Это тоже выглядит супервесело!"
20059-CVGroup_UIEventLobby_Idle1-1 = "Относись к розыгрышам как к серьёзному делу! А к серьёзному делу — как к розыгрышу♪"
20059-CVGroup_UIEventLobby_Idle2-1 = "Хмм... интересно, маршрут для проникновения... вооон там?"
20059-CVGroup_UIEventLobby_Idle3-1 = "Что такое? Хочешь поиграть с Муцуки-тян? Куфуфу."
20059-CVGroup_UIEventLobby_Idle4-1 = "Когда закончим с работой, не хочешь сходить со мной в оперу? Будет супервесело, я обещаю♪"