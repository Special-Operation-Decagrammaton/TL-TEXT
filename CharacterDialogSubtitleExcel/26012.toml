[translation]
26012-CVGroup_UITitle_Idle1-1 = "Blu~~~ Archive!"
26012-CVGroup_CharacterGet_Idle1-1 = "Pertencente à Academia de Polícia Valkyrie,\nsou Kirino, salva-vidas do Departamento de Segurança Pública!\nDeixe as situações perigosas comigo!"
26012-CVGroup_Cafe_Idle1-1 = "Sim! Este é um lugar seguro!"
26012-CVGroup_Cafe_Idle2-1 = "Aquela pessoa ali, estou um pouco preocupada... Vou ficar de olho."
26012-CVGroup_Cafe_Idle3-1 = "(Servir, ouvir, ser sincera e sorrir! Não posso esquecer!)"
26012-CVGroup_Cafe_Idle4-1 = "Isso... seria ótimo ter no parque aquático também!"
26012-CVGroup_Cafe_Idle5-1 = "Onde fica o DEA...?"
26012-CVGroup_WeaponGet_Idle1-1 = "E-eu não sou muito boa de mira, mas farei o meu melhor pelo Sensei!"
26012-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo de volta! Sensei, você prefere o toboágua ou a piscina de ondas?"
26012-CVGroup_UIEventLobby_Enter2-1 = "Kirino Nakatsukasa, desta vez estou atuando como salva-vidas!"
26012-CVGroup_UIEventLobby_Enter3-1 = "Um monstro no parque aquático, que absurdo...!"
26012-CVGroup_UIEventLobby_Enter4-1 = "Agora é a minha vez de brilhar!"
26012-CVGroup_UIEventLobby_Enter4-2 = "Eu protegerei a segurança do Sensei e dos visitantes!"
26012-CVGroup_UIEventLobby_Enter5-1 = "Eu estava bem preocupada, mas terminou tudo bem! Bom trabalho!"
26012-CVGroup_UIEventLobby_Idle1-1 = "Para usar roupa de banho, eu me segurei de fazer um tour gastronômico por um tempo, mas..."
26012-CVGroup_UIEventLobby_Idle1-2 = "Quando percebi, acabei fazendo um tour pela praça de alimentação..."
26012-CVGroup_UIEventLobby_Idle2-1 = "O que acha do toboágua?"
26012-CVGroup_UIEventLobby_Idle2-2 = "Eu recomendo o toboágua mais emocionante de todos!"
26012-CVGroup_UIEventLobby_Idle3-1 = "As crianças brincando, que fofas!"
26012-CVGroup_UIEventLobby_Idle4-1 = "Sim? Precisa de mim para algum trabalho? Pode pedir qualquer coisa!"
26012-CVGroup_UIEventMission_Enter1-1 = "O trabalho de hoje! Tem bastante coisa, mas vamos dar o nosso melhor!"
26012-CVGroup_UIEventMission_Enter2-1 = "Um por um, com cuidado! Eu também vou me esforçar, Sensei!"
26012-CVGroup_UIEventMission_Idle1-1 = "Ahaha! É proibido fazer cócegas na salva-vidas!"
26012-CVGroup_UIEventMission_Idle2-1 = "Hehe, não precisa ter tanta pressa, eu vou te ajudar!"
26012-CVGroup_UIEventMission_Buy1-1 = "Como esperado do Sensei! Incrível!"
26012-CVGroup_UIEventMission_Buy2-1 = "Bom trabalho, Sensei!"
26012-CVGroup_UIEventMission_Interaction1-1 = "Bom trabalho hoje também! Se quiser, que tal irmos comer algo para relaxar?"
