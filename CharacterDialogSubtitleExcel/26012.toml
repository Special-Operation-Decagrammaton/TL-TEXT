[translation]
26012-CVGroup_UITitle_Idle1-1 = "ブル～～～アーカイブ！"
26012-CVGroup_CharacterGet_Idle1-1 = "ヴァルキューレ警察学校所属、\n生活安全局ライフセーバーのキリノです！\n危険な状況は本官にお任せください！"
26012-CVGroup_Cafe_Idle1-1 = "うん！安全な場所ですね！"
26012-CVGroup_Cafe_Idle2-1 = "あの人、少し心配ですね……\n見張っておきます。"
26012-CVGroup_Cafe_Idle3-1 = "（奉仕、傾聴、誠実、そして笑顔！忘れないように！）"
26012-CVGroup_Cafe_Idle4-1 = "これ……ウォーターパークにもほしいですね！"
26012-CVGroup_Cafe_Idle5-1 = "AEDの位置は……。"
26012-CVGroup_WeaponGet_Idle1-1 = "しゃ、射撃は得意ではありませんが、\n先生のために全力を尽くします！"
26012-CVGroup_UIEventLobby_Enter1-1 = "おかえりなさい！\n先生はスライダーと波のプール、\nどちらが好きですか？"
26012-CVGroup_UIEventLobby_Enter2-1 = "中務キリノ、今回はライフセーバーをしております！"
26012-CVGroup_UIEventLobby_Enter3-1 = "ウォーターパークに怪物だなんて、\nなんということでしょう……！"
26012-CVGroup_UIEventLobby_Enter4-1 = "今度は本官が活躍する番ですね！"
26012-CVGroup_UIEventLobby_Enter4-2 = "先生とお客様の安全は本官が守ります！"
26012-CVGroup_UIEventLobby_Enter5-1 = "かなり心配でしたが、無事に終わりましたね！\nお疲れ様でした！"
26012-CVGroup_UIEventLobby_Idle1-1 = "水着を着るために、グルメ巡りをしばらく我慢していましたが……"
26012-CVGroup_UIEventLobby_Idle1-2 = "気がついたらフードコート巡りをしてしまいました……。"
26012-CVGroup_UIEventLobby_Idle2-1 = "ウォータースライダーはいかがですか？"
26012-CVGroup_UIEventLobby_Idle2-2 = "本官が一番スリル満点のスライダーをおすすめします！"
26012-CVGroup_UIEventLobby_Idle3-1 = "子供たちが遊ぶ姿、かわいいですね！"
26012-CVGroup_UIEventLobby_Idle4-1 = "はい？本官が必要な仕事でしょうか？\n何でも言ってください！"
26012-CVGroup_UIEventMission_Enter1-1 = "今日のお仕事です！\n結構多いですが、頑張りましょう！"
26012-CVGroup_UIEventMission_Enter2-1 = "一つ一つ丁寧に！\n本官も頑張りますよ、先生！"
26012-CVGroup_UIEventMission_Idle1-1 = "あはは！\nライフセーバーをくすぐるのは禁止ですよ！"
26012-CVGroup_UIEventMission_Idle2-1 = "ふふっ、そんな急かさなくても、\n本官がお手伝いしますので！"
26012-CVGroup_UIEventMission_Buy1-1 = "さすが先生です！すごいです！"
26012-CVGroup_UIEventMission_Buy2-1 = "お疲れ様でした、先生！"
26012-CVGroup_UIEventMission_Interaction1-1 = "今日もお疲れさまでした！\nよかったら、すっきりした気持ちで食事にでも行きませんか？"
