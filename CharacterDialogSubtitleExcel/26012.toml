[translation]
26012-CVGroup_UITitle_Idle1-1 = "Blue~~~ Archive!"
26012-CVGroup_CharacterGet_Idle1-1 = "Sou Kirino, do Departamento de Segurança Pública da Escola de Polícia Valkyrie, atuando como salva-vidas!\nDeixe as situações perigosas nas mãos desta oficial!"
26012-CVGroup_Cafe_Idle1-1 = "Sim! É um lugar seguro!"
26012-CVGroup_Cafe_Idle2-1 = "Aquela pessoa me preocupa um pouco...\nVou ficar de olho."
26012-CVGroup_Cafe_Idle3-1 = "(Serviço, escuta, integridade, e um sorriso! Não posso esquecer!)"
26012-CVGroup_Cafe_Idle4-1 = "Isso...\nEu queria ter um desses no parque aquático também!"
26012-CVGroup_Cafe_Idle5-1 = "A localização do DEA (Desfibrilador Externo Automático) é..."
26012-CVGroup_WeaponGet_Idle1-1 = "M-Minha mira pode não ser a melhor, mas\nfarei o meu melhor pelo senhor, Sensei!"
26012-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo de volta!\nSensei, qual o senhor prefere:\no toboágua ou a piscina de ondas?"
26012-CVGroup_UIEventLobby_Enter2-1 = "Nakatsukasa Kirino, atuando como salva-vidas desta vez!"
26012-CVGroup_UIEventLobby_Enter3-1 = "Um monstro no parque aquático...\nMas que absurdo...!"
26012-CVGroup_UIEventLobby_Enter4-1 = "Desta vez é o momento desta oficial brilhar!"
26012-CVGroup_UIEventLobby_Enter4-2 = "A segurança do Sensei e dos clientes será protegida por esta oficial!"
26012-CVGroup_UIEventLobby_Enter5-1 = "Eu estava bem preocupada, mas terminou tudo bem!\nBom trabalho!"
26012-CVGroup_UIEventLobby_Idle1-1 = "Eu me segurei nas minhas rotas gastronômicas por um tempo para caber neste maiô, mas..."
26012-CVGroup_UIEventLobby_Idle1-2 = "Quando percebi, já estava fazendo uma rota de degustação na praça de alimentação..."
26012-CVGroup_UIEventLobby_Idle2-1 = "O que acha de irmos no toboágua?"
26012-CVGroup_UIEventLobby_Idle2-2 = "Esta oficial recomenda o toboágua mais emocionante de todos!"
26012-CVGroup_UIEventLobby_Idle3-1 = "A imagem das crianças brincando é tão fofa!"
26012-CVGroup_UIEventLobby_Idle4-1 = "Sim? É algum trabalho em que precisa desta oficial?\nPode pedir qualquer coisa!"
26012-CVGroup_UIEventMission_Enter1-1 = "O trabalho de hoje!\nÉ bastante coisa, mas vamos dar o nosso melhor!"
26012-CVGroup_UIEventMission_Enter2-1 = "Um passo de cada vez, com cuidado!\nEsta oficial também vai se esforçar, Sensei!"
26012-CVGroup_UIEventMission_Idle1-1 = "Ahaha!\nFazer cócegas na salva-vidas é proibido!"
26012-CVGroup_UIEventMission_Idle2-1 = "Fufu, não precisa de tanta pressa,\nesta oficial vai ajudar com tudo!"
26012-CVGroup_UIEventMission_Buy1-1 = "Como esperado do Sensei! Incrível!"
26012-CVGroup_UIEventMission_Buy2-1 = "Bom trabalho, Sensei!"
26012-CVGroup_UIEventMission_Interaction1-1 = "Bom trabalho hoje também!\nSe quiser, por que não vamos comer alguma coisa para relaxar a mente?"