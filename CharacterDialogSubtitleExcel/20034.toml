[translation]
20034-CVGroup_UITitle_Idle1-1 = "Blue Archive, fufu."
20034-CVGroup_CharacterGet_Idle1-1 = "O fim do ano... e o ano novo.\nO som dessas palavras faz meu coração disparar.\nSe tiver uma comida deliciosa por perto, não tem como ficar melhor★"
20034-CVGroup_Cafe_Idle1-1 = "Qual será o menu do dia de hoje~?"
20034-CVGroup_Cafe_Idle2-1 = "Comer uma comida especial e passar um tempo maravilhoso...\nNão é fantástico?★"
20034-CVGroup_Cafe_Idle3-1 = "O poder das recomendações é incrível.\nSó de ler, já fico com fome."
20034-CVGroup_Cafe_Idle4-1 = "O número de avaliações é mais importante do que a nota, sabe?"
20034-CVGroup_Cafe_Idle5-1 = "Eu não fico pensando em comida o tempo todo, sabia~?"
20034-CVGroup_WeaponGet_Idle1-1 = "Uau~! Muito obrigada★\nCom isso, posso explodir tudo!\nFufu... não se preocupe, Sensei. Eu vou pegar leve, prometo★"
20034-CVGroup_UIEventLobby_Enter1-1 = "Uau! Sensei!\nVocê já foi visitar o santuário?"
20034-CVGroup_UIEventLobby_Enter1-2 = "Se ainda não foi... que tal ir comigo?"
20034-CVGroup_UIEventLobby_Enter2-1 = "Dizem que comer algo quando está frio\najuda a aquecer o corpo."
20034-CVGroup_UIEventLobby_Enter2-2 = "Olha só, tem um monte de Osechi nos esperando~?"
20034-CVGroup_UIEventLobby_Enter3-1 = "Algo suculento..."
20034-CVGroup_UIEventLobby_Enter3-2 = "Não, não é isso... algo carnudo... também não é..."
20034-CVGroup_UIEventLobby_Enter3-3 = "Ah! Parece que algo barulhento está acontecendo."
20034-CVGroup_UIEventLobby_Enter4-1 = "Em vários sentidos, está uma bagunça★, né?"
20034-CVGroup_UIEventLobby_Enter4-2 = "Eu não desgosto disso, mas..."
20034-CVGroup_UIEventLobby_Enter4-3 = "Talvez algumas pessoas não gostem desse tipo de coisa."
20034-CVGroup_UIEventLobby_Enter5-1 = "O clima de ano novo já acalmou, né."
20034-CVGroup_UIEventLobby_Enter5-2 = "O Osechi estava tããão gostoso★"
20034-CVGroup_UIEventLobby_Idle1-1 = "Aconteceu alguma coisa, Sensei?"
20034-CVGroup_UIEventLobby_Idle2-1 = "Ora, está tentando me pregar uma peça, Sensei~?"
20034-CVGroup_UIEventLobby_Idle2-2 = "Tem certeza? Minha retaliação..."
20034-CVGroup_UIEventLobby_Idle2-3 = "Pode ser um pouco diferente, sabe?"
20034-CVGroup_UIEventLobby_Idle3-1 = "Sensei, está entediado?"
20034-CVGroup_UIEventLobby_Idle3-2 = "Se for comigo, eu não vou deixar você ficar entediado,"
20034-CVGroup_UIEventLobby_Idle3-3 = "o que acha...?"
20034-CVGroup_UIEventLobby_Idle4-1 = "Só você, Sensei, é injusto."
20034-CVGroup_UIEventLobby_Idle4-2 = "Pronto, te peguei★\nNão vou te soltar mais~"
