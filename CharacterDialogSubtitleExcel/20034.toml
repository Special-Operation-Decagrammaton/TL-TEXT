[translation]
20034-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ、フフッ。"
20034-CVGroup_CharacterGet_Idle1-1 = "年の暮れ……そして新年。\n言葉の響きに胸が躍りますね。\nそこに美味しいお料理があれば、言うことなしです★"
20034-CVGroup_Cafe_Idle1-1 = "今日の日替わりメニューはなんでしょう～？"
20034-CVGroup_Cafe_Idle2-1 = "特別な料理を食べて、素晴らしい時間を過ごす……\nなんて素敵なんでしょう★"
20034-CVGroup_Cafe_Idle3-1 = "口コミの力は凄まじいです。\n読んでいるだけでお腹が空いてきちゃいますから。"
20034-CVGroup_Cafe_Idle4-1 = "評価の点数より、レビュー数のほうが大事ですよ？"
20034-CVGroup_Cafe_Idle5-1 = "私だって、いつも食べ物のことばかり考えてるわけじゃ、ないですよ～？"
20034-CVGroup_WeaponGet_Idle1-1 = "わあ～！ありがとうございます★\nこれでぜ～んぶ、吹き飛ばせちゃいます！\nフフッ……大丈夫ですよ、先生。ちゃんと手加減しますから★"
20034-CVGroup_UIEventLobby_Enter1-1 = "わあ！先生！\nお参り、もう行きましたか？"
20034-CVGroup_UIEventLobby_Enter1-2 = "まだでしたら……私と一緒に、いかがですか？"
20034-CVGroup_UIEventLobby_Enter2-1 = "寒いときに何かを食べると、\n身体が温まるって言いますよね。"
20034-CVGroup_UIEventLobby_Enter2-2 = "ほら、たくさんのお節が私たちを待ってますよ～？"
20034-CVGroup_UIEventLobby_Enter3-1 = "何か水々しい……"
20034-CVGroup_UIEventLobby_Enter3-2 = "違いますね、肉々しい……これでもなくて……。"
20034-CVGroup_UIEventLobby_Enter3-3 = "はい！騒々しいことが起こってるみたいです。"
20034-CVGroup_UIEventLobby_Enter4-1 = "いろんな意味で、めちゃくちゃ★ですね。"
20034-CVGroup_UIEventLobby_Enter4-2 = "私は嫌いじゃないですけど、"
20034-CVGroup_UIEventLobby_Enter4-3 = "こういうの、苦手な方もいるかもしれません。"
20034-CVGroup_UIEventLobby_Enter5-1 = "お正月ムードも落ち着きましたね。"
20034-CVGroup_UIEventLobby_Enter5-2 = "お節、と～っても美味しかったです★"
20034-CVGroup_UIEventLobby_Idle1-1 = "何かありましたか？先生？"
20034-CVGroup_UIEventLobby_Idle2-1 = "あら、私にイタズラですか？先生～？"
20034-CVGroup_UIEventLobby_Idle2-2 = "いいんですか？私の仕返しは……"
20034-CVGroup_UIEventLobby_Idle2-3 = "ちょっと、変わってるかもですよ？"
20034-CVGroup_UIEventLobby_Idle3-1 = "先生、退屈ですか？"
20034-CVGroup_UIEventLobby_Idle3-2 = "私でしたら、先生を退屈させませんけど、"
20034-CVGroup_UIEventLobby_Idle3-3 = "いかがですか……？"
20034-CVGroup_UIEventLobby_Idle4-1 = "先生ばかりずるいです。"
20034-CVGroup_UIEventLobby_Idle4-2 = "はいっ、捕まえました★\nもう離しませんよ～"
