[translation]
26011-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
26011-CVGroup_CharacterGet_Idle1-1 = "こんにちは、先生！\n柵川中学1年、佐天涙子です！\nよろしくお願いします！"
26011-CVGroup_Cafe_Idle1-1 = "あれ、あの人は……。"
26011-CVGroup_Cafe_Idle2-1 = "おお！！\nなんかここ、すごいですね！"
26011-CVGroup_Cafe_Idle3-1 = "一見普通っぽいんですけど、\nよくよく見るとちょっと変わってる……\nうーん！楽しい！"
26011-CVGroup_Cafe_Idle4-1 = "ここが噂に聞く……\n異世界のカフェ……。"
26011-CVGroup_Cafe_Idle5-1 = "なんだか落ち着きますね、へへっ。"
26011-CVGroup_WeaponGet_Idle1-1 = "えっ……これを、私に……？\nへ、変な感じですね……ありがとうございます。\nと、とりあえず、頑張りますね！\n……それしか言えなくて、すみません。ははっ……。"
26011-CVGroup_UIEventLobby_Enter1-1 = "来てくれたんですね、先生！\nでは早速行きましょう！"
26011-CVGroup_UIEventLobby_Enter2-1 = "待ってましたよ、先生！"
26011-CVGroup_UIEventLobby_Enter3-1 = "もう残り半分！？\n最後まで頑張りましょう！"
26011-CVGroup_UIEventLobby_Enter4-1 = "そろそろ、終わりが見えてきましたね……！"
26011-CVGroup_UIEventLobby_Enter5-1 = "最後に！\nもう一度見ていきませんか？"
26011-CVGroup_UIEventLobby_Idle1-1 = "あれ？\n先生、どうかしました？"
26011-CVGroup_UIEventLobby_Idle2-1 = "何か、お手伝いしましょうか？"
26011-CVGroup_UIEventLobby_Idle3-1 = "……むむ、先生、\n今は遊んでる場合じゃないですよ。"
26011-CVGroup_UIEventLobby_Idle4-1 = "もう！先生！\n集中！集中ですよ！"
26011-CVGroup_UIEventShop_Enter1-1 = "じゃーん！\n色々用意してみました！"
26011-CVGroup_UIEventShop_Enter2-1 = "こちらです、先生！\n好きなものを選んじゃってください！"
26011-CVGroup_UIEventShop_Enter3-1 = "やり残しはないか、\nチェック、チェックですよ～！"
26011-CVGroup_UIEventShop_Idle1-1 = "あれ？何かお探しですか？"
26011-CVGroup_UIEventShop_Idle2-1 = "えっと、見てもらいたいのは、\n私じゃなくてあっちなんですけど……。"
26011-CVGroup_UIEventShop_Buy1-1 = "あっ、それ！いいですね！"
26011-CVGroup_UIEventShop_Buy2-1 = "ふむ！お目が高いですねぇ～……\nなんちゃって！"
26011-CVGroup_UIEventShop_Buy3-1 = "お探しのものはそれだったんですね！\n納得です！"
26011-CVGroup_UIEventShop_Buy4-1 = "おおー！やっぱり！\n私もそれがいいと思ってました！"
