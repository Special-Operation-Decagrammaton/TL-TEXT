[translation]
26011-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26011-CVGroup_CharacterGet_Idle1-1 = "Olá, Sensei!\nSou Ruiko Saten, do 1º ano da escola secundária Sakugawa!\nConto com você!"
26011-CVGroup_Cafe_Idle1-1 = "Ué, aquela pessoa é..."
26011-CVGroup_Cafe_Idle2-1 = "Uau!!\nEste lugar é incrível, não é?!"
26011-CVGroup_Cafe_Idle3-1 = "À primeira vista parece normal, mas\nquando olho com atenção, é um pouco diferente...\nHum! Que divertido!"
26011-CVGroup_Cafe_Idle4-1 = "Então este é o famoso...\nCafé de outro mundo..."
26011-CVGroup_Cafe_Idle5-1 = "É um lugar bem relaxante, hehe."
26011-CVGroup_WeaponGet_Idle1-1 = "Eh... isso é para mim...?\nÉ, é uma sensação estranha... obrigada.\nB-bem, de qualquer forma, vou dar o meu melhor!\n...Desculpe por não conseguir dizer nada além disso. Haha..."
26011-CVGroup_UIEventLobby_Enter1-1 = "Você veio, Sensei!\nEntão vamos logo!"
26011-CVGroup_UIEventLobby_Enter2-1 = "Eu estava te esperando, Sensei!"
26011-CVGroup_UIEventLobby_Enter3-1 = "Já estamos na metade final!?\nVamos dar o nosso melhor até o fim!"
26011-CVGroup_UIEventLobby_Enter4-1 = "Já estamos começando a ver o fim, não é...!"
26011-CVGroup_UIEventLobby_Enter5-1 = "Por último!\nQue tal dar uma olhada mais uma vez?"
26011-CVGroup_UIEventLobby_Idle1-1 = "Ué?\nSensei, aconteceu alguma coisa?"
26011-CVGroup_UIEventLobby_Idle2-1 = "Quer que eu ajude com alguma coisa?"
26011-CVGroup_UIEventLobby_Idle3-1 = "...Hum, Sensei,\nagora não é hora de brincar."
26011-CVGroup_UIEventLobby_Idle4-1 = "Ah! Sensei!\nFoco! Foco, por favor!"
26011-CVGroup_UIEventShop_Enter1-1 = "Tcharam!\nPreparei várias coisas!"
26011-CVGroup_UIEventShop_Enter2-1 = "É por aqui, Sensei!\nEscolha o que quiser!"
26011-CVGroup_UIEventShop_Enter3-1 = "Verificando se não esquecemos de nada,\nchecando, checando!"
26011-CVGroup_UIEventShop_Idle1-1 = "Ué? Está procurando por algo?"
26011-CVGroup_UIEventShop_Idle2-1 = "Bem, o que eu queria que você olhasse\nnão sou eu, é aquilo ali..."
26011-CVGroup_UIEventShop_Buy1-1 = "Ah, isso! Que bom!"
26011-CVGroup_UIEventShop_Buy2-1 = "Hum! Você tem bom gosto, hein...\nBrincadeirinha!"
26011-CVGroup_UIEventShop_Buy3-1 = "Então era isso que você estava procurando!\nEntendi!"
26011-CVGroup_UIEventShop_Buy4-1 = "Uau! Eu sabia!\nEu também achava que essa era a melhor escolha!"
