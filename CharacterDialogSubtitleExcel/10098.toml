[translation]
10098-CVGroup_UITitle_Idle1-1 = "……Blue Archive."
10098-CVGroup_CharacterGet_Idle1-1 = "Nossa, a situação ficou séria, hein~\nAcho que... o tio aqui vai ter que entrar em ação."
10098-CVGroup_Cafe_Idle1-1 = "(Cobertura... confirmada. Saída... confirmada.)"
10098-CVGroup_Cafe_Idle2-1 = "Por enquanto, vamos verificar a munição."
10098-CVGroup_Cafe_Idle3-1 = "Uhe... não consigo relaxar nem um pouco...\nNessas horas, acho que queria ver o Sensei..."
10098-CVGroup_Cafe_Idle4-1 = "Esse penteado é bem prático, mas...\nSerá que não está estranho?"
10098-CVGroup_Cafe_Idle5-1 = "Hoje não estou nem um pouco a fim de tirar uma soneca..."
10098-CVGroup_WeaponGet_Idle1-1 = "……Se precisar da força do tio aqui, é só falar, tá?\nO Sensei é sempre minha prioridade máxima."
