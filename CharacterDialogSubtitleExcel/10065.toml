[translation]
10065-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10065-CVGroup_CharacterGet_Idle1-1 = "Sou Kuwakami Kaho, vice-presidente do Departamento Yin-Yang da Academia Hyakkiyako.\nÉ um prazer conhecê-lo."
10065-CVGroup_Cafe_Idle1-1 = "Se fosse aqui... talvez eu pudesse construir a embaixada de Hyakkiyako..."
10065-CVGroup_Cafe_Idle2-1 = "Onde devo exibir... os artigos de Hyakkiyako?"
10065-CVGroup_Cafe_Idle3-1 = "Ah... agora mesmo... senti a presença da minha doce ídolo...!?"
10065-CVGroup_Cafe_Idle4-1 = "Hehe, é bom ver tanto movimento.\nEsse tipo de atmosfera não é nada mal."
10065-CVGroup_Cafe_Idle5-1 = "Tantas alunas de várias academias aqui... \nPercebi novamente o quão incrível o Schale é."
10065-CVGroup_WeaponGet_Idle1-1 = "Receber algo tão especial de você, Sensei... \nFarei o meu melhor para não decepcionar suas expectativas.\nMuito obrigada, Sensei."
