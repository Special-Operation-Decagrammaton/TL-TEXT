[translation]
10065-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10065-CVGroup_CharacterGet_Idle1-1 = "百鬼夜行連合学院、陰陽部副部長、\n桑上カホと申します。\nどうぞよろしくお願い致します。"
10065-CVGroup_Cafe_Idle1-1 = "ここになら……\n百鬼夜行の大使館を建てても……。"
10065-CVGroup_Cafe_Idle2-1 = "百鬼夜行のグッズ……\nどこに飾りましょう？"
10065-CVGroup_Cafe_Idle3-1 = "はっ……今……\nマイスイートアイドルの気配がっ……！？"
10065-CVGroup_Cafe_Idle4-1 = "ふふっ、賑やかで良いですね。\nこういう雰囲気も悪くないものです。"
10065-CVGroup_Cafe_Idle5-1 = "様々な学園の生徒がこんなに……\n改めて、シャーレのすごさを実感しました。"
10065-CVGroup_WeaponGet_Idle1-1 = "このように特別な物を先生から頂けるだなんて……\n期待に恥じない活躍ができるよう、尽力いたします。\nありがとうございます、先生。"
