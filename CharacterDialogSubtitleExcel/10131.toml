[translation]
10131-CVGroup_UITitle_Idle1-1 = "Blue Archive, é um prazer."
10131-CVGroup_CharacterGet_Idle1-1 = "Saudações, Sensei.\nSou Takane Miyoshi, do Departamento de Publicações da Academia Red Winter.\nConto com o seu apoio."
10131-CVGroup_Cafe_Idle1-1 = "Hum... este lugar tem uma atmosfera agradável, não acha?"
10131-CVGroup_Cafe_Idle2-1 = "Será que o Wi-Fi funciona bem aqui?\nPreciso enviar minha crítica logo..."
10131-CVGroup_Cafe_Idle3-1 = "Um tempo para conversar sobre histórias enquanto tomamos um chá... é maravilhoso, não é?\nDe verdade."
10131-CVGroup_Cafe_Idle4-1 = "(Este espaço... como será que devo escrever uma crítica sobre ele...?)"
10131-CVGroup_Cafe_Idle5-1 = "Será que posso tirar fotos...?"
10131-CVGroup_WeaponGet_Idle1-1 = "Conhece o ditado que diz que a caneta é mais forte que a espada?\nSim, é exatamente isso.\nHehe... para aqueles que destilaram palavras cruéis sobre minhas críticas――\nVamos ter um... \"diálogo\" bem reflexivo."
10131-CVGroup_UIEventLobby_Enter1-1 = "É a minha primeira vez em Trinity..."
10131-CVGroup_UIEventLobby_Enter1-2 = "Farei o possível para não causar nenhum transtorno."
10131-CVGroup_UIEventLobby_Enter2-1 = "Trinity, este lugar... e as histórias que nascem aqui."
10131-CVGroup_UIEventLobby_Enter2-2 = "Hehe, eu gostei muito de ambos."
10131-CVGroup_UIEventLobby_Enter3-1 = "Embora... tudo esteja correndo bem demais."
10131-CVGroup_UIEventLobby_Enter3-2 = "Isso me deixa um pouco apreensiva..."
10131-CVGroup_UIEventLobby_Enter3-3 = "Se isso fosse um capítulo de uma história,"
10131-CVGroup_UIEventLobby_Enter3-4 = "seria exatamente o tipo de cena que precede uma reviravolta."
10131-CVGroup_UIEventLobby_Enter4-1 = "Como eu suspeitava... eu sentia que isso aconteceria."
10131-CVGroup_UIEventLobby_Enter4-2 = "Sim... pelo menos eu preciso manter a compostura..."
10131-CVGroup_UIEventLobby_Enter5-1 = "Que bom... foi realmente muito bom."
10131-CVGroup_UIEventLobby_Enter5-2 = "Agradeço de coração, Sensei."
10131-CVGroup_UIEventLobby_Enter5-3 = "E... peço desculpas, Sensei."
10131-CVGroup_UIEventLobby_Idle1-1 = "Todos têm sido muito gentis comigo, o que me deixou tranquila."
10131-CVGroup_UIEventLobby_Idle1-2 = "...Mas, no fim das contas, eu sou apenas uma estudante comum."
10131-CVGroup_UIEventLobby_Idle2-1 = "Chamou, Sensei?"
10131-CVGroup_UIEventLobby_Idle2-2 = "Hã? Uma risada alta?"
10131-CVGroup_UIEventLobby_Idle2-3 = "Eu jamais faria algo tão deselegante em um lugar como este!"
10131-CVGroup_UIEventLobby_Idle2-4 = "...Se estivéssemos apenas nós dois, a história seria outra."
10131-CVGroup_UIEventLobby_Idle3-1 = "Por favor, pare de me provocar desse jeito."
10131-CVGroup_UIEventLobby_Idle3-2 = "Caso contrário――"
10131-CVGroup_UIEventLobby_Idle3-3 = "Vou registrar cada detalhe do seu comportamento, Sensei..."
10131-CVGroup_UIEventLobby_Idle3-4 = "E escrever uma crítica sobre você, sabia?"
10131-CVGroup_UIEventLobby_Idle3-5 = "\"Hoje, o Sensei continuou a provocar Takane Miyoshi.\""
10131-CVGroup_UIEventLobby_Idle3-6 = "\"Decidi publicar este fato para todo o Kivotos.\""
10131-CVGroup_UIEventLobby_Idle3-7 = "Hehe. Entendeu, não é? Fico feliz que tenhamos chegado a um acordo."
10131-CVGroup_UIEventLobby_Idle4-1 = "Aprofundar o conhecimento significa expandir a visão com a qual vemos o mundo."
10131-CVGroup_UIEventLobby_Idle4-2 = "Isso também significa expandir o seu próprio mundo."
10131-CVGroup_UIEventLobby_Idle4-3 = "Mas... enquanto pensava nisso,"
10131-CVGroup_UIEventLobby_Idle4-4 = "uma dúvida me surgiu de repente."
10131-CVGroup_UIEventLobby_Idle4-5 = "O mundo que o Sensei vê,"
10131-CVGroup_UIEventLobby_Idle4-6 = "como será que ele é...?"
10131-CVGroup_UIEventMission_Enter1-1 = "Mesmo estando em Trinity, não devemos negligenciar nossas tarefas diárias."
10131-CVGroup_UIEventMission_Enter1-2 = "...Se eu começar a agir de qualquer jeito,"
10131-CVGroup_UIEventMission_Enter1-3 = "acabarei me tornando igual à minha chefe de departamento."
10131-CVGroup_UIEventMission_Enter2-1 = "Preparei uma lista de verificação."
10131-CVGroup_UIEventMission_Enter2-2 = "Não é nada demais, mas..."
10131-CVGroup_UIEventMission_Enter2-3 = "É quase a mesma coisa que planejar a estrutura de uma crítica."
10131-CVGroup_UIEventMission_Idle1-1 = "Uma história nada mais é do que o acúmulo de pequenos capítulos."
10131-CVGroup_UIEventMission_Idle1-2 = "Durante o processo de escrita,"
10131-CVGroup_UIEventMission_Idle1-3 = "nem sempre as coisas são criadas na ordem cronológica da história."
10131-CVGroup_UIEventMission_Idle1-4 = "Mas, no final, tudo se organiza em uma forma,"
10131-CVGroup_UIEventMission_Idle1-5 = "No sentido de se expressar, talvez..."
10131-CVGroup_UIEventMission_Idle1-6 = "seja semelhante a cumprir essas tarefas de forma constante, não acha?"
10131-CVGroup_UIEventMission_Idle2-1 = "As coisas que se repetem costumam ser subestimadas."
10131-CVGroup_UIEventMission_Idle2-2 = "Será porque são entediantes...?"
10131-CVGroup_UIEventMission_Idle2-3 = "Se você negligenciar os pequenos acúmulos,"
10131-CVGroup_UIEventMission_Idle2-4 = "acabará sendo pego de surpresa mais cedo ou mais tarde."
10131-CVGroup_UIEventMission_Idle2-5 = "Que sermão gentil, não é...?"
10131-CVGroup_UIEventMission_Idle2-6 = "S-sim... estou ciente de que soa como uma pregação."
10131-CVGroup_UIEventMission_Idle2-7 = "No fim das contas, críticos são apenas pessoas que reclamam de detalhes insignificantes."
10131-CVGroup_UIEventMission_Buy1-1 = "Nota máxima!\nExcelente trabalho!"
10131-CVGroup_UIEventMission_Buy2-1 = "Para aqueles que completaram suas tarefas com sinceridade,"
10131-CVGroup_UIEventMission_Buy2-2 = "é natural que haja uma recompensa."
10131-CVGroup_UIEventMission_Buy2-3 = "Aqui, pegue isto. É do meu próprio bolso. Fufu."
10131-CVGroup_UIEventMission_Interaction1-1 = "O trabalho de hoje termina aqui, então."
10131-CVGroup_UIEventMission_Interaction1-2 = "Bem, conto com você novamente amanhã."
