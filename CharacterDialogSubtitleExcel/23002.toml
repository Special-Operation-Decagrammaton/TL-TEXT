[translation]
23002-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
23002-CVGroup_CharacterGet_Idle1-1 = "白衣の天使が！\nあなたを訪ねて来ましたよ！！"
23002-CVGroup_Cafe_Idle1-1 = "るんるん～手術が必要な人～？\n誰かいないのかな～"
23002-CVGroup_Cafe_Idle2-1 = "救援も！希望も！そして愛も！\nハナエはすべて備え持っていますよ！"
23002-CVGroup_Cafe_Idle3-1 = "早くウサギさんや猫さんと遊びたいな！"
23002-CVGroup_Cafe_Idle4-1 = "友達がたくさんできて、毎日が楽しいです！"
23002-CVGroup_Cafe_Idle5-1 = "こんにちは！ハナエです！\nよろしくお願いします！"
23002-CVGroup_WeaponGet_Idle1-1 = "この武器には……\n愛がたくさんつまっています！"
