[translation]
20033-CVGroup_UITitle_Idle1-1 = "キキキッ。\nブルー……アーカイブ！"
20033-CVGroup_CharacterGet_Idle1-1 = "遂に降臨してやったぞ！\nキキキッ、万魔殿の羽沼マコト様が\n直々に足を運んでやったのだ、手厚く歓待するが良い。"
20033-CVGroup_Cafe_Idle1-1 = "シャーレ……。\nキキッ、いつみても狭苦しい場所だな。"
20033-CVGroup_Cafe_Idle2-1 = "イブキの遊び場を……\n計画的に作らねば……。"
20033-CVGroup_Cafe_Idle3-1 = "イロハのやつを、確実に捕獲するには……。"
20033-CVGroup_Cafe_Idle4-1 = "サツキとチアキ、サボってなどいないといいが……。"
20033-CVGroup_Cafe_Idle5-1 = "この雰囲気、なかなかいいじゃないか。"
20033-CVGroup_WeaponGet_Idle1-1 = "キッ……キキッ……キャヒャヒャヒャヒャッ！\nまったく、侮れないな、先生。こんなプレゼントを用意しているだなんて。\n……信頼の証として受け取っておこうじゃないか。これからも頼んだぞ、先生。"
20033-CVGroup_UIEventShop_Enter1-1 = "ゲヘナの宴を記念し、\n特別に開店した店舗だ。"
20033-CVGroup_UIEventShop_Enter1-2 = "思う存分見ていくがいい、キキッ。"
20033-CVGroup_UIEventShop_Enter2-1 = "……誰かと思ったら、先生か。\n購入する品は、もう決めたのか？"
20033-CVGroup_UIEventShop_Enter3-1 = "キキッ、残念だが、臨時店舗はここまでだ。"
20033-CVGroup_UIEventShop_Enter3-2 = "そう寂しい顔をするでない。"
20033-CVGroup_UIEventShop_Enter3-3 = "次は更に規模を拡張し、盛大かつ豪華に帰ってくるからな、キキキッ！"
20033-CVGroup_UIEventShop_Idle1-1 = "ここにある品はすべて、我が万魔殿が用意したものだ。"
20033-CVGroup_UIEventShop_Idle1-2 = "ああ、我々に財力があるからこそ可能だったということだ。"
20033-CVGroup_UIEventShop_Idle1-3 = "驚くのはまだ早いぞ、クックックッ。"
20033-CVGroup_UIEventShop_Idle2-1 = "うむ？品はどうした？"
20033-CVGroup_UIEventShop_Idle2-2 = "キキキッ、もしかして、先生の目当てはこのマコト様のほうだったりするのか？"
20033-CVGroup_UIEventShop_Idle2-3 = "……特に用はない……？……そうか。"
20033-CVGroup_UIEventShop_Buy1-1 = "ほお、それを選ぶとは。\nその審美眼、高く評価してやろう。"
20033-CVGroup_UIEventShop_Buy2-1 = "それは私のオススメだ。"
20033-CVGroup_UIEventShop_Buy2-2 = "キッキッキッ、いいものを選んだな。"
20033-CVGroup_UIEventShop_Buy3-1 = "キキキッ、今日の私は気分がいい。"
20033-CVGroup_UIEventShop_Buy3-2 = "おまけをつけてやろう！\n万魔殿の協力提案書だ！"
20033-CVGroup_UIEventShop_Buy3-3 = "……何？要らない、だと？"
20033-CVGroup_UIEventShop_Buy4-1 = "それが欲しかったのか、先生。\nキッキッ、変わった人だな。"
