[translation]
20033-CVGroup_UITitle_Idle1-1 = "Kikiki.\nBlue... Archive!"
20033-CVGroup_CharacterGet_Idle1-1 = "Finalmente me digne a aparecer! Kikiki, a própria Makoto Hanuma do Pandemonium veio pessoalmente, trate de me receber com todas as honras."
20033-CVGroup_Cafe_Idle1-1 = "Schale...\nKiki, que lugar apertado, como sempre."
20033-CVGroup_Cafe_Idle2-1 = "Preciso planejar...\num parquinho para a Ibuki..."
20033-CVGroup_Cafe_Idle3-1 = "Como posso capturar a Iroha com certeza..."
20033-CVGroup_Cafe_Idle4-1 = "Espero que a Satsuki e a Chiaki não estejam vadiando..."
20033-CVGroup_Cafe_Idle5-1 = "Essa atmosfera, até que não é nada mal."
20033-CVGroup_WeaponGet_Idle1-1 = "Ki... Kiki... Kyahyahyahyahya! Francamente, você não é de se subestimar, Sensei. Preparar um presente como este...\n...Vou aceitar como prova de confiança. Continue contando comigo, Sensei."
20033-CVGroup_UIEventShop_Enter1-1 = "Para celebrar o banquete de Gehenna,\nesta loja foi aberta especialmente."
20033-CVGroup_UIEventShop_Enter1-2 = "Sinta-se à vontade para olhar tudo o que quiser, kiki."
20033-CVGroup_UIEventShop_Enter2-1 = "...Quem diria, é o Sensei.\nJá decidiu o que vai comprar?"
20033-CVGroup_UIEventShop_Enter3-1 = "Kiki, infelizmente, a loja temporária encerrou."
20033-CVGroup_UIEventShop_Enter3-2 = "Não faça essa cara de tristeza."
20033-CVGroup_UIEventShop_Enter3-3 = "Da próxima vez, voltaremos com uma escala ainda maior, de forma grandiosa e luxuosa, kikiki!"
20033-CVGroup_UIEventShop_Idle1-1 = "Todos os itens aqui foram preparados pelo meu Pandemonium."
20033-CVGroup_UIEventShop_Idle1-2 = "Ah, isso só foi possível graças ao nosso poder financeiro."
20033-CVGroup_UIEventShop_Idle1-3 = "Não se surpreenda ainda, kukkukku."
20033-CVGroup_UIEventShop_Idle2-1 = "Hum? O que houve com os itens?"
20033-CVGroup_UIEventShop_Idle2-2 = "Kikiki, será que o que você queria, Sensei, era a própria Makoto aqui?"
20033-CVGroup_UIEventShop_Idle2-3 = "...Não tem nada em específico...? ...Entendo."
20033-CVGroup_UIEventShop_Buy1-1 = "Ho, escolheu isso.\nVou avaliar seu bom gosto positivamente."
20033-CVGroup_UIEventShop_Buy2-1 = "Essa é a minha recomendação."
20033-CVGroup_UIEventShop_Buy2-2 = "Kikkikki, você escolheu algo bom."
20033-CVGroup_UIEventShop_Buy3-1 = "Kikiki, hoje estou de bom humor."
20033-CVGroup_UIEventShop_Buy3-2 = "Vou te dar um brinde!\nÉ uma proposta de cooperação do Pandemonium!"
20033-CVGroup_UIEventShop_Buy3-3 = "...O quê? Disse que não quer?"
20033-CVGroup_UIEventShop_Buy4-1 = "Era isso que você queria, Sensei.\nKikki, você é uma pessoa estranha."
