[translation]
20042-CVGroup_UITitle_Idle1-1 = "Blue Archive..."
20042-CVGroup_CharacterGet_Idle1-1 = "Ué... acampamento... \nÉ meu dia de folga, por que temos que sair?"
20042-CVGroup_Cafe_Idle1-1 = "Não quero sair hoje..."
20042-CVGroup_Cafe_Idle2-1 = "Ah, tive uma inspiração incrível!"
20042-CVGroup_Cafe_Idle3-1 = "Será que eu deveria usar aquela cama dobrável que peguei emprestada da Chihiro-senpai?"
20042-CVGroup_Cafe_Idle4-1 = "O que é esse Wi-Fi com um nome estranho..."
20042-CVGroup_Cafe_Idle5-1 = "(Será que dá para instalar o BOOM aqui?... Vou tentar!)"
20042-CVGroup_WeaponGet_Idle1-1 = "Modifiquei essa metralhadora para ficar legal, mas... \nEla é pesada demais para escalar montanhas... \nPreciso deixá-la mais leve logo."
20042-CVGroup_UIEventLobby_Enter1-1 = "Que tédio..."
20042-CVGroup_UIEventLobby_Enter1-2 = "Devia ter trazido meu console portátil..."
20042-CVGroup_UIEventLobby_Enter2-1 = "Talvez eu queira sentir as ondas eletromagnéticas..."
20042-CVGroup_UIEventLobby_Enter3-1 = "Será que eu deveria desenhar algo na tela da natureza?"
20042-CVGroup_UIEventLobby_Enter4-1 = "(Ah, esqueci de apagar o mural...)"
20042-CVGroup_UIEventLobby_Enter4-2 = "(Bem, não vai acontecer nada, né?)"
20042-CVGroup_UIEventLobby_Enter5-1 = "Talvez não tenha sido tão ruim quanto eu pensava?"
20042-CVGroup_UIEventLobby_Enter5-2 = "O cozido de frango do jantar estava gostoso..."
20042-CVGroup_UIEventLobby_Enter5-3 = "Se puder trazer o celular, talvez eu venha de novo."
20042-CVGroup_UIEventLobby_Enter5-4 = "N-não é como se eu tivesse começado a gostar de acampar...!"
20042-CVGroup_UIEventLobby_Idle1-1 = "Ugh... não acredito que não vou conseguir ver o especial de fim de ano..."
20042-CVGroup_UIEventLobby_Idle1-2 = "A Chihiro-senpai é cruel!"
20042-CVGroup_UIEventLobby_Idle2-1 = "Aquela nuvem... parece um servidor de computador."
20042-CVGroup_UIEventLobby_Idle3-1 = "Ugh, quero digitar no teclado~ estou entediada demais!"
20042-CVGroup_UIEventLobby_Idle3-2 = "Ei, Sensei, você não tem algum brinquedo para usar as mãos? \nAté um elástico serve!"
20042-CVGroup_UIEventLobby_Idle4-1 = "Parece que você está se divertindo, Sensei, com o acampamento."
20042-CVGroup_UIEventLobby_Idle4-2 = "Então, acho que vou tentar me divertir um pouco também!"
