20042-CVGroup_WeaponGet_Idle1-1 = "このマシンガン、イイ感じに改造したけど……\n登山にはちょっと重すぎるんだよね……\nそろそろ軽量化しなきゃ。"
20042-CVGroup_UIEventLobby_Enter1-1 = "暇だなぁ……"
