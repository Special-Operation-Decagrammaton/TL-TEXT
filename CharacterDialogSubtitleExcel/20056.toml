[translation]
20056-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
20056-CVGroup_CharacterGet_Idle1-1 = "Ни-ха-ха-ха!\nТы наконец-то добрался сюда, Сенсей!\nПрямо туда, где нахожусь я, Куросаки Коюки!"
20056-CVGroup_Cafe_Idle1-1 = "(Место, где я могла бы спрятаться... прямо здесь!)"
20056-CVGroup_Cafe_Idle2-1 = "(Интересно... могу ли я использовать здесь карту Семинара?)"
20056-CVGroup_Cafe_Idle3-1 = "Ты ведь не шёл за мной по пятам всю дорогу сюда... верно?"
20056-CVGroup_Cafe_Idle4-1 = "Сенсей, ты где-о~?"
20056-CVGroup_Cafe_Idle5-1 = "Сегодняшний кофе... случайный купаж!?\nУф... это не совсем в моём вкусе."
20056-CVGroup_WeaponGet_Idle1-1 = "Я уверена, что моей самой большой удачей в жизни была встреча с тобой, Сенсей! Так что... ну, я выложусь на полную! Рассчитываю на тебя!"
20056-CVGroup_UIEventLobby_Enter1-1 = "К-кто здесь!?"
20056-CVGroup_UIEventLobby_Enter1-2 = "...Ох, это всего лишь ты, Сенсей!!"
20056-CVGroup_UIEventLobby_Enter2-1 = "Ты пришёл за мной, Сенсей!"
20056-CVGroup_UIEventLobby_Enter2-2 = "Всё уже полностью готово."
20056-CVGroup_UIEventLobby_Enter2-3 = "Просто присаживайся пока что!"
20056-CVGroup_UIEventLobby_Enter3-1 = "Ты и правда пришёл!"
20056-CVGroup_UIEventLobby_Enter3-2 = "Ты просто не мог ничего с собой поделать, да? Ведь не мог же!?"
20056-CVGroup_UIEventLobby_Enter4-1 = "Хе-хе, предоставь это мне."
20056-CVGroup_UIEventLobby_Enter4-2 = "В конце концов, побеги — это моя главная специальность!"
20056-CVGroup_UIEventLobby_Enter5-1 = "Кажется, произошло много всего, но..."
20056-CVGroup_UIEventLobby_Enter5-2 = "Ну, по крайней мере, сегодня ночью."
20056-CVGroup_UIEventLobby_Enter5-3 = "Давай играть до самого рассвета...!"
20056-CVGroup_UIEventLobby_Enter5-4 = "...Мне бы очень хотелось так сказать, но..."
20056-CVGroup_UIEventLobby_Enter5-5 = "...Ни-ха."
20056-CVGroup_UIEventLobby_Idle1-1 = "Ну и как тебе? Каково это на ощупь...\nОно ведь пушистое, правда?"
20056-CVGroup_UIEventLobby_Idle2-1 = "Ты пришёл спасти меня, Сенсей!"
20056-CVGroup_UIEventLobby_Idle2-2 = "Погоди, Сенсей, тебя тоже поймали!?"
20056-CVGroup_UIEventLobby_Idle3-1 = "Эта настольная игра подстроена!"
20056-CVGroup_UIEventLobby_Idle3-2 = "Она взрывается каждый божий раз, когда наступает мой ход!!"
20056-CVGroup_UIEventLobby_Idle4-1 = "Уф... эта тесная комната размышлений..."
20056-CVGroup_UIEventLobby_Idle4-2 = "Ну, может, всё это не так уж и плохо...?"
