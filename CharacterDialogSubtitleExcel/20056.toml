[translation]
20056-CVGroup_UITitle_Idle1-1 = "ブルー！アーカイブ！"
20056-CVGroup_CharacterGet_Idle1-1 = "に・は・は・はー！\nついにここまで来ちゃいましたね、先生！\nこの黒崎コユキの元に！"
20056-CVGroup_Cafe_Idle1-1 = "（隠れられそうな場所は……ここ！）"
20056-CVGroup_Cafe_Idle2-1 = "（ここ……セミナーのカードって使えますかね？）"
20056-CVGroup_Cafe_Idle3-1 = "まさかここまで追いかけてきたりなんて……ねぇ？"
20056-CVGroup_Cafe_Idle4-1 = "先生どこいるんですか～？"
20056-CVGroup_Cafe_Idle5-1 = "今日のコーヒーは……ランダムブレンド！？\nうぇ……あんまり得意じゃないのに。"
20056-CVGroup_WeaponGet_Idle1-1 = "きっと、一番の幸運は先生に出会えたことなんでしょうね！\nだから、まぁ……全力で頑張りますよ！\nよろしくお願いしますね！"
20056-CVGroup_UIEventLobby_Enter1-1 = "だ、誰！？"
20056-CVGroup_UIEventLobby_Enter1-2 = "……あっ、先生だったんですね！！"
20056-CVGroup_UIEventLobby_Enter2-1 = "来てくれたんですね、先生！"
20056-CVGroup_UIEventLobby_Enter2-2 = "セッティングは終わってるんで。"
20056-CVGroup_UIEventLobby_Enter2-3 = "とりあえず座ってください！"
20056-CVGroup_UIEventLobby_Enter3-1 = "来ちゃいましたね！"
20056-CVGroup_UIEventLobby_Enter3-2 = "やっぱり我慢できませんでしたね？ね！？"
20056-CVGroup_UIEventLobby_Enter4-1 = "ふふっ、私に任せてください。"
20056-CVGroup_UIEventLobby_Enter4-2 = "脱出は私の十八番ですから！"
20056-CVGroup_UIEventLobby_Enter5-1 = "なんか色々あった気がするけど……。"
20056-CVGroup_UIEventLobby_Enter5-2 = "ま、とりあえず今夜は。"
20056-CVGroup_UIEventLobby_Enter5-3 = "朝まで遊び倒しちゃいましょう……！"
20056-CVGroup_UIEventLobby_Enter5-4 = "……って、言いたいところ……なんですけど……。"
20056-CVGroup_UIEventLobby_Enter5-5 = "……にはっ。"
20056-CVGroup_UIEventLobby_Idle1-1 = "どうですか？この触り心地……\nふわふわでしょ？"
20056-CVGroup_UIEventLobby_Idle2-1 = "助けに来てくれたんですね、先生！"
20056-CVGroup_UIEventLobby_Idle2-2 = "え、先生も捕まっちゃったんですか！？"
20056-CVGroup_UIEventLobby_Idle3-1 = "このボードゲームおかしいですよ！"
20056-CVGroup_UIEventLobby_Idle3-2 = "毎回私の番で爆発するんですけど！！"
20056-CVGroup_UIEventLobby_Idle4-1 = "うう……すし詰めの反省部屋……。"
20056-CVGroup_UIEventLobby_Idle4-2 = "ま、こういうのも悪くないかも……？"
