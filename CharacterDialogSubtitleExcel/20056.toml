[translation]
20056-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
20056-CVGroup_CharacterGet_Idle1-1 = "Ni-ha-ha-ha! \nFinalmente você chegou até aqui, Sensei! \nDiretamente para a Kurosaki Koyuki!"
20056-CVGroup_Cafe_Idle1-1 = "(Um lugar onde eu possa me esconder é... aqui!)"
20056-CVGroup_Cafe_Idle2-1 = "(Será que... dá para usar o cartão do Seminar aqui?)"
20056-CVGroup_Cafe_Idle3-1 = "Você não vai me seguir até aqui também... vai?"
20056-CVGroup_Cafe_Idle4-1 = "Sensei, onde você está?"
20056-CVGroup_Cafe_Idle5-1 = "O café de hoje é... um blend aleatório!? \nEca... não é muito a minha praia."
20056-CVGroup_WeaponGet_Idle1-1 = "Com certeza, a maior sorte de todas foi ter conhecido você, Sensei! \nEntão, bem... vou dar o meu melhor! \nConto com você!"
20056-CVGroup_UIEventLobby_Enter1-1 = "Q-quem é!?"
20056-CVGroup_UIEventLobby_Enter1-2 = "...Ah, era você, Sensei!!"
20056-CVGroup_UIEventLobby_Enter2-1 = "Você veio, Sensei!"
20056-CVGroup_UIEventLobby_Enter2-2 = "A preparação já está pronta."
20056-CVGroup_UIEventLobby_Enter2-3 = "Sente-se logo!"
20056-CVGroup_UIEventLobby_Enter3-1 = "Você veio mesmo!"
20056-CVGroup_UIEventLobby_Enter3-2 = "Não conseguiu se segurar, né? Né!?"
20056-CVGroup_UIEventLobby_Enter4-1 = "Hehe, deixe comigo."
20056-CVGroup_UIEventLobby_Enter4-2 = "Fugas são a minha especialidade!"
20056-CVGroup_UIEventLobby_Enter5-1 = "Sinto que aconteceram várias coisas, mas..."
20056-CVGroup_UIEventLobby_Enter5-2 = "Bem, por enquanto, esta noite..."
20056-CVGroup_UIEventLobby_Enter5-3 = "Vamos nos divertir até o amanhecer...!"
20056-CVGroup_UIEventLobby_Enter5-4 = "...Era o que eu queria dizer... mas..."
20056-CVGroup_UIEventLobby_Enter5-5 = "...Niha."
20056-CVGroup_UIEventLobby_Idle1-1 = "O que achou? Essa textura... \nÉ bem fofinha, né?"
20056-CVGroup_UIEventLobby_Idle2-1 = "Você veio me salvar, Sensei!"
20056-CVGroup_UIEventLobby_Idle2-2 = "Ei, você também foi capturado, Sensei!?"
20056-CVGroup_UIEventLobby_Idle3-1 = "Esse jogo de tabuleiro é estranho!"
20056-CVGroup_UIEventLobby_Idle3-2 = "Toda vez que chega na minha vez, ele explode!!"
20056-CVGroup_UIEventLobby_Idle4-1 = "Ugh... a sala de reflexão apertada..."
20056-CVGroup_UIEventLobby_Idle4-2 = "Bem, talvez isso não seja tão ruim assim...?"
