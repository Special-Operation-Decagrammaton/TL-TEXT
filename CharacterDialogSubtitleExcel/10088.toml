[translation]
10088-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10088-CVGroup_CharacterGet_Idle1-1 = "こんにちは。\nあんまり……着慣れてないから、ちょっと変だったらごめん……。\nよろしくね、先生。"
10088-CVGroup_Cafe_Idle1-1 = "悪くないセンスだね。"
10088-CVGroup_Cafe_Idle2-1 = "視線を感じるような……。"
10088-CVGroup_Cafe_Idle3-1 = "……ふーん｡先生って、こういうのが好きなんだ？"
10088-CVGroup_Cafe_Idle4-1 = "……なんだか落ち着く。"
10088-CVGroup_Cafe_Idle5-1 = "座れそうな場所、無いかな？"
10088-CVGroup_WeaponGet_Idle1-1 = "たまに思うんだ。今までいろんなモノを貰ってきたけど……\nちゃんと返せるのかなって。\nでも……たぶんそんな日は来ないから、先に言っておくね。\n……ありがとう、先生。これからも……頑張るよ。"
10088-CVGroup_UIEventLobby_Enter1-1 = "待ってたよ、先生。\n何をすればいい？"
10088-CVGroup_UIEventLobby_Enter2-1 = "……あ、ちょうど探してたんだ、先生。"
10088-CVGroup_UIEventLobby_Enter3-1 = "意外と忙しいね。\n早く取り掛かろうか。"
10088-CVGroup_UIEventLobby_Enter4-1 = "時間ギリギリだね。\nでも大丈夫、手伝うよ。"
10088-CVGroup_UIEventLobby_Enter5-1 = "後片付けを始めるよ。"
10088-CVGroup_UIEventLobby_Idle1-1 = "……うん？呼んだ？"
10088-CVGroup_UIEventLobby_Idle2-1 = "先生……からかってる場合じゃないから。"
10088-CVGroup_UIEventLobby_Idle3-1 = "はあ……遊ぶのは仕事が終わってからにして。"
10088-CVGroup_UIEventLobby_Idle4-1 = "からかう事自体は別にいいんだけど……"
10088-CVGroup_UIEventLobby_Idle4-2 = "今はやめてほしいかな。"
10088-CVGroup_UIEventShop_Enter1-1 = "補給が必要なんでしょ？\nここにあるよ。"
10088-CVGroup_UIEventShop_Enter2-1 = "必要な物があるならいって。\n取ってくる。"
10088-CVGroup_UIEventShop_Enter3-1 = "仕事は終わったけど……\n忘れものは無い？"
10088-CVGroup_UIEventShop_Idle1-1 = "ちゃんと教えてくれたら探してくるよ。"
10088-CVGroup_UIEventShop_Idle2-1 = "先生……\nそれ、ちょっとくすぐったい。"
10088-CVGroup_UIEventShop_Buy1-1 = "それが必要だったんだね。"
10088-CVGroup_UIEventShop_Buy2-1 = "ここにあったんだ。\n役に立つよ、きっと。"
10088-CVGroup_UIEventShop_Buy3-1 = "ちょうどいいものがあって良かった。"
10088-CVGroup_UIEventShop_Buy4-1 = "いい選択だね。"
10088-CVGroup_UIEventMission_Enter1-1 = "進行してるタスクを整理したよ。\n一緒に見よう、先生。"
10088-CVGroup_UIEventMission_Enter2-1 = "進捗状況を確認しに来たの？"
10088-CVGroup_UIEventMission_Idle1-1 = "先生……ちょっと……。"
10088-CVGroup_UIEventMission_Idle2-1 = "……先生と一緒に働くのって、いいね。"
10088-CVGroup_UIEventMission_Buy1-1 = "うん、解決。"
10088-CVGroup_UIEventMission_Buy2-1 = "悪くないね。"
10088-CVGroup_UIEventMission_Interaction1-1 = "今日の仕事は終わり。"
