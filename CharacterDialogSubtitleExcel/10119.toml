[translation]
10119-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10119-CVGroup_CharacterGet_Idle1-1 = "Academia Hyakkiyako, Comitê de Mediação de Conflitos Hyakka Ryoran — Goryou Nagusa.\nEste poder existe para proteger a todos."
10119-CVGroup_Cafe_Idle1-1 = "Como será que a Ayame... passaria o tempo aqui?"
10119-CVGroup_Cafe_Idle2-1 = "Será que tudo bem eu ficar aqui...?"
10119-CVGroup_Cafe_Idle3-1 = "(Isto é... um espetinho de frango...?)"
10119-CVGroup_Cafe_Idle4-1 = "Está um pouco quente, mas... imagino que para todos os outros seja um clima agradável."
10119-CVGroup_Cafe_Idle5-1 = "Estou me sentindo um pouco tonta... talvez eu deva descansar."
10119-CVGroup_WeaponGet_Idle1-1 = "……Esta arma é algo que ninguém pode portar sem a devida qualificação.\nExato — o significado de Goryou Nagusa portar isto. Sensei, acho que você entende.\nMesmo assim... se você me confiar isso... se você acreditar em mim. Eu também, darei o meu melhor para lutar."
