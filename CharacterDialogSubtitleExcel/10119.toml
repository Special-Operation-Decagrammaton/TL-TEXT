[translation]
10119-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10119-CVGroup_CharacterGet_Idle1-1 = "百鬼夜行連合学院、百花繚乱紛争調停委員会――御稜ナグサ。\nこの力は、みんなを守るためにある。"
10119-CVGroup_Cafe_Idle1-1 = "アヤメだったら……どう過ごしてたかな。"
10119-CVGroup_Cafe_Idle2-1 = "ここにいてもいいのかな……。"
10119-CVGroup_Cafe_Idle3-1 = "（これは……焼鳥……？）"
10119-CVGroup_Cafe_Idle4-1 = "ちょっと暑いけど……きっとみんなにとっては過ごしやすいんだろうな。"
10119-CVGroup_Cafe_Idle5-1 = "少しくらくらする……休もうかな。"
10119-CVGroup_WeaponGet_Idle1-1 = "……この銃は、資格がなければ持つことができないもの。\nそう――これを御稜ナグサが持つ、意味。先生なら、分かっていると思う。\nそれでも……任せてくれるのなら……信じてくれるのなら。私も、全力で足掻いてみるよ。"
