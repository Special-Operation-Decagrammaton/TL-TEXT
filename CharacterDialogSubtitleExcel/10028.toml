[translation]
10028-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10028-CVGroup_CharacterGet_Idle1-1 = "Tcharam!\nOlha só, Mestre!\nÉ a Asuna em versão coelhinha!"
10028-CVGroup_Cafe_Idle1-1 = "Pula, pula!\nA Asuna coelhinha chegou!"
10028-CVGroup_Cafe_Idle2-1 = "Aqui também parece ser um lugar super divertido!"
10028-CVGroup_Cafe_Idle3-1 = "Ahahaha!\nO que é isso? Que engraçado!"
10028-CVGroup_Cafe_Idle4-1 = "Ué, para onde o Mestre foi?\nSerá que eu deveria ir procurar?"
10028-CVGroup_Cafe_Idle5-1 = "Sabe, em parques de diversões também costuma ter\ncoelhinhos como eu agora, né!"
10028-CVGroup_WeaponGet_Idle1-1 = "Tcharam!\nAsuna coelhinha, forma completa!\nBrincadeirinha!"
10028-CVGroup_UIEventLobby_Enter1-1 = "Mestre, seja bem-vindo!\nAs coelhinhas estão aqui para te receber!"
10028-CVGroup_UIEventLobby_Enter2-1 = "Então, vamos partir junto com a Asuna!"
10028-CVGroup_UIEventLobby_Idle1-1 = "Mestre!\nVamos brincar com a Asuna! Vamos?"
10028-CVGroup_UIEventLobby_Idle2-1 = "Ah, Mestre, oi!"
10028-CVGroup_UIEventLobby_Idle2-2 = "Que tal a gente sair correndo por aí sem motivo?\nCom certeza vai ser divertido!"
10028-CVGroup_UIEventLobby_Idle3-1 = "Hm, o que foi, o que foi?\nÉ um tipo de brincadeira nova?"
10028-CVGroup_UIEventLobby_Idle3-2 = "Então eu também posso te tocar\no quanto eu quiser, Mestre?"
10028-CVGroup_UIEventLobby_Idle4-1 = "Ah, Mestre!\nFiquei entediada esperando você chegar~"
10028-CVGroup_UIEventLobby_Idle4-2 = "Por isso, vamos nos divertir bastante agora!"
10028-CVGroup_UIEventLobby_Enter3-1 = "Se terminarmos rápido, podemos usar o resto do tempo para brincar, né?"
10028-CVGroup_UIEventLobby_Enter4-1 = "Vamos nos divertir até o fim!"
10028-CVGroup_UIEventLobby_Enter5-1 = "Ah, Mestre!\nPor aqui, por aqui!"
10028-CVGroup_UIEventCardShop_Enter1-1 = "Hora de testar a sorte, Mestre!"
10028-CVGroup_UIEventCardShop_Enter2-1 = "Meu coração está disparado~!"
10028-CVGroup_UIEventCardShop_Idle1-1 = "Ah.\nEi, ei, para onde você está olhando~?"
10028-CVGroup_UIEventCardShop_Idle2-1 = "O que será que vai sair?\nEstou ficando um pouco nervosa!"
10028-CVGroup_UIEventCardShop_Prize3-1 = "Uauuuuu!!\nIncrível, incrível, como esperado do Mestre!"
10028-CVGroup_UIEventCardShop_Prize2-1 = "Oh!\nComo esperado do Mestre!"
10028-CVGroup_UIEventCardShop_Prize1-1 = "Tcharam!"
10028-CVGroup_UIEventCardShop_Prize1-2 = "…Ué, o quê?"
10028-CVGroup_UIEventCardShop_Prize0-1 = "Ah!\nO que é isso, que estranho~!"
10028-CVGroup_UIEventCardShop_Enter3-1 = "Parece que ainda dá para\nentrar aqui!"
