[translation]
10028-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10028-CVGroup_CharacterGet_Idle1-1 = "じゃーん！\n見て見て、ご主人様！\nバニー姿のアスナだよ！"
10028-CVGroup_Cafe_Idle1-1 = "ぴょんぴょん！\nバニーのアスナ参上！"
10028-CVGroup_Cafe_Idle2-1 = "ここもすっごく楽しそうなところだね！"
10028-CVGroup_Cafe_Idle3-1 = "あははは！\n何これ面白い！"
10028-CVGroup_Cafe_Idle4-1 = "あれ、ご主人様どこ行ったんだろ？\n探しに行こっかな～？"
10028-CVGroup_Cafe_Idle5-1 = "遊園地とかにもよく、\n今の私みたいなウサギさんたちがいるよね！"
10028-CVGroup_WeaponGet_Idle1-1 = "じゃーん！\nバニー姿のアスナ、完全体！\nなんちゃって！"
10028-CVGroup_UIEventLobby_Enter1-1 = "ご主人様、ようこそ！\nバニーさんたちがお出迎えだよ！"
10028-CVGroup_UIEventLobby_Enter2-1 = "じゃあアスナと一緒に、出発進行ー！"
10028-CVGroup_UIEventLobby_Idle1-1 = "ご主人様ー！\nアスナと遊ぼう！ね？"
10028-CVGroup_UIEventLobby_Idle2-1 = "あ、ご主人様、やっほー！"
10028-CVGroup_UIEventLobby_Idle2-2 = "一緒に意味も無くその辺走らない？\nきっと楽しいよ！"
10028-CVGroup_UIEventLobby_Idle3-1 = "ん、なになに？\nそういう新しい遊び？"
10028-CVGroup_UIEventLobby_Idle3-2 = "じゃあ私もご主人様のこと、\n好きなだけ触っても良い？"
10028-CVGroup_UIEventLobby_Idle4-1 = "あ、ご主人様！\nご主人様が来るまで退屈だったよ～"
10028-CVGroup_UIEventLobby_Idle4-2 = "だから、今から一緒に楽しく遊ぼうっ！"
10028-CVGroup_UIEventLobby_Enter3-1 = "早く終わったら、その分遊んでも良いよね？"
10028-CVGroup_UIEventLobby_Enter4-1 = "最後まで楽しく遊ぼう！"
10028-CVGroup_UIEventLobby_Enter5-1 = "あっ、ご主人様！\nこっちこっち！"
10028-CVGroup_UIEventCardShop_Enter1-1 = "楽しい運試しの時間だよ、ご主人様！"
10028-CVGroup_UIEventCardShop_Enter2-1 = "ドキドキしてきた～！"
10028-CVGroup_UIEventCardShop_Idle1-1 = "あはっ。\nねぇねぇ、どこ見てるの～？"
10028-CVGroup_UIEventCardShop_Idle2-1 = "何が出るかな～？\nちょっと緊張してきた！"
10028-CVGroup_UIEventCardShop_Prize3-1 = "わーーーーっ！！\nすごいすごい、さっすがご主人様！"
10028-CVGroup_UIEventCardShop_Prize2-1 = "おーっ！\nさすがはご主人様だね！"
10028-CVGroup_UIEventCardShop_Prize1-1 = "じゃーん！"
10028-CVGroup_UIEventCardShop_Prize1-2 = "……って、あれ？"
10028-CVGroup_UIEventCardShop_Prize0-1 = "あはっ！\n何これ変なの～！"
10028-CVGroup_UIEventCardShop_Enter3-1 = "まだまだこっちは\n入っても良いみたいだね！"
