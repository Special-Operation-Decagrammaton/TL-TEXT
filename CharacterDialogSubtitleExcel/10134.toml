[translation]
10134-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10134-CVGroup_CharacterGet_Idle1-1 = "Alice, indo nessa!"
10134-CVGroup_Cafe_Idle1-1 = "Isso... é idêntico à Kei!"
10134-CVGroup_Cafe_Idle2-1 = "Alice está começando a ficar com um pouquinho de sono..."
10134-CVGroup_Cafe_Idle3-1 = "Esta é uma área proibida para PK!"
10134-CVGroup_Cafe_Idle4-1 = "(Escaneamento concluído. Reação hostil... nenhuma)"
10134-CVGroup_Cafe_Idle5-1 = "Onde será que está o carregador?"
10134-CVGroup_WeaponGet_Idle1-1 = "A Espada de Luz sempre me mostrou o caminho a seguir.\nSim... exatamente como o Sensei!"
10134-CVGroup_UICarrierLobby_Enter1-1 = "Alice... sinto que estou ficando empolgada!"
10134-CVGroup_UICarrierLobby_Enter2-1 = "Eu trouxe o console de videogame!"
10134-CVGroup_UICarrierLobby_Enter2-2 = "Sensei, gostaria de jogar comigo?"
10134-CVGroup_UICarrierLobby_Enter3-1 = "Todos foram incríveis!"
10134-CVGroup_UICarrierLobby_Enter4-1 = "Vocês foram realmente admiráveis! Eu os respeito!"
10134-CVGroup_UICarrierLobby_Enter5-1 = "Alice ainda pode se esforçar mais. Sensei!"
10134-CVGroup_UICarrierLobby_Enter6-1 = "Momoi e Midori disseram que iam descansar no quarto..."
10134-CVGroup_UICarrierLobby_Idle1-1 = "...Este é o primeiro passo para salvar o mundo, não é?"
10134-CVGroup_UICarrierLobby_Idle1-2 = "Alice vai dar o seu melhor!"
10134-CVGroup_UICarrierLobby_Idle2-1 = "É justamente nessas horas que o descanso é importante!"
10134-CVGroup_UICarrierLobby_Idle3-1 = "É muito bom poder ser livre...!"
10134-CVGroup_UICarrierLobby_Idle4-1 = "Coragem... é isso que constitui a verdadeira força!"
10134-CVGroup_UICarrierLobby_Idle5-1 = "Para recuperar as energias, nada melhor do que..."
10134-CVGroup_UICarrierLobby_Idle5-2 = "Comer ou beber alguma coisa, não é?"
10134-CVGroup_UICarrierLobby_Idle6-1 = "Para a Alice... contanto que todos estejam bem,"
10134-CVGroup_UICarrierLobby_Idle6-2 = "isso já é o suficiente."
10134-CVGroup_UIEventMission_Enter1-1 = "Sensei! Missão, é uma missão!"
10134-CVGroup_UIEventMission_Enter2-1 = "Qual é a tarefa de hoje?"
10134-CVGroup_UIEventMission_Enter2-2 = "Ah, a organização era responsabilidade da Alice, né..."
10134-CVGroup_UIEventMission_Enter3-1 = "Desculpe interromper a comunicação! Sensei! É a Alice!"
10134-CVGroup_UIEventMission_Enter4-1 = "A situação ficou complicada, mas..."
10134-CVGroup_UIEventMission_Enter4-2 = "Vamos superar isso juntos!"
10134-CVGroup_UIEventMission_Idle1-1 = "Fu, fu, fu..."
10134-CVGroup_UIEventMission_Idle1-2 = "O que achou, Sensei, da nova armadura da Alice!"
10134-CVGroup_UIEventMission_Idle2-1 = "Mesmo sem a armadura..."
10134-CVGroup_UIEventMission_Idle2-2 = "Mesmo que eu perca a Espada de Luz..."
10134-CVGroup_UIEventMission_Idle2-3 = "Ainda assim, a Alice continua sendo a Alice."
10134-CVGroup_UIEventMission_Idle2-4 = "Se todos estiverem aqui... e também,"
10134-CVGroup_UIEventMission_Idle2-5 = "se o Sensei estiver aqui!"
10134-CVGroup_UIEventMission_Idle3-1 = "Malkuth..."
10134-CVGroup_UIEventMission_Idle3-2 = "Tem muita cara de chefe final!"
10134-CVGroup_UIEventMission_Idle3-3 = "Se a gente derrotar... não vai aparecer um chefe secreto, né...?"
10134-CVGroup_UIEventMission_Idle4-1 = "Quando voltarmos em segurança..."
10134-CVGroup_UIEventMission_Idle4-2 = "Quero apresentar a Kei para todo mundo!"
10134-CVGroup_UIEventMission_Buy1-1 = "Ta-da!"
10134-CVGroup_UIEventMission_Buy1-2 = "O Sensei obteve uma recompensa!"
10134-CVGroup_UIEventMission_Buy2-1 = "Incrível, Sensei!"
10134-CVGroup_UIEventMission_Buy2-2 = "Vamos continuar avançando passo a passo!"
10134-CVGroup_UIEventMission_Buy3-1 = "Uuu... a Alice também queria estar ao lado do Sensei para comemorar!"
10134-CVGroup_UIEventMission_Buy4-1 = "Sim! A Alice adora o Sensei, que nunca muda!"
10134-CVGroup_UIEventMission_Interaction1-1 = "Uau! A Alice também está muito feliz!"
10134-CVGroup_UIEventMission_Interaction2-1 = "Bom trabalho hoje também, Sensei!"
