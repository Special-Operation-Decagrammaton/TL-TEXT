[translation]
20052-CVGroup_UITitle_Idle1-1 = "Blue, Archive, mufufu."
20052-CVGroup_CharacterGet_Idle1-1 = "Impressão, encadernação, gestão, distribuição... Para qualquer assunto relacionado a livros, sinta-se à vontade para procurar a chefe do Departamento Editorial de Red Winter, Aramaki Yakumo. Mufufu."
20052-CVGroup_Cafe_Idle1-1 = "Bem... qual será o próximo canal de vendas...?"
20052-CVGroup_Cafe_Idle2-1 = "Aqui é tão quentinho e relaxante..."
20052-CVGroup_Cafe_Idle3-1 = "Se eu montasse uma banca ali... mufufu."
20052-CVGroup_Cafe_Idle4-1 = "A literatura atual é como um negócio de plataforma, sabe?"
20052-CVGroup_Cafe_Idle5-1 = "Bem, qual foi o faturamento de hoje...?"
20052-CVGroup_WeaponGet_Idle1-1 = "Tolo é quem não sabe usar as ferramentas que tem... De agora em diante, acho que finalmente conseguirei fazer com que os contratos sejam 'devidamente' cumpridos... mufufu."
20052-CVGroup_UIEventLobby_Enter1-1 = "Sem risco, não há retorno."
20052-CVGroup_UIEventLobby_Enter1-2 = "Bem, vamos começar os negócios?"
20052-CVGroup_UIEventLobby_Enter2-1 = "Agora, vou mostrar a você."
20052-CVGroup_UIEventLobby_Enter2-2 = "A habilidade do meu Departamento Editorial, que sobreviveu nas terras áridas de Red Winter!"
20052-CVGroup_UIEventLobby_Enter2-3 = "...Embora, talvez,"
20052-CVGroup_UIEventLobby_Enter2-4 = "o termo 'capacidade de sobrevivência' seja mais apropriado, sabe?"
20052-CVGroup_UIEventLobby_Enter3-1 = "Está vindo... a maré está a nosso favor!"
20052-CVGroup_UIEventLobby_Enter3-2 = "Como chefe do Departamento Editorial, farei de tudo para aproveitar essa oportunidade!"
20052-CVGroup_UIEventLobby_Enter4-1 = "Como as coisas chegaram a esse ponto..."
20052-CVGroup_UIEventLobby_Enter4-2 = "Bem, na verdade... sinto que consigo identificar a causa..."
20052-CVGroup_UIEventLobby_Enter4-3 = "Ainda não podemos desistir...!"
20052-CVGroup_UIEventLobby_Enter5-1 = "Nossa, por um momento achei que tudo estava perdido..."
20052-CVGroup_UIEventLobby_Enter5-2 = "Que bom que deu tudo certo... espere, uma reunião de avaliação?"
20052-CVGroup_UIEventLobby_Enter5-3 = "Hum... será que podemos deixar para outra hora...?"
20052-CVGroup_UIEventLobby_Idle1-1 = "Os criadores..."
20052-CVGroup_UIEventLobby_Idle1-2 = "Eles têm o poder de criar algo,"
20052-CVGroup_UIEventLobby_Idle1-3 = "mas quando se trata de divulgar isso..."
20052-CVGroup_UIEventLobby_Idle1-4 = "muitas vezes eles não demonstram interesse, sabe?"
20052-CVGroup_UIEventLobby_Idle2-1 = "Livros... textos são coisas preciosas."
20052-CVGroup_UIEventLobby_Idle2-2 = "Eles extraem o máximo de resultado com o mínimo de insumo..."
20052-CVGroup_UIEventLobby_Idle2-3 = "São produtos que escondem um grande 'potencial', afinal...!"
20052-CVGroup_UIEventLobby_Idle3-1 = "Ser capaz de criar algo do zero é algo maravilhoso."
20052-CVGroup_UIEventLobby_Idle3-2 = "E o talento que torna isso possível também."
20052-CVGroup_UIEventLobby_Idle3-3 = "..."
20052-CVGroup_UIEventLobby_Idle3-4 = "É bom, não é? Esse tipo de talento."
20052-CVGroup_UIEventLobby_Idle3-5 = "Do fundo do meu coração... eu penso assim."
20052-CVGroup_UIEventLobby_Idle4-1 = "Sou muito grata às alunas de Trinity, sabe?"
20052-CVGroup_UIEventLobby_Idle4-2 = "...Não me olhe com essa cara."
20052-CVGroup_UIEventLobby_Idle4-3 = "Eu estou falando sério, do fundo do coração."
20052-CVGroup_UIEventShop_Enter1-1 = "Qual você acha que é a base dos negócios? Mercadorias...? Trocas...?"
20052-CVGroup_UIEventShop_Enter1-2 = "Claro que é dinheiro, não é?"
20052-CVGroup_UIEventShop_Enter2-1 = "Que bom que você veio!"
20052-CVGroup_UIEventShop_Enter2-2 = "Bem-vindo ao local de trabalho onde o capital e os produtos se cruzam!"
20052-CVGroup_UIEventShop_Enter2-3 = "Mufufu, então, fique à vontade."
20052-CVGroup_UIEventShop_Enter3-1 = "Às vezes, tesouros ficam escondidos no fundo das prateleiras."
20052-CVGroup_UIEventShop_Enter3-2 = "Dê uma boa olhada até o fim, Sensei."
20052-CVGroup_UIEventShop_Enter3-3 = "Ah, claro, se quiser me observar com atenção, também não me importo."
20052-CVGroup_UIEventShop_Idle1-1 = "Não pense que, só porque está falando comigo, o preço vai baixar, viu?"
20052-CVGroup_UIEventShop_Idle1-2 = "Para decidir um único desconto, nos bastidores ocorrem incontáveis negociações e..."
20052-CVGroup_UIEventShop_Idle1-3 = "...acordos políticos, sabe?"
20052-CVGroup_UIEventShop_Idle2-1 = "Eu nunca imaginei que chegaria o dia em que faria negócios com o Sensei."
20052-CVGroup_UIEventShop_Idle2-2 = "Nossa, viver bastante traz surpresas, não é?"
20052-CVGroup_UIEventShop_Buy1-1 = "Oh! Você tem um ótimo olho, Sensei!"
20052-CVGroup_UIEventShop_Buy1-2 = "Sendo assim, que tal dar uma olhada nisto também?"
20052-CVGroup_UIEventShop_Buy2-1 = "Isso é segredo, mas..."
20052-CVGroup_UIEventShop_Buy2-2 = "O momento em que vejo o produto final com meus próprios olhos...\nÉ o que mais me deixa empolgada...!"
20052-CVGroup_UIEventShop_Buy3-1 = "Entendido, Sensei? Cultura é dinheiro."
20052-CVGroup_UIEventShop_Buy3-2 = "Ou seja, o ato de comprar é..."
20052-CVGroup_UIEventShop_Buy3-3 = "algo que podemos chamar de atividade cultural."
20052-CVGroup_UIEventShop_Buy4-1 = "Eu garanto a qualidade, viu?"
