[translation]
26007-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
26007-CVGroup_CharacterGet_Idle1-1 = "お、奥空アヤネです。\nど、どうでしょうか……\nこういう格好は、少し恥ずかしいですね。"
26007-CVGroup_Cafe_Idle1-1 = "こ、この格好でここにいるのは、\nちょっと恥ずかしいですね……。"
26007-CVGroup_Cafe_Idle2-1 = "あれ、みんなはどこに……？"
26007-CVGroup_Cafe_Idle3-1 = "どこかゆっくりできそうなところは……。"
26007-CVGroup_Cafe_Idle4-1 = "ん……？\nあれは何でしょう……？"
26007-CVGroup_Cafe_Idle5-1 = "何だか、楽しくなっちゃいますね。"
26007-CVGroup_WeaponGet_Idle1-1 = "こんなに凄いものを、私に……\n先生にはいつも、色んな物を頂いてばかりですね。\n少しでもお返しできるよう、引き続き頑張ります！"
26007-CVGroup_UIEventLobby_Enter1-1 = "お疲れ様です、先生。\n準備ならお任せください！"
26007-CVGroup_UIEventLobby_Enter2-1 = "お待ちしておりました、先生！\n一緒に頑張りましょう！"
26007-CVGroup_UIEventLobby_Idle1-1 = "……えっと、先生？\nどうかされましたか？"
26007-CVGroup_UIEventLobby_Idle2-1 = "ど、どうしましたか？\nどこかに虫とか付いてます……？"
26007-CVGroup_UIEventLobby_Idle3-1 = "えっと……先生、呼びましたか？"
26007-CVGroup_UIEventLobby_Idle4-1 = "す、すみません、\nあまり見られると恥ずかしいです……。"
26007-CVGroup_UIEventLobby_Enter3-1 = "さあ、張り切って行きましょうか！"
26007-CVGroup_UIEventLobby_Enter4-1 = "もう少しで何とかなりそうですね。\n頑張りましょう、先生！"
26007-CVGroup_UIEventLobby_Enter5-1 = "後片付けも大事ですよね、\nお手伝いします！"
26007-CVGroup_UIEventMission_Enter1-1 = "目標のリストを整理しておきました。"
26007-CVGroup_UIEventMission_Enter2-1 = "こちらが現在の目標です。"
26007-CVGroup_UIEventMission_Idle1-1 = "目標が一つずつ達成されていくのって、\n気持ち良いですよね。"
26007-CVGroup_UIEventMission_Idle2-1 = "こうやって一緒にリストを整理してるだけで、\n何だか楽しいです。"
26007-CVGroup_UIEventMission_Buy1-1 = "はい、お疲れ様でした！"
26007-CVGroup_UIEventMission_Buy2-1 = "さすがは先生ですね！"
26007-CVGroup_UIEventMission_Interaction1-1 = "今日の目標、全て完了です！\nお疲れ様でした！"
