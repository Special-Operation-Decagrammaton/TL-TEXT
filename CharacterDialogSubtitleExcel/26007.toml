[translation]
26007-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26007-CVGroup_CharacterGet_Idle1-1 = "S-sou a Okusora Ayane.\nO-o que achou...?\nEstar vestida assim é um pouco vergonhoso."
26007-CVGroup_Cafe_Idle1-1 = "E-estar aqui vestida assim...\né um pouco vergonhoso..."
26007-CVGroup_Cafe_Idle2-1 = "Ué, onde estão todos...?"
26007-CVGroup_Cafe_Idle3-1 = "Será que tem algum lugar para relaxar por aqui...?"
26007-CVGroup_Cafe_Idle4-1 = "Hm...? O que é aquilo...?"
26007-CVGroup_Cafe_Idle5-1 = "De alguma forma, acabo me divertindo."
26007-CVGroup_WeaponGet_Idle1-1 = "Dar algo tão incrível assim para mim...\nProfessor, você sempre me dá tantas coisas.\nContinuarei me esforçando para retribuir, nem que seja um pouco!"
26007-CVGroup_UIEventLobby_Enter1-1 = "Bom trabalho, Professor.\nPode deixar os preparativos comigo!"
26007-CVGroup_UIEventLobby_Enter2-1 = "Eu estava te esperando, Professor!\nVamos dar o nosso melhor juntos!"
26007-CVGroup_UIEventLobby_Idle1-1 = "...Hum, Professor?\nAconteceu alguma coisa?"
26007-CVGroup_UIEventLobby_Idle2-1 = "O-o que foi?\nTem algum inseto em mim...?"
26007-CVGroup_UIEventLobby_Idle3-1 = "Hum... Professor, você me chamou?"
26007-CVGroup_UIEventLobby_Idle4-1 = "D-desculpe, é vergonhoso ser encarada assim..."
26007-CVGroup_UIEventLobby_Enter3-1 = "Vamos lá, com toda a energia!"
26007-CVGroup_UIEventLobby_Enter4-1 = "Estamos quase conseguindo.\nVamos nos esforçar, Professor!"
26007-CVGroup_UIEventLobby_Enter5-1 = "Organizar tudo depois também é importante, não é?\nEu vou ajudar!"
26007-CVGroup_UIEventMission_Enter1-1 = "Organizei a lista de objetivos."
26007-CVGroup_UIEventMission_Enter2-1 = "Aqui estão os objetivos atuais."
26007-CVGroup_UIEventMission_Idle1-1 = "É muito satisfatório ver os objetivos sendo concluídos um por um, não é?"
26007-CVGroup_UIEventMission_Idle2-1 = "Só de organizar a lista com você assim,\né bem divertido."
26007-CVGroup_UIEventMission_Buy1-1 = "Sim, bom trabalho!"
26007-CVGroup_UIEventMission_Buy2-1 = "Como esperado do Professor!"
26007-CVGroup_UIEventMission_Interaction1-1 = "Todos os objetivos de hoje foram concluídos!\nBom trabalho!"
