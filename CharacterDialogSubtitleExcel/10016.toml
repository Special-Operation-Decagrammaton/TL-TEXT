[translation]
10016-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10016-CVGroup_CharacterGet_Idle1-1 = "最高のプレイで先生をお手伝いしますね。"
10016-CVGroup_Cafe_Idle1-1 = "へえ……\nこのゲーム、面白い。"
10016-CVGroup_Cafe_Idle2-1 = "うーん、あのゲームの続編が出たらしいけど……\nよし！アルバイトしよう！"
10016-CVGroup_Cafe_Idle3-1 = "もう少し大人になったら……\n髪を伸ばしてみようかな。"
10016-CVGroup_Cafe_Idle4-1 = "お願いだから……\n出て……出て……出た！"
10016-CVGroup_Cafe_Idle5-1 = "よし。このままいけば……クリア！"
10016-CVGroup_WeaponGet_Idle1-1 = "武器にこんな表現をするのは合ってるのか分かりませんが……\n美しいですね。嬉しいです。"
