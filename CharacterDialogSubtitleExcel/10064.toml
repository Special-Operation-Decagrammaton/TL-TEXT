[translation]
10064-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10064-CVGroup_CharacterGet_Idle1-1 = "新年だから、新しい服なだけ。\n今年もよろしくね、先生。"
10064-CVGroup_Cafe_Idle1-1 = "今年も……無事だといいんだけど。\n……いろいろと。"
10064-CVGroup_Cafe_Idle2-1 = "はあ……。\n考えることがたくさん。"
10064-CVGroup_Cafe_Idle3-1 = "真面目な話、願うのは健康と平和。\nほんと、それだけ。"
10064-CVGroup_Cafe_Idle4-1 = "解決できる問題だけにしてほしいな。"
10064-CVGroup_Cafe_Idle5-1 = "この服、そこそこ気に入ってる。\n悪くない。"
10064-CVGroup_WeaponGet_Idle1-1 = "先生、本当に大丈夫……？\nいや……違うか。\nかけてくれた期待に見合うよう頑張るね。"
10064-CVGroup_UIEventLobby_Enter1-1 = "お疲れ、先生。\n会場でも先生に会えるの、良いね。"
10064-CVGroup_UIEventLobby_Enter2-1 = "もうお参りはした？"
10064-CVGroup_UIEventLobby_Enter2-2 = "世の中思い通りにはいかないけど、"
10064-CVGroup_UIEventLobby_Enter2-3 = "お願い事をする時は、自由だからさ。"
10064-CVGroup_UIEventLobby_Idle1-1 = "今年も穏やかな日々が続きますように。"
10064-CVGroup_UIEventLobby_Idle2-1 = "新作アルバム代を全部お賽銭に使っちゃって、よかったのかって？"
10064-CVGroup_UIEventLobby_Idle2-2 = "ま……確かにちょっと無理したけど、"
10064-CVGroup_UIEventLobby_Idle2-3 = "社長の笑顔が見れるなら、安いもんだよ。"
10064-CVGroup_UIEventLobby_Idle3-1 = "ハルカ、最近疲れてるように見えるけど。"
10064-CVGroup_UIEventLobby_Idle3-2 = "大丈夫かな……。"
10064-CVGroup_UIEventLobby_Idle4-1 = "（……黒亀組か。嫌な予感がする。）"
10064-CVGroup_UIEventLobby_Enter3-1 = "新年早々、雲行きが怪しいような……。"
10064-CVGroup_UIEventLobby_Enter4-1 = "賽銭箱泥棒って……。"
10064-CVGroup_UIEventLobby_Enter4-2 = "厄介ごとに首を突っ込むつもりはなかったんだけど、"
10064-CVGroup_UIEventLobby_Enter4-3 = "社長の命令なら仕方ないか。"
10064-CVGroup_UIEventLobby_Enter5-1 = "はあ、まったく災難だったよ。"
10064-CVGroup_UIEventLobby_Enter5-2 = "最後は変なロボットの相手までさせられたし……。"
10064-CVGroup_UIEventLobby_Enter5-3 = "でも……おかげで退屈はしなかった。"
10064-CVGroup_UIEventMission_Enter1-1 = "先生、丁度いいところに。\n頼みたいことがあるの。"
10064-CVGroup_UIEventMission_Enter2-1 = "新年から悪いけど……。\nちょっと時間もらえる？"
10064-CVGroup_UIEventMission_Idle1-1 = "便利屋が先生に依頼だなんて……。"
10064-CVGroup_UIEventMission_Idle1-2 = "いつもと立場が逆で、なんだか新鮮。"
10064-CVGroup_UIEventMission_Idle2-1 = "ごめん、ムツキと違ってこういうのに慣れてなくて……。"
10064-CVGroup_UIEventMission_Idle2-2 = "こういう時……その……\nどんな顔をすればいいか、分からない……。"
10064-CVGroup_UIEventMission_Buy1-1 = "手伝ってくれてありがと。\nはい、便利屋68からのお礼だよ。"
10064-CVGroup_UIEventMission_Buy2-1 = "ありがと、先生。\nおかげで助かったよ。"
10064-CVGroup_UIEventMission_Interaction1-1 = "今日はこの辺でいいかな。\n会場のやつらも、いい加減諦めるだろうし。"
