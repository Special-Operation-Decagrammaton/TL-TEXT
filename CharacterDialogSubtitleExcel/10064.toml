[translation]
10064-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10064-CVGroup_CharacterGet_Idle1-1 = "É só uma roupa nova porque é Ano Novo.\nConto com você este ano também, Sensei."
10064-CVGroup_Cafe_Idle1-1 = "Espero que este ano... corra tudo bem.\n...Com tudo."
10064-CVGroup_Cafe_Idle2-1 = "Ah...\nTem tanta coisa para pensar."
10064-CVGroup_Cafe_Idle3-1 = "Falando sério, só desejo saúde e paz.\nSério, só isso."
10064-CVGroup_Cafe_Idle4-1 = "Eu queria que fossem apenas problemas que eu pudesse resolver."
10064-CVGroup_Cafe_Idle5-1 = "Eu até que gostei desta roupa.\nNão é ruim."
10064-CVGroup_WeaponGet_Idle1-1 = "Sensei, tem certeza mesmo...?\nNão... esquece.\nVou me esforçar para corresponder às expectativas que você depositou em mim."
10064-CVGroup_UIEventLobby_Enter1-1 = "Bom trabalho, Sensei.\nÉ bom poder te encontrar no local do evento também."
10064-CVGroup_UIEventLobby_Enter2-1 = "Já fez suas orações?"
10064-CVGroup_UIEventLobby_Enter2-2 = "O mundo não funciona do jeito que a gente quer, mas,"
10064-CVGroup_UIEventLobby_Enter2-3 = "quando se trata de fazer pedidos, somos livres para isso."
10064-CVGroup_UIEventLobby_Idle1-1 = "Que este ano continue sendo de dias tranquilos."
10064-CVGroup_UIEventLobby_Idle2-1 = "Se eu me arrependo de ter usado todo o dinheiro do novo álbum nas oferendas? "
10064-CVGroup_UIEventLobby_Idle2-2 = "Bem... com certeza foi um exagero, mas,"
10064-CVGroup_UIEventLobby_Idle2-3 = "se for para ver o sorriso da presidente, foi um preço barato."
10064-CVGroup_UIEventLobby_Idle3-1 = "A Haruka parece estar cansada ultimamente."
10064-CVGroup_UIEventLobby_Idle3-2 = "Será que ela está bem?..."
10064-CVGroup_UIEventLobby_Idle4-1 = "(...O Grupo Kurokame? Tenho um mau pressentimento.)"
10064-CVGroup_UIEventLobby_Enter3-1 = "Logo no início do ano, o tempo parece estar fechando..."
10064-CVGroup_UIEventLobby_Enter4-1 = "Ladrão de caixa de oferendas, hein..."
10064-CVGroup_UIEventLobby_Enter4-2 = "Eu não pretendia me meter em problemas,"
10064-CVGroup_UIEventLobby_Enter4-3 = "mas se é uma ordem da presidente, não tem jeito."
10064-CVGroup_UIEventLobby_Enter5-1 = "Ah, que desastre total."
10064-CVGroup_UIEventLobby_Enter5-2 = "No final, ainda tive que lidar com um robô estranho..."
10064-CVGroup_UIEventLobby_Enter5-3 = "Mas... graças a isso, não fiquei entediada."
10064-CVGroup_UIEventMission_Enter1-1 = "Sensei, que bom que apareceu.\nTenho um favor para te pedir."
10064-CVGroup_UIEventMission_Enter2-1 = "Desculpe incomodar logo no Ano Novo...\nVocê tem um tempinho?"
10064-CVGroup_UIEventMission_Idle1-1 = "A Problem Solver fazendo um pedido para o Sensei..."
10064-CVGroup_UIEventMission_Idle1-2 = "É bem diferente do habitual, é uma sensação nova."
10064-CVGroup_UIEventMission_Idle2-1 = "Desculpa, ao contrário da Mutsuki, eu não estou acostumada com esse tipo de coisa..."
10064-CVGroup_UIEventMission_Idle2-2 = "Nessas horas... sabe... \nEu não sei que cara fazer..."
10064-CVGroup_UIEventMission_Buy1-1 = "Obrigada por ajudar.\nAqui, é um agradecimento da Problem Solver 68."
10064-CVGroup_UIEventMission_Buy2-1 = "Obrigada, Sensei.\nVocê me salvou."
10064-CVGroup_UIEventMission_Interaction1-1 = "Acho que por hoje chega.\nO pessoal do evento também deve desistir uma hora dessas."
