[translation]
16015-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ！"
16015-CVGroup_CharacterGet_Idle1-1 = "先生……お見せします。\n変わることができた私の姿を！"
16015-CVGroup_Cafe_Idle1-1 = "綺麗な場所……！"
16015-CVGroup_Cafe_Idle2-1 = "みんな素敵な格好。"
16015-CVGroup_Cafe_Idle3-1 = "ここで練習したら迷惑かな……？"
16015-CVGroup_Cafe_Idle4-1 = "ちょっとお腹空いてきちゃった……。"
16015-CVGroup_Cafe_Idle5-1 = "みんなどんな歌が好きかな？"
16015-CVGroup_WeaponGet_Idle1-1 = "こんな日が来るなんて、思ってもみませんでした。\n……本当にこんなこともあるんですね。\n……とても嬉しいです。"
16015-CVGroup_UIEventLobby_Enter1-1 = "おかえりなさい、先生！\nお待ちしておりました！"
16015-CVGroup_UIEventLobby_Enter2-1 = "先生！\nよかったら練習の成果を見てください！"
16015-CVGroup_UIEventLobby_Enter3-1 = "順調ですね！\n私も頑張ります！"
16015-CVGroup_UIEventLobby_Enter4-1 = "最後まで頑張ります！\n見ていてください、先生！"
16015-CVGroup_UIEventLobby_Enter5-1 = "はぁ……スッキリした！\n先生はいかがでしたか？"
16015-CVGroup_UIEventLobby_Idle1-1 = "先生？……呼びました？"
16015-CVGroup_UIEventLobby_Idle2-1 = "え、ええと……。"
16015-CVGroup_UIEventLobby_Idle2-2 = "そんなにつつかれたら……。"
16015-CVGroup_UIEventLobby_Idle3-1 = "く、くすぐったいです、先生……。"
16015-CVGroup_UIEventLobby_Idle3-2 = "あはは……。"
16015-CVGroup_UIEventLobby_Idle4-1 = "もう～！\n私もやり返しちゃいますよ？"
16015-CVGroup_UIEventMiniGameMission_Enter1-1 = "こんにちは、先生！\nお待ちしておりました！"
16015-CVGroup_UIEventMiniGameMission_Enter2-1 = "来てくださったんですね、先生！\n進行状況をまとめておきました！"
16015-CVGroup_UIEventMiniGameMission_Idle1-1 = "せ、先生……？"
16015-CVGroup_UIEventMiniGameMission_Idle2-1 = "わ、私じゃなくてあちらを見てください……。"
16015-CVGroup_UIEventMiniGameMission_Buy1-1 = "はい！こちらです！"
16015-CVGroup_UIEventMiniGameMission_Buy2-1 = "確認完了です！"
16015-CVGroup_UIEventMission_Interaction1-1 = "本日のチェックはこれで終わりですね！\nお疲れ様でした！"
