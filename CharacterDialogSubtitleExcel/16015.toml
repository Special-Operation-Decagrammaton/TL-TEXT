[translation]
16015-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16015-CVGroup_CharacterGet_Idle1-1 = "Sensei... eu vou te mostrar.\nA minha nova versão, que conseguiu mudar!"
16015-CVGroup_Cafe_Idle1-1 = "Que lugar lindo...!"
16015-CVGroup_Cafe_Idle2-1 = "Todos estão com roupas tão bonitas."
16015-CVGroup_Cafe_Idle3-1 = "Será que incomoda se eu praticar aqui...?"
16015-CVGroup_Cafe_Idle4-1 = "Acabei ficando com um pouco de fome..."
16015-CVGroup_Cafe_Idle5-1 = "Que tipo de música será que todos gostam?"
16015-CVGroup_WeaponGet_Idle1-1 = "Eu nunca imaginei que um dia como este chegaria.\n...Realmente, coisas assim acontecem.\n...Estou muito feliz."
16015-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo de volta, Sensei!\nEu estava te esperando!"
16015-CVGroup_UIEventLobby_Enter2-1 = "Sensei!\nSe quiser, veja o resultado do meu treino!"
16015-CVGroup_UIEventLobby_Enter3-1 = "Estamos indo bem!\nEu também vou me esforçar!"
16015-CVGroup_UIEventLobby_Enter4-1 = "Vou dar o meu melhor até o fim!\nFique de olho em mim, Sensei!"
16015-CVGroup_UIEventLobby_Enter5-1 = "Ah... que alívio!\nO que achou, Sensei?"
16015-CVGroup_UIEventLobby_Idle1-1 = "Sensei? ...Você me chamou?"
16015-CVGroup_UIEventLobby_Idle2-1 = "E-eh, bem..."
16015-CVGroup_UIEventLobby_Idle2-2 = "Se você ficar cutucando assim..."
16015-CVGroup_UIEventLobby_Idle3-1 = "I-isso faz cócegas, Sensei..."
16015-CVGroup_UIEventLobby_Idle3-2 = "Ahaha..."
16015-CVGroup_UIEventLobby_Idle4-1 = "Ah, não!\nEu vou revidar, viu?"
16015-CVGroup_UIEventMiniGameMission_Enter1-1 = "Olá, Sensei!\nEu estava te esperando!"
16015-CVGroup_UIEventMiniGameMission_Enter2-1 = "Você veio, Sensei!\nEu organizei o progresso para você!"
16015-CVGroup_UIEventMiniGameMission_Idle1-1 = "Se-Sensei...?"
16015-CVGroup_UIEventMiniGameMission_Idle2-1 = "N-não olhe para mim, olhe para lá..."
16015-CVGroup_UIEventMiniGameMission_Buy1-1 = "Sim! Aqui está!"
16015-CVGroup_UIEventMiniGameMission_Buy2-1 = "Verificação concluída!"
16015-CVGroup_UIEventMission_Interaction1-1 = "A verificação de hoje termina aqui!\nBom trabalho!"
