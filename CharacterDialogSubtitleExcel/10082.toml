[translation]
10082-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10082-CVGroup_CharacterGet_Idle1-1 = "百鬼夜行連合学院所属、百花繚乱の切り込み隊長、不破レンゲ、ここに参上！\n先生、いや、師匠の手伝いも「青春活動」も全力でいくから！よろしくな！"
10082-CVGroup_Cafe_Idle1-1 = "う、うわあ……これは……\nどいつもこいつも、「青春」を謳歌してやがる……\nこれが……シャーレ……。"
10082-CVGroup_Cafe_Idle2-1 = "うーん、次はどんな「青春活動」をしよう……？"
10082-CVGroup_Cafe_Idle3-1 = "ユカリのやつ、ちゃんと大人しくやってるかな……。"
10082-CVGroup_Cafe_Idle4-1 = "快適だなぁ～\nうちの部室もこうだといいんだけど……。"
10082-CVGroup_Cafe_Idle5-1 = "もしも問題児がいたら……\nアタシが根性を叩きなおしてやる。"
10082-CVGroup_WeaponGet_Idle1-1 = "こ、これは……噂に聞く、あの……！？「青春」ってやつだよね……！\nお、落ち着こう……ふぅ、ふぅ。\nあ、ありがとう、師匠……大切に、する。"
