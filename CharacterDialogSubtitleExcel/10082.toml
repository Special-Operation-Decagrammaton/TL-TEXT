[translation]
10082-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10082-CVGroup_CharacterGet_Idle1-1 = "Pertencente à Academia Hyakkiyako, a capitã de vanguarda da Hyakka Ryoran, Fuwa Renge, apresentando-se! Sensei, não, Mestre, vou dar tudo de mim tanto na sua ajuda quanto nas minhas \"atividades de juventude\"! Conto com você!"
10082-CVGroup_Cafe_Idle1-1 = "U-uau... isso é...\nTodo mundo aqui está aproveitando a \"juventude\" ao máximo...\nEntão isso é... o Schale..."
10082-CVGroup_Cafe_Idle2-1 = "Hmm, que tipo de \"atividade de juventude\" devo fazer a seguir...?"
10082-CVGroup_Cafe_Idle3-1 = "Será que a Yukari está se comportando direitinho...?"
10082-CVGroup_Cafe_Idle4-1 = "Que confortável~\nQuem dera a nossa sala do clube fosse assim também..."
10082-CVGroup_Cafe_Idle5-1 = "Se aparecer algum encrenqueiro...\nEu mesma vou dar um jeito de colocar juízo na cabeça dele."
10082-CVGroup_WeaponGet_Idle1-1 = "I-isso é... aquilo que eu ouvi falar...!? É aquela tal de \"juventude\", né...!\nC-calma... respira, respira.\nO-obrigada, Mestre... vou cuidar muito bem disso."
