[translation]
23003-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
23003-CVGroup_CharacterGet_Idle1-1 = "会えて嬉しい、先生。\nミレニアムの力を、先生に見せてあげる。"
23003-CVGroup_Cafe_Idle1-1 = "自販機からエナジードリンクだけが出るようにはできないのかな……？"
23003-CVGroup_Cafe_Idle2-1 = "ううーん……。\nちょっと一眠りしてから続けようかな？"
23003-CVGroup_Cafe_Idle3-1 = "糖分が足りない……。"
23003-CVGroup_Cafe_Idle4-1 = "これをこうやって直して、あそこをああやって直せば……\nよし。すぐ改造してみようかな？"
23003-CVGroup_Cafe_Idle5-1 = "ふーん。うん？\nああ、何してるかって？\n新作のゲームをやってたの。"
23003-CVGroup_WeaponGet_Idle1-1 = "古い武器だけど……\nこの武器には数値化できない思い出が込められてる。"
