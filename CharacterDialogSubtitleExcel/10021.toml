[translation]
10021-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10021-CVGroup_CharacterGet_Idle1-1 = "Shirasu Azusa, cheguei ao mar no ponto de destino.\nComeçarei a missão planejada imediatamente.\n...Não é como se eu estivesse animada nem nada do tipo."
10021-CVGroup_Cafe_Idle1-1 = "É surpreendentemente fácil de se mover, não é ruim..."
10021-CVGroup_Cafe_Idle2-1 = "Sinto como se estivessem me observando..."
10021-CVGroup_Cafe_Idle3-1 = "...Hehe."
10021-CVGroup_Cafe_Idle4-1 = "No fim das contas, isso é mesmo fofo..."
10021-CVGroup_Cafe_Idle5-1 = "Talvez eu esteja um pouco cansada..."
10021-CVGroup_WeaponGet_Idle1-1 = "Era exatamente disso que eu precisava, obrigada.\nNão vou deixar você se arrepender."
10021-CVGroup_UIEventLobby_Enter1-1 = "Verão... mar..."
10021-CVGroup_UIEventLobby_Enter1-2 = "...Hm?\nPo-por que você está me olhando tanto assim..."
10021-CVGroup_UIEventLobby_Enter2-1 = "Bem-vindo de volta, Sensei.\nAinda temos muitas coisas para fazer."
10021-CVGroup_UIEventLobby_Idle1-1 = "Este traje de banho é fofo...\nHehe..."
10021-CVGroup_UIEventLobby_Idle2-1 = "Se-Sensei...?\nDesde quando você estava olhando...?"
10021-CVGroup_UIEventLobby_Idle3-1 = "Não, não olhe...\nEu não estou acostumada com esse tipo de coisa..."
10021-CVGroup_UIEventLobby_Idle4-1 = "Sobre aquilo... na-na verdade, não é nada...\nNão se preocupe."
