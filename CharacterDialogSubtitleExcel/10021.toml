[translation]
10021-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10021-CVGroup_CharacterGet_Idle1-1 = "白洲アズサ、目標地点の海に到着。\nすぐに予定の任務を始める。\n……別に浮かれてるとか、そういうわけじゃない。"
10021-CVGroup_Cafe_Idle1-1 = "意外と動きやすいし、悪くない……。"
10021-CVGroup_Cafe_Idle2-1 = "なんだか視線を感じるような……。"
10021-CVGroup_Cafe_Idle3-1 = "……ふふっ。"
10021-CVGroup_Cafe_Idle4-1 = "やっぱりこれ、可愛い……。"
10021-CVGroup_Cafe_Idle5-1 = "ちょっと疲れたかもしれない……。"
10021-CVGroup_WeaponGet_Idle1-1 = "ちょうどこういうのが欲しかったところだ、ありがとう。\n後悔はさせない。"
10021-CVGroup_UIEventLobby_Enter1-1 = "夏……海……。"
10021-CVGroup_UIEventLobby_Enter1-2 = "……ん？\nな、何でそんなにこっちを見てるんだ……。"
10021-CVGroup_UIEventLobby_Enter2-1 = "おかえり、先生。\nやるべきことがまだまだたくさんあるよ。"
10021-CVGroup_UIEventLobby_Idle1-1 = "この水着、可愛い……\nふふっ……。"
10021-CVGroup_UIEventLobby_Idle2-1 = "せ、先生……？\nいつから見てた……？"
10021-CVGroup_UIEventLobby_Idle3-1 = "み、見ないで……\nこういうの、慣れてないから……。"
10021-CVGroup_UIEventLobby_Idle4-1 = "その……や、やっぱり何でもない……\n気にしないで。"
