[translation]
10086-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10086-CVGroup_CharacterGet_Idle1-1 = "Souraki Hina, presidente do Comitê Disciplinar da Academia Gehenna.\nEu... experimentei o vestido que você escolheu para mim, Sensei.\nSerá que... combina comigo?"
10086-CVGroup_Cafe_Idle1-1 = "Não me sinto muito à vontade de vestido..."
10086-CVGroup_Cafe_Idle2-1 = "Eu queria sentar em algum lugar para praticar, mas..."
10086-CVGroup_Cafe_Idle3-1 = "Todo mundo está brilhando tanto."
10086-CVGroup_Cafe_Idle4-1 = "Ufa, estou um pouco cansada..."
10086-CVGroup_Cafe_Idle5-1 = "Como presidente do Comitê Disciplinar, preciso manter o foco."
10086-CVGroup_WeaponGet_Idle1-1 = "Isso é para mim... Obrigada, Sensei.\nAs palavras e a confiança que você sempre me dá.\nQuero retribuir essa sinceridade com a mesma honestidade.\nPor isso, por favor, continue olhando por mim até o fim."
10086-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo de volta, Sensei."
10086-CVGroup_UIEventLobby_Enter1-2 = "Deve estar sendo difícil por causa do Pandemonium, mas..."
10086-CVGroup_UIEventLobby_Enter1-3 = "Se puder, gostaria que me ajudasse."
10086-CVGroup_UIEventLobby_Enter2-1 = "Você chegou, Sensei."
10086-CVGroup_UIEventLobby_Enter2-2 = "Sinto muito por ter que pedir sua ajuda de novo."
10086-CVGroup_UIEventLobby_Enter2-3 = "...Não precisa se preocupar? Fufu, isso é bem a sua cara, Sensei."
10086-CVGroup_UIEventLobby_Enter3-1 = "Ainda continua, não é..."
10086-CVGroup_UIEventLobby_Enter3-2 = "Bem, se terminasse tão fácil, não seria o Pandemonium."
10086-CVGroup_UIEventLobby_Enter4-1 = "Já faz tanto tempo e ainda não acabou."
10086-CVGroup_UIEventLobby_Enter4-2 = "Não sei se chamo de gananciosos ou de insistentes..."
10086-CVGroup_UIEventLobby_Enter4-3 = "Bem, eu também não pretendo perder."
10086-CVGroup_UIEventLobby_Enter5-1 = "Finalmente acabou."
10086-CVGroup_UIEventLobby_Enter5-2 = "Aqueles dias agitados também chegam ao fim assim."
10086-CVGroup_UIEventLobby_Enter5-3 = "...Aconteceram tantas coisas."
10086-CVGroup_UIEventLobby_Enter5-4 = "Se você se divertiu, mesmo que um pouco, fico feliz. De verdade."
10086-CVGroup_UIEventLobby_Idle1-1 = "Sempre fico confusa toda vez que há problemas com o Pandemonium, mas..."
10086-CVGroup_UIEventLobby_Idle1-2 = "Desta vez, fico feliz que você esteja aqui, Sensei."
10086-CVGroup_UIEventLobby_Idle2-1 = "Uma festa repentina, logo agora..."
10086-CVGroup_UIEventLobby_Idle2-2 = "O que será que eles estão pensando?"
10086-CVGroup_UIEventLobby_Idle2-3 = "...Embora, mesmo em situações normais, eu nunca saiba o que eles pensam."
10086-CVGroup_UIEventLobby_Idle3-1 = "Não importa a situação,\no que o Comitê Disciplinar faz não muda."
10086-CVGroup_UIEventLobby_Idle3-2 = "É sempre assim."
10086-CVGroup_UIEventLobby_Idle4-1 = "Esse tipo de confusão é o dia a dia em Gehenna, sabe."
10086-CVGroup_UIEventLobby_Idle4-2 = "Hm? Gehenna... te assusta?"
10086-CVGroup_UIEventLobby_Idle4-3 = "A-acho que não é para tanto, mas..."
