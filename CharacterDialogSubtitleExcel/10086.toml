[translation]
10086-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10086-CVGroup_CharacterGet_Idle1-1 = "ゲヘナ学園所属、風紀委員長の空崎ヒナ。\nその……先生が選んでくれたドレスを着て、みたんだけど。\n似合って、るかな……？"
10086-CVGroup_Cafe_Idle1-1 = "ドレスだと、少し落ち着かない……。"
10086-CVGroup_Cafe_Idle2-1 = "どこかに座って、練習したいところだけど……。"
10086-CVGroup_Cafe_Idle3-1 = "みんなキラキラしてる。"
10086-CVGroup_Cafe_Idle4-1 = "ふぅ、なんだか少し疲れる……。"
10086-CVGroup_Cafe_Idle5-1 = "風紀委員長として、気を引き締めないと。"
10086-CVGroup_WeaponGet_Idle1-1 = "これを、私に……ありがとう。先生。\nいつもあなたが私にくれる言葉、信頼。\nそのまっすぐな心に、私もまっすぐに応えたい。\nだからどうか、最後まで見守ってて。"
10086-CVGroup_UIEventLobby_Enter1-1 = "おかえり、先生。"
10086-CVGroup_UIEventLobby_Enter1-2 = "万魔殿のせいで大変だろうけど……"
10086-CVGroup_UIEventLobby_Enter1-3 = "よかったら手伝ってほしい。"
10086-CVGroup_UIEventLobby_Enter2-1 = "来たわね、先生。"
10086-CVGroup_UIEventLobby_Enter2-2 = "またお願いすることになってしまって、ごめんなさい。"
10086-CVGroup_UIEventLobby_Enter2-3 = "……気にしなくていい？ふふ、先生らしいね。"
10086-CVGroup_UIEventLobby_Enter3-1 = "まだ続いているのね……。"
10086-CVGroup_UIEventLobby_Enter3-2 = "まあ、簡単に終わったら万魔殿じゃないか。"
10086-CVGroup_UIEventLobby_Enter4-1 = "こんなに続けてるのにまだ終わらないのね。"
10086-CVGroup_UIEventLobby_Enter4-2 = "意地汚いというか、貪欲というか……"
10086-CVGroup_UIEventLobby_Enter4-3 = "まあ、こっちも負けるつもりはないのだけど。"
10086-CVGroup_UIEventLobby_Enter5-1 = "ようやく終わったね。"
10086-CVGroup_UIEventLobby_Enter5-2 = "賑やかだったあの日々も、こうして幕を下ろす日がくる。"
10086-CVGroup_UIEventLobby_Enter5-3 = "……色んなことがあったけど。"
10086-CVGroup_UIEventLobby_Enter5-4 = "少しでも先生が楽しかったなら良かった、本当に。"
10086-CVGroup_UIEventLobby_Idle1-1 = "万魔殿とトラブルがあるたびに困惑させられるけど……"
10086-CVGroup_UIEventLobby_Idle1-2 = "今回は、先生がいてくれてよかった。"
10086-CVGroup_UIEventLobby_Idle2-1 = "突然のパーティーだなんて……"
10086-CVGroup_UIEventLobby_Idle2-2 = "本当に一体何を考えているのかしら。"
10086-CVGroup_UIEventLobby_Idle2-3 = "……普段も分かっているのかといったら、それはまた別なんだけど。"
10086-CVGroup_UIEventLobby_Idle3-1 = "どんな事態だろうと、\n風紀委員会がやることは変わらないわ。"
10086-CVGroup_UIEventLobby_Idle3-2 = "いつものことだから。"
10086-CVGroup_UIEventLobby_Idle4-1 = "こんな騒動、ゲヘナでは日常茶飯事なんだけどね。"
10086-CVGroup_UIEventLobby_Idle4-2 = "ん？ゲヘナが……怖い？"
10086-CVGroup_UIEventLobby_Idle4-3 = "そ、そこまでじゃない、と思うけど……"
