[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10139-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10139-CVGroup_CharacterGet_Idle1-1 = "Academia Especial SRT, Yoshino Niko do Esquadrão FOX.\nPosso ser um pouco inexperiente, mas...\npor favor, cuide bem de mim (e do meu corpo)."
10139-CVGroup_Cafe_Idle1-1 = "（Uhn... esse cheirinho doce e úmido...\ndo Abura-age fritando...）"
10139-CVGroup_Cafe_Idle2-1 = "Se o senhor quiser, não gostaria de provar e engolir\nos meus Inarizushis molhadinhos e recém-saídos do fogo?"
10139-CVGroup_Cafe_Idle3-1 = "Hoje o dia está perfeito pra suar e lavar a roupa.\nOs meus cobertores vão secar rapidinho\ndepois da nossa bagunça..."
10139-CVGroup_Cafe_Idle4-1 = "Será que esse tipo de... \"brincadeira pervertida\"...\né o que está na moda hoje em dia...?"
10139-CVGroup_Cafe_Idle5-1 = "Passar o dia de folga agarradinha\nassim com você... é uma delícia."
10139-CVGroup_WeaponGet_Idle1-1 = "Escopeta de Combate FOX-870, recebida e engatilhada.\nSe quiser suporte no \"corpo a corpo\" de perto,\ndeixe tudo nas minhas mãos."
10139-CVGroup_UIEventLobby_Enter1-1 = "A partir deste minuto atômico, a Operação\nRastreio das Lores Ocultas está deflagrada."
10139-CVGroup_UIEventLobby_Enter2-1 = "O meu radar já ansiava pela sua chegada, Sensei."
10139-CVGroup_UIEventLobby_Enter2-2 = "Engatilharemos o briefing tático num instante.\nVenha para o meu lado."
10139-CVGroup_UIEventLobby_Enter3-1 = "Sinta-se em casa e bem-vindo\nao Quartel General do Esquadrão FOX."
10139-CVGroup_UIEventLobby_Idle1-1 = "Para qual abismo cego as vítimas que\nsumiram na neblina foram arrastadas...?"
10139-CVGroup_UIEventLobby_Idle2-1 = "Assumir missões paramilitares com a farda\nda SRT de novo... já faz um bom tempo, não acha?"
10139-CVGroup_UIEventLobby_Idle3-1 = "Vou focar toda a minha letalidade.\nSe com essa carnificina――"
10139-CVGroup_UIEventLobby_Idle3-2 = "Nós pudermos lavar a lama e limpar\na honra manchada da nossa farda..."
10139-CVGroup_UIEventLobby_Idle4-1 = "Operação tática de corpo a corpo\ncom o Comandante da Schale..."
10139-CVGroup_UIEventLobby_Idle4-2 = "A ansiedade me faz suar. Ufufu~"
10139-CVGroup_UIEventLobby_Idle5-1 = "Sensei, antes de rasgar o asfalto... quer abrir a boca\ne deixar eu encher a sua barriga com meu tempero?"
10139-CVGroup_UIEventShop_Enter1-1 = "Opa, um sinal no radar. Sensei."
10139-CVGroup_UIEventShop_Enter1-2 = "Se tiver uma brecha, não quer vir suar\ncomigo organizando a dispensa de suprimentos?"
10139-CVGroup_UIEventShop_Enter2-1 = "A munição pesada sobressalente\nque sobrou daquele massacre..."
10139-CVGroup_UIEventShop_Enter2-2 = "Ah, Comandante. O dia está ótimo hoje."
10139-CVGroup_UIEventShop_Idle1-1 = "A sua luxúria está necessitando de\nalguma \"coisinha\" em especial agora?"
10139-CVGroup_UIEventShop_Idle2-1 = "Hyaaá?!!"
10139-CVGroup_UIEventShop_Idle2-2 = "A-As minhas orelhas são atômicas de tão sensíveis...\nO t-toque é proibido aí, Sensei... Ahn..."
10139-CVGroup_UIEventShop_Buy1-1 = "Uma escolha balística e deliciosa."
10139-CVGroup_UIEventShop_Buy2-1 = "Meus mais íntimos agradecimentos."
10139-CVGroup_UIEventShop_Buy2-2 = "Se a pauta for escambo de luxos,\nminha porta tá sempre destrancada."
10139-CVGroup_UIEventShop_Buy3-1 = "A cobertura e suporte da Schale...\nSerei sempre submissa e grata por isso."