[translation]
10139-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10139-CVGroup_CharacterGet_Idle1-1 = "I'm Yoshino Niko of SRT Academy's FOX Platoon. \nI may be inexperienced, but I look forward to working with you."
10139-CVGroup_Cafe_Idle1-1 = "(That... delicious smell of fried tofu...)"
10139-CVGroup_Cafe_Idle2-1 = "If you'd like, would you care to have some\nfreshly made inari sushi?"
10139-CVGroup_Cafe_Idle3-1 = "It's a great day for laundry. The blankets should dry nicely."
10139-CVGroup_Cafe_Idle4-1 = "I wonder if this sort of thing is popular lately...?"
10139-CVGroup_Cafe_Idle5-1 = "Spending a day off like this... it's quite nice."
10139-CVGroup_WeaponGet_Idle1-1 = "FOX-870 shotgun, received. \nPlease leave the close-quarters support to me."
10139-CVGroup_UIEventLobby_Enter1-1 = "We are now commencing the Roa tracking operation."
10139-CVGroup_UIEventLobby_Enter2-1 = "I've been waiting for you, Sensei."
10139-CVGroup_UIEventLobby_Enter2-2 = "Let's begin the briefing immediately. This way."
10139-CVGroup_UIEventLobby_Enter3-1 = "Welcome to the FOX Platoon command center."
10139-CVGroup_UIEventLobby_Idle1-1 = "I wonder where those who disappeared could have gone..."
10139-CVGroup_UIEventLobby_Idle2-1 = "It's been a while since we've taken on a mission as SRT."
10139-CVGroup_UIEventLobby_Idle3-1 = "I will give it my all.\nIf this is what it takes to—"
10139-CVGroup_UIEventLobby_Idle3-2 = "—clear our names..."
10139-CVGroup_UIEventLobby_Idle4-1 = "A joint operation with Schale..."
10139-CVGroup_UIEventLobby_Idle4-2 = "I'm looking forward to it. Hehe."
10139-CVGroup_UIEventLobby_Idle5-1 = "Sensei, would you like to grab a bite to eat before the operation?"
10139-CVGroup_UIEventShop_Enter1-1 = "Oh, Sensei."
10139-CVGroup_UIEventShop_Enter1-2 = "If you don't mind, could you help me organize these supplies?"
10139-CVGroup_UIEventShop_Enter2-1 = "The ammunition left over from the previous operation is..."
10139-CVGroup_UIEventShop_Enter2-2 = "Oh, hello, Sensei."
10139-CVGroup_UIEventShop_Idle1-1 = "Is there anything you need?"
10139-CVGroup_UIEventShop_Idle2-1 = "Eek!?"
10139-CVGroup_UIEventShop_Idle2-2 = "M-my ears are sensitive... please, don't touch them..."
10139-CVGroup_UIEventShop_Buy1-1 = "I think that's a good choice."
10139-CVGroup_UIEventShop_Buy2-1 = "Thank you very much."
10139-CVGroup_UIEventShop_Buy2-2 = "If you need to exchange supplies, I'm always here."
10139-CVGroup_UIEventShop_Buy3-1 = "Thank you for your continued support of Schale."