[translation]
10139-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10139-CVGroup_CharacterGet_Idle1-1 = "SRT特殊学園、FOX小隊の吉野ニコです。 \n不束者ではありますが、どうぞよろしくお願いします。"
10139-CVGroup_Cafe_Idle1-1 = "（油揚げの……いい匂い……）"
10139-CVGroup_Cafe_Idle2-1 = "よかったら、できたてのおいなりさん\n食べていきませんか？"
10139-CVGroup_Cafe_Idle3-1 = "今日は洗濯日和だね。毛布がよく乾きそう。"
10139-CVGroup_Cafe_Idle4-1 = "最近はこういうのが流行っているのかな……？"
10139-CVGroup_Cafe_Idle5-1 = "こういう休日の過ごし方、良いかも……。"
10139-CVGroup_WeaponGet_Idle1-1 = "FOX-870式ショットガン、たしかに受領しました。\n近接支援は、私にお任せください。"
10139-CVGroup_UIEventLobby_Enter1-1 = "これより、ロア追跡作戦を開始します。"
10139-CVGroup_UIEventLobby_Enter2-1 = "お待ちしていました、先生。"
10139-CVGroup_UIEventLobby_Enter2-2 = "すぐにブリーフィングを始めます。こちらへ。"
10139-CVGroup_UIEventLobby_Enter3-1 = "ようこそ、FOX小隊の作戦本部へ。"
10139-CVGroup_UIEventLobby_Idle1-1 = "消えた方々は、どこに行ってしまったんでしょう……。"
10139-CVGroup_UIEventLobby_Idle2-1 = "SRTとして任務を受けるのは、久しぶりですね。"
10139-CVGroup_UIEventLobby_Idle3-1 = "全力で臨みます。\nこれで――"
10139-CVGroup_UIEventLobby_Idle3-2 = "私たちの汚名をそそぐことができるなら……。"
10139-CVGroup_UIEventLobby_Idle4-1 = "シャーレとの合同作戦……。"
10139-CVGroup_UIEventLobby_Idle4-2 = "楽しみですね。ふふっ。"
10139-CVGroup_UIEventLobby_Idle5-1 = "先生、作戦前に腹ごしらえはいかがですか？"
10139-CVGroup_UIEventShop_Enter1-1 = "あっ、先生。"
10139-CVGroup_UIEventShop_Enter1-2 = "もしよかったら、物資の片づけを手伝っていただけませんか？"
10139-CVGroup_UIEventShop_Enter2-1 = "前の作戦で余った弾薬は……。"
10139-CVGroup_UIEventShop_Enter2-2 = "あ、先生。こんにちは。"
10139-CVGroup_UIEventShop_Idle1-1 = "何か、ご入用のものはありますか？"
10139-CVGroup_UIEventShop_Idle2-1 = "ひゃっ！？"
10139-CVGroup_UIEventShop_Idle2-2 = "み、耳は敏感で……触っちゃ、ダメです……。"
10139-CVGroup_UIEventShop_Buy1-1 = "良い選択だと思います。"
10139-CVGroup_UIEventShop_Buy2-1 = "ありがとうございます。"
10139-CVGroup_UIEventShop_Buy2-2 = "物資の交換でしたら、いつでも。"
10139-CVGroup_UIEventShop_Buy3-1 = "シャーレの支援……いつもありがとうございます。"
