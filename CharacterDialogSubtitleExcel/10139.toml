[translation]
10139-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10139-CVGroup_CharacterGet_Idle1-1 = "Da Academia SRT, do FOX Squad, eu sou Yoshino Niko. \nEmbora eu ainda seja inexperiente, conto com o seu apoio."
10139-CVGroup_Cafe_Idle1-1 = "(Que cheiro bom... de tofu frito...)"
10139-CVGroup_Cafe_Idle2-1 = "Se quiser, gostaria de comer um inari-zushi\nacabado de fazer?"
10139-CVGroup_Cafe_Idle3-1 = "Hoje é um ótimo dia para lavar roupa. Os cobertores vão secar rapidinho."
10139-CVGroup_Cafe_Idle4-1 = "Será que esse tipo de coisa está na moda ultimamente...?"
10139-CVGroup_Cafe_Idle5-1 = "Passar o dia de folga assim... talvez seja bom."
10139-CVGroup_WeaponGet_Idle1-1 = "Espingarda modelo FOX-870, recebida com sucesso.\nPode deixar o suporte de curto alcance comigo."
10139-CVGroup_UIEventLobby_Enter1-1 = "A partir de agora, iniciaremos a operação de rastreamento de Roa."
10139-CVGroup_UIEventLobby_Enter2-1 = "Eu estava esperando por você, Sensei."
10139-CVGroup_UIEventLobby_Enter2-2 = "Vamos começar o briefing imediatamente. Por aqui."
10139-CVGroup_UIEventLobby_Enter3-1 = "Bem-vindo ao quartel-general do FOX Squad."
10139-CVGroup_UIEventLobby_Idle1-1 = "Para onde será que as pessoas que desapareceram foram...?"
10139-CVGroup_UIEventLobby_Idle2-1 = "Faz tempo que não recebemos uma missão como SRT, não é?"
10139-CVGroup_UIEventLobby_Idle3-1 = "Vou dar o meu melhor.\nSe isso for o suficiente para..."
10139-CVGroup_UIEventLobby_Idle3-2 = "limpar o nosso nome..."
10139-CVGroup_UIEventLobby_Idle4-1 = "Uma operação conjunta com o Schale..."
10139-CVGroup_UIEventLobby_Idle4-2 = "Estou ansiosa. Fufu."
10139-CVGroup_UIEventLobby_Idle5-1 = "Sensei, que tal comer algo antes da operação?"
10139-CVGroup_UIEventShop_Enter1-1 = "Ah, Sensei."
10139-CVGroup_UIEventShop_Enter1-2 = "Se não for incômodo, poderia me ajudar a organizar os suprimentos?"
10139-CVGroup_UIEventShop_Enter2-1 = "As munições que sobraram da última operação..."
10139-CVGroup_UIEventShop_Enter2-2 = "Ah, Sensei. Olá."
10139-CVGroup_UIEventShop_Idle1-1 = "Precisa de alguma coisa?"
10139-CVGroup_UIEventShop_Idle2-1 = "Hya!?"
10139-CVGroup_UIEventShop_Idle2-2 = "M-minhas orelhas são sensíveis... não pode tocar nelas..."
10139-CVGroup_UIEventShop_Buy1-1 = "Acho que é uma boa escolha."
10139-CVGroup_UIEventShop_Buy2-1 = "Muito obrigada."
10139-CVGroup_UIEventShop_Buy2-2 = "Se precisar trocar suprimentos, estou à disposição."
10139-CVGroup_UIEventShop_Buy3-1 = "O apoio do Schale... muito obrigada, como sempre."
