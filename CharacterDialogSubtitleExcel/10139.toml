[translation]
10139-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10139-CVGroup_CharacterGet_Idle1-1 = "Я Йошино Нико из отряда FOX Особой академии SRT. \\nВозможно, мне ещё не хватает опыта, но я с нетерпением жду возможности поработать с вами."
10139-CVGroup_Cafe_Idle1-1 = "(Этот... восхитительный запах жареного тофу...)"
10139-CVGroup_Cafe_Idle2-1 = " Если не возражаете, не хотите ли угоститься\nсвежеприготовленными инари-суши?"
10139-CVGroup_Cafe_Idle3-1 = "Отличный день для стирки. Одеяла должны хорошо высохнуть."
10139-CVGroup_Cafe_Idle4-1 = "Интересно... \\nподобные вещи \\nсейчас популярны?"
10139-CVGroup_Cafe_Idle5-1 = "Провести вот так свой выходной... весьма приятно."
10139-CVGroup_WeaponGet_Idle1-1 = "Дробовик FOX-870 получен.\nПожалуйста, предоставьте огневую поддержку в ближнем бою мне."
10139-CVGroup_UIEventLobby_Enter1-1 = "Мы начинаем операцию по выслеживанию Роа."
10139-CVGroup_UIEventLobby_Enter2-1 = "Я ждала вас, Сенсей."
10139-CVGroup_UIEventLobby_Enter2-2 = "Давайте немедленно начнём инструктаж. Сюда, пожалуйста."
10139-CVGroup_UIEventLobby_Enter3-1 = "Добро пожаловать в командный центр отряда FOX."
10139-CVGroup_UIEventLobby_Idle1-1 = "Интересно, куда могли направиться те, кто исчез..."
10139-CVGroup_UIEventLobby_Idle2-1 = "Прошло немало времени с тех пор, как мы в последний раз выполняли миссию в качестве оперативников SRT."
10139-CVGroup_UIEventLobby_Idle3-1 = "Я сделаю всё, что в моих силах.\nЕсли это поможет нам—"
10139-CVGroup_UIEventLobby_Idle3-2 = "—очистить наши имена..."
10139-CVGroup_UIEventLobby_Idle4-1 = "Совместная операция с Шале..."
10139-CVGroup_UIEventLobby_Idle4-2 = "Я с нетерпением жду её.\\nХе-хе."
10139-CVGroup_UIEventLobby_Idle5-1 = "Сенсей, не хотите ли вы\\nперекусить\\nперед началом операции?"
10139-CVGroup_UIEventShop_Enter1-1 = "О, Сенсей."
10139-CVGroup_UIEventShop_Enter1-2 = "Если вы не против,\\nне могли бы вы помочь мне\\nразобрать эти припасы?"
10139-CVGroup_UIEventShop_Enter2-1 = "Боеприпасы, оставшиеся с прошлой операции..."
10139-CVGroup_UIEventShop_Enter2-2 = " О, здравствуйте, Сенсей."
10139-CVGroup_UIEventShop_Idle1-1 = "Вам что-нибудь нужно?"
10139-CVGroup_UIEventShop_Idle2-1 = "Ой!?"
10139-CVGroup_UIEventShop_Idle2-2 = "М-мои уши очень чувствительны... пожалуйста, не трогайте их..."
10139-CVGroup_UIEventShop_Buy1-1 = "Думаю, это отличный выбор."
10139-CVGroup_UIEventShop_Buy2-1 = "Большое вам спасибо."
10139-CVGroup_UIEventShop_Buy2-2 = "Если вам понадобится обменять припасы, я всегда к вашим услугам."
10139-CVGroup_UIEventShop_Buy3-1 = "Спасибо за вашу постоянную поддержку Шале."
