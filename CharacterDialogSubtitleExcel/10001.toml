[translation]
10001-CVGroup_UIEventMission_Enter1-1 = "帰ってきたんだね、先生。\nまた会えてうれしい。"
10001-CVGroup_UIEventMission_Enter2-1 = "はう……眠い……。"
10001-CVGroup_UIEventMission_Idle1-1 = "この服……寒くないかって？"
10001-CVGroup_UIEventMission_Idle1-2 = "んー、風通しがいいから私は好きだよ。"
10001-CVGroup_UIEventMission_Idle2-1 = "この服は涼しいけど、\n薬莢がよく服の中に入ってくるから……"
10001-CVGroup_UIEventMission_Idle2-2 = "困る。"
10001-CVGroup_UIEventMission_Buy1-1 = "思ってたより……早く終わった。"
10001-CVGroup_UIEventMission_Buy2-1 = "証明完了。"
10001-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10001-CVGroup_CharacterGet_Idle1-1 = "今から何をすればいい？\n教えて、先生。"
10001-CVGroup_Cafe_Idle1-1 = "何でだろう。\nなんか、ときめいた。"
10001-CVGroup_Cafe_Idle2-1 = "最近はこういうのが流行なんだ。"
10001-CVGroup_Cafe_Idle3-1 = "ふーん……。"
10001-CVGroup_Cafe_Idle4-1 = "ここでなら服を脱いでも……ダメ？"
10001-CVGroup_Cafe_Idle5-1 = "美しい空間だね。\n実はよく分かってないけど。"
10001-CVGroup_WeaponGet_Idle1-1 = "初心者にも使いやすい……\n多目的戦術施行道具。"
