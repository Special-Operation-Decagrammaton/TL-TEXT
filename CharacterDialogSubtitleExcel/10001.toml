[translation]
10001-CVGroup_UIEventMission_Enter1-1 = "Você voltou, Sensei.\nEstou feliz por nos encontrarmos de novo."
10001-CVGroup_UIEventMission_Enter2-1 = "Hau... estou com sono..."
10001-CVGroup_UIEventMission_Idle1-1 = "Sobre esta roupa... se eu não sinto frio?"
10001-CVGroup_UIEventMission_Idle1-2 = "Hmm, é bem ventilada, então eu gosto."
10001-CVGroup_UIEventMission_Idle2-1 = "Esta roupa é fresca, mas\ncomo os cartuchos entram nela com frequência..."
10001-CVGroup_UIEventMission_Idle2-2 = "É um problema."
10001-CVGroup_UIEventMission_Buy1-1 = "Terminou... mais rápido do que eu pensava."
10001-CVGroup_UIEventMission_Buy2-1 = "Prova concluída."
10001-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10001-CVGroup_CharacterGet_Idle1-1 = "O que devo fazer agora?\nMe ensine, Sensei."
10001-CVGroup_Cafe_Idle1-1 = "Por que será?\nSenti um frio na barriga."
10001-CVGroup_Cafe_Idle2-1 = "Ultimamente, esse tipo de coisa está na moda."
10001-CVGroup_Cafe_Idle3-1 = "Hmm..."
10001-CVGroup_Cafe_Idle4-1 = "Se for aqui, posso tirar a roupa... não pode?"
10001-CVGroup_Cafe_Idle5-1 = "É um espaço lindo.\nEmbora, na verdade, eu não entenda muito bem."
10001-CVGroup_WeaponGet_Idle1-1 = "Fácil de usar até para iniciantes...\nUma ferramenta de execução tática multiuso."
