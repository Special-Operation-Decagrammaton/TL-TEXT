[translation]
16001-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16001-CVGroup_CharacterGet_Idle1-1 = "Junto com o mestre!\nVamos começar um dia divertido!"
16001-CVGroup_Cafe_Idle1-1 = "Hmm... minhas roupas estão tão apertadas.\nSerá que engordei? Ou será que de novo...?"
16001-CVGroup_Cafe_Idle2-1 = "Que tédio~\nSerá que não tem nenhum mangá por aqui?"
16001-CVGroup_Cafe_Idle3-1 = "Run run run~♪"
16001-CVGroup_Cafe_Idle4-1 = "Ran la la~n, sinto que hoje algo bom vai acontecer~\nVocê não acha, mestre?"
16001-CVGroup_Cafe_Idle5-1 = "Bem-vindo, mestre~\nEu vou te animar!"
16001-CVGroup_Cafe_Idle6-1 = "Ah! É o mestre!\nQuer comer? Quer um banho?\nOu talvez... ehehe!"
16001-CVGroup_WeaponGet_Idle1-1 = "Mestre! Olha só! Uma arma nova chegou!\nEla é brilhante e fofa, não é?!"
