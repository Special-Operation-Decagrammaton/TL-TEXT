[translation]
16001-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
16001-CVGroup_CharacterGet_Idle1-1 = "ご主人様と一緒に！\n楽しい一日を始めちゃおう！"
16001-CVGroup_Cafe_Idle1-1 = "うーん……服がピッチピチ。\n太ったかな？それともまた……？"
16001-CVGroup_Cafe_Idle2-1 = "暇だなぁ～\n何か漫画とかないかな～？"
16001-CVGroup_Cafe_Idle3-1 = "るんるんるん～♪"
16001-CVGroup_Cafe_Idle4-1 = "らんらら～ん、今日はなんだか良いことがありそうな予感～\nご主人様もそうでしょ？"
16001-CVGroup_Cafe_Idle5-1 = "ご主人様、ようこそ～\n私が元気づけてあげる！"
16001-CVGroup_Cafe_Idle6-1 = "あっ！ご主人様だ！\n食事～？お風呂～？\nそれとも……えへへ！"
16001-CVGroup_WeaponGet_Idle1-1 = "ご主人様！見て見て！新しい武器が届いたの！\nキラキラしてて可愛いでしょ？！"
