[translation]
10044-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10044-CVGroup_CharacterGet_Idle1-1 = "ようやく海に到着です～！\nさあ先生、たっくさん遊びましょうね！"
10044-CVGroup_Cafe_Idle1-1 = "みんなが楽しそうで良かったです～"
10044-CVGroup_Cafe_Idle2-1 = "あら？あれは……？"
10044-CVGroup_Cafe_Idle3-1 = "人がたくさんですね～。"
10044-CVGroup_Cafe_Idle4-1 = "ちょっと座って休みましょうか？"
10044-CVGroup_Cafe_Idle5-1 = "ここは涼しくて良いですね～"
10044-CVGroup_WeaponGet_Idle1-1 = "わぁ、ありがとうございます～！\n先生への感謝を、たっぷり込めて……\nこれでさらに先生のお役にたてるよう、頑張りますね！"
10044-CVGroup_UIEventLobby_Enter1-1 = "私たちのリゾートにようこそ～、"
10044-CVGroup_UIEventLobby_Enter1-2 = "なんて☆"
10044-CVGroup_UIEventLobby_Enter2-1 = "夏、海、紛れもないリゾート地ですよ～！"
10044-CVGroup_UIEventLobby_Idle1-1 = "はーい☆先生、私のこと呼びました？"
10044-CVGroup_UIEventLobby_Idle2-1 = "少し暑いですね～。\n先生は体調、大丈夫ですか？"
10044-CVGroup_UIEventLobby_Idle3-1 = "ふふっ、何だか楽しくなってきました。"
10044-CVGroup_UIEventLobby_Idle4-1 = "こうして汗をかくのも、たまには良いですね☆"
10044-CVGroup_UIEventLobby_Enter3-1 = "そろそろ身体も温まってきましたね～？"
10044-CVGroup_UIEventLobby_Enter4-1 = "まだまだ元気よく行きましょう～！"
10044-CVGroup_UIEventLobby_Enter5-1 = "満足満足です～、"
10044-CVGroup_UIEventLobby_Enter5-2 = "先生も楽しめましたか？"
10044-CVGroup_UIEventBoxGachaShop_Enter1-1 = "じゃーん！\nいらっしゃいませ～☆"
10044-CVGroup_UIEventBoxGachaShop_Enter1-2 = "……なんて。\nふふっ、はしゃぎすぎでしょうか？"
10044-CVGroup_UIEventBoxGachaShop_Enter2-1 = "ふふっ……\n何が出るでしょう～？"
10044-CVGroup_UIEventBoxGachaShop_Idle1-1 = "躊躇ってると、\n私が代わりに引いちゃいますよ～？"
10044-CVGroup_UIEventBoxGachaShop_Idle2-1 = "あははっ！\n先生、くすぐったいですよ～"
10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "おお～！さすがは先生です☆"
10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "わ、すごいです！\n先生、もう一回引いてみてください！"
10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "これは多分、すごいもの……！ですかね？"
10044-CVGroup_UIEventBoxGachaShop_Enter3-1 = "整理整頓のお時間ですよ～☆"
