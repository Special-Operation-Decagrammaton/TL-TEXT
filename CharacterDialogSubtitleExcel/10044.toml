[translation]
10044-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10044-CVGroup_CharacterGet_Idle1-1 = "Finalmente chegamos ao mar~! \nVamos lá, Sensei, vamos nos divertir muito!"
10044-CVGroup_Cafe_Idle1-1 = "Fico feliz que todos estejam se divertindo~"
10044-CVGroup_Cafe_Idle2-1 = "Oh? O que é aquilo...?"
10044-CVGroup_Cafe_Idle3-1 = "Tem muita gente aqui, né~."
10044-CVGroup_Cafe_Idle4-1 = "Que tal sentarmos um pouco para descansar?"
10044-CVGroup_Cafe_Idle5-1 = "Aqui é fresco e agradável, não é~"
10044-CVGroup_WeaponGet_Idle1-1 = "Uau, muito obrigada~! \nColoquei toda a minha gratidão por você, Sensei... \nVou me esforçar para ser ainda mais útil para você com isso!"
10044-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo ao nosso resort~,"
10044-CVGroup_UIEventLobby_Enter1-2 = "é o que eu diria☆"
10044-CVGroup_UIEventLobby_Enter2-1 = "Verão, mar, é um resort sem dúvida alguma~!"
10044-CVGroup_UIEventLobby_Idle1-1 = "Sim☆ Sensei, você me chamou?"
10044-CVGroup_UIEventLobby_Idle2-1 = "Está um pouco quente, né~. \nVocê está se sentindo bem, Sensei?"
10044-CVGroup_UIEventLobby_Idle3-1 = "Fufu, de repente comecei a me divertir."
10044-CVGroup_UIEventLobby_Idle4-1 = "Suar um pouco assim também é bom de vez em quando☆"
10044-CVGroup_UIEventLobby_Enter3-1 = "O corpo já começou a esquentar, né~?"
10044-CVGroup_UIEventLobby_Enter4-1 = "Vamos continuar com bastante energia~!"
10044-CVGroup_UIEventLobby_Enter5-1 = "Estou satisfeita, muito satisfeita~,"
10044-CVGroup_UIEventLobby_Enter5-2 = "você também se divertiu, Sensei?"
10044-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Tcharam! \nBem-vindo~☆"
10044-CVGroup_UIEventBoxGachaShop_Enter1-2 = "...é o que eu diria. \nFufu, será que estou animada demais?"
10044-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Fufu... \nO que será que vai sair~?"
10044-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Se você hesitar, \neu vou girar no seu lugar, viu~?"
10044-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Ahaha! \nSensei, isso faz cócegas~"
10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Oh~! Como esperado do Sensei☆"
10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Uau, incrível! \nSensei, tente girar mais uma vez!"
10044-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Isso provavelmente é algo... incrível, né?"
10044-CVGroup_UIEventBoxGachaShop_Enter3-1 = "É hora de organizar tudo~☆"
