[translation]
16019-CVGroup_UITitle_Idle1-1 = "Blue Archive."
16019-CVGroup_CharacterGet_Idle1-1 = "Empregada perfeita, agente perfeita.\nSou Asuma Toki.\nPode ficar tranquilo e deixar tudo comigo."
16019-CVGroup_Cafe_Idle1-1 = "O descanso é importante. Acho que quatro dias de folga por semana seria o ideal."
16019-CVGroup_Cafe_Idle2-1 = "Não há um lugar onde eu possa descansar o corpo?"
16019-CVGroup_Cafe_Idle3-1 = "Cafeína e açúcar são indispensáveis."
16019-CVGroup_Cafe_Idle4-1 = "A receita deste café é... aceitável."
16019-CVGroup_Cafe_Idle5-1 = "Vamos descansar para a próxima missão."
16019-CVGroup_WeaponGet_Idle1-1 = "Mudar de arma exige uma decisão corajosa.\nÉ um evento tão importante quanto trocar o café da manhã de torrada para panqueca.\nMas, se foi um presente do Sensei... a história muda."
16019-CVGroup_UICarrierLobby_Enter1-1 = "Aceite um chá de camomila."
16019-CVGroup_UICarrierLobby_Enter1-2 = "Dizem que ajuda a aliviar a tensão."
16019-CVGroup_UICarrierLobby_Enter2-1 = "Para mim, basta que o Sensei veja o meu desempenho."
16019-CVGroup_UICarrierLobby_Enter3-1 = "Estou entediada. Brinque comigo."
16019-CVGroup_UICarrierLobby_Enter4-1 = "Recentemente, arranjei um hobby (provisório)."
16019-CVGroup_UICarrierLobby_Enter5-1 = "Reconhecimento? Quais são as ordens?"
16019-CVGroup_UICarrierLobby_Idle1-1 = "Como uma empregada perfeita e a melhor agente."
16019-CVGroup_UICarrierLobby_Idle1-2 = "Se houver algo em que eu possa ajudar, por favor, me diga."
16019-CVGroup_UICarrierLobby_Idle2-1 = "Graças ao traje leve, agora consigo me mover com mais agilidade."
16019-CVGroup_UICarrierLobby_Idle3-1 = "Deveria ter trazido mais mangás."
16019-CVGroup_UICarrierLobby_Idle4-1 = "Tem uma transmissão arquivada."
16019-CVGroup_UICarrierLobby_Idle4-2 = "Quer assistir comigo?"
16019-CVGroup_UICarrierLobby_Idle5-1 = "Eu me esforço nas missões por causa de todos vocês."
16019-CVGroup_UICarrierLobby_Idle5-2 = "...E, ao mesmo tempo, para ser elogiada."
16019-CVGroup_UIEventShop_Enter1-1 = "Bem-vindo à loja da Asuma Toki."
16019-CVGroup_UIEventShop_Enter1-2 = "...Mentira. É a loja de todos."
16019-CVGroup_UIEventShop_Enter2-1 = "Não consegui preparar muitos itens, mas..."
16019-CVGroup_UIEventShop_Enter2-2 = "Espero que sejam úteis para o Sensei."
16019-CVGroup_UIEventShop_Enter3-1 = "Sou Asuma Toki. Cumprimento-o através da tela."
16019-CVGroup_UIEventShop_Enter3-2 = "Deveria ir pessoalmente, mas devido a uma emergência, peço desculpas por falar via comunicação."
16019-CVGroup_UIEventShop_Enter4-1 = "Mesmo em situações de emergência, a loja da Asuma Toki continua aberta."
16019-CVGroup_UIEventShop_Idle1-1 = "Sim, Sensei. Estou aqui."
16019-CVGroup_UIEventShop_Idle1-2 = "Não vou fugir nem me esconder—"
16019-CVGroup_UIEventShop_Idle1-3 = "Não... se eu desaparecesse,\no Sensei me procuraria desesperadamente?"
16019-CVGroup_UIEventShop_Idle2-1 = "O que acha?"
16019-CVGroup_UIEventShop_Idle2-2 = "Retenção de calor, estabilidade e um efeito relaxante para o corpo e a mente—"
16019-CVGroup_UIEventShop_Idle2-3 = "É um traje de combate excelente, assim como eu."
16019-CVGroup_UIEventShop_Idle2-4 = "Sensei, vamos verificar as funções do traje comigo."
16019-CVGroup_UIEventShop_Idle2-5 = "Pode ficar grudado em mim o quanto quiser, não se acanhe."
16019-CVGroup_UIEventShop_Idle3-1 = "Espere um momento."
16019-CVGroup_UIEventShop_Idle3-2 = "Com a memória de uma empregada perfeita, vou me lembrar de onde está o estoque."
16019-CVGroup_UIEventShop_Idle4-1 = "Estou atendendo online por necessidade, mas isso não atrapalha as vendas."
16019-CVGroup_UIEventShop_Idle4-2 = "A melhor agente não escolhe onde atuar."
16019-CVGroup_UIEventShop_Buy1-1 = "Obrigada pela compra."
16019-CVGroup_UIEventShop_Buy1-2 = "Aliás, se você me pedir, eu também posso comprar."
16019-CVGroup_UIEventShop_Buy2-1 = "Entendido, esse é o produto que deseja."
16019-CVGroup_UIEventShop_Buy2-2 = "Enquanto aguardamos a reposição, quer brincar comigo?"
16019-CVGroup_UIEventShop_Buy3-1 = "Então você gosta desse tipo de coisa, entendi."
16019-CVGroup_UIEventShop_Buy4-1 = "Sim, aqui está.\nEspero vê-lo novamente."
16019-CVGroup_UIEventShop_Buy4-2 = "Venha me ver quantas vezes quiser."
16019-CVGroup_UIEventShop_Buy5-1 = "Sim, acho uma boa escolha."
16019-CVGroup_UIEventShop_Buy6-1 = "Por favor, pegue esse produto na prateleira de trás."
16019-CVGroup_UIEventShop_Buy7-1 = "Caso tenha comprado por engano, é possível fazer a devolução."
16019-CVGroup_UIEventShop_Buy7-2 = "……Desculpe. Não é possível."
16019-CVGroup_UIEventShop_Buy8-1 = "Se desejar, posso incluir um vale para uma chamada comigo como brinde."
16019-CVGroup_UIEventShop_Buy8-2 = "Claro, você deseja, não é?"
