[translation]
20001-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20001-CVGroup_CharacterGet_Idle1-1 = "元々私の主はミレニアムそのものだけど、\n今日だけは……先生がご主人様だ。"
20001-CVGroup_Cafe_Idle1-1 = "数学の勉強をしなきゃいけない。\nはあ。数字はうんざりだ。"
20001-CVGroup_Cafe_Idle2-1 = "綺麗な場所だ……。\n私もいつかおしゃれな……\nあっ？き、聞いてた！？"
20001-CVGroup_Cafe_Idle3-1 = "たまには休憩も大事。"
20001-CVGroup_Cafe_Idle4-1 = "可愛いもの？好きだよ。\nそれも、すごく。\n何か問題が？"
20001-CVGroup_Cafe_Idle5-1 = "ネル先輩やアスナ先輩はいつも先頭に立つから。\n私？彼女たちの背後を守るのが私の役割。"
20001-CVGroup_WeaponGet_Idle1-1 = "戦争の勝率は、武器の発展具合に比例するもの。\n先生、これからの私の活躍を期待してて。"
