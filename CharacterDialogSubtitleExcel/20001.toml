[translation]
20001-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20001-CVGroup_CharacterGet_Idle1-1 = "Originalmente, minha mestra é a própria Millennium, mas\nsó por hoje... você é meu mestre, Sensei."
20001-CVGroup_Cafe_Idle1-1 = "Preciso estudar matemática.\nAh. Estou farta de números."
20001-CVGroup_Cafe_Idle2-1 = "Que lugar bonito...\nEu também, um dia, algo elegante...\nAh? V-você estava ouvindo!?"
20001-CVGroup_Cafe_Idle3-1 = "Às vezes, descansar também é importante."
20001-CVGroup_Cafe_Idle4-1 = "Coisas fofas? Eu gosto.\nE muito, por sinal.\nAlgum problema com isso?"
20001-CVGroup_Cafe_Idle5-1 = "A Neru-senpai e a Asuna-senpai estão sempre na linha de frente.\nEu? Meu papel é proteger as costas delas."
20001-CVGroup_WeaponGet_Idle1-1 = "A taxa de vitória em uma guerra é proporcional ao desenvolvimento das armas.\nSensei, espere pelo meu desempenho daqui em diante."
