[translation]
20010-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20010-CVGroup_CharacterGet_Idle1-1 = "227号温泉郷へようこそおいでくださいました、先生。\nこのノドカ、温泉郷の女将として真心を込めておもてなしさせていただきます。"
20010-CVGroup_Cafe_Idle1-1 = "227号温泉郷にも、こういった家具があると良さそうですね。"
20010-CVGroup_Cafe_Idle2-1 = "このカフェはいつもにぎやかで……\n秘訣は何なのでしょうか？"
20010-CVGroup_Cafe_Idle3-1 = "うぉぉ……高そうな物が……。"
20010-CVGroup_Cafe_Idle4-1 = "（あれ、たしかこの辺りに、さっきまで先生が……）"
20010-CVGroup_Cafe_Idle5-1 = "（旧校舎……まだ戻りたくないな……）"
20010-CVGroup_WeaponGet_Idle1-1 = "逆にあまり、温泉郷でこの武器を使う機会が少ないと良いのですが……。\nいざという時は、はい！"
20010-CVGroup_UIEventLobby_Enter1-1 = "いらっしゃいませ。\n227号温泉郷へようこそ！"
20010-CVGroup_UIEventLobby_Enter2-1 = "あわわっ！せ、先生！？\nあれ、今日ご予約されてましたっけ……！？"
20010-CVGroup_UIEventLobby_Idle1-1 = "お金も稼げて、\nきれいな景色もたくさん見られて……。"
20010-CVGroup_UIEventLobby_Idle1-2 = "温泉郷、最高ですね！"
20010-CVGroup_UIEventLobby_Idle2-1 = "どうかしましたか、先生？\n何か足りない備品とかありました？"
20010-CVGroup_UIEventLobby_Idle3-1 = "ふふっ……\n今の私は、これまでとは一味も二味も違いますよ！"
20010-CVGroup_UIEventLobby_Idle4-1 = "ふふっ、今の私は余裕があるので何と……。"
20010-CVGroup_UIEventLobby_Idle4-2 = "食後にプリンを、二つも食べちゃいます！"
20010-CVGroup_UIEventLobby_Enter3-1 = "この温泉郷を運営し始めてから、はや1週間。"
20010-CVGroup_UIEventLobby_Enter3-2 = "そろそろ私も、女将としての風格が\n出てきたのではないでしょうか……！"
20010-CVGroup_UIEventLobby_Enter4-1 = "温泉の運営がこんなにも難しいことだったなんて……。"
20010-CVGroup_UIEventLobby_Enter4-2 = "想像していませんでした。"
20010-CVGroup_UIEventLobby_Enter5-1 = "温泉郷は無くなってしまいましたが……\nこれしきのことでめげる私ではありません！"
20010-CVGroup_UIEventShop_Enter1-1 = "温泉グッズなどもたくさん準備していますよ！"
20010-CVGroup_UIEventShop_Enter2-1 = "もし使っていないものなどがありましたら、\nこちらで別の商品と交換させていただきます！"
20010-CVGroup_UIEventShop_Idle1-1 = "先生？どうされましたか？"
20010-CVGroup_UIEventShop_Idle2-1 = "い、いくら先生でも、\nタダでお渡しするわけには……！"
20010-CVGroup_UIEventShop_Buy1-1 = "お買い上げありがとうございます！"
20010-CVGroup_UIEventShop_Buy2-1 = "いつもありがとうございます、先生。"
20010-CVGroup_UIEventShop_Buy3-1 = "本日もご利用いただき、\nありがとうございます！"
20010-CVGroup_UIEventShop_Buy4-1 = "こ、こんなに良い物を頂いてしまって、\n良いのでしょうか……！？"
20010-CVGroup_UIEventShop_Enter3-1 = "無念ではありますが、\n227号温泉郷の営業は終了いたしました……。"
