[translation]
20010-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20010-CVGroup_CharacterGet_Idle1-1 = "Seja muito bem-vindo à Estância Termal 227, Sensei.\nEu, Nodoka, como gerente da estância, irei recebê-lo com toda a minha dedicação."
20010-CVGroup_Cafe_Idle1-1 = "Seria ótimo ter móveis como estes na Estância Termal 227 também."
20010-CVGroup_Cafe_Idle2-1 = "Este café é sempre tão movimentado...\nQual será o segredo?"
20010-CVGroup_Cafe_Idle3-1 = "Uau... quanta coisa cara..."
20010-CVGroup_Cafe_Idle4-1 = "(Ué, eu jurava que o Sensei estava por aqui até agora...)"
20010-CVGroup_Cafe_Idle5-1 = "(O prédio antigo... não quero voltar para lá ainda...)"
20010-CVGroup_WeaponGet_Idle1-1 = "Na verdade, espero que eu não tenha muitas oportunidades de usar esta arma na estância...\nMas, se for necessário, estou pronta!"
20010-CVGroup_UIEventLobby_Enter1-1 = "Seja bem-vindo.\nBem-vindo à Estância Termal 227!"
20010-CVGroup_UIEventLobby_Enter2-1 = "Ahhh! S-Sensei!?\nEspera, você tinha feito uma reserva para hoje...!?"
20010-CVGroup_UIEventLobby_Idle1-1 = "Dá para ganhar dinheiro,\ne ainda ver paisagens lindas..."
20010-CVGroup_UIEventLobby_Idle1-2 = "A estância termal é o máximo!"
20010-CVGroup_UIEventLobby_Idle2-1 = "Aconteceu algo, Sensei?\nEstá faltando algum suprimento?"
20010-CVGroup_UIEventLobby_Idle3-1 = "Hehe...\nAgora eu sou uma pessoa completamente diferente de antes!"
20010-CVGroup_UIEventLobby_Idle4-1 = "Hehe, agora que estou mais tranquila, sabe de uma coisa..."
20010-CVGroup_UIEventLobby_Idle4-2 = "Vou comer dois pudins de sobremesa!"
20010-CVGroup_UIEventLobby_Enter3-1 = "Já se passou uma semana desde que comecei a administrar esta estância."
20010-CVGroup_UIEventLobby_Enter3-2 = "Será que já estou começando a ter o porte de uma verdadeira gerente...!"
20010-CVGroup_UIEventLobby_Enter4-1 = "Eu nunca imaginei que administrar uma fonte termal fosse algo tão difícil..."
20010-CVGroup_UIEventLobby_Enter4-2 = "Eu não fazia ideia."
20010-CVGroup_UIEventLobby_Enter5-1 = "A estância termal pode ter acabado, mas...\nEu não sou do tipo que desiste por causa disso!"
20010-CVGroup_UIEventShop_Enter1-1 = "Também preparamos muitos artigos de banho!"
20010-CVGroup_UIEventShop_Enter2-1 = "Se tiver algo que não esteja usando, posso trocar por outros produtos aqui!"
20010-CVGroup_UIEventShop_Idle1-1 = "Sensei? O que houve?"
20010-CVGroup_UIEventShop_Idle2-1 = "M-mesmo sendo você, Sensei,\nnão posso entregar as coisas de graça...!"
20010-CVGroup_UIEventShop_Buy1-1 = "Obrigada pela compra!"
20010-CVGroup_UIEventShop_Buy2-1 = "Muito obrigada como sempre, Sensei."
20010-CVGroup_UIEventShop_Buy3-1 = "Obrigada por nos visitar hoje também!"
20010-CVGroup_UIEventShop_Buy4-1 = "E-eu posso mesmo aceitar algo tão bom assim...!?"
20010-CVGroup_UIEventShop_Enter3-1 = "É uma pena, mas as operações da Estância Termal 227 foram encerradas..."
