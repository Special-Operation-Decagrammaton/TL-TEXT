[translation]
10045-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10045-CVGroup_CharacterGet_Idle1-1 = "Yaaawn... Ah, Sensei.\nJá que estamos aqui, vamos com calma, tá?"
10045-CVGroup_Cafe_Idle1-1 = "Que cena reconfortante...\nBem, ter um pouco de folga é sempre bom."
10045-CVGroup_Cafe_Idle2-1 = "Muito bem, onde será que tem um lugar para eu me deitar..."
10045-CVGroup_Cafe_Idle3-1 = "Onde será que tem um lugar para relaxar..."
10045-CVGroup_Cafe_Idle4-1 = "...Oh, parece bom, não é?"
10045-CVGroup_Cafe_Idle5-1 = "O que é isso...?"
10045-CVGroup_WeaponGet_Idle1-1 = "Fazer tudo isso por mim... Você é realmente estranho, Sensei.\nMas tudo bem... Então eu também vou ter que me esforçar mais do que nunca, né?"
10045-CVGroup_UIEventLobby_Enter1-1 = "Ei, Sensei, bom trabalho."
10045-CVGroup_UIEventLobby_Enter2-1 = "Que calor...\nEstá tão quente que sinto que vou secar..."
10045-CVGroup_UIEventLobby_Enter2-2 = "Eu nem estou me mexendo e ainda assim está quente..."
10045-CVGroup_UIEventLobby_Idle1-1 = "Sensei, tem certeza que quer ficar perdendo tempo com essa velha aqui?"
10045-CVGroup_UIEventLobby_Idle1-2 = "Você vai acabar levando bronca, sabia?"
10045-CVGroup_UIEventLobby_Idle2-1 = "Hmm... Mesmo que você fique me cutucando assim,\nnão vai sair nada de útil dessa velha aqui..."
10045-CVGroup_UIEventLobby_Idle3-1 = "Por acaso, você também está cansado, Sensei?"
10045-CVGroup_UIEventLobby_Idle3-2 = "Se estiver, quer tirar uma soneca ali comigo?"
10045-CVGroup_UIEventLobby_Idle4-1 = "Tããão sonooo..."
10045-CVGroup_UIEventLobby_Enter3-1 = "Já está na hora de ir?"
10045-CVGroup_UIEventLobby_Enter3-2 = "Uhee, que preguiça..."
10045-CVGroup_UIEventLobby_Enter4-1 = "Parece que não temos muito tempo sobrando,\nentão acho que é hora de começar a me mexer~"
10045-CVGroup_UIEventLobby_Enter5-1 = "Sensei, ainda tem coisas para fazer?"
10045-CVGroup_UIEventLobby_Enter5-2 = "Fufu, não tem jeito mesmo.\nA tia aqui vai te ajudar."
