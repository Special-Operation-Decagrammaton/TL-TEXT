[translation]
10045-CVGroup_UITitle_Idle1-1 = "ブル～アーカイブ～。"
10045-CVGroup_CharacterGet_Idle1-1 = "ふぁあ～……あ、先生～。\nせっかくなんだし、のんびり行こうよ～"
10045-CVGroup_Cafe_Idle1-1 = "ほほえましい光景だねぇ……\nまあ、余裕があるのは良いことだ。"
10045-CVGroup_Cafe_Idle2-1 = "さーて、どこか横になれるところは……。"
10045-CVGroup_Cafe_Idle3-1 = "どこか寛げそうな場所は……。"
10045-CVGroup_Cafe_Idle4-1 = "……お、良さそうだねぇ？"
10045-CVGroup_Cafe_Idle5-1 = "何これ……？"
10045-CVGroup_WeaponGet_Idle1-1 = "ここまでしてくれるとか……ほんと、変わってるねえ先生も。\nまぁ良いけど……じゃあ私も、今まで以上に頑張らないとね？"
10045-CVGroup_UIEventLobby_Enter1-1 = "やー先生、お疲れ様ー"
10045-CVGroup_UIEventLobby_Enter2-1 = "あっつい……\n暑くて干からびそう……。"
10045-CVGroup_UIEventLobby_Enter2-2 = "動いてないのに暑いよ～……。"
10045-CVGroup_UIEventLobby_Idle1-1 = "先生～、おじさんに構ってて良いの？"
10045-CVGroup_UIEventLobby_Idle1-2 = "怒られちゃうよ？"
10045-CVGroup_UIEventLobby_Idle2-1 = "うーん……そんなにつつかれても、\nおじさんからは何も出てこないけど……。"
10045-CVGroup_UIEventLobby_Idle3-1 = "もしかして、先生も疲れた？"
10045-CVGroup_UIEventLobby_Idle3-2 = "それなら一緒に、向こうで一眠りする？"
10045-CVGroup_UIEventLobby_Idle4-1 = "ねーむぃ……。"
10045-CVGroup_UIEventLobby_Enter3-1 = "そろそろ行かなきゃダメ？"
10045-CVGroup_UIEventLobby_Enter3-2 = "うへー、面倒くさいなぁ……。"
10045-CVGroup_UIEventLobby_Enter4-1 = "もうあんまり時間が無さそうだし、\nそろそろ動くとしようか～"
10045-CVGroup_UIEventLobby_Enter5-1 = "先生、まだやることが残ってるの？"
10045-CVGroup_UIEventLobby_Enter5-2 = "ふふん、仕方ないなあ。\nおじさんが手伝ってあげよう。"
