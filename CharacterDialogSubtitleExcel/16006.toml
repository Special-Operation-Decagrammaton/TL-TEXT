[translation]
16006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16006-CVGroup_CharacterGet_Idle1-1 = "Verão! É verão, Sensei!\nNeste verão, vamos comer muitas coisas gostosas juntos!"
16006-CVGroup_Cafe_Idle1-1 = "Falando em símbolos do verão,\nraspadinha... macarrão somen... peixe ayu grelhado com sal...\nnham... opa!?"
16006-CVGroup_Cafe_Idle2-1 = "Quando eu for à praia com o Sensei da próxima vez...\nvou comer 100 takoyakis!"
16006-CVGroup_Cafe_Idle3-1 = "Falando em verão...\nYakisoba! Zaru soba! Somen escorrendo!"
16006-CVGroup_Cafe_Idle4-1 = "Aqui é tão fresco e agradável~"
16006-CVGroup_Cafe_Idle5-1 = "Roupa de banho pronta.\nCaixa térmica pronta.\nPreparativos para o verão, perfeitos!"
16006-CVGroup_WeaponGet_Idle1-1 = "Um equipamento especial de verão!?\nVocê preparou isso para mim!?\nEba! Que alegria, obrigada!"
16006-CVGroup_UIEventShop_Enter1-1 = "Ah, é o Sensei!\nSeja bem-vindo!\nBem-vindo à nossa casa de praia!"
16006-CVGroup_UIEventShop_Enter2-1 = "Ah, Sensei!\nEu estava te esperando!"
16006-CVGroup_UIEventShop_Idle1-1 = "Dê uma olhada à vontade!\nTem muitas coisas deliciosas por aqui!"
16006-CVGroup_UIEventShop_Idle2-1 = "Ei, Sensei, isso aqui... hm?"
16006-CVGroup_UIEventShop_Idle2-2 = "Poxa, olhe para os produtos, não para mim!"
16006-CVGroup_UIEventShop_Idle3-1 = "Uuu... \nE-eu não posso te dar de graça só porque você fica me cutucando, sabia?"
16006-CVGroup_UIEventShop_Enter3-1 = "Disseram que o período de funcionamento desta casa de praia já chegou na metade!\nTemos que aproveitar até o fim!"
16006-CVGroup_UIEventShop_Enter4-1 = "Já estamos na reta final!\nVamos dar o nosso melhor!"
16006-CVGroup_UIEventShop_Enter5-1 = "Hoje é o último dia, Sensei!!\nConseguiu pegar tudo o que queria?"
16006-CVGroup_UIEventShop_Enter6-1 = "Fim das atividades, bom trabalho a todos~~!"
16006-CVGroup_UIEventShop_Enter6-2 = "...Achou que tinha acabado?\nHehe, na verdade, disseram que ainda podemos continuar por mais um tempinho!"
16006-CVGroup_UIEventShop_Enter6-3 = "Dê uma conferida para ver se não esqueceu de nada, tá?"
16006-CVGroup_UIEventShop_Buy1-1 = "Oh, como esperado do Sensei!"
16006-CVGroup_UIEventShop_Buy2-1 = "Escolheu esse? \nSim, acho uma ótima escolha!"
