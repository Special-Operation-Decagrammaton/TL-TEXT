[translation]
16006-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
16006-CVGroup_CharacterGet_Idle1-1 = "夏！夏だよ先生！\n今年の夏は私と一緒に、美味しいものをたくさん食べに行こう！"
16006-CVGroup_Cafe_Idle1-1 = "夏の風物詩といえば、\nかき氷……そうめん……鮎の塩焼き……\nじゅるっ……はっ！？"
16006-CVGroup_Cafe_Idle2-1 = "今度、先生と海に行ったら……\nたこ焼き100個食べよーっと！"
16006-CVGroup_Cafe_Idle3-1 = "夏と言えば……\n焼きそば！ざるそば！流しそうめん！"
16006-CVGroup_Cafe_Idle4-1 = "ここ、涼しくて気持ちいい～"
16006-CVGroup_Cafe_Idle5-1 = "水着の準備オッケー\nクーラ―ボックスもオッケー\n夏の準備は完璧！"
16006-CVGroup_WeaponGet_Idle1-1 = "夏の専用装備！？\n私のために用意してくれたの！？\nわ～い！嬉しい、ありがとー！"
16006-CVGroup_UIEventShop_Enter1-1 = "あっ、先生だ！\nいらっしゃいませ！\n海の家にようこそー！"
16006-CVGroup_UIEventShop_Enter2-1 = "あっ、先生！\n待ってたよ！"
16006-CVGroup_UIEventShop_Idle1-1 = "思う存分見てってね！\n美味しそうなものもたっくさんあるから！"
16006-CVGroup_UIEventShop_Idle2-1 = "ねえ先生、これ……ん？"
16006-CVGroup_UIEventShop_Idle2-2 = "もう、私じゃなくて商品の方を見てよー"
16006-CVGroup_UIEventShop_Idle3-1 = "うう～……\nそ、そんなにつんつん触られても、タダではあげられないよ？"
16006-CVGroup_UIEventShop_Enter3-1 = "この海の家の営業期間も、そろそろ折り返しなんだって！\n最後まで楽しまないとね！"
16006-CVGroup_UIEventShop_Enter4-1 = "そろそろラストスパートだね！\n頑張ろう！"
16006-CVGroup_UIEventShop_Enter5-1 = "今日が最終日だよ、先生！！\n欲しいものは全部手に入った？"
16006-CVGroup_UIEventShop_Enter6-1 = "営業終了っ、お疲れ様でした～～！"
16006-CVGroup_UIEventShop_Enter6-2 = "……って思った？\nふふっ、実はまだもうちょっとだけ大丈夫なんだって！"
16006-CVGroup_UIEventShop_Enter6-3 = "何か忘れてるものはないか、\n確認しておいてね？"
16006-CVGroup_UIEventShop_Buy1-1 = "おおっ、さすが先生！"
16006-CVGroup_UIEventShop_Buy2-1 = "それにしたの？\nうん、良いと思う！"
