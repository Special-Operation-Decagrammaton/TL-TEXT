[translation]
10113-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
10113-CVGroup_CharacterGet_Idle1-1 = "こんにちは、先生。\nゲヘナ学園救急医学部所属の氷室セナです。\n今日はお休みなので……よかったら一緒にお出かけしませんか？"
10113-CVGroup_Cafe_Idle1-1 = "ここは安全みたいですね。"
10113-CVGroup_Cafe_Idle2-1 = "穏やかな空間ですが、気を緩めてはなりません。"
10113-CVGroup_Cafe_Idle3-1 = "先生と一緒に来てみたいですね……。"
10113-CVGroup_Cafe_Idle4-1 = "あの家具の配置……少し気になりますね。"
10113-CVGroup_Cafe_Idle5-1 = "こういう場所こそ、死た……負傷者が出ないよう注意しないとなりません。"
10113-CVGroup_WeaponGet_Idle1-1 = "休日でも手入れは大事です。\n死た……負傷者にこちらの事情など分からないのですから。"
10113-CVGroup_UIEventLobby_Enter1-1 = "ようこそ、ゲヘナ学園へ。"
10113-CVGroup_UIEventLobby_Enter1-2 = "どうか平和な時間を過ごせますように。"
10113-CVGroup_UIEventLobby_Enter1-3 = "……。"
10113-CVGroup_UIEventLobby_Enter1-4 = "本心ですよ。"
10113-CVGroup_UIEventLobby_Enter2-1 = "いらっしゃったのですね、先生。"
10113-CVGroup_UIEventLobby_Enter2-2 = "今日は当番の日ではありませんが、"
10113-CVGroup_UIEventLobby_Enter2-3 = "警戒を怠ることはありません。"
10113-CVGroup_UIEventLobby_Enter3-1 = "これは興味深い死た……"
10113-CVGroup_UIEventLobby_Enter3-2 = "失礼。"
10113-CVGroup_UIEventLobby_Enter3-3 = "なかなかおもしろ……"
10113-CVGroup_UIEventLobby_Enter3-4 = "これも失礼でしたね。"
10113-CVGroup_UIEventLobby_Enter3-5 = "そろそろ急がなければなりません。"
10113-CVGroup_UIEventLobby_Enter4-1 = "一刻も早く、収束してほしいのですが……"
10113-CVGroup_UIEventLobby_Enter4-2 = "……。"
10113-CVGroup_UIEventLobby_Enter4-3 = "できればもう少し面白いものが見れたら、なんて。"
10113-CVGroup_UIEventLobby_Enter4-4 = "……今のは冗談です。本当ですから。"
10113-CVGroup_UIEventLobby_Enter5-1 = "対応完了ですね。"
10113-CVGroup_UIEventLobby_Enter5-2 = "お疲れ様でした、先生。"
10113-CVGroup_UIEventLobby_Idle1-1 = "休日であろうと、\n救急医学部の所属であることに変わりはないです。"
10113-CVGroup_UIEventLobby_Idle2-1 = "ゲヘナ学園では\nたくさんの出来事が起こります。"
10113-CVGroup_UIEventLobby_Idle2-2 = "……結構、楽しい場所ですよ。"
10113-CVGroup_UIEventLobby_Idle3-1 = "この服、似合っているでしょうか？"
10113-CVGroup_UIEventLobby_Idle3-2 = "……そんなことを聞くなんて新鮮？"
10113-CVGroup_UIEventLobby_Idle3-3 = "雑誌にあった台詞だったのですが……"
10113-CVGroup_UIEventLobby_Idle3-4 = "先生にそう思っていただけたのなら言った甲斐がありました。"
10113-CVGroup_UIEventLobby_Idle4-1 = "次にゲヘナに来る際は、"
10113-CVGroup_UIEventLobby_Idle4-2 = "私にご連絡頂けると嬉しいです。"
10113-CVGroup_UIEventLobby_Idle4-3 = "その方が、一番安全でしょうから。"
10113-CVGroup_UIEventBoxGachaShop_Enter1-1 = "こんにちは、先生。"
10113-CVGroup_UIEventBoxGachaShop_Enter1-2 = "何が起こるか分からないという意味で、"
10113-CVGroup_UIEventBoxGachaShop_Enter1-3 = "応急処置とこの場所は似ているのかもしれません。"
10113-CVGroup_UIEventBoxGachaShop_Enter2-1 = "いらっしゃったのですね、先生。"
10113-CVGroup_UIEventBoxGachaShop_Enter2-2 = "幸運と健康がおそばにありますように。"
10113-CVGroup_UIEventBoxGachaShop_Enter3-1 = "やり残したことはありませんか？"
10113-CVGroup_UIEventBoxGachaShop_Enter3-2 = "私も最後までお付き合いします。"
10113-CVGroup_UIEventBoxGachaShop_Idle1-1 = "偶然はお好きですか？先生。"
10113-CVGroup_UIEventBoxGachaShop_Idle1-2 = "私は、それなりに好きですよ。"
10113-CVGroup_UIEventBoxGachaShop_Idle2-1 = "幸運を願うより、不運に備えるべきと言いますよね。"
10113-CVGroup_UIEventBoxGachaShop_Idle2-2 = "応急処置において備えは重要です。"
10113-CVGroup_UIEventBoxGachaShop_Idle2-3 = "私にお任せください。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "おめでとうございます、先生。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "良さそうな品ですね。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "なるほど。\nそれが当たりなのですね。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "私にも見せていただけますか？\nとても興味深いです。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "すごいですね、先生。"
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "本当にお疲れ様でした。"
