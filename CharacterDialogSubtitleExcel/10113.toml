[translation]
10113-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10113-CVGroup_CharacterGet_Idle1-1 = "Olá, Sensei.\nSou Himuro Sena, do Departamento de Medicina de Emergência da Academia Gehenna.\nHoje é minha folga, então... se não se importar, gostaria de sair comigo?"
10113-CVGroup_Cafe_Idle1-1 = "Parece ser um lugar seguro."
10113-CVGroup_Cafe_Idle2-1 = "É um ambiente tranquilo, mas não podemos baixar a guarda."
10113-CVGroup_Cafe_Idle3-1 = "Gostaria de vir aqui com o Sensei algum dia..."
10113-CVGroup_Cafe_Idle4-1 = "A disposição desses móveis... é um pouco preocupante."
10113-CVGroup_Cafe_Idle5-1 = "É justamente em lugares assim que devemos ter cuidado para que não haja mort... feridos."
10113-CVGroup_WeaponGet_Idle1-1 = "A manutenção é importante, mesmo nos dias de folga.\nAfinal, os mort... os feridos não se importam com a nossa situação."
10113-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo à Academia Gehenna."
10113-CVGroup_UIEventLobby_Enter1-2 = "Espero que possa passar um tempo em paz."
10113-CVGroup_UIEventLobby_Enter1-3 = "..."
10113-CVGroup_UIEventLobby_Enter1-4 = "É um desejo sincero."
10113-CVGroup_UIEventLobby_Enter2-1 = "Você chegou, Sensei."
10113-CVGroup_UIEventLobby_Enter2-2 = "Hoje não é meu dia de plantão, mas,"
10113-CVGroup_UIEventLobby_Enter2-3 = "não posso descuidar da vigilância."
10113-CVGroup_UIEventLobby_Enter3-1 = "Isso é interessante, mort..."
10113-CVGroup_UIEventLobby_Enter3-2 = "Perdão."
10113-CVGroup_UIEventLobby_Enter3-3 = "É bem interes..."
10113-CVGroup_UIEventLobby_Enter3-4 = "Peço desculpas novamente."
10113-CVGroup_UIEventLobby_Enter3-5 = "Preciso me apressar agora."
10113-CVGroup_UIEventLobby_Enter4-1 = "Gostaria que isso se resolvesse o quanto antes, mas..."
10113-CVGroup_UIEventLobby_Enter4-2 = "..."
10113-CVGroup_UIEventLobby_Enter4-3 = "Se possível, adoraria ver algo um pouco mais interessante."
10113-CVGroup_UIEventLobby_Enter4-4 = "...Isso foi uma brincadeira. É sério."
10113-CVGroup_UIEventLobby_Enter5-1 = "Situação resolvida."
10113-CVGroup_UIEventLobby_Enter5-2 = "Bom trabalho, Sensei."
10113-CVGroup_UIEventLobby_Idle1-1 = "Mesmo sendo um dia de folga,\ncontinuo pertencendo ao Departamento de Medicina de Emergência."
10113-CVGroup_UIEventLobby_Idle2-1 = "Muitas coisas acontecem\nna Academia Gehenna."
10113-CVGroup_UIEventLobby_Idle2-2 = "...É um lugar bem divertido."
10113-CVGroup_UIEventLobby_Idle3-1 = "Será que este uniforme combina comigo?"
10113-CVGroup_UIEventLobby_Idle3-2 = "...É estranho eu perguntar isso?"
10113-CVGroup_UIEventLobby_Idle3-3 = "Era uma fala que vi em uma revista..."
10113-CVGroup_UIEventLobby_Idle3-4 = "Se o Sensei pensa assim, então valeu a pena ter dito."
10113-CVGroup_UIEventLobby_Idle4-1 = "Da próxima vez que vier a Gehenna,"
10113-CVGroup_UIEventLobby_Idle4-2 = "ficaria feliz se entrasse em contato comigo."
10113-CVGroup_UIEventLobby_Idle4-3 = "Seria a forma mais segura, afinal."
10113-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Olá, Sensei."
10113-CVGroup_UIEventBoxGachaShop_Enter1-2 = "No sentido de que não sabemos o que vai acontecer,"
10113-CVGroup_UIEventBoxGachaShop_Enter1-3 = "talvez os primeiros socorros sejam parecidos com este lugar."
10113-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Você chegou, Sensei."
10113-CVGroup_UIEventBoxGachaShop_Enter2-2 = "Que a sorte e a saúde estejam ao seu lado."
10113-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Tem algo que ainda não terminou?"
10113-CVGroup_UIEventBoxGachaShop_Enter3-2 = "Eu o acompanharei até o fim."
10113-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Você gosta de coincidências, Sensei?"
10113-CVGroup_UIEventBoxGachaShop_Idle1-2 = "Eu, até que gosto."
10113-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Dizem que, em vez de desejar sorte, devemos nos preparar para o azar, não é?"
10113-CVGroup_UIEventBoxGachaShop_Idle2-2 = "Nos primeiros socorros, a preparação é fundamental."
10113-CVGroup_UIEventBoxGachaShop_Idle2-3 = "Pode deixar comigo."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Parabéns, Sensei."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "Parece ser um bom item."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Entendo.\nEntão esse é o prêmio principal."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Poderia me mostrar também?\nEstou muito interessada."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Incrível, Sensei."
10113-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-2 = "Muito obrigada pelo seu trabalho duro."
