[translation]
10014-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
10014-CVGroup_CharacterGet_Idle1-1 = "Izuna, apresentando-se!\nAtendendo ao chamado do Sensei... não, do meu mestre, vim correndo até aqui!\nNin-nin!"
10014-CVGroup_Cafe_Idle1-1 = "Ah, mestre!"
10014-CVGroup_Cafe_Idle2-1 = "Dizem que os ninjas vivem nas sombras desde tempos antigos...\nSombras... dentro da escuridão...\n...Isso não vai acabar prejudicando a visão?"
10014-CVGroup_Cafe_Idle3-1 = "Isso também é para coletar informações...\nSerá que este é um bom lugar para se esconder?"
10014-CVGroup_Cafe_Idle4-1 = "Se for um lugar tão amplo assim,\ntalvez eu consiga usar a técnica secreta do estilo Izuna:\n'Estilo 108: Jutsu dos Clones das Sombras'..."
10014-CVGroup_Cafe_Idle5-1 = "Esperando silenciosamente pelas ordens do mestre...\nHum, acabei ficando sem o que fazer..."
10014-CVGroup_WeaponGet_Idle1-1 = "E-esta é uma arma ninja de última geração...!\nSerá que com isso eu finalmente vou me tornar uma ninja de nível médio!?"
10014-CVGroup_UIEventLobby_Enter1-1 = "É dia de festival, mestre!\nVamos, por onde quer começar a diversão?"
10014-CVGroup_UIEventLobby_Enter2-1 = "Mestre, mestre, estou muito animada para o festival!"
10014-CVGroup_UIEventLobby_Enter2-2 = "Eu vou ficar ao seu lado o tempo todo!"
10014-CVGroup_UIEventLobby_Enter3-1 = "O festival está ficando cada vez mais animado!"
10014-CVGroup_UIEventLobby_Enter3-2 = "Mestre, para onde vamos agora?"
10014-CVGroup_UIEventLobby_Enter4-1 = "O festival já vai acabar..."
10014-CVGroup_UIEventLobby_Enter4-2 = "P-pelo menos até o fim,\nvocê poderia ficar comigo, mestre...!"
10014-CVGroup_UIEventLobby_Enter5-1 = "O Festival das Flores de Cerejeira de Hyakkiyako acabou, mas..."
10014-CVGroup_UIEventLobby_Enter5-2 = "Ainda teremos muitos outros festivais pela frente, não é?"
10014-CVGroup_UIEventLobby_Enter5-3 = "Quando chegar a hora, você vai comigo de novo, mestre!"
10014-CVGroup_UIEventLobby_Idle1-1 = "Hum~ hum-hum~ hum-hum-hum~♪\nIzuna kon-kon, kon-ko-kon♪"
10014-CVGroup_UIEventLobby_Idle2-1 = "Oh, essa presença... é o mestre!"
10014-CVGroup_UIEventLobby_Idle2-2 = "Você me encontrou!\nEhehe!"
10014-CVGroup_UIEventLobby_Idle3-1 = "Dango, senbei, okonomiyaki...!"
10014-CVGroup_UIEventLobby_Idle3-2 = "Tem tantas coisas que eu quero comer com você, mestre!"
10014-CVGroup_UIEventLobby_Idle4-1 = "Estou pronta! Vou proteger o mestre enquanto te guio pelo festival!\nNin-nin!"
