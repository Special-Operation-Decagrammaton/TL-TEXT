[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10014-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
10014-CVGroup_CharacterGet_Idle1-1 = "Izuna, se apresentando!\nRecebi o chamado do Sensei..., digo, do Meu Mestre, e vim correndo~!\nNin-nin!"
10014-CVGroup_Cafe_Idle1-1 = "Ah, Meu Mestre!"
10014-CVGroup_Cafe_Idle2-1 = "Desde os tempos antigos, um ninja vive no mundo das sombras...\nNas sombras... No escuro...\n...a nossa visão pode acabar piorando, não é?"
10014-CVGroup_Cafe_Idle3-1 = "Isso também é para coletar informações...\nSerá que este é um bom lugar para me esconder?"
10014-CVGroup_Cafe_Idle4-1 = "Se for tão espaçoso assim,\ntalvez eu consiga usar a Técnica Secreta Estilo Izuna: 'Jutsu Clone das Sombras - Estilo 108'..."
10014-CVGroup_Cafe_Idle5-1 = "Aguardando silenciosamente as ordens do Meu Mestre...\nHmmm, estou começando a ficar entediada..."
10014-CVGroup_WeaponGet_Idle1-1 = "E-Essa é uma arma ninja de última geração...!\nCom isso, será que a Izuna também vai conseguir se tornar uma Chuunin!?"
10014-CVGroup_UIEventLobby_Enter1-1 = "É um festival, Meu Mestre!\nBem, por onde vamos começar a brincar?"
10014-CVGroup_UIEventLobby_Enter2-1 = "Meu Mestre, Meu Mestre, eu estou tão ansiosa para o festival!"
10014-CVGroup_UIEventLobby_Enter2-2 = "A Izuna vai ser a sua escolta e ficar ao seu lado o tempo todo!"
10014-CVGroup_UIEventLobby_Enter3-1 = "O festival está ficando cada vez mais animado!"
10014-CVGroup_UIEventLobby_Enter3-2 = "Meu Mestre, para onde vamos agora?"
10014-CVGroup_UIEventLobby_Enter4-1 = "O festival vai acabar logo, não é..."
10014-CVGroup_UIEventLobby_Enter4-2 = "P-Pelo menos até o fim,\nvocê poderia ficar pertinho da Izuna, Meu Mestre...!"
10014-CVGroup_UIEventLobby_Enter5-1 = "O Festival das Cerejeiras das Cem Noites pode ter acabado, mas..."
10014-CVGroup_UIEventLobby_Enter5-2 = "Ainda teremos muitos outros festivais daqui em diante, não é?"
10014-CVGroup_UIEventLobby_Enter5-3 = "Quando isso acontecer, você vai com a Izuna de novo, Meu Mestre!"
10014-CVGroup_UIEventLobby_Idle1-1 = "Hum~huhum~humhum~♪\nIzuna kon-kon, kon-koko~n♪"
10014-CVGroup_UIEventLobby_Idle2-1 = "Mmu, essa presença... É o Meu Mestre!"
10014-CVGroup_UIEventLobby_Idle2-2 = "Você conseguiu me encontrar!\nEhehe!"
10014-CVGroup_UIEventLobby_Idle3-1 = "Dango, biscoitos de arroz, okonomiyaki...!"
10014-CVGroup_UIEventLobby_Idle3-2 = "Tem taaaantas coisas que eu quero comer junto com o Meu Mestre!"
10014-CVGroup_UIEventLobby_Idle4-1 = "Izuna, pronta para a ação!\nVou guiar você pelo festival enquanto o protejo com a minha vida!\nNin-nin!"