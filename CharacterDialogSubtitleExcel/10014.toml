[translation]
10014-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！"
10014-CVGroup_CharacterGet_Idle1-1 = "イズナ、参上です！\n先生の……、いえ、主殿のお呼びを受けて、走って参りました～！\nにんにん！"
10014-CVGroup_Cafe_Idle1-1 = "あっ、主殿ー！"
10014-CVGroup_Cafe_Idle2-1 = "忍者とは古くから闇の世界で生きるもの……\n闇……闇の中……\n……目が悪くなりそうですね？"
10014-CVGroup_Cafe_Idle3-1 = "これも情報収集のため……\n隠れるのは、この辺りが良いでしょうか？"
10014-CVGroup_Cafe_Idle4-1 = "ここまで広ければ、\nイズナ流忍法奥義「百八式・影分身の術」が\n使えるかもしれません……。"
10014-CVGroup_Cafe_Idle5-1 = "主殿の命を静かに待つ……\nうーん、暇になってきてしまいました……。"
10014-CVGroup_WeaponGet_Idle1-1 = "こ、これが最先端の忍者の武器……！\nこれでイズナも、中忍になれますでしょうか！？"
10014-CVGroup_UIEventLobby_Enter1-1 = "お祭りですよ、主殿！\nさあ、どこから遊びに行きましょうか？"
10014-CVGroup_UIEventLobby_Enter2-1 = "主殿主殿、お祭りとっても楽しみですね！"
10014-CVGroup_UIEventLobby_Enter2-2 = "イズナ、ずっとそばでお供しますので！"
10014-CVGroup_UIEventLobby_Enter3-1 = "お祭りがどんどん盛り上がってきましたね！"
10014-CVGroup_UIEventLobby_Enter3-2 = "主殿、次はどこへ行きましょうか？"
10014-CVGroup_UIEventLobby_Enter4-1 = "お祭り、もうすぐ終わってしまいますね……。"
10014-CVGroup_UIEventLobby_Enter4-2 = "せ、せめて最後まで、\nイズナと一緒にいていただけますか、主殿……！"
10014-CVGroup_UIEventLobby_Enter5-1 = "百夜ノ春ノ桜花祭は、終わってしまいましたが……。"
10014-CVGroup_UIEventLobby_Enter5-2 = "お祭りはこれからも\nまだたくさんありますよね。"
10014-CVGroup_UIEventLobby_Enter5-3 = "その時はまたイズナと一緒に行ってくれますか、主殿！"
10014-CVGroup_UIEventLobby_Idle1-1 = "ふん～ふふん～ふんふん～♪\nイズナこんこん、こんここ～ん♪"
10014-CVGroup_UIEventLobby_Idle2-1 = "むっ、この気配は……主殿ですね！"
10014-CVGroup_UIEventLobby_Idle2-2 = "イズナのこと、見つけてくださったんですね！\nえへへっ！"
10014-CVGroup_UIEventLobby_Idle3-1 = "お団子、おせんべい、お好み焼き……！"
10014-CVGroup_UIEventLobby_Idle3-2 = "主殿と一緒に食べたい物がたーくさんです！"
10014-CVGroup_UIEventLobby_Idle4-1 = "イズナ、準備万端です！\n主殿のことをお守りしつつ、お祭りをご案内します！\nニンニン！"
