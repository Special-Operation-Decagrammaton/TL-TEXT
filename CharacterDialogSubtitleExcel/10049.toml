[translation]
10049-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10049-CVGroup_CharacterGet_Idle1-1 = "Sou Kazusa, do Clube de Doces Depois da Aula da Academia Trinity.\nBem... prazer em conhecê-lo."
10049-CVGroup_Cafe_Idle1-1 = "……É fofo. Não é ruim."
10049-CVGroup_Cafe_Idle2-1 = "Será que eu posso sentar aqui……?"
10049-CVGroup_Cafe_Idle3-1 = "Tem algo que parece delicioso……"
10049-CVGroup_Cafe_Idle4-1 = "Um tempo relaxante…… não é nada mal."
10049-CVGroup_Cafe_Idle5-1 = "Isso é... o gosto do Sensei?"
10049-CVGroup_WeaponGet_Idle1-1 = "……Ah, desculpe.\nNão, é que eu estava pensando por que você me deu algo assim……\nIsso significa que terei mais oportunidades de ajudar o Sensei daqui para frente? Se eu puder ser útil, tudo bem."
10049-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo de volta, Sensei.\nConto com você hoje também."
10049-CVGroup_UIEventLobby_Enter2-1 = "Vamos, temos que ir logo.\nTem um monte de coisas para fazer."
10049-CVGroup_UIEventLobby_Enter3-1 = "Como você está se sentindo?\n……Se está bem, então tudo certo."
10049-CVGroup_UIEventLobby_Enter4-1 = "Está quase na hora do esforço final, acha que consegue?"
10049-CVGroup_UIEventLobby_Enter5-1 = "Limpar tudo também é importante.\nTem algo que você esqueceu de fazer?"
10049-CVGroup_UIEventLobby_Idle1-1 = "Hm, o que foi?"
10049-CVGroup_UIEventLobby_Idle2-1 = "Não precisa se preocupar, eu não vou a lugar nenhum."
10049-CVGroup_UIEventLobby_Idle3-1 = "……Já disse que faz cócegas."
10049-CVGroup_UIEventLobby_Idle4-1 = "Ah, qual é, vamos lá!\nFaça o que tem que fazer!"
10049-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Bem, o que será que vai sair?"
10049-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Vamos lá, vamos girar bastante."
10049-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Ei, eu posso girar no seu lugar?"
10049-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Sensei, olha para cá, não para isso."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Oh…… incrível, parabéns."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Parece muito bom, é."
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Ah, tem algo incrível ali……"
10049-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Dê uma boa olhada para ver se ainda\ntem algo que você possa trocar."
