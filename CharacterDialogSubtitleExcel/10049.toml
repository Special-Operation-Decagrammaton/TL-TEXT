[translation]
10049-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10049-CVGroup_CharacterGet_Idle1-1 = "トリニティ総合学園、放課後スイーツ部の杏山カズサ。\nえっと、よろしく……お願い、します。"
10049-CVGroup_Cafe_Idle1-1 = "……可愛いね。悪くない。"
10049-CVGroup_Cafe_Idle2-1 = "これ、座っても良いのかな……。"
10049-CVGroup_Cafe_Idle3-1 = "何か美味しそうなものが……。"
10049-CVGroup_Cafe_Idle4-1 = "のんびりした時間……悪くないね。"
10049-CVGroup_Cafe_Idle5-1 = "これ、先生のセンス……？"
10049-CVGroup_WeaponGet_Idle1-1 = "……あ、ごめん。\nいや、どうしてこんなものまでくれたのかなって思って……\n先生を手伝える機会が、これからもあるってことかな？役に立てるなら良いけど。"
10049-CVGroup_UIEventLobby_Enter1-1 = "おかえり、先生。\n今日もよろしくね。"
10049-CVGroup_UIEventLobby_Enter2-1 = "ほら、早く行こう。\nやることが山積みだよ。"
10049-CVGroup_UIEventLobby_Enter3-1 = "調子はどう？\n……なら良いんだけど。"
10049-CVGroup_UIEventLobby_Enter4-1 = "そろそろラストスパートかな、行けそう？"
10049-CVGroup_UIEventLobby_Enter5-1 = "後片付けも大事。\n何かやり残したことはある？"
10049-CVGroup_UIEventLobby_Idle1-1 = "ん、どうしたの？"
10049-CVGroup_UIEventLobby_Idle2-1 = "心配しなくても、どっか行ったりしないよ。"
10049-CVGroup_UIEventLobby_Idle3-1 = "……くすぐったいってば。"
10049-CVGroup_UIEventLobby_Idle4-1 = "ああもう、ほら！\nやる事やって！"
10049-CVGroup_UIEventBoxGachaShop_Enter1-1 = "さて、何が出てくるのかな？"
10049-CVGroup_UIEventBoxGachaShop_Enter2-1 = "さあ、たくさん回そっか。"
10049-CVGroup_UIEventBoxGachaShop_Idle1-1 = "えっ、私が代わりに回していいの？"
10049-CVGroup_UIEventBoxGachaShop_Idle2-1 = "先生、私じゃなくてこっちを見てよ。"
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "お……すごいね、おめでとう。"
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "かなり良さそうだね、うん。"
10049-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "あ、何かすごそうなものが……。"
10049-CVGroup_UIEventBoxGachaShop_Enter3-1 = "まだ交換できるものがないか、\nちゃんと見ておいてね。"
