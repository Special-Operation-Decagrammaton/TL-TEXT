[translation]
20006-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20006-CVGroup_CharacterGet_Idle1-1 = "Mas que droga, era para ser meu dia de folga...\nBem, se é o Sensei quem está chamando, não tenho escolha."
20006-CVGroup_Cafe_Idle1-1 = "Não tem nenhuma bebida com sabor de queijo?"
20006-CVGroup_Cafe_Idle2-1 = "Este é um bom lugar para passar o dia de folga."
20006-CVGroup_Cafe_Idle3-1 = "Será que dá para usar isso em algum experimento?"
20006-CVGroup_Cafe_Idle4-1 = "Ei, não precisa ter medo, Nezuke."
20006-CVGroup_Cafe_Idle5-1 = "Opa~, isso é bem..."
20006-CVGroup_WeaponGet_Idle1-1 = "Eu sou um gênio, não só na pesquisa, mas também na pontaria!"
20006-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo à Academia Shanhaijing, Sensei!"
20006-CVGroup_UIEventLobby_Enter2-1 = "Hehe...\nVocê se lembra do nosso compromisso de hoje, né, Sensei?"
20006-CVGroup_UIEventLobby_Idle1-1 = "Para onde a instrutora Shun foi...?"
20006-CVGroup_UIEventLobby_Idle2-1 = "Hehe...\nO dia em que criarei o elixir da imortalidade está próximo!"
20006-CVGroup_UIEventLobby_Idle3-1 = "Estranho...\nEu não deveria ter colocado nada estranho no \"elixir do rejuvenescimento\"..."
20006-CVGroup_UIEventLobby_Idle4-1 = "...Será que quando eu estava fervendo,"
20006-CVGroup_UIEventLobby_Idle4-2 = "o pelo do Nezuke que estava voando por aí acabou caindo dentro!?"
20006-CVGroup_UIEventShop_Enter1-1 = "Bem-vindo ao meu laboratório itinerante, Sensei!"
20006-CVGroup_UIEventShop_Enter2-1 = "Se tiver bons materiais de alquimia, eu compro por um bom preço!"
20006-CVGroup_UIEventShop_Idle1-1 = "Quase tudo o que existe no mundo pode ser criado com a alquimia!"
20006-CVGroup_UIEventShop_Idle2-1 = "Hmm...\nSobre essa \"pedra azul\" que você mencionou, Sensei,\neu também não sei muito a respeito..."
20006-CVGroup_UIEventShop_Enter3-1 = "Este laboratório itinerante é\napenas temporário."
20006-CVGroup_UIEventShop_Enter3-2 = "Por isso, se houver algum material que você queira,\neu recomendo que pegue logo."
20006-CVGroup_UIEventShop_Enter4-1 = "Ultimamente, a atmosfera na associação comercial está estranha..."
20006-CVGroup_UIEventShop_Enter4-2 = "Talvez seja melhor eu fechar este laboratório itinerante logo."
20006-CVGroup_UIEventShop_Enter5-1 = "O laboratório itinerante\ntermina hoje."
20006-CVGroup_UIEventShop_Enter5-2 = "Se precisar de algum material,\né melhor trocar logo, viu?"
20006-CVGroup_UIEventShop_Enter6-1 = "Laboratório itinerante, encerrando as atividades!"
20006-CVGroup_UIEventShop_Enter6-2 = "Ah, mas se sobrar algum material,\npor favor, não deixe de me mostrar!"
20006-CVGroup_UIEventShop_Buy1-1 = "Nada mal, boa escolha!"
20006-CVGroup_UIEventShop_Buy2-1 = "Hehe, obrigado por reunir bons materiais."
20006-CVGroup_UIEventShop_Buy3-1 = "Oh, uma escolha excelente!"
