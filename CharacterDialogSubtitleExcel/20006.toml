[translation]
20006-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20006-CVGroup_CharacterGet_Idle1-1 = "なんなのだ、せっかくの休日だったのに……\nま、先生の呼び出しなら仕方ないのだ。"
20006-CVGroup_Cafe_Idle1-1 = "チーズ味の飲み物はないのか？"
20006-CVGroup_Cafe_Idle2-1 = "休日を過ごすのにはいい場所なのだ。"
20006-CVGroup_Cafe_Idle3-1 = "これ、実験には使えないのかな？"
20006-CVGroup_Cafe_Idle4-1 = "ほら、怖がらなくて良いんだぞ、ネズ助。"
20006-CVGroup_Cafe_Idle5-1 = "おほ～、これはかなり……。"
20006-CVGroup_WeaponGet_Idle1-1 = "ぼく様は研究だけでなく射撃の腕も天才なのだ！"
20006-CVGroup_UIEventLobby_Enter1-1 = "山海経高級中学校へようこそなのだ、先生！"
20006-CVGroup_UIEventLobby_Enter2-1 = "ふっふっふ\n今日の約束はもちろん覚えてるよね、先生？"
20006-CVGroup_UIEventLobby_Idle1-1 = "シュン教官はどこに行ったのだ……？"
20006-CVGroup_UIEventLobby_Idle2-1 = "ふっふっふ\n不老不死の霊薬を生み出せる日は近いのだ！"
20006-CVGroup_UIEventLobby_Idle3-1 = "おかしいのだ……\n「若返りの秘薬」に変なものは入れなかったはず……。"
20006-CVGroup_UIEventLobby_Idle4-1 = "……もしかして沸騰させてる時に、"
20006-CVGroup_UIEventLobby_Idle4-2 = "空中に舞っていたネズ助の毛が混ざったのだ！？"
20006-CVGroup_UIEventShop_Enter1-1 = "ぼく様の出張研究所へようこそなのだ、先生！"
20006-CVGroup_UIEventShop_Enter2-1 = "良い錬丹術の素材があったら、\nぼく様が高く買い取るのだ！"
20006-CVGroup_UIEventShop_Idle1-1 = "世の中に存在するほぼ全てのものは、\n錬丹術で生み出せるのだ！"
20006-CVGroup_UIEventShop_Idle2-1 = "うーん……\n先生が言ってるその「青色の石」については、\nぼく様もよく知らないのだ……。"
20006-CVGroup_UIEventShop_Enter3-1 = "この出張研究所は\nあくまで臨時のもの。"
20006-CVGroup_UIEventShop_Enter3-2 = "だからもし欲しい材料があったら、\n早めに手に入れておくことをおススメするのだ。"
20006-CVGroup_UIEventShop_Enter4-1 = "最近何だか、商会の雰囲気が怪しいのだ……。"
20006-CVGroup_UIEventShop_Enter4-2 = "この出張研究所も、\n早めに畳んだ方が良いかもしれないな。"
20006-CVGroup_UIEventShop_Enter5-1 = "出張研究所は\n今日でおしまいなのだ。"
20006-CVGroup_UIEventShop_Enter5-2 = "もし必要な材料があったら、\n早めに交換しておいた方が良いぞ？"
20006-CVGroup_UIEventShop_Enter6-1 = "出張研究所、営業終了なのだ！"
20006-CVGroup_UIEventShop_Enter6-2 = "あ、でも、もし残った材料とかがあれば、\n是非ぼく様に見せてほしい！"
20006-CVGroup_UIEventShop_Buy1-1 = "悪くない選択だ！"
20006-CVGroup_UIEventShop_Buy2-1 = "ふふ、良い素材を集めてくれてありがとうなのだ。"
20006-CVGroup_UIEventShop_Buy3-1 = "おお、素晴らしい選択なのだ！"
