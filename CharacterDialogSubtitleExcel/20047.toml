[translation]
20047-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ。"
20047-CVGroup_CharacterGet_Idle1-1 = "百花繚乱の作戦参謀だもの……水泳なんて児戯に等しい。\n……教本は熟読しているよ。さあ、行くよ。"
20047-CVGroup_Cafe_Idle1-1 = "ふ～ん……先生はこういうのが趣味なんだ。"
20047-CVGroup_Cafe_Idle2-1 = "力を抜いて……深呼吸……水に浮くのって……難しい……。"
20047-CVGroup_Cafe_Idle3-1 = "日差しがちょうど良いところ……どこだろう。"
20047-CVGroup_Cafe_Idle4-1 = "水着……少し小さかったかな。"
20047-CVGroup_Cafe_Idle5-1 = "レンゲって、泳ぐの上手……。"
20047-CVGroup_WeaponGet_Idle1-1 = "ふぅん……これが、先生なりの信頼、なんだ。\nじゃあ、これからはもっと……とことん頼って。\n私があんたのこと信じてるみたいに。\n……できるでしょう？"
20047-CVGroup_UIEventLobby_Enter1-1 = "百夜水上祭か……。"
20047-CVGroup_UIEventLobby_Enter1-2 = "私、何やってるんだろう……。"
20047-CVGroup_UIEventLobby_Enter2-1 = "参加するからには……\n肩書に恥じない試合をするから。"
20047-CVGroup_UIEventLobby_Enter3-1 = "終わりが見えてきた……\nだいぶ濃い時間だったかな。"
20047-CVGroup_UIEventLobby_Enter4-1 = "いざ終わるとなると寂しいものだね。"
20047-CVGroup_UIEventLobby_Enter4-2 = "海なんて、大嫌いだったのに。"
20047-CVGroup_UIEventLobby_Enter5-1 = "……悔いはないよ。ありがとう、先生。\n最後まで見守ってくれて。"
20047-CVGroup_UIEventLobby_Idle1-1 = "良い作戦があるんだけど……聞きたい？"
20047-CVGroup_UIEventLobby_Idle2-1 = "どう頑張っても身体が沈んじゃうんだよね……。"
20047-CVGroup_UIEventLobby_Idle2-2 = "力入れすぎなのかな？"
20047-CVGroup_UIEventLobby_Idle2-3 = "せっ、先生……！いつから見てたの……？"
20047-CVGroup_UIEventLobby_Idle3-1 = "心配するほどじゃない。\nこの程度、大したことないから。"
20047-CVGroup_UIEventLobby_Idle4-1 = "くすぐったいんだけど。"
20047-CVGroup_UIEventLobby_Idle4-2 = "……離れてとは、言ってない。"
20047-CVGroup_UIEventMission_Enter1-1 = "これ、今回の作戦一覧。\n私がまとめたやつ……無駄にしないでね。"
20047-CVGroup_UIEventMission_Enter2-1 = "はい、作戦一覧。"
20047-CVGroup_UIEventMission_Enter2-2 = "……何してるの？\nもっと寄らなきゃ一緒に見れないでしょ？"
20047-CVGroup_UIEventMission_Idle1-1 = "雑談なら二人っきりの時に付き合ってあげる。"
20047-CVGroup_UIEventMission_Idle1-2 = "今は、作戦に集中して。"
20047-CVGroup_UIEventMission_Idle2-1 = "作戦参謀の助言が必要？\n何でも言って。"
20047-CVGroup_UIEventMission_Buy1-1 = "さすが先生。\nこれくらい、できて当然か。"
20047-CVGroup_UIEventMission_Buy2-1 = "あんたが頑張っているから、私も負けてはいられない。\nそれがチームってものでしょう？"
20047-CVGroup_UIEventMission_Interaction1-1 = "ご苦労様。\nはいこれ、私からのご褒美だよ。"
