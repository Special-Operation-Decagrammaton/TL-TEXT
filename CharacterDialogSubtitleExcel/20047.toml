[translation]
20047-CVGroup_UITitle_Idle1-1 = "Blue... Archive."
20047-CVGroup_CharacterGet_Idle1-1 = "Como estrategista da Hyakkaryouran... nadar não passa de uma brincadeira de criança.\n...Eu li os manuais de cabo a rabo. Vamos lá."
20047-CVGroup_Cafe_Idle1-1 = "Hmm... então esse é o tipo de coisa que o Sensei gosta."
20047-CVGroup_Cafe_Idle2-1 = "Relaxe... respire fundo... flutuar na água é... tão difícil..."
20047-CVGroup_Cafe_Idle3-1 = "Onde será que tem um lugar com a quantidade certa de sol?"
20047-CVGroup_Cafe_Idle4-1 = "Este traje de banho... será que ficou um pouco pequeno?"
20047-CVGroup_Cafe_Idle5-1 = "A Renge... ela nada tão bem..."
20047-CVGroup_WeaponGet_Idle1-1 = "Hmm... então é assim que você demonstra confiança, Sensei.\nBem, de agora em diante... conte comigo para tudo.\nAssim como eu confio em você.\n...Você consegue, não consegue?"
20047-CVGroup_UIEventLobby_Enter1-1 = "O Festival Aquático de Hyakkiyakou, hein..."
20047-CVGroup_UIEventLobby_Enter1-2 = "O que será que eu estou fazendo..."
20047-CVGroup_UIEventLobby_Enter2-1 = "Já que vou participar...\nFarei uma partida digna do meu título."
20047-CVGroup_UIEventLobby_Enter3-1 = "O fim está próximo...\nFoi um período bem intenso, não foi?"
20047-CVGroup_UIEventLobby_Enter4-1 = "É triste pensar que está acabando."
20047-CVGroup_UIEventLobby_Enter4-2 = "E pensar que eu detestava o mar."
20047-CVGroup_UIEventLobby_Enter5-1 = "...Não tenho arrependimentos. Obrigada, Sensei.\nPor ter ficado ao meu lado até o fim."
20047-CVGroup_UIEventLobby_Idle1-1 = "Tenho uma boa estratégia... quer ouvir?"
20047-CVGroup_UIEventLobby_Idle2-1 = "Não importa o quanto eu tente, meu corpo afunda..."
20047-CVGroup_UIEventLobby_Idle2-2 = "Será que estou colocando força demais?"
20047-CVGroup_UIEventLobby_Idle2-3 = "Se-Sensei...! Desde quando você estava olhando...?"
20047-CVGroup_UIEventLobby_Idle3-1 = "Não precisa se preocupar.\nIsso não é nada demais."
20047-CVGroup_UIEventLobby_Idle4-1 = "Isso faz cócegas."
20047-CVGroup_UIEventLobby_Idle4-2 = "...Eu não disse para você se afastar."
20047-CVGroup_UIEventMission_Enter1-1 = "Aqui está a lista de missões desta operação.\nEu mesma organizei... não desperdice meu esforço."
20047-CVGroup_UIEventMission_Enter2-1 = "Aqui, a lista de missões."
20047-CVGroup_UIEventMission_Enter2-2 = "...O que você está fazendo?\nTem que chegar mais perto se quiser ver comigo, não é?"
20047-CVGroup_UIEventMission_Idle1-1 = "Se quiser jogar conversa fora, eu te acompanho quando estivermos a sós."
20047-CVGroup_UIEventMission_Idle1-2 = "Agora, concentre-se na missão."
20047-CVGroup_UIEventMission_Idle2-1 = "Precisa do conselho da estrategista?\nPode falar o que quiser."
20047-CVGroup_UIEventMission_Buy1-1 = "Como esperado do Sensei.\nSuponho que fazer isso seja o mínimo."
20047-CVGroup_UIEventMission_Buy2-1 = "Já que você está se esforçando, eu não posso ficar para trás.\nÉ assim que uma equipe funciona, não é?"
20047-CVGroup_UIEventMission_Interaction1-1 = "Bom trabalho.\nAqui, uma recompensa da minha parte."
