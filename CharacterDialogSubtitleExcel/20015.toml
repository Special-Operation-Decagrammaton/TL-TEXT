[translation]
20015-CVGroup_UITitle_Idle1-1 = "ブル～～アーカイブッ！"
20015-CVGroup_CharacterGet_Idle1-1 = "修行部のマスコット、ババンと登場！\nお待たせ先生！\nで、今日は何しよっか？"
20015-CVGroup_Cafe_Idle1-1 = "ふぁ、ねむ……\n目が、もう……んむ……。"
20015-CVGroup_Cafe_Idle2-1 = "私の測定によると……\nここは、鬼ごっこに最適な場所！"
20015-CVGroup_Cafe_Idle3-1 = "ふんふん～♪\nねぇねぇ、今日は何する？"
20015-CVGroup_Cafe_Idle4-1 = "素敵なレディーになるためには、休息も大切……！\nって、この間TVで見た！"
20015-CVGroup_Cafe_Idle5-1 = "ツバキ先輩とミモリ先輩今は何してるのかな～"
20015-CVGroup_WeaponGet_Idle1-1 = "うぉー、カッコイイ……へえ……おお……\nわぁ……これ、もしかしてもっと強くなれるやつ？\nあははっ！私、さらにパワーアップしちゃいそう！先生、ありがとー！"
20015-CVGroup_UIEventLobby_Enter1-1 = "百鬼夜行の映画村にようこそー！\n私が案内してあげるね、先生！"
20015-CVGroup_UIEventLobby_Enter2-1 = "あ、先生！\nなになに、これから映画村で遊ぶの？"
20015-CVGroup_UIEventLobby_Enter2-2 = "じゃあ私も一緒に遊びたーい！"
20015-CVGroup_UIEventLobby_Enter2-3 = "あ、でも今はダメなんだった……。"
20015-CVGroup_UIEventLobby_Enter3-1 = "先生、映画村のアトラクションはどうだった？\n面白かった？"
20015-CVGroup_UIEventLobby_Enter3-2 = "いいなー、私もそっち側体験したーい。"
20015-CVGroup_UIEventLobby_Enter4-1 = "あ、もうこんな時間なんだね\nうー、遊び足りない……"
20015-CVGroup_UIEventLobby_Enter4-2 = "終わったら一緒に行こうね、先生？"
20015-CVGroup_UIEventLobby_Enter5-1 = "あれ、もしかしてもう終わり！？"
20015-CVGroup_UIEventLobby_Enter5-2 = "えー、まだ全然先生と遊んでないのに……"
20015-CVGroup_UIEventLobby_Enter5-3 = "まあいっか、また先生とくれば良いんだもんね！"
20015-CVGroup_UIEventLobby_Idle1-1 = "今回修行部は、イベントを手伝う側なんだけど……"
20015-CVGroup_UIEventLobby_Idle1-2 = "う～、私も遊びたい～！"
20015-CVGroup_UIEventLobby_Idle2-1 = "ん、なに？相手を突っつく遊び？"
20015-CVGroup_UIEventLobby_Idle2-2 = "ひひっ、私も負けないよーっ！\nそりゃ、とりゃぁっ！"
20015-CVGroup_UIEventLobby_Idle3-1 = "こういうお手伝いも、修行の一環！……って分かってるんだけど、"
20015-CVGroup_UIEventLobby_Idle3-2 = "退屈なものは退屈！"
20015-CVGroup_UIEventLobby_Idle3-3 = "うーん、遊びに行きたい……"
20015-CVGroup_UIEventLobby_Idle4-1 = "んーーーー……\n駄目、じっとしてるのはやっぱ退屈ー！"
20015-CVGroup_UIEventLobby_Idle4-2 = "……あ、叫んだらちょっとスッキリした。"
20015-CVGroup_UIEventCardShop_Enter1-1 = "ここではカードが引けるんだよ！\n早速どう、先生？"
20015-CVGroup_UIEventCardShop_Enter2-1 = "さあどうぞ！\n先生のターンだよ、ドローして！"
20015-CVGroup_UIEventCardShop_Enter3-1 = "どうせだし、もう全部引いちゃえば？"
20015-CVGroup_UIEventCardShop_Enter3-2 = "こういう時ほど、レアカードが出そうだし！"
20015-CVGroup_UIEventCardShop_Idle1-1 = "わくわく、何が出るかな～？"
20015-CVGroup_UIEventCardShop_Idle2-1 = "せっかくならレアカードが良いよね！"
20015-CVGroup_UIEventCardShop_Idle2-2 = "キラキラして綺麗だし、テンション上がる！"
20015-CVGroup_UIEventCardShop_Prize3-1 = "うぉー、これめっちゃレアカードじゃん！"
20015-CVGroup_UIEventCardShop_Prize3-2 = "先生すごい、これぞディスティニー！"
20015-CVGroup_UIEventCardShop_Prize2-1 = "あ、良いカードじゃん！\nなるほど、これが大人の力……。"
20015-CVGroup_UIEventCardShop_Prize1-1 = "あ、良く見るやつだ。\nでも普通にレアカードだと思うよ！"
20015-CVGroup_UIEventCardShop_Prize0-1 = "えっと……\nが、ガッカリしないで、先生！"
20015-CVGroup_UIEventCardShop_Prize0-2 = "次はきっと、良いのが出るから！\n……多分。"
