[translation]
20015-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20015-CVGroup_CharacterGet_Idle1-1 = "A mascote do Clube de Treinamento, chegando com tudo!\nEsperei por você, Sensei!\nEntão, o que vamos fazer hoje?"
20015-CVGroup_Cafe_Idle1-1 = "Ah, que sono...\nMeus olhos, já estão... hum..."
20015-CVGroup_Cafe_Idle2-1 = "De acordo com as minhas medições...\nEste é o lugar perfeito para um pega-pega!"
20015-CVGroup_Cafe_Idle3-1 = "Hum hum~♪\nEi, ei, o que vamos fazer hoje?"
20015-CVGroup_Cafe_Idle4-1 = "Para se tornar uma dama elegante, o descanso também é importante...!\nFoi o que eu vi na TV outro dia!"
20015-CVGroup_Cafe_Idle5-1 = "O que será que a Tsubaki-senpai e a Mimori-senpai estão fazendo agora?"
20015-CVGroup_WeaponGet_Idle1-1 = "Uau, que legal... nossa... oh...\nUau... será que isso aqui vai me deixar ainda mais forte?\nAhaha! Sinto que vou ficar ainda mais poderosa! Obrigada, Sensei!"
20015-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo à Vila Cinematográfica de Hyakkiyako!\nEu vou te guiar, Sensei!"
20015-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei!\nO que foi, vamos brincar na Vila Cinematográfica agora?"
20015-CVGroup_UIEventLobby_Enter2-2 = "Então eu quero ir junto!"
20015-CVGroup_UIEventLobby_Enter2-3 = "Ah, mas agora não dá..."
20015-CVGroup_UIEventLobby_Enter3-1 = "Sensei, como foi a atração da Vila Cinematográfica?\nFoi divertido?"
20015-CVGroup_UIEventLobby_Enter3-2 = "Que inveja, eu também queria ter experimentado isso."
20015-CVGroup_UIEventLobby_Enter4-1 = "Ah, já está nessa hora, né?\nUgh, não me diverti o suficiente..."
20015-CVGroup_UIEventLobby_Enter4-2 = "Quando terminar, vamos juntos, tá, Sensei?"
20015-CVGroup_UIEventLobby_Enter5-1 = "Ué, já acabou!?"
20015-CVGroup_UIEventLobby_Enter5-2 = "Ah, mas eu nem brinquei direito com o Sensei..."
20015-CVGroup_UIEventLobby_Enter5-3 = "Bom, deixa pra lá, é só vir com o Sensei de novo!"
20015-CVGroup_UIEventLobby_Idle1-1 = "Desta vez, o Clube de Treinamento está ajudando com o evento, mas..."
20015-CVGroup_UIEventLobby_Idle1-2 = "Ugh, eu também quero brincar!"
20015-CVGroup_UIEventLobby_Idle2-1 = "Hm, o que foi? Uma brincadeira de cutucar?"
20015-CVGroup_UIEventLobby_Idle2-2 = "Hehe, eu não vou perder!\nToma essa, e essa!"
20015-CVGroup_UIEventLobby_Idle3-1 = "Ajudar assim também faz parte do treinamento!... Eu sei disso, mas,"
20015-CVGroup_UIEventLobby_Idle3-2 = "O que é chato, é chato!"
20015-CVGroup_UIEventLobby_Idle3-3 = "Hum, eu quero ir brincar..."
20015-CVGroup_UIEventLobby_Idle4-1 = "Hummm...\nNão dá, ficar parada é muito chato!"
20015-CVGroup_UIEventLobby_Idle4-2 = "...Ah, gritar me deixou um pouco mais aliviada."
20015-CVGroup_UIEventCardShop_Enter1-1 = "Dá para comprar cartas aqui!\nO que acha de começar logo, Sensei?"
20015-CVGroup_UIEventCardShop_Enter2-1 = "Pode vir!\nÉ a sua vez, Sensei, compre uma!"
20015-CVGroup_UIEventCardShop_Enter3-1 = "Já que estamos aqui, por que não compra tudo de uma vez?"
20015-CVGroup_UIEventCardShop_Enter3-2 = "É nessas horas que costumam vir cartas raras!"
20015-CVGroup_UIEventCardShop_Idle1-1 = "Que empolgação, o que será que vai vir?"
20015-CVGroup_UIEventCardShop_Idle2-1 = "Já que é pra comprar, que seja uma carta rara!"
20015-CVGroup_UIEventCardShop_Idle2-2 = "Elas brilham e são lindas, fico super animada!"
20015-CVGroup_UIEventCardShop_Prize3-1 = "Uau, essa é uma carta super rara!"
20015-CVGroup_UIEventCardShop_Prize3-2 = "Sensei, você é incrível, isso é o destino!"
20015-CVGroup_UIEventCardShop_Prize2-1 = "Ah, uma carta boa!\nEntendi, esse é o poder de um adulto..."
20015-CVGroup_UIEventCardShop_Prize1-1 = "Ah, essa eu vejo sempre.\nMas acho que ainda é uma carta rara!"
20015-CVGroup_UIEventCardShop_Prize0-1 = "Bem...\nN-não fique desapontado, Sensei!"
20015-CVGroup_UIEventCardShop_Prize0-2 = "Da próxima vez com certeza vai vir uma boa!\n...Provavelmente."
