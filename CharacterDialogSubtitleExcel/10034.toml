[translation]
10034-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10034-CVGroup_CharacterGet_Idle1-1 = "ふふっ。ごきげんよう、先生。\n修行部のミモリです。\nこれから、末永くよろしくお願いいたしますね。"
10034-CVGroup_Cafe_Idle1-1 = "皆さん楽しそうで何よりです。"
10034-CVGroup_Cafe_Idle2-1 = "先生のために用意した紅茶、\n冷める前に召し上がっていただけると良いのですが……。"
10034-CVGroup_Cafe_Idle3-1 = "修行の一環として、\n先生をお食事にお誘いしてみようかしら……？"
10034-CVGroup_Cafe_Idle4-1 = "カエデちゃん、\nどこかで先生にご迷惑をかけてたりしないといいのですが……。"
10034-CVGroup_Cafe_Idle5-1 = "うーん、少し散らかっていますね。\n先生が帰って来る前に、お掃除しておきましょうか？"
10034-CVGroup_WeaponGet_Idle1-1 = "わざわざこれを、私のために……？\n……ありがとうございます。先生。\nこの先今まで以上に努力して、生涯、先生のお役に立ってみせます。"
