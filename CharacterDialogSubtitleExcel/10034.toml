[translation]
10034-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10034-CVGroup_CharacterGet_Idle1-1 = "Fufu. Saudações, Sensei.\nSou Mimori, do Clube de Treinamento.\nDe agora em diante, conto com o seu apoio por muito tempo."
10034-CVGroup_Cafe_Idle1-1 = "Fico feliz em ver que todos parecem estar se divertindo."
10034-CVGroup_Cafe_Idle2-1 = "Preparei um chá para você, Sensei.\nEspero que consiga bebê-lo antes que esfrie..."
10034-CVGroup_Cafe_Idle3-1 = "Como parte do meu treinamento,\nserá que eu deveria convidar o Sensei para uma refeição...?"
10034-CVGroup_Cafe_Idle4-1 = "Espero que a Kaede-chan\nnão esteja causando problemas para o Sensei em algum lugar..."
10034-CVGroup_Cafe_Idle5-1 = "Hmm, está um pouco bagunçado aqui.\nQue tal eu dar uma limpada antes que o Sensei volte?"
10034-CVGroup_WeaponGet_Idle1-1 = "Você se deu ao trabalho de conseguir isso para mim...?\n...Muito obrigada, Sensei.\nDe agora em diante, me esforçarei mais do que nunca para ser útil a você por toda a minha vida."
