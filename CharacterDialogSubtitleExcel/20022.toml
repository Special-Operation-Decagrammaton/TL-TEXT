[translation]
20022-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20022-CVGroup_CharacterGet_Idle1-1 = "先生、年越しそばは食べましたか？\n今年はお互い、穏やかな一年を過ごせますように。"
20022-CVGroup_Cafe_Idle1-1 = "料理はしっかり計量するのが大切なんですよ。"
20022-CVGroup_Cafe_Idle2-1 = "この着物……きれい。"
20022-CVGroup_Cafe_Idle3-1 = "今年の初夢……なんだったっけ？"
20022-CVGroup_Cafe_Idle4-1 = "どうか今年は、穏やかな日々が続きますように……。"
20022-CVGroup_Cafe_Idle5-1 = "ふぅ、ここなら少し休めるかな……？"
20022-CVGroup_WeaponGet_Idle1-1 = "不思議です……\n先生がそばにいると、なんでもできそうな気持ちになるんです。\n今年も頑張りますから、どうか、見守っていてくださいね。"
20022-CVGroup_UIEventLobby_Enter1-1 = "こんにちは、先生！\n新年のお願いは決まりましたか？"
20022-CVGroup_UIEventLobby_Enter1-2 = "私も隣でお祈りしますね！"
20022-CVGroup_UIEventLobby_Enter2-1 = "寒くありませんか？\n温かい食事でもいかがでしょう？"
20022-CVGroup_UIEventLobby_Idle1-1 = "はい、先生？\nどうかしましたか？"
20022-CVGroup_UIEventLobby_Idle2-1 = "このスクーターは色々なことに使っているんですよ。"
20022-CVGroup_UIEventLobby_Idle2-2 = "これまで無くなってしまったら……\nどうしましょう……。"
20022-CVGroup_UIEventLobby_Idle3-1 = "おせち以外のお正月料理にも挑戦してみたいです！"
20022-CVGroup_UIEventLobby_Idle3-2 = "あっ、でも……作ったものを全部食べたら……\n太ってしまいそう……。"
20022-CVGroup_UIEventLobby_Idle4-1 = "新年のお願い……ではありませんが、"
20022-CVGroup_UIEventLobby_Idle4-2 = "今年は給食室が無事でありますように……。"
20022-CVGroup_UIEventLobby_Enter3-1 = "はい……今こそ料理の腕前を披露するときですね！"
20022-CVGroup_UIEventLobby_Enter3-2 = "私、頑張りますから……見守ってくださると嬉しいです。"
20022-CVGroup_UIEventLobby_Enter4-1 = "なんだかすごいことになってしまいましたが、私のやることは変わりません。"
20022-CVGroup_UIEventLobby_Enter4-2 = "ただ最善を尽くす、それだけです。"
20022-CVGroup_UIEventLobby_Enter4-3 = "それに……先生がそばにいてくださりますから百人力です！"
20022-CVGroup_UIEventLobby_Enter5-1 = "無事に終わって良かったです。"
20022-CVGroup_UIEventLobby_Enter5-2 = "その……私の料理、お口に合いましたか？"
20022-CVGroup_UIEventShop_Enter1-1 = "先生、いらっしゃいませ。\n商店街の方に色々なものを用意していただきました！"
20022-CVGroup_UIEventShop_Enter2-1 = "売り子さんをするの、\n初めてなんです。えへへ。"
20022-CVGroup_UIEventShop_Idle1-1 = "大丈夫ですよ。心配しないでください。"
20022-CVGroup_UIEventShop_Idle1-2 = "倉庫の管理でしたら、それなりに自信がありますから。"
20022-CVGroup_UIEventShop_Idle2-1 = "えっ？給食部の特製料理、ですか……？"
20022-CVGroup_UIEventShop_Idle2-2 = "もしよろしければお作りしましょうか？"
20022-CVGroup_UIEventShop_Buy1-1 = "あ、それでしたら少々お待ちください。"
20022-CVGroup_UIEventShop_Buy2-1 = "そちら、いちおしの商品です！"
20022-CVGroup_UIEventShop_Buy3-1 = "えっと……はい、こちらですね？"
20022-CVGroup_UIEventShop_Buy4-1 = "気に入っていただけましたか？\nまた来てくださいね！"
20022-CVGroup_UIEventShop_Enter3-1 = "お祭りも料理大会も終わりましたね。"
20022-CVGroup_UIEventShop_Enter3-2 = "私は明日の下ごしらえが残っていますが……\n先生はゆっくりしててくださいね。"
