[translation]
20022-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20022-CVGroup_CharacterGet_Idle1-1 = "Professor, você comeu o macarrão da virada? Espero que este ano possamos ter um ano tranquilo."
20022-CVGroup_Cafe_Idle1-1 = "É importante medir os ingredientes com precisão na hora de cozinhar."
20022-CVGroup_Cafe_Idle2-1 = "Este quimono... é lindo."
20022-CVGroup_Cafe_Idle3-1 = "Qual foi o meu primeiro sonho do ano mesmo...?"
20022-CVGroup_Cafe_Idle4-1 = "Espero que dias tranquilos continuem este ano..."
20022-CVGroup_Cafe_Idle5-1 = "Ufa, será que posso descansar um pouco aqui...?"
20022-CVGroup_WeaponGet_Idle1-1 = "É estranho... Quando o Professor está por perto, sinto que sou capaz de qualquer coisa. Vou me esforçar este ano também, então, por favor, continue cuidando de mim."
20022-CVGroup_UIEventLobby_Enter1-1 = "Olá, Professor! Já decidiu o seu pedido de Ano Novo?"
20022-CVGroup_UIEventLobby_Enter1-2 = "Eu também vou rezar ao seu lado!"
20022-CVGroup_UIEventLobby_Enter2-1 = "Não está com frio? Que tal uma refeição quentinha?"
20022-CVGroup_UIEventLobby_Idle1-1 = "Sim, Professor? Aconteceu alguma coisa?"
20022-CVGroup_UIEventLobby_Idle2-1 = "Eu uso esta scooter para várias coisas."
20022-CVGroup_UIEventLobby_Idle2-2 = "Se ela sumisse... o que eu faria..."
20022-CVGroup_UIEventLobby_Idle3-1 = "Quero tentar fazer outros pratos de Ano Novo além do Osechi!"
20022-CVGroup_UIEventLobby_Idle3-2 = "Ah, mas... se eu comer tudo o que fizer... acho que vou engordar..."
20022-CVGroup_UIEventLobby_Idle4-1 = "Não é exatamente um pedido de Ano Novo, mas..."
20022-CVGroup_UIEventLobby_Idle4-2 = "Espero que a cozinha da escola fique intacta este ano..."
20022-CVGroup_UIEventLobby_Enter3-1 = "Sim... agora é a hora de mostrar minhas habilidades culinárias!"
20022-CVGroup_UIEventLobby_Enter3-2 = "Vou me esforçar... ficaria feliz se você pudesse me observar."
20022-CVGroup_UIEventLobby_Enter4-1 = "As coisas ficaram um pouco intensas, mas o que eu tenho que fazer não muda."
20022-CVGroup_UIEventLobby_Enter4-2 = "Apenas dar o meu melhor, é só isso."
20022-CVGroup_UIEventLobby_Enter4-3 = "Além disso... com o Professor ao meu lado, sinto que tenho a força de cem pessoas!"
20022-CVGroup_UIEventLobby_Enter5-1 = "Fico feliz que tenha terminado bem."
20022-CVGroup_UIEventLobby_Enter5-2 = "Diga... a minha comida estava do seu agrado?"
20022-CVGroup_UIEventShop_Enter1-1 = "Professor, seja bem-vindo. O pessoal do centro comercial preparou várias coisas para nós!"
20022-CVGroup_UIEventShop_Enter2-1 = "É a minha primeira vez trabalhando como vendedora. Ehehe."
20022-CVGroup_UIEventShop_Idle1-1 = "Está tudo bem. Não se preocupe."
20022-CVGroup_UIEventShop_Idle1-2 = "Se for sobre gerenciar o estoque, eu tenho uma certa confiança nisso."
20022-CVGroup_UIEventShop_Idle2-1 = "Hã? A comida especial do Clube de Refeições, você diz...?"
20022-CVGroup_UIEventShop_Idle2-2 = "Se quiser, posso preparar para você?"
20022-CVGroup_UIEventShop_Buy1-1 = "Ah, nesse caso, por favor, espere um momento."
20022-CVGroup_UIEventShop_Buy2-1 = "Esse é o nosso produto recomendado!"
20022-CVGroup_UIEventShop_Buy3-1 = "Hum... sim, é este aqui, certo?"
20022-CVGroup_UIEventShop_Buy4-1 = "Gostou? Volte sempre!"
20022-CVGroup_UIEventShop_Enter3-1 = "O festival e a competição de culinária acabaram, não é?"
20022-CVGroup_UIEventShop_Enter3-2 = "Ainda tenho que preparar os ingredientes para amanhã, mas... o Professor pode descansar um pouco."
