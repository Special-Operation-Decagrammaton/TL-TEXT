[translation]
10087-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10087-CVGroup_CharacterGet_Idle1-1 = "ふふ、先生、どうでしょうこのドレス？\n……ここは素直に褒めてくださればいいんですよ。\n……まあ、といっても先生の意見はあくまで参考にするだけですが。"
10087-CVGroup_Cafe_Idle1-1 = "今の私は……一人のスパイ……\nふふん。"
10087-CVGroup_Cafe_Idle2-1 = "ヒナ委員長は、どこにいらっしゃるのでしょうか。"
10087-CVGroup_Cafe_Idle3-1 = "この格好、動きやすくて好きなんですが……\n少しだけ寒いような……。"
10087-CVGroup_Cafe_Idle4-1 = "ふぅ、今日だけは、トラブルがないといいのですが……。"
10087-CVGroup_Cafe_Idle5-1 = "（ふふ、ここでは余裕をもって……）"
10087-CVGroup_WeaponGet_Idle1-1 = "変わらぬご支援、ありがとうございます。\n先生はもうすでにご存知でしょうけれど――\n私、天雨アコはあなたを決して失望させません。\nこれまでも、これからも。今後の私にどうぞご期待くださいね。"
10087-CVGroup_UIEventLobby_Enter1-1 = "おかえりなさい、先生。"
10087-CVGroup_UIEventLobby_Enter1-2 = "準備はちゃんとできましたか？"
10087-CVGroup_UIEventLobby_Enter1-3 = "覚悟をしっかりと決めてくださいね。"
10087-CVGroup_UIEventLobby_Enter2-1 = "準備ならつつがなく完了しました。"
10087-CVGroup_UIEventLobby_Enter2-2 = "ゲヘナ風紀委員会の行政官として……"
10087-CVGroup_UIEventLobby_Enter2-3 = "今こそ立ち上がる時かと。"
10087-CVGroup_UIEventLobby_Enter3-1 = "簡単には終わらない……\nということですね。"
10087-CVGroup_UIEventLobby_Enter3-2 = "まあ、だからといって諦めるわけにはいきませんが。"
10087-CVGroup_UIEventLobby_Enter4-1 = "ほんっとう～に！しつこいですね！"
10087-CVGroup_UIEventLobby_Enter4-2 = "はぁ……まあ、いいでしょう！"
10087-CVGroup_UIEventLobby_Enter4-3 = "それならこちらも最後までやってやる覚悟はできていますから！"
10087-CVGroup_UIEventLobby_Enter4-4 = "さあ、引き続きよろしくお願いいたします！先生！"
10087-CVGroup_UIEventLobby_Enter5-1 = "やっと終わりましたか……"
10087-CVGroup_UIEventLobby_Enter5-2 = "本当に色々あったというか……"
10087-CVGroup_UIEventLobby_Enter5-3 = "もう疲れ果てたといいますか。"
10087-CVGroup_UIEventLobby_Enter5-4 = "……帰ってコーヒーでも一杯、いかがですか？先生。"
10087-CVGroup_UIEventLobby_Idle1-1 = "今回のパーティーも結局こんな事に……"
10087-CVGroup_UIEventLobby_Idle1-2 = "本当、どうなってしまうんでしょうか。"
10087-CVGroup_UIEventLobby_Idle2-1 = "まあ、構いません……"
10087-CVGroup_UIEventLobby_Idle2-2 = "何が起こっても、私たち風紀委員会が……"
10087-CVGroup_UIEventLobby_Idle2-3 = "いえ、私が解決してみせます！"
10087-CVGroup_UIEventLobby_Idle3-1 = "今の私はヒナ委員長を補佐するもう一人のスパイ。"
10087-CVGroup_UIEventLobby_Idle3-2 = "であれば、今まで隠していた真の実力をお見せする時でしょう。"
10087-CVGroup_UIEventLobby_Idle3-3 = "ふふ、楽しみにしていてくださいね。"
10087-CVGroup_UIEventLobby_Idle4-1 = "今年は静かにしていたと思ったら……"
10087-CVGroup_UIEventLobby_Idle4-2 = "いえ、ゲヘナではどだい無茶な話だったのでしょうか……はあ。"
10087-CVGroup_UIEventMission_Enter1-1 = "おかえりなさい、先生。"
10087-CVGroup_UIEventMission_Enter1-2 = "ちょうど解決していただきたい仕事があるのです。"
10087-CVGroup_UIEventMission_Enter1-3 = "お願いしても良いですか？"
10087-CVGroup_UIEventMission_Enter2-1 = "ふふ、ここまで来たのですから、\n逃げられると思わないでくださいね。"
10087-CVGroup_UIEventMission_Enter2-2 = "はい、業務リストがい～っぱい♪ですよ。"
10087-CVGroup_UIEventMission_Idle1-1 = "はーい、サボるつもりでしたら諦めてください。"
10087-CVGroup_UIEventMission_Idle1-2 = "私がすぐ隣で監視……\n失礼、補佐していますので。"
10087-CVGroup_UIEventMission_Idle2-1 = "目の前の仕事をする前に、他のことをしたい気持ちはわかります。"
10087-CVGroup_UIEventMission_Idle2-2 = "でも……そういうのは仕事が全部終わってから。"
10087-CVGroup_UIEventMission_Idle2-3 = "ふふっ……いいですね？"
10087-CVGroup_UIEventMission_Buy1-1 = "へぇ、やるじゃないですか。"
10087-CVGroup_UIEventMission_Buy1-2 = "はい、働いた報酬はちゃんとありますよ。\n当然です。"
10087-CVGroup_UIEventMission_Buy2-1 = "なんと……一気に解決したのですか。"
10087-CVGroup_UIEventMission_Buy2-2 = "へぇ……正直感心しました。\nさすが先生ですね。"
10087-CVGroup_UIEventMission_Interaction1-1 = "はい。本日の仕事はこれで終わりです。"
10087-CVGroup_UIEventMission_Interaction1-2 = "お疲れ様でした。先生。"
