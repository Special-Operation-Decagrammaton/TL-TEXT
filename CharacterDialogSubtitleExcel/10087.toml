[translation]
10087-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10087-CVGroup_CharacterGet_Idle1-1 = "Fufu, Sensei, o que achou deste vestido?\n……Pode ser sincero e me elogiar, sabe?\n……Bem, dito isso, a opinião do Sensei serve apenas como referência, claro."
10087-CVGroup_Cafe_Idle1-1 = "Neste momento, eu sou... uma espiã solitária...\nFufun."
10087-CVGroup_Cafe_Idle2-1 = "Onde será que a Presidente Hina está?"
10087-CVGroup_Cafe_Idle3-1 = "Gosto deste traje por ser fácil de se mover, mas...\nSinto um pouco de frio……"
10087-CVGroup_Cafe_Idle4-1 = "Ufa, espero que hoje, pelo menos, não tenhamos problemas……"
10087-CVGroup_Cafe_Idle5-1 = "(Fufu, aqui posso manter a calma……)"
10087-CVGroup_WeaponGet_Idle1-1 = "Obrigada pelo seu apoio constante.\nComo o Sensei já deve saber――\nEu, Amau Ako, jamais irei decepcioná-lo.\nTanto no passado quanto no futuro. Por favor, continue esperando grandes coisas de mim."
10087-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo de volta, Sensei."
10087-CVGroup_UIEventLobby_Enter1-2 = "Você se preparou adequadamente?"
10087-CVGroup_UIEventLobby_Enter1-3 = "Prepare-se mentalmente, por favor."
10087-CVGroup_UIEventLobby_Enter2-1 = "A preparação foi concluída sem problemas."
10087-CVGroup_UIEventLobby_Enter2-2 = "Como oficial administrativa do Comitê Disciplinar de Gehenna……"
10087-CVGroup_UIEventLobby_Enter2-3 = "Acho que chegou a hora de agirmos."
10087-CVGroup_UIEventLobby_Enter3-1 = "Então não vai terminar tão facilmente……"
10087-CVGroup_UIEventLobby_Enter3-2 = "Bem, não que eu vá desistir por causa disso."
10087-CVGroup_UIEventLobby_Enter4-1 = "Sério mesmo! Vocês são muito persistentes!"
10087-CVGroup_UIEventLobby_Enter4-2 = "Haa... bem, tudo bem!"
10087-CVGroup_UIEventLobby_Enter4-3 = "Se é assim, estou pronta para ir até o fim!"
10087-CVGroup_UIEventLobby_Enter4-4 = "Vamos lá, continue contando comigo! Sensei!"
10087-CVGroup_UIEventLobby_Enter5-1 = "Finalmente terminou……"
10087-CVGroup_UIEventLobby_Enter5-2 = "Aconteceram tantas coisas, sabe……"
10087-CVGroup_UIEventLobby_Enter5-3 = "Estou exausta, por assim dizer."
10087-CVGroup_UIEventLobby_Enter5-4 = "……Que tal voltarmos e tomarmos um café? Sensei."
10087-CVGroup_UIEventLobby_Idle1-1 = "Esta festa acabou terminando assim também……"
10087-CVGroup_UIEventLobby_Idle1-2 = "Sério, o que será que vai acontecer?"
10087-CVGroup_UIEventLobby_Idle2-1 = "Bem, não importa……"
10087-CVGroup_UIEventLobby_Idle2-2 = "Não importa o que aconteça, nosso Comitê Disciplinar……"
10087-CVGroup_UIEventLobby_Idle2-3 = "Não, eu mesma vou resolver!"
10087-CVGroup_UIEventLobby_Idle3-1 = "Neste momento, sou uma espiã que auxilia a Presidente Hina."
10087-CVGroup_UIEventLobby_Idle3-2 = "Sendo assim, é hora de mostrar a verdadeira força que eu estava escondendo."
10087-CVGroup_UIEventLobby_Idle3-3 = "Fufu, pode ficar na expectativa."
10087-CVGroup_UIEventLobby_Idle4-1 = "Pensei que este ano seria tranquilo……"
10087-CVGroup_UIEventLobby_Idle4-2 = "Não, será que em Gehenna isso era pedir demais…… haa."
10087-CVGroup_UIEventMission_Enter1-1 = "Bem-vindo de volta, Sensei."
10087-CVGroup_UIEventMission_Enter1-2 = "Tenho um trabalho que preciso que você resolva."
10087-CVGroup_UIEventMission_Enter1-3 = "Poderia me ajudar?"
10087-CVGroup_UIEventMission_Enter2-1 = "Fufu, já que chegou até aqui,\nnão pense que pode fugir."
10087-CVGroup_UIEventMission_Enter2-2 = "Sim, a lista de tarefas está cheia♪."
10087-CVGroup_UIEventMission_Idle1-1 = "Ei, se está pensando em vadiar, desista."
10087-CVGroup_UIEventMission_Idle1-2 = "Estarei vigiando bem ao seu lado……\nperdão, auxiliando você."
10087-CVGroup_UIEventMission_Idle2-1 = "Entendo que queira fazer outras coisas antes do trabalho à sua frente."
10087-CVGroup_UIEventMission_Idle2-2 = "Mas…… isso só depois que todo o trabalho terminar."
10087-CVGroup_UIEventMission_Idle2-3 = "Fufu…… combinado?"
10087-CVGroup_UIEventMission_Buy1-1 = "Hee, nada mal."
10087-CVGroup_UIEventMission_Buy1-2 = "Sim, aqui está a recompensa pelo seu trabalho.\nÉ o esperado."
10087-CVGroup_UIEventMission_Buy2-1 = "Nossa…… você resolveu tudo de uma vez?"
10087-CVGroup_UIEventMission_Buy2-2 = "Hee…… honestamente, estou impressionada.\nComo esperado do Sensei."
10087-CVGroup_UIEventMission_Interaction1-1 = "Sim. O trabalho de hoje termina aqui."
10087-CVGroup_UIEventMission_Interaction1-2 = "Bom trabalho, Sensei."
