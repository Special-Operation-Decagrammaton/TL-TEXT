[translation]
10008-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10008-CVGroup_CharacterGet_Idle1-1 = "あぁ？？？\nったく、結局見つかっちまったか。\nこうなった以上、手伝うしかねえな。"
10008-CVGroup_Cafe_Idle1-1 = "へぇ、なかなかいい場所だな。"
10008-CVGroup_Cafe_Idle2-1 = "なんだ？応援でもしてくれてんのか？\nはっ！面白いじゃん。"
10008-CVGroup_Cafe_Idle3-1 = "一番面白い事？\nまあ、そりゃあ勝つことだな。"
10008-CVGroup_Cafe_Idle4-1 = "えっと……だから……\nバ、バカ！先生のバカ野郎！"
10008-CVGroup_Cafe_Idle5-1 = "うぅ……恥ずかしい、けど。\nあ、ありがとな！"
10008-CVGroup_Cafe_Idle6-1 = "なあ……だからその……\nい、一緒に行くぞ！"
10008-CVGroup_WeaponGet_Idle1-1 = "鬼に金棒、龍に翼。\nそしてあたしには二丁のサブマシンガン！"
