[translation]
10000-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10000-CVGroup_CharacterGet_Idle1-1 = "Fufu, quer cooperar comigo? Bem, não vou recusar.\nSe for me contratar, vai sair caro, viu? Sensei."
10000-CVGroup_Cafe_Idle1-1 = "Se eu decorasse meu escritório assim também..."
10000-CVGroup_Cafe_Idle2-1 = "Quanto será o aluguel deste lugar?"
10000-CVGroup_Cafe_Idle3-1 = "Fufufu.\nO futuro da nossa empresa de faz-tudo é brilhante."
10000-CVGroup_Cafe_Idle4-1 = "Ah, isso me lembra da época do ensino fundamental."
10000-CVGroup_Cafe_Idle5-1 = "Eu deveria trazer meus funcionários para uma comemoração aqui qualquer dia desses."
10000-CVGroup_WeaponGet_Idle1-1 = "Fufufu. Com isso...\nQualquer coisa acaba com um único disparo."
