[translation]
10000-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10000-CVGroup_CharacterGet_Idle1-1 = "ふふ、この私に協力したいと？まあ、断りはしないけど。\n私を雇うなら高くつくわよ？先生。"
10000-CVGroup_Cafe_Idle1-1 = "我が事務所もこんな風に飾ったら……。"
10000-CVGroup_Cafe_Idle2-1 = "ここの家賃、どれぐらいかしら。"
10000-CVGroup_Cafe_Idle3-1 = "ふふふ。\n便利屋の未来は明るいわ。"
10000-CVGroup_Cafe_Idle4-1 = "はあ、中学校の頃を思い出すわね。"
10000-CVGroup_Cafe_Idle5-1 = "我が職員たちと一度はこんなところで打ち上げしなくちゃね。"
10000-CVGroup_WeaponGet_Idle1-1 = "ふふふ。これなら……\n何だろうと一発でお終いね。"
