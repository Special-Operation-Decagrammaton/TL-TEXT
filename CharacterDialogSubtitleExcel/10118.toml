[translation]
10118-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！"
10118-CVGroup_CharacterGet_Idle1-1 = "列車操縦でも線路建設でも！\n何でも任せてよ！パヒャヒャッ！"
10118-CVGroup_Cafe_Idle1-1 = "あーここが例の？\nへぇ～"
10118-CVGroup_Cafe_Idle2-1 = "今日はここでサボってこっかな♪"
10118-CVGroup_Cafe_Idle3-1 = "面白そうなのいっぱいあるじゃん！\nもっと早く来ればよかった～"
10118-CVGroup_Cafe_Idle4-1 = "先生に言いたいことあったんだけど、いないし……。\nま、いっか。忘れちゃった。"
10118-CVGroup_Cafe_Idle5-1 = "は～落ち着く～このまま寝ちゃいそう。\nでもそれは時間がもったいないかも？あはっ！"
10118-CVGroup_WeaponGet_Idle1-1 = "何これ？くれるの？\nやりぃ♪これで障害物を一掃ってね！パヒャヒャッ！"
10118-CVGroup_UIEventLobby_Enter1-1 = "パヒャヒャッ！準備はいい？"
10118-CVGroup_UIEventLobby_Enter1-2 = "いざしゅっぱーつ！"
10118-CVGroup_UIEventLobby_Enter2-1 = "急な呼び出しだったのに来てくれてありがとね。"
10118-CVGroup_UIEventLobby_Enter2-2 = "マジで状況やばくてさ～\nよろしくね、先生！"
10118-CVGroup_UIEventLobby_Enter3-1 = "これ、大丈夫なんだよね？"
10118-CVGroup_UIEventLobby_Enter3-2 = "ま、制御装置に問題なきゃ大丈夫か。"
10118-CVGroup_UIEventLobby_Enter4-1 = "お、そろそろ終わる感じ？\nそんな気がしてきたかも。"
10118-CVGroup_UIEventLobby_Enter5-1 = "ひゃー！やっと終わったー！！"
10118-CVGroup_UIEventLobby_Enter5-2 = "結構よかったんじゃない？パヒャヒャッ。"
10118-CVGroup_UIEventLobby_Idle1-1 = "なになに？どしたの？"
10118-CVGroup_UIEventLobby_Idle1-2 = "「何でもない」？\nはぁ？んじゃ、こっちもつっついちゃお。"
10118-CVGroup_UIEventLobby_Idle2-1 = "あーあ、何でこんなことに。"
10118-CVGroup_UIEventLobby_Idle2-2 = "ま、なんとかなるっしょ……？"
10118-CVGroup_UIEventLobby_Idle3-1 = "なんか面白いことなーいー？"
10118-CVGroup_UIEventLobby_Idle3-2 = "緊張ほぐすようなやつとかさぁ！"
10118-CVGroup_UIEventLobby_Idle3-3 = "ま、別に緊張してないけど。あははっ！"
10118-CVGroup_UIEventLobby_Idle4-1 = "今後もハイランダー鉄道をごひいきに！\nよろしくね、せんせ♪"
10118-CVGroup_UIEventShop_Enter1-1 = "好きなだけ見てってよ。"
10118-CVGroup_UIEventShop_Enter2-1 = "なんか探してるものあったら言ってね？"
10118-CVGroup_UIEventShop_Enter2-2 = "ま、どこにあるかは知らないけど。パヒャヒャッ！"
10118-CVGroup_UIEventShop_Enter3-1 = "仕事は終わったけど、欲しいものあるならまた来てよね。"
10118-CVGroup_UIEventShop_Idle1-1 = "え、なになに？"
10118-CVGroup_UIEventShop_Idle2-1 = "「代わりに選んでほしい」？"
10118-CVGroup_UIEventShop_Idle2-2 = "ダメダメ！自分で選ぶことに意味があるんだって。"
10118-CVGroup_UIEventShop_Buy1-1 = "お、それ？良いね良いねぇ。"
10118-CVGroup_UIEventShop_Buy2-1 = "グッドチョイス！パヒャッ。"
10118-CVGroup_UIEventShop_Buy3-1 = "私もほしいんだよね、それ。"
10118-CVGroup_UIEventShop_Buy4-1 = "なかなかいい趣味してんじゃん？"
