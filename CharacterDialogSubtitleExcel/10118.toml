[translation]
10118-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
10118-CVGroup_CharacterGet_Idle1-1 = "Seja pilotando trens ou construindo trilhos!\nPode deixar comigo! Pahyahya!"
10118-CVGroup_Cafe_Idle1-1 = "Ah, então é aqui?\nHmm~"
10118-CVGroup_Cafe_Idle2-1 = "Acho que vou ficar de bobeira por aqui hoje♪"
10118-CVGroup_Cafe_Idle3-1 = "Tem um monte de coisa interessante aqui!\nDevia ter vindo mais cedo~"
10118-CVGroup_Cafe_Idle4-1 = "Eu tinha algo para falar com o Sensei, mas ele não está aqui...\nBom, deixa pra lá. Esqueci."
10118-CVGroup_Cafe_Idle5-1 = "Ah~ que relaxante~ sinto que vou dormir aqui mesmo.\nMas talvez seja desperdício de tempo? Aha!"
10118-CVGroup_WeaponGet_Idle1-1 = "O que é isso? É pra mim?\nEba♪ Com isso, vou varrer todos os obstáculos! Pahyahya!"
10118-CVGroup_UIEventLobby_Enter1-1 = "Pahyahya! Tudo pronto?"
10118-CVGroup_UIEventLobby_Enter1-2 = "Partiu, vamos nessa!"
10118-CVGroup_UIEventLobby_Enter2-1 = "Obrigada por vir, mesmo sendo um chamado de última hora."
10118-CVGroup_UIEventLobby_Enter2-2 = "A situação está realmente complicada~\nConto com você, Sensei!"
10118-CVGroup_UIEventLobby_Enter3-1 = "Isso aqui é seguro, né?"
10118-CVGroup_UIEventLobby_Enter3-2 = "Bom, se o dispositivo de controle não tiver problemas, deve estar tudo bem."
10118-CVGroup_UIEventLobby_Enter4-1 = "Oh, está quase acabando? \nComecei a sentir que sim."
10118-CVGroup_UIEventLobby_Enter5-1 = "Uau! Finalmente acabou!!"
10118-CVGroup_UIEventLobby_Enter5-2 = "Não foi nada mal, né? Pahyahya."
10118-CVGroup_UIEventLobby_Idle1-1 = "O que foi, o que foi? Aconteceu algo?"
10118-CVGroup_UIEventLobby_Idle1-2 = "“Não é nada”?\nHã? Então vou ficar te cutucando."
10118-CVGroup_UIEventLobby_Idle2-1 = "Ah, por que as coisas chegaram a esse ponto?"
10118-CVGroup_UIEventLobby_Idle2-2 = "Bom, vai dar tudo certo, né...?"
10118-CVGroup_UIEventLobby_Idle3-1 = "Não tem nada de interessante acontecendo?"
10118-CVGroup_UIEventLobby_Idle3-2 = "Tipo algo para aliviar a tensão!"
10118-CVGroup_UIEventLobby_Idle3-3 = "Bom, eu não estou tensa, na verdade. Ahaha!"
10118-CVGroup_UIEventLobby_Idle4-1 = "Continue prestigiando a Ferrovia Highlander!\nConto com você, Sensei♪"
10118-CVGroup_UIEventShop_Enter1-1 = "Fique à vontade para olhar tudo o que quiser."
10118-CVGroup_UIEventShop_Enter2-1 = "Se estiver procurando por algo, é só me falar, tá?"
10118-CVGroup_UIEventShop_Enter2-2 = "Bom, eu não faço ideia de onde as coisas estão. Pahyahya!"
10118-CVGroup_UIEventShop_Enter3-1 = "O trabalho acabou, mas se quiser comprar algo, volte sempre."
10118-CVGroup_UIEventShop_Idle1-1 = "Ei, o que foi?"
10118-CVGroup_UIEventShop_Idle2-1 = "“Quer que eu escolha por você”?"
10118-CVGroup_UIEventShop_Idle2-2 = "Nem pensar! O sentido de tudo é você mesmo escolher."
10118-CVGroup_UIEventShop_Buy1-1 = "Oh, isso aí? Muito bom, muito bom."
10118-CVGroup_UIEventShop_Buy2-1 = "Boa escolha! Pahya."
10118-CVGroup_UIEventShop_Buy3-1 = "Eu também queria isso."
10118-CVGroup_UIEventShop_Buy4-1 = "Você tem um gosto bem interessante, hein?"
