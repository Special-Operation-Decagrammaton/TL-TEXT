[translation]
10095-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10095-CVGroup_CharacterGet_Idle1-1 = "Hoje... eu me vesti de empregada.\nPor favor, cuide de mim... mestre."
10095-CVGroup_Cafe_Idle1-1 = "Empregada... café...\nIsso é clichê demais, não acha?..."
10095-CVGroup_Cafe_Idle2-1 = "Tem tantas coisas aqui que poderiam servir de inspiração..."
10095-CVGroup_Cafe_Idle3-1 = "Parece que limpar este lugar vai dar um trabalhão..."
10095-CVGroup_Cafe_Idle4-1 = "Será que uma empregada que joga videogame é algo novo...? \nNa verdade, será que não é?..."
10095-CVGroup_Cafe_Idle5-1 = "Será que eu conseguiria um emprego de meio período aqui...?"
10095-CVGroup_WeaponGet_Idle1-1 = "Canetas, ferramentas de limpeza e armas... são parecidas no sentido de serem ferramentas. \nSe eu tiver ferramentas melhores, poderei fazer muitas coisas. \nObrigada, mestre. Eu nunca vou esquecer disso."
10095-CVGroup_UIEventLobby_Enter1-1 = "Eu estava esperando pelo senhor, mestre. \nConto com o senhor hoje também."
10095-CVGroup_UIEventLobby_Enter1-2 = "Isso soou um pouco como uma empregada de verdade, não soou!?"
10095-CVGroup_UIEventLobby_Enter2-1 = "Que mansão incrível...\nParece que há muito o que fazer aqui."
10095-CVGroup_UIEventLobby_Enter2-2 = "Se eu fizer uma coisa de cada vez, com certeza vai dar certo."
10095-CVGroup_UIEventLobby_Enter2-3 = "Porque o Sensei também está comigo."
10095-CVGroup_UIEventLobby_Enter3-1 = "O que será que está acontecendo aqui...?"
10095-CVGroup_UIEventLobby_Enter3-2 = "Não, não, eu preciso me manter focada, pelo menos eu."
10095-CVGroup_UIEventLobby_Enter3-3 = "Se eu deixar tudo nas mãos da minha irmã...!"
10095-CVGroup_UIEventLobby_Enter4-1 = "Literalmente... a vida é feita de coisas que nem conseguimos imaginar, não é?"
10095-CVGroup_UIEventLobby_Enter4-2 = "Mas eu vou continuar meu treinamento até o fim, mestre."
10095-CVGroup_UIEventLobby_Enter4-3 = "Eu ainda tenho muito a melhorar, mas pode contar comigo!"
10095-CVGroup_UIEventLobby_Enter5-1 = "Então você conseguiu terminar tudo aquilo..."
10095-CVGroup_UIEventLobby_Enter5-2 = "Até agora não consigo acreditar. \nNo meio do caminho, eu fiquei pensando no que aconteceria..."
10095-CVGroup_UIEventLobby_Enter5-3 = "Obrigada. Tudo isso é graças ao Sensei."
10095-CVGroup_UIEventLobby_Idle1-1 = "Me chamou, Sensei?"
10095-CVGroup_UIEventLobby_Idle1-2 = "Sim. Eu estava pensando sobre o que exatamente uma empregada deveria fazer."
10095-CVGroup_UIEventLobby_Idle1-3 = "Hã? Só essa postura já é o suficiente...?"
10095-CVGroup_UIEventLobby_Idle2-1 = "O importante é lidar com o que você pode fazer agora."
10095-CVGroup_UIEventLobby_Idle2-2 = "......Isso é só entre nós, mas,"
10095-CVGroup_UIEventLobby_Idle2-3 = "se eu não fizer assim, nosso clube não funciona direito..."
10095-CVGroup_UIEventLobby_Idle3-1 = "Dizem que várias experiências são a força motriz da criação, mas..."
10095-CVGroup_UIEventLobby_Idle3-2 = "Isso é um pouco demais..."
10095-CVGroup_UIEventLobby_Idle4-1 = "Ambiente, roupas, elementos...\nSignifica que todas as condições foram atendidas."
10095-CVGroup_UIEventLobby_Idle4-2 = "Então, mestre. \nHoje também, eu o acompanharei."
