[translation]
10095-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
10095-CVGroup_CharacterGet_Idle1-1 = "今日は……メイドになってみました。\nよろしくお願いいたします……ご主人様。"
10095-CVGroup_Cafe_Idle1-1 = "メイド……カフェ……\n流石にベタすぎますね……。"
10095-CVGroup_Cafe_Idle2-1 = "モチーフになりそうなものがたくさん……。"
10095-CVGroup_Cafe_Idle3-1 = "ここのお掃除、大変そう……。"
10095-CVGroup_Cafe_Idle4-1 = "ゲームをするメイドって新しいかな……？\n実はそうでもないのかな……。"
10095-CVGroup_Cafe_Idle5-1 = "ここでアルバイトとか、できるかな……？"
10095-CVGroup_WeaponGet_Idle1-1 = "ペンも、お掃除道具も、銃も……道具という点では似ています。\nもっと良い道具があれば、たくさんのことができるでしょう。\nありがとうございます、ご主人様。絶対に、忘れません。"
10095-CVGroup_UIEventLobby_Enter1-1 = "ご主人様が来るのを、お待ちしておりました。\n本日もよろしくお願いします。"
10095-CVGroup_UIEventLobby_Enter1-2 = "今のちょっとメイドっぽかったですよね！？"
10095-CVGroup_UIEventLobby_Enter2-1 = "すごい豪邸ですね……\nやることもたくさんありそうです。"
10095-CVGroup_UIEventLobby_Enter2-2 = "ひとつずつ着実にやっていけば何とかなるはずです。"
10095-CVGroup_UIEventLobby_Enter2-3 = "先生も、一緒ですから。"
10095-CVGroup_UIEventLobby_Enter3-1 = "ここで一体何が起こっているのでしょう……？"
10095-CVGroup_UIEventLobby_Enter3-2 = "ダメダメ、私だけでもちゃんと気を引き締めないと。"
10095-CVGroup_UIEventLobby_Enter3-3 = "お姉ちゃんに全部任せてたら……！"
10095-CVGroup_UIEventLobby_Enter4-1 = "文字通り……想像もつかないことが起こるのが人生、なんですね。"
10095-CVGroup_UIEventLobby_Enter4-2 = "でも、最後まで修行します、ご主人様。"
10095-CVGroup_UIEventLobby_Enter4-3 = "至らないところの多い私ですが、頼ってください！"
10095-CVGroup_UIEventLobby_Enter5-1 = "あれを全部やり遂げたんですね……"
10095-CVGroup_UIEventLobby_Enter5-2 = "今でも信じられないです。\n途中、どうなってしまうのかと思っていましたが……"
10095-CVGroup_UIEventLobby_Enter5-3 = "ありがとうございます。全部、先生のおかげです。"
10095-CVGroup_UIEventLobby_Idle1-1 = "呼びましたか、先生？"
10095-CVGroup_UIEventLobby_Idle1-2 = "はい。メイドらしい仕事って何があるんだろうと悩んでました。"
10095-CVGroup_UIEventLobby_Idle1-3 = "え？その姿勢だけでも十分……？"
10095-CVGroup_UIEventLobby_Idle2-1 = "大切なのは、今できることからこなすことです。"
10095-CVGroup_UIEventLobby_Idle2-2 = "……ここだけの話ですが、"
10095-CVGroup_UIEventLobby_Idle2-3 = "そうしないとうちの部は上手く回らないので……。"
10095-CVGroup_UIEventLobby_Idle3-1 = "色んな経験は創作の原動力とはいいますが……"
10095-CVGroup_UIEventLobby_Idle3-2 = "これはちょっと……。"
10095-CVGroup_UIEventLobby_Idle4-1 = "環境、衣服、要素……\nすべての条件が揃ったことになりますね。"
10095-CVGroup_UIEventLobby_Idle4-2 = "では、ご主人様。\n本日も、お供させていただきます。"
