[translation]
10090-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10090-CVGroup_CharacterGet_Idle1-1 = "こんにちは、先生。\n百鬼夜行連合学院所属、お祭り運営委員会の里浜……ウミカです。\nお祭り、好きですか？"
10090-CVGroup_Cafe_Idle1-1 = "カフェ祭りっていうのを、提案してみようかな……？"
10090-CVGroup_Cafe_Idle2-1 = "人がたくさん歩き回ってる……\nふむ、ふむむ……。"
10090-CVGroup_Cafe_Idle3-1 = "このままでも十分いいところだけど、\n何かを少しだけ足してみれば……。"
10090-CVGroup_Cafe_Idle4-1 = "社長ならどう考えるかな……。"
10090-CVGroup_Cafe_Idle5-1 = "着物風バニーガールはちょっと……。"
10090-CVGroup_WeaponGet_Idle1-1 = "あの……その……ありがとう、ございます。先生！\nあうう、こんなものをいただけるとは思ってもいなかったので……私、頑張ります。\nこれからも見守っててください！"
10090-CVGroup_UIEventLobby_Enter1-1 = "（あ、慌てないで、慌てないで……！）"
10090-CVGroup_UIEventLobby_Enter1-2 = "先生、皆さん！\n百鬼夜行へようこそ！"
10090-CVGroup_UIEventLobby_Enter2-1 = "百鬼夜行で、最高の思い出を残せるように！"
10090-CVGroup_UIEventLobby_Enter2-2 = "里浜ウミカ、ベストを尽くします！"
10090-CVGroup_UIEventLobby_Enter2-3 = "先生……いま私、大丈夫でしたよね……？"
10090-CVGroup_UIEventLobby_Enter3-1 = "ううう……日程があまりずれないといいですね……"
10090-CVGroup_UIEventLobby_Enter3-2 = "も、もちろんそれを戻すのも私の仕事なんですが！"
10090-CVGroup_UIEventLobby_Enter4-1 = "魑魅一座のせいで……！"
10090-CVGroup_UIEventLobby_Enter4-2 = "でも……お祭りが好きな子たちに、悪い子はいないでしょうから。"
10090-CVGroup_UIEventLobby_Enter4-3 = "……そうですよね、先生？"
10090-CVGroup_UIEventLobby_Enter5-1 = "あ、先生！\n最後までお付き合いいただき、本当にありがとうございます。"
10090-CVGroup_UIEventLobby_Enter5-2 = "先生がいてくださって、本当によかったです！"
10090-CVGroup_UIEventLobby_Idle1-1 = "私、うまくやれるでしょうか？\nうまくやれているのでしょうか……？"
10090-CVGroup_UIEventLobby_Idle1-2 = "ううう……そう言ってくださってありがとうございます……。"
10090-CVGroup_UIEventLobby_Idle2-1 = "やっぱり……すべてをお祭りにしてしまえば……！"
10090-CVGroup_UIEventLobby_Idle2-2 = "はい？今のは何かお祭り怪人のようなセリフだった？そんな……"
10090-CVGroup_UIEventLobby_Idle2-3 = "いえ、待ってください。お祭り怪人……これをモチーフにして……。"
10090-CVGroup_UIEventLobby_Idle3-1 = "一緒なら何も怖くないと言います。"
10090-CVGroup_UIEventLobby_Idle3-2 = "といいますか、仕事の準備というのはみんなで力を合わせてこそ、"
10090-CVGroup_UIEventLobby_Idle3-3 = "ようやく締め切り内に終わらせることができるものですから。"
10090-CVGroup_UIEventLobby_Idle4-1 = "今度また……百鬼夜行にきてください。"
10090-CVGroup_UIEventLobby_Idle4-2 = "その時は本当に格好良くて\n素晴らしいお祭りをお見せしますね！"
10090-CVGroup_UIEventShop_Enter1-1 = "あっ、先生！"
10090-CVGroup_UIEventShop_Enter1-2 = "えへへ。そうです。\n修学旅行の特別ショップです。"
10090-CVGroup_UIEventShop_Enter1-3 = "思う存分見て行ってください！"
10090-CVGroup_UIEventShop_Enter2-1 = "お気に召したものはありましたか？"
10090-CVGroup_UIEventShop_Enter2-2 = "それと、必要なものはありますか？"
10090-CVGroup_UIEventShop_Enter2-3 = "何でもおっしゃってください！"
10090-CVGroup_UIEventShop_Enter3-1 = "修学旅行ショップの営業は終了しました……"
10090-CVGroup_UIEventShop_Enter3-2 = "でも百鬼夜行のお祭りはこれからです！"
10090-CVGroup_UIEventShop_Idle1-1 = "はい？はい。大丈夫です。流通、管理、営業。"
10090-CVGroup_UIEventShop_Idle1-2 = "社長のそばで百夜堂を一緒に運営していたので。"
10090-CVGroup_UIEventShop_Idle1-3 = "自然と学びました。"
10090-CVGroup_UIEventShop_Idle2-1 = "そんなに大変ではありません。\n慣れてますから。"
10090-CVGroup_UIEventShop_Idle2-2 = "でも先生が来てくださるなら……いいですね。えへへ。"
10090-CVGroup_UIEventShop_Buy1-1 = "それになさいますか？\nありがとうございます！"
10090-CVGroup_UIEventShop_Buy2-1 = "はい、それは良い選択です！"
10090-CVGroup_UIEventShop_Buy3-1 = "わあ！\n私でもそれを選んだと思います！"
10090-CVGroup_UIEventShop_Buy4-1 = "ご利用ありがとうございます。\nえへへ。"
