[translation]
10090-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10090-CVGroup_CharacterGet_Idle1-1 = "Olá, Sensei.\nSou Satohama Umika, do Comitê de Operações de Festivais da Academia Hyakkiyako.\nVocê gosta de festivais?"
10090-CVGroup_Cafe_Idle1-1 = "Será que eu deveria sugerir um festival no café...?"
10090-CVGroup_Cafe_Idle2-1 = "Tem tanta gente andando por aí...\nHumm, humm..."
10090-CVGroup_Cafe_Idle3-1 = "Já é um lugar ótimo assim, mas...\nSe eu adicionasse só mais um pouquinho de algo..."
10090-CVGroup_Cafe_Idle4-1 = "O que a presidente pensaria sobre isso...?"
10090-CVGroup_Cafe_Idle5-1 = "Coelhinha com quimono é um pouco..."
10090-CVGroup_WeaponGet_Idle1-1 = "Ah... isso... muito obrigada, Sensei!\nAhhh, eu nunca imaginei que ganharia algo assim... Eu vou me esforçar.\nPor favor, continue cuidando de mim!"
10090-CVGroup_UIEventLobby_Enter1-1 = "(Ah, não entre em pânico, não entre em pânico...!)"
10090-CVGroup_UIEventLobby_Enter1-2 = "Sensei, pessoal!\nBem-vindos a Hyakkiyako!"
10090-CVGroup_UIEventLobby_Enter2-1 = "Para que possamos criar as melhores memórias em Hyakkiyako!"
10090-CVGroup_UIEventLobby_Enter2-2 = "Satohama Umika, farei o meu melhor!"
10090-CVGroup_UIEventLobby_Enter2-3 = "Sensei... eu me saí bem agora, não foi...?"
10090-CVGroup_UIEventLobby_Enter3-1 = "Uuu... espero que o cronograma não mude muito..."
10090-CVGroup_UIEventLobby_Enter3-2 = "B-bem, é claro que é meu trabalho consertar isso, mas!"
10090-CVGroup_UIEventLobby_Enter4-1 = "Por causa do Chimi Ichiza...!"
10090-CVGroup_UIEventLobby_Enter4-2 = "Mas... não deve haver ninguém realmente mau entre as crianças que amam festivais."
10090-CVGroup_UIEventLobby_Enter4-3 = "...Não é, Sensei?"
10090-CVGroup_UIEventLobby_Enter5-1 = "Ah, Sensei!\nMuito obrigada por ficar comigo até o fim."
10090-CVGroup_UIEventLobby_Enter5-2 = "Foi muito bom ter você aqui, Sensei!"
10090-CVGroup_UIEventLobby_Idle1-1 = "Será que vou conseguir fazer tudo certo?\nSerá que estou fazendo certo...?"
10090-CVGroup_UIEventLobby_Idle1-2 = "Uuu... obrigada por dizer isso..."
10090-CVGroup_UIEventLobby_Idle2-1 = "No fim das contas... se transformássemos tudo em um festival...!"
10090-CVGroup_UIEventLobby_Idle2-2 = "Sim? Isso soou como algo que um vilão de festival diria? Não pode ser..."
10090-CVGroup_UIEventLobby_Idle2-3 = "Não, espere. Vilão de festival... usando isso como tema..."
10090-CVGroup_UIEventLobby_Idle3-1 = "Dizem que não há nada a temer se estivermos juntos."
10090-CVGroup_UIEventLobby_Idle3-2 = "Quer dizer, a preparação do trabalho só é possível quando todos unem forças,"
10090-CVGroup_UIEventLobby_Idle3-3 = "para que finalmente possamos terminar dentro do prazo."
10090-CVGroup_UIEventLobby_Idle4-1 = "Da próxima vez... venha a Hyakkiyako novamente."
10090-CVGroup_UIEventLobby_Idle4-2 = "Daquela vez, eu vou te mostrar um festival\nrealmente incrível e maravilhoso!"
10090-CVGroup_UIEventShop_Enter1-1 = "Ah, Sensei!"
10090-CVGroup_UIEventShop_Enter1-2 = "Hehehe. Isso mesmo.\nÉ a loja especial da viagem escolar."
10090-CVGroup_UIEventShop_Enter1-3 = "Fique à vontade para olhar tudo!"
10090-CVGroup_UIEventShop_Enter2-1 = "Encontrou algo que gostou?"
10090-CVGroup_UIEventShop_Enter2-2 = "Além disso, tem algo que você precise?"
10090-CVGroup_UIEventShop_Enter2-3 = "Pode me pedir qualquer coisa!"
10090-CVGroup_UIEventShop_Buy1-1 = "それになさいますか？\nありがとうございます！"
10090-CVGroup_UIEventShop_Buy2-1 = "はい、それは良い選択です！"
10090-CVGroup_UIEventShop_Buy3-1 = "わあ！\n私でもそれを選んだと思います！"
10090-CVGroup_UIEventShop_Buy4-1 = "ご利用ありがとうございます。\nえへへ。"
10090-CVGroup_UIEventShop_Enter3-1 = "修学旅行ショップの営業は終了しました……"
10090-CVGroup_UIEventShop_Enter3-2 = "でも百鬼夜行のお祭りはこれからです！"
10090-CVGroup_UIEventShop_Idle1-1 = "はい？はい。大丈夫です。流通、管理、営業。"
10090-CVGroup_UIEventShop_Idle1-2 = "社長のそばで百夜堂を一緒に運営していたので。"
10090-CVGroup_UIEventShop_Idle1-3 = "自然と学びました。"
10090-CVGroup_UIEventShop_Idle2-1 = "そんなに大変ではありません。\n慣れてますから。"
10090-CVGroup_UIEventShop_Idle2-2 = "でも先生が来てくださるなら……いいですね。えへへ。"
10090-CVEventShop_Enter3-1 = "A loja da viagem escolar encerrou suas atividades..."
10090-CVEventShop_Enter3-2 = "Mas o festival de Hyakkiyako está só começando!"
10090-CVEventShop_Idle1-1 = "Sim? Sim. Está tudo bem. Distribuição, gestão, vendas."
10090-CVEventShop_Idle1-2 = "Como eu administrava a Hyakkiyado junto com a presidente,"
10090-CVEventShop_Idle1-3 = "eu aprendi naturalmente."
10090-CVEventShop_Idle2-1 = "Não é tão difícil assim.\nEstou acostumada."
10090-CVEventShop_Idle2-2 = "Mas se o Sensei vier me ver... é bom. Hehehe."
10090-CVEventShop_Buy1-1 = "Vai levar esse? \nMuito obrigada!"
10090-CVEventShop_Buy2-1 = "Sim, essa é uma ótima escolha!"
10090-CVEventShop_Buy3-1 = "Uau!\nEu acho que teria escolhido esse também!"
10090-CVEventShop_Buy4-1 = "Obrigada pela preferência.\nHehehe."
