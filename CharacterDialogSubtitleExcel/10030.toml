[translation]
10030-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10030-CVGroup_CharacterGet_Idle1-1 = "過ぎたるは猶及ばざるが如し……\n今日だけは仕事を忘れて、\n私とひと休み、しませんか？"
10030-CVGroup_Cafe_Idle1-1 = "身体が少しポカポカします……。"
10030-CVGroup_Cafe_Idle2-1 = "頭がスッキリした感じです。"
10030-CVGroup_Cafe_Idle3-1 = "この格好、もしかして浮いてますか……？"
10030-CVGroup_Cafe_Idle4-1 = "みなさん、楽しそうですね。"
10030-CVGroup_Cafe_Idle5-1 = "どこかに、座って休めそうな場所は……？"
10030-CVGroup_WeaponGet_Idle1-1 = "この重みに、責任を感じます……。\nきちんと応えられるように、ベストを尽くしますね。"
10030-CVGroup_UIEventLobby_Enter1-1 = "はい、準備はできています。"
10030-CVGroup_UIEventLobby_Enter2-1 = "サポートはお任せください。"
10030-CVGroup_UIEventLobby_Idle1-1 = "せ、先生……！？\nぎょ、業務に集中してください……！"
10030-CVGroup_UIEventLobby_Idle2-1 = "ここで無意味に時間を過ごすのは、その……。"
10030-CVGroup_UIEventLobby_Idle2-2 = "い、いえ、私は嫌ではないのですが……。"
10030-CVGroup_UIEventLobby_Idle3-1 = "何をお手伝いすればよろしいですか、先生？"
10030-CVGroup_UIEventLobby_Idle4-1 = "じょ、冗談はやめてください……。"
10030-CVGroup_UIEventLobby_Enter3-1 = "そろそろ追い込みをかけても\n良いタイミングかもしれませんね、先生。"
10030-CVGroup_UIEventLobby_Enter4-1 = "ラストスパートですね、\nお手伝いしますよ。"
10030-CVGroup_UIEventLobby_Enter5-1 = "後片付けは、準備と同じくらい大切ですからね。"
