[translation]
10030-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10030-CVGroup_CharacterGet_Idle1-1 = "O excesso é tão ruim quanto a falta... \nHoje, que tal esquecer o trabalho \ne descansar um pouco comigo?"
10030-CVGroup_Cafe_Idle1-1 = "Sinto meu corpo um pouco aquecido..."
10030-CVGroup_Cafe_Idle2-1 = "Sinto minha mente mais clara."
10030-CVGroup_Cafe_Idle3-1 = "Este visual... será que estou chamando atenção demais...?"
10030-CVGroup_Cafe_Idle4-1 = "Todos parecem estar se divertindo."
10030-CVGroup_Cafe_Idle5-1 = "Existe algum lugar por aqui onde eu possa sentar e descansar...?"
10030-CVGroup_WeaponGet_Idle1-1 = "Sinto o peso da responsabilidade neste objeto... \nFarei o meu melhor para estar à altura."
10030-CVGroup_UIEventLobby_Enter1-1 = "Sim, estou pronta."
10030-CVGroup_UIEventLobby_Enter2-1 = "Pode deixar o suporte comigo."
10030-CVGroup_UIEventLobby_Idle1-1 = "Se-Sensei...!? \nPo-por favor, concentre-se no trabalho...!"
10030-CVGroup_UIEventLobby_Idle2-1 = "Passar o tempo aqui sem um propósito é, bem..."
10030-CVGroup_UIEventLobby_Idle2-2 = "Não, quer dizer, eu não me importo, mas..."
10030-CVGroup_UIEventLobby_Idle3-1 = "Em que posso ajudar, Sensei?"
10030-CVGroup_UIEventLobby_Idle4-1 = "Po-por favor, pare com as brincadeiras..."
10030-CVGroup_UIEventLobby_Enter3-1 = "Talvez seja um bom momento para \nintensificarmos o ritmo, Sensei."
10030-CVGroup_UIEventLobby_Enter4-1 = "É o esforço final, não é? \nEu vou te ajudar."
10030-CVGroup_UIEventLobby_Enter5-1 = "A organização é tão importante quanto a preparação, afinal."
