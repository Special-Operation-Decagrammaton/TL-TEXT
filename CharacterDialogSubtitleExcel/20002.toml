[translation]
20002-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20002-CVGroup_CharacterGet_Idle1-1 = "Eu cheguei!\nOnde está o sujeito de teste para o experimento de hoje?"
20002-CVGroup_Cafe_Idle1-1 = "Hehe, esta sala.\nTalvez eu possa usá-la como meu laboratório."
20002-CVGroup_Cafe_Idle2-1 = "Que tipo de experimento devo fazer com a Mei da próxima vez?"
20002-CVGroup_Cafe_Idle3-1 = "Com essa temperatura e umidade,\nparece ser perfeito para minhas adoráveis bactérias crescerem.\nFu-fu-fu-fu..."
20002-CVGroup_Cafe_Idle4-1 = "Ah, estou sentindo cheiro de queijo vindo de algum lugar!"
20002-CVGroup_Cafe_Idle5-1 = "Nezusuke, seu! Pare de se debater!"
20002-CVGroup_WeaponGet_Idle1-1 = "Minha pistola finalmente chegou!\nClaro, comparada a essas armas bacteriológicas aterrorizantes, ela é bem inofensiva."
