[translation]
20002-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
20002-CVGroup_CharacterGet_Idle1-1 = "ぼく様、登場！\n今回の実験の被験体はどこだ？"
20002-CVGroup_Cafe_Idle1-1 = "ふふ、この部屋。\nぼく様の実験室として使ってもいいかも。"
20002-CVGroup_Cafe_Idle2-1 = "次回はメイを相手に何の実験をしようかな？"
20002-CVGroup_Cafe_Idle3-1 = "これぐらいの温度と湿度なら、\nぼく様の可愛い菌たちが育つのにとても良さそうだね。\nふーふっふっふ……。"
20002-CVGroup_Cafe_Idle4-1 = "あっ、どっかからチーズの匂いがするのだ！"
20002-CVGroup_Cafe_Idle5-1 = "ネズ助、この！暴れるな！"
20002-CVGroup_WeaponGet_Idle1-1 = "ぼく様の拳銃がやっと届いたか！\nもちろん、この恐ろしい細菌兵器に比べれば優しいレベルだけど。"
