[translation]
10112-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10112-CVGroup_CharacterGet_Idle1-1 = "Mestre... ah, acho que é melhor te chamar de Sensei agora, né?\nVamos nos divertir muuuito!"
10112-CVGroup_Cafe_Idle1-1 = "Aqui é bem espaçoso! Quer que eu te guie?"
10112-CVGroup_Cafe_Idle2-1 = "Hehe, já que me dei ao trabalho de colocar o uniforme... acho que vou brincar um pouco♪"
10112-CVGroup_Cafe_Idle3-1 = "Estou começando a ficar com fome... vou comer um doce♪"
10112-CVGroup_Cafe_Idle4-1 = "Todo mundo é tão fofo! Quero tirar uma foto com vocês!"
10112-CVGroup_Cafe_Idle5-1 = "Onde está o Sensei? Sinto que alguém está me olhando... acho que vou procurar um pouco."
10112-CVGroup_WeaponGet_Idle1-1 = "Eba! Com isso, a gente vai poder se divertir ainda mais! Obrigado, Sensei!"
10112-CVGroup_UIEventLobby_Enter1-1 = "Ah! Sensei! É por aqui!"
10112-CVGroup_UIEventLobby_Enter2-1 = "Mestre..."
10112-CVGroup_UIEventLobby_Enter2-2 = "Quer dizer, Sensei! Finalmente te encontrei!"
10112-CVGroup_UIEventLobby_Enter3-1 = "Opa! Sensei! Está se divertindo?"
10112-CVGroup_UIEventLobby_Enter4-1 = "Hehe, vamos aproveitar até o fim! Mestre, não, Sensei!"
10112-CVGroup_UIEventLobby_Enter5-1 = "Ah... acabou. Passou tão rápido..."
10112-CVGroup_UIEventLobby_Enter5-2 = "...Claro! Foi muuuito divertido!"
10112-CVGroup_UIEventLobby_Idle1-1 = "Sensei, tem algum lugar que você queira ir? Eu te guio!"
10112-CVGroup_UIEventLobby_Idle2-1 = "Hm? O que foi? Precisa de alguma coisa?"
10112-CVGroup_UIEventLobby_Idle3-1 = "Ahaha, que cócegas!"
10112-CVGroup_UIEventLobby_Idle3-2 = "Será que o Sensei quer brincar?"
10112-CVGroup_UIEventLobby_Idle4-1 = "Então eu também vou fazer cócegas no Sensei! Não vou te deixar escapar, ahaha!"
