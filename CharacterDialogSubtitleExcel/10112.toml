[translation]
10112-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10112-CVGroup_CharacterGet_Idle1-1 = "ご主人さ――あ、今は先生って呼んだ方がいいかな？\n楽しいこと、い～っぱいしようね！"
10112-CVGroup_Cafe_Idle1-1 = "ここ広いねー！\n私が案内してあげようか？"
10112-CVGroup_Cafe_Idle2-1 = "えへへっ、せっかく制服に着替えたし……\n遊んじゃおっかな♪"
10112-CVGroup_Cafe_Idle3-1 = "お腹空いてきちゃった……\nお菓子食べちゃお♪"
10112-CVGroup_Cafe_Idle4-1 = "みんな可愛い～！\n一緒に写真撮りた～い！"
10112-CVGroup_Cafe_Idle5-1 = "先生どこ～？\n視線は感じるんだけどなあ……\nちょっと探してみよっかな。"
10112-CVGroup_WeaponGet_Idle1-1 = "やったぁ！\nこれでもっ～と楽しく遊べるね！\nありがとう、先生！"
10112-CVGroup_UIEventLobby_Enter1-1 = "あ！先生！\nこっちだよー！"
10112-CVGroup_UIEventLobby_Enter2-1 = "ご主人様……"
10112-CVGroup_UIEventLobby_Enter2-2 = "じゃなくて、先生！やっと会えた～！"
10112-CVGroup_UIEventLobby_Enter3-1 = "やほ！\n先生！楽しんでるー？"
10112-CVGroup_UIEventLobby_Enter4-1 = "ふふっ、最後まで遊びつくそ～！\nご主人様、ううん、先生！"
10112-CVGroup_UIEventLobby_Enter5-1 = "はあ～終わっちゃった。\nあっという間だったね……"
10112-CVGroup_UIEventLobby_Enter5-2 = "……もちろん！すっ～～ごく、楽しかったよ！"
10112-CVGroup_UIEventLobby_Idle1-1 = "先生、どこか行きたいところある？\n案内するよ～"
10112-CVGroup_UIEventLobby_Idle2-1 = "うん？どうしたの？\n何か頼み事？"
10112-CVGroup_UIEventLobby_Idle3-1 = "あはは、くすぐったい～！"
10112-CVGroup_UIEventLobby_Idle3-2 = "もしかして先生、遊びたいの？"
10112-CVGroup_UIEventLobby_Idle4-1 = "じゃあ私も先生をこちょこちょしちゃお～！\n逃がさないよ～あははっ！"
