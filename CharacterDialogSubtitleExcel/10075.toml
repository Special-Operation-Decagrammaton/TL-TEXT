[translation]
10075-CVGroup_UITitle_Idle1-1 = "Blue Archive~"
10075-CVGroup_CharacterGet_Idle1-1 = "Ioi! Eu sou a Meru Himiki, da Frente de Libertação do Conhecimento!\nPode me chamar de Meru-ri, ah, esse é meu nome artístico, claro.\nPrazer em te conhecer, Sensei."
10075-CVGroup_Cafe_Idle1-1 = "Ideias... Onde estão as ideias...!"
10075-CVGroup_Cafe_Idle2-1 = "Espera, espera...\nAquela cena ali, será que é...?"
10075-CVGroup_Cafe_Idle3-1 = "Ah... Eu queria ter mais habilidade para desenhar..."
10075-CVGroup_Cafe_Idle4-1 = "Será que não consigo ser um pouco mais rápida com as mãos?...\nE, de quebra, agilizar meus olhos e meu raciocínio também!"
10075-CVGroup_Cafe_Idle5-1 = "Quando eu publico um doujinshi,\nnão uso meu nome verdadeiro."
10075-CVGroup_WeaponGet_Idle1-1 = "Dizem que um bom mestre não culpa seus pincéis, mas as ferramentas ainda são importantes, sabe.\nEntão... basicamente, obrigada. Sensei."
10075-CVGroup_UIEventLobby_Enter1-1 = "Beleza, já que o Sensei chegou,\nestá na hora da Frente de Libertação do Conhecimento!"
10075-CVGroup_UIEventLobby_Enter2-1 = "Bem-vindo de volta, Sensei.\nParece que vários incidentes estão acontecendo, vamos sair um pouco!"
10075-CVGroup_UIEventLobby_Enter2-2 = "É uma chance de encontrar novas ideias,\nnão dá para deixar passar, né?"
10075-CVGroup_UIEventLobby_Enter3-1 = "Eu nunca imaginei que as coisas chegariam a esse ponto..."
10075-CVGroup_UIEventLobby_Enter4-1 = "Quem diria que as coisas tomariam esse rumo..."
10075-CVGroup_UIEventLobby_Enter4-2 = "Sério, a vida dá voltas que a gente nem imagina..."
10075-CVGroup_UIEventLobby_Enter5-1 = "Aconteceu de tudo, mas no fim deu tudo certo."
10075-CVGroup_UIEventLobby_Enter5-2 = "Consegui coletar bastante material,\nentão no fim das contas, valeu a pena!"
10075-CVGroup_UIEventLobby_Idle1-1 = "Me chamou?"
10075-CVGroup_UIEventLobby_Idle1-2 = "Eu?\n...Estou ocupada, mas não estou ocupada,\né mais ou menos isso."
10075-CVGroup_UIEventLobby_Idle2-1 = "A Momiji é uma colega em quem posso confiar e minha kouhai!"
10075-CVGroup_UIEventLobby_Idle2-2 = "Gostos são... bem...\ncada um tem o seu, né?"
10075-CVGroup_UIEventLobby_Idle3-1 = "O que foi?\nSensei... por acaso você está livre?"
10075-CVGroup_UIEventLobby_Idle3-2 = "Não me importo de brincar um pouco, se quiser~"
10075-CVGroup_UIEventLobby_Idle4-1 = "C-côcegas, para com isso...\nChega! Já deu!"
10075-CVGroup_UIEventMission_Enter1-1 = "Missão!"
10075-CVGroup_UIEventMission_Enter1-2 = "Eu encaro o prazo de entrega dos meus manuscritos\ncomo um tipo de missão também."
10075-CVGroup_UIEventMission_Enter2-1 = "Já que fui encarregada, vou cumprir com certeza!\nÉ isso que a Frente de Libertação do Conhecimento faz!"
10075-CVGroup_UIEventMission_Idle1-1 = "O que foi, Sensei? ...Só queria me chamar?"
10075-CVGroup_UIEventMission_Idle1-2 = "Ah, não... quando você diz algo assim tão direto,\neu fico sem saber como reagir."
10075-CVGroup_UIEventMission_Buy1-1 = "Uau, incrível, incrível!\nNão é bajulação, não! É de verdade!"
10075-CVGroup_UIEventMission_Buy1-2 = "Olha só, veja a seriedade nos meus olhos!"
10075-CVGroup_UIEventMission_Buy2-1 = "Missão cumprida!\nPor favor, aceite a recompensa!"
10075-CVGroup_UIEventMission_Buy2-2 = "O que achou? Do meu sorriso de vendedora."
10075-CVGroup_UIEventMission_Interaction1-1 = "Tarefas diárias concluídas!\nVocê é tão certinho, Sensei...\nTalvez eu devesse aprender um pouco com você."
