[translation]
10075-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～"
10075-CVGroup_CharacterGet_Idle1-1 = "やっほー！私は知識解放戦線の姫木メル！\nメルリーって呼んでもいいよ、あ、そっちはHNね。\nよろしく、先生。"
10075-CVGroup_Cafe_Idle1-1 = "ネタ……ネタはどこだっ……！"
10075-CVGroup_Cafe_Idle2-1 = "まってまって……\nあの光景は、もしかして……？"
10075-CVGroup_Cafe_Idle3-1 = "やっぱ……もっと画力欲しいよぉ……。"
10075-CVGroup_Cafe_Idle4-1 = "もうちょっと手が速くならないかなぁ……\nついでに目と頭の回転も！"
10075-CVGroup_Cafe_Idle5-1 = "同人誌を出すときは、\n本名は使わないんだよ。"
10075-CVGroup_WeaponGet_Idle1-1 = "弘法筆を選ばずっていうけどそれでもツールは大事だからね。\nその……つまり、ありがとってことだよ。先生。"
10075-CVGroup_UIEventLobby_Enter1-1 = "よし、先生も揃ったことだし、\nこれより、知識解放戦線の時間だよ！"
10075-CVGroup_UIEventLobby_Enter2-1 = "おかえり、先生。\n色んな事件が起こってるみたいだし、外に出よっか！"
10075-CVGroup_UIEventLobby_Enter2-2 = "せっかくのネタが見つかるチャンス、\n逃すわけにはいかないじゃん？"
10075-CVGroup_UIEventLobby_Enter3-1 = "こんなことになるなんて、\n最初は思いもしなかったなぁ……。"
10075-CVGroup_UIEventLobby_Enter4-1 = "まさかこんな展開になるなんて……"
10075-CVGroup_UIEventLobby_Enter4-2 = "本当、人生どう転ぶか分かんないもんだねぇ……。"
10075-CVGroup_UIEventLobby_Enter5-1 = "色々あったけど、なんとか片付いたね。"
10075-CVGroup_UIEventLobby_Enter5-2 = "資料もたくさん集まったし、\n結果オーライってことで！"
10075-CVGroup_UIEventLobby_Idle1-1 = "呼んだ？"
10075-CVGroup_UIEventLobby_Idle1-2 = "私？\n……忙しいけど忙しくない、\nそんなとこだけど。"
10075-CVGroup_UIEventLobby_Idle2-1 = "モミジは背中を預けられる仲間で、後輩だよ！"
10075-CVGroup_UIEventLobby_Idle2-2 = "好みはまあ……\n人それぞれだし？"
10075-CVGroup_UIEventLobby_Idle3-1 = "なに？\n先生……もしかして暇？"
10075-CVGroup_UIEventLobby_Idle3-2 = "別に遊んでもいいけど～？"
10075-CVGroup_UIEventLobby_Idle4-1 = "く、くすぐったいってば……。\nもう！そこまでにして！"
10075-CVGroup_UIEventMission_Enter1-1 = "ミッション！"
10075-CVGroup_UIEventMission_Enter1-2 = "原稿の締め切りも、\nある種のミッションだと思って挑んでるんだ。"
10075-CVGroup_UIEventMission_Enter2-1 = "任された以上は、確実にこなす！\nそれが知識解放戦線だからね！"
10075-CVGroup_UIEventMission_Idle1-1 = "何？先生？……呼んでみたかっただけ？"
10075-CVGroup_UIEventMission_Idle1-2 = "いや～そんなセリフ、\n直球で言われると私も反応に困っちゃうじゃん。"
10075-CVGroup_UIEventMission_Buy1-1 = "おお、すごいすごい！\nお世辞じゃないよ！本心だよ！"
10075-CVGroup_UIEventMission_Buy1-2 = "ほら、このまじまじの大真面目な目をみて！"
10075-CVGroup_UIEventMission_Buy2-1 = "ミッションコンプリート！\n報酬を受け取ってくださーい！"
10075-CVGroup_UIEventMission_Buy2-2 = "どう？私の営業スマイル。"
10075-CVGroup_UIEventMission_Interaction1-1 = "日課コンプリート！\n律儀だなぁ、先生って……\n私も少しは見習おっかな。"
