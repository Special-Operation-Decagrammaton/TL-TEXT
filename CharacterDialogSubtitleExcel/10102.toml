[translation]
10102-CVGroup_UITitle_Idle1-1 = "B-Blue Archive...!"
10102-CVGroup_CharacterGet_Idle1-1 = "E-hehe, acabei vindo parar aqui no final das contas...! O verão, o mar... que felicidade...!"
10102-CVGroup_Cafe_Idle1-1 = "Este lugar é... para que serve exatamente?"
10102-CVGroup_Cafe_Idle2-1 = "Ehehe... está refrescante aqui... Embora eu imagine que esteja quente lá fora..."
10102-CVGroup_Cafe_Idle3-1 = "A Saori-nee-san, será que ela está bem agora...?"
10102-CVGroup_Cafe_Idle4-1 = "Posso escrever o cartão de sorteio da revista aqui...?"
10102-CVGroup_Cafe_Idle5-1 = "Sinto que o traje de banho está um pouco apertado... mas não é como se o meu corpo estivesse estranho, certo...?"
10102-CVGroup_WeaponGet_Idle1-1 = "E-ehehe, algo tão valioso para mim... Ah, mesmo que me peça para devolver depois, eu não vou devolver...!"
10102-CVGroup_UIEventLobby_Enter1-1 = "Ehehe, tem tantas pessoas se divertindo por todos os lados..."
10102-CVGroup_UIEventLobby_Enter2-1 = "O mar... o festival..."
10102-CVGroup_UIEventLobby_Enter2-2 = "Talvez este seja o auge da minha vida..."
10102-CVGroup_UIEventLobby_Enter3-1 = "Estou vivenciando muitas coisas pela primeira vez, em vários sentidos..."
10102-CVGroup_UIEventLobby_Enter3-2 = "Festivais na praia são sempre assim...?"
10102-CVGroup_UIEventLobby_Enter4-1 = "Tenho que aproveitar até o último momento,"
10102-CVGroup_UIEventLobby_Enter4-2 = "senão vou ficar com tanto remorso que nem vou conseguir dormir...!"
10102-CVGroup_UIEventLobby_Enter5-1 = "Acabou... Acabou mesmo..."
10102-CVGroup_UIEventLobby_Enter5-2 = "Acho que dias assim nunca mais virão na minha vida..."
10102-CVGroup_UIEventLobby_Enter6-1 = "Eh? Você vai me levar para o mar de novo?"
10102-CVGroup_UIEventLobby_Enter6-2 = "Ehehe, obrigada."
10102-CVGroup_UIEventLobby_Enter6-3 = "Então, da próxima vez, talvez um hotel resort..."
10102-CVGroup_UIEventLobby_Idle1-1 = "Hieh? T-tem algum trabalho para eu fazer?"
10102-CVGroup_UIEventLobby_Idle1-2 = "Só me chamou...? Por quê...?"
10102-CVGroup_UIEventLobby_Idle2-1 = "A Atsuko-chan e a Misaki-san ficam muito bem de traje de banho..."
10102-CVGroup_UIEventLobby_Idle2-2 = "Eh? Eu também fico bem? Obrigada..."
10102-CVGroup_UIEventLobby_Idle3-1 = "Eu peguei uma alga que veio parar na praia..."
10102-CVGroup_UIEventLobby_Idle3-2 = "Isso não é comestível, né...?"
10102-CVGroup_UIEventLobby_Idle4-1 = "O mar e o festival são divertidos, mas..."
10102-CVGroup_UIEventLobby_Idle4-2 = "No fim das contas, é por isso que dói tanto quando voltamos para a rotina..."
10102-CVGroup_UIEventShop_Enter1-1 = "Ehehe, vendem muitas coisas aqui."
10102-CVGroup_UIEventShop_Enter1-2 = "Se você quiser comprar para mim, eu não vou recusar, ehehe."
10102-CVGroup_UIEventShop_Enter2-1 = "Tantas coisas que parecem boas..."
10102-CVGroup_UIEventShop_Enter3-1 = "A loja fechou, não é?"
10102-CVGroup_UIEventShop_Enter3-2 = "Eu não pude comprar nada, mas foi divertido só de olhar..."
10102-CVGroup_UIEventShop_Idle1-1 = "E-eu não entendo muito bem o que é bom ou não..."
10102-CVGroup_UIEventShop_Idle1-2 = "Acho melhor o Sensei escolher..."
10102-CVGroup_UIEventShop_Idle2-1 = "H-hieee!?"
10102-CVGroup_UIEventShop_Buy1-1 = "E-eu nem sabia que isso existia...!"
10102-CVGroup_UIEventShop_Buy2-1 = "Comprar algo caro tão facilmente... adultos são incríveis..."
10102-CVGroup_UIEventShop_Buy3-1 = "Por acaso isso é um presente para mim...?"
10102-CVGroup_UIEventShop_Buy3-2 = "Se for, obrigada. Ehehe..."
10102-CVGroup_UIEventShop_Buy4-1 = "Ah, eu também estava de olho nisso. Ehehe."
