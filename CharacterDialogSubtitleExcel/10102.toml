[translation]
10102-CVGroup_UITitle_Idle1-1 = "ぶ、ブルーアーカイブ……！"
10102-CVGroup_CharacterGet_Idle1-1 = "え、えへへ、結局来てしまいました……！\n夏、海……幸せです……！"
10102-CVGroup_Cafe_Idle1-1 = "ここは……何をするところなんでしょう？"
10102-CVGroup_Cafe_Idle2-1 = "えへへ……涼しいですね……\n外に出たら暑いとは思いますが……。"
10102-CVGroup_Cafe_Idle3-1 = "サオリ姉さんは、今頃……。"
10102-CVGroup_Cafe_Idle4-1 = "雑誌の懸賞はがき、\nここで書いてもいいですか……？"
10102-CVGroup_Cafe_Idle5-1 = "水着が少しきついような気がしますが……\n私の体がヘンなわけじゃないですよね……？"
10102-CVGroup_WeaponGet_Idle1-1 = "え、えへへ、こんな貴重なものを私に……\nあ、後で返せって言われても返しませんから……！"
10102-CVGroup_UIEventLobby_Enter1-1 = "えへへ、あちこち、\n楽しそうな人がたくさんいますね……。"
10102-CVGroup_UIEventLobby_Enter2-1 = "海……お祭り……"
10102-CVGroup_UIEventLobby_Enter2-2 = "もしかしたら今が私の人生の最高潮かもしれません……。"
10102-CVGroup_UIEventLobby_Enter3-1 = "いろんな意味で初めて経験することばかりです……"
10102-CVGroup_UIEventLobby_Enter3-2 = "海のお祭りって元々こういうものなんですか……？"
10102-CVGroup_UIEventLobby_Enter4-1 = "さ、最後まで楽しんでおかないと、"
10102-CVGroup_UIEventLobby_Enter4-2 = "もったいなくて眠れないかもしれませんよ……！"
10102-CVGroup_UIEventLobby_Enter5-1 = "終わりました……\n終わってしまいましたね……"
10102-CVGroup_UIEventLobby_Enter5-2 = "もう私の人生にこんな日はこないでしょうね……。"
10102-CVGroup_UIEventLobby_Enter6-1 = "え？また海に連れてきてくださるんですか？"
10102-CVGroup_UIEventLobby_Enter6-2 = "えへへ、ありがとうございます。"
10102-CVGroup_UIEventLobby_Enter6-3 = "じゃあ次はリゾートホテルとかに……。"
10102-CVGroup_UIEventLobby_Idle1-1 = "ひえっ？\nな、何か任せる仕事でも？"
10102-CVGroup_UIEventLobby_Idle1-2 = "ただ呼んだだけ……？なんで……？"
10102-CVGroup_UIEventLobby_Idle2-1 = "あ、アツコちゃんやミサキさんは\n水着がよく似合ってますね……。"
10102-CVGroup_UIEventLobby_Idle2-2 = "え？私も似合ってる？ありがとうございます……。"
10102-CVGroup_UIEventLobby_Idle3-1 = "海辺に流れ着いた海藻を拾いましたけど……。"
10102-CVGroup_UIEventLobby_Idle3-2 = "これって食べられないですよね……？"
10102-CVGroup_UIEventLobby_Idle4-1 = "海もお祭りも楽しいですが……。"
10102-CVGroup_UIEventLobby_Idle4-2 = "やっぱりその分、\n日常に戻ったときに苦しいですよね……。"
10102-CVGroup_UIEventShop_Enter1-1 = "えへへ、ここはいろいろ売ってますね。"
10102-CVGroup_UIEventShop_Enter1-2 = "買っていただけるなら断りはしません、えヘヘ。"
10102-CVGroup_UIEventShop_Enter2-1 = "良さそうなものがいっぱい……。"
10102-CVGroup_UIEventShop_Enter3-1 = "ショップが終わってしまいましたね。"
10102-CVGroup_UIEventShop_Enter3-2 = "私は買えませんでしたが、\n見ているのは楽しかったです……。"
10102-CVGroup_UIEventShop_Idle1-1 = "わ、私は何がいいものなのかよくわからないので……"
10102-CVGroup_UIEventShop_Idle1-2 = "先生が選んだほうがいいと思いますけど……。"
10102-CVGroup_UIEventShop_Idle2-1 = "ひ、ひええっ！？"
10102-CVGroup_UIEventShop_Buy1-1 = "そ、そんなものもあったんですね……！"
10102-CVGroup_UIEventShop_Buy2-1 = "高いものをそんな簡単に……\n大人ってすごいですね……。"
10102-CVGroup_UIEventShop_Buy3-1 = "もしかして私へのプレゼントですか……？"
10102-CVGroup_UIEventShop_Buy3-2 = "もしそうでしたら、ありがとうございます。えヘヘ……"
10102-CVGroup_UIEventShop_Buy4-1 = "あ、それ、私も目をつけていたものです。えへへ。"
