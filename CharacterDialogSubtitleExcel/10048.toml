[translation]
10048-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10048-CVGroup_CharacterGet_Idle1-1 = "アリウススクワッドのサオリだ。\n……先生には色々と、世話になった。\nせめてその分の働きはしよう。よろしく頼む。"
10048-CVGroup_Cafe_Idle1-1 = "ふむ……。"
10048-CVGroup_Cafe_Idle2-1 = "こういう場所は慣れないな……。"
10048-CVGroup_Cafe_Idle3-1 = "これは、なんだ……？"
10048-CVGroup_Cafe_Idle4-1 = "理解ができない……。"
10048-CVGroup_Cafe_Idle5-1 = "なるほど、これはそういう物なのか……。"
10048-CVGroup_WeaponGet_Idle1-1 = "お前は……どうして私のことを信頼できる？\nあんなことがあったというのに……裏切られても、構わないというのか？\nまだ私には分からないことだらけだが、それでも……私は、最善を尽くそう。"
