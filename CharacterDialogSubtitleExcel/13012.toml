[translation]
13012-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
13012-CVGroup_CharacterGet_Idle1-1 = "ヴァルキューレ警察学校のキリノです！\nみなさん、手を上にあげて本官の指示に従ってください！"
13012-CVGroup_Cafe_Idle1-1 = "どれどれ、ここに隠れてる犯罪者はいませんよね？"
13012-CVGroup_Cafe_Idle2-1 = "こういうのは、ルール的にセーフなのでしょうか？"
13012-CVGroup_Cafe_Idle3-1 = "あの人、なんだか見たことあるような……\nもしかして指名手配犯？"
13012-CVGroup_Cafe_Idle4-1 = "本日も異常なし！"
13012-CVGroup_Cafe_Idle5-1 = "今日もキヴォトスは平和ですね！"
13012-CVGroup_WeaponGet_Idle1-1 = "この銃にふさわしいくらい、\n扱いが上手になれるよう精進しますね……！"
