[translation]
10133-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10133-CVGroup_CharacterGet_Idle1-1 = "Vou te mostrar a resposta mais racional para dominar o domínio eletrônico."
10133-CVGroup_Cafe_Idle1-1 = "Este lugar também é um tipo de espaço conceitual... Precisa de análise."
10133-CVGroup_Cafe_Idle2-1 = "Eu queria aprender a organizar as coisas melhor..."
10133-CVGroup_Cafe_Idle3-1 = "...Parece que a sensibilidade do Sensei é próxima da minha."
10133-CVGroup_Cafe_Idle4-1 = "Se eu criar o 'Avant-Garde-kun Tipo Maid', talvez eu o coloque aqui."
10133-CVGroup_Cafe_Idle5-1 = "Vou usar... o mais limpo possível."
10133-CVGroup_WeaponGet_Idle1-1 = "Eu vou proteger a todos... Essa vontade forte é o que me faz puxar o gatilho."
10133-CVGroup_UICarrierHangar_Enter1-1 = "Como devo interpretar este resultado...?"
10133-CVGroup_UICarrierHangar_Enter2-1 = "Este lugar era... um hangar."
10133-CVGroup_UICarrierHangar_Enter2-2 = "Acabou se tornando uma sala multiuso, não é?"
10133-CVGroup_UICarrierHangar_Enter3-1 = "A preparação para a atualização foi concluída."
10133-CVGroup_UICarrierHangar_Idle1-1 = "Alguma solução para romper o impasse..."
10133-CVGroup_UICarrierHangar_Idle2-1 = "Vamos analisar o núcleo do profeta aqui."
10133-CVGroup_UICarrierLobby_Enter1-1 = "(Eu estou aqui agora...)"
10133-CVGroup_UICarrierLobby_Enter1-2 = "(Será que esta é uma ação racional...?)"
10133-CVGroup_UICarrierLobby_Enter2-1 = "(Justamente por ser essa a situação)"
10133-CVGroup_UICarrierLobby_Enter2-2 = "(talvez jogar videogame seja algo racional...)"
10133-CVGroup_UICarrierLobby_Enter3-1 = "Este lugar, para me preparar para todas as possibilidades..."
10133-CVGroup_UICarrierLobby_Enter4-1 = "(Eu construí uma cozinha...)"
10133-CVGroup_UICarrierLobby_Enter4-2 = "(Será que foi irracional, afinal...?)"
10133-CVGroup_UICarrierLobby_Enter5-1 = "(Como posso iniciar uma conversa de forma eficiente...)"
10133-CVGroup_UICarrierLobby_Idle1-1 = "Por precaução, continuo monitorando."
10133-CVGroup_UICarrierLobby_Idle2-1 = "Videogame... mesmo sendo apenas um dispositivo simples e um programa..."
10133-CVGroup_UICarrierLobby_Idle3-1 = "(Departamento de Desenvolvimento de Jogos... sempre pensei nisso)"
10133-CVGroup_UICarrierLobby_Idle3-2 = "(elas são crianças difíceis de prever...)"
10133-CVGroup_UICarrierLobby_Idle4-1 = "Na verdade, eu..."
10133-CVGroup_UICarrierLobby_Idle4-2 = "Às vezes até falho ao preparar comida instantânea..."
10133-CVGroup_UICarrierLobby_Idle5-1 = "(Como conversar com outras pessoas...)"
10133-CVGroup_UICarrierLobby_Idle5-2 = "(Talvez eu deva consultar o Sensei...)"
