[translation]
26003-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
26003-CVGroup_CharacterGet_Idle1-1 = "ケガをされた方はいらっしゃいますか？\n私がすぐに駆け付けますよ。"
26003-CVGroup_Cafe_Idle1-1 = "ここに、体調が悪い人はいませんか？"
26003-CVGroup_Cafe_Idle2-1 = "見ているだけで心が温かくなる空間ですね。"
26003-CVGroup_Cafe_Idle3-1 = "こういうところなら、\n患者さんたちも早く完治できると思います。"
26003-CVGroup_Cafe_Idle4-1 = "たまにはこうして、余裕を楽しむのも悪くないですね。"
26003-CVGroup_Cafe_Idle5-1 = "あ……綺麗なピンク色……。"
26003-CVGroup_WeaponGet_Idle1-1 = "注射が痛いからって逃げたらだめですよ！"
