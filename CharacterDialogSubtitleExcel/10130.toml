[translation]
10130-CVGroup_UITitle_Idle1-1 = "Blue Archive, é isso. Fufu."
10130-CVGroup_CharacterGet_Idle1-1 = "Sou Hasumi Subaru.\nSe estiver em apuros, serei sua força.\nBem... contanto que seja ao \"estilo Arius\", é claro."
10130-CVGroup_Cafe_Idle1-1 = "Um café... parece um lugar caro."
10130-CVGroup_Cafe_Idle2-1 = "(De alguma forma... isso me lembra do tempo da água.)"
10130-CVGroup_Cafe_Idle3-1 = "Aquilo é... o que será?"
10130-CVGroup_Cafe_Idle4-1 = "(Eu não costumava vir a lugares como este...)"
10130-CVGroup_Cafe_Idle5-1 = "Trabalho de meio período no café...\nSerá que estão contratando?"
10130-CVGroup_WeaponGet_Idle1-1 = "Ainda não consigo acreditar... Toda vez que acordo de manhã, fico ansiosa pensando se foi apenas um sonho... Muito obrigada, Sensei. Vou cuidar muito bem disso."
