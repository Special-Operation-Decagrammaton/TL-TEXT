[translation]
16014-CVGroup_UITitle_Idle1-1 = "Blue Archive! Ehehe!"
16014-CVGroup_CharacterGet_Idle1-1 = "Ibuki chegou!\nSensei, desculpa a demora!"
16014-CVGroup_Cafe_Idle1-1 = "Sete vezes um é... sete...\nSete vezes dois... catorze..."
16014-CVGroup_Cafe_Idle2-1 = "O que é este lugar?\nPosso explorar, Sensei?"
16014-CVGroup_Cafe_Idle3-1 = "O que será que eu vou brincar com o Sensei..."
16014-CVGroup_Cafe_Idle4-1 = "Os adultos gostam desse tipo de coisa...?\nHumm, não entendo muito bem..."
16014-CVGroup_Cafe_Idle5-1 = "Ficar sozinha é tão chato..."
16014-CVGroup_WeaponGet_Idle1-1 = "Uau... Uauuu! Isso é para mim? De verdade?\n...Sério, é para a Ibuki...?\nUau! Sensei! Estou tão feliz! Vou cuidar muito bem disso!"
16014-CVGroup_UIEventShop_Enter1-1 = "Bem-vindo, Sensei!\nEhehe!"
16014-CVGroup_UIEventShop_Enter2-1 = "Está procurando alguma coisa?\nEu te ajudo!"
16014-CVGroup_UIEventShop_Enter3-1 = "Dançar na festa com o Sensei\nfoi super divertido!"
16014-CVGroup_UIEventShop_Enter3-2 = "Vamos vir juntos de novo! Prometido!"
16014-CVGroup_UIEventShop_Idle1-1 = "Hm?\nEu não estou à venda, sabia?"
16014-CVGroup_UIEventShop_Idle2-1 = "Bem, eu acho que...\nAquilo ali é uma boa escolha!"
16014-CVGroup_UIEventShop_Buy1-1 = "Obrigada pela preferência!"
16014-CVGroup_UIEventShop_Buy1-2 = "Volte sempre, Sensei!"
16014-CVGroup_UIEventShop_Buy2-1 = "É um presente...?\nSerá que é... para mim?"
16014-CVGroup_UIEventShop_Buy3-1 = "Isso! Eu também gosto disso!"
16014-CVGroup_UIEventShop_Buy4-1 = "Uau! É a primeira vez que vejo isso!\nEu nem sabia que existia!"
