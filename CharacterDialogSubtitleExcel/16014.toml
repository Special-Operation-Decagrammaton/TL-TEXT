[translation]
16014-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！えへへ！"
16014-CVGroup_CharacterGet_Idle1-1 = "イブキ登場！\n先生、おっまたせー！"
16014-CVGroup_Cafe_Idle1-1 = "しちいちが……しち……\nしちに……じゅうし……。"
16014-CVGroup_Cafe_Idle2-1 = "なあにここ？\nイブキ、探検してもいい～？"
16014-CVGroup_Cafe_Idle3-1 = "先生と何して遊ぼっかなあ……。"
16014-CVGroup_Cafe_Idle4-1 = "大人ってこういうのが好きなの……？\nうーん、よく分かんない……。"
16014-CVGroup_Cafe_Idle5-1 = "イブキ、一人はつまんな～い……。"
16014-CVGroup_WeaponGet_Idle1-1 = "うわぁ……うわああっ！これ、イブキにくれるの？本当に？\n……えっ、イブキだから……？\nうわあっ！先生！嬉しい！大事にするね！"
16014-CVGroup_UIEventShop_Enter1-1 = "いらっしゃいませ、先生～！\nえへへっ！"
16014-CVGroup_UIEventShop_Enter2-1 = "なんか探し物～？\nイブキも手伝ってあげる！"
16014-CVGroup_UIEventShop_Enter3-1 = "イブキ、先生とパーティーで踊るの、\nすっごく楽しかった！"
16014-CVGroup_UIEventShop_Enter3-2 = "また一緒に来ようね！約束だよ！"
16014-CVGroup_UIEventShop_Idle1-1 = "うん？\nイブキは売ってないよ～？"
16014-CVGroup_UIEventShop_Idle2-1 = "えっと、イブキはね！\nあれがいいと思う！"
16014-CVGroup_UIEventShop_Buy1-1 = "ご利用、ありがとうございました～！"
16014-CVGroup_UIEventShop_Buy1-2 = "また来てね！先生！"
16014-CVGroup_UIEventShop_Buy2-1 = "プレゼント用……？\nもしかして……イブキに？"
16014-CVGroup_UIEventShop_Buy3-1 = "それ！イブキも好き！"
16014-CVGroup_UIEventShop_Buy4-1 = "わっ！イブキ、初めて見た！\nそんなのもあったんだね！"
