[translation]
20026-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
20026-CVGroup_CharacterGet_Idle1-1 = "土木、建設、撤去……\n工務が必要なときは、いつでも呼んでくれ。\n革命とストライキなら……なお歓迎だ！"
20026-CVGroup_Cafe_Idle1-1 = "現場の最重要項目は、\n一に安全、二に安全だ。"
20026-CVGroup_Cafe_Idle2-1 = "ここの建築様式は……\n……悪くないとだけ言っておこう。"
20026-CVGroup_Cafe_Idle3-1 = "あたしたち工務部の手にかかれば、この程度……。"
20026-CVGroup_Cafe_Idle4-1 = "週3日労働……\nなんて美しい響き……。"
20026-CVGroup_Cafe_Idle5-1 = "ここのプリンは……\n事務局から普及されるものとは違うように思うな。"
20026-CVGroup_WeaponGet_Idle1-1 = "丈夫で信頼できる装備こそ、現場のベストパートナーだ。\nそういう意味で……こいつはあたしを失望させたことがない。"
