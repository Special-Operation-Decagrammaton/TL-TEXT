[translation]
20026-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20026-CVGroup_CharacterGet_Idle1-1 = "Obras civis, construção, demolição...\nSempre que precisar de serviços de engenharia, é só chamar.\nSe for para revolução e greve... melhor ainda!"
20026-CVGroup_Cafe_Idle1-1 = "O item mais importante no canteiro de obras é:\nprimeiro a segurança, segundo a segurança."
20026-CVGroup_Cafe_Idle2-1 = "O estilo arquitetônico daqui é...\n...direi apenas que não é ruim."
20026-CVGroup_Cafe_Idle3-1 = "Nas mãos do nosso Departamento de Obras, isso aqui é moleza..."
20026-CVGroup_Cafe_Idle4-1 = "Trabalhar 3 dias por semana...\nQue som maravilhoso..."
20026-CVGroup_Cafe_Idle5-1 = "O pudim daqui...\nSinto que é diferente do que é distribuído pela secretaria."
20026-CVGroup_WeaponGet_Idle1-1 = "Equipamentos resistentes e confiáveis são os melhores parceiros no campo de trabalho.\nNesse sentido... este aqui nunca me decepcionou."
