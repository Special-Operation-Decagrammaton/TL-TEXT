[translation]
10121-CVGroup_UITitle_Idle1-1 = "ぶる～！あーかいぶ～！"
10121-CVGroup_CharacterGet_Idle1-1 = "百花繚乱紛争調停委員会、勘解由小路ユカリ……\n華麗にさま～でびゅ～、ですの！\nびーちでも活躍して参りますわ！"
10121-CVGroup_Cafe_Idle1-1 = "いつ何時でも、身共はぱ～ふぇくと！ですの！"
10121-CVGroup_Cafe_Idle2-1 = "ああっ！これは先生が仰っていた……！"
10121-CVGroup_Cafe_Idle3-1 = "これは……？\n海でのえちけっと、なるものでしょうか？"
10121-CVGroup_Cafe_Idle4-1 = "少し肌寒いような……っくしゅっ！"
10121-CVGroup_Cafe_Idle5-1 = "ふん～ふふん～超無敵の～ユカリ出動ですわ～♪"
10121-CVGroup_WeaponGet_Idle1-1 = "これは身共と先生の約束のしるしです。\nきっと、これを見るたびに、身共は先生のことを思い浮かべるのでしょう。\nまったく……先生はいけずなお方です。"
10121-CVGroup_UIEventLobby_Enter1-1 = "ご覧ください先生！海ですの、海っ！"
10121-CVGroup_UIEventLobby_Enter2-1 = "ふふん～♪蒼は～水に入りて流るる～"
10121-CVGroup_UIEventLobby_Enter2-2 = "まさに、海！ですの！"
10121-CVGroup_UIEventLobby_Enter3-1 = "先輩方と同じ舞台で競う日が来るなんて……。"
10121-CVGroup_UIEventLobby_Enter3-2 = "で、でもこの百花繚乱のえり～とであり、希望の星である身共は！"
10121-CVGroup_UIEventLobby_Enter3-3 = "そう簡単に引き下がるわけには参りませんわ！"
10121-CVGroup_UIEventLobby_Enter4-1 = "待望の……くらいまっくす！ですの！"
10121-CVGroup_UIEventLobby_Enter4-2 = "ど、どうしましょう先生！\n身共、あまりの緊張に手が震えてきましたの！"
10121-CVGroup_UIEventLobby_Enter5-1 = "この短い期間で、先輩方の雰囲気が変わったように感じますわ。"
10121-CVGroup_UIEventLobby_Enter5-2 = "しかし皆さん、どんな時よりも輝いておりますの！"
10121-CVGroup_UIEventLobby_Idle1-1 = "……キキョウ先輩とレンゲ先輩は昔からの知り合いなのです。"
10121-CVGroup_UIEventLobby_Idle1-2 = "幼馴染、というやつですわ。"
10121-CVGroup_UIEventLobby_Idle1-3 = "お二人にはきっと、"
10121-CVGroup_UIEventLobby_Idle1-4 = "身共の知らない思い出がたくさんあるのでしょうね。"
10121-CVGroup_UIEventLobby_Idle1-5 = "そう考えると、なんだか少しさみしい気がします……。"
10121-CVGroup_UIEventLobby_Idle2-1 = "先生？どうしてそんなにじっと……？"
10121-CVGroup_UIEventLobby_Idle2-2 = "よかったら、身共と遊びに行きませんか！？"
10121-CVGroup_UIEventLobby_Idle3-1 = "ふふっ、先生ったらもう。"
10121-CVGroup_UIEventLobby_Idle3-2 = "見学したいと仰るのなら、身共もご一緒しますわ。"
10121-CVGroup_UIEventLobby_Idle4-1 = "皆さんなんだか、海に慣れているみたいですの。"
10121-CVGroup_UIEventLobby_Idle4-2 = "もしかして身共だけ、海びぎなー……でしょうか！？"
10121-CVGroup_UIEventShop_Enter1-1 = "わあ！不思議な物がいっぱいありますの！"
10121-CVGroup_UIEventShop_Enter1-2 = "先生、どれからご覧になりますか？"
10121-CVGroup_UIEventShop_Enter2-1 = "彩り豊かで見ていて飽きませんわ！ドキドキしますの～！"
10121-CVGroup_UIEventShop_Enter3-1 = "あぁ……楽しい時間はあっという間ですの……。"
10121-CVGroup_UIEventShop_Enter3-2 = "でも、しょんぼりした気持ちは、帰る前に全部振り払ってしまいますわ！"
10121-CVGroup_UIEventShop_Idle1-1 = "身共も知っています！\nこれがうぃんどーしょっぴんぐ、ですの！"
10121-CVGroup_UIEventShop_Idle2-1 = "ふふっ、心配はいりません。\n身共はいつも傍におりますわ。"
10121-CVGroup_UIEventShop_Buy1-1 = "わあっ！身共も近くで見たいですわ！"
10121-CVGroup_UIEventShop_Buy2-1 = "ふむ、先生はそのようなご趣味なのですね？"
10121-CVGroup_UIEventShop_Buy3-1 = "お目が高いっ！ですわ♪"
10121-CVGroup_UIEventShop_Buy4-1 = "ふんふふん～何にしようかな～♪"
