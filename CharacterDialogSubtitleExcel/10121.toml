[translation]
10121-CVGroup_UITitle_Idle1-1 = "Blue! Archive!"
10121-CVGroup_CharacterGet_Idle1-1 = "Do Comitê de Mediação de Conflitos Hyakkiyako, Kageyama Yukari...\nUma estreia esplêndida, é o que digo!\nTambém vou brilhar na praia!"
10121-CVGroup_Cafe_Idle1-1 = "A qualquer momento, eu sou perfeita! É o que digo!"
10121-CVGroup_Cafe_Idle2-1 = "Ah! Isso é o que o Sensei estava mencionando...!"
10121-CVGroup_Cafe_Idle3-1 = "Isto é...? Seria algo chamado etiqueta na praia?"
10121-CVGroup_Cafe_Idle4-1 = "Está um pouco frio... Atchim!"
10121-CVGroup_Cafe_Idle5-1 = "Hum-hum-hum~ A super invencível Yukari está entrando em ação~♪"
10121-CVGroup_WeaponGet_Idle1-1 = "Este é o símbolo da promessa entre mim e o Sensei.\nCom certeza, toda vez que eu olhar para isso, vou me lembrar do Sensei.\nSinceramente... o Sensei é uma pessoa travessa."
10121-CVGroup_UIEventLobby_Enter1-1 = "Veja só, Sensei! É o mar, o mar!"
10121-CVGroup_UIEventLobby_Enter2-1 = "Fufun~♪ O azul flui ao entrar na água~"
10121-CVGroup_UIEventLobby_Enter2-2 = "É exatamente o mar! É o que digo!"
10121-CVGroup_UIEventLobby_Enter3-1 = "Quem diria que chegaria o dia em que eu competiria no mesmo palco que as veteranas..."
10121-CVGroup_UIEventLobby_Enter3-2 = "Ma-mas eu, a elite e a estrela da esperança do Hyakkiyako!"
10121-CVGroup_UIEventLobby_Enter3-3 = "Não posso recuar tão facilmente!"
10121-CVGroup_UIEventLobby_Enter4-1 = "O tão esperado... clímax! É o que digo!"
10121-CVGroup_UIEventLobby_Enter4-2 = "O-o que eu faço, Sensei!\nMinhas mãos começaram a tremer de tanta tensão!"
10121-CVGroup_UIEventLobby_Enter5-1 = "Sinto que a atmosfera das veteranas mudou um pouco nesse curto período."
10121-CVGroup_UIEventLobby_Enter5-2 = "Mas todas elas estão brilhando mais do que nunca!"
10121-CVGroup_UIEventLobby_Idle1-1 = "...A veterana Kikyou e a veterana Renge se conhecem há muito tempo."
10121-CVGroup_UIEventLobby_Idle1-2 = "O que chamam de amigas de infância."
10121-CVGroup_UIEventLobby_Idle1-3 = "Com certeza, as duas..."
10121-CVGroup_UIEventLobby_Idle1-4 = "devem ter muitas memórias que eu desconheço."
10121-CVGroup_UIEventLobby_Idle1-5 = "Pensando nisso, sinto-me um pouco solitária..."
10121-CVGroup_UIEventLobby_Idle2-1 = "Sensei? Por que está me encarando assim...?"
10121-CVGroup_UIEventLobby_Idle2-2 = "Se quiser, por que não vamos passear comigo!?"
10121-CVGroup_UIEventLobby_Idle3-1 = "Fufu, Sensei, você não tem jeito."
10121-CVGroup_UIEventLobby_Idle3-2 = "Se você diz que quer observar, eu irei com você."
10121-CVGroup_UIEventLobby_Idle4-1 = "Parece que todas estão acostumadas com o mar."
10121-CVGroup_UIEventLobby_Idle4-2 = "Será que só eu sou uma iniciante no mar...?"
10121-CVGroup_UIEventShop_Enter1-1 = "Uau! Tem muitas coisas misteriosas aqui!"
10121-CVGroup_UIEventShop_Enter1-2 = "Sensei, por qual você quer começar a olhar?"
10121-CVGroup_UIEventShop_Enter2-1 = "É tão colorido que não me canso de olhar! Estou tão empolgada~!"
10121-CVGroup_UIEventShop_Enter3-1 = "Ah... o tempo divertido passa num piscar de olhos..."
10121-CVGroup_UIEventShop_Enter3-2 = "Mas vou espantar qualquer tristeza antes de ir embora!"
10121-CVGroup_UIEventShop_Idle1-1 = "Eu também sei! Isso é o que chamam de vitrinismo, é o que digo!"
10121-CVGroup_UIEventShop_Idle2-1 = "Fufu, não se preocupe.\nEu estarei sempre ao seu lado."
10121-CVGroup_UIEventShop_Buy1-1 = "Uau! Eu também quero ver de perto!"
10121-CVGroup_UIEventShop_Buy2-1 = "Hum, então esses são os seus gostos, Sensei?"
10121-CVGroup_UIEventShop_Buy3-1 = "Você tem um ótimo olho! É o que digo♪"
10121-CVGroup_UIEventShop_Buy4-1 = "Hum-hum-hum~ O que eu deveria escolher~♪"
