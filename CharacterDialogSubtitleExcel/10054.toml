[translation]
10054-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10054-CVGroup_CharacterGet_Idle1-1 = "Cultivar o corpo para nutrir uma mente saudável...\nQue haja bênçãos em seu caminho."
10054-CVGroup_Cafe_Idle1-1 = "Uau... que lugar maravilhoso."
10054-CVGroup_Cafe_Idle2-1 = "Será que há alguém...\nque precise de ajuda?"
10054-CVGroup_Cafe_Idle3-1 = "Vamos fazer uma pequena pausa?"
10054-CVGroup_Cafe_Idle4-1 = "Sinto meu corpo mais leve do que o normal..."
10054-CVGroup_Cafe_Idle5-1 = "...Hehe."
10054-CVGroup_WeaponGet_Idle1-1 = "Assim como o tiro que anuncia o início de uma partida,\nque esta pequena arma também sirva apenas para a paz..."
10054-CVGroup_UIEventLobby_Enter1-1 = "Sensei, por aqui!\nA partida vai começar em breve!"
10054-CVGroup_UIEventLobby_Enter2-1 = "Estávamos esperando por você, Sensei!\nEntão, vamos nessa."
10054-CVGroup_UIEventLobby_Enter3-1 = "Todos estão se esforçando muito, não é?"
10054-CVGroup_UIEventLobby_Enter3-2 = "Eu também me dedicarei para corresponder aos sentimentos de todos!"
10054-CVGroup_UIEventLobby_Enter4-1 = "Vamos dar o nosso melhor até o fim."
10054-CVGroup_UIEventLobby_Enter5-1 = "Sensei, bom trabalho hoje."
10054-CVGroup_UIEventLobby_Enter5-2 = "Talvez ainda haja alguém precisando de ajuda,"
10054-CVGroup_UIEventLobby_Enter5-3 = "então vamos dar mais uma olhada por aí."
10054-CVGroup_UIEventLobby_Idle1-1 = "Há algo em que eu possa ajudar?"
10054-CVGroup_UIEventLobby_Idle2-1 = "...Sensei?\nAconteceu alguma coisa...?"
10054-CVGroup_UIEventLobby_Idle3-1 = "S-ser chamada tantas vezes assim...\né um pouco embaraçoso..."
10054-CVGroup_UIEventShop_Enter1-1 = "Olá, Sensei.\nProcura por algo?"
10054-CVGroup_UIEventShop_Enter2-1 = "Gostaria de dar uma olhada, se quiser?"
10054-CVGroup_UIEventShop_Idle1-1 = "E-eu...? \nEu só pensei que...\npoderia ajudar o Sensei..."
10054-CVGroup_UIEventShop_Idle2-1 = "Ser encarada assim por tanto tempo... bem...\né um pouco embaraçoso..."
10054-CVGroup_UIEventShop_Buy1-1 = "Vou preparar isso para você agora mesmo."
10054-CVGroup_UIEventShop_Buy2-1 = "Precisa de mais alguma coisa?"
10054-CVGroup_UIEventShop_Buy3-1 = "Então você escolheu esse,\nentendido."
10054-CVGroup_UIEventShop_Buy4-1 = "Valerá a pena ter deixado tudo preparado."
10054-CVGroup_UIEventShop_Enter3-1 = "A partida terminou em segurança, mas\nainda sobraram alguns produtos."
10054-CVGroup_UIEventShop_Enter3-2 = "Se não for incômodo, poderia me ajudar a organizar?"
