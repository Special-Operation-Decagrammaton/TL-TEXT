[translation]
10054-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10054-CVGroup_CharacterGet_Idle1-1 = "健全な精神を育成するべく肉体を育む……\nその行く道にご加護があらんことを。"
10054-CVGroup_Cafe_Idle1-1 = "わぁ……素敵な場所ですね。"
10054-CVGroup_Cafe_Idle2-1 = "手助けが必要な方は……\nいらっしゃるでしょうか？"
10054-CVGroup_Cafe_Idle3-1 = "ひと休みしていきましょうか？"
10054-CVGroup_Cafe_Idle4-1 = "いつもより身体が軽い気がします……。"
10054-CVGroup_Cafe_Idle5-1 = "……ふふっ。"
10054-CVGroup_WeaponGet_Idle1-1 = "試合の始まりを知らせる銃声のように、\nどうかこの小さな武器も、平和のためのものでありますよう……。"
10054-CVGroup_UIEventLobby_Enter1-1 = "先生、こちらです！\nまもなく試合が始まります！"
10054-CVGroup_UIEventLobby_Enter2-1 = "お待ちしておりました、先生！\nそれでは、参りましょう。"
10054-CVGroup_UIEventLobby_Enter3-1 = "みなさん、とても頑張っていますね。"
10054-CVGroup_UIEventLobby_Enter3-2 = "私もみなさんの思いに応えられるよう、精進します！"
10054-CVGroup_UIEventLobby_Enter4-1 = "最後まで精一杯頑張りましょう。"
10054-CVGroup_UIEventLobby_Enter5-1 = "先生、お疲れ様でした。"
10054-CVGroup_UIEventLobby_Enter5-2 = "まだ助けが必要な方がいらっしゃるかもしれませんので、"
10054-CVGroup_UIEventLobby_Enter5-3 = "もうちょっと見て回りましょう。"
10054-CVGroup_UIEventLobby_Idle1-1 = "何かお手伝いできる事はありますか？"
10054-CVGroup_UIEventLobby_Idle2-1 = "……先生？\nどうかしましたか……？"
10054-CVGroup_UIEventLobby_Idle3-1 = "そ、そんな風に何度も呼ばれると……\n恥ずかしいです……。"
10054-CVGroup_UIEventShop_Enter1-1 = "こんにちは、先生。\n何かお探しですか？"
10054-CVGroup_UIEventShop_Enter2-1 = "よかったらご覧になりますか？"
10054-CVGroup_UIEventShop_Idle1-1 = "わ、私ですか……？\n私は……先生のお手伝いができれば、\nと思いまして……。"
10054-CVGroup_UIEventShop_Idle2-1 = "ずっと見つめられると……その……\n少し、恥ずかしいです……。"
10054-CVGroup_UIEventShop_Buy1-1 = "すぐにご用意いたしますね。"
10054-CVGroup_UIEventShop_Buy2-1 = "他に必要なものはありませんか？"
10054-CVGroup_UIEventShop_Buy3-1 = "それになさったのですね、\nかしこまりました。"
10054-CVGroup_UIEventShop_Buy4-1 = "準備しておいた甲斐がありました。"
10054-CVGroup_UIEventShop_Enter3-1 = "試合は無事終わりましたが、\n商品が残ってしまいましたね。"
10054-CVGroup_UIEventShop_Enter3-2 = "よろしければ、お片付けを手伝っていただけませんか？"
