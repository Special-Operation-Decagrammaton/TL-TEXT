[translation]
26008-CVGroup_UITitle_Idle1-1 = "ブル～アーカイブ！"
26008-CVGroup_CharacterGet_Idle1-1 = "夏と言えば、海の家！\n舞台が海でも、お祭り運営委員会は止まりませんよ！\n河和シズコ、行っきま～す！"
26008-CVGroup_Cafe_Idle1-1 = "夏の新しい主力商品……\nうーん、何かヒントは……。"
26008-CVGroup_Cafe_Idle2-1 = "フランチャイズ経営が、こんなに大変だったなんて……\n会議、会議、会議！\nそしてまた会議が……。"
26008-CVGroup_Cafe_Idle3-1 = "何か、次のお祭りに活かせそうなものは……。"
26008-CVGroup_Cafe_Idle4-1 = "いつか百夜堂を、キヴォトスいちの喫茶店に……！"
26008-CVGroup_Cafe_Idle5-1 = "あ、良いこと思いついた！\nイエスっ！"
26008-CVGroup_WeaponGet_Idle1-1 = "いつもこうやって、私のことを気にかけてくれて……。ありがとうございます、先生。\n先生がいれば、百夜堂はまだまだ進化して行けちゃいそうです！\n……うん、今のは良い感じ？"
26008-CVGroup_UIEventLobby_Enter1-1 = "いらっしゃいませ、先生！\n海の家バージョンの百夜堂へ、ようこそ！"
26008-CVGroup_UIEventLobby_Enter2-1 = "え゛、先生！？\nまだ準備、終わってないんですが……！？"
26008-CVGroup_UIEventLobby_Enter2-2 = "と、とりあえず！\nこちらへどうぞ！"
26008-CVGroup_UIEventLobby_Idle1-1 = "何か欲しい物は見つかりましたか？"
26008-CVGroup_UIEventLobby_Idle2-1 = "百夜堂はまだまだ進化しますよ！\nさあ、張り切っていきましょう！"
26008-CVGroup_UIEventLobby_Idle3-1 = "複数の店舗を同時に管理する、\nというのは大変ですね……。"
26008-CVGroup_UIEventLobby_Idle3-2 = "まぁ、楽しくもあるんですが！"
26008-CVGroup_UIEventLobby_Idle4-1 = "ちょっ、先生！\n私は売りものじゃないですよ！"
26008-CVGroup_UIEventLobby_Idle4-2 = "それに今は、営業時間なんですから……。"
26008-CVGroup_UIEventLobby_Enter3-1 = "最初は混乱してばかりでしたが……\nとはいえピンチはチャンス！"
26008-CVGroup_UIEventLobby_Enter3-2 = "この機会に、百夜堂をもっと広く知らしめてみせます！"
26008-CVGroup_UIEventLobby_Enter4-1 = "ふふふっ、\n今のところ計画通り……。"
26008-CVGroup_UIEventLobby_Enter4-2 = "あ、先生！いらっしゃいませ！\n先生のおかげで、色々と順調です！"
26008-CVGroup_UIEventLobby_Enter5-1 = "今回の計画は水の泡になってしまいましたが……。"
26008-CVGroup_UIEventLobby_Enter5-2 = "私の夢は、まだ何も終わっていませんので！"
26008-CVGroup_UIEventShop_Enter1-1 = "色々と、海で役立つものを取り揃えていますよ！"
26008-CVGroup_UIEventShop_Enter2-1 = "何か不要なものがあったら、交換も承ってます！"
26008-CVGroup_UIEventShop_Idle1-1 = "はいは～い、\n今シズコのこと呼びました？"
26008-CVGroup_UIEventShop_Idle2-1 = "良い物を適正価格で！\n商売の基本です！"
26008-CVGroup_UIEventShop_Buy1-1 = "ご利用ありがとうございました！"
26008-CVGroup_UIEventShop_Buy2-1 = "あ、良いですね！\n私としてもお薦めの品です！"
26008-CVGroup_UIEventShop_Buy3-1 = "満足いくお買い物になりましたか？\n口コミも大事なので、良かったら広めてくださいね！"
26008-CVGroup_UIEventShop_Buy4-1 = "はい、どうぞ！\nいつもありがとうございますっ！"
26008-CVGroup_UIEventShop_Enter3-1 = "残念ながら、海の家の営業は終了しました……"
26008-CVGroup_UIEventShop_Enter3-2 = "……が！大丈夫です、楽しい思い出は永遠なので！"
