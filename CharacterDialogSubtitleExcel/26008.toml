[translation]
26008-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
26008-CVGroup_CharacterGet_Idle1-1 = "Falando em verão, falamos de quiosque na praia!\nMesmo que o cenário seja o mar, o Comitê de Operações do Festival não para!\nKawa Shizuko, estou indo!"
26008-CVGroup_Cafe_Idle1-1 = "O novo produto principal para o verão...\nHmm, será que tem alguma dica..."
26008-CVGroup_Cafe_Idle2-1 = "Eu não sabia que gerenciar uma franquia era tão difícil...\nReunião, reunião, reunião!\nE depois, mais reuniões..."
26008-CVGroup_Cafe_Idle3-1 = "Será que tem algo que eu possa aproveitar para o próximo festival..."
26008-CVGroup_Cafe_Idle4-1 = "Um dia, farei da Hyakkiyako a melhor cafeteria de Kivotos...!"
26008-CVGroup_Cafe_Idle5-1 = "Ah, tive uma ideia!\nIsso!"
26008-CVGroup_WeaponGet_Idle1-1 = "Você sempre se preocupa comigo assim... Obrigada, Sensei.\nCom você aqui, a Hyakkiyako ainda vai evoluir muito!\n...Hum, essa ficou boa?"
26008-CVGroup_UIEventLobby_Enter1-1 = "Bem-vindo, Sensei!\nSeja bem-vindo à versão quiosque de praia da Hyakkiyako!"
26008-CVGroup_UIEventLobby_Enter2-1 = "Ah, Sensei!?\nOs preparativos ainda não terminaram...!?"
26008-CVGroup_UIEventLobby_Enter2-2 = "B-bem, de qualquer forma!\nPor favor, entre!"
26008-CVGroup_UIEventLobby_Idle1-1 = "Encontrou algo que queria?"
26008-CVGroup_UIEventLobby_Idle2-1 = "A Hyakkiyako ainda vai evoluir muito!\nVamos lá, com toda a energia!"
26008-CVGroup_UIEventLobby_Idle3-1 = "Gerenciar várias lojas ao mesmo tempo\né bem difícil..."
26008-CVGroup_UIEventLobby_Idle3-2 = "Mas, também é divertido!"
26008-CVGroup_UIEventLobby_Idle4-1 = "Ei, Sensei!\nEu não estou à venda!"
26008-CVGroup_UIEventLobby_Idle4-2 = "Além disso, agora estamos no horário de funcionamento..."
26008-CVGroup_UIEventLobby_Enter3-1 = "No começo foi só confusão...\nMas crise é oportunidade!"
26008-CVGroup_UIEventLobby_Enter3-2 = "Vou aproveitar essa chance para tornar a Hyakkiyako ainda mais conhecida!"
26008-CVGroup_UIEventLobby_Enter4-1 = "Fufufu,\npor enquanto, tudo conforme o planejado..."
26008-CVGroup_UIEventLobby_Enter4-2 = "Ah, Sensei! Bem-vindo!\nGraças a você, tudo está correndo bem!"
26008-CVGroup_UIEventLobby_Enter5-1 = "O plano desta vez acabou indo por água abaixo, mas..."
26008-CVGroup_UIEventLobby_Enter5-2 = "Meu sonho ainda não acabou!"
26008-CVGroup_UIEventShop_Enter1-1 = "Temos vários itens úteis para a praia!"
26008-CVGroup_UIEventShop_Enter2-1 = "Se tiver algo que não precise, também aceitamos trocas!"
26008-CVGroup_UIEventShop_Idle1-1 = "Sim, sim~\nChamou pela Shizuko?"
26008-CVGroup_UIEventShop_Idle2-1 = "Produtos bons a um preço justo!\nÉ o básico do comércio!"
26008-CVGroup_UIEventShop_Buy1-1 = "Obrigada pela preferência!"
26008-CVGroup_UIEventShop_Buy2-1 = "Ah, ótima escolha!\nEu também recomendo este item!"
26008-CVGroup_UIEventShop_Buy3-1 = "Ficou satisfeito com a compra?\nO boca a boca é importante, então, se puder, espalhe a notícia!"
26008-CVGroup_UIEventShop_Buy4-1 = "Sim, aqui está!\nMuito obrigada de sempre!"
26008-CVGroup_UIEventShop_Enter3-1 = "Infelizmente, as operações do quiosque de praia terminaram..."
26008-CVGroup_UIEventShop_Enter3-2 = "...Mas! Está tudo bem, as memórias divertidas são eternas!"
