[translation]
20017-CVGroup_UITitle_Idle1-1 = "えへへ……ブルーアーカイブ～……。"
20017-CVGroup_CharacterGet_Idle1-1 = "えへへ……何だかんだで、来てしまいました……\nこれからも辛いですよね？苦しいんですよね？ですが、それが人生のようですし……\n仕方ないですね。ヒヨリです、よろしくお願いいたします……えへへ。"
20017-CVGroup_Cafe_Idle1-1 = "えへへ。\n失礼します……。"
20017-CVGroup_Cafe_Idle2-1 = "何だか良さそうな家具が、たくさん……。"
20017-CVGroup_Cafe_Idle3-1 = "あれも、これも……良いですね……\n良さそうなものがたくさん……。"
20017-CVGroup_Cafe_Idle4-1 = "えへへ……\nご迷惑をおかけします、すみません……。"
20017-CVGroup_Cafe_Idle5-1 = "楽しい気分になれそうな……\nなれなさそうな……。"
20017-CVGroup_WeaponGet_Idle1-1 = "先生は私を、骨の髄までこき使うつもりなんですね……\nまあ、どうしようもありませんし……\n受け入れるとしましょう、えへへ……。"
