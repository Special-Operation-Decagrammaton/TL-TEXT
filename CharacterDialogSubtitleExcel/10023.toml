[translation]
10023-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10023-CVGroup_CharacterGet_Idle1-1 = "……べっ、別に遊んでるわけじゃない。\n偵察任務の途中だから、誤解しないで。"
10023-CVGroup_Cafe_Idle1-1 = "リゾート地だからって、規則違反は許さないからな。"
10023-CVGroup_Cafe_Idle2-1 = "規則違反をしてるやつは……\n今のところいなさそうだな。"
10023-CVGroup_Cafe_Idle3-1 = "（紫外線対策、しっかりしないと……）"
10023-CVGroup_Cafe_Idle4-1 = "（どこか、ビーチベッドを広げられそうなところは……）"
10023-CVGroup_Cafe_Idle5-1 = "（なっ、なんだか今、気持ち悪い視線を感じた気が……）"
10023-CVGroup_WeaponGet_Idle1-1 = "これは……ちゃんとした武器なのか？本当に？"
10023-CVGroup_UIEventShop_Enter1-1 = "やぁ、先生。\n夏合宿に必要なものなら、だいたい何でも揃ってるよ。"
10023-CVGroup_UIEventShop_Idle1-1 = "ヒナ委員長の忙しさに比べたら、\nこれくらい大したことじゃない。"
10023-CVGroup_UIEventShop_Buy1-1 = "うん、良いんじゃない？"
10023-CVGroup_UIEventShop_Buy2-1 = "へえ、気前が良いね。先生。"
10023-CVGroup_UIEventBoxGachaShop_Enter1-1 = "ゲヘナの校章が入った箱を拾ったら、渡して。\n色んなものと交換できるよ。"
10023-CVGroup_UIEventBoxGachaShop_Idle1-1 = "……なんでこっちをじっと見てるんだ？"
10023-CVGroup_UIEventBoxGachaShop_Idle1-2 = "タダではあげられないからな。"
10023-CVGroup_UIEventBoxGachaShop_Enter2-1 = "合宿期間も残り半分。\n必要なものがあるなら急いだ方が良い。"
10023-CVGroup_UIEventBoxGachaShop_Enter3-1 = "合宿期間もあと少しだ。\n何か必要なら早めに言って。"
10023-CVGroup_UIEventBoxGachaShop_Enter4-1 = "今日で最終日か。\n本当に目まぐるしいバカン……。"
10023-CVGroup_UIEventBoxGachaShop_Enter4-2 = "いや、合宿だった。"
10023-CVGroup_UIEventBoxGachaShop_Enter5-1 = "さ、もう夏も終わりだよ。\n何かやり残したことはないか、ちゃんと確認しておいて。"
10023-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "へえ……そんなものがあったのか。\n先生は運が良いね。"
