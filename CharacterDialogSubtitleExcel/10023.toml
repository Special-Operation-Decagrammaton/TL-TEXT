[translation]
10023-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10023-CVGroup_CharacterGet_Idle1-1 = "……E-eu não estou brincando, tá? Estou no meio de uma missão de reconhecimento, então não entenda errado."
10023-CVGroup_Cafe_Idle1-1 = "Só porque estamos em um resort, não significa que vou tolerar quebra de regras."
10023-CVGroup_Cafe_Idle2-1 = "Pelo que parece... não tem ninguém quebrando as regras por aqui agora."
10023-CVGroup_Cafe_Idle3-1 = "(Preciso me proteger bem dos raios UV...)"
10023-CVGroup_Cafe_Idle4-1 = "(Onde será que daria para abrir uma espreguiçadeira...)"
10023-CVGroup_Cafe_Idle5-1 = "(Q-que foi isso? Senti um olhar estranho agora há pouco...)"
10023-CVGroup_WeaponGet_Idle1-1 = "Isso é... uma arma de verdade? Sério mesmo?"
10023-CVGroup_UIEventShop_Enter1-1 = "Ei, Sensei. Se precisar de algo para o acampamento de verão, temos quase tudo aqui."
10023-CVGroup_UIEventShop_Idle1-1 = "Comparado à correria da Presidente Hina, isso não é nada."
10023-CVGroup_UIEventShop_Buy1-1 = "Hum, não é uma má escolha."
10023-CVGroup_UIEventShop_Buy2-1 = "Hoh, você é generoso, Sensei."
10023-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Se encontrar caixas com o emblema de Gehenna, me entregue. Posso trocar por várias coisas."
10023-CVGroup_UIEventBoxGachaShop_Idle1-1 = "……Por que está me encarando assim?"
10023-CVGroup_UIEventBoxGachaShop_Idle1-2 = "Não posso te dar de graça, sabe."
10023-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Já estamos na metade do acampamento. É melhor se apressar se precisar de algo."
10023-CVGroup_UIEventBoxGachaShop_Enter3-1 = "O acampamento já está quase acabando. Me avise logo se precisar de alguma coisa."
10023-CVGroup_UIEventBoxGachaShop_Enter4-1 = "Hoje é o último dia, hein? Que férias... digo, que acampamento agitado."
10023-CVGroup_UIEventBoxGachaShop_Enter4-2 = "Não, eu quis dizer acampamento."
10023-CVGroup_UIEventBoxGachaShop_Enter5-1 = "Bom, o verão está acabando. Verifique se não esqueceu de fazer nada."
10023-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Hoh... então tinha isso aí? Você tem sorte, Sensei."
