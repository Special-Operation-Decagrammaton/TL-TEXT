[translation]
20046-CVGroup_UITitle_Idle1-1 = "にゃはっ？ブルーアーカイブ～"
20046-CVGroup_CharacterGet_Idle1-1 = "さぁ～さぁ～皆の衆！刮目してご覧あれ♪\n百鬼夜行連合学院、陰陽部部長、\n天地ニヤのおなーりー！\n……なんちゃって。にゃははっ！"
20046-CVGroup_Cafe_Idle1-1 = "にゃは～……ちょっと一息。\nんふ、サボってないですよぉ？"
20046-CVGroup_Cafe_Idle2-1 = "先生にはこのような趣味が……ふむふむ。"
20046-CVGroup_Cafe_Idle3-1 = "惚れ惚れする光景ですねぇ♪にゃははっ！"
20046-CVGroup_Cafe_Idle4-1 = "カホは心配性だなぁ♪\nちゃ～んと頑張って働いてるのに……。\nま、嘘なんですが♪にゃははっ！"
20046-CVGroup_Cafe_Idle5-1 = "これはカホが……あっちはチセちゃんが喜びそうですねぇ……。"
20046-CVGroup_WeaponGet_Idle1-1 = "……お気持ちはありがたいのですが。いやはや、私に何を求めていらっしゃるのやら。\nんふふ……ですが、先生のご期待を裏切るわけにもいきませんし？\n困ってしまいますねぇ……本当に♪"
