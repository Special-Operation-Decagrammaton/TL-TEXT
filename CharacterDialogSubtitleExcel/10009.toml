[translation]
10009-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！"
10009-CVGroup_CharacterGet_Idle1-1 = "うわ！！私のことを探してくれてたの？\n一緒に美味しいもの食べに行こうよ！！"
10009-CVGroup_Cafe_Idle1-1 = "ハンバーガーが実る木があったらいいのに！\nいつか開発されるんじゃないかな？"
10009-CVGroup_Cafe_Idle2-1 = "よし！食べ物を探してみる！"
10009-CVGroup_Cafe_Idle3-1 = "よし、今日も頑張ろう！"
10009-CVGroup_Cafe_Idle4-1 = "特技？\nうん！食べることかな！"
10009-CVGroup_Cafe_Idle5-1 = "食事の時間だったら私を呼んでくれないと！"
10009-CVGroup_WeaponGet_Idle1-1 = "美味しいものを食べるための道具がまた一つ増えちゃった！\nもちろんお箸とかそういうのとは違うけど……。\nこれで、あれこれいっぱい食べに行こう、先生！"
