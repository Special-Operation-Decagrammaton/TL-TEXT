[translation]
20043-CVGroup_UITitle_Idle1-1 = "ブル～アーカイブ！"
20043-CVGroup_CharacterGet_Idle1-1 = "あけましておめでとうー！先生！\n今年も美食の冒険へ、いざゆかーん！"
20043-CVGroup_Cafe_Idle1-1 = "今年はどんな味に出会えるんだろう～？"
20043-CVGroup_Cafe_Idle2-1 = "び～しょくの～ぼ～けん\n楽しみだなぁ！"
20043-CVGroup_Cafe_Idle3-1 = "ここだと……アレ食べたいかも！"
20043-CVGroup_Cafe_Idle4-1 = "まずは私特製・秘伝ソースを持ってこなきゃ！"
20043-CVGroup_Cafe_Idle5-1 = "イワシミントたこ焼き、食べない？"
20043-CVGroup_WeaponGet_Idle1-1 = "美食の冒険はときに危険が伴うもの……\nだから、私が先生を守ってあげるね！"
20043-CVGroup_UIEventLobby_Enter1-1 = "さあ先生！新年だよ～！"
20043-CVGroup_UIEventLobby_Enter1-2 = "美食を求める冒険をはじめよっか！"
20043-CVGroup_UIEventLobby_Enter2-1 = "食べたいものとかある？"
20043-CVGroup_UIEventLobby_Enter2-2 = "私はね、あれもこれも、ぜーんぶ食べたい！"
20043-CVGroup_UIEventLobby_Idle1-1 = "美味しそう～に食べる先生を見ているだけで、"
20043-CVGroup_UIEventLobby_Idle1-2 = "すっごく幸せな気持ちになるんだ！"
20043-CVGroup_UIEventLobby_Idle2-1 = "先生と一緒にいると、発見がいっぱい！"
20043-CVGroup_UIEventLobby_Idle2-2 = "新しい味に出会ったときみたいに、ドキドキする！"
20043-CVGroup_UIEventLobby_Idle3-1 = "冒険は仲間と行くものなんだって！"
20043-CVGroup_UIEventLobby_Idle3-2 = "美食の冒険に出る時は、先生も一緒に行こ～！"
20043-CVGroup_UIEventLobby_Idle4-1 = "私も美食研究会の一員だもん！"
20043-CVGroup_UIEventLobby_Idle4-2 = "新しい味を探す冒険はやめないよ！"
20043-CVGroup_UIEventLobby_Idle4-3 = "それが私の、美食道！"
