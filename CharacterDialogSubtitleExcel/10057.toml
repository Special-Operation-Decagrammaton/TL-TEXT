[translation]
10057-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10057-CVGroup_CharacterGet_Idle1-1 = "ふふっ、あけましておめでとうございます。\n振袖姿に花を咲かせ、心新たに未知の食を求めに参りましょう。"
10057-CVGroup_Cafe_Idle1-1 = "料理の偉大なところは、一皿に全てが込められている点にあります。"
10057-CVGroup_Cafe_Idle2-1 = "ドレスコードやロケーションも、美食の大切な要素と言えるでしょう。"
10057-CVGroup_Cafe_Idle3-1 = "この時期は特別な料理が目白押しで……\nふふっ、楽しみです。"
10057-CVGroup_Cafe_Idle4-1 = "振袖の身のこなしでしたら、それなりに慣れております。"
10057-CVGroup_Cafe_Idle5-1 = "素敵なお料理が見つかれば良いのですが……。"
10057-CVGroup_WeaponGet_Idle1-1 = "特別な日に味わう料理は、これほどまでに素晴らしい味わいなのですね。\nこれでさらなる美食の道……そして先生に近づけたような気がいたします。\nいつも感謝しておりますわ、先生。"
10057-CVGroup_UIEventLobby_Enter1-1 = "先生、おかえりなさいませ。\nあら……お正月もお仕事ですか？時には休憩も大切ですよ。"
10057-CVGroup_UIEventLobby_Enter1-2 = "さあ、一緒にお茶を致しましょう。"
10057-CVGroup_UIEventLobby_Enter2-1 = "うふふ、お正月からお会いできるとは、\nうれしい限りですわ。"
10057-CVGroup_UIEventLobby_Enter2-2 = "私はいつでも準備できておりますよ？"
10057-CVGroup_UIEventLobby_Idle1-1 = "うふふ。お呼びですか、先生？"
10057-CVGroup_UIEventLobby_Idle2-1 = "そう何度もくすぐられては困ってしまいますわ。"
10057-CVGroup_UIEventLobby_Idle2-2 = "先生ったら、意外とイタズラがお好きなんですね？"
10057-CVGroup_UIEventLobby_Idle3-1 = "たしかに振袖は、少々煩わしく思うところもあります。"
10057-CVGroup_UIEventLobby_Idle3-2 = "ですが、これも全て美食の道へと通ずるのです。"
10057-CVGroup_UIEventLobby_Idle4-1 = "究極の味にたどり着くためには、\n揺るぎない覚悟が必要なのです。"
10057-CVGroup_UIEventLobby_Idle4-2 = "……誰にも私たちを止める事などできません。うふふっ。"
10057-CVGroup_UIEventLobby_Enter3-1 = "少しばかり複雑な状況ではありますが……。"
10057-CVGroup_UIEventLobby_Enter3-2 = "私の美食への思いは、この程度で挫けたりなどいたしません。"
10057-CVGroup_UIEventLobby_Enter4-1 = "各々が最善を尽くすことを願って。"
10057-CVGroup_UIEventLobby_Enter4-2 = "熱意と誠意を込めて、\n味わわせていただきましょう。"
10057-CVGroup_UIEventLobby_Enter5-1 = "時の流れに従って、事件は忘れられることでしょう。"
10057-CVGroup_UIEventLobby_Enter5-2 = "ですが、私と先生が覚えている限り……大丈夫ですわ。"
10057-CVGroup_UIEventLobby_Enter5-3 = "ええ、きっと。"
10057-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "先生もおみくじを引きに……？\nこちらですわ。"
10057-CVGroup_UIEventFortuneGachaShop_Enter1-2 = "うふふっ、そんなに焦らなくても大丈夫ですよ。"
10057-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "うふふっ……\nこのようなこと、初めて体験いたしましたわ。"
10057-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "なんだか楽しいですわね。"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "探し物は見つかりましたか？"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "うふふ、意外と身近なところにあるかもしれませんわよ？"
10057-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "落ち着いて、呼吸を整える時間も大切ですわ。"
10057-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "コース料理で頂くグラニテのように。"
10057-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "あら、大吉ですわ！\n流石先生、運も持っていますのね！"
10057-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "大吉を引いた先生には、特別な商品をご用意しておりますわ。"
10057-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "吉とは運が回ってきていますわね。"
10057-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "今年も素敵な一年になるよう、願っておりますわ。"
10057-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "中吉……なかなか良いですわね。\nこちらが中吉の商品です。"
10057-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "小吉……悪くはありませんわね。"
10057-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "福を呼び込むには、\n小さな積み重ねが大切と申しますもの。"
10057-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "末吉は、後に吉と転じる兆し……。"
10057-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "つまり、吉兆ですわね。\nはい、こちらをどうぞ。"
10057-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "大丈夫ですわ。\nおみくじの結果は現在の運勢ですもの。"
10057-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "今後、福に転じるとも申しますから……"
10057-CVGroup_UIEventFortuneGachaShop_Luck0-3 = "……え？私に慰められると、うれしいような悲しいような……？\nそ、それは一体……"
10057-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "先生、おみくじでしたら、まだ受け付けておりますよ。\n忘れずにお引きくださいね。"
