[translation]
10057-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10057-CVGroup_CharacterGet_Idle1-1 = "Fufu, feliz ano novo.\nCom este furisode, vamos florescer e partir em busca de novos sabores com um coração renovado."
10057-CVGroup_Cafe_Idle1-1 = "A grandeza da culinária está no fato de que tudo está contido em um único prato."
10057-CVGroup_Cafe_Idle2-1 = "O código de vestimenta e o local também podem ser considerados elementos importantes da gastronomia."
10057-CVGroup_Cafe_Idle3-1 = "Esta época é repleta de pratos especiais...\nFufu, estou ansiosa."
10057-CVGroup_Cafe_Idle4-1 = "Já estou bastante acostumada a me mover usando um furisode."
10057-CVGroup_Cafe_Idle5-1 = "Espero que possamos encontrar uma culinária maravilhosa..."
10057-CVGroup_WeaponGet_Idle1-1 = "A comida que saboreamos em um dia especial tem um gosto tão maravilhoso, não é?\nSinto que, com isso, me aproximei ainda mais do caminho da gastronomia... e de você, Sensei.\nSou sempre grata, Sensei."
10057-CVGroup_UIEventLobby_Enter1-1 = "Sensei, bem-vindo de volta.\nOra... trabalhando até no Ano Novo? Às vezes, descansar também é importante."
10057-CVGroup_UIEventLobby_Enter1-2 = "Vamos, vamos tomar um chá juntos."
10057-CVGroup_UIEventLobby_Enter2-1 = "Ufufu, poder encontrá-lo logo no Ano Novo,\né uma alegria imensa."
10057-CVGroup_UIEventLobby_Enter2-2 = "Eu estou sempre pronta, sabe?"
10057-CVGroup_UIEventLobby_Idle1-1 = "Ufufu. Me chamou, Sensei?"
10057-CVGroup_UIEventLobby_Idle2-1 = "Ficar me cutucando tantas vezes assim é um problema."
10057-CVGroup_UIEventLobby_Idle2-2 = "Sensei, você gosta de pregar peças mais do que eu imaginava, não é?"
10057-CVGroup_UIEventLobby_Idle3-1 = "É verdade que o furisode pode ser um pouco incômodo às vezes."
10057-CVGroup_UIEventLobby_Idle3-2 = "Mas tudo isso também faz parte do caminho da gastronomia."
10057-CVGroup_UIEventLobby_Idle4-1 = "Para alcançar o sabor supremo,\né necessária uma determinação inabalável."
10057-CVGroup_UIEventLobby_Idle4-2 = "...Ninguém pode nos parar. Ufufu."
10057-CVGroup_UIEventLobby_Enter3-1 = "Embora a situação seja um pouco complexa..."
10057-CVGroup_UIEventLobby_Enter3-2 = "Meu desejo pela gastronomia não será abalado por algo assim."
10057-CVGroup_UIEventLobby_Enter4-1 = "Desejando que cada um faça o seu melhor."
10057-CVGroup_UIEventLobby_Enter4-2 = "Vamos saborear tudo\ncom entusiasmo e sinceridade."
10057-CVGroup_UIEventLobby_Enter5-1 = "Com o passar do tempo, o incidente será esquecido."
10057-CVGroup_UIEventLobby_Enter5-2 = "Mas, enquanto eu e você, Sensei, nos lembrarmos... ficará tudo bem."
10057-CVGroup_UIEventLobby_Enter5-3 = "Sim, com certeza."
10057-CVGroup_UIEventFortuneGachaShop_Enter1-1 = "Sensei, também veio tirar um omikuji...?\nÉ por aqui."
10057-CVGroup_UIEventFortuneGachaShop_Enter1-2 = "Ufufu, não precisa ficar tão apressado."
10057-CVGroup_UIEventFortuneGachaShop_Enter2-1 = "Ufufu...\nÉ a primeira vez que experimento algo assim."
10057-CVGroup_UIEventFortuneGachaShop_Enter2-2 = "É bem divertido, não é?"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-1 = "Encontrou o que estava procurando?"
10057-CVGroup_UIEventFortuneGachaShop_Idle1-2 = "Ufufu, talvez esteja em um lugar mais próximo do que imagina?"
10057-CVGroup_UIEventFortuneGachaShop_Idle2-1 = "Acalmar-se e respirar fundo também é importante."
10057-CVGroup_UIEventFortuneGachaShop_Idle2-2 = "Como um granité servido durante um jantar completo."
10057-CVGroup_UIEventFortuneGachaShop_Luck5-1 = "Ora, um Dai-kichi (Grande Sorte)!\nComo esperado do Sensei, você também tem sorte!"
10057-CVGroup_UIEventFortuneGachaShop_Luck5-2 = "Preparei um item especial para o Sensei que tirou a Grande Sorte."
10057-CVGroup_UIEventFortuneGachaShop_Luck4-1 = "Kichi (Sorte) significa que a sorte está a seu favor."
10057-CVGroup_UIEventFortuneGachaShop_Luck4-2 = "Espero que este ano seja maravilhoso para você também."
10057-CVGroup_UIEventFortuneGachaShop_Luck3-1 = "Chu-kichi (Média Sorte)... nada mal.\nAqui está o seu item de Média Sorte."
10057-CVGroup_UIEventFortuneGachaShop_Luck2-1 = "Sho-kichi (Pequena Sorte)... não é ruim."
10057-CVGroup_UIEventFortuneGachaShop_Luck2-2 = "Dizem que para atrair a felicidade,\npequenos acúmulos são importantes."
10057-CVGroup_UIEventFortuneGachaShop_Luck1-1 = "Sue-kichi (Sorte no Final) é um sinal de que a sorte virá depois..."
10057-CVGroup_UIEventFortuneGachaShop_Luck1-2 = "Ou seja, é um bom presságio. Sim, aqui está."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-1 = "Está tudo bem.\nO resultado do omikuji é apenas a sorte atual."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-2 = "Dizem que, no futuro, pode se transformar em felicidade..."
10057-CVGroup_UIEventFortuneGachaShop_Luck0-3 = "...Eh? Você se sente feliz e triste ao mesmo tempo por ser consolado por mim...?\nI-isso é... o que significa?"
10057-CVGroup_UIEventFortuneGachaShop_Enter3-1 = "Sensei, se for sobre o omikuji, ainda estamos aceitando.\nNão se esqueça de tirar o seu."
