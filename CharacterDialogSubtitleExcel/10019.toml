[translation]
10019-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10019-CVGroup_CharacterGet_Idle1-1 = "Shirasu Azusa. Acabei de me transferir para a Academia Trinity.\nMinha especialidade é operar sozinha. Meu ponto forte é ser pequena e fácil de me esconder... acho que é só isso.\nTem mais alguma coisa que queira perguntar?"
10019-CVGroup_Cafe_Idle1-1 = "Hmm. Bem, não é ruim."
10019-CVGroup_Cafe_Idle2-1 = "(Tem muitas coisas raras aqui...)"
10019-CVGroup_Cafe_Idle3-1 = "O que é aquilo?"
10019-CVGroup_Cafe_Idle4-1 = "Hehe. Interessante."
10019-CVGroup_Cafe_Idle5-1 = "Q-que fofo...!"
10019-CVGroup_WeaponGet_Idle1-1 = "Eu quero que você decida como usar esse poder, Sensei.\nPorque agora... eu estou aqui por sua causa."
