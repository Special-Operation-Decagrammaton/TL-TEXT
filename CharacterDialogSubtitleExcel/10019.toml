[translation]
10019-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10019-CVGroup_CharacterGet_Idle1-1 = "白洲アズサ。最近、トリニティ総合学園に転校してきたばかり。\n得意なことは単独行動。長所は小柄で隠れやすいところ……それぐらいかな。\n他に何か聞きたいことは？"
10019-CVGroup_Cafe_Idle1-1 = "ふむ。まあ、悪くない。"
10019-CVGroup_Cafe_Idle2-1 = "（珍しいものがいっぱいだ……）"
10019-CVGroup_Cafe_Idle3-1 = "あれは何だろう？"
10019-CVGroup_Cafe_Idle4-1 = "ふふ。おもしろい。"
10019-CVGroup_Cafe_Idle5-1 = "か、かわいい……！"
10019-CVGroup_WeaponGet_Idle1-1 = "この力をどういう風に使うか、先生に決めてほしい。\n私は今……先生のためにここにいるから。"
