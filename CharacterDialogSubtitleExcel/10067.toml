[translation]
10067-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10067-CVGroup_CharacterGet_Idle1-1 = "Olá, Sensei. Sou a Toki.\nDeixe-me mostrar a essência de uma agente vestida com trajes de infiltração."
10067-CVGroup_Cafe_Idle1-1 = "Uma hora do chá tranquila...\nÉ uma experiência bastante revigorante."
10067-CVGroup_Cafe_Idle2-1 = "Este lugar enriquece o espírito, não é?"
10067-CVGroup_Cafe_Idle3-1 = "Se eu tivesse tempo e orçamento suficientes...\nEu também gostaria de criar um espaço como este."
10067-CVGroup_Cafe_Idle4-1 = "Como agente, nunca devemos baixar a guarda, mas...\nAo vir aqui, acabo relaxando sem perceber."
10067-CVGroup_Cafe_Idle5-1 = "É um lugar que me faz refletir sobre várias coisas toda vez que o visito.\nNo bom sentido."
10067-CVGroup_WeaponGet_Idle1-1 = "Ouvi dizer que, às vezes, é importante ser honesta e expressar seus sentimentos como eles são.\nObrigada, Sensei.\nSou sinceramente grata."
10067-CVGroup_UIEventLobby_Enter1-1 = "Sensei, você chegou."
10067-CVGroup_UIEventLobby_Enter1-2 = "A missão de infiltração está pronta."
10067-CVGroup_UIEventLobby_Enter2-1 = "Estou pronta.\nEstou aguardando suas ordens."
10067-CVGroup_UIEventLobby_Enter3-1 = "Parece que há algum segredo escondido aqui."
10067-CVGroup_UIEventLobby_Enter4-1 = "Entendo que você esteja confuso.\nMas, por favor, confie em mim."
10067-CVGroup_UIEventLobby_Enter4-2 = "Eu sempre estarei do lado do Sensei."
10067-CVGroup_UIEventLobby_Enter5-1 = "Fico feliz que tudo tenha terminado bem."
10067-CVGroup_UIEventLobby_Enter5-2 = "Com base nas lições de hoje, continuarei me esforçando para ser uma agente ainda mais perfeita."
10067-CVGroup_UIEventLobby_Idle1-1 = "Sim, Sensei. Aconteceu algo?"
10067-CVGroup_UIEventLobby_Idle2-1 = "Ugh...\nEsta roupa faz com que as sensações sejam transmitidas diretamente..."
10067-CVGroup_UIEventLobby_Idle2-2 = "...bem, é natural, já que o material é fino..."
10067-CVGroup_UIEventLobby_Idle3-1 = "Um traje de coelhinha, você diz?"
10067-CVGroup_UIEventLobby_Idle3-2 = "Acho que tem suas vantagens, diferentes do traje de empregada."
10067-CVGroup_UIEventLobby_Idle4-1 = "Diz que o traje de coelhinha combina comigo?"
10067-CVGroup_UIEventLobby_Idle4-2 = "Hum... bem, obrigada.\nNão esperava receber um elogio..."
10067-CVGroup_UIEventMission_Enter1-1 = "Era você, Sensei.\nA missão de hoje é esta."
10067-CVGroup_UIEventMission_Enter2-1 = "Missões são uma das prioridades."
10067-CVGroup_UIEventMission_Enter2-2 = "Vamos avançar passo a passo hoje também."
10067-CVGroup_UIEventMission_Idle1-1 = "As tarefas diárias podem ser um fardo às vezes."
10067-CVGroup_UIEventMission_Idle1-2 = "Não se preocupe, eu serei a força do Sensei."
10067-CVGroup_UIEventMission_Idle2-1 = "Agentes e missões são inseparáveis."
10067-CVGroup_UIEventMission_Idle2-2 = "...O que significa que, agora, o Sensei também é um agente."
10067-CVGroup_UIEventMission_Buy1-1 = "Missão de hoje concluída.\nBom trabalho, Sensei."
10067-CVGroup_UIEventMission_Buy2-1 = "Mesmo para mim, foi uma agenda bem puxada."
10067-CVGroup_UIEventMission_Buy2-2 = "Como esperado do Sensei."
10067-CVGroup_UIEventMiniGameMission_Enter1-1 = "Era você, Sensei.\nA missão de hoje é esta."
10067-CVGroup_UIEventMiniGameMission_Enter2-1 = "Missões são uma das prioridades."
10067-CVGroup_UIEventMiniGameMission_Enter2-2 = "Vamos avançar passo a passo hoje também."
10067-CVGroup_UIEventMiniGameMission_Idle1-1 = "As tarefas diárias podem ser um fardo às vezes."
10067-CVGroup_UIEventMiniGameMission_Idle1-2 = "Não se preocupe, eu serei a força do Sensei."
10067-CVGroup_UIEventMiniGameMission_Idle2-1 = "Agentes e missões são inseparáveis."
10067-CVGroup_UIEventMiniGameMission_Idle2-2 = "...O que significa que, agora, o Sensei também é um agente."
10067-CVGroup_UIEventMiniGameMission_Buy1-1 = "Missão de hoje concluída.\nBom trabalho, Sensei."
10067-CVGroup_UIEventMiniGameMission_Buy2-1 = "Mesmo para mim, foi uma agenda bem puxada."
10067-CVGroup_UIEventMiniGameMission_Buy2-2 = "Como esperado do Sensei."
