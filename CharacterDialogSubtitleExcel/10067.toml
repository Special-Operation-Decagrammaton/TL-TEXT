[translation]
10067-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10067-CVGroup_CharacterGet_Idle1-1 = "こんにちは、先生。トキです。\n潜入用衣装に身を包んだエージェントとしての真髄、お見せしましょう。"
10067-CVGroup_Cafe_Idle1-1 = "穏やかなティータイム……。\nなかなか新鮮な経験です。"
10067-CVGroup_Cafe_Idle2-1 = "ここは、心を豊かにしてくれますね。"
10067-CVGroup_Cafe_Idle3-1 = "十分な時間と予算があったら……\n私もこういう空間を作りたいです。"
10067-CVGroup_Cafe_Idle4-1 = "エージェントたる者、油断は禁物なのですが……\nここに来ると、つい気が緩んでしまうのです。"
10067-CVGroup_Cafe_Idle5-1 = "訪れるたびに、いろいろな事を考えさせてくれる場所です。\n良い意味で。"
10067-CVGroup_WeaponGet_Idle1-1 = "時には素直に、ありのままの気持ちを伝えることも大事と聞きました。\nありがとうございます、先生。\n心から、感謝しております。"
10067-CVGroup_UIEventLobby_Enter1-1 = "先生、来ましたか。"
10067-CVGroup_UIEventLobby_Enter1-2 = "潜入任務、準備は完了しております。"
10067-CVGroup_UIEventLobby_Enter2-1 = "準備はできています。\nいつでもご指示を。"
10067-CVGroup_UIEventLobby_Enter3-1 = "ここには、何か秘密が隠れていそうです。"
10067-CVGroup_UIEventLobby_Enter4-1 = "困惑する気持ちは分かります。\nですが私を信じてください。"
10067-CVGroup_UIEventLobby_Enter4-2 = "私はいつでも先生の味方です。"
10067-CVGroup_UIEventLobby_Enter5-1 = "すべて、つつがなくまとまって何よりです。"
10067-CVGroup_UIEventLobby_Enter5-2 = "今回の教訓を基に、より完璧なエージェントを目指し努めて参ります。"
10067-CVGroup_UIEventLobby_Idle1-1 = "はい、先生。何かありましたか？"
10067-CVGroup_UIEventLobby_Idle2-1 = "うっ……\nこの服は、感覚がダイレクトに伝わりますね……"
10067-CVGroup_UIEventLobby_Idle2-2 = "……素材が薄いから、当然ですが……。"
10067-CVGroup_UIEventLobby_Idle3-1 = "バニースーツ、ですか？"
10067-CVGroup_UIEventLobby_Idle3-2 = "メイド服とは異なる利点があって、よいと思っております。"
10067-CVGroup_UIEventLobby_Idle4-1 = "バニー姿、よく似合ってる、ですか？"
10067-CVGroup_UIEventLobby_Idle4-2 = "ん……その、ありがとう、ございます。\n褒められるとは、思ってもおらず……。"
10067-CVGroup_UIEventMission_Enter1-1 = "先生でしたか。\n本日のミッションは、こちらになります。"
10067-CVGroup_UIEventMission_Enter2-1 = "ミッションは重要事項の一つです。"
10067-CVGroup_UIEventMission_Enter2-2 = "今日も一歩ずつ、着実に進んでいきましょう。"
10067-CVGroup_UIEventMission_Idle1-1 = "毎日課せられる日課は、時に負担になることもあります。"
10067-CVGroup_UIEventMission_Idle1-2 = "大丈夫です、私が先生の力になります。"
10067-CVGroup_UIEventMission_Idle2-1 = "エージェントとミッションは、切っても切れない関係。"
10067-CVGroup_UIEventMission_Idle2-2 = "……つまり今の先生は、エージェントでもあるという事です。"
10067-CVGroup_UIEventMission_Buy1-1 = "本日のミッション、コンプリートです。\nお疲れ様でした、先生。"
10067-CVGroup_UIEventMission_Buy2-1 = "私からみてもかなりハードなスケジュールでした。"
10067-CVGroup_UIEventMission_Buy2-2 = "さすがです、先生。"
10067-CVGroup_UIEventMiniGameMission_Enter1-1 = "先生でしたか。\n本日のミッションは、こちらになります。"
10067-CVGroup_UIEventMiniGameMission_Enter2-1 = "ミッションは重要事項の一つです。"
10067-CVGroup_UIEventMiniGameMission_Enter2-2 = "今日も一歩ずつ、着実に進んでいきましょう。"
