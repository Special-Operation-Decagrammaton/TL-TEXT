[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10142-CVGroup_UITitle_Idle1-1 = "Blue... Archive." 
10142-CVGroup_CharacterGet_Idle1-1 = "Já que viemos para a praia... eu quero criar memórias inesquecíveis com todos.\nSensei, você também... vai me acompanhar?" 
10142-CVGroup_Cafe_Idle1-1 = "Onde será que fica o lugar mais fresquinho..." 
10142-CVGroup_Cafe_Idle2-1 = "A nossa confraternização... mal posso esperar." 
10142-CVGroup_Cafe_Idle3-1 = "Eu quero mostrar... um lado mais digno de uma presidente." 
10142-CVGroup_Cafe_Idle4-1 = "Eu não quero... chamar muita atenção..." 
10142-CVGroup_Cafe_Idle5-1 = "Quero guardar com carinho as memórias de hoje." 
10142-CVGroup_WeaponGet_Idle1-1 = "Eu ainda sou cheia de falhas e defeitos.\nMesmo assim, quero continuar segurando a Hyakuren.\nE não é... para fingir ser a presidente da Hyakkaryouran.\n――E sim para enfrentar o meu próprio coração." 
10142-CVGroup_UIEventLobby_Enter1-1 = "Sensei, você vai acompanhar o nosso desempenho?" 
10142-CVGroup_UIEventLobby_Enter2-1 = "Fufu, vou te mostrar o poder que eu mantinha selado até agora." 
10142-CVGroup_UIEventLobby_Enter3-1 = "Ainda temos uma folga, mas não vamos baixar a guarda." 
10142-CVGroup_UIEventLobby_Enter4-1 = "É a reta final, não é." 
10142-CVGroup_UIEventLobby_Enter4-2 = "Pessoal, vamos dar o nosso melhor." 
10142-CVGroup_UIEventLobby_Enter5-1 = "Sensei, obrigada por ficar até o final." 
10142-CVGroup_UIEventLobby_Enter5-2 = "Vamos nos divertir juntos na próxima vez também." 
10142-CVGroup_UIEventLobby_Idle1-1 = "O festival está bem animado, né." 
10142-CVGroup_UIEventLobby_Idle1-2 = "Até eu estou começando a ficar empolgada." 
10142-CVGroup_UIEventLobby_Idle2-1 = "O sol está forte... precisamos nos proteger dos raios UV direitinho." 
10142-CVGroup_UIEventLobby_Idle2-2 = "Dizem que queimadura de sol é um tipo de queimadura mesmo." 
10142-CVGroup_UIEventLobby_Idle3-1 = "Você está... curioso sobre mim?" 
10142-CVGroup_UIEventLobby_Idle3-2 = "Me desculpe. Acabei chamando muita atenção." 
10142-CVGroup_UIEventLobby_Idle4-1 = "O yakitori que a gente come nos festivais tem um gostinho todo especial." 
10142-CVGroup_UIEventLobby_Idle4-2 = "Você não acha, Sensei?" 