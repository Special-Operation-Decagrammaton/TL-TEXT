[translation]
10142-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ。"
10142-CVGroup_CharacterGet_Idle1-1 = "こうして海に来たんだもの……みんなと忘れられない思い出を作りたいんだ。\n先生も、一緒に……付き合ってくれる？"
10142-CVGroup_Cafe_Idle1-1 = "一番涼しいのはどこだろう……。"
10142-CVGroup_Cafe_Idle2-1 = "親睦会……楽しみ。"
10142-CVGroup_Cafe_Idle3-1 = "委員長らしいところを……見せたいな。"
10142-CVGroup_Cafe_Idle4-1 = "あんまり、目立ちたくないな……。"
10142-CVGroup_Cafe_Idle5-1 = "今日の思い出、大切にしたい。"
10142-CVGroup_WeaponGet_Idle1-1 = "私はまだまだ足りないことだらけ。\nそれでも、この百蓮を持ち続けたいと思う。\nそれは……百花繚乱の委員長を演じるためじゃない。\n――自分自身の心と向き合うために。"
10142-CVGroup_UIEventLobby_Enter1-1 = "先生、私たちの活躍を見届けてくれる？"
10142-CVGroup_UIEventLobby_Enter2-1 = "ふふっ、今まで封じてた力、見せてあげる。"
10142-CVGroup_UIEventLobby_Enter3-1 = "まだ余裕はあるけど、気を抜かずにいこう。"
10142-CVGroup_UIEventLobby_Enter4-1 = "ラストスパートだね。"
10142-CVGroup_UIEventLobby_Enter4-2 = "みんな、頑張ろう。"
10142-CVGroup_UIEventLobby_Enter5-1 = "先生、最後までありがとう。"
10142-CVGroup_UIEventLobby_Enter5-2 = "次も一緒に楽しもうね。"
10142-CVGroup_UIEventLobby_Idle1-1 = "お祭り、大盛り上がりだね。"
10142-CVGroup_UIEventLobby_Idle1-2 = "こっちまで熱くなってくる。"
10142-CVGroup_UIEventLobby_Idle2-1 = "日差しが強い……ちゃんと紫外線対策しないと。"
10142-CVGroup_UIEventLobby_Idle2-2 = "日焼けって火傷なんだって。"
10142-CVGroup_UIEventLobby_Idle3-1 = "私が……気になるの？"
10142-CVGroup_UIEventLobby_Idle3-2 = "ごめんなさい。目立ってしまって。"
10142-CVGroup_UIEventLobby_Idle4-1 = "お祭りで食べる焼き鳥って、特別な感じがする。"
10142-CVGroup_UIEventLobby_Idle4-2 = "先生もそう思わない？"
