[translation]
10142-CVGroup_UITitle_Idle1-1 = "Blue... Archive."
10142-CVGroup_CharacterGet_Idle1-1 = "Раз уж мы проделали такой путь до самого пляжа... я хочу оставить незабываемые воспоминания вместе со всеми.\nСенсей, ты... разделишь их со мной?"
10142-CVGroup_Cafe_Idle1-1 = "Интересно, где тут самое прохладное место?.."
10142-CVGroup_Cafe_Idle2-1 = "Я с нетерпением жду... нашей дружеской встречи."
10142-CVGroup_Cafe_Idle3-1 = "Мне хочется доказать... что я способна вести себя как подобает главе комитета."
10142-CVGroup_Cafe_Idle4-1 = "Я бы предпочла не слишком сильно выделяться..."
10142-CVGroup_Cafe_Idle5-1 = "Я хочу бережно хранить в памяти всё, что произойдёт сегодня."
10142-CVGroup_WeaponGet_Idle1-1 = "Мне всё ещё многого не хватает. Но даже так, я хочу и дальше держать в руках этот Хяккарюран.\nИ вовсе не для того... чтобы просто играть роль главы комитета Хяккарюран.\n— А чтобы заглянуть в своё собственное сердце."
10142-CVGroup_UIEventLobby_Enter1-1 = "Сенсей, ты ведь присмотришь за нашими успехами?"
10142-CVGroup_UIEventLobby_Enter2-1 = "Хе-хе, я покажу тебе силу, которую до сих пор держала под замком."
10142-CVGroup_UIEventLobby_Enter3-1 = "У нас ещё остались силы,\nно давай не терять концентрацию."
10142-CVGroup_UIEventLobby_Enter4-1 = "Выходим на финишную прямую."
10142-CVGroup_UIEventLobby_Enter4-2 = "Девочки, давайте выложимся на полную."
10142-CVGroup_UIEventLobby_Enter5-1 = "Сенсей, спасибо, что оставался с нами до самого конца."
10142-CVGroup_UIEventLobby_Enter5-2 = "В следующий раз давай тоже повеселимся вместе."
10142-CVGroup_UIEventLobby_Idle1-1 = "Фестиваль действительно разгорается не на шутку."
10142-CVGroup_UIEventLobby_Idle1-2 = "Это и меня саму начинает по-настоящему заводить."
10142-CVGroup_UIEventLobby_Idle2-1 = "Солнце сегодня палит... Нужно обязательно защитить кожу от ультрафиолета."
10142-CVGroup_UIEventLobby_Idle2-2 = "Я слышала, что солнечный ожог — это, вообще-то, полноценный термический ожог."
10142-CVGroup_UIEventLobby_Idle3-1 = "Ты... интересуешься мной?"
10142-CVGroup_UIEventLobby_Idle3-2 = "Прости. В итоге я опять привлекла к себе слишком много внимания."
10142-CVGroup_UIEventLobby_Idle4-1 = "Якитори, которые ешь прямо на фестивале, кажутся какими-то особенными."
10142-CVGroup_UIEventLobby_Idle4-2 = " Ты ведь тоже так думаешь, Сенсей?"
