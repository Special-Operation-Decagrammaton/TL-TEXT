[translation]
10142-CVGroup_UITitle_Idle1-1 = "Blue... Archive."
10142-CVGroup_CharacterGet_Idle1-1 = "Since we've come all the way to the beach... I want to make unforgettable memories with everyone.\nSensei, will you... join me?"
10142-CVGroup_Cafe_Idle1-1 = "I wonder where the coolest spot is..."
10142-CVGroup_Cafe_Idle2-1 = "I'm looking forward to the social gathering..."
10142-CVGroup_Cafe_Idle3-1 = "I want to show... that I can act like a committee chair."
10142-CVGroup_Cafe_Idle4-1 = "I'd rather not stand out too much..."
10142-CVGroup_Cafe_Idle5-1 = "I want to cherish today's memories."
10142-CVGroup_WeaponGet_Idle1-1 = "I'm still lacking in so many ways.\nEven so, I want to keep holding this Hyakuren.\nIt's not... to play the part of the Hyakkaryouran committee chair.\n—It's to face my own heart."
10142-CVGroup_UIEventLobby_Enter1-1 = "Sensei, will you watch over our efforts?"
10142-CVGroup_UIEventLobby_Enter2-1 = "Hehe, I'll show you the power I've kept sealed until now."
10142-CVGroup_UIEventLobby_Enter3-1 = "I still have some energy left, but let's stay focused."
10142-CVGroup_UIEventLobby_Enter4-1 = "It's the final spurt."
10142-CVGroup_UIEventLobby_Enter4-2 = "Everyone, let's do our best."
10142-CVGroup_UIEventLobby_Enter5-1 = "Sensei, thank you for staying with us until the end."
10142-CVGroup_UIEventLobby_Enter5-2 = "Let's have fun together next time, too."
10142-CVGroup_UIEventLobby_Idle1-1 = "The festival is really heating up."
10142-CVGroup_UIEventLobby_Idle1-2 = "It's getting me fired up, too."
10142-CVGroup_UIEventLobby_Idle2-1 = "The sun is strong... I need to make sure I protect myself from UV rays."
10142-CVGroup_UIEventLobby_Idle2-2 = "I heard that a sunburn is actually a burn."
10142-CVGroup_UIEventLobby_Idle3-1 = "Are you... interested in me?"
10142-CVGroup_UIEventLobby_Idle3-2 = "I'm sorry. I ended up standing out."
10142-CVGroup_UIEventLobby_Idle4-1 = "Yakitori eaten at a festival feels special somehow."
10142-CVGroup_UIEventLobby_Idle4-2 = "Don't you think so, Sensei?"