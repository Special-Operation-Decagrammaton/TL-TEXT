[translation]
10137-CVGroup_UITitle_Idle1-1 = "Blue~ Archive~"
10137-CVGroup_CharacterGet_Idle1-1 = "Ah, e aí, e aí. Sou Shima Konoka, do Departamento\nde Segurança Pública da Escola de Polícia Valkyrie.\nQuer dar uma olhada no horóscopo de hoje comigo?"
10137-CVGroup_Cafe_Idle1-1 = "Tem tanta~ gente aqui~"
10137-CVGroup_Cafe_Idle2-1 = "(Bom, cadê os criminosos... é, acho que não tem nenhum por aqui)"
10137-CVGroup_Cafe_Idle3-1 = "Ué? Onde foi que eu meti o meu distintivo...?"
10137-CVGroup_Cafe_Idle4-1 = "Tão pacífico. Haa... Que tédio."
10137-CVGroup_Cafe_Idle5-1 = "Isso aqui é legalizado?"
10137-CVGroup_WeaponGet_Idle1-1 = "Ah, eu queria isso aqui!\nCom isso a conversa vai se resolver rapidinho!"
10137-CVGroup_UIEventLobby_Enter1-1 = "Aparece, Tsuchinoko! Cadê você!?"
10137-CVGroup_UIEventLobby_Enter1-2 = "Se eu te pegar, você vai ver só..."
10137-CVGroup_UIEventLobby_Enter1-3 = "N-Não! Quer dizer, aparece!"
10137-CVGroup_UIEventLobby_Enter2-1 = "Uugh... que medo..."
10137-CVGroup_UIEventLobby_Enter3-1 = "Por que isso parece até assédio―― Hiii!?\nQ-Quem tá aí...?"
10137-CVGroup_UIEventLobby_Enter4-1 = "Mesmo que seja um fantasma, se der pra colocar algemas nele...!"
10137-CVGroup_UIEventLobby_Enter5-1 = "Acabou tudo bem!\nO destino é moleza! Hahaha――"
10137-CVGroup_UIEventLobby_Enter5-2 = "N-Não! Esquece o que eu disse!\nNão é moleza não! Me desculpa!!"
10137-CVGroup_UIEventLobby_Idle1-1 = "H-Hyaah!? ...Poxa, que susto!"
10137-CVGroup_UIEventLobby_Idle2-1 = "Ufa... Pelo menos o ar puro daqui é gostoso."
10137-CVGroup_UIEventLobby_Idle3-1 = "Tsuchinoko!\nSe eu te pegar, com certeza não vou te deixar escapar!"
10137-CVGroup_UIEventLobby_Idle4-1 = "Mantenha a calma... mantenha a calma..."
10137-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Bora! Vamos continuar mandando ver!!"
10137-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Como estava o horóscopo hoje?\nEu acredito na sua sorte, Sensei!"
10137-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Hora da faxina!\nVamos aguentar firme até o fim!"
10137-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Você vai dividir a sua sorte comigo? Aee, valeu!"
10137-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Já que eu tô com o Sensei, a gente dá um jeito!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Kuuuh! É disso que eu tô falando!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Você tá com uma sorte incrível!?\nSensei, você é incrível pra caramba!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Seria tão bom se fosse assim todo dia~"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Por via das dúvidas, vou investigar até o finalzinho!"