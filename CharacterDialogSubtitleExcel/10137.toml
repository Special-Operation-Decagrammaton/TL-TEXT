[translation]
10137-CVGroup_UITitle_Idle1-1 = "Blue Archive~"
10137-CVGroup_CharacterGet_Idle1-1 = "А, привет! Я Шима Конока из Бюро общественной безопасности полицейской академии Валькирия.\nНе хочешь проверить со мной сегодняшнюю удачу?"
10137-CVGroup_Cafe_Idle1-1 = "Здесь... так много людей."
10137-CVGroup_Cafe_Idle2-1 = "(Так, а что насчёт преступников... ну, здесь их, кажется, нет.)"
10137-CVGroup_Cafe_Idle3-1 = "А? Мой значок... куда же я его положила...?"
10137-CVGroup_Cafe_Idle4-1 = "Тут так спокойно. Эх... мне скучно."
10137-CVGroup_Cafe_Idle5-1 = "А это вообще легально?"
10137-CVGroup_WeaponGet_Idle1-1 = "О, я как раз это хотела! С этим я запросто со всем разберусь!"
10137-CVGroup_UIEventLobby_Enter1-1 = "Цутиноко, эй! Ты где?!"
10137-CVGroup_UIEventLobby_Enter1-2 = "Если я тебя поймаю, тебе несдобровать..."
10137-CVGroup_UIEventLobby_Enter1-3 = "Н-нет! А ну вылезай!"
10137-CVGroup_UIEventLobby_Enter2-1 = "Угх... так страшно..."
10137-CVGroup_UIEventLobby_Enter3-1 = "Почему это похоже на какое-то издевательство... Ой!? К-кто здесь...?"
10137-CVGroup_UIEventLobby_Enter4-1 = "Да будь это хоть призрак, если я смогу нацепить на него наручники...!"
10137-CVGroup_UIEventLobby_Enter5-1 = "Мы закончили без происшествий! Судьба — это проще простого! Ха-ха-ха! —"
10137-CVGroup_UIEventLobby_Enter5-2 = "Н-нет! Забудь, что я сказала! Совсем не проще простого! Извините!!"
10137-CVGroup_UIEventLobby_Idle1-1 = "Х-хья!? ...Ну блин, ты меня пугаешь!"
10137-CVGroup_UIEventLobby_Idle2-1 = "Фух... здесь хотя бы воздух приятный."
10137-CVGroup_UIEventLobby_Idle3-1 = "Цутиноко! Если я тебя поймаю, то уже ни за что не отпущу!"
10137-CVGroup_UIEventLobby_Idle4-1 = "Спокойно... только спокойно..."
10137-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Отлично! Продолжаем в том же духе!"
10137-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Ну как твоё сегодняшнее гадание? Я верю в твою удачу, Сенсей!"
10137-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Время уборки! Давайте выложимся на полную до самого конца!"
10137-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Поделишься со мной своей удачей? Ура!"
10137-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Раз уж я с Сенсеем, то всё как-нибудь образуется!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "О-о-о! Это именно то, что нужно!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Тебе невероятно везёт?! Сенсей, ты потрясающий!"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Хочу, чтобы каждый день был таким~"
10137-CVGroup_UIEventBoxGachaShop_BoxGachaFinish1-1 = "Я проведу расследование до самого конца, просто на всякий случай!"
