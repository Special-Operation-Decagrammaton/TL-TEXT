[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10072-CVGroup_UITitle_Idle1-1 = "Blue, Archive!" 
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT 2, preparativos para a operação concluídos.\nMesmo estando no mar, não negligenciarei o meu dever de vigilância!" 
10072-CVGroup_Cafe_Idle1-1 = "（Como eu imaginava, essa roupa é muito difícil de se movimentar em ambientes fechados...）" 
10072-CVGroup_Cafe_Idle2-1 = "（Será que aquilo ali... dá pra comer...?）" 
10072-CVGroup_Cafe_Idle3-1 = "Na nossa próxima operação...\nMe vestir daquele jeito talvez não seja uma má ideia." 
10072-CVGroup_Cafe_Idle4-1 = "Não me diga que aquilo é...\nAquela arma que eu só vi nos manuais de operações...?" 
10072-CVGroup_Cafe_Idle5-1 = "Em reconhecimento, nada de anormal." 
10072-CVGroup_WeaponGet_Idle1-1 = "Metralhadora RABBIT Tipo-26, recebida com sucesso.\nA impermeabilização está perfeita para que não quebre mesmo debaixo d'água.\nClaro que, quando a batalha acabar, vou ter que fazer uma manutenção completa..." 
10072-CVGroup_UIEventLobby_Enter1-1 = "A primeira operação expedicionária do Esquadrão RABBIT...\nMeu coração está pulando de empolgação." 
10072-CVGroup_UIEventLobby_Enter2-1 = "Chegou a hora de mostrarmos do que nós da SRT somos feitas!" 
10072-CVGroup_UIEventLobby_Enter3-1 = "Suspeito...\nCom certeza tem alguma coisa rolando nessa vila." 
10072-CVGroup_UIEventLobby_Enter4-1 = "Não estou muito a fim de apoiar essa vizinhança nada amigável, mas..." 
10072-CVGroup_UIEventLobby_Enter4-2 = "Dar suporte aos civis também faz parte do trabalho das Forças Especiais." 
10072-CVGroup_UIEventLobby_Enter5-1 = "Que bom que o mal-entendido foi resolvido.\nCom isso, a escassez de camarão também foi solucionada." 
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT 2, pronta para ação!\nMe dê as ordens quando quiser!" 
10072-CVGroup_UIEventLobby_Idle2-1 = "Tentei me vestir como uma turista normal para não levantar suspeitas, mas..." 
10072-CVGroup_UIEventLobby_Idle2-2 = "Você acha que... alguém vai desconfiar de mim?" 
10072-CVGroup_UIEventLobby_Idle3-1 = "Com licença... Sensei,\ntem alguma coisa suja na minha barriga?" 
10072-CVGroup_UIEventLobby_Idle4-1 = "Pra ser sincera, não sou muito fã de frutos do mar.\nÉ muito chato de conservar." 
10072-CVGroup_UIEventLobby_Idle4-2 = "Aah, mas se for lula seca ou algo do tipo...\nAté que eu gosto!" 