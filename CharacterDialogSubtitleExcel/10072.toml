[translation]
10072-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT2, pronto para a operação.\nMesmo sendo no mar, não vou descuidar da vigilância!"
10072-CVGroup_Cafe_Idle1-1 = "(Realmente, esse traje é difícil de se mover em ambientes fechados...)"
10072-CVGroup_Cafe_Idle2-1 = "(Aquilo é... será que dá para comer...?)"
10072-CVGroup_Cafe_Idle3-1 = "Na próxima operação...\nTalvez não seja uma má ideia usar algo assim."
10072-CVGroup_Cafe_Idle4-1 = "Será que aquilo é...\nA tal arma que eu só vi nos manuais de instrução...?"
10072-CVGroup_Cafe_Idle5-1 = "Em patrulha, sem anormalidades."
10072-CVGroup_WeaponGet_Idle1-1 = "Metralhadora RABBIT Modelo 26, recebida com sucesso.\nFiz um tratamento à prova d'água para que ela não quebre nem debaixo d'água.\nClaro, preciso fazer a manutenção adequada quando a batalha terminar..."
10072-CVGroup_UIEventLobby_Enter1-1 = "A primeira operação de expedição do RABBIT Squad, hein...\nEstou um pouco empolgada."
10072-CVGroup_UIEventLobby_Enter2-1 = "Agora é a nossa vez, da SRT!"
10072-CVGroup_UIEventLobby_Enter3-1 = "Suspeito...\nEssa vila, com certeza tem algo errado aqui."
10072-CVGroup_UIEventLobby_Enter4-1 = "Não estou muito animada em ajudar esses moradores rudes, mas..."
10072-CVGroup_UIEventLobby_Enter4-2 = "Apoiar os cidadãos também é trabalho de uma unidade especial."
10072-CVGroup_UIEventLobby_Enter5-1 = "Que bom que o mal-entendido foi resolvido.\nCom isso, a escassez de camarão foi resolvida."
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT2, pronto para a ação!\nEstou pronta a qualquer momento!"
10072-CVGroup_UIEventLobby_Idle2-1 = "Eu tentei usar um traje que parecesse com o de uma turista comum, mas..."
10072-CVGroup_UIEventLobby_Idle2-2 = "Será que... não estou parecendo suspeita?"
10072-CVGroup_UIEventLobby_Idle3-1 = "Ei... Sensei,\nTem algo na minha barriga?"
10072-CVGroup_UIEventLobby_Idle4-1 = "Na verdade, eu não gosto muito de frutos do mar.\nÉ difícil de conservar, sabe."
10072-CVGroup_UIEventLobby_Idle4-2 = "Ah, mas se for algo seco, como lula desidratada...\nEu gosto disso também!"
