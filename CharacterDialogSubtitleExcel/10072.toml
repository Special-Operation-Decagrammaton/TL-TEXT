[translation]
10072-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ！"
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT2、作戦準備完了。\n海とはいえ、警戒任務は怠らないぞ！"
10072-CVGroup_Cafe_Idle1-1 = "（やはりこの格好、室内では動きづらいな……）"
10072-CVGroup_Cafe_Idle2-1 = "（あれは……食べられるんだろうか……？）"
10072-CVGroup_Cafe_Idle3-1 = "次の作戦では……\nああいう格好をするのも、悪くないかもしれないな。"
10072-CVGroup_Cafe_Idle4-1 = "あれはまさか……\n教範でしか見たことがない、例の武器……？"
10072-CVGroup_Cafe_Idle5-1 = "偵察中、異常なし。"
10072-CVGroup_WeaponGet_Idle1-1 = "RABBIT26式機関銃、確かに受け取った。\n水中でも壊れないように、防水処理もバッチリだ。\nもちろん、戦闘が終わったらきちんと整備しないとだけど……。"
10072-CVGroup_UIEventLobby_Enter1-1 = "RABBIT小隊初の遠征作戦か……\n少し心が躍っている。"
10072-CVGroup_UIEventLobby_Enter2-1 = "今こそ、私たちSRTの出番だな！"
10072-CVGroup_UIEventLobby_Enter3-1 = "怪しい……。\nこの村、絶対何かあるだろ。"
10072-CVGroup_UIEventLobby_Enter4-1 = "不愛想な住民の支援なんか、気が進まないが……"
10072-CVGroup_UIEventLobby_Enter4-2 = "市民のサポートも、特殊部隊の仕事だからな。"
10072-CVGroup_UIEventLobby_Enter5-1 = "誤解が解けてよかった。\nこれでエビ不足は解消されたな。"
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT2、準備完了！\nいつでもいけるぞ！"
10072-CVGroup_UIEventLobby_Idle2-1 = "一応、普通の観光客っぽい格好をしてみたんだが……"
10072-CVGroup_UIEventLobby_Idle2-2 = "怪しまれたり……しないよな？"
10072-CVGroup_UIEventLobby_Idle3-1 = "あの……先生、\n私のお腹に、なにかついてるのか？"
10072-CVGroup_UIEventLobby_Idle4-1 = "私、実は海産物はあまり好きじゃないんだ。\n保存が難しいからな。"
10072-CVGroup_UIEventLobby_Idle4-2 = "ああでも、乾燥イカみたいな干物なら……\n私も好きだぞ！"
