[translation]
10072-CVGroup_UITitle_Idle1-1 = "Blue... Archive!"
10072-CVGroup_CharacterGet_Idle1-1 = "RABBIT2, preparativos para a operação concluídos.\nMesmo estando no mar, não negligenciarei meu dever de vigilância!"
10072-CVGroup_Cafe_Idle1-1 = "(Como eu imaginava, é difícil se movimentar com essa roupa em lugares fechados...)"
10072-CVGroup_Cafe_Idle2-1 = "(Será que... aquilo ali é comestível...?)"
10072-CVGroup_Cafe_Idle3-1 = "Para a próxima operação...\nUsar um traje daquele tipo também não seria uma má ideia."
10072-CVGroup_Cafe_Idle4-1 = "Não me diga que aquilo é...\nA tal arma que eu só tinha visto nos manuais táticos...?"
10072-CVGroup_Cafe_Idle5-1 = "Reconhecimento em andamento. Sem anormalidades."
10072-CVGroup_WeaponGet_Idle1-1 = "Metralhadora RABBIT-26, recebida com sucesso.\nO tratamento de impermeabilização está perfeito para garantir que ela não quebre debaixo d'água.\nClaro que, assim que o combate terminar, vou ter que fazer a manutenção rigorosa dela..."
10072-CVGroup_UIEventLobby_Enter1-1 = "A primeira operação expedicionária do Esquadrão RABBIT...\nMeu coração está até um pouco acelerado."
10072-CVGroup_UIEventLobby_Enter2-1 = "Chegou a hora de nós, da SRT, entrarmos em ação!"
10072-CVGroup_UIEventLobby_Enter3-1 = "Suspeito...\nCom certeza tem alguma coisa acontecendo por trás dessa vila."
10072-CVGroup_UIEventLobby_Enter4-1 = "Eu não estou muito a fim de dar apoio para moradores tão antipáticos, mas..."
10072-CVGroup_UIEventLobby_Enter4-2 = "Dar suporte aos civis também é trabalho das Forças Especiais."
10072-CVGroup_UIEventLobby_Enter5-1 = "Ainda bem que o mal-entendido foi resolvido.\nCom isso, a escassez de camarões acabou."
10072-CVGroup_UIEventLobby_Idle1-1 = "RABBIT2, preparativos concluídos!\nEstou pronta para ir a qualquer momento!"
10072-CVGroup_UIEventLobby_Idle2-1 = "Por precaução, eu tentei me vestir como uma turista normal, mas..."
10072-CVGroup_UIEventLobby_Idle2-2 = "Não estou... parecendo suspeita, estou?"
10072-CVGroup_UIEventLobby_Idle3-1 = "Uhm... Sensei,\nTem alguma coisa grudada na minha barriga?"
10072-CVGroup_UIEventLobby_Idle4-1 = "Para falar a verdade, eu não gosto muito de frutos do mar frescos.\nEles são difíceis de conservar a longo prazo."
10072-CVGroup_UIEventLobby_Idle4-2 = "Ah, mas se for comida desidratada, tipo lula seca...\nAí eu gosto!"