[translation]
16011-CVGroup_UITitle_Idle1-1 = "Blue Archive."
16011-CVGroup_CharacterGet_Idle1-1 = "Ora, Sensei. Nos encontramos aqui também.\nSou Hasumi Hanekawa, do Comitê de Justiça da Academia Trinity.\nDesta vez, fui designada para atuar como membro do comitê executivo representando Trinity. Conto com o seu apoio."
16011-CVGroup_Cafe_Idle1-1 = "……É um lugar muito bem organizado."
16011-CVGroup_Cafe_Idle2-1 = "Será que é estranho eu estar vestida assim, mesmo não estando em uma arena……?"
16011-CVGroup_Cafe_Idle3-1 = "Ah…… aquilo é……?"
16011-CVGroup_Cafe_Idle4-1 = "Diferente do habitual, sinto vontade de correr um pouco."
16011-CVGroup_Cafe_Idle5-1 = "(Ugh…… o maior inimigo da dieta……)"
16011-CVGroup_WeaponGet_Idle1-1 = "Muito obrigada, Sensei. Sinto como se tivesse recebido uma bandeira de campeã.\nDesde que o Sensei esteja comigo, não perderemos daqui para frente.\nPor isso, conto com você de agora em diante."
16011-CVGroup_UIEventLobby_Enter1-1 = "Estava à sua espera, Sensei.\nEstá pronto?"
16011-CVGroup_UIEventLobby_Enter2-1 = "A partida está prestes a começar.\nVamos juntos?"
16011-CVGroup_UIEventLobby_Enter3-1 = "Está bem animado, não é?"
16011-CVGroup_UIEventLobby_Enter3-2 = "Sendo assim, podemos considerar que o \"Festival Esportivo Halo\" foi um sucesso……"
16011-CVGroup_UIEventLobby_Enter4-1 = "O \"Festival Esportivo Halo\" está chegando à reta final."
16011-CVGroup_UIEventLobby_Enter4-2 = "Vamos nos esforçar até o fim."
16011-CVGroup_UIEventLobby_Enter5-1 = "Graças ao Sensei, o \"Festival Esportivo Halo\" foi um grande sucesso."
16011-CVGroup_UIEventLobby_Enter5-2 = "Muito obrigada pelo seu trabalho duro."
16011-CVGroup_UIEventLobby_Idle1-1 = "Se, Sensei……?"
16011-CVGroup_UIEventLobby_Idle2-1 = "E-eu não sei o que dizer sendo encarada assim……"
16011-CVGroup_UIEventLobby_Idle3-1 = "Já está na hora de partirmos……"
16011-CVGroup_UIEventLobby_Idle4-1 = "Precisa de alguma coisa?"
16011-CVGroup_UIEventMission_Enter1-1 = "Gostaria de verificar os registros da partida?"
16011-CVGroup_UIEventMission_Enter2-1 = "Organizei o progresso atual.\nQuer conferir?"
16011-CVGroup_UIEventMission_Idle1-1 = "Bem…… isso é tudo o que posso mostrar por enquanto."
16011-CVGroup_UIEventMission_Idle2-1 = "Há mais alguma coisa que gostaria de verificar……?"
16011-CVGroup_UIEventMission_Buy1-1 = "Verificado.\nÉ um registro excelente."
16011-CVGroup_UIEventMission_Buy2-1 = "Isso…… pode ser um novo recorde."
16011-CVGroup_UIEventMission_Interaction1-1 = "Os registros de hoje terminam aqui."
