[translation]
10145-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ、じゃ……ふふっ。"
10145-CVGroup_CharacterGet_Idle1-1 = "ふむ……日差しが強いのう。\nほれ、先生、こっちへ……。"
10145-CVGroup_Cafe_Idle1-1 = "ふむ、不思議な気温さな……。"
10145-CVGroup_Cafe_Idle2-1 = "ほう、あれは……？\n興味深いのう。"
10145-CVGroup_Cafe_Idle3-1 = "休息、じゃな。心地よいものじゃ。"
10145-CVGroup_Cafe_Idle4-1 = "（横になれる場所は……）"
10145-CVGroup_Cafe_Idle5-1 = "ミルクコーヒー……\nしかし、カフェインはサヤに叱られたばかりじゃからのう。"
10145-CVGroup_WeaponGet_Idle1-1 = "先生はこの武器に込められしものを何と捉える？\n……妾は、二人の変わらぬ絆を示すもの、だと思っておるよ。"
10145-CVGroup_UIEventLobby_Enter1-1 = "青い空、眩しい日差し――夏じゃ。\nとなれば、避暑じゃろう？"
10145-CVGroup_UIEventLobby_Enter1-2 = "ふふっ……其方がどう思っているかは知らぬが。"
10145-CVGroup_UIEventLobby_Enter1-3 = "妾は、とても浮かれておるぞ？"
10145-CVGroup_UIEventLobby_Enter2-1 = "良い場所じゃのう。"
10145-CVGroup_UIEventLobby_Enter2-2 = "とくにあそこ――"
10145-CVGroup_UIEventLobby_Enter2-3 = "自然の前では、"
10145-CVGroup_UIEventLobby_Enter2-4 = "妾たちは無力であると痛感させられるのう。"
10145-CVGroup_UIEventLobby_Enter3-1 = "先生と一緒なら、キキはどこでも嬉しいです！"
10145-CVGroup_UIEventLobby_Enter3-2 = "……なんじゃ、見ているだけかえ？"
10145-CVGroup_UIEventLobby_Enter4-1 = "誰しも未熟な時はあるというもの。"
10145-CVGroup_UIEventLobby_Enter4-2 = "じゃが、世の理は学び続けねばならぬ。"
10145-CVGroup_UIEventLobby_Enter4-3 = "妾たちとて、な。"
10145-CVGroup_UIEventLobby_Enter5-1 = "無事に終わったのう。"
10145-CVGroup_UIEventLobby_Enter6-1 = "ふふっ……じゃが、妾たちの避暑は、"
10145-CVGroup_UIEventLobby_Enter6-2 = "まだまだこれからじゃろう？"
10145-CVGroup_UIEventLobby_Idle1-1 = "ん？どうしたのじゃ、先生。"
10145-CVGroup_UIEventLobby_Idle1-2 = "ふふっ、ほれ。存分に堪能すると良い。"
10145-CVGroup_UIEventLobby_Idle1-3 = "門主の柔肌――じゃよ？"
10145-CVGroup_UIEventLobby_Idle2-1 = "ここへ先生と来られるなんて……まこと、夢のようじゃ。"
10145-CVGroup_UIEventLobby_Idle2-2 = "ふふっ……深い意味はないさの。"
10145-CVGroup_UIEventLobby_Idle2-3 = "身体の調子が悪いわけでもない。"
10145-CVGroup_UIEventLobby_Idle2-4 = "言葉とおりに受け止めると良い。"
10145-CVGroup_UIEventLobby_Idle3-1 = "青い蝶は、山海経において「不滅」を意味する。"
10145-CVGroup_UIEventLobby_Idle3-2 = "「諦めを知らぬ」"
10145-CVGroup_UIEventLobby_Idle3-3 = "とも言い換えられるな。"
10145-CVGroup_UIEventLobby_Idle3-4 = "ふふ。なあに、ただの戯言だと思ってくれて構わんよ。"
10145-CVGroup_UIEventLobby_Idle4-1 = "妾のワガママに付き合ってもらって悪いのう、先生。"
10145-CVGroup_UIEventLobby_Idle4-2 = "恩に着る。"
10145-CVGroup_UIEventLobby_Idle4-3 = "ああ、そうさな……先に謝っておこうか。"
10145-CVGroup_UIEventLobby_Idle4-4 = "……今からもっと、我が儘を言うつもりじゃからの。"
10145-CVGroup_UIEventShop_Enter1-1 = "先生こんにちは！キキです！"
10145-CVGroup_UIEventShop_Enter1-2 = "今日はお店番をすることになりました！"
10145-CVGroup_UIEventShop_Enter1-3 = "えっ、キサキ？\nキキにはちょっと分からないです……。"
10145-CVGroup_UIEventShop_Enter2-1 = "いらっしゃいませ、先生！"
10145-CVGroup_UIEventShop_Enter2-2 = "キキ、お店番頑張ってるんですよ？なでなでしてください！"
10145-CVGroup_UIEventShop_Enter3-1 = "来てくださりありがとうございます！"
10145-CVGroup_UIEventShop_Enter3-2 = "お買い逃しのないよう、ゆっくり見ていってくださいね！"
10145-CVGroup_UIEventShop_Idle1-1 = "先生はどれが好きですか？\nキキは～……。"
10145-CVGroup_UIEventShop_Idle1-2 = "先生が選んだものなら、何でも好きです！"
10145-CVGroup_UIEventShop_Idle2-1 = "水着、着てみたんですが……。"
10145-CVGroup_UIEventShop_Idle2-2 = "どうでしょう？似合っていますか？可愛いですか？"
10145-CVGroup_UIEventShop_Idle2-3 = "実はキキ……泳ぐの得意じゃないんです。"
10145-CVGroup_UIEventShop_Buy1-1 = "あっ、それキキも気になってました！"
10145-CVGroup_UIEventShop_Buy2-1 = "あっ！こういう時にはこう言うんですよね！"
10145-CVGroup_UIEventShop_Buy2-2 = "「お買い上げありがとうございます！」"
10145-CVGroup_UIEventShop_Buy3-1 = "わあ！キキにも見せてください！"
10145-CVGroup_UIEventShop_Buy4-1 = "はい、どうぞ！\nキキ、よくできてますか？"
