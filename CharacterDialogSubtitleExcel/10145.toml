[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10145-CVGroup_UITitle_Idle1-1 = "Blue Archive, pois bem... fufu."
10145-CVGroup_CharacterGet_Idle1-1 = "Umu... os raios de sol estão bem fortes.\nVenha, Sensei, chegue mais perto..."
10145-CVGroup_Cafe_Idle1-1 = "Fufu... É um clima bem misterioso, não é...?"
10145-CVGroup_Cafe_Idle2-1 = "Oh, aquilo é...?\nQue fascinante."
10145-CVGroup_Cafe_Idle3-1 = "Descansar, hein. É uma sensação muito agradável."
10145-CVGroup_Cafe_Idle4-1 = "(Será que tem algum lugar para eu me deitar...)"
10145-CVGroup_Cafe_Idle5-1 = "Café com leite...\nPorém, acabei de levar uma bronca da Saya por causa da cafeína."
10145-CVGroup_WeaponGet_Idle1-1 = "Sensei, o que você acha que esta arma carrega dentro de si?\n......Na minha opinião, acredito que seja a prova do nosso vínculo imutável."
10145-CVGroup_UIEventLobby_Enter1-1 = "Céu azul e um sol ofuscante――é o verão.\nSendo assim, devemos fugir do calor, não?"
10145-CVGroup_UIEventLobby_Enter1-2 = "Fufu... Não sei o que você está pensando no momento, mas..."
10145-CVGroup_UIEventLobby_Enter1-3 = "Eu estou me sentindo bem animada, sabia?"
10145-CVGroup_UIEventLobby_Enter2-1 = "É um lugar e tanto."
10145-CVGroup_UIEventLobby_Enter2-2 = "Especialmente ali――"
10145-CVGroup_UIEventLobby_Enter2-3 = "Diante da natureza,"
10145-CVGroup_UIEventLobby_Enter2-4 = "Somos forçados a perceber o quão pequenos e impotentes nós somos."
10145-CVGroup_UIEventLobby_Enter3-1 = "Se for com o Sensei, a Kiki fica feliz em ir para qualquer lugar!"
10145-CVGroup_UIEventLobby_Enter3-2 = "......O que foi? Vai ficar apenas me olhando?"
10145-CVGroup_UIEventLobby_Enter4-1 = "Todo mundo tem seus momentos de imaturidade."
10145-CVGroup_UIEventLobby_Enter4-2 = "No entanto, as leis do mundo exigem que continuemos a aprender."
10145-CVGroup_UIEventLobby_Enter4-3 = "Até mesmo nós."
10145-CVGroup_UIEventLobby_Enter5-1 = "Tudo terminou em paz."
10145-CVGroup_UIEventLobby_Enter6-1 = "Fufu... Porém, a nossa fuga do calor"
10145-CVGroup_UIEventLobby_Enter6-2 = "Ainda está apenas começando, não concorda?"
10145-CVGroup_UIEventLobby_Idle1-1 = "Hm? O que houve, Sensei?"
10145-CVGroup_UIEventLobby_Idle1-2 = "Fufu, venha. Pode apreciar o quanto quiser."
10145-CVGroup_UIEventLobby_Idle1-3 = "A pele macia da sua líder―― não é?"
10145-CVGroup_UIEventLobby_Idle2-1 = "Poder vir a um lugar como este junto com o Sensei... É verdadeiramente como um sonho."
10145-CVGroup_UIEventLobby_Idle2-2 = "Fufu... Não há nenhum significado oculto nisso."
10145-CVGroup_UIEventLobby_Idle2-3 = "Também não estou me sentindo mal ou doente."
10145-CVGroup_UIEventLobby_Idle2-4 = "Pode interpretar as minhas palavras exatamente como eu as disse."
10145-CVGroup_UIEventLobby_Idle3-1 = "A borboleta azul significa 'imortalidade' no Shanhaijing."
10145-CVGroup_UIEventLobby_Idle3-2 = "Em outras palavras,"
10145-CVGroup_UIEventLobby_Idle3-3 = "Também significa 'aqueles que não conhecem a desistência'."
10145-CVGroup_UIEventLobby_Idle3-4 = "Fufu. Ora, não se preocupe. Pode encarar isso apenas como um papo furado se quiser."
10145-CVGroup_UIEventLobby_Idle4-1 = "Sinto muito por arrastá-lo para os meus caprichos egoístas, Sensei."
10145-CVGroup_UIEventLobby_Idle4-2 = "Eu lhe devo essa."
10145-CVGroup_UIEventLobby_Idle4-3 = "Ah, pois bem... Acho melhor eu já ir pedindo desculpas."
10145-CVGroup_UIEventLobby_Idle4-4 = "......Pois pretendo ser ainda mais egoísta e manhosa daqui para frente."
10145-CVGroup_UIEventShop_Enter1-1 = "Olá, Sensei! É a Kiki!"
10145-CVGroup_UIEventShop_Enter1-2 = "A partir de hoje, eu vou ficar tomando conta da lojinha!"
10145-CVGroup_UIEventShop_Enter1-3 = "Eh, Kisaki?\nA Kiki não conhece muito bem essa pessoa..."
10145-CVGroup_UIEventShop_Enter2-1 = "Seja muito bem-vindo, Sensei!"
10145-CVGroup_UIEventShop_Enter2-2 = "A Kiki está se esforçando muito pra cuidar da loja, sabia? Faz carinho na minha cabeça!"
10145-CVGroup_UIEventShop_Enter3-1 = "Muito obrigada por vir até aqui!"
10145-CVGroup_UIEventShop_Enter3-2 = "Dê uma olhadinha com calma para não esquecer de comprar nada, tá bom?"
10145-CVGroup_UIEventShop_Idle1-1 = "De qual o Sensei gosta mais?\nA Kiki acha que~..."
10145-CVGroup_UIEventShop_Idle1-2 = "Se for algo que o Sensei escolheu, eu gosto de qualquer coisa!"
10145-CVGroup_UIEventShop_Idle2-1 = "Eu tentei vestir esse maiô, mas..."
10145-CVGroup_UIEventShop_Idle2-2 = "O que você acha? Ficou bom em mim? Eu estou fofa?"
10145-CVGroup_UIEventShop_Idle2-3 = "Na verdade, a Kiki... não é muito boa em nadar."
10145-CVGroup_UIEventShop_Buy1-1 = "Ah, a Kiki também estava de olho nisso!"
10145-CVGroup_UIEventShop_Buy2-1 = "Ah! Nessas horas, a gente tem que dizer aquilo, né!"
10145-CVGroup_UIEventShop_Buy2-2 = "'Muito obrigada pela sua compra!'"
10145-CVGroup_UIEventShop_Buy3-1 = "Uaaah! Deixa a Kiki ver isso também!"
10145-CVGroup_UIEventShop_Buy4-1 = "Sim, aqui está!\nA Kiki fez um bom trabalho?"