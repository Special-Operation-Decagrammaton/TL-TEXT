[translation]
10145-CVGroup_UITitle_Idle1-1 = "Blue Archive, ну а дальше... Хех."
10145-CVGroup_CharacterGet_Idle1-1 = "Хм... Солнце сегодня довольно палящее. Ну же, Сенсей, иди скорее сюда..."
10145-CVGroup_Cafe_Idle1-1 = "Хм, какая странная температура..."
10145-CVGroup_Cafe_Idle2-1 = "Ой, а это что такое?.. Как любопытно."
10145-CVGroup_Cafe_Idle3-1 = "Отдых, значит? А это весьма приятно."
10145-CVGroup_Cafe_Idle4-1 = "(Где бы здесь найти место, чтобы прилечь...)"
10145-CVGroup_Cafe_Idle5-1 = "Кофе со льдом... Но Сайя только что отругала меня за кофеин, так что..."
10145-CVGroup_WeaponGet_Idle1-1 = "Сенсей, как думаешь, что сокрыто в этом оружии? ...Я верю, что оно символизирует неизменную связь между двумя людьми."
10145-CVGroup_UIEventLobby_Enter1-1 = "Голубое небо, ослепительный солнечный свет — это лето.\\nРаз уж так, как насчёт летнего отдыха?"
10145-CVGroup_UIEventLobby_Enter1-2 = "Хех... Хотя я не знаю, о чём ты там думаешь."
10145-CVGroup_UIEventLobby_Enter1-3 = "Что касается меня, я чувствую себя весьма легкомысленно."
10145-CVGroup_UIEventLobby_Enter2-1 = "Прекрасное место, не так ли?"
10145-CVGroup_UIEventLobby_Enter2-2 = "Особенно вооон там —"
10145-CVGroup_UIEventLobby_Enter2-3 = "Перед лицом природы"
10145-CVGroup_UIEventLobby_Enter2-4 = "невольно и болезненно вспоминаешь, насколько же мы на самом деле бессильны."
10145-CVGroup_UIEventLobby_Enter3-1 = "Пока я с тобой, Сенсей, мне хорошо где угодно!"
10145-CVGroup_UIEventLobby_Enter3-2 = "...Что такое? Ты собираешься просто смотреть?"
10145-CVGroup_UIEventLobby_Enter4-1 = "У всех бывают моменты незрелости."
10145-CVGroup_UIEventLobby_Enter4-2 = "Однако законам этого мира"
10145-CVGroup_UIEventLobby_Enter4-3 = "нужно учиться непрерывно. Даже нам."
10145-CVGroup_UIEventLobby_Enter5-1 = "Всё закончилось благополучно, верно?"
10145-CVGroup_UIEventLobby_Enter6-1 = "Хех... но наш летний отдых"
10145-CVGroup_UIEventLobby_Enter6-2 = "ведь только начинается, не так ли?"
10145-CVGroup_UIEventLobby_Idle1-1 = "Хм? Что-то не так, Сенсей?"
10145-CVGroup_UIEventLobby_Idle1-2 = "Хех, давай же. Не стесняйся и наслаждайся этим сколько душе угодно."
10145-CVGroup_UIEventLobby_Idle1-3 = "Нежная кожа главы академии — заманчиво, правда?"
10145-CVGroup_UIEventLobby_Idle2-1 = "Возможность приехать сюда вместе с тобой, Сенсей... это и правда похоже на сон."
10145-CVGroup_UIEventLobby_Idle2-2 = "Хех... за этим не кроется никакого глубокого смысла."
10145-CVGroup_UIEventLobby_Idle2-3 = "И я вовсе не чувствую себя плохо."
10145-CVGroup_UIEventLobby_Idle2-4 = "Тебе стоит воспринимать мои слова буквально."
10145-CVGroup_UIEventLobby_Idle3-1 = "В Шанхайцзине синяя бабочка означает «бессмертие»."
10145-CVGroup_UIEventLobby_Idle3-2 = "Это также можно перефразировать как"
10145-CVGroup_UIEventLobby_Idle3-3 = "«не знающая поражения»."
10145-CVGroup_UIEventLobby_Idle3-4 = "Хех. Ну, можешь считать это просто пустой болтовнёй."
10145-CVGroup_UIEventLobby_Idle4-1 = "Прости, что заставила тебя потакать моему эгоизму, Сенсей."
10145-CVGroup_UIEventLobby_Idle4-2 = "Я у тебя в долгу."
10145-CVGroup_UIEventLobby_Idle4-3 = "Ах, верно... пожалуй, мне стоит извиниться заранее."
10145-CVGroup_UIEventLobby_Idle4-4 = "...Потому что с этого момента я намерена быть ещё более эгоистичной."
10145-CVGroup_UIEventShop_Enter1-1 = "Привет, Сенсей! Это Кики!"
10145-CVGroup_UIEventShop_Enter1-2 = "Сегодня меня назначили главной в магазине!"
10145-CVGroup_UIEventShop_Enter1-3 = "Ась? Кисаки? Я не совсем уверена, кто это такая..."
10145-CVGroup_UIEventShop_Enter2-1 = "Добро пожаловать, Сенсей!"
10145-CVGroup_UIEventShop_Enter2-2 = "Я вовсю тружусь в магазине, знаешь ли! Погладь меня по голове, пожалуйста!"
10145-CVGroup_UIEventShop_Enter3-1 = "Спасибо, что пришёл!"
10145-CVGroup_UIEventShop_Enter3-2 = "Пожалуйста, осматривайся не спеша, чтобы ничего не пропустить!"
10145-CVGroup_UIEventShop_Idle1-1 = "Какая вещь тебе нравится, Сенсей? Что касается меня..."
10145-CVGroup_UIEventShop_Idle1-2 = "Если это выбрал ты, Сенсей, тогда мне это тоже нравится!"
10145-CVGroup_UIEventShop_Idle2-1 = "Я примерила купальник..."
10145-CVGroup_UIEventShop_Idle2-2 = "Ну как? Мне идёт? Я миленькая?"
10145-CVGroup_UIEventShop_Idle2-3 = "На самом деле Кики... не очень хорошо умеет плавать."
10145-CVGroup_UIEventShop_Buy1-1 = "О, мне это тоже было любопытно!"
10145-CVGroup_UIEventShop_Buy2-1 = "Ах! В такие моменты ведь полагается говорить именно это, верно!"
10145-CVGroup_UIEventShop_Buy2-2 = "«Спасибо за покупку!»"
10145-CVGroup_UIEventShop_Buy3-1 = "Ого! Пожалуйста, покажи и мне тоже!"
10145-CVGroup_UIEventShop_Buy4-1 = "Да, вот, держи! Я хорошо справилась, Кики?"
