[translation]
10145-CVGroup_UITitle_Idle1-1 = "Blue Archive, then... Hehe."
10145-CVGroup_CharacterGet_Idle1-1 = "Hmm... The sun is quite strong. Here, Sensei, come over here..."
10145-CVGroup_Cafe_Idle1-1 = "Hmm, what a strange temperature..."
10145-CVGroup_Cafe_Idle2-1 = "Oh, what is that...? How interesting."
10145-CVGroup_Cafe_Idle3-1 = "Rest, is it? It feels pleasant."
10145-CVGroup_Cafe_Idle4-1 = "(Where is a place I can lie down...)"
10145-CVGroup_Cafe_Idle5-1 = "Milk coffee... But I was just scolded by Saya about caffeine, so..."
10145-CVGroup_WeaponGet_Idle1-1 = "Sensei, what do you think is imbued within this weapon? ...I believe it represents the unchanging bond between two people."
10145-CVGroup_UIEventLobby_Enter1-1 = "Blue sky, dazzling sunlight—it's summer. In that case, it's time for a summer retreat, isn't it?"
10145-CVGroup_UIEventLobby_Enter1-2 = "Hehe... I don't know what you might be thinking, though."
10145-CVGroup_UIEventLobby_Enter1-3 = "I, for one, am quite excited."
10145-CVGroup_UIEventLobby_Enter2-1 = "What a fine place."
10145-CVGroup_UIEventLobby_Enter2-2 = "Especially over there—"
10145-CVGroup_UIEventLobby_Enter2-3 = "In the face of nature,"
10145-CVGroup_UIEventLobby_Enter2-4 = "it makes one painfully aware of how powerless we are."
10145-CVGroup_UIEventLobby_Enter3-1 = "If I'm with you, Sensei, Kiki is happy anywhere!"
10145-CVGroup_UIEventLobby_Enter3-2 = "...What is it? Are you just going to watch?"
10145-CVGroup_UIEventLobby_Enter4-1 = "Everyone has a time when they are inexperienced."
10145-CVGroup_UIEventLobby_Enter4-2 = "However, one must continue to learn the ways of the world."
10145-CVGroup_UIEventLobby_Enter4-3 = "Even for us, that is."
10145-CVGroup_UIEventLobby_Enter5-1 = "It ended safely, didn't it."
10145-CVGroup_UIEventLobby_Enter6-1 = "Hehe... But our summer retreat,"
10145-CVGroup_UIEventLobby_Enter6-2 = "is only just beginning, isn't it?"
10145-CVGroup_UIEventLobby_Idle1-1 = "Hm? What is it, Sensei?"
10145-CVGroup_UIEventLobby_Idle1-2 = "Hehe, here. You should enjoy it to your heart's content."
10145-CVGroup_UIEventLobby_Idle1-3 = "The soft skin of the Sect Master—is that it?"
10145-CVGroup_UIEventLobby_Idle2-1 = "To be able to come here with you, Sensei... it truly is like a dream."
10145-CVGroup_UIEventLobby_Idle2-2 = "Hehe... there's no deep meaning behind it."
10145-CVGroup_UIEventLobby_Idle2-3 = "It's not that I'm feeling unwell."
10145-CVGroup_UIEventLobby_Idle2-4 = "You should take my words at face value."
10145-CVGroup_UIEventLobby_Idle3-1 = "In Shanhaijing, the blue butterfly signifies 'immortality'."
10145-CVGroup_UIEventLobby_Idle3-2 = "It can also be rephrased as"
10145-CVGroup_UIEventLobby_Idle3-3 = "'knowing no surrender'."
10145-CVGroup_UIEventLobby_Idle3-4 = "Hehe. Oh, don't mind me, you can just think of it as idle chatter."
10145-CVGroup_UIEventLobby_Idle4-1 = "I'm sorry for making you go along with my selfishness, Sensei."
10145-CVGroup_UIEventLobby_Idle4-2 = "I am in your debt."
10145-CVGroup_UIEventLobby_Idle4-3 = "Ah, that's right... perhaps I should apologize in advance."
10145-CVGroup_UIEventLobby_Idle4-4 = "...Because I intend to be even more selfish from here on out."
10145-CVGroup_UIEventShop_Enter1-1 = "Hello, Sensei! It's Kiki!"
10145-CVGroup_UIEventShop_Enter1-2 = "I've been put in charge of the shop today!"
10145-CVGroup_UIEventShop_Enter1-3 = "Eh, Kisaki? I'm not quite sure who that is..."
10145-CVGroup_UIEventShop_Enter2-1 = "Welcome, Sensei!"
10145-CVGroup_UIEventShop_Enter2-2 = "Kiki is working hard at the shop, you know? Please give me a head pat!"
10145-CVGroup_UIEventShop_Enter3-1 = "Thank you for coming!"
10145-CVGroup_UIEventShop_Enter3-2 = "Please take your time looking around so you don't miss anything!"
10145-CVGroup_UIEventShop_Idle1-1 = "Which one do you like, Sensei? Kiki is..."
10145-CVGroup_UIEventShop_Idle1-2 = "If it's something you chose, Sensei, I like it all!"
10145-CVGroup_UIEventShop_Idle2-1 = "I tried wearing a swimsuit..."
10145-CVGroup_UIEventShop_Idle2-2 = "How is it? Does it suit me? Is it cute?"
10145-CVGroup_UIEventShop_Idle2-3 = "Actually, Kiki... isn't very good at swimming."
10145-CVGroup_UIEventShop_Buy1-1 = "Ah, I was curious about that one too!"
10145-CVGroup_UIEventShop_Buy2-1 = "Ah! You're supposed to say this at times like these, right!"
10145-CVGroup_UIEventShop_Buy2-2 = "'Thank you for your purchase!'"
10145-CVGroup_UIEventShop_Buy3-1 = "Wow! Please show me too!"
10145-CVGroup_UIEventShop_Buy4-1 = "Yes, here you go! Did I do a good job, Kiki?"