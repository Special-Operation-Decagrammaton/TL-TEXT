[translation]
16009-CVGroup_UITitle_Idle1-1 = "ブルー！アーカイブ！"
16009-CVGroup_CharacterGet_Idle1-1 = "ふふふっ……おっ待たせー！\n忍術研究部部長、千鳥ミチル……ここに参上！\nこれからよろしくね、先生殿！"
16009-CVGroup_Cafe_Idle1-1 = "さーて、次はチャンネルにどんな動画をアップしよっかな。"
16009-CVGroup_Cafe_Idle2-1 = "「少女忍法帖ミチルっち」……\n目指せ、チャンネル登録者100名！"
16009-CVGroup_Cafe_Idle3-1 = "あ、新しい忍術思いついた！"
16009-CVGroup_Cafe_Idle4-1 = "あれ……\n「かまぼこ突風伝」の新刊発売日、いつだっけ？"
16009-CVGroup_Cafe_Idle5-1 = "うっ、あちこちに他校の生徒が……\nあんまり接触したくない……。"
16009-CVGroup_WeaponGet_Idle1-1 = "うおー、こんなものまで私に……！？\nちょっ、ちょっとだけ責任感じちゃうけど……\n……ううん、でも任せて、先生殿！見せて進ぜよう、ミチル流忍術……その真髄を！"
16009-CVGroup_UIEventLobby_Enter1-1 = "あっ、先生殿！\n今こそ忍術研究部が活躍する時だよ！"
16009-CVGroup_UIEventLobby_Enter1-2 = "さあ、ササっと鮮やかに解決しちゃおう！"
16009-CVGroup_UIEventLobby_Enter2-1 = "うわぁ、何かすごい大騒ぎになっちゃった……"
16009-CVGroup_UIEventLobby_Enter2-2 = "せ、先生殿、大丈夫だよね？\n信じてるからね、ね！？"
16009-CVGroup_UIEventLobby_Enter3-1 = "うっぎゃ、もうこんな時間……\nこれ、間に合うのかな……？"
16009-CVGroup_UIEventLobby_Enter3-2 = "ああもう、魑魅一座ほんっとしつこい……！"
16009-CVGroup_UIEventLobby_Enter4-1 = "私は最後まで諦めない……！\n忍術研究部の認可も！"
16009-CVGroup_UIEventLobby_Enter4-2 = "「少女忍法帖ミチルっち」のチャンネル登録者100名も！"
16009-CVGroup_UIEventLobby_Enter5-1 = "うえぇぇ……や、やっと終わった……？もう帰って良い？"
16009-CVGroup_UIEventLobby_Enter5-2 = "ふあぁ……早く帰って、忍者の映画とか見たい……"
16009-CVGroup_UIEventLobby_Enter5-3 = "何も考える必要の無いB級のやつ……。"
16009-CVGroup_UIEventLobby_Idle1-1 = "魑魅一座は暴れるわ、陰陽部から圧力がかかるわ、"
16009-CVGroup_UIEventLobby_Idle1-2 = "ゲヘナの万魔殿はめんどうだわで……\nもう一体何なのさぁ……。"
16009-CVGroup_UIEventLobby_Idle2-1 = "……ひゃっ！？\nせ、先生殿！？今何した！？"
16009-CVGroup_UIEventLobby_Idle2-2 = "きゅ、急に触られるとびっくりするんだけど……！？"
16009-CVGroup_UIEventLobby_Idle3-1 = "忍者とは、諦めないもの"
16009-CVGroup_UIEventLobby_Idle3-2 = "最後まで走り抜け、何があっても任務を全うする……"
16009-CVGroup_UIEventLobby_Idle3-3 = "私たち忍術研究部もそうなんだってこと、見せてあげる！"
16009-CVGroup_UIEventLobby_Idle4-1 = "陰陽部の依頼を鮮やかに解決して、"
16009-CVGroup_UIEventLobby_Idle4-2 = "今度こそ正式な部活として認めてもらうんだから！"
