[translation]
10073-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ……。"
10073-CVGroup_CharacterGet_Idle1-1 = "う、うう……ただでさえ、外は苦手なのに……\n暑いしジメジメしてるし……\nこれだから夏は……。"
10073-CVGroup_Cafe_Idle1-1 = "ああ……ここにも人がたくさん……。"
10073-CVGroup_Cafe_Idle2-1 = "どこか……ひとりで、静かにいられる場所は……。"
10073-CVGroup_Cafe_Idle3-1 = "この格好のせいか、いつもより、落ち着かない……。"
10073-CVGroup_Cafe_Idle4-1 = "はぁ……全く。"
10073-CVGroup_Cafe_Idle5-1 = "でもまあ……ここの雰囲気は、嫌いじゃないかも。"
10073-CVGroup_WeaponGet_Idle1-1 = "あの……今更かもしれませんが……\nここまでしてもらうほどの価値が……本当に、私にあるのでしょうか……？\n……すみません、こんなこと、言わない約束でしたよね。\nできる限りのことを、します。先生の望みですから。"
10073-CVGroup_UIEventLobby_Enter1-1 = "こちらです、先生。\n調査準備は、済んでおりますので。"
10073-CVGroup_UIEventLobby_Enter2-1 = "夏は、蒸し暑くて……。\nた、立っているだけで、精一杯です……。"
10073-CVGroup_UIEventLobby_Enter3-1 = "これで、あと半分……。"
10073-CVGroup_UIEventLobby_Enter4-1 = "もう少しで、ここでの調査も終わりですね。"
10073-CVGroup_UIEventLobby_Enter5-1 = "ね、念のため……\n確認してみてください。"
10073-CVGroup_UIEventLobby_Idle1-1 = "せ、先生？\nど、どうしました？"
10073-CVGroup_UIEventLobby_Idle1-2 = "私の顔に、何かついているんですか……？"
10073-CVGroup_UIEventLobby_Idle2-1 = "いきなり、呼ばれても……。"
10073-CVGroup_UIEventLobby_Idle3-1 = "……用件があるのなら、\n言葉にしてください……。"
10073-CVGroup_UIEventLobby_Idle4-1 = "外は、好きではありませんが……。"
10073-CVGroup_UIEventLobby_Idle4-2 = "二人きりになれましたし……\n良しとします。"
10073-CVGroup_UIEventMission_Enter1-1 = "それでは、調査内容をまとめましょう。"
10073-CVGroup_UIEventMission_Enter2-1 = "色々と、分かってきました。"
10073-CVGroup_UIEventMission_Idle1-1 = "えーと……まだ何か、調べたい事でも？"
10073-CVGroup_UIEventMission_Idle2-1 = "わ、私を調べても、何にもなりませんよ……！"
10073-CVGroup_UIEventMission_Buy1-1 = "これは……意味がありそうですね。"
10073-CVGroup_UIEventMission_Buy2-1 = "流石です、先生。"
