[translation]
10073-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
10073-CVGroup_CharacterGet_Idle1-1 = "U-Ugh... Eu já não gosto de ficar ao ar livre...\nEstá quente e abafado...\nÉ por isso que eu detesto o verão..."
10073-CVGroup_Cafe_Idle1-1 = "Ah... Tem tanta gente aqui também..."
10073-CVGroup_Cafe_Idle2-1 = "Será que existe algum lugar... onde eu possa ficar sozinha e em silêncio?"
10073-CVGroup_Cafe_Idle3-1 = "Talvez seja por causa desta roupa, mas não consigo me sentir calma como de costume..."
10073-CVGroup_Cafe_Idle4-1 = "Haa... Francamente."
10073-CVGroup_Cafe_Idle5-1 = "Mas, bem... acho que não desgosto da atmosfera daqui."
10073-CVGroup_WeaponGet_Idle1-1 = "Ei... pode ser tarde demais para perguntar, mas...\nEu realmente valho todo esse esforço...?\n...Desculpe, eu prometi não dizer coisas assim.\nFarei o que estiver ao meu alcance. Já que é o que você deseja, Sensei."
10073-CVGroup_UIEventLobby_Enter1-1 = "Aqui está, Sensei.\nOs preparativos para a investigação já foram concluídos."
10073-CVGroup_UIEventLobby_Enter2-1 = "O verão é tão abafado...\nE-estou dando o meu melhor só de ficar de pé..."
10073-CVGroup_UIEventLobby_Enter3-1 = "Com isso, falta só a outra metade..."
10073-CVGroup_UIEventLobby_Enter4-1 = "Já estamos quase terminando a investigação por aqui, não é?"
10073-CVGroup_UIEventLobby_Enter5-1 = "Ei, só por precaução...\nPor favor, dê uma conferida."
10073-CVGroup_UIEventLobby_Idle1-1 = "S-Sensei?\nO-o que houve?"
10073-CVGroup_UIEventLobby_Idle1-2 = "Tem algo no meu rosto...?"
10073-CVGroup_UIEventLobby_Idle2-1 = "Mesmo que você me chame de repente..."
10073-CVGroup_UIEventLobby_Idle3-1 = "...Se você tem algo para tratar,\npor favor, diga em palavras..."
10073-CVGroup_UIEventLobby_Idle4-1 = "Eu não gosto de ficar ao ar livre, mas..."
10073-CVGroup_UIEventLobby_Idle4-2 = "Já que estamos a sós...\nacho que está tudo bem."
10073-CVGroup_UIEventMission_Enter1-1 = "Então, vamos resumir os detalhes da investigação."
10073-CVGroup_UIEventMission_Enter2-1 = "Muita coisa ficou clara agora."
10073-CVGroup_UIEventMission_Idle1-1 = "Hum... Ainda tem algo que você queira investigar?"
10073-CVGroup_UIEventMission_Idle2-1 = "V-você não vai encontrar nada investigando a mim...!"
10073-CVGroup_UIEventMission_Buy1-1 = "Isso... parece ser importante."
10073-CVGroup_UIEventMission_Buy2-1 = "Como esperado do Sensei."
