[translation]
13007-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！"
13007-CVGroup_CharacterGet_Idle1-1 = "別に協力するつもりはないんだけど。\n……うん？食べ物くれるの？どんなの？どんなやつ？"
13007-CVGroup_Cafe_Idle1-1 = "ど、どこかに食べ物……ないの？"
13007-CVGroup_Cafe_Idle2-1 = "そういえば前に、先生とカフェに行ったときの……\n美味しかったな……。へへ。"
13007-CVGroup_Cafe_Idle3-1 = "百鬼夜行のお祭りで売ってるお団子が、\nすごく美味しいって噂なんだけど……。"
13007-CVGroup_Cafe_Idle4-1 = "クンクン。うん……？\nこの匂いは……？\n何か美味しそうな匂いがする！"
13007-CVGroup_Cafe_Idle5-1 = "美味しそうな匂いにつられて、ここまで来ちゃった。\nここで私を待っているのはー……何かな～"
13007-CVGroup_WeaponGet_Idle1-1 = "あ、ありがとう、先生……。\nその……だ、大事にする！絶対！"
