[translation]
13007-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
13007-CVGroup_CharacterGet_Idle1-1 = "Não que eu pretenda cooperar com você.\n……Hm? Vai me dar comida? Que tipo? Como é?"
13007-CVGroup_Cafe_Idle1-1 = "A-algum lugar por aqui…… não tem comida?"
13007-CVGroup_Cafe_Idle2-1 = "Falando nisso, aquela vez que fui ao café com o Sensei……\nEstava tão gostoso…… Hehe."
13007-CVGroup_Cafe_Idle3-1 = "Dizem que os bolinhos vendidos no festival de Hyakkiyako……\nSão incrivelmente deliciosos."
13007-CVGroup_Cafe_Idle4-1 = "Sniff, sniff. Hm……?\nQue cheiro é esse……?\nSinto um cheiro de algo delicioso!"
13007-CVGroup_Cafe_Idle5-1 = "O cheiro delicioso me trouxe até aqui.\nO que será que está me esperando aqui……?"
13007-CVGroup_WeaponGet_Idle1-1 = "Ah, obrigado, Sensei…….\nIsso…… e-eu vou cuidar bem disso! Com certeza!"
