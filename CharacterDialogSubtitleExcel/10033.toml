10033-CVGroup_CharacterGet_Idle1-1 = "うふふ……ようやく見つけました。\nもう逃がしませんわ、あなた様♥\nもう私のお傍から、離れないでくださいね……？"
10033-CVGroup_Cafe_Idle1-1 = "いつもでしたら、こんなにゆったりとはできませんからね……。"
10033-CVGroup_Cafe_Idle2-1 = "うふふふふ♡"
10033-CVGroup_Cafe_Idle3-1 = "ああっ、あなた様、\nどちらにいらっしゃるのですか？"
10033-CVGroup_Cafe_Idle4-1 = "あらあら。"
10033-CVGroup_Cafe_Idle5-1 = "ふふふ、困ってしまいますね。"
10033-CVGroup_WeaponGet_Idle1-1 = "さあ、このワカモ、すでに準備はできております。\nこれを使って、あなた様の敵を余すことなく排除いたします。\nふふふふふふふ……。"
10033-CVGroup_UIEventLobby_Enter1-1 = "このワカモ、こうしてあなた様のことを捕まえに参りました♥"
10033-CVGroup_UIEventLobby_Enter2-1 = "私から逃げようとしても無駄だということ……。"
10033-CVGroup_UIEventLobby_Enter2-2 = "そのお体に、たっぷりと教えて差し上げますね♥"
10033-CVGroup_UIEventLobby_Enter3-1 = "ああ……感じます……\nどこからか、先生の気配が……！"
10033-CVGroup_UIEventLobby_Enter4-1 = "ふふふっ、私のことを振り払えるとでもお思いですか？"
