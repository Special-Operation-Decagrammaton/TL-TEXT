10033-CVGroup_WeaponGet_Idle1-1 = "Muito bem, eu, Wakamo, já estou preparada.\nUsarei isto para eliminar todos os seus inimigos sem deixar rastro.\nFufufufufufu……."
10033-CVGroup_UIEventLobby_Enter1-1 = "Eu, Wakamo, vim aqui para capturar você♥"
