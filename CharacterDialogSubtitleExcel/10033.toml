10033-CVGroup_UIEventLobby_Idle1-1 = "Ah, Sensei……\nOnde você está agora?"
10033-CVGroup_UIEventLobby_Idle2-1 = "Mesmo que seja em meio a chamas e fumaça de pólvora……."
10033-CVGroup_UIEventLobby_Idle2-2 = "Eu, Wakamo…… jamais perderei você de vista♥"
10033-CVGroup_UIEventLobby_Idle3-1 = "Entendo, então este é o"
10033-CVGroup_UIEventLobby_Idle3-2 = "jogo chamado \"esconde-esconde\" que está na moda?"
10033-CVGroup_UIEventLobby_Idle3-3 = "Ufufu, não desgosto desse tipo de passatempo."
10033-CVGroup_UIEventLobby_Idle4-1 = "Então é só perseguir e capturar, certo?"
10033-CVGroup_UIEventLobby_Idle4-2 = "Estou começando a me divertir."
