[translation]
10033-CVGroup_UITitle_Idle1-1 = "Blue Archive…… ufufu."
10033-CVGroup_CharacterGet_Idle1-1 = "Ufufu…… finalmente encontrei você.\nNão vou deixar você escapar, meu querido♥\nPor favor, não se afaste mais do meu lado……?"
