[translation]
10103-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
10103-CVGroup_CharacterGet_Idle1-1 = "Como presidente do comitê de segurança da Academia Red Winter... Vou mostrar a vocês o que é uma verdadeira demonstração de bravura!"
10103-CVGroup_Cafe_Idle1-1 = "O que é isso? ...Não é que é fofo?"
10103-CVGroup_Cafe_Idle2-1 = "...! A-agora mesmo, senti algo gelado nos meus pés...!"
10103-CVGroup_Cafe_Idle3-1 = "Eu deveria exibir uma postura mais elegante..."
10103-CVGroup_Cafe_Idle4-1 = "Ah... Ficar parada assim me deixa inquieta..."
10103-CVGroup_Cafe_Idle5-1 = "(Elas sempre usam roupas tão finas assim... Será que as alunas de outras escolas não se incomodam?)"
10103-CVGroup_WeaponGet_Idle1-1 = "Ah, minha Balalaika... Durante um ataque, não há nada que supere a estabilidade de uma submetralhadora com bandoleira. ...Só que, com esse traje, a alça acaba roçando e dói um pouco..."
10103-CVGroup_UIEventLobby_Enter1-1 = "Este evento de intercâmbio, que coloca em jogo o prestígio da Red Winter e da Shanhaijing..."
10103-CVGroup_UIEventLobby_Enter1-2 = "Temos que fazer com que seja um sucesso a qualquer custo!"
10103-CVGroup_UIEventLobby_Enter2-1 = "O que estou fazendo aqui, você pergunta?"
10103-CVGroup_UIEventLobby_Enter2-2 = "Como pode ver, estou fazendo a escolta para proteger a presidente do conselho, mas—"
10103-CVGroup_UIEventLobby_Enter2-3 = "...E-ela não está aqui!? Presidente Cherino!? Onde a senhora se meteu!?"
10103-CVGroup_UIEventLobby_Enter3-1 = "O que será que a Shanhaijing está planejando? Nos tratar dessa maneira..."
10103-CVGroup_UIEventLobby_Enter3-2 = "Não pense que isso vai ficar barato!"
10103-CVGroup_UIEventLobby_Enter4-1 = "Permitir uma confusão na frente de alunas de outras escolas..."
10103-CVGroup_UIEventLobby_Enter4-2 = "A Shanhaijing realmente passou vergonha."
10103-CVGroup_UIEventLobby_Enter4-3 = "Se fosse na nossa Academia Red Winter, jamais permitiríamos algo assim...!"
10103-CVGroup_UIEventLobby_Enter4-4 = "...E-ehem! Bem, isso é apenas um detalhe insignificante."
10103-CVGroup_UIEventLobby_Enter5-1 = "Ufa... estou exausta..."
10103-CVGroup_UIEventLobby_Enter5-2 = "Quem diria que um dia eu sentiria saudades das planícies nevadas de Red Winter..."
10103-CVGroup_UIEventLobby_Idle1-1 = "A cidade de Shanhaijing é como um labirinto..."
10103-CVGroup_UIEventLobby_Idle1-2 = "Não é nada propício para um ataque."
10103-CVGroup_UIEventLobby_Idle2-1 = "Hah! Ter dificuldade contra um simples clube."
10103-CVGroup_UIEventLobby_Idle2-2 = "A Xuanlongmen não é grande coisa, afinal."
10103-CVGroup_UIEventLobby_Idle2-3 = "Para elevar a autoridade da nossa secretaria,"
10103-CVGroup_UIEventLobby_Idle2-4 = "não importa que tipo de truque o oponente use, devemos nos manter firmes e inabaláveis—"
10103-CVGroup_UIEventLobby_Idle2-5 = "...Hm? Isso aqui?"
10103-CVGroup_UIEventLobby_Idle2-6 = "É um bolinho chinês que ganhei da Xuanwu Chamber of Commerce."
10103-CVGroup_UIEventLobby_Idle3-1 = "Ganhei óculos escuros do guarda-costas do líder da escola."
10103-CVGroup_UIEventLobby_Idle3-2 = "Tanto o estilo quanto a presença... aquilo não é... de alguém comum..."
10103-CVGroup_UIEventLobby_Idle4-1 = "Ouvi dizer que usar roupas íntimas por baixo do qipao é contra as regras, mas..."
10103-CVGroup_UIEventLobby_Idle4-2 = "Será que isso está realmente certo?"
10103-CVGroup_UIEventLobby_Idle4-3 = "Devemos respeitar os costumes das outras escolas, mas..."
10103-CVGroup_UIEventLobby_Idle4-4 = "Não me parece um traje adequado para um ataque..."
10103-CVGroup_UIEventShop_Enter1-1 = "O que deseja? Eu? Estou apenas organizando as coisas para o evento de intercâmbio."
10103-CVGroup_UIEventShop_Enter2-1 = "Poderia me fazer o favor de doar suprimentos?"
10103-CVGroup_UIEventShop_Enter2-2 = "Este evento de intercâmbio parece que será muito maior do que eu imaginava."
10103-CVGroup_UIEventShop_Enter3-1 = "O evento de intercâmbio já terminou, mas... doações de suprimentos são sempre bem-vindas."
10103-CVGroup_UIEventShop_Idle1-1 = "Já que entramos nessa, vamos ajudar as outras escolas."
10103-CVGroup_UIEventShop_Idle2-1 = "(Essa máscara da ópera de Pequim... olhando bem, é um pouco assustadora...)"
10103-CVGroup_UIEventShop_Buy1-1 = "Oh, este é um item de excelente qualidade."
10103-CVGroup_UIEventShop_Buy2-1 = "Com isso, o sucesso do evento de intercâmbio está garantido."
10103-CVGroup_UIEventShop_Buy3-1 = "Diga-me... Sensei. Não que eu esteja duvidando, mas... de onde exatamente você tirou tantos suprimentos...?"
10103-CVGroup_UIEventShop_Buy4-1 = "Fantástico! O nome do Sensei será lembrado em ambas as escolas!"
