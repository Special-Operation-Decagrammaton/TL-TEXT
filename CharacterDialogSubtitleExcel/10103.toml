[translation]
10103-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10103-CVGroup_CharacterGet_Idle1-1 = "レッドウィンター連邦学園の保安委員長として……\n真の勇姿を見せてやろう！"
10103-CVGroup_Cafe_Idle1-1 = "なんだこれは？\n……かわいいじゃないか。"
10103-CVGroup_Cafe_Idle2-1 = "……！\nい、いま、足元に何か冷たい感触がっ……！"
10103-CVGroup_Cafe_Idle3-1 = "もっと品のある姿を、見せなければ……。"
10103-CVGroup_Cafe_Idle4-1 = "ふあぁ……\nじっとしていると、ムズムズする……。"
10103-CVGroup_Cafe_Idle5-1 = "（いつもこんな薄い服を……他校の生徒は、平気なのか？）"
10103-CVGroup_WeaponGet_Idle1-1 = "嗚呼、我がバラライカ……\n突撃中、スリング付きのサブマシンガンの安定感に勝るものはない。\n……ただ、この格好だと肩紐がすれて少し痛いんだ……。"
10103-CVGroup_UIEventLobby_Enter1-1 = "レッドウィンターと山海経、\n両校の威信をかけたこの交流会……"
10103-CVGroup_UIEventLobby_Enter1-2 = "なんとしてでも成功させなければ！"
10103-CVGroup_UIEventLobby_Enter2-1 = "ここで何をしているのかって？"
10103-CVGroup_UIEventLobby_Enter2-2 = "見ての通り、書記長の身を守るべく護衛をしているところだが――"
10103-CVGroup_UIEventLobby_Enter2-3 = "……い、いない！？チェリノ書記長！？どちらに！？"
10103-CVGroup_UIEventLobby_Enter3-1 = "山海経は一体何を企んでいるんだ？\n我々にこんな扱いをして……"
10103-CVGroup_UIEventLobby_Enter3-2 = "ただで済むと思うな！"
10103-CVGroup_UIEventLobby_Enter4-1 = "他校生の前で騒動を容認するだなんて。"
10103-CVGroup_UIEventLobby_Enter4-2 = "山海経も、醜態を晒したな。"
10103-CVGroup_UIEventLobby_Enter4-3 = "我々レッドウィンター連邦学園なら、断じてそんなことは……！"
10103-CVGroup_UIEventLobby_Enter4-4 = "……ごほん！まあ、その程度、些細なことだ。"
10103-CVGroup_UIEventLobby_Enter5-1 = "ふぅ……疲れた……"
10103-CVGroup_UIEventLobby_Enter5-2 = "レッドウィンターの雪原が恋しくなる日がくるとは……。"
10103-CVGroup_UIEventLobby_Idle1-1 = "山海経の街は迷路みたいだ……"
10103-CVGroup_UIEventLobby_Idle1-2 = "突撃には不向きだな。"
10103-CVGroup_UIEventLobby_Idle2-1 = "はっ！イチ部活相手に苦戦とは。"
10103-CVGroup_UIEventLobby_Idle2-2 = "玄龍門も大したことないな。"
10103-CVGroup_UIEventLobby_Idle2-3 = "我が事務局の権威を上げるためには、"
10103-CVGroup_UIEventLobby_Idle2-4 = "相手がどんな手を使ってこようと決して懐柔されずどっしりと――"
10103-CVGroup_UIEventLobby_Idle2-5 = "……うん？これか？"
10103-CVGroup_UIEventLobby_Idle2-6 = "玄武商会からもらった中華まんだが。"
10103-CVGroup_UIEventLobby_Idle3-1 = "門主のガードからサングラスをもらった。"
10103-CVGroup_UIEventLobby_Idle3-2 = "格好といい、存在感といい、あれは……\n只者ではないぞ……。"
10103-CVGroup_UIEventLobby_Idle4-1 = "チーパオの下にインナーを履くのはルール違反だと聞いたが……"
10103-CVGroup_UIEventLobby_Idle4-2 = "本当にこれであっているのか？"
10103-CVGroup_UIEventLobby_Idle4-3 = "他校のしきたりは尊重すべきだが……"
10103-CVGroup_UIEventLobby_Idle4-4 = "突撃に適した服装では、ないような……"
10103-CVGroup_UIEventShop_Enter1-1 = "何の用だ？私か？\n交流会用に片付けていたところだ。"
10103-CVGroup_UIEventShop_Enter2-1 = "よかったら物資の寄付を頼めるか？"
10103-CVGroup_UIEventShop_Enter2-2 = "今回の交流会、思ったより大規模になりそうでな。"
10103-CVGroup_UIEventShop_Enter3-1 = "交流会は終わったが……\n物資の寄付ならいつでも歓迎だ。"
10103-CVGroup_UIEventShop_Idle1-1 = "乗りかかった船だ。\n他校に手を貸そうではないか。"
10103-CVGroup_UIEventShop_Idle2-1 = "（京劇のお面……よく見ると、なんだか怖いな……）"
10103-CVGroup_UIEventShop_Buy1-1 = "おお、これは立派な品だ。"
10103-CVGroup_UIEventShop_Buy2-1 = "これだけあれば、交流会の成功は間違いないだろう。"
10103-CVGroup_UIEventShop_Buy3-1 = "あの……先生。\n疑ってるわけではないんだが……\nこれだけの物資を、一体どこから……？"
10103-CVGroup_UIEventShop_Buy4-1 = "素晴らしい！\n先生の名は、両校で語り継がれるだろう！"
