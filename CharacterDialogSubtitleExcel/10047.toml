[translation]
10047-CVGroup_UITitle_Idle1-1 = "ブル～……アーカイブ？"
10047-CVGroup_CharacterGet_Idle1-1 = "さっき……海辺でしゃかしゃか歩く、\nワタリガニさんを見つけたの。\n先生、一緒に見にいこ？"
10047-CVGroup_Cafe_Idle1-1 = "涼しい～"
10047-CVGroup_Cafe_Idle2-1 = "わあ、これって……\nアイスクリーム？"
10047-CVGroup_Cafe_Idle3-1 = "この辺に、ワタリガニさんのお家を作ろう。"
10047-CVGroup_Cafe_Idle4-1 = "ハンカチOK、スコップOK……\nうん、これで砂のお城、作れそうだね。"
10047-CVGroup_Cafe_Idle5-1 = "陰陽部のみんなと砂山で棒倒しとかしたいな。"
10047-CVGroup_WeaponGet_Idle1-1 = "これ、くれるの？わぁ、ありがと～。\nじゃあ次は、私の番かな～？\nお返し、楽しみにしててね～"
10047-CVGroup_UIEventLobby_Enter1-1 = "あ、待ってたよ、先生～"
10047-CVGroup_UIEventLobby_Enter1-2 = "……あれ？\n何で待ってたんだっけ？"
10047-CVGroup_UIEventLobby_Enter2-1 = "いらっしゃいませ、ようこそ海の家へ～"
10047-CVGroup_UIEventLobby_Enter2-2 = "……合ってる？"
10047-CVGroup_UIEventLobby_Idle1-1 = "みんな忙しそうだし……\n先生と私で、遊ぼっか？"
10047-CVGroup_UIEventLobby_Idle2-1 = "そういえばカホが、危険を感じたら"
10047-CVGroup_UIEventLobby_Idle2-2 = "すぐ防犯用の榴弾を撃つようにって言ってた。"
10047-CVGroup_UIEventLobby_Idle3-1 = "あ、実は熱中症対策に……"
10047-CVGroup_UIEventLobby_Idle3-2 = "はい、抹茶ラムネ。"
10047-CVGroup_UIEventLobby_Idle3-3 = "先生も、飲もう？"
10047-CVGroup_UIEventLobby_Idle4-1 = "先生、呼んだ？\n私も今、心の中で呼んでたの。"
10047-CVGroup_UIEventLobby_Idle4-2 = "偶然だね。"
10047-CVGroup_UIEventLobby_Enter3-1 = "みんな楽しそうだね～\nうん、元気なのは良いこと。"
10047-CVGroup_UIEventLobby_Enter4-1 = "みんな、頑張ってるみたいだね\nじゃあ、私も頑張る。"
10047-CVGroup_UIEventLobby_Enter5-1 = "え、もう終わり？\nじゃあ先生、みんなで水遊びしよう？"
10047-CVGroup_UIEventMission_Enter1-1 = "やることがいっぱいだ～\n先生も大変だね～？"
10047-CVGroup_UIEventMission_Enter2-1 = "あ、先生目標リスト……？\nっていうのを貰ったの。\n先生、欲しい？"
10047-CVGroup_UIEventMission_Buy1-1 = "わあ、すごい……！"
10047-CVGroup_UIEventMission_Buy2-1 = "先生、頑張ったね。\n良い子良い子。"
10047-CVGroup_UIEventMission_Idle1-1 = "ツンツンするのも、お仕事なの？\nじゃあ、私も先生にツンツンしてあげる。"
10047-CVGroup_UIEventMission_Idle2-1 = "サボっちゃ駄目だよ～って、さっきニヤ部長が。"
10047-CVGroup_UIEventMission_Interaction1-1 = "これで、今日のお仕事は終わり？\nじゃあ今から、何をして遊ぼっか？"
