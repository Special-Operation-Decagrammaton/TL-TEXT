[translation]
10047-CVGroup_UITitle_Idle1-1 = "Blu... Archive?"
10047-CVGroup_CharacterGet_Idle1-1 = "Sabe... eu encontrei um caranguejo-nadador\ncaminhando pela praia agorinha mesmo.\nSensei, vamos lá ver?"
10047-CVGroup_Cafe_Idle1-1 = "Que refrescante~"
10047-CVGroup_Cafe_Idle2-1 = "Uau, isso é...\nSorvete?"
10047-CVGroup_Cafe_Idle3-1 = "Vamos construir uma casinha para o caranguejo-nadador por aqui."
10047-CVGroup_Cafe_Idle4-1 = "Lenço ok, pá ok...\nIsso, acho que agora dá para fazer um castelo de areia."
10047-CVGroup_Cafe_Idle5-1 = "Queria brincar de derrubar o graveto na areia com o pessoal do Clube Yin-Yang."
10047-CVGroup_WeaponGet_Idle1-1 = "Isso é para mim? Uau, obrigada~.\nEntão agora é a minha vez?\nFique esperando pelo meu presente, tá?"
10047-CVGroup_UIEventLobby_Enter1-1 = "Ah, eu estava te esperando, Sensei~"
10047-CVGroup_UIEventLobby_Enter1-2 = "...Ué?\nPor que mesmo que eu estava esperando?"
10047-CVGroup_UIEventLobby_Enter2-1 = "Seja bem-vindo, bem-vindo à casa de praia~"
10047-CVGroup_UIEventLobby_Enter2-2 = "...Está certo?"
10047-CVGroup_UIEventLobby_Idle1-1 = "Todo mundo parece ocupado...\nQue tal se eu e você brincarmos, Sensei?"
10047-CVGroup_UIEventLobby_Idle2-1 = "Falando nisso, a Kaho disse que se eu sentir perigo,"
10047-CVGroup_UIEventLobby_Idle2-2 = "é para disparar granadas de defesa imediatamente."
10047-CVGroup_UIEventLobby_Idle3-1 = "Ah, na verdade, para prevenir insolação..."
10047-CVGroup_UIEventLobby_Idle3-2 = "Aqui, um Ramune de chá verde."
10047-CVGroup_UIEventLobby_Idle3-3 = "Sensei, vamos beber também?"
10047-CVGroup_UIEventLobby_Idle4-1 = "Sensei, você me chamou?\nEu também estava te chamando em pensamento agora."
10047-CVGroup_UIEventLobby_Idle4-2 = "Que coincidência."
10047-CVGroup_UIEventLobby_Enter3-1 = "Todo mundo parece estar se divertindo~\nIsso, é bom estar animado."
10047-CVGroup_UIEventLobby_Enter4-1 = "Parece que todos estão se esforçando.\nEntão, eu também vou me esforçar."
10047-CVGroup_UIEventLobby_Enter5-1 = "Ué, já acabou?\nEntão Sensei, vamos brincar na água com todo mundo?"
10047-CVGroup_UIEventMission_Enter1-1 = "Tem tanta coisa para fazer~\nÉ difícil para você também, né, Sensei?"
10047-CVGroup_UIEventMission_Enter2-1 = "Ah, Sensei, recebi uma lista de objetivos...?\nVocê quer, Sensei?"
10047-CVGroup_UIEventMission_Buy1-1 = "Uau, incrível...!"
10047-CVGroup_UIEventMission_Buy2-1 = "Você se esforçou, Sensei.\nBom garoto, bom garoto."
10047-CVGroup_UIEventMission_Idle1-1 = "Ficar cutucando também é parte do trabalho?\nEntão, eu também vou te cutucar, Sensei."
10047-CVGroup_UIEventMission_Idle2-1 = "Não pode ficar de bobeira, foi o que a Niya-bucho disse agorinha."
10047-CVGroup_UIEventMission_Interaction1-1 = "O trabalho de hoje acaba aqui?\nEntão, do que vamos brincar agora?"
