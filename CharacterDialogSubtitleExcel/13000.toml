[translation]
13000-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
13000-CVGroup_CharacterGet_Idle1-1 = "最高のご奉仕をお約束し、\nご主人様へのご挨拶と致します。"
13000-CVGroup_Cafe_Idle1-1 = "この場所はきれいに掃除されてますね。\n有能なメイドが待機しているに違いないです。"
13000-CVGroup_Cafe_Idle2-1 = "ダイエットですか……。\n一時、そういうことで悩んでいた時期もありましたね。ふふっ。"
13000-CVGroup_Cafe_Idle3-1 = "ようこそいらっしゃいました。\n温かい紅茶を一杯、ご用意いたしましょうか？"
13000-CVGroup_Cafe_Idle4-1 = "ご主人様、先生、もしくは……ダーリン？\nふふっ。どのようにお呼びするのがお好きでしょうか。"
13000-CVGroup_Cafe_Idle5-1 = "あら。これは……私がやるべきことでしたのに……。\nさらにやる気になってしまいましたよ。\nご・主・人・様。"
13000-CVGroup_WeaponGet_Idle1-1 = "期待されるとは、こんなにもときめくことだったのですね。\nアカネは、ご主人様に最高のご奉仕で応えます。"
