[translation]
13000-CVGroup_UITitle_Idle1-1 = "Blue Archive."
13000-CVGroup_CharacterGet_Idle1-1 = "Prometo o melhor dos serviços,\ncomo forma de saudação ao meu mestre."
13000-CVGroup_Cafe_Idle1-1 = "Este lugar está muito bem limpo.\nCom certeza deve haver uma empregada competente de prontidão."
13000-CVGroup_Cafe_Idle2-1 = "Dieta, é...? \nHouve uma época em que me preocupei com isso também. Fufu."
13000-CVGroup_Cafe_Idle3-1 = "Seja muito bem-vindo.\nGostaria que eu preparasse uma xícara de chá quente?"
13000-CVGroup_Cafe_Idle4-1 = "Mestre, Sensei, ou talvez... querido?\nFufu. Como você prefere ser chamado?"
13000-CVGroup_Cafe_Idle5-1 = "Ora. Isso era... algo que eu deveria ter feito...\nAgora estou ainda mais motivada.\nMes-tre."
13000-CVGroup_WeaponGet_Idle1-1 = "Ser esperada por alguém é algo que faz o coração palpitar tanto assim, não é?\nAkane retribuirá ao mestre com o melhor dos serviços."
