[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10135-CVGroup_UITitle_Idle1-1 = "Eu tenho mesmo que dizer isso...?\nBlue, Archive." 
10135-CVGroup_CharacterGet_Idle1-1 = "Olá, aqui é a Kei.\nPor que o desespero...?\nHaa... A partir de agora, eu serei a encarregada de vigiar você, Sensei." 
10135-CVGroup_Cafe_Idle1-1 = "(Eu também sou uma 'aluna', afinal... Posso muito bem vir a um café...!)" 
10135-CVGroup_Cafe_Idle2-1 = "Aquilo ali... Que gosto será que tem?" 
10135-CVGroup_Cafe_Idle3-1 = "Entendo... Então isso é o que chamam de 'relaxar'..." 
10135-CVGroup_Cafe_Idle4-1 = "Ter um corpo próprio...\nAté que pode ser um pouco inconveniente, não é...?" 
10135-CVGroup_Cafe_Idle5-1 = "Fufu... Só de ficar parada assim, já é divertido de certa forma..." 
10135-CVGroup_WeaponGet_Idle1-1 = "Significa 'A luz das estrelas de uma terra distante'...\nAcredito que se refira a um passado muito remoto.\nDependendo das coordenadas, dizem que o passado e o futuro coexistem simultaneamente." 
10135-CVGroup_UICarrierLobby_Enter1-1 = "Um primeiro passo em direção ao nosso objetivo inicial, certo?" 
10135-CVGroup_UICarrierLobby_Enter2-1 = "Que tipo de bebida todos vocês gostam...?" 
10135-CVGroup_UICarrierLobby_Enter3-1 = "Este corpo... Sinto que foi muito bem projetado." 
10135-CVGroup_UICarrierLobby_Enter4-1 = "Bom trabalho a todos." 
10135-CVGroup_UICarrierLobby_Enter5-1 = "Aris foi dormir." 
10135-CVGroup_UICarrierLobby_Enter6-1 = "Começo a entender a afirmação de que 'descansar é importante'..." 
10135-CVGroup_UICarrierLobby_Enter7-1 = "Sério, aquele trio vestido de branco...!" 
10135-CVGroup_UICarrierLobby_Idle1-1 = "Eu jamais permitirei que a Aris ou qualquer um de vocês se machuque." 
10135-CVGroup_UICarrierLobby_Idle2-1 = "Será que tem algum sentido colocar dinheiro nesta máquina de venda...?" 
10135-CVGroup_UICarrierLobby_Idle3-1 = "Vou admitir que as habilidades de engenharia daquelas meninas são impressionantes." 
10135-CVGroup_UICarrierLobby_Idle4-1 = "Eimi e Toki foram fazer a inspeção na nave de transporte." 
10135-CVGroup_UICarrierLobby_Idle5-1 = "Sensei, não se esqueça de descansar!" 
10135-CVGroup_UICarrierLobby_Idle5-2 = "E de escovar os dentes!" 
10135-CVGroup_UICarrierLobby_Idle6-1 = "Não está sentindo dor em lugar nenhum, certo?" 
10135-CVGroup_UICarrierLobby_Idle7-1 = "...Eu sou a irmã mais velha, então vou ser paciente." 
10135-CVGroup_UIEventShop_Enter1-1 = "Isso é basicamente... como uma Batalha Total de emergência." 
10135-CVGroup_UIEventShop_Enter1-2 = "Estou gerenciando a loja para fornecer o mínimo de suporte possível." 
10135-CVGroup_UIEventShop_Enter2-1 = "Apresse-se, Sensei! Nós também estamos no nosso limite aqui!" 
10135-CVGroup_UIEventShop_Idle1-1 = "Malkuth... e aquele trio..." 
10135-CVGroup_UIEventShop_Idle1-2 = "Argh! Ninguém escuta o que eu digo!" 
10135-CVGroup_UIEventShop_Idle2-1 = "Quando isso acabar... será que poderemos ir para casa?" 
10135-CVGroup_UIEventShop_Buy1-1 = "Deve estar bem ali! Ande logo!" 
10135-CVGroup_UIEventShop_Buy2-1 = "Escolha rápido e volte a comandar!" 
10135-CVGroup_UIEventShop_Buy3-1 = "Eh? Você quer que eu diga palavras gentis...?" 
10135-CVGroup_UIEventShop_Buy3-2 = "Guarde suas fantasias para a hora e lugar adequados!" 
10135-CVGroup_UIEventShop_Buy3-3 = "Sinceramente... nós realmente não conseguimos fazer nada sem você, Sensei." 
10135-CVGroup_UIEventShop_Buy4-1 = "Não precisa de mais nada?" 
10135-CVGroup_UIEventShop_Buy4-2 = "Não sobrou muito tempo para ficar hesitando." 
10135-CVGroup_UIEventMission_Enter1-1 = "A perseverança é a chave para a força." 
10135-CVGroup_UIEventMission_Enter1-2 = "Está me ouvindo, Sensei?" 
10135-CVGroup_UIEventMission_Enter1-3 = "Estou dizendo para você ser diligente, entendeu?" 
10135-CVGroup_UIEventMission_Enter2-1 = "Olá, Sensei." 
10135-CVGroup_UIEventMission_Enter2-2 = "Eu resumi as tarefas que precisamos concluir hoje." 
10135-CVGroup_UIEventMission_Idle1-1 = "Aconteceu alguma coisa?" 
10135-CVGroup_UIEventMission_Idle1-2 = "Eh? Você só quis me chamar por chamar...?" 
10135-CVGroup_UIEventMission_Idle1-3 = "Se não tem nada importante para dizer, não me chame!" 
10135-CVGroup_UIEventMission_Idle1-4 = "...Bem, se for de vez em quando, eu deixo passar." 
10135-CVGroup_UIEventMission_Idle2-1 = "E-Eu não sinto cócegas nem nada do tipo!" 
10135-CVGroup_UIEventMission_Idle2-2 = "Não é como se eu tivesse cócegas..." 
10135-CVGroup_UIEventMission_Idle2-3 = "Uwaa~~!! Receba o meu ataque de cócegas!!" 
10135-CVGroup_UIEventMission_Buy1-1 = "...Sim, aqui está. Pode levar." 
10135-CVGroup_UIEventMission_Buy1-2 = "O-O que foi?! Quer que eu diga mais alguma coisa?!" 
10135-CVGroup_UIEventMission_Buy1-3 = "...Muito bem feito, Sensei." 
10135-CVGroup_UIEventMission_Buy2-1 = "Eu já imaginava que você apareceria por agora." 
10135-CVGroup_UIEventMission_Buy2-2 = "P-Por que você está fazendo carinho na minha cabeça de repente?!" 
10135-CVGroup_UIEventMission_Buy2-3 = "...Eu não falei para você parar." 
10135-CVGroup_UIEventMission_Interaction1-1 = "Vê? Você consegue quando tenta de verdade." 
10135-CVGroup_UIEventMission_Interaction1-2 = "Dê o seu melhor na próxima vez também." 
10135-CVGroup_UIEventMission_Interaction1-3 = "...Ok?" 