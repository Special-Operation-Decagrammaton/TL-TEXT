[translation]
10135-CVGroup_UITitle_Idle1-1 = "Eu tenho que dizer, não é...? \nBlue Archive."
10135-CVGroup_CharacterGet_Idle1-1 = "Olá, eu sou a Kei. \nPor que está tão apressado...? \nHaa... De agora em diante, eu cuidarei de você, Sensei."
10135-CVGroup_Cafe_Idle1-1 = "(Já que eu também sou uma \"aluna\"... pelo menos no café...!)"
10135-CVGroup_Cafe_Idle2-1 = "Aquilo é... que tipo de gosto será que tem?"
10135-CVGroup_Cafe_Idle3-1 = "Entendo... então é isso que significa relaxar..."
10135-CVGroup_Cafe_Idle4-1 = "Ter o meu próprio corpo é... \nAlgo inconveniente também, não é..."
10135-CVGroup_Cafe_Idle5-1 = "Fufu... só de estar aqui em pé, de alguma forma, é divertido..."
10135-CVGroup_WeaponGet_Idle1-1 = "Significa... luz das estrelas de uma terra distante. \nAcho que isso se refere a algo muito antigo. \nDe acordo com as coordenadas, dizem que o passado e o futuro existem simultaneamente."
10135-CVGroup_UICarrierLobby_Enter1-1 = "Em direção ao primeiro objetivo, um passo de cada vez."
10135-CVGroup_UICarrierLobby_Enter2-1 = "Que tipo de bebida vocês gostam...?"
10135-CVGroup_UICarrierLobby_Enter3-1 = "Este corpo... sinto que foi muito bem feito."
10135-CVGroup_UICarrierLobby_Enter4-1 = "Bom trabalho a todos."
10135-CVGroup_UICarrierLobby_Enter5-1 = "Alice foi dormir."
10135-CVGroup_UICarrierLobby_Enter6-1 = "Talvez eu tenha começado a entender um pouco o ditado de que o descanso é importante..."
10135-CVGroup_UICarrierLobby_Enter7-1 = "Ah, aquele trio de branco...!"
10135-CVGroup_UICarrierLobby_Idle1-1 = "Não deixarei que a Alice, nem vocês, se machuquem de jeito nenhum."
10135-CVGroup_UICarrierLobby_Idle2-1 = "Será que faz sentido colocar dinheiro nesta máquina de venda automática...?"
10135-CVGroup_UICarrierLobby_Idle3-1 = "Vamos pelo menos avaliar a habilidade de engenharia daquelas crianças."
10135-CVGroup_UICarrierLobby_Idle4-1 = "Eimi e Toki foram verificar a nave de transporte."
10135-CVGroup_UICarrierLobby_Idle5-1 = "Sensei, não se esqueça de descansar também!"
10135-CVGroup_UICarrierLobby_Idle5-2 = "E de escovar os dentes também!"
10135-CVGroup_UICarrierLobby_Idle6-1 = "Não há nada de errado em lugar nenhum, certo?"
10135-CVGroup_UICarrierLobby_Idle7-1 = "...Já que eu sou a irmã mais velha, eu vou aguentar."
10135-CVGroup_UIEventShop_Enter1-1 = "Isso é como... uma batalha total de emergência."
10135-CVGroup_UIEventShop_Enter1-2 = "Estou gerenciando a loja, pelo menos para oferecer suporte."
10135-CVGroup_UIEventShop_Enter2-1 = "Depressa, Sensei! Nós também estamos no limite!"
10135-CVGroup_UIEventShop_Idle1-1 = "Decalcomania... e aquele trio..."
10135-CVGroup_UIEventShop_Idle1-2 = "Ah! Ninguém me escuta!"
10135-CVGroup_UIEventShop_Idle2-1 = "Quando isso acabar... será que poderemos voltar?"
10135-CVGroup_UIEventShop_Buy1-1 = "Deve estar aí! Depressa!"
10135-CVGroup_UIEventShop_Buy2-1 = "Escolha logo e volte para o comando!"
10135-CVGroup_UIEventShop_Buy3-1 = "Hã? Quer ouvir palavras gentis...?"
10135-CVGroup_UIEventShop_Buy3-2 = "Escolha a hora e o lugar para falar bobagens!"
10135-CVGroup_UIEventShop_Buy3-3 = "Sério... nós não conseguimos fazer nada sem você, Sensei."
10135-CVGroup_UIEventShop_Buy4-1 = "Precisa de mais alguma coisa?"
10135-CVGroup_UIEventShop_Buy4-2 = "Não nos resta muito tempo para hesitar."
10135-CVGroup_UIEventMission_Enter1-1 = "A constância é a chave, sabe?"
10135-CVGroup_UIEventMission_Enter1-2 = "Está me ouvindo, Sensei?"
10135-CVGroup_UIEventMission_Enter1-3 = "Estou dizendo para ser sincero, entendeu?"
10135-CVGroup_UIEventMission_Enter2-1 = "Olá, Sensei."
10135-CVGroup_UIEventMission_Enter2-2 = "Resumi as tarefas de hoje."
10135-CVGroup_UIEventMission_Idle1-1 = "Aconteceu alguma coisa?"
10135-CVGroup_UIEventMission_Idle1-2 = "Hã? Só me chamou... por chamar?"
10135-CVGroup_UIEventMission_Idle1-3 = "Se não tem nada importante, não me chame!"
10135-CVGroup_UIEventMission_Idle1-4 = "...De vez em quando, tudo bem."
10135-CVGroup_UIEventMission_Idle2-1 = "E-eu não sinto cócegas, sabia!"
10135-CVGroup_UIEventMission_Idle2-2 = "Cócegas, não sinto nada disso..."
10135-CVGroup_UIEventMission_Idle2-3 = "Uaaa~~!! Tome isso, ataque de cócegas!!"
10135-CVGroup_UIEventMission_Buy1-1 = "...Sim, aqui está. Pode levar."
10135-CVGroup_UIEventMission_Buy1-2 = "O-o que foi!? Quer que eu diga alguma coisa!?"
10135-CVGroup_UIEventMission_Buy1-3 = "……Muito bem, Sensei."
10135-CVGroup_UIEventMission_Buy2-1 = "Eu já esperava que você viesse a esta hora."
10135-CVGroup_UIEventMission_Buy2-2 = "P-por que você está me fazendo carinho de repente!?"
10135-CVGroup_UIEventMission_Buy2-3 = "……Eu não disse para parar."
10135-CVGroup_UIEventMission_Interaction1-1 = "Viu só? Você consegue quando se esforça."
10135-CVGroup_UIEventMission_Interaction1-2 = "Continue se esforçando na próxima também."
10135-CVGroup_UIEventMission_Interaction1-3 = "……Né?"
