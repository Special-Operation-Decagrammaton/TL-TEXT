10081-CVGroup_Cafe_Idle5-1 = "Hum hum~ hum~♪\nO avanço de Yukari é imparável!"
10081-CVGroup_WeaponGet_Idle1-1 = "Eh? Isso é para mim...?\nÉ um símbolo de confiança, você diz...? Então é uma prova disso, não é!?\nSendo assim, pretendo continuar criando lendas para não decepcionar o Sensei!"
