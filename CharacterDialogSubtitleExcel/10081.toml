[translation]
10081-CVGroup_UITitle_Idle1-1 = "ぶる～～あーかいぶ、ですの！"
10081-CVGroup_CharacterGet_Idle1-1 = "身共は勘解由小路ユカリと申します！\n誇り高き百花繚乱の一員として……\n先生のために、誠心誠意努めてまいりましょう！"
10081-CVGroup_Cafe_Idle1-1 = "ふむふむなるほど、ここがしゃーれ……！\n……趣のあるところですね！"
10081-CVGroup_Cafe_Idle2-1 = "早朝から鍛錬をしていたのですが……\nふわぁ、眠気が襲ってきますの。"
10081-CVGroup_Cafe_Idle3-1 = "(何やら、只者ではない気配が……しゃーれは、実は伏魔殿だったのかもしれませんの！)"
10081-CVGroup_Cafe_Idle4-1 = "さてと。百花繚乱として、\n皆様の手本になりませんと……"
10081-CVGroup_Cafe_Idle5-1 = "ふっふん～ふん～♪\nユカリ快進撃ですの～！"
10081-CVGroup_WeaponGet_Idle1-1 = "えっ？これを、身共に……？\nこれは信頼の象徴である、と……？その証ということなのですね！？\nそれであれば、身共は、先生を失望させないようにこれからも伝説を残していく所存ですわ！"
