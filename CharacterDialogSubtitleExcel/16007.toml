[translation]
16007-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
16007-CVGroup_CharacterGet_Idle1-1 = "こうしてお会いできて光栄です、先生。\nよろしければご挨拶代わりに、\nチェリノ会長のこれまでの偉業についてお聞きになられますか？"
16007-CVGroup_Cafe_Idle1-1 = "扇動は、小さなことからゆっくりと……。"
16007-CVGroup_Cafe_Idle2-1 = "ふふ、チェリノ会長によく似合いそうな、\n可愛いらしい小物ですね。"
16007-CVGroup_Cafe_Idle3-1 = "この空間は、暖かくていいですね。"
16007-CVGroup_Cafe_Idle4-1 = "次は必ず、ここにチェリノ会長と……！"
16007-CVGroup_Cafe_Idle5-1 = "あれ？どこからか会長の気配が……。"
16007-CVGroup_WeaponGet_Idle1-1 = "私のためにこの銃を……？\nふふ、ありがとうございます。先生。"
16007-CVGroup_UIEventBoxGachaShop_Enter1-1 = "レッドウィンター事務局へようこそ、先生。"
16007-CVGroup_UIEventBoxGachaShop_Enter2-1 = "学園の敷地内にある会長を模したマトリョーシカは、\nもう見つけられましたか？"
16007-CVGroup_UIEventBoxGachaShop_Enter2-2 = "それがあれば、ここで商品と交換することができますよ！"
16007-CVGroup_UIEventBoxGachaShop_Enter3-1 = "お祭り、楽しんでいらっしゃいますか？"
16007-CVGroup_UIEventBoxGachaShop_Enter3-2 = "会長のマトリョーシカを見つけましたら、\nいつでもこちらに来てください！"
16007-CVGroup_UIEventBoxGachaShop_Enter4-1 = "お祭りも、もう佳境ですね……。"
16007-CVGroup_UIEventBoxGachaShop_Enter4-2 = "寂しいですが、仕方ありません。"
16007-CVGroup_UIEventBoxGachaShop_Enter5-1 = "今日が、イワン・クパーラ最終日です。"
16007-CVGroup_UIEventBoxGachaShop_Enter5-2 = "思い残しが無いように思う存分楽しんでくださいね！"
16007-CVGroup_UIEventBoxGachaShop_Enter6-1 = "お祭りは終わりましたが、\nまだマトリョーシカをお持ちでしたら、"
16007-CVGroup_UIEventBoxGachaShop_Enter6-2 = "ここで交換できますよ。"
16007-CVGroup_UIEventBoxGachaShop_Idle1-1 = "その会長の形をしたマトリョーシカは、\n私がデザインしたんですよ。"
16007-CVGroup_UIEventBoxGachaShop_Idle1-2 = "ふふ……可愛いと思いませんか？"
16007-CVGroup_UIEventBoxGachaShop_Idle2-1 = "こんなにも可愛いマトリョーシカを手放さないといけないなんて……。"
16007-CVGroup_UIEventBoxGachaShop_Idle2-2 = "何だか胸が苦しいですよね、\nそう思いません？"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "当たりです！\nおめでとうございます！"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "あら、当たりですよ！\n先生は運が良いですね。"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "ふふ、良い物が当たりましたね。\nぜひ大切に使ってください！"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize4-1 = "チェリノ会長らしい、\n可愛いプレゼントですね！"
