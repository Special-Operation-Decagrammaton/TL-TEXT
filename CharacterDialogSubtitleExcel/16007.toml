[translation]
16007-CVGroup_UITitle_Idle1-1 = "Blue Archive."
16007-CVGroup_CharacterGet_Idle1-1 = "É uma honra conhecê-lo, Sensei.\nSe não se importar, gostaria de ouvir sobre os grandes feitos da Presidente Cherino como uma saudação?"
16007-CVGroup_Cafe_Idle1-1 = "A agitação começa lentamente, com pequenas coisas..."
16007-CVGroup_Cafe_Idle2-1 = "Hehe, que acessório adorável, combina muito com a Presidente Cherino."
16007-CVGroup_Cafe_Idle3-1 = "Este lugar é quente e agradável, não é?"
16007-CVGroup_Cafe_Idle4-1 = "Da próxima vez, trarei a Presidente Cherino aqui...!"
16007-CVGroup_Cafe_Idle5-1 = "Ué? Sinto a presença da Presidente em algum lugar..."
16007-CVGroup_WeaponGet_Idle1-1 = "Esta arma é para mim...?\nHehe, muito obrigada, Sensei."
16007-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Bem-vindo ao Secretariado de Red Winter, Sensei."
16007-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Você já encontrou as bonecas matryoshka da Presidente espalhadas pelo campus?"
16007-CVGroup_UIEventBoxGachaShop_Enter2-2 = "Se você as tiver, pode trocá-las por itens aqui!"
16007-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Está aproveitando o festival?"
16007-CVGroup_UIEventBoxGachaShop_Enter3-2 = "Se encontrar as matryoshkas da Presidente, venha aqui a qualquer momento!"
16007-CVGroup_UIEventBoxGachaShop_Enter4-1 = "O festival já está chegando ao fim..."
16007-CVGroup_UIEventBoxGachaShop_Enter4-2 = "É triste, mas não há o que fazer."
16007-CVGroup_UIEventBoxGachaShop_Enter5-1 = "Hoje é o último dia do Ivan Kupala."
16007-CVGroup_UIEventBoxGachaShop_Enter5-2 = "Aproveite ao máximo para não deixar nada para trás!"
16007-CVGroup_UIEventBoxGachaShop_Enter6-1 = "O festival acabou, mas se você ainda tiver matryoshkas,"
16007-CVGroup_UIEventBoxGachaShop_Enter6-2 = "ainda pode trocá-las aqui."
16007-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Fui eu quem desenhei essas matryoshkas com o formato da Presidente."
16007-CVGroup_UIEventBoxGachaShop_Idle1-2 = "Hehe... não acha que são fofas?"
16007-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Ter que me desfazer de uma matryoshka tão fofa assim..."
16007-CVGroup_UIEventBoxGachaShop_Idle2-2 = "Dá um aperto no coração, não acha?"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Você ganhou! Parabéns!"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Ora, você ganhou! Sensei, você tem muita sorte."
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Hehe, você ganhou algo muito bom. Por favor, cuide bem disso!"
16007-CVGroup_UIEventBoxGachaShop_BoxGachaPrize4-1 = "É um presente adorável, bem a cara da Presidente Cherino!"
