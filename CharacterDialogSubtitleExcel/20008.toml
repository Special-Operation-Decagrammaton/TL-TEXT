[translation]
20008-CVGroup_UITitle_Idle1-1 = "Blue Archive."
20008-CVGroup_CharacterGet_Idle1-1 = "Sou Ako Amau, oficial administrativa do Comitê Disciplinar da Academia Gehenna.\nComo agora temos uma parceria de trabalho, conto com a sua colaboração."
20008-CVGroup_Cafe_Idle1-1 = "Entendo... \nBem, não são instalações ruins."
20008-CVGroup_Cafe_Idle2-1 = "A próxima tarefa de parceria com o Schale é..."
20008-CVGroup_Cafe_Idle3-1 = "Presidente... \nSerá que ela está se alimentando direito...?"
20008-CVGroup_Cafe_Idle4-1 = "É um ambiente meio relaxado, não é... \nBem, não que isso importe..."
20008-CVGroup_Cafe_Idle5-1 = "Em uma situação de emergência... \nNão, isso deixaria a presidente em apuros.\nMelhor deixar para lá."
20008-CVGroup_WeaponGet_Idle1-1 = "Ora, fazer uma abordagem tão ousada com tanta naturalidade... bem, tudo bem.\nVou te ensinar até a medula dos ossos o quão talentosa é a aluna que está diante de você."
20008-CVGroup_UIEventMiniGameMission_Enter1-1 = "Agradeço imensamente pelo apoio, Sensei."
20008-CVGroup_UIEventMiniGameMission_Idle1-1 = "O resto fica com você, está bem?"
20008-CVGroup_UIEventMiniGameMission_Buy1-1 = "São suprimentos do Comitê Disciplinar!"
20008-CVGroup_UIEventMiniGameMission_Interaction1-1 = "Isso... obrigado, Sensei."
20008-CVGroup_UIEventMiniGameMission_Interaction1-2 = "...Por que está me olhando com essa cara?"
20008-CVGroup_UIEventMiniGameMission_Interaction1-3 = "Eu também sei agradecer quando alguém faz algo por mim.\nFrancamente..."
