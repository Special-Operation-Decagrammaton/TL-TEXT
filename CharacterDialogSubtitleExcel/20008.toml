[translation]
20008-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
20008-CVGroup_CharacterGet_Idle1-1 = "ゲヘナ学園風紀委員会所属の行政官、天雨アコ。\n今後は業務提携とのことで、どうぞよろしくお願いいたしますね。"
20008-CVGroup_Cafe_Idle1-1 = "なるほど……\nまあ、悪くない設備ですね"
20008-CVGroup_Cafe_Idle2-1 = "次のシャーレとの提携業務は……。"
20008-CVGroup_Cafe_Idle3-1 = "委員長……\nきちんとお食事を取られてるでしょうか……？"
20008-CVGroup_Cafe_Idle4-1 = "なんだかフワフワとした雰囲気ですね……\nまあ、どうでも良いのですが……。"
20008-CVGroup_Cafe_Idle5-1 = "いざという時には……\nいえ、それでは委員長が困ってしまいますね\nやめておきましょう。"
20008-CVGroup_WeaponGet_Idle1-1 = "全く、こういう大胆なアプローチを平然と……まあ良いでしょう。\nあなたの目の前にいる生徒がどれだけ優秀なのか、骨の髄まで教えてあげます。"
20008-CVGroup_UIEventMiniGameMission_Enter1-1 = "先生からのご支援ありがたく頂戴しますね。"
20008-CVGroup_UIEventMiniGameMission_Idle1-1 = "あとはお任せしますね？"
20008-CVGroup_UIEventMiniGameMission_Buy1-1 = "風紀委員会からの支給品です！"
20008-CVGroup_UIEventMiniGameMission_Interaction1-1 = "その……ありがとうございます。先生。"
20008-CVGroup_UIEventMiniGameMission_Interaction1-2 = "……何ですか、その顔は。"
20008-CVGroup_UIEventMiniGameMission_Interaction1-3 = "私だって何かをしてもらえば、感謝くらいします。\nまったく……。"
