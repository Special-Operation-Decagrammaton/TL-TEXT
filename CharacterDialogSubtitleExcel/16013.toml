[translation]
16013-CVGroup_UITitle_Idle1-1 = "ブ、ブルーアーカイブ！"
16013-CVGroup_CharacterGet_Idle1-1 = "せ、先生を監視しに来たの！\nエッチなのはダメ、禁止！\n絶対に許さないから……！"
16013-CVGroup_Cafe_Idle1-1 = "うぅ、人が、多すぎる……。"
16013-CVGroup_Cafe_Idle2-1 = "あ、あれはっ……！？"
16013-CVGroup_Cafe_Idle3-1 = "も、もしかして、\nこんな格好してるの、私だけ……！？"
16013-CVGroup_Cafe_Idle4-1 = "先生……どこぉ……。"
16013-CVGroup_Cafe_Idle5-1 = "こ、これだって、\n好きで着てるわけじゃないのに！"
16013-CVGroup_WeaponGet_Idle1-1 = "こ、これは……んと……。\nだ、ダメ、ちゃんと言わなきゃ……\nあ、ありがと先生！これからも頑張るわ！\nも、もういいでしょ？私だって、お礼くらい言えるのっ！"
16013-CVGroup_UIEventLobby_Enter1-1 = "もたもたしてる時間はないの！\n早くいこ！"
16013-CVGroup_UIEventLobby_Enter2-1 = "私がついてる以上、\n手を抜いたらダメだからね！"
16013-CVGroup_UIEventLobby_Enter3-1 = "ふふっ、順調ね！"
16013-CVGroup_UIEventLobby_Enter4-1 = "頑張ろ！\nあとちょっとだから！"
16013-CVGroup_UIEventLobby_Enter5-1 = "万が一って事もあるし、\nもう一度見てみない？"
16013-CVGroup_UIEventLobby_Idle1-1 = "ひ、ひいっ！？びっくりしたぁ……。\nもう！なんなのよ先生！"
16013-CVGroup_UIEventLobby_Idle2-1 = "さ、さっきから何よ……。\n何度も呼ばないでっ。"
16013-CVGroup_UIEventLobby_Idle3-1 = "ああもう！\n用事があるならちゃんと言葉にして！"
16013-CVGroup_UIEventLobby_Idle4-1 = "ん？どうしたの？"
