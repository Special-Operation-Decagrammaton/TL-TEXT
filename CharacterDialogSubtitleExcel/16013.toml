[translation]
16013-CVGroup_UITitle_Idle1-1 = "B-Blue Archive!"
16013-CVGroup_CharacterGet_Idle1-1 = "E-Eu vim aqui para vigiar o Sensei!\nNada de coisas pervertidas, é proibido!\nEu não vou perdoar, de jeito nenhum...!"
16013-CVGroup_Cafe_Idle1-1 = "Ugh, tem gente demais aqui..."
16013-CVGroup_Cafe_Idle2-1 = "A-Aquilo é...!?"
16013-CVGroup_Cafe_Idle3-1 = "S-Será que... eu sou a única que está vestida assim...!?"
16013-CVGroup_Cafe_Idle4-1 = "Sensei... onde você está..."
16013-CVGroup_Cafe_Idle5-1 = "E-Eu não estou usando isso porque eu quero, sabia!"
16013-CVGroup_WeaponGet_Idle1-1 = "I-Isso é... bem...\nN-Não, eu preciso dizer direito...\nO-Obrigada, Sensei! Vou continuar me esforçando!\nJ-Já chega, né? Eu também sei agradecer!"
16013-CVGroup_UIEventLobby_Enter1-1 = "Não temos tempo a perder!\nVamos logo!"
16013-CVGroup_UIEventLobby_Enter2-1 = "Já que estou aqui com você,\nnão quero ver ninguém fazendo corpo mole!"
16013-CVGroup_UIEventLobby_Enter3-1 = "Hehe, estamos indo bem!"
16013-CVGroup_UIEventLobby_Enter4-1 = "Vamos nos esforçar!\nFalta só um pouquinho!"
16013-CVGroup_UIEventLobby_Enter5-1 = "Vai que acontece alguma coisa, não quer conferir mais uma vez?"
16013-CVGroup_UIEventLobby_Idle1-1 = "I-Iiiih!? Que susto...\nQual é, Sensei!"
16013-CVGroup_UIEventLobby_Idle2-1 = "O-O que foi agora?...\nNão fique me chamando toda hora."
16013-CVGroup_UIEventLobby_Idle3-1 = "Ah, chega!\nSe precisa de algo, fale logo de uma vez!"
16013-CVGroup_UIEventLobby_Idle4-1 = "Hm? O que foi?"
