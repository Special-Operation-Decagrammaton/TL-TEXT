[translation]
20014-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
20014-CVGroup_CharacterGet_Idle1-1 = "Aqui é Saki Sorai, do Esquadrão RABBIT da Academia SRT.\nE então, onde está o manual de instruções do Schale?"
20014-CVGroup_Cafe_Idle1-1 = "Todo mundo aqui está relaxado demais... que vergonha."
20014-CVGroup_Cafe_Idle2-1 = "Por onde eu olho, só vejo caras de bobos."
20014-CVGroup_Cafe_Idle3-1 = "Mesmo que estejamos no intervalo,\nainda existe um nível mínimo de disciplina militar que..."
20014-CVGroup_Cafe_Idle4-1 = "(Onde está o manual para usar isso...?)"
20014-CVGroup_Cafe_Idle5-1 = "(O que é aquilo? Nunca vi nem no manual de instruções...)"
20014-CVGroup_WeaponGet_Idle1-1 = "Metralhadora RABBIT modelo 26, recebida com sucesso.\n...Sim. Esse peso é reconfortante."
