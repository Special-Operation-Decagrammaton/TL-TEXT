[translation]
10052-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10052-CVGroup_CharacterGet_Idle1-1 = "セミナーの書記、生塩ノアです。\nよろしくお願いしますね、先生……様々な面で、はい。"
10052-CVGroup_Cafe_Idle1-1 = "（このカフェ、まるで夢想家たちが見る夢みたいですね……）"
10052-CVGroup_Cafe_Idle2-1 = "（少しだけアンニュイな現実を忘れて、白昼夢に耽るとしましょうか）"
10052-CVGroup_Cafe_Idle3-1 = "この家具、セミナーの休憩室にも導入したいですね。ふふっ。"
10052-CVGroup_Cafe_Idle4-1 = "この空間の構造……印象的ですね。"
10052-CVGroup_Cafe_Idle5-1 = "ふふ、この光景、\nユウカちゃんにも見せてあげたいです。"
10052-CVGroup_WeaponGet_Idle1-1 = "このコンバージョンキットは不思議な構造をしていますね。\n少し……色々と試してみたくなりました。ふふっ。"
10052-CVGroup_UIEventLobby_Enter1-1 = "それでは、一緒に「晄輪大祭」の準備をはじめましょう。"
10052-CVGroup_UIEventLobby_Enter2-1 = "開会式に遅れないよう、頑張りましょうね！"
10052-CVGroup_UIEventLobby_Enter3-1 = "（えっと……このあとに用意するものは……）"
10052-CVGroup_UIEventLobby_Enter4-1 = "「晄輪大祭」開催まであとわずかですね。"
10052-CVGroup_UIEventLobby_Enter4-2 = "最後まで頑張ってください。"
10052-CVGroup_UIEventLobby_Enter5-1 = "お疲れ様でした先生。\n皆で一致団結して準備しましたから、"
10052-CVGroup_UIEventLobby_Enter5-2 = "今回の「晄輪大祭」も楽しいこと間違いなしです。"
10052-CVGroup_UIEventLobby_Idle1-1 = "キヴォトス中の注目が集まるお祭りですから、"
10052-CVGroup_UIEventLobby_Idle1-2 = "ミレニアムの真価を示せるよう、最善を尽くします！"
10052-CVGroup_UIEventLobby_Idle2-1 = "運動は得意ではありませんが……"
10052-CVGroup_UIEventLobby_Idle2-2 = "これも一応、セミナーの仕事ですから。"
10052-CVGroup_UIEventLobby_Idle3-1 = "（……皆がお祭りを楽しみにしているわけでは、ないのですね……）"
10052-CVGroup_UIEventLobby_Idle4-1 = "ユウカちゃんが目覚めたら、きっと小言の嵐でしょうね。"
10052-CVGroup_UIEventLobby_Idle4-2 = "ふふ……ユウカちゃんの慌てる姿、今から楽しみです。"
10052-CVGroup_UIEventMission_Enter1-1 = "こちら、「晄輪大祭」の準備に必要な業務一覧になります。"
10052-CVGroup_UIEventMission_Enter2-1 = "あ、丁度良いところに！\n先生にお願いしたいお仕事がありまして……。"
10052-CVGroup_UIEventMission_Idle1-1 = "あれ？どうされました？"
10052-CVGroup_UIEventMission_Idle2-1 = "ふふ、ダメですよ。\n今は忙しいので……あとでちゃんと構ってあげます。"
10052-CVGroup_UIEventMission_Buy1-1 = "さすがです、先生。\n勉強になりました。"
10052-CVGroup_UIEventMission_Buy2-1 = "いい仕事っぷりですね。\n感心しました。"
10052-CVGroup_UIEventMission_Interaction1-1 = "ここのお仕事はこれで一段落ですね。\nご協力、感謝します。"
