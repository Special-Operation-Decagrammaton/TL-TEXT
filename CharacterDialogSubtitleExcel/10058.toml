[translation]
10058-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
10058-CVGroup_CharacterGet_Idle1-1 = "救護騎士団団長、蒼森ミネと申します。\n救護が必要な方はどちらでしょうか？"
10058-CVGroup_Cafe_Idle1-1 = "救護が必要な方は……いらっしゃいませんか？"
10058-CVGroup_Cafe_Idle2-1 = "ここは……気持ちが安らぎますね。"
10058-CVGroup_Cafe_Idle3-1 = "ここでお茶会を開くのはどうでしょう？"
10058-CVGroup_Cafe_Idle4-1 = "誰にでも休息は必要です。\nもちろん、救護騎士団にも。"
10058-CVGroup_Cafe_Idle5-1 = "健康と美容のために、食後に一杯の紅茶を。"
10058-CVGroup_WeaponGet_Idle1-1 = "お気遣いくださりありがとうございます。\n……私の全てを賭して、先生のお力となりましょう。"
