[translation]
13013-CVGroup_UITitle_Idle1-1 = "Blue Archive."
13013-CVGroup_CharacterGet_Idle1-1 = "Sou, da Frente de Libertação do Conhecimento da Academia Federal de Red Winter, Momiji... Para proteger todo o conhecimento do mundo... vamos lutar juntos!"
13013-CVGroup_Cafe_Idle1-1 = "...Quem sabe se em algum lugar daqui, não exista um livro raro que não circula pelo mundo..."
13013-CVGroup_Cafe_Idle2-1 = "Este lugar é perfeito para a leitura, não é?"
13013-CVGroup_Cafe_Idle3-1 = "Posso dormir só um pouquinho...?"
13013-CVGroup_Cafe_Idle4-1 = "Eu quero... o lançamento novo..."
13013-CVGroup_Cafe_Idle5-1 = "Este lugar... parece bom para se isolar, mas ao mesmo tempo, não parece...?"
13013-CVGroup_WeaponGet_Idle1-1 = "Vou usar isso pelo Sensei... Bem, por onde devo começar a silenciar as coisas?"
13013-CVGroup_UIEventLobby_Enter1-1 = "Você veio, Sensei!"
13013-CVGroup_UIEventLobby_Enter1-2 = "Hehe, eu estava esperando há muito tempo."
13013-CVGroup_UIEventLobby_Enter2-1 = "Olá, Sensei!"
13013-CVGroup_UIEventLobby_Enter2-2 = "Se for algo que eu possa fazer, por favor, me peça qualquer coisa!"
13013-CVGroup_UIEventLobby_Enter3-1 = "Parece que as coisas estão ficando cada vez maiores..."
13013-CVGroup_UIEventLobby_Enter3-2 = "Mas vai ficar tudo bem, né? Sensei..."
13013-CVGroup_UIEventLobby_Enter4-1 = "Já que chegamos a este ponto, não há como voltar atrás."
13013-CVGroup_UIEventLobby_Enter4-2 = "A Frente de Libertação do Conhecimento continuará avançando!"
13013-CVGroup_UIEventLobby_Enter5-1 = "Conseguimos nos acalmar... Fico muito feliz que todos estejam bem."
13013-CVGroup_UIEventLobby_Idle1-1 = "Sim, Sensei. Você me chamou?"
13013-CVGroup_UIEventLobby_Idle2-1 = "Como será que a Meru-senpai está agora..."
13013-CVGroup_UIEventLobby_Idle2-2 = "Espero que ela não esteja causando problemas em algum lugar..."
13013-CVGroup_UIEventLobby_Idle3-1 = "Eu amo ler textos e ver ilustrações."
13013-CVGroup_UIEventLobby_Idle3-2 = "Os mangás sempre nos ensinam muitas coisas!"
13013-CVGroup_UIEventLobby_Idle4-1 = "Se-Sensei? Se você ficar me encarando assim, eu... fico envergonhada..."
13013-CVGroup_UIEventShop_Enter1-1 = "Procura por algo, Sensei? Pode olhar com calma."
13013-CVGroup_UIEventShop_Enter2-1 = "Já estou acostumada a organizar e exibir itens. Pode deixar comigo!"
13013-CVGroup_UIEventShop_Enter3-1 = "Pode olhar o quanto quiser!"
13013-CVGroup_UIEventShop_Enter3-2 = "Não seria um desperdício se arrepender depois?"
13013-CVGroup_UIEventShop_Idle1-1 = "Gerenciar a loja...?"
13013-CVGroup_UIEventShop_Idle1-2 = "Não, comparado a gerenciar a biblioteca, isso é tranquilo."
13013-CVGroup_UIEventShop_Idle2-1 = "Se uma primeira edição de um livro fora de catálogo estivesse misturada aqui... o que eu deveria fazer...?"
13013-CVGroup_UIEventShop_Idle2-2 = "Ah! I-isso não é um desejo pessoal, de jeito nenhum...!"
13013-CVGroup_UIEventShop_Buy1-1 = "Ah, então você escolheu esse."
13013-CVGroup_UIEventShop_Buy2-1 = "Espere um momento... Sim, aqui está, pode pegar!"
13013-CVGroup_UIEventShop_Buy3-1 = "Agora é a hora daquela frase clássica..."
13013-CVGroup_UIEventShop_Buy3-2 = "\"Uau! Você tem um ótimo gosto, cliente!\""
13013-CVGroup_UIEventShop_Buy4-1 = "\"Volte sempre!\""
13013-CVGroup_UIEventShop_Buy4-2 = "Isso soou como alguém experiente? Hehe, ehehe..."
13013-CVGroup_UIEventCardShop_Enter1-1 = "Bem-vindo, Sensei! O que vai querer?"
13013-CVGroup_UIEventCardShop_Enter2-1 = "Vai testar a sorte?!"
13013-CVGroup_UIEventCardShop_Enter2-2 = "Posso ficar aqui do lado assistindo? Hehe."
13013-CVGroup_UIEventCardShop_Enter3-1 = "Ah, tem algo que te chamou a atenção?"
13013-CVGroup_UIEventCardShop_Idle1-1 = "Sim, Sensei. O que houve?"
13013-CVGroup_UIEventCardShop_Idle2-1 = "\"Uma pequena sorte trazida no momento necessário\"..."
13013-CVGroup_UIEventCardShop_Idle2-2 = "Eu queria dizer essa frase pelo menos uma vez!"
13013-CVGroup_UIEventCardShop_Prize3-1 = "Uau! Grande prêmio! Incrível! Como esperado do Sensei!"
13013-CVGroup_UIEventCardShop_Prize2-1 = "O Sensei tem muita sorte... Você é incrível, Sensei!"
13013-CVGroup_UIEventCardShop_Prize1-1 = "Deixe-me ver um pouco também."
13013-CVGroup_UIEventCardShop_Prize1-2 = "Hmm... isso também é algo útil!"
13013-CVGroup_UIEventCardShop_Prize0-1 = "Uééé..."
13013-CVGroup_UIEventCardShop_Prize0-2 = "A-ah, não fique desanimado, Sensei. Eu estou aqui!"
