[translation]
13013-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
13013-CVGroup_CharacterGet_Idle1-1 = "レッドウィンター連邦学園、知識解放戦線の秋泉、モミジです……\n世の全ての知識を守るために……一緒に戦いましょう！"
13013-CVGroup_Cafe_Idle1-1 = "……もしかしたらここのどこかに、\n世に出回っていない稀少な本があるのかも……。"
13013-CVGroup_Cafe_Idle2-1 = "ここは、読書にぴったりの場所ですね。"
13013-CVGroup_Cafe_Idle3-1 = "少しだけ、寝てもいいでしょうか……。"
13013-CVGroup_Cafe_Idle4-1 = "新刊……欲しいです……。"
13013-CVGroup_Cafe_Idle5-1 = "この場所……\n引きこもるのに向いてるようで、向いてないような……？"
13013-CVGroup_WeaponGet_Idle1-1 = "先生のために……使いますね。\n……さて、何から静かにさせましょうか。"
13013-CVGroup_UIEventLobby_Enter1-1 = "いらしたんですね、先生！"
13013-CVGroup_UIEventLobby_Enter1-2 = "えへへ、ずーっと待ってました。"
13013-CVGroup_UIEventLobby_Enter2-1 = "こんにちは、先生！"
13013-CVGroup_UIEventLobby_Enter2-2 = "私にできることなら、\n何でも言ってください！"
13013-CVGroup_UIEventLobby_Enter3-1 = "どんどん、事が大きくなっていくような……。"
13013-CVGroup_UIEventLobby_Enter3-2 = "でもきっと、大丈夫ですよね？先生……。"
13013-CVGroup_UIEventLobby_Enter4-1 = "こうなった以上、後戻りはできません。"
13013-CVGroup_UIEventLobby_Enter4-2 = "知識解放戦線は進み続けます！"
13013-CVGroup_UIEventLobby_Enter5-1 = "なんとか落ち着きましたね……。\nみんなが無事で、本当によかったです。"
13013-CVGroup_UIEventLobby_Idle1-1 = "はい、先生。\nお呼びですか？"
13013-CVGroup_UIEventLobby_Idle2-1 = "メル先輩、今頃どうしてるかな……。"
13013-CVGroup_UIEventLobby_Idle2-2 = "どこかで暴走してないといいんですが……。"
13013-CVGroup_UIEventLobby_Idle3-1 = "文字を読むことも、絵を見ることも大好きです。"
13013-CVGroup_UIEventLobby_Idle3-2 = "漫画はいつだって\n私たちに色々なことを教えてくれます！"
13013-CVGroup_UIEventLobby_Idle4-1 = "せ、先生？\nそんなに見つめられると私……\n恥ずかしいです……。"
13013-CVGroup_UIEventShop_Enter1-1 = "何かお探しですか、先生？\nゆっくり見ていってくださいね。"
13013-CVGroup_UIEventShop_Enter2-1 = "物を並べたり展示するのは慣れてますから。\n私に任せてください！"
13013-CVGroup_UIEventShop_Enter3-1 = "好きなだけ見ていってください！"
13013-CVGroup_UIEventShop_Enter3-2 = "あとで後悔するなんて、\nもったいないじゃないですか。"
13013-CVGroup_UIEventShop_Idle1-1 = "ショップの管理、ですか……？"
13013-CVGroup_UIEventShop_Idle1-2 = "いえ、図書館の管理に比べれば、\nこれぐらい平気です。"
13013-CVGroup_UIEventShop_Idle2-1 = "この中に、絶版になっていた本の初版が紛れていたら……\n私は……どうすれば……。"
13013-CVGroup_UIEventShop_Idle2-2 = "あっ！こ、これは決して個人的な願望とかではなく……！"
13013-CVGroup_UIEventShop_Buy1-1 = "あ、それをお選びになったんですね。"
13013-CVGroup_UIEventShop_Buy2-1 = "少々お待ちください……\nはいこちら、どうぞ！"
13013-CVGroup_UIEventShop_Buy3-1 = "ここはお決まりのセリフを……"
13013-CVGroup_UIEventShop_Buy3-2 = "「いやー！お目が高いですね、お客さん！」"
13013-CVGroup_UIEventShop_Buy4-1 = "「毎度あり！」"
13013-CVGroup_UIEventShop_Buy4-2 = "今の、ベテランっぽかった、ですか？\nへへ、えへへっ……。"
13013-CVGroup_UIEventCardShop_Enter1-1 = "いらっしゃいませ、先生！何にされますか？"
13013-CVGroup_UIEventCardShop_Enter2-1 = "運試しですか！"
13013-CVGroup_UIEventCardShop_Enter2-2 = "隣で見ていてもいいですか？\nえへへ。"
13013-CVGroup_UIEventCardShop_Enter3-1 = "あっ、何か気になるものでもありましたか？"
13013-CVGroup_UIEventCardShop_Idle1-1 = "はい、先生。どうしたんですか？"
13013-CVGroup_UIEventCardShop_Idle2-1 = "「必要なときにもたらされる、小さな幸運を」……"
13013-CVGroup_UIEventCardShop_Idle2-2 = "一度言ってみたかったです、こういうセリフ！"
13013-CVGroup_UIEventCardShop_Prize3-1 = "うわあっ！大当たり！\nすごいです！さすが先生！"
13013-CVGroup_UIEventCardShop_Prize2-1 = "先生は運がいいんですね……\nカッコいいです、先生！"
13013-CVGroup_UIEventCardShop_Prize1-1 = "ちょっと私にも見せてください。"
13013-CVGroup_UIEventCardShop_Prize1-2 = "むむ……これも使えるものですよ！"
13013-CVGroup_UIEventCardShop_Prize0-1 = "ふえーん……。"
13013-CVGroup_UIEventCardShop_Prize0-2 = "あ、あまり気を落とさないでください、先生。\n私がいますよ！"
