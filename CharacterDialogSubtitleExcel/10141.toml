[translation]
10141-CVGroup_UITitle_Idle1-1 = "Blue... Archi... ve."
10141-CVGroup_CharacterGet_Idle1-1 = "Desculpa a roupa esquisita... mas... prazer em conhecer você..."
10141-CVGroup_Cafe_Idle1-1 = "(Com essa roupa... será que vão achar que tô me achando?)"
10141-CVGroup_Cafe_Idle2-1 = "Deixa eu ver... qual é o lugar mais discreto..."
10141-CVGroup_Cafe_Idle3-1 = "Que cheiro bom de café... ehehe..."
10141-CVGroup_Cafe_Idle4-1 = "Eles não vão vir até aqui atrás de mim... né?"
10141-CVGroup_Cafe_Idle5-1 = "Se eu der de lembrancinha... c-com certeza vão gostar, né?"
10141-CVGroup_WeaponGet_Idle1-1 = "Eu não mereço ganhar isso... n-não... foi o senhor que decidiu. Muito obrigada!"
10141-CVGroup_UIEventLobby_Enter1-1 = "Dá pra ir agora mesmo, sim!"
10141-CVGroup_UIEventLobby_Enter1-2 = "Pode falar qualquer coisa... pode mandar ver!"
10141-CVGroup_UIEventLobby_Enter2-1 = "Ah, muito obrigada!"
10141-CVGroup_UIEventLobby_Enter2-2 = "Hã? Ah, não... é por você ter vindo me encontrar..."
10141-CVGroup_UIEventLobby_Idle1-1 = "Desculpa! Desculpa! Foi tudo culpa minha, né...?"
10141-CVGroup_UIEventLobby_Idle2-1 = "Bomba... munição... se precisar de qualquer coisa, é só falar!"
10141-CVGroup_UIEventLobby_Idle3-1 = "Parece que a coisa ficou feia, hein..."
10141-CVGroup_UIEventLobby_Idle3-2 = "Achar isso divertido... é estranho?"
10141-CVGroup_UIEventLobby_Idle4-1 = "Aliás... a ópera..."
10141-CVGroup_UIEventLobby_Idle4-2 = "Qual será que era a história, mesmo?"