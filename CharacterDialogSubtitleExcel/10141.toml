[translation]
10141-CVGroup_UITitle_Idle1-1 = "Blue... Archi... ve."
10141-CVGroup_CharacterGet_Idle1-1 = "П-простите за мой столь неподобающий вид... \nЯ... я буду под вашей опекой..."
10141-CVGroup_Cafe_Idle1-1 = "(Этот наряд... как вы думаете, я ведь не слишком много на себя беру?..)"
10141-CVGroup_Cafe_Idle2-1 = "Эм, подскажите, а где здесь самое незаметное место...?"
10141-CVGroup_Cafe_Idle3-1 = "Кофе так приятно пахнет... хе-хе."
10141-CVGroup_Cafe_Idle4-1 = "Вы ведь не... пошли за мной до самого этого места, правда?"
10141-CVGroup_Cafe_Idle5-1 = "Если я принесу это обратно в качестве сувенира... \nОни... они ведь наверняка обрадуются, да?"
10141-CVGroup_WeaponGet_Idle1-1 = "Неужели я и правда заслуживаю получить нечто подобное...? \nН-нет... раз уж это было ваше решение, Сенсей... Огромное вам спасибо!"
10141-CVGroup_UIEventLobby_Enter1-1 = "Я... я готова в любое время, как только вы скажете!"
10141-CVGroup_UIEventLobby_Enter1-2 = "П-пожалуйста, прикажите мне всё что угодно...!"
10141-CVGroup_UIEventLobby_Enter2-1 = "Б-большое вам спасибо...!"
10141-CVGroup_UIEventLobby_Enter2-2 = "Ой, эм, ну... я имела в виду, спасибо, что пришли навестить меня."
10141-CVGroup_UIEventLobby_Idle1-1 = "Простите! Простите меня! Э-это ведь я во всём виновата, да...?"
10141-CVGroup_UIEventLobby_Idle2-1 = "Бомбы... патроны... если вам понадобится хоть что-нибудь, только скажите мне...!"
10141-CVGroup_UIEventLobby_Idle3-1 = "Ну и суматоха же поднялась..."
10141-CVGroup_UIEventLobby_Idle3-2 = "Наверное... это странно, что мне кажется, будто это весело?"
10141-CVGroup_UIEventLobby_Idle4-1 = "Если подумать...\\nопера..."
10141-CVGroup_UIEventLobby_Idle4-2 = "Интересно, о чём она вообще была?"
