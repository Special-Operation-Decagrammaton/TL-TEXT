[translation]
20053-CVGroup_UITitle_Idle1-1 = "Blu～! Cof... Arquivo?"
20053-CVGroup_CharacterGet_Idle1-1 = "Sensei! Como vai? Desta vez é uma missão de infiltração!\nConto com você!"
20053-CVGroup_Cafe_Idle1-1 = "Fufu... E se alguém me notar...?"
20053-CVGroup_Cafe_Idle2-1 = "Este vestido... será que é demais para usar aqui...?"
20053-CVGroup_Cafe_Idle3-1 = "(Um vestido e café... Ah! Talvez eu possa usar isso como material...!)"
20053-CVGroup_Cafe_Idle4-1 = "Algum dia, com certeza...! Farei um encontro de fãs aqui...!"
20053-CVGroup_Cafe_Idle5-1 = "(Certo! Por enquanto... onde será que tem um lugar escondido?)"
20053-CVGroup_WeaponGet_Idle1-1 = "Tem certeza...? Para mim, algo assim...! \nMas, se é a decisão do Sensei! Sim! Obrigada!"
20053-CVGroup_UIEventLobby_Enter1-1 = "Para levar em uma missão de infiltração, será que levo um onigiri ou uma pílula de ração ninja—"
20053-CVGroup_UIEventLobby_Enter1-2 = "Hm?\nSensei! Bem-vindo!"
20053-CVGroup_UIEventLobby_Enter2-1 = "Sensei... que visual legal."
20053-CVGroup_UIEventLobby_Enter2-2 = "Esse estilo também é bem refrescante, né."
20053-CVGroup_UIEventLobby_Enter3-1 = "Aaaah!\nPor que começaram a lutar logo em um desfile de moda!?"
20053-CVGroup_UIEventLobby_Enter4-1 = "Queria ver a Tsukuyo..."
20053-CVGroup_UIEventLobby_Enter4-2 = "Será que ela está bem...? Espero que ela esteja conseguindo comer seu lámen direitinho..."
20053-CVGroup_UIEventLobby_Enter5-1 = "O Clube de Pesquisa Ninjutsu, totalmente revivido!"
20053-CVGroup_UIEventLobby_Enter5-2 = "Sensei também! Por aqui, por aqui!"
20053-CVGroup_UIEventLobby_Idle1-1 = "Estou tão entediada..."
20053-CVGroup_UIEventLobby_Idle1-2 = "Hm? Você diz que se eu falar isso, algo vai acontecer?"
20053-CVGroup_UIEventLobby_Idle2-1 = "Ugh... isso é tão apertado, difícil de se mover..."
20053-CVGroup_UIEventLobby_Idle2-2 = "O que todo mundo vê de bom nisso!?"
20053-CVGroup_UIEventLobby_Idle3-1 = "O traje não define o ninja..."
20053-CVGroup_UIEventLobby_Idle3-2 = "Sendo assim, o que torna um ninja um ninja...!?"
20053-CVGroup_UIEventLobby_Idle4-1 = "Observe com atenção...!\nUm simples vestido—"
20053-CVGroup_UIEventLobby_Idle4-2 = "Não é obstáculo nenhum para um ninja...!"
20053-CVGroup_UIEventShop_Enter1-1 = "Bem-vindo, Sensei!\nFique à vontade para olhar."
20053-CVGroup_UIEventShop_Enter1-2 = "Ah! Mas, sobre este produto, na minha opinião—"
20053-CVGroup_UIEventShop_Enter2-1 = "Temos de tudo, menos o que não temos! Fufufu!"
20053-CVGroup_UIEventShop_Enter3-1 = "Fufun~ Vamos fechar logo e ir comer o novo prato ninja!"
20053-CVGroup_UIEventShop_Idle1-1 = "Escolha com cautela, compre com ousadia...!"
20053-CVGroup_UIEventShop_Idle1-2 = "Essa é a regra ao comprar produtos...!"
20053-CVGroup_UIEventShop_Idle2-1 = "Algum dia, colocarei os produtos da 'Crônica Ninja da Michiru' aqui...!"
20053-CVGroup_UIEventShop_Buy1-1 = "Oh~ essa aí. Boa escolha, hein?"
20053-CVGroup_UIEventShop_Buy2-1 = "Isso! Se é um ninja, tem que escolher essa!"
20053-CVGroup_UIEventShop_Buy3-1 = "Aqui, vou esquentar..."
20053-CVGroup_UIEventShop_Buy3-2 = "Ah, errei."
20053-CVGroup_UIEventShop_Buy4-1 = "Oh...! Esse é, sem dúvida, o produto recomendado!"
20053-CVGroup_UIEventShop_Buy4-2 = "Bem, na verdade todos são recomendados!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-1 = "Ah, o Sensei também veio!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter1-2 = "...Eu? Estava pensando em qual escolher."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-1 = "Hmm~ que cheiro bom—"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter2-2 = "Não é só o cheiro! Bem, vamos nessa!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Enter3-1 = "Estava delicioso... não cabe mais nada..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle1-1 = "Macarrão e caldo... isso é exatamente como ninja e ninjutsu..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Idle2-1 = "Sensei, que tipo de lámen você gosta?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-1 = "Oh...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck4-2 = "Este sabor é capaz de me inspirar um novo ninjutsu...!!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck3-1 = "Unya...!? E-este sabor é...!"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck2-1 = "Hm, nada mal, hein...?"
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck1-1 = "Não é ruim, mas... não é ruim... sério, só isso..."
20053-CVGroup_UIEventFortuneGachashop_Ramen_Luck0-1 = "Hã... isso é... lámen...?"
