[translation]
16012-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
16012-CVGroup_CharacterGet_Idle1-1 = "Sensei, feliz ano novo!\nVamos procurar algo gostoso para comer juntos!"
16012-CVGroup_Cafe_Idle1-1 = "Um lugar adorável... ou melhor, um lugar interessante, não é?"
16012-CVGroup_Cafe_Idle2-1 = "De alguma forma...\nSinto um cheiro delicioso..."
16012-CVGroup_Cafe_Idle3-1 = "Preciso tomar cuidado para não sujar."
16012-CVGroup_Cafe_Idle4-1 = "Sempre que estou prestes a comer algo gostoso,\nparece que algo sempre atrapalha..."
16012-CVGroup_Cafe_Idle5-1 = "Tudo bem, com certeza vou conseguir crescer!\nAinda tenho chances, não tenho...?"
16012-CVGroup_WeaponGet_Idle1-1 = "Eu fiquei mais forte, não foi...\n...Só vou dizer isso uma vez, então preste atenção! \nÉ... obrigado. Tudo isso é graças a você, Sensei. Sou grata."
16012-CVGroup_UIEventLobby_Enter1-1 = "Ah, oi, Sensei.\nEstá meio barulhento, né?\nQuer ir dar uma olhada?"
16012-CVGroup_UIEventLobby_Enter2-1 = "O Ano Novo tem muitas comidas deliciosas que não costumamos ver..."
16012-CVGroup_UIEventLobby_Enter2-2 = "Acabo gastando dinheiro sem perceber."
16012-CVGroup_UIEventLobby_Idle1-1 = "Hm? O que foi, Sensei?\nAh, será que...\nVocê queria conversar comigo?"
16012-CVGroup_UIEventLobby_Idle2-1 = "Qual é, não fique me cutucando tanto!\nO quimono vai acabar estragando, sabia?"
16012-CVGroup_UIEventLobby_Idle2-2 = "Lavanderia... não é esse o problema!"
16012-CVGroup_UIEventLobby_Idle3-1 = "Eu prefiro o hakama... é mais fácil de se mover."
16012-CVGroup_UIEventLobby_Idle4-1 = "Por que não prender o cabelo no alto...?"
16012-CVGroup_UIEventLobby_Idle4-2 = "Esse tipo de coisa não combina comigo...\nEntão acho que está bom assim..."
16012-CVGroup_UIEventLobby_Enter3-1 = "Sinto que algo problemático vai acontecer..."
16012-CVGroup_UIEventLobby_Enter3-2 = "Minha intuição, quando é algo ruim, sempre acerta..."
16012-CVGroup_UIEventLobby_Enter4-1 = "Eu já sentia que ia acabar assim..."
16012-CVGroup_UIEventLobby_Enter4-2 = "Bem, se estiver com você, Sensei,\nacho que vai dar tudo certo, não vai?"
16012-CVGroup_UIEventLobby_Enter5-1 = "Ah~, que cansaço.\nFoi bom termos conseguido terminar, né?"
16012-CVGroup_UIEventLobby_Enter5-2 = "O osechi estava delicioso e consegui comer até ficar satisfeita!"
16012-CVGroup_UIEventMission_Enter1-1 = "Tudo isso é você quem vai fazer, Sensei?\nParece bem difícil..."
16012-CVGroup_UIEventMission_Enter1-2 = "Bem, se precisar de algo, é só me chamar."
16012-CVGroup_UIEventMission_Enter2-1 = "Não é hora de ficar relaxado!\nVamos lá, se esforce, Sensei."
16012-CVGroup_UIEventMission_Idle1-1 = "Hm, me chamou?\nVai me pagar alguma coisa?"
16012-CVGroup_UIEventMission_Idle1-2 = "Fufu, brincadeira."
16012-CVGroup_UIEventMission_Idle2-1 = "Eu não desgosto de barulho.\nSe não, eu não estaria com o pessoal do Clube de Pesquisa Gastronômica, né?"
16012-CVGroup_UIEventMission_Buy1-1 = "Ora, ora, você até que consegue fazer as coisas, Sensei."
16012-CVGroup_UIEventMission_Buy1-2 = "Fufu. Eu queria dizer essa frase faz tempo."
16012-CVGroup_UIEventMission_Buy2-1 = "Acho que eu não teria conseguido sozinha...\nEsse é o poder de um adulto..."
16012-CVGroup_UIEventMission_Buy2-2 = "Você não é nada mal."
16012-CVGroup_UIEventMission_Interaction1-1 = "O trabalho de hoje termina aqui?"
16012-CVGroup_UIEventMission_Interaction1-2 = "Se for assim, vamos comer algo gostoso!"
