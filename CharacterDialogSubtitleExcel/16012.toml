[translation]
16012-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！"
16012-CVGroup_CharacterGet_Idle1-1 = "先生、あけましておめでとうー！\n一緒においしいもの、探しに行きましょ！"
16012-CVGroup_Cafe_Idle1-1 = "素敵な……というより、面白そうなところね？"
16012-CVGroup_Cafe_Idle2-1 = "なんだか……\nおいしそうな匂いが……。"
16012-CVGroup_Cafe_Idle3-1 = "汚さないように気をつけないと。"
16012-CVGroup_Cafe_Idle4-1 = "おいしいものを食べようとしてるときに限って、\nいつも邪魔が入るような……。"
16012-CVGroup_Cafe_Idle5-1 = "大丈夫、きっと大きくなれるはず！\nまだ可能性はあるわよね……？"
16012-CVGroup_WeaponGet_Idle1-1 = "私、強くなったんだね……。\n……一度しか言わないから、ちゃんと聞いてるのよ！\nその……ありがとう。全部、先生のおかげ。感謝してる。"
16012-CVGroup_UIEventLobby_Enter1-1 = "あっ、やっほー先生。\nなんだか騒がしいね。\n見に行ってみる？"
16012-CVGroup_UIEventLobby_Enter2-1 = "お正月って普段とは違う美味しいものがたくさんあるのよね……。"
16012-CVGroup_UIEventLobby_Enter2-2 = "ついついお金を使っちゃう。"
16012-CVGroup_UIEventLobby_Idle1-1 = "ん？どうしたの、先生？\nあ、もしかして……\n私と話したかったんだ？"
16012-CVGroup_UIEventLobby_Idle2-1 = "もう、そんなにつつかないで！\nせっかくの着物が崩れちゃうでしょ。"
16012-CVGroup_UIEventLobby_Idle2-2 = "クリーニング……ってそういう問題じゃないの！"
16012-CVGroup_UIEventLobby_Idle3-1 = "私は袴の方が好きかな……動きやすいし。"
16012-CVGroup_UIEventLobby_Idle4-1 = "髪を上で結わないのって……？"
16012-CVGroup_UIEventLobby_Idle4-2 = "そーゆーの私には似合わないし……\nいいかな……。"
16012-CVGroup_UIEventLobby_Enter3-1 = "なんだか厄介なことになりそうな……。"
16012-CVGroup_UIEventLobby_Enter3-2 = "私の直感って、嫌なときに限って当たるから……。"
16012-CVGroup_UIEventLobby_Enter4-1 = "こうなるような気はしてたけど……。"
16012-CVGroup_UIEventLobby_Enter4-2 = "ま、先生と一緒なら、\nなんとかなるんじゃない？"
16012-CVGroup_UIEventLobby_Enter5-1 = "はあ～、疲れた疲れた。\nなんとか終わって良かったわね。"
16012-CVGroup_UIEventLobby_Enter5-2 = "おせちもおいしかったし、お腹いっぱい食べられたし！"
16012-CVGroup_UIEventMission_Enter1-1 = "これ、ぜーんぶ先生がやるの？\nなんだか大変そう……"
16012-CVGroup_UIEventMission_Enter1-2 = "ま、何かあったら声かけてよね。"
16012-CVGroup_UIEventMission_Enter2-1 = "余裕ぶってる場合じゃないわよ！\nほら、頑張って、先生。"
16012-CVGroup_UIEventMission_Idle1-1 = "ん、呼んだ？\n何か奢ってくれるの？"
16012-CVGroup_UIEventMission_Idle1-2 = "ふふっ、冗談。"
16012-CVGroup_UIEventMission_Idle2-1 = "騒がしいのも嫌いじゃないわ。\nでなかったら、美食研究会のみんなと一緒にいないでしょ？"
16012-CVGroup_UIEventMission_Buy1-1 = "なあに、先生もやればできるじゃない。"
16012-CVGroup_UIEventMission_Buy1-2 = "ふふっ。こういうセリフ、言ってみたかったんだ。"
16012-CVGroup_UIEventMission_Buy2-1 = "私ひとりじゃできなかったと思う……。\nこれが大人の力……"
16012-CVGroup_UIEventMission_Buy2-2 = "なかなかやるじゃない。"
16012-CVGroup_UIEventMission_Interaction1-1 = "今日の仕事はこれでおしまい？"
16012-CVGroup_UIEventMission_Interaction1-2 = "それならおいしいもの食べに行きましょ！"
