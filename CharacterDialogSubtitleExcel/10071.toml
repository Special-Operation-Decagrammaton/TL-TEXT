[translation]
10071-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10071-CVGroup_CharacterGet_Idle1-1 = "Aqui é a RABBIT 1. Troca de roupa concluída.\nA partir de agora, iniciaremos a operação de infiltração."
10071-CVGroup_Cafe_Idle1-1 = "(Eu... gostaria de tomar um banho...)"
10071-CVGroup_Cafe_Idle2-1 = "Sinto um cheiro delicioso vindo de algum lugar..."
10071-CVGroup_Cafe_Idle3-1 = "(...Eu deveria ter escolhido um traje de banho mais fofo)"
10071-CVGroup_Cafe_Idle4-1 = "Este é o lugar do Sensei... O que eu estou fazendo agora..."
10071-CVGroup_Cafe_Idle5-1 = "...Onde... o Sensei está...?"
10071-CVGroup_WeaponGet_Idle1-1 = "Submetralhadora modelo RABBIT-31 recebida.\nTroquei algumas peças internas para me preparar para o combate subaquático, mas...\nserá que... eu deveria ter trocado as peças externas por algo mais fofo também...?"
10071-CVGroup_UIEventLobby_Enter1-1 = "Isso é apenas uma operação de infiltração para investigar o incidente...\nEspero que termine bem."
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT 1.\nPreparativos para a operação concluídos.\nSensei, dê as ordens."
10071-CVGroup_UIEventLobby_Enter3-1 = "Parece que acabamos incomodando os moradores..."
10071-CVGroup_UIEventLobby_Enter3-2 = "O que devemos fazer...?"
10071-CVGroup_UIEventLobby_Enter4-1 = "Hehe...\nMais do que apenas aproveitar o banho de mar, este verão se tornou algo bem típico da nossa SRT."
10071-CVGroup_UIEventLobby_Enter5-1 = "Bom trabalho, Sensei."
10071-CVGroup_UIEventLobby_Enter5-2 = "Embora seja por causa da operação, já que estamos na praia..."
10071-CVGroup_UIEventLobby_Enter5-3 = "...Você poderia me dar um pouco do seu tempo?"
10071-CVGroup_UIEventLobby_Idle1-1 = "Faz quanto tempo que eu comi um sanduíche com bastante camarão pela última vez?"
10071-CVGroup_UIEventLobby_Idle2-1 = "(Espero não parecer que estou me divertindo demais...)"
10071-CVGroup_UIEventLobby_Idle3-1 = "Enquanto estou fora, pedi para o pessoal da"
10071-CVGroup_UIEventLobby_Idle3-2 = "Divisão de Segurança Pública da Valkyrie cuidar do Pyonko."
10071-CVGroup_UIEventLobby_Idle3-3 = "Às vezes, parece que o Pyonko está mais apegado ao pessoal da"
10071-CVGroup_UIEventLobby_Idle3-4 = "Segurança Pública do que ao RABBIT Squad, o que me deixa um pouco triste..."
10071-CVGroup_UIEventMission_Enter1-1 = "Você veio, Sensei.\nPreparei a lista necessária para a investigação."
10071-CVGroup_UIEventMission_Enter2-1 = "...Esses são os alvos da operação de infiltração de hoje."
10071-CVGroup_UIEventMission_Idle1-1 = "O que houve?"
10071-CVGroup_UIEventMission_Idle2-1 = "Hum... este traje de banho, o tecido é um pouco fino..."
10071-CVGroup_UIEventMission_Idle2-2 = "E... se você ficar me encarando assim...\nEu acabo ficando sem jeito..."
10071-CVGroup_UIEventMission_Buy1-1 = "Como esperado do Sensei.\nEu confiava em você."
10071-CVGroup_UIEventMission_Buy2-1 = "Obrigada pela sua colaboração.\nFoi de grande ajuda."
