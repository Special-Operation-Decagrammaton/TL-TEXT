[translation]
10071-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ。"
10071-CVGroup_CharacterGet_Idle1-1 = "こちらRABBIT1。着替え完了しました。\nこれより、潜入作戦を開始します。"
10071-CVGroup_Cafe_Idle1-1 = "（シャワーを……浴びたいのですが…)"
10071-CVGroup_Cafe_Idle2-1 = "どこからか、美味しい匂いが……。"
10071-CVGroup_Cafe_Idle3-1 = "（……もっと可愛い水着にすればよかった）"
10071-CVGroup_Cafe_Idle4-1 = "ここが、先生の…私はいま何を……。"
10071-CVGroup_Cafe_Idle5-1 = "……先生は……どちらに……。"
10071-CVGroup_WeaponGet_Idle1-1 = "RABBIT-31式短機関銃、受領しました。\n水中戦に備え、内部パーツを一部交換しましたが、\nその……外部のパーツも、可愛らしいものに変えたほうがよかったでしょうか……？"
10071-CVGroup_UIEventLobby_Enter1-1 = "これはあくまでも事件の調査のための潜入作戦……\n無事に終わるといいのですが。"
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT1。\n作戦準備完了しました。\n先生、指示を。"
10071-CVGroup_UIEventLobby_Enter3-1 = "どうやら、住民の皆さんの気分を害してしまったようです……。"
10071-CVGroup_UIEventLobby_Enter3-2 = "どうすれば良いのでしょう……。"
10071-CVGroup_UIEventLobby_Enter4-1 = "ふふ……\n海水浴を楽しむ以上に、私たちSRTらしい夏になりました。"
10071-CVGroup_UIEventLobby_Enter5-1 = "お疲れ様でした、先生。"
10071-CVGroup_UIEventLobby_Enter5-2 = "作戦のためではありますが、せっかくの海ですし……。"
10071-CVGroup_UIEventLobby_Enter5-3 = "……少し、お時間いただけますか？"
10071-CVGroup_UIEventLobby_Idle1-1 = "最後にエビがたっぷり入ったサンドイッチを食べたのは、\nいつだったのでしょう。"
10071-CVGroup_UIEventLobby_Idle2-1 = "（あまり、浮かれている感じに見えませんように……）"
10071-CVGroup_UIEventLobby_Idle3-1 = "不在の間、ぴょんこのお世話は、"
10071-CVGroup_UIEventLobby_Idle3-2 = "ヴァルキューレ生活安全局の皆さんにお願いしています。"
10071-CVGroup_UIEventLobby_Idle3-3 = "たまに、ぴょんこがRABBIT小隊より"
10071-CVGroup_UIEventLobby_Idle3-4 = "生活安全局の皆さんに懐いているように見えて、少し寂しくもありますが……"
10071-CVGroup_UIEventMission_Enter1-1 = "来てくれましたか、先生。\n調査に必要なリストをまとめてみました。"
10071-CVGroup_UIEventMission_Enter2-1 = "……以上が、今日の潜入作戦のターゲットになります。"
10071-CVGroup_UIEventMission_Idle1-1 = "どうされましたか？"
10071-CVGroup_UIEventMission_Idle2-1 = "あの……この水着、生地が少し薄くて……。"
10071-CVGroup_UIEventMission_Idle2-2 = "その……そんなに見つめられると……\n気になってしまうのですが……。"
10071-CVGroup_UIEventMission_Buy1-1 = "さすがです、先生。\n信じていました。"
10071-CVGroup_UIEventMission_Buy2-1 = "ご協力、ありがとうございました。\n助かりました。"
