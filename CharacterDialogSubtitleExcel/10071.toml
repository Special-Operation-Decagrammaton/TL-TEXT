[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10071-CVGroup_UITitle_Idle1-1 = "Blue Archive." 
10071-CVGroup_CharacterGet_Idle1-1 = "Aqui é RABBIT 1. Traje trocado.\nIniciando missão de infiltração." 
10071-CVGroup_Cafe_Idle1-1 = "（Eu queria…… tomar um banho……)" 
10071-CVGroup_Cafe_Idle2-1 = "Um cheiro gostoso vindo de algum lugar……" 
10071-CVGroup_Cafe_Idle3-1 = "（……Deveria ter escolhido um traje de banho mais fofo）" 
10071-CVGroup_Cafe_Idle4-1 = "Este é o escritório do Sensei…… O que eu estou fazendo agora……" 
10071-CVGroup_Cafe_Idle5-1 = "……Sensei está…… onde……" 
10071-CVGroup_WeaponGet_Idle1-1 = "RABBIT Submetralhadora Tipo-31, recebida.\nSubstituí algumas peças internas para combate aquático, mas……\nSerá que eu deveria ter mudado as peças externas para algo mais fofo……?" 
10071-CVGroup_UIEventLobby_Enter1-1 = "Isso é apenas uma missão de infiltração para investigar o incidente……\nEspero que termine bem." 
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT 1.\nPreparação da missão concluída.\nSensei, ordens." 
10071-CVGroup_UIEventLobby_Enter3-1 = "Parece que acabamos prejudicando o humor dos moradores……" 
10071-CVGroup_UIEventLobby_Enter3-2 = "O que devemos fazer……" 
10071-CVGroup_UIEventLobby_Enter4-1 = "Fufu……\nMais do que aproveitar o banho de mar, este verão se tornou bem típico da nossa SRT." 
10071-CVGroup_UIEventLobby_Enter5-1 = "Bom trabalho, Sensei." 
10071-CVGroup_UIEventLobby_Enter5-2 = "É por causa da missão, mas…… já que estamos na praia……" 
10071-CVGroup_UIEventLobby_Enter5-3 = "……Poderia me dar um pouco da sua atenção?" 
10071-CVGroup_UIEventLobby_Idle1-1 = "Não me lembro quando foi a última vez que comi\num sanduíche recheado com camarão." 
10071-CVGroup_UIEventLobby_Idle2-1 = "（……Espero não parecer empolgada demais……）" 
10071-CVGroup_UIEventLobby_Idle3-1 = "Durante minha ausência, pedi para cuidarem da Pyonko……" 
10071-CVGroup_UIEventLobby_Idle3-2 = "Pedi para o pessoal da Agência de Segurança Pública de Valkyrie." 
10071-CVGroup_UIEventLobby_Idle3-3 = "Às vezes, a Pyonko parece gostar mais……" 
10071-CVGroup_UIEventLobby_Idle3-4 = "do pessoal da Agência de Segurança Pública do que do Esquadrão RABBIT, o que me deixa um pouco solitária, mas……" 
10071-CVGroup_UIEventMission_Enter1-1 = "Você veio, Sensei.\nPreparei a lista necessária para a investigação." 
10071-CVGroup_UIEventMission_Enter2-1 = "……Estes são os alvos da missão de infiltração de hoje." 
10071-CVGroup_UIEventMission_Idle1-1 = "Aconteceu alguma coisa?" 
10071-CVGroup_UIEventMission_Idle2-1 = "Aquele…… esse traje de banho, o tecido é um pouco fino……" 
10071-CVGroup_UIEventMission_Idle2-2 = "Aquele…… ser encarada assim……\nacaba me deixando um pouco desconcertada……" 
10071-CVGroup_UIEventMission_Buy1-1 = "Como esperado, Sensei.\nEu confiava em você." 
10071-CVGroup_UIEventMission_Buy2-1 = "Obrigada pela colaboração.\nIsso ajudou muito." 