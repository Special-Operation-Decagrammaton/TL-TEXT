[translation]
10071-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10071-CVGroup_CharacterGet_Idle1-1 = "Aqui é RABBIT1. Troca de roupa concluída.\nIniciando a operação de infiltração a partir deste momento."
10071-CVGroup_Cafe_Idle1-1 = "(Eu... gostaria de tomar um banho...)"
10071-CVGroup_Cafe_Idle2-1 = "Sinto um cheiro delicioso vindo de algum lugar..."
10071-CVGroup_Cafe_Idle3-1 = "(...Eu deveria ter escolhido um maiô mais fofo.)"
10071-CVGroup_Cafe_Idle4-1 = "Então aqui é o... do Sensei... O que eu estou fazendo agora..."
10071-CVGroup_Cafe_Idle5-1 = "……Para onde será que o Sensei... foi..."
10071-CVGroup_WeaponGet_Idle1-1 = "Submetralhadora RABBIT-31, recebida.\nPara me preparar para o combate subaquático, eu troquei algumas peças internas, mas...\nUhm... será que eu deveria ter trocado as peças externas por coisas mais fofinhas também...?"
10071-CVGroup_UIEventLobby_Enter1-1 = "Isso é estritamente uma operação de infiltração para investigar o incidente...\nEspero que termine tudo bem."
10071-CVGroup_UIEventLobby_Enter2-1 = "RABBIT1.\nPreparativos para a operação concluídos.\nSensei, aguardando ordens."
10071-CVGroup_UIEventLobby_Enter3-1 = "Parece que nós acabamos ofendendo os moradores..."
10071-CVGroup_UIEventLobby_Enter3-2 = "O que devemos fazer..."
10071-CVGroup_UIEventLobby_Enter4-1 = "Fufu...\nMais do que apenas curtir um banho de mar, este se tornou um verão bem a cara da SRT."
10071-CVGroup_UIEventLobby_Enter5-1 = "Bom trabalho, Sensei."
10071-CVGroup_UIEventLobby_Enter5-2 = "Foi tudo pelo bem da operação, mas já que estamos no mar..."
10071-CVGroup_UIEventLobby_Enter5-3 = "...O senhor teria um pouco de tempo para mim?"
10071-CVGroup_UIEventLobby_Idle1-1 = "Quando foi a última vez que comi um sanduíche bem recheado com bastante camarão?"
10071-CVGroup_UIEventLobby_Idle2-1 = "(Espero não estar parecendo empolgada demais...)"
10071-CVGroup_UIEventLobby_Idle3-1 = "Enquanto estamos fora, os cuidados com o Pyonko"
10071-CVGroup_UIEventLobby_Idle3-2 = "Estão nas mãos do pessoal do Departamento de Segurança Pública da Valkyrie."
10071-CVGroup_UIEventLobby_Idle3-3 = "Às vezes, o Pyonko parece ter se apegado mais"
10071-CVGroup_UIEventLobby_Idle3-4 = "Ao pessoal da Segurança Pública do que a nós do Esquadrão RABBIT, o que me deixa um pouco solitária, mas..."
10071-CVGroup_UIEventMission_Enter1-1 = "Você veio, Sensei.\nEu compilei uma lista com o que precisamos para a investigação."
10071-CVGroup_UIEventMission_Enter2-1 = "...E esses serão os alvos da nossa operação de infiltração de hoje."
10071-CVGroup_UIEventMission_Idle1-1 = "Aconteceu alguma coisa?"
10071-CVGroup_UIEventMission_Idle2-1 = "Uhm... O tecido desse maiô é um pouco fino, então..."
10071-CVGroup_UIEventMission_Idle2-2 = "Sabe... Se o senhor ficar me encarando tanto assim...\nEu acabo ficando muito envergonhada..."
10071-CVGroup_UIEventMission_Buy1-1 = "Como esperado de você, Sensei.\nEu confiava nisso."
10071-CVGroup_UIEventMission_Buy2-1 = "Muito obrigada por colaborar.\nAjudou bastante."