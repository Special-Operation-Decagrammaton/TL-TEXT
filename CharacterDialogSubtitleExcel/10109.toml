[translation]
10109-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
10109-CVGroup_CharacterGet_Idle1-1 = "先生の日々を記録しに参りました。\nミレニアムサイエンススクール、セミナー書記の生塩ノアです。\n今夜もどうか、よろしくお願いいたしますね。ふふっ。"
10109-CVGroup_Cafe_Idle1-1 = "（ここはまるで、別世界のようです……\n孤独と寂寞に満ちていて）"
10109-CVGroup_Cafe_Idle2-1 = "（少しの間、夜の静寂に耳を傾けてみましょう。）"
10109-CVGroup_Cafe_Idle3-1 = "ふあ……ん……\n少々、疲れました。"
10109-CVGroup_Cafe_Idle4-1 = "ちょっとだけ、休んでいきましょうか。"
10109-CVGroup_Cafe_Idle5-1 = "（いま、コユキちゃんの笑い声がしたような……？）"
10109-CVGroup_WeaponGet_Idle1-1 = "このコンバージョンキットは、\n使用者の意図によって形を\n変えられるんです。\n……私に少し似ていますね。ふふっ。"
10109-CVGroup_UIEventLobby_Enter1-1 = "ふふっ、こうして真夜中のミレニアムで先生と"
10109-CVGroup_UIEventLobby_Enter1-2 = "お会いするなんて……\nなんだか久しぶりな気がします。"
10109-CVGroup_UIEventLobby_Enter2-1 = "こんばんは、先生。ふふ、これですか？"
10109-CVGroup_UIEventLobby_Enter2-2 = "セミナーの皆さんとパジャマパーティーを\nすることになったんです。"
10109-CVGroup_UIEventLobby_Enter3-1 = "……先生、何か隠し事をしていませんか？"
10109-CVGroup_UIEventLobby_Enter3-2 = "じーっ……。"
10109-CVGroup_UIEventLobby_Enter4-1 = "ふふ、想定外ではありますが、面白くなってきましたね。"
10109-CVGroup_UIEventLobby_Enter5-1 = "先生、もうお休みになりますか？"
10109-CVGroup_UIEventLobby_Enter5-2 = "まだでしたら少しだけ……\n私たちに付き合っていただけませんか？"
10109-CVGroup_UIEventLobby_Enter5-3 = "冬の夜は……長いですから。"
10109-CVGroup_UIEventLobby_Idle1-1 = "パジャマで深夜のキャンパスを歩いていると……"
10109-CVGroup_UIEventLobby_Idle1-2 = "ちょっと悪いことをしているみたいで、ワクワクしますね。"
10109-CVGroup_UIEventLobby_Idle2-1 = "ボードゲームのルールは把握していますが、"
10109-CVGroup_UIEventLobby_Idle2-2 = "実際に遊んだことは……片手で数えられるほどしか……。"
10109-CVGroup_UIEventLobby_Idle3-1 = "ユウカちゃん……\nああ言ってますけど、浮かれているんだと思います。"
10109-CVGroup_UIEventLobby_Idle3-2 = "あんなやる気に満ちた顔は久しぶりに見ました。"
10109-CVGroup_UIEventLobby_Idle4-1 = "（リオ会長もパーティーに来ていただきたかったんですが……）"
10109-CVGroup_UIEventTreasure_Enter1-1 = "今、パーティーに使う\nボードゲームをまとめているのですが……"
10109-CVGroup_UIEventTreasure_Enter2-1 = "思ったより散らかってしまって……"
10109-CVGroup_UIEventTreasure_Enter2-2 = "先生、手を貸していただいてもよろしいですか？"
10109-CVGroup_UIEventTreasure_Enter3-1 = "パーティーは終わりましたが、"
10109-CVGroup_UIEventTreasure_Enter3-2 = "気になるボードゲームがありましたら、\nお気軽にどうぞ。"
10109-CVGroup_UIEventTreasure_Enter4-1 = "もう遅い時間ですよ？"
10109-CVGroup_UIEventTreasure_Enter4-2 = "……でも先生のお願いでしたら、ご一緒いたします。"
10109-CVGroup_UIEventTreasure_Idle1-1 = "ボードゲームって、種類がたくさんあるんですね。"
10109-CVGroup_UIEventTreasure_Idle2-1 = "使ったものは元の位置に戻す、\nあれだけ言ったのに……。"
10109-CVGroup_UIEventTreasure_FindTreasure1-1 = "ああ、そこにあったんですね。"
10109-CVGroup_UIEventTreasure_FindTreasure2-1 = "この形は、もしかして……。"
10109-CVGroup_UIEventTreasure_GetTreasure1-1 = "あら、面白そうですね。"
10109-CVGroup_UIEventTreasure_GetTreasure2-1 = "これは……どのようにして遊ぶのでしょう？"
10109-CVGroup_UIEventTreasure_RoundRenewal1-1 = "はい、次。\n整理整頓、続けますよ。"
10109-CVGroup_UIEventMission_Enter1-1 = "あ、先生、手が空いていましたら、"
10109-CVGroup_UIEventMission_Enter1-2 = "パーティーの準備を手伝っていただけませんか？"
10109-CVGroup_UIEventMission_Enter2-1 = "パジャマパーティーの役割分担を決めているところなんです。"
10109-CVGroup_UIEventMission_Idle1-1 = "はい、なんでもお申し付けください。"
10109-CVGroup_UIEventMission_Idle2-1 = "結ぶのは楽なんですが……\n少しうなじがスースーして……。"
10109-CVGroup_UIEventMission_Idle2-2 = "3回目……先生がこちらを見た回数のことです。"
10109-CVGroup_UIEventMission_Buy1-1 = "ふふ、名案です、先生。"
10109-CVGroup_UIEventMission_Buy2-1 = "なるほど、今のは参考にいたします。"
10109-CVGroup_UIEventMission_Interaction1-1 = "今日はこれで十分です。\nご協力、感謝します。"
