[translation]
10109-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10109-CVGroup_CharacterGet_Idle1-1 = "Vim registrar os dias do Sensei. Sou Noa Ushio, secretária do Seminar da Millennium Science School. Conto com você esta noite também. Fufu."
10109-CVGroup_Cafe_Idle1-1 = "(Este lugar parece outro mundo... repleto de solidão e silêncio.)"
10109-CVGroup_Cafe_Idle2-1 = "(Vamos ouvir o silêncio da noite por um momento.)"
10109-CVGroup_Cafe_Idle3-1 = "Ah... hum... Estou um pouco cansada."
10109-CVGroup_Cafe_Idle4-1 = "Vamos descansar um pouquinho?"
10109-CVGroup_Cafe_Idle5-1 = "(Pareceu-me ouvir a risada da Koyuki agora há pouco...)"
10109-CVGroup_WeaponGet_Idle1-1 = "Este kit de conversão pode mudar de forma dependendo da intenção do usuário... É um pouco parecido comigo. Fufu."
10109-CVGroup_UIEventLobby_Enter1-1 = "Fufu, encontrar o Sensei aqui na Millennium no meio da noite..."
10109-CVGroup_UIEventLobby_Enter1-2 = "Sinto que faz tempo que não fazemos isso."
10109-CVGroup_UIEventLobby_Enter2-1 = "Boa noite, Sensei. Fufu, isso aqui? "
10109-CVGroup_UIEventLobby_Enter2-2 = "Decidimos fazer uma festa do pijama com o pessoal do Seminar."
10109-CVGroup_UIEventLobby_Enter3-1 = "...Sensei, você está escondendo algo?"
10109-CVGroup_UIEventLobby_Enter3-2 = "Estou de olho..."
10109-CVGroup_UIEventLobby_Enter4-1 = "Fufu, é inesperado, mas está ficando interessante."
10109-CVGroup_UIEventLobby_Enter5-1 = "Sensei, já vai dormir?"
10109-CVGroup_UIEventLobby_Enter5-2 = "Se ainda não, poderia ficar um pouco... conosco?"
10109-CVGroup_UIEventLobby_Enter5-3 = "As noites de inverno... são longas."
10109-CVGroup_UIEventLobby_Idle1-1 = "Caminhar pelo campus de pijama no meio da noite..."
10109-CVGroup_UIEventLobby_Idle1-2 = "É como se estivéssemos fazendo algo proibido, é empolgante."
10109-CVGroup_UIEventLobby_Idle2-1 = "Eu entendo as regras dos jogos de tabuleiro, mas..."
10109-CVGroup_UIEventLobby_Idle2-2 = "as vezes que joguei de verdade... dá para contar nos dedos."
10109-CVGroup_UIEventLobby_Idle3-1 = "Yuuka-chan... ela diz aquilo, mas acho que está bem animada."
10109-CVGroup_UIEventLobby_Idle3-2 = "Faz tempo que não a vejo com um rosto tão motivado."
10109-CVGroup_UIEventLobby_Idle4-1 = "(Eu queria que a presidente Rio também viesse à festa...)"
10109-CVGroup_UIEventTreasure_Enter1-1 = "Estou organizando os jogos de tabuleiro para a festa agora..."
10109-CVGroup_UIEventTreasure_Enter2-1 = "Acabou ficando mais bagunçado do que eu pensava..."
10109-CVGroup_UIEventTreasure_Enter2-2 = "Sensei, poderia me dar uma mão?"
10109-CVGroup_UIEventTreasure_Enter3-1 = "A festa acabou, mas..."
10109-CVGroup_UIEventTreasure_Enter3-2 = "se houver algum jogo que lhe interesse, fique à vontade."
10109-CVGroup_UIEventTreasure_Enter4-1 = "Já está tarde, sabia?"
10109-CVGroup_UIEventTreasure_Enter4-2 = "...Mas se for um pedido do Sensei, eu acompanho você."
10109-CVGroup_UIEventTreasure_Idle1-1 = "Existem tantos tipos de jogos de tabuleiro, não é?"
10109-CVGroup_UIEventTreasure_Idle2-1 = "Eu disse tantas vezes para devolverem as coisas ao lugar..."
10109-CVGroup_UIEventTreasure_FindTreasure1-1 = "Ah, estava aí."
10109-CVGroup_UIEventTreasure_FindTreasure2-1 = "Este formato, será que é..."
10109-CVGroup_UIEventTreasure_GetTreasure1-1 = "Ora, parece interessante."
10109-CVGroup_UIEventTreasure_GetTreasure2-1 = "Como será que se joga isso?"
10109-CVGroup_UIEventTreasure_RoundRenewal1-1 = "Sim, o próximo. Vamos continuar a organização."
10109-CVGroup_UIEventMission_Enter1-1 = "Ah, Sensei, se estiver livre,"
10109-CVGroup_UIEventMission_Enter1-2 = "poderia nos ajudar com os preparativos da festa?"
10109-CVGroup_UIEventMission_Enter2-1 = "Estamos decidindo a divisão de tarefas para a festa do pijama."
10109-CVGroup_UIEventMission_Idle1-1 = "Sim, pode pedir o que precisar."
10109-CVGroup_UIEventMission_Idle2-1 = "É fácil de amarrar, mas... sinto um friozinho na nuca..."
10109-CVGroup_UIEventMission_Idle2-2 = "A terceira vez... refiro-me a quantas vezes o Sensei olhou para cá."
10109-CVGroup_UIEventMission_Buy1-1 = "Fufu, ótima ideia, Sensei."
10109-CVGroup_UIEventMission_Buy2-1 = "Entendo, vou levar isso em consideração."
10109-CVGroup_UIEventMission_Interaction1-1 = "Por hoje é o suficiente. Agradeço pela colaboração."
