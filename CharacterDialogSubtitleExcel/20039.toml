[translation]
20039-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ、じゃ。"
20039-CVGroup_CharacterGet_Idle1-1 = "山海経高級中学校、玄龍門の門主。竜華キサキじゃ。\nふふ。妾の力が必要かの？"
20039-CVGroup_Cafe_Idle1-1 = "ふむ……香の置き場は……。"
20039-CVGroup_Cafe_Idle2-1 = "（山海経の外は……本当に多種多様じゃな）"
20039-CVGroup_Cafe_Idle3-1 = "一服するのによさそうな場所じゃな……。"
20039-CVGroup_Cafe_Idle4-1 = "（あれは……何じゃ……？）"
20039-CVGroup_Cafe_Idle5-1 = "ふふ……此処は居心地が良いのう。"
20039-CVGroup_WeaponGet_Idle1-1 = "ご苦労じゃった、先生。\nふふ、妾が言うのものではないのかもしれぬが……\n心より感謝しておる。\n妾のすべてを懸けて、大切にしよう。"
20039-CVGroup_UIEventLobby_Enter1-1 = "山海経へよくぞ参った、先生。"
20039-CVGroup_UIEventLobby_Enter1-2 = "月影祭を心ゆくまで楽しんでいくと良い。"
20039-CVGroup_UIEventLobby_Enter2-1 = "行き先に悩んだ時には妾に申し付けよ。"
20039-CVGroup_UIEventLobby_Enter2-2 = "すぐに人を手配しよう。"
20039-CVGroup_UIEventLobby_Enter3-1 = "こんなことになろうとはな……"
20039-CVGroup_UIEventLobby_Enter3-2 = "先生には迷惑をかける。"
20039-CVGroup_UIEventLobby_Enter3-3 = "其方は……妾のそばに居てくれるのじゃろう？"
20039-CVGroup_UIEventLobby_Enter4-1 = "すべては巡り巡って己に帰ってくるもの……"
20039-CVGroup_UIEventLobby_Enter4-2 = "さあ、我が山海経を取り戻しにゆこうか。"
20039-CVGroup_UIEventLobby_Enter5-1 = "ほんにご苦労じゃった、先生。"
20039-CVGroup_UIEventLobby_Enter5-2 = "玄龍門の門主として、そして一人の生徒として、"
20039-CVGroup_UIEventLobby_Enter5-3 = "其方に心からの敬意と、感謝を。"
20039-CVGroup_UIEventLobby_Idle1-1 = "月影祭では数多の物語が交差する。"
20039-CVGroup_UIEventLobby_Idle1-2 = "ふふ、興味があるのなら\nこれを機に調べてみてはどうじゃ？"
20039-CVGroup_UIEventLobby_Idle2-1 = "玄武商会は月影祭に乗じて外部と交流を深めようとしておる。"
20039-CVGroup_UIEventLobby_Idle2-2 = "門主として、特段立場は表明しておらぬが……。"
20039-CVGroup_UIEventLobby_Idle3-1 = "玄龍門と玄武商会、どちらに非があるものか……ふむ。"
20039-CVGroup_UIEventLobby_Idle3-2 = "すまぬ、先生。\n門主といえども、すべてを見通せるわけではないのじゃ……。"
20039-CVGroup_UIEventLobby_Idle4-1 = "妾が門主として居る間は、山海経での安全を保証しよう。"
20039-CVGroup_UIEventLobby_Idle4-2 = "相手が誰であろうとな。"
20039-CVGroup_UIEventLobby_Idle4-3 = "無論、先生も例外ではない。"
20039-CVGroup_UIEventTreasure_Enter1-1 = "来たのじゃな。\n今は……そうさな。"
20039-CVGroup_UIEventTreasure_Enter1-2 = "補充の時、と言うべきかの。ふふ。"
20039-CVGroup_UIEventTreasure_Enter2-1 = "其方のためにお楽しみを用意した。"
20039-CVGroup_UIEventTreasure_Enter2-2 = "存分に楽しんでいくが良い。"
20039-CVGroup_UIEventTreasure_Enter2-3 = "……じゃが、食べ過ぎには注意じゃぞ？"
20039-CVGroup_UIEventTreasure_Enter3-1 = "まだ時間はある。"
20039-CVGroup_UIEventTreasure_Enter3-2 = "最後まで共にいよう。"
20039-CVGroup_UIEventTreasure_Idle1-1 = "どうかしたのか？先生。"
20039-CVGroup_UIEventTreasure_Idle1-2 = "……ふむ、まずは妾に食べてみてほしい？"
20039-CVGroup_UIEventTreasure_Idle1-3 = "それが何を意味するのか――分かっているのかえ？"
20039-CVGroup_UIEventTreasure_Idle1-4 = "ふふ。妾は構わぬぞ？"
20039-CVGroup_UIEventTreasure_Idle2-1 = "先生も一つどうじゃ？"
20039-CVGroup_UIEventTreasure_Idle2-2 = "味見はしてある。\n安心すると良い、ふふっ。"
20039-CVGroup_UIEventTreasure_FindTreasure1-1 = "月影祭の名物といえばおやつじゃ。"
20039-CVGroup_UIEventTreasure_FindTreasure1-2 = "さあ、一緒に探してみようかの？"
20039-CVGroup_UIEventTreasure_FindTreasure2-1 = "新しきを知るのは良いことじゃ。"
20039-CVGroup_UIEventTreasure_FindTreasure2-2 = "そうじゃろう？"
20039-CVGroup_UIEventTreasure_GetTreasure1-1 = "先生は甘いものは好きかえ？"
20039-CVGroup_UIEventTreasure_GetTreasure1-2 = "妾は……そこそこじゃな。"
20039-CVGroup_UIEventTreasure_GetTreasure2-1 = "ほう、興味深いのう。"
20039-CVGroup_UIEventTreasure_GetTreasure2-2 = "妾にも味見させてくれるかえ？"
20039-CVGroup_UIEventTreasure_RoundRenewal1-1 = "よくやった、先生。"
20039-CVGroup_UIEventTreasure_RoundRenewal1-2 = "じゃが、其方はこれで満足などしない。\nそうじゃろう？"
20039-CVGroup_UIEventMission_Enter1-1 = "日課、じゃな？\n……なぜ妾がここに 居るのか？"
20039-CVGroup_UIEventMission_Enter1-2 = "これも門主の務めじゃからの。"
20039-CVGroup_UIEventMission_Enter2-1 = "日々新たにして、また日に新たなり――"
20039-CVGroup_UIEventMission_Enter2-2 = "日々新しく前に進むべきという意味じゃ。"
20039-CVGroup_UIEventMission_Enter2-3 = "手助けが必要ならいつでも力になるぞ？"
20039-CVGroup_UIEventMission_Idle1-1 = "なんじゃ、先生。\n妾をくすぐってみたいのかえ？"
20039-CVGroup_UIEventMission_Idle1-2 = "ふふ。なんとも無礼なヤツじゃ……"
20039-CVGroup_UIEventMission_Idle1-3 = "じゃが、許そう。"
20039-CVGroup_UIEventMission_Idle2-1 = "じゃれ合いたいのか？"
20039-CVGroup_UIEventMission_Idle2-2 = "よい、好きなだけしてみせよ。\n妾と先生のことじゃからのう。"
20039-CVGroup_UIEventMission_Idle2-3 = "……他に人がいる時は、わきまえるんじゃぞ？"
20039-CVGroup_UIEventMission_Buy1-1 = "ああ。其方がやり遂げたのだから\n遠慮せず持っていくがよい。"
20039-CVGroup_UIEventMission_Buy2-1 = "其方は誠実じゃな。"
20039-CVGroup_UIEventMission_Buy2-2 = "やはり出来ることなら妾のそばに……"
20039-CVGroup_UIEventMission_Buy2-3 = "いや、忘れてくれ。"
20039-CVGroup_UIEventMission_Interaction1-1 = "ご苦労じゃった。日進月歩。"
20039-CVGroup_UIEventMission_Interaction1-2 = "日々進み続けようぞ。"
