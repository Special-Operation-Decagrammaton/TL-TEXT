[translation]
20039-CVGroup_UITitle_Idle1-1 = "Blue Archive, é isso."
20039-CVGroup_CharacterGet_Idle1-1 = "Sou Kisaki Ryuge, a líder da Genryumon da Escola Shanhaijing.\nFufu. Precisa da minha ajuda?"
20039-CVGroup_Cafe_Idle1-1 = "Hum... onde devo colocar o incenso..."
20039-CVGroup_Cafe_Idle2-1 = "(O mundo fora de Shanhaijing... é realmente muito diverso.)"
20039-CVGroup_Cafe_Idle3-1 = "Este parece ser um bom lugar para descansar um pouco..."
20039-CVGroup_Cafe_Idle4-1 = "(O que é... aquilo...?)"
20039-CVGroup_Cafe_Idle5-1 = "Fufu... este lugar é bem confortável."
20039-CVGroup_WeaponGet_Idle1-1 = "Você se esforçou muito, Sensei.\nFufu, talvez não seja algo que eu deva dizer, mas...\nAgradeço do fundo do meu coração.\nColocarei tudo de mim para cuidar disso com carinho."
20039-CVGroup_UIEventLobby_Enter1-1 = "Seja bem-vindo a Shanhaijing, Sensei."
20039-CVGroup_UIEventLobby_Enter1-2 = "Aproveite o Festival do Luar o quanto quiser."
20039-CVGroup_UIEventLobby_Enter2-1 = "Quando estiver em dúvida sobre para onde ir, peça-me."
20039-CVGroup_UIEventLobby_Enter2-2 = "Organizarei alguém imediatamente."
20039-CVGroup_UIEventLobby_Enter3-1 = "Quem diria que chegaríamos a este ponto..."
20039-CVGroup_UIEventLobby_Enter3-2 = "Sinto muito por causar problemas ao Sensei."
20039-CVGroup_UIEventLobby_Enter3-3 = "Você... ficará ao meu lado, não é?"
20039-CVGroup_UIEventLobby_Enter4-1 = "Tudo o que vai, volta..."
20039-CVGroup_UIEventLobby_Enter4-2 = "Vamos, vamos recuperar a nossa Shanhaijing."
20039-CVGroup_UIEventLobby_Enter5-1 = "Você realmente se esforçou, Sensei."
20039-CVGroup_UIEventLobby_Enter5-2 = "Como líder da Genryumon, e como uma aluna,"
20039-CVGroup_UIEventLobby_Enter5-3 = "ofereço-lhe meu respeito e gratidão sinceros."
20039-CVGroup_UIEventLobby_Idle1-1 = "No Festival do Luar, inúmeras histórias se cruzam."
20039-CVGroup_UIEventLobby_Idle1-2 = "Fufu, se tem interesse,\npor que não aproveita a oportunidade para investigar?"
20039-CVGroup_UIEventLobby_Idle2-1 = "A Associação Genbu está tentando aprofundar o intercâmbio com o exterior aproveitando o Festival do Luar."
20039-CVGroup_UIEventLobby_Idle2-2 = "Como líder, não expressei uma posição específica, mas..."
20039-CVGroup_UIEventLobby_Idle3-1 = "Genryumon e Associação Genbu, quem está errado... hum."
20039-CVGroup_UIEventLobby_Idle3-2 = "Perdoe-me, Sensei.\nMesmo sendo a líder, não consigo prever tudo..."
20039-CVGroup_UIEventLobby_Idle4-1 = "Enquanto eu for a líder, garantirei a segurança em Shanhaijing."
20039-CVGroup_UIEventLobby_Idle4-2 = "Não importa quem seja o oponente."
20039-CVGroup_UIEventLobby_Idle4-3 = "Claro, o Sensei não é exceção."
20039-CVGroup_UIEventTreasure_Enter1-1 = "Você veio.\nAgora... vejamos."
20039-CVGroup_UIEventTreasure_Enter1-2 = "Deveria chamar de momento de reabastecimento? Fufu."
20039-CVGroup_UIEventTreasure_Enter2-1 = "Preparei algo divertido para você."
20039-CVGroup_UIEventTreasure_Enter2-2 = "Sinta-se à vontade para aproveitar."
20039-CVGroup_UIEventTreasure_Enter2-3 = "...Mas cuidado para não comer demais, entendeu?"
20039-CVGroup_UIEventTreasure_Enter3-1 = "Ainda temos tempo."
20039-CVGroup_UIEventTreasure_Enter3-2 = "Vamos ficar juntos até o fim."
20039-CVGroup_UIEventTreasure_Idle1-1 = "Aconteceu algo, Sensei?"
20039-CVGroup_UIEventTreasure_Idle1-2 = "...Hum, quer que eu prove primeiro?"
20039-CVGroup_UIEventTreasure_Idle1-3 = "Você sabe o que isso significa, não sabe?"
20039-CVGroup_UIEventTreasure_Idle1-4 = "Fufu. Eu não me importo."
20039-CVGroup_UIEventTreasure_Idle2-1 = "Sensei, quer um pouco também?"
20039-CVGroup_UIEventTreasure_Idle2-2 = "Já provei.\nPode ficar tranquilo, fufu."
20039-CVGroup_UIEventTreasure_FindTreasure1-1 = "Falando em especialidades do Festival do Luar, temos os doces."
20039-CVGroup_UIEventTreasure_FindTreasure1-2 = "Vamos procurar juntos?"
20039-CVGroup_UIEventTreasure_FindTreasure2-1 = "Conhecer coisas novas é bom."
20039-CVGroup_UIEventTreasure_FindTreasure2-2 = "Não concorda?"
20039-CVGroup_UIEventTreasure_GetTreasure1-1 = "Sensei, você gosta de doces?"
20039-CVGroup_UIEventTreasure_GetTreasure1-2 = "Eu... gosto razoavelmente."
20039-CVGroup_UIEventTreasure_GetTreasure2-1 = "Oh, interessante."
20039-CVGroup_UIEventTreasure_GetTreasure2-2 = "Pode me deixar provar também?"
20039-CVGroup_UIEventTreasure_RoundRenewal1-1 = "Muito bem, Sensei."
20039-CVGroup_UIEventTreasure_RoundRenewal1-2 = "Mas você não ficará satisfeito apenas com isso, não é?"
20039-CVGroup_UIEventMission_Enter1-1 = "Tarefas diárias, é? ...Por que será que eu estou aqui?"
20039-CVGroup_UIEventMission_Enter1-2 = "Afinal, este também é um dever da líder da seita."
20039-CVGroup_UIEventMission_Enter2-1 = "Renovar-se a cada dia, e renovar-se novamente a cada dia —"
20039-CVGroup_UIEventMission_Enter2-2 = "Significa que devemos seguir em frente, renovando-nos diariamente."
20039-CVGroup_UIEventMission_Enter2-3 = "Se precisar de ajuda, estarei sempre à disposição, sabe?"
20039-CVGroup_UIEventMission_Idle1-1 = "O que foi, Sensei? Quer tentar me fazer cócegas?"
20039-CVGroup_UIEventMission_Idle1-2 = "Fufu. Que pessoa atrevida..."
20039-CVGroup_UIEventMission_Idle1-3 = "Mas, eu permito."
20039-CVGroup_UIEventMission_Idle2-1 = "Quer brincar um pouco?"
20039-CVGroup_UIEventMission_Idle2-2 = "Tudo bem, pode fazer o quanto quiser. Afinal, somos eu e você, Sensei."
20039-CVGroup_UIEventMission_Idle2-3 = "...Mas comporte-se quando houver outras pessoas por perto, entendeu?"
20039-CVGroup_UIEventMission_Buy1-1 = "Ah. Já que foi você quem conquistou, pode pegar sem hesitar."
20039-CVGroup_UIEventMission_Buy2-1 = "Você é uma pessoa sincera."
20039-CVGroup_UIEventMission_Buy2-2 = "Se fosse possível, eu gostaria que você ficasse ao meu lado..."
20039-CVGroup_UIEventMission_Buy2-3 = "Não, esqueça o que eu disse."
20039-CVGroup_UIEventMission_Interaction1-1 = "Bom trabalho. Progresso constante."
20039-CVGroup_UIEventMission_Interaction1-2 = "Vamos continuar avançando dia após dia."
