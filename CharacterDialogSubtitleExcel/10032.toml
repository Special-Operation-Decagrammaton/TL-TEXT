[translation]
10032-CVGroup_UITitle_Idle1-1 = "Blue Archive~!"
10032-CVGroup_CharacterGet_Idle1-1 = "Ahaha! Esperou por mim, Sensei!\nEste ano você vai brincar bastante comigo de novo, né?"
10032-CVGroup_Cafe_Idle1-1 = "Queria jogar Hanetsuki com todo mundo~"
10032-CVGroup_Cafe_Idle2-1 = "Com o que será que vou brincar com o Sensei hoje?♪"
10032-CVGroup_Cafe_Idle3-1 = "Quem ri, seus males espanta~♪"
10032-CVGroup_Cafe_Idle4-1 = "Achei um brinquedo~♪"
10032-CVGroup_Cafe_Idle5-1 = "Se eu fizer um mimo no Sensei, será que ganho um presente de Ano Novo?"
10032-CVGroup_WeaponGet_Idle1-1 = "Ahaha, que legal! \nCom isso, talvez a gente possa se divertir ainda mais!"
10032-CVGroup_UIEventLobby_Enter1-1 = "Ah, achei o Sensei!\nTrabalhando logo no Ano Novo, como sempre, hein, Sensei!"
10032-CVGroup_UIEventLobby_Enter2-1 = "Uau!\nQue surpresa te encontrar logo no começo do ano, Sensei!"
10032-CVGroup_UIEventLobby_Enter2-2 = "Iêi, toca aqui!"
10032-CVGroup_UIEventLobby_Idle1-1 = "Ah, a Aru-chan parece estar em apuros~\nBem, eu acho divertido, então tudo bem!"
10032-CVGroup_UIEventLobby_Idle2-1 = "Quem diria que alguém roubaria as oferendas do templo~\nO começo do ano está bem agitado, não vou ficar entediada nem um pouco!"
10032-CVGroup_UIEventLobby_Idle3-1 = "Hmm, ficar parada não tem graça nenhuma!\nVamos, Sensei!"
10032-CVGroup_UIEventLobby_Idle4-1 = "Parece que muitas coisas vão acontecer este ano também,"
10032-CVGroup_UIEventLobby_Idle4-2 = "mas a Aru-chan, a Kayoko-chan e a Haruka-chan\ncontam com você, Sensei♪"
10032-CVGroup_UIEventLobby_Idle4-3 = "Ah, eu?\nFufu, vou te perguntar o contrário:\nO que você acha?"
10032-CVGroup_UIEventLobby_Idle4-4 = "Quem sabe, né~?"
10032-CVGroup_UIEventLobby_Enter3-1 = "Então, Sensei, com que brinquedo vamos brincar hoje?"
10032-CVGroup_UIEventLobby_Enter3-2 = "Hanetsuki, Fukuwarai, Daruma Otoshi!\nKufufu♪"
10032-CVGroup_UIEventLobby_Enter4-1 = "Hmm, as coisas ficaram um pouco repetitivas...\nEstá na hora de brincar com o Sensei!"
10032-CVGroup_UIEventLobby_Enter4-2 = "E aí? Não acha que é uma ótima ideia?"
10032-CVGroup_UIEventLobby_Enter5-1 = "Ah, foi divertido!\nE então, você também se divertiu, Sensei?"
10032-CVGroup_UIEventLobby_Enter5-2 = "Espero que este ano\ntenha muitas coisas divertidas assim!"
10032-CVGroup_UIEventBoxGachaShop_Enter1-1 = "Bem-vindo à loja de trocas especial da Mutsuki-chan~!"
10032-CVGroup_UIEventBoxGachaShop_Enter2-1 = "Ah, Sensei!\nVocê tem sacolas da sorte, né?\nVamos abrir logo!"
10032-CVGroup_UIEventBoxGachaShop_Idle1-1 = "Bem, bem, o que será que vai sair? \nQue ansiedade!"
10032-CVGroup_UIEventBoxGachaShop_Idle2-1 = "Hm?\nPor que está me olhando assim?"
10032-CVGroup_UIEventBoxGachaShop_Idle2-2 = "É que ver alguém abrindo sacolas da sorte\né divertido não importa quantas vezes você veja!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "Uau!\nAté a Mutsuki-chan ficou surpresa com o que tinha aqui dentro!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "Que legal, que legal~\nEu também queria um!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "Ah, você tirou algo bom, Sensei!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-2 = "Será que essa sorte foi graças a mim?\nPode me agradecer, viu? Kufufu!"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "Oh, será que é o prêmio principal?\nAh, já que fui eu quem tirou para você,"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-2 = "cuide bem disso como se fosse eu, tá?"
10032-CVGroup_UIEventBoxGachaShop_Enter3-1 = "Ah, Sensei! Bom dia!\nO evento de Ano Novo já acabou, mas..."
10032-CVGroup_UIEventBoxGachaShop_Enter3-2 = "Ainda não foi o suficiente, né!\nSe tiver sacolas da sorte sobrando, vamos abrir todas!"
