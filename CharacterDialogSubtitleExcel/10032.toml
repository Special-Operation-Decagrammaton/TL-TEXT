[translation]
10032-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！"
10032-CVGroup_CharacterGet_Idle1-1 = "あははっ！お待たせ、先生！\n今年もたーっくさん、私と遊んでくれるよねっ？"
10032-CVGroup_Cafe_Idle1-1 = "みんなで羽根つきとかしたいな～"
10032-CVGroup_Cafe_Idle2-1 = "先生とは何して遊ぼっかな～♪"
10032-CVGroup_Cafe_Idle3-1 = "笑う門には福来る～♪"
10032-CVGroup_Cafe_Idle4-1 = "オモチャはっけ～ん♪"
10032-CVGroup_Cafe_Idle5-1 = "先生に甘えたら、お年玉もらえるかな？"
10032-CVGroup_WeaponGet_Idle1-1 = "あははっ、良いね良いね！\nこれならもっと楽しく遊べちゃうかもっ！"
10032-CVGroup_UIEventLobby_Enter1-1 = "あっ、先生見ーつけた！\n新年になっても仕事だなんて、相変わらずだね先生！"
10032-CVGroup_UIEventLobby_Enter2-1 = "わお！\n新年早々こうして会えるなんてびっくりだね、先生！"
10032-CVGroup_UIEventLobby_Enter2-2 = "いぇーい、ハイタッチ！"
10032-CVGroup_UIEventLobby_Idle1-1 = "あはっ、何だかアルちゃん大変そうだね～\nまっ、私は面白いから良いんだけど！"
10032-CVGroup_UIEventLobby_Idle2-1 = "まさかお賽銭泥棒なんてね～\n新年早々騒がしくって、全然飽きずに済みそう！"
10032-CVGroup_UIEventLobby_Idle3-1 = "ん～、やっぱりじっとしてるだけじゃつまんない！\n行こ、先生！"
10032-CVGroup_UIEventLobby_Idle4-1 = "こうやって今年も色んな事が起きそうだけど、"
10032-CVGroup_UIEventLobby_Idle4-2 = "アルちゃんもカヨコちゃんもハルカちゃんも、\n先生のことを頼りにしてるからね♪"
10032-CVGroup_UIEventLobby_Idle4-3 = "え、私？\nふふっ、逆に聞くけどー、\n私はどうだと思う？"
10032-CVGroup_UIEventLobby_Idle4-4 = "さあ、どうかな～？"
10032-CVGroup_UIEventLobby_Enter3-1 = "さあ先生、今日はどんなオモチャで遊ぶ？"
10032-CVGroup_UIEventLobby_Enter3-2 = "羽根つきに、福笑いに、だるま落とし！\nくふふっ♪"
10032-CVGroup_UIEventLobby_Enter4-1 = "うーん、ちょっとマンネリになってきたし……\nそろそろ先生で遊ぼっかな！"
10032-CVGroup_UIEventLobby_Enter4-2 = "どう？良いアイデアだと思わない？"
10032-CVGroup_UIEventLobby_Enter5-1 = "あ～楽しかった！\nどう、先生も楽しめた？"
10032-CVGroup_UIEventLobby_Enter5-2 = "今年もこんな風に、\n楽しいことがたっくさんあるといいな！"
10032-CVGroup_UIEventBoxGachaShop_Enter1-1 = "ムツキちゃんの特別交換所へようこそ～！"
10032-CVGroup_UIEventBoxGachaShop_Enter2-1 = "あ、先生！\n福袋持ってるよね？\n早く開けてみようよ！"
10032-CVGroup_UIEventBoxGachaShop_Idle1-1 = "さてさて、何が出てくるかな～？\nドキドキ！"
10032-CVGroup_UIEventBoxGachaShop_Idle2-1 = "うん？\nどうしてそんなに見てるのって？"
10032-CVGroup_UIEventBoxGachaShop_Idle2-2 = "だって、福袋を開けるところって\n何回見ても楽しいでしょ！"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-1 = "わーお！\nこんなものが入ってたなんて、\nムツキちゃんもびっくり！"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize1-2 = "良いな良いな～\n私も欲しいな～"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-1 = "あっ、良さそうものが当たったね！先生！"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize2-2 = "この幸運も私のおかげかもよ？\n感謝してくれてもいいんだよ？くふふっ！"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-1 = "おっ、当たりかな？\nあはっ、せっかく私が引いてあげたんだから"
10032-CVGroup_UIEventBoxGachaShop_BoxGachaPrize3-2 = "これを私だと思って、大切にしてね？"
10032-CVGroup_UIEventBoxGachaShop_Enter3-1 = "あっ、先生！おはよー！\n新年のイベントは終わっちゃったけど……。"
10032-CVGroup_UIEventBoxGachaShop_Enter3-2 = "まだまだ物足りないよね！\n余ってる福袋があったらじゃんじゃん開けちゃおう！"
