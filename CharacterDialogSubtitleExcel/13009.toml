[translation]
13009-CVGroup_UITitle_Idle1-1 = "ブルー……アーカイブ……。"
13009-CVGroup_CharacterGet_Idle1-1 = "夢かと思った、今この瞬間……。\nこんにちは。先生。\nこれからよろしくね。"
13009-CVGroup_Cafe_Idle1-1 = "なんだか眠たくなるようなのんびりとした空間だね～"
13009-CVGroup_Cafe_Idle2-1 = "夢を見てる気分なの。\nなんでだろう？"
13009-CVGroup_Cafe_Idle3-1 = "あはは！\nあー……笑ったら眠くなった。"
13009-CVGroup_Cafe_Idle4-1 = "わ～ここならゆっくりできそう～"
13009-CVGroup_Cafe_Idle5-1 = "うふふふっ。\n新しい枕が届くよ。\n楽しみすぎる。"
13009-CVGroup_Cafe_Idle6-1 = "あはは！\nさ、さっき……！夢で……先生が……\nああ、もうダメ、面白すぎる！あはは。"
13009-CVGroup_Cafe_Idle7-1 = "あはは！あ～よく寝た！\nうん？そんな姿を見るのは初めて？"
13009-CVGroup_WeaponGet_Idle1-1 = "この武器は……夢なのかな……\nずっと願ってたことが、叶った。"
