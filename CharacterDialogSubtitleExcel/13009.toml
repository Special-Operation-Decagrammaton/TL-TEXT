[translation]
13009-CVGroup_UITitle_Idle1-1 = "Blue... Archive..."
13009-CVGroup_CharacterGet_Idle1-1 = "Pensei que fosse um sonho, este momento agora...\nOlá, Sensei.\nConto com você daqui para frente."
13009-CVGroup_Cafe_Idle1-1 = "É um ambiente tão relaxante que dá até sono~"
13009-CVGroup_Cafe_Idle2-1 = "Sinto como se estivesse sonhando.\nPor que será?"
13009-CVGroup_Cafe_Idle3-1 = "Ahaha!\nAh... fiquei com sono de tanto rir."
13009-CVGroup_Cafe_Idle4-1 = "Uau~ aqui parece ser um ótimo lugar para relaxar~"
13009-CVGroup_Cafe_Idle5-1 = "Ufufufu.\nUm travesseiro novo vai chegar.\nEstou tão animada."
13009-CVGroup_Cafe_Idle6-1 = "Ahaha!\nE-então... no sonho... o Sensei estava...\nAh, não aguento, é engraçado demais! Ahaha."
13009-CVGroup_Cafe_Idle7-1 = "Ahaha! Ah, dormi tão bem!\nHm? É a primeira vez que me vê assim?"
13009-CVGroup_WeaponGet_Idle1-1 = "Será que esta arma... é um sonho...\nO que eu tanto desejei, finalmente se realizou."
