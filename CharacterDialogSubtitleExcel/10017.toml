[translation]
10017-CVGroup_UITitle_Idle1-1 = "Blue Archive～！\n……Ué?"
10017-CVGroup_CharacterGet_Idle1-1 = "A Secretária-Geral da Academia Federal de Red Winter chegou!\nSinta-se honrado, camarada!"
10017-CVGroup_Cafe_Idle1-1 = "Hum, muito bem.\nA Secretária-Geral está satisfeita."
10017-CVGroup_Cafe_Idle2-1 = "Hum, nada de anormal."
10017-CVGroup_Cafe_Idle3-1 = "Ahem, a Secretária-Geral chegou."
10017-CVGroup_Cafe_Idle4-1 = "Hoje também está tudo em paz, ótimo!\nIsso é tudo graças a mim!"
10017-CVGroup_Cafe_Idle5-1 = "(O bigode…… não caiu, né?)"
10017-CVGroup_WeaponGet_Idle1-1 = "Gostei disso…… esta é a minha autoridade! O meu poder! E o meu bigode!\nÉ quase assustador…… mas não se preocupe, camarada.\nEu estarei sempre do seu lado!"
10017-CVGroup_UIEventLobby_Enter1-1 = "A partir de agora, a purga vai começar!"
10017-CVGroup_UIEventLobby_Enter2-1 = "Fufufu, é hora da revolução!"
10017-CVGroup_UIEventLobby_Idle1-1 = "Estou ansiosa pelo Ivan Kupala desta vez também!"
10017-CVGroup_UIEventLobby_Idle2-1 = "Precisa da minha ajuda, camarada?"
10017-CVGroup_UIEventLobby_Idle3-1 = "Ainda restam estudantes que duvidam\nda autoridade deste bigode……."
10017-CVGroup_UIEventLobby_Idle3-2 = "Vou purgar todos eles, purga neles!"
10017-CVGroup_UIEventLobby_Idle4-1 = "Para o Ivan Kupala desta vez, eu preparei algo grande,\nuh, e então……."
10017-CVGroup_UIEventLobby_Idle4-2 = "……Preparei um pudim enorme!"
10017-CVGroup_UIEventLobby_Idle4-3 = "Quando a purga terminar, vamos dividir e comer com todos."
