[translation]
10017-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ～！\n……あれ？"
10017-CVGroup_CharacterGet_Idle1-1 = "レッドウィンター連邦学園、書記長のお出ましだ！\n光栄に思うがいい、カムラッド！"
10017-CVGroup_Cafe_Idle1-1 = "うむ、よしよし。\n書記長は満足だ。"
10017-CVGroup_Cafe_Idle2-1 = "うむ、異常なし。"
10017-CVGroup_Cafe_Idle3-1 = "えっへん、書記長のお出ましだぞ。"
10017-CVGroup_Cafe_Idle4-1 = "今日も平和だな、よし！\nこれも全て、おいらのおかげだ！"
10017-CVGroup_Cafe_Idle5-1 = "（髭……取れてないよな？）"
10017-CVGroup_WeaponGet_Idle1-1 = "気に入ったぞ……これぞおいらの権威！おいらの力！そしておいらの髭！\nいっそ恐ろしいくらいだな……だが心配するな、カムラッド。\nおいらはいつも、お前の味方だ！"
10017-CVGroup_UIEventLobby_Enter1-1 = "これより、粛清を始める！"
10017-CVGroup_UIEventLobby_Enter2-1 = "ふふふ、革命の時間だ！"
10017-CVGroup_UIEventLobby_Idle1-1 = "今回のイワン・クパーラも楽しみだな！"
10017-CVGroup_UIEventLobby_Idle2-1 = "私の助けが必要か、カムラッド？"
10017-CVGroup_UIEventLobby_Idle3-1 = "この髭の権威を疑うような生徒が、\nまだ残っていたとはな……。"
10017-CVGroup_UIEventLobby_Idle3-2 = "どいつもこいつも粛清だ、粛清！"
10017-CVGroup_UIEventLobby_Idle4-1 = "今回のイワン・クパーラのために大きくて、\nえーっとそれから……。"
10017-CVGroup_UIEventLobby_Idle4-2 = "……すっごく大きいプリンを用意したぞ！"
10017-CVGroup_UIEventLobby_Idle4-3 = "粛清が終わったら、皆で分けて食べるとしよう。"
