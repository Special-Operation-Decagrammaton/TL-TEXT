[translation]
10076-CVGroup_UITitle_Idle1-1 = "ブル～！アーカイブ～！"
10076-CVGroup_CharacterGet_Idle1-1 = "解説や応援が必要なら、私に任せてください！"
10076-CVGroup_Cafe_Idle1-1 = "おおっ！こんなにたくさんの人が！？"
10076-CVGroup_Cafe_Idle2-1 = "ここなら講演もできるかも！？"
10076-CVGroup_Cafe_Idle3-1 = "先生のインテリア……興味深いです！"
10076-CVGroup_Cafe_Idle4-1 = "おや、アレは……！"
10076-CVGroup_Cafe_Idle5-1 = "せっかくですから、応援ステージを探してみましょうか！"
10076-CVGroup_WeaponGet_Idle1-1 = "この銃について説明いたしましょう……！\n……ふふ、冗談です。先生は既にご存知ですからね。\n……こういう事がどんどん増えていったら、いつかは……。"
10076-CVGroup_UIEventLobby_Enter1-1 = "応援と説明ならお任せください！"
10076-CVGroup_UIEventLobby_Enter2-1 = "フレーフレー！せーんせい！\n頑張れ頑張れ！せんせい！"
10076-CVGroup_UIEventLobby_Enter2-2 = "どうですか？元気出ましたか？"
10076-CVGroup_UIEventLobby_Enter3-1 = "盛り上がってますね！\n頑張ってください！"
10076-CVGroup_UIEventLobby_Enter4-1 = "あと少しです！\n最後まで応援しています！"
10076-CVGroup_UIEventLobby_Enter5-1 = "ふぅー……大変でしたね！"
10076-CVGroup_UIEventLobby_Enter5-2 = "でも、やりきった気持ちです！"
10076-CVGroup_UIEventLobby_Idle1-1 = "あれ、どうかされましたか？"
10076-CVGroup_UIEventLobby_Idle2-1 = "何か気になることでもありましたか？"
10076-CVGroup_UIEventLobby_Idle2-2 = "それなら、この私が……！"
10076-CVGroup_UIEventLobby_Idle3-1 = "そ、そんなに何度もつつかれると……"
10076-CVGroup_UIEventLobby_Idle3-2 = "ちょっと恥ずかしいですね……。"
10076-CVGroup_UIEventLobby_Idle4-1 = "ひぃっ！？\nあっ、せ、先生でしたか……！"
