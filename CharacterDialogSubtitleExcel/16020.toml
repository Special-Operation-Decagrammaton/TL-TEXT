[translation]
16020-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16020-CVGroup_CharacterGet_Idle1-1 = "Hey! How have you been?\nI think this is our first time properly introducing ourselves.\nI'm Tenjinyama Otogi, the sniper of FOX Platoon.\nI'll be counting on you from here on out, Sensei."
16020-CVGroup_Cafe_Idle1-1 = "(So sleepy... I wonder if there's any coffee...)"
16020-CVGroup_Cafe_Idle2-1 = "Heave-ho... Maybe I should get some muscle training in while I'm at it."
16020-CVGroup_Cafe_Idle3-1 = "Oh... I'm feeling pretty fired up now..."
16020-CVGroup_Cafe_Idle4-1 = "(Have I seen this somewhere at the Correctional Bureau...?)"
16020-CVGroup_Cafe_Idle5-1 = "Oh, is this new merchandise for 'Full Jelly'?\nI've gotta take a picture."
16020-CVGroup_WeaponGet_Idle1-1 = "I've received the FOX-82 Sniper Rifle.\nIt's perfect for ultra-long-range sniping and taking out obstacles...\nBut my shoulders get so stiff if I fire it too much."
16020-CVGroup_UIEventLobby_Enter1-1 = "So, the operation finally begins..."
16020-CVGroup_UIEventLobby_Enter1-2 = "Let's get pumped up!"
16020-CVGroup_UIEventLobby_Enter2-1 = "I was waiting for you.\nThings can't start without you, Sensei."
16020-CVGroup_UIEventLobby_Idle1-1 = "The 'Roar Tracking Operation,' huh..."
16020-CVGroup_UIEventLobby_Idle1-2 = "Wait, is a roar even something you can track with your eyes?"
16020-CVGroup_UIEventLobby_Idle2-1 = "Hm? What's up?"
16020-CVGroup_UIEventLobby_Idle3-1 = "Niko's inari sushi is exquisite. It's delicious every time I eat it."
16020-CVGroup_UIEventLobby_Idle4-1 = "I wonder if Yukino is doing okay..."
16020-CVGroup_UIEventLobby_Idle4-2 = "She still seems to be hung up on what happened before."
16020-CVGroup_UIEventMission_Enter1-1 = "Oh, Sensei. Good timing."
16020-CVGroup_UIEventMission_Enter1-2 = "There's something I wanted to ask you about the incident."
16020-CVGroup_UIEventMission_Enter2-1 = "Hey, do you have a moment...?"
16020-CVGroup_UIEventMission_Enter2-2 = "There are a few things I'd like to ask of you."
16020-CVGroup_UIEventMission_Idle1-1 = "Hm? You're staring at my hair, what's wrong?"
16020-CVGroup_UIEventMission_Idle1-2 = "Was there something bothering you?"
16020-CVGroup_UIEventMission_Idle1-3 = "Ah... it's because it'd be a problem if my hair got caught in a tight space."
16020-CVGroup_UIEventMission_Idle1-4 = "That's why I braid it like this."
16020-CVGroup_UIEventMission_Idle1-5 = "I did think about just cutting it off, though."
16020-CVGroup_UIEventMission_Idle1-6 = "But I've put so much effort into growing it out, it'd be a shame to cut it now."
16020-CVGroup_UIEventMission_Idle2-1 = "Whoa! Don't poke me!?"
16020-CVGroup_UIEventMission_Idle2-2 = "...I'm not really a fan of people standing behind me."
16020-CVGroup_UIEventMission_Buy1-1 = "Huh... I see."
16020-CVGroup_UIEventMission_Buy1-2 = "I suppose there's a reason why people are talking about it."
16020-CVGroup_UIEventMission_Buy2-1 = "You're already done?\n...That was fast. That's amazing."
16020-CVGroup_UIEventMission_Buy2-2 = "Should I be calling you 'Commander' instead?"
16020-CVGroup_UIEventMission_Interaction1-1 = "I think that's enough for today.\nGood work!"