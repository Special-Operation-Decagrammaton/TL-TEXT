[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
16020-CVGroup_UITitle_Idle1-1 = "Blue Archive!" 
16020-CVGroup_CharacterGet_Idle1-1 = "E aí! Sentiu minha falta?\nAcho que é a primeira vez que nos\napresentamos direito, né.\nAtiradora de Elite do Esquadrão FOX,\nTenjinyama Otogi.\nEspero que cuide muito bem de mim\n(e do meu corpo) daqui pra frente, Sensei." 
16020-CVGroup_Cafe_Idle1-1 = "（Que sono... será que não tem um cafézinho...\nou algo mais quente pra me acordar?）" 
16020-CVGroup_Cafe_Idle2-1 = "Beleza... Acho que vou aproveitar a brecha\npra fazer uns agachamentos e suar a camisa." 
16020-CVGroup_Cafe_Idle3-1 = "Ooh... A sua energia tá transbordando hoje, hein..." 
16020-CVGroup_Cafe_Idle4-1 = "（Será que eu já vi essa coisinha na Correcional antes...?）" 
16020-CVGroup_Cafe_Idle5-1 = "Ah, isso aqui é o merchandise novo da \"Furu Jelly\", né?\nVou bater uma fotinha de lembrança~" 
16020-CVGroup_WeaponGet_Idle1-1 = "Fuzil de Precisão Antimaterial FOX-82, recebido e engatilhado.\nÉ o brinquedo perfeito pra meter chumbo de longe e arrombar qualquer barricada...\nMas confesso que dar uns tiros assim tão fortes... me deixa com o ombro todo dolorido e duro." 
16020-CVGroup_UIEventLobby_Enter1-1 = "Finalmente a operação vai deflagrar, hein..." 
16020-CVGroup_UIEventLobby_Enter1-2 = "Bora fazer o termostato subir, uhuu~!" 
16020-CVGroup_UIEventLobby_Enter2-1 = "Eu tava te esperando.\nAfinal, sem o Sensei na pista, a brincadeira nem começa, né?" 
16020-CVGroup_UIEventLobby_Idle1-1 = "«Operação Rastreio das Lores Ocultas» Sei..." 
16020-CVGroup_UIEventLobby_Idle1-2 = "Mas vem cá, dá mesmo pra perseguir esses\nfantasmas do folclore com os olhos acesos?" 
16020-CVGroup_UIEventLobby_Idle2-1 = "Hã? O que foi que atiçou o seu radar?" 
16020-CVGroup_UIEventLobby_Idle3-1 = "Os Inarizushis da Niko são uma tentação divina, né?\nÉ uma delícia engolir aquilo a qualquer hora." 
16020-CVGroup_UIEventLobby_Idle4-1 = "Será que a Yukino tá aguentando o tranco...?" 
16020-CVGroup_UIEventLobby_Idle4-2 = "Tenho o pressentimento de que ela ainda tá arrastando\nos traumas daquela nossa rebelião passada nas costas." 
16020-CVGroup_UIEventMission_Enter1-1 = "Opa, Sensei. Chegou na hora mais gostosa." 
16020-CVGroup_UIEventMission_Enter1-2 = "Eu tava querendo te interrogar sobre uns detalhes\nbem picantes desse caso." 
16020-CVGroup_UIEventMission_Enter2-1 = "Ah, me cede um segundinho a sós...?" 
16020-CVGroup_UIEventMission_Enter2-2 = "Tem uns favores e desejos bem específicos\nque eu queria te pedir na surdina." 
16020-CVGroup_UIEventMission_Idle1-1 = "Hã? Por que as suas pupilas tão tão fixadas\ne secas no meu cabelo? O que foi?" 
16020-CVGroup_UIEventMission_Idle1-2 = "Alguma coisa nas minhas mechas acendeu a sua luxúria?" 
16020-CVGroup_UIEventMission_Idle1-3 = "Ah... é que se o clima apertar e a gente se enfiar\nnum lugar estreito e abafado, eu não quero\nmeu cabelo prendendo por aí, sabe?" 
16020-CVGroup_UIEventMission_Idle1-4 = "Por isso que eu deixo ele\ntodo trançadinho e preso assim." 
16020-CVGroup_UIEventMission_Idle1-5 = "Eu até cogitei em passar a tesoura\ne decepar o comprimento fora..." 
16020-CVGroup_UIEventMission_Idle1-6 = "Mas pô, deu tanto trabalho deixar ele crescer desse\ntamanho pra você puxar... seria um desperdício cortar, né?" 
16020-CVGroup_UIEventMission_Idle2-1 = "Hyaah?! Não cutuca o meu corpo\nassim do nada, seu tarado safado?!" 
16020-CVGroup_UIEventMission_Idle2-2 = "……Eu não tenho muita resistência pra segurar o baque\nquando ficam colados na minha retaguarda, sabia?\nFico sem defesa." 
16020-CVGroup_UIEventMission_Buy1-1 = "Hmmm... saquei a tese." 
16020-CVGroup_UIEventMission_Buy1-2 = "Faz todo o sentido do mundo o asfalto estar\nempestado de fofocas pervertidas sobre o senhor." 
16020-CVGroup_UIEventMission_Buy2-1 = "Uau, já acabou e deu conta do recado?!\n……Que rápido! O seu desempenho na cama\né impressionante, Comandante." 
16020-CVGroup_UIEventMission_Buy2-2 = "Será que eu devia te chamar de meu \"Superior\"\npra te dar mais tesão no rádio?" 
16020-CVGroup_UIEventMission_Interaction1-1 = "Acho que já suamos o suficiente por hoje, né.\nBom trabalho lá dentro!" 