[translation]
16020-CVGroup_UITitle_Idle1-1 = "Blue Archive!"
16020-CVGroup_CharacterGet_Idle1-1 = "Ei! Como você está?\nAcho que é a primeira vez que nos cumprimentamos formalmente.\nSou Otogi Tenjinyama, a atiradora do Esquadrão FOX.\nConto com você daqui em diante, Sensei."
16020-CVGroup_Cafe_Idle1-1 = "(Que sono... será que tem café por aqui...)"
16020-CVGroup_Cafe_Idle2-1 = "Muito bem... acho que vou aproveitar para fazer um pouco de exercício."
16020-CVGroup_Cafe_Idle3-1 = "Nossa... estou me sentindo bem disposta..."
16020-CVGroup_Cafe_Idle4-1 = "(Já vi isso em algum lugar na Agência Correcional...)"
16020-CVGroup_Cafe_Idle5-1 = "Ah, será que isso é um item novo da 'Full Jelly'?\nVou tirar uma foto~"
16020-CVGroup_WeaponGet_Idle1-1 = "Recebi o rifle de precisão FOX-82.\nÉ perfeito para tiros de longa distância e para destruir obstáculos...\nMas meu ombro fica dolorido se eu disparar muito."
16020-CVGroup_UIEventLobby_Enter1-1 = "Finalmente a operação vai começar..."
16020-CVGroup_UIEventLobby_Enter1-2 = "Vamos animar isso aqui!"
16020-CVGroup_UIEventLobby_Enter2-1 = "Eu estava te esperando.\nNada começa sem você, Sensei."
16020-CVGroup_UIEventLobby_Idle1-1 = "Sobre a 'Operação de Rastreamento do Roar'..."
16020-CVGroup_UIEventLobby_Idle1-2 = "Digo, será que o Roar é algo que dá para seguir com os olhos?"
16020-CVGroup_UIEventLobby_Idle2-1 = "Hm? O que foi?"
16020-CVGroup_UIEventLobby_Idle3-1 = "O inari da Niko é simplesmente divino. É sempre uma delícia."
16020-CVGroup_UIEventLobby_Idle4-1 = "Será que a Yukino está bem..."
16020-CVGroup_UIEventLobby_Idle4-2 = "Sinto que ela ainda está um pouco presa ao que aconteceu antes."
16020-CVGroup_UIEventMission_Enter1-1 = "Ah, Sensei. Que bom que te encontrei."
16020-CVGroup_UIEventMission_Enter1-2 = "Eu queria te perguntar uma coisa sobre o incidente."
16020-CVGroup_UIEventMission_Enter2-1 = "Ah, você tem um minuto?..."
16020-CVGroup_UIEventMission_Enter2-2 = "Tenho alguns favores para te pedir."
16020-CVGroup_UIEventMission_Idle1-1 = "Hm? Por que está olhando tanto para o meu cabelo?"
16020-CVGroup_UIEventMission_Idle1-2 = "Tem algo que te incomodou?"
16020-CVGroup_UIEventMission_Idle1-3 = "Ah... é que eu não quero que ele enrosque em lugares apertados."
16020-CVGroup_UIEventMission_Idle1-4 = "Por isso eu o mantenho trançado assim."
16020-CVGroup_UIEventMission_Idle1-5 = "Até pensei em cortar, sabe?"
16020-CVGroup_UIEventMission_Idle1-6 = "Mas deu tanto trabalho deixar crescer que fiquei com dó."
16020-CVGroup_UIEventMission_Idle2-1 = "Uau! Não cutuca, não!?"
16020-CVGroup_UIEventMission_Idle2-2 = "...Eu não gosto muito disso. De ter alguém parado atrás de mim."
16020-CVGroup_UIEventMission_Buy1-1 = "Hmm... entendi."
16020-CVGroup_UIEventMission_Buy1-2 = "Realmente, faz sentido ter virado um boato, né?"
16020-CVGroup_UIEventMission_Buy2-1 = "Já terminou?\n...Foi rápido. Impressionante."
16020-CVGroup_UIEventMission_Buy2-2 = "Será que eu deveria te chamar de 'Comandante'?"
16020-CVGroup_UIEventMission_Interaction1-1 = "Por hoje acho que chega.\nBom trabalho!"
