[translation]
16020-CVGroup_UITitle_Idle1-1 = "ブルーアーカイブ！"
16020-CVGroup_CharacterGet_Idle1-1 = "やあ！元気してた？\n改めて挨拶するのは初めて、かな。\nFOX小隊の狙撃手、天神山オトギ。\nこれからよろしくね、先生。"
16020-CVGroup_Cafe_Idle1-1 = "（ねむ……コーヒーないかなぁ……）"
16020-CVGroup_Cafe_Idle2-1 = "よいしょっと……今のうちに筋トレでもしよっかな。"
16020-CVGroup_Cafe_Idle3-1 = "おお……気合がみなぎってるねぇ……。"
16020-CVGroup_Cafe_Idle4-1 = "（矯正局で見たことあるような……？）"
16020-CVGroup_Cafe_Idle5-1 = "あ、これって「フルゼリー」の新しいグッズかな。\n撮っとこ～"
16020-CVGroup_WeaponGet_Idle1-1 = "FOX-82式スナイパーライフル、受け取ったよ。\n超長距離狙撃や障害物の撃破にはもってこい……。\nでも、連発すると肩凝るんだよねぇ。"
16020-CVGroup_UIEventLobby_Enter1-1 = "ついに作戦開始かぁ……。"
16020-CVGroup_UIEventLobby_Enter1-2 = "テンションあげてこ～！"
16020-CVGroup_UIEventLobby_Enter2-1 = "待ってたよ。\n先生がいないと始まんないからね。"
16020-CVGroup_UIEventLobby_Idle1-1 = "「ロア追跡作戦」ねぇ……。"
16020-CVGroup_UIEventLobby_Idle1-2 = "そもそも、ロアって目で追えるものなの？"
16020-CVGroup_UIEventLobby_Idle2-1 = "ん？どうしたの？"
16020-CVGroup_UIEventLobby_Idle3-1 = "ニコのおいなりさんは絶品だよねぇ。いつ食べても美味しい。"
16020-CVGroup_UIEventLobby_Idle4-1 = "ユキノ、大丈夫かな……。"
16020-CVGroup_UIEventLobby_Idle4-2 = "まだちょっと、前のこと引きずってそうなんだよね。"
16020-CVGroup_UIEventMission_Enter1-1 = "あ、先生。いいところに。"
16020-CVGroup_UIEventMission_Enter1-2 = "事件のことで聞きたいことがあってさ。"
16020-CVGroup_UIEventMission_Enter2-1 = "あ、ちょっといいかな……。"
16020-CVGroup_UIEventMission_Enter2-2 = "いくつかお願いしたいことがあって。"
16020-CVGroup_UIEventMission_Idle1-1 = "ん？髪をじっと見つめて、どうしたの？"
16020-CVGroup_UIEventMission_Idle1-2 = "何か気になるとこでもあった？"
16020-CVGroup_UIEventMission_Idle1-3 = "ああ……狭い場所で、髪がひっかかったら困るからさ。"
16020-CVGroup_UIEventMission_Idle1-4 = "こうやって編んでるわけ。"
16020-CVGroup_UIEventMission_Idle1-5 = "切っちゃおうかな～とも思ったんだけど。"
16020-CVGroup_UIEventMission_Idle1-6 = "せっかくここまで伸ばしたのを切るのもなぁって。"
16020-CVGroup_UIEventMission_Idle2-1 = "うわっ！つっつかないで！？"
16020-CVGroup_UIEventMission_Idle2-2 = "……あんまり得意じゃないんだよね。後ろに立たれるの。"
16020-CVGroup_UIEventMission_Buy1-1 = "へぇ……なるほどね。"
16020-CVGroup_UIEventMission_Buy1-2 = "たしかに、噂になる理由はある、か。"
16020-CVGroup_UIEventMission_Buy2-1 = "もう終わったの？\n……早いね。すごいなぁ。"
16020-CVGroup_UIEventMission_Buy2-2 = "「指揮官」って呼んだほうがよかったりする？"
16020-CVGroup_UIEventMission_Interaction1-1 = "今日はこれくらいでいいかな。\nお疲れ様！"
