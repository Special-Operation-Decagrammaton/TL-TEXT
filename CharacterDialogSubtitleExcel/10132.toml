[translation]
10132-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10132-CVGroup_CharacterGet_Idle1-1 = "Eu sou a Ono Tsukuyo!\nEmbora eu esteja usando um vestido... eu sou, sem sombra de dúvidas, um membro do Clube de Pesquisa de Ninjutsu...!"
10132-CVGroup_Cafe_Idle1-1 = "Uuu... será que estão me olhando demais...?"
10132-CVGroup_Cafe_Idle2-1 = "Seria um desastre se eu manchasse o vestido... por isso... preciso ser cuidadosa..."
10132-CVGroup_Cafe_Idle3-1 = "Ugh... seria melhor se eu pudesse me misturar com aquele móvel ali..."
10132-CVGroup_Cafe_Idle4-1 = "Quando estou usando um vestido, preciso... prestar atenção até no meu jeito de andar..."
10132-CVGroup_Cafe_Idle5-1 = "(Todos... têm um estilo bem único, não é?)"
10132-CVGroup_WeaponGet_Idle1-1 = "Eu... continuarei me esforçando ao máximo.\nPara me tornar uma ninja exemplar... junto com vocês!"
10132-CVGroup_UIEventLobby_Enter1-1 = "Sensei...!?\nEste vestido... será que está mesmo... estranho...?"
10132-CVGroup_UIEventLobby_Enter2-1 = "Bem-vindo de volta, Sensei..."
10132-CVGroup_UIEventLobby_Enter2-2 = "Bem, este traje é, sabe..."
10132-CVGroup_UIEventLobby_Enter3-1 = "O que... o que está acontecendo...?"
10132-CVGroup_UIEventLobby_Enter4-1 = "Estar no palco... é algo misterioso."
10132-CVGroup_UIEventLobby_Enter4-2 = "Mesmo com tantas pessoas... me olhando..."
10132-CVGroup_UIEventLobby_Enter4-3 = "Às vezes, eu me sinto... solitária..."
10132-CVGroup_UIEventLobby_Enter5-1 = "Pessoal...! \nEu... voltei...!"
10132-CVGroup_UIEventLobby_Idle1-1 = "Será que eu... sou digna de usar este traje...?"
10132-CVGroup_UIEventLobby_Idle2-1 = "Eu estou chamando muita atenção, não estou...?"
10132-CVGroup_UIEventLobby_Idle2-2 = "Ugh... e olha que eu sou uma ninja..."
10132-CVGroup_UIEventLobby_Idle3-1 = "E-e-estou... bonita...?"
10132-CVGroup_UIEventLobby_Idle3-2 = "Hyaaaa..."
10132-CVGroup_UIEventLobby_Idle4-1 = "Se eu pensar que esta roupa também é..."
10132-CVGroup_UIEventLobby_Idle4-2 = "Uma técnica de disfarce... talvez..."
10132-CVGroup_UIEventMission_Enter1-1 = "Eu organizei as tarefas que precisamos fazer..."
10132-CVGroup_UIEventMission_Enter2-1 = "Nenhuma delas é fácil, mas..."
10132-CVGroup_UIEventMission_Enter2-2 = "Se for o Sensei, com certeza..."
10132-CVGroup_UIEventMission_Idle1-1 = "Hum... houve algum problema... com a lista que eu organizei...?"
10132-CVGroup_UIEventMission_Idle2-1 = "Sensei...? Aconteceu alguma coisa...?"
10132-CVGroup_UIEventMission_Buy1-1 = "Incrível...!"
10132-CVGroup_UIEventMission_Buy1-2 = "Eu sabia que o Sensei conseguiria...!"
10132-CVGroup_UIEventMission_Buy2-1 = "Que incrível...! \nSerá que o Sensei também tem... talento para ninja...?"
10132-CVGroup_UIEventMission_Interaction1-1 = "Bom trabalho...! \nFoi um final maravilhoso!"
