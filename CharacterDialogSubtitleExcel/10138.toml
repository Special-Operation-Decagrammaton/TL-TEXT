[translation]
10138-CVGroup_UITitle_Idle1-1 = "ふんっ……ブルーアーカイブ！"
10138-CVGroup_CharacterGet_Idle1-1 = "ワイルドハント芸術学院、衣斐レナ。\n見てなさい。オカルトなんて全部インチキだって、証明してやるんだから！"
10138-CVGroup_Cafe_Idle1-1 = "あの人にはどんな服が似合うかな？"
10138-CVGroup_Cafe_Idle2-1 = "ここじゃ変なこと起きないよね……？流石に……。"
10138-CVGroup_Cafe_Idle3-1 = "この配置……先生、まあまあセンスあるじゃん。"
10138-CVGroup_Cafe_Idle4-1 = "あのデザイン、ってオカルトのよね……？\n先生も影響されてるのかしら。"
10138-CVGroup_Cafe_Idle5-1 = "あ、あっちで変な音がしたような……。"
10138-CVGroup_WeaponGet_Idle1-1 = "ちっちゃいからってバカにしたら痛い目見るわよ。\nこう見えても、銃の扱いだって上手なんだから！\n撃った跡で絵が描けるくらい……って本当よ！？"
10138-CVGroup_UIEventLobby_Enter1-1 = "先生、こっち。"
10138-CVGroup_UIEventLobby_Enter1-2 = "一緒にインチキを解き明かすわよ。"
10138-CVGroup_UIEventLobby_Enter2-1 = "先輩がくれたお守り……どこやったっけ……。"
10138-CVGroup_UIEventLobby_Enter2-2 = "い、一応もらいものだから探してるだけ！"
10138-CVGroup_UIEventLobby_Enter3-1 = "さ、最後まで諦めないんだから！"
10138-CVGroup_UIEventLobby_Enter3-2 = "全部ウソだって証明してやるわ！"
10138-CVGroup_UIEventLobby_Enter4-1 = "シャーッ！インチキ！デタラメ！かかってきなさい！"
10138-CVGroup_UIEventLobby_Enter4-2 = "今夜でケリをつけてあげる！"
10138-CVGroup_UIEventLobby_Enter5-1 = "変なことばっかだったけど……。"
10138-CVGroup_UIEventLobby_Enter5-2 = "まあ、楽しかったからいいや。"
10138-CVGroup_UIEventLobby_Idle1-1 = "ふんっ、どうせ全部インチキなんだから！"
10138-CVGroup_UIEventLobby_Idle1-2 = "……た、たぶんね。"
10138-CVGroup_UIEventLobby_Idle2-1 = "な、なんだか寒気がする……。"
10138-CVGroup_UIEventLobby_Idle2-2 = "か、風のせいだよね……？ね？"
10138-CVGroup_UIEventLobby_Idle3-1 = "はぁ、なーにがツチノコよ。"
10138-CVGroup_UIEventLobby_Idle3-2 = "トカゲの見間違いでしょ？"
10138-CVGroup_UIEventLobby_Idle4-1 = "ひ、ひいぃっ！？"
10138-CVGroup_UIEventLobby_Idle4-2 = "……なんだ、先生か。って、急につつかないで！"
10138-CVGroup_UIEventShop_Enter1-1 = "あ、怪しい物が山のように……。"
10138-CVGroup_UIEventShop_Enter1-2 = "使える物があるかも。\n一応見てみる？"
10138-CVGroup_UIEventShop_Enter2-1 = "先生、これ何だか知ってる？"
10138-CVGroup_UIEventShop_Enter2-2 = "なんか色々あるんだけど……。"
10138-CVGroup_UIEventShop_Enter3-1 = "まぁ、振り返ってみたら……良い思い出かもね。ふふ。"
10138-CVGroup_UIEventShop_Idle1-1 = "こ、ここは安全……だよね？"
10138-CVGroup_UIEventShop_Idle1-2 = "いきなりオバケとか……出てこないよね……？"
10138-CVGroup_UIEventShop_Idle2-1 = "み、見てないで手伝ってよ！"
10138-CVGroup_UIEventShop_Idle2-2 = "1人でこれ整理するの、こわ――大変なんだけど！？"
10138-CVGroup_UIEventShop_Buy1-1 = "あ、何かに使えそう。"
10138-CVGroup_UIEventShop_Buy2-1 = "えっ、ガラクタの中にあったの？それ。"
10138-CVGroup_UIEventShop_Buy3-1 = "本当に役に立つといいんだけど……。"
10138-CVGroup_UIEventShop_Buy4-1 = "はい、どうぞ。一応取ってきたの私なんだから感謝してね？"
10138-CVGroup_UIEventMission_Enter1-1 = "うーん……集まった手がかりを確認する？"
10138-CVGroup_UIEventMission_Enter2-1 = "一緒に出来事を整理するよ。"
10138-CVGroup_UIEventMission_Buy1-1 = "ふんっ、やっぱ大したことなかったじゃん。"
10138-CVGroup_UIEventMission_Buy2-1 = "この調子でじゃんじゃん暴いていくわよ！"
10138-CVGroup_UIEventMission_Idle1-1 = "お、オバケより、吊り橋の方が怖いんだけど……。"
10138-CVGroup_UIEventMission_Idle2-1 = "シャーッ！遊んでないで調査に集中！"
10138-CVGroup_UIEventMission_Interaction1-1 = "きょ、今日はこれでおしまい！無理は良くないし。"
