[translation]
10138-CVGroup_UITitle_Idle1-1 = "Hmph... Blue Archive!"
10138-CVGroup_CharacterGet_Idle1-1 = "Academia de Artes Wildhunt, Rena Ebi.\nObserve bem. Vou provar que todo esse ocultismo não passa de uma farsa!"
10138-CVGroup_Cafe_Idle1-1 = "Que tipo de roupa será que combina com aquela pessoa?"
10138-CVGroup_Cafe_Idle2-1 = "Coisas estranhas não acontecem aqui, né...? Pelo menos, eu espero..."
10138-CVGroup_Cafe_Idle3-1 = "Essa disposição... Sensei, você até que tem bom gosto."
10138-CVGroup_Cafe_Idle4-1 = "Aquele design... é de ocultismo, não é?\nSerá que o Sensei também foi influenciado?"
10138-CVGroup_Cafe_Idle5-1 = "Ah, parece que ouvi um barulho estranho ali..."
10138-CVGroup_WeaponGet_Idle1-1 = "Não me subestime só porque sou pequena, ou vai se arrepender.\nMesmo parecendo assim, eu sei manusear armas muito bem!\nDá até para desenhar algo com os buracos de bala... é sério, viu!?"
10138-CVGroup_UIEventLobby_Enter1-1 = "Sensei, por aqui."
10138-CVGroup_UIEventLobby_Enter1-2 = "Vamos desmascarar essa farsa juntos."
10138-CVGroup_UIEventLobby_Enter2-1 = "O amuleto que a veterana me deu... onde será que eu coloquei...?"
10138-CVGroup_UIEventLobby_Enter2-2 = "E-eu só estou procurando porque foi um presente, tá?!"
10138-CVGroup_UIEventLobby_Enter3-1 = "Vamos lá, não vou desistir até o fim!"
10138-CVGroup_UIEventLobby_Enter3-2 = "Vou provar que tudo isso é mentira!"
10138-CVGroup_UIEventLobby_Enter4-1 = "Shhh! Farsa! Mentira! Pode vir!"
10138-CVGroup_UIEventLobby_Enter4-2 = "Vou resolver isso hoje à noite!"
10138-CVGroup_UIEventLobby_Enter5-1 = "Foi tudo muito estranho, mas..."
10138-CVGroup_UIEventLobby_Enter5-2 = "Bem, foi divertido, então tudo bem."
10138-CVGroup_UIEventLobby_Idle1-1 = "Hmph, de qualquer forma, é tudo uma farsa!"
10138-CVGroup_UIEventLobby_Idle1-2 = "...P-provavelmente, né."
10138-CVGroup_UIEventLobby_Idle2-1 = "E-estou sentindo um calafrio..."
10138-CVGroup_UIEventLobby_Idle2-2 = "É-é por causa do vento, né...? Né?"
10138-CVGroup_UIEventLobby_Idle3-1 = "Ah, que história de Tsuchinoko o quê."
10138-CVGroup_UIEventLobby_Idle3-2 = "Deve ser só um lagarto que viram errado, não é?"
10138-CVGroup_UIEventLobby_Idle4-1 = "I-iiih!?"
10138-CVGroup_UIEventLobby_Idle4-2 = "...Ah, é o Sensei. E não me cutuque assim do nada!"
10138-CVGroup_UIEventShop_Enter1-1 = "Ah, tem um monte de coisas suspeitas aqui..."
10138-CVGroup_UIEventShop_Enter1-2 = "Talvez tenha algo útil.\nQuer dar uma olhada?"
10138-CVGroup_UIEventShop_Enter2-1 = "Sensei, você sabe o que é isso?"
10138-CVGroup_UIEventShop_Enter2-2 = "Tem tanta coisa diferente aqui..."
10138-CVGroup_UIEventShop_Enter3-1 = "Bem, olhando para trás... acho que foram boas lembranças. Fufu."
10138-CVGroup_UIEventShop_Idle1-1 = "A-aqui é seguro... né?"
10138-CVGroup_UIEventShop_Idle1-2 = "Não vai aparecer nenhum fantasma de repente... né...?"
10138-CVGroup_UIEventShop_Idle2-1 = "N-não fique só olhando, me ajude!"
10138-CVGroup_UIEventShop_Idle2-2 = "Organizar isso sozinha é assustador... quer dizer, é difícil, sabia!?"
10138-CVGroup_UIEventShop_Buy1-1 = "Ah, isso parece útil para alguma coisa."
10138-CVGroup_UIEventShop_Buy2-1 = "Ué, isso estava no meio da tralha?"
10138-CVGroup_UIEventShop_Buy3-1 = "Espero que isso realmente seja útil..."
10138-CVGroup_UIEventShop_Buy4-1 = "Aqui, pegue. Fui eu que peguei, então agradeça, viu?"
10138-CVGroup_UIEventMission_Enter1-1 = "Hmm... quer conferir as pistas que reunimos?"
10138-CVGroup_UIEventMission_Enter2-1 = "Vamos organizar os acontecimentos juntos."
10138-CVGroup_UIEventMission_Buy1-1 = "Hmph, no fim das contas não era nada demais."
10138-CVGroup_UIEventMission_Buy2-1 = "Vamos continuar desmascarando tudo nesse ritmo!"
10138-CVGroup_UIEventMission_Idle1-1 = "M-mais do que fantasmas, eu tenho medo é daquela ponte pênsil..."
10138-CVGroup_UIEventMission_Idle2-1 = "Shhh! Pare de brincar e foque na investigação!"
10138-CVGroup_UIEventMission_Interaction1-1 = "P-por hoje é só! Não é bom exagerar."
