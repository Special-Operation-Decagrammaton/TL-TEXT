[translation]
10138-CVGroup_UITitle_Idle1-1 = "Хмф... Blue Archive!"
10138-CVGroup_CharacterGet_Idle1-1 = "Академия искусств Вайлдхант, Кинуи Рена.\nВот увидишь, я докажу, что вся эта оккультная чепуха — не более чем обман!"
10138-CVGroup_Cafe_Idle1-1 = "Интересно, какая одежда подошла бы этому человеку?.."
10138-CVGroup_Cafe_Idle2-1 = "Здесь ведь не произойдёт ничего странного, верно?.. Ну точно не должно..."
10138-CVGroup_Cafe_Idle3-1 = "А эта планировка... Знаешь, Сенсей, у тебя неплохой вкус."
10138-CVGroup_Cafe_Idle4-1 = "Этот дизайн... он как-то связан с оккультизмом? \nИнтересно, неужели Сенсей тоже попал под его влияние?"
10138-CVGroup_Cafe_Idle5-1 = "Ай, кажется, я слышала какой-то странный шум вон там..."
10138-CVGroup_WeaponGet_Idle1-1 = "Не смей недооценивать меня только потому, что я маленькая, иначе сильно пожалеешь.\nЧтоб ты знал, я вообще-то отлично управляюсь с оружием!\nЯ стреляю так метко, что могу выбить картину пулевыми отверстиями... Я серьёзно!"
10138-CVGroup_UIEventLobby_Enter1-1 = "Сенсей, сюда."
10138-CVGroup_UIEventLobby_Enter1-2 = "Пойдём вместе разоблачим парочку мифов."
10138-CVGroup_UIEventLobby_Enter2-1 = "Амулет, который мне дала старшая... куда же я его подевала..."
10138-CVGroup_UIEventLobby_Enter2-2 = "Я-я ищу его только потому, что это подарок, понятливо?!"
10138-CVGroup_UIEventLobby_Enter3-1 = "Ладно, я не сдамся до самого конца!"
10138-CVGroup_UIEventLobby_Enter3-2 = "Я докажу, что всё это ложь!"
10138-CVGroup_UIEventLobby_Enter4-1 = "Тьфу! Выдумки! Чушь собачья! Ну давайте, нападайте!"
10138-CVGroup_UIEventLobby_Enter4-2 = "Я покончу с этим сегодня же ночью!"
10138-CVGroup_UIEventLobby_Enter5-1 = "Тут было полно всякой чертовщины, но..."
10138-CVGroup_UIEventLobby_Enter5-2 = "Ну, по крайней мере, это было весело, так что ладно."
10138-CVGroup_UIEventLobby_Idle1-1 = "Хмф, всё это в любом случае сплошной обман!"
10138-CVGroup_UIEventLobby_Idle1-2 = "...Ну, скорее всего."
10138-CVGroup_UIEventLobby_Idle2-1 = "М-мне аж не по себе... Аж мурашки по коже..."
10138-CVGroup_UIEventLobby_Idle2-2 = "Э-это ведь просто ветер, да?.. Скажи, что это ветер!"
10138-CVGroup_UIEventLobby_Idle3-1 = "Угх, что за бред вообще с этим «Цутиноко»."
10138-CVGroup_UIEventLobby_Idle3-2 = "Это ведь просто ящерица, которую с кем-то перепутали, да?"
10138-CVGroup_UIEventLobby_Idle4-1 = "Ай!?"
10138-CVGroup_UIEventLobby_Idle4-2 = "...Фух, это всего лишь ты, Сенсей. И эй, хватит в меня тыкать!"
10138-CVGroup_UIEventShop_Enter1-1 = "Ой, целая гора каких-то подозрительных вещей..."
10138-CVGroup_UIEventShop_Enter1-2 = "Хотя тут может найтись что-нибудь полезное.\nМожет, взглянем на всякий случай?"
10138-CVGroup_UIEventShop_Enter2-1 = "Сенсей, ты хоть знаешь, что это такое?"
10138-CVGroup_UIEventShop_Enter2-2 = "Тут столько всего навалено..."
10138-CVGroup_UIEventShop_Enter3-1 = "Ну, если оглянуться назад... Пожалуй, это будут приятные воспоминания. Хи-хи."
10138-CVGroup_UIEventShop_Idle1-1 = "В-в этом месте ведь безопасно... правда?"
10138-CVGroup_UIEventShop_Idle1-2 = "Призрак ведь не возьмёт и не... выскочит прямо сейчас?.."
10138-CVGroup_UIEventShop_Idle2-1 = "Д-да не стой ты просто так, помоги мне!"
10138-CVGroup_UIEventShop_Idle2-2 = "Разбирать всё это в одиночку страшно... То есть, я имела в виду, тут работы невпроворот!"
10138-CVGroup_UIEventShop_Buy1-1 = "О, это может для чего-нибудь пригодиться."
10138-CVGroup_UIEventShop_Buy2-1 = "Погоди, ты откопал это прямо в куче хлама?"
10138-CVGroup_UIEventShop_Buy3-1 = "Очень надеюсь, что от этого действительно будет какой-то толк..."
10138-CVGroup_UIEventShop_Buy4-1 = "Вот, держи. Это я пошла и достала его, так что будь благодарен, идёт?"
10138-CVGroup_UIEventMission_Enter1-1 = "Хм... Ну что, давай проверим собранные нами улики?"
10138-CVGroup_UIEventMission_Enter2-1 = "Давай вместе разложим все события по полочкам."
10138-CVGroup_UIEventMission_Buy1-1 = "Хмф, всё оказалось не таким уж и страшным."
10138-CVGroup_UIEventMission_Buy2-1 = "Давай и дальше выводить их всех на чистую воду!"
10138-CVGroup_UIEventMission_Idle1-1 = "Я-я этого подвесного моста боюсь куда сильнее любого призрака..."
10138-CVGroup_UIEventMission_Idle2-1 = "Тьфу! Хватит дурачиться, сосредоточься на расследовании!"
10138-CVGroup_UIEventMission_Interaction1-1 = "Н-на сегодня всё! Перенапрягаться вредно для здоровья."
