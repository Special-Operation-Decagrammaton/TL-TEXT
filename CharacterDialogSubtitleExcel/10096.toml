[translation]
10096-CVGroup_UITitle_Idle1-1 = "Blue Archive."
10096-CVGroup_CharacterGet_Idle1-1 = "Sou a Kanna Oba, chefe do Departamento de Segurança Pública da Academia Valkyrie.\nPor favor, perdoe a falta de formalidade em me apresentar desta maneira, devido à natureza da minha missão."
10096-CVGroup_Cafe_Idle1-1 = "Não há... ninguém precisando de resgate."
10096-CVGroup_Cafe_Idle2-1 = "Vou tirar uma pequena pausa."
10096-CVGroup_Cafe_Idle3-1 = "Não descuido dos exercícios de aquecimento para estar pronta para agir a qualquer momento."
10096-CVGroup_Cafe_Idle4-1 = "Hmm... tem algumas coisas que me preocupam, mas..."
10096-CVGroup_Cafe_Idle5-1 = "Quando a pausa terminar, vou começar a patrulha."
10096-CVGroup_WeaponGet_Idle1-1 = "Uma prova da confiança do Sensei... entendo.\nO peso de um salva-vidas é grande.\nFarei o meu melhor para não decepcionar suas expectativas."
10096-CVGroup_UIEventLobby_Enter1-1 = "Sensei. Estava à sua espera.\nJá fez o aquecimento?"
10096-CVGroup_UIEventLobby_Enter2-1 = "Por favor, aproveite seu tempo no parque aquático."
10096-CVGroup_UIEventLobby_Enter3-1 = "Está aproveitando a piscina?"
10096-CVGroup_UIEventLobby_Enter3-2 = "Como sempre digo, segurança em primeiro lugar."
10096-CVGroup_UIEventLobby_Enter4-1 = "...Eu só cheguei até aqui graças ao Sensei."
10096-CVGroup_UIEventLobby_Enter4-2 = "Vamos dar o nosso melhor até o fim."
10096-CVGroup_UIEventLobby_Enter5-1 = "Sinto como se um peso tivesse saído dos meus ombros,\nmas, ao mesmo tempo, sinto um pouco de melancolia."
10096-CVGroup_UIEventLobby_Enter5-2 = "E você, Sensei?"
10096-CVGroup_UIEventLobby_Idle1-1 = "Entendo que é necessário usar roupa de banho, mas...\nainda não estou acostumada."
10096-CVGroup_UIEventLobby_Idle2-1 = "Um parque aquático... pensei que nunca teria relação com algo assim..."
10096-CVGroup_UIEventLobby_Idle3-1 = "Nunca é bom ser excessivamente confiante."
10096-CVGroup_UIEventLobby_Idle3-2 = "Se encontrar alguém precisando de resgate, avise-me imediatamente."
10096-CVGroup_UIEventLobby_Idle4-1 = "B-bem-vindo! Sinta-se à vontade!"
10096-CVGroup_UIEventLobby_Idle4-2 = "Ehem... como eu disse, ainda não estou acostumada."
10096-CVGroup_UIEventShop_Enter1-1 = "Esta é a loja especial.\nSe precisar de algo, sinta-se à vontade para comprar."
10096-CVGroup_UIEventShop_Enter2-1 = "Uma recomendação... minha? Não tenho certeza.\nConfio no seu bom gosto, Sensei."
10096-CVGroup_UIEventShop_Enter3-1 = "O expediente terminou, mas\no parque parece continuar funcionando."
10096-CVGroup_UIEventShop_Enter3-2 = "Aproveite até o fim."
10096-CVGroup_UIEventShop_Idle1-1 = "Sim, está procurando por algo?"
10096-CVGroup_UIEventShop_Idle2-1 = "...Sensei, por favor, olhe para os produtos, não para mim."
10096-CVGroup_UIEventShop_Buy1-1 = "Ah, esse é um item que eu também estava de olho."
10096-CVGroup_UIEventShop_Buy2-1 = "Obrigada pela compra.\nEspero que seja útil para você, Sensei."
10096-CVGroup_UIEventShop_Buy3-1 = "Escolher isso mostra que você tem um bom olho.\nComo esperado do Sensei."
10096-CVGroup_UIEventShop_Buy4-1 = "N-não precisa me dar presentes.\nAinda estou em serviço..."
