[translation]
10096-CVGroup_UITitle_Idle1-1 = "ブルー、アーカイブ。"
10096-CVGroup_CharacterGet_Idle1-1 = "ヴァルキューレ警察学校、公安局局長、尾刃カンナです。\n任務の特性上、このような姿でご挨拶申し上げる無礼をお許しください。"
10096-CVGroup_Cafe_Idle1-1 = "要救助者は……居ないな。"
10096-CVGroup_Cafe_Idle2-1 = "少し休憩を取っておこうか。"
10096-CVGroup_Cafe_Idle3-1 = "いつでも出動できるよう、準備運動は怠らない。"
10096-CVGroup_Cafe_Idle4-1 = "ううん……いくつか気になるところはあるが……"
10096-CVGroup_Cafe_Idle5-1 = "休憩が終わったらパトロールを始めるとするか。"
10096-CVGroup_WeaponGet_Idle1-1 = "先生からいただいた信頼の証……なるほど。\nライフセーバーの荷は重いものです。\n期待を裏切らないよう、最善を尽くします。"
10096-CVGroup_UIEventLobby_Enter1-1 = "先生。お待ちしておりました。\n準備運動はしましたか？"
10096-CVGroup_UIEventLobby_Enter2-1 = "ウォーターパークで楽しい時間をお過ごしください。"
10096-CVGroup_UIEventLobby_Enter3-1 = "プールは楽しんでいますか？"
10096-CVGroup_UIEventLobby_Enter3-2 = "いつも伝えておりますが、安全第一ですよ。"
10096-CVGroup_UIEventLobby_Enter4-1 = "……私がここまで来れたのも、すべて先生のおかげです。"
10096-CVGroup_UIEventLobby_Enter4-2 = "最後まで頑張りましょう。"
10096-CVGroup_UIEventLobby_Enter5-1 = "肩の荷が降りたような、\nでも、どこか寂しいような気分です。"
10096-CVGroup_UIEventLobby_Enter5-2 = "先生はどうですか？"
10096-CVGroup_UIEventLobby_Idle1-1 = "水着でなければならないのは分かりますが……\nあまり慣れませんね。"
10096-CVGroup_UIEventLobby_Idle2-1 = "ウォーターパークか……\n縁がないと思っていたけど……。"
10096-CVGroup_UIEventLobby_Idle3-1 = "何事も過信はよくありません。"
10096-CVGroup_UIEventLobby_Idle3-2 = "要救助者を見つけたらすぐに知らせてください。"
10096-CVGroup_UIEventLobby_Idle4-1 = "い、いらっしゃいませ！ようこそ！"
10096-CVGroup_UIEventLobby_Idle4-2 = "こほん……やはり、あまり慣れませんね。"
10096-CVGroup_UIEventShop_Enter1-1 = "こちらは特別ショップです。\n必要なものがあれば購入していってください。"
10096-CVGroup_UIEventShop_Enter2-1 = "おすすめ……ですか。よくわかりません。\n先生の審美眼を信じております。"
10096-CVGroup_UIEventShop_Enter3-1 = "営業は終了しましたが、\nパークはまだ運営しているようです。"
10096-CVGroup_UIEventShop_Enter3-2 = "最後までお楽しみください。"
10096-CVGroup_UIEventShop_Idle1-1 = "はい、何かお探しですか？"
10096-CVGroup_UIEventShop_Idle2-1 = "……先生、私ではなく商品を見てください。"
10096-CVGroup_UIEventShop_Buy1-1 = "ああ、それは私も気になっていた商品です。"
10096-CVGroup_UIEventShop_Buy2-1 = "ご購入ありがとうございます。\n先生のお役に立つといいですね。"
10096-CVGroup_UIEventShop_Buy3-1 = "それを選ぶとは、見る目がありますね。\nさすが先生です。"
10096-CVGroup_UIEventShop_Buy4-1 = "わ、私へのプレゼントはいりません。\nまだ業務中ですから……。"
