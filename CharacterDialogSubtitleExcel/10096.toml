[translation]
10096-CVGroup_UITitle_Idle1-1 = "Blue, Archive."
10096-CVGroup_CharacterGet_Idle1-1 = "Sou Oba Kanna, diretora do Departamento de Segurança Pública da Escola de Polícia Valkyrie.\nPor favor, perdoe a indelicadeza de me apresentar com este traje devido à natureza da minha missão."
10096-CVGroup_Cafe_Idle1-1 = "Nenhuma vítima precisando de resgate... por aqui."
10096-CVGroup_Cafe_Idle2-1 = "Acho que vou fazer uma pequena pausa."
10096-CVGroup_Cafe_Idle3-1 = "Não negligencio o aquecimento para poder entrar em ação a qualquer momento."
10096-CVGroup_Cafe_Idle4-1 = "Hmm... Tem algumas coisas que estão me incomodando, mas..."
10096-CVGroup_Cafe_Idle5-1 = "Acho que vou começar a patrulha assim que o meu intervalo terminar."
10096-CVGroup_WeaponGet_Idle1-1 = "Uma prova da confiança que recebi do Sensei... Entendo.\nO fardo de uma salva-vidas é pesado.\nFarei o meu melhor para não decepcionar as suas expectativas."
10096-CVGroup_UIEventLobby_Enter1-1 = "Sensei. Eu estava esperando por você.\nJá fez o seu aquecimento?"
10096-CVGroup_UIEventLobby_Enter2-1 = "Espero que o senhor se divirta bastante no parque aquático."
10096-CVGroup_UIEventLobby_Enter3-1 = "Está aproveitando a piscina?"
10096-CVGroup_UIEventLobby_Enter3-2 = "Como eu sempre digo, segurança em primeiro lugar."
10096-CVGroup_UIEventLobby_Enter4-1 = "……Se eu consegui chegar até aqui, é tudo graças ao senhor, Sensei."
10096-CVGroup_UIEventLobby_Enter4-2 = "Vamos dar o nosso melhor até o fim."
10096-CVGroup_UIEventLobby_Enter5-1 = "Sinto como se um peso tivesse saído das minhas costas,\nmas, ao mesmo tempo, me sinto um pouco solitária."
10096-CVGroup_UIEventLobby_Enter5-2 = "E quanto ao senhor, Sensei?"
10096-CVGroup_UIEventLobby_Idle1-1 = "Eu entendo que é obrigatório usar maiô, mas...\neu não consigo me acostumar muito com isso."
10096-CVGroup_UIEventLobby_Idle2-1 = "Um parque aquático...\nEu achava que não tinha nada a ver comigo, mas..."
10096-CVGroup_UIEventLobby_Idle3-1 = "Excesso de confiança nunca é bom em nada."
10096-CVGroup_UIEventLobby_Idle3-2 = "Se encontrar alguém precisando de resgate, me avise imediatamente."
10096-CVGroup_UIEventLobby_Idle4-1 = "B-Bem-vindo! Seja bem-vindo!"
10096-CVGroup_UIEventLobby_Idle4-2 = "Ahem... Como eu imaginava, não tenho muito costume com isso."
10096-CVGroup_UIEventShop_Enter1-1 = "Esta é a loja especial.\nSe houver algo de que precise, fique à vontade para comprar."
10096-CVGroup_UIEventShop_Enter2-1 = "Uma recomendação...? Eu não sei muito bem.\nConfio no bom gosto estético do Sensei."
10096-CVGroup_UIEventShop_Enter3-1 = "O nosso expediente terminou, mas\nparece que o parque ainda está funcionando."
10096-CVGroup_UIEventShop_Enter3-2 = "Por favor, aproveite até o fim."
10096-CVGroup_UIEventShop_Idle1-1 = "Sim, está procurando alguma coisa?"
10096-CVGroup_UIEventShop_Idle2-1 = "……Sensei, olhe para os produtos, não para mim."
10096-CVGroup_UIEventShop_Buy1-1 = "Ah, esse é um produto que também me chamou a atenção."
10096-CVGroup_UIEventShop_Buy2-1 = "Obrigada pela sua compra.\nEspero que seja útil para o senhor, Sensei."
10096-CVGroup_UIEventShop_Buy3-1 = "O senhor tem bom gosto para escolher isso.\nComo esperado do Sensei."
10096-CVGroup_UIEventShop_Buy4-1 = "N-Não preciso de presentes para mim.\nAinda estou em horário de expediente, então..."