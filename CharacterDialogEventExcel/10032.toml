[translation]
10032-230 = "あっ、先生見ーつけた！\n新年になっても\n仕事だなんて、\n相変わらずだね先生！"
10032-240 = "わお！新年早々こうして\n会えるなんて\nびっくりだね、先生！"
10032-250 = "いぇーい、ハイタッチ！"
10032-260 = "さあ先生、今日は\nどんなオモチャで遊ぶ？"
10032-270 = "羽根つきに、\n福笑いに、\nだるま落とし！\nくふふっ♪"
10032-280 = "うーん、ちょっと\nマンネリになってきたし……\nそろそろ先生で\n遊ぼっかな！"
10032-290 = "どう？\n良いアイデアだと\n思わない？"
10032-300 = "あ～楽しかった！\nどう、先生も楽しめた？"
10032-310 = "今年もこんな風に、\n楽しいことが\nたっくさんあるといいな！"
10032-320 = "あはっ、何だか\nアルちゃん大変そうだね～\nまっ、私は面白いから\n良いんだけど！"
10032-330 = "まさか\nお賽銭泥棒なんてね～\n新年早々騒がしくって、\n全然飽きずに済みそう！"
10032-340 = "ん～、やっぱり\nじっとしてるだけじゃ\nつまんない！行こ、先生！"
10032-350 = "こうやって今年も\n色んな事が\n起きそうだけど、"
10032-360 = "アルちゃんもカヨコちゃんも\nハルカちゃんも、\n先生のことを\n頼りにしてるからね♪"
10032-370 = "え、私？ふふっ、\n逆に聞くけどー、\n私はどうだと思う？"
10032-380 = "さあ、どうかな～？"
10032-730 = "ムツキちゃんの\n特別交換所へ\nようこそ～！"
10032-740 = "あ、先生！\n福袋持ってるよね？\n早く開けてみようよ！"
10032-750 = "あっ、先生！\nおはよー！\n新年のイベントは\n終わっちゃったけど……"
10032-760 = "まだまだ物足りないよね！\n余ってる福袋があったら\nじゃんじゃん\n開けちゃおう！"
10032-770 = "さてさて、\n何が出てくるかな～？\nドキドキ！"
10032-780 = "うん？\nどうしてそんなに\n見てるのって？"
10032-790 = "だって、福袋を\n開けるところって\n何回見ても\n楽しいでしょ！"
10032-800 = "わーお！ こんなものが\n入ってたなんて、\nムツキちゃんもびっくり！"
10032-810 = "良いな良いな～\n私も欲しいな～"
10032-820 = "あっ、良さそうものが\n当たったね！先生！"
10032-830 = "この幸運も私のおかげかもよ？\n感謝してくれても\nいいんだよ？くふふっ！"
10032-840 = "おっ、当たりかな？\nあはっ、せっかく私が\n引いてあげたんだから"
10032-850 = "これを私だと思って、\n大切にしてね？"
