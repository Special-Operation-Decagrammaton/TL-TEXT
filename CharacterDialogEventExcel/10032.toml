[translation]
10032-230 = "Ah, achei você, Sensei!\nMesmo sendo Ano Novo,\nvocê continua trabalhando,\ncomo sempre, hein, Sensei!"
10032-240 = "Uau! Que surpresa\npoder te encontrar\nlogo no início do ano,\nSensei!"
10032-250 = "Iêi, toca aqui!"
10032-260 = "Então, Sensei, com que\nbrinquedo vamos brincar hoje?"
10032-270 = "Hanetsuki, Fukuwarai,\nDaruma Otoshi!\nKufufu♪"
10032-280 = "Hmm, está ficando um pouco\nmonótono... acho que\nvou brincar um pouco\ncom você, Sensei!"
10032-290 = "O que acha?\nNão é uma ótima ideia?"
10032-300 = "Ah~ foi divertido!\nE então, você também se divertiu, Sensei?"
10032-310 = "Espero que este ano\ntenha muitas coisas\ndivertidas assim!"
10032-320 = "Ahaha, parece que a\nAru-chan está em apuros~\nBem, para mim é engraçado,\nentão está tudo bem!"
10032-330 = "Quem diria que\nroubariam a caixa de oferendas~\nLogo no início do ano, tudo tão agitado,\nnão vou ficar entediada nem um pouco!"
10032-340 = "Hmm, ficar parada\né muito chato!\nVamos, Sensei!"
10032-350 = "Parece que este ano\nmuitas coisas vão acontecer,"
10032-360 = "mas a Aru-chan, a Kayoko-chan e\na Haruka-chan, todas elas\ncontam com você, Sensei♪"
10032-370 = "Eh, eu? Fufu, vou te\nperguntar o contrário:\no que você acha?"
10032-380 = "E então, quem sabe?"
10032-730 = "Bem-vindo à\nloja de trocas especial\nda Mutsuki-chan!"
10032-740 = "Ah, Sensei!\nVocê tem sacos da sorte, né?\nVamos abrir logo!"
10032-750 = "Ah, Sensei!\nBom dia!\nO evento de Ano Novo\njá acabou, mas..."
10032-760 = "Ainda não é o suficiente, né!\nSe tiver sacos da sorte sobrando,\nvamos abrir todos!"
10032-770 = "Muito bem, muito bem,\no que será que vai sair?\nQue emoção!"
10032-780 = "Hm?\nPor que estou olhando\ntanto assim?"
10032-790 = "Porque ver você\nabrindo os sacos da sorte\né divertido, não importa\nquantas vezes eu veja!"
10032-800 = "Uau! Até a Mutsuki-chan\nficou surpresa com o que\ntinha dentro!"
10032-810 = "Que legal, que legal~\nEu também queria um~"
10032-820 = "Ah, você tirou\nalgo bom, Sensei!"
10032-830 = "Essa sorte pode ter sido\ngraças a mim, sabia?\nPode me agradecer,\nse quiser! Kufufu!"
10032-840 = "Oh, será que é um prêmio?\nAhaha, já que fui eu\nque tirei para você,"
10032-850 = "pense que sou eu e\nguarde com carinho, tá?"
