[translation]
10036-100 = "お疲れ様です、先生！\nお待ちしておりました\n……！"
10036-110 = "どうか、安らぎが\n訪れますように……"
10036-120 = "えっと……やっぱり\n私にはこういうの、\n似合わないでしょうか\n……？"
10036-130 = "……？先生、どうか\nされましたか？\n何か必要なものでも\nありました？"
10036-140 = "え、えっと……？\nどうかされましたか？"
10036-150 = "先生……？何か私に、\n変なものでも\nついてましたか？"
10036-160 = "こうして先生と\nお話しするのは\n楽しいのですが、その、"
10036-170 = "そろそろ出発\nした方が……？"
10036-180 = "えっと……やっぱり\n私にはこういうの、\n似合わないでしょうか\n……？"
10036-190 = "では、気合を入れ直して\n頑張りましょう！"
10036-200 = "あ、少し急いだほうが\n良いかもしれませんね\n……？"
10036-210 = "が、頑張ります！"
10036-220 = "お片付けの時間ですね、\n全力でお手伝いします！"
10036-230 = "……？先生、どうか\nされましたか？\n何か必要なものでも\nありました？"
10036-240 = "え、えっと……？\nどうかされましたか？"
10036-250 = "先生……？何か私に、\n変なものでも\nついてましたか？"
10036-260 = "こうして先生と\nお話しするのは\n楽しいのですが、その、"
10036-270 = "そろそろ出発\nした方が……？"
10036-280 = "じ、実は、必要になりそうなものを、\n事前にまとめておきました！\nご確認、よろしくお願いいたします……！"
10036-290 = "整理や管理でしたら、\nぜひ私に任せてください……！\nこちらをどうぞ！"
10036-300 = "まだもう少し時間がありそうです、\n確認されていきますか？"
10036-310 = "え、えっと、\n私は一体どうしたら……？"
10036-320 = "わ、私ではなくその、\nこちらを見ていただきたく……！"
10036-330 = "あっ、良いですね、それ！"
10036-340 = "はい、私もそれが\n良いと思います。"
10036-350 = "さすがは先生です！"
10036-360 = "ふふっ、良い\nお買い物でしたね！"
