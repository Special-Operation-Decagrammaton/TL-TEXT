[translation]
10112-390 = "あ！先生！\nこっちだよー！"
10112-400 = "ご主人様……\nじゃなくて、"
10112-410 = "先生！やっと会えた～！"
10112-420 = "やほ！\n先生！楽しんでるー？"
10112-430 = "ふふっ、\n最後まで遊びつくそ～！\nご主人様、ううん、先生！"
10112-440 = "はあ～終わっちゃった。\nあっという\n間だったね……"
10112-450 = "……もちろん！\nすっ～～ごく、\n楽しかったよ！"
10112-460 = "先生、どこか行きたい\nところある？\n案内するよ～"
10112-470 = "うん？どうしたの？\n何か頼み事？"
10112-480 = "あはは、\nくすぐったい～！"
10112-490 = "もしかして先生、\n遊びたいの？"
10112-500 = "じゃあ私も先生を\nこちょこちょしちゃお～！\n逃がさないよ～あははっ！"
