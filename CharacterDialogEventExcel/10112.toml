[translation]
10112-390 = "Ah! Sensei!\nPor aqui!"
10112-400 = "Mestre...\nNão, espere,"
10112-410 = "Sensei! Finalmente te encontrei!"
10112-420 = "Ei! Sensei!\nEstá se divertindo?"
10112-430 = "Hehe, vamos aproveitar até o fim!\nMestre, não, Sensei!"
10112-440 = "Ah, acabou.\nPassou tão rápido, não é..."
10112-450 = "Com certeza!\nFoi incrivelmente divertido!"
10112-460 = "Sensei, tem algum lugar que queira ir?\nEu te guio!"
10112-470 = "Hm? O que foi?\nPrecisa de algo?"
10112-480 = "Ahaha, que cócegas!"
10112-490 = "Por acaso você quer brincar,\nSensei?"
10112-500 = "Então eu também vou fazer cócegas em você!\nNão vai escapar! Ahaha!"
