[translation]
16007-100 = "レッドウィンター事務局へ\nようこそ、先生。"
16007-110 = "学園の敷地内にある会長を\n模したマトリョーシカは、\nもう見つけられましたか？"
16007-120 = "それがあれば、ここで\n商品と交換することが\nできますよ！"
16007-130 = "お祭り、楽しんで\nいらっしゃいますか？"
16007-140 = "会長のマトリョーシカを\n見つけましたら、いつでも\nこちらに来てください！"
16007-150 = "お祭りも、\nもう佳境ですね……。"
16007-160 = "寂しいですが、\n仕方ありません。"
16007-170 = "今日が、\nイワン・クパーラ\n最終日です。"
16007-180 = "思い残しが無いように\n思う存分楽しんで\nくださいね！"
16007-190 = "お祭りは終わりましたが、\nまだマトリョーシカを\nお持ちでしたら、"
16007-200 = "ここで交換できますよ。"
16007-210 = "その会長の形をした\nマトリョーシカは、私が\nデザインしたんですよ。"
16007-220 = "ふふ……\n可愛いと思いませんか？"
16007-230 = "こんなにも可愛い\nマトリョーシカを手放さ\nないといけないなんて……"
16007-240 = "何だか胸が\n苦しいですよね、\nそう思いません？"
16007-250 = "当たりです！\nおめでとうございます！"
16007-260 = "あら、当たりですよ！\n先生は運が良いですね。"
16007-270 = "ふふ、良い物が当たりましたね。\nぜひ大切に使ってください！"
16007-280 = "チェリノ会長らしい、\n可愛いプレゼントですね！"
