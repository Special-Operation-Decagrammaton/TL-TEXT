[translation]
16007-100 = "Bem-vindo à Secretaria de Red Winter, Sensei."
16007-110 = "Você já encontrou as matryoshkas que imitam a Presidente espalhadas pelo campus da escola?"
16007-120 = "Se você as tiver, pode trocá-las por itens aqui!"
16007-130 = "Está aproveitando o festival?"
16007-140 = "Se encontrar as matryoshkas da Presidente, venha aqui a qualquer momento!"
16007-150 = "O festival já está chegando ao fim, não é..."
16007-160 = "É triste, mas não há o que fazer."
16007-170 = "Hoje é o último dia do Ivan Kupala."
16007-180 = "Aproveite ao máximo para não deixar nada pendente!"
16007-190 = "O festival acabou, mas se você ainda tiver matryoshkas,"
16007-200 = "pode trocá-las aqui."
16007-210 = "Fui eu quem desenhei essas matryoshkas com o formato da Presidente."
16007-220 = "Hehe... não acha que são fofas?"
16007-230 = "Ter que me desfazer de matryoshkas tão fofas assim..."
16007-240 = "Dá um aperto no coração, não acha?"
16007-250 = "Você ganhou! Parabéns!"
16007-260 = "Ora, você ganhou! O Sensei tem muita sorte."
16007-270 = "Hehe, você ganhou algo bom. Por favor, cuide bem disso!"
16007-280 = "É um presente fofo, bem a cara da Presidente Cherino!"
