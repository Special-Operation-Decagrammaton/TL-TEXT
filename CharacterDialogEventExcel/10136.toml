[translation]
10136-3070 = "Ei, Sensei, consegue me ouvir?"
10136-3080 = "É uma emergência, então\nestou te contatando por aqui."
10136-3090 = "Mesmo através da tela,\nestou feliz em ver seu rosto."
10136-3100 = "Eu garanti a ventilação, mas..."
10136-3110 = "Ainda está quente.\nPosso tirar mais uma peça--"
10136-3120 = "Hã? Não posso? Entendi..."
10136-3130 = "Bem, se o Sensei\ndiz isso..."
10136-3140 = "Agora, mais do que uma sniper,\nsou uma atiradora de elite."
10136-3150 = "Quando eu me mover,\nvou ficar com a equipe."
10136-3160 = "...Obrigada por me levar\npara um lugar mais fresco."
10136-3170 = "Conversar com o Sensei\né sempre divertido."
10136-3180 = "Sim, bom trabalho."
