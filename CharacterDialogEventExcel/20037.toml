[translation]
20037-150 = "Ei, Sensei. Bom trabalho."
20037-160 = "Parque aquático... Se não fosse trabalho, seria um lugar que eu adoraria..."
20037-170 = "Todo mundo está cheio de energia, né? Deve ser porque vieram se divertir."
20037-180 = "Vamos lá, está quase na hora de bater o ponto!"
20037-190 = "Aconteceram várias coisas, mas conseguimos terminar. Bom trabalho para você também, Sensei."
20037-200 = "Toboágua?"
20037-210 = "Não, não é que eu tenha medo... é, é mais uma questão de preguiça..."
20037-220 = "Que calor... Ter que trabalhar num dia desses é o pior."
20037-230 = "É justamente em dias quentes assim que repor o açúcar é importante."
20037-240 = "Exatamente, donuts são itens de primeira necessidade."
20037-250 = "Ah! N-nada de anormal no local! ...Espera, Sensei? Que susto."
20037-480 = "Veio trocar algo? Tem várias coisas aqui, dá uma olhada."
20037-490 = "Ahhh, que refrescante... Sensei, pode ficar à vontade também."
20037-500 = "Expediente encerrado. Sensei, que tal irmos comemorar?"
20037-510 = "Mesmo sendo você, Sensei, não posso entregar de graça, né?"
20037-520 = "Não olhe para mim, olhe para os produtos."
20037-530 = "Uau!? Eu nem sabia que isso existia!"
20037-540 = "S-Sensei. Você tem mais sorte do que eu pensava, hein?"
20037-550 = "Parabéns~ Isso aqui é o primeiro prêmio."
20037-560 = "Acho que terminamos tudo por aqui. Nossa, vocês dois se esforçaram bastante."
