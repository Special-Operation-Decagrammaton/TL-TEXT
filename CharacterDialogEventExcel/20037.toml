[translation]
20037-150 = "E aí, Sensei. Bom trabalho~"
20037-160 = "Parque aquático...\nSe não fosse a trabalho,\nseria um lugar que eu adoraria..."
20037-170 = "Todo mundo tá bem animado, né~.\nDeve ser porque vieram para se divertir."
20037-180 = "Olha só, já está quase\nna hora de largar o expediente!"
20037-190 = "Aconteceu muita coisa, mas\nconseguimos terminar de algum jeito.\nBom trabalho para você também, Sensei."
20037-200 = "Toboágua?"
20037-210 = "Não, não é bem medo...\nÉ mais que dá\numa preguiça..."
20037-220 = "Que calor...\nTrabalhar num dia quente assim\né a pior coisa do mundo~"
20037-230 = "É exatamente nesses dias quentes\nque repor o açúcar\né importante."
20037-240 = "Isso, donuts são\nitens de primeira necessidade."
20037-250 = "Ah! N-Nenhuma anormalidade no local!\n...Ah, era você, Sensei?\nQue susto."
20037-480 = "Veio fazer trocas?\nTem várias coisas, dá uma olhada~"
20037-490 = "Ha~ah, que fresquinho~~\nAproveita para dar uma relaxada\ntambém, Sensei."
20037-500 = "Expediente encerrado~ E aí,\nSensei. Que tal sairmos\npara comemorar?"
20037-510 = "Por mais que seja você, Sensei,\nnão posso te dar isso de graça, sabe?"
20037-520 = "Não olhe para mim,\nolhe para os produtos~"
20037-530 = "Uau!?\nTinha uma coisa dessas aí!"
20037-540 = "S-Sensei.\nVocê tem mais sorte do que eu imaginava, hein?"
20037-550 = "Parabéns~ Esse é o primeiro prêmio."
20037-560 = "Acho que com isso acabou tudo.\nUfa, nós dois nos esforçamos bastante, né."