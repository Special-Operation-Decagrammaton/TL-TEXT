[translation]
10109-240 = "ふふっ、\nこうして真夜中の\nミレニアムで先生と"
10109-250 = "お会いするなんて……\nなんだか久しぶりな\n気がします。"
10109-260 = "こんばんは、先生。\nふふ、これですか？"
10109-270 = "セミナーの皆さんと\nパジャマパーティーを\nすることになったんです。"
10109-280 = "……先生、何か隠し事を\nしていませんか？"
10109-290 = "じーっ……"
10109-300 = "ふふ、想定外では\nありますが、面白く\nなってきましたね。"
10109-310 = "先生、もうお休みに\nなりますか？"
10109-320 = "まだでしたら少しだけ…\n私たちに付き合って\nいただけませんか？"
10109-330 = "冬の夜は…\n長いですから。"
10109-340 = "パジャマで深夜の\nキャンパスを\n歩いていると……"
10109-350 = "ちょっと悪いことを\nしているみたいで、\nワクワクしますね。"
10109-360 = "ボードゲームのルールは\n把握していますが、"
10109-370 = "実際に遊んだ\nことは…片手で\n数えられるほどしか…。"
10109-380 = "ユウカちゃん……\nああ言ってますけど、\n浮かれているんだと\n思います。"
10109-390 = "あんなやる気に\n満ちた顔は久しぶりに\n見ました。"
10109-400 = "（リオ会長もパーティーに\n来ていただきたかったん\nですが……）"
10109-560 = "今、パーティーに使う\nボードゲームを\nまとめているのですが…"
10109-570 = "思ったより\n散らかってしまって……"
10109-580 = "先生、\n手を貸していただいても\nよろしいですか？"
10109-590 = "パーティーは\n終わりましたが、"
10109-600 = "気になるボードゲームが\nありましたら、\nお気軽にどうぞ。"
10109-610 = "もう遅い時間ですよ？"
10109-620 = "……でも先生の\nお願いでしたら、\nご一緒いたします。"
10109-630 = "ボードゲームって、\n種類がたくさん\nあるんですね。"
10109-640 = "使ったものは元の\n位置に戻す、\nあれだけ言ったのに……"
10109-650 = "ああ、そこに\nあったんですね。"
10109-660 = "この形は、もしかして…"
10109-670 = "あら、面白そうですね。"
10109-680 = "これは……どのように\nして遊ぶのでしょう？"
10109-690 = "はい、次。\n整理整頓、続けますよ。"
10109-700 = "あ、先生、\n手が空いていましたら、"
10109-710 = "パーティーの準備を\n手伝っていただけませんか？"
10109-720 = "パジャマパーティーの\n役割分担を決めている\nところなんです。"
10109-730 = "はい、\nなんでもお申し付けください。"
10109-740 = "結ぶのは楽なんですが…\n少しうなじがスースーして…。"
10109-750 = "3回目……先生がこちらを\n見た回数のことです。"
10109-760 = "ふふ、名案です、先生。"
10109-770 = "なるほど、\n今のは参考にいたします。"
