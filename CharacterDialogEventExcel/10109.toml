[translation]
10109-240 = "Fufu, encontrar você aqui\nno Millennium no meio da\nnoite, Sensei..."
10109-250 = "Sinto que faz tempo que\nnão nos vemos..."
10109-260 = "Boa noite, Sensei.\nFufu, isso aqui? É..."
10109-270 = "Decidimos fazer uma\nfesta do pijama com o\npessoal do Seminar."
10109-280 = "……Sensei, você não está\nescondendo nada de mim,\nestá?"
10109-290 = "Encarando..."
10109-300 = "Fufu, é algo inesperado,\nmas as coisas estão\nficando interessantes."
10109-310 = "Sensei, você já vai\ndormir?"
10109-320 = "Se ainda não for, poderia\nficar um pouco conosco?"
10109-330 = "As noites de inverno...\nsão longas, afinal."
10109-340 = "Caminhar pelo campus\nde pijama no meio da\nmadrugada..."
10109-350 = "É como se estivéssemos\nfazendo algo proibido,\né bem empolgante."
10109-360 = "Eu conheço as regras dos\njogos de tabuleiro, mas..."
10109-370 = "Na verdade, só joguei\nalgumas poucas vezes\nna vida..."
10109-380 = "Yuuka-chan... ela diz isso,\nmas acho que ela está\nmuito animada."
10109-390 = "Faz tempo que não a vejo\ncom um rosto tão\ncheio de entusiasmo."
10109-400 = "(Eu queria que a Presidente\nRio também tivesse vindo\npara a festa...)"
10109-560 = "Estou organizando os jogos\nde tabuleiro para a festa,\nmas..."
10109-570 = "Ficou mais bagunçado\ndo que eu esperava..."
10109-580 = "Sensei, você poderia\nme dar uma mãozinha?"
10109-590 = "A festa já acabou, mas..."
10109-600 = "Se houver algum jogo que\ntenha despertado seu\ninteresse, fique à vontade."
10109-610 = "Já está tarde, sabia?"
10109-620 = "……Mas se é um pedido\ndo Sensei, eu vou\nacompanhar você."
10109-630 = "Existem tantos tipos\nde jogos de tabuleiro,\nnão é?"
10109-640 = "Eu disse tantas vezes\npara devolverem as coisas\nno lugar..."
10109-650 = "Ah, estava aí."
10109-660 = "Este formato, será que..."
10109-670 = "Ora, parece interessante."
10109-680 = "Isso aqui... como\nserá que se joga?"
10109-690 = "Sim, próximo. Vamos\ncontinuar a organização."
10109-700 = "Ah, Sensei, se você\nestiver livre..."
10109-710 = "Poderia me ajudar com os\npreparativos da festa?"
10109-720 = "Estamos decidindo as\nfunções de cada uma para\na festa do pijama."
10109-730 = "Sim, pode me pedir\no que quiser."
10109-740 = "É fácil de amarrar, mas...\nsinto um friozinho na nuca..."
10109-750 = "A terceira vez... é o número\nde vezes que você olhou\npara cá, Sensei."
10109-760 = "Fufu, é uma ótima ideia,\nSensei."
10109-770 = "Entendo, vou levar isso\nem consideração."
