[translation]
10094-340 = "来た！見た！\nそして勝った……\nっけ？"
10094-350 = "とにかく！\nメイドの才羽モモイ、\n出陣だよ！"
10094-360 = "あ、先生！\n準備ならとっくに……！"
10094-370 = "あれぇ……？\nちょ、ちょっと\n待っててね、先生！"
10094-380 = "ん～？メイドらしい\n働きぶりを見たい……？"
10094-390 = "まあ一応、メイド服に\nなっているからね！\nうん！"
10094-400 = "メイドの科目には\nどうして、サボって\n昼寝する授業がないの？"
10094-410 = "これって、\n問題だと思わない？"
10094-420 = "そうだ！ねえ、先生。\n知ってる？\nこのお屋敷には……"
10094-430 = "すっごい秘密が\n隠されているんだって！\n私の直感が、\nそう言ってるの！"
10094-440 = "く、くすぐったいよ！\n先生！私、くすぐりに\n弱いんだから"
10094-450 = "イヤなわけじゃ\nないけどさぁ！？"
10094-920 = "来た！見た！\nそして勝った……\nっけ？"
