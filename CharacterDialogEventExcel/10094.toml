10094-940 = "あ、先生！\n準備ならとっくに……！"
10094-950 = "あれぇ……？\nちょ、ちょっと\n待っててね、先生！"
10094-960 = "うえぇん、\n仕事が多すぎるよぉ！"
10094-970 = "こんな事になるなんて、\n知らなかったのにぃ……"
10094-980 = "理解できない、\n理解できないよ……"
10094-990 = "怪盗？オークション？\n美術品？何それ！\nなんかのゲームの設定！？"
10094-1000 = "多くの事があったが、\n勇者たちは悪を倒し、"
10094-1010 = "堂々と故郷へと\n帰還したのであった……！"
10094-1020 = "ま、そんなエンディング\nだったよね。ん？\n先生？お疲れ様！"
