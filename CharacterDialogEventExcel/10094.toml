[translation]
10094-340 = "Vim! Vi!\nE venci...\nOu não?"
10094-350 = "De qualquer forma!\nMomoi Saiba, a empregada,\nestá pronta para a ação!"
10094-360 = "Ah, Sensei!\nEu já estou pronta há muito tempo...!"
10094-370 = "Ué...?\nEs-espera um pouco,\nSensei!"
10094-380 = "Hmm? Quer ver como\numa empregada trabalha...?"
10094-390 = "Bem, eu estou vestida\nde empregada, afinal!\nSim!"
10094-400 = "Por que não tem uma aula\nde como faltar e tirar uma soneca\nno curso de empregada?"
10094-410 = "Você não acha que\nisso é um problema?"
10094-420 = "Ah, é! Ei, Sensei.\nVocê sabia?\nNesta mansão..."
10094-430 = "Dizem que um segredo incrível\nestá escondido aqui!\nÉ o que a minha intuição\nestá me dizendo!"
10094-440 = "I-isso faz cócegas!\nSensei! Eu sou muito\nsensível a cócegas!"
10094-450 = "Não é que eu não goste, mas...!?"
10094-920 = "Vim! Vi!\nE venci...\nOu não?"
10094-930 = "De qualquer forma!\nMomoi Saiba, a empregada,\nestá pronta para a ação!"
10094-940 = "Ah, Sensei!\nEu já estou pronta há muito tempo...!"
10094-950 = "Ué...?\nEs-espera um pouco,\nSensei!"
10094-960 = "Buááá,\ntem trabalho demais!"
10094-970 = "Eu não sabia que\ncoisas assim iam acontecer..."
10094-980 = "Eu não entendo,\neu não entendo nada..."
10094-990 = "Ladrão? Leilão?\nObras de arte? O que é isso!\nÉ algum tipo de cenário de jogo!?"
10094-1000 = "Muitas coisas aconteceram, mas\nos heróis derrotaram o mal,"
10094-1010 = "e retornaram triunfantes\npara casa...!"
10094-1020 = "Bem, esse foi o final,\nné? Hm? Sensei?\nBom trabalho!"
