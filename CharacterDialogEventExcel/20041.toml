[translation]
20041-280 = "適切なタイミングね。"
20041-290 = "そろそろ来る頃だと\n思っていたわ。"
20041-300 = "全て順調よ。\nでも、安心できる\n段階ではないわ。"
20041-310 = "近々、まとまった\n報告ができそうよ。"
20041-320 = "もう少し待って\nちょうだい。"
20041-330 = "解決できてよかったわ。"
20041-340 = "……これは本心よ。"
20041-350 = "……突然私に触れて、\nどうしたのかしら？"
20041-360 = "言葉で\n伝えてくれるかしら。"
20041-370 = "だから……その……"
20041-380 = "私に……何を、\n求めているの？"
20041-800 = "リストアップは\n済んでいるわ。"
20041-810 = "これが今日のタスクよ。"
20041-820 = "……先生の意図が\n理解できないわ。"
20041-830 = "無言で触れるだけでは、\n伝わらないのよ。"
20041-840 = "……もしかして、"
20041-850 = "同じことをしてほしいの？"
20041-860 = "確認するわね。"
20041-870 = "リストを更新しておいたわ。"
20041-11460 = "途中参加という\n形になるのかしら。"
20041-11470 = "……これからよろしく\n頼むわね、先生。"
20041-11480 = "貴方は、時間を\n厳守できる人なのね。"
20041-11490 = "まさに合理的な行動よ。"
20041-11500 = "ここがヒマリの……"
20041-11510 = "いえ、\n私たちの基地なのね。"
20041-11520 = "……まだ、\n実感がわかないの。"
20041-11530 = "先生と……同じ作戦に\n身を置いていることが。"
20041-11540 = "……みんなには、\n気兼ねなく\n接してもらっているわ。"
20041-11550 = "嫌というわけでは、\nないのだけれど……"
20041-11560 = "少し戸惑っているのは、\n事実よ。"
20041-11570 = "工学の分野以外は……"
20041-11580 = "ごめんなさい、\nそれほど詳しくないの。"
20041-11590 = "……なにかしら？\n……話しかけて\nみたかっただけ？"
20041-11600 = "そういう非合理的な\n行動は控えて頂戴、\n先生。"
20041-11610 = "……不愉快とまでは、\n言ってないわ。"
20041-11620 = "以前は、すべてを\n掌握しなければ\nならないと考えていたの。"
20041-11630 = "でも、今は……人間一人に\n掌握できる範疇の\n限界に気がつけたわ。"
20041-11640 = "……先生のおかげ、\nかしら。"
20041-11650 = "ヒマリから\n引き継ぎがあったわ。"
20041-11660 = "現在、\n各地から「名も無き神」による"
20041-11670 = "謎の物質が\n見つかっている、と。"
20041-11680 = "サンプルがあれば、\n再補給も可能になるわ。"
20041-11690 = "集めたサンプルを\n見せてちょうだい。"
20041-11700 = "協力、感謝するわ。"
20041-11710 = "「物質」の分析中よ。そこから\n副産物を生産しているの。"
20041-11720 = "この装置、\nかなり熱を放っているわね……"
20041-11730 = "エイミには少し\n厳しいんじゃないかしら。"
20041-11740 = "装置の構造に不満はないの。"
20041-11750 = "意外？ふふ、私だって、\n優れたものは素直に認めるわ。"
20041-11760 = "ああでも、デザインと\n細部にもう少し合理性を……"
20041-11770 = "……そんなことをしても、\n得られるものは\n何もないと思うわ。"
20041-11780 = "……私の表情の\n変化が見られる？"
20041-11790 = "……貴方が変わっていると\n言われる理由が、分かったわ。"
20041-11800 = "今回の分析結果よ。"
20041-11810 = "いらっしゃいませ、\nどちらになさいますか？"
20041-11820 = "……真似してみただけよ。\n今のは忘れなさい。"
20041-11830 = "過去にあった\n「物々交換」も、"
20041-11840 = "こうだったのかしら。"
20041-11850 = "合理的な選択ね。"
20041-11860 = "最終選択は貴方に委ねるわ。"
20041-11870 = "ここでは、少し\n変わった分析方法を\n採用しているの。"
20041-11880 = "一言でいうと――\n「偶然に基づいた\n抽出」よ。"
20041-11890 = "「くじ」で損を\nする可能性は、\n確率論でも立証済み。"
20041-11900 = "……けれど、\n今は仕方ないわね。"
20041-11910 = "……ヒマリの嗜好は\n変わらないのね。"
20041-11920 = "……多面的考察は\n必要だもの。ええ。"
20041-11930 = "分析結果の予測が正確に\nできないというのは……"
20041-11940 = "セミナーの人間として、\n少し遺憾ね。"
20041-11950 = "もし期待通りの結果が\n得られなかったとしても…"
20041-11960 = "私にできることはないの。\n先に謝っておくわね。"
20041-11970 = "「神はサイコロを\n振らない」……"
20041-11980 = "この命題は誤りだと\nされているのだけれども、"
20041-11990 = "私は――ある側面に\nおいては、\n同意しているわ。"
20041-12000 = "量子力学という学問は、\n理解するものではないわ。"
20041-12010 = "……暗記するものよ。"
20041-12020 = "世界とは、人間の\n認知の外にあるもの。"
20041-12030 = "……そうね、\nこの運任せの分析と一緒。"
20041-12040 = "……それは……！\n本当に……？"
20041-12050 = "大数の法則、ね。"
20041-12060 = "当たるまで引き続ける…？"
20041-12070 = "理論上、間違っては\nないのだけれど…"
20041-12080 = "世界の大半は正規分布の\n中に存在する……"
20041-12090 = "成し遂げたわね、先生。\nおめでとう。"
