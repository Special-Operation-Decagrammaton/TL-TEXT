[translation]
10056-10 = "Sensei! É Natal!"
10056-20 = "Até eu\nestou ficando animada."
10056-30 = "Espero que um presente chamado\n'felicidade' chegue\na todos vocês..."
10056-40 = "Neste Natal,\nvocê tem algum plano?"
10056-50 = "Bem... \nSe não se importar,\nque tal passarmos a sós..."
10056-60 = "N-não,\nnão é nada!"
10056-70 = "Sim!\nÉ a Serina Noel!"
10056-80 = "Tem algo em que eu\npossa ajudar?"
10056-90 = "No Natal,\nchame a Serina Noel!"
10056-100 = "Sensei?\nAconteceu alguma coisa?"
10056-260 = "A arrecadação de caridade de Natal\né por aqui!"
10056-270 = "Por favor, faça uma doação\npara aqueles que precisam!"
10056-280 = "A arrecadação de caridade de Natal\nfoi encerrada."
10056-290 = "Verifique se não deixou\nnada pendente."
10056-300 = "Sensei,\ndeixe-me ajudar com algo."
10056-310 = "Será que a Hanae-chan está bem..."
10056-320 = "Muito obrigada.\nSim, aqui está o seu presente."
10056-330 = "Feliz Natal!\nTenha um dia maravilhoso!"
10056-340 = "Até algo tão valioso assim...\nTem certeza de que quer doar?"
