[translation]
10056-10 = "先生！クリスマスですよ！"
10056-20 = "私まで\nワクワクしてきます。"
10056-30 = "皆さんに「幸せ」という\n名のプレゼントが\n届きますように……"
10056-40 = "今年のクリスマス、\n何かご予定はありますか？"
10056-50 = "その……\nもしよろしければ、\n私と二人で……"
10056-60 = "い、いえっ、\nなんでもありません！"
10056-70 = "はい！\nサンタのセリナですよ！"
10056-80 = "何かお手伝いすることは\nありますか？"
10056-90 = "クリスマスには、\nサンタのセリナを\n呼んでくださいね！"
10056-100 = "先生？\nどうかしましたか？"
10056-260 = "クリスマスのチャリティー募金は\nこちらです！"
10056-270 = "困っている方々のために、\nどうか寄付をお願いします！"
10056-280 = "クリスマスのチャリティー募金は\n終了しました。"
10056-290 = "やり残した事はないか、\n確認してくださいね。"
10056-300 = "先生、\n何かお手伝いさせてください。"
10056-310 = "ハナエちゃん、大丈夫かな……"
10056-320 = "ありがとうございます。\nはい、こちらがプレゼントですよ。"
10056-330 = "メリークリスマス！\n素敵な一日をお過ごしください！"
10056-340 = "こんなに貴重なものまで……\n寄付していただいていいんですか？"
