[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10123-360 = "Hoje o dia está perfeitamente\ncalmo e favorável."
10123-370 = "……Ora, não há problema nenhum\nem apenas dizer, não é mesmo?"
10123-380 = "A partir daqui...\neu vou assumir o controle e te guiar."
10123-390 = "Me divertir de forma pura\ne inocente como uma criança..."
10123-400 = "E deixar esses desejos transbordarem\nsem nenhum pudor...\nacho que é a maior das felicidades."
10123-410 = "Não pretendo tirar o pé do acelerador\naté chegarmos ao clímax final."
10123-420 = "Um sentimento radiante,\nmisturado com um leve apego tentador――"
10123-430 = "Ficar no meio desse limiar...\nnão é uma sensação nada má."
10123-440 = "Por que ficar com essa vergonha toda?"
10123-450 = "Se o seu corpo tem um desejo,\nuse a sua boca e me peça logo."
10123-460 = "Kuh... fufu..."
10123-470 = "Fazer cócegas no meu corpo...\nVocê é bem ousado e atrevidinho, não é?"
10123-480 = "Ainda existem expressões (e lados) do\nSensei que eu não conheço a fundo..."
10123-490 = "Você não quer se abrir\ne me mostrar muito mais?"
10123-500 = "Isso aqui...\nEu só escolhi uma roupa de banho\nque fosse apropriada pra estação."
10123-510 = "O verão, pelo visto...\né uma estação que odeia pedaços de\npano cobrindo o nosso corpo."