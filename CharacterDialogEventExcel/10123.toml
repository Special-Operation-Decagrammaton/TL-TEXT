[translation]
10123-360 = "Hoje também é um dia tranquilo, não é?"
10123-370 = "……O quê? Não custa nada falar, não é mesmo?"
10123-380 = "Deixe que eu guie o caminho a partir daqui."
10123-390 = "Divertir-se com a inocência\nde uma criança……"
10123-400 = "Poder expressar isso sem reservas\né, sem dúvida, a maior das felicidades."
10123-410 = "Não pretendo tirar o pé do acelerador\naté o fim."
10123-420 = "Um sentimento de clareza\ne um leve arrependimento――"
10123-430 = "Estar entre esses dois sentimentos\nnão é algo ruim."
10123-440 = "Por que haveria de se envergonhar?"
10123-450 = "Se você tem um desejo,\nentão coloque-o em palavras."
10123-460 = "Ah…… hehe……."
10123-470 = "Fazer cócegas, que atitude\naudaciosa a sua."
10123-480 = "Uma expressão do Sensei\nque eu ainda não conheço……."
10123-490 = "Poderia me mostrar\nmais um pouco?"
10123-500 = "Isso é…… apenas escolhi um traje\nadequado para a estação."
10123-510 = "Parece que o verão\nnão gosta muito de\ntecidos cobrindo o corpo."
