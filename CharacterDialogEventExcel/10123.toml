[translation]
10123-360 = "今日も穏やかな一日だね。"
10123-370 = "……なに、言うだけなら\n自由だろう？"
10123-380 = "ここからは\n私が導くとしよう。"
10123-390 = "子供のように\n無邪気に楽しむ……"
10123-400 = "忌憚なくそれが\n発露できるのは、何よりの\n幸せだといえよう。"
10123-410 = "最後まで、アクセルを\n緩めるつもりはないよ。"
10123-420 = "晴れやかな気持ちと、\n僅かな未練――"
10123-430 = "その狭間というのも\n悪くないものだね。"
10123-440 = "何を恥じらうことがある。"
10123-450 = "望みがあるのなら、\n言葉にしたまえよ。"
10123-460 = "くっ……ふふっ……。"
10123-470 = "くすぐりとは、大胆な\nことをするじゃないか。"
10123-480 = "まだ知らない\n先生の表情……。"
10123-490 = "もっと見せて\nくれないかい？"
10123-500 = "これは……季節に\n適した装いを\n選んだだけさ。"
10123-510 = "夏というものは、\n身を包む布を\n好まないらしい。"
