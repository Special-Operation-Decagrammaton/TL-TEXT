[translation]
10143-310 = "秘境に到着……\nふふっ、いかがですか、\n先生？"
10143-320 = "私ですか？\nなんだか新鮮で、\n楽しいですよ。"
10143-330 = "後でお時間\nよろしいでしょうか……？"
10143-340 = "いえ、大したこと\nではありません。"
10143-350 = "ただ……先生と二人で、"
10143-360 = "ここを見て回りたくて。"
10143-370 = "先生と皆さんと一緒に\n旅行に来られて……。\nとてもうれしいです。"
10143-380 = "きっと、\n私はこの日を忘れません、\nずっと……。"
10143-390 = "子供というのは、\nとても純粋です。"
10143-400 = "私たちが思っている\n以上に色んなことを\n受け取っていて。"
10143-410 = "だから、導いて\nあげないと\nいけないんです。"
10143-420 = "先生が私たちに対して、"
10143-430 = "そう思って\nくださるように。"
10143-440 = "お疲れさまでした、先生。\nええ……本当に。"
10143-450 = "その……よかったら、\n今から一緒に……。"
10143-460 = "本当の旅行を\n楽しみませんか？"
10143-470 = "準備運動は\nしっかりしましたか？"
10143-480 = "水に入る時は、"
10143-490 = "足からゆっくり水をかけて\n温度に慣らしてから\n入るんですよ。"
10143-500 = "はい、\n私はここにいますよ。"
10143-510 = "もしも寒い\nようでしたら……\n温めてあげますからね。"
10143-520 = "わっ、そこは\nダメです、先生……っ！"
10143-530 = "っ……。"
10143-540 = "少しだけ、ですよ……。"
10143-550 = "もう！先生ったら……\nめっ、です！"
10143-560 = "二人きりになってから\nにしましょうね。"
10143-570 = "こんにちは！\nお待ちしてました！"
10143-580 = "先生の\nシュエリンですよ！"
10143-590 = "先生、\nおかえりなさい！"
10143-600 = "え？シュエリンで\n大丈夫なのか……？"
10143-610 = "ふふっ、私はいつでも\n大丈夫ですよ！"
10143-611 = "あっ、先生！えへへ。\nお待ちしてました！"
10143-612 = "やることぜーんぶ\n終わってるなら……\n遊びに行きませんか？"
10143-613 = "もちろん……\n二人きり、で。"
10143-620 = "えへへっ、\nどうでしょう？\n新鮮ですか？"
10143-630 = "あれ、\nどうかされたんですか？"
10143-640 = "もしかして\n「シュエリン」とは……。"
10143-650 = "遊びたくないのですか？"
10143-660 = "先生と一緒にいる時が、"
10143-670 = "一番幸せです。"
10143-680 = "だって……。"
10143-690 = "自分の気持ちに\n素直になれますから。"
10143-700 = "子供の身体になるのって、\n最高～です！"
10143-710 = "当たりです！\nすごいです！"
10143-720 = "あっちで商品と\n交換できるみたいですよ！"
10143-730 = "わあ！すごい！\n先生、もっと近くで\n見せてください！"
10143-740 = "これは\n一体何でしょう……？\nきっとすごいものですよ！"
10143-750 = "これは\n一体何でしょう……？\nきっとすごいものですよ！"
10143-960 = "一応、これも\n査察の一環なんです。"
10143-970 = "今日のスケジュールを\n見ていきましょうか。"
10143-980 = "査察対象がこんな\n綺麗な渓谷だなんて……。"
10143-990 = "なんだか、楽しみですね。"
10143-1000 = "先生、よかったら\nフルーツを頂きませんか？"
10143-1010 = "休憩がてら……\nはい、どうぞ。"
10143-1020 = "お疲れさまでした。"
10143-1030 = "あちらの方で色々と\n準備してくださっている\nみたいですよ。"
10143-1040 = "その……先生のお時間は、\nもちろん先生の\nものですが……。"
10143-1050 = "一部だけでも……\nほんの少し、\nでもいいので。"
10143-1060 = "一緒に過ごせたら、\nと思う時が\nあるんです。"
10143-1070 = "たまにそそっかしすぎる\nと言われることが\nあるのですが……。"
10143-1080 = "それが功を奏す\n時もあるんです。"
10143-1090 = "ふふっ。ええ。"
10143-1100 = "こうやって一緒に\nいる時間が、\n作れましたから。"
