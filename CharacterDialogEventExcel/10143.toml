[translation]#[Texto Final. - Filipe 24/06.]
10143-310 = "Chegamos ao lugar secreto...\nFufu, o que achou da vista,\nSensei?"
10143-320 = "Se eu estou gostando?\nÉ tudo tão novo e fresco.\nÉ muito divertido."
10143-330 = "Você estaria livre\num pouco mais tarde...?"
10143-340 = "Não, não se preocupe,\nnão é nada demais."
10143-350 = "É só que... eu queria\nver esse lugar com você,"
10143-360 = "Apenas nós dois."
10143-370 = "Poder viajar com você\ne com todas as meninas...\nMe deixa tão feliz."
10143-380 = "Com certeza, \neu nunca vou esquecer este dia,\npara todo o sempre..."
10143-390 = "Crianças são serzinhos\nmuito puros."
10143-400 = "Elas absorvem e sentem\nmuito mais coisas do que\nnós adultos imaginamos."
10143-410 = "É por isso que precisamos\nsempre guiá-las e\nensiná-las o caminho."
10143-420 = "Exatamente como o\nSensei sempre faz,"
10143-430 = "Cuidando tão bem\nde todas nós."
10143-440 = "Bom trabalho hoje, Sensei.\nSim... você foi ótimo."
10143-450 = "Sabe... se não se importar,\no que acha de agora..."
10143-460 = "Aproveitarmos a nossa\nverdadeira viagem a dois?"
10143-470 = "Fez os seus exercícios\nde aquecimento direito?"
10143-480 = "Na hora de entrar na água,"
10143-490 = "Você deve molhar os pés primeiro\npara se acostumar com a\ntemperatura antes de mergulhar."
10143-500 = "Sim,\neu estou bem aqui."
10143-510 = "Se estiver com muito\nfrio na água...\nEu posso te esquentar um pouquinho."
10143-520 = "Ah, aí não\npode, Sensei...!"
10143-530 = "Uhn..."
10143-540 = "Só um pouquinho, viu..."
10143-550 = "Nossa! Sensei...\nEu já disse que não!"
10143-560 = "Vamos deixar isso para quando\nestivermos completamente a sós."
10143-570 = "Oii!\nEu tava te esperando!"
10143-580 = "É a Shunzinha\ndo Sensei!"
10143-590 = "Sensei,\nbem-vindo de volta!"
10143-600 = "Ué? Tem certeza de\nque pode ser a Shunzinha...?"
10143-610 = "Fufu, por mim\ntudo bem a qualquer hora!"
10143-611 = "Ah, Sensei! Ehehe.\nEu tava te esperando!"
10143-612 = "Se você já terminou t-u-d-i-n-h-o\no que tinha pra fazer...\nVamos brincar!?"
10143-613 = "É claro...\nSó nós dois."
10143-620 = "Ehehe,\no que você acha?\nNão parece diferente?"
10143-630 = "Ué,\naconteceu alguma coisa?"
10143-640 = "Por acaso você... \nnão gosta da \"Shunzinha\"..."
10143-650 = "Não quer mais brincar comigo?"
10143-660 = "O tempo que eu passo com você,"
10143-670 = "É o momento em que sou mais feliz."
10143-680 = "Sabe por quê...?"
10143-690 = "Porque eu posso ser honesta\ncom os meus próprios sentimentos."
10143-700 = "Ter um corpo de criança\né muiitooo legal!"
10143-710 = "Acertou!\nIncrível!"
10143-720 = "Dá pra trocar isso por\num prêmio lá na frente!"
10143-730 = "Uau! Que demais!\nSensei, deixa eu ver\nmais de pertinho!"
10143-740 = "O que será\nque é isso...?\nCom certeza é algo muito legal!"
10143-750 = "O que será\nque é isso...?\nCom certeza é algo muito legal!"
10143-960 = "Bem, isso também faz\nparte da nossa inspeção."
10143-970 = "O que acha de darmos\numa olhada na agenda de hoje?"
10143-980 = "Pensar que o alvo da nossa inspeção\né um desfiladeiro tão lindo... "
10143-990 = "Me sinto até um pouco ansiosa."
10143-1000 = "Sensei, se não se importar,\ngostaria de comer algumas frutas?"
10143-1010 = "Para dar uma descansadinha...\nAqui está, pode pegar."
10143-1020 = "Bom trabalho hoje."
10143-1030 = "Parece que o pessoal\nestá preparando um\nmonte de coisas logo ali."
10143-1040 = "Sabe... o tempo do Sensei é,\nobviamente, apenas seu, mas..."
10143-1050 = "Só um pouquinho...\nMesmo que seja\npor um breve momento."
10143-1060 = "Às vezes, eu só queria\npoder passar um tempinho\nsozinha com você."
10143-1070 = "De vez em quando, as pessoas\nme dizem que eu sou um\npouquinho desastrada, mas..."
10143-1080 = "Às vezes, até isso\nacaba trazendo coisas boas."
10143-1090 = "Fufu. Sim."
10143-1100 = "Graças a isso, conseguimos\narrumar um tempinho para\nficarmos assim, não é?"