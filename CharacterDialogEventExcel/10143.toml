[translation]
10143-310 = "Мы пришли в это тайное местечко... \nХе-хе, ну и как тебе, \nСенсей?"
10143-320 = "Мне? \nВсё такое непривычное \nи весёлое."
10143-330 = "У тебя найдётся немного времени \nпозже...?"
10143-340 = "Да нет, ничего \nтакого важного."
10143-350 = "Просто... я хотела осмотреться здесь,"
10143-360 = "только вдвоём."
10143-370 = "Я так рада, что смогла отправиться в эту поездку \nс тобой и остальными... \nЯ так счастлива."
10143-380 = "Уверена, \nя никогда не забуду этот день, \nвовек..."
10143-390 = "Дети \nтакие чистые."
10143-400 = "Они впитывают гораздо больше, \nчем мы думаем."
10143-410 = "Вот почему мы должны \nнаправлять их \nкак следует."
10143-420 = "Прямо как то, что ты \nчувствуешь к нам, Сенсей."
10143-430 = "Надеюсь, ты \nчувствуешь то же самое."
10143-440 = "Спасибо за твой труд, Сенсей. \nДа... правда."
10143-450 = "Эм... если хочешь, \nможет, пойдём сейчас вместе...?"
10143-460 = "Насладимся \nнастоящим путешествием?"
10143-470 = "Ты сделал \nразминку как надо?"
10143-480 = "Когда заходишь в воду,"
10143-490 = "нужно сначала побрызгать на ноги, \nчтобы привыкнуть к температуре,\nа уже потом нырять."
10143-500 = "Да, \nя прямо здесь."
10143-510 = "Если тебе \nхолодно... \nя тебя согрею."
10143-520 = "Ой, только не там, \nСенсей...!"
10143-530 = "..."
10143-540 = "Совсем чуть-чуть, ладно...?"
10143-550 = "Ну же! Сенсей... \nНет, это плохо!"
10143-560 = "Давай оставим это \nна время, когда мы будем одни."
10143-570 = "Привет! \nЯ так ждала тебя!"
10143-580 = "Это же твоя \nШунлинг!"
10143-590 = "С возвращением, \nСенсей!"
10143-600 = "Хах? Правда можно, \nчтобы я была Шунлинг...?"
10143-610 = "Хе-хе, я всегда \nтолько за!"
10143-611 = "Ах, Сенсей! Ехехе. \nЯ так ждала тебя!"
10143-612 = "Если ты закончил \nсо всей работой... \nможет, пойдём поиграем?"
10143-613 = "Конечно... \nтолько вдвоём."
10143-620 = "Ехехе, \nну и как тебе? \nНепривычно?"
10143-630 = "Ой, \nчто-то случилось?"
10143-640 = "Может быть, \n«Шунлинг» это..."
10143-650 = "Ты не хочешь играть?"
10143-660 = "Когда я с тобой, Сенсей,"
10143-670 = "я счастливее всего."
10143-680 = "Потому что..."
10143-690 = "я могу быть честной \nсо своими чувствами."
10143-700 = "Быть в теле ребёнка — \nлучше всего!"
10143-710 = "У тебя получилось! \nЭто потрясающе!"
10143-720 = "Похоже, мы можем обменять \nэто на предметы вооон там!"
10143-730 = "Ого! Здорово! \nСенсей, покажи мне поближе!"
10143-740 = "Что же это вообще \nможет быть...? \nДолжно быть, что-то невероятное!"
10143-750 = "Что же это вообще \nможет быть...? \nДолжно быть, что-то невероятное!"
10143-960 = "К вашему сведению, это \nтоже часть инспекции."
10143-970 = "Давайте сверим \nсегодняшнее расписание?"
10143-980 = "Подумать только, что местом инспекции \nокажется такая красивая долина..."
10143-990 = "Я даже с нетерпением жду этого."
10143-1000 = "Сенсей, не хотите ли \nнемного фруктов?"
10143-1010 = "Пока у нас перерыв... \nВот, держите."
10143-1020 = "Спасибо за вашу тяжелую работу."
10143-1030 = "Похоже, там, на той стороне, \nготовят много всего разного."
10143-1040 = "Эм... ваше время, Сенсей, \nпринадлежит, конечно, \nтолько вам, но..."
10143-1050 = "Если бы хоть малая его часть... \nсовсем чуть-чуть \nдосталась мне."
10143-1060 = "Порой мне так хочется, \nчтобы мы могли провести его вместе."
10143-1070 = "Люди иногда говорят мне, \nчто я слишком опрометчива..."
10143-1080 = "Но временами \nэто играет мне на руку."
10143-1090 = "Хе-хе. Да."
10143-1100 = "Ведь это позволило нам \nвыкроить время, чтобы побыть \nвот так вместе."