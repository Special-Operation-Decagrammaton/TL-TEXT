[translation]
10131-300 = "É a primeira vez que venho\na Trinity……."
10131-310 = "Eu, eu farei o possível para\nnão causar nenhum\ninconveniente."
10131-320 = "Um lugar chamado Trinity—\ne as histórias que\nnascem aqui."
10131-330 = "Fufu, eu gostei muito\nde ambas as coisas."
10131-340 = "Embora…… tudo esteja\nindo bem demais,"
10131-350 = "o que acaba me deixando\num pouco inquieta……."
10131-360 = "Se isso fosse um ato de uma história,"
10131-370 = "é a partir de cenas como esta\nque surgem as reviravoltas."
10131-380 = "Como eu pensei……\neu sentia que isso aconteceria."
10131-390 = "Sim…… alguém como eu\nprecisa se manter firme……."
10131-400 = "Que bom……\nfoi realmente muito bom."
10131-410 = "Agradeço de coração,\nSensei."
10131-420 = "E também……\npeço desculpas, Sensei."
10131-430 = "Todos foram muito gentis\ncomigo, e isso me\ndeixou tranquila."
10131-440 = "……Mas, no fim das contas, eu\nnão passo de uma\nsimples aluna."
10131-450 = "Está me chamando, Sensei?"
10131-460 = "Eh?\nUma gargalhada?"
10131-470 = "Eu jamais faria algo tão\nindecente em um\nlugar como este!"
10131-480 = "……Se estivéssemos\nsós, aí a história\nseria outra."
10131-490 = "Por favor, pare de me\nprovocar desse jeito\ntantas vezes."
10131-500 = "Caso contrário—"
10131-510 = "Vou registrar cada detalhe\ndo comportamento do Sensei……"
10131-520 = "e escrever uma crítica\nsobre isso, viu?"
10131-530 = "“Hoje, o Sensei estava\nprovocando Takane Miyoshi\nnovamente”"
10131-540 = "“Decidi publicar este fato\npara todo o Kivotos”"
10131-550 = "Fufu. É isso mesmo, não é?\nFico feliz que tenha\nentendido."
10131-560 = "Aprofundar o conhecimento\nsignifica expandir a visão\ncom a qual vemos o mundo."
10131-570 = "Isso também significa\nexpandir o seu próprio\nmundo."
10131-580 = "Mas……\nenquanto pensava nisso,"
10131-590 = "de repente, fiquei curiosa."
10131-600 = "O mundo que o Sensei\nobserva,"
10131-610 = "que tipo de lugar\nseria exatamente……?"
10131-830 = "Mesmo estando em Trinity,\nnão devemos negligenciar as tarefas diárias."
10131-840 = "……Se eu me comportasse\ncomo bem entendesse,"
10131-850 = "eu acabaria me tornando\ncomo a minha chefe."
10131-860 = "Preparei uma lista de verificação."
10131-870 = "Não é nada demais,\nmas……"
10131-880 = "é quase a mesma coisa que\npensar na estrutura de\numa crítica."
10131-890 = "Uma história nada mais é\ndo que o acúmulo de\npequenos capítulos."
10131-900 = "No processo de escrita,"
10131-910 = "nem sempre as coisas são feitas\nna ordem da história."
10131-920 = "Mas, no sentido de que, no final,\nelas se unem em alguma forma"
10131-930 = "e são expressas—"
10131-940 = "talvez seja parecido com\ncumprir essas tarefas\ncom firmeza."
10131-950 = "As coisas repetitivas\ncostumam ser subestimadas."
10131-960 = "Porque, afinal,\nsão entediantes……?"
10131-970 = "Se você negligenciar\nos pequenos acúmulos,"
10131-980 = "acabará sendo pego\nde surpresa um dia."
10131-990 = "Um sermão gentil, não é……?"
10131-1000 = "E-eh……\neu sei que isso soa\ncomo um sermão."
10131-1010 = "Críticos, no fim das contas, não passam de\nreclamões que ficam\nprocurando pelo em ovo."
10131-1020 = "Nota máxima!\nExcelente trabalho!"
10131-1030 = "Para aqueles que completam\nsuas tarefas com sinceridade,"
10131-1040 = "é justo que recebam\numa recompensa."
10131-1050 = "Aqui, pegue isto.\nÉ do meu próprio bolso.\nFufu."
