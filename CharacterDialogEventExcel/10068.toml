[translation]
10068-70 = "あっ、先生！\nこっちですよ！"
10068-80 = "自警団の\nスーパーヒーロー！"
10068-90 = "宇沢レイサ、\nご挨拶申し上げます！"
10068-100 = "はい！\n宇沢レイサ、\n待機中です！"
10068-110 = "どうかしましたか？\nいつでも\nお声がけください！"
10068-120 = "事件ですか！？\nどこですか！？\n誰の事ですか！？"
10068-130 = "んん……\nじっとしているのが、\n一番、難しいです……。"
10068-340 = "あっ、先生！\nこっちですよ！"
10068-350 = "自警団の\nスーパーヒーロー！"
10068-360 = "宇沢レイサ、\nご挨拶申し上げます！"
10068-370 = "おおおっ！\n盛り上がって\nまいりました！"
10068-380 = "ラストスパート！です！"
10068-390 = "最後まで、\n駆けぬけましょう！"
10068-400 = "はい！\n宇沢レイサ、\n待機中です！"
10068-410 = "どうかしましたか？\nいつでも\nお声がけください！"
10068-420 = "事件ですか！？\nどこですか！？\n誰の事ですか！？"
10068-430 = "んん……\nじっとしているのが、\n一番、難しいです……。"
10068-440 = "パトロール中に集めた物です！先生もご覧になりますか？"
10068-450 = "この仕事をしていると、\n落とし物をよく\n見かけるんですよね……"
10068-460 = "無事持ち主が\n見つかるといいんですが"
10068-470 = "他に何か必要なものは\nありますか？\n確認してまいります！"
10068-480 = "うん？何かお探しですか？"
10068-490 = "それはここには\nないものでしょうか？"
10068-500 = "必要な物が\nありましたら何なりと！"
10068-510 = "すぐにお持ちしますので！"
10068-520 = "ほお、なるほどなるほど。"
10068-530 = "んむ！\nそれもいいですね。"
10068-540 = "お探しのものは、\nそちらでしたか！"
10068-550 = "はい、こちらです、\nどうぞー！"
10068-560 = "あっ！\nこんにちは、先生！"
10068-570 = "解決しなきゃいけない\n事件が山積みです！"
10068-580 = "リストをご用意しました！\n一緒にチェックしていきましょう！"
10068-590 = "うん……？先生？\nどうしました？"
10068-600 = "集中！\n作業に集中してください！"
10068-610 = "おおー！\nさすが先生です！"
10068-620 = "いいですね！順調です！！"
