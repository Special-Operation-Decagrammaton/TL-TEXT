[translation]
10103-10 = "Este intercâmbio, que coloca em jogo o prestígio tanto da Red Winter quanto de Shanhaijing..."
10103-20 = "Temos que fazer isso ser um sucesso, custe o que custar!"
10103-30 = "O que estou fazendo aqui, você pergunta?"
10103-40 = "Como pode ver, estou fazendo a escolta para proteger a Secretária-Geral, mas..."
10103-50 = "...E-ela sumiu!? Secretária-Geral Cherino!? Onde a senhora está!?"
10103-60 = "O que Shanhaijing está planejando, afinal? Nos tratar dessa maneira..."
10103-70 = "Não pense que isso vai ficar barato!"
10103-80 = "Permitir uma confusão na frente de estudantes de outras escolas..."
10103-90 = "Shanhaijing também passou vergonha, hein."
10103-100 = "Se fosse na nossa Academia Red Winter, jamais permitiríamos algo assim...!"
10103-110 = "...Ehem! Bem, isso é apenas um detalhe insignificante."
10103-120 = "Ufa... que cansaço..."
10103-130 = "Quem diria que um dia eu sentiria falta das planícies nevadas de Red Winter..."
10103-140 = "A cidade de Shanhaijing é como um labirinto..."
10103-150 = "Não é nada propícia para um ataque."
10103-160 = "Hah! Ter tanta dificuldade contra um simples clube."
10103-170 = "A Xuanlongmen também não é lá essas coisas."
10103-180 = "Para elevar a autoridade da nossa secretaria,"
10103-190 = "não importa que truques o adversário use, nunca devemos ser corrompidos e devemos nos manter firmes—"
10103-200 = "...Hm? Isso aqui?"
10103-210 = "É um bolinho chinês que ganhei da Associação Comercial Xuanwu."
10103-220 = "Ganhei óculos escuros do guarda da líder da escola."
10103-230 = "Tanto o estilo quanto a presença... aquilo não é de alguém comum..."
10103-240 = "Ouvi dizer que usar roupas íntimas por baixo do qipao é contra as regras, mas..."
10103-250 = "Será que isso está realmente certo?"
10103-260 = "Devemos respeitar os costumes das outras escolas, mas..."
10103-270 = "Não parece ser uma vestimenta adequada para um ataque..."
10103-520 = "O que deseja? Eu? Estava organizando as coisas para o intercâmbio."
10103-530 = "Se não se importar, poderia fazer uma doação de suprimentos?"
10103-540 = "Este intercâmbio acabou se tornando maior do que eu esperava."
10103-550 = "O intercâmbio já acabou, mas... doações de suprimentos são sempre bem-vindas."
10103-560 = "Já que estamos nisso, por que não estender a mão para as outras escolas?"
10103-570 = "(Essa máscara de ópera chinesa... olhando bem, é meio assustadora...)"
10103-580 = "Oh, este é um item magnífico."
10103-590 = "Com tudo isso, o sucesso do intercâmbio está garantido."
10103-600 = "Ei... Sensei. Não que eu esteja duvidando, mas... de onde exatamente você tirou tantos suprimentos...?"
10103-610 = "Maravilhoso! O nome do Sensei será lembrado em ambas as escolas!"
