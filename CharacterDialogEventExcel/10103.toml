[translation]
10103-10 = "レッドウィンターと\n山海経、両校の威信を\nかけたこの交流会…"
10103-20 = "なんとしてでも\n成功させなければ！"
10103-30 = "ここで何を\nしているのかって？"
10103-40 = "見ての通り、書記長の\n身を守るべく護衛を\nしているところだが――"
10103-50 = "…い、いない！？\nチェリノ書記長！？\nどちらに！？"
10103-60 = "山海経は一体何を\n企んでいるんだ？我々に\nこんな扱いをして…"
10103-70 = "ただで済むと思うな！"
10103-80 = "他校生の前で騒動を\n容認するだなんて。"
10103-90 = "山海経も、\n醜態を晒したな。"
10103-100 = "我々レッドウィンター\n連邦学園なら、\n断じてそんなことは…！"
10103-110 = "…ごほん！\nまあ、その程度、\n些細なことだ。"
10103-120 = "ふぅ…疲れた…"
10103-130 = "レッドウィンターの\n雪原が恋しくなる日が\nくるとは…。"
10103-140 = "山海経の街は\n迷路みたいだ…"
10103-150 = "突撃には不向きだな。"
10103-160 = "はっ！\nイチ部活相手に\n苦戦とは。"
10103-170 = "玄龍門も\n大したことないな。"
10103-180 = "我が事務局の権威を\n上げるためには、"
10103-190 = "相手がどんな手を\n使ってこようと決して\n懐柔されずどっしりと――"
10103-200 = "…うん？これか？"
10103-210 = "玄武商会からもらった\n中華まんだが。"
10103-220 = "門主のガードから\nサングラスをもらった。"
10103-230 = "格好といい、\n存在感といい、あれは…\n只者ではないぞ…"
10103-240 = "チーパオの下に\nインナーを履くのは\nルール違反だと\n聞いたが…"
10103-250 = "本当にこれで\nあっているのか？"
10103-260 = "他校のしきたりは\n尊重すべきだが…"
10103-270 = "突撃に適した服装では、\nないような…"
10103-520 = "何の用だ？私か？\n交流会用に片付けていたところだ。"
10103-530 = "よかったら物資の寄付を\n頼めるか？"
10103-540 = "今回の交流会、思ったより\n大規模になりそうでな。"
10103-550 = "交流会は終わったが…\n物資の寄付ならいつでも歓迎だ。"
10103-560 = "乗りかかった船だ。\n他校に手を貸そうではないか。"
10103-570 = "（京劇のお面…よく見ると、\nなんだか怖いな…）"
10103-580 = "おお、これは立派な品だ。"
10103-590 = "これだけあれば、交流会の成功は間違いないだろう。"
10103-600 = "あの…先生。疑ってるわけでは\nないんだが…これだけの\n物資を、一体どこから…？"
10103-610 = "素晴らしい！先生の名は、\n両校で語り継がれるだろう！"
