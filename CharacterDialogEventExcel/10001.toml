[translation]
10001-10130 = "Você voltou, Sensei.\nEstou feliz em te ver de novo."
10001-10140 = "Hau... estou com sono..."
10001-10150 = "Sobre esta roupa...\nSe eu não sinto frio?"
10001-10160 = "Hmm, como ela é bem ventilada,\neu gosto dela."
10001-10170 = "Esta roupa é fresca, mas\ncápsulas de munição costumam\nentrar nela, então..."
10001-10180 = "É um problema."
10001-10190 = "Foi mais rápido...\ndo que eu pensava."
10001-10200 = "Prova concluída."
