[translation]
10015-10 = "Qual será a missão\nde hoje?"
10015-20 = "Ah, a organização\nera responsabilidade\nda Aris..."
10015-30 = "Mesmo sem a armadura..."
10015-40 = "Mesmo que eu perca\na espada de luz..."
10015-50 = "Ainda assim,\na Aris continua sendo a Aris."
10015-60 = "Se todos estiverem\ncomigo... e também."
10015-70 = "Se o Sensei estiver comigo!"
10015-220 = "Sensei!\nÉ uma missão, uma missão!"
10015-230 = "Sim! A Aris adora o Sensei,\nque nunca muda!"
10015-240 = "Tan-tan-ta-ran!"
10015-250 = "O Sensei obteve uma recompensa!"
10015-260 = "Isso é incrível, Sensei!"
10015-270 = "Vamos continuar avançando\npasso a passo!"
