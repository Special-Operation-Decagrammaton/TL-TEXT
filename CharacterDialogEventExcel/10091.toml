10091-90 = "いらっしゃい、先生！"
10091-100 = "ちょっと練習\n手伝ってくれない？"
10091-110 = "あ、あ、ああぁー"
10091-120 = "……うわっ！？先生！？\nいつから……！"
10091-130 = "……ん？マイクに\n興味あるの？"
10091-140 = "先生も一曲、\n歌ってみる？"
10091-150 = "ん？何か必要なものでも？"
10091-160 = "もう……\nまたつついて……"
10091-170 = "今度こそ怒るよ？"
10091-180 = "ああ、もう！"
10091-190 = "用があるなら、\nちゃんと言葉にして！"
10091-200 = "ふぅ……。"
10091-210 = "先生、その……"
