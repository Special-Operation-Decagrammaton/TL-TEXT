[translation]
20015-10 = "百鬼夜行の映画村に\nようこそー！私が案内\nしてあげるね、先生！"
20015-20 = "あ、先生！\nなになに、これから\n映画村で遊ぶの？"
20015-30 = "じゃあ私も一緒に\n遊びたーい！"
20015-40 = "あ、でも\n今はダメなんだった……"
20015-50 = "今回修行部は、\nイベントを手伝う\n側なんだけど……"
20015-60 = "う～、私も遊びたい～！"
20015-70 = "ん、なに？\n相手を突っつく遊び？"
20015-80 = "ひひっ、\n私も負けないよーっ！\nそりゃ、とりゃぁっ！"
20015-90 = "こういうお手伝いも、\n修行の一環！……って\n分かってるんだけど、"
20015-100 = "退屈なものは\n退屈！"
20015-110 = "うーん、\n遊びに行きたい……"
20015-120 = "んーーーー……\n駄目、じっとしてるのは\nやっぱ退屈ー！"
20015-130 = "……あ、叫んだら\nちょっとスッキリした"
20015-140 = "ん、なに？\n相手を突っつく遊び？"
20015-150 = "ひひっ、\n私も負けないよーっ！\nそりゃ、とりゃぁっ！"
20015-160 = "こういうお手伝いも、\n修行の一環！……って\n分かってるんだけど、"
20015-170 = "退屈なものは\n退屈！"
20015-180 = "うーん、\n遊びに行きたい……"
20015-190 = "んーーーー……\n駄目、じっとしてるのは\nやっぱ退屈ー！"
20015-200 = "……あ、叫んだら\nちょっとスッキリした"
20015-720 = "ここではカードが\n引けるんだよ！\n早速どう、先生？"
20015-730 = "さあどうぞ！\n先生のターンだよ、\nドローして！"
20015-740 = "どうせだし、\nもう全部引いちゃえば？"
20015-750 = "こういう時ほど、\nレアカードが出そうだし！"
20015-760 = "わくわく、\n何が出るかな～？"
20015-770 = "せっかくなら\nレアカードが\n良いよね！"
20015-780 = "キラキラして綺麗だし、\nテンション上がる！"
20015-790 = "うぉー、これめっちゃ\nレアカードじゃん！"
20015-800 = "先生すごい、\nこれぞディスティニー！"
20015-810 = "あ、良いカードじゃん！\nなるほど、これが\n大人の力……"
20015-820 = "あ、良く見るやつだ。\nでも普通にレアカードだと\n思うよ！"
20015-830 = "えっと……\nが、ガッカリしないで、\n先生！"
20015-840 = "次はきっと、\n良いのが出るから！\n……多分"
