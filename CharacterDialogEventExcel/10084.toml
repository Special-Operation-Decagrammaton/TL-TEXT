10084-590 = "S-Sensei...\nSe não for incômodo..."
10084-600 = "Poderia me ajudar\ncom a montagem do acampamento?..."
10084-610 = "Ah, Sensei. Por instrução da vice-presidente, estou montando o acampamento."
