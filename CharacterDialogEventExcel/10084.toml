[translation]
10084-10 = "O vento está entrando\npelas frestas da roupa, então..."
10084-20 = "Acabo me encolhendo\ninvoluntariamente."
10084-30 = "Passar a virada do ano ao ar livre...\nfalta eficiência nisso."
10084-40 = "Silêncio e quietude...\nÉ o ambiente que eu\nmenos gosto..."
10084-50 = "A única vantagem é..."
10084-60 = "que a voz do Sensei pode ser ouvida\nclaramente, sem ruídos,\nnão é?"
10084-70 = "Este vento... parece um pouco... \nque está chorando."
10084-80 = "Buscando frequências...\nRegistros de comunicação\nem um raio de 3km..."
10084-90 = "0 registros."
