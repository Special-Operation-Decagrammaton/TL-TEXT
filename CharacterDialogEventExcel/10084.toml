[translation]
10084-10 = "服に隙間風が\n入ってくるので…"
10084-20 = "つい身体を\n丸めてしまいます。"
10084-30 = "わざわざ外で\n年越しするなんて…\n効率性に欠けます。"
10084-40 = "沈黙と静寂…\n私が最も苦手と\nする環境です…。"
10084-50 = "唯一の利点は…"
10084-60 = "先生の声が雑音なく\nはっきり聴こえること、\nでしょうか。"
10084-70 = "この風…少し…\n泣いているような。"
10084-80 = "周波数検索中…\n半径3km内の\n通信記録は…"
10084-90 = "0件。"
10084-100 = "沈黙と静寂…\n私が最も苦手と\nする環境です…。"
10084-110 = "唯一の利点は…"
10084-120 = "先生の声が雑音なく\nはっきり聴こえること、\nでしょうか。"
10084-130 = "この風…少し…\n泣いているような。"
10084-140 = "周波数検索中…\n半径3km内の\n通信記録は…"
10084-150 = "0件。"
10084-590 = "せ、先生…\nもしよろしければ…"
10084-600 = "キャンプの設営にご協力、\nいただけますでしょうか…。"
10084-610 = "あ、先生。副部長の指示で、\nキャンプの設営をしているところです。"
10084-620 = "たしか「超カンタン設営」の\nキャンプ装備、と\n聞いていたのですが…"
10084-630 = "設置は全然簡単じゃ\nなかったような…"
10084-640 = "何か仰りたい事が…？"
10084-650 = "少々お待ちください、\n録音の準備をしますので。"
10084-660 = "なるほど、参考にします。"
10084-670 = "今の、もう一度\n見せていただけますか？"
10084-680 = "できれば、口頭での解説も\n一緒に、お願いします。"
10084-690 = "これなら、今晩は\n快適に過ごせるかと。"
