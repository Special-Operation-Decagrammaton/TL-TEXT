[translation]
10023-140 = "やぁ、先生。\n夏合宿に必要なものなら、\nだいたい何でも揃ってるよ。"
10023-150 = "ヒナ委員長の忙しさに比べたら、\nこれくらい大したことじゃない。"
10023-160 = "うん、\n良いんじゃない？"
10023-170 = "へえ、気前が良いね。\n先生。"
10023-180 = "ゲヘナの校章が入った\n箱を拾ったら、渡して。\n色んなものと交換できるよ。"
10023-190 = "合宿期間も残り半分。\n必要なものがあるなら\n急いだ方が良い。"
10023-200 = "合宿期間もあと少しだ。\n何か必要なら\n早めに言って。"
10023-210 = "今日で最終日か。本当に\n目まぐるしいバカン……"
10023-220 = "いや、合宿だった。"
10023-230 = "さ、もう夏も終わりだよ。\n何かやり残したことはないか、\nちゃんと確認しておいて。"
10023-240 = "……なんでこっちを\nじっと見てるんだ？"
10023-250 = "タダでは\nあげられないからな。"
10023-260 = "へえ……\nそんなものがあったのか。\n先生は運が良いね。"
