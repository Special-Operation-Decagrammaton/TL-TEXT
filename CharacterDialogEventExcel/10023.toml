[translation]
10023-140 = "Olá, Sensei. Se precisa de algo para o acampamento de verão, eu tenho praticamente tudo o que é necessário."
10023-150 = "Comparado à correria da Presidente Hina, isso não é nada demais."
10023-160 = "Sim, não está bom?"
10023-170 = "Hee, você é generoso, Sensei."
10023-180 = "Se encontrar caixas com o emblema da Gehenna, me entregue. Você pode trocá-las por várias coisas."
10023-190 = "Metade do período do acampamento já passou. Se precisar de algo, é melhor se apressar."
10023-200 = "O período do acampamento está quase acabando. Se precisar de algo, me avise logo."
10023-210 = "Hoje é o último dia. Foi uma férias realmente agitada..."
10023-220 = "Não, era um acampamento."
10023-230 = "Bem, o verão já está acabando. Verifique se não deixou nada pendente."
10023-240 = "...Por que está me encarando assim?"
10023-250 = "Eu não posso te dar de graça, sabe."
10023-260 = "Hee... Então era isso. Você tem sorte, Sensei."
