[translation]
10104-10 = "Bem-vindo, Sensei.\nEm breve, o Festival do Luar\nterá início."
10104-20 = "Obrigada por\nvir até aqui."
10104-30 = "Por favor, aproveite o Festival do Luar,\no orgulho de Shanhaijing."
10104-40 = "É uma situação inesperada, mas..."
10104-50 = "Para a Genryumon, a Associação Genbu,\ne para Shanhaijing..."
10104-60 = "A presença do Sensei é um\ngrande incentivo."
10104-70 = "Conseguimos realizar o Festival do Luar\nsem problemas."
10104-80 = "…Vamos deixar aquele tumulto\nde lado por enquanto."
10104-90 = "O que achou\ndo festival?"
10104-100 = "Shanhaijing e a Associação Genbu\nestão sempre esperando\npela sua visita, Sensei."
10104-110 = "O Festival do Luar é, de fato,\na hora da Associação Genbu\nmostrar do que é capaz."
10104-120 = "Sensei, por favor, fique à vontade."
10104-130 = "…Para brincadeiras, eu respondo\ncom a linguagem corporal."
10104-140 = "É brincadeira, Sensei.\nSe for para brincar,\npode fazer o quanto quiser."
10104-150 = "…Mas se for frequente demais,\neu fico em apuros.\nEntão, com moderação."
10104-160 = "O que foi, Sensei?"
10104-170 = "…Eh?\nSó me chamou…?"
10104-180 = "…Se você continuar tentando chamar a atenção\nrepetidamente, uma hora\nninguém vai acreditar em você, sabia?"
10104-190 = "…Eu sempre acreditarei\nem você, Sensei."
10104-200 = "E-eu não faço cócegas,\né da minha natureza."
10104-210 = "É, é verdade.\nNão adianta tentar,\nentão, pare…!"
10104-220 = "Ah, hahahahaha!"
10104-230 = "…Já chega, por favor."
10104-450 = "Sou boa em cuidar da loja."
10104-460 = "Bem… o que você está\nprocurando hoje?"
10104-470 = "Se nos chamar,\na Associação Genbu irá a qualquer lugar."
10104-480 = "…Quem sabe, até os confins\nde Kivotos!"
10104-490 = "Esqueceu de comprar algo?"
10104-500 = "Para não se arrepender, por favor, olhe\ncom calma até o final."
10104-510 = "Itens secretos da Associação Genbu?\nMenu escondido…?"
10104-520 = "Bem…\nNão temos nada disso…"
10104-530 = "Mesmo que me olhe assim…"
10104-540 = "Se precisar de algo que não temos,\npor favor, me avise."
10104-550 = "…Não há nada que eu possa fazer\nsobre o que já esgotou."
10104-560 = "Sim, este é um\nitem que eu recomendo."
10104-570 = "É para uso pessoal?\nOu para presente?"
10104-580 = "Obrigada pela preferência!"
10104-590 = "…É uma frase que digo sempre, mas\nquando é com o Sensei, parece algo novo."
10104-600 = "A presidente costumava dizer."
10104-610 = "Se algo é dado de graça,\nisso significa que você mesmo\nse tornou o produto."
10104-620 = "Mas se o Sensei\nfosse o produto…"
10104-630 = "Ah, não,\nnão é nada."
