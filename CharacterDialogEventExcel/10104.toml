[translation]
10104-10 = "ようこそ、先生。\nまもなく、月影祭が\n開催されます。"
10104-20 = "来てくださって\nありがとうございます。"
10104-30 = "山海経が誇る月影祭を\nご堪能ください。"
10104-40 = "予想外の状況ですが…"
10104-50 = "玄龍門、玄武商会、\nそして山海経にとって…"
10104-60 = "先生の存在はとても\n励みになります。"
10104-70 = "無事、月影祭を開催する\nことができました。"
10104-80 = "…あの騒動は、一旦、\n気にしないで\nおきましょう。"
10104-90 = "お祭りは\nいかがでしたか？"
10104-100 = "山海経と玄武商会は、\nいつでも先生のお越しを\nお待ちしております。"
10104-110 = "月影祭こそ、\n玄武商会の\n腕の見せ所です。"
10104-120 = "先生はゆっくり\nなさってください。"
10104-130 = "…イタズラには、\n肉体言語で\nお返ししますよ。"
10104-140 = "冗談です、先生。\nイタズラでしたら、\nいくらでも。"
10104-150 = "…あまり頻繁だと\n困りますので。\nほどほどに。"
10104-160 = "なんでしょうか、先生？"
10104-170 = "…え？\n呼んでみただけ…？"
10104-180 = "…何度も気を\n引き続けたら、そのうち、\n誰にも信じてもらえなく\nなりますよ？"
10104-190 = "…私はいつまでも、\n先生を信じますが。"
10104-200 = "わ、私は、くすぐっても\n効かない体質ですので。"
10104-210 = "ほ、本当です。\nやっても無駄ですから、\nだから、やめ…！"
10104-220 = "あ、ははははは！"
10104-230 = "…もう、やめて\nくださいってば。"
10104-450 = "店番は得意な方です。"
10104-460 = "さて…今日は何を\nお探しですか？"
10104-470 = "お声掛けいただければ\nどこでも、玄武商会は参ります。"
10104-480 = "…いつかは、キヴォトスの\n果てまでも！"
10104-490 = "買い逃しはありませんか？"
10104-500 = "後悔のないよう、どうぞ最後まで\nゆっくりとご覧ください。"
10104-510 = "玄武商会の秘蔵品？\n隠しメニュー…？"
10104-520 = "えっと…\nそんなものはないのですが…"
10104-530 = "そんな顔をされましても…"
10104-540 = "足りないものがありましたら、\nおっしゃってください。"
10104-550 = "…売り切れてしまったものは\nどうしようもないのですが。"
10104-560 = "はい、私の\nオススメの品ですね。"
10104-570 = "こちら、ご自宅用ですか？\nプレゼント用ですか？"
10104-580 = "毎度ありがとうございます！"
10104-590 = "…いつも口にしている言葉なのに\n先生相手だとなんだか新鮮ですね。"
10104-600 = "会長はおっしゃっていました。"
10104-610 = "何かが無償で与えられたのなら、\n それはすなわち、自身が商品に\nなっていることを意味すると。"
10104-620 = "ですがもし先生が\n商品なのでしたら…"
10104-630 = "あ、いえ、\nなんでもありません。"
