[translation]
26015-840 = "あ～あ……早速、\n雲行き怪しいっすね～"
26015-850 = "ま、なんとか\nなるんじゃないっすか？"
26015-860 = "先生もいるっすから。"
26015-870 = "こんな風に海に\nくることになるとは\n思わなかったっす。"
26015-880 = "何が起きるかなんて、\n分からないもんっすね～"
26015-890 = "ミカ様……"
26015-900 = "なんか思ってたのと\n違ったんすよね～"
26015-910 = "もちろん、\nいい意味で！っすよ？"
26015-920 = "海に来た感想っすか？"
26015-930 = "そうっすね……。"
26015-940 = "ちょっとだけ、海が\n嫌いになったかもっす！\nあはは！"
26015-950 = "もう帰る時間っすか。"
26015-960 = "名残惜し――"
26015-970 = "――くはないっすね。"
26015-980 = "あー！仕事終わり！\nやっと解放！って\n感じっす！"
26015-990 = "波の音に、\nカモメの鳴き声、\n潮の香り……。"
26015-1000 = "海に来てるって、\n実感が湧くっす。"
26015-1010 = "はは、みんな\n浮かれてるっすね～"
26015-1020 = "私もああやって\n楽しめたら、\nよかったんすけど。"
26015-1030 = "先生、ここは\n異常なしっす～"
26015-1040 = "やっぱ、\n何事もないのが\n一番っすよね。"
26015-1050 = "あの、先生？\n私といても、\n退屈するだけっすよ？"
26015-1060 = "私は……\n先生といられて、\n好都合っすけど。"
26015-1330 = "先生！もしかして、\n手伝いにきてくれたんすか？"
26015-1340 = "いや～ちょっと\n行き詰ってたんで……\n助かるっす～"
26015-1350 = "はは、もーめちゃくちゃ……"
26015-1360 = "あ、先生、どうもっす。"
26015-1370 = "早速で悪いんすけど、\n手伝ってもらえないっすか……？"
26015-1380 = "これも人助けだと思って！"
26015-1390 = "はぁ……\nやることてんこ盛りっすね……。"
26015-1400 = "ま、眺めてても仕方ないし、\nやってりゃいつか終わるっすよね。"
26015-1410 = "……先生の気持ち、\nよ～く分かるっす。"
26015-1420 = "山積みの仕事からは、目を\nそらしたくなるっすよね……。"
26015-1430 = "これで一個片付いたっすね～\nお疲れ様っす～"
26015-1440 = "先生って結構\n要領いいっすよね～"
26015-1450 = "あ……今のは皮肉じゃなくて、\n本心っすよ。"
