[translation]
26015-840 = "Ah... nossa... as coisas já estão\nficando estranhas, né?"
26015-850 = "Bem, acho que vai\ndar tudo certo, não vai?"
26015-860 = "Afinal, o Sensei está aqui."
26015-870 = "Eu nunca imaginei que acabaríamos\nvindo para o mar desse jeito."
26015-880 = "A gente nunca sabe o que\npode acontecer, né?"
26015-890 = "Mika-sama..."
26015-900 = "As coisas acabaram sendo\ndiferentes do que eu pensava."
26015-910 = "Claro, no bom sentido!\nEntende?"
26015-920 = "Minha impressão sobre vir à praia?"
26015-930 = "Deixa eu ver..."
26015-940 = "Talvez eu tenha passado a\nodiar um pouquinho o mar!\nAhaha!"
26015-950 = "Já está na hora de ir embora?"
26015-960 = "Não é como se eu estivesse\ncom saudades..."
26015-970 = "—de jeito nenhum."
26015-980 = "Ah! Trabalho terminado!\nFinalmente livre! É essa\na sensação!"
26015-990 = "O som das ondas,\no grito das gaivotas,\no cheiro da maresia..."
26015-1000 = "Dá para sentir de verdade\nque estamos na praia."
26015-1010 = "Haha, todo mundo está\nanimado, né?"
26015-1020 = "Eu queria ter conseguido\naproveitar como eles."
26015-1030 = "Sensei, aqui está\ntudo sob controle."
26015-1040 = "No fim das contas, não ter\nproblemas é o melhor, né?"
26015-1050 = "Ei, Sensei? Ficar comigo\nsó vai te deixar entediado, sabe?"
26015-1060 = "Eu... fico feliz em\npoder estar com você, no entanto."
26015-1330 = "Sensei! Por acaso você veio\naqui para me ajudar?"
26015-1340 = "Nossa, eu estava meio\nempacada... isso ajuda muito!"
26015-1350 = "Haha, nossa, que bagunça..."
26015-1360 = "Ah, Sensei, olá."
26015-1370 = "Desculpe pedir logo de cara, mas\nserá que você poderia me ajudar...?"
26015-1380 = "Considere isso como uma boa ação!"
26015-1390 = "Haa... tem tanta coisa\npara fazer..."
26015-1400 = "Bem, não adianta ficar olhando, se a gente\ncomeçar, uma hora termina."
26015-1410 = "...Eu entendo perfeitamente\no que você sente, Sensei."
26015-1420 = "Dá vontade de desviar o olhar\ndessa pilha de trabalho, né..."
26015-1430 = "Conseguimos terminar uma coisa!\nBom trabalho para nós."
26015-1440 = "Você é bem eficiente\ncom as coisas, Sensei."
26015-1450 = "Ah... isso não foi sarcasmo,\nfoi um elogio sincero."
