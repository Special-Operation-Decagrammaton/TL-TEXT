[translation]
10121-10 = "Veja só, Sensei!\nÉ o mar, o mar!"
10121-20 = "Fufun~♪ O azul entra~\nna água e flui~"
10121-30 = "É exatamente o mar!"
10121-40 = "Quem diria que chegaria o dia\nem que eu competiria no mesmo\npalco que as veteranas..."
10121-50 = "Ma-mas, como uma elite da\nHyakkaryouran e a estrela\nda esperança, eu..."
10121-60 = "Não posso simplesmente\nrecuar tão facilmente!"
10121-70 = "O tão esperado...\nClímax!\nÉ isso!"
10121-80 = "O-o que eu faço, Sensei!\nEstou tão nervosa que\nminhas mãos estão tremendo!"
10121-90 = "Sinto que, nesse curto período,\na atmosfera das veteranas\nmudou."
10121-100 = "Mas todas elas estão\nmais radiantes do que\njamais estiveram!"
10121-110 = "...A veterana Kikyou e a\nveterana Renge se conhecem\nhá muito tempo."
10121-120 = "O que chamam de\namigas de infância."
10121-130 = "Tenho certeza de que as duas,"
10121-140 = "devem ter muitas memórias\nque eu desconheço."
10121-150 = "Pensando nisso,\nsinto-me um pouco\nmelancólica..."
10121-160 = "Sensei? Por que está\nolhando tão fixamente...?"
10121-170 = "Se quiser, por que não\nvai passear comigo!?"
10121-180 = "Fufu, Sensei, você é\nmesmo um brincalhão."
10121-190 = "Se você diz que quer\nobservar, eu irei\nacompanhá-lo."
10121-200 = "Parece que todas estão\nacostumadas com o mar."
10121-210 = "Será que sou a única\niniciante no mar\n...por acaso!?"
10121-460 = "Uau! Tem tantas coisas\nmaravilhosas aqui!"
10121-470 = "Sensei, por qual\nvocê quer começar?"
10121-480 = "É tão colorido que não\nme canso de olhar!\nMeu coração está disparado~!"
10121-490 = "Ah... o tempo divertido\npassa rápido demais..."
10121-500 = "Mas, antes de ir embora,\nvou espantar toda essa\ntristeza!"
10121-510 = "Eu também sei! Isso é\nwindow shopping,\nnão é!"
10121-520 = "Fufu, não se preocupe.\nEu estarei sempre ao seu lado."
10121-530 = "Uau!\nEu também quero ver de perto!"
10121-540 = "Hum, então esse é o seu\ngosto, Sensei?"
10121-550 = "Você tem um ótimo olhar! É isso mesmo♪"
10121-560 = "Fun-fufun~\nO que eu deveria escolher~♪"
