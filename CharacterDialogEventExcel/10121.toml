[translation]
10121-10 = "ご覧ください先生！\n海ですの、海っ！"
10121-20 = "ふふん～♪蒼は～\n水に入りて流るる～"
10121-30 = "まさに、海！ですの！"
10121-40 = "先輩方と同じ\n舞台で競う日が\n来るなんて……。"
10121-50 = "で、でもこの百花繚乱の\nえり～とであり、\n希望の星である身共は！"
10121-60 = "そう簡単に引き下がる\nわけには参りませんわ！"
10121-70 = "待望の……\nくらいまっくす！\nですの！"
10121-80 = "ど、どうしましょう先生！\n身共、あまりの緊張に\n手が震えてきましたの！"
10121-90 = "この短い期間で、先輩方の\n雰囲気が変わったように\n感じますわ。"
10121-100 = "しかし皆さん、\nどんな時よりも\n輝いておりますの！"
10121-110 = "……キキョウ先輩と\nレンゲ先輩は昔からの\n知り合いなのです。"
10121-120 = "幼馴染、\nというやつですわ。"
10121-130 = "お二人にはきっと、"
10121-140 = "身共の知らない\n思い出がたくさん\nあるのでしょうね。"
10121-150 = "そう考えると、\nなんだか少しさみしい\n気がします……。"
10121-160 = "先生？どうして\nそんなにじっと……？"
10121-170 = "よかったら、身共と\n遊びに行きませんか！？"
10121-180 = "ふふっ、\n先生ったらもう。"
10121-190 = "見学したいと\n仰るのなら、\n身共もご一緒しますわ。"
10121-200 = "皆さんなんだか、\n海に慣れている\nみたいですの。"
10121-210 = "もしかして身共だけ、\n海びぎなー\n……でしょうか！？"
10121-460 = "わあ！不思議な物が\nいっぱいありますの！"
10121-470 = "先生、\nどれからご覧になりますか？"
10121-480 = "彩り豊かで見ていて\n飽きませんわ！\nドキドキしますの～！"
10121-490 = "あぁ……楽しい時間は\nあっという間ですの……"
10121-500 = "でも、しょんぼりした\n気持ちは、帰る前に全部\n振り払ってしまいますわ！"
10121-510 = "身共も知っています！\nこれがうぃんどーしょっぴんぐ、\nですの！"
10121-520 = "ふふっ、心配はいりません。\n身共はいつも傍におりますわ。"
10121-530 = "わあっ！\n身共も近くで見たいですわ！"
10121-540 = "ふむ、先生はそのような\nご趣味なのですね？"
10121-550 = "お目が高いっ！ですわ♪"
10121-560 = "ふんふふん～\n何にしようかな～♪"
