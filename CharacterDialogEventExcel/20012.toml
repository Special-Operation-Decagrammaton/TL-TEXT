[translation]
20012-170 = "Bom trabalho, Sensei."
20012-180 = "Se precisar de algo,\npode me chamar a qualquer momento."
20012-190 = "……O local está bem agitado. Talvez seja melhor\nnós nos prepararmos."
20012-200 = "Pensei que haveria trabalho de pós-processamento,\nentão fiquei por aqui."
20012-210 = "Se precisar de algo,\npode me chamar a qualquer momento."
20012-220 = "……Só por precaução.\nEu não sou um produto, sabe."
20012-230 = "Sinto muito, mas\npor causa das regras,\nnão posso lhe dar de graça."
20012-240 = "Não é uma má decisão."
20012-250 = "Parece ser uma boa ideia."
20012-260 = "Vou preparar imediatamente."
20012-270 = "Sim, então\npor favor, aguarde um momento."
20012-280 = "Bom trabalho, Sensei.\nAqui está a lista de tarefas,\nconto com você."
20012-290 = "Aqui está o status do progresso do trabalho.\nPor favor, verifique."
20012-300 = "……Sensei?\nPor favor, concentre-se no trabalho."
20012-310 = "……Sinto muito, mas eu não posso\nfazer o trabalho por você."
20012-320 = "Sim, verificado."
20012-330 = "Parece que você terminou sem problemas."
