[translation]
20012-170 = "お疲れ様です、先生。"
20012-180 = "何かありましたら\nいつでも声をかけてください。"
20012-190 = "……騒がしい現場ですね。準備を\nしておいた方が良いかもしれません。"
20012-200 = "事後処理が発生するのではと思い、\nここに残っておりました。"
20012-210 = "何かありましたら\nいつでもお声がけください。"
20012-220 = "……念のため、ですが。\n私は商品ではありませんので。"
20012-230 = "申し訳ありませんが\n規則ですので、無料で\n差し上げるわけにはいきません。"
20012-240 = "悪くない判断です。"
20012-250 = "それが良さそうですね。"
20012-260 = "すぐに用意します。"
20012-270 = "はい、では\n少々お待ちください。"
20012-280 = "お疲れ様です、先生。\nこちらお仕事のリストですので、\nよろしくお願いします。"
20012-290 = "こちら、お仕事の進捗状況です。\nご確認をお願いします。"
20012-300 = "……先生？\nお仕事に集中してください。"
20012-310 = "……すみませんが、私が\nお仕事を肩代わりすることは\nできませんので。"
20012-320 = "はい、確認しました。"
20012-330 = "問題なく終えられたようですね。"
