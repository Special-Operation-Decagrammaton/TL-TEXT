[translation]
20045-360 = "Добро пожаловать в~\nHyakkiyako!"
20045-370 = "Доброе пожаловать в Hyakkiyako!\nМы так рады, что вы пришли!"
20045-380 = "Та-да!\nПредоставьте экскурсию\nмне! Да!"
20045-390 = "Пожалуйста, будь осторожнее,\nчтобы не потеряться!"
20045-400 = "Когда Сенсей рядом,\nстановится так оживлённо и весело!"
20045-410 = "Все выглядят так, будто им весело,\nи это делает Пину тоже счастливой!"