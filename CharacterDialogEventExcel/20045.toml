[translation]
20045-360 = "Welcome to～\n百鬼夜行！"
20045-370 = "百鬼夜行へ、ようこそ\nいらっしゃいマシタッ！"
20045-380 = "ジャーン！\nガイドは\nお任せあれ！デス！"
20045-390 = "迷子にならないように\n気をつけてクダサイね！"
20045-400 = "先生がいると、\n賑やかで楽しいデス！"
20045-410 = "みんなが楽しそうで、\nフィーナも嬉しいデス！"
20045-920 = "Bem-vindo a～\nHyakkiyako!"
20045-930 = "Bem-vindo a Hyakkiyako,\nque bom que você veio!"
20045-940 = "Sensei!\nEstá se divertindo?"
20045-950 = "Já estou bem acostumada\ncom o guia!\nVou dar o meu melhor até o fim!"
20045-960 = "Quando vier a Hyakkiyako\nnovamente,\npor favor, chame\na Pina!"
20045-970 = "Tcharam!\nDeixe o guia\ncomigo! É isso!"
20045-980 = "Tome cuidado para\nnão se perder, viu!"
20045-990 = "Com o Sensei aqui,\nfica tudo mais animado e divertido!"
20045-1000 = "Todo mundo parece feliz,\ne a Pina também fica feliz!"
