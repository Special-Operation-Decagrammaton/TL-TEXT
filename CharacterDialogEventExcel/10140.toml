[translation]
10140-120 = "«Operação Rastreio das Lores Ocultas»\n……Finalmente chegou a hora."
10140-130 = "Vou esmagar com força letal total――\nNão vou deixar\nque sujem a placa da SRT de lama de novo!"
10140-140 = "Antes que a contagem de\ncorpos orgânicos suba..."
10140-150 = "Acelera a marcha, Sensei.\nNão me atrasa!"
10140-160 = "Devorar Inarizushi\nno meio do tiroteio tático...\né um tesão absurdo."
10140-170 = "E-Ei, não me olha assim!\nMesmo sem o sushi de suborno,\neu ainda massacro o alvo, ouviu bem?!"
10140-180 = "Seja assombração ou demônio orgânico...\nEu vou socar a baioneta na fuça\ne quebrar no meio!"
10140-190 = "HIIIE?!\nPor que diabos sua mão tá apalpando\na minha barriga do nada?!\nTira a mão daí, sádico!!"
10140-400 = "Maldição...\no que eu faço com isso?"
10140-410 = "Opa, Sensei!\nO seu radar apitou na\nhora perfeita pra mim!"
10140-420 = "Tô empilhando o lixo de pistas\nque a gente peneirou nas vielas.\nEmpresta o seu cérebro pra cruzar os dados comigo?"
10140-430 = "Demorou, Comandante.\nBota a cabeça pra fritar,\nhora de engatilhar a dedução letal!"
10140-440 = "Cruzando os laudos orgânicos atuais...\na tese dita que..."
10140-450 = "EI! TIRA OS DEDOS DAÍ!\nEu já alinhei a porra das provas!\nVai bagunçar o tabuleiro, inútil!"
10140-460 = "Esse dossiê sujo...\nO meu HD bate que eu já escaneei isso\nem algum lugar..."
10140-470 = "Caralho, genial!\nA sua dedução atômica\ncravou no alvo perfeito!"
10140-480 = "Xeque-mate!\nA autópsia tá cravada e comprovada!"