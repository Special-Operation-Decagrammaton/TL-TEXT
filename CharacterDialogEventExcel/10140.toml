[translation]
10140-120 = "Operation Roar Pursuit.\n...It's finally time."
10140-130 = "I'm going all out—\nI won't let anyone\ntarnish the SRT name!"
10140-140 = "Before the damage spreads..."
10140-150 = "We need to hurry, Sensei."
10140-160 = "Inari sushi while\non a mission...\nIt's the best."
10140-170 = "O-of course,\nI'd still do the mission\nproperly without it!"
10140-180 = "Ghost or whatever else,\nI won't let you\ndo as you please!"
10140-190 = "Hey!\nDon't just go touching\npeople's stomachs like that!?"
10140-400 = "What should I do..."
10140-410 = "Oh, Sensei!\nYou came at the\nperfect time!"
10140-420 = "I'm organizing the clues\nwe've gathered, but\ncould you help me\nout a little?"
10140-430 = "You're here, Sensei.\nLet's start the deduction!"
10140-440 = "Based on the current\ninformation..."
10140-450 = "Hey! Don't touch that!\nI'm trying to\norganize them properly!"
10140-460 = "I feel like I've seen\nthis document somewhere..."
10140-470 = "That's amazing!\nYour deduction was perfect!"
10140-480 = "Alright!\nProof complete!"