[translation]
10140-120 = "「Operação de Rastreamento do Roa」\n……Finalmente chegou a hora."
10140-130 = "Vou com tudo —\nNão posso manchar\no nome da SRT!"
10140-140 = "Antes que os danos aumentem..."
10140-150 = "Vamos nos apressar, Sensei."
10140-160 = "Comer Inari Sushi\ndurante a operação……\né o máximo."
10140-170 = "C-claro que, mesmo sem isso,\neu farei a operação\ncomo deve ser!"
10140-180 = "Seja um fantasma\nou o que for,\nnão vou deixar fazerem o que quiserem!"
10140-190 = "Ei!\nNão toque na barriga\ndos outros de repente!?"
10140-400 = "O que eu faço……."
10140-410 = "Ah, Sensei!\nQue bom que você\nveio na hora certa!"
10140-420 = "Estou organizando as pistas\nque coletei, mas\npoderia me dar\numa mãozinha?"
10140-430 = "Você chegou, Sensei.\nVamos começar a dedução!"
10140-440 = "Com as informações atuais,\no que podemos entender é……."
10140-450 = "Ah! Não toque nisso!\nEstou organizando\ndo jeito certo!"
10140-460 = "Este documento, parece que\neu já vi em algum lugar……."
10140-470 = "Incrível!\nFoi uma dedução perfeita!"
10140-480 = "Isso!\nProva concluída!"
