[translation]
10140-120 = "「ロア追跡作戦」\n……いよいよね。"
10140-130 = "全力で行くわ――\nSRTの名に\n泥を塗れないもの！"
10140-140 = "被害が増える前に……"
10140-150 = "急ぐわよ、先生。"
10140-160 = "作戦中に食べる\nいなり寿司……最高。"
10140-170 = "も、もちろん、\nそれがなくても\n作戦はちゃんとやるわよ！"
10140-180 = "お化けだろうが\nなんだろうが、\n好きにはさせないわ！"
10140-190 = "ちょっと！\n急に人のお腹\n触らないでよ！？"
10140-400 = "どうしよう……。"
10140-410 = "あ、先生！\nいいところに\n来たじゃない！"
10140-420 = "集めた手がかりを\nまとめてるんだけど、\nちょっと\n手伝ってくれない？"
10140-430 = "来たわね、先生。\n推理をはじめていくわよ！"
10140-440 = "今の情報で\n分かることは……。"
10140-450 = "あっ！触らないでよ！\nちゃんと\n並び替えてるんだから！"
10140-460 = "この資料、どこかで\n見たことあるような……。"
10140-470 = "すごいじゃない！\n完璧な推理だったわ！"
10140-480 = "よし！\n証明完了よ！"
