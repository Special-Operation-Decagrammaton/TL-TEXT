[translation]
10140-120 = "Операция Roar Pursuit.\n...Наконец-то время пришло."
10140-130 = "Я выложусь на полную —\nи не позволю никому\nзапятнать имя SRT!"
10140-140 = "Пока ущерб не разросся..."
10140-150 = "Нам нужно поторопиться, Сенсей."
10140-160 = "Инари-суши во время\nмиссии...\nЭто лучшее, что может быть."
10140-170 = "К-конечно же,\nя бы всё равно выполнила\nмиссию как надо и без них!"
10140-180 = "Призрак там или кто угодно ещё,\nя не позволю тебе\nделать всё, что вздумается!"
10140-190 = "Эй!\nНе надо вот так просто\nтрогать людей за живот!?"
10140-400 = "Что же мне делать..."
10140-410 = "О, Сенсей!\nТы пришёл как раз\nвовремя!"
10140-420 = "Я тут разбираю собранные\nулики, не мог бы ты мне\nнемного помочь?"
10140-430 = "Ты здесь, Сенсей.\nДавай начнём расследование!"
10140-440 = "Основываясь на текущей\nинформации..."
10140-450 = "Эй! Не трогай это!\nЯ пытаюсь разложить всё\nкак следует!"
10140-460 = "Мне кажется, я уже видела\nэтот документ где-то..."
10140-470 = "Это потрясающе!\nТвои выводы были идеальны!"
10140-480 = "Отлично!\nДоказательство завершено!"