[translation]
16018-810 = "ねぇ先生、\nこれって何かわかる？"
16018-820 = "……自販機、\nに見えるんだけど。"
16018-830 = "専用のやつしか\n使えないみたいね。"
16018-840 = "まあ、これにしか\n使わないだろうし……\n試しに一回\n入れてみなさいよ。"
16018-850 = "あら、閉店時間みたい。\n残ってるやつは\n全部使っちゃいましょ。"
16018-860 = "横に貼ってあるこの絵……\nあの子たちと\n同じ服じゃない？"
16018-870 = "まさか中から\n不意打ちされたりとか\nしないわよね……？"
16018-880 = "うわ、キラキラしてる……\nこれって超レアって\nことかしら？"
16018-890 = "あんまり見かけない\nヤツね。レアなのかしら？"
16018-900 = "金色……ふふっ、\nなんか当たりっぽいわね！\nもっとあるかしら？"
16018-910 = "うぅ〜ん、どれがレアで\nどれがハズレなのか……\n全然分からないわ。"
16018-920 = "あっ、黒！\nうちの好きな色よ！"
16018-930 = "はぁっ、はぁっ……ちょっと、\nあんたら何者なのよ！？"
16018-940 = "魔法少女って……まさか\nホントに魔法を使えるとか\n言わないでしょうね！？"
16018-950 = "……って、何やってんのよ！\nさっさと自分の\n仕事しなさいっての！"
16018-960 = "（まったくもう……\n先生って人が良すぎるのが\n玉にキズなのよね……）"
16018-970 = "はぁ……知らないだろうから\n一応言っとくけど。"
16018-980 = "ヘルメットを触られると、\n音が反響してすごくうるさいの。"
16018-990 = "……"
16018-1000 = "ちょっとだけよ\n……まったく。"
16018-1010 = "これくらいもらわないと、\n割に合わないわよね！"
16018-1020 = "すごいじゃない！\nこういうのを待ってたのよ！"
16018-1030 = "はいっ、今日のノルマ終了！\n楽勝だったわね。"
16018-1040 = "この程度、\nうちにかかれば朝飯前よ♪"
