[translation]
16018-810 = "Ei, Sensei,\nvocê sabe o que é isso?"
16018-820 = "……Parece uma máquina de venda automática,\nmas não tenho certeza."
16018-830 = "Parece que só aceita\nitens específicos."
16018-840 = "Bem, provavelmente só serve para isso mesmo...\nTente colocar um aí\npara testar."
16018-850 = "Ah, parece que está na hora de fechar.\nVamos usar tudo o que\nsobrou."
16018-860 = "Essa imagem colada na lateral...\nNão é o mesmo uniforme\ndaquelas garotas?"
16018-870 = "Não vai me dizer que algo vai sair\nde dentro para nos atacar\nde surpresa, né...?"
16018-880 = "Uau, está brilhando...\nSerá que isso é\nsuper raro?"
16018-890 = "Não vejo muito esse tipo.\nSerá que é raro?"
16018-900 = "Dourado... Hehe,\nparece que tiramos a sorte grande!\nSerá que tem mais?"
16018-910 = "Hmm, qual é raro e\nqual é comum...\nNão faço a menor ideia."
16018-920 = "Ah, preto!\nÉ a minha cor favorita!"
16018-930 = "Haa, haa... Ei,\nquem são vocês, afinal!?"
16018-940 = "Garotas mágicas... Não me diga que\nvocês realmente conseguem\nusar magia!?"
16018-950 = "……Quer dizer, o que vocês estão fazendo!?\nVão logo cuidar\ndo trabalho de vocês!"
16018-960 = "(Ai, meu Deus...\nO defeito do Sensei é ser bom demais com os outros...)"
16018-970 = "Haa... Você provavelmente não sabe,\nentão vou te avisar logo."
16018-980 = "Se tocar no meu capacete,\no som ecoa e fica muito barulhento."
16018-990 = "……"
16018-1000 = "Só um pouquinho, viu\n...Francamente."
16018-1010 = "Se eu não ganhar pelo menos isso,\nnão vale a pena, né!"
16018-1020 = "Incrível!\nEra exatamente isso que eu estava esperando!"
16018-1030 = "Pronto, cota de hoje finalizada!\nFoi moleza."
16018-1040 = "Isso é fichinha\npara mim♪"
