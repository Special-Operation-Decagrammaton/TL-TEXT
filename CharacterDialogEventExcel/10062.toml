[translation]
10062-10320 = "お待ちしておりました。\n先生。"
10062-10330 = "どのような地形や\n気候であっても"
10062-10340 = "完璧な補佐をお約束\nさせていただきます。"
10062-10350 = "大船に乗ったつもりで、\n私に任せてください。"
10062-10360 = "……そうでないと、\n寂しいです。"
10062-10370 = "私を待たせましたね、\n先生。別に平気です。"
10062-10380 = "拗ねてなんかいません。\n先生が戻ったら"
10062-10390 = "絶対におそばを離れ\nないでいようなんてことも\n思っていませんので、"
10062-10400 = "ご安心を。"
10062-10410 = "天あり、地あり、\n飛鳥馬トキあり。"
10062-10420 = "……意味はありません。\n言ってみただけです。"
10062-10430 = "寒くないのかと\nよく聞かれるので、"
10062-10440 = "大丈夫だと\n答えていますが\n実は寒いです。"
10062-10450 = "なので先生、\n温めてください。"
10062-10460 = "私の任務は基地の\n管理と警備です。"
10062-10470 = "言い換えれば、\n先生にくっついて\n行動すること、です。"
10062-10480 = "……理屈が変？\n先生はまだまだですね。"
10062-10490 = "単刀直入に\n申し上げます。"
10062-10500 = "今、先生は私に\n集中しなければ\nなりません。"
10062-10510 = "理由は、この場にいるのが\n先生と私だけだからです。"
10062-10520 = "先生、手をこちらへ。\n私が温めて\n差し上げます。"
10062-10530 = "……！……手が……\n冷たくない……！？"
10062-10540 = "クッ……やはりあの時、\n先生の手袋を\n隠しておくべきでした。"
10062-10990 = "おかえりなさい、先生。\n集めたサンプルは、\nこちらにお願いします。"
10062-11000 = "分析には大量の「物質」が\n必要です。つまり、先生の\n出番ということです。"
10062-11010 = "先生、\nお茶でも飲まれますか？"
10062-11020 = "こちら、氷河を溶かしたお湯で\n淹れたものです。"
10062-11030 = "……古代の味が\n……するかもしれません。"
10062-11040 = "以前、リオ様がこれに似た実験を\nされたことがありますので。"
10062-11050 = "この任務に、\n少し懐かしさを覚えます。"
10062-11060 = "先生はとんでもないものを\n盗んでいきました……\nそれは……私の心です。"
10062-11070 = "…そんなに慌てないでください。\n言ってみただけです、はい。"
10062-11080 = "…「アレ」をやってほしい、\nですか？本当に、\nよろしいのですね…？"
10062-11090 = "承知しました…ぴょん。"
10062-11100 = "ただいまサンプルの分析中です。\nつまり、私は暇ということです。"
10062-11110 = "……何をすべきか、\n先生なら分かりますよね？"
10062-11120 = "何があっても\n先生を守ります。"
10062-11130 = "それだけが\nここにいる理由ですので。"
10062-11140 = "良いですね。"
10062-11150 = "私もそれが良いと思います。"
10062-11160 = "先生のお役に立つのなら\nどうぞ、ご自由に\nお持ちください。"
10062-11170 = "先生の選ばれたものですから、\n価値があるに決まっています。"
10062-11180 = "もちろん、\n私には及びませんが。"
10062-11190 = "すぐにご用意いたします。\n少々お待ちを。"
10062-12320 = "ここは……ヒマリ部長が\n「多少の調整」を入れた\n場所になります。"
10062-12330 = "乱数と確定……\n先生はどちらを\n選びますか？"
10062-12340 = "運試しですね。"
10062-12350 = "不運は私が引き受け\nますので、先生には幸運が\n巡ってくるはずです。"
10062-12360 = "…逆じゃないと嫌…？\nそう、ですか？"
10062-12370 = "ヒマリ部長とリオ様の\n違いが、だんだん\n分かってきました。"
10062-12380 = "どちらが正しいかは、\n私にはまだ\n分かりませんが…"
10062-12390 = "お二方のことを思うと、\nなんだか…言葉にできない\n感情がこみ上げてきます。"
10062-12400 = "どこかで聞いた\n話なのですが……"
10062-12410 = "人生には、小さな幸運が\n必要だといいます。"
10062-12420 = "でなければ、辛く苦しい\n道のりを生きることに\nなってしまいますので。"
10062-12430 = "結果がどのようなものに\nなろうとも、\n私は先生の味方です。"
10062-12440 = "ですので、先生も私の\n味方をしてくださいね。"
10062-12450 = "私、この任務が\n終わったら……先生と\n幸せに暮らすんです。"
10062-12460 = "フラグ……？\nなんですか、それは。"
10062-12470 = "先生の気の向くままに\nお選びください。\nそれが正解ですから。"
10062-12480 = "おお、パチパチパチ\nパチパチパチ。"
10062-12490 = "……今のは、\n私の精一杯のお祝いです。"
10062-12500 = "どうですか？\n感動しましたか？"
10062-12510 = "お見事です。先生。\nその勢いでもう一回、\nいきましょう。"
10062-12520 = "2等当選、\nおめでとうございます。"
10062-12530 = "1等の内容？一日中私が\n身の回りを補佐して\n差し上げる券です。"
10062-12540 = "その不屈の精神……\n私も見習いたいと\n思います。"
10062-12550 = "……こんなに純粋な目で\n尊敬を伝えてくる生徒、"
10062-12560 = "えらいと思いませんか？"
10062-12570 = "迅速に褒めてください。"
