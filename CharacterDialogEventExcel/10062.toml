[translation]
10062-10320 = "Estava à sua espera.\nProfessor."
10062-10330 = "Não importa o terreno ou\no clima,"
10062-10340 = "prometo oferecer-lhe\num suporte perfeito."
10062-10350 = "Pode ficar tranquilo e\ndeixar tudo comigo."
10062-10360 = "……Caso contrário,\neu ficaria solitária."
10062-10370 = "Você me fez esperar, hein,\nProfessor. Não que eu me importe."
10062-10380 = "Não estou fazendo birra.\nQuando o Professor voltar,"
10062-10390 = "eu nem sequer pensei em\nnunca mais sair do seu lado,\nentão,"
10062-10400 = "fique tranquilo."
10062-10410 = "Há o céu, há a terra,\ne há Asuma Toki."
10062-10420 = "……Não tem um significado especial.\nSó quis dizer isso."
10062-10430 = "Como sempre me perguntam\nse eu não sinto frio,"
10062-10440 = "eu respondo que estou bem,\nmas, na verdade,\nestou com frio."
10062-10450 = "Por isso, Professor,\npor favor, me aqueça."
10062-10460 = "Minha missão é a gestão\ne segurança da base."
10062-10470 = "Em outras palavras,\né ficar grudada no Professor\nenquanto agimos."
10062-10480 = "……A lógica está estranha?\nO Professor ainda tem muito o que aprender."
10062-10490 = "Serei direta."
10062-10500 = "Agora, o Professor deve\nse concentrar em mim."
10062-10510 = "O motivo é que, neste lugar,\nestamos apenas eu e você."
10062-10520 = "Professor, dê-me sua mão.\nEu vou aquecê-la\npara você."
10062-10530 = "……!……Sua mão……\nNão está fria……!?"
10062-10540 = "Droga…… eu deveria ter escondido\nas luvas do Professor\nnaquela hora."
10062-10990 = "Bem-vindo de volta, Professor.\nPor favor, deixe as amostras\ncoletadas aqui."
10062-11000 = "A análise requer uma grande quantidade de \"material\". Ou seja, é a vez do Professor entrar em ação."
10062-11010 = "Professor,\ngostaria de um chá?"
10062-11020 = "Este foi feito com água\nderretida de geleira."
10062-11030 = "……Talvez tenha um\n……gosto ancestral."
10062-11040 = "Anteriormente, a Rio-sama fez\num experimento parecido com este."
10062-11050 = "Esta missão me traz\num pouco de nostalgia."
10062-11060 = "O Professor roubou algo imperdoável……\nIsso é…… o meu coração."
10062-11070 = "…Não entre em pânico.\nSó quis dizer isso, sim."
10062-11080 = "…Você quer que eu faça \"aquilo\"?\nTem certeza absoluta\nque quer isso…?"
10062-11090 = "Entendido… hop."
10062-11100 = "Estou analisando as amostras agora.\nOu seja, estou livre."
10062-11110 = "……O que deve ser feito,\no Professor já sabe, não é?"
10062-11120 = "Não importa o que aconteça,\neu protegerei o Professor."
10062-11130 = "Esse é o único motivo\npelo qual estou aqui."
10062-11140 = "Ótimo."
10062-11150 = "Eu também acho que isso é bom."
10062-11160 = "Se for útil para o Professor,\npode ficar à vontade\npara levar."
10062-11170 = "Como foi algo escolhido pelo Professor,\ncom certeza tem valor."
10062-11180 = "Claro, não se compara a mim."
10062-11190 = "Prepararei imediatamente.\nEspere um pouco."
10062-12320 = "Este é o lugar onde a Chefe Himari\nfez \"alguns ajustes\"."
10062-12330 = "Aleatoriedade e certeza……\nQual delas o Professor\nescolhe?"
10062-12340 = "Um teste de sorte, hein."
10062-12350 = "Eu assumirei a má sorte,\nentão a boa sorte deve\nchegar ao Professor."
10062-12360 = "…Não quer que seja o contrário…?\nÉ mesmo?"
10062-12370 = "Estou começando a entender\na diferença entre a Chefe Himari\ne a Rio-sama."
10062-12380 = "Qual dos dois é o correto, \neu ainda não sei, \nmas..."
10062-12390 = "Ao pensar em vocês dois, \nde alguma forma... \num sentimento indescritível surge em mim."
10062-12400 = "É uma história que ouvi \nem algum lugar, mas..."
10062-12410 = "Dizem que, na vida, \né preciso um pouco de sorte."
10062-12420 = "Caso contrário, \nacabaremos vivendo \num caminho árduo e doloroso."
10062-12430 = "Não importa qual seja o resultado, \neu estarei do lado do Sensei."
10062-12440 = "Portanto, Sensei, \nfique do meu lado também, está bem?"
10062-12450 = "Eu, quando esta missão \nacabar... vou viver feliz \ncom o Sensei."
10062-12460 = "Flag...? \nO que é isso?"
10062-12470 = "Por favor, escolha conforme \na sua vontade, Sensei. \nEssa é a resposta correta."
10062-12480 = "Oh, palmas, palmas, palmas, \npalmas, palmas, palmas."
10062-12490 = "......Isso foi \na minha melhor comemoração."
10062-12500 = "O que achou? \nFicou emocionado?"
10062-12510 = "Excelente, Sensei. \nCom esse ânimo, vamos \nmais uma vez."
10062-12520 = "Parabéns pelo \nsegundo lugar."
10062-12530 = "O prêmio do primeiro lugar? É um cupom para eu te ajudar \ncom suas tarefas pessoais \no dia todo."
10062-12540 = "Esse espírito indomável... \neu também gostaria \nde aprender com ele."
10062-12550 = "......Uma aluna que expressa \nadmiração com olhos tão puros,"
10062-12560 = "você não acha que ela é incrível?"
10062-12570 = "Por favor, me elogie rapidamente."
