[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10097-10 = "Isso é apenas uma missão de infiltração\npara investigar o incidente……\nEspero que termine bem." 
10097-20 = "RABBIT 1.\nPreparação da missão concluída.\nSensei, ordens." 
10097-30 = "Não me lembro quando foi a última vez que comi\num sanduíche recheado com camarão." 
10097-40 = "（……Espero não parecer\nempolgada demais……）" 
10097-50 = "Durante minha ausência,\npedi para cuidarem da Pyonko……" 
10097-60 = "Pedi para o pessoal da\nAgência de Segurança Pública\nde Valkyrie." 
10097-70 = "Às vezes, a Pyonko parece gostar mais……" 
10097-80 = "do pessoal da Agência de Segurança Pública\ndo que do Esquadrão RABBIT,\no que me deixa um pouco solitária, mas……" 
10097-90 = "A primeira operação expedicionária\ndo Esquadrão RABBIT……\nMeu coração está pulando de empolgação." 
10097-100 = "Chegou a hora de mostrarmos\ndo que nós da SRT somos feitas!" 
10097-110 = "RABBIT 2, pronta para ação!\nMe dê as ordens quando quiser!" 
10097-120 = "Tentei me vestir como uma turista normal\npara não levantar suspeitas, mas……" 
10097-130 = "Você acha que……\nalguém vai desconfiar de mim?" 
10097-140 = "Com licença…… Sensei,\ntem alguma coisa suja\nna minha barriga?" 
10097-150 = "Pra ser sincera, não sou muito\nfã de frutos do mar.\nÉ muito chato de conservar." 
10097-160 = "Aah, mas se for lula seca\nou algo do tipo……\nAté que eu gosto!" 
10097-170 = "Hiii……\nParece uma vila de pescadores\nde um romance de terror……" 
10097-180 = "Eu quero voltar para a academia logo……" 
10097-190 = "Ah, é verdade, a nossa academia já……\nNão existe mais……" 
10097-200 = "P-P-Por acaso\nvocê me chamou……?" 
10097-210 = "（Por que eu vim parar\nnuma vila tão isolada como esta……）" 
10097-220 = "Foi a Miyako-chan que\ntrançou o meu cabelo\nlogo antes de sairmos\npara a operação." 
10097-230 = "Fufu…… até que ficou\nfofinho……" 
10097-240 = "Pardais, doninhas,\ngaivotas……" 
10097-250 = "Por que será que\nos animais selvagens\nsempre se aproximam de mim……?" 
10097-260 = "Então essa é a Vila Yadoura,\nfamosa pelos camarões..." 
10097-270 = "Acho que é a minha primeira vez\nvindo aqui de verdade." 
10097-280 = "O que diabos tá rolando nessa vila?" 
10097-290 = "Será que é por causa dessa neblina...?" 
10097-300 = "Tá meio frio pra quem tá\nno meio do verão..." 
10097-310 = "Hmm. Realmente,\ntem um cheirinho de ruína e caos\nno ar..." 
10097-320 = "Pode ser uma operação da SRT, mas..." 
10097-330 = "O mar no verão sempre tem\numa vibe diferente, então\nserve pra dar uma espairecida." 
10097-340 = "Achou essa boia de natação suspeita?" 
10097-350 = "Bom, não dá pra negar que ela\nnão é pro uso convencional. Kuhihi..." 
