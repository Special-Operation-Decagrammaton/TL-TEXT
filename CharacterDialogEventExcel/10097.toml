[translation]
10097-10 = "これはあくまでも事件の\n調査のための潜入作戦……\n無事に終わると\nいいのですが。"
10097-20 = "RABBIT1。\n作戦準備完了しました。\n先生、指示を。"
10097-30 = "最後にエビがたっぷり\n入ったサンドイッチを\n食べたのは、\nいつだったのでしょう。"
10097-40 = "（あまり、\n浮かれている感じに\n見えませんように……）"
10097-50 = "不在の間、\nぴょんこのお世話は、"
10097-60 = "ヴァルキューレ\n生活安全局の\n皆さんに\nお願いしています。"
10097-70 = "たまに、ぴょんこが\nRABBIT小隊より"
10097-80 = "生活安全局の皆さんに\n懐いているように見えて、\n少し寂しくも\nありますが……"
10097-90 = "RABBIT小隊初の\n遠征作戦か……\n少し心が躍っている。"
10097-100 = "今こそ、\n私たちSRTの出番だな！"
10097-110 = "RABBIT2、準備完了！\nいつでもいけるぞ！"
10097-120 = "一応、普通の観光客っぽい\n格好をしてみたんだが……"
10097-130 = "怪しまれたり……\nしないよな？"
10097-140 = "あの……先生、\n私のお腹に、\nなにかついてるのか？"
10097-150 = "私、実は海産物は\nあまり好きじゃないんだ。\n保存が難しいからな。"
10097-160 = "ああでも、乾燥イカ\nみたいな干物なら……\n私も好きだぞ！"
10097-170 = "ひぃ……\nホラー小説に出てくる\n漁村みたい……"
10097-180 = "早く学園に戻りたい……"
10097-190 = "あ、私たちの学園は、\nもう……"
10097-200 = "も、も、もしかして\nお呼びですか……？"
10097-210 = "（どうして\nこんなへんぴな村まで\n来てしまったのかな……）"
10097-220 = "この髪型、\nミヤコちゃんが\n作戦に出る直前に\n編んでくれたんです。"
10097-230 = "ふふっ……これ、\n可愛いかも……"
10097-240 = "スズメも、イタチも、\nカモメも……。"
10097-250 = "野生の動物たちが\n私に寄ってくる理由は\nなんなんでしょう……？"
10097-260 = "ここがエビで\n有名な夜戸浦村…"
10097-270 = "実際に来てみたのは、\n初めてかも。"
10097-280 = "一体、この村で\n何が起きてるの？"
10097-290 = "霧のせいかな…？"
10097-300 = "夏なのにちょっと寒い…"
10097-310 = "うーん。たしかに、\nどこか破滅の\n匂いがするような…"
10097-320 = "SRTの作戦とはいえ、"
10097-330 = "夏の海って\nいつもと違うから\n気分転換になるね。"
10097-340 = "この浮き輪が怪しい？"
10097-350 = "まぁ、\n普段用じゃないことは\n間違いないね。くひひ…"
10097-620 = "ここがエビで\n有名な夜戸浦村…"
10097-630 = "実際に来てみたのは、\n初めてかも。"
10097-640 = "一体、この村で\n何が起きてるの？"
10097-650 = "「深きもの」…"
10097-660 = "あの噂が本当なら、\nすっごい大きな爆弾にも\n耐えられるのかな？"
10097-670 = "「くさや」って発酵させるだけで、あんなニオイになるの？"
10097-680 = "一度、\n作ってみたいかも…\nくひひ。"
10097-690 = "ふふ。これでやっと、"
10097-700 = "おいしい\nバジルシュリンプの\nサンドイッチが\n食べられるんだよね？"
10097-710 = "霧のせいかな…？"
10097-720 = "夏なのにちょっと寒い…"
10097-730 = "うーん。たしかに、\nどこか破滅の\n匂いがするような…"
10097-740 = "SRTの作戦とはいえ、"
10097-750 = "夏の海って\nいつもと違うから\n気分転換になるね。"
10097-760 = "この浮き輪が怪しい？"
10097-770 = "まぁ、\n普段用じゃないことは\n間違いないね。くひひ…"
