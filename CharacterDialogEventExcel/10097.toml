[translation]
10097-620 = "Então esta é a Vila Yotoura,\nfamosa pelos seus camarões..."
10097-630 = "Acho que é a primeira vez\nque venho aqui pessoalmente."
10097-640 = "O que diabos está\nacontecendo nessa vila?"
10097-650 = "Os 'Profundos'..."
10097-660 = "Se esses boatos forem mesmo verdade,\nserá que eles conseguem resistir\na uma bomba gigante?"
10097-670 = "Então quer dizer que o 'Kusaya' fica\ncom aquele cheiro horrível só pelo\nprocesso de fermentação?"
10097-680 = "Acho que me deu vontade de\ntentar fabricar um...\nKuhihi."
10097-690 = "Fufu. Com isso, finalmente,"
10097-700 = "Nós vamos poder comer um delicioso\nsanduíche de camarão com manjericão,\nnão é?"
10097-710 = "Será que é por causa da neblina...?"
10097-720 = "Mesmo sendo verão,\nestá fazendo um pouco de frio..."
10097-730 = "Hmm. Realmente, tem um cheirinho\nde ruína vindo de algum lugar..."
10097-740 = "Apesar de estarmos no meio\nde uma operação da SRT,"
10097-750 = "O mar no verão tem um clima\ndiferente do habitual, então\né bom para mudar de ares."
10097-760 = "Você achou essa boia suspeita?"
10097-770 = "Bom, não há dúvidas de que ela\nnão é para uso recreativo comum.\nKuhihi..."