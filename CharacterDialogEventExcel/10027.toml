[translation]
10027-70 = "準備はできてる。\nさあ行こう、先生。"
10027-80 = "……そろそろ作戦の時間？"
10027-90 = "大丈夫、いつでも行ける。"
10027-100 = "……ん、どうかした？\n何か作戦に関する話？"
10027-110 = "ほら、そろそろ\n出発の時間だから……\nそういうのは後で。"
10027-120 = "出発する時は声をかけて。\nこっちは\n準備出来てるから。"
10027-130 = "……ん？先生、\n今私のことを呼んだ？"
10027-140 = "そろそろ終わりが\n見えてきたな……。"
10027-150 = "私の方はいつでも\n準備できてるから、\n任せて。"
10027-160 = "仕上げは最後まで、\n確実に。"
10027-170 = "先生、\n何か手伝えることはある？"
10027-180 = "……ん、どうかした？\n何か作戦に関する話？"
10027-190 = "ほら、そろそろ\n出発の時間だから……\nそういうのは後で。"
10027-200 = "出発する時は声をかけて。\nこっちは\n準備出来てるから。"
10027-210 = "……ん？先生、\n今私のことを呼んだ？"
10027-340 = "作戦の報酬か……"
10027-350 = "まずは中身を\nざっと確認してみよう"
10027-360 = "これは、効率を考えないと……\n数字を扱うのは苦手だ……"
10027-370 = "先生、見て。どうやらまだ\n間に合うみたいだ。"
10027-380 = "え、代わりに計算……？"
10027-390 = "せ、先生は私が数学苦手なの、\n知ってるだろう……！？"
10027-400 = "ごめん、計算とかはちょっと、\n手助けしてあげられない……。"
10027-410 = "ああ、良い選択だと思う。"
10027-420 = "それを選んだんだ。\nうん、良いと思う。"
10027-430 = "うん、悪くない。"
10027-440 = "流石は先生、良い判断だ。"
