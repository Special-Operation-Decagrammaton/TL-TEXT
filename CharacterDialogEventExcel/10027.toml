10027-100 = "……Hm, aconteceu alguma coisa?\nÉ algo sobre a operação?"
10027-110 = "Olha, já está na hora de\npartir, então……\ndeixe isso para depois."
10027-120 = "Me avise quando for partir.\nEu já estou\npronta."
10027-130 = "……Hm? Sensei,\nvocê me chamou?"
10027-140 = "Já estamos começando a ver\no fim disso……"
10027-150 = "Eu estou pronta\na qualquer momento,\npode deixar comigo."
10027-160 = "Finalizar até o fim,\ncom precisão."
10027-170 = "Sensei,\nhá algo em que eu possa ajudar?"
10027-180 = "……Hm, aconteceu alguma coisa?\nÉ algo sobre a operação?"
10027-190 = "Olha, já está na hora de\npartir, então……\ndeixe isso para depois."
10027-200 = "Me avise quando for partir.\nEu já estou\npronta."
10027-210 = "……Hm? Sensei,\nvocê me chamou?"
10027-340 = "A recompensa da operação, hein……"
10027-350 = "Primeiro, vamos dar uma\nverificada rápida no conteúdo."
10027-360 = "Isso requer eficiência……\nEu não sou boa com números……"
10027-370 = "Sensei, olhe. Parece que ainda\ndá tempo."
