[translation]
26013-170 = "Um festival na praia...\nÉ a primeira vez que vejo algo assim."
26013-180 = "Professor, está se divertindo?"
26013-190 = "Espero que nada aconteça\ndurante o festival..."
26013-200 = "Momentos tão divertidos assim\nnão acontecem sempre."
26013-210 = "O festival já vai..."
26013-220 = "Dizem que tudo que tem um começo\ntem um fim, mas..."
26013-230 = "É um pouco triste."
26013-240 = "O festival\nacabou, né..."
26013-250 = "Mas está tudo bem. O mar\ncontinua lindo como sempre."
26013-260 = "Tocar na areia,\nperseguir as ondas..."
26013-270 = "O mar é divertido, né?"
26013-280 = "O palco ao ar livre...\nParece divertido."
26013-290 = "Professor, vamos lá ver."
26013-300 = "Acho que é divertido\nporque estou com todos."
26013-310 = "Claro que, nesse \"todos\",\no professor também está incluído."
26013-320 = "Obrigada por me trazer\nao festival."
26013-330 = "Professor, divirta-se também."
26013-670 = "Olá, professor."
26013-680 = "Sim, aqui está\na lista de tarefas."
26013-690 = "...É bastante coisa. Vamos terminar\numa por uma."
26013-700 = "Me chamou?"
26013-710 = "Fufu, não sou eu, olhe para o lado."
26013-720 = "Bom trabalho, professor."
26013-730 = "O professor está se esforçando, né.\nEu também me senti motivada."
