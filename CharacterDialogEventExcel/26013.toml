[translation]
26013-120 = "海のお祭り…\nこんなの、はじめて。"
26013-130 = "先生、楽しんでる？"
26013-140 = "砂に触れたり、\n波を追いかけたり…"
26013-150 = "海って、楽しいね。"
26013-160 = "野外ステージ…\n楽しそう。"
26013-170 = "先生、一緒に見に行こう。"
26013-180 = "みんなと一緒だから、\n楽しいんだと思う。"
26013-190 = "もちろん\n「みんな」の中には、\n先生もいるよ。"
26013-200 = "お祭りに\n連れてきてくれて、\nありがとう。"
26013-210 = "先生も、楽しんでね。"
26013-220 = "はじまりがあれば終わりが\nある、っていうけど…"
26013-230 = "ちょっと、寂しいな。"
26013-240 = "お祭り、\n終わっちゃったね…"
26013-250 = "でも大丈夫だよ。海は、\n変わらずきれいだから。"
26013-260 = "砂に触れたり、\n波を追いかけたり…"
26013-270 = "海って、楽しいね。"
26013-280 = "野外ステージ…\n楽しそう。"
26013-290 = "先生、一緒に見に行こう。"
26013-300 = "みんなと一緒だから、\n楽しいんだと思う。"
26013-310 = "もちろん\n「みんな」の中には、\n先生もいるよ。"
26013-320 = "お祭りに\n連れてきてくれて、\nありがとう。"
26013-330 = "先生も、楽しんでね。"
26013-670 = "こんにちは、先生。"
26013-680 = "はい、これ、\nやることリストだよ。"
26013-690 = "…多いね。一つずつ、\n終わらせていこう。"
26013-700 = "呼んだ？"
26013-710 = "ふふ、私じゃなくて隣を見て。"
26013-720 = "お疲れ様、先生。"
26013-730 = "先生、頑張ってるね。\n私もやる気出てきた。"
