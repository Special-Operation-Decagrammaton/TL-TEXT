[translation]
10057-10 = "Professor, bem-vindo de volta.\nOra... você está trabalhando\nmesmo no Ano Novo?\nÀs vezes, descansar também é importante."
10057-20 = "Vamos, vamos tomar\num chá juntos."
10057-30 = "Fufu, fico muito feliz\npor podermos nos encontrar\ndesde o Ano Novo."
10057-40 = "Eu estou sempre\npreparada, sabe?"
10057-50 = "Fufu.\nVocê me chamou, Professor?"
10057-60 = "Fico sem jeito se você\nme fizer cócegas tantas vezes."
10057-70 = "Professor, você gosta\nde pregar peças\nmais do que eu imaginava, não é?"
10057-80 = "É verdade que o furisode\npode ser um pouco\ninconveniente às vezes."
10057-90 = "Mas tudo isso também\nconduz ao caminho\nda gastronomia."
10057-100 = "Para alcançar o sabor\nfinal, é necessária\numa determinação inabalável."
10057-110 = "…Ninguém pode nos\nimpedir. Fufu."
10057-120 = "Embora a situação seja\num pouco complexa..."
10057-130 = "Meu desejo pela gastronomia\nnão será abalado por\ncoisas desse tipo."
10057-140 = "Desejando que cada um\ndê o seu melhor."
10057-150 = "Com entusiasmo e sinceridade,\nvamos saborear\nesta refeição."
10057-160 = "Com o passar do tempo, o incidente\nserá esquecido."
10057-170 = "Mas, enquanto eu e o Professor\nlembrarmos... está tudo bem."
10057-180 = "Sim, com certeza."
10057-630 = "O Professor também\nveio tirar a sorte...?\nÉ por aqui."
10057-640 = "Fufu, não precisa\nficar tão ansioso,\nestá tudo bem."
10057-650 = "Fufu... é a primeira vez\nque experimento\nalgo assim."
10057-660 = "É um tanto divertido, não é?"
10057-670 = "Você encontrou o que\nestava procurando?"
10057-680 = "Fufu, talvez esteja\nem um lugar mais próximo\ndo que você imagina?"
10057-690 = "É importante ter um tempo\npara se acalmar e\nregular a respiração."
10057-700 = "Como uma granita servida\nem um menu degustação."
10057-710 = "Ora, é um Daikichi (Grande Sorte)!\nComo esperado do Professor,\nvocê também tem sorte!"
10057-720 = "Para o Professor que tirou\na Grande Sorte, preparei\num produto especial."
10057-730 = "Kichi (Sorte) significa que\na sorte está vindo\nem sua direção."
10057-740 = "Espero que este ano\nseja maravilhoso\npara você também."
10057-750 = "Chukichi (Sorte Média)...\nÉ muito bom, não é?\nAqui está o produto para a Sorte Média."
10057-760 = "Shokichi (Pequena Sorte)...\nNão é nada mal."
10057-770 = "Dizem que para atrair a felicidade,\npequenos acúmulos são\nimportantes."
10057-780 = "Suekichi (Sorte Final) é um sinal\nde que a sorte virá\nmais tarde..."
10057-790 = "Ou seja, é um bom presságio.\nSim, aqui está."
10057-800 = "Está tudo bem.\nO resultado da sorte é apenas\na sua sorte atual."
10057-810 = "Dizem que, no futuro,\npode se transformar em felicidade..."
10057-820 = "…Eh? Você se sente feliz e\ntriste ao mesmo tempo\npor ser consolado por mim...? \nI-isso é, o que exatamente..."
10057-830 = "Professor, se for para tirar a sorte,\nainda estamos aceitando.\nNão se esqueça de tirar a sua."
