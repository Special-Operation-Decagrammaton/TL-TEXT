[translation]
10026-10 = "おらっ！\n仕事の時間だぞ、先生！"
10026-20 = "油売ってる暇はねぇ、\n行くぞ！"
10026-30 = "何か手伝うことでも\nあるか、先生？"
10026-40 = "ははっ！悪くねぇな！"
10026-50 = "さて、こうしてる\n場合じゃねぇな。"
10026-60 = "なっ、何をそんなじっと\n見てんだよ……。ほら、\nさっさと仕事始めんぞ。"
10026-70 = "ははっ！悪くねぇな！"
10026-80 = "さて、こうしてる\n場合じゃねぇな。"
10026-90 = "なっ、何をそんなじっと\n見てんだよ……。ほら、\nさっさと仕事始めんぞ。"
10026-550 = "さあ～て、掃除でもしに行くか？"
10026-560 = "さあ、早く始めようぜっ！"
10026-570 = "なんだ？応援でも\nしてくれてんのか？\nはっ！面白いじゃん。"
10026-580 = "あたしにかかれば、\nこれくれぇ朝飯前だ！"
10026-590 = "へえ、なかなか\nセンスあるじゃねえか？"
10026-600 = "仕事はきっちりやるぞ。"
