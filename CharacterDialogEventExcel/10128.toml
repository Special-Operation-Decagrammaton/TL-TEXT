[translation]
10128-150 = "特殊交易部の営業室長！\n若狭フユです！"
10128-160 = "なにか欲しいものが\nありましたら、お気軽に\nご相談ください。"
10128-170 = "ふ、ふふ……"
10128-180 = "いつも通りですね。\n問題ありません。"
10128-190 = "（どうして……？\nどこで間違え\nちゃったの……？）"
10128-200 = "（もう終わり？\nそうだよね？\nやっぱ終わりだよね！？）"
10128-210 = "ふ……ふふ……\nこの手の依頼、しばらくは\nやめとこうかな……。"
10128-220 = "ええ、特殊交易部の\n窓口担当は私です。"
10128-230 = "接触し、依頼につなげて、\nお客様に満足を\n提供する……。"
10128-240 = "それが、私の役割です。"
10128-250 = "ミヨとリッちゃんの\nサポートがなかったら、"
10128-260 = "私なんて\nただの一芸術学院生に\nすぎませんから。"
10128-270 = "……芸術って、\n難しいんですよね。"
10128-500 = "在庫は十分ありますよ。\nどうぞ、心ゆくまで\n見て行ってください。"
10128-510 = "欲しいものは\n見つかりましたか？"
10128-520 = "まだしばらくは\n大丈夫ですよ。\nごゆっくりどうぞ。"
10128-530 = "ここには無いものが\n欲しい……？"
10128-540 = "……お話はあちらで\n伺いましょうか。"
10128-550 = "ははっ！つっついても、\n安くなりませんよ？"
10128-560 = "さすが先生。\nお目が高いですね。"
10128-570 = "それ、私の\nイチオシなんです。"
10128-580 = "返品交換は\nできませんので。\nご了承ください。"
10128-590 = "ナイスチョイスです。\nこちら、お包みしますか？"
