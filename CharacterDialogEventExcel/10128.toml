[translation]
10128-150 = "Chefe do departamento de vendas do Departamento de Comércio Especial!\nSou Wakasa Fuyu!"
10128-160 = "Se houver algo que você queira,\nsinta-se à vontade para\nme consultar."
10128-170 = "He, hehe..."
10128-180 = "Como sempre.\nSem problemas."
10128-190 = "(Por que...?\nOnde foi que eu\nerrei...?)"
10128-200 = "(Já acabou?\nÉ isso mesmo, né?\nÉ o fim, não é!?)"
10128-210 = "He... hehe...\nAcho que vou parar com esse tipo\nde pedido por um tempo..."
10128-220 = "Sim, a responsável pelo\natendimento do Departamento de Comércio Especial sou eu."
10128-230 = "Fazer contato, conectar com pedidos,\ne oferecer satisfação\naos clientes..."
10128-240 = "Esse é o meu papel."
10128-250 = "Se não fosse pelo suporte\nda Miyo e da Ricchan,"
10128-260 = "eu não passaria de\numa simples estudante\nda Academia de Artes."
10128-270 = "...A arte é\ncomplicada, não é?"
10128-500 = "Temos estoque suficiente.\nPor favor, fique à vontade\npara olhar tudo o que quiser."
10128-510 = "Encontrou o que\nestava procurando?"
10128-520 = "Ainda temos bastante tempo.\nFique à vontade."
10128-530 = "Quer algo que\nnão temos aqui...?"
10128-540 = "...Que tal conversarmos\nsobre isso ali?"
10128-550 = "Haha! Mesmo que me cutuque,\nnão vai ficar mais barato, viu?"
10128-560 = "Como esperado do Sensei.\nVocê tem um ótimo olho."
10128-570 = "Esse é o meu\nfavorito."
10128-580 = "Não aceitamos\ndevoluções ou trocas.\nPor favor, entenda."
10128-590 = "Bela escolha.\nQuer que eu embrulhe?"
