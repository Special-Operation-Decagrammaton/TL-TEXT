[translation]
16008-10 = "今日も忙しそうだね、\n先生。"
16008-20 = "さっき買ってきたん\nだけど、チョコドーナッツ\nでも食べる？"
16008-30 = "パトロール\nめんどくさ……。"
16008-40 = "ふぅ、平和だねぇ。"
16008-50 = "バレンタインデーの\nこういう賑やかな\n雰囲気は、悪くないね。"
16008-60 = "何より……\nこの時期が\n終わるとすぐに、"
16008-70 = "売れ残ったチョコ\nドーナッツが大量に\n安売りされるから！"
16008-80 = "よっぽどのことが\nない限り、"
16008-90 = "私たち生活安全局まで\n出動するようなことは\n無いと思うけどね。"
16008-100 = "例えば……"
16008-110 = "災厄の狐が\n装甲車を盗むとか。"
16008-120 = "ははっ、冗談冗談。\nそんなこと\n起きっこないって。"
16008-130 = "私たち生活安全局まで\n出動するようなことは\n無いと思うけどね。"
16008-140 = "例えば……"
16008-150 = "災厄の狐が\n装甲車を盗むとか。"
16008-160 = "ははっ、冗談冗談。\nそんなこと\n起きっこないって。"
