[translation]
16016-320 = "Olá, Sensei."
16016-330 = "Você veio para ver o palco,\nnão a mim, certo?"
16016-340 = "Eu estava esperando por você,\nSensei."
16016-350 = "Preparei um assento para você.\nPor favor, sente-se."
16016-360 = "O palco continua,\npor favor, concentre-se!"
16016-370 = "Por favor, fique para\nouvir até o fim."
16016-380 = "Fufu, foi um palco\nmuito maravilhoso."
16016-390 = "Sensei……\nprecisa de alguma coisa?"
16016-400 = "Isso também é um serviço\naos fãs… eu suponho?"
16016-410 = "Se você se divertiu,\nSensei, isso é o suficiente."
16016-420 = "Ah, ah—, ah—."
16016-430 = "……Eu estava praticando\nminha voz para poder\ncantar a qualquer momento."
