[translation]
16016-320 = "こんにちは、先生。"
16016-330 = "私…ではなく、ステージを\n見に来られたのですよね。"
16016-340 = "お待ちしておりました、\n先生。"
16016-350 = "お席をご用意して\nおります。どうぞ\nおかけください。"
16016-360 = "ステージは\n続いておりますよ、\n集中してください！"
16016-370 = "最後まで、\n聞いていって\nくださいね。"
16016-380 = "ふふ、とても素敵な\nステージでした。"
16016-390 = "先生……\nなにか御用でしょうか？"
16016-400 = "これもファンサービス…\nなのでしょうか？"
16016-410 = "先生に楽しんで\nいただけたのなら、\nそれで十分です。"
16016-420 = "あ、あ―、あ―。"
16016-430 = "……いつでも歌えるよう、\n発声練習を\nしておりました。"
