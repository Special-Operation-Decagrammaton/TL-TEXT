[translation]
10071-10 = "これはあくまでも事件の\n調査のための潜入作戦……\n無事に終わると\nいいのですが。"
10071-20 = "RABBIT1。\n作戦準備完了しました。\n先生、指示を。"
10071-30 = "どうやら、住民の\n皆さんの気分を害して\nしまったようです……。 "
10071-40 = "どうすれば\n良いのでしょう……。"
10071-50 = "ふふ……\n海水浴を楽しむ以上に、\n私たちSRTらしい夏に\nなりました。"
10071-60 = "お疲れ様でした、先生。"
10071-70 = "作戦のためでは\nありますが、\nせっかくの海ですし……。"
10071-80 = "……少し、\nお時間いただけますか？"
10071-90 = "最後にエビがたっぷり\n入ったサンドイッチを\n食べたのは、\nいつだったのでしょう。"
10071-100 = "（あまり、\n浮かれている感じに\n見えませんように……）"
10071-110 = "不在の間、\nぴょんこのお世話は、"
10071-120 = "ヴァルキューレ\n生活安全局の\n皆さんに\nお願いしています。"
10071-130 = "たまに、ぴょんこが\nRABBIT小隊より"
10071-140 = "生活安全局の皆さんに\n懐いているように見えて、\n少し寂しくも\nありますが……"
10071-530 = "来てくれましたか、先生。\n調査に必要なリストを\nまとめてみました。"
10071-540 = "……以上が、今日の潜入作戦の\nターゲットになります。"
10071-550 = "どうされましたか？"
10071-560 = "あの……この水着、\n生地が少し薄くて……。"
10071-570 = "その……\nそんなに見つめられると……\n気になってしまうのですが……。"
10071-580 = "さすがです、先生。\n信じていました。"
10071-590 = "ご協力、\nありがとうございました。\n助かりました。"
