[translation]
10071-10 = "Esta é apenas uma operação de infiltração para investigar o incidente... Espero que termine bem."
10071-20 = "RABBIT1. Preparação para a operação concluída. Professor, dê as instruções."
10071-30 = "Parece que acabamos ofendendo os moradores..."
10071-40 = "O que devemos fazer...?"
10071-50 = "Hehe... Mais do que apenas aproveitar o banho de mar, este se tornou um verão digno de nós, da SRT."
10071-60 = "Bom trabalho, Professor."
10071-70 = "É para a operação, mas já que estamos no mar..."
10071-80 = "...Poderia me dar um pouco do seu tempo?"
10071-90 = "Quando foi a última vez que comi um sanduíche cheio de camarão?"
10071-100 = "(Espero não parecer que estou me divertindo demais...)"
10071-110 = "Enquanto estivermos fora, os cuidados com Pyonko..."
10071-120 = "Estão sendo feitos pelo pessoal do Departamento de Segurança Pública da Valkyrie."
10071-130 = "Às vezes, parece que a Pyonko"
10071-140 = "está mais apegada ao pessoal do Departamento de Segurança Pública do que ao RABBIT Squad, o que me deixa um pouco triste..."
10071-530 = "Você veio, Professor. Reuni a lista necessária para a investigação."
10071-540 = "...Esses são os alvos da operação de infiltração de hoje."
10071-550 = "O que houve?"
10071-560 = "Hum... este traje de banho, o tecido é um pouco fino..."
10071-570 = "Isso... se você ficar me encarando assim... eu acabo ficando sem jeito..."
10071-580 = "Como esperado do Professor. Eu confiava em você."
10071-590 = "Obrigada pela sua cooperação. Você me ajudou muito."
