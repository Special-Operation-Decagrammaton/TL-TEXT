[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10071-10 = "Isso é apenas uma missão de infiltração para investigar o incidente……\nEspero que termine bem." 
10071-20 = "RABBIT 1.\nPreparação da missão concluída.\nSensei, ordens." 
10071-30 = "Parece que acabamos prejudicando o humor\ndos moradores……" 
10071-40 = "O que devemos fazer……" 
10071-50 = "Fufu……\nMais do que aproveitar o banho de mar,\neste verão se tornou bem típico da nossa SRT." 
10071-60 = "Bom trabalho, Sensei." 
10071-70 = "É por causa da missão, mas……\njá que estamos na praia……" 
10071-80 = "……Poderia me dar um pouco\nda sua atenção?" 
10071-90 = "Não me lembro quando foi a última vez que comi\num sanduíche recheado com camarão." 
10071-100 = "（……Espero não parecer\nempolgada demais……）" 
10071-110 = "Durante minha ausência,\npedi para cuidarem da Pyonko……" 
10071-120 = "Pedi para o pessoal da\nAgência de Segurança Pública\nde Valkyrie." 
10071-130 = "Às vezes, a Pyonko parece gostar mais……" 
10071-140 = "do pessoal da Agência de Segurança Pública\ndo que do Esquadrão RABBIT,\no que me deixa um pouco solitária, mas……" 
10071-530 = "Você veio, Sensei.\nPreparei a lista necessária para a investigação." 
10071-540 = "……Estes são os alvos da\nmissão de infiltração de hoje." 
10071-550 = "Aconteceu alguma coisa?" 
10071-560 = "Aquele…… esse traje de banho,\no tecido é um pouco fino……" 
10071-570 = "Aquele……\nser encarada assim……\nacaba me deixando um pouco desconcertada……" 
10071-580 = "Como esperado, Sensei.\nEu confiava em você." 
10071-590 = "Obrigada pela colaboração.\nIsso ajudou muito." 