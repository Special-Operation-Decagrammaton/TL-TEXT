[translation]
10071-10 = "Isso é estritamente uma operação de\ninfiltração para investigar o incidente...\nEspero que termine\ntudo bem."
10071-20 = "RABBIT1.\nPreparativos para a operação concluídos.\nSensei, aguardando ordens."
10071-30 = "Parece que nós acabamos\nofendendo os moradores\ndaqui..."
10071-40 = "O que devemos\nfazer..."
10071-50 = "Fufu...\nMais do que apenas curtir um banho de mar,\neste se tornou um verão bem a cara\nda SRT."
10071-60 = "Bom trabalho, Sensei."
10071-70 = "Foi tudo pelo bem da operação,\nmas já que estamos\nno mar..."
10071-80 = "……O senhor teria\num pouco de tempo para mim?"
10071-90 = "Quando foi a última vez\nque comi um sanduíche\nbem recheado com\nbastante camarão?"
10071-100 = "（Espero não estar parecendo\nempolgada demais...)"
10071-110 = "Enquanto estamos fora,\nos cuidados com o Pyonko"
10071-120 = "Estão nas mãos\ndo pessoal do Departamento de\nSegurança Pública da Valkyrie."
10071-130 = "Às vezes, o Pyonko parece ter\nse apegado mais"
10071-140 = "Ao pessoal da Segurança Pública\ndo que a nós, do Esquadrão RABBIT,\no que me deixa um pouco\nsolitária, mas..."
10071-530 = "Você veio, Sensei.\nEu compilei uma lista com o que precisamos\npara a investigação."
10071-540 = "……E esses serão os alvos da nossa\noperação de infiltração de hoje."
10071-550 = "Aconteceu alguma coisa?"
10071-560 = "Uhm... O tecido desse maiô\né um pouco fino, então..."
10071-570 = "Sabe...\nSe o senhor ficar me encarando tanto assim...\nEu acabo ficando muito envergonhada..."
10071-580 = "Como esperado de você, Sensei.\nEu confiava nisso."
10071-590 = "Muito obrigada por\ncolaborar.\nAjudou bastante."