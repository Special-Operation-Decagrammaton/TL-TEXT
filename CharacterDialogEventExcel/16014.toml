[translation]
16014-710 = "いらっしゃいませ、先生～！\nえへへっ！"
16014-720 = "なんか探し物～？\nイブキも手伝ってあげる！"
16014-730 = "イブキ、先生とパーティーで\n踊るの、すっごく楽しかった！"
16014-740 = "また一緒に来ようね！\n約束だよ！"
16014-750 = "うん？\nイブキは売ってないよ～？"
16014-760 = "えっと、イブキはね！\nあれがいいと思う！"
16014-770 = "ご利用、\nありがとうございました～！"
16014-780 = "また来てね！先生！"
16014-790 = "プレゼント用……？\nもしかして……イブキに？"
16014-800 = "それ！イブキも好き！"
16014-810 = "わっ！イブキ、初めて見た！\nそんなのもあったんだね！"
