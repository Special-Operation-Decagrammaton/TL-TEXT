[translation]
16014-710 = "Bem-vindo, Sensei~! \nHehehe!"
16014-720 = "Está procurando alguma coisa? \nIbuki também vai te ajudar!"
16014-730 = "Ibuki se divertiu muito \ndançando com o Sensei na festa!"
16014-740 = "Vamos vir juntos de novo! \nÉ uma promessa!"
16014-750 = "Hm? \nIbuki não está à venda, sabia?"
16014-760 = "Bem, a Ibuki acha que... \nAquilo ali é bom!"
16014-770 = "Obrigada por \nsua preferência~!"
16014-780 = "Volte sempre, Sensei!"
16014-790 = "É um presente...? \nSerá que... é para a Ibuki?"
16014-800 = "Isso! A Ibuki também gosta disso!"
16014-810 = "Uau! É a primeira vez que a Ibuki vê isso! \nEu nem sabia que existia!"
