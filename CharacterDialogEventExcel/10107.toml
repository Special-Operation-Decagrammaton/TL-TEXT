[translation]
10107-450 = "わ～！お楽しみがいっぱい！"
10107-460 = "先生！こっちです！私の隣！"
10107-470 = "先生の席、とってありますよ～！"
10107-480 = "は～い！お呼びですか～？"
10107-490 = "次号に使えそうな写真、撮っていきますよ～"
10107-500 = "先生、あ～んしてください！"
10107-510 = "はいっ、今のは「万魔殿特製チョコ」でした！"
10107-520 = "どうですか？甘くておいしいですよね！"
10107-530 = "素敵な音楽も、美味しい料理も好きですけど…"
10107-540 = "やっぱり、先生と一緒だとなんか違いますね！"
