[translation]
10107-1300 = "Uau!\nTem tanta coisa\ndivertida!"
10107-1310 = "Sensei!\nÉ por aqui!\nBem do meu lado!"
10107-1320 = "Eu reservei o lugar\ndo Sensei!"
10107-1330 = "Está super animado, né!"
10107-1340 = "Sensei,\nestá se divertindo?"
10107-1350 = "A festa divertida\nestá chegando ao fim!"
10107-1360 = "Vamos aproveitar\naté o último segundo!"
10107-1370 = "Aconteceram\nvárias coisas, mas..."
10107-1380 = "Foi um tempo\nincrivelmente divertido!"
10107-1390 = "Oi!\nVocê me chamou?"
10107-1400 = "Vou tirar umas fotos\nque podemos usar\nna próxima edição."
10107-1410 = "Sensei, diga\n'ah'!"
10107-1420 = "Pronto, isso foi\n'chocolate especial\ndo Pandemonium'!"
10107-1430 = "O que achou?\nÉ doce e\ngostoso, né!"
10107-1440 = "Eu gosto de músicas\nmaravilhosas e de\ncomidas deliciosas, mas..."
10107-1450 = "No fim das contas,\nquando estou com o Sensei,\né algo diferente!"
