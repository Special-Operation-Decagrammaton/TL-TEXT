[translation]
10137-10 = "Ei, Tsuchinoko!\nOnde você está!?"
10137-20 = "Se eu te pegar, eu vou...\n...te dar uma lição..."
10137-30 = "Ugh... que medo..."
10137-40 = "Por que esse tipo de assédio...\n— Hii!?\nQ-quem está aí...?"
10137-50 = "Mesmo que seja um fantasma, se eu puder\nprendê-lo com algemas...!"
10137-60 = "Terminamos em segurança! O destino\nnão é nada difícil!\nHahaha—"
10137-70 = "N-não! Esquece o que eu disse!\nÉ difícil sim!\nMe desculpa!!"
10137-80 = "H-hya!? ...Nossa,\nque susto!"
10137-90 = "Ufa... pelo menos o ar aqui\né bom."
10137-100 = "Tsuchinoko! Se eu te pegar,\nnão vou te deixar escapar de jeito nenhum!"
10137-110 = "Mente calma... mente calma..."
10137-430 = "Vamos lá!\nVamos continuar avançando!!"
10137-440 = "Como foi a sorte de hoje?\nEu acredito na sua sorte,\nSensei!"
10137-450 = "Hora da limpeza!\nVamos dar o nosso melhor até o fim!"
10137-460 = "Você vai dividir\na sua sorte comigo?\nEba!"
10137-470 = "Como estou com o Sensei,\nvai dar tudo certo!"
10137-480 = "Uau! É isso aí!"
10137-490 = "Que sorte incrível, hein!?\nSensei, você é demais!"
10137-500 = "Seria bom se fosse assim todos os dias~"
10137-510 = "Vou investigar até o fim,\npor via das dúvidas!"
