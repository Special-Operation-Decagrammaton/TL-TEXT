[translation]
10137-10 = "Hey, Tsuchinoko!\nWhere are you!?"
10137-50 = "If I can slap handcuffs on a ghost,\nthen I'll do it...!"
10137-60 = "We finished safely! Fate\nis a piece of cake!\nHahaha—"
10137-80 = "Eek!? ...Geez, you scared me!"
10137-90 = "Phew... the air here is at least\npretty nice."
10137-100 = "Tsuchinoko! Once I catch you,\nI'm never letting you go!"
10137-110 = "Stay calm... stay calm..."
10137-430 = "Alright!\nLet's keep going!!"
10137-440 = "How was your fortune today?\nI believe in your luck,\nSensei!"
10137-450 = "Cleanup time!\nLet's give it our all until the end!"
10137-460 = "You're going to share\nyour luck with me?\nYes!"
10137-470 = "I'm with Sensei, so\nwe'll be fine!"
10137-480 = "Ooh! This is the stuff!"
10137-490 = "You're incredibly lucky, aren't you!?\nSensei, you're seriously amazing!"
10137-500 = "I wish every day was like this~"
10137-510 = "I'll investigate until the end,\njust in case!"