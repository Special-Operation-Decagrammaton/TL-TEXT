[translation]
10137-10 = "ツチノコやーい！\nどこだー！？"
10137-20 = "捕まえたらた\nだじゃおかな……"
10137-30 = "ううっ……怖っ……。"
10137-40 = "なんでこんな嫌がらせ\nみたいな――ひっ！？\nだっ、誰……？"
10137-50 = "お化けだろうが手錠を\nかけられるなら……！"
10137-60 = "無事終わったっすね！運命\nなんてちょろいもんっす！\nはっはっはっ――"
10137-70 = "い、いや！今のなし！\nちょろくないっす！\nごめんなさい！！"
10137-80 = "ひ、ひゃっ！？……って、\nビックリした！"
10137-90 = "ふぅ……ここ、空気だけは\n美味しいんすよね。"
10137-100 = "ツチノコー！捕まえたら\n絶対に逃がさないっす！"
10137-110 = "平常心……平常心……。"
10137-430 = "さあ！\nどんどんいくっすよ！！"
10137-440 = "今日の占いはどうでした？\n先生の運勢を\n信じてますよ！"
10137-450 = "後片づけタイム！\n最後まで気張ってくっすよ！"
10137-460 = "運勢、\n分けてくれるんすか？\nやったぁ！"
10137-470 = "先生と一緒だし\nなんとかなるっす！"
10137-480 = "くぅー！これこれ！"
10137-490 = "すっごいツイてますね！？\n先生、マジパないっす！"
10137-500 = "毎日こうならいいんすけどね～"
10137-510 = "一応、最後まで調べて\nみるっすよ！"
