[translation]
10137-10 = "Aparece, Tsuchinoko!\nCadê você!?"
10137-20 = "Se eu te pegar, você\nvai ver só..."
10137-30 = "Uugh... que medo..."
10137-40 = "Por que isso parece\naté assédio―― Hiii!?\nQ-Quem tá aí...?"
10137-50 = "Mesmo que seja um fantasma, se\nder pra colocar algemas nele...!"
10137-60 = "Acabou tudo bem! O destino\né moleza!\nHahaha――"
10137-70 = "N-Não! Esquece o que eu disse!\nNão é moleza não!\nMe desculpa!!"
10137-80 = "H-Hyaah!? ...Poxa,\nque susto!"
10137-90 = "Ufa... Pelo menos o ar puro\ndaqui é gostoso."
10137-100 = "Tsuchinoko! Se eu te pegar,\ncom certeza não vou te deixar escapar!"
10137-110 = "Mantenha a calma... mantenha a calma..."
10137-430 = "Bora!\nVamos continuar mandando ver!!"
10137-440 = "Como estava o horóscopo hoje?\nEu acredito\nna sua sorte, Sensei!"
10137-450 = "Hora da faxina!\nVamos aguentar firme até o fim!"
10137-460 = "Você vai dividir\na sua sorte comigo?\nAee, valeu!"
10137-470 = "Já que eu tô com o Sensei,\na gente dá um jeito!"
10137-480 = "Kuuuh! É disso que eu tô falando!"
10137-490 = "Você tá com uma sorte incrível!?\nSensei, você é incrível demais!"
10137-500 = "Seria tão bom se fosse assim todo dia~"
10137-510 = "Por via das dúvidas, vou investigar\naté o finalzinho!"