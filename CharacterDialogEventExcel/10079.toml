[translation]
10079-10 = "Acho que já está na hora\nde começar."
10079-20 = "Estou pronta.\nE você, Sensei?"
10079-30 = "Progredimos bastante, hein."
10079-40 = "Parece que já terminamos\nquase tudo, né?"
10079-50 = "Dê uma olhada\nmais uma vez, só por precaução."
10079-60 = "……Hm?\nChamou por algo?"
10079-70 = "Ah, era só\nbrincadeira?"
10079-80 = "Você não tem\noutras coisas para fazer?"
10079-90 = "Ai, ai...\nTá bom, tá bom.\nQuer que eu ajude em algo?"
10079-380 = "Nos encontramos de novo, Sensei.\nQuer dar uma girada?"
10079-390 = "Não parece bom?\nTalvez saia algo legal agora."
10079-400 = "Ei, se ainda sobrou algo,\npor que não gira tudo\nantes que seja tarde demais?"
10079-410 = "É um desperdício, sabia?"
10079-420 = "Não é em mim que você tem que apertar,\né ali!"
10079-430 = "Ahahaha!\nQ-que isso!?\nFaz cócegas!!"
10079-440 = "Ora, você tirou a sorte grande!\nParabéns!"
10079-450 = "Isso aqui,\nnão é bem raro?"
10079-460 = "Não é uma\ncoisa bem legal?"
10079-470 = "Acho que terminamos por aqui.\nBom trabalho, Sensei!"
