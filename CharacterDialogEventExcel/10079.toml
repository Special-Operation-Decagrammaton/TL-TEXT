[translation]
10079-10 = "そろそろ\n始めようかしら。"
10079-20 = "私は準備オッケー。\n先生は？"
10079-30 = "かなり進んだわね。"
10079-40 = "もうほとんど\n終わった感じよね？"
10079-50 = "一応、もっかい\n確認してみて。"
10079-60 = "……ん、\nなんか呼んだ？"
10079-70 = "なんだ、\n冷やかしか。"
10079-80 = "他にやんなきゃ\nいけない事、\nあるんじゃないの？"
10079-90 = "はあ……\nわかった、わかった。\n何か手伝おうか？"
10079-380 = "また会ったわね、先生。\nちょっと回していく？"
10079-390 = "いい感じじゃない？\n今ならいいの出るかもね。"
10079-400 = "ほら、まだ残ってるなら\n手遅れになる前に\n全部回したら？"
10079-410 = "もったいないわよ。"
10079-420 = "私じゃなくて\nあっち押しなさいよ！"
10079-430 = "あははは！\nな、なに！？\nくすぐったい！！"
10079-440 = "あら、当たりじゃない！\nおめでと！"
10079-450 = "これ、\n結構レアなんじゃない？"
10079-460 = "そこそこ\nいいものなんじゃない？"
10079-470 = "これで大体終了かな。\nお疲れ様、先生！"
