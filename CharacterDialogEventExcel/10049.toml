[translation]
10049-10 = "おかえり、先生。\n今日もよろしくね。"
10049-20 = "ほら、早く行こう。\nやることが山積みだよ。"
10049-30 = "ん、どうしたの？"
10049-40 = "心配しなくても、\nどっか行ったり\nしないよ。"
10049-50 = "……くすぐったいってば。"
10049-60 = "ああもう、ほら！\nやる事やって！"
10049-70 = "心配しなくても、\nどっか行ったり\nしないよ。"
10049-80 = "……くすぐったいってば。"
10049-90 = "ああもう、ほら！\nやる事やって！"
10049-100 = "さて、何が\n出てくるのかな？"
10049-110 = "さあ、\nたくさん回そっか。"
10049-120 = "えっ、私が代わりに\n回していいの？"
10049-130 = "先生、私じゃなくて\nこっちを見てよ。"
10049-140 = "お……すごいね、\nおめでとう"
10049-150 = "かなり良さそうだね、\nうん"
10049-160 = "あ、何か\nすごそうなものが……"
10049-170 = "まだ交換できる\nものがないか、\nちゃんと見ておいてね。"
