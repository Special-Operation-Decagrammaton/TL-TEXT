[translation]
23006-170 = "É a venda itinerante da Hyakkiyako!
Vamos lá, mestre,
o que você precisa?"
23006-180 = "Ah, Sensei!
Seja bem-vindo!"
23006-190 = "Vamos, vamos,
fique à vontade para olhar o quanto quiser!"
23006-200 = "O festival já acabou,
mas nós ainda estamos
abertos para negócio."
23006-210 = "Dizem que há sorte nas sobras,
então, vamos lá, Sensei, fique à vontade!"
23006-220 = "Mesmo durante o festival,
ou melhor, justamente por ser o festival,
a Hyakkiyako não para!"
23006-230 = "……Bem, como nós também somos
o comitê organizador do festival,
isso é natural, né? Hehe."
23006-240 = "Certo, então aqui vai...
Moe moe~ kyun♪"
23006-250 = "……Eh,
isso é um pouco antigo?
Sério mesmo!?"
23006-260 = "Ah, isso...! N-não, não,
pode levar, pode levar. Não é como se eu estivesse pensando em ficar com o que sobrasse...!"
23006-270 = "Escolher isso...
como esperado do Sensei!
Você tem um ótimo olho!"
23006-280 = "Obrigada pela compra,
mestre♪"
23006-290 = "Ah, você também acha que esse é um bom item, né? Ehehe."
