[translation]
23006-170 = "百夜堂の出張販売です！\nさあご主人様、\n必要な物は何でしょうか？"
23006-180 = "あ、先生！\nいらっしゃいませ～！"
23006-190 = "さあさあ、お好きなだけ\n見ていってください！"
23006-200 = "お祭りは終わって\nしまいましたが、\nまだまだ営業中です。"
23006-210 = "残り物には福があるって\n言いますから、\nさあ先生、どうぞ！"
23006-220 = "お祭りでも、\nいえお祭りだからこそ、\n百夜堂は止まりませんよ！"
23006-230 = "……まぁ、私たちは同時に\nお祭り運営委員会でもあるので、\n当たり前なんですけどね、えへっ。"
23006-240 = "よし、ここは……\n萌え萌え～、キュン♪"
23006-250 = "……えっ、\nこれちょっと古いんですか？\nそうなんですか！？"
23006-260 = "あっ、それ…！い、いえいえ、\nどうぞどうぞ。別に余ったら\n貰おうとか思っていたわけではなく…！"
23006-270 = "それを選ぶとは、\nさすが先生！\nお目が高いです！"
23006-280 = "お買い上げ\nありがとうございます、\nご主人様♪"
23006-290 = "あ、それやっぱり良い品だと\n思いますよね？えへへっ。"
