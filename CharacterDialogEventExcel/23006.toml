[translation]
23006-170 = "É a venda itinerante da Hyakkiyako!\nVamos lá, mestre,\no que você precisa?"
23006-180 = "Ah, Sensei!\nSeja bem-vindo!"
23006-190 = "Vamos, vamos,\nfique à vontade para olhar o quanto quiser!"
23006-200 = "O festival já acabou,\nmas nós ainda estamos\nabertos para negócio."
23006-210 = "Dizem que há sorte nas sobras,\nentão, vamos lá, Sensei, fique à vontade!"
23006-220 = "Mesmo durante o festival,\nou melhor, justamente por ser o festival,\na Hyakkiyako não para!"
23006-230 = "……Bem, como nós também somos\no comitê organizador do festival,\nisso é natural, né? Hehe."
23006-240 = "Certo, então aqui vai...\nMoe moe~ kyun♪"
23006-250 = "……Eh,\nisso é um pouco antigo?\nSério mesmo!?"
23006-260 = "Ah, isso...! N-não, não,\npode levar, pode levar. Não é como se eu estivesse pensando em ficar com o que sobrasse...!"
23006-270 = "Escolher isso...\ncomo esperado do Sensei!\nVocê tem um ótimo olho!"
23006-280 = "Obrigada pela compra,\nmestre♪"
23006-290 = "Ah, você também acha que esse é um bom item, né? Ehehe."
