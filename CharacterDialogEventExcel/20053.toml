[translation]
20053-10 = "Если я отправляюсь на миссию по проникновению,\nстоит ли мне взять рисовый шарик или сухпаёк в таблетках...?"
20053-20 = "Хм? Сенсей!\nДобро пожаловать!"
20053-30 = "Сенсей...\nА это отличный наряд."
20053-40 = "Такой образ\nтоже выглядит довольно свежо."
20053-50 = "Гха-а-а! Зачем вы начинаете драку\nпрямо на модном показе!?"
20053-60 = "Я хочу увидеть Цукуё..."
20053-70 = "Интересно, как она там...\nНадеюсь, она нормально\nкушает свой рамен..."
20053-80 = "Клуб изучения ниндзюцу\nполностью возрождён!"
20053-90 = "Сенсей, ты тоже!\nИди сюда!"
20053-100 = "Мне так скучно..."
20053-110 = "Хм? Ты говоришь, что если я так скажу,\nто обязательно что-нибудь случится?"
20053-120 = "Угх... оно такое\nтесное, в нём так тяжело двигаться..."
20053-130 = "И что все только нашли\nв этой шмотке!?"
20053-140 = "Одежда не определяет\nниндзя..."
20053-150 = "Но если так, то что вообще делает\nниндзя ниндзя...!?"
20053-160 = "Смотри внимательно...! Даже платье"
20053-170 = "не станет помехой\nдля ниндзя...!"
20053-330 = "Добро пожаловать, Сенсей!\nОсматривайся не спеша."
20053-340 = "О! Но насчёт этого товара, по моему мнению —"
20053-350 = "У нас есть вообще всё,\nкроме того, чего у нас нет! Хехехе!"
20053-360 = "Хехехе~ Давай закроемся пораньше\nи пойдём поедим новых\nниндзя-обедов!"
20053-370 = "Выбирай тщательно,\nпокупай смело...!"
20053-380 = "Таково правило\nпри покупке мерча...!"
20053-390 = "Когда-нибудь здесь будет продаваться\nмерч по «Хроникам юного ниндзя Мичиру-ти»...!"
20053-400 = "О~ так ты выбрал именно это.\nХороший выбор, не так ли?"
20053-410 = "Именно! Если ты ниндзя,\nты обязан выбрать это!"
20053-420 = "Хочешь, я подогрею это..."
20053-430 = "Ах, моя ошибка."
20053-440 = "Ох...! Это действительно!\nРекомендация высшего разряда!"
20053-450 = "Ну, хотя у нас тут всё\nвысшего разряда!"
20053-460 = "О, Сенсей тоже пришёл!"
20053-470 = "...Я? Да я просто\nникак не могу решить, какой взять."
20053-480 = "Ммм~ какой приятный запах —"
20053-490 = "Но дело ведь не только в этом! \nЧто ж, пошли!"
20053-500 = "Спасибо за угощение...\nВ меня больше ни капли не влезет..."
20053-510 = "Лапша и бульон...\nОни прямо как ниндзя и ниндзюцу..."
20053-520 = " А какой рамен любишь ты, Сенсей?"
20053-530 = "Ох...!"
20053-540 = "Этого вкуса достаточно, чтобы вдохновить\nна новое ниндзюцу...!!"
20053-550 = "Няа...!?\nЭ-этот вкус...!"
20053-560 = "Хмм, а весьма неплохо...?"
20053-570 = "То есть неплохо... совсем неплохо...\nПравда, вот и всё..."
20053-580 = "Эх... это\nправда рамен...?"