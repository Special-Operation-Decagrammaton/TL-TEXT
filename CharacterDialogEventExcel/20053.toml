[translation]
20053-10 = "Se for levar para uma\nmissão de infiltração,\nseria um onigiri ou uma pílula de ração—"
20053-20 = "Hm? Mestre!\nBem-vindo!"
20053-30 = "Mestre……\nQue visual legal."
20053-40 = "Esse estilo também\né refrescante, né."
20053-50 = "Aaaah! Por que vocês começaram\na lutar durante um\ndesfile de moda!?"
20053-60 = "Quero ver a Tsukuyo……."
20053-70 = "Será que ela está bem……\nEspero que ela esteja\nconseguindo comer seu lámen……."
20053-80 = "O Clube de Pesquisa de Ninjutsu,\nretornou completamente!"
20053-90 = "Mestre também!\nVenha por aqui!"
20053-100 = "Estou tão entediada……."
20053-110 = "Hm? Se eu disser isso,\ncom certeza algo vai acontecer, né?"
20053-120 = "Ugh…… isso aqui,\né apertado e difícil de se mover……."
20053-130 = "O que todo mundo vê\nde bom nisso!?"
20053-140 = "As roupas não definem\no que é um ninja……"
20053-150 = "Sendo assim, o que torna\num ninja um ninja……!?"
20053-160 = "Observe bem……!\nUm vestido como este,"
20053-170 = "para um ninja,\nnão é obstáculo nenhum……!"
20053-330 = "Bem-vindo, Mestre!\nFique à vontade para olhar."
20053-340 = "Ah! Mas, sobre este produto,\no que eu acho é――"
20053-350 = "Tirando o que não tem,\nnós temos de tudo! Fufufu!"
20053-360 = "Fufun~ Vamos fechar logo,\npara irmos comer o\nnovo menu ninja!"
20053-370 = "Escolha com cautela,\ncompre com ousadia……!"
20053-380 = "Essa é a regra de ouro\nna hora de comprar itens……!"
20053-390 = "Algum dia, terei aqui,\nprodutos da Michiru-chi,\na garota ninja……!"
20053-400 = "Oh~ então é esse.\nBoa escolha, não é?"
20053-410 = "Isso! Se você é um ninja,\ntem que escolher esse!"
20053-420 = "Vou esquentar isso para……"
20053-430 = "Ah, me enganei."
20053-440 = "Oh……! Esse é, sem dúvida!\nO produto mais recomendado!"
20053-450 = "Bem, na verdade, todos\nsão recomendados!"
20053-460 = "Ah, o Mestre também veio!"
20053-470 = "……Eu? Estava pensando\nem qual escolher."
20053-480 = "Hmm~ que cheiro bom――"
20053-490 = "Não é só isso, mas!\nBem, vamos nessa!"
20053-500 = "Estava uma delícia……\nNão cabe mais nada……."
20053-510 = "Macarrão e sopa……\nIsso é exatamente como ninja e ninjutsu……."
20053-520 = "Mestre, que tipo de lámen você gosta?"
20053-530 = "Oh……!"
20053-540 = "Este sabor me faz ter\nideias para um novo ninjutsu……!!"
20053-550 = "Unya……!?\nE-este sabor é……!"
20053-560 = "Hmm, nada mal……?"
20053-570 = "Não é ruim, mas…… não é ruim……\nSério, é só isso……."
20053-580 = "Eh…… isso aqui,\né lámen……?"
