[translation]
20056-790 = "だ、誰！？"
20056-800 = "……あっ、\n先生だったんですね！！"
20056-810 = "来てくれたんですね、\n先生！"
20056-820 = "セッティングは\n終わってるんで、"
20056-830 = "とりあえず\n座ってください！"
20056-840 = "来ちゃいましたね！"
20056-850 = "やっぱり\n我慢できませんでしたね？\nね！？"
20056-860 = "ふふっ、\n私に任せてください。"
20056-870 = "脱出は\n私の十八番ですから！"
20056-880 = "なんか色々あった\n気がするけど……。"
20056-890 = "ま、とりあえず今夜は"
20056-900 = "朝まで\n遊び\n倒しちゃいましょう……！"
20056-910 = "……って、言いたいところ\n……なんですけど"
20056-920 = "……にはっ"
20056-930 = "どうですか？\nこの触り心地……\nふわふわでしょ？"
20056-940 = "助けに\n来てくれたんですね、\n先生！"
20056-950 = "え、先生も\n捕まっちゃったん\nですか！？"
20056-960 = "このボードゲーム\nおかしいですよ！"
20056-970 = "毎回私の番で\n爆発するんですけど！！"
20056-980 = "うう……\nすし詰めの反省部屋……"
20056-990 = "ま、こういうのも悪く\nないかも……？"
