[translation]
20056-790 = "Q-quem é!?"
20056-800 = "……Ah, era você, Sensei!!"
20056-810 = "Você veio, Sensei!"
20056-820 = "A preparação já está pronta,"
20056-830 = "então, por favor, sente-se!"
20056-840 = "Você acabou vindo, não é!"
20056-850 = "Você não conseguiu se segurar, né? Não conseguiu!?"
20056-860 = "Hehe, pode deixar comigo."
20056-870 = "Escapar é a minha especialidade!"
20056-880 = "Sinto que aconteceram várias coisas, mas..."
20056-890 = "Bem, por hoje à noite,"
20056-900 = "vamos nos divertir até o amanhecer...!"
20056-910 = "...É o que eu gostaria de dizer, mas..."
20056-920 = "...Atchim!"
20056-930 = "O que achou? Essa sensação ao tocar... é bem fofinha, né?"
20056-940 = "Você veio me salvar, Sensei!"
20056-950 = "Ei, você também foi capturado, Sensei!?"
20056-960 = "Esse jogo de tabuleiro é estranho!"
20056-970 = "Toda vez que chega a minha vez, ele explode!!"
20056-980 = "Uuu... uma sala de reflexão apertada como uma lata de sardinha..."
20056-990 = "Bem, talvez isso não seja tão ruim assim...?"
