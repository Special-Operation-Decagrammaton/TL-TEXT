[translation]
10132-180 = "Sensei……！？\nEste vestido…… será que\nestá estranho……?"
10132-190 = "Bem-vindo de volta,\nSensei……."
10132-200 = "Bem, \neste visual, \né que……."
10132-210 = "O que exatamente……\nestá acontecendo……?"
10132-220 = "Estar no palco……\né algo misterioso."
10132-230 = "Mesmo sendo vista\npor tantas pessoas……"
10132-240 = "Há momentos em que\nsinto solidão……."
10132-250 = "Pessoal……! Eu……\nestou de volta……!"
10132-260 = "Será que eu……\nsou digna deste\nfigurino……?"
10132-270 = "Afinal, \nestou chamando muita atenção,\nnão estou……?"
10132-280 = "Uuu……\nEu sou uma ninja, afinal……."
10132-290 = "E-e-e-estou bonita,\npor acaso……!?"
10132-300 = "Hyaaaaa……."
10132-310 = "Se eu pensar que\nesta roupa também é,"
10132-320 = "uma técnica de disfarce……\nentão tudo bem."
10132-590 = "Eu resumi as coisas\nque precisam ser feitas……."
10132-600 = "Nenhuma delas é fácil,\nmas……"
10132-610 = "Se for o Sensei, com certeza……!"
10132-620 = "Hum……\nO que eu resumi……\nteve algum problema……?"
10132-630 = "Sensei……?\nO que houve……?"
10132-640 = "Como esperado……!"
10132-650 = "Eu sabia que o Sensei\nconseguiria……!"
10132-660 = "Incrível……!\nSerá que o Sensei também tem\ntalento para ninja……!?"
10132-670 = "Bom trabalho……!\nFoi um final maravilhoso!"
