[translation]
10132-180 = "Сенсей...!?\nЭто платье... правда\nтакое странное...?"
10132-190 = "С возвращением,\nСенсей..."
10132-200 = "Эм,\nэтот наряд,\nну..."
10132-210 = "Что же вообще...\nпроисходит...?"
10132-220 = "Быть на сцене — это...\nтак непривычно."
10132-230 = "Хотя на меня смотрит\nстолько людей..."
10132-240 = "Бывают моменты, когда мне...\nтак одиноко..."
10132-250 = "Все...! Я...\nвернулась...!"
10132-260 = "Правда ли я...\nдостойна носить\nэтот наряд...?"
10132-270 = "Я ведь слишком сильно выделяюсь,\nда...?"
10132-280 = "Угх...\nИ это называется ниндзя..."
10132-290 = "Т-т-т-ты говоришь, что я выгляжу красивой...!?"
10132-300 = "Хья-а-а-а-а..."
10132-310 = "Если я буду думать об этом наряде как..."
10132-320 = "о технике превращения,\nтогда..."
10132-590 = "Я составила список дел,\nкоторые необходимо выполнить..."
10132-600 = "Ни одно из них не будет простым,\nно..."
10132-610 = "Я уверена, ты справишься, Сенсей...!"
10132-620 = "Эм...\nЧто-то не так...\nс моим списком...?"
10132-630 = "Сенсей...?\nЧто-то случилось...?"
10132-640 = "Как я и думала...!"
10132-650 = "Я знала, что ты справишься,\nСенсей...!"
10132-660 = "Это потрясающе...!\nУ тебя тоже талант к ниндзюцу, Сенсей...!?"
10132-670 = "Отличная работа...!\nЭто был чудесный финал!"