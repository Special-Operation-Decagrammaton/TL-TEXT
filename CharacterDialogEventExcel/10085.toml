10085-190 = "...É, pelo visto você é mesmo uma pessoa extrovertida, Sensei."
10085-200 = "A-apareceu um urso por perto...?"
10085-210 = "É realmente seguro ficar aqui?"
10085-220 = "Passamos por maus bocados, mas de vez em quando, esse tipo de experiência não é..."
10085-230 = "D-de vez em quando, se for realmente só de vez em quando...!"
10085-240 = "A loja de conveniência mais próxima fica... depois daquela montanha..."
10085-250 = "(O Wi-Fi... sumiu?)"
