[translation]
10085-100 = "寒い…早く暖かい\n室内に戻りたい…。"
10085-110 = "こんな時期に\nキャンプだなんて…"
10085-120 = "副部長、ひどい。"
10085-130 = "一番近いコンビニが…\nあの山の先…。"
10085-140 = "（Wi-Fiが…消えた？）"
10085-150 = "暖かいエナドリ…"
10085-160 = "普段なら論外だけど、\n今日だけは、\nあってもいいかも…。"
10085-170 = "先生も大変だね。\n年末なのに、\nこんなところまで\n連れて来られちゃって。"
10085-180 = "え？\n今の状況も楽しい…？"
10085-190 = "…やっぱり先生は、\n陽キャだったかぁ。"
10085-200 = "ち、近くに\n熊が出たの…？"
10085-210 = "ここにいて\n本当に大丈夫？"
10085-220 = "大変な思いをしたけど、\nたまにはこういう\n経験も悪くな…"
10085-230 = "た、たまには、\n本当に、たまになら…！"
10085-240 = "一番近いコンビニが…\nあの山の先…。"
10085-250 = "（Wi-Fiが…消えた？）"
10085-260 = "暖かいエナドリ…"
10085-270 = "普段なら論外だけど、\n今日だけは、\nあってもいいかも…。"
10085-280 = "先生も大変だね。\n年末なのに、\nこんなところまで\n連れて来られちゃって。"
10085-290 = "え？\n今の状況も楽しい…？"
10085-300 = "…やっぱり先生は、\n陽キャだったかぁ。"
10085-310 = "…先生も副部長に\n言われてきたの？"
10085-320 = "よかったら、ちょっと\n手伝ってもらっても、いい…？"
10085-330 = "う、うわっ！\n…あ、先生…。"
10085-340 = "ごめん、熊かと思って…。"
10085-350 = "片付けはしっかりしないと。"
10085-360 = "あとで副部長に\n怒られたら、いやだし。"
10085-370 = "採集…これがゲームなら\n1タップで終わったのに…。"
10085-380 = "どうしたの？\n服になんかついてる？"
10085-390 = "そうだね、これならいけそう。"
10085-400 = "これを私に？"
10085-410 = "ありがとう、私が\n集めたものもあげる。"
10085-420 = "もうこんなに集めたの？"
10085-430 = "…先生って、キャンプの\n才能があるんだね…。"
10085-440 = "あ、先生。いま、\nカレー作ってたところ。"
10085-450 = "ぶくぶくしてる\n鍋を見てると…"
10085-460 = "なんか和む気がする。"
10085-470 = "カレーの準備は\nできたけど…"
10085-480 = "他に入れたい具材が\nあれば、言って。"
10085-490 = "ん…これ、ちゃんと\n出来てるのかな。"
10085-500 = "先生、味見してくれる？"
10085-510 = "カレーの隠し味に\nチョコを入れることも\nあるみたい。"
10085-520 = "…それなら\nエナドリを入れても…。"
10085-530 = "あっ…！\nすごく美味しい！"
10085-540 = "カレーでこんな味が\n出せるなんて…。"
10085-550 = "うん、これは美味しい。"
10085-560 = "レトルトカレーと\n比べたら、まあまあ\n美味しいかも。"
10085-570 = "い、印象深い味、\nだね…。"
10085-580 = "うっ…ごめん、これは、\n食べられない…。"
