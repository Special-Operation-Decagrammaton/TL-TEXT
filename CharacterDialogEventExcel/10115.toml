[translation]
10115-190 = "Professor! Você gosta de beisebol?"
10115-200 = "Eu adoro!"
10115-210 = "Hoje é um jogo\nimportante!"
10115-220 = "Não, na verdade, não existe\njogo que não seja importante!"
10115-230 = "Um clima tenso..."
10115-240 = "Mas eu acredito! Vamos virar\nesse jogo agora mesmo!"
10115-250 = "No beisebol, o jogo\ncomeça de verdade na parte\nbaixa da 9ª entrada com 2 eliminados!"
10115-260 = "A deusa da sorte sorri\npara aqueles que não\nnegligenciam a preparação!"
10115-270 = "Não consigo acreditar..."
10115-280 = "Eu... eu fiz um\nhome run..."
10115-290 = "Beisebol é... realmente\nincrível, não é?"
10115-300 = "Se tiver alguma dúvida\nsobre as regras, pode\nme perguntar!"
10115-310 = "...Eu estava olhando\nos registros das partidas."
10115-320 = "Dizem que antigamente, esses\nregistros enormes eram\nadministrados em papel."
10115-330 = "...Hoje em dia, é\ninimaginável, não é?"
10115-340 = "Uau, faz\ncosquinha!"
10115-350 = "Professor! Não toque\nem lugares estranhos!"
10115-360 = "Poxa... estamos no meio\nde um jogo, sabia...!?\nTem gente olhando!"
10115-370 = "Comida de estádio! Isso\naqui é uma iguaria!"
10115-380 = "Professor, vamos\ncomer alguma coisa!"
10115-390 = "O preço... se você se\npreocupar com isso, já perdeu!"
10115-530 = "Professor! Estão fazendo\num sorteio no estádio!"
10115-540 = "Na verdade, eu acabei\nme voluntariando para\najudar com isso..."
10115-550 = "O sorteio está\nacontecendo agora!"
10115-560 = "Por favor,\nvenha conferir!"
10115-570 = "Como foi? Eu parecia\numa funcionária de verdade?"
10115-580 = "Use todos os seus bilhetes\nde sorteio que sobraram, viu!"
10115-590 = "Parece que vou receber\npelo trabalho também!"
10115-600 = "Hehe, acho que vou\ncomprar uma luva nova!"
10115-610 = "O que se exige de um jogador\né técnica e sorte."
10115-620 = "...Talvez eu não tenha feito\num home run porque\nminha sorte estava ruim!"
10115-630 = "Uau! Primeiro lugar!\nÉ o primeiro lugar!\nIncrível!"
10115-640 = "Segundo lugar! Como\nesperado do professor!"
10115-650 = "É um prêmio de sorte!\nProfessor!"
10115-660 = "Sinto que agora eu\nconseguiria rebater\num home run!"
10115-670 = "Terceiro lugar."
10115-680 = "É sempre bom\nganhar um prêmio!"
10115-690 = "Prêmio de participação, hein..."
10115-700 = "Está tudo bem, professor!\nComo dizem, o que importa\né participar!"
10115-710 = "............Agora, nada\naconteceu. Viu,\nprofessor?"
10115-720 = "O importante é...\ncontinuar todos os dias!"
10115-730 = "É igual ao treino!"
10115-740 = "A rotina também fica\nfácil quando você se acostuma!"
10115-750 = "Com o acúmulo diário,\ndeixa de ser um fardo."
10115-760 = "Dizem que os grandes jogadores planejam tudo, desde a hora de acordar, o menu de treino e até o cardápio,"
10115-770 = "e seguem tudo à risca."
10115-780 = "Eu... não sinto que\nconsigo fazer isso..."
10115-790 = "Pode parecer tarde para dizer isso, mas... o professor é incrível."
10115-800 = "Ir trabalhar de manhã,\nficar o dia todo no serviço..."
10115-810 = "É a mesma coisa que\nir para a escola todo dia...?"
10115-820 = "Mas eu ouvi dizer que ser adulto é muito mais difícil do que a escola, não é?"
10115-830 = "Significa que o esforço valeu a pena, não é!"
10115-840 = "Parabéns, Sensei!"
10115-850 = "Você conseguiu, Sensei!"
10115-860 = "Eu também vou me esforçar para não ficar para trás!"
10115-870 = "Por hoje é só! Bom trabalho!"
10115-880 = "Sensei! Você tem um tempo depois disso?"
