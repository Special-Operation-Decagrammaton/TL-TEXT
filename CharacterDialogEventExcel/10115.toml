[translation]
10115-190 = "先生！\n野球はお好きですか？"
10115-200 = "私は、大好きです！"
10115-210 = "今日は重要な\n試合ですよ！"
10115-220 = "いえ、そうでない\n試合などありませんが！"
10115-230 = "不穏な空気……"
10115-240 = "でも、私は信じてます！\n今からでも逆転劇を\n起こしてやりましょう！"
10115-250 = "野球は\n9回裏2アウトからが\n本番ですよ！"
10115-260 = "準備を怠らない者に、\nチャンスの女神が\nほほ笑むんですから！"
10115-270 = "信じられません……"
10115-280 = "私が……\nホームランを……"
10115-290 = "野球って……\n本当に最高ですね！"
10115-300 = "ルールのことでしたら\nなんでも私に\n聞いてください！"
10115-310 = "……試合記録を\n見ていました。"
10115-320 = "この膨大な記録を、\n昔は紙で管理して\nいたんだそうです。"
10115-330 = "……今では\n考えられない\nですよね……。"
10115-340 = "わわっ、\nくすぐったい！"
10115-350 = "先生！変なところ\n触らないでください！"
10115-360 = "もう……\n試合中ですよ……！？\n人目もありますからね？"
10115-370 = "球場飯！これが\nまた絶品なんですよ！"
10115-380 = "先生、何か\n食べましょう！"
10115-390 = "値段は……\n気にしたら負けです！"
10115-530 = "先生！スタジアムで\n抽選会をやってます！"
10115-540 = "実は私、その\n手伝いをすることに\nなりまして……。"
10115-550 = "ただいま、抽選会\n開催中です！"
10115-560 = "どうぞ\nお立ち寄りください！"
10115-570 = "どうでした？\nスタッフっぽ\nかったですか？"
10115-580 = "余ってる抽選券、全部\n使ってってくださいね！"
10115-590 = "ちゃんとバイト代も\n出るみたいです！"
10115-600 = "へへ、グローブ、\n買い替えよっかな！"
10115-610 = "選手に求められるのは、\nテクニックと、運です。"
10115-620 = "……ホームランが\n打てなかったのは、\n運が悪かったからかも！"
10115-630 = "うわあ！1等賞！\n1等賞ですよ！\nすごいです！"
10115-640 = "2等賞ですね！\nさすがです、先生！"
10115-650 = "ラッキー賞だそうです！\n先生！"
10115-660 = "なんだか今なら\nホームランが\n打てそうな気がします！"
10115-670 = "3等賞ですね。"
10115-680 = "賞があるのは\n良いことです！"
10115-690 = "参加賞かぁ……"
10115-700 = "大丈夫ですよ、先生！\n参加することに\n意義がある、って\n言うじゃないですか！"
10115-710 = "…………いま、何も\n起きませんでした。\nね？先生？"
10115-720 = "大切なのは……\n毎日コツコツ続けること！"
10115-730 = "練習と同じですね！"
10115-740 = "ルーティンも、\n慣れれば大丈夫です！"
10115-750 = "毎日の積み重ねで\n苦にならなくなりますよ。"
10115-760 = "偉大な選手は起床時間から\n訓練メニュー、果ては献立一つに\n至るまで全てスケジュールし、"
10115-770 = "その通りにこなすそうです。"
10115-780 = "私には……\nできる気がしません……。"
10115-790 = "今更ですけど……\n先生ってすごいんですね。"
10115-800 = "朝出勤して、\n一日中お仕事して……"
10115-810 = "毎日登校するのと一緒……？"
10115-820 = "でも大人は学校の何倍も大変って\n聞きますよ？違うんですか？"
10115-830 = "努力が実を結んだ、って\nことですよね！"
10115-840 = "おめでとう\nございます、先生！"
10115-850 = "やりましたね、先生！"
10115-860 = "私も負けないよう、\n気合入れていきます！"
10115-870 = "今日はここまで！\nお疲れさまでした！"
10115-880 = "先生！このあとお時間、\nありますか？"
