[translation]
10106-150 = "Ah, ah, ah, ah"
10106-160 = "Ah... P-Sensei!?"
10106-170 = "Obrigada por vir,\nSensei."
10106-180 = "Sa-Sakurako,\nestou feliz!"
10106-190 = "Já se passou\nmetade do tempo,\nnão é...?"
10106-200 = "Dizem que o tempo voa\nquando nos divertimos, mas..."
10106-210 = "Sinto como se tivesse\npassado num piscar\nde olhos."
10106-220 = "Hehe, está com\nsaudades de antecipação?"
10106-230 = "...Que coincidência,\ne eu também."
10106-240 = "Sensei,\nprecisa de algo?"
10106-250 = "......Ah, um aperto de mão...?\nÉ isso?"
10106-260 = "Sinto que me tornei mais próxima\nde todos do que quando\nestava com o hábito de irmã."
10106-270 = "Hehe, este traje\ntambém é muito bom."
10106-280 = "Então... você\nprecisa de algo?"
10106-290 = "Ser chamada tantas vezes...\nEu não sei o que\ndeveria fazer."
10106-300 = "Eu tenho uma coreografia\nespecial que estou\npraticando, mas..."
10106-310 = "S-se não se importar,\ngostaria de ver?"
10106-540 = "Organizei as tarefas\ndo Sensei."
10106-550 = "Você chegou,\nSensei."
10106-560 = "Falando nisso, Sensei... agora,\nestamos a sós."
10106-570 = "Eh? N-não... foi só\num comentário,"
10106-580 = "não tem nenhum\nsignificado profundo... mas..."
10106-590 = "Essa roupa combina comigo...? Hehe, obrigada."
10106-600 = "Sim,\nconfirmei aqui."
10106-610 = "Sim, muito bem."
