[translation]
10106-150 = "あーあーあーあー"
10106-160 = "あっ……せ、先生！？"
10106-170 = "お越し下さり\nありがとうございます、\n先生。"
10106-180 = "さ、サクラコ、\n嬉しいです！"
10106-190 = "もう半分が\n過ぎて\nしまったのですね……。"
10106-200 = "素晴らしい時間はあっと\nいう間とは申しますが…"
10106-210 = "あまりにも一瞬で\n過ぎ去ってしまったような\n心地です。"
10106-220 = "ふふっ、\n名残惜しいのですか？"
10106-230 = "…偶然ですね、\n私もです。"
10106-240 = "先生、\n何か御用でしょうか？"
10106-250 = "……あ、握手……\nでしょうか？"
10106-260 = "シスター服の時よりも、\n皆さんと親密に\nなれた気がします。"
10106-270 = "ふふっ、この服装も\n良いものですね。"
10106-280 = "その……何か御用が\nあるのでしょうか？"
10106-290 = "何度も呼ばれると…\nその、何をすれば良いのか\n分かりません。"
10106-300 = "練習中のとっておきの\n振り付けが\nあるのですが……"
10106-310 = "よ、よろしければ\nご覧になりますか？"
10106-540 = "先生の業務を\nまとめておきました。"
10106-550 = "いらっしゃったのですね、\n先生。"
10106-560 = "そういえば、先生……いま、\n二人きりですね。"
10106-570 = "え？い、いえ…言葉通りで、"
10106-580 = "特に深い意味は\nないのです…が…。"
10106-590 = "その服、よく似合ってる……？\nふふ、ありがとうございます。"
10106-600 = "はい、\nこちら確認いたしました。"
10106-610 = "はい、よくできました。"
