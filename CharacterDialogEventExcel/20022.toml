[translation]
20022-210 = "こんにちは、先生！\n新年のお願いは\n決まりましたか？"
20022-220 = "私も隣でお祈りしますね！"
20022-230 = "寒くありませんか？\n温かい食事でも\nいかがでしょう？"
20022-240 = "はい、先生？\nどうかしましたか？"
20022-250 = "このスクーターは\n色々なことに\n使っているんですよ。"
20022-260 = "これまで\n無くなってしまったら…\nどうしましょう…。"
20022-270 = "おせち以外の\nお正月料理にも\n挑戦してみたいです！"
20022-280 = "あっ、でも…作ったものを\n全部食べたら…\n太ってしまいそう…。"
20022-290 = "新年のお願い…\nではありませんが、"
20022-300 = "今年は給食室が\n無事でありますように…。"
20022-340 = "こんにちは、先生！\n新年のお願いは\n決まりましたか？"
20022-350 = "私も隣でお祈りしますね！"
20022-360 = "寒くありませんか？\n温かい食事でも\nいかがでしょう？"
20022-370 = "はい、先生？\nどうかしましたか？"
20022-380 = "このスクーターは\n色々なことに\n使っているんですよ。"
20022-390 = "これまで\n無くなってしまったら…\nどうしましょう…。"
20022-400 = "おせち以外の\nお正月料理にも\n挑戦してみたいです！"
20022-410 = "あっ、でも…作ったものを\n全部食べたら…\n太ってしまいそう…。"
20022-420 = "新年のお願い…\nではありませんが、"
20022-430 = "今年は給食室が\n無事でありますように…。"
20022-440 = "はい…\n今こそ料理の腕前を\n披露するときですね！"
20022-450 = "私、頑張りますから…\n見守ってくださると\n嬉しいです。"
20022-460 = "なんだかすごいことに\nなってしまいましたが、\n私のやることは\n変わりません。"
20022-470 = "ただ最善を尽くす、\nそれだけです。"
20022-480 = "それに…先生がそばに\nいてくださりますから\n百人力です！"
20022-490 = "無事に終わって\n良かったです。"
20022-500 = "その…私の料理、\nお口に合いましたか？"
20022-510 = "先生、いらっしゃいませ。\n商店街の方に色々なものを\n用意していただきました！"
20022-520 = "売り子さんをするの、\n初めてなんです。えへへ。"
20022-530 = "大丈夫ですよ。\n心配しないでください。"
20022-540 = "倉庫の管理でしたら、\nそれなりに自信がありますから。"
20022-550 = "えっ？\n給食部の特製料理、ですか…？"
20022-560 = "もしよろしければ\nお作りしましょうか？"
20022-570 = "あ、それでしたら\n少々お待ちください。"
20022-580 = "そちら、いちおしの商品です！"
20022-590 = "えっと…はい、こちらですね？"
20022-600 = "気に入っていただけましたか？\nまた来てくださいね！"
20022-610 = "お祭りも料理大会も\n終わりましたね。"
20022-620 = "私は明日の下ごしらえが\n残っていますが…\n先生はゆっくりしててくださいね。"
