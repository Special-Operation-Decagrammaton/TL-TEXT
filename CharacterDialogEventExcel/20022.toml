[translation]
20022-210 = "Olá, Sensei! Já decidiu o seu pedido de Ano Novo?"
20022-220 = "Eu também vou rezar ao seu lado!"
20022-230 = "Não está com frio? Que tal uma refeição quentinha?"
20022-240 = "Sim, Sensei? Aconteceu alguma coisa?"
20022-250 = "Eu uso esta scooter para várias coisas."
20022-260 = "Se ela sumisse... o que eu faria..."
20022-270 = "Quero tentar fazer outros pratos de Ano Novo além do Osechi!"
20022-280 = "Ah, mas... se eu comer tudo o que fizer... acho que vou engordar..."
20022-290 = "Não é exatamente um pedido de Ano Novo, mas..."
20022-300 = "Espero que a cozinha da escola fique em segurança este ano..."
20022-340 = "Olá, Sensei! Já decidiu o seu pedido de Ano Novo?"
20022-350 = "Eu também vou rezar ao seu lado!"
20022-360 = "Não está com frio? Que tal uma refeição quentinha?"
20022-370 = "Sim, Sensei? Aconteceu alguma coisa?"
20022-380 = "Eu uso esta scooter para várias coisas."
20022-390 = "Se ela sumisse... o que eu faria..."
20022-400 = "Quero tentar fazer outros pratos de Ano Novo além do Osechi!"
20022-410 = "Ah, mas... se eu comer tudo o que fizer... acho que vou engordar..."
20022-420 = "Não é exatamente um pedido de Ano Novo, mas..."
20022-430 = "Espero que a cozinha da escola fique em segurança este ano..."
20022-440 = "Sim... agora é a hora de mostrar minhas habilidades culinárias!"
20022-450 = "Eu vou dar o meu melhor... ficaria feliz se você pudesse me observar."
20022-460 = "As coisas ficaram um pouco intensas, mas o que eu tenho que fazer não muda."
20022-470 = "Apenas dar o meu melhor, é só isso."
20022-480 = "Além disso... com o Sensei ao meu lado, sinto que tenho a força de cem pessoas!"
20022-490 = "Que bom que terminou tudo bem."
20022-500 = "Diga... a minha comida estava do seu agrado?"
20022-510 = "Bem-vindo, Sensei. O pessoal do centro comercial preparou várias coisas para nós!"
20022-520 = "É a minha primeira vez trabalhando como vendedora. Hehe."
20022-530 = "Está tudo bem. Por favor, não se preocupe."
20022-540 = "Eu tenho bastante confiança na gestão de estoques."
20022-550 = "Ah? A comida especial do Clube de Merenda...?"
20022-560 = "Se quiser, quer que eu prepare para você?"
20022-570 = "Ah, nesse caso, por favor, espere um momento."
20022-580 = "Este é o nosso produto recomendado!"
20022-590 = "Hum... sim, é este aqui, certo?"
20022-600 = "Gostou? Volte sempre!"
20022-610 = "O festival e a competição de culinária terminaram."
20022-620 = "Ainda tenho que preparar os ingredientes para amanhã, mas... Sensei, descanse um pouco."
