[translation]
10101-10 = "O próximo trabalho é..."
10101-20 = "Ah, Sensei,\nprecisa de ajuda com alguma coisa?"
10101-30 = "B-bem-vindo!\nQuantas pessoas..."
10101-40 = "...Ah, era você, Sensei.\nDesculpe. Foi reflexo."
10101-50 = "O trabalho de meio período\nainda não acabou."
10101-60 = "Vamos manter o foco\naté o fim."
10101-70 = "O festival está chegando ao fim.\nVocê se divertiu, Sensei?"
10101-80 = "Este trabalho também\nterminou em segurança."
10101-90 = "Graças a você, Sensei.\nEstou em dívida."
10101-100 = "O mar é...\ninfinitamente vasto e\ntem uma quantidade surpreendente de água."
10101-110 = "Fiquei impressionada."
10101-120 = "Se eu tivesse\nmais um pouco de tempo,\npoderia ter melhorado\na qualidade do palco..."
10101-130 = "A brisa do mar é refrescante."
10101-140 = "É perfeita para\nrefrescar o calor."
10101-150 = "Vamos dar o nosso melhor\npara que o festival seja divertido."
10101-160 = "Sensei, por favor,\naproveite o festival também."
10101-750 = "Desculpe, Sensei,\nmas me dê uma mãozinha."
10101-760 = "Não estou dando conta sozinha."
10101-770 = "Aqui está a lista de tarefas de hoje.\nSensei, pode me ajudar?"
10101-780 = "Sou alguém que se sustenta\ncom trabalhos de meio período."
10101-790 = "Preciso gerenciar bem\nas demandas de trabalho."
10101-800 = "S-Sensei, precisa de mim?"
10101-810 = "Obrigada pela ajuda.\nVocê é muito eficiente, Sensei."
10101-820 = "Já terminou de arrumar...?"
10101-830 = "Como agradecimento, por favor,\naceite isto."
