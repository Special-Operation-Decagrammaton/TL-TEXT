[translation]
13013-160 = "いらしたんですね、先生！"
13013-170 = "えへへ、\nずーっと待ってました。"
13013-180 = "こんにちは、先生！"
13013-190 = "私にできることなら、\n何でも言ってください！"
13013-200 = "どんどん、\n事が大きく\nなっていくような……。"
13013-210 = "でもきっと、\n大丈夫ですよね？\n先生……。"
13013-220 = "こうなった以上、\n後戻りはできません。"
13013-230 = "知識解放戦線は\n進み続けます！"
13013-240 = "なんとか\n落ち着きましたね……。\nみんなが無事で、\n本当によかったです。"
13013-250 = "はい、先生。\nお呼びですか？"
13013-260 = "メル先輩、\n今頃どうしてるかな……。"
13013-270 = "どこかで暴走してないと\nいいんですが……。"
13013-280 = "文字を読むことも、\n絵を見ることも\n大好きです。"
13013-290 = "漫画はいつだって\n私たちに色々なことを\n教えてくれます！"
13013-300 = "せ、先生？そんなに\n見つめられると私……\n恥ずかしいです……。"
13013-310 = "何かお探しですか、先生？\nゆっくり見ていってくださいね。"
13013-320 = "物を並べたり展示するのは\n慣れてますから。\n私に任せてください！"
13013-330 = "好きなだけ\n見ていってください！"
13013-340 = "あとで後悔するなんて、\nもったいないじゃないですか。"
13013-350 = "ショップの管理、ですか……？"
13013-360 = "いえ、図書館の管理に比べれば、\nこれぐらい平気です。"
13013-370 = "この中に、絶版になっていた本の\n初版が紛れていたら……\n私は……どうすれば……。"
13013-380 = "あっ！こ、これは決して\n個人的な願望とかではなく……！"
13013-390 = "あ、それを\nお選びになったんですね。"
13013-400 = "少々お待ちください……\nはいこちら、どうぞ！"
13013-410 = "ここはお決まりのセリフを……"
13013-420 = "「いやー！お目が高いですね、お客さん！」"
13013-430 = "「毎度あり！」"
13013-440 = "今の、ベテランっぽかった、\nですか？へへ、えへへっ……。"
13013-450 = "いらっしゃいませ、先生！\n何にされますか？"
13013-460 = "運試しですか！"
13013-470 = "隣で見ていても\nいいですか？\nえへへ。"
13013-480 = "あっ、何か気になる\nものでもありましたか？"
13013-490 = "はい、先生。\nどうしたんですか？"
13013-500 = "「必要なときに\nもたらされる、\n小さな幸運を」……。"
13013-510 = "一度言ってみた\nかったです、\nこういうセリフ！"
13013-520 = "うわあっ！大当たり！\nすごいです！さすが先生！"
13013-530 = "先生は\n運がいいんですね……\nカッコいいです、先生！"
13013-540 = "ちょっと私にも\n見せてください。"
13013-550 = "むむ……これも\n使えるものですよ！"
13013-560 = "ふえーん……"
13013-570 = "あ、あまり気を\n落とさないでください、\n先生。私がいますよ！"
