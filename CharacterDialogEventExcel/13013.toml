[translation]
13013-160 = "Você veio, Sensei!"
13013-170 = "Hehe, eu estava esperando por você há muito tempo."
13013-180 = "Olá, Sensei!"
13013-190 = "Se houver algo que eu possa fazer, por favor, me diga!"
13013-200 = "Parece que as coisas estão ficando cada vez maiores..."
13013-210 = "Mas vai ficar tudo bem, não vai? Sensei..."
13013-220 = "Agora que chegamos a este ponto, não há como voltar atrás."
13013-230 = "A Frente de Libertação do Conhecimento continuará avançando!"
13013-240 = "Conseguimos acalmar as coisas... Fico muito feliz que todos estejam bem."
13013-250 = "Sim, Sensei. Você me chamou?"
13013-260 = "Como será que a Mel-senpai está agora..."
13013-270 = "Espero que ela não esteja causando problemas em algum lugar..."
13013-280 = "Eu amo ler textos e ver ilustrações."
13013-290 = "Os mangás sempre nos ensinam muitas coisas!"
13013-300 = "S-Sensei? Se você ficar me encarando assim... eu fico envergonhada..."
13013-310 = "Está procurando por algo, Sensei? Fique à vontade para olhar com calma."
13013-320 = "Estou acostumada a organizar e exibir itens. Pode deixar comigo!"
13013-330 = "Fique à vontade para olhar o quanto quiser!"
13013-340 = "Seria um desperdício se arrepender depois, não acha?"
13013-350 = "Gerenciar a loja, você diz...?"
13013-360 = "Não, comparado a gerenciar a biblioteca, isso é tranquilo."
13013-370 = "Se uma primeira edição de um livro fora de catálogo estivesse escondida aqui... eu... o que eu faria...?"
13013-380 = "Ah! I-isso não é um desejo pessoal, de forma alguma...!"
13013-390 = "Ah, então foi isso que você escolheu."
13013-400 = "Espere um momento, por favor... Sim, aqui está!"
13013-410 = "Agora, aquela frase clássica..."
13013-420 = "“Uau! Você tem um ótimo olho para as coisas, cliente!”"
13013-430 = "“Volte sempre!”"
13013-440 = "Eu pareci uma veterana agora? Hehe, ehehe..."
13013-450 = "Bem-vindo, Sensei! O que vai querer?"
13013-460 = "Vai testar a sorte?"
13013-470 = "Posso assistir ao seu lado? Hehe."
13013-480 = "Ah, tem algo que te chamou a atenção?"
13013-490 = "Sim, Sensei. O que houve?"
13013-500 = "“Uma pequena sorte que chega quando é necessária”..."
13013-510 = "Eu queria dizer uma frase dessas pelo menos uma vez!"
13013-520 = "Uau! Que sorte grande! Incrível! Como esperado do Sensei!"
13013-530 = "O Sensei tem muita sorte... Isso é tão legal, Sensei!"
13013-540 = "Deixe-me ver também."
13013-550 = "Hmm... isso também é algo útil!"
13013-560 = "Buááá..."
13013-570 = "Ah, não fique tão desanimado, Sensei. Eu estou aqui com você!"
