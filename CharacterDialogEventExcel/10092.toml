[translation]
10092-200 = "Ты опаздываешь, Сенсей!\nПошли скорее, шевелись!"
10092-210 = "О, Сенсей!\nСюда, сюда!"
10092-220 = "Ах, ч-что ты делаешь!?\nСкажи словами, скажи!"
10092-230 = "Хватит уже подшучивать...!\nЯ же разозлюсь!!"
10092-240 = "Хм? ...Ты звал меня?"
10092-250 = "Хочешь попробовать сыграть на гитаре?\nВот, держи."