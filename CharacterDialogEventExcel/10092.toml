[translation]
10092-200 = "遅いよ、先生！\n早く行くよ！"
10092-210 = "あ、先生！\nこっちよ、こっち！"
10092-220 = "あ、な、何するのよ！？\n言葉にしてよ、言葉に！"
10092-230 = "いたずらはやめて……！\n怒るよ！！"
10092-240 = "ん？……呼んだ？"
10092-250 = "ギター触ってみたいの？\nはい。"
10092-300 = "Você está atrasado, Sensei!\nVamos logo!"
10092-310 = "Ah, Sensei!\nPor aqui, por aqui!"
10092-320 = "A apresentação já começou!\nVenha comigo!"
10092-330 = "Será que é o clímax?\nDeixe comigo!"
10092-340 = "Ufa, foi muito bom.\nNão acha, Sensei?"
10092-350 = "Ah, o-o que você está fazendo!?\nDiga com palavras, use palavras!"
10092-360 = "Pare com as brincadeiras...!\nEu vou ficar brava!!"
10092-370 = "Hm? ...Me chamou?"
10092-380 = "Quer tocar a guitarra?\nAqui está."
10092-520 = "Sim, sim! Não temos tempo!\nPegue logo e leve embora!"
10092-530 = "Ah, Sensei!\nPor aqui, por aqui!"
10092-540 = "Não é um desperdício\ndeixar sobrando?"
10092-550 = "Pegue o máximo que\npuder levar."
10092-560 = "O-o que foi!?\nQue susto!"
10092-570 = "Eu disse para parar com as brincadeiras!\nQue susto, sabia!!"
10092-580 = "Hmm?\nNão é bom?"
10092-590 = "Não é uma má escolha."
10092-600 = "Legal.\nEu também estava de olho nisso."
10092-610 = "Vai ser isso mesmo? Ok."
