[translation]
10051-10 = "さあ、皆で最高の\n「晄輪大祭」にする\nために、力を合わせよう！"
10051-20 = "なんて面白そうな…"
10051-30 = "ミレニアムの名誉が\nかかっているからね。"
10051-40 = "私たちエンジニア部が\n手伝うのは当然の事だよ。"
10051-50 = "応援はまだ\n慣れてないけど…"
10051-60 = "仕方ない、\n精一杯頑張るよ。"
10051-70 = "一度引き受けた依頼は、\n最後まで成し遂げる。"
10051-80 = "それが私たち\nエンジニア部の\nモットーだからね！"
10051-90 = "そういえば、セミナーの\nしっかり者の会計…\n彼女の姿が見えないね。"
10051-100 = "体調を崩してないと\n良いけれど。"
10051-110 = "（皆が穏やかに、祭りを\n楽しめるといいな…)"
10051-120 = "普段動くことが\n少ないとは言え、"
10051-130 = "コトリとヒビキの\n体力がここまで\n落ちていたとは…"
10051-140 = "祭りが終わったら、\nエンジニア部の部室に"
10051-150 = "体づくりサポートの\nロボットでも作って\n置いておこうかな。"
10051-160 = "普段動くことが\n少ないとは言え、"
10051-170 = "コトリとヒビキの\n体力がここまで\n落ちていたとは…"
10051-180 = "祭りが終わったら、\nエンジニア部の部室に"
10051-190 = "体づくりサポートの\nロボットでも作って\n置いておこうかな。"
