[translation]
10051-10 = "Muito bem, vamos unir forças para tornar este o melhor\n「Festival de Esportes Halo」 de todos!"
10051-20 = "Que interessante..."
10051-30 = "A honra do Millennium está em jogo, afinal."
10051-40 = "É natural que nós, do Departamento de Engenharia, ajudemos."
10051-50 = "Ainda não estou acostumada a torcer, mas..."
10051-60 = "Não tem jeito, vou dar o meu melhor."
10051-70 = "Uma vez que aceitamos um pedido, vamos até o fim."
10051-80 = "Esse é o lema do nosso\nDepartamento de Engenharia!"
10051-90 = "Falando nisso, a contadora responsável do Seminar...\nNão estou vendo ela por aqui."
10051-100 = "Espero que ela não esteja se sentindo mal."
10051-110 = "(Espero que todos possam aproveitar o festival em paz...)"
10051-120 = "Embora elas não costumem se exercitar muito,"
10051-130 = "eu não imaginava que a resistência da\nKotori e da Hibiki estivesse\ntão baixa assim..."
10051-140 = "Quando o festival acabar, vou criar um robô de\napoio ao condicionamento físico"
10051-150 = "e deixá-lo na sala do\nDepartamento de Engenharia."
10051-160 = "Embora elas não costumem se exercitar muito,"
10051-170 = "eu não imaginava que a resistência da\nKotori e da Hibiki estivesse\ntão baixa assim..."
10051-180 = "Quando o festival acabar, vou criar um robô de\napoio ao condicionamento físico"
10051-190 = "e deixá-lo na sala do\nDepartamento de Engenharia."
