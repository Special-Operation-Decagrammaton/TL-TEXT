[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
26010-270 = "Hiii……\nParece uma vila de pescadores\nde um romance de terror……" 
26010-280 = "Eu quero voltar para a academia logo……" 
26010-290 = "Ah, é verdade, a nossa academia já……\nNão existe mais……" 
26010-300 = "Os moradores daqui são\nmuito assustadores……\nEnquanto converso com eles\npara a investigação……" 
26010-310 = "E-Eu só sinto vontade\nde sair correndo……" 
26010-320 = "Um pouco mais cedo,\no capitão do barco\nme deu um café quentinho." 
26010-330 = "Talvez……\nele não seja uma pessoa\ntão assustadora assim……" 
26010-340 = "Acabei me apegando um pouco\na essa vila também." 
26010-350 = "……Mas, no fim das contas,\npara mim,\no Parque dos Coelhinhos continua sendo o lugar\nmais reconfortante." 
26010-360 = "P-P-Por acaso\nvocê me chamou……?" 
26010-370 = "（Por que eu vim parar\nnuma vila tão isolada como esta……）" 
26010-380 = "Foi a Miyako-chan que\ntrançou o meu cabelo\nlogo antes de sairmos\npara a operação." 
26010-390 = "Fufu…… até que ficou\nfofinho……" 
26010-400 = "Pardais, doninhas,\ngaivotas……" 
26010-410 = "Por que será que\nos animais selvagens\nsempre se aproximam de mim……?" 
26010-420 = "Ahm…… se você encontrar\nalguma pedra bonita ou conchas,\npor favor, traga para mim." 
26010-430 = "Ah, Sensei.\nGostaria de procurar pedrinhas……\ncomigo?" 
26010-440 = "Parece que já está na hora\nde irmos embora, mas……" 
26010-450 = "A procura por pedrinhas……\nPor favor, me acompanhe de novo\nquando voltarmos." 
26010-460 = "Eh, ahm, veja bem……" 
26010-470 = "Eu sei que a minha presença\né tão fraca quanto uma pedrinha, mas……" 
26010-480 = "Mesmo que você me toque tanto assim……\neu não acho que a minha presença vai ficar mais forte……\nsabia?" 
26010-490 = "Esta pedrinha……\né muito bonita mesmo……!" 
26010-500 = "Me desculpe……\nEu só tenho isso aqui……" 
26010-510 = "É branquinha……\ne tão brilhante……" 
26010-520 = "É algo muito singelo, mas…… você……\nAceitaria isto também……?" 