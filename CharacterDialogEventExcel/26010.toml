[translation]
26010-270 = "ひぃ……\nホラー小説に出てくる\n漁村みたい……"
26010-280 = "早く学園に戻りたい……"
26010-290 = "あ、私たちの学園は、\nもう……"
26010-300 = "ここの住民は\nすごく怖くて……\n調査のために\n話していると……"
26010-310 = "に、逃げてしまいたく\nなるのです……"
26010-320 = "さきほど、\n船長さんから\n温かいコーヒーを\nいただきました。"
26010-330 = "思ったより……\n怖くない人なのかも……"
26010-340 = "この村にも、\n少し愛着が\n湧いてきました。"
26010-350 = "……でもやっぱり、\n私にとっては\n子ウサギ公園が一番\n落ち着く場所です。"
26010-360 = "も、も、もしかして\nお呼びですか……？"
26010-370 = "（どうして\nこんなへんぴな村まで\n来てしまったのかな……）"
26010-380 = "この髪型、\nミヤコちゃんが\n作戦に出る直前に\n編んでくれたんです。"
26010-390 = "ふふっ……これ、\n可愛いかも……"
26010-400 = "スズメも、イタチも、\nカモメも……。"
26010-410 = "野生の動物たちが\n私に寄ってくる理由は\nなんなんでしょう……？"
26010-420 = "あの……きれいな石とか、\n貝殻を見つけたら、\n私に持ってきてください。"
26010-430 = "あ、先生。\n私と一緒に小石集め……\nしませんか？"
26010-440 = "そろそろ\n帰る時間みたいですが……"
26010-450 = "小石集め……戻ってもまた、\n付き合ってくださいね。"
26010-460 = "えっ、あの、その……"
26010-470 = "私が小石ほど存在感が\n薄いのはわかりますが……"
26010-480 = "そんなに触っても……\n存在感が強くなることは\nないと思いますよ……？"
26010-490 = "この小石……\n本当にきれいですね……！"
26010-500 = "すみません……\nこれくらいしかなくて……"
26010-510 = "白くて……\nきらきらしてる……"
26010-520 = "ささやかですが、これも……\n受け取ってくれますか……？"
