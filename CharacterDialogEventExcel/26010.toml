[translation]
26010-270 = "Hii...\nParece uma daquelas vilas de\npescadores de livros de terror..."
26010-280 = "Queria voltar logo pra nossa Academia..."
26010-290 = "Ah, a nossa Academia...\nnão existe mais..."
26010-300 = "Os moradores daqui\ndão muito medo...\nQuando eu tento conversar\ncom eles pra investigar..."
26010-310 = "E-Eu sinto uma vontade\nimensa de sair correndo..."
26010-320 = "Agorinha pouco,\neu recebi um café quentinho\ndo capitão do barco."
26010-330 = "Talvez ele...\nnão seja uma pessoa tão\nassustadora quanto eu pensei..."
26010-340 = "Acho que acabei criando\num pouco de apego\na esta vila também."
26010-350 = "……Mas como eu imaginava,\npara mim,\no Parque dos Coelhinhos é o lugar\nonde eu me sinto mais calma."
26010-360 = "P-P-Por acaso\nvocê me chamou...?"
26010-370 = "（Por que será que eu\nvim parar numa vila\ntão remota como essa...?)"
26010-380 = "Esse penteado no meu cabelo,\na Miyako trançou pra mim\nlogo antes da gente\nsair pra missão."
26010-390 = "Fufu... acho que\nficou bonitinho..."
26010-400 = "Os pardais, as doninhas,\nas gaivotas..."
26010-410 = "Por qual motivo será que\nos animais selvagens\nse aproximam tanto de mim...?"
26010-420 = "Uhm... se o senhor encontrar\nalguma pedra bonita ou conchas,\npor favor, traga para mim."
26010-430 = "Ah, Sensei.\nO senhor quer... catar\npedrinhas comigo?"
26010-440 = "Parece que já está quase\nna hora de ir embora..."
26010-450 = "Catar pedrinhas...\nPor favor, me acompanhe de novo\nquando voltarmos, tá bom?"
26010-460 = "Eh, uhm, sabe..."
26010-470 = "Eu sei que a minha presença\né tão fraca quanto a de\numa pedrinha, mas..."
26010-480 = "Acho que mesmo se o senhor\nme cutucar tanto assim...\na minha presença não vai ficar\nmais forte, sabia...?"
26010-490 = "Essa pedrinha...\né realmente linda...!"
26010-500 = "Me desculpe...\neu só tenho isso\npara oferecer..."
26010-510 = "É tão branca...\ne brilhante..."
26010-520 = "É muito simples, mas...\no senhor aceitaria isso\naqui também...?"