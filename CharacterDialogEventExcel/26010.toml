[translation]
26010-270 = "Hii... Parece uma vila de pescadores de um romance de terror..."
26010-280 = "Quero voltar logo para a academia..."
26010-290 = "Ah, nossa academia, ela já..."
26010-300 = "Os moradores daqui são muito assustadores... Quando tento conversar com eles para investigar..."
26010-310 = "Eu... eu sinto vontade de fugir..."
26010-320 = "Há pouco, o capitão me deu um café quentinho."
26010-330 = "Talvez ele não seja uma pessoa tão assustadora quanto eu pensava..."
26010-340 = "Comecei a sentir um pouco de afeição por esta vila também."
26010-350 = "...Mas, ainda assim, para mim, o Parque dos Coelhinhos continua sendo o lugar mais tranquilo."
26010-360 = "V-v-você me chamou...?"
26010-370 = "(Por que será que eu vim parar em uma vila tão remota assim...)"
26010-380 = "Este penteado, a Miyako-chan trançou para mim logo antes de partirmos para a missão."
26010-390 = "Hehe... Talvez isso seja fofo..."
26010-400 = "Pardais, doninhas, gaivotas também..."
26010-410 = "Por que será que os animais selvagens se aproximam tanto de mim...?"
26010-420 = "Ei... se encontrar pedras bonitas ou conchas, por favor, traga para mim."
26010-430 = "Ah, Sensei. Você não quer... colecionar pedrinhas comigo?"
26010-440 = "Parece que já está na hora de voltar, mas..."
26010-450 = "Sobre a coleção de pedrinhas... quando voltarmos, continue me acompanhando, está bem?"
26010-460 = "Eh, bem, isso é..."
26010-470 = "Eu sei que minha presença é tão discreta quanto uma pedrinha, mas..."
26010-480 = "Mesmo que você me toque tanto assim... acho que minha presença não vai ficar mais forte...?"
26010-490 = "Esta pedrinha... é realmente linda...!"
26010-500 = "Desculpe... é só isso que eu tenho..."
26010-510 = "Branca... e brilhante..."
26010-520 = "É algo simples, mas... você poderia aceitar isso também...?"
