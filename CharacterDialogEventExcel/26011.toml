[translation]
26011-200 = "Você veio, \nSensei! \nEntão vamos começar logo!"
26011-210 = "Eu estava te esperando, Sensei!"
26011-220 = "Já estamos na metade!? \nVamos dar o nosso melhor até o fim!"
26011-230 = "Já estamos começando a \nver o fim \ndisso, não é...!"
26011-240 = "Por último! \nNão quer dar \numa olhada de novo?"
26011-250 = "Hm? Sensei, \naconteceu alguma coisa?"
26011-260 = "Quer que eu \nte ajude com algo?"
26011-270 = "……Hmm, Sensei, \nagora não é hora \nde brincar."
26011-280 = "Ah! Sensei! \nFoco! Foco, por favor!"
26011-290 = "Tcharam! \nPreparei várias coisas!"
26011-300 = "Aqui está, Sensei! \nPode escolher \no que você quiser!"
26011-310 = "Verificar se não esquecemos de nada, \nverificar, verificar~!"
26011-320 = "Hm? Está procurando por algo?"
26011-330 = "Bem, o que eu queria que você visse \nnão sou eu, \né aquilo ali..."
26011-340 = "Ah, isso! Que bom!"
26011-350 = "Hum! Você tem um bom olho~ \n...Brincadeirinha!"
26011-360 = "Então era isso \nque você estava procurando! Entendi!"
26011-370 = "Ooooh! Eu sabia! \nEu também achava que isso seria o melhor!"
