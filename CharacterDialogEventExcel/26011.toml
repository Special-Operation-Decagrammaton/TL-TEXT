[translation]
26011-200 = "来てくれたんですね、\n先生！\nでは早速行きましょう！"
26011-210 = "待ってましたよ、先生！"
26011-220 = "もう残り半分！？\n最後まで頑張りましょう！"
26011-230 = "そろそろ、\n終わりが見えて\nきましたね……！"
26011-240 = "最後に！\nもう一度見て\nいきませんか？"
26011-250 = "あれ？先生、\nどうかしました？"
26011-260 = "何か、\nお手伝いしましょうか？"
26011-270 = "……むむ、先生、\n今は遊んでる場合じゃ\nないですよ。"
26011-280 = "もう！先生！\n集中！集中ですよ！"
26011-290 = "じゃーん！\n色々用意してみました！"
26011-300 = "こちらです、先生！\n好きなものを\n選んじゃってください！"
26011-310 = "やり残しはないか、\nチェック、チェックですよ～！"
26011-320 = "あれ？何かお探しですか？"
26011-330 = "えっと、見てもらいたいのは、\n私じゃなくて\nあっちなんですけど……。"
26011-340 = "あっ、それ！いいですね！"
26011-350 = "ふむ！お目が高いですねぇ～\n……なんちゃって！"
26011-360 = "お探しのものは\nそれだったんですね！納得です！"
26011-370 = "おおー！やっぱり！\n私もそれがいいと思ってました！"
