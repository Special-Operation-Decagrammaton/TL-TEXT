[translation]
10095-460 = "ご主人様が来るのを、\nお待ちしておりました。\n本日もよろしく\nお願いします。"
10095-470 = "今のちょっと\nメイドっぽかった\nですよね！？"
10095-480 = "すごい豪邸ですね……\nやることもたくさん\nありそうです。"
10095-490 = "ひとつずつ着実に\nやっていけば何とか\nなるはずです。"
10095-500 = "先生も、一緒ですから。"
10095-510 = "呼びましたか、先生？"
10095-520 = "はい。\nメイドらしい仕事って\n何があるんだろう\nと悩んでました。"
10095-530 = "え？その姿勢だけでも\n十分……？"
10095-540 = "大切なのは、\n今できることから\nこなすことです。"
10095-550 = "……ここだけの\n話ですが、"
10095-560 = "そうしないとうちの\n部は上手く\n回らないので……"
10095-570 = "色んな経験は\n創作の原動力とは\nいいますが……"
10095-580 = "これはちょっと……"
10095-590 = "環境、衣服、要素……\nすべての条件が\n揃ったことに\nなりますね。"
10095-600 = "では、ご主人様。\n本日も、お供させて\nいただきます。"
10095-1110 = "ご主人様が来るのを、\nお待ちしておりました。\n本日もよろしく\nお願いします。"
10095-1120 = "今のちょっと\nメイドっぽかった\nですよね！？"
10095-1130 = "すごい豪邸ですね……\nやることもたくさん\nありそうです。"
10095-1140 = "ひとつずつ着実に\nやっていけば何とか\nなるはずです。"
10095-1150 = "先生も、一緒ですから。"
10095-1160 = "ここで一体何が\n起こっているの\nでしょう……？"
10095-1170 = "ダメダメ、私だけでも\nちゃんと気を引き\n締めないと。"
10095-1180 = "お姉ちゃんに\n全部任せてたら……！"
10095-1190 = "文字通り……\n想像もつかないことが\n起こるのが人生、\nなんですね。"
10095-1200 = "でも、最後まで\n修行します、ご主人様。"
10095-1210 = "至らないところの\n多い私ですが、\n頼ってください！"
10095-1220 = "あれを全部\nやり遂げたん\nですね……"
10095-1230 = "今でも信じられ\nないです。途中、\nどうなってしまうのかと\n思っていましたが……"
10095-1240 = "ありがとうございます。\n全部、先生の\nおかげです。"
10095-1250 = "呼びましたか、先生？"
10095-1260 = "はい。\nメイドらしい仕事って\n何があるんだろう\nと悩んでました。"
10095-1270 = "え？その姿勢だけでも\n十分……？"
10095-1280 = "大切なのは、\n今できることから\nこなすことです。"
10095-1290 = "……ここだけの\n話ですが、"
10095-1300 = "そうしないとうちの\n部は上手く\n回らないので……"
10095-1310 = "色んな経験は\n創作の原動力とは\nいいますが……"
10095-1320 = "これはちょっと……"
10095-1330 = "環境、衣服、要素……\nすべての条件が\n揃ったことに\nなりますね。"
10095-1340 = "では、ご主人様。\n本日も、お供させて\nいただきます。"
