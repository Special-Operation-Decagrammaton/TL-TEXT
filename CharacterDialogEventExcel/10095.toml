[translation]
10095-460 = "Estava esperando o senhor chegar.\nConto com você hoje também."
10095-470 = "Isso foi um pouco\nparecido com uma empregada,\nnão foi!?"
10095-480 = "Que mansão incrível...\nParece que há muito\no que fazer aqui."
10095-490 = "Se fizermos uma coisa de cada vez,\ncom certeza daremos um jeito."
10095-500 = "Porque o Sensei também está comigo."
10095-510 = "Me chamou, Sensei?"
10095-520 = "Sim.\nEu estava pensando sobre o que\nseria um trabalho típico\nde uma empregada."
10095-530 = "Eh? Só essa atitude\njá é o suficiente...?"
10095-540 = "O importante é fazer\no que pode ser feito\nagora mesmo."
10095-550 = "...Isso é só entre\nnós, mas,"
10095-560 = "se eu não fizer assim,\no meu clube não\nfunciona direito..."
10095-570 = "Dizem que várias experiências\nsão a força motriz\nda criação, mas..."
10095-580 = "Isso é um pouco..."
10095-590 = "Ambiente, roupas, elementos...\nTodas as condições\nforam reunidas."
10095-600 = "Então, mestre.\nHoje também,\nirei acompanhá-lo."
10095-1110 = "Estava esperando o senhor chegar.\nConto com você hoje também."
10095-1120 = "Isso foi um pouco\nparecido com uma empregada,\nnão foi!?"
10095-1130 = "Que mansão incrível...\nParece que há muito\no que fazer aqui."
10095-1140 = "Se fizermos uma coisa de cada vez,\ncom certeza daremos um jeito."
10095-1150 = "Porque o Sensei também está comigo."
10095-1160 = "O que será que está\nacontecendo aqui...?"
10095-1170 = "Não, não, eu preciso\nme manter focada,\npelo menos eu."
10095-1180 = "Se eu deixasse tudo\npara a minha irmã...!"
10095-1190 = "Literalmente...\nA vida é feita de coisas\nque nem conseguimos\nimaginar, não é?"
10095-1200 = "Mas, vou continuar meu treino\naté o fim, mestre."
10095-1210 = "Eu ainda tenho muito\na melhorar, mas\npode contar comigo!"
10095-1220 = "Você conseguiu realizar\ntudo aquilo..."
10095-1230 = "Até agora não consigo\nacreditar. No meio do caminho,\neu fiquei pensando no que\niria acontecer, mas..."
10095-1240 = "Muito obrigada.\nTudo isso foi\ngraças ao Sensei."
10095-1250 = "Me chamou, Sensei?"
10095-1260 = "Sim.\nEu estava pensando sobre o que\nseria um trabalho típico\nde uma empregada."
10095-1270 = "Eh? Só essa atitude\njá é o suficiente...?"
10095-1280 = "O importante é fazer\no que pode ser feito\nagora mesmo."
10095-1290 = "...Isso é só entre\nnós, mas,"
10095-1300 = "se eu não fizer assim,\no meu clube não\nfunciona direito..."
10095-1310 = "Dizem que várias experiências\nsão a força motriz\nda criação, mas..."
10095-1320 = "Isso é um pouco..."
10095-1330 = "Ambiente, roupas, elementos...\nTodas as condições\nforam reunidas."
10095-1340 = "Então, mestre.\nHoje também,\nirei acompanhá-lo."
