[translation]
10017-10 = "これより、\n粛清を始める！"
10017-20 = "ふふふ、革命の時間だ！"
10017-30 = "今回のイワン・クパーラも\n楽しみだな！"
10017-40 = "私の助けが必要か、\nカムラッド？"
10017-50 = "この髭の権威を\n疑うような生徒が、まだ\n残っていたとはな……。"
10017-60 = "どいつもこいつも\n粛清だ、粛清！"
10017-70 = "今回のイワン・クパーラの\nために大きくて、\nえーっとそれから……"
10017-80 = "……すっごく大きい\nプリンを用意したぞ！"
10017-90 = "粛清が終わったら、\n皆で分けて\n食べるとしよう。"
