[translation]
10017-10 = "A partir de agora, \ncomeçarei a purga!"
10017-20 = "Fufufu, é hora da revolução!"
10017-30 = "Estou ansiosa para o \nIvan Kupala desta vez também!"
10017-40 = "Precisa da minha ajuda, \ncomrade?"
10017-50 = "Ainda restam alunas que \nduvidam da autoridade \ndeste bigode..."
10017-60 = "Todos eles, \nserão expurgados, expurgados!"
10017-70 = "Para o Ivan Kupala \ndesta vez, preparei um \ngrande, e, hum, além disso..."
10017-80 = "...preparei um pudim \nmuito grande!"
10017-90 = "Quando a purga terminar, \nvamos dividir e \ncomer com todos."
