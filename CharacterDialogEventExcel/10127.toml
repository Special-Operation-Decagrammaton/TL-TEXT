[translation]
10127-10 = "いらっしゃいませ、先生。\nちょうどプロットを\n書き終えたところです。"
10127-20 = "先生にお会いできて、\nすごく安心しました。"
10127-30 = "ワイルドハントに\n入学した時は、"
10127-40 = "まさかこんな事をする\n羽目になるなんて想像も\nしていませんでした。"
10127-50 = "事態が複雑に\nなってきましたね……。"
10127-60 = "……諦めるわけには。"
10127-70 = "物語は完結させて\nこそ、です。"
10127-80 = "無事に終わって\n良かったです。"
10127-90 = "……はぁ。こんな依頼、\nもうたくさんです。"
10127-100 = "あっ……タイピング音、\nうるさかったですか？"
10127-110 = "どうしてこんなことに\n巻き込まれて\nしまったんでしょう……。"
10127-120 = "そ、そんなに\nじっと見つめて……"
10127-130 = "ふふっ。嬉しいです。"
10127-140 = "お仕事のあとは、\nぜひ私たちの寮へ遊びに\n来てくださいね。"
10127-410 = "ようこそ、先生。\nこちらですよ。"
10127-420 = "お手をどうぞ。\n……一緒にカードを\n引きませんか？"
10127-430 = "物語の結末まで……\n悔いのないよう、\n見届けていってください。"
10127-440 = "何か問題でも\nありましたか？"
10127-450 = "お目当てのカードは\nありますか？"
10127-460 = "すごいです！\n私もこの目で見るのは\n初めてのカードですよ！"
10127-470 = "運がいいですね、先生！\nこの流れに乗って、\n次も……！"
10127-480 = "普通には、\n普通の美学と\nいうものがあります。"
10127-490 = "気を落とさないで\nください、先生。不運は、\n次の幸運の前兆ですよ。"
