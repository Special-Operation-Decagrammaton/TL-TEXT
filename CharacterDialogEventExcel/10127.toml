[translation]
10127-10 = "Bem-vindo, Sensei. Acabei de terminar de escrever o enredo."
10127-20 = "Fiquei muito aliviada por poder encontrar você, Sensei."
10127-30 = "Quando entrei na Wildhunt,"
10127-40 = "eu nunca imaginei que acabaria tendo que fazer algo assim."
10127-50 = "A situação ficou complicada, não é...?"
10127-60 = "......Não posso desistir."
10127-70 = "Uma história só tem valor quando é concluída."
10127-80 = "Que bom que terminou tudo bem."
10127-90 = "......Ah. Já chega de pedidos como este."
10127-100 = "Ah... o som da digitação, estava muito alto?"
10127-110 = "Por que será que acabamos envolvidos em algo assim...?"
10127-120 = "V-você está me encarando tanto assim..."
10127-130 = "Fufu. Fico feliz."
10127-140 = "Depois do trabalho, por favor, venha visitar nosso dormitório."
10127-410 = "Bem-vindo, Sensei. É por aqui."
10127-420 = "Por favor, sua mão. ...Vamos tirar uma carta juntos?"
10127-430 = "Até o final da história... certifique-se de testemunhar tudo sem arrependimentos."
10127-440 = "Houve algum problema?"
10127-450 = "Tem alguma carta que você está procurando?"
10127-460 = "Incrível! É a primeira vez que vejo essa carta com meus próprios olhos também!"
10127-470 = "Você tem sorte, Sensei! Aproveitando esse fluxo, a próxima também...!"
10127-480 = "O comum tem sua própria estética."
10127-490 = "Não desanime, Sensei. O azar é um presságio da próxima sorte."
