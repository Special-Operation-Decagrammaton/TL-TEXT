[translation]
26009-110 = "先生！えっと…"
26009-120 = "おかえりなさいませ、\nご主人様。"
26009-130 = "こんなに人が\nいるところは、\n慣れてなくて…。"
26009-140 = "これもある意味、\nイベントだとは\n思いますが…。"
26009-150 = "は、箱は？\n箱はどこに？\nあれがないと、\nわたし…"
26009-160 = "あ、見つけて\nくださったんですね！"
26009-170 = "ありがとうございます、\n先生。"
26009-180 = "その…すごく、\n怖いですが…"
26009-190 = "この体験は、\nゲームに生かせるかも\nしれませんし…。"
26009-200 = "先生。\nわたし…上手く\nできるでしょうか？"
26009-210 = "うう…\n帰ってゲームしたい…。"
26009-220 = "でも、震えてばかりじゃ\nいけませんよね。"
26009-230 = "わたしにできることを\nしないと…。"
26009-240 = "あんなことが\n起きたなんて、\n未だに信じられません…"
26009-250 = "解決できたのは、\n全部先生のお陰です。"
26009-260 = "は、箱は？\n箱はどこに？\nあれがないと、\nわたし…"
26009-270 = "あ、見つけて\nくださったんですね！"
