[translation]
26009-110 = "Sensei! Bem..."
26009-120 = "Bem-vindo de volta,\nmeu mestre."
26009-130 = "Não estou acostumada a\nlugares com tanta\ngente assim..."
26009-140 = "Acho que, de certa forma,\nisso também é um\nevento..."
26009-150 = "A-a caixa? Onde está\na caixa? Sem ela,\neu..."
26009-160 = "Ah, você a encontrou\npara mim!"
26009-170 = "Muito obrigada,\nSensei."
26009-180 = "É que... estou com\nmuito medo, mas..."
26009-190 = "Talvez eu consiga usar\nessa experiência nos\nmeus jogos..."
26009-200 = "Sensei. Será que...\nvou conseguir fazer\num bom trabalho?"
26009-210 = "Uuu... queria ir para\ncasa jogar..."
26009-220 = "Mas não posso ficar\napenas tremendo, né?"
26009-230 = "Preciso fazer o que\nestá ao meu alcance..."
26009-240 = "Ainda não consigo acreditar\nque aquilo aconteceu..."
