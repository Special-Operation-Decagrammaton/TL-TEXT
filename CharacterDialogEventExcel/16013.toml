[translation]
16013-240 = "Não temos tempo\npara ficar enrolando!\nVamos logo!"
16013-250 = "Já que estou aqui com você,\nnão ouse pegar leve,\nentendido?!"
16013-260 = "Hehe, estamos indo bem!"
16013-270 = "Vamos dar o nosso melhor!\nFalta só um pouquinho!"
16013-280 = "Sempre pode acontecer algo inesperado, \nque tal darmos uma olhada de novo?"
16013-290 = "A-ahhh!?\nQue susto...\nQual é, Sensei!"
16013-300 = "O-o que foi agora...\nNão fique me chamando toda hora."
16013-310 = "Ah, chega!\nSe você precisa de algo,\nfale logo de uma vez!"
16013-320 = "Hm? O que foi?"
