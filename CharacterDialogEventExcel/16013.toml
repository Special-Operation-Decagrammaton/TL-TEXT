[translation]
16013-240 = "もたもたしてる\n時間はないの！\n早くいこ！"
16013-250 = "私がついてる以上、\n手を抜いたら\nダメだからね！"
16013-260 = "ふふっ、順調ね！"
16013-270 = "頑張ろ！\nあとちょっとだから！"
16013-280 = "万が一って事もあるし、\nもう一度見てみない？"
16013-290 = "ひ、ひいっ！？\nびっくりしたぁ……。\nもう！なんなのよ先生！"
16013-300 = "さ、さっきから何よ……。\n何度も呼ばないでっ。"
16013-310 = "ああもう！\n用事があるなら\nちゃんと言葉にして！"
16013-320 = "ん？どうしたの？"
