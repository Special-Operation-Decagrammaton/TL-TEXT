[translation]
10004-980 = "Ah, Sensei. Acabou de acumular um trabalho\nque eu preciso que você resolva."
10004-990 = "Poderia me ajudar um pouco?"
10004-1000 = "Bem-vindo, Sensei."
10004-1010 = "Além da festa, tenho coisas que preciso\nfazer como membro do Comitê Disciplinar."
10004-1020 = "O trabalho nunca parece\nter fim, não é?"
10004-1030 = "Hm, você realmente concorda de coração?\nHehe, você também tem uma vida difícil, Sensei..."
10004-1040 = "Não pretendo negligenciar meu trabalho."
10004-1050 = "Porque eu sou a presidente do\nComitê Disciplinar de Gehenna."
10004-1060 = "Ah, obrigada."
10004-1070 = "Isto é um agradecimento por ter me ajudado.\nAceite."
10004-1080 = "Como esperado do Sensei. Foi perfeito.\nGraças a isso, poderei ficar tranquila..."
10004-1090 = "Isto é um agradecimento por ter me ajudado.\nAqui está."
