[translation]
10004-980 = "あ、先生。ちょうど解決して\nほしい仕事が溜まってたの。"
10004-990 = "少し手伝ってくれるかしら？"
10004-1000 = "いらっしゃい、先生。"
10004-1010 = "パーティーとは別に、風紀委員として\nやるべきことがあるの。"
10004-1020 = "仕事って、いつまでたっても\n終わらないものね。"
10004-1030 = "ん、本当に、心から共感する？\nふふっ、先生も大変なんだね……"
10004-1040 = "仕事の手を抜くつもりはないよ。"
10004-1050 = "私は、ゲヘナの\n風紀委員長だから。"
10004-1060 = "あ、ありがとう。"
10004-1070 = "これは手伝ってくれたお礼。\n受け取って。"
10004-1080 = "さすが先生。完璧だった。\nおかげで安心できそう……"
10004-1090 = "これは手伝ってくれたお礼。\nはい。"
