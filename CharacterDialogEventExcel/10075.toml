[translation]
10075-10 = "Muito bem, já que o Sensei chegou, está na hora da Frente de Libertação do Conhecimento!"
10075-20 = "Bem-vindo de volta, Sensei. Parece que vários incidentes estão acontecendo, então vamos sair!"
10075-30 = "É uma chance de ouro para encontrar pautas interessantes, não podemos deixar passar, né?"
10075-40 = "Eu nunca imaginei que as coisas acabariam assim no começo..."
10075-50 = "Quem diria que as coisas tomariam esse rumo..."
10075-60 = "É, a vida dá voltas que a gente nem imagina..."
10075-70 = "Aconteceu de tudo, mas conseguimos resolver."
10075-80 = "Coletamos bastante material, então no fim das contas deu tudo certo!"
10075-90 = "Chamou?"
10075-100 = "Eu? ...Estou ocupada, mas não tão ocupada assim, algo por aí."
10075-110 = "A Momiji é uma colega em quem posso confiar e minha kohai!"
10075-120 = "Gostos são... bem, cada um tem o seu, né?"
10075-130 = "O que foi, Sensei... Por acaso está entediado?"
10075-140 = "Eu não me importo de brincar um pouco, sabe?"
10075-150 = "Ai, isso faz cócegas... Chega! Pare com isso!"
10075-580 = "Missão!"
10075-590 = "Eu encaro o prazo de entrega do manuscrito como um tipo de missão também."
10075-600 = "Já que fui encarregada, vou cumprir com certeza! Porque essa é a Frente de Libertação do Conhecimento!"
10075-610 = "O que foi, Sensei? ...Só queria me chamar?"
10075-620 = "Nossa, quando você diz algo assim tão direto, eu fico sem saber como reagir."
10075-630 = "Vamos conversar, Sensei! Pode ir falando! Eu vou encontrar uma pauta no que você disser!"
10075-640 = "Uau, incrível, incrível! Não é bajulação, é de verdade!"
10075-650 = "Olha só, veja a seriedade nos meus olhos!"
10075-660 = "Missão cumprida! Por favor, aceite a recompensa!"
10075-670 = "O que achou? Do meu sorriso de negócios."
