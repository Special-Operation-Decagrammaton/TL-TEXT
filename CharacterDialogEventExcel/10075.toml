[translation]
10075-10 = "よし、先生も揃った\nことだし、これより、\n知識解放戦線の時間だよ！"
10075-20 = "おかえり、先生。\n色んな事件が\n起こってるみたいだし、\n外に出よっか！"
10075-30 = "せっかくのネタが\n見つかるチャンス、\n逃すわけには\nいかないじゃん？"
10075-40 = "こんなことになるなんて、\n最初は思いも\nしなかったなぁ……"
10075-50 = "まさかこんな\n展開になるなんて……"
10075-60 = "本当、人生どう\n転ぶか分かんない\nもんだねぇ……"
10075-70 = "色々あったけど、\nなんとか片付いたね。"
10075-80 = "資料もたくさん\n集まったし、\n結果オーライってことで！"
10075-90 = "呼んだ？"
10075-100 = "私？……\n忙しいけど\n忙しくない、\nそんなとこだけど。"
10075-110 = "モミジは背中を\n預けられる仲間で、\n後輩だよ！"
10075-120 = "好みはまあ……\n人それぞれだし？"
10075-130 = "なに？先生……\nもしかして暇？"
10075-140 = "別に遊んでもいいけど～？"
10075-150 = "く、くすぐった\nいってば……。\nもう！そこまでにして！"
10075-580 = "ミッション！"
10075-590 = "原稿の締め切りも、ある種の\nミッションだと思って挑んでるんだ。"
10075-600 = "任された以上は、確実にこなす！\nそれが知識解放戦線だからね！"
10075-610 = "何？先生？\n……呼んでみたかっただけ？"
10075-620 = "いや～そんなセリフ、\n直球で言われると\n私も反応に困っちゃうじゃん。"
10075-630 = "お話するよ。先生！\n先生はしゃべってて！\n私はそこからネタを見つけるから！"
10075-640 = "おお、すごいすごい！\nお世辞じゃないよ！本心だよ！"
10075-650 = "ほら、このまじまじの\n大真面目な目をみて！"
10075-660 = "ミッションコンプリート！\n報酬を受け取ってくださーい！"
10075-670 = "どう？私の営業スマイル。"
