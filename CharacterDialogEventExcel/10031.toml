[translation]
10031-10 = "Ora, Sensei.\nEu estava te esperando."
10031-20 = "Logo no início do ano novo,\naconteceu algo que precisamos\nresolver, então..."
10031-30 = "Hehe, acho que vou pedir\npara você nos ajudar também, Sensei."
10031-40 = "Suas mãos estão frias, Sensei."
10031-50 = "...Não importa o quanto de trabalho\ntenha, você precisa descansar\ncorretamente, entendeu?"
10031-60 = "Quem diria que chegaria\na esse ponto...\nAh, foi inesperado..."
10031-70 = "...Já que chegamos até aqui,\né uma questão de orgulho."
10031-80 = "Nós da Problem Solver 68,\njá que as coisas estão assim,\nvamos até o fim com você!"
10031-90 = "Ah, é claro que você vai\ncolaborar também, né, Sensei?"
10031-100 = "Afinal, o que era aquele\n\"KAITEN FX Mk.1\"!? "
10031-110 = "Nossa, estou tão perplexa\nque nem consigo mais\nreclamar..."
10031-120 = "Ah... bem, não adianta\nficar falando sobre o que\njá aconteceu..."
10031-130 = "Sensei, estou cansada. Que tal\ncomermos algo juntos\ndepois disso?"
10031-140 = "Eu só queria rezar pelo\ndesenvolvimento dos negócios\nda Problem Solver 68\nno ano novo..."
10031-150 = "Por que as coisas terminaram\nassim..."
10031-160 = "Este ano, nós da Problem Solver 68\nvamos renascer\ncompletamente."
10031-170 = "Vamos lá, vamos nos esforçar\npara fazer deste um ano de salto!"
10031-180 = "Não se preocupe, Sensei.\nSe nós da Problem Solver 68\nestivermos juntas,"
10031-190 = "podemos superar\nqualquer obstáculo."
10031-200 = "...Hã? Planos? B-bem, esse tipo\nde coisa, ainda não temos\nnada em especial..."
10031-210 = "Ufa, as coisas ficaram\nbastante agitadas, não é?"
10031-220 = "...Será que os membros da\nminha equipe se machucaram?"
10031-560 = "Bem-vindo, Sensei.\nEstamos perfeitamente preparadas\npara o trabalho."
10031-570 = "Nós da Problem Solver 68\npreparamos várias coisas\npara o ano novo."
10031-580 = "Fique à vontade para escolher."
10031-590 = "Ufa... o início de ano agitado\nfinalmente se acalmou."
10031-600 = "Hehe, mas ainda estamos\nabertas para negócios aqui."
10031-610 = "Vamos lá, dê uma olhada\ncom calma, Sensei♪"
10031-620 = "Hehe, o que achou?\nUma seleção tão maravilhosa\nque dá até para ficar indeciso, né?"
10031-630 = "Não é exagero dizer que\nesta é a verdadeira força\nda Problem Solver 68♪"
10031-640 = "Sensei, tem algo\nque te interessou?"
10031-650 = "...Uma foto de grupo de todas\nda Problem Solver 68 de quimono?"
10031-660 = "N-não tem nada disso aqui!?"
10031-670 = "Como esperado, você tem bom olho,\nSensei. É maravilhoso."
10031-680 = "Ora, escolher isso mostra\nque você tem bom gosto."
10031-690 = "É algo muito especial,\nentão cuide bem disso, tá?"
10031-700 = "Escolher isso mostra que você é bom, Sensei.\nÉ por isso que você é meu\nparceiro de negócios."
10031-710 = "É legal, né? Eu mesma queria\ncomprar um para mim e\ndeixar no escritório..."
10031-720 = "Ah, não, espere,\nnão estou pedindo para você me dar...!"
