[translation]
10031-10 = "あら、先生。\n待ってたわよ。"
10031-20 = "新年早々解決しなきゃ\nいけないことが\n起きたことだし……"
10031-30 = "ふふ、先生にも\n手伝ってもらおうかしら。"
10031-40 = "先生の手、冷たいわね？"
10031-50 = "……いくら仕事が\n多くても、ちゃんと\n休まないとダメよ？"
10031-60 = "ここまでの騒ぎに\nなるだなんて……\nはぁ、予想外だったわ……"
10031-70 = "……もうここまで\n来たら意地よ"
10031-80 = "我ら便利屋68、\nこうなったら最後まで\n付き合ってあげるわ！"
10031-90 = "あ、もちろん先生も\n協力してくれるわよね？"
10031-100 = "結局あの\n「KAITEN FX Mk.1」\nって何だったのよ！？"
10031-110 = "もう、呆れて\nこれ以上文句も\n出てこないわ……"
10031-120 = "はぁ……まあ、\nもう終わったことに\nあれこれ言っても\n仕方ないわね……"
10031-130 = "先生、疲れたしこの後、\n一緒にご飯でも\nどうかしら？"
10031-140 = "新年を迎えて、\n便利屋68の事業の発展を\n祈ろうと\n思っただけだったのに……"
10031-150 = "どうしてこんなことに……"
10031-160 = "今年は我々便利屋68が、\nさらに新しく\n生まれ変わる年よ。"
10031-170 = "さあ、頑張って\n飛躍の年にしましょう！"
10031-180 = "心配しないで、先生。\n私たち便利屋68が\n一緒なら、"
10031-190 = "どんな障害でも\n乗り越えられるわ。"
10031-200 = "……え？計画？や、そ、\nそういうのはまだ、\n特に無いのだけれど……"
10031-210 = "ふぅ、何だか\n派手になってきたわね。"
10031-220 = "……うちの社員たち、\n怪我とかしてないかしら？"
10031-560 = "ようこそ、先生。\n仕事に向けての準備は完璧よ。"
10031-570 = "私たち便利屋68で、\n新年のために色々と\n準備したの。"
10031-580 = "ゆっくり選ぶと良いわ。"
10031-590 = "ふぅ……大騒ぎの年明けも\nようやく落ち着いたわね。"
10031-600 = "ふふっ、でもまだまだ\nここは営業してるわよ。"
10031-610 = "さあ、落ち着いて\n見ていきなさい、先生♪"
10031-620 = "ふふっ、どう？\n目移りしちゃうほど\n素晴らしい品揃えでしょう？"
10031-630 = "これぞ便利屋68の\n底力と言っても\n過言ではないわ♪"
10031-640 = "先生、何か\n気になるものはあった？"
10031-650 = "……便利屋68のみんなが\n着物で写ってる、集合写真？"
10031-660 = "な、無いわよそんなの！？"
10031-670 = "流石、見る目があるわね、\n先生。素晴らしいわ。"
10031-680 = "あら、それを選ぶとは流石ね。"
10031-690 = "すごく良いものだから、\nちゃんと大事にしなさい？"
10031-700 = "それを選ぶとは、やるわね先生。\nそれでこそ私の\nビジネスパートナーだわ。"
10031-710 = "良いわよね、それ！\n私もひとつくらい自分で買って、\n事務所に……"
10031-720 = "あっ、違うわ、\nねだってるわけでは無くて……！"
