[translation]
16012-120 = "Ah, oi, Professor.\nEstá meio barulhento, não está?\nQuer ir dar uma olhada?"
16012-130 = "O Ano Novo tem muitas\ncomidas deliciosas que\nnão comemos normalmente..."
16012-140 = "Acabo gastando\ndinheiro sem perceber."
16012-150 = "Hm? O que foi, Professor?\nAh, será que...\nVocê queria conversar comigo?"
16012-160 = "Ei, pare de me cutucar!\nVai acabar estragando\no meu quimono."
16012-170 = "Lavanderia...\nNão é esse o\nproblema!"
16012-180 = "Eu prefiro o hakama...\nÉ mais fácil de se mover."
16012-190 = "Por que não prendo\no cabelo para cima...?"
16012-200 = "Esse tipo de coisa não\ncombina comigo...\nEntão deixa pra lá..."
16012-210 = "Acabo gastando\ndinheiro sem perceber."
16012-220 = "Hm? O que foi, Professor?\nAh, será que...\nVocê queria conversar comigo?"
16012-230 = "Ei, pare de me cutucar!\nVai acabar estragando\no meu quimono."
16012-240 = "Lavanderia...\nNão é esse o\nproblema!"
16012-250 = "Eu prefiro o hakama...\nÉ mais fácil de se mover."
16012-260 = "Por que não prendo\no cabelo para cima...?"
16012-270 = "Esse tipo de coisa não\ncombina comigo...\nEntão deixa pra lá..."
16012-280 = "Sinto que algo\nproblemático vai acontecer..."
16012-290 = "Minha intuição só acerta\nquando é algo ruim..."
16012-300 = "Eu já sentia que\nterminaria assim..."
16012-310 = "Bem, se estiver com o Professor,\nacho que vai dar tudo certo, não?"
16012-320 = "Ah, que cansaço.\nAinda bem que conseguimos\nterminar tudo."
16012-330 = "O osechi estava delicioso,\ne consegui comer\naté ficar satisfeita!"
16012-840 = "Tudo isso é o Professor que vai fazer?\nParece bem difícil..."
16012-850 = "Bem, se precisar de algo, é só chamar."
16012-860 = "Não é hora de ficar\nrelaxado! Vamos lá,\nfaça o seu melhor, Professor."
16012-870 = "Hm, me chamou?\nVai me pagar alguma coisa?"
16012-880 = "Fufu, brincadeira."
16012-890 = "Eu não odeio o barulho.\nSe não, eu não estaria com o\nClube de Pesquisa Gastronômica, né?"
16012-900 = "Ora, ora, o Professor\nconsegue fazer as coisas quando quer."
16012-910 = "Fufu. Eu queria\nter dito isso."
16012-920 = "Acho que eu não teria\nconseguido sozinha...\nEntão esse é o poder de um adulto..."
16012-930 = "Você não é nada mal."
16012-940 = "O trabalho de hoje acabou?"
16012-950 = "Então vamos sair\npara comer algo gostoso!"
