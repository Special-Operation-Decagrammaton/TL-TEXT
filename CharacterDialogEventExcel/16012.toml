[translation]
16012-120 = "あっ、やっほー先生。\nなんだか騒がしいね。\n見に行ってみる？"
16012-130 = "お正月って普段とは\n違う美味しいものが\nたくさんあるのよね…"
16012-140 = "ついついお金を\n使っちゃう。"
16012-150 = "ん？どうしたの、先生？\nあ、もしかして……\n私と話したかったんだ？"
16012-160 = "もう、そんなに\nつつかないで！せっかくの\n着物が崩れちゃうでしょ。"
16012-170 = "クリーニング…\nってそういう\n問題じゃないの！"
16012-180 = "私は袴の方が好きかな…\n動きやすいし。"
16012-190 = "髪を上で\n結わないのって…？"
16012-200 = "そーゆーの私には\n似合わないし…\nいいかな…。"
16012-210 = "ついついお金を\n使っちゃう。"
16012-220 = "ん？どうしたの、先生？\nあ、もしかして……\n私と話したかったんだ？"
16012-230 = "もう、そんなに\nつつかないで！せっかくの\n着物が崩れちゃうでしょ。"
16012-240 = "クリーニング…\nってそういう\n問題じゃないの！"
16012-250 = "私は袴の方が好きかな…\n動きやすいし。"
16012-260 = "髪を上で\n結わないのって…？"
16012-270 = "そーゆーの私には\n似合わないし…\nいいかな…。"
16012-280 = "なんだか厄介な\nことになりそうな…。"
16012-290 = "私の直感って、嫌なときに\n限って当たるから…。"
16012-300 = "こうなるような\n気はしてたけど…。"
16012-310 = "ま、先生と一緒なら、\nなんとかなるんじゃない？"
16012-320 = "はあ～、疲れた疲れた。\nなんとか終わって\n良かったわね。"
16012-330 = "おせちもおいしかったし、\nお腹いっぱい\n食べられたし！"
16012-840 = "これ、ぜーんぶ先生がやるの？\nなんだか大変そう…"
16012-850 = "ま、何かあったら声かけてよね。"
16012-860 = "余裕ぶってる\n場合じゃないわよ！\nほら、頑張って、先生。"
16012-870 = "ん、呼んだ？\n何か奢ってくれるの？"
16012-880 = "ふふっ、冗談。"
16012-890 = "騒がしいのも嫌いじゃないわ。\nでなかったら、美食研究会の\nみんなと一緒にいないでしょ？"
16012-900 = "なあに、先生も\nやればできるじゃない。"
16012-910 = "ふふっ。こういうセリフ、\n言ってみたかったんだ。"
16012-920 = "私ひとりじゃ\nできなかったと思う…。\nこれが大人の力…"
16012-930 = "なかなかやるじゃない。"
16012-940 = "今日の仕事はこれでおしまい？"
16012-950 = "それならおいしいもの\n食べに行きましょ！"
