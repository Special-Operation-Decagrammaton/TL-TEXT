[translation]
10111-180 = "よお、先生！\nこっち、こっち！"
10111-190 = "あ、先生じゃん！\n遅いぞ！"
10111-200 = "ほら、気をしっかり\n持ってくれ！"
10111-210 = "あとちょっとだろ？"
10111-220 = "終わったら\n遊んでやるから、\nちったあ我慢しな！"
10111-230 = "はぁー！楽しかった！\n先生はどうだった？"
10111-240 = "なんだ？\n用事があるなら\nさっさと言ってくれ。"
10111-250 = "はぁ？\nつついてみただけ？\nなんだそりゃ"
10111-260 = "……はぁ、ガキみてぇな\nことしやがって。"
10111-270 = "ははっ！\n次はあたしの番だからな。\n覚悟しとけよ。"
