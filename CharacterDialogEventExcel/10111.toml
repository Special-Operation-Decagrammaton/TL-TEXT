[translation]
10111-180 = "Ei, Sensei!\nPor aqui, por aqui!"
10111-190 = "Ah, é o Sensei!\nVocê está atrasado!"
10111-200 = "Vamos, mantenha o foco!"
10111-210 = "Falta só um pouco, não é?"
10111-220 = "Quando terminar, eu vou brincar com você, então aguente firme!"
10111-230 = "Ah! Foi divertido!\nComo foi para você, Sensei?"
10111-240 = "O que foi?\nSe tem algo para tratar, diga logo."
10111-250 = "Hã?\nSó estava cutucando?\nQue coisa é essa?"
10111-260 = "……Hah, agindo como uma criança."
10111-270 = "Haha!\nAgora é a minha vez.\nEsteja preparado."
