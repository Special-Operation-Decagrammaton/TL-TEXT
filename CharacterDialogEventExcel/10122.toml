[translation]
10122-10 = "やっほー先生。\n楽しんでる？"
10122-20 = "う～ん……こんな時、\n先生だったら\nどうするのかな……？"
10122-30 = "ちょっと予想外の\n展開なんだけど……。"
10122-40 = "ま、何とかなるよね。\n多分！"
10122-50 = "しっかりしないと。"
10122-60 = "また何が起こるか\n分からないわけだし！"
10122-70 = "ふぅ～\nなんとか終わって\nよかった。"
10122-80 = "先生がいなかったら\nどうなっちゃって\nたんだろ……"
10122-90 = "考えたくも\nないなぁ……。"
10122-100 = "先生と一緒でよかった～"
10122-110 = "知ってると思うけど、"
10122-120 = "私ってちょっと\nそそっかしいところが\nあるからさ……"
10122-130 = "なになに？"
10122-140 = "もしかして、私が必要？"
10122-150 = "あはは、\nく、くすぐったいよ、\n先生！"
10122-160 = "いいのかな～？\n私もやっちゃうよ～？"
10122-170 = "先生……？\nそろそろやめて\n欲しいかな……って。"
10122-180 = "あっ！\n嫌じゃないよ！\nぜんぜん！"
10122-190 = "でも……勘違い\nしちゃいそうだから。"
10122-1220 = "うわぁ、やること\nいっぱいだね……。"
10122-1230 = "せっかく海に来てるのに……\nまだお仕事するの……？"
10122-1240 = "めんどくさいよぉ……。"
10122-1250 = "ご褒美があったら、\nやる気出るかもなんだけどな～"
10122-1260 = "ね、先生。"
10122-1270 = "……一緒に、サボっちゃお♪"
10122-1280 = "わーお！\nさすが、先生だね☆"
10122-1290 = "おぉっ、\n良い波乗れてるじゃん！"
