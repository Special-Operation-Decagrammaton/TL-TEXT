[translation]
10122-10 = "Ei, professor.\nEstá se divertindo?"
10122-20 = "Hmm... em momentos assim,\no que será que o professor\nfaria...?"
10122-30 = "É um desenrolar um pouco\ninesperado, mas..."
10122-40 = "Bem, vai dar tudo certo.\nProvavelmente!"
10122-50 = "Preciso me manter firme."
10122-60 = "Afinal, nunca se sabe\no que pode acontecer!"
10122-70 = "Ufa~\nQue bom que\nacabou tudo bem."
10122-80 = "Se o professor não estivesse aqui,\no que teria acontecido..."
10122-90 = "Nem quero\npensar nisso..."
10122-100 = "Que bom que estou com o professor~"
10122-110 = "Você deve saber, mas,"
10122-120 = "eu tenho um lado\num pouco descuidado..."
10122-130 = "O que foi, o que foi?"
10122-140 = "Por acaso, você precisa de mim?"
10122-150 = "Ahaha,\nI-isso faz cócegas,\nprofessor!"
10122-160 = "Tudo bem mesmo~?\nEu também vou fazer, viu~?"
10122-170 = "Professor...? \nEu acho que... \nqueria que parasse agora..."
10122-180 = "Ah!\nNão é que eu não goste!\nDe jeito nenhum!"
10122-190 = "Mas é que... eu sinto que\nvou acabar me iludindo."
10122-1220 = "Uau, tem tanta coisa\npara fazer..."
10122-1230 = "A gente veio até a praia...\ne ainda temos que trabalhar...?"
10122-1240 = "Que preguiça..."
10122-1250 = "Se tivesse uma recompensa,\ntalvez eu me animasse um pouco~"
10122-1260 = "Ei, professor."
10122-1270 = "...Vamos matar aula juntos♪"
10122-1280 = "Uau!\nComo esperado do professor☆"
10122-1290 = "Oh, \nque onda boa você pegou!"
