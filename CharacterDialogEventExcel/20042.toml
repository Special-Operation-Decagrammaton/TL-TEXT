[translation]
20042-200 = "暇だなぁ……"
20042-210 = "携帯ゲーム\n機でも持ってくれば\n良かった……。"
20042-220 = "電磁波を\n感じてみたいかも……。"
20042-230 = "うぅ……年末特番を\n見れないなんて……。"
20042-240 = "チヒロ先輩ひどい！"
20042-250 = "あの雲……\nサーバーコンピューターに\n似てるかも。"
20042-260 = "うぅ、\nキーボード打ちたい～\n暇すぎるよぉ～！"
20042-270 = "ねぇ先生、なにか手を使う\nおもちゃとか持ってない？\n輪ゴムでもいいから！"
20042-280 = "先生は\n楽しんでるみたいだね、\nキャンプ。"
20042-290 = "じゃあ、あたしも\nちょっとは\n楽しんでみよっかな！"
20042-700 = "暇だなぁ……"
20042-710 = "携帯ゲーム\n機でも持ってくれば\n良かった……。"
20042-720 = "電磁波を\n感じてみたいかも……。"
20042-730 = "自然のキャンバスに何か\n描いてみようかな。"
20042-740 = "（あ、壁画……\n消すの忘れてた）"
20042-750 = "（ま、別に何も\n起こらないよね？）"
20042-760 = "思ってたよりは\n悪くなかったかも？"
20042-770 = "夕飯の水炊きは\n美味しかったし……。"
20042-780 = "スマホ持ってきて\nいいなら、また\n来たいかも。"
20042-790 = "べ、別にキャンプが好きに\nなったわけじゃないよ…！"
20042-800 = "うぅ……年末特番を\n見れないなんて……。"
