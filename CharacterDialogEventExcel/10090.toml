[translation]
10090-180 = "(Ah, não entre em pânico, não entre em pânico...!)"
10090-190 = "Professor, pessoal! Sejam bem-vindos a Hyakkiyako!"
10090-200 = "Para que possamos criar as melhores memórias em Hyakkiyako!"
10090-210 = "Satohama Umika, farei o meu melhor!"
10090-220 = "Professor... eu fui bem agora, não fui...?"
10090-230 = "Uuu... espero que o cronograma não saia muito do planejado..."
10090-240 = "M-mas, claro, colocar tudo de volta nos eixos também é meu trabalho!"
10090-250 = "Tudo por causa do Chimi Ichiza...!"
10090-260 = "Mas... não deve haver ninguém realmente mau entre as crianças que amam festivais."
10090-270 = "...Não é, Professor?"
10090-280 = "Ah, Professor! Muito obrigada por ficar comigo até o fim."
10090-290 = "Foi muito bom ter você aqui, Professor!"
10090-300 = "Será que estou fazendo um bom trabalho? Será que estou conseguindo...?"
10090-310 = "Uuu... obrigada por dizer isso..."
10090-320 = "Afinal... se pudéssemos transformar tudo em um festival...!"
10090-330 = "Sim? Isso soou como algo que um monstro de festival diria? De jeito nenhum..."
10090-340 = "Não, espere. Monstro de festival... usando isso como tema..."
10090-350 = "Dizem que não há nada a temer se estivermos juntos."
10090-360 = "Digo, a preparação para o trabalho só é possível quando todos unem forças,"
10090-370 = "para que possamos terminar dentro do prazo."
10090-380 = "Venha visitar Hyakkiyako novamente..."
10090-390 = "Da próxima vez, mostrarei um festival realmente incrível e maravilhoso!"
10090-530 = "Ah, Professor!"
10090-540 = "Hehe. Isso mesmo. É a loja especial da viagem escolar."
10090-550 = "Fique à vontade para dar uma olhada!"
10090-560 = "Encontrou algo que gostou?"
10090-570 = "Além disso, precisa de alguma coisa?"
10090-580 = "Pode me pedir qualquer coisa!"
10090-590 = "O expediente da loja da viagem escolar terminou..."
10090-600 = "Mas o festival de Hyakkiyako está apenas começando!"
10090-610 = "Sim? Sim, estou bem. Distribuição, gestão, vendas."
10090-620 = "Eu administrava a Hyakkiyado junto com a presidente, então..."
10090-630 = "Aprendi naturalmente."
10090-640 = "Não é tão difícil. Estou acostumada."
10090-650 = "Mas se o Professor vier me ver... seria bom. Hehe."
10090-660 = "Vai levar isso? Muito obrigada!"
10090-670 = "Sim, essa é uma ótima escolha!"
10090-680 = "Uau! Acho que eu teria escolhido a mesma coisa!"
10090-690 = "Obrigada pela preferência. Hehe."
