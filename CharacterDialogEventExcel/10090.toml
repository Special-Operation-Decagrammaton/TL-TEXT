[translation]
10090-130 = "（あ、慌てないで、\n慌てないで……！）"
10090-140 = "先生、皆さん！\n百鬼夜行へようこそ！"
10090-150 = "百鬼夜行で、最高の\n思い出を残せるように！"
10090-160 = "里浜ウミカ、\nベストを尽くします！"
10090-170 = "先生……いま私、\n大丈夫でしたよね……？"
10090-180 = "私、うまくやれる\nでしょうか？\nうまくやれているの\nでしょうか……？"
10090-190 = "ううう……\nそう言ってくださって\nありがとうございます……"
10090-200 = "やっぱり……\nすべてをお祭りに\nしてしまえば……！"
10090-210 = "はい？今のは何かお祭り怪\n人のようなセリフだった？\nそんな……"
10090-220 = "いえ、待ってください。\nお祭り怪人……\nこれをモチーフにして……"
10090-230 = "一緒なら何も\n怖くないと言います。"
10090-240 = "といいますか、仕事の\n準備というのはみんなで\n力を合わせてこそ、"
10090-250 = "ようやく締め切り内に\n終わらせることが\nできるものですから。"
10090-260 = "今度また……\n百鬼夜行にきてください。"
10090-270 = "その時は本当に格好良くて\n素晴らしいお祭りを\nお見せしますね！"
10090-280 = "あ、先生！\n最後までお付き合いいただき、\n本当にありがとうございます。"
10090-290 = "先生がいてくださって、\n本当によかったです！"
10090-300 = "私、うまくやれる\nでしょうか？\nうまくやれているの\nでしょうか……？"
10090-310 = "ううう……\nそう言ってくださって\nありがとうございます……"
10090-320 = "やっぱり……\nすべてをお祭りに\nしてしまえば……！"
10090-330 = "はい？今のは何かお祭り怪\n人のようなセリフだった？\nそんな……"
10090-340 = "いえ、待ってください。\nお祭り怪人……\nこれをモチーフにして……"
10090-350 = "一緒なら何も\n怖くないと言います。"
10090-360 = "といいますか、仕事の\n準備というのはみんなで\n力を合わせてこそ、"
10090-370 = "ようやく締め切り内に\n終わらせることが\nできるものですから。"
10090-380 = "今度また……\n百鬼夜行にきてください。"
10090-390 = "その時は本当に格好良くて\n素晴らしいお祭りを\nお見せしますね！"
10090-530 = "あっ、先生！"
10090-540 = "えへへ。そうです。\n修学旅行の特別ショップです。"
10090-550 = "思う存分見て行ってください！"
10090-560 = "お気に召したものは\nありましたか？"
10090-570 = "それと、必要なものは\nありますか？"
10090-580 = "何でもおっしゃってください！"
10090-590 = "修学旅行ショップの\n営業は終了しました……"
10090-600 = "でも百鬼夜行の\nお祭りはこれからです！"
10090-610 = "はい？はい。大丈夫です。\n流通、管理、営業。"
10090-620 = "社長のそばで百夜堂を\n一緒に運営していたので。"
10090-630 = "自然と学びました。"
10090-640 = "そんなに大変ではありません。\n慣れてますから。"
10090-650 = "でも先生が来てくださるなら……\nいいですね。えへへ。"
10090-660 = "それになさいますか？\nありがとうございます！"
10090-670 = "はい、それは良い選択です！"
10090-680 = "わあ！\n私でもそれを選んだと思います！"
10090-690 = "ご利用ありがとうございます。\nえへへ。"
