[translation]
0-10 = "Olá, Sensei.\nEstou realizando os trabalhos de\nrestauração aqui no Distrito Shiratori de D.U."
0-20 = "Este é o\nDistrito Shiratori de D.U."
0-30 = "A situação é parecida em todos os lugares,\nmas precisamos nos apressar com a\nrestauração deste distrito também."
0-40 = "A restauração está\nprogredindo bem."
0-50 = "Se continuarmos assim,\nlogo poderemos recuperar\nas ruas como eram antes."
0-60 = "O fim dos trabalhos de\nrestauração já está à vista."
0-70 = "Agradeço pelos seus\nesforços, Sensei."
0-80 = "Os trabalhos de restauração do\nDistrito Shiratori foram concluídos."
0-90 = "Se não se importar,\ngostaria de verificar o local\ncomigo?"
0-100 = "Estava me chamando, Sensei?\nEntão, qual seria o assunto...?"
0-110 = "Graças à cooperação de\nmuitos alunos,\na reconstrução está indo bem."
0-120 = "Foi uma boa decisão\npedir ajuda ao Schale."
0-130 = "…Pela sua aparência,\nparece que não há problemas\ncom a sua saúde."
0-140 = "…Fiquei aliviada."
0-150 = "Prédios que desabaram\npodem ser reconstruídos, mas..."
0-160 = "A saúde perdida\nnão pode ser recuperada."
0-170 = "Por favor, não se\nesforce demais."
0-180 = "Ah, Sensei.\nBem-vindo."
0-190 = "Vou recolher os materiais que sobraram~"
0-200 = "(Croc) Mastigando..."
0-210 = "Hum, é o Sensei."
0-220 = "Fufu, será que o\nSensei também está matando aula?"
0-230 = "Haa. Restaurar a cidade\né tão trabalhoso..."
0-240 = "Seria bom se todos os prédios\nde D.U. fossem feitos de doces."
0-250 = "Aí, a qualquer momento, teria sabor de menta...!"
0-260 = "É a primeira vez na vida que\nfico tão ocupada..."
0-270 = "Mas bem, como recebi ajuda, não é nada mal\nmovimentar o corpo de vez em quando."
0-280 = "Você precisa disso?"
0-290 = "Tudo bem~.\nPode pegar o que quiser."
0-300 = "Eu também estava\ncuriosa sobre isso~."
0-310 = "Sim, sim,\npode levar.\nVolte sempre~."
0-320 = "Se precisar de algo,\npode trocar você mesmo~."
0-330 = "Ah, e não esqueça de\npreencher o livro de registros."
0-340 = "O-olá, Sensei."
0-350 = "Vamos nos esforçar hoje\ntambém, um pelo outro..."
0-360 = "Espero que os trabalhos de restauração\nprogridam conforme o planejado."
0-370 = "Como o Sensei está aqui,\nnão estou preocupada, no entanto."
0-380 = "Há materiais de trabalho\npor toda parte..."
0-390 = "Sensei, por favor,\ncuidado onde pisa."
0-400 = "Parece que a Rin-senpai tem se\nesforçado demais ultimamente..."
0-410 = "Estou um pouco preocupada."
0-420 = "J-já terminou?!\nComo esperado do Sensei!"
0-430 = "Bom trabalho, Sensei!\nÉ algo singelo, mas\naceite este agradecimento do Conselho Estudantil Federal...!"
0-431 = "…Já terminou?\nVou trazer a próxima lista."
0-440 = "Ora, aconteceu\nalgo?"
0-450 = "Se houver algo que esteja te incomodando,\npode me consultar sobre qualquer coisa."
0-460 = "Afinal, estou aqui como\nassistente do Sensei."
0-470 = "Poderia se concentrar\num pouco?"
0-480 = "Não em mim, mas\nno trabalho..."
0-490 = "Não precisa ficar\ntão alerta."
0-500 = "…Eu também me machuco, sabe?"
0-510 = "Ei…\nNão se preocupe comigo,"
0-520 = "por favor, verifique\naquele lado."
0-530 = "Eu disse, não se\npreocupe comigo…"
0-540 = "Eu não esperava que você acertasse…\nVocê é incrível, Sensei."
0-550 = "Não está nada mal."
0-560 = "Acho que está bom."
0-570 = "Ainda tem mais.\nVamos continuar."
0-580 = "Ora, aconteceu alguma coisa?"
0-590 = "Se estiver com algum problema,\npode me contar qualquer coisa."
0-600 = "Afinal, estou aqui\ncomo sua assistente, Sensei."
0-610 = "Poderia se concentrar um pouco?"
0-620 = "Não em mim, mas no trabalho…"
0-630 = "Não precisa ficar tão alerta."
0-640 = "…Eu também me machuco, sabe?"
0-650 = "Ei… não se preocupe comigo,"
0-660 = "por favor, verifique aquele lado."
0-670 = "Eu disse, não se preocupe comigo…"
0-680 = "Sim, bom trabalho, Sensei."
0-690 = "Problema resolvido. Obrigada."
0-700 = "O trabalho de hoje termina aqui.\nBom trabalho, Sensei."
0-710 = "Ora, aconteceu\nalguma coisa?"
0-720 = "Se estiver com algum\nproblema, pode me\ncontar qualquer\ncoisa."
0-730 = "Afinal, estou aqui\ncomo sua assistente,\nSensei."
0-740 = "Poderia se\nconcentrar um pouco?"
0-750 = "Não em mim,\nmas no trabalho…"
0-760 = "Não precisa ficar\ntão alerta."
0-770 = "…Eu também me machuco, sabe?"
0-780 = "Ei…\nNão se preocupe comigo,"
0-790 = "por favor, verifique\naquele lado."
0-800 = "Eu disse,\nnão se preocupe comigo…"
0-810 = "É uma boa tendência,\nnão está nada mal."
0-820 = "Estamos indo bem,\nvamos continuar."
0-830 = "Isso é…\ninesperado."
0-840 = "…Então era aqui que\nessa coisa estava\nescondida."
0-850 = "Muito bem, vamos\ncomeçar a próxima missão."
