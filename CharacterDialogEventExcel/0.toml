[translation]
0-10 = "こんにちは、先生。\nこちらでD.U.シラトリ区の\n復旧作業を\n行っております。"
0-20 = "ここが\nD.U.シラトリ区です。"
0-30 = "どこも状況は\n似たようなものですが、\nこちらの区も復旧を\n急がなければいけませんね。"
0-40 = "復旧は順調に\n進んでいますね。"
0-50 = "この調子でしたら、\nじきに元の町並みを\n取り戻せるでしょう。"
0-60 = "復旧作業も終わりが\n見えてきました。"
0-70 = "先生のご尽力に\n感謝いたします。"
0-80 = "シラトリ区の復旧作業は\n完了いたしました。"
0-90 = "よろしければ、\nご一緒に現場を\n確認しませんか？"
0-100 = "お呼びですか、先生？\nそれで、ご用件は…？"
0-110 = "多くの生徒が\n協力してくれたおかげで、\n復興は順調です。"
0-120 = "シャーレに\nお願いして正解でした。"
0-130 = "…そのご様子ですと、\n体調は問題\nなさそうですね。"
0-140 = "…安心、しました。"
0-150 = "崩れた建物は\n建て直すことが\nできますが、"
0-160 = "失った健康は\n取り戻せません。"
0-170 = "決して、\nご無理はなさらずに。"
0-180 = "あ、先生。\nいらっしゃい。"
0-190 = "残った資材、回収するよ～"
0-200 = "（パリッ）もぐもぐ…。"
0-210 = "ん、先生じゃん。"
0-220 = "ふふっ、もしかして\n先生もサボり？"
0-230 = "はぁ。都市の\n復旧なんてめんど…。"
0-240 = "D.U.の建物が\n全部お菓子だったら\nいいのに。"
0-250 = "そしたらいつでも\n明太子味が…！"
0-260 = "こんなに忙しいのは\n生まれて初めてだよ…。"
0-270 = "でもまぁ、世話になったわけだし、\nたまには身体を\n動かすのも悪くないからね。"
0-280 = "それが必要なの？"
0-290 = "いいよ～。\n好きに持ってって。"
0-300 = "それ、私も\n気になってたんだよね～。"
0-310 = "はいはい、\n持ってっていいよ。\nまたどうぞ～。"
0-320 = "必要なものがあったら、\n自分で交換してって～。"
0-330 = "あ、帳簿もちゃんと\n書いといてよ。"
0-340 = "こ、こんにちは、先生。"
0-350 = "今日もお互い、\n頑張りましょう…。"
0-360 = "復旧作業、計画通り\n進むといいですね。"
0-370 = "先生がいらっしゃるので、\n心配はしておりませんが。"
0-380 = "作業中の資材があちこちに…。"
0-390 = "先生も足元に\nお気をつけください。"
0-400 = "ここ最近のリン先輩は、\n特に無理を\nされているみたいで…。"
0-410 = "ちょっと心配です。"
0-420 = "も、もう終わったのですか？\n流石です、先生！"
0-430 = "お疲れさまでした、先生！\nささやかではありますが、\n連邦生徒会からのお礼です…！"
0-431 = "…もう終わったの？\n次のリストを持ってくるわね。"
0-440 = "あら、何か\nあったのかしら？"
0-450 = "困っている事が\nあるのなら、なんでも\n相談してちょうだい。"
0-460 = "私は、先生の補佐として\nここにいるのだから。"
0-470 = "少し集中して\nもらえるかしら？"
0-480 = "いえ、私ではなく、\n仕事に…。"
0-490 = "そう警戒しないで\nちょうだい。"
0-500 = "…私も傷つくのよ？"
0-510 = "あの…\n私の事はいいから、"
0-520 = "あっちを\n確認してちょうだい。"
0-530 = "だから、\n私の事はいいから…"
0-540 = "まさか当てるだなんて…\nすごいわね、先生。"
0-550 = "悪くないわね。"
0-560 = "良いと思うわ。"
0-570 = "まだまだあるもの。\n続けていきましょう。"
0-580 = "あら、何かあったのかしら？"
0-590 = "困っている事があるのなら、\nなんでも相談してちょうだい。"
0-600 = "私は、先生の補佐として\nここにいるのだから。"
0-610 = "少し集中してもらえるかしら？"
0-620 = "いえ、私ではなく、仕事に…。"
0-630 = "そう警戒しないでちょうだい。"
0-640 = "…私も傷つくのよ？"
0-650 = "あの…私の事はいいから、"
0-660 = "あっちを確認してちょうだい。"
0-670 = "だから、私の事はいいから…"
0-680 = "はい、お疲れ様。先生。"
0-690 = "これで解決ね。ありがとう。"
0-700 = "本日の業務は、これで全てね。\nお疲れ様、先生。"
0-710 = "あら、何か\nあったのかしら？"
0-720 = "困っている事が\nあるのなら、\nなんでも相談して\nちょうだい。"
0-730 = "私は、先生の\n補佐としてここに\nいるのだから。"
0-740 = "少し集中して\nもらえるかしら？"
0-750 = "いえ、\n私ではなく、\n仕事に…。"
0-760 = "そう警戒しないで\nちょうだい。"
0-770 = "…私も傷つくのよ？"
0-780 = "あの…\n私の事はいいから、"
0-790 = "あっちを確認して\nちょうだい。"
0-800 = "だから、\n私の事はいいから…"
0-810 = "いい傾向ね、\n悪くないわ。"
0-820 = "順調ね、\n続けましょう。"
0-830 = "これは…\n予想外だわ。"
0-840 = "…ここに\nこんなものが\n隠れていたのね。"
0-850 = "さあ、次の任務を\n始めましょう。"
