[translation]
10025-10 = "Está um clima perfeito\npara um passeio, não é?"
10025-20 = "Hoje eu vou ser a sua\nguia por Shanhaijing!"
10025-30 = "A-a Shun-oneesan\nserá que foi para onde...?"
10025-40 = "(E-eu ainda não fui\ndescoberta, né...?)"
10025-50 = "Sensei, tem muitos doces deliciosos ali!"
10025-60 = "(Hehe. Este corpo também\nnão é tão ruim assim.)"
10025-290 = "Bem-vindo de volta!\nSensei! Conto com você\nna aula de hoje também!"
10025-300 = "Hehe, este tamanho\nàs vezes é bem útil!"
10025-310 = "Hmm... estou\ncomeçando a ficar com sono..."
10025-320 = "Muito obrigada!"
10025-330 = "Hehe. Muito obrigada,\nSensei."
