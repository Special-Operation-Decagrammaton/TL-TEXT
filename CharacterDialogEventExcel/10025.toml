[translation]
10025-10 = "お散歩にぴったりの\nお天気ですねっ。"
10025-20 = "今日は私が、\n山海経を案内しますねっ！"
10025-30 = "しゅ、\nシュンお姉さんはどこに\n行ったんでしょうね…？"
10025-40 = "（ま、まだバレて\nませんよね……？）"
10025-50 = "先生、あそこに美味しそうなお菓子がいっぱいあります！"
10025-60 = "（ふふっ。この身体も、\nそれほど悪くないですね）"
10025-290 = "おかえりなさい、です！\n先生！今日の授業も\nよろしくお願いします！"
10025-300 = "ふふっ、このサイズも\n時には便利ですね！"
10025-310 = "んん……\n眠くなってきました……"
10025-320 = "ありがとうございます！"
10025-330 = "ふふ。ありがとう\nございます、先生。"
