[translation]
10055-450 = "やっほー、先生。\nよかったら温泉郷の仕事を\n手伝ってもらえないかな。"
10055-460 = "ちょっといい？\n温泉に浸かる前に軽く運動したくて。"
10055-470 = "ノドカは\n頑張り屋さんなんだから。"
10055-480 = "ふふ、今回のモルスは\nよく出来てる。"
10055-490 = "ん？一緒に\nお風呂に行きたいの？"
10055-500 = "冗談。\nそんな真顔にならないで。"
10055-510 = "お疲れ様。\nよかったらモルス一口、どう？"
10055-520 = "さすが先生。\n皆に人気の理由が分かったよ。"
