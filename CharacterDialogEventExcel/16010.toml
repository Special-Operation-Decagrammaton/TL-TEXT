[translation]
16010-250 = "この格好、ちょっと\n慣れないけど…"
16010-260 = "でも「晄輪大祭」が\n成功するためなら…"
16010-270 = "ふふ、楽しい\nお祭りになると良いね。"
16010-280 = "が、頑張れ、\n頑張れ…！先生！"
16010-290 = "私が作った服だけど…\nみんな…あんまり\n気にしてないのかな…"
16010-300 = "この服のしっぽの\n辺りが気になるって…？"
16010-310 = "今は…ちょっと\n言えないけど…"
16010-320 = "後でこっそり、\n構造を教えてあげる…"
16010-330 = "やっぱり情熱を\n燃やすのは…\nロマンだね。"
16010-340 = "この格好、ちょっと\n慣れないけど…"
16010-350 = "でも「晄輪大祭」が\n成功するためなら…"
16010-360 = "ふふ、楽しい\nお祭りになると良いね。"
16010-370 = "（チアリーディング、\nどれだけ練習しても\nあんまり慣れない…）"
16010-380 = "「晄輪大祭」の準備も\nほとんど終わったみたい。\nあともう少し…頑張ろう。"
16010-390 = "手伝ってくれて\nありがとう、先生。"
16010-400 = "本祭でも私たちの\n応援を楽しんでね。"
16010-410 = "が、頑張れ、\n頑張れ…！先生！"
16010-420 = "私が作った服だけど…\nみんな…あんまり\n気にしてないのかな…"
16010-430 = "この服のしっぽの\n辺りが気になるって…？"
16010-440 = "今は…ちょっと\n言えないけど…"
16010-450 = "後でこっそり、\n構造を教えてあげる…"
16010-460 = "やっぱり情熱を\n燃やすのは…\nロマンだね。"
16010-470 = "先生、いらっしゃい。\n「晄輪大祭」の準備に必要な\n資材を集めていたところ。"
16010-480 = "「晄輪大祭」の準備に\n必要な物資は、\nここに持ってきてね。"
16010-490 = "お疲れさま、先生。\nもし残った物資があったら、\n私が交換してあげる。"
16010-500 = "ん？どうしたの？"
16010-510 = "あの…応援なら後でしてあげる。\n今はちょっと…"
16010-520 = "うん、良いものだね。\n手伝ってくれてありがとう。"
16010-530 = "ささやかだけど…\n手伝ってくれたお礼。\n受けとってほしい。"
16010-540 = "これなら…みんな喜ぶと思う。"
16010-550 = "すごく役に立ったよ。\nありがとう、先生。"
