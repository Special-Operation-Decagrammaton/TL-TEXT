[translation]
16010-250 = "Este visual, ainda não estou\nmuito acostumada com ele..."
16010-260 = "Mas se for para o sucesso\ndo Festival Esportivo..."
16010-270 = "Hehe, espero que seja\num festival divertido."
16010-280 = "V-vamos lá,\nforça...! Professor!"
16010-290 = "Fui eu quem fiz essas roupas, mas...\nserá que o pessoal...\nnão ligou muito para isso?"
16010-300 = "Você está curioso sobre\na parte da cauda desta roupa...?"
16010-310 = "Agora... eu não posso\ndizer muito..."
16010-320 = "Depois, eu te conto\na estrutura em segredo..."
16010-330 = "No fim das contas, queimar\nde paixão é...\num romance, não é?"
16010-340 = "Este visual, ainda não estou\nmuito acostumada com ele..."
16010-350 = "Mas se for para o sucesso\ndo Festival Esportivo..."
16010-360 = "Hehe, espero que seja\num festival divertido."
16010-370 = "(Líder de torcida, não importa\no quanto eu pratique,\nnão me acostumo muito...)"
16010-380 = "Parece que os preparativos para o\nFestival Esportivo quase terminaram.\nSó mais um pouco... vamos nos esforçar."
16010-390 = "Obrigada por ajudar,\nProfessor."
16010-400 = "Aproveite nossa torcida\nno festival principal também."
16010-410 = "V-vamos lá,\nforça...! Professor!"
16010-420 = "Fui eu quem fiz essas roupas, mas...\nserá que o pessoal...\nnão ligou muito para isso?"
16010-430 = "Você está curioso sobre\na parte da cauda desta roupa...?"
16010-440 = "Agora... eu não posso\ndizer muito..."
16010-450 = "Depois, eu te conto\na estrutura em segredo..."
16010-460 = "No fim das contas, queimar\nde paixão é...\num romance, não é?"
16010-470 = "Professor, bem-vindo.\nEu estava reunindo os materiais\nnecessários para o Festival Esportivo."
16010-480 = "Por favor, traga os suprimentos\nnecessários para o Festival Esportivo\npara cá."
16010-490 = "Bom trabalho, Professor.\nSe tiver algum suprimento sobrando,\neu troco para você."
16010-500 = "Hm? O que houve?"
16010-510 = "Ah... se for para torcer, eu faço depois.\nAgora eu estou um pouco..."
16010-520 = "Sim, isso é bom.\nObrigada por ajudar."
16010-530 = "É algo simples, mas...\ncomo agradecimento pela ajuda.\nPor favor, aceite."
16010-540 = "Com isso... acho que todos ficarão felizes."
16010-550 = "Foi muito útil.\nObrigada, Professor."
