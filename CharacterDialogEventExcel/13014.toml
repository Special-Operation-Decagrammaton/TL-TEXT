[translation]
13014-220 = "Mar azul! Céu azul!
Nuvens brancas!
É a combinação perfeita, não é!"
13014-230 = "Claro que
a vitória será nossa.
Professor, conto com a sua torcida!"
13014-240 = "Vamos dar o nosso melhor
pelo resto do tempo!"
13014-250 = "Não podemos baixar a guarda
até o último segundo!"
13014-260 = "O festival
acabou, mas...
a juventude continua!"
13014-270 = "Atividades de juventude exclusivas de verão!
Mestre, estou tão animada!"
13014-280 = "Mestre,
você quer nadar comigo?"
13014-290 = "Tudo bem,
vamos ver quem é mais rápido!"
13014-300 = "Não podemos baixar a guarda.
Vamos nos manter focados."
13014-310 = "Estou contando com a sua
explicação, Mestre!"
13014-570 = "Caça ao tesouro na praia!
O que será que está
escondido por aqui?"
13014-580 = "Fazer uma caça ao tesouro juntos
também é bem a cara da juventude!
Muito bem, vamos tentar!"
13014-590 = "Ah, foi divertido!
Quero fazer de novo."
13014-600 = "Tornou-se uma memória
preciosa. Mestre,
obrigada."
13014-610 = "Tem tantos tesouros diferentes
que nem sei para onde olhar."
13014-620 = "Hm? Quer saber qual é o meu
tesouro mais precioso?"
13014-630 = "I-isso é..."
13014-640 = "Não posso dizer!
É um segredo absoluto!"
13014-650 = "A juventude com a qual eu sonhava,
tornou-se realidade mais uma vez..."
13014-660 = "M-muito obrigada,
Mestre...!"
13014-670 = "Oh! Isso aqui,
não é um tesouro!?"
13014-680 = "Mestre!
Encontrei uma pista!"
13014-690 = "Tesouro encontrado!
Agora, vamos ver a recompensa...!"
13014-700 = "Como esperado do Mestre!
Você foi muito habilidoso!"
13014-710 = "Vamos procurar
o próximo tesouro!"
