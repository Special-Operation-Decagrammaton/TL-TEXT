[translation]
13014-220 = "青い海！青い空！\n白い雲！\n最高の響きだよな！"
13014-230 = "もちろん、\n優勝はいただくよ。\n先生も応援よろしくな！"
13014-240 = "残りの期間も\n全力を尽くそう！"
13014-250 = "最後の最後まで\n気は抜けないな！"
13014-260 = "お祭りは\n終わったけど……\n青春はまだまだ続くよ！"
13014-270 = "夏限定の青春活動！\n師匠、楽しみだな！"
13014-280 = "師匠、\nアタシと泳ぎたいのか？"
13014-290 = "いいよ、\nどっちが速いか勝負だ！"
13014-300 = "油断大敵だな。\n気を引き締めていこう。"
13014-310 = "師匠の解説、\n期待してるからね！"
13014-570 = "海辺の宝探し！\nどんなものが\n隠されてるのかな？"
13014-580 = "一緒に宝探しするのも\n青春っぽいよな！\nよ～っし、やってみよう！"
13014-590 = "あ～楽しかった！\nまたやりたいね。"
13014-600 = "大切な思い出に\nなったよ。師匠、\nありがとな。"
13014-610 = "色んな宝物があって\n目移りしちゃうなぁ。"
13014-620 = "うん？アタシの一番\n大切な宝物は何かって？"
13014-630 = "そ、それは……"
13014-640 = "言えない！\n絶対に秘密！"
13014-650 = "夢見てた青春が、\nまた一つ現実に……。"
13014-660 = "ほ、本当にありがとう、\n師匠……！"
13014-670 = "お！これ、\nお宝じゃないか！？"
13014-680 = "師匠！\n手がかりを見つけたよ！"
13014-690 = "お宝ゲット！\nさぁて、報酬は……！"
13014-700 = "さすが師匠！\nいい手際だったよ！"
13014-710 = "次のお宝を\n見つけに行こう！"
