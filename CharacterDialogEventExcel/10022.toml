[translation]
10022-10 = "Bem-vindo, Sensei.\nComo pode ver, a preparação para o\nacampamento de verão está perfeita. Pode pedir o que quiser."
10022-20 = "Ah, Sensei.\nVocê conferiu direitinho o\ncronograma do acampamento?"
10022-30 = "Está tão quente hoje também,\nentão não se esqueça de se hidratar."
10022-40 = "Verão... É abafado,\ncansativo, e tudo parece\nser um incômodo, mas..."
10022-50 = "Isso também faz parte do\ntreinamento, não tem jeito."
10022-60 = "O mar sempre traz perigos."
10022-70 = "Nunca se sabe quando ou onde\num acidente pode acontecer,\nentão tome cuidado."
10022-80 = "E... se acontecer\nalgo, pode me chamar."
10022-90 = "O acampamento de treinamento de verão.\nQuem diria que este ano,\neu estaria com o Sensei..."
10022-100 = "...É um pouco diferente."
10022-110 = "Este traje de banho é apenas\npara o treinamento..."
10022-120 = "Não precisava comprar um novo,"
10022-130 = "pensei que seria mais eficiente\nusar o que já tinha..."
10022-330 = "A partir de agora, o treinamento\ndo acampamento de verão vai começar."
10022-340 = "É um incômodo, mas\nisso também faz parte do treinamento."
10022-350 = "Que calor, que preguiça..."
10022-360 = "Parece que o acampamento\nrealmente surtiu efeito."
