[translation]
10022-10 = "いらっしゃい、先生。\n見ての通り、夏合宿の\n準備は完璧。何でも言って。"
10022-20 = "ああ、先生。\n合宿のスケジュールは\nちゃんと確認した？"
10022-30 = "今日もこんなに暑いし、\n水分補給はこまめにね。"
10022-40 = "夏……。蒸し暑くて、\nだるくて、何もかも\nめんどうだけど……。"
10022-50 = "これもトレーニングの\n一環、仕方ない。"
10022-60 = "海には常に危険が伴う。"
10022-70 = "いつどこで事故が起こるか\n分からないから、\n気を付けて。"
10022-80 = "その……\n何かあったら、私のことを\n呼んでくれれば。"
10022-90 = "夏のトレーニング合宿。\nまさか今年は、\n先生と一緒だなんて……"
10022-100 = "……ちょっと新鮮。"
10022-110 = "この水着はあくまで、\nトレーニングのためで…。"
10022-120 = "新しい物を買わなくても、"
10022-130 = "そのまま使えば\n効率的かなって……。"
10022-330 = "これより、夏合宿の\nトレーニングを始める。"
10022-340 = "面倒だけど、\nこれもトレーニングの一環。"
10022-350 = "暑い、めんどくさい……。"
10022-360 = "ちゃんと合宿の\n効果があったみたい。"
