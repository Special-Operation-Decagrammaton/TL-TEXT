[translation]
20028-120 = "O-estávamos\nesperando por você, Sensei!"
20028-130 = "A-a preparação\nestá pronta!"
20028-140 = "Pode me chamar\na qualquer momento!"
20028-150 = "Falta pouco!\nVamos nos esforçar!"
20028-160 = "Vamos nos manter focados\naté o fim……!"
20028-170 = "Pode deixar a limpeza\ncomigo.\nFufu."
20028-180 = "Está quente, não é……\nO sol também está forte……"
20028-190 = "Hum, se não se importar,\ngostaria de um chapéu?"
20028-200 = "Ah, Sensei?\nO que houve?"
20028-210 = "E-errado…… Sensei?\nHum…… se tiver algum\nassunto, pode falar……"
20028-220 = "Hya! Se-Sensei!\nI-isso faz cócegas!"
20028-230 = "Hya, ahaha!"
20028-440 = "Está procurando por algo?"
20028-450 = "Por favor, fique à vontade para escolher!"
20028-460 = "Ainda temos tempo, que tal\ndarmos uma olhada juntos?"
20028-470 = "Se-Sensei…… fufu!\nN-não se preocupe comigo……\nFufu!"
20028-480 = "Err……\nPrecisa de alguma coisa……?"
20028-490 = "I-isso é maravilhoso!\nEu também acho uma boa escolha."
20028-500 = "Sim! É isto aqui!"
20028-510 = "Isso é\nalgo muito bom……!\nComo esperado do Sensei."
20028-520 = "Fico feliz que tenha\nencontrado o que procurava!"
