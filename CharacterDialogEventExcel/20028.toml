[translation]
20028-120 = "お、お待ちして\nおりました、先生！"
20028-130 = "じゅ、準備は\nできております！"
20028-140 = "いつでも\nお声がけください！"
20028-150 = "あと少しです！\n頑張りましょう！"
20028-160 = "最後まで、\n気を引き締めて\nいきましょう……！"
20028-170 = "後片付けなら\nお任せください。\nふふ。"
20028-180 = "暑いですね……\n日差しも強くて……"
20028-190 = "その、よろしければ\n帽子、いかがですか？"
20028-200 = "あれっ、先生？\nどうされました？"
20028-210 = "え、えっと……先生？\nその……用件が\nありましたらお話を……。"
20028-220 = "ひゃっ！せ、先生！\nく、くすぐったいです！"
20028-230 = "ひゃっ、あははっ！"
20028-440 = "何かお探しですか？"
20028-450 = "どうぞ、お選びください！"
20028-460 = "まだ時間がありますから、\n一緒に見てまわりませんか？"
20028-470 = "せ、先生……ふふっ！\nわ、私の事はいいですから……\nふふ！"
20028-480 = "えっと……\n何かご用でしょうか……？"
20028-490 = "す、素敵ですね！\n私も良いと思います。"
20028-500 = "はい！こちらになります！"
20028-510 = "それは\nとても良いものですね……！\nさすがです、先生。"
20028-520 = "お探しのものが見つかって、\nよかったです！"
