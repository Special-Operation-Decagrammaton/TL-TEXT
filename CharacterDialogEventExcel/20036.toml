[translation]
20036-320 = "さあ、先生！\n時間なんて無いわよ！\n早く行きましょう！"
20036-330 = "あ、先生！\nこっち、こっち！"
20036-340 = "ん？どうしたの？\nなにかやることある？"
20036-350 = "先生……\n何してんの。"
20036-360 = "それ、面白いと\n思ってんの？ねぇ？"
20036-370 = "変なことばっかして\nないでやることやって！\n早く！"
