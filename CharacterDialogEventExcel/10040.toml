[translation]
10040-200 = "忍術研究部、\n出動です……！"
10040-210 = "きっと何とか、\nなります……よね？"
10040-220 = "この事件は、私たちが、\n解決します……！"
10040-230 = "今ので、\n決まってました……？"
10040-240 = "大きくって、\nごめんなさい……"
10040-250 = "どうして、\nこんなことに……"
10040-260 = "忍術研究部が、解決して、\nみせます……多分……"
10040-270 = "私に何とか、できるので、\nしょうか……"
10040-310 = "忍術研究部、\n出動です……！"
10040-320 = "きっと何とか、\nなります……よね？"
10040-330 = "この事件は、私たちが、\n解決します……！"
10040-340 = "今ので、\n決まってました……？"
10040-350 = "簡単には、解決でき\nなさそう、ですね……\n頑張り、ます……！"
10040-360 = "そろそろ、落ち着き\nそうな、感じが……"
10040-370 = "これもみんなと、\n先生のお陰、です……"
10040-380 = "お疲れ様でした、先生。\n私……少しは役に、\n立てましたか……？"
10040-390 = "大きくって、\nごめんなさい……"
10040-400 = "どうして、\nこんなことに……"
10040-410 = "忍術研究部が、解決して、\nみせます……多分……"
10040-420 = "私に何とか、できるので、\nしょうか……"
10040-630 = "忍具など、\n色々揃ってますので……どうぞ"
10040-640 = "何か必要でしたら、\nこちらで。お役に立てると、\n良いのですが……"
10040-650 = "事件は無事、終わりましたが……\n何か、気になるようでしたら、\nあっはい。まだ、間に合いますので……"
10040-660 = "ん……？えっと、私はその、\n売り物ではなく……"
10040-670 = "もしかして、邪魔、ですか？\nごめんなさい、どきますね……"
10040-680 = "はい、良い忍具だと、\n思います……！"
10040-690 = "少しでも、\nお役に立てればと……"
10040-700 = "ありがとう、ございます、\n先生。"
10040-710 = "なるほど、それと、それと……\n流石は先生、です！"
