[translation]
10124-520 = "まさか、海に\n来られるだなんて\n思いもしませんでした。"
10124-530 = "え？楽しそう？"
10124-540 = "ふふっ、ご想像に\nお任せします。"
10124-550 = "場所が違えば、任務への\n気持ちも変わって\nくるものですね。"
10124-560 = "少しだけ、\nこれからの事が\n楽しみです。"
10124-570 = "あ、先生。\nミカ様とイチカを\n見かけませんでしたか？"
10124-580 = "先ほどから姿が\n見えなくて。"
10124-590 = "面倒事に\n巻き込まれてないと\nいいのですが……。"
10124-600 = "心配しなくて大丈夫……？"
10124-610 = "先生が仰るなら、\n信じますが……。"
10124-620 = "まさか、裏で\nあのような騒動が\nあっただなんて。"
10124-630 = "気付けなかった\n自分が恥ずかしいです。"
10124-640 = "楽しめてたなら\nそれでいい……？"
10124-650 = "私にそんなことを\n言ってくれるのは、\n先生だけでしょうね。"
10124-660 = "イレギュラーは\nありましたが、今回の\n任務も無事終了しました。"
10124-670 = "先生が\n手助けして下さった\nおかげです。"
10124-680 = "正義実現委員会を\n代表して、改めて\nお礼申し上げます。"
10124-690 = "イチカも、少しは\n変わったようですし。"
10124-700 = "本当にありがとう\nございました。"
10124-710 = "今回も、先生を\n頼る結果になって\nしまいましたね。"
10124-720 = "気にするな、ですか……"
10124-730 = "先生の事ですから、\nそうおっしゃると\n思っていましたが……。"
10124-740 = "せめて、気持ちだけでも\n受け取ってください。"
10124-750 = "本当に、ありがとう\nございます。"
10124-760 = "正義実現委員会に\nとっても、今回の計画は\n重要な意味を持ちます。"
10124-770 = "あの子も、いつかは\n独り立ちする\nことになりますから。"
10124-780 = "ご存知の通り、\nツルギは折衝や交渉を\n不得手としています。"
10124-790 = "ですので、\nティーパーティーとの\n連絡も、"
10124-800 = "主に私が\n担当することに\nなっているんです。"
10124-810 = "……思えば、あの\nお三方との付き合いも\n長くなったものです。"
10124-820 = "本当は……\n海に来るのを\n諦めていたんです。"
10124-830 = "ミカ様には、\n感謝しないとですね。"
