[translation]
10124-520 = "Eu nunca imaginei que\npoderíamos vir\npara o mar."
10124-530 = "Eh? Parece divertido?"
10124-540 = "Fufu, deixarei isso\npara a sua imaginação."
10124-550 = "Quando o local muda, a\nnossa disposição para a\nmissão também muda, não é?"
10124-560 = "Estou um pouco\nanimada com o que\nvem a seguir."
10124-570 = "Ah, Sensei.\nVocê não viu a Mika-sama\ne a Ichika por aí?"
10124-580 = "Não as vejo\nhá algum tempo."
10124-590 = "Espero que elas não tenham\nse metido em\nnenhum problema..."
10124-600 = "Não precisa se preocupar...?"
10124-610 = "Se você diz, Sensei,\neu acredito, mas..."
10124-620 = "Eu não acredito que\ntoda aquela confusão\nestava acontecendo nos bastidores."
10124-630 = "Sinto vergonha de não\nter percebido."
10124-640 = "Se você se divertiu,\nentão está tudo bem...?"
10124-650 = "Você é provavelmente a única\npessoa que diria isso\npara mim, Sensei."
10124-660 = "Houve alguns imprevistos,\nmas a missão desta vez\nterminou em segurança."
10124-670 = "Tudo graças à sua\najuda, Sensei."
10124-680 = "Em nome do Comitê de\nJustiça, gostaria de\nagradecer novamente."
10124-690 = "Parece que a Ichika também\nmudou um pouco."
10124-700 = "Muito obrigada\npor tudo."
10124-710 = "Desta vez, acabamos\ndependendo de você\nnovamente, Sensei."
10124-720 = "Para não se preocupar, é..."
10124-730 = "Sendo você, Sensei,\neu já imaginava que\ndiria isso, mas..."
10124-740 = "Pelo menos, aceite\nmeus sentimentos."
10124-750 = "Muito obrigada,\nde verdade."
10124-760 = "Para o Comitê de Justiça,\neste plano tem um\nsignificado importante."
10124-770 = "Porque aquela criança também\nterá que seguir seu próprio\ncaminho um dia."
10124-780 = "Como você sabe, a\nTsurugi não é boa com\nnegociações ou acordos."
10124-790 = "Por isso, a comunicação\ncom o Chá das Cinco,"
10124-800 = "acaba ficando\nprincipalmente sob\nminha responsabilidade."
10124-810 = "...Pensando bem, já faz\nbastante tempo que convivo\ncom aquelas três."
10124-820 = "Na verdade... eu tinha\ndesistido de vir\npara o mar."
10124-830 = "Preciso agradecer\nà Mika-sama."
