[translation]
20006-70 = "Seja bem-vindo à Escola Secundária Shanhaijing, Professor!"
20006-80 = "Hehe... Você não se esqueceu do nosso compromisso de hoje, né, Professor?"
20006-90 = "Para onde será que a instrutora Shun foi...?"
20006-100 = "Hehe... O dia em que criarei o elixir da imortalidade está próximo!"
20006-110 = "Que estranho... Eu não deveria ter colocado nada de errado no \"elixir da juventude\"..."
20006-120 = "Será que... enquanto eu fervia a mistura,"
20006-130 = "o pelo do Nezuke que estava voando pelo ar acabou caindo dentro!?"
20006-140 = "Seja bem-vindo ao meu laboratório itinerante, Professor!"
20006-150 = "Se você tiver bons materiais de alquimia, eu compro por um bom preço!"
20006-160 = "Este laboratório itinerante é apenas temporário."
20006-170 = "Por isso, se houver algum material que você queira, recomendo que consiga logo."
20006-180 = "Ultimamente, o clima na associação comercial está meio estranho..."
20006-190 = "Talvez seja melhor eu fechar este laboratório itinerante logo também."
20006-200 = "O laboratório itinerante encerra hoje."
20006-210 = "Se você precisar de algum material, é melhor trocar logo, viu?"
20006-220 = "Laboratório itinerante, encerrando as atividades!"
20006-230 = "Ah, mas se tiver sobrado algum material, adoraria que você me mostrasse!"
20006-240 = "Quase tudo o que existe no mundo pode ser criado através da alquimia!"
20006-250 = "Hmm... Sobre essa \"pedra azul\" que você mencionou, Professor, eu também não sei muito a respeito..."
20006-260 = "Não é uma má escolha!"
20006-270 = "Hehe, obrigado por reunir bons materiais."
20006-280 = "Oh, uma escolha maravilhosa!"
