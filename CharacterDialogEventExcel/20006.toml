[translation]
20006-70 = "山海経高級中学校へ\nようこそなのだ、先生！"
20006-80 = "ふっふっふ\n今日の約束はもちろん\n覚えてるよね、先生？"
20006-90 = "シュン教官は\nどこに行ったのだ……？"
20006-100 = "ふっふっふ\n不老不死の霊薬を\n生み出せる日は近いのだ！"
20006-110 = "おかしいのだ……\n「若返りの秘薬」に変な\nものは入れなかったはず……。"
20006-120 = "……もしかして\n沸騰させてる時に、"
20006-130 = "空中に舞っていた\nネズ助の毛が\n混ざったのだ！？"
20006-140 = "ぼく様の出張研究所へ\nようこそなのだ、先生！"
20006-150 = "良い錬丹術の素材があったら、\nぼく様が高く買い取るのだ！"
20006-160 = "この出張研究所は\nあくまで臨時のもの。"
20006-170 = "だからもし欲しい材料があったら、\n早めに手に入れておく\nことをおススメするのだ"
20006-180 = "最近何だか、\n商会の雰囲気が怪しいのだ……"
20006-190 = "この出張研究所も、\n早めに畳んだ方が\n良いかもしれないな"
20006-200 = "出張研究所は\n今日でおしまいなのだ"
20006-210 = "もし必要な材料があったら、\n早めに交換しておいた\n方が良いぞ？"
20006-220 = "出張研究所、営業終了なのだ！"
20006-230 = "あ、でも、もし残った\n材料とかがあれば、\n是非ぼく様に見せてほしい！"
20006-240 = "世の中に存在する\nほぼ全てのものは、\n錬丹術で生み出せるのだ！"
20006-250 = "うーん……先生が言ってる\nその「青色の石」については、\nぼく様もよく知らないのだ……"
20006-260 = "悪くない選択だ！"
20006-270 = "ふふ、良い素材を集めてくれて\nありがとうなのだ"
20006-280 = "おお、素晴らしい選択なのだ！"
