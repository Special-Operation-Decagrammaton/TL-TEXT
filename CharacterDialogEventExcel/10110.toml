[translation]
10110-10 = "Olá, Sensei."
10110-20 = "Você continua\nsempre tão ocupado."
10110-30 = "Veio na hora certa,\nSensei."
10110-40 = "É como se fosse\num desejo ardente."
10110-50 = "Hum, o clima\nestá mudando..."
10110-60 = "Ora, não há nada\ncom que se preocupar ainda."
10110-70 = "O fim está próximo, talvez..."
10110-80 = "Mesmo que eu não diga,\nlogo você verá com seus próprios olhos."
10110-90 = "Agradeço por suas ações."
10110-100 = "Mesmo que, no processo,\nvocê veja algo que não deveria."
10110-110 = "Hm?"
10110-120 = "Tem algo que você\ngostaria de me dizer?"
10110-130 = "Você precisa do fato\nde que eu estou aqui?"
10110-140 = "Às vezes, exceções como esta\nnão são nada mal."
10110-150 = "Em um ambiente diferente\ndo da Trinity habitual,"
10110-160 = "……é uma sensação\num tanto estranha."
10110-170 = "Não, não estou\nnegando isso."
10110-660 = "Eu já tinha previsto isso."
10110-670 = "Sinta-se à vontade para ver como quiser."
10110-680 = "Poderia me mostrar a forma\ndo seu desejo?"
10110-690 = "Ora, não há motivo para hesitar."
10110-700 = "Observe com atenção,"
10110-710 = "para que não desapareça\nnum piscar de olhos."
10110-720 = "……Entendo?"
10110-730 = "Você acha que pode me\ndomar com dinheiro?"
10110-740 = "Essa mão que você estendeu,"
10110-750 = "significa que não vai\nrecusar a minha, certo?"
10110-760 = "Então você escolheu isso."
10110-770 = "Não existem escolhas ruins\ndesde o início."
10110-780 = "O que você encontrou e o que você pegou\nsão realmente a mesma coisa?"
10110-790 = "Vamos, segure firme\nessa existência."
10110-900 = "Parece que há muitas coisas\nque precisam do seu olhar."
10110-910 = "Ah, eu estava esperando por você..."
10110-920 = "Ora, é apenas um palpite."
10110-930 = "Não deixe que a interpretação\nda sua existência vacile."
10110-940 = "……É um alívio saber que você\nnão muda, Sensei."
10110-950 = "Agradeço pelo seu esforço."
10110-960 = "Realmente magnífico."
