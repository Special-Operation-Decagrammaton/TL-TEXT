[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10110-10 = "Olá, Sensei." 
10110-20 = "Sempre tão atarefado\ne suadinho, não é?" 
10110-30 = "Chegou em uma ótima hora,\nmeu querido Sensei." 
10110-40 = "Eu já estava sedenta...\nesperando por você." 
10110-50 = "Hmm, parece que o clima...\nestá esquentando por aqui." 
10110-60 = "Fufu, não precisa se preocupar\ncom isso agora." 
10110-70 = "O clímax já está próximo...?" 
10110-80 = "Nem preciso dizer, isso logo\nvai refletir nesses seus olhos." 
10110-90 = "Agradeço por tudo\no que você fez comigo." 
10110-100 = "Não importa o que esses seus\nolhos curiosos acabaram vendo\nno processo..." 
10110-110 = "Hmm?" 
10110-120 = "Tem algum segredinho que\nvocê queira sussurrar pra mim?" 
10110-130 = "Saber que eu estou aqui...\né o suficiente pra te satisfazer?" 
10110-140 = "De vez em quando, abrir uma\nexceção e quebrar as regras\nnão é nada mau." 
10110-150 = "Estar num ambiente diferente\nda Trinity de sempre..." 
10110-160 = "...Me dá um friozinho\nbem gostoso na barriga." 
10110-170 = "Fufu, e eu definitivamente\nnão estou reclamando disso." 
10110-660 = "Eu já tinha previsto\nque você viria aqui." 
10110-670 = "Pode me olhar o quanto quiser." 
10110-680 = "Você poderia me mostrar...\nqual é a verdadeira forma\ndos seus desejos?" 
10110-690 = "Vamos, não precisa ter\nvergonha de mim." 
10110-700 = "Preste muita atenção," 
10110-710 = "Para que eu não suma\nnum piscar de olhos." 
10110-720 = "......Ah, entendi." 
10110-730 = "Você realmente acha que pode...\nme domar só com esse dinheiro?" 
10110-740 = "Se você estender a mão assim," 
10110-750 = "Isso significa que você...\nnão vai rejeitar a minha mãozinha?" 
10110-760 = "Então é isso que você escolheu." 
10110-770 = "Desde o começo, nunca existiu\numa escolha ruim para nós." 
10110-780 = "O que você achou...\né exatamente aquilo que\nvocê queria pegar?" 
10110-790 = "Vamos, pode segurar\nisso bem firme." 
10110-900 = "Parece que muitas coisas\nestão precisando da sua\natenção hoje, não?" 
10110-910 = "Ahh, eu estava sedenta\nte esperando..." 
10110-920 = "Fufu, foi só uma\nintuição feminina." 
10110-930 = "Por favor, não balance tanto\na imagem que eu tenho de você." 
10110-940 = "......Saber que você não muda,\nme traz um alívio imenso,\nmeu querido Sensei." 
10110-950 = "Agradeço por todo o seu suor\ne esforço de hoje." 
10110-960 = "Você foi esplêndido." 