[translation]
10110-10 = "やぁ、先生。"
10110-20 = "相も変わらず\n忙しないね。"
10110-30 = "良いところに来たね、\n先生。"
10110-40 = "渇望もかくや\nというところさ。"
10110-50 = "ふむ、\n気運の高まりが…。"
10110-60 = "何、まだ気にする\nことは無いさ。"
10110-70 = "終幕も近いか……。"
10110-80 = "言わずとも、\nすぐその目に映るとも。"
10110-90 = "君の行いに感謝を。"
10110-100 = "たとえその過程で、\n君が何を視たと\nしてもね。"
10110-110 = "うん？"
10110-120 = "私に何か話すべき\n事柄でも？"
10110-130 = "ここに在るという\n事実が必要かい？"
10110-140 = "時には、こういった\n例外も悪くは無い。"
10110-150 = "普段のトリニティと\n異なる環境に、"
10110-160 = "……こそばゆい\nものだね。"
10110-170 = "いや、\n否定の意味ではないよ。"
10110-660 = "事前に見越していたからね。"
10110-670 = "意のままに見ると良い。"
10110-680 = "君の欲望の形を\n教えてくれるかい？"
10110-690 = "何、躊躇うことは無いとも。"
10110-700 = "刮目したまえ、"
10110-710 = "瞬きの間に\n消えてしまわぬように。"
10110-720 = "……成程？"
10110-730 = "私を金銭で\n飼い馴らせるとでも？"
10110-740 = "そうして君が伸ばした手は、"
10110-750 = "私の手を拒まないことを\n意味するのだろう？"
10110-760 = "それを選び取るのだね。"
10110-770 = "最初から悪い選択など\n在りはしないよ。"
10110-780 = "見つけたものと手にしたものは、\nきちんと同じかな？"
10110-790 = "さあ、\nその実存を握りしめると良い。"
10110-900 = "君の目を必要と\nするものが多いようだね。"
10110-910 = "ああ、待ち侘びていたよ……"
10110-920 = "なに、勘のようなものさ。"
10110-930 = "君という存在の解釈を\n揺らがせないでくれ。"
10110-940 = "……変化しないということに、\n安堵を覚えるものだよ先生。"
10110-950 = "君の労苦に感謝を。"
10110-960 = "実に見事だ。"
