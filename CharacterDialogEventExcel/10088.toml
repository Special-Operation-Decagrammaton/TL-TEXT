[translation]
10088-120 = "Eu estava te esperando, Sensei. O que devo fazer?"
10088-130 = "…Ah, eu estava justamente te procurando, Sensei."
10088-140 = "Estamos surpreendentemente ocupados, né? Vamos começar logo."
10088-150 = "Estamos em cima da hora. Mas não se preocupe, eu vou ajudar."
10088-160 = "Vou começar a arrumar as coisas."
10088-170 = "…Hm? Você me chamou?"
10088-180 = "Sensei… não é hora de ficar brincando comigo."
10088-190 = "Haa… deixe para brincar depois que o trabalho terminar."
10088-200 = "Não que eu me importe com as brincadeiras em si, mas…"
10088-210 = "Eu preferiria que parasse agora."
10088-220 = "Você precisa de suprimentos, certo? Estão aqui."
10088-230 = "Se precisar de algo, é só dizer. Eu vou buscar."
10088-240 = "O trabalho terminou, mas… não esqueceu de nada?"
10088-250 = "Se você me disser o que é, eu vou procurar."
10088-260 = "Sensei…… isso, está um pouco cócegas."
10088-270 = "Então era isso que você precisava."
10088-280 = "Estava aqui. Com certeza vai ser útil."
10088-290 = "Que bom que tinha algo apropriado."
10088-300 = "Boa escolha."
10088-410 = "Organizei as tarefas em andamento. Vamos dar uma olhada juntos, Sensei."
10088-420 = "Veio verificar o progresso?"
10088-430 = "Sensei…… espere um pouco……."
10088-440 = "……Trabalhar junto com o Sensei é bom."
10088-450 = "Sim, resolvido."
10088-460 = "Nada mal."
