[translation]
20050-280 = "Professor! Por aqui, por aqui~!"
20050-290 = "Parece que as coisas ficaram\num pouco confusas, né……"
20050-300 = "Bem, vou fazer\no que puder!"
20050-310 = "É a primeira vez que\nrecebo um pedido assim, mas……"
20050-320 = "Com o plano da Miyo-chan,\ncom certeza vai dar certo!"
20050-330 = "Este pedido……\npode ser bem interessante, não acha?"
20050-340 = "Ahhh~\nFinalmente acabou~"
20050-350 = "……Ué?\nEstão todos exaustos?"
20050-360 = "Hum, professor?\nTem alguma coisa\nno meu rosto?"
20050-370 = "Ah~! Se vai ficar\nme cutucando assim\n……toma isso como troco!"
20050-380 = "P-pessoal,\nnão fiquem desanimados……"
20050-390 = "Não importa o quão difícil seja, vai dar tudo certo! O Departamento de Comércio Especial……"
20050-400 = "Sempre encontra\numa saída,\nsabe!"
20050-600 = "Tem tantas coisas\ndivertidas por vir! \nHehe, pode esperar, professor!"
20050-610 = "Podem haver dificuldades, mas\nnada é impossível!"
20050-620 = "Incríveeeel!\nProfessor, você consegue\nfazer de tudo, né~!"
20050-630 = "Não se esqueça\nda minha recompensa~"
20050-640 = "Hum? O que foi?"
20050-650 = "Foi difícil, mas\nvocê se divertiu?\nEhehe, estamos na mesma então!"
