[translation]
20050-280 = "先生！こっちこっち～！"
20050-290 = "なんだか話がごちゃごちゃ\nしちゃってるね……"
20050-300 = "ま、やるだけ\nやってみるよ！"
20050-310 = "こういう依頼は\n初めてだけど……"
20050-320 = "ミヨちゃんの作戦なら、\nきっと大丈夫！"
20050-330 = "今回の依頼……\n割と面白いかも？"
20050-340 = "ひゃあ～\n終わった終わった～"
20050-350 = "……あれ？\nみんなヘロヘロ？"
20050-360 = "ん、先生？\nボクの顔、\n粉でもついてる？"
20050-370 = "も～！そんなに\nつっつくなら\n……お返しだ～っ！"
20050-380 = "み、みんな、\nどんよりしないで～……。"
20050-390 = "どんなピンチでも大丈夫！\n特殊交易部は……"
20050-400 = "いつだって、\n抜け道を\n見つけ出すんだよ！"
20050-600 = "楽しいことが\nいっぱいだよ～！\nへへ、期待しててね先生！"
20050-610 = "難しいことはあっても、\n不可能はな～い！"
20050-620 = "すっご～い！\n先生、\nなんでもできるんだね～！"
20050-630 = "ご褒美は\n忘れちゃダメだよ～"
20050-640 = "うん？どしたの？"
20050-650 = "大変だったけど、\n楽しかった？\nえへへ、ボクと一緒だねっ！"
