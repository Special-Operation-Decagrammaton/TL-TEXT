[translation]
26012-260 = "Bem-vindo de volta! Professor, você prefere o toboágua ou a piscina de ondas?"
26012-270 = "Kirino Nakatsukasa, desta vez estou atuando como salva-vidas!"
26012-280 = "Um monstro em um parque aquático, que absurdo...!"
26012-290 = "Agora é a minha vez de brilhar!"
26012-300 = "Eu protegerei a segurança do professor e dos clientes!"
26012-310 = "Eu estava bem preocupada, mas terminou tudo bem! Bom trabalho!"
26012-320 = "Para usar roupa de banho, eu me segurei de fazer um tour gastronômico por um tempo, mas..."
26012-330 = "Quando me dei conta, acabei fazendo um tour pela praça de alimentação..."
26012-340 = "O que achou do toboágua?"
26012-350 = "Eu recomendo o toboágua mais emocionante de todos!"
26012-360 = "As crianças brincando são tão fofas!"
26012-370 = "Sim? É algum trabalho que precisa de mim? Pode pedir qualquer coisa!"
26012-570 = "O trabalho de hoje! É bastante coisa, mas vamos nos esforçar!"
26012-580 = "Um por um, com cuidado! Eu também vou me esforçar, Professor!"
26012-590 = "Ahaha! É proibido fazer cócegas na salva-vidas!"
26012-600 = "Fufu, não precisa ter tanta pressa, eu vou te ajudar!"
26012-610 = "Como esperado do Professor! Incrível!"
26012-620 = "Bom trabalho, Professor!"
