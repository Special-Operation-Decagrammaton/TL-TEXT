[translation]
26012-260 = "Bem-vindo de volta! Sensei,\nqual o senhor prefere:\no toboágua ou a piscina de ondas?"
26012-270 = "Nakatsukasa Kirino,\natuando como salva-vidas\ndesta vez!"
26012-280 = "Um monstro no\nparque aquático...\nMas que absurdo...!"
26012-290 = "Desta vez é o momento\ndesta oficial brilhar!"
26012-300 = "A segurança do Sensei\ne dos clientes será\nprotegida por esta oficial!"
26012-310 = "Eu estava bem preocupada,\nmas terminou tudo bem!\nBom trabalho!"
26012-320 = "Eu me segurei nas minhas rotas\ngastronômicas por um tempo\npara caber neste maiô, mas..."
26012-330 = "Quando percebi, já\nestava fazendo uma rota de\ndegustação na praça de alimentação..."
26012-340 = "O que acha de\nirmos no toboágua?"
26012-350 = "Esta oficial recomenda\no toboágua mais\nemocionante de todos!"
26012-360 = "A imagem das crianças\nbrincando é tão fofa!"
26012-370 = "Sim? É algum trabalho\nem que precisa desta oficial?\nPode pedir qualquer coisa!"
26012-570 = "O trabalho de hoje!\nÉ bastante coisa, mas vamos dar o nosso melhor!"
26012-580 = "Um passo de cada vez, com cuidado!\nEsta oficial também vai se esforçar, Sensei!"
26012-590 = "Ahaha! Fazer cócegas\nna salva-vidas é proibido!"
26012-600 = "Fufu, não precisa de tanta pressa,\nesta oficial vai ajudar com tudo!"
26012-610 = "Como esperado do Sensei! Incrível!"
26012-620 = "Bom trabalho, Sensei!"