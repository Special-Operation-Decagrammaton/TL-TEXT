[translation]
26012-260 = "おかえりなさい！先生は\nスライダーと波のプール、\nどちらが好きですか？"
26012-270 = "中務キリノ、\n今回はライフセーバーを\nしております！"
26012-280 = "ウォーターパークに\n怪物だなんて、なんと\nいうことでしょう……！"
26012-290 = "今度は本官が\n活躍する番ですね！"
26012-300 = "先生とお客様の\n安全は本官が\n守ります！"
26012-310 = "かなり心配でしたが、\n無事に終わりましたね！\nお疲れ様でした！"
26012-320 = "水着を着るために、\nグルメ巡りをしばらく\n我慢していましたが……"
26012-330 = "気がついたら\nフードコート巡りを\nしてしまいました……"
26012-340 = "ウォータースライダーは\nいかがですか？"
26012-350 = "本官が一番スリル\n満点のスライダーを\nおすすめします！"
26012-360 = "子供たちが遊ぶ姿、\nかわいいですね！"
26012-370 = "はい？本官が必要な\n仕事でしょうか？\n何でも言ってください！"
26012-570 = "今日のお仕事です！\n結構多いですが、頑張りましょう！"
26012-580 = "一つ一つ丁寧に！\n本官も頑張りますよ、先生！"
26012-590 = "あはは！ライフセーバーを\nくすぐるのは禁止ですよ！"
26012-600 = "ふふっ、そんな急かさなくても、\n本官がお手伝いしますので！"
26012-610 = "さすが先生です！すごいです！"
26012-620 = "お疲れ様でした、先生！"
