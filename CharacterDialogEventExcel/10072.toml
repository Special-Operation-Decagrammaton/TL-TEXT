[translation]
10072-150 = "RABBIT小隊初の\n遠征作戦か……\n少し心が躍っている。"
10072-160 = "今こそ、\n私たちSRTの出番だな！"
10072-170 = "怪しい……。この村、\n絶対何かあるだろ。"
10072-180 = "不愛想な住民の\n支援なんか、\n気が進まないが……"
10072-190 = "市民のサポートも、\n特殊部隊の仕事だからな。"
10072-200 = "誤解が解けてよかった。\nこれでエビ不足は\n解消されたな。"
10072-210 = "RABBIT2、準備完了！\nいつでもいけるぞ！"
10072-220 = "一応、普通の観光客っぽい\n格好をしてみたんだが……"
10072-230 = "怪しまれたり……\nしないよな？"
10072-240 = "あの……先生、\n私のお腹に、\nなにかついてるのか？"
10072-250 = "私、実は海産物は\nあまり好きじゃないんだ。\n保存が難しいからな。"
10072-260 = "ああでも、乾燥イカ\nみたいな干物なら……\n私も好きだぞ！"
