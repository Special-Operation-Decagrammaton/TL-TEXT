[translation]
10072-150 = "A primeira operação expedicionária\ndo Esquadrão RABBIT...\nMeu coração está até um\npouco acelerado."
10072-160 = "Chegou a hora de nós,\nda SRT, entrarmos em ação!"
10072-170 = "Suspeito... Com certeza tem alguma coisa\nacontecendo por trás dessa vila."
10072-180 = "Eu não estou muito a fim de dar apoio\npara moradores tão antipáticos, mas..."
10072-190 = "Dar suporte aos civis também\né trabalho das Forças Especiais."
10072-200 = "Ainda bem que o mal-entendido foi resolvido.\nCom isso, a escassez de camarões\nacabou."
10072-210 = "RABBIT2, preparativos concluídos!\nEstou pronta para ir a qualquer momento!"
10072-220 = "Por precaução, eu tentei me vestir\ncomo uma turista normal, mas..."
10072-230 = "Não estou... parecendo\nsuspeita, estou?"
10072-240 = "Uhm... Sensei,\ntem alguma coisa grudada\nna minha barriga?"
10072-250 = "Para falar a verdade, eu não gosto muito\nde frutos do mar frescos.\nEles são difíceis de conservar\na longo prazo."
10072-260 = "Ah, mas se for comida desidratada,\ntipo lula seca...\nAí eu gosto!"