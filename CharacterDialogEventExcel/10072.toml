[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10072-150 = "A primeira operação expedicionária\ndo Esquadrão RABBIT...\nMeu coração está pulando de empolgação." 
10072-160 = "Chegou a hora de mostrarmos\ndo que nós da SRT somos feitas!" 
10072-170 = "Suspeito...\nCom certeza tem alguma coisa rolando nessa vila." 
10072-180 = "Não estou muito a fim de apoiar\nessa vizinhança nada amigável, mas..." 
10072-190 = "Dar suporte aos civis também\nfaz parte do trabalho das Forças Especiais." 
10072-200 = "Que bom que o mal-entendido foi resolvido.\nCom isso, a escassez de camarão\ntambém foi solucionada." 
10072-210 = "RABBIT 2, pronta para ação!\nMe dê as ordens quando quiser!" 
10072-220 = "Tentei me vestir como uma turista normal\npara não levantar suspeitas, mas..." 
10072-230 = "Você acha que...\nalguém vai desconfiar de mim?" 
10072-240 = "Com licença... Sensei,\ntem alguma coisa suja\nna minha barriga?" 
10072-250 = "Pra ser sincera, não sou muito\nfã de frutos do mar.\nÉ muito chato de conservar." 
10072-260 = "Aah, mas se for lula seca\nou algo do tipo...\nAté que eu gosto!" 