[translation]
10072-150 = "A primeira operação de expedição\nda Equipe RABBIT, hein...\nEstou um pouco empolgada."
10072-160 = "Agora é a nossa vez,\na vez da SRT!"
10072-170 = "Suspeito... Este vilarejo,\ncom certeza tem algo errado."
10072-180 = "Não estou muito animada para\najudar esses moradores\nmal-humorados, mas..."
10072-190 = "Apoiar os cidadãos também é\ntrabalho de uma unidade especial."
10072-200 = "Que bom que o mal-entendido foi resolvido.\nCom isso, a escassez de camarão\nfoi resolvida."
10072-210 = "RABBIT 2, pronto para a ação!\nPodemos ir a qualquer momento!"
10072-220 = "Eu tentei me vestir como\num turista comum, mas..."
10072-230 = "Será que... estou parecendo\nsuspeita?"
10072-240 = "Hum... Sensei,\ntem algo preso\nna minha barriga?"
10072-250 = "Na verdade, eu não gosto muito\nde frutos do mar.\nÉ difícil de conservar."
10072-260 = "Ah, mas se for algo seco,\ncomo lula desidratada...\nEu também gosto!"
