[translation]
20032-10190 = "Sensei, olá.\nComo está a nova base?"
20032-10200 = "Tem tanta coisa para fazer..."
20032-10210 = "Vamos resolver uma por uma,\nque tal?"
20032-10220 = "Bem-vindo de volta, Sensei.\nPode me pedir o que quiser."
20032-10230 = "A Chefe Himari parece ocupada."
20032-10240 = "…Mas ela parece feliz, então,\nacho que está tudo bem."
20032-10250 = "Se estiver com frio,\nvenha aqui, Sensei."
20032-10260 = "Acho que assim,\na eficiência de ambos\nserá melhor, não acha?"
20032-10270 = "A temperatura e a condição física\ntêm uma relação estreita."
20032-10280 = "Por isso, gosto daqui,\né confortável."
20032-10290 = "Bom trabalho, Sensei.\nPode me mostrar isso?"
20032-10300 = "Quando você está por perto, Sensei,\na taxa de sucesso das operações\naumenta."
20032-10310 = "……Eu também me sinto melhor."
20032-10750 = "Este é o lugar onde analisamos…\no que o Sensei coleta. Provavelmente."
20032-10760 = "Quanto mais amostras, melhor.\nConto com você."
20032-10770 = "Que bom que você veio.\nO Sensei já entendeu\nque a eficiência é importante?"
20032-10780 = "Hm? O que houve?"
20032-10790 = "……Só me chamou?\nPor que……?"
20032-10800 = "……Bem,\nse o Sensei quer assim, tudo bem."
20032-10810 = "Dizem que se você pegar isso e fizer aquilo,\nalgo acontece."
20032-10820 = "……Eu também\nnão entendo muito bem,"
20032-10830 = "mas, segundo a explicação da Chefe,\né mais ou menos isso."
20032-10840 = "Não tenho muito o que fazer\nenquanto analiso."
20032-10850 = "……Posso sentar\nno seu colo, Sensei?"
20032-10860 = "Como a temperatura corporal\nvira uma variável,"
20032-10870 = "me disseram para não chegar perto\nenquanto analiso……"
20032-10880 = "Eu entendo, mas,\né um pouco solitário."
20032-10890 = "Este lugar……\nacho que gosto dele."
20032-10900 = "Será que não posso trazer\numa parte da sala do clube para cá?"
20032-10910 = "Sim, aqui está."
20032-10920 = "……Isso se chama\n\"troca\", não é?"
20032-10930 = "O resultado saiu. Qual você escolhe?"
20032-10940 = "Sim. Isso é bom."
20032-10950 = "Seria bom se houvesse\nmais variedade nos resultados."
20032-10960 = "……O atual é suficiente? Entendi."
20032-10970 = "Eu não entendo muito bem,\nmas,"
20032-10980 = "espero que isso\nseja útil para o Sensei."
20032-12100 = "A partir de agora, vou mudar um pouco\na forma de examinar as amostras."
20032-12110 = "Dizem que é um lugar\npara testar a sorte……"
20032-12120 = "Já basta o futuro ser incerto."
20032-12130 = "Vamos apostar\nna sorte do Sensei."
20032-12140 = "Então,\nconto com a minha parte também."
20032-12150 = "Parece que a Chefe Himari\nmudou alguma coisa…"
20032-12160 = "Para mim,\né um pouco\ninsatisfatório."
20032-12170 = "Eu prefiro quando\no resultado é claro."
20032-12180 = "Dizem que a Toki\ngosta desse método."
20032-12190 = "……Mesmo que ela não demonstre,"
20032-12200 = "a Toki é do tipo que\naproveita quase tudo,\nnão é?"
20032-12210 = "Eu não entendo muito\nde metodologia……,"
20032-12220 = "mas sei que algo mudou."
20032-12230 = "Se eu tirar o azar,\nposso acabar\nte deixando para trás?"
20032-12240 = "……Era brincadeira.\nCom sorte ou sem sorte,\neu estarei ao seu lado, Sensei."
20032-12250 = "Se não gostar\ndo resultado,\nme avise."
20032-12260 = "Eu vou te consolar."
20032-12270 = "É um prêmio.\nParabéns, Sensei."
20032-12280 = "Então o prêmio máximo\nrealmente existia……"
20032-12290 = "Que surpresa…… Sensei,\nvocê tem muita sorte mesmo."
20032-12300 = "É um resultado alcançado\npelo esforço seu e nosso, né?"
20032-12310 = "Parabéns, Sensei.\nQuer fazer um brinde?"
