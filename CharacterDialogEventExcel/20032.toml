[translation]
20032-10190 = "先生、こんにちは。\n新しい基地はどう？"
20032-10200 = "やることがたくさん……"
20032-10210 = "一つずつ、\n片づけていこっか。"
20032-10220 = "おかえり、先生。\nなんでも言ってね。"
20032-10230 = "ヒマリ部長、忙しそう。"
20032-10240 = "…でも楽しそうだから、\n大丈夫か。"
20032-10250 = "寒かったら\nこっちにおいで、先生。"
20032-10260 = "そのほうが、\nお互い効率が\n良いと思うし？"
20032-10270 = "気温とコンディションは\n密接な関係にあるんだ。"
20032-10280 = "だから、ここは\n快適で気に入ってる。"
20032-10290 = "お疲れ様、先生。\nそれ、ちょっと見せて？"
20032-10300 = "先生がいてくれると、\n作戦の成功率が\n上昇するの。"
20032-10310 = "……私も、調子良いし。"
20032-10750 = "ここは先生が集めてくれたものを…\n分析する場所。多分。"
20032-10760 = "サンプルが多いに越したことは\nないから。よろしくね。"
20032-10770 = "いいところに来てくれたね。\n効率が大事って、\n先生も分かってくれた？"
20032-10780 = "うん？どうしたの？"
20032-10790 = "……呼んでみただけ？\nなんで……？"
20032-10800 = "……まぁ、\n先生がそうしたいなら、いっか。"
20032-10810 = "コレを持って、アレすると、\nナンカでるんだって。"
20032-10820 = "……私も\nよく分かってないんだけど、"
20032-10830 = "部長の説明によると\nそんなところらしいよ。"
20032-10840 = "分析中はやることが\nあんまりないんだ。"
20032-10850 = "……先生の膝の上、\n座っていい？"
20032-10860 = "体温が変数に\nなっちゃうから、"
20032-10870 = "分析中は近寄らないように、って\n言われたの……"
20032-10880 = "分かってはいるんだけど、\nちょっと寂しいかも。"
20032-10890 = "この場所……\n好きかも。"
20032-10900 = "部室の一部、\nここに持ってきたらダメかな？"
20032-10910 = "はい、どうぞ。"
20032-10920 = "……こういうの、\n「物々交換」って言うんだっけ？"
20032-10930 = "結果が出たよ。どれにする？"
20032-10940 = "うん。それ、いいね。"
20032-10950 = "結果にもバリエーションが\nあったらいいんだけど。"
20032-10960 = "……現状で十分？そっか。"
20032-10970 = "あんまりよく\n分からないけど、"
20032-10980 = "これが先生の\n役に立つといいな。"
20032-12100 = "ここからは、\nサンプルの調べ方を\nちょっと変えてみるね。"
20032-12110 = "運を試せる場所……\nなんだって。"
20032-12120 = "不確かなのは、\n未来だけでいいのにね"
20032-12130 = "先生の運に\nかけてみよっか。"
20032-12140 = "じゃあ、\n私の分もよろしくね。"
20032-12150 = "ヒマリ部長が\nなにかを変えたみたい…"
20032-12160 = "私としては\nちょっと\n物足りないかも。"
20032-12170 = "結果がハッキリしてる\n方が好きだし。"
20032-12180 = "この方式、トキは\n気に入ってるんだって。"
20032-12190 = "……顔に出ないだけで、"
20032-12200 = "トキって大抵の\nことはなんでも\n楽しむタイプだよね。"
20032-12210 = "方法論……にはあまり\n詳しくないけど、"
20032-12220 = "何かが変わったって\nことは、わかるよ。"
20032-12230 = "ハズレを引いたら、\n先生を\nおいていっちゃうかも？"
20032-12240 = "……今のは冗談。\n運がよくても悪くても、\n私は先生の隣にいるよ。"
20032-12250 = "結果が気に\n入らなかったら、\n私に言って。"
20032-12260 = "慰めてあげる。"
20032-12270 = "当たりだね。\nおめでとう、先生。"
20032-12280 = "大当たりって、\n本当にあったんだ……。"
20032-12290 = "驚いた……先生は本当に\n運がいいんだね。"
20032-12300 = "先生と私たちの努力で\n得られた結果、だね。"
20032-12310 = "おめでとう、先生。\n乾杯でもする？"
