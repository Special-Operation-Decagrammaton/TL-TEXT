[translation]
20009-10 = "おいらの権威を\n疑うやつらは、\nたとえ休暇中でも粛清だ！"
20009-20 = "ふむ！\nたまにはこういう\n休暇も悪くないな！"
20009-30 = "おいらの許可も無しに\n温泉を開くだなんて……\nけしからん！"
20009-40 = "みんな粛清だ、\n粛清！"
20009-50 = "ん？\nどうかしたか、\nカムラッド？"
20009-60 = "ま、満喫なんてしてない！\nあくまで、書記長として、\n視察をしているんだ！"
20009-70 = "あのゲヘナの\n温泉開発部のやつら、\nすごかったな……"
20009-80 = "おいらの許可も無しに\n温泉を開くだなんて……\nけしからん！"
20009-90 = "みんな粛清だ、\n粛清！"
20009-100 = "ん？\nどうかしたか、\nカムラッド？"
20009-110 = "ま、満喫なんてしてない！\nあくまで、書記長として、\n視察をしているんだ！"
20009-120 = "あのゲヘナの\n温泉開発部のやつら、\nすごかったな……"
