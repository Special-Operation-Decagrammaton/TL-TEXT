[translation]
26007-260 = "お疲れ様です、先生。\n準備ならお任せください！"
26007-270 = "お待ちしておりました、\n先生！一緒に\n頑張りましょう！"
26007-280 = "…えっと、先生？\nどうかされましたか？"
26007-290 = "ど、どうしましたか？\nどこかに虫とか\n付いてます…？"
26007-300 = "えっと…先生、\n呼びましたか？"
26007-310 = "す、すみません、\nあまり見られると\n恥ずかしいです…"
26007-320 = "ど、どうしましたか？\nどこかに虫とか\n付いてます…？"
26007-330 = "えっと…先生、\n呼びましたか？"
26007-340 = "す、すみません、\nあまり見られると\n恥ずかしいです…"
26007-350 = "目標のリストを\n整理しておきました。"
26007-360 = "こちらが現在の目標です。"
26007-370 = "目標が一つずつ\n達成されていくのって、\n気持ち良いですよね。"
26007-380 = "こうやって一緒にリストを\n整理してるだけで、\n何だか楽しいです。"
26007-390 = "はい、お疲れ様でした！"
26007-400 = "さすがは先生ですね！"
26007-420 = "お疲れ様です、先生。\n準備ならお任せください！"
26007-430 = "お待ちしておりました、先生！\n一緒に頑張りましょう！"
26007-440 = "後片付けも大事ですよね、\nお手伝いします！"
26007-450 = "ど、どうしましたか？\nどこかに虫とか付いてます…？"
26007-460 = "えっと…先生、\n呼びましたか？"
26007-470 = "す、すみません、あまり見られると\n恥ずかしいです…"
26007-480 = "さあ、張り切って\n行きましょうか！"
26007-490 = "もう少しで何とかなりそうですね。\n頑張りましょう、先生！"
26007-500 = "…えっと、先生？\nどうかされましたか？"
