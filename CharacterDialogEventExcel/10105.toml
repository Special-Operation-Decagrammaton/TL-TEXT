[translation]
10105-10 = "こんにちは、先生。"
10105-20 = "よろしければ、\n私のステージ…\n見ていってください！"
10105-30 = "準備はよろしいですか？"
10105-40 = "間もなく、\nライブがはじまります！"
10105-50 = "まだまだライブは\n続きますよ！"
10105-60 = "ライブ後半戦、\n頑張りましょう！"
10105-70 = "ふぅ…\n目一杯出し切りました！"
10105-80 = "先生は\n楽しめたでしょうか？"
10105-90 = "あら先生、\nどうなさいました？"
10105-100 = "わっ！\nま、待ってください！"
10105-110 = "い、今は、そ、その……\n汗をかいてますから……"
10105-120 = "サイン……ですか？"
10105-130 = "す、すみません\n全然考えてなくて……！"
10105-140 = "悔いの残らない、\n最高のステージに\nしてみせます！"
10105-440 = "何をお探しでしょうか？"
10105-450 = "お好きなものをどうぞ！\n私のオススメは……"
10105-460 = "お忘れ物がないよう、\nお気をつけください！"
10105-470 = "せ、先生……？"
10105-480 = "わ、私ではなく…あちらを…"
10105-490 = "ふふ、あははっ…！"
10105-500 = "そちらですね。\nとても素敵だと思います！"
10105-510 = "私もそれ気に\nなっていました。"
10105-520 = "そちらになさいますか？\nはい、どうぞ。"
10105-530 = "こちらですね。\nはい、どうぞ。"
