[translation]
10105-10 = "Olá, Sensei."
10105-20 = "Se não se importar,\npor favor, assista...\nà minha apresentação!"
10105-30 = "Está pronto?"
10105-40 = "O show\nvai começar em breve!"
10105-50 = "O show ainda\nvai continuar!"
10105-60 = "Vamos dar o nosso melhor\nna segunda parte do show!"
10105-70 = "Ufa...\nDei tudo de mim!"
10105-80 = "Será que o Sensei\nse divertiu?"
10105-90 = "Ora, Sensei,\no que houve?"
10105-100 = "Uau!\nE-espere um pouco!"
10105-110 = "E-eu estou, b-bem...\nsuada agora, então..."
10105-120 = "Um autógrafo...\npara mim?"
10105-130 = "D-desculpe,\neu não pensei em nada...\npara isso!"
10105-140 = "Vou fazer desta a melhor\napresentação possível,\nsem arrependimentos!"
10105-440 = "O que você está procurando?"
10105-450 = "Escolha o que quiser!\nMinha recomendação é..."
10105-460 = "Por favor, tome cuidado\npara não esquecer nada!"
10105-470 = "S-Sensei...?"
10105-480 = "N-não olhe para mim... olhe para lá..."
10105-490 = "Fufu, ahaha...!"
10105-500 = "É esse, então.\nAcho que é muito bonito!"
10105-510 = "Eu também estava\nde olho nesse."
10105-520 = "Vai levar esse?\nSim, aqui está."
10105-530 = "É este aqui.\nSim, aqui está."
