[translation]
10118-160 = "パヒャヒャッ！\n準備はいい？"
10118-170 = "いざしゅっぱーつ！"
10118-180 = "急な呼び出しだったのに\n来てくれてありがとね。"
10118-190 = "マジで状況やばくてさ～\nよろしくね、先生！"
10118-200 = "これ、\n大丈夫なんだよね？"
10118-210 = "ま、制御装置に\n問題なきゃ大丈夫か。"
10118-220 = "お、そろそろ終わる感じ？\nそんな気がしてきたかも。"
10118-230 = "ひゃー！\nやっと終わったー！！"
10118-240 = "結構よかったんじゃ\nない？パヒャヒャッ"
10118-250 = "なになに？どしたの？"
10118-260 = "「何でもない」？はぁ？\nんじゃ、こっちも\nつっついちゃお。"
10118-270 = "あーあ、\n何でこんなことに。"
10118-280 = "ま、なんとか\nなるっしょ……？"
10118-290 = "なんか面白いこと\nなーいー？"
10118-300 = "緊張ほぐすような\nやつとかさぁ！"
10118-310 = "ま、\n別に緊張してないけど。\nあははっ！"
10118-320 = "今後もハイランダー鉄道\nをごひいきに！\nよろしくね、せんせ♪"
10118-610 = "好きなだけ見てってよ。"
10118-620 = "なんか探してる\nものあったら言ってね？"
10118-630 = "ま、どこにあるかは\n知らないけど。\nパヒャヒャッ！"
10118-640 = "仕事は終わったけど、\n欲しいものあるなら\nまた来てよね。"
10118-650 = "え、なになに？"
10118-660 = "「代わりに選んでほしい」？"
10118-670 = "ダメダメ！\n自分で選ぶことに\n意味があるんだって。"
10118-680 = "お、それ？\n良いね良いねぇ。"
10118-690 = "グッドチョイス！\nパヒャッ。"
10118-700 = "私もほしいんだよね、それ。"
10118-710 = "なかなかいい\n趣味してんじゃん？"
