[translation]
10118-160 = "Pahyahya!
Está pronto?"
10118-170 = "Vamos nessa!"
10118-180 = "Obrigada por vir, mesmo
sendo um chamado de última hora."
10118-190 = "A situação está realmente tensa...
Conto com você, Sensei!"
10118-200 = "Isso aqui...
vai dar certo, né?"
10118-210 = "Bem, se não houver problemas
com o dispositivo de controle, deve dar."
10118-220 = "Oh, está quase acabando?
Tive essa impressão agora."
10118-230 = "Hyaaa!
Finalmente acabou!!"
10118-240 = "Não foi muito bom?
Pahyahya!"
10118-250 = "O que foi? O que aconteceu?"
10118-260 = "“Não é nada”? Hã?
Então, eu vou cutucar você também."
10118-270 = "Ah, droga...
Por que as coisas terminaram assim?"
10118-280 = "Bem, vai dar um jeito...
né?"
10118-290 = "Não tem nada de divertido
por aí?"
10118-300 = "Algo para aliviar a tensão,
por exemplo!"
10118-310 = "Bem,
eu não estou tensa, na verdade.
Ahaha!"
10118-320 = "Continue preferindo a Ferrovia Highlander!
Conto com você, Sensei♪"
10118-610 = "Dê uma olhada no que quiser."
10118-620 = "Se estiver procurando por algo,
é só me falar, tá?"
10118-630 = "Bem, eu não sei onde as coisas estão,
mas enfim. Pahyahya!"
10118-640 = "O trabalho acabou, mas se quiser
alguma coisa, volte sempre."
10118-650 = "Ei, o que foi?"
10118-660 = "“Quer que eu escolha por você”?"
10118-670 = "Nem pensar!
O sentido disso é você
escolher por conta própria."
10118-680 = "Oh, isso aí?
Muito bom, muito bom."
10118-690 = "Boa escolha!
Pahya."
10118-700 = "Eu também queria isso."
10118-710 = "Você tem um gosto
bem interessante, hein?"
