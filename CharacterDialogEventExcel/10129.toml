[translation]
10129-10 = "そ、そんなに\n見つめられると、\n緊張します……。"
10129-20 = "あくまで捜査の\nために着ているだけです。"
10129-30 = "可愛い衣装だとは\n思いますが……。"
10129-40 = "どんどん観客が\n増えているような……。"
10129-50 = "皆さん喜んでいますね。"
10129-60 = "形は何であれ、お役に\n立てているようで\n良かったです。"
10129-70 = "自分のやっていることに、\nちゃんと自信を\n持てるようになりました。"
10129-80 = "ありがとうございます、\n先生。"
10129-90 = "潜入捜査は終わり\nましたが、これからも\nパトロールは続きます。"
10129-100 = "今後ともよろしく\nお願いいたします。"
10129-110 = "ひ、引っ張っては\nいけません！\n飾りではありません！"
10129-120 = "6条右回りの魔法は、\nうーん……えっと……。"
10129-130 = "慣れないセリフが多く……\n覚えづらいです。"
10129-140 = "きゃっ！ひ、\nひゃはっ！ひゃぁっ……！\nくすぐったいです……！"
10129-150 = "私、本当に\nくすぐられるのに\n弱くて……！"
10129-160 = "遊園地の空気が、\nとても好きなんです。"
10129-170 = "とても……平和なので。"
10129-380 = "い、いらっしゃいませ。\n先生……。"
10129-390 = "お探しのものは\nありますか……？"
10129-400 = "思い出に残る任務でしたね。\nありがとうございました。"
10129-410 = "探しているものが\n見つかると良いのですが。"
10129-420 = "コンビニでのことを\n思い出しますね。"
10129-430 = "はい、こちらですね。"
10129-440 = "はい、どうぞ。"
10129-450 = "いつも協力してくださり\nありがとうございます。"
10129-460 = "先生のお役に\n立ちますよう。"
10129-560 = "古いマシンですね。\nちゃんと\n動くのでしょうか……？"
10129-570 = "これを投入すれば\n動くようです。"
10129-580 = "レイサさん、\n楽しんでいるみたいで\nよかったです。"
10129-590 = "レア度が高い？\nカードが出ると\nいいですね。"
10129-600 = "もう閉園時間ですね。\n残った分がないか\n確かめてみましょう。"
10129-610 = "なんだか周囲からの視線を\n感じるのですが……。"
10129-620 = "人目を集めてしまう前に、\n早く引きましょう……！"
10129-630 = "虹色ですね。これは\n良いものなのでしょうか？"
10129-640 = "ピンク色……ですね。"
10129-650 = "金色ですね。"
10129-660 = "水色ですか。\n爽やかですね。"
10129-670 = "黒……少し不吉ですね。"
