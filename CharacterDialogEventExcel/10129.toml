[translation]
10129-10 = "E-eu fico nervosa\nquando você me olha\ndesse jeito……."
10129-20 = "Estou vestindo isso apenas\npor causa da investigação."
10129-30 = "Acho que é um traje fofo,\nmas……."
10129-40 = "Parece que o número de espectadores\nestá aumentando cada vez mais……."
10129-50 = "Todos parecem felizes, não é?"
10129-60 = "Seja qual for a forma, fico feliz\npor estar sendo útil."
10129-70 = "Agora consigo ter confiança\nno que estou fazendo."
10129-80 = "Muito obrigada,\nSensei."
10129-90 = "A investigação secreta terminou,\nmas as patrulhas\ncontinuarão."
10129-100 = "Conto com você\ndaqui para frente."
10129-110 = "N-não puxe isso!\nNão é um enfeite!"
10129-120 = "A magia das 6 linhas no sentido horário é,\nhmmm... vejamos..."
10129-130 = "Tem muitas falas que não estou acostumada……\né difícil de decorar."
10129-140 = "Kya! N-,\nnyaha! Kyaa……!\nFaz cócegas……!"
10129-150 = "Eu realmente\nsou muito sensível\na cócegas……!"
10129-160 = "Eu gosto muito\ndo clima do parque de diversões."
10129-170 = "Porque é muito…… pacífico."
10129-380 = "B-bem-vindo.\nSensei……."
10129-390 = "Você está procurando\npor algo……?"
10129-400 = "Foi uma missão memorável.\nMuito obrigada."
10129-410 = "Espero que você encontre\no que está procurando."
10129-420 = "Lembro-me do que aconteceu\nna loja de conveniência."
10129-430 = "Sim, é isto aqui."
10129-440 = "Sim, aqui está."
10129-450 = "Obrigada por sempre\ncooperar comigo."
10129-460 = "Espero ser útil\nao Sensei."
10129-560 = "É uma máquina antiga.\nSerá que ela ainda\nfunciona direito……?"
10129-570 = "Parece que funciona\nse eu colocar isto aqui."
10129-580 = "Fico feliz que a Reisa-san\nesteja se divertindo."
10129-590 = "Tem uma raridade alta?\nEspero que saia\num bom cartão."
10129-600 = "Já está na hora de fechar o parque.\nVamos verificar se\nsobrou alguma coisa."
10129-610 = "Sinto que estou sendo observada\npor todos ao redor……."
10129-620 = "Vamos sair daqui rápido\nantes que atraia mais olhares……!"
10129-630 = "É cor de arco-íris. Isso\né algo bom?"
10129-640 = "É cor-de-rosa……, né."
10129-650 = "É dourado."
10129-660 = "Azul-claro, é?\nÉ bem refrescante."
10129-670 = "Preto…… um pouco sinistro."
