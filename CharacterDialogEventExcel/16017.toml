[translation]
16017-330 = "き、来てくださり\nありがとう\nございます……。"
16017-340 = "お、大人が一緒に\nいてくださると……\n安心、します。"
16017-350 = "いつもはこうじゃ\nないんですけどっ！\n今回が特殊なだけで……。"
16017-360 = "あー……いえ、そうでも\nないかもしれないですけ\nど……。"
16017-370 = "で、でも\n修羅場ってほどじゃないし…\nたぶん……知りませんけど。"
16017-380 = "うう……な、なんだか\n面倒なことになってる\n気がするんですけど……。"
16017-390 = "幹部の皆さん……信じて\n大丈夫なんですよね…？"
16017-400 = "ふぅ……\nこ、ここまで来たら、\nもう大丈夫ですよね……？"
16017-410 = "はぁ……\nやっと終わり\nましたけど……。"
16017-420 = "先生も本当に……\nお疲れさまでした。"
16017-430 = "な、なんですか？"
16017-440 = "えっ……も、もしかして\n私何かしました……？"
16017-450 = "く、雲行きが\n怪しいんですけどぉ…。"
16017-460 = "何事もないと\nいいんですけど……。"
16017-470 = "ど、どうして幹部連中って\nあんなんばっかなん\nですか……。"
16017-480 = "現場の事なんか\n全然見てないん\nですけど……。"
16017-490 = "……ど、\nどうしたんですか？"
16017-500 = "く、\nくすぐったいんですけど…\nそこ、あんまり…ひゃっ"
16017-720 = "本当に終わる\n気がしないんですけど……。"
16017-730 = "せ、先生がいてくれて、\nよかったです……"
16017-740 = "心強いっていうか……\n安心できるっていうか……"
16017-750 = "えへへ。"
16017-760 = "さ、触ってもなんも\nないんですけどっ！？"
16017-770 = "ど、どうにかしないと……\nうう……。"
16017-780 = "わ、わあ…… ！"
16017-790 = "す、すご\nすぎるんですけど！？"
