[translation]
16017-330 = "O-obrigada por\nvir até aqui……."
16017-340 = "T-ter um adulto\npor perto me faz……\nme sentir segura."
16017-350 = "Eu não sou assim\nnormalmente! É só que\nesta vez é um caso especial……."
16017-360 = "Ah…… não, talvez\nnão seja bem assim\nmas……."
16017-370 = "M-mas, não é como se\nfosse uma situação crítica…\nprovavelmente…… não sei dizer."
16017-380 = "Uuu…… s-sinto que\nisso está se tornando\num problema……."
16017-390 = "Posso confiar nos\nexecutivos……, não posso…?"
16017-400 = "Ufa……\nC-chegamos até aqui,\nentão já estamos bem, né……?"
16017-410 = "Haa……\nFinalmente acabou\nmas……."
16017-420 = "Professor, você também…\nrealmente se esforçou muito."
16017-430 = "O-o que foi?"
16017-440 = "Eh…… s-será que\neu fiz alguma coisa……?"
16017-450 = "O clima está\nficando estranho……."
16017-460 = "Espero que não\naconteça nada……."
16017-470 = "P-por que os executivos\nsão todos assim……."
16017-480 = "Eles não olham\npara o que acontece\nno campo de batalha……."
16017-490 = "……O-o que\nfoi que aconteceu?"
16017-500 = "I-isso\nfaz cócegas…\npor favor, não aí… hya!"
16017-720 = "Sinto que isso\nrealmente não vai acabar……."
16017-730 = "É-é bom ter você\naqui, Professor……"
16017-740 = "É reconfortante, ou melhor……\nme sinto segura……"
16017-750 = "Ehehe."
16017-760 = "N-não tem nada aqui\npara você tocar, sabia!?"
16017-770 = "T-tenho que dar um jeito\nnisso…… Uuu……."
16017-780 = "U-uau……!"
16017-790 = "I-isso é\nincrível demais, não é!?"
