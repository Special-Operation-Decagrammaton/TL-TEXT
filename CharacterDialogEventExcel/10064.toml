[translation]
10064-560 = "Bom trabalho, Sensei.\nÉ bom poder te encontrar\nno local também."
10064-570 = "Você já fez suas orações?"
10064-580 = "O mundo não funciona\ndo jeito que a gente quer,"
10064-590 = "mas na hora de fazer um pedido,\nnós somos livres."
10064-670 = "Que este ano continue\nsendo de dias tranquilos."
10064-680 = "Se valeu a pena gastar todo o dinheiro\ndo novo álbum nas oferendas?\nVocê pergunta?"
10064-690 = "Bem... é verdade que\neu exagerei um pouco,"
10064-700 = "mas se eu puder ver o sorriso\nda nossa presidente,\nfoi um preço barato."
10064-710 = "Haruka, você parece\nestar cansada ultimamente."
10064-720 = "Será que ela está bem?..."
10064-730 = "(...O Grupo Kurokame, hein.\nTenho um mau pressentimento.)"
10064-1070 = "Bom trabalho, Sensei.\nÉ bom poder te encontrar\nno local também."
10064-1080 = "Você já fez suas orações?"
10064-1090 = "O mundo não funciona\ndo jeito que a gente quer,"
10064-1100 = "mas na hora de fazer um pedido,\nnós somos livres."
10064-1110 = "Logo no início do ano,\nas coisas parecem\nestranhas..."
10064-1120 = "Ladrão de caixa de oferendas..."
10064-1130 = "Eu não tinha a intenção de\nme meter em problemas,"
10064-1140 = "mas se é uma ordem da presidente,\nnão tem jeito."
10064-1150 = "Ah, que desastre total."
10064-1160 = "No final, ainda tive que\nlidar com um robô estranho..."
10064-1170 = "Mas... graças a isso,\nnão fiquei entediada."
10064-1180 = "Que este ano continue\nsendo de dias tranquilos."
10064-1190 = "Se valeu a pena gastar todo o dinheiro\ndo novo álbum nas oferendas?\nVocê pergunta?"
10064-1200 = "Bem... é verdade que\neu exagerei um pouco,"
10064-1210 = "mas se eu puder ver o sorriso\nda nossa presidente,\nfoi um preço barato."
10064-1220 = "Haruka, você parece\nestar cansada ultimamente."
10064-1230 = "Será que ela está bem?..."
10064-1240 = "(...O Grupo Kurokame, hein.\nTenho um mau pressentimento.)"
10064-1420 = "Sensei, que bom que apareceu.\nTenho um favor a te pedir."
10064-1430 = "Desculpe incomodar logo no início do ano...\nVocê poderia me dar um pouco do seu tempo?"
10064-1440 = "A Problem Solver 68 pedindo\num favor ao Sensei..."
10064-1450 = "É o oposto do habitual,\né algo bem novo."
10064-1460 = "Desculpe, ao contrário da Mutsuki,\neu não estou acostumada com isso..."
10064-1470 = "Nessas horas... bem...\neu não sei que cara fazer..."
10064-1480 = "Obrigada por ajudar.\nAqui, um agradecimento da Problem Solver 68."
10064-1490 = "Obrigada, Sensei.\nVocê nos salvou."
