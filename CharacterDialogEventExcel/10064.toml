[translation]
10064-560 = "お疲れ、先生。\n会場でも先生に\n会えるの、良いね。"
10064-570 = "もうお参りはした？"
10064-580 = "世の中思い通りに\nはいかないけど、"
10064-590 = "お願い事をする時は、\n自由だからさ。"
10064-670 = "今年も穏やかな\n日々が続きますように。"
10064-680 = "新作アルバム代を全部\nお賽銭に使っちゃって、\nよかったのかって？"
10064-690 = "ま……確かに\nちょっと無理したけど、"
10064-700 = "社長の笑顔が\n見れるなら、\n安いもんだよ。"
10064-710 = "ハルカ、\n最近疲れてるように\n見えるけど。"
10064-720 = "大丈夫かな……。"
10064-730 = "（……黒亀組か。\n嫌な予感がする。）"
10064-1070 = "お疲れ、先生。\n会場でも先生に\n会えるの、良いね。"
10064-1080 = "もうお参りはした？"
10064-1090 = "世の中思い通りに\nはいかないけど、"
10064-1100 = "お願い事をする時は、\n自由だからさ。"
10064-1110 = "新年早々、\n雲行きが怪しい\nような……。"
10064-1120 = "賽銭箱泥棒って……。"
10064-1130 = "厄介ごとに首を\n突っ込むつもりは\nなかったんだけど、"
10064-1140 = "社長の命令なら\n仕方ないか。"
10064-1150 = "はあ、\nまったく災難だったよ。"
10064-1160 = "最後は変な\nロボットの相手まで\nさせられたし……。"
10064-1170 = "でも……おかげで\n退屈はしなかった。"
10064-1180 = "今年も穏やかな\n日々が続きますように。"
10064-1190 = "新作アルバム代を全部\nお賽銭に使っちゃって、\nよかったのかって？"
10064-1200 = "ま……確かに\nちょっと無理したけど、"
10064-1210 = "社長の笑顔が\n見れるなら、\n安いもんだよ。"
10064-1220 = "ハルカ、\n最近疲れてるように\n見えるけど。"
10064-1230 = "大丈夫かな……。"
10064-1240 = "（……黒亀組か。\n嫌な予感がする。）"
10064-1420 = "先生、丁度いいところに。\n頼みたいことがあるの。"
10064-1430 = "新年から悪いけど……。\nちょっと時間もらえる？"
10064-1440 = "便利屋が先生に\n依頼だなんて……"
10064-1450 = "いつもと立場が逆で、\nなんだか新鮮。"
10064-1460 = "ごめん、ムツキと違って\nこういうのに慣れてなくて……"
10064-1470 = "こういう時……その……\nどんな顔をすればいいか、\n分からない……。"
10064-1480 = "手伝ってくれてありがと。\nはい、便利屋68からのお礼だよ。"
10064-1490 = "ありがと、先生。\nおかげで助かったよ。"
