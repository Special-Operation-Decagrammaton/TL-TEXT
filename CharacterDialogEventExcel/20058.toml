[translation]
20058-420 = "Тут оживлённо, правда?"
20058-430 = "Всё может стать немного суматошным,\nно я рассчитываю на тебя, Сенсей."
20058-440 = "Привет, Сенсей.\nЯ как раз тебя искала."
20058-450 = "Мои девочки далеко не самые\nспокойные, так что тебе,\nдолжно быть, непросто, да...?"
20058-460 = "Если я могу чем-то помочь,\nпросто дай знать.\nЯ сделаю всё, что потребуется."
20058-470 = "Интересно... всё точно хорошо?"
20058-480 = "Я немного волнуюсь."
20058-490 = "Угх... и что нам с этим делать?"
20058-500 = "Если мы просто оставим всё как есть,\nбудет плохо, верно?"
20058-510 = "Много чего произошло, но\nбыло весело."
20058-520 = "А тебе как, Сенсей?"
