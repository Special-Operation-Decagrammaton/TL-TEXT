[translation]
20058-420 = "賑やかだよね。"
20058-430 = "ちょっとバタバタすると\n思うけど、よろしく先生。"
20058-440 = "やっほ、先生。\nちょうど探してたんだ。"
20058-450 = "うちの生徒って\nあんまり落ち着きないから\n大変だよね……。"
20058-460 = "手伝えること\nあったら言って。\nなんでもするよ。"
20058-470 = "これで大丈夫、かな……。"
20058-480 = "ちょっと心配。"
20058-490 = "げ……どうすんのさアレ。"
20058-500 = "ほっといたら\nまずい、よね？"
20058-510 = "色々あったけど、\n楽しかったなぁ。"
20058-520 = "先生はどうだった？"
