[translation]
20011-390 = "あっ、いらっしゃい。\n先生。もう新年の\nお願いごとはしてきた？"
20011-400 = "せ、先生、\nどうしてここに！？\nも、もしかして\nわざわざ私に……！？"
20011-410 = "やっ、ごめん、\n今の無し……"
20011-420 = "新年とはいえ、\n騒がしいわね～"
20011-430 = "まあ、活気があって\n良いと思うけど。"
20011-440 = "はぁ……黒亀組とか、\nカイテンジャーとか……\nどうしてこう\n次から次へと……"
20011-450 = "バイト代、ちゃんと\nもらえるのかな……？"
20011-460 = "新年早々\nバタバタだったけど、\nそろそろ\n落ち着いてきたかな"
20011-470 = "お疲れ様、先生。\n一緒に帰って、\nおせちでも食べる？"
20011-480 = "な、何度も\n言ってるけど、\nこれコスプレじゃ\nないから！"
20011-490 = "バイト用のちゃんと\nした格好だから！"
20011-500 = "な、なに、先生？\nそんなにじっと見て……"
20011-510 = "ま、真面目に\n働いてるだけじゃん。"
20011-520 = "バイトが終わったら、\nアヤネちゃんとか\n先輩たちを呼んで\n食べ歩きとかしたいなー……"
20011-530 = "え、もう一回\nやってほしい？\nまた？"
20011-540 = "うっ……分かった、\n分かったわよ！\nやればいいんでしょ！"
20011-550 = "……あ、悪霊退散ー！\nほら、これで満足！？"
20011-860 = "あっ、先生。\nおみくじ引きにきたの？\nおみくじならここだよ。"
20011-870 = "おみくじは\nいかがですかー！"
20011-880 = "……おみくじって、\nこうやって宣伝して\n良いものなのかな？"
20011-890 = "あ、新年のイベントは\nもう終わっちゃったけど、\nまだおみくじは引けるよ"
20011-900 = "ほい、先生！"
20011-910 = "新年の運試しだよ、\n決まっちゃうんだよ、\n先生！"
20011-920 = "何だか\nドキドキしてきた……！"
20011-930 = "まあ、悪い結果が出ても\n大丈夫よ。ほら、\n巫女さんの\n私がいるんだし……！"
20011-940 = "……そ、そんなに\n笑わないで！\n頑張って言ったのに！"
20011-950 = "え、大吉！？\nすごいじゃん先生！"
20011-960 = "大吉を引くと、特別な\n商品が貰えるんだよ！\nはい！"
20011-970 = "吉だって！\n先生、おめでと！"
20011-980 = "というわけでここで、\n幸運の巫女から\n賞品の贈呈～！"
20011-990 = "中吉かー、うん、\n良いんじゃない？"
20011-1000 = "じゃあ中吉を当てた\n先生には、\nこれをあげる！"
20011-1010 = "うん？小吉？"
20011-1020 = "ガッカリしないで、\n先生。ほら、先生に\nこれあげるから。"
20011-1030 = "末吉かぁ……何となく\n先生っぽいって\nいうか……"
20011-1040 = "あ、いや、\n悪口じゃなくて！\nとにかくはいこれ、\n末吉の賞品ね。"
20011-1050 = "きょ、凶！？\nあ、あはは……\nその、だ、大丈夫！"
20011-1060 = "ほら、\nこれあげるから！\n気にしないで、ね？"
