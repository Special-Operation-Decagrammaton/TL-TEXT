[translation]
20011-390 = "Ah, bem-vindo. Professor. Você já fez seus pedidos de Ano Novo?"
20011-400 = "P-Professor, por que você está aqui!? V-você por acaso veio até aqui só por minha causa...!?"
20011-410 = "Ah, desculpe, esquece o que eu disse..."
20011-420 = "Mesmo sendo Ano Novo, está bem barulhento, né?"
20011-430 = "Bem, acho que é bom ter esse clima animado."
20011-440 = "Haa... o Grupo Kurokame, os Kaitengers... por que eles continuam aparecendo um atrás do outro..."
20011-450 = "Será que vou receber meu pagamento pelo bico direitinho...?"
20011-460 = "Foi uma correria logo no início do ano, mas acho que as coisas estão se acalmando agora."
20011-470 = "Bom trabalho, Professor. Quer voltar comigo e comer um pouco de Osechi?"
20011-480 = "E-eu já disse várias vezes, isso não é cosplay!"
20011-490 = "É um traje adequado para o trabalho!"
20011-500 = "O-o que foi, Professor? Por que está me olhando fixamente assim..."
20011-510 = "Eu só estou trabalhando sério, sabe."
20011-520 = "Quando o trabalho acabar, queria chamar a Ayane-chan e os veteranos para sair por aí comendo..."
20011-530 = "Hã, quer que eu faça de novo? De novo?"
20011-540 = "Ugh... tá bom, tá bom! Eu faço, satisfeito!?"
20011-550 = "...Ah, afaste-se, espírito maligno! Pronto, satisfeito agora!?"
20011-860 = "Ah, Professor. Veio tirar um Omikuji? É aqui que tira."
20011-870 = "Quem quer um Omikuji!"
20011-880 = "...Será que é certo ficar fazendo propaganda de Omikuji assim?"
20011-890 = "Ah, o evento de Ano Novo já acabou, mas ainda dá para tirar um Omikuji."
20011-900 = "Aqui, Professor!"
20011-910 = "É a sua sorte de Ano Novo, vai ser decidido agora, Professor!"
20011-920 = "Sinto meu coração batendo forte..."
20011-930 = "Bem, não tem problema se tirar um resultado ruim. Afinal, você tem a mim, uma sacerdotisa...!"
20011-940 = "...N-não ria tanto! Eu me esforcei para dizer isso!"
20011-950 = "Hã, Daikichi (Grande Sorte)!? Que incrível, Professor!"
20011-960 = "Se tirar Daikichi, você ganha um prêmio especial! Aqui!"
20011-970 = "Kichi (Sorte)! Parabéns, Professor!"
20011-980 = "Sendo assim, aqui está a entrega do prêmio pela sacerdotisa da sorte!"
20011-990 = "Chukichi (Sorte Média), hein? É, não está bom?"
20011-1000 = "Então, para o Professor que tirou Chukichi, aqui está o seu prêmio!"
20011-1010 = "Hã? Shokichi (Pequena Sorte)?"
20011-1020 = "Não fique desapontado, Professor. Toma, vou te dar isso aqui."
20011-1030 = "Suekichi (Sorte Final)... de certa forma, combina com você, Professor..."
20011-1040 = "Ah, não, não foi um insulto! De qualquer forma, aqui está o prêmio de Suekichi."
20011-1050 = "Kyo (Má Sorte)!? A-ahahaha... bem, e-está tudo bem!"
20011-1060 = "Toma, vou te dar isso aqui! Não se preocupe, tá?"
