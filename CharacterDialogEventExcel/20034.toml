[translation]
20034-310 = "わあ！先生！お参り、\nもう行きましたか？"
20034-320 = "まだでしたら…\n私と一緒に、\nいかがですか？"
20034-330 = "寒いときに何かを\n食べると、身体が\n温まるって言いますよね。"
20034-340 = "ほら、たくさんの\nお節が私たちを\n待ってますよ～？"
20034-350 = "何かありましたか？\n先生？"
20034-360 = "あら、私に\nイタズラですか？\n先生～？"
20034-370 = "いいんですか？\n私の仕返しは…"
20034-380 = "ちょっと、\n変わってるかもですよ？"
20034-390 = "先生、退屈ですか？"
20034-400 = "私でしたら、先生を\n退屈させませんけど、"
20034-410 = "いかがですか…？"
20034-420 = "先生ばかりずるいです。"
20034-430 = "はいっ、捕まえました★\nもう離しませんよ～"
