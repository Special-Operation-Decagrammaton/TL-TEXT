[translation]
20035-10 = "おかえり、先生……\n百鬼夜行にようこそ……"
20035-20 = "今日は私が先生を\n案内してあげる。"
20035-30 = "ガイド春日ツバキ、\n頑張ります。ふぁ……"
20035-40 = "ふえ……\nどうしたの先生？"
20035-50 = "居眠りしてるように\n見えたから、起こして\nみたって？"
20035-60 = "んん……くすぐったい……"
20035-70 = "でも、その程度で私の\n修行を止めることは\nできないよ……"
20035-80 = "ずっとそうやって\nいたずらしたら……"
20035-90 = "ベッドで一緒に\n横になっちゃうよ……？"
20035-100 = "ん……？\nむしろそうしたいの……？"
20035-110 = "もしかして\n気にしてほしいの……？"
20035-120 = "……そんなこと\nしなくても、私は\n十分先生のことを\n気にしてるのに……"
20035-130 = "ずっとそうやって\nいたずらしたら……"
20035-140 = "ベッドで一緒に\n横になっちゃうよ……？"
20035-150 = "ん……？\nむしろそうしたいの……？"
20035-160 = "もしかして\n気にしてほしいの……？"
20035-170 = "……そんなこと\nしなくても、私は\n十分先生のことを\n気にしてるのに……"
20035-800 = "毎日の日課をちゃんと\nやらないと……"
20035-810 = "いい夢は\n見られないんだって……"
20035-820 = "日程表は確認した……？\nじゃあ、私がガイドしてあげる。"
20035-830 = "うーん…… \nそんなに揺らさないで、先生……"
20035-840 = "ん……？ いや。\n 寝てない。寝てないってば……"
20035-850 = "次の目的地に\n案内してあげる、先生……"
20035-860 = "その前に、少しだけ寝てから……"
20035-870 = "はい、これ…… 受け取って。\nお疲れ様、先生。 ふふっ。"
20035-880 = "先生も修行を\n頑張っているんだね……"
20035-890 = "私も負けられない。ぐぅ……"
