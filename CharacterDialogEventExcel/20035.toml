[translation]
20035-10 = "Bem-vindo de volta, Sensei... Bem-vindo a Hyakkiyako..."
20035-20 = "Hoje eu vou ser a sua guia."
20035-30 = "Guia Kasuga Tsubaki, dando o meu melhor. Ah... bocejo..."
20035-40 = "Como foi Hyakkiyako...? Você está se divertindo de verdade...?"
20035-50 = "Se houver algum lugar que queira ir, é só me dizer..."
20035-60 = "Eu posso te guiar por Hyakkiyako..."
20035-70 = "O festival... foi incrível, não foi?"
20035-80 = "Hyakkiyako ainda tem muitos outros festivais... Estarei te esperando, tá?"
20035-90 = "Ah... O que foi, Sensei?"
20035-100 = "Você tentou me acordar porque parecia que eu estava cochilando...?"
20035-110 = "Hmm... isso faz cócegas..."
20035-120 = "Mas não é com isso que você vai conseguir interromper o meu treinamento..."
20035-130 = "Se você continuar brincando assim comigo..."
20035-140 = "Eu vou acabar me deitando na cama com você...?"
20035-150 = "Hmm...? Na verdade, é isso que você quer...?"
20035-160 = "Será que você quer que eu te dê atenção...?"
20035-170 = "...Mesmo sem você fazer isso, eu já presto atenção suficiente em você, Sensei..."
20035-800 = "Se eu não cumprir minhas tarefas diárias..."
20035-810 = "Dizem que não consigo ter bons sonhos..."
20035-820 = "Você conferiu a agenda...? Então, eu vou te guiar."
20035-830 = "Hmm... Não me balance tanto, Sensei..."
20035-840 = "Hmm...? Não. Eu não estou dormindo. Eu disse que não estou dormindo..."
20035-850 = "Vou te guiar para o próximo destino, Sensei..."
20035-860 = "Mas antes, só um pouquinho de sono..."
20035-870 = "Aqui, pegue isto... Bom trabalho, Sensei. Hehe."
20035-880 = "Você também está se esforçando bastante no seu treinamento, Sensei..."
20035-890 = "Eu não posso perder. Zzz..."
