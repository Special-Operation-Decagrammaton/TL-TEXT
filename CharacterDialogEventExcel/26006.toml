[translation]
26006-290 = "あれ、先生？\n何か食べ物を持って\nきてくれたんですか！？"
26006-300 = "お疲れ様です！\n頂いた支援物資に応じて、"
26006-310 = "私たちからも\n何かお返しをしますね！"
26006-320 = "お祭りも、残すところ\n半分くらいになって\nしまいましたね。"
26006-330 = "……まあ、もともと私たちには\nほとんど関係無いのですが。"
26006-340 = "イワン・クパーラも\nもう残り僅かですね。"
26006-350 = "何か美味しそうなものや、\nここでの生活に役立ちそうな\nものがありましたら"
26006-360 = "ぜひ持ってきて\nいただけますと！"
26006-370 = "今日が最終日ですね、先生。\n何か忘れ物はありませんか？"
26006-380 = "お祭りは終わりましたが、もし\nまだ何か持っていたら、\nぜひ私にください……！"
26006-390 = "227号特別クラスには、\nいつも甘い物が\n足りなくって……。"
26006-400 = "いつになったら、\n本校舎に帰れるのかな……。"
26006-410 = "あっ……\n美味しそう……。"
26006-420 = "えっ？こ、これ、\n貰っても良いんですか？"
