[translation]
26006-290 = "Ué, Sensei?\nVocê trouxe alguma\ncomida para mim!?"
26006-300 = "Bom trabalho!\nDependendo dos suprimentos\nque você trouxe,"
26006-310 = "nós também vamos\nte dar algo em troca!"
26006-320 = "O festival já está\nchegando na metade,\nnão é mesmo?"
26006-330 = "……Bem, na verdade, isso\nnão tem quase nada a ver\ncom a gente."
26006-340 = "O Ivan Kupala também\nestá quase acabando."
26006-350 = "Se você tiver algo gostoso\nou algo que possa ser útil\npara a nossa vida aqui,"
26006-360 = "por favor, traga\npara a gente!"
26006-370 = "Hoje é o último dia, Sensei.\nVocê não esqueceu de nada?"
26006-380 = "O festival acabou, mas se\nvocê ainda tiver algo aí,\npor favor, me dê……!"
26006-390 = "Na Classe Especial 227,\nsempre faltam coisas\ndoces……."
26006-400 = "Quando será que vamos\npoder voltar para o\nprédio principal……."
26006-410 = "Ah……\nParece delicioso……."
26006-420 = "Hã? Vo-você está me\ndando isso?"
