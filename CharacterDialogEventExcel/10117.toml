[translation]
10117-10 = "Bem-vindo~"
10117-20 = "Preparação concluída~"
10117-30 = "Sensei, perigo!"
10117-40 = "Help me, me ajuda~"
10117-50 = "Preparando para rodar~,\nSem problemas."
10117-60 = "Sensei,\nvou aumentar a velocidade~."
10117-70 = "Já acabou~?\nQuero brincar mais~."
10117-80 = "Foi divertido, né~\nVamos brincar de novo."
10117-90 = "Eh~?\nQuer brincar com a Hikari?"
10117-100 = "Isso faz cócegas~."
10117-110 = "Uuu~\nVou dar o troco~!"
10117-120 = "Um carinho, por favor,\nme elogia, me elogia~"
10117-130 = "Me elogia~...\nMesmo que eu não tenha feito nada."
10117-140 = "Quer comer um doce~?\nEspera um pouquinho~"
10117-150 = "Ah~...\nComi tudo...\nSorry"
10117-510 = "Loja do trem~\nO que você quer~?"
10117-520 = "Bem-vindo~.\nDê uma olhadinha,\nfoi o que disseram, né?"
10117-530 = "Os trilhos continuam\npor toda parte~\ne a loja também~"
10117-540 = "Recomendação? Hmm..."
10117-550 = "Escolha você mesmo~"
10117-560 = "A Hikari também quer brincar, mas\nestou me segurando~\nSensei, se segure também~"
10117-570 = "Oh, isso é bom, né~"
10117-580 = "Você tem bom gosto~\nUhu~"
10117-590 = "Sensei,\nque inteligente."
10117-600 = "A minha parte também!\nA minha parte também!"
