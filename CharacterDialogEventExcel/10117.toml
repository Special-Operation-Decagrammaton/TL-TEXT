[translation]
10117-10 = "ようこそー"
10117-20 = "じゅんびかんりょー"
10117-30 = "せんせーぴんち！"
10117-40 = "へるぷみー、たすけてー"
10117-50 = "走行準備ー、\n問題なーし。"
10117-60 = "せんせー\nスピード上げるよー。"
10117-70 = "もう終わりー？\nもっと遊びたいー。"
10117-80 = "楽しかったねー\nまたあそぼ。"
10117-90 = "えー？\nヒカリとあそびたいの？"
10117-100 = "くすぐったーいー。"
10117-110 = "ううー\nやりかえしてやるー！"
10117-120 = "なでなでプリーズ、\nほめてほめてー"
10117-130 = "ほめてー……\n何もしてないけど。"
10117-140 = "お菓子たべるー？\nちょっとまってねー"
10117-150 = "あー……\n全部食べちゃった……\nソーリー"
10117-510 = "トレインショップー\nなにがほしいー？"
10117-520 = "いらっしゃーい。\nみていってくださーい、\nだって？"
10117-530 = "線路はどこまでも\nつづくーよー\nお店もいっしょー"
10117-540 = "おすすめ？うーん……"
10117-550 = "自分で選ぶのだー"
10117-560 = "ヒカリも遊びたいけど\nがまんしてるー\nせんせーもがまんしてー"
10117-570 = "おー、それいいよねー"
10117-580 = "センスあるー\nひゅーひゅー"
10117-590 = "せんせい、\nかしこーい。"
10117-600 = "ヒカリのぶんも！\nヒカリのぶんも！"
