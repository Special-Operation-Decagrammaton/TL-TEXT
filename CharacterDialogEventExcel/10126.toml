[translation]
10126-160 = "Bem-vindo ao\nClube de Pesquisa de Ocultismo... Sensei."
10126-170 = "......Os segredos da\nacademia estão esperando."
10126-180 = "Existem tantos...\nsegredos adormecidos, sabe?"
10126-190 = "ALERTA, ALERTA!\nO EVENTO TERMINARÁ\nEM BREVE!"
10126-200 = "......Foi o que disseram."
10126-210 = "Bom trabalho, Sensei."
10126-220 = "Vou levar essa memória...\naté a próxima vida.\nIhi."
10126-230 = "As mãos do Sensei...\nsão quentinhas."
10126-240 = "Aquele corvo...\nNão conheço esse aí."
10126-250 = "Você gosta de mim?"
10126-260 = "Diga isso...\ncom palavras, vai?\nIhi..."
10126-270 = "Pode me acariciar o quanto quiser...\ncomo na vida passada."
10126-400 = "Para você, Sensei...\nreuni os segredos da academia."
10126-410 = "Vamos... desvendá-los juntos."
10126-420 = "Conseguir desvendar\nesse segredo..."
10126-430 = "Você é incrível, Sensei."
10126-440 = "Bom trabalho...\nTodos vão ficar felizes.\nIhi."
10126-450 = "Wildhunt ainda tem...\nmuitos segredos desconhecidos,\nsabe?"
10126-460 = "Você gosta de mim...?"
10126-470 = "Estou tão feliz...\nIhihi!"
