[translation]
10126-160 = "オカ研に\nようこそぉ……先生。"
10126-170 = "……学院の秘密が、\n待ってるよ。"
10126-180 = "眠っている秘密が……\nたくさんあるんだよ？"
10126-190 = "ケイコク、ケイコク！\nマモナクイベントガ\n終了シマス！"
10126-200 = "……だってさぁ。"
10126-210 = "お疲れ様、先生。"
10126-220 = "この思い出は……\n来世まで持ってくよぉ。\nイヒッ。"
10126-230 = "先生の手……\nあったかい。"
10126-240 = "そのカラス……\n知らない子だねぇ。"
10126-250 = "私のこと、\n好きぃ？"
10126-260 = "ちゃんと……\n言葉にして？\nイヒッ……。"
10126-270 = "好きなだけ撫でなよ……\n前世みたいにさ。"
10126-400 = "先生のために……\n学院の秘密をまとめたよぉ。"
10126-410 = "さ……一緒に解き明かそうかぁ。"
10126-420 = "この秘密を\n解けるなんて……"
10126-430 = "先生はすごいねぇ。"
10126-440 = "お疲れ様ぁ……\nみんなも喜ぶよぉ。\nイヒッ。"
10126-450 = "ワイルドハントには……\nまだ知られざる秘密が\nいっぱいあるよぉ。"
10126-460 = "私のこと、\n好きなんだ……？"
10126-470 = "嬉しい……\nイヒヒッ！"
