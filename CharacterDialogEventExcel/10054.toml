[translation]
10054-110 = "先生、こちらです！\nまもなく試合が\n始まります！"
10054-120 = "お待ちしておりました、\n先生！それでは、\n参りましょう。"
10054-130 = "何かお手伝いできる\n事はありますか？"
10054-140 = "……先生？\nどうかしましたか……？"
10054-150 = "そ、そんな風に\n何度も呼ばれると……\n恥ずかしいです……。"
10054-170 = "先生、こちらです！\nまもなく試合が\n始まります！"
10054-180 = "お待ちしておりました、\n先生！それでは、\n参りましょう。"
10054-190 = "みなさん、\nとても頑張っていますね。"
10054-200 = "私もみなさんの\n思いに応えられるよう、\n精進します！"
10054-210 = "最後まで精一杯\n頑張りましょう。"
10054-220 = "先生、\nお疲れ様でした。"
10054-230 = "まだ助けが必要な方が\nいらっしゃるかもしれ\nませんので、"
10054-240 = "もうちょっと\n見て回りましょう。"
10054-250 = "何かお手伝いできる\n事はありますか？"
10054-260 = "……先生？\nどうかしましたか……？"
10054-270 = "そ、そんな風に\n何度も呼ばれると……\n恥ずかしいです……。"
10054-400 = "こんにちは、先生。\n何かお探しですか？"
10054-410 = "よかったらご覧になりますか？"
10054-420 = "試合は無事終わりましたが、\n商品が残ってしまいましたね。"
10054-430 = "よろしければ、お片付けを\n手伝っていただけませんか？"
10054-440 = "わ、私ですか……？\n私は……先生のお手伝いが\nできれば、と思いまして……。"
10054-450 = "ずっと見つめられると……\nその……少し、\n恥ずかしいです……。"
10054-460 = "すぐにご用意いたしますね。"
10054-470 = "他に必要なものは\nありませんか？"
10054-480 = "それになさったのですね、\nかしこまりました。"
10054-490 = "準備しておいた\n甲斐がありました。"
