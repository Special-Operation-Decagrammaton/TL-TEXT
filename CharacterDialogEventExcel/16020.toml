[translation]
16020-200 = "Итак, операция наконец-то начинается..."
16020-210 = "Давайте поднажмём!"
16020-220 = "Я ждала тебя. Без тебя ничего бы не началось, Сенсей."
16020-230 = "«Операция по выслеживанию Рёва», хах..."
16020-240 = "А Рёв вообще можно выследить глазами?"
16020-250 = "Хм? Что-то не так?"
16020-260 = "Инари-суши Нико просто великолепны. Они вкусные, когда бы я их ни ела."
16020-270 = "Интересно, как там Юкино..."
16020-280 = "Кажется, она всё ещё немного зациклена на том, что произошло раньше."
16020-400 = "О, Сенсей. Как раз вовремя."
16020-410 = "Кое-что хотелось спросить у тебя по поводу того инцидента."
16020-420 = "Эй, у тебя найдётся минутка?"
16020-430 = "У меня есть к тебе пара просьб."
16020-440 = "Хм? Ты уставился на мои волосы, что такое?"
16020-450 = "Тебя в них что-то смущает?"
16020-460 = "А... я заплетаю их так, потому что было бы проблемой, если бы они за что-то зацепились в узком проходе."
16020-470 = "Вот почему я ношу такие косы."
16020-480 = "Хотя я думала о том, чтобы просто отрезать их."
16020-490 = "Но я растила их так долго, что теперь как-то жалко стричь."
16020-500 = "Воу! Не надо их теребить!?"
16020-510 = "...Я не особо люблю, когда у меня кто-то стоит за спиной."
16020-520 = "Хех... Вот как, понятно."
16020-530 = "Полагаю, у тех слухов всё-таки есть основание."
16020-540 = "Ты уже закончил? ...Это было быстро. Потрясающе."
16020-550 = "Может, мне стоит называть тебя «Командиром»?"
