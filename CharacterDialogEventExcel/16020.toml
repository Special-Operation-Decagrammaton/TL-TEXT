[translation]
16020-200 = "So, the operation finally begins..."
16020-210 = "Let's get pumped up!"
16020-220 = "I've been waiting. It wouldn't start without you, Sensei."
16020-230 = "The 'Roar Tracking Operation,' huh..."
16020-240 = "To begin with, is a roar even something you can track with your eyes?"
16020-250 = "Hm? What's wrong?"
16020-260 = "Niko's inari sushi is exquisite, isn't it? It's delicious every time I eat it."
16020-270 = "I wonder if Yukino is doing okay..."
16020-280 = "She still seems to be dwelling on what happened before a little bit."
16020-490 = "Oh, Sensei. Perfect timing."
16020-500 = "There's something I wanted to ask you about the incident."
16020-510 = "Hey, do you have a moment?"
16020-520 = "There are a few things I'd like to ask of you."
16020-530 = "Hm? You're staring at my hair, what's up?"
16020-540 = "Is there something bothering you about it?"
16020-550 = "Ah... I braid it like this because it'd be a problem if it got snagged in a tight space."
16020-560 = "That's why I keep it braided."
16020-570 = "I did think about just cutting it off, though."
16020-580 = "But I've put so much effort into growing it out, it felt like a waste."
16020-590 = "Whoa! Don't poke at it!?"
16020-600 = "...I'm not really a fan of people standing behind me."
16020-610 = "Huh... I see."
16020-620 = "I suppose there's a reason for the rumors, then."
16020-630 = "You're already done? ...That was fast. That's amazing."
16020-640 = "Should I be calling you 'Commander' instead?"