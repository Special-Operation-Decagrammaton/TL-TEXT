[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
16020-200 = "Finalmente a operação vai deflagrar, hein...?" 
16020-210 = "Bora fazer o termostato subir, uhuu~!" 
16020-220 = "Eu tava te esperando.\nAfinal, sem o Sensei na pista,\na brincadeira nem começa, né?" 
16020-230 = "«Operação Rastreio das Lores Ocultas»\nSei..." 
16020-240 = "Mas vem cá, dá mesmo pra perseguir\nesses fantasmas do folclore\ncom os olhos acesos?" 
16020-250 = "Hã? O que foi que atiçou o seu radar?" 
16020-260 = "Os Inarizushis da Niko são\numa tentação divina, né?\nÉ uma delícia engolir aquilo a qualquer hora." 
16020-270 = "Será que a Yukino tá aguentando o tranco...?" 
16020-280 = "Tenho o pressentimento de que\ndela ainda tá arrastando os traumas\ndaquela nossa rebelião passada nas costas." 
16020-490 = "Opa, Sensei. Chegou na hora mais gostosa." 
16020-500 = "Eu tava querendo te interrogar\nsobre uns detalhes bem picantes desse caso." 
16020-510 = "Ah, me cede um segundinho a sós...?" 
16020-520 = "Tem uns favores e desejos bem específicos\nque eu queria te pedir na surdina." 
16020-530 = "Hã? Por que as suas pupilas tão tão fixadas\ne secas no meu cabelo? O que foi?" 
16020-540 = "Alguma coisa nas minhas mechas\nacendeu a sua luxúria?" 
16020-550 = "Ah... é que se o clima apertar e a gente\nse enfiar num lugar estreito e abafado,\neu não quero meu cabelo prendendo por aí, sabe?" 
16020-560 = "Por isso que eu deixo ele todo trançadinho\ne preso assim." 
16020-570 = "Eu até cogitei em passar a tesoura\ne decepar o comprimento fora..." 
16020-580 = "But pô, deu tanto trabalho deixar ele crescer\ndesse tamanho pra você puxar...\nseria um desperdício cortar, né?" 
16020-590 = "Hyaah?!\nNão cutuca o meu corpo assim do nada,\nseu tarado safado?!" 
16020-600 = "……Eu não tenho muita resistência\npra segurar o baque quando ficam colados\nna minha retaguarda, sabia? Fico sem defesa." 
16020-610 = "Hmmm... saquei a tese." 
16020-620 = "Faz todo o sentido do mundo\no asfalto estar empestado de fofocas\npervertidas sobre o senhor." 
16020-630 = "Uau, já acabou e deu conta do recado?!\n……Que rápido! O seu desempenho na cama\né impressionante, Comandante." 
16020-640 = "Será que eu devia te chamar de meu \"Superior\"\npra te dar mais tesão no rádio?" 