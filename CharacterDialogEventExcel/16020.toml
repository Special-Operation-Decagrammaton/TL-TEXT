[translation]
16020-200 = "Finalmente a operação vai começar..."
16020-210 = "Vamos animar as coisas!"
16020-220 = "Eu estava esperando.\nNão dá para começar\nsem o Sensei."
16020-230 = "“Operação de Rastreamento da Roa”,\nhein..."
16020-240 = "Para começo de conversa,\nserá que dá para seguir a Roa\ncom os olhos?"
16020-250 = "Hm? O que houve?"
16020-260 = "O inari da Niko é\nsensacional, né.\nÉ sempre delicioso."
16020-270 = "Será que a Yukino está bem..."
16020-280 = "Ela ainda parece estar\num pouco presa\nao que aconteceu antes."
16020-490 = "Ah, Sensei. Que bom que apareceu."
16020-500 = "Eu queria te perguntar\numas coisas sobre o incidente."
16020-510 = "Ah, pode me dar um minuto..."
16020-520 = "Tenho alguns\npedidos para te fazer."
16020-530 = "Hm? Por que está olhando\ntanto para o meu cabelo?"
16020-540 = "Tem algo que te incomodou?"
16020-550 = "Ah... é que eu não quero que ele\nenrosque em lugares apertados."
16020-560 = "Por isso eu o tranço assim."
16020-570 = "Eu até pensei em\ncortá-lo, sabe."
16020-580 = "Mas seria uma pena cortar\ndepois de ter deixado crescer tanto."
16020-590 = "Uau! Não cutuca, não!?"
16020-600 = "......Eu não sou muito\nfã de ter alguém\nficando atrás de mim."
16020-610 = "Hmm... entendi."
16020-620 = "Realmente, tem um motivo\npara isso ter virado um boato, né."
16020-630 = "Já terminou? \n...Que rápido. Impressionante."
16020-640 = "Será que é melhor eu te chamar\nde “Comandante”?"
