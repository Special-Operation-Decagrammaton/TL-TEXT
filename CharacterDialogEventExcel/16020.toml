[translation]
16020-200 = "ついに作戦開始かぁ……。"
16020-210 = "テンションあげてこ～！"
16020-220 = "待ってたよ。\n先生がいないと\n始まんないからね。"
16020-230 = "「ロア追跡作戦」\nねぇ……。"
16020-240 = "そもそも、ロアって\n目で追えるものなの？"
16020-250 = "ん？どうしたの？"
16020-260 = "ニコのおいなりさんは\n絶品だよねぇ。\nいつ食べても美味しい。"
16020-270 = "ユキノ、大丈夫かな……。"
16020-280 = "まだちょっと、\n前のこと引きずって\nそうなんだよね。"
16020-400 = "あ、先生。いいところに。"
16020-410 = "事件のことで\n聞きたいことがあってさ。"
16020-420 = "あ、ちょっといいかな……"
16020-430 = "いくつか\nお願いしたいことがあって。"
16020-440 = "ん？髪をじっと見つめて、\nどうしたの？"
16020-450 = "何か気になるとこでもあった？"
16020-460 = "ああ……狭い場所で、\n髪がひっかかったら困るからさ。"
16020-470 = "こうやって編んでるわけ。"
16020-480 = "切っちゃおうかな～とも\n思ったんだけど。"
16020-490 = "せっかくここまで伸ばしたのを\n切るのもなぁって。"
16020-500 = "うわっ！\nつっつかないで！？"
16020-510 = "……あんまり\n得意じゃないんだよね。\n後ろに立たれるの。"
16020-520 = "へぇ……なるほどね。"
16020-530 = "たしかに、\n噂になる理由はある、か。"
16020-540 = "もう終わったの？\n……早いね。すごいなぁ。"
16020-550 = "「指揮官」って呼んだほうが\nよかったりする？"
16020-560 = "こうやって編んでるわけ。"
16020-570 = "切っちゃおうかな～とも\n思ったんだけど。"
16020-580 = "せっかくここまで伸ばしたのを\n切るのもなぁって。"
16020-590 = "うわっ！\nつっつかないで！？"
16020-600 = "……あんまり\n得意じゃないんだよね。\n後ろに立たれるの。"
16020-610 = "へぇ……なるほどね。"
16020-620 = "たしかに、\n噂になる理由はある、か。"
16020-630 = "もう終わったの？\n……早いね。すごいなぁ。"
16020-640 = "「指揮官」って呼んだほうが\nよかったりする？"
