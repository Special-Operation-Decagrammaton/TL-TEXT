[translation]
20044-10 = "野球のルールに\n詳しくは\nありませんが……"
20044-20 = "この盛り上がり……\n私まで胸が\n高鳴ってきました。"
20044-30 = "……凄まじい\n熱気ですね。"
20044-40 = "脱水症状に\n気をつけないと。"
20044-50 = "スポーツマンシップとは\n程遠い――\n何か良からぬことが\n起きているようです。"
20044-60 = "行きましょう、\nトレーナー。"
20044-70 = "勝利への執着が\n度を過ぎると、"
20044-80 = "予期せぬ問題を\n引き起こして\nしまうのですね。"
20044-90 = "新たな学びです。"
20044-100 = "それでは\nトレーナー、事態も\n収束したことですし、"
20044-110 = "今からトレーニングに\nいくとしましょう。"
20044-120 = "この制服……機能性を\n兼ね備えていて、\nいいですね。"
20044-130 = "トレーナー？\nお呼びでしょうか？"
20044-140 = "……私の足の筋肉を\n確かめたいんですか？"
20044-150 = "ふふ、\nそういうことでしたら、\n好きなだけどうぞ。"
20044-160 = "このドリンクサーバー？"
20044-170 = "25kgくらい\nでしょうか。"
20044-180 = "低負荷のトレーニングに\nちょうど良いです。"
20044-400 = "どうぞ、\nゆっくりご覧ください。"
20044-410 = "お気に入りの品が\n見つかると良いですね。"
20044-420 = "棚だし、想定より早く\n終えることができました。"
20044-430 = "トレーニング部の備品管理に\n少し似ていたので。"
20044-440 = "買い逃しがないか、\nもう一度確認してみてください。"
20044-450 = "品数を把握し、\n素早く提供する……"
20044-460 = "瞬発力が\n鍛えられそうです。"
20044-470 = "仕事中も、正しい姿勢を\n意識しています。"
20044-480 = "私はトレーニング部の\n部長ですから。"
20044-490 = "はい、お受け取りください。"
20044-500 = "他に必要なものは\nありませんか？"
20044-510 = "かしこまりました、\n少々お待ちください。"
20044-520 = "ドリンクをサービスさせて\nいただいてますが、どうでしょう？"
