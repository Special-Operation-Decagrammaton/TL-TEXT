[translation]
20044-10 = "Não entendo muito\ndas regras do beisebol,\nmas..."
20044-20 = "Essa empolgação...\nAté meu coração\ncomeçou a acelerar."
20044-30 = "……Que energia\nimpressionante."
20044-40 = "Precisamos tomar cuidado\ncom a desidratação."
20044-50 = "Isso está longe de ser\nesportividade —\nparece que algo\nruim está acontecendo."
20044-60 = "Vamos lá,\nTreinador."
20044-70 = "Quando a obsessão pela\nvitória passa dos limites,"
20044-80 = "acaba causando\nproblemas inesperados."
20044-90 = "É um novo aprendizado."
20044-100 = "Bem, Treinador,\ncomo a situação\nfoi resolvida,"
20044-110 = "vamos treinar\nagora."
20044-120 = "Este uniforme...\nEle é funcional,\nmuito bom."
20044-130 = "Treinador?\nVocê me chamou?"
20044-140 = "……Você quer verificar\nos músculos das minhas pernas?"
20044-150 = "Fufu,\nse for isso,\npode olhar o quanto quiser."
20044-160 = "Este servidor de bebidas?"
20044-170 = "Deve pesar uns\n25kg."
20044-180 = "É perfeito para um\ntreino de baixa carga."
20044-400 = "Fique à vontade,\npode olhar com calma."
20044-410 = "Espero que encontre\nalgo que goste."
20044-420 = "Consegui terminar de organizar\nas prateleiras mais rápido\ndo que o esperado."
20044-430 = "É um pouco parecido com\ngerenciar os equipamentos\ndo Clube de Treinamento."
20044-440 = "Verifique mais uma vez\npara ter certeza de que\nnão esqueceu nada."
20044-450 = "Saber a quantidade de itens\ne servir rapidamente..."
20044-460 = "Parece que isso\ntreina a agilidade."
20044-470 = "Mesmo durante o trabalho,\npresto atenção na minha postura."
20044-480 = "Afinal, eu sou a chefe\ndo Clube de Treinamento."
20044-490 = "Sim, pode pegar."
20044-500 = "Precisa de mais\nalguma coisa?"
20044-510 = "Entendido,\npor favor, aguarde um momento."
20044-520 = "Estou oferecendo bebidas\ncomo cortesia, o que acha?"
