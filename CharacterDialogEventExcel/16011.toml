[translation]
16011-160 = "Estava à sua espera,\nSensei. Está pronto?"
16011-170 = "A partida está prestes\na começar.\nVamos juntos?"
16011-180 = "P-Sensei...?"
16011-190 = "N-Não precisa me olhar\ndesse jeito..."
16011-200 = "Já está na hora\nde partirmos..."
16011-210 = "Precisa de algo?"
16011-280 = "Estava à sua espera,\nSensei. Está pronto?"
16011-290 = "A partida está prestes\na começar.\nVamos juntos?"
16011-300 = "Está bem animado,\nnão é?"
16011-310 = "Sendo assim, podemos\nconsiderar o 'Festival Esportivo'\num sucesso."
16011-320 = "O 'Festival Esportivo'\nestá chegando ao fim."
16011-330 = "Vamos dar o nosso melhor\naté o fim."
16011-340 = "Graças ao Sensei,\no 'Festival Esportivo' foi\num grande sucesso."
16011-350 = "Muito obrigada pelo\nseu trabalho duro."
16011-360 = "P-Sensei...?"
16011-370 = "N-Não precisa me olhar\ndesse jeito..."
16011-380 = "Já está na hora\nde partirmos..."
16011-390 = "Precisa de algo?"
16011-500 = "Gostaria de verificar os registros da partida?"
16011-510 = "Organizei o progresso.\nGostaria de verificar?"
16011-520 = "Bem... isso é tudo que\nposso mostrar por enquanto."
16011-530 = "Há mais alguma coisa que\ngostaria de verificar...?"
16011-540 = "Verifiquei.\nÉ um registro impressionante."
16011-550 = "Isso é...\ntalvez seja um novo recorde."
