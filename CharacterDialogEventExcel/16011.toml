[translation]
16011-160 = "お待ちしておりました、\n先生。準備は\nよろしいですか？"
16011-170 = "ちょうど試合が\n始まるところです。\n一緒に参りましょうか。"
16011-180 = "せ、先生……？"
16011-190 = "そ、そんなに\n見つめられても……。"
16011-200 = "そろそろ出発の\nお時間ですよ……。"
16011-210 = "何か必要なものでも\nありますか？"
16011-280 = "お待ちしておりました、\n先生。準備は\nよろしいですか？"
16011-290 = "ちょうど試合が\n始まるところです。\n一緒に参りましょうか。"
16011-300 = "結構盛り上がって\nいますね。"
16011-310 = "これなら、\n「晄輪大祭」は成功……\nと考えてもいいですね。"
16011-320 = "「晄輪大祭」も大詰めを\n迎えていますね。"
16011-330 = "最後まで\n頑張りましょう。"
16011-340 = "先生のおかげで、\n「晄輪大祭」は大成功を\n収めることができました。"
16011-350 = "本当に\nお疲れ様でした。"
16011-360 = "せ、先生……？"
16011-370 = "そ、そんなに\n見つめられても……。"
16011-380 = "そろそろ出発の\nお時間ですよ……。"
16011-390 = "何か必要なものでも\nありますか？"
16011-500 = "試合の記録を確認しますか？"
16011-510 = "進行状況を整理しました。\n 確認しますか？"
16011-520 = "えっと……現在お見せ\nできるのはこれで全てです。"
16011-530 = "他に確認したいことでも\nありますか……?"
16011-540 = "確認しました。\n素晴らしい記録ですね。"
16011-550 = "これは……\n新記録かもしれません。"
