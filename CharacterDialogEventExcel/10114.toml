[translation]
10114-290 = "ゲヘナ学園まで\nお越しくださり……\nありがとうございます！"
10114-300 = "どうか楽しいひと時を\nお過ごしくださいね。"
10114-310 = "わあ！先生、来て\nくださったんですね！"
10114-320 = "この制服……\nに、似合ってますか？"
10114-330 = "ひぃん……うう……"
10114-340 = "パンちゃんが……\n私のせいです……\nなんとかしないと……！"
10114-350 = "このまま放っておく\nわけにはいきません……"
10114-360 = "私は、ゲヘナの\n生徒ですから！"
10114-370 = "一時はどうなることかと\n思いましたが……"
10114-380 = "先生のおかげで\nどうにかなりました！\nありがとうございます！"
10114-390 = "カフェのアルバイトで、\n制服を着ることに\nなったんです。"
10114-400 = "よろしければ……\n一息ついて\nいきませんか？"
10114-410 = "カフェのお仕事、\nすごく楽しいです。"
10114-420 = "でもお料理は\nあまりしないので……"
10114-430 = "給食部のお仕事を\nもっと頑張らなきゃって\n思いました！"
10114-440 = "あはは！先生！\nくすぐったいです……！"
10114-450 = "……ふぅ、\nありがとうございます。"
10114-460 = "おかげさまで、少し\nリラックスできました。"
10114-470 = "お待ちしておりました、先生！\nこちらへどうぞ！"
10114-480 = "メニューを\nお持ちしましょうか？"
10114-490 = "ふふっ、先生。"
10114-500 = "最後まで、ごゆっくり\nお楽しみください！"
10114-510 = "アルバイト中、動きを褒めて\nいただけることが多いんです……"
10114-520 = "給食部での経験が\n活きているのでしょうか？"
10114-530 = "はい先生、何か\nご注文ですか？"
10114-540 = "先生に\nお呼びいただいただけで……"
10114-550 = "私はとても嬉しいです！"
10114-560 = "分かりました！\n今すぐご用意します！"
10114-570 = "そちらですね！ただいまお持ち\nしますので、少々お待ちください。"
10114-580 = "在庫は十分にあります！\nご心配なく！"
10114-590 = "もし足りないものがありましたら、\nいつでも仰ってくださいね！"
10114-780 = "カフェでも仕込みは大事です！\n給食部との共通点ですね。"
10114-790 = "日課……\nコツコツできて、私は好きです。"
10114-800 = "注文を受けて、\nお料理を運ぶ……"
10114-810 = "これがウェイトレスの\n「ミッション」です。"
10114-820 = "先生、何かお手伝いできること、\nありますか？"
10114-830 = "すごいです！先生！\nはいこちら、受け取ってください！"
10114-840 = "努力が報われるって……\n素敵ですよね。"
