[translation]
10114-290 = "Obrigada por vir\naté a Academia Gehenna……!"
10114-300 = "Por favor, aproveite\neste momento agradável."
10114-310 = "Uau! Sensei, você\nveio me ver!"
10114-320 = "Este uniforme……\ne-está combinando comigo?"
10114-330 = "Hiiin…… uuu……"
10114-340 = "O Pan-chan……\na culpa é minha……\ntenho que dar um jeito……!"
10114-350 = "Não posso simplesmente\ndeixar as coisas assim……"
10114-360 = "Eu sou uma aluna\nde Gehenna, afinal!"
10114-370 = "Por um momento, achei que\nas coisas iam ficar feias……"
10114-380 = "Mas graças ao Sensei,\nconseguimos resolver!\nMuito obrigada!"
10114-390 = "Comecei a usar este uniforme\npor causa do meu trabalho\nde meio período no café."
10114-400 = "Se não se importar……\nque tal descansar um pouco\npor aqui?"
10114-410 = "Trabalhar no café\né muito divertido."
10114-420 = "Mas como eu não\ncozinho muito……"
10114-430 = "Pensei que preciso me esforçar\nmais no meu trabalho no\nDepartamento de Merenda!"
10114-440 = "Ahaha! Sensei!\nIsso faz cócegas……!"
10114-450 = "……Ufa,\nobrigada."
10114-460 = "Graças a você, consegui\nrelaxar um pouco."
10114-470 = "Estava à sua espera, Sensei!\nPor favor, venha por aqui!"
10114-480 = "Gostaria que eu\ntravesse o menu?"
10114-490 = "Fufu, Sensei."
10114-500 = "Por favor, aproveite\ncom calma até o fim!"
10114-510 = "Muitas vezes elogiam meus movimentos\nenquanto estou trabalhando……"
10114-520 = "Será que é porque a experiência no\nDepartamento de Merenda está ajudando?"
10114-530 = "Sim, Sensei, gostaria\nde fazer um pedido?"
10114-540 = "Só de ser chamada\npelo Sensei……"
10114-550 = "Eu já fico muito feliz!"
10114-560 = "Entendido!\nVou preparar agora mesmo!"
10114-570 = "É isso, então! Já estou trazendo,\npor favor, aguarde um momento."
10114-580 = "Temos estoque suficiente!\nNão se preocupe!"
10114-590 = "Se faltar alguma coisa,\npode me avisar a qualquer momento!"
10114-780 = "O preparo é importante no café também!\nÉ um ponto em comum com o Departamento de Merenda."
10114-790 = "Rotina……\nEu gosto de fazer as coisas com constância."
10114-800 = "Receber o pedido,\nlevar a comida……"
10114-810 = "Essa é a minha\n\"missão\" como garçonete."
10114-820 = "Sensei, tem algo em que\neu possa ajudar?"
10114-830 = "Incrível! Sensei!\nAqui, por favor, aceite isto!"
10114-840 = "Ver o esforço ser recompensado……\né maravilhoso, não é?"
