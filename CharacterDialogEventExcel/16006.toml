[translation]
16006-280 = "Ah, Sensei! \nSeja bem-vindo! \nBem-vindo à nossa casa de praia!"
16006-290 = "Ah, Sensei! \nEu estava te esperando!"
16006-300 = "Disseram que o período de funcionamento desta casa de praia \njá está chegando na metade! \nPrecisamos aproveitar até o fim!"
16006-310 = "Estamos entrando na reta final! \nVamos dar o nosso melhor!"
16006-320 = "Hoje é o último dia, Sensei!! \nConseguiu pegar tudo o que queria?"
16006-330 = "O expediente acabou, \nbom trabalho a todos~~!"
16006-340 = "……Achou que tinha acabado? \nFufu, na verdade, \nainda temos mais um tempinho!"
16006-350 = "Dê uma conferida para ver se \nnão esqueceu de nada, tá bom?"
16006-360 = "Fique à vontade para olhar tudo! \nTem muitas coisas \nque parecem deliciosas!"
16006-370 = "Ei, Sensei, isso aqui…… \nHm?"
16006-380 = "Poxa, olha para os produtos, \nnão para mim."
16006-390 = "Uuu~…… M-mesmo que você fique \nme cutucando assim, \neu não posso te dar de graça, viu?"
16006-400 = "Oh! \nComo esperado do Sensei!"
16006-410 = "Escolheu esse? \nSim, acho uma boa escolha!"
