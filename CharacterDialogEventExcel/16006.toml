[translation]
16006-280 = "あっ、先生だ！\nいらっしゃいませ！\n海の家にようこそー！"
16006-290 = "あっ、先生！\n待ってたよ！"
16006-300 = "この海の家の営業期間も、\nそろそろ折り返しなんだって！\n最後まで楽しまないとね！"
16006-310 = "そろそろラストスパートだね！\n頑張ろう！"
16006-320 = "今日が最終日だよ、先生！！\n欲しいものは全部手に入った？"
16006-330 = "営業終了っ、\nお疲れ様でした～～！"
16006-340 = "……って思った？\nふふっ、実はまだもう\nちょっとだけ大丈夫なんだって！"
16006-350 = "何か忘れてるものはないか、\n確認しておいてね？"
16006-360 = "思う存分見てってね！\n美味しそうなものも\nたっくさんあるから！"
16006-370 = "ねえ先生、これ……\nん？"
16006-380 = "もう、私じゃなくて\n商品の方を見てよー。"
16006-390 = "うう～……そ、そんなに\nつんつん触られても、\nタダではあげられないよ？"
16006-400 = "おおっ、\nさすが先生！"
16006-410 = "それにしたの？\nうん、良いと思う！"
