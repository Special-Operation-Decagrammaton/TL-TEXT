[translation]
20004-80 = "Está muito abafado hoje, não é? Por favor, tome bastante cuidado para não sofrer uma insolação."
20004-90 = "Muito bem, vamos começar o treinamento especial de verão!"
20004-100 = "É a primeira vez que venho à praia com outras pessoas da Trinity... estou um pouco nervosa."
20004-110 = "O sábio aprecia a água... é o que dizem."
20004-120 = "(Talvez eu não devesse ter escolhido um traje de banho preto...)"
20004-130 = "Agora há pouco, ouvi o grito da Tsurugi-senpai vindo de algum lugar..."
20004-420 = "Cumprirei tanto as missões quanto o descanso com dedicação."
20004-430 = "Não há nenhum encrenqueiro tentando causar problemas por aqui, certo?"
20004-440 = "Mesmo em um resort, não podemos baixar a guarda."
