[translation]
20004-80 = "今日も蒸し暑いですね…。\n熱中症には十分\n気をつけてください。"
20004-90 = "さあ、夏季特別訓練を\n始めましょう！"
20004-100 = "トリニティの他の\n方たちと海に来るなんて\n初めてで…少し、\n緊張してしまいますね。"
20004-110 = "知者楽水…\n知恵ある者は水を楽しむ、\nと言います。"
20004-120 = "（水着くらい、\n黒じゃなくても\n良かったかな…）"
20004-130 = "今、どこからか\nツルギ先輩の\n叫び声が…"
20004-420 = "任務も休息も、\nしっかりとやります。"
20004-430 = "まさか、こんなところで\n問題を起こそうとする\n問題児はいませんよね？"
20004-440 = "リゾート地でも、\n油断は禁物です。"
