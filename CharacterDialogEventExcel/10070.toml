[translation]
10070-100 = "先生か。\nようこそ山海経へ。"
10070-110 = "ああ、ちなみに……\n玄武商会に行くのは\nオススメしないぞ。"
10070-120 = "ふっ。あまり\nキョロキョロするな、\n迷子になられても困る。"
10070-130 = "先生か。\nようこそ山海経へ。"
10070-140 = "ああ、ちなみに……\n玄武商会に行くのは\nオススメしないぞ。"
10070-150 = "ここが山海経だ。"
10070-160 = "ふっ。あまり\nキョロキョロするな、\n迷子になられても困る。"
10070-170 = "ん？何か話したい\nことでもあるのか？\n――なら、いい。"
10070-180 = "人には……ただ名前を\n呼びたくなる日も\nあるものだからな。"
10070-190 = "どうかしたのか？"
10070-200 = "我々には、\nまだやるべきことが\n残ってるだろう。"
10070-210 = "たとえそれが、\n「悪」と呼ばれる\nものだとしても……な。"
10070-220 = "――ちょっと今の台詞、\n格好良くなかったか？"
10070-230 = "いつにも増して\n山海経が騒がしいな。"
10070-240 = "これも、\n先生がいるから\nなのか……？"
10070-250 = "事件が起きたら\nまず最初に動くのが、\n我々執行部だ。"
10070-260 = "そういうことだ、行くぞ。"
10070-380 = "心配するな、一つずつ\nこなしていけばいい。"
10070-390 = "複数の任務がある時は、\nまず簡単なものから片付ける。\nその方が色々とスムーズだぞ。"
10070-400 = "いつでも先生の\n味方になるぞ。"
10070-410 = "これは、玄龍門の者でも\n難しい内容のはずだが……\n正直驚いたぞ、先生。"
10070-420 = "それをこなすとは、\n流石、先生だ。\n私の目に狂いは無かったな。"
10070-430 = "だ、だが……！この程度、\n玄龍門では普通のことだ！"
