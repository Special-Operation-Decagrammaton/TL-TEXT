[translation]
10070-100 = "Professor. Bem-vindo a Shanhaijing."
10070-110 = "Ah, a propósito... não recomendo ir à Associação Comercial Genbu."
10070-120 = "Hmph. Não fique olhando para os lados, não quero que você se perca."
10070-130 = "Professor. Bem-vindo a Shanhaijing."
10070-140 = "Ah, a propósito... não recomendo ir à Associação Comercial Genbu."
10070-150 = "Aqui é Shanhaijing."
10070-160 = "Hmph. Não fique olhando para os lados, não quero que você se perca."
10070-170 = "Hm? Tem algo que queira me dizer? ...Se não, tudo bem."
10070-180 = "Às vezes, as pessoas só sentem vontade de chamar o nome de alguém, sabe?"
10070-190 = "Aconteceu alguma coisa?"
10070-200 = "Ainda temos coisas a fazer, não temos?"
10070-210 = "Mesmo que isso seja chamado de 'mal'..."
10070-220 = "— Ei, essa frase não soou legal agora?"
10070-230 = "Shanhaijing está mais barulhenta do que o normal."
10070-240 = "Será que isso é... por causa da sua presença, Professor?"
10070-250 = "Se um incidente ocorrer, nós, do Departamento de Execução, seremos os primeiros a agir."
10070-260 = "É isso, vamos lá."
10070-380 = "Não se preocupe, basta resolver uma coisa de cada vez."
10070-390 = "Quando houver várias tarefas, comece pelas mais simples. É muito mais eficiente assim."
10070-400 = "Sempre estarei do seu lado, Professor."
10070-410 = "Isso deveria ser difícil até para alguém da Genryumon... Honestamente, estou surpresa, Professor."
10070-420 = "Conseguir realizar isso... como esperado do Professor. Eu não estava enganada sobre você."
10070-430 = "M-mas...! Esse nível de dificuldade é normal na Genryumon!"
