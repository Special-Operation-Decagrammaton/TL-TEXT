[translation]
10066-10 = "先生、急いでください！\nイベントですよ、\nイベント！"
10066-20 = "アリスなら、\nいつでもOKです！\n先生の準備は\n終わりましたか？"
10066-30 = "まだメイド克服レベルは\n高くないですが…"
10066-40 = "アリス、頑張ります！"
10066-50 = "先生、どこかで\nネル先輩を発見したら、\nすぐに教えてくださいね。"
10066-60 = "絶対ですよ？\nアリスとの約束です！"
10066-70 = "お料理、お掃除、お洗濯！\nどれもメイドの基本です！"
10066-80 = "先生もクエストに\n参加しますか？"
10066-90 = "そ、そんなに\n突っついても何も\nドロップしませんよ…？"
10066-100 = "アリスは\nモンスターでは\nありません！"
10066-110 = "絶対ですよ？\nアリスとの約束です！"
10066-120 = "お料理、お掃除、お洗濯！\nどれもメイドの基本です！"
10066-130 = "先生もクエストに\n参加しますか？"
10066-140 = "そ、そんなに\n突っついても何も\nドロップしませんよ…？"
10066-150 = "アリスは\nモンスターでは\nありません！"
10066-500 = "いらっしゃいませ、先生！"
10066-510 = "メイド勇者は\nお店番も出来ます！"
10066-520 = "交換アイテムの在庫は、\nたっぷりあります！"
10066-530 = "でも先生だったら全部\nゲット出来ちゃうかも\nしれません。"
10066-540 = "イベントは終了しましたが、\nまだ営業中です。"
10066-550 = "期間限定なので\n忘れないでください。\nアリスとの約束ですよ？"
10066-560 = "ようこそ、\nアリスの道具屋へ！"
10066-570 = "ここでは冒険に\n役立つアイテムや\nポーションが買えますよ！"
10066-580 = "ん…\n先生、スマイルですか？"
10066-590 = "分かりました。\nスマイルは0クレジットだと、\nモモイが言ってました！"
10066-600 = "パンパカパーン！\n先生がアイテムを購入しました！"
10066-610 = "プレミアムスマイルを\nおまけしておきます！"
10066-620 = "ほほう…お客さん、\nお目が高いですね。"
10066-630 = "こういう時に言うセリフです！\nアリス、覚えました！"
10066-640 = "旅人よ、\nそれが汝の選択か…？"
10066-650 = "先生、どうですか？このセリフ、\n言ってみたかったんです！"
10066-660 = "アイテム倉庫の管理も\nメイドのお仕事です！"
10066-670 = "アリス、\n今日も頑張ります！"
