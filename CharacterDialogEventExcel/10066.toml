[translation]
10066-10 = "Sensei, por favor, apresse-se!\nÉ um evento,\num evento!"
10066-20 = "A Alice está\npronta a qualquer momento!\nO Sensei já\nterminou os preparativos?"
10066-30 = "Meu nível de superação de empregada\nainda não é alto, mas..."
10066-40 = "Alice vai dar o seu melhor!"
10066-50 = "Sensei, se encontrar a\nNeru-senpai em algum lugar,\nme avise imediatamente."
10066-60 = "É uma promessa, hein?\nUma promessa com a Alice!"
10066-70 = "Cozinhar, limpar, lavar roupa!\nTudo isso é o básico de uma empregada!"
10066-80 = "O Sensei também vai\nparticipar da missão?"
10066-90 = "E-ei, mesmo que você\nme cutuque tanto assim,\nnão vou dropar nada...?"
10066-100 = "A Alice não é\num monstro!"
10066-110 = "É uma promessa, hein?\nUma promessa com a Alice!"
10066-120 = "Cozinhar, limpar, lavar roupa!\nTudo isso é o básico de uma empregada!"
10066-130 = "O Sensei também vai\nparticipar da missão?"
10066-140 = "E-ei, mesmo que você\nme cutuque tanto assim,\nnão vou dropar nada...?"
10066-150 = "A Alice não é\num monstro!"
10066-500 = "Bem-vindo, Sensei!"
10066-510 = "A empregada heroína\ntambém sabe cuidar da loja!"
10066-520 = "O estoque de itens de troca\nestá cheio!"
10066-530 = "Mas, sendo o Sensei,\ntalvez você consiga\npegar tudo."
10066-540 = "O evento terminou,\nmas ainda estamos abertos."
10066-550 = "É por tempo limitado, então\nnão se esqueça.\nÉ uma promessa com a Alice, entendeu?"
10066-560 = "Bem-vindo à\nloja de itens da Alice!"
10066-570 = "Aqui você pode comprar\nitens e poções úteis\npara a sua aventura!"
10066-580 = "Hum...\nSensei, um sorriso?"
10066-590 = "Entendi.\nA Momoi disse que\num sorriso custa 0 créditos!"
10066-600 = "Tan-tan-tan!\nO Sensei comprou um item!"
10066-610 = "Vou te dar um\nsorriso premium de brinde!"
10066-620 = "Ho ho... cliente,\nvocê tem bom gosto."
10066-630 = "É o que se diz nessas horas!\nA Alice aprendeu!"
10066-640 = "Viajante,\nessa é a sua escolha...?"
10066-650 = "Sensei, o que achou? Eu queria\nmuito dizer essa frase!"
10066-660 = "Gerenciar o estoque de itens\ntambém é trabalho de empregada!"
10066-670 = "A Alice vai\ndar o seu melhor hoje também!"
