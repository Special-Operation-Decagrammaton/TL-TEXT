[translation]
16009-280 = "あっ、先生殿！\n今こそ忍術研究部が\n活躍する時だよ！"
16009-290 = "さあ、ササっと鮮やかに\n解決しちゃおう！"
16009-300 = "うわぁ、何か\nすごい大騒ぎに\nなっちゃった……"
16009-310 = "せ、先生殿、\n大丈夫だよね？\n信じてるからね、ね！？"
16009-320 = "魑魅一座は暴れるわ、\n陰陽部から圧力が\nかかるわ、"
16009-330 = "ゲヘナの万魔殿は\nめんどうだわで……\nもう一体何なのさぁ……"
16009-340 = "……ひゃっ！？\nせ、先生殿！？\n今何した！？"
16009-350 = "きゅ、急に触られると\nびっくりするん\nだけど……！？"
16009-360 = "忍者とは、\n諦めないもの"
16009-370 = "最後まで走り抜け、\n何があっても任務を\n全うする……"
16009-380 = "私たち忍術研究部も\nそうなんだってこと、\n見せてあげる！"
16009-390 = "陰陽部の依頼を\n鮮やかに解決して、"
16009-400 = "今度こそ正式な\n部活として認めて\nもらうんだから！"
16009-430 = "あっ、先生殿！\n今こそ忍術研究部が\n活躍する時だよ！"
16009-440 = "さあ、ササっと鮮やかに\n解決しちゃおう！"
16009-450 = "うわぁ、何か\nすごい大騒ぎに\nなっちゃった……"
16009-460 = "せ、先生殿、\n大丈夫だよね？\n信じてるからね、ね！？"
16009-470 = "うっぎゃ、もうこんな\n時間……これ、\n間に合うのかな……？"
16009-480 = "ああもう、魑魅一座\nほんっとしつこい……！"
16009-490 = "私は最後まで\n諦めない……！\n忍術研究部の認可も！"
16009-500 = "「少女忍法帖ミチルっち」\nのチャンネル\n登録者100名も！"
16009-510 = "うえぇぇ……や、やっと\n終わった……？\nもう帰って良い？"
16009-520 = "ふあぁ……\n早く帰って、忍者の\n映画とか見たい……"
16009-530 = "何も考える\n必要の無い\nB級のやつ……"
16009-540 = "魑魅一座は暴れるわ、\n陰陽部から圧力が\nかかるわ、"
16009-550 = "ゲヘナの万魔殿は\nめんどうだわで……\nもう一体何なのさぁ……"
16009-560 = "……ひゃっ！？\nせ、先生殿！？\n今何した！？"
16009-570 = "きゅ、急に触られると\nびっくりするん\nだけど……！？"
16009-580 = "忍者とは、\n諦めないもの"
16009-590 = "最後まで走り抜け、\n何があっても任務を\n全うする……"
16009-600 = "私たち忍術研究部も\nそうなんだってこと、\n見せてあげる！"
