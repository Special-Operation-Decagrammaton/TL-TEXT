[translation]
16009-280 = "Ah, Sensei!
Agora é a hora do
Clube de Pesquisa de Ninjutsu brilhar!"
16009-290 = "Vamos lá, vamos resolver
isso de forma rápida e elegante!"
16009-300 = "Uau, acabou virando
uma confusão enorme..."
16009-310 = "Se-Sensei,
vai ficar tudo bem, né?
Eu acredito em você, viu!?"
16009-320 = "O Grupo Chimi está causando,
o Departamento Yin-Yang está
nos pressionando,"
16009-330 = "e o Pandemônio de Gehenna
é um saco...
O que está acontecendo afinal...?"
16009-340 = "...Hya!?
Se-Sensei!?
O que você fez agora!?"
16009-350 = "Me tocar de repente
assim me dá um susto,
sabia...!?"
16009-360 = "Um ninja
nunca desiste."
16009-370 = "Correr até o fim,
e não importa o que aconteça,
cumprir a missão..."
16009-380 = "Vou mostrar que nós,
do Clube de Pesquisa de Ninjutsu,
somos assim também!"
16009-390 = "Vamos resolver o pedido
do Departamento Yin-Yang com maestria,"
16009-400 = "e desta vez, eles finalmente
vão nos reconhecer como
um clube oficial!"
