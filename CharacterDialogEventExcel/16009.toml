[translation]
16009-280 = "Ah, Sensei!\nAgora é a hora do\nClube de Pesquisa de Ninjutsu brilhar!"
16009-290 = "Vamos lá, vamos resolver\nisso de forma rápida e elegante!"
16009-300 = "Uau, acabou virando\numa confusão enorme..."
16009-310 = "Se-Sensei,\nvai ficar tudo bem, né?\nEu acredito em você, viu!?"
16009-320 = "O Grupo Chimi está causando,\no Departamento Yin-Yang está\nnos pressionando,"
16009-330 = "e o Pandemônio de Gehenna\né um saco...\nO que está acontecendo afinal...?"
16009-340 = "...Hya!?\nSe-Sensei!?\nO que você fez agora!?"
16009-350 = "Me tocar de repente\nassim me dá um susto,\nsabia...!?"
16009-360 = "Um ninja\nnunca desiste."
16009-370 = "Correr até o fim,\ne não importa o que aconteça,\ncumprir a missão..."
16009-380 = "Vou mostrar que nós,\ndo Clube de Pesquisa de Ninjutsu,\nsomos assim também!"
16009-390 = "Vamos resolver o pedido\ndo Departamento Yin-Yang com maestria,"
16009-400 = "e desta vez, eles finalmente\nvão nos reconhecer como\num clube oficial!"
16009-430 = "Ah, Sensei!\nAgora é a hora do\nClube de Pesquisa de Ninjutsu brilhar!"
16009-440 = "Vamos lá, vamos resolver\nisso de forma rápida e elegante!"
16009-450 = "Uau, acabou virando\numa confusão enorme..."
16009-460 = "Se-Sensei,\nvai ficar tudo bem, né?\nEu acredito em você, viu!?"
16009-470 = "Ugh, já é essa hora...\nSerá que vamos conseguir\nchegar a tempo...?"
16009-480 = "Ah, chega, o Grupo Chimi\né tão persistente...!"
16009-490 = "Eu não vou desistir\naté o fim...! Nem da aprovação\ndo Clube de Pesquisa de Ninjutsu!"
16009-500 = "Nem de chegar a 100 inscritos\nno canal 'Diário Ninja da Michiru-cchi'!"
16009-510 = "Ueeeh... fi-finalmente\nacabou...?\nJá posso ir para casa?"
16009-520 = "Fuaah...\nQuero ir logo para casa\nassistir filmes de ninja..."
16009-530 = "Aqueles filmes classe B\nque não exigem\npensar em nada..."
16009-540 = "O Grupo Chimi está causando,\no Departamento Yin-Yang está\nnos pressionando,"
16009-550 = "e o Pandemônio de Gehenna\né um saco...\nO que está acontecendo afinal...?"
16009-560 = "...Hya!?\nSe-Sensei!?\nO que você fez agora!?"
16009-570 = "Me tocar de repente\nassim me dá um susto,\nsabia...!?"
16009-580 = "Um ninja\nnunca desiste."
16009-590 = "Correr até o fim,\ne não importa o que aconteça,\ncumprir a missão..."
16009-600 = "Vou mostrar que nós,\ndo Clube de Pesquisa de Ninjutsu,\nsomos assim também!"
16009-610 = "Vamos resolver o pedido\ndo Departamento Yin-Yang com maestria,"
16009-620 = "e desta vez, eles finalmente\nvão nos reconhecer como\num clube oficial!"
