[translation]
10134-1550 = "Sensei!
É uma missão, uma missão!"
10134-1560 = "Qual será a missão
de hoje?"
10134-1570 = "Ah, a organização era
responsabilidade da Alice, não é..."
10134-1580 = "Desculpe incomodar pela comunicação!
Sensei! É a Alice!"
10134-1590 = "A situação ficou
complicada, mas..."
10134-1600 = "Vamos superar isso
juntos!"
10134-1610 = "Heh, heh, heh..."
10134-1620 = "O que achou, Sensei,
da nova armadura da Alice!"
10134-1630 = "Mesmo sem a armadura..."
10134-1640 = "Mesmo que eu perca
a espada de luz..."
10134-1650 = "Ainda assim,
a Alice continua sendo a Alice."
10134-1660 = "Se todos estiverem aqui...
E também."
10134-1670 = "Se o Sensei estiver aqui!"
10134-1680 = "Malkuth..."
10134-1690 = "Tem uma cara
de chefe final mesmo!"
10134-1700 = "Se a derrotarmos...
Não vai aparecer um chefe secreto
depois, vai...?"
10134-1710 = "Se conseguirmos voltar em segurança..."
10134-1720 = "Quero apresentar a Kei
para todo mundo!"
10134-1730 = "Ta-da!"
10134-1740 = "O Sensei obteve uma recompensa!"
10134-1750 = "Incrível, Sensei!"
10134-1760 = "Vamos continuar avançando
passo a passo!"
10134-1770 = "Uuu... A Alice também quer estar ao lado do Sensei
para comemorar!"
10134-1780 = "Sim! A Alice adora o Sensei,
que nunca muda!"
