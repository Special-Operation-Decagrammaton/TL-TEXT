[translation]
10134-1550 = "Sensei!\nÉ uma missão, uma missão!"
10134-1560 = "Qual será a missão\nde hoje?"
10134-1570 = "Ah, a organização era\nresponsabilidade da Alice, não é..."
10134-1580 = "Desculpe incomodar pela comunicação!\nSensei! É a Alice!"
10134-1590 = "A situação ficou\ncomplicada, mas..."
10134-1600 = "Vamos superar isso\njuntos!"
10134-1610 = "Heh, heh, heh..."
10134-1620 = "O que achou, Sensei,\nda nova armadura da Alice!"
10134-1630 = "Mesmo sem a armadura..."
10134-1640 = "Mesmo que eu perca\na espada de luz..."
10134-1650 = "Ainda assim,\na Alice continua sendo a Alice."
10134-1660 = "Se todos estiverem aqui...\nE também."
10134-1670 = "Se o Sensei estiver aqui!"
10134-1680 = "Malkuth..."
10134-1690 = "Tem uma cara\nde chefe final mesmo!"
10134-1700 = "Se a derrotarmos...\nNão vai aparecer um chefe secreto\ndepois, vai...?"
10134-1710 = "Se conseguirmos voltar em segurança..."
10134-1720 = "Quero apresentar a Kei\npara todo mundo!"
10134-1730 = "Ta-da!"
10134-1740 = "O Sensei obteve uma recompensa!"
10134-1750 = "Incrível, Sensei!"
10134-1760 = "Vamos continuar avançando\npasso a passo!"
10134-1770 = "Uuu... A Alice também quer estar ao lado do Sensei\npara comemorar!"
10134-1780 = "Sim! A Alice adora o Sensei,\nque nunca muda!"
