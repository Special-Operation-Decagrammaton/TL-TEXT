[translation]
20057-980 = "Estávamos à sua espera,\nSensei."
20057-990 = "Deixe a orientação de Millennium\npor minha conta."
20057-1000 = "Se houver algum lugar que queira ir,\nnão hesite em me dizer."
20057-1010 = "Costuma ser movimentado por aqui, mas..."
20057-1020 = "Millennium está especialmente\nagitada hoje."
20057-1030 = "É bom ver tanta energia,\nembora..."
20057-1040 = "Estamos chegando à reta final, não é?"
20057-1050 = "Tanto a EXPO,\nquanto os incidentes problemáticos."
20057-1060 = "Você conseguiu aproveitar\na Millennium EXPO?"
20057-1070 = "Para mim, foi uma honra\npoder acompanhá-lo, Sensei."
20057-1080 = "……Sim, muito."
20057-1090 = "Poder passar este tempo\ncom o Sensei……"
20057-1100 = "Eu fico realmente\nmuito feliz com isso."
20057-1110 = "Se sentir fome,\npor favor, me avise."
20057-1120 = "Conheço um refeitório\nque recomendo."
20057-1130 = "Se eu estivesse como maid,\neu mesma prepararia algo para você, mas……"
20057-1140 = "Agora,\nsou apenas uma aluna"
20057-1150 = "Chamou por mim, Sensei?"
20057-1160 = "Só chamou por chamar,\né……?"
20057-1170 = "Ufufu,\nora, ora."
20057-1180 = "Fufu."
20057-1190 = "Eu sou bem resistente\na cócegas."
20057-1200 = "E você, Sensei……\npoderia me dizer\ncomo é?"
