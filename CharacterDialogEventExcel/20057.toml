[translation]
20057-980 = "お待ちしておりました、\n先生。"
20057-990 = "ミレニアムの案内は\nお任せください。"
20057-1000 = "行きたい場所があれば、\n遠慮なく\n仰ってくださいね。"
20057-1010 = "普段から賑やかですが、"
20057-1020 = "今日のミレニアムは\n一入ですね。"
20057-1030 = "活気があるのは、\n良いことですが。"
20057-1040 = "いよいよ大詰めですね。"
20057-1050 = "EXPOも、\n人騒がせな事件も。"
20057-1060 = "ミレニアムEXPO、\nお楽しみ\nいただけましたか？"
20057-1070 = "私は先生とご一緒できて\n光栄でした。"
20057-1080 = "……ええ、とても。"
20057-1090 = "こうして先生と\n時間を過ごせること……。"
20057-1100 = "私は、それが\n本当に嬉しいのです。"
20057-1110 = "お腹が空いたら\n仰ってくださいね。"
20057-1120 = "オススメの学食が\nあるんです。"
20057-1130 = "「メイド」の私であれば\n手料理をご用意する\nところですが……。"
20057-1140 = "今は、\n「生徒」ですから。"
20057-1150 = "お呼びでしょうか、先生？"
20057-1160 = "呼んだだけ、ですか……？"
20057-1170 = "うふふっ、\nあらあら。"
20057-1180 = "ふふっ。"
20057-1190 = "私、くすぐりには\n強い方でして。"
20057-1200 = "先生は……\nどうなのか\n教えていただけますか？"
