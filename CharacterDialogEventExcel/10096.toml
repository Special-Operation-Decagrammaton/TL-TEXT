[translation]
10096-10 = "Professor.\nEstava à sua espera.\nJá fez o aquecimento?"
10096-20 = "Por favor, divirta-se\nno parque aquático."
10096-30 = "Está se divertindo\nna piscina?"
10096-40 = "Como sempre digo,\na segurança vem em primeiro lugar."
10096-50 = "……Eu só consegui chegar até aqui\ngraças a você,\nProfessor."
10096-60 = "Vamos dar o nosso melhor até o fim."
10096-70 = "Sinto como se um peso tivesse saído dos meus ombros,\nmas, ao mesmo tempo,\nsinto um pouco de tristeza."
10096-80 = "E você, Professor?"
10096-90 = "Eu entendo que é necessário\nusar roupa de banho, mas……\nainda não estou acostumada."
10096-100 = "Um parque aquático……\nNunca pensei que teria\nalguma relação com isso……"
10096-110 = "Nunca é bom\nexcesso de confiança."
10096-120 = "Se encontrar alguém precisando de socorro,\navise-me imediatamente."
10096-130 = "B-bem-vindo!\nSinta-se à vontade!"
10096-140 = "Ehem…… como eu disse, ainda não estou\nmuito acostumada com isso."
10096-380 = "Esta é a loja especial.\nSe precisar de algo, sinta-se à vontade para comprar."
10096-390 = "Uma recomendação……?\nNão tenho certeza.\nConfio no seu bom gosto, Professor."
10096-400 = "O expediente terminou, mas\no parque parece continuar funcionando."
10096-410 = "Por favor, aproveite até o fim."
10096-420 = "Sim, está procurando por algo?"
10096-430 = "……Professor,\npor favor, olhe para os produtos, não para mim."
10096-440 = "Ah, esse é um item que também me deixou curiosa."
10096-450 = "Obrigada pela compra.\nEspero que seja útil\npara você, Professor."
10096-460 = "Escolher isso mostra que você tem um bom olho.\nComo esperado do Professor."
10096-470 = "N-não precisa me dar um presente.\nAinda estou em horário de trabalho……"
