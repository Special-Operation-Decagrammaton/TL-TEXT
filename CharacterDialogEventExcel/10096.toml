[translation]
10096-10 = "先生。\nお待ちしておりました。\n準備運動はしましたか？"
10096-20 = "ウォーターパークで\n楽しい時間を\nお過ごしください。"
10096-30 = "プールは\n楽しんでいますか？"
10096-40 = "いつも伝えておりますが、\n安全第一ですよ。"
10096-50 = "……私がここまで\n来れたのも、すべて\n先生のおかげです。"
10096-60 = "最後まで頑張りましょう。"
10096-70 = "肩の荷が降りたような、\nでも、どこか寂しいような\n気分です。"
10096-80 = "先生はどうですか？"
10096-90 = "水着でなければなら\nないのは分かりますが……\nあまり慣れませんね。"
10096-100 = "ウォーターパークか……\n縁がないと\n思っていたけど……"
10096-110 = "何事も過信は\nよくありません。"
10096-120 = "要救助者を見つけたら\nすぐに知らせてください。"
10096-130 = "い、いらっしゃいませ！\nようこそ！"
10096-140 = "こほん……やはり、\nあまり慣れませんね。"
10096-380 = "こちらは特別ショップです。\n必要なものがあれば購入していってください。"
10096-390 = "おすすめ……ですか。\nよくわかりません。\n先生の審美眼を信じております。"
10096-400 = "営業は終了しましたが、\nパークはまだ運営しているようです。"
10096-410 = "最後までお楽しみください。"
10096-420 = "はい、何かお探しですか？"
10096-430 = "……先生、\n私ではなく商品を見てください。"
10096-440 = "ああ、それは私も気になっていた商品です。"
10096-450 = "ご購入ありがとうございます。\n先生のお役に\n立つといいですね。"
10096-460 = "それを選ぶとは、\n見る目がありますね。\nさすが先生です。"
10096-470 = "わ、私へのプレゼントはいりません。\nまだ業務中ですから……。"
