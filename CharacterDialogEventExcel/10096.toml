[translation]
10096-10 = "Sensei.\nEu estava esperando por você.\nJá fez o seu aquecimento?"
10096-20 = "Espero que o senhor se divirta\nbastante no parque aquático."
10096-30 = "Está aproveitando\na piscina?"
10096-40 = "Como eu sempre digo,\nsegurança em primeiro lugar."
10096-50 = "……Se eu consegui chegar\naté aqui, é tudo\ngraças ao senhor, Sensei."
10096-60 = "Vamos dar o nosso melhor até o fim."
10096-70 = "Sinto como se um peso tivesse saído das minhas costas,\nmas, ao mesmo tempo, me sinto um pouco solitária."
10096-80 = "E quanto ao senhor, Sensei?"
10096-90 = "Eu entendo que é obrigatório\nusar maiô, mas……\neu não consigo me acostumar muito com isso."
10096-100 = "Um parque aquático……\nEu achava que não tinha\nnada a ver comigo, mas……"
10096-110 = "Excesso de confiança\nnunca é bom em nada."
10096-120 = "Se encontrar alguém precisando de resgate\nme avise imediatamente."
10096-130 = "B-Bem-vindo!\nSeja bem-vindo!"
10096-140 = "Ahem…… Como eu imaginava,\nnão tenho muito costume com isso."
10096-380 = "Esta é a loja especial.\nSe houver algo de que precise, fique à vontade para comprar."
10096-390 = "Uma recomendação……? Eu não sei muito bem.\nConfio no bom gosto estético do Sensei."
10096-400 = "O nosso expediente terminou, mas\nparece que o parque ainda está funcionando."
10096-410 = "Por favor, aproveite até o fim."
10096-420 = "Sim, está procurando alguma coisa?"
10096-430 = "……Sensei,\nolhe para os produtos, não para mim."
10096-440 = "Ah, esse é um produto que também me chamou a atenção."
10096-450 = "Obrigada pela sua compra.\nEspero que seja útil\npara o senhor, Sensei."
10096-460 = "O senhor tem bom gosto\npara escolher isso.\nComo esperado do Sensei."
10096-470 = "N-Não preciso de presentes para mim.\nAinda estou em horário de expediente, então……"