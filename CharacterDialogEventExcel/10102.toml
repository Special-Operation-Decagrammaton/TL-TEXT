[translation]
10102-220 = "Hehe, there are so many\npeople having fun\nall over the place..."
10102-230 = "The beach... the festival..."
10102-240 = "Perhaps this might be\nthe peak of my life..."
10102-250 = "Eek? I-is there\nsome work you need me to do?"
10102-260 = "You just called me...?\nWhy...?"
10102-270 = "Ah, Atsuko-chan and\nMisaki-san look very good\nin their swimsuits..."
10102-280 = "Huh? I look good too?\nThank you very much..."
10102-290 = "I picked up some seaweed\nthat washed up on the shore..."
10102-300 = "This isn't something\nyou can eat, is it...?"
10102-310 = "The beach and the festival\nare fun, but..."
10102-320 = "I suppose that just makes it\nall the more painful when\nwe return to our daily lives..."