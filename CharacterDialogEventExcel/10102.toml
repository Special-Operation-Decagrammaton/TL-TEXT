[translation]
10102-340 = "Hehe, tem tantas pessoas\nse divertindo por todos os lados..."
10102-350 = "O mar... o festival..."
10102-360 = "Talvez este seja o auge\nda minha vida..."
10102-370 = "São tantas experiências novas\nem vários sentidos..."
10102-380 = "Festivais na praia são\nsempre assim...?"
10102-390 = "Bem, preciso aproveitar\naté o fim,"
10102-400 = "senão vou ficar com tanta pena\nque nem vou conseguir\ndormir...!"
10102-410 = "Acabou... \nRealmente acabou..."
10102-420 = "Acho que um dia como este\nnão virá mais na minha vida..."
10102-430 = "Eh? Você vai me trazer\npara o mar de novo?"
10102-440 = "Hehe,\nobrigada."
10102-450 = "Então, da próxima vez,\nquem sabe um hotel resort..."
10102-460 = "Hie? A-algum trabalho\npara eu fazer?"
10102-470 = "Só me chamou por chamar...? \nPor quê...?"
10102-480 = "Ah, a Atsuko-chan e\na Misaki-san ficam muito bem\nde roupa de banho..."
10102-490 = "Eh? Eu também fico bem?\nObrigada..."
10102-500 = "Eu peguei uma alga que\nestava na beira do mar..."
10102-510 = "Isso aqui não dá\npara comer, né...?"
10102-520 = "O mar e o festival\nsão divertidos, mas..."
10102-530 = "Sempre que algo acaba,\nvoltar para a rotina\né doloroso, não é..."
10102-540 = "Hehe, vendem muitas coisas\npor aqui."
10102-550 = "Se você for comprar para mim,\neu não vou recusar, hehe."
10102-560 = "Tantas coisas que parecem boas..."
10102-570 = "A loja\nacabou de fechar."
10102-580 = "Eu não comprei nada, mas\nfoi divertido só de olhar..."
10102-590 = "E-eu não sei muito bem\no que é bom..."
10102-600 = "Acho melhor que o Sensei\nescolha..."
10102-610 = "H-hieee!?"
10102-620 = "E-eu não sabia que\ntinha algo assim...!"
10102-630 = "Comprar algo caro tão facilmente...\nOs adultos são incríveis..."
10102-640 = "Por acaso isso é\num presente para mim...?"
10102-650 = "Se for, muito obrigada.\nHehe..."
10102-660 = "Ah, eu também estava\nde olho nisso. Hehe."
