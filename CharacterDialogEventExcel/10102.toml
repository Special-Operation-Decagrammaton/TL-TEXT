[translation]
10102-220 = "えへへ、あちこち、\n楽しそうな人が\nたくさんいますね…。"
10102-230 = "海…お祭り…"
10102-240 = "もしかしたら今が\n私の人生の最高潮かも\nしれません…"
10102-250 = "ひえっ？な、\n何か任せる仕事でも？"
10102-260 = "ただ呼んだだけ…？\nなんで…？"
10102-270 = "あ、アツコちゃんや\nミサキさんは水着が\nよく似合ってますね…。"
10102-280 = "え？私も似合ってる？\nありがとうございます……"
10102-290 = "海辺に流れ着いた\n海藻を拾いましたけど…。"
10102-300 = "これって\n食べられないですよね…？"
10102-310 = "海もお祭りも\n楽しいですが…。"
10102-320 = "やっぱりその分、\n日常に戻ったときに\n苦しいですよね…"
10102-340 = "えへへ、あちこち、\n楽しそうな人が\nたくさんいますね…。"
10102-350 = "海…お祭り…"
10102-360 = "もしかしたら今が\n私の人生の最高潮かも\nしれません…"
10102-370 = "いろんな意味で初めて\n経験することばかりです…"
10102-380 = "海のお祭りって\n元々こういう\nものなんですか…？"
10102-390 = "さ、最後まで\n楽しんでおかないと、"
10102-400 = "もったいなくて\n眠れないかも\nしれませんよ…！"
10102-410 = "終わりました…\n終わってしまいましたね…"
10102-420 = "もう私の人生にこんな日は\nこないでしょうね…。"
10102-430 = "え？また海に連れてきて\nくださるんですか？"
10102-440 = "えへへ、\nありがとうございます。"
10102-450 = "じゃあ次は\nリゾートホテルとかに…。"
10102-460 = "ひえっ？な、\n何か任せる仕事でも？"
10102-470 = "ただ呼んだだけ…？\nなんで…？"
10102-480 = "あ、アツコちゃんや\nミサキさんは水着が\nよく似合ってますね…。"
10102-490 = "え？私も似合ってる？\nありがとうございます……"
10102-500 = "海辺に流れ着いた\n海藻を拾いましたけど…。"
10102-510 = "これって\n食べられないですよね…？"
10102-520 = "海もお祭りも\n楽しいですが…。"
10102-530 = "やっぱりその分、\n日常に戻ったときに\n苦しいですよね…"
10102-540 = "えへへ、ここはいろいろ\n売ってますね。"
10102-550 = "買っていただけるなら\n断りはしません、えヘヘ。"
10102-560 = "良さそうなものがいっぱい…"
10102-570 = "ショップが\n終わってしまいましたね。"
10102-580 = "私は買えませんでしたが、\n見ているのは楽しかったです…。"
10102-590 = "わ、私は何がいいものなのか\nよくわからないので…"
10102-600 = "先生が選んだほうがいいと\n思いますけど…。"
10102-610 = "ひ、ひええっ！？"
10102-620 = "そ、そんなものも\nあったんですね…！"
10102-630 = "高いものをそんな簡単に…\n大人ってすごいですね…"
10102-640 = "もしかして私への\nプレゼントですか……？"
10102-650 = "もしそうでしたら、\nありがとうございます。えヘヘ…"
10102-660 = "あ、それ、私も目を\nつけていたものです。えへへ。"
