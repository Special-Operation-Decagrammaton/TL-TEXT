[translation]
10077-80 = "ようこそ！こっちは\n準備万端っすよ！"
10077-90 = "さて、ぼちぼち\n始めるっす！"
10077-100 = "はい、私はここっすよ。"
10077-110 = "ん……？\nさっきから\nどうしたんすか？"
10077-120 = "そんなイタズラ、\nよくないっすよ～\nひひっ。"
10077-130 = "はは、先生、そんな\n何度も呼ばなくても。\n私はここで\n常時待機してるっすよ。"
10077-140 = "さて、ぼちぼち\n始めるっす！"
10077-150 = "これであと半分、\nっすかね？"
10077-160 = "あと少しっすね。\n手伝えるものがあれば、\nなんでも\n言ってほしいっす！"
10077-170 = "じゃ、さーっと\n見てみるっす！"
10077-180 = "はい、私はここっすよ。"
10077-190 = "ん……？\nさっきから\nどうしたんすか？"
10077-200 = "そんなイタズラ、\nよくないっすよ～\nひひっ。"
10077-210 = "はは、先生、そんな\n何度も呼ばなくても。\n私はここで\n常時待機してるっすよ。"
10077-310 = "はっ！先生！\nちょうどいいところに！"
10077-320 = "リストのチェックっすね？\nこっちに用意してありますんで！"
10077-330 = "おっと！なんすか、先生。\n同じこと、やり返しちゃっても\nいいんすか？"
10077-340 = "……今度、\n覚悟しておくっすよ！"
10077-350 = "はい！確認完了っす～！"
10077-360 = "それっすか？\n押さえておくっす！"
10077-370 = "今日はこれで終わりっと！\nははっ！先生、この後は\n何するんすか？"
