[translation]
20052-10 = "Sem risco, não há\nretorno."
20052-20 = "Bem, vamos\ncomeçar os negócios?"
20052-30 = "Agora é a hora de\nmostrar a vocês."
20052-40 = "A habilidade do meu departamento editorial,\nque sobreviveu à terra estéril\nde Red Winter!"
20052-50 = "......Mais do que habilidade,"
20052-60 = "talvez o termo \"capacidade de sobrevivência\"\nseja mais adequado."
20052-70 = "Está vindo...\nA maré está a nosso favor!"
20052-80 = "Como chefe do departamento editorial,\nvou fazer isso dar certo\nde qualquer jeito!"
20052-90 = "Por que\nchegamos a isso..."
20052-100 = "Bem... sinto que consigo\nidentificar a causa, mas..."
20052-110 = "Ainda não podemos\ndesistir...!"
20052-120 = "Nossa, por um momento\neu pensei que..."
20052-130 = "Que bom que deu certo... espera, uma\nreunião de avaliação, agora?"
20052-140 = "Bem... isso não pode\nficar para depois...?"
20052-150 = "Os criadores..."
20052-160 = "Embora tenham o poder\nde criar algo,"
20052-170 = "quando se trata de\ndivulgar isso —"
20052-180 = "muitas vezes não demonstram\ninteresse, sabe..."
20052-190 = "Livros...\nTextos são algo precioso."
20052-200 = "Eles extraem o máximo de\nresultado com o mínimo\nde insumo —"
20052-210 = "são produtos que escondem\n\"possibilidades\" dentro de si...!"
20052-220 = "Ser capaz de criar algo\ndo zero é uma coisa\nmaravilhosa."
20052-230 = "E o talento que torna\nisso possível também."
20052-240 = "......"
20052-250 = "É bom, não é?\nEsse tipo de talento."
20052-260 = "Do fundo do meu coração...\nEu realmente penso assim."
20052-270 = "Sou muito grata às alunas\nde Trinity, de verdade."
20052-280 = "......Não me olhe\ncom essa cara."
20052-290 = "Estou dizendo isso\ncom toda a sinceridade."
20052-620 = "Qual você acha que é a base\ndos negócios? Bens...?\nTrocas...?"
20052-630 = "Claro que é\ndinheiro, não é?"
20052-640 = "Que bom que você\nveio!"
20052-650 = "Bem-vindo ao local onde\nfundos e produtos se cruzam!"
20052-660 = "Mufufu, então, fique\nà vontade."
20052-670 = "Às vezes, tesouros ficam\nescondidos no fundo das prateleiras."
20052-680 = "Dê uma boa olhada até o fim,\nSensei."
20052-690 = "Ah, claro, não tem problema\nse quiser me observar também."
20052-700 = "Não adianta falar comigo,\nos preços nunca vão\ndiminuir, viu?"
20052-710 = "Até que um desconto seja decidido,\nmuitas negociações e..."
20052-720 = "......acordos políticos\nacontecem nos bastidores."
20052-730 = "Eu nunca imaginei que chegaria o dia\nem que faria negócios\ncom o Sensei."
20052-740 = "Nossa, viver bastante\nrealmente compensa."
20052-750 = "Oh! Você tem um ótimo\nolho, Sensei!"
20052-760 = "Sendo assim, que tal\nlevar isto também?"
20052-770 = "Isso é só entre nós, mas..."
20052-780 = "O momento em que vejo o produto final\ncom meus próprios olhos... é quando\neu fico mais empolgada...!"
20052-790 = "Entendeu, Sensei? Cultura\né dinheiro."
20052-800 = "Ou seja, o ato de\ncomprar é —"
20052-810 = "uma atividade cultural,\npoderíamos dizer."
20052-820 = "Eu garanto a\nqualidade, viu?"
