[translation]
20016-140 = "Francamente,
os problemas estão se acumulando."
20016-150 = "Ah... eu não aguento
mais isso..."
20016-160 = "A reunião de intercâmbio,
acabou virando uma
bagunça total, não é?"
20016-170 = "Ah... eu gostaria que pensassem
um pouco em quem tem que
limpar a bagunça depois."
20016-180 = "Por que eu tenho que vir até um
distrito alheio para limpar
a sujeira dos outros..."
20016-190 = "Esse é o lado difícil
de ser um gerente
de nível médio."
20016-210 = "Francamente,
