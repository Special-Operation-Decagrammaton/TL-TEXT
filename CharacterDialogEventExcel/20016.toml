[translation]
20016-140 = "Francamente,\nos problemas estão se acumulando."
20016-150 = "Ah... eu não aguento\nmais isso..."
20016-160 = "A reunião de intercâmbio,\nacabou virando uma\nbagunça total, não é?"
20016-170 = "Ah... eu gostaria que pensassem\num pouco em quem tem que\nlimpar a bagunça depois."
20016-180 = "Por que eu tenho que vir até um\ndistrito alheio para limpar\na sujeira dos outros..."
20016-190 = "Esse é o lado difícil\nde ser um gerente\nde nível médio."
20016-210 = "Francamente,\nos problemas estão se acumulando."
20016-220 = "Ah... eu não aguento\nmais isso..."
20016-230 = "Já faz um bom tempo,\nserá que vamos conseguir\nterminar a tempo?"
20016-240 = "Está quase na hora de finalizar...\nNão baixe a guarda\naté o fim."
20016-250 = "Eu detesto problemas."
20016-260 = "Parece que as coisas se acalmaram.\nBom trabalho,\nSensei."
20016-270 = "A reunião de intercâmbio,\nacabou virando uma\nbagunça total, não é?"
20016-280 = "Ah... eu gostaria que pensassem\num pouco em quem tem que\nlimpar a bagunça depois."
20016-290 = "Por que eu tenho que vir até um\ndistrito alheio para limpar\na sujeira dos outros..."
20016-300 = "Esse é o lado difícil\nde ser um gerente\nde nível médio."
20016-850 = "Estas são as coisas\nque precisamos\nresolver, certo?"
20016-860 = "Por favor, verifique\na lista.\nSensei."
20016-870 = "É um incômodo, mas...\né por isso que é bom\nter você aqui, Sensei."
20016-880 = "Que preguuiça..."
20016-890 = "Ufa... caso encerrado,\neu suponho."
20016-900 = "Você resolveu?\nBom trabalho."
