[translation]
10142-810 = "先生、私たちの活躍を\n見届けてくれる？"
10142-820 = "ふふっ、\n今まで封じてた力、\n見せてあげる。"
10142-830 = "まだ余裕はあるけど、\n気を抜かずにいこう。"
10142-840 = "ラストスパートだね。"
10142-850 = "みんな、頑張ろう。"
10142-860 = "先生、\n最後までありがとう。"
10142-870 = "次も一緒に楽しもうね。"
10142-880 = "お祭り、\n大盛り上がりだね。"
10142-890 = "こっちまで\n熱くなってくる。"
10142-900 = "日差しが強い……\nちゃんと紫外線対策\nしないと。"
10142-910 = "日焼けって\n火傷なんだって。"
10142-920 = "私が……気になるの？"
10142-930 = "ごめんなさい。\n目立ってしまって。"
10142-940 = "お祭りで食べる\n焼き鳥って、\n特別な感じがする。"
10142-950 = "先生もそう思わない？"
