[translation]
10142-810 = "Sensei, você vai observar\nnossas conquistas?"
10142-820 = "Fufu,\nvou te mostrar o poder\nque estive selando."
10142-830 = "Ainda temos alguma margem,\nmas não vamos baixar a guarda."
10142-840 = "É a reta final, não é?"
10142-850 = "Pessoal, vamos dar o nosso melhor."
10142-860 = "Sensei,\nobrigada por ficar até o fim."
10142-870 = "Vamos nos divertir juntos da próxima vez também."
10142-880 = "O festival,\nestá bem animado, né."
10142-890 = "Até eu\nestou ficando empolgada."
10142-900 = "O sol está forte...\nprecisamos nos proteger direito\ndos raios UV."
10142-910 = "Dizem que queimadura de sol\né um tipo de queimadura de verdade."
10142-920 = "Você está... interessado em mim?"
10142-930 = "Me desculpe.\nPor chamar tanta atenção."
10142-940 = "Comer yakitori\nno festival,\ntraz um sentimento especial."
10142-950 = "Sensei não acha o mesmo?"