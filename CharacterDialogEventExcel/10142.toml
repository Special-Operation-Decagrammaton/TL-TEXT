[translation]
10142-810 = "Сенсей, ты посмотришь\nна наше выступление?"
10142-820 = "Хе-хе, я покажу тебе\nсилу, которую до сих пор\nдержала запечатанной."
10142-830 = "У нас ещё остались силы,\nно давай не терять концентрацию."
10142-840 = "Это финальный рывок."
10142-850 = "Давайте все выложимся на полную."
10142-860 = "Сенсей,\nспасибо, что оставался с нами\nдо самого конца."
10142-870 = "Давай в следующий раз\nтоже повеселимся вместе."
10142-880 = "Фестиваль\nвыдался по-настоящему жарким."
10142-890 = "Это и меня\nначинает волновать."
10142-900 = "Солнце такое сильное...\nМне нужно обязательно\nнамазаться солнцезащитным кремом."
10142-910 = "Я слышала, что солнечный загар —\nэто на самом деле ожог."
10142-920 = "Ты... интересуешься мной?"
10142-930 = "Прости.\nВ итоге я слишком сильно выделялась."
10142-940 = "Якитори, съеденные на фестивале,\nкажутся какими-то особенными."
10142-950 = "Ты так не думаешь, Сенсей?"