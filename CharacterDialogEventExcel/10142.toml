[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10142-810 = "Sensei, você vai acompanhar\no nosso desempenho?" 
10142-820 = "Fufu,\nvou te mostrar o poder\nque eu mantinha selado até agora." 
10142-830 = "Ainda temos uma folga,\nmas não vamos baixar a guarda." 
10142-840 = "É a reta final, não é." 
10142-850 = "Pessoal, vamos dar o nosso melhor." 
10142-860 = "Sensei,\nobrigada por ficar até o final." 
10142-870 = "Vamos nos divertir juntos\nna próxima vez também." 
10142-880 = "O festival\nestá bem animado, né." 
10142-890 = "Até eu estou\ncomeçando a ficar empolgada." 
10142-900 = "O sol está forte...\nprecisamos nos proteger\ndos raios UV direitinho." 
10142-910 = "Dizem que queimadura de sol\né um tipo de queimadura mesmo." 
10142-920 = "Você está... curioso sobre mim?" 
10142-930 = "Me desculpe.\nAcabei chamando muita atenção." 
10142-940 = "O yakitori que a gente\ncome nos festivais\ntem um gostinho todo especial." 
10142-950 = "Você não acha, Sensei?" 