[translation]
20025-740 = "せ、せせせ、先生！？\nお、おかえりなさい！\nそして、す、すみません！"
20025-750 = "……へへ……\nここで先生に\n会えるなんて……"
20025-760 = "い、いいえ！なにか\n特別な意味が\nあるとかではなく……！"
20025-830 = "は、はいっ！？\nど、どどど、\nどうしましたか、先生！？"
20025-840 = "へ……？ただ……\n呼んでみただけ？"
20025-850 = "そ、そうなんですね。\nえ、へへ……。"
20025-860 = "新年を迎えて……\n便利屋のみんなと……\n先生とこうして……"
20025-870 = "えへへ……\n少し、特別な、\n気持ちです。"
20025-880 = "先生。やはり、わ、\n私なんかといても……\nそんな楽しく……"
20025-890 = "そんなことない\n……ですか？\nそう、ですか……。"
20025-900 = "……あ、ありがとう、\nございます。先生。"
20025-1250 = "せ、せせせ、先生！？\nお、おかえりなさい！\nそして、す、すみません！"
20025-1260 = "……へへ……\nここで先生に\n会えるなんて……"
20025-1270 = "い、いいえ！なにか\n特別な意味が\nあるとかではなく……！"
20025-1280 = "よくわからないですが……\nとんでもないことになって\nしまったみたいです……"
20025-1290 = "ぜ、全部\n壊しちゃいましょうか？"
20025-1300 = "アル様は……\n楽しんでるみたいです……"
20025-1310 = "よかったです。\nへ、へへ……"
20025-1320 = "やっと騒動が\n落ち着いたみたいです……"
20025-1330 = "えっと、あの\nロボットは……何だったん\nでしょうか……？"
20025-1340 = "は、はいっ！？\nど、どどど、\nどうしましたか、先生！？"
20025-1350 = "へ……？ただ……\n呼んでみただけ？"
20025-1360 = "そ、そうなんですね。\nえ、へへ……。"
20025-1370 = "新年を迎えて……\n便利屋のみんなと……\n先生とこうして……"
20025-1380 = "えへへ……\n少し、特別な、\n気持ちです。"
20025-1390 = "先生。やはり、わ、\n私なんかといても……\nそんな楽しく……"
20025-1400 = "そんなことない\n……ですか？\nそう、ですか……。"
20025-1410 = "……あ、ありがとう、\nございます。先生。"
