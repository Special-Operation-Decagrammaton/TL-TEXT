[translation]
20025-740 = "P-p-p-Sensei!?\nB-bem-vindo de volta!\nE, d-desculpe!"
20025-750 = "……Hehe……\nNunca imaginei que encontraria\no Sensei aqui……"
20025-760 = "N-não! Não é como se houvesse\nalgum significado especial\npor trás disso……!"
20025-830 = "S-sim!?\nO-o-o-o que houve,\nSensei!?"
20025-840 = "Hã……? Só……\nme chamou?"
20025-850 = "Ah, entendo.\nHehe……"
20025-860 = "Receber o ano novo……\ncom o pessoal da Loja de Conveniência……\ne com o Sensei assim……"
20025-870 = "Ehehe……\nÉ um sentimento\num pouco especial."
20025-880 = "Sensei. Sinceramente, ficar\ncom alguém como eu……\nnão deve ser tão divertido……"
20025-890 = "Não é……\nassim? É mesmo……?"
20025-900 = "……M-muito obrigada,\nSensei."
