[translation]
20049-860 = "Ah, você veio.\nAh... bem,\nestou me divertindo o quanto dá."
20049-870 = "Então o mar é\num lugar\nassim..."
20049-880 = "Haa...\nQueria passar um tempo em silêncio."
20049-890 = "Dê um jeito nisso, Sensei."
20049-900 = "O que é essa multidão...\nNão parece haver perigo, mas..."
20049-910 = "Já acabou...\n...Sim, com certeza\nnão foi ruim.\nEu admito. Só desta vez."
20049-920 = "O quê?"
20049-930 = "Não importa o que o Sensei diga,\neu não pretendo me divertir."
20049-940 = "(...Talvez esteja\nmais refrescante que o normal)"
20049-950 = "Q-o quê?\nPor que você me cutucou?\nEu não sou\num bicho de pelúcia...!"
20049-960 = "...Está entediado?\nPor que não vai\nver o palco?"
20049-970 = "Eu? Não tenho interesse, mas...\nBem, se o Sensei\nquiser ir."
20049-980 = "Eu te acompanho."
