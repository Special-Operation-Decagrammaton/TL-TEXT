[translation]
20049-330 = "あ、来たんだ。\nあー……まあ、\nそれなりに楽しんでるよ。"
20049-340 = "海って、\nこういう\nところなんだ……。"
20049-350 = "なに？"
20049-360 = "先生がなんと言おうと\n楽しむつもりはないよ。"
20049-370 = "（……いつもより、\n新鮮かも）"
20049-380 = "な、なに？\nなんで突っついたの？\n私、ぬいぐるみじゃ\nないんだけど……！"
20049-390 = "……暇なの？\nステージでも\n見てきたら？"
20049-400 = "私？興味ないけど……\nまあ、先生が\n行きたいなら。"
20049-410 = "付き合ってあげるよ。"
20049-860 = "あ、来たんだ。\nあー……まあ、\nそれなりに楽しんでるよ。"
20049-870 = "海って、\nこういう\nところなんだ……。"
20049-880 = "はあ……\n静かに過ごしたい。"
20049-890 = "なんとかしてよ、先生。"
20049-900 = "何、この人混み……。\n危険はないみたいだけど。"
20049-910 = "もう終わりなんだ……。\n……うん、たしかに\n悪くなかった。\n認めるよ。今回だけね。"
20049-920 = "なに？"
20049-930 = "先生がなんと言おうと\n楽しむつもりはないよ。"
20049-940 = "（……いつもより、\n新鮮かも）"
20049-950 = "な、なに？\nなんで突っついたの？\n私、ぬいぐるみじゃ\nないんだけど……！"
20049-960 = "……暇なの？\nステージでも\n見てきたら？"
20049-970 = "私？興味ないけど……\nまあ、先生が\n行きたいなら。"
20049-980 = "付き合ってあげるよ。"
