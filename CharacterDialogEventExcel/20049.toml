[translation]
20049-330 = "Oh, you're here.\nAh... well,\nI'm enjoying myself well enough."
20049-340 = "So this is what\nthe ocean is\nlike..."
20049-350 = "What?"
20049-360 = "No matter what you say, Sensei,\nI have no intention of enjoying this."
20049-370 = "(...It feels a bit\nmore refreshing than usual.)"
20049-380 = "W-what? Why did you poke me?\nI'm not a stuffed animal,\nyou know...!"
20049-390 = "...Are you bored?\nWhy don't you go watch\nthe stage or something?"
20049-400 = "Me? I'm not interested, but...\nwell, if you want to go,\nSensei."
20049-410 = "I'll go with you."