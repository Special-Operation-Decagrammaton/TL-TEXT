[translation]
10139-10 = "これより、\nロア追跡作戦を\n開始します。"
10139-20 = "お待ちしていました、\n先生。"
10139-30 = "すぐにブリーフィングを\n始めます。こちらへ。"
10139-40 = "ようこそ、\nFOX小隊の作戦本部へ。"
10139-50 = "消えた方々は、\nどこに行って\nしまったんでしょう……。"
10139-60 = "SRTとして\n任務を受けるのは、\n久しぶりですね。"
10139-70 = "全力で臨みます。\nこれで、"
10139-80 = "私たちの\n汚名をそそぐことが\nできるなら……。"
10139-90 = "シャーレとの合同作戦……"
10139-100 = "楽しみですね。\nふふっ。"
10139-110 = "先生、作戦前に\n腹ごしらえは\nいかがですか？"
10139-290 = "あっ、先生。"
10139-300 = "もしよかったら、\n物資の片づけを\n手伝っていただけませんか？"
10139-310 = "前の作戦で余った弾薬は……。"
10139-320 = "あ、先生。\nこんにちは。"
10139-330 = "何か、ご入用のものは\nありますか？"
10139-340 = "ひゃっ！？"
10139-350 = "み、耳は敏感で……\n触っちゃ、ダメです……。"
10139-360 = "良い選択だと思います。"
10139-370 = "ありがとうございます。"
10139-380 = "物資の交換でしたら、いつでも。"
10139-390 = "シャーレの支援……\nいつもありがとうございます。"
