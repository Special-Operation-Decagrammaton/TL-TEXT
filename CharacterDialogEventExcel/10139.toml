[translation]
10139-10 = "A partir de agora, \nvamos iniciar a operação \nde rastreamento da RABBIT."
10139-20 = "Estávamos esperando por você, \nProfessor."
10139-30 = "Vamos começar o briefing \nimediatamente. Por aqui."
10139-40 = "Bem-vindo ao \nquartel-general do FOX Squad."
10139-50 = "Para onde será que \naquelas pessoas que desapareceram \nforam parar...?"
10139-60 = "Faz tempo que não \nrecebemos uma missão \ncomo SRT."
10139-70 = "Daremos o nosso melhor. \nCom isso,"
10139-80 = "se pudermos \nlimpar o nosso nome..."
10139-90 = "Uma operação conjunta \ncom o Schale..."
10139-100 = "Estou ansiosa. \nHehe."
10139-110 = "Professor, que tal \ncomer algo antes \nda operação?"
10139-290 = "Ah, Professor."
10139-300 = "Se não se importar, \npoderia me ajudar a \norganizar os suprimentos?"
10139-310 = "A munição que sobrou \nda última operação é..."
10139-320 = "Ah, Professor. \nOlá."
10139-330 = "Precisa de \nalguma coisa?"
10139-340 = "Eek!?"
10139-350 = "M-minhas orelhas são sensíveis... \nNão pode tocá-las..."
10139-360 = "Acho que é uma boa escolha."
10139-370 = "Muito obrigada."
10139-380 = "Se precisar trocar suprimentos, \nestou à disposição."
10139-390 = "O apoio do Schale... \nMuito obrigada, como sempre."
