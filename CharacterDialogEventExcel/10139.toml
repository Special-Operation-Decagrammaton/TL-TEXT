[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10139-10 = "A partir deste minuto atômico,\na Operação Rastreio das Lores Ocultas\nestá deflagrada."
10139-20 = "O meu radar já ansiava\npela sua chegada, Sensei."
10139-30 = "Engatilharemos o briefing tático\nnum instante. Venha para o meu lado."
10139-40 = "Sinta-se em casa e bem-vindo\nao Quartel General do Esquadrão FOX."
10139-50 = "Para qual abismo cego\nas vítimas que sumiram na neblina\nforam arrastadas...?"
10139-60 = "Assumir missões paramilitares\ncom a placa da SRT de novo...\njá faz um bom tempo, não acha?"
10139-70 = "Vou focar toda a minha letalidade.\nSe com essa carnificina,"
10139-80 = "Nós pudermos lavar a lama\ne limpar a honra manchada\nda nossa farda..."
10139-90 = "Operação tática de corpo a corpo\ncom o Comandante da Schale..."
10139-100 = "A ansiedade me faz suar.\nUfufu~"
10139-110 = "Sensei, antes de rasgar o asfalto...\nquer abrir a boca e deixar eu\nencher a sua barriga com meu tempero?"
10139-290 = "Opa, um sinal no radar. Sensei."
10139-300 = "Se tiver uma brecha,\nnão quer vir suar comigo\norganizando a dispensa de suprimentos?"
10139-310 = "A munição pesada sobressalente\nque sobrou daquele massacre..."
10139-320 = "Ah, Comandante.\nO dia está ótimo hoje."
10139-330 = "A sua luxúria está necessitando\nde alguma \"coisinha\" em especial agora?"
10139-340 = "Hyaaá?!!"
10139-350 = "A-As minhas orelhas são atômicas\nde tão sensíveis... O t-toque é\nproibido aí, Sensei... Ahn..."
10139-360 = "Uma escolha balística e deliciosa."
10139-370 = "Meus mais íntimos agradecimentos."
10139-380 = "Se a pauta for escambo de luxos,\nminha porta tá sempre destrancada."
10139-390 = "A cobertura e suporte da Schale...\nSerei sempre submissa e grata por isso."