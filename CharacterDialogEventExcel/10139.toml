[translation]
10139-10 = "We will now\ncommence the operation\nto track Roa."
10139-20 = "I've been waiting for you,\nSensei."
10139-30 = "We'll begin the briefing\nimmediately. This way."
10139-40 = "Welcome to the\nFOX Platoon operational headquarters."
10139-50 = "I wonder where\nthe missing people\ncould have gone..."
10139-60 = "It's been a while since\nwe've taken on a mission\nas SRT."
10139-70 = "We will give it our all.\nIf this is how..."
10139-80 = "we can clear\nour names..."
10139-90 = "A joint operation\nwith Schale..."
10139-100 = "I'm looking forward to it.\nHehe."
10139-110 = "Sensei, would you like to\nhave a bite to eat\nbefore the operation?"
10139-290 = "Oh, Sensei."
10139-300 = "If you don't mind,\ncould you help me\norganize these supplies?"
10139-310 = "The ammunition left over from the last operation is..."
10139-320 = "Oh, Sensei.\nHello."
10139-330 = "Is there anything\nyou need?"
10139-340 = "Eek!?"
10139-350 = "M-my ears are sensitive...\nPlease, don't touch them..."
10139-360 = "I think that's a good choice."
10139-370 = "Thank you very much."
10139-380 = "I'm always available if you need to exchange supplies."
10139-390 = "Thank you for your\ncontinued support of Schale."