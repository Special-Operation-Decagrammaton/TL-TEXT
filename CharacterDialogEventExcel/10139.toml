[translation]
10139-10 = "Сейчас мы\nначнём операцию\nпо выслеживанию Роа."
10139-20 = "Я ждала вас,\nСенсей."
10139-30 = "Мы немедленно начнём\nинструктаж. Проходите сюда."
10139-40 = "Добро пожаловать в\nоперативный штаб отряда FOX."
10139-50 = "Интересно, куда\nмогли деться\nпропавшие люди..."
10139-60 = "Прошло много времени с тех пор,\nкак мы выполняли миссию\nв качестве SRT."
10139-70 = "Мы выложимся на полную.\nЕсли это то, как..."
10139-80 = "мы сможем очистить\nсвои имена..."
10139-90 = "Совместная операция\nс Schale..."
10139-100 = "Я с нетерпением жду её.\nХе-хе."
10139-110 = "Сенсей, не хотите ли вы\nперекусить\nперед началом операции?"
10139-290 = "О, Сенсей."
10139-300 = "Если вы не против,\nне могли бы вы помочь мне\nразобрать эти припасы?"
10139-310 = "Боеприпасы, оставшиеся с прошлой операции..."
10139-320 = "О, Сенсей.\nЗдравствуйте."
10139-330 = "Вам что-нибудь\nнужно?"
10139-340 = "Ик!?"
10139-350 = "М-мои уши очень чувствительны...\nПожалуйста, не трогайте их..."
10139-360 = "Думаю, это хороший выбор."
10139-370 = "Большое спасибо."
10139-380 = "Я всегда готова помочь, если вам нужно обменять припасы."
10139-390 = "Спасибо за вашу\nпостоянную поддержку Schale."