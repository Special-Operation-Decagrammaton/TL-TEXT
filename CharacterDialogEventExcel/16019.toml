[translation]
16019-2150 = "Bem-vindo,\nà loja de Asuma Toki."
16019-2160 = "……Eu menti.\nÉ a loja de todos."
16019-2170 = "Não consegui preparar\nmuitos itens, mas……"
16019-2180 = "Espero que seja útil\npara o Sensei."
16019-2190 = "Bem-vindo,\nà loja de Asuma Toki."
16019-2200 = "……Eu menti.\nÉ a loja de todos."
16019-2210 = "Não consegui preparar\nmuitos itens, mas……"
16019-2220 = "Espero que seja útil\npara o Sensei."
16019-2230 = "Aqui é Asuma Toki.\nCumprimento-o através da tela."
16019-2240 = "Deveria visitá-lo pessoalmente,\nmas devido a uma emergência,\npeço desculpas pela comunicação remota."
16019-2250 = "Mesmo em situações de emergência,\na loja de Asuma Toki\ncontinua funcionando."
16019-2260 = "Sim, Sensei.\nEstou aqui."
16019-2270 = "Não vou fugir nem me esconder――"
16019-2280 = "Não... se eu desaparecesse,\no Sensei me procuraria\ndesesperadamente?"
16019-2290 = "O que acha?"
16019-2300 = "Retenção de calor, estabilidade e\nefeito de relaxamento físico e mental――"
16019-2310 = "É um traje de combate excelente,\nassim como eu."
16019-2320 = "Sensei, vamos verificar as\nfunções do traje comigo."
16019-2330 = "Pode ficar grudado em mim o quanto quiser,\nentão não se acanhe."
16019-2340 = "Sim, Sensei.\nEstou aqui."
16019-2350 = "Não vou fugir nem me esconder――"
16019-2360 = "Não... se eu desaparecesse,\no Sensei me procuraria\ndesesperadamente?"
16019-2370 = "O que acha?"
16019-2380 = "Retenção de calor, estabilidade e\nefeito de relaxamento físico e mental――"
16019-2390 = "É um traje de combate excelente,\nassim como eu."
16019-2400 = "Sensei, vamos verificar as\nfunções do traje comigo."
16019-2410 = "Pode ficar grudado em mim o quanto quiser,\nentão não se acanhe."
16019-2420 = "Espere um momento."
16019-2430 = "Com a memória de uma empregada perfeita,\nvou me lembrar de onde está o estoque."
16019-2440 = "Estou atendendo online por\nnecessidade, mas isso não\nafetará as vendas."
16019-2450 = "Uma agente de elite não escolhe\nonde atuar."
16019-2460 = "Obrigada\npela compra."
16019-2470 = "A propósito, se você me pedir,\neu também posso comprar."
16019-2480 = "Entendido, esse é o produto\nque deseja."
16019-2490 = "Enquanto o reabastecimento não termina,\nque tal esperar brincando comigo?"
16019-2500 = "Então você gosta\ndesse tipo de coisa,\nentendido."
16019-2510 = "Sim, aqui está. Aguardamos\nsua próxima visita."
16019-2520 = "Venha me ver\nquantas vezes quiser."
16019-2530 = "Obrigada\npela compra."
16019-2540 = "A propósito, se você me pedir,\neu também posso comprar."
16019-2550 = "Entendido, esse é o produto\nque deseja."
16019-2560 = "Enquanto o reabastecimento não termina,\nque tal esperar brincando comigo?"
16019-2570 = "Então você gosta\ndesse tipo de coisa,\nentendido."
16019-2580 = "Sim, aqui está. Aguardamos\nsua próxima visita."
16019-2590 = "Venha me ver\nquantas vezes quiser."
16019-2600 = "Sim, acho que está bom."
16019-2610 = "Por favor, pegue esse produto\nna prateleira de trás."
16019-2620 = "Caso tenha comprado errado,\na devolução é possível."
16019-2630 = "……Sinto muito.\nNão consegui."
16019-2640 = "Se desejar, incluirei um vale-chamada\ncomigo como brinde."
16019-2650 = "Claro, \né o que você deseja, não é?"
