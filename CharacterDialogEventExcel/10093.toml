[translation]
10093-280 = "Наконец-то пришло время для нашей\nвесёлой-превесёлой школьной поездки!\nТы уже собрал вещи, Сенсей?"
10093-290 = "Кирара-Кирара на связи\nи готова оторваться по полной!"
10093-300 = "Чего я жду больше всего?"
10093-310 = "Новых мест,\nновой вкусной еды,\nа самое главное...\nновых знакомств, очевидно же!"
20058-200580320 = "Я нашла местечко, которое\nпросто идеально подойдёт для фоток.\nСходишь со мной, Сенсей?"
10093-330 = "Вон то супер-пупер огромное\nдерево там...!"
10093-340 = "Хм? Что такое?\nТы нашёл что-то\nинтересное?"
10093-350 = "Ахаха! Какое совпадение!\nЯ как раз тоже смотрела\nна тебя, Сенсей!"