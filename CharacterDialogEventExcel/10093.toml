[translation]
10093-400 = "Que viagem escolar\nsuper divertida!\nVocê também está pronto, Sensei?"
10093-410 = "Kirara Yozakura,\npronta para curtir!"
10093-420 = "Você também está aproveitando a viagem, Sensei?"
10093-430 = "Que bom!\nEu estou aproveitando ao máximo!"
10093-440 = "É uma pena que a viagem\nesteja acabando, mas..."
10093-450 = "Não se preocupe. Ainda tem\nmuita coisa divertida por vir!"
10093-460 = "Uau! Não tivemos tempo\nde descansar até o fim!\nFoi super divertido!"
10093-470 = "O que eu estou esperando?"
10093-480 = "Lugares novos,\ncomidas novas,\ne acima de tudo...\nnovos amigos, né!"
10093-490 = "Achei um lugar que daria\numa ótima foto, o que\nacha, Sensei?"
10093-500 = "É aquela árvore\nenorme ali...!"
10093-510 = "Hm? O que foi?\nAconteceu algo interessante?"
10093-520 = "Ahaha! Que coincidência!\nEu também estava\nolhando para você, Sensei!"
10093-700 = "Bem-vindo, Sensei!\nEstá pronto?"
10093-710 = "O que será que vai sair?\nNão está empolgado?"
10093-720 = "Vamos dar o nosso melhor até o fim, Sensei!"
10093-730 = "Qual será o prêmio principal?"
10093-740 = "Não dá para saber sem tentar,\nentão vamos logo com isso!"
10093-750 = "Uau!\nÉ uma carta super rara!\nSensei, você é incrível!"
10093-760 = "Que carta boa!\nParabéns!"
10093-770 = "É uma carta comum, mas...\na arte é fofa, então\nnão está tudo bem?"
10093-780 = "Ah, i-isso\nfoi inesperado..."
10093-790 = "N-não fique desapontado!\nSensei! Vai ter uma próxima!"
