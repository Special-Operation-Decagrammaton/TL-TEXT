[translation]
10093-280 = "楽しい楽しい\n修学旅行だね！\n先生も準備できた？"
10093-290 = "夜桜キララ、\n楽しむ準備完了～！"
10093-300 = "楽しみにしてること？"
10093-310 = "新しい場所、\n新しいグルメ、\nそして何よりも……\n新しい友達でしょ！"
10093-320 = "いい写真が撮れそうな\nとこ見つかったけど、\n先生もどう？"
10093-330 = "あそこのすっごい大きい\n木なんだけどさ……！"
10093-340 = "うん？どうしたの？\n何か面白そうなことでも\nあった？"
10093-350 = "あははっ！偶然だね！\nあたしも先生の\nこと見てたんだ！"
10093-400 = "楽しい楽しい\n修学旅行だね！\n先生も準備できた？"
10093-410 = "夜桜キララ、\n楽しむ準備完了～！"
10093-420 = "先生も旅行楽しんでる？"
10093-430 = "いいね！\nあたしも超満喫してるよ！"
10093-440 = "旅行が終わっちゃうのは\n名残惜しいけど……"
10093-450 = "大丈夫。楽しいことは、\nまだまだあるからね！"
10093-460 = "ふわぁ！最後まで\n休む暇なかったね！\n超楽しかった！"
10093-470 = "楽しみにしてること？"
10093-480 = "新しい場所、\n新しいグルメ、\nそして何よりも……\n新しい友達でしょ！"
10093-490 = "いい写真が撮れそうな\nとこ見つかったけど、\n先生もどう？"
10093-500 = "あそこのすっごい大きい\n木なんだけどさ……！"
10093-510 = "うん？どうしたの？\n何か面白そうなことでも\nあった？"
10093-520 = "あははっ！偶然だね！\nあたしも先生の\nこと見てたんだ！"
10093-700 = "いらっしゃい、先生！\n準備はいい？"
10093-710 = "何が出るかな～\nワクワクしない？"
10093-720 = "最後まで頑張ろう、先生！"
10093-730 = "どれが当たりかな～"
10093-740 = "引いてみないと\n分かんないし、\nスパッと行こう！"
10093-750 = "わぁ！\n超レアカードじゃん！\n先生、すっごい！"
10093-760 = "いいカードだね！\nおめでとう！"
10093-770 = "よく見るカードだけど……\n絵柄も可愛いし、\n別にいんじゃない？"
10093-780 = "あっ、こ、これは\n予想外だなぁ……"
10093-790 = "が、がっかりしないで！\n先生！次あるから！"
