[translation]
10035-10 = "あ、せ、先生……。"
10035-20 = "お、お待ちして\nおりました……。"
10035-30 = "いらっしゃいましたか、\n先生……。"
10035-40 = "ま、またお会い\nできるとは……。"
10035-50 = "あっ、は、はい……\nお呼びでしょうか？"
10035-60 = "ど、どうかされましたか\n……？"
10035-70 = "ひぇっ……！？"
10035-80 = "あの……先生……。\nそろそろ……\n動かれた方が……？"
10035-90 = "えっと……\nもしかして私に、\n何かご用事が……？"
10035-100 = "ずっとこうやって……\n傍にいられたら……。"
10035-110 = "あっ、は、はい……\nお呼びでしょうか？"
10035-120 = "ど、どうかされましたか\n……？"
10035-130 = "ひぇっ……！？"
10035-140 = "あの……先生……。\nそろそろ……\n動かれた方が……？"
10035-150 = "えっと……\nもしかして私に、\n何かご用事が……？"
10035-370 = "や、やることリストを\nまとめてみました……。"
10035-380 = "こ、こちらです。先生には、\nお手数をおかけしますが……。"
10035-390 = "せ、先生？\nこれは、どういう……？"
10035-400 = "あ、いえ、\nお気になさらず……。"
10035-410 = "こ、こうやってただ、\nふたりでリストを確認しているだけで……\n何だか、楽しいですね……。"
10035-420 = "あ、お疲れ様です……\n何とか上手くいったようですね。"
10035-430 = "あ、そうでしたか……\nでは、チェックしておきますね。\nお疲れ様でした。"
10035-440 = "きょ、今日の分は、\nこれで終わり……ですね。\nあ、ありがとうございました、先生。"
