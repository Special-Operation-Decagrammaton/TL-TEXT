[translation]
10089-10 = "さあ、仕事の\n時間よ、先生。"
10089-20 = "ちょうどいいわ、先生に\n見せたいものがあるの。"
10089-30 = "ん…？先生？何か\n話でもあるのかしら…？"
10089-40 = "し、しーっ！静かに！"
10089-50 = "潜入がバレちゃう\nでしょう…！"
10089-60 = "ひいっ…！？"
10089-70 = "あ…先生じゃないの。"
10089-80 = "こ、ここはまずいわ…\n外で話しましょう。"
10089-90 = "ひいっ…！？"
10089-100 = "あ…先生じゃないの。"
10089-110 = "こ、ここはまずいわ…\n外で話しましょう。"
10089-310 = "それじゃ、手がかりを\n集めるわよ。"
10089-320 = "先生、資料を\nまとめたいの。"
10089-330 = "付き合って\nもらえるかしら？"
10089-340 = "ターゲットのことを、\nもうちょっと\n調べたいわね。"
10089-350 = "しゅ、集中しなさい。\nいや、私じゃなくて、\n資料に！"
10089-360 = "ん、ん？わ、私に\n何か用なの……？"
10089-370 = "ああ、\nそういうことだったのね。"
10089-380 = "完全に、理解したわ。"
10089-390 = "さすが、私の見込んだ\nパートナーだわ。"
10089-400 = "情報は揃ったけど…念のため、\nもう少し見てみましょう。"
