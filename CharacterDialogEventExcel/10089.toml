[translation]
10089-10 = "Muito bem, é hora\nde trabalhar, Sensei."
10089-20 = "Que bom que chegou, Sensei.\nTem algo que quero te mostrar."
10089-30 = "Já é essa hora..."
10089-40 = "Como o tempo voa. Será que\né hora de encerrar...?"
10089-50 = "Não relaxe até\nterminar o trabalho."
10089-60 = "Hm...? Sensei? Tem algo\nque queira me dizer...?"
10089-70 = "Shh, shiu! Silêncio!"
10089-80 = "Vamos acabar sendo\ndescobertos...!"
10089-90 = "Eek...!?"
10089-100 = "Ah... é só você, Sensei."
10089-110 = "I-isso não é um bom lugar...\nVamos conversar lá fora."
10089-310 = "Então, vamos começar\na reunir as pistas."
10089-320 = "Sensei, preciso organizar\nestes documentos."
10089-330 = "Pode me fazer\ncompanhia?"
10089-340 = "Quero investigar um pouco\nmais sobre o alvo."
10089-350 = "Fo-foque. Não em mim,\nmas nos documentos!"
10089-360 = "Hm, hm? Vo-você\nprecisa de algo de mim...?"
10089-370 = "Ah, então\nera isso."
10089-380 = "Entendi perfeitamente."
10089-390 = "Como esperado do parceiro\nque eu escolhi."
10089-400 = "As informações estão completas, mas... por precaução, vamos dar mais uma olhada."
