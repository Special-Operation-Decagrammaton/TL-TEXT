[translation]
20038-280 = "大規模交流会は、\nレッドウィンター\n事務局としても\n初の試みです。"
20038-290 = "私もとっても楽しみです。"
20038-300 = "先生、チーパオ姿の\nチェリノちゃんには\nもう会いました？"
20038-310 = "ふふっ、とっても\n可愛いと思いませんか？"
20038-320 = "あ…私も似合ってる、\nですか？"
20038-330 = "…それは、ありがとう\nございます。"
20038-340 = "（山海経の黒い君主…\n想像よりもずっと\n強いお方でした）"
20038-350 = "（…可愛いだけでは\nないのですね。\nふふっ）"
20038-360 = "騒動には慣れていた\nつもりでしたが…"
20038-370 = "他校のものを\n目の当たりにすると…"
20038-380 = "なんだか不思議な\n気分です。"
20038-390 = "交流会、とっても\n楽しかったです。"
20038-400 = "今度は門主様を\n我がレッドウィンターに\n招待しなくては、ふふ。"
20038-410 = "山海経の公園は\n広くてきれいですね。"
20038-420 = "街頭演説に\nぴったりです。"
20038-430 = "ここでチェリノ会長の\n偉大さを語るのは…"
20038-440 = "外交問題になって\nしまいますよね…。"
20038-450 = "変わるもの、\n変わらぬもの。"
20038-460 = "…選ぶのは\n難しいですね。"
20038-470 = "…レッドウィンター\n連邦学園は変わっていく\nばかりではありますが。"
20038-480 = "先ほどルミ会長から、\n安眠効果のある\n茶葉をいただきました。"
20038-490 = "今晩はこちらで、\nチェリノちゃんに\nミルクティーを淹れ\nようと思っているんです。"
20038-500 = "「錬丹術研究会」という\n部活では、若返りの薬を\n研究しているそうです。"
20038-510 = "これは…記録して\nおかないとですね。"
20038-620 = "交流会を記念して、\n交換券イベントを\n行っております！"
20038-630 = "門主様の人形を\nお持ちでしたら、\n景品と交換させて\nいただきます！"
20038-640 = "まだ人形の交換は\n承っておりますよ。"
20038-650 = "交換忘れのないよう、\nご利用ください。"
20038-660 = "この人形、私が\nデザインしたのですよ。"
20038-670 = "チェリノ会長の人形を\n作っていた日頃の\n経験が役立って\nよかったです。"
20038-680 = "交換券として\n作ったものですが…"
20038-690 = "どうしたものか手元に\n残したいという生徒が\n多くて、なかなか\n回収できません。"
20038-700 = "…景品に何か問題でも\nあったのでしょうか？"
20038-710 = "おめでとうございます、\n当たりです！"
20038-720 = "当たりです！\n先生は運がいいのですね。"
20038-730 = "これは…1等ですね！\n流石先生です！"
20038-740 = "あら、こんなにたくさん…"
20038-750 = "景品をお持ちしますね。\n少々お待ちください。"
20038-760 = "こんにちは、先生。\n交流会のスケジュールを\nまとめておきました。"
20038-770 = "両校の生徒が集結しておりますので\n処理すべきお仕事が山積みです。"
20038-780 = "どうかされましたか？"
20038-790 = "めっ、ですよ。今はお仕事に\n集中していただかないと。"
20038-800 = "お見事です。ここが\nレッドウィンターでしたら勲章を\n差し上げたのに…"
20038-810 = "ご協力くださり、\nありがとうございます。"
