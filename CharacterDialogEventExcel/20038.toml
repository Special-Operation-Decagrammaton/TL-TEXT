[translation]
20038-280 = "O grande evento de intercâmbio é a primeira tentativa da secretaria de Red Winter."
20038-290 = "Eu também estou muito animada."
20038-300 = "Sensei, você já conheceu a Cherino-chan vestida de qipao?"
20038-310 = "Fufu, você não acha que ela está muito fofa?"
20038-320 = "Ah... você acha que combina comigo também?"
20038-330 = "...Isso, muito obrigada."
20038-340 = "(A soberana negra de Shanhaijing... ela era muito mais forte do que eu imaginava.)"
20038-350 = "(...Ela não é apenas fofa, não é? Fufu.)"
20038-360 = "Eu achava que estava acostumada com confusões, mas..."
20038-370 = "Quando vejo as coisas de outra escola..."
20038-380 = "Sinto uma sensação estranha."
20038-390 = "O evento de intercâmbio foi muito divertido."
20038-400 = "Da próxima vez, preciso convidar a Mestra do Portão para a nossa Red Winter, fufu."
20038-410 = "O parque de Shanhaijing é grande e bonito."
20038-420 = "É perfeito para um discurso de rua."
20038-430 = "Falar sobre a grandeza da Presidente Cherino aqui..."
20038-440 = "Acabaria se tornando um problema diplomático, não é..."
20038-450 = "O que muda, o que não muda."
20038-460 = "...É difícil escolher."
20038-470 = "...Embora a Academia Federal de Red Winter esteja sempre mudando."
20038-480 = "Recebi um chá com efeito relaxante da Presidente Lumi agora pouco."
20038-490 = "Estou pensando em preparar um chá com leite para a Cherino-chan hoje à noite com ele."
20038-500 = "Dizem que o clube chamado 'Sociedade de Pesquisa de Alquimia' está pesquisando um elixir da juventude."
20038-510 = "Isso... preciso registrar."
20038-620 = "Para comemorar o evento de intercâmbio, estamos realizando um evento de troca de cupons!"
20038-630 = "Se você tiver uma boneca da Mestra do Portão, eu a trocarei por um prêmio!"
20038-640 = "Ainda estamos aceitando trocas de bonecas."
20038-650 = "Por favor, aproveite para não esquecer de trocar."
20038-660 = "Fui eu quem desenhou esta boneca."
20038-670 = "Foi bom que a experiência diária de fazer bonecas da Presidente Cherino tenha sido útil."
20038-680 = "Eu as fiz como cupons de troca, mas..."
20038-690 = "Muitos alunos querem ficar com elas, então é difícil recolhê-las."
20038-700 = "...Houve algum problema com os prêmios?"
20038-710 = "Parabéns, você ganhou!"
20038-720 = "Você ganhou! O Sensei tem muita sorte."
20038-730 = "Isso é... o 1º prêmio! Como esperado do Sensei!"
20038-740 = "Oh, tantas assim..."
20038-750 = "Vou trazer os prêmios. Por favor, aguarde um momento."
20038-760 = "Olá, Sensei. Organizei o cronograma do evento de intercâmbio."
20038-770 = "Como os alunos de ambas as escolas se reuniram, há uma montanha de trabalho a ser feito."
20038-780 = "Aconteceu alguma coisa?"
20038-790 = "Ei, nada disso. Você precisa se concentrar no trabalho agora."
20038-800 = "Excelente. Se estivéssemos em Red Winter, eu teria lhe dado uma medalha..."
20038-810 = "Obrigada por sua cooperação."
