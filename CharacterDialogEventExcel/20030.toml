[translation]
20030-220 = "O Festival Esportivo Halo... \nUm novo horizonte gastronômico\nacaba de chegar."
20030-230 = "Você veio, \nSensei."
20030-240 = "Então, \nque tal agora, comigo—"
20030-250 = "conquistarmos as barracas\nde comida?"
20030-260 = "Eu tenho um metabolismo que não me deixa engordar, \nmas isso não significa que eu consiga\ncomer muito..."
20030-270 = "Sempre fico com um sentimento\nde frustração."
20030-280 = "Senti vontade de\nme exercitar um pouco."
20030-290 = "Eu também poderia\nparticipar?\n...Na corrida do pão"
20030-300 = "As barracas do Festival Esportivo Halo\nsão, literalmente, uma\nexposição gastronômica"
20030-310 = "Ah, o sabor supremo\ncom certeza está lá...!"
20030-320 = "Sensei... podemos caminhar\num pouco juntos?"
20030-330 = "...Estar com uma roupa diferente do habitual\ntambém tem seu charme."
