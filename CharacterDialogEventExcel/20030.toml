[translation]
20030-220 = "「晄輪大祭」… 。\n新たな美食の地平が、\nやって参りましたわ。"
20030-230 = "いらしたのですね、\n先生。"
20030-240 = "それでは、\n今から私と――"
20030-250 = "屋台征服と\n洒落込みましょうか。"
20030-260 = "私は太らない体質ですが、\nたくさん食べられる\nわけではなく…。"
20030-270 = "いつも、もどかしい\n気持ちでいっぱいです。"
20030-280 = "少し、身体を動かしたく\nなりました。"
20030-290 = "私も、参加して\nよろしいでしょうか？\n…「パン食い競争」に。"
20030-300 = "「晄輪大祭」の屋台は\nまさに、「美食の博覧会」\nそのもの！"
20030-310 = "ああ、究極の味わいが、\nきっとそこに…！"
20030-320 = "先生…少しだけ、\n一緒に歩きませんか？"
20030-330 = "…いつもと違う格好も、\n乙なものですよ。"
20030-570 = "「晄輪大祭」… 。\n新たな美食の地平が、\nやって参りましたわ。"
20030-580 = "いらしたのですね、\n先生。"
20030-590 = "それでは、\n今から私と――"
20030-600 = "屋台征服と\n洒落込みましょうか。"
20030-610 = "うふふ。先生、\n楽しんでおりますか？"
20030-620 = "私はこの上なく\n謳歌しておりますわ。"
20030-630 = "気がついたら\n「晄輪大祭」も終盤に…。"
20030-640 = "楽しい時間は\nあっという間、\nと言いますけれども…"
20030-650 = "思い出はいつまでも\n残るものですわ。"
20030-660 = "ごきげんよう、先生。\n屋台の制覇なら\n済んでおりますわ。"
20030-670 = "私は太らない体質ですが、\nたくさん食べられる\nわけではなく…。"
20030-680 = "いつも、もどかしい\n気持ちでいっぱいです。"
20030-690 = "少し、身体を動かしたく\nなりました。"
20030-700 = "私も、参加して\nよろしいでしょうか？\n…「パン食い競争」に。"
20030-710 = "「晄輪大祭」の屋台は\nまさに、「美食の博覧会」\nそのもの！"
20030-720 = "ああ、究極の味わいが、\nきっとそこに…！"
20030-730 = "先生…少しだけ、\n一緒に歩きませんか？"
20030-740 = "…いつもと違う格好も、\n乙なものですよ。"
