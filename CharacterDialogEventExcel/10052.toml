[translation]
10052-160 = "それでは、一緒に\n「晄輪大祭」の\n準備をはじめましょう。"
10052-170 = "開会式に遅れないよう、\n頑張りましょうね！"
10052-180 = "キヴォトス中の\n注目が集まる\nお祭りですから、"
10052-190 = "ミレニアムの真価を\n示せるよう、\n最善を尽くします！"
10052-200 = "運動は得意では\nありませんが…"
10052-210 = "これも一応、\nセミナーの\n仕事ですから。"
10052-220 = "（…皆がお祭りを楽しみに\nしているわけでは、\nないのですね…）"
10052-230 = "ユウカちゃんが\n目覚めたら、きっと\n小言の嵐でしょうね。"
10052-240 = "ふふ…ユウカちゃんの\n慌てる姿、\n今から楽しみです。"
10052-250 = "お疲れ様でした先生。\n皆で一致団結して\n準備しましたから、"
10052-260 = "今回の「晄輪大祭」も\n楽しいこと\n間違いなしです。"
10052-270 = "キヴォトス中の\n注目が集まる\nお祭りですから、"
10052-280 = "ミレニアムの真価を\n示せるよう、\n最善を尽くします！"
10052-290 = "運動は得意では\nありませんが…"
10052-300 = "これも一応、\nセミナーの\n仕事ですから。"
10052-310 = "（…皆がお祭りを楽しみに\nしているわけでは、\nないのですね…）"
10052-320 = "ユウカちゃんが\n目覚めたら、きっと\n小言の嵐でしょうね。"
10052-330 = "ふふ…ユウカちゃんの\n慌てる姿、\n今から楽しみです。"
10052-560 = "こちら、「晄輪大祭」の\n準備に必要な\n業務一覧になります。"
10052-570 = "あ、丁度良いところに！\n先生にお願いしたいお仕事が\nありまして…。"
10052-580 = "あれ？どうされました？"
10052-590 = "ふふ、ダメですよ。\n今は忙しいので…\nあとでちゃんと構ってあげます。"
10052-600 = "さすがです、先生。\n勉強になりました。"
10052-610 = "いい仕事っぷりですね。\n感心しました。"
