[translation]
10052-160 = "Então, vamos começar\na preparar o\n「Festival Esportivo de Halo」 juntos."
10052-170 = "Vamos nos esforçar para\nnão nos atrasarmos para\na cerimônia de abertura!"
10052-180 = "É um festival que\natrai a atenção de\ntodo o Kivotos,"
10052-190 = "então farei o meu melhor\npara mostrar o verdadeiro\nvalor do Millennium!"
10052-200 = "Não sou muito boa\nem esportes, mas..."
10052-210 = "isso também é, tecnicamente,\num trabalho do\nSeminar."
10052-220 = "(...Então nem todos estão\nanimados com o festival,\né mesmo...)"
10052-230 = "Quando a Yuuka-chan acordar,\ncom certeza será uma\ntempestade de reclamações."
10052-240 = "Hehe... já estou ansiosa\npara ver a Yuuka-chan\nentrando em pânico."
10052-250 = "Bom trabalho, Sensei.\nComo todos trabalhamos\ncomo uma equipe na preparação,"
10052-260 = "não há dúvidas de que\neste 「Festival Esportivo de Halo」\nserá muito divertido."
10052-270 = "É um festival que\natrai a atenção de\ntodo o Kivotos,"
10052-280 = "então farei o meu melhor\npara mostrar o verdadeiro\nvalor do Millennium!"
10052-290 = "Não sou muito boa\nem esportes, mas..."
10052-300 = "isso também é, tecnicamente,\num trabalho do\nSeminar."
10052-310 = "(...Então nem todos estão\nanimados com o festival,\né mesmo...)"
10052-320 = "Quando a Yuuka-chan acordar,\ncom certeza será uma\ntempestade de reclamações."
10052-330 = "Hehe... já estou ansiosa\npara ver a Yuuka-chan\nentrando em pânico."
10052-560 = "Aqui está a lista de tarefas\nnecessárias para a preparação\ndo 「Festival Esportivo de Halo」."
10052-570 = "Ah, que bom que você apareceu!\nTem um trabalho que eu\ngostaria de pedir ao Sensei..."
10052-580 = "Ué? O que houve?"
10052-590 = "Hehe, não pode.\nEstou ocupada agora...\nDepois eu dou atenção a você."
10052-600 = "Como esperado do Sensei.\nAprendi muito."
10052-610 = "Que ótimo trabalho.\nFiquei impressionada."
