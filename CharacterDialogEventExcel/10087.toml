[translation]
10087-260 = "Bem-vindo de volta, Sensei."
10087-270 = "Você se preparou\ncorretamente?"
10087-280 = "Por favor, prepare-se\ncom determinação."
10087-290 = "Os preparativos foram\nconcluídos sem problemas."
10087-300 = "Como oficial administrativa\ndo Comitê de Disciplina de Gehenna..."
10087-310 = "Acho que chegou a hora\nde nos levantarmos."
10087-320 = "Então não vai acabar\ntão facilmente..."
10087-330 = "Bem, não é como se eu\nfosse desistir por causa disso."
10087-340 = "Sério mesmo!\nVocês são muito persistentes!"
10087-350 = "Haa... bem,\ntudo bem!"
10087-360 = "Nesse caso, eu também estou\npronta para ir até o fim!"
10087-370 = "Vamos lá, continue contando\ncomigo! Sensei!"
10087-380 = "Finalmente\nacabou..."
10087-390 = "Tantas coisas aconteceram,\nou melhor..."
10087-400 = "Digo, estou exausta."
10087-410 = "......Que tal voltarmos e tomarmos\numa xícara de café?\nSensei."
10087-420 = "A festa desta vez também\nacabou assim..."
10087-430 = "Sério, o que será\nque vai acontecer?"
10087-440 = "Bem, não importa..."
10087-450 = "Não importa o que aconteça,\nnós do Comitê de Disciplina..."
10087-460 = "Não, eu mesma\nvou resolver isso!"
10087-470 = "Agora, sou outra espiã\nque auxilia a Presidente Hina."
10087-480 = "Sendo assim, é hora de mostrar\na verdadeira força que eu\nestava escondendo até agora."
10087-490 = "Fufu, pode ficar\nansioso por isso."
10087-500 = "Pensei que este ano seria\nmais tranquilo..."
10087-510 = "Não, acho que em Gehenna\nisso era um pedido\nimpossível... haa."
10087-820 = "Bem-vindo de volta, Sensei."
10087-830 = "Tenho um trabalho que preciso\nque você resolva agora mesmo."
10087-840 = "Posso pedir esse favor?"
10087-850 = "Fufu, já que chegamos até aqui,\nnão pense que pode escapar."
10087-860 = "Sim, a lista de tarefas\nestá cheia♪."
10087-870 = "Certo, se você estava pensando\nem vadiar, desista."
10087-880 = "Estarei vigiando bem ao seu lado...\nperdão, auxiliando você."
10087-890 = "Eu entendo que você queira fazer outras coisas\nantes de terminar o trabalho à sua frente."
10087-900 = "Mas... isso fica para depois\nque todo o trabalho terminar."
10087-910 = "Fufu... combinado?"
10087-920 = "Hee, nada mal."
10087-930 = "Sim, a recompensa pelo seu trabalho\nestá garantida. É o esperado."
10087-940 = "Nossa...\nVocê resolveu tudo de uma vez?"
10087-950 = "Hee... honestamente, estou impressionada.\nComo esperado do Sensei."
