[translation]
10087-170 = "おかえりなさい、先生。"
10087-180 = "準備はちゃんとできましたか？"
10087-190 = "覚悟をしっかりと決めてくださいね。"
10087-200 = "準備ならつつがなく完了しました。"
10087-210 = "ゲヘナ風紀委員会の行政官として…"
10087-220 = "今こそ立ち上がる時かと。"
10087-230 = "今回のパーティーも結局こんな事に……。"
10087-240 = "本当、どうなってしまうんでしょうか。"
10087-250 = "まあ、構いません……"
10087-260 = "何が起こっても、私たち風紀委員会が……。"
10087-270 = "いえ、私が解決してみせます！"
10087-280 = "今の私はヒナ委員長を補佐するもう一人のスパイ。"
10087-290 = "であれば、今まで隠していた真の実力をお見せする時でしょう。"
10087-300 = "ふふ、楽しみにしていてくださいね。"
10087-310 = "今年は静かにしていたと思ったら……"
10087-320 = "いえ、ゲヘナではどだい無茶な話だったのでしょうか……はあ。"
10087-330 = "まあ、だからと\nいって諦めるわけには\nいきませんが。"
10087-340 = "ほんっとう～に！\nしつこいですね！"
10087-350 = "はぁ……まあ、\nいいでしょう！"
10087-360 = "それならこちらも\n最後までやってやる\n覚悟はできていますから！"
10087-370 = "さあ、引き続きよろしく\nお願いいたします！先生！"
10087-380 = "やっと\n終わりましたか……。"
10087-390 = "本当に色々あったと\nいうか…"
10087-400 = "もう疲れ果てたと\nいいますか。"
10087-410 = "……帰ってコーヒーでも\n一杯、いかがですか？\n先生。"
10087-420 = "今回のパーティーも\n結局こんな事に……。"
10087-430 = "本当、どうなって\nしまうんでしょうか。"
10087-440 = "まあ、構いません……"
10087-450 = "何が起こっても、\n私たち風紀委員会が……。"
10087-460 = "いえ、私が\n解決してみせます！"
10087-470 = "今の私はヒナ委員長を\n補佐するもう一人の\nスパイ。"
10087-480 = "であれば、今まで\n隠していた真の実力をお\n見せする時でしょう。"
10087-490 = "ふふ、楽しみに\nしていてくださいね。"
10087-500 = "今年は静かにしていたと\n思ったら……"
10087-510 = "いえ、ゲヘナではどだい\n無茶な話だったの\nでしょうか……はあ。"
10087-820 = "おかえりなさい、先生。"
10087-830 = "ちょうど解決していただきたい\n仕事があるのです。"
10087-840 = "お願いしても良いですか？"
10087-850 = "ふふ、ここまで来たのですから、\n逃げられると思わないでくださいね。"
10087-860 = "はい、業務リストが\nい～っぱい♪ですよ。"
10087-870 = "はーい、サボるつもりでしたら\n諦めてください。"
10087-880 = "私がすぐ隣で監視……\n失礼、補佐していますので。"
10087-890 = "目の前の仕事をする前に、\n他のことをしたい気持ちはわかります。"
10087-900 = "でも……そういうのは仕事\nが全部終わってから。"
10087-910 = "ふふっ……いいですね？"
10087-920 = "へぇ、やるじゃないですか。"
10087-930 = "はい、働いた報酬はちゃんと\nありますよ。当然です。"
10087-940 = "なんと……\n一気に解決したのですか。"
10087-950 = "へぇ……正直感心しました。\nさすが先生ですね。"
