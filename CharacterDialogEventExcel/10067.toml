[translation]
10067-240 = "Professor, você chegou."
10067-250 = "A missão de infiltração\nestá pronta."
10067-260 = "Estou preparada.\nEstou às suas ordens."
10067-270 = "Sim, Professor.\nPrecisa de algo?"
10067-280 = "Ugh... esta roupa faz com que\nas sensações sejam transmitidas\ndiretamente..."
10067-290 = "...É natural, já que o\nmaterial é fino..."
10067-300 = "Um traje de coelhinha?"
10067-310 = "Ele tem vantagens diferentes\ndo traje de empregada,\ne acho isso bom."
10067-320 = "Que o traje de coelhinha\ncombina comigo?"
10067-330 = "Hum... bem, obrigado.\nEu não esperava ser elogiada..."
10067-350 = "Professor, você chegou."
10067-360 = "A missão de infiltração\nestá pronta."
10067-370 = "Estou preparada.\nEstou às suas ordens."
10067-380 = "Parece que há algum segredo\nescondido aqui."
10067-390 = "Entendo sua confusão.\nMas, por favor, confie em mim."
10067-400 = "Eu estou sempre\ndo lado do Professor."
10067-410 = "É ótimo que tudo tenha\nterminado bem."
10067-420 = "Com base nas lições de hoje,\nme esforçarei para ser\num agente ainda mais perfeita."
10067-430 = "Sim, Professor.\nPrecisa de algo?"
10067-440 = "Ugh... esta roupa faz com que\nas sensações sejam transmitidas\ndiretamente..."
10067-450 = "...É natural, já que o\nmaterial é fino..."
10067-460 = "Um traje de coelhinha?"
10067-470 = "Ele tem vantagens diferentes\ndo traje de empregada,\ne acho isso bom."
10067-480 = "Que o traje de coelhinha\ncombina comigo?"
10067-490 = "Hum... bem, obrigado.\nEu não esperava ser elogiada..."
10067-680 = "Era você, Professor.\nA missão de hoje\né esta aqui."
10067-690 = "A missão é um dos\nassuntos mais importantes."
10067-700 = "Vamos avançar passo a passo,\ncom firmeza, hoje também."
10067-710 = "As tarefas diárias impostas\npodem, às vezes,\nse tornar um fardo."
10067-720 = "Está tudo bem,\neu serei a força do Professor."
10067-730 = "Agentes e missões têm\numa relação inseparável."
10067-740 = "...Ou seja, o Professor agora\ntambém é um agente."
10067-750 = "Missão de hoje,\nconcluída.\nBom trabalho, Professor."
10067-760 = "Mesmo para mim, foi uma\nprogramação bem pesada."
10067-770 = "Como esperado do Professor."
