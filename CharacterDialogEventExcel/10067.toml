10067-460 = "バニースーツ、ですか？"
10067-470 = "メイド服とは\n異なる利点があって、\nよいと思っております。"
10067-480 = "バニー姿、よく\n似合ってる、ですか？"
10067-490 = "ん…その、\nありがとう、ございます。褒められるとは、\n思ってもおらず…。"
10067-680 = "先生でしたか。\n本日のミッションは、\nこちらになります。"
10067-690 = "ミッションは\n重要事項の一つです。"
10067-700 = "今日も一歩ずつ、\n着実に進んでいきましょう。"
10067-710 = "毎日課せられる日課は、\n時に負担に\nなることもあります。"
10067-720 = "大丈夫です、\n私が先生の力になります。"
10067-730 = "エージェントとミッションは、\n切っても切れない関係。"
10067-740 = "…つまり今の先生は、\nエージェントでもあるという事です。"
10067-750 = "本日のミッション、\nコンプリートです。\nお疲れ様でした、先生。"
10067-760 = "私からみてもかなり\nハードなスケジュールでした。"
10067-770 = "さすがです、先生。"
