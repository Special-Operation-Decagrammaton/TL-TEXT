[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10145-10 = "Céu azul e\num sol ofuscante――é o verão.\nSendo assim, devemos fugir do calor, não?"
10145-20 = "Fufu...\nNão sei o que você está\npensando no momento, mas..."
10145-30 = "Eu estou me sentindo\nbem animada, sabia?"
10145-40 = "É um lugar e tanto."
10145-50 = "Especialmente ali――"
10145-60 = "Diante da natureza,"
10145-70 = "Somos forçados a perceber o\nquão pequenos e impotentes nós somos."
10145-80 = "Se for com o Sensei,\na Kiki fica feliz em ir para\nqualquer lugar!"
10145-90 = "......O que foi?\nVai ficar apenas me olhando?"
10145-100 = "Todo mundo tem seus momentos\nde imaturidade."
10145-110 = "No entanto, as leis do mundo"
10145-120 = "Exigem que continuemos a aprender.\nAté mesmo nós."
10145-130 = "Tudo terminou em paz."
10145-140 = "Fufu... Porém,\na nossa fuga do calor"
10145-150 = "Ainda está apenas começando,\nnão concorda?"
10145-160 = "Hm? O que houve,\nSensei?"
10145-170 = "Fufu, venha.\nPode apreciar o quanto quiser."
10145-180 = "A pele macia da sua líder―― não é?"
10145-190 = "Poder vir a um lugar como\neste junto com o Sensei...\nÉ verdadeiramente como um sonho."
10145-200 = "Fufu...\nNão há nenhum significado oculto nisso."
10145-210 = "Também não estou me\nsentindo mal ou doente."
10145-220 = "Pode interpretar as minhas\npalavras exatamente como eu as disse."
10145-230 = "A borboleta azul significa\n'imortalidade' no Shanhaijing."
10145-240 = "Em outras palavras,"
10145-250 = "Também significa 'aqueles que não conhecem a desistência'."
10145-260 = "Fufu. Ora, não se preocupe.\nPode encarar isso apenas\ncomo um papo furado se quiser."
10145-270 = "Sinto muito por arrastá-lo\npara os meus caprichos egoístas, Sensei."
10145-280 = "Eu lhe devo essa."
10145-290 = "Ah, pois bem...\nAcho melhor eu já ir pedindo desculpas."
10145-300 = "......Pois pretendo ser ainda mais\negoísta e manhosa daqui para frente."
10145-790 = "Olá, Sensei!\nÉ a Kiki!"
10145-800 = "A partir de hoje, eu vou\nficar tomando conta da lojinha!"
10145-810 = "Eh, Kisaki?\nA Kiki não conhece muito bem\nessa pessoa..."
10145-820 = "Seja muito bem-vindo, Sensei!"
10145-830 = "A Kiki está se esforçando\nmuito pra cuidar da loja, sabia?\nFaz carinho na minha cabeça!"
10145-840 = "Muito obrigada por vir\naté aqui!"
10145-850 = "Dê uma olhadinha com calma para\nnão esquecer de comprar nada, tá bom?"
10145-860 = "De qual o Sensei gosta mais?\nA Kiki acha que~..."
10145-870 = "Se for algo que o Sensei escolheu,\neu gosto de qualquer coisa!"
10145-880 = "Eu tentei vestir\nesse maiô, mas..."
10145-890 = "O que você acha?\nFicou bom em mim?\nEu estou fofa?"
10145-900 = "Na verdade, a Kiki...\nnão é muito boa em nadar."
10145-910 = "Ah, a Kiki também estava\nde olho nisso!"
10145-920 = "Ah!\nNessas horas, a gente tem\nque dizer aquilo, né!"
10145-930 = "'Muito obrigada pela\nsua compra!'"
10145-940 = "Uaaah!\nDeixa a Kiki ver isso\ntambém!"
10145-950 = "Sim, aqui está!\nA Kiki fez um bom trabalho?"