[translation]
10145-10 = "Голубое небо, ослепительный солнечный свет — это лето.\nРаз уж так, как насчёт летнего отдыха?"
10145-20 = "Хех... Хотя я не знаю, о чём ты там думаешь."
10145-30 = "Что касается меня, я чувствую себя весьма легкомысленно."
10145-40 = "Прекрасное место, не так ли?"
10145-50 = "Особенно вооон там —"
10145-60 = "Перед лицом природы"
10145-70 = "невольно и болезненно вспоминаешь, насколько же мы на самом деле бессильны."
10145-80 = "Пока я с тобой, Сенсей, мне хорошо где угодно!"
10145-90 = "...Что такое? Ты собираешься просто смотреть?"
10145-100 = "У всех бывают моменты незрелости."
10145-110 = "Однако законам этого мира"
10145-120 = "нужно учиться непрерывно. Даже нам."
10145-130 = "Всё закончилось благополучно, верно?"
10145-140 = "Хех... но наш летний отдых"
10145-150 = "ведь только начинается, не так ли?"
10145-160 = "Хм? Что-то не так, Сенсей?"
10145-170 = "Хех, давай же. Не стесняйся и наслаждайся этим сколько душе угодно."
10145-180 = "Нежная кожа главы академии — заманчиво, правда?"
10145-190 = "Возможность приехать сюда вместе с тобой, Сенсей... это и правда похоже на сон."
10145-200 = "Хех... за этим не кроется никакого глубокого смысла."
10145-210 = "И я вовсе не чувствую себя плохо."
10145-220 = "Тебе стоит воспринимать мои слова буквально."
10145-230 = "В Шаньхайцзине синяя бабочка означает «бессмертие»."
10145-240 = "Это также можно перефразировать как"
10145-250 = "«не знающая поражения»."
10145-260 = "Хех. Ну, можешь считать это просто пустой болтовнёй."
10145-270 = "Прости, что заставила тебя потакать моему эгоизму, Сенсей."
10145-280 = "Я у тебя в долгу."
10145-290 = "Ах, верно... пожалуй, мне стоит извиниться заранее."
10145-300 = "...Потому что с этого момента я намерена быть ещё более эгоистичной."
10145-790 = "Привет, Сенсей! Это Кики!"
10145-800 = "Сегодня меня назначили главной в магазине!"
10145-810 = "Ась? Кисаки? Я не совсем уверена, кто это такая..."
10145-820 = "Добро пожаловать, Сенсей!"
10145-830 = "Я вовсю тружусь в магазине, знаешь ли! Погладь меня по голове, пожалуйста!"
10145-840 = "Спасибо, что пришёл!"
10145-850 = "Пожалуйста, осматривайся не спеша, чтобы ничего не пропустить!"
10145-860 = "Какая вещь тебе нравится, Сенсей? Что касается меня..."
10145-870 = "Если это выбрал ты, Сенсей, тогда мне это тоже нравится!"
10145-880 = "Я примерила купальник..."
10145-890 = "Ну как? Мне идёт? Я миленькая?"
10145-900 = "На самом деле Кики... не очень хорошо умеет плавать."
10145-910 = "О, мне это тоже было любопытно!"
10145-920 = "Ах! В такие моменты ведь полагается говорить именно это, верно!"
10145-930 = "«Спасибо за покупку!»"
10145-940 = "Ого! Пожалуйста, покажи и мне тоже!"
10145-950 = "Да, вот, держи! Я хорошо справилась, Кики?"