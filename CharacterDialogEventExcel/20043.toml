[translation]
20043-440 = "Vamos lá, Sensei!\nÉ ano novo!"
20043-450 = "Vamos começar a aventura\nem busca da gastronomia!"
20043-460 = "Tem algo que você queira comer?"
20043-470 = "Eu, por exemplo,\nquero comer tudo,\nabsolutamente tudo!"
20043-480 = "Só de ver o Sensei\ncomendo com tanto gosto,"
20043-490 = "eu me sinto\nmuito feliz!"
20043-500 = "Quando estou com o Sensei,\nhá tantas descobertas!"
20043-510 = "É como encontrar\num sabor novo,\nfico até com o coração acelerado!"
20043-520 = "Dizem que aventuras\nsão feitas para serem vividas com amigos!"
20043-530 = "Quando for partir para uma\naventura gastronômica,\nvamos juntos, Sensei!"
20043-540 = "Eu também sou\nparte do Clube de Pesquisa Gastronômica!"
20043-550 = "Não vou parar com a aventura\nde buscar novos sabores!"
20043-560 = "Esse é o meu caminho gastronômico!"
