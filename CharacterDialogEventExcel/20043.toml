[translation]
20043-440 = "さあ先生！\n新年だよ～！"
20043-450 = "美食を求める\n冒険をはじめよっか！"
20043-460 = "食べたいものとかある？"
20043-470 = "私はね、\nあれもこれも、\nぜーんぶ食べたい！"
20043-480 = "美味しそう～に\n食べる先生を\n見ているだけで、"
20043-490 = "すっごく幸せな\n気持ちになるんだ！"
20043-500 = "先生と一緒にいると、\n発見がいっぱい！"
20043-510 = "新しい味に\n出会ったときみたいに、\nドキドキする！"
20043-520 = "冒険は仲間と\n行くものなんだって！"
20043-530 = "美食の冒険に\n出るときは、\n先生も一緒に行こ～！"
20043-540 = "私も美食研究会の\n一員だもん！"
20043-550 = "新しい味を探す\n冒険はやめないよ！"
20043-560 = "それが私の、美食道！"
