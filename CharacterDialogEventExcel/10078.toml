[translation]
10078-10 = "ハーハッハッハッハ！\nまた会ったな、先生！"
10078-20 = "先生！こっちだこっち！\n待ちわびていたぞ～！"
10078-30 = "うん？何か用かな？"
10078-40 = "私が反撃しないと\n思って好き放題\nしおってからに……\n覚悟しておくのだな！"
10078-50 = "それは急かして\nいるのかな？"
10078-60 = "……後で\nちゃ～んと責任、\n取れるんだろうな？"
10078-70 = "ハーハッハッハッハ！\nくすぐるのを\nやめてくれ！\nくすぐったい！"
10078-80 = "うん？何か用かな？"
10078-90 = "私が反撃しないと\n思って好き放題\nしおってからに……\n覚悟しておくのだな！"
10078-100 = "それは急かして\nいるのかな？"
10078-110 = "……後で\nちゃ～んと責任、\n取れるんだろうな？"
10078-120 = "ハーハッハッハッハ！\nくすぐるのを\nやめてくれ！\nくすぐったい！"
10078-220 = "さあ、何をお探しかな？"
10078-230 = "さあ！ここにはなんでもあるぞ！\n無いもの以外はな！\nハーッハッハッハッ！"
10078-240 = "もう店じまいだからな！\nあるだけ持っていけ～！"
10078-250 = "ん？どうしたんだ？"
10078-260 = "よそ見をしていたら\n売り切れてしまうぞ！"
10078-270 = "うむ、やはりそれにしたのだな。\n先生は良い審美眼を持っている。"
10078-280 = "素晴らしい！"
10078-290 = "なるほど！それも悪くないな！"
10078-300 = "それが欲しかったのだな！"
