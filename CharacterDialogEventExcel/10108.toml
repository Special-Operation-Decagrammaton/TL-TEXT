[translation]
10108-10 = "Você veio,\nProfessor!"
10108-20 = "Eu não esperava que\no Professor viesse."
10108-30 = "Olá, Professor."
10108-40 = "Eu pensei em fazer\numa festa do pijama\njá que estamos aqui, mas..."
10108-50 = "As coisas ficaram\num pouco complicadas..."
10108-60 = "KOYUKI!!"
10108-70 = "Desta vez eu não\nvou te perdoar!"
10108-80 = "Professor, não tente\nme impedir, está bem!?"
10108-90 = "Conseguimos resolver\nde alguma forma..."
10108-100 = "Mais uma vez, o Professor\nme ajudou muito."
10108-110 = "A Koyuki, você diz?"
10108-120 = "......Desta vez, pretendo\ndeixar passar."
10108-130 = "Ah, você chegou.\nProfessor. Se quiser...\npor que não descansa um pouco?"
10108-140 = "Eh?\nMe ver assim é... novo para você?"
10108-150 = "Ah, muito\nobrigada."
10108-160 = "......Quando o Professor\ndiz isso..."
10108-170 = "Eu fico muito feliz."
10108-180 = "Você percebeu que eu sou\numa estudante do ensino médio?"
10108-190 = "O que você pensava\nde mim normalmente!?"
10108-200 = "Jogos de tabuleiro são divertidos\npor serem realistas, mas\né difícil cuidar das peças."
10108-210 = "No Millennium, tem muitas\nalunas que não são boas\nem organizar as coisas..."
10108-220 = "Ei, Professor?\nPode parar de cutucar\na minha barriga...?"
10108-230 = "...Se disser que eu engordei,\neu vou ficar muito brava."
10108-410 = "Encontrou o que precisava?"
10108-420 = "Estou organizando os suprimentos\npara o fim de ano, então se quiser,\npode levar o que precisar."
10108-430 = "Estou organizando os suprimentos\npara a festa do pijama."
10108-440 = "Professor, se precisar de algo,\né só me avisar."
10108-450 = "Olá, Professor."
10108-460 = "Verifique tudo até o fim\npara garantir que não esqueceu\nde nada!"
10108-470 = "Deveria ser a preparação da festa,\nmas parece que estou fazendo\ntrabalho de contabilidade..."
10108-480 = "Falando nisso, na loja de\nconveniência do Schale,"
10108-490 = "tinha uma garota cuidando\nde tudo sozinha, não é...?"
10108-500 = "Ela quase não saía do lugar,\nserá que ela está descansando\ncomo deveria?"
10108-510 = "Vai querer isso?"
10108-520 = "Um consumo racional."
10108-530 = "O recibo... ah,\neu guardo aqui para você."
10108-540 = "Vou anotar no livro\nde contas do Schale."
10108-550 = "Fufu, acho que vou conseguir\nanalisar o seu padrão de consumo, Professor."
