[translation]
10108-10 = "いらっしゃっ\nたんですね、\n先生！"
10108-20 = "まさか先生が来るとは\n思いませんでした。"
10108-30 = "こんにちは、先生。"
10108-40 = "せっかくだから\nパジャマパーティーを、\nと思ったんですが……"
10108-50 = "ちょっと厄介な\nことに\nなってしまって…。"
10108-60 = "コ～ユ～キ～！！"
10108-70 = "今度こそ\n許さないんだから！"
10108-80 = "先生も\n止めないで\nくださいね！？"
10108-90 = "なんとか\n解決できましたね……"
10108-100 = "今回も先生には\nお世話になりました。"
10108-110 = "コユキ、ですか？"
10108-120 = "……今回は、大目に\n見てあげるつもりです。"
10108-130 = "あ、いらしたんですね。\n先生。よかったら……\n少し休んでいきませんか？"
10108-140 = "えっ？\nこういう私も新鮮……？"
10108-150 = "あ、ありがとう\nございます。"
10108-160 = "……先生に\nそう言われると……"
10108-170 = "嬉しいですね、すごく。"
10108-180 = "あらためて私が女子\n高生だって実感した…？"
10108-190 = "普段は私のこと、どう\n思っていたんですか！？"
10108-200 = "ボードゲームは現実味が\nあって楽しいけど、\n駒の管理が大変ですね。"
10108-210 = "ミレニアムには、\n整理整頓が苦手な子、\n多いんですよね……。"
10108-220 = "あの、先生？\nお腹周り、つつくの、\nやめてくれませんか…？"
10108-230 = "…太ったとか言ったら、\n本気で怒りますからね。"
10108-410 = "必要なものはありましたか？"
10108-420 = "年末を迎えて備品を\n整理しているので、よかったら\n持っていってください。"
10108-430 = "パジャマパーティーのために\n備品を整理してるんです。"
10108-440 = "先生も必要なものが\nあれば言ってくださいね。"
10108-450 = "こんにちは、先生。"
10108-460 = "やり残したことはないか、\n最後まで\nチェックしていってくださいね！"
10108-470 = "パーティー準備のはずなのに、\nなんだか会計の仕事を\nしているみたいです……。"
10108-480 = "そういえばシャーレの\nコンビニも、"
10108-490 = "女の子が１人で売り場管理を\nしてましたよね……？"
10108-500 = "ほとんど席を外\nしてなかったのですが、\nちゃんと休めてるのでしょうか。"
10108-510 = "それにしますか？"
10108-520 = "合理的な消費ですね。"
10108-530 = "領収証は……\nあ、こっちで取っておきますね。"
10108-540 = "シャーレの家計簿に\n書いておきます。"
10108-550 = "ふふっ、先生の消費パターンが\n分析できそうです。"
