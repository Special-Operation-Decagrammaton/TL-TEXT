[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10046-100 = "Meu Mestre~! Aqui!\nÉ aqui!\nA Izuna preparou um lugarzinho\nespecial pra gente!"
10046-110 = "Ah, eu estava te esperando!\nMeu Mestre!\nA Izuna já está pronta!\nPor favor, me dê as suas ordens!"
10046-120 = "Uma casa de praia como\nnossa base desta vez...!"
10046-130 = "Ouvir a palavra 'base' dá um\ntoque tão ninja à missão!"
10046-140 = "Humhumhum~♪\nTem taaaanta comida\ngostosa na casa de praia!"
10046-150 = "O que o Meu Mestre quer\ncomer primeiro?\nRaspadinha? Takoyaki?"
10046-160 = "Desde que eu esteja com o Meu Mestre,\na Izuna vai achar tudo delicioso!"
10046-170 = "Aquela postura de quem enfrenta qualquer\nperigo ou dificuldade de frente..."
10046-180 = "Será que...\na Senhorita Shizuko...\ntambém é uma ninja nas sombras?"
10046-190 = "Por favor, me dê qualquer ordem!"
10046-200 = "Eu vou resolver tudo rapidinho\ncomo uma verdadeira ninja!"
10046-210 = "A Izuna vai se esforçar pra não\nperder pra ninguém!\nNin-nin!"
10046-220 = "Este verão foi recheado\nde coisas incríveis!\nMeus olhos estão até girando\nde tanta emoção e diversão..."
10046-230 = "...Eu me diverti tanto todos os dias!\nEhehe!\nMuito obrigada por tudo,\nMeu Mestre!"
10046-240 = "Uma casa de praia como\nnossa base desta vez...!"
10046-250 = "Ouvir a palavra 'base' dá um\ntoque tão ninja à missão!"
