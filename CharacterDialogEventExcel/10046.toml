[translation]
10046-100 = "Mestre~! Por aqui!\nPor aqui!\nEu, Izuna, preparei\num assento para você!"
10046-110 = "Ah, eu estava\nte esperando! Mestre!\nEstou pronta!\nPor favor, pode pedir!"
10046-120 = "A casa de praia é a\nnossa base desta vez...!"
10046-130 = "Ouvir a palavra 'base'\nfaz parecer algo de ninja!"
10046-140 = "Hum hum hum~♪\nA casa de praia tem\nmuitos pratos diferentes!"
10046-150 = "Do que você gosta,\nMestre?\nRaspadinha? Takoyaki?"
10046-160 = "Para mim, Izuna, tudo fica\ngostoso se estiver com você!"
10046-170 = "Aquele jeito de enfrentar\nqualquer perigo ou dificuldade\nde frente..."
10046-180 = "Será que...\nA Shizuko-dono\né uma ninja?"
10046-190 = "Pode pedir o que quiser!"
10046-200 = "Vou resolver tudo\nrapidamente, como\numa ninja!"
10046-210 = "Eu também vou me esforçar\npara não perder para ninguém!\nNin-nin!"
10046-220 = "Este verão teve\nmuitas coisas incríveis!\nMeus olhos estão até\nficando tontos de tanta coisa..."
10046-230 = "...Eu, Izuna, me diverti\nmuito todos os dias! Ehehe!\nMuito obrigada!\nMestre!"
