[translation]
10046-100 = "主殿～！こっち！\nこっちですー！\nこちらにイズナが、\nお席をご用意しました！"
10046-110 = "あっ、お待ちして\nおりました！主殿！\nイズナは準備できて\nおります！どうぞご用命を！"
10046-120 = "海の家が、\n今回の拠点……！"
10046-130 = "拠点と聞くと、何だか\n忍者っぽいですね！"
10046-140 = "ふんふんふん～♪\n海の家は色んな\n料理がいっぱいですね！"
10046-150 = "主殿はどんなものが\n好きですか？\nかき氷？たこ焼き？"
10046-160 = "イズナは、主殿と一緒なら\n何でも美味しいです！"
10046-170 = "どんな危険や苦難に\n直面しても真正面から\n立ち向かうあの姿……"
10046-180 = "もしかして……\nシズコ殿は、\n忍者なのでは？"
10046-190 = "何でもご用命ください！"
10046-200 = "忍者のように\nサササッと解決して\nみせましょう！"
10046-210 = "イズナもみんなに\n負けないよう頑張ります！\nニンニン！"
10046-220 = "この夏は、すごいことが\nたくさんでした！\nもうイズナの目は\n回ってしまいそうなほどで……。"
10046-230 = "……イズナは毎日、とっても\n楽しかったです！えへへっ！\nありがとうございました！\n主殿！"
10046-240 = "海の家が、\n今回の拠点……！"
10046-250 = "拠点と聞くと、何だか\n忍者っぽいですね！"
