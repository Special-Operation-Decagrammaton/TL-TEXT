20029-670 = "お待ちしておりました。\n先生。"
20029-680 = "ふふ。お祭り運営委員会の\nみなさんを手伝うのも\n楽しいですね。"
20029-690 = "リゾート狩り…\nとんでもないことに\nなってしまっていますね…"
20029-700 = "いいえ、こういう時こそ\n気を引き締めなければ\nなりませんね。"
20029-710 = "最初から、不安じゃ\nなかったといえば\n嘘ですが…"
20029-720 = "これもすべて、\n先生がいてくださった\nおかげです。"
20029-730 = "夏の海の思い出…\n素敵な言葉ですね。"
20029-740 = "今年は特に、\n強くそう思いました。"
20029-750 = "先生？\nお呼びでしょうか？"
20029-760 = "いつでもお声がけ\nくださいね。"
