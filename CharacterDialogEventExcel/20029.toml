[translation]
20029-330 = "あ、おかえりなさい、\n先生。"
20029-340 = "海の家ですよ。頑張って\n準備いたしました！"
20029-350 = "お待ちしておりました。\n先生。"
20029-360 = "ふふ。お祭り運営委員会の\nみなさんを手伝うのも\n楽しいですね。"
20029-370 = "先生？\nお呼びでしょうか？"
20029-380 = "いつでもお声がけ\nくださいね。"
20029-390 = "結構暑いですね…\n熱中症にはお気を\nつけください、先生。"
20029-400 = "…いざとなったら\n私がお世話しますよ。"
20029-410 = "シズコちゃん…\n大丈夫でしょうか？\n少し、心配です。"
20029-420 = "事件を解決するのは…\n難しい気もしますが、"
20029-430 = "皆さんと協力すれば、\nきっと大丈夫ですよね。"
20029-440 = "今こそ修行の成果を\n見せるとき、\nかもしれませんね。"
20029-650 = "あ、おかえりなさい、\n先生。"
