[translation]
20029-330 = "Ah, bem-vindo de volta,\nSensei."
20029-340 = "É a casa de praia. Eu me esforcei\npara preparar tudo!"
20029-350 = "Estávamos esperando por você,\nSensei."
20029-360 = "Hehe. Ajudar o pessoal do\nComitê Organizador do Festival\ntambém é divertido."
20029-370 = "Sensei?\nVocê me chamou?"
20029-380 = "Sinta-se à vontade para me chamar\na qualquer momento."
20029-390 = "Está bem quente, não é...\nPor favor, tome cuidado com\na insolação, Sensei."
20029-400 = "...Se for preciso,\neu cuidarei de você."
20029-410 = "Shizuko-chan...\nSerá que ela está bem?\nEstou um pouco preocupada."
20029-420 = "Resolver esse incidente...\nSinto que será difícil, mas,"
20029-430 = "se cooperarmos com todos,\ncom certeza vai dar tudo certo."
20029-440 = "Talvez este seja o momento\nde mostrar os resultados\ndo meu treinamento."
20029-650 = "Ah, bem-vindo de volta,\nSensei."
20029-660 = "É a casa de praia. Eu me esforcei\npara preparar tudo!"
20029-670 = "Estávamos esperando por você,\nSensei."
20029-680 = "Hehe. Ajudar o pessoal do\nComitê Organizador do Festival\ntambém é divertido."
20029-690 = "Caça ao resort...\nAs coisas tomaram um rumo\nabsurdo, não é..."
20029-700 = "Não, é justamente nessas horas\nque precisamos manter\na calma e o foco."
20029-710 = "Dizer que não fiquei ansiosa\ndesde o início seria\numa mentira, mas..."
20029-720 = "Tudo isso é graças\nà sua presença aqui,\nSensei."
20029-730 = "Memórias de verão na praia...\nQue palavras maravilhosas."
20029-740 = "Este ano, em especial,\neu senti isso com força."
20029-750 = "Sensei?\nVocê me chamou?"
20029-760 = "Sinta-se à vontade para me chamar\na qualquer momento."
20029-770 = "Está bem quente, não é...\nPor favor, tome cuidado com\na insolação, Sensei."
20029-780 = "...Se for preciso,\neu cuidarei de você."
20029-790 = "Shizuko-chan...\nSerá que ela está bem?\nEstou um pouco preocupada."
20029-800 = "Resolver esse incidente...\nSinto que será difícil, mas,"
20029-810 = "se cooperarmos com todos,\ncom certeza vai dar tudo certo."
20029-820 = "Talvez este seja o momento\nde mostrar os resultados\ndo meu treinamento."
