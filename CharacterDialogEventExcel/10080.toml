[translation]
10080-100 = "待ってたわよぉ、先生。\nそれじゃ始めましょうか？"
10080-110 = "なにか\n手伝いましょうかぁ？"
10080-120 = "これはコッチの話だから、\n協力するゾ☆"
10080-130 = "うまくいってる～？"
10080-140 = "そろそろ終わりが\n見えてきたかしら？"
10080-150 = "やり残したことはないか、\nもう一回確認して\nみるといいゾ☆"
10080-160 = "へぇ？\nそういう事\nしちゃうんだぁ。"
10080-170 = "他にやることが\nあるんじゃなぁい？"
10080-180 = "……私の我慢にも\n限界があるんだゾ☆"
10080-190 = "……あらあら。\nこれ、大丈夫かしらぁ？"
10080-480 = "進捗を確認してみましょうかぁ。"
10080-490 = "確認にきたのねぇ。\n何か手伝いましょうかぁ？"
10080-500 = "諦め、って言葉を知らない\n感じかしらぁ？"
10080-510 = "へぇ……？"
10080-520 = "なかなか頑張ったんじゃなぁい？\n褒めてつかわすゾ☆"
10080-530 = "少しは役に立んじゃなぁい？"
