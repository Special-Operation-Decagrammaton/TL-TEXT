[translation]
20020-10010 = "では、\n特異現象捜査部としての\n活動を始めましょうか。"
20020-10020 = "ふふっ。お待ちして\nおりましたよ、先生。"
20020-10030 = "……ああ、只今データの\n分析中ですので\n少々お待ちを。"
20020-10040 = "なるほど、\n興味深いですね……"
20020-10050 = "これがこうなって、\nふむ……"
20020-10060 = "デカグラマトン……\n厄介な相手ですね。"
20020-10070 = "リスクは\nありそうですが……"
20020-10080 = "ふふっ、尚のこと\n興味深いですね。"
20020-10090 = "新たなデータが\n入手できたようですね。"
20020-10100 = "さて、今回はどんな\nデータなのでしょうか。"
20020-10110 = "次の目標が\n決まりましたね。"
20020-10120 = "では、次の段階に\n進みましょう。"
20020-10510 = "新たな任務、\nそして新たな環境……"
20020-10520 = "…さあ、\nはじめましょう。先生。"
20020-10530 = "先生、手を\n貸していただけますか？"
20020-10540 = "あら、超天才清楚系\n病弱美少女だって、"
20020-10550 = "人の手が\n必要なんですよ？"
20020-10560 = "こんにちは、先生。"
20020-10570 = "ここが私たちの\n新しい基地です。"
20020-10580 = "条件の増加を\n確認しました。"
20020-10590 = "どこまで変数を\n抑えられるか…\n慎重にいきましょう。"
20020-10600 = "情報は多いほど歓迎、\nではありますが……"
20020-10610 = "あまり一気に渡されると、\nそれはそれで\n困ってしまいます。"
20020-10620 = "少し疲れましたね……"
20020-10630 = "こんな時に甘えさせて\nくれる先生がいたら\nとても嬉しいのですが。"
20020-10640 = "最高のハッカーであり、\n最高の美少女である私に"
20020-10650 = "最高のパートナーが\n不在だなんて、"
20020-10660 = "由々しき事態です。\nですので先生には私の…"
20020-10670 = "なんでもありません…\n今のは忘れてください。"
20020-10680 = "新しい局面に入った…\nといった\nところでしょうか。"
20020-11550 = "ここでは、\n先生に集めていただいた"
20020-11560 = "「物質」の分析を\n行っております。"
20020-11570 = "おかえりなさい、先生。\nはぁ……待ちくたびれましたよ。"
20020-11580 = "サンプルの収集は進みましたか？\nこちらにお願いしますね。"
20020-11590 = "いつもご協力\nありがとうございます、先生。"
20020-11600 = "さて、\nどんな情報が出てくることやら。"
20020-11610 = "おかげさまで調査は順調です。\nそれにしてもこの現象…\n実に興味深いですね。"
20020-11620 = "はぁ、まさか分析が\n追いつかなくなるとは……"
20020-11630 = "なんて贅沢な\n環境なのでしょう。"
20020-11640 = "探求とは、\nいつも胸躍るもの。"
20020-11650 = "そこに先生が\nご一緒してくださるのであれば…\nふふっ、言うまでもありません。"
20020-11660 = "分析完了です。\nどうぞ持っていってください。"
20020-11670 = "解釈結果はお気に召しましたか？\nふふ、またお越しください。"
20020-11680 = "先生のために丹精\n込めて分析いたしました。\nはい、受け取ってください。"
20020-11690 = "……こ、公私は分けている\nつもりですとも、ええ。"
20020-11700 = "先生にサンプルを\n集めていただいて、"
20020-11710 = "私たちはそれを分析し、\nお渡しする……"
20020-11720 = "「物々交換」の成立ですね。"
20020-11730 = "毎度ありがとうございます。\n……いかがでしたか？"
20020-11740 = "超天才清楚系病弱美少女の\n一日店番サービスは。"
20020-12200 = "分析の方向を\n少し変えてみました。"
20020-12210 = "偶然と必然、\n絶対論と相対論…"
20020-12220 = "魅力的な題材です。\nそうは思いませんか？\n先生。"
20020-12230 = "先生も運試しを\nしてみては？"
20020-12240 = "占星術によると今日の\nラッキーカラーは…"
20020-12250 = "…え？それは大丈夫…？"
20020-12260 = "確率や統計は、\n物事の大半を\n決定づけるものです。"
20020-12270 = "占星術はもちろん、\n「くじ引き」とて……\n例外ではありません。"
20020-12280 = "全ては統制されるべき…\nという言葉に、\n私は反対です。"
20020-12290 = "まだ見ぬ世界との\n遭遇にこそ、"
20020-12300 = "価値があると\n思っておりますので。"
20020-12310 = "未知の領域……\n心惹かれるものです。"
20020-12320 = "科学によって多くの\n謎が解き明か\nされたとしても、"
20020-12330 = "未知の領域というのは\n依然として\n残り続けるものです。"
20020-12340 = "……そうでないと、\n退屈して\nしまいますから。"
20020-12350 = "いつしか私たちは、\n目標地点にたどり着き、"
20020-12360 = "そして…更なる目標の\n誕生を目撃する\nことでしょう。"
20020-12370 = "おめでとうございます、\n先生。結果を\n予想できたとはいえ、"
20020-12380 = "成果を実感する瞬間は、\n喜んでも良いのでは\nないでしょうか？"
20020-12390 = "あら、これは\nいわゆる「当たり」、\nなのですね？"
20020-12400 = "統計学上、当たり前の\n結果だとしても"
20020-12410 = "そこから喜びを\n感じるのは私たちの自由……。"
20020-12420 = "素晴らしいです、先生。\n私も嬉しいです。"
20020-12430 = "「特別」を\n感じられるのは、\n「普通」があるから。"
20020-12440 = "ですので、「普通」を\n大切にしてくださいね。\n先生。"
20020-12450 = "…ついでに、苦労してる\n超天才清楚系\n病弱美少女のことも。"
