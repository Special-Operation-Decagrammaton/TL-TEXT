[translation]
20020-10010 = "Então, vamos começar\nas atividades como o\nDepartamento de Investigação de Fenômenos Estranhos?"
20020-10020 = "Fufu. Eu estava\nesperando por você, Sensei."
20020-10030 = "……Ah, estou analisando\nos dados agora, então\nespere um pouco."
20020-10040 = "Entendo,\ninteressante……"
20020-10050 = "Isso leva àquilo,\nhum……"
20020-10060 = "Decagrammaton……\nUm oponente problemático."
20020-10070 = "Parece haver\nriscos, mas……"
20020-10080 = "Fufu, isso torna tudo\nainda mais interessante."
20020-10090 = "Parece que novos dados\nforam obtidos."
20020-10100 = "Bem, que tipo de dados\nserão desta vez?"
20020-10110 = "O próximo objetivo\nfoi decidido."
20020-10120 = "Então, vamos avançar\npara a próxima etapa."
20020-10510 = "Uma nova missão,\ne um novo ambiente……"
20020-10520 = "…Vamos lá,\ncomeçar. Sensei."
20020-10530 = "Sensei, poderia me\ndar uma mão?"
20020-10540 = "Ora, até mesmo uma garota\nsuper genial, pura e frágil"
20020-10550 = "precisa de ajuda,\nsabe?"
20020-10560 = "Olá, Sensei."
20020-10570 = "Esta é a nossa\nnova base."
20020-10580 = "Confirmei o aumento\nnas condições."
20020-10590 = "Até onde conseguiremos\ncontrolar as variáveis…\nVamos com cautela."
20020-10600 = "Quanto mais informações,\nmelhor, mas……"
20020-10610 = "Se me derem tudo de uma vez,\nisso acaba sendo\nproblemático."
20020-10620 = "Estou um pouco cansada……"
20020-10630 = "Seria muito bom se houvesse um Sensei\npara me mimar\nem momentos assim."
20020-10640 = "Para mim, que sou a melhor hacker\ne a melhor garota,"
20020-10650 = "o fato de não ter\no melhor parceiro,"
20020-10660 = "é uma situação grave.\nPor isso, Sensei, a minha…"
20020-10670 = "Não é nada…\nEsqueça o que eu disse."
20020-10680 = "Entramos em uma\nnova fase…\nEu diria."
20020-11550 = "Aqui, realizamos a análise\ndos \"materiais\""
20020-11560 = "que você, Sensei,\ncoletou."
20020-11570 = "Bem-vindo de volta, Sensei.\nAh…… cansei de esperar."
20020-11580 = "A coleta de amostras avançou?\nPor favor, entregue-as aqui."
20020-11590 = "Obrigada pela sua\ncooperação de sempre, Sensei."
20020-11600 = "Bem, que tipo de informações\nserá que vão surgir?"
20020-11610 = "Graças a você, a investigação está indo bem.\nMas, ainda assim, esse fenômeno…\né realmente interessante."
20020-11620 = "Ah, quem diria que a análise\nnão conseguiria acompanhar……"
20020-11630 = "Que ambiente\nluxuoso."
20020-11640 = "A busca pelo conhecimento\né sempre empolgante."
20020-11650 = "Se você, Sensei,\nestiver comigo nisso…\nFufu, nem preciso dizer."
20020-11660 = "Análise concluída.\nPor favor, pode levar."
20020-11670 = "Gostou do resultado da interpretação?\nFufu, volte sempre."
20020-11680 = "Analisei com todo o cuidado\npara você, Sensei.\nAqui, pode pegar."
20020-11690 = "……E-eu pretendo separar\nminha vida pessoal da profissional, sim."
20020-11700 = "Você, Sensei, coleta\nas amostras,"
20020-11710 = "e nós as analisamos\ne entregamos a você……"
20020-11720 = "É uma \"troca comercial\"\nestabelecida."
20020-11730 = "Obrigada como sempre.\n……O que achou?"
20020-11740 = "Do serviço de atendente de um dia\nda garota super genial, pura e frágil."
20020-12200 = "Eu mudei um pouco a direção da análise."
20020-12210 = "Acaso e necessidade, absolutismo e relativismo..."
20020-12220 = "São temas fascinantes. Você não acha, Sensei?"
20020-12230 = "Por que você não tenta a sorte também, Sensei?"
20020-12240 = "De acordo com a astrologia, a cor da sorte de hoje é..."
20020-12250 = "...Hã? Isso é seguro...?"
20020-12260 = "Probabilidade e estatística são coisas que determinam a maior parte dos eventos."
20020-12270 = "A astrologia, é claro, e até mesmo um \"sorteio\"... não são exceções."
20020-12280 = "Eu discordo da ideia de que tudo deve ser controlado."
20020-12290 = "Pois é justamente no encontro com o mundo ainda desconhecido,"
20020-12300 = "que eu acredito que reside o valor."
20020-12310 = "O desconhecido... é algo que me fascina."
20020-12320 = "Mesmo que muitos mistérios tenham sido desvendados pela ciência,"
20020-12330 = "o reino do desconhecido ainda continuará existindo."
20020-12340 = "......Se não fosse assim, seria entediante."
20020-12350 = "Algum dia, chegaremos ao nosso objetivo,"
20020-12360 = "e então... testemunharemos o nascimento de um novo objetivo."
20020-12370 = "Parabéns, Sensei. Embora eu pudesse prever o resultado,"
20020-12380 = "não acha que está tudo bem se alegrar no momento em que sente o resultado?"
20020-12390 = "Ora, isso é o que chamam de \"vencer\", não é?"
20020-12400 = "Mesmo que seja um resultado óbvio pela estatística,"
20020-12410 = "sentir alegria por isso é um direito nosso..."
20020-12420 = "Isso é maravilhoso, Sensei. Eu também estou feliz."
20020-12430 = "Só podemos sentir o \"especial\" porque o \"comum\" existe."
20020-12440 = "Portanto, por favor, valorize o \"comum\". Sensei."
20020-12450 = "...E, de quebra, valorize também a super gênio, pura, frágil e bela garota que está se esforçando."
