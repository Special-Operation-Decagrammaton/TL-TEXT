[translation]
10141-300 = "い、いつでもいけます！"
10141-310 = "な、なんでも\n言ってください……！"
10141-320 = "あ、ありがとう\nございます……！"
10141-330 = "えっ、あ、えっと……\n来てくださった\nことに対して、です。"
10141-340 = "すみません！すみません！\nわ、私のせい、\nですよね……？"
10141-350 = "爆弾……弾薬……必要な\n物があれば何なりと……！"
10141-360 = "なんだか大変な騒ぎに\nなっていますね……。"
10141-370 = "これを楽しいと\n思うのは……\n変、でしょうか？"
10141-380 = "そういえば……\nオペラ……"
10141-390 = "どんな\n内容だったんでしょう？"
