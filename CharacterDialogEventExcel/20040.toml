[translation]
20040-330 = "いらっしゃい、先生。好きなだけ見ていって頂戴。"
20040-340 = "私たち万魔殿が手掛けたパーティーだもの。"
20040-350 = "先生も気に入るに決まってるわ。"
20040-360 = "ふ～ん、そんなにちょっかいを出して…"
20040-370 = "何をされたいの？"
20040-380 = "先生は、なにをご所望かしら？"
20040-390 = "ふふっ、先生…私に催眠をかけてみなさい。"
20040-400 = "もちろん私には効かな…"
20040-410 = "うん？遠慮しておく？"
20040-420 = "ふふっ、そんなこと言わずに…ほらほら。"
20040-430 = "そんな風にぼんやりしていたら、マコトちゃんに絡まれてしまうわよ？"
20040-440 = "ほら、こっちに来なさい。"
20040-1120 = "いらっしゃい、先生。\n好きなだけ\n見ていって頂戴。"
20040-1130 = "私たち万魔殿が\n手掛けた\nパーティーだもの。"
20040-1140 = "先生も気に入るに\n決まってるわ。"
20040-1150 = "あら、進捗が\n芳しくないようね。"
20040-1160 = "まあ、\nマコトちゃんが\nなんとか\nするんじゃない？"
20040-1170 = "ここで先生の\n手を借りることに\nなるなんてね。"
20040-1180 = "ふふっ、\n頼んだわよ、先生？"
20040-1190 = "パーティーは\nこれで終わり。"
20040-1200 = "ね？私の言ったとおり、\nなんとか\nなったでしょう？"
20040-1210 = "ふ～ん、そんなに\nちょっかいを出して…"
20040-1220 = "何をされたいの？"
20040-1230 = "先生は、なにを\nご所望かしら？"
20040-1240 = "ふふっ、先生…\n私に催眠を\nかけてみなさい。"
20040-1250 = "もちろん私には\n効かな…"
20040-1260 = "うん？\n遠慮しておく？"
20040-1270 = "ふふっ、そんなこと\n言わずに…ほらほら。"
20040-1280 = "そんな風に\nぼんやりしていたら、\nマコトちゃんに\n絡まれてしまうわよ？"
20040-1290 = "ほら、こっちに\n来なさい。"
