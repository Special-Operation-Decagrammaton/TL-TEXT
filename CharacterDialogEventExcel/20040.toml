[translation]
20040-1120 = "Bem-vindo, Sensei.\nSinta-se à vontade\npara olhar o quanto quiser."
20040-1130 = "Afinal, é uma festa\norganizada por nós,\no Pandemonium."
20040-1140 = "Tenho certeza de que\nvocê também vai gostar."
20040-1150 = "Ora, parece que o progresso\nnão está indo muito bem."
20040-1160 = "Bem, a Makoto-chan\nnão vai dar um jeito\nnisso?"
20040-1170 = "Quem diria que teríamos\nque pedir a ajuda do\nSensei aqui."
20040-1180 = "Fufu, estou contando\ncom você, Sensei."
20040-1190 = "A festa\nacaba aqui."
20040-1200 = "Viu? Como eu disse,\nno fim das contas\ndeu tudo certo, não deu?"
20040-1210 = "Hmm, você está\nme provocando tanto assim..."
20040-1220 = "O que você quer\nque eu faça?"
20040-1230 = "O que você deseja,\nSensei?"
20040-1240 = "Fufu, Sensei...\nTente me hipnotizar."
20040-1250 = "Claro que não vai\nfuncionar em mim..."
20040-1260 = "Hm? Vai\nrecusar?"
20040-1270 = "Fufu, não diga isso...\nVamos, vamos."
20040-1280 = "Se ficar aí\nmoscando desse jeito,\na Makoto-chan vai\nacabar te importunando, sabe?"
20040-1290 = "Vamos, venha\npara cá."
