[translation]
20039-240 = "Bem-vindo a Shanhaijing,\nSensei."
20039-250 = "Aproveite o Festival do Luar\no quanto quiser."
20039-260 = "Se estiver em dúvida sobre para onde ir,\npeça-me ajuda."
20039-270 = "Eu providenciarei alguém imediatamente."
20039-280 = "Quem diria que as coisas\nchegariam a este ponto..."
20039-290 = "Sinto muito por causar problemas ao Sensei."
20039-300 = "Você... ficará ao meu lado,\nnão é?"
20039-310 = "Tudo o que vai,\nvolta para si mesmo..."
20039-320 = "Vamos, vamos recuperar\na nossa Shanhaijing."
20039-330 = "Você se esforçou muito,\nSensei."
20039-340 = "Como líder da Genryumon,\ne como uma\naluna,"
20039-350 = "ofereço-lhe meu sincero respeito\ne gratidão."
20039-360 = "No Festival do Luar, inúmeras\nhistórias se cruzam."
20039-370 = "Fufu, se tem interesse, por que não\naproveita a oportunidade\npara investigar?"
20039-380 = "A Associação Genbu está aproveitando o Festival do Luar\npara aprofundar os laços\ncom o exterior."
20039-390 = "Como líder, não tomei\nnenhuma posição\nespecífica, mas..."
20039-400 = "Genryumon e Associação Genbu,\nquem está errado...\nHumm."
20039-410 = "Perdoe-me, Sensei.\nMesmo sendo a líder,\nnão consigo prever\ntudo..."
20039-420 = "Enquanto eu for a líder,\ngarantirei a segurança\nem Shanhaijing."
20039-430 = "Não importa quem seja o oponente."
20039-440 = "Claro, o Sensei também\nnão é exceção."
20039-640 = "Você veio. Agora é..."
20039-650 = "Pois é. Devo dizer que é\na hora de recarregar as energias? Fufu."
20039-660 = "Preparei algo divertido\npara você."
20039-670 = "Aproveite\no quanto quiser."
20039-680 = "...Mas, cuidado para não\ncomer demais, viu?"
20039-690 = "Ainda temos tempo."
20039-700 = "Vamos ficar juntos até o fim."
20039-710 = "Aconteceu algo?\nSensei."
20039-720 = "...Humm, quer que eu\nprove primeiro?"
20039-730 = "Você sabe o que isso\nsignifica, não sabe?\nFufu."
20039-740 = "Eu não me importo."
20039-750 = "Sensei, quer um pouco também?"
20039-760 = "Eu já provei.\nPode ficar tranquilo,\nfufu."
20039-770 = "Quando se fala em especialidades do Festival do Luar,\nfalamos de doces."
20039-780 = "Vamos procurar\nalguns juntos?"
20039-790 = "Aprender coisas novas\né algo bom."
20039-800 = "Não acha?"
20039-810 = "Sensei, você gosta\nde doces?"
20039-820 = "Eu... gosto mais ou menos."
20039-830 = "Oh, isso é interessante."
20039-840 = "Você me deixaria\nprovar também?"
20039-850 = "Muito bem, Sensei."
20039-860 = "Mas você não ficará\nsatisfeito apenas com isso.\nNão é?"
20039-870 = "Rotina, é? ...Por que eu\nestou aqui?"
20039-880 = "Porque este também é\ndever da líder."
20039-890 = "Renovar-se a cada dia,\ne renovar-se novamente dia após dia—"
20039-900 = "Significa que devemos sempre\navançar e nos renovar."
20039-910 = "Se precisar de ajuda,\nestarei sempre à disposição."
20039-920 = "O que foi, Sensei?\nQuer tentar me fazer cócegas?"
20039-930 = "Fufu. Que sujeito\nindelicado."
20039-940 = "…Mas, eu perdoarei."
20039-950 = "Quer brincar comigo?"
20039-960 = "Muito bem, pode fazer o quanto quiser.\nAfinal, somos eu e o Sensei."
20039-970 = "…Quando houver outras pessoas por perto,\ntenha modos, entendeu?"
20039-980 = "Ah. Já que foi você quem conquistou isso,\npode levar sem hesitar."
20039-990 = "Você é uma pessoa sincera."
20039-1000 = "Se fosse possível, eu gostaria\nque ficasse ao meu lado…"
20039-1010 = "Não, esqueça o que eu disse."
