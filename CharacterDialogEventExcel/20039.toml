[translation]
20039-240 = "山海経へ\nよくぞ参った、先生。"
20039-250 = "月影祭を心ゆくまで\n楽しんでいくと良い。"
20039-260 = "行き先に悩んだ時には\n妾に申し付けよ。"
20039-270 = "すぐに人を手配しよう。"
20039-280 = "こんなことに\nなろうとはな…"
20039-290 = "先生には迷惑をかける。"
20039-300 = "其方は…妾のそばに\n居てくれるのじゃろう？"
20039-310 = "すべては巡り巡って\n己に帰ってくるもの…"
20039-320 = "さあ、我が山海経を\n取り戻しにゆこうか。"
20039-330 = "ほんにご苦労じゃった、\n先生。"
20039-340 = "玄龍門の門主として、\nそして一人の\n生徒として、"
20039-350 = "其方に心からの敬意と、\n感謝を。"
20039-360 = "月影祭では数多の\n物語が交差する。"
20039-370 = "ふふ、興味があるのなら\nこれを機に調べて\nみてはどうじゃ？"
20039-380 = "玄武商会は月影祭に\n乗じて外部と交流を\n深めようとしておる。"
20039-390 = "門主として、\n特段立場は\n表明しておらぬが…"
20039-400 = "玄龍門と玄武商会、\nどちらに非が\nあるものか…ふむ。"
20039-410 = "すまぬ、先生。\n門主といえども、\nすべてを見通せる\nわけではないのじゃ…。"
20039-420 = "妾が門主として居る間は、\n山海経での安全を\n保証しよう。"
20039-430 = "相手が誰であろうとな。"
20039-440 = "無論、先生も\n例外ではない。"
20039-640 = "来たのじゃな。\n今は…"
20039-650 = "そうさな。\n補充の時、\nと言うべきかの。ふふ。"
20039-660 = "其方のために\nお楽しみを用意した。"
20039-670 = "存分に\n楽しんでいくが良い。"
20039-680 = "…じゃが、\n食べ過ぎには\n注意じゃぞ？"
20039-690 = "まだ時間はある。"
20039-700 = "最後まで共にいよう。"
20039-710 = "どうかしたのか？\n先生。"
20039-720 = "…ふむ、まずは妾に\n食べてみてほしい？"
20039-730 = "それが何を\n意味するのか――\n分かっているのかえ？\nふふ。"
20039-740 = "妾は構わぬぞ？"
20039-750 = "先生も一つどうじゃ？"
20039-760 = "味見はしてある。\n安心すると良い、\nふふっ。"
20039-770 = "月影祭の名物といえば\nおやつじゃ。"
20039-780 = "さあ、一緒に\n探してみようかの？"
20039-790 = "新しきを知るのは\n良いことじゃ。"
20039-800 = "そうじゃろう？"
20039-810 = "先生は甘いものは\n好きかえ？"
20039-820 = "妾は…そこそこじゃな。"
20039-830 = "ほう、興味深いのう。"
20039-840 = "妾にも味見させて\nくれるかえ？"
20039-850 = "よくやった、先生。"
20039-860 = "じゃが、其方はこれで\n満足などしない。\nそうじゃろう？"
20039-870 = "日課、じゃな？\n…なぜ妾がここに 居るのか？"
20039-880 = "これも門主の\n務めじゃからの。"
20039-890 = "日々新たにして、\nまた日に新たなり――"
20039-900 = "日々新しく前に\n進むべきという意味じゃ。"
20039-910 = "手助けが必要なら\nいつでも力になるぞ？"
20039-920 = "なんじゃ、先生。\n妾をくすぐってみたいのかえ？"
20039-930 = "ふふ。なんとも\n無礼なヤツじゃ"
20039-940 = "…じゃが、許そう。"
20039-950 = "じゃれ合いたいのか？"
20039-960 = "よい、好きなだけしてみせよ。\n妾と先生のことじゃからのう。"
20039-970 = "…他に人がいる時は、\nわきまえるんじゃぞ？"
20039-980 = "ああ。其方がやり遂げたのだから\n遠慮せず持っていくがよい。"
20039-990 = "其方は誠実じゃな。"
20039-1000 = "やはり出来ることなら\n妾のそばに…"
20039-1010 = "いや、忘れてくれ。"
