[translation]
10113-10 = "ようこそ、\nゲヘナ学園へ。"
10113-20 = "どうか平和な時間を\n過ごせますように。"
10113-30 = "……。"
10113-40 = "本心ですよ。"
10113-50 = "いらっしゃったの\nですね、先生。"
10113-60 = "今日は当番の日では\nありませんが、"
10113-70 = "警戒を怠ることは\nありません。"
10113-80 = "これは\n興味深い死た……"
10113-90 = "失礼。"
10113-100 = "なかなかおもしろ……"
10113-110 = "これも失礼でしたね。"
10113-120 = "そろそろ\n急がなければ\nなりません。"
10113-130 = "一刻も早く、収束して\nほしいのですが……"
10113-140 = "……。"
10113-150 = "できればもう少し\n面白いものが\n見れたら、なんて。"
10113-160 = "……今のは冗談です。\n本当ですから。"
10113-170 = "対応完了ですね。"
10113-180 = "お疲れ様でした、先生。"
10113-190 = "休日であろうと、\n救急医学部の所属である\nことに変わりはないです。"
10113-200 = "ゲヘナ学園では\nたくさんの出来事が\n起こります。"
10113-210 = "……結構、楽しい\n場所ですよ。"
10113-220 = "この服、似合って\nいるでしょうか？"
10113-230 = "……そんなことを\n聞くなんて新鮮？"
10113-240 = "雑誌にあった\n台詞だったのですが……"
10113-250 = "先生にそう思って\nいただけたのなら\n言った甲斐がありました。"
10113-260 = "次にゲヘナに\n来る際は、"
10113-270 = "私にご連絡頂けると\n嬉しいです。"
10113-280 = "その方が、一番\n安全でしょうから。"
10113-600 = "こんにちは、先生。"
10113-610 = "何が起こるか\n分からないという\n意味で、"
10113-620 = "応急処置とこの場所は\n似ているのかも\nしれません。"
10113-630 = "いらっしゃったの\nですね、先生。"
10113-640 = "幸運と健康がおそばに\nありますように。"
10113-650 = "やり残したことは\nありませんか？"
10113-660 = "私も最後まで\nお付き合いします。"
10113-670 = "偶然はお好きですか？\n先生。"
10113-680 = "私は、それなりに\n好きですよ。"
10113-690 = "幸運を願うより、\n不運に備えるべきと\n言いますよね。"
10113-700 = "応急処置において\n備えは重要です。"
10113-710 = "私にお任せください。"
10113-720 = "おめでとうございます、\n先生。"
10113-730 = "良さそうな品ですね。"
10113-740 = "なるほど。\nそれが当たりなのですね。"
10113-750 = "私にも見せていただけますか？\nとても興味深いです。"
10113-760 = "すごいですね、先生。"
10113-770 = "本当にお疲れ様でした。"
