[translation]
10113-10 = "Bem-vindo,\nà Academia Gehenna."
10113-20 = "Espero que você possa\npassar momentos de paz."
10113-30 = "……."
10113-40 = "É de coração."
10113-50 = "Você veio,\nProfessor."
10113-60 = "Hoje não é dia de plantão,\nmas,"
10113-70 = "não posso descuidar\nda vigilância."
10113-80 = "Isso é\ninteressante..."
10113-90 = "Perdão."
10113-100 = "Bastante interessante..."
10113-110 = "Peço desculpas por isso também."
10113-120 = "Já está na hora de\nnos apressarmos."
10113-130 = "Gostaria que isso se resolvesse\no mais rápido possível, mas..."
10113-140 = "……."
10113-150 = "Se possível, eu adoraria\nver algo um pouco\nmais interessante."
10113-160 = "……Isso foi uma brincadeira.\nÉ verdade."
10113-170 = "O atendimento foi concluído."
10113-180 = "Bom trabalho, Professor."
10113-190 = "Mesmo sendo feriado, não muda o fato\nde que pertenço ao\nDepartamento de Medicina de Emergência."
10113-200 = "Muitas coisas acontecem\nna Academia Gehenna."
10113-210 = "……É um lugar\nbastante divertido."
10113-220 = "Esta roupa,\ncombina comigo?"
10113-230 = "……É estranho eu\nperguntar algo assim?"
10113-240 = "Era uma fala que estava\nem uma revista, mas..."
10113-250 = "Se você pensou isso de mim,\nProfessor, valeu a pena\nter dito."
10113-260 = "Da próxima vez que\nvier a Gehenna,"
10113-270 = "ficarei feliz se\nentrar em contato comigo."
10113-280 = "Acho que essa seria a\nforma mais segura."
10113-600 = "Olá, Professor."
10113-610 = "No sentido de que não sabemos\no que pode acontecer,"
10113-620 = "talvez os primeiros socorros\nsejam parecidos com\neste lugar."
10113-630 = "Você veio,\nProfessor."
10113-640 = "Que a sorte e a saúde\nestejam ao seu lado."
10113-650 = "Tem algo que você\nainda não terminou?"
10113-660 = "Eu também o acompanharei\naté o fim."
10113-670 = "Você gosta de coincidências,\nProfessor?"
10113-680 = "Eu, até que\ngosto."
10113-690 = "Dizem que, em vez de desejar sorte,\ndevemos nos preparar para o azar, não é?"
10113-700 = "Nos primeiros socorros,\na preparação é fundamental."
10113-710 = "Deixe comigo."
10113-720 = "Parabéns,\nProfessor."
10113-730 = "Parece ser um bom item."
10113-740 = "Entendo.\nEntão esse é o prêmio principal."
10113-750 = "Poderia me mostrar também?\nÉ muito interessante."
10113-760 = "Incrível, Professor."
10113-770 = "Muito obrigado pelo seu trabalho."
