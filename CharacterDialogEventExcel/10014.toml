[translation]
10014-10 = "お祭りですよ、主殿！\nさあ、どこから遊びに\n行きましょうか？"
10014-20 = "主殿主殿、\nお祭りとっても\n楽しみですね！"
10014-30 = "イズナ、ずっとそばで\nお供しますので！"
10014-40 = "ふん～ふふん～\nふんふん～♪\nイズナこんこん、\nこんここ～ん♪"
10014-50 = "むっ、この気配は……\n主殿ですね！"
10014-60 = "イズナのこと、見つけて\nくださったんですね！\nえへへっ！"
10014-70 = "お団子、おせんべい、\nお好み焼き……！"
10014-80 = "主殿と一緒に\n食べたい物が\nたーくさんです！"
10014-90 = "イズナ、準備万端です！\n主殿のことをお守りしつつ、\nお祭りをご案内します！\nニンニン！"
