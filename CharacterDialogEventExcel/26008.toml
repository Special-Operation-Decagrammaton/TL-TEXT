[translation]
26008-10 = "いらっしゃいませ、先生！\n海の家バージョンの\n百夜堂へ、ようこそ！"
26008-20 = "え゛、先生！？\nまだ準備、終わって\nないんですが……！？"
26008-30 = "と、とりあえず！\nこちらへどうぞ！"
26008-40 = "何か欲しい物は\n見つかりましたか？"
26008-50 = "百夜堂はまだまだ\n進化しますよ！\nさあ、張り切って\nいきましょう！"
26008-60 = "複数の店舗を\n同時に管理する、\nというのは\n大変ですね……"
26008-70 = "まぁ、楽しくも\nあるんですが！"
26008-80 = "ちょっ、先生！\n私は売りもの\nじゃないですよ！"
26008-90 = "それに今は、\n営業時間\nなんですから……。"
26008-100 = "何か欲しい物は\n見つかりましたか？"
26008-110 = "百夜堂はまだまだ\n進化しますよ！\nさあ、張り切って\nいきましょう！"
26008-120 = "複数の店舗を\n同時に管理する、\nというのは\n大変ですね……"
26008-130 = "まぁ、楽しくも\nあるんですが！"
26008-140 = "ちょっ、先生！\n私は売りもの\nじゃないですよ！"
26008-150 = "それに今は、\n営業時間\nなんですから……。"
26008-480 = "色々と、海で役立つものを\n取り揃えていますよ！"
26008-490 = "何か不要なものがあったら、\n交換も承ってます！"
26008-500 = "残念ながら、海の家の営業は\n終了しました…"
26008-510 = "…が！大丈夫です、\n楽しい思い出は\n永遠なので！"
26008-520 = "はいは～い、\n今シズコのこと呼びました？"
26008-530 = "良い物を適正価格で！\n商売の基本です！"
26008-540 = "ご利用ありがとう\nございました！"
26008-550 = "あ、良いですね！\n私としてもお薦めの品です！"
26008-560 = "満足いくお買い物になりましたか？\n口コミも大事なので、良かったら\n広めてくださいね！"
26008-570 = "はい、どうぞ！\nいつもありがとうございますっ！"
