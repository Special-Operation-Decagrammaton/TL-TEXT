[translation]
20051-180 = "Professor! Aqui! Por aqui!"
20051-190 = "Hehe, seus olhos não conseguiram acompanhar a minha velocidade, não é?"
20051-200 = "A super guerreira mágica do esquadrão de vigilância!"
20051-210 = "Thermite... Rosa! Sou eu!"
20051-220 = "Uau! Tem muitos clientes aqui!"
20051-230 = "Hehehe... parece que ninguém percebeu..."
20051-240 = "Que eu, uma pessoa comum, sou na verdade a super ás do esquadrão de vigilância,"
20051-250 = "e uma garota mágica...!"
20051-260 = "A transformação acabou, mas..."
20051-270 = "A magia não acaba! Ehehe!"
20051-280 = "Sim! Eu sou a Thermite Rosa! E também sou a Uzawa Reisa!"
20051-290 = "Hehe, a pose de transformação que eu venho praticando há tanto tempo..."
20051-300 = "Vou mostrar aqui! Primeiro..."
20051-310 = "Ahhh!?"
20051-320 = "E-eu... acho que cruzei o olhar com alguém que conheço..."
20051-330 = "Isso? É o bastão da Thermite Rosa!"
20051-340 = "O bastão oficial é um pouco caro..."
20051-350 = "Então, eu decorei um que eu mesma fiz!"
20051-360 = "Thermite Rosa! Transformar!"
20051-370 = "Vamos! Vamos proteger a paz!"
20051-470 = "Shururu~ Shakiin shakiin!! Kira!"
20051-480 = "Bem-vindo! Ao mercado mágico!"
20051-490 = "Não tem adesivos de metade do preço aqui, viu!? Isso não é um supermercado!"
20051-500 = "Ah, essa roupa não está à venda! Só tem uma!"
20051-510 = "Parece uma loja de lembranças, é divertido!"
20051-520 = "Uma transação... ou seja, selar um contrato!"
20051-530 = "Isso é o poder financeiro de um adulto...! Parece coisa de herói!"
20051-540 = "Isso parece um item mágico!"
20051-550 = "Compras mágicas! É isso!"
20051-680 = "Uau! Isso é! É aquela máquina de tirar cartas! Que nostalgia!"
20051-690 = "É assim! É só girar, gako-gako!"
20051-700 = "Eu não sabia que ainda existiam coisas assim!"
20051-710 = "Vamos, Professor! Gire logo!"
20051-720 = "Vamos, use tudo o que sobrou e gire!"
20051-730 = "O que será que vai sair! Estou ansiosa!"
20051-740 = "Este lugar é maravilhoso! Quem me dera se fosse a minha casa...!"
20051-750 = "Ahhh! Isso é! Uma ultra rara!?"
20051-760 = "É uma carta super rara que eu só tirei uma vez na vida!"
20051-770 = "Oh! Super rara! Não se vê muito por aí!"
20051-780 = "Dourada!! Que legal! Está brilhando!"
20051-790 = "Ah, ah..."
20051-800 = "Essa é uma carta de azar! É a primeira vez que vejo uma de verdade!"
