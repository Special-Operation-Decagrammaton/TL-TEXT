[translation]
20051-180 = "先生！\nこっちです！こっち！"
20051-190 = "ふふっ、私の速さに\n目が追いつかな\nかったんですね？"
20051-200 = "自警団のスーパーマジカル\nウォーリアー！"
20051-210 = "テルミット～\n……ピンク！です！"
20051-220 = "うわあ！お客さんが\nいっぱいですね！"
20051-230 = "ふっふっふ……誰も\n気づいていないよう\nですね……。"
20051-240 = "平凡な私が、実は自警団の\nスーパーエースであり、"
20051-250 = "魔法少女で\nあることをっ……！"
20051-260 = "変身は\n解けちゃいましたけど……"
20051-270 = "魔法は終わりません！\nえへへっ！"
20051-280 = "はい！\nテルミットピンクです！\n宇沢レイサでもあります！"
20051-290 = "ふふっ、\nずっと練習してきた\n変身のポーズを……"
20051-300 = "ここでお見せしましょう！\nまずは………"
20051-310 = "ひゃあっ！？"
20051-320 = "い、いま……知り合いと\n目があった気が……。"
20051-330 = "これですか？テルミット\nピンクのステッキです！"
20051-340 = "公式のステッキは\nちょっと高くて……"
20051-350 = "なので、自前のものを\nデコってみました！"
20051-360 = "テルミットピンク！変身！"
20051-370 = "さあ！平和を\n守りに行きましょう！"
20051-470 = "シュルル～\nシャキーンシャキーン！！\nキラッ！"
20051-480 = "ようこそ！\nマジカル市場へ！"
20051-490 = "半額シールはないですよ！？\nここはスーパーじゃ\nありませんから！"
20051-500 = "あ、この服は\n売り物じゃないですよ！\n一着しかないので！"
20051-510 = "お土産屋さんみたいで、\n楽しいですね！"
20051-520 = "取引……すなわち、\n契約を交わすということ！"
20051-530 = "これが大人の財力……！\nヒーローみたいです！"
20051-540 = "それ、なんだか\nマジカルアイテムみたいです！"
20051-550 = "マジカル・ショッピング！\nですね！"
20051-680 = "わあっ！これは！カードが\n引けるやつですね！\nすごく懐かしいです！"
20051-690 = "こう！ガコガコッ！\nと回せばいいんですよ！"
20051-700 = "こういうの、\nまだ残っていたんですね！"
20051-710 = "さあ先生！\n早く回しましょう！"
20051-720 = "さあ、残った分ぜ～んぶ\n使って回しましょう！"
20051-730 = "何が出るんでしょう！\n楽しみです！"
20051-740 = "ここ、すごく素敵ですね！\nここが私の家だったら\nいいのに……！"
20051-750 = "ああっ！それは！\nウルトラレア！？"
20051-760 = "私も一度しか引いた\nことがない、\n超！レアカードですよ！？"
20051-770 = "おおっ！\nスーパーレア！あまり\n見かけないんですよ！"
20051-780 = "ゴールド！！いいですね！\nキラキラしています！"
20051-790 = "ああっ、ああ……。"
20051-800 = "それはハズレ\nカードですね！私も\n実物は初めて見ます！"
