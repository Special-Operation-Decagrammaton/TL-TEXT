[translation]
10073-10 = "こちらです、先生。\n調査準備は、\n済んでおりますので。"
10073-20 = "夏は、蒸し暑くて……。\nた、立っているだけで、\n精一杯です……。"
10073-30 = "これで、\nあと半分……。"
10073-40 = "もう少しで、\nここでの調査も\n終わりですね。"
10073-50 = "ね、念のため……\n確認してみてください。"
10073-60 = "せ、先生？\nど、どうしました？"
10073-70 = "私の顔に、\n何かついて\nいるんですか……？"
10073-80 = "いきなり、\n呼ばれても……。"
10073-90 = "……用件があるのなら、\n言葉にしてください……。"
10073-100 = "外は、好きでは\nありませんが……。"
10073-110 = "二人きりに\nなれましたし……\n良しとします。"
10073-530 = "それでは、\n調査内容をまとめましょう。"
10073-540 = "色々と、分かってきました。"
10073-550 = "えーと……\nまだ何か、調べたい事でも？"
10073-560 = "わ、私を調べても、\n何にもなりませんよ……！"
10073-570 = "これは……\n意味がありそうですね。"
10073-580 = "流石です、先生。"
