[translation]
10073-10 = "É por aqui, Sensei. A preparação para a investigação já está concluída."
10073-20 = "O verão é tão abafado... S-só de ficar de pé, já estou no meu limite..."
10073-30 = "Com isso, falta apenas a metade..."
10073-40 = "Já estamos quase terminando a investigação por aqui, não é?"
10073-50 = "B-bem, por precaução... tente verificar."
10073-60 = "S-Sensei? O-o que houve?"
10073-70 = "Tem algo... no meu rosto...?"
10073-80 = "Me chamar assim, de repente..."
10073-90 = "...Se você tem algo a dizer, por favor, coloque em palavras..."
10073-100 = "Eu não gosto de ficar ao ar livre, mas..."
10073-110 = "Já que estamos a sós... acho que está tudo bem."
10073-530 = "Então, vamos resumir o conteúdo da investigação."
10073-540 = "Várias coisas ficaram claras."
10073-550 = "Hum... Ainda tem algo que você queira investigar?"
10073-560 = "I-investigar a mim não vai levar a lugar nenhum...!"
10073-570 = "Isso... parece ter algum significado."
10073-580 = "Como esperado do Sensei."
