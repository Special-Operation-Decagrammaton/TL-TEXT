[translation]
10086-10 = "おかえり、先生。"
10086-20 = "万魔殿のせいで大変だろうけど……"
10086-30 = "よかったら手伝ってほしい。"
10086-40 = "来たわね、先生。"
10086-50 = "またお願いすることになってしまって、ごめんなさい。"
10086-60 = "……気にしなくていい？ふふ、先生らしいね。"
10086-70 = "万魔殿とトラブルがあるたびに困惑させられるけど……"
10086-80 = "今回は、先生がいてくれてよかった。"
10086-90 = "突然のパーティーだなんて…"
10086-100 = "本当に一体何を考えているのかしら。"
10086-110 = "……普段も分かっているのかといったら、それはまた別なんだけど。"
10086-120 = "どんな事態だろうと、風紀委員会がやることは変わらないわ。"
10086-130 = "いつものことだから。"
10086-140 = "こんな騒動、ゲヘナでは日常茶飯事なんだけどね。"
10086-150 = "ん？ゲヘナが……怖い？"
10086-160 = "そ、そこまでじゃない、と思うけど……"
10086-170 = "今回は、先生が\nいてくれてよかった。"
10086-180 = "突然のパーティー\nだなんて…"
10086-190 = "本当に一体何を\n考えているのかしら。"
10086-200 = "……普段も\n分かっているのかと\nいったら、それは\nまた別なんだけど。"
10086-210 = "どんな事態だろうと、\n風紀委員会が\nやることは変わらないわ。"
10086-220 = "いつものことだから。"
10086-230 = "こんな騒動、ゲヘナでは\n日常茶飯事なんだけどね。"
10086-240 = "ん？ゲヘナが……怖い？"
10086-250 = "そ、そこまでじゃない、\nと思うけど……"
