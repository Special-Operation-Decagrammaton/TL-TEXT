[translation]
10086-10 = "Bem-vindo de volta, Sensei."
10086-20 = "Deve estar sendo difícil\npor causa do Pandemonium, mas..."
10086-30 = "Se não se importar,\nqueria pedir sua ajuda."
10086-40 = "Você veio, Sensei."
10086-50 = "Sinto muito por ter que\npedir isso de novo."
10086-60 = "...Não precisa se preocupar?\nHehe, isso é bem a sua cara, Sensei."
10086-70 = "Ainda continua, não é..."
10086-80 = "Bem, se terminasse fácil,\nnão seria o Pandemonium."
10086-90 = "Mesmo depois de tanto tempo,\nainda não acabou."
10086-100 = "Não sei se chamo de ganancioso\nou de obstinado..."
10086-110 = "Bem, eu também não\npretendo perder."
10086-120 = "Finalmente acabou."
10086-130 = "Aqueles dias agitados\nchegaram ao fim\ndesta forma."
10086-140 = "...Aconteceram tantas coisas."
10086-150 = "Se você se divertiu\nmesmo que um pouco,\nfico feliz, de verdade."
10086-160 = "Sempre que o Pandemonium\ncria problemas, fico confusa, mas..."
10086-170 = "Desta vez, fico feliz\npor você estar aqui, Sensei."
10086-180 = "Uma festa repentina..."
10086-190 = "Eu realmente me pergunto\no que eles estão pensando."
10086-200 = "...Embora, se você me perguntar\nse eu entendo o que eles pensam\nnormalmente, isso já é\noutra história."
10086-210 = "Não importa a situação,\no que o Comitê Disciplinar faz\nnão muda."
10086-220 = "É sempre assim, afinal."
10086-230 = "Esse tipo de confusão é\nrotina em Gehenna, sabe."
10086-240 = "Hm? Gehenna é... assustadora?"
10086-250 = "B-bem, eu não acho que\nseja para tanto, mas..."
