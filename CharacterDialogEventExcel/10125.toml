[translation]
10125-10 = "アルカナに\n導かれし者よ……\nこちらへ。"
10125-20 = "さあ、ワイルドハントに\n眠る秘密を……"
10125-30 = "共に解き明かしましょう。"
10125-40 = "うう……寮監隊に\nバレませんように……。"
10125-50 = "あと少し！\n悔いなきフィナーレを\n迎えましょう！"
10125-60 = "マスター！また一緒に……"
10125-70 = "素晴らしい芸術を\n作りましょう！"
10125-80 = "にゅふふ、魔法に\n興味がおありですか？"
10125-90 = "マスター、占って\nさしあげましょうか？"
10125-100 = "もちろんお代は\nいりません。"
10125-110 = "お気軽に\nお声がけください！"
10125-120 = "ぼ、帽子は\nダメですからっ。"
10125-130 = "こ、これは魔法使いの\n象徴なので……\n脱げないんです！"
10125-140 = "あっ、そこには\n魔法刻印が……！"
10125-150 = "何度も突っつくと……\n暴発しちゃうかも。\nにゅふふっ。"
10125-280 = "さぁ、魔道具を\n手に入れましょう！"
10125-290 = "おお、この品揃え……\n眺めるだけでも魔力が……！"
10125-300 = "ここではもう魔道具を\n集められなくなって\nしまいましたが、"
10125-310 = "構いません！"
10125-320 = "マスターとの\n思い出も魔道具も、"
10125-330 = "これからいっぱい\n見つけていけますから！"
10125-340 = "お気に召すものは\nありましたか？"
10125-350 = "マスターの審美眼、\n期待しています！"
10125-360 = "これは強い魔力を\n感じますね……！"
10125-370 = "さすがマスター！\nお目が高い！"
10125-380 = "では、早速試して\nみましょうか！"
10125-390 = "あっ、私もそれが\nいいと思っていたんです！"
