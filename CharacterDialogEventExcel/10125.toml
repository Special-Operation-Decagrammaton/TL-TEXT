[translation]
10125-10 = "Aquele que foi guiado\npelos arcanos...\nVenha por aqui."
10125-20 = "Vamos, os segredos que\ndormem na Caçada Selvagem..."
10125-30 = "Vamos desvendá-los juntos."
10125-40 = "Uuu... espero que a\npatrulha do dormitório\nnão me pegue..."
10125-50 = "Só mais um pouco!\nVamos ter um final\nsem arrependimentos!"
10125-60 = "Mestre! Vamos fazer isso\njuntos novamente..."
10125-70 = "Vamos criar uma\narte maravilhosa!"
10125-80 = "Nyufufu, você tem\ninteresse em magia?"
10125-90 = "Mestre, quer que eu\nleia a sua sorte?"
10125-100 = "Claro que não precisa\npagar nada."
10125-110 = "Sinta-se à vontade\npara me chamar!"
10125-120 = "N-não, o chapéu\nnão pode."
10125-130 = "I-isso é o símbolo\nde um mago, então...\nEu não posso tirar!"
10125-140 = "Ah, aí tem uma\nmarca mágica...!"
10125-150 = "Se cutucar muitas vezes...\nela pode acabar explodindo.\nNyufufu."
10125-280 = "Vamos, vamos conseguir\nartefatos mágicos!"
10125-290 = "Oh, essa seleção...\nSó de olhar, já sinto\na mana fluir...!"
10125-300 = "Não podemos mais coletar\nartefatos mágicos aqui,"
10125-310 = "mas não tem problema!"
10125-320 = "Tanto as memórias com o Mestre\nquanto os artefatos mágicos,"
10125-330 = "nós vamos encontrar\nmuitos outros daqui em diante!"
10125-340 = "Encontrou algo que\nlhe agrade?"
10125-350 = "Estou ansiosa pelo seu\nsenso estético, Mestre!"
10125-360 = "Sinto uma mana muito\nforte vindo disso...!"
10125-370 = "Como esperado do Mestre!\nVocê tem um ótimo olho!"
10125-380 = "Então, vamos testar\nimediatamente?"
10125-390 = "Ah, eu também estava\npensando que esse seria bom!"
