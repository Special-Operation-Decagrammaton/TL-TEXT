[translation]
20021-110 = "先生、\nいよいよクリスマスが\nやってきました！"
20021-120 = "私もクリスマスモード\nですよ～！"
20021-130 = "先生は何か\n欲しいものありますか？"
20021-140 = "私がサンタさんにお願いの\n手紙を書きますよ！"
20021-150 = "先生、どうしました？\n何かありましたか？"
20021-160 = "そんなにジッと\n見つめられると……"
20021-170 = "この格好、変ですか？"
20021-180 = "どうしました？\n何か忘れ物でも……？\nえっ、違う？"
20021-190 = "ううう……\nそんなにあちこち\n触ってくるなら……"
20021-200 = "私だって先生のこと、\nいっぱい\n触りかえしちゃいます！"
20021-210 = "そんなにジッと\n見つめられると……"
20021-220 = "この格好、変ですか？"
20021-230 = "どうしました？\n何か忘れ物でも……？\nえっ、違う？"
20021-240 = "ううう……\nそんなにあちこち\n触ってくるなら……"
20021-250 = "私だって先生のこと、\nいっぱい\n触りかえしちゃいます！"
20021-350 = "救護騎士団主催の\nチャリティーイベントを\n開催中でーす！"
20021-360 = "あっ、先生！ようこそ！\nくじはいかがですか？"
20021-370 = "チャリティーイベントは\n終了しました！"
20021-380 = "まだ手元に抽選券が\nあるなら、\n私が引き換えますよ！"
20021-390 = "あれっ、\n何かありましたか？"
20021-400 = "今日のハナエサンタは\n幸せをお届けしますよ～！"
20021-410 = "わあっ、大当たり！"
20021-420 = "えへへ。私のプレゼント、\n気に入ってもらえたら嬉しいです！"
20021-430 = "わあっ……！\nこんなものが入ってたなんて……！"
20021-440 = "今日のやる事はこちらです！"
20021-450 = "一つずつ、焦らずいきましょう！"
20021-460 = "このリスト、\nここで合ってたっけ？\n……あれ、どっちだろ？"
20021-470 = "なんだかお仕事が\nいっぱいですね……。"
20021-480 = "これも手術できちゃえば\nいいのに。"
20021-490 = "すごい！さすが先生です！"
20021-500 = "お疲れさまでした、先生。\n私もうれしいです！"
