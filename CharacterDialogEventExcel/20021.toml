[translation]
20021-110 = "Sensei,\nfinalmente o Natal\nchegou!"
20021-120 = "Eu também estou no\nclima de Natal~!"
20021-130 = "O Sensei quer\nalguma coisa?"
20021-140 = "Eu vou escrever uma carta\npara o Papai Noel pedindo!"
20021-150 = "Sensei, o que houve?\nAconteceu alguma coisa?"
20021-160 = "Se você ficar me encarando\ntanto assim..."
20021-170 = "Esse visual está estranho?"
20021-180 = "O que foi?\nEsqueceu de algo...?\nAh, não?"
20021-190 = "Uuuu...\nSe você continuar me tocando\nem todos os lugares assim..."
20021-200 = "Eu também vou te tocar\nde volta\nmuitas vezes, Sensei!"
20021-210 = "Se você ficar me encarando\ntanto assim..."
20021-220 = "Esse visual está estranho?"
20021-230 = "O que foi?\nEsqueceu de algo...?\nAh, não?"
20021-240 = "Uuuu...\nSe você continuar me tocando\nem todos os lugares assim..."
20021-250 = "Eu também vou te tocar\nde volta\nmuitas vezes, Sensei!"
20021-350 = "Estamos realizando um evento\nde caridade organizado pela\nBrigada de Primeiros Socorros!"
20021-360 = "Ah, Sensei! Bem-vindo!\nQue tal um sorteio?"
20021-370 = "O evento de caridade\nterminou!"
20021-380 = "Se você ainda tiver\nbilhetes de sorteio aí,\neu troco para você!"
20021-390 = "Ué,\naconteceu alguma coisa?"
20021-400 = "A Hanae Noel de hoje\nvai trazer felicidade para você~!"
20021-410 = "Uau, prêmio máximo!"
20021-420 = "Hehehe. Ficarei feliz se você\ngostar do meu presente!"
20021-430 = "Uau...!\nEu não acredito que\ntinha isso aqui dentro...!"
20021-440 = "Aqui estão as tarefas\nde hoje!"
20021-450 = "Vamos fazer uma por uma,\nsem pressa!"
20021-460 = "Essa lista,\nserá que está certa?\n...Ué, qual será?"
20021-470 = "Parece que tem\nmuito trabalho, né..."
20021-480 = "Quem dera se desse para\nresolver isso com uma cirurgia."
20021-490 = "Incrível! Como esperado\ndo Sensei!"
20021-500 = "Bom trabalho, Sensei.\nEu também estou feliz!"
