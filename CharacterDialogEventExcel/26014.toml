[translation]
26014-510 = "お、お疲れ、先生。"
26014-520 = "……言い慣れないな。"
26014-530 = "もう少し\n可愛い挨拶を……"
26014-540 = "……い、今のは\n独り言だ！"
26014-550 = "まったく……\n気が休まらない。"
26014-560 = "あと少しだ、先生。\n一緒に頑張ろう。"
26014-570 = "終わったんだな。"
26014-580 = "終わってみると逆に……\n名残惜しく感じる。"
26014-590 = "ど、どうしたんだ？\n依頼か？"
26014-600 = "こ、これは\nミレニアム指定の\n制服だけど……？"
26014-610 = "何か変な\nところでもあるのか？"
26014-620 = "えっと……先生。"
26014-630 = "せっかくの制服だ、\nからその、"
26014-640 = "私と一緒に……"
26014-650 = "……や、やはり、\n何でもない。\n気にしないでくれ。"
