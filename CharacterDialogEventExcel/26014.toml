[translation]
26014-510 = "O-oi, bom trabalho, Sensei."
26014-520 = "……Não estou acostumada a dizer isso."
26014-530 = "Talvez uma saudação\nmais fofa……"
26014-540 = "……I-isso foi\nsó um pensamento alto!"
26014-550 = "Sério……\nNão consigo relaxar."
26014-560 = "Falta pouco, Sensei.\nVamos nos esforçar juntos."
26014-570 = "Então terminou."
26014-580 = "Agora que acabou, sinto……\numa certa nostalgia."
26014-590 = "O-o que foi?\nÉ um pedido?"
26014-600 = "E-este é um uniforme\ndesignado pelo Millennium,\nmas……?"
26014-610 = "Tem algo de\nestranho nele?"
26014-620 = "Bem…… Sensei."
26014-630 = "Já que estou com o uniforme,\nentão, tipo,"
26014-640 = "comigo……"
26014-650 = "……N-não, na verdade,\nnão é nada.\nNão ligue para isso."
