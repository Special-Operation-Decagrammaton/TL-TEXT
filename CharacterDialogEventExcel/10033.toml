[translation]
10033-10 = "Esta Wakamo, veio assim\npara capturar\nvocê, meu querido♥"
10033-20 = "Tentar fugir de mim\né inútil..."
10033-30 = "Vou te ensinar\nmuito bem sobre isso\nno seu corpo, sabe?♥"
10033-40 = "Ah... eu sinto...\nDe algum lugar,\na presença do Sensei...!"
10033-50 = "Fufufu, você realmente\nacha que pode\nse livrar de mim?"
10033-60 = "Ah,\nque adorável...♥"
10033-70 = "Ah, Sensei... Onde será\nque você está\nagora?"
10033-80 = "Mesmo que seja em meio\nàs chamas e à fumaça da pólvora..."
10033-90 = "Esta Wakamo...\njamais perderá você\nde vista, meu querido♥"
10033-100 = "Entendo,\nserá que isso é"
10033-110 = "o jogo chamado\n'esconde-esconde'\nque está na moda?"
10033-120 = "Ufufu, eu não\ndesgosto desse tipo\nde passatempo."
10033-130 = "Basta eu perseguir\ne capturar você, certo?"
10033-140 = "Estou começando\na me divertir."
10033-150 = "Se eu te pegar\nentão... fufu,\nesteja preparado, viu?♥"
