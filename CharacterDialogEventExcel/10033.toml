[translation]
10033-10 = "このワカモ、こうして\nあなた様のことを\n捕まえに参りました♥"
10033-20 = "私から逃げようとしても\n無駄だということ……"
10033-30 = "そのお体に、たっぷりと\n教えて差し上げますね♥"
10033-40 = "ああ……感じます……\nどこからか、\n先生の気配が……！"
10033-50 = "ふふふっ、私のことを\n振り払えるとでも\nお思いですか？"
10033-60 = "ああ、\nお可愛いらしい……♥"
10033-70 = "ああ、先生…… 今は\nどこにいらっしゃるので\nしょうか？"
10033-80 = "例え、爆炎と火薬の煙が\n立ち込める中であっても……。"
10033-90 = "このワカモ……\n決してあなた様のことを\n見失ったりはしませんわ♥"
10033-100 = "成程、\nこれが巷で流行りの"
10033-110 = "「隠れん坊」という\n遊戯なのでしょうか？"
10033-120 = "うふふっ、このような\n余興は嫌いでは\nありません。"
10033-130 = "追いかけて、捕まえれば\nよろしいのですね？"
10033-140 = "楽しくなって\nまいりました。"
10033-150 = "もし捕まったら\nその時は……ふふ、\n覚悟してくださいね♥"
