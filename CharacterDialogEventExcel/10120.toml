[translation]
10120-260 = "ふふ、よくぞ来てくれた、\n先生。"
10120-270 = "楽にしていてくれて\n構わない。"
10120-280 = "もうすぐ\n演奏が始まるよ。"
10120-290 = "ん？どうしたの、先生？"
10120-300 = "つつくなら、\nこっちもお願い……。"
10120-310 = "練習で肩が\nひどく凝っててね……。"
10120-320 = "そんなにつついても、\nマカロンは出ないよ。"
10120-330 = "そこ座って、先生。"
10120-340 = "ドラムの真髄、見せて\nあげようじゃないか……！"
