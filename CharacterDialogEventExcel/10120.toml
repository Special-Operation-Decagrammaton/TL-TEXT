[translation]
10120-390 = "Fufu, fico feliz que tenha vindo,
Sensei."
10120-400 = "Pode ficar à vontade,
não se preocupe."
10120-410 = "A apresentação vai
começar em breve."
10120-420 = "Eu queria mais doces..."
10120-430 = "Não, eu preciso praticar...!"
10120-440 = "Vamos lá, estamos a um passo
do final...!"
10120-450 = "...Ah, foi incrível.
Bom trabalho, Sensei."
10120-460 = "Hm? O que houve, Sensei?"
10120-470 = "Se for me cutucar,
por favor, cutuque aqui também..."
10120-480 = "Meus ombros estão muito tensos
por causa da prática..."
10120-490 = "Não adianta me cutucar tanto,
não vão sair macarons daqui."
10120-500 = "Sente-se ali, Sensei."
10120-510 = "Vou te mostrar a essência
da bateria...!"
