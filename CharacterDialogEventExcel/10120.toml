[translation]
10120-260 = "Хе-хе, я рада, что ты пришёл,\nСенсей."
10120-270 = "Чувствуй себя как дома."
10120-280 = "Выступление скоро\nначнётся."
10120-290 = "Хм? Что-то не так, Сенсей?"
10120-300 = "Если ты хочешь меня размять,\nне мог бы сделать это вот здесь...?"
10120-310 = "У меня жутко затекли плечи\nиз-за постоянных тренировок..."
10120-320 = "Сколько на меня ни нажимай,\nмакароны из меня не посыплются."
10120-330 = "Присаживайся вон туда, Сенсей."
10120-340 = "Я покажу тебе истинную суть\nбарабанов...!"