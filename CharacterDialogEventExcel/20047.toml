[translation]
20047-320 = "O Festival Aquático de Hyakkiyakou, hein..."
20047-330 = "Eu, o que estou fazendo..."
20047-340 = "Já que vou participar... farei uma partida que não envergonhe meu título."
20047-350 = "O fim está próximo... foi um tempo bastante intenso, não foi?"
20047-360 = "Quando chega ao fim, dá uma sensação de vazio, não é?"
20047-370 = "E pensar que eu odiava o mar..."
20047-380 = "...Não tenho arrependimentos. Obrigado, Sensei. Por ter ficado comigo até o fim."
20047-390 = "Tenho uma boa estratégia... quer ouvir?"
20047-400 = "Não importa o quanto eu tente, meu corpo acaba afundando..."
20047-410 = "Será que estou colocando força demais?"
20047-420 = "Se-Sensei...! Desde quando você estava olhando...?"
20047-430 = "Não precisa se preocupar. Isso não é nada demais."
20047-440 = "Está fazendo cócegas."
20047-450 = "...Eu não disse para se afastar."
20047-720 = "Aqui está a lista de estratégias desta vez. Fui eu quem reuniu... não desperdice."
20047-730 = "Aqui, a lista de estratégias."
20047-740 = "...O que está fazendo? Tem que chegar mais perto, senão não dá para ver junto, né?"
20047-750 = "Se quiser conversar, eu te acompanho quando estivermos a sós."
20047-760 = "Agora, concentre-se na estratégia."
20047-770 = "Precisa do conselho da estrategista? Pode falar qualquer coisa."
20047-780 = "Como esperado do Sensei. Era de se esperar que conseguisse fazer isso."
20047-790 = "Já que você está se esforçando, eu não posso perder. É disso que uma equipe é feita, não é?"
