[translation]
20047-320 = "百夜水上祭か……"
20047-330 = "私、\n何やってるんだろう…。"
20047-340 = "参加するからには……\n肩書に恥じない\n試合をするから。"
20047-350 = "終わりが見えてきた……\nだいぶ濃い\n時間だったかな。"
20047-360 = "いざ終わるとなると\n寂しいものだね。"
20047-370 = "海なんて、\n大嫌いだったのに。"
20047-380 = "……悔いはないよ。\nありがとう、先生。\n最後まで見守ってくれて。"
20047-390 = "良い作戦が\nあるんだけど……\n聞きたい？"
20047-400 = "どう頑張っても身体が\n沈んじゃうんだよね……"
20047-410 = "力入れすぎなのかな？"
20047-420 = "せっ、先生……！\nいつから見てたの……？"
20047-430 = "心配するほどじゃない。\nこの程度、\n大したことないから。"
20047-440 = "くすぐったいんだけど。"
20047-450 = "……離れてとは、\n言ってない。"
20047-720 = "これ、今回の作戦一覧。\n私がまとめたやつ……\n無駄にしないでね。"
20047-730 = "はい、作戦一覧。"
20047-740 = "……何してるの？\nもっと寄らなきゃ\n一緒に見れないでしょ？"
20047-750 = "雑談なら二人っきりの\n時に付き合ってあげる。"
20047-760 = "今は、作戦に集中して。"
20047-770 = "作戦参謀の助言が必要？\n何でも言って。"
20047-780 = "さすが先生。\nこれくらい、できて当然か。"
20047-790 = "あんたが頑張っているから、\n私も負けてはいられない。\nそれがチームってものでしょう？"
