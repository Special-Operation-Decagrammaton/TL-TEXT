[translation]
10116-160 = "特殊任務の時間だ。"
10116-170 = "では、はじめよう。"
10116-180 = "先生がいるのなら、\n問題ないな。"
10116-190 = "どうかしたのか？"
10116-200 = "何も無いのか……？"
10116-210 = "私が、きれい……？"
10116-220 = "先生は……\n変な冗談を言うんだな。"
10116-230 = "っ、そういうことを\n軽々しく言うな。"
10116-480 = "É hora da missão especial."
10116-490 = "Então, vamos começar."
10116-500 = "Se o Sensei está aqui,\nnão há problema."
10116-510 = "Está indo bem.\nConto com você para o comando\ndaqui em diante também."
10116-520 = "A operação está chegando\nna fase final."
10116-530 = "Por favor, preste atenção\nna distribuição do tempo."
10116-540 = "Eu gostaria de continuar usando isso...\npor muito tempo.\nSerá que é difícil?"
10116-550 = "Aconteceu alguma coisa?"
10116-560 = "Não há nada...?"
10116-570 = "Eu estou... bonita...?"
10116-580 = "Sensei... você faz\npiadas estranhas."
10116-590 = "Ah, não diga essas coisas\nlevianamente."
