[translation]
10028-140 = "ご主人様、ようこそ！\nバニーさんたちが\nお出迎えだよ！"
10028-150 = "じゃあアスナと一緒に、\n出発進行ー！"
10028-160 = "ご主人様ー！\nアスナと遊ぼう！ね？"
10028-170 = "あ、ご主人様、やっほー！"
10028-180 = "一緒に意味も無く\nその辺走らない？\nきっと楽しいよ！"
10028-190 = "ん、なになに？\nそういう新しい遊び？"
10028-200 = "じゃあ私も\nご主人様のこと、\n好きなだけ触っても良い？"
10028-210 = "あ、ご主人様！\nご主人様が来るまで\n退屈だったよ～。"
10028-220 = "だから、今から\n一緒に楽しく遊ぼうっ！"
10028-230 = "じゃあアスナと一緒に、\n出発進行ー！"
10028-240 = "早く終わったら、\nその分遊んでも良いよね？"
10028-250 = "最後まで楽しく遊ぼう！"
10028-260 = "あっ、ご主人様！\nこっちこっち！"
10028-270 = "ご主人様ー！\nアスナと遊ぼう！ね？"
10028-280 = "あ、ご主人様、やっほー！"
10028-290 = "一緒に意味も無く\nその辺走らない？\nきっと楽しいよ！"
10028-300 = "ん、なになに？\nそういう新しい遊び？"
10028-310 = "じゃあ私も\nご主人様のこと、\n好きなだけ触っても良い？"
10028-320 = "あ、ご主人様！\nご主人様が来るまで\n退屈だったよ～。"
10028-330 = "だから、今から\n一緒に楽しく遊ぼうっ！"
10028-450 = "楽しい運試しの時間だよ、\nご主人様！"
10028-460 = "ドキドキしてきた～！"
10028-470 = "まだまだこっちは\n入っても良いみたいだね！"
10028-480 = "あはっ。ねぇねぇ、\nどこ見てるの～？"
10028-490 = "何が出るかな～？\nちょっと緊張してきた！"
10028-500 = "わーーーーっ！！\nすごいすごい、\nさっすがご主人様！"
10028-510 = "おーっ！\nさすがはご主人様だね！"
10028-520 = "じゃーん！"
10028-530 = "……って、あれ？"
10028-540 = "あはっ！何これ変なの～！"
