[translation]
10053-10 = "「晄輪大祭」へようこそ！\n今日のために、頑張って\n準備しましたよ！"
10053-20 = "実行委員ではありますが、\nいくつかの種目に\n出場する予定です。"
10053-30 = "先生、私の活躍、\nちゃんと見てて\nくださいね？"
10053-40 = "コンディション\nチェックよし、\n装備よし。"
10053-50 = "「晄輪大祭」の計画は……\n完璧！"
10053-60 = "今なんだか、\n物騒な生徒の\n集団が…"
10053-70 = "あ、ほっぺたの\n星マークのことですか？"
10053-80 = "さっきマキに描いて\nもらったんです。"
10053-90 = "せっかくのお祭りです\nから、フェイスペイントを\nしてあげる、と。"
10053-100 = "やっぱり、ちょっと……\n 浮かれているように\n見えます……？"
10053-110 = "「晄輪大祭」の計画は……\n完璧！"
10053-120 = "今なんだか、\n物騒な生徒の\n集団が…"
10053-130 = "あ、ほっぺたの\n星マークのことですか？"
10053-140 = "さっきマキに描いて\nもらったんです。"
10053-150 = "せっかくのお祭りです\nから、フェイスペイントを\nしてあげる、と。"
10053-160 = "やっぱり、ちょっと……\n 浮かれているように\n見えます……？"
