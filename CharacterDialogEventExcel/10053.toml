[translation]
10053-10 = "Bem-vindo ao \"Festival Esportivo de Kivotos\"!\nEu me esforcei muito\npara preparar tudo para hoje!"
10053-20 = "Embora eu seja do comitê executivo,\nplanejo participar de\nalgumas modalidades."
10053-30 = "Professor, por favor,\npreste bastante atenção\nno meu desempenho, está bem?"
10053-40 = "Verificação de condição\nconcluída,\nequipamento pronto."
10053-50 = "O plano para o \"Festival Esportivo de Kivotos\" está...\nPerfeito!"
10053-60 = "Agora há pouco, um grupo\nde alunas perigosas\npassou por aqui..."
10053-70 = "Ah, você está falando da\nmarca de estrela na minha bochecha?"
10053-80 = "A Maki desenhou para mim\nagorinha mesmo."
10053-90 = "Ela disse que, já que é um festival,\nela faria uma pintura facial\nem mim."
10053-100 = "Será que... eu pareço\num pouco animada\ndemais...?"
