[translation]
20033-520 = "ゲヘナの宴を記念し、\n特別に開店した店舗だ。"
20033-530 = "思う存分見ていくがいい、\nキキッ。"
20033-540 = "……誰かと思ったら、先生か。\n購入する品は、もう決めたのか？"
20033-550 = "キキッ、残念だが、\n臨時店舗はここまでだ。"
20033-560 = "そう寂しい顔をするでない。"
20033-570 = "次は更に規模を拡張し、盛大かつ\n豪華に帰ってくるからな、キキキッ！"
20033-580 = "ここにある品はすべて、\n我が万魔殿が用意したものだ。"
20033-590 = "ああ、我々に財力があるからこそ\n可能だったということだ。"
20033-600 = "驚くのはまだ早いぞ、\nクックックッ。"
20033-610 = "うむ？品はどうした？"
20033-620 = "キキキッ、もしかして、\n先生の目当てはこのマコト様の\nほうだったりするのか？"
20033-630 = "……特に用はない……？\n……そうか。"
20033-640 = "ほお、それを選ぶとは。\nその審美眼、高く評価してやろう。"
20033-650 = "それは私のオススメだ。"
20033-660 = "キッキッキッ、\nいいものを選んだな。"
20033-670 = "キキキッ、今日の私は\n気分がいい。"
20033-680 = "おまけをつけてやろう！\n万魔殿の協力提案書だ！"
20033-690 = "……何？要らない、だと？"
20033-700 = "それが欲しかったのか、先生。\nキッキッ、変わった人だな。"
