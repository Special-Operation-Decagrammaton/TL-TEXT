[translation]
20033-520 = "Esta é uma loja aberta especialmente para comemorar o banquete de Gehenna."
20033-530 = "Sinta-se à vontade para olhar tudo o que quiser, kiki."
20033-540 = "......Quem diria, é o Sensei. Já decidiu o que vai comprar?"
20033-550 = "Kiki, é uma pena, mas a loja temporária termina aqui."
20033-560 = "Não fique com essa cara de tristeza."
20033-570 = "Da próxima vez, voltaremos com uma escala ainda maior, de forma grandiosa e luxuosa, kikiki!"
20033-580 = "Todos os itens aqui foram preparados pelo meu Pandemonium."
20033-590 = "Ah, isso só foi possível porque temos recursos financeiros."
20033-600 = "Ainda é cedo para se surpreender, kukuku."
20033-610 = "Hum? O que houve com os itens?"
20033-620 = "Kikiki, será que o objetivo do Sensei era, na verdade, esta Makoto aqui?"
20033-630 = "......Não tem nada em especial para fazer......? ......Entendo."
20033-640 = "Oh, escolheu isso? Vou avaliar seu bom gosto como algo de alto nível."
20033-650 = "Essa é a minha recomendação."
20033-660 = "Kikikiki, você escolheu algo bom."
20033-670 = "Kikiki, hoje eu estou de bom humor."
20033-680 = "Vou te dar um brinde! É uma proposta de cooperação do Pandemonium!"
20033-690 = "......O quê? Disse que não quer?"
20033-700 = "Era isso que você queria, Sensei? Kiki, você é uma pessoa estranha."
