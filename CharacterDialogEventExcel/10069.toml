[translation]
10069-10 = "ああ、先生。\n待ってたよ。\nどう？山海経は？"
10069-20 = "迷子にならなくて\nよかったね。"
10069-30 = "山海経の道は\n入り組んでるからさ。"
10069-40 = "最近肩が凝っててさ……\n誰か揉んでくれ\nないかなあ。"
10069-50 = "先生とか……\nチラッ……。"
10069-60 = "あはは、\nそんなにくすぐっても、\nなんも出ないよ？"
10069-70 = "研究中の料理なら、\nいくらでも出すけど。"
10069-80 = "お客にはいつだって\n最高の料理を提供するよ！"
10069-90 = "まぁ……研究中の料理は、\nちょっと違うけどね。"
10069-100 = "あたしにとっての先生は、\n何にでもなれる\n存在なんだ。"
10069-110 = "お客様にも、仲間にも、\nそれから…… ん……"
10069-120 = "ごめん、話はここまで。"
10069-200 = "物品管理は、\n安心して任せてよ。"
10069-210 = "同じくらい重要なのは、\n商品の配置と並び。\nさ、ゆっくり見てって。"
10069-220 = "「九仞の功を一簣に虧く」\nって言うからね。"
10069-230 = "ん、どうしたのさ？\nなんか気になるとこでもあった？"
10069-240 = "……次回までには、\nちゃんと仕入れとくから。"
10069-250 = "毎度あり！はは、\n店番なんて久しぶりだなあ。"
10069-260 = "それにする？良いよ。\n商品の質には、自信があるんだ。"
10069-270 = "売り切れる前に選んでって。\n入荷待ちほどつらいことは……\nないからね。"
10069-280 = "それは知らないうちに、\n先生自身が商品に\nなってるんだよ。"
10069-290 = "はい、先生。\n運試しの時間だよ。"
10069-300 = "さ、選んで選んで。\n何が出るかな？"
10069-310 = "後悔しないよう、\nここで全部使っていって。"
10069-320 = "商会の仕事も\n色々あるんだ。\nこれもその一つ。"
10069-330 = "何事も、運は大事。"
10069-340 = "すごい！これは驚いたよ。\nおめでとう、先生。"
10069-350 = "こっちも\n楽しくなってきた。"
10069-360 = "どれどれ……結果は……？\nま、いいんじゃない？"
10069-370 = "ありゃあ……まぁまぁ、\nそう落ち込まないで、\n先生。次があるからさ。"
