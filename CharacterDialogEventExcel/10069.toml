[translation]
10069-10 = "Ah, Sensei.\nEu estava te esperando.\nE então? O que achou de Shanhaijing?"
10069-20 = "Que bom que você não\nse perdeu."
10069-30 = "As ruas de Shanhaijing\nsão bem confusas, afinal."
10069-40 = "Meus ombros estão tensos ultimamente...\nSerá que alguém não poderia\nmassageá-los para mim?"
10069-50 = "Tipo o Sensei...\n*Olhadinha*..."
10069-60 = "Ahaha,\nmesmo que você faça cócegas,\nnão vai sair nada, sabia?"
10069-70 = "Se for comida em fase de testes,\nposso servir o quanto quiser."
10069-80 = "Sempre ofereço o melhor\npara os meus clientes!"
10069-90 = "Bem... a comida em fase de testes\né um pouco diferente, claro."
10069-100 = "Para mim, o Sensei é\numa existência que pode\nser qualquer coisa."
10069-110 = "Um cliente, um companheiro,\ne então... hum..."
10069-120 = "Desculpe, vamos parar por aqui."
10069-200 = "Pode deixar o gerenciamento de itens\ncomigo, sem preocupações."
10069-210 = "Tão importante quanto isso,\né a disposição e organização dos produtos.\nVamos, dê uma olhada com calma."
10069-220 = "Como diz o ditado:\n'Não se deve desperdiçar todo o esforço por um erro final'."
10069-230 = "Hum, o que foi?\nTem algo que te incomodou?"
10069-240 = "...Na próxima vez,\neu vou garantir que o estoque esteja completo."
10069-250 = "Volte sempre! Haha,\nfazia tempo que eu não cuidava da loja."
10069-260 = "Vai levar isso? Ótima escolha.\nTenho confiança na qualidade dos meus produtos."
10069-270 = "Escolha antes que acabe.\nNão há nada pior do que\nficar esperando reposição."
10069-280 = "Isso é porque, sem perceber,\no próprio Sensei acabou\nse tornando um produto."
10069-290 = "Aqui está, Sensei.\nÉ hora de testar a sorte."
10069-300 = "Vamos, escolha logo.\nO que será que vai sair?"
10069-310 = "Para não se arrepender,\npode usar tudo aqui mesmo."
10069-320 = "O trabalho na associação comercial\ntem muitas facetas.\nIsso é apenas uma delas."
10069-330 = "Em tudo na vida, a sorte é importante."
10069-340 = "Incrível! Fiquei surpresa.\nParabéns, Sensei."
10069-350 = "Isso também\ncomeçou a ficar divertido para mim."
10069-360 = "Deixa ver... qual foi o resultado...?\nBem, não está bom?"
10069-370 = "Ah, puxa... bem, bem,\nnão fique tão desanimado,\nSensei. Haverá uma próxima vez."
