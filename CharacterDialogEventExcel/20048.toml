[translation]
20048-200 = "先生、ようこそ\nお越しくださいました。\nこちらへおかけください。"
20048-210 = "バレないように\n手を抜くためには\n技術が求められます。"
20048-220 = "ふふ……コツを教えて\n差し上げましょうか？"
20048-230 = "残してきた業務が\n気がかりで……"
20048-240 = "上手く回っていると\n良いのですが……。"
20048-250 = "なにかと事件が\n続きますね……"
20048-260 = "ただの悪い夢だったら\n良かったのですが……。"
20048-270 = "もう帰る時間ですか。"
20048-280 = "ここで起きたことも、\nいつの日か良い思い出話に\nなるのでしょうね。"
20048-290 = "何かご用ですか？"
20048-300 = "暑いですね……"
20048-310 = "何か冷たい飲み物を\n用意させましょう。"
20048-320 = "ええ、\nアイスティー以外の、\nですが。"
20048-330 = "あら先生、\nこの本にご興味が？"
20048-340 = "先生、そこでは肌が\n焼けてしまいます。"
20048-350 = "どうぞこちらへ。\nパラソルの下は\n涼しいですよ。"
20048-1070 = "ゆっくりご覧ください。"
20048-1080 = "在庫は十分に\nご用意しております。"
20048-1090 = "なにぶん、\n店番は初めてでして。"
20048-1100 = "何卒……お手柔らかに\nお願いします。"
20048-1110 = "お買い物、\nご満足いただけましたか？"
20048-1120 = "では、そろそろ\n帰りましょう、先生。"
20048-1130 = "接客もいわば、\n交渉事の一種……？"
20048-1140 = "なるほど、そう聞くと、\n緊張が少しほぐれそうです。"
20048-1150 = "接客に会計、陳列……"
20048-1160 = "思ったよりも業務範囲が\n多岐にわたるのですね。"
20048-1170 = "お目が高いですね、先生。"
20048-1180 = "少々お待ちください。\n包装してまいります。"
20048-1190 = "えっ！？私が欲しいもの……？"
20048-1200 = "ふふっ、お気持ちだけ\nいただいておきますね。"
20048-1210 = "ふふ、店番の勘所を\n押さえられた気がします。"
