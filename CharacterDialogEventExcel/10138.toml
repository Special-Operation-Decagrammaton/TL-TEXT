[translation]
10138-120 = "先生、こっち。"
10138-130 = "一緒にインチキを\n解き明かすわよ。"
10138-140 = "先輩がくれたお守り……\nどこやったっけ……。"
10138-150 = "い、一応もらいものだから\n探してるだけ！"
10138-160 = "さ、最後まで\n諦めないんだから！"
10138-170 = "全部ウソだって\n証明してやるわ！"
10138-180 = "シャーッ！インチキ！\nデタラメ！\nかかってきなさい！"
10138-190 = "今夜で\nケリをつけてあげる！"
10138-200 = "変なこと\nばっかだったけど……。"
10138-210 = "まあ、楽しかったから\nいいや。"
10138-220 = "ふんっ、どうせ\n全部インチキなんだから！"
10138-230 = "……た、たぶんね。"
10138-240 = "な、なんだか\n寒気がする……。"
10138-250 = "か、風のせい\nだよね……？ね？"
10138-260 = "はぁ、なーにが\nツチノコよ。"
10138-270 = "トカゲの見間違いでしょ？"
10138-280 = "ひ、ひいぃっ！？"
10138-290 = "……なんだ、先生か。\nって、急につつかないで！"
10138-300 = "あ、怪しい物が山のように……。"
10138-310 = "使える物があるかも。\n一応見てみる？"
10138-320 = "先生、これ何だか知ってる？"
10138-330 = "なんか色々あるんだけど……。"
10138-340 = "まぁ、振り返ってみたら……\n良い思い出かもね。ふふ。"
10138-350 = "こ、ここは安全……だよね？"
10138-360 = "いきなりオバケとか……\n出てこないよね……？"
10138-370 = "み、見てないで手伝ってよ！"
10138-380 = "1人でこれ整理するの、\nこわ――大変なんだけど！？"
10138-390 = "あ、何かに使えそう。"
10138-400 = "えっ、ガラクタの\n中にあったの？それ。"
10138-410 = "本当に役に立つと\nいいんだけど……。"
10138-420 = "はい、どうぞ。\n一応取ってきたの\n私なんだから感謝してね？"
10138-520 = "うーん……集まった\n手がかりを確認する？"
10138-530 = "一緒に出来事を整理するよ。"
10138-540 = "ふんっ、やっぱ大したこと\nなかったじゃん。"
10138-550 = "この調子でじゃんじゃん\n暴いていくわよ！"
10138-560 = "お、オバケより、\n吊り橋の方が怖いんだけど……。"
10138-570 = "シャーッ！\n遊んでないで調査に集中！"
