[translation]
10138-120 = "Professor, por aqui."
10138-130 = "Vamos desvendar essa farsa\njuntos."
10138-140 = "O amuleto que a veterana me deu...\nOnde será que eu coloquei...?"
10138-150 = "E-eu só estou procurando porque\né um presente, só isso!"
10138-160 = "Eu não vou desistir\naté o fim!"
10138-170 = "Vou provar que tudo\nnão passa de uma mentira!"
10138-180 = "Hiss! Fraude! Mentira!\nPode vir!"
10138-190 = "Vou resolver isso\nhoje à noite!"
10138-200 = "Foi tudo muito estranho,\nmas..."
10138-210 = "Bem, foi divertido,\nentão tudo bem."
10138-220 = "Humpf, de qualquer forma,\né tudo uma farsa!"
10138-230 = "......T-talvez."
10138-240 = "E-estou sentindo\num calafrio..."
10138-250 = "É-é por causa do vento,\nnão é...? Né?"
10138-260 = "Ah, que história é essa\nde Tsuchinoko?"
10138-270 = "Deve ser só um lagarto que viram errado, né?"
10138-280 = "A-ahhh!?"
10138-290 = "......Ah, é você, Professor.\nNão me cutuque de repente!"
10138-300 = "Ah, tem um monte de coisas suspeitas aqui..."
10138-310 = "Talvez tenha algo útil.\nQuer dar uma olhada?"
10138-320 = "Professor, você sabe o que é isso?"
10138-330 = "Tem um monte de coisas aqui..."
10138-340 = "Bem, olhando para trás...\nTalvez sejam boas lembranças. Hehe."
10138-350 = "E-este lugar é seguro...\nné?"
10138-360 = "Não vai aparecer nenhum fantasma\nde repente, né...?"
10138-370 = "N-não fique só olhando, me ajude!"
10138-380 = "Organizar isso sozinha é\nassustador... digo, trabalhoso, sabia!?"
10138-390 = "Ah, isso parece útil."
10138-400 = "Sério? Você achou isso\nno meio da tralha?"
10138-410 = "Espero que seja\nrealmente útil..."
10138-420 = "Aqui, pegue. \nFui eu que peguei, então\né melhor me agradecer, viu?"
10138-520 = "Hmm... quer verificar\nas pistas que reunimos?"
10138-530 = "Vamos organizar os acontecimentos juntos."
10138-540 = "Humpf, no fim das contas,\nnão era nada demais."
10138-550 = "Vamos continuar expondo tudo\nnesse ritmo!"
10138-560 = "E-eu tenho mais medo da ponte pênsil\ndo que de fantasmas..."
10138-570 = "Hiss! \nNada de brincadeiras, foque na investigação!"
