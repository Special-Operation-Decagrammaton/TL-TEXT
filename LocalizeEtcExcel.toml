390594649-DescriptionJp = "イチカが先生のために手作りしたチョコレート。持ちやすく食べやすい棒状になっている。手作りなのに既製品に負けない、見事な仕上がりになっている。"
3418867182-NameJp = "チョコサンダル"
3418867182-DescriptionJp = "実際のサンダルサイズと同じ大きさのかなり大きなチョコレート。見た目と違ってとても丈夫で、実際に履いて歩いても大丈夫だそうだ。"
3006306790-NameJp = "シークレットメッセージ"
3006306790-DescriptionJp = "コユキが先生に送った手作りチョコレート。見た目は普通のギフト用のチョコレートだが、別の意味が隠されているらしい。"
291186913-NameJp = "自らの選択"
291186913-DescriptionJp = "サクラコが先生のために用意した高級チョコレート。普段とは違い、サクラコ自身が悩んだり考えたりして決めた、なかなか手に入らない貴重なプレゼントだ。"
498190404-NameJp = "バレンタイン挑戦状"
498190404-DescriptionJp = "挑戦状の形をしたレイサのチョコレート。実は広々としたチョコレートの上に挑戦状封筒を乗せてあるだけ。中にはレイサからの手紙が入っている。"
2827551265-NameJp = "温泉卵チョコレート"
2827551265-DescriptionJp = "メグの特製手作りチョコレート。一見、温泉卵に似ているため間違えやすい。大量に作っているので、必要ならいくらでももらえるという。"
2152153824-NameJp = "チョコレート月餅"
2152153824-DescriptionJp = "ルミが先生に「試食」をお願いしたいという理由で作ったチョコレート月餅。料理人らしく様々な方法で作られ、どれも先生に味わってほしいという想いが込められている。"
219184488-NameJp = "玄龍門の文様をしたチョコレート"
219184488-DescriptionJp = "ミナが自分にとって「一番大事なもの」をイメージして作ったチョコレート。その気持ちは確かに嬉しいけれど、どこかずれているような気もする……"
717036626-NameJp = "チョコレートキーホルダーグッズ"
717036626-DescriptionJp = "モミジが当たりだと主張するキーホルダーとチョコレート。偶然にも、モミジとペアになっている。"
2219659309-NameJp = "ナギサの平凡なチョコレート"
2219659309-DescriptionJp = "ナギサが先生に感謝の気持ちを込めて手作りしたチョコレート。他の意図や政治的な解釈が入らないようにというナギサの願いを込めて、意図的にシンプルで素朴な作りになっている。しかし、チョコレートの味とクオリティは、既製品を遥かに凌駕している。"
2751216385-NameJp = "ハイカロリーチョコ"
2751216385-DescriptionJp = "バレンタインデーという日を楽しみたいけど、そうはいかないミノリが考えた解決策。ミノリは、ついでにあげたかのように話していたが、実は数あるメーカーの中からこれを選ぶのにかなりの時間を費やした。"
2983078984-NameJp = "認識の差"
2983078984-DescriptionJp = "アオイが先生のために用意したチョコレート。サイズは小さいが、ひとつひとつにかなりの手間がかかっている。相手が何を好むかわからないので、あえて様々な種類で用意しているらしい。"
3666669973-NameJp = "プラナのプラナたっぷりチョコレート"
3666669973-DescriptionJp = "プラナがアロナに内緒で作ったチョコレート。先生の好みにぴったりの味がする。"
967746156-NameJp = "自画像チョコレート"
967746156-DescriptionJp = "メルがホワイトチョコレートに描いた、メルの自画像チョコレート。完成度という点では気に入ってない様子だが、本当の問題はそれをどこから食べるかということだった。"
3706730641-NameJp = "至高にして究極の手作りチョコレートケーキ"
3706730641-DescriptionJp = "キヴォトスの有名店と比較しても決して負けないと主張する手作りチョコレートケーキ。キャッチフレーズは至高にして究極のおもてなしだそうだ。"
2168519091-NameJp = "戦略リーダーの手作りチョコレート"
2168519091-DescriptionJp = "カホが先生のために作った手作りチョコレート。一見シンプルな広報グッズに見えるが、丁寧に刻まれた一文字一文字にこだわりが込められている。"
3486261893-NameJp = "「いつもの」コーヒー"
