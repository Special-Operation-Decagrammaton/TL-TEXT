1676310944-DescriptionJp = "Um conjunto de almoço com um vaso roxo e cadeiras de design elegante. Perfeito para ter conversas agradáveis com os convidados."
2629185716-NameJp = "Vaso de Jardim Violeta"
2629185716-DescriptionJp = "Um vaso de jardim com relevos na parte inferior que chamam a atenção. Enriquece ainda mais a atmosfera da festa."
