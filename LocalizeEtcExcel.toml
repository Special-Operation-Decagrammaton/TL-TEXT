832633492-NameJp = "大運動会の背景"
832633492-DescriptionJp = "大運動会を引き立ててくれる背景。大運動会の活気が伝わってくるようだ。"
3818682926-NameJp = "大運動会の立看板"
3818682926-DescriptionJp = "見る人の目を引く大運動会の立て看板。興味がなかった生徒もいつの間にか足を止めている。"
4084185733-NameJp = "大運動会の折りたたみ椅子"
4084185733-DescriptionJp = "頑丈な鉄製の折り畳みチェア。普段は折りたたんで保管できるため、収納性にも優れている。"
3719677986-NameJp = "大運動会の跳び箱"
3719677986-DescriptionJp = "誰だって跳びたくなる跳び箱。爽やかな色合いは大運動会にピッタリ。"
2320061101-NameJp = "大運動会のパン食い競走用スタンド"
2320061101-DescriptionJp = "おいしいドーナッツがずらりと並んでいるパン食い競走用のスタンド。美食家の生徒なら競技に参加したいかも？"
523248880-NameJp = "大運動会の休憩テント"
523248880-DescriptionJp = "心地よい休息を提供するテント。試合に疲れた体をしばらく休めるのに最適だ。"
2216160600-NameJp = "大運動会の応援スタンド"
2216160600-DescriptionJp = "応援するのにうってつけのスタンド。競技中の生徒を応援する熱気でいっぱいだ。"
