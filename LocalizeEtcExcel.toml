4195229634-NameJp = "Relógio de Parede do Grande Festival Esportivo"
4195229634-DescriptionJp = "Um relógio de parede que anuncia o início de um jogo. Quando a hora marcada chega, começa-se a correr a toda a velocidade."
4098284076-NameJp = "Cone Vermelho do Grande Festival Esportivo"
4098284076-DescriptionJp = "Um cone de cor vermelha. Uma peça essencial para manter a justiça de um jogo."
2985628937-NameJp = "Cone Azul do Grande Festival Esportivo"
2985628937-DescriptionJp = "Um cone de cor azul. Uma peça essencial para manter a justiça de um jogo."
791395155-NameJp = "Cone Azul-celeste do Grande Festival Esportivo"
791395155-DescriptionJp = "Um cone de cor azul-celeste. Uma peça essencial para manter a justiça de um jogo."
1658923215-NameJp = "Bandeira Azul-celeste do Grande Festival Esportivo"
1658923215-DescriptionJp = "Uma bandeira azul-celeste. A sua cor refrescante atrai a atenção das alunas de longe."
1004804813-NameJp = "Bandeira Azul do Grande Festival Esportivo"
1004804813-DescriptionJp = "Uma bandeira azul. Dá a sensação que um jogo enérgico está prestes a começar."
2057528880-NameJp = "Bandeira Amarela do Grande Festival Esportivo"
2057528880-DescriptionJp = "Uma bandeira amarela. Indica uma área de descanso para as alunas após um jogo intenso."
2815510359-NameJp = "Tapete Esportivo do Grande Festival Esportivo"
2815510359-DescriptionJp = "Um tapete de desporto com as regras do jogo claramente expressas no mesmo. Permite criar uma partida vibrante em qualquer lugar."
3173663059-NameJp = "Tapete Azul-celeste do Grande Festival Esportivo"
3173663059-DescriptionJp = "Um tapete de ginástica incrivelmente fofo que alivia as preocupações de se lesionar."
2486348996-NameJp = "Tapete Azul do Grande Festival Esportivo"
2486348996-DescriptionJp = "Um tapete de ginástica incrivelmente fofo que alivia as preocupações de se lesionar."
3259632524-NameJp = "Tapete Bege do Grande Festival Esportivo"
3259632524-DescriptionJp = "Um tapete de ginástica incrivelmente fofo que alivia as preocupações de se lesionar."
3032310339-NameJp = "Placar do Grande Festival Esportivo"
3032310339-DescriptionJp = "O placar que mostra os resultados dos atletas e aumenta a moral da torcida. Traz uma sensação de tensão e emoção só de o olhar."
604450678-NameJp = "Janela do Grande Festival Esportivo"
604450678-DescriptionJp = "Uma janela através da qual se pode assistir ao Grande Festival Esportivo. As alunas estão no meio do seu jogo."
812562737-NameJp = "Pilar Bege do Grande Festival Esportivo"
812562737-DescriptionJp = "Um pilar bege através do qual se pode sentir o vigor do Grande Festival Esportivo. Permite organizar o espaço para que se destaque."
2977651098-NameJp = "Caixa de Armazenamento de Bolas do Grande Festival Esportivo"
2977651098-DescriptionJp = "Uma caixa de armazenamento para as bolas que são utilizadas em muitos desportos. Permite trazer de volta uma bola a qualquer momento."
832984722-NameJp = "Cesta de Bebidas Energéticas"
832984722-DescriptionJp = "Cesto de bebidas energéticas com gelo frio preparado para refrescar as alunas. Ajuda a recuperar a vitalidade com apenas um único gole."
3592043563-NameJp = "Cesta de Basquete do Grande Festival Esportivo"
3592043563-DescriptionJp = "Um cesto de basquete simples. Mesmo as que não são as melhores atiradoras iriam querer dar um afundanço uma vez nas suas vidas!"
1973452569-NameJp = "Cesta de Cestas Amarela"
1973452569-DescriptionJp = "Um cesto adorável decorado com um tom amarelo. Vamos encher a cesta com bolas de diferentes cores!"
3526747408-NameJp = "Cesta de Cestas Azul"
3526747408-DescriptionJp = "Um cesto adorável decorado com um tom azul. Vamos encher a cesta com bolas de diferentes cores!"
820798347-NameJp = "Cesta de Cestas Azul-celeste"
820798347-DescriptionJp = "Um cesto adorável decorado com um tom azul-claro. Vamos encher a cesta com bolas de diferentes cores!"
2398625876-NameJp = "Cadeira do Árbitro do Grande Festival Esportivo"
2398625876-DescriptionJp = "A cadeira para os árbitros supervisionarem o jogo. Oferece as melhores vistas para analisar a situação num relance."
4051838828-NameJp = "Rede do Grande Festival Esportivo"
4051838828-DescriptionJp = "Uma rede feita com um material duradouro. A incrível e intensa tensão nas trocas de bola que ocorrem sobre esta rede."
3620318852-NameJp = "Piso de Madeira do Grande Festival Esportivo"
3620318852-DescriptionJp = "Um pavimento de madeira fabricado duradouramente. Oferece alta tração que previne resvalar."
1998183698-NameJp = "Decoração de Bandeiras do Peroro do Grande Festival Esportivo"
1998183698-DescriptionJp = "Bandeiras do adorável Peroro. Exala fofura e apoio num relance!"
2904276420-NameJp = "Decoração de Bandeiras de Torcida do Grande Festival Esportivo"
2904276420-DescriptionJp = "Ouvirá aplausos só de olhar para as bandeiras de apoio. As cores vivas acendem a sua paixão de novo."
114040411-NameJp = "Papel de Parede do Grande Festival Esportivo"
114040411-DescriptionJp = "Papel de parede num tom bege claro. Adequa-se bem ao resto do equipamento que embeleza o evento."
832633492-NameJp = "Cenário do Grande Festival Esportivo"
832633492-DescriptionJp = "O fundo do Grande Festival Esportivo fá-lo sobressair do resto. Dá-lhe um gostinho da vibração do evento."
3818682926-NameJp = "Painel do Grande Festival Esportivo"
3818682926-DescriptionJp = "O cartaz de pé para o Grande Festival Esportivo atrai os olhos de muitos. Até aquelas que não estavam interessadas param subitamente para dar uma olhadela."
4084185733-NameJp = "Cadeira Dobrável do Grande Festival Esportivo"
4084185733-DescriptionJp = "Uma cadeira rebatível feita de ferro robusto. Uma vez que pode ser dobrada para armazenamento quando não está a ser utilizada, oferece opções esplêndidas de armazenamento."
3719677986-NameJp = "Cavalo de Saltos do Grande Festival Esportivo"
3719677986-DescriptionJp = "O bloco de saltos que desperta o seu desejo por ele. Os belos matizes encaixam incrivelmente bem no Grande Festival Esportivo."
2320061101-NameJp = "Carrinho da Corrida de Comer Pão do Grande Festival Esportivo"
2320061101-DescriptionJp = "A banca de comida para a corrida de comer pão onde deliciosos donuts são expostos numa fila. Talvez aquelas com corações de gourmets pudessem ser encorajadas a participar se olhassem para isto?"
523248880-NameJp = "Tenda de Descanso do Grande Festival Esportivo"
523248880-DescriptionJp = "Uma tenda que oferece um descanso repousante. Perfeita para repousar um pouco os corpos exaustos que correm pelo campo."
2216160600-NameJp = "Bancada de Torcida do Grande Festival Esportivo"
2216160600-DescriptionJp = "A bancada foi perfeitamente adaptada para o apoio e encorajamento. Cheia da paixão feroz de dar energia aos que lutam."
2711187349-NameJp = "Cesto de Equipamentos do Grande Festival Esportivo"
2711187349-DescriptionJp = "Um cesto onde estão guardados pequenos acessórios a serem utilizados para vários eventos. Deves apressar-te e correr para os eventos mais populares o mais rápido que conseguires!"
4186446994-NameJp = "Mesa de Almoço do Grande Festival Esportivo"
4186446994-DescriptionJp = "A mesa de jantar para servir o almoço, que é o grande atrativo de um evento desportivo. Durante o qual, os jogadores refletirão sobre o jogo da manhã e apresentarão novas táticas para tentar a vitória para a próxima metade."
3249630751-NameJp = "Estante de Troféus do Grande Festival Esportivo"
3249630751-DescriptionJp = "A Estante de Troféus do Grande Festival Desportivo, onde os troféus da Glória são expostos numa fila. Tem todos os objetivos e sonhos das alunas no Festival de Desporto."
1270765820-NameJp = "Portão de Entrada do Grande Festival Esportivo"
1270765820-DescriptionJp = "O Portão de Entrada assinala o brilhante início do Grande Festival de Desporto. Sente-se o entusiasmo na sua forma mais intensa logo após a entrada."
2400305011-NameJp = "Janela com Cortinas"
2400305011-DescriptionJp = "Uma janela adornada com cortinas que fluem. Quando a brisa sopra através da janela, pode sentir o seu cheiro reconfortante de paz."
540301307-NameJp = "Mesa de Centro Branca"
540301307-DescriptionJp = "A mesa concebida para colocar os seus cafés em cima. Ao sentar-se à sua frente, poderá certamente apreciar e sentir-se confortável nas pausas da tarde."
2738215609-NameJp = "Cadeira Simples Colorida"
2738215609-DescriptionJp = "Uma única cadeira que ostenta o seu requintado gosto por combinações de cores. Muito firme e fofa, ao sentar fará com que sinta as suas qualidades relaxantes."
4156726588-NameJp = "Prateleira de Plantas"
4156726588-DescriptionJp = "O espaço das prateleiras que alberga os vasos. Dá um pequeno acento visual às paredes brancas lisas."
3942981484-NameJp = "Mesa de Sobremesas Branca"
3942981484-DescriptionJp = "Uma mesa baixa utilizada para colocar a sua sobremesa. Apenas a mesa que precisa quando conversa em felicidade com as suas pessoas especiais."
2108508784-NameJp = "Sofá Longo Colorido"
2108508784-DescriptionJp = "O banco longo concebido para duas pessoas. Mesmo que as pessoas continuem de pé e sentadas de vez em quando, a durabilidade tem sido a maior força por detrás das vendas."
696868990-NameJp = "Jardineira Colorida de Dois Andares"
696868990-DescriptionJp = "O arranjo do vaso das plantas para ser exposto em duas metades. Ter apenas isto não deixará dúvidas de que as pessoas podem ter o seu próprio jardim botânico."
529277183-NameJp = "Menu de Parede dos Momo Friends"
529277183-DescriptionJp = "O Menu de Parede a afixar no Café. O prato especial dos Momo Friends em conjunto com as luzes brilhantes dará certamente uma aura adorável à sua atmosfera."
3122346673-NameJp = "Pilar de Fotos dos Momo Friends"
3122346673-DescriptionJp = "O Pilar decorado com as fotografias do Momo Friends Cafe. Pode-se ver as fotografias pitorescas de como devem ser as aparências dos cafés Momo Friends."
2845270565-NameJp = "Janela de Vidro"
2845270565-DescriptionJp = "O aspeto das janelas de vidro dá aquele sentimento de emancipação. Tomemos o nosso café enquanto damos uma boa olhada ao que o belo mundo tem para oferecer ao ar livre!"
3224998488-NameJp = "Armário do Peroro"
3224998488-DescriptionJp = "A estante de decoração para dispor as suas mascotes e os Vasos de Plantas de Peroro. Uma aura tão cativante que partilham entre si."
607571213-NameJp = "Quadro Negro da Sala de Aula de Abydos"
607571213-DescriptionJp = "O quadro arranjado de forma limpa. Faz com que de alguma forma sinta o desejo de rabiscar alguma coisa."
1585717654-NameJp = "Armário de Aluna de Abydos"
1585717654-DescriptionJp = "O cacifo providenciado às Alunas de Abydos. Fica ao critério da aluna desenhar o seu interior."
1946673948-NameJp = "Prateleira da Sala de Aula de Abydos"
1946673948-DescriptionJp = "O cacifo do pacote contendo as necessidades que se utilizam na escola. Composição muito cativante da sua combinação de cores."
1608437119-NameJp = "Cadeira da Sala de Aula de Abydos"
1608437119-DescriptionJp = "O seu estilo exterior arrumado deixa uma boa impressão. Empurre-o ligeiramente para trás e poderia sentar-se na cadeira para conversar com o seu amigo durante horas."
2332133708-NameJp = "Relógio de Parede da Sala de Aula de Abydos"
2332133708-DescriptionJp = "Um relógio de parede que se gaba do seu design de estilo limpo e inteligente. Não há nada melhor para os estudantes olharem antes de se apressarem para a hora de almoço num segundo."
2029098150-NameJp = "Mesa da Sala de Aula de Abydos com Lancheira"
2029098150-DescriptionJp = "Mesa onde alguém colocou a sua Bento amorosa e atenciosa. A hora das refeições pode já se ter dissipado da mente de alguém."
2742545103-NameJp = "Piso da Sala de Aula de Abydos"
2742545103-DescriptionJp = "Chão de bege claro decorado a condizer com a sala de aula. É seguro porque são escorregadios."
2333504969-NameJp = "Painel de Corredor da Sala de Aula de Abydos"
2333504969-DescriptionJp = "As paredes de gesso para separar as divisões para a utilidade do espaço. A divisória evoca as memórias da escola muito bem."
3598923842-NameJp = "Alto-falante de Parede da Sala de Aula de Abydos"
3598923842-DescriptionJp = "A clássica moldagem e o design para a Box Speaker para pendurar contra a parede da sala de aula. Cujas saídas de som são bastante mais potentes do que o esperado."
832134850-NameJp = "Pilar da Sala de Aula de Abydos"
832134850-DescriptionJp = "O pilar combinou e fundiu com a sua divisória da parede de estuque. A sua pintura brilhante vai chamar muito a sua atenção."
1559310292-NameJp = "Quadro de Avisos da Sala de Aula de Abydos"
1559310292-DescriptionJp = "O Quadro de Avisos e Quadro Negro para ter num relance as atividades e eventos escolares previstos. É preenchido com agendas diárias por vezes."
2961499698-NameJp = "Painel de Campanhas da Sala de Aula de Abydos"
2961499698-DescriptionJp = "A prancha onde afixam cartazes para anúncios sobre a Campanha da Escola. Podemos ver uma parte e vislumbrar a expressão proativa das estudantes."
2508722855-NameJp = "Armário de Ferramentas de Limpeza da Sala de Aula de Abydos"
2508722855-DescriptionJp = "Alguém disse uma vez que um local limpo era a virtude da pureza do estudante. O Abydos Clean Kit Storage e The Cupboards têm todos os pedaços que precisam."
565013558-NameJp = "Armário de Sensei de Abydos"
565013558-DescriptionJp = "A prateleira com cacifo para que as coisas do Sensei as possuam e as guardem no seu interior. Enche de guloseimas nas ocasiões de festa e aniversário?"
1273888019-NameJp = "Mesa da Sala de Aula de Abydos com Cardigã"
1273888019-DescriptionJp = "As secretárias em que alguém tem os seus Casacos Amarelos pendurados ao lado das cadeiras. Emissão de calidez e carisma com estilo bem comportado do dono."
2424547713-NameJp = "Mesa da Sala de Aula de Abydos com Pelúcia de Baleia"
2424547713-DescriptionJp = "A mesa onde as mascotes felpudas Whale Plugs permanecem presas. Dando uma sensação de relaxamento de alguma forma."
2024364171-NameJp = "Mesa da Sala de Aula de Abydos com Óculos"
2024364171-DescriptionJp = "As secretárias com Óculos com Aro Vermelho sobre as mesas. Os dons das pessoas educadas e fiéis."
3616232594-NameJp = "Mesa da Sala de Aula de Abydos com Máscara"
3616232594-DescriptionJp = "A secretária e a mesa cobertas pela sua máscara sobre as mesmas. Proporcionam uma vibração e uma aura assustadoramente extraordinárias."
629150665-NameJp = "Mesa da Sala de Aula de Abydos com Laço e Luvas"
629150665-DescriptionJp = "A secretária e a mesa dispostas com laços e luvas sobre a mesma. Até as tarefas essenciais parecem que valem a pena ser atiradas ou delegadas a este dono da mesa."
1101212602-NameJp = "Mesa da Sala de Aula de Abydos com Mochila Escolar"
1101212602-DescriptionJp = "A Mesa que tem mochilas grandes no seu topo. As suas donas podem ter saído da secretária deles já há algum tempo sem que ela própria regresse."
1560236674-NameJp = "Suporte para Armas da Sala de Aula de Abydos"
1560236674-DescriptionJp = "A estante de armas para colocar as peças mais valiosas de Armas e Munições do Estudante, uma a uma. De longe, o item da casa mais visível entre a turma."
3852063070-NameJp = "Painel Divisório da Sala de Aula de Abydos"
3852063070-DescriptionJp = "As engenhocas surpreendentes que reuniram as funções de espalhar as palavras e o divisionismo localizam ao mesmo tempo as características de comodidade e doçura num só pacote."
1315605472-NameJp = "Mesa do Sensei de Abydos"
