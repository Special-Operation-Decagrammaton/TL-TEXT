[translation]
3609368965-NameJp = "Texto para controle de tamanho de caracteres"
3609368965-DescriptionJp = ""
3194776850-NameJp = "Escritório"
3194776850-DescriptionJp = "Um escritório onde estão guardados vários suprimentos necessários para o trabalho administrativo. O Sensei trabalha principalmente aqui no Schale."
1907901108-NameJp = "Sala Audiovisual"
1907901108-DescriptionJp = "Uma sala audiovisual equipada com uma tela grande para assistir a mídias de vídeo. É possível assistir a vários dramas, filmes e animes populares."
358080736-NameJp = "Ginásio"
358080736-DescriptionJp = "Um ginásio grande que também possui arquibancadas. Quase todos os equipamentos esportivos estão disponíveis."
4294611526-NameJp = "Primeiro Prédio Escolar de Gehenna"
4294611526-DescriptionJp = "O maior prédio escolar do distrito central da Academia Gehenna. Existem muitas salas de aula, mas quase nenhuma delas tem aulas sendo realizadas adequadamente."
1274324253-NameJp = "Prédio de Clubes da Academia Gehenna"
1274324253-DescriptionJp = "O prédio onde as salas de clubes da Academia Gehenna estão reunidas. No entanto, para a maioria dos alunos, é usado como um espaço de uso livre."
358653965-NameJp = "Pátio da Academia Gehenna"
358653965-DescriptionJp = "Um pátio que ostenta uma vasta área. Não é bem administrado, então é preciso ter cuidado, pois você pode acabar se perdendo se baixar a guarda."
2196189972-NameJp = "Campo Esportivo Central de Gehenna"
2196189972-DescriptionJp = "O campo esportivo central da Academia Gehenna. É usado para aulas de educação física e várias atividades ao ar livre."
1866984703-NameJp = "Segundo Prédio Escolar de Gehenna"
1866984703-DescriptionJp = "O segundo prédio escolar do distrito central da Academia Gehenna. Ao contrário do primeiro prédio, este é destinado a alguns alunos dedicados que desejam se concentrar nos estudos."
3032755222-NameJp = "Praça dos Estudantes de Gehenna"
3032755222-DescriptionJp = "Uma praça que os alunos podem usar livremente. Como é um local onde muitos alunos circulam, conflitos ocorrem dia e noite."
970571410-NameJp = "Quartel-General do Comitê Disciplinar de Gehenna"
970571410-DescriptionJp = "O quartel-general onde fica o Comitê Disciplinar de Gehenna. É o único lugar no distrito central que é devidamente administrado."
1533671597-NameJp = "Prédio Escolar Abandonado de Gehenna"
1533671597-DescriptionJp = "Um prédio que não está mais em uso. Embora tenha sido fechado como instalação, ainda é possível entrar e sair livremente, tornando-se um foco de vários incidentes. É uma área perigosa, por isso é preciso ter cuidado ao entrar."
261901867-NameJp = "Biblioteca"
261901867-DescriptionJp = "Uma biblioteca que abriga muitos livros, desde livros didáticos para os alunos até livros de trabalho para o Sensei. Além de livros técnicos, também há mangás e light novels."
1983840990-NameJp = "Prédio Principal de Abydos"
1983840990-DescriptionJp = "O prédio principal de Abydos, usado principalmente pelos alunos de Abydos. Como os alunos do Comitê de Contramedidas o administram bem diariamente, ele é mantido em boas condições, mesmo em meio às tempestades de areia diárias."
3073680445-NameJp = "Anexo de Abydos"
3073680445-DescriptionJp = "O anexo de Abydos, conectado ao prédio principal por um corredor. Atualmente, abriga salas de aula como o laboratório de ciências e a sala de música, que não estão em uso."
3030528899-NameJp = "Campo Esportivo de Abydos"
3030528899-DescriptionJp = "Um campo esportivo usado para aulas de educação física e festivais esportivos. Atualmente, está sendo soterrado pela areia, tornando a manutenção difícil."
4060200853-NameJp = "Biblioteca de Abydos"
4060200853-DescriptionJp = "Uma biblioteca onde se pode estudar ou ler livros. Há vários livros que eram populares em Abydos, desde livros de referência para estudo até revistas e mangás."
4149434655-NameJp = "Piscina de Abydos"
4149434655-DescriptionJp = "A piscina de Abydos, que raramente é usada. A água secou completamente e o chão está rachado com areia acumulada."
2812564490-NameJp = "Ginásio de Abydos"
2812564490-DescriptionJp = "Um ginásio que serve tanto para aulas de educação física em recinto fechado quanto como auditório. Atualmente, materiais não utilizados e equipamentos esportivos estão armazenados lá."
3019364332-NameJp = "Loja de Conveniência de Abydos"
3019364332-DescriptionJp = "A loja de conveniência que todos adoram. Embora a variedade de produtos seja inferior à de outras escolas, ainda é possível encontrar pães e doces populares em Kivotos."
2602511445-NameJp = "Prédio Escolar Antigo de Abydos"
2602511445-DescriptionJp = "Um prédio que já foi usado como espaço de descanso para círculos e clubes. É um prédio antigo e foi fechado devido a preocupações com a durabilidade, mas os alunos às vezes o usam para testes de coragem."
774508018-NameJp = "Sala de Aula"
774508018-DescriptionJp = "Uma sala de aula onde os alunos têm aulas regularmente. Também é usada para os alunos estudarem sozinhos ou apresentarem trabalhos."
1925286931-NameJp = "Torre Millennium"
1925286931-DescriptionJp = "Uma torre gigantesca que abriga os principais clubes e comitês da Millennium, incluindo o Seminar. Possui muitos sistemas de segurança de ponta, e a entrada de pessoas de fora é estritamente restrita."
698860447-NameJp = "Estação de Monotrilho"
698860447-DescriptionJp = "Uma estação de monotrilho que permite viajar por toda a academia. O monotrilho da Millennium é bastante rápido e quase não produz ruído ou vibração."
2688045816-NameJp = "Biblioteca"
2688045816-DescriptionJp = "Uma biblioteca para os alunos da Millennium usarem em pesquisas e estudos. Também é possível visualizar mídias de vídeo, como documentários."
1022652590-NameJp = "Quiosque"
1022652590-DescriptionJp = "Um quiosque perfeito para descansar, onde se vendem pães, bebidas e outros itens. Dizem que, entre a grande variedade de produtos, o expresso duplo e as bebidas energéticas são os que mais vendem."
2885237148-NameJp = "Centro de Treinamento"
2885237148-DescriptionJp = "Um centro de treinamento onde é possível realizar diversos experimentos de engenharia. Possui muitos equipamentos e instalações de ponta, como impressoras 3D de grande porte."
3070757653-NameJp = "Centro de Dados"
3070757653-DescriptionJp = "Um centro de dados onde estão instalados inúmeros servidores e dispositivos de comunicação de dados. Materiais de pesquisa valiosos de Millennium também estão armazenados aqui."
1295016811-NameJp = "Usina de Energia"
1295016811-DescriptionJp = "Uma usina que produz e fornece eletricidade usada dentro da Millennium Science School. Parece ser um sistema ecologicamente correto que quase não gera poluição."
895510277-NameJp = "Centro de Fitness"
895510277-DescriptionJp = "Um centro de fitness onde é possível relaxar o corpo cansado das pesquisas ou treinar. Equipado com instalações de última geração, oferece treinos otimizados para cada aluna."
3140661513-NameJp = "Laboratório"
3140661513-DescriptionJp = "Uma sala de aula onde se podem realizar experimentos científicos simples. Como há muitos produtos químicos perigosos e instrumentos afiados, tenha muito cuidado."
2871272188-NameJp = "Catedral da Trindade"
2871272188-DescriptionJp = "O maior edifício da Trindade e, sem dúvida, o lugar que a simboliza. Ao mesmo tempo, é também a sede da 'Sisterhood'."
3137866576-NameJp = "Praça da Trindade"
3137866576-DescriptionJp = "Uma praça localizada exatamente no centro, que também dá nome a esta área. É um local popular onde as alunas da Trindade costumam se reunir, e a bela fonte no centro é um ponto famoso, conhecido até por quem não conhece bem a Trindade."
3915788217-NameJp = "Biblioteca Central"
3915788217-DescriptionJp = "Uma biblioteca gigantesca, considerada a maior não apenas na Trindade, mas em todo o Kivotos. Devido ao seu tamanho e complexidade, há rumores de que algumas alunas acabam se perdendo dentro do prédio."
1205798181-NameJp = "Edifício dos Clubes"
1205798181-DescriptionJp = "Um dos edifícios onde os clubes e comitês da Trindade se reúnem. Diversas atividades e reuniões são realizadas aqui diariamente."
1291519405-NameJp = "Basis schola"
1291519405-DescriptionJp = "Um prédio antigo que não está mais em uso, cujo nome significa 'Base das Alunas'. Parece que, no passado, serviu como sede da 'Brigada de Socorro'."
2678735093-NameJp = "Museu de Arte"
2678735093-DescriptionJp = "Um museu de arte dentro da escola que abriga muitas obras. Às vezes, também é usado como local para aulas de artes."
1148047130-NameJp = "Auditório de Música"
1148047130-DescriptionJp = "Um edifício construído relativamente há pouco tempo que abriga uma sala de concertos. Além das aulas de música, é usado como palco para concertos, peças de teatro e outros eventos."
2413575071-NameJp = "Biblioteca Antiga"
2413575071-DescriptionJp = "Um edifício separado da Biblioteca Central, onde livros antigos são armazenados. Como é bastante antigo e difícil de manter limpo, não é muito visitado pelas alunas. Também é usado como sede do 'Comitê de Biblioteca' da Trindade."
1107627875-NameJp = "Estande de Tiro"
1107627875-DescriptionJp = "Um local de prática de tiro com espaço suficiente para várias pessoas atirarem ao mesmo tempo. Diversos tipos de munição estão disponíveis para que alunas de qualquer escola possam utilizar."
2340126097-NameJp = "Secretaria de Red Winter"
2340126097-DescriptionJp = "O edifício principal da escola onde fica a secretaria de Red Winter. Esculturas de bigodes, que simbolizam a autoridade da Presidente Cherino, estão espalhadas por toda parte."
683355499-NameJp = "Praça da Revolução do Bigode Vermelho"
683355499-DescriptionJp = "Uma praça gigantesca perto da secretaria de Red Winter. Todo fim de semana, realizam-se assembleias para exaltar os feitos da Presidente Cherino."
414654122-NameJp = "1º Dormitório Público"
414654122-DescriptionJp = "Um dormitório público construído sob a orientação da secretaria. Pode acomodar pessoas de forma eficiente, mas muitos quartos não têm água quente devido ao envelhecimento das instalações."
2066711573-NameJp = "Estação de Transmissão Red Bear"
2066711573-DescriptionJp = "A única estação de mídia da Academia Federal Red Winter, de onde são transmitidos os programas da 'Red Bear'. A maior parte do conteúdo das transmissões consiste em elogios à Presidente Cherino."
3364708890-NameJp = "3º Refeitório Público"
3364708890-DescriptionJp = "O refeitório estudantil onde as alunas de Red Winter fazem suas refeições. Com exceção da grande Presidente Cherino, a comida servida a todas as alunas é igual."
2715934839-NameJp = "Mercado do Golfinho Branco"
2715934839-DescriptionJp = "Um mercado ao ar livre histórico onde as alunas de Red Winter negociam itens feitos à mão. Às vezes, produtos não autorizados pela secretaria também circulam por lá."
264515151-NameJp = "Armazém Florestal"
264515151-DescriptionJp = "Um armazém que guarda máquinas florestais e madeira necessárias para o corte de árvores. Como há muitas máquinas perigosas, use sempre equipamentos de segurança ao visitar."
328579908-NameJp = "Escritório do Departamento de Obras"
328579908-DescriptionJp = "O escritório onde as alunas do Departamento de Obras costumam ficar de prontidão. Se você visitá-las, sempre receberá um serviço perfeito e rápido."
3657567135-NameJp = "Hangar"
3657567135-DescriptionJp = "Um hangar onde podem ser guardadas armas de apoio tático, como tanques, veículos e helicópteros. Também possui várias ferramentas necessárias para a manutenção e reparo de veículos."
1933676415-NameJp = "Edifício Principal do Yin-Yang de Hyakkiyako"
1933676415-DescriptionJp = "O edifício principal onde fica o Yin-Yang, o conselho estudantil de fato da Academia de Alianças Hyakkiyako. Dizem os rumores entre as alunas que o local é equipado com todo tipo de armadilhas e dispositivos de defesa."
4168293052-NameJp = "Praça Central"
4168293052-DescriptionJp = "Uma enorme praça visível a partir do prédio principal do Departamento de Yin-Yang. É usada como ponto de encontro para turistas, e a estátua no centro da praça é um local popular para tirar fotos."
2953329321-NameJp = "Local de Apresentações do Departamento de Yin-Yang"
2953329321-DescriptionJp = "O local onde ocorrem as apresentações irregulares do Departamento de Yin-Yang. Batalhas de Haiku, torneios de Rakugo da Niya, demonstrações de talentos surpresa da Chise — é famoso por ter ingressos esgotados a cada apresentação."
990108595-NameJp = "Grande Jardim"
990108595-DescriptionJp = "Um jardim famoso que todo turista que visita a Academia Hyakkiyako faz questão de conhecer. Dizem os rumores que uma carpa gigante, chamada de 'Mestre', vive no lago. Mercadorias também estão à venda."
1694812288-NameJp = "Rua Comercial de Hyakkiyako"
1694812288-DescriptionJp = "A rua comercial da Academia Hyakkiyako. A famosa cafeteria 'Hyakkiyado' de Hyakkiyako também fica aqui. Dizem que, quando os encrenqueiros causam confusão, a garota-propaganda da Hyakkiyado resolve o problema."
2072243193-NameJp = "Teleférico Turístico"
2072243193-DescriptionJp = "O teleférico da Academia Hyakkiyako. Dizem que a vista panorâmica de Hyakkiyako a partir do teleférico se torna uma memória inesquecível. A tarifa de ida e volta é de 500 ienes."
2050672265-NameJp = "Museu de Tradições"
2050672265-DescriptionJp = "Um museu enorme onde se pode vivenciar a história e as tradições únicas da Academia Hyakkiyako. A reputação entre os alunos que o visitam não parece ser muito boa."
4134542221-NameJp = "Observatório da Árvore Sagrada"
4134542221-DescriptionJp = "Um observatório de onde se pode ver toda a paisagem de Hyakkiyako. Devido à sua vista espetacular, tornou-se cenário de inúmeros filmes e dramas, sendo famoso como um local sagrado."
2941784831-NameJp = "Subdivisão Shiratori da Escola de Polícia Valkyrie"
2941784831-DescriptionJp = "É uma subdivisão da Escola de Polícia Valkyrie. Cercada por áreas verdes exuberantes, dizem que o ar é muito bom por lá."
1693953940-NameJp = "Corgi Town"
1693953940-DescriptionJp = "Uma famosa rua comercial de eletrônicos. Corre o boato de que é possível encontrar qualquer coisa, exceto itens que já saíram de linha."
4116376335-NameJp = "Tri-Square"
4116376335-DescriptionJp = "Uma praça usada tanto como local de descanso quanto como ponto de encontro. É um lugar perfeito para uma caminhada."
3884396288-NameJp = "3º Distrito Comercial"
3884396288-DescriptionJp = "Um distrito comercial localizado ao lado da Tri-Square. É um espaço moderno e sofisticado, onde as estradas e os edifícios estão em bela harmonia."
880697741-NameJp = "Plad Avenue"
880697741-DescriptionJp = "A rua onde se localiza o museu de arte. O museu é maravilhoso, mas a cidade inteira é considerada uma cidade das artes."
3130494169-NameJp = "Parque da Vizinhança de Shiratori"
3130494169-DescriptionJp = "Comparado ao tamanho do parque, não recebe tantos visitantes, mas ainda assim é um lugar indispensável."
3543706609-NameJp = "Porto de Kanezaki"
3543706609-DescriptionJp = "Se você quer ver o mar, ir até aqui é uma boa opção. Embora talvez não seja a visão que você imaginou."
3251299115-NameJp = "Lamini Town"
3251299115-DescriptionJp = "Uma rua de restaurantes que não perde em nada para os pontos gastronômicos de outras academias. Inúmeras barracas e restaurantes estão alinhados nos dois lados de um rio estreito."
1833374923-NameJp = "Sala de Estudos"
1833374923-DescriptionJp = "Uma sala usada para estudos individuais ou em grupo. Por ser popular, é necessário fazer reserva antes de usar."
3691365347-NameJp = "Sala de Treinamento"
3691365347-DescriptionJp = "Uma sala de treinamento completa, equipada com esteiras, halteres e racks de agachamento. Mesmo com o trabalho ocupado, não descuide da saúde; exercite-se regularmente para fortalecer o corpo."
2987442229-NameJp = "Sala de Descanso"
2987442229-DescriptionJp = "Uma sala de descanso equipada com poltronas reclináveis, camas e até um bar. Para os professores que fazem muitos turnos noturnos, também há instalações de higiene disponíveis."
174166180-NameJp = "Loja de Conveniência"
174166180-DescriptionJp = "A loja de conveniência localizada na área residencial, a 'Angel 24'. Você pode comprar lanches, bebidas e explosivos."
3217933897-NameJp = "Centro de Jogos"
3217933897-DescriptionJp = "Um centro de jogos na área residencial equipado com vários tipos de máquinas de arcade. Como a maioria são jogos retrô antigos, é muito popular entre os poucos entusiastas espalhados por vários lugares."
1142275086-NameJp = "Refeitório"
1142275086-DescriptionJp = "O refeitório da área residencial responsável pelas refeições do Schale. Como possui diversos equipamentos de cozinha, também é possível realizar aulas práticas de culinária aqui."
2776103305-NameJp = "Horta"
2776103305-DescriptionJp = "Uma pequena horta doméstica instalada no terraço ao ar livre para cultivar plantas. Você pode cultivar vegetais e frutas usados na culinária."
110094030-NameJp = "Escola Secundária Abydos"
110094030-DescriptionJp = "O prédio principal da Escola Secundária Abydos. Antigamente era um pequeno prédio de filial, mas agora é usado como prédio principal."
4267333592-NameJp = "D.U. Distrito Shiratori"
4267333592-DescriptionJp = "(X)"
3125409229-NameJp = "Academia Gehenna - Distrito Central"
3125409229-DescriptionJp = "O distrito central da Academia Gehenna. Gehenna é uma das três maiores academias de Kivotos e é caracterizada por seu ambiente escolar livre."
1428109633-NameJp = "Centro de Hyakkiyako"
1428109633-DescriptionJp = "(X)"
1111616358-NameJp = "Área de Estudos da Millennium"
1111616358-DescriptionJp = "Uma área da Millennium Science School dedicada aos estudos. A Millennium é uma escola com foco na educação científica e, embora tenha uma história recente, é considerada uma das academias mais influentes de Kivotos."
1466521158-NameJp = "Academia Federal Red Winter"
1466521158-DescriptionJp = "(X)"
1895832836-NameJp = "Escritório da Schale"
1895832836-DescriptionJp = "O escritório da Schale. Há muito espaço disponível para o trabalho administrativo."
4231969254-NameJp = "Área Residencial da Schale"
4231969254-DescriptionJp = "A área residencial da Schale. É também onde o Sensei vive normalmente."
481812794-NameJp = "Praça Trinity"
481812794-DescriptionJp = "A área da praça principal dentro da Trinity General School. Como a Trinity foi formada pela união de várias escolas, ela possui uma das maiores áreas territoriais de Kivotos."
