687787590-NameJp = "Boneca de Madeira (Kikyou)"
687787590-DescriptionJp = "Uma boneca que a Kikyou entalhou em madeira à própria imagem. Aparentemente, flutua muito fácil se jogar na água."
1660090480-NameJp = "Boneca de Madeira (Renge)"
1660090480-DescriptionJp = "Uma boneca de madeira da Renge esculpida pela Kikyou. Ela carrega consigo uma paixão incrivelmente ardente."
4095811814-NameJp = "Bilhete de Recrutamento 10x"
4095811814-DescriptionJp = "Um bilhete que permite realizar um recrutamento 10x. ※ Se não for usado até às 23h59min do dia 31 de agosto de 2025, ele desaparecerá."
2989224265-NameJp = "Estande de Arminhas d'Água de Verão"
2989224265-DescriptionJp = "Um estande de arminhas d'água onde dá pra sentir de vez a energia do verão. Quem for o alvo vai acabar completamente ensopado!"
2026387541-NameJp = "Piscina 'Mergulho em Qualquer Lugar'"
2026387541-DescriptionJp = "Uma piscina inflável onde dá para aproveitar o verão sem precisar ir à praia. Na etiqueta tem um aviso enorme escrito: \"Apenas para crianças\"."
2895708620-NameJp = "Uma Solitária Flor Desabrochando das Cem"
2895708620-DescriptionJp = "Pode ser adquirido no evento \"Uma Solitária Flor Desabrochando das Cem\"."
223298101-NameJp = "Laço Branco da Juventude"
223298101-DescriptionJp = "O laço que a protagonista do romance adolescente favorito da Renge costuma usar.\nEle guarda o forte desejo da Renge de que os dias de juventude também cheguem para ela."
2870052181-NameJp = "Console Portátil"
2870052181-DescriptionJp = "O primeiro console portátil que a Midori comprou junto com sua irmã.\nBriguinhas bobas e reconciliações, apostas valendo sorvete... É o xodozinho que esteve presente em inúmeras memórias queridas ao lado dela."
3465934622-NameJp = "Sombrinha com Estampa Floral Deslumbrante"
3465934622-DescriptionJp = "Uma sombrinha magnífica muito adorada pela Wakamo.\nEla carrega o puro e singelo sentimento de Wakamo: \"Que meus sentimentos pelo Sensei sejam eternos\"."
945811089-NameJp = "Caderninho Desgastado"
945811089-DescriptionJp = "Um velho caderno muito gasto pelos anos de uso.\nNele estão registrados todos os detalhes, preferências e talentos das integrantes do comitê. Toda essa observação meticulosa e carinho não deixam de ser uma forma bem particular de demonstrar seu amor."
2283985350-NameJp = "Eleph da Yukari (Roupa de Banho)"
2283985350-DescriptionJp = "Um Eleph repleto do mistério da Yukari (Roupa de Banho)."
1981999467-NameJp = "Eleph da Renge (Roupa de Banho)"
1981999467-DescriptionJp = "Um Eleph repleto do mistério da Renge (Roupa de Banho)."
3810630415-NameJp = "Eleph da Kikyou (Roupa de Banho)"
3810630415-DescriptionJp = "Um Eleph repleto do mistério da Kikyou (Roupa de Banho)."
