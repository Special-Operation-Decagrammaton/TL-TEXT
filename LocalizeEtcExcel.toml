2635859011-NameJp = "A Máscara de Raposa dos Segredos"
2635859011-DescriptionJp = "A máscara com cara de raposa que a Wakamo costuma utilizar. O item favorito de Wakamo, foi originalmente criado e utilizado para disfarçar o seu nome ou os indesejados envolvimentos com as confusões mas de certeza que a máscara que se encontra por trás desta também tem mais um segredo não revelado. O item de moda chique também foi adoravelmente projetado de forma excelente que tem escondido todo o rosto apaixonado de uma adorável donzela."
2459684995-NameJp = "Pontos de Evento"
