284088691-DescriptionJp = "Pontos obtidos em eventos. Ao acumular muitos, você pode obter várias recompensas."
3146510308-NameJp = "Senbei de Raposa"
3146510308-DescriptionJp = "Uma das especialidades mais representativas da rua comercial de Hyakkiyako durante os festivais. A textura crocante e o aroma são simplesmente sublimes."
1959694325-NameJp = "Okonomiyaki com marca de Tanuki"
1959694325-DescriptionJp = "Uma comida indispensável nos festivais de Hyakkiyako. Um item irresistivelmente fofo com um desenho de Tanuki feito de maionese."
2308340710-NameJp = "Sakura Daifuku"
2308340710-DescriptionJp = "O doce clássico da tradicional casa de chá de Hyakkiyako, \"Hyakkiyado\". Suave, rico e com um dulçor equilibrado, a única palavra para descrevê-lo é \"perfeito\"."
2902974760-NameJp = "Matryoshka da Cherino"
2902974760-DescriptionJp = "Uma Matryoshka imponente que imita a aparência de Cherino. Se você sacudi-la, verá que, surpreendentemente, ela está cheia por dentro."
904092714-NameJp = "Chocolate com marca da Cherino"
904092714-DescriptionJp = "Um chocolate famoso produzido em Red Winter. Tem uma textura doce e suave, mas as estudantes de Red Winter acham que é um chocolate duro e difícil de comer por causa do clima frio."
2871602548-NameJp = "Crepe de Bigode"
2871602548-DescriptionJp = "Um crepe doce e delicioso vendido em vários locais de Red Winter. Na escola, também é chamado de \"Blini\". Dizem que, para decorar com o creme em formato de bigode, é necessária a aprovação da Cherino, ou talvez não."
3168602557-NameJp = "Medalha do Bigode Valente"
3168602557-DescriptionJp = "Uma medalha especial feita luxuosamente com ouro, que só pode ser recebida pelas estudantes reconhecidas por Cherino. Como tem muitas pontas afiadas e dói bastante se bater nos cantos, geralmente acaba guardada no fundo da gaveta."
532264540-NameJp = "Pt de Evento"
532264540-DescriptionJp = "Pontos obtidos em eventos. Ao acumular muitos, você pode obter várias recompensas."
3071036351-NameJp = "Bola de Praia"
3071036351-DescriptionJp = "Uma bola para vôlei de praia com um coração fofo estampado."
589252219-NameJp = "Ticket de refeição da casa de praia"
589252219-DescriptionJp = "Um ticket de refeição que pode ser usado na casa de praia, mas que frequentemente se molha e torna o texto ilegível."
3265516866-NameJp = "Mini foguete de artifício"
3265516866-DescriptionJp = "Um foguete de artifício de tamanho adorável."
4230562605-NameJp = "Caixa térmica"
4230562605-DescriptionJp = "Uma caixa térmica cheia de bebidas geladas, frutas e gelo. Como as armas de fogo esquentam rapidamente sob o sol escaldante, ela também é perfeita para guardá-las."
182033757-NameJp = "Conjunto de brincar na areia"
182033757-DescriptionJp = "Um conjunto que inclui pás, baldes e todas as ferramentas necessárias para construir castelos de areia ou brincar na areia. Cimento e vergalhões não inclusos."
3004794592-NameJp = "Cadeira de praia"
3004794592-DescriptionJp = "Um tipo comum de cadeira de praia com estrutura de madeira e tecido. Claro, também possui um acabamento à prova d'água impecável."
2064901758-NameJp = "Mesa com guarda-sol"
2064901758-DescriptionJp = "Uma mesa de jardim estilo tropical com um guarda-sol para bloquear a luz do sol. Uma dama nunca abre mão da hora do chá, nem mesmo à beira-mar."
1274276475-NameJp = "Artigos de praia"
1274276475-DescriptionJp = "Um conjunto completo com boias, bolas de praia, snorkel e outros itens necessários para brincar na praia. Observe que não é adequado para uso em profundidades superiores a 50 metros."
1644359218-NameJp = "Veleiro"
1644359218-DescriptionJp = "Um veículo que desliza sobre a superfície do mar usando o fluxo do vento. Projetado para ser amigável aos iniciantes e fácil de equilibrar."
886310733-NameJp = "Caixa de suprimentos com o selo de Gehenna"
886310733-DescriptionJp = "Uma caixa de suprimentos preparada pelo Comitê Disciplinar para o acampamento de treinamento de verão. Dentro, há vários itens úteis para o treinamento. Não se preocupe, não há itens inúteis."
2668075095-NameJp = "Milho assado do Clube de Pesquisa Gastronômica"
2668075095-DescriptionJp = "Milho assado feito pelo Clube de Pesquisa Gastronômica. Embora o item seja o mesmo, o sabor é aleatoriamente baseado nas preferências dos membros do clube! ...Em outras palavras, não há garantia de sabor."
1254096944-NameJp = "Óculos de sol da delinquente de verão"
1254096944-DescriptionJp = "Óculos de sol que o Comitê Disciplinar confiscou pacificamente do grupo de delinquentes de biquíni \"Hachamecha\", que causavam confusão na praia de verão. Estão um pouco arranhados, mas dizem que não foi por causa de resistência."
104149602-NameJp = "Capacete encharcado"
104149602-DescriptionJp = "Um capacete que o Comitê Disciplinar confiscou pacificamente do \"Grupo do Capacete Encharcado\", que perturba a favela no verão. Está um pouco arranhado, mas foi confiscado de forma totalmente pacífica. De fato, está um pouco molhado."
2553698243-NameJp = "Pt de evento"
2553698243-DescriptionJp = "Pontos que podem ser obtidos no evento. Ao acumular muitos, você pode ganhar várias recompensas."
1847672830-NameJp = "Cogumelo Casco"
1847672830-DescriptionJp = "Um cogumelo com um padrão vistoso semelhante a um casco, que cresce em quase toda a região autônoma de Shanhaijing. É popular como alimento devido à sua textura e sabor agradáveis."
357098688-NameJp = "Brotos de bambu negros"
357098688-DescriptionJp = "Brotos de bambu pretos cultivados no jardim do Xuanlongmen. Como são estritamente controlados pelos executivos do Xuanlongmen, é muito difícil encontrá-los."
3708418519-NameJp = "Ginseng humanoide"
3708418519-DescriptionJp = "Um ginseng encontrado nas profundezas das montanhas de Shanhaijing. Dizem que possui efeitos como prolongar a vida e rejuvenescer."
3320765287-NameJp = "Moeda de chocolate"
3320765287-DescriptionJp = "Um dos doces mais representativos que circulam a bordo do Golden Fleece. É apenas um doce e não uma moeda real, mas é muito popular entre os alunos por ser delicioso."
312190930-NameJp = "Adesivo de coelho"
312190930-DescriptionJp = "Adesivos com estampa de coelho que os alunos colam por toda parte. Vários alunos os criam livremente e os colam livremente em vários lugares."
3290352412-NameJp = "Bilhete de embarque"
3290352412-DescriptionJp = "Bilhete de embarque do Golden Fleece. Recomenda-se mantê-lo sempre com você, pois pode ser solicitado durante eventos mesmo após o embarque."
812405886-NameJp = "Dado"
812405886-DescriptionJp = "Um dado frequentemente visto a bordo do Golden Fleece. Dizem que às vezes é usado para resolver disputas entre os alunos."
3202962982-NameJp = "Pt de evento"
3202962982-DescriptionJp = "Pontos que podem ser obtidos no evento. Ao acumular muitos, você pode ganhar várias recompensas."
1102568152-NameJp = "Toalha de fonte termal"
1102568152-DescriptionJp = "Uma toalha fornecida pela Estância Termal 227. O material não é muito bom, então tome cuidado para não esfregar com muita força ao usar no corpo."
4012080640-NameJp = "Shampoo de bigode"
4012080640-DescriptionJp = "Um shampoo especial da Academia Federal Red Winter, usado por Cherino. Embora tenha \"bigode\" no nome, parece que não é adequado para lavar bigodes."
2585452848-NameJp = "Sais de banho em forma de capivara"
2585452848-DescriptionJp = "Sais de banho sólidos em forma de capivara. Quando colocados na água, liberam um leve aroma cítrico."
1545493133-NameJp = "Bolsa da sorte"
1545493133-DescriptionJp = "Uma bolsa da sorte de Ano Novo vendida pelo Grupo Kurokame. Embora não se saiba o que há dentro até abrir, o conteúdo é surpreendentemente satisfatório."
1215702584-NameJp = "Peroro-mochi"
1215702584-DescriptionJp = "Um enfeite em formato de kagami-mochi vendido pelo Grupo Kurokame, que aproveitou a época de Ano Novo para focar no 'Peroro'. É apenas um item decorativo e não pode ser comido."
130031945-NameJp = "Ema do Grupo Kurokame"
130031945-DescriptionJp = "Uma placa de madeira (ema) vendida pelo Grupo Kurokame. Dizem que, se você escrever seu desejo nela após fazer uma oferenda, ele se tornará realidade. Custa 5 mil ienes por unidade se comprada normalmente."
3586118070-NameJp = "Vale de Omikuji"
3586118070-DescriptionJp = "Um vale para trocar por um omikuji. Na verdade, não é um omikuji legítimo, mas sim um item vendido pelo Grupo Kurokame, e você recebe produtos diferentes dependendo do resultado."
518432250-NameJp = "Pt de Evento"
518432250-DescriptionJp = "Pontos que podem ser obtidos no evento. Ao acumular uma grande quantidade, você pode ganhar várias recompensas."
1669990889-NameJp = "Carta de Arrependimento de um Aluno Problema"
1669990889-DescriptionJp = "Uma carta de arrependimento escrita por um aluno problema que foi detido durante as patrulhas do Dia dos Namorados. Surpreendentemente, o conteúdo é bem sensato."
2861703465-NameJp = "Doces Ilegais Apreendidos"
2861703465-DescriptionJp = "Doces apreendidos durante as patrulhas do Dia dos Namorados. Dizem que foram feitos no submundo, sem permissão oficial. Têm um gosto ruim, do agrado de alunos problemáticos."
2887327615-NameJp = "Saco de Lixo para Atividades de Limpeza"
2887327615-DescriptionJp = "Um saco contendo lixo coletado em vários lugares durante as patrulhas do Dia dos Namorados. No fim das contas, esse tipo de atividade de limpeza é muito gratificante."
3085567581-NameJp = "Convite de Dia dos Namorados"
3085567581-DescriptionJp = "A prova de que alguém está esperando por você no Dia dos Namorados. Dias especiais certamente trazem encontros especiais. *Após o término do evento, qualquer 'Convite de Dia dos Namorados' não utilizado será convertido em 200.000 créditos."
1632581989-NameJp = "Mandado de Prisão de Wakamo"
1632581989-DescriptionJp = "Um mandado de prisão emitido pela Academia de Polícia Valkyrie para prender Wakamo. Nele, estão listados os crimes terríveis que Wakamo cometeu até agora."
3974882278-NameJp = "Pt de Evento"
3974882278-DescriptionJp = "Pontos que podem ser obtidos no evento. Ao acumular uma grande quantidade, você pode ganhar várias recompensas."
2114880617-NameJp = "Véu da Sisterhood"
2114880617-DescriptionJp = "Um véu usado pela Sisterhood. Se usado corretamente, você pode tirar uma soneca durante as orações sem ser pego, embora provavelmente não exista nenhum aluno que faça isso."
4200143845-NameJp = "Hinário de Trinity"
4200143845-DescriptionJp = "Uma coletânea de hinos de Trinity em formato de livro. Além do conteúdo ser bastante difundido, a beleza das palavras é muito elogiada, sendo citada em diversas situações."
2925208730-NameJp = "Castiçal de Trinity"
2925208730-DescriptionJp = "Um castiçal usado nas catedrais de Trinity e outros locais. É feito de forma bastante pesada e resistente; se cair, é capaz de abrir um buraco no chão."
315453169-NameJp = "Pacote de Cartas de Mushiqueen"
315453169-DescriptionJp = "O 3º pacote de expansão do popular jogo de cartas colecionáveis 'Mushiqueen', intitulado 'O Ataque dos Insetos Definitivos'. Kaede diz que, pelo toque no pacote, ela consegue saber se há uma carta rara dentro."
2801049295-NameJp = "Panfleto da Reunião de Intercâmbio"
2801049295-DescriptionJp = "Um panfleto para anunciar a realização de uma 'Reunião de Intercâmbio' entre Hyakkiyako e a Academia Gehenna. Contém a saudação da organizadora, Niya, além da programação principal e avisos importantes."
3117990777-NameJp = "Leque da Princesa Waraku"
3117990777-DescriptionJp = "Um leque com o rosto da adorada ídolo da Academia de Artes da União Hyakkiyako, a senhorita Chise. É um dos itens mais populares entre os fãs, chegando a ser vendido por preços altos."
1122375527-NameJp = "Artigos do Ninpero-san"
1122375527-DescriptionJp = "Artigos de um personagem ninja vendidos na Vila Cinematográfica Uzumaki. Começou como um spin-off de um certo personagem, mas ganhou tanta popularidade que se tornou uma série independente. Algo comum nesta indústria."
2333680348-NameJp = "Caixa de Materiais"
2333680348-DescriptionJp = "Caixas de materiais descartadas por todo o resort abandonado. Parece que estão lá há muito tempo, e não se sabe o que há dentro."
923224583-NameJp = "Moeda Regional"
923224583-DescriptionJp = "A moeda regional do 'Lost Paradise Resort', criada com o objetivo de revitalizar o turismo. Não se sabe se realmente funciona, mas Shizuko diz: 'Não precisamos provar isso, basta demonstrar diretamente!'"
1459837138-NameJp = "Moeda Brilhante da Hyakkiyado"
1459837138-DescriptionJp = "Uma moeda que pode ser trocada por lembranças na casa de praia da Hyakkiyado. No entanto, parece que a maioria dos clientes considera a própria moeda como a lembrança."
2503861371-NameJp = "Concha Lisa"
2503861371-DescriptionJp = "Uma concha com a superfície lisa e polida. Chise diz que, se você encostar no ouvido para ouvir o som, haikus surgem naturalmente na sua mente."
3295998236-NameJp = "Pergaminho de Ninjutsu de Verão"
3295998236-DescriptionJp = "Um pergaminho contendo vários ninjutsus (criativos) que podem ser usados no verão. O conteúdo foca principalmente em acidentes que podem ocorrer durante a estação. Segurança em primeiro lugar, até para ninjas!"
4253247347-NameJp = "Direito de Uso do Resort de Águas Termais do Mar Profundo"
4253247347-DescriptionJp = "Contrato de licença de uso de resort que especifica o direito de uso do Resort de Águas Termais do Mar Profundo."
2442357514-NameJp = "Direito de Uso do Resort de Cruzeiro Mushiqueen"
2442357514-DescriptionJp = "Contrato de licença de uso de resort que especifica o direito de uso do Resort de Cruzeiro Mushiqueen."
4133487383-NameJp = "Direito de Uso de Resort Super Luxuoso"
4133487383-DescriptionJp = "Contrato de licença de uso de resort que especifica o direito de uso do Resort Super Luxuoso."
125540590-NameJp = "Cupom de Doces"
125540590-DescriptionJp = "Um cupom emitido por uma famosa loja de doces. Ao coletá-los e levá-los até lá, você pode trocá-los por uma sobremesa específica."
3387762043-NameJp = "Parfait de Menta com Chocolate"
3387762043-DescriptionJp = "Um parfait de menta com chocolate que possui um sabor único. Um menu que permite saborear o frescor e a doçura ao mesmo tempo."
806537948-NameJp = "Macaron"
806537948-DescriptionJp = "Um macaron do tamanho perfeito para caber na palma da mão. Existem em várias cores e sabores."
336149210-NameJp = "Wafer em Rolo"
336149210-DescriptionJp = "Um doce enrolado com sabor de chocolate. Algumas crianças que querem parecer descoladas costumam ficar com ele na boca enquanto balançam a cabeça."
2418932586-NameJp = "Pt de Evento"
2418932586-DescriptionJp = "Pontos que podem ser obtidos no evento. Ao acumular muitos, você pode adquirir várias recompensas."
1874282437-NameJp = "Saquinho de Feijão (Otadama)"
1874282437-DescriptionJp = "Um saquinho feito de tecido macio preenchido com feijões ou areia. Por ser fofinho, não há risco de se machucar ao ser atingido, sendo usado em jogos como arremesso de bolas. Raramente, descobrem-se alguns que realmente explodem."
3048078452-NameJp = "Bandeira do Millennium"
3048078452-DescriptionJp = "Uma pequena bandeira com o emblema da escola Millennium. Usada para marcar pontos de retorno ou indicar locais de encontro."
2524752608-NameJp = "Apito"
2524752608-DescriptionJp = "Um apito especial feito com a tecnologia de ponta do Clube de Engenharia. Possui uma estrutura complexa que, ao ser soprado, gera um sinal eletrônico que aciona um alto-falante para emitir som."
2871055877-NameJp = "Bebida Esportiva"
2871055877-DescriptionJp = "Uma bebida esportiva especial desenvolvida pelo Millennium. Como foi criada com base nos dados do Clube de Treinamento, dizem que hidrata mais rápido do que outras bebidas."
1469297879-NameJp = "Bastão de Revezamento"
1469297879-DescriptionJp = "Um bastão usado em corridas de revezamento. Tem o formato de uma granada de mão antiga com cabo, mas é um produto equipado com um detonador eletrônico que garante que não explodirá se for passado para o próximo corredor dentro do tempo limite."
2043178916-NameJp = "Anpan"
2043178916-DescriptionJp = "Um pão doce recheado com pasta de feijão, embalado em plástico, usado na corrida de pegar pão. É um pão simples, apenas com feijão, mas dizem que foi muito elogiado por algumas alunas da Academia de Polícia Valkyrie."
3227336825-NameJp = "Panfleto Informativo"
3227336825-DescriptionJp = "Um panfleto informativo distribuído pela sede do Comitê Executivo do Festival Esportivo. Contém não apenas a programação das partidas, mas também um mapa gastronômico detalhado perto da arena."
2905328212-NameJp = "Presente de Natal"
2905328212-DescriptionJp = "Algo que todos esperam no Natal. Crianças más não recebem."
1128970523-NameJp = "Meia de Natal"
1128970523-DescriptionJp = "Uma meia pendurada na expectativa de receber presentes. Se você a usar, ela é bem quentinha."
4179360865-NameJp = "Bengala Doce"
4179360865-DescriptionJp = "Um doce de Natal feito em formato de bengala. Geralmente tem sabor de menta."
1459661267-NameJp = "Gemada"
1459661267-DescriptionJp = "Uma bebida quente feita com leite, ovos e açúcar. Beber em um dia frio ajuda a aquecer o corpo."
1234657893-NameJp = "Pt de Evento"
1234657893-DescriptionJp = "Pontos que podem ser obtidos no evento. Ao acumular muitos, você pode adquirir várias recompensas."
2264400688-NameJp = "Kamaboko Vermelho e Branco"
2264400688-DescriptionJp = "Kamaboko nas cores vermelho e branco. O vermelho simboliza a felicidade e o branco simboliza a proteção contra o mal; é um amuleto da sorte."
3707337679-NameJp = "Peixe da Sorte (Tai)"
3707337679-DescriptionJp = "Como o nome sugere, é um peixe que traz sorte para celebrar a felicidade. É indispensável no Osechi junto com o camarão."
2091304235-NameJp = "Vale de Omikuji"
2091304235-DescriptionJp = "Um vale para tirar um Omikuji (sorteio). Se você coletar vários, poderá tirar um Omikuji. Que tal testar sua sorte para o ano?"
2629342802-NameJp = "Circuito de Computação Multidimensional"
2629342802-DescriptionJp = "Um fragmento do dispositivo de computação que foi separado da Arca de Atra-Hasis. É composto por circuitos complexos."
1015134010-NameJp = "Acessório do Motor Dimensional"
1015134010-DescriptionJp = "Um acessório separado do motor dimensional. Agora não passa de um pedaço de metal e não parece ter utilidade específica."
3353425290-NameJp = "Hambúrguer de Chocolate Espacial"
3353425290-DescriptionJp = "Um hambúrguer de chocolate selado a vácuo para ser usado como comida espacial. Por que selaram um hambúrguer de chocolate? A dúvida ainda não foi esclarecida."
3142506941-NameJp = "Código de Desbloqueio de Portão - Setor Externo 2"
3142506941-DescriptionJp = "Um chip que reconhece o código de desbloqueio capaz de abrir o portão do Setor Externo 2."
2995130259-NameJp = "Código de Desbloqueio de Portão - Setor Externo 3"
2995130259-DescriptionJp = "Um chip que reconhece o código de desbloqueio capaz de abrir o portão do Setor Externo 3."
1012273839-NameJp = "Código de Desbloqueio de Portão - Distrito Central"
1012273839-DescriptionJp = "Um chip que reconhece o código de desbloqueio capaz de abrir os portões do Distrito Central."
344128946-NameJp = "Pt de Evento"
344128946-DescriptionJp = "Pontos que podem ser obtidos em eventos. Ao acumular uma grande quantidade, é possível obter várias recompensas."
1355249104-NameJp = "Capacete de Segurança do Conselho Estudantil Federal"
1355249104-DescriptionJp = "Um capacete de segurança com o logotipo do Conselho Estudantil Federal gravado. Foi produzido especialmente para os trabalhos de restauração desta vez."
2999413236-NameJp = "Demonstrações Financeiras"
2999413236-DescriptionJp = "Demonstrações financeiras usadas pelo departamento financeiro sob a jurisdição do Comitê Administrativo do Conselho Estudantil Federal. Contém um resumo detalhado da situação financeira de Kivotos."
636205895-NameJp = "Salgadinho de Mentaiko"
636205895-DescriptionJp = "O salgadinho de mentaiko que Momoka adora comer. O sabor que deixa a boca salgada pode ser considerado uma iguaria."
832973929-NameJp = "Tiara Bonita"
832973929-DescriptionJp = "Um tipo de acessório de cabelo. Dizem que uma tiara bem arrumada é um item essencial que demonstra a competência de uma empregada."
3488365730-NameJp = "Kit de Maquiagem"
3488365730-DescriptionJp = "Um conjunto repleto de ferramentas para cuidar da aparência. Dizem que, além do propósito original da maquiagem, se bem utilizado, pode servir como ferramenta de disfarce."
1069023790-NameJp = "Convite para a Mansão"
1069023790-DescriptionJp = "Um convite enviado por uma mansão histórica. Dizem os rumores que eventos misteriosos acontecem lá com frequência."
611002646-NameJp = "Conjunto de Cartas"
611002646-DescriptionJp = "Um conjunto de um jogo de cartas popular em Shanhaijing. Quanto mais você colecionar, mais jogos poderá jogar."
1712890776-NameJp = "Vale-Refeição da Associação Genbu"
1712890776-DescriptionJp = "Um vale-refeição emitido pela Associação Genbu. Se você levá-lo, poderá receber a hospitalidade calorosa da Associação Genbu."
1093209845-NameJp = "Distintivo Genryumon"
1093209845-DescriptionJp = "Um distintivo com o brasão da Genryumon. É vendido como mercadoria, mas parece que não é muito popular..."
133960514-NameJp = "Kit de Extração de Solvente"
133960514-DescriptionJp = "Um kit de extração de solvente vendido com a promessa de que qualquer um pode usar. Há rumores de que o Jardim de Amehana reluta em comprá-lo."
4287098248-NameJp = "Caneta-tinteiro de Luxo"
4287098248-DescriptionJp = "Uma caneta-tinteiro de luxo usada pelo Conselho Estudantil Federal para assinaturas. Como a tinta flui suavemente da ponta, não cansa a mão."
3217702690-NameJp = "Camarão Congelado"
3217702690-DescriptionJp = "Camarão congelado logo após ser pescado, preservado fresco. Este camarão congelado é um produto especial da Vila Yodoura, e quase todo o camarão entregue ao D.U. parece ter sido pescado na Vila Yodoura."
4278574452-NameJp = "Pedrinha"
4278574452-DescriptionJp = "Uma pequena pedra frequentemente encontrada na costa. À primeira vista parece comum, mas a suavidade criada pelo atrito das pedras pelas ondas e o brilho molhado pela água encantam as pessoas."
4062911234-NameJp = "Concha"
4062911234-DescriptionJp = "Uma pequena concha frequentemente encontrada na costa. À primeira vista parece sem personalidade, mas não existem duas iguais em termos de padrões e formas detalhadas."
759180874-NameJp = "Estrela-do-mar Seca"
