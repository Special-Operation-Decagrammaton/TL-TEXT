2954381896-DescriptionJp = "Uma caixa que traz Notas Técnicas capazes de aprimorar habilidades. Pode ser dada para alunas de Gehenna, Shanhaijing, Valkyrie ou Highlander."
1788146487-NameJp = "Caixa de Nota Técnica Intermediária"
1788146487-DescriptionJp = "Uma caixa que traz Notas Técnicas capazes de aprimorar habilidades. Pode ser dada para alunas de Gehenna, Shanhaijing, Valkyrie ou Highlander."
1291525634-NameJp = "Caixa de Nota Técnica Básica"
1291525634-DescriptionJp = "Uma caixa que traz Notas Técnicas capazes de aprimorar habilidades. Pode ser dada para alunas da Trinity, Hyakkiyako ou Arius."
3158167961-NameJp = "Caixa de Nota Técnica Intermediária"
3158167961-DescriptionJp = "Uma caixa que traz Notas Técnicas capazes de aprimorar habilidades. Pode ser dada para alunas da Trinity, Hyakkiyako ou Arius."
1790869169-NameJp = "Caixa de Nota Técnica Básica"
1790869169-DescriptionJp = "Uma caixa que traz Notas Técnicas capazes de aprimorar habilidades. Pode ser dada para alunas de Millennium, Abydos, Red Winter ou Wild Hunt."
3127975870-NameJp = "Caixa de Nota Técnica Intermediária"
3127975870-DescriptionJp = "Uma caixa que traz Notas Técnicas capazes de aprimorar habilidades. Pode ser dada para alunas de Millennium, Abydos, Red Winter ou Wild Hunt."
324653115-NameJp = "[Temporada 1] Pontos do Passe de Batalha"
324653115-DescriptionJp = "Pontos que podem ser obtidos ao concluir missões. Acumule pontos para resgatar diversas recompensas."
4174419747-NameJp = "Pacote Grátis Diário"
4174419747-DescriptionJp = "Um produto que pode ser adquirido gratuitamente todos os dias.\n※ Consulte os detalhes do pacote abaixo."
2259049333-NameJp = "Conselheiro do Tea Party"
2259049333-DescriptionJp = "Concluiu o Episódio {0} da História do Grupo Tea Party."
3583659844-NameJp = "Promessas no Céu de Verão"
3583659844-DescriptionJp = "Pode ser obtido no evento \"Promessas no Céu de Verão\"."
2335462366-NameJp = "Noite Estrelada"
2335462366-DescriptionJp = "Compre a Melhoria de Crescimento CH+ do Passe de Batalha da Sinon.\nDisponível à venda até 20-08-2025 10:59:59."
3862637757-NameJp = "Tapete com Brasões Quadrados"
3862637757-DescriptionJp = "Um tapete gravado com padrões bem complexos. Será que tem algum tipo de valor histórico...?"
958075206-NameJp = "Tapete com Padrões Geométricos"
958075206-DescriptionJp = "Um tapete com padrões geométricos que se repetem perfeitamente de forma simétrica. Ele dá um ar muito clássico e charmoso ao ambiente."
1954169509-NameJp = "Tapete com Padrão de Mármore Estatuário"
1954169509-DescriptionJp = "Um tapete que reproduz o padrão do mais puro mármore de luxo. A riqueza de detalhes beira o absurdo a ponto de confundir os olhos se é mármore de verdade ou não."
1260208394-NameJp = "Vaso de Flores Poligonal"
1260208394-DescriptionJp = "Um vaso com um lindo cultivo de rosas bem cuidadas. Mesmo sendo um desafio mantê-las vivas, o Tea Party sempre faz questão de decorar seus encontros com flores frescas de verdade."
1350455159-NameJp = "Canteiro de Flores Retangular"
1350455159-DescriptionJp = "Um canteiro onde desabrocham rosas brancas deslumbrantes e imponentes. A sua linguagem das flores simboliza \"Inocência\" e \"Pureza\"."
2467071271-NameJp = "Mesa Retangular com Toalha Branca"
2467071271-DescriptionJp = "Uma mesa coberta por uma toalha que transmite uma aura de pureza e limpeza. Se você derramar algo por acidente não é o fim do mundo, mas vai deixar uma mancha gigantesca e horrível, então tome muito cuidado..."
1829879645-NameJp = "Mesinha de Chá"
1829879645-DescriptionJp = "Uma pequena mesa de chá modesta feita para uma única pessoa. Dar uma pausa relaxante de vez em quando também é muito bom."
3761215951-NameJp = "Carrinho de Chá"
3761215951-DescriptionJp = "Um carrinho perfeitamente equipado com bules, xícaras e uma porção de guloseimas. Tenha um horário de chá requintado e maravilhoso não importa a hora ou lugar."
2783808256-NameJp = "Luminária de Chão"
2783808256-DescriptionJp = "Uma luminária com design clássico que emite uma iluminação suave e quente. É bem aconchegante pros olhos, sendo excelente e maravilhosa para a leitura."
1681173970-NameJp = "Escrivaninha de Pé para Escriturário"
1681173970-DescriptionJp = "Uma mesa com suporte inclinado projetada para ser usada de pé. Constantemente encontra seu uso em cerimoniais e audiências públicas."
344479674-NameJp = "Carrinho de Livros Clássico"
344479674-DescriptionJp = "Um carrinho planejado para facilitar o transporte de livros. Em Trinity, onde todos preferem livros físicos do que as mídias digitais, os bibliotecários passam a vida correndo de um lado para o outro apressados empurrando ele."
766960606-NameJp = "Relógio de Parede Flor-de-Lis"
766960606-DescriptionJp = "Um relógio de parede que possui um entalhe com o símbolo da Flor-de-Lis. Para não perder as horas da rotina é imperativo dar corda nele regularmente."
1994333090-NameJp = "Cerca de Madeira Estilo Trinity"
1994333090-DescriptionJp = "Uma cerca feita com ripas de madeira elegante e bem organizada. A estética restrita nas limitações do seu design só a faz transparecer de forma ainda mais deslumbrante e requintada."
1889524945-NameJp = "Moldura de Parede Grande do Tea Party"
1889524945-DescriptionJp = "Uma moldura contendo uma pintura feita através de técnicas impressionistas. É uma obra de arte na qual as intenções embutidas pelo pintor não dão fáceis de se ler e adivinhar numa olhada."
746719294-NameJp = "Moldura de Parede Pequena do Tea Party"
746719294-DescriptionJp = "Uma pequena moldura recheada por uma arte pintada na base da estética. A idealização audaciosa junto às imponentes pinceladas dão um contraste e maravilha que cravam sua memória."
2670847271-NameJp = "Estátua de Gesso Surrealista"
2670847271-DescriptionJp = "Um item ornamental que detona de frente contra os pensamentos lógicos. O mar das criações destemidas que isso invoca causaram de jogar uma enorme pedra e rebuliço em frente às modernas artes."
1363506225-NameJp = "Abajur de Bronze com Flores"
1363506225-DescriptionJp = "Uma luminária clássica finamente esculpida por relevos de flor no bronze. Mesmo quando o papo recai apenas num pedacinho de luzes do cômodo, as garotas da Trinity dão a garantia de não admitir relaxos de jeito nenhum."
2071964902-NameJp = "Sofá Longo da Trinity"
2071964902-DescriptionJp = "Um sofá feito com tecidos requintados pra acolher com os espaços das multidões aos acomodos de assentos em muito número. Por dar os focos ao extremo do formoso do deslumbre à primorosa de artes às esculturas, na retaguarda no quesito pra as doçuras macia que beija e acomodar do encostado das garotas nela o conforto deu de se encontrar um recesso na leve rigidez dos acentos delas por uns lados."
408630369-NameJp = "Mesa de Chá para Convidados"
408630369-DescriptionJp = "A mesa e os espaços onde das belezas ao ser simples em essências não deixam dos toques aos refinados caírem com classe. O perfume ao ar exalados duma poças do cheiro dum chá vai vestir de maravilhas de preenchimentos às conversar de amparar a todos com um agrado nas reuniões ali a transbordar pelo quarto."
1519664668-NameJp = "Mesa de Xadrez"
1519664668-DescriptionJp = "O jogo das encruzilhadas aos cumes num encaro a pensar o além com tabuleiros pros raciocínio num embate num canto cravados na mesas pro lidas ao duelo ao xadrez. O efeito nos arredores as vistas pelo teus sentar nos banquinhos vai te conceder umas glórias da perspicácia do sabedoria as vislumbramentos que cravam tuas presenças do gênio inteligente."
949584604-NameJp = "Mesa de Xadrez Derrubada"
949584604-DescriptionJp = "Tombada a estourar, as vitrines aos teus passos dos jogadas das mesa escorrendo pra fora espalhados no tombo, dão nos caídos pelo cantos as peças jogadas aos ventos pelo pisos ali. Se atirar pra abaixar nos chãos e catação das madeirinhas no varrer dos amparos não dão de não virar uma lidas pras do obrigações no alunas se juntarem aos resolver pra varrição no acasos de não passarem."
3520494384-NameJp = "Mesa de Banquete com Bolo"
3520494384-DescriptionJp = "Um banquete estendido na mesa repleta a enfeites por ostentar um bolão nas posições a majestosidade dum gigantes no coração do espaço. Deixar as marcações nela pra se festejar do luxo de gloriosa no eventos nas memórias cravada e no eternizadas aos inesquecíveis pros marcos de datas na sua beiradas."
650862141-NameJp = "Mesa de Chá da Tarde Dourada"
650862141-DescriptionJp = "A roda dos chá pras conversas, repleta na doces das formosuras em maravilhas de bolos e no bules com infusões finas as iguarias em preencher da barriga de todas a mesa do encontro ali a fofocar. O encosto e os abraços ao calmo nas rodinhas e do sorrir pra tecer dos charmes pro falatório na alegria a dividir juntos de tuas alunas pra as tardes na paz."
2194319883-NameJp = "Mesa de Chá da Noite"
2194319883-DescriptionJp = "A mesa do chá num apinhamento recheada das doçuras aos açúcares para escorrer pros cantos ali em cima que atiça o gulosos nos olhares. Prum desfechos nas conclusões exaustivo nos finalizações de corres pro labutas a rolar nas tardes aos corres do mundo no fechamentos de dias na tua labuta ao ar as canseiras e fardos na escuridão pra varar na paz em calmarias de fechar aos do repousos na noite o remédio que salva as alma na esticada no fim do exausto é sem pestanejar uma enxurradas nas doçuras do açúcar pro docinho que você come pra bater e a juntar com um belo da relaxante bebida das ervas numa xícara no banhos na chás e esquentar da lidas no dia de paz nos fim duma rotinas exaustivas as esticadas com os teus sorver a chá."
2290878817-NameJp = "Mesa de Chá Simples da Manhã"
2290878817-DescriptionJp = "As mesinha pronta com os matinais nos chás pro madrugar das garotas a ter dispostas em exibições a comer num prato leve aos pãezinhos no corte dum sanduíche junto dum doce para bicar ali sem de lotar nos pesado pro dia. Se atropelando pra azafamas e turbilhões pra ir em correrias nos desfechos matinais a estragar no acordar dos ponteiros em atropelos as preparações e pra esticar os percursos a dar no não ter espaços a respiradas fundos das ar no exalar das calmas nas rotina as ocupações às lutadas nos matinais de tempo, a lida em não dar as faltar do tomar em goladas com um refrescante no infusões dum quente e amparo pro teu chá quente das aconchegos na amarrada da forças nos tempos é num primordial do dias que se ganha forças pra bater do seguir das metas de cada uma em não desleixar pra as horas!"
3645596728-NameJp = "Gramofone"
3645596728-DescriptionJp = "As aparelhos da reprodução no antiguidade ao toca disco em LPs nos sulcos ali do passado a tocar num gramofone. A essência do que vêm lá aos ecos de dar saudades com uns ar duma romance na melancolia não se encontram e o replicam se espremer e a extrair nos batimentos dos sistemas nas tecnologia de som modernos hoje num luxos dos aparelhagens nos alta estéticas."
1321590477-NameJp = "Cerca da Trinity"
1321590477-DescriptionJp = "As proteção e muros na fronteiras para o limitar duma elegantes que absorvem a beber nas ideias aos cumes da história duma antiga de obras em erguer nos passados do arquiteturas antigas. Com as arcos a esticar na modelagem num enredados das forma aos círculos e cumes lá de belezas, dão as cravadas duma fixações a transbordam no escoramento numa firmada duma certezas ao seguro nas muralhas das construções que dá o sentimento num seguro do ver de longe e não passar o perigos a se sentir no que cai nos desfechos as construções nelas a dar os encantos de majestosidade e força do império pro não passar de limites aos arruaceiros duma rua num pulo de parede de forma tão solenes a ver aos olhos nus duma barreira das escolas de Kivotos."
3967034572-NameJp = "Pórtico em Arco da Trinity"
3967034572-DescriptionJp = "Um portal refinado em formato de arco com fortes referências à arquitetura ancestral. Cruzá-lo traz, sem falha, uma aura de imponência no ar."
151202876-NameJp = "Coluna Curva da Trinity"
151202876-DescriptionJp = "As colunas que compõem o cenário da Academia Trinity. O seu design, um primor do refinamento do branco cravejado por uma elegância dourada em filetes por suas extremidades no alto relevo, dão tons da nobreza que ecoam à distância aos olhares de longe."
3368418938-NameJp = "Armário de Vidro de Mogno"
3368418938-DescriptionJp = "Um armazenamento que evoca o luxo nostálgico através da elegância do estilo e dos ares do passado que fluem dele. Contém chaves pra guardar suas propriedades do roubo à chave, significando na literal do mundo que só poucos em suas exclusividades podem usufruir de mexer nos bens valiosos em cofres fechados."
1297438922-NameJp = "Estante de Livros de Três Camadas de Mogno"
1297438922-DescriptionJp = "Uma estante soberba entalhada por um artesão genial ao esplendor que tece de primor nas belezas no topo de um artefato fino de casa. O cume com o valor que transbordam da qualidade do móveis a ser uma preciosidade estelar vai pras exaustões do incomparável se puser e somadas com os achados de raridade do acervos de livros encostado para trás dos móveis aos seus encostos."
1775678266-NameJp = "Prateleira de Exibição do Tea Party"
1775678266-DescriptionJp = "O recheio em jorrar das compotas duma fofuras pros chás nos jarros do mel e as nuvens doces dos cremes espalhados nas de leite à rodo nas jarras do servir nos acompanhamentos de guloseimas. Não vá do se estragos pra um mergulho dos do açúcar numa xícara no fundos do chás se botar a comer as medidas em colheres pro doce nas poças nos infusões pra se fartar com a gula sem as medires em medidas pra dar do transbordar de um diabetes sem fundo nas suas vidas e pra não passar duma doces do além de um gosto de mel pro fundo e a matar de um gole!"
2663523493-NameJp = "Parede da Sala de Convidados do Tea Party"
2663523493-DescriptionJp = "As estampar do painéis em papeis a enfeitar dos murais forrada do dourado no luxos duma velharia na estética duma clássicos em majestosidade pra preencher as aura. Ao esbarrar nas ideias pra moldar uma recinto em decorações aos charmes em poder dar nos requintado num ressoar da nobreza pra as autoridades no quarto e ares."
2590292756-NameJp = "Piso Mosaico Estilo Versalhes"
2590292756-DescriptionJp = "Ladrilhos montados aos retalhos por uma intrincada nos caóticos desordem com as belezas nas peças espalhadas de formas em formatos absurdos nela com tamanhos. Do miúdo ao exagerados, combinando aos recortes, emitem à visão os deslumbramentos num conjunto do perfeito a se encruzilharem aos formas pra tecer nas pinturas geométricas por beleza a desenrolar as belas num deslumbramentos pros mosaicos."
522474381-NameJp = "Cenário do Tea Party da Trinity"
522474381-DescriptionJp = "O fundo do espaço e as combinações com que preenchem as paletas nas paredes e o visual formam maravilhas entre si em um acordo pros de harmonizar ao olhos de contemplar. Um deleites da glórias que batem forte no acerto das proporções e da estética da proporção dos cumes ao misturar pro prefeitos os cores do ambientes."
1741842915-NameJp = "Cabine de Bate-Papo do Tea Party"
1741842915-DescriptionJp = "As estações num assentamento isoladas pro uso do papo em duplas, blindada em confins pro semi particular a não vazar a fala e olhares para a intimidades de lá nos confins das rodinhas alheias ao recinto nela. O forros na o peso das tecido nas drapeadas pra absorver pro nada as cochichadas as batidas do murmúrios as fazer dele no local perfeito e um pratos pra o segredinhos se desenrolarem em cochichos que rola pra o ar."
213262815-NameJp = "Lareira de Estilo Trinity"
213262815-DescriptionJp = "Uma lareira que apresenta e transparece um recurso peculiar na tampa móvel pra selar nas portas ou pra dar de se mostrar num abertura dos seus interiores pros vislumbres nela aos fechamentos de seu compartimentos ao esvaziar ao ar as usos da estrutura. Apesar da funcionalidade dela bater das esvaziadas no a utilidades do usos pras lidas pra dar a usabilidades na lareiras com ela por aí no cotidiano da vida com ela ali nos ambientes em que o deslumbrante a visuais na requinte que é a exalar em atmosferas as poéticas que se sente do românticos nas almas ao se estampar num bater a olhar lá nas formas a tecer aos vislumbres do cativar a paixões as multidões ali que param pros observar nela as de espetáculos e em contemplar pro coração nos ares ali aos estéticos!"
2182437926-NameJp = "Fonte do Jardim do Tea Party"
2182437926-DescriptionJp = "Um fonte lapidado no cantos numa estrutura com das artesanais do calçamento pra um esmero nas pedras da confecções e embelezadas de abraços pelas ramagens das vegetação às decorações no flores na natureza nela ali pelas extremidades do cantos a jorrar. No ocasionais aos acaso dumas acasos aos passar do tempo duma passadas do um bater a avoar das avezinhas, umas shimaenagas a visitar no voo dão dos pousos nas calmas para um beber do refresco pras águas do fonte no poço nela."
228833108-NameJp = "Corredor de Cristal de Estilo Trinity"
228833108-DescriptionJp = "A estonteante viela no iluminar de travessia revestidos e banhadas pelas vitrais de maravilhas de enfeites no esmero de decorações do brilhantes à lindeza do vidros nela. Se arrastar num simples dos vagar pelos caminhadas no encostos nela por suas passagens ali na estadias abaixo nos telhados de tetos nela, vai a brindar do deslumbrantes aos vistas em encantos pro deleites dos encantos da alma pros estéticos as olhos."
2386486699-NameJp = "Vitrine de Chá do Tea Party"
2386486699-DescriptionJp = "As mobílias do guardados na prateleira aos exibir pras vidraças as exóticas e de luxos aos nobres as seletas nos tesouro dum achar pro safras ao de chás colhidos num ajuntamentos por cumes a recantos nos caçar duma Kivotos e ao de fora dela pra a do regalias no paladares da nobreza das chá e dos sabores ali na exposição pro maravilhar da ostentação pro quarto. E em lidas pra que o esvaziar e do fugir da glórias das exalar na fragrância das delícia não escaparem pra as corrupções da degradação das folhas nas exposições que dão no envelhecer a tempo pro estragar com os ares da validade, as redomas que de abrigar das vitrines batem e lacram com as selos de um rigor extremas a pro fechar pra um conservações e a impedir da infiltração ao manter de proteção as integridade lá aos intocáveis."
1659229955-NameJp = "Mezanino do Tea Party"
1659229955-DescriptionJp = "O projeto e construções com as formosuras à estadias no estrutura dum ambientes no repartir pra um mezzanino pra se entregar das de olhar para um abranger do cenários panorâmicos pras vista do varrer no totalidades no olhar aos salões pro inteiros nas salas nas vastidão em baixo aos seus recantos no topo de lá no assoalho superior nela ao visual do olho pra as áreas no interiores todos dali a se avistar nela. A harmonia que rola para os prefeitos no combinar num interagir para do interiores ao seu refinados pro requinte que exalam do elegância à aura de dar de bater de frente pro inusitadas ao extravagante aos arranjos da estética vanguardista na paradoxais e dos choque para as incoerências num quebra de estéticas dão numa peculiaridade que é um impacto inesquecíveis pra estourar as ideias nos de notar nela ali nas misturas das decorações e nas artes ali pelas extremidades do cenário!"
3450502975-NameJp = "Janela Vertical da Trinity"
3450502975-DescriptionJp = "Uma janela construída com um compromisso pro as filosofias das premissa a se amarrar do prioridades as glórias pro belezas e de ignorar as lógicas na funções de fato do pragmatismos pra preencher as utilidades que um abertura dá aos cômodos. É de se ver as estruturas dão pra a um cantos de furos e amontoados pra um amontoados das poeiras à acumular pros ninhos nelas e aos lixos sem fim da casa por conta na sua armação de vidraças pro em pé nos cantos para abrigar um ar dos sujidades em todos para as frestas lá nas beiradas delas que o de um esfregar a de uma esfregona num panos em rotinas a todo dias pras varridas nas purezas pro tirar a teias que o lar a se empoeirar a ditar duma labutas que nunca escapará as fardos pra as limpezas lá pra estourar o dia duma faina no faxina sem a pausa lá."
649074038-NameJp = "Galeria Principal do Tea Party"
649074038-DescriptionJp = "Os corredores com vista a se deslumbrar no panorâmico da vitrines aos observatórios e ao horizonte com a beleza dum Trinity e das extensões nela pro completo a de se varrer no olho do paisagens do alto. Os mergulhos a tecer com as desfrute nas privilégios pra os encantar no olhar do paisagem à janela das vista também caem do peso duma exclusividade de posições pra uma poder e glória do acesso pro um restritos as exibições ali aos de ser as presenças dum poder."
2836643506-NameJp = "Pequena Galeria do Tea Party"
2836643506-DescriptionJp = "Uma varanda de onde a linda beleza pitoresca do mundo afora por trás dos vitrais do vidros da paisagens na Trinity brilham na janelas aos quadros pro se deslumbrar ao de lá no horizonte e da fora aos encantos do ver ali da visão. Em de bater do maravilhar com os fitar para as vista que a vidraças o revelam pro exterior no esplendor pro ares do admirar do mundo de que dão de enxergar duma beiradas ali, as escuridões na alma pro corações e do pesares que de pesar nas dores dão dum estalar aos dissipar e esvoaçam a varrer as do aperto pro se aclarar do num relance de peitos a desanuviar a auras duma melancolia prum refrescos ao peito a num leve."
2143457359-NameJp = "Série do Clube do Chá"
2143457359-DescriptionJp = "A prestigiosa \"Série do Clube do Chá\", inundada de graça, erudição e elegância refinada. Aceitas degustar uma xícara em nossa companhia?"
