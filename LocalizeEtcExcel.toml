3619669716-DescriptionJp = "シンプルなピンク色のスツール。ほっそりとしたデザインのため狭い場所にも置くことができ、スペースを節約しながらインテリアを考えられる。"
3258047487-NameJp = "観葉植物"
3258047487-DescriptionJp = "立派に育っている観葉植物。目にも体にも優しく、空気清浄の効果も感じられるかもしれない。"
4203928170-NameJp = "小さい窓"
4203928170-DescriptionJp = "換気のための小さい窓。小さくても効果は抜群。"
71838943-NameJp = "白いシンプルソファー"
71838943-DescriptionJp = "クッションが置かれたシンプルなソファー。高反発性の素材が生徒たちの体を気持ちよく包み込む。"
464779761-NameJp = "ゲーム開発部のロッカー"
464779761-DescriptionJp = "ゲーム開発部の部室を守っているロッカー。内部の居心地は良いと評判だ。"
1473923628-NameJp = "カウンターチェア・ディープブルー"
1473923628-DescriptionJp = "冷たい色合いが引き立つカウンターチェア。都会的な雰囲気がする。"
154679730-NameJp = "水色のシングルソファ"
154679730-DescriptionJp = "一人で座れる水色のソファ。ふんわりとした肌触りが魅力的だ。"
1363142416-NameJp = "鉄製引き戸ロッカー"
1363142416-DescriptionJp = "たくさんのものを収納できる大きなロッカー。猫の秘密基地にもなっているとか。"
4074976012-NameJp = "中華風ホットショーケース"
4074976012-DescriptionJp = "美味しそうな食材と甘口の醬油が並ぶ中華風のホットショーケース。見る人の食欲をそそらせる。"
1367889524-NameJp = "中華風の椅子"
1367889524-DescriptionJp = "古風な雰囲気が漂う中華風の椅子。原木の高級感と豊かな色合いのクッションが絶妙なハーモニーを奏でる。"
827068541-NameJp = "木工作業台"
827068541-DescriptionJp = "何でもすぐに作れる木工作業台。新しい作業を始めると、時間が経つのもあっという間。"
446242235-NameJp = "新鮮！魚箱"
446242235-DescriptionJp = "魚がいっぱい入った魚箱。うっかり持ち上げたら魚が逃げてしまうかも！？"
3436380027-NameJp = "スキューバダイビングギア保管ラック"
3436380027-DescriptionJp = "スキューバダイビングに必要なギアを保管しているラック。いつでも飛び込む準備はできている！"
2439356853-NameJp = "シャワーブース"
2439356853-DescriptionJp = "水とお湯の両方が出せるシャワーブース。気持ちもすっきり！"
2423731359-NameJp = "バタバタカジキの展示台"
2423731359-DescriptionJp = "海の香りが漂うバタバタカジキの展示台。今にも飛び跳ねてきそうだ！"
2932512474-NameJp = "便利屋68バンドステージ"
2932512474-DescriptionJp = "Rock＆Bad!便利屋68！アウトローの楽しそうな姿が際立つ便利屋68のバンドステージ。"
2867363316-NameJp = "クラシックパターンスーツケース"
2867363316-DescriptionJp = "クラシックな柄の優雅さと実用性を兼ね備えたトラベルバッグ。エレガントな旅行にぴったり。"
2884023970-NameJp = "ミニスツールとサンベッド"
2884023970-DescriptionJp = "爽やかなジュースが置かれたミニスツールとサンベッド。チェック柄のクッションで快適さをプラス。"
2252585741-NameJp = "アイスクリームテーブル"
2252585741-DescriptionJp = "甘いアイスクリームが置かれたアイスクリームテーブル。一口で夏がとろける。"
406850184-NameJp = "サンシャイン・レモンツリー"
406850184-DescriptionJp = "爽やかなレモンがいっぱい実ったサンシャインレモンの木。蛇口を回して爽快感On!"
4076782432-NameJp = "図書館のクラシックな椅子"
4076782432-DescriptionJp = "座り心地の良さとレトロさのバランスが絶妙な図書館の椅子。読書家なら誰もが夢見る椅子。"
1063381236-NameJp = "原稿用の机"
1063381236-DescriptionJp = "素晴らしい作家である、あなたの締め切りをサポートしてくれる最高の友人！情熱を燃やせ！"
3981895212-NameJp = "休憩用のベンチテーブル"
3981895212-DescriptionJp = "軽く丈夫な素材で、どこに置いても溶け込むリラックスベンチテーブル。"
1445269164-NameJp = "折り紙テーブル"
1445269164-DescriptionJp = "心に癒やしをもたらす古風な折り紙用のテーブル。お嬢様の密やかな趣味の場。"
2764760079-NameJp = "モモフレンズのグッズ台"
2764760079-DescriptionJp = "モモフレンズのグッズがずらりと並ぶ台。誰もがその可愛さに惹かれて見入ってしまう。"
3954747188-NameJp = "フレッシュショップテーブル"
3954747188-DescriptionJp = "清潔感と自然の融合！フレッシュなショップテーブル。フレッシュフルーツで一服いかが？"
1783190384-NameJp = "タロットテーブル"
