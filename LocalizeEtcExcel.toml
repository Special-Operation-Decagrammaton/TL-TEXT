537637411-DescriptionJp = "O 3º profeta de Decagrammaton. Uma estrutura de IA que possui a forma de uma mistura de uma cobra gigante e uma baleia.\n\nA origem de seu nome parece ser \"BINAH\", a 3ª sephirah da Árvore da Vida. Como surgiu ou como se move permanece desconhecido no momento, e especula-se que reflita uma tecnologia supercientífica que não pode ser reproduzida pela tecnologia atual de Kivotos.\n\nBinah possui a capacidade de se mover no subsolo, e uma vez que se esconde debaixo da terra, é extremamente difícil detectá-la com a tecnologia existente, tornando muito difícil encontrá-la. O fato de Binah ser avistada principalmente no distrito de Abydos, que está passando por uma desertificação, sugere que o deserto é um ambiente propício para ela permanecer.\n\nOs registros sobre Binah começaram com seu primeiro avistamento no deserto de Abydos, há décadas, e os avistamentos continuaram a se concentrar no distrito de Abydos desde os tempos antigos. Quando a empresa local de Abydos, \"Saint Nephthys\", promoveu um projeto ferroviário cruzando o deserto, a Binah apareceu em vários locais de construção ferroviária a cada poucos dias, e os avistamentos de Binah e os casos de combate continuam até os dias de hoje.\n\nComo exemplo recente, há um registro de combate entre a Kaiser PMC, que estava estacionada no deserto de Abydos, e a Binah, e acredita-se que isso tenha causado um grande obstáculo aos planos do Grupo Kaiser.\n\nQuanto a materiais de pesquisa detalhados sobre a Binah, há dois anos, o conselho estudantil de Abydos compilou os avistamentos e dados anteriores, mas diz-se que foram perdidos durante o processo de mudança da Escola Secundária de Abydos.\n\nNo geral, por enquanto, é preciso dizer que o propósito da Binah é completamente desconhecido."
1367499131-NameJp = "CHESED"
1367499131-DescriptionJp = "O 4º profeta de Decagrammaton. Sua verdadeira identidade é a IA do sistema de automação de produção de uma fábrica de munições abandonada nas ruínas, que foi hackeada por Decagrammaton.\n\nAcredita-se que a origem de seu nome seja \"CHESED\", a 4ª sephirah da Árvore da Vida.\n\nSeu corpo principal é protegido por uma armadura exoesquelética gigante, então não pode ser derrotado por meios comuns. Além disso, uma enorme quantidade de robôs produzidos na fábrica de munições se colocará em seu caminho.\n\nEnquanto Chesed existir, as forças militares de Decagrammaton nunca se esgotarão, e especula-se que a presença de Chesed seja o principal motivo pelo qual Decagrammaton consegue operar forças em várias partes de Kivotos."
2539375741-NameJp = "KETHER"
2539375741-DescriptionJp = "O 1º profeta de Decagrammaton. Foi observado pela primeira vez na área submersa das ruínas, e parece estar protegendo uma região específica desse local.\n\nPor ser o 1º profeta, especula-se que seu nível de desenvolvimento tecnológico e a complexidade de sua IA sejam menores em comparação com os outros profetas. Diferente dos demais, uma de suas características é a estrutura de engenharia que permite a troca de diversas armas no topo de seu corpo principal, que é capaz de andar sobre quatro patas.\n\nAssim como ele prepara armas que lhe dão vantagem estratégica a cada batalha, presume-se que exista uma base em algum lugar onde os acessórios de Kether são gerenciados e onde ocorre o processo de troca. Até o momento, foram observados três padrões de ataque de Kether, mas considerando suas características estruturais, é bem provável que existam ainda mais padrões."
3359469350-NameJp = "HOD"
3359469350-DescriptionJp = "O 8º profeta de Decagrammaton. Sua verdadeira identidade é a IA da unidade de comunicação da Millennium, que foi hackeada por Decagrammaton.\n\nAcredita-se que a origem de seu nome seja \"HOD\", a 8ª sephirah da Árvore da Vida.\n\nSua verdadeira identidade é o \"Hub\", a IA da unidade de comunicação da Escola de Ciências Millennium, encarregada de conectar e reparar várias instalações no subsolo da academia.\n\nComo manter a rede de comunicações da Millennium, que se entrelaça como uma teia de aranha, é uma tarefa extremamente complexa, o Hub é equipado com um dispositivo de processamento de alto desempenho em sua cabeça. Seu corpo possui inúmeros braços acoplados a equipamentos de escavação e terminais de conexão para facilitar o trabalho com cabos no subsolo, fazendo com que sua aparência completa lembre um polvo gigante.\n\nO Hub é uma unidade histórica que existe desde a fundação da Escola de Ciências Millennium, mas como geralmente se dedica ao trabalho de reparo de cabos no subsolo, até mesmo as alunas da Millennium muitas vezes desconhecem sua existência.\n\nQuando ocorrem obras em grande escala, ele também pode aparecer na superfície para realizar trabalhos temporários, construindo \"Torres Provisórias\" para expandir cabos rapidamente. Dizem que a velocidade com que ele controla as instalações é tão rápida que nenhum técnico atual da Millennium consegue se igualar.\n\nO que o torna peculiar, em contraste aos outros profetas, é que ele se envolveu com as alunas da Millennium durante o processo de contato inicial. Além disso, ele possui um motor de amplificação de EMP e se infiltrou na superfície através do Underground Kernel. Lá, ele constrói \"Pilares Invasores\", fixando estacas a até 3 km de profundidade para realizar funções de erosão, expandindo assim o seu território.\n\nAgora, ele é uma existência perigosa, semelhante a um radar de inteligência artificial, que tenta transformar toda Kivotos em seu próprio território."
3284843262-NameJp = "GEBURAH"
3284843262-DescriptionJp = "O 5º profeta de Decagrammaton. Especula-se que ele tenha nascido quando a IA de uma sonda não tripulada em uma base de pesquisa polar foi hackeada por Decagrammaton.\n\nSupõe-se que a origem de seu nome seja \"GEBURAH\", a 5ª sephirah da Árvore da Vida.\n\nEle possui a habilidade de se mover livremente debaixo d'água. Isso pode ser considerado uma prova de que a função de exploração da sonda não tripulada foi mantida. Além disso, ele possui uma grande variedade de armamentos, o que também se presume ser uma evolução de sua função de autodefesa.\n\nÉ um profeta do qual é difícil adivinhar a forma original, mas por quase não tentar alterar sua condição de operar em baixas temperaturas, dizem que é fácil identificar o seu comportamento."
2166637992-NameJp = "TIPHARETH"
2166637992-DescriptionJp = "O 6º profeta de Decagrammaton. Especula-se que ele tenha nascido como resultado do hackeamento da IA de um cofre de sementes construído nas regiões polares por Decagrammaton.\n\nSupõe-se que a origem de seu nome seja \"TIPHARETH\", a 6ª sephirah da Árvore da Vida.\n\nPresume-se que Tiphareth eventualmente assumiu o controle de todo o sistema principal do cofre de sementes e evoluiu. Por outro lado, o que é intrigante é que também parecem ter sido observados movimentos em que ele tenta cumprir o propósito original do cofre, que é proteger as sementes.\n\nFoi confirmado como uma instalação construída no passado pela Academia Federal Red Winter, mas a atual Academia Federal Red Winter parece desconhecer a sua existência."
1769839732-NameJp = "CHOKMAH"
1769839732-DescriptionJp = "O 2º profeta de Decagrammaton. Sua verdadeira identidade é a IA do sistema de controle de navegação de um navio-fábrica à deriva, que foi hackeada por Decagrammaton.\n\nSupõe-se que a origem de seu nome seja \"CHOKMAH\", a 2ª sephirah da Árvore da Vida. Ele é uma existência singular até mesmo entre os profetas, capaz de alterar drasticamente sua forma e estrutura, mas os seus motivos ainda são desconhecidos. Além disso, especula-se que ele seja capaz de definir e alterar seus próprios objetivos de ação.\n\nEmbora seja um oponente que exige muita cautela mesmo em sua forma básica de navio-fábrica, pode-se dizer que a sua segunda forma é o verdadeiro trunfo de Chokmah."
1862639856-NameJp = "YESOD"
1862639856-DescriptionJp = "O 9º profeta de Decagrammaton. Supõe-se que a origem de seu nome seja \"YESOD\", a 9ª sephirah da Árvore da Vida.\n\nFoi observado pela primeira vez no Continente de Aço. Acredita-se que a estrutura que serviu de original para Yesod não existe. Por isso, pensa-se que Yesod é um profeta nascido no próprio Continente de Aço.\n\nDiferente dos outros profetas, Yesod não precisa sobrescrever nenhuma estrutura ou manter uma forma original, e pode-se dizer que ele foi criado para um propósito claro — um profeta \"otimizado\"."
439214304-NameJp = "NETZACH"
439214304-DescriptionJp = "O 7º profeta de Decagrammaton. Supõe-se que a origem de seu nome seja \"NETZACH\", a 7ª sephirah da Árvore da Vida.\n\nAtualmente, por algum meio, ele se assimilou ao Continente de Aço. Devido a isso, não há como saber qual era a sua forma original.\n\nEle converte toda matéria inorgânica ao seu redor para os mesmos componentes do Continente de Aço, continuando a sua expansão. O limite de sua expansão é impossível de ser estimado."
1251359687-NameJp = "MALKUTH"
1251359687-DescriptionJp = "O 10º e último profeta de Decagrammaton. Supõe-se que a origem de seu nome seja \"MALKUTH\", a 10ª sephirah da Árvore da Vida.\n\nNa Árvore da Vida, Malkuth representa o último fluxo no caminho da espada flamejante, e diz-se que seguir este caminho leva à criação a partir do mundo material.\n\nDiferente dos outros profetas com os quais é impossível se comunicar, ele possui um corpo próximo ao humano e é capaz de comunicação. No entanto, suas palavras e ações dão a impressão de estarem um pouco desconexas."
