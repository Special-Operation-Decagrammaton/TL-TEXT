404292254-NameJp = "Funcionário que atende na entrada"
404292254-DescriptionJp = "Nosso resort de águas termais sempre recebe nossos clientes com um sorriso caloroso.\n(Se você vir um funcionário entregando bebidas suspeitas, avise a gerente imediatamente!)"
4035745238-NameJp = "Gerente que guia pelo jardim e pelas fontes termais"
4035745238-DescriptionJp = "Nosso resort possui um jardim de pedras (karesansui) que utiliza pedras e areia.\nQue tal passar um tempo relaxante observando este jardim simples, porém purificador?"
1774361412-NameJp = "Gerente que faz a limpeza e organização"
1774361412-DescriptionJp = "Em nosso resort, trocamos a roupa de cama e realizamos a limpeza duas vezes ao dia.\nCuidamos de cada detalhe, então, por favor, sinta-se à vontade para relaxar."
3950044430-NameJp = "Cliente aproveitando o banho ao ar livre"
3950044430-DescriptionJp = "A água do nosso resort não só tem efeitos de clareamento da pele e recuperação de fadiga, mas também ajuda a melhorar a precisão de tiro.\nEsperamos que você possa esquecer tudo por hoje, relaxar e recarregar as energias para o amanhã."
999560012-NameJp = "Cliente aproveitando a refeição no salão de banquetes"
999560012-DescriptionJp = "Os pratos do nosso resort são preparados com os ingredientes da mais alta qualidade.\nTambém usamos bastante bolinhos de onsen e bastões de sabor, então, por favor, aproveite."
1094144720-NameJp = "Treino"
1094144720-DescriptionJp = "A pista de atletismo do estádio pode ser usada nos dias em que não há competições.\nOs alunos que desejarem usar devem enviar um formulário de permissão ao Comitê de Gestão Atlética."
2809976808-NameJp = "Torcida"
2809976808-DescriptionJp = "A torcida que dá brilho ao esporte!\nVamos torcer com todas as nossas forças pelos atletas que estão participando da competição!"
374407097-NameJp = "Trabalho"
374407097-DescriptionJp = "O comitê executivo do Festival Esportivo Kourin está fazendo o seu melhor para que todos os participantes possam aproveitar o grande evento.\nCaso ocorra algum problema durante a competição, dirija-se à sede administrativa dentro do estádio."
1521840386-NameJp = "Produção"
1521840386-DescriptionJp = "No depósito do estádio de atletismo, há ferramentas disponíveis para reparos simples.\n(Qualquer um pode usar livremente, mas não faça modificações perigosas!)"
3558610679-NameJp = "Descanso"
3558610679-DescriptionJp = "Vamos nos hidratar após o exercício!\nHá máquinas de bebidas gratuitas na sala de descanso do estádio, então não se esqueça de repor a água!"
317946005-NameJp = "Brunch aproveitado na pista"
317946005-DescriptionJp = "Haruna: \"Mesmo ao comer um pedaço de pão, faça-o com elegância. Uma refeição sem pressa é a base da gastronomia.\"\nJunko: \"Ei, Izumi! O que você vai fazer se comer a minha parte também!\""
543266597-NameJp = "Conteúdo escrito no bilhete"
543266597-DescriptionJp = "Ako: \"............ Errado?\"\nAlice: \"Alice completou as condições de conclusão da missão!\""
860818406-NameJp = "Cavalaria e hacker"
860818406-DescriptionJp = "Maki: \"A-as minhas pernas não têm força...\", Kotama: \"E-eu sinto que vou desmaiar...\"\nChihiro: \"Por isso eu disse para vocês se exercitarem regularmente, não foi?\""
3205226752-NameJp = "Toque de granada"
3205226752-DescriptionJp = "Moe: \"Saki, pegue logo!\"\nSaki: \"E-espera um pouco! Onde você colocou o pino de segurança?\""
2479371781-NameJp = "Trabalho de restauração"
2479371781-DescriptionJp = "Rin: \"Para garantir a segurança dos cidadãos, vamos nos apressar com a restauração da área residencial.\""
2720792911-NameJp = "O Conselho Estudantil Federal está em reunião"
2720792911-DescriptionJp = "Rin: \"Ayumu... não, Chefe da Sala de Mediação. Por favor, relate o status de restauração desta área.\"\nAyumu: \"S-sim! O relatório de status de restauração! Vou trazer agora mesmo!\""
1248524252-NameJp = "Talento inesperado"
1248524252-DescriptionJp = "Ayumu: \"A-awawa... S-se for assim, vou cair de novo...\"\nMomoka: \"Oh~, não sabia que a veterana Ayumu tinha esse talento. Embora eu esteja um pouco preocupada se ela vai cair...\""
2076555680-NameJp = "Sabotagem sabor Mentaiko"
2076555680-DescriptionJp = "Momoka: \"No fim das contas, salgadinhos sabor Mentaiko são sempre deliciosos (croc).\"\nRin: \"............ Momoka?\""
2282918223-NameJp = "Labirinto de pedra concluído!"
2282918223-DescriptionJp = "Hinata: \"Todos conseguiram escapar em segurança? Que bom!\"\nKoharu: \"... Jogo de fuga...?\""
2182173966-NameJp = "Ruínas subterrâneas concluídas!"
2182173966-DescriptionJp = "Ui: \"Oh... isso é...!\"\nHanako: \"A Ui-san está animada de forma incomum. Fufu.\""
742766755-NameJp = "Fazenda de limões concluída!"
742766755-DescriptionJp = "Hinata: \"Devemos levar alguns e distribuir para os outros?\"\nKoharu: \"Eh? E-eu também vou fazer isso?\""
2756625307-NameJp = "Farol esquecido concluído!"
2756625307-DescriptionJp = "Hanako: \"Olhe, Ui-san. O vento na pele...\"\nUi: \"Aaaaaaaah, não estou ouvindo! Eu disse que não estou ouvindo!\""
1354203676-NameJp = "Caverna atrás da cachoeira concluída!"
1354203676-DescriptionJp = "Hanako: \"■■! ■■! ■■■■~! ■■~♡!!\"\nKoharu: \"Não diga isso em voz alta! Coisas indecentes não são permitidas! Pena de morte!!\""
3510482019-NameJp = "Limpeza da parte mais profunda da ilha!"
3510482019-DescriptionJp = "Ui: “...Para alguém, este era um lugar de memórias preciosas.”\nHinata: “...Agora, para nós também.”"
1430929184-NameJp = "Em movimento..."
1430929184-DescriptionJp = "Hanako: “É como se estivéssemos em uma excursão, não é maravilhoso? ♡”\nUi: “Haah, haah... n-não dá... devagar...”"
1612527987-NameJp = "Palheta da Yoshimi"
1612527987-DescriptionJp = "Uma palheta da futura celebridade (?) Yoshimi, que ela mesma desenhou e produziu. Parece que ela acabou fazendo demais."
405568906-NameJp = "Até a exaustão"
405568906-DescriptionJp = "“Ahaha... foi difícil para todo mundo, né...”"
494840872-NameJp = "Caderno da Airi"
494840872-DescriptionJp = "Um caderno secreto que a Airi fez para todos. No entanto, o fato de que não dá para escapar dos estudos continua o mesmo."
1618456696-NameJp = "Olhe para o canto inferior direito!"
1618456696-DescriptionJp = "“Aaaah!! Apaga isso logo!!!”"
2983071558-NameJp = "Rádio da Natsu"
2983071558-DescriptionJp = "Um pequeno rádio preparado pela grande estrategista, Natsu. Se seguirem a música que toca, até na ginástica rítmica vocês conseguirão agir como um só."
1033649487-NameJp = "Corpo e alma"
1033649487-DescriptionJp = "“O que é isso, afinal...”"
3761469925-NameJp = "Bingo de doces da Kazusa"
3761469925-DescriptionJp = "Feito pela capitã de ataque mais forte, Kazusa, usando toda a sua habilidade... Ah! Não à violência!!"
1161323409-NameJp = "Queimando a juventude"
1161323409-DescriptionJp = "“Contemplem a figura valente do Clube de Doces do Pós-Aula.”"
128049250-NameJp = "Cenário do contador de histórias"
128049250-DescriptionJp = "“Você está duvidando de mim, a melhor motorista do Chá das Cinco?”\n“Seia-san, você não é a única que dirige no Chá das Cinco?!”"
3186763206-NameJp = "Apoio especial"
3186763206-DescriptionJp = "“Com isso, posso lutar por mais 10 anos...!”\n-Departamento Federal de Investigação Schale, anônimo"
3588818690-NameJp = "Hora da retaliação"
3588818690-DescriptionJp = "“Seia-chan, passe direito, entendeu?”\n“Direito... é.”"
3450293592-NameJp = "Proteção solar perfeita"
3450293592-DescriptionJp = "“...Foi o que eu ouvi.”"
1026138108-NameJp = "Pisando na cauda do tigre"
1026138108-DescriptionJp = "“I-idiota...! Eu disse para não mexer com ela...! Argh...”\n-Últimas palavras antes de ser levado. Membro anônimo do Grupo dos Capacetes"
2174565429-NameJp = "Menu secreto da moda"
2174565429-DescriptionJp = "Chá gelado doce com um toque de expresso, pronto! ☆"
2712962423-NameJp = "Choque cultural"
2712962423-DescriptionJp = "“V-você coloca xarope no chá? E ainda mistura com café!?”\n“Que barbárie... o mundo lá fora é selvagem demais...!”"
2618526928-NameJp = "Hora da ioga"
2618526928-DescriptionJp = "“Que legal que vocês duas estão fazendo algo divertido~ quando vão fazer de novo?”\n“Nunca mais.”"
4127946330-NameJp = "Análise fria"
4127946330-DescriptionJp = "“Você não tem vergonha de se vestir assim?”"
2977465568-NameJp = "Sorriso nota 100"
2977465568-DescriptionJp = "“É especial só para você, Sensei.”"
2827413561-NameJp = "Passeio subaquático"
2827413561-DescriptionJp = "“Então o boato de que a Irmandade pratica tortura com água é verdade...!”\n-Ui Kozeki, presidente do comitê da biblioteca viciada em teorias da conspiração"
1879850544-NameJp = "Diva escondida"
1879850544-DescriptionJp = "“O senso da Seia-chan é meio brega, né☆”"
2117597489-NameJp = "Arquibancada cheia de entusiasmo"
2117597489-DescriptionJp = "“...Nagi-chan, está se divertindo?”\n“...? Sim.”\n“...Que bom.”"
194393215-NameJp = "Limite removido"
194393215-DescriptionJp = "Haha, isso é... complicado, hein."
1849099105-NameJp = "Memória do preço a pagar"
1849099105-DescriptionJp = "“Fotografia clandestina? Isso é jornalismo!”\n-Mai Kazamaki, editora-chefe do departamento de notícias da Escola Chronos"
1543640472-NameJp = "Lista de Desejos"
1543640472-DescriptionJp = "Pequenas e preciosas memórias, a força motriz para o amanhã."
647268474-NameJp = "Má Sorte"
647268474-DescriptionJp = "O que comprar na volta: 250g de carne de porco, 2 batatas, 3 cebolas, 1 cenoura, 1 alho-poró"
1555725293-NameJp = "Má Sorte"
1555725293-DescriptionJp = "Negócios: A carteira continuará vazia\nSaúde: Dificuldade frequente para acordar de manhã\nPessoa esperada: Cuidado com quem usa máscara"
909638122-NameJp = "Má Sorte"
909638122-DescriptionJp = "Primeiro, prepare seu equipamento\nSegundo, garanta uma rota de fuga\nTerceiro, escape imediatamente após obter o item desejado"
1661297162-NameJp = "Má Sorte"
1661297162-DescriptionJp = "Os trilhos que continuam girando levarão, eventualmente, a um futuro de justiça! Também temos produtos de sushi disponíveis! Para mais detalhes, acesse o site oficial do Kaitenger. *Financiamento coletivo em andamento!*"
2317250528-NameJp = "Sorte Pequena"
2317250528-DescriptionJp = "Desejos: Podem ou não se realizar\nNegócios: O dinheiro que sumiu voltará para o lugar de origem\nDireção: Para investimentos, procure a \"Financeira do Grupo Kurokame\""
4179075589-NameJp = "Sorte Pequena"
4179075589-DescriptionJp = "Esperava uma sorte melhor? Agora, com uma oferenda adicional, você tem uma chance dupla de melhorar sua próxima sorte! *Os efeitos variam de pessoa para pessoa (Grupo Kurokame)*"
1883262314-NameJp = "Sorte Pequena"
1883262314-DescriptionJp = "Não fique triste por ter tirado Sorte Pequena. Aconteça o que acontecer, você tem aliados. Sempre ao seu lado, \"Seguros do Grupo Kurokame\""
4030255031-NameJp = "Sorte Pequena"
4030255031-DescriptionJp = "O que é uma Sorte Pequena! A sua sorte é você quem conquista! Estamos aguardando o contato de quem tem essa determinação. \"Grupo Kurokame\", acreditando no seu potencial."
3228513232-NameJp = "Sorte Leve"
3228513232-DescriptionJp = "Viagem: Ir à loja de conveniência e voltar já conta como uma viagem\nPessoa esperada: Na esquina do beco\nSaúde: É bom correr com uma torrada na boca"
1134549000-NameJp = "Sorte Leve"
1134549000-DescriptionJp = "Parabéns! Com certeza, hoje, cada vez que você chegar a um cruzamento, todos os semáforos ficarão verdes para você!"
3267689061-NameJp = "Sorte Leve"
3267689061-DescriptionJp = "Mesmo que digam que é \"leve\", o futuro é sempre \"infinito\"! Provavelmente é isso!"
499121846-NameJp = "Sorte Leve"
499121846-DescriptionJp = "Será que este ano vai ficar tudo bem com Sorte Leve... Para você que pensou isso. De pequenas quantias para um grande futuro, \"Financeira do Grupo Kurokame\""
609900746-NameJp = "Sorte Média"
609900746-DescriptionJp = "Relacionamentos: Talvez você cruze o olhar com alguém que lhe interessa\nPessoa esperada: No shopping center\nViagem: Ver as flores de cerejeira é um bom presságio"
2928203362-NameJp = "Sorte Média"
2928203362-DescriptionJp = "Sorte Média significa que, a partir de agora, é só seguir em frente para um dos lados! Vamos lá, o início de uma grande e divertida agitação!"
2307433907-NameJp = "Sorte Média"
2307433907-DescriptionJp = "Este ano será, no mínimo, um ano nada mau. Mas como está frio lá fora, cuide da sua saúde. Ao chegar em casa, não se esqueça de lavar as mãos e fazer gargarejo! Saúde em primeiro lugar!"
3879409653-NameJp = "Sorte Média"
3879409653-DescriptionJp = "Mesmo que ainda não tenha sido recompensado, estou torcendo por você que continua se esforçando. Que este ano seja um ótimo ano!"
2475099392-NameJp = "Sorte"
2475099392-DescriptionJp = "Pessoa esperada: Virão muitas\nObjeto perdido: Com certeza está bem perto\nEstudos: Com esforço, o resultado desejado virá"
1939176149-NameJp = "Sorte"
1939176149-DescriptionJp = "A sorte é \"Sorte\"! Pode parecer algo simples, mas às vezes isso é importante. Vamos seguir com um bom ritmo este ano também!"
226724583-NameJp = "Sorte"
226724583-DescriptionJp = "Não é Grande Sorte, mas isso significa que você ainda pode ser muito mais feliz! Que seja um ano cheio de sorrisos!"
422101479-NameJp = "Sorte"
422101479-DescriptionJp = "Saúde: Se olhar bem, as balas não vão te acertar\nCompetição: Sem problemas\nAlegrias: Será um bom ano"
2677997047-NameJp = "Grande Sorte"
2677997047-DescriptionJp = "Desejos: Com certeza se realizarão\nNegócios: Sem preocupações\nPessoa esperada: Virá"
2043188119-NameJp = "Grande Sorte"
2043188119-DescriptionJp = "Parabéns! O protagonista deste ano é, sem dúvida, você!"
266718355-NameJp = "Grande Sorte"
266718355-DescriptionJp = "Prosperidade nos negócios, segurança familiar, saúde perfeita! A cor da sorte é o azul translúcido!"
1124846343-NameJp = "Grande Sorte"
1124846343-DescriptionJp = "Sua sorte é Grande Sorte! Seus esforços darão frutos e seus desafios serão bem-sucedidos! Muitas pessoas estão torcendo por você, acredite em si mesmo e lute!"
964504315-NameJp = "Peito"
964504315-DescriptionJp = "Lista de compras de hoje: 1 pacote de caldo de ensopado, 250g de frango, 2 batatas, 3 cebolas, 1 cenoura, 1 brócolis, 1 garrafa de ponzu..."
199728885-NameJp = "Peito"
199728885-DescriptionJp = "Dizem que é melhor tomar cuidado com intoxicação alimentar! Eu nunca tive, mas... a propósito, quer experimentar um \"suco de pepino-do-mar coberto com chocolate\"?"
1759134687-NameJp = "Peito"
1759134687-DescriptionJp = "Quase não há como salvar ingredientes que foram esmagados. O mínimo que se pode fazer é cozinhá-los e batê-los no liquidificador para fazer uma sopa."
4232612005-NameJp = "Peito"
4232612005-DescriptionJp = "Derrubei a comida... mas achei uma moeda onde caí."
2722903738-NameJp = "Falar"
2722903738-DescriptionJp = "A sorte é Suekichi (pequena sorte)! Dizem que o prejuízo é o começo do lucro... Queria comer um dango ou algo assim..."
2264344015-NameJp = "Falar"
2264344015-DescriptionJp = "Deixe-me ver... é Suekichi! Vou te dar um pudim de polvo com menta!"
3089424248-NameJp = "Falar"
3089424248-DescriptionJp = "Comida que não foi bem cozida ainda está segura. É só assar um pouco mais! Se queimar, aí não tem mais jeito."
1618617468-NameJp = "Falar"
1618617468-DescriptionJp = "A sorte de quem tirou este omikuji é... uma jornada de mil milhas começa com um único passo... Ufufu, dificuldades fazem parte do caminho da gastronomia."
839518806-NameJp = "Falar"
839518806-DescriptionJp = "Dizem que Suekichi é um sinal de que a sorte mudará para melhor no futuro. Quem sabe o que acontecerá amanhã?"
239549900-NameJp = "Falar"
239549900-DescriptionJp = "Coisas alegres... outono e inverno são bons, primavera e verão não são muito... Outono e inverno... é agora, né?★"
3417604566-NameJp = "Sogiru"
3417604566-DescriptionJp = "É Shoukichi (pequena sorte)! Não se aproxime do perigo, não tenha vergonha perante o céu... bem, acho que significa que algo é bom!"
3872470199-NameJp = "Sogiru"
3872470199-DescriptionJp = "É Shoukichi. Dizem que a felicidade vem das pequenas coisas, então espero que você tenha uma sequência de sorte, como uma chuva de verão que passa rápido!"
4154538605-NameJp = "Sogiru"
4154538605-DescriptionJp = "A sorte de hoje é Shoukichi! Não importa o quanto você tenha pressa para pegar o trem, você não vai errar a direção!"
1652241604-NameJp = "Sogiru"
1652241604-DescriptionJp = "Dizem para seguir guiado pelas estrelas. E não pelas luzes de um navio que já passou."
2851981489-NameJp = "Sogiru"
2851981489-DescriptionJp = "Se você esperar, terá dias de néctar, preste atenção... é o que diz. Será que significa que minhas habilidades culinárias vão melhorar?"
228389323-NameJp = "Sogiru"
228389323-DescriptionJp = "Vamos coletar os ingredientes um por um. Até que o prato esteja pronto!"
3038779302-NameJp = "Chumichi"
3038779302-DescriptionJp = "Amor - Olhar nos olhos daquela pessoa especial\nEncontro - No fim de semana, na rua do festival\nPromessa - Ir ao festival de fogos de artifício juntos"
284642160-NameJp = "Chumichi"
284642160-DescriptionJp = "A sorte de hoje é Chukichi (sorte média). Parabéns★ Embora eu queira comer até ficar realmente satisfeita de vez em quando."
2426075748-NameJp = "Chumichi"
2426075748-DescriptionJp = "Sempre arroz branco em noites de lua cheia... né? Um bento comido sob o luar é ainda mais delicioso. Ufufu."
1325967005-NameJp = "Chumichi"
1325967005-DescriptionJp = "Se a comida é o elemento mais importante da vida, em que posição fica a sorte? Chukichi, parabéns."
4022503532-NameJp = "Chumichi"
4022503532-DescriptionJp = "Dizem que o pato vem carregando o alho-poró... será que pato assado é gostoso?"
2197323664-NameJp = "Chumichi"
2197323664-DescriptionJp = "Viagens trazem dificuldades, mas o destino é de sorte. Comer coisas gostosas no ano novo. Isso é uma alegria!"
294425413-NameJp = "Michi"
294425413-DescriptionJp = "Pessoa esperada - Virá\nFelicidade - Virá\nSe o coração de quem vier for fraco, ajude-o."
2086697042-NameJp = "Michi"
2086697042-DescriptionJp = "A sorte de quem tirou este omikuji é... Desejo - Se você se dedicar com o coração puro, será realizado. Cuidado, pois desejos maliciosos levarão à ruína."
657860840-NameJp = "Michi"
657860840-DescriptionJp = "Se todos comerem com gosto a comida que você preparou com tanto esforço, não há felicidade maior. Que este ano também seja feliz!"
128516439-NameJp = "Caminho"
128516439-DescriptionJp = "Sensei. Desta vez saiu 'Sorte Média'. O passo do boi percorre mil léguas, atravesse o rio raso como se fosse profundo... Será que esse boi não sente fome?"
2382060588-NameJp = "Caminho"
2382060588-DescriptionJp = "A sorte de quem tirou este omikuji é: quando a flor desabrochar na árvore, as preocupações de até agora se dissiparão, e a partir de agora, várias alegrias se acumularão... Como dizem que várias alegrias virão, espero que seus dias fiquem cada vez mais tranquilos..."
370799142-NameJp = "Caminho"
370799142-DescriptionJp = "Preparei pratos de Osechi para todos. Por favor, fiquem à vontade!"
1512780410-NameJp = "Grande Sorte"
1512780410-DescriptionJp = "Encontro - Sob a árvore lendária\nMudança - Melhor do que agora\nCulinária - Aproveite ao máximo no centro da cidade"
997253011-NameJp = "Grande Sorte"
997253011-DescriptionJp = "Ora. É uma Grande Sorte. Ufufu. Que tipo de iguarias nos esperam este ano?"
940731399-NameJp = "Grande Sorte"
940731399-DescriptionJp = "Desejos - Realizados\nEstudos - Não negligencie o esforço\nPerdidos - Estão por perto\nCulinária - O esforço dará frutos"
555506678-NameJp = "Grande Sorte"
555506678-DescriptionJp = "O grande peixe na água, onde quer que vá, grandes ondas se levantam, e ao aproveitar a oportunidade, você obtém um Osechi farto e o pargo da estação... O pargo da estação é o que eu mais gosto★"
3840660582-NameJp = "Grande Sorte"
3840660582-DescriptionJp = "É uma Grande Sorte, parabéns. Coisas boas certamente acontecerão com você."
1744408890-NameJp = "Grande Sorte"
1744408890-DescriptionJp = "Quem gosta, faz bem feito; continue se aprimorando. ...Sim, eu também vou me dedicar!"
