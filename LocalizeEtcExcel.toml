2670560256-NameJp = "キーキッキッキ……準備は整いました"
2670560256-DescriptionJp = "エラの忠実な僕、悪の商人シルバープレート！次元の隙間から現れ、人々を不幸にさせる物を売る悪党です！スピンオフ作品の『ジョニー・キヴォトスと対物ライフルの魔法』ではメインヴィランとして登場しますが、とても強くなっています！その見た目とは裏腹に、意外とファンも多いようです！以前は「まほリバ」の即売会にたくさんのサークルが参加したくらいです！また、ピラミッドパワーを使うと大体の攻撃は通じなくなります。とても手強い相手なんです！2期11話では、シルバープレートが正体を隠して転校するシーンがありますが、そこでなんと――"
2818922347-NameJp = "マジカルパワーで全回復ー！"
2818922347-DescriptionJp = "「まほリバ」シリーズの可愛いマスコット、スタナグちゃん！ホワイトとピンクにマジカルナショナルガードの契約をして、二人を魔法少女にしてくれるんです！優しくて純粋な子なので、エラが率いる悪の騎士団に拉致されていじめられることが多いんです。でも、身体が丈夫で回復も早いから大丈夫！いつも明るくて頑丈な子です！二人が絶体絶命の危機に瀕した際は、魔弾を供給してくれたりもするんですよ！グリーンチップ、ブラックチップ等々、様々な魔弾を持っているんです！スタナグちゃんが覚醒するエピソードは、すっごく感動的でして……たしか2期の7話なのですが、スタナグちゃんが元の姿である――"
3074909671-NameJp = "悪の騎士団よ、暗黒の時が来たわ！"
3074909671-DescriptionJp = "エラ！初めて見たときはすごく怖かった記憶があります！外見はとても綺麗なんですけど、ヘヴィキャリバーズの宿敵なんです！エラが住む暗黒の星に、愛と幸せの声が聞こえたことで、エラは手下をいっぱい連れて襲ってきたんです！永遠にその声を出せないようにしてやる！だとか。本人も笑い声はうるさいのに困ったものですよね！とにかく、ヘヴィキャリバーズの活躍のおかげでエラの計画は毎回失敗に終わりますが、絶対に諦めない恐ろしい悪党です！劇場版『魔法少女ヘヴィキャリバーズ・デイジーカッター』ではエラが記憶を失って、本屋さんで働く平凡なアルバイトとして登場するんですが、なんとそこでエラの過去が――"
907100893-NameJp = "モンローノイマン！マジカルジェット！"
907100893-DescriptionJp = "テルミットピンク！ホワイトの心強い相棒です！名前が「ピンク」ですが色が紫になってる理由はですね――あっ！これ以上言ってはネタバレになってしまいますので、本編を見てください！元々ピンクは一人だけ周囲から浮いていて友達もいなかったのですが、エラの襲撃時、ピンクを助けてくれたホワイトに憧れて、マジカルナショナルガードとして契約することになるんです！そして魔法少女史上最高の仲良しコンビとなりました！ホワイトと一緒に活躍しながら、ピンクは愛と友情、そして火力で自信を取り戻し、明るいキャラクターへと変わっていくのです！3期6話ではバンドアイドルとしてスーパースターになるエピソードがあるのですが――"
3133177365-NameJp = "平和の使者！ホワイトに任せて！"
3133177365-DescriptionJp = "テルミットホワイトは「まほリバ」シリーズの主人公です！元々は少しおっちょこちょいで平凡な女の子でしたが、ある日エラの襲撃で危機に瀕したとき！魔法の国からやってきたマスコット、スタナグちゃんに出会うんです！怖くて身体が震えても、正義感にあふれたホワイトはマジカルナショナルガードとしての契約を結んで、魔法少女になりました！そして、ホワイトに助けられたピンクも魔法少女になって、二人は世界を救う正義の魔法少女、「ヘヴィキャリバーズ」になるんです！2期2話ではホワイトが「ドラゴンスキン」と遭遇したときの話があるのですが――"
