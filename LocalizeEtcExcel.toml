358559959-NameJp = "Edifício Principal"
358559959-DescriptionJp = "É o primeiro lugar que os clientes que visitam a estância termal chegam. É usado principalmente para confirmar as reservas dos clientes, mas também há instalações onde se pode descansar um pouco."
2825548492-NameJp = "Banho Público"
2825548492-DescriptionJp = "É um banho público onde muitas pessoas podem desfrutar das fontes termais ao mesmo tempo. Existem várias fontes termais, cada uma com temperaturas e componentes diferentes."
2481788820-NameJp = "Quarto de Hóspedes"
2481788820-DescriptionJp = "É um quarto de hóspedes com tatames e cadeiras baixas, onde se pode sentir o charme tradicional. A roupa de cama, como os futons, é mantida limpa e arrumada por Nodoka todos os dias."
3141924738-NameJp = "Área de Descanso"
3141924738-DescriptionJp = "É uma área de descanso onde você pode relaxar após sair do banho termal. Está equipada com mesas de pingue-pongue, cadeiras de massagem e outras comodidades, que podem ser usadas livremente pelos hóspedes."
384904434-NameJp = "Salão de Banquetes"
384904434-DescriptionJp = "Um salão de banquetes em grande escala onde muitas pessoas podem desfrutar de uma refeição. O interior é bonito, mas talvez não seja uma boa ideia esperar muito da comida."
1433250290-NameJp = "Banho ao Ar Livre"
1433250290-DescriptionJp = "Um banho ao ar livre onde você pode entrar enquanto admira a paisagem nevada. Dizem que, às vezes, é possível encontrar animais selvagens que desceram da montanha."
4060632693-NameJp = "Anexo"
4060632693-DescriptionJp = "Um anexo preparado para VIPs. Como fica longe do prédio principal e de outros locais, é possível passar um tempo tranquilo e luxuoso."
4194626497-NameJp = "Jardim"
4194626497-DescriptionJp = "Um jardim de pedras e areia no estilo karesansui. Nodoka cuida dele cuidadosamente todos os dias."
3675272134-NameJp = "Sede Administrativa"
3675272134-DescriptionJp = "A sede administrativa responsável por toda a operação da Grande Competição Esportiva. Além das competições, o registro e a gestão das barracas também são feitos aqui."
1884871261-NameJp = "Pista"
1884871261-DescriptionJp = "Uma pista construída ao longo da periferia do estádio. É pavimentada com um material resistente para não ser destruída nem pelas bombas usadas na corrida de obstáculos."
2410805514-NameJp = "Depósito de Educação Física"
2410805514-DescriptionJp = "Um depósito para guardar os acessórios da Grande Competição Esportiva. Uma vez trancado, não pode ser aberto por dentro, então é preciso ter cuidado para não ficar preso."
2074635724-NameJp = "Arquibancada"
2074635724-DescriptionJp = "Arquibancada construída no segundo andar do estádio. Para evitar que a disputa de torcidas entre as estudantes fique acalorada demais, os assentos são divididos por escola."
830995934-NameJp = "Campo"
830995934-DescriptionJp = "Um campo espaçoso localizado no centro do estádio. Embora seja grama artificial, graças à tecnologia do Millennium, dizem que é mais fofo e agradável que grama natural."
2054928448-NameJp = "Depósito Grande"
2054928448-DescriptionJp = "Um depósito para guardar materiais pesados e máquinas usadas na Grande Competição Esportiva. Como ferramentas básicas também estão disponíveis, reparos leves podem ser feitos aqui."
1757505051-NameJp = "Sala de Transmissão"
1757505051-DescriptionJp = "Uma sala de transmissão capaz de transmitir vividamente as competições da Grande Competição Esportiva. Também oferece uma função de replay para evitar erros de arbitragem."
1079056613-NameJp = "Sala de Descanso"
1079056613-DescriptionJp = "Uma sala de descanso que atletas e espectadores podem usar livremente. Possui uma máquina de café e um dispensador de bebidas instalados."
3239184876-NameJp = "Escola de Polícia Valkyrie, Filial Shiratori"
3239184876-DescriptionJp = "Uma filial da Escola de Polícia Valkyrie. Cercada por áreas verdes exuberantes, dizem que o ar é muito bom."
2322223304-NameJp = "Corgi Town"
2322223304-DescriptionJp = "Uma famosa rua de lojas de eletrônicos. Corre o boato de que você pode conseguir qualquer coisa, exceto itens que já saíram de linha."
1462360932-NameJp = "Tri-Square"
1462360932-DescriptionJp = "Uma praça usada tanto como local de descanso quanto como ponto de encontro. É um ótimo lugar para passear."
4293010634-NameJp = "3º Distrito Comercial"
4293010634-DescriptionJp = "Um distrito comercial localizado ao lado da Tri-Square. É um espaço moderno e sofisticado, onde estradas e edifícios estão em bela harmonia."
1977010791-NameJp = "Plad Avenue"
1977010791-DescriptionJp = "A rua onde o museu de arte está localizado. O museu é maravilhoso, mas a cidade inteira é uma cidade de arte."
1729072075-NameJp = "Parque da Vizinhança de Shiratori"
1729072075-DescriptionJp = "Não é um lugar muito visitado em comparação com o tamanho do parque, mas ainda assim é um local indispensável."
2590301450-NameJp = "Porto de Kanezaki"
2590301450-DescriptionJp = "Se você quer ver o mar, ir até aqui é uma boa ideia. Embora talvez não seja a cena que você imaginou."
4121383175-NameJp = "Lamini Town"
4121383175-DescriptionJp = "Uma rua de restaurantes que não perde em nada para os pontos gastronômicos de cada escola. Inúmeras barracas e restaurantes estão alinhados em ambos os lados de um rio estreito."
