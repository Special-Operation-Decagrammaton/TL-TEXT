1635418688-NameJp = "Guardanapo de Mesa"
1635418688-DescriptionJp = "Um guardanapo de mesa lindamente decorado com flores roxas. Coloque-o casualmente no colo antes de desfrutar de um jantar e você não terá problemas se derramar comida."
