390594649-DescriptionJp = "Chocolate feito à mão por Ichika para o Sensei. Tem um formato de bastão, fácil de segurar e comer. Apesar de ser artesanal, o acabamento é impressionante, não perdendo em nada para os produtos industrializados."
3418867182-NameJp = "Sandália de Chocolate"
3418867182-DescriptionJp = "Um chocolate bem grande, do mesmo tamanho de uma sandália real. Ao contrário da aparência, dizem que é muito resistente e que dá até para calçar e andar com ele."
3006306790-NameJp = "Mensagem Secreta"
3006306790-DescriptionJp = "Chocolate feito à mão que Koyuki enviou ao Sensei. Parece um chocolate comum para presente, mas dizem que esconde um significado oculto."
291186913-NameJp = "Sua Própria Escolha"
291186913-DescriptionJp = "Chocolate de luxo que Sakurako preparou para o Sensei. Diferente do habitual, é um presente valioso e difícil de conseguir, que a própria Sakurako decidiu após muito pensar e refletir."
498190404-NameJp = "Desafio de Dia dos Namorados"
498190404-DescriptionJp = "O chocolate de Reisa em forma de carta de desafio. Na verdade, é apenas um envelope de desafio colocado sobre um chocolate espaçoso. Dentro, há uma carta de Reisa."
2827551265-NameJp = "Chocolate de Ovo Termal"
2827551265-DescriptionJp = "Chocolate artesanal especial de Meg. À primeira vista, é fácil confundir com um ovo termal. Como ela fez uma grande quantidade, diz que pode dar quantos você quiser, se precisar."
2152153824-NameJp = "Bolo Lunar de Chocolate"
2152153824-DescriptionJp = "Bolo lunar de chocolate que Lumi fez com a desculpa de pedir ao Sensei para \"degustar\". Como uma verdadeira chef, ela usou vários métodos para prepará-lo, e cada um deles carrega o desejo de que o Sensei aprecie o sabor."
219184488-NameJp = "Chocolate com o Brasão da Genryumon"
219184488-DescriptionJp = "Chocolate que Mina fez imaginando o que era \"mais importante\" para ela. O sentimento é certamente gratificante, mas parece que há algo um pouco fora do lugar..."
717036626-NameJp = "Chaveiro de Chocolate"
717036626-DescriptionJp = "Um chaveiro e um chocolate que Momiji afirma ser o prêmio principal. Por coincidência, faz par com a Momiji."
2219659309-NameJp = "Chocolate Comum da Nagisa"
2219659309-DescriptionJp = "Chocolate que Nagisa fez à mão para expressar sua gratidão ao Sensei. Com o desejo de Nagisa de que não houvesse outras intenções ou interpretações políticas, ele foi feito de forma intencionalmente simples e rústica. No entanto, o sabor e a qualidade do chocolate superam em muito os produtos industrializados."
2751216385-NameJp = "Chocolate de Alta Caloria"
2751216385-DescriptionJp = "A solução que Minori encontrou para aproveitar o Dia dos Namorados, mesmo que as coisas não saiam como planejado. Minori disse que deu como se fosse um extra, mas, na verdade, ela gastou um tempo considerável escolhendo este entre muitos fabricantes."
2983078984-NameJp = "Diferença de percepção"
2983078984-DescriptionJp = "Chocolate preparado por Ao para o Sensei. Embora o tamanho seja pequeno, cada um deles exigiu um esforço considerável. Como ela não sabe do que a outra pessoa gosta, parece que ela se deu ao trabalho de preparar vários tipos diferentes."
3666669973-NameJp = "Chocolate cheio de Plana da Plana"
3666669973-DescriptionJp = "Chocolate que a Plana fez sem a Arona saber. Tem um sabor que combina perfeitamente com o gosto do Sensei."
967746156-NameJp = "Chocolate de autorretrato"
967746156-DescriptionJp = "Um chocolate de autorretrato da Mel, desenhado por ela mesma em chocolate branco. Ela parece não estar satisfeita com o nível de perfeição, mas o verdadeiro problema era por onde começar a comê-lo."
3706730641-NameJp = "Bolo de chocolate artesanal supremo e definitivo"
3706730641-DescriptionJp = "Um bolo de chocolate artesanal que ela afirma não perder para nenhuma loja famosa de Kivotos. O slogan parece ser a hospitalidade suprema e definitiva."
2168519091-NameJp = "Chocolate artesanal da líder de estratégia"
2168519091-DescriptionJp = "Chocolate artesanal que Kaho fez para o Sensei. À primeira vista, parece um brinde promocional simples, mas cada caractere cuidadosamente esculpido contém muita dedicação."
3486261893-NameJp = "Café 'de sempre'"
3486261893-DescriptionJp = "O café blend comum que Kanna preparou para o Sensei. No entanto, talvez por causa da adição dos 'sentimentos subjetivos' de Kanna, diferente do habitual, ele tem um aroma doce como o de chocolate."
1766939933-NameJp = "Chocolate ganache feito pelos dois juntos"
1766939933-DescriptionJp = "Chocolate ganache artesanal que Renge completou com sucesso com a ajuda do Sensei. Embora o nível de perfeição não seja alto, ninguém pode negar as memórias que se fundiram nele."
2005226182-NameJp = "Chocolate da estrategista"
2005226182-DescriptionJp = "Chocolate preparado por Kikyou para o Sensei. Ao contrário do nome formal, um personagem de gato fofo está desenhado nele. Dizem que o verdadeiro significado do nome está na série de grandes operações secretas para entregar este chocolate."
3801373544-NameJp = "Amuleto de Kagekoyokoji e doce com sabor de chocolate"
3801373544-DescriptionJp = "Um conjunto de um amuleto que Yukari fez sozinha para o Sensei e uma edição limitada do 'Unmee-bou' que ela finalmente conseguiu depois de andar pela rua comercial desde cedo. É um presente verdadeiramente emocionante, nascido dos vários sentimentos de Yukari de querer transmitir tudo sobre si mesma, tanto como uma Kagekoyokoji quanto como um membro do Hyakkiyako."
3081511179-NameJp = "Pudim de chocolate feito pela Ibuki"
3081511179-DescriptionJp = "Pudim de chocolate artesanal preparado pela Ibuki. Como ela tentou fazer com muito cuidado, a quantidade de ingredientes aumentou e ficou extremamente doce. Se comer muito de uma vez, sua língua pode ficar dormente."
1270452267-NameJp = "Rocambole de chocolate especial da Mika"
1270452267-DescriptionJp = "Rocambole de chocolate que a Mika assou pessoalmente para o Sensei. Embora haja algumas partes um pouco grosseiras, é possível vislumbrar o esforço da Mika."
3269210663-NameJp = "Fonte de chocolate de altíssima qualidade preparada pela presidente"
3269210663-DescriptionJp = "Uma fonte de chocolate de altíssima qualidade que Makoto preparou especialmente para o Sensei junto com a festa. Já é algo maravilhoso por si só, mas como foi modificada a pedido de Makoto para torná-la ainda mais perfeita, o motor às vezes enlouquece e espirra chocolate para todos os lados, então é preciso ter cuidado ao usar."
