2534921246-DescriptionJp = "When Shun (Swimsuit) is defeated, a secret enemy will appear.\n\nMatch your attack type to be effective against the enemy's defense type and defeat all enemies."
1056858392-NameJp = "Event Challenge Stage 3 Hint"
1056858392-DescriptionJp = "Utilize the camera movement button on the top right to progress through the battle.\n\nInclude Special students with healing abilities, or place students with high defensive capabilities at the leftmost slot of your Striker team."
209329490-NameJp = "Event Challenge Stage 4 Hint"
209329490-DescriptionJp = "The boss inflicts powerful poison-type damage over time on your allies. Include students with healing or shield effects to protect your team.\n\nWhile the boss has very high Critical Damage Resistance and Critical Resistance, every time your allies use an EX Skill, the Attack and EX Skill damage of all allies, including the user, will increase. (Stacks up to 99 times)\nUse your allies' EX Skills to progress through the battle."
