4166990936-DescriptionJp = "Controles são consumíveis. Entre eles, alguns tendem a ter um ciclo de troca mais rápido."
1233193158-NameJp = "Por favor, arrume um pouco!"
1233193158-DescriptionJp = "Kei: \"Primeiro, vamos limpar. Este é realmente um lugar onde pessoas vivem?\"\nMomoi: \"E-ei, não basta se conseguirmos fazer o jogo?\"\nKei: \"Desordem no quarto é desordem na mente!\""
3392696487-NameJp = "Por favor, coma vegetais também"
3392696487-DescriptionJp = "Kei: \"Proteínas, fibras, vitaminas. É importante consumir de forma equilibrada.\"\nAlice: \"Entendido! Alice vai comer de forma equilibrada!\"\nKei: \"Sim, muito bem.\""
4227291809-NameJp = "Desenvolvimento planejado"
4227291809-DescriptionJp = "Kei: \"O que é esse cronograma!? Quem foi que montou isso!?\"\nMidori: \"Cada uma escreveu a sua parte, não foi?\"\nKei: \"Deixem mais margem! Mesmo com um bom gerenciamento, o desenvolvimento de jogos sempre acaba em correria.\""
2951021449-NameJp = "Respeito a opinião dos especialistas"
2951021449-DescriptionJp = "Yuzu: \"E-err, este código é...\"\nKei: \"Eh... s-sim...\"\nKei: (Não sou especialista nesta área, mas... com a Yuzu, deve ficar tudo bem)"
4151397034-NameJp = "Sala do Departamento de Desenvolvimento de Jogos"
4151397034-DescriptionJp = "(x)"
2853338239-NameJp = "Entrada"
2853338239-DescriptionJp = "A entrada da sala do Departamento de Desenvolvimento de Jogos. O número de sapatos deixados varia conforme o dia."
2194359054-NameJp = "Canto de descanso"
2194359054-DescriptionJp = "Um sofá com almofadas gastas de tanto uso. Transborda uma sensação de vida cotidiana, mas é um móvel de descanso essencial para o Departamento de Desenvolvimento de Jogos."
2190051001-NameJp = "Prateleira de exibição"
2190051001-DescriptionJp = "Uma prateleira onde ficam alinhados notebooks necessários para o desenvolvimento de jogos, manuais e latas de bebidas energéticas pela metade. Mesmo limpando com frequência, logo fica bagunçado."
2420465823-NameJp = "Cantinho dos Jogos"
2420465823-DescriptionJp = "Um suporte que reúne jogos retrô, que são o tesouro e a fonte de criatividade do Departamento de Desenvolvimento de Jogos. Como os cartuchos antigos são sensíveis a poeira e impactos, parece que são mantidos regularmente."
4038677162-NameJp = "Tapete Grosso"
4038677162-DescriptionJp = "Um tapete grosso colocado para isolamento acústico. Mesmo que você faça movimentos bruscos enquanto está imerso no jogo, ele absorve bem o impacto."
2856573316-NameJp = "Armário da Yuzu"
2856573316-DescriptionJp = "O armário que serve como espaço de relaxamento e refúgio da Yuzu, a presidente do Departamento de Desenvolvimento de Jogos. À primeira vista parece estreito, mas está cheio de itens de entretenimento e doces suficientes para passar mais de um dia lá dentro."
4243041319-NameJp = "Estante de Aço para Inventário"
4243041319-DescriptionJp = "Uma estante de aço cheia de consoles de jogos pouco usados e livros especializados. Dizem que também contém itens limitados de 'Tales Saga Chronicle'."
598899268-NameJp = "Vaso de Suculentas"
598899268-DescriptionJp = "Um canto onde vasos de plantas cultivadas com carinho estão alinhados."
4115473127-NameJp = "Fragmento de Eleph de Eimi (Combate)"
4115473127-DescriptionJp = "Um fragmento de Eleph que contém o mistério de Eimi (Combate)."
3981165349-NameJp = "Fragmento de Eleph de Yuzu (Combate)"
3981165349-DescriptionJp = "Um fragmento de Eleph que contém o mistério de Yuzu (Combate)."
1519253525-NameJp = "Fragmento de Eleph de Koyuki (Pijama)"
1519253525-DescriptionJp = "Um fragmento de Eleph que contém o mistério de Koyuki (Pijama)."
4209113555-NameJp = "O Cotidiano do Departamento de Desenvolvimento de Jogos"
4209113555-DescriptionJp = "Um recorte do cotidiano do Departamento de Desenvolvimento de Jogos.\nO que é cotidiano para alguém, talvez seja um extraordinário deslumbrante para outro."
3750481687-NameJp = "Mesa Multiuso"
3750481687-DescriptionJp = "Uma mesa versátil que pode ser usada tanto como mesa de jantar quanto como espaço de reunião."
25273343-NameJp = "Zona de Jogo da Meia-Noite"
25273343-DescriptionJp = "Um tapete com brinquedos e doces espalhados. Aqui, até as noites longas se transformam rapidamente em um parque temático."
