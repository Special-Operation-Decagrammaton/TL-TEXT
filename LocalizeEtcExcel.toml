1188022458-DescriptionJp = "Um bilhete para realizar 10 recrutamentos. ※ Se não for usado até às 23:59 do dia 31 de março de 2024, este bilhete desaparecerá"
471153362-NameJp = "Mesa Executiva de Luxo"
471153362-DescriptionJp = "Uma mesa executiva com um design moderno que transmite uma presença intimidadora. O poder e a autoridade podem ser sentidos nela!"
1604931288-NameJp = "Almofariz e Pilão"
1604931288-DescriptionJp = "Um almofariz e um pilão que podem ser usados ​​para fazer mochi deliciosos. Esta é uma ótima maneira de receber o Ano Novo!"
1549901025-NameJp = "Pistas do Alvo"
1549901025-DescriptionJp = "Pistas sobre o alvo da solicitação. Esta é a informação mais importante para levar o trabalho adiante."
3633823236-NameJp = "Panfleto de Apresentação"
3633823236-DescriptionJp = "Um panfleto com as informações da apresentação. Mesmo que a apresentação termine, se você abrir isso, a emoção daquele momento voltará à vida."
3045934720-NameJp = "Gravata Borboleta"
3045934720-DescriptionJp = "Uma pequena gravata frequentemente vista em lugares refinados. Projetada para ser fácil de usar por qualquer um."
1268221723-NameJp = "Óculos de Ópera"
1268221723-DescriptionJp = "Um telescópio que permite ver o palco claramente, mesmo de longe. Deixe as atuações apaixonadas dos atores e a arte maravilhosa ficarem gravadas em seus olhos."
1224308689-NameJp = "Convite de Dia dos Namorados"
1224308689-DescriptionJp = "A prova de que alguém está esperando por você no Dia dos Namorados. Certeza de que haverá um encontro especial num dia especial. ※ Após o fim do evento, os 'Convites de Dia dos Namorados' mantidos sem uso serão convertidos em 400.000 Créditos"
3819686275-NameJp = "0068 Com Amor Desde A Ópera!"
3819686275-DescriptionJp = "Pode ser adquirido no evento 0068 Com Amor Desde A Ópera!"
1439022586-NameJp = "Binah (Guerra Urbana) Derrotado! 2024"
1439022586-DescriptionJp = "Derrote o Binah da Grande Batalha em Guerra Urbana em todos os tipos de armadura na dificuldade Hard ou superior"
531835232-NameJp = "Binah (Guerra Urbana) Derrotado! 2024"
531835232-DescriptionJp = "Derrote o Binah da Grande Batalha em Guerra Urbana em todos os tipos de armadura na dificuldade Hardcore ou superior"
721823588-NameJp = "Binah (Guerra Urbana) Derrotado! 2024"
721823588-DescriptionJp = "Derrote o Binah da Grande Batalha em Guerra Urbana em todos os tipos de armadura na dificuldade Extreme ou superior"
2124839040-NameJp = "Binah (Guerra Urbana) Derrotado! 2024"
2124839040-DescriptionJp = "Derrote o Binah da Grande Batalha em Guerra Urbana em todos os tipos de armadura na dificuldade Insane ou superior"
390594649-NameJp = "Palito de Chocolate Caseiro"
390594649-DescriptionJp = "Chocolate feito à mão pela Ichika para o Sensei. Em formato de palito, é fácil de segurar e de comer. Apesar de ser artesanal, o resultado é tão bom quanto o de um produto comercial."
3418867182-NameJp = "Sandálias de Chocolate"
3418867182-DescriptionJp = "Um chocolate muito grande, do mesmo tamanho de uma sandália real. Ao contrário da sua aparência, é muito resistente e dizem que é possível andar com ela."
3006306790-NameJp = "Mensagem Secreta"
3006306790-DescriptionJp = "Um chocolate artesanal que a Koyuki enviou para o Sensei. Parece um chocolate de presente comum, mas parece que tem um significado oculto."
291186913-NameJp = "A Própria Escolha"
291186913-DescriptionJp = "Um chocolate de luxo que a Sakurako preparou para o Sensei. Ao contrário do habitual, é um presente raro e precioso que a própria Sakurako escolheu após muita ponderação e hesitação."
498190404-NameJp = "Carta de Desafio de Dia dos Namorados"
498190404-DescriptionJp = "O chocolate da Reisa em formato de carta de desafio. Na verdade, é apenas um envelope de carta de desafio colocado sobre um grande chocolate. Dentro, há uma carta da Reisa."
2827551265-NameJp = "Chocolate de Ovo de Água Termal"
2827551265-DescriptionJp = "Um chocolate especial artesanal feito pela Megu. À primeira vista, parece um ovo de água termal, sendo fácil confundir. Dizem que há uma quantidade tão grande que pode-se pegar o quanto quiser, se precisar."
2152153824-NameJp = "Bolo Lunar de Chocolate"
2152153824-DescriptionJp = "Um bolo lunar de chocolate feito pela Rumi com o pretexto de pedir ao Sensei para 'experimentar'. Como é típico de uma cozinheira, são feitos de várias formas, e todos estão repletos de seu desejo de que o Sensei os experimente."
219184488-NameJp = "Chocolate com o Emblema do Genryumon"
219184488-DescriptionJp = "Um chocolate feito pela Mina, inspirado no que é 'mais importante' para ela. O sentimento é sem dúvida gratificante, mas sinto que algo está um pouco fora do lugar..."
717036626-NameJp = "Chaveiro com Acessório de Chocolate"
717036626-DescriptionJp = "Um chaveiro e um chocolate que Momiji insiste serem o prêmio. Por coincidência, formam um par com o de Momiji."
2219659309-NameJp = "O Chocolate Comum de Nagisa"
2219659309-DescriptionJp = "O chocolate que a Nagisa fez à mão com um sentimento de gratidão pelo Sensei. Para garantir que nenhuma outra intenção ou interpretação política seja feita, ela os fez de forma propositalmente simples e sem enfeites. No entanto, o sabor e a qualidade do chocolate superam de longe os produtos disponíveis comercialmente."
2751216385-NameJp = "Chocolate Altamente Calórico"
2751216385-DescriptionJp = "A solução idealizada pela Minori, que quer aproveitar o Dia dos Namorados, mas não consegue. Minori agiu como se estivesse apenas o entregando de passagem, mas na verdade, ela passou bastante tempo o escolhendo dentre uma infinidade de marcas e fabricantes."
2983078984-NameJp = "Diferença de Percepção"
2983078984-DescriptionJp = "O chocolate que a Aoi preparou para o Sensei. O tamanho é pequeno, mas levou bastante trabalho em cada um. Aoi diz que preparou de vários tipos de propósito, pois não sabe o que o Sensei iria preferir."
3666669973-NameJp = "O Chocolate Cheio de Plana pela Plana"
3666669973-DescriptionJp = "O chocolate que a Plana fez em segredo sem a Arona saber. Tem um sabor que se adapta perfeitamente ao gosto do Sensei."
967746156-NameJp = "Auto-Retrato em Chocolate"
967746156-DescriptionJp = "A Meru desenhou um auto-retrato em um chocolate branco. Ela parece não estar muito satisfeita com a qualidade, mas o verdadeiro problema é por onde começar a comê-lo."
3706730641-NameJp = "O Supremo e Inigualável Bolo de Chocolate Artesanal"
3706730641-DescriptionJp = "Um bolo de chocolate artesanal que afirma nunca perder, mesmo se comparado às famosas lojas de Kivotos. O lema é 'suprema e inigualável hospitalidade', ao que parece."
2168519091-NameJp = "Chocolate Artesanal da Líder de Estratégia"
2168519091-DescriptionJp = "Chocolate artesanal que Kaho fez para o Sensei. À primeira vista parece um brinde de RP comum, mas há atenção e dedicação gravados cuidadosamente em cada letra."
3486261893-NameJp = "Café \"o de sempre\""
3486261893-DescriptionJp = "Um café que Kanna fez para o Sensei. No entanto, diferentemente do normal, há um cheiro doce de chocolate exalando dele, possivelmente devido à adição de alguma \"emoção subjetiva\" de Kanna."
1766939933-NameJp = "Chocolate Feito Juntos"
1766939933-DescriptionJp = "Um chocolate que a Renge conseguiu completar com a ajuda do Sensei. Embora o acabamento possa não ser tão bom, as memórias que foram derretidas junto à ele não podem ser negadas."
2005226182-NameJp = "Chocolate de Oficial Estratégico"
2005226182-DescriptionJp = "Chocolate que a Kikyou preparou para o Sensei. Apesar do seu nome rígido, este chocolate mostra um personagem de gato fofo. Aparentemente, o verdadeiro significado do nome reside na série de operações secretas que foi necessária para entregar o chocolate."
3801373544-NameJp = "O Charme da Kadenokouji e os Lanches de Chocolate"
3801373544-DescriptionJp = "Um amuleto que a Yukari fez para o Sensei, junto a uma edição limitada de salgadinhos que ela conseguiu correndo pelas lojas de compras de manhã cedo. Yukari queria comunicar o seu eu como uma Kadenokouji, bem como o seu eu como membro da Sociedade da Tempestade de Pétalas."
3081511179-NameJp = "Pudim de Chocolate feito pela Ibuki"
3081511179-DescriptionJp = "O pudim de chocolate feito à mão pela Ibuki. O aumento dos ingredientes como resultado da tentativa cuidadosa de o preparar, tornou-o excessivamente doce. Pode causar formigamento na língua se comido em demasia."
1270452267-NameJp = "Bolo de Chocolate Especial da Mika☆"
