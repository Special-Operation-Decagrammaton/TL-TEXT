404292254-NameJp = "入口で接客をする従業員"
404292254-DescriptionJp = "当温泉郷はいつも温かい笑顔でお客様をお迎えしております。\n（怪しい飲み物を渡す従業員をお見かけになりましたら、すぐに女将の方へご連絡を！）"
4035745238-NameJp = "庭園や温泉を案内する女将"
4035745238-DescriptionJp = "当温泉郷には、石や砂を用いた枯山水の庭園がございます。\n素朴ながらも心洗われる庭園を見つめて、ゆったりした時間をお過ごしになってはいかがでしょうか？"
1774361412-NameJp = "掃除や片づけをする女将"
1774361412-DescriptionJp = "当温泉郷では1日2回、寝具を入れ替えて掃除を行っております。\n隅から隅まで手入れを行き届かせておりますので、ぜひのんびりとお寛ぎください。"
3950044430-NameJp = "露天風呂を楽しむお客様"
3950044430-DescriptionJp = "当温泉郷のお湯は美白効果や疲労回復はもちろん、射撃力の向上などにも効果があります。\n今日だけはすべて忘れてゆっくりし、明日への活力を蓄えていただけますと幸いです。"
999560012-NameJp = "宴会場で食事を楽しむお客様"
999560012-DescriptionJp = "当温泉郷のお料理は、全て最高級の食材を用いて調理しております。\n温泉まんじゅうやうんめえ棒などもふんだんに用いておりますので、ぜひご賞味ください。"
1094144720-NameJp = "練習"
1094144720-DescriptionJp = "アスレチックスタジアムの陸上トラックは、試合のない日であれば利用可能です。 \n希望する生徒は、アスレチック管理委員会に利用許可書を提出してください。"
2809976808-NameJp = "応援"
2809976808-DescriptionJp = "スポーツに華を与えてくれる応援！\n試合に参加している選手のために一生懸命応援しましょう！"
374407097-NameJp = "作業"
374407097-DescriptionJp = "晄輪大祭実行委員一同は、参加者全員が大運動会を楽しむことができるよう最善を尽くしています。\n競技中に問題が発生した場合、スタジアム内の運営本部までお願いします。"
1521840386-NameJp = "制作"
1521840386-DescriptionJp = "アスレチックスタジアムの倉庫には、簡単な修理ができる工具が用意されています。\n（どなたでも自由にご利用できますが、危険な改造はしないでください！)"
3558610679-NameJp = "休憩"
3558610679-DescriptionJp = "運動後は水分を摂りましょう！\nアスレチックスタジアムの休憩室には無料のドリンク機器がありますので、水分補給を忘れずに！"
317946005-NameJp = "トラック上で楽しむブランチ"
317946005-DescriptionJp = "ハルナ「パン一切れを食べる時も上品に。余裕のある食事こそがグルメの基本です」\nジュンコ「ちょっと、イズミ！私の分まで食べちゃったらどうするの！」"
