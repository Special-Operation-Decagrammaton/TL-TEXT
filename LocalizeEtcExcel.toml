4195229634-NameJp = "Relógio de Parede da Grande Gincana"
4195229634-DescriptionJp = "Um relógio de parede que anuncia o início das competições. Quando chega a hora marcada, ele começa a correr com força total."
4098284076-NameJp = "Cone de Trânsito da Grande Gincana - Vermelho"
4098284076-DescriptionJp = "Um cone de trânsito na cor vermelha. Um item indispensável para uma partida justa."
2985628937-NameJp = "Cone de Trânsito da Grande Gincana - Azul"
2985628937-DescriptionJp = "Um cone de trânsito na cor azul. Um item indispensável para uma partida justa."
791395155-NameJp = "Cone de Trânsito da Grande Gincana - Azul Celeste"
791395155-DescriptionJp = "Um cone de trânsito na cor azul celeste. Um item indispensável para uma partida justa."
1658923215-NameJp = "Bandeira da Grande Gincana - Azul Claro"
1658923215-DescriptionJp = "Uma bandeira na cor azul celeste. A cor refrescante chama a atenção das alunas mesmo de longe."
1004804813-NameJp = "Bandeira da Grande Gincana - Azul"
1004804813-DescriptionJp = "Uma bandeira na cor azul. Ela traz um sinal de vitalidade, como se uma partida estivesse prestes a começar."
2057528880-NameJp = "Bandeira da Grande Gincana - Amarelo"
2057528880-DescriptionJp = "Uma bandeira na cor amarela. Indica a área de descanso das alunas após o término de uma partida intensa."
2815510359-NameJp = "Tapete Esportivo da Grande Gincana"
2815510359-DescriptionJp = "Um tapete esportivo que expressa as regras da competição. É possível realizar partidas animadas em qualquer lugar."
3173663059-NameJp = "Colchonete da Grande Gincana - Azul Celeste"
3173663059-DescriptionJp = "Um colchonete de ginástica macio e seguro, sem risco de se machucar."
2486348996-NameJp = "Colchonete da Grande Gincana - Azul"
2486348996-DescriptionJp = "Um colchonete de ginástica macio e seguro, sem risco de se machucar."
3259632524-NameJp = "Colchonete da Grande Gincana - Bege"
3259632524-DescriptionJp = "Um colchonete de ginástica macio e seguro, sem risco de se machucar."
3032310339-NameJp = "Placar da Grande Gincana"
3032310339-DescriptionJp = "Um placar que exibe os resultados das atletas e aumenta o moral da torcida. Só de olhar, já desperta tensão e empolgação."
604450678-NameJp = "Janela do Grande Festival Esportivo"
604450678-DescriptionJp = "Uma janela de onde se pode observar o Grande Festival Esportivo. Os alunos estão no meio das competições."
812562737-NameJp = "Pilar Bege do Grande Festival Esportivo"
812562737-DescriptionJp = "Um pilar bege que transmite a energia do Grande Festival Esportivo. Pode compor o espaço de forma vibrante."
2977651098-NameJp = "Caixa de Armazenamento de Bolas do Grande Festival Esportivo"
2977651098-DescriptionJp = "Uma caixa para guardar bolas usadas em diversas modalidades esportivas. Você pode pegar uma bola a qualquer momento."
832984722-NameJp = "Cesta de Bebidas Energéticas"
832984722-DescriptionJp = "Uma cesta de bebidas energéticas mantidas em gelo. Um gole é o suficiente para recuperar as energias."
3592043563-NameJp = "Cesta de Basquete do Grande Festival Esportivo"
3592043563-DescriptionJp = "Uma cesta de basquete com design simples. Mesmo que não seja um atleta, dá vontade de tentar uma enterrada pelo menos uma vez!"
1973452569-NameJp = "Cesta de Arremesso - Amarela"
1973452569-DescriptionJp = "Uma linda cesta de arremesso em tons de amarelo. Vamos tentar jogar bolas coloridas nela!"
3526747408-NameJp = "Cesta de Arremesso - Azul"
3526747408-DescriptionJp = "Uma linda cesta de arremesso em tons de azul. Vamos tentar jogar bolas coloridas nela!"
820798347-NameJp = "Cesta de Arremesso - Azul Celeste"
820798347-DescriptionJp = "Uma linda cesta de arremesso em tons de azul claro. Vamos tentar jogar bolas coloridas nela!"
2398625876-NameJp = "Cadeira do Árbitro do Grande Festival Esportivo"
2398625876-DescriptionJp = "A cadeira do árbitro que supervisiona a partida. É possível entender a situação mais rápido do que qualquer um."
4051838828-NameJp = "Rede do Grande Festival Esportivo"
4051838828-DescriptionJp = "Uma rede feita de material resistente. É nela que acontecem os ralis cheios de tensão das partidas."
3620318852-NameJp = "Piso de Madeira do Grande Festival Esportivo"
3620318852-DescriptionJp = "Um piso de madeira feito para ser resistente. Tem alta fricção, então é difícil escorregar."
1998183698-NameJp = "Decoração de Bandeira do Peroro do Grande Festival Esportivo"
1998183698-DescriptionJp = "Uma decoração de bandeira com o fofo Peroro fazendo animação de torcida. Fofura e apoio de uma vez só!"
2904276420-NameJp = "Decoração de Bandeira de Torcida do Grande Festival Esportivo"
2904276420-DescriptionJp = "Uma decoração de bandeira de torcida que dá ânimo ao olhar. As cores vibrantes inflamam a paixão."
114040411-NameJp = "Papel de Parede do Grande Festival Esportivo"
114040411-DescriptionJp = "Papel de parede bege claro. Combina bem com os equipamentos que fazem o Grande Festival Esportivo brilhar."
832633492-NameJp = "Fundo do Grande Festival Esportivo"
832633492-DescriptionJp = "Um fundo que destaca o Grande Festival Esportivo. Parece que a energia do evento pode ser sentida através dele."
3818682926-NameJp = "Placa de Sinalização do Grande Festival Esportivo"
3818682926-DescriptionJp = "Uma placa de sinalização do Grande Festival Esportivo que chama a atenção de quem passa. Até os alunos que não estavam interessados acabam parando para olhar."
4084185733-NameJp = "Cadeira Dobrável do Grande Festival Esportivo"
4084185733-DescriptionJp = "Uma cadeira dobrável de ferro resistente. Como pode ser dobrada para guardar, é excelente em termos de armazenamento."
3719677986-NameJp = "Cavalete de Salto do Grande Festival Esportivo"
3719677986-DescriptionJp = "Um cavalete de salto que faz qualquer um querer pular. As cores refrescantes são perfeitas para o Grande Festival Esportivo."
2320061101-NameJp = "Suporte para Corrida de Pegar Pão do Grande Festival Esportivo"
2320061101-DescriptionJp = "Um suporte para a corrida de pegar pão, com deliciosas rosquinhas alinhadas. Se for uma aluna gourmet, talvez queira participar da competição?"
523248880-NameJp = "Tenda de Descanso do Grande Festival Esportivo"
523248880-DescriptionJp = "Uma tenda que oferece um descanso confortável. É ideal para descansar o corpo cansado após as partidas."
2216160600-NameJp = "Arquibancada de Torcida do Grande Festival Esportivo"
2216160600-DescriptionJp = "Uma arquibancada perfeita para torcer. Está cheia de entusiasmo para apoiar os alunos durante as competições."
2711187349-NameJp = "Caixa de Equipamentos do Grande Festival Esportivo"
2711187349-DescriptionJp = "Uma caixa onde estão guardados pequenos itens de várias competições. Você precisa chegar cedo nas modalidades populares!"
4186446994-NameJp = "Mesa de Almoço do Grande Festival Esportivo"
4186446994-DescriptionJp = "Uma mesa para o almoço, que é o ponto alto do Grande Festival Esportivo. Pode ser usada para a reunião de reflexão da manhã e para planejar estratégias para uma vitória de virada."
3249630751-NameJp = "Expositor de Troféus do Grande Festival Esportivo"
3249630751-DescriptionJp = "Um expositor de troféus do Grande Festival Esportivo com troféus gloriosos alinhados. Contém os sonhos e objetivos dos alunos que participam do evento."
1270765820-NameJp = "Portal de Entrada do Grande Festival Esportivo"
1270765820-DescriptionJp = "Um portal de entrada que anuncia a abertura do grandioso Festival Esportivo. A energia pode ser sentida desde o momento em que se entra."
2400305011-NameJp = "Janela com cortina"
2400305011-DescriptionJp = "Uma janela com cortina. Sentir a brisa vindo de fora da janela traz uma sensação de paz."
540301307-NameJp = "Mesa de centro branca"
540301307-DescriptionJp = "Uma mesa onde se pode colocar café. Perfeita para desfrutar de uma tarde relaxante."
2738215609-NameJp = "Cadeira individual colorida"
2738215609-DescriptionJp = "Uma cadeira individual com um esquema de cores marcante. É resistente, mas macia e confortável de sentar."
4156726588-NameJp = "Prateleira de vasos de plantas"
4156726588-DescriptionJp = "Uma prateleira com vasos de plantas. Traz um toque visual à parede."
3942981484-NameJp = "Mesa de sobremesa branca"
3942981484-DescriptionJp = "Uma mesa baixa com sobremesas. É a mesa perfeita para conversar alegremente com alguém."
2108508784-NameJp = "Banco colorido"
2108508784-DescriptionJp = "Um banco que acomoda duas pessoas. A grande vantagem é que o corpo não dói mesmo após longos períodos sentado."
696868990-NameJp = "Vaso de plantas de dois níveis colorido"
696868990-DescriptionJp = "Um vaso de plantas dividido em dois níveis. Basta colocá-lo para ter seu próprio jardim."
529277183-NameJp = "Decoração de parede com menu do Momo Friends"
529277183-DescriptionJp = "Decoração de parede com o menu do café. O menu do Momo Friends e a iluminação brilhante criam uma atmosfera adorável."
3122346673-NameJp = "Pilar com fotos do Momo Friends"
3122346673-DescriptionJp = "Um pilar decorado com fotos relacionadas ao café Momo Friends. Você pode ver fotos que simbolizam o café."
2845270565-NameJp = "Janela de vidro"
2845270565-DescriptionJp = "Uma janela de vidro que proporciona uma atmosfera aberta. Aproveite para relaxar e curtir a vista do lado de fora do café enquanto toma um café!"
3224998488-NameJp = "Prateleira de conjunto do Peroro"
3224998488-DescriptionJp = "Uma prateleira com bonecos do Peroro e outros itens. Os bonecos do Peroro e os pequenos vasos de plantas são muito fofos."
607571213-NameJp = "Lousa da sala de aula de Abydos"
607571213-DescriptionJp = "Uma lousa bem limpa. Dá até vontade de fazer um rabisco."
1585717654-NameJp = "Armário dos alunos da sala de aula de Abydos"
1585717654-DescriptionJp = "Armário destinado aos alunos de Abydos. Decorar o interior é uma escolha pessoal."
1946673948-NameJp = "Caixa organizadora da sala de aula de Abydos"
1946673948-DescriptionJp = "Uma caixa para guardar itens necessários na sala de aula. A combinação de cores é fofa."
1608437119-NameJp = "Cadeira da sala de aula de Abydos"
1608437119-DescriptionJp = "Uma cadeira de sala de aula com um visual limpo e marcante. Se mover a mesa um pouco, pode sentar ao lado de um amigo."
2332133708-NameJp = "Relógio de parede da sala de aula de Abydos"
2332133708-DescriptionJp = "Um relógio de parede com design simples. É um item importante para os alunos que contam cada segundo antes da hora do almoço."
2029098150-NameJp = "Mesa com marmita da sala de aula de Abydos"
2029098150-DescriptionJp = "Uma mesa com uma marmita feita com muito carinho por alguém. Ainda falta muito para a hora da refeição."
2742545103-NameJp = "Piso da sala de aula de Abydos"
2742545103-DescriptionJp = "Um piso de sala de aula com um tom bege marcante. É seguro e antiderrapante."
2333504969-NameJp = "Divisória de corredor da sala de aula de Abydos"
2333504969-DescriptionJp = "Uma divisória de sala de aula que permite dividir o espaço de forma eficiente. Pode criar situações divertidas."
3598923842-NameJp = "Alto-falante de parede da sala de aula de Abydos"
3598923842-DescriptionJp = "Um alto-falante de parede com design clássico. O som é mais potente do que se espera."
832134850-NameJp = "Pilar da sala de aula de Abydos"
832134850-DescriptionJp = "Um pilar de sala de aula que combina com a divisória. As cores vibrantes são marcantes."
1559310292-NameJp = "Lousa de cronograma da sala de aula de Abydos"
1559310292-DescriptionJp = "Uma lousa onde se pode ver o cronograma da escola de relance. Está sempre cheia de novos compromissos todos os dias."
2961499698-NameJp = "Lousa de campanha da sala de aula de Abydos"
2961499698-DescriptionJp = "Uma lousa onde se pode ver as campanhas da escola. É possível vislumbrar a expressão entusiasmada dos alunos."
2508722855-NameJp = "Caixa de material de limpeza da sala de aula de Abydos"
2508722855-DescriptionJp = "A limpeza é uma virtude dos alunos. A caixa de material de limpeza de Abydos tem de tudo."
565013558-NameJp = "Armário do professor da sala de aula de Abydos"
565013558-DescriptionJp = "Um armário de sala de aula exclusivo para o professor. Será que ele fica lotado em datas comemorativas?"
1273888019-NameJp = "Mesa da sala de aula de Abydos com um cardigã"
1273888019-DescriptionJp = "Uma mesa com um cardigã amarelo pendurado. Além de ser gentil, sente-se uma certa elegância rica."
2424547713-NameJp = "Mesa da sala de aula de Abydos com um boneco de baleia"
2424547713-DescriptionJp = "Uma mesa com um boneco de baleia fofo. Dá para sentir uma sensação de relaxamento."
2024364171-NameJp = "Mesa da sala de aula de Abydos com óculos"
2024364171-DescriptionJp = "Uma mesa com óculos de armação vermelha. É a mesa de alguém atencioso e confiável."
3616232594-NameJp = "Mesa da sala de aula de Abydos com uma máscara"
3616232594-DescriptionJp = "Uma mesa com uma máscara. Sente-se uma aura nada comum."
629150665-NameJp = "Mesa da sala de aula de Abydos com fita e luvas"
629150665-DescriptionJp = "Uma mesa com uma fita e luvas. Se for a dona desta mesa, parece que podemos confiar tarefas importantes a ela."
1101212602-NameJp = "Mesa da sala de aula de Abydos com uma bolsa grande"
1101212602-DescriptionJp = "Uma mesa com uma bolsa grande. Por algum motivo, parece que a dona não volta ao seu lugar há muito tempo."
1560236674-NameJp = "Suporte de armas da sala de aula de Abydos"
1560236674-DescriptionJp = "Um suporte onde ficam as armas de fogo, um dos itens mais preciosos das alunas. A presença mais notável da sala."
3852063070-NameJp = "Divisória de quadro da sala de aula de Abydos"
3852063070-DescriptionJp = "Uma invenção surpreendente que combina transmissão de informações e separação de espaço. Conforto e fofura ao mesmo tempo."
1315605472-NameJp = "Mesa do professor da sala de aula de Abydos"
1315605472-DescriptionJp = "A mesa do professor que orienta as alunas. Está cheia de flores perfumadas e cartas que as alunas trouxeram."
1541047128-NameJp = "Moldura com logotipo da sala de aula de Abydos"
1541047128-DescriptionJp = "Moldura com o logotipo da sala de aula de Abydos. É o símbolo de Abydos."
2984050247-NameJp = "Meta da turma da sala de aula de Abydos"
2984050247-DescriptionJp = "Uma meta de turma mundana, porém realista, onde se sente uma forte vontade em relação ao dinheiro. Inspira determinação em quem a vê."
1007047880-NameJp = "Lixeira de reciclagem da sala de aula de Abydos"
1007047880-DescriptionJp = "Lixeira de reciclagem feita de forma clara por cores. As cores fofas são um bônus para a decoração."
3661683422-NameJp = "Quadro branco da sala de aula de Abydos"
3661683422-DescriptionJp = "Um quadro branco onde o caos e o planejamento se reúnem em um só lugar. Para alguns, é uma folha de papel infinita; para outros, um plano de ação."
3759624148-NameJp = "Fundo da sala de aula de Abydos"
3759624148-DescriptionJp = "O fundo de uma sala de aula cheia do romance e da intensidade dos tempos de estudante."
2790194128-NameJp = "Piso de azulejos da sala de aula de Abydos"
