3368418938-DescriptionJp = "Um armário de armazenamento de luxo com uma atmosfera clássica. Possui chave, então não é qualquer um que pode abrir."
1297438922-NameJp = "Estante de livros de mogno de três andares"
1297438922-DescriptionJp = "Uma estante de luxo feita por artesãos. É valiosa como móvel, mas o valor dos livros em seu interior é ainda maior."
1775678266-NameJp = "Prateleira de exibição da festa do chá"
