1336178018-NameJp = "Pontos do Limited Dash"
1336178018-DescriptionJp = "A cada recrutamento realizado, você obterá \"Pontos do Limited Dash\". Ao acumular \"Pontos do Limited Dash\", você pode recrutar diretamente as alunas disponíveis na seleção.\n* Após o fim do período de Destaque, os Pontos do Limited Dash serão convertidos em Fragmentos de Keystone.\n[c][ff2d2c]Diferente dos Pontos de Recrutamento e dos Pontos de Arquivo, os Pontos do Limited Dash não se acumulam com pontos obtidos em outros recrutamentos.[-][/c]"

2224281602-NameJp = "Pontos LimitedDash"
2224281602-DescriptionJp = "A cada recrutamento realizado, você obterá \"Pontos LimitedDash\". Ao acumular \"Pontos LimitedDash\", você pode recrutar diretamente as alunas disponíveis na seleção.\n* Após o fim do período de Destaque, os Pontos LimitedDash serão convertidos em Fragmentos de Keystone.\n[c][ff2d2c]Diferente dos Pontos de Recrutamento e dos Pontos de Arquivo, os Pontos LimitedDash não se acumulam com pontos obtidos em outros recrutamentos.[-][/c]"








