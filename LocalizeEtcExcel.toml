3676923287-NameJp = "Event Challenge Stage 1 Hint"
3676923287-DescriptionJp = "Endure until the chain explosion trap activates to claim victory.\nGuiding Akemi's attacks to the flammable oil drums will cause the chain explosion trap to activate faster.\n\nDelinquents grow stronger over time."
1280690466-NameJp = "Event Challenge Stage 2 Hint"
1280690466-DescriptionJp = "Form your team keeping in mind that all enemy attack attributes are Explosive.\nTry to defeat Yukino first, who buffs her squad members."
2920015713-NameJp = "Event Challenge Stage 3 Hint"
2920015713-DescriptionJp = "Utilize Crowd Control (CC) status to defeat the Peking Opera Club students before they can use their EX skills."
2740980058-NameJp = "Event Challenge Stage 4 Hint"
2740980058-DescriptionJp = "Yukino possesses a CC gauge; once accumulated, nearby enemies will be unable to use EX skills for a certain duration.\n\nDestroying the container control device will bring forth a special ally to support you."
1472027894-NameJp = "Event Challenge Stage 1 Hint"
1472027894-DescriptionJp = "Each time a Sweeper is defeated, a Sweeper of a different defense type is summoned.\nOther enemies with a different defense type from the Sweepers will take significantly reduced damage.\n\nDefeat the Sweepers to summon a Sweeper of the same defense type as the appeared enemy, and then defeat the enemy."
3165699134-NameJp = "Event Challenge Stage 2 Hint"
3165699134-DescriptionJp = "Form your team considering Haruka (Dress)'s attack and defense types."
2899464306-NameJp = "Event Challenge Stage 3 Hint"
2899464306-DescriptionJp = "The enemy boss utilizes Carpaccio Family Mobs to significantly buff their own ATK and DEF.\nStunned Carpaccio Family Mobs can be defeated using EX skills.\n\nDefeat the Carpaccio Family Mobs first to weaken the boss before proceeding with the battle."
1993701024-NameJp = "Event Challenge Stage 4 Hint"
1993701024-DescriptionJp = "Use skills that remove debuffs to clear all negative statuses from ally Bear Robots and Rabbit Robots to unfreeze them.\nThe boss takes significantly reduced damage, but damage taken increases based on the number of Bear Robots and Rabbit Robots attacking the boss. (Bear Robots increase the boss's damage taken significantly more than Rabbit Robots)\n\nThe boss uses powerful wide-range skills and ATK reduction effects, so protect the Bear and Rabbit Robots while utilizing debuff removal skills to advance through the battle."
