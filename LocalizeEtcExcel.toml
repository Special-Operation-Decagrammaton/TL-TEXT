1401457129-NameJp = "Bilhete de Recrutamento ★3 Garantido StartDash"
1401457129-DescriptionJp = "[4e576d]Um bilhete que realiza 10 recrutamentos, garantindo que pelo menos uma aluna ★3 atenda ao chamado.[-]"
376882766-NameJp = "Pontos de Encore"
376882766-DescriptionJp = "Você amealha um acúmulo de 'Pontos de Encore' toda vez que o maquinário do recrutamento for acionado. Ao reunir 'Pontos de Encore' suficientes, será possível evocar a manifestação iminente de uma aluna de destaque da campanha para o plantel da sua divisão da Schale.\n※Assim que o estopim de prospecção com as chaves-mestra fechar, os pontos remanescentes se cristalizam e se fragmentam em pedaços de Keystone.\n[c][ff2d2c]Ao contrário das diretrizes padronizadas dos velhos Pontos de Recrutamento ou de Arquivo, o Ponto de Encore adere a uma contabilidade soberana e intocável, ou seja, nenhum ponto adquirido em outro tipo de recrutamento será somado ou transmutado neste poço de compensação.[-][/c]"
619886073-NameJp = "Bilhete de 10 Recrutamentos"
619886073-DescriptionJp = "Um bilhete que permite realizar 10 recrutamentos. ※Se não for utilizado até 30 de Abril de 2026 às 23:59, este bilhete irá desaparecer."
1061619772-NameJp = "Substância Misteriosa C"
1061619772-DescriptionJp = "Embora já exista um patamar formidável mapeado do progresso analítico dela, esse milagre subjacente não obteve um grau empírico conclusivo. As implicações de aproveitamento e aplicabilidade prática são incomensuráveis."
2566762884-NameJp = "Pt do Evento"
2566762884-DescriptionJp = "Pontos que podem ser ganhos no evento. Ao obter uma boa quantidade, você poderá receber diversas recompensas."
2137809038-NameJp = "Retalhos de um Caderno"
2137809038-DescriptionJp = "Anotações soltas rabiscadas numa folha de caderno documentando as infinitas adversidades e pautas cruciais para a consolidação de um grande game. Entre as anotações embaralhadas, pode haver algo vital que não deve jamais se perder nos anais da história."
3072773030-NameJp = "Cabo Misterioso"
3072773030-DescriptionJp = "Uma coleção indescritível de cabos de uso desconhecido que brotam na proporção que seu dono estoca eletrônicos e cabos por aí e junta numa gaveta empoeirada. O ideal seria dar um fim aos que não têm uso."
4166990936-NameJp = "Controle Reserva"
4166990936-DescriptionJp = "Controles são bens de consumo por excelência. Principalmente certos controles que acabam sendo destroçados devido às sessões calorosas e porrada num controle após perder numa partida que vão direto pra reposição acelerada."
1233193158-NameJp = "Arrumem isso pelo menos um pouco!"
1233193158-DescriptionJp = "Kei: 'Em primeiro lugar, precisamos limpar. Esse lugar tem mesmo condições para um ser humano viver em paz?'\nMomoi: 'P-pois é, mas dá para a gente fazer nossos jogos... não dá?'\nKei: 'Um ambiente desarrumado reflete uma mente perturbada!'"
3392696487-NameJp = "Comam os seus vegetais direitinho também"
3392696487-DescriptionJp = "Kei: 'Proteínas, fibras alimentares e vitaminas. É fundamental ter um consumo devidamente balanceado dessas propriedades.'\nAris: 'Entendido! Aris vai manter a barra de HP no talo com um balanceamento de itens muito bom!'\nKei: 'Sim, muito bem! Você está de parabéns.'"
4227291809-NameJp = "O desenvolvimento requer planejamento"
4227291809-DescriptionJp = "Kei: 'Que diabo de cronograma é esse!? Quem foi o infeliz que elaborou as diretrizes desse circo!?'\nMidori: 'Cada uma preencheu os próprios limites que iriam cuidar...'\nKei: 'Deem mais margem para respiro! O inferno no processo logístico de elaboração de software já bate à porta mesmo com o gerenciamento meticulosamente controlado, imaginem sem um planejamento!'"
2951021449-NameJp = "Eu respeito a opinião de especialistas"
2951021449-DescriptionJp = "Yuzu: 'B-bem, esse trecho de código aqui é...'\nKei: 'Hm... Ah, certo...'\nKei: (Eu não tenho muito domínio prático sobre esse assunto... Mas sinto que a Yuzu vai dar conta do recado.)"
4151397034-NameJp = "Sala do Clube de Desenvolvimento de Jogos"
4151397034-DescriptionJp = "(x)"
2853338239-NameJp = "Entrada"
2853338239-DescriptionJp = "A porta de acesso ao Clube de Desenvolvimento de Jogos. O número de sapatos enfileirados no degrau não segue um preceito e muda drasticamente conforme as intempéries dos dias em vigência."
2194359054-NameJp = "Cantinho do Descanso"
2194359054-DescriptionJp = "O desgaste excruciante cobrou o seu preço deixando as molas debaixo das almofadas num estado bem capenga. Embora traga uma premissa pesada de exaustão e degradação diária, é um móvel vital e de um conforto terapêutico inestimável para restaurar os ânimos abatidos de uma vida estressante de game design."
2190051001-NameJp = "Estante de Telas"
2190051001-DescriptionJp = "A estante está sobrecarregada com cadernos, manuais em grossas brochuras, laptops indispensáveis que operam a milhas por hora as premissas artísticas e compilações em C++, latas de energéticos tomadas pela metade no apagar das luzes... Limpá-la esporadicamente é dar murro em ponta de faca, em questão de segundos tudo é profanado a uma vala caótica da noite pro dia."
2420465823-NameJp = "Espaço Gamer"
2420465823-DescriptionJp = "O sagrado altar no qual repousa o maior patrimônio empossado do clube. É o farol para o instinto primário da inspiração no qual exibe toda as reverenciadas e inescrupulosas joias coroadas de games antigos. Uma limpeza rotineira e abnegada se faz perfeitamente necessária já que velharias cartuchais se abatem pela poeira e pelo choque mecânico da idade em questão."
4038677162-NameJp = "Tapete Grosso"
4038677162-DescriptionJp = "Um isolamento térmico e acústico moldado para amansar as ressoâncias num ambiente tenso. O tecido grosso da trama garante uma boa mitigação para aguentar com fervor as colisões estrondosas geradas pelas sessões extremas de jogos que demandam pulos e manobras efusivas."
2856573316-NameJp = "Armário da Yuzu"
2856573316-DescriptionJp = "A sala de lazer reclusa e santuário pessoal intransponível que é reduto da presidente emérita, a Yuzu. À primeira vista a premissa que ecoa pela cabeça de quem vê aquilo é seu claustro limitante e hermeticamente lacrado, mas não se deixem enganar pelas aparências, é uma base provida de iguarias gastronômicas e badulaques midiáticos que rendem ao seu habitante mais de 24 horas ininterruptas de relaxamento recluso a portas e abafadores cerrados."
4243041319-NameJp = "Estante de Aço para Inventário"
4243041319-DescriptionJp = "A despensa monumental preenchida com consoles obsoletos empoeirados e catálogos acadêmicos das raízes esquecidas na história do software. Oculto na estante é dito estar sob a guarda uma mercadoria da edição de colecionador esgotada em todo o continente da prestigiada saga 'Tales Saga Chronicle'."
598899268-NameJp = "Vaso de Plantas Suculentas"
598899268-DescriptionJp = "O recanto botânico montado para adornar com majestosidade um estaleiro de plantas cultivadas pela afeição de uma dona cautelosa e paciente."
4115473127-NameJp = "Eleph da Eimi (Combate)"
4115473127-DescriptionJp = "Eleph repleto do místico da Eimi (Combate)."
3981165349-NameJp = "Eleph da Yuzu (Combate)"
3981165349-DescriptionJp = "Eleph repleto do místico da Yuzu (Combate)."
1519253525-NameJp = "Eleph da Koyuki (Pijama)"
1519253525-DescriptionJp = "Eleph repleto do místico da Koyuki (Pijama)."
4209113555-NameJp = "Cotidiano do Clube de Desenvolvimento de Jogos"
4209113555-DescriptionJp = "Retalhos do cotidiano do Clube de Desenvolvimento de Jogos.\nO que muitos pensam ser só rotina, pode ser algo verdadeiramente esplêndido e fora do normal para outros."
3750481687-NameJp = "Mesa Versátil"
3750481687-DescriptionJp = "Uma mesa versátil que atende perfeitamente os requintes tanto de uma mesa de jantar, quanto para uma comissão redonda na qual os projetos da rodada vêm em pauta."
25273343-NameJp = "Zona de Jogatina da Madrugada"
25273343-DescriptionJp = "O reduto na qual enfileiram-se brinquedos esparramados e doces servidos no capricho. Com o entardecer do Sol banindo suas graças sobre a morada e abrindo alas às longas noites da maratona da madrugada, esse tapete abraça um encanto na qual os donos montam seu espetáculo temático."
3814256011-NameJp = "Epílogo (2)"
3814256011-DescriptionJp = "Conclua o Capítulo 3, Episódio 26 de Decagrammaton, Parte 1"
2296406049-NameJp = "Decagrammaton Concluído"
2296406049-DescriptionJp = "Conclua o Capítulo 3, Episódio 24 de Decagrammaton, Parte 1"
559083068-NameJp = "Batalha Decisiva DECAGRAMMATON"
559083068-DescriptionJp = "Pode ser obtido no evento Batalha Decisiva DECAGRAMMATON"
1662125760-NameJp = "A Grande Missão de Limpeza do Clube de Desenvolvimento de Jogos!"
1662125760-DescriptionJp = "Pode ser obtido no evento A Grande Missão de Limpeza do Clube de Desenvolvimento de Jogos!"
1094002594-NameJp = "Os Três Tesouros Sagrados do Beisebol em Chocolate"
1094002594-DescriptionJp = "Luva, taco e bola. Tendo esses três itens em mãos, você não dependerá de amarras sociais para convidar as massas e formar campeonatos num piscar de olhos. Isso dizem os antigos. E para emoldurar esse sentimento por completo dentro dos limiares confeitados de uma obra de cacau tridimensional... não tenho sombra de dúvida de que um oceano de emoções está por trás da moldura."
506164489-NameJp = "Bolinhas de Chocolate Superinéditas!!"
506164489-DescriptionJp = "Um lote fumegante, recém-saído do forno de novidades que a Hikari deixou contigo debaixo dos tapetes. A gula berrava das entranhas suplicando por ceder, e debaixo dos panos ela preferiu abrir mão em seu favor num ato que exige coragem."
1272169695-NameJp = "Gelatina Revigorante"
1272169695-DescriptionJp = "Uma gelatina vitaminada de valor nutricional colossal. Pela rotina sufocante de operações a fio, de cara não há opção que cubra o vazio melhor que ofertar a ele os suprimentos corretos."
1649572559-NameJp = "Envelope e Bilhete Amassados"
1649572559-DescriptionJp = "Alojados sob a capa corrugada e mal-acabada de um embrulho rudimentar de postagens, acha-se uma iguaria de chocolate processada das linhas de montagem industrial. Para a missiva que acompanha esse ato de solidariedade culinário... qual o peso retórico das juras que ecoam nas letras contorcidas?"
3907944625-NameJp = "Donzela Branca"
3907944625-DescriptionJp = "Biscoitos esburacados pincelados à base de chocolate despachados a fio pelas rotas mercantis que convergem nos feudos de Hyakkiyako fabricados num vilarejo recluso. A fina estampa da blindagem à base de cacau imaculadamente esbranquiçada é um achado raro. De relance é um show à parte, o calcanhar de Aquiles no entanto aponta ser de fácil avaria e mãos cheias de borrões em menos de segundos."
950107355-NameJp = "Caixa de Chocolates Artesanais"
950107355-DescriptionJp = "Uma peça emoldurada sob a custódia pesada dos laços da alta nobreza. Ladeada pelo estofado do berço na qual é entregue, acomoda-se o exílio de uma singela lasca achocolatada cunhada através de meios artesanais orgânicos. Numa minoria solitária se destaca a face do cacau, no qual os pormenores endiabrados que permeiam no intelecto lúdico da Niya marcam sua aura."
2522956263-NameJp = "Chocolate com Poder Mágico (?)"
2522956263-DescriptionJp = "Um doce recheado no qual reside, sob juramento de Eri, uma concentração latente atestada em magia na sua forma bruta. Uma mordiscada na estampa e não demora muito para que os resquícios enérgicos invadam com brutalidade as sinapses da consciência que o absorve e toma posse vital."
3646064924-NameJp = "Muffin de Fantasma"
3646064924-DescriptionJp = "Coroado pelo enfeite açucarado de feições macabras diminutas por cima. Um olhar profundo na constituição desse pãozinho e os tímpanos captam num relance os gracejos ruidosos ressoando em tom imperceptível aos moldes das laringes ativas da Kanoe..."
1600461265-NameJp = "Tiramisu Literário"
1600461265-DescriptionJp = "Tiramisu de dar água na boca cujo requinte aflora das câmaras frigoríficas. Num embate argumentativo orquestrado perante os ditames frígidos e gélidos do motor de uma geladeira de canto, os sussurros dessa roda perdem não obstante contra a doçura letal no enquadramento romântico."
788496083-NameJp = "Quebra-queixo de Chocolate Gigante"
788496083-DescriptionJp = "A base dos princípios fundacionais que estruturam esse bloco rochoso impõe as dentadas firmes no desfrute doce. Com o manejo contínuo desse orbe pelos rincões na cavidade bucal, os contornos que transbordam da resina saborosa trazem luzes à tona."
2100977290-NameJp = "Estátua de Chocolate"
2100977290-DescriptionJp = "Um colosso colossal que transpassa na majestosidade as barreiras intransponíveis das baixas variações calóricas ambientais, a não obstante estética excede nos requisitos divinos de um museu. Na margem isolada atada pela proibição perpétua que rege as leis do bom senso gastronômico (pois comer isso é suicídio estético num palácio gélido do desbunde do achocolatado), é um espetáculo irrepreensível livre de arestas contorcidas ou falhas estruturais, a obra imaculada no auge das epopeias do chocolate num reino à sua parte em um planeta remoto."
2647895027-NameJp = "Chocolate com Picote"
2647895027-DescriptionJp = "Uma amostra avassaladora produzida com excelência numa fôrma em que os veios dos caprichos instigam as almas obcecadas pelo colecionismo numa feira mundana qualquer."
1217736606-NameJp = "Biscoito Merengue de Chocolate"
1217736606-DescriptionJp = "A arquitetura de um pão assado originada através de bases de agitação molecular de claras de ovo injetando colunas de sacarose em profusão contínua com poeiras de cacau, e por consequência, o milagre que desabrocha no fogo alto sob as estufas acalentadas de fornos da linha de montagem com um estopim inusitado.\nA maestria nos arranjos da culinária dita o prumo perante os estragos ineficientes."
165942245-NameJp = "Kartoshka"
165942245-DescriptionJp = "Um empório recheado e construído com os laços primordiais da cana espremida e da resina doce, canela e as leveduras do trigo na base, forjada sem delongas na confecção de um bolo achocolatado denso num bloco com as nuances e facetas de uma trufa imponente num balcão envelhecido.\nAos olhos imensuráveis de uma eternidade qualquer, para qualquer ente desamparado na história remota, tudo resplandece nas probabilidades absolutas dos infinitos num mundo à mercê das reviravoltas cósmicas no silêncio do crepúsculo da juventude num limiar distante da esperança."
1366975366-NameJp = "Medovik de Chocolate"
1366975366-DescriptionJp = "Uma camada assombrosa de blocos do achocolatado recheada numa torre de argamassa doce à base de cremes e pólen da fauna numa estante de iguarias.\nÉ de vital importância frisar em reuniões nas quais papéis burocráticos imperam, a necessidade latente do bom uso das métricas do debate nas mesas de discussões antes da firma da caneta final perante juízes rígidos num fórum conturbado."
4174179093-NameJp = "Chocolate de Mercado (?)"
4174179093-DescriptionJp = "Um doce plebeu enfiado goela abaixo alegando se amparar pelos códigos de defesa monetários originados nos becos varejistas da metrópole das grandes bancadas impulsionadas pelos trocados no balcão avulso.\nSejamos pragmáticos na ocasião, ignorar o abismo gritante diante dos absurdos expostos que assombram as fendas lógicas num jogo de luz e espelhos retóricos também exprime as benesses das artes teatrais numa situação extrema de convívio social para zelar a paz mútua e resguardar laços fraternos."
799234819-NameJp = "Pacote de Presentes Mensal"
799234819-DescriptionJp = "Um conjunto que inclui Piroxênios e presentes para as alunas.\nNo momento da compra, você ganhará Piroxênios x668 (600 pagos + 68 gratuitos de bônus).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
3878474224-NameJp = "Pacote de Fabricação Mensal"
3878474224-DescriptionJp = "Um conjunto de produtos contendo Piroxênios e itens necessários para fabricação.\nNo momento da compra, você ganhará Piroxênios x908 (800 pagos + 108 gratuitos de bônus).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
40553493-NameJp = "Pacote de Aprimoramento de Arma Única"
40553493-DescriptionJp = "Um conjunto de produtos contendo Piroxênios e itens úteis para fortalecer a Arma Única.\nNo momento da compra, você ganhará Piroxênios x1375 (1200 pagos + 175 gratuitos de bônus).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
678989742-NameJp = "Pacote de Crescimento da Millennium"
678989742-DescriptionJp = "Um pacote contendo itens essenciais para o crescimento das alunas da Millennium junto com Piroxênios.\nNo momento da compra, você ganhará Piroxênios x400 (gratuitos de bônus).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
2523477884-NameJp = "Pacote de Seleção de Elephs (Aluna ★3 do Recrutamento Normal)"
2523477884-DescriptionJp = "Um produto que permite selecionar e adquirir Elephs de uma aluna ★3.\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo.\n※Apenas alunas ★3 que você já recrutou poderão ser selecionadas.\n※Alunas limitadas, de colaboração e de aniversário não são elegíveis."
1697554114-NameJp = "Pacote de Projetos de Equipamento"
1697554114-DescriptionJp = "Um conjunto de produtos contendo Piroxênios e itens necessários para evoluir equipamentos.\nNo momento da compra, você ganhará Piroxênios x1375 (1200 pagos + 175 gratuitos de bônus).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
3388126660-NameJp = "Pacote de Relatórios 【Especial】"
3388126660-DescriptionJp = "Um conjunto com Piroxênios e itens valiosos para o ganho de experiência das alunas.\nNo momento da compra, você ganhará Piroxênios x800 (800 pagos).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
3376379656-NameJp = "Bilhete de 10 Recrutamentos"
3376379656-DescriptionJp = "Um bilhete que permite realizar 10 recrutamentos. ※Se não for utilizado até 25 de Março de 2026 às 11:00, este bilhete irá desaparecer."
1119414272-NameJp = "Sinal de Campo"
1119414272-DescriptionJp = "Vestígios encontrados pela Unidade de Investigação X. Reúna as pistas para alcançar a verdade absoluta."
3083733858-NameJp = "Revista Misteriosa"
3083733858-DescriptionJp = "Uma revista recheada de teorias da conspiração de fontes totalmente duvidosas. Você é livre para lê-la, mas acreditar cegamente em tudo que está lá é burrice."
795610129-NameJp = "Produto de Saúde Misterioso"
795610129-DescriptionJp = "Uma pulseira supostamente feita de germânio. Dizem que faz bem para a saúde, mas..."
342194746-NameJp = "Amuleto Misterioso"
342194746-DescriptionJp = "Um amuleto para garantir uma direção segura. Curiosamente, dizem que ao colá-lo no carro, coisas boas acontecem enquanto você dirige."
