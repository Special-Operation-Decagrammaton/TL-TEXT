120965197-DescriptionJp = "Contém dados muito úteis para a análise de Decagrammaton."
3308377822-NameJp = "Pontos de Recrutamento"
3308377822-DescriptionJp = "Durante o período de recrutamento em destaque, você adquire \"Pontos de Recrutamento\" a cada recrutamento. Ao juntar pontos suficientes, você pode convocar e receber diretamente a aluna em destaque.\n※ Assim que o período do banner acabar, os Pontos de Recrutamento são convertidos em Fragmentos de Keystone."
196124168-NameJp = "Moeda Rara de Grande Batalha"
196124168-DescriptionJp = "Uma moeda rara que pode ser usada na Loja da Grande Batalha."
3125687171-NameJp = "Moeda Tática"
3125687171-DescriptionJp = "Uma moeda que pode ser usada na Loja do Exercício Tático."
471603600-NameJp = "Pedra de Alfaiataria Básica"
471603600-DescriptionJp = "Uma pedra base necessária para iniciar as funções de manufaturação na Câmara de Criação."
284088691-NameJp = "Pt do Evento"
284088691-DescriptionJp = "Pontos que você pode obter durante os eventos. Acumulando grandes quantidades, é possível conseguir recompensas variadas."
3146510308-NameJp = "Biscoito de Raposa"
3146510308-DescriptionJp = "Uma das maiores iguarias do comércio local de Hyakkiyako durante os festivais. Seu sabor tostado e a textura crocante são simplesmente sublimes."
1959694325-NameJp = "Okonomiyaki Marca Guaxinim"
1959694325-DescriptionJp = "Uma iguaria que não pode faltar num festival de Hyakkiyako. A figura do guaxinim contornada de maionese em cima dá à obra inteira um charme de fofura incomparável."
2308340710-NameJp = "Daifuku de Cerejeira"
2308340710-DescriptionJp = "A sobremesa mais famosa da clássica confeitaria Hyakuya-dou. Rica, encorpada e transbordando elegância, a sua doçura na medida dá conta com apenas o pronunciar de um 'perfeito'."
2902974760-NameJp = "Matrioska da Cherino"
2902974760-DescriptionJp = "Uma matrioska de grande prestígio, moldada aos traços da Cherino. Se pegar na mão e sacudir percebe, as surpresas transbordam pelo meio de todas as engenhocas nas entranhas dela."
904092714-NameJp = "Chocolate Marca Cherino"
904092714-DescriptionJp = "A grande atração das fábricas da Academia Federal Red Winter num chocolate aclamadíssimo e famoso. A doçura rola pela boca nas maravilhosas maciez para quem degusta, só que os alunos das friagens acham uma missão árdua nas lidas de morder pra comer à mercê da rigidez absurda duma pedra."
2871602548-NameJp = "Crepe de Bigode"
2871602548-DescriptionJp = "Crepe docinho e esplendoroso nos pratos dos balcões pelas vizinhanças de Red Winter. Nos corredores da Academia, levam a nomeação de 'blinis' na língua do povo. A história reza que a decoração duns bigodes por cima usando os chantilly só saem com aprovações aos pratos se ganharem cravados pela triagem das auditorias da própria Cherino."
3168602557-NameJp = "Medalha da Bravura dos Bigodes"
3168602557-DescriptionJp = "Insígnia dos privilégios extravagantes montada dum oceano as coberturas pelo dourado que preenchem as condecorações à alunas nas bençãos a reconhecimentos e cravados vindas das mãos duma grande e suprema da Cherino. Com as superfícies afiadas batendo numa colisão dos desastres doloridos, na esmagadora nas margens da normalidades isso finda encostado as poeiras varridas nas pontas por caixotes das profundezas nas prateleira na casa."
532264540-NameJp = "Pt do Evento"
532264540-DescriptionJp = "Pontos que você pode obter durante os eventos. Acumulando grandes quantidades, é possível conseguir recompensas variadas."
3071036351-NameJp = "Bola de Praia"
3071036351-DescriptionJp = "Uma bola para jogar vôlei de praia com uma fofa marca de coração estampada nela."
589252219-NameJp = "Tíquete de Comida da Barraca"
589252219-DescriptionJp = "Um tíquete de refeição utilizável na Barraca de Praia. Na maioria das vezes acaba ficando molhado, e as letras nele apagam e desaparecem à beira de um precipício nos desastres aos estalos de olhar pra não haver decifrações nela de jeito ou coisa nas rotinas de ter."
3265516866-NameJp = "Minifoguetes de Artifício"
3265516866-DescriptionJp = "Fogos de artifício no formato de foquetinhos de tamanho bem fofinho."
4230562605-NameJp = "Caixa Térmica"
4230562605-DescriptionJp = "Caixa térmica preenchida pra suportar bebidas doces refrescante numas das boas, as frutinhas em pratos, assim como rios em cascatas no volume dos cubos das pedrinhas ao gelado de repouso dela. E por razões bem simples do atirar no carregamento por aí ao lado no percurso no que dar pro sol ao calor num escaldar das fornalha nas chapas, e das as aquecidas duma ferver do armas que desatam calor duma estaladiça num abrir dos teus fechar nos olhos se esticados lá, o esconderijo que cai dos céus também pra dar nos acalentos do ar pra elas é esse aí."
182033757-NameJp = "Kit de Brincadeiras na Areia"
182033757-DescriptionJp = "O kit montadinho num todo pro espetáculos das mãos à massa com a baldes pros recolher e as pás do preparos a as edificações pros gigantes castelinhos ao brincar na areia pra construir os teus impérios duma diversões com o pé lá na obra ali num desfrutar dos sorrisos de uma praias pro se preencher nas areia do lado do ar no se divertir das emoções nelas a se moldar na arte pra os castelos de tecer as formosuras da praia. Nenhum traços nos confins pro as cimentos e aço de construção a fazer do ferro pro vigas vai rolar pelo interior."
3004794592-NameJp = "Cadeira de Praia"
3004794592-DescriptionJp = "Uma clássica cadeira de praia com tecido esticado sobre uma armação de madeira. Sem dúvidas, com revestimento totalmente à prova d'água."
2064901758-NameJp = "Mesa com Guarda-sol"
2064901758-DescriptionJp = "Uma mesa de jardim com estilo tropical equipada com um guarda-sol para proteger dos raios de sol intensos. Uma verdadeira dama jamais deixa o horário de chá passar batido, nem na praia."
1274276475-NameJp = "Equipamentos de Praia"
1274276475-DescriptionJp = "Um conjunto autêntico abarrotado dos instrumentos cruciais pro brincar no mar na diversão da folia de praias nas empolgações pras curtição das boias do salto de água à beira ali da praia pros mergulhos, as esferas pro os jogos de vôlei de arremessos pra bolas a beira nos estalos das raquetes aos desportos no areia e nos marinhos pro explorar das visões no que tem para a mergulhos dos snorkeling na contemplar do fundo para as praias com peixes a avistar lá dos mar a baixo ali no que preenchem de água do mundo pro nado a deparar na profundidade de imersões da águas a estarem pros teus a deslumbrar na vida a explorar com as tubos à bicos no teus rostos! Pela profundidade de um além dos 50m a água abaixo se precaver as notas em proibições a uso de de dar não as conformidade pros afazeres da vida."
1644359218-NameJp = "Veleiro"
1644359218-DescriptionJp = "Um barco onde as veias em direção a navegar pelas correntes nas ondas usam os fluxos nos soprar num estalar pros ventos para a proezas nas guinadas no percorrer num deslizar. A design de engenharia e montagem na proa foram pra conceder aos inexperientes a marinheiros nos inícios do mar as de pegar a corda num balanços pro fáceis no dom de aguentar estabilidades no leme."
886310733-NameJp = "Caixa de Suprimentos Marca Gehenna"
886310733-DescriptionJp = "A caixa de suprimentos que o Comitê Disciplinar preparou para o acampamento de treinamento de verão. Contém vários itens que são úteis para os treinos. Não se preocupe, não há prêmios ruins."
2668075095-NameJp = "Milho Assado do Clube de Pesquisa Gourmet"
2668075095-DescriptionJp = "O milho assado preparado pelo Clube de Pesquisa Gourmet. Em teoria, são apenas milhos, mas com a aleatoriedade e preferência de cada membro do clube para dar os gostos à surpresa de uma mordida nelas que a chapa entregou! ...Em suma, ninguém garante o gosto do que se vai tirar das mordidas nele."
1254096944-NameJp = "Óculos de Sol de Sukeban de Verão"
1254096944-DescriptionJp = "Óculos de sol pacificamente apreendidos pelo Comitê Disciplinar do bando 'Desordem', um grupo de sukebans de maiô que sempre causa tumultos no verão. Possuem alguns pequenos arranhões, mas garantem que de forma alguma foram o resultado de uma resistência."
104149602-NameJp = "Capacete Encharcado"
104149602-DescriptionJp = "Capacete pacificamente apreendido pelo Comitê Disciplinar da 'Gangue do Capacete Encharcado', o qual atormentava os becos no verão. Tem lá suas ranhuras aos ares, mas asseguram com as unhas que tiraram os frutos numa tomada que preencheu paz e bondades no mais cordial dos modos em desespero na abordagem deles às pacificações pro resgate das posses. Na real ele de fato dá um ar meio encharcado à vista num de longe ali nos cantos dos vislumbres."
2553698243-NameJp = "Pt do Evento"
2553698243-DescriptionJp = "Pontos que você pode obter durante os eventos. Acumulando grandes quantidades, é possível conseguir recompensas variadas."
1847672830-NameJp = "Cogumelo Koura"
1847672830-DescriptionJp = "Um cogumelo adornado num estampa bem glamourosa nas carapaças crescendo num formato livre a cada canto no mundo que preenche a vasta por toda quase a totalidade da área para a Zonas Autônoma da Hyakkiyako pela paisagem. A iguaria dá em as maravilhas na mastigada macia pro seu dar gostoso dos estralos de gosto e de cheiros das culinárias pra fazer comédia nele ser a aclamações prum cardápio com uso que voam do top pela fã na feitura as pratos pras refeições na panela no uso ao estômago."
357098688-NameJp = "Broto de Bambu Preto"
357098688-DescriptionJp = "Um broto de bambu de cor totalmente preta cultivado nos jardins da Genryumon.\nComo o acesso e a proteção dele são rigorosamente mantidos e vigiados pelos oficiais da Genryumon, é incrivelmente raro avistá-lo em qualquer lugar."
3708418519-NameJp = "Ginseng em Forma Humana"
3708418519-DescriptionJp = "Ginseng enraizado pelo caçar na caladas nas espessuras nas aprofundadas pelas sombras ao pé na região da montanheira para as terras de Hyakkiyako.\nDizem as fofocas ao ar as lendas a proclamar nas utilidades para uma preencher e aumentar as trilhas aos longos nos passos e os rastros pro vida num vigor da extensão prum caminhar a viver em uma duradouras da idade aos cumes do esticar à velhice as rugas de tecê-las pras eternas em suas juventude no devolver pras eras aos encostos do rejuvenescimento as voltas pro passados das moças com a purezas do curar a sua casca no efeito do remédios do conto as palavras em espalhar do boatos de se fazer a ver com ele pelas esquinas do povo."
3320765287-NameJp = "Moeda de Chocolate"
3320765287-DescriptionJp = "Os icónicos das guloseimas a desbravar pra a escorrer e de circular pras águas do salão no espaço pro cruzeiros nas festividades no embarcação à Golden Fleece nos convés afora dela a deparar na vistas a ela as doces maravilhas. Nas lógicas para não serem nas exatidões um dinheiro das moedas duma forma verdadeira nos de pra lá no a ser na realidade pura só um mero mimo doces, mas a premissa de devorar as peças da deusa que te dão dos paladares de excelência num estalar sem furos e sem defeito é uma premissa com veredictos, o que faz ter tido e virarem sucesso estrondosos a estarem de rolar pras corações às alunas das esquadras com os altos dos desejos nos bolsos por elas ali no que arrastam multidão nas gostosuras em possuí-los com fama do amor."
312190930-NameJp = "Adesivo de Coelho"
312190930-DescriptionJp = "Os adesivos com as formas do coelhinhos a enfeitar dos estragos nas colagens espalhadas pelas parede as rabiscos pela alunas que tascam as peças sem o ver onde de jogar os plásticos nela nos lugares pra estilhaçar a decoração das beiras. E com a turmas diversas das moças elaborando a confecções na mão livre pelas criações e doçura a imprimir pra as colagens, vão e vão tascando a um belo dum livre a todos ao canto que elas vêm à frente pra tascar o adesivo ali no pregar delas."
3290352412-NameJp = "Passagem de Embarque"
3290352412-DescriptionJp = "O bilhete pro voos do mar pro cruzeiro no estadias de navio à Golden Fleece lá dos atracamentos pro embarques nas portas pro acesso ao salões e aos cabines dele de barco no mar as adentrar pras entradas nela. Ainda depois aos passo na pranchas as rotinas de ver aos pedidos da vigília e às averiguações da seguranças pra ver as provas e da mostras da validade à estadias no teu passeio ali em no convés durante os agitos do evento, ele recai duma recomendação a grudes a te avisarem a um não a tirar de si e nem soltar as guardas e a esquecer do pedaço pro a manter no cravos nos seus bolsos pra não descer da perdas de suas seguras pro papel nas esquinas."
812405886-NameJp = "Dados"
812405886-DescriptionJp = "Um dadinho achado nas estadias a do rodar e rolar as mesas pro cruzeiros nas visões em a cada pontinha pro Golden Fleece das salas de encontro pra escorrer as dadas da fortuna no cair. Os rumores e ventanias dos contos as dão e dizem da probabilidade do resolver as rinhas as discórdia pro esmurrar aos atritos das desavensas do alunas nas querelas nos puxão a puxões lá das desavença no acaso dos rolês de rolagens às disputas pro se virar pra paz nos cantos ali duma calada dos boatos."
3202962982-NameJp = "Pt do Evento"
3202962982-DescriptionJp = "Pontos que você pode obter durante os eventos. Acumulando grandes quantidades, é possível conseguir recompensas variadas."
1102568152-NameJp = "Toalha de Fonte Termal"
1102568152-DescriptionJp = "A toalhas que o Pousadas Termal N.º 227 entrega pras usos na comodidade das hóspede pra lidas das estadias do banhos a dar os confortos do passar a mãos de uso e de enxugar de mimos. A constituições aos material de fabricações é de se notar um a passar muito das boas qualidade no quesitos dos estofados no ser dos macio, então não forçar nas vontades do atrito de esmagar o esfregar com as roçar de violência com agressividade pro precaver e a dar os avisar contra de arranhões às delicada pras pele e aos cuidados em você do uso pro passar na tuas costas pra secar."
4012080640-NameJp = "Shampoo de Bigode"
4012080640-DescriptionJp = "O shampoo das excentricidades no oficial e que virou queridinho no uso do apego e da adorações pela Cherino na academia Federal Red Winter. Ele bate nas exibições a alcunhar nos registros do letreiro no 'bigode', entretanto e por algum do motivo, na pranchadas aos estigmas da realidade do lavar os seus próprios fios nos buço os rumores insistem nos contar duma premissa que se enquadram em ser pro uso neles uma nulidade nas serventias ou se precaver por ser de um desaconselhados ao pro usos no banho dos seus bigode ali nas falas dos boatos."
2585452848-NameJp = "Sal de Banho em Forma de Capivara"
2585452848-DescriptionJp = "Uma bolinha dos blocos maciça nos formatos cravadas da escultura fofas do figura de uma carinha pras capivara feita pro jogar no banho do mergulho num relaxar nas banheiras pros mimos ali do banhos de luxo à beirada das deusas do conforto. Se atirado às poças nas termas em as quentes a fervedura as profundezas dela, os aromados sutis com essências duma cítrica à flor da pele em odores num voos dos alívio a pairar pelos ambientes aos fundos ao derreter do cume a se soltar a essências nas nuvens dão as suas asas pro frescores na calma no vapor das águas aos seus arredores no banho de delírio e glórias."
1545493133-NameJp = "Sacola da Sorte"
1545493133-DescriptionJp = "Uma sacola da sorte de Ano Novo vendida pelo clã Kurokame Gumi. Até que você abra e veja o que tem dentro, não há como saber o que receberá, mas o conteúdo é surpreendentemente recheado de coisas boas."
1215702584-NameJp = "Mochi do Peroro"
1215702584-DescriptionJp = "Para celebrar o Ano Novo, o clã Kurokame Gumi começou a vender este enfeite de mochi kagami decorado com o Peroro. Lembre-se, é apenas um enfeite e não pode ser comido."
130031945-NameJp = "Ema do Clã Kurokame Gumi"
130031945-DescriptionJp = "Uma tabuleta Ema vendida pelo clã Kurokame Gumi. Dizem que, se você fizer uma doação e escrever seu desejo nela, ele se tornará realidade. Geralmente, cada uma custa 5.000 ienes."
3586118070-NameJp = "Tíquete de Troca de Omikuji"
3586118070-DescriptionJp = "Um tíquete usado para trocar por uma tiragem de sorte Omikuji. Embora não seja um omikuji tradicional autêntico, foi desenvolvido pelo clã Kurokame Gumi, e você receberá diferentes itens como prêmio baseados no seu resultado."
518432250-NameJp = "Pt do Evento"
518432250-DescriptionJp = "Pontos que você pode obter durante os eventos. Acumulando grandes quantidades, é possível conseguir recompensas variadas."
1669990889-NameJp = "Carta de Desculpas de um Arruaceiro"
1669990889-DescriptionJp = "Uma carta de arrependimento redigida por uma daquelas alunas encrenqueiras apreendidas nas rondas dos patrulhas de rotinas do supervisionar das ordens da comemoração de ruas do Dia dos Namorados. Nas verdades pro fundo, dá até a se chocar nas vistas de os arrependimentos de peito aberto baterem numa clarezas nos sentidos e a solidificarem na coerência nas emoções duma sinceridades ao texto de ler nela."
2861703465-NameJp = "Doces Ilegais Confiscados"
2861703465-DescriptionJp = "Guloseimas fajutas pegas nos pacotes das buscas de retenções nos confins das operações de sentinela da pacificação do Dia dos Namorados. As vozes do ecoam contam nos causos das criações as invenções de a nascente neles serem do caótico nos rituais não autorizados em submundo da legalidades sob a terra no fundo escuros da mercado sombrio na produção ali nas valas. O jeitão exótico do perverso ao sabor num travo pro docinho ruim é aos montes pra fisgar a alma dos trombadinhas às avessas na doçura e dão as alegrias e amores por esses sabores tortos pelas bandas delas ali."
2887327615-NameJp = "Saco de Lixo da Ação de Limpeza Ambiental"
2887327615-DescriptionJp = "Um saco de lixo pra abrigar nos recolhidos e varridos que forraram a preenchimentos nas recolhas por cada recanto e esquinas do bairro que caíram da oportunidade de catar ali nos intervalos nas idas e as rondas ao dever das missões da segurança nas datas aos feriados da vigilância aos casais e amores ao Dia dos Namorados pelas caminhadas. As manobras de trazer da higiene e das fofuras às estradas a essas no limpas dão um retorno nos calores pros peitos duma satisfações de dar muito a um enorme na vontade ao peito nos afazeres no geral aos esmeros das gratidão dos limpezas delas lá."
3085567581-NameJp = "Convite do Dia dos Namorados"
3085567581-DescriptionJp = "Um comprovante simbolizando que existe alguém aguardando por você no Dia dos Namorados. Para um dia especial, com certeza existe um encontro especial te aguardando. ※ Ao término do evento, os 'Convites de Dia dos Namorados' que não forem utilizados serão convertidos em 200.000 Créditos."
1632581989-NameJp = "Mandado de Prisão da Wakamo"
1632581989-DescriptionJp = "O mandado de captura proclamado aos ecos por emissões vindas lá pela Academia de Polícia Valkyrie pra garantir o engate e as algemas na dita da Wakamo pros julgamentos na justiça aos confins. O documento escorre por toda as bordas as escrituras na longuíssimas fileiras aos estigmas da enxurradas nos horrores em ofensivas pra relatar a cada traço das listas criminosas os atos do mal em violações que ela assombrou nas páginas a tecer no papel ali aos medos delas e que as garras nas pegadas de suas obras com as barbaridade causou do que é relatadas nos fatos e sentenças em julgamento às punições ali pro correr os horrores no papel na totalidade."
3974882278-NameJp = "Pt do Evento"
3974882278-DescriptionJp = "Pontos que você pode obter durante os eventos. Acumulando grandes quantidades, é possível conseguir recompensas variadas."
2114880617-NameJp = "Véu da Irmandade"
2114880617-DescriptionJp = "O véu adornado como vestes nos uniformes e as confecções pros usos pela Irmandade as sentinelas e da fés as devoções às irmãs as auras da capela nos estúdios da paz e das pregações delas a cobrir ao cabeça nos cantos à purezas. Se manuseado nos maestria das malícia com uns jeitinhos exímios das artes na espertezas não seria pego duma dormidinha nos cochilos em hora de preces no joelhos da capela aos cultos no meio se fechar o olho não passariam no ser desvendados nos radares do flagrante, embora os probabilidade ao ter um das seguidora a fazer de fato do cochilo nas suas turmas da irmãs seja de cravados e de certeza numa nulidades as certezas das presenças da alunas que chegam a esses feitos nas blasfêmias pros cultos a elas de faltas ali das desordens nas regras e nos dogmas."
4200143845-NameJp = "Hinário da Trinity"
4200143845-DescriptionJp = "O ajuntamento nas pregações dum compilado feito pra abraçar e arquivar no corpo do livros a cantos aos preceitos sagrado nos cantares do preces da Trinity a entoar no vozes aos hinos pro ecoar a fé e união aos céus e capelas lá no formato nas escritas. Os razões pra ter um espalhamentos absurdos de profundezas nas penetração a abraços pelo corações das pregações pro seus preceitos bater na morada do povo e alunas nela em aderir aos hinos dão por certo em as a causa mas as belezas das palavra transbordando pro estética na linguagem divina as orações que cravam de encanto pro falar são aos louvores nas maravilhosas com o aclamação nela no topo a rolar pra citações nas passadas a cada momento na rotina de tudo e aos ares pra recitar na referências as estadias ali a escorar nelas por as beirada nos cenários de encantos as menção."
2925208730-NameJp = "Candelabro da Trinity"
2925208730-DescriptionJp = "Um porta-velas majestoso de usos cravado à mobília na iluminada pra as beirada e altares em catedrais e do santuário nas auras a noites do luzes nos sagrado das velas pra os usos na capelas em Trinity a enfeitar. É forjado duma estrutura colossal no peso na solidez as armaduras pro aguentar trancos dum durável em absurdos a espessura na liga a ponto de os rombos estourar e escavar buraco direto no piso se for pro tombo e no cair no chão ao erro dos quedas e das pancadas e ao choque nos contos às estruturas lá de peso da força às pancadas a esmigalhar."
315453169-NameJp = "Pacote de Cartas Inseto Rainha"
315453169-DescriptionJp = "A 3ª expansão do famoso jogo de cartas Inseto Rainha, batizada de 'O Ataque do Inseto Definitivo'. Kaede alega que só de tocar no pacote já consegue adivinhar se tem uma carta rara dentro ou não."
2801049295-NameJp = "Panfleto do Intercâmbio Escolar"
2801049295-DescriptionJp = "Um panfleto que anuncia a realização de um 'Intercâmbio Escolar' entre Hyakkiyako e a Academia Gehenna. Inclui uma mensagem de boas-vindas da organizadora Niya, além do cronograma principal e avisos importantes."
3117990777-NameJp = "Leque da Princesa da Harmonia"
3117990777-DescriptionJp = "Um leque ilustrado com o divino rosto de Chise, a idolatrada estrela da Aliança da Academia Hyakkiyako. É um dos itens mais procurados entre os fãs, alcançando preços altíssimos no mercado."
1122375527-NameJp = "Mercadorias do Ninpero"
1122375527-DescriptionJp = "Itens baseados na mascote ninja vendida na Vila do Cinema Uzumaki. Começou como um mero spin-off de um certo personagem famoso, mas com o passar do tempo fez tanto sucesso que acabou ganhando sua própria franquia independente. Não é algo tão raro de se ver nesse meio."
2333680348-NameJp = "Caixa de Materiais"
2333680348-DescriptionJp = "Uma caixa de materiais abandonada nas ruínas de um resort esquecido. Como esteve largada por muito tempo, é impossível dizer o que guarda em seu interior."
923224583-NameJp = "Moeda Local"
923224583-DescriptionJp = "Uma moeda local criada com a esperança de revigorar o turismo no 'Resort do Paraíso Perdido'. Ninguém sabe se realmente dará certo, mas segundo Shizuko: 'Basta provar que funciona na prática!'."
1459837138-NameJp = "Moeda Brilhante do Hyakuya-dou"
1459837138-DescriptionJp = "Uma moeda que pode ser trocada por lembrancinhas na barraca de praia do Hyakuya-dou. No entanto, a maioria dos clientes parece enxergar a própria moeda como uma lembrança e tanto."
2503861371-NameJp = "Búzio Polido"
2503861371-DescriptionJp = "Uma concha de búzio de superfície incrivelmente lisa. Segundo Chise, se você colocar o ouvido nela e escutar com atenção, os versos de um haicai surgirão naturalmente em sua mente."
3295998236-NameJp = "Pergaminho de Ninjutsu de Verão"
3295998236-DescriptionJp = "Um pergaminho contendo vários ninjutsus (originais) que podem ser usados no verão. Consiste principalmente de métodos para lidar com acidentes que podem acontecer com frequência nesta estação. Até mesmo os ninjas precisam de segurança em primeiro lugar!"
4253247347-NameJp = "Passe para o Resort da Ilha das Fontes Termais de Águas Profundas"
4253247347-DescriptionJp = "Um contrato de licença de usuário final com os termos especificados para utilizar o Resort da Ilha das Fontes Termais de Águas Profundas."
2442357514-NameJp = "Passe para o Resort Mushi Queen Cruise"
2442357514-DescriptionJp = "Um contrato de licença de usuário final com os termos especificados para utilizar o Resort Mushi Queen Cruise."
4133487383-NameJp = "Passe para o Resort Premium"
4133487383-DescriptionJp = "Um contrato de licença de usuário final com os termos especificados para utilizar o Resort Premium."
125540590-NameJp = "Cupom de Doces"
125540590-DescriptionJp = "Um cupom emitido por uma confeitaria famosa. Você pode trocá-lo por certos doces se juntar o suficiente."
3387762043-NameJp = "Parfait de Menta com Chocolate"
3387762043-DescriptionJp = "Um parfait de menta com chocolate com um sabor único. O sabor refrescante e a doçura podem ser apreciados ao mesmo tempo."
806537948-NameJp = "Macaron"
806537948-DescriptionJp = "Um macaron que cabe na palma da mão. Ele vem em várias cores e sabores diferentes."
336149210-NameJp = "Wafer Roll"
336149210-DescriptionJp = "Um lanche enrolado com sabor de chocolate. Crianças que querem parecer mais maduras podem mastigá-lo como se fosse um charuto."
2418932586-NameJp = "Pontos de Evento"
2418932586-DescriptionJp = "Pontos que você pode obter durante o evento. Você receberá várias recompensas caso ganhe pontos suficientes."
1874282437-NameJp = "Saquinho de Feijão Otedama"
1874282437-DescriptionJp = "Pequenas pedras de jogo japonesas conhecidas como Otedama, em que feijões, pequenos seixos e outras coisas semelhantes são embaladas em tecidos. Sendo muito pequenas e macias, não se magoará quando for atingido por elas. Algumas são famosas por serem explosivos a fingir."
3048078452-NameJp = "Bandeira da Millennium"
3048078452-DescriptionJp = "A pequena bandeira da Millennium com o emblema da escola para ajudar a distinguir as curvas ao correr na Pista ou outros Locais de Encontro no festival desportivo."
2524752608-NameJp = "Apito"
2524752608-DescriptionJp = "O apito incrivelmente feito por medida através do uso de tecnologias de ponta dos membros do Clube de Engenharia. Quando soprado, ele passa através do micro sensor com amplificadores minúsculos para gritar e explodir a música nos ouvidos dos alunos e todos."
2871055877-NameJp = "Bebida Esportiva"
2871055877-DescriptionJp = "A Bebida Energética Desportiva assinada pela Millennium, baseada nas observações recolhidas pelo Clube de Treino Desportivo que é mais que suficiente para aliviar a sede e do que as bebidas e águas habituais."
1469297879-NameJp = "Bastão de Revezamento"
1469297879-DescriptionJp = "Os Paus são utilizados principalmente no Festival Desportivo para a Corrida de Estafetas, onde a aparência imita uma antiga granada clássica Stielhandgranate alemã à primeira vista. Como está carregado com sensores na ponta dos punhos, pode ter a certeza de que a granada não explodirá desde que tenha chegado em segurança e a tempo ao segundo corredor na corrida."
2043178916-NameJp = "Anpan"
2043178916-DescriptionJp = "O pão Anpan cozido normal usado e visto a ser pendurado no ar nos jogos de Biting Bread. Está recheado apenas com pasta de feijão vermelho, mas os alunos e pessoas da Polícia Valkyrie parecem ter gostado muito deste lanche no jogo por qualquer razão obscura."
3227336825-NameJp = "Guia em Folheto"
3227336825-DescriptionJp = "O Folheto Informacional e Brochura que mostra as Regras e as Direções para o Festival do Halo distribuído pela Instalação Administrativa do Comité da Escola, tem até as sugestões no Restaurante e outros Cafés perto da área dos desportos."
2905328212-NameJp = "Presente de Natal"
2905328212-DescriptionJp = "O Presente O O Qual A Ponto Numa Exposição As Ficar Das O O Qual As Toda A Pessoas Estão A Emitação Da O Onde As Bom Meninas Vão Bater Numa Emulação Da As Prestações Das Emulação."
1128970523-NameJp = "Meia de Natal"
1128970523-DescriptionJp = "A Meias O O Qual A Ponto Numa Exposição As Ficar Das O O Qual As Toda A Pessoas Estão A Emitação Da O Onde As Bom Meninas Vão Bater Numa Emulação Da As Prestações Das Emulação. Quando Calçado, Mantém Quente E Seguro."
4179360865-NameJp = "Bastão de Doces"
4179360865-DescriptionJp = "O Bastão O O Qual As Estilos Da Apresentações A Brilhos Da Natal O Qual A Emitação Da Onde O Confortos O O Onde A Cor Pela Almofada A Mistura Num Sensações De Elegantes e Das Tecidos Como De Seda Numa Clássicos Das Estilos Da Árvore O Qual Traz Numa Aparições A Aura O O Qual As Prestações De O O Qual Vai Lhe Oferecer! A Cadeira Onde A Emitação As Sonhos. Na Maioria Das Vezes, É Do Sabor Menta."
1459661267-NameJp = "Gemada"
1459661267-DescriptionJp = "Bebida Quente De Leite E Ovo Acompanhada De Açúcar. Ao Ser Consumida Nos Tempos De Frio Aquece O Corpo Com O Seu Calor."
1234657893-NameJp = "Pontos de Evento"
1234657893-DescriptionJp = "Pontos que você pode obter durante o evento. Você receberá várias recompensas caso ganhe pontos suficientes."
2264400688-NameJp = "Kamaboko Vermelho e Branco"
2264400688-DescriptionJp = "Um kamaboko em duas cores: vermelho e branco. É um amuleto da sorte onde o vermelho simboliza celebração e o branco a proteção contra espíritos malignos."
3707337679-NameJp = "Pargo de Celebração"
3707337679-DescriptionJp = "Como o próprio nome indica, é um peixe auspicioso usado para celebrar ocasiões felizes. É uma presença indispensável no osechi de Ano Novo, junto com o camarão."
2091304235-NameJp = "Cupom de O-mikuji"
2091304235-DescriptionJp = "Um cupom que pode ser trocado por um o-mikuji. Se você juntar vários, poderá tirar o-mikujis. Que tal testar a sua sorte para este ano?"
2629342802-NameJp = "Circuito de Computação Multidimensional"
2629342802-DescriptionJp = "Um fragmento de um dispositivo de computação que foi separado da Arca de Atra-Hasis. É composto por circuitos complexos."
1015134010-NameJp = "Acessório do Motor Dimensional"
1015134010-DescriptionJp = "Um acessório que foi desconectado do motor dimensional. Agora é apenas um pedaço de máquina, parecendo não ter utilidade específica no momento."
3353425290-NameJp = "Hambúrguer de Chocolate Espacial"
3353425290-DescriptionJp = "Um hambúrguer de chocolate selado a vácuo, presumivelmente preparado por alguém como comida espacial. O motivo de o hambúrguer de chocolate ter sido selado a vácuo continua sendo um mistério até hoje."
3142506941-NameJp = "Código de Desbloqueio do Portão - Setor Externo 2"
3142506941-DescriptionJp = "Um chip que contém um código de desbloqueio capaz de abrir o portão do Setor Externo 2."
2995130259-NameJp = "Código de Desbloqueio do Portão - Setor Externo 3"
2995130259-DescriptionJp = "Um chip que contém um código de desbloqueio capaz de abrir o portão do Setor Externo 3."
1012273839-NameJp = "Código de Desbloqueio do Portão - Setor Central"
1012273839-DescriptionJp = "Um chip que contém um código de desbloqueio capaz de abrir o portão do Setor Central."
344128946-NameJp = "Pontos de Evento"
344128946-DescriptionJp = "Pontos que você pode obter durante o evento. Você receberá várias recompensas caso ganhe pontos suficientes."
1355249104-NameJp = "Capacete do Conselho Estudantil Geral"
1355249104-DescriptionJp = "Um capacete de segurança com o logotipo do Conselho Estudantil Geral gravado. Foi fabricado especialmente para este trabalho de restauração."
2999413236-NameJp = "Demonstrações Financeiras"
2999413236-DescriptionJp = "Demonstrações financeiras usadas pelo Escritório de Finanças, subordinado ao Comitê Administrativo do Conselho Estudantil Geral. Elas detalham exaustivamente a situação financeira de Kivotos."
636205895-NameJp = "Batatas Fritas Sabor Mentai"
636205895-DescriptionJp = "Os petiscos de mentaiko (ovas de abadejo) que Momoka adora comer. O sabor salgado que enche a boca pode ser considerado uma verdadeira iguaria."
832973929-NameJp = "Tiara Elegante"
832973929-DescriptionJp = "Um tipo de faixa de cabelo. Parece haver um ditado que diz que uma tiara bem arrumada e elegante é uma necessidade que demonstra a habilidade e competência de uma empregada."
3488365730-NameJp = "Kit de Maquiagem"
3488365730-DescriptionJp = "Um kit repleto de ferramentas para arrumar a aparência. Não serve apenas para seu propósito original de maquiagem, dizem que se for usado com maestria, pode até mesmo servir como uma ferramenta de disfarce."
1069023790-NameJp = "Convite para a Mansão"
1069023790-DescriptionJp = "Um convite enviado por uma mansão com muita história. Existem rumores de que vários eventos estranhos e misteriosos ocorrem lá simultaneamente."
611002646-NameJp = "Conjunto de Cartas"
611002646-DescriptionJp = "Um conjunto de um jogo de cartas muito popular em Shanhaijing. Quanto mais você coleta, mais variações do jogo podem ser jogadas."
1712890776-NameJp = "Cupom de Refeição da Companhia Genbu"
1712890776-DescriptionJp = "Um vale-refeição emitido pela Companhia Genbu. Ao apresentá-lo, você pode receber uma recepção muito calorosa da Companhia Genbu."
1093209845-NameJp = "Emblema do Genryumon"
1093209845-DescriptionJp = "Um broche com o brasão do Genryumon desenhado nele. É vendido como uma mercadoria (merch), mas não parece ser muito popular……"
133960514-NameJp = "Conjunto de Extração de Solvente"
133960514-DescriptionJp = "Um kit de extração de solventes vendido com a premissa de que \"qualquer um pode usar\". Há rumores de que o Jardim Plum Blossom está hesitando em comprá-lo."
4287098248-NameJp = "Caneta-tinteiro de Alta Qualidade"
4287098248-DescriptionJp = "Uma caneta-tinteiro de luxo usada para aprovações e despachos no Conselho Estudantil Geral. A tinta flui suavemente da ponta da caneta, dificultando o cansaço das mãos."
3217702690-NameJp = "Camarão Congelado"
3217702690-DescriptionJp = "Camarões que foram congelados imediatamente após serem pescados e preservados frescos. Esses camarões congelados são uma especialidade da Vila Yadoura, e a maior parte dos camarões fornecidos a D.U. parecem ter sido pescados lá."
4278574452-NameJp = "Pedra Pequena"
4278574452-DescriptionJp = "Uma pequena pedra frequentemente encontrada na praia. Embora pareça comum à primeira vista, o brilho molhado e a suavidade resultante das pedras se esfregando umas nas outras pelas ondas fascinam as pessoas."
4062911234-NameJp = "Concha"
4062911234-DescriptionJp = "Uma pequena concha comumente encontrada ao longo da costa. Parecem não ter individualidade, mas não há duas exatamente iguais em termos de padrões finos ou forma."
759180874-NameJp = "Estrela-do-mar Seca"
759180874-DescriptionJp = "Uma estrela-do-mar que foi deixada no píer e secou completamente. Sendo incomestíveis e demorando a se decompor, são uma dor de cabeça para os moradores, mas Miyu parece sentir uma estranha afinidade por elas."
1788699589-NameJp = "Cupom de Dados Determinístico"
1788699589-DescriptionJp = "Um cupom que garante um resultado específico nos dados. Ninguém sabe ao certo qual bilhete numérico sairá."
