4265579804-NameJp = "Lustre Grandioso"
4265579804-DescriptionJp = "Basta pendurá-lo para transformar o local em um salão de banquetes. Um lustre grandioso que ostenta um design belíssimo."
3772367627-NameJp = "Fonte Flora"
3772367627-DescriptionJp = "Uma fonte de onde emana o aroma de flores luxuosas. Um perfume refrescante paira no ar."
2266941929-NameJp = "Sofá Clássico"
2266941929-DescriptionJp = "Um sofá que transmite dignidade e elegância ao mesmo tempo. Ao se acomodar em suas almofadas macias, você pode aliviar o cansaço da festa."
