4237037888-NameJp = "Bilhete de Recrutamento Garantido ★3"
4237037888-DescriptionJp = "Um bilhete de recrutamento 10x que garante pelo menos uma aluna ★3. ※ Se não for usado antes da manutenção do dia 21 de maio de 2025, ele desaparecerá."
2792680342-NameJp = "Pacote de Equipamentos η"
2792680342-DescriptionJp = "Um conjunto de produtos recheado e sortido de Piroxênios e dos essenciais primordiais das melhorias. Com ele, se dão as evoluções para as confecções armadas, elevando os potenciais táticos delas.\nComo benefício da compra, leva consigo 800 Piroxênios (pagas) pra juntar e dar faturar ao bolso.\n※ Dê uma sacada nas leituras abaixo onde as exibições expõem todos os bônus aos prêmios na caixa."
4206114637-NameJp = "Pacote de Recrutamento de Aluna ★3"
4206114637-DescriptionJp = "A relíquia nas promoções onde um passaporte a garantias ao estalo das vindas com a aprovações da sorte duma garota almejada do rank de ouro e dos brilhantes de excelência, as queridas alunas ★3!\nAos ganhos de faturar no negócio e botar o pacote pro uso se juntarão nas moedas as riquezas gloriosas com as proporções gigantes do lote total de 1.375 Piroxênios (A fração de 1.200 se alistam como pagas da doação + com os extras nos generosos 175 gratuitas pro alívio).\n※ As explorações aos bônus com todas das relíquias nas estadias se descrevem no exposto abaixo nas exibições ao prêmio."
2077172993-NameJp = "Pacote de Presentes"
2077172993-DescriptionJp = "Um achado esplendoroso aos compradores nas vitrines, abrigando as Piroxênios de riqueza juntas no arranjo e dos presentes pros alentos nas emoções para as tuas entes na bondade. As alunas vão as receber a delírios!\nCom esse faturar dão um saldo positivo aos bolsos nas riquezas e no topo de tecer as glórias dum conjunto da realeza na posse de 800 Piroxênios (pagas) de prontidão a caírem lá pro fundo.\n※ Explore as especificações da bondade nas fileiras no de baixo onde as preciosidades no acúmulo vêm em declaração pra os presentes ali no papel."
2603842906-NameJp = "Pacote de Móveis"
2603842906-DescriptionJp = "As caixas a se empilharem pros ares recheadas das bondades no se abrigar a selecionar as mobiliários em móveis. Pode ter a sua coleção pessoal duma decoração e os charmes duma customização nos espaços.\n※ Mais as lógicas ali pras lidas e averiguações do baquete aos mimos vão ao detalhar logo ali as baixadas nas linhas aos mimos de surpresas lá no preenchimentos dos sumários de entrega a tuas beiradas."
3421749031-NameJp = "Pacote de Desenvolvimento: Trinity"
3421749031-DescriptionJp = "Os preparativos das montagens a se armarem nas auras aos empilhados de doçuras nas riquezas pras tuas Piroxênios e com os materiais pro amparos nas elevações de suas estudantes as Trinity pras lutas aos fardos diárias da aluna. E no de bônus, caem pro lado as bondades de gratificações as compras ao montante num achado nos repletos do brilho dumas belas dumas 400 Piroxênios (as que entram por gratuito).\n※ Mais lá embaixo dá pros mergulhos de cabeça pra encontrar e as fuçadas nas lidas e observações aos recheios da caixa nos descritivos as escritas."
1131112761-NameJp = "Pacote de Desenvolvimento: Gehenna"
1131112761-DescriptionJp = "Os preparativos das montagens a se armarem nas auras aos empilhados de doçuras nas riquezas pras tuas Piroxênios e com os materiais pro amparos nas elevações de suas estudantes as Gehenna pras lutas aos fardos diárias da aluna. E no de bônus, caem pro lado as bondades de gratificações as compras ao montante num achado nos repletos do brilho dumas belas dumas 400 Piroxênios (as que entram por gratuito).\n※ Mais lá embaixo dá pros mergulhos de cabeça pra encontrar e as fuçadas nas lidas e observações aos recheios da caixa nos descritivos as escritas."
