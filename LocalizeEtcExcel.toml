2751697296-DescriptionJp = "Um Haniwa de Cristal que foi consertado agrupando as suas partes quebradas. Usado para fabricação e melhorias."
2344279089-NameJp = "Haniwa de Cristal Intacto"
2344279089-DescriptionJp = "Um Haniwa de Cristal em perfeito estado. Usado para fabricação e melhorias."
3562945394-NameJp = "Bilhete Impulsionador"
3562945394-DescriptionJp = "Um bilhete que encurta o tempo de produção na Câmara de Criação."
3399341924-NameJp = "Fragmento de Totem"
3399341924-DescriptionJp = "Um fragmento de um Totem. Usado para fabricação e melhorias."
3115017835-NameJp = "Eleph da Hibiki"
3115017835-DescriptionJp = "Um Eleph repleto do mistério da Hibiki."
81895359-NameJp = "Cartão de Adulto de Phrenapates"
81895359-DescriptionJp = "O 'Cartão de Adulto' que pertencia a Phrenapates. Encontra-se tão carbonizado que nem sequer é possível distinguir a sua forma, podendo despedaçar-se de imediato, portanto seu manuseio exige precaução. Você pode ganhar Piroxênios ao usar este cartão, porém ele será destruído no processo."
3228029479-NameJp = "Carimbo da Arona"
3228029479-DescriptionJp = "O carimbo de recompensa que a Arona estampa no Sensei!"
3558252378-NameJp = "Revista de Jogos"
3558252378-DescriptionJp = "A revista onde o jogo que o Clube de Desenvolvimento de Jogos produziu sofreu duras críticas. Talvez seja melhor não trazer o assunto à tona...?"
1522817419-NameJp = "Prova com Nota Máxima"
1522817419-DescriptionJp = "A folha de respostas de uma prova onde foi atingida a pontuação máxima gloriosamente. Excelente trabalho!"
149499250-NameJp = "Relatório de Missão"
149499250-DescriptionJp = "Um relatório atestando o registro das atividades da Schale."
3943222922-NameJp = "Espeto de Marshmallow"
3943222922-DescriptionJp = "Marshmallows enfiados em um palito de madeira. Tornam-se ainda mais doces quando são assados numa fogueira."
2983351598-NameJp = "Distintivo Desbotado de Arius"
