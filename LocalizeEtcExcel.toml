953293359-DescriptionJp = "Um pacote contendo itens essenciais para o crescimento das alunas da Valkyrie junto com Piroxênios.\nNo momento da compra, você ganhará Piroxênios x400 (gratuitos de bônus).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
