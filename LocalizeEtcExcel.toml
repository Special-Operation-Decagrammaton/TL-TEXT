2856730141-DescriptionJp = "Um conjunto completo de obras-primas imortais relançadas em edição limitada. Não importa o que digam, você pode continuar sentindo carinho pelo que é importante para você."
925075194-NameJp = "Bolsa Médica de Chinatsu"
