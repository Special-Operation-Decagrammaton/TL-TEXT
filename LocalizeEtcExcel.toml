2576602750-NameJp = "無地のキャップ"
2576602750-DescriptionJp = "スポーツウェアブランド「サーバル」が発売した、藍色で無地のキャップ。色んなバッジをつけて個性を強調できるので、ファッショングッズとして愛されている。"
675971185-NameJp = "ニット帽"
675971185-DescriptionJp = "アウトドアブランド「マナスル」の、女子高生をターゲットにしたニット帽。保温性はやや心許ないが、デザインの可愛さで人気の商品。"
2237745495-NameJp = "ビッグブラザーの中折れ帽"
2237745495-DescriptionJp = "「モモフレンズ」のキャラクター、ビッグブラザーのぬいぐるみがついた小さな中折れ帽。この帽子をかぶると急にビッグブラザーの視線が感じられるという。"
1699247498-NameJp = "リボン付きベレー帽"
1699247498-DescriptionJp = "トリニティ総合学園の校帽としても採用されている、白色のリボン付きベレー帽。実際に被ってみると、そのボリューム感を生かす着こなしは思ったより難しいとのこと。"
2090555875-NameJp = "防弾ヘルメット"
2090555875-DescriptionJp = "飛来するあらゆるものから頭部を守ることができる頑丈な防弾ヘルメット。外側は柔らかい綿素材で覆われており、ワッペンなどを付けて飾ることができる。"
1300177111-NameJp = "フリルのミニハット"
1300177111-DescriptionJp = "華やかなフリルで飾られたミニハット。フリルの裏側には小さなヘアピンが隠されており、形を固定させるための役割も担っている。"
835357934-NameJp = "バケットハット"
835357934-DescriptionJp = "顔の上部を隠せる大きめのバケットハット。マスクを合わせると顔の露出を最低限にでき、紫外線対策もバッチリ。"
2831939832-NameJp = "リーフリボン付き中折れ帽"
2831939832-DescriptionJp = "葉っぱの飾りがリボン状に差し込まれたファブリック素材の中折れ帽。リゾートファッションによく似合う。"
