1391317739-DescriptionJp = "Um conjunto com Piroxênios e itens valiosos para o ganho de experiência das alunas.\nNo momento da compra, você ganhará Piroxênios x800 (800 pagos).\n※Para ver os detalhes do pacote, confira o conteúdo do produto abaixo."
