1066886482-DescriptionJp = "A cópia de um pedaço rasgado do corpo principal do Manuscrito de Voynich. Usada para fabricação e melhorias."
4122424050-NameJp = "Batatas Fritas com Chocolate Doce"
4122424050-DescriptionJp = "Batatas fritas com um lado coberto por chocolate. A doçura do chocolate se une à textura crocante, mas parece não ser muito do gosto da Momoka."
2341679944-NameJp = "Chocolate Angel"
2341679944-DescriptionJp = "O chocolate da marca própria da 'Angel 24'. É o último de um lote colossal que a Sora encomendou por engano."
2435557875-NameJp = "Pacote Econômico de Chocolates"
2435557875-DescriptionJp = "Os minichocolates do pacote econômico guardado no Conselho Estudantil Geral. Dizem que a Rin costuma petiscar eles no trabalho de vez em quando."
2724075845-NameJp = "Biscoito de Gengibre com Chocolate da Arona"
2724075845-DescriptionJp = "Biscoitos de gengibre com chocolate que a Arona fez com muito carinho. Eles reproduzem as figuras do Sensei e da Arona de um jeito adorável."
1567224539-NameJp = "Peroro de Dia dos Namorados"
1567224539-DescriptionJp = "Um chocolate em forma de Peroro lançado em comemoração ao Dia dos Namorados. É claro que a Hifumi não deixaria escapar esse item de edição limitada, que virou sensação até mesmo entre os maiores fãs."
984677767-NameJp = "Ração Tipo D"
984677767-DescriptionJp = "Um chocolate militar feito com uma mistura de aveia e cacau em pó. Quando se trata de justiça, Mashiro não teme nem mesmo a sua absurda quantidade de calorias."
1666908815-NameJp = "Chocolate Quente da Felicidade"
1666908815-DescriptionJp = "Um chocolate quente reconfortante preparado pela Hanae. A cada gole, o cansaço vai embora enquanto uma doce sensação de felicidade transborda em seu peito."
3922278991-NameJp = "Chocolat de Gehenna"
3922278991-DescriptionJp = "Um chocolate amargo de Gehenna, conhecido por suas altíssimas calorias e níveis de cafeína. Há boatos de que a Iori já o confundiu com graxa para sapatos."
342988654-NameJp = "Muitas Barras de Chocolate"
342988654-DescriptionJp = "A enorme quantidade de barras de chocolate que a Akari comprou para se preparar para o concurso de comilões. Pessoas normais já se sentem cheias só de olhar."
741491105-NameJp = "Dango de Chocolate"
741491105-DescriptionJp = "Dango sabor chocolate vendido nas lojas de confeitaria japonesa. Uma combinação inusitada, mas com um sabor delicioso o suficiente para satisfazer o paladar da Junko."
2503165795-NameJp = "Death Love"
2503165795-DescriptionJp = "Um brinde que acompanha o single de Dia dos Namorados da banda favorita da Kayoko, o Black Death Poison. Apesar do visual sombrio, tem um sabor surpreendentemente suave e doce."
3659929614-NameJp = "Lanchinho de Ciclista"
3659929614-DescriptionJp = "A barra energética que a Shiroko sempre carrega para pedalar por aí. É cheia de nozes, dando uma energia incrível que se espalha por todo o corpo no momento que você dá uma mordida."
3042768744-NameJp = "Amigos do Mar"
3042768744-DescriptionJp = "A baleia do kit de chocolates vendido no Museu do Oceano. A Hoshino adora a imensidão das baleias, mas esta daqui cabe na palma da sua mão."
1510394578-NameJp = "Rosa do Deserto"
1510394578-DescriptionJp = "Chocolate com um design de rosa vendido na frente da estação de Abydos. Inspirado na Rosa do Deserto, este chocolate é muito popular para se dar como presente."
2394567841-NameJp = "Chocolate de Vênus"
2394567841-DescriptionJp = "Um chocolate com um formato bem ousado que não parece adequado para estudantes. Dentre elas, a Eimi talvez seja a única que compra um desses."
367299249-NameJp = "Escuta Número 14"
367299249-DescriptionJp = "Um chocolate acompanhado do aparelho de escuta da Kotama por cima. Aparentemente ela não fez a menor questão de esconder."
919440775-NameJp = "Cacau Quente em Lata"
919440775-DescriptionJp = "Uma lata de bebida de chocolate frequentemente encontrada em máquinas de venda automática. A Chihiro já encontrou consolo em sua doçura em inúmeras noites não dormidas."
3490934017-NameJp = "Pavê de Chocolate (Com Recibo)"
3490934017-DescriptionJp = "A caixinha de chocolates premium que a Yuuka comprou pro Sensei. Tem um recibo de 5.000 ienes colado, então não há a menor dúvida do quanto custou."
419901229-NameJp = "Chocolate da Heroína (Item)"
419901229-DescriptionJp = "Um item por tempo limitado que a Yuzu enviou de dentro do jogo. Seu uso recupera a vitalidade do personagem e o coração do jogador."
3659962553-NameJp = "Caracol de Chocolate Caseiro"
3659962553-DescriptionJp = "Um chocolate que a Aris fez à mão baseando-se no monstro 'Snail' (caracol) do seu jogo. Se você olhar de longe e apertar bem os olhos, até dá para enxergar um Snail ali."
941224173-NameJp = "Yokai MAX Sabor Chocolate"
941224173-DescriptionJp = "Um Yokai MAX sabor chocolate lançado para comemorar a época do Dia dos Namorados. Deixando os efeitos de manter a mente desperta de lado por um instante, descobrir se ele é mais saboroso que o Yokai MAX normal exigiria um longo debate com a Hare."
1781832965-NameJp = "Spray Sabor Chocolate"
1781832965-DescriptionJp = "Um frasco que espirra chocolate em vez de tinta em spray. Nas palavras de Maki, você pode usar isso para adoçar um pouco o mundo."
4075915701-NameJp = "Projétil de Chocolate Mk.2"
4075915701-DescriptionJp = "O projétil de chocolate que a Hibiki inventou para a comemoração do Dia dos Namorados. Infelizmente, seu poder de fogo era grande demais para poder ser usado em um evento."
2579538323-NameJp = "Parafuso de Chocolate"
2579538323-DescriptionJp = "Um chocolate em formato de parafuso embrulhado em papel alumínio. Possui uma modelagem tão impecável que nem mesmo a Utaha foi capaz de descobrir que era falso de primeira, mas com certeza não dá para usar como ferramenta."
3469911388-NameJp = "Cheryonka"
3469911388-DescriptionJp = "Um chocolate ao leite especial da Academia Federal Red Winter produzido pelo Departamento de Alimentação de Red Winter. E este foi o que a Cherino deu uma mordidinha."
1188251464-NameJp = "Cheryonka Aprimorada"
1188251464-DescriptionJp = "Um Cheryonka Aprimorado decorado com as fofas ilustrações desenhadas pela Tomoe. O gosto tem quase nenhuma diferença comparado ao antigo Cheryonka."
3845682331-NameJp = "Fruta de Cacau"
3845682331-DescriptionJp = "A Nodoka queria entregar um chocolate para o Sensei e finalmente conseguiu colocar as mãos neste cacau depois de muito sufoco. Ele não é docinho, mas depois de prepará-lo como um chá quente, exala um aroma maravilhoso."
410737829-NameJp = "Elixir da Imortalidade (Falha)"
410737829-DescriptionJp = "O novo elixir que a Saya preparou utilizando chocolate como base. A doçura e os efeitos são idênticos aos de um chocolate comum, então não teria nenhum problema afirmar que é só um simples pedaço de chocolate."
1298182383-NameJp = "Bombom de Rum para Adultos"
1298182383-DescriptionJp = "Um bombom de chocolate de sabor forte com uma pitada de rum. É um sabor com o qual os estudantes ainda não estão prontos para lidar. Inclusive para a Shun, óbvio."
125955518-NameJp = "Algemas de Chocolate"
125955518-DescriptionJp = "Um chocolate em formato de algemas. A ideia da Kirino de querer usar isso no próprio trabalho também foi um tremendo choque até mesmo para os fabricantes."
1951960570-NameJp = "Cruller de Chocolate Especial"
1951960570-DescriptionJp = "Um cruller de chocolate coberto de confeitos vendido como edição limitada de Dia dos Namorados pela Master Donut. Para a Fubuki, o Dia dos Namorados significa exatamente o dia em que ela pode devorar isso."
711391590-NameJp = "Haniwa de Chocolate"
711391590-DescriptionJp = "Um chocolate com o formato de uma estátua haniwa preparado pela Hanako. Dá a sensação que, não importa de que lado você olhe, os olhos dela sempre vão bater com os seus."
4101876-NameJp = "Little Bullet"
4101876-DescriptionJp = "Um chocolate no formato de uma bala de rifle de precisão que a Hasumi lhe deu. É pequeno, mas a sua doçura é capaz de atingir o seu coração em cheio."
2407160249-NameJp = "Chocolate Caseiro da Hina"
2407160249-DescriptionJp = "Um chocolate feito à mão pela Hina. Seu formato pode não ser dos mais perfeitos, mas a coragem empregada ao fazê-lo o torna a coisa mais linda de se ver."
1422578612-NameJp = "Uma Mordida de Descanso Só Para Você"
1422578612-DescriptionJp = "Um chocolate artesanal feito pela Ako com ingredientes rigorosamente selecionados. Seu visual é tão impecável que mal parece ter sido feito em casa. O tamanho e o sabor, perfeitos para serem apreciados até durante o expediente, refletem muito da sua competência e carinho."
87498756-NameJp = "Chocolate Super! Delicioso!! Eba!!!"
87498756-DescriptionJp = "O chocolate caseiro que a Izumi fez usando a maior quantidade de ingredientes que ela considera os melhores. O charme de seu sabor está no inusitado toque salgado e encorpado."
1899678676-NameJp = "Chocolate Premium da Chefe"
1899678676-DescriptionJp = "O chocolate que a Aru deu em sinal da gratidão que ela tem por toda a colaboração diária. O que mais importa aqui não é o preço cobrado por ele, mas sim a pessoa e os sentimentos depositados no presente."
171489856-NameJp = "Roleta Russa Infernal"
171489856-DescriptionJp = "Um chocolate de roleta russa voltado para pegadinhas, onde o perdedor está destinado a provar o verdadeiro inferno. A aba de favoritos da Mutsuki está cheia de coisas como essa."
2099851060-NameJp = "Caneca de Cacau Quente"
2099851060-DescriptionJp = "Um cacau quente que a Fuuka preparou com carinho para o Sensei. Graças aos sentimentos afetuosos que a levaram a se preocupar com sua saúde, a bebida parece muito mais doce e acolhedora do que o normal."
1852286999-NameJp = "Chocolate Caseiro da Juri"
1852286999-DescriptionJp = "Um chocolate que a Juri dedicou todas as suas energias para fazer. Mesmo depois de engolir, seu sabor continua um mistério, mas talvez seja melhor assim. O importante é que os verdadeiros sentimentos dela foram entregues."
1269992298-NameJp = "Tempo Juntos"
1269992298-DescriptionJp = "O luxuoso bolo de chocolate que a Serika ganhou no seu trabalho de meio período. As dores e as glórias do trabalho duro realçam o sabor disso mais do que qualquer outra coisa."
265930468-NameJp = "O Trabalho da Responsável pelos Lanches"
265930468-DescriptionJp = "Uma caixa de chocolates montada pela Nonomi, a encarregada oficial dos lanchinhos de Abydos. Ela contém todo tipo possível de chocolates para garantir a diversão não só do Sensei, mas de todo o excêntrico Comitê de Contramedidas."
689413464-NameJp = "O Melhor dos Melhores"
689413464-DescriptionJp = "O alimento nutritivo definitivo, testado e selecionado pela Sumire em meio a mais de 100 opções. Uma única barra fornece calorias e energia o bastante para durar o dia todo, mas obviamente exigirá um treino intenso como pagamento depois."
3328209817-NameJp = "Punho de Cassiopeia ~As Grandes Aventuras do Axolote~"
3328209817-DescriptionJp = "Brinquedos de chocolate do fliperama de garra que a Momoi conseguiu. A caixinha vem com brinquedos do mascote do popular jogo de luta 'Punho de Cassiopeia ~As Grandes Aventuras do Axolote~'. São 7 tipos no total."
3385816833-NameJp = "Chocolate Caseiro da Midori"
3385816833-DescriptionJp = "Inúmeras horas de treino, muitas tentativas e erros, falhas seguidas de novos começos, e ainda ter que acordar cedo... Esta deve ter sido a primeira vez na vida que a Midori se esforçou tanto em algo fora dos games e do desenho."
3589704604-NameJp = "Biscoito de Chocolate com Provérbios de Quatro Letras"
3589704604-DescriptionJp = "Um doce de chocolate recheado de provérbios (yojijukugo). A Chise adora o fato de que, às vezes, palavras esquisitas aparecem no meio das frases mais sérias."
3842989732-NameJp = "Doce Limitado da Hyakuya-dou"
3842989732-DescriptionJp = "Uma guloseima especial vendida no Hyakuya-dou exclusivamente no Dia dos Namorados. Sem anúncios e sem constar no menu, a Shizuko guarda em segredo para quem exatamente esses doces são reservados."
3251730635-NameJp = "Item Ninja Especial Nº 49 \"Conjunto de Chocolate\""
3251730635-DescriptionJp = "Um conjunto de chocolates dos sonhos repleto de equipamentos ninjas. Izuna enfrentou uma fila desde as primeiras horas da manhã para consegui-lo só pelo desejo de saboreá-lo junto de seu Lorde. Fique atento, pois eles não podem ser utilizados na prática."
4247091559-NameJp = "Conjunto de Sono Profundo e Chocolate Relaxante"
4247091559-DescriptionJp = "Um conjunto de itens relaxantes que a Tsubaki preparou para o Sensei, que sempre sofre com excesso de trabalho. Quando sentir vontade de ter um travesseiro onde é mais fácil pegar no sono, chame pela Tsubaki. Comprando normalmente, custa 3.980 ienes."
2771361458-NameJp = "Chocolate Feito com o Amor da Wakamo"
2771361458-DescriptionJp = "Um chocolate feito com sentimentos profundos e transbordantes, carregado com todo o afeto da Wakamo. No entanto, se o que transborda ali dentro é *apenas* afeto, isso já é uma incógnita."
1572630441-NameJp = "Prova da Gastronomia (Sabor Matcha)"
1572630441-DescriptionJp = "Chocolate de matcha elaborado por Haruna em suas investigações na busca pelas maravilhas da gastronomia. Na hora da mordida, um frescor adocicado começa a irradiar por todo o paladar por trás do gosto profundo e amargo que preenche."
3743008500-NameJp = "Skullman: O Santo do Dia dos Namorados"
3743008500-DescriptionJp = "Uma versão de Dia dos Namorados do 'Skullman, O Deus da Morte' preparada pela Azusa. Quando você come, não sobra nem mesmo os ossos, mas os sentimentos depositados nela certamente durarão para sempre."
1084418779-NameJp = "Lovely Crossline"
1084418779-DescriptionJp = "Um famoso chocolate trazido pela Koharu. Uma mistura de chocolate branco e amargo onde o padrão de cruz preta exibe um encanto formidável."
2742248602-NameJp = "Twinkle Star"
2742248602-DescriptionJp = "Um chocolate em forma de estrela que a Suzumi comprou numa loja de conveniência. Ao abrir a embalagem, a leve cobertura de flocos de ouro brilha serena e discretamente."
663608497-NameJp = "Holy Chocolate"
663608497-DescriptionJp = "O chocolate que a Mari te deu de presente. Por ser bastante popular como uma lembrancinha da Irmandade, pode ser que desde o princípio ele tenha sido feito para exibir ao invés de comer."
848260985-NameJp = "O Melhor Amigo dos Livros"
848260985-DescriptionJp = "Um chocolate com uma cobertura especial feita para não sujar as mãos. É extremamente popular entre as leitoras assíduas, como a Shimiko."
1900401189-NameJp = "Be With You"
1900401189-DescriptionJp = "Um chocolate artesanal preparado pela Serina. Seu sabor adocicado traz uma sensação de alívio que aquece até a alma."
4183660781-NameJp = "Chocomenta de Poejo"
4183660781-DescriptionJp = "Uma chocomenta super especial que a Airi preparou. Dizem que é algo incrivelmente popular e exclusivo entre os fãs, mas para entender exatamente quão especial isso é, seria preciso pedir uma explicação da própria Airi."
1868703267-NameJp = "Chocolate de Edição Limitada da Yoshimi"
1868703267-DescriptionJp = "O chocolate artesanal da Yoshimi. Em muitos sentidos da palavra, um valioso item de edição limitada que não se pode ver em nenhum outro lugar."
355355427-NameJp = "Chocolate Fala Mais Que Palavras"
355355427-DescriptionJp = "Um chocolate que transparece ter sido feito pela Natsu. Seu design é simples o suficiente para substituir as palavras eloquentes dela, e é exatamente por isso que a sua beleza ganha tanto destaque."
2098665142-NameJp = "Chocolate da Sorte (Caseiro)"
2098665142-DescriptionJp = "O chocolate que a Chinatsu preparou. Se não importa qual você escolher e o resultado será sempre o mesmo, talvez possamos chamar isso de destino."
3487183095-NameJp = "Chocolate Enfaixado"
3487183095-DescriptionJp = "Um alimento que a Sena preparou durante o expediente. Como ela não encontrou papel de embrulho, enrolou em bandagens; mas como ela garantiu que não há problemas para o corpo humano, mesmo que você acabe desmaiando, a Sena com certeza cuidará de você."
3066393242-NameJp = "Cacau 99,99%"
3066393242-DescriptionJp = "O chocolate que a Haruka preparou para o Sensei. Se ao olhar para o número 99,99 a primeira coisa que você sente é um 'Por ora, me parece incrível', você pode ter uma forte inclinação natural para participar do Problem Solver 68."
3579363383-NameJp = "Dia dos Namorados Distorcido"
3579363383-DescriptionJp = "O chocolate que a Asuna aprontou para o seu Mestre. Ocorreu uma pequena deformação estrutural enquanto ele era guardado e transportado de lá para cá."
304962670-NameJp = "Made By"
304962670-DescriptionJp = "O chocolate artesanal da Akane. À primeira vista, parece um simples presente de uma aluna para um Sensei... mas não consegue esconder as exímias habilidades de uma empregada por trás."
1933815846-NameJp = "Omelete com Chocolate"
1933815846-DescriptionJp = "A omelete que a Karin preparou para celebrar a ocasião do Dia dos Namorados. Em vez de ketchup, há um coração desenhado com chocolate. É um prato maravilhoso onde o sabor da omelete e a doçura do chocolate se harmonizam em perfeita sintonia."
1957428602-NameJp = "Gravura de Chocolate: Dragão"
1957428602-DescriptionJp = "Uma gravura de chocolate com o desenho de um dragão que a Neru trouxe de algum lugar. Como o visual é imponente, a Neru tem a convicção de que o gosto também deve ser extraordinário."
1255509912-NameJp = "O Início do Dia dos Namorados"
1255509912-DescriptionJp = "Um chocolate feito pela Kotori para ilustrar as origens e a relevância do Dia dos Namorados. Ao dar uma mordida, a história entrelaçada transborda pelo seu paladar."
1303875154-NameJp = "Taça Doce"
1303875154-DescriptionJp = "Um chocolate em formato de taça trazido pela Pina. Mantê-lo nas mãos por muito tempo fará com que derreta, então a etiqueta exige que ele seja saboreado o mais rápido possível."
1082089594-NameJp = "Almond Crimson"
1082089594-DescriptionJp = "A amêndoa coberta de chocolate deixada pela Tsurugi. Está amarrada com um lindo laço vermelho que, muito provavelmente, não foi colocado pelos funcionários da loja."
3411154794-NameJp = "Chocolate Caseiro Desajeitado"
3411154794-DescriptionJp = "Um chocolate caseiro que a Kokona embrulhou com bastante cuidado, apesar de sua falta de jeito. Ela insiste obstinadamente que é um produto comprado em loja e bateu na tecla dizendo: 'Certifique-se de comer tudo sozinho!'"
421170184-NameJp = "Pequeno Chocolate"
421170184-DescriptionJp = "O chocolate que a Hinata distribui às crianças que visitam a capela. Aparentemente, ela provou os sabores de todos os tipos para garantir que se adaptassem aos gostos de cada um."
412848971-NameJp = "Biscoito de Chocolate Macio"
412848971-DescriptionJp = "O biscoito de chocolate que a Ui preparou para nós. Para evitar que os farelos caíssem por todo canto, ela optou por escolher um biscoito de massa mais úmida e macia."
1622643101-NameJp = "Bolo de Morango com Chocolate"
1622643101-DescriptionJp = "O bolo de morango e chocolate que a Kazusa comprou para você. Pelo que parece, ela passou um tempão morrendo de dúvidas na frente da vitrine."
2747826200-NameJp = "All to You"
2747826200-DescriptionJp = "O chocolate que a Hiyori preparou dando o seu 'tudo' em troca. O interior desta pequenina bolsa de papel está recheado com os sentimentos mais genuínos dela."
2837160480-NameJp = "Chocolate Cuidadosamente Embrulhado"
2837160480-DescriptionJp = "O chocolate preparado pela Misaki. O embrulho minucioso com laços de duas cores parece refletir o seu lado mais reservado e secreto."
4062180493-NameJp = "Rosas Azuis e Chocolate"
4062180493-DescriptionJp = "Um chocolate caseiro dado pela nossa princesa cheia de mistérios. A flor solitária que a acompanha é a prova do enorme esforço da Atsuko."
3932209420-NameJp = "Chocolate Ghidiva"
3932209420-DescriptionJp = "O chocolate do mais alto nível preparado pela Saori. É um processo cheio de etapas complexas, que passa longe de ser algo simples, mas com certeza haverá um grande valor de compensação ali."
2263489181-NameJp = "Chocolate de Flor de Cerejeira"
2263489181-DescriptionJp = "Um chocolate caseiro em formato de flor de cerejeira moldado pela Mimori. Mesmo que você não saiba ler mentes, comendo um deles você conseguirá sentir os sentimentos dela."
170445747-NameJp = "O Chocossauro Mais Forte"
170445747-DescriptionJp = "O chocossauro invencível montado pela Kaede. Foi criado a partir da ideia maluca de juntar os cacos de uma escavação de dinossauro de chocolate que não deu muito certo. Um chocolate que exala a cara da Kaede tanto na diversão de olhar quanto na de comer."
566203770-NameJp = "Chocolate de Coelho Derretendo"
566203770-DescriptionJp = "Um chocolate fofo de coelho de orelhas caídas feito à mão pela Tsukuyo. Ela tratou a peça com tanto zelo e cuidado que acabou derretendo só um pouquinho."
2104744538-NameJp = "Chocolate da Hacker Super Gênia, Pura, Doente e Linda"
2104744538-DescriptionJp = "Um chocolate artesanal onde a Himari pegou sua própria imagem para estilizá-la num formato fofinho e deformado. Graças a um imprevisto repentino que culminou numa decisão lógica e resultados racionais, você só o saboreará após voltar para a Schale."
3304317128-NameJp = "Palito de Chocolate Caseiro da Iroha"
3304317128-DescriptionJp = "Um chocolate caseiro em formato de palito que você recebeu no caminho de volta após as compras com a Iroha. Há uma \"marca\" deixada em apenas um único palito."
902334212-NameJp = "Chocolate em Forma de Distintivo do Clube de Pesquisa de Ninjutsu"
902334212-DescriptionJp = "Um chocolate feito sob encomenda que a Michiru preparou para nós. Vem recheado com o carinho que ela sente pelas companheiras do Clube de Pesquisa de Ninjutsu. Seu processo agitado de produção também pode ser o sabor da história."
813659355-NameJp = "Bolo de Cenoura com Chocolate"
813659355-DescriptionJp = "Um bolo de cenoura feito pela Miyako usando chocolate na composição. Coisas doces podem não ser o ideal para coelhos, mas podem se tornar uma verdadeira alegria se forem preparadas para as amizades e para o Sensei."
490342082-NameJp = "S'more de Chocolate"
490342082-DescriptionJp = "O s'more de chocolate preparado pela Moe. É um pedaço de chocolate posto em cima de um marshmallow docinho, sendo uma quantidade de calorias digna de uma catástrofe abismal."
1288390774-NameJp = "Caramelo de Chocolate de Suprimento"
1288390774-DescriptionJp = "O caramelo de chocolate preparado pela Saki. É um mimo saboreado pelos sentinelas do turno da noite na busca de afugentar a sonolência. De acordo com a Saki, é um presente que não possui a mais absoluta e mínima relação com o Dia dos Namorados."
1222376462-NameJp = "Casca de Chocolate"
1222376462-DescriptionJp = "A casca de chocolate artesanal feita pela Miyu. Ao que tudo indica, foi criado juntando o chocolate dos suprimentos e frutas recém-colhidas. Certifique-se de saborear este agrado prestando valor a cada mordida."
4196510691-NameJp = "Tinta de Chocolate"
4196510691-DescriptionJp = "Um chocolate recheado com as doces travessuras do coração da Noa. Como a ponta de uma caneta não a absorve, ela não se adequa bem a escrever; no entanto, ela serve como a mais excelente das tintas no momento em que você procura transparecer sentimentos genuínos no fundo da sua alma."
70201916-NameJp = "Chocolate da Medalha de Serviço Especial"
70201916-DescriptionJp = "A medalha entregue por Cherino como recompensa pelos méritos da Marina ao concluir os alvos de manufatura da Cheryonka. Já que a matéria-prima é o chocolate, sumirá depois da primeira mordida, porém seus esforços e conquistas persistirão pra sempre nas memórias."
967689799-NameJp = "Shigure Bitter Special"
967689799-DescriptionJp = "Um coquetel de chocolate não-alcoólico que a Shigure serviu para mim. É dito por aí que o segredo por trás da sua doçura na medida certa e retrogosto refrescante esconde o toque num pedaço de chocolate amargo."
3442222452-NameJp = "Chocolate em Forma de Pintinho"
3442222452-DescriptionJp = "Um chocolate encantador que a Mine presenteou na época de Dia dos Namorados. Insistem que se trata inteiramente de um produto médico, contudo, é envolvido num estilo e pacote da fina nobreza."
18239407-NameJp = "Toranja Seca Coberta com Chocolate"
18239407-DescriptionJp = "Um lanche com visual bem saudável que a Ayumu come com frequência em sua rotina. As fatias desidratadas de toranja são revestidas em chocolate, sendo super saborosas, para não mencionar as suas propriedades no alívio contra as fofocas."
4263181528-NameJp = "Cópia Danificada do Manuscrito de Voynich"
4263181528-DescriptionJp = "Uma cópia do Manuscrito de Voynich que se encontra danificada, com rasgos e rabiscos em várias partes. Usada para fabricação e melhorias."
1731163637-NameJp = "Cópia Editada do Manuscrito de Voynich"
1731163637-DescriptionJp = "Uma cópia do Manuscrito de Voynich cujas partes danificadas foram editadas e corrigidas com anotações. Usada para fabricação e melhorias."
2042390877-NameJp = "Cópia Intacta do Manuscrito de Voynich"
2042390877-DescriptionJp = "Uma cópia do Manuscrito de Voynich em perfeito estado de conservação. Usada para fabricação e melhorias."
4282203720-NameJp = "Fragmento de Haniwa de Cristal"
4282203720-DescriptionJp = "Um fragmento quebrado de um Haniwa de Cristal. Usado para fabricação e melhorias."
