72410385-DescriptionJp = "Conclua o Capítulo 1, Episódio 3 do Conselho Estudantil Geral, Parte 2"
3753496723-NameJp = "O esquadrão marcha após forrar o estômago"
3753496723-DescriptionJp = "Conclua o Capítulo 1, Episódio 3 do Arco de Perseguição de Loa, Parte 2"
1549873212-NameJp = "Operação Especial - Arco de Perseguição de Loa"
1549873212-DescriptionJp = "Pode ser obtido no evento Operação Especial - Arco de Perseguição de Loa, que ficará em vigência até 06-05-2026 às 10:59:59."
1364517965-NameJp = "Eleph da Niko"
1364517965-DescriptionJp = "Eleph repleto do místico da Niko."
3389049237-NameJp = "Eleph da Kurumi"
3389049237-DescriptionJp = "Eleph repleto do místico da Kurumi."
3420387445-NameJp = "Eleph da Otogi"
3420387445-DescriptionJp = "Eleph repleto do místico da Otogi."
4031209358-NameJp = "Eleph da Erika"
4031209358-DescriptionJp = "Eleph repleto do místico da Erika."
2233212585-NameJp = "Mesa de Operações"
2233212585-DescriptionJp = "Mesa improvisada pelas táticas do Esquadrão FOX com sucatas engavetadas entre tábuas velhas e assentos dobráveis num amálgama decrépito de mesa operante. Na calmaria morta e na ausência latente em pautas emergenciais, supre carências que fluem numa margem entre dar manutenção nos fuzis pesados e redigir relatos corriqueiros diários pros seus fins rotineiros."
4040410887-NameJp = "Estande de Treino de Tiro da Valkyrie"
4040410887-DescriptionJp = "Os corredores na base do departamento com finalidades mortíferas perante focos nas linhas de abate pro tiro prático nas esquadras da Escola de Polícia Valkyrie.\nPara preservar a dignidade inconteste do cidadão pacato sob a mira atenta do regimento nas rondas urbanas a corporação empenha com afinco um suor contínuo almejado nas sessões diárias operacionais num preparo disciplinar rigoroso nas pistas infindas com muito vigor heroico pra se fazer notar à sociedade civil pacífica num ambiente sem riscos letais iminentes nas rotinas corriqueiras nas instâncias urbanas..."
425971983-NameJp = "Vitrine de Acessórios"
425971983-DescriptionJp = "Um monstruoso chamariz nos centros comerciais reluzindo quinquilharias cobiçadas ao bel-prazer caprichoso das carteiras fáceis de moças imaturas numa idade impulsiva na vitrine envidraçada que exibe badulaques de uma delicadeza angelical e meiga ao extremo pra fascinar quem tem gostos doces perante as peças ali amontoadas reluzindo nas prateleiras.\nA chance beira o garantido com toda certeza num embate de um vislumbre fugaz nas peças que fará transbordar encantamentos pra fisgar suas emoções e achar o adorno singular de seus prediletos gostos no ato de paixão platônica irresistível pelas peças sedutoras da moda..."
1379512856-NameJp = "Série Escola de Polícia Valkyrie"
1379512856-DescriptionJp = "Você pode fabricar móveis para o café (Série Escola de Polícia Valkyrie)."
3291841289-NameJp = "Caixa de Sorteio da Série Escola de Polícia Valkyrie"
3291841289-DescriptionJp = "Ao utilizar, você terá uma chance igualitária de obter um móvel aleatório da Série Escola de Polícia Valkyrie."
3359982953-NameJp = "Caixa de Seleção da Série Escola de Polícia Valkyrie"
3359982953-DescriptionJp = "Uma caixa que permite selecionar e trocar por qualquer móvel da Série Escola de Polícia Valkyrie."
4274419611-NameJp = "Pt do Evento"
4274419611-DescriptionJp = "Pontos que podem ser ganhos no evento. Ao obter uma boa quantidade, você poderá receber diversas recompensas."
1584859398-NameJp = "Bolsa Térmica de Frio"
1584859398-DescriptionJp = "Uma bolsa que desencadeia propriedades frigoríficas numa queda agressiva térmica numa pancada de colisão pra fins práticos na pele. Salvadora da pátria obrigatória pros percalços exaustivos sob os rigores inclementes das tardes escaldantes infernais de verão escaldante sem nuvens."
3389848340-NameJp = "Ração Tática do Esquadrão SRT"
3389848340-DescriptionJp = "As famigeradas MRE empacotadas pra desastres que se tornaram o estigma na base de operações pra suprimir estômagos cadetes outrora do arsenal despachado da SRT para consumo contínuo e pragmático perante necessidades extremas pra sanar privações da miséria nos alojamentos dos cadetes da SRT num contexto em que a fome se avizinha aos estômagos esvaziados no quartel perante rações embaladas pro suporte bélico operacional nas missões austeras. Só atolar em um enxágue numa poça fervente contida e a subsistência do combatente faminto estará contornada pra prosseguir de bruços pro lamaçal das operações arriscadas."
3771667791-NameJp = "Pasta de Dentes Sabor Pepino"
3771667791-DescriptionJp = "Manufatura química de higiene orçamentária imposta aos cadetes em trâmites rotineiros de limpeza matutina nas bases cadetes em nome da Escola SRT sob distribuição imposta na rotina de bochechos esquisitos pro gosto conturbado e duvidoso nas instâncias da Escola SRT. O odor esdrúxulo nos poros das mucosas bucais era divisivo no plantel exausto devido sua ousadia. Muitos relataram subverter seu uso aplicando os dejetos não pra higienização bucal que seria o razoável, mas alavancando os meios na limpeza compulsiva das ferragens bélicas e calibres entupidos..."
3183815932-NameJp = "Mapa de Rota"
3183815932-DescriptionJp = "Traços cartográficos documentando com agudeza os limites furtivos do procurado na fuga com seus rastros pontuados e devidamente registrados na folha de papel impresso. As minúcias operacionais nas escalas foram negligenciadas limitando resoluções perfeitas aos vislumbres superficiais, o roteiro dos rastros principais de fato contorna bem claro nas vias delineadas."
207833206-NameJp = "Bilhete com Números Aleatórios"
207833206-DescriptionJp = "Rabiscos num retalho jogado ostentando códigos numéricos conturbados decodificáveis nas lógicas de pautas criptográficas com segredos profundos inexplorados aos olhos rasos num primeiro momento do papel apreendido. Indícios fortes atestam padronizações nos cifrões embaralhados nas dobras misteriosas. Olhos fixos a fio com perspicácia podem ser a chave para traduzir tudo."
2530291965-NameJp = "Planta de Bomba"
2530291965-DescriptionJp = "As lógicas projetuais esboçadas em grafite rabiscadas pro engenho infernal manufaturado com finalidades explosivas nefastas. Sua engenharia é primitiva ao ponto de rir numa brincadeira juvenil nos traços, mas a letalidade encubada condensa poder irrefutável com devastação avassaladora de arrasar prédios inteiros."
2549037273-NameJp = "Livro Não Devolvido e Cartão da Biblioteca"
2549037273-DescriptionJp = "Fragmentos corrompidos nas lombadas num brochura desfigurada e o respectivo carimbo nos prazos de liberação alocado em seus devidos pertences burocráticos associados à leitura da mídia impressa recuperada nas evidências nos despojos investigativos recolhidos nas premissas das linhas que compõem as trincheiras remanescentes onde houve crime... O tempo pra entrega estourou sem clemência faz um tempão."
4148989342-NameJp = "Cartão SD"
4148989342-DescriptionJp = "Cartão apreendido dos espólios flagrados no campo da infração e da criminalidade nos bastidores escuros de crimes flagrantes num terreno inóspito de tragédias encobertas e de infrações... Dispõe um teor generoso em terabytes de mistérios engarrafados na mídia."
3540514764-NameJp = "Recorte de Jornal"
3540514764-DescriptionJp = "Um agregado na coleta minuciosa com compilação aficionada de artigos fúnebres recontando as intempéries e causos alarmantes nos confins distópicos num cenário vasto dos bairros em toda Kivotos nas tragédias constantes e sem fim numa cidade perigosa e explosiva sob um jornalismo que espreme lágrimas nas páginas impressas na poeira. A aura paira ressaltando que teias conectoras estão se unindo entre todos esses fatos isolados."
3981029618-NameJp = "Passagem Usada"
3981029618-DescriptionJp = "Um tíquete perfurado denunciando sua inatividade nos trilhos dos catracões num estado imprestável exausto para viagens. Indícios firmes despontam a praça derradeira da qual as portas abriram em seu último desembarque."
