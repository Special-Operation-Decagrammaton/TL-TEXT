2308340710-NameJp = "サクラ大福"
2308340710-DescriptionJp = "百鬼夜行の伝統的な喫茶店「百夜堂」の定番スイーツ。まろやかで濃厚、それでいて控えめな甘さは「最高」の一言に尽きる。"
2902974760-NameJp = "チェリノマトリョーシカ"
