2523477884-DescriptionJp = "Um produto que permite selecionar e obter Fragmentos de estudantes ★3.\n*Consulte os detalhes do pacote no conteúdo do produto abaixo.\n*Você só pode selecionar Fragmentos de estudantes ★3 que já foram recrutadas.\n*Estudantes limitadas, de colaboração e de aniversário não estão incluídas."
