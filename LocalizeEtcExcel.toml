3010141145-NameJp = "Mesa Bagunçada"
3010141145-DescriptionJp = "Uma mesa de escritório padronizada fornecida pela Escola de Polícia Valkyrie.\nPor algum motivo, as cadeiras e todos os itens espalhados sobre ela estão cheios de arranhões."
3927526577-NameJp = "Portão Eletrônico da Millennium"
3927526577-DescriptionJp = "Um portão que dá boas-vindas aos visitantes... Mas quando ele resolve dar defeito, você pode precisar adotar algumas 'medidas um pouquinho extremas' para dar um jeito na situação."
1234369671-NameJp = "Disco de Vinil Personalizado Sugar Rush"
1234369671-DescriptionJp = "Um disco de vinil com a gravação da primeira vez que tocaram a música inteira. Apesar da inexperiência de novata, a essência dela brilha de forma vibrante ao longo das faixas. Parece que até algumas surpresas inesperadas além da música foram captadas pelas faixas do disco..."
602681022-NameJp = "Caderno Cheio de Lembranças"
602681022-DescriptionJp = "Um caderno de argolas da Kirara. As folhas estão lotadas de vestígios de muito estudo e anotações. No entanto, parece haver caligrafias que pertencem a outra pessoa ali também..."
3145236472-NameJp = "Interruptor de Claymore"
3145236472-DescriptionJp = "Um equipamento manual construído pela Moe através da customização do detonador da sua querida Claymore. Sendo que a espoleta foi descartada, o risco de explosão é zero, no entanto há rumores de que a força massiva da mola atua com um estrago demolidor que beira as proporções de uma bomba desgovernada."
3397298241-NameJp = "Fita no Estilo Asuna"
3397298241-DescriptionJp = "Tanto nas rotinas mundanas da limpeza, quanto nas missões em que o 'trabalho sujo' se faz presente, é o clássico laço de cor azulada do qual a Asuna sempre faz questão de se enfeitar."
1854644343-NameJp = "Kivotos - Mistérios Não Identificados"
1854644343-DescriptionJp = "Pode ser obtido no evento Kivotos - Mistérios Não Identificados"
