2818960363-NameJp = "Tapete Mágico e Ventilador"
2818960363-DescriptionJp = "Um conjunto de um lindo tapete mágico e um ventilador. Só de ficar parado, você pode sentir o efeito da magia."
578477992-NameJp = "Espreguiçadeira de Praia e Mini Mesa"
578477992-DescriptionJp = "Dizem que uma espreguiçadeira de praia e uma bebida têm a magia de relaxar qualquer pessoa."
