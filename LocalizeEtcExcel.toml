404292254-NameJp = "Funcionária que atende os clientes na entrada"
404292254-DescriptionJp = "A nossa Pousada Termal recebe sempre os clientes com um sorriso caloroso.\n(Se encontrar alguma funcionária distribuindo bebidas suspeitas, entre em contato imediatamente com a gerente!)"
4035745238-NameJp = "Gerente que apresenta os jardins e fontes termais"
4035745238-DescriptionJp = "A nossa Pousada Termal tem um jardim tradicional de karesansui com pedras e areia.\nQue tal passar um tempo relaxante contemplando este jardim simples que purifica a alma?"
1774361412-NameJp = "Gerente que limpa e arruma"
1774361412-DescriptionJp = "Na nossa Pousada Termal trocamos a roupa de cama e limpamos os quartos duas vezes por dia.\nPor favor, sinta-se em casa, pois cuidamos de todos os detalhes para garantir seu relaxamento."
3950044430-NameJp = "Cliente aproveitando o banho ao ar livre"
3950044430-DescriptionJp = "As águas de nossa Pousada Termal oferecem benefícios de clareamento da pele, recuperação de fadiga e até mesmo melhoria na precisão de tiro.\nPor hoje, esqueça de tudo e descanse bastante. Ficaremos felizes se puder recarregar suas energias para o amanhã."
999560012-NameJp = "Cliente saboreando a refeição no salão de banquetes"
999560012-DescriptionJp = "Todos os pratos da nossa Pousada Termal são preparados com ingredientes da mais alta qualidade.\nEles são feitos com bastante pãezinhos de fonte termal e lanches Unmee, então por favor, desfrute."
1094144720-NameJp = "Prática"
1094144720-DescriptionJp = "A pista de atletismo do Estádio de Atletismo está disponível para uso em dias sem jogos.\nAs alunas interessadas devem apresentar uma permissão de uso ao Comitê de Gestão de Atletismo."
2809976808-NameJp = "Torcida"
2809976808-DescriptionJp = "A torcida que traz brilho aos esportes!\nVamos torcer com todas as forças pelas jogadoras competindo na partida!"
374407097-NameJp = "Trabalho"
374407097-DescriptionJp = "O Comitê Executivo do Festival Kivotos Halo está fazendo o seu melhor para garantir que todos os participantes possam curtir o grande evento.\nSe houver algum problema durante as competições, por favor, contate a Sede de Operações no estádio."
1521840386-NameJp = "Fabricação"
1521840386-DescriptionJp = "A despensa do Estádio de Atletismo está equipada com ferramentas para reparos simples.\n(Qualquer um pode usar livremente, mas por favor, não faça modificações perigosas!)"
3558610679-NameJp = "Descanso"
3558610679-DescriptionJp = "Mantenha-se hidratado depois de se exercitar!\nO salão do Estádio de Atletismo conta com máquinas de bebidas gratuitas, então não esqueça de se hidratar!"
317946005-NameJp = "Brunch na pista"
317946005-DescriptionJp = "Haruna: \"Até para comer um pedaço de pão é preciso elegância. Uma refeição sem pressa é a base de um gourmet.\"\nJunko: \"Espera aí, Izumi! O que eu faço se você comer a minha parte também!\""
543266597-NameJp = "O conteúdo escrito no memorando"
543266597-DescriptionJp = "Ako: \"…………Sem prêmio?\"\nAris: \"Aris completou a condição de conclusão da missão!\""
860818406-NameJp = "A Cavalaria e a Hacker"
860818406-DescriptionJp = "Maki: \"Ah, não sinto minhas pernas...\", Kotama: \"A-Acho que vou desmaiar...\"\nChihiro: \"Não avisei vocês para se exercitarem regularmente?\""
3205226752-NameJp = "Toque de Granada"
3205226752-DescriptionJp = "Moe: \"Saki, pegue rápido!\"\nSaki: \"E-Espera um pouco! Onde você enfiou o pino de segurança?\""
2479371781-NameJp = "Trabalho de restauração"
2479371781-DescriptionJp = "Rin: \"Precisamos apressar a restauração das áreas residenciais, também para garantir a segurança dos cidadãos.\""
2720792911-NameJp = "O Conselho Estudantil Geral está em reunião"
2720792911-DescriptionJp = "Rin: \"Ayumu... não, Chefe do Escritório de Mediação. Apresente o relatório sobre a situação da recuperação da área.\"\nAyumu: \"S-Sim! O relatório sobre a recuperação, não é?! Vou buscá-lo agora mesmo!\""
1248524252-NameJp = "Um talento surpreendente"
1248524252-DescriptionJp = "Ayumu: \"A-Awawa... A-Assim eu vou cair de novo...\"\nMoe: \"Uau~ Quem diria que a Ayumu-senpai tinha um talento desses. Só fico preocupada se ela não vai cair...\""
2076555680-NameJp = "A Sabotagem Sabor Ovas de Abadejo"
2076555680-DescriptionJp = "Momoka: \"Afinal, doces sabor ovas de abadejo são bons em qualquer hora~ (Croc).\"\nRin: \"…………Momoka?\""
2282918223-NameJp = "Labirinto de pedra concluído!"
2282918223-DescriptionJp = "Hinata: \"Todos conseguiram escapar a salvo? Que alívio!\"\nKoharu: \"……Jogo de fuga……?\""
2182173966-NameJp = "Ruínas subterrâneas concluídas!"
2182173966-DescriptionJp = "Ui: \"Oh…… Isso é……!\"\nHanako: \"Raramente vemos a Ui tão animada. Fufu.\""
742766755-NameJp = "Fazenda de limões concluída!"
742766755-DescriptionJp = "Hinata: \"Que tal levarmos alguns para distribuir aos outros?\"\nKoharu: \"Hã? E-Eu também tenho que fazer isso?\""
2756625307-NameJp = "Farol esquecido concluído!"
2756625307-DescriptionJp = "Hanako: \"Olhe, Ui-san. O vento na pele……\"\nUi: \"Ahhhhhh~ Eu não estou ouvindo! Não estou ouvindo nada!\""
1354203676-NameJp = "Caverna atrás da cachoeira concluída!"
1354203676-DescriptionJp = "Hanako: \"N■■■! P■■■■■! Tira t■■■~! A■~♡!!\"\nKoharu: \"Não fale essas coisas em voz alta! Coisas pervertidas são proibidas! Pena de morte!!\""
3510482019-NameJp = "Profundezas da ilha concluídas!"
3510482019-DescriptionJp = "Ui: \"……Deve ter sido um lugar cheio de memórias preciosas para alguém.\"\nHinata: \"……E agora é para nós também.\""
1430929184-NameJp = "Em movimento……"
1430929184-DescriptionJp = "Hanako: \"Parece que estamos numa excursão, isso é muito bom~♡\"\nUi: \"Haa, haaaa…… i-impossível…… vão mais devagar……\""
1612527987-NameJp = "Palheta da Yoshimi"
1612527987-DescriptionJp = "Uma palheta de guitarra desenhada e produzida pela própria Yoshimi, a (futura?) celebridade. Parece que ela exagerou na quantidade feita."
405568906-NameJp = "Até a exaustão"
405568906-DescriptionJp = "\"Ahaha…… Foi pesado para todos, né…….\""
494840872-NameJp = "Caderno da Airi"
494840872-DescriptionJp = "Um caderno de anotações secretas que a Airi fez para todo mundo. O fato de que nunca conseguimos escapar dos estudos, porém, continua o mesmo de sempre."
1618456696-NameJp = "Foco no canto inferior direito!"
1618456696-DescriptionJp = "\"Uwaaaah!! Apaga isso logo!!!\""
2983071558-NameJp = "Rádio da Natsu"
2983071558-DescriptionJp = "Um pequeno rádio preparado pela grande estrategista Natsu. Ao som da música, a equipe de ginástica será uma só."
1033649487-NameJp = "Um só corpo, uma só mente"
1033649487-DescriptionJp = "\"Mas o que é isso, hein…….\""
3761469925-NameJp = "Bingo de Doces da Kazusa"
3761469925-DescriptionJp = "Um bingo montado pela nossa mais forte capitã de ataque, a Kazusa, fazendo o possível para demonstrar as suas habilidades... ahh! Diga não à violência!!"
1161323409-NameJp = "Queimando a juventude"
1161323409-DescriptionJp = "\"Contemplem, a corajosa figura do Clube de Doces das Horas Livres.\""
128049250-NameJp = "Cenário da Narradora"
128049250-DescriptionJp = "「Você está duvidando da melhor motorista do Tea Party, eu mesma?」\n「A Seia-san não é a única motorista do Tea Party!」"
3186763206-NameJp = "Torcida Especial"
3186763206-DescriptionJp = "「Com isso, eu posso lutar por mais 10 anos……!」\n-Anônimo, Departamento de Investigação Federal Schale"
3588818690-NameJp = "Hora da Retaliação"
3588818690-DescriptionJp = "「Seia-chan, passa direito, tá?」\n「Direito…… é.」"
3450293592-NameJp = "Proteção UV Perfeita"
3450293592-DescriptionJp = "「……Isso foi o que ouvi dizer.」"
1026138108-NameJp = "Pisando no rabo do tigre"
1026138108-DescriptionJp = "「S-Seu idiota……! Eu disse para não mexer com ela……! Guah……」\n-Últimas palavras antes de ser transportado. Membro anônimo do Helmet."
2174565429-NameJp = "A famosa receita secreta"
2174565429-DescriptionJp = "Chá gelado doce, adicione um shot de café expresso e está pronto☆"
2712962423-NameJp = "Choque Cultural"
2712962423-DescriptionJp = "「E-Eles colocam xarope no chá preto? E misturam com café!?」\n「Que barbárie…… o mundo lá fora é muito selvagem……!」"
2618526928-NameJp = "Hora da Ioga"
2618526928-DescriptionJp = "「Que inveja, vocês duas pareciam estar se divertindo tanto~ Ei, quando vão fazer de novo?」\n「Nunca mais.」"
4127946330-NameJp = "Análise Fria"
4127946330-DescriptionJp = "「Vocês não sentem vergonha vestidas assim?」"
2977465568-NameJp = "Sorriso nota 100"
2977465568-DescriptionJp = "「Um tratamento especial só para o Sensei, hein?」"
2827413561-NameJp = "Passeio Subaquático"
2827413561-DescriptionJp = "「Então os boatos de que o Sisterhood pratica tortura com água eram reais……!」\n-Presidente do Comitê de Biblioteca que adora teorias da conspiração, Kozeki Ui"
1879850544-NameJp = "Diva Oculta"
1879850544-DescriptionJp = "「O gosto da Seia-chan é meio brega, né☆」"
2117597489-NameJp = "Arquibancada em Chamas"
2117597489-DescriptionJp = "「……Nagi-chan, está se divertindo?」\n「……? Sim」\n「……Ainda bem」"
194393215-NameJp = "Remoção de Limites"
194393215-DescriptionJp = "Haha, isso é…… problemático, não acha."
1849099105-NameJp = "A Memória do Preço Pago"
1849099105-DescriptionJp = "「Câmera escondida!? Isso é jornalismo, entendeu?」\n-Editora-chefe do Clube de Jornalismo da Escola Kronos, Kazemaki Mai"
1543640472-NameJp = "Lista de Desejos"
1543640472-DescriptionJp = "Pequenas, mas preciosas lembranças, a força motriz para o amanhã."
647268474-NameJp = "Kyou (Má Sorte)"
647268474-DescriptionJp = "Lista de compras para a volta: 250g de carne de porco, 2 batatas, 3 cebolas, 1 cenoura, 1 alho-poró"
1555725293-NameJp = "Kyou (Má Sorte)"
1555725293-DescriptionJp = "Comércio: A carteira estará sempre vazia\nSaúde: Dificuldade em acordar de manhã\nPessoa Esperada: Cuidado com pessoas mascaradas"
909638122-NameJp = "Kyou (Má Sorte)"
909638122-DescriptionJp = "Primeiro, tenha os equipamentos preparados\nSegundo, assegure uma rota de fuga\nTerceiro, assim que conseguir o objetivo, fuja imediatamente"
1661297162-NameJp = "Kyou (Má Sorte)"
1661297162-DescriptionJp = "Os trilhos continuarão a rodar em direção ao futuro da justiça! Temos vários itens de sushi também! Para mais detalhes, acesse o site oficial dos Kaitenger ※Campanha de crowdfunding em andamento!※"
2317250528-NameJp = "Suekichi (Sorte Futura)"
2317250528-DescriptionJp = "Desejos: Talvez se realizem, talvez não\nComércio: O dinheiro gasto retornará ao lugar de origem\nDireção: Confie os seus investimentos à \"Agência de Crédito do Grupo Kurokame\""
4179075589-NameJp = "Suekichi (Sorte Futura)"
4179075589-DescriptionJp = "Desejava uma sorte melhor? Com uma oferta adicional agora, você terá dupla chance de obter melhor sorte da próxima vez! ※Os resultados podem variar de pessoa para pessoa (Grupo Kurokame)"
1883262314-NameJp = "Suekichi (Sorte Futura)"
1883262314-DescriptionJp = "Não fique triste mesmo com a Sorte Futura. Aconteça o que acontecer, você não está sozinho. A \"Seguradora do Grupo Kurokame\" está sempre ao seu lado."
4030255031-NameJp = "Suekichi (Sorte Futura)"
4030255031-DescriptionJp = "Quem liga pra essa sorte! Nós moldamos a nossa própria sorte! Estamos aguardando o contato de pessoas determinadas como você. Nós acreditamos no seu potencial, \"Grupo Kurokame\"."
3228513232-NameJp = "Shoukichi (Pequena Sorte)"
3228513232-DescriptionJp = "Viagens: Ir na loja de conveniência também é viagem\nPessoa Esperada: Na esquina da rua\nSaúde: Correr com uma torrada na boca é bom"
1134549000-NameJp = "Shoukichi (Pequena Sorte)"
1134549000-DescriptionJp = "Parabéns! Provavelmente hoje todos os semáforos vão ficar verdes para você no cruzamento!"
3267689061-NameJp = "Shoukichi (Pequena Sorte)"
3267689061-DescriptionJp = "Até podem dizer que a sorte é \"pequena\", mas o seu futuro é sempre \"infinito\"! Provavelmente significa algo assim!"
499121846-NameJp = "Shoukichi (Pequena Sorte)"
499121846-DescriptionJp = "Será que esse ano vai correr tudo bem com uma Pequena Sorte…… Para você que pensou assim. Das pequenas quantias para um grande futuro, \"Agência de Crédito do Grupo Kurokame\"."
609900746-NameJp = "Chuukichi (Média Sorte)"
609900746-DescriptionJp = "Relacionamentos: Você fará contato visual com a pessoa que te interessa\nPessoa Esperada: No shopping\nViagens: Ir ver as cerejeiras é bom"
2928203362-NameJp = "Chuukichi (Média Sorte)"
2928203362-DescriptionJp = "Isso quer dizer que a balança pode oscilar violentamente para qualquer um dos lados! Prepare-se para uma aventura tempestuosa, mas divertida!"
2307433907-NameJp = "Chuukichi (Média Sorte)"
2307433907-DescriptionJp = "Será um ano que, ao menos, não vai ser ruim. Contudo, faz frio lá fora, então tenha cuidado com a saúde. Ao voltar pra casa, não esqueça de lavar as mãos e gargarejar! Saúde em primeiro lugar!"
3879409653-NameJp = "Chuukichi (Média Sorte)"
3879409653-DescriptionJp = "Mesmo que ainda não tenha sido recompensado, nós torcemos por você e pelos seus esforços. Esperamos que este seja um bom ano!"
2475099392-NameJp = "Kichi (Sorte)"
2475099392-DescriptionJp = "Pessoa Esperada: Virão várias\nItens Perdidos: Estão com certeza muito perto\nEstudos: O esforço, com certeza, trará o resultado desejado"
1939176149-NameJp = "Kichi (Sorte)"
1939176149-DescriptionJp = "Sua sorte é \"Kichi\"! Parece suave, mas às vezes, isso é o que importa. Vamos aproveitar esse ano com muita tranquilidade e sorte!"
226724583-NameJp = "Kichi (Sorte)"
226724583-DescriptionJp = "Apesar de não ser a melhor de todas, você ainda pode ser feliz! Que você tenha um ano cheio de sorrisos!"
422101479-NameJp = "Kichi (Sorte)"
422101479-DescriptionJp = "Saúde: Você pode esquivar de balas se prestar atenção nelas\nCompetições: Sem problemas\nAlegria: Será um bom ano"
2677997047-NameJp = "Daikichi (Grande Sorte)"
2677997047-DescriptionJp = "Desejos: Com certeza vão se realizar\nComércio: Não precisa se preocupar com nada\nPessoa Esperada: Virá"
2043188119-NameJp = "Daikichi (Grande Sorte)"
2043188119-DescriptionJp = "Parabéns! Sem dúvidas, você será a protagonista deste ano!"
266718355-NameJp = "Daikichi (Grande Sorte)"
266718355-DescriptionJp = "Prosperidade nos negócios, paz na família, saúde perfeita! Sua cor da sorte é azul-claro transparente!"
1124846343-NameJp = "Daikichi (Grande Sorte)"
1124846343-DescriptionJp = "Sua sorte é Grande Sorte! Os seus esforços serão recompensados e os seus desafios acabarão em sucesso! Muitas pessoas estão torcendo por você, acredite em si mesma e lute!"
964504315-NameJp = "Kyou (Peito)"
964504315-DescriptionJp = "Lista de compras para hoje: 1 pacote de caldo para ensopado, 250g de frango, 2 batatas, 3 cebolas, 1 cenoura, 1 brócolis, 1 garrafa de molho ponzu……"
199728885-NameJp = "Kyou (Peito)"
199728885-DescriptionJp = "Parece que é bom ter cuidado com intoxicação alimentar! Mas eu nunca tive algo assim! Falando nisso, você quer provar este \"suco de pepino do mar coberto com chocolate\"?"
1759134687-NameJp = "Kyou (Peito)"
1759134687-DescriptionJp = "Quase não há como salvar ingredientes amassados. O máximo de piedade que pode mostrar é ferver e depois bater no liquidificador para transformá-los numa sopa."
4232612005-NameJp = "Kyou (Peito)"
4232612005-DescriptionJp = "Eu deixei cair a comida…… Mas encontrei uma moeda no chão."
2722903738-NameJp = "Falar"
2722903738-DescriptionJp = "A sorte é Futura! As perdas são o começo do ganho... é o que diz! Eu quero comer alguns bolinhos doces..."
2264344015-NameJp = "Falar"
2264344015-DescriptionJp = "Vejamos…… Diz que é Sorte Futura! Vou te dar um pudim de polvo com menta!"
3089424248-NameJp = "Falar"
3089424248-DescriptionJp = "Uma comida malcozida ainda tem salvação. É só cozinhar mais um pouco! Mas, se queimar, aí já não tem como."
1618617468-NameJp = "Falar"
1618617468-DescriptionJp = "A pessoa que tirou essa sorte…… Uma jornada de mil milhas começa com um único passo…… Fufu, a estrada para o nível gourmet está repleta de dificuldades."
839518806-NameJp = "Falar"
839518806-DescriptionJp = "Dizem que a Sorte Futura é um sinal de que logo se transformará em Sorte de fato. Afinal, ninguém sabe o que o futuro nos reserva."
239549900-NameJp = "Falar"
239549900-DescriptionJp = "Motivos para comemorar…… Outono e inverno são bons, primavera e verão não são recomendáveis…… O outono e o inverno…… É agora★"
3417604566-NameJp = "Pequena Sorte"
3417604566-DescriptionJp = "É uma Pequena Sorte! Não se aproxime do perigo, não se envergonhe perante os céus…… bem, eu acho que significa algo bom!"
3872470199-NameJp = "Pequena Sorte"
3872470199-DescriptionJp = "A sorte é pequena. Como se diz que a sorte vem das coisas pequenas, espero que pequenas alegrias te acompanhem, assim como as chuvas de verão que rapidamente vão embora!"
4154538605-NameJp = "Pequena Sorte"
4154538605-DescriptionJp = "Sua sorte desta vez é Pequena Sorte! Não importa o quão apressado você entre no trem, nunca vai pegar a direção errada!"
1652241604-NameJp = "Pequena Sorte"
1652241604-DescriptionJp = "Eles não dizem para seguir em frente guiado pelas estrelas? E não pela luz do barco que já passou."
2851981489-NameJp = "Pequena Sorte"
2851981489-DescriptionJp = "Dias ensolarados vêm para quem espera, preste muita atenção…… É isso. Isso significa que as minhas habilidades culinárias vão melhorar?"
228389323-NameJp = "Pequena Sorte"
228389323-DescriptionJp = "Vamos reunir os ingredientes um de cada vez. Até a comida ficar pronta!"
3038779302-NameJp = "Média Sorte"
3038779302-DescriptionJp = "Romance - Fará contato visual com a pessoa que te interessa\nEncontros - No fim de semana, na rua dos festivais\nCompromissos - Desfrutarão do festival de fogos de artifício juntos"
284642160-NameJp = "Média Sorte"
284642160-DescriptionJp = "Desta vez é Média Sorte. Parabéns★. De vez em quando seria ótimo comer até não aguentar mais, sabe?"
2426075748-NameJp = "Média Sorte"
2426075748-DescriptionJp = "Refeições ricas e fartas sob a luz da lua... é o que diz. Refeições servidas no campo à luz do luar têm um sabor ainda melhor. Fufu."
1325967005-NameJp = "Média Sorte"
1325967005-DescriptionJp = "Se a comida é a coisa mais importante na vida, será que a boa sorte fica em que lugar? Parabéns pela sua Média Sorte."
4022503532-NameJp = "Média Sorte"
4022503532-DescriptionJp = "Diz que uma excelente oportunidade virá de repente nas suas mãos... Me pergunto se eu deveria fazer um pato assado?"
2197323664-NameJp = "Média Sorte"
2197323664-DescriptionJp = "Viajar dará algum trabalho, mas o destino será abençoado. Para o ano novo, devo comer comidas deliciosas. Isso sim que é alegria!"
294425413-NameJp = "Sorte"
294425413-DescriptionJp = "Pessoa Esperada - Virá\nFelicidade - Virá\nSe a pessoa que vier se sentir pra baixo, você deve ajudar."
2086697042-NameJp = "Sorte"
2086697042-DescriptionJp = "A sorte da pessoa que tirou esse papel é…… Desejos - Eles se realizarão se você for sincero nos seus esforços. Tenha cuidado, pois os desejos maliciosos se provarão fúteis."
657860840-NameJp = "Sorte"
657860840-DescriptionJp = "Não há felicidade maior do que ver todo mundo comendo uma refeição feita com tanta dedicação. Espero que este ano seja de muita felicidade!"
128516439-NameJp = "Sorte"
128516439-DescriptionJp = "Sensei~ Desta vez é Sorte. Mesmo uma vaca consegue atravessar longas distâncias, as águas profundas do rio podem ser cruzadas nas águas rasas…… Esta vaca não deve estar com fome, né?"
2382060588-NameJp = "Sorte"
2382060588-DescriptionJp = "A sorte de quem tirou isso é: assim que a árvore florir, as suas preocupações passadas vão desaparecer, as suas preocupações vão se dissipar, e muitas alegrias se seguirão... Bem, como são muitas alegrias que se seguirão, rezo para que haja pelo menos mais um dia de paz."
370799142-NameJp = "Sorte"
370799142-DescriptionJp = "Eu fiz uma ceia de Ano Novo para todo o mundo. Por favor, coma se quiser!"
1512780410-NameJp = "Grande Sorte"
1512780410-DescriptionJp = "Encontro - Debaixo da árvore lendária\nMudança de Residência - O futuro parece melhor do que o presente\nCulinária - Aproveite-a ao máximo no centro da cidade"
997253011-NameJp = "Grande Sorte"
997253011-DescriptionJp = "Oh! É Grande Sorte. Fufu, me pergunto que iguarias nos aguardam este ano?"
940731399-NameJp = "Grande Sorte"
940731399-DescriptionJp = "Desejo - Realiza-se\nEstudo - Não negligencie os seus esforços\nO que se perdeu - Perto de si\nCulinária - O trabalho árduo compensa"
555506678-NameJp = "Grande Sorte"
555506678-DescriptionJp = "Apenas se aproveitarmos um pouco as grandes ondas feitas pelo Peixe Gigante e surfá-las, ganharemos muitos pratos de Ano Novo, e uma pargo da época... A pargo da época seria maravilhoso★"
3840660582-NameJp = "Grande Sorte"
3840660582-DescriptionJp = "Uma grande sorte, parabéns. Acredite, coisas boas vão acontecer."
1744408890-NameJp = "Grande Sorte"
1744408890-DescriptionJp = "É possível se sair muito bem se fizer o que gosta, então treine com afinco. ...Certo, eu também vou me esforçar muito!"
