870330457-DescriptionJp = "Uma varanda perfeita para desfrutar de uma festa tranquila. Beber algo enquanto observa a paisagem externa é algo especial."
3765659014-NameJp = "Mesa Grandiosa"
3765659014-DescriptionJp = "Uma mesa que se destaca pela sua dignidade e beleza."
