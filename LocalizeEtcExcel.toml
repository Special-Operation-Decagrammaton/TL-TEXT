2677521194-DescriptionJp = "A campanha de {0}x (+{1}%) de EXP de Nível de Sensei está em andamento.\nO bônus de EXP de Nível de Sensei é aplicado ao consumir AP.\n(Missões, Comissões, Intercâmbio Escolar, Eventos, etc.)"
