1126057941-NameJp = "Vaso de Pedra Branco"
1126057941-DescriptionJp = "Um vaso de pedra branco com plantas frescas dispostas de forma bela. Proporciona uma atmosfera elegante e refrescante ao mesmo tempo."
2236454775-NameJp = "Mesa Clássica Iluminada"
2236454775-DescriptionJp = "Uma mesa clássica com uma luz suave impressionante. Cria uma atmosfera refrescante onde quer que seja colocada."
458694634-NameJp = "Decoração de Parede Grandiosa"
458694634-DescriptionJp = "Uma decoração de parede com um design clássico marcante. O álbum que confere dignidade a uma parede sem graça é o destaque!"
4061847588-NameJp = "Álbum Estilo Gehenna"
4061847588-DescriptionJp = "Um álbum exibido em uma moldura luxuosa. Um item importante e indispensável para festas elegantes."
1001007068-NameJp = "Estante de Obras-Primas"
1001007068-DescriptionJp = "Uma estante que embeleza o salão de festas elegante. Composta por obras-primas recomendadas pelos alunos de Gehenna."
1250369711-NameJp = "Tapete Estilo Barroco"
1250369711-DescriptionJp = "Um tapete estilo barroco caracterizado por decorações luxuosas. Decora o chão de forma bela."
268835141-NameJp = "Carrinho Clássico de 2 Andares"
