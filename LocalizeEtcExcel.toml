1193459121-NameJp = "Pilar com Padrão da Sala de Aula de Trinity"
1193459121-DescriptionJp = "Um pilar com um padrão delicado que chama a atenção. Exala uma sensação de luxo."
2843641596-NameJp = "Pilar com Luminária da Sala de Aula de Trinity"
2843641596-DescriptionJp = "Um pilar equipado com uma pequena luminária. Uma luz quente ilumina a sala de aula."
1104421410-NameJp = "Lousa da Sala de Aula de Trinity"
1104421410-DescriptionJp = "Uma lousa cheia de rabiscos dos alunos. Você pode escolher usar giz ou marcador, o que preferir!"
2720605122-NameJp = "Mesa do Professor da Sala de Aula de Trinity"
2720605122-DescriptionJp = "Uma mesa de professor com livros didáticos e materiais de ensino. É uma mesa de alta qualidade, digna de uma aula de alto nível."
462704385-NameJp = "Mesa com Boneco Peroro"
462704385-DescriptionJp = "Uma mesa com um fofo boneco Peroro. Fica claro que o boneco é tratado com muito carinho."
1825412664-NameJp = "Mesa com Bolsa Pendurada"
1825412664-DescriptionJp = "Uma mesa com uma bolsa de couro gravada com o emblema da escola de Trinity pendurada. Parece que não seria uma boa ideia abri-la, nem mesmo por brincadeira."
2175237187-NameJp = "Mesa com Arma e Bolsa"
2175237187-DescriptionJp = "Um conjunto de mesa com uma arma e uma bolsa. Parece que, para emergências, elas são deixadas aqui em vez de em um suporte de armas."
145892471-NameJp = "Mesa com a Bolsa do Peroro-sama"
145892471-DescriptionJp = "Um conjunto de mesa com a bolsa do Peroro-sama. Por algum motivo, um sorriso enorme surge no rosto ao vê-la."
769996537-NameJp = "Divisória de Janela Simples da Sala de Aula de Trinity"
769996537-DescriptionJp = "Uma divisória extensível caracterizada por uma delicada moldura de madeira. Torna o espaço delimitado mais arejado e sem sensação de aperto."
2615783174-NameJp = "Divisória de Janela Dupla da Sala de Aula de Trinity"
2615783174-DescriptionJp = "Uma divisória extensível caracterizada por uma delicada moldura de madeira. Proporciona uma sensação de abertura ao espaço delimitado."
3595322546-NameJp = "Divisória Simples da Sala de Aula de Trinity"
