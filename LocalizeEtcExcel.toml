1662125760-DescriptionJp = "Obtido no evento Grande Operação de Limpeza do Departamento de Desenvolvimento de Jogos!"
1094002594-NameJp = "Chocolate das Três Relíquias Sagradas do Beisebol"
1094002594-DescriptionJp = "Luva, bastão e bola. Dizem que com esses três itens, você pode jogar beisebol com qualquer pessoa. O fato de terem reproduzido tudo isso em chocolate... mostra o quanto de sentimento foi colocado nisso."
506164489-NameJp = "Bolinha de Chocolate Super Lançamento!!"
506164489-DescriptionJp = "Um lanche novo e quentinho que Hikari me deu. Ela resistiu à vontade de comer para me presentear."
1272169695-NameJp = "Gelatina Nutritiva de Recuperação de Fadiga"
1272169695-DescriptionJp = "Uma gelatina cheia de nutrientes. Pode ser o presente perfeito para o Sensei, que está cansado das tarefas diárias."
1649572559-NameJp = "Envelope Amassado e Bilhete"
1649572559-DescriptionJp = "Dentro do envelope um pouco amassado, há um chocolate comprado em loja. Qual será o conteúdo do bilhete que acompanha o chocolate...?"
3907944625-NameJp = "Donzela Branca"
3907944625-DescriptionJp = "Biscoitos de chocolate da marca Ebisu, vendidos por toda a região de Hyakkiyako. São levemente cobertos com chocolate branco. O único problema é que sujam as mãos facilmente."
950107355-NameJp = "Chocolate em Caixa de Presente"
950107355-DescriptionJp = "Uma caixa luxuosamente embalada. Dentro, há apenas um chocolate feito à mão. Embora seja apenas um, é um item repleto da travessura de Niya."
2522956263-NameJp = "Chocolate com Magia (?)"
2522956263-DescriptionJp = "Um chocolate que Eri afirma ter infundido com sua própria magia. Sinto como se minhas forças estivessem se renovando ao comê-lo."
3646064924-NameJp = "Muffin de Chocolate Fantasma"
3646064924-DescriptionJp = "Um muffin decorado com um fantasminha fofo. Ao olhar para ele, sinto como se pudesse ouvir a voz de Kanoe vindo de algum lugar."
1600461265-NameJp = "Tiramisu Literário"
1600461265-DescriptionJp = "Um tiramisu que fica ainda mais gostoso quando resfriado. Talvez a conversa trocada enquanto ele gela na geladeira seja a parte mais doce de todas."
788496083-NameJp = "Gobstopper de Chocolate Extra Grande"
788496083-DescriptionJp = "Um tipo de doce para morder e comer. Vamos aproveitar a doçura lentamente enquanto o giramos na boca."
2100977290-NameJp = "Estátua de Chocolate"
2100977290-DescriptionJp = "Gigante, não derrete e tem uma aparência linda. É o chocolate perfeito, exceto pelo fato de que não pode ser comido."
2647895027-NameJp = "Chocolate Picotado"
2647895027-DescriptionJp = "Um item raro, disponível comercialmente, que desperta o espírito de colecionador."
1217736606-NameJp = "Biscoito de Suspiro de Chocolate"
1217736606-DescriptionJp = "Um biscoito feito assando suspiro, preparado batendo claras de ovo e açúcar, com adição de pó de chocolate.\nOs ingredientes são importantes."
165942245-NameJp = "Kartoshka"
165942245-DescriptionJp = "Um bolo de chocolate feito misturando farinha, leite condensado, açúcar, cacau e canela.\nAs possibilidades de qualquer pessoa são infinitas."
1366975366-NameJp = "Medovik de Chocolate"
1366975366-DescriptionJp = "Um bolo com várias camadas de massa de chocolate e creme de mel e chocolate.\nNegociações e contratos são importantes."
4174179093-NameJp = "Chocolate (Supostamente) Comercial"
4174179093-DescriptionJp = "Um chocolate que dizem ter sido comprado em uma loja.\nÀs vezes, é preciso fingir que não percebeu, mesmo que a verdade seja outra."
799234819-NameJp = "Conjunto de Presentes\nPacote Mensal"
799234819-DescriptionJp = "Um produto que inclui presentes para estudantes e Pirita.\nAo comprar, você recebe 668 Piritas (600 pagas + 68 gratuitas de bônus).\n*Consulte os detalhes do pacote no conteúdo do produto abaixo."
