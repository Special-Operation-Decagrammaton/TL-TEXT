2494422881-NameJp = "普通のスプリング"
2494422881-DescriptionJp = "銃のトリガーを前進させるために使用されるスプリング。普通にきちんとした状態で、新品のように保存されていた。固有武器の強化に使用可能。"
3351867875-NameJp = "クロムスプリング"
3351867875-DescriptionJp = "銃のトリガーを前進させるために使用されるスプリング。クロムの合金でできており、丈夫で錆びない。固有武器の強化に使用可能。"
1382166670-NameJp = "チタンスプリング"
1382166670-DescriptionJp = "銃のトリガーを前進させるために使用されるスプリング。チタン合金でできており、丈夫な上に軽い。固有武器の強化に使用可能。"
596368071-NameJp = "上級強化珠"
596368071-DescriptionJp = "装備を強化できる神秘的な珠。"
1503462181-NameJp = "錆びたハンマー"
1503462181-DescriptionJp = "引き金を引いた時に撃針に力を伝達するための部品。ひどい管理のされ方をしていたのか、あちこちが錆びついている。固有武器の強化に使用可能。"
250804865-NameJp = "スポーツグローブ"
250804865-DescriptionJp = "滑りにくいよう、手のひら側がでこぼこになっているスポーツグローブ。材質に難燃素材を使用しているため、熱い銃身に触れる時も安心。"
2642735370-NameJp = "ニットのミトン"
2642735370-DescriptionJp = "アウトドアブランド「マナスル」の、女子高生をターゲットにした手袋。保温性はやや心許ないが、デザインの可愛さで人気の商品。"
1332059101-NameJp = "ペロロの鍋掴み"
1332059101-DescriptionJp = "「モモフレンズ」のマスコットキャラクター「ペロロ」デザインの白い鍋掴み。これを着けると、突然踊り出したくなるらしい。"
1759502696-NameJp = "レザーグローブ"
1759502696-DescriptionJp = "高級革を使用しているグローブ。耐久性はそれほど高くなく、主に式典やパーティなどで使われる。"
2952456681-NameJp = "タクティカルグローブ"
2952456681-DescriptionJp = "防炎素材を使用して作られた、丈夫なタクティカルグローブ。たとえ熱せられた棒を握ってたとしても問題無し！"
4188994934-NameJp = "レースのグローブ"
4188994934-DescriptionJp = "サテン素材で作られた、高級感のあるデザインのグローブ。熱に弱いため、火気を取り扱う際にはご注意。"
1332723028-NameJp = "アームカバー"
1332723028-DescriptionJp = "紫外線対策とファッション、その二つの要素を同時に求める生徒のためのアームカバー。季節の変わり目などにおススメ。"
3739266178-NameJp = "パールヤーングローブ"
3739266178-DescriptionJp = "真珠の装飾が施されたヤーングローブ。指の部分は露出しているので、精巧な作業をするのにも問題ない。"
489725691-NameJp = "普通のハンマー"
489725691-DescriptionJp = "引き金を引いた時に撃針に力を伝達するための部品。普通にきちんとした状態で、新品のように保存されていた。固有武器の強化に使用可能。"
1275230444-NameJp = "クロムハンマー"
1275230444-DescriptionJp = "引き金を引いた時に撃針に力を伝達するための部品。クロムの合金でできており、丈夫で錆びない。固有武器の強化に使用可能。"
563331103-NameJp = "チタンハンマー"
563331103-DescriptionJp = "引き金を引いた時に撃針に力を伝達するための部品。チタン合金でできており、丈夫な上に軽い。固有武器の強化に使用可能。"
2336304110-NameJp = "最上級強化珠"
2336304110-DescriptionJp = "装備を強化できる神秘的な珠。"
3590797977-NameJp = "錆びた銃身"
3590797977-DescriptionJp = "打ち出される弾丸が通過する筒状の部品。ひどい管理のされ方をしていたのか、あちこちが錆びついている。固有武器の強化に使用可能。"
528434676-NameJp = "ピンクスニーカー"
528434676-DescriptionJp = "スポーツウェアブランド「サーバル」から発売された、ピンク色のスニーカー。内側に柔らかい素材を使用しているため、ランニングに最適。"
4067164356-NameJp = "ムートンブーツ"
4067164356-DescriptionJp = "アウトドアブランド「マナスル」のブーツ。デザインの可愛らしさもさることながら、保温性にも優れており、寒い地方の女子高生たちに人気が高い。"
3223551422-NameJp = "ピンキーパカのスリッパ"
3223551422-DescriptionJp = "「モモフレンズ」のピンクのアルパカ、ピンキーパカをモチーフにしたスリッパ。ふかふかで断熱性もしっかりとしている。"
2109585756-NameJp = "アンティークなエナメルローファー"
2109585756-DescriptionJp = "トリニティ総合学園の生徒たちが履いているローファー。エナメル塗料で仕上げているため、光を受けると靴の先が輝く。"
997278570-NameJp = "戦闘用ブーツ"
997278570-DescriptionJp = "足を保護するため、厚めの素材で丈夫に作られた戦闘用のブーツ。かかと部分が盛り上がっているため、シークレットシューズ的な要素を兼ね備えており、自身を大人っぽく見せたい生徒や、身長が気になる生徒たちに愛用されている。"
1477837784-NameJp = "ヒールパンプス"
1477837784-DescriptionJp = "可愛らしさとシンプルさを兼ね備えたハイヒール。これを履いて歩くと、どことなくいつもより優雅な歩き方に。"
134212594-NameJp = "カジュアルスニーカー"
134212594-DescriptionJp = "シンプルなデザインのスニーカー。軽くてフィット感も良く、多くの生徒から支持されている。"
2721346391-NameJp = "防水登山ブーツ"
2721346391-DescriptionJp = "天然ゴムに防水コーティングを施した通気性と耐久性に優れた登山用ブーツ。水に落ちても表面は濡れない。"
2753922894-NameJp = "普通の銃身"
2753922894-DescriptionJp = "打ち出される弾丸が通過する筒状の部品。普通にきちんとした状態で、新品のように保存されていた。固有武器の強化に使用可能。"
3047737247-NameJp = "クロム銃身"
3047737247-DescriptionJp = "打ち出される弾丸が通過する筒状の部品。クロムの合金でできており、丈夫で錆びない。固有武器の強化に使用可能。"
3465834983-NameJp = "チタン銃身"
3465834983-DescriptionJp = "打ち出される弾丸が通過する筒状の部品。チタン合金でできており、丈夫な上に軽い。固有武器の強化に使用可能。"
1498728523-NameJp = "錆びた撃針"
1498728523-DescriptionJp = "弾丸の雷管に衝撃を与えるための金属の部品。ひどい管理のされ方をしていたのか、あちこちが錆びついている。固有武器の強化に使用可能。"
1750123462-NameJp = "防水スポーツバッグ"
1750123462-DescriptionJp = "「サーバル」が製作した防水加工のスポーツバッグ。水が染みない素材で作られているため、川や海に持って行っても安心。"
2248449388-NameJp = "寒冷地用バッグ"
2248449388-DescriptionJp = "「マナスル」が製作した寒冷地用のバッグ。裏地が厚い素材で作られており、飲み物などを冷めないようにきっちり保温してくれる。"
4159521152-NameJp = "ペロロのバッグ"
4159521152-DescriptionJp = "ペロロが大きくプリントされたバッグ。収納スペースが広く、ペロロマニアでない普通の人達にも人気がある。"
940066526-NameJp = "紺色のスクールバッグ"
940066526-DescriptionJp = "トリニティ総合学園の校則に従って製作されたスクールバッグ。そのシンプルで高級なデザインは、他校の生徒からも人気が高い。"
3539400576-NameJp = "戦闘用ランドセル"
3539400576-DescriptionJp = "機能性と収納性とを強化した「カゼヤマ」社特別製のランドセル。小型の武装をたくさん持ち歩きたい生徒たちに好評のもよう。"
4276374506-NameJp = "デビルウイングのトートバッグ"
4276374506-DescriptionJp = "大きな翼が描かれたトートバッグ。比較的シンプルなデザインをしており、カジュアルな服装にもバッチリ。"
1637503010-NameJp = "ストリートバッグ"
1637503010-DescriptionJp = "カジュアルな雰囲気に実用性を加えたストリートバッグ。たっぷり収納できるため、多くの生徒に愛用されている。"
3101552643-NameJp = "蝶柄のショルダーバッグ"
3101552643-DescriptionJp = "大きな蝶々が描かれたショルダーバッグ。軽い素材なので、旅行に持って行っても負担にならない。"
1441450061-NameJp = "普通の撃針"
1441450061-DescriptionJp = "弾丸の雷管に衝撃を与えるための金属の部品。普通にきちんとした状態で、新品のように保存されていた。固有武器の強化に使用可能。"
1068433115-NameJp = "クロム撃針"
1068433115-DescriptionJp = "弾丸の雷管に衝撃を与えるための金属の部品。クロムの合金でできており、丈夫で錆びない。固有武器の強化に使用可能。"
1300399581-NameJp = "チタン撃針"
1300399581-DescriptionJp = "弾丸の雷管に衝撃を与えるための金属の部品。チタン合金でできており、丈夫な上に軽い。固有武器の強化に使用可能。"
2140743564-NameJp = "サーバルのメタルバッジ"
2140743564-DescriptionJp = "有名なスポーツウェアブランド「サーバル」のロゴバッジ。丈夫な金属で作られているため、青春の汗と情熱の中でも摩耗の心配なし。"
1505921304-NameJp = "マナスルのフェルトバッジ"
1505921304-DescriptionJp = "アウトドアブランド「マナスル」のロゴバッジ。柔らかいフェルト製のため、温度の変化が大きくても変形の心配が少ない。"
3033340240-NameJp = "アングリーアデリーのバッジ"
3033340240-DescriptionJp = "「モモフレンズ」のアングリーアデリーが描かれたバッジ。ずっと見つめていると気分が悪くなるかも……。"
344772093-NameJp = "ベロニカの刺繍バッジ"
344772093-DescriptionJp = "有名ブランド「ベロニカ」のロゴが刺繍されたバッジ。どんな既製品でも、これをつけると高級品に見える。"
2127407973-NameJp = "カゼヤマのワッペン"
2127407973-DescriptionJp = "ミリタリー専門ブランド「カゼヤマ」のロゴが印刷されたワッペン。裏側の面ファスナーを利用して、衣服などに簡単に付けることができる。"
3784559011-NameJp = "ココデビルのバッジ"
3784559011-DescriptionJp = "ゴスロリ系ブランド「ココデビル」のロゴが印刷されたシルバーのバッジ。裏側のピンを使うことで、ブローチのように身に着けることができる。"
589220143-NameJp = "ストリートバッジ"
589220143-DescriptionJp = "ストリートファッションブランド「トリプルステップ」の新作バッジ。社名を中央に大きく印刷した大胆さからは、制作者の自信が窺える。"
49559053-NameJp = "ローレライバッジ"
49559053-DescriptionJp = "モダンファッションブランド「ローレライ」から発売されたバッジ。無垢材に精巧な加工を施しているため、表面が滑らかで良い香りがするという。"
1494732916-NameJp = "テニス用ヘアバンド"
1494732916-DescriptionJp = "スポーツウェアブランド「サーバル」から発売されているテニス用ヘアバンド。運動中の汗が落ちても目に入らないよう、吸収性の高い素材で作られている。"
3940891435-NameJp = "シュシュ"
3940891435-DescriptionJp = "サテン素材で作られている、弾力性に優れたシュシュ。温かい汁物やラーメンなどを食べる時は、このシュシュで髪を縛っておくのがおススメ。"
3392023658-NameJp = "モモのヘアピン"
3392023658-DescriptionJp = "「モモトーク」のアイコンの形をしたブローチが付いたヘアピン。ブローチをこすると、ほのかに桃の香りがする。"
2520092463-NameJp = "翼のヘアピン"
2520092463-DescriptionJp = "有名ブランド「ベロニカ」が、天使の翼をモチーフに製作したヘアピン。トリニティの生徒たちにはあまり人気がない模様。"
765040081-NameJp = "多目的ヘアピン"
765040081-DescriptionJp = "片側が研磨されて鋭利な形状になっているため、有事の際には栓抜きやポケットナイフとしても活用できる多目的型のヘアピン。普通に使おうと思って手を傷つけてしまう可能性もあるので、その辺りはご注意を。"
277995823-NameJp = "コウモリのヘアピン"
277995823-DescriptionJp = "黒いリボンにも見えるコウモリの羽のヘアピン。これを付けるだけでまるで小悪魔のような魅力が。"
1353993108-NameJp = "カリグラフィーヘアピン"
1353993108-DescriptionJp = "文字でデザインされたヘアピン。文字列そのものに意味はないが、どこか胸をときめかせてくれるデザイン。"
3000997093-NameJp = "リーフヘアピン"
3000997093-DescriptionJp = "葉っぱの形をしたヘアピン。普段使いには少し難しいが、オシャレをした日につけると良いだろう。"
3948898300-NameJp = "交通安全のお守り"
3948898300-DescriptionJp = "事故などが起こらないよう、交通安全の祈りが込められたお守り。振ってみると、中からジャラジャラという金属っぽい音がする。"
2028861040-NameJp = "発熱カイロ"
2028861040-DescriptionJp = "揉んだり振ったりすると温かくなる、手のひらサイズのカイロ。酷寒の環境下で、これほど頼りがいのあるものもそうそう無い。"
1207585231-NameJp = "ペロロのお守り"
1207585231-DescriptionJp = "大きな白い羽のお守り。羽毛の出所については、機密情報とのこと。"
3129277640-NameJp = "クルス"
3129277640-DescriptionJp = "トリニティの生徒たちに愛用されている、十字架の形をしたお守り。バッグにぶら下げるアクセサリーとしてもぴったりだと評判。"
1991164124-NameJp = "カモフラダルマ"
1991164124-DescriptionJp = "カモフラージュ柄のだるま。どこに置いても自然に背景へと溶け込むが、どこにでも置かれるとちょっと怖い。"
237084781-NameJp = "呪いの人形"
237084781-DescriptionJp = "怨念などの強い感情がこめられていそうな呪いの人形。針刺しとして使いやすいらしく、手芸部の生徒たちに人気が高い。"
3113501019-NameJp = "ポケット消臭剤"
3113501019-DescriptionJp = "機能的化粧品ブランド「シーサイド」とのコラボで制作された携帯消臭剤。そのファッショナブルなデザインから、キーホルダーにつけてアクセサリーのように活用する生徒も多い。"
3888622253-NameJp = "ドリームキャッチャー"
3888622253-DescriptionJp = "悪夢を消してくれるという呪術的な意味を持つものである。匂いを嗅ぐと、木特有の良い香りがする。"
727987239-NameJp = "デジタルウォッチ"
727987239-DescriptionJp = "スポーツウェアブランド「サーバル」のデジタルウォッチ。防水仕様なので、泳ぐ時なども着用したままでOK。"
111602846-NameJp = "レザーの腕時計"
111602846-DescriptionJp = "アウトドアブランド「マナスル」の時計。革製のため、装着部分の手首が冷える心配がない。"
2073706703-NameJp = "ウェーブキャットの時計"
2073706703-DescriptionJp = "「モモフレンズ」のキャラクター「ウェーブキャット」が描かれた腕時計。ウェーブキャットの両腕が時計の針になっているため、時間に応じて奇怪に捻じれていく様が見られる。"
1058159756-NameJp = "アンティークな懐中時計"
1058159756-DescriptionJp = "「ベロニカ」のロゴが刻印されたアンティークな懐中時計。腕時計に比べて確認に手間がかかるのは短所だが、ファッションアイテムとして人気が高い。"
3773560632-NameJp = "防塵型の腕時計"
3773560632-DescriptionJp = "ミリタリー専門ブランド「カゼヤマ」で製作された防塵型の腕時計。過酷な環境下でも、故障の心配をすることなく使用することができる。"
2415212758-NameJp = "ゴシック風の腕時計"
2415212758-DescriptionJp = "ゴシック風にデザインされた腕時計。クラシカルな服などによく似合うものの、慣れないと時間が読みにくいという弱点がある。"
3475264813-NameJp = "ストリートファッションウォッチ"
3475264813-DescriptionJp = "モダンで可愛いデザインが人気のストリートファッションウォッチ。「トリプルステップ」はこの時計と合わせて、ブレスレットをセット売りする戦略を立てているとか。"
2321708498-NameJp = "ローレライの腕時計"
2321708498-DescriptionJp = "モダンファッションブランド「ローレライ」から発売された腕時計。木と革を使用した洗練されたデザインが独特な雰囲気を醸し出している。"
1506609692-NameJp = "ブルートゥースのネックレス"
1506609692-DescriptionJp = "着用している人の体温や心拍数などを測定できるブルートゥース機能を搭載したネックレス。運動量を簡単に把握することができるため、特にダイエットを志す人たちに愛用されている。「ダイエットの必需品」と呼ばれているが、果たして笑顔で外せる日は来るのか。"
3750431669-NameJp = "雪花のペンダント"
3750431669-DescriptionJp = "雪模様の装飾がついた銀色のペンダント。長い時間見つめていると、なんだか優しい気持ちになれる。"
4279598505-NameJp = "ニコライのロケットペンダント"
4279598505-DescriptionJp = "「モモフレンズ」のキャラクター「Mr.ニコライ」の顔がぶら下がったようなロケットペンダント。鼻の部分を押すと、写真を入れられる小さなスペースが開く。"
2508370757-NameJp = "十字架のチョーカー"
2508370757-DescriptionJp = "有名ブランド「ベロニカ」から発売された、十字架の装飾が付いたチョーカー。シンプルだが洗練されたデザインのため人気が高い。"
1517613390-NameJp = "ドッグタグ"
1517613390-DescriptionJp = "学籍番号と名前が刻まれたドッグタグ。最近特に女子高生たちの間で、大きな人気を集め始めている。"
1964406377-NameJp = "パンクチョーカー"
1964406377-DescriptionJp = "鋭いスパイクがしつらえられたパンクスタイルのチョーカー。首に着けるとちょっと頷きにくくなる。"
2501983868-NameJp = "チェーンネックレス"
2501983868-DescriptionJp = "チェーンで作られたネックレス。ジャラジャラと響く音が心地良いという生徒もいれば、冷たい感触が苦手という生徒もおり、評価は割れるところ。"
3300639114-NameJp = "グリーンリーフネックレス"
3300639114-DescriptionJp = "モダンファッションブランド「ローレライ」から発売されたネックレス。 光を受けると葉っぱにほのかな光沢が出るという。"
3393952632-NameJp = "LocalizeError"
3393952632-DescriptionJp = "LocalizeError"
1448270761-NameJp = "イベントチャレンジステージ5ヒント"
1448270761-DescriptionJp = "弱体状態を解除するスキルを使ってゲブラのミサイルを攻略しましょう。\n凍結にかからないためには修復材保管装置を利用しましょう。"
2396453793-NameJp = "イベントチャレンジステージ6ヒント"
2396453793-DescriptionJp = "特異現象捜査部が味方を支援します。\n\n敵を倒すと、特異現象捜査部がデータを収集して解析を行います。\nデータの解析が完了すると、ゲブラが弱体化し、同時に味方は強化されます。"
3833784038-NameJp = "イベントチャレンジステージ1ヒント"
3833784038-DescriptionJp = "カスミが列車にあらかじめ設置した爆弾を避けるため前方車両へ逃げます。\n爆弾が爆発する前に、前方車両まで避難してください。"
3483475612-NameJp = "イベントチャレンジステージ2ヒント"
3483475612-DescriptionJp = "範囲攻撃に気をつけてください。\n\n後方からの襲撃に備えましょう。"
4029303020-NameJp = "イベントチャレンジステージ3ヒント"
4029303020-DescriptionJp = "味方ストライカー生徒のコスト回復速度が大幅に減少します。\n\n敵を倒したり、自動販売機を破壊したりすると、コストを一定量獲得します。"
28119784-NameJp = "イベントチャレンジステージ4ヒント"
28119784-DescriptionJp = "敵の攻撃タイプが神秘属性に変更されます。\n\n列車乗務員の生徒を倒すと、一定量のコストが獲得されます。\n\nセントリーガンの攻撃は、低い確率で対象に防御力と回避率を減少させる効果を重複で与えます。"
3754973665-NameJp = "イベントチャレンジステージ1ヒント"
3754973665-DescriptionJp = "敵のヘルメット団員たちが廃棄されたブラックマーケットオートマタを前に配置して、御坂美琴を攻撃します。\n\n御坂美琴を守る生徒を編成して敵の攻勢に備えましょう。"
981107711-NameJp = "イベントチャレンジステージ2ヒント"
981107711-DescriptionJp = "食蜂操祈がヘルメット団を継続的に操ります。\n\n食蜂操祈を優先して攻略しましょう。"
247331126-NameJp = "イベントチャレンジステージ3ヒント"
247331126-DescriptionJp = "前方のPMC兵士がダメージを受けると、PMCのパワーローダーも一緒にダメージを受けます。\n\n後方にも多くの敵が出現するので、範囲攻撃が可能な生徒を編成しましょう。"
3717534249-NameJp = "イベントチャレンジステージ4ヒント"
3717534249-DescriptionJp = "廃棄された頑丈なブラックマーケットオートマタがいる間は、他の敵を倒しにくくなります。\n\nヒーラーで、歩き回っているスイーパーとかかしを活用すると敵をより簡単に倒せます。"
2028021589-NameJp = "イベントチャレンジステージ1ヒント"
2028021589-DescriptionJp = "CC状態を活用して敵を攻略してみましょう。"
2080523366-NameJp = "イベントチャレンジステージ2ヒント"
2080523366-DescriptionJp = "敵を倒すと短い時間の間、バフ効果を獲得できます。\nバフ効果の持続時間が終わる前に、次の敵を倒しましょう。"
11412844-NameJp = "イベントチャレンジステージ3ヒント"
11412844-DescriptionJp = "非常に強力で凶暴なクマとウサギが立ちはだかります。\nクマを混乱させたり、スミレを支援して敵を攻略してみましょう。"
1768013184-NameJp = "イベントチャレンジステージ4ヒント"
1768013184-DescriptionJp = "遮蔽物を設置して敵の攻撃を弾いてみましょう。"
2920989374-NameJp = "イベントチャレンジステージ1ヒント"
2920989374-DescriptionJp = "サオリを護衛しながら、両方向から現れる敵を素早く倒しましょう。"
389255540-NameJp = "イベントチャレンジステージ2ヒント"
389255540-DescriptionJp = "アル（ドレス）とカヨコ（ドレス）は連携してEXスキルを使用します。アル（ドレス）がカヨコ（ドレス）にEXスキルを使用できないように攻略してみましょう。"
2681487799-NameJp = "イベントチャレンジステージ3ヒント"
2681487799-DescriptionJp = "味方のカヨコ（ドレス）は、攻撃を受けないとEXスキルがさらに強力になります。ボスの広範囲な攻撃に当たらないように攻略してみましょう。"
3119514688-NameJp = "イベントチャレンジステージ4ヒント"
3119514688-DescriptionJp = "後方から強力なダメージを与える敵を先に倒しましょう。"
1154240687-NameJp = "イベントチャレンジステージ1ヒント"
1154240687-DescriptionJp = "争っている風紀委員と魑魅一座を倒して、お祭りの評価ゲージがゼロにならないように維持しましょう。一部の風紀委員を攻撃すると、反撃されてしまいます。"
826504021-NameJp = "イベントチャレンジステージ2ヒント"
826504021-DescriptionJp = "敵の召喚物はどんどん強くなります。召喚物を素早く倒しましょう。"
228867329-NameJp = "イベントチャレンジステージ3ヒント"
228867329-DescriptionJp = "スイーパーはEXスキルで攻撃されるたびにノックバックされ、倒れる時に周辺にダメージとデバフを適用する特性があります。\n\nスイーパーが敵の近くで倒れるようにEXスキルを使用してみましょう。"
3692835812-NameJp = "イベントチャレンジステージ4ヒント"
3692835812-DescriptionJp = "ウミカの花火発射台を支援しながら、お祭りの邪魔をする魑魅一座を倒しましょう。\n\nお祭りの準備が25%ずつ達成するたびに、敵と味方にバフ効果や弱体状態など様々な効果を付与します。\n\n敵ボスの般若面の魑魅一座は、ターレットが受けるダメージを一緒に受けます。"
937127281-NameJp = "イベントチャレンジステージ1ヒント"
937127281-DescriptionJp = "敵の戦車は空き地に向かって動き出し、空き地に着くと強力な攻撃を放ちます。\n\n敵の戦車はEXスキルのダメージに強い抵抗力がありますが、被弾するほど戦車の性能が低下します。\n\nこれらの特性を利用して、敵の戦車が空き地に到着する前に倒しましょう。"
120747478-NameJp = "イベントチャレンジステージ2ヒント"
120747478-DescriptionJp = "放課後スイーツ部の生徒たちがスキルを使用できないようにしましょう。"
3642446434-NameJp = "イベントチャレンジステージ3ヒント"
3642446434-DescriptionJp = "レイサにバフ効果を与えると、EXスキルを使用します。\nレイサをサポートしながらスケバンを倒しましょう。"
284862043-NameJp = "イベントチャレンジステージ4ヒント"
284862043-DescriptionJp = "放浪するオートマタをCC効果で弱体化させた後に攻撃しましょう。"
3412917378-NameJp = "イベントチャレンジステージ1ヒント"
3412917378-DescriptionJp = "スケバンのEXスキルに2回打たれると大きなダメージを受けます。\n\nかかしのHPを100%まで回復させると、すべての味方が凍結にかかり、スケバンのスキルを防ぐことができます。"
110115972-NameJp = "イベントチャレンジステージ2ヒント"
110115972-DescriptionJp = "ヴァルキューレの生徒は、カンナを支援するため一定時間ごとに補充されます。\n\nヴァルキューレの生徒たちがあまり多く集まらないように早く倒しましょう。"
2111941898-NameJp = "イベントチャレンジステージ3ヒント"
2111941898-DescriptionJp = "CC状態を活用してカンナを一時的に阻止し、\n素早く敵を倒してカンナから離れましょう。"
184971332-NameJp = "イベントチャレンジステージ4ヒント"
184971332-DescriptionJp = "プラズマ場発生装置を攻撃し、「ヒーラー」の生徒でAMAS機体をサポートしましょう。\n\n改造型スイーパーはEXスキルでのみ倒すことができます。"
2842109547-NameJp = "イベントチャレンジステージ1ヒント"
2842109547-DescriptionJp = "ヒヨリが海岸沿いを走りながら、浜辺の様子を見せてくれます。\n\nその後、ヒヨリが何度も海岸沿いを走っていくのですが、浜辺の様子が最初と違う場合は「X」のかかしを、同じ場合は「O」のかかしを攻撃しましょう。"
2522165937-NameJp = "イベントチャレンジステージ2ヒント"
2522165937-DescriptionJp = "タンクの生徒で、敵の攻撃を耐えましょう。"
388529582-NameJp = "イベントチャレンジステージ3ヒント"
388529582-DescriptionJp = "回復スキルとバフスキルを利用してメカワニをサポートし、アケミを倒しましょう。"
472021647-NameJp = "イベントチャレンジステージ4ヒント"
472021647-DescriptionJp = "アケミに弱体状態を与えると、アケミの周囲にいる敵に弱体状態の効果が転移します。\n\nアケミの周囲にいる敵にダメージを与えると、アケミにダメージが転移します。\n\nアケミがボディビルのポーズをとると、一定時間の間、味方全員と敵の攻撃力が増加し、コスト回復速度が増加します。"
467833032-NameJp = "イベントチャレンジステージ1ヒント"
467833032-DescriptionJp = "偽の爆弾と本物の爆弾が配置されています。玄龍門の構成員は、本物の爆弾にのみ反応して逃げます。\n\n本物の爆弾を爆発させて敵を倒しましょう。"
2000030305-NameJp = "イベントチャレンジステージ2ヒント"
2000030305-DescriptionJp = "タンクの生徒と弱体状態を解除するスキルで、敵の攻撃に耐えましょう。"
3888748298-NameJp = "イベントチャレンジステージ3ヒント"
3888748298-DescriptionJp = "同じ姿の敵の中からボスを探してみましょう。\n\nボスを倒すと、すべての敵が倒れます。\n\nボスには会心ダメージが発生する確率が非常に高く、ボス以外の敵には会心ダメージが発生する確率が非常に低いです。"
1179303176-NameJp = "イベントチャレンジステージ4ヒント"
1179303176-DescriptionJp = "生徒たちを移動させて、京劇部員の攻撃を敵に誘導してみましょう。\n京劇部員のスキルは、同じ京劇部員にもダメージを与えます。"
3297442664-NameJp = "イベントチャレンジステージ1ヒント"
3297442664-DescriptionJp = "すべての敵はHPが1％未満でCCゲージを生成し、味方を優先的に攻撃します。\nCCゲージを満タンにすると敵が撃退されます。"
2684865569-NameJp = "イベントチャレンジステージ2ヒント"
2684865569-DescriptionJp = "タンクの生徒で、敵の攻撃に耐えましょう。"
3519883613-NameJp = "イベントチャレンジステージ3ヒント"
3519883613-DescriptionJp = "カイはスキルを使って敵に中毒効果を与えます。\n玄龍門の幹部は中毒状態の時、混乱状態に陥ります。\n弱体状態を解除するスキルで、玄龍門の幹部の中毒状態を解除しましょう。"
313921055-NameJp = "イベントチャレンジステージ4ヒント"
313921055-DescriptionJp = "敵を倒すたびにカイが弱くなります。\nカイは持続回復するシールドを自身にかけています。\n一度に多くのダメージを与える攻撃で攻略しましょう。"
3486077912-NameJp = "イベントチャレンジステージ1ヒント"
3486077912-DescriptionJp = "サクラコとミネが倒されないようにしましょう。"
3001581470-NameJp = "イベントチャレンジステージ2ヒント"
3001581470-DescriptionJp = "タンクの生徒で、敵の攻撃に耐えましょう。"
2610005946-NameJp = "イベントチャレンジステージ3ヒント"
2610005946-DescriptionJp = "ヘルメット団員がダメージを受けると、ラブもダメージを受けます。\n\n味方がEXスキルを使用するたび、敵の回避値が増加し、かかしのHPをすべて回復させると回避値は初期化されます。\n\n一定時間の間に移動しないとすべての味方が弱体状態の効果を受けます。"
3941724285-NameJp = "イベントチャレンジステージ4ヒント"
3941724285-DescriptionJp = "4分間、スケバン達の攻撃に耐えましょう。\n\n時間が経つとスケバン達はどんどん強くなりますが、\nアケミの攻撃を受けます。"
2055343512-NameJp = "イベントチャレンジステージ1ヒント"
2055343512-DescriptionJp = "コユキを回復させましょう。\n\nコユキのHPが50％未満になると、敵は味方生徒を攻撃します。"
3473872843-NameJp = "イベントチャレンジステージ2ヒント"
3473872843-DescriptionJp = "脅威的な攻撃をするノア（パジャマ）を急いで倒しましょう。"
105670687-NameJp = "イベントチャレンジステージ3ヒント"
105670687-DescriptionJp = "相手より先にスイーパーを倒しましょう。\n\nスイーパーはそれぞれ異なる効果を保有しています。活用して戦闘を攻略しましょう。"
4025598380-NameJp = "イベントチャレンジステージ4ヒント"
4025598380-DescriptionJp = "ユウカ（パジャマ）はHPが50％以上の時、味方にバフ効果を付与します。\n\nアバンギャルド君がスキル使用中、一定回数ダメージを受ける度に防御力が減少します。"
525037525-NameJp = "イベントチャレンジステージ1ヒント"
525037525-DescriptionJp = "超巨大パンちゃんは弱体状態による持続ダメージを受ける度に追加ダメージを受けます。悪寒の場合、さらに大きなダメージを受けます。\n\nゲヘナ風紀委員（SG）が超巨大パンちゃんを攻撃するほど、超巨大パンちゃんの被ダメージ量が一定時間増加します。"
3162907200-NameJp = "イベントチャレンジステージ2ヒント"
3162907200-DescriptionJp = "セナ（私服）の範囲攻撃に注意してください。"
2027711820-NameJp = "イベントチャレンジステージ3ヒント"
2027711820-DescriptionJp = "超巨大パンちゃんはダメージを受ける度に追加ダメージを受けます。\n\n打撃数の多い生徒を編成してみましょう。"
113373470-NameJp = "イベントチャレンジステージ4ヒント"
113373470-DescriptionJp = "敵の会心抵抗値と会心ダメージ抵抗率が大幅に増加します。\n味方スペシャル生徒の与えるダメージ量が増加します。\n\n各部長は倒れると所属している部活に追加ダメージを与えます。\nこれらを活用し、各部活の騒ぎを抑えましょう。"
3202949901-NameJp = "イベントチャレンジステージ1ヒント"
3202949901-DescriptionJp = "赤いスイーパーを倒すと、周囲のスイーパーが一緒に撃退されます。\n赤いスイーパーは被ダメージ量が大幅に減少するため、攻撃回数の多い生徒を編成してみましょう。"
1916385838-NameJp = "イベントチャレンジステージ2ヒント"
1916385838-DescriptionJp = "スミレ（アルバイト）の弱点把握状態が付与された生徒は、ダメージを受ける度に追加ダメージが発生します。\n弱体状態を解除するスキルで弱点把握状態を解除しましょう。"
1058897212-NameJp = "イベントチャレンジステージ3ヒント"
1058897212-DescriptionJp = "スイーパーは持続的に自身の周囲にダメージを与えます。\nスイーパーはEXスキルで攻撃される度にノックバックされるので、レイの近くに留まるようにEXスキルを使用してみましょう。\nただし、スイーパーがシールドを保有している場合は、ノックバックされません。"
1095949636-NameJp = "イベントチャレンジステージ4ヒント"
1095949636-DescriptionJp = "アケミがボディビルのポーズをとると、周囲のすべての対象の会心率と会心値が大幅に増加します。\n\nアケミが一定回数攻撃を受ける度に、被ダメージ量が一定時間増加します。\n\nアケミはゆっくり減少するCCゲージを保有し、ゲージが満タンになると一定時間気絶し、防御力が大幅に減少します。\nその後、味方は一定時間シールドを得る代わりに攻撃力が減少します。\nこのシールドを活用してアケミの爆発攻撃を防ぎましょう。"
3274122658-NameJp = "イベントチャレンジステージ1ヒント"
3274122658-DescriptionJp = "暴走族ボスの被ダメージ量が大幅に減少します。\nただし、暴走族ボスがスキル使用中にCC効果を命中させた場合、暴走族ボスの被ダメージ量が増加し、コストを一定量獲得します。"
190394474-NameJp = "イベントチャレンジステージ2ヒント"
190394474-DescriptionJp = "アオバの防御力は非常に高いです。\n防御力減少スキルを活用してみましょう。"
384582627-NameJp = "イベントチャレンジステージ3ヒント"
384582627-DescriptionJp = "すべての敵はEXスキルのダメージのみ受けます。\n\nスケバン（SMG）とスケバン（MG）を倒すと、すべての敵の攻撃力と攻撃速度が大幅に増加します。\nまず、スケバン（SR）とスケバン突撃隊長を倒してみましょう。"
4256279682-NameJp = "イベントチャレンジステージ4ヒント"
4256279682-DescriptionJp = "味方生徒が突進する暴走族とぶつかると、大きなダメージを受けます。\n代わりに、突進する暴走族が遮蔽物にぶつかると、暴走族が大きなダメージを受けます。\n遮蔽物を設置し、移動スキルを活用しながら、敵の突進を遮蔽物のほうへ誘導してみましょう。"
1196420166-NameJp = "イベントチャレンジステージ1ヒント"
1196420166-DescriptionJp = "寝ているキキョウに敵が突進してダメージを与えます。\n近づく前に敵をすべて倒して、キキョウの昼寝を守ってください。\n黒いスイーパーを倒すとコストを獲得し、周辺の敵の移動速度と防御力を大幅に減少させます。\n黒いスイーパーは被ダメージ量が大幅に減少するため、攻撃回数の多い生徒を編成してみましょう。"
956182265-NameJp = "イベントチャレンジステージ2ヒント"
956182265-DescriptionJp = "レンゲ（水着）とユカリ（水着）の攻撃に耐えられるよう、タンクとヒーラーの生徒を編成してみましょう。"
1158136851-NameJp = "イベントチャレンジステージ3ヒント"
1158136851-DescriptionJp = "すべてのプラズマ場発生装置のHPが0より多い時、敵のシールドが解除されます。\nプラズマ場発生装置は7秒毎にHPが25%ずつ減少するため、持続的に回復させなければなりません。"
2288671928-NameJp = "イベントチャレンジステージ4ヒント"
2288671928-DescriptionJp = "敵の戦車は空き地に向かって動き出し、空き地に着くと強力な攻撃を放ちます。\n敵の戦車はEXスキルのダメージに強い抵抗力がありますが、被弾するほど戦車の性能が低下します。\nこれらの特性を利用して、敵の戦車が空き地に到着する前に倒しましょう。"
2701404947-NameJp = "イベントチャレンジステージ1ヒント"
2701404947-DescriptionJp = "寮監隊員はエリを狙って襲ってきます。エリを守り、襲ってくる寮監隊員を倒しましょう。"
2506986276-NameJp = "イベントチャレンジステージ2ヒント"
2506986276-DescriptionJp = "カノエの防御力は非常に高く、自身に弱体状態を解除するEXスキルを使用します。\nタイミングに合わせて、防御力減少スキルを活用してみましょう。"
4114458166-NameJp = "イベントチャレンジステージ3ヒント"
4114458166-DescriptionJp = "敵の防御タイプを確認し、相性がWeakの敵を狙ってみましょう。"
444658513-NameJp = "イベントチャレンジステージ4ヒント"
444658513-DescriptionJp = "敵は生徒に強力な弱体状態を付与します。\n弱体状態を解除するスキルを活用し、敵を倒しましょう。"
1268479381-NameJp = "イベントチャレンジステージ1ヒント"
1268479381-DescriptionJp = "フユが走っている間、様々な色のスイーパーが登場します。\nフユがミヨの前にたどり着いた時点で、最も多く登場した色のスイーパーを攻撃しましょう。"
4163494881-NameJp = "イベントチャレンジステージ2ヒント"
4163494881-DescriptionJp = "敵の防御タイプに有利な攻撃タイプをあわせて戦闘を進めましょう。"
1154737800-NameJp = "イベントチャレンジステージ3ヒント"
1154737800-DescriptionJp = "AMASのHPを25%以上維持しつつ、AMASたちにバフ効果を与えて強化し、敵との戦闘を進めましょう。\n\n爆弾が破壊されると、周辺の敵に大きなダメージを与えます。集中砲火状態を活用してみましょう。"
184757931-NameJp = "イベントチャレンジステージ4ヒント"
184757931-DescriptionJp = "アキラのHPは1秒毎に減少していきますが、アキラのHPが50%以上の場合、味方に強力なバフ効果が付与されます。\nアキラのスキルで攻撃された敵は、被ダメージ量が増加します。\n盾を持っている敵は盾を構えている時、HPを回復します。CC効果を活用して敵に盾を使用できないようにしましょう。"
2290871345-NameJp = "イベントチャレンジステージ1ヒント"
2290871345-DescriptionJp = "攻撃の印がついている敵を順番に攻撃して、敵をすべて倒してみましょう。\n気絶した生徒が攻撃を受けると、非常に強く反撃するため注意してください。"
3231040624-NameJp = "イベントチャレンジステージ2ヒント"
3231040624-DescriptionJp = "敵の防御タイプに有利な攻撃タイプをあわせて戦闘を進めましょう。"
1473203563-NameJp = "イベントチャレンジステージ3ヒント"
1473203563-DescriptionJp = "ストライカー生徒に付与されるバフ効果は、味方ヘルメット団にも同じ適用されます。\n味方ヘルメット団は敵に大きなダメージを与えることができます。\n味方ヘルメット団をサポートして、戦闘を進めましょう。"
1944049600-NameJp = "イベントチャレンジステージ4ヒント"
1944049600-DescriptionJp = "味方ヘルメット団の攻撃は、敵の被ダメージ量を増加させます。\n味方ヘルメット団が倒れないようにサポートして、戦闘を進めましょう。"
3270373715-NameJp = "イベントチャレンジステージ1ヒント"
3270373715-DescriptionJp = "引火性ドラム缶のHPが100%以上になると、1秒後に爆発し、周辺の敵に大きなダメージを与えます。\nタイミングに合わせて、引火性ドラム缶を爆発させてスイーパーを倒しましょう。"
3881373360-NameJp = "イベントチャレンジステージ2ヒント"
3881373360-DescriptionJp = "ヒーラーの敵の防御タイプに有利な攻撃タイプをあわせて戦闘を進めましょう。"
2657352138-NameJp = "イベントチャレンジステージ3ヒント"
2657352138-DescriptionJp = "一定時間ごとにヤクモが登場します。\nヤクモの本を獲得した味方と敵は一定時間の間、攻撃力が大幅に減少し、気絶します。\nコハルの場合、攻撃力とコスト回復力、被ダメージ量が大幅に増加します。"
1246590478-NameJp = "イベントチャレンジステージ4ヒント"
1246590478-DescriptionJp = "敵の被ダメージ量が大幅に減少します。\n引火性ドラム缶のHPが100%以上になると、1秒後に爆発し、周辺の敵にダメージを与え、味方のコスト回復力が大幅に増加します。\n引火性ドラム缶の爆発ダメージを受けた敵は一定時間の間、被ダメージ量が大幅に増加します。"
944485355-NameJp = "イベントチャレンジステージ1ヒント"
944485355-DescriptionJp = "敵のEXスキルは非常に大きなダメージを与えますが、遮蔽物に命中すると反対方向へ弾かれます。\nツクヨ（ドレス）のEXスキルで敵の攻撃を弾いて味方の魑魅一座を守りましょう。"
225733024-NameJp = "イベントチャレンジステージ2ヒント"
225733024-DescriptionJp = "ツクヨ（ドレス）が倒れるとイズナの被ダメージ量が増加します。\nツクヨ（ドレス）を先に狙ってみましょう。"
450982130-NameJp = "イベントチャレンジステージ3ヒント"
450982130-DescriptionJp = "かかしのHPが高いほど敵の被ダメージ量が増加します。"
3754788721-NameJp = "イベントチャレンジステージ4ヒント"
3754788721-DescriptionJp = "生徒のEXスキルによるバフ効果は敵ボスにも適用されます。\n\n敵ボスはCC状態の影響は受けませんが、CC状態の時間量は累積され、10秒累積時、敵ボスの被ダメージ量が増加します。（最大10回重複）（時間はCC強化力が高いほど、より多く適用されます）\n\nかかしのHPが99%以上になった時、コスト回復速度が大幅に増加します。\n\n敵ボスの防御力と会心ダメージ抵抗率が非常に高いため注意してください。"
3884845621-NameJp = "イベントチャレンジステージ1ヒント"
3884845621-DescriptionJp = "爆弾が爆発すると生徒に大きな火傷持続ダメージを与えます。\n爆弾が爆発しないよう、回復スキルと広範囲攻撃スキルを活用しましょう。"
86017968-NameJp = "イベントチャレンジステージ2ヒント"
86017968-DescriptionJp = "敵の防御タイプに攻撃タイプをあわせて戦闘を進めましょう。"
3706206590-NameJp = "イベントチャレンジステージ3ヒント"
3706206590-DescriptionJp = "AMASは時間が経過するほど攻撃力が増加します。AMASを迅速に倒しましょう。"
1265950056-NameJp = "イベントチャレンジステージ4ヒント"
1265950056-DescriptionJp = "どちらかの敵のHPが残っている場合、敵が不死身状態になります。\n両方の敵のHPを減らすことで同時に撃破することができます。\n\nアバンギャルド君の被EXダメージ量が大幅に減少し、被特効ダメージ量が大きく加算されます。\nメカワニがEXスキルを使用して炎を放射したあと、15秒間気絶し、被ダメージ量が大幅に増加します。"
2838352374-NameJp = "イベントチャレンジステージ1ヒント"
2838352374-DescriptionJp = "同じ姿のツチノコの中から本物のツチノコを探しましょう。\n偽物のツチノコの弱体状態は弱体状態を解除するスキルで解除されませんが、本物のツチノコの弱体状態を解除すると同時に消えます。\n本物のツチノコは偽物とは違う動きを見せます。\n本物のツチノコを見つけ出し、弱体状態を解除して敵を倒しましょう。"
951156375-NameJp = "イベントチャレンジステージ2ヒント"
951156375-DescriptionJp = "防御力減少スキルを活用して、コノカを攻略しましょう。"
2068938700-NameJp = "イベントチャレンジステージ3ヒント"
2068938700-DescriptionJp = "レナは範囲内の敵を目にすると勇気が減少します。勇気がなくなる前に素早く倒しましょう。"
2249316847-NameJp = "イベントチャレンジステージ4ヒント"
2249316847-DescriptionJp = "コノカが敵のEXスキルを受けると、被ダメージ量が増加する弱体状態が付与されます。\nコノカに付与された弱体状態を弱体状態解除スキルで解除すると、コノカがEXスキルを使用します。コノカのEXスキルは防御タイプが特殊装甲の敵にとても大きなダメージを与えます。\nコノカを手伝って敵を倒しましょう。"
3676923287-NameJp = "イベントチャレンジステージ1ヒント"
3676923287-DescriptionJp = "連鎖爆発トラップが発動するまで耐えると勝利します。\nアケミの攻撃を引火性ドラム缶に誘導すれば連鎖爆発トラップがより早く発動します。\n\nスケバンは時間が経つごとに強くなります。"
1280690466-NameJp = "イベントチャレンジステージ2ヒント"
1280690466-DescriptionJp = "すべての敵の攻撃属性が爆発であることを踏まえて編成してみましょう。\n小隊員を強化するユキノを先に攻略してみましょう。"
2920015713-NameJp = "イベントチャレンジステージ3ヒント"
2920015713-DescriptionJp = "CC状態を活用して京劇部員がEXスキルを使用する前に倒しましょう。"
2740980058-NameJp = "イベントチャレンジステージ4ヒント"
2740980058-DescriptionJp = "ユキノはCCゲージを保有し、累積すると周辺の敵は一定時間EXスキルを使用できなくなります。\n\nコンテナ制御装置を破壊すると特別な味方が登場してサポートします。"
1472027894-NameJp = "イベントチャレンジステージ1ヒント"
1472027894-DescriptionJp = "スイーパーが倒れる度に、他の防御タイプのスイーパーが召喚されます。\nスイーパーと防御タイプが異なる他の敵は被ダメージ量が大幅に減少します。\n\nスイーパーを倒して登場した敵と同じ防御タイプのスイーパーを召喚した後、敵を倒しましょう。"
3165699134-NameJp = "イベントチャレンジステージ2ヒント"
3165699134-DescriptionJp = "ハルカ（ドレス）の攻撃タイプと防御タイプを踏まえて編成しましょう。"
2899464306-NameJp = "イベントチャレンジステージ3ヒント"
2899464306-DescriptionJp = "敵ボスはカルパッチョ・ファミリー組織員を利用して自身の攻撃力と防御力を大幅に強化します。\n気絶したカルパッチョ・ファミリー組織員はEXスキルで倒すことができます。\n\n先にカルパッチョ・ファミリー組織員を倒して、ボスを弱体化してから戦闘を進めましょう。"
1993701024-NameJp = "イベントチャレンジステージ4ヒント"
1993701024-DescriptionJp = "弱体状態を解除するスキルを使用して、味方くまロボとうさロボの弱体状態をすべて解除した場合、凍結が解除されます。\nボスは被ダメージ量が大幅に減少しますが、ボスを攻撃するくまロボとうさロボの数によって被ダメージ量が増加します。（くまロボは、うさロボより大幅にボスの被ダメージ量を増加させます）\n\nボスは強力な広範囲スキルと攻撃力減少効果を使用するため、くまロボとうさロボを守りながら、弱体状態解除スキルを活用しつつ、戦闘を進めましょう。"
4095316539-NameJp = "イベントチャレンジステージ1ヒント"
4095316539-DescriptionJp = "キサキ（水着）がEXスキルを使用するたびに、玄龍門の構成員が現れて戦闘をサポートします。敵は一定時間気絶します。\nキサキ（水着）のEXスキルをうまく使って、戦闘を進めましょう。"
2534921246-NameJp = "イベントチャレンジステージ2ヒント"
2534921246-DescriptionJp = "シュン（水着）が倒れると、秘密の敵が登場します。\n\n敵の防御タイプに有利な攻撃タイプをあわせて、すべての敵を倒しましょう。"
1056858392-NameJp = "イベントチャレンジステージ3ヒント"
1056858392-DescriptionJp = "右上のカメラ移動ボタンを活用して戦闘を進めましょう。\n\n回復能力のあるスペシャル生徒を編成したり、ストライカー枠の左端に防御能力の高い生徒を編成しましょう。"
209329490-NameJp = "イベントチャレンジステージ4ヒント"
209329490-DescriptionJp = "ボスは味方に強力な中毒系持続ダメージを与えます。回復もしくはシールド効果を持つ生徒を編成し、味方を守りましょう。\n\nボスの会心ダメージ抵抗率と会心抵抗値がとても高い代わりに、味方はEXスキルを使用するたびに、自分を含むすべての味方の攻撃力とEXスキルダメージ量が増加します。（最大99回重複）\n味方のEXスキルを使いながら、戦闘を進めましょう。"
