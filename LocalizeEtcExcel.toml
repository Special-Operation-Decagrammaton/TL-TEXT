250804865-NameJp = "Luvas Esportivas"
250804865-DescriptionJp = "Luvas esportivas com superfície texturizada na palma para evitar escorregões. O material é resistente ao fogo, sendo seguras para tocar nos canos quentes de armas."
2642735370-NameJp = "Luvas de Lã"
2642735370-DescriptionJp = "Luvas da marca de atividades ao ar livre \"Manaslu\", voltadas para colegiais. O isolamento térmico é um pouco fraco, mas é um produto popular por seu design adorável."
1332059101-NameJp = "Luva Térmica do Peroro"
1332059101-DescriptionJp = "Uma luva térmica de cozinha branca, projetada com o mascote \"Peroro\" de \"Momo Friends\". Dizem que ao usá-la, dá vontade de dançar de repente."
1759502696-NameJp = "Luvas de Couro"
1759502696-DescriptionJp = "Luvas feitas de couro nobre. Não são muito duráveis, sendo usadas principalmente em cerimônias ou festas."
2952456681-NameJp = "Luvas Táticas"
2952456681-DescriptionJp = "Luvas táticas super-resistentes, feitas de material à prova de fogo. Não tem problema segurar até barras de ferro fervendo com elas!"
4188994934-NameJp = "Luvas de Renda"
4188994934-DescriptionJp = "Luvas feitas de cetim com um design elegante. São vulneráveis ao calor, então tome cuidado ao manusear objetos quentes."
1332723028-NameJp = "Mangas de Proteção"
1332723028-DescriptionJp = "Mangas de proteção para as alunas que buscam proteção UV e estilo ao mesmo tempo. Recomendadas para as mudanças de estação."
3739266178-NameJp = "Luvas de Fio com Pérolas"
3739266178-DescriptionJp = "Luvas de fios decoradas com pérolas. Como as pontas dos dedos ficam expostas, não interferem em trabalhos que exigem precisão."
489725691-NameJp = "Cão de Arma Comum"
489725691-DescriptionJp = "Uma peça de metal que atinge o percussor ao puxar o gatilho. Foi preservada em ótimas condições, parecendo nova. Pode ser utilizada para aprimorar Armas Exclusivas."
1275230444-NameJp = "Cão de Arma de Cromo"
1275230444-DescriptionJp = "Uma peça de metal que atinge o percussor ao puxar o gatilho. Sendo feita de uma liga de cromo, é resistente e não enferruja. Pode ser utilizada para aprimorar Armas Exclusivas."
563331103-NameJp = "Cão de Arma de Titânio"
563331103-DescriptionJp = "Uma peça de metal que atinge o percussor ao puxar o gatilho. Sendo feita de uma liga de titânio, é incrivelmente resistente e leve. Pode ser utilizada para aprimorar Armas Exclusivas."
2336304110-NameJp = "Orbe de Aprimoramento Supremo"
2336304110-DescriptionJp = "Um orbe misterioso capaz de aprimorar equipamentos."
3590797977-NameJp = "Cano de Arma Enferrujado"
3590797977-DescriptionJp = "Um tubo por onde a bala disparada passa. Devido à má conservação, está enferrujado em vários pontos. Pode ser utilizado para aprimorar Armas Exclusivas."
528434676-NameJp = "Tênis Rosa"
528434676-DescriptionJp = "Um par de tênis rosas da marca de roupas esportivas \"Serval\". Possuem material macio por dentro, ideais para correr."
4067164356-NameJp = "Botas de Pelúcia"
4067164356-DescriptionJp = "Botas da marca \"Manaslu\". Além de serem fofas, retêm muito bem o calor, tornando-as populares entre as alunas de regiões frias."
3223551422-NameJp = "Pantufas Pinky Paca"
3223551422-DescriptionJp = "Pantufas no formato da alpaca rosa de \"Momo Friends\", a Pinky Paca. São fofas e isolam muito bem a temperatura."
2109585756-NameJp = "Mocassins de Verniz Antigos"
2109585756-DescriptionJp = "Sapatos mocassins usados pelas estudantes da Trinity. Com seu acabamento em verniz, as pontas brilham quando atingidas pela luz."
997278570-NameJp = "Botas de Combate"
997278570-DescriptionJp = "Botas robustas e grossas projetadas para proteger os pés durante os combates. Como o salto é ligeiramente levantado e proporciona um aumento de altura, costuma ser uma escolha popular para as alunas que querem parecer um pouco mais altas do que já são."
1477837784-NameJp = "Sapatos de Salto Alto"
1477837784-DescriptionJp = "Sapatos de salto que combinam fofura e simplicidade. Ao usá-los, a sua forma de andar parece tornar-se um tanto mais elegante."
134212594-NameJp = "Tênis Casuais"
134212594-DescriptionJp = "Tênis com um design simples. Como são leves e têm um bom ajuste, são queridos por muitas alunas."
2721346391-NameJp = "Botas de Trilha Impermeáveis"
2721346391-DescriptionJp = "Botas de trilha altamente respiráveis e duráveis, revestidas com um material impermeável à prova de borracha natural. A superfície não fica molhada mesmo se você pisar na água."
2753922894-NameJp = "Cano de Arma Comum"
2753922894-DescriptionJp = "Um tubo por onde a bala disparada passa. Foi preservado em ótimas condições, parecendo novo. Pode ser utilizado para aprimorar Armas Exclusivas."
3047737247-NameJp = "Cano de Arma de Cromo"
3047737247-DescriptionJp = "Um tubo por onde a bala disparada passa. Sendo feito de uma liga de cromo, é resistente e não enferruja. Pode ser utilizado para aprimorar Armas Exclusivas."
3465834983-NameJp = "Cano de Arma de Titânio"
3465834983-DescriptionJp = "Um tubo por onde a bala disparada passa. Sendo feito de uma liga de titânio, é incrivelmente resistente e leve. Pode ser utilizado para aprimorar Armas Exclusivas."
1498728523-NameJp = "Percussor Enferrujado"
1498728523-DescriptionJp = "Uma pequena peça de metal que atinge a espoleta da bala. Devido à má conservação, está enferrujada em vários pontos. Pode ser utilizada para aprimorar Armas Exclusivas."
1750123462-NameJp = "Bolsa Esportiva Impermeável"
1750123462-DescriptionJp = "Uma bolsa esportiva à prova d'água fabricada pela \"Serval\". Como é feita de um material que repele a água, você pode levá-la para o mar ou para o rio sem se preocupar."
2248449388-NameJp = "Bolsa Térmica de Inverno"
2248449388-DescriptionJp = "Uma bolsa fabricada pela \"Manaslu\", desenvolvida especialmente para climas frios. O seu forro é feito com um material grosso que ajuda a manter perfeitamente a temperatura quente das bebidas."
4159521152-NameJp = "Bolsa do Peroro"
4159521152-DescriptionJp = "Uma bolsa estampada com o rosto gigante do Peroro. Ela conta com bastante espaço de armazenamento, sendo muito popular até mesmo entre pessoas normais que não são maníacas pelo Peroro."
940066526-NameJp = "Bolsa Escolar Azul-marinho"
940066526-DescriptionJp = "Uma bolsa escolar feita de acordo com as diretrizes da Trinity. Seu design simples e requintado a torna popular mesmo entre as alunas de outras academias."
3539400576-NameJp = "Mochila Escolar de Combate"
3539400576-DescriptionJp = "Mochila escolar com funcionalidade e armazenamento melhorados pela \"Kazeyama\". Parece que está fazendo sucesso entre as alunas que querem carregar consigo um monte de armas pequenas."
4276374506-NameJp = "Ecobag Asas de Demônio"
4276374506-DescriptionJp = "Uma sacola tipo ecobag com grandes asas desenhadas nela. O seu design é relativamente simples, tornando-a ideal para roupas casuais."
1637503010-NameJp = "Bolsa Transversal Street"
1637503010-DescriptionJp = "Bolsa de rua que confere praticidade a um look casual. É usada por muitas alunas, pois tem bastante espaço para guardar coisas."
3101552643-NameJp = "Bolsa de Ombro com Estampa de Borboleta"
3101552643-DescriptionJp = "Bolsa de ombro com estampa de uma borboleta grande. É feita de material leve, não sendo um fardo levá-la em viagens."
1441450061-NameJp = "Percussor Comum"
1441450061-DescriptionJp = "Uma pequena peça de metal que atinge a espoleta da bala. Foi preservada em ótimas condições, parecendo nova. Pode ser utilizada para aprimorar Armas Exclusivas."
1068433115-NameJp = "Percussor de Cromo"
1068433115-DescriptionJp = "Uma pequena peça de metal que atinge a espoleta da bala. Sendo feita de uma liga de cromo, é resistente e não enferruja. Pode ser utilizada para aprimorar Armas Exclusivas."
1300399581-NameJp = "Percussor de Titânio"
1300399581-DescriptionJp = "Uma pequena peça de metal que atinge a espoleta da bala. Sendo feita de uma liga de titânio, é incrivelmente resistente e leve. Pode ser utilizada para aprimorar Armas Exclusivas."
2140743564-NameJp = "Broche de Metal da Serval"
2140743564-DescriptionJp = "Um broche de metal com a logomarca da Serval, a famosa marca de roupas esportivas. Como é feito de metal durável, não há com o que se preocupar com desgaste em meio ao suor e a paixão da juventude."
1505921304-NameJp = "Broche de Feltro da Manaslu"
1505921304-DescriptionJp = "Broche com a logomarca da Manaslu, uma marca de equipamentos para atividades ao ar livre. Como é feito de feltro macio, há pouca preocupação com a deformação, mesmo em grandes mudanças de temperatura."
3033340240-NameJp = "Broche da Angry Adélie"
3033340240-DescriptionJp = "Broche estampado com a Angry Adélie, personagem do Momo Friends. Ficar encarando-o muito tempo pode fazer você se sentir mal."
344772093-NameJp = "Broche Bordado da Veronica"
344772093-DescriptionJp = "Broche bordado com o logotipo da famosa marca Veronica. Colocá-lo até mesmo em produtos de prateleira os farão parecer com peças de luxo."
2127407973-NameJp = "Emblema da Kazeyama"
2127407973-DescriptionJp = "Um emblema impresso com o logotipo da marca de vestuário militar Kazeyama. Utilizando os fechos da parte traseira, pode ser facilmente fixado à roupa."
3784559011-NameJp = "Broche da CocoDevil"
3784559011-DescriptionJp = "Broche prateado estampado com o logo da CocoDevil, a marca de estilo gótico-lolita. O alfinete no verso permite que ele seja usado como acessório de roupa."
589220143-NameJp = "Broche Street"
589220143-DescriptionJp = "Lançamento da marca de moda de rua Triple Step. A audácia de ter o nome da empresa impresso bem grande no meio da frente do broche, revela a autoconfiança de seu criador."
49559053-NameJp = "Broche Lorelei"
49559053-DescriptionJp = "Um broche lançado pela Lorelei, a marca de moda moderna. A madeira maciça é primorosamente usinada, então dizem que tem uma superfície lisa e cheira bem."
1494732916-NameJp = "Faixa de Tênis"
1494732916-DescriptionJp = "Uma faixa de cabeça para tênis lançada pela Serval, marca de roupas esportivas. Para evitar que o suor caia e atinja os olhos durante o exercício, o material utilizado é altamente absorvente."
3940891435-NameJp = "Rabicó"
3940891435-DescriptionJp = "Um elástico de cabelo feito de material de cetim e dotado de excelente elasticidade. Recomendamos amarrar o cabelo com isso para beber sopa ou comer um lámen."
3392023658-NameJp = "Presilha da Momo"
3392023658-DescriptionJp = "Uma presilha com o ícone do \"MomoTalk\". Ao esfregá-lo, liberta um leve cheiro de pêssego."
2520092463-NameJp = "Presilha de Asas"
2520092463-DescriptionJp = "Uma presilha feita pela famosa marca \"Veronica\" no formato de asas de anjo. Ao que parece não faz muito sucesso entre as alunas da Trinity."
765040081-NameJp = "Presilha Multiuso"
765040081-DescriptionJp = "O formato de um lado da presilha tem uma aresta afiada que, em emergências, serve como abridor de garrafas e canivete. Por favor, tome cuidado ao usá-lo ou poderá se ferir acidentalmente."
277995823-NameJp = "Presilha de Morcego"
277995823-DescriptionJp = "Uma presilha de asas de morcego que também parece um grande laço negro. Apenas usar esse item fará com que você sinta uma forte aura demoníaca."
1353993108-NameJp = "Presilha de Caligrafia"
1353993108-DescriptionJp = "Um enfeite de cabelo em forma de letras. Os caracteres na verdade não significam nada em particular, mas apenas olhar para eles pode deixar o seu coração agitado."
3000997093-NameJp = "Presilha de Folha"
3000997093-DescriptionJp = "Um enfeite de cabelo em forma de folha. É um pouco desconfortável para uso diário, mas será útil nos dias em que você quiser se arrumar."
3948898300-NameJp = "Amuleto de Trânsito"
3948898300-DescriptionJp = "Amuleto com as preces por segurança no trânsito e proteção contra acidentes. Ao sacudi-lo, ouve-se um barulho como o tilintar de moedas ou objetos metálicos de seu interior."
2028861040-NameJp = "Aquecedor de Mãos"
2028861040-DescriptionJp = "Um pequeno aquecedor que você pode esfregar na palma da mão, agitar e ficará quente. Num ambiente de muito frio, poucas coisas são tão fiéis quanto isso."
1207585231-NameJp = "Amuleto do Peroro"
1207585231-DescriptionJp = "Um talismã na forma de uma grande pena branca. Informações como a procedência das penas utilizadas são informações confidenciais."
3129277640-NameJp = "Cruz"
3129277640-DescriptionJp = "Um amuleto com formato de cruz adorado pelos alunos de Trinity. Conhecido também por ser a escolha perfeita como acessório para pendurar em uma mochila."
1991164124-NameJp = "Daruma Camuflado"
1991164124-DescriptionJp = "Um boneco daruma em padrão camuflado. Ele mistura-se sem dar nas vistas e torna-se um com os arredores, não importa onde o coloque, no entanto dá muito medo dependendo de onde o colocam."
237084781-NameJp = "Boneco Amaldiçoado"
237084781-DescriptionJp = "Um boneco de maldições repleto de grandes rancores ou outras emoções fortes. Graças à sua função útil como almofada de agulhas, é muito popular entre o Clube de Artesanato."
3113501019-NameJp = "Desodorizador de Bolso"
3113501019-DescriptionJp = "Este desodorizador de ar portátil foi fabricado numa parceria com a marca de cosméticos orientada para funções, a Seaside. Muitas alunas acham-no na moda, pelo que utilizam-no como porta-chaves."
3888622253-NameJp = "Filtro dos Sonhos"
3888622253-DescriptionJp = "Um feitiço mágico que tem o significado de caçador de sonhos que expulsa pesadelos. Sentirá um cheiro a uma fragrância de madeira muito agradável a partir da armação de madeira."
727987239-NameJp = "Relógio de Pulso Digital"
727987239-DescriptionJp = "O relógio de pulso digital da Serval, a popular marca de equipamentos de desporto. É resistente à água, pelo que as alunas podem utilizá-lo sem se preocuparem enquanto nadam."
111602846-NameJp = "Relógio de Pulso de Couro"
111602846-DescriptionJp = "O relógio de pulso da Manaslu, a famosa marca para as atividades ao ar livre. Tem pulseiras de couro, pelo que não arrefecerão os seus pulsos em tempo frio."
2073706703-NameJp = "Relógio Wave Cat"
2073706703-DescriptionJp = "O relógio de pulso impresso com Wave Cat de Momo Friends. Com os braços de Wave Cat a indicarem o tempo, contorce-se muito estranhamente a certas horas."
1058159756-NameJp = "Relógio de Bolso Antigo"
1058159756-DescriptionJp = "Um relógio de bolso antigo da Veronica. Devido à sua inconveniência face aos relógios de pulso, é sobretudo usado como um artigo decorativo."
3773560632-NameJp = "Relógio de Pulso Antipoeira"
3773560632-DescriptionJp = "O relógio de pulso antipoeira da Kazeyama, uma marca bem conhecida especializada em artigos de desporto ao ar livre e equipamento militar. Mesmo em ambientes implacáveis, não precisa de se preocupar que se parta."
2415212758-NameJp = "Relógio de Pulso Gótico"
2415212758-DescriptionJp = "Um relógio de pulso com design gótico. Fica muito bem com roupas clássicas, mas pode ser difícil de ler o mostrador se não estiver habituado."
3475264813-NameJp = "Relógio Fashion Street"
3475264813-DescriptionJp = "O relógio de pulso popular pelo seu design de rua bonito. A marca de acessórios de rua Triple Step está a vendê-lo a fim de popularizar as pulseiras empilháveis."
2321708498-NameJp = "Relógio de Pulso Lorelei"
2321708498-DescriptionJp = "O relógio de pulso elegante vendido pela Lorelei, a marca de moda popular. A pulseira de couro e o acabamento de madeira dão uma aura incrivelmente única."
1506609692-NameJp = "Colar Bluetooth"
1506609692-DescriptionJp = "Um colar incrustado com funcionalidade bluetooth que transmite as flutuações da temperatura corporal, níveis de batimentos cardíacos, etc. As dietistas adoram utilizar isto porque as ajuda a regular e visualizar de perto os seus hábitos de exercício. Chamam a isto a obrigação da dieta, mas quem o usa acabará por o tirar sempre e com um sorriso na cara."
3750431669-NameJp = "Pingente Floco de Neve"
3750431669-DescriptionJp = "Um pendente feito de pingentes prateados num belo e minucioso padrão de floco de neve. Ficar a olhar fixamente para isto de alguma forma faz as pessoas sentirem-se relaxadas."
4279598505-NameJp = "Pingente de Relicário do Nikolai"
4279598505-DescriptionJp = "Um pingente em formato de medalhão na forma do Sr. Nikolai de Momo Friends. Ao pressionar no nariz revela um pequeno espaço que pode ser utilizado para colocar pequenas fotografias das suas pessoas preferidas."
2508370757-NameJp = "Gargantilha de Cruz"
2508370757-DescriptionJp = "Gargantilha vendida pela marca popular Veronica com um amuleto em cruz anexado a ela. Tem uma aura elegante, tornando o seu design simples bastante popular."
1517613390-NameJp = "Placa de Identificação"
1517613390-DescriptionJp = "Uma chapa de identificação inscrita com o nome e número do estudante. Este tem sido frequentemente um acessório bastante popular entre as alunas de escolas nos últimos tempos."
1964406377-NameJp = "Gargantilha Punk"
1964406377-DescriptionJp = "Uma gargantilha concebida no estilo punk com picos afiados de cima a baixo. Com as pontas afiadas apontadas diretamente para o seu pescoço, não será capaz de se contorcer o pescoço todo."
2501983868-NameJp = "Colar de Corrente"
2501983868-DescriptionJp = "Colar em formato de correntes entrelaçadas umas nas outras. Algumas alunas acham a sensação de arrepio um pouco estranha no pescoço, outras como a forma como as correntes tocam agradavelmente enquanto se movem com elas em grande estilo."
3300639114-NameJp = "Colar de Folha Verde"
3300639114-DescriptionJp = "Colar lançado pela Lorelei, a marca de estilo de vida de grande prestígio. Diz-se que o colar pode brilhar lindamente mesmo sob fontes de pouca luz."
3393952632-NameJp = "LocalizeError" #Isso aqui é uma mensagem de erro especial e não deve ser traduzido. (-Filipe 05/06/26)
3393952632-DescriptionJp = "LocalizeError" #Isso aqui é uma mensagem de erro especial e não deve ser traduzido. (-Filipe 05/06/26)
1448270761-NameJp = "Dica do Estágio 5 do Desafio do Evento"
1448270761-DescriptionJp = "Use habilidades que removem condições de enfraquecimento para lidar com os mísseis de Geburah.\nUtilize o dispositivo de armazenamento de material de restauração para evitar ser congelado."
2396453793-NameJp = "Dica do Estágio 6 do Desafio do Evento"
2396453793-DescriptionJp = "O Departamento de Investigação de Fenômenos Singulares apoiará os aliados.\n\nAo derrotar os inimigos, o Departamento coletará e analisará os dados.\nQuando a análise for concluída, Geburah será enfraquecida e os aliados fortalecidos."
3833784038-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3833784038-DescriptionJp = "Kasumi foge para o vagão da frente para evitar as bombas que ela plantou no trem.\nFuja para o vagão da frente antes que as bombas explodam."
3483475612-NameJp = "Dica do Estágio 2 do Desafio do Evento"
3483475612-DescriptionJp = "Cuidado com os ataques em área.\n\nPrepare-se para o ataque surpresa pela retaguarda."
4029303020-NameJp = "Dica do Estágio 3 do Desafio do Evento"
4029303020-DescriptionJp = "A velocidade de recuperação de custo das alunas Atacantes aliadas diminuirá consideravelmente.\n\nVocê ganhará uma certa quantidade de custo ao derrotar inimigos ou destruir máquinas de venda."
28119784-NameJp = "Dica do Estágio 4 do Desafio do Evento"
28119784-DescriptionJp = "O tipo de ataque dos inimigos mudará para Místico.\n\nAo derrotar as alunas tripulantes do trem, você ganhará uma certa quantidade de custo.\n\nOs ataques das Armas de Sentinela têm uma pequena chance de infligir um efeito cumulativo que reduz a defesa e a evasão do alvo."
3754973665-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3754973665-DescriptionJp = "Os membros do Helmet posicionarão Autômatos de Mercado Negro sucateados na linha de frente para atacar Misaka Mikoto.\n\nOrganize alunas que possam proteger a Misaka Mikoto para se preparar para a ofensiva inimiga."
981107711-NameJp = "Dica do Estágio 2 do Desafio do Evento"
981107711-DescriptionJp = "Shokuhou Misaki controlará os membros do Helmet continuamente.\n\nDerrote a Shokuhou Misaki primeiro."
247331126-NameJp = "Dica do Estágio 3 do Desafio do Evento"
247331126-DescriptionJp = "Quando os Soldados da PMC na linha de frente receberem dano, os Power Loaders da PMC também sofrerão dano.\n\nMuitos inimigos aparecerão por trás, então organize alunas com ataques em área."
3717534249-NameJp = "Dica do Estágio 4 do Desafio do Evento"
3717534249-DescriptionJp = "Enquanto os resistentes Autômatos de Mercado Negro sucateados estiverem em campo, será mais difícil derrotar outros inimigos.\n\nUse curandeiras e aproveite as Varredoras e espantalhos em movimento para derrotar os inimigos com mais facilidade."
2028021589-NameJp = "Dica do Estágio 1 do Desafio do Evento"
2028021589-DescriptionJp = "Aproveite os efeitos de CC para derrotar os inimigos."
2080523366-NameJp = "Dica do Estágio 2 do Desafio do Evento"
2080523366-DescriptionJp = "Você receberá um efeito de melhoria temporário ao derrotar inimigos.\nDerrote os inimigos seguintes antes que o efeito expire."
11412844-NameJp = "Dica do Estágio 3 do Desafio do Evento"
11412844-DescriptionJp = "Um urso e um coelho muito fortes e ferozes vão tentar pará-lo.\nConfunda o urso ou apoie a Sumire para derrotar os inimigos."
1768013184-NameJp = "Dica do Estágio 4 do Desafio do Evento"
1768013184-DescriptionJp = "Use coberturas para desviar os ataques dos inimigos."
2920989374-NameJp = "Dica do Estágio 1 do Desafio do Evento"
2920989374-DescriptionJp = "Proteja Saori e derrote rapidamente os inimigos que aparecem de ambos os lados."
389255540-NameJp = "Dica do Estágio 2 do Desafio do Evento"
389255540-DescriptionJp = "Aru (Vestido) e Kayoko (Vestido) usarão as Habilidades EX juntas. Encontre uma maneira de impedir Aru (Vestido) de usar Habilidade EX na Kayoko (Vestido)."
2681487799-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2681487799-DescriptionJp = "A Habilidade EX da Kayoko (Vestido) ficará mais forte desde que ela não sofra danos. Tente encontrar uma maneira de mantê-la segura dos ataques de área amplos do Chefe."
3119514688-NameJp = "Dica do Estágio 4 do Desafio do Evento"
3119514688-DescriptionJp = "Inimigos na retaguarda causarão danos tremendos. Livre-se deles primeiro."
1154240687-NameJp = "Dica do Estágio 1 do Desafio do Evento"
1154240687-DescriptionJp = "Derrote os Comitês Disciplinares e o Esquadrão Street Hooligan em conflito para evitar que a barra de Reputação do Festival chegue a zero. Atacar certos membros do Comitê Disciplinar provocará o seu contra-ataque."
826504021-NameJp = "Dica do Estágio 2 do Desafio do Evento"
826504021-DescriptionJp = "Unidades inimigas invocadas se fortalecerão com o tempo. Derrote-as o mais rápido possível."
228867329-NameJp = "Dica do Estágio 3 do Desafio do Evento"
228867329-DescriptionJp = "O Sweeper será empurrado para trás cada vez que for atingido por Habilidades EX. Quando derrotado, causará dano e efeito negativo aos inimigos ao redor.\n\nUse sua Habilidade EX no Sweeper para enviá-lo voando contra os inimigos."
3692835812-NameJp = "Dica do Estágio 4 do Desafio do Evento"
3692835812-DescriptionJp = "Ajude os lançadores de fogos de artifício de Umika e derrote o Esquadrão Street Hooligan que está arruinando o festival.\n\nSempre que o nível de Preparação do Festival atingir múltiplos de 25%, aplicará um de vários efeitos (ex.: buff, debuff, etc.) tanto em aliados quanto em inimigos.\n\nO Fantasma de Oni e a torreta inimiga compartilham o dano sofrido."
937127281-NameJp = "Dica do Estágio 1 do Desafio do Evento"
937127281-DescriptionJp = "O Tanque Inimigo avançará em direção à Terra Desolada e desencadeará um ataque devastador ao chegar.\n\nEmbora o Tanque Inimigo seja altamente resistente a Habilidades EX, o seu desempenho degradará à medida que for atingido com mais frequência.\n\nAproveite os atributos da frente e destrua o Tanque Inimigo antes que ele chegue à Terra Desolada."
120747478-NameJp = "Dica do Estágio 2 do Desafio do Evento"
120747478-DescriptionJp = "Encontre uma maneira de impedir as alunas do Clube de Doces das Horas Livres de usar suas habilidades."
3642446434-NameJp = "Dica do Estágio 3 do Desafio do Evento"
3642446434-DescriptionJp = "Se Reisa receber efeitos de fortalecimento, ela usará a Habilidade EX.\nDerrote as Sukebans enquanto cura e melhora Reisa."
284862043-NameJp = "Dica do Estágio 4 do Desafio do Evento"
284862043-DescriptionJp = "Enfraqueça os Autômatos Errantes com Efeitos de CC e então os ataque."
3412917378-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3412917378-DescriptionJp = "Você sofrerá danos pesados ao ser atingido pela Habilidade EX das Sukebans 2 vezes.\n\nAo curar o espantalho a 100% dos HP máximos, todos os aliados sofrerão o status de Frio e você poderá se defender da habilidade das Sukebans."
110115972-NameJp = "Dica do Estágio 2 do Desafio do Evento"
110115972-DescriptionJp = "Alunas da Valkyrie serão substituídas por novas em intervalos definidos para apoiar a Kanna.\n\nDerrote as alunas da Valkyrie antes que muitas se amontoem."
2111941898-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2111941898-DescriptionJp = "Use ativamente os efeitos de CC para impedir Kanna temporariamente,\ne derrote rapidamente os inimigos para manter a distância de Kanna."
184971332-NameJp = "Dica do Estágio 4 do Desafio do Evento"
184971332-DescriptionJp = "Apoie a unidade AMAS com alunos de papel \"Curandeiro\" para que possam atacar os Dispositivos de Campo de Plasma Inimigo.\n\nVarredores Modificados só podem ser derrotados por Habilidade EX."
2842109547-NameJp = "Dica do Estágio 1 do Desafio do Evento"
2842109547-DescriptionJp = "Hiyori vai correr ao longo da praia e mostrará aos seus alunos como é a área.\n\nEm seguida, Hiyori vai correr novamente repetidamente; se ela ficar de uma certa maneira quando apareceu originalmente, ataque o Espantalho \"X\". Se ela tiver o mesmo aspeto de antes, ataque o Espantalho \"O\" em vez disso."
2522165937-NameJp = "Dica do Estágio 2 do Desafio do Evento"
2522165937-DescriptionJp = "Bloqueie o ataque dos inimigos usando as suas alunas na linha da frente e de apoio."
388529582-NameJp = "Dica do Estágio 3 do Desafio do Evento"
388529582-DescriptionJp = "Apoie o Mech Croc com Habilidades de Cura e de Reforço, e derrote a Akemi."
472021647-NameJp = "Dica do Estágio 4 do Desafio do Evento"
472021647-DescriptionJp = "Quando a Akemi ficar sobre o efeito das Reduções de Status, os Efeitos de Redução de Status serão passados aos Inimigos à volta dela.\n\nQuando os inimigos à volta de Akemi receberem Danos, Akemi receberá esse Dano.\n\nQuando a Akemi exibir os seus movimentos de culturista musculada, a Força de Ataque de Todos os Aliados e de Todos os Inimigos irá Aumentar durante um determinado tempo, e a Velocidade de Recuperação do Custo também Aumentará."
467833032-NameJp = "Dica do Estágio 1 do Desafio do Evento"
467833032-DescriptionJp = "Tanto Bombas Falsas como Bombas Reais foram colocadas. Os Membros de Segurança da União Xuanlong só fogem às Bombas Reais.\n\nFaça detonar a Bomba Verdadeira para derrotar o Inimigo."
2000030305-NameJp = "Dica do Estágio 2 do Desafio do Evento"
2000030305-DescriptionJp = "Mantenha o seu terreno durante a Ofensiva dos Inimigos usando Tanker Students, bem como a Habilidade de Remover Reduções de Status."
3888748298-NameJp = "Dica do Estágio 3 do Desafio do Evento"
3888748298-DescriptionJp = "Descubra qual é a Unidade de Chefe em vez das várias Unidades Inimigas idênticas.\n\nQuando a Unidade Boss for Derrotada, os Inimigos restantes também O serão.\n\nÉ Muito Mais Possível despoletar o Dano de Acerto Crítico para a Unidade de Chefe, e Muito Menos Provável despoletar o Dano de Acerto Crítico em qualquer Inimigo Excluindo o Chefe."
1179303176-NameJp = "Dica do Estágio 4 do Desafio do Evento"
1179303176-DescriptionJp = "Mova o seu Aluno para atrair o Ataque do Membro do Clube de Teatro de Pequim.\nA habilidade usada pelo Membro do Clube de Teatro de Pequim também causa danos aos seus colegas do clube."
3297442664-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3297442664-DescriptionJp = "Quando as suas HP são inferiores a 1%, os Inimigos gerarão o Indicador CC e os Inimigos Atacarão os Aliados Ativamente.\nPreencha os indicadores CC dos Inimigos para os Derrotar."
2684865569-NameJp = "Dica do Estágio 2 do Desafio do Evento"
2684865569-DescriptionJp = "Use Tanker Students para impedir os Ataques dos Inimigos."
3519883613-NameJp = "Dica do Estágio 3 do Desafio do Evento"
3519883613-DescriptionJp = "Kai utiliza as suas Habilidades para adicionar os Efeitos de Veneno aos Inimigos.\nQuando o Líder da União de Xuanlong estiver na Condição de Envenenamento, entrará num Estado de Pânico.\nUtilize a Habilidade de Remover Reduções de Status para remover o efeito de Veneno no Líder da União de Xuanlong."
313921055-NameJp = "Dica do Estágio 4 do Desafio do Evento"
313921055-DescriptionJp = "Quanto mais inimigos forem derrotados, mais a Força de Ataque de Kai diminuirá.\nKai usará a Habilidade Contínua de Restauração de HP para restaurar a própria Vida.\nAtaque-a ativando danos pesados instantaneamente."
3486077912-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3486077912-DescriptionJp = "Não deixe que a Sakurako e a Mine sejam derrotadas."
3001581470-NameJp = "Dica do Estágio 2 do Desafio do Evento"
3001581470-DescriptionJp = "Use Tanker Students para impedir os Ataques dos Inimigos."
2610005946-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2610005946-DescriptionJp = "Quando um Membro da Gangue dos Capacetes receber Dano, a Love receberá algum Dano em vez do Membro da Gangue.\n\nSempre que o Aliado usar a Habilidade EX, o Evasão dos Inimigos aumentará. Quando as PV do Espantalho recuperarem a 100%, os Evasões do Inimigo voltarão aos números iniciais.\n\nSe nenhuma unidade aliada se mudar num determinado momento, todos os Aliados sofrerão o Efeito de Redução de Status."
3941724285-NameJp = "Dica do Estágio 4 do Desafio do Evento"
3941724285-DescriptionJp = "Sobreviva ao Ataque das Sukeban durante 4 minutos.\n\nCom o passar do tempo, as Sukeban tornar-se-ão muito mais poderosas, mas\no Ataque da Akemi abrandará as ofensivas delas."
2055343512-NameJp = "Dica do Estágio 1 do Desafio do Evento"
2055343512-DescriptionJp = "Restaure a PV de Koyuki.\n\nQuando a PV de Koyuki descer abaixo dos 50%, os Inimigos Atacarão primeiro as Alunas Aliadas."
3473872843-NameJp = "Dica do Estágio 2 do Desafio do Evento"
3473872843-DescriptionJp = "Derrote rapidamente o Noah (Pijama), que causará Dano Grave aos seus Aliados."
105670687-NameJp = "Dica do Estágio 3 do Desafio do Evento"
105670687-DescriptionJp = "Derrote as Varredoras antes que os seus inimigos o façam.\n\nCada cor das Varredoras tem propriedades diferentes. Utilize a Característica Varredora adequada nas Batalhas."
4025598380-NameJp = "Dica do Estágio 4 do Desafio do Evento"
4025598380-DescriptionJp = "Se as PV de Yuuka (Pijama) for de 50% ou mais, ela aplicará o Efeito Buf em Aliados.\n\nO Poder de Defesa de Avant-Garde diminuirá cada vez que este for atingido ao usar a Sua Habilidade."
525037525-NameJp = "Dica do Estágio 1 do Desafio do Evento"
525037525-DescriptionJp = "O Dano Extra aplica-se cada vez que o Pão Super Gigante sofre Danos da Redução de Estado, especialmente dos Danos das Calafrios.\n\nSempre que Gehenna Prefect (SG) ataca o Pão Super Gigante, os Danos Incorridos do Pão Super Gigante aumentarão durante uma determinada duração."
3162907200-NameJp = "Dica do Estágio 2 do Desafio do Evento"
3162907200-DescriptionJp = "Cuidado com os Ataques em Área de Sena (Casual)."
2027711820-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2027711820-DescriptionJp = "O Dano Extra é aplicado cada vez que o Pão Super Gigante sofre Danos.\n\nUse os Alunos que Atacam os Inimigos de forma persistente."
113373470-NameJp = "Dica do Estágio 4 do Desafio do Evento"
113373470-DescriptionJp = "A Tolerância a Acertos Críticos Inimigos e a Resistência a Danos Críticos Inimigos serão Aumentadas de Forma Substancial.\nA Capacidade de causar Danos dos Alunos Especiais Aliados irá aumentar.\n\nSempre que o Presidente do Clube for Derrotado, o Presidente irá Infligir Danos Extra ao Seu/Sua Própria Equipa.\nUtilize este Efeito Estrategicamente e Restaure a Paz de Todos os Clubes."
3202949901-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3202949901-DescriptionJp = "Quando a Varredora Vermelha for Derrotada, as Varredoras que as rodeiam também o serão.\nA Varredora Vermelha sofre menos danos do que o normal, portanto, concentre o Poder de Fogo dos alunos cujas Taxas de Fogo são mais altas para os abater."
1916385838-NameJp = "Dica do Estágio 2 do Desafio do Evento"
1916385838-DescriptionJp = "O Aluno que detém o Efeito de Avaliação de Ponto Fraco de Sumire (Trabalho a tempo parcial) sofrerá Dano Extra quando for atacado.\nRecupera as Estatísticas do Aluno usando a Habilidade de Remover Reduções de Status."
1058897212-NameJp = "Dica do Estágio 3 do Desafio do Evento"
1058897212-DescriptionJp = "A Varredora ataca o seu ambiente contínua e incansavelmente.\nNo momento em que a Varredora é atingida por Habilidades EX, ela é atirada para trás, tenta atrair as Habilidades EX para a Varredora que se encontra ao pé da Rei.\nMas tem cuidado, porque se a Varredora for coberta por algum Escudo, não será atingida."
1095949636-NameJp = "Dica do Estágio 4 do Desafio do Evento"
1095949636-DescriptionJp = "Quando o Akemi tomar a Posar para Condicionamento Físico, a Taxa de Acertos Críticos Inimiga e o Valor Crítico irão aumentar de forma drástica.\n\nA quantidade do Dano Infligido ao Akemi aumentará quando um determinado número de Ataques chegar e durante o tempo predefinido.\n\nO Medidor de CC de Akemi está a encher-se, o tempo todo. Quando preencher o Medidor, Akemi ficará atordoado durante um certo tempo, reduzindo drasticamente o seu Poder de Defesa.\nDepois, o Ataque Aliado diminuirá ao adquirir um Escudo.\nUse os Escudos para desviar dos Ataques de Área de Akemi."
3274122658-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3274122658-DescriptionJp = "O Dano Sofrido pelo Líder da Gangue Diminuirá.\nNo entanto, se o Líder da Gangue for atingido pela Habilidade de CC ao usar o Próprio Poder de Ataque, a Quantidade de Danos Sofridos no Líder da Gangue irá crescer e também fará subir o Indicador de Custo."
190394474-NameJp = "Dica do Estágio 2 do Desafio do Evento"
190394474-DescriptionJp = "O Poder de Defesa de Aoba é insondável.\nUse os efeitos Redução de Poder de Defesa Estrategicamente."
384582627-NameJp = "Dica do Estágio 3 do Desafio do Evento"
384582627-DescriptionJp = "Todos os inimigos sofrem apenas os Danos das Habilidades EX.\n\nQuando a Sukeban (SMG) e a Sukeban (MG) forem Derrotadas, o Poder de Ataque e a Velocidade de Ataque dos restantes Inimigos irão aumentar drasticamente.\nTenta abater primeiro a Sukeban (SR) e a Sukeban Avançada."
4256279682-NameJp = "Dica do Estágio 4 do Desafio do Evento"
4256279682-DescriptionJp = "Os Estudantes Aliados sofrerão fortes danos quando a Gangue Carregar em cima deles.\nMas por outro lado, quando o Gangue atacar as Capas, Os Membros do Gangue também receberão os mesmos montantes de Dano.\nTenta instalar coberturas e aplicar táticas de evasão de forma eficaz de modo a atrair os membros da Gangue em Direção às Capas."
1196420166-NameJp = "Dica do Estágio 1 do Desafio do Evento"
1196420166-DescriptionJp = "Os Inimigos aproximar-se-ão da Kikyo Adormecida de modo a infligir-lhe os danos.\nDestrói os Inimigos que se aproximam da Kikyo, deixa-a dormir em paz.\nAo abater a Vassoura Preta, podes obter o Medidor de Custo e, simultaneamente, reduzir a Velocidade de Movimento do Inimigo mais Próximo e a Força de Defesa.\nA Vassoura Negra sofre os Danos Minimamente, recruta os alunos cuja cadência de tiro é boa contra ela."
956182265-NameJp = "Dica do Estágio 2 do Desafio do Evento"
956182265-DescriptionJp = "Contrata os Estudantes Tanques e Curandeiros de forma inteligente para travar os ataques tanto da Renge (Fato de Banho) como da Yukari (Fato de Banho)."
1158136851-NameJp = "Dica do Estágio 3 do Desafio do Evento"
1158136851-DescriptionJp = "Os Escudos dos Inimigos serão desativados sempre que os Geradores de Campo de Plasma obtiverem mais de 0 de PV.\nO HP do Gerador de Campo de Plasma encolhe 25% a cada 7 segundos, o que é imperativo curá-lo a todo o momento."
2288671928-NameJp = "Dica do Estágio 4 do Desafio do Evento"
2288671928-DescriptionJp = "O Tanque Inimigo avançará em direção à Terra Desolada e desencadeará um ataque devastador ao chegar lá.\nEmbora o Tanque Inimigo seja altamente resistente a Habilidades EX, o seu desempenho degradará à medida que for atingido com mais frequência.\nAproveite os atributos da frente e destrua o Tanque Inimigo antes que ele chegue à Terra Desolada."
2701404947-NameJp = "Dica do Estágio 1 do Desafio do Evento"
2701404947-DescriptionJp = "Os Membros do Comité Disciplinar do Dormitório vão concentrar os seus Ataques na Eri. Apoiem Eri e derrotem Os Membros do Comité Disciplinar do Dormitório."
2506986276-NameJp = "Dica do Estágio 2 do Desafio do Evento"
2506986276-DescriptionJp = "O Poder de Defesa de Kanoe é incrivelmente formidável. Ela também possui a habilidade de curar Efeitos de Redução de Status por Si Própria.\nUse Táticas de Redução de Defesa no momento oportuno."
4114458166-NameJp = "Dica do Estágio 3 do Desafio do Evento"
4114458166-DescriptionJp = "Descobre o Tipo de Armadura do Inimigo e ataca a Fraqueza dele."
444658513-NameJp = "Dica do Estágio 4 do Desafio do Evento"
444658513-DescriptionJp = "O Inimigo irá impor os Reduções de Status nos seus Alunos Aliados.\nAproveita a Habilidade de Remover Reduções de Status para Derrotar o Inimigo."
1268479381-NameJp = "Dica do Estágio 1 do Desafio do Evento"
1268479381-DescriptionJp = "Uma variedade das varredoras de cores irá saltar enquanto Fuyu estiver a fugir.\nQuando Fuyu atingir Miyo, ataca apenas as varredoras da cor dominante no campo."
4163494881-NameJp = "Dica do Estágio 2 do Desafio do Evento"
4163494881-DescriptionJp = "Alinhe as Equipas Ofensivas Corretas contra a Defesa dos seus Inimigos."
1154737800-NameJp = "Dica do Estágio 3 do Desafio do Evento"
1154737800-DescriptionJp = "Mantém o PV da AMAS acima dos 25%, fortifica o exército da AMAS com Buffs antes de ir para a Linha da Frente.\n\nQuando a bomba for desativada, infligirá grandes danos no Exército Inimigo. Use as habilidades Fogo Concentrado."
184757931-NameJp = "Dica do Estágio 4 do Desafio do Evento"
184757931-DescriptionJp = "Os PV de Akira reduzem drasticamente a cada segundo, mas quando os PV de Akira estiverem a mais de 50%, aplicar-se-ão bónus poderosos aos seus Alunos Aliados.\nO Dano Sofrido pelo Inimigo irá aumentar assim que os Ataques de Habilidade da Akira lhes tocarem.\nO Soldado que Possui um Escudo irá recuperar as Suas PV assim que o utilizar. Tenta utilizar a habilidade CC para desativar o Soldado Inimigo de usar o Escudo."
2290871345-NameJp = "Dica do Estágio 1 do Desafio do Evento"
2290871345-DescriptionJp = "Elimina o alvo assinalado.\nPreste atenção para que os Alunos Atordoados dêem o Golpe Fatal contra Vós."
3231040624-NameJp = "Dica do Estágio 2 do Desafio do Evento"
3231040624-DescriptionJp = "Alinhe as Equipas Ofensivas Corretas contra a Defesa dos seus Inimigos."
1473203563-NameJp = "Dica do Estágio 3 do Desafio do Evento"
1473203563-DescriptionJp = "O Buff de Aluno de Assalto que adquire poderá melhorar os Ganhos Aliados do Capacete.\nOs Capacetes Aliados são capazes de Desencadear Múltiplos Danos contra as Linhas da Frente Inimigas.\nFortalece as Tuas Multidões Aliadas do Capacete em Combate."
1944049600-NameJp = "Dica do Estágio 4 do Desafio do Evento"
1944049600-DescriptionJp = "O Ataque do Capacete Aliado aumenta as Feridas Inimigas.\nCertifica-te que Os Membros do Capacete Aliado se Mantêm Seguros em Combate."
3270373715-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3270373715-DescriptionJp = "O Tambor Explodirá e Desencadeará o Raio de Dano após os Primeiros Segundos desde que o Tambor recuperou Todos os PV.\nDesencadeia a explosão no Momento Certo para eliminar as varredoras."
3881373360-NameJp = "Dica do Estágio 2 do Desafio do Evento"
3881373360-DescriptionJp = "Alinhe as Equipas Ofensivas Corretas contra a Defesa dos Curadores Inimigos."
2657352138-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2657352138-DescriptionJp = "A Yakumo saltará a cada Poucos Segundos.\nAmbos, os Aliados Inimigos e a Sua Equipa que obteve O Livro da Yakumo sofrerão as Estatísticas da Ofensiva Debuff e Entrarão no Modo de Atordoamento num determinado momento.\nEnquanto as Estatísticas Ofensivas de Koharu, Velocidade de Recuperação do Custo e Defesa estão no Modo Debuff."
1246590478-NameJp = "Dica do Estágio 4 do Desafio do Evento"
1246590478-DescriptionJp = "As Feridas Inimigas sofrerão a penalização da Grande Diminuição de PV.\nOs Tambores Vão Explodir num Segundo quando O Tambor Recuperar 100% de PV, os Círculos Interiores dos Tambores Ficarão Feridos de Forma Maciça ao Mesmo Tempo Aumentam a Recuperação de Custo da Sua Equipa.\nOs Inimigos Apanhados na Explosão Sofrem um Aumento da Capacidade de Dano durante um Período de Tempo Específico."
944485355-NameJp = "Dica do Estágio 1 do Desafio do Evento"
944485355-DescriptionJp = "A Habilidade EX do Inimigo tem uma Quantia Esmagadora de Dano de Acerto, mas o Tiro pode Rebentar Se a Cobertura O Intersetar.\nAproveita a Habilidade EX da Tsukuyo (Vestido) para evitar o Raio Inimigo, para que possas defender o Membro da Mouryo da Nossa Equipa."
225733024-NameJp = "Dica do Estágio 2 do Desafio do Evento"
225733024-DescriptionJp = "Tsukuyo (Vestido) vai cair com o seu Debuff do escudo quando Izuna sofrer uma penalidade pesada.\nEnfoca Os teus ataques para Derrubar Primeiro A Tsukuyo (Vestido)."
450982130-NameJp = "Dica do Estágio 3 do Desafio do Evento"
450982130-DescriptionJp = "Os Danos Sofridos no Campo Inimigo aumentam cada vez que as PV do Espantalho Ficam mais Robustas."
3754788721-NameJp = "Dica do Estágio 4 do Desafio do Evento"
3754788721-DescriptionJp = "A Habilidade Buff EX dos Estudantes Pode ser Refletida para O Boss Inimigo.\n\nO Boss Inimigo não recebe a Debuff dos Estados da CC, mas sim a sua Penalidade Acumulada, depois da Duração da CC ultrapassar os 10 Segundos O Boss Inimigo tem mais probabilidades de Sofrer Maiores Feridas. (Pode ser esticado para um Acerto de 10 Vezes) (Quanto Mais Forte se tornar o Estado de CC, mais a Escala de Tempo será afetada)\n\nA Velocidade de Recuperação do Custo Aumentará Exponencialmente sempre que a PV do Espantalho Subir aos 99%.\n\nEvita os Pontos Fortes Incríveis de Resistência e Resistência aos Ataques Críticos do Boss Inimigo."
3884845621-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3884845621-DescriptionJp = "Os Alunos Sofrem os Danos de Fogo Crítico da Explosão e Causam o Estado de Ferimentos Permanentes.\nUse as Habilidades EX de Curas ou Ataque Alargado para prevenir a Explosão da Bomba."
86017968-NameJp = "Dica do Estágio 2 do Desafio do Evento"
86017968-DescriptionJp = "Alinhe as Equipas Ofensivas Corretas contra a Defesa dos seus Inimigos."
3706206590-NameJp = "Dica do Estágio 3 do Desafio do Evento"
3706206590-DescriptionJp = "O Poder do Ataque AMAS vai Aumentar com o Tempo, Derruba o Exército da AMAS no Curto Espaço de Tempo."
1265950056-NameJp = "Dica do Estágio 4 do Desafio do Evento"
1265950056-DescriptionJp = "Os Sobreviventes do Lado do Inimigo tornam-se Unidades Imortais quando Os Restantes não morrem ao Mesmo Tempo.\nPoupa o seu Tempo Destruindo Duas Unidades ao Mesmo Tempo.\n\nReduzindo muito o Dano Inimigo da Habilidade EX em Avant-Garde enquanto as Estatísticas Bónus Serão Acumuladas Sobre Ele em Troca.\nDesativar MecanCrocodilo para um Estado Chocado por Cerca de 15 Segundos Para Expor o Seu Ponto Fraco Antes de Disparar Chama de Sopro Usando o Mecanismo EX Habilidade."
2838352374-NameJp = "Dica do Estágio 1 do Desafio do Evento"
2838352374-DescriptionJp = "Adivinha o Que O Fantasma Tsuchinoko Original Faz Dos Falsos Fantasmas.\nReduções de Status nos Tsuchinoko falsos Não podem Ser Removidos Da Curandeira a não ser que tenhas aplicado no Original.\nOs Fantasmas Falsos Agem de Forma Diferente do Comportamento do Tsuchinoko Original.\nDetecta e Trava Mira no Tsuchinoko e Elimina As Alterações do Estado Curando as Emoções do Aliado e Inflige Dano ao Tsuchinoko."
951156375-NameJp = "Dica do Estágio 2 do Desafio do Evento"
951156375-DescriptionJp = "Atacar as Táticas Defensivas para derrotar Konoka."
2068938700-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2068938700-DescriptionJp = "A Coragem da Rena Encolhe Cada Vez que Ela se Aproxima do Círculo Interno do Inimigo. Destruí-los no Curto Prazo Sem Esgotar o Nível de Coragem."
2249316847-NameJp = "Dica do Estágio 4 do Desafio do Evento"
2249316847-DescriptionJp = "As Habilidades do Ataque Inimigo EX Imprimem Ferimentos Permanentes Na Marca da Konoka E Tiram-lhe Pontos PV.\nKonoka Disparará a sua Habilidade EX Só Se Alguém Curou a Marca Dela. As Habilidades Konoka EX Poderiam Infligir Grandes Feridas Em Unidades Especiais Baseadas Na Defesa.\nTrabalha Com A Konoka Para Eliminar As Hordas."
3676923287-NameJp = "Dica do Estágio 1 do Desafio do Evento"
3676923287-DescriptionJp = "Tens de Evitar O Ponto De Acionamento Armadilha Para Ganhar Esta Etapa.\nColoca os Tambores Mais Fáceis Para Atrair Os Ataques de Akemi, Desencadear os Fios Mais Depressa do que a Exploração Normal.\n\nO Bando Sukeban Vai Crescer Mais Forte Ao Longo Das Batalhas."
1280690466-NameJp = "Dica do Estágio 2 do Desafio do Evento"
1280690466-DescriptionJp = "O seu Ponto a Assinalar na Lista que Todos os Tiros Disparados Deste Campo são do Tipo Bombardeio.\nDestrói o Yukino Pimeiro Uma Vez que Eça Transfere Efeitos Buff nos Companheiros de Equipa dela."
2920015713-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2920015713-DescriptionJp = "Acaba com os Companheiros do Clube de Teatro de Pequim Ao Usar Os Modos de Controlo Antes que Utilizem a Sua Habilidade EX."
2740980058-NameJp = "Dica do Estágio 4 do Desafio do Evento"
2740980058-DescriptionJp = "A Yukino está a carregar o Seu CC Que Pode Fazer as Partes Adjacentes Calarem as Suas Habilidades EX Durante Alguns Segundos.\n\nA Destruição dos Dispositivos da Linha de Fogo Poderia Ligar As Equipas do Clube de Teatro de Pequim Que Te Podem Conceder Efeitos Buff."
1472027894-NameJp = "Dica do Estágio 1 do Desafio do Evento"
1472027894-DescriptionJp = "Ao derrotar O Varredora Os Novos Virão Na Nova Armadura De Formato.\nA Varredora O Inimigo Tem De Corresponder a Formato Para Infligir o Enorme Dano ou Eles Poderiam Assumir Menor Dano Se Eles Puserem Equipas Com As Configurações Erradas.\n\nDerrota o Inimigo para Conjurar do Varredora Correspondente."
3165699134-NameJp = "Dica do Estágio 2 do Desafio do Evento"
3165699134-DescriptionJp = "Vais querer alinhar a Haruka (Vestido) Para a Colocação Estratégica Baseada em Propósitos Armados E Da Sua Armadura."
2899464306-NameJp = "Dica do Estágio 3 do Desafio do Evento"
2899464306-DescriptionJp = "O Boss vai usar O Poder da Armadura Defensiva dos Ladrões Inimigos Adjacentes E da Ofensiva para Formar a Arma Secreta da Máfia do Próprio Mafioso.\nQuando Os Falsos Estão Prestes A Serem Desmaiados Pelos CC podes Acabar A Tarefa A Partir do Comando da Tua Unidade.\n\nO Boss Torna-se Um Pão de Ló Depois dos Seus Secundas Estarem Mortos No Chão Luta Até Eles Desaparecerem."
1993701024-NameJp = "Dica do Estágio 4 do Desafio do Evento"
1993701024-DescriptionJp = "Quando Tu Restauras os Danos Congelados Pelos Coelhos ou Ursos da Companhia Com O Curandeiro De Efeitos CC Eles Poderiam Estar Descongelados no Processo.\nAs Defesas Boss Caem A Pique Uma Vez Que A Quantidade De Robôs a Perseguir Seja Elevada O Suficiente (Os Ursos Dão Melhor Potência para Baixar Os Escudos Inimigos)\n\nO Inimigo Está A Tratar Dano Contínuo Ou Buff Para os Oponentes, Mantém os Ursos e Coelhos de Companhia Seguros Evitando as Feridas Com A Nossa Defesa da Unidade de Ataque E Cuida de Ambos em Simúltaneo Até Ganhar O Combate."
