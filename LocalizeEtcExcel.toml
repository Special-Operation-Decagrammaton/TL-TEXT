2978527733-NameJp = "Chapéu de Marinheiro"
2978527733-DescriptionJp = "Um chapéu de marinheiro branco com um toque de listras. Esse chapéu de design simples também é usado como chapéu oficial da Escola Secundária de Ciências Marinhas Odisseia."
400831532-NameJp = "Luvas de Navegação"
400831532-DescriptionJp = "Luvas com os dedos expostos e forro na palma. Feitas de resina sintética respirável, essas luvas são adequadas para trabalhos navais como a navegação."
1621774808-NameJp = "Sandálias de Água"
1621774808-DescriptionJp = "Sandálias inteiriças feitas de material à prova d'água que secam rápido. A sola tem almofadas para evitar escorregar, mesmo em locais úmidos."
3572602524-NameJp = "Mochila Impermeável"
3572602524-DescriptionJp = "Uma bolsa tipo mochila que pode ser carregada em um ombro só. Por ser feita de material à prova d'água, é ideal para guardar aparelhos eletrônicos que se danificam facilmente na água."
786809132-NameJp = "Broche Flexível Harpyia"
786809132-DescriptionJp = "Um broche com o logotipo da marca de esportes aquáticos \"Harpyia\" impresso nele. É feito de material de borracha macia e é resistente à sujeira, então você pode prendê-lo e decorá-lo facilmente em qualquer lugar."
1668620571-NameJp = "Grampo de Cabelo Âncora"
1668620571-DescriptionJp = "Um grampo de cabelo em forma de âncora com dois ganchos. O design é fofo, mas o cabelo costuma ficar emaranhado nos ganchos ao amarrar o cabelo, por isso dizem que é um pouco inconveniente para o uso real."
4137284716-NameJp = "Amuleto de Dente de Tubarão"
4137284716-DescriptionJp = "Um amuleto feito ao amarrar dentes afiados de tubarão. Diz a lenda que se você tiver este amuleto, ele evitará acidentes no mar."
333016136-NameJp = "Relógio de Mergulho"
333016136-DescriptionJp = "Um smartwatch para mergulhadores da marca de esportes aquáticos \"Harpyia\". Além de ser resistente à água, permite que você verifique o ambiente subaquático em profundidades altas sem se preocupar com a pressão da água."
3366268717-NameJp = "Suporte Octopus"
3366268717-DescriptionJp = "Um suporte tipo colar usado por mergulhadores para fixar seus reguladores de respiração. Os suportes da \"Harpyia\" são conhecidos por suas cores e designs discretos, sendo frequentemente usados ​​como acessórios de moda."
