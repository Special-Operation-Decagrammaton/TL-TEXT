2319299758-NameJp = "Carteira extremamente valiosa da Aru"
2319299758-DescriptionJp = "A carteira de luxo que Aru usa com frequência.\nÉ um item de alta qualidade feito de bons materiais, mas devido ao uso prolongado, a cor desbotou e há arranhões por toda parte. Foi um presente que Haruka, Kayoko e Mutsuki compraram juntas logo após a fundação da Problem Solver 68, e é um item insubstituível e precioso para Aru."
3741719919-NameJp = "Ventilador de super-resfriamento"
3741719919-DescriptionJp = "A arma secreta de Eimi, preparada para atividades em locais ou regiões quentes.\nAo contrário de sua aparência fofa, ele pode gerar ventos de força perigosa. Como a área de alcance do vento é limitada em comparação com sua saída potente, é necessário que as pessoas fiquem próximas umas das outras para receber o vento."
49207748-NameJp = "Jaqueta Sukajan da Neru"
49207748-DescriptionJp = "A jaqueta Sukajan que Neru não deixa sair do seu corpo nem por um segundo. Quando perguntada sobre o motivo de tanto apego, ela dá uma resposta muito simples e clara."
3203934447-NameJp = "Réplica de cachorro-quente da sorte"
3203934447-DescriptionJp = "Uma réplica de cachorro-quente feita de plástico, com cheiro e textura quase idênticos aos de um cachorro-quente real.\nProduzido em uma impressora 3D. Até a marca de uma mordida foi reproduzida. Izumi diz que carrega este modelo consigo porque ele tem um cheiro bom e traz a sorte frequente de poder comer algo delicioso."
1865059509-NameJp = "Drone da Shiroko"
1865059509-DescriptionJp = "O drone que Shiroko carrega sempre consigo. Shiroko insiste que é um drone de filmagem usado durante seus exercícios, mas ele está equipado com vários \"dispositivos adicionais\" que não têm nada a ver com filmagem."
1197583309-NameJp = "Caixa especial da Tsurugi"
1197583309-DescriptionJp = "Uma caixa especial escondida nas profundezas do quarto de Tsurugi.\nContém vários tipos de itens, como fotos, livros e ingressos de cinema, sem distinção de gênero. O estado impecável dos itens, sem um pingo de poeira, permite vislumbrar a atenção aos detalhes de Tsurugi."
2992891006-NameJp = "Boia de suprimentos do Comitê Disciplinar"
2992891006-DescriptionJp = "Uma boia de suprimentos adotada oficialmente pelo Comitê Disciplinar de Gehenna.\nComo esperado do Comitê Disciplinar, ela possui materiais e funções diferentes de uma boia comum. É também um item valioso no qual Hina, que ainda não está acostumada a nadar, sempre confia."
1059841421-NameJp = "Lembrança da infância de Shun"
1059841421-DescriptionJp = "Um par de grampos de cabelo que Shun adora.\nEmbora ela raramente os use agora que quase não faz mais maria-chiquinha, para Shun, eles são uma parte preciosa de suas memórias que não mudam com o passar do tempo."
242283010-NameJp = "Granada de cauda de coelho"
242283010-DescriptionJp = "Uma granada que parece uma cauda de coelho, que Asuna usa quando veste sua roupa de coelhinha.\nEmbora pareça inofensiva por ser coberta de pelos macios, ela possui um poder destrutivo ameaçador, assim como outras granadas."
1916503017-NameJp = "Livro de registro de inventário"
1916503017-DescriptionJp = "O livro de registro de inventário da Catedral de Trinity, criado pela própria Hinata.\nEle detalha cuidadosamente onde e quanto de cada item da catedral está armazenado. Como Hinata geralmente encontra pessoalmente os itens necessários, pessoas de fora muitas vezes desconhecem a existência deste registro."
2878555129-NameJp = "Caderno gourmet"
2878555129-DescriptionJp = "O caderno favorito de Junko. É um caderno especial onde ela registra os restaurantes deliciosos que visitou, avaliando-os por região."
163861415-NameJp = "Calculadora científica da Yuuka"
163861415-DescriptionJp = "A calculadora científica que Yuuka carrega para todos os lugares.\nApesar de possuir excelentes habilidades de cálculo mental, Yuuka sempre usa uma calculadora para conferência, a fim de buscar a perfeição."
1261922711-NameJp = "Fones de ouvido de patrulha"
1261922711-DescriptionJp = "Fones de ouvido que Suzumi carrega durante suas patrulhas. \"Fones de ouvido de patrulha\" é apenas um nome que ela mesma deu; são itens comuns de uso geral."
4237292601-NameJp = "Bule de chá especial Momofriends"
4237292601-DescriptionJp = "Um bule de chá que Hifumi trouxe, dizendo ser um item essencial para quando se vai ao mar de tanque.\nÉ um bule de chá especial feito para tanques. Embora seja para tanques, é um item pessoal comprado com o próprio dinheiro de Hifumi."
2694523503-NameJp = "Assistente de banho"
2694523503-DescriptionJp = "A nova lembrança da Academia Red Winter, feita colocando um bigode em patinhos de borracha encomendados em massa.\nCherino parecia insatisfeita com o patinho, dizendo que era algo para crianças pequenas, mas ela sempre o leva consigo toda vez que vai tomar banho."
2059299965-NameJp = "Athena nº 3"
2059299965-DescriptionJp = "Um drone esférico que sempre circula ao redor de Hare.\nComo o nome tirado da deusa da sabedoria sugere, ele é equipado com uma inteligência artificial capaz de aprender através da experiência, mas frequentemente age de forma contrária às intenções de sua dona, Hare, frustrando suas expectativas."
1544503704-NameJp = "Conjunto de ferramentas do mestre"
1544503704-DescriptionJp = "Um conjunto de ferramentas personalizado que reflete perfeitamente o gosto de Utaha.\nEste conjunto de ferramentas, que ela mesma criou com o orgulho de uma mestre, não seria exagero dizer que é o único do seu tipo em Kivotos."
