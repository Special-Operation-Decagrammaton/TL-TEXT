1766939933-NameJp = "二人で一緒に作った生チョコレート"
1766939933-DescriptionJp = "レンゲが先生の助けを借りて無事完成した手作り生チョコレート。完成度は高くないものの、その中に溶け込んだ思い出は誰にも否定できない。"
2005226182-NameJp = "作戦参謀のチョコレート"
2005226182-DescriptionJp = "キキョウが先生のために用意したチョコレート。堅苦しい名前とは裏腹に、かわいい猫のキャラクターが描かれている。どうやら名前の本当の意味は、このチョコレートを届けるための一連の秘密の大作戦にあるとかないとか。"
3801373544-NameJp = "勘解由小路のお守りとチョコ味の駄菓子"
3801373544-DescriptionJp = "先生のために、ユカリが自分で作ったお守りと、早朝から商店街を歩き回ってやっと手に入れたうんめえ棒の限定版セット。勘解由小路としての自分、百花繚乱の部員としての自分をすべて伝えたいというユカリの様々な気持ちから生まれた、本当に心温まるプレゼントだ。"
3081511179-NameJp = "イブキが作ったチョコプリン"
3081511179-DescriptionJp = "イブキが用意した手作りのチョコプリン。丁寧に作ろうとした結果材料が増え、とてつもなく甘くなった。一度にたくさん食べると舌がしびれるかも。"
1270452267-NameJp = "ミカ特製☆チョコロールケーキ"
