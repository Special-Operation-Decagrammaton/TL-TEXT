3217702690-NameJp = "冷凍エビ"
3217702690-DescriptionJp = "獲ってからすぐに冷凍され、新鮮なまま保存されたエビ。この冷凍エビは夜戸浦村の特産品で、D.U.に納入されるエビのほとんどは夜戸浦村で獲れたものらしい。"
4278574452-NameJp = "小石"
4278574452-DescriptionJp = "海岸でよく見かける小さな小石。一見平凡に見えるが、波によって石同士が擦れて生まれた滑らかさと水で濡れた艶が人を魅了する。"
4062911234-NameJp = "貝殻"
