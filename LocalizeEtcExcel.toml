1056858392-DescriptionJp = "Utilize o botão de mover a câmera no canto superior direito para avançar na batalha.\n\nExperimente incluir alunas da função Especial que tenham habilidades de cura, ou posicione uma aluna com alta defesa na extremidade esquerda da formação de Atacantes."
