3419789713-NameJp = "Bilhete de Seleção de Aluna ★3 de Recrutamento de Arquivo"
3419789713-DescriptionJp = "Um bilhete que permite escolher e recrutar 1 aluna ★3 da seleção do Recrutamento de Arquivo.\nCaso recrute uma aluna que você já possui, você obterá 100 Elephs da respectiva aluna como compensação. ※Se não for utilizado antes das 11:00 do dia 27 de Janeiro de 2026, este bilhete irá desaparecer."
2709614174-NameJp = "Bilhete de 10 Recrutamentos"
2709614174-DescriptionJp = "Um bilhete que permite realizar 10 recrutamentos. ※Se não for utilizado até 31 de Janeiro de 2026 às 23:59, este bilhete irá desaparecer."
2814968857-NameJp = "Pontos de Recollect"
2814968857-DescriptionJp = "Sempre que recrutar, você receberá 'Pontos de Recollect'. Ao acumular 'Pontos de Recollect', você pode utilizá-los para convocar diretamente uma aluna participante da linha de recrutamento da vez.\n※Após o término do período do recrutamento especial, os Pontos de Recollect serão convertidos em Fragmentos de Keystone.\n[c][ff2d2c]Os Pontos de Recollect, diferentemente dos Pontos de Recrutamento e Pontos de Arquivo existentes, não se acumulam com pontos adquiridos em outros recrutamentos.[-][/c]"
3560225627-NameJp = "Rámen Receita Fórmula 44"
3560225627-DescriptionJp = "Um rámen à base de frutos do mar. Já exala uma presença avassaladora apenas pelo seu aroma e aparência. Pode-se dizer que essa originalidade é tanto um desafio quanto uma blasfêmia aos ingredientes."
1070674443-NameJp = "Rámen de Shoyu Leve"
1070674443-DescriptionJp = "Um rámen de caldo transparente feito à base de shoyu. Surpreendentemente leve e refrescante. Ele é tão suave que, se você não prestar atenção, a tigela vai se esvaziar em um piscar de olhos."
2956567346-NameJp = "Rámen de Mayu Preto Extrassaboroso"
2956567346-DescriptionJp = "Um rámen enriquecido com óleo negro de alho torrado, ou Mayu. Uma mordida é o suficiente para que o sabor marcante e profundo do alho inunde sua boca de forma viciante. Deixe o medo de lado só pela aparência e não hesite em dar ao menos uma provada."
2787024907-NameJp = "Tonkotsu Rámen com Cobertura Total"
2787024907-DescriptionJp = "Um tonkotsu rámen coberto absurdamente por todos os ingredientes possíveis. O caldo encorpado e a grande variedade de toppings se misturam em perfeita harmonia, soando até como se formassem uma grande orquestra sinfônica no paladar. Aproveite toda essa união gloriosa ao máximo."
4270783877-NameJp = "Extra Grande! Rámen Dourado e Luxuoso"
4270783877-DescriptionJp = "Seu tamanho colossal desafia todas as lógicas dos râmens convencionais. Comandando uma taxa calórica avassaladora. Beber até a última gota de caldo sem deixar nada derramar é o sinal de um verdadeiro entendedor de rámen. As folhas de ouro decorativas são perfeitamente comestíveis, aliás."
