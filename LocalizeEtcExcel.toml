1489514206-NameJp = "Instalações Correcionais da Valkyrie - Televisão"
1489514206-DescriptionJp = "Uma televisão na agência de correção da Valkyrie. A gravação de um programa de educação está sendo exibida."
764885896-NameJp = "Instalações Correcionais da Valkyrie - Roupa de Cama"
764885896-DescriptionJp = "Um conjunto de roupas de cama colocado à disposição na agência de correção da Valkyrie. Elas são bem macias e quentinhas."
3713514774-NameJp = "Instalações Correcionais da Valkyrie - Tabela de Estatura"
3713514774-DescriptionJp = "Um painel usado na agência de correção da Valkyrie para demarcar a altura de suspeitos durante as tradicionais sessões de fotos para a criação de um dossiê. Fica bem nítido os níveis em que o infrator progrediu no seu crescimento orgânico."
1974220893-NameJp = "Instalações da Valkyrie - Suporte de Revistas"
1974220893-DescriptionJp = "Um suporte de revistas típico que você vê na recepção da Valkyrie. Surpreendentemente, foca bastante em tabloides do entretenimento e escândalos das manchetes sensacionalistas."
550171980-NameJp = "Instalações da Valkyrie - Porta-folhetos"
550171980-DescriptionJp = "Um porta-folhetos com informações promocionais da Valkyrie para campanhas de conscientização cívica do público. São bem prolixos em questões repletas de discursos e imposições morais."
4134076351-NameJp = "Instalações Correcionais da Valkyrie - Piso da Ala Prisional"
4134076351-DescriptionJp = "Um piso que harmoniza um acabamento sóbrio e elegante que facilita absurdamente toda a faxina do ambiente nas instâncias punitivas da unidade."
3551325264-NameJp = "Piso Padrão da Valkyrie"
3551325264-DescriptionJp = "Um piso que ingressou à base de uma conturbada barganha leiloada, mas que para compensar transpassa um formidável nível de robustez rústica."
67247938-NameJp = "Gaveta Grande da Valkyrie (Premium)"
67247938-DescriptionJp = "Uma gigantesca e avantajada gaveta para abrigar grandes arquivos que domina a estrutura nos espaços centrais da agência. Causa uma impressão involuntária de imponência fazendo quem opera as manivelas redobrar os devidos caprichos instintivamente no convívio logístico."
1774177817-NameJp = "Gaveta Média da Valkyrie (Premium)"
1774177817-DescriptionJp = "Um modesto suporte em gavetas na escala padrão envernizadas no polo burocrático e cartorial da Valkyrie. Pela sofisticação imponente da mobília, exige certos trejeitos zelosos daqueles subordinados a arrastar seus rodízios nos labirintos em que são empregadas."
880699199-NameJp = "Gaveta Média da Valkyrie"
880699199-DescriptionJp = "Uma gaveta média comum que é possível encontrar por todo o entorno na Valkyrie. Sem muita surpresa, a engenharia sob a forma simplória oculta uma base fabulosa de resistência firme aos empurrões e trancos cotidianos."
3957484169-NameJp = "Cadeira de Escritório da Valkyrie"
3957484169-DescriptionJp = "Uma cadeira para a mobília rotineira dos internos da Valkyrie que executam os trâmites dos departamentos do recinto burocrático, sendo agraciada com um invejável arcabouço funcional para se tombar nos cochilos em intervalos de descanso."
4123559801-NameJp = "Banqueta da Valkyrie"
4123559801-DescriptionJp = "Uma simples banqueta colocada no escritório da Valkyrie. O assento não é muito indicado se sua intenção for ficar acomodado durante longos períodos burocráticos operantes num dia caótico de ocorrências em série."
2879622347-NameJp = "Janela Antiexplosão Padrão da Valkyrie"
2879622347-DescriptionJp = "Uma janela construída com um vidro temperado no mais denso limiar dos protocolos da Valkyrie focado fundamentalmente contra a detonação abaladora da imensa maioria das rajadas desgovernadas causadas nas periferias da metrópole em que vigora as rondas da guarda local perante as investidas contra malfeitores nas operações campais diárias."
3164734205-NameJp = "Parede Padrão da Valkyrie"
3164734205-DescriptionJp = "Painel de contenção isolante amplamente presente na estrutura corriqueira na qual opera-se os comandos dos setores nas esferas oficiais. Venceu na briga acirrada orçamentária entre fornecedores, mas sustenta com coragem as investidas nos corredores tumultuosos."
934528545-NameJp = "Parede com Bandeira da Valkyrie"
934528545-DescriptionJp = "Um painel de parede com o brasão da Valkyrie estampado e enraizado nos tecidos de forma magnânima para ostentar superioridade moral num reduto militar. O encostar com malícia só pela falta do que fazer não resultará num esporro contido perante as rondas austeras em circulação nas horas vagas."
2435109289-NameJp = "Grade de Ferro da Instalação Correcional da Valkyrie"
2435109289-DescriptionJp = "Aquelas tradicionais barras contínuas soldadas que dividem os reclusos que marcam um tédio profundo e monótono em torno das bases presidiárias punitivas de rotina na sede da polícia... Tem só a dimensão exata perfeitamente contornada nas bordas entre grades que deixará um curioso com o topo do crânio travado sem conseguir recuar ou enfiar a cara pro interior da jaula caso invente a tolice inútil e enfadonha de transpor as brechas metálicas de ferro maciço forjado pra garantir segurança a risco nenhum com a intenção impensada e irresponsável ao redor dos detidos que ficam alocados nos espaços."
2876225434-NameJp = "Porta de Segurança da Instalação Correcional da Valkyrie"
2876225434-DescriptionJp = "A clássica blindagem nas travas que fecha o cativeiro da matriz principal. A interface de chamadas sonoras foi expurgada do painel isolando contatos externos quebrando os abismos no ambiente enclausurado."
1483516418-NameJp = "Sofá para Visitantes da Valkyrie (Pequeno)"
1483516418-DescriptionJp = "Um sofá aconchegante colocado no lobby da Valkyrie para atender o clamor social e mitigar os sofrimentos infundados do amontoado popular impaciente das massas enfileiradas sob a lentidão angustiante dos trâmites perante a lei e os relatórios extensos da burocracia diária que abunda as sedes estatais que o público visita pra desabafar contra um mundo desordenado com requisições irremediáveis ao corpo burocrático e operacional local na região administrativa."
3053259826-NameJp = "Sofá para Visitantes da Valkyrie (Grande)"
3053259826-DescriptionJp = "O suntuoso estofado na guarita centralizado com todo respeito e conforto garantido para amenizar qualquer irritação dos ânimos desgovernados nos debates que ecoam do povão no dia a dia. Relaxar ali com muito folgo e comodidade perante os olhares julgadores trará reprimendas duras que rasgam a alma no mesmo momento aos que decidirem repousar demais a folga indevida da qual se beneficiou do bem-estar ofertado em detrimento dos oprimidos pelo sistema no recinto..."
3327970754-NameJp = "Bandeira da Valkyrie"
3327970754-DescriptionJp = "Um brasão com moldura exibindo orgulhosamente as insígnias da Valkyrie enquadrado em lugar nobre. Como soa como relíquia sagrada oficial para garantir paz às almas oprimidas da multidão amparada perante a ordem imperativa inabalável perante o perigo alheio, parece ser algo que não é factível da burocracia conceder permissão livre a saques como presente fraterno, o que denota certa tristeza aos fãs das lembrancinhas do batalhão e aos visitantes encantados pelos mimos institucionais de corporações."
766048128-NameJp = "Janela de Segurança da Valkyrie"
766048128-DescriptionJp = "Aquele vidro temperado que você enxerga perambulando em cada fresta na fachada exterior do prédio institucional. Consta num encarte colado que denota em letras grotescas que se lambuzar e grudar resinas ali gera conflitos inegociáveis perante a ronda de plantão."
656349259-NameJp = "Janela de Escapamento de Fumaça da Valkyrie"
656349259-DescriptionJp = "Janela estreita bem recorrente num prédio com fins de arejamento pra manter oxigênio renovado nos cubículos da tropa fardada em plantão extenuante nas celas abarrotadas. Apertado a um grau que beira a frustração, é muito acanhado até pra enfiar o corpo num contorcionismo agoniante em caso que reclame evasão numa situação de chamas."
4119343592-NameJp = "Mesa de Escritório da Valkyrie"
4119343592-DescriptionJp = "Mesa operacional fornecida ao escopo processual pra bater os martelos da lei num depoimento arrastado e sufocante ao som dos lamentos que se estendem durante o dia pra escrever a mão grossos calhamaços de autos interrogatórios da escória civil reincidente e dos casos fortuitos enclausurados."
257103482-NameJp = "Quadro Branco da Valkyrie"
257103482-DescriptionJp = "Aquele famoso quadro de esboços lógicos e retóricos instalado nos bunkers pra debates fervorosos sobre os trâmites dos engajamentos nas campanhas. As reprimendas rasgarão a tranquilidade num eco furioso pro incauto que tentar abusar a paz mental fazendo anotações profanas de mal gosto fora da pauta estabelecida para avacalhar o progresso."
3717567290-NameJp = "Instalações da Valkyrie - Estante de Documentos Tipo 1"
3717567290-DescriptionJp = "Uma prateleira que garante um acondicionamento limpo de documentos exaustivos. Está incrivelmente em ordem e categorizada impecavelmente sem causar aflição visual a quem folheia de perto e exige o arquivo prontamente."
552379870-NameJp = "Instalações da Valkyrie - Estante de Documentos Tipo 2"
552379870-DescriptionJp = "Prateleira projetada pro armazenamento contínuo e pragmático para processos corriqueiros na ordem do dia. Solta gemidos estridentes metálicos toda vez que suas dobradiças são torturadas num empurrão ou puxada enérgica gerando incômodo profundo nos ambientes próximos sem avisar com antecipação."
2335238197-NameJp = "Instalações da Valkyrie - Armário"
2335238197-DescriptionJp = "Armários cedidos à privacidade contida às forças para armazenar bens imateriais indevassáveis no regimento militar e na corporação das estudantes armadas no reduto fechado. É um oásis bizarro que oculta inúmeras surpresas insuspeitas num acervo pessoal pra quem conseguir quebrar as portas escondido perante um amontoado da corporação exausto no vestiário e flagrar a surpresa indecente nos fundos obscuros."
2884514363-NameJp = "Porta Automática de Vidro Temperado da Valkyrie"
2884514363-DescriptionJp = "A blindagem vítrea no vão central do regimento num limiar operante autônomo nas agências imperiais da guarda que lida com acessos controlados numa área crítica pra entrada sem maiores questionamentos ou averiguações exaustivas pra entrar no perímetro. A peculiar porta em toda as frentes operativas num complexo burocrático na qual dispõe pra você de pura benevolência um direito escasso e milagroso que permite ir contra correntes pra bater pé abrir no rompante pra desafiar amarras numa vida tomada pela disciplina rígida com intenções que extrapolam a vigilância armada imposta ao cidadão no saguão..."
4096515618-NameJp = "Janela com Bandeira da Valkyrie"
4096515618-DescriptionJp = "Janela guarnecida em evidência explícita pra ofuscar rebeldes estampando os dísticos cívicos num adesivo de propaganda que dita a vigilância incessante e inflexível num domínio fortificado."
176346493-NameJp = "Janela Antiexplosão com Persiana da Valkyrie"
176346493-DescriptionJp = "Construção de defesa formidável em esferas restritas blindadas pra evitar destroços estilhassados a despeito que dispõe com carinho e sutileza um jogo modesto e trivial entre frestas abertas no qual as persianas dão tom e graça acoplados quebrando as brutalidades táticas."
2754850058-NameJp = "Lixeira da Valkyrie (Produto do Trabalho Correcional)"
2754850058-DescriptionJp = "Um cesto de descartes manufaturado pelos custodiados encarcerados prestando serviços laborais forçados com remição de pena numa base reclusa. Uma obra prima espartana e pragmática construída que reverbera uma tenacidade incansável nas reentrâncias demonstrando um detalhismo fervoroso do seu artesão sobressaindo com excelência as limitações nas trevas operantes sem vislumbre."
2410248618-NameJp = "Sofá de Luxo para Visitantes da Valkyrie (Grande)"
2410248618-DescriptionJp = "Estofado imponente fincado aos recepcionados VIP pra esperar os humores oscilantes da autoridade que não cumpre agenda numa delegacia apática num posto central num recanto caótico. Espumado tão generoso aos traseiros que desmaiam que suprime tédios aliviando incômodos profundos num esvaziar mentes que anestesia fadigas de almas mortas garantindo resistência a quem se põe enfileirado para não se desabar esperando a vida fluir..."
524795725-NameJp = "Janela Externa com Persiana da Valkyrie"
524795725-DescriptionJp = "Uma das frestas arquitetônicas de ares clássicos preenchidas no visual opaco pra encobrir clarão incandescente provida do acessório indispensável com estrias no formato persiana muito famosas pro lado das instalações espalhadas num departamento das tropas armadas cívicas para abrigos com visão. Ostenta aos transeuntes incrédulos o vislumbre indestrutível de suas constituições inquestionáveis."
1574554235-NameJp = "Estante das Instalações Correcionais da Valkyrie (Produto do Trabalho Correcional)"
1574554235-DescriptionJp = "O suporte encostado numa beirada encarregado do condicionamento trivial espalhado numa distribuição que vigora nos confinamentos restritos abrigando itens de pequeno porte rotineiro na rotina enclausurada e repetitiva do ambiente prisional restrito às detentas no recinto restrito para infratores condenados na prisão de reabilitação num sistema de recuperação civil punitiva operada no submundo para recuperar e moldar cidadãos num sistema complexo de normas no departamento carcerário central mantido num local fechado longe da liberdade da cidade... Aparência crua pra uma manufatura minuciosa."
4259742109-NameJp = "Purificador de Água da Valkyrie"
4259742109-DescriptionJp = "Equipamento distribuído na grade da engrenagem operativa como bem de suporte da hidratação diária incondicional. Um bebedouro que atua feito salvador perante desgastes constantes e o torpor causado pela voz exausta de quem atura estresses infinitos discursando regras num plantão eterno na corporação e berros incansáveis por justiça no guichê onde gargantas resecam na lida rotineira para apaziguar o inferno num espaço opressivo onde as gargantas sempre imploram clemência na escassez diária."
3822757917-NameJp = "Mesa de Escritório da Valkyrie"
3822757917-DescriptionJp = "Uma escrivaninha simples concebida aos montes como um kit trivial na base de distribuição estatal impessoal pras hordas fardadas engolidas pelos escritórios infindos lidando no trator burocrático dos departamentos das divisões de inteligência militar. Tem traços e funções banais numa moldura ordinária num equipamento padronizado barateado pras licitações e contratos estipulados visando suprir com economia de gastos sem frescuras os requerimentos funcionais dos subordinados num sistema sem empatia por requintes na repartição."
955957296-NameJp = "Mesa de Escritório da Valkyrie (Produto do Trabalho Correcional)"
955957296-DescriptionJp = "Escrivaninha construída numa confecção artesanal num sistema prisional pelos detidos laboriosos almejando remição na estadia reclusa pra ressocialização focada. A trama maciça carrega intenções pesadas de renascença e expurgo espiritual cravando a esperança latente pro amanhã de reerguimento contínuo após as grades enclausuradas num esforço árduo de reestruturar consciências criminosas rumo a redenção que suplanta e anula o passado nebuloso que arruinou uma trajetória pervertida pro um crime em nome da lei e das punições penais restauradoras."
2507296410-NameJp = "Parede de Escritório da Valkyrie"
2507296410-DescriptionJp = "Divisórias operacionais de rotina distribuídas massivamente ao redor dos olhos insones nas centrais departamentais de trâmites sem fim de papelada da força policial operante. Faltas éticas na manufatura do acabamento do rejunte de má índole não causam calafrios numa preocupação imotivada já que as premissas das construtoras não permitem brechas."
1699471238-NameJp = "Piso de Escritório da Valkyrie"
1699471238-DescriptionJp = "Matéria prima de calçamento enraizada nas lajes burocráticas com pisadas monótonas intermináveis das tropas submissas ao expediente extenuante onde rolam interrogatórios longos entre pilhas incontáveis num recanto sufocante que esgota nervos em plantões de rondas de esquadrões da lei no coração da agência da polícia. Uma base ideal no assoalho para enquadrar perfeitamente a mira focada em baixar o rosto numa reflexão sombria recheada do arrependimento melancólico profundo sob o chão."
1503209208-NameJp = "Cenário da Escola de Polícia Valkyrie"
1503209208-DescriptionJp = "O plano de fundo pitoresco nas divisões de uma base que espelha as moradas punitivas e departamentos que comandam o braço vigilante na Escola de Polícia Valkyrie. Com toda a sobriedade que se espera emanar para uma majestade opressora impoluta num clima solene exalando fardas com auras estilosas."
2659685066-NameJp = "Caixa de Armazenamento de Equipamentos da Valkyrie"
2659685066-DescriptionJp = "A arca de contenção armada sob o teto fortificado destinada pra repouso da indumentária dos oficiais da guarda pra abrigar artefatos operacionais e balísticos pra zelar a ordem em ocorrências na metrópole conturbada perante os cidadãos protegidos na cidade movimentada numa vida escolar turbulenta e desafiadora por entre vielas perigosas... Seria ótimo e extremamente louvável prezar pela pureza organizacional para catalogar os materiais na gaveta limpa sem bagunçar as tralhas entulhadas ali."
2156922497-NameJp = "Balcão de Recepção da Valkyrie"
2156922497-DescriptionJp = "Instalação da fachada frontal exposta com um amparo social que gerencia conflitos onde a comunidade descarrega fardos em reclamações com denúncias na Valkyrie numa catarse infinita perante burocratas apáticos na corporação de alunos cadetes alistados no regimento do poder público instituído... Uma ocorrência esporádica milagrosa sem tumultos e barracos bizarros no guichê é um delírio que causa choque no plantão do dia rotineiro de balcões apinhados e guichês disputados à tapa por cidadãos desamparados..."
497303992-NameJp = "Pódio da Valkyrie"
497303992-DescriptionJp = "Palco montado pros comunicados das instâncias de liderança nos porta-vozes enquadrados e documentados perante cúpula dos conselhos centrais sob luzes da mídia em um apelo cerimonial. Há um grau altivo invejável que eleva os humores emanando pura dominação a quem assume um microfone pro pronunciamento público oficial da Valkyrie."
3865070652-NameJp = "Cofre de Documentos da Valkyrie"
3865070652-DescriptionJp = "Casamata equipada aos mínimos pormenores pra prezar e guardar compilações restritas recheadas nos trilhos móveis retráteis. Ficar mexendo e testando na zoeira as engrenagens trará um chilique monumental e ira fúnebre aos responsáveis do recinto."
1784909082-NameJp = "Porta de Proteção do Arquivo da Valkyrie"
1784909082-DescriptionJp = "A pesada tranca operada pra vedar instâncias em que pautas ultra-secretas dos esquadrões permanecem engavetadas aos olhos profanos do mundo comum alheio às conspirações nos baixos mundos que tramam crimes bárbaros. Em cenários sem alarde permanece sempre inviolável aos olhos alheios numa discrição letal e imperativa."
1686910435-NameJp = "Janela Externa do Escritório da Valkyrie"
1686910435-DescriptionJp = "Janela que desponta um amplo horizonte com uma via franca visual pro pátio das frotas policiais blindadas. Ficar de espreita nesse quadrado resguarda a vigilância atenta dos veículos para certificar furtos absurdos de criminosos que ousam saquear o plantel das tropas motorizadas nos narizes das sentinelas desatentas."
1412335632-NameJp = "Mesa de Escritório da Valkyrie (Grande)"
1412335632-DescriptionJp = "Um espólio comum da base operacional tal qual todos os móveis plebeus da fileira padronizada barateada que o sistema confere em escalas em massa, com a ressalva generosa em dispor um leito estendido garantindo sossego de ponta nos cotovelos pra um ofício focado em trâmites confortáveis."
2919623372-NameJp = "Mesa da Impressora da Valkyrie"
2919623372-DescriptionJp = "Mobília projetada focada com uso coletivo restrita a acoplar trambolhos impressores de papéis. Emissão contínua no cartucho das tinteiras causa calafrios agudos e tremedeiras nervosas nas estacas."
1721524749-NameJp = "Mesa de Preenchimento da Valkyrie"
1721524749-DescriptionJp = "Plataforma central no qual petições desordenadas são preenchidas pelas vítimas traumatizadas nos portões do recinto pra redigir seus lamentos num requerimento oficial burocrático na Valkyrie perante infortúnios diários ao mundo. A respiração ofegante precisa atenuar para firmar a caligrafia pro escrivão entender sua letra no papel."
3542329144-NameJp = "Série Escola de Polícia Valkyrie"
3542329144-DescriptionJp = "Faça uma visita à Escola de Polícia Valkyrie, as grandes protetoras da segurança dos cidadãos em toda Kivotos!"
3312448255-NameJp = "Série Escola de Polícia Valkyrie"
3312448255-DescriptionJp = "(X)"
187756687-NameJp = "Escola de Polícia Valkyrie"
187756687-DescriptionJp = "(X)"
