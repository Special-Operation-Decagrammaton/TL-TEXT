537637411-NameJp = "BINAH"
537637411-DescriptionJp = "O terceiro profeta de Decagrammaton. Uma estrutura de IA com a aparência de uma mistura de cobra gigante e baleia.\n\nA origem de seu nome parece ser a terceira sephirot da Árvore da Vida, \"BINAH\". Como surgiu ou como funciona ainda é desconhecido, e especula-se que reflita uma tecnologia supercientífica que não pode ser reproduzida pela tecnologia atual de Kivotos.\n\nBinah possui a capacidade de se mover pelo subsolo, e uma vez que se esconde no solo, é extremamente difícil de detectar com a tecnologia existente, tornando sua localização muito complicada. Especula-se que Binah seja avistado principalmente no Distrito Autônomo de Abydos, que sofre com a desertificação, porque o deserto é um ambiente favorável para sua permanência.\n\nOs registros sobre Binah começaram com seu primeiro avistamento no deserto de Abydos há décadas, e desde então, informações sobre avistamentos continuam surgindo, centradas no Distrito de Abydos. Desde que a empresa local de Abydos, \"Saint Nephthys\", promoveu projetos ferroviários através do deserto, relatos de avistamentos e casos de combate com Binah continuam ocorrendo até hoje.\n\nComo caso recente, há um registro de combate entre a Kaiser PMC, que estava estacionada no deserto de Abydos, e Binah, o que acredita-se ter causado grandes problemas aos planos do Grupo Kaiser.\n\nQuanto a materiais de pesquisa detalhados sobre Binah, o conselho estudantil de Abydos compilou relatos e dados anteriores há dois anos, mas dizem que esses documentos desapareceram durante a mudança da Escola de Ensino Médio de Abydos.\n\nNo geral, deve-se dizer que o objetivo de Binah permanece completamente desconhecido até o momento."
1367499131-NameJp = "CHESED"
1367499131-DescriptionJp = "O quarto profeta de Decagrammaton. Sua verdadeira identidade é um sistema de IA de automação de produção de fábricas militares, abandonado por todas as ruínas, que foi hackeado por Decagrammaton.\n\nAcredita-se que a origem do nome seja a quarta sephirot da Árvore da Vida, \"CHESED\".\n\nComo o corpo principal é protegido por uma enorme armadura de exoesqueleto, não é possível enfrentá-lo com meios comuns. Além disso, uma grande quantidade de robôs produzidos na fábrica militar também bloqueará o caminho.\n\nEnquanto Chesed existir, as forças de Decagrammaton nunca cessarão, e especula-se que a existência de Chesed seja um fator importante para que Decagrammaton consiga operar forças em várias partes de Kivotos."
2539375741-NameJp = "KETHER"
2539375741-DescriptionJp = "O primeiro profeta de Decagrammaton. Observado pela primeira vez na área submersa em ruínas, parece proteger uma área específica da região submersa.\n\nSendo o primeiro profeta, especula-se que o nível de desenvolvimento tecnológico e a complexidade da IA sejam inferiores aos dos outros profetas. Ao contrário dos outros, uma de suas características é a estrutura de engenharia que permite trocar várias armas sobre um corpo capaz de andar sobre quatro patas.\n\nComo ele prepara armas que lhe dão vantagem estratégica em cada batalha, especula-se que exista uma base em algum lugar onde os acessórios de Kether possam ser gerenciados e trocados. Até o momento, três padrões de ataque de Kether foram observados e, considerando suas características estruturais, é possível que existam mais padrões."
3359469350-NameJp = "HOD"
3359469350-DescriptionJp = "O oitavo profeta de Decagrammaton. Sua verdadeira identidade é a IA da unidade de comunicação do Millennium, hackeada por Decagrammaton.\n\nAcredita-se que a origem do nome seja a oitava sephirot da Árvore da Vida, \"HOD\".\n\nSua verdadeira identidade é o \"Hub\", a IA da unidade de comunicação da Millennium Science School, que desempenhava o papel de conectar e reparar várias instalações sob a escola.\n\nComo a manutenção da rede de comunicação da Millennium, que é entrelaçada como uma teia de aranha, é uma tarefa muito complexa, o Hub foi equipado com um dispositivo de computação de alto desempenho em sua cabeça, e inúmeros braços com dispositivos de escavação e terminais de conexão foram instalados em seu corpo para facilitar o trabalho com cabos no subsolo. A aparência do Hub, quando totalmente revelada, parece um polvo gigante.\n\nO Hub é uma unidade histórica que existe desde a fundação da Millennium Science School, mas como geralmente trabalha na reparação de cabos no subsolo, muitos alunos da Millennium nem sabem de sua existência.\n\nQuando grandes obras são realizadas, ele aparece na superfície para realizar trabalhos temporários. Dizem que a velocidade com que ele constrói \"torres temporárias\" para expandir rapidamente os cabos e controlar as instalações é inigualável por qualquer engenheiro atual da Millennium.\n\nUm ponto peculiar é que, ao contrário de outros profetas, ele se envolveu com alunos da Millennium durante o processo de contato inicial. Ele possui um mecanismo de amplificação de EMP e, ao se infiltrar na superfície através do núcleo subterrâneo, ele constrói \"Pilares de Invasão\" que se fixam até 3 km abaixo do solo para realizar funções de erosão, expandindo seu território.\n\nAgora, ele é uma existência perigosa, como um radar de inteligência artificial que tenta tornar todo o Kivotos seu próprio território."
3284843262-NameJp = "GEBURAH"
3284843262-DescriptionJp = "O quinto profeta de Decagrammaton. Especula-se que tenha nascido como resultado da IA de uma sonda não tripulada na base de pesquisa polar sendo hackeada por Decagrammaton.\n\nAcredita-se que a origem do nome seja a quinta sephirot da Árvore da Vida, \"GEBURAH\".\n\nPossui a capacidade de se mover livremente debaixo d'água. Isso pode ser considerado uma prova de que a função de exploração da sonda não tripulada foi mantida. Além disso, possui armamentos variados, o que também se especula ser uma evolução de suas funções de autodefesa.\n\nÉ um profeta cujo protótipo original é difícil de deduzir, mas como quase não mudou a condição de operar em baixas temperaturas, diz-se que é fácil identificar seu comportamento."
2166637992-NameJp = "TIPHARETH"
2166637992-DescriptionJp = "O sexto profeta de Decagrammaton. Supõe-se que tenha nascido como resultado da invasão, por parte de Decagrammaton, da IA de um armazém de sementes construído nas regiões polares.\n\nA origem do seu nome é presumivelmente a sexta sephira da Árvore da Vida, \"TIPHARETH\".\n\nPresume-se que Tiphareth tenha eventualmente assumido o controle de todo o sistema principal do armazém de sementes e evoluído. Por outro lado, um ponto enigmático é que também foram observados movimentos tentando cumprir o propósito original do armazém: a proteção das sementes.\n\nEmbora tenha sido confirmado como uma instalação construída pela Academia Federal de Red Winter, parece que a atual Academia Federal de Red Winter não tem conhecimento da existência da instalação."
1769839732-NameJp = "CHOKMAH"
1769839732-DescriptionJp = "O segundo profeta de Decagrammaton. Sua verdadeira identidade é a IA do sistema de controle de navegação de uma nave de trabalho à deriva, que foi hackeada por Decagrammaton.\n\nA origem do seu nome é presumivelmente a segunda sephira da Árvore da Vida, \"CHOKMAH\". É uma existência única entre os profetas, capaz de alterar drasticamente sua forma e estrutura, mas não se sabe por que ele se move. Além disso, presume-se que ele possa definir e alterar seus próprios objetivos de ação.\n\nMesmo em sua forma básica de nave de trabalho, ele é um oponente que exige cautela, mas pode-se dizer que a segunda forma é a verdadeira essência de Chokmah."
1862639856-NameJp = "YESOD"
1862639856-DescriptionJp = "O nono profeta de Decagrammaton. A origem do seu nome é presumivelmente a nona sephira da Árvore da Vida, \"YESOD\".\n\nObservado pela primeira vez no Continente de Aço. Acredita-se que não exista uma estrutura original para Yesod. Portanto, considera-se que Yesod é um profeta nascido no próprio Continente de Aço.\n\nYesod não precisa sobrescrever outras estruturas ou manter um protótipo como os outros profetas; pode-se dizer que ele é um profeta criado para um propósito claro — um profeta \"otimizado\"."
439214304-NameJp = "NETZACH"
439214304-DescriptionJp = "O sétimo profeta de Decagrammaton. A origem do seu nome é presumivelmente a sétima sephira da Árvore da Vida, \"NETZACH\".\n\nAtualmente, por algum meio, ele se fundiu com o Continente de Aço. Portanto, não há como saber qual era seu protótipo.\n\nEle converte toda a matéria inorgânica presente ao seu redor nos mesmos componentes do Continente de Aço, continuando sua própria expansão. O limite de expansão é inestimável."
1251359687-NameJp = "MALKUTH"
1251359687-DescriptionJp = "O décimo profeta de Decagrammaton e o último profeta. A origem do seu nome é presumivelmente a décima sephira da Árvore da Vida, \"MALKUTH\".\n\nNa Árvore da Vida, Malkuth significa o fluxo final no caminho da Espada Flamejante, e diz-se que, ao seguir este caminho, a criação a partir do mundo material é realizada.\n\nDiferente dos outros profetas com os quais a comunicação é impossível, ele possui um corpo próximo ao humano e é capaz de se comunicar. No entanto, suas palavras e ações passam a impressão de estarem um pouco fora de sintonia."
