2513809664-NameJp = "Bolsa Cheia de Tesouros"
2513809664-DescriptionJp = "A adorável e chique bolsa que a Chise trouxe com ela quando veio brincar na praia. No exterior, tem o crachá com o nome que a Kaho estava tão preocupada com ela ter-se esquecido. Chise embalou as suas grandes memórias na praia nesta bolsa de viagem. Algumas podem ter sido omitidas sem querer, mas não vai acabar com as memórias de qualquer forma."
2119169468-NameJp = "Avental Cor de Rosa cheio de Sonhos"
