2319299758-NameJp = "アルのすごく貴重な財布"
2319299758-DescriptionJp = "アルが愛用する高級財布。\n質の良い素材で作られた高級品だが、長く使用したせいで色があせ、あちこちにキズがついている。初めて便利屋を立ち上げた後、ハルカ、カヨコ、ムツキが一緒にお金を集めてプレゼントしてくれたもので、アルにとってはかけがえのない大切なものである。"
3741719919-NameJp = "超冷却扇風機"
3741719919-DescriptionJp = "暑い場所や暑い地域で活動するために用意されたエイミの秘密兵器。\nかわいい見た目とは裏腹に、危険なレベルの強風を生み出すことができる。強力な出力に比べて風を出す範囲は限られているため、複数人で風を浴びるには体を密着させる必要がある。"
49207748-NameJp = "ネルのスカジャン"
49207748-DescriptionJp = "ネルが1秒も体から離そうとしないスカジャン。こだわる理由について聞くと、とても単純明快な答えが返ってくる。"
3203934447-NameJp = "幸運のホットドッグ模型"
3203934447-DescriptionJp = "匂いや質感が実際のホットドッグとほぼ同じくらいよくできたプラスチック製のホットドッグ模型。\n3Dプリンターで製作。一口食べた跡も再現してある。イズミはこの模型が匂いもよく、何か美味しいものを食べられるという幸運が頻繁に訪れるので持ち歩いているという。"
1865059509-NameJp = "シロコのドローン"
1865059509-DescriptionJp = "シロコがいつも持ち歩いているドローン。シロコ本人は運動する時に使う撮影用ドローンだと主張するが、撮影に関係ない様々な「付加装置」が装備されている。"
1197583309-NameJp = "ツルギの特別ボックス"
1197583309-DescriptionJp = "ツルギの部屋の奥深くに隠されている特別なボックス。\nブロマイドや本、映画表などジャンルを選ばず、様々な種類のグッズが積み重ねられている。ほこり一つなくきれいに整頓されたグッズの状態だけでも、ツルギの細やかさを垣間見ることができる。"
2992891006-NameJp = "風紀委員会の備品浮き輪"
2992891006-DescriptionJp = "ゲヘナ風紀委員会で正式に採用している備品用の浮き輪。\n風紀委員会らしく、普通の浮き輪とは異なる材質、機能を備えている。まだ水泳に慣れていないヒナがいつも頼りにしているありがたいものでもある。"
1059841421-NameJp = "シュンの子供時代の思い出"
1059841421-DescriptionJp = "シュンが大好きな一対のヘアピン。\nツインテールをすることが少なくなりほとんど使わなくなってしまったが、シュンにとっては時が経っても変わらない大切な思い出の一部である。"
242283010-NameJp = "ウサギ尻尾の手榴弾"
242283010-DescriptionJp = "アスナがバニーガールの服装をするときに身につけるウサギの尾のような手榴弾。\nふわふわな毛で覆われて一見無害に見えるが、他の手榴弾と同様に脅威的な破壊力を持っている。"
1916503017-NameJp = "物品管理台帳"
1916503017-DescriptionJp = "ヒナタが自ら作ったトリニティ大聖堂の物品管理台帳。\n大聖堂のすべての物品がどこにどれだけ収納されているかを丁寧にまとめられている。必要な物品はほとんどヒナタが直接探してくれるため、外部の人はこの管理台帳の存在を知らないことが多い。"
2878555129-NameJp = "グルメ手帳"
2878555129-DescriptionJp = "ジュンコが愛用する手帳。ジュンコが通ったおいしいお店を区域別に評価を付けて記録しておいた特別な手帳だ。"
163861415-NameJp = "ユウカの関数電卓"
163861415-DescriptionJp = "ユウカが肌身離さず持ち歩いている関数電卓。\n優れた暗算実力を保有しているにもかかわらず、ユウカはいつも完璧を追求するために検算用の計算機を使用している。"
1261922711-NameJp = "パトロールヘッドホン"
1261922711-DescriptionJp = "スズミがパトロールの時に持ち歩いているヘッドホン。「パトロールヘッドホン」は自分でつけた名前なだけで、普通の汎用品だ。"
4237292601-NameJp = "モモフレンズスペシャルティーポット"
4237292601-DescriptionJp = "戦車に乗ってきた海での必需品だと言って、ヒフミが持ってきたティーポット。\n戦車用に作られた特殊なティーポットである。戦車用だが、あくまでヒフミの私費で購入した個人用品である。"
2694523503-NameJp = "お風呂補佐官"
2694523503-DescriptionJp = "大量発注されたラバー・ダックにひげをつけて作られたレッドウィンター連邦学園の新しいお土産。\nチェリノは幼い子が使うようなものだと、このラバー・ダックに対して気に食わない様子だったが、お風呂に行くたびに必ず連れていくという。"
2059299965-NameJp = "アテナ3号"
