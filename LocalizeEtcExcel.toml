3269210663-NameJp = "議長が用意した最高級チョコレートファウンテン"
3269210663-DescriptionJp = "マコトが特別に先生のために、パーティーと合わせて用意した最高級のチョコレートファウンテン。このままでもとても素敵なものだが、より完璧なものを作りたいというマコトの要望で改造されたため、たまにモーターが暴走してチョコレートを四方八方に噴射することがあるので、使用には注意が必要だ。"
