2319299758-NameJp = "A valiosa carteira de Aru"
2319299758-DescriptionJp = "A carteira que Aru adora e usa.\nÉ um item de alta qualidade e com bons materiais, mas está um pouco rasgada por ter sido usada muito tempo. Aru a recebeu de presente de Haruka, Kayoko e Mutsuki, que juntaram dinheiro após Aru fundar a Problema 68. Trata-se de uma das coisas mais valiosas para Aru."
3741719919-NameJp = "O super ventilador gelado"
3741719919-DescriptionJp = "A arma secreta de Eimi para se movimentar pelas regiões quentes e escaldantes.\nApesar de fofinho, o ventilador consegue soprar um vento tão forte que chega a ser assustador. Como seu alcance não é muito longo, é preciso ficar muito próximo para receber o seu vento."
49207748-NameJp = "A jaqueta de Neru"
49207748-DescriptionJp = "A jaqueta que a Neru não tira do corpo nem por um segundo.\nAo questionarem a razão de usá-la, tudo o que tem em resposta é algo direto e simples."
3203934447-NameJp = "A réplica de cachorro-quente da sorte"
3203934447-DescriptionJp = "Uma réplica de plástico de um cachorro-quente cuja textura e cheiro são quase idênticas a um de verdade.\nFoi feito com uma impressora 3D. A parte da mordida não é exceção. Izumi diz que a carrega porque sua sorte sobe quando ela usa, com o bônus de sentir sempre esse cheirinho gostoso de comida, o que só aumenta o seu apetite."
1865059509-NameJp = "O drone de Shiroko"
1865059509-DescriptionJp = "O drone que Shiroko carrega o tempo todo consigo.\nA própria Shiroko garante que ele foi feito para a captação de imagens e vídeos de seus exercícios, mas alguns recursos o fazem parecer servir a mais de um propósito."
1197583309-NameJp = "A caixa especial da Tsurugi"
1197583309-DescriptionJp = "Uma caixa que a Tsurugi deixa guardada no fundo do quarto.\nLivros, romances, cartões, independentemente do que se trate, os itens se amontoam no seu interior. Estão todos impecáveis, mostrando que foram muito bem cuidados por Tsurugi."
2992891006-NameJp = "A boia de equipamento do Comitê Disciplinar"
2992891006-DescriptionJp = "Uma boia do Comitê Disciplinar da Academia Gehenna usada como equipamento oficial.\nPor ser do Comitê, as suas funções superam as de uma boia comum. É o braço direito de Hina, que não é muito fã de natação."
1059841421-NameJp = "Lembranças de infância de Shun"
1059841421-DescriptionJp = "Os grampos de cabelo que Shun mais adora.\nEmbora ela já não os use como costumava porque não os prende como antes, continua sendo uma das suas memórias queridas daquela época."
242283010-NameJp = "Granada Fofinha de Coelho"
242283010-DescriptionJp = "Uma granada feita com a forma de um coelhinho de algodão fofinho, assemelhando-se bastante ao rabo de coelho usado por Asuna em sua Roupa de Coelhinha.\nAsuna carrega essas fofas, mas fatais, Granadas de Coelho sem pensar muito, embora possuam um grande poder destrutivo e sejam extremamente perigosas."
1916503017-NameJp = "O Registro de Inventário do Produto"
1916503017-DescriptionJp = "Um Registo Completo De Todas As Coisas Nela Nas Prestações Das Catedral Pela A Hinata Pessoalmente Elaborou Num Vislumbre As Coisas Num Detalhe A Quais Está Onde As Ponto As Encontrar Nas Suas Relato É Como De Forma Muito Organizado Num Registo Desta Emissão De Auras E Por Que A Pessoas Das As Outras Não Têm Informações Sobre As Sua Própria Existência Devido A Que A Hinata O Ajudou."
2878555129-NameJp = "Diário do Gourmet"
2878555129-DescriptionJp = "O Cadernos Pessoalmente Adorado E Usado Pela A Junko Onde As Prestações De Relato A Apresentações As Deliciosas As Lojas As Informações O O Onde A Ponto De Fazer O Registo Nela As Ponto As Emulação Da As Prestações Das Emulação."
163861415-NameJp = "A Calculadora Científica da Yuuka"
163861415-DescriptionJp = "Calculadoras As Qual As Emissão Do Yuuka Têm Em Exposição Nela Emulação A Prestações De Carregar Ao Longo Da Onde As Ponto De Emulação A Tonalidade O O Onde As Mesmo A Ter Numa Capacidades De Fazer As Contas Sem A Calculadoras Ela Está A Usar Por A Ponto Das Emissão."
