3194776850-NameJp = "Escritório"
3194776850-DescriptionJp = "O escritório (office) que abriga os diversos suprimentos necessários para o trabalho administrativo. O Sensei faz a maior parte do seu trabalho da Schale neste local."
1907901108-NameJp = "Sala Audiovisual"
1907901108-DescriptionJp = "Uma sala audiovisual equipada com uma tela enorme onde mídias visuais podem ser apreciadas. Vários tipos de doramas, filmes e até os animes do momento podem ser assistidos por aqui."
358080736-NameJp = "Ginásio"
358080736-DescriptionJp = "Um ginásio de grande porte que também conta com arquibancadas. Praticamente todos os tipos de equipamentos esportivos estão disponíveis aqui."
4294611526-NameJp = "Primeiro Prédio Escolar de Gehenna"
4294611526-DescriptionJp = "O maior prédio escolar do Distrito Central da Academia Gehenna. Há muitas salas de aula, mas quase nenhuma delas é usada para dar aulas de verdade."
1274324253-NameJp = "Prédio Principal dos Clubes de Gehenna"
1274324253-DescriptionJp = "O prédio onde se reúnem as salas dos clubes da Academia Gehenna. No entanto, para a maioria das alunas, isso aqui é só um espaço para ser usado livremente."
358653965-NameJp = "Pátio da Academia Gehenna"
358653965-DescriptionJp = "O pátio escolar, que ostenta uma área gigantesca. Não é bem administrado e, se você abaixar a guarda, pode acabar se perdendo, então é preciso ter cuidado."
2196189972-NameJp = "Campo Central da Academia Gehenna"
2196189972-DescriptionJp = "O campo esportivo central da Academia Gehenna. Aulas de educação física e diversas atividades ao ar livre podem ser realizadas aqui."
1866984703-NameJp = "Segundo Prédio Escolar de Gehenna"
1866984703-DescriptionJp = "O segundo prédio escolar do Distrito Central da Academia Gehenna. Diferente do primeiro prédio, este é dedicado às poucas alunas estudiosas para que possam focar em seus estudos."
3032755222-NameJp = "Praça das Alunas de Gehenna"
3032755222-DescriptionJp = "Uma praça que as alunas podem usar livremente. Como é um local com um grande fluxo de estudantes, as confusões e brigas não param dia e noite."
970571410-NameJp = "Sede do Comitê Disciplinar de Gehenna"
970571410-DescriptionJp = "A sede onde o Comitê Disciplinar de Gehenna está localizado. É o único local no Distrito Central que é devidamente administrado."
1533671597-NameJp = "Prédio Escolar Abandonado de Gehenna"
1533671597-DescriptionJp = "Um prédio que não é mais utilizado. Embora tenha sido fechado como instalação, ainda é possível entrar e sair livremente, tornando-se um viveiro para vários incidentes. Como é uma área perigosa, é preciso ter cautela ao entrar."
261901867-NameJp = "Biblioteca"
261901867-DescriptionJp = "A biblioteca que abriga uma vasta quantidade de livros, desde os materiais de estudo das alunas até os livros de trabalho do Sensei. Não há apenas livros sérios, mangás e light novels também estão disponíveis."
1983840990-NameJp = "Prédio Principal de Abydos"
1983840990-DescriptionJp = "O prédio principal de Abydos, utilizado principalmente pelas alunas da escola. Graças à manutenção cuidadosa das alunas do Comitê de Contramedidas, ele se mantém limpo e em bom estado, apesar das tempestades de areia diárias."
3073680445-NameJp = "Prédio Anexo de Abydos"
3073680445-DescriptionJp = "O prédio anexo de Abydos, conectado ao prédio principal por um corredor. Salas de aula como as de ciências e música, que atualmente não estão em uso, estão reunidas aqui."
3030528899-NameJp = "Campo Esportivo de Abydos"
3030528899-DescriptionJp = "O campo esportivo onde aulas de educação física e festivais esportivos costumavam acontecer. Atualmente está sendo enterrado pela areia, tornando sua manutenção difícil."
4060200853-NameJp = "Biblioteca de Abydos"
4060200853-DescriptionJp = "A biblioteca onde você pode estudar ou ler livros. Desde diversos materiais de referência para estudos até revistas e mangás, há vários livros que eram populares em Abydos disponíveis aqui."
4149434655-NameJp = "Piscina de Abydos"
4149434655-DescriptionJp = "A piscina de Abydos, que raramente é usada hoje em dia. A água secou completamente e a areia se acumula no chão rachado."
2812564490-NameJp = "Ginásio de Abydos"
2812564490-DescriptionJp = "Um ginásio que serve não apenas para aulas de educação física internas, mas também como auditório. Atualmente, materiais e equipamentos esportivos que não estão em uso são armazenados aqui."
3019364332-NameJp = "Lojinha de Abydos"
3019364332-DescriptionJp = "A lojinha que todo mundo adora. A variedade de produtos pode ser inferior em comparação com outras escolas, mas os pães e doces que são populares em Kivotos ainda podem ser encontrados aqui."
2602511445-NameJp = "Prédio Antigo de Abydos"
2602511445-DescriptionJp = "Um prédio escolar que no passado era usado como espaço de descanso para círculos e clubes. Por ser um prédio antigo, foi fechado devido a preocupações com sua durabilidade, mas de vez em quando as alunas o usam para testes de coragem."
774508018-NameJp = "Sala de Aula"
774508018-DescriptionJp = "A sala de aula onde as alunas costumam ter aulas. Também é usada quando as alunas querem estudar por conta própria ou apresentar trabalhos."
1925286931-NameJp = "Torre Millennium"
1925286931-DescriptionJp = "Uma torre gigante que abriga os principais clubes e comitês da Millennium, incluindo a Seminar. Equipada com diversos sistemas de segurança de ponta, o acesso a pessoas de fora é estritamente restrito."
698860447-NameJp = "Estação do Monotrilho"
698860447-DescriptionJp = "A estação do monotrilho que permite que você se desloque para vários lugares pela academia. O monotrilho da Millennium é bastante rápido e quase não tem ruído ou vibrações."
2688045816-NameJp = "Biblioteca"
2688045816-DescriptionJp = "A biblioteca que as alunas da Millennium usam para pesquisa e investigação. Também é possível visualizar mídias de vídeo, como documentários e afins."
1022652590-NameJp = "Lojinha"
1022652590-DescriptionJp = "A lojinha perfeita para dar uma pausa, vendendo pães, bebidas, etc. Mesmo com tantos produtos, dizem que as vendas de expresso duplo e bebidas energéticas são impressionantes."
2885237148-NameJp = "Centro de Treinamento Prático"
2885237148-DescriptionJp = "O centro de treinamento prático onde vários experimentos de engenharia podem ser realizados. Há muitos equipamentos e instalações de ponta, como impressoras 3D de grande porte."
3070757653-NameJp = "Datacenter"
3070757653-DescriptionJp = "O datacenter onde uma enorme quantidade de servidores e equipamentos de comunicação de dados está instalada. Os valiosos materiais de pesquisa da Millennium também são armazenados aqui."
1295016811-NameJp = "Usina de Energia"
1295016811-DescriptionJp = "A usina que produz e fornece a eletricidade usada dentro da Escola de Ciências Millennium. Parece ser um sistema ecologicamente correto que quase não gera poluição."
895510277-NameJp = "Centro de Academia"
895510277-DescriptionJp = "O centro de academia onde você pode relaxar seu corpo cansado das pesquisas ou se exercitar. Com instalações de ponta, ele oferece um treinamento otimizado para cada aluna individualmente."
3140661513-NameJp = "Laboratório"
3140661513-DescriptionJp = "Uma sala de aula onde experimentos científicos simples podem ser realizados. Como também há muitos produtos químicos perigosos e instrumentos afiados, é preciso ter bastante cuidado."
2871272188-NameJp = "Catedral de Trinity"
2871272188-DescriptionJp = "O maior prédio de Trinity, sendo verdadeiramente o lugar que a simboliza. Ao mesmo tempo, também é a sede da \"Irmandade\"."
3137866576-NameJp = "Praça Trinity"
3137866576-DescriptionJp = "Uma praça localizada bem no centro de Trinity, que também dá nome a esta área. É um local popular onde as alunas de Trinity costumam se reunir, e a bela fonte no centro, em especial, tornou-se um ponto famoso que até mesmo aqueles que não conhecem bem Trinity já ouviram falar."
3915788217-NameJp = "Biblioteca Central"
3915788217-DescriptionJp = "Uma biblioteca gigantesca que dizem ser a maior não apenas em Trinity, mas em toda Kivotos. Devido ao seu tamanho e complexidade, há rumores de que de vez em quando algumas alunas acabam se perdendo dentro deste prédio."
1205798181-NameJp = "Prédio dos Clubes"
1205798181-DescriptionJp = "Um dos prédios onde os clubes e comitês de Trinity estão reunidos. Todos os dias, várias atividades, reuniões e afins são realizadas aqui."
1291519405-NameJp = "Basis schola"
1291519405-DescriptionJp = "Um prédio antigo que não é mais utilizado, cujo nome significa \"Base das Alunas\". Parece que em algum momento no passado ele serviu como a sede dos \"Cavaleiros do Hospital\"."
2678735093-NameJp = "Museu de Arte"
2678735093-DescriptionJp = "O museu de arte dentro do campus da academia onde muitas obras estão abrigadas. Ocasionalmente, também é usado como um local para dar aulas de arte."
1148047130-NameJp = "Salão de Música"
1148047130-DescriptionJp = "Um prédio construído relativamente recentemente que abriga uma sala de música. Além das aulas de música, também é usado como palco para concertos, peças de teatro e etc."
2413575071-NameJp = "Biblioteca de Antiguidades"
2413575071-DescriptionJp = "Um prédio separado da Biblioteca Central onde livros antigos e afins são mantidos. Como já tem uma certa idade e não pode ser considerado muito limpo, as alunas raramente o visitam. Também é usado como a sede do \"Comitê de Biblioteca\" de Trinity."
1107627875-NameJp = "Estande de Tiro"
1107627875-DescriptionJp = "Um local de prática de tiro com espaço suficiente para que várias pessoas possam atirar simultaneamente. Vários tipos de munições são disponibilizadas para que alunas de qualquer escola possam utilizá-lo."
2340126097-NameJp = "Escritório de Red Winter"
2340126097-DescriptionJp = "O prédio principal onde fica o escritório da Red Winter. Em vários lugares, esculturas de bigode que simbolizam a autoridade da Presidente Cherino estão instaladas."
683355499-NameJp = "Praça da Revolução do Bigode Vermelho"
683355499-DescriptionJp = "Uma praça gigantesca perto do escritório da Red Winter. Todo fim de semana, comícios elogiando os grandes feitos da Presidente Cherino são realizados aqui."
414654122-NameJp = "1º Dormitório Público"
414654122-DescriptionJp = "Um dormitório público construído sob a orientação do escritório. Ele pode acomodar pessoas com eficiência, mas devido ao envelhecimento da estrutura, a água quente não funciona em muitos dos quartos."
2066711573-NameJp = "Estação de Transmissão Red Bear"
2066711573-DescriptionJp = "A estação de transmissão de onde a única mídia de massa da Academia Federal Red Winter, a \"Red Bear\", é transmitida. A maior parte do conteúdo transmitido consiste em elogios à Presidente Cherino."
3364708890-NameJp = "3º Refeitório Público"
3364708890-DescriptionJp = "O refeitório estudantil onde as alunas de Red Winter fazem suas refeições. Com a exceção da grande Presidente Cherino, a comida fornecida a todas as alunas é igualitária."
2715934839-NameJp = "Mercado da Beluga"
2715934839-DescriptionJp = "Um mercado ao ar livre histórico onde as alunas de Red Winter compram e vendem coisas feitas à mão. Às vezes, mercadorias ilícitas que não foram aprovadas pelo escritório também circulam por aqui."
264515151-NameJp = "Armazém Florestal"
264515151-DescriptionJp = "O armazém onde maquinários florestais e as madeiras necessárias para a derrubada de árvores são armazenados. Como há muitas máquinas perigosas, certifique-se de usar equipamentos de segurança ao visitá-lo."
328579908-NameJp = "Escritório do Departamento de Obras Públicas"
328579908-DescriptionJp = "O escritório onde as alunas do Departamento de Obras Públicas geralmente ficam de prontidão. Se você visitá-lo, poderá sempre receber um serviço rápido e perfeito."
3657567135-NameJp = "Hangar"
3657567135-DescriptionJp = "O hangar onde armas de apoio tático, como tanques, veículos e helicópteros, podem ser armazenadas. Várias ferramentas necessárias para a manutenção e reparo dos veículos também estão disponíveis."
1933676415-NameJp = "Prédio Principal do Departamento Yin-Yang de Hyakkiyako"
1933676415-DescriptionJp = "O prédio principal que abriga o Departamento Yin-Yang, o conselho estudantil de fato da Aliança da Academia Hyakkiyako. Entre as alunas, corre o boato de que ele está equipado com todos os tipos de armadilhas e instalações de defesa."
4168293052-NameJp = "Praça Central"
4168293052-DescriptionJp = "Uma praça gigantesca visível do Prédio Principal do Departamento Yin-Yang. Ela é utilizada como ponto de encontro para os turistas, e a estátua de bronze no centro da praça ostenta uma enorme popularidade como um ponto para fotos."
2953329321-NameJp = "Salão de Apresentações do Departamento Yin-Yang"
2953329321-DescriptionJp = "O local onde as apresentações irregulares do Departamento Yin-Yang são realizadas. Battle Royale de Haiku, o torneio de Rakugo da Niya, as demonstrações surpresa de habilidades especiais da Chise, etc. — É famoso por esgotar os ingressos toda vez que há uma apresentação."
990108595-NameJp = "Grande Jardim"
990108595-DescriptionJp = "Um jardim famoso que todo turista que vem visitar a Aliança da Academia Hyakkiyako faz questão de conhecer. Em particular, há um boato de que uma carpa gigante chamada \"O Mestre\" vive em seu lago. Mercadorias dela também estão à venda no momento."
1694812288-NameJp = "Rua Comercial de Hyakkiyako"
1694812288-DescriptionJp = "A rua comercial da Aliança da Academia Hyakkiyako. A \"Hyakuya-dou\", uma casa de chá famosa até mesmo em Hyakkiyako, também fica aqui. Quando crianças problema causam confusão, a garota-propaganda da Hyakuya-dou aparentemente as resolve na base da força."
2072243193-NameJp = "Teleférico de Turismo"
2072243193-DescriptionJp = "O teleférico da Aliança da Academia Hyakkiyako. A vista panorâmica de Hyakkiyako que se vê do veículo se tornará uma lembrança insubstituível. A tarifa é de 500 ienes para ida e volta."
2050672265-NameJp = "Museu de Tradições"
2050672265-DescriptionJp = "Um museu gigantesco onde você pode vivenciar as tradições e a história únicas da Aliança da Academia Hyakkiyako. A reputação dele entre as alunas que o visitam não parece ser muito boa."
4134542221-NameJp = "Mirante da Árvore Divina"
4134542221-DescriptionJp = "Um mirante de onde é possível ter uma vista panorâmica de Hyakkiyako. Devido a sua paisagem deslumbrante, tornou-se cenário de inúmeros filmes e doramas, tornando-se famoso como um lugar sagrado."
2941784831-NameJp = "Filial de Shiratori da Academia de Polícia Valkyrie"
2941784831-DescriptionJp = "Uma filial da Academia de Polícia Valkyrie. Ela é cercada por um exuberante espaço verde e, aparentemente, o ar em especial é muito bom."
1693953940-NameJp = "Corgi Town"
1693953940-DescriptionJp = "Uma famosa rua de lojas de eletrônicos. Há rumores de que você pode conseguir qualquer coisa por aqui, exceto produtos que já saíram de linha."
4116376335-NameJp = "Praça Tri"
4116376335-DescriptionJp = "Uma praça que é usada tanto como um local de relaxamento quanto como um ponto de encontro. É o lugar perfeito para dar um passeio."
3884396288-NameJp = "3º Distrito de Negócios"
3884396288-DescriptionJp = "O distrito de negócios localizado ao lado da Praça Tri. É um espaço moderno e sofisticado, onde as ruas e os edifícios se harmonizam lindamente."
880697741-NameJp = "Avenida Prado"
880697741-DescriptionJp = "A avenida onde o museu de arte está localizado. O museu de arte em si também é maravilhoso, mas a cidade inteira se tornou a cidade da arte."
3130494169-NameJp = "Parque do Bairro Shiratori"
3130494169-DescriptionJp = "O número de visitantes não é tão grande em comparação ao tamanho do parque, mas mesmo assim é um lugar indispensável."
3543706609-NameJp = "Porto Kanezaki"
3543706609-DescriptionJp = "Se você quiser ver o mar, ir até este lugar é uma boa ideia. Embora possa não ser bem a visão que você imaginou."
3251299115-NameJp = "Lamini Town"
3251299115-DescriptionJp = "Uma rua de restaurantes que não fica nada atrás dos points gourmet de cada academia. Inúmeras barracas de comida e lanchonetes estão enfileiradas em ambos os lados do rio estreito."
1833374923-NameJp = "Sala de Estudos"
1833374923-DescriptionJp = "Uma sala usada para estudos individuais ou em grupo. Por ser muito popular, é necessário fazer uma reserva antes de usá-la."
3691365347-NameJp = "Sala de Treinamento"
3691365347-DescriptionJp = "Uma autêntica sala de treinamento equipada com esteiras, halteres, racks de agachamento e muito mais. Mesmo com todo o trabalho agitado, você deve se exercitar diligentemente e treinar seu corpo para não comprometer a sua saúde."
2987442229-NameJp = "Sala de Descanso"
2987442229-DescriptionJp = "Uma sala de descanso equipada com cadeiras reclináveis e camas, e conta até mesmo com um bar. Também está equipada com instalações para higiene pessoal, pensando no Sensei, que costuma trabalhar com frequência no turno da noite."
174166180-NameJp = "Loja de Conveniência"
174166180-DescriptionJp = "A loja de conveniência \"Angel 24\", localizada na área residencial. Você pode comprar lanches, bebidas, explosivos, etc."
3217933897-NameJp = "Fliperama"
3217933897-DescriptionJp = "Um fliperama na área residencial com várias máquinas de fliperama instaladas. Como a maioria delas são jogos retrôs antigos, ele ostenta de uma grande popularidade entre uma pequena minoria de fãs de várias partes."
1142275086-NameJp = "Refeitório"
1142275086-DescriptionJp = "O refeitório da área residencial, que cuida das refeições na Schale. Vários equipamentos de cozinha também estão disponíveis, então você também pode ter aulas práticas de culinária por aqui."
2776103305-NameJp = "Horta"
2776103305-DescriptionJp = "Uma pequena horta instalada no terraço ao ar livre para cultivar plantas. Você pode cultivar os vegetais e frutas que serão usados na culinária."
110094030-NameJp = "Escola Secundária de Abydos"
110094030-DescriptionJp = "A escola principal da Escola Secundária de Abydos. Antigamente, era o pequeno prédio de uma escola filial, mas agora é usada como a escola principal."
4267333592-NameJp = "D.U. Distrito de Shiratori"
4267333592-DescriptionJp = "(X)"
3125409229-NameJp = "Academia Gehenna - Distrito Central"
3125409229-DescriptionJp = "O Distrito Central da Academia Gehenna. Gehenna é uma das três maiores academias de Kivotos e é caracterizada pelo seu ambiente escolar liberal."
1428109633-NameJp = "Centro de Hyakkiyako"
1428109633-DescriptionJp = "(X)"
1111616358-NameJp = "Millennium - Área de Estudo"
1111616358-DescriptionJp = "Uma área especializada em estudos dentro da Escola de Ciências Millennium. A Millennium é uma academia especializada no ensino de ciências e, embora a sua história ainda seja curta, é considerada uma das academias mais influentes de toda Kivotos."
1466521158-NameJp = "Academia Federal Red Winter"
1466521158-DescriptionJp = "(X)"
1895832836-NameJp = "Escritório da Schale"
1895832836-DescriptionJp = "O escritório da Schale. Muitos espaços de trabalho e escritórios foram preparados nele."
4231969254-NameJp = "Área Residencial da Schale"
4231969254-DescriptionJp = "A área residencial da Schale. Este é também o lugar onde o Sensei passa a maior parte do seu dia a dia."
481812794-NameJp = "Praça Trinity"
481812794-DescriptionJp = "A área onde a praça está localizada dentro da Academia Geral Trinity. A Trinity tem um histórico de nascer a partir da união de várias escolas e possui um dos maiores territórios de toda Kivotos."
