1233193158-NameJp = "Please clean up a little!"
1233193158-DescriptionJp = "Kei: 'Let's start by cleaning. Is this really a place where people live?'\nMomoi: 'Geh, isn't it fine as long as we can make games?'\nKei: 'A messy room leads to a messy mind!'"
3392696487-NameJp = "Please eat your vegetables too"
3392696487-DescriptionJp = "Kei: 'Protein, fiber, vitamins. It's important to consume them in a balanced way.'\nAris: 'Understood! Aris will eat a balanced diet!'\nKei: 'Yes, well done.'"
4227291809-NameJp = "Plan your development"
4227291809-DescriptionJp = "Kei: 'What is this schedule!? Who on earth put this together!?'\nMidori: 'We're all just writing in our own parts...'\nKei: 'Please leave more buffer! Game development always turns into a chaotic crunch even with proper management!'"
2951021449-NameJp = "Respecting the expert's opinion"
2951021449-DescriptionJp = "Yuzu: 'U-Um, this code is...'\nKei: 'Eh... y-yes...'\nKei (I'm not familiar with this field... but if it's Yuzu, it should be fine.)"
