2307433907-DescriptionJp = "今年は少なくとも悪くない一年になるでしょう。しかし外は寒いので、健康面にはご注意を。外出して帰ってきたら、手洗いうがいも忘れずに！健康第一！"
3879409653-NameJp = "中吉"
