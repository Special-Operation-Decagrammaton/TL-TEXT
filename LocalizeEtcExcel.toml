4119717887-NameJp = "Mesa da Sala do Clube de Yin-Yang"
4119717887-DescriptionJp = "Uma mesa onde montanhas e pilhas e mais pilhas dos afazeres diários dão as dores da cabeça nas vigílias dos plantões do corre as rotinas. E dizem as más línguas que a lida pro descanso ou pras fugidas nos acasos das fugas dela dão em a Niya metendo uma perna sob a fuga com montante pro se divertir a jogar o trabalho das papeladas e da mesa toda, largadas pro suspiro dum queixo lá num pranto pela Chise."
103026725-NameJp = "Guia do Ritmo"
103026725-DescriptionJp = "As infinitas e densas das pancadarias marcadas lá pras profundezas no couro e material dum instrumento que ecoa ao rufar que uma certa das alunas da banda metralhou ali para provar a lida numa bater as estadias de prática em ensaios. E vamos no ritmo! No bater na corda mais apurada do velozes!"
