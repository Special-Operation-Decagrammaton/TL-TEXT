2118635362-NameJp = "Mesa de Vendas"
2118635362-DescriptionJp = "Uma mesa montada com a intenção de vender ou trocar... vários 'tipos de livros'. À primeira vista, parece uma mesa qualquer, mas na realidade não é bem assim. Se você der de cara com alguma vendedora fazendo cosplay, lembre-se de interagir com o devido respeito e boas maneiras."
