2711187349-DescriptionJp = "様々な競技の小物が保管されている保管箱。人気の種目は早めに接近しなければならない！"
4186446994-NameJp = "大運動会のランチテーブル"
4186446994-DescriptionJp = "大運動会の華であるランチ用のテーブル。午前の反省会をし、逆転優勝を狙うための作戦会議に使える。"
3249630751-NameJp = "大運動会のトロフィー陳列台"
3249630751-DescriptionJp = "栄光あるトロフィーが並んだ大運動会のトロフィー陳列台。大運動会に参加する生徒たちの目標であり夢が詰まっている。"
1270765820-NameJp = "大運動会の入場ゲート"
1270765820-DescriptionJp = "華やかな大運動会の開幕を知らせる入場ゲート。入った瞬間から熱気が感じられる。"
2400305011-NameJp = "カーテン付き窓"
2400305011-DescriptionJp = "カーテンが付いた窓。窓の外から風が入ると平和を感じられる。"
540301307-NameJp = "白いコーヒーテーブル"
540301307-DescriptionJp = "コーヒーを置けるテーブル。のんびりとした午後のティータイムが楽しめる。"
2738215609-NameJp = "カラーのシングルチェア"
2738215609-DescriptionJp = "配色センスが際立つシングルチェア。丈夫なのにふかふかで、座ると気持ちいい。"
4156726588-NameJp = "植木鉢の棚"
4156726588-DescriptionJp = "植木鉢が乗せられた棚。壁に視覚的なアクセントをもたらす。"
3942981484-NameJp = "白いデザートテーブル"
3942981484-DescriptionJp = "デザートが置いてあるローテーブル。誰かと一緒に楽しく会話するのにぴったりなテーブル。"
2108508784-NameJp = "カラーの長椅子"
2108508784-DescriptionJp = "二人で使用可能な長椅子。長い時間座っても身体が痛まないのが大きなメリット。"
696868990-NameJp = "カラーの二段植木鉢"
696868990-DescriptionJp = "二段に分かれた植木鉢。これを置くだけで、自分だけの庭園が持つことができる。"
