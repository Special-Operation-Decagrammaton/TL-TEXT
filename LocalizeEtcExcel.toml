[translation]
3609368965-NameJp = "文字の長さ制御用テキスト"
3609368965-DescriptionJp = ""
3194776850-NameJp = "執務室"
3194776850-DescriptionJp = "事務仕事に必要な、様々な備品が置かれている執務室（オフィス）です。先生は主にこの場所でシャーレの仕事をしています。"
1907901108-NameJp = "視聴覚室"
1907901108-DescriptionJp = "映像媒体を鑑賞できる大きなスクリーンが設置された視聴覚室です。各種ドラマや映画、流行りのアニメなども鑑賞することができます。"
358080736-NameJp = "体育館"
358080736-DescriptionJp = "観客席も設置されている大型の体育館です。スポーツ用品もほとんど完備されています。"
4294611526-NameJp = "ゲヘナ第一校舎"
4294611526-DescriptionJp = "ゲヘナ学園・中央区最大の校舎です。教室がたくさんありますが、きちんと授業が行われている教室はほとんどありません。"
1274324253-NameJp = "ゲヘナ学園・部室棟本館"
1274324253-DescriptionJp = "ゲヘナ学園の部室が集まっている建物です。しかし、ほとんどの生徒にとっては自由に使えるスペースとして利用されています。"
358653965-NameJp = "ゲヘナ学園・校庭"
358653965-DescriptionJp = "広い敷地面積を誇る校庭です。きちんと管理されておらず、油断すると道に迷うこともあるので注意が必要です。"
2196189972-NameJp = "ゲヘナ学園・中央運動場"
2196189972-DescriptionJp = "ゲヘナ学園の中央運動場です。体育の授業や、様々な屋外活動ができます。"
1866984703-NameJp = "ゲヘナ第二校舎"
1866984703-DescriptionJp = "ゲヘナ学園中央区の第二校舎です。第一校舎とは異なり、勉強熱心な一部の生徒が学業に集中するための校舎です。"
3032755222-NameJp = "ゲヘナ学生広場"
3032755222-DescriptionJp = "生徒たちが自由に利用できる広場です。多くの生徒たちが行き来する所なので、日夜争いごとが絶えません。"
970571410-NameJp = "ゲヘナ風紀委員会本部"
970571410-DescriptionJp = "ゲヘナの風紀委員会が入っている本部です。中央区で唯一、きちんと管理されている場所です。"
1533671597-NameJp = "ゲヘナ廃校舎"
1533671597-DescriptionJp = "今は使われていない建物です。施設としては閉鎖されましたが今も自由に出入り可能で、様々な事件の温床となっています。危険なエリアのため、入る際には注意が必要です。"
261901867-NameJp = "図書館"
261901867-DescriptionJp = "生徒たちの学習参考書から先生の仕事用の書籍まで、たくさんの本が所蔵されている図書室です。固い本だけではなく、漫画やライトノベルなども置かれています。"
1983840990-NameJp = "アビドス本館"
1983840990-DescriptionJp = "アビドスの生徒たちが主に使用する、アビドスの本館です。日頃から対策委員会の生徒たちがしっかり管理しているため、毎日の砂嵐の中でも綺麗な状態に保たれています。"
3073680445-NameJp = "アビドス別館"
3073680445-DescriptionJp = "本館から廊下で繋がっているアビドスの別館です。現在は使われていない科学室や音楽室などの教室が集まっています。"
3030528899-NameJp = "アビドス運動場"
3030528899-DescriptionJp = "体育の授業や運動会などが行われる運動場です。現在は砂に埋もれつつあり、管理が困難になっています。"
4060200853-NameJp = "アビドス図書館"
4060200853-DescriptionJp = "勉強したり、本を読むことができる図書館です。勉強のための各種参考書から、雑誌や漫画まで、アビドスで人気のあった様々な本が置かれています。"
4149434655-NameJp = "アビドスプール"
4149434655-DescriptionJp = "普段あまり使われていないアビドスのプールです。水は乾ききってしまい、床はひび割れたまま砂が積もっています。"
2812564490-NameJp = "アビドス体育館"
2812564490-DescriptionJp = "屋内での体育の授業はもちろん、講堂としての役割も兼ねた体育館です。現在は使用されていない資材や、運動道具などが保管されています。"
3019364332-NameJp = "アビドス売店"
3019364332-DescriptionJp = "みんな大好きな売店です。他校に比べると品数は劣ってしまいますが、キヴォトスで人気のパンやお菓子などは今でも手に入ります。"
2602511445-NameJp = "アビドス旧校舎"
2602511445-DescriptionJp = "かつてはサークルや部活の休憩スペースとして使われていた校舎です。古い校舎で、耐久性などが危険視されているために閉鎖されていますが、時々生徒たちが肝試しに使ったりしています。"
774508018-NameJp = "教室"
774508018-DescriptionJp = "生徒たちが普段授業を受けている教室です。生徒が自習をしたり、課題の発表をする時にも使います。"
1925286931-NameJp = "ミレニアムタワー"
1925286931-DescriptionJp = "セミナーをはじめとした、ミレニアムの主要な部活や委員会が入っている巨大なタワーです。最先端のセキュリティシステムが数多く搭載されており、部外者の出入りは厳しく制限されています。"
698860447-NameJp = "モノレールステーション"
698860447-DescriptionJp = "学園のあちこちへ移動できるモノレールの駅です。ミレニアムのモノレールはかなり速度が速い上に、騒音や揺れがほとんどありません。"
2688045816-NameJp = "図書館"
2688045816-DescriptionJp = "ミレニアムの生徒たちが研究や調べ物で利用するための図書館です。ドキュメンタリーなどの映像メディアを閲覧することも可能となっています。"
1022652590-NameJp = "売店"
1022652590-DescriptionJp = "パンや飲み物などを販売している、休息にぴったりの売店です。たくさんの品物がある中でも、ダブルのエスプレッソとエナジードリンクの売れ行きがすごいとか。"
2885237148-NameJp = "実習センター"
2885237148-DescriptionJp = "様々な工学実験を行うことができる実習センターです。大型3Dプリンターなど、最先端の装置や設備がたくさんあります。"
3070757653-NameJp = "データセンター"
3070757653-DescriptionJp = "大量のサーバーやデータ通信の装置などが設置されているデータセンターです。ミレニアムの貴重な研究資料もここに保存されています。"
1295016811-NameJp = "発電所"
1295016811-DescriptionJp = "ミレニアムサイエンススクール内で使われる電気を生産・供給している発電所です。公害がほとんど発生しない、環境に優しいシステムとなっているようです。"
895510277-NameJp = "フィットネスセンター"
895510277-DescriptionJp = "研究で疲れた体をほぐしたり、鍛えたりすることができるフィットネスセンターです。最先端の設備が整っており、生徒たちそれぞれに最適化されたトレーニングを提供しています。"
3140661513-NameJp = "実験室"
3140661513-DescriptionJp = "簡単な科学実験ができる教室です。危険な薬品や鋭利な器具も多いので、十分注意しましょう。"
2871272188-NameJp = "トリニティ大聖堂"
2871272188-DescriptionJp = "トリニティにおいて最も大きな建物で、まさにトリニティを象徴する場所です。同時に、「シスターフッド」の本部でもあります。"
3137866576-NameJp = "トリニティ・スクエア"
3137866576-DescriptionJp = "このエリアの名前でもある、ちょうど中心部分に位置する広場です。トリニティの生徒たちがよく集まる人気の場所で、特に中央にある綺麗な噴水は、トリニティに詳しくない方でも知っているほどの有名なスポットになっています。"
3915788217-NameJp = "中央図書館"
3915788217-DescriptionJp = "トリニティにおいてはもちろんのこと、キヴォトスにおいて最大と言われている巨大な図書館です。その大きさと複雑さ故に、時々この建物の中で遭難する生徒がいるという噂があります。"
1205798181-NameJp = "部室会館"
1205798181-DescriptionJp = "トリニティの部活や委員会が集まっている建物の一つです。日々様々な活動や会議などが、ここで行われています。"
1291519405-NameJp = "Basis schola"
1291519405-DescriptionJp = "「生徒たちの拠点」という意味の名前を持つ、現在は使われていない古い建物です。かつては「救護騎士団」の本部として使用されていた時期があったようです。"
2678735093-NameJp = "美術館"
2678735093-DescriptionJp = "多くの作品が収蔵されている学園内の美術館です。時折、美術の授業を行う場所としても利用されています。"
1148047130-NameJp = "音楽堂"
1148047130-DescriptionJp = "音楽ホールが入っている、比較的最近建てられた建物です。音楽の授業以外にも、コンサートや演劇などを行う舞台としても使用されています。"
2413575071-NameJp = "古書館"
2413575071-DescriptionJp = "中央図書館とは別に、古い書物などが保管されている建物です。それなりに年季が入っており清潔とは言いにくいため、あまり生徒たちが訪れることはありません。トリニティの「図書委員会」の本部としても使われています。"
1107627875-NameJp = "射撃場"
1107627875-DescriptionJp = "複数人が同時に射撃できるほどのスペースがある、射撃練習の場所です。どの学校の生徒も利用できるよう、様々な種類の弾丸が用意されています。"
2340126097-NameJp = "レッドウィンター事務局"
2340126097-DescriptionJp = "レッドウィンターの事務局がある校舎本館です。あちこちにチェリノ会長の権威を象徴するひげ造形物が設置されています。"
683355499-NameJp = "赤ひげ革命広場"
683355499-DescriptionJp = "レッドウィンターの事務局近くにある巨大な広場です。毎週末にはチェリノ会長の偉業を礼賛する集会が行われます。"
414654122-NameJp = "第1公共寮"
414654122-DescriptionJp = "事務局の指導の下で建設された公共の寮です。効率的に人を収容することができますが、多くの部屋は老朽化によりお湯が出ません。"
2066711573-NameJp = "レッドベア放送局"
2066711573-DescriptionJp = "レッドウィンター連邦学園唯一のマスコミ、「レッドベア」の放送が配信される放送局です。放送内容のほとんどはチェリノ会長への賛美で構成されています。"
3364708890-NameJp = "第3公共給食所"
3364708890-DescriptionJp = "レッドウィンターの生徒が食事をする学生食堂です。偉大なるチェリノ会長を除き、すべての生徒に提供される食事は平等です。"
2715934839-NameJp = "白イルカ市場"
2715934839-DescriptionJp = "レッドウィンターの生徒が手作りのものを取引したりする、歴史ある青空市場です。時々事務局の認可を受けていない不健全な品物が流通することもあります。"
264515151-NameJp = "林業用倉庫"
264515151-DescriptionJp = "森林の伐採に必要な林業用機械や木材を保管する倉庫です。危険な機械が多いので、訪れるときは必ず安全装備を着用してください。"
328579908-NameJp = "工務部事務所"
328579908-DescriptionJp = "工務部の生徒たちが普段待機している事務所です。訪れれば常に完璧で迅速なサービスを受けることができます。"
3657567135-NameJp = "格納庫"
3657567135-DescriptionJp = "戦車や車両、ヘリコプターといった戦術支援兵器が収納できる格納庫です。車両の整備や修理に必要な、各種ツールも揃っています。"
1933676415-NameJp = "百鬼夜行陰陽部本館"
1933676415-DescriptionJp = "百鬼夜行連合学院の実質的な生徒会・陰陽部がある本館。生徒たちの間では、あらゆる罠と防衛設備が備えられているという噂が流れてるのだとか。"
4168293052-NameJp = "中央広場"
4168293052-DescriptionJp = "陰陽部本館から見える巨大な広場。観光客の待ち合わせの場として活用されており、広場中央にある銅像はフォトスポットとしても人気を誇っています。"
2953329321-NameJp = "陰陽部公演会場"
2953329321-DescriptionJp = "陰陽部の不定期公演が開催される会場。俳句バトルロイヤル、ニヤの落語大会、チセのサプライズ特技披露など――公演するたびにチケットが完売することで有名です。"
990108595-NameJp = "大庭園"
990108595-DescriptionJp = "百鬼夜行連合学院に遊びに来た観光客が必ず訪問することで有名な庭園。特に池には「ぬし」と呼ばれる巨大鯉が住んでいるという噂があるのだとか。グッズも販売中です。"
1694812288-NameJp = "百鬼夜行商店街"
1694812288-DescriptionJp = "百鬼夜行連合学院の商店街。百鬼夜行でも有名な喫茶店「百夜堂」もここにあります。問題児が騒ぎを起こした時は、百夜堂の看板娘が解決するのだとか。"
2072243193-NameJp = "観光用ケーブルカー"
2072243193-DescriptionJp = "百鬼夜行連合学院のケーブルカー。車上から眺める百鬼夜行の全景はかけがえのない思い出になるのだとか。料金は往復500円です。"
2050672265-NameJp = "伝統博物館"
2050672265-DescriptionJp = "百鬼夜行連合学院のユニークな伝統と歴史を体験できる巨大博物館。訪問した生徒からの評判はあまり良くないようです。"
4134542221-NameJp = "神木展望台"
4134542221-DescriptionJp = "百鬼夜行の全景を一望できる展望台。その絶景から、数多くの映画やドラマの舞台となり、聖地として有名です。"
2941784831-NameJp = "ヴァルキューレ警察学校シラトリ支所"
2941784831-DescriptionJp = "ヴァルキューレ警察学校の支所です。緑豊かな緑地に囲まれ、特に空気がとても良いそうです。"
1693953940-NameJp = "コーギータウン"
1693953940-DescriptionJp = "有名な電気商店街です。既に廃盤になっているものを除けば何でも手に入るという噂が流れています。"
4116376335-NameJp = "トライスクエア"
4116376335-DescriptionJp = "憩いの場としても、出会いの場としても使われる広場です。散歩にもってこいの場所です。"
3884396288-NameJp = "第3業務地区"
3884396288-DescriptionJp = "トライスクエアの隣に位置する業務地区です。モダンで洗練された空間で、道路と建物が美しく調和しています。"
880697741-NameJp = "プラドアベニュー"
880697741-DescriptionJp = "美術館が位置している通りです。美術館も素晴らしいですが、街全体が芸術の街となっています。"
3130494169-NameJp = "シラトリ近隣公園"
3130494169-DescriptionJp = "公園の規模に比べて訪れる人が多くない方ですが、それでもなくてはならない場所です。"
3543706609-NameJp = "鐘崎港"
3543706609-DescriptionJp = "海が見たいなら、ここに行くのも良いでしょう。もしかしたら想像していた光景ではないかもしれませんが。"
3251299115-NameJp = "ラミニタウン"
3251299115-DescriptionJp = "各学園のグルメスポットに勝るとも劣らない食堂街です。狭い川の両側に無数の屋台や飲食店が並んでいます。"
1833374923-NameJp = "自習室"
1833374923-DescriptionJp = "個人の自習や、グループ学習用にも使われる部屋です。人気があるため、使用前には予約が必要になっています。"
3691365347-NameJp = "トレーニングルーム"
3691365347-DescriptionJp = "ランニングマシンやバーベル、スクワットラックなどが備え付けられた本格的なトレーニングルームです。仕事に忙しい中にも健康を損なわないように、まめに運動をして身体を鍛えましょう。"
2987442229-NameJp = "休憩室"
2987442229-DescriptionJp = "リクライニングチェアやベッドが設置されており、バーまでもが入っている休憩室です。夜勤が多い先生のために、洗面設備なども備わっています。"
174166180-NameJp = "コンビニ"
174166180-DescriptionJp = "居住区にあるコンビニ、「エンジェル24」です。ちょっとした食べ物や飲み物、爆薬などが購入できます。"
3217933897-NameJp = "ゲームセンター"
3217933897-DescriptionJp = "各種アーケードゲーム機が設置された居住区内のゲームセンターです。大半が古いレトロゲームなため、各地にいる少数のマニアから高い人気を誇っています。"
1142275086-NameJp = "食堂"
1142275086-DescriptionJp = "シャーレの食事を担う、居住区の食堂です。様々な調理設備も揃っているので、ここで調理実習をすることもできます。"
2776103305-NameJp = "菜園"
2776103305-DescriptionJp = "植物を育てるために野外のテラスに設置された、小規模な家庭菜園場です。料理に使われる野菜や果物などを育てることができます。"
110094030-NameJp = "アビドス高等学校"
110094030-DescriptionJp = "アビドス高等学校の本校です。昔は小さな分校の建物でしたが、今は本校として使用されています。"
4267333592-NameJp = "D.U.シラトリ区"
4267333592-DescriptionJp = "(X)"
3125409229-NameJp = "ゲヘナ学園・中央区"
3125409229-DescriptionJp = "ゲヘナ学園の中央区です。ゲヘナはキヴォトス最大級の三つの学園のうちの一つで、自由な校風が特徴です。"
1428109633-NameJp = "百鬼夜行中心部"
1428109633-DescriptionJp = "(X)"
1111616358-NameJp = "ミレニアム・スタディーエリア"
1111616358-DescriptionJp = "ミレニアムサイエンススクールの中でも、学習に特化したエリアです。ミレニアムは科学教育に特化した学園で、まだ歴史は浅いものの、キヴォトスの中でもかなり影響力の大きい学園の一つとされています。"
1466521158-NameJp = "レッドウィンター連邦学園"
1466521158-DescriptionJp = "(X)"
1895832836-NameJp = "シャーレオフィス"
1895832836-DescriptionJp = "シャーレのオフィスです。事務スペースがたくさん用意されています。"
4231969254-NameJp = "シャーレ居住区"
4231969254-DescriptionJp = "シャーレの居住区です。先生が普段生活しているところでもあります。"
481812794-NameJp = "トリニティ・スクエア"
481812794-DescriptionJp = "トリニティ総合学園の中の広場があるエリアです。トリニティは複数の学校が合わさって生まれたという経緯もあり、キヴォトスでも最大級の敷地面積を誇っています。"
798331298-NameJp = "アル"
798331298-DescriptionJp = "こちらの生徒さんを受け入れることができます。"
3807268382-NameJp = "エイミ"
3807268382-DescriptionJp = "こちらの生徒さんを受け入れることができます。"
3851447835-NameJp = "ハルナ"
3851447835-DescriptionJp = "こちらの生徒さんを受け入れることができます。"
1027332683-NameJp = "ヒフミ"
1027332683-DescriptionJp = "こちらの生徒さんを受け入れることができます。"
2114399124-NameJp = "ヒナ"
2114399124-DescriptionJp = "こちらの生徒さんを受け入れることができます。"
215481915-NameJp = "ホシノ"
215481915-DescriptionJp = "こちらの生徒さんを受け入れることができます。"
3611252335-NameJp = "イオリ"
3611252335-DescriptionJp = "こちらの生徒さんを受け入れることができます。"
1325494637-NameJp = "マキ"
