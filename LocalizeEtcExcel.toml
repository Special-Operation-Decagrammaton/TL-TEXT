2292815693-NameJp = "Liuhua Pavilion"
2292815693-DescriptionJp = "O edifício onde residem os alunos da Genryumon, o conselho estudantil da Shanhaijing Senior High School. O caminho que leva ao Liuhua Pavilion é estritamente guardado pelos membros da Genryumon, e ninguém pode entrar ou sair sem a permissão do líder da porta."
2632751166-NameJp = "Parque Byakko"
2632751166-DescriptionJp = "Um grande parque onde os alunos de Shanhaijing passam seu tempo livre. Na praça central do parque, os alunos que se preocupam com a saúde costumam se reunir todas as manhãs para fazer exercícios."
4045851205-NameJp = "Taogenkyo"
4045851205-DescriptionJp = "Uma cafeteria de estilo antigo que os alunos de Shanhaijing costumam usar como alternativa a um café. Dizem que, para os alunos de Shanhaijing, beber chá é algo tão natural quanto um tiroteio."
3798845638-NameJp = "Associação Comercial Genbu"
3798845638-DescriptionJp = "Um ponto gastronômico conhecido até fora de Shanhaijing, e um beco movimentado onde os alunos da associação fazem negócios. Eles lidam principalmente com comida chinesa rica em especiarias, mas também oferecem vários itens raros."
2595612555-NameJp = "Edifício Principal do Jardim Ame-no-Hana"
2595612555-DescriptionJp = "O edifício principal do Jardim Ame-no-Hana, onde as crianças de Shanhaijing recebem educação. Devido à natureza de Shanhaijing, que valoriza a educação, nem mesmo os executivos da Genryumon podem interferir levianamente nos assuntos do Jardim Ame-no-Hana."
2905240932-NameJp = "Instituto de Pesquisa de Alquimia"
2905240932-DescriptionJp = "Um instituto de pesquisa antigo e decadente onde os membros do clube de pesquisa de alquimia aprimoram suas habilidades. Como há um cheiro estranho e enfumaçado toda vez que se passa em frente ao prédio, muitos alunos evitam se aproximar."
656802880-NameJp = "Plantação de Chá"
656802880-DescriptionJp = "Uma vasta plantação de chá onde se pode colher as folhas de chá, especialidade de Shanhaijing. As folhas colhidas aqui são vendidas em todo o Kivotos, incluindo a Trinity General School."
