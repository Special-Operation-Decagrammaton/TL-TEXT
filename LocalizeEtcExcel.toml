4095316539-NameJp = "Event Challenge Stage 1 Hint"
4095316539-DescriptionJp = "Every time Kisaki (Swimsuit) uses her EX Skill, members of the Genryumon will appear to support you in battle. Enemies will be stunned for a certain period of time.\nUse Kisaki (Swimsuit)'s EX Skill effectively to progress through the battle."
