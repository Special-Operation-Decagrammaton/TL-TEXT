904092714-NameJp = "チェリノ印のチョコレート"
904092714-DescriptionJp = "レッドウィンターで生産されている有名なチョコレート。甘くて滑らかな食感なのだが、当のレッドウィンターの生徒たちは寒い気候のせいで、硬くて食べにくいチョコだと思っている。"
2871602548-NameJp = "おひげクレープ"
2871602548-DescriptionJp = "レッドウィンターの各所で売られている甘くて美味しいクレープ。学園では「ブリヌイ」とも呼ばれる。おひげ型のクリームをデコるには、チェリノの審査が必要だとかそうでないとか。"
3168602557-NameJp = "勇猛髭勲章"
3168602557-DescriptionJp = "チェリノに認められた生徒だけが貰うことができる、金が贅沢に使われた特別な勲章。尖っている部分が多く、角に当たると結構痛いため、だいたい机の底にしまわれてしまう。"
532264540-NameJp = "イベントPt"
532264540-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
3071036351-NameJp = "ビーチボール"
3071036351-DescriptionJp = "可愛いハートマークが付いたビーチバレー用のボールです。"
589252219-NameJp = "海の家の食券"
589252219-DescriptionJp = "海の家で使うことができる、濡れて文字が読めなくなることが多い食券です。"
3265516866-NameJp = "ミニロケット花火"
3265516866-DescriptionJp = "可愛らしいサイズのロケット花火です。"
4230562605-NameJp = "クーラーボックス"
4230562605-DescriptionJp = "冷たいドリンクやフルーツ、氷などがたくさん入ったクーラーボックス。炎天下で持ち歩くと銃火器はすぐに熱くなってしまうので、それらを入れておく用途にもピッタリです。"
182033757-NameJp = "砂遊びセット"
182033757-DescriptionJp = "シャベルやバケツなど、砂のお城を作ったり砂遊びに必要な道具が一通り入ったセットです。セメントと鉄筋は入っていません。"
3004794592-NameJp = "ビーチチェア"
3004794592-DescriptionJp = "木の骨組みに布を張った、よくあるタイプのビーチチェアです。もちろん防水加工もバッチリ。"
2064901758-NameJp = "パラソルテーブル"
2064901758-DescriptionJp = "陽射しを防ぐためのパラソルが付いた、南国風のガーデンテーブルです。お嬢様は海辺でもティータイムを欠かしません。"
1274276475-NameJp = "ビーチグッズ"
1274276475-DescriptionJp = "浮き輪やビーチボール、シュノーケルなど、ビーチでの遊びに必要なグッズがたくさん入った本格的なセット。水深50ｍ以下での使用には適していないのでご注意。"
1644359218-NameJp = "セーリングボート"
1644359218-DescriptionJp = "風の流れを利用して海面を滑走する乗り物。初心者にも優しく、バランスが取りやすい設計になっています。"
886310733-NameJp = "ゲヘナ印の補給ボックス"
886310733-DescriptionJp = "夏のトレーニング合宿のために、風紀委員会が用意した補給ボックス。中にはトレーニングに役立つ様々な物が入っている。ハズレは無いのでご安心を。"
2668075095-NameJp = "美食研究会の焼きトウモロコシ"
2668075095-DescriptionJp = "美食研究会が作った焼きトウモロコシ。物としては一緒ですが、ランダムで美食研究会のメンバーたち好みの味に仕上がっています！……つまり、味の保証はできません。"
1254096944-NameJp = "夏のスケバンサングラス"
1254096944-DescriptionJp = "夏の海で騒ぎを起こす水着のスケバン集団「破茶滅茶」から、風紀委員会が穏便に押収したサングラス。少し傷が付いてますが、決して抵抗の跡ではないとのこと。"
104149602-NameJp = "びしょびしょヘルメット"
104149602-DescriptionJp = "夏のスラム街を騒がせる「びしょびしょヘルメット団」から、風紀委員会が穏便に押収したヘルメット。少し傷が付いてますが、至って平和的に押収したとのこと。確かにやや濡れています。"
2553698243-NameJp = "イベントPt"
2553698243-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
1847672830-NameJp = "コウラ茸"
1847672830-DescriptionJp = "山海経自治区のほぼ全域に自生している、甲羅のような華やかな模様のキノコ。\n食感も味も良く、食用として人気が高い。"
357098688-NameJp = "クロ筍"
357098688-DescriptionJp = "玄龍門の庭に育てられている黒色の筍。\n玄龍門の幹部たちによって厳重に管理されているため、なかなか見かけることができない。"
3708418519-NameJp = "ヒトガタ人蔘"
3708418519-DescriptionJp = "山海経の山奥で見つかる人蔘。\n寿命を延ばす効果や、若返りの効果などがあると言われている。"
3320765287-NameJp = "チョコレートコイン"
3320765287-DescriptionJp = "ゴールデンフリース号内に出回っている代表的なお菓子の一つ。あくまでもお菓子で本物のコインではないが、普通に美味しいため生徒たちの間で人気が高い。"
312190930-NameJp = "ウサギのステッカー"
312190930-DescriptionJp = "生徒たちがあちこちに貼っているウサギ模様のステッカー。色んな生徒たちが自由に作っては、色んな所に自由に貼っている。"
3290352412-NameJp = "乗船チケット"
3290352412-DescriptionJp = "ゴールデンフリース号の乗船チケット。乗船後もイベントの時などに確認されることがあるため、肌身離さず持っていることが推奨される。"
812405886-NameJp = "サイコロ"
812405886-DescriptionJp = "ゴールデンフリース号の中でよく見かけるサイコロ。時々生徒間のトラブルを解決するのに使われることもあるらしい。"
3202962982-NameJp = "イベントPt"
3202962982-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
1102568152-NameJp = "温泉タオル"
1102568152-DescriptionJp = "227号温泉郷で提供しているタオル。素材はあまり良くないため、身体に当てる際に強くこすり過ぎないようご注意を。"
4012080640-NameJp = "おひげシャンプー"
4012080640-DescriptionJp = "チェリノが愛用している、レッドウィンター連邦学園の特製シャンプー。名前に「ひげ」と付いているものの、お髭を洗うのには適していないらしい。"
2585452848-NameJp = "カピバラ型の入浴剤"
2585452848-DescriptionJp = "カピバラの形をした固形の入浴剤。水中に入れると、ほのかな柑橘系の香りが漂う。"
1545493133-NameJp = "福袋"
1545493133-DescriptionJp = "黒亀組が販売しているお正月の福袋。開けてみるまで何が入っているかは分からないものの、意外と中身は充実している。"
1215702584-NameJp = "ペロロ餅"
1215702584-DescriptionJp = "お正月ということで、「ペロロ」に目を付けた黒亀組が販売している鏡餅型の装飾品。あくまで装飾品であり、食べることはできない。"
130031945-NameJp = "黒亀組の絵馬"
130031945-DescriptionJp = "黒亀組が販売している絵馬。お賽銭を入れた後にこの絵馬に願いごとを書くと、その願いが叶うと言われている。普通に買うと1個あたり5千円。"
3586118070-NameJp = "おみくじ引換券"
3586118070-DescriptionJp = "おみくじと交換するための引換券。実は真っ当なおみくじではなく黒亀組が販売しているもので、その結果に応じて別の商品が貰える。"
518432250-NameJp = "イベントPt"
518432250-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
1669990889-NameJp = "問題児の反省文"
1669990889-DescriptionJp = "バレンタインデーのパトロール業務で補導された問題児が書いた反省文。意外に内容は堅実である。"
2861703465-NameJp = "押収された違法駄菓子"
2861703465-DescriptionJp = "バレンタインデーパトロール業務中に押収した駄菓子。正式には許可されていない裏の世界で作られたものだという。問題児好みの悪い味。"
2887327615-NameJp = "環境美化活動用ゴミ袋"
2887327615-DescriptionJp = "バレンタインデーのパトロール業務のついでにあちこちで収集したごみが入っている袋。こういった美化活動は何だかんだでとてもやりがいがある。"
3085567581-NameJp = "バレンタインデーのお誘い"
3085567581-DescriptionJp = "バレンタインデーに誰かがあなたを待っているという証。特別な日にはきっと特別な出会いがある。※イベント終了後、未使用のまま保持していた「バレンタインデーのお誘い」は200,000クレジットに変換されます"
1632581989-NameJp = "ワカモの逮捕状"
1632581989-DescriptionJp = "ワカモを逮捕するために、ヴァルキューレ警察学校から発布された逮捕状。ワカモがこれまで犯してきた恐ろしい罪状が書き連ねられている。"
3974882278-NameJp = "イベントPt"
3974882278-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
2114880617-NameJp = "シスターフッドのヴェール"
2114880617-DescriptionJp = "シスターフッドで使用されているヴェール。上手く使えばお祈り中にうたた寝してもバレないが、おそらくそんな生徒はいない。"
4200143845-NameJp = "トリニティの聖歌集"
4200143845-DescriptionJp = "トリニティの聖歌が本の形でまとめられたもの。その内容がかなり浸透しているためもあるが、それ以上に言葉の美しさが評判で、様々な状況で引用されることがある。"
2925208730-NameJp = "トリニティの燭台"
2925208730-DescriptionJp = "トリニティの聖堂などで使用される燭台。かなり重くて丈夫な造りになっており、落とすと床に穴が空くレベル。"
315453169-NameJp = "ムシクイーンのカードパック"
315453169-DescriptionJp = "大人気トレーディングカードゲーム「ムシクイーン」の拡張パック第3弾「アルティメットインセクトの襲来」。カエデ曰く、パックの手触りで中にレアカードが入っているかどうか分かるのだとか。"
2801049295-NameJp = "交流会のチラシ"
2801049295-DescriptionJp = "百鬼夜行とゲヘナ学園の間で「交流会」が開かれることを知らせるためのチラシ。主催者であるニヤの挨拶や、主な日程、注意事項などが記載されている。"
3117990777-NameJp = "和楽姫のうちわ"
3117990777-DescriptionJp = "百鬼夜行連合学院の大人気アイドルであるチセ様のご尊顔が描かれたうちわ。ファンの間では高値が付くほどの大人気グッズの一つ。"
1122375527-NameJp = "ニンペロさんグッズ"
1122375527-DescriptionJp = "渦巻映画村で販売されている忍者のキャラクターグッズ。最初は某キャラクターのスピンオフとして始まったものだったが、途中から人気を博した結果、一つのシリーズものとして独立した。この業界ではそれなりによくある話。"
2333680348-NameJp = "資材ボックス"
2333680348-DescriptionJp = "捨てられたリゾートのあちこちに廃棄された資材ボックス。\n長く放置されていたようで、中に何が入っているのかは分からない。"
923224583-NameJp = "地域通貨"
923224583-DescriptionJp = "観光を復活させる目的で作られた「ロスト・パラダイス・リゾート」の地域通貨。本当に効果があるのか​​は分からないが、それでもシズコ曰く「そんなのは直接証明すればいいんです！」という。"
1459837138-NameJp = "百夜堂キラキラコイン"
1459837138-DescriptionJp = "百夜堂の海の家でお土産に交換可能なコイン。ただ、お客さんのほとんどはコイン自体をお土産として考えているようだ。"
2503861371-NameJp = "ツルツルサザエ"
2503861371-DescriptionJp = "表地が滑らかでツルツルしたサザエ。チセが言うには耳に近づけて音を聞いていると、自然に俳句が浮かぶという。"
3295998236-NameJp = "夏用忍法図鑑巻物"
3295998236-DescriptionJp = "夏に合わせて使える様々な忍法（創作）が書かれている巻物。主に夏に起こり得る事故に関する内容が多い。忍者にも安全が一番！"
4253247347-NameJp = "深海温泉島リゾート使用権"
4253247347-DescriptionJp = "深海温泉島リゾートの使用権が明示されているリゾート使用許諾契約書"
2442357514-NameJp = "ムシクイーンクルーズリゾート使用権"
2442357514-DescriptionJp = "ムシクイーンクルーズリゾートの使用権が明示されているリゾート使用許諾契約書"
4133487383-NameJp = "超豪華リゾート使用権"
4133487383-DescriptionJp = "超豪華リゾートの使用権が明示されているリゾート使用許諾契約書"
125540590-NameJp = "スイーツクーポン"
125540590-DescriptionJp = "有名なスイーツショップで発行されるクーポン。集めて持っていくと交換できるデザートが決まっている。"
3387762043-NameJp = "ミントチョコパフェ"
3387762043-DescriptionJp = "独特の味がするミントチョコパフェ。爽やかさと甘みを同時に味わえるメニュー。"
806537948-NameJp = "マカロン"
806537948-DescriptionJp = "片手にすっぽり収まるサイズのマカロン。様々な色と味が存在する。"
336149210-NameJp = "ロールウエハース"
336149210-DescriptionJp = "くるりと巻かれているチョコ味のお菓子。格好つけたい子供たちが口に咥えたまま揺らしたりもする。"
2418932586-NameJp = "イベントPt"
2418932586-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
1874282437-NameJp = "お手玉"
1874282437-DescriptionJp = "柔らかい布に豆や砂などを入れて包んだお手玉。ふわふわしているため当たっても怪我をする心配がなく、玉入れなどの試合で使われる。まれに本当に爆発するお手玉が発見されることもある。"
3048078452-NameJp = "ミレニアムの旗"
3048078452-DescriptionJp = "ミレニアムの校章が描かれている小さな旗。戻り点を表示したり集合場所を知らせるときに使用される。"
2524752608-NameJp = "ホイッスル"
2524752608-DescriptionJp = "エンジニア部の先端技術で作られた特製ホイッスル。吹くと電子信号を発生させ、音を出すスピーカーが作動する複雑な構造になっている。"
2871055877-NameJp = "スポーツドリンク"
2871055877-DescriptionJp = "ミレニアムが開発した特製スポーツドリンク。トレーニング部のデータに基づいて開発されているため、他のドリンクより早く水分補給ができるらしい。"
1469297879-NameJp = "リレー用バトン"
1469297879-DescriptionJp = "リレーに使用されるバトン。旧式の柄付き手榴弾のような形だが、電子式雷管を挿入した製品で、一定時間内に次のランナーに引き継げれば絶対に爆発しない。"
2043178916-NameJp = "あんぱん"
2043178916-DescriptionJp = "パン食い競争に使われる、ビニールに包まれたあんぱん。小豆だけが入ったシンプルな構成のパンだが、一部のヴァルキューレ警察学校の生徒たちから大好評を受けたという。"
3227336825-NameJp = "案内パンフレット"
3227336825-DescriptionJp = "晄輪大祭実行委員会本部から配っている案内パンフレット。試合日程はもちろんの事、競技場近くのグルメマップまで詳細に記載されている。"
2905328212-NameJp = "クリスマスプレゼント"
2905328212-DescriptionJp = "クリスマスに誰もが待っているもの。悪い子はもらえない。"
1128970523-NameJp = "クリスマスソックス"
1128970523-DescriptionJp = "プレゼントを楽しみにして掛けておくソックス。履けばしっかり暖かい。"
4179360865-NameJp = "キャンディケイン"
4179360865-DescriptionJp = "杖の形で作られたクリスマスキャンディ。通常はミント味。"
1459661267-NameJp = "エッグノッグ"
1459661267-DescriptionJp = "牛乳と卵、砂糖で作る温かい飲み物。寒い日に飲むと体が温まる。"
1234657893-NameJp = "イベントPt"
1234657893-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
2264400688-NameJp = "紅白かまぼこ"
2264400688-DescriptionJp = "紅白2色のかまぼこ。紅はめでたさを、白は魔除けを意味している縁起物。"
3707337679-NameJp = "おめでタイ"
3707337679-DescriptionJp = "その名の通り、めでたさを祝う縁起物のお魚。おせちでエビと共に欠かせない。"
2091304235-NameJp = "おみくじ引換券"
2091304235-DescriptionJp = "おみくじの引換券。複数集めるとおみくじを引くことができる。一年の運試しにいかが？"
2629342802-NameJp = "多次元演算回路"
2629342802-DescriptionJp = "アトラ・ハシースの箱舟から切り離された演算装置の断片。複雑な回路で構成されている。"
1015134010-NameJp = "次元エンジン付属品"
1015134010-DescriptionJp = "次元エンジンから切り離された付属品。今は機械の塊に過ぎず、特に使えるところはなさそうだ。"
3353425290-NameJp = "宇宙チョコバーガー"
3353425290-DescriptionJp = "誰かが宇宙食として使用するために密封されたチョコバーガー。なぜチョコバーガーを密封処理したのか、未だに疑問は解消されていない。"
3142506941-NameJp = "ゲートアンロックコード - 外郭2区"
3142506941-DescriptionJp = "外郭2区のゲートを開放できるアンロックコードが認識されたチップ。"
2995130259-NameJp = "ゲートアンロックコード - 外郭3区"
2995130259-DescriptionJp = "外郭3区のゲートを開放できるアンロックコードが認識されたチップ。"
1012273839-NameJp = "ゲートアンロックコード - 中央区"
1012273839-DescriptionJp = "中央区のゲートを開放できるアンロックコードが認識されたチップ。"
344128946-NameJp = "イベントPt"
344128946-DescriptionJp = "イベントで入手できるポイント。たくさん手に入れることで、様々な報酬を獲得することができる。"
1355249104-NameJp = "連邦生徒会の安全帽"
1355249104-DescriptionJp = "連邦生徒会のロゴが刻まれた安全帽。今回の復旧作業のために特別に製作された。"
2999413236-NameJp = "財務諸表"
2999413236-DescriptionJp = "連邦生徒会、行政委員会傘下の財務室で使用する財務諸表。キヴォトスの財務状況に関する内容が詳細にまとめられている。"
636205895-NameJp = "めんたいポテチ"
636205895-DescriptionJp = "モモカが好んで食べている明太子のお菓子。口の中をしょっぱくするその風味は絶品と言える。"
832973929-NameJp = "きれいなカチューシャ"
832973929-DescriptionJp = "ヘアバンドの一種。きれいに整ったカチューシャは、メイドの力量を示す必需品という言葉があるようだ。"
3488365730-NameJp = "メイクアップセット"
3488365730-DescriptionJp = "身だしなみを整える道具が詰まったセット。化粧本来の目的にはもちろん、使いこなせば変装ツールとしても使えるという。"
1069023790-NameJp = "屋敷への招待状"
1069023790-DescriptionJp = "歴史のある屋敷から送られた招待状。そこは不思議な出来事が同時に多発するという噂があるのだとか。"
611002646-NameJp = "カードセット"
611002646-DescriptionJp = "山海経で人気のカードゲームのセット。たくさん集めるほど、より多くのゲームができる。"
1712890776-NameJp = "玄武商会の食券"
