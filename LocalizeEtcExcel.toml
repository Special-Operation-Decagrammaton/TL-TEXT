1101184924-NameJp = "Painel de Partidas da Highlander"
1101184924-DescriptionJp = "Painel que indica o próximo destino e o horário de partida. Como quebra com frequência, a manutenção regular é essencial."
2402806743-NameJp = "Banco de Espera da Highlander"
2402806743-DescriptionJp = "Um banco longo onde várias pessoas podem sentar. Deitar-se ou sentar-se com as pernas abertas é uma falta de educação!"
2446637545-NameJp = "Piso Tátil da Highlander"
2446637545-DescriptionJp = "Piso instalado para que se possa saber a rota a seguir apenas pelo toque dos pés. De acordo com os regulamentos da Highlander, sua instalação é obrigatória."
2723986660-NameJp = "Armário Comum da Highlander"
2723986660-DescriptionJp = "Um armário onde você pode pagar créditos para guardar seus pertences por um determinado tempo. É fácil de usar."
3016816235-NameJp = "Armário de Luxo da Highlander"
3016816235-DescriptionJp = "É mais caro que o armário comum, mas a única diferença é a pintura. Mas, curiosamente, dizem que a taxa de utilização é maior que a do armário comum..."
82937386-NameJp = "Carpete Comum da Highlander"
82937386-DescriptionJp = "Um carpete marrom sóbrio. É muito usado em veículos comuns."
1621584904-NameJp = "Carpete de Luxo da Highlander"
1621584904-DescriptionJp = "Um carpete com bordados elegantes e uma sensação de luxo. É muito usado em veículos de alto padrão."
1211451554-NameJp = "Divisória de Corda da Highlander"
1211451554-DescriptionJp = "Uma divisória de corda usada para organizar filas e garantir a segurança dos passageiros. No entanto, parece que muitas pessoas simplesmente ignoram e passam por cima..."
4054782965-NameJp = "Cerca de Vidro da Highlander"
4054782965-DescriptionJp = "Caracterizada por um design sofisticado com painéis de vidro. Instalada principalmente em andares altos para melhorar a estética."
