3964788977-NameJp = "Rádio Portátil Para Comunicação"
3964788977-DescriptionJp = "Diz-se que este é um rádio de alto rendimento que consegue penetrar na maioria das interferências. Feito para infiltração mas dá prioridade ao seu desempenho, com a estrutura a torná-lo bastante grande e pesado. Tem uma interface de utilização simples, para que até mesmo os não alunos da Millennium o possam utilizar."
2775830511-NameJp = "Dispositivo de Ruído"
2775830511-DescriptionJp = "Um dispositivo concebido para situações de infiltração em que possas ser descoberto. Consegue produzir muito ruído para distrair. Após a utilização, não te esqueças de te deslocar para o lado oposto e esconder."
1728300996-NameJp = "Munição Silenciada"
1728300996-DescriptionJp = "Balas usadas em situações em que um silenciador não pode ser colocado, ou quando é necessário mais silenciamento do som. A própria bala faz pouco ruído e o calor na altura do disparo e do impacto desaparecem rapidamente. O poder é menor do que as balas padrão, mas parece ser o favorito em missões de infiltração."
3426576768-NameJp = "Poção de Recuperação"
3426576768-DescriptionJp = "Um remédio que alivia a fadiga e cura pequenos arranhões. Não tem qualquer efeito na fadiga crónica e ferimentos mais graves. É importante gerires a tua saúde de antemão."
282905937-NameJp = "Alicate"
282905937-DescriptionJp = "Uma ferramenta utilizada para desmantelar e cortar câmaras de vigilância e minas terrestres. O melhor do melhor quando se trata de afiação, mas a lâmina desgasta-se rapidamente de modo que não é possível usar sempre e sempre de novo. Terá de escolher sabiamente os seus alvos ao desmantelar as coisas."
1844419868-NameJp = "Chave de Segurança"
1844419868-DescriptionJp = "Chave de segurança utilizada para o desbloqueio da fechadura. Como é um objeto de valor, não te esqueças de o devolver ao dono depois de o usares. ...Lógico, com o devido cuidado sem deixar ser apanhado."
3949011075-NameJp = "Pendrive Especial"
