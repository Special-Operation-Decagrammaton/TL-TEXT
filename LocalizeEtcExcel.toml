209329490-DescriptionJp = "O chefe inflige um forte dano contínuo de veneno aos seus aliados. Forme uma equipe com alunas que tenham habilidades de cura ou de escudo para proteger a sua equipe.\n\nEmbora a Resistência a Dano Crítico e a Resistência a Crítico do chefe sejam altíssimas, sempre que um aliado usar uma Habilidade EX, o Ataque e o Dano da Habilidade EX de toda a sua equipe aumentarão. (Pode acumular até 99 vezes)\nAvance na batalha fazendo bom uso das Habilidades EX da sua equipe."
