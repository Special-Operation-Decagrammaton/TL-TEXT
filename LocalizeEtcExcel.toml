1699247498-NameJp = "Boina com Fita"
1699247498-DescriptionJp = "Uma boina branca com fita, adotada como o chapéu escolar da Academia Geral Trinity. Na prática, dizem que é mais difícil do que parece vesti-la aproveitando o seu volume."
2090555875-NameJp = "Capacete Balístico"
2090555875-DescriptionJp = "Um capacete balístico resistente, capaz de proteger a cabeça de qualquer coisa que venha voando. O exterior é coberto por um material de algodão macio, permitindo decorá-lo com emblemas e afins."
1300177111-NameJp = "Minichapéu com Babados"
1300177111-DescriptionJp = "Um minichapéu decorado com babados vistosos. Por trás dos babados há um pequeno grampo de cabelo escondido, que também serve para manter a forma."
