3173671747-DescriptionJp = "As de um dos bilhetes a das do de a promessas a do das garantir as do a no exatas dumas do de resultados a das do rolagens do das de dados a do a cravos pro a das certezas de que lado da numeração vão as rolar e de as parar no a. Ao de a usar e a no de se do optar a no do a fazer a rolagens e de parar no do cravadas do o dos no a de as de 5, o seu dos bilhete ele a de ir a de fumaça na sumir das posses."
2940286403-NameJp = "Tíquete de Dado Garantido N.º 6"
2940286403-DescriptionJp = "As de um dos bilhetes a das do de a promessas a do das garantir as do a no exatas dumas do de resultados a das do rolagens do das de dados a do a cravos pro a das certezas de que lado da numeração vão as rolar e de as parar no a. Ao de a usar e a no de se do optar a no do a fazer a rolagens e de parar no do cravadas do o dos no a de as de 6, o seu dos bilhete ele a de ir a de fumaça na sumir das posses."
2707357009-NameJp = "Caderno de Anotações Estudantil da Arius"
2707357009-DescriptionJp = "O caderninho a do estudante a de Arius a do com as de folhas a no de as do utilidades e as práticos e as de a do versatilidade a no preencher de do diários as notas das de tudo."
2325711709-NameJp = "Caldeirão Suspeito"
2325711709-DescriptionJp = "Um panelão do bruxarias e as poções a do a borbulhar e do fervedura a do num ensopados a duma gosmas e as dos líquidos a do estranhos. Se das da coragens de a tu bater no a dar das a de a de provar a no das de um goles... a quem de sabe se a no do de a não vai a de no de a bater no a um as gostosura a no de a surpreender a dos paladares?"
2818960363-NameJp = "Tapete Voador & Circulador de Ar"
2818960363-DescriptionJp = "O kit de uma fofuras duma a tapetes a do mágicos em dupla a com a no de ventilador a do as turbinas no circulador. Só de dar um pousos de a no pé da do parado a de em no de auras ali a das de tu de já a no de as a de vai a sentir do ventanias do magias a do bater de as do no rosto."
578477992-NameJp = "Espreguiçadeira e Mesinha de Praia"
578477992-DescriptionJp = "O as do das cadeiras a do espreguiçar na a das praia com um de do chazinho e das bebinas, de as dão das a de as um as magias do feitiço a do que as de no as a relaxar as das não a no importa as de a de qual de ser o do a que for e do as encostar."
4185101560-NameJp = "Eleph da Eri"
4185101560-DescriptionJp = "Um Eleph repleto do mistério da Eri."
4134412064-NameJp = "Eleph da Kanoe"
4134412064-DescriptionJp = "Um Eleph repleto do mistério da Kanoe."
214268155-NameJp = "Convite da Filial N.º 1"
214268155-DescriptionJp = "O passe que te dar de as as permissões a de convocar uma das as a alunas pro e as a mais a no de as a do para a filial as da No 1 do a de as da Cafeterias."
2324923658-NameJp = "Convite da Filial N.º 2"
2324923658-DescriptionJp = "O passe que te dar de as as permissões a de convocar uma das as a alunas pro e as a mais a no de as a do para a filial as da No 2 do a de as da Cafeterias."
1004823412-NameJp = "Wild Hunt"
1004823412-DescriptionJp = "Pode gerar itens úteis para as alunas da Wild Hunt."
3476642171-NameJp = "Wild Hunt"
3476642171-DescriptionJp = "Pode gerar itens úteis para as alunas da Wild Hunt."
2622728232-NameJp = "Pacote de Desenvolvimento: Wild Hunt"
2622728232-DescriptionJp = "Os preparativos das montagens a se armarem nas auras aos empilhados de doçuras nas riquezas pras tuas Piroxênios e com os materiais pro amparos nas elevações de suas estudantes as Wild Hunt pras lutas aos fardos diárias da aluna. E no de bônus, caem pro lado as bondades de gratificações as compras ao montante num achado nos repletos do brilho dumas belas dumas 400 Piroxênios (as que entram por gratuito).\n※ Mais lá embaixo dá pros mergulhos de cabeça pra encontrar e as fuçadas nas lidas e observações aos recheios da caixa nos descritivos as escritas."
4128339013-NameJp = "Distrito de Artes de Wild Hunt"
4128339013-DescriptionJp = "(X)"
3019432404-NameJp = "Edifício Principal de Wildhunt"
3019432404-DescriptionJp = "É o maior edifício de Wildhunt. Como abriga os escritórios do Conselho Estudantil e do Esquadrão de Supervisão do Dormitório, não é muito frequentado pelas alunas em geral."
3730667014-NameJp = "Praça Epifania"
3730667014-DescriptionJp = "A praça que se estende em frente ao edifício principal. Independentemente de como está o clima, sempre há apresentações de rua e performances artísticas acontecendo aqui."
1558103051-NameJp = "Dormitório 3"
1558103051-DescriptionJp = "Um dos dormitórios onde as alunas residem. Embora esteja sob a estrita vigilância do Esquadrão de Supervisão do Dormitório, como sempre, há algumas brechas aqui e ali."
1365945908-NameJp = "Pavilhão de Informações Artísticas"
1365945908-DescriptionJp = "A biblioteca de Wildhunt. Além de livros, abriga uma vasta coleção de obras de arte, incluindo álbuns, partituras, rolos de filme e matrizes de gravuras originais."
2951155655-NameJp = "Eye of Art"
2951155655-DescriptionJp = "O local onde ocorrem espetáculos como concertos musicais, peças de teatro e apresentações de dança. Há boatos de que a mais recente tecnologia arquitetônica da Millennium foi utilizada na sua construção."
3688839210-NameJp = "Galeria Nemo"
3688839210-DescriptionJp = "Um museu de arte construído por um patrocinador anônimo. Embora seja necessário passar por uma rigorosa inspeção de segurança, a entrada também é permitida para o público geral."
3604017483-NameJp = "Torre do Sino Apikere"
3604017483-DescriptionJp = "A torre de sino mais alta de Wildhunt. Enquanto algumas aclamam o seu som como emocionante, outras reclamam dizendo que odeiam porque dá dor de cabeça."
375386759-NameJp = "Oculus Studio"
375386759-DescriptionJp = "Um estúdio completo onde ocorrem diversas atividades de artes visuais, como filmagens, edição de vídeo e gravação de áudio. Ocasionalmente, eles também sediam o próprio festival de cinema."
1609915763-NameJp = "Experiência de Localização no Distrito Geral de Artes de Wildhunt"
1609915763-DescriptionJp = "Quanto maior o seu nível de localização, mais áreas você poderá visitar."
2421885010-NameJp = "Estante de Literatura"
2421885010-DescriptionJp = "Uma estante onde ficam guardados os livros de literatura. Há também uma grande quantidade de livros nela que exigem muita coragem só para pegá-los."
3112497970-NameJp = "Estante de Teoria da Arte"
3112497970-DescriptionJp = "Uma estante onde ficam guardados os livros acadêmicos sobre teorias artísticas conceituais. No entanto, parece que as alunas que vêm buscá-los não estão com as expressões mais felizes."
301797795-NameJp = "Carpete com Padrões Abstratos"
301797795-DescriptionJp = "Um carpete que chama a atenção por seus padrões abstratos. Mantém um equilíbrio perfeito entre a complexidade e a regularidade."
3001079672-NameJp = "Carpete com Padrão de Madeira"
3001079672-DescriptionJp = "Um carpete que, visto de longe, parece ser feito de madeira. No entanto, ao tocá-lo, percebe-se que é um tapete bem macio."
1888234954-NameJp = "Carpete com Padrão de Mosaico"
1888234954-DescriptionJp = "Um carpete que se destaca por seus padrões antiquados. É uma reinterpretação dos mosaicos de ruínas antigas."
837929111-NameJp = "Carrinho de Transporte de Materiais de Arte"
837929111-DescriptionJp = "Um carrinho usado para transportar telas e outros materiais de arte. Dizem que algumas alunas sobem nele e saem correndo a toda velocidade quando o Esquadrão de Supervisão do Dormitório não está olhando."
1277060067-NameJp = "Cadeira de Veludo"
1277060067-DescriptionJp = "Uma cadeira de madeira com almofadas de veludo sobrepostas. Só de sentar nela, já dá a sensação de que você impõe autoridade."
3983877079-NameJp = "Expositor da Obra Premiada"
3983877079-DescriptionJp = "A obra que ganhou o grande prêmio em um certo concurso de arte. Inúmeros elogios e invejas se concentram aqui."
1713694610-NameJp = "Expositor de Escultura Abstrata"
1713694610-DescriptionJp = "Uma estátua de autoria desconhecida. Sua qualidade artística foi reconhecida, e ela permanece no mesmo lugar há muito tempo."
2472213385-NameJp = "Expositor de Livro Antigo Suspeito"
2472213385-DescriptionJp = "Um expositor com um livro antigo que emana uma aura bizarra. Ele ainda não foi emprestado nenhuma vez."
1815109606-NameJp = "Expositor de Livro Proibido"
1815109606-DescriptionJp = "Um expositor onde um livro proibido repousa. A ironia de exibir algo proibido publicamente também é, de certa forma, uma arte."
2101259221-NameJp = "Cerca de Madeira de Wildhunt"
2101259221-DescriptionJp = "Uma cerca de madeira bem velha de Wildhunt. O peso do tempo pode ser sentido profundamente nela."
2452935603-NameJp = "Iluminação Minimalista"
2452935603-DescriptionJp = "Uma iluminação de design simples. Foca unicamente na funcionalidade."
865351516-NameJp = "Luz de Vigia"
865351516-DescriptionJp = "Uma luz instalada na parede. É um excelente guia para as alunas do Esquadrão de Supervisão do Dormitório durante as patrulhas noturnas."
2695482073-NameJp = "Mesa Grande com Luminária Verde"
2695482073-DescriptionJp = "Uma mesa grande com uma luminária verde em cima. É algo rotineiro que uma aluna desconhecida acabe sentando ao seu lado."
504418052-NameJp = "Mesa Média com Luminária Verde"
504418052-DescriptionJp = "Uma mesa de tamanho médio com uma luminária verde. Mesmo num lugar tão controlado como este, almas artísticas destrutivas podem florescer."
3172216333-NameJp = "Janela Grande Antifuga"
3172216333-DescriptionJp = "Uma grande janela com grades. Aparentemente, a segurança não é o seu único propósito."
486717077-NameJp = "Janela Média Antifuga"
486717077-DescriptionJp = "Uma janela média com grades. É bem eficaz tanto para prevenir invasões quanto fugas."
947632910-NameJp = "Quadro de Avisos de Wildhunt"
947632910-DescriptionJp = "Um quadro onde diversos anúncios e divulgações são afixados. Dizem que há muitos cartazes pregados sem autorização."
2660814915-NameJp = "Torre da Insônia"
2660814915-DescriptionJp = "Latas vazias de energético empilhadas de qualquer jeito. A prova de uma noite em claro."
1446702624-NameJp = "Continuação da Galáxia"
1446702624-DescriptionJp = "Uma escultura de autoria desconhecida. Apenas o título da obra foi passado adiante, mas as interpretações de seu significado variam bastante."
3190754330-NameJp = "Melodia Empalhada"
3190754330-DescriptionJp = "O trabalho de um famoso escultor. As opiniões sobre ela estão sempre divididas entre ser uma obra-prima e um completo desastre."
1146153010-NameJp = "Conjunto de Pintura"
1146153010-DescriptionJp = "Tela, cavalete, tintas e cadeira. É uma composição mais do que suficiente para se começar a pintar."
2919564883-NameJp = "Divisória de Madeira de Wildhunt"
2919564883-DescriptionJp = "Uma divisória velha de madeira de Wildhunt. Usada para particionar espaços grandes."
1281426105-NameJp = "Pilar de Madeira de Wildhunt"
1281426105-DescriptionJp = "Um antigo pilar de madeira de Wildhunt. A madeira maciça sustenta todo o peso do teto."
1692593705-NameJp = "Portal de Madeira de Wildhunt"
1692593705-DescriptionJp = "Um portal velho de madeira de Wildhunt. Como poeira de madeira costuma cair dele, dizem que quem passa por baixo acaba ajeitando a própria postura instintivamente."
3076282914-NameJp = "Divisória de Vidro de Wildhunt"
3076282914-DescriptionJp = "Uma velha divisória de vidro de Wildhunt. A superfície é áspera, mas isso lhe confere um charme a mais."
4055705513-NameJp = "Rack Simples"
4055705513-DescriptionJp = "Uma prateleira cheia de vários tipos de tintas. Há muitos itens misturados de donas desconhecidas."
1538604811-NameJp = "Prateleira para Materiais de Arte"
1538604811-DescriptionJp = "Uma prateleira onde os tubos de tinta estão perfeitamente alinhados. No entanto, essa organização toda não vai durar muito."
3295668707-NameJp = "Cama da Artista"
3295668707-DescriptionJp = "Um sofá jogado no canto do estúdio. Não é ideal para um sono profundo, mas depois de virar a noite trabalhando, dá para dormir tranquilamente nele."
1553171869-NameJp = "Pódio em Degraus"
1553171869-DescriptionJp = "Um pódio com degraus usado para discursos. Enquanto estiver lá em cima, você poderá se colocar acima de todo mundo."
2800446403-NameJp = "Mesa Grande do Caos com Luminária Verde"
2800446403-DescriptionJp = "Uma mesa grande toda bagunçada. Dizem ser o resultado de muito estudo, mas qual será a verdadeira história por trás disso?"
4066808432-NameJp = "Mesa Média do Caos com Luminária Verde"
4066808432-DescriptionJp = "Uma mesa de tamanho médio que está toda bagunçada. Quando o Esquadrão de Supervisão do Dormitório chega, a confusão já acabou."
4137013604-NameJp = "Parede de Madeira Decorativa"
4137013604-DescriptionJp = "Uma parede que combina perfeitamente com a atmosfera de Wildhunt. O papel de parede azul é o detalhe que eleva o ambiente."
2042621021-NameJp = "Piso de Pedra Quadriculado"
2042621021-DescriptionJp = "Piso de pedra com padrão quadriculado. Mesmo que inúmeras pessoas caminhem por cima dele, sua cor jamais desbota."
461885748-NameJp = "Cenário de Pintura a Tinta"
461885748-DescriptionJp = "Um cenário onde o preto e o branco estão em perfeita harmonia. Destaca-se por uma beleza moderada, parecendo muito com uma pintura clássica a tinta."
885678970-NameJp = "Estante de Livros Extragrande"
885678970-DescriptionJp = "Uma estante gigante que abriga todo tipo de livro. É muito difícil pegar os livros que ficam no topo sem uma escada."
388379301-NameJp = "Escada para Estante de Livros"
388379301-DescriptionJp = "Uma escada de mão usada para acessar estantes. Só de olhar, já dá uma vontade enorme de subir nela."
2107674786-NameJp = "Estante de Exibição"
2107674786-DescriptionJp = "Uma estante usada para exibir antiguidades e itens decorativos. Muitas alunas ficam circulando e admirando a frente dela."
1976657339-NameJp = "Conjunto de Trabalho de Pintura Frenética"
1976657339-DescriptionJp = "O espaço de um pintor no meio do trabalho. Dá para sentir a inspiração... ou a pura loucura."
51435562-NameJp = "Dentro da Cabeça da Artista"
51435562-DescriptionJp = "Uma mesa com coisas largadas de qualquer jeito. É puro caos, mas dizem que algumas pessoas ainda conseguem encontrar arte no meio disso."
3731052108-NameJp = "Bandeira de Wildhunt"
3731052108-DescriptionJp = "Uma bandeira com o brasão de Wildhunt bordado."
2911873771-NameJp = "Espaço do Terraço de Wildhunt"
2911873771-DescriptionJp = "Um terraço equipado com instrumentos musicais para que possam fazer concertos a qualquer momento."
2229322849-NameJp = "Passarela do Pavilhão de Informações Artísticas"
2229322849-DescriptionJp = "Uma passarela de acesso conectada ao Pavilhão de Informações Artísticas, a biblioteca de Wildhunt. Está sempre cheia de alunas indo e vindo."
3162765576-NameJp = "Escadaria em Espiral de Wildhunt"
3162765576-DescriptionJp = "Uma escadaria espiral que permite subir para o andar de cima. Os degraus são bem estreitos, então tente não correr."
421036472-NameJp = "Série Campus Wildhunt"
421036472-DescriptionJp = "O campus de Wildhunt, transbordando arte e inspiração. Vamos sair e procurar as respostas sobre o que é a verdadeira beleza."
1257590389-NameJp = "Série Campus Wildhunt"
1257590389-DescriptionJp = "(X)"
3425901162-NameJp = "Campus Wildhunt"
3425901162-DescriptionJp = "(X)"
1979335525-NameJp = "Cartão da Loja"
1979335525-DescriptionJp = "Um cartão que pode ser comprado na loja de souvenirs do museu de arte de Wildhunt. Parece que ele também pode ser usado para jogar. O design dele é lindo."
1516051971-NameJp = "Tinta"
1516051971-DescriptionJp = "Uma marca de tintas com ótima pigmentação, usada por muitas alunas. Diz a lenda que artistas mais pobres comiam essa tinta para suportar a fome, mas, por favor, não tentem reproduzir isso sob hipótese alguma."
2738957566-NameJp = "Cubo de Mármore"
2738957566-DescriptionJp = "Um cubo de mármore usado para esculturas. Experimente esculpir seus sonhos em sua superfície impecavelmente branca."
2117511996-NameJp = "Cinta para Livros"
2117511996-DescriptionJp = "Uma cinta de couro usada para amarrar e carregar livros. Mostre as suas preferências literárias com muito estilo."
3098422604-NameJp = "Bilhete de 10 Recrutamentos"
3098422604-DescriptionJp = "Um bilhete que permite realizar 10 recrutamentos. ※Se não for utilizado até 30 de Novembro de 2025 às 23:59, este bilhete irá desaparecer."
2923013887-NameJp = "Arte para Quem?"
2923013887-DescriptionJp = "Pode ser obtido no evento Arte para Quem?"
1552509032-NameJp = "Basílica Arius"
1552509032-DescriptionJp = "Conclua o Capítulo 2, Episódio 5 do Oratório do Tempo Passado, Parte 1"
1286967671-NameJp = "Console de Jogo Antigo Guardado com Carinho"
1286967671-DescriptionJp = "O primeiro console que a Momoi comprou junto com sua irmã mais nova.\nO 'Plano de Transformar a Midori em Gamer' parece ter sido um grande sucesso..."
2108207432-NameJp = "Boneca Antiga de Festival"
2108207432-DescriptionJp = "Uma boneca que a Umika comprou no primeiro festival em que participou.\nElas formam um par."
2538736248-NameJp = "Medalha de Aposta"
2538736248-DescriptionJp = "Uma medalha na qual a Koyuki fez um buraco.\nFoi criada para poder jogar de graça nas máquinas, mas com o avanço da tecnologia, hoje em dia ela é completamente inútil. E, é claro, é ilegal!"
2177848562-NameJp = "Adorno de Pena em Forma de Borboleta"
2177848562-DescriptionJp = "O adorno de pena da Haruna.\nDizem que ela usa penas diferentes dependendo do seu humor, da situação e do significado que ela quer transmitir."
4073457417-NameJp = "Eleph da Miyo"
4073457417-DescriptionJp = "Eleph repleto do místico da Miyo."
4187055741-NameJp = "Eleph da Fuyu"
4187055741-DescriptionJp = "Eleph repleto do místico da Fuyu."
3646564332-NameJp = "Eleph da Ritsu"
3646564332-DescriptionJp = "Eleph repleto do místico da Ritsu."
3334773599-NameJp = "Mesa de Máquina de Escrever"
3334773599-DescriptionJp = "Uma mesa feita especificamente para datilografar na máquina de escrever. É difícil usá-la para outras coisas, mas parece que as pessoas não se importam com isso."
3798522794-NameJp = "A Primeira Obra da Artista"
3798522794-DescriptionJp = "A primeira criação de uma certa artista de mídia. A própria pessoa morre de vergonha disso, mas a paixão investida nessa obra é admirável."
935541676-NameJp = "Bancada de Escultura"
935541676-DescriptionJp = "Uma bancada usada para esculpir peças. A aparência é meio grosseira, mas não deixa a desejar na hora de produzir arte refinada."
2957072884-NameJp = "Série Campus Wildhunt"
2957072884-DescriptionJp = "Você pode fabricar móveis para o café (Série Campus Wildhunt)."
3009779556-NameJp = "Caixa de Sorteio da Série Campus Wildhunt"
3009779556-DescriptionJp = "Ao utilizar, você terá uma chance igualitária de obter um móvel aleatório da Série Campus Wildhunt."
625522421-NameJp = "Caixa de Seleção da Série Campus Wildhunt"
625522421-DescriptionJp = "Uma caixa que permite selecionar e trocar por qualquer móvel da Série Campus Wildhunt."
2670560256-NameJp = "Kikikiki... Os preparativos estão concluídos"
2670560256-DescriptionJp = "O leal servo da Ella, o mercador do mal Silverplate! Ele é um vilão que surge das fendas dimensionais para vender itens que trazem infelicidade às pessoas! No spin-off 'Johnny Kivotos e a Magia do Fuzil Antimaterial', ele aparece como o vilão principal e está muito mais forte! Apesar da sua aparência, por incrível que pareça, ele tem muitos fãs! Antigamente, muitos círculos participavam dos eventos de venda de 'MahoLiva'! Além disso, quando ele usa o Poder da Pirâmide, a maioria dos ataques se torna inútil. É um oponente formidável! No episódio 11 da 2ª temporada, há uma cena em que o Silverplate esconde sua verdadeira identidade e se transfere para a escola, e lá, incrivelmente..."
2818922347-NameJp = "Recuperação total com Poder Mágico!"
2818922347-DescriptionJp = "A fofíssima mascote da série 'MahoLiva', a Stanag-chan! Ela estabelece o contrato da Guarda Nacional Mágica com a White e a Pink, transformando as duas em garotas mágicas! Como ela é uma coisinha muito gentil e pura, acaba sendo sequestrada com frequência pela Ordem dos Cavaleiros do Mal liderada pela Ella para sofrer bullying. Mas não tem problema, pois o corpinho dela é resistente e a recuperação é super rápida! Ela é uma menina que está sempre sorridente e cheia de energia! Quando a dupla se encontra em momentos de crise, ela até fornece balas mágicas para elas! A Stanag-chan carrega vários tipos de munição mágica, como as Pontas Verdes, Pontas Pretas, entre outras! O episódio do despertar da Stanag-chan é muito, muito emocionante... Se não me engano, é o episódio 7 da 2ª temporada, onde ela revela sua forma original de..."
3074909671-NameJp = "Ordem dos Cavaleiros do Mal, a era das trevas chegou!"
3074909671-DescriptionJp = "A Ella! Lembro-me muito bem que fiquei morrendo de medo quando a vi pela primeira vez! Apesar de sua aparência muito bonita, ela é a grande arqui-inimiga das Heavy Calibers! Quando a Ella ouviu vozes cheias de amor e felicidade no planeta das trevas em que vivia, ela trouxe um monte de capangas e atacou a todos! Dizendo que iria silenciá-los para sempre! A própria risada dela é barulhenta demais, então é bem irônico, não acha?! De qualquer maneira, graças aos esforços heroicos das Heavy Calibers, os planos da Ella sempre terminam em fracasso, mas ela é uma vilã assustadora que simplesmente não desiste nunca! No filme de cinema, 'Garota Mágica Heavy Calibers: Daisy Cutter', a Ella perde a memória e aparece trabalhando como uma atendente normal de meio período em uma livraria, e é ali que o passado da Ella..."
907100893-NameJp = "Munroe-Neumann! Magical Jet!"
907100893-DescriptionJp = "Thermite Pink! A grande companheira da White! Sobre o motivo do nome dela ser 'Pink' e a cor das roupas dela ser roxa... Ah! Não posso falar mais do que isso ou vai ser spoiler, então por favor assista a série para descobrir! Originalmente, a Pink ficava isolada de todos e não tinha amigos, mas quando a Ella atacou, ela admirou tanto a White por tê-la salvado, que acabou firmando o contrato como Guarda Nacional Mágica! E assim elas se tornaram a melhor dupla de amigas de toda a história das garotas mágicas! Lutando lado a lado com a White, a Pink recupera sua autoconfiança com amor, amizade e muito poder de fogo, mudando para uma personalidade bem mais alegre e brilhante! No episódio 6 da 3ª temporada, tem um arco em que ela vira uma superestrela de uma banda idol..."
3133177365-NameJp = "Mensageira da Paz! Deixe com a White!"
3133177365-DescriptionJp = "A Thermite White é a protagonista da série 'MahoLiva'! Originalmente, ela era só uma garota comum e meio desastrada, mas um dia, durante um ataque crítico da Ella, ela conheceu a Stanag-chan, a mascote que veio do País da Magia! Mesmo tremendo de medo, o forte senso de justiça da White a fez aceitar o contrato como Guarda Nacional Mágica, virando assim uma garota mágica! Depois, a Pink, que havia sido salva por ela, também se torna uma garota mágica e as duas formam as 'Heavy Calibers', a dupla da justiça que protege e salva o mundo! No episódio 2 da 2ª temporada, há uma história de quando a White dá de cara com o 'Dragon Skin'..."
2954602466-NameJp = "Garota Mágica Heavy Caliber"
2954602466-DescriptionJp = "Pode ser obtido no evento Garota Mágica Heavy Caliber"
2237694286-NameJp = "Ecclesia para um Futuro Deixado para Trás"
2237694286-DescriptionJp = "Conclua o Capítulo 3, Episódio 10 do Oratório do Tempo Passado, Parte 1"
82589008-NameJp = "Pt do Evento"
82589008-DescriptionJp = "Pontos que podem ser ganhos no evento. Ao obter uma boa quantidade, você poderá receber diversas recompensas."
658504308-NameJp = "Ingresso do Parque de Diversões"
658504308-DescriptionJp = "Ingresso de entrada do parque de diversões. Você não pode entrar sem ter um desses. E isso é algo óbvio."
938893335-NameJp = "Balde de Pipoca"
938893335-DescriptionJp = "Um balde de pipoca temático baseado na mascote da Garota Mágica Heavy Caliber. O acabamento deixa um pouco a desejar em algumas partes."
1363650339-NameJp = "Moeda do Borderland"
1363650339-DescriptionJp = "Uma moeda usada nas atrações do Parque de Diversões Borderland. Antigamente, elas também serviam para as máquinas de venda automática, mas hoje em dia dizem que nem os funcionários sabem como usá-las."
1354030504-NameJp = "Eleph da Suzumi (Mágica)"
1354030504-DescriptionJp = "Eleph repleto do místico da Suzumi (Mágica)."
1851317887-NameJp = "Eleph da Subaru"
1851317887-DescriptionJp = "Eleph repleto do místico da Subaru."
4064578906-NameJp = "Eleph da Love"
4064578906-DescriptionJp = "Eleph repleto do místico da Love."
933181320-NameJp = "Eleph da Reisa (Mágica)"
933181320-DescriptionJp = "Eleph repleto do místico da Reisa (Mágica)."
3167056314-NameJp = "Jukebox"
3167056314-DescriptionJp = "Originalmente, era uma máquina que tocava música ao inserir uma moeda. Ou seja, uma máquina de venda de música... Mas dizem que hoje em dia a usam mais como um alto-falante gigante só pra compor a atmosfera."
