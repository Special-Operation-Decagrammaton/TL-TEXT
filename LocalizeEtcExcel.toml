2622728232-DescriptionJp = "Um pacote que contém itens úteis para o crescimento das alunas de Wild Hunt e Pirita.\nAo comprar, você receberá 400 Piritas (gratuitas).\n*Consulte os detalhes do produto abaixo para mais informações sobre o pacote."
4128339013-NameJp = "Distrito Artístico Geral de Wild Hunt"
4128339013-DescriptionJp = "(X)"
3019432404-NameJp = "Edifício Principal de Wild Hunt"
3019432404-DescriptionJp = "O maior edifício de Wild Hunt. Como abriga o escritório do conselho estudantil e da equipe de supervisão do dormitório, as alunas comuns não costumam frequentar o local."
3730667014-NameJp = "Praça Epifania"
3730667014-DescriptionJp = "Uma praça que se estende em frente ao edifício principal. Faça chuva ou faça sol, sempre há apresentações de música ao vivo e arte performática acontecendo."
1558103051-NameJp = "Bloco do 3º Dormitório"
1558103051-DescriptionJp = "Um dos blocos de dormitórios onde as alunas residem. Está sob vigilância rigorosa da equipe de supervisão, mas, como sempre, há alguma brecha."
1365945908-NameJp = "Pavilhão de Informações Artísticas"
1365945908-DescriptionJp = "A biblioteca de Wild Hunt. Além de livros, abriga diversas obras de arte, como álbuns, partituras, filmes e matrizes de gravuras."
2951155655-NameJp = "Eye of Art"
2951155655-DescriptionJp = "Local onde são realizadas apresentações de música, teatro, dança, entre outras. Há rumores de que utiliza as mais recentes tecnologias arquitetônicas de Millennium."
3688839210-NameJp = "Galeria Nemo"
3688839210-DescriptionJp = "Um museu de arte construído por um patrocinador anônimo. É necessário passar por uma inspeção rigorosa, mas o público geral também pode entrar."
3604017483-NameJp = "Torre do Sino Apikere"
3604017483-DescriptionJp = "A torre de sino mais alta de Wild Hunt. Alguns a consideram um som emocionante, enquanto outros reclamam que ela causa dor de cabeça."
375386759-NameJp = "Estúdio Oculus"
375386759-DescriptionJp = "Um estúdio abrangente onde são realizadas atividades de artes visuais, como filmagens, edição de vídeo e gravação de áudio. Às vezes, festivais de cinema próprios são realizados aqui."
1609915763-NameJp = "EXP de Localização do Distrito Artístico Geral de Wild Hunt"
1609915763-DescriptionJp = "Quanto maior o nível de localização, mais áreas você poderá visitar."
2421885010-NameJp = "Estante de Literatura"
2421885010-DescriptionJp = "Uma estante que guarda livros de literatura. Há muitos livros que exigem grande coragem apenas para serem pegos."
3112497970-NameJp = "Estante de Teoria da Arte"
3112497970-DescriptionJp = "Uma estante que guarda livros acadêmicos sobre teorias artísticas conceituais. No entanto, dizem que as alunas que vêm buscar esses livros não estão com uma cara muito feliz."
301797795-NameJp = "Tapete de Padrão Abstrato"
301797795-DescriptionJp = "Um tapete com padrões abstratos marcantes. Mantém um equilíbrio requintado entre complexidade e regularidade."
3001079672-NameJp = "Tapete de Padrão de Madeira"
3001079672-DescriptionJp = "Um tapete que, visto de longe, parece ser feito de madeira. No entanto, ao tocar, percebe-se que é um carpete macio."
1888234954-NameJp = "Tapete de Padrão de Mosaico"
1888234954-DescriptionJp = "Um tapete com padrões antigos marcantes. É uma reinterpretação dos padrões de azulejos de mosaico de ruínas antigas."
837929111-NameJp = "Carrinho de Transporte de Materiais de Arte"
837929111-DescriptionJp = "Um carrinho usado para transportar materiais de arte, incluindo telas. Dizem que algumas alunas roubam o carrinho para correr por aí, fugindo dos olhos da equipe de supervisão."
1277060067-NameJp = "Cadeira de Veludo"
1277060067-DescriptionJp = "Uma cadeira de madeira com almofadas de veludo sobrepostas. Dá a sensação de que, só de sentar nela, você ganha autoridade."
3983877079-NameJp = "Expositor de Obra Premiada"
3983877079-DescriptionJp = "Uma obra que ganhou o grande prêmio em um concurso de arte. Inúmeros elogios e invejas se reúnem aqui."
1713694610-NameJp = "Expositor de Escultura Abstrata"
1713694610-DescriptionJp = "Uma estátua de autor desconhecido. Sua qualidade artística foi reconhecida e ela permanece ali há muito tempo."
2472213385-NameJp = "Expositor de Livro Antigo Suspeito"
2472213385-DescriptionJp = "Um expositor com um livro antigo que emana uma atmosfera estranha. Ainda não foi emprestado a ninguém."
1815109606-NameJp = "Expositor de Livro Proibido"
1815109606-DescriptionJp = "Um expositor com um livro proibido. A ironia de ter algo proibido sendo exibido abertamente também é uma forma de arte."
2101259221-NameJp = "Cerca de Madeira de Wild Hunt"
2101259221-DescriptionJp = "Uma cerca de madeira antiga de Wild Hunt. O peso do tempo pode ser sentido intensamente."
2452935603-NameJp = "Iluminação Minimalista"
2452935603-DescriptionJp = "Uma luminária de design simples. Focada puramente na funcionalidade."
865351516-NameJp = "Luz de Monitoramento"
865351516-DescriptionJp = "Uma luz instalada na parede. É um guia bem-vindo para as alunas da equipe de vigilância que fazem patrulhas durante a madrugada."
2695482073-NameJp = "Mesa Grande com Luz Verde"
2695482073-DescriptionJp = "Uma mesa grande com uma luz verde posicionada sobre ela. É comum que uma aluna desconhecida se sente ao seu lado."
504418052-NameJp = "Mesa Média com Luz Verde"
504418052-DescriptionJp = "Uma mesa média com uma luz verde posicionada sobre ela. Mesmo em um lugar tão contido, uma alma artística destrutiva pode florescer."
3172216333-NameJp = "Janela Grande Antifuga"
3172216333-DescriptionJp = "Uma janela grande com grades. Parece que o objetivo não é apenas a segurança."
486717077-NameJp = "Janela Média Antifuga"
486717077-DescriptionJp = "Uma janela média com grades. É eficaz para impedir tanto fugas quanto invasões."
947632910-NameJp = "Quadro de Avisos de Wild Hunt"
947632910-DescriptionJp = "Um quadro de avisos com vários comunicados e anúncios. Dizem que há muitos avisos afixados sem permissão."
2660814915-NameJp = "Torre da Insônia"
2660814915-DescriptionJp = "Latas vazias de bebidas energéticas empilhadas de forma descuidada. A prova de noites sem dormir."
1446702624-NameJp = "Continuação da Galáxia"
1446702624-DescriptionJp = "Uma estátua de autor desconhecido. Apenas o nome da obra foi transmitido, mas as interpretações sobre o seu significado variam muito."
3190754330-NameJp = "Melodia Taxidermizada"
3190754330-DescriptionJp = "Obra de um famoso escultor. As opiniões de que é uma obra-prima e de que é um fracasso estão sempre em conflito."
1146153010-NameJp = "Kit de Pintura"
1146153010-DescriptionJp = "Tela, cavalete, tintas e cadeira. Uma configuração mais do que suficiente para pintar um quadro."
2919564883-NameJp = "Divisória de Madeira de Wild Hunt"
2919564883-DescriptionJp = "Uma antiga divisória de madeira de Wild Hunt. Usada para dividir grandes espaços."
1281426105-NameJp = "Pilar de Madeira de Wild Hunt"
1281426105-DescriptionJp = "Um antigo pilar de madeira de Wild Hunt. A madeira resistente sustenta o peso do teto."
1692593705-NameJp = "Portão de Madeira de Wild Hunt"
1692593705-DescriptionJp = "Um antigo portão de madeira de Wild Hunt. Dizem que, como cai pó de madeira, quem passa por baixo acaba naturalmente arrumando a aparência."
3076282914-NameJp = "Divisória de Vidro de Wild Hunt"
3076282914-DescriptionJp = "Uma antiga divisória de vidro de Wild Hunt. A superfície é áspera, mas isso lhe confere um charme especial."
4055705513-NameJp = "Prateleira Simples"
4055705513-DescriptionJp = "Uma prateleira contendo todo tipo de tinta. Muitas coisas de donos desconhecidos estão misturadas ali."
1538604811-NameJp = "Prateleira para Pinturas"
1538604811-DescriptionJp = "Uma prateleira com tintas organizadas de forma impecável. No entanto, essa organização não dura muito tempo."
3295668707-NameJp = "Cama do Artista"
3295668707-DescriptionJp = "Um sofá colocado no canto da sala de trabalho. Não é ideal para um sono profundo, mas é perfeito para descansar após uma noite em claro."
1553171869-NameJp = "Palanque em Degraus"
1553171869-DescriptionJp = "Um palanque em degraus usado para discursos. Enquanto estiver aqui em cima, você pode ficar acima das outras pessoas."
2800446403-NameJp = "Mesa Grande Caótica com Luz Verde"
2800446403-DescriptionJp = "Uma mesa grande toda bagunçada. Dizem ser vestígios de estudos, mas qual será a verdade?"
4066808432-NameJp = "Mesa Média Caótica com Luz Verde"
4066808432-DescriptionJp = "Uma mesa média toda bagunçada. Quando a equipe de vigilância chega, a situação já terminou."
4137013604-NameJp = "Parede de Madeira Decorativa"
4137013604-DescriptionJp = "Uma parede que combina muito bem com a atmosfera de Wild Hunt. O papel de parede azul é um ponto que destaca o ambiente."
2042621021-NameJp = "Piso de Pedra Xadrez"
2042621021-DescriptionJp = "Um piso de pedra com padrão xadrez. Mesmo que inúmeras pessoas caminhem sobre ele, nunca perde a cor."
461885748-NameJp = "Fundo de Pintura a Tinta"
461885748-DescriptionJp = "Um fundo onde o preto e o branco se harmonizam. Destaca-se uma beleza contida, como se fosse uma pintura a nanquim."
885678970-NameJp = "Estante de Livros Extra Grande"
885678970-DescriptionJp = "Uma estante extra grande que armazena todos os tipos de livros. É difícil pegar os livros do topo sem uma escada."
388379301-NameJp = "Escada para Estante"
388379301-DescriptionJp = "Uma escada para estante de livros. Desperta o desejo de subir nela."
2107674786-NameJp = "Estante de exibição"
2107674786-DescriptionJp = "Uma estante para colocar antiguidades e decorações. Muitos alunos ficam perambulando por aqui."
1976657339-NameJp = "Conjunto de pintura frenética"
1976657339-DescriptionJp = "A mesa de um pintor durante o trabalho. É possível sentir inspiração ou loucura nela."
51435562-NameJp = "Dentro da mente de um artista"
51435562-DescriptionJp = "Uma mesa onde objetos estão dispostos de forma descuidada. É caótico, mas dizem que alguém consegue encontrar arte até aqui."
3731052108-NameJp = "Estandarte da Wild Hunt"
3731052108-DescriptionJp = "Um estandarte com o emblema da Wild Hunt entrelaçado."
2911873771-NameJp = "Espaço de terraço da Wild Hunt"
2911873771-DescriptionJp = "Um terraço equipado com instrumentos musicais para que concertos possam ser realizados a qualquer momento."
2229322849-NameJp = "Passarela da Galeria de Arte"
2229322849-DescriptionJp = "Uma passarela que conecta à Galeria de Arte, a biblioteca da Wild Hunt. Está sempre movimentada com alunos entrando e saindo."
3162765576-NameJp = "Escada em espiral da Wild Hunt"
3162765576-DescriptionJp = "Uma escada em espiral que leva ao andar superior. Os degraus são estreitos, então tente não correr."
421036472-NameJp = "Série Campus da Wild Hunt"
421036472-DescriptionJp = "O campus da Wild Hunt, transbordando arte e inspiração. Vamos sair em busca da resposta sobre o que é a beleza."
