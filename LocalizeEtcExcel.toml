250804865-NameJp = "Luvas Esportivas"
250804865-DescriptionJp = "Luvas esportivas com a palma texturizada para evitar escorregões. Como o material é resistente ao fogo, é seguro tocar em canos de armas quentes."
2642735370-NameJp = "Luvas de Tricô"
2642735370-DescriptionJp = "Luvas da marca de atividades ao ar livre 'Manaslu', voltadas para estudantes do ensino médio. O isolamento térmico não é dos melhores, mas são populares pelo design fofo."
1332059101-NameJp = "Luva de Forno do Peroro"
1332059101-DescriptionJp = "Uma luva de forno branca com o design do mascote 'Peroro' da 'Momo Friends'. Dizem que, ao usá-la, você sente vontade de começar a dançar de repente."
1759502696-NameJp = "Luvas de Couro"
1759502696-DescriptionJp = "Luvas feitas de couro de alta qualidade. A durabilidade não é muito alta, sendo usadas principalmente em cerimônias ou festas."
2952456681-NameJp = "Luvas Táticas"
2952456681-DescriptionJp = "Luvas táticas resistentes feitas com material à prova de fogo. Não há problema nem mesmo se você segurar uma barra aquecida!"
4188994934-NameJp = "Luvas de Renda"
4188994934-DescriptionJp = "Luvas com um design luxuoso feitas de material de cetim. Como são sensíveis ao calor, tome cuidado ao manusear fogo."
1332723028-NameJp = "Mangas de Braço"
1332723028-DescriptionJp = "Mangas para estudantes que buscam proteção contra raios UV e moda ao mesmo tempo. Recomendadas para mudanças de estação."
3739266178-NameJp = "Luvas de Fio de Pérola"
3739266178-DescriptionJp = "Luvas de fio decoradas com pérolas. Como as pontas dos dedos são expostas, não há problemas em realizar trabalhos minuciosos."
