997253011-NameJp = "大吉"
997253011-DescriptionJp = "あら。大吉ですね。うふふ。今年はどのような美食が私たちを待っているのでしょう？"
940731399-NameJp = "大吉"
940731399-DescriptionJp = "願事 - 叶う\n勉強 - 努力を怠るな\n失せ物 - 近い所にあり\n料理 - 努力は実る"
555506678-NameJp = "大吉"
555506678-DescriptionJp = "水中の大魚、進む所大浪おこり、時に乗ずると、たっぷり詰まったおせちと旬の鯛を得る……旬の鯛というところが特にお気に入りです★"
