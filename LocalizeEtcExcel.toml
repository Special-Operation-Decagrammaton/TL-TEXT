2538482771-DescriptionJp = "デパートを訪れた子供たちにとって夢のような空間、モモフレンズプール。"
421326092-NameJp = "デパートのモモフレンズ台"
421326092-DescriptionJp = "モモフレンズグッズを購入できるモモフレンズ台。"
792048723-NameJp = "デパートのモモフレンズのクッションショーケース"
792048723-DescriptionJp = "ふわふわモモフレンズの仲間がいっぱい！あなたはどれを選ぶ？モモフレンズクッションのショーケース。"
2859769149-NameJp = "デパートのラグジュアリースペシャルショーケース"
2859769149-DescriptionJp = "商品を美しく引き立たせるラグジュアリーなスペシャルショーケース。"
1158553897-NameJp = "デパートの大型ショーケース"
1158553897-DescriptionJp = "フルーツや商品がたくさん並べられるすっきりとしたショーケース。"
657013837-NameJp = "デパートのウェーブキャット自動販売機"
657013837-DescriptionJp = "ウェーブキャットが描かれた自販機。お客さんに大人気！"
659331947-NameJp = "デパートのワイドウィンドウ"
659331947-DescriptionJp = "たまには空でも見よう。外の景色を眺めることができるワイドウィンドウ。"
858151919-NameJp = "エレガントキャンドルセット"
858151919-DescriptionJp = "華やかな燭台はまるで光の花束のよう！輝かしく美しいキャンドルセット。"
839017025-NameJp = "荘厳な高級カーペット"
839017025-DescriptionJp = "荘厳で大胆なディープブルーカラーと柔らかくしなやかな柄が特徴的なカーペット。"
2127860063-NameJp = "豪奢な高級カーペット"
2127860063-DescriptionJp = "白地にぎっしりと入った金色の装飾が美しいカーペット。"
1812215032-NameJp = "書家デスク"
1812215032-DescriptionJp = "この美しいデスクに着けば、あなたも名筆が書けるかも！？"
877023354-NameJp = "ゲヘナ式石造りのフェンス"
877023354-DescriptionJp = "大胆な仕上げ、繊細な浮き彫りが際立つ石造りのフェンス。置いた瞬間に雄大な雰囲気が漂う。"
3545716340-NameJp = "ゲヘナ式フラッグ"
3545716340-DescriptionJp = "ゲヘナの威厳が感じられるフラッグ。みんながいる場をより一層輝かせてくれる。"
360909443-NameJp = "ゲヘナ式グランドフラッグ"
360909443-DescriptionJp = "ゲヘナの雄大さが際立つグランドフラッグ。改まった場面に欠かせない。"
4130505278-NameJp = "ゲヘナ式木造パーテーション"
4130505278-DescriptionJp = "繊細な彫刻が際立つ木製パーテーション。華やかなパーティー会場で空間を仕切るのに欠かせない家具！"
1126057941-NameJp = "ホワイト石造植木鉢"
1126057941-DescriptionJp = "新鮮な植物が美しく配置された白い石造りの植木鉢。エレガントな雰囲気と爽やかさを同時に感じることができる。"
2236454775-NameJp = "クラシックライトテーブル"
2236454775-DescriptionJp = "ほのかな光が印象的なクラシックなテーブル。置く場所ごとに爽やかな雰囲気を演出してくれる。"
458694634-NameJp = "グランド壁飾り"
458694634-DescriptionJp = "クラシックなデザインが印象的な壁飾り。味気のない壁に威厳を与えるアルバムがポイント！"
4061847588-NameJp = "ゲヘナ式アルバム"
4061847588-DescriptionJp = "華やかなフレームに飾られたアルバム。優雅なパーティーに欠かせない重要なアイテムだ。"
1001007068-NameJp = "名作本棚"
1001007068-DescriptionJp = "エレガントなパーティー会場を彩る本棚。ゲヘナ生徒のおすすめ名作で構成されている。"
1250369711-NameJp = "バロック式カーペット"
1250369711-DescriptionJp = "華やかな装飾が特徴的なバロック式のカーペット。床を美しく飾ってくれる。"
268835141-NameJp = "クラシック2段カート"
268835141-DescriptionJp = "昼食のティータイムにも、夜のパーティーにも合うクラシックな2段カート。常に清潔な状態で貴賓たちを待つ。"
4265579804-NameJp = "グランドシャンデリア"
4265579804-DescriptionJp = "吊るせばそのまま宴会場。美しいデザインを誇るグランドシャンデリア。"
3772367627-NameJp = "フローラ噴水台"
3772367627-DescriptionJp = "華やかな花の香りが漂う噴水。涼しげな香りが漂う。"
2266941929-NameJp = "クラシックソファ"
2266941929-DescriptionJp = "威厳と優雅さが同時に感じられるソファ。柔らかいクッションに身を預ければ、パーティーの疲れを癒すことができる。"
293775718-NameJp = "バイオレット多人数用ソファ"
293775718-DescriptionJp = "華やかな花と金色の装飾が印象的な多人数用ソファ。座っていると、パーティーの新しい人たちに出会える。"
1676310944-NameJp = "フローラ午餐セット"
1676310944-DescriptionJp = "紫色の花瓶と優雅なデザインの椅子が印象的な午餐セット。来賓と楽しい会話を交わすことができる。"
2629185716-NameJp = "バイオレットガーデン花瓶"
2629185716-DescriptionJp = "下部の浮き彫りが目を引くガーデン花瓶。パーティーの雰囲気をより一層豊かにしてくれる。"
991925900-NameJp = "ホワイトガーデン花瓶"
991925900-DescriptionJp = "高くそびえる姿が印象的なガーデン花瓶。空間を仕切る柱としても最適。"
163371450-NameJp = "壁掛けクラシックキャンドル"
163371450-DescriptionJp = "ほのかな灯りが欲しい空間によく似合う壁掛けクラシックキャンドル。居心地の良い雰囲気を演出したいときにおすすめ。"
68751525-NameJp = "クラシックウィンドウ"
68751525-DescriptionJp = "パーティー会場の一角を飾るウィンドウ。飾られたカーテンを下ろすと、美しい景色が広がる。"
2293067181-NameJp = "グランドタイル"
2293067181-DescriptionJp = "パーティー会場の美しい床を彩るタイル。"
1491893469-NameJp = "グランド壁紙"
1491893469-DescriptionJp = "パーティー会場に爽やかさを足してくれる壁紙。"
3358347867-NameJp = "クラシック背景"
3358347867-DescriptionJp = "パーティー会場の雰囲気をさらに豊かにしてくれるクラシックな背景。"
870330457-NameJp = "グランドバルコニー"
870330457-DescriptionJp = "静かなパーティーを楽しむのに最適なバルコニー。屋外の景色を眺めながら飲むドリンクは格別。"
3765659014-NameJp = "グランドデスク"
3765659014-DescriptionJp = "威厳と美しさが際立つデスク。"
1871628685-NameJp = "グランド噴水台"
1871628685-DescriptionJp = "華やかな宴会を彩る噴水。広がる波長を見ていると心が落ち着く。"
1685405800-NameJp = "バイオレットパーティーテーブルセット"
1685405800-DescriptionJp = "置いたキャンドルの華やかさに合う甘いスイーツが楽しめるパーティーテーブルセット。"
1156027092-NameJp = "グランドパーティーテーブル"
1156027092-DescriptionJp = "食欲をそそる料理と甘いフルーツが盛りだくさんのパーティーテーブル。"
552473441-NameJp = "グランドピアノ"
552473441-DescriptionJp = "高級感が漂うグランドピアノ。華やかなパーティーの締めくくりに美しい旋律を奏でる。"
1770195774-NameJp = "クラシックソファテーブルセット"
1770195774-DescriptionJp = "ゆっくりと会話を続けられるソファテーブルセット。優雅な雰囲気の中で話が盛り上がる。"
2633292506-NameJp = "モモフレンズのカフェシリーズ"
2633292506-DescriptionJp = "コーヒーやデザートが楽しめるモモフレンズのカフェシリーズ。疲れたらのんびりと座って、モモフレンズたちと休憩しましょう。"
2130797913-NameJp = "ゼリーズゲーセンシリーズ"
2130797913-DescriptionJp = "ゼリーズのゲーセンをコンセプトにした、個性豊かでレトロ風な家具シリーズ。レトロゲームから最新のゲームまで、思う存分プレイしよう！"
2700178132-NameJp = "バレンタインシリーズ"
2700178132-DescriptionJp = "スイーツでいっぱいのバレンタイン家具シリーズ。胸がときめくロマンチックな一日になりますように！"
1112765859-NameJp = "サマーリゾートシリーズ"
1112765859-DescriptionJp = "夏を楽しむためのリゾートセット。涼しくて甘酸っぱい、二度と来ないお祭りのようなこの夏を、お友達と楽しもう！"
2295911688-NameJp = "ハロウィーンカフェシリーズ"
2295911688-DescriptionJp = "何か不思議な出来事が起きそうな、パンプキン要素たっぷりのハロウィーンカフェセット。ちょっと不気味なハロウィーンを楽しもう！"
2218356853-NameJp = "伝統的な温泉郷シリーズ"
2218356853-DescriptionJp = "寒い冬でも暖かく過ごせる伝統的な温泉郷シリーズ。しっかり身体を温めて、ゆっくり休みましょう！"
1880396630-NameJp = "お正月シリーズ"
1880396630-DescriptionJp = "楽しいお正月が過ごせるお正月シリーズ。お友達や大切な方と一緒に、幸せな新年を迎えましょう！"
660700768-NameJp = "ミリタリーアウトドアシリーズ"
660700768-DescriptionJp = "実用性にあふれるミリタリーアウトドアシリーズ。暖かさがありつつも、緊張感が日々の生活を引き締めてくれる。"
1334657209-NameJp = "ビーチサイドシリーズ"
1334657209-DescriptionJp = "涼しげな海が広がるビーチサイド。さっぱりとしたフルーツとアイスクリームで夏を満喫してください！"
3711274552-NameJp = "大運動会シリーズ"
3711274552-DescriptionJp = "競技の熱気と活力が感じられる大運動会。友達と一緒に楽しみましょう！"
4141233484-NameJp = "アビドス教室シリーズ"
4141233484-DescriptionJp = "生徒たちとの楽しくワクワクする時間がたっぷり詰まったアビドス教室シリーズ。生徒たちと思い出作りしましょう！"
1464352390-NameJp = "ゲーム開発部シリーズ"
1464352390-DescriptionJp = "情熱と努力の時間に満ちたゲーム開発部の部室シリーズ。面白いゲームを一緒に作ってみよう！"
1586097976-NameJp = "サンシャインリゾートシリーズ"
1586097976-DescriptionJp = "日差しいっぱい！リラックスして爽やかなサンシャインリゾートシリーズ。甘いデザートと花の香りを満喫してください！"
3493255660-NameJp = "デパートシリーズ"
3493255660-DescriptionJp = "エレガントなブランド品から可愛らしい小物、子供の遊び場まで！すべてを楽しめるデパートに是非お越しください！"
2112684025-NameJp = "ゲヘナパーティーシリーズ"
2112684025-DescriptionJp = "ゲヘナ学園の威厳と優雅さを一目で感じられるロマンあふれるパーティーにあなたを招待します。"
505605553-NameJp = "トリニティ教室シリーズ"
505605553-DescriptionJp = "優雅さと高級感、実用性まで追求したトリニティ教室の姿を紹介します！"
2411322223-NameJp = "DJパーティー会場シリーズ"
2411322223-DescriptionJp = "楽しい音楽に身を任せよう！海辺で繰り広げられるDJパーティーへようこそ！"
