2814968857-NameJp = "Pontos de Recollect"
2814968857-DescriptionJp = "Você pode obter \"Pontos de Recollect\" a cada recrutamento realizado. Ao acumular \"Pontos de Recollect\", você pode convocar e recrutar diretamente as alunas disponíveis na lista.\n※Quando o período de destaque terminar, os Pontos de Recollect serão convertidos em Fragmentos de Keystone.\n[c][ff2d2c]Diferente dos Pontos de Convocação e Pontos de Arquivo existentes, os Pontos de Recollect não são acumulados a partir de outros recrutamentos.[-][/c]"
3560225627-NameJp = "Receita de Lámen nº 44"
