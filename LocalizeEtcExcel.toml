3805212638-NameJp = "Estaca de Superliga"
3805212638-DescriptionJp = "Uma estaca robusta usada para prender lonas e barracas. Feita com uma superliga projetada pela Millennium, é resistente à ferrugem e difícil de quebrar."
743230010-NameJp = "Corda Multiuso"
743230010-DescriptionJp = "Uma corda elástica que tem várias utilidades em atividades ao ar livre. Por ser feita com um material novo desenvolvido pela Millennium, é forte o suficiente para amarrar um tanque."
2873068026-NameJp = "Curry em Pó S&D"
2873068026-DescriptionJp = "Um pó de curry vendido pela S&D, famosa por sua distribuição de especiarias. O sabor picante único harmoniza bem com pratos além do curry."
1685517367-NameJp = "Pacote Sacola da Sorte de Ano Novo"
1685517367-DescriptionJp = "Um produto que inclui itens que garantem o recrutamento de uma aluna ★3 e itens para ajudar no crescimento delas.\n※ Consulte os detalhes do pacote nas informações do produto abaixo."
1664341587-NameJp = "Curry de Cor Estranha"
1664341587-DescriptionJp = "Um curry não identificado com uma cor estranha.\nTem um cheiro pungente que arde no nariz, como um produto químico.\nAté o arroz que o acompanha está queimado e tem um sabor amargo."
408873372-NameJp = "Curry de Cabeça de Peixe"
408873372-DescriptionJp = "Um curry que tentaram dar um sabor mais forte usando cabeças de peixe que sobraram.\nA ideia era boa, mas o prato pegou um cheiro estranho de peixe.\nÉ o tipo de curry que faz quem come torcer o nariz."
3557467288-NameJp = "Curry Simples de Legumes"
3557467288-DescriptionJp = "Um curry simples de legumes feito apenas com abóbora, batata e cenoura.\nNão é chique, mas a doçura dos legumes combina bem com o prato.\nO arroz branco que o acompanha também está bem cozido."
817877395-NameJp = "Curry de Creme com Camarão"
817877395-DescriptionJp = "Um curry cremoso coberto com camarões grandes.\nO sabor suave do camarão se mistura perfeitamente com o creme do curry.\nAs especiarias quebram a oleosidade, então você não vai enjoar rápido."
2465534331-NameJp = "Curry com Contrafilé"
2465534331-DescriptionJp = "Um curry luxuoso coberto com o melhor contrafilé.\nA textura de cogumelos grelhados e cebolinha realça o sabor.\nO arroz de alho refogado na manteiga é uma delícia por si só."
1420130790-NameJp = "Bilhete de Recrutamento Garantido ★3"
1420130790-DescriptionJp = "Um bilhete de recrutamento 10x que garante pelo menos uma aluna ★3. ※ Se não for usado antes do início da manutenção de 24 de janeiro de 2024, ele desaparecerá."
