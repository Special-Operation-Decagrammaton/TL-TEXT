1770235474-DescriptionJp = "アンティキティラ装置の壊れた部品。製造や強化に使用される。"
2335488326-NameJp = "壊れたアンティキティラ装置"
2335488326-DescriptionJp = "元の形が分からないほど壊れたアンティキティラ装置。製造や強化に使用される。"
1872991591-NameJp = "摩耗したアンティキティラ装置"
1872991591-DescriptionJp = "壊れて正常に作動しないアンティキティラ装置。製造や強化に使用される。"
2649485585-NameJp = "完全なアンティキティラ装置"
2649485585-DescriptionJp = "完全な状態のアンティキティラ装置。製造や強化に使用される。"
1066886482-NameJp = "断片的なヴォイニッチ手稿のコピー"
1066886482-DescriptionJp = "本体から千切られたヴォイニッチ手稿の断片のコピー。製造や強化に使用される。"
4122424050-NameJp = "スイートチョコポテトチップス"
4122424050-DescriptionJp = "片面にチョコレートがコーティングされたポテトチップス。サクサクとした食感にチョコレートの甘さが加わったが、モモカの好みではなさそうだ。"
2341679944-NameJp = "エンジェルチョコレート"
2341679944-DescriptionJp = "「エンジェル24」プライベートブランドのチョコレート。ソラがミスで大量発注した、その最後の一つ。"
2435557875-NameJp = "お徳用チョコレートパック"
2435557875-DescriptionJp = "連邦生徒会に置かれているお徳用のミニチョコレート。リンも仕事中にたまに食べるらしい。"
2724075845-NameJp = "アロナのチョコジンジャークッキー"
2724075845-DescriptionJp = "アロナが一生懸命作ったチョコジンジャークッキー。先生とアロナの姿が可愛らしく再現されている。"
1567224539-NameJp = "バレンタインペロロ"
1567224539-DescriptionJp = "バレンタインデーを記念して発売されたペロロ形のチョコレート。マニアの間でも話題になったその限定商品を、当然ヒフミは見逃さなかった。"
984677767-NameJp = "レーションD型"
984677767-DescriptionJp = "オーツ麦とココアパウダーを混ぜた軍用チョコレート。正義のためならばその圧倒的なカロリーもマシロは恐れない。"
1666908815-NameJp = "ハッピーホットチョコレート"
1666908815-DescriptionJp = "ハナエが作ってくれた、温かいホットチョコレート。一口飲むと疲れが取れると同時に、幸せな気分が溢れてくる。"
3922278991-NameJp = "ショコラ・デ・ゲヘナ"
3922278991-DescriptionJp = "高カロリー・高カフェインのゲヘナ製ダークチョコレート。実はイオリも靴墨と取り違えたことがある。"
342988654-NameJp = "大量の板チョコレート"
342988654-DescriptionJp = "アカリがチョコレート大食い大会に備えるために買ってきた大量の板チョコレート。普通の人は見ただけで満腹になりそう。"
741491105-NameJp = "チョコ団子"
741491105-DescriptionJp = "和菓子屋で売られていたチョコレート味のお団子。意外な取り合わせだが、ジュンコの舌にかなう美味しさ。"
2503165795-NameJp = "デス·ラブ"
2503165795-DescriptionJp = "カヨコの好きな音楽グループ、ブラック·デス·ポイズンのバレンタイン限定シングルを購入するとおまけでもらえるギフト。この見た目だが、味は柔らかくて甘い。"
3659929614-NameJp = "ライダーの間食"
3659929614-DescriptionJp = "シロコがライディング用に常備しているエナジーバー。ナッツが練りこまれており、一口かじればすぐに元気が体の隅々までいきわたる。"
3042768744-NameJp = "海のお友達"
3042768744-DescriptionJp = "海洋博物館で売られているチョコレートセットの中のクジラ。クジラの巨大さをホシノは気に入っているが、このクジラは手のひらサイズ。"
1510394578-NameJp = "砂漠のバラ"
1510394578-DescriptionJp = "アビドスの駅前で売られているバラ模様のチョコレート。砂漠のバラをモチーフにしたチョコレートで、贈り物として人気が高い。"
2394567841-NameJp = "ヴィーナスのチョコレート"
2394567841-DescriptionJp = "学生向けとは思えない大胆な形のチョコレート。学生で買うのはエイミくらいかもしれない。"
367299249-NameJp = "盗聴装置14号"
367299249-DescriptionJp = "コタマが作った盗聴器が乗ったチョコレート。隠す気配は全く無いようだ。"
919440775-NameJp = "缶のホットココア"
919440775-DescriptionJp = "主に自動販売機で販売されているチョコレートドリンクの缶。この甘さが深夜のチヒロを何度も癒してきた。"
3490934017-NameJp = "パヴェ・チョコレート（領収書付き）"
3490934017-DescriptionJp = "ユウカが先生のために購入した贈答用チョコレートセット。5000円の領収書が貼られているのだから、5000円のチョコで間違いない。"
419901229-NameJp = "勇者のチョコレート（アイテム）"
419901229-DescriptionJp = "ユズがゲーム内でプレゼントしてくれた期間限定のアイテム。使用するとキャラクターの体力とプレイヤーの心を回復してくれる。"
3659962553-NameJp = "手作りチョコスネイル"
3659962553-DescriptionJp = "アリスがゲーム内のモンスター「スネイル」をモチーフにして手作りしたチョコ。遠めに見ればスネイルに見えないこともない。"
941224173-NameJp = "妖怪MAXチョコレート味"
941224173-DescriptionJp = "バレンタインシーズンを記念して発売されたチョコ味の妖怪MAX。意識が覚醒することはともかく、普通の妖怪MAXより美味しいかどうかを決めるにはハレとの議論が必要。"
1781832965-NameJp = "チョコ味のスプレー"
1781832965-DescriptionJp = "インクの代わりにチョコレートを噴射するスプレー。マキによると、世の中を甘くするのに使えるらしい。"
4075915701-NameJp = "チョコレート砲弾Mk.2"
4075915701-DescriptionJp = "ヒビキがバレンタインデーイベントの行事用に開発したチョコレート砲弾。威力が高すぎてイベントでは使用できなかった。"
2579538323-NameJp = "チョコレートネジ"
2579538323-DescriptionJp = "銀紙で包装されたネジ型チョコレート。ウタハですら一目で見抜けないほど完璧な造形だが、工具としては使用できない。"
3469911388-NameJp = "チェリョンカ"
3469911388-DescriptionJp = "レッドウィンターの給食部で生産している、レッドウィンター連邦学園特製のミルクチョコレート。チェリノがすでに一口味わったもの。"
1188251464-NameJp = "改良型チェリョンカ"
1188251464-DescriptionJp = "トモエ描き下ろしの可愛いイラストが入った、改良型チェリョンカ。味は従来のチェリョンカとほとんど変わらない。"
3845682331-NameJp = "カカオの実"
3845682331-DescriptionJp = "先生にチョコレートをプレゼントしたかったノドカがやっと手に入れたカカオの実。甘くはないが、加工してお茶のように沸かして飲むと良い風味が出る。"
410737829-NameJp = "不老不死の霊薬(失敗作)"
410737829-DescriptionJp = "サヤがチョコレートをベースに作った新しい霊薬。味も効果も従来のチョコと変わらないので、ただのチョコと言って良いのかもしれない。"
1298182383-NameJp = "大人のラムボンボン"
1298182383-DescriptionJp = "ラム入りの濃厚な香りのボンボンチョコレート。学生が食べるには少し早い味。もちろんシュンにとっても。"
125955518-NameJp = "チョコレート手錠"
125955518-DescriptionJp = "手錠の形をしたチョコレート。実際に手錠として使おうとしたキリノの発想は、メーカーとしても予想外だった。"
1951960570-NameJp = "特製チョコクルーラー"
1951960570-DescriptionJp = "マスタードーナッツにてバレンタインシーズン限定で発売される、スプリンクルがかかった特製のチョコクルーラー。フブキにとってバレンタインとはこれを食べられる日という意味。"
711391590-NameJp = "チョコ埴輪"
711391590-DescriptionJp = "ハナコが用意した埴輪形のチョコレート。どこから見ても視線が合う気がする。"
4101876-NameJp = "リトル·ブレット"
4101876-DescriptionJp = "ハスミがくれた狙撃小銃の弾丸型のチョコレート。小さいが、その甘さは胸を打ち抜く。"
2407160249-NameJp = "ヒナの手作りチョコレート"
2407160249-DescriptionJp = "ヒナの手作りチョコレート。見た目は整っていないが、ふり絞られた勇気は何よりも美しい。"
1422578612-NameJp = "あなたのための一口の休息"
1422578612-DescriptionJp = "アコが厳選した材料を使用した自家製チョコレート。一見して手作りとはわからない完璧な出来栄えで、仕事中でも食べやすいその味とサイズは、アコの有能さや気遣いの表れでもある。"
87498756-NameJp = "すごく！おいしい！！チョコレート！！！"
87498756-DescriptionJp = "イズミが思う最高の材料をたくさん使って作った、イズミの手作りチョコレート。しょっぱくて香ばしい味がポイント。"
1899678676-NameJp = "社長の最高級チョコレート"
1899678676-DescriptionJp = "アルが日頃の協力への感謝としてくれたチョコレート。大事なのは買った値段ではなく、誰がどんな気持ちでくれたかである。"
171489856-NameJp = "地獄のロシアンルーレット"
171489856-DescriptionJp = "当たってしまえば地獄を見るかもしれない、いたずら用のロシアンルーレットチョコレート。ムツキのブックマークにはこうした商品が大量に保存されている。"
2099851060-NameJp = "ココアが入ったマグカップ"
2099851060-DescriptionJp = "フウカが先生のために入れてくれたココア。先生の健康を気遣う心のおかげか、実際の味以上に甘く温かい。"
1852286999-NameJp = "ジュリの手作りチョコレート"
1852286999-DescriptionJp = "ジュリが全力を尽くした手作りチョコレート。食べたはずなのだが味は分からない。分からなくていいのかもしれない。その真心だけは伝わったのだから。"
1269992298-NameJp = "共にする時間"
1269992298-DescriptionJp = "セリカがバイト先でもらった最高級チョコレートケーキ。労働の苦労と喜びが、何よりも味を引き立ててくれる。"
265930468-NameJp = "おやつ担当のお仕事"
265930468-DescriptionJp = "アビドスのおやつ担当であるノノミが用意したチョコレートセット。先生や個性的な対策委員会メンバーのだれもが楽しめるよう、あらゆる種類のチョコが詰まっている。"
689413464-NameJp = "選りすぐりの一品"
689413464-DescriptionJp = "スミレが実際に試食し、100種類以上の中から選び抜いた最高の栄養食品。これだけで一日動けるほどの大量のカロリーを素早く摂れるが、当然その後は相応の運動が必要になる。"
3328209817-NameJp = "カシオペアの拳～ウーパールーパー大列伝～"
3328209817-DescriptionJp = "モモイがクレーンゲーム機で獲得した食玩チョコレート。人気格闘ゲーム『カシオペアの拳~ウーパールーパー大列伝~』のマスコットキャラクターのおもちゃが同梱されている。全7種類。"
3385816833-NameJp = "ミドリの手作りチョコレート"
3385816833-DescriptionJp = "たくさんの練習。手探りの試行錯誤。失敗と再挑戦、そして早起き。彼女がゲームと絵以外のことでこういった努力をするのは、初めてのことかもしれない。"
3589704604-NameJp = "四字熟語チョコ煎餅"
3589704604-DescriptionJp = "様々な四字熟語が盛り込まれているチョコレート菓子。まじめな四字熟語の中に時折変な言葉が混じっているあたりが、チセのお気に入りのようだ。"
3842989732-NameJp = "百夜堂の限定スイーツ"
3842989732-DescriptionJp = "百夜堂でバレンタインにのみ販売される特別なスイーツ。告知もされず、メニューにも載っておらず、誰に売るものなのかをシズコは教えてくれない。"
3251730635-NameJp = "特製忍者グッズ49番「チョコレートセット」"
3251730635-DescriptionJp = "各種忍者道具がいっぱい入った夢の忍者チョコレートセット。主殿と味わいたいがために、イズナが朝早くから並んで手に入れた一品。実際に使用することはできないので要注意。"
4247091559-NameJp = "安眠チョコレートと安眠グッズセット"
4247091559-DescriptionJp = "いつも過労気味の先生のためにツバキが用意してくれた安眠グッズ一式。より眠りやすい枕が欲しくなった時にはツバキを呼ぼう。普通に買うと合計3,980円。"
2771361458-NameJp = "ワカモの愛がこもったチョコレート"
2771361458-DescriptionJp = "ワカモが溢れる熱い思いをいっぱい込めて作ったチョコレート。ただし込められているのが本当に愛情だけなのかは定かでない。"
1572630441-NameJp = "美食の証明（抹茶味）"
1572630441-DescriptionJp = "ハルナが美食の研究の一環で作った抹茶チョコレート。噛みしめると、深い苦みの中から甘さが滲み出てくる。"
3743008500-NameJp = "バレンタインの聖者スカルマン"
3743008500-DescriptionJp = "アズサが用意した『死の死神スカルマン』のチョコレートバージョン。食べてしまえば骨も残らないが、込められた思いはきっと残る。"
1084418779-NameJp = "ラブリー·クロスライン"
1084418779-DescriptionJp = "コハルが持ってきた有名なチョコレート。ホワイトチョコとダークチョコが混ざっており、黒の十字模様がとても魅力的。"
2742248602-NameJp = "トゥインクルスター"
2742248602-DescriptionJp = "スズミがコンビニで買ってくれた星型のチョコレート。包みを開くと金箔がかけられており、キラキラと静かに輝きを放つ。"
663608497-NameJp = "ホーリー・チョコレート"
663608497-DescriptionJp = "マリーがプレゼントしてくれたチョコレート。シスターフッドのお土産として人気で、最初から食用ではなく展示用だったのかもしれない。"
848260985-NameJp = "本のお友"
848260985-DescriptionJp = "手が汚れない特殊なコーティングが施されたチョコレート。シミコをはじめ読書家の間で人気が高い。"
1900401189-NameJp = "ビー·ウィズ·ユー"
1900401189-DescriptionJp = "セリナが作ってくれた手作りチョコレート。その甘い味わいは心までほっとさせてくれる。"
4183660781-NameJp = "ペニーロイヤルチョコミント"
4183660781-DescriptionJp = "アイリが用意した特別なチョコミント。マニアの間では大人気かつ特別なものらしいが、どれくらいどのように特別なのかを理解するには、アイリに説明をしてもらう必要がありそうだ。"
1868703267-NameJp = "ヨシミの限定チョコレート"
1868703267-DescriptionJp = "ヨシミの手作りチョコレート。幾つかの意味で、他では見られない貴重な限定モノ。"
355355427-NameJp = "言葉よりチョコレート"
355355427-DescriptionJp = "ナツの手作りと予想されるチョコレート。ナツの雄弁な言葉の代わりにしてはシンプルで、だからこそ美しさが感じられるデザインになっている。"
2098665142-NameJp = "フォーチュンチョコレート（自作）"
2098665142-DescriptionJp = "チナツが準備してきたチョコレート。どれを選んでも同じになるなら、それは運命と呼んでも良いかもしれない。"
3487183095-NameJp = "バンデージチョコ"
3487183095-DescriptionJp = "セナが勤務中に作った食べ物。包装紙が見つからずに包帯が巻かれているが、人体に問題はないとお墨付きだし、仮に倒れてもきっとセナが看病してくれる。"
3066393242-NameJp = "カカオ99.99%"
3066393242-DescriptionJp = "先生のためにハルカが準備したチョコレート。99.99という数字を見て「とりあえず凄そう」と感じたら便利屋68に向いているのかもしれない。"
3579363383-NameJp = "ツイステッドバレンタイン"
3579363383-DescriptionJp = "ご主人様のためにアスナが準備してきたチョコレート。保管と運搬の際にちょっとした変形が起きてしまった。"
304962670-NameJp = "メイド·バイ"
304962670-DescriptionJp = "アカネの手作りチョコレート。特別なところのない、単なる生徒から先生への贈り物……のように見えてメイドとしての優れた手腕が隠しきれていない。"
1933815846-NameJp = "チョコオムライス"
1933815846-DescriptionJp = "バレンタインデーを迎え、カリンが用意したオムライス。ケチャップの代わりにチョコレートでハートが描かれている、オムライス本来の味とチョコの甘みが調和した素晴らしい品。"
1957428602-NameJp = "チョコレート版画：竜"
1957428602-DescriptionJp = "ネルがどこかから持ってきた、チョコレートでできている竜の模様の版画。見た目が強いので味もすごいはずだ、とネルは思っている。"
1255509912-NameJp = "バレンタイン·ビギニング"
1255509912-DescriptionJp = "バレンタインの起源や意義を説明するためにコトリが作ったチョコレート。一口かじれば連綿と紡がれてきた歴史が口にあふれる。"
1303875154-NameJp = "甘い杯"
1303875154-DescriptionJp = "フィーナが持ってきた杯型のチョコレート。長く持っていると溶けてしまうので、素早く味わうのが作法である。"
1082089594-NameJp = "アマンド·クリムゾン"
1082089594-DescriptionJp = "ツルギが残したアーモンドチョコレート。可愛らしい赤いリボンが結ばれており、おそらくお店側で付けたリボンではない。"
3411154794-NameJp = "不器用な手作りチョコレート"
3411154794-DescriptionJp = "ココナが不器用ながら丁寧にラッピングした手作りチョコレート。本人は頑なに市販品だと主張しており、彼女から「絶対に一人で食べてください！」と念押しされた。"
421170184-NameJp = "小さなショコラ"
421170184-DescriptionJp = "ヒナタが聖堂を訪れた子どもたちに配っているショコラ。それぞれの好みに合わせられるよう、全ての味を食べ比べたらしい。"
412848971-NameJp = "しっとりめのチョコクッキー"
412848971-DescriptionJp = "ウイが用意してくれたチョコクッキー。粉が落ちにくいように、しっとりとしている物を選んだという。"
1622643101-NameJp = "苺のチョコケーキ"
1622643101-DescriptionJp = "カズサが買ってきてくれた苺のチョコケーキ。どうやら、ショーケースの前でかなり悩んでいたんだとか。"
2747826200-NameJp = "オール・トゥ・ユー"
2747826200-DescriptionJp = "ヒヨリがある意味では「すべて」と引き換えに用意してくれたチョコレート。小さな袋の中には、彼女の気持ちがたくさん込められている。"
2837160480-NameJp = "丁寧なラッピング済みチョコレート"
2837160480-DescriptionJp = "ミサキが用意したチョコレート。2色のリボンが使われた繊細なラッピングは、彼女の隠れた一面を表しているようにも見える。"
4062180493-NameJp = "青いバラとチョコレート"
4062180493-DescriptionJp = "秘密の多いお姫様がくれた、手作りのチョコレート。添えられた一輪の花は、アツコが努力した証でもある。"
3932209420-NameJp = "ギディバのチョコレート"
3932209420-DescriptionJp = "サオリが準備した最高級のチョコレート。その過程は複雑で、簡単なものではないが、そこには多くの価値があるはず。"
2263489181-NameJp = "桜チョコレート"
2263489181-DescriptionJp = "桜の形をしたミモリの手作りチョコレート。読心術は使えなくても、ひとつ食べると彼女の気持ちが伝わってくる。"
170445747-NameJp = "最強のチョコサウルス"
170445747-DescriptionJp = "カエデが作った最強のチョコサウルス。失敗した恐竜発掘チョコレートの欠片を組み合わせるという、逆転の発想から作られた。見て楽しい食べて嬉しいそんなチョコレートには、彼女らしさが強く表れている。"
566203770-NameJp = "とろけるロップイヤーチョコ"
566203770-DescriptionJp = "ツクヨお手製の可愛いロップイヤーチョコレート。大切に扱っていたあまり、少しだけ溶けてしまっている。"
2104744538-NameJp = "超天才清楚系病弱美少女ハッカー'sチョコレート"
2104744538-DescriptionJp = "ヒマリが自分自身の姿をデフォルメして作った、手作りのチョコレート。突発的ではありつつも論理的な判断と合理的な帰結により、シャーレに戻ってから味わうことになった。"
3304317128-NameJp = "イロハの手作りスティックチョコ"
3304317128-DescriptionJp = "イロハとの買い物帰りに貰った、手作りのスティック型チョコレート。一本だけ「跡」が残っている。"
902334212-NameJp = "忍術研究部のバッジ型チョコレート"
902334212-DescriptionJp = "ミチルが用意してくれた、オーダーメイドのチョコレート。忍術研究部の仲間を大切に思う気持ちが込められている。その慌ただしい過程もまた、味の一つかもしれない。"
813659355-NameJp = "チョコを用いたキャロットケーキ"
813659355-DescriptionJp = "ミヤコがチョコレートを使って作ったキャロットケーキ。甘いものはウサギにとって良くないかもしれないが、仲間や先生にとっては喜ばしいものになり得る。"
490342082-NameJp = "チョコレートスモア"
490342082-DescriptionJp = "モエが作ったチョコレートスモア。甘いマシュマロの上にチョコレートを載せたもので、そのカロリーはまさに破滅的。"
1288390774-NameJp = "補給品のチョコレートキャラメル"
1288390774-DescriptionJp = "サキが用意してくれたチョコレートキャラメル。夜間の見張りを行う哨兵たちが、眠気覚ましに食べる一品である。サキ本人曰く、特にバレンタインデーとは関係の無いプレゼントだとのこと。"
1222376462-NameJp = "チョコレートバーク"
1222376462-DescriptionJp = "ミユが手作りしたチョコレートバーク。補給品のチョコレートと、採取した果物から作ったらしい。ひとかけらずつ大事に食べよう。"
4196510691-NameJp = "チョコレートインク"
4196510691-DescriptionJp = "ノアの甘い悪戯心が込められたチョコレート。ペン先に馴染まないため、文字を書くのには向かないが、心からの気持ちを伝えたい時には最適なインクである。"
70201916-NameJp = "特別功労勲章チョコレート"
70201916-DescriptionJp = "マリナがチェリョンカの目標生産量を達成し、褒美としてチェリノから受け取った勲章。原材料がチョコレートのため食べたら無くなってしまうが、その努力と名誉はいつまでも記憶に残るはず。"
967689799-NameJp = "シグレ・ビタースペシャル"
967689799-DescriptionJp = "シグレが作ってくれたノンアルコールのチョコレートカクテル。ほど良い甘さとサッパリした後味の秘密は、ひと欠片のビターチョコレートだとか。"
3442222452-NameJp = "ヒヨコ型のチョコレート"
3442222452-DescriptionJp = "バレンタインにミネがくれた、可愛らしいチョコレート。あくまでも医療品らしいが、高級感もあり綺麗な包装に包まれている。"
18239407-NameJp = "ドライグレープフルーツのチョコがけ"
18239407-DescriptionJp = "アユムが普段から食べている、身体に良さそうなおやつ。乾燥させたグレープフルーツに、チョコレートがコーティングがされており、疲労回復についてはともかく味はとても美味しい。"
4263181528-NameJp = "傷んだヴォイニッチ手稿のコピー"
