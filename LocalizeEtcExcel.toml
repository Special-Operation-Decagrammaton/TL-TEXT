2467071271-DescriptionJp = "Uma mesa coberta com uma toalha de aparência limpa. Não há problema se derramar algo, mas as manchas ficam visíveis, então cuidado..."
1829879645-NameJp = "Mesa de Chá Pequena"
1829879645-DescriptionJp = "Uma mesa de chá pequena e simples para uma pessoa. Às vezes, é bom relaxar um pouco."
3761215951-NameJp = "Carrinho de Chá para a Hora do Chá"
3761215951-DescriptionJp = "Um carrinho de chá equipado com utensílios e doces. Tenha uma hora do chá elegante, a qualquer hora e em qualquer lugar."
2783808256-NameJp = "Luminária de Chão"
2783808256-DescriptionJp = "Uma lâmpada clássica que emite uma luz quente. Suave para os olhos, perfeita para leitura."
1681173970-NameJp = "Mesa de Apoio para Escrita"
1681173970-DescriptionJp = "Uma mesa de apoio com suporte para leitura. Frequentemente usada em locais públicos."
344479674-NameJp = "Carrinho de Livros Clássico"
344479674-DescriptionJp = "Um carrinho para transportar livros. Em Trinity, que prefere livros físicos a e-books, os bibliotecários correm de um lado para o outro empurrando isso."
766960606-NameJp = "Relógio de Parede Flor-de-Lis"
766960606-DescriptionJp = "Um relógio de parede que imita a flor-de-lis. Precisa ser dado corda periodicamente."
1994333090-NameJp = "Cerca de Madeira Estilo Trinity"
1994333090-DescriptionJp = "Uma cerca de madeira elegante e organizada. A estética que emana de seu design contido parece até luxuosa."
1889524945-NameJp = "Moldura de Parede Grande do Chá das Cinco"
1889524945-DescriptionJp = "Uma moldura contendo uma pintura feita com técnicas impressionistas. Uma obra de arte cuja intenção do autor não é fácil de ler."
746719294-NameJp = "Moldura de Parede Pequena do Chá das Cinco"
746719294-DescriptionJp = "Uma moldura de parede contendo uma pintura artística estética. Impressiona pela ideia ousada e pelas pinceladas rudes que a acompanham."
2670847271-NameJp = "Estátua de Gesso Surrealista"
2670847271-DescriptionJp = "Um objeto que transcende o senso comum. Sua criatividade ousada desafia a arte moderna."
1363506225-NameJp = "Lâmpada com Padrão Floral de Latão"
1363506225-DescriptionJp = "Uma lâmpada com um padrão floral clássico. Em Trinity, não se economiza nos detalhes, nem mesmo em uma lâmpada."
2071964902-NameJp = "Sofá para Várias Pessoas de Trinity"
2071964902-DescriptionJp = "Um sofá para várias pessoas feito de tecido de alta qualidade. Foca na perfeição da forma, sendo um pouco firme ao sentar."
408630369-NameJp = "Mesa de chá para convidados"
408630369-DescriptionJp = "Uma mesa simples, porém elegante. O aroma do chá torna a conversa ainda mais agradável."
1519664668-NameJp = "Mesa de xadrez"
1519664668-DescriptionJp = "Uma mesa equipada com um tabuleiro de xadrez. O simples fato de sentar nela faz você parecer mais inteligente."
949584604-NameJp = "Mesa de xadrez caída"
949584604-DescriptionJp = "Uma mesa que tombou, espalhando as peças de xadrez pelo chão. Alguém precisa recolhê-las."
3520494384-NameJp = "Mesa de jantar com bolo inteiro"
3520494384-DescriptionJp = "Uma mesa com um bolo inteiro luxuoso. Para dias especiais, ou para dias que você deseja tornar especiais."
650862141-NameJp = "Mesa de chá dourada da tarde"
650862141-DescriptionJp = "Uma mesa de chá com vários doces e chás. Vamos fazer uma pausa e ter uma conversa agradável."
2194319883-NameJp = "Mesa de chá do entardecer"
2194319883-DescriptionJp = "Uma mesa de chá repleta de doces. Para encerrar um dia cansativo, nada melhor que açúcar e chá."
2290878817-NameJp = "Mesa de chá matinal simples"
2290878817-DescriptionJp = "Uma mesa de chá para a manhã, com sanduíches e doces leves. Mesmo em manhãs agitadas, tome uma xícara de chá."
3645596728-NameJp = "Gramofone"
3645596728-DescriptionJp = "Um fonógrafo que reproduz discos de vinil. Possui um charme que os áudios modernos não conseguem replicar."
1321590477-NameJp = "Muro estilo Trinity"
1321590477-DescriptionJp = "Um muro sofisticado inspirado em estilos arquitetônicos antigos. A estrutura em arco transmite uma sensação de estabilidade."
