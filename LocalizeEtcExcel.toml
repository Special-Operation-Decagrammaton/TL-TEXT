1383315036-NameJp = "Caixa de Arginina"
1383315036-DescriptionJp = "Uma caixa que continha suplementos de saúde. É grande o suficiente para uma pessoa pequena caber dentro. Como é possível olhar para fora através do buraco da alça, é perfeita para infiltrações."
2125430007-NameJp = "Scanner da Rio"
2125430007-DescriptionJp = "Um equipamento de ponta que escaneia os arredores e descobre itens suspeitos. Você usa fones de ouvido para operar o detector. O mecanismo é desconhecido, mas o desempenho é garantido."
3106820832-NameJp = "Placa de Apoio Especial"
3106820832-DescriptionJp = "Uma placa de apoio especializada para ser colocada na parte de trás da cabeça do alvo para imobilização. Se você anexar isso à coronha, poderá subjugar o oponente sem fazer barulho."
4092727589-NameJp = "Joelheiras com Pintura Especial"
4092727589-DescriptionJp = "Joelheiras que permitem mover-se silenciosa e rapidamente, mesmo a partir de uma posição ajoelhada. Como não possuem funções especiais, se elas atingirão seu verdadeiro potencial depende da habilidade do usuário."
3964788977-NameJp = "Rádio de Comunicação"
3964788977-DescriptionJp = "Um rádio de alto desempenho que consegue superar a maioria dos bloqueios de sinal. Foi feito para missões de infiltração, mas como a prioridade foi o desempenho de comunicação, o aparelho é um pouco grande e pesado. Possui uma interface simples para que até mesmo quem não é estudante do Millennium possa manuseá-lo."
2775830511-NameJp = "Gerador de Ruído"
2775830511-DescriptionJp = "Um dispositivo criado para situações em que há risco de ser descoberto durante uma infiltração. Ele emite um ruído para desviar a atenção. Após o uso, certifique-se de se mover para o lado oposto e se esconder."
1728300996-NameJp = "Munição Silenciosa"
1728300996-DescriptionJp = "Balas usadas em situações onde não é possível equipar um supressor ou quando se deseja um desempenho de silenciamento maior. A bala em si quase não faz barulho, e o calor no momento do disparo e do impacto desaparece rapidamente. Embora o poder de fogo seja menor que o de uma bala padrão, parece ser a preferida em missões de infiltração."
3426576768-NameJp = "Poção de Recuperação"
3426576768-DescriptionJp = "Um remédio que remove o cansaço e cura ferimentos leves. Não tem efeito em fadiga crônica ou ferimentos graves. O cuidado diário com a saúde é importante."
282905937-NameJp = "Cortador de Arame"
282905937-DescriptionJp = "Uma ferramenta usada para desmontar ou cortar câmeras de segurança, minas terrestres, etc. O corte é excelente, mas a lâmina se desgasta rapidamente, então não pode ser usada muitas vezes. Escolha o alvo da desmontagem com cuidado."
1844419868-NameJp = "Chave de Segurança"
1844419868-DescriptionJp = "Uma chave de segurança usada para desbloquear travas. É um item valioso, então devolva ao dono após o uso. ...Claro, faça isso secretamente para não ser pego."
3949011075-NameJp = "Memória USB"
3949011075-DescriptionJp = "Uma memória USB especial que permite controlar remotamente dispositivos conectados. Antigamente, dizem que esculpiam madeira ou pedras para usar como selos, mas os tempos mudaram."
1153341951-NameJp = "OTP"
1153341951-DescriptionJp = "Um dispositivo de autenticação criado para uma segurança robusta. Mesmo que você saiba a senha, não é possível desativar a segurança sem usar este dispositivo em conjunto. Ou seja, se você tiver isso..."
