4122424050-NameJp = "Batata Frita com Chocolate"
4122424050-DescriptionJp = "Batatas fritas cobertas com chocolate em um dos lados. A crocância combinada com a doçura do chocolate é interessante, mas não parece ser do gosto da Momoka."
2341679944-NameJp = "Chocolate Angel"
2341679944-DescriptionJp = "Chocolate da marca própria da 'Angel 24'. O último de um lote que a Sora pediu por engano."
2435557875-NameJp = "Pacote de Chocolates Econômico"
2435557875-DescriptionJp = "Um pacote de mini chocolates econômicos mantido no Conselho Estudantil Federal. Dizem que a Rin também come de vez em quando durante o trabalho."
2724075845-NameJp = "Biscoito de Gengibre com Chocolate da Arona"
2724075845-DescriptionJp = "Biscoitos de gengibre com chocolate feitos com muito esforço pela Arona. As figuras do Sensei e da Arona foram recriadas de forma adorável."
1567224539-NameJp = "Peroro de Dia dos Namorados"
1567224539-DescriptionJp = "Um chocolate em formato de Peroro lançado para comemorar o Dia dos Namorados. Como era de se esperar, Hifumi não deixou passar esse item limitado que virou assunto entre os fãs."
984677767-NameJp = "Ração Tipo D"
984677767-DescriptionJp = "Chocolate militar feito com aveia e cacau em pó. Pela justiça, Mashiro não teme nem mesmo a quantidade avassaladora de calorias."
1666908815-NameJp = "Chocolate Quente Feliz"
1666908815-DescriptionJp = "Um chocolate quente feito pela Hanae. Ao tomar um gole, o cansaço desaparece e uma sensação de felicidade transborda."
3922278991-NameJp = "Chocolat de Gehenna"
3922278991-DescriptionJp = "Chocolate amargo de Gehenna com alto teor de calorias e cafeína. Na verdade, Iori já o confundiu com graxa de sapato uma vez."
342988654-NameJp = "Grande Quantidade de Barras de Chocolate"
342988654-DescriptionJp = "Uma enorme quantidade de barras de chocolate que Akari comprou para se preparar para um concurso de comer chocolate. Uma pessoa comum ficaria cheia só de olhar."
741491105-NameJp = "Dango de Chocolate"
741491105-DescriptionJp = "Dango com sabor de chocolate vendido em uma loja de doces japoneses. Uma combinação inesperada, mas deliciosa o suficiente para agradar o paladar de Junko."
2503165795-NameJp = "Death Love"
2503165795-DescriptionJp = "Um brinde que vem ao comprar o single de Dia dos Namorados do grupo musical favorito de Kayoko, Black Death Poison. Apesar da aparência, o sabor é macio e doce."
3659929614-NameJp = "Lanche de Piloto"
3659929614-DescriptionJp = "Uma barra energética que Shiroko mantém sempre à mão para suas pedaladas. É recheada com nozes, e uma mordida é o suficiente para espalhar energia por todo o corpo."
3042768744-NameJp = "Amigo do Mar"
3042768744-DescriptionJp = "Uma baleia de um conjunto de chocolates vendido no museu oceanográfico. Hifumi gosta da grandiosidade das baleias, mas esta é do tamanho da palma da mão."
1510394578-NameJp = "Rosa do Deserto"
1510394578-DescriptionJp = "Chocolate com estampa de rosa vendido em frente à estação de Abydos. É um chocolate inspirado na rosa do deserto e é muito popular como presente."
2394567841-NameJp = "Chocolate de Vênus"
2394567841-DescriptionJp = "Um chocolate com um formato ousado que não parece ser voltado para estudantes. Talvez Eimi seja a única estudante que compraria isso."
367299249-NameJp = "Dispositivo de Escuta nº 14"
367299249-DescriptionJp = "Um chocolate com um dispositivo de escuta feito por Kotama. Não parece haver nenhuma intenção de escondê-lo."
919440775-NameJp = "Lata de Chocolate Quente"
919440775-DescriptionJp = "Uma lata de bebida de chocolate vendida principalmente em máquinas de venda automática. Essa doçura já confortou Chihiro muitas vezes durante a madrugada."
3490934017-NameJp = "Pave de Chocolate (com recibo)"
3490934017-DescriptionJp = "Um conjunto de chocolates para presente que Yuuka comprou para o Sensei. Como há um recibo de 5000 ienes colado, não há dúvidas de que é um chocolate de 5000 ienes."
419901229-NameJp = "Chocolate do Herói (Item)"
419901229-DescriptionJp = "Um item por tempo limitado que Yuzu deu de presente dentro do jogo. Ao usar, recupera a vida do personagem e o coração do jogador."
3659962553-NameJp = "Caracol de Chocolate Artesanal"
3659962553-DescriptionJp = "Um chocolate feito à mão por Aris, inspirado no monstro 'Caracol' do jogo. Se olhar de longe, até que parece um caracol."
941224173-NameJp = "Youkai MAX Sabor Chocolate"
941224173-DescriptionJp = "Uma edição de Youkai MAX sabor chocolate lançada para comemorar a temporada de Dia dos Namorados. Se ele realmente desperta a consciência, é algo que precisa ser discutido com Hare para saber se é mais gostoso que o Youkai MAX comum."
1781832965-NameJp = "Spray Sabor Chocolate"
1781832965-DescriptionJp = "Um spray que dispara chocolate em vez de tinta. Segundo Maki, pode ser usado para tornar o mundo mais doce."
4075915701-NameJp = "Projétil de Chocolate Mk.2"
4075915701-DescriptionJp = "Um projétil de chocolate desenvolvido por Hibiki para o evento de Dia dos Namorados. O poder era tão alto que não pôde ser usado no evento."
2579538323-NameJp = "Chocolate em forma de parafuso"
2579538323-DescriptionJp = "Um chocolate em formato de parafuso embrulhado em papel alumínio. O design é tão perfeito que nem mesmo Utaha consegue distinguir à primeira vista, mas não pode ser usado como ferramenta."
3469911388-NameJp = "Cheryonka"
3469911388-DescriptionJp = "Chocolate ao leite especial da Academia Red Winter, produzido pelo departamento de merenda escolar. Cherino já deu uma mordida nele."
1188251464-NameJp = "Cheryonka Melhorada"
1188251464-DescriptionJp = "Uma versão melhorada do Cheryonka, com uma ilustração fofa desenhada por Tomoe. O sabor é quase idêntico ao do Cheryonka tradicional."
3845682331-NameJp = "Fruto de Cacau"
3845682331-DescriptionJp = "Um fruto de cacau que Nodoka finalmente conseguiu para presentear o Sensei com chocolates. Não é doce, mas se processado e fervido como chá, libera um ótimo aroma."
410737829-NameJp = "Elixir da Imortalidade (Fracasso)"
410737829-DescriptionJp = "Um novo elixir criado por Saya à base de chocolate. Como o sabor e o efeito não diferem do chocolate comum, talvez seja melhor chamá-lo apenas de chocolate."
1298182383-NameJp = "Bombom de Rum para Adultos"
1298182383-DescriptionJp = "Bombons de chocolate com um aroma intenso de rum. Um sabor um pouco precoce para estudantes. E, claro, para Shun também."
125955518-NameJp = "Algemas de Chocolate"
125955518-DescriptionJp = "Chocolate em formato de algemas. A ideia de Kirino de usá-las como algemas de verdade foi inesperada até para o fabricante."
1951960570-NameJp = "Cruller de Chocolate Especial"
1951960570-DescriptionJp = "Um cruller de chocolate especial com granulados, vendido por tempo limitado na Master Donuts durante a temporada de Dia dos Namorados. Para Fubuki, o Dia dos Namorados significa o dia em que ela pode comer isso."
711391590-NameJp = "Haniwa de Chocolate"
711391590-DescriptionJp = "Chocolate em formato de Haniwa preparado por Hanako. Parece que, não importa de onde você olhe, o olhar dele sempre encontra o seu."
4101876-NameJp = "Pequena Bala"
4101876-DescriptionJp = "Chocolate em formato de bala de fuzil de precisão dado por Hasumi. É pequeno, mas sua doçura atravessa o coração."
2407160249-NameJp = "Chocolate Artesanal da Hina"
2407160249-DescriptionJp = "Chocolate feito à mão pela Hina. A aparência não é perfeita, mas a coragem que ela reuniu para fazê-lo é mais bela do que qualquer outra coisa."
1422578612-NameJp = "Um momento de descanso para você"
1422578612-DescriptionJp = "Chocolate caseiro feito com ingredientes rigorosamente selecionados por Ako. O acabamento é tão perfeito que nem parece artesanal; o sabor e o tamanho, fáceis de comer até durante o trabalho, são um reflexo da competência e da consideração de Ako."
87498756-NameJp = "Muito! Delicioso!! Chocolate!!!"
87498756-DescriptionJp = "Chocolate feito à mão por Izumi, usando muitos dos melhores ingredientes que ela conseguiu imaginar. O toque especial é o sabor salgado e tostado."
1899678676-NameJp = "Chocolate de Luxo da Presidente"
1899678676-DescriptionJp = "Chocolate dado por Aru como agradecimento pela cooperação diária. O que importa não é o preço de compra, mas quem deu e com que sentimento."
171489856-NameJp = "Roleta Russa do Inferno"
171489856-DescriptionJp = "Chocolate de roleta russa para pegadinhas, onde você pode acabar encontrando o inferno se tiver azar. O marcador de Mutsuki está cheio de produtos como este."
2099851060-NameJp = "Caneca com Chocolate Quente"
2099851060-DescriptionJp = "Chocolate quente preparado por Fuuka para o Sensei. Talvez por causa da preocupação dela com a saúde do Sensei, é mais doce e quente do que o sabor real sugere."
1852286999-NameJp = "Chocolate Artesanal da Juri"
1852286999-DescriptionJp = "Chocolate feito à mão por Juri com todo o seu esforço. Eu comi, mas não consigo identificar o sabor. Talvez seja melhor não saber. Afinal, a sinceridade dela foi transmitida."
1269992298-NameJp = "Tempo Compartilhado"
1269992298-DescriptionJp = "Bolo de chocolate de altíssima qualidade que Serika ganhou no seu trabalho de meio período. O esforço e a alegria do trabalho tornam o sabor ainda melhor do que qualquer outra coisa."
265930468-NameJp = "Trabalho da Responsável pelos Lanches"
265930468-DescriptionJp = "Conjunto de chocolates preparado por Nonomi, a responsável pelos lanches de Abydos. Está repleto de todos os tipos de chocolates para que o Sensei e todos os membros peculiares do Comitê de Contramedidas possam aproveitar."
689413464-NameJp = "Uma Escolha Selecionada"
689413464-DescriptionJp = "O melhor alimento nutritivo que Sumire provou e selecionou entre mais de 100 tipos. Ele fornece calorias suficientes para um dia inteiro de atividade rapidamente, mas, claro, exige o exercício correspondente depois."
3328209817-NameJp = "Punho de Cassiopeia ~A Grande Saga do Axolote~"
3328209817-DescriptionJp = "Chocolate com brinde que Momoi ganhou em uma máquina de garra. Inclui um brinquedo de um dos mascotes do popular jogo de luta 'Punho de Cassiopeia ~A Grande Saga do Axolote~'. São 7 tipos no total."
3385816833-NameJp = "Chocolate Artesanal da Midori"
3385816833-DescriptionJp = "Muita prática. Tentativa e erro. Falhas, novas tentativas e acordar cedo. Talvez esta seja a primeira vez que ela se esforça tanto em algo que não seja jogos ou desenhos."
3589704604-NameJp = "Biscoito de Chocolate com Provérbios"
3589704604-DescriptionJp = "Biscoito de chocolate que contém vários provérbios de quatro caracteres. O fato de palavras estranhas aparecerem ocasionalmente entre os provérbios sérios parece ser o que Chise mais gosta."
3842989732-NameJp = "Doce Limitado da Hyakkiyako"
3842989732-DescriptionJp = "Um doce especial vendido na Hyakkiyako apenas no Dia dos Namorados. Não há anúncios, não está no menu, e Shizuko não revela para quem ele é vendido."
3251730635-NameJp = "Artigo Ninja Especial nº 49 'Conjunto de Chocolate'"
3251730635-DescriptionJp = "Um conjunto de chocolate ninja dos sonhos, cheio de várias ferramentas ninja. Um item que Izuna conseguiu após esperar na fila desde cedo, apenas para saborear com seu mestre. Cuidado, pois não pode ser usado na prática."
4247091559-NameJp = "Conjunto de chocolate e itens para um sono tranquilo"
4247091559-DescriptionJp = "Um conjunto completo de itens para dormir bem, preparado por Tsubaki para o Sensei, que está sempre sobrecarregado. Se você quiser um travesseiro ainda mais confortável, chame a Tsubaki. O valor total, se comprado separadamente, é de 3.980 ienes."
2771361458-NameJp = "Chocolate cheio do amor de Wakamo"
2771361458-DescriptionJp = "Um chocolate feito por Wakamo, transbordando com seus sentimentos intensos. No entanto, não se sabe ao certo se o que está contido nele é apenas amor."
1572630441-NameJp = "Prova de Gastronomia (Sabor Matcha)"
1572630441-DescriptionJp = "Um chocolate de matcha feito por Haruna como parte de sua pesquisa gastronômica. Ao morder, a doçura emerge de dentro do amargor profundo."
3743008500-NameJp = "Skullman, o Santo do Dia dos Namorados"
3743008500-DescriptionJp = "Uma versão em chocolate do 'Ceifador da Morte, Skullman', preparada por Azusa. Se você comê-lo, nem os ossos sobrarão, mas os sentimentos contidos nele certamente permanecerão."
1084418779-NameJp = "Lovely Crossline"
1084418779-DescriptionJp = "Um chocolate famoso trazido por Koharu. É uma mistura de chocolate branco e chocolate amargo, com um padrão de cruz preta muito atraente."
2742248602-NameJp = "Twinkle Star"
2742248602-DescriptionJp = "Um chocolate em formato de estrela que Suzumi comprou na loja de conveniência para mim. Ao abrir a embalagem, ele está coberto com folhas de ouro, brilhando silenciosamente."
663608497-NameJp = "Holy Chocolate"
663608497-DescriptionJp = "Um chocolate presenteado por Mari. É popular como lembrança da Sisterhood, e talvez tenha sido feito para exibição desde o início, e não para consumo."
848260985-NameJp = "Acompanhamento para leitura"
848260985-DescriptionJp = "Um chocolate com um revestimento especial que não suja as mãos. É muito popular entre os leitores, incluindo Shimiko."
1900401189-NameJp = "Be With You"
1900401189-DescriptionJp = "Chocolate artesanal feito por Serina. Seu sabor doce traz um alívio reconfortante até para o coração."
4183660781-NameJp = "Pennyroyal Choco Mint"
4183660781-DescriptionJp = "Um chocolate com menta especial preparado por Airi. Parece ser algo muito popular e especial entre os entusiastas, mas para entender o quão especial é, parece que precisarei que a Airi me explique."
1868703267-NameJp = "Chocolate de edição limitada da Yoshimi"
1868703267-DescriptionJp = "Chocolate artesanal da Yoshimi. Por vários motivos, é um item limitado e valioso que não pode ser encontrado em nenhum outro lugar."
355355427-NameJp = "Chocolate em vez de palavras"
355355427-DescriptionJp = "Um chocolate que se presume ser feito à mão por Natsu. É um design simples, servindo como substituto para as palavras eloquentes de Natsu, e é justamente por isso que sua beleza pode ser sentida."
2098665142-NameJp = "Fortune Chocolate (Feito por mim)"
2098665142-DescriptionJp = "Chocolate preparado por Chinatsu. Se não importa qual você escolha, talvez possamos chamar isso de destino."
3487183095-NameJp = "Bandage Choco"
3487183095-DescriptionJp = "Um alimento feito por Sena durante o expediente. Como ela não encontrou papel de embrulho, usou ataduras, mas ela garante que não há problemas para o corpo humano e, caso você desmaie, ela certamente cuidará de você."
3066393242-NameJp = "Cacau 99,99%"
3066393242-DescriptionJp = "Um chocolate preparado por Haruka para o Sensei. Se ao ver o número 99,99 você pensa 'parece incrível', talvez você tenha jeito para a Problem Solver 68."
3579363383-NameJp = "Twisted Valentine"
3579363383-DescriptionJp = "Um chocolate que Asuna preparou para seu mestre. Ele sofreu uma pequena deformação durante o armazenamento e transporte."
304962670-NameJp = "Made By"
304962670-DescriptionJp = "Chocolate artesanal de Akane. Parece um presente comum de uma aluna para o professor, sem nada de especial... mas sua excelente habilidade como empregada não consegue ser totalmente escondida."
1933815846-NameJp = "Choco Omurice"
1933815846-DescriptionJp = "Um Omurice preparado por Karin para o Dia dos Namorados. Em vez de ketchup, um coração foi desenhado com chocolate; é um prato maravilhoso onde o sabor original do Omurice harmoniza com a doçura do chocolate."
1957428602-NameJp = "Gravura de Chocolate: Dragão"
1957428602-DescriptionJp = "Uma gravura em formato de dragão feita de chocolate que Neru trouxe de algum lugar. Neru acredita que, como a aparência é forte, o sabor também deve ser incrível."
1255509912-NameJp = "Valentine Beginning"
1255509912-DescriptionJp = "Um chocolate feito por Kotori para explicar a origem e o significado do Dia dos Namorados. Ao dar uma mordida, a história que foi tecida ao longo do tempo transborda na boca."
1303875154-NameJp = "Cálice Doce"
1303875154-DescriptionJp = "Um chocolate em formato de cálice trazido por Pina. Ele derrete se você segurar por muito tempo, então o costume é saboreá-lo rapidamente."
1082089594-NameJp = "Amande Crimson"
1082089594-DescriptionJp = "Um chocolate com amêndoas deixado por Tsurugi. Há um lindo laço vermelho amarrado nele, que provavelmente não foi colocado pela loja."
3411154794-NameJp = "Chocolate artesanal desajeitado"
3411154794-DescriptionJp = "Um chocolate artesanal que Kokona embrulhou cuidadosamente, apesar de sua falta de jeito. Ela insiste teimosamente que é um produto comprado em loja e fez questão de enfatizar: 'Por favor, coma sozinho!'"
421170184-NameJp = "Pequeno Chocolate"
421170184-DescriptionJp = "Chocolates que Hinata distribui para as crianças que visitam a catedral. Parece que ela provou todos os sabores para garantir que atendessem às preferências de cada um."
412848971-NameJp = "Biscoito de chocolate úmido"
412848971-DescriptionJp = "Biscoitos de chocolate preparados por Ui. Ela diz que escolheu os que são mais úmidos para que não soltem farelos."
1622643101-NameJp = "Bolo de chocolate com morango"
1622643101-DescriptionJp = "Um bolo de chocolate com morango que a Kazusa comprou para mim. Parece que ela ficou um bom tempo indecisa na frente da vitrine."
2747826200-NameJp = "Tudo para Você"
2747826200-DescriptionJp = "Um chocolate que a Hiyori preparou, em certo sentido, em troca de \"tudo\". Dentro do pequeno pacote, há muitos dos sentimentos dela."
2837160480-NameJp = "Chocolate com embalagem cuidadosa"
2837160480-DescriptionJp = "Um chocolate preparado pela Misaki. A embalagem delicada, feita com fitas de duas cores, parece revelar um lado oculto dela."
4062180493-NameJp = "Rosa azul e chocolate"
4062180493-DescriptionJp = "Um chocolate artesanal dado por uma princesa cheia de segredos. A flor solitária que o acompanha é a prova do esforço da Atsuko."
3932209420-NameJp = "Chocolate da Gidiva"
3932209420-DescriptionJp = "Um chocolate de altíssima qualidade preparado pela Saori. O processo foi complexo e nada fácil, mas certamente tem muito valor."
2263489181-NameJp = "Chocolate de flor de cerejeira"
2263489181-DescriptionJp = "Um chocolate artesanal em formato de flor de cerejeira feito pela Mimori. Mesmo sem usar leitura mental, ao comer um, você sente os sentimentos dela."
170445747-NameJp = "O Chocossauro Supremo"
170445747-DescriptionJp = "O Chocossauro Supremo feito pela Kaede. Criado a partir da ideia inversa de combinar pedaços de um chocolate de escavação de dinossauro que deu errado. Um chocolate divertido de olhar e delicioso de comer, que reflete muito bem a personalidade dela."
566203770-NameJp = "Chocolate de orelhas caídas derretido"
566203770-DescriptionJp = "Um chocolate fofo em formato de coelho de orelhas caídas feito pela Tsukuyo. De tanto que ela cuidou dele com carinho, acabou derretendo um pouco."
2104744538-NameJp = "Chocolate da Hacker supergênia, pura e doentia"
2104744538-DescriptionJp = "Um chocolate artesanal que a Himari fez, deformando a própria imagem. Embora tenha sido uma decisão repentina, foi tomada de forma lógica e racional, e acabei saboreando ao voltar para o Schale."
3304317128-NameJp = "Chocolate em palito artesanal da Iroha"
3304317128-DescriptionJp = "Um chocolate artesanal em formato de palito que ganhei da Iroha na volta das compras. Há uma \"marca\" em apenas um deles."
902334212-NameJp = "Chocolate em formato de distintivo do Clube de Pesquisa Ninjutsu"
902334212-DescriptionJp = "Um chocolate feito sob medida que a Michiru preparou. Contém o carinho que ela sente pelos seus companheiros do Clube de Pesquisa Ninjutsu. O processo agitado para fazê-lo talvez seja parte do sabor."
813659355-NameJp = "Bolo de cenoura com chocolate"
813659355-DescriptionJp = "Um bolo de cenoura feito pela Miyako usando chocolate. Doces podem não ser bons para coelhos, mas podem ser algo muito feliz para os amigos e para o Sensei."
490342082-NameJp = "S'more de chocolate"
490342082-DescriptionJp = "Um s'more de chocolate feito pela Moe. É chocolate sobre um marshmallow doce; a quantidade de calorias é simplesmente catastrófica."
1288390774-NameJp = "Caramelo de chocolate de suprimentos"
1288390774-DescriptionJp = "Caramelo de chocolate preparado pela Saki. É um item que as sentinelas que fazem a guarda noturna comem para espantar o sono. Segundo a própria Saki, não é um presente relacionado ao Dia dos Namorados."
1222376462-NameJp = "Chocolate Bark"
1222376462-DescriptionJp = "Chocolate Bark feito à mão pela Miyu. Parece que foi feito com chocolates de suprimentos e frutas colhidas. Vamos comer um pedacinho de cada vez com cuidado."
4196510691-NameJp = "Tinta de chocolate"
4196510691-DescriptionJp = "Um chocolate que contém o lado travesso e doce da Noa. Como não adere bem à ponta da caneta, não serve para escrever, mas é a tinta ideal para expressar sentimentos sinceros."
70201916-NameJp = "Chocolate da Medalha de Mérito Especial"
70201916-DescriptionJp = "Uma medalha que a Marina recebeu de Cherino como recompensa por atingir a meta de produção de Cheryanka. Como a matéria-prima é chocolate, ele desaparece ao ser comido, mas o esforço e a honra permanecerão na memória para sempre."
967689799-NameJp = "Especial Amargo da Shigure"
967689799-DescriptionJp = "Um coquetel de chocolate não alcoólico feito pela Shigure. O segredo do equilíbrio entre o doce e o retrogosto refrescante é um pedacinho de chocolate amargo."
3442222452-NameJp = "Chocolate em formato de pintinho"
3442222452-DescriptionJp = "Um chocolate adorável que a Mine me deu no Dia dos Namorados. Embora ela insista que é um item médico, ele tem um ar sofisticado e vem em uma embalagem bonita."
18239407-NameJp = "Toranja seca coberta com chocolate"
18239407-DescriptionJp = "Um lanche que parece saudável e que a Ayumu come habitualmente. É toranja seca coberta com chocolate; deixando de lado a recuperação da fadiga, o sabor é muito bom."
4263181528-NameJp = "Cópia danificada do Manuscrito Voynich"
4263181528-DescriptionJp = "Uma cópia do Manuscrito Voynich, rasgada em algumas partes e danificada por rabiscos. Usado para fabricação e aprimoramento."
1731163637-NameJp = "Cópia editada do Manuscrito Voynich"
1731163637-DescriptionJp = "Uma cópia do Manuscrito Voynich com anotações nas partes danificadas. Usado para fabricação e aprimoramento."
2042390877-NameJp = "Cópia completa do Manuscrito Voynich"
2042390877-DescriptionJp = "Uma cópia do Manuscrito Voynich em estado perfeito. Usado para fabricação e aprimoramento."
4282203720-NameJp = "Fragmento de Haniwa de cristal"
4282203720-DescriptionJp = "Fragmento de um Haniwa de cristal quebrado. Usado para fabricação e aprimoramento."
2168007634-NameJp = "Caixa de sorteio de Notas Técnicas de nível iniciante"
2168007634-DescriptionJp = "Uma caixa de sorteio que, ao ser usada, permite obter uma das Notas Técnicas de nível iniciante com a mesma probabilidade."
957898555-NameJp = "Caixa de Seleção de Nota Técnica Intermediária"
957898555-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter uma das Notas Técnicas Intermediárias com a mesma probabilidade."
2977883904-NameJp = "Caixa de Seleção de Nota Técnica Avançada"
2977883904-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter uma das Notas Técnicas Avançadas com a mesma probabilidade."
1466385333-NameJp = "Caixa de Seleção de Nota Técnica Suprema"
1466385333-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter uma das Notas Técnicas Supremas com a mesma probabilidade."
4166452772-NameJp = "Caixa de Seleção de BD de Treinamento Tático Iniciante"
4166452772-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos BDs de Treinamento Tático Iniciante com a mesma probabilidade."
749003887-NameJp = "Caixa de Seleção de BD de Treinamento Tático Intermediário"
749003887-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos BDs de Treinamento Tático Intermediário com a mesma probabilidade."
1755243054-NameJp = "Caixa de Seleção de BD de Treinamento Tático Avançado"
1755243054-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos BDs de Treinamento Tático Avançado com a mesma probabilidade."
2424945429-NameJp = "Caixa de Seleção de BD de Treinamento Tático Superior"
2424945429-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos BDs de Treinamento Tático Superior com a mesma probabilidade."
1860452532-NameJp = "Caixa de Seleção de OOParts (1)"
1860452532-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos OOParts (1) com a mesma probabilidade."
1674194127-NameJp = "Caixa de Seleção de OOParts (2)"
1674194127-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos OOParts (2) com a mesma probabilidade."
2758696636-NameJp = "Caixa de Seleção de OOParts (3)"
2758696636-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos OOParts (3) com a mesma probabilidade."
3256836126-NameJp = "Caixa de Seleção de OOParts (4)"
3256836126-DescriptionJp = "Uma caixa de seleção que, ao ser usada, permite obter um dos OOParts (4) com a mesma probabilidade."
1767055059-NameJp = "Haniwa de Cristal Quebrado"
1767055059-DescriptionJp = "Um Haniwa de cristal tão quebrado que sua forma original é irreconhecível. Usado para fabricação e aprimoramento."
3767770369-NameJp = "Caixa de Seleção de Série de Móveis Normais"
