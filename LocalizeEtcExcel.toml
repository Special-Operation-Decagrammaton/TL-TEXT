3814256011-DescriptionJp = "Conclua o Capítulo 3, Episódio 26 da Parte 1: Decagrammaton"
2296406049-NameJp = "Conclusão do Capítulo Decagrammaton"
2296406049-DescriptionJp = "Conclua o Capítulo 3, Episódio 24 da Parte 1: Decagrammaton"
