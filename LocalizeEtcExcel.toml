1148052880-DescriptionJp = "そのピンと立った純白の耳は、事件の音を逃さない！跳躍探偵ウサギシリーズ、第3弾！今度の舞台は温泉だ！"
1561623078-NameJp = "O-フィット"
1561623078-DescriptionJp = "「ゲームで楽しく運動しよう！」O-リングを活用して、手軽に家で運動が楽しめるゲーム。筋力運動、ダイエット、どちらもお任せ！"
293569137-NameJp = "埋蔵金の地図"
293569137-DescriptionJp = "探せ！この世の全てがそこにある！キヴォトスの三大埋蔵金の在り処を示していると言われている地図。割といろんなところで売られてる。"
3310161849-NameJp = "コスプレ用ぐるぐるメガネ"
3310161849-DescriptionJp = "これさえ使えばあなたも天才博士に！……なれるかもしれないメガネ。※注意：着用してもIQは上がりません。"
1301636205-NameJp = "世界で最も無駄な絡繰りボックス"
1301636205-DescriptionJp = "役には立たない……でも可愛い！役には立たないけど！可愛いから大丈夫！特別な日のプレゼントとしてもおススメなおもちゃtop5に入ると話題に。"
535298119-NameJp = "リボンのついた熊のぬいぐるみ"
535298119-DescriptionJp = "平凡だが愛らしさが感じられるクマのぬいぐるみ。可愛いモノ好きな生徒たちの間では、それなりに有名なメーカーの製品。"
3961391528-NameJp = "映画の前売りペアチケット"
3961391528-DescriptionJp = "「たまたまチケットが余ってたので、一緒に見ませんか？」どの映画館でも利用できるペアチケット。相手は恋人でなくても可。"
2944986556-NameJp = "30色の絵の具セット"
2944986556-DescriptionJp = "30色も入っている、プロも御用達の絵の具セット。この絵の具セットを買って、新しい世界を描こう！"
4077917950-NameJp = "古典の詩集"
4077917950-DescriptionJp = "古風な感じがたまらない古典の詩集。「いとあはれ」の感覚をあなたに。"
3946342470-NameJp = "可愛い食器セット"
3946342470-DescriptionJp = "可愛いマスコットキャラクターが描かれた食器セット。毎年キヴォトスの食器類販売ランキング10位圏内に入っている歴戦の猛者。"
762300502-NameJp = "頭脳開発キューブパズル"
762300502-DescriptionJp = "「これが解けたあなたは正にミレニアム！」ミレニアムサイエンススクール公認の上級者向けキューブパズル。"
3238447321-NameJp = "大きなホールケーキ"
3238447321-DescriptionJp = "見ただけでお腹いっぱいになりかねない大きなホールケーキ。カロリー表記は一応裏面にありますが……。"
1648390167-NameJp = "ハイクラスビュッフェ招待券"
1648390167-DescriptionJp = "キヴォトス随一のシェフたちが勤務するレストランの高級バイキングを楽しめる招待券。買おうとすると相当高い。"
1143324025-NameJp = "食虫植物の植木鉢"
1143324025-DescriptionJp = "特殊な趣味嗜好を持った人たちがこぞって買いに来る食虫植物の鉢植え。昆虫を捕食する姿が意外に可愛いとか可愛くないとか。"
1569225040-NameJp = "高級そうな欲望のつぼ"
1569225040-DescriptionJp = "一目で高級だと分かる金箔の壺。カードは引けませんのでご注意ください。"
2112008978-NameJp = "ぜんまい式オルゴール"
2112008978-DescriptionJp = "ヴィンテージ感がたまらない高級なぜんまい式オルゴール。コレクターたちの間では有名な一品。"
2651867463-NameJp = "刺繍付きのハンカチ"
2651867463-DescriptionJp = "刺繍の施されたハンカチ。素朴な刺繍が繊細な美しさを漂わせている。"
3408710330-NameJp = "百科事典"
3408710330-DescriptionJp = "食パンの袋の口を結ぶ「アレ」から、お弁当に入っている草みたいな形の「アレ」まで。あなたが知りたい全てがこの中に。"
2665872474-NameJp = "ザ・サプリメント"
2665872474-DescriptionJp = "一錠飲むだけで力が沸き上がる！大切な方への贈り物にもピッタリな健康食品。"
922488053-NameJp = "夏模様の浮き輪"
922488053-DescriptionJp = "夏だ！海だ！それなら浮き輪だ！泳ぐのが苦手なら、いや、泳ぐのが得意でもこれはきっと必需品。そもそも安全のためには準備し過ぎるなんてことはないし、何よりもこのファンシーで可愛いデザインが、水着の女の子をさらに可愛く見せてくれるはず！"
1777637643-NameJp = "レースの枕"
1777637643-DescriptionJp = "豪華な素材で作られたレースの枕。一見シンプルに見えるデザインだが、文字通りそこには少女たちの夢が込められている。"
2122048137-NameJp = "ストリートオブヤンキー1巻"
2122048137-DescriptionJp = "「私たちには義理と度胸しかないっ！」のセリフで有名な話題作、ストリートオブヤンキーシリーズ第1巻。外見とは違って、主人公が意外に可愛いという感想と共にシリーズ好評発売中。"
3996150169-NameJp = "サミュエラ「ザ・ビヨンド」"
3996150169-DescriptionJp = "高級化粧品メーカー「サミュエラ」で発売した最高級香水。「一度試して、愛らしさをその身につけてみてください」というキャッチフレーズで有名な超超ヒット作で、希代の天才調香師「ザ・ビヨンド」が作ったサミュエラ12傑作の一つである。"
493877113-NameJp = "レトロな卵の工芸品"
493877113-DescriptionJp = "卵形のボディの上に美しい宝石と幾何学的な柄が細工されている工芸品。もちろん温めてもひよこは​​生まれない。"
2812198344-NameJp = "ミルフィーユの正統派パフェ"
2812198344-DescriptionJp = "トリニティの有名菓子店カフェ・ミルフィーユで売っているパフェ。柔らかいアイスクリームの上に積み重なったお菓子とシロップ、生クリーム、そして果物のハーモニーはまさに正統派！"
610304186-NameJp = "エイ～ブックレア"
610304186-DescriptionJp = "「キヴォトス中の生徒が最も欲しい電子機器TOP3」に入る有名ノートパソコン。かなりの高級品。欲しい！でもやっぱ高い！"
991149378-NameJp = "おしゃれなくし"
991149378-DescriptionJp = "高級感のあるおしゃれなデザインの携帯用くし。プレゼントとして人気が高い。"
18654891-NameJp = "栄養満載の総合ビタミンゼリー"
18654891-DescriptionJp = "総合的にビタミンが含まれている栄養ゼリー。様々な果物味のゼリーが入っていて食べる楽しみがある。どんどん食べて、気づいた時には空にならないように注意すべし！"
442885187-NameJp = "最高級の楓の盆栽"
442885187-DescriptionJp = "見ているだけでも心が落ち着く最高級の楓の盆栽。四季に応じて服を着替えるように変化する変幻自在の葉の姿が、風流な気分を漂わせる。"
897935320-NameJp = "裁縫キット"
897935320-DescriptionJp = "あらゆる状況に対応するべく必要な道具を選別した上級者向け裁縫キット。これさえあれば服が破れたり、靴下に穴が開いても、問題なし！"
175940735-NameJp = "音楽演奏会入場券"
175940735-DescriptionJp = "キヴォトスで定期的に開催される演奏会の入場券。クラシックから最近流行りの曲まで。種類を問わない様々な音楽が好きな人に最適なプレゼント。"
794340686-NameJp = "1日3回ダンベルセット"
794340686-DescriptionJp = "様々な重さのダンベルが複数入っているセット商品。一日三回。朝、昼食、夕方のトレーニングを繰り返して素敵な筋肉を作ろう！"
1058688122-NameJp = "ボードゲーム「ザ・人生」"
1058688122-DescriptionJp = "就職したり、宝くじに当選したり、宇宙旅行もできる面白いボードゲーム。毎プレイごとに一歩先も分からないルーレットとサイコロの結果が、まるで人生だという。"
1404874799-NameJp = "美しい花束"
1404874799-DescriptionJp = "大切な人に贈るルビーで作られた花束。美しい赤い花びらが相手の心をつかむ。"
2205211310-NameJp = "初音ミクのフォトカード"
2205211310-DescriptionJp = "初音ミクのキヴォトスにおけるライブで配られた、特製のフォトカード。ライブはかなりの大盛況に終り、初音ミクのファンであれば誰もが欲しがるレアなグッズとなった。"
