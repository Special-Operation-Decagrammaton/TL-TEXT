1664341587-NameJp = "Curry de cor suspeita"
1664341587-DescriptionJp = "Um curry de origem desconhecida com uma cor suspeita.\nTem um cheiro pungente que irrita o nariz, como produtos químicos.\nAté o arroz que o acompanha está queimado e com um gosto amargo."
408873372-NameJp = "Curry de cabeça de peixe"
408873372-DescriptionJp = "Um curry que tentou \"extrair\" o sabor usando sobras de cabeças de peixe.\nEmbora a ideia fosse boa, o curry ficou com um cheiro estranho de peixe cru.\nUm curry que faz quem come franzir a testa involuntariamente."
3557467288-NameJp = "Curry de vegetais simples"
3557467288-DescriptionJp = "Um curry de vegetais simples feito apenas com abóbora, batata e cenoura.\nNão é luxuoso, mas o doce dos vegetais combina bem com o curry.\nO arroz branco que o acompanha também está cozido no ponto certo."
817877395-NameJp = "Curry de creme de camarão"
817877395-DescriptionJp = "Um curry cremoso coberto com camarões grandes.\nO sabor suave do camarão combina bem com o curry cremoso.\nAs especiarias controlam a gordura, então você não enjoa dele."
2465534331-NameJp = "Curry de bife de contrafilé"
2465534331-DescriptionJp = "Um curry luxuoso com um bife de contrafilé de alta qualidade sobre o arroz.\nA textura dos cogumelos grelhados e da cebolinha realça o sabor.\nO arroz com alho refogado na manteiga já é uma iguaria por si só."
