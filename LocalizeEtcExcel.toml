358559959-NameJp = "Prédio Principal"
358559959-DescriptionJp = "O primeiro lugar que os clientes que visitam a pousada vêm. Principalmente um lugar para conferir a reserva, mas há instalações onde se pode tirar um pequeno descanso."
2825548492-NameJp = "Banho Público"
2825548492-DescriptionJp = "Um banho público que um grande número de pessoas pode desfrutar ao mesmo tempo. Há várias fontes termais de várias temperaturas e composição."
2481788820-NameJp = "Quartos de Hóspedes"
2481788820-DescriptionJp = "Há tapetes e bancos no chão de que emana um belo sentimento de elegância. Nodoka limpa e refaz as camas numa base diária."
3141924738-NameJp = "Salão de Descanso"
3141924738-DescriptionJp = "Um salão para relaxar com calma depois de sair do banho. Há mesas de pingue-pongue e cadeiras de massagem que os convidados do hotel podem utilizar livremente."
384904434-NameJp = "Salão de Banquetes"
384904434-DescriptionJp = "Um salão de banquetes em grande escala que um grande número de pessoas pode desfrutar em uníssono. O design interior é limpo, mas talvez não se deva esperar demasiado da comida."
1433250290-NameJp = "Banho de Ar Livre"
1433250290-DescriptionJp = "Um banho de ar livre a desfrutar com as vistas com neve. Por vezes pode mesmo ver a vida selvagem na descida da montanha."
4060632693-NameJp = "Edifício Anexo"
4060632693-DescriptionJp = "O anexo reservado para os utilizadores VIP. É separado do edifício principal, dando-lhe um tempo de paz e silêncio requintado."
4194626497-NameJp = "Jardim"
4194626497-DescriptionJp = "Um jardim tradicional do Japão karesansui cheio de rochas e areia. Nodoka limpa o jardim meticulosamente e cuidadosamente todos os dias."
3675272134-NameJp = "Sede de Operações"
3675272134-DescriptionJp = "A sede administrativa encarregue da operação geral do Festival Desportivo. É também aqui que os jogos e o registo e a gestão das bancas têm lugar."
1884871261-NameJp = "Pista"
1884871261-DescriptionJp = "A pista construída para circular ao redor das margens externas do estádio. É pavimentada com material tão resistente que as bombas para as corridas de obstáculos não deixarão sequer amolgadela no pavimento."
2410805514-NameJp = "Depósito de Materiais"
2410805514-DescriptionJp = "Depósito de acessórios e equipamento para o Festival de Desporto. A porta não pode ser destrancada pelo interior, pelo que se deve ter cuidado para não ficar acidentalmente trancado no seu interior."
2074635724-NameJp = "Bancada dos Espectadores"
2074635724-DescriptionJp = "As bancadas que foram construídas no segundo andar do estádio. Para evitar que os apoios rivais escalem durante a competição, os lugares são divididos em secções para cada academia."
830995934-NameJp = "Campo"
830995934-DescriptionJp = "Uma secção maciça de campo bem no meio do estádio. Têm apenas o aspeto de um relvado normal, mas graças aos desenvolvimentos tecnológicos da Millennium, parecem de alguma forma mais suaves e até um pouco mais tolerantes do que a relva real."
2054928448-NameJp = "Super Armazém"
2054928448-DescriptionJp = "Armazém para armazenar equipamento resistente e maquinário a ser usado no Festival de Desporto. Algumas ferramentas básicas de hardware também são preparadas no interior para facilitar a correção na altura."
1757505051-NameJp = "Sala de Transmissão"
1757505051-DescriptionJp = "A sala a partir da qual as emissões cristalinas e sem falhas do Festival de Desporto são enviadas para fora. Tem uma função de replay de repetição a fim de prever maus julgamentos do árbitro."
1079056613-NameJp = "Sala de Descanso"
1079056613-DescriptionJp = "Um local de descanso para jogadores e espectadores em todo o lado. Uma máquina de café e um despensador de bebidas estão devidamente instalados no seu interior."
3239184876-NameJp = "Polícia Acadêmica Valkyrie Filial de Shiratori"
3239184876-DescriptionJp = "A filial da Valkyrie da Polícia Académica. Rodeada por todas essas cintilantes plantas verdes frondosas, dizem que o ar cheira surpreendentemente revigorante."
2322223304-NameJp = "Povoação Corgi"
2322223304-DescriptionJp = "A popular área comercial de produtos eletrónicos. A palavra na rua é que se pode colocar as mãos em praticamente qualquer coisa lá em cima que ainda não tenha sido retirada ou recolhida."
1462360932-NameJp = "Tri-Square"
1462360932-DescriptionJp = "Um lugar que atua como local de encontro de encontros tanto de amigos como de conhecidos. É também o destino de eleição quando apetece passear com facilidade."
4293010634-NameJp = "A 3ª Área Comercial"
4293010634-DescriptionJp = "A Área de Negócios adjacente à Tri-Square. Trata-se de uma bela zona modernizada que se assemelha às vistas tranquilas das estradas e os blocos de betão com requintada sofisticação."
1977010791-NameJp = "Avenida Prado"
1977010791-DescriptionJp = "A rua onde o museu de arte está sediado. O Museu de Arte é certamente fantástico por si próprio, mas também contribui com o estilo do bairro da cidade da arte perfeitamente."
1729072075-NameJp = "Parque Shiratori Proximidades"
1729072075-DescriptionJp = "Pode haver menos visitantes a passear no parque em comparação com o resto da área, mas não retira um único grama da aura essencial dos bairros."
2590301450-NameJp = "Porto Kanezaki"
2590301450-DescriptionJp = "Poderia ser um belo destino se tudo o que quiseres for ver a beleza do mar. Embora o mar de lá possa não ser o que tinhas em mente."
4121383175-NameJp = "Povoação Lamini"
4121383175-DescriptionJp = "Um bairro repleto de barracas de comida que pode rivalizar até com as ruas de lanches da Academy. Uma variedade infinita de carrinhos e barracas de comida pode ser vista ao longo do rio estreito."
