1260208394-DescriptionJp = "Um vaso de rosas cuidadosamente cultivadas. Apesar da dificuldade de manutenção, o Chá das Cinco sempre mantém flores frescas nele."
1350455159-NameJp = "Canteiro de Flores Retangular"
1350455159-DescriptionJp = "Um canteiro onde rosas brancas florescem de forma esplêndida. Sua linguagem floral é 'pureza' e 'inocência'."
