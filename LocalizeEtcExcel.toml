3679010773-NameJp = "Rolo de Abdominais do Peroro"
3679010773-DescriptionJp = "O 9º produto da colaboração Momo Friends, que está dando o que falar! Um rolo de abdominais com design do Peroro que conquistou o primeiro lugar no ranking de artigos de treino deste ano!?"
3417345669-NameJp = "A-Pod Pro"
3417345669-DescriptionJp = "Fones de ouvido sem fio que se tornaram populares entre os estudantes de Kivotos recentemente. São bem caros para se comprar com a mesada. Em média, custam cerca de 3 meses de salário de um trabalho de meio período."
1575353856-NameJp = "Amor Proibido\n~Belo justamente por ser inaceitável~"
1575353856-DescriptionJp = "A mais nova obra da popular escritora de romances, a professora 'Koi yo Koi'! Uma obra polêmica que trata de um amor proibido, que não pode ser concretizado!"
3531188161-NameJp = "Revista de Jogos\n'Hit Girls'"
3531188161-DescriptionJp = "Tem de tudo aqui. Desde as últimas notícias de jogos de Kivotos até guias de jogos retrô e informações sobre o lançamento de produtos, é uma revista completa para quem gosta de jogos."
812933091-NameJp = "Gloss Labial Cor Rosa Cereja"
812933091-DescriptionJp = "Um gloss labial que harmoniza fofura e vivacidade. É o item mais quente do momento, causando um verdadeiro furor entre as mulheres que amam estar na moda."
2902292788-NameJp = "BB Cream que deixa a pele transparente"
2902292788-DescriptionJp = "Um grande sucesso lançado pela luxuosa marca de cosméticos 'Samuela'. Um BB Cream que corrige a pele deixando-a tão clara que parece transparente. Adere naturalmente à pele, criando um tom de pele saudável (?)."
618503547-NameJp = "Conjunto de 3 Cremes de Camuflagem Militar"
618503547-DescriptionJp = "Um grande sucesso lançado pela luxuosa marca de cosméticos 'Samuela'. Uma sensação de conforto ao penetrar na pele! Maquiagem de camuflagem possível em qualquer lugar e a qualquer momento! Faça sua própria camuflagem onde quiser!"
1773086852-NameJp = "Conjunto de Biscoitos de Luxo"
1773086852-DescriptionJp = "Um conjunto de biscoitos de luxo da Schrödinger, com uma doçura suave e requintada. Existe uma certa probabilidade de conter algo diferente de biscoitos dentro. O evento só é determinado quando você abre."
2238627204-NameJp = "'Armas, Fofura e Juventude'"
2238627204-DescriptionJp = "Armas, fofura e juventude. O best-seller deste ano que marca um retorno às origens da cultura popular de Kivotos."
346808410-NameJp = "Telescópio Astronômico"
346808410-DescriptionJp = "Um telescópio astronômico adotado como equipamento padrão pela Associação Astronômica de Kivotos."
3391000326-NameJp = "Game Girl Color Edição Relançada"
3391000326-DescriptionJp = "'Para uma vida com mais estilo, mais uma vez'. É o relançamento daquele console que dominou o mundo antigamente, o 'Game Girl Color'!"
2936755317-NameJp = "Ração MX Tipo C Sabor Sobremesa"
2936755317-DescriptionJp = "Calorias são poder de combate!"
1249782817-NameJp = "Ramune de Garrafa Sabor Matcha"
1249782817-DescriptionJp = "Uma bebida gaseificada sabor matcha com um sabor único irresistível. Refrescante e, ao mesmo tempo, suave."
2902432180-NameJp = "Almofada das Jellies"
2902432180-DescriptionJp = "O protagonista daquela série 'Full Jelly' finalmente virou um produto! Reproduz fielmente o comportamento das jellies da mesma cor quando se juntam!"
1148052880-NameJp = "Coelho Detetive Saltitante\n~Queda na fonte termal envolta em névoa~"
1148052880-DescriptionJp = "Suas orelhas brancas e eretas não deixam passar nenhum som de crime! 3ª edição da série Coelho Detetive Saltitante! Desta vez, o palco é uma fonte termal!"
1561623078-NameJp = "O-Fit"
1561623078-DescriptionJp = "'Vamos nos exercitar de forma divertida com jogos!' Um jogo que utiliza um anel O para que você possa se exercitar facilmente em casa. Treino de força ou dieta, ele cuida de tudo!"
293569137-NameJp = "Mapa do Tesouro Enterrado"
293569137-DescriptionJp = "Procure! Tudo o que existe neste mundo está lá! Um mapa que diz indicar a localização dos três grandes tesouros enterrados de Kivotos. É vendido em vários lugares."
3310161849-NameJp = "Óculos de Espiral para Cosplay"
3310161849-DescriptionJp = "Com isso, você também pode se tornar um doutor genial! ...Ou talvez não. *Aviso: usar estes óculos não aumenta seu QI."
1301636205-NameJp = "A Caixa de Engrenagens Mais Inútil do Mundo"
1301636205-DescriptionJp = "Não serve para nada... mas é fofa! Não serve para nada, mas como é fofa, está tudo bem! Dizem que está no top 5 de brinquedos recomendados como presente para dias especiais."
535298119-NameJp = "Urso de Pelúcia com Laço"
535298119-DescriptionJp = "Um urso de pelúcia comum, mas que transmite uma sensação de fofura. É um produto de uma marca bastante famosa entre os estudantes que gostam de coisas fofas."
3961391528-NameJp = "Par de Ingressos Antecipados para o Cinema"
3961391528-DescriptionJp = "'Sobrou um ingresso por acaso, quer assistir comigo?' Um par de ingressos que pode ser usado em qualquer cinema. Não precisa ser necessariamente com um namorado(a)."
2944986556-NameJp = "Conjunto de Tintas de 30 Cores"
2944986556-DescriptionJp = "Um conjunto de tintas com 30 cores, usado até por profissionais. Compre este conjunto e pinte um novo mundo!"
4077917950-NameJp = "Coletânea de Poemas Clássicos"
4077917950-DescriptionJp = "Uma coletânea de poemas clássicos com uma sensação nostálgica irresistível. Para lhe trazer a sensação de 'ito aware' (o encanto das coisas)."
3946342470-NameJp = "Conjunto de louças fofo"
3946342470-DescriptionJp = "Um conjunto de louças com personagens mascotes fofos estampados. É um veterano de guerra que entra no ranking de vendas de louças de Kivotos todos os anos."
762300502-NameJp = "Cubo mágico de desenvolvimento cerebral"
762300502-DescriptionJp = "“Se você conseguiu resolver isso, você é um verdadeiro gênio da Millennium!” Um cubo mágico para especialistas, certificado pela Millennium Science School."
3238447321-NameJp = "Bolo inteiro grande"
3238447321-DescriptionJp = "Um bolo inteiro tão grande que só de olhar já dá para ficar satisfeito. A contagem de calorias está no verso, mas..."
1648390167-NameJp = "Convite para buffet de alta classe"
1648390167-DescriptionJp = "Um convite para desfrutar de um buffet luxuoso em um restaurante onde trabalham os melhores chefs de Kivotos. É extremamente caro se você tentar comprar."
1143324025-NameJp = "Vaso de planta carnívora"
1143324025-DescriptionJp = "Um vaso de planta carnívora que pessoas com gostos peculiares fazem fila para comprar. Dizem que o jeito que ela captura insetos é surpreendentemente fofo, ou talvez não."
1569225040-NameJp = "Vaso de desejos com aparência luxuosa"
1569225040-DescriptionJp = "Um vaso folheado a ouro que parece luxuoso à primeira vista. Por favor, note que não é possível tirar cartas dele."
2112008978-NameJp = "Caixa de música de corda"
2112008978-DescriptionJp = "Uma caixa de música de corda luxuosa com um toque vintage irresistível. Um item famoso entre os colecionadores."
2651867463-NameJp = "Lenço bordado"
2651867463-DescriptionJp = "Um lenço com bordados. O bordado simples exala uma beleza delicada."
3408710330-NameJp = "Enciclopédia"
3408710330-DescriptionJp = "Desde aquele 'negócio' que fecha o saco de pão de forma até aquele 'negócio' em formato de grama que vem na marmita. Tudo o que você quer saber está aqui dentro."
2665872474-NameJp = "O Suplemento"
2665872474-DescriptionJp = "Basta tomar um comprimido para sentir a energia subir! Um alimento saudável perfeito para presentear alguém especial."
922488053-NameJp = "Boia com estampa de verão"
922488053-DescriptionJp = "É verão! É praia! Então é hora da boia! Se você não sabe nadar, ou melhor, mesmo que saiba, isso é um item essencial. Afinal, nunca é demais se preparar para a segurança, e acima de tudo, esse design chique e fofo vai deixar a garota de biquíni ainda mais adorável!"
1777637643-NameJp = "Travesseiro de renda"
1777637643-DescriptionJp = "Um travesseiro de renda feito com materiais luxuosos. O design parece simples à primeira vista, mas, literalmente, os sonhos das garotas estão contidos nele."
2122048137-NameJp = "Street of Yankee Vol. 1"
2122048137-DescriptionJp = "O primeiro volume da famosa série Street of Yankee, conhecida pela frase: “Nós só temos lealdade e coragem!”. A série está sendo um sucesso, com comentários de que, ao contrário da aparência, o protagonista é surpreendentemente fofo."
3996150169-NameJp = "Samuella 'The Beyond'"
3996150169-DescriptionJp = "O perfume de altíssima qualidade lançado pela fabricante de cosméticos de luxo 'Samuella'. Um sucesso estrondoso famoso pelo slogan: 'Experimente uma vez e vista a adorabilidade em seu corpo', sendo uma das 12 obras-primas da Samuella criadas pelo lendário perfumista 'The Beyond'."
493877113-NameJp = "Artesanato de ovo retrô"
493877113-DescriptionJp = "Um objeto artesanal com corpo em formato de ovo, decorado com belas joias e padrões geométricos. Obviamente, nenhum pintinho nascerá se você aquecê-lo."
2812198344-NameJp = "Parfait ortodoxo de mil-folhas"
2812198344-DescriptionJp = "Um parfait vendido na famosa confeitaria Café Mille-Feuille de Trinity. A harmonia entre o sorvete macio, os doces empilhados, a calda, o chantilly e as frutas é simplesmente ortodoxa!"
610304186-NameJp = "A-Book Rare"
610304186-DescriptionJp = "Um notebook famoso que está no 'Top 3 de eletrônicos que as alunas de Kivotos mais desejam'. Um item de luxo considerável. Eu quero! Mas é caro!"
991149378-NameJp = "Pente estiloso"
991149378-DescriptionJp = "Um pente portátil com um design estiloso e luxuoso. Muito popular como presente."
18654891-NameJp = "Geleia vitamínica completa cheia de nutrientes"
18654891-DescriptionJp = "Uma geleia nutritiva que contém vitaminas completas. Vem com vários sabores de frutas, tornando o consumo divertido. Coma aos poucos e cuidado para não acabar tudo de uma vez!"
442885187-NameJp = "Bonsai de bordo de altíssima qualidade"
442885187-DescriptionJp = "Um bonsai de bordo de altíssima qualidade que acalma o coração só de olhar. A aparência das folhas, que mudam conforme as estações como se estivessem trocando de roupa, exala um clima elegante."
897935320-NameJp = "Kit de costura"
897935320-DescriptionJp = "Um kit de costura para especialistas, com ferramentas selecionadas para lidar com qualquer situação. Com isso, não há problema se a roupa rasgar ou se a meia furar!"
175940735-NameJp = "Ingresso para concerto de música"
175940735-DescriptionJp = "Um ingresso para concertos realizados periodicamente em Kivotos. Do clássico às músicas que estão na moda. O presente ideal para quem gosta de todos os tipos de música."
794340686-NameJp = "Conjunto de halteres 3 vezes ao dia"
794340686-DescriptionJp = "Um conjunto de produtos que contém vários halteres de pesos diferentes. Três vezes ao dia. Repita o treino de manhã, no almoço e à noite para construir músculos maravilhosos!"
1058688122-NameJp = "Jogo de tabuleiro 'A Vida'"
1058688122-DescriptionJp = "Um jogo de tabuleiro divertido onde você pode conseguir um emprego, ganhar na loteria e até viajar pelo espaço. Dizem que o resultado da roleta e dos dados, onde não se sabe o que acontecerá no próximo passo, é como a própria vida."
1404874799-NameJp = "Belo buquê de flores"
1404874799-DescriptionJp = "Um buquê feito de rubis para presentear alguém especial. As belas pétalas vermelhas conquistam o coração de quem recebe."
2205211310-NameJp = "Foto de Hatsune Miku"
2205211310-DescriptionJp = "Um cartão de foto especial distribuído no show da Hatsune Miku em Kivotos. O show foi um grande sucesso, tornando este um item raro que todo fã da Hatsune Miku deseja ter."
3401454433-NameJp = "Buquê Cintilante"
3401454433-DescriptionJp = "Um buquê feito de cristal, presenteado como lembrança para uma pessoa especial. Quando a luz bate nele, brilha como um caleidoscópio."
1668372693-NameJp = "Moeda de Exercício de Fogo"
1668372693-DescriptionJp = "Moeda que pode ser usada na loja de Exercícios de Fogo Conjuntos."
