1979335525-DescriptionJp = "Um cartão que pode ser comprado na loja de lembranças do museu da Wild Hunt. Dizem que também pode ser usado para jogos. Tem um design lindo."
1516051971-NameJp = "Tintas"
1516051971-DescriptionJp = "Tintas de uma marca com cores vivas, muito utilizadas pelos alunos. Existe uma lenda de que artistas pobres comiam tintas para suportar a fome, mas nunca tente fazer isso."
2738957566-NameJp = "Cubo de mármore"
2738957566-DescriptionJp = "Um cubo de mármore usado para esculturas. Tente esculpir seus sonhos nesta superfície branca e pura."
2117511996-NameJp = "Faixa para livros"
2117511996-DescriptionJp = "Uma faixa de couro para amarrar e carregar livros. Mostre casualmente o seu gosto literário."
3098422604-NameJp = "Bilhete de 10 recrutamentos"
3098422604-DescriptionJp = "Um bilhete para realizar 10 recrutamentos. *Se não for utilizado até às 23:59 do dia 30 de novembro de 2025, este bilhete desaparecerá."
2923013887-NameJp = "Arte para quem?"
2923013887-DescriptionJp = "Obtido no evento Arte para quem?"
1552509032-NameJp = "Basílica de Arius"
1552509032-DescriptionJp = "Conclua o Capítulo 2, Episódio 5 da Parte 1: Oratório dos Tempos Passados"
1286967671-NameJp = "Console de videogame antigo guardado com carinho"
1286967671-DescriptionJp = "O console que Momoi comprou pela primeira vez com sua irmã.\nO \"Plano de Transformação da Midori em Gamer\" parece ter sido um sucesso..."
2108207432-NameJp = "Boneca de festival antiga"
2108207432-DescriptionJp = "Uma boneca comprada no primeiro festival que Umika participou.\nFaz parte de um par."
2538736248-NameJp = "Medalha de jogo"
2538736248-DescriptionJp = "Uma medalha que Koyuki perfurou.\nFoi feita para jogar de graça, mas com o avanço da tecnologia, tornou-se inútil. Obviamente, é ilegal!"
2177848562-NameJp = "Enfeite de cabelo em forma de borboleta"
2177848562-DescriptionJp = "O enfeite de cabelo de Haruna.\nDizem que ela usa um enfeite diferente dependendo da situação, do humor e do significado por trás dele."
4073457417-NameJp = "Fragmento de Eleph de Miyo"
4073457417-DescriptionJp = "Um Fragmento de Eleph contendo o mistério de Miyo."
4187055741-NameJp = "Fragmento de Eleph de Fuyu"
4187055741-DescriptionJp = "Um Fragmento de Eleph contendo o mistério de Fuyu."
3646564332-NameJp = "Fragmento de Eleph de Ritsu"
3646564332-DescriptionJp = "Um Fragmento de Eleph contendo o mistério de Ritsu."
3334773599-NameJp = "Mesa de máquina de escrever"
3334773599-DescriptionJp = "Uma mesa feita para trabalhos de escrita com máquina de escrever. É difícil usá-la para outros fins, mas parece que isso não importa."
3798522794-NameJp = "Primeira obra do artista"
3798522794-DescriptionJp = "A primeira obra de um artista de mídia. Embora ele mesmo sinta vergonha dela, a paixão contida nela é admirável."
935541676-NameJp = "Bancada de escultura"
935541676-DescriptionJp = "Uma bancada para colocar peças de escultura. A aparência é grosseira, mas não falta nada para criar artes delicadas."
2957072884-NameJp = "Série Campus Wild Hunt"
2957072884-DescriptionJp = "Permite criar móveis de café (Série Campus Wild Hunt)."
3009779556-NameJp = "Caixa de sorteio da Série Campus Wild Hunt"
3009779556-DescriptionJp = "Ao usar, é uma caixa de sorteio que permite obter um dos móveis da Série Campus Wild Hunt com a mesma probabilidade."
625522421-NameJp = "Caixa de seleção da Série Campus Wild Hunt"
625522421-DescriptionJp = "Uma caixa de seleção que permite escolher e trocar por qualquer móvel da Série Campus Wild Hunt."
2670560256-NameJp = "Kee-kikiki... Tudo está pronto"
2670560256-DescriptionJp = "O servo leal de Ella, o mercador do mal Silver Plate! Ele é um vilão que aparece das fendas dimensionais para vender itens que trazem infelicidade às pessoas! Ele aparece como o vilão principal no spin-off 'Johnny Kivotos e a Magia do Rifle Antitanque', mas ele está muito forte! Ao contrário de sua aparência, parece que ele tem muitos fãs! Antigamente, muitos círculos participaram da feira de 'Maho-Reba'! Além disso, ao usar o poder da pirâmide, a maioria dos ataques não surte efeito. Ele é um oponente muito difícil! No episódio 11 da 2ª temporada, há uma cena em que Silver Plate esconde sua identidade e se transfere para outra escola, e lá, de repente—"
2818922347-NameJp = "Cura total com poder mágico!"
2818922347-DescriptionJp = "A mascote fofa da série 'Maho-Reba', Stanag-chan! Ela fez um contrato de Guarda Nacional Mágica com White e Pink, transformando as duas em garotas mágicas! Como ela é uma criança gentil e pura, ela é frequentemente sequestrada e intimidada pelo exército do mal liderado por Ella. Mas não se preocupe, ela é resistente e se recupera rápido! Ela é sempre uma criança alegre e robusta! Quando as duas estão em uma crise de vida ou morte, ela até fornece balas mágicas! Ela possui várias balas mágicas, como o Chip Verde, Chip Preto, e assim por diante! O episódio em que Stanag-chan desperta é muito emocionante... Acho que é o episódio 7 da 2ª temporada, onde Stanag-chan revela sua forma original—"
3074909671-NameJp = "Exército do mal, chegou a hora das trevas!"
3074909671-DescriptionJp = "Ella! Lembro-me de ter ficado com muito medo quando a vi pela primeira vez! A aparência dela é muito bonita, mas ela é a arqui-inimiga das Heavy Calibers! Quando vozes de amor e felicidade foram ouvidas na estrela sombria onde Ella vive, ela trouxe muitos subordinados e atacou! 'Vou fazer com que nunca mais emitam essas vozes!', ela dizia. É um problema, já que a risada dela também é barulhenta! De qualquer forma, graças aos esforços das Heavy Calibers, os planos de Ella sempre terminam em fracasso, mas ela é uma vilã terrível que nunca desiste! No filme 'Garotas Mágicas Heavy Calibers: Daisy Cutter', Ella perde a memória e aparece como uma funcionária comum trabalhando em uma livraria, mas lá, o passado de Ella é—"
907100893-NameJp = "Monroe Neumann! Jato Mágico!"
907100893-DescriptionJp = "Thermite Pink! A parceira confiável de White! O motivo de seu nome ser 'Pink', mas sua cor ser roxa é... Ah! Se eu disser mais, será um spoiler, então assista à obra original! Originalmente, Pink era isolada de todos ao seu redor e não tinha amigos, mas quando Ella atacou, ela admirou White, que a salvou, e acabou assinando um contrato como Guarda Nacional Mágica! E assim, elas se tornaram a melhor dupla de amigas da história das garotas mágicas! Enquanto atua com White, Pink recupera sua confiança através do amor, da amizade e do poder de fogo, transformando-se em uma personagem alegre! No episódio 6 da 3ª temporada, há um episódio em que ela se torna uma superestrela como ídolo de banda, mas—"
3133177365-NameJp = "Mensageira da paz! Deixe com a White!"
3133177365-DescriptionJp = "Thermite White é a protagonista da série 'Maho-Reba'! Originalmente, ela era uma garota um pouco desastrada e comum, mas um dia, quando estava em perigo devido ao ataque de Ella! Ela conhece Stanag-chan, a mascote que veio do Reino Mágico! Mesmo tremendo de medo, White, cheia de senso de justiça, assinou o contrato como Guarda Nacional Mágica e se tornou uma garota mágica! E então, Pink, que foi salva por White, também se tornou uma garota mágica, e as duas se tornaram as garotas mágicas da justiça que salvam o mundo, as 'Heavy Calibers'! No episódio 2 da 2ª temporada, há uma história sobre quando White encontrou a 'Dragon Skin'—"
