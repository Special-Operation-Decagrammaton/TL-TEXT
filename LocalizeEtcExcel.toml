3417345669-DescriptionJp = "Os fones de ouvido sem fio que viraram a nova sensação nas rodinhas pelas estudantes de Kivotos. Tentar comprar nas economias das mesadas apenas é o peso nas montanhas; nos estalos dos cálculos médios, isso consome de cara nos contos o dinheiro vindo duns trocados de um trabalho de meio período por quase 3 meses."
1575353856-NameJp = "Amor Proibido\n~A Beleza Mora no que não é Permitido~"
1575353856-DescriptionJp = "O mais recente da estrondosa obras-primas da fama nos romancistas na caneta do \"Koi-yo Koi\"! Um conto rodeado num polêmico de desdobrar as águas num amor que se bate as portas ao impossíveis e que de laços de estarem unidos será por sempre e para todo um amor proibido!"
3531188161-NameJp = "Revista de Games\n'Hit Girls'"
3531188161-DescriptionJp = "Absolutamente tudo que existe encontra o caminho pras linhas disso. Desde os estalos de rumores nos lançamentos de games pra as terras de Kivotos até os manuais da vitória em passar pros retrôs, além de contar sobre onde faturar os itens das franquias; uma revista e panfleto onde seja do assunto da telinha as soluções preenchem o que tu quer dar as batidas dos olhos."
812933091-NameJp = "Gloss Cherry Rose"
812933091-DescriptionJp = "Um lip gloss com o perfeito toque balanceado da linda harmonia que mistura a fofura numa vivacidade vibrante. Traz uma avassaladora ventania das modas que tá nas listas topo aos queridinhos pra as garotas que são das atenções em looks e belezas de ponta, o puro item dos 'em altas' da vez."
2902292788-NameJp = "BB Cream Iluminador e Transparente"
2902292788-DescriptionJp = "A peça que despencou como sucessos lá pela grife estelar na moda da 'Samuela'. O corretor de faces de BB cream que corrige nas beiradas o visual para trazer numa limpidez clareadora até a pura visibilidade nas testas de dar transparências na cor. Pela forma com o grude no tom adere, faz a simulações aos espetáculos de naturalidades nos ares do saudável (?) pelas atuações na face."
618503547-NameJp = "Trio de Cremes de Camuflagem Militar"
618503547-DescriptionJp = "O achado maravilhoso do estourinho das prateleiras criado a dedicação fina no Samuela, da alta marcas e encantos na grife! O aconchego e natural de que gruda com prazer aos forros na derme da sua face! A todo e qualquer cenário o disfarces do esquadrão pela make na pele da camuflagem está sempre lá pra ti! Leva nas estradas o jeito e rosto pras estampas de tua camuflagem pessoal aonde se depara!"
1773086852-NameJp = "Kit de Biscoitos Premium"
1773086852-DescriptionJp = "A delicada pureza gentil na adocicada de saberes dos divinos pela maestria na embalagem dos biscoitos de elite do Schrödinger. Pela probabilidade razoável, se encontrar duns itens completamente diferentes tomando espaços invés das roscas lá por trás das cascas das embaladas. Mas pelo mistério do abrir não abrir a tampa os ares da possibilidade de colapso de incertezas não estarão lá se definindo o destino com exatidões."
2238627204-NameJp = "'Armas, Fofuras e a Juventude'"
2238627204-DescriptionJp = "Armamento com doçura e os encontros recheados no frescor da juventudes. As obras colossais das massas na popularidade estéticas nas tradições de Kivotos batem em peso aqui com a voltas daquelas saudosas essências nos ares cravando-o de vez nas prateleiras dos top vendas nos hits das leituras durante esse ano da vez."
346808410-NameJp = "Telescópio Astronômico"
346808410-DescriptionJp = "A lunetas padrão com estritos de aprovações oficiais tomadas nas diretrizes dos encarregados pelas alas a ser usos nos registros na base para o Associação Astronômica de Kivotos."
3391000326-NameJp = "Game Girl Color: Edição de Retorno"
3391000326-DescriptionJp = "'Reviva e pinte o cenário nas tonalidades na rotinas pro encanto na tela mais uma só vez' A maravilha daquele aparelhinhos na mão pra jogatinas onde explodiam por onde se andava que bateu ventanias pra arrasar corações, o eterno 'Game Girl Color' nos moldes reimaginados pro seu relançamento em mãos!"
2936755317-NameJp = "Ração MX Tipo C Sabor Sobremesa"
2936755317-DescriptionJp = "A potência no fardo se dá pelos punhos de gordice nas caloria!"
1249782817-NameJp = "Ramune de Garrafa Sabor Matcha"
1249782817-DescriptionJp = "A doçura singular com uns traços nas beiradas ao sabor que dão de prender a sua boca por mais, uma engarrafadinha e borbulhantes de soda nos toques de matcha nela. A sensação do flutuar aos ares numa encruzilhada dum sentir tão revitalizador e ao igual se aprofundando nos toques duma suavidade sutil nos estralos."
2902432180-NameJp = "Travesseiro Jelly's"
2902432180-DescriptionJp = "As carinhas do protagonismo nas paradas do aclamado da sériezinha 'Full Jelly' tomam vida com força pros brinquedinhos à mão das pessoas pela primeira na vida da fã base! Os comportamentos nas animações na união e grudes pro bando da mesma da coloração no estilhaço delas foi retratado também com toda perfeição pro detalhe aos pontinhos nos fiéis da essências originais do jogo!"
1148052880-NameJp = "O Coelho Detetive Saltitante\n~A Queda nas Termas Cobertas pela Neblina~"
1148052880-DescriptionJp = "Aquelas puríssimas presenças de branquinhos ouvidos do faro esticados lá ao alto dão das pregações pro aviso nas incansáveis que os rastros num crimes do passo a bater num errinhos nem pensam no sumir sob sua guarda dos faros nela! O volume da fase três do lendário clássico do detetive coelhinhos está lançado pro salto nas mãos! Nas encruzilhadas aos próximos no horizonte das neblinas, será o palco ao estourar de investigação e cenas cravado com os palcos pro calor do piscinas termais!"
1561623078-NameJp = "O-Fit"
1561623078-DescriptionJp = "'Suando e curtindo na batida das emoções pelas peripécias da rotina nos games de casa a malhar!' O jogo na qual o aproveitamento na esticada nas voltinhas pela forma duma ferramenta 'O-Ring' pro círculos dão a liberdade pra desfrute dum correr livre das academias direto nos pés do quarto em casa pro conforto e agrado duma maravilha aos esportistas no casual e pra as lutas do peso. Não esquenta nas preocupações a onde recair em malhação da pura suadeira muscular ou pra triturar os balanços numa metas das dieta, manda pro campo dele que o estralo é de confiança garantida pras soluções ali em que a magia da bola redonda resolve pelas ordens dele!"
293569137-NameJp = "Mapa dos Tesouros Enterrados"
293569137-DescriptionJp = "Vai, pode procurar neles que a fonte da vida e os maravilhosos encantos pras fortunas estarão sob o repouso ali em que se ditar no rabiscos as terras! Um papel que soltam as bocas pro espalhamento das conspiração nas fofocas pelo que falam ter sob os encostos em marcas dos pontinhos ali pras exatas do esconderijos lá do Top e Famosos Três Gigantes dos Encostos da Tesourarias Escondidos pra Baixo Das Terras no mundo inteiro em Kivotos. No acaso de tudo, pra achar duma venda na vitrine pros estúdios das comércios ao teus cantos é das comuns encontrar de boa aos ares."
3310161849-NameJp = "Óculos Espiralados de Cosplay"
3310161849-DescriptionJp = "Dá de usar que os contornos pros ventos virão bater que sua imagem é a perfeição pra um doutor do grau em uma pureza genial dos espertos... de ver pra crer nas brincadeiras com essas suposições nos teus olhos. ※Aviso e Notas em parênteses pra ti: As aparências na lentes não te empurram e sobem teus QI numa mísera elevações na tua vida ao botar e escorar no rosto ali."
1301636205-NameJp = "A Caixa de Engenhocas Mais Inútil do Mundo"
1301636205-DescriptionJp = "No rol das competências das prestações não cumpre nadinha... mas a doçura do jeito lá preenchem de tanto as aparências fofinhas nele! Se as do utilitário perdem o estralo sem entregar as metas lá pra ser no agir, o fofo transborda e dá as certezas! Foi pro agrado de uma lindeza numa brincadeiras e causou alvoroços que varreram as fileiras de subir nos top cinco do encanto pros brinquedos pro estalos do dar as maravilhas na datas do comemora nas celebrações da ocasião especiais ali."
535298119-NameJp = "Ursinho de Pelúcia com Lacinho"
535298119-DescriptionJp = "Nas banalidades de as rotinas ordinária dos fofos o abraço de ter um mascote que atrai a todos na sua aura cativante e de aquecer pro afeto nos encontros num bonequinhos. Na trupe do clube aos admiradores e aficionados no lindo da beleza as mercadorias desta assinatura a ter sido fabricadas pelos encantos duma fabricações em que detêm por excelências uma marca com os altos de a moral numa boa parcela de fama."
3961391528-NameJp = "Ingressos de Cinema Antecipados para Dois"
3961391528-DescriptionJp = "'Eu tinha uns ingressos sobrando aqui de bobeira, quer ir assistir junto?' Dois ingressos que rodam em qualquer rede de cinemas. E não, o seu acompanhante não tem que ser namorado ou namorada."
2944986556-NameJp = "Conjunto de 30 Cores de Tinta"
2944986556-DescriptionJp = "Um conjunto de tintas com 30 tons, muito utilizado por mestres da arte. Invista neste kit e pinte um universo novo em folha!"
4077917950-NameJp = "Coleção de Poesias Clássicas"
4077917950-DescriptionJp = "Uma antologia poética clássica com um toque rústico fascinante que gruda em você. Trará à tona aquela nostalgia melancólica e sublime pro seu peito."
3946342470-NameJp = "Kit de Talheres Fofinhos"
3946342470-DescriptionJp = "Um kit de talheres carimbados com as carinhas dos mascotes. Um campeão de vendas que sempre figura no Top 10 em Kivotos todos os anos."
762300502-NameJp = "Cubo Mágico para Desenvolvimento Cerebral"
762300502-DescriptionJp = "'Se você conseguir resolver isso, é digno de entrar na Millennium!' O cubo mágico avançado oficializado e aprovado pela Escola de Ciências Millennium."
3238447321-NameJp = "Bolo Inteiro Gigante"
3238447321-DescriptionJp = "Um bolão que só de olhar já te deixa cheio. Embora tenha uma tabelinha de calorias na parte de trás..."
1648390167-NameJp = "Convite de Buffet de Alta Classe"
1648390167-DescriptionJp = "Um convite que garante acesso ao buffet recheado com os chefs do mais altíssimo gabarito de Kivotos. Comprá-lo por vias normais vai esvaziar a sua carteira."
1143324025-NameJp = "Vaso de Planta Carnívora"
1143324025-DescriptionJp = "Um vaso de plantas carnívoras muito cobiçado por pessoas de gostos peculiares. A visão da planta capturando um inseto divide opiniões se é adorável ou assustadora."
1569225040-NameJp = "Pote dos Desejos de Luxo"
1569225040-DescriptionJp = "Um jarro envolto em folhas de ouro de uma extravagância que salta aos olhos. Lembre-se de que ele não concede desejos nem dá cartas."
2112008978-NameJp = "Caixa de Música à Corda"
2112008978-DescriptionJp = "Uma caixinha de música com um ar vintage irresistível. Um item bastante famoso entre os colecionadores."
2651867463-NameJp = "Lenço com Bordado"
2651867463-DescriptionJp = "Um lenço enfeitado com costuras. Um bordado simplório que emite vibrações de uma beleza mais intimista."
3408710330-NameJp = "Enciclopédia"
3408710330-DescriptionJp = "Do 'bagulhinho' que preza fechar o saquinho de pão, até aquele 'verdinho' de plástico metido no meio dos bentôs. As respostas para todos os seus dilemas repousam nestas páginas."
2665872474-NameJp = "O Suplemento"
2665872474-DescriptionJp = "Engula apenas um único comprimido e sinta a força! O tônico perfeito para agraciar os seus entes queridos com um presente de bem-estar."
922488053-NameJp = "Boia com Estampa de Verão"
922488053-DescriptionJp = "Verão chegou! E com ele, o mar! E com ele, as boias salva-vidas! Quer você pareça uma pedra afundando ou uma sereia das águas, isso deve te acompanhar para todo lado. É sempre bom prezar pela segurança, e acima de tudo, o design colorido vai deixar as garotas em trajes de banho ainda mais adoráveis!"
1777637643-NameJp = "Travesseiro de Renda"
1777637643-DescriptionJp = "Um travesseiro de rendas construído a partir de materiais da mais rica exuberância. Pode parecer simples à primeira vista, mas carrega literalmente os sonhos das garotas."
2122048137-NameJp = "Street of Yankee, Vol. 1"
2122048137-DescriptionJp = "A série revolucionária dos mangás 'Street of Yankee', famosa pela frase: 'Só nos resta honra e coragem!'. Diferente da aparência bruta, a fofura surpreendente do protagonista faz com que a série siga batendo recordes de vendas."
3996150169-NameJp = "'The Beyond' by Samuela"
3996150169-DescriptionJp = "O perfume supremo da grife cosmética 'Samuela'. Um verdadeiro sucesso famoso pelo slogan: 'Dê uma chance e vista-se de amor', sendo uma das doze obras-primas concebidas pelo perfumista inigualável conhecido como 'The Beyond'."
493877113-NameJp = "Artesanato Retrô em Forma de Ovo"
493877113-DescriptionJp = "Uma peça decorativa na forma de ovo coberta por belas pedras preciosas e padrões geométricos. Obviamente, se você o chocar, nenhum pintinho nascerá dele."
2812198344-NameJp = "Parfait Ortodoxo do Mille-Feuille"
2812198344-DescriptionJp = "O famoso parfait servido na doceria Café Mille-Feuille em Trinity. As camadas de doces, xarope, chantilly e frutas sobrepostas ao sorvete macio criam a harmonia de um autêntico parfait ortodoxo!"
610304186-NameJp = "A~Book Leah"
610304186-DescriptionJp = "O aclamado notebook que figura no 'Top 3 dos eletrônicos mais cobiçados pelas estudantes de Kivotos'. Um item de extremo luxo. Eu quero! Mas continua sendo muito caro!"
991149378-NameJp = "Pente Elegante"
991149378-DescriptionJp = "Um pente portátil com um design elegante e luxuoso. É uma excelente opção para presentes."
18654891-NameJp = "Gelatina Multivitamínica Repleta de Nutrição"
18654891-DescriptionJp = "Uma gelatina nutritiva repleta de vitaminas. Comer essas gomas sortidas de frutas traz muita alegria, mas tome cuidado para não engolir o pacote inteiro sem perceber!"
442885187-NameJp = "Bonsai de Bordo da Mais Alta Qualidade"
442885187-DescriptionJp = "Um maravilhoso bonsai de bordo de primeira linha que traz calma só de admirar. As folhas mudando de cor e se transformando com as estações transmitem uma aura poética."
897935320-NameJp = "Kit de Costura"
897935320-DescriptionJp = "Um kit de costura avançado equipado com ferramentas prontas para enfrentar as mais variadas situações. Ter isto em mãos significa não ter do que se preocupar caso uma roupa rasgue ou uma meia fure!"
175940735-NameJp = "Ingresso de Concerto"
175940735-DescriptionJp = "O ingresso de um concerto realizado periodicamente em Kivotos. Da música clássica aos hits do momento. Um presente inigualável para quem curte a música não importando as barreiras e ritmos."
794340686-NameJp = "Conjunto de Halteres 3 Vezes ao Dia"
794340686-DescriptionJp = "Um kit equipado com um amontoado de pesos de cargas diversas. Três vezes no percurso de um dia. Repetir e voltar pro treino do bater no ferro da manhã à tarde até as vias de escurecer pra erguer e moldar os teus belos músculos!"
1058688122-NameJp = "Jogo de Tabuleiro 'O Jogo da Vida'"
1058688122-DescriptionJp = "O divertido de descontrair tabuleiro que te leva aos palcos dos empregos no mercado, dar uma estourada na loteria ou de bônus flutuar em turismo intergaláctico. O inconstante bater e virar nos rolagens dos dados que se transformam de partida em partidas se reflete e bate à porta das incertezas assim que uma vida."
1404874799-NameJp = "Belo Buquê de Flores"
1404874799-DescriptionJp = "Um buquê elaborado com rubis para a entrega a entes queridos e pessoas especiais. A delicadeza nas pétalas reluzindo nos seus vermelhos agarram por vez os corações e intenções de que recebem de um jeitinho apaixonante."
2205211310-NameJp = "Fotocard da Hatsune Miku"
2205211310-DescriptionJp = "Uma peça nos cartões fotográficos super especial distribuído no concerto feito em palco de Kivotos pela própria Hatsune Miku. Os encerramentos das performances do seu concerto em estrondos nos encerramentos fez dela uma jóia que bate em desejo ao coração e na vida dos aficionado nela por aí."
3401454433-NameJp = "Buquê Cintilante"
3401454433-DescriptionJp = "Um arranjo montado de cristais pras dádivas comemorativas que marcam as doações de presença a especiais entre todas. Bater as cintilações num reflexo o sol faz despencar um mar de arco íris reluzente nos ares a de estilhaçar nas beiradas feito num caleidoscópio nas vistas."
1668372693-NameJp = "Moeda de Exercício de Fogo"
1668372693-DescriptionJp = "Uma moeda que pode ser usada na Loja do Exercício de Fogo Conjunto."
