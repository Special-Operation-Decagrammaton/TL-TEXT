358559959-NameJp = "本館"
358559959-DescriptionJp = "温泉郷を訪れたお客様が最初に来る場所です。主にお客様の予約を確認する場所ですが、軽い休息を取ることができる施設などもあります。"
2825548492-NameJp = "大浴場"
2825548492-DescriptionJp = "大人数で同時に温泉を楽しむことができる大浴場です。幾つもの温泉があり、それぞれ温度や成分などが異なっています。"
2481788820-NameJp = "客室"
2481788820-DescriptionJp = "畳や座椅子などがあり、風情が感じられる客室です。布団などの寝具は毎日ノドカが綺麗に整えています。"
3141924738-NameJp = "休憩所"
3141924738-DescriptionJp = "温泉から上がった後、ゆっくりすることができる休憩所です。卓球台やマッサージチェアなどが完備されており、宿泊客であれば自由に使うことができます。"
384904434-NameJp = "宴会場"
384904434-DescriptionJp = "大人数で食事を楽しむことができる、大規模な宴会場です。内装は綺麗なのですが、食事にはあまり期待しない方が良いかもしれません。"
1433250290-NameJp = "露天風呂"
1433250290-DescriptionJp = "雪景色を眺めながら入れる露天風呂です。時々山から降りてきた野生動物と遭遇することもあるとか。"
4060632693-NameJp = "別館"
4060632693-DescriptionJp = "VIPの方のために用意された別館です。本館などから離れた場所にあるので、静かで贅沢な時間を過ごすことができます。"
4194626497-NameJp = "庭園"
4194626497-DescriptionJp = "石や砂で作られた枯山水の庭園です。ノドカが毎日丁寧にお手入れをしています。"
3675272134-NameJp = "運営本部"
3675272134-DescriptionJp = "大運動会の運営全般を担当している運営本部です。競技はもちろん、露店の登録や管理もここで行われています。"
1884871261-NameJp = "トラック"
1884871261-DescriptionJp = "スタジアムの郊外に沿って作られたコースです。障害物競走に使用される爆弾でも消えないよう丈夫な素材で舗装されています。"
2410805514-NameJp = "体育倉庫"
2410805514-DescriptionJp = "大運動会の小道具を保管する倉庫です。施錠されると中からは開けられないので、閉じ込められないよう注意が必要です。"
2074635724-NameJp = "観客席"
2074635724-DescriptionJp = "スタジアムの2階に作られた観客席です。学生間の応援合戦がヒートアップしすぎないよう、座席は学園別になっています。"
830995934-NameJp = "グラウンド"
830995934-DescriptionJp = "スタジアムの中心に位置する広々としたグラウンドです。人工芝ですが、ミレニアムの技術のおかげで天然芝以上にふわふわで優しく感じられるそうです。"
2054928448-NameJp = "大型倉庫"
2054928448-DescriptionJp = "大運動会で使われる重い資材や重機を保管する倉庫です。基本的な工具も揃っているので、軽い修理はこちらで行えます。"
1757505051-NameJp = "放送室"
1757505051-DescriptionJp = "大運動会の競技を鮮やかに中継できる放送室です。審判の誤審を防ぐためのリプレイ機能も提供しています。"
1079056613-NameJp = "休憩室"
1079056613-DescriptionJp = "選手や観客が自由に使える休憩室です。コーヒーマシンとドリンクディスペンサーが設置されています。"
3239184876-NameJp = "ヴァルキューレ警察学校シラトリ支所"
3239184876-DescriptionJp = "ヴァルキューレ警察学校の支所です。緑豊かな緑地に囲まれ、特に空気がとても良いそうです。"
2322223304-NameJp = "コーギータウン"
2322223304-DescriptionJp = "有名な電気商店街です。既に廃盤になっているものを除けば何でも手に入るという噂が流れています。"
1462360932-NameJp = "トライスクエア"
1462360932-DescriptionJp = "憩いの場としても、出会いの場としても使われる広場です。散歩にもってこいの場所です。"
4293010634-NameJp = "第3業務地区"
4293010634-DescriptionJp = "トライスクエアの隣に位置する業務地区です。モダンで洗練された空間で、道路と建物が美しく調和しています。"
1977010791-NameJp = "プラドアベニュー"
1977010791-DescriptionJp = "美術館が位置している通りです。美術館も素晴らしいですが、街全体が芸術の街となっています。"
1729072075-NameJp = "シラトリ近隣公園"
1729072075-DescriptionJp = "公園の規模に比べて訪れる人が多くない方ですが、それでもなくてはならない場所です。"
2590301450-NameJp = "鐘崎港"
2590301450-DescriptionJp = "海が見たいなら、ここに行くのも良いでしょう。もしかしたら想像していた光景ではないかもしれませんが。"
4121383175-NameJp = "ラミニタウン"
4121383175-DescriptionJp = "各学園のグルメスポットに勝るとも劣らない食堂街です。狭い川の両側に無数の屋台や飲食店が並んでいます。"
