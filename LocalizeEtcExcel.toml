2336304110-DescriptionJp = "Um orbe místico capaz de fortalecer equipamentos."
3590797977-NameJp = "Cano de Arma Enferrujado"
3590797977-DescriptionJp = "Peça tubular por onde passam as balas disparadas. Talvez por ter sido mal armazenada, está cheia de ferrugem. Pode ser usada para fortalecer armas únicas."
528434676-NameJp = "Tênis Rosa"
528434676-DescriptionJp = "Tênis rosa lançado pela marca de roupas esportivas 'Serval'. Como utiliza material macio no interior, é ideal para corridas."
4067164356-NameJp = "Botas de Pele"
4067164356-DescriptionJp = "Botas da marca de artigos para atividades ao ar livre 'Manaslu'. Além do design adorável, possuem excelente isolamento térmico, sendo muito populares entre as estudantes de regiões frias."
3223551422-NameJp = "Chinelo do Pinky Paca"
3223551422-DescriptionJp = "Chinelo com o tema do Pinky Paca, a alpaca rosa dos 'Momo Friends'. É fofinho e possui um bom isolamento térmico."
2109585756-NameJp = "Mocassim de Verniz Antigo"
2109585756-DescriptionJp = "Mocassim usado pelas estudantes da Academia Trinity. Com acabamento em verniz, a ponta do sapato brilha ao receber luz."
997278570-NameJp = "Botas de Combate"
997278570-DescriptionJp = "Botas de combate feitas com material grosso e resistente para proteger os pés. Como o calcanhar é elevado, também funcionam como sapatos de aumento de altura, sendo muito usadas por estudantes que querem parecer mais adultas ou que se preocupam com a estatura."
1477837784-NameJp = "Sapato de Salto"
1477837784-DescriptionJp = "Salto alto que combina fofura e simplicidade. Ao caminhar com ele, o andar parece um pouco mais elegante que o habitual."
134212594-NameJp = "Tênis Casual"
134212594-DescriptionJp = "Tênis de design simples. Leve e com bom ajuste, é aprovado por muitas estudantes."
2721346391-NameJp = "Botas de Montanhismo Impermeáveis"
2721346391-DescriptionJp = "Botas de montanhismo feitas de borracha natural com revestimento impermeável, oferecendo excelente respirabilidade e durabilidade. Mesmo se cair na água, a superfície não molha."
2753922894-NameJp = "Cano de Arma Comum"
2753922894-DescriptionJp = "Peça tubular por onde passam as balas disparadas. Está em condições normais e bem conservada, como nova. Pode ser usada para fortalecer armas únicas."
3047737247-NameJp = "Cano de Arma de Cromo"
3047737247-DescriptionJp = "Peça tubular por onde passam as balas disparadas. Feita de liga de cromo, é resistente e não enferruja. Pode ser usada para fortalecer armas únicas."
3465834983-NameJp = "Cano de Arma de Titânio"
3465834983-DescriptionJp = "Peça tubular por onde passam as balas disparadas. Feita de liga de titânio, é resistente e leve. Pode ser usada para fortalecer armas únicas."
1498728523-NameJp = "Percussor Enferrujado"
1498728523-DescriptionJp = "Peça de metal usada para causar impacto na espoleta da bala. Talvez por ter sido mal armazenada, está cheia de ferrugem. Pode ser usada para fortalecer armas únicas."
1750123462-NameJp = "Bolsa Esportiva Impermeável"
1750123462-DescriptionJp = "Bolsa esportiva impermeável produzida pela 'Serval'. Feita de material que não absorve água, é segura para levar a rios ou praias."
2248449388-NameJp = "Bolsa para Regiões Frias"
2248449388-DescriptionJp = "Bolsa para regiões frias produzida pela 'Manaslu'. O forro é feito de material grosso, mantendo bebidas e outros itens bem aquecidos."
4159521152-NameJp = "Bolsa do Peroro"
4159521152-DescriptionJp = "Bolsa com o Peroro estampado em destaque. Possui um amplo espaço de armazenamento e é popular até entre pessoas que não são fãs do Peroro."
940066526-NameJp = "Bolsa Escolar Azul-Marinho"
940066526-DescriptionJp = "Bolsa escolar feita de acordo com o regulamento da Academia Trinity. Seu design simples e sofisticado é muito popular até entre estudantes de outras escolas."
3539400576-NameJp = "Mochila Escolar de Combate"
3539400576-DescriptionJp = "Mochila escolar especial da empresa 'Kazeyama', com funcionalidade e armazenamento aprimorados. Parece ser muito bem recebida por estudantes que desejam carregar muitas armas pequenas."
4276374506-NameJp = "Bolsa Tote de Asas de Demônio"
4276374506-DescriptionJp = "Bolsa tote com grandes asas desenhadas. Possui um design relativamente simples, combinando perfeitamente com roupas casuais."
1637503010-NameJp = "Bolsa de Rua"
1637503010-DescriptionJp = "Bolsa de estilo urbano que adiciona praticidade a um visual casual. Por ter bastante espaço, é muito usada por várias estudantes."
3101552643-NameJp = "Bolsa de Ombro com Estampa de Borboleta"
3101552643-DescriptionJp = "Bolsa de ombro com uma grande borboleta desenhada. Como é feita de material leve, não causa desconforto ao ser levada em viagens."
1441450061-NameJp = "Percussor Comum"
1441450061-DescriptionJp = "Uma peça de metal usada para causar impacto na espoleta de uma bala. Foi preservada em condições normais e adequadas, como se fosse nova. Pode ser usada para fortalecer armas únicas."
1068433115-NameJp = "Percussor de Cromo"
1068433115-DescriptionJp = "Uma peça de metal usada para causar impacto na espoleta de uma bala. Feita de liga de cromo, é resistente e não enferruja. Pode ser usada para fortalecer armas únicas."
1300399581-NameJp = "Percussor de Titânio"
1300399581-DescriptionJp = "Uma peça de metal usada para causar impacto na espoleta de uma bala. Feita de liga de titânio, é resistente e leve. Pode ser usada para fortalecer armas únicas."
2140743564-NameJp = "Distintivo de Metal da Serval"
2140743564-DescriptionJp = "Distintivo com o logotipo da famosa marca de roupas esportivas 'Serval'. Feito de metal resistente, não há preocupação com desgaste, mesmo sob o suor e a paixão da juventude."
1505921304-NameJp = "Distintivo de Feltro da Manaslu"
1505921304-DescriptionJp = "Distintivo com o logotipo da marca de artigos para atividades ao ar livre 'Manaslu'. Por ser feito de feltro macio, há pouca preocupação com deformações, mesmo com grandes mudanças de temperatura."
3033340240-NameJp = "Distintivo do Pinguim Bravo"
3033340240-DescriptionJp = "Um distintivo com o Pinguim Bravo dos 'Momo Friends'. Se você ficar olhando por muito tempo, pode começar a se sentir mal..."
344772093-NameJp = "Distintivo Bordado da Veronica"
344772093-DescriptionJp = "Um distintivo com o logotipo da famosa marca 'Veronica' bordado. Qualquer produto pronto parece um item de luxo quando você coloca isso nele."
2127407973-NameJp = "Emblema da Kazeyama"
2127407973-DescriptionJp = "Um emblema com o logotipo da marca especializada em artigos militares 'Kazeyama'. Usando o fecho de contato na parte de trás, pode ser facilmente fixado em roupas e outros itens."
3784559011-NameJp = "Distintivo da Coco Devil"
3784559011-DescriptionJp = "Um distintivo prateado com o logotipo da marca de moda gótica 'Coco Devil'. Usando o alfinete na parte de trás, pode ser usado como um broche."
589220143-NameJp = "Distintivo de Rua"
589220143-DescriptionJp = "Um novo distintivo da marca de moda urbana 'Triple Step'. A ousadia de ter o nome da empresa impresso em destaque no centro revela a confiança do criador."
49559053-NameJp = "Distintivo Lorelei"
49559053-DescriptionJp = "Um distintivo lançado pela marca de moda moderna 'Lorelei'. Como é feito de madeira maciça com um acabamento requintado, dizem que a superfície é lisa e tem um aroma agradável."
1494732916-NameJp = "Faixa de Cabelo para Tênis"
1494732916-DescriptionJp = "Uma faixa de cabelo para tênis lançada pela marca de roupas esportivas 'Serval'. Feita de material de alta absorção para evitar que o suor durante o exercício caia nos olhos."
3940891435-NameJp = "Scrunchie"
3940891435-DescriptionJp = "Um scrunchie feito de material de cetim com excelente elasticidade. Ao comer caldos quentes ou lámen, recomenda-se prender o cabelo com este scrunchie."
3392023658-NameJp = "Grampo de Cabelo da Momo"
3392023658-DescriptionJp = "Um grampo de cabelo com um broche em formato do ícone do 'Momo Talk'. Se você esfregar o broche, ele exala um leve aroma de pêssego."
2520092463-NameJp = "Grampo de Cabelo de Asa"
2520092463-DescriptionJp = "Um grampo de cabelo produzido pela famosa marca 'Veronica' com o motivo de asas de anjo. Parece não ser muito popular entre as alunas de Trinity."
765040081-NameJp = "Grampo de Cabelo Multiuso"
765040081-DescriptionJp = "Um grampo de cabelo multiuso que pode ser usado como abridor de garrafas ou canivete em caso de emergência, já que um dos lados é polido e afiado. Tenha cuidado, pois você pode acabar se cortando ao tentar usá-lo normalmente."
277995823-NameJp = "Grampo de Cabelo de Morcego"
277995823-DescriptionJp = "Um grampo de cabelo com asas de morcego que também parece um laço preto. Apenas usá-lo confere um charme de diabinha."
1353993108-NameJp = "Grampo de Cabelo de Caligrafia"
1353993108-DescriptionJp = "Um grampo de cabelo com design de letras. A sequência de caracteres em si não tem significado, mas o design é algo que faz o coração bater mais forte."
3000997093-NameJp = "Grampo de Cabelo de Folha"
3000997093-DescriptionJp = "Um grampo de cabelo em formato de folha. É um pouco difícil de usar no dia a dia, mas seria bom para um dia em que você quer se arrumar."
3948898300-NameJp = "Amuleto de Segurança no Trânsito"
3948898300-DescriptionJp = "Um amuleto com orações por segurança no trânsito para evitar acidentes. Ao sacudi-lo, ouve-se um som metálico vindo de dentro."
2028861040-NameJp = "Aquecedor de Mãos"
2028861040-DescriptionJp = "Um aquecedor do tamanho da palma da mão que esquenta ao ser esfregado ou sacudido. Em ambientes de frio extremo, não há nada mais confiável que isso."
1207585231-NameJp = "Amuleto do Peroro"
1207585231-DescriptionJp = "Um amuleto com uma grande pena branca. A origem da pena é considerada informação confidencial."
3129277640-NameJp = "Cruz"
3129277640-DescriptionJp = "Um amuleto em formato de cruz, muito usado pelas alunas de Trinity. Dizem que também é perfeito como acessório para pendurar na bolsa."
1991164124-NameJp = "Daruma de Camuflagem"
1991164124-DescriptionJp = "Um daruma com estampa de camuflagem. Ele se mistura naturalmente ao fundo onde quer que seja colocado, mas é um pouco assustador quando está em todo lugar."
237084781-NameJp = "Boneco Amaldiçoado"
237084781-DescriptionJp = "Um boneco amaldiçoado que parece conter emoções fortes, como ressentimento. Parece ser útil como alfineteiro, sendo muito popular entre as alunas do clube de artesanato."
3113501019-NameJp = "Desodorante de Bolso"
3113501019-DescriptionJp = "Desodorante portátil criado em colaboração com a marca de cosméticos funcionais \"Seaside\". Devido ao seu design moderno, muitas alunas o utilizam como acessório, prendendo-o em chaveiros."
3888622253-NameJp = "Apanhador de Sonhos"
3888622253-DescriptionJp = "Um objeto com significado místico, dito ser capaz de dissipar pesadelos. Ao cheirá-lo, sente-se um aroma agradável característico da madeira."
727987239-NameJp = "Relógio Digital"
727987239-DescriptionJp = "Relógio digital da marca de roupas esportivas \"Serval\". Como é à prova d'água, pode ser usado até mesmo ao nadar."
111602846-NameJp = "Relógio de Couro"
111602846-DescriptionJp = "Relógio da marca de artigos para atividades ao ar livre \"Manaslu\". Por ser feito de couro, não há preocupação com o pulso esfriando onde ele é usado."
2073706703-NameJp = "Relógio do Gato Ondulado"
2073706703-DescriptionJp = "Um relógio de pulso com o personagem \"Gato Ondulado\" da \"Momo Friends\". Como os braços do Gato Ondulado servem como ponteiros, é possível vê-los se contorcendo de forma estranha conforme o tempo passa."
1058159756-NameJp = "Relógio de Bolso Antigo"
1058159756-DescriptionJp = "Um relógio de bolso antigo com o logotipo da \"Veronica\" gravado. Embora seja menos prático para verificar as horas do que um relógio de pulso, é muito popular como item de moda."
3773560632-NameJp = "Relógio à Prova de Poeira"
3773560632-DescriptionJp = "Relógio à prova de poeira fabricado pela marca especializada em artigos militares \"Kazeyama\". Pode ser usado em ambientes hostis sem medo de falhas."
2415212758-NameJp = "Relógio Estilo Gótico"
2415212758-DescriptionJp = "Um relógio de pulso com design gótico. Embora combine muito bem com roupas clássicas, tem o ponto fraco de ser difícil de ler as horas se você não estiver acostumado."
3475264813-NameJp = "Relógio de Moda Urbana"
3475264813-DescriptionJp = "Um relógio de moda urbana popular por seu design moderno e fofo. Dizem que a \"Triple Step\" planeja uma estratégia de vender este relógio em conjunto com pulseiras."
2321708498-NameJp = "Relógio Lorelei"
2321708498-DescriptionJp = "Relógio de pulso lançado pela marca de moda moderna \"Lorelei\". O design sofisticado, que utiliza madeira e couro, cria uma atmosfera única."
1506609692-NameJp = "Colar Bluetooth"
1506609692-DescriptionJp = "Um colar equipado com função Bluetooth que pode medir a temperatura corporal e a frequência cardíaca de quem o usa. Como permite monitorar facilmente a quantidade de exercícios, é muito usado por quem deseja fazer dieta. É chamado de \"item essencial para dieta\", mas será que chegará o dia em que poderão tirá-lo com um sorriso?"
3750431669-NameJp = "Pingente de Flor de Neve"
3750431669-DescriptionJp = "Um pingente prateado com um ornamento em formato de floco de neve. Olhar para ele por muito tempo traz uma sensação de paz."
4279598505-NameJp = "Pingente de Medalhão do Nikolai"
4279598505-DescriptionJp = "Um pingente de medalhão que parece ter o rosto do personagem \"Sr. Nikolai\" da \"Momo Friends\" pendurado. Ao pressionar o nariz, abre-se um pequeno espaço para colocar fotos."
2508370757-NameJp = "Gargantilha de Cruz"
2508370757-DescriptionJp = "Uma gargantilha com um ornamento de cruz, lançada pela famosa marca \"Veronica\". É muito popular por seu design simples, porém sofisticado."
1517613390-NameJp = "Placa de Identificação (Dog Tag)"
1517613390-DescriptionJp = "Uma placa de identificação gravada com o número de matrícula e o nome. Recentemente, começou a ganhar grande popularidade entre as estudantes do ensino médio."
1964406377-NameJp = "Gargantilha Punk"
1964406377-DescriptionJp = "Uma gargantilha estilo punk adornada com espinhos afiados. Usá-la no pescoço torna um pouco difícil acenar com a cabeça."
2501983868-NameJp = "Colar de Corrente"
2501983868-DescriptionJp = "Um colar feito de correntes. As opiniões se dividem: algumas alunas acham o som metálico agradável, enquanto outras não gostam da sensação fria do metal."
3300639114-NameJp = "Colar Folha Verde"
3300639114-DescriptionJp = "Um colar lançado pela marca de moda moderna \"Lorelei\". Dizem que as folhas ganham um brilho sutil quando recebem luz."
3393952632-NameJp = "LocalizeError"
3393952632-DescriptionJp = "LocalizeError"
1448270761-NameJp = "Dica do Estágio de Desafio do Evento 5"
1448270761-DescriptionJp = "Use habilidades que removem estados de enfraquecimento para lidar com os mísseis de Geburah.\nUtilize o dispositivo de armazenamento de materiais de reparo para evitar o congelamento."
2396453793-NameJp = "Dica do Estágio de Desafio do Evento 6"
2396453793-DescriptionJp = "O Departamento de Investigação de Fenômenos Especiais apoiará seus aliados.\n\nAo derrotar inimigos, o Departamento de Investigação de Fenômenos Especiais coletará e analisará dados.\nQuando a análise dos dados for concluída, Geburah será enfraquecido e, ao mesmo tempo, os aliados serão fortalecidos."
3833784038-NameJp = "Dica do Estágio de Desafio do Evento 1"
3833784038-DescriptionJp = "Fuja para o vagão da frente para evitar as bombas que Kasumi instalou previamente no trem.\nEvacue para o vagão da frente antes que as bombas explodam."
3483475612-NameJp = "Dica do Estágio de Desafio do Evento 2"
3483475612-DescriptionJp = "Cuidado com ataques em área.\n\nPrepare-se para ataques vindos da retaguarda."
4029303020-NameJp = "Dica do Estágio de Desafio do Evento 3"
4029303020-DescriptionJp = "A velocidade de recuperação de custo das alunas Striker aliadas será drasticamente reduzida.\n\nDerrotar inimigos ou destruir máquinas de venda automática concederá uma certa quantidade de custo."
28119784-NameJp = "Dica do Estágio de Desafio do Evento 4"
28119784-DescriptionJp = "O tipo de ataque do inimigo será alterado para o atributo Místico.\n\nDerrotar as alunas da equipe do trem concederá uma certa quantidade de custo.\n\nOs ataques da sentinela têm uma baixa probabilidade de aplicar um efeito cumulativo que reduz a defesa e a taxa de esquiva do alvo."
3754973665-NameJp = "Dica do Estágio de Desafio do Evento 1"
3754973665-DescriptionJp = "Os membros da Gangue do Capacete posicionam autômatas descartados do mercado negro na frente para atacar Misaka Mikoto.\n\nMonte uma equipe com estudantes que possam proteger Misaka Mikoto e prepare-se para a ofensiva inimiga."
981107711-NameJp = "Dica do Estágio de Desafio do Evento 2"
981107711-DescriptionJp = "Shokuhou Misaki controla continuamente a Gangue do Capacete.\n\nPriorize derrotar Shokuhou Misaki para completar o estágio."
247331126-NameJp = "Dica do Estágio de Desafio do Evento 3"
247331126-DescriptionJp = "Quando os soldados da PMC na linha de frente sofrem dano, os carregadores de energia da PMC também sofrem dano.\n\nComo muitos inimigos aparecem na retaguarda, monte uma equipe com estudantes capazes de causar dano em área."
3717534249-NameJp = "Dica do Estágio de Desafio do Evento 4"
3717534249-DescriptionJp = "Enquanto houver autômatos robustos do mercado negro descartados, será difícil derrotar os outros inimigos.\n\nUse curandeiros para aproveitar os varredores e espantalhos que circulam pelo mapa para derrotar os inimigos mais facilmente."
2028021589-NameJp = "Dica do Estágio de Desafio do Evento 1"
2028021589-DescriptionJp = "Tente derrotar os inimigos utilizando estados de CC (Controle de Grupo)."
2080523366-NameJp = "Dica do Estágio de Desafio do Evento 2"
2080523366-DescriptionJp = "Ao derrotar inimigos, você pode obter efeitos de bônus por um curto período.\nDerrote o próximo inimigo antes que a duração do bônus termine."
11412844-NameJp = "Dica do Estágio de Desafio do Evento 3"
11412844-DescriptionJp = "Ursos e coelhos extremamente fortes e ferozes bloqueiam o seu caminho.\nTente confundir os ursos ou apoiar Sumire para derrotar os inimigos."
1768013184-NameJp = "Dica do Estágio de Desafio do Evento 4"
1768013184-DescriptionJp = "Tente instalar coberturas para bloquear os ataques inimigos."
2920989374-NameJp = "Dica do Estágio de Desafio do Evento 1"
2920989374-DescriptionJp = "Enquanto escolta Saori, derrote rapidamente os inimigos que aparecem de ambos os lados."
389255540-NameJp = "Dica do Estágio de Desafio do Evento 2"
389255540-DescriptionJp = "Aru (Vestido) e Kayoko (Vestido) usam suas habilidades EX em conjunto. Tente impedir que Aru (Vestido) consiga usar sua habilidade EX em Kayoko (Vestido)."
2681487799-NameJp = "Dica do Estágio de Desafio do Evento 3"
2681487799-DescriptionJp = "A habilidade EX da aliada Kayoko (Vestido) torna-se mais poderosa se ela não sofrer dano. Tente evitar os ataques de área do chefe."
3119514688-NameJp = "Dica do Estágio de Desafio do Evento 4"
3119514688-DescriptionJp = "Derrote primeiro os inimigos que causam dano elevado a partir da retaguarda."
1154240687-NameJp = "Dica do Estágio de Desafio do Evento 1"
1154240687-DescriptionJp = "Derrote os membros do Comitê Disciplinar e do Grupo Hyakkiyako que estão brigando e mantenha o medidor de avaliação do festival acima de zero. Atacar alguns membros do Comitê Disciplinar resultará em contra-ataques."
826504021-NameJp = "Dica do Estágio de Desafio do Evento 2"
826504021-DescriptionJp = "As invocações dos inimigos ficam cada vez mais fortes. Derrote-as rapidamente."
228867329-NameJp = "Dica do Estágio de Desafio do Evento 3"
228867329-DescriptionJp = "Os varredores são empurrados para trás sempre que atingidos por uma habilidade EX e, ao serem derrotados, aplicam dano e debuffs na área ao redor.\n\nTente usar habilidades EX para que os varredores sejam derrotados perto dos outros inimigos."
3692835812-NameJp = "Dica do Estágio de Desafio do Evento 4"
3692835812-DescriptionJp = "Apoie a plataforma de fogos de artifício de Umika enquanto derrota o Grupo Hyakkiyako que atrapalha o festival.\n\nA cada 25% de progresso na preparação do festival, vários efeitos, como bônus ou enfraquecimentos, serão aplicados aos inimigos e aliados.\n\nO chefe inimigo, o membro do Grupo Hyakkiyako com máscara Hannya, recebe o mesmo dano que a torre."
937127281-NameJp = "Dica do Estágio de Desafio do Evento 1"
937127281-DescriptionJp = "O tanque inimigo se move em direção ao terreno baldio e dispara um ataque poderoso ao chegar lá.\n\nO tanque inimigo tem alta resistência a dano de habilidades EX, mas seu desempenho diminui conforme ele é atingido.\n\nUse essas características para derrotar o tanque antes que ele chegue ao terreno baldio."
120747478-NameJp = "Dica do Estágio de Desafio do Evento 2"
120747478-DescriptionJp = "Impeça que as estudantes do Clube de Doces do Pós-Escola usem suas habilidades."
3642446434-NameJp = "Dica do Estágio de Desafio do Evento 3"
3642446434-DescriptionJp = "Se você conceder um bônus a Reisa, ela usará sua habilidade EX.\nApoie Reisa enquanto derrota os delinquentes."
284862043-NameJp = "Dica do Estágio de Desafio do Evento 4"
284862043-DescriptionJp = "Enfraqueça os autômatos errantes com efeitos de CC antes de atacá-los."
3412917378-NameJp = "Dica do Estágio de Desafio do Evento 1"
3412917378-DescriptionJp = "Você receberá um dano massivo se for atingido duas vezes pela habilidade EX dos delinquentes.\n\nRecupere o HP do espantalho até 100% para congelar todos os aliados e bloquear a habilidade dos delinquentes."
110115972-NameJp = "Dica do Estágio de Desafio do Evento 2"
110115972-DescriptionJp = "As estudantes da Valkyrie são reforçadas periodicamente para apoiar Kanna.\n\nDerrote-as rapidamente para que não se acumulem em grande número."
2111941898-NameJp = "Dica do Estágio de Desafio do Evento 3"
2111941898-DescriptionJp = "Use estados de CC para impedir Kanna temporariamente e derrote os inimigos rapidamente para se afastar dela."
184971332-NameJp = "Dica do Estágio de Desafio do Evento 4"
184971332-DescriptionJp = "Ataque o gerador de campo de plasma e use estudantes do tipo 'Curandeiro' para apoiar as unidades AMAS.\n\nOs varredores modificados só podem ser derrotados com habilidades EX."
2842109547-NameJp = "Dica do Estágio de Desafio do Evento 1"
2842109547-DescriptionJp = "Hiyori corre pela costa e mostra como está a praia.\n\nDepois disso, Hiyori correrá pela costa várias vezes; se a aparência da praia estiver diferente da primeira vez, ataque o espantalho 'X', se estiver igual, ataque o espantalho 'O'."
2522165937-NameJp = "Dica do Desafio de Evento Estágio 2"
2522165937-DescriptionJp = "Use estudantes do tipo tanque para resistir aos ataques dos inimigos."
388529582-NameJp = "Dica do Desafio de Evento Estágio 3"
388529582-DescriptionJp = "Use habilidades de cura e de buff para dar suporte ao Mecajacaré e derrotar Akemi."
472021647-NameJp = "Dica do Desafio de Evento Estágio 4"
472021647-DescriptionJp = "Ao aplicar um efeito de enfraquecimento em Akemi, o efeito será transferido para os inimigos ao redor dela.\n\nAo causar dano aos inimigos ao redor de Akemi, o dano será transferido para ela.\n\nQuando Akemi faz uma pose de fisiculturista, o poder de ataque de todos os aliados e inimigos aumenta, e a velocidade de recuperação de custo aumenta por um tempo determinado."
467833032-NameJp = "Dica do Desafio de Evento Estágio 1"
467833032-DescriptionJp = "Bombas falsas e verdadeiras estão posicionadas. Os membros do Genryumon reagem e fogem apenas das bombas verdadeiras.\n\nExploda as bombas verdadeiras para derrotar os inimigos."
2000030305-NameJp = "Dica do Desafio de Evento Estágio 2"
2000030305-DescriptionJp = "Use estudantes do tipo tanque e habilidades que removem efeitos de enfraquecimento para resistir aos ataques dos inimigos."
3888748298-NameJp = "Dica do Desafio de Evento Estágio 3"
3888748298-DescriptionJp = "Tente encontrar o chefe entre os inimigos com a mesma aparência.\n\nAo derrotar o chefe, todos os inimigos serão derrotados.\n\nO chefe tem uma probabilidade muito alta de sofrer dano crítico, enquanto os outros inimigos têm uma probabilidade muito baixa."
1179303176-NameJp = "Dica do Desafio de Evento Estágio 4"
1179303176-DescriptionJp = "Mova suas estudantes para atrair os ataques dos membros do Clube de Ópera de Pequim para os inimigos.\nAs habilidades dos membros do Clube de Ópera de Pequim também causam dano a outros membros do mesmo clube."
3297442664-NameJp = "Dica do Desafio de Evento Estágio 1"
3297442664-DescriptionJp = "Todos os inimigos geram uma barra de CC quando o HP está abaixo de 1% e atacam os aliados prioritariamente.\nEncha a barra de CC para repelir os inimigos."
2684865569-NameJp = "Dica do Desafio de Evento Estágio 2"
2684865569-DescriptionJp = "Use estudantes do tipo tanque para resistir aos ataques dos inimigos."
3519883613-NameJp = "Dica do Desafio de Evento Estágio 3"
3519883613-DescriptionJp = "Kai usa habilidades para causar um efeito de envenenamento nos inimigos.\nOs executivos do Genryumon entram em estado de confusão quando estão envenenados.\nUse habilidades que removem efeitos de enfraquecimento para curar o envenenamento dos executivos do Genryumon."
313921055-NameJp = "Dica do Desafio de Evento Estágio 4"
313921055-DescriptionJp = "Kai fica mais fraco a cada vez que você derrota um inimigo.\nKai possui um escudo que se recupera continuamente.\nUse ataques que causam muito dano de uma vez para completar o estágio."
3486077912-NameJp = "Dica do Desafio de Evento Estágio 1"
3486077912-DescriptionJp = "Certifique-se de que Sakurako e Mine não sejam derrotadas."
3001581470-NameJp = "Dica do Desafio de Evento Estágio 2"
3001581470-DescriptionJp = "Use estudantes do tipo tanque para resistir aos ataques dos inimigos."
2610005946-NameJp = "Dica do Desafio de Evento Estágio 3"
2610005946-DescriptionJp = "Quando os membros do Grupo do Capacete sofrem dano, Love também sofre dano.\n\nSempre que um aliado usa uma habilidade EX, a esquiva do inimigo aumenta; ao recuperar todo o HP do espantalho, o valor de esquiva é resetado.\n\nSe você não se mover dentro de um tempo determinado, todos os aliados receberão um efeito de enfraquecimento."
3941724285-NameJp = "Dica do Desafio de Evento Estágio 4"
3941724285-DescriptionJp = "Resista aos ataques das Sukebans por 4 minutos.\n\nCom o passar do tempo, as Sukebans ficarão cada vez mais fortes, mas elas sofrerão ataques de Akemi."
2055343512-NameJp = "Dica do Desafio de Evento Estágio 1"
2055343512-DescriptionJp = "Cure Koyuki.\n\nQuando o HP de Koyuki ficar abaixo de 50%, os inimigos atacarão as estudantes aliadas."
3473872843-NameJp = "Dica do Desafio de Evento Estágio 2"
3473872843-DescriptionJp = "Derrote rapidamente Noah (Pijama), que possui ataques ameaçadores."
105670687-NameJp = "Dica do Desafio de Evento Estágio 3"
105670687-DescriptionJp = "Derrote os Varredores antes que eles derrotem você.\n\nCada Varredor possui efeitos diferentes. Utilize-os para vencer a batalha."
4025598380-NameJp = "Dica do Desafio de Evento Estágio 4"
4025598380-DescriptionJp = "Yuuka (Pijama) concede efeitos de buff aos aliados quando seu HP está acima de 50%.\n\nEnquanto o Avant-Garde-kun estiver usando habilidades, sua defesa diminuirá a cada vez que ele sofrer dano um certo número de vezes."
525037525-NameJp = "Dica do Desafio de Evento Estágio 1"
525037525-DescriptionJp = "O Super Gigante Pan-chan recebe dano adicional sempre que sofre dano contínuo por efeitos de enfraquecimento. Em caso de calafrios, ele recebe ainda mais dano.\n\nQuanto mais os membros do Comitê Disciplinar de Gehenna (SG) atacam o Super Gigante Pan-chan, mais o dano recebido por ele aumenta por um tempo determinado."
3162907200-NameJp = "Dica do Desafio de Evento Estágio 2"
3162907200-DescriptionJp = "Cuidado com os ataques em área de Sena (Roupa Casual)."
2027711820-NameJp = "Dica do Desafio de Evento Estágio 3"
2027711820-DescriptionJp = "O Super Gigante Pan-chan recebe dano adicional sempre que sofre dano.\n\nTente montar uma equipe com estudantes que possuem muitos acertos por ataque."
113373470-NameJp = "Dica do Desafio de Evento Estágio 4"
113373470-DescriptionJp = "A resistência a crítico e a taxa de resistência a dano crítico dos inimigos aumentam drasticamente.\nO dano causado pelas estudantes especiais aliadas aumenta.\n\nQuando cada chefe de clube é derrotado, ele causa dano adicional ao seu respectivo clube.\nUse isso a seu favor para conter a confusão de cada clube."
3202949901-NameJp = "Dica do Desafio de Evento Estágio 1"
3202949901-DescriptionJp = "Ao derrotar o Varredor vermelho, os Varredores ao redor também são repelidos.\nComo o dano recebido pelo Varredor vermelho é drasticamente reduzido, tente montar uma equipe com estudantes que possuem muitos ataques."
1916385838-NameJp = "Dica do Desafio de Evento Estágio 2"
1916385838-DescriptionJp = "Estudantes com o estado de 'Identificação de Fraqueza' de Sumire (Trabalho de Meio Período) recebem dano adicional sempre que são atingidas.\nUse habilidades que removem efeitos de enfraquecimento para remover o estado de Identificação de Fraqueza."
1058897212-NameJp = "Dica do Estágio de Desafio do Evento 3"
1058897212-DescriptionJp = "O Varredor causa dano continuamente ao seu redor.\nO Varredor é empurrado para trás sempre que é atingido por uma habilidade EX, então tente usar habilidades EX para mantê-lo perto de Rei.\nNo entanto, se o Varredor estiver com um escudo, ele não será empurrado."
1095949636-NameJp = "Dica do Estágio de Desafio do Evento 4"
1095949636-DescriptionJp = "Quando Akemi faz uma pose de fisiculturismo, a taxa de crítico e o valor de crítico de todos os alvos ao redor aumentam significativamente.\n\nSempre que Akemi recebe uma certa quantidade de ataques, o dano recebido aumenta por um tempo.\n\nAkemi possui uma barra de CC que diminui lentamente; quando a barra enche, ela fica atordoada por um tempo e sua defesa diminui drasticamente.\nDepois disso, os aliados ganham um escudo por um tempo, mas seu poder de ataque diminui.\nUse esse escudo para se proteger dos ataques explosivos de Akemi."
3274122658-NameJp = "Dica do Estágio de Desafio do Evento 1"
3274122658-DescriptionJp = "O dano recebido pelo chefe da gangue de motoqueiros é drasticamente reduzido.\nNo entanto, se você acertar um efeito de CC enquanto o chefe estiver usando uma habilidade, o dano recebido por ele aumentará e você ganhará uma certa quantidade de custo."
190394474-NameJp = "Dica do Estágio de Desafio do Evento 2"
190394474-DescriptionJp = "A defesa de Aoba é extremamente alta.\nTente usar habilidades de redução de defesa."
384582627-NameJp = "Dica do Estágio de Desafio do Evento 3"
384582627-DescriptionJp = "Todos os inimigos só recebem dano de habilidades EX.\n\nDerrotar a Sukeban (SMG) e a Sukeban (MG) aumenta drasticamente o poder de ataque e a velocidade de ataque de todos os inimigos.\nPrimeiro, tente derrotar a Sukeban (SR) e a Capitã de Assalto Sukeban."
4256279682-NameJp = "Dica do Estágio de Desafio do Evento 4"
4256279682-DescriptionJp = "Se uma aluna aliada colidir com os motoqueiros que avançam, ela receberá um dano alto.\nEm vez disso, se os motoqueiros que avançam colidirem com obstáculos, eles receberão um dano alto.\nColoque obstáculos e use habilidades de movimento para atrair o avanço dos inimigos em direção aos obstáculos."
1196420166-NameJp = "Dica do Estágio de Desafio do Evento 1"
1196420166-DescriptionJp = "Os inimigos avançam para atacar Kikyou enquanto ela dorme.\nDerrote todos os inimigos antes que se aproximem para proteger o cochilo de Kikyou.\nDerrotar o Varredor preto concede custo e reduz drasticamente a velocidade de movimento e a defesa dos inimigos ao redor.\nComo o dano recebido pelo Varredor preto é drasticamente reduzido, tente formar uma equipe com alunas que tenham muitos ataques."
956182265-NameJp = "Dica do Estágio de Desafio do Evento 2"
956182265-DescriptionJp = "Tente formar uma equipe com alunas tanques e curandeiras para conseguir resistir aos ataques de Renge (Roupa de Banho) e Yukari (Roupa de Banho)."
1158136851-NameJp = "Dica do Estágio de Desafio do Evento 3"
1158136851-DescriptionJp = "Quando o HP de todos os Geradores de Campo de Plasma for maior que 0, o escudo dos inimigos será removido.\nO HP dos Geradores de Campo de Plasma diminui 25% a cada 7 segundos, então você deve curá-los continuamente."
2288671928-NameJp = "Dica do Estágio de Desafio do Evento 4"
2288671928-DescriptionJp = "O tanque inimigo começa a se mover em direção ao terreno baldio e, ao chegar lá, dispara um ataque poderoso.\nO tanque inimigo tem uma forte resistência a danos de habilidades EX, mas seu desempenho diminui conforme ele é atingido.\nUse essas características para derrotar o tanque inimigo antes que ele chegue ao terreno baldio."
2701404947-NameJp = "Dica do Estágio de Desafio do Evento 1"
2701404947-DescriptionJp = "Os membros do comitê disciplinar estão atacando Eri. Proteja Eri e derrote os membros do comitê que estão atacando."
2506986276-NameJp = "Dica do Estágio de Desafio do Evento 2"
2506986276-DescriptionJp = "A defesa de Kanoe é extremamente alta e ela usa uma habilidade EX que remove seus próprios estados de enfraquecimento.\nNo momento certo, tente usar habilidades de redução de defesa."
4114458166-NameJp = "Dica do Estágio de Desafio do Evento 3"
4114458166-DescriptionJp = "Verifique o tipo de defesa dos inimigos e tente focar naqueles que possuem fraqueza contra o seu tipo de ataque."
444658513-NameJp = "Dica do Estágio de Desafio do Evento 4"
444658513-DescriptionJp = "Os inimigos aplicam estados de enfraquecimento poderosos nas alunas.\nUse habilidades que removem estados de enfraquecimento para derrotar os inimigos."
1268479381-NameJp = "Dica do Estágio de Desafio do Evento 1"
1268479381-DescriptionJp = "Enquanto Fuyu corre, Varredores de várias cores aparecem.\nNo momento em que Fuyu chegar na frente de Miyo, ataque o Varredor da cor que apareceu com mais frequência."
4163494881-NameJp = "Dica do Estágio de Desafio do Evento 2"
4163494881-DescriptionJp = "Avance na batalha combinando um tipo de ataque que seja vantajoso contra o tipo de defesa do inimigo."
1154737800-NameJp = "Dica do Estágio de Desafio do Evento 3"
1154737800-DescriptionJp = "Mantenha o HP da AMAS acima de 25% enquanto concede efeitos de buff para fortalecê-la e avançar na batalha contra os inimigos.\n\nQuando a bomba é destruída, ela causa um grande dano aos inimigos ao redor. Tente aproveitar o estado de fogo concentrado."
184757931-NameJp = "Dica do Estágio de Desafio do Evento 4"
184757931-DescriptionJp = "O HP de Akira diminui a cada segundo, mas quando o HP de Akira está acima de 50%, um efeito de buff poderoso é concedido aos aliados.\nOs inimigos atacados pelas habilidades de Akira recebem mais dano.\nOs inimigos que possuem escudos recuperam HP enquanto os mantêm levantados. Use efeitos de CC para impedir que os inimigos usem seus escudos."
2290871345-NameJp = "Dica do Estágio de Desafio do Evento 1"
2290871345-DescriptionJp = "Ataque os inimigos que possuem a marca de ataque em ordem para derrotar todos eles.\nTenha cuidado, pois se uma aluna atordoada for atacada, ela contra-atacará com muita força."
3231040624-NameJp = "Dica do Estágio de Desafio do Evento 2"
3231040624-DescriptionJp = "Avance na batalha combinando um tipo de ataque que seja vantajoso contra o tipo de defesa do inimigo."
1473203563-NameJp = "Dica do Estágio de Desafio do Evento 3"
1473203563-DescriptionJp = "Os efeitos de buff concedidos às alunas Striker também se aplicam ao Grupo do Capacete aliado.\nO Grupo do Capacete aliado pode causar um grande dano aos inimigos.\nAjude o Grupo do Capacete aliado a avançar na batalha."
1944049600-NameJp = "Dica do Estágio de Desafio do Evento 4"
1944049600-DescriptionJp = "Os ataques do Grupo do Capacete aliado aumentam o dano recebido pelos inimigos.\nAjude o Grupo do Capacete aliado para que eles não sejam derrotados e avance na batalha."
3270373715-NameJp = "Dica do Estágio de Desafio do Evento 1"
3270373715-DescriptionJp = "Quando o HP do tambor inflamável atinge 100% ou mais, ele explode após 1 segundo, causando um grande dano aos inimigos ao redor.\nNo momento certo, exploda o tambor inflamável para derrotar os Varredores."
3881373360-NameJp = "Dica do Estágio de Desafio do Evento 2"
3881373360-DescriptionJp = "Avance na batalha combinando um tipo de ataque que seja vantajoso contra o tipo de defesa do inimigo curandeiro."
2657352138-NameJp = "Dica do Estágio de Desafio do Evento 3"
2657352138-DescriptionJp = "Yakumo aparece a cada certo período de tempo.\nAliados e inimigos que obtiverem o livro de Yakumo terão seu poder de ataque reduzido drasticamente e ficarão atordoados por um tempo.\nNo caso de Koharu, seu poder de ataque, recuperação de custo e dano recebido aumentarão drasticamente."
1246590478-NameJp = "Dica do Estágio de Desafio do Evento 4"
1246590478-DescriptionJp = "A quantidade de dano recebido pelos inimigos será drasticamente reduzida.\nQuando o HP do tambor inflamável atingir 100% ou mais, ele explodirá após 1 segundo, causando dano aos inimigos próximos e aumentando significativamente a recuperação de custo dos aliados.\nOs inimigos atingidos pelo dano da explosão do tambor inflamável terão a quantidade de dano recebido drasticamente aumentada por um certo período."
944485355-NameJp = "Dica do Estágio de Desafio do Evento 1"
944485355-DescriptionJp = "As habilidades EX dos inimigos causam um dano muito alto, mas são rebatidas na direção oposta ao atingirem obstáculos.\nUse a habilidade EX de Tsukuyo (Dress) para rebater os ataques inimigos e proteger o Grupo Chimi-Ichi da sua equipe."
225733024-NameJp = "Dica do Estágio de Desafio do Evento 2"
225733024-DescriptionJp = "Se Tsukuyo (Dress) for derrotada, a quantidade de dano recebido por Izuna aumentará.\nTente focar em Tsukuyo (Dress) primeiro."
450982130-NameJp = "Dica do Estágio de Desafio do Evento 3"
450982130-DescriptionJp = "Quanto maior o HP do espantalho, maior será o dano recebido pelos inimigos."
3754788721-NameJp = "Dica do Estágio de Desafio do Evento 4"
3754788721-DescriptionJp = "Os efeitos de bônus das habilidades EX dos estudantes também se aplicam ao chefe inimigo.\n\nO chefe inimigo não é afetado por estados de CC, mas a duração do estado de CC é acumulada. Ao acumular 10 segundos, o dano recebido pelo chefe aumenta. (Máximo de 10 acúmulos) (Quanto maior a força de fortalecimento de CC, mais tempo será aplicado).\n\nQuando o HP do espantalho atinge 99% ou mais, a velocidade de recuperação de custo aumenta significativamente.\n\nTenha cuidado, pois a defesa e a resistência a dano crítico do chefe inimigo são muito altas."
3884845621-NameJp = "Dica do Estágio de Desafio do Evento 1"
3884845621-DescriptionJp = "Quando as bombas explodem, elas causam um dano contínuo de queimadura alto aos estudantes.\nUtilize habilidades de cura e habilidades de ataque em área para evitar que as bombas explodam."
86017968-NameJp = "Dica do Estágio de Desafio do Evento 2"
86017968-DescriptionJp = "Combine o tipo de ataque com o tipo de defesa dos inimigos para prosseguir na batalha."
3706206590-NameJp = "Dica do Estágio de Desafio do Evento 3"
3706206590-DescriptionJp = "O poder de ataque do AMAS aumenta com o passar do tempo. Derrote o AMAS rapidamente."
1265950056-NameJp = "Dica do Estágio de Desafio do Evento 4"
1265950056-DescriptionJp = "Se o HP de um dos inimigos restar, eles ficarão em estado de imortalidade.\nVocê pode derrotá-los simultaneamente reduzindo o HP de ambos.\n\nA quantidade de dano EX recebido pelo Avant-Garde-kun é drasticamente reduzida, e a quantidade de dano de efeito especial recebido é significativamente aumentada.\nApós o Mecawani usar sua habilidade EX para disparar chamas, ele ficará atordoado por 15 segundos e o dano recebido aumentará drasticamente."
2838352374-NameJp = "Dica do Estágio de Desafio do Evento 1"
2838352374-DescriptionJp = "Encontre o Tsuchinoko verdadeiro entre os que possuem a mesma aparência.\nO estado de enfraquecimento do Tsuchinoko falso não pode ser removido por habilidades de remoção de debuff, mas o do verdadeiro desaparecerá ao ser removido.\nO Tsuchinoko falso se move de forma diferente do verdadeiro.\nEncontre o Tsuchinoko verdadeiro, remova seu estado de enfraquecimento e derrote os inimigos."
951156375-NameJp = "Dica do Estágio de Desafio do Evento 2"
951156375-DescriptionJp = "Utilize habilidades de redução de defesa para derrotar Konoka."
2068938700-NameJp = "Dica do Estágio de Desafio do Evento 3"
2068938700-DescriptionJp = "A coragem de Rena diminui ao ver inimigos dentro do seu alcance. Derrote-a rapidamente antes que sua coragem acabe."
2249316847-NameJp = "Dica do Estágio de Desafio do Evento 4"
2249316847-DescriptionJp = "Quando Konoka recebe uma habilidade EX inimiga, ela recebe um estado de enfraquecimento que aumenta o dano recebido.\nAo remover esse estado de enfraquecimento com uma habilidade de remoção de debuff, Konoka usará sua habilidade EX. A habilidade EX de Konoka causa um dano massivo a inimigos com tipo de defesa Armadura Especial.\nAjude Konoka a derrotar os inimigos."
3676923287-NameJp = "Dica do Estágio de Desafio do Evento 1"
3676923287-DescriptionJp = "Você vence se resistir até que a armadilha de explosão em cadeia seja ativada.\nSe você atrair os ataques de Akemi para os tambores inflamáveis, a armadilha de explosão em cadeia será ativada mais rapidamente.\n\nOs Sukebans ficam mais fortes com o passar do tempo."
1280690466-NameJp = "Dica do Estágio de Desafio do Evento 2"
1280690466-DescriptionJp = "Monte sua equipe levando em conta que todos os ataques inimigos são do tipo Explosivo.\nTente derrotar Yukino, que fortalece os membros do esquadrão, primeiro."
2920015713-NameJp = "Dica do Estágio de Desafio do Evento 3"
2920015713-DescriptionJp = "Utilize estados de CC para derrotar os membros do clube de ópera antes que eles usem suas habilidades EX."
2740980058-NameJp = "Dica do Estágio de Desafio do Evento 4"
2740980058-DescriptionJp = "Yukino possui uma barra de CC; quando acumulada, os inimigos próximos não poderão usar habilidades EX por um certo tempo.\n\nDestruir o dispositivo de controle de contêineres fará com que aliados especiais apareçam para dar suporte."
