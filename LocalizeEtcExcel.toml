1875343788-NameJp = "Braçadeira do Comitê de Justiça"
1875343788-DescriptionJp = "O símbolo do dever absoluto entregue e fixado nos braços em uníssono de qualquer membro empossada pela causa oficial à ordem no Comitê de Justiça em Trinity. Na farsa do físico do ser só uma tira de seda simplória na levezas das dobras e costuras finas à estéticas a se envolver e usar na sua manga ali, aos pesos duma fardos de ideologias por carregar do sentido ao seu uso não encontram as trivialidades duma leve num balançar pras glórias fáceis."
1798844252-NameJp = "Cubo de Açúcar Refinado"
1798844252-DescriptionJp = "Os pedrinhas açucaradas e adoráveis pra os dissolver do amargo que a ervas dão pra bater nos fundos e afogar a língua numa infusões num chá a fazer da adoçadas pro acalentos nos gostinhos deles numa de queimar a garganta à doçura no prazeres dos bicos das xícaras. Não tenham em escrúpulos e os atiram pras fundo nas infusões ali ao teu bel prazer a quanto e com todo que os gulosos o apetite as quiser pra sua bebida!"
1149484945-NameJp = "Bolo Especial de Trinity"
1149484945-DescriptionJp = "A doçura num bocado das mordidas dum bolinho de fatias pro topo escalão em excelência do que tange a sobremesas nas requintes a estéticas e sabores pro deleites no luxo pra o requinte do servir a doces no paladares a rechear do mundo na Trinity em delírios pros maravilhas que deram nas glórias duma obra prima dessas. Num passar das chás pras rodas de amizades a rituais a tardes, não há de não tecer a companhia de um açúcar nos mimos de um lanchinhos pra preencher as barriga ao lado de uma golada quentinha no amargo pra os momentos na glória a maravilhosos."
2333653715-NameJp = "Chá Renomado dos Jardins de Shanhaijing"
2333653715-DescriptionJp = "A flor e o nata da erva selecionada entre as folhas do seletas e preciosos nas safras lá no jardim colossais do chá pro Shanhaijing trazido duma colheita a maestrias pra as infusões à folha. As advertências no seu manter e proteção pra o guarda nas prateleiras: É as exigências absolutas o banir aos umidade para os porões a secos e os escurecer nas claridades e sol de bater nelas e no frasco pra uma precaver no conservamento e de esbanjar no intocáveis do cheiros."
2697672518-NameJp = "Panfleto da Praia Privada"
2697672518-DescriptionJp = "O guiazinho simplório e compacto duma mapa impresso pro encartes dos serviços e recantos ao desfrute dos resorts em férias à beira nas praias das lides pra alunas desvendar nos locais. Traz o mapeamentos pros arredores no que têm por de lazer na facilidade as vista, ilustrando nas resumidas o que tem pras redondezas ali e o onde achar nos lugares pros se perder as passagens pra as brincadeiras nela sem ficar a dar o giro na confusão no caminho ao teu desfrute nas praias as exclusividades a lá em que as garotas foram as feriados de verões a esbanjar da brisa."
