4054782965-NameJp = "Cerca de Vidro da Highlander"
4054782965-DescriptionJp = "Uma cerca de vidro que se destaca pelo seu design elegante. Geralmente instalada em andares mais altos, contribui de forma espetacular para a beleza do ambiente."
2166577929-NameJp = "Mapa da Estação da Highlander"
2166577929-DescriptionJp = "Um mapa que detalha as instalações da estação e a disposição dos trilhos. Se prestar atenção, você notará uma rachadura nele que parece ter sido causada por uma forte pancada de algum objeto."
2003936843-NameJp = "Arandela da Highlander"
2003936843-DescriptionJp = "Uma luminária de parede para ser instalada nas estações. Sua luz suave cria uma atmosfera incrivelmente aconchegante."
2129593156-NameJp = "Divisória de Parede de Trem da Highlander A"
2129593156-DescriptionJp = "Uma divisória que simula a carroceria de um trem. Embora as janelas não abram, ela transmite um charme bem especial."
3713563036-NameJp = "Assento de Passageiro da Highlander"
3713563036-DescriptionJp = "Um assento de trem de alta velocidade. No entanto, é um assento barato, e dizem que quem se senta nele por longos períodos acaba ficando com dor nas costas."
3344648141-NameJp = "Painel Publicitário da Highlander"
3344648141-DescriptionJp = "Um painel publicitário para ser instalado no saguão da estação. Dizem que a forma de comprar espaços publicitários varia de estação para estação."
1018455193-NameJp = "Símbolo da Academia Ferroviária Highlander"
1018455193-DescriptionJp = "Uma decoração de parede desenhada com o símbolo da Academia Ferroviária Highlander. Está presente apenas nas estações administradas pela academia."
2160829444-NameJp = "Mesa do Vagão Restaurante da Highlander"
2160829444-DescriptionJp = "A mesa do vagão restaurante. É perfeita para apreciar uma marmita e afins."
1451156222-NameJp = "Decoração do Logo da Academia Ferroviária Highlander"
1451156222-DescriptionJp = "Uma decoração de parede em forma do nome da Highlander. Com frequência, algumas das letras se perdem devido às pegadinhas e travessuras dos delinquentes."
3953802004-NameJp = "Bancada de Vendas do Vagão Restaurante da Highlander"
3953802004-DescriptionJp = "Um balcão onde se pode comprar marmitas, bebidas e outros itens. Está sempre muito movimentado."
858464171-NameJp = "Corda de Isolamento Premium da Highlander"
858464171-DescriptionJp = "Uma divisória de corda de aparência muito luxuosa projetada para garantir a segurança dos passageiros. Contudo, há rumores de que frequentemente é usada para o salto em altura e até mesmo para competições de limbo..."
2296043966-NameJp = "Divisória de Parede de Trem da Highlander B"
2296043966-DescriptionJp = "Uma divisória baseada no vagão de um trem. Sua janela é mais espessa do que a do modelo A."
2607458300-NameJp = "Pilar em Arco da Highlander"
2607458300-DescriptionJp = "Um pilar encontrado nos arredores da estação Highlander. Seu belo design em formato de arco traz uma sensação de nostalgia."
450441785-NameJp = "Assento de Primeira Classe da Highlander"
450441785-DescriptionJp = "Um assento de primeira classe. Sem mencionar o seu design, seu conforto extremamente acolhedor recebe altos elogios."
1848819484-NameJp = "Placa de Orientação da Estação Highlander"
1848819484-DescriptionJp = "Uma placa de sinalização comum de se ver dentro da estação. Com um design clássico, faz muito sucesso entre os viajantes."
3940121157-NameJp = "Mala de Mostruário da Highlander"
3940121157-DescriptionJp = "Uma mala fabricada e vendida pela Highlander. Sua propaganda diz ser leve e durável, mas qual será a verdade por trás disso...?"
1236463890-NameJp = "Mesa do Vagão Restaurante de Luxo da Highlander"
1236463890-DescriptionJp = "A mesa do vagão restaurante exclusiva da primeira classe. Ali, pode-se até pedir menus completos!"
2056533270-NameJp = "Carrinho de Vendas da Highlander"
2056533270-DescriptionJp = "Um carrinho para serviços de vendas dentro dos vagões. Seu objetivo é levar momentos alegres aos viajantes."
743274696-NameJp = "Máquina de Venda Automática do Vagão da Highlander"
743274696-DescriptionJp = "Uma máquina de venda que pode ser usada dentro dos trens. Seus preços são um pouco salgados."
1035288750-NameJp = "Janela Temática da Highlander"
1035288750-DescriptionJp = "Vamos contemplar a paisagem através da janela. Sinta a atmosfera de uma viagem de trem em qualquer lugar."
4079752905-NameJp = "Parede da Highlander"
4079752905-DescriptionJp = "Uma parede atraente com as cores da Highlander. O seu esquema de cores, que proporciona ao mesmo tempo um ar de nostalgia e frescor, é o que a torna tão especial."
2646105362-NameJp = "Piso da Highlander"
2646105362-DescriptionJp = "Um piso que lembra uma folha de papel quadriculado. É perfeito para a organização de objetos."
699507019-NameJp = "Fundo da Highlander"
699507019-DescriptionJp = "Um cenário sereno que te faz sentir como se estivesse em uma viagem sofisticada de trem."
3993853034-NameJp = "Torre do Relógio da Highlander"
3993853034-DescriptionJp = "O símbolo e marco da Estação Central Highlander. É conhecida por ser um famoso ponto de encontro."
261810295-NameJp = "Mascote em Tamanho Real: Shuppo (Funcionário)"
261810295-DescriptionJp = "O mascote oficial da Highlander, 'Shuppo'. Frequentemente usado como um ponto para fotos."
3345963333-NameJp = "Mascote em Tamanho Real: Shuppo (CCC)"
3345963333-DescriptionJp = "O mascote oficial da Highlander, 'Shuppo'. Dizem que de vez em quando os delinquentes o usam para praticar tiro ao alvo..."
725627559-NameJp = "Balcão de Informações da Highlander"
725627559-DescriptionJp = "Um quiosque de informações sem funcionários. Panfletos e brochuras podem ser encontrados lá."
2619099202-NameJp = "Loja de Conveniência da Estação Highlander"
2619099202-DescriptionJp = "Uma loja de conveniência que fica na estação Highlander. Sem dúvida, doces estão no topo da lista dos produtos mais cobiçados de lá."
3684229011-NameJp = "Pátio de Trens da Highlander"
3684229011-DescriptionJp = "O estacionamento e abrigo destinado para os trens. Certifique-se de não entrar lá, pois é um local perigoso."
2977861947-NameJp = "Chugga-chugga! Conjunto de Trem em Miniatura"
2977861947-DescriptionJp = "Um trilho e trem que foram perfeitamente projetados nos mínimos detalhes. Com um espacinho sobrando, você pode facilmente montar seu próprio trenzinho de parque indoor pra se divertir nela."
2059347702-NameJp = "Catraca Automática da Highlander"
2059347702-DescriptionJp = "As revisões e verificações da equipe e condutores para inspecionar os passaportes por causa das desculpas de malandros saltando a base sem pagar o pedágios é uma daquelas coisas imperdoável as premissas no usos ali dos maquinários das verificações. Apanham socos ao lidas por rebeldias lá dos baderneiros o que culminam à pane das engrenagens com defeitos às contagens."
582370447-NameJp = "Televídeo"
582370447-DescriptionJp = "Uma TV de estilo vintage que serve como uma luva pra você se divertir nos encantos dum passatempos no filminhos com a velha escola em ação nelas de fato. Os padrões atuais das emissoras nem passam perto da antena ali dela nos ares mas ela lê as fitas em cassetes num jeito espetacular pro olhar de fato sem problemas."
146666553-NameJp = "Série do Trem da Highlander"
146666553-DescriptionJp = "Ao usá-la, você pode criar e escolher um móvel (Série do Trem da Highlander) em específico para decorar seu Café."
2151786577-NameJp = "Série Trem da Highlander"
2151786577-DescriptionJp = "Todos a bordo da Série de Móveis do Trem da Highlander! O trem de alta velocidade já vai partir! Você vai subir e explorar os mistérios com a gente, não vai?"
1521803386-NameJp = "Trem da Highlander"
1521803386-DescriptionJp = "A estação Highlander está pronta para a partida!"
920663646-NameJp = "Bilhete de Recrutamento 10x"
920663646-DescriptionJp = "Um bilhete que permite realizar um recrutamento 10x. ※ Se não for usado até às 23h59min do dia 30 de junho de 2025, ele desaparecerá."
2663393436-NameJp = "Adesivo Comemorativo da Highlander"
2663393436-DescriptionJp = "Uma lembrança comemorativa concedida com carinho por andar no trem Highlander. Uma linda e maravilhosa ilustração do mascote fofinho da academia o adorna e decora em traços bem lindos."
2161564079-NameJp = "Mapa das Rotas dos Trens de Carga"
2161564079-DescriptionJp = "Um mapinha dos diagramas que mostra certinho as ligações e caminhos dos trilhos onde correm e andam as frotas do trem. Nas palavras do que a lógica entende como as 'condições rotineiras' num padrão comum do cotidiano, ele tem como lei andar nas trilhas com ele."
926350146-NameJp = "Carga de Cargas Misteriosas"
926350146-DescriptionJp = "Um caixote misterioso recheado e forrado com as montanhas de entregas de suprimento e mercadorias até o topo nas tampas. Se o conteúdo lá nas entranhas vai te arrastar e arrancar de suas roupas a sua paz do juízo nas suspeitas ou se não são nada nas fofocas, preste as suas lógicas do respeito nas regras de não descolar com imprudência sem o por quê de querer."
3050818841-NameJp = "Chave Inglesa Gigante"
3050818841-DescriptionJp = "Uma daquelas ferramentas brutas pra meter o arranjo as coisas nas montagens e nas roscas que saltam do uso da precisão, usada no prego. O esmagador esmagamento do que tem os rumores pelo ar se resume numa máxima bizarra do preceito 'metam pancadas e marteladas em cima disso e seja a engrenagem ou placa de chips qual for e será curada num susto!'. E a lógica, bom... as teorias de pregar com o soco porrada e esmagar para que ele cure a fiação com um pulo... isso lá são contos."
2071031443-NameJp = "Highlander: Acidente Expresso em Disparada"
2071031443-DescriptionJp = "Concedida no evento: \"Highlander: Acidente Expresso em Disparada\"."
