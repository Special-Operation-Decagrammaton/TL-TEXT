[translation]
10009-10 = "Blue Archive~!"
10009-20 = "Uwa!! Você estava me procurando?\nVamos sair para comer algo\ngostoso juntos!!"
10009-30 = "Quem dera existisse uma árvore\nque desse hambúrgueres!\nSerá que um dia alguém\nvai inventar uma?"
10009-40 = "Beleza!\nVou procurar algo para comer!"
10009-50 = "Certo, vamos dar o nosso melhor hoje!"
10009-60 = "Habilidade especial?\nSim! Acho que é comer!"
10009-70 = "Se for hora da refeição,\nvocê tem que me chamar!"
10009-80 = "Bem-vindo, Sensei!\nEu estava te esperando!\nVamos logo comer alguma coisa!"
10009-90 = "Ah... você tem trabalho para fazer?"
10009-100 = "Sensei! O que vamos comer\nde bom hoje?"
10009-110 = "Você disse para fazer as missões primeiro?"
10009-120 = "Não pode, tem que ser a comida primeiro!"
10009-130 = "Não tem nenhuma missão para\nacabar com restaurantes ruins\nque servem comida ruim?"
10009-140 = "Será que tem algum lugar gostoso\nperto do Schale?"
10009-150 = "É que eu acabei comendo tudo\nno refeitório da Trinity..."
10009-160 = "Ah, essa era uma coisa que\neu não devia ter falado...?"
10009-170 = "Hum?\nVocê vai me dar esse doce?"
10009-180 = "O Sensei é mesmo muito gentil!"
10009-190 = "(Aquele panqueca de polvo\nde agora pouco...\nparecia tão gostosa...)"
10009-200 = "Um pássaro azul que traz felicidade...?"
10009-210 = "Provavelmente...\ndeve ter gosto\nde frango~"
10009-220 = "Sensei! É seu aniversário?"
10009-230 = "Então vamos reservar o café\ne comer bolo o dia todo!"
10009-240 = "Hoje, o dia todo,\neu vou ficar com você!"
10009-250 = "Tcharam!\nSabe que dia é hoje?"
10009-260 = "Hehe!\nDe qualquer forma, é um dia\npara comer coisas gostosas~!"
10009-270 = "Então, vamos comer\nbolo juntos!\nPosso até te dar um pedacinho\ncomo um favor especial!"
10009-280 = "É Ano Novo!\nTemos que comer mochi e oshiruko\nlogo!"
10009-290 = "Disseram que se formos ali,\ntambém dão amazake!"
10009-300 = "Natal, né..."
10009-310 = "Peru e bolo de chantilly\nsão uma delícia, né~"
10009-320 = "E quando comemos isso juntos,\nfica ainda mais gostoso, né~"
10009-330 = "Ei, Sensei!\nÉ hora de Doçuras ou Doçuras!\nVamos logo!"
10009-340 = "Disseram que tem até bala\ndo tamanho de uma melancia!"
10009-360 = "É que, os gatinhos estavam\ncomendo com uma cara tão boa,\nque eu acabei..."
10009-370 = "Espera, uééé?! \nE-espera!\nNão me arranha~!"
10009-380 = "Por queee~!?\nOs gatinhos estão me atacando~!"
10009-390 = "M-mas!\nParecia muito\ngostoso!"
10009-400 = "E-e além disso!\nEu sou um membro do Clube de Pesquisa Gourmet!"
10009-410 = "Se algo me desperta curiosidade,\neu tenho que provar primeiro!"
10009-420 = "E ainda por cima, estava escrito\n\"sabor atum\" e \"premium\"...!"
10009-430 = "Não dá para aceitar que vocês\ncomam algo tão bom\nsozinhos!"
10009-440 = "Coisas gostosas devem ser\ncompartilhadas!"
10009-450 = "Ai! \nE-eu já disse que sinto muito!"
10009-460 = "Mas, não tem como voltar atrás\njá que eu já comi, né...?"
10009-470 = "Uééé!\nNão me morde~!"
10009-2600 = "Ganhei mais uma ferramenta para\ncomer coisas gostosas! Claro, não é\ncomo um par de hashis ou algo assim...\nMas com isso, vamos sair para\ncomer de tudo, Sensei!"
