[translation]
10009-10 = "ブルーアーカイブ～！"
10009-20 = "うわ！！私のことを探して\nくれてたの？一緒に\n美味しいもの食べに行こうよ！！"
10009-30 = "ハンバーガーが実る木が\nあったらいいのに！\nいつか開発されるんじゃ\nないかな？"
10009-40 = "よし！\n食べ物を探してみる！"
10009-50 = "よし、今日も頑張ろう！"
10009-60 = "特技？\nうん！食べることかな！"
10009-70 = "食事の時間だったら\n私を呼んでくれないと！"
10009-80 = "ようこそ先生！\n待ってたよ！\n早くご飯食べに行こう！"
10009-90 = "あ…仕事があるの？"
10009-100 = "先生！今日は何を\n食べに行こっか～。"
10009-110 = "任務からやって、って？"
10009-120 = "ダメだよ、ご飯からだよ！"
10009-130 = "美味しくない、\n悪い店をやっつけに\n行く任務とかないかな。"
10009-140 = "シャーレの近くに\n美味しいお店ないかな？"
10009-150 = "トリニティの食堂で\n食べ尽くしちゃったから…。"
10009-160 = "あ、これは言っちゃダメな\nやつだったっけ…？"
10009-170 = "うん？\nこのお菓子くれるの？"
10009-180 = "やっぱり先生は優しいね！"
10009-190 = "（さっきのあの\nタコのパンケーキ…\n美味しそうだったな…）"
10009-200 = "幸せを運ぶ青い鳥…？"
10009-210 = "多分…\nチキンの味に\n近いんだろうな～"
10009-220 = "先生！お誕生日なの？"
10009-230 = "だったらカフェを貸し切って、\n一日中ケーキを食べよう！"
10009-240 = "今日一日、\n私が一緒にいてあげる！"
10009-250 = "じゃーん！\n今日が何の日か知ってる？"
10009-260 = "えっへん！\nとにかく美味しいものを\n食べる日なんだ～！"
10009-270 = "じゃ、一緒に\nケーキ食べよう！\n特別に少し分けて\nあげてもいいよ？"
10009-280 = "お正月だよ！\n早くお餅とおしるこを\n食べなきゃ！"
10009-290 = "あっちに行ったら\n甘酒もくれるんだって！"
10009-300 = "クリスマスね…"
10009-310 = "七面鳥とか生クリームの\nケーキが美味しいよね～"
10009-320 = "それを一緒に食べると、\nもっと美味しいよね～"
10009-330 = "やっほー先生！\nTreat or Treat！だよ！\n早く行ってみよう！"
10009-340 = "スイカぐらい大っきい\n飴もあるんだって！"
10009-360 = "ね、猫ちゃんたちが\nあまりにも美味しそうに\n食べてたから、つい…！"
10009-370 = "って、ふえええっ？！\nま、待って！\n引っ掻かないで～！"
10009-380 = "何でぇ～！？\n猫ちゃんたちが襲ってくる～！"
10009-390 = "だ、だって！\nすごく美味しそう\nだったんだもん！"
10009-400 = "そ、それに！\n私、美食研究会の一員だし！"
10009-410 = "気になったものは\nまず食べてみないと！"
10009-420 = "おまけにこれ\n「ツナ味」、「高級」って\n書いてあるし…！"
10009-430 = "こんな良いものを\nあなたたちだけで\n食べるなんて許せない！"
10009-440 = "美味しいものは、\n一緒に分け合って食べないと！"
10009-450 = "あ痛！\nだ、だからごめんってば！"
10009-460 = "でも、\nもう食べちゃったものは\n仕方ないよね…？"
10009-470 = "ふええ！\n噛まないで～！"
10009-2600 = "美味しいものを食べるための道具が\nまた一つ増えちゃった！もちろん\nお箸とかそういうのとは違うけど……。\nこれで、あれこれいっぱい\n食べに行こう、先生！"
