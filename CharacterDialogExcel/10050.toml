[translation]
10050-10 = "Blue Archive!"
10050-20 = "Sou eu, a Kokona, do Departamento de Apoio Educacional 'Plum Blossom Garden'!\nN-não é isso! Eu sou uma instrutora de verdade, viu!?"
10050-30 = "O que é\nisto...?"
10050-40 = "Tem um monte de\ncoisas estranhas aqui."
10050-50 = "Eu queria isso\nlá no Plum Blossom Garden..."
10050-60 = "Para onde será que\na Shun foi...?"
10050-70 = "Isso parece ser\nútil para a educação."
10050-80 = "Bem-vindo de volta, Sensei!\nAh, não, não é como se eu estivesse\nte esperando nem nada..."
10050-90 = "Quer dizer, talvez um pouquinho."
10050-100 = "Fazer uma dama de verdade esperar é motivo para perder pontos!"
10050-110 = "Então, conto com\nvocê hoje também."
10050-120 = "Eu também dou aulas direitinho, sabe?\n...Você quer assistir a uma, Sensei?"
10050-130 = "N-não me chame de Kokona-chan!\nParece que eu sou uma criança!"
10050-140 = "Aconteceu alguma coisa?"
10050-150 = "...Eh, só me chamou?\nO que isso significa..."
10050-160 = "Ah, chega! Não fique me cutucando!\nEu não sou criança!"
10050-170 = "Feliz aniversário, Sensei.\nO que achou? Eu me lembrei direitinho."
10050-180 = "...Você também se lembra do meu aniversário?"
10050-190 = "Ah, meu aniversário...\nVocê se lembrou."
10050-200 = "Hehe, obrigada!"
10050-210 = "Feliz Ano Novo,\nSensei!"
10050-220 = "Este ano, continuarei me esforçando como instrutora, então ficaria feliz se você me apoiasse."
10050-230 = "Conto com você\neste ano também!"
10050-240 = "Natal...\nSerá que o Papai Noel\nvem este ano também?"
10050-250 = "Ah, não! Eu sou uma instrutora, então não é como se eu estivesse ansiosa por isso...!"
10050-260 = "Doces de Halloween?"
10050-270 = "E-eu, é claro,\nsou do lado que dá os doces!\nSou uma instrutora!"
10050-280 = "Mas, bem, eu não odeio doces, então..."
10050-300 = "É que... não é como se eu tivesse\ncomeçado a gostar de cenouras,\nsabe?"
10050-310 = "Já que vim aqui com você, Sensei, estou apenas comendo porque não tenho escolha, como uma instrutora de verdade."
10050-320 = "Entendeu? Nossa, Sensei, você sempre\nme força a fazer as coisas..."
10050-330 = "Se eu realmente precisar\ncomer cenouras...\nDa próxima vez, eu venho aqui."
10050-340 = "Afinal, este é um lugar que\nvim com você, Sensei..."
10050-350 = "Entendido? Eu não passei a gostar delas, viu?\nEntendeu?"
10050-360 = "Mas, bem...\nTalvez cenouras não sejam\ntão ruins assim."
10050-2600 = "Às vezes rigorosa, às vezes gentil...\nAcho que uma boa instrutora é aquela que faz o que precisa ser feito na hora certa.\nEu também vou fazer isso!"
