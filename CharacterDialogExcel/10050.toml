[translation]
10050-10 = "ブルーアーカイブ！"
10050-20 = "訓育支援部「梅花園」のココナです！\nち、違います！これでもれっきとした教官なんですよ！？"
10050-30 = "これは、\n一体……？"
10050-40 = "何だか変なものが\nたくさんですね"
10050-50 = "これ、梅花園にも\n欲しい……"
10050-60 = "シュン姉さん、\nどこに行っちゃっ\nたのかな……？"
10050-70 = "これは教育に\n役立ちそうですね"
10050-80 = "おかえりなさい、先生！\nあ、いえ、待ちわびてた\nとかでは……"
10050-90 = "その、まあ少しは。"
10050-100 = "一人前のレディーを\n待たせるなんて、減点です！"
10050-110 = "それでは、\n今日もよろしく\nお願いしますね。"
10050-120 = "私だって、いつもちゃんと\n授業してるんですよ\n……先生も、受けてみますか？"
10050-130 = "こ、ココナちゃんって\n呼ばないでください！\n小さい子みたいじゃないですか！"
10050-140 = "どうかしましたか？"
10050-150 = "……え、呼んだだけ？\nどういうことですか……"
10050-160 = "ああもう、突っつか\nないでください！\n子どもじゃないんですから！"
10050-170 = "お誕生日おめでとうございます、\n先生。どうですか、ちゃんと\n覚えていましたよ。"
10050-180 = "……私の誕生日も、覚えてますか？"
10050-190 = "あ、私の誕生日……\n覚えててくれたんですね。"
10050-200 = "えへへ、ありがとうございます！"
10050-210 = "あけましておめでとう\nございます、先生！"
10050-220 = "私は今年も教官として\n立派に頑張りますので、\n応援してくれると嬉しいです。"
10050-230 = "今年もよろしく\nお願いします！"
10050-240 = "クリスマス…\n今年もサンタさんは\n来るのでしょうか？"
10050-250 = "あ、いえ！私は教官なので、楽しみにしてるとかそういうのではなく……！"
10050-260 = "ハロウィーンの飴、ですか？"
10050-270 = "わ、私はもちろん\nあげる側です！\n教官なので！"
10050-280 = "ですがその、一応飴は\n嫌いではないので……"
10050-300 = "その……別に、ニンジンを\n好きになったわけでは\nありませんからね。"
10050-310 = "せっかく先生と一緒に来た\nわけですし、一人前の教官として\n仕方なく食べているだけです。"
10050-320 = "分かりましたか？\n全く、先生はいつも\n無理やり……。"
10050-330 = "もしどうしてもニンジンを\n食べないといけない場合は……\n今度からは、ここに来ます。"
10050-340 = "先生と一緒に来たお店、\nということもありますし……"
10050-350 = "良いですか？\n好きになってはないですよ？\n分かってます？"
10050-360 = "ただまあ……\nニンジンも、そこまで悪くは\nないかもしれません。"
10050-2600 = "時には厳しく、時には優しく……\nやるべき時にきちんとやれるのが、\n良い教官だと思います。\n私も、やりますよ！"
