[translation]
10023-10 = "Blue Archive."
10023-20 = "……N-não pense que estou me divertindo.\nEstou no meio de uma missão de reconhecimento, então não se engane."
10023-30 = "Só porque estamos em um resort,\nnão significa que vou tolerar\nviolações das regras."
10023-40 = "Parece que não há ninguém\nquebrando as regras\npor enquanto."
10023-50 = "(Preciso me certificar de\nme proteger bem\ndos raios UV……)"
10023-60 = "(Onde será que tem\num lugar para\nestender minha espreguiçadeira……)"
10023-70 = "(Hã? Senti como se alguém\nestivesse me olhando\nde um jeito estranho agora pouco……)"
10023-80 = "Bem-vindo de volta, Sensei.\nO tempo está ótimo hoje, é o dia perfeito para tomar sol."
10023-90 = "Sensei, você está atrasado!\nPor pouco eu não acabei\nficando com um bronzeado desigual\npor sua causa……!"
10023-100 = "Nada de comer ou beber enquanto caminha!\nSó porque estamos em um resort,\nnão significa que há exceções!"
10023-110 = "Por que está\nsorrindo desse jeito……\nSó porque estamos na praia,\nnão precisa ficar tão animado."
10023-120 = "……Eh?\nVocê está olhando para o meu traje de banho,\ne isso aconteceu naturalmente……?"
10023-130 = "……! Morra, seu pervertido!"
10023-140 = "Ufa, uma limonada\nbebida à beira-mar\né realmente especial."
10023-150 = "N-não é como se eu estivesse\nempolgada só por estarmos na praia!"
10023-160 = "Feliz aniversário, Sensei.\nTem algo que você queira ganhar?"
10023-170 = "……Essa situação já é o suficiente?\nO que é isso, o que você quer dizer com isso?"
10023-180 = "Passar o aniversário na praia……\né um pouco romântico\ndemais, mas não é ruim."
10023-190 = "Eu não gostava muito da praia porque\nsó tem gente idiota e\nsempre acontecem problemas, mas……"
10023-200 = "Mas este é o melhor aniversário de todos.\nObrigada, Sensei."
10023-210 = "Já é Ano Novo…….\nParece que foi verão há pouco tempo,\no tempo passa rápido."
10023-220 = "Hã, biquíni de Papai Noel!?\nQ-quem usaria\numa coisa tão indecente dessas!\nMorra! Pervertido!"
10023-230 = "Sinto que está um pouco\nfrio por aqui……"
10023-240 = "Hã? Você sentiu algo\npassar atrás de você?"
10023-250 = "N-não conte histórias de terror\nde repente, mesmo que não seja verão!"
10023-270 = "D-desde quando você está aí!?"
10023-280 = "Eh, você estava me observando\no tempo todo……?"
10023-290 = "Seu……\nPervertido!\nMorra!!"
10023-300 = "……Já vou avisando,\nnão pense que estou\nme divertindo, entendeu?"
10023-310 = "Isso também é uma parte legítima\ndas minhas atividades de\nmanutenção da disciplina……!"
10023-320 = "……Quer saber,\naté quando você vai ficar me encarando!\nVá embora logo!"
10023-2600 = "Isso é……\nrealmente uma arma de verdade?\nSério mesmo?"
