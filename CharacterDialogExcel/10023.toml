[translation]
10023-10 = "ブルーアーカイブ。"
10023-20 = "……べっ、別に遊んでるわけじゃない。\n偵察任務の途中だから、誤解しないで。"
10023-30 = "リゾート地だからって、\n規則違反は\n許さないからな。"
10023-40 = "規則違反を\nしてるやつは……\n今のところ\nいなさそうだな。"
10023-50 = "（紫外線対策、\nしっかり\nしないと……）"
10023-60 = "（どこか、\nビーチベッドを\n広げられそうな\nところは……）"
10023-70 = "（なっ、なんだか今、\n気持ち悪い視線を\n感じた気が……）"
10023-80 = "おかえり、先生。\n今日は良い天気だし、\n日光浴にはピッタリの日だね。"
10023-90 = "先生、遅い！\n危うく私だけ、\n極端に焼けちゃうところ\nだったじゃんか……！"
10023-100 = "歩きながら飲食をしない！\nリゾート地だからって\n例外は無いからな！"
10023-110 = "なに、\nそんなニコニコして……\nいくら海だからって、\n浮かれすぎ。"
10023-120 = "……え？\n私の水着姿を見てたら、\n自然に……？"
10023-130 = "……っ！\n死ね、このヘンタイ！"
10023-140 = "ふう、海辺で\n飲むレモネードは\nやっぱり格別だ。"
10023-150 = "べ、別に、海だからって\n浮かれてるわけじゃない！"
10023-160 = "お誕生日おめでとう、先生。\n何か欲しい物とかないのか？"
10023-170 = "……この状況だけでもう十分？\n何それ、どういう意味？"
10023-180 = "海で迎える誕生日なんて……\nちょっとロマンチック\nすぎるけど、悪くないな。"
10023-190 = "海といったらバカばっかりだし、\nトラブルだらけで\nあんまり好きじゃ\nなかったけど……。"
10023-200 = "でも、これは最高の誕生日だ。\nありがとう、先生。"
10023-210 = "もうお正月か……。\nちょっと前まで夏だったのに、\n時間が経つのは早いな。"
10023-220 = "はぁ、ビキニのサンタ服！？\nだ、誰が着るか\nそんなハレンチなの！\n死ね！ヘンタイ！"
10023-230 = "なんだかちょっと\n涼しい気が……。"
10023-240 = "は？後ろで何かが\n通り過ぎた気がする？"
10023-250 = "ばっ、夏でもないのに、\n急に怖い話をするな！"
10023-270 = "い、いつの間にそこに！？"
10023-280 = "え、さっきから\nずっと見てた……？"
10023-290 = "このっ……\nヘンタイ！\n死ねっ！！"
10023-300 = "……言っておくけど、\n別に遊んでるわけじゃ\nないからな？"
10023-310 = "これもれっきとした、\n風紀を守る活動の\n一環で……！"
10023-320 = "……っていうか、\nいつまでジッと見てるんだ！\n早くどっか行って！"
10023-2600 = "これは……\nちゃんとした武器なのか？\n本当に？"
