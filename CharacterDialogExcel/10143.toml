[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10143-10 = "Blue, Archive."
10143-20 = "Blue Archive! Ehehe."
10143-30 = "Já fez os seus exercícios\nde alongamento e aquecimento?\nSe não fizer direito, eu vou te dar bronca."
10143-40 = "Nossa...\nQue lugar mais adorável."
10143-50 = "Este chá...\nparece fazer muito bem para a pele."
10143-60 = "(Será que tem algum problema\neu vir aqui vestida\nde maiô...\nassim do nada?)"
10143-70 = "Uuh...\nSinto que os meus ombros\nvão ficar muito tensos..."
10143-80 = "Aqui é tudo\ntão confortável...\nEu gostaria de ficar\naqui para sempre..."
10143-90 = "Bem-vindo de volta, Sensei.\nVai querer brincar na água primeiro? Ou vai querer comer?"
10143-100 = "Ou talvez..."
10143-110 = "Por favor, me peça qualquer coisa.\nVamos nos divertir juntos, sim?"
10143-120 = "Oii! Sensei!"
10143-130 = "A \"Shunzinha\",\nquer brincar com o Sensei!"
10143-140 = "Olá, Sensei."
10143-150 = "Fufu. Sim,\nhoje eu decidi vir de maiô."
10143-160 = "Sim! É a \"Shunzinha\"!\nEu já me troquei e coloquei o meu maiôzinho♪"
10143-170 = "O que você acha, Sensei?\nEu estou fofa?"
10143-180 = "Quando faz muito calor, a gente\nacaba não conseguindo pensar em nada, não é..."
10143-190 = "Os seus planos de verão...\nJá estão todos decididos?"
10143-200 = "Se não for muito incômodo...\nMe conte em segredo, por favor."
10143-210 = "A eu de agora,\nnão é a instrutora!"
10143-220 = "Por isso...\nEu vou fazer um moooonte de coisas\nque não posso fazer normalmente!"
10143-230 = "Neste momento, não sou a sua instrutora."
10143-240 = "Estou na Schale,\nvestindo um maiô."
10143-250 = "Isso... quer dizer que..."
10143-260 = "Como apenas um Sensei e uma aluna,"
10143-270 = "Talvez possamos interagir de uma\nmaneira diferente do habitual,"
10143-280 = "Quem sabe..."
10143-290 = "Ouvi dizer que à medida que crescemos,\na nossa percepção do tempo\nvai ficando cada vez mais curta."
10143-300 = "Quando somos crianças,\ntudo o que os nossos olhos captam\né novo e brilhante..."
10143-305 = "E é por isso que\no tempo parece passar mais devagar."
10143-310 = "Agora o meu corpo é pequeno,\nmas eu conheço muitas coisas, então――"
10143-320 = "Talvez a minha percepção do tempo,\nseja até mais curta\ndo que a de\noutras crianças da minha idade."
10143-330 = "Momentos divertidos passam voando."
10143-340 = "Portanto, precisamos valorizar\ncada pequeno instante."
10143-350 = "Para mim..."
10143-360 = "Este exato momento é o mais valioso."
10143-370 = "Sensei, Sensei!"
10143-380 = "Tem algum lugar\nque você queira ir\ncom a \"Shunzinha\" vestida de maiô?"
10143-390 = "Desde que eu esteja com você,\nqualquer lugar é perfeito!"
10143-400 = "Se um desejo meu pudesse se realizar..."
10143-410 = "Eu gostaria de visitar\nvários lugares com você, Sensei."
10143-420 = "A piscina, o desfiladeiro, a praia..."
10143-430 = "Para onde você quer ir, Sensei?"
10143-440 = "Brincar na água é muito divertido, né♪"
10143-450 = "Mas... na verdade,\nsó de poder brincar com você\neu já fico super feliz!"
10143-460 = "Brincar na água exige\nmuito do nosso corpo, não é?"
10143-470 = "Apesar disso,\neu adoro entrar na água."
10143-480 = "Sinto como se,\no meu corpo ficasse muito mais leve..."
10143-490 = "Algum dia...\nO Sensei não quer brincar comigo?"
10143-500 = "Se por um acaso\neu começasse a me afogar..."
10143-510 = "Mesmo se for \"de mentirinha\",\nvocê viria correndo me salvar?"
10143-520 = "É que...\neu tenho um certo fascínio\npor esse tipo de coisa.\nMas não vou fazer isso de verdade, ok?"
10143-530 = "Feliz aniversário,\nSensei. Ufufu."
10143-540 = "Para o Sensei que se esforça tanto\ntodos os dias, eu vou te dar\num cafuné e muitos mimos hoje."
10143-550 = "E-Eh, hyaaa!?"
10143-560 = "S-Sensei!?"
10143-570 = "Feliz\naniversário,\nSensei!"
10143-580 = "...No meu aniversário,\nvocê também vai comemorar comigo, né?"
10143-590 = "A Saya-san tinha me dito que os\nefeitos poderiam ficar instáveis,\nmas... não me diga que...?"
10143-600 = "S-Sensei, você não\nprecisa se desculpar...!"
10143-610 = "O-Ou melhor...\nAhn... er..."
10143-620 = "O-O que eu devo fazer...!"
10143-630 = "Hoje, é o meu\naniversário!"
10143-640 = "Sensei,\no que você vai me dar\nde presente?"
10143-645 = "...Fufu,\ncrianças sempre acham que têm\ndireito a um presente, sabia?"
10143-650 = "Sendo assim――\nHoje, você vai ter que me mimar\nmuito, muito mesmo, entendeu?"
10143-660 = "Eu vou me esconder, então..."
10143-670 = "E-Eu... estou bem,\njuro."
10143-680 = "Sensei, sendo assim..."
10143-690 = "O ano virou.\nFeliz Ano Novo,\nSensei!"
10143-700 = "A Shunzinha ficou\num ano mais velha!"
10143-705 = "...Dizer isso com este corpo,\né uma sensação muito estranha."
10143-710 = "É Natal..."
10143-720 = "Quando chega essa época no Jardim da Flor de Ameixeira――"
10143-730 = "Todas as crianças começam a afirmar\ncom todas as forças que foram \"boas meninas\"."
10143-740 = "Sim, a verdade é que\ntodas elas são boas meninas mesmo."
10143-750 = "É Natal,\nSensei!"
10143-760 = "Neste ano, será que eu\nfui uma \"boa menina\"?"
10143-765 = "Se o Papai Noel Sensei viesse me visitar...\nEu ficaria muito feliz♪"
10143-770 = "Tanto em Shanhaijing quanto no\nJardim, o conceito de\nHalloween começou a\nse espalhar recentemente."
10143-780 = "Por isso, todas se fantasiam\ne saem pedindo doces."
10143-790 = "Veja, Sensei, você também."
10143-800 = "Gostosuras ou travessuras,\ncomo dizem."
10143-810 = "Sensei! Você tem algum doce aí?"
10143-820 = "Antes que alguém leve tudo embora no\nGostosuras ou Travessuras,\neu queria comer alguns primeiro...!"
10143-2600 = "Quando estamos aproveitando as férias assim,\né normal que a gente acabe relaxando um pouco.\nMas é exatamente nesses momentos que precisamos manter a postura, sabia?\nSe você não seguir as regras, eu terei que puni-lo."