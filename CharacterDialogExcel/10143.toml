[translation]
10143-10 = "Blue Archive."
10143-20 = "Blue Archive! Hehe."
10143-30 = "Did you do your warm-up exercises?\nIf you don't do them properly, you'll get a scolding!"
10143-40 = "Oh my...\nWhat a lovely place."
10143-50 = "This tea...\nIt looks like it's good for the skin."
10143-60 = "(I wonder if it was really okay\nto come here\nwearing a swimsuit...)"
10143-70 = "Ugh...\nMy shoulders feel like\nthey're going to get stiff..."
10143-80 = "It's so\ncomfortable here...\nI want to stay\nforever..."
10143-90 = "Welcome back, Sensei.\nWould you like to play in the water? Or have a meal?"
10143-100 = "Or perhaps..."
10143-110 = "Please tell me anything you'd like.\nShall we enjoy ourselves together?"
10143-120 = "Hello! Sensei!"
10143-130 = "Shu-Elin wants to\nplay with you, Sensei!"
10143-140 = "Hello, Sensei."
10143-150 = "Fufu. Yes,\nI decided to come in a swimsuit today."
10143-160 = "Yes! It's Shu-Elin!\nI went ahead and changed into my swimsuit♪"
10143-170 = "What do you think, Sensei?\nDo I look cute?"
10143-180 = "When it's this hot, it's hard to think about anything, isn't it..."
10143-190 = "Have you already planned\nyour summer vacation?"
10143-200 = "If you don't mind...\nplease tell me in secret."
10143-210 = "I am not\nan instructor right now!"
10143-220 = "So...\nI'm going to do lots of things\nI usually can't!"
10143-230 = "I am not an instructor right now."
10143-240 = "And I am here at Schale\nwearing a swimsuit."
10143-250 = "That means... in other words..."
10143-260 = "As just a student and a teacher,"
10143-270 = "I wonder if we could\ninteract differently\nthan usual,"
10143-280 = "or something like that..."
10143-290 = "I've heard that as you grow older,\ntime feels like it passes\nfaster."
10143-300 = "When you're a child,\neverything you see\nis fresh and shining..."
10143-305 = "That's why time\nfelt so slow."
10143-310 = "My body is small right now, but since I know so many things—"
10143-320 = "perhaps my perception of time\nis shorter than other children\nmy age."
10143-330 = "Fun times fly by in an instant."
10143-340 = "That is why we must cherish\nevery single moment."
10143-350 = "For me..."
10143-360 = "this very moment is one of them."
10143-370 = "Sensei, Sensei!"
10143-380 = "Is there anywhere you'd like to go\nwith me, Shu-Elin,\nnow that I've changed?"
10143-390 = "If I'm with you, Sensei,\nanywhere is fine by me!"
10143-400 = "If a wish could come true..."
10143-410 = "I've been thinking about wanting to go\nto many different places with you, Sensei."
10143-420 = "The pool, the valley, the beach..."
10143-430 = "Where would you like to go, Sensei?"
10143-440 = "Playing in the water is fun, isn't it?♪"
10143-450 = "But... honestly,\nI'm happy with anything\nas long as I can play with you!"
10143-460 = "Playing in the water takes up quite a bit of energy, doesn't it?"
10143-470 = "But,\nI do love getting in the water."
10143-480 = "It makes my body\nfeel so light..."
10143-490 = "Won't you come play with me\nsometime, Sensei?"
10143-500 = "If I were to\ndrown..."
10143-510 = "Even if it were just \"pretend,\"\nwould you come to save me, Sensei?"
10143-520 = "I just... kind of\nlong for that sort of thing.\nI wouldn't actually do it, of course!"
10143-530 = "Happy birthday,\nSensei. Ufufu."
10143-540 = "I'll give you a good pat on the head\nfor working so hard\non this day."
10143-550 = "Eek, kyaaa!?"
10143-560 = "Se, Sensei!?"
10143-570 = "Happy\nbirthday,\nSensei!"
10143-580 = "...You'll celebrate my birthday\nnext time, won't you?"
10143-590 = "Saya-san said I might become a bit unstable, but...\nC-could it be...?"
10143-600 = "Y-you don't need to apologize,\nSensei...!"
10143-610 = "I-I mean...\nUm... well."
10143-620 = "W-what should I do...!?"
10143-630 = "It's my\nbirthday today!"
10143-640 = "Sensei,\nwhat is my\nbirthday present?"
10143-645 = "...Fufu,\nchildren expect presents,\nyou know?"
10143-650 = "So—\ntoday, please spoil me\nas much as you can, okay?"
10143-660 = "I'll hide, so..."
10143-670 = "I'm... I'm fine."
10143-680 = "Sensei, in that case..."
10143-690 = "The year has turned.\nHappy New Year,\nSensei!"
10143-700 = "Shu-Elin has become\none year older!"
10143-705 = "...It feels a bit strange\nsaying that in this form."
10143-710 = "It's Christmas..."
10143-720 = "When this time of year comes around at Plum Blossom Garden—"
10143-730 = "everyone starts claiming\nthat they've been a good child."
10143-740 = "Yes, they are all\ngood children, though."
10143-750 = "It's Christmas,\nSensei!"
10143-760 = "Have I been a \"good child\"\nthis past year?"
10143-765 = "I'd be happy if... Sensei Santa came to visit me♪"
10143-770 = "Both in Shanhaijing and at Plum Blossom Garden,\npeople have recently started to learn\nwhat kind of day Halloween is."
10143-780 = "So, everyone dresses up\nand begs for candy."
10143-790 = "Here, Sensei, for you too."
10143-800 = "Trick or treat."
10143-810 = "Sensei! Do you have any sweets?"
10143-820 = "I want to eat some\nbefore they get taken away\nby trick-or-treaters...!"
10143-2600 = "When you go on vacation like this, it's easy to let your guard down. But that's exactly when you need to stay sharp, you know? If you don't follow the rules, you'll get a scolding."