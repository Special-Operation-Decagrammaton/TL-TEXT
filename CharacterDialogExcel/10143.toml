[translation]
10143-10 = "Blue Archive."
10143-20 = "Blue Archive! Хе-хе."
10143-30 = "Вы сделали разминку?\nЕсли не разомнётесь как следует, я буду ругаться!"
10143-40 = "Боже... Какое чудесное место."
10143-50 = "Этот чай... Кажется, он очень полезен для кожи."
10143-60 = "(Интересно, действительно ли это было нормально — прийти сюда в купальнике...)"
10143-70 = "Угх... Такое чувство, будто плечи вот-вот затекут..."
10143-80 = "Здесь так уютно... Мне хочется остаться здесь навсегда..."
10143-90 = "С возвращением, Сенсей. Хотите поплескаться в воде? Или, может, перекусим?"
10143-100 = "Или, быть может..."
10143-110 = "Пожалуйста, говорите мне всё, чего пожелаете. Проведём это время весело вместе?"
10143-120 = "Привет! Сенсей!"
10143-130 = "Шунлинг хочет поиграть с тобой, Сенсей!"
10143-140 = "Здравствуйте, Сенсей."
10143-150 = "Фу-фу. Да, сегодня я решила прийти в купальнике."
10143-160 = "Да! Это я, Шунлинг! Я поспешила и переоделась в купальник♪"
10143-170 = "Что думаешь, Сенсей? Я выгляжу мило?"
10143-180 = "В такую жару сложно думать о чём-то серьёзном, не правда ли..."
10143-190 = "Вы уже построили планы на летний отпуск?"
10143-200 = "Если не секрет... поделитесь со мной на ушко."
10143-210 = "Прямо сейчас я вовсе не инструктор!"
10143-220 = "Так что... я собираюсь делать кучу вещей, которые обычно мне не дозволены!"
10143-230 = "Сейчас я не выполняю обязанности инструктора."
10143-240 = "И я нахожусь здесь, в Шале, будучи в купальнике."
10143-250 = "А это значит... иными словами..."
10143-260 = "Что как обычные ученица и учитель,"
10143-270 = "мы могли бы пообщаться немного иначе, чем обычно,"
10143-280 = "ну или как-то так..."
10143-290 = "Я слышала, что чем старше становишься, тем быстрее летит время."
10143-300 = "Когда ты ребёнок, всё вокруг кажется таким новым и сияющим..."
10143-305 = "Вот почему тогда время тянулось так медленно."
10143-310 = "Моё тело сейчас маленькое, но поскольку я знаю уже слишком многое —"
10143-320 = "возможно, моё восприятие времени короче, чем у других детей моего возраста."
10143-330 = "Весёлые моменты пролетают в одно мгновение."
10143-340 = "И именно поэтому мы должны дорожить каждой секундой."
10143-350 = "Для меня..."
10143-360 = "это самое мгновение — одно из таких."
10143-370 = "Сенсей, Сенсей!"
10143-380 = "Есть ли место, куда бы тебе хотелось пойти вместе со мной, с изменившейся Шунлинг?"
10143-390 = "Если я с тобой, Сенсей, то мне подойдёт абсолютно любое место!"
10143-400 = "Если бы загаданное желание могло исполниться..."
10143-410 = "Я часто ловила себя на мысли, что хочу посетить множество самых разных мест вместе с вами, Сенсей."
10143-420 = "Бассейн, каньон, пляж..."
10143-430 = "Куда бы вам хотелось отправиться, Сенсей?"
10143-440 = "Плескаться в воде ведь так весело, правда?♪"
10143-450 = "Но... честно говоря, я буду рада чему угодно, лишь бы играть вместе с тобой!"
10143-460 = "Игры в воде отнимают довольно много сил, не так ли?"
10143-470 = "Но я действительно очень люблю плавать."
10143-480 = "В воде моё тело становится таким лёгким..."
10143-490 = "Не хотите ли как-нибудь поплавать вместе со мной, Сенсей?"
10143-500 = "Если бы я начала... тонуть..."
10143-510 = "Даже если бы это было просто «понарошку», ты бы пришёл спасти меня, Сенсей?"
10143-520 = "Мне просто... как бы это сказать, всегда хотелось подобного. Разумеется, на самом деле я бы так делать не стала!"
10143-530 = "С днём рождения, Сенсей. У-фу-фу."
10143-540 = "Я как следует поглажу вас по голове за то, что вы так усердно трудились в этот день."
10143-550 = "Ой, кья-а-а?!"
10143-560 = "Се... Сенсей?!"
10143-570 = "С днём\nрождения,\nСенсей!"
10143-580 = "...Ты ведь отпразднуешь мой день рождения в следующий раз, правда?"
10143-590 = "Сая-сан предупреждала, что моё состояние может стать немного нестабильным, но... Неужели...?"
10143-600 = "Вам... вам незачем извиняться, Сенсей...!"
10143-610 = "Я... я имела в виду... Ну... в общем."
10143-620 = "Ч-что же мне делать...?!"
10143-630 = "У меня сегодня\nдень рождения!"
10143-640 = "Сенсей,\nа какой у меня\nподарок?"
10143-645 = "...Фу-фу, дети ведь всегда ждут подарков, понимаешь?"