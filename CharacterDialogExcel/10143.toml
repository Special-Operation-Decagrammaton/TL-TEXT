[translation]
10143-10 = "ブルー、アーカイブ。"
10143-20 = "ブルーアーカイブ！えへへ。"
10143-30 = "準備体操はしましたか？\nちゃんとしないとメッですよ？"
10143-40 = "あら……\n素敵な場所ですね。"
10143-50 = "このお茶……\nお肌に良さそうです。"
10143-60 = "（ここって水着姿で\n来ても、大丈夫\nだったの\nでしょうか……）"
10143-70 = "うう……\n肩が凝って\nしまいそう……。"
10143-80 = "とても\n快適すぎて……\nずっとここに\nいたいです……。"
10143-90 = "おかえりなさい、先生。\n水遊びにします？ご飯にします？"
10143-100 = "それとも……。"
10143-110 = "なんでもお伝え下さい。\n一緒に楽しみましょう？"
10143-120 = "こんにちは！先生！"
10143-130 = "「シュエリン」は、\n先生と遊びたいです！"
10143-140 = "こんにちは、先生。"
10143-150 = "ふふっ。ええ、\n今日は水着で来てみました。"
10143-160 = "はい！「シュエリン」ですよ！\n水着に着替えてきちゃいました♪"
10143-170 = "どうでしょう、先生？\n可愛いですか？"
10143-180 = "暑いと何も考えられ\nなくなってしまいますよね……。"
10143-190 = "夏休みの計画……\n既に決まっていますか？"
10143-200 = "もしよろしければ……\nこっそり、教えてください。"
10143-210 = "今の私は、\n教官ではありません！"
10143-220 = "なので…\n普段できないことを、\nい～っぱいしちゃいます！"
10143-230 = "私は今、教官ではありません。"
10143-240 = "そして、水着を着て、\nシャーレにいます。"
10143-250 = "その……つまり……。"
10143-260 = "ただの先生と生徒として、"
10143-270 = "普段とは違う接し方ができる\nのではないかな、"
10143-280 = "なんて……。"
10143-290 = "大きくなるにつれて、\n体感時間が短くなっていくと\n聞きました。"
10143-300 = "子供の時は、\n目に映るものがすべて\n新鮮で輝いていて…"
10143-305 = "だから時間が\nゆっくりだったんです。"
10143-310 = "今の私は身体は小さいですが、\n色々なことを知っているので――"
10143-320 = "もしかしたら、\n同年代の他の子よりも、\n体感時間が\n短くなってるかもしれませんね。"
10143-330 = "楽しい時間はあっという間。"
10143-340 = "ですから、どの瞬間も\n大切にしないといけません。"
10143-350 = "私にとっては……"
10143-360 = "今この瞬間が、そうなんです。"
10143-370 = "先生、先生！"
10143-380 = "着替えてきた\n「シュエリン」と\n一緒に行きたい場所、\nありますか？"
10143-390 = "私は先生と一緒なら、\nどこでも良いですよ！"
10143-400 = "もしも、願いが叶うのなら……。"
10143-410 = "先生と色々なところに、\n行ってみたいと思っていまして。"
10143-420 = "プール、渓谷、海……。"
10143-430 = "先生は、どこに行きたいですか？"
10143-440 = "水遊び、楽しいですね♪"
10143-450 = "でも…本当は、\n先生と遊べるならなんでも\n嬉しいです！"
10143-460 = "水遊びって、結構体力を\n使ってしまいますよね？"
10143-470 = "でも、\n水に入るのは好きなんです。"
10143-480 = "なんだか、\n身体が軽くなる感じがして……。"
10143-490 = "先生もいつか一緒に……\n遊びませんか？"
10143-500 = "もしも私が\n溺れちゃったら…"
10143-510 = "それが「ふり」だとしても、\n先生は助けに来てくれますか？"
10143-520 = "なんとなく…\nそういうのに\n憧れちゃうだけです。\n本当にやったりはしませんよ？"
10143-530 = "お誕生日おめでとうございます、\n先生。うふふ。"
10143-540 = "今日という日を\n頑張っている先生を\nいいこいいこ、してあげます。"
10143-550 = "えっ、ひゃああ！？"
10143-560 = "せ、先生！？"
10143-570 = "お誕生日\nおめでとうございます、\n先生！"
10143-580 = "…今度、私の誕生日も、\nお祝いしてくださいね？"
10143-590 = "サヤさんが、少し不安定になる\nかもと仰っていましたが……\nっまさか……？"
10143-600 = "せ、先生が\n謝る必要はありません……！"
10143-610 = "と、というか……\nあの……えっと。"
10143-620 = "わ、私はどうしたら……！"
10143-630 = "今日、私の\n誕生日なんです！"
10143-640 = "先生、\n誕生日プレゼントは\nなんですか？"
10143-645 = "…ふふっ、\n子供はプレゼントがあるものだと\n思っているんですよ？"
10143-650 = "なので――\n今日は、いっぱい\n甘やかしてくださいね？"
10143-660 = "隠れるので……。"
10143-670 = "私……大丈夫、ですから。"
10143-680 = "先生、でしたら……"
10143-690 = "年が明けましたね。\nあけましておめで\nとうございます、先生！"
10143-700 = "シュエリンはまた一つ、\nお姉さんになりました！"
10143-705 = "…この姿で言うのは、\nなんだか不思議な気分ですね。"
10143-710 = "クリスマスですね……。"
10143-720 = "この時期になると梅花園では――"
10143-730 = "みんな自分がいい子だ、\nと主張し始めるんです。"
10143-740 = "ええ、みんな\nいい子なんですけどね。"
10143-750 = "クリスマスですよ、\n先生！"
10143-760 = "この一年、私は\n「良い子」だったでしょうか？"
10143-765 = "先生サンタが来てくれたら…\n嬉しいです♪"
10143-770 = "山海経でも梅花園でも、\n最近ハロウィーンが\nどんな日なのか\n広まってきたんです。"
10143-780 = "なので、みんな仮装して\n飴をねだるんですよ。"
10143-790 = "ほら、先生も。"
10143-800 = "トリック・オア・トリート、\nです。"
10143-810 = "先生！お菓子ってありますか？"
10143-820 = "トリックオアトリートで\n持っていかれちゃう前に、\nいくつか食べておきたくて…！"
10143-2600 = "こんな風にバカンスに出かけていると、\nついつい気が緩んでしまうもの。\nですが、そういう時こそ気を引き締めないと\nいけませんよ？\n規則を守らないと、メッですからね。"
