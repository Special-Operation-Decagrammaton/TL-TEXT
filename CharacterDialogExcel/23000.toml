[translation]
23000-20 = "お会いできて嬉しいです、先生～\n先生はどんなアイスが好きですか？"
23000-30 = "んー、\n何を食べようかな…。"
23000-40 = "今日もやっぱり\nいちご＆ミント～"
23000-50 = "アイス、アイス～\nアイスクリーム～"
23000-60 = "放課後には\nやっぱりスイーツ！"
23000-70 = "いちごとミントは最高！"
23000-80 = "先生～、お帰りなさい。\n今日も一緒にスイーツ\n食べに行きますよね？"
23000-90 = "先生、遅いですよ～"
23000-100 = "一緒にアイス買いに\n行きましょう！"
23000-110 = "ルンルン～\n甘いの大好き～"
23000-120 = "先生もアイスクリーム\n好きですよね？ね？"
23000-130 = "放課後は\nスイーツタイム～"
23000-140 = "おいしいスイーツのため～\n今日も一緒に、\n頑張りましょう！"
23000-150 = "ん？\n先生。何か悩みが\nありそうな顔ですね。"
23000-160 = "そういう時は、さあさあ！\n美味しいスイーツを食べに！\n一緒に行きましょう！"
23000-170 = "先生！お誕生日\nおめでとうございます！"
23000-180 = "私が特別に！おいしい\nスイーツ屋さんを\n予約しておきましたよ！"
23000-190 = "さあさあ、急いで！先生！"
23000-200 = "先生～ 今日は\n私の誕生日です！\n一緒にアイス食べに\n行きましょう！"
23000-210 = "ん？\nプレゼントですか？"
23000-220 = "大丈夫ですよ～\n先生が私の\nプレゼントですから！"
23000-230 = "先生～明けまして\nおめでとうございます～"
23000-240 = "今年も美味しい\nスイーツのため！\n一緒に頑張りましょう！"
23000-250 = "わーい、先生～！\nクリスマスですよ！"
23000-260 = "こういう日にはやっぱり\nアイスが似合いますよね！\n一緒に買いに行きましょうか？"
23000-270 = "えへへっ、今日は\nハロウィーンですね。"
23000-280 = "一緒にお化けの\nコスプレして\n甘いものを貰いに\n行ってみましょうか？"
23000-290 = "Trick or Treat～"
23000-310 = "私の分も買っていただいて\nありがとうございます、先生。"
23000-320 = "あ、甘くて美味しいです！"
23000-330 = "カフェではなく、外で食べる\nアイスクリームって\nすごく久しぶりな気がします。"
23000-340 = "それに、先生と一緒ですし。\nえへへっ。"
23000-350 = "い、いえ、\n全然そんなことは。"
23000-360 = "むしろ懐かしくて、\n嬉しいです。"
23000-370 = "嬉しいですし、その…。"
23000-380 = "何と言えばいいんでしょう、\n周りに人も少ないですし…。"
23000-390 = "すごく、\nドキドキすると\n言いますか…。"
23000-400 = "…な、なっ、\nなんでもありません！"
23000-410 = "今のは忘れてください！"
23000-420 = "はは、あはは…。"
23000-430 = "…ありがとう\nございます、先生。"
23000-440 = "今日も先生のおかげで、\nもうすでに幸せな\n一日になりました。"
23000-2600 = "……この武器は……。\nありがとうございます。先生。\n強くなるのは、少し怖いことですが……。\n先生と一緒なら、大丈夫です！"
