[translation]
23000-20 = "Estou feliz em te ver, Sensei~\nQual tipo de sorvete você gosta?"
23000-30 = "Hmm,\nO que será que eu como..."
23000-40 = "Hoje também vou de\nmorango com menta~"
23000-50 = "Sorvete, sorvete~\nSorvete~"
23000-60 = "Depois da aula,\nnada melhor que um doce!"
23000-70 = "Morango com menta é o melhor!"
23000-80 = "Sensei~, bem-vindo de volta.\nVamos comer doces juntos\nhoje também, né?"
23000-90 = "Sensei, você está atrasado~"
23000-100 = "Vamos comprar\nsorvete juntos!"
23000-110 = "Lalala~\nEu amo doces~"
23000-120 = "Você também gosta de\nsorvete, né, Sensei? Né?"
23000-130 = "Depois da aula é\nhora do doce~"
23000-140 = "Por causa dos doces deliciosos~\nVamos nos esforçar juntos\nhoje também!"
23000-150 = "Hm?\nSensei. Você está com uma cara de quem tem algum problema."
23000-160 = "Nessas horas, vamos lá! \nPara comer um doce delicioso!\nVamos juntos!"
23000-170 = "Sensei! Feliz\naniversário!"
23000-180 = "Eu reservei uma doceria\nespecialmente deliciosa\npara você!"
23000-190 = "Vamos, vamos, depressa! Sensei!"
23000-200 = "Sensei~ Hoje é\nmeu aniversário!\nVamos comer sorvete\njuntos!"
23000-210 = "Hm?\nUm presente?"
23000-220 = "Não precisa se preocupar~\nVocê é o meu\npresente, Sensei!"
23000-230 = "Sensei~ Feliz\nAno Novo~"
23000-240 = "Este ano também, por causa\ndos doces deliciosos!\nVamos nos esforçar juntos!"
23000-250 = "Eba, Sensei~!\nÉ Natal!"
23000-260 = "Sorvete combina muito\ncom um dia como hoje, né!\nVamos comprar juntos?"
23000-270 = "Hehehe, hoje é\nHalloween."
23000-280 = "Que tal nos fantasiarmos\nde fantasmas e irmos\npegar alguns doces?"
23000-290 = "Gostosuras ou travessuras~"
23000-310 = "Obrigada por comprar o meu\ntambém, Sensei."
23000-320 = "Ah, está doce e delicioso!"
23000-330 = "Sinto que faz muito tempo que não tomo\nsorvete fora do café."
23000-340 = "Além disso, estou com você, Sensei.\nHehehe."
23000-350 = "N-não,\nnão é nada disso."
23000-360 = "Na verdade, é nostálgico\ne me deixa feliz."
23000-370 = "Estou feliz e, bem..."
23000-380 = "Como posso dizer, não tem\nquase ninguém por perto..."
23000-390 = "É como se meu coração\nestivesse batendo muito forte..."
23000-400 = "...N-n-não,\nnão é nada!"
23000-410 = "Esqueça o que eu disse agora!"
23000-420 = "Haha, ahaha..."
23000-430 = "...Muito obrigada,\nSensei."
23000-440 = "Graças a você, hoje já se tornou\num dia muito feliz."
23000-2600 = "......Esta arma......\nMuito obrigada, Sensei.\nFicar mais forte é um pouco assustador, mas......\nSe estiver com você, Sensei, vai ficar tudo bem!"
