[translation]
10084-10 = "ブルー、アーカイブ。"
10084-20 = "こちらにいらしたんですね。山でも、海でも…\n先生の音は、どこにいても聞き逃しません。"
10084-30 = "これが…SNSで\n話題のインテリア、\nですか…。"
10084-40 = "今流れている\nこれ…曲名が\n思い出せません…。"
10084-50 = "…この辺に置いた\nはずなのに…。"
10084-60 = "…録音、完了です。"
10084-70 = "（うーん…？いま、\n気になる話を\n耳にしたような…）"
10084-80 = "あ、先生、靴を\n替えたのですね。"
10084-90 = "足音が変わったから…\nビックリ、しました。"
10084-100 = "あっ、先生…\nおかえりなさい。"
10084-110 = "べ、別に…\nやましいことはしてません。"
10084-120 = "せ、先生のために椅子を\n温めていただけです。"
10084-130 = "今週末は暖かい恰好で\nお出かけください。"
10084-140 = "寒波で気温が急激に\n下がるとのことです。"
10084-150 = "どうして出かける事を\n知っているのか、ですか…？"
10084-160 = "えっとそれは…"
10084-170 = "偶然、です。"
10084-180 = "個人的には、\n冬の山が好きです。"
10084-190 = "遠くの音が、\nよく聴こえるので。"
10084-200 = "ですので…\n冬の山で何か言う際は、\nどうぞお気をつけて。"
10084-210 = "内緒話には向きません。"
10084-220 = "なぜ電波塔のほとんどは\n山頂にあるのでしょう…。"
10084-230 = "いえ、理由は分かっています…"
10084-240 = "接近が難しいので、\n音を聴きに行くのも\n一苦労です…"
10084-250 = "…この時期は、\nレッドウィンター連邦学園の\n宣伝放送がよく\n紛れてくるんです。"
10084-260 = "こんなところまで\n聞こえてくるなんて…"
10084-270 = "あの学園の宣伝方法には\n頭を抱えます。"
10084-280 = "冬の山では野生動物…"
10084-290 = "特に蛇に気をつけてください。"
10084-300 = "登山中、蛇と出くわして\n山登りを諦めてしまう人が\n多いと聴きますので。"
10084-310 = "お誕生日おめでとう\nございます、先生。"
10084-320 = "先生がぐっすり眠れるよう、\n自作のASMR音声を\n用意しました。"
10084-330 = "今晩、寝る前にどうぞ。"
10084-340 = "わ、私の誕生日、ですか？"
10084-350 = "あ…い、祝ってくださり、\nありがとうございます。"
10084-360 = "…今の言葉、\nもう一回お願いします。"
10084-370 = "明けまして\nおめでとうございます。"
10084-380 = "…今年一番のこの言葉…\n先生に聴いてほしかったので\n嬉しいです。"
10084-390 = "今日という日に、\n恋人たちが交わす甘い\n通話を聞いていると、"
10084-400 = "なんだか私も、\nときめいてしまいます…"
10084-410 = "…え？それは\n盗聴じゃないかって…？"
10084-420 = "それは、その、えっと…\n違いますよ…？"
10084-430 = "カボチャを切る音が案外、\n心地よくて…"
10084-440 = "気がつけば、\nカボチャの飾りを何個も\n作ってしまっていました。"
10084-450 = "よろしければ一つ、\n受け取ってください。"
10084-470 = "先生、声を落として。"
10084-480 = "静かに…木に近づいて…"
10084-490 = "中の音に、\n耳を澄ませてください。"
10084-500 = "…聴こえますか？"
10084-510 = "幹の中を通る、水の音が。"
10084-520 = "この木は、葉をすべて落とし…\nまるで、生を諦めたように\n見えますが…"
10084-530 = "今でもこうして、\n力強く水を\n吸い上げています。"
10084-540 = "一見、静かに\n見えるこの森も…\n本当は、たくさんの\n音で溢れてる…"
10084-550 = "…ふふ、音に飽きる\nことはこの先も\nなさそうです。"
10084-2600 = "銃声の代わりに先生の声が\nするようになればいいのに……\n実現できないか\n工夫してみようと思います。"
