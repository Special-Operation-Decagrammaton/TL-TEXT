[translation]
10084-10 = "Blue Archive."
10084-20 = "Você veio até aqui. Seja na montanha ou no mar...\nEu nunca deixaria de ouvir o som do Sensei, não importa onde esteja."
10084-30 = "Então... este é o item de decoração\nque está fazendo sucesso\nnas redes sociais..."
10084-40 = "Esta música que está tocando\nno momento... não consigo\nlembrar o nome dela..."
10084-50 = "...Eu tinha certeza de que\ntinha colocado por aqui..."
10084-60 = "...Gravação concluída."
10084-70 = "(Hmm...? Senti como se tivesse\nouvido algo interessante\npor acaso...)"
10084-80 = "Ah, Sensei, você trocou\nde sapatos."
10084-90 = "O som dos seus passos mudou, então...\nEu levei um susto."
10084-100 = "Ah, Sensei...\nBem-vindo de volta."
10084-110 = "N-não é nada...\nNão estou fazendo nada de errado."
10084-120 = "E-eu só estava aquecendo\na cadeira para o Sensei."
10084-130 = "Por favor, saia bem agasalhado\nneste fim de semana."
10084-140 = "Dizem que a temperatura vai cair\nrepentinamente por causa da onda de frio."
10084-150 = "Como eu sei que você vai sair,\nvocê pergunta...?"
10084-160 = "Bem, isso é..."
10084-170 = "Foi coincidência."
10084-180 = "Pessoalmente, eu gosto\ndas montanhas no inverno."
10084-190 = "Porque os sons distantes\nsão ouvidos com clareza."
10084-200 = "Por isso... quando for dizer algo\nnas montanhas no inverno,\npor favor, tome cuidado."
10084-210 = "Não é um bom lugar para segredos."
10084-220 = "Por que será que a maioria das torres\nde transmissão fica no topo das montanhas..."
10084-230 = "Não, eu sei o motivo..."
10084-240 = "Como é difícil chegar perto,\né um esforço enorme\nir até lá para ouvir os sons..."
10084-250 = "...Nesta época, as transmissões\nde propaganda da Academia Red Winter\nfrequentemente se misturam\ncom o sinal."
10084-260 = "Chegar a ouvir até aqui..."
10084-270 = "Eu não sei o que pensar\nsobre o método de propaganda daquela academia."
10084-280 = "Nas montanhas no inverno, cuidado\ncom os animais selvagens..."
10084-290 = "Especialmente com as cobras."
10084-300 = "Ouvi dizer que muitas pessoas desistem\nde escalar ao encontrar uma cobra\nno caminho."
10084-310 = "Feliz aniversário,\nSensei."
10084-320 = "Preparei um áudio ASMR feito por mim\npara que o Sensei possa dormir tranquilamente."
10084-330 = "Por favor, ouça hoje à noite\nantes de dormir."
10084-340 = "O-o meu aniversário, você diz?"
10084-350 = "Ah... o-obrigada por\nme desejar os parabéns."
10084-360 = "...Pode repetir\no que acabou de dizer?"
10084-370 = "Feliz Ano Novo."
10084-380 = "...Esta é a primeira vez que digo isso este ano...\nEu queria que o Sensei ouvisse, então\nestou muito feliz."
10084-390 = "Ao ouvir as doces conversas\nque os casais trocam\nnum dia como hoje,"
10084-400 = "eu acabo me sentindo\num pouco empolgada também..."
10084-410 = "...Eh? Isso não seria\nescuta ilegal...?"
10084-420 = "Isso é, bem, hum...\nNão é nada disso...?"
10084-430 = "O som de cortar a abóbora é\nsurpreendentemente relaxante..."
10084-440 = "Quando me dei conta,\nacabei fazendo várias\ndecorações de abóbora."
10084-450 = "Se não se importar,\naceite uma delas."
10084-470 = "Sensei, fale baixo."
10084-480 = "Silenciosamente... aproxime-se da árvore..."
10084-490 = "Preste atenção\naos sons lá de dentro."
10084-500 = "...Consegue ouvir?"
10084-510 = "O som da água passando pelo tronco."
10084-520 = "Esta árvore perdeu todas as suas folhas... parece que desistiu da vida, mas..."
10084-530 = "Mesmo agora, ela continua absorvendo água com força."
10084-540 = "Esta floresta, que parece silenciosa à primeira vista... na verdade, está cheia de sons..."
10084-550 = "...Hehe, não parece que vou me cansar desses sons tão cedo."
10084-2600 = "Seria bom se a voz do Sensei pudesse substituir o som dos tiros... Vou tentar pensar em uma maneira de tornar isso realidade."
