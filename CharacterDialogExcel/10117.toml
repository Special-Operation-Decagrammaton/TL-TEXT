[translation]
10117-10 = "Blue Archive."
10117-20 = "Academia Ferroviária Highlander\nTachibana Hikari... chegou."
10117-30 = "Uau, parece que dá para\nbrincar bastante..."
10117-40 = "Sensei, cadê você?"
10117-50 = "Hoje é dia de folga, decidido."
10117-60 = "Não tem doces?\nE suco?"
10117-70 = "Não tem nada de interessante?"
10117-80 = "Sensei, seja bem-vindo."
10117-90 = "Eu estava te esperando."
10117-100 = "Ah... os doces da copa\nacabaram."
10117-110 = "Hm? Posso pegar?"
10117-120 = "Aqui é a Hikari.\nEstou entediada.\nCâmbio."
10117-130 = "Ah, trabalho burocrático?"
10117-140 = "Buuu, que chato."
10117-150 = "Sensei, quer um doce?"
10117-160 = "Toma, esse é super apimentado."
10117-170 = "Para a Hikari foi\nimpossível, então toma."
10117-180 = "Eu cuido disso aqui."
10117-190 = "Eu consigo, tá? É minha vez de cuidar disso."
10117-200 = "...\n...(Cochilo)\nNnn, eu estava dormindo."
10117-210 = "Sensei, posso sentar no seu colo?"
10117-220 = "Não espero resposta para agir.\nEssa é a Tachibana Hikari."
10117-230 = "Olha só, Sensei.\nUm cachorrinho de sombra."
10117-240 = "...Oh? Esse sou eu?\nE os outros?"
10117-250 = "Tripulação do Schale, responda.\nTcharam!"
10117-260 = "Hoje é o aniversário do Sensei.\nParabéns.\nVamos comer bolo juntos."
10117-270 = "Quiz: que dia é hoje?"
10117-280 = "Resposta certa: é o aniversário\nda Hikari e da Nozomi."
10117-290 = "Aceito presentes, qualquer coisa serve."
10117-300 = "Decidi minha meta para este ano.\nDiminuir... a quantidade de doces...!"
10117-310 = "...Nnn, acho que vou tentar ano que vem."
10117-320 = "Sensei, você chorou este ano?\nA Hikari não chorou.\nEu me segurei."
10117-330 = "Então, será que\neu ganho um presente?\nEu fui uma boa menina."
10117-340 = "Trick or Train."
10117-350 = "É, só falei por falar.\nMe dá um doce."
10117-370 = "Aqui, aqui..."
10117-380 = "Aaa... lá no fundo...\nmeu dente está doendo...\nSensei, consegue ver?"
10117-390 = "O dente do fundo do lado direito está doendo."
10117-400 = "Uuu, aí mesmo...\nEstá latejando."
10117-410 = "E agora, o que eu faço?\nÉ o fim da Hikari?\nMe salva, Sensei..."
10117-2600 = "Vai me dar?\nObrigada. Em troca,\neu vou te proteger, Sensei."
