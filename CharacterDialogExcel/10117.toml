[translation]
10117-10 = "ブルーアーカイブー。"
10117-20 = "ハイランダー鉄道がくえーん\n橘ヒカリ……さんじょー。"
10117-30 = "うぉー、いっぱい\n遊べそう……"
10117-40 = "せんせーどこー。"
10117-50 = "今日はおサボリデーに決定ー。"
10117-60 = "お菓子ないのー？\nジュースは？"
10117-70 = "面白いことなーいー？"
10117-80 = "先生ーいらっしゃーい。"
10117-90 = "待ってたよー"
10117-100 = "あー……\n給湯室のお菓子、\nなくなっちゃったー"
10117-110 = "ん？いいのー？"
10117-120 = "こちらヒカリー\n暇をもてあましていますー\nどうぞー"
10117-130 = "えー事務作業ー？"
10117-140 = "ぶーつまんなーい。"
10117-150 = "せんせーお菓子いるー？"
10117-160 = "はい、激辛ー"
10117-170 = "ヒカリには\n無理だったからあげるー"
10117-180 = "これはヒカリがやっとくねー"
10117-190 = "できるよー？当番だし？"
10117-200 = "……\n……（コクン）\nんんっ、ねてたー。"
10117-210 = "せんせー、膝の上いいー？"
10117-220 = "返事は待たずに動くー\nそれが橘ヒカリー。"
10117-230 = "見て見てせんせー。\nかげえのわんちゃんー"
10117-240 = "……おー？それ、わし？\nほかはー？"
10117-250 = "シャーレ乗務員、応答ねがうー\nじゃーん！"
10117-260 = "今日は先生のお誕生日ー。\nおめでとー。\nケーキ一緒に食べよー。"
10117-270 = "クイズー、\n今日は何の日でしょー？"
10117-280 = "正解ー、ヒカリと\nノゾミの誕生日ー。"
10117-290 = "プレゼント求むー何でも歓迎ー。"
10117-300 = "今年の抱負がきまったのだー。\nお菓子の量を……へらす……！"
10117-310 = "……んーやっぱり来年頑張るー。"
10117-320 = "先生は今年泣いたー？\nヒカリは泣いてないよー\n我慢したー。"
10117-330 = "だからプレゼント\nもらえるかなー？\nいいこにしてたのだ。"
10117-340 = "トリックーオアートレーイン。"
10117-350 = "うんーテキトーに言っただけー。\nお菓子ちょうだいー"
10117-370 = "ここ、ここー……"
10117-380 = "そ～……おくのほ～\nはがーいたいー\nせんせー、みえるー？"
10117-390 = "みぎのおくばがねーいたいのー"
10117-400 = "うう、そこ……\nズキズキー。"
10117-410 = "えーどうすればいいのー\nヒカリ死亡フラグー？\nたすけてーせんせー……。"
10117-2600 = "くれるのー？\nありがとー。代わりに、\n先生の事まもってあげるー"
