[translation]
10011-20 = "訓育支援部梅花園の教官、シュンです。\nうちの子たちをよろしくお願いいたしますね、\nせ・ん・せ・い？"
10011-30 = "ふふ、次はここへみんなを\n一緒に連れてきての\n授業にしましょうか？"
10011-40 = "お昼寝の時間はまだなのに…\nなんだか眠くなってきました…"
10011-50 = "リンカはきちんと、\n子供たちの面倒を見ら\nれているでしょうか…"
10011-60 = "あらまあ、カワイイ…"
10011-70 = "ふふ、愛くるしいですね～"
10011-80 = "ようこそ、先生。\nお食事になさいますか、\nお風呂に入られますか？"
10011-90 = "それとも…授業？"
10011-100 = "前回、途中で終わってしまった\n授業を再開しましょう、ふふ。"
10011-110 = "もう～、先生は私に\n甘えちゃダメですよ。"
10011-120 = "でもたまにでしたら…\n大目に見てあげますよ？"
10011-130 = "ふふっ、今日もよろしくお\n願いいたしますね？"
10011-140 = "は～い、シュンですよ～"
10011-150 = "いい子、いい子～"
10011-160 = "また触ると…"
10011-170 = "こらっ、\nって叱っちゃいますよ？"
10011-180 = "ハッピーバースデー\nトゥーユー♪\nハッピーバースデー\nトゥーユー♬"
10011-190 = "ハッピーバースデー\nディア先生～♪\nハッピーバースデー\nトゥーユー♬"
10011-200 = "ふう…また一つ、\n年を取ってしまいましたね…"
10011-210 = "私の年ですか？\nふふ、秘密ですよ。"
10011-220 = "ふふ、今年も一年、\nよろしくお願いしますね～。"
10011-230 = "しっ、先生。\nサンタの変装がバレないように\n気を付けてくださいね。"
10011-240 = "子供たちの純粋な心は、\n何よりも大切なもの\nなんですから。"
10011-250 = "あら、子供たちがどこかで\n飴をたくさん貰って\nきたようですね。"
10011-260 = "トリック…"
10011-270 = "なんでしたっけ？"
10011-290 = "あら、\nお目覚めになりましたか。"
10011-300 = "今日は…\n本当に楽しかったです。\nふふ。"
10011-310 = "あら、もう子供たちが\n帰ってくる時間ですね。"
10011-320 = "そろそろお仕事にお\n戻りになった方が\n良いのでは…。"
10011-330 = "いえ、やはり…ふふ、\nもう少しゆっくりしていて\nください、先生。"
10011-340 = "今日の授業は\n私が代わりますので。"
10011-350 = "ああ…可愛い…\nふふっ。"
10011-2600 = "これを使いたくはなかったのですけど……\nびしっとした愛のムチも、\n時には必要なのです。"
