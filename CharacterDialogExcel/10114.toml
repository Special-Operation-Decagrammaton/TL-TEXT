[translation]
10114-10 = "Blue Archive!"
10114-20 = "Seja bem-vindo, Sensei!\nPor favor, me chame quando estiver pronto para pedir!\nIrei atendê-lo com todo o meu carinho!"
10114-30 = "Uau! Que café\nmaravilhoso!\nPor favor, deixe-me\ndar uma olhada!"
10114-40 = "Uau...\nQue decoração linda..."
10114-50 = "(Ah, essa\nreceita é...!)"
10114-60 = "O fluxo de movimento é assim...\nserá?\nEstou aprendendo muito."
10114-70 = "Mesmo sendo uma garçonete,\ndescansar no café...\nÉ uma sensação\num tanto estranha..."
10114-80 = "Bem-vindo de volta, Sensei!"
10114-90 = "Fufu, não se preocupe.\nO tempo que passei esperando pelo Sensei\nfoi extremamente feliz."
10114-100 = "Seja bem-vindo!\nO \"Café Schale\"\nestá aberto!"
10114-110 = "E-está bom... como foi?\nEu parecia uma garçonete\nde verdade?"
10114-120 = "Eu consegui... aprender a\ncozinhar um pouquinho!"
10114-130 = "Talvez seja o resultado\ndos meus treinos."
10114-140 = "Será que o Sensei também\nteve algo a ver com isso...?"
10114-150 = "Ahaha... na verdade, acabo\nfalhando na maioria das vezes."
10114-160 = "Se eu puder fazer alguém\ncomer algo delicioso..."
10114-170 = "Se essa pessoa puder\ngostar da minha comida..."
10114-180 = "......Só de pensar nisso,\nmeu coração se enche."
10114-190 = "Meu prato principal\né o parfait!"
10114-200 = "......Embora eu possa dizer\nque é o único prato."
10114-210 = "Já que é só colocar os\ningredientes por cima..."
10114-220 = "Trabalho de meio período?\nNão é tão difícil assim."
10114-230 = "Comparado ao trabalho no Clube de Merenda,\nnão é nada!"
10114-240 = "......Quero continuar\nme esforçando daqui em diante."
10114-250 = "Porque não quero\ndeixar arrependimentos."
10114-260 = "Se por acaso\nas coisas não derem certo..."
10114-270 = "Por favor, segure\na minha mão, Sensei."
10114-280 = "Feliz aniversário!"
10114-290 = "Eu fiz um parfait\nde aniversário!"
10114-300 = "......Coloquei muito\ncarinho nele, sabe."
10114-310 = "Se quiser,\npor favor, coma!"
10114-320 = "O que eu quero de\naniversário...? \nBem, vejamos..."
10114-330 = "Poderia me dar o seu dia,\nSensei?"
10114-340 = "Feliz Ano Novo,\nSensei!"
10114-350 = "Que tal fazermos um tour pelos cafés\npara começar o ano novo comigo?"
10114-360 = "Falando em Natal,\né peru, não é!"
10114-370 = "Isso... me desculpe..."
10114-380 = "O frango assado...\nsaiu correndo..."
10114-390 = "É o dia das abóboras, doces,\nfantasias e travessuras!"
10114-400 = "Ei... Sensei,"
10114-410 = "Sabe... hoje"
10114-420 = "você pode fazer\ntravessuras comigo, sabia...?"
10114-440 = "Obrigada por visitar\no \"Café Schale\"!"
10114-450 = "Aqui está,\no parfait especial que pediu!"
10114-460 = "Fufu... é uma sensação estranha."
10114-470 = "Este é um café feito\npara o Sensei, e..."
10114-480 = "Eu sou a única garçonete\ndeste café..."
10114-490 = "Sensei, você sabia?"
10114-500 = "Dizem que parfait... significa\n\"perfeito\"."
10114-510 = "Minhas habilidades culinárias\nainda estão longe de serem perfeitas...\nainda tenho muito o que aprender..."
10114-520 = "Quem sabe um dia...\nEu espero conseguir fazer também."
10114-530 = "Um \"parfait\"... a sobremesa perfeita."
10114-2600 = "É algo comum em Kivotos, mas eu acho que as garçonetes também deveriam portar armas! Para lidar com clientes que fazem pedidos absurdos, ou para acalmar ingredientes que começam a se rebelar... \nAh, não é para isso?"
