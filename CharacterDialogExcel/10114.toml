[translation]
10114-10 = "ブル～ア～カイブ！"
10114-20 = "いらっしゃいませ！先生！\nお決まりになりましたらお呼びください！\n愛情を込めて、おもてなしいたします！"
10114-30 = "わぁ！素敵な\nカフェですね！\n是非見学させて\nください！"
10114-40 = "わあ……\nこの内装素敵……"
10114-50 = "（あっ、この\nレシピは……！）"
10114-60 = "導線はこう……\nでしょうか。\n勉強になります。"
10114-70 = "ウェイトレスなのに、\nカフェで一休み……\nなんだか変な\n感じですね……"
10114-80 = "おかえりなさいませ、先生！"
10114-90 = "ふふ、気にしないでください。\n先生を待つ時間も、\nすっごく、幸せでしたから。"
10114-100 = "いらっしゃいませ！\n「カフェ・シャーレ」\nオープンしました！"
10114-110 = "い、今の……どうでしょう？\nちゃんとウェイトレスに\n見えました？"
10114-120 = "私、少しだけ……お料理が\nできるようになったんです！"
10114-130 = "練習の成果が\n出ているのかもしれません。"
10114-140 = "もしかしたら先生の\nおかげもあるのかも……？"
10114-150 = "あはは……失敗で終わる\nことのほうが、多いですが。"
10114-160 = "誰かに美味しいものを\n食べてもらうことができたら…"
10114-170 = "その誰かが、私のお料理を\n好きになってくれたら…"
10114-180 = "……そう思うだけで、\n胸がいっぱいになります。"
10114-190 = "一番の得意料理は、\nパフェです！"
10114-200 = "……唯一の料理、\nとも言えますが"
10114-210 = "具材を乗せるだけ、なので……"
10114-220 = "アルバイトですか？\nそんなに大変ではないですよ。"
10114-230 = "給食部のお仕事に比べたら、\n全然です！"
10114-240 = "……これからも、\n努力をし続けていきたいです。"
10114-250 = "後悔を残したくは\nありませんから。"
10114-260 = "もしも、\nうまくいかなかったときは……"
10114-270 = "手を……握ってくださいね、\n先生。"
10114-280 = "お誕生日、\nおめでとうございます！"
10114-290 = "バースデーパフェを\n作ってみました！"
10114-300 = "……たっぷり、\n愛情を込めて作ったんですよ。"
10114-310 = "よかったら\n召し上がって下さい！"
10114-320 = "誕生日に……\nほしいもの、ですか？\nそうですね……"
10114-330 = "先生の一日を、\nいただいても良いですか？"
10114-340 = "明けまして\nおめでとうございます、先生！"
10114-350 = "今から私と新年のカフェ巡り…\nなんていかがでしょう？"
10114-360 = "クリスマスといえば、\n七面鳥ですよね！"
10114-370 = "その……ごめんなさい……"
10114-380 = "ローストチキンが……\n走って逃げちゃいました……"
10114-390 = "かぼちゃと飴と、\n仮装とイタズラの日ですね！"
10114-400 = "あの……先生、"
10114-410 = "その……今日は"
10114-420 = "イタズラしても、\nいいですよ……？"
10114-440 = "「カフェ・シャーレ」に\nご来店くださり\nありがとうございます！"
10114-450 = "はい、\nご注文のスペシャルパフェです！"
10114-460 = "ふふっ……不思議な気分です。"
10114-470 = "ここは先生の\nためのカフェで――"
10114-480 = "私はそのカフェの……\nたった一人のウェイトレス……。"
10114-490 = "先生、ご存知ですか？"
10114-500 = "パフェって……「完璧」という\n意味なんだそうです。"
10114-510 = "お料理の腕は\nまだ完璧どころか……\nまだまだですけど……"
10114-520 = "いつかは……\n私も作れたらなと思います。"
10114-530 = "「パフェ」……完璧なお料理を。"
10114-2600 = "キヴォトスでは当たり前ですがウェイトレスも、銃を携帯すべきだと思うんです！無茶なオーダーをするお客様の対応や、\n暴れ始めた食材を鎮めるための――\nえ、違うんですか？"
