[translation]
16015-10 = "ブルー、アーカイブ！"
16015-20 = "先生……お見せします。変わることができた私の姿を！"
16015-30 = "綺麗な場所……！"
16015-40 = "みんな素敵な格好。"
16015-50 = "ここで練習したら\n迷惑かな……？"
16015-60 = "ちょっとお腹空いて\nきちゃった……。"
16015-70 = "みんなどんな\n歌が好きかな？"
16015-80 = "おかえりなさい、先生！\n弾いてほしい曲とかありますか？"
16015-90 = "あ、先生！\nお待ちしておりました！"
16015-100 = "先生は、普段\nどんな曲を聞きますか？"
16015-110 = "流石にプロレベルでは\nないですけど、"
16015-120 = "それなりに\n演奏できるように\nなりました！"
16015-130 = "ん？イメージが随分と\n変わってるように見える、\nですか？"
16015-140 = "ど……どっちの方が\nいいでしょう……？"
16015-150 = "そういえば新しく買った\nミント飴が……。"
16015-160 = "ふふ、いかがですか？"
16015-170 = "ふふ、うふふ……。"
16015-180 = "ん？……ふふ。\n何でもないです。"
16015-190 = "正直、最初は心配でした。\n余計なことをしたんじゃ\nないのかなって……。"
16015-200 = "でも……やってよかったです！\nありがとうございます、先生！"
16015-210 = "お誕生日\nおめでとうございます、先生！"
16015-220 = "先生のための一曲を\n用意しました！"
16015-230 = "聞いてみませんか？"
16015-240 = "私の誕生日ですか？\nあ……そ、そうです！"
16015-250 = "よろしければ、\n一緒にライブにでも……！"
16015-260 = "あけまして\nおめでとうございます、\n先生！"
16015-270 = "今年はどんなことが起こるのか、\n今から楽しみです！"
16015-280 = "メリークリスマス～！\n今年の私は、いい子でしたか？"
16015-290 = "ハロウィーン……\nいい日ですよね！\nいろんな仮装をしてみたいです！"
16015-310 = "えへへ……\nどうぞ、先生！"
16015-320 = "こちらへ！\n遠慮せず！"
16015-330 = "……？先生……？\nどうかしました？"
16015-340 = "もしかして……\n困らせてしまいました……？"
16015-350 = "む～！\nせっかく勇気を出したのに……"
16015-360 = "無茶を言った私も悪いですが……\nでも、少しは乗ってほしいです。"
16015-370 = "……ふふふ。\nはい！どうぞ。"
16015-380 = "（……この雨に\n感謝したいくらいかも）"
16015-390 = "私が合図したら、\n一緒に走りますよ！\n準備はいいですね？"
16015-400 = "それではいきますよ～！"
16015-2600 = "こんな日が来るなんて、\n思ってもみませんでした。\n……本当にこんなこともあるんですね。\n……とても嬉しいです。"
