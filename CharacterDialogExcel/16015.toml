[translation]
16015-10 = "Blue Archive!"
16015-20 = "Sensei... vou lhe mostrar. A minha versão que conseguiu mudar!"
16015-30 = "Que lugar lindo...!"
16015-40 = "Todos estão com roupas maravilhosas."
16015-50 = "Será que incomoda se eu\npraticar aqui...?"
16015-60 = "Acabei ficando com um\npouquinho de fome..."
16015-70 = "Que tipo de música\nserá que todos gostam?"
16015-80 = "Bem-vindo de volta, Sensei!\nTem alguma música que gostaria que eu tocasse?"
16015-90 = "Ah, Sensei!\nEu estava esperando por você!"
16015-100 = "Que tipo de música você\ncostuma ouvir, Sensei?"
16015-110 = "Não estou no nível profissional,\nmas..."
16015-120 = "consegui aprender a tocar\nde um jeito aceitável!"
16015-130 = "Hm? Você acha que a minha\nimagem mudou bastante?"
16015-140 = "Qual... qual delas você\nacha melhor...?"
16015-150 = "Falando nisso, a bala de menta\nque comprei..."
16015-160 = "Fufu, o que achou?"
16015-170 = "Fufu, ufufu..."
16015-180 = "Hm? ...Fufu.\nNão é nada."
16015-190 = "Sinceramente, no começo eu estava preocupada.\nSerá que eu não fiz algo desnecessário?..."
16015-200 = "Mas... fico feliz por ter feito! Muito obrigada, Sensei!"
16015-210 = "Feliz aniversário,\nSensei!"
16015-220 = "Preparei uma música\nespecial para você!"
16015-230 = "Gostaria de ouvir?"
16015-240 = "O meu aniversário? Ah... i-isso mesmo!"
16015-250 = "Se não se importar, que tal\nirmos a um show juntos...!"
16015-260 = "Feliz Ano Novo,\nSensei!"
16015-270 = "Estou ansiosa para ver o que\neste ano nos reserva!"
16015-280 = "Feliz Natal~! Será que eu\nfui uma boa menina este ano?"
16015-290 = "Halloween... é um dia tão bom, né!\nQuero experimentar várias fantasias!"
16015-310 = "Ehehe... aqui, Sensei!"
16015-320 = "Venha por aqui!\nNão seja tímido!"
16015-330 = "...? Sensei...? Aconteceu alguma coisa?"
16015-340 = "Será que... eu acabei\nte deixando em apuros...?"
16015-350 = "Mu~! Eu criei coragem\npara fazer isso..."
16015-360 = "Eu sei que pedir algo assim foi imprudente, mas... eu queria que você entrasse na brincadeira."
16015-370 = "...Fufufu. Sim! Aqui está."
16015-380 = "(...Talvez eu deva até\nagradecer por esta chuva)"
16015-390 = "Quando eu der o sinal, vamos\ncorrer juntos! Está pronto?"
16015-400 = "Então, lá vamos nós~!"
16015-2600 = "Eu nunca imaginei que um dia como este chegaria. ...Eu realmente não sabia que coisas assim podiam acontecer. ...Estou muito feliz."
