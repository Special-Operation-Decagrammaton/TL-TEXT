[translation]
16001-10 = "ブルーアーカイブ！"
16001-20 = "ご主人様と一緒に！\n楽しい一日を始めちゃおう！"
16001-30 = "うーん…服が\nピッチピチ。太ったかな？\nそれともまた…？"
16001-40 = "暇だなぁ～\n何か漫画とかないかな～？"
16001-50 = "るんるんるん～♪"
16001-60 = "らんらら～ん、今日は\nなんだか良いことが\nありそうな予感～。\nご主人様もそうでしょ？"
16001-70 = "ご主人様、ようこそ～。\n私が元気づけてあげる！"
16001-80 = "あっ！ご主人様だ！\n食事～？お風呂～？\nそれとも…えへへ！"
16001-90 = "先生！いや、ご主人様！\nこんにちは！\n今日も一緒に頑張ろうね！"
16001-100 = "どんなミッションでも\nどんと来いだよ！\n私とご主人様なら問題なし！"
16001-110 = "こんにちは！ご主人様！\n今日もせいいっぱい\n仕えてあげるね！"
16001-120 = "私に会いに来てくれたの？\nそうだよね？"
16001-130 = "やっぱりご主人様は私のことが\n好きなんだね！"
16001-140 = "掃除と洗濯なら任せて！"
16001-150 = "跡形も残さず片付けてあげる！"
16001-160 = "任務が入ってきたよ～\nさあさあ、ご主人様！\n早く解決しに行こう！"
16001-170 = "休憩？そんなのいらない！\nそれより一緒に遊ぼう！"
16001-180 = "ご主人様のお誕生日を\n世界一盛大にお祝いするの！"
16001-190 = "ご主人様！今日はご主人様の\n可愛いメイドの誕生日だよ！\nプレゼントは何をくれるの？"
16001-200 = "明けましておめでとう\nございます、私のご主人様。\n今年もよろしくお願\nいいたします…"
16001-210 = "なんてね！\n今年も来年も最高に\n楽しませてあげる！"
16001-220 = "メリークリスマス！\nサンタの代わりに、メイドが\nご主人様にプレゼントを\n渡しに来たよ！"
16001-230 = "プレゼントは何かというと…\nふふっ。"
16001-240 = "わあ！ハロウィンだ！\n見て見て！ご主人様！\n町が活気で溢れてるよ！\n早く行ってみよ！"
16001-260 = "…ふふっ、ご主人様に\n乗っかっちゃった！"
16001-270 = "うん、身体も軽いし、\n今なら何でもできそう！"
16001-280 = "うーん、\n何なんだろうなー、\nこの感じ…"
16001-290 = "…まあ良いか！じゃーん！\nいつものアスナちゃん、復活！"
16001-300 = "これもご主人様のおかげだよ、\nありがとね！"
16001-310 = "ふふっ。\nやっぱりこうしてご主人様の\nそばにいると、心が躍るなー。"
16001-320 = "…なんだかちょっと、\n癖になっちゃいそう！"
16001-330 = "だからこれから\n時々こういう風に…ね？"
16001-340 = "よろしく、私のご主人様！"
16001-2600 = "ご主人様！見て見て！\n新しい武器が届いたの！\nキラキラしてて可愛いでしょ？！"
