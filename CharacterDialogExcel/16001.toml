[translation]
16001-10 = "Blue Archive!"
16001-20 = "Junto com o meu mestre!\nVamos começar um dia divertido!"
16001-30 = "Hmm... minhas roupas estão\nmuito apertadas. Será que engordei?\nOu será que é outra coisa...?"
16001-40 = "Estou tão entediada~\nSerá que não tem algum mangá por aí?"
16001-50 = "Run run run~♪"
16001-60 = "Ran lala~n, hoje eu tenho\na sensação de que algo bom\nvai acontecer~.\nVocê não acha, mestre?"
16001-70 = "Seja bem-vindo, mestre~.\nEu vou te animar!"
16001-80 = "Ah! É o mestre!\nQuer comer? Quer um banho?\nOu talvez... ehehe!"
16001-90 = "Sensei! Não, mestre!\nOlá!\nVamos dar o nosso melhor hoje também!"
16001-100 = "Pode mandar qualquer missão!\nComigo e com o mestre, não tem problema!"
16001-110 = "Olá! Mestre!\nHoje também vou te servir\ncom todo o meu esforço!"
16001-120 = "Você veio me ver?\nÉ isso, né?"
16001-130 = "Eu sabia que você gosta de mim,\nmestre!"
16001-140 = "Pode deixar a limpeza e a lavanderia comigo!"
16001-150 = "Vou deixar tudo impecável, sem deixar rastros!"
16001-160 = "Chegou uma missão~\nVamos lá, mestre!\nVamos resolver isso logo!"
16001-170 = "Descanso? Não preciso disso!\nVamos brincar juntos, é melhor!"
16001-180 = "Vou comemorar o aniversário do mestre\nda forma mais grandiosa do mundo!"
16001-190 = "Mestre! Hoje é o aniversário da sua\nempregada favorita!\nO que você vai me dar de presente?"
16001-200 = "Feliz Ano Novo,\nmeu mestre.\nConto com você\neste ano também..."
16001-210 = "Brincadeirinha!\nEste ano e o próximo,\nvou te divertir ao máximo!"
16001-220 = "Feliz Natal!\nNo lugar do Papai Noel, a empregada\nveio entregar um presente\npara o mestre!"
16001-230 = "E o presente é...\nfufu."
16001-240 = "Uau! É Halloween!\nOlha só! Mestre!\nA cidade está cheia de energia!\nVamos logo!"
16001-260 = "...Fufu, acabei pulando\nem cima do mestre!"
16001-270 = "Sim, meu corpo está leve,\nsinto que posso fazer qualquer coisa agora!"
16001-280 = "Hmm,\no que será que é\nessa sensação..."
16001-290 = "...Ah, deixa pra lá! Tcharam!\nA Asuna de sempre, está de volta!"
16001-300 = "Isso também é graças a você, mestre,\nobrigada!"
16001-310 = "Fufu.\nÉ, ficar aqui ao lado do mestre\nrealmente faz meu coração saltar."
16001-320 = "...Sabe, acho que estou\ncomeçando a me acostumar com isso!"
16001-330 = "Então, de vez em quando,\npodemos fazer assim... né?"
16001-340 = "Conto com você, meu mestre!"
16001-2600 = "Mestre! Olha só!\nMinha arma nova chegou!\nEla é brilhante e fofa, não é?!"
