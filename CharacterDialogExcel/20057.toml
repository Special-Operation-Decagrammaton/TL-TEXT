[translation]
20057-10 = "Blue Archive. Хе-хе."
20057-20 = "Академия Миллениум, позывной «ноль-три», Мурокаса Акане. Приветствую вас в качестве обычной ученицы. Хе-хе, впрочем, я ведь с самого начала ею и была, не так ли?"
20057-30 = "Думаю, пока что нам стоит приготовить немного тортика."
20057-40 = "Это место на удивление расслабляет."
20057-50 = "Мне бы тоже хотелось поставить такую мебель в нашей клубной комнате."
20057-60 = "(Убрано здесь на совесть, но... вниманию к деталям всё же не хватает.)"
20057-70 = "(Такое просторное помещение... Интересно, сколько взрывчатки мне бы понадобилось...)"
20057-80 = "С возвращением, Сенсей. Я уже подготовилась к нашему «уроку»."
20057-90 = "Какую тему мы разберём на сегодняшнем «уроке»?"
20057-100 = "Я с нетерпением жду ваших размеренных и понятных объяснений."
20057-110 = "Мне называть вас Сенсеем... или Мастером?"
20057-120 = "Вот как... Значит, вы предпочитаете «Сенсей»."
20057-130 = "Поняла, «Сенсей»."
20057-140 = "Общаться с вами просто как «ученица»... Довольно непривычное чувство."
20057-150 = "Хотя, разумеется, я и так остаюсь вашей ученицей каждый день."
20057-160 = "Знаете, в уборке тоже есть своё искусство."
20057-170 = "Правда, мои вкусы могут показаться немного специфическими..."
20057-180 = "Хе-хе. Это применимо к обоим видам «уборки». Я ведь в каком-то смысле перфекционист."
20057-190 = "Вы не думали о том, чтобы стать штатным преподавателем в Миллениуме?"
20057-200 = "Тогда я могла бы посещать ваши уроки каждый день..."
20057-210 = "«Сенсей из Миллениума» — звучит весьма недурно, как по мне."
20057-220 = "Меня часто называют «образцовой ученицей», но..."
20057-230 = "Внутри я далеко не всегда такая."
20057-240 = "У каждого ведь есть то, что он скрывает глубоко в душе."
20057-250 = "Поэтому —"
20057-260 = "как насчёт небольшой огненной игры между учителем и ученицей?"
20057-270 = "Я просто шучу."
20057-280 = "Сегодня ваш день рождения, верно, Сенсей? Разумеется, я помню."
20057-290 = "Итак... с какой из моих версий вы бы хотели его отпраздновать?"
20057-300 = "С ученицей? Или с горничной?"
20057-310 = "Сенсей, вы знаете, какой сегодня день?"
20057-320 = "Всё верно, сегодня мой день рождения."
20057-330 = "И сегодня я пришла к вам именно как «ученица»."
20057-340 = "Раз уж в образе «горничной» мне подобное не положено, я подумала, что сегодня можно побыть капельку эгоистичной..."
20057-350 = "Поэтому в качестве подарка... я бы хотела получить ваше время, Сенсей."
20057-360 = "С Новым годом, Сенсей. Надеюсь на плодотворное сотрудничество с вами и в этом году."
20057-370 = "В конце концов, сегодня я здесь не как «горничная»."
20057-380 = "Давайте опустим формальные приветствия... Может, сходим в храм вместе?"
20057-390 = "Сейчас ведь Рождество? Могу ли я... рассчитывать на подарок?"
20057-400 = "Хе-хе, ничего страшного, даже если вы ничего не приготовили."
20057-410 = "Мне вполне достаточно того, что вы просто рядом."
20057-420 = "Хэллоуин... день, до краёв наполненный сладостями и шалостями..."
20057-430 = "Поэтому сегодня я напекла немного сластей."
20057-440 = "Вы ведь разделите их со мной?"
20057-460 = "Хе-хе."
20057-470 = "Это куда... смущающе, чем я думала."
20057-480 = "Быть искренней с самой собой..."
20057-490 = "К этому чувству я ещё не совсем привыкла."
20057-500 = "Да, всё так, как вы говорите."
20057-510 = "Я верю, что это было именно то, в чём я нуждалась."
20057-520 = "Я доставила вам немало хлопот, Сенсей."
20057-530 = "И всё же, то, что я смогла встретить вас —"
20057-540 = "да, я действительно считаю, что мне несказанно повезло."
20057-550 = "Всё течёт, всё меняется, и в конце концов всё будет забыто."
20057-560 = "Даже это самое мгновение когда-нибудь..."
20057-570 = "Но я буду помнить."
20057-580 = " Даже если вы сами забудете, Сенсей."
20057-590 = "Потому что по-настоящему важные вещи никогда не исчезают бесследно."
20057-2600 = "В Кивотосе оружие — это необходимость. И это не меняется, будь ты горничной или обычной ученицей. Среди огромного множества пушек... я продолжу оттачивать свои навыки именно с этим «инструментом для уборки», который получила от вас."