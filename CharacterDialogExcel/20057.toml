[translation]
20057-10 = "Blue Archive. Ufufu."
20057-20 = "Millennium Science School,\nCallsign Zero-Three, Murokasa Akane.\nCumpro com meu dever como aluna.\nFufu, embora eu já seja uma aluna, não é?"
20057-30 = "Por ora, seria bom\npreparar um bolo,\nnão acha?"
20057-40 = "Este lugar é\nbastante relaxante."
20057-50 = "Eu gostaria de colocar\naquele móvel na nossa sala."
20057-60 = "(Está bem limpo,\nmas... ainda falta\num toque final.)"
20057-70 = "(Com esse espaço...\nA quantidade de explosivos\nnecessária seria...)"
20057-80 = "Bem-vindo de volta, Sensei.\nA \"preparação para a aula\"\nestá pronta."
20057-90 = "Qual será o tópico da\n\"aula\" de hoje?"
20057-100 = "Conto com uma instrução\nbem dinâmica, Sensei."
20057-110 = "Sensei ou Mestre,\ncomo prefere que eu o chame?"
20057-120 = "Entendo...\nEntão prefere Sensei."
20057-130 = "Entendido, \"Sensei\"."
20057-140 = "Interagir com o Sensei\ncomo \"aluna\"...\nÉ uma sensação\nbastante curiosa."
20057-150 = "Embora, tecnicamente, eu já seja\nsua aluna no dia a dia."
20057-160 = "Até mesmo a limpeza\ntem o seu estilo."
20057-170 = "Embora o meu gosto seja\num pouco peculiar..."
20057-180 = "Fufu. Isso vale para ambos os tipos de\n\"limpeza\". Sou perfeccionista."
20057-190 = "Você não gostaria de se tornar\num Sensei exclusivo\nda Millennium?"
20057-200 = "Assim, eu poderia ter aulas\ncom você todos os dias..."
20057-210 = "\"Sensei da Millennium\",\nacho que soa muito bem."
20057-220 = "Muitas vezes me descrevem\ncomo uma \"aluna exemplar\"..."
20057-230 = "Mas nem sempre o meu interior\ncorresponde a isso."
20057-240 = "Afinal, todos guardam algo\nescondido dentro de si."
20057-250 = "Por isso..."
20057-260 = "Que tal brincarmos com fogo\nentre Sensei e aluna?"
20057-270 = "É brincadeira."
20057-280 = "Hoje é o seu aniversário,\nSensei. É claro que eu me lembro."
20057-290 = "Então... como deseja que eu\ncomemore com você?"
20057-300 = "Como aluna?\nOu como empregada?"
20057-310 = "Sensei, sabe que dia\né hoje?"
20057-320 = "Isso mesmo, é o meu aniversário."
20057-330 = "E hoje, vim até aqui\ncomo \"aluna\"."
20057-340 = "Mesmo que como \"empregada\" eu não pudesse,\nacho que posso ser um pouco\nmais mimada hoje, não acha?..."
20057-350 = "Por isso, como presente...\nEu quero o seu tempo,\nSensei."
20057-360 = "Feliz Ano Novo, Sensei.\nConto com você\nnovamente este ano."
20057-370 = "Hoje eu não estou\ncomo \"empregada\"."
20057-380 = "Deixando as saudações formais de lado...\nque tal irmos ao templo juntos?"
20057-390 = "Natal, não é?\nSerá que... posso esperar\npor um presente?"
20057-400 = "Fufu, não se preocupe\ncaso não tenha preparado nada."
20057-410 = "Só de ter você ao meu lado,\njá é o suficiente."
20057-420 = "Halloween... um dia repleto\nde doces e travessuras..."
20057-430 = "Por isso, hoje eu assei\nalguns doces."
20057-440 = "Você vai comer\ncomigo, não vai?"
20057-460 = "Fufu."
20057-470 = "É mais... embaraçoso\ndo que eu pensava."
20057-480 = "Ser honesta\ncomigo mesma..."
20057-490 = "É uma sensação\na qual não estou acostumada."
20057-500 = "Sim, como você disse."
20057-510 = "Acho que era algo\nnecessário para mim."
20057-520 = "Eu causei muitos problemas\na você, Sensei."
20057-530 = "Ainda assim, o fato de eu ter\nconhecido você, Sensei, é..."
20057-540 = "Sim, eu realmente penso\nque fui muito sortuda."
20057-550 = "Tudo flui e,\neventualmente, será\nesquecido."
20057-560 = "Mesmo este momento agora,\num dia..."
20057-570 = "Mas eu\nme lembrarei."
20057-580 = "Mesmo que você, Sensei,\ntenha se esquecido."
20057-590 = "Pois as coisas que são realmente preciosas\nnunca se perdem."
20057-2600 = "Em Kivotos, armas são itens essenciais.\nIsso não muda, seja você uma empregada\nou uma aluna.\nDentre tantas armas...\nContinuarei me dedicando junto com esta \"ferramenta de limpeza\"\nque recebi de você, Sensei."
