[translation]
20057-10 = "ブルー、アーカイブ。うふふっ。"
20057-20 = "ミレニアムサイエンススクール、\nコールサインゼロスリー室笠アカネ。\n生徒としてご挨拶申し上げます。\nふふっ、もともと生徒なのですけどね？"
20057-30 = "ひとまずケーキを\n用意したい\nところですね。"
20057-40 = "ここはなんだか\n落ち着きますね。"
20057-50 = "あの家具、部室にも\n置きたいですね。"
20057-60 = "（掃除が行き届いては\nいますが……\n詰めが甘いですね）"
20057-70 = "（この広さ……\n必要な\n爆薬の量は……）"
20057-80 = "おかえりなさい、先生。\n「授業の準備」は\n整えております。"
20057-90 = "本日の「授業」は\nどの単元でしょうか？"
20057-100 = "メリハリのある指導、\nよろしくおねがいしますね。"
20057-110 = "先生とご主人様、\nどちらでお呼びしましょう？"
20057-120 = "なるほど……\n先生をご希望ですか。"
20057-130 = "承知しました、「先生」。"
20057-140 = "「生徒」として\n先生に接する……\nなんだか不思議な\n感覚です。"
20057-150 = "もちろん、私は\n普段から先生の\n生徒ではあるのですが。"
20057-160 = "お掃除にも\n流儀があります。"
20057-170 = "私は少しばかり好みが\n偏っていますけれど……。"
20057-180 = "ふふっ。どちらの\n「お掃除」も、ですね。\n凝り性なんです。"
20057-190 = "ミレニアムの\n専属教員に、なって\nくださったりしませんか？　"
20057-200 = "そうすれば\n毎日先生の授業を\n受けられますし……。"
20057-210 = "「ミレニアムの先生」\nいい響きだと\n思うのですが。"
20057-220 = "私は「優等生」と\n評されることが\n多いのですが……。"
20057-230 = "内面までそうとは\n限りません。"
20057-240 = "人は誰しも内に秘めた\nものがありますので。"
20057-250 = "ですから――"
20057-260 = "先生と生徒の\n火遊びなんて……\nいかがでしょう？"
20057-270 = "冗談ですよ。"
20057-280 = "今日は先生の\nお誕生日ですよね。\nもちろん覚えています。"
20057-290 = "それで……お祝いは、\nどちらの私からを\nご所望ですか？"
20057-300 = "生徒？\nそれともメイド？"
20057-310 = "先生、今日が何の日か\nご存知ですか？"
20057-320 = "そう、私の誕生日です。"
20057-330 = "そして今日は\n「生徒」として伺いました。"
20057-340 = "「メイド」では\n許されずとも、多少は\nワガママを言っても\n良いのではないかな、と……。"
20057-350 = "ですから、\nプレゼントとして……\n先生のお時間が、\n欲しいです。"
20057-360 = "明けましておめでとう\nございます、先生。\n本年もよろしく\nお願いいたします。"
20057-370 = "今日の私は「メイド」では\nありませんので。"
20057-380 = "お堅い挨拶は抜きにして……\n一緒にお参りに行きませんか？"
20057-390 = "クリスマス、ですね。\nもしかして……\nプレゼントを期待しても？"
20057-400 = "ふふっ、別に\n用意されていなくても\n構いません。"
20057-410 = "先生が隣に\nいてくださるだけで\n十分ですから。"
20057-420 = "ハロウィーン……\nお菓子と悪戯が\nあふれる日……。"
20057-430 = "そこで今日はお菓子を\n焼いてきました。"
20057-440 = "一緒に\n召し上がってください\nますよね？"
20057-460 = "ふふっ。"
20057-470 = "思っていたより……\n気恥ずかしいものですね。"
20057-480 = "自分に対して、\n素直になる……。"
20057-490 = "どうにも\n慣れない感覚です。"
20057-500 = "ええ、仰る通りです。"
20057-510 = "私にとって、必要な\nことだったのだと\n思います。"
20057-520 = "先生には色々とご迷惑を\nおかけしてしまいました。"
20057-530 = "それでも、先生と\n出会えた私はやはり――"
20057-540 = "ええ、本当に幸運だったと\n思っています。"
20057-550 = "すべては流れ、\nいずれ忘れられて\nいくのでしょう。"
20057-560 = "今この瞬間でさえ、\nいつかは……。"
20057-570 = "ですが、私は\n覚えています。"
20057-580 = "たとえ先生が\n忘れてしまったとしても。"
20057-590 = "本当に大切なものは、\n決して失われませんから。"
20057-2600 = "キヴォトスにおいて、銃は必需品です。\nそれはメイドだろうと、\n生徒だろうと変わりません。\n数多ある銃の中……\n先生から頂戴したこの「掃除道具」と共に、\nこれからも精進いたしますね。"
