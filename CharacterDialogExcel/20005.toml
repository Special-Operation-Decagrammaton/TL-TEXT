[translation]
20005-10 = "ブルーアーカイブ！"
20005-20 = "あ、相変わらず地味めな私ですが……\nよろしくお願いします！"
20005-30 = "カフェでこの格好は……\nちょっと\n恥ずかしいですね。"
20005-40 = "夏っぽい家具が\nたくさん……。"
20005-50 = "（な、なんだか注目\nされてるような\n……？）"
20005-60 = "（夏の暖かい\n日差し……\n気持ち良い……）"
20005-70 = "（夏限定のペロロ様\nグッズは\n無いのかな……？）"
20005-80 = "先生！\n海ですよ、海！\n海が私たちのことを\n待ってます！"
20005-90 = "今日は良い天気ですね、先生。\n一緒に海沿いで、\nお散歩でもしませんか？"
20005-100 = "海に行くとのことで、\n少しおしゃれを\nしてみたんですが……"
20005-110 = "い、いかがでしょう？\n地味、ですかね……？"
20005-120 = "夏の海で\nバカンスとはいっても、\nペロロ様のぬいぐるみ\nは欠かせません！"
20005-130 = "ペロロ様の羽が\n濡れてしまわないように\n防水対策も徹底してます！"
20005-140 = "……あれ？\n先生、シャーレの前に\n駐車していたはずの\nクルセイダーちゃん、\nどこに行ったかご存知ですか？"
20005-150 = "お誕生日おめでとう\nございます、先生！"
20005-160 = "お祝いに私のこの、\nペロロ様の浮き輪を\nプレゼントします！"
20005-170 = "何か誕生日に欲しいもの\n……ですか？"
20005-180 = "……ありがとうございます、\nでも大丈夫です。"
20005-190 = "先生と一緒に過ごすこの\nバカンスが、私にとっては\n最高の誕生日\nプレゼントですから！"
20005-200 = "明けましておめでとう\nございます、先生。"
20005-210 = "今年の夏も、\n楽しみにしてますね！"
20005-220 = "さっきシャーレの建物の前で、\n雪に埋もれたペロロ様を\n見かけまして……。"
20005-230 = "裸の状態で、\nサンタさんの帽子だけを\n被っていたのですが、\n寒くないのでしょうか……？"
20005-240 = "え、ハロウィンの衣装？\nあ、いえ、これは\n普通に水着で……\nあはは、ちょっと\n季節違いかもですが……。"
20005-260 = "ふんふん～♪\n隅々までキレイに～♪"
20005-270 = "クルセイダーちゃんを、\n錆びさせるわけには\nいきませんからね。"
20005-280 = "そもそもみんな\nで使うものですし、\nキレイな状態で\n学園に戻さないと。"
20005-290 = "あ、先生。\nあまり近くにいると、\n水がかかってしまう\nかもしれませんよ？"
20005-300 = "水着だから\n濡れても平気……ですか？"
20005-310 = "確かにそうですね。\nあ、ではせっかくですし、\nこの後は一緒に\n泳ぎにも行きましょう！"
20005-2600 = "この銃器、防水加工は\nされてるんでしょうか……？"
