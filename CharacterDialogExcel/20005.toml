[translation]
20005-10 = "Blue Archive!"
20005-20 = "Ah, eu continuo sendo uma pessoa bem discreta, mas... \nConto com você!"
20005-30 = "Estar vestida assim no café... \né um pouco \nvergonhoso."
20005-40 = "Tem muitos móveis \ncom tema de verão..."
20005-50 = "(S-sinto que estou sendo \nobservada por todos \n...por que será?)"
20005-60 = "(O sol quente \ndo verão... \né tão agradável...)"
20005-70 = "(Será que não tem \nnenhum item do Peroro-sama \nde edição de verão...?)"
20005-80 = "Sensei! \nÉ o mar, o mar! \nO mar está \nnos esperando!"
20005-90 = "O dia está lindo hoje, Sensei. \nQue tal darmos um passeio \npela orla da praia?"
20005-100 = "Como íamos à praia, \ntentei me arrumar \num pouco, mas..."
20005-110 = "O-o que achou? \nEstá muito sem graça...?"
20005-120 = "Mesmo sendo \numas férias na praia, \no bicho de pelúcia do Peroro-sama \né indispensável!"
20005-130 = "Eu tomei todas as precauções \nà prova d'água para que as asas \ndo Peroro-sama não molhem!"
20005-140 = "...Ué? \nSensei, você sabe onde foi parar \na Crusader-chan que eu tinha \nestacionado na frente do Schale?"
20005-150 = "Feliz aniversário, \nSensei!"
20005-160 = "Para comemorar, \neu te dou de presente \nesta boia do Peroro-sama!"
20005-170 = "Algo que eu queira \nno meu aniversário \n...você pergunta?"
20005-180 = "...Muito obrigada, \nmas não precisa."
20005-190 = "Passar estas férias \ncom o Sensei já é o melhor \npresente de aniversário \nque eu poderia ganhar!"
20005-200 = "Feliz Ano Novo, \nSensei."
20005-210 = "Estou ansiosa \npelo verão deste ano também!"
20005-220 = "Agora há pouco, na frente do prédio do Schale, \neu vi um Peroro-sama \nenterrado na neve..."
20005-230 = "Ele estava pelado, \nusando apenas um gorro de Papai Noel, \nserá que ele não está \ncom frio...?"
20005-240 = "Ah, fantasia de Halloween? \nAh, não, isso aqui é \nsó um traje de banho... \nAhaha, talvez esteja um pouco \nfora de época, mas..."
20005-260 = "Hum hum~♪ \nDeixando tudo limpinho~♪"
20005-270 = "Não posso deixar \na Crusader-chan \nferrujar, afinal."
20005-280 = "Além disso, é algo que todos \nusam, então preciso \ndevolver para a academia \nem bom estado."
20005-290 = "Ah, Sensei. \nSe ficar muito perto, \npode acabar se molhando, \nsabe?"
20005-300 = "Como estou de traje de banho, \nnão tem problema se molhar... \né isso?"
20005-310 = "É verdade, você tem razão. \nAh, já que estamos aqui, \nque tal irmos nadar \njuntos depois?"
20005-2600 = "Será que esta arma \nrecebeu tratamento à prova d'água...?"
