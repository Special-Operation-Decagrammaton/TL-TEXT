[translation]
13003-10 = "ブルーアーカイブ"
13003-20 = "正義実現委員会、羽川ハスミ。\n先生の指示をお待ちしております。"
13003-30 = "私もいつか可愛い\nミニスカートを…。"
13003-40 = "この空間、気に入り\nました。何度でも\n来たくなりますね。"
13003-50 = "たまにはこういった\n余暇も良いですね。"
13003-60 = "美味しそうなものが\nありますが…\n我慢しなければです。"
13003-70 = "正義実現委員会の原則は\nシンプルです。不義を\n許さないこと、です。"
13003-80 = "こんにちは。\n今日初めて先生と会った人は、\n私ですか？"
13003-90 = "…嬉しいですね。"
13003-100 = "遅かったですね。\nまた寝坊したのですか？\nまたこうやって私を\n待たせるのでしたら…"
13003-110 = "直接起こしに行きます。"
13003-120 = "今度はどのような任務に\n向かえば良いでしょう？"
13003-130 = "必勝法ですか？えぇ、\n私も一つ知っています。\n絶えず練習することです。"
13003-140 = "時々、あまり笑わないと\n言われることがあるの\nですが、先生から見ても\nそうでしょうか？"
13003-150 = "正義実現委員会は\n愛と平和で満ちています。"
13003-160 = "はい？\n冗談を言っているわけでは\nありませんよ？"
13003-170 = "お仕事はゆっくりで結構\nですよ、先生。"
13003-180 = "こういった余裕の\nある時間も、\n嫌いではありませんので。"
13003-190 = "お誕生日ですか？"
13003-200 = "おめでとうございます。\nただ、私には今すぐお渡しで\nきるものがないですが…。"
13003-210 = "えっと…\n何かお望みのものは\nありますか？"
13003-220 = "私の誕生日…。\nいつも委員会の仲間たち\nと過ごしていましたが、\n今回は先生と過ごせましたね。"
13003-230 = "ふふ、\nなんだか少し新鮮な気分です。"
13003-240 = "先生のおかげで、去年は\n特別な一年でした。今年も\nよろしくお願いいたします。"
13003-250 = "メリークリスマスです。\nこの聖なる夜も、先生と一緒に\nいることになりましたね。"
13003-260 = "ハロウィーンですか…。\nあまり浮かれるのは\n少し困ってしまいますが…"
13003-270 = "今日は先生と一緒ですから…\n大丈夫ではないでしょうか？"
13003-290 = "ああ、全身びしょ濡れになって\nしまいましたね。困りました。"
13003-300 = "うーん、雨、すぐには\n止みそうにないですね。"
13003-310 = "二人でどうすることもできず、\n足止めされてしまいましたね？"
13003-320 = "ふふ、このようなことは\n予想していなかったのですが。"
13003-330 = "少しくらいなら…このような\n時間もいいでしょう。"
13003-340 = "…贅沢ですが、\n私にとっては大切な時間です。"
13003-2600 = "先生がくれたこの力……\n大切に使います。"
