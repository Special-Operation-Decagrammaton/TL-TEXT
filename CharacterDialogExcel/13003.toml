[translation]
13003-10 = "Blue Archive"
13003-20 = "Comitê de Justiça, Hasumi Hanekawa.\nEstou aguardando suas instruções, Sensei."
13003-30 = "Eu também, um dia, gostaria de usar\numa minissaia fofa..."
13003-40 = "Gostei deste lugar.\nDá vontade de vir aqui\nsempre que possível."
13003-50 = "Um pouco de lazer de vez em quando\ntambém é bom."
13003-60 = "Tem coisas deliciosas aqui, mas...\npreciso me controlar."
13003-70 = "O princípio do Comitê de Justiça\né simples. Não tolerar\na injustiça."
13003-80 = "Olá.\nFui eu a primeira pessoa a encontrar\no Sensei hoje?"
13003-90 = "...Fico feliz."
13003-100 = "Você se atrasou.\nDormiu demais de novo?\nSe continuar me fazendo\nesperar assim..."
13003-110 = "Eu mesma irei te acordar."
13003-120 = "Qual é a próxima missão\nque devo seguir?"
13003-130 = "Um método infalível? Sim,\neu conheço um.\nÉ praticar constantemente."
13003-140 = "Às vezes dizem que eu não\nsorrio muito, mas\nna sua opinião, Sensei,\nisso é verdade?"
13003-150 = "O Comitê de Justiça\né cheio de amor e paz."
13003-160 = "Sim?\nNão estou brincando,\nsabe?"
13003-170 = "Pode fazer seu trabalho com calma,\nSensei."
13003-180 = "Eu não desgosto\ndesses momentos\nde tranquilidade."
13003-190 = "É seu aniversário?"
13003-200 = "Parabéns.\nEmbora eu não tenha nada para\nte dar agora mesmo..."
13003-210 = "Bem...\nExiste algo que você\ndeseje?"
13003-220 = "Meu aniversário...\nSempre passei com as colegas do comitê,\nmas desta vez pude passar\ncom o Sensei."
13003-230 = "Fufu,\né uma sensação um pouco nova."
13003-240 = "Graças ao Sensei, o ano passado\nfoi especial. Conto com você\neste ano também."
13003-250 = "Feliz Natal.\nNesta noite sagrada, acabei\nficando com o Sensei também."
13003-260 = "Halloween, é...\nNão gosto muito de me deixar levar\npela agitação, mas..."
13003-270 = "Como estou com o Sensei hoje...\nacho que não tem problema, certo?"
13003-290 = "Ah, acabamos ficando encharcados.\nQue situação."
13003-300 = "Hmm, a chuva não parece\nque vai parar tão cedo."
13003-310 = "Não há nada que nós dois possamos fazer,\nficamos presos aqui, não é?"
13003-320 = "Fufu, eu não esperava\npor algo assim."
13003-330 = "Por um momento... esse tipo de\ntempo também é bom."
13003-340 = "...É um luxo, mas\npara mim, é um tempo precioso."
13003-2600 = "Este poder que o Sensei me deu...\nEu o usarei com cuidado."
