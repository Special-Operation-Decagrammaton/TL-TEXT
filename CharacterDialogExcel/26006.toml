[translation]
26006-20 = "ずっと望遠鏡越しで見ていた、\nあの先生で合ってますか……？\n私、感激です……！"
26006-30 = "ふふ、\n素敵な家具を\n発見しました！"
26006-40 = "あの向こうには\n何があるのかな……？"
26006-50 = "早く特別クラスから\n抜け出さないと……。"
26006-60 = "ここは綺麗な\nところですね～"
26006-70 = "先生は……\nどこにいるのかな？"
26006-80 = "すぐにお戻りになると\n思ってました！"
26006-90 = "ずっと……\nずっと見守ってましたから！"
26006-100 = "あれ？\nさっきまで先生がそこに……。"
26006-110 = "うわっ、び、びっくりしました！\nい、いつからこちらに？\nい、いえ、監視してたわけでは\nありません！"
26006-120 = "はあ、はあ……\nやっぱり先生を見ているのが\n一番楽しいですね。"
26006-130 = "ふふ……\n先生の顔はどれだけ\n見ていても飽きません！"
26006-140 = "うっ……\n誰に対してもこういうことを\nしてるわけじゃないんですよ？"
26006-150 = "この広い宇宙を\n見ていると……"
26006-160 = "人の人生って、\n本当に儚いなあって、\n改めて感じますね。"
26006-170 = "ふふ、いつか先生と一緒に、\n夜空を観察しに\n行きたいですね。"
26006-180 = "お誕生日おめでとう\nございます、先生！"
26006-190 = "今日一日、悪いことが\n起きないように私がしっかり\n見守っていてあげます！"
26006-200 = "先生、知ってますか？\n私の誕生日の晩に、\n夜空を見上げると"
26006-210 = "仲のいい双子の星が、\n南の空を通過するのが\n見られるんですよ。\nその日がなんと……"
26006-220 = "今日なんです！"
26006-230 = "今年こそどうにか、\nここを抜け出して本校舎に\n戻れますように……。"
26006-240 = "クリスマスの夜景は\n遠くから見ると、"
26006-250 = "夜空みたいに\nキラキラしていて、\n綺麗なんです。"
26006-260 = "今年のハロウィーンは\n果たして、私たちにも飴が\n支給されるのでしょうか……。"
26006-280 = "うわっ、流れ星です！\nあっ……あそこにも！\nそっちにも！"
26006-290 = "空に流れ星がいっぱいです！\n流星が本当に、\n雨のように降ってますね！"
26006-300 = "こんなに美しい光景を\n実際に見られるなんて……\n本当に、夢みたいです。"
26006-310 = "願い事ですか？"
26006-320 = "いえ……\n今日は、大丈夫です。"
26006-330 = "好きな人と一緒に、\nこんなに綺麗な星空を\n見ることができているのに、"
26006-340 = "これ以上願い事をしたら、\nなんだかお星様に\n叱られてしまいそうで……。"
26006-350 = "今日はこれだけで、\n満足です。"
26006-2600 = "ありがとうございます、先生！\nこの望遠鏡と同じくらい、\n大切に扱いますね！"
