[translation]
23002-10 = "ブルーアーカイブ！"
23002-20 = "白衣の天使が！\nあなたを訪ねて来ましたよ！！"
23002-30 = "るんるん～\n手術が必要な人～？\n誰かいないのかな～"
23002-40 = "救援も！希望も！\nそして愛も！\nハナエはすべて\n備え持っていますよ！"
23002-50 = "早くウサギさんや\n猫さんと遊びたいな！"
23002-60 = "友達がたくさんできて、\n毎日が楽しいです！"
23002-70 = "こんにちは！ハナエです！\nよろしくお願いします！"
23002-80 = "先生！新しいメールが\n届きました！楽しい任務を、\n今日も始めましょう！"
23002-90 = "きゃあ！ようこそ！先生が\n来るのを待ってましたよ！"
23002-100 = "あっ先生！顔色が悪いです！\n簡単な手術をしましょうか？！"
23002-110 = "活力や笑顔をご所望なら！\nこのハナエにお任せください！"
23002-120 = "先生が好きなタイプは？"
23002-130 = "ハツラツとした\n可愛い女の子ですよね？"
23002-140 = "今日はやることがたくさん\nあるので怠けちゃだめですよ！"
23002-150 = "あっ！なんだか\nいいことが起きそうな予感！"
23002-160 = "今日は最高に嬉しい日です！\n先生！お誕生日\nおめでとうございます！"
23002-170 = "今日は私の誕生日です！\n誕生日プレゼントに、"
23002-180 = "先生の一日が欲しいです！"
23002-190 = "ハッピーニューイヤー！\n今年も幸せな一年に\nなりますように！"
23002-200 = "みんなが幸せな\nクリスマスです！\nトリニティの女子生徒なら、\n誰もがドキドキする日ですよ！"
23002-210 = "あっ。ハロウィンが始まり\nました。早く出かけましょう～\nお祭りが始まりますから！"
23002-230 = "さあ、ではまず\n傷口を消毒するので、"
23002-240 = "靴下を脱いで大人しく\nしていてください！"
23002-250 = "きちんと消毒しないと、\n傷から炎症を起こして"
23002-260 = "大変なことになって\nしまうかもしれません。"
23002-270 = "少し痛いかもですけど、\n我慢してくださいね！"
23002-280 = "ん、しょっ…！\nきれいきれいにっ…と！"
23002-290 = "はい、よく我慢できました！\nもう少しですよー。"
23002-300 = "特別におまけで、\n傷が早く治る魔法の\n呪文をかけて\nあげましょう！"
23002-310 = "では、痛いの痛いの、\n飛んでけ～！"
23002-320 = "どうですか？\n痛くなくなりましたか？"
23002-2600 = "この武器には……\n愛がたくさんつまっています！"
