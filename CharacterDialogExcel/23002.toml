[translation]
23002-10 = "Blue Archive!"
23002-20 = "O anjo de jaleco branco\nveio te visitar!!"
23002-30 = "Run-run~\nTem alguém precisando de uma cirurgia?\nSerá que tem alguém?"
23002-40 = "Resgate! Esperança!\nE também amor!\nA Hanae tem tudo\npreparado para você!"
23002-50 = "Mal posso esperar para brincar\ncom os coelhinhos e gatinhos!"
23002-60 = "Fiz muitos amigos,\ne todos os dias são divertidos!"
23002-70 = "Olá! Eu sou a Hanae!\nPrazer em conhecê-lo!"
23002-80 = "Sensei! Chegou um novo e-mail!\nVamos começar as tarefas divertidas\nde hoje!"
23002-90 = "Ah! Seja bem-vindo! Eu estava\nesperando você chegar, Sensei!"
23002-100 = "Ah, Sensei! Você está com uma cara pálida!\nQuer que eu faça uma cirurgia rápida?!"
23002-110 = "Se você quer vitalidade e sorrisos,\npode deixar comigo, Hanae!"
23002-120 = "Qual é o seu tipo favorito, Sensei?"
23002-130 = "É uma garota alegre\ne fofa, não é?"
23002-140 = "Temos muita coisa para fazer hoje,\nentão nada de preguiça!"
23002-150 = "Ah! Sinto que algo\nmuito bom vai acontecer!"
23002-160 = "Hoje é um dia muito feliz!\nSensei! Feliz aniversário!"
23002-170 = "Hoje é o meu aniversário!\nComo presente de aniversário,"
23002-180 = "eu quero o seu dia inteiro, Sensei!"
23002-190 = "Feliz Ano Novo!\nQue este ano seja\nmuito feliz!"
23002-200 = "É Natal, um dia de felicidade para todos!\nPara as alunas de Trinity,\né um dia que faz o coração bater forte!"
23002-210 = "Ah, o Halloween começou.\nVamos sair logo~\nO festival vai começar!"
23002-230 = "Muito bem, primeiro\nvou desinfetar o ferimento,"
23002-240 = "então tire as meias e\nfique quietinho!"
23002-250 = "Se não desinfetar direito,\no ferimento pode inflamar"
23002-260 = "e acabar virando\num problema sério."
23002-270 = "Pode doer um pouquinho,\nmas tente aguentar, tá?"
23002-280 = "Hum, pronto...!\nLimpinho, limpinho...!"
23002-290 = "Pronto, você aguentou muito bem!\nFalta só um pouquinho."
23002-300 = "Como um bônus especial,\nvou lançar um feitiço mágico\npara o ferimento\ncurar mais rápido!"
23002-310 = "Então, dorzinha, dorzinha,\nvá embora!"
23002-320 = "Como se sente?\nA dor passou?"
23002-2600 = "Esta arma está...\ncheia de amor!"
