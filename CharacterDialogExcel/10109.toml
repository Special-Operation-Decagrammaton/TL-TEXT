[translation]
10109-10 = "Blue Archive."
10109-20 = "Vim registrar os dias do Sensei. Sou Ushio Noa, secretária do Seminar da Millennium Science School. Conto com você esta noite também. Fufu."
10109-30 = "(Este lugar parece\num outro mundo...\nRepleto de solidão\ne silêncio.)"
10109-40 = "(Vamos ouvir um pouco\ndo silêncio da noite.)"
10109-50 = "Ah... hum...\nEstou um pouco cansada."
10109-60 = "Que tal descansarmos\num pouquinho?"
10109-70 = "(Será que acabei de ouvir\na risada da Koyuki-chan...?)"
10109-80 = "Bem-vindo de volta, Sensei."
10109-90 = "Aceita um pouco de\nleite quente?"
10109-100 = "Ah, você chegou,\nSensei."
10109-110 = "Eu estava olhando para fora\ne não percebi."
10109-120 = "Que tal trocar para um\npijama também, Sensei?"
10109-130 = "Se ficar mais confortável,\ncreio que a eficiência do trabalho\ntambém aumentará."
10109-140 = "Eu escrevo no diário todos os dias."
10109-150 = "Pois é um registro importante\npara relembrar o dia."
10109-160 = "Não pode, Sensei.\nMesmo sendo você,\nnão posso mostrar o diário."
10109-170 = "...São segredos de uma donzela, afinal."
10109-180 = "Tenho a impressão de que a Koyuki-chan\nestá me evitando..."
10109-190 = "Será que acabei pressionando\na Koyuki-chan demais...?"
10109-200 = "Embora os fios do relógio\nse desenrolem lentamente,"
10109-210 = "por que os dias de folga\npassam tão rápido...?"
10109-220 = "Feliz aniversário,\nSensei."
10109-230 = "O dia em que o Sensei nasceu."
10109-240 = "Só por esse fato, a ponta da minha caneta\nquase se move sozinha."
10109-250 = "Deixe-me registrar tudo,\nsem deixar passar nada, está bem?"
10109-260 = "...Você se lembrou\ndo meu aniversário?"
10109-270 = "As felicitações já seriam\nsuficientes, mas..."
10109-280 = "...Se for assim, esta noite, poderia ler um livro para mim até que eu adormeça? Fufu."
10109-290 = "Feliz Ano Novo."
10109-300 = "Espero que tenha um ano\ncom um bom equilíbrio\nentre trabalho e descanso."
10109-310 = "Ler observando a vista noturna\nna véspera de Natal...\nÉ algo charmoso e\nbastante agradável."
10109-320 = "Se tiver interesse,\nque tal se juntar a mim, Sensei?"
10109-330 = "Eu lerei os livros difíceis\npara você."
10109-340 = "Nesta época, vejo muitas alunas\nandando por aí com roupas\ncheias de babados."
10109-350 = "Fufu, você gosta de roupas\ncom babados, Sensei?"
10109-370 = "'As estrelas que brilhavam intensamente, como um rebanho de ovelhas, fluíam silenciosamente...'"
10109-380 = "Você é uma pessoa peculiar, Sensei."
10109-390 = "Querer dormir ouvindo a minha leitura\nsem nada de especial."
10109-400 = "...Por que será?"
10109-410 = "Porque minha voz é clara e bonita, permitindo que você imagine o que está além das palavras...?"
10109-420 = "...Muito obrigada,\nSensei."
10109-430 = "Eu também pude\nrefletir sobre mim mesma."
10109-440 = "...Sensei?\nJá adormeceu?"
10109-450 = "A estrela que brilhava\nmais intensamente ali..."
10109-460 = "Parece ter se perdido e\nadormeceu aos meus pés."
10109-2600 = "Este kit de conversão pode mudar de forma dependendo da intenção do usuário. ...É um pouco parecido comigo. Fufu."
