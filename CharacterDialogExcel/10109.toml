[translation]
10109-10 = "ブルー、アーカイブ。"
10109-20 = "先生の日々を記録しに参りました。ミレニアムサイエンススクール、セミナー書記の生塩ノアです。今夜もどうか、よろしくお願いいたしますね。ふふっ。"
10109-30 = "（ここはまるで、\n別世界のようです……\n孤独と寂寞に\n満ちていて）"
10109-40 = "（少しの間、夜の\n静寂に耳を傾けて\nみましょう。）"
10109-50 = "ふあ……ん……\n少々、疲れました。"
10109-60 = "ちょっとだけ、\n休んで\nいきましょうか。"
10109-70 = "（いま、コユキちゃんの\n笑い声が\nしたような……？）"
10109-80 = "おかえりなさい、先生。"
10109-90 = "暖かいミルクでも、\nいかがですか？"
10109-100 = "……あ、いらしたんですね、\n先生。"
10109-110 = "外を見ていたので、\n気がつきませんでした。"
10109-120 = "先生も寝巻きに\n着替えてはいかがですか？"
10109-130 = "動きやすくなれば、\n作業効率の向上も\n期待できるかと。"
10109-140 = "日記は毎日つけています。"
10109-150 = "1日を振り返る、\n大事な記録ですので。"
10109-160 = "ダメですよ、\nいくら先生でも\n日記はお見せできません。"
10109-170 = "……乙女の秘密なんですから。"
10109-180 = "なんとなく、コユキちゃんに\n避けられているような……"
10109-190 = "コユキちゃんにプレッシャーを\n与えてしまったんですかね……"
10109-200 = "時計の糸はゆっくりと\n解けるというのに、"
10109-210 = "どうしてお休みの日は\nこんなにも早く\n過ぎるのでしょう……？"
10109-220 = "お誕生日\nおめでとうございます、先生。"
10109-230 = "先生が生まれた日。"
10109-240 = "その事実だけで、\nペン先が軽やかに\n動いてしまいそうです。"
10109-250 = "あますことなく全て、\n記録させてくださいね？"
10109-260 = "……私の誕生日、\n覚えていて\nくださったのですか？"
10109-270 = "お祝いの言葉だけで\n十分なのですが……"
10109-280 = "……でしたら、今晩は私が\n眠るまで本を読んで\nいただいてもいいですか？\nふふっ。"
10109-290 = "明けまして\nおめでとうございます。"
10109-300 = "仕事と休息、\nバランスが取れる\n一年にしてくださいね。"
10109-310 = "クリスマスの夜、\n夜景を眺めながらの読書……\n趣があって、\nなかなか良いですよ。"
10109-320 = "もしご興味がありましたら、\n先生も一緒にいかがでしょう？"
10109-330 = "難しい本は、\n私が読んで差し上げますから。"
10109-340 = "この時期はフリルのついた\n服装で出歩く生徒を、\nよくみかけます。"
10109-350 = "ふふ、フリル付きの服、\n先生はお好きですか？"
10109-370 = "『きらきらと輝く星々が、\nまるで羊の群れのように\n静かに流れておりました……』"
10109-380 = "先生は、変わっていますね。"
10109-390 = "なんの変哲もない私の朗読を\n聴きながら眠りたいだなんて。"
10109-400 = "……それはどうしてですか？"
10109-410 = "声が透明で綺麗だから、\n文字の先を想像できる……？"
10109-420 = "……ありがとうございます、\n先生。"
10109-430 = "私も、自分を\n見つめ直すことができました。"
10109-440 = "……先生？\nもう寝てしまったんですか？"
10109-450 = "あの中で一番美しく\n輝いている星が……"
10109-460 = "道に迷ったのか、私の足元で\n眠ってしまいました。"
10109-2600 = "このコンバージョンキットは、\n使用者の意図によって形を\n変えられるんです。\n……私に少し似ていますね。ふふっ。"
