[translation]
13002-20 = "美食研究会のアカリです。\nこれから一緒に美味しい物を\n食べに行きましょうか?"
13002-30 = "うーん、\nどこかに食べ物はないですかね。"
13002-40 = "うーん…どう考えても…\n先生の周りには\n女の子が多すぎます…。"
13002-50 = "フフフフ…。"
13002-60 = "今日もみんなで一緒に～、\n美味しい物を食べに行くのです！"
13002-70 = "わあ～、\n今日のメニューはステーキですって！\n早く食堂に行きましょう！"
13002-80 = "おはようございます。先生。"
13002-90 = "今日はどんな料理を\n食べに行きますか?"
13002-100 = "フフッ。\nおはようございます。"
13002-110 = "ここにあった\nお菓子ですか?"
13002-120 = "うーん、\nわかりませんね～。"
13002-130 = "先生のことを…。フフフ。\n想像だけでも楽しいですね。"
13002-140 = "何かお手伝いしましょうか？"
13002-150 = "いっぱい食べるからって、\n美食家じゃない、という\nわけではありません。"
13002-160 = "私は美味しい物を\n「いっぱい」食べる\n美食家ですから。"
13002-170 = "ダイエットですか…"
13002-180 = "そうですね。私はどれだけ\n食べても太らない体質なので～"
13002-190 = "お誕生日おめでとう\nございます。先生。"
13002-200 = "今日だけは特別に、\n私が腕を振るって\n料理を作りますよ。"
13002-210 = "祝ってくださって、\nありがとうございます。"
13002-220 = "ケーキをご馳走して\nくれるんですか？"
13002-230 = "へえ…\n二桁ぐらいは食べても\n大丈夫でしょうか？"
13002-240 = "明けまして\nおめでとうございます～。"
13002-250 = "今年もたくさん食べる\n一年になるといいですね～。"
13002-260 = "メリークリスマス～。"
13002-270 = "先生～ 急いで～、\n七面鳥にケーキに、\nたくさんの料理が\n待ってるんですから～。"
13002-280 = "飴をくれないと\nいたずらしますよ～。"
13002-290 = "うーん…\n私、飴ももらって、\nいたずらもしたいん\nですけど、どうしましょう？"
13002-310 = "んんっ、美味しい～！"
13002-320 = "こんなに美味しい\nお寿司なら、いくらでも\n食べられそうです！"
13002-330 = "今のところ何皿くらい\n食べたのか、ですか？"
13002-340 = "フフッ、先生は今まで食べた\nお寿司の数を覚えて\nいるのですか？…なんて。"
13002-350 = "うーん、大体100皿\nぐらいでしょうか…。"
13002-360 = "でも、普段に比べたら\nだいぶ抑えている方ですよ。"
13002-370 = "まだ私のお腹は半分も\n満たされていませんから！"
13002-380 = "これ以上食べて、\n本当に良いんですか？"
13002-390 = "先程から先生の額に、\n冷や汗が流れてません？"
13002-400 = "あっ、この金のお皿に\n乗ったお寿司、\nきっと美味しいんでしょうね～。"
13002-410 = "先生、\nこれ食べても良いですか？"
13002-420 = "この一皿1,000円する\nお寿司、食べちゃいますよ？"
13002-2600 = "みんな、大食い大会で勝負を\n決めればいいのに。\n力で解決するのは嫌なんですが、\n私もこれで、準備完了です！"
