[translation]
13002-20 = "Sou a Akari, do Clube de Pesquisa Gastronômica.\nQue tal irmos comer algo\ndelicioso juntos agora?"
13002-30 = "Hmm,\nserá que não tem comida em algum lugar?"
13002-40 = "Hmm... não importa como eu pense nisso...\nTem garotas demais\nao redor do Sensei..."
13002-50 = "Fufufu..."
13002-60 = "Hoje também, vamos todos juntos\ncomer algo delicioso!"
13002-70 = "Uau~\nO menu de hoje é bife!\nVamos logo para o refeitório!"
13002-80 = "Bom dia, Sensei."
13002-90 = "Que tipo de prato vamos\ncomer hoje?"
13002-100 = "Fufu.\nBom dia."
13002-110 = "O doce que estava\naqui?"
13002-120 = "Hmm,\nnão faço ideia~."
13002-130 = "Sobre o Sensei... Fufu.\nSó de imaginar já é divertido."
13002-140 = "Quer que eu ajude em algo?"
13002-150 = "Só porque eu como muito,\nnão significa que eu não seja\numa gourmet."
13002-160 = "Porque eu sou uma gourmet\nque come \"muito\"\nde coisas deliciosas."
13002-170 = "Dieta, é..."
13002-180 = "Pois é. Eu tenho um metabolismo que não me deixa engordar,\npor mais que eu coma~"
13002-190 = "Feliz aniversário,\nSensei."
13002-200 = "Hoje, especialmente,\neu vou me esforçar\npara preparar um prato para você."
13002-210 = "Obrigada por\nme parabenizar."
13002-220 = "Você vai me pagar\num bolo?"
13002-230 = "Hee... \nSerá que tem problema se eu\ncomer uns dois dígitos?"
13002-240 = "Feliz Ano Novo~."
13002-250 = "Espero que este ano também\nseja um ano de comer muito~."
13002-260 = "Feliz Natal~."
13002-270 = "Sensei~ Depressa~,\nperu, bolo, tem um monte de\ncomida esperando por nós~."
13002-280 = "Doces ou travessuras."
13002-290 = "Hmm...\nEu quero ganhar doces e\ntambém quero fazer uma travessura,\no que eu faço?"
13002-310 = "Hmm, que delícia~!"
13002-320 = "Com um sushi tão gostoso\nassim, acho que conseguiria\ncomer qualquer quantidade!"
13002-330 = "Quantos pratos eu já\ncomi até agora, você pergunta?"
13002-340 = "Fufu, o Sensei lembra\nde quantos sushis já comeu?\n...Brincadeirinha."
13002-350 = "Hmm, uns 100 pratos,\nmais ou menos..."
13002-360 = "Mas, comparado ao normal,\nestou até me segurando bastante."
13002-370 = "Porque meu estômago ainda\nnão está nem na metade!"
13002-380 = "Tem certeza de que está tudo bem\nem eu comer mais?"
13002-390 = "Não está escorrendo um suor frio\nda testa do Sensei desde agora pouco?"
13002-400 = "Ah, esse sushi no\nprato dourado,\ncom certeza deve ser delicioso~."
13002-410 = "Sensei,\nposso comer este?"
13002-420 = "Vou comer esse sushi de\n1.000 ienes o prato, viu?"
13002-2600 = "Pessoal, por que não decidem isso em uma competição de quem come mais?\nNão gosto de resolver as coisas na força, mas com isso, estou pronta!"
