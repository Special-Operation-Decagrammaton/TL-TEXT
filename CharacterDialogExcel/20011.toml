[translation]
20011-10 = "Blue Archive!"
20011-20 = "Isto? É um traje de sacerdotisa.\nEi... cosplay? N-não é nada disso!\nÉ um trabalho de meio período legítimo!"
20011-30 = "Seja purificado,\nseja limpo!\n...Brincadeirinha."
20011-40 = "Sabe, vivem me pedindo para exorcizar espíritos...\nMas, na verdade, como é que se faz um exorcismo?"
20011-50 = "Miko Miko Nyan Nyan♪\nMiko Miko Nyan Nyan♪\n...Aaaah!?\nDesde quando você está aí!?\nEsqueça! Esqueça agora mesmo!!"
20011-60 = "Ah,\ntrabalhei bastante este mês, então talvez o pagamento venha bom.\nHehe♪"
20011-70 = "Quando o trabalho acabar,\nserá que devo convidar todo mundo para vir aqui?"
20011-80 = "Ah, Sensei.\nVamos lá, hora de começar o trabalho."
20011-90 = "Eu estava esperando porque queria te ajudar, afinal."
20011-100 = "Ao voltar para o Schale, havia uma sacerdotisa lá!"
20011-110 = "...Fiquei com vergonha de dizer isso eu mesma."
20011-120 = "Se eu sou a sacerdotisa e estou ajudando o Sensei..."
20011-130 = "Isso significa que o Sensei é o sacerdote?"
20011-140 = "Vamos, não fique aí parado, Sensei.\nHora de trabalhar."
20011-150 = "Seeeenseeei!"
20011-160 = "Não pode ficar de preguiça!"
20011-170 = "Motivação, apareça, apareça~"
20011-180 = "E então, parece que funcionou?"
20011-190 = "Vamos lá, dê o seu melhor, Sensei."
20011-200 = "O traje de sacerdotisa,\ncombina comigo...?"
20011-210 = "H-hum! Bem, claro que sim!"
20011-220 = "...E-eu recebi um elogio."
20011-230 = "Feliz aniversário, Sensei. Sabe, recebi meu pagamento, então que tal eu te levar para comer?"
20011-240 = "H-hoje pode, não tem problema! É um dia importante, afinal..."
20011-250 = "É seu aniversário, então... o que você quer?"
20011-260 = "Hmm... hoje, bem, por enquanto, só de estarmos juntos assim... sim."
20011-270 = "Feliz Ano Novo, Sensei."
20011-280 = "J-já que estou vestida assim,\nque tal... eu te acompanhar\npara fazer uma oração?"
20011-290 = "Feliz Natal!\nComo imaginei que o Sensei estaria livre hoje, vim vestida assim de propósito."
20011-300 = "...Fico feliz, mas já que estamos nisso, quer ver uma roupa de Papai Noel também?"
20011-310 = "I-isso fica para depois!"
20011-320 = "C-com esse traje, será que consigo\nexpulsar até os fantasmas\ndo Halloween...!?"
20011-330 = "...Provavelmente não funciona se for só cosplay?"
20011-340 = "J-já disse que não é cosplay!"
20011-360 = "D-desculpe, Sensei..."
20011-370 = "Como pode ver,\nnão consigo me mover muito bem..."
20011-380 = "Ei, o-o que isso significa!?"
20011-390 = "E aliás, isso foi...\num elogio...?"
20011-400 = "Ah, falando nisso, desculpe por ter quebrado a promessa..."
20011-410 = "Ei, descansar aqui juntos...?"
20011-420 = "Já que você se esforçou tanto\nno trabalho de meio período,"
20011-430 = "você quer que eu\ndescanse um pouco agora...?"
20011-440 = "Ah, que isso."
20011-450 = "Sério, o Sensei\nsempre faz essas coisas..."
20011-460 = "Mas, sim.\nEntão, só um pouquinho,\nvamos descansar juntos assim.\nSensei."
20011-2600 = "Nossa, você até preparou isso para mim...\nNão tem jeito, então... sim.\nVou me esforçar mais para retribuir o favor. Sensei."
