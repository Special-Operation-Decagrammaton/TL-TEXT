[translation]
20011-10 = "ブルーアーカイブ！"
20011-20 = "これ？巫女さんの格好だよ。\nえっ……コスプレ？ち、違うってば！\nれっきとしたアルバイト！"
20011-30 = "祓いたまえ、\n清めたまえ～！\n……なんちゃって。"
20011-40 = "なんか、頻繁に除霊を\n頼まれるんだけど……\n除霊って実際、\nどうすればいいんだろ。"
20011-50 = "巫女巫女ニャンニャン♪\n巫女巫女ニャンニャン♪\n……ちょぉっ！？\nいつからそこに！？\n忘れて！今すぐ！！"
20011-60 = "あ、\n今月結構残業したし、\nバイト代期待できるかも\nふふっ♪"
20011-70 = "バイトが終わったら、\nみんなをここに\n誘ってみようかな。"
20011-80 = "あ、先生。\nほら、お仕事始めるよ。"
20011-90 = "せっかく手伝ってあげようと\n思って待ってたんだから。"
20011-100 = "シャーレに戻ると、\nそこには何と巫女さんが！"
20011-110 = "……自分で言ってて\n恥ずかしくなってきた。"
20011-120 = "私が巫女さんで、先生の\nことを手伝うってことは……"
20011-130 = "先生が神主さんってこと？"
20011-140 = "ほら、ボーっとしてないで、先生\nお仕事始めるよ。"
20011-150 = "せ～ん～せ～い～！"
20011-160 = "サボっちゃダメだってば！"
20011-170 = "やる気よ出てこい、出てこい～"
20011-180 = "どう、効果ありそう？"
20011-190 = "ほら、頑張ろ。先生。"
20011-200 = "巫女さんの格好、\n似合ってる……？"
20011-210 = "ふ、ふーん！まあね！"
20011-220 = "……ほ、褒められた。"
20011-230 = "お誕生日おめでとう、先生\nその、バイト代が入ったし、\n私が奢るからご飯行かない？"
20011-240 = "きょ、今日くらい良いってば！\n大切な日なんだから……"
20011-250 = "誕生日だし、欲しいもの……？"
20011-260 = "うーん……今日はその、\nとりあえずこうして一緒に\nいられれば……うん。"
20011-270 = "あけましておめでとう、先生。"
20011-280 = "せ、せっかく\nこの格好なわけだし、\nその……お参りとか、\n付き合ってあげようか？"
20011-290 = "メリークリスマ～ス！\nどうせ先生は今日暇だと思って、\n可愛い格好で来てあげたよ。"
20011-300 = "……嬉しいけどせっかくだし、\nサンタ服も見たい？"
20011-310 = "そ、それは後で！"
20011-320 = "こ、この格好なら、\nハロウィーンのお化けも\n退治できるかな……！？"
20011-330 = "……コスプレだと多分無理？"
20011-340 = "こ、コスプレじゃないってば！"
20011-360 = "ご、ごめん、先生……。"
20011-370 = "この通り、\nちょっと動けなくって……。"
20011-380 = "え、そ、それって\nどういう意味！？"
20011-390 = "っていうかそれ、\n褒めてるの……？"
20011-400 = "あ、そういえばその、\n約束破ってごめんなさい……。"
20011-410 = "え、ここで一緒に休む……？"
20011-420 = "ずっとアルバイト\n頑張ってたんだから、"
20011-430 = "今くらい\nゆっくりしてほしい、って……？"
20011-440 = "あはっ、何それ。"
20011-450 = "ほんと、先生は\nいつもそうやって……。"
20011-460 = "でも、うん。\nじゃあちょっとだけ、\nこうして一緒に\nゆっくりしよっか。先生。"
20011-2600 = "まったく、こんなものまで\n用意してくれちゃって……\nしょうがないから、その……うん。\nもっと頑張って、恩返しするからね。先生。"
