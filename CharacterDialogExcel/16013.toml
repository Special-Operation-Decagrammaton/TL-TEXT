[translation]
16013-10 = "ブ、ブルーアーカイブ！"
16013-20 = "せ、先生を監視しに来たの！\nエッチなのはダメ、禁止！\n絶対に許さないから…！"
16013-30 = "うぅ、人が、\n多すぎる…。"
16013-40 = "あ、あれはっ…！？"
16013-50 = "も、もしかして、\nこんな格好してるの、\n私だけ…！？"
16013-60 = "先生…どこぉ…。"
16013-70 = "こ、これだって、\n好きで着てるわけじゃ\nないのに！"
16013-80 = "待ってたよ、先生！\n今日は何するの？"
16013-90 = "先生遅い！\nもう…なにしてたのよ！"
16013-100 = "えっ？この格好…？"
16013-110 = "な、なんで\nそんなこと聞くわけ？\nエッチなのはダメ！死刑！"
16013-120 = "書類作業？\nそ、そういうのは、\nよく分からないけど…。"
16013-130 = "そ、その代わり、\nここを守ってあげる！"
16013-140 = "先生って、いつもこんな\n風に仕事してるんだ…。\n大変そう…。"
16013-150 = "ずっとここにいて飽きないの？\n山とか海とか、\n行きたくならない？"
16013-160 = "ふふっ、先生。\n私が一緒で、心強いんじゃない？"
16013-170 = "先生、今日誕生日でしょ？\n欲しいものとかある？\nなんでも言って！"
16013-180 = "あっ…\nエッチなのはダメだからね！"
16013-190 = "あ、私の誕生日…。\n覚えて、くれてたんだ…"
16013-200 = "ふふっ。ありがとう。"
16013-210 = "あけましておめでとう、先生！\n今年も海に行ったり\nしたいわね…ふふっ"
16013-220 = "クリスマスかぁ…。"
16013-230 = "え？外に出るの？\nこの格好で！？"
16013-240 = "…な、何考えてるの！？\n変態！死刑っ！！"
16013-250 = "ハロウィーンコスチューム！？\n水着が！？"
16013-260 = "どう考えたらそうなるの！？"
16013-280 = "…えっと…。"
16013-290 = "…先生…その…\nいつまでこうしてるの…？\n意味分かんない…。"
16013-300 = "そう…んむ…。"
16013-310 = "じゃあ、帰ろっかな…。"
16013-320 = "…はっ！！"
16013-330 = "（ダメダメダメ！\n私は今何をっ！）"
16013-340 = "（危ない！また先生に\n騙されるところだった）"
16013-350 = "（警戒を緩めるなんて…\nダメ、絶対にダメ！）"
16013-360 = "私を油断させようと\nしたって無駄なんだからっ！"
16013-370 = "…むんっ！"
16013-2600 = "こ、これは…んと…。\nだ、ダメ、ちゃんと言わなきゃ…\nあ、ありがと先生！\nこれからも頑張るわ！\nも、もういいでしょ？\n私だって、お礼くらい言えるのっ！"
