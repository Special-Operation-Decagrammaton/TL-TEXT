[translation]
16013-10 = "B-Blue Archive!"
16013-20 = "E-Eu vim aqui para vigiar o Sensei!\nNada de coisas pervertidas, é proibido!\nEu não vou perdoar você...!"
16013-30 = "Ugh, tem gente demais aqui..."
16013-40 = "A-Aquilo é...!?"
16013-50 = "S-Será que... eu sou a única\nque está vestida assim...!?"
16013-60 = "Sensei... onde você está...?"
16013-70 = "E-Eu não estou usando isso\nporque eu quero, sabia!"
16013-80 = "Eu estava te esperando, Sensei!\nO que vamos fazer hoje?"
16013-90 = "Sensei, você está atrasado!\nQual é... o que você estava fazendo!?"
16013-100 = "Hã? Esse visual...?"
16013-110 = "P-Por que você está\nperguntando isso?\nNada de perversões! Pena de morte!"
16013-120 = "Trabalho com documentos?\nE-Eu não entendo muito\nsobre essas coisas, mas..."
16013-130 = "E-Em troca, eu vou\nproteger este lugar!"
16013-140 = "Então o Sensei trabalha\ndesse jeito o tempo todo...\nParece cansativo..."
16013-150 = "Você não fica entediado de ficar aqui o tempo todo?\nNão sente vontade de ir\npara as montanhas ou para a praia?"
16013-160 = "Hehe, Sensei.\nNão se sente mais seguro\ncomigo aqui?"
16013-170 = "Sensei, hoje é seu aniversário, né?\nTem algo que você queira?\nPode pedir qualquer coisa!"
16013-180 = "Ah...\nNada de coisas pervertidas, entendeu!"
16013-190 = "Ah, meu aniversário...\nVocê... se lembrou..."
16013-200 = "Hehe. Obrigada."
16013-210 = "Feliz Ano Novo, Sensei!\nEspero que possamos ir à praia\neste ano também... hehe."
16013-220 = "Então é Natal..."
16013-230 = "Hã? Sair lá fora?\nCom essa roupa!?"
16013-240 = "...O-O que você está pensando!?\nPervertido! Pena de morte!!"
16013-250 = "Fantasia de Halloween!?\nDe roupa de banho!?"
16013-260 = "Como você chegou a essa conclusão!?"
16013-280 = "...Bem..."
16013-290 = "...Sensei... isso... \npor quanto tempo você vai ficar assim...?\nNão entendo o que você quer..."
16013-300 = "Entendo... hmm..."
16013-310 = "Bom, acho que vou voltar..."
16013-320 = "...Ah!!"
16013-330 = "(Não, não, não!\nO que eu estou fazendo agora!)"
16013-340 = "(Perigo! Eu quase fui\nenganada pelo Sensei de novo.)"
16013-350 = "(Baixar a guarda assim...\nNão, de jeito nenhum!)"
16013-360 = "Não adianta tentar me fazer\nbaixar a guarda!"
16013-370 = "...Hmph!"
16013-2600 = "I-Isso é... bem...\nN-Não, eu preciso dizer direito...\nO-Obrigada, Sensei!\nVou continuar me esforçando!\nJ-Já chega, né?\nEu também sei agradecer, sabia!"
