[translation]
10083-10 = "ブルーアーカイブ。"
10083-20 = "百鬼夜行連合学院所属、百花繚乱の作戦参謀、桐生キキョウ。今後も良好な関係でいるために、シャーレの仕事を手伝うよ。……もちろんその分、こっちも手伝ってもらうつもりだけど。そういうことだから……よろしくね、先生。"
10083-30 = "次の作戦、\n今のうちに\n立てておこう。"
10083-40 = "どこか、\n落ち着ける\n場所は……。"
10083-50 = "私は百花繚乱だもの…\n半端なことは\nできない。"
10083-60 = "先生……仕事\n終わったかな……。"
10083-70 = "退屈。\nシャーレといっても、\nこの程度なんだ。"
10083-80 = "おかえり、先生。\nはいここ、私の隣に座って。\n今から仕事、するんでしょう？"
10083-90 = "今日も忙しいの？"
10083-100 = "ああ、分かってるよ。\n私のことは気にしないで。"
10083-110 = "あんたが仕事をしている間、\nここで大人しく座ってるから。"
10083-120 = "シャーレの仕事を\n手伝ってくれて\nありがとう……？"
10083-130 = "ふふ、先生。\n私があんたの手伝いに\n来てると、本当に\nそう思ってるの？"
10083-140 = "私は百花繚乱の参謀だよ？"
10083-150 = "シャーレの分析なんて\nとっくに終わってる。"
10083-160 = "その気になれば、シャーレを\n無力化させることなんて\n造作もないんだけど。"
10083-170 = "……今のは冗談。\nそんな顔しないで。"
10083-180 = "当番の仕事って、\n思ったより単調なんだね。"
10083-190 = "もうちょっと、\nドラマチックな展開を\n期待していたんだけど。"
10083-200 = "さ、なんでも言って。\n当番は先生の命令に従う。"
10083-210 = "……そういう契約でしょ？\n違う？"
10083-220 = "あんたが地道に\nこなしている仕事は全部、\nキヴォトスのため。"
10083-230 = "…中には、私たち百花繚乱の\nためにやってる事もある。\nそうでしょう？"
10083-240 = "……うん、\n先生に会えて、\nよかった。本当に。"
10083-250 = "…無言でいなく\nなったりしないで。"
10083-260 = "常に私の目の届く場所に…\n体温の伝わる距離にいて。"
10083-270 = "……望みは、\nそれだけだから。"
10083-280 = "あんたの誕生日？\nそりゃあ覚えてるよ。"
10083-290 = "あんた以上に、\n今日という日を楽しみに\nしてたんだから。"
10083-300 = "おめでとう、先生。"
10083-310 = "有意義な一日を\n送るための作戦なら、\n既にできてるから。"
10083-320 = "さ、出かけよう、先生。"
10083-330 = "そう、今日は私の誕生日。\nもっと気持ちを込めて祝って。"
10083-340 = "この後の予定も、\n全部キャンセルしてね。"
10083-350 = "今からあんたの時間は全部、\n私が独り占めする\n予定なんだから。"
10083-360 = "あけましておめでとう、先生。"
10083-370 = "……言いたいのはそれだけ。"
10083-380 = "だって、今ここに\nあんたと私がいる。\n他に何か必要？"
10083-390 = "メリークリスマス、先生。"
10083-400 = "……七面鳥でも買いに行く？"
10083-410 = "たまにはこういう\n雰囲気に乗るのも、\n良いかなと思って。"
10083-420 = "トリック・オア・トリート、\nだよ先生。いたずらと\nお菓子、さ、選んで。"
10083-430 = "……お菓子にするの？"
10083-440 = "………ふん、つまらない人。"
10083-450 = "じゃ、今度は私の番。\n私は当然、いたずらにするよ。"
10083-460 = "はい、じゃあ先生は\n何をしてくれるのかな？\nふふ。"
10083-480 = "間に合ったね。先生。"
10083-490 = "相変わらず、間抜けな顔。"
10083-500 = "まあね……\nある人が言ってたんだ。"
10083-510 = "休息を取る事は、\n働くのと同じぐらい、いや、\nそれ以上に大事だ、って。"
10083-520 = "ふふ、優秀な参謀は、\n他人の金言もちゃんと\n覚えているんだよ。"
10083-530 = "みて、先生に\nオススメしたい本、\nこんなにたくさんあるの。"
10083-540 = "あ、その前に……\n部屋の掃除と、緑茶を\n一杯、お願いできるかな。"
10083-550 = "自分で言いだしたことでしょう？\n断ったりしないよね？"
10083-560 = "そうだ…あんたって\nそういう人だった…\n知ってたけど。"
10083-570 = "まぁいっか。\n桐生キキョウは、\nせっかくの機会を棒に\n振る真似はしない。"
10083-580 = "全身全霊で甘えるから、\n覚悟しててね……ふふ。"
10083-2600 = "これは私への信頼の証？それともあんたの\n気の迷い？……どっちでもいいけどね。\n私、こういうのはちゃんと倍にして\n返すタイプだから。覚悟しておいて。\nふふ。面白くなってきたかも。"
