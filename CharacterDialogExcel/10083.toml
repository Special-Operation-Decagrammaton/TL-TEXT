[translation]
10083-10 = "Blue Archive."
10083-20 = "Sou da Academia Hyakkiyako, estrategista da Hyakka Ryoran, Kiryu Kikyou. Para mantermos uma boa relação daqui em diante, vou ajudar com o trabalho do Schale. ...Claro que, em troca, pretendo que você me ajude também. É isso... conto com você, Sensei."
10083-30 = "Vamos planejar\na próxima operação\nenquanto temos tempo."
10083-40 = "Algum lugar...\nonde eu possa\nficar tranquila..."
10083-50 = "Eu sou da Hyakka Ryoran...\nNão posso fazer\nnada pela metade."
10083-60 = "Sensei... será que\no trabalho já acabou?..."
10083-70 = "Tédio.\nMesmo sendo o Schale,\né só isso?"
10083-80 = "Bem-vindo de volta, Sensei.\nAqui, sente-se ao meu lado.\nVai começar a trabalhar agora, não vai?"
10083-90 = "Está ocupado hoje também?"
10083-100 = "Ah, eu entendo.\nNão se preocupe comigo."
10083-110 = "Enquanto você trabalha,\nficarei sentada aqui quietinha."
10083-120 = "Obrigada por me deixar\najudar com o trabalho\ndo Schale...?"
10083-130 = "Fufu, Sensei.\nVocê realmente acha que\neu vim aqui só para\nte ajudar?"
10083-140 = "Eu sou a estrategista da Hyakka Ryoran, sabia?"
10083-150 = "A análise do Schale\njá terminou faz tempo."
10083-160 = "Se eu quisesse, neutralizar o Schale\nseria uma tarefa simples."
10083-170 = "......Foi brincadeira.\nNão faça essa cara."
10083-180 = "O trabalho de plantão\né mais monótono do que eu pensava."
10083-190 = "Eu esperava um\ndesenrolar um pouco\nmais dramático."
10083-200 = "Vamos, pode falar.\nO plantonista segue as ordens do Sensei."
10083-210 = "......Não é esse o contrato?\nNão?"
10083-220 = "Todo o trabalho que você\nrealiza com tanto esforço\né pelo bem de Kivotos."
10083-230 = "...E algumas dessas coisas\nvocê faz por nós, da Hyakka Ryoran.\nNão é verdade?"
10083-240 = "......Sim,\nfico feliz por ter\nconhecido você, Sensei. De verdade."
10083-250 = "...Não suma\nsem dizer nada."
10083-260 = "Fique sempre onde eu possa te ver...\nA uma distância onde eu possa sentir seu calor."
10083-270 = "......É só isso\nque eu desejo."
10083-280 = "Seu aniversário?\nClaro que eu lembro."
10083-290 = "Eu estava esperando por este dia\nainda mais ansiosamente\ndo que você."
10083-300 = "Parabéns, Sensei."
10083-310 = "O plano para passarmos\num dia proveitoso\njá está pronto."
10083-320 = "Vamos, vamos sair, Sensei."
10083-330 = "Isso mesmo, hoje é meu aniversário.\nComemore com mais entusiasmo."
10083-340 = "Cancele todos os seus\ncompromissos depois disso também."
10083-350 = "A partir de agora, todo o seu tempo\nserá exclusivo meu."
10083-360 = "Feliz ano novo, Sensei."
10083-370 = "......Era só isso que eu queria dizer."
10083-380 = "Porque, agora, você e eu\nestamos aqui.\nPrecisa de mais alguma coisa?"
10083-390 = "Feliz Natal, Sensei."
10083-400 = "......Quer ir comprar um peru?"
10083-410 = "Achei que seria bom\nentrar no clima\nde vez em quando."
10083-420 = "Doces ou travessuras,\nSensei. Travessura ou\ndoce, escolha logo."
10083-430 = "......Vai escolher doce?"
10083-440 = ".........Hum, que pessoa sem graça."
10083-450 = "Então, agora é minha vez.\nEu, obviamente, escolho travessura."
10083-460 = "Certo, então o que\nvocê vai fazer, Sensei?\nFufu."
10083-480 = "Chegou a tempo, Sensei."
10083-490 = "Como sempre, com essa cara de bobo."
10083-500 = "Bem... é que\nalguém me disse uma vez."
10083-510 = "Que descansar é tão importante\nquanto trabalhar, ou talvez,\nainda mais importante."
10083-520 = "Fufu, uma estrategista de elite\nsempre se lembra das\npalavras de sabedoria dos outros."
10083-530 = "Olha, tem tantos livros\nque eu gostaria de\nrecomendar ao Sensei."
10083-540 = "Ah, mas antes disso...\nVocê poderia limpar o quarto\ne me servir uma xícara de chá verde?"
10083-550 = "Foi você quem se ofereceu, não foi?\nNão vai recusar agora, vai?"
10083-560 = "É verdade... você é\nesse tipo de pessoa...\nEu já sabia disso."
10083-570 = "Bem, tanto faz.\nKikyou Kiryu não é de\ndesperdiçar uma boa oportunidade."
10083-580 = "Vou aproveitar ao máximo, então\nesteja preparado... fufu."
10083-2600 = "Isso é uma prova de confiança em mim? Ou foi apenas um momento de distração seu? ...Bem, tanto faz. Eu sou do tipo que retribui tudo em dobro. Esteja preparado. Fufu. As coisas estão ficando interessantes."
