[translation]
10057-10 = "ブルーアーカイブ。"
10057-20 = "ふふっ、あけましておめでとうございます。\n振袖姿に花を咲かせ、心新たに未知の\n食を求めに参りましょう。"
10057-30 = "料理の偉大な\nところは、一皿に\n全てが込められている\n点にあります。"
10057-40 = "ドレスコードや\nロケーションも、美食\nの大切な要素と\n言えるでしょう。"
10057-50 = "この時期は特別な\n料理が目白押しで……\nふふっ、楽しみです。"
10057-60 = "振袖の身のこなしで\nしたら、それなりに\n慣れております。"
10057-70 = "素敵なお料理が\n見つかれば良い\nのですが……。"
10057-80 = "ふふっ。ようこそ、先生。\n今日は美食に出会えましたか？"
10057-90 = "ごきげんよう、先生。\nさあ、私と一緒にお正月の\n美食探しと参りましょう。"
10057-100 = "……先生は振袖姿が\nお好きなんですか？\nえっ、よく似合っている？\nうふふ……と、当然の事です。"
10057-110 = "急に、温かくて優しい味の\n食べ物が恋しくなってしまい\nました。……先生とお話して\nいるからでしょうか。"
10057-120 = "おせちとは本来、\n煮物だけで作られている\nのですが……"
10057-130 = "最近は変わり種も\n増えたのだとか。"
10057-140 = "もちろん、私は\nどちらも美味しく\nいただきますよ。"
10057-150 = "季節の食べ物はどれも\n魅力的ですね……。お正月と\nいえば、おせちやお雑煮、\nお汁粉……。"
10057-160 = "ああ……お腹が\n空いてきましたわ。"
10057-170 = "美食とは、普遍的に\n価値があるものですわ。"
10057-180 = "……もちろん先生も\n同意してくださりますよね？"
10057-190 = "今日は先生のお誕生日\nですわね。お食事に何か\nご希望はございますか？"
10057-200 = "私が先生のお口に合う\nお店を予約いたしますわ。"
10057-210 = "先生が私の誕生日を\n祝ってくださるなんて……\n嬉しいです。"
10057-220 = "うふふっ、本日は\nエスコートして\nくださりますか？"
10057-230 = "先生と一緒なら……\nどのような食事でも\n美食になりますから。"
10057-240 = "あけましておめでとう\nございます、先生。"
10057-250 = "ふふっ……\nお正月になりましたね。\nせっかくですので、振袖に\n着替えて参りましたわ。"
10057-260 = "特別なお料理を楽しむには、\nまず服装から、ですからね。"
10057-270 = "先生、クリスマスを楽しんで\nいらっしゃいますか？\n様々なものが甘くて、\n温かく感じられる日です"
10057-280 = "……ふふっ、これも\n先生のおかげですわ。"
10057-290 = "ハロウィーンですね。\nおいしいカボチャパイを\n持ってきたのですが……"
10057-300 = "先生も一口、いかがですか？"
10057-320 = "美食にとって大切なものは、\n料理と相手……そして時期。"
10057-330 = "それと同じくらい、\nシチュエーションも\nなくてはならない存在です。"
10057-340 = "うふふっ。ですので、\n今日は食べさせあいっこを\nいたしましょう？"
10057-350 = "まずは私から……\nはい、先生。\nお口を開けて……\nあ～んしてください。"
10057-360 = "も、もう、早くなさって\nください。私も……\n恥ずかしいのですが……。"
10057-370 = "先生が口にしてくださるまで、\n私はこのまま続けますわよ？"
10057-380 = "ほら……あ～ん。"
10057-2600 = "特別な日に味わう料理は、\nこれほどまでに素晴らしい\n味わいなのですね。これで\nさらなる美食の道……そして\n先生に近づけたような気がいたします。\nいつも感謝しておりますわ、先生。"
