[translation]
10057-10 = "Blue Archive."
10057-20 = "Fufu, feliz ano novo. Vamos florescer em trajes de furisode e, com o coração renovado, partir em busca de sabores desconhecidos."
10057-30 = "A grandeza da culinária reside no fato de que tudo está contido em um único prato."
10057-40 = "O código de vestimenta e o local também podem ser considerados elementos importantes da gastronomia."
10057-50 = "Nesta época, há uma infinidade de pratos especiais... Fufu, estou ansiosa."
10057-60 = "Quanto a me mover usando um furisode, já estou bastante acostumada."
10057-70 = "Seria maravilhoso se pudéssemos encontrar uma comida deliciosa..."
10057-80 = "Fufu. Seja bem-vindo, Sensei. Você encontrou alguma iguaria hoje?"
10057-90 = "Olá, Sensei. Vamos, venha comigo em busca das iguarias de ano novo."
10057-100 = "...Sensei, você gosta de trajes de furisode? Ah, diz que combina comigo? Ufufu... bem, isso é natural."
10057-110 = "De repente, senti saudades de uma comida com um sabor quente e gentil. ...Será porque estou conversando com você, Sensei?"
10057-120 = "O osechi, originalmente, é feito apenas com pratos cozidos, mas..."
10057-130 = "Dizem que ultimamente o número de variedades diferentes aumentou."
10057-140 = "Claro, eu saborearei ambos com prazer."
10057-150 = "As comidas sazonais são todas fascinantes... Falando em ano novo, temos o osechi, o ozoni, o oshiruko..."
10057-160 = "Ah... estou começando a sentir fome."
10057-170 = "A gastronomia é algo que possui um valor universal."
10057-180 = "...Claro que você concorda comigo, não é, Sensei?"
10057-190 = "Hoje é o seu aniversário, Sensei. Tem algum desejo em relação à refeição?"
10057-200 = "Eu farei uma reserva em um restaurante que agrade ao seu paladar."
10057-210 = "Você celebrar o meu aniversário... Fico muito feliz, Sensei."
10057-220 = "Ufufu, hoje você vai me escoltar?"
10057-230 = "Se estiver com você, Sensei... qualquer refeição se torna uma iguaria."
10057-240 = "Feliz ano novo, Sensei."
10057-250 = "Fufu... Chegou o ano novo. Como é uma ocasião especial, troquei de roupa e vim com este furisode."
10057-260 = "Para desfrutar de uma culinária especial, devemos começar pelo traje, não é?"
10057-270 = "Sensei, está aproveitando o Natal? É um dia em que várias coisas parecem mais doces e calorosas."
10057-280 = "...Fufu, isso também é graças a você, Sensei."
10057-290 = "É Halloween. Eu trouxe uma deliciosa torta de abóbora, mas..."
10057-300 = "Você gostaria de uma mordida, Sensei?"
10057-320 = "O que é importante para a gastronomia é a comida, a companhia... e a época."
10057-330 = "Tão importante quanto isso, a situação também é um elemento indispensável."
10057-340 = "Ufufu. Então, que tal se hoje nós alimentarmos um ao outro?"
10057-350 = "Primeiro eu... aqui, Sensei. Abra a boca... diga 'ah'."
10057-360 = "A-ah, por favor, seja rápido. Eu também... estou envergonhada, mas..."
10057-370 = "Continuarei assim até que você coma, Sensei."
10057-380 = "Vamos... diga 'ah'."
10057-2600 = "A comida saboreada em um dia especial tem um gosto tão maravilhoso. Sinto que, com isso, me aproximei um pouco mais do caminho da alta gastronomia... e de você, Sensei. Sou sempre grata, Sensei."
