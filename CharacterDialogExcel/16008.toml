[translation]
16008-10 = "Blue... Archive..."
16008-20 = "……Eh, eu? Não está me confundindo com outra pessoa?\nAh. Que tipo de assunto você teria com uma preguiçosa como eu……."
16008-30 = "Ah, esse sofá não é nada mal, né?"
16008-40 = "Talvez eu devesse querer um desses para o escritório da Divisão de Segurança Pública."
16008-50 = "Eu não quero fazer absolutamente nada……."
16008-60 = "Ah…… parece que estou ouvindo o som de uma sirene……"
16008-70 = "Duvido muito que o alto escalão venha até aqui, mas……"
16008-80 = "Opa, é o Sensei."
16008-90 = "Bom trabalho, Sensei."
16008-100 = "Bem, eu não fiz nada, na verdade."
16008-110 = "Uaa……\nEstou com sono……."
16008-120 = "Por que a Kirino insiste em carregar tanto trabalho nas costas……?"
16008-130 = "Se a polícia está livre, significa que a cidade está em paz……"
16008-140 = "Ou seja, pensando bem, para manter a paz, é melhor ser preguiçoso!"
16008-150 = "Old Fashioned……\nO nome é meio estranho, mas,"
16008-160 = "o sabor é incrível."
16008-170 = "Um donut sem buraco não é um donut……"
16008-180 = "É só um pão frito, não é……!?"
16008-190 = "……Hm?\nHoje é o aniversário do Sensei?"
16008-200 = "Ah, eu não tenho nenhum presente……."
16008-210 = "……Não tem jeito.\nHoje, não importa que tipo de travessura você faça, Sensei, vou fazer vista grossa especialmente para você."
16008-220 = "Não é estranho ter que ir para a escola mesmo sendo seu aniversário?"
16008-230 = "Se querem me parabenizar, bem que poderiam me deixar folgar hoje……"
16008-240 = "Adivinha só, hoje no almoço, algo especial……"
16008-250 = "……Eh, Osechi? Não, é uma caixa sortida da \"Master Donuts\", sabe?"
16008-260 = "O Natal em si, bem, não me importa muito, mas……"
16008-270 = "Aquele bolo que aparece no dia seguinte com preço promocional, esse sim é irresistível."
16008-280 = "……Hm?\nTem uns idiotas usando máscaras de fantasma causando confusão na cidade?"
16008-290 = "Ah…… sim, aqui. Se você ligar, vai cair na Divisão de Segurança, então peça ajuda para eles."
16008-310 = "Ahhh……\nIsso sim é o paraíso……"
16008-320 = "Em cima do capô quentinho, com um donut e um café……"
16008-330 = "Nossa, vigiar é o máximo!"
16008-340 = "Ah, Sensei.\nFique de olho nos arredores para mim, tá?"
16008-350 = "Enquanto estamos aqui, o criminoso pode acabar passando."
16008-360 = "(Nhac, mastigando……)"
16008-370 = "Definitivamente, para comer com café, o Old Fashioned é o supremo……\nFufu."
16008-380 = "Hm? O que foi, Sensei?\n……Quer um donut?"
16008-2600 = "A arma oficial da Academia Valkyrie é resistente e muito boa. Bem, a precisão não é lá essas coisas, mas……"
