[translation]
16008-10 = "Blue... Archive..."
16008-20 = "……Hã, eu? Tem certeza de que não confundiu de pessoa?\nHaa. O que diabos você quer com uma preguiçosa como eu...?"
16008-30 = "Ah, esse sofá não é nada mau, né?"
16008-40 = "Acho que eu queria um desses lá no escritório do Departamento de Segurança Pública."
16008-50 = "Eu não quero fazer absolutamente mais nada..."
16008-60 = "Aaah... Por algum motivo, acho que estou ouvindo o som de uma sirene..."
16008-70 = "Acho que o alto escalão não viria até aqui, mas..."
16008-80 = "Opa, é você, Sensei."
16008-90 = "Bom trabalho, Sensei."
16008-100 = "Bom, eu não tô fazendo nada, mas..."
16008-110 = "Kuaa...\nQue sono..."
16008-120 = "Por que será que a Kirino fica procurando dor de cabeça pra si mesma..."
16008-130 = "Se a polícia tá com tempo livre, é porque a cidade tá em paz..."
16008-140 = "Ou seja, pensando pelo outro lado, pra manter a paz é melhor ficar com preguiça!"
16008-150 = "Old Fashioned...\nO nome é meio sem graça, mas"
16008-160 = "O sabor é o melhor de todos."
16008-170 = "Um donut sem buraco não é um donut..."
16008-180 = "É só...\num pão frito...!?"
16008-190 = "...Hm?\nHoje é o aniversário do Sensei?"
16008-200 = "Ah, eu não tenho nenhum presente nem nada..."
16008-210 = "...Não tem jeito.\nHoje, não importa o tipo de coisa ruim que o Sensei faça, eu vou abrir uma exceção e fechar os olhos."
16008-220 = "Não é estranho ter que vir pra escola no dia do seu aniversário?"
16008-230 = "Se querem mesmo comemorar, deviam pelo menos nos deixar faltar hoje..."
16008-240 = "Adivinha só, o almoço de hoje vai ser uma coisa especial..."
16008-250 = "...Eh, Osechi?\nNão, é um combo na caixa do 'Master Donuts', sabia?"
16008-260 = "O Natal em si não me importa muito, mas..."
16008-270 = "Aquele bolo com preço de liquidação que aparece no dia seguinte, isso sim é irresistível."
16008-280 = "...Hm?\nTem uns idiotas com máscaras de fantasma causando confusão na cidade?"
16008-290 = "Ah... tá, toma isso aqui.\nSe você ligar pra esse número, vai cair na Divisão de Segurança, então pede ajuda pra eles."
16008-310 = "Aaaah...\nIsso sim é o paraíso..."
16008-320 = "Em cima de um capô quentinho, com donuts e café..."
16008-330 = "Nossa, ficar de tocaia é a melhor coisa!"
16008-340 = "Ah, Sensei.\nFica de olho e vigia os arredores direito, tá?"
16008-350 = "Enquanto a gente tá aqui, o criminoso pode acabar passando."
16008-360 = "(Nham, nham nham...)"
16008-370 = "Como eu imaginava, se é pra comer tomando café, o Old Fashioned é a melhor escolha...\nFufu."
16008-380 = "Hm? Que foi, Sensei?\n...Quer um donut?"
16008-2600 = "A arma de serviço da Escola de Polícia Valkyrie é bem resistente e dá pro gasto.\nBom, a taxa de acerto não é lá grandes coisas, mas..."