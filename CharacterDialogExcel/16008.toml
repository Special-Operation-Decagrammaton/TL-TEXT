[translation]
16008-10 = "ブルー……アーカイブ……。"
16008-20 = "……え、私？人違いじゃないの？\nはぁ。こんな怠け者に、\nいったい何の用なんだか……。"
16008-30 = "ああ、このソファーは\n悪くないね？"
16008-40 = "こういうの、\n生活安全局の\n事務所にも\n欲しいかも。"
16008-50 = "もう一切\n何もしたくない…。"
16008-60 = "あー……なんか、\nサイレンの音が\n聞こえる気が……"
16008-70 = "まさか、上層部が\nここまで来ることは\n無いと思うけど……"
16008-80 = "おっと、先生じゃん。"
16008-90 = "お疲れ、先生。"
16008-100 = "まあ私は\n何もしてないんだけど。"
16008-110 = "くぁ……\n眠い……。"
16008-120 = "どうしてキリノは、\n自分から苦労を\n背負い込むんだか……。"
16008-130 = "警察が暇ってことは、\n街が平和だってこと……"
16008-140 = "つまり逆に考えれば、\n平和のためには\n怠けた方が良い！"
16008-150 = "オールドファッション……\n名前は微妙だけど、"
16008-160 = "味は最高なんだよね"
16008-170 = "穴のないドーナッツは、\nドーナッツじゃなく……"
16008-180 = "ただの、\n揚げパンなんじゃ……！？"
16008-190 = "……ん？\n今日って先生の誕生日？"
16008-200 = "あー、プレゼントとか\n何も無いな……。"
16008-210 = "……しょうがない。\n今日は先生が\nどんな悪いことをしても、\n特別に目をつぶってあげる。"
16008-220 = "誕生日なのに\n学校に行かなきゃいけないのって\nおかしくない？"
16008-230 = "祝ってくれるなら、\n今日ぐらい休ませて\nほしいもんだよ……"
16008-240 = "何と今日のお昼は、\n特別なものを……"
16008-250 = "……え、おせち？\nいや、「マスタードーナッツ」の\nボックスセットだけど？"
16008-260 = "クリスマス自体は\nまあどうでも良いんだけど……"
16008-270 = "次の日とかに出てくる、\nあの特売価格のケーキだけは\nたまんないね。"
16008-280 = "……ん？\n街でお化けの仮面を\nかぶったバカたちが暴れてる？"
16008-290 = "あー……はい、これ。\n電話かけたら\n警備局に繋がるから、\nあっちに頼んで。"
16008-310 = "あぁー……\nこれぞ天国……"
16008-320 = "温かいボンネットの上で、\nドーナッツにコーヒー……"
16008-330 = "いやぁ、\n張り込み最高！"
16008-340 = "あ、先生。\nちゃんと周りを\n警戒しておいてよ。"
16008-350 = "こうしてる間にも、\n犯人が通り過ぎるかも\nしれないし。"
16008-360 = "（はむっ、モグモグ……）"
16008-370 = "やっぱりコーヒーと\n一緒に食べるなら、\nオールドファッションが至高……\nふふっ。"
16008-380 = "ん？どうしたの、先生？\n……ドーナッツ食べたい？"
16008-2600 = "ヴァルキューレ警察学校の制式銃は\n丈夫で良い感じなんだよね。\nまあ、命中率はイマイチだけど……。"
