[translation]
10030-10 = "Blue Archive."
10030-20 = "O excess é tão ruim quanto a falta... Por hoje, que tal esquecer o trabalho e descansar um pouco comigo?"
10030-30 = "Meu corpo está um pouco aquecido..."
10030-40 = "Sinto que minha mente está mais clara."
10030-50 = "Este visual... será que estou chamando muita atenção...?"
10030-60 = "Todos parecem estar se divertindo, não é?"
10030-70 = "Será que tem algum lugar por aqui onde possamos sentar e descansar...?"
10030-80 = "Bem-vindo de volta, Sensei. Eu estava à sua espera."
10030-90 = "Bom trabalho, Sensei. Vamos começar verificando seus sinais vitais."
10030-100 = "Eu tento esquecer o trabalho durante as pausas, mas..."
10030-110 = "Quanto mais tento, mais o trabalho vem à minha mente..."
10030-120 = "De alguma forma, estar vestida assim aqui, bem..."
10030-130 = "Eu fico um pouco nervosa."
10030-140 = "Às vezes, o descanso é necessário... Isso vale para mim, mas também queria que o Sensei soubesse disso."
10030-150 = "Fontes termais... Eu achava que esse não era um lugar para mim."
10030-160 = "Cuidar da própria saúde também faz parte do trabalho, não é?"
10030-170 = "...Talvez eu tenha negligenciado isso um pouco."
10030-180 = "Feliz aniversário, Sensei. Como é um dia especial, bem..."
10030-190 = "Se for para o bem do Sensei, eu farei qualquer coisa..."
10030-200 = "Eh...? Meu aniversário...? Bem, vejamos..."
10030-210 = "Poder estar aqui com você, Sensei, já é um presente para mim."
10030-220 = "Conto com você para mais este ano, Sensei."
10030-230 = "E daqui para frente, bem..."
10030-240 = "Eu ficaria muito feliz se você continuasse ao meu lado."
10030-250 = "É Natal, não é? Eh? Se eu não estou com frio...?"
10030-260 = "Fufu... Sim, meu corpo está aquecido, então estou bem."
10030-270 = "É um dia bem agitado, Sensei."
10030-280 = "Eu não tenho doces, mas... que tal um ovo cozido na fonte termal...?"
10030-300 = "Uma fonte termal tão luxuosa, apenas nós dois... A vida é cheia de surpresas, não é mesmo?"
10030-310 = "Algum dia... talvez, um futuro assim..."
10030-320 = "A-ah, não, não! Por favor, não ligue para o que eu disse...!"
10030-330 = "Não, é que, se pudéssemos realmente chegar a esse ponto..."
10030-340 = "Não é como se eu não pensasse em dias tão maravilhosos assim..."
10030-350 = "Como aluna e Sensei, agora, eu já sou mais do que feliz. De verdade..."
10030-2600 = "Sinto o peso da responsabilidade... Farei o meu melhor para estar à altura."
