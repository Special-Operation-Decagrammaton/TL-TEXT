[translation]
10030-10 = "ブルーアーカイブ。"
10030-20 = "過ぎたるは猶及ばざるが如し……\n今日だけは仕事を忘れて、\n私とひと休み、しませんか？"
10030-30 = "身体が少し\nポカポカします……"
10030-40 = "頭がスッキリした\n感じです。"
10030-50 = "この格好、もしかして\n浮いてますか……？"
10030-60 = "みなさん、\n楽しそうですね。"
10030-70 = "どこかに、\n座って休めそうな\n場所は……？"
10030-80 = "おかえりなさい、先生\nお待ちしておりました。"
10030-90 = "お疲れ様です、先生\nまずはバイタルチェックから\n始めましょう。"
10030-100 = "休憩中は業務のことを\n忘れるように\nしているのですが……"
10030-110 = "そう思えば思うほど、\n脳裏に仕事のことが浮かんで……"
10030-120 = "何だかここでこのような\n格好をしていると、その……"
10030-130 = "少し、緊張してしまいますね。"
10030-140 = "時には休息も必要……\n私もですが、先生にも\n伝えておきたいですね。"
10030-150 = "温泉……。\n私には縁がないところだと\n思っていました。"
10030-160 = "自身の体調管理もまた、\nお仕事の一部ですよね。"
10030-170 = "……少し、疎かにしてしまって\nいたかもしれません。"
10030-180 = "お誕生日\nおめでとうございます、先生。\n特別な日ですから、その……"
10030-190 = "先生のためになるのでしたら、\nなんでも……"
10030-200 = "え……？\n私の誕生日、ですか……？\nそうですね……"
10030-210 = "先生とこうしていられることが、\n私にとってはプレゼントです。"
10030-220 = "今年も一年、\nよろしくお願いします。先生。"
10030-230 = "これからも、その……"
10030-240 = "一緒にいてくださると、\n嬉しいです。"
10030-250 = "クリスマス、ですね。\nえ？寒くないの、ですか……？"
10030-260 = "ふふっ……はい、\n身体は温まっているので\n大丈夫です。"
10030-270 = "にぎやかな日ですね。先生。"
10030-280 = "飴……は無いのですが、\n温泉卵などいかがでしょう……？"
10030-300 = "こんなに豪華な温泉を\nふたりだけでだなんて……\n人生、何が起こるか\n分からないものですね。"
10030-310 = "いつかは……\nもしかしたら、\nこんな未来も……"
10030-320 = "あ、い、いえ！\n気にしないでください……！"
10030-330 = "いえその、もし本当に\nそうなれたら、と……"
10030-340 = "そんな素敵な日々のことを、\n想わないわけでは、\nないのですが…………。"
10030-350 = "生徒と先生で、今は、\n十分すぎるほど\n幸せなんです。本当に……"
10030-2600 = "この重みに、責任を感じます……。\nきちんと応えられるように、\nベストを尽くしますね。"
