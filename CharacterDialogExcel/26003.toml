[translation]
26003-20 = "Tem alguém ferido aqui?\nEu irei correndo ajudar agora mesmo."
26003-30 = "Tem alguém aqui\nse sentindo mal?"
26003-40 = "É um ambiente que aquece o coração\nsó de olhar, não é?"
26003-50 = "Acho que em um lugar como este,\nos pacientes podem se recuperar\nmuito mais rápido."
26003-60 = "De vez em quando, aproveitar um pouco\nde tranquilidade assim\nnão é nada mal."
26003-70 = "Ah... que rosa lindo..."
26003-80 = "Bem-vindo, Sensei.\nComo está se sentindo\nhoje?"
26003-90 = "Eu estava esperando por você, Sensei.\nVamos nos esforçar juntos hoje também\npor um mundo em paz!"
26003-100 = "Ah,\né um novo paciente?"
26003-110 = "Você parece cansado...\nQuer que eu massageie\nseus ombros?"
26003-120 = "O cansaço é a raiz de todas as doenças!\nPor favor, não se esforce demais."
26003-130 = "Sempre que penso nos pacientes,\nmeu coração dói."
26003-140 = "Não posso perdoar os vilões\nque perturbam a paz!"
26003-150 = "Feliz aniversário,\nSensei!\nEspero que o seu dia\nseja repleto\nde felicidade!"
26003-160 = "Obrigada por\nme parabenizar.\nUm presente de aniversário,\nvocê diz?"
26003-170 = "Só o seu sorriso\njá é o suficiente para mim!"
26003-180 = "Feliz Ano Novo!\nPara não pegar um resfriado\nlogo no início do ano,\npor favor, agasalhe-se\nmuito bem!"
26003-190 = "Feliz Natal, Sensei.\nEspero que, pelo menos hoje,\ntodos parem de brigar\ne tenham um dia\nde paz."
26003-200 = "Ganhei um doce\nde Halloween!"
26003-210 = "Doces são doces e gostosos, mas\nse comer demais, com certeza\nvai acabar com cáries..."
26003-230 = "Sério, Sensei..."
26003-240 = "Eu fiquei realmente surpresa..."
26003-250 = "...É uma sensação estranha."
26003-260 = "É a primeira vez que fazem algo assim por mim,\nentão estou um pouco\nconfusa..."
26003-270 = "Sério mesmo..."
26003-280 = "...É a primeira vez que conheço\nalguém como você."
26003-290 = "Desculpe, eu acabei\nficando um pouco confusa, mas..."
26003-300 = "Obrigada,\nestou muito feliz...!"
26003-310 = "...É graças ao Sensei."
26003-320 = "...É graças ao Sensei\nque sinto isso."
26003-2600 = "Não adianta fugir só porque\na injeção dói!"
