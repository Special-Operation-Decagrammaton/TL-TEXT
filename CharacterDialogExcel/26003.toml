[translation]
26003-20 = "ケガをされた方はいらっしゃいますか?\n私がすぐに駆け付けますよ。"
26003-30 = "ここに、体調が\n悪い人はいませんか?"
26003-40 = "見ているだけで心が\n温かくなる空間ですね。"
26003-50 = "こういうところなら、\n患者さんたちも早く\n完治できると思います。"
26003-60 = "たまにはこうして、\n余裕を楽しむのも\n悪くないですね。"
26003-70 = "あ…綺麗なピンク色…。"
26003-80 = "ようこそ、先生。\n今日のご体調は\nいかがですか?"
26003-90 = "お待ちしておりました、先生。\n今日も平和な世界のために\n一緒に頑張りましょう！"
26003-100 = "あっ、\n新たな患者さんですか?"
26003-110 = "お疲れのようですね…\n肩でも揉んで\nさしあげましょうか?"
26003-120 = "疲れは万病の元！\nあまり無理しないでくださいね。"
26003-130 = "患者さんたちのことを思うと、\nいつも胸が痛みます。"
26003-140 = "平和を乱す\n悪党は許せません！"
26003-150 = "お誕生日おめでとう\nございます、先生！\n今日一日が、幸せで\nいっぱいである\nことを願ってます！"
26003-160 = "祝ってくださって\nありがとうございます。\n誕生日プレゼント、ですか?"
26003-170 = "先生の笑顔だけでも\n十分ですよ！"
26003-180 = "明けましておめでとう\nございます！新年から\n風邪ひかないように、\nしっかり暖かく\n着込んでくださいね！"
26003-190 = "メリークリスマス、先生。\n今日ぐらいは皆さん\nケンカしないで、\n平和な一日になると\nいいですね。"
26003-200 = "ハロウィンの\n飴をいただきました！"
26003-210 = "飴は甘くて美味しいけど\n食べ過ぎるときっと\n虫歯になっちゃいます…。"
26003-230 = "全く、先生ったら……。"
26003-240 = "本当に、びっくりしました……。"
26003-250 = "……不思議な感じがします。"
26003-260 = "こういうことを\nしてもらったのは初めてで、\n何だかちょっと\n戸惑ってしまって……。"
26003-270 = "本当に……。"
26003-280 = "……こんな方に出会ったのは、\n初めてです。"
26003-290 = "すみません、ちょっと\n混乱してしまったのですが……。"
26003-300 = "ありがとうございます、\nとっても嬉しいです……！"
26003-310 = "……先生のおかげです。"
26003-320 = "……先生のおかげなんです、\nこの気持ちは。"
26003-2600 = "注射が痛いからって\n逃げたらだめですよ！"
