[translation]
10005-20 = "ふぁ～、適当にやろうよ～\nゆとりが大事なんだから～"
10005-30 = "うん、いい所だね。\n気に入ったよ。"
10005-40 = "お昼寝にちょうどいい\n場所はどこかな～"
10005-50 = "適当に、適当に～"
10005-60 = "うん、\n悪くないかもね。"
10005-70 = "へぇ～\nいいんじゃないかな？"
10005-80 = "よく来たね、先生。\n相変わらず苦労が多そうだ～"
10005-90 = "ああ、いらっしゃ～い。\nいろいろ仕事が溜まってるよ。"
10005-100 = "ここは涼しくていいよ～"
10005-110 = "色々お疲れ様、\n先生も。"
10005-120 = "私が必要って？\nへぇ、お世辞でもありがとう。"
10005-130 = "えっ？お世辞じゃないの？\nあ、う、うん…。\n…あ、ありがとう。"
10005-140 = "あまり肩に力\n入れなくていいよ～\nリラックスが大事だし。"
10005-150 = "へぇ～誕生日なの？先生にも\n誕生日があったんだ～？"
10005-160 = "あはは、冗談だよ、\nもちろんあるよね。\nおめでとう、先生。"
10005-170 = "うん…？\n私の誕生日？"
10005-180 = "な、なに、\nこのおじさんにそんなの\n気にしなくていいよ。"
10005-190 = "…で、でもありがとう。\nちょっと嬉しい。\nうへへ。"
10005-200 = "またこうして新しい一年が\n始まるんだね。\n今年もよろしくね、先生？"
10005-210 = "うへ～このおじさんは\nこういう日が苦手なんだよ～\nみんなキラキラ浮かれてて…。"
10005-220 = "まあ、たまにはこういうのも\n悪くないけど。"
10005-230 = "ハロウィン、なんて\n別に関係ないけど…。"
10005-240 = "そういえば先生も\nハロウィンパーティーに\n行くの？"
10005-250 = "ん？\n私と一緒に行きたいの？\nうへへ～それは光栄だね～"
10005-270 = "へえ～すごい。\nこんなところ初めて。"
10005-280 = "あれ見て！お魚だ！\nあははは、カワイイ！"
10005-290 = "私一人こんなに楽しんでて\nいいのかな…。"
10005-300 = "余計な心配だって？\n…そうかな？"
10005-2600 = "先生。\nこれでもう一度頑張ってみるから、\nこれからもよろしく～。"
