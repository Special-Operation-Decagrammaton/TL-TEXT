[translation]
10005-20 = "Ah... vamos levar na calma.\nÉ importante ter um pouco de folga."
10005-30 = "Sim, é um bom lugar.\nEu gostei."
10005-40 = "Onde será que tem um lugar\nperfeito para tirar uma soneca?"
10005-50 = "Na calma, tudo na calma..."
10005-60 = "Sim,\nnão é nada mal."
10005-70 = "Hmm~\nNão é bom?"
10005-80 = "Que bom que veio, Sensei.\nVocê continua parecendo bem ocupado, hein?"
10005-90 = "Ah, bem-vindo.\nTem um monte de trabalho acumulado por aqui."
10005-100 = "Aqui é fresco e agradável."
10005-110 = "Bom trabalho com tudo,\nSensei."
10005-120 = "Eu sou necessária? \nHmm, obrigado pelo elogio."
10005-130 = "Hã? Não foi um elogio? \nAh, u-uh, entendi...\n...Ah, obrigado."
10005-140 = "Não precisa ficar tão\ntenso assim.\nRelaxar é importante."
10005-150 = "Hmm? É seu aniversário? \nAté o Sensei tem aniversário?"
10005-160 = "Ahaha, brincadeira.\nClaro que você tem.\nParabéns, Sensei."
10005-170 = "Sim...? \nO meu aniversário?"
10005-180 = "O-o que é isso?\nNão precisa se preocupar com\nessas coisas para um tio como eu."
10005-190 = "...M-mas obrigado.\nFico um pouco feliz.\nUhehe."
10005-200 = "Então mais um ano\ncomeça assim, né.\nConto com você este ano também, Sensei?"
10005-210 = "Uhe~ esse tio aqui\nnão é muito fã desses dias.\nTodo mundo fica tão animado e brilhante..."
10005-220 = "Bem, de vez em quando,\nnão é tão ruim assim."
10005-230 = "Halloween, né?\nNão que isso tenha algo a ver comigo..."
10005-240 = "Falando nisso, você também\nvai para a festa de\nHalloween, Sensei?"
10005-250 = "Hm? \nQuer ir comigo?\nUhehe~ que honra."
10005-270 = "Uau, incrível.\nNunca estive em um lugar assim."
10005-280 = "Olha aquilo! São peixes!\nAhahaha, que fofos!"
10005-290 = "Será que tudo bem eu estar\nse divertindo tanto sozinha..."
10005-300 = "É uma preocupação desnecessária? \n...Será?"
10005-2600 = "Sensei.\nVou tentar dar o meu melhor mais uma vez, então,\ncontinue contando comigo daqui para frente."
