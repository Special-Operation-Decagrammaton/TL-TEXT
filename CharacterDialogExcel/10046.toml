[translation]
10046-10 = "ブルーアーカイブー！"
10046-20 = "主殿！夏です、海です、イズナです！\nイズナと一緒に、たくさん遊んでくれますよね！？\nニンニン！"
10046-30 = "次は何をして\n遊びましょう？\nスイカ割りでしょうか？\n水鉄砲でしょうか？\nイズナ、どれも楽しみです！"
10046-40 = "イズナイズナ～\nコンココン♪"
10046-50 = "部長とツクヨ殿は、\n今頃何を\nしてるんでしょう？"
10046-60 = "イズナ流忍法・\n夏バージョンが\n完成しましたが\n次は冬バージョンも\n考えておかないとですね…"
10046-70 = "エアコンってすごいです\nね！夏でもこんなに涼し\nいとは……！も、もちろ\nん！忍者はこのくらい\n耐えられますが！"
10046-80 = "えへへっ！\nおかえりなさい、主殿！"
10046-90 = "この夏もイズナは\n主殿をお守りしますね！\nニンニン！"
10046-100 = "主殿！イズナ、\nお待ちしておりました！\n今日は何をして遊びましょう？"
10046-110 = "こんな暑い日でも、\n主殿はお仕事を\nされているんですね…！"
10046-120 = "それでは不肖イズナ！\nおそばで応援しております！"
10046-130 = "う～ん、イズナが\n主殿のためにできること…"
10046-140 = "あ、イズナの忍術で\n暑さを吹き飛ばすのは\nいかがでしょう！"
10046-150 = "忍法！そよ風の術！！\nふ～、ふ～っ！"
10046-160 = "スイカ割り、砂のお城作り、\nそして何と言ってもかき氷！"
10046-170 = "イズナ、この夏に主殿と\n楽しみたいことが\nいっぱいです！"
10046-180 = "忍術図鑑で見たのですが、\n海での事故に備えて\n「人工呼吸の術」を\n覚えておくといいらしいのです！"
10046-190 = "というわけで主殿、\n「人工呼吸の術」の習得を\n手伝っていただけませんか？"
10046-200 = "…あ、今は\nちょっと難しいのですか！"
10046-210 = "分かりました！\nそれではイズナ、\nここでお待ちしています！"
10046-220 = "今度は、部長とツクヨ殿\nそして、主殿とみんなで\n海に遊びに行きたいです！"
10046-230 = "お誕生日\nおめでとうございます、主殿！"
10046-240 = "今日は特別な日ですから、\n全てイズナにお任せください！"
10046-250 = "夏の思い出に\n負けないくらい、\n素敵な日にしてみせます！"
10046-260 = "…え？はい！\n承知しました。"
10046-270 = "それではイズナ、\nまずは全力で主殿の\nそばに座っていますね！\nニンニン！"
10046-280 = "そうでした！\n今日はイズナの\n誕生日でした！"
10046-290 = "えへへっ、\n覚えててくださって\nありがとうございます！"
10046-300 = "主殿が\n祝ってくださるだけで、\n心の中がとっても\n暖かくなるんです！"
10046-310 = "…イズナは幸せ者です。\n本当に、\nありがとうございます！"
10046-320 = "あけまして\nおめでとうございます！"
10046-330 = "主殿と一緒にまた新年を\n迎えられるなんて、\nイズナ感激です！"
10046-340 = "今度の夏も、その次も！\nイズナと一緒に\nたくさん遊びましょう！"
10046-350 = "クリスマスですよ！主殿！\n今日という日を主殿と\n一緒に過ごせるなんて…"
10046-360 = "イズナにとって今日は、\nとても特別な\n日になりそうです！"
10046-370 = "その…主殿はどうですか？"
10046-380 = "…そうですか、\nえへへ、嬉しいですっ。"
10046-390 = "ハロウィーンですね、主殿！\nこの格好も、\n仮装に見えますでしょうか？"
10046-400 = "であれば…主殿、\nトリックオアトリートです！"
10046-420 = "（どうしてでしょうか…\n主殿が、水泳を教えて\nくれると言った時から…）"
10046-430 = "（イズナの心臓、\nすごく…\nドキドキしています…)"
10046-440 = "（先ほど主殿が\n握ってくれた、\nイズナの手…"
10046-450 = "他にも主殿に\n触れられた場所が、\nなんだか少し熱くて…)"
10046-460 = "あの、主殿。\n先ほどはその、少し\nバタバタしてしまいましたが…。"
10046-470 = "今日一日…\nイズナはすごく楽しくて、\n幸せでした！"
10046-480 = "ですから、その…\n何と言いますかえっと…！"
10046-490 = "少しだけ、我儘を\n言ってもよろしければ…"
10046-500 = "今度また…もう一度\n泳ぎ方を、教えて\nいただけないでしょうか？"
10046-510 = "えへへっ…はい、\nありがとうございます！"
10046-520 = "イズナのこと、これからも\nよろしくお願いしますね！\n主殿！"
10046-2600 = "主殿が手ずから用意してくださった…\nイズナのための夏用忍具…！\n嬉しいです、主殿！イズナ、\nこれからも主殿の期待に応えるべく、\n全力を尽くしますね！えへへっ！"
