[translation]
10046-10 = "Blue Archive!"
10046-20 = "Mestre! É verão, é praia, é a Izuna! Você vai brincar bastante comigo, não vai!? Nin-nin!"
10046-30 = "O que vamos brincar agora? Quebra de melancia? Pistola d'água? Izuna está animada para qualquer uma!"
10046-40 = "Izuna-Izuna~ Kon-ko-kon♪"
10046-50 = "O que será que a Chefe e a Tsukuyo estão fazendo agora?"
10046-60 = "A versão de verão do Ninjutsu estilo Izuna está pronta, mas preciso pensar na versão de inverno também..."
10046-70 = "O ar-condicionado é incrível! Quem diria que ficaria tão fresco mesmo no verão...! B-bem, é claro! Ninjas conseguem aguentar isso!"
10046-80 = "Ehehe! Bem-vindo de volta, Mestre!"
10046-90 = "Neste verão também, a Izuna vai proteger você, Mestre! Nin-nin!"
10046-100 = "Mestre! A Izuna estava esperando por você! O que vamos brincar hoje?"
10046-110 = "Mesmo num dia tão quente, você continua trabalhando, Mestre...!"
10046-120 = "Então, eu, a humilde Izuna, estarei aqui ao seu lado para te apoiar!"
10046-130 = "Hmm, o que será que a Izuna pode fazer pelo Mestre..."
10046-140 = "Ah, que tal se eu usar meu ninjutsu para espantar esse calor!"
10046-150 = "Ninpou! Técnica da Brisa Suave!! Fu~, fu~!"
10046-160 = "Quebra de melancia, castelos de areia e, acima de tudo, raspadinha!"
10046-170 = "A Izuna tem tantas coisas que quer aproveitar com você neste verão, Mestre!"
10046-180 = "Vi no meu livro de ninjutsu que, para prevenir acidentes no mar, é bom aprender a 'Técnica da Respiração Artificial'!"
10046-190 = "Sendo assim, Mestre, você poderia me ajudar a aprender a 'Técnica da Respiração Artificial'?"
10046-200 = "...Ah, agora está um pouco difícil, é?"
10046-210 = "Entendido! Então a Izuna vai ficar aqui esperando!"
10046-220 = "Da próxima vez, quero ir à praia com a Chefe, a Tsukuyo e todos vocês, Mestre!"
10046-230 = "Feliz aniversário, Mestre!"
10046-240 = "Como hoje é um dia especial, deixe tudo com a Izuna!"
10046-250 = "Vou fazer deste um dia tão maravilhoso que não perderá para nenhuma lembrança de verão!"
10046-260 = "...Eh? Sim! Entendido."
10046-270 = "Então, a Izuna vai começar sentando bem ao seu lado com toda a energia! Nin-nin!"
10046-280 = "É verdade! Hoje é o aniversário da Izuna!"
10046-290 = "Ehehe, obrigada por lembrar!"
10046-300 = "Só de você me desejar feliz aniversário, meu coração já fica muito quentinho!"
10046-310 = "...A Izuna é uma pessoa muito sortuda. Muito obrigada mesmo!"
10046-320 = "Feliz Ano Novo!"
10046-330 = "A Izuna está muito emocionada por poder passar mais um ano novo ao seu lado, Mestre!"
10046-340 = "No próximo verão, e no outro também! Vamos brincar muito juntos!"
10046-350 = "É Natal, Mestre! Poder passar este dia com você..."
10046-360 = "Para a Izuna, hoje vai ser um dia muito especial!"
10046-370 = "E... como você se sente, Mestre?"
10046-380 = "...É mesmo? Ehehe, fico feliz."
10046-390 = "É Halloween, Mestre! Será que este visual conta como uma fantasia?"
10046-400 = "Se for assim... Mestre, doces ou travessuras!"
10046-420 = "(Por que será... desde que o Mestre disse que ia me ensinar a nadar...)"
10046-430 = "(O coração da Izuna está... batendo tão forte...)"
10046-440 = "(A mão da Izuna, que o Mestre segurou agorinha...)"
10046-450 = "(E os outros lugares onde você me tocou, estão um pouco quentes...)"
10046-460 = "Ei, Mestre. Sobre agorinha, eu acabei ficando um pouco atrapalhada..."
10046-470 = "O dia de hoje... foi muito divertido e eu me senti muito feliz, Izuna!"
10046-480 = "Por isso, bem... como posso dizer...!"
10046-490 = "Se eu puder ser um pouquinho egoísta..."
10046-500 = "Da próxima vez... você poderia me ensinar a nadar mais uma vez?"
10046-510 = "Ehehe... sim, muito obrigada!"
10046-520 = "Continue contando com a Izuna daqui para frente, [log=master]Mestre[/log]!"
10046-2600 = "Algo preparado pelas próprias mãos do Mestre... um equipamento ninja de verão para a Izuna...! Estou tão feliz, Mestre! A Izuna dará o seu melhor para continuar correspondendo às suas expectativas! Ehehe!"
