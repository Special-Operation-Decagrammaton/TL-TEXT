[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10046-10 = "Blue Archive~!"
10046-20 = "Meu Mestre! É verão, é o mar, é a Izuna!\nVocê vai brincar bastante com a Izuna, não vai!?\nNin-nin!"
10046-30 = "O que vamos fazer\nagora?\nQuebrar melancia?\nBrincar com arminhas de água?\nA Izuna está ansiosa por tudo!"
10046-40 = "Izuna, Izuna~\nKon-kokon♪"
10046-50 = "A Presidente e a Senhorita Tsukuyo...\no que será que elas\nestão fazendo agora?"
10046-60 = "Eu aperfeiçoei a\nArte Ninja do Estilo Izuna\nversão de verão,\nmas acho que vou precisar pensar\nnuma versão de inverno também..."
10046-70 = "O ar condicionado é incrível, né!\nAté no verão ele nos deixa\nbem fresquinhos...!\nC-Claro! Como ninja, eu consigo\naguentar perfeitamente o calor!"
10046-80 = "Ehehe!\nBem-vindo de volta, Meu Mestre!"
10046-90 = "Neste verão, a Izuna também vai proteger\no Meu Mestre de todos os perigos!\nNin-nin!"
10046-100 = "Meu Mestre! A Izuna\nestava te esperando!\nO que vamos brincar de fazer hoje?"
10046-110 = "Mesmo em um dia tão\nquente, o Meu Mestre\nainda está trabalhando firme...!"
10046-120 = "Então, a humilde Izuna!\nVou ficar bem pertinho torcendo por você!"
10046-130 = "Hmmm, o que a Izuna pode\nfazer pelo Meu Mestre..."
10046-140 = "Ah, o que acha de eu usar a\nminha arte ninja para afastar\nesse calorzão todo!?"
10046-150 = "Arte Ninja! Jutsu da Brisa Suave!!\nFuu, fuuu~!"
10046-160 = "Quebrar melancia, fazer castelos de areia,\ne claro, comer uma raspadinha!"
10046-170 = "A Izuna tem um monte\nde coisas que quer aproveitar\ncom o Meu Mestre neste verão!"
10046-180 = "Eu vi em um livro ilustrado de ninjutsu que,\npara se preparar para acidentes no mar,\né bom treinar a\n'Arte da Respiração Artificial'!"
10046-190 = "Sendo assim, Meu Mestre...\nvocê não quer me ajudar a dominar a\n'Arte da Respiração Artificial'?"
10046-200 = "...Ah, agora você está\num pouco ocupado!?"
10046-210 = "Entendido!\nEntão a Izuna vai ficar\nte esperando bem aqui!"
10046-220 = "Da próxima vez, eu quero ir\nbrincar no mar com a Presidente,\na Senhorita Tsukuyo e o Meu Mestre juntos!"
10046-230 = "Feliz Aniversário,\nMeu Mestre!"
10046-240 = "Como hoje é um dia todo especial,\npor favor, deixe tudo nas mãos da Izuna!"
10046-250 = "Vou fazer de hoje um dia\ntão incrível que não vai\nperder para as nossas memórias de verão!"
10046-260 = "...Hã? Sim!\nEntendido."
10046-270 = "Então, a Izuna vai ficar\nsentadinha bem ao lado do\nMeu Mestre com todo o afinco!\nNin-nin!"
10046-280 = "Ah, é mesmo!\nHoje era o dia do\naniversário da Izuna!"
10046-290 = "Ehehe,\nmuito obrigada por ter\nse lembrado de mim!"
10046-300 = "Só de receber os parabéns\ndo Meu Mestre, o meu coração\njá fica quentinho e cheio de alegria!"
10046-310 = "...A Izuna é uma garota de muita sorte.\nMuito, muito\nobrigada!"
10046-320 = "Feliz\nAno Novo!"
10046-330 = "Poder celebrar o começo de mais um\nano juntinho do Meu Mestre...\na Izuna está profundamente emocionada!"
10046-340 = "Neste próximo verão, e no outro!\nVamos brincar bastante juntos, Meu Mestre!"
10046-350 = "É Natal! Meu Mestre!\nPoder passar o dia de hoje\njuntinho com você..."
10046-360 = "Sinto que, para a Izuna, hoje será\num dia incrivelmente\nespecial!"
10046-370 = "O... o que o Meu Mestre acha?"
10046-380 = "...É mesmo?\nEhehe, estou tãão feliz."
10046-390 = "É Halloween, Meu Mestre!\nSerá que essa minha roupinha\ntambém serve como uma fantasia?"
10046-400 = "Sendo assim... Meu Mestre,\nGostosuras ou Travessuras!"
10046-420 = "(Por que será que...\ndesde que o Meu Mestre disse que iria me\nensinar a nadar...)"
10046-430 = "(O coração da Izuna...\nestá batendo de forma\ntão forte e rápida...)"
10046-440 = "(A mão que o Meu Mestre\nsegurou com tanta gentileza mais cedo..."
10046-450 = "E os outros lugares em que o\nMeu Mestre me tocou para ensinar...\nainda estão um pouco quentes...)"
10046-460 = "Ahn, Meu Mestre.\nMe desculpe se eu fiquei um\npouco atrapalhada e agitada mais cedo..."
10046-470 = "Hoje o dia todo...\na Izuna se divertiu muito, e\nfoi uma grande felicidade!"
10046-480 = "Por isso, sabe...\nComo eu poderia dizer... er...!"
10046-490 = "Se eu puder ser só um pouquinho\negoísta e pedir um favor..."
10046-500 = "Você poderia... me ensinar a nadar\nde novo mais uma vez...?"
10046-510 = "Ehehe... Sim,\nmuito, muito obrigada!"
10046-520 = "Por favor, continue cuidando da Izuna\ndaqui em diante!\nMeu Mestre!"
10046-2600 = "O traje ninja de verão\nque o Meu Mestre preparou especialmente pra mim...!\nEstou tão feliz, Meu Mestre! A Izuna\nvai continuar dando tudo de si para atender a todas\nas suas expectativas! Ehehe!"