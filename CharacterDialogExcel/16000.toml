[translation]
16000-20 = "Hum, eu deveria mesmo ter vindo? Se achar que estou atrapalhando, p-por favor, me avise a qualquer momento..."
16000-30 = "Onde... eu posso me esconder?"
16000-40 = "Tudo bem eu ficar aqui?"
16000-50 = "Não gosto de lugares cheios... Quero me esconder..."
16000-60 = "A-ah... hehe... H-há algo em que eu possa ajudar?"
16000-70 = "P-professor. O-obrigada... N-não! Me desculpe!"
16000-80 = "A-ah... Você me chamou? Não deve ter sido algum engano?"
16000-90 = "Será que alguém como eu deveria estar aqui...?"
16000-100 = "Sim? Você precisa de mim?"
16000-110 = "Eh, uuu, n-não é para tanto..."
16000-120 = "Vou dar o meu melhor para ser útil ao professor..."
16000-130 = "...Muito obrigada, professor."
16000-140 = "Sim? Para eu não ficar tão nervosa? V-você percebeu?!"
16000-150 = "(Quero morrer, quero morrer, quero morrer, quero morrer, quero morrer, quero morrer)"
16000-160 = "P-parabéns pelo seu aniversário!"
16000-170 = "C-claro, acho que alguém como eu te desejar parabéns só deve ser estranho...!"
16000-180 = "D-desculpe por estar viva!"
16000-190 = "Sim? P-parabéns, é isso?"
16000-200 = "A-ah, feliz ano novo!"
16000-210 = "Este ano, junto com o professor... v-vamos apagar tudo, né?"
16000-220 = "Passar o Natal deste ano com o professor... Estou feliz."
16000-230 = "C-claro, não sei se tenho esse direito, mas...!"
16000-240 = "Ah. Hoje era Halloween, né?"
16000-250 = "Um monte de gente fantasiada de fantasma veio correndo na minha direção, então eu acabei atirando neles..."
16000-260 = "...Me desculpe."
16000-280 = "Ah, eh? Eh...!? P-por que, eh!?"
16000-290 = "P-por que...!? Por que o professor está aqui...!?"
16000-300 = "S-será que cometi outro erro terrível...!?"
16000-310 = "Ah, s-será que eu passei o local errado...!?"
16000-320 = "Ah, eh, bem, aqui é, tipo... como posso dizer..."
16000-330 = "É que, aqui é onde eu cuido de ervas daninhas... e coisas do tipo..."
16000-340 = "D-desculpe, professor, por mais um erro meu... trazer uma pessoa tão importante... para um lugar desses..."
16000-350 = "Eh, ah... S-será que eu acabei de dizer... a-a-alguma coisa... terrível...!?"
16000-360 = "(Q-quero morrer, quero morrer, quero morrer, quero morrer, quero morrer, quero morrer, quero morrer, preciso morrer...!)"
16000-2600 = "As coisas que o professor odeia... eu vou apagar todas!"
