[translation]
16000-20 = "あの、私が来てもよかったんでしょうか？\n邪魔だと思いましたら、\nい、いつでも仰ってください…。"
16000-30 = "隠れる場所は\nどこに…。"
16000-40 = "ここにいても\nいいんでしょうか。"
16000-50 = "人が多い所は\n苦手…。\n隠れたい…。"
16000-60 = "あ、あの…。\nえへへ…わ、私が\n手伝うことありますか？"
16000-70 = "せ、先生。\nあ、りが…とうござい…\nい、いえ！すみません！"
16000-80 = "あ、あの…。\n私のこと呼びましたか？\n何かの勘違いではないですか？"
16000-90 = "私なんかがここにいても\nいいんでしょうか…。"
16000-100 = "はい？私が必要ですか？"
16000-110 = "え、うう、そ、そんな…。"
16000-120 = "先生の役に立てるように\n全力を尽くしますから…。"
16000-130 = "…ありがとうございます。\n先生。"
16000-140 = "はい？そんなに\n緊張しないで、ですか？\nバ、バレてましたか？！"
16000-150 = "（死にたい死にたい死にたい\n死にたい死にたい死にたい）"
16000-160 = "お、お誕生日\nおめでとう\nございます！"
16000-170 = "も、もちろん、私なんかが\nお祝いしたところで気持ち悪い\nだけだと思いますが…！"
16000-180 = "い、生きててすみません！"
16000-190 = "はい？\nお、おめでとう、ですか？"
16000-200 = "あ、明けまして\nおめでとうございます！"
16000-210 = "今年も、先生と一緒に…\nぜ、全部消し\nちゃいましょうねっ。"
16000-220 = "今年のクリスマスも、\n先生と一緒で…。\n嬉しいです。"
16000-230 = "も、もちろん、私に\nそんな資格があるかどうか\nわかりませんが…！"
16000-240 = "ああ。\n今日ってハロウィーン\nでしたか。"
16000-250 = "急にお化けコスプレの人達が\n群がって来たから\n撃っちゃったんですけど…。"
16000-260 = "…すみません。"
16000-280 = "あ、えっ？えっ…！？\nな、なななんで、えっ！？"
16000-290 = "ど、どうして…！？\nどうして先生が、こ、ここに\nいらっしゃるのですか…！？"
16000-300 = "わ、私また何か\nとんでもないミスを…！？"
16000-310 = "あ、も、もしかして\n伝える場所を間違えて…！？"
16000-320 = "あ、え、えっとですね、\nここはその…\n何と言いますか…。"
16000-330 = "その、私が雑草とか…\nそういうのを\n育てている場所、でして…。"
16000-340 = "す、すみません先生、\nまた私のミスで…\n大切な方を、\nこんなところに…。"
16000-350 = "え、あ…\nわ、私もしかして今、\nな、ななな何か、\n凄いことを口に…っ！？"
16000-360 = "（しっ、\n死にたい死にたい死にたい\n死にたい死にたい死にたい\n死にたい死なないと…！）"
16000-2600 = "先生が嫌いなものは、\n私が……全部消しちゃいます！"
