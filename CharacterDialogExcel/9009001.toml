[translation]#[Texto Final. - Filipe 15/07.] - Sora-chan.
9009001-10 = "B-b-bem-vindo!\n…Sensei!"
9009001-20 = "Que tédio…\n…Ei, uau!?\nD-desde quando você está aí?!"
9009001-30 = "24 horas! Pode vir me visitar a qualquer momento!\nÉ como se fosse uma loja de conveniência!"
9009001-40 = "Para as missões… bem,\nacho que é preciso uma\npreparação adequada!"
9009001-50 = "Por isso… é melhor comprar bastante!\nOs produtos da minha loja valem muito a pena, eu garanto!"
9009001-60 = "A-ah, eu fico sem jeito\nquando você me encara\ndesse jeito…!"
9009001-70 = "Hya! N-não toque na\nminha testa!"
9009001-80 = "O cartão de adulto…\nserá que eu poderia dar uma olhadinha?"
9009001-90 = "M-mas… a minha loja!\nTem preços muito justos!"
9009001-100 = "Muito obrigada!"
9009001-110 = "Volte sempre, Sensei."