[translation]
10105-10 = "Blue Archive!"
10105-20 = "Eu não tenho muita experiência como idol, mas... farei o meu melhor. Conto com você, Sensei!"
10105-30 = "Este é um lugar\nmuito confortável."
10105-40 = "Sinto como se estivessem\nme observando...?"
10105-50 = "O que faremos\na seguir...?"
10105-60 = "Há algo em que eu\npossa ajudar?"
10105-70 = "Sessão de autógrafos...? \nCheki...?"
10105-80 = "Eu estava esperando por você, Sensei. Estou pronta."
10105-90 = "Então, por favor, ouça. A primeira música é esta."
10105-100 = "Se é o que você deseja, Sensei... seja no palco ou em qualquer outro lugar... eu cantarei para você."
10105-110 = "Se a minha voz puder fazer você feliz, Sensei... então não há nada mais que eu possa desejar."
10105-120 = "Ah, um aperto de mão? Sim, claro."
10105-130 = "Ah, ahaha...! Se-Sensei, isso... faz cócegas...!"
10105-140 = "Ora... se você vai fazer isso, então eu também...! Ei!"
10105-150 = "Feliz aniversário, Sensei. Dedico esta música a você."
10105-160 = "Meu aniversário..."
10105-170 = "Eu nunca me acostumo com o dia em que sou o centro das atenções."
10105-180 = "Mas, ouvir isso de você me deixa muito feliz. Obrigada, Sensei."
10105-190 = "Feliz Ano Novo, Sensei."
10105-200 = "Espero que este ano eu possa levar minha música..."
10105-210 = "a ainda mais pessoas. Rezo para que seja um ano repleto de felicidade."
10105-220 = "A noite sagrada... é o dia em que levamos hinos a todos."
10105-230 = "Sim, é o traje perfeito para cantar."
10105-240 = "I-isso não é uma fantasia, mas..."
10105-250 = "Mas... se você gostou, Sensei... então eu continuarei usando."
10105-270 = "Sensei, você estava me esperando!"
10105-280 = "Eu não acredito que você ficou aqui me esperando esse tempo todo..."
10105-290 = "Então... como foi o palco?"
10105-300 = "Imagino que não tenha dado para ver muito bem lá de trás..."
10105-310 = "Mas, como você esteve me observando o tempo todo..."
10105-320 = "Acho que tudo bem mesmo lá de trás..."
10105-330 = "Então... como foi a performance?"
10105-340 = "Eu consegui... ser uma \"idol\" de verdade?"
10105-350 = "...!!"
10105-360 = "...Muito obrigada, Sensei...!"
10105-370 = "...Hehe."
10105-2600 = "Sinto que agora posso dizer qualquer coisa para você, Sensei. Por isso... ouça, mas tente esquecer depois. ...Por favor, fique ao meu lado para sempre. É uma promessa."
