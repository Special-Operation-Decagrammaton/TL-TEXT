[translation]
26009-10 = "ブルー……アーカイブ……"
26009-20 = "花岡ユズ……です。\n色々あって……今はこの格好をしています。\nよろしく、お願いします……"
26009-30 = "今のわたしは\nメイドだし……掃除でも\nしてみようかな……。"
26009-40 = "ゲームを\n作るメイド……\n新しいかも？"
26009-50 = "うう……どこかに\n隠れたい……。"
26009-60 = "段ボールは、 潜入の\n必須アイテムだけど\n……。"
26009-70 = "おかえりなさい、\nご主人様。\nうう、やっぱり\n恥ずかしい……。"
26009-80 = "ひゃっ！？だ、誰！？"
26009-90 = "あ、先生でしたか、\nよかった……おかえりなさい。"
26009-100 = "先生、お待ちしてました……"
26009-110 = "いらっしゃってくれて\n嬉しいです。"
26009-120 = "掃除はあまり\n得意ではないですが……"
26009-130 = "先生の、お願いなら……"
26009-140 = "え、似合ってる？"
26009-150 = "もう……\nからかわないでください！"
26009-160 = "……ほ、本音と言われたら、\nそれはそれで……。"
26009-170 = "どうして猫耳は\nこんなにメイド服に合うのかな？"
26009-180 = "猫ってメイドっていうより\nご主人様側な気がするのに……"
26009-190 = "これは……\nゲームの参考になるかも。"
26009-200 = "この服、フリルが多くて……\n恥ずかしい……"
26009-210 = "お、お誕生日\nおめでとうございます、\nご主人様。"
26009-220 = "な、なんちゃって……\nメイドなので。"
26009-230 = "誕生日、\n覚えててくださったんですか？\nありがとうございます。"
26009-240 = "その……\n特に何もしなくて、大丈夫です。"
26009-250 = "先生……いえ、\nご主人様と一緒にいるのが\n一番の幸せですから。"
26009-260 = "と、とりあえず\nそんな設定です！"
26009-270 = "明けまして\nおめでとうございます、\nご主人様。"
26009-280 = "……や、やっぱり先生と\nお呼びした方がいいでしょうか？"
26009-290 = "サンタさんは煙突を\n通って来るらしいです……"
26009-300 = "ゲーム開発部に\n煙突はありませんが……"
26009-310 = "機会があれば\n一度入ってみたいです。"
26009-320 = "こじんまりしてて、\n居心地よさそう……"
26009-330 = "ハロウィーン……"
26009-340 = "仮装した人が\n街に溢れるお祭りですね。"
26009-350 = "わたしには、\nやっぱり無縁といいますか……"
26009-360 = "ゲームのイベントなら……\nよくやりますけど。"
26009-380 = "えっと、これは……"
26009-390 = "寝ている間に、\n入ってきちゃったみたいで……"
26009-400 = "その……休憩室には\n他の方もいますから……"
26009-410 = "座っていると、\n話しかけられちゃって……。"
26009-420 = "「リボンはどこで買ったの？」\nとか、"
26009-430 = "「お休みの日には何してるの？」\nとか……"
26009-440 = "いろいろ質問されるので、\n思わず逃げてしまって……"
26009-450 = "見つけたのが、\nここだったんです……。"
26009-460 = "まさか……\n猫の休憩所だったなんて。"
26009-470 = "ひゃっ！？\nちょ、ちょっと待ってください！"
26009-480 = "出ます！\nい、今出ますから……\nくすぐったい！"
26009-2600 = "こ、ここまでして\nもらえるなんて……そんな……\nすごく、嬉しいです。\n……わたし、もっと頑張りますね。\n……見ていてください、先生！"
