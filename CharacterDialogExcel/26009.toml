[translation]
26009-10 = "Blue……Archive……"
26009-20 = "Hanaoka Yuzu……é o meu nome.\nPor vários motivos……estou vestida assim agora.\nConto com você, por favor……"
26009-30 = "Já que agora sou\numa empregada……talvez eu deva\ntentar limpar alguma coisa……."
26009-40 = "Uma empregada que\ncria jogos……\nSerá que é uma novidade?"
26009-50 = "Uuu……eu queria\nme esconder em algum lugar……."
26009-60 = "Caixas de papelão são itens\nessenciais para infiltração,\nmas……."
26009-70 = "Bem-vindo de volta,\nmeu mestre.\nUuu, é mesmo\nmuito vergonhoso……."
26009-80 = "Hya!? Q-quem é!?"
26009-90 = "Ah, era você, Sensei.\nQue bom……bem-vindo de volta."
26009-100 = "Sensei, eu estava esperando por você……"
26009-110 = "Fico feliz que\ntenha vindo."
26009-120 = "Eu não sou muito boa\nem limpeza, mas……"
26009-130 = "Se for um pedido seu,\nSensei……"
26009-140 = "Eh, combina comigo?"
26009-150 = "Ah, pare……\nNão zombe de mim!"
26009-160 = "……S-se você diz que é o que sente de verdade,\nentão isso é……."
26009-170 = "Por que será que orelhas de gato\ncombinam tanto com roupas de empregada?"
26009-180 = "Eu sinto que gatos, mais do que empregadas,\nseriam o próprio mestre……"
26009-190 = "Isso……\npode servir de referência para um jogo."
26009-200 = "Essa roupa tem muitos babados……\nque vergonha……"
26009-210 = "Fe-feliz\naniversário,\nmeu mestre."
26009-220 = "B-brincadeirinha……\né porque sou uma empregada."
26009-230 = "Você se lembrou\ndo meu aniversário?\nMuito obrigada."
26009-240 = "Sobre isso……\nnão precisa fazer nada em especial, está tudo bem."
26009-250 = "Sensei…… não, digo,\nestar com você, meu mestre,\né a minha maior felicidade."
26009-260 = "P-por enquanto,\nessa é a premissa!"
26009-270 = "Feliz\nAno Novo,\nmeu mestre."
26009-280 = "……É, talvez seja melhor\nchamar você de Sensei mesmo?"
26009-290 = "Dizem que o Papai Noel\nentra pelas chaminés……"
26009-300 = "O Departamento de Desenvolvimento de Jogos\nnão tem chaminé, mas……"
26009-310 = "Se houver uma oportunidade,\neu gostaria de tentar entrar em uma."
26009-320 = "Parece ser apertadinho e\naconchegante……"
26009-330 = "Halloween……"
26009-340 = "É aquele festival onde as pessoas\nenchem as ruas fantasiadas, né."
26009-350 = "Para mim, acho que\né algo meio distante……"
26009-360 = "Se for um evento de jogo……\naí eu participo bastante."
26009-380 = "Bem, isso é……"
26009-390 = "Parece que eu entrei aqui\nenquanto estava dormindo……"
26009-400 = "É que…… na sala de descanso\ntambém tem outras pessoas……"
26009-410 = "Se eu ficar sentada lá,\nelas começam a puxar assunto……."
26009-420 = "Como \"Onde você comprou esse laço?\"\nou,"
26009-430 = "\"O que você faz nos seus dias de folga?\"\nou……"
26009-440 = "Elas me fazem tantas perguntas\nque eu acabo fugindo sem querer……"
26009-450 = "E o lugar que eu encontrei\nfoi este aqui……."
26009-460 = "Quem diria……\nque era um lugar de descanso para gatos."
26009-470 = "Hya!?\nE-espere um pouco!"
26009-480 = "Eu já vou sair!\nE-estou saindo agora……\nfaz cócegas!"
26009-2600 = "F-fazer tudo isso por mim…… não precisava……\nEstou muito, muito feliz.\n……Eu vou me esforçar ainda mais.\n……Continue olhando por mim, Sensei!"
