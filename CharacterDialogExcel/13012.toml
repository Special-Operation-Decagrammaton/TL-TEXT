[translation]
13012-10 = "Blue Archive!"
13012-20 = "Sou Kirino, da Escola de Polícia Valkyrie!\nTodos, levantem as mãos e\nsigam as instruções desta oficial!"
13012-30 = "Vejamos,\nnão tem nenhum criminoso\nse escondendo\naqui, não é?"
13012-40 = "Esse tipo de coisa é\npermitido de acordo\ncom as regras?"
13012-50 = "Aquela pessoa ali... sinto que\njá a vi em algum lugar...\nSerá que é uma criminosa procurada?"
13012-60 = "Nenhuma anormalidade hoje também!"
13012-70 = "Kivotos está\nem paz\nhoje também, não é!"
13012-80 = "Bem-vindo de volta, Sensei.\nSe estiver tudo bem, eu pretendia sair em patrulha agora mesmo,\ngostaria de vir comigo?"
13012-90 = "Bem-vindo de volta, Sensei.\nNão encontrou nenhuma\npessoa suspeita no caminho até aqui?"
13012-100 = "......? Aconteceu algum\nproblema com\nesta oficial......?"
13012-110 = "Eu quero ajudar mais......\nos alunos de\nKivotos."
13012-120 = "Há muitos restaurantes deliciosos por aqui,\nentão estou sempre ansiosa para vir\nfazer patrulhas e turnos."
13012-130 = "C-Claro que não estou\nmatando trabalho na patrulha!"
13012-140 = "O terceiro aviso de Miranda é...\nQual era mesmo?"
13012-150 = "Feliz aniversário,\nSensei. No entanto, por mais que\nseja o seu aniversário,\nviolar as regras não é permitido, viu?"
13012-160 = "Lembrarem do meu aniversário......\nEstou emocionada, Sensei!"
13012-170 = "Feliz\nAno Novo, Sensei.\nVamos continuar dando o nosso melhor juntos\npela segurança de Kivotos este ano também!"
13012-180 = "Proteger a segurança dos\ncidadãos é um dever sem folgas!"
13012-190 = "Mesmo no Natal\nnão podemos baixar a guarda!"
13012-200 = "Ah, tem alunos andando pela\ncidade com roupas indecentes de novo......!"
13012-220 = "(O-O que eu faço......!\nHm, nn......!\nN-Não sai......!)"
13012-230 = "......Eh? N-Não, não!\nComo alguém que pertence à polícia,\né impossível que esta oficial\ntenha perdido as chaves!"
13012-240 = "E-Então, isto é......"
13012-250 = "U-Um ensaio para um treinamento de fuga!\nPara o caso de ocorrer\numa situação imprevista e eu acabar\nsendo capturada e amarrada......"
13012-260 = "A partir de agora, esta oficial\nmostrará como escapar!"
13012-270 = "Fique tranquilo!\nPara alguém que treinou arduamente\ncomo esta oficial,\nisso é muito fácil!"
13012-280 = "Kuuuuh......!\nFunununununuh......!"
13012-290 = "......Me desculpa.\nPor favor, me ajude,\nSenseeeeei......"
13012-2600 = "Eu vou me dedicar para melhorar\no meu manuseio... o suficiente\npara me tornar digna desta arma...!"