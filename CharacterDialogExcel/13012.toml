[translation]
13012-10 = "ブルーアーカイブ！"
13012-20 = "ヴァルキューレ警察学校のキリノです！\nみなさん、手を上にあげて\n本官の指示に従ってください！"
13012-30 = "どれどれ、\nここに隠れてる\n犯罪者は\nいませんよね？"
13012-40 = "こういうのは、\nルール的に\nセーフなのでしょうか？"
13012-50 = "あの人、なんだか\n見たことあるような……\nもしかして指名手配犯？"
13012-60 = "本日も異常なし！"
13012-70 = "今日も\nキヴォトスは\n平和ですね！"
13012-80 = "お帰りなさい、先生。\nよろしければ、すぐに\nパトロールに出ようと思うの\nですがご一緒にいかがですか？"
13012-90 = "お帰りなさい、先生。\nここに来るまでに\n怪しい人はいませんでしたか？"
13012-100 = "……？本官に、\n何か問題でも\nありましたか……？"
13012-110 = "もっと……\nキヴォトスの生徒たちの\n力になりたいです。"
13012-120 = "この辺りは美味しいお店が\n多くて、パトロールや\n当番で来るのが毎回楽しみです。"
13012-130 = "も、もちろんパトロールを\nサボるわけではありません！"
13012-140 = "ミランダ警告の3つ目って……\nなんでしたっけ？"
13012-150 = "お誕生日おめでとうございます、\n先生。ただし、いくら\n誕生日だからって\nルール違反はダメですよ？"
13012-160 = "私の誕生日を\n覚えていてくださったなんて……\n感激しました、先生！"
13012-170 = "明けまして\nおめでとうございます、先生。\n今年もキヴォトスの治安のために\n一緒に頑張りましょう！"
13012-180 = "市民の安全を\n守ることは年中無休！"
13012-190 = "クリスマスでも\n油断できません！"
13012-200 = "あっ、またみだらな\n格好で街を歩く生徒たちが……！"
13012-220 = "（ど、どうしましょう……！\nふんっ、んっ……！\nは、外れない……！）"
13012-230 = "……え？い、いやいや！\n仮にも警察に属する本官が、\n鍵を失くすわけが\nないではありませんか！"
13012-240 = "で、ですから、これは……。"
13012-250 = "だ、脱出訓練の予行演習です！\n想定外の事態が起きて、\n万が一拘束されてしまった\n時のために……"
13012-260 = "これより本官が、\n脱出の仕方をお見せします！"
13012-270 = "ご安心ください！\n本官のようにしっかり訓練を\n積んだ者であれば、\nこれくらい簡単ですから！"
13012-280 = "くうううっ……！\nふぬぬぬぬぬぬっ……！"
13012-290 = "……ごめんなさい。\n助けてください、\n先生ぇ……。"
13012-2600 = "この銃にふさわしいくらい、\n扱いが上手になれるよう\n精進しますね……！"
