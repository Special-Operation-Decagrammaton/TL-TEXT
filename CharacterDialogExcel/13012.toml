[translation]
13012-10 = "Blue Archive!"
13012-20 = "Aqui é a Kirino, da Escola de Polícia Valkyrie!\nTodos, mãos para o alto e\nsigam as instruções desta oficial!"
13012-30 = "Vejamos...\nNão há nenhum criminoso\nescondido por aqui,\ncorreto?"
13012-40 = "Será que isso aqui\né permitido pelas\nregras?"
13012-50 = "Aquela pessoa, parece que\neu já a vi em algum lugar...\nSerá que é uma procurada?"
13012-60 = "Tudo normal por hoje!"
13012-70 = "Kivotos está\npacífica hoje\ntambém!"
13012-80 = "Bem-vindo de volta, Sensei.\nSe não se importar, eu estava pensando\nem sair para patrulhar agora,\nque tal vir comigo?"
13012-90 = "Bem-vindo de volta, Sensei.\nNo caminho até aqui,\nvocê viu alguém suspeito?"
13012-100 = "...? Aconteceu algum\nproblema comigo,\npor acaso...?"
13012-110 = "Eu quero... ser mais\nútil para as alunas\nde Kivotos."
13012-120 = "Esta área tem muitos restaurantes bons,\nentão sempre fico animada quando venho\npara patrulhar ou ficar de plantão."
13012-130 = "E-eu, é claro que não estou\nmatando aula de patrulha!"
13012-140 = "Qual era mesmo o terceiro\nitem do Aviso de Miranda...?"
13012-150 = "Feliz aniversário, Sensei.\nMas, não importa o quanto seja\nseu aniversário, não pode\nquebrar as regras, entendeu?"
13012-160 = "Você se lembrou do\nmeu aniversário...\nEstou emocionada, Sensei!"
13012-170 = "Feliz Ano Novo,\nSensei. Vamos nos esforçar juntos\npela segurança de Kivotos\neste ano também!"
13012-180 = "Proteger a segurança dos cidadãos\nnão tem folga!"
13012-190 = "Não podemos baixar a guarda\nnem no Natal!"
13012-200 = "Ah, lá estão aquelas alunas andando\npela cidade com roupas indecentes de novo...!"
13012-220 = "(O-o que eu faço...!\nHumph, hnn...!\nN-não sai...!)"
13012-230 = "...Eh? N-não, não é isso!\nComo uma oficial que pertence à polícia,\nnão teria como eu perder\nas chaves, certo?!"
13012-240 = "P-por isso, isso é..."
13012-250 = "É um ensaio para o treinamento\nde fuga! Para o caso de uma situação\nimprevista onde eu acabe sendo\naprisionada por acidente..."
13012-260 = "A partir de agora, vou mostrar\ncomo escapar!"
13012-270 = "Fique tranquilo!\nPara alguém que treinou tanto\nquanto eu, isso é\nmuito fácil!"
13012-280 = "Gnnnngh...!\nFnnnnghhhh...!"
13012-290 = "...Me desculpe.\nPor favor, me ajude,\nSensei..."
13012-2600 = "Vou me esforçar para ser tão boa\nno manuseio quanto esta arma\nmerece...!"
