[translation]
10075-10 = "Blue Archive~"
10075-20 = "Ei! Eu sou a Meru Himeki, da Frente de Libertação do Conhecimento!\nPode me chamar de Meru-ri, ah, esse é meu nome artístico.\nPrazer em te conhecer, Sensei."
10075-30 = "Ideias...\nOnde estão as\nideias...!"
10075-40 = "Espera, espera...\nAquela cena,\nserá que é...?"
10075-50 = "Poxa...\nEu queria ter\nmais habilidade de desenho..."
10075-60 = "Será que não dá para\nminhas mãos serem mais rápidas?\nE, de quebra, meus olhos\ne meu cérebro também!"
10075-70 = "Quando a gente publica\num doujinshi, não usamos\nnossos nomes reais."
10075-80 = "Oh, seja bem-vindo, Sensei!"
10075-90 = "Então, vou começar o trabalho~\nEu vou ficar desenhando aqui!"
10075-100 = "De-mo-ra."
10075-110 = "Desculpa pela demora? \nNão? Eu acabei de chegar, sabia?"
10075-120 = "Hum, hum."
10075-130 = "Sensei, posso trazer\nmeus materiais para cá?"
10075-140 = "Não é que... \nEu pensei em transformar\neste lugar no meu estúdio."
10075-150 = "Já faz um tempo, mas Sensei...\nVocê leva uma vida\nmuito corrida, né..."
10075-160 = "Tanto a arte quanto o conhecimento\nnascem da liberdade."
10075-170 = "Por isso, a partir de agora...\nEu vou desenhar o Sensei livremente!"
10075-180 = "Este é o campo de batalha\ndo Sensei...!"
10075-190 = "Eu sinto... eu sinto...\nA aura de um prazo apertado!"
10075-200 = "Todos os grandes autores de doujinshi\ncomeçaram encarando\numa página em branco..."
10075-210 = "Ou seja, isso significa que eu também\ntenho o potencial para me tornar\numa grande autora de doujinshi!"
10075-220 = "É seu aniversário, né!\nParabéns, Sensei!"
10075-230 = "Hoje, eu vou te dar\num retrato seu\nde presente!"
10075-240 = "Você sabia, Sensei?\nHoje é o meu aniversário...\nO aniversário da Meru Himeki!"
10075-250 = "...Não, não,\nnão significa que vamos sair juntos!\nIsso é muito trabalhoso!"
10075-260 = "Em vez disso...\nQue tal pedirmos uma entrega?"
10075-270 = "Ah, ah...\nO ano virou.\nFeliz ano novo, Sensei."
10075-280 = "Metade de mim quer ir ao templo,\na outra metade não quer sair de casa~"
10075-290 = "Será que não dá para resolver\nessas coisas online?"
10075-300 = "Uma vez, eu pedi de presente de Natal\num doujinshi do meu casal favorito\nfeito por um artista incrível!"
10075-310 = "...Foi o que eu pedi, mas..."
10075-320 = "No fim, cheguei à conclusão de que\na única forma de ver o meu 'moe' perfeito\né desenhando eu mesma."
10075-330 = "Halloween...\nA temporada dos motivos\nde abóbora...!"
10075-340 = "Não tem jeito...\nVamos sair, Sensei!\nÉ hora de coletar referências!"
10075-360 = "Não é como se eu estivesse\nfazendo algo grandioso."
10075-370 = "Não tenho outras coisas que eu queira fazer,\nnem outras habilidades..."
10075-380 = "Por isso, talvez eu só continue\nme dedicando à criação."
10075-390 = "Sabe...\nIsso não é nada mal."
10075-400 = "Estar em um lugar como este...\nE ter esse tipo de conversa\ncom você, Sensei. É bom."
10075-410 = "Porque, veja bem...\nA criação precisa de mudanças, não precisa?"
10075-420 = "E o Sensei é alguém que\ntraz mudanças para mim."
10075-430 = "Uau... \nAcho que acabei de dizer\nalgo embaraçoso."
10075-440 = "Ah, esquece o que eu disse!\nEsquece, esquece! Ahahaha!"
10075-2600 = "Dizem que um bom mestre não culpa seus pincéis, mas as ferramentas ainda são importantes. Então... resumindo, obrigada. Sensei."
