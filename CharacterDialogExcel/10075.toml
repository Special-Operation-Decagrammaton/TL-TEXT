[translation]
10075-10 = "ブルーアーカイブ～"
10075-20 = "やっほー！私は知識解放戦線の姫木メル！\nメルリーって呼んでもいいよ、あ、そっちはHNね。\nよろしく、先生。"
10075-30 = "ネタ……\nネタは\nどこだっ……！"
10075-40 = "まってまって……\nあの光景は、\nもしかして……？"
10075-50 = "やっぱ……\nもっと画力\n欲しいよぉ……。"
10075-60 = "もうちょっと手が\n速くならないかなぁ……\nついでに目と\n頭の回転も！"
10075-70 = "同人誌を\n出すときは、\n本名は使わ\nないんだよ。"
10075-80 = "お、いらっしゃい、先生！"
10075-90 = "んじゃ、お仕事始めちゃって～\n私はそれを描いてるから！"
10075-100 = "お～そ～い～。"
10075-110 = "待たせてごめん？\nいや？今来たばっかだけど？"
10075-120 = "ふむふむ。"
10075-130 = "先生、ここに私の資料、\n持ち込んでもいい？"
10075-140 = "いやその……\n作業部屋にしたいなぁって\n思って。"
10075-150 = "今更だけど先生って……\n多忙な人生を\n送ってるんだね……。"
10075-160 = "芸術も知識も、\nすべて自由から芽生えるもの。"
10075-170 = "だから私は今から……\n自由に先生をスケッチするよっ！"
10075-180 = "ここが、先生の戦場……！"
10075-190 = "感じる……感じるぞ……\n修羅場のオーラをっ！"
10075-200 = "偉大なる同人作家たちは皆、\n最初は真っ白の原稿を\n抱えていたんだ……"
10075-210 = "つまり、私も偉大なる\n同人作家になる素養が\nあるってことだよ！"
10075-220 = "誕生日なんだね！\nおめでとう、先生！"
10075-230 = "今日こそ、\n先生の似顔絵を\nプレゼントするね！"
10075-240 = "先生知ってる？\n今日はこの私……\n姫木メルの誕生日なのだよ！"
10075-250 = "……いやいや、\n一緒に出かけてって\n意味じゃないよ！\nそんなの面倒くさいし！"
10075-260 = "それより……\n出前、頼まない？"
10075-270 = "あ～あ～\n年明けちゃった。\nあけましておめでとう、先生。"
10075-280 = "お参りにいきたい気持ち半分、\n出かけたくない気持ち半分～"
10075-290 = "こういうの、\nオンラインでなんとか\nならないかなぁ～"
10075-300 = "前に、クリスマスプレゼントで\n神絵師の描いた自カプの\n同人誌が欲しい！"
10075-310 = "……ってお願いした\nことがあるんだけどさ、"
10075-320 = "結局自分の最高の萌えは\n自分で描くしかないって\n結論になっちゃったんだよね。"
10075-330 = "ハロウィーン……\nカボチャのモチーフの\nシーズンか……！"
10075-340 = "仕方ない……\n出かけよう先生！\n資料集めの時間だよ！"
10075-360 = "別に私は、\nすごいことをしてる\nわけじゃないよ。"
10075-370 = "他にやりたいことも、\nスキルもないし……。"
10075-380 = "だから私は……\n創作を続けているだけなのかも。"
10075-390 = "なんか……\nこういうのも悪くないね。"
10075-400 = "こういう場所でさ……\nこういう会話を、\n先生とするの。いいかも。"
10075-410 = "だってほら……\n創作には変化が必要じゃん？"
10075-420 = "先生は、私に変化を\nもたらしてくれる人でも\nあるから。"
10075-430 = "うわあー…\n今恥ずかしいこと\n言っちゃったかも。"
10075-440 = "あー今のなし！\n忘れて忘れて！あははは！"
10075-2600 = "弘法筆を選ばずっていうけど\nそれでもツールは大事だからね。\nその……つまり、ありがとってことだよ。\n先生。"
