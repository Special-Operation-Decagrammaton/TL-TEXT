[translation]
20036-10 = "ブルーアーカイブ！"
20036-20 = "「最高の休暇」にするんだから！\n妥協はしないわよ！"
20036-30 = "なんか……\nみんな忙しそうね。"
20036-40 = "水鉄砲で\n遊びたいかも。"
20036-50 = "バーベキュー\nしようかな？"
20036-60 = "……掃除でも\nしよっかな。"
20036-70 = "ふう……気持ち良い。"
20036-80 = "ようこそ、先生！\nここは涼しいわね！"
20036-90 = "遅いよ、先生！\nどれだけ待たせる気なの？"
20036-100 = "やっぱ海って涼しいわね！"
20036-110 = "みんなで遊びにこれて……\nすっごく楽しい。"
20036-120 = "全力で遊んだら\n後悔なんてないんだから！"
20036-130 = "はぁ……疲れた……"
20036-140 = "だ、ダメ！休憩する\n時間がもったいない！"
20036-150 = "先生……その……\nこの水着、どう思う？"
20036-160 = "ハッピーバースデー！\n一緒に遊びましょう！"
20036-170 = "私の誕生日……？"
20036-180 = "そうね……今日1日\nずっと一緒に……！"
20036-190 = "……何しようかしらね？"
20036-200 = "新年の格好も\nあった気がするけど……"
20036-210 = "まぁいっか。\nあけましておめでとう、先生。"
20036-220 = "今年一年、\n私は良い子だったかな……"
20036-230 = "……せ、先生……どう？"
20036-240 = "ハロウィーン！？\n水着は仮装じゃないわよ！？"
20036-250 = "見方によっては\nそうかもしれないけど……！"
20036-270 = "こ、これでもう良くない？\nそろそろ降りようよ……"
20036-280 = "もうやめたいとか、\nそういうんじゃないんだけど……"
20036-290 = "ちょ、ちょっと！！先生！\n何すんのよ！揺れるでしょ！"
20036-300 = "このボート、ひっくり返り\nやすいんだから！！やめて！"
20036-310 = "いや、面白そう\nだからじゃないわよ"
20036-320 = "先生、人で遊ばないで。"
20036-330 = "……はあ。もういいわよ。\n先生はそういう人だったわね。"
20036-340 = "こういう事するって\n予想できてたはずなのに……"
20036-350 = "まぁいいわ。私もちょっと\n思いついたことがあるから。"
20036-360 = "さあ、先生！交代よ！！\n今度は先生の番よ！"
20036-2600 = "こんなに遊んでばっかで良いのかな……\nせ、先生が良いって言ったんだからね！\nちゃんと責任とってよ！？"
