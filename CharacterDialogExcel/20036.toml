[translation]
20036-10 = "Blue Archive!"
20036-20 = "Vou fazer disso as \"melhores férias\"!\nNão vou aceitar nada menos que isso!"
20036-30 = "Parece que...\nTodo mundo está ocupado."
20036-40 = "Talvez eu queira\nbrincar com armas d'água."
20036-50 = "Será que eu deveria\nfazer um churrasco?"
20036-60 = "Talvez eu devesse...\nfazer uma limpeza."
20036-70 = "Ufa... que sensação boa."
20036-80 = "Bem-vindo, Sensei!\nAqui é bem fresquinho, né!"
20036-90 = "Você está atrasado, Sensei!\nQuanto tempo pretendia me fazer esperar?"
20036-100 = "O mar é realmente refrescante!"
20036-110 = "Poder vir brincar com todo mundo...\né muito divertido."
20036-120 = "Se eu brincar com tudo o que tenho,\nnão terei arrependimentos!"
20036-130 = "Ah... estou cansada..."
20036-140 = "N-não! É um desperdício\nde tempo descansar!"
20036-150 = "Sensei... hum... o que\nvocê achou deste traje de banho?"
20036-160 = "Feliz aniversário!\nVamos brincar juntos!"
20036-170 = "Meu aniversário...?"
20036-180 = "É verdade... hoje, o dia todo,\nficaremos juntos...!"
20036-190 = "...O que será que vamos fazer?"
20036-200 = "Acho que também tinha\num traje de Ano Novo..."
20036-210 = "Bem, tanto faz.\nFeliz Ano Novo, Sensei."
20036-220 = "Será que fui uma boa garota\neste último ano...?"
20036-230 = "...S-Sensei... como estou?"
20036-240 = "Halloween!?\nTraje de banho não é fantasia, sabia!?"
20036-250 = "Dependendo do ponto de vista,\npode até ser, mas...!"
20036-270 = "N-não já está bom assim? Vamos\ndescendo logo..."
20036-280 = "Não é que eu queira parar\nou algo do tipo, mas..."
20036-290 = "Ei, ei!! Sensei!\nO que você está fazendo?! Vai balançar!"
20036-300 = "Este barco vira\nfacilmente!! Pare com isso!"
20036-310 = "Não, não é porque\nparece divertido."
20036-320 = "Sensei, não brinque com as pessoas."
20036-330 = "...Ah. Já chega.\nO Sensei sempre foi esse tipo de pessoa, né."
20036-340 = "Eu deveria ter previsto\nque você faria algo assim..."
20036-350 = "Bem, tudo bem. Eu também\nacabei de ter uma ideia."
20036-360 = "Vamos lá, Sensei! Troca de lugar!!\nAgora é a sua vez!"
20036-2600 = "Será que está tudo bem brincar tanto assim...\nB-bem, já que o Sensei disse que está tudo bem, então tá!\nVocê vai ter que assumir a responsabilidade, viu!?"
