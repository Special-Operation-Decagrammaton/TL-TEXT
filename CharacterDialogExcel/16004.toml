[translation]
16004-10 = "Blue Archive!"
16004-20 = "Saudações.\nAh, talvez esta forma de falar seja mais natural.\nMuito prazer!"
16004-30 = "É um lugar muito bom.\nSinto uma sensação de nostalgia!"
16004-40 = "Sensei, eu queria que você\ngostasse mais de okonomiyaki\ndo que de pizza ou panquecas..."
16004-50 = "Uau, que atmosfera boa!"
16004-60 = "Um chá oolong bem gelado é o melhor!\nNão gosto de café nem de refrigerante."
16004-70 = "Saudações."
16004-80 = "Ah, acabei usando um vício de linguagem\nda minha escola anterior sem querer..."
16004-90 = "Bem-vindo, Sensei~\nVamos dar o nosso melhor\ne começar a missão hoje!"
16004-100 = "O verão em Hyakkiyako\né de tirar o fôlego.\nPorque o festival vai começar!"
16004-110 = "Kimono é realmente o melhor!\nO melhor dos melhores!"
16004-120 = "Pode ficar tranquilo.\nÉ apenas um golpe com o dorso da lâmina..."
16004-130 = "Ah...\nOlhando bem,\nnão era uma espada,\nera uma arma!"
16004-140 = "Não tolero injustiças!\nA bela loira da justiça!\nChegou aqui!"
16004-150 = "Para cumprimentar,\nprecisa ficar de ponta-cabeça?\nA cultura de Hyakkiyako\né realmente misteriosa!"
16004-160 = "Hoje é...\no único dia especial\nde todo o ano!"
16004-170 = "Feliz aniversário para você!\nSensei! Parabéns\npelo seu dia!"
16004-180 = "Hoje é o meu\naniversário!"
16004-190 = "Sensei!\nNós temos que comer\nokowa!"
16004-200 = "Sensei!\nNo Ano Novo, devemos\nir ao santuário!"
16004-210 = "Vamos agora mesmo\ntirar um omikuji!"
16004-220 = "Feliz Natal!\nO Papai Noel é maravilhoso!"
16004-230 = "Sensei, você também\ngosta do Papai Noel?!"
16004-240 = "Demônios para fora, sorte para dentro!"
16004-250 = "Hã?\nNão era o Setsubun?\nÉ Halloween?!"
16004-270 = "Ufa... parece que acabei\nme atrapalhando um pouco."
16004-280 = "Agora que me acalmei,\nsinto um pouco de vergonha..."
16004-290 = "...Hehe. Na verdade... eu estava\nesperando ansiosamente por este dia\nhá muito tempo."
16004-300 = "Eu... fico muito feliz\npor ter chegado\na este dia."
16004-310 = "...Sensei, você sempre\nme guiou quando\neu estava em apuros."
16004-320 = "...Não só hoje,\nmas sempre."
16004-330 = "O que é importante, como devo\nseguir o meu próprio caminho..."
16004-340 = "Se eu não tivesse conhecido o Sensei e\nrecebido seus ensinamentos... só de pensar\nnisso, meu peito dói."
16004-350 = "Por isso,\nagradeço de coração."
16004-360 = "Sensei,\ncontinue contando com a Pina..."
16004-2600 = "O que se torna forte\nnão é a arma, é a alma!"
