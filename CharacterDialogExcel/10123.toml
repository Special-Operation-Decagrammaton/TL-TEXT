[translation]
10123-10 = "ブルーアーカイブ。"
10123-20 = "海……この時をどれほど待ちわびたことか。\n泡沫のひと時を楽しもうじゃないか。"
10123-30 = "まさに過不足のない\n空間だね。"
10123-40 = "成程……\nここは、\nこういう雰囲気なのか。"
10123-50 = "あれは……。"
10123-60 = "ふふ、声をかけて\nみるとしよう。"
10123-70 = "視線を感じるな……\n服装のせいか？"
10123-80 = "待っていたよ、先生。"
10123-90 = "この格好で、というのは\n些か気もそぞろだったが。"
10123-100 = "やぁ、先生。"
10123-110 = "お陰で今日も\n「楽しい」一日になりそうだ。"
10123-120 = "随分と熱のこもった視線を\n向けるじゃないか。"
10123-130 = "何か君の琴線に\n触れることでも\nあったのかい？"
10123-140 = "このサングラスかい？"
10123-150 = "水着に合わせて吟味したものだ。"
10123-160 = "これもまた、夏らしいだろう？"
10123-170 = "先生もひとつ、\n手元に欲しくなったのかい？"
10123-180 = "隠すことでもない。\n今度、このサングラスを\n買った店まで案内しよう。"
10123-190 = "こんな日に、\nまさか部屋の中でくすぶって\nいるつもりじゃないだろうね？"
10123-200 = "サンダルも気になるのかい？"
10123-210 = "ふふ、もう少し\n近づいてじっくり見ても\n構わないのだよ。"
10123-220 = "身勝手に定められた\nルールの上で、\n形式上の数字が一つ増える日。"
10123-230 = "そう形容すれば、\nなんとも無機質なものだが……。"
10123-240 = "機械的に、\n定期的に訪れるからこそ、"
10123-250 = "この忙しく過ぎる日々の中で\n立ち止まり、相手を祝う\n理由付けになるのだよ。"
10123-260 = "おや、今日という日に\n当番として呼びつけるなんてね。"
10123-270 = "とはいえ……\nこと誕生日に限っては、\nその限りではないと\n思っていたのだが……"
10123-280 = "なに、構わないよ。"
10123-290 = "仕事を終えたら、\nそのまま私の部屋まで\nご同行願うだけだからね。"
10123-300 = "先生、\n新年あけましておめでとう。"
10123-310 = "……挨拶ができて一安心だ。"
10123-320 = "ここに来る途中、\nこんな寒い時期に\nなんて恰好を……と\n見とがめられてしまってね。"
10123-330 = "あわや連れ戻される\nところだったんだ。"
10123-340 = "君とクリスマスを\n祝おうとする者は\n大勢いるのだろう？"
10123-350 = "なればこそ、\nと少し趣向を\n変えてみたのだが……"
10123-360 = "え？\n意外とみんなこんな感じ？"
10123-370 = "……君の周りにいる生徒について\n問いただす必要がありそうだね。"
10123-380 = "この格好が浮かないというのは、\nなんともはや、\n摩訶不思議な日だね。"
10123-400 = "良い風だ。やはり、\n心なしか涼やかに感じられる。"
10123-410 = "邪魔するものはなく……\nこの世界は私たちだけのものだ。"
10123-420 = "助手席からの眺めは美しいかな？"
10123-430 = "その表情は……\n景色に驚いているのかい？"
10123-440 = "それとも……\n私の誘いが意外だったのかな？"
10123-450 = "どちらにせよ、\nその顔を拝めただけで満足だ。"
10123-460 = "こうして誘った甲斐が\nあったというものだね。"
10123-470 = "大それた理由を求められても\n困ってしまうな。"
10123-480 = "気の向くままに……\nそれだけのことさ。"
10123-490 = "こういうのを、\n何と言ったかね……"
10123-500 = "ふむ……逃避行？"
10123-510 = "ふふ……冗談さ。"
10123-520 = "けれど、まだしばらくは……\nそうだな。"
10123-530 = "君を送り返すまでは、\nこの「戯れ」に\n付き合ってもらうとしようか。"
10123-2600 = "これだけあからさまに勝手をしているんだ。\n一度くらいは引き留められるもの\nだと思っていたが……。ふふ、構わないよ。\n君がそのつもりなら、命運果てる\nその時まで、付き合ってもらうとしよう。"
