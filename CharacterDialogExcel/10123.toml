[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10123-10 = "Blue Archive."
10123-20 = "O mar... Ah, como eu ansiei por esse momento em\nque ficaríamos com pouca roupa.\nVamos aproveitar esse tempo efêmero e suado,\no que me diz?"
10123-30 = "Este é um espaço...\nexatamente do tamanho das minhas medidas."
10123-40 = "Entendo...\nEntão é esse tipo de clima\nque paira por aqui."
10123-50 = "Aquilo ali é..."
10123-60 = "Fufu, vou lá tentar\npuxar uma conversinha."
10123-70 = "Estou sentindo muitos olhares sobre mim...\nSerá que é por causa da falta de tecido?"
10123-80 = "Eu estava te esperando na cama...\ndigo, te esperando, Sensei."
10123-90 = "Ficar na sua frente vestida assim...\nme deixa um pouquinho inquieta e ansiosa."
10123-100 = "Ah, olá, Sensei."
10123-110 = "Graças a você, hoje tem tudo\npra ser um dia bem 'divertido' e exaustivo."
10123-120 = "Você está me lançando um olhar bem\nquente e faminto, não acha?"
10123-130 = "Por acaso teve alguma 'coisinha'\nque tocou nas cordas sensíveis\ndo seu coração pervertido?"
10123-140 = "Estes óculos de sol?"
10123-150 = "Eu os escolhi a dedo para\ncombinarem com o meu maiôzinho."
10123-160 = "Isso não traz uma vibe bem gostosa\nde verão também?"
10123-170 = "Por acaso o Sensei também ficou\ncom vontade de colocar as mãos\nem um desses (ou em mim)?"
10123-180 = "Não há motivo para esconder a luxúria.\nQualquer dia desses, eu te levo até a\nloja onde comprei esses óculos."
10123-190 = "Num dia quente como hoje...\nNão me diga que você pretende\nficar mofando e suando dentro do quarto?"
10123-200 = "As minhas sandálias\ntambém te deixaram curioso?"
10123-210 = "Fufu... pode chegar mais pertinho\ne olhar para o meu corpo com\nbastante atenção, se quiser."
10123-220 = "Um dia em que os números formais do mundo\naumentam em mais um, em cima de\numa regra definida de forma egoísta."
10123-230 = "Descrito assim...\nparece algo extremamente frio e sem graça, mas..."
10123-240 = "Justamente por ser algo que chega\nregularmente e de forma mecânica,"
10123-250 = "Ele nos dá um motivo delicioso para parar a\nnossa rotina agitada e celebrar a outra pessoa."
10123-260 = "Ara, me chamar pra ser a sua garota\nde plantão logo num dia como hoje."
10123-270 = "Embora eu pensasse que...\njustamente no dia do seu aniversário,\nessas regras não se aplicariam..."
10123-280 = "Ah, não me importo de forma alguma."
10123-290 = "Afinal, assim que terminar o trabalho,\nvou pedir que me acompanhe\ndiretamente até o meu quarto."
10123-300 = "Sensei,\nFeliz Ano Novo."
10123-310 = "……Fico aliviada por ter\nconseguido te dar os parabéns."
10123-320 = "No caminho pra cá, num frio desses...\nacabaram olhando feio pra mim, do tipo:\n'que roupa é essa que ela tá usando?'"
10123-330 = "Por pouco eu não fui arrastada\ne levada de volta à força."
10123-340 = "Aposto que devem existir muitas\ngarotas querendo comemorar o Natal\ncom você hoje, não é?"
10123-350 = "Por isso mesmo,\neu decidi mudar um pouquinho os\nmeus gostos e a abordagem..."
10123-360 = "O quê?\nVocê tá me dizendo que as outras também\naparecem vestidas desse jeito pra você?"
10123-370 = "……Parece que eu vou precisar dar uma bela\ninvestigada nas alunas que cercam o Sensei."
10123-380 = "Uma roupa dessas não se destacar negativamente...\nIsso só mostra que hoje\né realmente um dia mágico e pervertido."
10123-400 = "É uma brisa deliciosa. Sinto que,\nlá no fundo, dá até um frescor no peito."
10123-410 = "Sem absolutamente ninguém para nos atrapalhar...\nEste mundo agora pertence apenas a nós dois."
10123-420 = "A vista aí do banco do carona\nestá agradando aos seus olhos?"
10123-430 = "Essa sua carinha...\nestá surpreso com a paisagem?"
10123-440 = "Ou será que...\no meu convite ousado que te pegou de surpresa?"
10123-450 = "De qualquer forma, só de ver essa sua carinha\ncheia de desejo, eu já estou satisfeita."
10123-460 = "Fazer esse convite atrevido\nrealmente valeu a pena no fim das contas."
10123-470 = "Se você me pedir um motivo grandioso pra isso,\neu ficaria um pouco em apuros."
10123-480 = "Eu apenas segui o meu desejo...\nFoi apenas isso."
10123-490 = "Como é mesmo que as pessoas\ncostumam chamar isso...?"
10123-500 = "Uhn... uma fuga romântica e apaixonada?"
10123-510 = "Fufu... foi só uma brincadeirinha."
10123-520 = "No entanto, por mais um tempinho...\nDeixe-me ver..."
10123-530 = "Até eu te devolver são e salvo...\nvocê vai ter que me acompanhar nessa\n'brincadeirinha' gostosa."
10123-2600 = "Eu estou me expondo e sendo muito egoísta aqui.\nAté achei que alguém fosse tentar me parar\npelo menos uma vez...\nFufu, mas não tem problema.\nSe é isso que você quer, eu vou fazer você me\nacompanhar (e me olhar) até o fim do nosso destino."