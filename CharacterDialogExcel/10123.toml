[translation]
10123-10 = "Blue Archive."
10123-20 = "O mar... quanto tempo esperei por este momento. Vamos aproveitar este breve instante de efemeridade."
10123-30 = "É um espaço que não tem nada a mais nem a menos, não é?"
10123-40 = "Entendo... Então este lugar tem esse tipo de atmosfera."
10123-50 = "Aquilo é..."
10123-60 = "Hehe, vou falar com eles."
10123-70 = "Sinto um olhar sobre mim... Será por causa da minha roupa?"
10123-80 = "Eu estava esperando por você, Sensei."
10123-90 = "Embora eu tenha que admitir que estar vestido assim me deixou um pouco inquieto."
10123-100 = "Olá, Sensei."
10123-110 = "Graças a você, hoje também será um dia 'divertido'."
10123-120 = "Você está me olhando com bastante entusiasmo, não está?"
10123-130 = "Aconteceu algo que tocou o seu coração?"
10123-140 = "Estes óculos escuros?"
10123-150 = "Eu os escolhi a dedo para combinar com o traje de banho."
10123-160 = "Isso também tem a cara do verão, não acha?"
10123-170 = "Você também ficou com vontade de ter um par para você, Sensei?"
10123-180 = "Não há nada para esconder. Da próxima vez, eu te levo até a loja onde comprei estes óculos."
10123-190 = "Em um dia como este, você não pretende ficar mofando dentro de um quarto, pretende?"
10123-200 = "As sandálias também chamaram sua atenção?"
10123-210 = "Hehe, não se preocupe, pode chegar mais perto para olhar com calma."
10123-220 = "Um dia em que um número formal aumenta, baseado em regras definidas arbitrariamente."
10123-230 = "Se descrevermos assim, soa algo bem inorgânico, mas..."
10123-240 = "É justamente por ser algo que chega de forma mecânica e periódica,"
10123-250 = "que, em meio a esses dias corridos, torna-se um motivo para parar e celebrar o outro."
10123-260 = "Ora, me chamar para o serviço justamente em um dia como hoje..."
10123-270 = "Dito isso... eu pensava que, pelo menos no que diz respeito ao aniversário, isso não se aplicaria..."
10123-280 = "Não, não se preocupe."
10123-290 = "Assim que terminar o trabalho, você só precisa me acompanhar até o meu quarto."
10123-300 = "Sensei, feliz ano novo."
10123-310 = "...Sinto-me aliviado por ter conseguido cumprimentá-lo."
10123-320 = "No caminho para cá, fui parado por alguém que questionou: 'Como você pode estar vestido assim em uma época tão fria?'..."
10123-330 = "Por pouco não fui levado de volta."
10123-340 = "Deve haver muitas pessoas querendo celebrar o Natal com você, não é?"
10123-350 = "Foi por isso que tentei mudar um pouco o estilo, mas..."
10123-360 = "Hã? Todo mundo está assim?"
10123-370 = "...Parece que vou precisar investigar os alunos que vivem ao seu redor."
10123-380 = "O fato de que este traje não parece deslocado é um dia deveras misterioso, não é?"
10123-400 = "Um bom vento. De fato, sinto-me um pouco mais refrescado."
10123-410 = "Não há nada para nos atrapalhar... Este mundo é só nosso."
10123-420 = "A vista do banco do passageiro é bonita?"
10123-430 = "Essa sua expressão... você está surpreso com a paisagem?"
10123-440 = "Ou será que... o meu convite foi inesperado?"
10123-450 = "De qualquer forma, só de ver essa sua cara, já estou satisfeito."
10123-460 = "Valerá a pena ter feito esse convite."
10123-470 = "Eu ficaria em apuros se você me pedisse um motivo grandioso."
10123-480 = "Apenas seguindo o meu instinto... É só isso."
10123-490 = "Como é que se chama isso mesmo..."
10123-500 = "Hum... uma fuga?"
10123-510 = "Hehe... é brincadeira."
10123-520 = "Mas, por enquanto... \nÉ, acho que sim."
10123-530 = "Até que eu te mande de volta, \nvou precisar que você \nme acompanhe nesta \"brincadeira\"."
10123-2600 = "Estou agindo de forma tão descarada. \nEu até pensei que você tentaria me impedir \npelo menos uma vez... Hehe, não tem problema. \nSe é isso que você quer, \nentão vamos ficar juntos até o fim dos seus dias."
