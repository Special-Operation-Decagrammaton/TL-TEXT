[translation]
16010-10 = "B-Blue Archive...!"
16010-20 = "Sensei... h-how do I look?\nÉ a primeira vez que faço um traje de líder de torcida,\nmas... não está tão ruim, está?"
16010-30 = "Alguém precisa\n...de torcida?"
16010-40 = "Essa atmosfera\nagitada...\nNão é ruim."
16010-50 = "Estou cansada... Acho que\nfiquei com um pouco de sede."
16010-60 = "Aquilo ali... acho que\nvou tentar modificar um pouco."
16010-70 = "Será que aqui está bom?\nOu talvez... por aqui?"
16010-80 = "Bem-vindo de volta, Sensei.\nQuer uma torcida? Quer modificar algo?\nOu talvez..."
16010-90 = "Vamos trabalhar duro, Sensei.\nSe você perder a motivação...\nÉ só me dizer."
16010-100 = "Sensei... você parece meio desanimado?\nPrecisa de uma torcida? ...Você precisa, né?"
16010-110 = "Porque eu quero ser útil para você, Sensei.\nNão só com tecnologia...\nMas em vários aspectos."
16010-120 = "Como aqui não é um campo de esportes...\nEstar vestida assim é um pouco, sabe..."
16010-130 = "É uma sensação meio estranha."
16010-140 = "Normalmente, eu não me importaria\nmesmo se estivesse usando algo\nmais revelador que isso..."
16010-150 = "(Será que eu...\nEstou ficando consciente\ndo Sensei?)"
16010-160 = "Rah, rah! Sensei!\nObrigada por tudo!\nSensei! Gratidão!"
16010-170 = "...Hoje é um dia especial.\nEntão eu me esforcei um pouco."
16010-180 = "Sim, feliz aniversário.\nSensei."
16010-190 = "Hoje é meu aniversário, Sensei."
16010-200 = "Por isso, hoje... eu queria que\nvocê torcesse por mim, Sensei."
16010-210 = "Feliz ano novo, Sensei.\nEste ano também, vou torcer\ncom todas as minhas forças por você."
16010-220 = "Já é Natal, né.\nEu deveria ter preparado um\nnovo design de traje de líder de torcida."
16010-230 = "Ah... então hoje\nera Halloween.\nCom razão...\nachei que estava barulhento lá fora."
16010-240 = "Hm...? Eu?\n...E-essa roupa, não é\nnada disso..."
16010-260 = "Rah, rah... Sensei!"
16010-270 = "Vai, vai, ganha, ganha,\nSensei..."
16010-280 = "Hm?\nQuer saber para que\nestou torcendo para você ganhar?"
16010-290 = "O que será...?\nTalvez contra o trabalho que te atormenta,\nou contra a responsabilidade de ser Sensei...?"
16010-300 = "Se isso te preocupa,\nquer que eu mude um pouco\nas frases de torcida...?"
16010-310 = "Força, força... Sensei!"
16010-320 = "(...Tem algo errado.\nSensei, em vez de ficar animado,\nparece que você não está conseguindo\nse concentrar muito bem.)"
16010-330 = "(...Será que agora mesmo,\neu acabei fazendo algo\nmeio absurdo...?)"
16010-2600 = "Obrigada, Sensei...\nVou continuar te mostrando.\n...Uma nova paisagem,\nque você nunca viu antes."
