[translation]
16010-10 = "ブ、ブルーアーカイブ…！"
16010-20 = "先生…ど、どう…？\nチアリーダーの衣装を作ったのは、\n初めてだけど…そんなに悪くは…ない？"
16010-30 = "応援が必要な人\n…いる？"
16010-40 = "この賑やかな\n雰囲気…\n悪くない。"
16010-50 = "疲れた…少し\n喉乾いてきたかも。"
16010-60 = "あれは…ちょっと\n改造してみようかな。"
16010-70 = "ここら辺でいいかな？\nそれとも…この辺？"
16010-80 = "おかえりなさい、先生。\n応援する？改造する？\nそれとも…"
16010-90 = "頑張って働こう、先生。\nもしやる気がなくなったら…\nいつでも言って。"
16010-100 = "先生…なんだか元気ない？\n応援が必要？…必要だよね？"
16010-110 = "先生の役に立ちたいから。\n技術だけじゃなくて…\nいろんな面で。"
16010-120 = "ここは運動場じゃないから…\nこの格好はちょっと、その…"
16010-130 = "何だか変な感じ。"
16010-140 = "普段は、これより\n露出度が高い格好でも\n気にならなかったのに…"
16010-150 = "（もしかして私…\n先生のこと、\n意識してるのかな）"
16010-160 = "フレー、フレー！先生！\nいつも、ありがと！\n先生！感謝！"
16010-170 = "…今日は特別な日だから。\nちょっと頑張ってみた。"
16010-180 = "うん、誕生日おめでとう。\n先生。"
16010-190 = "今日は私の誕生日だよ、先生。"
16010-200 = "だから今日は…先生に応援、\nしてもらいたいな。"
16010-210 = "あけましておめでとう、先生。\n今年も、先生のために\n一生懸命応援する。"
16010-220 = "もうクリスマスだね。\n新しいデザインのチア衣装を\n用意すればよかったね。"
16010-230 = "ああ…今日は\nハロウィーンだったんだ。\nどうりで…\n外が騒がしいと思った。"
16010-240 = "ん…？私？\n…こ、この服は、\nそういうのじゃない…"
16010-260 = "フレー、フレー…先生！"
16010-270 = "行け行け、勝て勝て、\n先生…"
16010-280 = "ん？\n何に勝つための\n応援かって？"
16010-290 = "何だろう…？\n先生を苦しめる業務、とか。\n先生としての責任とか…？"
16010-300 = "気がかりなら、\n応援のフレーズを\nちょっと変えようか…？"
16010-310 = "頑張れ、頑張れ…先生！"
16010-320 = "（…なんだかおかしい。\n先生、元気になるどころか、\nあんまり集中できて\nなさそうに見える）"
16010-330 = "（…もしかして今の私、\n結構とんでもないことを\nしちゃってるのかも…？）"
16010-2600 = "ありがとう、先生…\nこれからも見せ続けてあげる。\n…今まで見られなかったような、\n新しい景色を。"
