[translation]
20042-10 = "Blue Archive..."
20042-20 = "Ugh... camping... \nMesmo sendo dia de folga, a gente tem que sair?"
20042-30 = "Eu não quero sair de casa hoje..."
20042-40 = "Ah, tive uma inspiração incrível!"
20042-50 = "Será que eu deveria usar aquela cama dobrável que peguei emprestada da Chihiro-senpai?"
20042-60 = "O quê? Que nome estranho de Wi-Fi é esse..."
20042-70 = "(Será que dá para instalar BOOM aqui? ...Vou tentar!)"
20042-80 = "Ah, Sensei. Bom dia."
20042-90 = "Ué... você vai sair de novo...?"
20042-100 = "Está frio hoje, né!"
20042-110 = "Para ficar mais quentinho, eu sobrecarreguei os aparelhos eletrônicos da sala de trabalho!"
20042-120 = "Eu costumava subir em prédios altos para fazer grafite, mas..."
20042-130 = "Escalar montanhas é uma sensação bem diferente."
20042-140 = "É que, se não tiver Wi-Fi, parece que minha energia acaba..."
20042-150 = "Se as folhas de outono durassem em outras estações, a paisagem das montanhas seria tão vibrante..."
20042-160 = "Bem, mas... é justamente por não durarem muito que as folhas de outono são valiosas, né?"
20042-170 = "Essa trança?"
20042-180 = "Sim, fui eu mesma que fiz."
20042-190 = "Fazer coque dá muito trabalho, então não quero fazer isso nos meus dias de folga..."
20042-200 = "Como a Chihiro-senpai consegue chegar tão cedo de manhã?"
20042-210 = "Não me diga que... ela dorme antes da meia-noite!?"
20042-220 = "Materiais para grafite não são só tinta, sabe."
20042-230 = "Como daquela vez que fiz uma pintura rupestre na caverna!"
20042-240 = "Tinta é difícil de apagar e..."
20042-250 = "Acho que vou procurar materiais naturais que possam ser reciclados daqui para frente."
20042-260 = "Uau, Sensei! Feliz aniversário!"
20042-270 = "Como presente, eu pintei um retrato seu bem grande na parede externa do Schale, mas..."
20042-280 = "Ahaha, brincadeira, brincadeira."
20042-290 = "Se quiser alguma coisa, é só pedir, qualquer coisa mesmo!"
20042-300 = "Uau... já é meu aniversário."
20042-310 = "Hehe, não precisa de presente."
20042-320 = "Afinal, você sempre cuida tão bem de mim, Sensei."
20042-330 = "Sensei, feliz ano novo."
20042-340 = "Se tiver tempo hoje à noite, vamos nos encontrar na Costa da Luz!"
20042-350 = "Ah... quer dizer, Costa da Luz é o nome de um lugar no jogo!"
20042-360 = "Feliz Natal, Sensei!"
20042-370 = "Como está frio hoje, vamos fazer várias guirlandas de Natal aqui dentro."
20042-380 = "Tantas que vão cobrir o Schale inteiro!"
20042-390 = "Ei! É Halloween, Sensei."
20042-400 = "É um dia para deixar a alma artística queimar de verdade."
20042-410 = "O que acha? Não quer vir queimar tudo comigo?"
20042-430 = "Ugh, droga..."
20042-440 = "Morri no mesmo lugar de novo..."
20042-450 = "E olha que os controles desse tablet são difíceis..."
20042-460 = "Só falta o chefão final, mas..."
20042-470 = "Eu sempre erro no mesmo lugar..."
20042-480 = "Talvez seja porque o ambiente é diferente e a dificuldade aumentou..."
20042-490 = "Sinto um espírito competitivo estranho surgindo."
20042-500 = "E como não tem outro entretenimento por aqui..."
20042-510 = "Acabo me concentrando ainda mais no jogo."
20042-520 = "Será que\nisso é o que chamam de\nverdadeiro prazer de acampar?"
20042-530 = "Hã!?\nJá está na hora!?\nO que eu faço..."
20042-540 = "Sensei~\nSó mais uma vez..."
20042-550 = "Prometo que\nesta é a última..."
20042-560 = "Espera só mais um pouquinho!"
20042-2600 = "Eu modifiquei essa metralhadora para ficar legal, mas...\nela está um pouco pesada demais para escalar montanhas...\nEstá na hora de deixá-la mais leve."
