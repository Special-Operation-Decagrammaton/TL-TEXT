[translation]
20042-10 = "ブルーアーカイブぅ……。"
20042-20 = "うぇ……キャンプ……。\nお休みの日なのに出かけるの……？"
20042-30 = "今日は外に\n出たくないなぁ……。"
20042-40 = "あ、最高の\nインスピレーションが\n浮かんだ！"
20042-50 = "前、チヒロ先輩に\n借りた簡易ベッド、\n使ってみようかな？"
20042-60 = "なに？\nこの変な名前の\nWi-Fi……。"
20042-70 = "（ここにBOOM、\nインストール\nできるかな？\n……やってみよ！）"
20042-80 = "あ、先生。おはよう。"
20042-90 = "あれ……\nまた出かけるの……？"
20042-100 = "今日寒いね！"
20042-110 = "あったかくなるよう、\n執務室の電子機器に\n負荷をかけておいたよ！"
20042-120 = "グラフィティをする時も\nよく高いビルに登ったけど、"
20042-130 = "登山とはまた\n違う感じなんだよね。"
20042-140 = "やっぱWi-Fiがないと\nエネルギーが\n切れちゃうというか……。"
20042-150 = "秋だけじゃなくて、\n他の季節にも紅葉が残ってたら\n山の景色も\n鮮やかなのになぁ……。"
20042-160 = "まぁでも……紅葉は長く\n続かないからこそ\n価値があるんだよね？"
20042-170 = "この三つ編み？"
20042-180 = "うん、あたしが編んだんだ。"
20042-190 = "お団子ってちょっと\n時間かかっちゃうから\n休みの日には\nやりたくないんだよね……。"
20042-200 = "チヒロ先輩って、\nなんであんなに朝早く\n来れるんだろう？"
20042-210 = "まさか……0時前に\n寝てるとか！？"
20042-220 = "グラフィティの材料はね、\nペンキ以外にも色々あるんだ。"
20042-230 = "この前、あたしが洞窟で\n壁画を描いたようにね！"
20042-240 = "ペンキは消すのも大変だし……"
20042-250 = "これからはリサイクルできる\n天然の材料を探そうかなぁ。"
20042-260 = "わあ、先生！\nお誕生日おめでとう！"
20042-270 = "お祝いとして、\nシャーレの外壁に\n先生の肖像画を\n大きく描いたんだけど――"
20042-280 = "あはは、冗談冗談。"
20042-290 = "なにか欲しい\nものあったら言ってね、\nなんでもいいよ！"
20042-300 = "わぁ……\nもうあたしの誕生日か。 "
20042-310 = "ふふっ、プレゼントはいいよ。"
20042-320 = "先生には、いつも\nお世話になってるからね。"
20042-330 = "先生、明けましておめでとう。"
20042-340 = "今日夕方、時間があえば\n光の海岸で会おうね！"
20042-350 = "あ……えっと、\n光の海岸はゲームの地名だよ！"
20042-360 = "メリークリスマス、先生！"
20042-370 = "今日は寒いから\n部屋の中で\nクリスマスリースを\nたくさん作ろう。"
20042-380 = "シャーレを覆っちゃうくらい、\nいっぱい！"
20042-390 = "やっほ！\nハロウィンだよ、先生。"
20042-400 = "芸術魂を思いっきり\n燃やせる日でもあるんだ。"
20042-410 = "どう？あたしと一緒に\n燃やしにいかない？"
20042-430 = "うっ、うぐぐ……。"
20042-440 = "また同じとこで\n死んじゃった……。"
20042-450 = "というかパッドの\n操作ムズ……。"
20042-460 = "あとはもう\nラスボスだけなんだけど……"
20042-470 = "同じとこで\nミスっちゃうんだよね……。"
20042-480 = "普段と違うから\n難易度上がってるし……\nだからなのかな。"
20042-490 = "妙に競争心が湧いちゃって。"
20042-500 = "他に娯楽もないしさー……"
20042-510 = "逆にゲームに\n集中しちゃうかんじ。"
20042-520 = "もしかして、\nこれがキャンプの\n醍醐味ってやつなのかな？"
20042-530 = "えっ！？\nもうこんな時間！？\nどうしよう……"
20042-540 = "先生ぇ～\nあともう一回だけ……"
20042-550 = "本当にこれで\n最後にするから……"
20042-560 = "もうちょっとだけ待って！"
20042-2600 = "このマシンガン、イイ感じに改造したけど……\n登山にはちょっと重すぎるんだよね……\nそろそろ軽量化しなきゃ。"
