[translation]
10052-10 = "Blue Archive!"
10052-20 = "Sou da secretaria do Seminar, Ushio Noa.\nConto com você, Sensei... em vários aspectos, sim."
10052-30 = "（Este café parece\num sonho que os\nsonhadores teriam...）"
10052-40 = "（Vamos esquecer um pouco\na realidade entediante e\nnos perder em um devaneio.）"
10052-50 = "Eu adoraria instalar\neste móvel na sala de\ndescanso do Seminar.\nFufu."
10052-60 = "A estrutura deste espaço...\nÉ impressionante."
10052-70 = "Fufu, eu adoraria mostrar\nesta cena para a\nYuuka-chan também."
10052-80 = "Bem-vindo de volta, Sensei."
10052-90 = "Gostaria de verificar\na agenda de hoje?"
10052-100 = "Fufu,\nvocê se atrasou um pouco,\nSensei."
10052-110 = "Mesmo que me olhe assim,\nnão posso apagar o fato\nde que você se atrasou."
10052-120 = "Por favor, tente vir\num pouco mais cedo da próxima vez."
10052-130 = "（Encarando...）"
10052-140 = "Ah, não se preocupe.\nEstou apenas observando."
10052-150 = "Alguma ideia interessante\nveio à sua mente?"
10052-160 = "Vou anotar agora mesmo,\nentão, por favor, me conte."
10052-170 = "O livro de poemas que escrevi...?"
10052-180 = "Eu o submeti ao\nMillennium Prize da última vez."
10052-190 = "Por algum motivo,\nembora todos o leiam,"
10052-200 = "ninguém me dá um feedback\nconcreto sobre ele..."
10052-210 = "É um mistério."
10052-220 = "A Yuuka-chan é muito\nexpressiva com suas emoções,\ne não é nada entediante\nficar ao lado dela."
10052-230 = "Por isso, acabo sempre\nprovocando ela...\nFufu."
10052-240 = "A curiosidade é a força motriz\nque faz a ciência avançar e,\nao mesmo tempo, às vezes,\nnos faz sofrer."
10052-250 = "É uma dor muito estranha,\num desejo misturado com medo..."
10052-260 = "Feliz aniversário,\nSensei."
10052-270 = "Mesmo que, nos registros, este seja\num dia comum como qualquer outro..."
10052-280 = "Espero que hoje seja um dia\nmais feliz que o habitual."
10052-290 = "Dizem que o ato de registrar\ne relembrar o dia do nascimento\nnão tem um significado especial..."
10052-300 = "Ainda assim, é bom\nser parabenizada."
10052-310 = "Obrigada por se lembrar."
10052-320 = "Feliz ano novo."
10052-330 = "Conto com você este ano\ntambém, Sensei."
10052-340 = "Natal, é..."
10052-350 = "Em Millennium, não é\nnecessariamente um dia\ntão especial, mas..."
10052-360 = "Hoje, de alguma forma, está tranquilo."
10052-370 = "……Se não se importar,\ndepois do trabalho,"
10052-380 = "que tal jantarmos juntos?\nFufu."
10052-390 = "É o dia de celebração para\nhomenagear os mortos que\nforam esquecidos."
10052-400 = "Para que o número de pessoas que não são registradas e desaparecem da memória de todos diminua, pretendo me dedicar ainda mais ao meu trabalho."
10052-420 = "……É estranho."
10052-430 = "Diferente de quando escrevo em papel,\nmeu humor está elevado."
10052-440 = "Embora o registro seja, originalmente,\num meio de transmitir a vontade\ndo presente para o futuro."
10052-450 = "Um registro efêmero que desaparece\nassim que a chuva para\ne o sol nasce..."
10052-460 = "Para registrar a razão, a verdade\ne a lógica, esta placa de vidro\né frágil demais."
10052-470 = "……Mas... é justamente por isso que eu prefiro esta grande página de vidro. Fufu."
10052-2600 = "Este kit de conversão tem uma estrutura curiosa. Fiquei com vontade de testar várias coisas... Fufu."
