[translation]
10052-10 = "ブルーアーカイブ！"
10052-20 = "セミナーの書記、生塩ノアです。\nよろしくお願いしますね、先生……様々な面で、はい。"
10052-30 = "（このカフェ、まるで\n夢想家たちが見る\n夢みたいですね……）"
10052-40 = "（少しだけアンニュイな\n現実を忘れて、白昼夢に\n耽るとしましょうか）"
10052-50 = "この家具、\nセミナーの休憩室にも\n導入したいですね。\nふふっ。"
10052-60 = "この空間の構造…\n印象的ですね。"
10052-70 = "ふふ、この光景、\nユウカちゃんにも\n見せてあげたいです。"
10052-80 = "おかえりなさい、先生。"
10052-90 = "今日のスケジュールを\n確認されますか？"
10052-100 = "ふふっ、\n少し遅かったですね、先生。"
10052-110 = "そんなに見つめても、\n遅刻した事実は\n消してあげられません。"
10052-120 = "次はもう少し\n早く来てくださいね。"
10052-130 = "（じーっ……）"
10052-140 = "あ、気にしないでください。\n観察しているだけですので。"
10052-150 = "何か面白いアイディアでも\n浮かびましたか？"
10052-160 = "今すぐ書き留めますので、\n私に聞かせてください。"
10052-170 = "私の書いた詩集、ですか…？"
10052-180 = "前回のミレニアムプライスに\n出品しましたよ。"
10052-190 = "どういうわけか、\n皆さん読んではくださるのに、"
10052-200 = "きちんとした感想を\n言ってくれないんですよね……"
10052-210 = "不思議です。"
10052-220 = "ユウカちゃんは\n感情表現がとても豊かで、\n一緒にいると退屈しません。"
10052-230 = "それで私はつい、\n彼女をからかって\nしまうんです……ふふっ。"
10052-240 = "好奇心は、科学を発展させる\n動力であると同時に、\n時々、私たちを苦しめます。"
10052-250 = "それはとても奇妙な痛みで、\n恐怖の混じった欲望……"
10052-260 = "お誕生日、\nおめでとうございます先生。"
10052-270 = "記録上は普段と変わりのない\n平凡な日であっても……"
10052-280 = "今日がいつもより、\n幸せな1日でありますように。"
10052-290 = "生まれた日を記して\n回想する行為に、\n特に意味はないと言いますが……"
10052-300 = "それでも、祝ってもらえるのは\n嬉しいですね。"
10052-310 = "覚えていただいて、\nありがとうございます。"
10052-320 = "あけまして\nおめでとうございます。"
10052-330 = "今年もどうぞ、\nよろしくお願いしますね、先生。"
10052-340 = "クリスマスですか……"
10052-350 = "ミレニアムでは、\nなにか特別な日というわけじゃ\nありませんが……。"
10052-360 = "今日はなんだか、のどかですね。"
10052-370 = "……もしよろしければ\nお仕事の後、"
10052-380 = "ディナーをご一緒に、\nいかがですか？ふふっ。"
10052-390 = "覚えてもらえなかった\n亡者をたたえる、\n祝祭の日ですね。"
10052-400 = "記されず、誰の中からも\n消え去ってしまう人が減るよう、\n一層業務に励みたいと思います。"
10052-420 = "……不思議です。"
10052-430 = "紙に文字を書くときと違って、\n気分が高揚しています。"
10052-440 = "記録とは本来、現在の意志を\n未来に伝達するための\n手段だというのに。"
10052-450 = "雨が止み、\n陽が登ったら消えてしまう\n刹那の記録だなんて……"
10052-460 = "理性と真実、\n合理を記録するのに、\nこのガラスの板は\nあまりにも儚いですね。"
10052-470 = "……でも…だからこそ私は、\nこの大きなガラスの\nページの方が好きです。ふふ。"
10052-2600 = "このコンバージョンキットは\n不思議な構造をしていますね。\n少し…色々と試してみたくなりました。\nふふっ。"
