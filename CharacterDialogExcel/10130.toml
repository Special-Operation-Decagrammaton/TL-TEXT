[translation]
10130-10 = "Blue Archive, é isso. Fufu."
10130-20 = "Sou Kakei Subaru.\nQuando estiver em apuros, eu lhe darei o meu apoio.\nBem... dentro do possível, ao \"estilo Arius\"."
10130-30 = "Café...\nÉ um lugar que parece\nmeio caro."
10130-40 = "（De alguma forma...\nme faz lembrar\ndo tempo da água）"
10130-50 = "O que é aquilo...\nO que será?"
10130-60 = "（Eu não costumava\nvir muito a lugares\ncomo este...）"
10130-70 = "Trabalho de meio período no café...\nSerá que eles estão contratando?"
10130-80 = "Bem-vindo de volta, Sensei.\nEu sou Kakei Subaru,\ne serei a responsável pelo turno de hoje."
10130-90 = "Eu estava aguardando.\nTem alguma instrução?"
10130-100 = "Eh?\n\"Primeiro, relaxe\"...?"
10130-110 = "Posso comer os doces\nà vontade também...?"
10130-120 = "I-isso não é possível!\nMesmo sendo a responsável pelo turno..."
10130-130 = "......"
10130-140 = "Bem, só um pouquinho então..."
10130-150 = "Isso é só entre nós, mas—"
10130-160 = "Eu não gosto muito\nde ser chamada de\n\"filial\" da Arius."
10130-170 = "Quando dizem \"filial\",\ndá a impressão de que somos inferiores\nà escola principal, ou que somos\num lugar isolado, não acha?"
10130-180 = "......Desculpe,\nestava pensando em todos\nque estão na Arius."
10130-190 = "Tenho que me esforçar\npor causa deles também."
10130-200 = "......Eh? \"Esforce-se por você mesma também\"?"
10130-210 = "Ah... muito\nobrigada..."
10130-220 = "Hã? Estudar...? E-eu estou fazendo isso direitinho."
10130-230 = "Haa... mas por que\nprecisamos aprender coisas\nque nem parecem úteis..."
10130-240 = "\"Mesmo que não entenda agora,\num dia será útil\"\n...é isso?"
10130-250 = "Ah, chega... sim, sim,\njá entendi!"
10130-260 = "Sabe... quando encontro o Sensei,\nsinto algo estranho."
10130-270 = "Até hoje, nunca houve um adulto\nque tenha sido tão bom\ncomigo assim."
10130-280 = "Feliz aniversário,\nSensei."
10130-290 = "Bem, como não há muito que eu possa fazer,\nacaba sendo apenas\ncom palavras de felicitações..."
10130-300 = "Eh? Quer que eu toque\ngaita para você algum dia...?\nI-isso é..."
10130-310 = "Haa... entendi.\nSó para o Sensei, está bem?"
10130-320 = "Obrigada por celebrar\no meu aniversário, Sensei."
10130-330 = "Na Arius, nós valorizamos\no aniversário."
10130-340 = "Sinto que, se parássemos com isso,\nperderíamos algo\nrealmente importante."
10130-350 = "Bem, mas... como levávamos bronca,\nnão podíamos celebrar\nde forma muito grandiosa."
10130-360 = "O ano termina,\ne um novo ano começa—"
10130-370 = "É algo estranho...\nAgora, eu sinto que\nnão é algo ruim."
10130-380 = "Feliz ano novo,\nSensei."
10130-390 = "É Natal, né.\nEu sei o que é, pelo menos."
10130-400 = "Antigamente—\nna Trinity e na Gehenna..."
10130-410 = "Eu cheguei a dizer, em tom de piada,\nque me tornaria uma Papai Noel\npara presentear com uma chuva de balas."
10130-420 = "Eu não sei muito bem\nsobre o Halloween..."
10130-430 = "Se não for para aproveitar o festival\ne pedir doces, é só um dia\ncomum, não é?"
10130-440 = "Pensei que parecia com a Arius de antigamente.\n...daquela época em que\nsó restava o medo."
10130-460 = "Sinto uma sensação de renovação."
10130-470 = "É a primeira vez que toco\npara alguém assim..."
10130-480 = "Como foi?"
10130-490 = "Não ficou estranho, ficou...?"
10130-500 = "Isso é... bem, posso considerar\nque é o que você sente de verdade?"
10130-510 = "......Muito obrigada."
10130-520 = "Na verdade, eu gostaria de poder\nfazer algo a mais por você..."
10130-530 = "Mas, para mim agora,\né só isso que eu consigo fazer..."
10130-540 = "Hã? 'Quero que toque para mim\nquando praticar de novo'...?"
10130-550 = "'Porque comprei muitas\npartituras também'...?"
10130-560 = "I-isso é..."
10130-570 = "Quando chegar a hora... \npor favor, deixe-me pensar sobre isso."
10130-2600 = "Eu ainda não consigo acreditar... A cada vez que acordo de manhã, fico ansiosa pensando se não foi apenas um sonho... Muito obrigada, Sensei. Vou cuidar disso com muito carinho."
