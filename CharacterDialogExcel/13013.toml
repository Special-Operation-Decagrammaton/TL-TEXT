[translation]
13013-10 = "Blue Archive."
13013-20 = "Souvenir da Academia Red Winter, do Comitê de Libertação do Conhecimento, Momiji... Para proteger todo o conhecimento do mundo... vamos lutar juntos!"
13013-30 = "Talvez... em algum lugar por aqui, exista um livro raro que ainda não foi lançado ao público..."
13013-40 = "Este lugar é perfeito para ler, não é?"
13013-50 = "Posso tirar uma soneca... só um pouquinho?"
13013-60 = "Um lançamento novo... eu quero..."
13013-70 = "Este lugar... parece bom para se isolar, mas ao mesmo tempo... não parece?"
13013-80 = "Ah, Sensei! Ehehe... eu estava esperando por você!"
13013-90 = "Ah! Você me chamou?"
13013-100 = "Ah, só mais um minuto! Deixe-me terminar de ler esta página...!"
13013-110 = "Eu gosto de livros bonitos, só de olhar para eles já me sinto feliz."
13013-120 = "Também gosto de livros com marcas de uso, pois é a história que aquele livro percorreu."
13013-130 = "Ler livros ou colecioná-los... qual você prefere?"
13013-140 = "Uuu... eu preciso mesmo... escolher um?"
13013-150 = "O pedido de aquisição de livros que enviei para a secretaria foi rejeitado de novo..."
13013-160 = "Mesmo assim, eu não vou desistir...!"
13013-170 = "Um desenvolvimento desses aqui...? Hum..."
13013-180 = "Ah, Sensei!?"
13013-190 = "D-desculpe! Eu não percebi que você estava aí..."
13013-200 = "Uma cena onde um sonho se realiza com um desenrolar emocionante... não acha maravilhoso?"
13013-210 = "Embora, na realidade, seja algo bem difícil de acontecer..."
13013-220 = "Feliz aniversário, Sensei."
13013-230 = "Trouxe um livro recomendado... para você, Sensei."
13013-240 = "Vamos ler juntos?"
13013-250 = "V-você se lembrou... do meu aniversário!?"
13013-260 = "O-o que eu faço!? Eu não tenho nada para te dar em troca...!"
13013-270 = "N-não é isso? Eu só preciso receber...?"
13013-280 = "B-bem, pode até ser, mas é que... é a primeira vez que algo assim acontece comigo..."
13013-290 = "Feliz Ano Novo, Sensei."
13013-300 = "Se... se você quiser, que tal passar o Ano Novo com a gente do Comitê de Libertação do Conhecimento?"
13013-310 = "Feliz Natal, Sensei!"
13013-320 = "Se eu pudesse pedir um presente de Natal para o Papai Noel..."
13013-330 = "Eu gostaria da primeira edição daquele livro que procuro há tanto tempo..."
13013-340 = "O Halloween é um tema muito comum em mangás, não é?"
13013-350 = "Será que é porque dias em que fantasmas se reúnem são fáceis de usar como tema para criações?"
13013-370 = "Sensei! Finalmente encontrei!"
13013-380 = "Sem páginas danificadas, e a ilustração exclusiva de brinde também está aqui,"
13013-390 = "é a edição limitada!"
13013-400 = "Talvez eu tenha sido guiada até aqui..."
13013-410 = "apenas para encontrar este livro."
13013-420 = "Ehehe... isso também é graças a você, Sensei, por estar sempre cuidando de mim."
13013-430 = "Quando estou com você... coisas boas acontecem, é um mistério."
13013-440 = "Por isso... é que... Sensei."
13013-450 = "Se não for pedir muito... não precisa ser todo dia..."
13013-460 = "Pode ser só de vez em quando..."
13013-470 = "Por favor, venha nos visitar no Comitê de Libertação do Conhecimento..."
13013-2600 = "Vou usar isso... para você, Sensei. ...Muito bem, por onde devo começar a silenciar?"
