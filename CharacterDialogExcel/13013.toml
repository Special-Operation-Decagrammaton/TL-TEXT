[translation]
13013-10 = "ブルー、アーカイブ。"
13013-20 = "レッドウィンター連邦学園、\n知識解放戦線の秋泉、モミジです……\n世の全ての知識を守るために……一緒に戦いましょう！"
13013-30 = "……もしかしたら\nここのどこかに、\n世に出回っていない\n稀少な本があるのかも……"
13013-40 = "ここは、\n読書にぴったりの\n場所ですね。"
13013-50 = "少しだけ、寝ても\nいいでしょうか……。"
13013-60 = "新刊……\n欲しいです……。"
13013-70 = "この場所……\n引きこもるのに\n向いてるようで、\n向いてないような……？"
13013-80 = "あっ、先生！\nえへへ…… \nお待ちしておりました！"
13013-90 = "あっ！私のこと、\n呼びましたか？"
13013-100 = "あ、あと1分だけ！\nこのページだけ\n読ませてくださいっ……！"
13013-110 = "キレイな本は好きです、\n眺めるだけで\n幸せになりますから。"
13013-120 = "手垢のついた本も\n好きですよ、\nその本が通ってきた\n歴史ですから。"
13013-130 = "本を読むのと集めるの、\nどっちが好き、ですか……？"
13013-140 = "うう……それ、\n選ばないと\nダメでしょうか……？"
13013-150 = "事務局に出した蔵書申請、\nまた却下されてしまいました……"
13013-160 = "それでも、\n私は諦めません……！"
13013-170 = "ここでそんな展開に……？\nむむ……。"
13013-180 = "はっ、先生！？"
13013-190 = "す、すみません！\n気づきませんでした……。"
13013-200 = "感動的な展開で\n夢を叶えるシーン……\n素敵だと思いませんか！？"
13013-210 = "現実では、\nなかなか難しい\nことですが……。"
13013-220 = "お誕生日\nおめでとうございます、\n先生。"
13013-230 = "先生のために……\nオススメの本を持ってきました。"
13013-240 = "一緒に読みませんか？"
13013-250 = "わ、私の誕生日を、\n覚えてくださったんですか！？"
13013-260 = "ど、どうしましょう！？\n私からは、お返しできるものが\nなにも……！"
13013-270 = "ち、違うんですか？\n私は、もらうだけでいい……？"
13013-280 = "そ、それはそうかもですが、\nその、こんなことは、\n初めてで……。"
13013-290 = "あけまして\nおめでとうございます、\n先生。"
13013-300 = "その……よかったら、\nお正月は、\n私たち知識解放戦線と\n一緒に過ごしませんか？"
13013-310 = "メリークリスマスです、先生！"
13013-320 = "もしサンタさんに\nクリスマスプレゼントを\nお願いできるなら……"
13013-330 = "ずっと探している本の\n初版がいいです……。"
13013-340 = "ハロウィーンは、\n漫画の題材になることが\n多いですよね。"
13013-350 = "やはり、幽霊が集まる日は\n創作の題材に\nしやすいのでしょうか？"
13013-370 = "先生！\nついに見つけました！"
13013-380 = "傷んだページもない、\n特典の描きおろしイラストも\nちゃんと入ってる、"
13013-390 = "限定版です！"
13013-400 = "もしかしたら私は……\nこの一冊に出会うために、"
13013-410 = "ここに\n導かれてきたのかも\nしれません。"
13013-420 = "えへへ……これも、\n先生が見守って\nくださった\nおかげですね。"
13013-430 = "先生と一緒にいると……\n不思議といいことが\n起こるんです。"
13013-440 = "だから……\nその……先生。"
13013-450 = "よろしければ……\nその、毎日とは、\n言いませんから……。"
13013-460 = "たまに、でいいので……。"
13013-470 = "私たち知識解放戦線を、\n訪ねてくださいね……。"
13013-2600 = "先生のために……\n使いますね。\n……さて、何から\n静かにさせましょうか。"
