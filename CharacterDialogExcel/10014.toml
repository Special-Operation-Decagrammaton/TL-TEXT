[translation]
10014-20 = "Izuna, apresentando-se! Recebi o chamado do Sensei... não, do meu Mestre, e vim correndo até aqui! Nin-nin!"
10014-30 = "Ah, Mestre!"
10014-40 = "Dizem que os ninjas vivem nas sombras desde tempos antigos... Sombras... No meio da escuridão... acho que isso vai acabar prejudicando minha visão, não acha?"
10014-50 = "Isso também é para coletar informações... Será que este lugar é bom para se esconder?"
10014-60 = "Se o lugar for amplo assim, talvez eu consiga usar a técnica secreta do estilo Izuna: 'Cem Oito Estilos: Jutsu dos Clones das Sombras'..."
10014-70 = "Esperando silenciosamente pelas ordens do Mestre... Hum, acabei ficando sem nada para fazer..."
10014-80 = "Ah, Mestre! Estava à sua espera! Conto com o senhor hoje também! Nin-nin!"
10014-90 = "Bem-vindo de volta, Mestre! Gostaria de ver o ninjutsu que a Izuna aprendeu ontem?"
10014-100 = "O sonho da Izuna é se tornar a maior ninja de Kivotos."
10014-110 = "Por isso, hum... o senhor poderia me acompanhar no meu treinamento hoje também?"
10014-120 = "Mestre, qual é a missão de hoje? É reconhecimento? Ou talvez uma infiltração em território inimigo?"
10014-130 = "...Ah, é para estudar para a prova de amanhã!?"
10014-140 = "Mestre, o senhor vai fazer a ronda hoje também, não vai?"
10014-150 = "A Izuna vai te seguir como uma sombra! Nin-nin!"
10014-160 = "Embora não pareça, a Izuna é uma ninja, então tenho confiança nas minhas técnicas de sedução!"
10014-170 = "Se for com o Mestre!"
10014-180 = "Hã? Não devo usar esse tipo de técnica com o meu Mestre?"
10014-190 = "Mas então, eu vou acabar ficando sem ninguém para usar, não vou...?"
10014-200 = "Mestre! Feliz aniversário!"
10014-210 = "Para que o seu dia seja maravilhoso, a Izuna vai ficar ao seu lado o dia todo para te proteger!"
10014-220 = "Ah, nossa! O senhor vai comemorar o aniversário da Izuna?"
10014-230 = "Ah, muito obrigada, Mestre...!"
10014-240 = "Passar o Ano Novo junto com o Mestre! Que maravilhoso!"
10014-250 = "Feliz Ano Novo, Mestre!"
10014-260 = "Feliz Natal, Mestre!"
10014-270 = "Vou te mostrar a versão natalina do meu ninjutsu que preparei para hoje!"
10014-280 = "Halloween, o dia em que os monstros e espíritos vagam por aí..."
10014-290 = "Mas Mestre, por favor, não se preocupe."
10014-300 = "A Izuna vai te proteger perfeitamente de qualquer 'doces ou travessuras'!"
10014-320 = "Ah, Mestre, Mestre! Viu aquilo agora pouco?"
10014-330 = "Uma carpa saltou na superfície da água!"
10014-340 = "Ah, é verdade. Calma, Izuna... acalme o seu espírito..."
10014-350 = "...Hehe, hehehe."
10014-360 = "Sim! Estou feliz. Estar tão feliz assim é, sem dúvida..."
10014-370 = "Porque estou junto com o meu querido Mestre, não é?"
10014-380 = "Este dia com certeza será uma lembrança para a vida toda para a Izuna."
10014-390 = "...! Sim, Mestre! Embora eu ainda seja inexperiente...!"
10014-400 = "Continue contando com a Izuna daqui para frente! Hehehe!"
10014-2600 = "E-esta é a arma ninja de última geração...! Será que com isso a Izuna finalmente se tornará uma ninja de nível médio!?"
