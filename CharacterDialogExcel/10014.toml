[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10014-20 = "Izuna, se apresentando!\nRecebi o chamado do Sensei..., digo,\ndo Meu Mestre, e vim correndo~!\nNin-nin!"
10014-30 = "Ah, Meu Mestre!"
10014-40 = "Desde os tempos antigos, um ninja vive\nno mundo das sombras... Nas sombras...\nNo escuro... a nossa visão\npode acabar piorando, não é?"
10014-50 = "Isso também é\npara coletar informações...\nSerá que este é um bom lugar\npara me esconder?"
10014-60 = "Se for tão espaçoso assim,\ntalvez eu consiga usar a Técnica Secreta Estilo Izuna:\n'Jutsu Clone das Sombras - Estilo 108'..."
10014-70 = "Aguardando silenciosamente\nas ordens do Meu Mestre...\nHmmm, estou começando\na ficar entediada..."
10014-80 = "Ah, Meu Mestre! Eu estava te\nesperando! Conto com você\npara hoje também!\nNin-nin!"
10014-90 = "Bem-vindo de volta, Meu Mestre!\nVocê não quer ver a arte ninja que a\nIzuna aprendeu ontem!?"
10014-100 = "O sonho da Izuna é\nse tornar a melhor\nninja de toda Kivotos."
10014-110 = "Por isso, ahn, você me faria\ncompanhia no treinamento de\nhoje também...?"
10014-120 = "Meu Mestre, qual é a missão\nde hoje?\nReconhecimento?\nOu infiltração na base inimiga?"
10014-130 = "...Hã, me preparar para\na prova de amanhã!?"
10014-140 = "Meu Mestre, você vai sair\npara patrulhar hoje também, não vai?"
10014-150 = "A Izuna vai te seguir\ncomo uma sombra!\nNin-nin~!"
10014-160 = "Apesar das aparências,\na Izuna é uma ninja, então\ntenho muita confiança nas minhas\ntáticas de sedução!"
10014-170 = "Isso se o alvo for o Meu Mestre!"
10014-180 = "Eh? Eu não devo usar essas táticas\nno meu próprio Lorde?"
10014-190 = "Mas aí... eu não vou ter\nmais ninguém para usar...?"
10014-200 = "Meu Mestre!\nFeliz Aniversário!"
10014-210 = "Para que hoje seja um dia maravilhoso,\nesta Izuna vai ficar ao lado do\nMeu Mestre o dia todinho para te proteger!"
10014-220 = "E-Eh, ah!\nV-Você vai comemorar o aniversário\nda Izuna?"
10014-230 = "M-Muito obrigada,\nMeu Mestre...!"
10014-240 = "Passar o Ano Novo\njunto com o Meu Mestre!\nÉ maravilhoso!"
10014-250 = "Feliz Ano Novo,\nMeu Mestre!"
10014-260 = "Feliz Natal!\nMeu Mestre!"
10014-270 = "Vou lhe mostrar uma arte ninja\nversão de Natal que preparei\nespecialmente para hoje!"
10014-280 = "Halloween,\nou seja, o dia em que os\nmonstros vagam por aí..."
10014-290 = "Mas Meu Mestre,\npor favor, não se preocupe."
10014-300 = "Esta Izuna irá te proteger\nperfeitamente de qualquer\n'Gostosuras ou Travessuras'!"
10014-320 = "Ah, Meu Mestre, Meu Mestre!\nVocê viu isso agora!?"
10014-330 = "Uma carpa acabou de saltar\nna superfície da água!"
10014-340 = "Ah, é verdade.\nSe acalme, Izuna...\nAcalme o seu espírito..."
10014-350 = "......Ehe, ehehehe."
10014-360 = "Sim! É muito divertido,\nestar tão feliz assim é,\ncom certeza..."
10014-370 = "Porque estou junto com o\nMeu Mestre que eu tanto amo?"
10014-380 = "O dia de hoje com certeza\nserá uma memória que a Izuna\nguardará para a vida toda."
10014-390 = "...! Sim, Meu Mestre!\nEu posso ser um pouco inexperiente, mas...!"
10014-400 = "Por favor, continue cuidando da Izuna!\nEhehe!"
10014-2600 = "E-Essa é uma arma ninja de última geração...!\nCom isso, será que a Izuna também vai conseguir\nse tornar uma Chuunin!?"
