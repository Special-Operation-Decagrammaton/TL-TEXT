[translation]
10014-20 = "イズナ、参上です！\n先生の……、いえ、主殿のお呼びを受けて、\n走って参りました～！にんにん！"
10014-30 = "あっ、主殿ー！"
10014-40 = "忍者とは古くから闇の世界で\n生きるもの……闇……\n闇の中…………目が\n悪くなりそうですね？"
10014-50 = "これも\n情報収集のため……\n隠れるのは、この\n辺りが良いでしょうか？"
10014-60 = "ここまで広ければ、\nイズナ流忍法奥義\n「百八式・影分身の術」\nが使えるかもしれません……"
10014-70 = "主殿の命を\n静かに待つ……\nうーん、暇になって\nきてしまいました……"
10014-80 = "あっ、主殿！お待ちして\nおりました！今日もよろしく\nお願いいたします！\nニンニン！"
10014-90 = "おかえりなさいませ、主殿！\nイズナが昨日習得した\n忍法を見てくれませんか！？"
10014-100 = "イズナの夢は、\nキヴォトスいちの\n忍者になることなんです。"
10014-110 = "なので、その、今日も\n修行に付き合って\nくれますでしょうか……？"
10014-120 = "主殿、今日の任務は\n何でしょうか？\n偵察でしょうか？\nそれとも敵陣への潜入？"
10014-130 = "……え、明日の\nテスト対策ですか！？"
10014-140 = "主殿、今日も巡回に\n行かれるんですよね？"
10014-150 = "イズナも影のように\nついていきます！\nニンニン～！"
10014-160 = "こう見えても\nイズナは忍びですので、\n色仕掛けには\n自信があります！"
10014-170 = "主殿がお相手であれば！"
10014-180 = "え？主を相手にそういう技を\n使っちゃいけない、ですか？"
10014-190 = "それでは、\n使う相手がいなくなって\nしまうのですが……？"
10014-200 = "主殿！\nお誕生日おめでとう\nございます！"
10014-210 = "今日が素敵な\n日になるように、\nこのイズナ、一日中主殿の\n傍にいてお守りします！"
10014-220 = "えっ、あっ！\nイ、イズナの誕生日を\n祝ってくださるのですか？"
10014-230 = "あ、ありがとう\nございます、主殿ぉ……！"
10014-240 = "主殿と一緒に\n迎えられるお正月！\n素敵です！"
10014-250 = "あけましておめでとう\nございます、主殿！"
10014-260 = "メリークリスマスです！\n主殿！"
10014-270 = "今日のために用意した、\nクリスマス版の忍法を\nお見せしましょう！"
10014-280 = "ハロウィン、\nつまりは魑魅魍魎が\n闊歩する日……"
10014-290 = "ですが主殿、\nどうかご心配なく。"
10014-300 = "このイズナが、\nトリック・オア・トリート\nから完璧に守って\nみせますので！"
10014-320 = "あっ、主殿、主殿！\n今の見ましたか！？"
10014-330 = "鯉が水面で跳ねて\nいましたよ！"
10014-340 = "あ、そうですね。\n落ち着いて、イズナ……\n精神を落ち着けて……。"
10014-350 = "……えへっ、えへへへっ。"
10014-360 = "はい！楽しいです、\nこんなにも楽しいのは\nやはり……"
10014-370 = "大好きな主殿と、\n一緒だから、でしょうか？"
10014-380 = "今日のこの日は、\nイズナにとってきっと\n一生の思い出になります。"
10014-390 = "……っ！はい、主殿！\n不束者ではありますが……！"
10014-400 = "これからもイズナを、\nよろしくお願いいたします！\nえへへっ！"
10014-2600 = "こ、これが最先端の忍者の武器……！\nこれでイズナも、\n中忍になれますでしょうか！？"
