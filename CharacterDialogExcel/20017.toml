[translation]
20017-10 = "ブルーアーカイブ。"
20017-20 = "えへへ……何だかんだで、来てしまいました……これからも辛いですよね？苦しいんですよね？ですが、それが人生のようですし……仕方ないですね。ヒヨリです、よろしくお願いいたします……えへへ。"
20017-30 = "えへへ。\n失礼します……。"
20017-40 = "何だか良さそうな\n家具が、たくさん……"
20017-50 = "あれも、これも……良い\nですね……良さそうな\nものがたくさん……"
20017-60 = "えへへ……\nご迷惑をおかけします、\nすみません……。"
20017-70 = "楽しい気分に\nなれそうな……\nなれなさそうな……。"
20017-80 = "うわぁっ！？\nお、おかえりなさい、先生……"
20017-90 = "お、お待ちして\nおりました……！"
20017-100 = "えへへ……はい、\nお嫌かもしれませんが、\n本日の当番は私です。"
20017-110 = "何かあれば言ってください……\n内容によっては、\nもしかしたら役に……"
20017-120 = "あの、何かやることなどは……？\nさっきからただ一緒に\nいるだけで……"
20017-130 = "もっと何か、\n苦しい仕事とか……。"
20017-140 = "……はい？\nこうしているだけで\nいいんですか？……本当に？"
20017-150 = "この間、そういう雑誌で\n色々読んできましたので。"
20017-160 = "えへへ……\n何か役に立てるかも\nです……。"
20017-170 = "お仕事は、\n苦しいですが……"
20017-180 = "人生は元々全てが\n苦しいので、大丈夫です。"
20017-190 = "せ、先生、誕生日\nおめでとうございます！！"
20017-200 = "こんな辛い時間を\n先生は何度も繰り\n返してきたんですよね？"
20017-210 = "すごいですね、\n本当に素晴らしいです。"
20017-220 = "私も辛いですが……\nこれからも、頑張ります。"
20017-230 = "人は、苦しむために\n生まれるんですよね？"
20017-240 = "へへ……ですから私は\nもう何年も、充実した\n年を重ねています。"
20017-250 = "そ、それは違うかも……？\nそうなんですか？"
20017-260 = "またこうして一年が\n過ぎましたね。"
20017-270 = "今年は新たに、\nどれだけの苦しみが待っている\nことでしょうか……えへへ。"
20017-280 = "聖夜について\n雑誌で読みました。\n色々と準備は万端です。"
20017-290 = "……えっと、\nどうして逃げようと\nするんですか？"
20017-300 = "えへへ……飴を奪われるか、\nいたずらされるか……\nどっちでも辛いですよね。"
20017-310 = "どっちを選んでも\n苦しい二者択一……\n人生みたいですね……。"
20017-330 = "み、見てください先生、\n私のここ……"
20017-340 = "や、やっぱり変ですよね？\nみんなと違うんですよね！？"
20017-350 = "もしかして変なのではと、\n前から思ってはいましたが……"
20017-360 = "やっぱり、\nそうだったんですね……！"
20017-370 = "せ、先生？\nどうしてさっきから、\n視線を……？"
20017-380 = "まさか……ま、まともに\n見られないぐらい\n変なんですか！？"
20017-390 = "そうなんですね……\nもう生きていく\n意味も無いかもしれません。"
20017-400 = "どうして人生は、\nこう……"
20017-410 = "まるで直視できない\n私のここみたいに、\nグロテスクで……。"
20017-420 = "せ、先生……\nせめて何か感想を……"
20017-430 = "こんな身体でも、良いとか\n役立ちそうとか、\n何か言っていただけないと……。"
20017-2600 = "先生は私を、骨の髄まで\nこき使うつもりなんですね……\nまあ、どうしようもありませんし……\n受け入れるとしましょう、えへへ……。"
