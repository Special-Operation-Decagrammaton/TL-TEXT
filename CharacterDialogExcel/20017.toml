[translation]
20017-10 = "Blue Archive."
20017-20 = "Hehe... somehow or other, I ended up coming here... It's going to be painful from now on too, right? It's going to be tough, isn't it? But, I suppose that's just life... it can't be helped. I'm Hiyori, please take care of me... hehe."
20017-30 = "Hehe.\nExcuse me..."
20017-40 = "There are so many... nice-looking\nfurniture pieces here..."
20017-50 = "This one, and that one too... they're nice,\naren't they... so many\ngood-looking things..."
20017-60 = "Hehe...\nI'm sorry for\nbeing a bother..."
20017-70 = "It feels like it could\nbe fun... or maybe\nnot so much..."
20017-80 = "Waaah!?\nO-oh, welcome back, Sensei..."
20017-90 = "I-I was waiting\nfor you...!"
20017-100 = "Hehe... yes, you might not like it,\nbut I'm the one on duty today."
20017-110 = "Please let me know if you need anything...\nDepending on what it is,\nmaybe I could be of some use..."
20017-120 = "Um, is there anything I should be doing...?\nI've just been here\nwith you since earlier..."
20017-130 = "Something more, like\nsome painful work..."
20017-140 = "...Yes?\nIs it really okay to\njust be like this? ...Really?"
20017-150 = "I read all about it in a magazine\nthe other day, so."
20017-160 = "Hehe...\nMaybe I can be\nof some help..."
20017-170 = "Work is\npainful, but..."
20017-180 = "Life is inherently full of\nsuffering, so it's fine."
20017-190 = "S-Sensei, happy\nbirthday!!"
20017-200 = "Sensei, you've gone through\nsuch painful times over and over\nagain, haven't you?"
20017-210 = "That's amazing,\nit's truly wonderful."
20017-220 = "I'm suffering too, but...\nI'll keep doing my best\nfrom now on."
20017-230 = "People are born to\nsuffer, right?"
20017-240 = "Hehe... that's why I've been\nhaving such a fulfilling life\nfor many years now."
20017-250 = "W-wait, maybe that's wrong...?\nIs that really how it is?"
20017-260 = "Another year has\npassed just like that."
20017-270 = "I wonder how much more suffering\nawaits me this year...\nhehe."
20017-280 = "I read about Christmas\nin a magazine.\nI'm all prepared for everything."
20017-290 = "...Um,\nwhy are you trying\nto run away?"
20017-300 = "Hehe... whether you have your candy stolen\nor get pranked...\nboth are painful, aren't they?"
20017-310 = "A dilemma where both choices\nare painful...\nIt's just like life..."
20017-330 = "L-look, Sensei,\nhere on me..."
20017-340 = "I-it's strange, isn't it?\nIt's different from everyone else's, right!?"
20017-350 = "I had been thinking for a while\nthat it might be weird..."
20017-360 = "So it really\nwas like that...!"
20017-370 = "S-Sensei?\nWhy have you been\nstaring at me...?"
20017-380 = "Don't tell me... is it so strange\nthat you can't even\nlook at it properly!?"
20017-390 = "I see... maybe there's no point\nin me living anymore."
20017-400 = "Why is life\nlike this..."
20017-410 = "Just like this part of me\nthat you can't even look at,\ngrotesque and..."
20017-420 = "S-Sensei...\nat least give me some feedback..."
20017-430 = "If you don't say something like this body is fine\nor that it might be useful,\nthen..."
20017-2600 = "So you intend to work me to the bone,\nSensei... well, there's nothing I can do about it...\nI suppose I'll just accept it, hehe..."
