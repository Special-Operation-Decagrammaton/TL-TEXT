[translation]
10021-10 = "Blue Archive."
10021-20 = "Shirasu Azusa, cheguei ao mar, o local do objetivo.\nVou começar a missão planejada imediatamente.\n...Não é como se eu estivesse animada nem nada do tipo."
10021-30 = "É surpreendentemente fácil de se mover,\nnão é ruim..."
10021-40 = "Sinto como se estivesse\nsendo observada..."
10021-50 = "...Hehe."
10021-60 = "No fim das contas, isso\né fofo..."
10021-70 = "Talvez eu tenha ficado\num pouco cansada..."
10021-80 = "Eu estava esperando, Sensei.\nVamos logo, qual é a\npróxima missão?"
10021-90 = "Se possível,\nqueria ficar assim para sempre..."
10021-100 = "...Hm?\nUé, Sensei,\ndesde quando você...?"
10021-110 = "P-por que você está\nolhando tão fixamente...?"
10021-120 = "S-será que isso\nfoi chamativo demais...?"
10021-130 = "Sinceramente, eu mesma\nnão sei dizer."
10021-140 = "Se a minha aparência atual\nestá boa ou ruim..."
10021-150 = "Por isso... se você diz\nque está bom, Sensei,\nentão está tudo bem."
10021-160 = "Hm?\nO que eu estava fazendo...?"
10021-170 = "Nada, eu não estava fazendo nada."
10021-180 = "...Esse tipo de momento\nnão é ruim."
10021-190 = "Estando com você, Sensei,\neu consigo vivenciar\nvárias coisas."
10021-200 = "Coisas que, antes,\neu nem conseguia imaginar."
10021-210 = "Isso não serve como camuflagem,\ne nem é confiável como proteção..."
10021-220 = "...Mas você diz que é bom?\n...O que isso significa?"
10021-230 = "Feliz aniversário, Sensei."
10021-240 = "Poder viver dias em que\ntenho a tranquilidade de\ndizer algo assim..."
10021-250 = "Eu fico realmente feliz."
10021-260 = "Hm...?\nAniversário...?"
10021-270 = "...Entendi.\n...Obrigada, Sensei."
10021-280 = "Consegui terminar mais um\nano em segurança.\nQue no próximo verão, de novo..."
10021-290 = "N-não, não é como se\neu estivesse esperando por isso..."
10021-300 = "Acho que não é algo\npara se usar em um dia assim..."
10021-310 = "...É por isso que é bom?"
10021-320 = "Não entendo o que quer dizer..."
10021-330 = "Bem, é um dia em que todos\nestão usando trajes chamativos."
10021-340 = "Então eu também... posso\nme exibir um pouquinho,\nserá?"
10021-360 = "Uau...!"
10021-370 = "É a primeira vez que vejo algo assim...\nTudo o que meus olhos alcançam\nbrilha, é incrível..."
10021-380 = "Nunca imaginei que existisse um lugar\nonde eu pudesse observar tudo\nsem ser interrompida por nada..."
10021-390 = "É uma sensação\nmeio estranha..."
10021-400 = "Originalmente, eu não gostava\nmuito de lugares abertos assim."
10021-410 = "Não tem onde se esconder,\ne é difícil ficar alerta\ncom o que está ao redor..."
10021-420 = "Mas agora...\nNão estou nem um pouco insegura."
10021-430 = "Com certeza, isso é...\nSim..."
10021-440 = "No meu campo de visão atual,\nsempre tem..."
10021-450 = "...Você, Sensei,\npor perto."
10021-2600 = "Era exatamente disso que eu precisava, obrigada. Não vou te decepcionar."
