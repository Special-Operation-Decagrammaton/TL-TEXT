[translation]
10021-10 = "ブルーアーカイブ。"
10021-20 = "白洲アズサ、目標地点の海に到着。\nすぐに予定の任務を始める。\n……別に浮かれてるとか、そういうわけじゃない。"
10021-30 = "意外と動きやすいし、\n悪くない……"
10021-40 = "なんだか視線を\n感じるような……"
10021-50 = "……ふふっ。"
10021-60 = "やっぱりこれ、\n可愛い……"
10021-70 = "ちょっと疲れたかも\nしれない……。"
10021-80 = "待ってた、先生。\n早く行こう、\n次の任務は何？"
10021-90 = "できれば、\nこのままずっと……"
10021-100 = "……ん？\nあれ、先生、\nいつの間に……？"
10021-110 = "な、何でそんな\nじっと見てるんだ……？"
10021-120 = "や、やっぱりちょっと\nこれは派手過ぎたか……？"
10021-130 = "正直、自分では\nよく分からない。"
10021-140 = "自分が今どんな姿で、\n良いのか、悪いのかも……。"
10021-150 = "だから……\n先生が良いと言って\nくれるなら、それで良い。"
10021-160 = "ん？\n何をしてたのか……？"
10021-170 = "別に、何もしてなかったよ。"
10021-180 = "……こういう時間も\n悪くない。"
10021-190 = "先生といると\n色んなことが\n経験できる。"
10021-200 = "こんなの、\n前までは想像も\nできなかった。"
10021-210 = "これ、偽装にもならないし、\n防備としても頼りない……。"
10021-220 = "……でもそれが良い？\n……どういう意味だ？"
10021-230 = "誕生日おめでとう。先生。"
10021-240 = "こんなことを言える\n余裕がある日々を、\n一緒に生きられていること……"
10021-250 = "本当に、嬉しく思う。"
10021-260 = "ん……？\n誕生日……？"
10021-270 = "……そっか。\n……ありがとう、先生。"
10021-280 = "また無事に\n一年を終えられた。\n次の夏も、また……"
10021-290 = "い、いや、\n期待してるわけじゃ……。"
10021-300 = "こういう日に着る\nものじゃないと思うけど……"
10021-310 = "……だからこそ良い？"
10021-320 = "意味が分からない……。"
10021-330 = "まあ、みんなが\n派手な衣装を着てる日だし。"
10021-340 = "私もこうして……\n少しくらいは\nしゃいでも良いかな。"
10021-360 = "わぁ……！"
10021-370 = "こんなの初めて……\n目に映る全部が\nキラキラして、すごい……"
10021-380 = "何にも邪魔されずに、\nこうして何もかもを\n見渡せる場所が\nあったなんて……。"
10021-390 = "何だか、\n不思議な感覚……"
10021-400 = "元々、こういう開けた\n場所はあまり\n好きじゃなかった。"
10021-410 = "隠れる場所も無いし、\n周囲の警戒も大変で……"
10021-420 = "でも今は……\n全然不安じゃない。"
10021-430 = "きっとこれは、\nうん……"
10021-440 = "今の私の視界には、\nいつもこうやって……"
10021-450 = "……先生が、\nいてくれるからかな。"
10021-2600 = "ちょうどこういうのが欲しかったところだ、\nありがとう。後悔はさせない。"
