[translation]
10026-10 = "Blue Archive!"
10026-20 = "Cara, por que eu estou usando uma roupa tão estranha assim... Bem, pelo menos é surpreendentemente fácil de se mover, então tudo bem, haha!"
10026-30 = "Por que tem tanta gente me encarando... mais do que o normal? É por causa dessa roupa?"
10026-40 = "É mais fácil de se mover do que com o uniforme de empregada. Não é nada mal."
10026-50 = "Ah? O que você está olhando, hein? Quer brigar?"
10026-60 = "...Hum, não é um lugar ruim. Acho que vou vir aqui de novo qualquer dia."
10026-70 = "O Sensei... não está aqui? Está em uma viagem de negócios? N-não que eu me importe, tanto faz..."
10026-80 = "Oh, é o Sensei! Estava te esperando, me dá um minuto da sua atenção."
10026-90 = "Você chegou na hora certa! Vamos lá, Sensei, vamos juntos!"
10026-100 = "Por que você está me encarando tanto assim...? Tem algo de errado com isso?"
10026-110 = "...Ah? Essa jaqueta?"
10026-120 = "Eu não abro mão disso, não importa o que eu esteja vestindo."
10026-130 = "Ah, que tédio... Me dá qualquer trabalho para fazer."
10026-140 = "Ficar sem fazer nada não combina comigo..."
10026-150 = "Sensei, você não quer nada?"
10026-160 = "...Não, é só que, se você precisasse de algo, eu poderia te ajudar."
10026-170 = "Ei, não toca nas minhas orelhas! ...Espera, pensando bem, essas nem são minhas orelhas de verdade...?"
10026-180 = "Ei, Sensei! Feliz aniversário!"
10026-190 = "Hã? Você está perguntando se eu me vesti assim só para comemorar...?"
10026-200 = "N-não é nada disso, tá?!"
10026-210 = "Ei, Sensei! Você sabe que hoje é um dia especial, né?"
10026-220 = "Ah? Você acha que eu me troquei porque estou animada com o aniversário...?"
10026-230 = "C-claro que não!"
10026-240 = "Ei, vamos contar um com o outro este ano também, Sensei."
10026-250 = "...Digo o mesmo. Pode deixar que eu cuido da sua retaguarda!"
10026-260 = "Presentes de Natal são para crianças...?"
10026-270 = "Idiota, eu sei disso! Não é como se eu tivesse vindo aqui porque queria um!"
10026-280 = "É que todo mundo está usando roupas estranhas hoje, então pensei em entrar no clima também."
10026-290 = "Ficou bom, não ficou?"
10026-310 = "Haa... Q-que olhar é esse?"
10026-320 = "...Hum, OK."
10026-330 = "Colou direito? Ah, está tudo bem, valeu."
10026-340 = "...Só para constar, eu não costumo pedir para ninguém fazer esse tipo de coisa para mim."
10026-350 = "Eu só pedi porque é você, Sensei..."
10026-360 = "...Bem, deixa pra lá. Como sempre, você é um cara estranho, Sensei."
10026-370 = "Mas, é por isso que..."
10026-380 = "...Você já deve saber, mas não conte isso para mais ninguém, entendeu?"
10026-2600 = "Hah, já que prepararam tudo assim, eu tenho que fazer um estrago... Vamos lá, quanto você aguenta?"
