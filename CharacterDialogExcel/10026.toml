[translation]
10026-10 = "ブルーアーカイブ！"
10026-20 = "ったく、なんでこんな変な服を…\nま、意外と動きやすいから良いけどな、ははっ！"
10026-30 = "何だか、\nいつも以上に視線が……\nこの服のせいか？"
10026-40 = "メイド服よりも\n動きやすいな、\n悪くねぇ。"
10026-50 = "あぁん？\n何見てんだこら？\nやる気か？あん？"
10026-60 = "……ふん、\n悪くねぇ場所だな\nまた今度来て\nやるとするか。"
10026-70 = "先生は……\nいねぇのか、出張中か？\nい、いや、別に\nどうでも良いけど……"
10026-80 = "おっ、先生じゃねぇか！\n待ってたぜ、\nちょっと面貸せよ"
10026-90 = "良いタイミングで\n来たじゃねぇか！\nおら、一緒に行くぞ先生！"
10026-100 = "何でそんなじっと\n見てんだよ……。\n何か変か、これ？"
10026-110 = "……あん？\nスカジャン？"
10026-120 = "これは譲れねぇんだよ、\nどんな格好でもな。"
10026-130 = "あー、暇だ……\n何でも良いから\n仕事させてくれ。"
10026-140 = "暇なのは性に合わねえ……。"
10026-150 = "先生は何か\n欲しいもんとかねぇのか？"
10026-160 = "……いや、別に、\n何かあんなら\n協力してやろうかと思って"
10026-170 = "ちょっ、耳は触んな！？\n……や、よく考えたら別にこれ、\nあたしの耳じゃねーな……？"
10026-180 = "よぉ、先生！\n誕生日おめでとさん！"
10026-190 = "は？\nお祝いのためにわざわざ\n着てくれたの……って？"
10026-200 = "べっ、別にそういう\nわけじゃねぇから！？"
10026-210 = "よぉ、先生！\n知ってるよな、\n今日は特別な日だぞ！"
10026-220 = "あん？誕生日で\nテンション上がって\n着替えたのって……？"
10026-230 = "ばっ、ちげぇよ！？"
10026-240 = "よぉ、\n今年もよろしくな、先生。"
10026-250 = "……こちらこそ？\nあぁ、背中は任せとけ！"
10026-260 = "クリスマスプレゼントは\n子供がもらうもの……？"
10026-270 = "馬っ鹿、知ってるっての！？\n別に欲しくてここに\n来たわけじゃねぇから！？"
10026-280 = "今日はどいつもこいつも\n変な服着てるから、\n合わせてやろうかなって\n思ってよ。"
10026-290 = "これなら良いだろ、どうだ？"
10026-310 = "はぁ……\nな、何だよその目は。"
10026-320 = "……ん、OK。"
10026-330 = "ちゃんと貼れたか？\nああ、大丈夫だな、サンキュ。"
10026-340 = "……言っとくけどあたし、\n普段はこういうこと誰かに\nやってもらったりしねぇから。"
10026-350 = "先生だから\nお願いしたんであって……。"
10026-360 = "……まあ良いや。\n相変わらず、\n先生は変なやつだな。"
10026-370 = "ま、だからこそ……ってな。"
10026-380 = "……もう分かってるだろうけど、\nこういうの、\n他のやつには言うんじゃねーぞ？"
10026-2600 = "はっ、ここまでおぜん立てしてもらったら、\n思いっきり派手にやらねーとな……\nさあ、どこまで耐えられる？"
