[translation]
10106-10 = "ブルーアーカイブ。"
10106-20 = "ふふっ、驚きましたか？\nいかがでしょう……これまでの私とは、違うのですよ？"
10106-30 = "も、もしかして私だと\n気づかれているの\nでしょうか……？"
10106-40 = "歌ってしまった\nほうが良いので\nしょうか……？"
10106-50 = "なんだか、浮足立って\n落ち着かない\n心地です。"
10106-60 = "ふふ……少し\nスッキリしますね。"
10106-70 = "もしかして……\n見られているの\nでしょうか？"
10106-80 = "おかえりなさいませ、先生。\nい、いかがでしょう？\n似合っていますか……？"
10106-90 = "お待ちしておりました、先生。\n本日が実りあるもので\nありますよう。"
10106-100 = "様々な出来事が\nあるものですが、"
10106-110 = "まさかこのような服に\n袖を通すことになるとは……"
10106-120 = "最近、先生とお会いする時は、\nいつもこの格好な\n気がしております。"
10106-130 = "その……先生が\nよろしければ……"
10106-140 = "これからも……\nこうしてお会いできれば……"
10106-150 = "これが歌姫……\nなのでしょうか？"
10106-160 = "その……\nさ、サインなど\nいかがでしょう？"
10106-170 = "お誕生日\nおめでとうございます、先生。"
10106-180 = "お祝いのために\nこの衣装で馳せ参じました。"
10106-190 = "ええ、先生のために。\n一曲捧げさせてください。"
10106-200 = "私の誕生日……\n覚えていて\nくださったのですね。"
10106-210 = "ふふっ、お声がけくださった\n時からなんとなくそんな気が\nしておりました。"
10106-220 = "いつでも歌う準備は\nできておりますよ。"
10106-230 = "新年あけまして\nおめでとうございます、先生。\n今年も先生に\n歌を捧げましょう。"
10106-240 = "先生、共に\n聖歌を捧げませんか？"
10106-250 = "ふふ、\nそのための衣装ですから。"
10106-260 = "ハロウィーンは仮装の日では\nありませんが……"
10106-270 = "ふふ、でも先生がやって\nみたいのでしたら構いません。"
10106-280 = "いたずら、\nして差し上げましょうか？"
10106-300 = "こ、これは……！？"
10106-310 = "い、一体何ですか……！？"
10106-320 = "私の……ポスター？"
10106-330 = "い、いえ……それは\n見れば分かるのですが……！"
10106-340 = "シスターの皆様と、\n先生が……？"
10106-350 = "な……なんと申し上げれば\nよいのでしょう……。"
10106-360 = "その……いえ、\n申し訳ございません。\n責めているわけではなくて……"
10106-370 = "言葉にするのが\n難しいだけで……"
10106-380 = "でも、そうですね……\nこれだけはハッキリと\n伝えられます。"
10106-390 = "本当に……心の底から"
10106-400 = "とても、嬉しく\n思っております。"
10106-2600 = "私に、それを……？\nいえ、どのような格好でも私は私。\n仰るとおりですね。謹んで頂戴いたします。\nありがとうございます、先生。"
