[translation]
10106-10 = "Blue Archive."
10106-20 = "Fufu, ficou surpreso? Como estou... diferente de como costumo ser, não acha?"
10106-30 = "V-você por acaso já percebeu que sou eu...?"
10106-40 = "Será que seria melhor eu cantar...?"
10106-50 = "Sinto-me um pouco inquieta e sem saber como agir."
10106-60 = "Fufu... sinto-me um pouco mais leve."
10106-70 = "Será que... estou sendo observada?"
10106-80 = "Bem-vindo de volta, Sensei. E-então, o que achou? Combina comigo...?"
10106-90 = "Estava à sua espera, Sensei. Que o seu dia seja muito produtivo."
10106-100 = "Muitas coisas acontecem, mas..."
10106-110 = "Quem diria que eu acabaria vestindo algo assim..."
10106-120 = "Sinto que, ultimamente, sempre que encontro o Sensei, estou usando este traje."
10106-130 = "Se... se for do seu agrado, Sensei..."
10106-140 = "Gostaria que pudéssemos continuar... nos encontrando assim..."
10106-150 = "Será que é assim que uma diva se sente...?"
10106-160 = "E-então... o que acha de um... autógrafo?"
10106-170 = "Feliz aniversário, Sensei."
10106-180 = "Vim especialmente com este traje para celebrar."
10106-190 = "Sim, para você, Sensei. Deixe-me dedicar uma canção."
10106-200 = "Você se lembrou... do meu aniversário."
10106-210 = "Fufu, desde que você me chamou, eu já sentia que algo assim aconteceria."
10106-220 = "Estou sempre pronta para cantar."
10106-230 = "Feliz Ano Novo, Sensei. Este ano também dedicarei minhas canções a você."
10106-240 = "Sensei, não gostaria de entoar um hino comigo?"
10106-250 = "Fufu, afinal, este traje serve para isso."
10106-260 = "O Halloween não é exatamente um dia para fantasias, mas..."
10106-270 = "Fufu, mas se o Sensei quer tentar, não me importo."
10106-280 = "Quer que eu lhe pregue uma peça?"
10106-300 = "I-isto é...!"
10106-310 = "O-o que é isso, afinal...!"
10106-320 = "Um pôster... meu?"
10106-330 = "N-não, eu sei o que é só de olhar, mas...!"
10106-340 = "As irmãs e o... Sensei...?"
10106-350 = "O-o que eu deveria dizer sobre isso...?"
10106-360 = "Bem... não, peço perdão. Não estou te repreendendo, é só que..."
10106-370 = "É apenas difícil colocar em palavras..."
10106-380 = "Mas, sabe... há uma coisa que posso dizer com clareza."
10106-390 = "Do fundo do meu coração..."
10106-400 = "Estou muito, muito feliz."
10106-2600 = "Para mim? Não, não importa a roupa, eu continuo sendo eu. Você tem razão. Aceitarei com gratidão. Muito obrigada, Sensei."
