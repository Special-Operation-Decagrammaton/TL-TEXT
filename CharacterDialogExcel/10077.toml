[translation]
10077-10 = "Blue Archive~."
10077-20 = "Ah, veio me buscar? Se tivesse me avisado, eu teria ido até você~. Me apresentando novamente, sou Ichika, do Comitê de Implementação da Justiça da Academia Trinity. Prazer em conhecê-lo!"
10077-30 = "Oh, é aqui?\nO café do Sensei!"
10077-40 = "Entendo, então\nessa é a sua\npreferência, hein..."
10077-50 = "Aqui é\npacífico, é bom!"
10077-60 = "Tão relaxante..."
10077-70 = "Quer que eu ajude\na arrumar as coisas?"
10077-80 = "Bem-vindo de volta, Sensei!\nVamos dar o nosso melhor\nhoje também!"
10077-90 = "Tcharam!\nIchika, apresentando-se!"
10077-100 = "...Não, na verdade,\né o Sensei quem está chegando!"
10077-110 = "Nossa~\nO trabalho aqui é bem tranquilo!"
10077-120 = "Ah, não digo que é fácil, mas sim sobre a direção das coisas."
10077-130 = "A parte mais difícil é...\nprovavelmente mediar brigas."
10077-140 = "Oh, você também, Sensei?\nSomos parceiros então."
10077-150 = "Todo mundo deveria pegar leve\nem vez de se esforçar\ntanto assim..."
10077-160 = "Se eu tivesse algo para carregar\ncomo o Sensei...\nserá que eu também me dedicaria a algo?"
10077-170 = "Algum pedido?\nFarei qualquer coisa!"
10077-180 = "Tenho confiança em\nfazer exatamente\no que me pedirem!"
10077-190 = "Feliz aniversário,\nSensei!!"
10077-200 = "Aconteceu algo de bom?\nSe não, vamos criar\nalguma coisa agora mesmo!"
10077-210 = "...Bem, o motivo de eu ter\nvindo aqui justamente no meu aniversário,\nvocê pergunta...?"
10077-220 = "Pois é...\nÉ justamente por ser meu aniversário\nque eu quis vir... sabe? Hehe."
10077-230 = "Feliz Ano Novo,\nSensei!"
10077-240 = "Espero que este ano\npossamos relaxar um pouco!"
10077-250 = "Desculpe por estar tão\nagitada desde cedo hoje!"
10077-260 = "O Comitê de Implementação da Justiça\né chamado para todo lado,\nentão..."
10077-270 = "Estou ficando tonta~!"
10077-280 = "Sinto que algo\nruim vai acontecer..."
10077-290 = "Mas bem,\nacho que vai ficar tudo bem,\nné? Haha!"
10077-310 = "Haha!\nSensei, aqui! Aqui!\nConsegue ver?"
10077-320 = "Ah, isso é só\num balão, mas..."
10077-330 = "Não sei por que, mas segurar isso\nme faz parecer uma criança\nse divertindo no parque de diversões... haha."
10077-340 = "Ah! Não é meu!\n...É que, por acaso,\nacabou sobrando para mim."
10077-350 = "Ah, nossa...\nÉ verdade, mas...\ncomo você sabia?"
10077-360 = "Por que será...?\nFicou estampado no meu rosto...?"
10077-370 = "Bem, deixa pra lá...\nÉ a primeira vez que vejo o Sensei\ndesse ângulo."
10077-380 = "Sinto que, quando o ponto de vista muda,\na forma como vemos as coisas\ntambém muda..."
10077-390 = "...É, de certa forma, interessante."
10077-400 = "Gostei dessa sensação!\n...Haha!"
10077-2600 = "Como posso dizer... bem... sou muito grata por ser tratada tão bem, mas não sei se tenho valor para tanto... Mas... estou feliz. De verdade."
