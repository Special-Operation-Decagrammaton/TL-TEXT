[translation]
10077-10 = "ブルーアーカイブ～。"
10077-20 = "あれっ、迎えに来てくれたっすか？言ってくれたらこっちから向かったのに～。改めまして、トリニティ総合学園、正義実現委員会のイチカっす。よろしくっす！"
10077-30 = "おっ、ここっすか？\n先生のカフェ！"
10077-40 = "なるほど、\nこういう趣味\nだったんすね……。"
10077-50 = "ここ、\n平和でいいっすね！"
10077-60 = "落ち着く……。"
10077-70 = "片付けでも\n手伝いますか……。"
10077-80 = "おかえりっす、先生！\n今日も一日、\n頑張っていくっすよ～！"
10077-90 = "じゃじゃーん！\nイチカ、登場っす！"
10077-100 = "……じゃなく、\n先生の、登場っす！"
10077-110 = "いや～\nここの仕事は楽っすね！"
10077-120 = "あ、簡単って意味じゃなくて、\n方向性の話っすよ。"
10077-130 = "一番大変なのは……\nケンカの仲裁っすかね。"
10077-140 = "お、先生もっすか？\n仲間っすね。"
10077-150 = "みんなも全力でやらないで、\nそこそこで\n留めればいいのに……。"
10077-160 = "私も先生みたいに、\n背負うものができたら……\n何かに夢中になれるんすかね？"
10077-170 = "頼み事っすか？\nなんでもするっすよ！"
10077-180 = "言われた通りに\n何かをするのは、\n自信あるっす！"
10077-190 = "お誕生日おめでとうっす、\n先生！！"
10077-200 = "何かいいことあったんすか？\nなかったら、\n今から一緒に作りにいくっす！"
10077-210 = "…ええと、誕生日に、\nわざわざここに来た理由、\nっすか……？"
10077-220 = "そっすねぇ……\n誕生日だからこそ、\n来てみた……てきな？ひひ。"
10077-230 = "明けましておめでとうっす、\n先生！"
10077-240 = "今年こそ、\nのんびりできるといいっすね！"
10077-250 = "今日は朝から\nバタバタしちゃってすみません！"
10077-260 = "正義実現委員会は\nあっちこっちから\n呼ばれることが多くて……"
10077-270 = "目が回るっす～！"
10077-280 = "なんか嫌な\n予感がするっす……。"
10077-290 = "でもまあ、\n別に大丈夫じゃないっすかね？\nはは！"
10077-310 = "はは！\n先生、こっちっす！こっち！\n見えるっすか？"
10077-320 = "あーこれはただの\n風船っすけど……。"
10077-330 = "なんだか、コレ持ってると\n遊園地ではしゃぐ子供みたいに\n見えちゃうっすね……はは。"
10077-340 = "あ！私のじゃないっすよ！\n……その、成り行きで、\nちょっと。"
10077-350 = "あ、あれっ……\nそうなんすけど……\nどうして分かるんすか？"
10077-360 = "なんでだろ……？\n顔に出ちゃってたとか……？"
10077-370 = "まぁいいや……\nこの角度から先生を見るのは、\n初めてっすね。"
10077-380 = "視点が違うと、\n見え方も違ってくる\n気がするというか……"
10077-390 = "……なんだか、面白いっす。"
10077-400 = "この感じ、気に入ったっす！\n……はは！"
10077-2600 = "なんというか……ええっと……\nこんなに良くしてもらえるのは、\nとてもありがたいのですけど、\n私にそんな価値があるかどうかは……。\nでも……嬉しいです。本当に。"
