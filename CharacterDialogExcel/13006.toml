[translation]
13006-20 = "Tcharam! Finalmente cheguei!\nVamos nos divertir agora, Sensei!"
13006-30 = "É divertido, então\nestá tudo bem."
13006-40 = "Hmm? Aquilo ali\nnão parece legal também?"
13006-50 = "Kufufu~♥"
13006-60 = "Me faz um carinho~"
13006-70 = "Vamos brincar juntos~"
13006-80 = "Bom dia, Sensei~\nVim aqui para te dar um castigo~"
13006-90 = "Que tipo de missão\nvamos fazer hoje?\nVamos começar pelas divertidas!"
13006-100 = "Sensei,\no que vamos brincar hoje?"
13006-110 = "O quê?! Está ocupado?\nDeixa esse trabalho para depois,\nnão pode?"
13006-120 = "Que tal continuarmos\naquela brincadeira de antes?"
13006-130 = "Aquilo... foi divertido, não foi?"
13006-140 = "Kufufu~♥\nSua expressão de vergonha é engraçada."
13006-150 = "Ah,\nserá que brinquei demais?\nTalvez eu leve uma bronca..."
13006-160 = "É o aniversário do Sensei?!\nEsse é um dia\nsuper importante!\nVamos comemorar!"
13006-170 = "Vamos fazer uma festa\nno escritório da Problem Solver 68!"
13006-180 = "Hoje é o\nmeu aniversário!"
13006-190 = "Sensei~, você vai...\nbrincar comigo, né~?!"
13006-200 = "Este ano vamos nos divertir\nainda mais que no ano passado~"
13006-210 = "Kufufu, estou ansiosa~♥"
13006-220 = "Tcharam!\nO presente de Natal\nsou eu!"
13006-230 = "Que tal desamarrar o laço?\nKufufufu♥"
13006-240 = "Se não me der doces~\nvou fazer uma travessura~"
13006-250 = "Hmm? Vai me dar mesmo?\nEu prefiro travessuras\ndo que doces, sabe."
13006-270 = "Ah, que pena.\nKufufu, fui descoberta, né~♪"
13006-280 = "Quem diria, a cliente fofa de hoje não era ninguém menos que eu, a Mutsuki~."
13006-290 = "Pense bem, Sensei~.\nEu nunca iria resolver um pedido da Problem Solver sozinha, não é?"
13006-300 = "Ahaha, o que achou, Sensei?\nMinha travessura foi\nquase perfeita, né?"
13006-310 = "Kya-ha, o que foi, Sensei?\nCom essa cara de bobo.\nQue engraçado! Ahaha~♪"
13006-320 = "Hoje nós fizemos\ntantas coisas, Sensei."
13006-330 = "Comemos crepe, fomos ao parque de diversões, ah, e até viramos cúmplices na biblioteca...!"
13006-340 = "Ah, eu achei que conseguiria te enganar perfeitamente até o fim, que pena~."
13006-350 = "Mas da próxima vez, eu definitivamente vou conseguir te enganar até o fim, então pode esperar~!"
13006-360 = "Ah, hoje foi\nrealmente divertido!"
13006-2600 = "Sensei!\nOlha só, essa arma,\nparece muito forte e, além disso, é fofa!"
