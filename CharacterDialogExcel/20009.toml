[translation]
20009-10 = "Blue Archive."
20009-20 = "Não importa o quão frio seja o lugar! Afinal, eu sou a grande Secretária-Geral da Academia Federal de Red Winter!"
20009-30 = "Munia... estou com sono..."
20009-40 = "Quem estiver vadiando, será expurgado!"
20009-50 = "O desenvolvimento do novo resort está indo bem?"
20009-60 = "(Hehe! Parece que todos não conseguem tirar os olhos da minha figura cheia de dignidade!)"
20009-70 = "(...Será que eu deveria ter trazido mais medalhas?)"
20009-80 = "Bem-vindo, Camarada! Vamos, vamos aproveitar o banquete de inverno juntos!"
20009-90 = "Você está atrasado, Camarada! Mesmo sendo você, sabotagem é um crime grave!"
20009-100 = "Hehe, minha autoridade continua brilhando intensamente até mesmo neste resort!"
20009-110 = "Quem dera a Academia Federal de Red Winter tivesse tantas fontes termais magníficas quanto Gehenna..."
20009-120 = "...E se eu simplesmente tomasse posse da Academia Gehenna...?"
20009-130 = "Hehe, hehehehehe...!"
20009-140 = "Aquele bolinho de fonte termal que o pessoal do prédio antigo fez estava delicioso..."
20009-150 = "Hm? Por que estou usando um maiô escolar por baixo do yukata...?"
20009-160 = "Usar roupa de banho ao entrar na banheira é o básico, não é?"
20009-170 = "Você é surpreendentemente ignorante sobre as coisas, Camarada."
20009-180 = "É verdade que, se eu ficar assim, vou acabar me molhando, mas..."
20009-190 = "É realmente necessário tirar o bigode para entrar na fonte termal?"
20009-200 = "Ugh... Se você ficar me encarando assim... bem, é constrangedor..."
20009-210 = "Hoje é o seu aniversário, Camarada? Reservei a fonte termal só para você, então descanse bastante!"
20009-220 = "Claro, eu também vou entrar com você!"
20009-230 = "Aniversário... Assim, eu subi mais um degrau em direção à vida adulta."
20009-240 = "É um evento muito auspicioso. Pode comemorar em grande estilo, Camarada!"
20009-250 = "Se você e eu estivermos juntos este ano também, a Academia Federal de Red Winter estará segura!"
20009-260 = "A barba do Papai Noel é... de verdade, né?"
20009-270 = "Você viu aquilo, Camarada!? Algo que parecia um demônio assustador acabou de passar na nossa frente!"
