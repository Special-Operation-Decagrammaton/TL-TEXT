20009-470 = "今の見たかカムラッド！？\nさっき怖い鬼みたいのが、\n目の前を通り過ぎたんだ！"
20009-480 = "……え、ハロウィンの仮装？"
20009-490 = "ううっ……おいらを\n驚かせるようなやつらは、\nとにかく全部粛清だ、粛清！"
20009-510 = "お風呂上がりの\nフルーツ牛乳……\nこれは素晴らしいな！"
20009-520 = "うん？\nどうかしたのか、\nカムラッド？"
20009-530 = "おいらの顔に\n何かついてるか？"
20009-540 = "……なに？\n口の周りに\n髭みたいな痕が……！？"
20009-550 = "うおぉ、本当だ！？\n牛乳を飲んだだけなのに、\nこんなに素晴らしい髭が！"
20009-560 = "こんなに美味しい\n飲み物なのに、\n新しい髭まで手に入るとは……"
20009-570 = "素晴らしい！\nカムラッド、もっとだ！\nもっとこのフルーツ牛乳を\nたくさん取ってきてくれ！"
20009-2600 = "おお、危ない危ない、うっかりしていた。\nリゾート地だとしても、\n権威の象徴を手放すわけにはいかない。\n髭とか、髭とか……あと髭とかな！"
