[translation]
20009-10 = "ブルーアーカイブ。"
20009-20 = "どれだけ寒い場所だとしても関係ない！\nなんたっておいらは、\nレッドウィンター連邦学園の偉大な書記長だからな！"
20009-30 = "むにゃ……ねむい……"
20009-40 = "怠けてるやつらは、\n全員粛清だ！"
20009-50 = "新しいリゾート地の\n開発は順調か？"
20009-60 = "（ふふっ！みんな、\nおいらの\n威厳に溢れた姿から\n目が離せないようだな！）"
20009-70 = "（……もっとたくさん\n勲章を付けてきた方が\n良かったかな？）"
20009-80 = "よく来たな、カムラッド！\nさあ、共に冬の宴を\n楽しむとしよう！"
20009-90 = "遅いじゃないか、カムラッド！\nたとえカムラッドでも、\nサボタージュは重罪だぞ！"
20009-100 = "ふふっ、このリゾート地でも\n相変わらずおいらの\n権威は光り輝いてるな！"
20009-110 = "レッドウィンター連邦学園にも\nゲヘナみたいに、立派な温泉が\nたくさんあったら\n良かったのに……"
20009-120 = "……いっそのこと、\nおいらがゲヘナ学園を\n手に入れてしまえば……？"
20009-130 = "ふふ、ふふふふふっ……！"
20009-140 = "旧校舎のやつらが\n作った温泉饅頭、\n美味しかったな…。"
20009-150 = "ん？どうして浴衣の\n下にスクール水着を\n着てるのか……？"
20009-160 = "湯船に入る時に水着を\n着用するのは常識ではないか。"
20009-170 = "カムラッドは\n意外と世間知らずだな。"
20009-180 = "確かにそのままでは\n濡れてしまうが……"
20009-190 = "温泉に入る時は、\nどうしてもひげを\n外さないとダメか？"
20009-200 = "うぅっ……\nそうやってじっと見られると……\nその、恥ずかしい……"
20009-210 = "今日はカムラッドの誕生日だな？\n特別に温泉を貸し切って\nやったから、\nゆっくり休むと良い！"
20009-220 = "もちろん、おいらも\n一緒に入るからな！"
20009-230 = "誕生日……\nこうしておいらはまた、\n大人の階段を\nひとつ登ったわけだ。"
20009-240 = "大変めでたいことだからな。\n盛大に祝ってくれて良いんだぞ、\nカムラッド！"
20009-250 = "今年もカムラッドとおいらが\n一緒にいれば\nレッドウィンター連邦学園は\n安泰だな！"
20009-260 = "サンタクロースの髭って……\n本物なんだよな？"
20009-270 = "今の見たかカムラッド！？\nさっき怖い鬼みたいのが、\n目の前を通り過ぎたんだ！"
20009-280 = "……え、ハロウィンの仮装？"
20009-290 = "ううっ……おいらを\n驚かせるようなやつらは、\nとにかく全部粛清だ、粛清！"
20009-300 = "よく来たな、カムラッド！\nさあ、共に冬の宴を\n楽しむとしよう！"
