[translation]
20034-10 = "ブルーアーカイブ、フフッ。"
20034-20 = "年の暮れ……そして新年。\n言葉の響きに胸が躍りますね。\nそこに美味しいお料理があれば、言うことなしです★"
20034-30 = "今日の日替わり\nメニューは\nなんでしょう～？"
20034-40 = "特別な料理を食べて、\n素晴らしい時間を過ごす…\nなんて素敵なんでしょう★"
20034-50 = "口コミの力は\n凄まじいです。読んで\nいるだけでお腹が空いて\nきちゃいますから。"
20034-60 = "評価の点数より、\nレビュー数のほうが\n大事ですよ？"
20034-70 = "私だって、いつも\n食べ物のことばかり\n考えてるわけじゃ、\nないですよ～？"
20034-80 = "あら★いらしたんですね、先生。"
20034-90 = "それでは、\n今から食べたい\n物をお伝えします～"
20034-100 = "おかえりなさい、先生★"
20034-110 = "ずーっと、先生のこと\n待ってました。"
20034-120 = "いつから、ですか？"
20034-130 = "それは秘密です★"
20034-140 = "どうでしょう～？私の着物姿。"
20034-150 = "可愛いって言いたくなったり……\nしませんか～？"
20034-160 = "今なら！私とのデートが！\nなんと0円！お買い得ですよ～！"
20034-170 = "……あ、サボろうとしてるんじゃ\nないかって疑ってますね？"
20034-180 = "私をなんだと思ってるんですか？\n……正解です★"
20034-190 = "フフッ、先生のそばにいると、\nついはしゃいでしまいます。\nどうしてでしょうね～？"
20034-200 = "私、先生に期待しても、\nいいですか～？"
20034-210 = "……あらま、二つ返事だなんて。"
20034-220 = "とんでもないことを、期待しちゃ\nうかもしれないのに…？フフッ★"
20034-230 = "え？何をしてるの、って？"
20034-240 = "ご覧の通り、先生に\n寄りかかってるんですよ～？"
20034-250 = "フフッ、嫌です、離れません、\nこのままがいいです★"
20034-260 = "誕生日ですね、先生！\n自分のことのように嬉しいです！"
20034-270 = "あら？違いますよ、\n決してバースデーケーキが\n楽しみだからでは……"
20034-280 = "……あります★"
20034-290 = "誕生日お祝い、ありがとう\nございます、先生。"
20034-300 = "では祝ってくださったついでに～\nホールケーキをもう3個、\nいただいてもいいですか～？"
20034-310 = "新年明けまして\nおめでとうございます～★"
20034-320 = "さあ、お節を食べに\n行きましょう！"
20034-330 = "運転は私がしますから。\n先生、急いでください！"
20034-340 = "クリスマス……\n大晦日……年明け……"
20034-350 = "フフッ、私の大好きな\nシーズンです。"
20034-360 = "だって、美味しいものが\nいっぱいなんですもの！"
20034-370 = "お菓子をもらったら、\nイタズラしちゃ\nいけないんですか？"
20034-380 = "……別にそんな決まりはない？"
20034-390 = "今の話……\n本気にしちゃいますよ……？"
20034-400 = "ふふふ……★"
20034-420 = "ふぅ……思ったより、\n力が要りますね。"
20034-430 = "大丈夫ですよ、先生。\nまだいけます。"
20034-440 = "気遣ってくださって\n嬉しいです……でもやっぱり、\n楽しみで仕方がないんです。"
20034-450 = "どんなお餅ができるのか。"
20034-460 = "それでどんな\n料理が作れるのか……"
20034-470 = "……それを、先生と\n一緒に食べられると思うと……"
20034-480 = "……ねえ、先生。"
20034-490 = "お餅ができたら、\n一番に食べてほしいです。\nいいですよね？"
20034-2600 = "わあ～！ありがとうございます★\nこれでぜ～んぶ、吹き飛ばせちゃいます！\nフフッ……大丈夫ですよ、先生。\nちゃんと手加減しますから★"
