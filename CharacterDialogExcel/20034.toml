[translation]
20034-10 = "Blue Archive, hehe."
20034-20 = "O fim do ano... e o ano novo.\nO som dessas palavras faz meu coração disparar.\nE se tiver uma comida deliciosa, não tem como ficar melhor★"
20034-30 = "Qual será o\nprato do dia\nde hoje~?"
20034-40 = "Comer uma comida especial e\npassar um tempo maravilhoso...\nNão é simplesmente fantástico?★"
20034-50 = "O poder das avaliações\né incrível. Só de ler,\njá fico com fome."
20034-60 = "O número de avaliações\né mais importante\ndo que a nota, sabe?"
20034-70 = "Eu não fico pensando em\ncomida o tempo todo,\nsabe~?"
20034-80 = "Ah★ Você chegou, Sensei."
20034-90 = "Então, vou te contar\no que quero comer\nagora mesmo~"
20034-100 = "Bem-vindo de volta, Sensei★"
20034-110 = "Eu estava te esperando\nhá tanto tempo."
20034-120 = "Desde quando, você pergunta?"
20034-130 = "Isso é segredo★"
20034-140 = "O que achou~? Do meu quimono."
20034-150 = "Você não sente vontade de dizer...\nque estou fofa~?"
20034-160 = "Aproveite! Um encontro comigo!\nCusta apenas 0 reais! É uma pechincha~!"
20034-170 = "...Ah, você está suspeitando que\neu estou tentando vadiar, não é?"
20034-180 = "O que você pensa de mim?\n...Você acertou em cheio★"
20034-190 = "Hehe, quando estou perto do Sensei,\nacabo ficando animada.\nPor que será, hein~?"
20034-200 = "Posso ter expectativas\nsobre você, Sensei~?"
20034-210 = "...Nossa, você aceitou de primeira."
20034-220 = "Mesmo que eu acabe esperando\npor algo absurdo...? Hehe★"
20034-230 = "Hã? O que estou fazendo, você pergunta?"
20034-240 = "Como pode ver, estou\nme encostando em você, Sensei~?"
20034-250 = "Hehe, não quero, não vou sair,\nquero ficar assim mesmo★"
20034-260 = "É seu aniversário, Sensei! Estou tão feliz\nquanto se fosse o meu!"
20034-270 = "Ah? Não é isso, não é que eu\nesteja ansiosa pelo bolo de\naniversário..."
20034-280 = "...Na verdade, estou sim★"
20034-290 = "Obrigada por me deixar comemorar\nseu aniversário, Sensei."
20034-300 = "Já que você está comemorando, posso\npedir mais 3 bolos inteiros\npara comer~?"
20034-310 = "Feliz Ano Novo\npara você~★"
20034-320 = "Vamos lá, vamos comer\ncomida de ano novo!"
20034-330 = "Eu dirijo.\nSensei, se apresse!"
20034-340 = "Natal...\nVéspera de Ano Novo... Ano Novo..."
20034-350 = "Hehe, é a minha\ntemporada favorita."
20034-360 = "Porque tem um monte de\ncoisas deliciosas!"
20034-370 = "Se eu ganhar doces,\nnão posso fazer\nnenhuma travessura?"
20034-380 = "...Não existe nenhuma regra assim?"
20034-390 = "Vou levar o que você\nacabou de dizer... a sério, viu...?"
20034-400 = "Fufufu...★"
20034-420 = "Ufa... exige mais força\ndo que eu pensava."
20034-430 = "Está tudo bem, Sensei.\nEu ainda aguento."
20034-440 = "Fico feliz que esteja preocupado\ncomigo... mas, no fundo, estou\nanimada demais para parar."
20034-450 = "Como será que o mochi vai ficar?"
20034-460 = "E que tipo de prato\nserá que vou conseguir fazer..."
20034-470 = "...Só de pensar em comer isso\ncom você, Sensei..."
20034-480 = "...Ei, Sensei."
20034-490 = "Quando o mochi ficar pronto,\nquero que você seja o primeiro a comer.\nTudo bem?"
20034-2600 = "Uau~! Muito obrigada★\nCom isso, vou conseguir mandar tudo pelos ares!\nHehe... não se preocupe, Sensei.\nEu vou pegar leve, prometo★"
