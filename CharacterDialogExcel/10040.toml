[translation]
10040-10 = "Blue Archive..."
10040-20 = "Olá... Eu sou a Oono Tsukuyo... Sou membro do Clube de Pesquisa de Ninjutsu... Prazer em conhecê-lo..."
10040-30 = "(Eu sou uma árvore... Eu sou apenas uma árvore...)"
10040-40 = "(Eu sou o cenário... Eu sou apenas uma peça de mobília...)"
10040-50 = "(Se eu pudesse ser como aquela mobília... seria invejável...)"
10040-60 = "Ah, me desculpe... Estou atrapalhando, não estou...?"
10040-70 = "Sinto que estou me destacando demais..."
10040-80 = "Olá, Sensei... Bem, eu..."
10040-90 = "Não, não é nada..."
10040-100 = "É que... eu estou de plantão, sinto muito por isso..."
10040-110 = "Por acaso... você me chamou...?"
10040-120 = "Ah, não, eu não estou tentando fugir..."
10040-130 = "Eu sou grande, não estou atrapalhando...? Você consegue ver a paisagem atrás de mim...?"
10040-140 = "Se quiser, eu posso me agachar..."
10040-150 = "Mesmo que eu me esconda, com este corpo, logo..."
10040-160 = "Sensei... É o seu aniversário, não é? Parabéns...!"
10040-170 = "Um presente de aniversário... Quer ver o jutsu de substituição? Ehehe..."
10040-180 = "O meu aniversário...? Ah, não precisa..."
10040-190 = "Ehehe... Muito obrigada...! Estou feliz, de verdade... do fundo do meu coração...!"
10040-200 = "Feliz Ano Novo, Sensei."
10040-210 = "Este ano também, por favor, treine ninjutsu comigo...!"
10040-220 = "Natal... Quer que eu me transforme em uma árvore de Natal?"
10040-230 = "Não, é que... se o Sensei quiser... eu adoraria ser decorada no Schale..."
10040-240 = "Halloween... Quer que eu faça o papel de um oni?"
10040-250 = "Ah, é mesmo...? Então, quem vai receber os feijões..."
10040-260 = "Ah, não é esse tipo de dia...? Entendo..."
10040-280 = "Ugh... Eu tentei pegar um atalho passando por aqui, mas..."
10040-290 = "Como pode ver, acabei ficando presa no meio do caminho..."
10040-300 = "Mas, é nessas horas que... com ninjutsu, eu deveria conseguir...!"
10040-310 = "Nnn... Nnnnnnnnnnn...!!"
10040-320 = "Como esperado, não deu certo..."
10040-330 = "Ugh, ugh..."
10040-340 = "Sensei... você poderia me ajudar...?"
10040-2600 = "Eu posso mesmo receber algo tão incrível...? Eu tenho esse direito...? É o suficiente? ...Muito obrigada, Sensei. Continuarei me esforçando. Pelo bem do Sensei...!"
