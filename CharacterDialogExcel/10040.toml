[translation]
10040-10 = "ブルー、アーカイブ……。"
10040-20 = "こんにちは……大野ツクヨ、です……。\n一応、忍術研究部の部員で……\nよろしく、お願いします……。"
10040-30 = "（私は木……\n私はただの木……）"
10040-40 = "（私は背景……\n私は、ひとつの\n家具……）"
10040-50 = "（いっそ、あの家具\nみたいになれたら\n……羨ましい）"
10040-60 = "あ、申し訳\nありません……\n邪魔、ですよね……？"
10040-70 = "何だか、目立って\nしまってるような……"
10040-80 = "こんにちは、先生……\nあの、私……"
10040-90 = "いえ、何でも、\nありません……"
10040-100 = "その……私が当番で、\n何だか、ごめんなさい……"
10040-110 = "もしかして……\n私のこと、呼びました……？"
10040-120 = "あ、いえ、\n逃げているわけでは……"
10040-130 = "私、大きくて、\n邪魔じゃない、ですか……？\n後ろの景色、見えます……？"
10040-140 = "あれでしたら、\nしゃがんでますので……"
10040-150 = "隠れても、\nこの身体だとすぐに……"
10040-160 = "先生……\nお誕生日、ですよね？\nおめでとう、ございます……！"
10040-170 = "誕生日プレゼント……\n変わり身の術とか、\n見てみます？えへへっ……"
10040-180 = "私の、誕生日……？\nえ、そんな……"
10040-190 = "えへへっ……ありがとう、\nございます……！嬉しいです、\n本当に……心から……！"
10040-200 = "あけまして、\nおめでとうございます。先生。"
10040-210 = "今年も一緒に、\n忍術の訓練、\nお願いします……！"
10040-220 = "クリスマス……\n私、クリスマスツリーに、\nなりましょうか？"
10040-230 = "いえ、その……先生が、\nよろしければ……シャーレに\n飾ってほしいな、なんて……"
10040-240 = "ハロウィーン……\n私、鬼の役、やりましょうか？"
10040-250 = "え、そうなんですか……？\nでは、豆を受けるのは、誰が……"
10040-260 = "あ、そういう日ではない、\nですか？そうでしたか……"
10040-280 = "うぅっ……。\nここを通って、近道しようと、\nしたのですが……"
10040-290 = "見ての通り、途中で、\n挟まってしまい……。"
10040-300 = "ですが、こういう時こそ……\n忍術で、どうにか……！？"
10040-310 = "んんっ、\nんんんんんんんっ……！！"
10040-320 = "やっぱり、無理でした……"
10040-330 = "うっ、うっ……"
10040-340 = "先生……手伝って、\nくれませんか……。"
10040-2600 = "こんなにすごいものを、私が、\n受け取っても……？私にそんな、資格、\nあるんでしょうか……？十分、ですか？\n……ありがとうございます、先生。引き\n続き、精進、します。先生の、ために……！"
