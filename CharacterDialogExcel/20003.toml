[translation]
20003-20 = "Mashiro, aluna do primeiro ano do Comitê de Justiça, apresentando-se conforme solicitado.\nEmbora eu ainda seja inexperiente, darei o meu melhor em todos os momentos."
20003-30 = "Será que a Tsurugi-senpai\nnão gostaria desse tipo\nde decoração...?"
20003-40 = "As asas da Hasumi-senpai\npareciam ser tão fofinhas\nquanto este móvel."
20003-50 = "Mente serena como um espelho d'água..."
20003-60 = "Será que o pescoço da\nTsurugi-senpai está bem...?"
20003-70 = "De vez em quando, um lugar\nassim não é nada mal."
20003-80 = "Que fofo...\nHehe."
20003-90 = "Bem-vindo, Sensei.\nVamos nos esforçar juntos\npela justiça hoje também."
20003-100 = "Eu estava esperando por você.\nEstou pronta para suas ordens."
20003-110 = "Ah, vamos sair em missão?"
20003-120 = "Me chamou, Sensei?"
20003-130 = "O objetivo do nosso\nComitê de Justiça é..."
20003-140 = "Destruir o mal e restaurar\na justiça nesta escola."
20003-150 = "...É isso."
20003-160 = "Para realizar a\njustiça, eu jurei..."
20003-170 = "Suportar qualquer treinamento árduo\nou provação que esgote\nos nervos,"
20003-180 = "não importa o quanto fosse..."
20003-190 = "Mas o tempo que passo\ncom as minhas senpais\né tão divertido que..."
20003-200 = "Peço desculpas, mas acabo\nesquecendo da justiça\npor um momento."
20003-210 = "Ah... só para constar,\nquero deixar claro que..."
20003-220 = "O que você está tocando agora\nnão é um console de\noperações táticas..."
20003-230 = "Feliz aniversário,\nSensei."
20003-240 = "Rezo para que o seu dia\nseja repleto de justiça."
20003-250 = "Sério? Então hoje era\no meu aniversário..."
20003-260 = "Eu tinha esquecido completamente."
20003-270 = "Obrigada por se lembrar de mim."
20003-280 = "Feliz Ano Novo. Este ano,\nme esforçarei ainda mais..."
20003-290 = "para conseguir expulsar\no mal desta terra\ndefinitivamente."
20003-300 = "É um dia sagrado\npara Trinity."
20003-310 = "Será que mesmo em um dia assim,\nos malfeitores de Gehenna\ncontinuam cometendo\nseus atos malignos...?"
20003-320 = "Começou o feriado que celebra\ntodos os santos de Trinity."
20003-330 = "Um fantasma de abóbora...?\nTeve um pesadelo?"
20003-350 = "Ufa...\nEstá quente só hoje, não é?"
20003-360 = "Para um disparo perfeito,\nconsigo suportar esse\nnível de calor tranquilamente."
20003-370 = "Será que estou... com\ncheiro de suor...?"
20003-380 = "Em um dia de verão como este,\ninvejo o uniforme branco\ndas outras alunas."
20003-390 = "Sensei...\nSinto que o seu olhar\nestá um pouco indiscreto..."
20003-400 = "Você está mantendo o foco\nno alvo, não está?"
20003-2600 = "Isto sim é...\na verdadeira justiça..."
