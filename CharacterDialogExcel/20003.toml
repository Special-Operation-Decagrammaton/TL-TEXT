[translation]
20003-20 = "正義実現委員会1年生マシロ、\nお呼びが掛かりましたのでこちらに。\n未熟者ですが、いついかなる時もベストを尽くします。"
20003-30 = "こういう装飾、\nツルギ先輩は好き\nじゃないかな…"
20003-40 = "ハスミ先輩の羽、\nこの家具みたいに\nフワフワしてそうだったな"
20003-50 = "明鏡止水…"
20003-60 = "ツルギ先輩の首、\n大丈夫なのかな…？"
20003-70 = "たまにはこういうとこも\n悪くないですね。"
20003-80 = "可愛いな…。\nふふっ。"
20003-90 = "ようこそ、先生。\n今日も一緒に、\n正義のために\n頑張りましょう。"
20003-100 = "お待ちしておりました。\nすぐにでもご命令を。"
20003-110 = "あ、出撃ですか？"
20003-120 = "お呼びですか、先生？"
20003-130 = "私たち正義実現\n委員会の目標は"
20003-140 = "悪を滅し、この学園の\n正義を立て直すこと"
20003-150 = "…です。"
20003-160 = "正義を\n実現させる\nためには、"
20003-170 = "苦しい訓練だろうと\n神経をすり減らす\n試練だろうと、"
20003-180 = "いくらでも耐えると\n誓いましたが…"
20003-190 = "先輩たちと\n一緒に過ごす時間が\nあまりにも楽しくて…"
20003-200 = "僭越ですが思わず\n正義のことを\n忘れてしまいそうです。"
20003-210 = "あのお…念のために\n申し上げますが、"
20003-220 = "今触っているのは\n作戦用コンソールでは\nありません…。"
20003-230 = "お誕生日おめでと\nうございます、先生。"
20003-240 = "先生の一日が正義で\n満たされるよう、\nお祈りします。"
20003-250 = "そうですか。今日が私の\n誕生日だったんですね…。"
20003-260 = "すっかり忘れてました。"
20003-270 = "気にかけてくださって、\nありがとうございます。"
20003-280 = "明けましておめでとう\nございます。今年こそ、"
20003-290 = "この地から悪を完全に\n追い出せるよう、\nさらに努力します。"
20003-300 = "トリニティの\n聖なる日ですね。"
20003-310 = "このような日でも、\nゲヘナの悪党たちは\n悪行をなして\nいるんでしょうか…。"
20003-320 = "トリニティのすべての\n聖人を称える祝日が\n始まりました。"
20003-330 = "カボチャのお化け…？\n悪い夢でも見ましたか？"
20003-350 = "ふう…。\n今日に限って暑いですね。"
20003-360 = "完璧な狙撃のためなら、\nこれぐらいの暑さは\n十分耐えられますが。"
20003-370 = "少し…\n汗臭かったり\nしないかな…？"
20003-380 = "こんな夏の日には、\n他の生徒たちの白い制服が\n羨ましいですね。"
20003-390 = "先生…\nなんだか視線が\nいやらしい気がしますが…。"
20003-400 = "きちんと目標を注視されて\nいるんですよね？"
20003-2600 = "これぞ……\n本当の正義……。"
