[translation]
13004-20 = "Sim, sim, finalmente chegamos!\nPrazer em conhecê-lo, Sensei!"
13004-30 = "Que divertido～☆"
13004-40 = "Hm? O que é aquilo?"
13004-50 = "Que coisa bonita.\nSerá que eu deveria dar\nde presente para todo mundo..."
13004-60 = "Definitivamente, precisamos\nreviver o Projeto Idol\nde Abydos～☆"
13004-70 = "Porque as minhas meninas\nsão todas tão fofas."
13004-80 = "Sim, sim～! Seja bem-vindo, Sensei.\nEu estava esperando\npela sua chegada."
13004-90 = "Tenha um bom dia hoje também～\nSensei! Pode deixar\nqualquer coisa comigo."
13004-100 = "Bom trabalho hoje também～☆"
13004-110 = "Hm?\nUm travesseiro de colo?"
13004-120 = "Isso fica para quando\nestiver um pouco mais escuro."
13004-130 = "Não pode, ser mimado\nsó depois que o trabalho terminar～"
13004-140 = "Hum... Sensei, quer que eu\nfaça uma massagem\nno seu lugar?"
13004-150 = "Quando o Sensei está por perto,\neu me sinto tranquila."
13004-160 = "Feliz\naniversário!"
13004-170 = "Se o Sensei não tivesse\nvindo para Abydos..."
13004-180 = "Eu nem consigo imaginar!\nSensei! Muito obrigada\npor ter vindo!"
13004-190 = "Hoje é o meu aniversário.\nSensei, você preparou\num presente para mim?"
13004-200 = "Ah, qualquer coisa serve.\nDesde que tenha sido\nescolhido pelo Sensei."
13004-210 = "Feliz\nAno Novo.\nEste ano... com o Sensei... fufu☆"
13004-220 = "Sensei, que tal irmos\nàs compras para\no Ano Novo?"
13004-230 = "Eu serei a sua\nPapai Noel～☆"
13004-240 = "Uau!\nQue susto!"
13004-250 = "Sensei～ não me\nassuste tanto assim～"
13004-270 = "Muito bem, é hora de limpar os ouvidos.\nFique quietinho,\nSensei?"
13004-280 = "Não se mexa.\nAgora isso vai\nentrar, viu?"
13004-290 = "Se fizer cócegas,\navise, tá? Sim, sim.\nBom garoto, isso mesmo."
13004-300 = "Hum... pensando bem, isso é\num pouco... vergonhoso, não é?\nÉ que o rosto do Sensei está tão perto... hum..."
13004-310 = "Isso é um serviço\napenas para o Sensei,\nentão é um segredinho\nsó nosso, tá?"
13004-320 = "Hm? Se você deitar assim,\neu só consigo ver as suas costas...\nHum... se fizer isso... a respiração..."
13004-330 = "Não pode, Sensei!\nFique deitado\ncorretamente!"
13004-2600 = "Sim, sim.\nEu acho que o poder é uma faca de dois gumes, mas\npara o bem do Sensei e de todos, acho necessário.\nVou usá-lo com cuidado, então fique de olho em mim, Sensei."
