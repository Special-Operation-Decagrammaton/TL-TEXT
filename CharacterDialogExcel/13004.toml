[translation]
13004-20 = "うんうん、やっと到着！\nよろしくお願いします、先生！"
13004-30 = "楽しい～☆"
13004-40 = "うん？あれは何でしょう？"
13004-50 = "キレイな物ですね。\nみんなにプレゼント\nしようかな…。"
13004-60 = "やっぱりアビドス\nアイドルプロジェクトは\n復活させましょう～☆"
13004-70 = "うちの子たちは\nみ～んな可愛いから。"
13004-80 = "うんうん～！ようこそ先生。\nいらっしゃるのを\n待ってました。"
13004-90 = "今日も良い一日を～\n先生！何でも\n私にお任せください。"
13004-100 = "今日もお疲れ様でした～☆"
13004-110 = "うん？\n膝枕ですか？"
13004-120 = "それはもうちょっと\n暗くなってから。"
13004-130 = "ダメです、甘えるのは\n仕事が終わってからですよ～"
13004-140 = "えぇとぉ…。\n先生、代わりにマッサージ\nしてあげましょうか？"
13004-150 = "先生がそばにいると、\nなんだか安心します。"
13004-160 = "お誕生日\nおめでとうございます！"
13004-170 = "先生がアビドスに\n来てなかったら…。"
13004-180 = "なんて想像もつきません！\n先生！来てくださって、\n本当にありがとうございます！"
13004-190 = "今日は私の誕生日なんです。\n先生、私へのプレゼントは\n用意してくれました？"
13004-200 = "えぇ、何でも大丈夫です。\n先生が選んだ物なら。"
13004-210 = "明けまして\nおめでとうございます。\n今年は…先生と…ふふっ☆"
13004-220 = "先生、新年のために\nショッピングにでも\n行きましょう？"
13004-230 = "私がサンタクロースに\nなってあげますから～☆"
13004-240 = "うわっ！\nびっくりした！"
13004-250 = "先生～あまり\n驚かさないでくださいよ～"
13004-270 = "さあ、耳掃除の時間ですよ。\n大人しくしてくださいね、\n先生？"
13004-280 = "もぞもぞしちゃダメです。\n今からこれが\n入るんですからね？"
13004-290 = "くすぐったかったら\n言ってくださいね？うんうん。\nいい子ね、よしよし。"
13004-300 = "えっと…考えてみるとこれ\nちょっと…恥ずかしいんですけど？\nなんか先生の顔が近過ぎて…えっと…。"
13004-310 = "これは先生だけへの\nサービスですから、\n二人だけのひ・み・つですよ？"
13004-320 = "うん？そうやって横になったら\n先生の背中しか見えないので…\nえっと…そうしちゃうと…鼻息が…。"
13004-330 = "ダメです、先生！\nちゃんと横に\nなっててください！"
13004-2600 = "うんうん。\n力というのはもろ刃の剣だと思いますけど、\n先生とみんなの為なら必要だと思います。\n大切に使うから、見守ってくださいね。先生。"
