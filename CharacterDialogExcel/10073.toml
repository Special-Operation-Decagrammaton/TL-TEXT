[translation]
10073-10 = "ブルー…アーカイブ……。"
10073-20 = "う、うう…ただでさえ、外は苦手なのに…\n暑いしジメジメしてるし…これだから夏は…"
10073-30 = "ああ…\nここにも\n人がたくさん…。"
10073-40 = "どこか…ひとりで、\n静かにいられる\n場所は…。"
10073-50 = "この格好のせいか、\nいつもより、\n落ち着かない…。"
10073-60 = "はぁ…全く。"
10073-70 = "でもまあ…\nここの雰囲気は、\n嫌いじゃないかも。"
10073-80 = "あ、先生、\nお待ちしておりました。"
10073-90 = "アメリカーノ、\n淹れてありますので。"
10073-100 = "おかえりなさい、先生。\nお手伝い…しますよ…"
10073-110 = "外出だけは、勘弁ですが。"
10073-120 = "やはり、室内が良いです。\n安心できますので。"
10073-130 = "二人きりだと、\nこんなに静かで、\n心が安らぐのに…。"
10073-140 = "い、いえ、何も\n言ってませんから。"
10073-150 = "書類整理なら、\nお手伝いできますが…"
10073-160 = "パソコンには、少し弱くて…。"
10073-170 = "次回は…古書館で\nお仕事をされてみては、\nいかがですか？"
10073-180 = "先生の頼みでしたら、\nなんでも聞きますよ。"
10073-190 = "せっかくですし…\n少し変わったことでも、\n良いので。"
10073-200 = "お誕生日\nおめでとうございます、先生。"
10073-210 = "あ…この格好は…\n特に意味は、ありません。"
10073-220 = "私の誕生日、ですか…\n今、知りました。"
10073-230 = "先生と一緒にいると、\n他のことを、忘れてしまうと\n言いますか…。"
10073-240 = "あけまして\nおめでとうございます、先生。"
10073-250 = "今年は…\nあまり水辺とかでなく屋内で\n一緒に、過ごしたいです。"
10073-260 = "クリスマス、ですか。"
10073-270 = "別に特別な日では\nありません。"
10073-280 = "…先生に会うまでは、\nの話ですが。"
10073-290 = "外が騒がしいですね、もう…。"
10073-300 = "静かな海に行ったほうが、\nまだマシに思えます。"
10073-320 = "ど、どうですか…？\n私の、隠れ家は…。"
10073-330 = "結構、良い雰囲気ですよね？\nひひ…。"
10073-340 = "先生も、中に入りますか？\n意外と、居心地いいですよ。"
10073-350 = "あ…二人で入るには、\n少し、狭いですかね…。"
10073-360 = "…え？\n見てるだけで、\n十分…？"
10073-370 = "…それだと、先生に\n来ていただいた意味が…。"
10073-380 = "…でも、良いですね、\nこういうの。"
10073-390 = "外も…\n悪いことばかりでは、\nないのかもしれません。"
10073-400 = "…あの、先生…\nもし、よろしければ…。"
10073-410 = "一杯…いかがですか？"
10073-2600 = "あの…今更かもしれませんが…\nここまでしてもらうほどの価値が…\n本当に、私にあるのでしょうか…？\n…すみません、こんなこと、\n言わない約束でしたよね。\nできる限りのことを、します。\n先生の望みですから。"
