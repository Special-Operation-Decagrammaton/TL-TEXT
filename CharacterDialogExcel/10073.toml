[translation]
10073-10 = "Blue... Archive......"
10073-20 = "Ugh, ugh... Eu já não gosto de sair de casa... Está quente, abafado... É por isso que eu detesto o verão..."
10073-30 = "Ah... Tem tanta gente... aqui também..."
10073-40 = "Onde será que tem... um lugar para ficar sozinha... e em silêncio..."
10073-50 = "Talvez seja por causa desta roupa, mas... estou mais inquieta... do que o normal."
10073-60 = "Haa... Francamente."
10073-70 = "Mas, bem... acho que não desgosto... da atmosfera daqui."
10073-80 = "Ah, Sensei, eu estava esperando por você."
10073-90 = "Já preparei um americano para você."
10073-100 = "Bem-vindo de volta, Sensei. Eu... posso te ajudar com algo..."
10073-110 = "Contanto que não seja sair, tudo bem."
10073-120 = "Definitivamente, prefiro ambientes fechados. É onde me sinto segura."
10073-130 = "Quando estamos só nós dois, é tão silencioso... e meu coração fica em paz..."
10073-140 = "N-não, eu não disse nada."
10073-150 = "Se for para organizar documentos, eu posso ajudar..."
10073-160 = "Eu não sou muito boa... com computadores."
10073-170 = "Da próxima vez... que tal trabalharmos... na biblioteca antiga?"
10073-180 = "Se for um pedido seu, Sensei, eu farei qualquer coisa."
10073-190 = "Já que estamos aqui... algo um pouco diferente... também serve."
10073-200 = "Feliz aniversário, Sensei."
10073-210 = "Ah... sobre esta roupa... não tem nenhum significado especial."
10073-220 = "Meu aniversário, é? Acabei de descobrir."
10073-230 = "Quando estou com você, Sensei, parece que... eu me esqueço de todo o resto..."
10073-240 = "Feliz Ano Novo, Sensei."
10073-250 = "Este ano... eu gostaria de passar o tempo com você em um lugar fechado, em vez de perto da água."
10073-260 = "Natal, é?"
10073-270 = "Não é um dia especial para mim."
10073-280 = "...Pelo menos, não até eu conhecer você, Sensei."
10073-290 = "O lado de fora está tão barulhento, meu Deus..."
10073-300 = "Acho que seria melhor ir para um mar silencioso."
10073-320 = "O-o que achou...? Do meu esconderijo..."
10073-330 = "É um ambiente bem agradável, não é? Hehe..."
10073-340 = "Você também quer entrar, Sensei? É surpreendentemente confortável aqui."
10073-350 = "Ah... talvez seja um pouco... apertado para nós dois..."
10073-360 = "...Eh? Só de olhar... já é o suficiente...?"
10073-370 = "...Nesse caso, qual seria o sentido... de você ter vindo, Sensei...?"
10073-380 = "...Mas, sabe, é bom... algo assim."
10073-390 = "Talvez o lado de fora... não seja tão ruim assim."
10073-400 = "...Ei, Sensei... se não se importar..."
10073-410 = "Aceita... uma xícara?"
10073-2600 = "Ei... pode parecer tarde demais para dizer isso, mas... será que eu realmente... valho todo esse esforço...? ...Desculpe, prometemos que eu não diria esse tipo de coisa. Farei tudo o que estiver ao meu alcance. Afinal, é o seu desejo, Sensei."
