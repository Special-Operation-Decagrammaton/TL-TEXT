[translation]
10034-10 = "Blue Archive"
10034-20 = "Fufu. Olá, Sensei.\nSou Mimori, do Clube de Treinamento.\nDe agora em diante, conto com o seu apoio por muito tempo."
10034-30 = "Fico feliz em ver que\ntodos parecem estar se divertindo."
10034-40 = "Preparei um chá para você, Sensei.\nEspero que consiga tomá-lo\nantes que esfrie..."
10034-50 = "Como parte do meu treinamento,\nserá que eu deveria convidar\no Sensei para uma refeição...?"
10034-60 = "Espero que a Kaede-chan\nnão esteja causando problemas\npara o Sensei em algum lugar..."
10034-70 = "Hmm, está um pouco bagunçado.\nAntes que o Sensei volte,\nque tal eu dar uma organizada?"
10034-80 = "Bem-vindo de volta, Sensei."
10034-90 = "Fufu, hoje também estarei aqui\npara ajudar com o que precisar."
10034-100 = "Ah, bem-vindo de volta, Sensei."
10034-110 = "Vamos, sente-se.\nSe não começarmos a trabalhar logo,\nnão vamos terminar a tempo, sabe?"
10034-120 = "Já lavou o rosto hoje de manhã?\nNão pulou nenhuma refeição, pulou?"
10034-130 = "Fufu, sim, fico aliviada.\nEntão, aceita uma xícara de chá delicioso?"
10034-140 = "Se precisar de qualquer coisa,\né só pedir."
10034-150 = "Por favor, sinta-se à vontade\npara me pedir o que quiser."
10034-160 = "Como o Sensei parece estar\nsempre tão ocupado,"
10034-170 = "ter esse tempo a sós\ncom você é algo\nprecioso..."
10034-180 = "Ah, espere... eu acabei\nfalando em voz alta..."
10034-190 = "O sonho que tenho desde pequena\né me tornar alguém como as\npersonagens de mangás e romances:"
10034-200 = "uma noiva maravilhosa."
10034-210 = "Para realizar esse sonho,\ncontinuarei me dedicando\nno Clube de Treinamento\ne aqui também."
10034-220 = "Feliz aniversário,\nSensei."
10034-230 = "Bem... hoje, pelo menos,\nvocê pode se mimar\no quanto quiser, sabia...?"
10034-240 = "O meu... aniversário...?"
10034-250 = "Ufufu,\nmuito obrigada,\nSensei."
10034-260 = "...Hoje já se tornou,\nsem dúvida, o melhor dia de todos."
10034-270 = "Fufu, feliz ano novo,\nSensei."
10034-280 = "Que tal um pouco de amazake\npara aquecer o corpo?"
10034-290 = "Fun fun fun~ fun fun fun~\nfun fun fun, fufun~♪"
10034-300 = "É Natal, Sensei."
10034-310 = "Que tal se saíssemos\npara passear juntos\nesta noite...?"
10034-320 = "Doces ou travessuras, hoje\né dia das bruxas."
10034-330 = "S-se for você, Sensei,\npode me pregar uma peça\nse quiser, sabia...?"
10034-350 = "Fufu, Sensei.\nNão tem problema nenhum\nem olhar um pouco mais de perto."
10034-360 = "Meu treinamento para ser uma noiva...\ne também o meu sonho de me tornar\numa mulher ideal."
10034-370 = "O Sensei sempre esteve ao meu lado,\napoiando e me ajudando\ndessa maneira."
10034-380 = "Muito obrigada.\n...Bem, eu. Com você, Sensei,\ndaqui em diante, para sempre..."
10034-390 = "N-não é nada...!"
10034-400 = "S-sim! O bordado, terminei!"
10034-410 = "Eu me esforcei ao máximo, mas...\nbem, o que achou...?"
10034-2600 = "Você fez isso especialmente para mim...? ...Muito obrigada, Sensei. De agora em diante, me esforçarei mais do que nunca para ser útil a você pelo resto da minha vida."
