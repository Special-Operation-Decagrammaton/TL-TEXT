[translation]
10034-10 = "ブルーアーカイブ"
10034-20 = "ふふっ。ごきげんよう、先生。\n修行部のミモリです。\nこれから、末永くよろしくお願いいたしますね。"
10034-30 = "皆さん楽しそうで\n何よりです。"
10034-40 = "先生のために用意した紅茶、\n冷める前に召し上がって\nいただけると良い\nのですが……。"
10034-50 = "修行の一環として、\n先生をお食事に\nお誘いしてみよう\nかしら……？"
10034-60 = "カエデちゃん、\nどこかで先生にご迷惑を\nかけてたりしないと\nいいのですが……。"
10034-70 = "うーん、\n少し散らかっていますね。\n先生が帰って来る前に、\nお掃除しておきましょうか？"
10034-80 = "おかえりなさい、先生。"
10034-90 = "ふふっ、今日も色々と\nお手伝いいたしますね。"
10034-100 = "あっ、おかえりなさい、先生。"
10034-110 = "さあ、お席についてください。\nそろそろ仕事を始めないと\n間に合いませんよ？"
10034-120 = "朝の洗顔は終えましたか？\n食事を抜いたりしてませんか？"
10034-130 = "ふふっ、はい、良かったです。\nでは、美味しい紅茶をどうぞ？"
10034-140 = "必要なものがございましたら、\n何なりと。"
10034-150 = "どんなことでも\nお申し付けください。"
10034-160 = "先生はいつも\nお忙しそうですから、"
10034-170 = "こうやって二人っきりで\nいられる時間は\n貴重ですね……。"
10034-180 = "えっ、あっ、\n私、つい口に……。"
10034-190 = "私の小さい頃からの夢、\nそれは漫画や小説に\n出てくるような、"
10034-200 = "素敵な花嫁になることなんです。"
10034-210 = "夢を叶えるために\n今日も修行部で、\nそしてここでも、\n研鑽を積んでいきます。"
10034-220 = "お誕生日おめでとうございます、\n先生。"
10034-230 = "その……今日ぐらいは、\nたくさん甘えても\nいいんですよ……？"
10034-240 = "私の、お誕生日……ですか？"
10034-250 = "うふふっ、\nありがとうございます。\n先生。"
10034-260 = "……今日はもうすでに、\n最高の一日です。"
10034-270 = "ふふっ、明けまして\nおめでとうございます、先生。"
10034-280 = "体が温まるように、\n甘酒はいかがですか？"
10034-290 = "ふんふんふん～ふんふんふん～\nふんふんふん、ふふん～♪"
10034-300 = "クリスマスですね、先生。"
10034-310 = "今夜は一緒に……\nお出かけなど、\nいかがでしょうか……？"
10034-320 = "トリック・オア・トリート、\n今日はハロウィーンですね。"
10034-330 = "せ、先生でしたら、\n私にいたずらしても、\nいいんですよ……？"
10034-350 = "ふふっ、先生。\nもう少し近くで見ていただいても\n大丈夫ですよ。"
10034-360 = "私の花嫁修行……\nそれから、大和撫子に\nなりたいという私の夢も。"
10034-370 = "先生はいつもこういう風に、\n傍で応援して、\n手伝ってくださいました。"
10034-380 = "ありがとうございます。\n……その、私。先生と、\nこれから先もずっと……。"
10034-390 = "な、何でもありません……！"
10034-400 = "は、はい！刺繍、完成しました！"
10034-410 = "私なりに頑張ってみたのですが、\nその、いかがでしょうか……？"
10034-2600 = "わざわざこれを、私のために……？\n……ありがとうございます。先生。\nこの先今まで以上に努力して、生涯、\n先生のお役に立ってみせます。"
