[translation]
10007-20 = "や、先生！一緒にグラフィティ描きに行かな～い？"
10007-30 = "ここの壁にあたしの絵を添えたら、\nもっと素敵になりそう！"
10007-40 = "このふかふかな感じを\nスプレーで表現するには\nどうすればいいのかな？"
10007-50 = "おっと、\n塗料が付かないように\n気を付けて、\n気を付けて…っと。"
10007-60 = "ここに赤を足したらどうかな？"
10007-70 = "…すごくいい色…。"
10007-80 = "お帰り、先生。\n今日のファッションも\nいい感じだね？"
10007-90 = "遅いじゃん、先生\nこれ以上待たせてたら…"
10007-100 = "先生のスマホ、ドカンッ！って\n爆発させるところだったよ。"
10007-110 = "あたしの顔に何かついてる？"
10007-120 = "…うん？塗料？"
10007-130 = "このグラフィティ素敵でしょ？\nあたしが描いたの！"
10007-140 = "せっかく\nセキュリティを\n突破したのに、"
10007-150 = "その足跡も残さなかったら、\nハッキングのし甲斐が\nないよね。ふふっ。"
10007-160 = "TANGO DOWN！"
10007-170 = "キヴォトス中央の\nサンクトゥムタワーの\n外壁を、"
10007-180 = "全部グラフィティで\n埋められたら、\nどんなに素敵だろう…？"
10007-190 = "先生、\nお誕生日おめでとう！"
10007-200 = "ん？\nなんで知ってるのかって？"
10007-210 = "おっと、\nまだ公開されてない\n情報だったっけ？"
10007-220 = "プレゼントに何が\n欲しいか、って？"
10007-230 = "先生の服、あたしが\nチョイスした色で\n塗ってみてもいい？"
10007-240 = "ハッピーニューイヤー、先生！"
10007-250 = "今年もキラキラしたものを\nいっぱい描いていこう！"
10007-260 = "あっちもこっちも綺麗な\nイルミネーションで\nいっぱい…。"
10007-270 = "これ、そのまま壁に\n描き写せないかな？"
10007-280 = "今回のハロウィンのために、\n先月からコスチュームを\n準備してたの。"
10007-290 = "ふふっ、\n期待してて！"
10007-310 = "さて、これでいい\n感じじゃない？\n先生から見て、どう？"
10007-320 = "えぇっ…なんでそんなに\nイマイチな反応なの？"
10007-330 = "もっと芸術魂を\n燃やして見てみてよ！"
10007-340 = "先生は何を描いたの？\nえーっと…。"
10007-350 = "あはは！なにこれ、\nめっちゃ面白い！"
10007-360 = "こんな高いところで\n怖くないのかって？\n大丈夫、\n先生がそばにいるから。"
10007-370 = "必要ならいつでもあたしを\n呼んで。 壁も、先生も、\nいい感じに彩ってあげる！"
10007-2600 = "この銃で、世界を\n色鮮やかに染めるの！"
