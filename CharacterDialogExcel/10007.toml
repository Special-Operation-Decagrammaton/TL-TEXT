[translation]
10007-20 = "Ei, Sensei! Não quer ir fazer um grafite comigo?"
10007-30 = "Se eu adicionar meu desenho nesta parede,\nela vai ficar muito mais incrível!"
10007-40 = "Como será que eu faço para\nexpressar essa sensação fofinha\ncom o spray?"
10007-50 = "Opa, cuidado para não\nsujar de tinta,\ncuidado... pronto."
10007-60 = "O que acha de adicionar um pouco de vermelho aqui?"
10007-70 = "…Que cor maravilhosa…"
10007-80 = "Bem-vindo de volta, Sensei.\nO visual de hoje também\nestá ótimo, hein?"
10007-90 = "Você está atrasado, Sensei.\nSe me fizesse esperar mais um pouco…"
10007-100 = "Eu ia fazer o seu celular\nexplodir com um 'bum'!"
10007-110 = "Tem algo no meu rosto?"
10007-120 = "…Hm? Tinta?"
10007-130 = "Esse grafite é incrível, né?\nFui eu que fiz!"
10007-140 = "Já que eu me dei ao trabalho\nde passar pela segurança,"
10007-150 = "não teria graça hackear se eu não\ndeixasse nem uma pegada, né?\nHehe."
10007-160 = "TANGO DOWN!"
10007-170 = "Como seria incrível se a gente\npudesse cobrir toda a parede externa\nda Torre Sanctum, no centro de Kivotos,"
10007-180 = "com grafites?"
10007-190 = "Sensei,\nfeliz aniversário!"
10007-200 = "Hm?\nComo eu sei?"
10007-210 = "Opa,\nessa informação ainda não\nera pública, né?"
10007-220 = "O que eu quero de presente,\nvocê pergunta?"
10007-230 = "Posso pintar as suas roupas\ncom as cores que eu escolher?"
10007-240 = "Feliz Ano Novo, Sensei!"
10007-250 = "Este ano, vamos pintar muitas\ncoisas brilhantes por aí!"
10007-260 = "Está tudo tão cheio de\niluminações lindas por toda parte…"
10007-270 = "Será que dá para copiar isso\ndiretamente para uma parede?"
10007-280 = "Eu estava preparando meu traje\npara este Halloween desde o mês passado."
10007-290 = "Hehe,\nespere só para ver!"
10007-310 = "Bem, não ficou legal assim?\nO que você acha, Sensei?"
10007-320 = "Ehh… por que essa reação\ntão desanimada?"
10007-330 = "Tente olhar com um pouco mais\nde alma artística!"
10007-340 = "O que você desenhou, Sensei?\nDeixa eu ver…"
10007-350 = "Ahaha! O que é isso?\nÉ muito engraçado!"
10007-360 = "Se eu tenho medo de altura?\nEstá tudo bem, porque\nvocê está aqui comigo, Sensei."
10007-370 = "Se precisar, pode me chamar a qualquer hora. Eu vou deixar tanto as paredes quanto você com um visual incrível!"
10007-2600 = "Com esta arma, eu vou tingir\no mundo com cores vibrantes!"
