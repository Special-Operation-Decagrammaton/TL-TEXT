[translation]
10076-10 = "ブル～！アーカイブ～！"
10076-20 = "解説や応援が必要なら、私に任せてください！"
10076-30 = "おおっ！こんなに\nたくさんの人が！？"
10076-40 = "ここなら\n講演もできるかも！？"
10076-50 = "先生のインテリア……\n興味深いです！"
10076-60 = "おや、アレは……！"
10076-70 = "せっかくですから、\n応援ステージを\n探してみましょうか！"
10076-80 = "こんにちは、先生！\n今日も一日、ガンバレ！\nガンバレ！……ですよ！"
10076-90 = "お待ちしておりました、先生！\nこの私の応援が必要ですか？"
10076-100 = "……ひ、必要ですよね？"
10076-110 = "ん？チア衣装、ですか？"
10076-120 = "どうですか、\nかわいいですか？"
10076-130 = "うーん……\n理由はわかりませんが……"
10076-140 = "ちょっと、\n恥ずかしい気もします……。"
10076-150 = "そ、そんなにジッと見てないで\n何か言ってください！"
10076-160 = "今はシャーレの当番中ですから\n先生のためのエールです！"
10076-170 = "チアリーダーの\n起源をご存じですか？"
10076-180 = "あっ……そうでしたか。"
10076-190 = "お誕生日\nおめでとうございます、\n先生！！"
10076-200 = "今日は特別な日なので、\n特別なパフォーマンスで\nお送りします！"
10076-210 = "わ、私の誕生日……！？\nま、まさか覚えてくれているとは\n思いませんでした……。"
10076-220 = "嬉しいです、あははっ。"
10076-230 = "あけまして\nおめでとうございます！"
10076-240 = "先生がつらい時には、\nいつだって応援に行きますよ！"
10076-250 = "メリ～クリスマス！\nあっ、クリスマスの\n由来なのですが……"
10076-260 = "おおっ、\n外が騒がしいですね！"
10076-270 = "ふむ……みなさん、\nハロウィーンがどんな\n日なのかはご存じでしょうか？"
10076-290 = "あっ、あれ……？"
10076-300 = "む、むむっ……\n腕が……届くはず、\nなのに……？"
10076-310 = "そんな……！\nここで、力をグッと――！？"
10076-320 = "いいいっ！？\nいっ、いたたたたたたた！！？"
10076-330 = "お、おかしいです……！\n調べた通りに、\nやってるのに……！"
10076-340 = "人によって差があるとは\n知ってましたが、\nここまでとは……"
10076-350 = "も、もう一回……。\nっ……！？いいい！\nいたたたたた！！"
10076-360 = "も、もう、ムリ……。\nううう……あ、あの……\n先生、これは……"
10076-370 = "こんな姿を\n見せるつもりじゃ……\nなかったんです……"
10076-380 = "ダメダメな姿を……\n見られて、しまいました……"
10076-390 = "うううう……。"
10076-2600 = "この銃について説明いたしましょう……！\n……ふふ、冗談です。先生は既に\nご存知ですからね。……こういう事がどんどん\n増えていったら、いつかは……"
