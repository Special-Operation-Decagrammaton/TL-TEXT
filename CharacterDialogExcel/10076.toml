[translation]
10076-10 = "Blue Archive!"
10076-20 = "Se precisar de explicações ou apoio, pode deixar comigo!"
10076-30 = "Uau! Tanta gente assim aqui!?"
10076-40 = "Talvez dê até para fazer uma palestra aqui!?"
10076-50 = "A decoração do Sensei... é muito interessante!"
10076-60 = "Ora, aquilo é..."
10076-70 = "Já que estamos aqui, que tal procurarmos um palco para torcida?"
10076-80 = "Olá, Sensei! Tenha um bom dia hoje! Força! Força!... é isso!"
10076-90 = "Estava à sua espera, Sensei! Precisa do meu apoio?"
10076-100 = "...V-você precisa, né?"
10076-110 = "Hm? O traje de líder de torcida?"
10076-120 = "O que achou? Estou bonita?"
10076-130 = "Hum... não sei bem o motivo, mas..."
10076-140 = "Sinto-me um pouco envergonhada..."
10076-150 = "N-não fique me encarando assim, diga alguma coisa!"
10076-160 = "Como estou de plantão no Schale agora, este é um incentivo especial para o Sensei!"
10076-170 = "Você conhece a origem das líderes de torcida?"
10076-180 = "Ah... entendo."
10076-190 = "Feliz aniversário, Sensei!!"
10076-200 = "Como hoje é um dia especial, farei uma performance especial para você!"
10076-210 = "O-o meu aniversário...!? E-eu não imaginava que você se lembraria..."
10076-220 = "Estou tão feliz, ahaha."
10076-230 = "Feliz Ano Novo!"
10076-240 = "Sempre que o Sensei estiver passando por dificuldades, eu irei te apoiar!"
10076-250 = "Feliz Natal! Ah, sobre a origem do Natal..."
10076-260 = "Uau, o movimento lá fora está agitado, não é?"
10076-270 = "Hum... pessoal, vocês sabem que tipo de dia é o Halloween?"
10076-290 = "Ah, aquilo é...?"
10076-300 = "M-mu... meus braços... deveriam alcançar, mas...?"
10076-310 = "Não pode ser...! Se eu fizer um pouco mais de força aqui...!?"
10076-320 = "Iiiih!? A-ai, ai, ai, ai, ai!!?"
10076-330 = "I-isso é estranho...! Estou fazendo exatamente como pesquisei...!"
10076-340 = "Eu sabia que variava de pessoa para pessoa, mas não achei que fosse tanto..."
10076-350 = "M-mais uma vez... Ugh...!? Iiiih! Ai, ai, ai, ai!!"
10076-360 = "N-não dá mais... Uuuu... A-ah, Sensei, isso é..."
10076-370 = "Eu não pretendia... que você me visse... desse jeito..."
10076-380 = "Acabei deixando você ver... o meu lado fracassado..."
10076-390 = "Uuuuu..."
10076-2600 = "Permita-me explicar sobre esta arma...! ...Hehe, brincadeira. O Sensei já sabe, não é? Se as coisas continuarem aumentando assim, algum dia..."
