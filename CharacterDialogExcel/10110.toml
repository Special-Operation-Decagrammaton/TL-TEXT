[translation]
10110-10 = "Blue Archive."
10110-20 = "Um reencontro após tanto tempo...\nCertamente, é assim que devo dizer.\nEu estava esperando por você, Sensei."
10110-30 = "Hum, está tudo organizado\ncomo deveria estar."
10110-40 = "Esse tipo de decoração\ntambém traz um certo\nbrilho ao coração."
10110-50 = "Entendo, isto é...\nHum, tem um estilo\ndiferente do meu quarto."
10110-60 = "Todos que estão aqui\nresponderam ao seu chamado."
10110-70 = "A maravilha da composição,\nmeu interesse não tem fim."
10110-80 = "Olá, Sensei."
10110-90 = "Não é nada, é que aqui\nhá muitos itens curiosos."
10110-100 = "Então este é o lugar do Sensei..."
10110-110 = "Hum, o hábito é algo\nrealmente lento de se formar."
10110-120 = "É uma sensação estranha."
10110-130 = "Como não costumo sair\ndo meu quarto, é ainda mais."
10110-140 = "Embora dependa de você,\nserá que um dia este lugar\nse tornará uma visão\nfamiliar para mim?"
10110-150 = "Ah, por outro lado, não me importaria\nque fosse no meu quarto também."
10110-160 = "Ora, eu só disse por dizer."
10110-170 = "...Interprete como quiser."
10110-180 = "Pois a imaginação é\nlivre para cada um."
10110-190 = "O seu nascimento, e a sua existência real."
10110-200 = "Por ora, vamos apenas\ncelebrar isso."
10110-210 = "O dia em que eu nasci..."
10110-220 = "Entendo. Então o Sensei\ntambém se interessa por isso?"
10110-230 = "Desculpe, foi apenas um devaneio.\nObrigada, Sensei."
10110-240 = "Feliz Ano Novo, Sensei."
10110-250 = "Que este ano você possa\nalcançar uma nova versão de si mesmo."
10110-260 = "Natal..."
10110-270 = "Será que você preferia\na ideia de alguém saindo de uma caixa?"
10110-280 = "Halloween..."
10110-290 = "Não é algo com que estou acostumada,\nmas será que pregar uma peça\nfaz parte da etiqueta?"
10110-310 = "...Ah, é você."
10110-320 = "Mesmo eu, de certa forma,\nestou sentindo um espanto."
10110-330 = "Não há motivo para se desculpar,\na surpresa é uma expansão positiva do mundo."
10110-340 = "Pode-se dizer que eu também\nestava ansiando por isso."
10110-350 = "No entanto, o inesperado é..."
10110-360 = "O fato de estar trocando\nolhares com você desta forma."
10110-370 = "Mas por que...\nNão, entendo."
10110-380 = "Fui eu quem enviou o convite,\npeço perdão."
10110-390 = "Não, não é nada, não chamei você\npor causa de algum assunto específico."
10110-400 = "Apenas..."
10110-410 = "Parece que me sinto atraída\npelas palavras que troco com você."
10110-2600 = "Isso para mim... vindo de você?\nNão, é que eu simplesmente não esperava por isso.\nEstou sem jeito, não encontro as palavras certas para responder.\nMas... agora, até isso me parece algo positivo."
