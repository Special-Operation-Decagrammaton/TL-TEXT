[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10110-10 = "Blue Archive." 
10110-20 = "Um encontro após tanto tempo...\nAcho que é isso que eu deveria dizer, não?\nEu estava ansiosa por você, Sensei... fufu." 
10110-30 = "Hmm... Tudo está arrumadinho\ne no seu devido lugar, como deve ser." 
10110-40 = "Decorações como essa...\ndão um calorzinho bem gostoso\nno coração, né?" 
10110-50 = "Entendi, então é aqui...\nHmm, tem um sabor bem diferente\ndo meu quarto... gostei." 
10110-60 = "Parece que todo mundo aqui...\nfica bem obediente quando\nouve a sua voz, não?" 
10110-70 = "A forma como você organizou tudo...\nme deixa cada vez mais curiosa e intrigada." 
10110-80 = "Olá, Sensei." 
10110-90 = "Nossa, você tem muitas coisas\npeculiares e raras por aqui." 
10110-100 = "Então esse é o cantinho do Sensei..." 
10110-110 = "Fufu, a intimidade é algo\nque a gente constrói devagarinho, né?" 
10110-120 = "É uma sensação bem... curiosa." 
10110-130 = "Ainda mais pra mim, que quase\nnunca saio de dentro do meu quarto." 
10110-140 = "Depende só de você... mas será\nque um dia, esse lugar vai virar\no nosso cantinho familiar?" 
10110-150 = "Ah, mas se preferir...\npodemos fazer isso lá no\nmeu quarto também~" 
10110-160 = "Fufu, estou só brincando com você." 
10110-170 = "...Pode interpretar da forma\nmais pervertida que você quiser." 
10110-180 = "Afinal, a sua imaginação\né completamente livre." 
10110-190 = "O dia do seu nascimento, e a\nsua existência que eu posso tocar." 
10110-200 = "Por hoje...\nvamos apenas celebrar isso." 
10110-210 = "O dia em que eu nasci..." 
10110-220 = "Entendo. Então o Sensei tem interesses\nbem profundos até nessas coisas?" 
10110-230 = "Me desculpe, foi só uma provocaçãozinha.\nMuito obrigada, Sensei." 
10110-240 = "Feliz Ano Novo, Sensei." 
10110-250 = "Que este ano você consiga\nalcançar novas partes de si mesmo\n(e de mim, talvez)." 
10110-260 = "Natal..." 
10110-270 = "Ou será que você preferia... que eu\npulasse de dentro de uma caixa\nde presente só pra você?" 
10110-280 = "Halloween..." 
10110-290 = "Não sou muito íntima dessa data, mas...\nacho que te fazer uma travessura bem\ngostosa é o mínimo de educação\nque eu deveria ter, não?" 
10110-310 = "...Ah, é você." 
10110-320 = "Acredite se quiser, mas eu estou\nmeio surpresa agora." 
10110-330 = "Não precisa se desculpar.\nSer surpreendida é uma ótima forma de\nexpandir o mundo ao nosso redor." 
10110-340 = "Pode-se dizer que eu até estava\nansiando secretamente por isso." 
10110-350 = "Mas, o que é mais inesperado..." 
10110-360 = "É a forma como nós dois estamos\ntrocando olhares agora." 
10110-370 = "Mas por que...\nAh, entendi." 
10110-380 = "Fui eu quem te mandou a\nmensagem, não foi? Que indelicadeza." 
10110-390 = "Mas sabe... eu não te chamei\naqui porque eu tinha algum assunto." 
10110-400 = "É só que..." 
10110-410 = "Sinto que estou cada vez mais seduzida...\npelas palavras (e outras coisinhas) que trocamos." 
10110-2600 = "Isso é pra mim...? De você?\nNossa, me pegou de surpresa agora.\nEstou sem palavras pra te agradecer...\nMas, vindo de você, eu aceito de muito bom grado~" 