[translation]
10110-10 = "ブルーアーカイブ。"
10110-20 = "久方ぶりの邂逅……\nきっと、こう言うべきなのだろうね。\n待ちわびたよ、先生。"
10110-30 = "ふむ、有るべき\n姿に調っているね。"
10110-40 = "こういった装飾も\nどこか気持ちが\n華やぐね。"
10110-50 = "成程、これが…\nふむ、私の部屋とは\n趣が異なるな。"
10110-60 = "ここにいる\n誰もが、君の声に\n応じたのだね。"
10110-70 = "構成の妙、\n興味は尽きないね。"
10110-80 = "やぁ、先生。"
10110-90 = "いや何、此処には\n物珍しい品が多くてね。"
10110-100 = "これが先生の居場所…。"
10110-110 = "ふむ、慣れとは\n斯くも緩慢なものか。"
10110-120 = "不思議な感覚だね。"
10110-130 = "あまり自室から出ることは\n無いから、余計に。"
10110-140 = "君次第ではあるものの、\nいつかここが、\n慣れ親しんだ光景に\n変わるのだろうか。"
10110-150 = "ああ、逆に私の部屋でも\n構わないがね。"
10110-160 = "何、言ってみただけだよ。"
10110-170 = "…好きに解釈すると良い。"
10110-180 = "想像は個人の\n自由なのだから。"
10110-190 = "君の生誕、そして確かな存在。"
10110-200 = "今はただ、\nそれを言祝ぐとしようか。"
10110-210 = "私が生を受けた日…。"
10110-220 = "成程。先生という存在は、\nそこにも興味があると？"
10110-230 = "済まない、ちょっとした戯言だ。\n感謝するよ、先生。"
10110-240 = "あけましておめでとう、先生。"
10110-250 = "今年はどうか、新たな\n自分に手が届かんことを。"
10110-260 = "クリスマス…。"
10110-270 = "箱から飛び出る趣向の方が、\nお望みだったかな？"
10110-280 = "ハロウィーン…"
10110-290 = "あまり馴染みの\n無いことではあるが、\n悪戯を仕掛けるのが\n礼儀だろうか。"
10110-310 = "…ああ、君か。"
10110-320 = "これでも一応、\n驚嘆を感じているよ。"
10110-330 = "謝ることではないさ、\n驚きとは好意的な世界の拡大だ。"
10110-340 = "私もまた、\nそれに焦がれていたとも言える。"
10110-350 = "しかし、ゆくりなきは…"
10110-360 = "この様に君と、\n目を交わしていることだとも。"
10110-370 = "しかし何故…\nいや、成程。"
10110-380 = "私から便りを\n出したのだったか、失礼。"
10110-390 = "いや何、用事があって\n呼んだわけではないのだ。"
10110-400 = "唯…"
10110-410 = "君と交わす言葉に、\n私はどこか惹かれているようで。"
10110-2600 = "これを私に…君から？\nいや、単に思いもしなかったものだから。\n参ったね、継ぐべき言葉が見当たらないよ。\nしかし…それも好意的に思えるな、今なら。"
