[translation]
10128-10 = "ブルーアーカイブ！ですよ～！"
10128-20 = "おや…お目が高いですね、お客様……いえ、先生！\n……申し遅れました。ワイルドハント芸術学院2年、\n若狭フユです。以後、お見知りおきを！"
10128-30 = "へぇ、\n打ち合わせ場所に\n良さそうだね。"
10128-40 = "スクリーンを\n設置するなら\nどこがいいかな……。"
10128-50 = "（ここのコーヒー、\n中々いい豆を\n使ってるね……これも\n仕入れてみようかな？）"
10128-60 = "ところで……\n先生は来ないのかな。"
10128-70 = "（あれは……寮監隊！？\nどうしよう……\n逃げる！？）"
10128-80 = "お待ちしてましたよ、先生！"
10128-90 = "さあ、おかけください。\nビジネスの話と参りましょう。"
10128-100 = "ふむ、\nこれが内勤の仕事ですか……。"
10128-110 = "どうです？\n特殊交易部顧問の椅子は、\nいつでも空けてありますよ？"
10128-120 = "ここは快適で……ええ。\nいいオフィスです。"
10128-130 = "……私たちの拠点にしたら\n……ダメですよねぇ？"
10128-140 = "落ち着きますねぇ……"
10128-150 = "ちょっとくらい肩の\n力を抜いても……"
10128-160 = "ふわぁ。"
10128-170 = "もう……\nそんなにつっつくなら……\n隙間を埋めちゃいますよ？"
10128-180 = "ぴったりくっついたら、\nイタズラできませんよね？"
10128-190 = "ハッピーバースデー！先生！"
10128-200 = "お祝いの動画を\n作ってきたのですが……"
10128-210 = "い、一緒に観ませんか……？"
10128-220 = "誕生日プレゼント……\n私の欲しいモノ、ですか……。"
10128-230 = "モノはいらないので……一日、"
10128-240 = "先生のお時間を\nいただけませんか？"
10128-250 = "明けまして\nおめでとうございます、先生。"
10128-260 = "……はい？ああ、これですか？\n昨日の録画データです。"
10128-270 = "テレビでやってた、除夜の鐘の。\n締めて108回分。"
10128-280 = "さて……これをどう\n芸術にしましょうかね。"
10128-290 = "ちょうど、仕入れてきた\nサンタ服があるんですけど……。"
10128-300 = "き、気になりますか……？"
10128-310 = "少々お待ちください、先生。"
10128-320 = "ちょうど、新鮮なカボチャを\n手に入れましたので！"
10128-340 = "ここは、\nスクリーンの裏側です。"
10128-350 = "つまり、舞台裏……。"
10128-360 = "作家だけが\n出入りできる空間です。"
10128-370 = "ここに入る唯一の方法は……\n作家である私に許可を取ること。"
10128-380 = "だから、ここは今――"
10128-390 = "先生と私、二人……きりの……。"
10128-400 = "って！いやいやいや！\nそ、そうじゃなくてですね！"
10128-410 = "とにかく！お弁当を\n作ってきたんですけど……。"
10128-420 = "えっと、もし、\nよろしければ……。"
10128-430 = "……一緒に、食べませんか？"
10128-2600 = "受けた投資にはそれ以上のリターンを。\nそれがビジネスですからね！なので……\nいつか恩返しできるその時まで、\nそばにいてください、先生。"
