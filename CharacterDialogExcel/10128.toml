[translation]
10128-10 = "Blue Archive! É isso aí!"
10128-20 = "Ora... você tem um bom olho, cliente... não, Sensei!\n...Perdoe a minha falta de modos. Wakasa Fuyu, do segundo ano da Academia de Artes Wildhunt. Prazer em conhecê-lo!"
10128-30 = "Hmm, parece um bom lugar para uma reunião."
10128-40 = "Onde seria o melhor lugar para instalar a tela...?"
10128-50 = "(O café daqui usa grãos muito bons... será que eu deveria comprar alguns para o estoque?)"
10128-60 = "Aliás... será que o Sensei não vem?"
10128-70 = "(Aquilo é... a Equipe de Supervisão do Dormitório!? O que eu faço... fujo!?)"
10128-80 = "Estava esperando por você, Sensei!"
10128-90 = "Vamos, sente-se. Vamos falar de negócios."
10128-100 = "Hum, então é assim que é o trabalho de escritório..."
10128-110 = "O que acha? A cadeira de consultor do Departamento de Comércio Especial está sempre livre para você, sabe?"
10128-120 = "Aqui é confortável... sim. É um bom escritório."
10128-130 = "...Se fizéssemos daqui a nossa base... não seria uma boa ideia, né?"
10128-140 = "É tão relaxante..."
10128-150 = "Dá para relaxar um pouco os ombros..."
10128-160 = "Uaaah."
10128-170 = "Poxa... se você continuar me cutucando assim... eu vou acabar preenchendo esse espaço, viu?"
10128-180 = "Se eu ficar bem coladinha em você, não vai conseguir me fazer travessuras, né?"
10128-190 = "Feliz aniversário, Sensei!"
10128-200 = "Eu fiz um vídeo de comemoração, mas..."
10128-210 = "V-você gostaria de assistir comigo...?"
10128-220 = "Presente de aniversário... o que eu quero, você pergunta..."
10128-230 = "Eu não preciso de coisas materiais... então, por um dia,"
10128-240 = "você poderia me dar o seu tempo, Sensei?"
10128-250 = "Feliz Ano Novo, Sensei."
10128-260 = "...Sim? Ah, isso aqui? É a gravação de ontem."
10128-270 = "O sino da véspera de Ano Novo que passou na TV. 108 badaladas no total."
10128-280 = "Bem... como vamos transformar isso em arte?"
10128-290 = "Eu acabei de conseguir uma roupa de Papai Noel..."
10128-300 = "V-você está curioso...?"
10128-310 = "Espere um momento, Sensei."
10128-320 = "Acabei de conseguir abóboras bem frescas!"
10128-340 = "Aqui é o lado de trás da tela."
10128-350 = "Ou seja, os bastidores..."
10128-360 = "Um espaço onde apenas o artista pode entrar."
10128-370 = "A única forma de entrar aqui é... pedindo permissão a mim, a artista."
10128-380 = "Portanto, agora, aqui..."
10128-390 = "Estamos apenas eu e você, Sensei... sozinhos..."
10128-400 = "Quer dizer! Não, não, não! N-não é isso que eu quis dizer!"
10128-410 = "Enfim! Eu fiz um almoço para você..."
10128-420 = "Bem, se você quiser..."
10128-430 = "...Vamos comer juntos?"
10128-2600 = "Para cada investimento recebido, um retorno ainda maior. Afinal, isso é um negócio! Por isso... até o dia em que eu puder retribuir, fique ao meu lado, Sensei."
