[translation]
13007-10 = "Blue Archive~!"
13007-20 = "Não que eu pretenda cooperar, mas...\n...Hm? Você vai me dar comida?\nQue tipo? Como é?"
13007-30 = "A-algum lugar tem comida...\nNão tem?"
13007-40 = "Falando nisso, aquela vez que fui ao café com o Sensei...\nFoi tão gostoso...\nHehe."
13007-50 = "Dizem que os bolinhos de arroz vendidos no festival de Hyakkiyako são deliciosos..."
13007-60 = "Sniff, sniff. Hm...?\nQue cheiro é esse...?\nSinto um cheiro delicioso de algo!"
13007-70 = "Segui esse cheiro delicioso e acabei vindo parar aqui.\nO que será que está me esperando aqui...?\nO que será~"
13007-80 = "Bem-vindo, Sensei~."
13007-90 = "Vou trabalhar duro hoje também para poder ir comer algo gostoso!"
13007-100 = "Ah, chegou! \nSensei! Que tipo de missão vamos fazer hoje?"
13007-110 = "Hobbies? \nLeitura. Leitura."
13007-120 = "...O que foi, essa sua cara!!"
13007-130 = "Você não está pensando que eu sou só uma criança que adora comer, está?"
13007-140 = "Você pode contar mais comigo, sabia?"
13007-150 = "Se eu gosto de bolinhos de arroz?"
13007-160 = "Não especialmente? Eu só como porque são baratos, sabe?"
13007-170 = "(A sós com o Sensei...?\nHe, hehe...)"
13007-180 = "O-o quê?! \nExiste um lugar onde posso comer bolos e tortas sem limite?!"
13007-190 = "Sensei! Prepare-se!\nVamos sair agora mesmo!"
13007-200 = "Feliz aniversário, Sensei!"
13007-210 = "Hoje, especialmente, eu vou brincar com você!"
13007-220 = "Então, o que vamos comer? \nCarne? Peixe? \nOu frango??"
13007-230 = "Hoje é meu aniversário!\nVocê sabe disso, né?"
13007-240 = "Acho que carne seria bom para o aniversário!"
13007-250 = "Ou talvez um buffet! \nQualquer coisa serve, vamos comer, Sensei!"
13007-260 = "Feliz Ano Novo, Sensei!\nVamos logo fazer o primeiro lanche do ano!"
13007-270 = "Amazake e mochi estão nos esperando!"
13007-280 = "Feliz Natal!\nNão quer ir para a cidade, Sensei?\nEstá tudo brilhando com as luzes!"
13007-290 = "Hm?\nAh, esse doce é meu."
13007-300 = "...M-mas se for para o Sensei, eu posso dividir um pouquinho com você."
13007-320 = "Ei, o que foi?\nPor que está me olhando assim?"
13007-330 = "(...Ai, meu Deus...)"
13007-340 = "Vamos descansar um pouco e depois ir comer de novo, né?\nO que vamos comer agora?"
13007-350 = "Delicioso."
13007-360 = "O quê? Quer beber junto!?\nNão diga coisas estranhas!\nEu te mato, ouviu!?"
13007-370 = "(Você está me provocando, né?\nÉ isso, né? Só tem um canudo...)"
13007-380 = "(...Mas se for o Sensei... acho que tudo bem...)"
13007-390 = "...N-não!!\nDefinitivamente não dá!!"
13007-2600 = "O-obrigada, Sensei......\nIsso... e-eu vou cuidar muito bem disso! Com certeza!"
