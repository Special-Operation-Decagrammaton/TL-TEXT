[translation]
13007-10 = "ブルーアーカイブ～！"
13007-20 = "別に協力するつもりはないんだけど。\n…うん？食べ物くれるの？\nどんなの？どんなやつ？"
13007-30 = "ど、どこかに食べ物…\nないの？"
13007-40 = "そういえば前に、\n先生とカフェに行った\nときの…美味しかったな…。\nへへ。"
13007-50 = "百鬼夜行のお祭りで\n売ってるお団子が、\nすごく美味しいって\n噂なんだけど…。"
13007-60 = "クンクン。うん…？\nこの匂いは…？\n何か美味しそうな\n匂いがする！"
13007-70 = "美味しそうな匂いにつられて、\nここまで来ちゃった。\nここで私を待っているのはー…\n何かな～"
13007-80 = "ようこそ先生～。"
13007-90 = "今日も頑張って働いて、\n美味しい物を食べに\n行くんだからね！"
13007-100 = "あ、来た来た！\n先生！今日はどんな\n任務をしに行くの?"
13007-110 = "趣味？\n読書よ。読書。"
13007-120 = "…なによ、その顔！！"
13007-130 = "私を食べるの\n大好きな子供だなんて\n思ってないわよね？"
13007-140 = "もっと頼ってもいいのよ？"
13007-150 = "お団子が好きなのかって？"
13007-160 = "別に？安いから\n食べてるだけだけど？"
13007-170 = "（先生と\n二人っきりで…？\nへ、へえ…）"
13007-180 = "な、なにい？！\nケーキとパイが無制限に\n食べられるお店があるの？！"
13007-190 = "先生！準備して！\n今すぐ出動するよ！"
13007-200 = "お誕生日おめでとう先生！"
13007-210 = "今日は特別に\n私が遊んであげる！"
13007-220 = "それじゃあ何食べに行く？\nお肉？お魚？\nそれともチキン？？"
13007-230 = "今日は私の誕生日なの！\n分かってるよね？"
13007-240 = "やっぱり誕生日にはお\n肉がいいかな！"
13007-250 = "それかビュッフェでもいいよ！\nなんでもいいから\n食べに行こ、先生！"
13007-260 = "明けましておめでとう、\n先生！\n早く新年最初の\n買い食いに行こう！"
13007-270 = "甘酒とお餅が\n待ってるよ！"
13007-280 = "メリークリスマス！\n街に行かない？先生！\nイルミネーションで\nキラキラしてるよ！"
13007-290 = "うん？\nあ、飴は私のものだよ。"
13007-300 = "…で、でも先生にだったら、\nす、少しなら分けて\nあげてもいいよ。"
13007-320 = "え、な、なに。\nなんでそんな目で見るの？"
13007-330 = "（…もう、本当に…）"
13007-340 = "ちょっと休んで、\nまた食べに行くんでしょ？\n次は何食べる？"
13007-350 = "おいしー。"
13007-360 = "なに？一緒に飲もうって！？\n変なこと言わないで！\n殺すよ！？"
13007-370 = "（からかってるよね、これ？\nそうだよね？ストロー、\n一本しかないのに…）"
13007-380 = "（…でも先生なら…大丈…）"
13007-390 = "…やっ！！\nやっぱだめ！！"
13007-2600 = "あ、ありがとう、先生……。\nその……だ、大事にする！絶対！"
