[translation]
13005-20 = "怒ってないから、\n誤解しないでね。先生。\n顔が怖いってよく言われるんだ。"
13005-30 = "はあ…心配。"
13005-40 = "ふーん、少しは興味が\n沸いてきた。"
13005-50 = "これからの計画は…\nまあ、いいか。"
13005-60 = "意外と…可愛い？\nふうん、\nつまらない冗談…だね。"
13005-70 = "まあ、怖い顔だっていうのは\nわかってる。"
13005-80 = "おかえり、先生。\nじゃあ仕事を始めようか。"
13005-90 = "次の依頼が入った。\nこの感じ、なんだか\n慣れ親しんだやつだね。"
13005-100 = "シャーレは、便利屋と\n似ているところが\nあるように感じる。"
13005-110 = "なんか用？\nまあ、問題があったら\n解決してあげるけど。"
13005-120 = "…知ってる。\n怖い顔だってね。\nよく誤解されるから。"
13005-130 = "かわ…いい？\nふざけないで、先生。"
13005-140 = "先生を手伝う。\nそれが約束だから。"
13005-150 = "依頼には最善を尽くすよ。"
13005-160 = "それがプロとしての\n心構えだから。"
13005-170 = "お誕生日おめでとう、先生。"
13005-180 = "うーん、こういう日って\nどんな話をすればいいんだ…？"
13005-190 = "誕生日？\nえっと。"
13005-200 = "いや、便利屋以外の人に\nお祝いしてもらったのは\n初めてで…。"
13005-210 = "あ、ありがと…。"
13005-220 = "新年か…。"
13005-230 = "今年も、よろしくね。"
13005-240 = "メリークリスマス。\n恋人たちの日か…。"
13005-250 = "ふーん…。"
13005-260 = "街が眩しくて、甘そうな\nものでいっぱいだ。\nあんまり慣れない空気…。"
13005-270 = "うーん、"
13005-280 = "でも、一緒に\n行ってみようか？"
13005-300 = "ここまで付いてこなくても\nよかったのに、先生。"
13005-310 = "今は、いないのかな…。"
13005-320 = "雨が降ってたから、\n見に来ただけ。"
13005-330 = "…多分、大丈夫。\n一人でも平気な子だから。"
13005-340 = "縛られることも、\n傷つけられることも\nないのはいいけど…。"
13005-350 = "でも、一人は\n寂しいから…。"
13005-360 = "…放っておけなかった。\nただ、それだけ。"
13005-370 = "別に深い意味はないから。\n先生、分かった？"
13005-2600 = "先生が決めたことなら異論はないけど……。\nはあ……何でもない。\n期待されてる分、頑張るよ。"
