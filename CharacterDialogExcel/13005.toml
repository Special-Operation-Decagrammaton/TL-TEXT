[translation]
13005-20 = "Eu não estou brava, então\nnão me entenda mal, Sensei.\nÉ que vivem dizendo que minha cara é assustadora."
13005-30 = "Haa... que preocupação."
13005-40 = "Hmm, comecei a ficar\num pouco interessada."
13005-50 = "Sobre os planos futuros...\nBem, tanto faz."
13005-60 = "Surpreendentemente... fofa?\nHmm, que piada\nsem graça... essa."
13005-70 = "Bem, eu sei que\nminha cara é assustadora."
13005-80 = "Bem-vindo de volta, Sensei.\nEntão, vamos começar o trabalho?"
13005-90 = "Recebemos o próximo pedido.\nEssa sensação... é algo\ncom o qual estou acostumada."
13005-100 = "Sinto que o Schale tem\nalgumas semelhanças\ncom a Loja de Conveniência."
13005-110 = "Precisa de algo?\nBem, se tiver algum problema,\neu resolvo para você."
13005-120 = "...Eu sei.\nQue minha cara é assustadora, né?\nSou sempre mal interpretada por causa disso."
13005-130 = "Fofa... eu?\nNão brinque comigo, Sensei."
13005-140 = "Vou ajudar o Sensei.\nPorque essa é a nossa promessa."
13005-150 = "Darei o meu melhor no pedido."
13005-160 = "Porque essa é a minha\npostura como profissional."
13005-170 = "Feliz aniversário, Sensei."
13005-180 = "Hmm, que tipo de assunto\na gente deveria conversar num dia assim...?"
13005-190 = "Aniversário?\nBem..."
13005-200 = "Não, é que é a primeira vez que alguém\nfora da Loja de Conveniência\nme parabeniza..."
13005-210 = "Ah, obrigada..."
13005-220 = "Ano Novo, hein..."
13005-230 = "Conto com você este ano também."
13005-240 = "Feliz Natal.\nO dia dos namorados, né..."
13005-250 = "Hmm..."
13005-260 = "A cidade está brilhante e cheia\nde coisas doces.\nNão estou muito acostumada com esse clima..."
13005-270 = "Hmm,"
13005-280 = "Mas, quer ir comigo\ndar uma volta?"
13005-300 = "Não precisava ter me seguido\naté aqui, Sensei."
13005-310 = "Será que ela não está aqui agora...?"
13005-320 = "Como estava chovendo,\neu só vim ver como ela estava."
13005-330 = "...Provavelmente, está tudo bem.\nEla é uma criança que consegue se virar sozinha."
13005-340 = "É bom não ser presa\nnem ser machucada, mas..."
13005-350 = "Ainda assim, ficar sozinha\né solitário..."
13005-360 = "...Eu não consegui ignorar.\nSó isso."
13005-370 = "Não tem nenhum significado profundo.\nEntendeu, Sensei?"
13005-2600 = "Se é o que você decidiu, Sensei, não tenho objeções...\nHaa... esquece.\nJá que você espera algo de mim, vou me esforçar."
