[translation]
10024-10 = "Blue Archive."
10024-20 = "Ah. Sim, eu estava pedalando. O que acha de vir junto, Sensei? Primeiro, vamos fazer uns 200km de leve."
10024-30 = "A velocidade média de hoje foi... É, sinto que ficou um pouco mais rápida..."
10024-40 = "Hum... queria secar esse suor."
10024-50 = "Para onde será que eu deveria ir agora..."
10024-60 = "Preciso repor as calorias para não ficar exausta no meio do caminho."
10024-70 = "Pedalar em grupo parece divertido, mas..."
10024-80 = "Bem-vindo de volta, Sensei. Quer ir pedalar comigo agora?"
10024-90 = "Eu estava te esperando. Para onde vamos desta vez?"
10024-100 = "Ultimamente, tenho treinado para aumentar minha cadência."
10024-110 = "É um método de girar os pedais mais rápido usando uma marcha leve."
10024-120 = "Tenho estado ocupada com as atividades do comitê e não tenho tido muito tempo para pedalar."
10024-130 = "Por isso, decidi sair para dar uma volta hoje, depois de tanto tempo."
10024-140 = "Sensei, você não quer pedalar também?"
10024-150 = "Eu vou na frente para cortar o vento, então você só precisa me seguir."
10024-160 = "Acho que assim vai ser bem mais fácil para você."
10024-170 = "Tem tantas peças que eu quero comprar, mas... acho que vou ter que me segurar."
10024-180 = "Peças de bicicleta são caras, afinal."
10024-190 = "Na verdade, essa camisa de ciclismo era para ser um conjunto combinando,"
10024-200 = "mas as outras disseram que não queriam usar... Então, por enquanto, estou usando sozinha."
10024-210 = "Hoje é... o aniversário do Sensei...?"
10024-220 = "Então, para comemorar... que tal irmos pedalar?"
10024-230 = "Meu aniversário? ...Ah. Já chegou esse dia... O-obrigada."
10024-240 = "Eu conheço uma rota de montanha onde dá para ver o nascer do sol."
10024-250 = "A gente pedala a noite toda e vê o sol nascer lá do topo."
10024-260 = "Quer ir comigo? Fica a uns 2000 metros de altitude."
10024-270 = "Se eu estou de bicicleta num dia desses? Hum... é que eu não tinha nenhum compromisso..."
10024-280 = "Então, vamos fingir que a gente já tinha um compromisso marcado agora?"
10024-290 = "Hã, sem pedalar? U-uh..."
10024-300 = "Ah... Halloween... Era hoje?"
10024-310 = "Bem... então... doces ou pedaladas...?"
10024-330 = "...Obrigada, Sensei."
10024-340 = "É que, como posso dizer..."
10024-350 = "É a primeira vez que alguém me dá esse tipo de apoio de verdade..."
10024-360 = "...Estar com você, Sensei, faz com que coisas novas aconteçam todos os dias."
10024-370 = "(...? Por que será? Meu coração não para de bater...)"
10024-380 = "...Que estranho. Também é a primeira vez que sinto isso."
10024-2600 = "Esta é uma arma de fogo pessoal leve, modificada especialmente para o ciclismo. Como é leve, permite ações táticas rápidas e, claro, não atrapalha durante pedaladas de longa distância."
