[translation]
10024-10 = "ブルーアーカイブ。"
10024-20 = "あっ。うん、ライディング中だったの。\n先生も一緒にどう？まずは軽く200kmくらい。"
10024-30 = "今日の平均速度は……\n うん、ちょっと\n速くなった感じ……。"
10024-40 = "うーん……汗を\n乾かしたいけど。"
10024-50 = "次はどこに行って\nみようかな……。"
10024-60 = "途中で\nバテないように、\nカロリーを\n摂取しておかないと。"
10024-70 = "グループ\nライディングも\n楽しそうだけど……。"
10024-80 = "おかえり、先生。\n今から一緒に\nライディングに行かない？"
10024-90 = "待ってたよ。\n今度はどこに行こっか？"
10024-100 = "最近はケイデンスを\n上げるために\n練習してるの。"
10024-110 = "低いギアでペダルを\nもっと速く回す方式だよ。"
10024-120 = "最近委員会の活動で忙しくて、\nライディングをする\n時間があまりなくって。"
10024-130 = "だから今日は久しぶりに\n走ってみようと思う。"
10024-140 = "先生もライディング、\nやってみない？"
10024-150 = "私が前で風を\n防ぐから先生は\nついてきてくれればいい。"
10024-160 = "そうすればきっと\n走りやすいと思うから。"
10024-170 = "買いたい部品は\nいっぱいあるけど……\n我慢するしかないか。"
10024-180 = "自転車の部品って\n高いから。"
10024-190 = "実はこのジャージ、\nお揃いのものなんだけど、"
10024-200 = "みんなに着たくないって\n言われちゃって……。\nとりあえず一人で着てる。"
10024-210 = "今日って、\n先生のお誕生日……？"
10024-220 = "それじゃお祝いの意味で……\nライディング、行く？"
10024-230 = "私の誕生日？……ああ。\nもうそんな日か……\nあ、ありがとう。"
10024-240 = "日の出が見られる\n山岳コースを知ってるの。"
10024-250 = "一晩中走って、\n頂上から日が\n昇るのを見るんだ。"
10024-260 = "一緒に行かない？\n標高２０００mくらいだから。"
10024-270 = "こんな日にも\n自転車かって？\nうーん……特に\n約束もなかったから……。"
10024-280 = "だったら、今から先生と\n約束があったことにしよっか。"
10024-290 = "え、ライディング抜きで？\nう、うーん……。"
10024-300 = "あ……ハロウィーン……\n今日だったっけ。"
10024-310 = "えーと……それじゃあ、\nトリックオアライディング……？"
10024-330 = "……ありがと、先生。"
10024-340 = "その、何て言うのかな……。"
10024-350 = "こんな風にしっかり誰かに\nサポートしてもらったの、\n初めてで……。"
10024-360 = "……先生と一緒にいると、\n毎日色々、新しい事が起きるね。"
10024-370 = "（……？何でだろ。\n心臓の音、止まらない……）"
10024-380 = "……変なの。\nこういうのも、初めて。"
10024-2600 = "これはライディング用に特別に改造された\n軽量型個人向け火器。\n軽いから素早い戦術行動が可能になるし、\nもちろん長距離のライディングの時も\n負担にならないの。"
