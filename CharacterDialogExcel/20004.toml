[translation]
20004-10 = "Blue Archive."
20004-20 = "Sou Mashiro, do primeiro ano do Comitê de Justiça de Trinity.\nEm qualquer lugar e em qualquer situação,\napoiarei o Sensei com todas as minhas forças."
20004-30 = "Sinto que alguém está\nme observando……."
20004-40 = "Não há nenhum encrenqueiro\npor aqui tentando causar\nproblemas, há?"
20004-50 = "(Da próxima vez, com\ntodas as veteranas……)"
20004-60 = "(Este lugar parece\nser um ótimo ponto\nde sniper.)"
20004-70 = "(Mente como a superfície da água.\nDeixando a agitação diminuir,\ncalmamente……)"
20004-80 = "Bem-vindo de volta, Sensei.\nO que vamos treinar hoje?"
20004-90 = "Estava à sua espera, Sensei.\nVamos brincar logo……"
20004-100 = "N-não, vamos\npara o treinamento!"
20004-110 = "É hora de partir!"
20004-120 = "Não importa o lugar,\na justiça é imutável!"
20004-130 = "Trajes de banho fofos são justiça……."
20004-140 = "Entendido, vou guardar isso no coração."
20004-150 = "……Isto? É apenas um\npicolé comum, sabe?"
20004-160 = "Se não se importar\nque eu já tenha começado……\nquer um pouco?"
20004-170 = "Feliz aniversário,\nSensei."
20004-180 = "Para garantir que o seu dia seja perfeito,\nficarei bem ao seu lado\nfazendo sua escolta pessoal."
20004-190 = "Um presente de\naniversário? Bem……"
20004-200 = "Se eu puder comer um picolé\ncom o Sensei,\npara mim já é o suficiente."
20004-210 = "Feliz Ano Novo.\nEstou ansiosa pelo\ntreinamento de verão deste ano."
20004-220 = "Quando menos percebi,\no verão passou e já é Natal……"
20004-230 = "O tempo voa quando\nos momentos são divertidos."
20004-240 = "É a época em que sinto falta\ndaquela sopa de abóbora quente\nque servem na cantina da escola."
20004-260 = "Sensei, você é do tipo que\nmorde o picolé ou do tipo\nque chupa?"
20004-270 = "Eu sou do tipo que\nchupa devagar."
20004-280 = "Assim, posso aproveitar o sabor\ndo picolé por mais tempo."
20004-290 = "Ham……\npero, rero……."
20004-300 = "……Sim?\nO meu jeito de comer está\num pouco……?"
20004-310 = "Para mim, é o de sempre……\ntem algo de estranho?"
20004-320 = "……Sensei?\nSinto que você está fazendo\numa expressão estranha\nde novo……."
20004-2600 = "Será que isso também é…… a verdadeira justiça……?"
