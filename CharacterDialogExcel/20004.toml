[translation]
20004-10 = "ブルーアーカイブ。"
20004-20 = "トリニティの正義実現委員会１年、マシロ。\nどんな場所でも、いついかなる状況でも、\n全力で先生のことを支援します。"
20004-30 = "なんだか視線を\n感じます……。"
20004-40 = "まさか、こんなところで\n問題を起こそうとする\n問題児はいませんよね？"
20004-50 = "（次は、先輩たち\nみんなと一緒に……）"
20004-60 = "（ここ、\n狙撃ポイントとして\n良さそうですね）"
20004-70 = "（心は水面のように。\n揺れを徐々に、\n静かに……）"
20004-80 = "おかえりなさい、先生。\n今日の訓練は何をしましょう？"
20004-90 = "お待ちしておりました、先生。\nすぐに遊びに……"
20004-100 = "い、いえ、\n訓練に行きましょう！"
20004-110 = "出撃の時間ですね！"
20004-120 = "どんな場所であっても、\n正義は不変です！"
20004-130 = "可愛い水着は正義……。"
20004-140 = "なるほど、心に刻みます。"
20004-150 = "……これですか？普通の\nアイスキャンディーですよ？"
20004-160 = "私の食べかけでも\nよろしければ……\n食べますか？"
20004-170 = "お誕生日おめでとう\nございます、先生。"
20004-180 = "先生の今日という日が\n完璧なものになるように、\n私がすぐ隣で密着警護します。"
20004-190 = "誕生日プレゼント、\nですか？そうですね……"
20004-200 = "先生と一緒に\nアイスキャンディーを\n食べられれば、\nそれで充分です。"
20004-210 = "明けましておめでとう\nございます。\n今年の夏の訓練も、\n楽しみにしていますね。"
20004-220 = "いつの間に、\n夏が過ぎてクリスマスに……"
20004-230 = "楽しい時間が\n経つのは早いですね。"
20004-240 = "学食で出てくるあの、\n温かいかぼちゃスープが\n恋しくなる季節ですね。"
20004-260 = "先生はアイスキャンディー、\n噛んで食べる派ですか？\nそれとも舐める派ですか？"
20004-270 = "私は、\nゆっくり舐めて\n食べる派です。"
20004-280 = "その方が、\nアイスキャンディーの味を\n長く楽しめますから。"
20004-290 = "はむっ……\nぺろっ、れろっ……。"
20004-300 = "……はい？\n食べ方がちょっと……？"
20004-310 = "私としては、\nいつも通りなのですけど……\n何か変でしょうか？"
20004-320 = "……先生？\nなんだかまた、\n変な表情をされてる\n気がするのですが……。"
20004-2600 = "これもまた……真の正義……？"
