[translation]
10104-10 = "ブルーアーカイブ、ですね。"
10104-20 = "山海経高級中学校、玄武商会本店のマネージャー兼、\n護衛の鹿山レイジョです。\n改めまして、よろしくお願いします。先生。"
10104-30 = "ここの物流管理は、\nどうなっている\nのでしょう?"
10104-40 = "玄武商会との相違点\n勉強になります。"
10104-50 = "市場調査と\nいきましょう。"
10104-60 = "（ここで玄武商会の\n販路を広げるには…）"
10104-70 = "ストレッチできる\n場所を、確保\nしたいのですが…"
10104-80 = "ご要望がありましたら、\nなんなりと。\n…む、難しいこと以外で、\nお願いします。"
10104-90 = "お待ちしておりました、先生。\nいえ、心配無用です。\nそれほど待っていませんので。\n……おそらく。"
10104-100 = "商流や取引の管理でしたら\n慣れております。護衛や\n警備の任務も、それなりに\nこなせます。"
10104-110 = "……一番自信があるもの？\nもちろん、カンフーです！"
10104-120 = "少し、身体を動かしたい\n気分です。私はこれから\nカンフーの修練に……"
10104-130 = "……散歩？……ですが、\n散歩程度では……"
10104-140 = "あ！いえ！行きます！\n先生と一緒でしたら！"
10104-150 = "実は、射撃は\n少々苦手です。"
10104-160 = "拳で戦ったほうが\n良いのでは、\nと言われたことが\nある程度には……"
10104-170 = "ですが、しっかり訓練は\nしておりますので…！"
10104-180 = "…人並みには、撃てるように\nなったと、思います…"
10104-190 = "たまにはサボっても\n大丈夫、ですか……？"
10104-200 = "いけません、先生！\n時間は有限です！\n刻一刻と\n減っていくのですよ！？"
10104-210 = "……時間を有効に\n使うためにも、\n休息は必要……？"
10104-220 = "たしかにそれは……\nおっしゃる通りですが……"
10104-230 = "二人きりの時間……\nそれも先生と、というのは\n……妙な感じがします。"
10104-240 = "あの、先生……お隣……\nよろしいでしょうか……？"
10104-250 = "お誕生日おめでとう\nございます、先生！"
10104-260 = "実は今朝、少し\n変わった夢をみました。"
10104-270 = "先生が生まれる瞬間の\n護衛をするという、\n内容だったのですが……"
10104-280 = "……そのとき先生は\nキヴォトスに\nいらっしゃらなかったのに。\nなんだか不思議ですね。"
10104-290 = "は、はい！？私の誕生日……？\nお、覚えてて\nくださったんですか……？"
10104-300 = "その……\n覚えてくださっていたら\n嬉しいな、とは\n思っていましたが……"
10104-310 = "……ありがとうございます、\n先生。私は果報者です……"
10104-320 = "明けましておめでとう\nございます、先生。\n玄武商会からお節を\n持ってまいりました。"
10104-330 = "私も作るのを\n手伝ったのですよ。\nふふ……どれだか\n分かりますか？"
10104-340 = "クリスマスの詳細なら\n熟知しています。\n先日、勉強しましたので。"
10104-350 = "…では、無償の\nプレゼントを\n配り物価を乱す、"
10104-360 = "サンタクロースという\n経済犯を倒してきます！"
10104-370 = "今日が何の日なのか、\n把握していますとも。"
10104-380 = "商売人たるもの、\n幅広い知識を身に\nつけなければなりませんので。"
10104-390 = "ハロウィーン……つまりは\nカボチャの稼ぎ時、ですよね？"
10104-410 = "あ、来てくださったのですね。"
10104-420 = "あと少しで朝練が\n終わりますので、\n少々お待ちいただけますか？"
10104-430 = "実はこれも、連続した\n動作の一部なんですよ。"
10104-440 = "流れを止め、姿勢を\n維持することも"
10104-450 = "精神を鍛えるのに\n役立つのでは、と思い……"
10104-460 = "……って、先生はどうして\nそんなところに……？"
10104-470 = "え？修行中なら――"
10104-480 = "周りの視線に動じず、\n平常心を保つべき……？"
10104-490 = "それは、そう……\nなのですが……"
10104-500 = "……うっ、や、やはり\nこれは、無理です……！"
10104-2600 = "大半は銃と火薬で解決できる、と\nいいますが……背中を押してくださった\n先生のためにも！銃と拳の融合を……\nいつか成し遂げてみせます！"
