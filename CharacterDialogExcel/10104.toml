[translation]
10104-10 = "Blue Archive, é isso."
10104-20 = "Sou Reijo Kayama, gerente e guarda-costas da sede da Associação Comercial Genbu, da Escola Secundária Shanhaijing.\nPrazer em conhecê-lo novamente, Sensei."
10104-30 = "Como funciona a gestão\nde logística por aqui?"
10104-40 = "As diferenças com a\nAssociação Comercial Genbu\nsão muito instrutivas."
10104-50 = "Vamos fazer uma\npesquisa de mercado."
10104-60 = "（Como posso expandir os canais\nde venda da Associação Genbu aqui...）"
10104-70 = "Eu gostaria de garantir\num lugar onde eu possa\nfazer alongamentos..."
10104-80 = "Se tiver algum pedido,\nsinta-se à vontade.\n...Mas, por favor, nada\nmuito difícil."
10104-90 = "Estava à sua espera, Sensei.\nNão, não se preocupe.\nNão esperei tanto tempo assim.\n......Provavelmente."
10104-100 = "Estou acostumada com a gestão de fluxos comerciais e negociações. Também consigo lidar bem com missões de escolta e segurança."
10104-110 = "......O que eu tenho mais confiança? Claro que é no Kung Fu!"
10104-120 = "Estou com vontade de\nmovimentar um pouco o corpo.\nVou começar meu treino\nde Kung Fu agora..."
10104-130 = "......Um passeio? ...Mas,\num simples passeio não é..."
10104-140 = "Ah! Não! Eu vou! Se for com o Sensei, eu vou!"
10104-150 = "Na verdade, não sou muito\nboa com armas de fogo."
10104-160 = "Já me disseram que seria\nmelhor lutar apenas\ncom os punhos..."
10104-170 = "Mas eu tenho treinado\nbastante, então...!"
10104-180 = "...Acho que agora consigo\natirar como uma pessoa normal..."
10104-190 = "Tudo bem se eu\nmatar aula às vezes...?"
10104-200 = "Não pode, Sensei!\nO tempo é limitado!\nEle está diminuindo\na cada segundo, sabia!?"
10104-210 = "......Para usar o tempo\nde forma eficiente,\no descanso é necessário...?"
10104-220 = "Certamente isso é...\ncomo você disse, mas..."
10104-230 = "Passar um tempo a sós...\nE ainda por cima com o Sensei,\né uma sensação... estranha."
10104-240 = "Ei, Sensei... posso me sentar\naqui ao seu lado...?"
10104-250 = "Feliz aniversário,\nSensei!"
10104-260 = "Na verdade, tive um sonho\num pouco estranho hoje cedo."
10104-270 = "O conteúdo era que eu estava\nprotegendo o momento\nem que o Sensei nasceu..."
10104-280 = "......Mas o Sensei nem estava\nem Kivotos naquela época.\nÉ algo bem misterioso, não é?"
10104-290 = "S-sim!? Meu aniversário...?\nVocê... se lembrou...?"
10104-300 = "Eu... eu esperava que você\nse lembrasse, mas..."
10104-310 = "......Muito obrigada,\nSensei. Sou uma pessoa de sorte..."
10104-320 = "Feliz Ano Novo,\nSensei.\nTrouxe o osechi da\nAssociação Comercial Genbu."
10104-330 = "Eu também ajudei a preparar.\nHehe... consegue adivinhar\nqual deles eu fiz?"
10104-340 = "Conheço todos os detalhes\ndo Natal.\nEstudei sobre isso recentemente."
10104-350 = "...Então, vou derrotar aquele\ncriminoso econômico chamado\nPapai Noel, que distribui"
10104-360 = "presentes de graça e\ndesestabiliza os preços!"
10104-370 = "Eu sei muito bem que\ndia é hoje."
10104-380 = "Como comerciante, preciso\nadquirir um amplo\nconhecimento."
10104-390 = "Halloween... ou seja, a época\nde lucrar com abóboras, certo?"
10104-410 = "Ah, você veio."
10104-420 = "Meu treino matinal acaba\nem instantes, poderia\nesperar um pouco?"
10104-430 = "Na verdade, isso também faz\nparte de uma sequência\nde movimentos."
10104-440 = "Interromper o fluxo e\nmanter a postura"
10104-450 = "ajuda a treinar o espírito,\nfoi o que pensei..."
10104-460 = "......Ué, Sensei, por que\nvocê está aí...?"
10104-470 = "Hã? Se estou treinando――"
10104-480 = "Devo manter a calma e não\nme abalar com os olhares\nao redor...?"
10104-490 = "Isso é... verdade,\nmas..."
10104-500 = "......Ugh, n-não, isso é\nimpossível para mim...!"
10104-2600 = "Dizem que a maioria dos problemas pode ser resolvida com armas e pólvora... mas pelo Sensei, que me deu tanto apoio! Vou conseguir fundir as armas com o Kung Fu... um dia eu farei isso!"
