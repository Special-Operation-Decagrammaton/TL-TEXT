[translation]
26010-10 = "ブルー……ア、アーカイブ……"
26010-20 = "R……RABBIT4、準備完了しました。\n本当に……こんな格好でいいのですか……？"
26010-30 = "素敵な格好の人が\nいっぱい……"
26010-40 = "う、うううぅ……。"
26010-50 = "水着なのに……\n誰にも気づかれ\nないんです……"
26010-60 = "（一体どんな\nお話をしているの\nでしょうか……？）"
26010-70 = "みんな……\nどこに行ったの……？"
26010-80 = "あ、せ、先生……！\n待って、ました……。"
26010-90 = "あの……\n実はさっきからここに\nいたのですが……"
26010-100 = "わ、私のこと、\n忘れてませんか……？"
26010-110 = "海の思い出……"
26010-120 = "あ、あまり良いものは\nないです……"
26010-130 = "……何か、\nお手伝いできることは\nないでしょうか？"
26010-140 = "飲み物を\n買ってくるとか……。"
26010-150 = "……えっ？\nこの格好で外に行くのは\n問題が……？"
26010-160 = "ど、どうして……。"
26010-170 = "か、可愛いですか……？\nあ、ありがとうございます。"
26010-180 = "私のようなイモ娘には\n身に余るお言葉です……。"
26010-190 = "釣りは、狙撃手に\nぴったりの趣味かもしれません。"
26010-200 = "準備をして、\n待ち続ける所とか……"
26010-210 = "仕組みも、\nだいたい同じですし。"
26010-220 = "水泳は少しだけ\n……できます。"
26010-230 = "バタフライはまだ、\n苦手ですが……"
26010-240 = "お、お誕生日\nおめでとうございます……\n先生……。"
26010-250 = "今日、もし良いものが\n釣れたら……"
26010-260 = "必ず先生に\nプレゼントしますね！"
26010-270 = "私の誕生日……\n覚えていて\nくださったのですね！"
26010-280 = "……本当に、\nありがとうございます！"
26010-290 = "あけまして\nおめでとうございます、\n先生。"
26010-300 = "その……おせち料理も……\n廃棄分があったり\nするのでしょうか……？"
26010-310 = "今年のクリスマスは\nモエちゃんが大きな七面鳥を\n焼いてくれるみたいで、"
26010-320 = "少し、楽しみです……"
26010-330 = "よ、よかったら先生も……\n一緒にいかがですか？"
26010-340 = "少し肌寒くなって\nきましたね……"
26010-350 = "温かいカボチャのお茶でも\n飲みたい気分です……"
26010-370 = "ふふっ、先生もすぐに\n気づかないなんて、\n今回も完璧みたいです。"
26010-380 = "木を隠すには\n森の中と言うように……"
26010-390 = "釣り人の中に溶け込むには、\n釣りをするのが自然ですから。"
26010-400 = "……カモメや海鳥が\nずっと頭に乗ろうとするのは、"
26010-410 = "ちょっと困りますが……"
26010-420 = "こういうの……。\n慣れてますから……。"
26010-430 = "ふふ、ふふふ……"
26010-440 = "ちょうど釣り道具があったから\nここにしましたが、"
26010-450 = "潜伏するには\nぴったりな場所ですね。"
26010-460 = "見晴らしも良いですし、\n周辺を監視するのにも最適。"
26010-470 = "風が涼しいから暑くもなくて、\n日よけの麦わら帽子も\nありますし……"
26010-480 = "そ、そして……\n今日は……"
26010-490 = "せ、せ、先生も……"
26010-500 = "……そばにいますから。"
26010-2600 = "RABBIT39式小銃……う、受け取りました。\n海辺での狙撃は風も、湿気も強くて……\n色々と、難しいのですが……\nそれでも、1kmまででしたら……\nなんとかなりそうです……"
