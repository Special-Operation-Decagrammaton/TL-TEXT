[translation]
26010-10 = "Blu... Archive..."
26010-20 = "R... RABBIT4, pronto para a ação.\nSério... esse traje é mesmo necessário...?"
26010-30 = "Tem tanta gente\ncom trajes maravilhosos..."
26010-40 = "U, uuuu..."
26010-50 = "Mesmo estando de roupa de banho...\nninguém nota\na minha presença..."
26010-60 = "(Sobre o que será que\neles estão\nconversando...?)"
26010-70 = "Pessoal...\nPara onde vocês foram...?"
26010-80 = "Ah, S-Sensei...!\nEu estava... esperando por você."
26010-90 = "Hum... na verdade,\neu estou aqui faz um tempo, mas..."
26010-100 = "V-você não se esqueceu\nde mim, esqueceu...?"
26010-110 = "Memórias do mar..."
26010-120 = "Ah, não tenho nada\nmuito bom para contar..."
26010-130 = "...Tem algo em que eu\npossa ajudar?"
26010-140 = "Como comprar\nbebidas, por exemplo..."
26010-150 = "...Hã?\nSair por aí com este traje\né um problema...?"
26010-160 = "P-por que..."
26010-170 = "E-eu estou bonita...? \nAh, muito obrigada."
26010-180 = "É um elogio grande demais\npara uma garota sem graça como eu..."
26010-190 = "Pescar talvez seja o passatempo\nperfeito para um atirador."
26010-200 = "O fato de se preparar\ne continuar esperando..."
26010-210 = "O mecanismo é\npraticamente o mesmo."
26010-220 = "Eu sei nadar\n...um pouquinho."
26010-230 = "Ainda não sou boa\nno nado borboleta, mas..."
26010-240 = "Fe-feliz aniversário...\nSensei..."
26010-250 = "Se eu conseguir pescar\nalgo bom hoje..."
26010-260 = "Com certeza vou dar\nde presente para você!"
26010-270 = "Você se lembrou\ndo meu aniversário...!"
26010-280 = "...Muito, muito obrigada!"
26010-290 = "Feliz ano novo,\nSensei."
26010-300 = "Hum... será que sobrou\nalgum Osechi\npara descartar...?"
26010-310 = "Parece que a Moe vai assar um peru enorme\npara o Natal deste ano,"
26010-320 = "estou um pouco animada..."
26010-330 = "S-se não se importar, Sensei...\nque tal se juntar a nós?"
26010-340 = "Começou a ficar\num pouco frio, não é..."
26010-350 = "Sinto vontade de tomar\num chá de abóbora bem quente..."
26010-370 = "Fufu, nem o Sensei percebeu de imediato, parece que desta vez foi perfeito."
26010-380 = "Como dizem, para esconder uma árvore,\nna floresta é o melhor lugar..."
26010-390 = "Para se misturar entre os pescadores, o mais natural é pescar."
26010-400 = "...É um pouco incômodo que as gaivotas\ne aves marinhas queiram pousar na minha cabeça o tempo todo,"
26010-410 = "mas..."
26010-420 = "Esse tipo de coisa...\neu já estou acostumada..."
26010-430 = "Fufu, fufufu..."
26010-440 = "Escolhi este lugar porque tinha equipamento de pesca por perto,"
26010-450 = "mas é um lugar perfeito para se esconder."
26010-460 = "A vista é boa e é ideal para monitorar os arredores."
26010-470 = "O vento é fresco, então não está quente, e ainda tenho este chapéu de palha para me proteger do sol..."
26010-480 = "E, e então... \nhoje..."
26010-490 = "O, o, o Sensei também..."
26010-500 = "...está aqui ao meu lado."
26010-2600 = "Rifle RABBIT39... r-recebido. Atirar à beira-mar é difícil por causa do vento e da umidade... mas, ainda assim, se for até 1km... acho que consigo dar um jeito..."
