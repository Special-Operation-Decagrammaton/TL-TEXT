[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
26010-10 = "B-Blue... A-Archive..." 
26010-20 = "R... RABBIT 4, preparativos concluídos.\nTem certeza... de que está tudo bem eu me vestir assim...?" 
26010-30 = "Tantas pessoas vestidas\ntão bem..." 
26010-40 = "U-Uuuu..." 
26010-50 = "Mesmo de traje de banho...\nninguém me nota..." 
26010-60 = "（Que tipo de conversa\nserá que eles estão tendo...?）" 
26010-70 = "Para onde...\ntodo mundo foi...?" 
26010-80 = "A-Ah, S-Sensei...!\nEu estava te esperando..." 
26010-90 = "Ahm...\nNa verdade, eu já estou aqui\nhá um bom tempo..." 
26010-100 = "Você...\nhavia se esquecido de mim...?" 
26010-110 = "Memórias da praia..." 
26010-120 = "N-Não tenho muitas\nboas lembranças daqui..." 
26010-130 = "......Há alguma coisa\nem que eu possa ajudar?" 
26010-140 = "Como sair para comprar bebidas\npara você, por exemplo..." 
26010-150 = "......Eh?\nÉ um problema sair na rua\ncom essas roupas...?" 
26010-160 = "M-Mas por quê..." 
26010-170 = "F-Fofinho...?\nM-Muito obrigada." 
26010-180 = "São palavras gentis demais para\numa garota sem graça como eu..." 
26010-190 = "A pesca talvez seja o hobby\nperfeito para atiradores de elite." 
26010-200 = "Preparar as iscas\ne ter paciência para esperar..." 
26010-210 = "A mecânica\né basicamente a mesma." 
26010-220 = "Eu sei nadar...\num pouquinho." 
26010-230 = "Ainda sou bem ruim no\nnado borboleta, mas..." 
26010-240 = "F-Feliz Aniversário...\nSensei." 
26010-250 = "Se eu conseguir\npescar algo muito bom hoje..." 
26010-260 = "Com certeza eu darei\nde presente a você!" 
26010-270 = "Meu aniversário...\nVocê realmente se lembrou!" 
26010-280 = "......Muito obrigada, do fundo do meu coração!" 
26010-290 = "Feliz Ano Novo,\nSensei." 
26010-300 = "Ahm... será que teremos sobras\ndas comidas de Ano Novo também...?" 
26010-310 = "Neste Natal a Moe-chan\ndisse que ia assar\num peru enorme, e" 
26010-320 = "Estou um pouco\nanimada com isso..." 
26010-330 = "S-Se você quiser, Sensei...\nVocê não gostaria de se juntar a nós?" 
26010-340 = "Está começando a esfriar,\nnão acha...?" 
26010-350 = "Me deu muita vontade de beber\num chá de abóbora quentinho..." 
26010-370 = "Fufu, até o Sensei demorou para me notar...\nParece que hoje a minha camuflagem foi perfeita." 
26010-380 = "Como dizem: se quer esconder uma árvore,\nesconda-a na floresta..." 
26010-390 = "Para me misturar entre os pescadores,\npescar é a atitude mais natural." 
26010-400 = "......Embora as gaivotas e aves marinhas\nfiquem tentando pousar na minha cabeça o tempo todo," 
26010-410 = "O que é um pouco problemático..." 
26010-420 = "Eu já estou......\nacostumada com isso......" 
26010-430 = "Fufu, fufufu..." 
26010-440 = "Escolhi este lugar por acaso por ter equipamento\nde pesca por aqui, mas" 
26010-450 = "É um local perfeito\npara uma emboscada furtiva." 
26010-460 = "A vista daqui é ótima,\no que o torna ideal para monitorar os arredores." 
26010-470 = "A brisa do mar é refrescante, então não faz calor,\ne também tenho esse chapéu de palha para me proteger do sol..." 
26010-480 = "E, e... além do mais...\nhoje..." 
26010-490 = "O, o, o Sensei também..." 
26010-500 = "......está ao meu lado." 
26010-2600 = "Fuzil RABBIT Tipo-39... r-recebido.\nAtirar perto do mar é difícil... o vento e a umidade são fortes...\nMas ainda assim, se for até 1km...\n...acho que dou um jeito..." 