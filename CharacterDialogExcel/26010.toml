[translation]
26010-10 = "B-Blue... A-Archive..."
26010-20 = "R... RABBIT4, preparativos concluídos.\nTem certeza... de que eu posso mesmo usar esse tipo de roupa...?"
26010-30 = "Tem tanta gente\nvestindo roupas maravilhosas\naqui..."
26010-40 = "U-Uuuuh..."
26010-50 = "Eu estou de maiô...\ne mesmo assim ninguém\nconsegue notar a minha presença..."
26010-60 = "（Sobre o que será\nque eles estão conversando...?)"
26010-70 = "Para onde... todo mundo foi...?"
26010-80 = "A-Ah, Sensei...!\nEu estava... te esperando..."
26010-90 = "Uhm... Na verdade,\neu já estava aqui\nhá um bom tempo, mas..."
26010-100 = "V-Você... não se\nesqueceu de mim, né...?"
26010-110 = "Lembranças do mar..."
26010-120 = "E-Eu não tenho muitas\nmemórias boas daqui..."
26010-130 = "……Por acaso,\ntem algo em que eu\npossa ajudar?"
26010-140 = "Como ir comprar\nbebidas, por exemplo..."
26010-150 = "……Hã?\nSair vestida assim\nseria um problema...?"
26010-160 = "P-Por que...?"
26010-170 = "E-Eu estou fofa...?\nM-Muito obrigada."
26010-180 = "Essas palavras são um\ndesperdício para uma\ngarota sem sal como eu..."
26010-190 = "A pesca pode ser o\nhobby perfeito para\numa atiradora de elite."
26010-200 = "Toda a parte de se preparar,\ne depois ficar esperando..."
26010-210 = "A mecânica básica\né praticamente a mesma."
26010-220 = "Eu consigo nadar...\num pouquinho."
26010-230 = "Ainda não sou muito\nboa no nado borboleta, mas..."
26010-240 = "F-Feliz aniversário...\nSensei..."
26010-250 = "Se eu conseguir pescar\nalgo de bom hoje..."
26010-260 = "Eu juro que te dou\nde presente!"
26010-270 = "Você... lembrou do\nmeu aniversário...!"
26010-280 = "……Muito,\nmuito obrigada mesmo!"
26010-290 = "Feliz Ano Novo,\nSensei."
26010-300 = "Uhm... será que também\nsobrou alguma comida de Ano Novo...\nque foi jogada no lixo...?"
26010-310 = "Parece que neste Natal\na Moe vai assar um peru\ngigante para a gente,"
26010-320 = "Estou um pouco\nanimada para isso..."
26010-330 = "S-Se você quiser, Sensei...\nGostaria de vir passar com a gente?"
26010-340 = "Começou a fazer\num pouco de frio, não acha...?"
26010-350 = "Me deu vontade de beber\num chá de abóbora\nbem quentinho..."
26010-370 = "Fufu, até você demorou para\nme notar dessa vez, Sensei.\nParece que meu disfarce\nfoi perfeito de novo."
26010-380 = "Como dizem que o melhor\nlugar para esconder uma\nárvore é na floresta..."
26010-390 = "Para me misturar entre os\npescadores, o mais natural\né pescar também."
26010-400 = "……O fato de as gaivotas\ne aves marinhas tentarem pousar\nna minha cabeça o tempo todo"
26010-410 = "É um pouco problemático, mas..."
26010-420 = "Eu já estou acostumada...\ncom esse tipo de coisa..."
26010-430 = "Fufu, fufufu..."
26010-440 = "Eu escolhi este lugar\nporque já tinha equipamento de\npesca por aqui, mas"
26010-450 = "Acabou sendo um local perfeito\npara uma emboscada furtiva."
26010-460 = "A visão panorâmica é ótima,\ne é ideal para monitorar\nos arredores."
26010-470 = "A brisa está fresca, então não\nfaz calor, e também tenho um chapéu\nde palha para me proteger do sol..."
26010-480 = "E-E também...\nhoje..."
26010-490 = "O S-S-Sensei também..."
26010-500 = "……Está aqui do meu lado."
26010-2600 = "Fuzil RABBIT-39... r-recebido.\nO vento e a umidade são muito\nfortes para atirar na beira do mar...\né bem complicado...\nMas mesmo assim, se o alvo\nestiver a até 1km de distância...\nacho que dou um jeito..."