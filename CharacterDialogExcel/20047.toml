[translation]
20047-10 = "ブルー……アーカイブ。"
20047-20 = "百花繚乱の作戦参謀だもの……\n水泳なんて児戯に等しい。……教本は熟読しているよ。\nさあ、行くよ。"
20047-30 = "ふ～ん……先生は\nこういうのが\n趣味なんだ。"
20047-40 = "力を抜いて……\n深呼吸……\n水に浮くのって……\n難しい……。"
20047-50 = "日差しがちょうど\n良いところ……\nどこだろう"
20047-60 = "水着……少し\n小さかったかな。"
20047-70 = "レンゲって、\n泳ぐの上手……。"
20047-80 = "おかえり、先生。"
20047-90 = "約束、忘れてないよね？\n……水泳の授業、\nしてくれるんでしょう？"
20047-100 = "いい天気だね。"
20047-110 = "じゃ、海に行くから。\nさっさと支度して。"
20047-120 = "あんたも知っての通り、\n私は水が苦手。"
20047-130 = "海なんてもってのほか。\nでも……。"
20047-140 = "みんなとなら……\n悪くない。"
20047-150 = "……分かってる？\n「みんな」にはあんたも\n入ってるんだけど。"
20047-160 = "ああ、これ？\n百花繚乱のみんなに\n勧められたの。"
20047-170 = "すごく似合ってる、\nって言われて。"
20047-180 = "……あんたもそう思うんだ。"
20047-190 = "そう……\nそれは、よかった。"
20047-200 = "今度、水着を\n買いに行こうか。"
20047-210 = "私のじゃない、あんたの。\n選んであげるから。"
20047-220 = "もちろん、私の好みで。\n反論は受けつけない。"
20047-230 = "一番覚えやすくて\n簡単な泳ぎ方ってどれ？"
20047-240 = "犬かき？\n……ぶつよ。"
20047-250 = "泳げないって弱点を、\nあんたは知っている。"
20047-260 = "だから私にも教えて？\nあんたの弱点。"
20047-270 = "同盟を組むなら、\n弱点をさらけ出し合わないと。"
20047-280 = "だって、運命共同体\n……でしょう？"
20047-290 = "今日は特別。\nだって、あんたが\n生まれた日だもの。"
20047-300 = "……こんな格好で誰かの\n誕生日を祝う日が来るとは\n思わなかったけど。"
20047-310 = "先生は……\nどんな想い出が欲しい？"
20047-320 = "今日、私の誕生日。\n覚えてるよね？"
20047-330 = "この後の予定は、\n全部キャンセルして。"
20047-340 = "あんたと過ごすための\n作戦は、全部練ってあるから。"
20047-350 = "……元から予定を\n空けてあるの？"
20047-360 = "そう。\n良い判断だと思うよ。"
20047-370 = "今日はお正月だから、\n場違いで……"
20047-380 = "強い印象を残せる服装に\nしてみたんだけど……\nどうかな。"
20047-390 = "ふふっ、作戦参謀らしい\n奇策だと思わない？"
20047-400 = "この格好？\nここから動く気は\nないって意思表示。"
20047-410 = "私は今日をここで\n過ごしたい。"
20047-420 = "あんたは、隣に\nいてくれるでしょう？"
20047-430 = "ハロウィーンだから\n仮装をして\nみたんだけど……。"
20047-440 = "水着を選んだ\n理由……？"
20047-450 = "その驚いた顔が\n見たかったから。"
20047-460 = "ふふ、\nいたずら成功。"
20047-480 = "どう？\nなかなかじゃない？"
20047-490 = "今日のために\n作ったの。"
20047-500 = "ほら、\n存分に楽しんで。"
20047-510 = "実は……全部、\n初めてなんだ。"
20047-520 = "何かを作っているとき、\n誰かの顔が\nずっと浮かぶのも。"
20047-530 = "無防備な姿を、\n誰かに見せるのも。"
20047-540 = "別に……誰とまでは\n言わないけど。"
20047-550 = "……これからも\n私のそばにいて。"
20047-560 = "あんたの隣は、\n私が守るから。"
20047-570 = "……この同盟は、\n永遠だからね。"
20047-2600 = "ふぅん……これが、先生なりの信頼、なんだ。\nじゃあ、これからはもっと……\nとことん頼って。\n私があんたのこと信じてるみたいに。\n……できるでしょう？"
