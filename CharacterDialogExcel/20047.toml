[translation]
20047-10 = "Blue……Archive."
20047-20 = "Como estrategista da Hyakkaryouran……\nNatação é mera brincadeira de criança. ……Eu li os manuais de cabo a rabo.\nVamos lá."
20047-30 = "Hmm…… Então o Sensei\ntem esse tipo de\ngosto."
20047-40 = "Relaxe……\nRespire fundo……\nFlutuar na água é……\nDifícil……."
20047-50 = "Onde será que\na luz do sol\nestá perfeita……"
20047-60 = "O traje de banho……\nserá que ficou um pouco pequeno?"
20047-70 = "A Renge é tão\nboa em nadar……."
20047-80 = "Bem-vindo de volta, Sensei."
20047-90 = "Você não esqueceu da promessa, né?\n……Você vai me dar\naulas de natação, não vai?"
20047-100 = "Que dia bonito."
20047-110 = "Bom, eu vou para o mar.\nPrepare-se logo."
20047-120 = "Como você bem sabe,\neu não me dou bem com a água."
20047-130 = "Ir ao mar é algo impensável.\nMas……"
20047-140 = "Se for com todos……\nNão é ruim."
20047-150 = "……Entendeu?\nO \"todos\" também\ninclui você."
20047-160 = "Ah, isso? \nO pessoal da Hyakkaryouran\nme recomendou."
20047-170 = "Disseram que\ncombina muito comigo."
20047-180 = "……Você também acha isso."
20047-190 = "Entendo……\nFico feliz em saber."
20047-200 = "Que tal irmos comprar\num traje de banho?"
20047-210 = "Não o meu, o seu.\nEu vou escolher para você."
20047-220 = "Claro, de acordo com o meu gosto.\nNão aceito contra-argumentos."
20047-230 = "Qual é o estilo de natação\nmais fácil e rápido de aprender?"
20047-240 = "Cachorrinho?\n……Vou te bater."
20047-250 = "Você conhece o meu ponto fraco,\nque é não saber nadar."
20047-260 = "Então, me conte também?\nQual é o seu ponto fraco."
20047-270 = "Se vamos formar uma aliança,\nprecisamos expor nossas fraquezas."
20047-280 = "Afinal, somos parceiros de destino\n……não somos?"
20047-290 = "Hoje é um dia especial.\nAfinal, é o dia em que\nvocê nasceu."
20047-300 = "……Nunca pensei que chegaria o dia\nde comemorar o aniversário de alguém\nvestida assim."
20047-310 = "Sensei……\nQue tipo de lembrança você quer?"
20047-320 = "Hoje é meu aniversário.\nVocê lembra, né?"
20047-330 = "Cancele todos os seus\ncompromissos para depois disso."
20047-340 = "Já elaborei toda a estratégia\npara passarmos o dia juntos."
20047-350 = "……Você já tinha deixado\na agenda livre?"
20047-360 = "Sim.\nAcho que foi uma boa decisão."
20047-370 = "Como hoje é Ano Novo, \nachei que estaria fora de lugar……"
20047-380 = "Tentei usar um traje que\ndeixasse uma impressão forte……\no que achou?"
20047-390 = "Hehe, não acha que é uma estratégia\ndigna de uma estrategista?"
20047-400 = "Este traje? \nÉ uma declaração de que\nnão pretendo sair daqui."
20047-410 = "Eu quero passar o dia de hoje\naqui."
20047-420 = "Você vai ficar\naqui ao meu lado, não vai?"
20047-430 = "Como é Halloween,\neu resolvi usar uma fantasia……"
20047-440 = "O motivo de eu ter\nescolhido este traje……?"
20047-450 = "Porque eu queria ver\nessa sua cara de surpresa."
20047-460 = "Hehe,\npegadinha feita com sucesso."
20047-480 = "O que achou?\nNão ficou bom?"
20047-490 = "Eu fiz isso\nespecialmente para hoje."
20047-500 = "Vamos,\naproveite ao máximo."
20047-510 = "Na verdade…… tudo isso\né a minha primeira vez."
20047-520 = "Quando estou criando algo,\no rosto de alguém\nnão sai da minha mente."
20047-530 = "E mostrar meu lado vulnerável\npara alguém também."
20047-540 = "Não que eu vá dizer...\nquem é essa pessoa."
20047-550 = "......Fique ao meu lado\ndaqui em diante."
20047-560 = "Porque eu vou proteger\no seu lugar ao meu lado."
20047-570 = "......Essa nossa aliança\né eterna, entendeu?"
20047-2600 = "Hmm... Então é assim que você demonstra confiança, Sensei.\nBom, então de agora em diante...\nconte comigo para tudo.\nAssim como eu confio em você.\n......Você consegue, não consegue?"
