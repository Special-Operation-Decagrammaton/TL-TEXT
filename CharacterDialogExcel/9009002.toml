[translation]
9009002-10 = "Bem-vindo, Sensei."
9009002-20 = "Fufu, eu estava te esperando."
9009002-30 = "Hm? O que foi?"
9009002-40 = "Mesmo que você me olhe desse jeito,\neu não vou te dar esse salgadinho de sabor mentaiko."
9009002-50 = "N-não toque nos meus chifres...! É uma parte sensível, sabia!"
9009002-60 = "A Rin-senpai e você... parecem estar muito ocupados."
9009002-70 = "O que foi? Você pensou algo como 'tão baixinha, mas...' agora pouco, não foi?"
9009002-80 = "Você entende as coisas rápido, isso ajuda. Conto com você para a missão de hoje também."
9009002-90 = "Ahahaha! Dizer que faria qualquer coisa pelos alunos... você também é um tremendo de um bobo, sabia?"
