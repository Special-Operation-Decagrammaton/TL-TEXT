[translation]
10119-10 = "Blue Archive."
10119-20 = "Academia Hyakkiyako, Comitê de Mediação de Conflitos Hyakka Ryoran — Nagusa Ouryou. Este poder existe para proteger a todos."
10119-30 = "Se fosse a Ayame... como ela teria passado o tempo?"
10119-40 = "Será que eu posso... ficar aqui?"
10119-50 = "(Isso é... um espetinho de frango...?)"
10119-60 = "Está um pouco quente, mas... imagino que para todos seja uma temperatura agradável."
10119-70 = "Estou me sentindo um pouco tonta... acho que vou descansar."
10119-80 = "Ah, bem-vindo de volta, Sensei."
10119-90 = "Diga-me o que devo fazer hoje."
10119-100 = "Ah, Sensei... bem-vindo de volta."
10119-110 = "Fico feliz que tenha voltado."
10119-120 = "É que... eu estava ansiosa."
10119-130 = "Com medo de que todos... fossem embora."
10119-140 = "Com medo de que desaparecessem..."
10119-150 = "Por favor... não me deixe sozinha por muito tempo."
10119-160 = "Desculpe."
10119-170 = "O trabalho no Schale é... um pouco novo para mim."
10119-180 = "Eu também fazia trabalho administrativo no Hyakka Ryoran, mas..."
10119-190 = "Não era algo tão sério quanto aqui no Schale."
10119-200 = "Diga... nos dias em que fico de plantão no Schale,"
10119-210 = "é impressão minha ou eu sempre acabo assando espetinhos de frango?"
10119-220 = "Eu gosto... mas"
10119-230 = "acho melhor não assar aqui."
10119-240 = "...Aconteceu alguma coisa?"
10119-250 = "Ficou admirado com a minha pele clara...?"
10119-260 = "Entendo... você nunca se cansa, não é?"
10119-270 = "Dizem que o gelo sólido..."
10119-280 = "é formado congelando lentamente ao longo do tempo."
10119-290 = "Sinto que é um pouco parecido... com forjar o ferro."
10119-300 = "...Talvez, quando a solidão se acumula, a gente acabe se tornando alguém inflexível."
10119-310 = "O \"Comitê de Mediação de Conflitos Hyakka Ryoran\","
10119-320 = "como o nome sugere, existe para mediar conflitos."
10119-330 = "Na verdade..."
10119-340 = "seria bom se tudo terminasse antes que eu precisasse sacar esta arma."
10119-350 = "Que estranho."
10119-360 = "Só de estar ao seu lado, sinto uma felicidade imensa."
10119-370 = "Para mim, isso é algo tão especial quanto se fosse algo meu."
10119-380 = "...Feliz aniversário."
10119-390 = "...Você se lembrou. Obrigada."
10119-400 = "Até hoje, eu nunca tinha dado muita importância a isso, mas..."
10119-410 = "De agora em diante... talvez eu passe a considerar um dia especial."
10119-420 = "Feliz Ano Novo."
10119-430 = "Este ano... pretendo depender um pouco mais de você. Tudo bem...?"
10119-440 = "Eu gosto do inverno."
10119-450 = "Porque tudo se dissolve no branco e deixa de me incomodar."
10119-460 = "Por isso, desta estação —"
10119-470 = "eu adoro o festival do auge do inverno."
10119-480 = "...Eu estava pensando sobre o Halloween."
10119-490 = "Como eu sempre interpreto a pessoa que quero ser..."
10119-500 = "será que isso significa que estou sempre de cosplay?"
10119-510 = "Fufu."
10119-520 = "Talvez este dia\nexista por minha causa."
10119-540 = "O momento em que a noite termina —\né quando a escuridão é mais profunda."
10119-550 = "Eu...\ntinha medo dessa escuridão absoluta."
10119-560 = "Pois eu não conseguia —\nnem brilhar intensamente o suficiente para iluminar a noite,"
10119-570 = "nem suportar\naté que o dia amanhecesse."
10119-580 = "Tudo o que eu conseguia fazer era fingir ser outra pessoa —\nme esconder nas sombras\ne manter a compostura."
10119-590 = "Mas — agora é diferente."
10119-600 = "Porque descobri que —\nquando minha sombra cai,\nnão há noite que não chegue ao fim."
10119-610 = "Por isso —"
10119-620 = "Vou anunciar meu nome ao crepúsculo —"
10119-630 = "— Eu sou a presidente do Comitê de Mediação de Conflitos\nHyakkiyako,"
10119-640 = "Muryou Nagusa!"
10119-2600 = "…Esta arma, ninguém pode portá-la sem a devida qualificação. Sim — o significado de Muryou Nagusa estar com ela. Acho que o Sensei entende. Mesmo assim… se você confiar em mim… se você acreditar em mim. Eu também, darei o meu melhor para lutar."
