[translation]
10119-10 = "ブルーアーカイブ。"
10119-20 = "百鬼夜行連合学院、\n百花繚乱紛争調停委員会――御稜ナグサ。\nこの力は、みんなを守るためにある。"
10119-30 = "アヤメだったら……\nどう過ごしてたかな。"
10119-40 = "ここにいても\nいいのかな……。"
10119-50 = "（これは……\n焼鳥……？）"
10119-60 = "ちょっと暑いけど……\nきっとみんなに\nとっては過ごし\nやすいんだろうな。"
10119-70 = "少しくらくらする……\n休もうかな。"
10119-80 = "ああ、おかえりなさい先生。"
10119-90 = "今日は、\n何をすればいいのか教えて。"
10119-100 = "あっ、先生……\nおかえりなさい。"
10119-110 = "帰ってきてくれて、よかった。"
10119-120 = "その……不安で。"
10119-130 = "みんな、\n離れてしまうんじゃって。"
10119-140 = "消えてしまうんじゃ\nないかって……。"
10119-150 = "あまり……一人にしないで。"
10119-160 = "ごめんなさい。"
10119-170 = "シャーレの仕事は……\n少し新鮮。"
10119-180 = "百花繚乱でも\n事務仕事はしてたけど……"
10119-190 = "シャーレほど本格的な\nものじゃなかったから。"
10119-200 = "あの……シャーレ当番の日に"
10119-210 = "よく焼鳥を焼いてる\n気がするのは……気のせい？"
10119-220 = "好き……だけど"
10119-230 = "ここで焼くのは\nやめた方がいいと思う。"
10119-240 = "……どうかしたの？"
10119-250 = "白い肌に見惚れてた……？"
10119-260 = "そう……よく飽きないね。"
10119-270 = "固い氷って……"
10119-280 = "ゆっくり時間をかけて\n凍らせるんだって。"
10119-290 = "なんだか……鉄を焼くのと\n似ている気がする。"
10119-300 = "……孤独が募ると、\n頑なになっていく\nものなのかもしれないね。"
10119-310 = "「百花繚乱\n紛争調停委員会」は、"
10119-320 = "その名の通り紛争を調停する\nために存在しているの。"
10119-330 = "本当は……"
10119-340 = "この銃を抜く前に\n終わるといいんだけど。"
10119-350 = "変なの。"
10119-360 = "そばにいるだけで、こんなにも\n幸せな気持ちになる。"
10119-370 = "私にとっても、\n自分事のように\n特別に思うんだ。"
10119-380 = "……お誕生日、おめでとう。"
10119-390 = "……覚えていてくれたんだ。\nありがとう。"
10119-400 = "今まで、あまり気にした\nことはなかったけど……。"
10119-410 = "これからは……特別な日だと、\n思えるかも。"
10119-420 = "明けましておめでとう。"
10119-430 = "今年は……もう少しだけ、\n頼ろうと思う。いいかな……？"
10119-440 = "私は冬が好き。"
10119-450 = "全部が白にとけて、\n気にならなくなるから。"
10119-460 = "だから、この季節の――"
10119-470 = "真冬のお祭りが大好きなんだ。"
10119-480 = "……ハロウィーンのことを、\n考えていたの。"
10119-490 = "私、いつもなりたい自分を\n演じているから……"
10119-500 = "ずっとコスプレをしている\nことになるのかな。"
10119-510 = "ふふ。"
10119-520 = "今日という日は私のために\nあるのかもしれない。"
10119-540 = "夜が明けるこの瞬間が――\nもっとも闇が深くなる。"
10119-550 = "私は……\nこの漆黒が恐ろしかった。"
10119-560 = "闇夜を照らすほど\n眩しく輝くことも――"
10119-570 = "夜が明けるまで\n耐え忍ぶことも、\n私にはできなかったから。"
10119-580 = "他人を演じることで――\n影に紛れて平静を\n装うことしか、\nできなかったの。"
10119-590 = "でも――今は違う。"
10119-600 = "明けない夜はないと――\n私の影が落ちると、\n知ったから。"
10119-610 = "だから――"
10119-620 = "黄昏に名乗りをあげよう――"
10119-630 = "――私は百花繚乱\n紛争調停委員会の委員長、"
10119-640 = "御稜ナグサ！"
10119-2600 = "…この銃は、資格がなければ持つことができないもの。そう――これを御稜ナグサが持つ、意味。先生なら、分かっていると思う。それでも……任せてくれるのなら……信じてくれるのなら。私も、全力で足掻いてみるよ。"
