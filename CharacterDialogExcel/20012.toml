[translation]
20012-10 = "Blue Archive."
20012-20 = "Sou Sena, chefe do Departamento de Medicina de Emergência da Academia Gehenna.\nPrazer em conhecê-lo."
20012-30 = "Hmm...\nNão parece haver\nnada de anormal."
20012-40 = "Fiz... não, quero dizer,\nnão parece haver\nnenhum ferido, certo?"
20012-50 = "Este parece ser um bom lugar\npara descansar."
20012-60 = "De vez em quando, momentos como este\ntambém não são ruins."
20012-70 = "Onde está o Sensei..."
20012-80 = "Bom trabalho, Sensei.\nEstava à sua espera."
20012-90 = "Já estou pronta.\nPor favor, pode me pedir o que precisar."
20012-100 = "...Você me chamou?"
20012-110 = "Não precisa ser nada importante,\npode ser até um assunto pessoal, se quiser."
20012-120 = "Basicamente, nós somos especialistas\nem ferimentos físicos, ou seja, cirurgia."
20012-130 = "Portanto, resfriados e coisas do tipo\nestão fora da nossa jurisdição."
20012-140 = "Estou acostumada a esperar."
20012-150 = "E também,\na ser chamada de repente."
20012-160 = "Estar de pé\nneste lugar significa que..."
20012-170 = "Posso interpretar que\ntenho esse nível de confiança?"
20012-180 = "Parece que não está acontecendo nada\nem especial agora.\n...Devo descansar\nenquanto posso?"
20012-190 = "Feliz aniversário,\nSensei."
20012-200 = "Espero que você passe este dia maravilhoso\nsem acidentes ou ferimentos."
20012-210 = "...Falando nisso, hoje\né o meu aniversário."
20012-220 = "Não, eu só\ncomentei por comentar."
20012-230 = "Ah... você vai\nme desejar parabéns?"
20012-240 = "...Muito obrigada,\nestou feliz."
20012-250 = "Quando me dei conta, o ano\njá tinha virado."
20012-260 = "Conto com você para este novo ano\ntambém,\nSensei."
20012-270 = "Natal... pode ser\num dia bom, mas..."
20012-280 = "Na verdade, para nós,\né um dia que costuma ser\nmais corrido que o normal."
20012-290 = "Se eu pudesse ganhar\num presente, seria um tempo sozinha..."
20012-300 = "Não, na verdade, eu gostaria de um tempo\ntranquilo a sós com você."
20012-310 = "Em dias agitados como este, acidentes e ferimentos são comuns. Preciso estar preparada."
20012-330 = "...Se não se importar, gostaria de se juntar a mim?\nÉ algo da loja de conveniência, mas..."
20012-340 = "Como eu tinha que ficar de prontidão, pensei em fazer algo simples."
20012-350 = "A propósito,\no que o Sensei está fazendo aqui?\nEm um lugar como este..."
20012-360 = "...Sim? Você veio me ver porque parecia que eu estava sobrecarregada...?"
20012-370 = "...Entendo,\nera isso."
20012-380 = "...Obrigada por vir até aqui,\nSensei."
20012-390 = "Foi um desdobramento inesperado,\nmas..."
20012-400 = "Estou sinceramente feliz\npor estar aqui com você, Sensei."
20012-2600 = "Recebi este equipamento. A partir de agora, poderei oferecer um suporte mais completo. ...Conto com você daqui para frente."
