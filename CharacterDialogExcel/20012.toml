[translation]
20012-10 = "ブルーアーカイブ。"
20012-20 = "ゲヘナ学園救急医学部の部長、\n氷室セナです。\n以後お見知りおきを。"
20012-30 = "ふむ……\n特に異常は\n無さそうですね。"
20012-40 = "した……いえ、\n負傷者はいなさ\nそうですね？"
20012-50 = "休息にはちょうど\n良さそうな\n場所ですね。"
20012-60 = "たまにはこういった\n時間も、\n悪くありません。"
20012-70 = "先生は、どこに……"
20012-80 = "お疲れ様です、先生。\nお待ちしていました。"
20012-90 = "準備はできていますので。\n何でもお申し付けください。"
20012-100 = "……お呼びですか？"
20012-110 = "大したことではなくても、\n何なら個人的な用事でも\n構いませんが。"
20012-120 = "基本的に私たちは\n身体の傷、すなわち外科を\n専門としています。"
20012-130 = "ですので、風邪などは\n管轄外ですよ。"
20012-140 = "待つことには慣れていますから。"
20012-150 = "それと、\n急に呼び出されることにも。"
20012-160 = "この場所に\n立っているということは、"
20012-170 = "それくらい信頼されていると\n解釈しても良いですか。"
20012-180 = "今は特に何も\n起きてないようですね。\n……休める時に\n休んでおきますか。"
20012-190 = "お誕生日おめでとうございます、\n先生。"
20012-200 = "今日という良き日を、\n怪我も事故も無く過ごせることを\n願っていますよ。"
20012-210 = "……そういえば今日は、\n私の誕生日でしたね。"
20012-220 = "いえ、\nただ言ってみただけなのですが。"
20012-230 = "あっ……祝って、\nくださるんですか？"
20012-240 = "……ありがとうございます、\n嬉しいです。"
20012-250 = "気づいたらいつの間にか、\n年が明けていましたね。"
20012-260 = "この新しい一年も、\nよろしくお願いいたします。\n先生。"
20012-270 = "クリスマス……\n良い日なのかもしれませんが"
20012-280 = "実は私たちにとっては、\n普段より忙しくなりがちな\n一日です。"
20012-290 = "もし、\nプレゼントを貰えるとしたら\nひとりの時間……"
20012-300 = "いえ、ふたりっきりの\n落ち着いた時間が\n欲しいですね。"
20012-310 = "こういった騒がしい日に、\n事故や怪我はつきものです。\n準備をしておかないと。"
20012-330 = "……よろしければこちら、\nご一緒にいかがですか？\nコンビニのものですが……。"
20012-340 = "こうして待機していなければならなかったので、簡単なもので済ませてしまおうかと。"
20012-350 = "ところで、\n先生はどうされたのですか。\nこんなところで……。"
20012-360 = "……はい？大変そうだから、\n労おうと思って……？"
20012-370 = "……なるほど、\nそうでしたか。"
20012-380 = "……わざわざこんなところまで、\nありがとうございます。先生。"
20012-390 = "予期せぬ展開では\nありましたが……。"
20012-400 = "先生とこうしていられるのは、\n素直に嬉しいです。"
20012-2600 = "こちらの装備、確かに受け取りました。\nこれからはより本格的な支援が\nできるはずです。……これからも、\nどうかよろしくお願いいたします。"
