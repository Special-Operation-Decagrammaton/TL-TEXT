[translation]
10086-10 = "Blue Archive."
10086-20 = "Sou do Comitê Disciplinar da Academia Gehenna, Sorasaki Hina. Eu... acabei vestindo o vestido que você escolheu para mim, Sensei. Será que... combina comigo?"
10086-30 = "Com este vestido, eu me sinto um pouco inquieta..."
10086-40 = "Eu queria sentar em algum lugar para praticar, mas..."
10086-50 = "Todos estão brilhando tanto."
10086-60 = "Ufa, de alguma forma... estou um pouco cansada."
10086-70 = "Como presidente do Comitê Disciplinar, preciso manter o foco."
10086-80 = "Bem-vindo, Sensei. Há algo em que eu possa ajudar?"
10086-90 = "Ah, Sensei. Aqui. É aqui."
10086-100 = "Eh? Hm? E-eu estou bonita?"
10086-110 = "Ah, obrigada... E-esse, bem..."
10086-120 = "Este vestido... foi você quem escolheu, não foi, Sensei?"
10086-130 = "...É muito bonito, mas, no fim das contas, para mim..."
10086-140 = "...Eh? Você disse que... combina muito comigo?"
10086-150 = "O-o que você está dizendo, Sensei...!?"
10086-160 = "Ultimamente, tenho praticado piano."
10086-170 = "É a primeira vez em muito tempo que me dedico a algo além do trabalho do Comitê Disciplinar, então é um pouco refrescante."
10086-180 = "Quando visto este vestido, minha postura fica um pouco mais ereta."
10086-190 = "Talvez seja por isso que meu coração está batendo um pouco mais forte que o normal."
10086-200 = "Mesmo de vestido, eu continuo sendo eu. Hoje também vou apoiar o seu trabalho ao seu lado."
10086-210 = "Por isso... não tente fugir."
10086-220 = "Dizer que 'apesar de rigorosa, a Hina é fofa'..."
10086-230 = "Ugh, sério, o-o que você está dizendo? Você..."
10086-240 = "...Claro que fico feliz, mas, m-mas... chega."
10086-250 = "Feliz aniversário, Sensei."
10086-260 = "Bem... eu pratiquei uma música especialmente para hoje. Se não se importar... gostaria de ouvir?"
10086-270 = "...Dizer que você é quem gostaria de pedir isso..."
10086-280 = "Não é algo que mereça esse tipo de elogio... não, espere."
10086-290 = "É uma música que preparei para você. Vou tocar com toda a minha dedicação."
10086-300 = "Ah, hoje é meu aniversário, né? É verdade, tinha me esquecido."
10086-310 = "Obrigada por me parabenizar, Sensei."
10086-320 = "Algo que eu queira? Bem..."
10086-330 = "Só de você vir aqui assim, para mim... já é o suficiente."
10086-340 = "Obrigada por tudo, como sempre, Sensei."
10086-350 = "Um novo ano começou. Feliz Ano Novo, Sensei."
10086-360 = "Então vamos passar mais um ano juntos, acumulando memórias."
10086-370 = "Fufu. Para mim, isso é algo que me deixa muito feliz."
10086-380 = "Feliz Natal, Sensei."
10086-390 = "Será que, vestida assim, eu não vou parecer deslocada estando com você hoje?"
10086-400 = "Eh...? Você quer que a gente vá... a um lugar que combine com este vestido?"
10086-410 = "E-ei, Sensei... e-espere um pouco...!?"
10086-420 = "É Halloween, né? Doces ou travessuras."
10086-430 = "Só por hoje, será que... eu poderia te pregar uma peça?"
10086-450 = "Agora... vou tocar para você, Sensei."
10086-460 = "Ah, não, naquela hora... é que não estávamos... a sós..."
10086-470 = "Sobre... ter praticado piano por tanto tempo..."
10086-480 = "Era para que você pudesse ouvir..."
10086-490 = "Se eu não tivesse conseguido apresentar assim... eu com certeza me arrependeria."
10086-500 = "U-uh? Não, n-não é nada tão incrível assim..."
10086-510 = "Quando você cria expectativas assim... eu fico um pouco sem jeito."
10086-520 = "Ah……\nU-um……"
10086-530 = "É…… você\nsempre foi assim."
10086-540 = "Sim…… então,\nescute com atenção, está bem?"
10086-550 = "……Para você,\na minha apresentação."
10086-2600 = "Isso, para mim…… obrigada, Sensei.\nAs palavras e a confiança que você sempre me dá.\nQuero retribuir esse seu coração sincero com a mesma sinceridade. Por isso, por favor, continue me observando até o fim."
