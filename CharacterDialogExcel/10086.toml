[translation]
10086-10 = "ブルーアーカイブ。"
10086-20 = "ゲヘナ学園所属、風紀委員長の空崎ヒナ。\nその……先生が選んでくれたドレスを着て、\nみたんだけど。似合って、るかな……？"
10086-30 = "ドレスだと、\n少し落ち着かない……"
10086-40 = "どこかに座って、\n練習したいところ\nだけど……"
10086-50 = "みんな\nキラキラしてる。"
10086-60 = "ふぅ、なんだか\n少し疲れる……"
10086-70 = "風紀委員長として、\n気を引き締めないと。"
10086-80 = "いらっしゃい。先生。\n何か手伝うことは\nあるかしら？"
10086-90 = "あ、先生。\nここ。ここよ。"
10086-100 = "え？ん？\nか、可愛い？"
10086-110 = "あ、ありがとう……\nそ、その……"
10086-120 = "この、ドレス……\n先生が選んでくれたんだね。"
10086-130 = "……すごく綺麗だけど、\nやっぱり私には……"
10086-140 = "……え？\nよく似合ってる……って？"
10086-150 = "な、何を言ってるの、\n先生……！？"
10086-160 = "最近はピアノの\n練習をしてるの。"
10086-170 = "久しぶりに風紀委員の\n業務以外に打ち込んでるから、\nちょっと新鮮かも。"
10086-180 = "ドレスを着ると、\nちょっとだけ背筋が伸びるの。"
10086-190 = "だからなのかな、\nいつもより少しだけ、\nドキドキする。"
10086-200 = "ドレスを着てても、私は私。\n今日も先生の仕事を、\n隣でサポートする。"
10086-210 = "だから……\n逃げちゃダメよ。"
10086-220 = "「厳しいけど、やっぱり\nヒナは可愛い」って……。"
10086-230 = "うっ、本当にな、な、何を\n言ってるの。あなたは。"
10086-240 = "……そりゃ、嬉しいけど、\nで、でも……もう。"
10086-250 = "お誕生日おめでとう、先生。"
10086-260 = "その……今日のために\n練習した曲があるの。\nよかったら……聞いてくれる？"
10086-270 = "……むしろ自分から\nお願いしたいくらい、って。"
10086-280 = "そ、そういってもらえるような\nものでは……いや。"
10086-290 = "あなたのために\n用意した曲だから。\n私、全力で演奏するね。"
10086-300 = "あ、今日は私の誕生日、か。\nそういえばそう、だった。"
10086-310 = "祝ってくれて、\nありがとう。先生。"
10086-320 = "欲しいもの？そうだね……"
10086-330 = "先生がこうして\n来てくれるだけで\n十分……かな。"
10086-340 = "いつもありがとう、先生。"
10086-350 = "また年が明けたね。\n明けましておめでとう。先生。"
10086-360 = "こうして新たな年をあなたと\n積み重ねていくんだね。"
10086-370 = "ふふ。私にとっては\nとても嬉しいことよ。"
10086-380 = "メリークリスマス、先生。"
10086-390 = "今日という日はドレス姿で\nあなたと一緒にいても、\n浮かないかな？"
10086-400 = "え……？\nドレスに相応しい場所に……\n行ってみよう？"
10086-410 = "え、えっと、先生……\nちょ、ちょっと……！？"
10086-420 = "ハロウィンだね。\nトリックオアトリート。"
10086-430 = "今日だけは、\nあなたにいたずらをしても……\nいいかな？"
10086-450 = "これから……\n先生のために演奏するね。"
10086-460 = "あ、いや、あの時は……\nふ、2人きりじゃ、\nなかったから……"
10086-470 = "その……ピアノを\nずっと練習してたのは……"
10086-480 = "先生に聞かせるためで……"
10086-490 = "このまま、\n披露できなかったら……\n絶対、後悔しそうだったから。"
10086-500 = "う、うん？\nいや、そ、そんなに\nすごいことじゃない、よ……"
10086-510 = "そういう風に期待されると……\nちょっと困るかも。"
10086-520 = "あ……\nう、うーん……"
10086-530 = "そう……あなたは、\nいつもそうだった。"
10086-540 = "うん……じゃあ、\nちゃんと聞いててね。"
10086-550 = "……あなたに送る、\n私の演奏を。"
10086-2600 = "これを、私に……ありがとう。先生。\nいつもあなたが私にくれる言葉、信頼。\nそのまっすぐな心に、私もまっすぐに応えたい。だからどうか、最後まで見守ってて。"
