[translation]
10103-10 = "Blue Archive!"
10103-20 = "Como presidente do comitê de segurança da Academia Red Winter... vou mostrar a vocês uma verdadeira demonstração de bravura!"
10103-30 = "O que é isso? ...Não é que é fofo?"
10103-40 = "...! A-agora mesmo, senti algo frio nos meus pés...!"
10103-50 = "Preciso exibir uma postura mais elegante..."
10103-60 = "Ah... quando fico parada, sinto uma coceira..."
10103-70 = "(Elas sempre usam roupas tão finas assim... as alunas de outras escolas não se incomodam?)"
10103-80 = "Eu estava esperando, Sensei. Dê logo a ordem para o próximo ataque."
10103-90 = "Hmm... munya..."
10103-100 = "...Uau! Sensei!? Desde quando você está aí!?"
10103-110 = "E-eu não estava cochilando!"
10103-120 = "Ouvi de uma aluna de Shanhaijing que, se você treinar artes marciais, pode se mover instantaneamente para lugares distantes..."
10103-130 = "Isso é verdade?"
10103-140 = "Se for, então se eu aprender essa técnica... poderei realizar ataques ainda mais poderosos!"
10103-150 = "Dizem que há um restaurante de culinária requintada na Associação Genbu."
10103-160 = "...Sensei, você poderia me acompanhar?"
10103-170 = "É que... se eu for sozinha, temo que acabe me perdendo no caminho..."
10103-180 = "Ouvi dizer que os ursos de Shanhaijing são herbívoros."
10103-190 = "Devem ter uma personalidade dócil, e o pelo deve ser macio e fofinho ao toque..."
10103-200 = "Eu adoraria poder tocar em um pelo menos uma vez..."
10103-210 = "(Este vestido ser tão aberto assim... é parte do design, né...?)"
10103-220 = "(...Será que esqueceram de costurar essa parte!?)"
10103-230 = "As alunas daqui andam por aí com roupas que parecem tão frias... é uma sensação estranha."
10103-240 = "Na Academia Red Winter, é natural que todas usem várias camadas de roupa..."
10103-250 = "...Bem, imagino que ninguém seja louco de usar roupas finas no Mar de Gelo! Haha!"
10103-260 = "Hoje, por acaso... é o aniversário do Sensei?"
10103-270 = "Como não estamos em Red Winter... não posso te dar novos suprimentos ou medalhas, mas..."
10103-280 = "Certo, então hoje seguirei as ordens do Sensei. Pode ser qualquer coisa! Ordene como quiser, Sensei!"
10103-290 = "Passar o aniversário em uma terra estranha... é uma sensação um tanto solitária..."
10103-300 = "...Se o Sensei pudesse ficar no lugar do Medved, talvez eu me sentisse um pouco menos sozinha."
10103-310 = "Feliz Ano Novo, Sensei. Espero que este ano também seja repleto de feitos revolucionários."
10103-320 = "Confundi uma integrante do clube de ópera chinesa, com seu traje de palco vermelho, com o Papai Noel..."
10103-330 = "Eu, de todas as pessoas... acabei ficando empolgada..."
10103-340 = "Eu estava ansiosa pelo presente de Natal..."
10103-350 = "Agora pouco, uma criança do Jardim Meika me pregou uma peça..."
10103-360 = "Só porque eu não tinha doces, fizeram o que quiseram comigo..."
10103-370 = "É por isso que eu não gosto do Halloween!"
10103-390 = "A-assim? Hein? Abrir um pouco mais as pernas... e os braços...?"
10103-400 = "U-ugh... eu realmente não estou acostumada com esse tipo de coisa..."
10103-410 = "Ei... Sensei... como eu estou parecendo agora...?"
10103-420 = "Hã...!? Eu tenho um charme diferente do habitual...?"
10103-430 = "B-boba! Não diga coisas que não sente...!"
10103-440 = "...É-é verdade, o que você disse...?"
10103-450 = "Você está ansioso pelas fotos...?"
10103-460 = "Ugh...! O Sensei está sendo... muito maldoso hoje..."
10103-2600 = "Ah, minha Balalaika... durante um ataque, nada supera a estabilidade de uma submetralhadora com bandoleira. ...Só que, com este traje, a alça fica roçando e dói um pouco..."
