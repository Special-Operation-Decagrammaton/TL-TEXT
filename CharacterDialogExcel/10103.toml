[translation]
10103-10 = "ブルーアーカイブ！"
10103-20 = "レッドウィンター連邦学園の保安委員長として…\n真の勇姿を見せてやろう！"
10103-30 = "なんだこれは？\n…かわいいじゃ\nないか。"
10103-40 = "…！い、いま、\n足元に何か\n冷たい感触がっ…！"
10103-50 = "もっと品のある姿を、\n見せなければ…"
10103-60 = "ふあぁ…\nじっとしていると、\nムズムズする…"
10103-70 = "（いつもこんな\n薄い服を…他校の\n生徒は、平気なのか？）"
10103-80 = "待っていたぞ、先生。\nさ、次の突撃先の指示をくれ。"
10103-90 = "んん…むにゃ…"
10103-100 = "…うわっ！先生！？\nいつの間に！？"
10103-110 = "い、居眠りなんて、\nしてないぞ！"
10103-120 = "山海経の生徒に聞いた。\n武功、を鍛錬すれば\n遠方まで瞬時に移動できると…"
10103-130 = "それは本当なのか？"
10103-140 = "ならば、その技を習得すれば…\nより強力な突撃ができそうだ！"
10103-150 = "玄武商会に絶品の\n料理店があるらしい。"
10103-160 = "…先生、同行してもらえるか？"
10103-170 = "その…私一人だと、\n道に迷ってしまいそうで…"
10103-180 = "山海経の熊は、\n草食だと聞いている。"
10103-190 = "きっと大人しい性格で、\n毛並みは触り心地がよく、\nふわふわで柔らかいのだろう…"
10103-200 = "一度は触れてみたいものだ…"
10103-210 = "（このワンピースが\nこんなに開いているのは…\nデザインなんだよな…？）"
10103-220 = "（…もしかして、\n縫い付けるのを\nサボられたのか！？）"
10103-230 = "ここの生徒は寒そうな\n格好で出歩いているな…\n妙な気分だ。"
10103-240 = "レッドウィンター連邦\n学園では、みな\n重ね着をしているのが\n当たり前だからな…"
10103-250 = "…まあ、さすがに\n氷海で薄着をする\n生徒はいないと\n思うがな！はは！"
10103-260 = "今日は、もしや…\n先生の誕生日か？"
10103-270 = "ここはレッドウィンターでは\nないからな…新しい\n補給品や勲章は渡せないが…"
10103-280 = "うむ、それでは今日は\n先生の命令に従うとしよう。\n何でもいいぞ！\n好きに命令してくれ、先生！"
10103-290 = "他郷で迎える誕生日は…\nなんだか孤独な気分だ…"
10103-300 = "…先生がメドヴェーチの\n代わりになってくれたら、\n少しは寂しく、なくなるかもな。"
10103-310 = "明けましておめでとう、先生。\n今年も革命的な活躍を、\n期待しているぞ。"
10103-320 = "赤い舞台衣装の京劇部員を\nサンタクロースだと\n勘違いして…"
10103-330 = "私としたことが…\n興奮してしまった…"
10103-340 = "クリスマスプレゼント…\n楽しみにしていたのだが…"
10103-350 = "さっき、梅花園の子供に\nいたずらされたんだ…"
10103-360 = "飴を持ってないからって\n好き放題して…"
10103-370 = "これだから\nハロウィーンは苦手だ！"
10103-390 = "こ、こうか？え？\n足をもう少し開いて…\n腕も…？"
10103-400 = "う、うぅ…やはり\nこういうのは慣れない…"
10103-410 = "あの…先生…今の私は、\nどう映ってるんだ…？"
10103-420 = "えっ…！？いつもと\n違う魅力が、ある…？"
10103-430 = "バ、バカ！\n心にもないことを…！"
10103-440 = "…ほ、本心、だと…？"
10103-450 = "写真が楽しみ…？"
10103-460 = "うっ…！\n今日の先生は…\n意地が悪いな…。"
10103-2600 = "嗚呼、我がバラライカ…突撃中、\nスリング付きのサブマシンガンの\n安定感に勝るものはない。\n…ただ、この格好だと肩紐が\nすれて少し痛いんだ…"
