[translation]
26002-20 = "Sou a Juri, do Clube de Merenda da Academia Gehenna.\nSe estiver com fome, pode me chamar a qualquer momento, viu?"
26002-30 = "Hmm, que aroma doce..."
26002-40 = "Será que isso também dá para comer?"
26002-50 = "Por enquanto, acho que vou\nfritar isso uma vez..."
26002-60 = "Ora.\nEste é um lugar muito bom."
26002-70 = "Aqui, acho que conseguirei\npreparar pratos deliciosos."
26002-80 = "Bem-vindo de volta, Sensei.\nNão está com fome?"
26002-90 = "Bem-vindo de volta, Sensei.\nQuer comer alguma coisa?"
26002-100 = "Ou talvez... um lanchinho?"
26002-110 = "Uuu..."
26002-120 = "Por que será que toda vez que vou cozinhar,\neu só cometo erros..."
26002-130 = "Dizem que se os ingredientes estão vivos,\né porque estão frescos, então\nisso é uma coisa boa, não é?"
26002-140 = "Hum, está com cheiro de queimado...?"
26002-150 = "...Ora, veja só! Esqueci que\ntinha deixado a torta no forno!"
26002-160 = "Para dar um toque ácido à comida,\nserá que é melhor usar especiarias\nou ácido clorídrico...?"
26002-170 = "Feliz aniversário,\nSensei!"
26002-180 = "Eu assei um bolo para\nte presentear, mas..."
26002-190 = "É que, bem...\nEle acabou fugindo..."
26002-200 = "Um presente de\naniversário para mim?"
26002-210 = "Fufu... Só de ouvir isso,\neu já fico muito feliz."
26002-220 = "Como o Ano Novo chegou,\npreparei um prato Osechi."
26002-230 = "Se não se importar, poderia\nexperimentar um pouco?"
26002-240 = "Bem, é que como é Natal,\neu assei um peru, mas..."
26002-250 = "Um peru assado que ainda\nestá vivo e se mexendo\nnão serve, né...?"
26002-260 = "Não sei por que, mas no Halloween,\nos doces que eu faço são muito populares."
26002-270 = "Dizem que são perfeitos para travessuras..."
26002-290 = "Ah, olhe só, Sensei!"
26002-300 = "Este tomate bem vermelhinho,\nnão acha que parece\nmuito delicioso?"
26002-310 = "Ehem, este também é um\nresultado do Clube de Merenda."
26002-320 = "Valerá a pena todo o\nesforço que dediquei!"
26002-330 = "Ah, aquele tomate ali também\nestá com uma cara ótima..."
26002-340 = "Bem, é que, aquilo, sabe...\nÉ que a distância está um\npouco curta, não acha...?"
26002-350 = "Nesta proximidade, eu...\nSabe..."
26002-360 = "(Ah, o perfume do Sensei...)"
26002-370 = "(E-estou sentindo meu coração\nbater tão forte de repente...!?)"
26002-380 = "E-está tudo bem, sim!\nNão se preocupe...!"
26002-390 = "É só que, como posso dizer,\nbem..."
26002-400 = "Meu rosto está ficando quente,\nisto é...! Uuu...!"
26002-2600 = "Fufu, quando uso esta arma na cozinha, a textura da carne fica muito mais macia!"
