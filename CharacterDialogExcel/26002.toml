[translation]
26002-20 = "ゲヘナ学園、給食部のジュリといいます。\nお腹が空いたら、いつでも私に言ってくださいね？"
26002-30 = "う～ん、甘い香り…。"
26002-40 = "これも食べられますかね？"
26002-50 = "とりあえず一回、\n揚げてみようかな…。"
26002-60 = "あら。\nとても良いところですね。"
26002-70 = "ここなら\n美味しいお料理が\n作れそうです。"
26002-80 = "おかえりなさい、先生。\nお腹空いてないですか？"
26002-90 = "おかえりなさい、先生。\nご飯にしますか？"
26002-100 = "それとも…お・や・つ？"
26002-110 = "うう…。"
26002-120 = "なんで私は料理をするたびに、\n失敗ばかりするのでしょう…。"
26002-130 = "食材が生きていると\nいうのはそれだけ新鮮と\nいうことですから\n良いことですよね？"
26002-140 = "なんか、焦げ臭いです…？"
26002-150 = "…あら、私ったら！\nパイをオーブンに入れっぱなし\nだったことを忘れてました！"
26002-160 = "料理に酸味を出すためには、\n香辛料を入れるのと、\n塩酸を入れるのと、\nどちらがいいのでしょうか…？"
26002-170 = "お誕生日おめでとう\nございます、先生！"
26002-180 = "先生に差し上げようと\nケーキを焼いたのですが、"
26002-190 = "それがその…。\n逃げちゃいました…。"
26002-200 = "私の誕生日\nプレゼントですか？"
26002-210 = "ふふ…。\nその言葉だけでも\n十分嬉しいですよ。"
26002-220 = "お正月を迎えたので\nおせち料理を作ってみました。"
26002-230 = "よろしければ味見して\nいただいてもいいでしょうか？"
26002-240 = "えー、その、\nクリスマスだから七面鳥を\n焼いたのですけれど…"
26002-250 = "生きてて動く\nローストターキーは\nだめですよね…？"
26002-260 = "ハロウィーンになると\nなぜか私の作った\nお菓子が人気なんです。"
26002-270 = "いたずらにぴったり…？だとか。"
26002-290 = "あっ、見てください先生！"
26002-300 = "この真っ赤に実ったトマト、\nすっごく美味しそうだと\n思いませんか？"
26002-310 = "えへん、これも\n給食部としての成果です。"
26002-320 = "丹精込めて作った\n甲斐がありました！"
26002-330 = "あ、あっちのトマトも\nすごく良い感じに……"
26002-340 = "えっと、あ、あれ、\nなのですが、その……\n何だかちょっと距離が……？"
26002-350 = "この近さですと、\nあの、私……。"
26002-360 = "（あ、先生の香りが……）"
26002-370 = "（な、何だか急に、胸がド\nキドキしてきました……！？）"
26002-380 = "だっ、大丈夫です、はい！\nご心配なく……！"
26002-390 = "ただその何と言いますか、\nえっと……。"
26002-400 = "何だか顔が熱くなってきて、\nその……！うぅ……！"
26002-2600 = "ふふ、この銃をお料理に使うと、\nお肉の食感がぐんと柔らかくなりますね！"
