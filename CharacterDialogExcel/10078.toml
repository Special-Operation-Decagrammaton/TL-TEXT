[translation]
10078-10 = "Blue Archive～！！ Hahahaha!"
10078-20 = "Hahahaha! We are here because there is a hot spring! No, even if there isn't one, we are here! Now, the explosives are ready!"
10078-30 = "Oh? If it's here...?"
10078-40 = "If I dig a hot spring here..."
10078-50 = "...Oops, that's dangerous. There are some troublesome people here."
10078-60 = "Do I have to hide again even here?"
10078-70 = "Hmm... I'm bored... Shall we study or something?"
10078-80 = "Hey there, Sensei! Isn't this a fancy place?"
10078-90 = "You've finally arrived! I've been waiting for you, Sensei!"
10078-100 = "It's not like I'm digging just anywhere, you know?"
10078-110 = "I'm doing it after scouting the area to some extent."
10078-120 = "Hmm? Digging isn't the only part of hot spring development, you know?"
10078-130 = "I certainly love building them too!"
10078-140 = "It's just that I usually don't get as far as the building phase!"
10078-150 = "Hahahaha! Well, that's part of the fun too!"
10078-160 = "Being with you is just as fun as when I'm developing hot springs."
10078-170 = "Hahahaha! Don't be so on guard!"
10078-180 = "If I ever get caught, make sure to come visit me!"
10078-190 = "I'll be waiting! Hahahaha!"
10078-200 = "Oh! Sensei, by the way, isn't today your birthday?"
10078-210 = "Since it's a special day! I'll go make a present!"
10078-220 = "Sigh... I was chased by the Discipline Committee on my way to Schale."
10078-230 = "Honestly! Since it's my birthday today, couldn't they have gone a little easier on me?"
10078-240 = "Happy New Year, Sensei! We managed to make it through the year safely."
10078-250 = "Now, let's go dig up plenty more this year too!"
10078-260 = "Christmas is wonderful! Security gets lax, so it's the perfect day for development!"
10078-270 = "It's quite lively! With this, the sound of the excavator will be drowned out..."
10078-280 = "Don't look at me like that."
10078-300 = "Hahahaha! You've come at just the right time!"
10078-310 = "Welcome, Sensei. This is my 86th secret hideout."
10078-320 = "What am I doing here, you ask? That's a foolish question, Sensei. I only do one thing."
10078-330 = "Namely... I am searching for a new hot spring spot!"
10078-340 = "Haha, Sensei. It helps that you're quick to understand."
10078-350 = "Ah, that's right. I was scouting the actual location to blast."
10078-360 = "Hmm... Would here be good?"
10078-370 = "No... This place is also quite..."
10078-380 = "What is it, Sensei? Why are you looking at me like that?"
10078-390 = "Did some kind of problem occur?"
10078-2600 = "Sensei... are you really sure about this? Keeping me company is going to be quite a handful, you know? I've warned you! Don't blame me for whatever happens! Hahahaha!"
