[translation]
26007-10 = "Blue Archive!"
26007-20 = "S-sou, Okusora Ayane aqui.\nE-está tudo bem...? Esse tipo de visual,\né um pouco constrangedor."
26007-30 = "E-estar aqui com esse visual,\né um pouco\nconstrangedor..."
26007-40 = "Ué,\nonde todos foram...?"
26007-50 = "Algum lugar onde eu possa\ndescansar um pouco..."
26007-60 = "Hm...?\nO que é aquilo...?"
26007-70 = "De alguma forma, estou\nme divertindo."
26007-80 = "Ah, bem-vindo de volta, Sensei!"
26007-90 = "Sensei, eu estava esperando por você."
26007-100 = "Bem... \nO-o que houve...?"
26007-110 = "E-esse visual?"
26007-120 = "B-bem...\nEu tentei trazer um\nar de verão..."
26007-130 = "O-o que achou?\nE-está combinando\ncomigo...?"
26007-140 = "Eu sempre ficava pensando que precisava fazer isso,\nprecisava fazer aquilo..."
26007-150 = "Ter um tempo relaxante assim\né uma sensação estranha."
26007-160 = "Com esse visual,\nacabo ficando um pouco\nmais relaxada."
26007-170 = "Feliz\naniversário,\nSensei!"
26007-180 = "Ter conhecido você, Sensei,\ne poder passar esse tempo\ncalmamente assim...\nEu fico muito feliz."
26007-190 = "S-Sensei... sobre isso...\nH-hoje, bem..."
26007-200 = "Ah... muito obrigada.\nEu já fico feliz só de estar aqui,\ne ainda por cima ser parabenizada\npelo meu aniversário..."
26007-210 = "É um dia luxuoso."
26007-220 = "Feliz\nAno Novo!"
26007-230 = "Espero que este ano também\ntenha muitas coisas divertidas!"
26007-240 = "Feliz Natal!\nS-se você não reagir,\neu vou ficar com vergonha..."
26007-250 = "Entendo, é Halloween, então\ntodos estão fantasiados..."
26007-260 = "Ah, não, o meu não é\nnesse sentido...!?"
26007-280 = "Bem, eu deveria ficar\nno cantinho aqui,\né isso...?"
26007-290 = "Desse jeito,\nestá bom...?"
26007-300 = "O-o que eu devo fazer\npara o helicóptero se destacar...?"
26007-310 = "Desculpe, não estou\nacostumada com esse tipo de coisa..."
26007-320 = "Bem... Sensei?\nSe era para ser uma foto\ncomemorativa do conserto..."
26007-330 = "Não seria melhor\nfocar mais no\nhelicóptero...?"
26007-340 = "...Eh, não é o helicóptero, é\nminha foto comemorativa...?"
26007-350 = "E-era isso!?\nEhh!?"
26007-360 = "I-isso é, bem, não que\neu não goste, mas...!"
26007-370 = "M-meu rosto ficou\nquente de repente...!"
26007-2600 = "Algo tão incrível para mim... Sensei, eu sempre recebo tantas coisas de você. Vou continuar me esforçando para poder retribuir, nem que seja um pouco!"
