[translation]
26007-10 = "ブルーアーカイブ！"
26007-20 = "お、奥空アヤネです。\nど、どうでしょうか…こういう格好は、\n少し恥ずかしいですね。"
26007-30 = "こ、この格好でここに\nいるのは、ちょっと\n恥ずかしいですね…"
26007-40 = "あれ、\nみんなはどこに…？"
26007-50 = "どこかゆっくり\nできそうなところは…"
26007-60 = "ん…？\nあれは何でしょう…？"
26007-70 = "何だか、楽しく\nなっちゃいますね。"
26007-80 = "あっ、おかえりなさい、先生！"
26007-90 = "先生、お待ちしておりました。"
26007-100 = "えっと…\nど、どうされましたか…？"
26007-110 = "こ、この格好ですか？"
26007-120 = "え、えっと…\n夏っぽさを\n出してみようと…。"
26007-130 = "ど、どうですか？\nに、似合って\nますでしょうか…？"
26007-140 = "いつもあれをしなきゃ、\nこれをしなきゃって\n考えてばかりだったので…"
26007-150 = "何だかこういう\nゆったりした時間は、\n不思議な気分です。"
26007-160 = "この格好ですと、\n何だか気が緩んで\nしまいますね。"
26007-170 = "お誕生日\nおめでとうございます、\n先生！"
26007-180 = "先生と出会えたこと、\nこうしてゆっくりと\n過ごせること…\n本当に嬉しく思います。"
26007-190 = "せ、先生…その…\nき、今日は、えっと…"
26007-200 = "あっ…ありがとう、ございます。\nこうしていられるだけで\n嬉しいのに、誕生日まで\n祝ってもらって…"
26007-210 = "贅沢な一日です"
26007-220 = "新年あけまして\nおめでとうございます！"
26007-230 = "今年もたくさん、楽しいことが\nあるように願ってます！"
26007-240 = "メリークリスマス！\nな、何かリアクションを\n頂けないと、恥ずかしいです…"
26007-250 = "なるほど、ハロウィンだから\nみなさん仮装を…"
26007-260 = "あ、いえ、私のこれは\nそういう意味ではなく…！？"
26007-280 = "えっと、私はこの辺の、\n端っこに写っていれば\n良いでしょうか…？"
26007-290 = "こんな感じで、\n大丈夫ですかね…？"
26007-300 = "ど、どうすれば\nヘリが際立つんでしょう…？"
26007-310 = "すみません、こういうのは\nあまり慣れてなくって…"
26007-320 = "えっと…先生？\n修理の記念写真と\nいうことでしたら…"
26007-330 = "もっとヘリを\n中心に撮った方が\n良いのでは…？"
26007-340 = "…え、ヘリではなくて、\n私の記念写真…？"
26007-350 = "そ、そうだったんですか！？\nえぇっ！？"
26007-360 = "そ、それはその、いえ、\n嫌ではないですが…！"
26007-370 = "な、何だか急に、\n顔が熱く…っ"
26007-2600 = "こんなに凄いものを、私に…\n先生にはいつも、色んな物を\n頂いてばかりですね。少しでも\nお返しできるよう、引き続き頑張ります！"
