[translation]
10122-10 = "Blue Archive~ Ahaha☆"
10122-20 = "Mika Misono, reaparecendo de roupa de banho~☆, é mais ou menos isso? \nContinue contando comigo, Sensei!"
10122-30 = "Ahaha, que estranho~"
10122-40 = "Hmm, \nentão é assim que \ntodo mundo vem ao Schale."
10122-50 = "(Com certeza todo mundo \ntambém tem suas preocupações. \nAssim como eu...)"
10122-60 = "Sensei, \nquando será que você vem?"
10122-70 = "Será que tem problema \nse eu tocar nisso...?"
10122-80 = "Ah! Sensei!"
10122-90 = "Eu estou pronta!"
10122-100 = "Com o que eu deveria \najudar primeiro?"
10122-110 = "Bem-vindo de volta, \nvo-cê!"
10122-120 = "Vai querer um banho? \nOu vai querer jantar?"
10122-130 = "Ou talvez――"
10122-140 = "Brincadeira. \nÉ só uma piada☆"
10122-150 = "Pode deixar tudo comigo♪"
10122-160 = "Bom, não sei se vou conseguir fazer direito, mas né☆"
10122-170 = "O Sensei é \nrealmente \nincrível..."
10122-180 = "O trabalho \nnão é nada divertido, \nmas você continua se esforçando..."
10122-190 = "...Por que \nestou de roupa de banho, você pergunta?"
10122-200 = "Eh... é meio \nembaraçoso ter que \nexplicar assim..."
10122-210 = "Hoje \nnão tem nada acontecendo, né~"
10122-220 = "Eh, não estou \ntediada nem um pouco."
10122-230 = "Porque estou com o Sensei♪"
10122-240 = "Paz é o que há de melhor..."
10122-250 = "Não é mesmo!"
10122-260 = "Sensei! Hoje é o seu \naniversário, não é?"
10122-270 = "Eu queria te dizer \nolhando no seu rosto, \nentão estou feliz por termos nos encontrado assim."
10122-280 = "Feliz aniversário!"
10122-290 = "Espero que hoje \nseja um dia \nmaravilhoso para você...!"
10122-300 = "Ah, ahaha..."
10122-310 = "Recebi o aviso de que \neu era a responsável hoje."
10122-320 = "Eu estava pensando... \nserá que era isso?"
10122-330 = "Eu nunca vou esquecer \no dia de hoje."
10122-340 = "Feliz \nAno Novo! \nSensei!"
10122-350 = "Este ano, eu também vou me esforçar \ntanto quanto você, \nSensei!"
10122-360 = "Sensei... você sabe \nque dia é hoje...?"
10122-370 = "Eu sou a responsável \npor hoje, tudo bem?"
10122-380 = "...Eh?"
10122-390 = "Isso é verdade...?"
10122-400 = "...Fufu. \nMuito bem!"
10122-410 = "Vamos nos esforçar hoje também! \nSensei♪"
10122-420 = "Hoje é Halloween! \nSensei!"
10122-430 = "Se não me der doces, \nvou fazer uma travessura, hein?"
10122-440 = "...Ei! Não precisa ficar \ntão alerta assim, precisa?"
10122-450 = "Não tem truque nenhum!"
10122-470 = "Ei, Sensei."
10122-480 = "Eu... estou feliz por poder \nver essa paisagem \ncom você."
10122-490 = "As preocupações――"
10122-500 = "As dúvidas sobre o futuro――"
10122-510 = "A ansiedade―― \nAinda restam."
10122-520 = "Mas……."
10122-530 = "Depois de ver um\nceu estrelado desses."
10122-540 = "……Sinto que tudo isso\nnão passa de algo insignificante."
10122-550 = "É o que eu sinto."
10122-560 = "Professor, você me\ndisse, não foi?"
10122-570 = "Que este momento, agora,\ncontinuará sendo..."
10122-580 = "O que me dará forças\npara sempre."
10122-590 = "Por isso……."
10122-600 = "Eu também vou ser feliz."
10122-2600 = "Isso é... para mim? Mentira! \n……Ei, sério mesmo? Poxa... Professor, \nvocê é muito injusto. Sempre fazendo essas coisas \ncom essa cara de quem não quer nada. Isso é golpe baixo... \nEu adoraria ter algo para te dar em troca..."
