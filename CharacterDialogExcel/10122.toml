[translation]
10122-10 = "ブルーアーカイブ～あはは☆"
10122-20 = "聖園ミカ、水着姿で再登場～☆って感じかな？\nこれからもよろしくね、先生！"
10122-30 = "あははっ、変なの～"
10122-40 = "ふーん、\nみんなこんな風に\nシャーレに来てるんだ。"
10122-50 = "（きっとみんなにも、\n悩みはあるんだよね。\n私みたいに……）"
10122-60 = "先生、\nいつ来るのかな～"
10122-70 = "これ、触っても\n大丈夫かな……？"
10122-80 = "あっ！先生！"
10122-90 = "私は準備できてるよ！"
10122-100 = "何からお手伝い\nしたらいいかな？"
10122-110 = "おかえりなさい、\nあ・な・た！"
10122-120 = "お風呂にする？\nご飯にする？"
10122-130 = "それとも――"
10122-140 = "なんちゃって。\n冗談冗談☆"
10122-150 = "何でも任せてよ♪"
10122-160 = "ま、上手くできるかは\n分かんないけどね☆"
10122-170 = "先生って、\nやっぱり\nすごいよね……。"
10122-180 = "お仕事、\n全然面白くないのに\n頑張ってて……。"
10122-190 = "……何で\n水着姿なのかって？"
10122-200 = "え……やっ改まって\n聞かれると\n恥ずかしいね……。"
10122-210 = "今日、\nなんもないね～"
10122-220 = "え、全然\n退屈じゃないよ？"
10122-230 = "だって先生と\n一緒だもん♪"
10122-240 = "平和が一番かぁ……。"
10122-250 = "そうだよね！"
10122-260 = "先生！今日って\nお誕生日だよね？"
10122-270 = "直接顔を見て\n言いたかったから、\nこうして会えて……よかった。"
10122-280 = "お誕生日おめでとう！"
10122-290 = "今日がとっても\n素敵な一日に\nなりますように……！"
10122-300 = "いや～あはは……"
10122-310 = "今日、当番だって\n連絡もらってさ。"
10122-320 = "もしかして……って\n思ってたんだ。"
10122-330 = "今日のこと、\nずっと忘れないよ。"
10122-340 = "あけまして\nおめでとーう！\n先生！"
10122-350 = "今年は、先生の頑張りに\n負けないくらい、\n私も頑張るからね！"
10122-360 = "先生……今日が\n何の日か分かってる……？"
10122-370 = "今日の当番、\n私でいいの？"
10122-380 = "……え？"
10122-390 = "それ、本当に……？"
10122-400 = "……ふふっ。\nよーっし！"
10122-410 = "今日も頑張ろうね！\n先生♪"
10122-420 = "今日はハロウィーンだよ！\n先生！"
10122-430 = "お菓子くれないと～、\nいたずらしちゃうぞ～？"
10122-440 = "……って！そんなに\n警戒しなくてもよくない？"
10122-450 = "種も仕掛けもないからさ！"
10122-470 = "ねぇ、先生。"
10122-480 = "私……この景色を\n先生と見られて\nよかった。"
10122-490 = "心配事も――"
10122-500 = "将来の悩みも――"
10122-510 = "不安も――\nまだ、残ってる。"
10122-520 = "でも……。"
10122-530 = "こんな星空を\n見ちゃったらさ。"
10122-540 = "……全部、ちっぽけな\nことなんじゃないかなって。"
10122-550 = "そんな気がするんだ。"
10122-560 = "先生、言って\nくれたよね。"
10122-570 = "今、この瞬間が、\nこれからもずっと……。"
10122-580 = "私を支えてくれる、\nって。"
10122-590 = "だから……。"
10122-600 = "私も、幸せになるよ。"
10122-2600 = "これを……私に？うっそだ～！\n……え、本当に？もう……先生、\n本当にずるいよね。いつも何食わぬ顔で\nこんなことしちゃってさ。反則だよ……。\n私もお返しできたらよかったのに……。"
