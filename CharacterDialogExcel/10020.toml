[translation]
10020-10 = "ブルーアーカイブ。"
10020-20 = "下江コハル…。\nい、言っとくけど、\nここに長くいるつもりはないから…！"
10020-30 = "うう……\nリア充め……。"
10020-40 = "あううう……。"
10020-50 = "な、馴れ合うつもりは\nないから。"
10020-60 = "エッチなものと\nかがあったら、\n全部没収するからね。"
10020-70 = "皆、楽しそうだね…。"
10020-80 = "あ、先生、おかえり。"
10020-90 = "待ってたよ、先生。"
10020-100 = "わ、私の前で、\n素行不良とか許さないから！"
10020-110 = "成績のことは言わないで！\nど、努力はしてるもん……。"
10020-120 = "頑張って、\n早く補習授業部を\n卒業してやるんだから。"
10020-130 = "え、エッチなもの……？"
10020-140 = "そ、そういうのはダメ！\n見つけたら全部没収！焼却！"
10020-150 = "が、学生の身分で\n交際とかダメだから！\nそんなの不健全よ！"
10020-160 = "キヴォトスでは\nいけないことなの！"
10020-170 = "先生の誕生日なんでしょう。\n今日くらい、\n少しゆっくりしても……。"
10020-180 = "や、やっぱり今の無し、\nちゃんと真面目に仕事して！"
10020-190 = "わ、私の誕生日、覚えてたの？"
10020-200 = "あ、ありがとう……。\nまさか覚えてると\n思わなかった……"
10020-210 = "ちょ、ちょっと嬉しいかも……？"
10020-220 = "お正月なのに、\n私と居ていいの？"
10020-230 = "わ、私は別に構わないけど……？"
10020-240 = "せ、聖なる夜を汚すような、\n不埒な行為は全部禁止よ！\n先生、聞いてる！？"
10020-250 = "飴？\nそんなのとっくに卒業したけど？\nわ、私はもっと大人の……"
10020-260 = "な、なんでもない。"
10020-280 = "な、何……！？"
10020-290 = "（あ、あれっ……これって、\nまさか……！？）"
10020-300 = "べ、別に私、\n何も間違ったことは\n言ってないでしょ！？"
10020-310 = "（待って、もしかしてこの\nままだと私、先生と……！？）"
10020-320 = "（こ、こういう展開、\n本で何度も見たことある……！\n本当に、本当にあの\n流れに入っちゃうの！？）"
10020-330 = "（あ、あんなこととか、\nこんなこと、とか……）"
10020-340 = "（っ！？ま、まさか、\nそんなことまで……！？）"
10020-350 = "つ、ついに本性を\n表したわね、先生……！？"
10020-360 = "（やばいやばいやばい……！\nま、まだ覚悟とか\n全然できてないんだけど！？）"
10020-2600 = "私もここまで来られた……。\n先生、見てる？ここからがスタートだから。\nこれからも、見守っててよね。"
