[translation]
10102-10 = "B-Blue Archive……！"
10102-20 = "E-ehehe, acabei vindo parar aqui no final das contas……!\nVerão, mar…… que felicidade……!"
10102-30 = "O que é este lugar……\nO que se faz\naqui?"
10102-40 = "Ehehe……\nEstá fresquinho aqui……\nImagino que esteja quente\nlá fora, mas……"
10102-50 = "A Saori-neesan, \nserá que ela está bem\npor agora……"
10102-60 = "Posso escrever o cartão de sorteio\nda revista aqui……?"
10102-70 = "Sinto que o traje de banho\nestá um pouco apertado……\nNão é como se o meu corpo\nestivesse estranho, né……?"
10102-80 = "Ah, s-sensei?\nHoje, você não vai\nbrincar na água……?"
10102-90 = "Ehehe……\nHoje é o meu turno……\nConto com você……!"
10102-100 = "E-ehehe, \nse não for um incômodo, \naceito apenas um sorvete……."
10102-110 = "Eh! \"Comprei pensando que a Hiyori comeria\"……?"
10102-120 = "Muito obrigada!\nComo esperado do Sensei……!"
10102-130 = "As revistas que estão no Schale\nsão de dois meses atrás……!"
10102-140 = "Realmente, a vida é\num sofrimento, não é……!"
10102-150 = "E-ehehe, vou te contar um\nfato desesperador……."
10102-160 = "O gelo da geladeira\nacabou……."
10102-170 = "Realmente, a vida é\num sofrimento……\nE no verão é ainda pior."
10102-180 = "Ehehe…… s-sim?\nIsso aqui? Bem, é uma foto\nque tiramos juntos no mar……"
10102-190 = "O Sensei quer ver também?"
10102-200 = "Ehehe, \ntantos doces…….\nPosso trazer o pessoal do esquadrão\nda próxima vez?"
10102-210 = "Feliz\naniversário……!"
10102-220 = "É o dia em que uma vida sofrida começou, mas\nde vez em quando, aproveitar um pouco\ntambém é bom, né……"
10102-230 = "Meu aniversário……\nNão tenho muito interesse, mas……"
10102-240 = "Mas, graças às palavras do Sensei,\nacabou se tornando um dia\num pouco especial."
10102-250 = "Feliz ano novo……\nImagino que este ano também\ntenha muitas dificuldades, mas\nprecisamos continuar vivendo, né……."
10102-260 = "Ehehe, \nconto com você este ano também."
10102-270 = "U-um presente de Natal……!\nÉ algo sem valor, mas\ncomprei na loja de conveniência aqui embaixo."
10102-280 = "Bem, e-eu gostaria que você\naceitasse……\nEhehe."
10102-290 = "Ah, eu não tenho\nbalas…… m-mas em troca,\naceite uma travessura……"
10102-300 = "Sim? O Sensei vai\nme dar algo?"
10102-310 = "E-ehehe, \nentão, aceito com gratidão."
10102-330 = "Ai ai ai……\nEstá doendo……"
10102-340 = "Hieee!?\nO meu picolé?"
10102-350 = "Acabou! Já era! \nEu só dei uma mordida e\nele ficou cheio de areia……!"
10102-360 = "Realmente, nem o picolé é\npermitido para mim……!\nFui completamente abandonada pela sorte……!"
10102-370 = "Por que a minha vida é\ntão cheia de sofrimento?"
10102-380 = "Enquanto as outras pessoas\nestão aproveitando o verão……."
10102-390 = "Não importa o quanto eu me esforce,\npara mim, é como um sonho\ninalcançável……."
10102-400 = "……Eh? Você vai\ncomprar outro para mim?"
10102-410 = "Isso significa que…… se o picolé que eu derrubei\nestivesse inteiro, eu teria\ncomido o dobro……?"
10102-420 = "Uwaaaan!\nRealmente, já era!"
10102-2600 = "E-ehehe, dar algo tão valioso para mim……\nAh, mesmo que você peça para devolver depois,\neu não vou devolver……!"
