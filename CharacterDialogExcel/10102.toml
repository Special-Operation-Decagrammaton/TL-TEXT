[translation]
10102-10 = "ぶ、ブルーアーカイブ……！"
10102-20 = "え、えへへ、結局来てしまいました……！\n夏、海……幸せです……！"
10102-30 = "ここは……\n何をするところ\nなんでしょう？"
10102-40 = "えへへ……\n涼しいですね……\n外に出たら暑いとは\n思いますが……"
10102-50 = "サオリ姉さんは、\n今頃……"
10102-60 = "雑誌の懸賞はがき、\nここで書いてもいいですか……？"
10102-70 = "水着が少しきつい\nような気がしますが……\n私の体がヘンなわけじゃ\nないですよね……？"
10102-80 = "あ、せ、先生？\n今日は、水遊び\nしないんですか……？"
10102-90 = "えヘヘ……\n今日は当番なんです……\nお世話になります……！"
10102-100 = "え、えへへ、\n失礼にならないのであれば、\nアイスを一つだけ……。"
10102-110 = "えっ！「ヒヨリが食べると\n思って買っておいた」……？"
10102-120 = "ありがとうございます！\nさすが先生です……！"
10102-130 = "シャーレに置いてある\n雑誌も先々月のもの……！"
10102-140 = "やっぱり人生は\n辛いものなんですね……！"
10102-150 = "え、えへへ、絶望的な\n事実を一つ教えますね……。"
10102-160 = "冷蔵庫の氷が\n底をつきました……。"
10102-170 = "やっぱり人生って\n辛いものなんですね……\n夏だとなおさらです。"
10102-180 = "えへへ……は、はい？\nこれですか？えっと、海で一緒に\n撮った写真ですけど……"
10102-190 = "先生も見ますか？"
10102-200 = "えへへ、\nスイーツがいっぱい……。\n次はスクワッドのみんなを\n連れてきてもいいでしょうか？"
10102-210 = "お誕生日\nおめでとうございます……！"
10102-220 = "苦しい人生が始まった日ですが、\nたまには楽しんでみるのも\nいいですよね……"
10102-230 = "私の誕生日……\n特に興味はないですが……"
10102-240 = "でも、先生のお言葉のおかげで、\n少し特別な日になって\nしまいましたね。"
10102-250 = "明けましておめでとう\nございます……今年も\n苦しいことが多いと思いますが、\n生き続けないとですよね……。"
10102-260 = "えへへ、\n今年もよろしくお願いします。"
10102-270 = "く、クリスマスプレゼントです……！\nつまらないものですが、\nこの下のコンビニで買いました。"
10102-280 = "その、う、受け取って\nいただければ……\nと思いますけど。えへへ。"
10102-290 = "あ、飴は持って\nないんですけど……か、代わりに\nいたずらをどうぞ……"
10102-300 = "はい？先生が\n私にくださるんですか？"
10102-310 = "え、えへへ、\nでは、ありがたくいただきます。"
10102-330 = "いたたた……\n痛いですぅぅ……"
10102-340 = "ひえっ！？\n私のアイスバーが？"
10102-350 = "終わりです！もう終わりです！\n一口しか食べてないのに\n砂だらけになって\nしまうなんて……！"
10102-360 = "やっぱり私にはアイスバーさえも\n許されないんですね……！\n完全に見放されました……！"
10102-370 = "私の人生はどうしてこんなに\n苦難に満ちているのでしょうか？"
10102-380 = "他の人は夏を楽しんで\nいるというのに……。"
10102-390 = "どんなに頑張っても、\n私にとっては届かない\n夢のようなものだなんて……。"
10102-400 = "……え？もう一つ\n買ってくださるんですか？"
10102-410 = "それって……落とした\nアイスバーが無事だったら\n2倍食べられたって\nことですよね……？"
10102-420 = "うわぁん！\nやっぱり終わりです！"
10102-2600 = "え、えへへ、こんな貴重なものを私に……\nあ、後で返せって言われても\n返しませんから……！"
