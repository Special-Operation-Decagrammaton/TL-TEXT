[translation]
20033-10 = "Kikiki. Blue... Archive!"
20033-20 = "Finalmente cheguei para brilhar! Kikiki, a própria Hanuma Makoto, do Pandemonium, veio pessoalmente até aqui, então é melhor me receberem com hospitalidade."
20033-30 = "Schale... Kikiki, é um lugar apertado como sempre."
20033-40 = "Preciso planejar... um lugar para a Ibuki brincar..."
20033-50 = "Para capturar... aquela Iroha... com certeza..."
20033-60 = "Espero que a Satsuki e a Chiaki... não estejam vadiando..."
20033-70 = "Essa atmosfera... não é nada mal."
20033-80 = "Finalmente chegou, Sensei. Não faça a líder do Pandemonium esperar tanto."
20033-90 = "Kikiki, tudo bem. Então, vamos começar a falar sobre os grandes feitos da Makoto-sama."
20033-100 = "Está atrasado, Sensei. Acabei de ter uma ideia revolucionária para a conquista de Kivotos."
20033-110 = "Vou explicar agora, sente-se logo."
20033-120 = "Kiki, quem diria que chegaria o dia em que eu mesma faria o serviço de plantão."
20033-130 = "Bem, tarefas triviais também podem evoluir para um plano de conquista de Kivotos... é perfeitamente possível. Kikiki."
20033-140 = "No dia em que uma líder competente como a Makoto-sama receber a cooperação do Sensei..."
20033-150 = "Será como um demônio com um bastão de ferro, ou um tigre com asas! Kikiki!"
20033-160 = "Hum? Você diz que tem um assunto urgente e não pode me ajudar agora?"
20033-170 = "Kishishi, não se preocupe. Eu entendo que você é muito ocupado, Sensei."
20033-180 = "Às vezes, o paradeiro do pudim da Ibuki é mais importante do que grandes feitos."
20033-190 = "Ah... tem dias que são assim mesmo."
20033-200 = "Kiki, você é a primeira pessoa como você que eu conheço, Sensei."
20033-210 = "Você não concorda com as minhas opiniões, nem discorda, e nem tenta se intrometer..."
20033-220 = "...É realmente fascinante. Kukuku."
20033-230 = "Grandes feitos não são realizados da noite para o dia. A Makoto-sama nunca desiste."
20033-240 = "Um dia, com certeza, farei você ser meu, Sensei."
20033-250 = "Prepare-se desde já, kikiki."
20033-260 = "Kuku... Kikiki...! Ouvi dizer que hoje é o seu aniversário, Sensei."
20033-270 = "O Pandemonium organizou uma festa de celebração. Não temos tempo a perder. Vamos, Sensei! Kikiki!"
20033-280 = "Uma celebração de aniversário... para a Makoto-sama...?"
20033-290 = "Kukuku, você entende bem as coisas, Sensei! Celebrar o nascimento de uma grande líder é algo extremamente natural."
20033-300 = "Se você diz isso, Sensei, então vamos continuar!"
20033-310 = "Vou começar agora o festival de nascimento desta Makoto-sama!"
20033-320 = "Feliz Ano Novo. O ano começou, Sensei."
20033-330 = "Vamos discutir sobre o novo plano de conquista de Kivotos."
20033-340 = "É a primeira reunião do ano, um marco! Não se atrase!"
20033-350 = "Kiki, Feliz Natal, Sensei."
20033-360 = "Dizem que hoje é o dia em que um sujeito estranho em um trenó voa pelo céu na velocidade do som para distribuir presentes para as crianças boas."
20033-370 = "...Não posso perder para ele. Vou sair agora para comprar o presente da Ibuki!"
20033-380 = "Você vem junto, Sensei?"
20033-390 = "Halloween, é? É o meu dia favorito, logo depois do Dia da Mentira."
20033-400 = "Porque travessuras são totalmente permitidas."
20033-410 = "Kikikiki, que tal você vir junto, Sensei? Doces ou travessuras."
20033-430 = "Kishishi, Sensei, eu vi o seu desempenho."
20033-440 = "Você ajudou os outros, resolveu incidentes... e elevou a fama do Schale!"
20033-450 = "Kikiki, chegando a esse ponto, não há como negar..."
20033-460 = "Sim, que você é uma pessoa tão capaz quanto eu, a Makoto-sama!"
20033-470 = "Avalio muito bem essa sua habilidade... e vou te fazer uma proposta importante que você não poderá recusar."
20033-480 = "Sensei do Schale, junte-se ao meu Pandemonium..."
20033-490 = "Não, junte-se a mim, Hanuma Makoto!"
20033-500 = "Se unirmos nossas forças, a conquista de Kivotos será fácil!"
20033-510 = "Se isso acontecer, darei metade de Kivotos para o Schale."
20033-520 = "E então, não é um\nnegócio nada mal?"
20033-530 = "Vamos lá, Sensei! Comigo!\nNão vamos realizar esse sonho grandioso?"
20033-540 = "Ki-ki-ki,\nKi-shi-shi-shi-shi-shi!"
20033-2600 = "Ki... ki-ki... kya-hya-hya-hya-hya! Francamente, você não pode ser subestimado, Sensei. Quem diria que você prepararia um presente como este... Vou aceitá-lo como uma prova de confiança. Conto com você daqui para frente, Sensei."
