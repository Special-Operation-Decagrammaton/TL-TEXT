[translation]
20033-10 = "キキキッ。ブルー……アーカイブ！"
20033-20 = "遂に降臨してやったぞ！\nキキキッ、万魔殿の羽沼マコト様が直々に足を運んでやったのだ、手厚く歓待するが良い。"
20033-30 = "シャーレ……。\nキキッ、いつみても\n狭苦しい場所だな。"
20033-40 = "イブキの遊び場を……\n計画的に\n作らねば……。"
20033-50 = "イロハのやつを、\n確実に\n捕獲するには……。"
20033-60 = "サツキとチアキ、\nサボってなどいないと\nいいが……。"
20033-70 = "この雰囲気、\nなかなか\nいいじゃないか。"
20033-80 = "やっと来たか、先生。\nあんまり万魔殿のリーダーを\n待たせるんじゃないぞ。"
20033-90 = "キキキッ、まあいい。\nでは、マコト様の\n偉業の話をはじめよう。"
20033-100 = "遅いじゃないか、先生。\nちょうどキヴォトス征服の\n画期的な構想が\n浮かんだところだ。"
20033-110 = "今から説明をする、\n早く席につけ。"
20033-120 = "キキッ、まさかこの私が\n直々に当番を行う日が\nくるとはな。"
20033-130 = "まあ、雑務がキヴォトス\n征服計画に発展することも……\n十分に、あり得る。キキキッ。"
20033-140 = "有能な指導者であるマコト様が、\n先生の協力を得た日には……"
20033-150 = "もはや鬼に金棒、虎に翼だな！\nキキキッ！"
20033-160 = "ふむ？今は急用があって、\n私の手伝いができない、だと？"
20033-170 = "キシシッ、案ずるな。\n先生の多忙具合は、\n理解しているぞ。"
20033-180 = "時には、偉業よりも\nイブキのプリンの行方の\nほうが大事なときもある。"
20033-190 = "ああ……\nそういう日も、あるとも。"
20033-200 = "キキッ、\n先生みたいな人は、初めてだ。"
20033-210 = "私の意見に賛同するわけでも、\n反対するわけでもなく、かと\n言って口出しもしてこない……。"
20033-220 = "……実に、興味深い。\nクックックッ。"
20033-230 = "偉業は一夜にして成らず。\nマコト様は、絶対に\n諦めないからな。"
20033-240 = "いつか必ず、先生を\n私のものにしてみせよう。"
20033-250 = "今から覚悟しておくがいい、\nキキキッ。"
20033-260 = "ククッ……キキキッ…！\n話は聞いている、\n今日は先生の誕生日らしいな。"
20033-270 = "万魔殿主催で祝いの\nパーティーを開いた。\nもたもたしてる暇はない。\n行くぞ先生！キキキッ！"
20033-280 = "マコト様の\n誕生祝い……？"
20033-290 = "クックックッ、\n分かってるじゃないか、先生！\n偉大なる指導者の生誕を\n讃えるのは、至極当然のこと。"
20033-300 = "先生がそう言うのなら、\n続けようじゃあないか！"
20033-310 = "今から、このマコト様の\n生誕祭を開くぞ！"
20033-320 = "あけましておめでとう。\n年が明けたな、先生。"
20033-330 = "新たなキヴォトス\n征服計画について\n話し合おうじゃないか。"
20033-340 = "記念すべき新年初会議だ！\n遅れないように！"
20033-350 = "キキッ、\nメリークリスマスだ、先生。"
20033-360 = "今日はソリに乗った怪人が\nマッハの速度で空を飛び、\n良い子にプレゼントを\nばら撒く日、だという。"
20033-370 = "……負けるわけにはいかない。\n今からイブキのプレゼントを\n買いに出かけるぞ！"
20033-380 = "先生も一緒に行くか？"
20033-390 = "ハロウィーンか。\nエイプリルフールの次に\n気に入っている日だ。"
20033-400 = "いたずらが全面的に\n許されるからな。"
20033-410 = "キッキッキッ、\n先生も一緒にどうだ？\nトリックオアトリート。"
20033-430 = "キシシッ、先生よ、\n活躍はみていたぞ。"
20033-440 = "お前は他人を助け、\n事件を解決し……\nシャーレの名声を上げてきた！"
20033-450 = "キキキッ、ここまできたら、\nもはや認めざる\nをえないだろう――"
20033-460 = "そう、お前がこのマコト様と\n肩を並べるほどの、\n実力者であるということを！"
20033-470 = "その能力を高く評価し……\n断れない重大な提案を\nしようじゃあないか。"
20033-480 = "シャーレの先生よ、\n我が万魔殿と……"
20033-490 = "いや、この羽沼マコト様と\n手を組め！"
20033-500 = "我々が力を合わせれば、\nキヴォトスの征服など容易い！"
20033-510 = "もしもそうなったら、\nキヴォトスの半分をシャーレに\n渡すとしよう。"
20033-520 = "どうだ、悪くない\n取引だろう？"
20033-530 = "さあ！先生！この私と！\n遠大な夢を叶えようじゃないか！"
20033-540 = "キキキッ、\nキシシシシシシッ！"
20033-2600 = "キッ……キキッ……キャヒャヒャヒャヒャッ！\nまったく、侮れないな、先生。\nこんなプレゼントを用意しているだなんて。\n……信頼の証として受け取っておこうじゃないか。これからも頼んだぞ、先生。"
