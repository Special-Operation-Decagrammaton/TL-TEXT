[translation]
10053-10 = "Blue Archive!"
10053-20 = "Hehe... tudo pronto. Meus cálculos para hoje não têm erros!"
10053-30 = "Estou um pouco cansada... Será que posso descansar aqui?"
10053-40 = "Preciso tomar cuidado com a minha saúde no dia a dia..."
10053-50 = "Este café é interessante. Talvez um pouco fora dos meus cálculos."
10053-60 = "Eu já sabia, mas exercício não é nada fácil, né?"
10053-70 = "Espero que eu não vá à falência..."
10053-80 = "Bem-vindo de volta, Sensei. Estava à sua espera."
10053-90 = "...Muito bem, temos uma montanha de trabalho acumulado!"
10053-100 = "Você está atrasado!"
10053-110 = "..."
10053-120 = "Vou deixar passar desta vez."
10053-130 = "Da próxima vez, tente chegar mais cedo, está bem?"
10053-140 = "Dizem que apenas trocar de roupa já ajuda a mudar o humor."
10053-150 = "Eu, pessoalmente, não entendo muito bem..."
10053-160 = "...A propósito, o que achou deste visual?"
10053-170 = "Como tesoureira e como atleta."
10053-180 = "Em ambos os casos, só me resta dar o meu melhor."
10053-190 = "Este visual... é refrescante?"
10053-200 = "Q-o que foi isso de repente!?"
10053-210 = "Uuu... bem... obrigada..."
10053-220 = "Diz que rabo de cavalo combina comigo?"
10053-230 = "S-Sensei, você sempre diz coisas que não pensa..."
10053-240 = "...Não que eu não goste, mas..."
10053-250 = "É fácil deixar passar, mas,"
10053-260 = "o exercício também é uma disciplina científica que pode ser calculada, sabia?"
10053-270 = "...Embora, enquanto estou correndo, eu não pense exatamente assim."
10053-280 = "Feliz aniversário, Sensei."
10053-290 = "Calcular os dias desde o seu nascimento..."
10053-300 = "Hehe, vou deixar isso de lado."
10053-310 = "Sensei... bem, você se lembra?"
10053-320 = "Hoje é o meu aniversário."
10053-330 = "Deixei minha agenda livre para este dia."
10053-340 = "Sensei... você teria um tempo?"
10053-350 = "Feliz Ano Novo, Sensei."
10053-360 = "Conto com você este ano também."
10053-370 = "Se não se importar, que tal fazermos uma corrida de Ano Novo juntos?"
10053-380 = "Não entendo muito bem as pessoas que querem transformar o Natal em uma singularidade, mas..."
10053-390 = "Pensando que é com você, Sensei..."
10053-400 = "Acho que começo a entender um pouco."
10053-410 = "Fantasias, travessuras, doces e..."
10053-420 = "O dia das calorias!"
10053-430 = "Não pense que vou baixar a guarda só porque estou usando roupas de ginástica!"
10053-450 = "Haa, haa..."
10053-460 = "Quem diria que minha resistência cairia tanto em apenas alguns meses..."
10053-470 = "Para não passar vergonha no Festival Esportivo de Halo..."
10053-480 = "Preciso me esforçar mais no condicionamento físico."
10053-490 = "Ah, Sensei, você também quer água?"
10053-500 = "Sim, aqui está..."
10053-510 = "E-espere, Sensei! N-não, agora não pode!"
10053-520 = "（Se o Sensei bebesse água\nda garrafa que eu\nacabei de usar agora...）"
10053-530 = "（Isso seria, na prática, um beijo indireto...）"
10053-540 = "（Não, não, não,\nmesmo que a situação seja essa,）"
10053-550 = "（uma coisa tão indecente\nnão seria permitida...!）"
10053-560 = "（Mas... se for o Sensei...）"
10053-570 = "Só um... \ngole, está bem...?"
10053-2600 = "É um equipamento racional e...\nmuito adequado para exercícios.\nObrigada, Sensei."
