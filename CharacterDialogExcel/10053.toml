[translation]
10053-10 = "ブルーアーカイブ！"
10053-20 = "ふふっ……準備万端です。\n今日の私の計算に、ミスはありませんよ！"
10053-30 = "ちょっと疲れた……\nここで休めるかな。"
10053-40 = "普段から体調管理に\n気をつけないと……。"
10053-50 = "このカフェ、面白い。\nちょっと計算外かも。"
10053-60 = "分かってはいたけど\n運動って簡単じゃ\nないわね。"
10053-70 = "破産しないと\nいいんだけど……。"
10053-80 = "おかえりなさい、先生。\nお待ちしておりました。"
10053-90 = "……さあ、積もりに積もった\n仕事が山ほどありますよ！"
10053-100 = "遅いですよ！"
10053-110 = "……"
10053-120 = "今回だけ、大目に見てあげます。"
10053-130 = "次からは、\n早めに来てくださいね？"
10053-140 = "着替えるだけで、気分転換に\nなるとよく言いますよね。"
10053-150 = "私は、\nあまり分かりませんけど……"
10053-160 = "……ところで、\nこの格好、どうでしょう？"
10053-170 = "会計として、選手として。"
10053-180 = "どちらに対しても\n最善を尽くすだけです。"
10053-190 = "この格好、\n新鮮……ですか？"
10053-200 = "きゅ、急に何を！？"
10053-210 = "うう……その……\nありがとうございます……。"
10053-220 = "ポニーテールが\n似合ってる、ですか？"
10053-230 = "せ、先生はいつも\n心にもないお世辞を……！"
10053-240 = "……それが嫌、という\nわけではないですけど……。"
10053-250 = "見落としがちですが、"
10053-260 = "運動も科学的に計算できる\n理系科目の一つなんですよ？"
10053-270 = "……走ってる最中は、\nそう思えませんが。"
10053-280 = "お誕生日\nおめでとうございます、先生。"
10053-290 = "生まれた日からの\n日数計算は……"
10053-300 = "ふふっ、\nやめておきますね。"
10053-310 = "先生……\nその、覚えていますか？"
10053-320 = "今日は私の誕生日なんです。"
10053-330 = "この日のために\n予定を空けておきました。"
10053-340 = "先生は……\nお時間どうでしょうか？"
10053-350 = "あけまして\nおめでとうございます、先生。"
10053-360 = "今年もよろしく\nお願いいたしますね。"
10053-370 = "もしよろしければ\n初走り、一緒にどうですか？"
10053-380 = "クリスマスを特異点に\nしたがる人たちの気持ちは\nよく分かりませんけど……"
10053-390 = "先生と一緒なら\nと考えると……"
10053-400 = "少し分かる気もします。"
10053-410 = "仮装、いたずら、\nお菓子、そして……"
10053-420 = "カロリーの日！"
10053-430 = "た、体操着を着ているからと\n言って油断しませんからね！"
10053-450 = "はぁ、はぁ……"
10053-460 = "まさかたった数か月の間に\nここまで体力が\n落ちていたなんて……"
10053-470 = "「晄輪大祭」で無様な姿を\nみせないためにも……"
10053-480 = "もっと体力づくりを\n頑張らないと。"
10053-490 = "あ、先生もお水、\n要りますか？"
10053-500 = "はい、どうぞ……"
10053-510 = "ま、待ってください、先生！\nや、やっぱ今はダメです！"
10053-520 = "（今ここで私が\n口をつけたペットボトルから\n先生が水を飲んだら……）"
10053-530 = "（事実上の間接キ……）"
10053-540 = "（いやいや、\nいくらそういう状況だからって)"
10053-550 = "（そんな破廉恥なことが\n許されるわけ……！）"
10053-560 = "（でも……先生なら……）"
10053-570 = "一口……\nだけですよ……？"
10053-2600 = "合理的で……\nとても運動に適した装備ですね。\nありがとうございます、先生。"
