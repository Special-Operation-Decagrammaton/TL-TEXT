[translation]
16014-10 = "ブルーアーカイブ！えへへ！"
16014-20 = "イブキ登場！先生、おっまたせー！"
16014-30 = "しちいちが…しち…\nしちに…じゅうし…。"
16014-40 = "なあにここ？イブキ、\n探検してもいい～？"
16014-50 = "先生と何して\n遊ぼっかなあ……。"
16014-60 = "大人ってこういうのが\n好きなの……？うーん、\nよく分かんない……。"
16014-70 = "イブキ、一人は\nつまんな～い……。"
16014-80 = "あ！先生だ！\nおかえりなさーい！"
16014-90 = "イブキ、おとなしく\n待ってたよ！\nほめてほめて？"
16014-100 = "イブキ、\nお手伝いにきたよ！\n何すればいい～？"
16014-110 = "その前に、\nおやつタイムにしよう……？\nうん！イブキも、それがいい！"
16014-120 = "「事業費執行精算内訳書」……\n……って、どういう意味……？"
16014-130 = "えへへっ、\nイブキにお話があるの～？"
16014-140 = "はいっ！\nイブキも、\nよろしくお願いします！"
16014-150 = "先生、お仕事大変ってきいたの！\nイブキも手伝う！"
16014-160 = "イブキもできるよ！\nなんでも言って～！"
16014-170 = "先生！お誕生日おめでとう！\nプレゼント\nいっぱいもらったの～？"
16014-180 = "じゃあイブキは、\n先生をぎゅーってしてあげるね！"
16014-190 = "わわっ、イブキの誕生日、\n覚えててくれたの？\nありがとう、先生！"
16014-200 = "すっごく嬉しい！\n今ならお空も飛べちゃうかも！"
16014-210 = "明けましておめでとう、先生！\nうん……？これはなあに？"
16014-220 = "お年玉？\nイブキの欲しいもの\nを買うのに使う……\nお小遣い……？"
16014-230 = "じゃあ、イブキは\n先生が欲しい！\nはい、お年玉です！\nどーぞ！"
16014-240 = "イブキ、ちゃんと\nいい子にしてたよ……！\nサンタさんから\nプレゼント、ほしいなあ……。"
16014-250 = "がおー！いたずらしなきゃ、\nお菓子をたべちゃうぞー！"
16014-260 = "……あれ？違う……？"
16014-280 = "今日はイブキが先生だよ！"
16014-290 = "今から……\nさんすうの授業をします！"
16014-300 = "イブキ、\nさんすうは\n自信あるんだ！"
16014-310 = "昨日、テストで\n100点とってね、\nはなまるもらったの！"
16014-320 = "えへへっ……じゃあ先生に、\nイブキ先生から問題です！"
16014-330 = "ここに！アイスクリーム2コと、\nプリン1コがあります。\n全部で何個でしょうか〜？"
16014-340 = "ぶぶー！残念！"
16014-350 = "正解は～……"
16014-360 = "「おやつが3コもあったら\nすっごく幸せ～」だよ！"
16014-370 = "あっ！食べたあとは、\n歯みがきを忘れないでね！"
16014-380 = "イブキはね、\n毎日3回、ちゃんと\n歯みがきをしてるんだよ！"
16014-2600 = "うわぁ……うわああっ！\nこれ、イブキにくれるの？本当に？\n……えっ、イブキだから……？\nうわあっ！先生！嬉しい！大事にするね！"
