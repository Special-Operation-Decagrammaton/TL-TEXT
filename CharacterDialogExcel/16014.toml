[translation]
16014-10 = "Blue Archive! Ehehe!"
16014-20 = "Ibuki, chegando! Sensei, desculpa a demora!"
16014-30 = "Sete vezes um é... sete...\nSete vezes dois... quatorze..."
16014-40 = "O que é este lugar? Ibuki pode\nexplorar um pouquinho?"
16014-50 = "O que será que a gente\npode brincar, Sensei...?"
16014-60 = "Os adultos gostam desse tipo de coisa...?\nHumm, não entendi muito bem..."
16014-70 = "Ficar sozinha é tão chato..."
16014-80 = "Ah! É o Sensei!\nBem-vindo de volta!"
16014-90 = "Eu fiquei esperando\ncomportadinha!\nMe elogia, me elogia?"
16014-100 = "Vim aqui para\nte ajudar!\nO que eu preciso fazer?"
16014-110 = "Mas antes, que tal\num lanchinho...?\nIsso! Ibuki também acha uma boa ideia!"
16014-120 = "“Demonstrativo de Execução de Despesas”...\n...O que isso significa...?"
16014-130 = "Ehehe, você tem\nalgo para me contar?"
16014-140 = "Sim!\nEu também conto\ncom você!"
16014-150 = "Sensei, ouvi dizer que o trabalho está difícil! Eu vou te ajudar!"
16014-160 = "Eu também consigo fazer!\nPode pedir qualquer coisa!"
16014-170 = "Sensei! Feliz aniversário!\nVocê ganhou muitos\npresentes?"
16014-180 = "Então, a Ibuki vai te dar\num abraço bem apertado!"
16014-190 = "Uau, você lembrou\ndo meu aniversário?\nObrigada, Sensei!"
16014-200 = "Estou tão feliz!\nSinto que até conseguiria voar agora!"
16014-210 = "Feliz Ano Novo, Sensei!\nHumm...? O que é isso?"
16014-220 = "Otoshidama?\nÉ um dinheirinho para\ncomprar as coisas\nque eu quero...?"
16014-230 = "Então, eu quero\no Sensei!\nAqui, seu Otoshidama!\nToma!"
16014-240 = "Eu me comportei\nmuito bem...!\nSerá que o Papai Noel\nvai me trazer um presente...?"
16014-250 = "Grrr! Se não me derem travessuras,\nvou comer todos os doces!"
16014-260 = "...Ué? Não é assim...?"
16014-280 = "Hoje, a Ibuki é a Sensei!"
16014-290 = "A partir de agora...\nteremos aula de matemática!"
16014-300 = "Eu tenho muita\nconfiança na\nmatemática!"
16014-310 = "Ontem, eu tirei 100\nna prova e ganhei\numa estrelinha!"
16014-320 = "Ehehe... Então, Sensei, aqui vai uma pergunta da Senseia Ibuki!"
16014-330 = "Aqui! Temos 2 sorvetes e\n1 pudim.\nQuantos doces temos no total?"
16014-340 = "Errado! Que pena!"
16014-350 = "A resposta certa é..."
16014-360 = "“Se tivermos 3 doces, a gente fica muito feliz!”"
16014-370 = "Ah! Depois de comer, não se esqueça de escovar os dentes!"
16014-380 = "Eu escovo os meus\ntrês vezes ao dia,\nsem falta!"
16014-2600 = "Uau... Uauuu!\nIsso é para mim? Sério mesmo?\n...É porque sou eu...?\nUau! Sensei! Estou tão feliz! Vou cuidar com muito carinho!"
