[translation]
10132-10 = "Blue Archive."
10132-20 = "Sou, Tsukuyo Oono! Embora eu esteja usando um vestido... sou um membro legítimo do Clube de Pesquisa de Ninjutsu...!"
10132-30 = "Uuu... Será que... estão me olhando demais...?"
10132-40 = "Se eu manchar a roupa, será um desastre... por isso... tenho que ser cuidadosa..."
10132-50 = "Uuu... Seria melhor se eu pudesse... me misturar com aquele móvel ali..."
10132-60 = "Quando estou usando um vestido, preciso... tomar cuidado até com o meu jeito de andar..."
10132-70 = "(Todos... estão usando roupas tão únicas, não é?)"
10132-80 = "Olá..."
10132-90 = "Hoje, eu sou uma modelo exclusiva para o Sensei..."
10132-100 = "Eu estava esperando por você, Sensei."
10132-110 = "Bem... se o meu vestido... te surpreendeu, me desculpe..."
10132-120 = "Mais do que ser uma modelo de primeira... eu quero me tornar uma ninja de primeira."
10132-130 = "Você gostaria de ver esta roupa... um pouco mais de perto...?"
10132-140 = "Olhando bem, o acabamento é tão detalhado... é incrível!"
10132-150 = "I-isso é... por que as minhas fotos de gravura... estão aqui no Schale...!?"
10132-160 = "Hora de comer?"
10132-170 = "Eu... se não for salada, eu como qualquer coisa..."
10132-180 = "Comparado ao sofá que tinha no local do desfile de moda..."
10132-190 = "Eu me sinto mais confortável... com a cadeira do escritório daqui."
10132-200 = "Feliz aniversário, Sensei."
10132-210 = "Eu queria mostrar para você, Sensei... eu pratiquei... a caminhada ninja...! Você poderia... dar uma olhada?"
10132-220 = "O meu aniversário... é hoje?"
10132-230 = "Ultimamente, tenho estado tão ocupada... que acabei... esquecendo completamente..."
10132-240 = "Muito obrigada!"
10132-250 = "Feliz Ano Novo!"
10132-260 = "Meu desejo de Ano Novo..."
10132-270 = "É que as pessoas que eu amo... continuem sorrindo. Ehehe..."
10132-280 = "Sensei...! Se não for pedir muito... você gostaria de... caminhar comigo pela cidade... no Natal?"
10132-290 = "Eu comecei a ganhar confiança... na minha caminhada...!"
10132-300 = "Mesmo que seja... uma fantasia de Halloween..."
10132-310 = "Não está chamativo demais?"
10132-320 = "Eh... tem gente com roupas ainda mais impressionantes, então... está tudo bem...?"
10132-340 = "Uuu..."
10132-350 = "Eu consegui... pular a cerca, mas..."
10132-360 = "Minha roupa prendeu..."
10132-370 = "Não consigo me mover..."
10132-380 = "Uuu... me desculpe..."
10132-390 = "Foi porque eu tentei... pegar um atalho..."
10132-400 = "...Ué? Como o Sensei... conseguiu passar para o outro lado...?"
10132-410 = "Ah? Tinha uma portinhola... ao lado da cerca...!?"
10132-420 = "Uuu... sem saber disso... eu..."
10132-430 = "...Sensei... você poderia, por favor... puxar um pouco a minha roupa?"
10132-2600 = "Eu... continuarei me esforçando ao máximo. Para que eu possa... me tornar uma ninja exemplar... junto com todos vocês!"
