[translation]
10003-20 = "あはは…至らない私ですが\nよろしくお願いします。"
10003-30 = "ペロロ様の\nグッズ…。"
10003-40 = "あはは…。\nどうかな。"
10003-50 = "今度は\nみんなと一緒に\n来るのもいいかも。"
10003-60 = "こういうのも\n楽しそうですね。"
10003-70 = "んん…。\nどうなんでしょう…。"
10003-80 = "先生、よろしくお願いします。"
10003-90 = "あっ、先生。\n行ってきましたか？"
10003-100 = "最善を尽くします。"
10003-110 = "これですか？\nこれはペロロ様です。"
10003-120 = "カワイイでしょう？"
10003-130 = "…悩みですか？そうですね…。\n私はその、他の人と比べて\n平凡すぎなように\n思いませんか…？"
10003-140 = "私に何かできることは\nありませんか？"
10003-150 = "あはは…そんなに振っても\n何も出ませんから…。"
10003-160 = "先生に色んな事を教えて\nいただいて、本当に幸せです。\nこれからも頑張ります！"
10003-170 = "それが私にできる、\n最高のプレゼントだから！"
10003-180 = "先生！\n誕生日をお祝いしてくれて\nありがとうございます！\n私、本当に嬉しいです！"
10003-190 = "あ、明けましておめでとう\nございます！今年も先生と\n一緒に…一生懸命頑張ります！"
10003-200 = "メリークリスマス～\n聖誕祭です。"
10003-210 = "トリニティでは\n一番の特別な日です。"
10003-220 = "そして…\n私にとっても、一番特別です。"
10003-230 = "わあっ！\nびっくりした。"
10003-240 = "あ、今日はハロウィンですね。"
10003-260 = "次はどこに行って\nみましょうか？\nあっち？ん～～、でしたら\nあちらはどうですか？"
10003-270 = "はい、どこでも大丈夫です。\n先生と一緒にいられるなら！"
10003-280 = "先生、あそこを見てください！\nあっちも、あっ！こっちも！"
10003-290 = "いつも見てる街なのに\n何でこんなに\n違って見えるんでしょうか？"
10003-300 = "ん？いつまでここで\n休憩するつもりですか？"
10003-310 = "さぁ！\nもっと色々見て回り\nましょうよ！"
10003-320 = "はい？その角度から見える\n景色がいいんですか？"
10003-2600 = "この…… この武器は…… まさか？！\nこれで私はもう少し自信を持っても\n大丈夫ですよね？！"
