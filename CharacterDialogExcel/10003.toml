[translation]
10003-20 = "Ahaha... Eu não sou lá essas coisas, mas conto com você."
10003-30 = "Artigos do\nPeroro-sama..."
10003-40 = "Ahaha...\nO que será?"
10003-50 = "Talvez na próxima\nseja bom vir com\ntodo mundo."
10003-60 = "Esse tipo de coisa\nparece divertido."
10003-70 = "Hmm...\nO que será que eu acho..."
10003-80 = "Sensei, conto com você."
10003-90 = "Ah, Sensei.\nJá foi?"
10003-100 = "Farei o meu melhor."
10003-110 = "Isto? \nIsto é o Peroro-sama."
10003-120 = "Não é fofo?"
10003-130 = "...Uma preocupação? Bem...\nVocê não acha que eu sou\ndemais comum comparada\nàs outras pessoas...?"
10003-140 = "Não há nada que eu\npossa fazer?"
10003-150 = "Ahaha... Não adianta me sacudir,\nnão vai sair nada..."
10003-160 = "Sou muito feliz por você me ensinar\ntantas coisas, Sensei.\nContinuarei me esforçando!"
10003-170 = "Porque esse é o melhor\npresente que posso te dar!"
10003-180 = "Sensei!\nObrigada por comemorar\no meu aniversário!\nEstou muito feliz!"
10003-190 = "Ah, feliz ano novo!\nEste ano também vou me esforçar\nmuito junto com você, Sensei!"
10003-200 = "Feliz Natal~\nÉ o dia do nascimento sagrado."
10003-210 = "Em Trinity, é o dia\nmais especial de todos."
10003-220 = "E também...\nPara mim, é o mais especial."
10003-230 = "Uau!\nQue susto."
10003-240 = "Ah, hoje é Halloween."
10003-260 = "Para onde vamos\nna próxima?\nAli? Hmm... então\nque tal ali?"
10003-270 = "Sim, qualquer lugar está bem.\nDesde que eu esteja com você, Sensei!"
10003-280 = "Sensei, olhe ali!\nE ali também, ah! E aqui!"
10003-290 = "É uma cidade que vejo sempre,\nmas por que parece\ntão diferente hoje?"
10003-300 = "Hmm? Até quando pretende\nficar descansando aqui?"
10003-310 = "Vamos!\nVamos ver mais\ncoisas por aí!"
10003-320 = "Sim? A vista desse ângulo\né bonita?"
10003-2600 = "Essa... Essa arma é... Não pode ser?! \nCom isso, eu posso ter um pouco mais de confiança, não posso?!"
