[translation]
10002-20 = "美食研究会へようこそ。\n究極の味を求めて、\n共に冒険に出かけましょうか？"
10002-30 = "美食への道のりはやはり\n険しいものですわね。"
10002-40 = "美味しいとは一体何なのでしょう？\n私たちにとってそれは、\nどのような意味なのかしら？"
10002-50 = "美味しい。\nそれは尊いものですわね。"
10002-60 = "究極の味を追求させて頂くため、\n今日も一生懸命に…。"
10002-70 = "食べ物に関して気に\nなることがおありでしたら、\nいつでも私をお訪ねください。"
10002-80 = "ふふっ、\n何度お目にかかっても\n飽きないお顔を\nされてますわね。"
10002-90 = "あら？褒め言葉ですわよ？\n好意的な意味ですわ、\nうふふっ…。"
10002-100 = "…それは私も同じ、\nですって？"
10002-110 = "あら？ごきげんよう。\nうふふっ…。"
10002-120 = "たい焼きですの？\n私の一番お気に入りの\n食べ物ですわ。うふふ。"
10002-130 = "高級料理店はお好きか、\nですって？うふふっ、\n嫌いではありませんわ。"
10002-140 = "ただ、私が一番\n好きなのは…。"
10002-150 = "愛する御方と一緒に\n頂く食事ですわ♡"
10002-160 = "可愛い…？\nな、なななななんの\nことかしらっ！？"
10002-170 = "お誕生日\nおめでとうございます、\n先生。誕生日にはやはり\nケーキですわ。"
10002-180 = "新鮮な生クリームを乗せても\nいいですし、濃厚なチーズを\nたくさん乗せても、"
10002-190 = "新鮮なフルーツを\n乗せてもいいですわね。"
10002-200 = "あら、私の誕生日を覚えてて\nくださったんですの？\nうふふ、嬉しいですわ。"
10002-210 = "今日はお洒落なお店で、\n美味しいものを一緒に\n頂けるのでしょうか？\n楽しみにしておりますわね。"
10002-220 = "明けましておめでとう\nございます、先生。\nお正月といえば…\nやはりお雑煮ですわね。"
10002-230 = "お餅は焼いてもいいですし、\nそのまま入れてもいいですし。"
10002-240 = "ジャガイモと鶏団子を入れて\n煮込んだ後、コタツの中で\n頂くそのお味といったら…\nうふふ。"
10002-250 = "メリークリスマス。\nこんな日にはブッシュド\nノエルや、シナモンの\nクッキーが良いですわね。"
10002-260 = "ですが、キャンドルを灯して\n向かい合って頂くもので\nしたら、どんなものでも美味\nしそうですわ、フフフ。"
10002-270 = "キヴォトスで一番\n美味しい飴について、\nご存じかしら？\nご存じないですの？"
10002-280 = "私は存じております。"
10002-290 = "それは、\n先生が持っていらっしゃる飴、\nですわ。…私にくださる？"
10002-310 = "うふふ、こうやって一緒に\n帰宅できるだなんて、\nたい焼きもこんなにたくさん\n買ってしまいましたし。"
10002-320 = "たい焼きだと少し質素\nじゃないか、ですって？"
10002-330 = "いいえ… 私にとっては最高に\n贅沢な瞬間ですわ。"
10002-340 = "では、先生。\nこれをさしあげますわ。"
10002-350 = "…いいえ。\nあーん、でなくては。"
10002-360 = "一番好きな御方と一緒に、\n一番好きな食べ物を頂く。\nこれぞ正しく…。"
10002-370 = "うん？その表情、\nどうかなさいまして？"
10002-380 = "うふふっ。そのような反応も、\n嫌いではありませんが。"
10002-390 = "寒くないか、ですって？"
10002-400 = "いいえ、暖かいですわよ。\n本当に。"
10002-2600 = "美食家の道は、修行者の道と同じですわね。\n究極というものを追求し、探求し、\nそして前に進んで行くこと。\nうふふっ……これで私もまた少し、\n前に進めそうですわ。"
