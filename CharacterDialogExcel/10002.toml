[translation]
10002-20 = "Bem-vindo ao Clube de Pesquisa Gastronômica.\nQue tal partirmos em uma aventura\nem busca do sabor supremo?"
10002-30 = "O caminho para a gastronomia\né realmente árduo, não é?"
10002-40 = "O que será que significa ser delicioso?\nPara nós, que tipo de significado\nisso carrega?"
10002-50 = "Delicioso.\nÉ algo precioso, não é?"
10002-60 = "Para que possamos continuar buscando\no sabor supremo, hoje também\ndedicaremos nosso melhor..."
10002-70 = "Se tiver algo que lhe interesse\nsobre comida, por favor,\nme procure a qualquer momento."
10002-80 = "Fufu, você tem um rosto\nque não me canso de ver,\nnão importa quantas vezes\nnós nos encontremos."
10002-90 = "Oh? É um elogio, viu?\nÉ em um sentido carinhoso,\nufufu..."
10002-100 = "…Você diz que\nsente o mesmo?"
10002-110 = "Oh? Olá.\nUfufu..."
10002-120 = "É um taiyaki?\nÉ a minha comida favorita.\nUfufu."
10002-130 = "Se eu gosto de restaurantes\nde alta gastronomia, diz?\nUfufu, não é que eu não goste."
10002-140 = "Mas, o que eu mais gosto\né de..."
10002-150 = "Uma refeição compartilhada\ncom a pessoa amada♡"
10002-160 = "Fofa...? O, o, o, o que\nvocê quer dizer com isso!?"
10002-170 = "Feliz aniversário,\nSensei. Em um aniversário,\nclaro que não pode faltar\num bolo."
10002-180 = "Pode colocar chantilly fresco,\nou talvez bastante queijo\ncremoso, ou..."
10002-190 = "Também pode colocar\nfrutas frescas, não é?"
10002-200 = "Oh, você se lembrou\ndo meu aniversário?\nUfufu, estou feliz."
10002-210 = "Será que hoje poderemos comer\nalgo delicioso juntos em um\nlugar elegante? Estou\nansiosa por isso."
10002-220 = "Feliz Ano Novo,\nSensei. Falando em Ano Novo...\nclaro que tem que ser\no ozoni."
10002-230 = "O mochi pode ser grelhado,\nou colocado direto no caldo."
10002-240 = "Depois de cozinhar com batatas\ne almôndegas de frango, saborear\nisso dentro do kotatsu é...\nUfufu."
10002-250 = "Feliz Natal.\nEm um dia como este, um\nBûche de Noël ou biscoitos\nde canela são ótimos."
10002-260 = "Mas, se for para comer\nà luz de velas, frente a frente,\nqualquer coisa parece deliciosa,\nfufufu."
10002-270 = "Você sabe qual é o doce\nmais delicioso de Kivotos?\nNão sabe?"
10002-280 = "Eu sei."
10002-290 = "É o doce que você está\nsegurando, Sensei.\n...Vai me dar um?"
10002-310 = "Ufufu, poder voltar para casa\njuntos assim, e ainda ter\ncomprado tantos taiyakis..."
10002-320 = "Diz que taiyaki é um pouco\nsimples demais?"
10002-330 = "Não... Para mim, este é o\nmomento mais luxuoso."
10002-340 = "Então, Sensei.\nVou te dar isto."
10002-350 = "…Não.\nTem que ser um 'ah'."
10002-360 = "Comer a comida favorita\ncom a pessoa favorita.\nIsso sim é o correto..."
10002-370 = "Hm? Essa expressão,\no que houve?"
10002-380 = "Ufufu. Eu não desgosto\ndesse tipo de reação."
10002-390 = "Se eu não estou com frio,\ndiz?"
10002-400 = "Não, estou aquecida.\nDe verdade."
10002-2600 = "O caminho do gourmet é o mesmo caminho do praticante. Buscar o que é supremo, explorar, e seguir em frente. Ufufu... Com isso, sinto que posso avançar um pouco mais."
