[translation]
20035-10 = "Blue Archive... Ah... ..."
20035-20 = "Desta vez eu serei a guia... Vou me esforçar tanto no treinamento quanto na orientação... Ah..."
20035-30 = "Pessoal... É por aqui... Ué... Estou sozinha?"
20035-40 = "O sonho de guiar as pessoas... Será que não era um sonho...?"
20035-50 = "Dizem que as pessoas passam um terço da vida dormindo..."
20035-60 = "Dormir bem é importante... Mais do que você imagina..."
20035-70 = "Se for sobre Hyakkiyako... Pode deixar comigo..."
20035-80 = "Olá, Sensei... Bem-vindo de volta..."
20035-90 = "A propósito, que horas são agora...?"
20035-100 = "Boa noite..."
20035-110 = "Já nos cumprimentamos, então vamos dormir juntos, Sensei. Hum...?"
20035-120 = "Ah... Não, eu não estava dormindo..."
20035-130 = "Eu só estava testando se o Schale é um bom lugar para dormir..."
20035-140 = "Travesseiro macio, futon, máscara de dormir e protetores auriculares... Está tudo preparado."
20035-150 = "Só falta o Sensei vir..."
20035-160 = "Hehe. Quem sabe um dia a gente não viaja para algum lugar, só nós dois?"
20035-170 = "Para a terra dos sonhos, talvez..."
20035-180 = "Acho que o necessário para ser um guia... é a capacidade de explicar..."
20035-190 = "Porque você precisa saber ensinar bem o que você sabe..."
20035-200 = "Não é como se eu estivesse sempre pensando só em dormir, sabe...?"
20035-210 = "Hum... Como quando encontro o Sensei..."
20035-220 = "É seu aniversário, Sensei..."
20035-230 = "Hehe. Parabéns, parabéns."
20035-240 = "Como presente, hoje eu vou ficar com você até você pegar no sono..."
20035-250 = "É verdade... Hoje é meu aniversário..."
20035-260 = "Para o meu presente de aniversário... eu adoraria um colo do Sensei... Zzz..."
20035-270 = "Chegou o ano novo. O começo de um ano... De certa forma, a primeira manhã do ano..."
20035-280 = "Eu não sou muito boa com manhãs, mas gosto do ano novo..."
20035-290 = "Feliz Natal..."
20035-300 = "Dizem que é assim que se cumprimenta fora de Hyakkiyako, não é?"
20035-310 = "Halloween..."
20035-320 = "É um dia em que podemos ver paisagens que parecem saídas de um sonho..."
20035-330 = "Hehe. Como será que devo guiar as pessoas em um dia como este?"
20035-350 = "Ah... Acho que meus pés estão doendo um pouco."
20035-360 = "Ainda não me acostumei com estes sapatos. É."
20035-370 = "O que houve, Sensei? Você está me encarando..."
20035-380 = "Hã? Eu pareço... diferente do habitual...?"
20035-390 = "...Que estranho."
20035-400 = "Hehe. Mas se o Sensei me olha desse jeito... talvez não seja tão ruim assim?"
20035-410 = "Ei, Sensei."
20035-420 = "Espero que nós dois... tenhamos bons sonhos hoje."
20035-2600 = "Obrigada, Sensei... Qualquer inimigo que atrapalhe o seu sono... eu vou derrotar..."
