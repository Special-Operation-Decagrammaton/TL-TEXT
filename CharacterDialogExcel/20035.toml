[translation]
20035-10 = "ブルーアーカイブ～ふぁ～……"
20035-20 = "今回はガイドだよ……\n修行も案内も、頑張るね～\nふぁー……"
20035-30 = "みんな……\nこっちだよ……\nあれ…… 私一人？"
20035-40 = "人を案内する夢……\n夢じゃなかったの\nかな……？"
20035-50 = "人は……人生の3分の1を\n寝て過ごすんだって……"
20035-60 = "よく寝るのは\n大事だよ……\n思ってる以上にね……"
20035-70 = "百鬼夜行の\nことなら……\n任せて……"
20035-80 = "こんにちは、先生……\nおかえりなさい……"
20035-90 = "ところで今何時……？"
20035-100 = "おやすみなさい……"
20035-110 = "挨拶もしたし、\n先生も一緒に寝よう。うん……？"
20035-120 = "ふあ……\nいや。 寝てないよ……"
20035-130 = "シャーレが寝やすいとこなのか、\n試してみただけだよ……"
20035-140 = "熟睡枕と布団、\nアイマスクと耳栓……\n全部用意されてるよ。"
20035-150 = "あとは先生が来るだけ……"
20035-160 = "ふふっ。いつか二人だけで、\nどこか旅立つのもいいかもね。"
20035-170 = "夢の国とか……"
20035-180 = "ガイドに必要なのは…… \n説明する力だと思う……"
20035-190 = "自分が知っていることを、\n上手く教えてあげないと\nいけないから……"
20035-200 = "私だっていつも寝る\nことばっか考えてる\nわけじゃないんだよ……？"
20035-210 = "うーん…… \n先生と会う時とか……"
20035-220 = "誕生日だね、先生……"
20035-230 = "ふふっ。\nおめでとう、おめでとう。"
20035-240 = "プレゼントとして今日は、\n眠るまで私が一緒に\nいてあげる……"
20035-250 = "そうだ……\n今日私の誕生日だったね……"
20035-260 = "誕生日プレゼントはやっぱり……\n先生の膝枕がいいな……\nぐぅ……"
20035-270 = "新年になったね。\n一年の始まり……\nある意味一年の\n一番最初の朝……"
20035-280 = "朝は弱いけど、新年は好き……"
20035-290 = "メリ～クリスマス～"
20035-300 = "百鬼夜行の外では、\nこう挨拶するんだって？"
20035-310 = "ハロウィーン……"
20035-320 = "夢の中のような風景が\n見られる日だね……"
20035-330 = "ふふ。こういう日は何を、\nどうガイドしたらいいのかな？"
20035-350 = "ふぅ……ちょっと足が痛いかも。"
20035-360 = "この靴はまだ\n慣れていなくて。 うん。"
20035-370 = "どうしたの、先生？\nこっちをじっと見て……"
20035-380 = "え？私が何か……\nいつもと違う感じに見える……？"
20035-390 = "……変なの。"
20035-400 = "ふふっ。\nでも先生がそういう風に私を\n見てくれるんだったら…… \nそれも悪くないかも？"
20035-410 = "ねえ、先生。"
20035-420 = "今日は私たち二人とも…… \nいい夢が見られたら、いいね。"
20035-2600 = "ありがとう、先生……\n先生の睡眠を遮る敵は……\n私が倒してあげる……"
