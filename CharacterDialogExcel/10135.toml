[translation]
10135-10 = "Eu tenho que dizer, não é...? \nBlue Archive."
10135-20 = "Olá, eu sou a Kei. \nPor que está tão apressado...? \nAh... a partir de agora, eu vou cuidar de você, Sensei."
10135-30 = "（Já que eu também sou uma \"aluna\"... \nUm café, pelo menos...!）"
10135-40 = "Aquilo é... \nQual será o gosto \ndisso?"
10135-50 = "Entendo... é isso que significa \nficar relaxada..."
10135-60 = "Ter o meu próprio \ncorpo... \nTambém tem suas \ninconveniências..."
10135-70 = "Fufu... \nSó de estar aqui em pé, \né algo divertido..."
10135-80 = "Ora, o que você estava fazendo? \nEstá atrasado!"
10135-90 = "Já preparei tudo, então... \nSim, pode se sentar."
10135-100 = "Ah, você chegou. \nEntão, vamos começar?"
10135-110 = "……Por que você está \nessa cara de bobo?!"
10135-120 = "Pare de dizer \nque eu sou fofa!"
10135-130 = "S-se eu não gosto...? \nB-bem, na verdade...!"
10135-140 = "……"
10135-150 = "Eu quis dizer para você \ndizer outras coisas além de fofa..."
10135-160 = "Por que eu estou sempre \nbrava...?"
10135-170 = "……Que falta de educação. Eu não estou \nbrava, de jeito nenhum."
10135-180 = "Mas bem... \nDepois de conhecer as verdades do mundo."
10135-190 = "Eu acho difícil \nnão ficar brava."
10135-200 = "Aproveitando a oportunidade, \neu vou falar."
10135-210 = "Você está se alimentando direito? \nExercícios moderados também são necessários."
10135-220 = "Dormir cedo e acordar cedo faz bem, \nisso também se aplica \naos adultos, sabe?"
10135-230 = "Trabalhe com moderação. \nMas também não seja preguiçoso."
10135-240 = "……Sério mesmo, \nvocê dá um trabalhão."
10135-250 = "Ah, chega! \nPor isso eu disse para não me tratar \ncomo uma criança!"
10135-260 = "……Eu não sou \ntão infantil assim."
10135-270 = "Você riu?! \nVocê riu agora, não foi?! \nEu vi direitinho!"
10135-280 = "Guarde bem as minhas palavras! \nUm dia eu vou fazer você entender \nna prática!!"
10135-290 = "O que foi? \nSe não tem nada para fazer, \nnão me chame."
10135-300 = "Hã? \nÉ seu trabalho verificar \nse eu estou aqui?"
10135-310 = "Essa pessoa é inacreditável! \nSempre dizendo \ncoisas sem sentido!"
10135-320 = "Mas bem... \nEu não desgosto \ndesse tipo de conversa."
10135-330 = "Olá, Sensei."
10135-340 = "Hã? \nSe eu tenho algo a dizer?"
10135-350 = "……"
10135-360 = "Não tenho."
10135-370 = "Eu já disse que não tenho, \nnão disse?!"
10135-380 = "……"
10135-390 = "Feliz aniversário, \nSensei."
10135-400 = "Hã!? \nO meu aniversário? \nI-isso é menos importante que o \naniversário da Alice...!"
10135-410 = "Hã, não tem problema porque é no mesmo dia...? \nB-bem, isso é verdade, mas...!"
10135-420 = "……Obrigada."
10135-430 = "Feliz \nAno Novo. \nÉ o Ano Novo... \nO primeiro dia do ano, mas..."
10135-440 = "Não, eu também preciso \nme acostumar logo."
10135-450 = "Já que agora sou uma \n\"aluna\" de verdade."
10135-460 = "Eu não estou pedindo \npresentes nem nada."
10135-470 = "Claro, \nse você me der um, \neu aceitarei."
10135-480 = "……"
10135-490 = "V-você realmente \nnão tem nada...?"
10135-500 = "……!! \nAh, obrigada...!"
10135-510 = "O dia em que os espíritos retornam... que tipo de festival supersticioso é esse..."
10135-520 = "……。"
10135-530 = "Você não tem doces para mim?"
10135-550 = "Não se preocupe."
10135-560 = "Eu não vou desaparecer."
10135-570 = "Na verdade, é o contrário."
10135-580 = "Eu pretendo sobreviver, \nnão importa o que seja preciso fazer."
10135-590 = "Se você, Sensei, \nnão vai abandonar este mundo."
10135-600 = "Então eu também, até o fim, \nnunca vou desistir."
10135-610 = "Por isso, está tudo bem... \nVai ficar tudo bem, com certeza."
10135-620 = "Eu estarei sempre aqui."
10135-630 = "Isso é um segredo entre nós, mas... \nEu..."
10135-640 = "Não te odeio, \nSensei."
10135-2600 = "Significa... a luz das estrelas de uma terra distante. Acho que isso se refere a algo de muito tempo atrás. De acordo com as coordenadas, dizem que o passado e o futuro existem simultaneamente."
