[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10135-10 = "Eu tenho mesmo que dizer isso...?\nBlue, Archive." 
10135-20 = "Olá, aqui é a Kei.\nPor que o desespero...?\nHaa... A partir de agora, eu serei a encarregada de vigiar você, Sensei." 
10135-30 = "(Eu também sou uma 'aluna', afinal...\nPosso muito bem vir a um café...!)" 
10135-40 = "Aquilo ali...\nQue gosto será que tem?" 
10135-50 = "Entendo... Então isso é o que chamam de 'relaxar'..." 
10135-60 = "Ter um corpo próprio...\nAté que pode ser um pouco inconveniente, não é...?" 
10135-70 = "Fufu...\nSó de ficar parada assim,\njá é divertido de certa forma..." 
10135-80 = "Sério, o que você estava fazendo?\nVocê está atrasado!" 
10135-90 = "Eu já deixei tudo preparado...\nAqui, sente-se logo." 
10135-100 = "Ah, você chegou.\nEntão, vamos começar?" 
10135-110 = "...Por que você\nestá sorrindo com essa cara de bobo?!" 
10135-120 = "Pare de me chamar\nde fofa, por favor!" 
10135-130 = "S-Se eu odeio isso...?\nN-Não é bem isso, mas...!" 
10135-140 = "..." 
10135-150 = "O que eu quis dizer é para você me elogiar de outras formas além de 'fofa'..." 
10135-160 = "Você me pergunta por que eu estou sempre brava...?" 
10135-170 = "...Que indelicadeza. Não é como se eu estivesse brava o tempo todo." 
10135-180 = "Mas bem...\nQuando se compreende a lógica do mundo." 
10135-190 = "Acho um pouco difícil conseguir não ficar irritada." 
10135-200 = "Aproveitando a oportunidade,\ndeixe-me dizer uma coisa." 
10135-210 = "Você tem se alimentado direito?\nFazer exercícios moderados também é necessário." 
10135-220 = "Dormir e acordar cedo faz bem,\ne essa regra também se aplica aos adultos, sabia?" 
10135-230 = "Pegue leve no trabalho.\nMas, obviamente, não ouse ser preguiçoso." 
10135-240 = "...Sinceramente,\nvocê me dá muito trabalho." 
10135-250 = "Argh, que saco!\nJá falei para parar de me tratar como criança!" 
10135-260 = "...Eu não sou tão\nimatura assim, ok?" 
10135-270 = "Você riu?!\nVocê acabou de rir, não foi?!\nEu vi perfeitamente!" 
10135-280 = "Guarde minhas palavras!\nUm dia eu farei você engolir esse risinho!!" 
10135-290 = "O que foi?\nSe não tem nada importante,\nnão me chame." 
10135-300 = "Eh?\nÉ seu trabalho confirmar\nse eu estou mesmo aqui?" 
10135-310 = "Sério, que sujeito inacreditável!\nSempre arrumando\ndesculpas esfarrapadas!" 
10135-320 = "Mas bem...\nEu não desgosto\ndesse tipo de interação." 
10135-330 = "Olá, Sensei." 
10135-340 = "Eh?\nSe eu não tenho nada para dizer?" 
10135-350 = "..." 
10135-360 = "Não tenho." 
10135-370 = "Eu já disse que não tenho!" 
10135-380 = "..." 
10135-390 = "Feliz aniversário,\nSensei." 
10135-400 = "Eh?!\nO meu aniversário?\nM-Mais importante que isso, o aniversário da Aris...!" 
10135-410 = "Eh? Você está dizendo que tudo bem porque é no mesmo dia...?\nI-Isso é verdade, mas...!" 
10135-420 = "...Obrigada." 
10135-430 = "Feliz\nAno Novo.\nO feriado de Ano Novo...\nO primeiro dia do ano..." 
10135-440 = "Não, eu também preciso me\nacostumar com isso." 
10135-450 = "Afinal, agora eu sou uma\n'aluna' de verdade." 
10135-460 = "Não é como se eu estivesse\nesperando um presente nem nada do tipo." 
10135-470 = "Claro que,\nse você quiser me dar um,\neu vou aceitar de bom grado." 
10135-480 = "..." 
10135-490 = "V-Você realmente\nnão tem nada para mim...?" 
10135-500 = "...!!\nA-Ah, muito obrigada...!" 
10135-510 = "O dia em que os espíritos retornam... que festival mais supersticioso..." 
10135-520 = "..." 
10135-530 = "Não tem nenhum doce para mim?" 
10135-550 = "Não se preocupe." 
10135-560 = "Eu não vou desaparecer." 
10135-570 = "Na verdade, é exatamente o oposto." 
10135-580 = "Eu pretendo sobreviver usando qualquer meio necessário." 
10135-590 = "Desde que o Sensei não abandone este mundo." 
10135-600 = "Eu também não desistirei,\nvou lutar até o fim." 
10135-610 = "Então fique tranquilo...\nVai ficar tudo absolutamente bem." 
10135-620 = "Eu estarei sempre aqui." 
10135-630 = "Isso fica só entre nós, ok...?\nEu――" 
10135-640 = "Eu não odeio você, Sensei." 
10135-2600 = "Significa 'A luz das estrelas de uma terra distante'...\nAcredito que se refira a um passado muito remoto. Dependendo das coordenadas, dizem que o passado e o futuro coexistem simultaneamente." 