10101-510 = "Que seja um ano de sorrisos,\nvamos rezar por isso."
10101-520 = "É Natal, não é?\nEu trouxe algumas músicas\nde natal para samplear."
10101-530 = "Você poderia ouvir, Sensei?"
10101-540 = "Doces... travessuras... hum..."
10101-550 = "Ainda não entendo muito bem...\nDevo escolher apenas um?"
10101-570 = "A plateia após o fim\ndo espetáculo é algo\nque dá uma sensação de vazio."
10101-580 = "A multidão de espectadores se foi,\nas luzes se apagaram todas..."
10101-590 = "O palco glamoroso\nnão deixou rastros e está\nsubmerso em silêncio."
10101-600 = "Quando um espaço que estava\ncheio de calor e aplausos\nde repente se cala... chega a\nser um pouco melancólico."
10101-610 = "…Mas, agora, eu\nestou bem."
10101-620 = "Nada mudou,\nmas consigo me sentir\nem paz."
10101-630 = "…Talvez seja porque\nvocê está ao meu lado, Sensei."
10101-2600 = "O futuro é incerto, mas\nposso afirmar uma coisa.\nEsta prova de confiança que\nrecebi de você, Sensei...\nEu a guardarei com carinho\naté o fim."
