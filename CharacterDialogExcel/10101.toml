[translation]
10101-10 = "ブルー、アーカイブ。"
10101-20 = "ここが今回のアルバイト先か…\n海は初めてだが、任せてくれ。"
10101-30 = "ここで\n練習してもいいか？"
10101-40 = "あの装飾…アツコに\n似合いそうだ。"
10101-50 = "この辺りは騒々しいな。\nミサキには\n不向きかもしれない。"
10101-60 = "カフェか…ヒヨリの\nお気に入りの雑誌が、\n見つかるといいのだが。"
10101-70 = "たしかここに、\n家計簿が…"
10101-80 = "先生、待っていた。\n今日の業務はなんだ？"
10101-90 = "ん～ん～ん～"
10101-100 = "せ、先生！？い、今の、\n聞こえていたか…？"
10101-110 = "アルバイトだからと、\n手を抜くなどあっては\nならない。"
10101-120 = "与えられた業務は、\nすべて全力で挑んでいる。"
10101-130 = "次の給料でミサキに\n贈り物をしよう…"
10101-140 = "この服装は、アルバイトで\n必要だから着ているだけだが…"
10101-150 = "先生が気に入ったと\nいうのなら、これからも\n着るとしよう。"
10101-160 = "海、お祭り…"
10101-170 = "いつか、\nアズサとも一緒に\n訪れたいものだ。"
10101-180 = "海もアルバイトも、\n知らないことだらけだ。"
10101-190 = "しかしいつまでも\n「不慣れ」を言い訳には\nできない。尽力する。"
10101-200 = "誕生日だな、先生。"
10101-210 = "めでたい日に\n最適な曲を用意した。\nそこに座ってくれ、\n今から演奏する。"
10101-220 = "私の誕生日…"
10101-230 = "ああ…仕事に\n没頭していて\n忘れていた。"
10101-240 = "慣れなくても、\nお礼はきちんと\n言わなければ。"
10101-250 = "感謝する、先生。"
10101-260 = "明けましておめでとう、\n先生。"
10101-270 = "笑顔の一年であるよう、\n祈ろう。"
10101-280 = "クリスマスだな。\nキャロルを数曲、\nサンプリングしてきた。"
10101-290 = "聞いてくれるか？先生。"
10101-300 = "お菓子…いたずら…む…"
10101-310 = "まだよく分からないな…\n片方を選べば、いいのか？"
10101-320 = "先生、待っていた。\n今日の業務はなんだ？"
10101-330 = "ん～ん～ん～"
10101-340 = "せ、先生！？い、今の、\n聞こえていたか…？"
10101-350 = "アルバイトだからと、\n手を抜くなどあっては\nならない。"
10101-360 = "与えられた業務は、\nすべて全力で挑んでいる。"
10101-370 = "次の給料でミサキに\n贈り物をしよう…"
10101-380 = "この服装は、アルバイトで\n必要だから着ているだけだが…"
10101-390 = "先生が気に入ったと\nいうのなら、これからも\n着るとしよう。"
10101-400 = "海、お祭り…"
10101-410 = "いつか、\nアズサとも一緒に\n訪れたいものだ。"
10101-420 = "海もアルバイトも、\n知らないことだらけだ。"
10101-430 = "しかしいつまでも\n「不慣れ」を言い訳には\nできない。尽力する。"
10101-440 = "誕生日だな、先生。"
10101-450 = "めでたい日に\n最適な曲を用意した。\nそこに座ってくれ、\n今から演奏する。"
10101-460 = "私の誕生日…"
10101-470 = "ああ…仕事に\n没頭していて\n忘れていた。"
10101-480 = "慣れなくても、\nお礼はきちんと\n言わなければ。"
10101-490 = "感謝する、先生。"
10101-500 = "明けましておめでとう、\n先生。"
10101-510 = "笑顔の一年であるよう、\n祈ろう。"
10101-520 = "クリスマスだな。\nキャロルを数曲、\nサンプリングしてきた。"
10101-530 = "聞いてくれるか？先生。"
10101-540 = "お菓子…いたずら…む…"
10101-550 = "まだよく分からないな…\n片方を選べば、いいのか？"
10101-570 = "終演後の\n客席というのは、\n寂しいものだな。"
10101-580 = "大勢いた観客がはけ、\n照明はすべて消えて…"
10101-590 = "華やかなステージは\n跡形もなく、静寂に\n沈んでいる。"
10101-600 = "熱気と歓声に\n満ちていた空間が\n突如静まると…どこか、\n切なさを覚えるほどだ。"
10101-610 = "…でも、今はもう、\n大丈夫だ。"
10101-620 = "変わったことは\n何もないが、\n穏やかでいられる。"
10101-630 = "…先生が隣にいるから、\nかもしれないな。"
10101-2600 = "将来は不確かだが、\n一つだけ断言できる。\n先生からもらった\nこの信頼の証は…\n最後まで、大切にする。"
