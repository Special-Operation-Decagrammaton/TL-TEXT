[translation]
10101-10 = "Blue Archive."
10101-20 = "Então este é o local do meu trabalho de meio período... É minha primeira vez no mar, mas pode deixar comigo."
10101-30 = "Posso praticar aqui?"
10101-40 = "Aquele adorno... acho que combinaria com a Atsuko."
10101-50 = "Esta área é muito barulhenta. Talvez não seja adequada para a Misaki."
10101-60 = "Um café... espero encontrar a revista favorita da Hiyori por aqui."
10101-70 = "Se não me engano, o livro de contas estava por aqui..."
10101-80 = "Professor, eu estava esperando. Qual é a tarefa de hoje?"
10101-90 = "Hmm~ hmm~ hmm~"
10101-100 = "P-Professor!? V-você ouviu o que eu estava fazendo agora há pouco...?"
10101-110 = "Só porque é um trabalho de meio período, não significa que eu deva fazer corpo mole."
10101-120 = "Estou me dedicando ao máximo em todas as tarefas que me foram dadas."
10101-130 = "Vou comprar um presente para a Misaki com o próximo salário..."
10101-140 = "Eu só estou usando este traje porque é necessário para o trabalho, mas..."
10101-150 = "Se você gostou, Professor, então continuarei usando."
10101-160 = "O mar, o festival..."
10101-170 = "Espero que um dia eu possa visitar este lugar com a Azusa também."
10101-180 = "Tanto o mar quanto o trabalho de meio período são coisas que ainda não conheço bem."
10101-190 = "Mas não posso usar a falta de costume como desculpa para sempre. Farei o meu melhor."
10101-200 = "É seu aniversário, Professor."
10101-210 = "Preparei uma música perfeita para este dia especial. Sente-se ali, vou começar a tocar."
10101-220 = "Meu aniversário..."
10101-230 = "Ah... eu estava tão imersa no trabalho que tinha esquecido."
10101-240 = "Mesmo que eu não esteja acostumada, preciso agradecer adequadamente."
10101-250 = "Minha gratidão, Professor."
10101-260 = "Feliz Ano Novo, Professor."
10101-270 = "Vou rezar para que este seja um ano cheio de sorrisos."
10101-280 = "É Natal. Eu fiz um sampling de algumas canções natalinas."
10101-290 = "Você gostaria de ouvir, Professor?"
10101-300 = "Doces... travessuras... hmm..."
10101-310 = "Ainda não entendo muito bem... Devo escolher apenas um dos dois?"
10101-320 = "Professor, eu estava esperando. Qual é a tarefa de hoje?"
