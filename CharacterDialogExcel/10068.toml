[translation]
10068-10 = "ブルー！アーカイブ！！"
10068-20 = "呼ばれて飛び出て！参りました！\nみんなのスーパースター、宇沢レイサ、登場です！"
10068-30 = "ひ、人が多い……。"
10068-40 = "どこにいれば\nいいんだろう……。"
10068-50 = "いや、逆に\nこういう時こそ\n普段どおりに……！"
10068-60 = "や、やっぱ\n止めとこう……\n変な人だと\n思われちゃう。"
10068-70 = "居心地の\n良い場所ですね！"
10068-80 = "おかえりなさい、先生！"
10068-90 = "宇沢レイサ、\n待機していました！"
10068-100 = "先生の「登場」ですね！！"
10068-110 = "それでは、\n今日は何をしましょうか！"
10068-120 = "お呼びですか、先生！\nなんでもお申しつけください！"
10068-130 = "あっ、もしかして、\n声……大きかったですか？"
10068-140 = "響いちゃったかも……\nすみません……。"
10068-150 = "ん……不思議です。"
10068-160 = "ここにくると、\nちょっとだけ力が\n抜けるというか……。"
10068-170 = "お、お使いでも\n行ってきましょうか？"
10068-180 = "その……じっと立ってると、\nなんだか落ち着かなくて……！"
10068-190 = "この先、何があっても\nご安心ください！"
10068-200 = "先生のそばには私、\n宇沢レイサが\nついておりますから！"
10068-210 = "お誕生日おめでとう\nございます、先生！！！"
10068-220 = "すっごく特別な日ですから、\n一緒にパトロールなど\nいかがでしょうか！"
10068-230 = "あっ、私の誕生日ですか？\nありがとうございます！"
10068-240 = "最近、誕生日を\n祝ってくださる方が多くて！"
10068-250 = "……本当、\n長生きしてみるもんですね！"
10068-260 = "私、まだ15歳ですけど！"
10068-270 = "あけまして\nおめでとうございます、先生！"
10068-280 = "今年も\nよろしくお願いしますね！"
10068-290 = "メリークリスマス～！！"
10068-300 = "え？プレゼント交換？"
10068-310 = "あ、ああっ……！？\n忘れてました…！"
10068-320 = "あんまりこういうのは、\n慣れてなくて……！"
10068-330 = "アメがなかったら、イタズラを\nしてもらえる日です！"
10068-340 = "……え？解釈が変？"
10068-360 = "……なんだか、\n不思議な気分です。\nこうして……"
10068-370 = "人と一緒に、\n日の出を見るのは\n初めてで。"
10068-380 = "そういえば、\n誰かと二人きりで\n過ごした時間も……。"
10068-390 = "もしかすると、これが\n最長かも……はは。"
10068-400 = "んん……また変なことを\n言ってしまった気がします……。"
10068-410 = "実はまだ、少し眠くて……\n自分でも何を\n言っているのか、よく……。"
10068-420 = "で、でも先生は……\nなんでも分かって\nくださるから……"
10068-430 = "今回も……いつもみたいに、\n分かってくださいね。へへ……。"
10068-440 = "ん……いいですね……。"
10068-450 = "先生……\nありがとうございます……\nひひ……。"
10068-2600 = "本当は、まだ実感がありません。\n私は……ちゃんと先生の\nお役に立てているのでしょうか……\nそうだといいなあって、\nいつも心から願っています。"
