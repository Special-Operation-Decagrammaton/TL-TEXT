[translation]
10068-10 = "Blue! Archive!!"
10068-20 = "Chamada e atendida! Cheguei!\nA superestrela de todos, Uzawa Reisa, está na área!"
10068-30 = "C- quanta gente..."
10068-40 = "Onde será que eu\ndeveria ficar..."
10068-50 = "Não, pelo contrário,\né nessas horas que\ndevo agir normalmente...!"
10068-60 = "É, melhor não...\nVão acabar achando\nque sou estranha."
10068-70 = "Que lugar\naconchegante!"
10068-80 = "Bem-vindo de volta, Sensei!"
10068-90 = "Uzawa Reisa,\nà disposição!"
10068-100 = "É a sua \"estreia\", Sensei!!"
10068-110 = "Então, o que vamos\nfazer hoje!"
10068-120 = "Me chamou, Sensei?\nPode pedir o que quiser!"
10068-130 = "Ah, será que eu...\nfalei alto demais?"
10068-140 = "Acho que ecoou...\nDesculpe..."
10068-150 = "Hum... é estranho."
10068-160 = "Quando venho aqui,\nsinto que fico um pouco\nmais relaxada..."
10068-170 = "Q-quer que eu vá\nfazer algum favor?"
10068-180 = "É que... ficar parada assim,\nme deixa um pouco inquieta...!"
10068-190 = "Não importa o que aconteça\ndaqui para frente, fique tranquilo!"
10068-200 = "Pois eu, Uzawa Reisa,\nestarei ao seu lado,\nSensei!"
10068-210 = "Feliz aniversário,\nSensei!!!"
10068-220 = "Como é um dia super especial,\nque tal fazermos uma patrulha\njuntos!"
10068-230 = "Ah, é o meu aniversário?\nMuito obrigada!"
10068-240 = "Ultimamente, tem tanta gente\nme dando os parabéns!"
10068-250 = "...Sério, vale a pena\nviver bastante!"
10068-260 = "Embora eu só tenha 15 anos!"
10068-270 = "Feliz Ano Novo,\nSensei!"
10068-280 = "Conto com você\neste ano também!"
10068-290 = "Feliz Natal~!!"
10068-300 = "Hã? Troca de presentes?"
10068-310 = "A-ah...!?\nEu esqueci...!"
10068-320 = "Eu não estou muito\nacostumada com essas coisas...!"
10068-330 = "É o dia em que, se não tiver doces, você pode fazer travessuras!"
10068-340 = "...Hã? Minha interpretação está errada?"
10068-360 = "...Sinto uma sensação\nestranha. Assim..."
10068-370 = "É a primeira vez que vejo\no nascer do sol\ncom alguém."
10068-380 = "Pensando bem, o tempo que passei\na sós com alguém também..."
10068-390 = "Talvez este seja o mais longo...\nhehe."
10068-400 = "Hum... sinto que disse\nalgo estranho de novo..."
10068-410 = "Na verdade, ainda estou com um pouco de sono... nem eu mesma sei o que estou dizendo..."
10068-420 = "M-mas o Sensei...\nentende tudo,\nentão..."
10068-430 = "Desta vez também... como sempre, entenda o que quero dizer, tá? Hehe..."
10068-440 = "Hum... que bom..."
10068-450 = "Sensei...\nobrigada...\nhihi..."
10068-2600 = "Na verdade, ainda não caiu a ficha. Será que estou sendo realmente útil para o Sensei...? Eu sempre desejo do fundo do coração que sim."
