[translation]
10015-10 = "Blue Archive"
10015-20 = "Ó herói. Que a luz esteja com você."
10015-30 = "Já está na hora de\npreparar a segunda rodada, né."
10015-40 = "Alice também quer\ntomar café."
10015-50 = "Descansar é importante.\nPorque recupera o HP."
10015-60 = "Quero ir em um raid\ncom o Sensei de novo.\nVou tentar chamar\na conta para ir."
10015-70 = "Por favor, faça\ncarinho na Alice.\nA pele de proteína artificial\nda Alice vai ficar quentinha."
10015-80 = "Bem-vindo, Sensei.\nA Alice estava\nesperando por você."
10015-90 = "Em que tipo de aventura\nvamos hoje?"
10015-100 = "Alice está pronta\npara partir junto."
10015-110 = "Dizem que um jogo novo\nvai ser lançado em breve! O Sensei\nvai jogar comigo, né?"
10015-120 = "Hmm. Estou com fome.\nEh...?"
10015-130 = "Alice, não se come pilhas!"
10015-140 = "Faz milênios que um humano\nnão vem aqui..."
10015-150 = "Não sei por que, mas\nquis dizer essa frase."
10015-160 = "Não sei o motivo, mas\na Alice consegue derramar lágrimas."
10015-170 = "Provavelmente é a função de limpeza\nda câmera ocular."
10015-180 = "Sensei.\nO próximo destino é o fliperama..."
10015-190 = "A-Alice não\nmente!"
10015-200 = "É o primeiro dia de conexão da vida do Sensei, né.\nEste momento é o melhor\npresente para a Alice."
10015-210 = "Parabéns, Sensei."
10015-220 = "O aniversário da Alice\né hoje, o dia em que conheci todos."
10015-230 = "É exatamente o dia\nem que conheci o Sensei."
10015-240 = "Feliz Ano Novo."
10015-250 = "...E não temos tempo para isso!"
10015-260 = "Sensei! O evento de Ano Novo\ncomeçou!"
10015-270 = "Dizem que o Papai Noel dá\npresentes para as crianças boazinhas."
10015-280 = "A Alice quer\nganhar o Sensei."
10015-290 = "Não tenho medo de fantasmas.\nCom certeza o atributo das trevas\né fraco contra o atributo da luz."
10015-310 = "A Alice não consegue acreditar que\nnão existe magia em Kivotos."
10015-320 = "A magia existe.\nPorque o Sensei acabou de\nfazer a Alice feliz."
10015-330 = "O motivo de um jogo ser\ninteressante é porque\na beleza do mundo está\ncontida nele."
10015-340 = "Isso foi algo que aprendi\natravés do Sensei."
10015-350 = "Jogos, gatos, amigos... e\ntambém este momento agora."
10015-360 = "Existem muitas coisas lindas\nneste mundo."
10015-370 = "A Alice quer saber mais.\nJunto com o Sensei..."
10015-380 = "Quero aprender mais\nsobre este mundo!"
10015-2600 = "Esta é... a lendária espada sagrada...\nAh, é uma arma, né."
