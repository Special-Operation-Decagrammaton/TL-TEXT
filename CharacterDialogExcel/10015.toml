[translation]
10015-10 = "ブルーアーカイブ"
10015-20 = "勇者よ。光があなたと共にあらんことを。"
10015-30 = "もう２周目を\n準備しなきゃですね。"
10015-40 = "アリスもコーヒーが\n飲みたいです。"
10015-50 = "休憩は大事です。\nHPが回復するので。"
10015-60 = "また先生とレイドに\n行きたいです。\nアカウントに声を\nかけてみようと思います。"
10015-70 = "アリスを\nナデナデしてください。\nアリスの人工タンパク質の\n皮膚が暖かくなります。"
10015-80 = "ようこそ先生。\nアリスは先生を\n待っていました。"
10015-90 = "今日はどんな\n冒険に出かけますか？"
10015-100 = "アリスは一緒に\n旅立つ準備ができています。"
10015-110 = "新作のゲームがもうすぐ\n発売だそうです！先生も\n一緒にやってくれますよね？"
10015-120 = "うーん。お腹がすきました。\nえ…？"
10015-130 = "アリス、乾電池は食べません！"
10015-140 = "人間がここに来たのは\n数千年ぶりだな…。"
10015-150 = "なんだかこんなセリフを\n言ってみたくなりました。"
10015-160 = "理由は分かりませんが、\nアリスは涙を流せます。"
10015-170 = "おそらく眼球型カメラの\n洗浄機能だと思います。"
10015-180 = "先生。\n次の目的地はゲーセン…。"
10015-190 = "ア、アリスは\nうそをつきません！"
10015-200 = "先生の人生初の接続日ですね。\n今この瞬間が、アリスには\n最高のプレゼントです。"
10015-210 = "おめでとうございます、先生。"
10015-220 = "アリスの誕生日は、\nみんなに出会えた今日です。"
10015-230 = "先生と初めて会った、\nまさにその日です。"
10015-240 = "明けましておめでとう\nございます。"
10015-250 = "…と、そんな暇はありません！"
10015-260 = "先生！お正月のイベントが\n始まりましたよ！"
10015-270 = "サンタクロースはいい子に\nプレゼントをあげるそうです。"
10015-280 = "アリスは先生を\nいただきたいです。"
10015-290 = "お化けの存在は怖くありません。\nきっと闇の属性は光の\n属性に弱いはずですから。"
10015-310 = "アリスはキヴォトスに…\n魔法がないとは思えません。"
10015-320 = "魔法は存在しています。\nだって、先生は今、アリスを\n幸せにしてくれましたから。"
10015-330 = "ゲームが面白い\n理由はそこに、\n世界の美しさが込\nめられているから。"
10015-340 = "これは、先生を通じて\nわかったことです。"
10015-350 = "ゲームも、猫も、友達も…\nそして今この瞬間も。"
10015-360 = "この世界には美しいものが\nたくさんあります。"
10015-370 = "アリスはもっと知りたいです。\n先生と一緒に…"
10015-380 = "この世界のことをもっと\n学びたいです！"
10015-2600 = "これが…… 伝説の聖剣……\nあっ、銃ですね。"
