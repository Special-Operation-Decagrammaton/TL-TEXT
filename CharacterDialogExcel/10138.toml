[translation]
10138-10 = "Humph... Blue Archive!"
10138-20 = "Academia de Artes Wildhunt, Ebi Rena.\nFique de olho. Eu vou provar que todo esse ocultismo\nnão passa de uma farsa!"
10138-30 = "Que tipo de roupa\ncombinaria com aquela pessoa?"
10138-40 = "Não vai acontecer nada de estranho\naqui, né...?\nEspero que não..."
10138-50 = "Essa formação... Sensei,\nvocê até que tem\num bom senso."
10138-60 = "Aquele design... é de ocultismo, né?\nSerá que o Sensei\ntambém foi influenciado?"
10138-70 = "Ah, parece que ouvi um barulho\nestranho ali..."
10138-80 = "Demorou!!\nEu fiquei te esperando esse tempo todo, sabia!?"
10138-90 = "Bem-vindo de volta, Sensei.\nEntão, o que eu devo fazer?"
10138-100 = "Você mantém tudo bem limpo, né."
10138-110 = "No meu dormitório...\nnão importa o quanto a gente limpe,\nnunca tem fim."
10138-120 = "Ah, é porque as veteranas ficam trazendo\ncoisas desnecessárias..."
10138-130 = "Eu nunca vou esquecer o dia em que\nvi a divisão dos quartos..."
10138-140 = "Quer dizer, é o quarto 404 do 4º dormitório, sabe?\nMesmo não tendo interesse em ocultismo,\nquem não ficaria incomodada?"
10138-150 = "Por que será que as pessoas\nacreditam em ocultismo?"
10138-160 = "Dá para provar tudo aquilo\ncientificamente.\n...O Sensei também acha isso, né?"
10138-170 = "O que você faz quando está livre, Sensei?"
10138-180 = "Eu? Eu costumo\nfazer várias coisas."
10138-190 = "Se quiser, quer tentar fazer algo comigo?"
10138-200 = "N-não é como se eu quisesse que você\nfizesse algo para mim, tá?!"
10138-210 = "Ultimamente só acontecem\ncoisas estranhas."
10138-220 = "Como as veteranas disseram,\nserá que seria melhor\nconsultar uma vidente...?"
10138-230 = "Ugh... e olha que eu decidi\nque não ia acreditar nessas coisas!"
10138-240 = "Hã? Sensei,\né seu aniversário?\nEu não sabia."
10138-250 = "O que você está escondendo\nnas costas...?"
10138-260 = "N-não é um presente, tá!?\nEu só passei na loja\npor acaso!"
10138-270 = "Hoje, as veteranas vão fazer\numa festa de aniversário para mim."
10138-280 = "Vem também, Sensei.\nVai ter muita coisa gostosa,\nprovavelmente."
10138-290 = "Feliz Ano Novo, Sensei.\nJá que é ano novo, que tal\nfazermos um pedido juntos?"
10138-300 = "N-não é como se fazer um pedido\nfosse ocultismo, né!"
10138-310 = "Eu nunca acreditei em Papai Noel\ndesde pequena."
10138-320 = "Ele entra escondido\nperto do travesseiro enquanto você dorme, sabe?"
10138-330 = "Isso não é assustador demais!?"
10138-340 = "Hmm... este quarto, eu queria que tivesse\num pouco mais de cara de Halloween."
10138-350 = "Ah...\nNão estou falando de ocultismo!\nEstou falando de design!"
10138-370 = "Sabe, eu sempre fui\nmuito habilidosa com as mãos."
10138-380 = "Eu fazia laços e\ndava para as minhas amigas."
10138-390 = "Eu ficava muito feliz\nquando elas gostavam."
10138-400 = "...Foi aí que eu percebi."
10138-410 = "Que mesmo com algo tão pequeno,"
10138-420 = "é possível fazer\nalguém feliz."
10138-430 = "Por isso eu decidi me tornar\numa designer de moda."
10138-440 = "Quando as pessoas gostam das roupas\ne acessórios que eu mesma crio,"
10138-450 = "eu também fico feliz."
10138-460 = "Você entende isso de alguma forma,\nné, Sensei?"
10138-470 = "É por isso que eu acho que você\nse preocupou comigo desse jeito."
10138-480 = "Hã...? Como foi o dia de hoje,\nvocê pergunta...?"
10138-490 = "Grrr! N-não me faça dizer isso!\nSensei bobo!"
10138-2600 = "Não pense que pode me subestimar só porque sou baixinha. Por mais que não pareça, eu sou muito boa em manusear armas! Dá até para desenhar com as marcas dos tiros... é sério, é verdade!"
