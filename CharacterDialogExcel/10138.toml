[translation]
10138-10 = "ふんっ……ブルーアーカイブ！"
10138-20 = "ワイルドハント芸術学院、衣斐レナ。\n見てなさい。オカルトなんて全部インチキだって、\n証明してやるんだから！"
10138-30 = "あの人にはどんな\n服が似合うかな？"
10138-40 = "ここじゃ変なこと\n起きないよね……？\n流石に……。"
10138-50 = "この配置……先生、\nまあまあセンス\nあるじゃん。"
10138-60 = "あのデザイン、\nってオカルトのよね……？\n先生も\n影響されてるのかしら。"
10138-70 = "あ、あっちで変な\n音がしたような……。"
10138-80 = "遅い！！\nずっと待ってたんだけど！？"
10138-90 = "おかえり、先生。\nそれで、何すればいいの？"
10138-100 = "ちゃんと綺麗にしてるんだね。"
10138-110 = "うちの寮は……\n片づけても片づけても\nキリがなくて。"
10138-120 = "はぁ、先輩が余計な\nものを持ち込むから……。"
10138-130 = "部屋割りを確認した日のことは、\n今でも忘れられない……。"
10138-140 = "だって第4寮404号室よ？\nオカルトに興味なくても\n嫌じゃない？"
10138-150 = "なんでオカルトなんて\n信じられるんだろ。"
10138-160 = "あんなの全部科学的に\n証明できるのに。\n……先生もそう思うよね？"
10138-170 = "先生って暇な時何してるの？"
10138-180 = "私？私は色々\n作ってみたりすることかな。"
10138-190 = "よかったら一緒にやってみない？"
10138-200 = "べ、別に何か作ってほしいとか\nそういうのじゃないから！"
10138-210 = "最近変なことばっか\n起こるのよね。"
10138-220 = "先輩たちの言う通り、\n占いで見てもらった\n方がいいのかな……？"
10138-230 = "うぅっ……あんなの信じないって\n決めてるのに！"
10138-240 = "え？先生、\n誕生日なんだ？知らなかった。"
10138-250 = "背中に隠しているもの……？"
10138-260 = "ぷ、プレゼントじゃないよ！？\nたまたま買い物に\n寄っただけだし！"
10138-270 = "今日、先輩が誕生日パーティーを\nしてくれるんだって。"
10138-280 = "先生もおいでよ。\nおいしいもの\nいっぱいあるよ、多分。"
10138-290 = "明けましておめでとう、先生。\n新年だし一緒に\nお願い事でもしてみる？"
10138-300 = "べっ、別にお願い事は\nオカルトじゃないでしょ！"
10138-310 = "私、小さい頃からサンタとか\n信じてなかったんだよね。"
10138-320 = "寝てる時にこっそり\n枕元に来るんだよ？"
10138-330 = "そんなの怖すぎない！？"
10138-340 = "んー……この部屋、もう少し\nハロウィンっぽさがほしいなぁ。"
10138-350 = "あっ……\nオカルトの話じゃなくて！\nデザイン的な話よ！"
10138-370 = "私ね、小さい頃から\n手先が器用だったの。"
10138-380 = "リボンとかを作って、\n友達にあげたりしてた。"
10138-390 = "みんなが喜んでくれると\n嬉しくって。"
10138-400 = "……それで気づいたんだ。"
10138-410 = "こんな小さなものでも、"
10138-420 = "誰かを喜ばせる\nことができるんだ、って。"
10138-430 = "だからファッションデザイナーを\n目指すようになったんだ。"
10138-440 = "自分でデザインした\n服とかアクセサリーとか、"
10138-450 = "みんなが楽しんでくれると\n私も嬉しいから。"
10138-460 = "そういうの、\n先生もなんとなく分かるでしょ？"
10138-470 = "それもあって、こうやって気を\n使ってくれたんだと思ってるし。"
10138-480 = "え……？\n今日どうだったかって……？"
10138-490 = "シャーッ！い、言わせないでよ！\nバカ先生！"
10138-2600 = "ちっちゃいからってバカにしたら\n痛い目見るわよ。こう見えても、\n銃の扱いだって上手なんだから！\n撃った跡で絵が描けるくらい……\nって本当よ！？"
