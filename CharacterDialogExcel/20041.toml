[translation]
20041-10 = "ブルー、アーカイブ。"
20041-20 = "ミレニアムサイエンススクール、\nセミナーの調月リオよ。\n最も合理的な答えを、提示してあげる。"
20041-30 = "合理的な配置を\n追求するなら……。"
20041-40 = "あの置物、実用性が\n欠けていると\n思うのだけれど……"
20041-50 = "カフェインはカプセルで\n摂取すれば良いのでは\nないかしら？"
20041-60 = "最大多数の\n最大幸福……\nここでも\n適用できるかしら。"
20041-70 = "……人混みは\n避けましょう。"
20041-80 = "おかえりなさい、先生。\n私も今到着したところよ。"
20041-90 = "先生が来るタイミングを\n計算していたのだけれど……"
20041-100 = "結果に狂いはないようね。"
20041-110 = "時間通りね、先生。"
20041-120 = "これは今日のスケジュールよ。\n目を通しておいて頂戴。"
20041-130 = "合理を追求することが\n最大効率をもたらすと\n思っているわ。"
20041-140 = "決して、それだけでは\nないのだろうけれど。"
20041-150 = "貴方がそう\n思わせてくれたもの。"
20041-160 = "先生、夜空を見上げた\nことはあるかしら？"
20041-170 = "星の光は、すべて過去から\n届いたものなのよ。"
20041-180 = "つまり――私たちが\n星を目にしている時、"
20041-190 = "「過去」と「現在」を同時に\n捉えている、とも言えるわね。"
20041-200 = "……そこでも、"
20041-210 = "「未来」を観測することは\nできないのだけれども。"
20041-220 = "「未来」というのは\n不確定要素の塊。"
20041-230 = "それを懸念すべきなのか、"
20041-240 = "それとも可能性として\n希望を持つべきなのか……"
20041-250 = "ずっと答えを出せずにいるの。"
20041-260 = "でも……"
20041-270 = "その未来に\n貴方がいるのなら……"
20041-280 = "違う仮説を立てられるかも\nしれないわね。"
20041-290 = "ミレニアムの生徒が\nシャーレを訪問した際は、"
20041-300 = "私にスケジュールを\n共有してちょうだい。"
20041-310 = "頼んだわ。"
20041-320 = "今から散歩……？"
20041-330 = "却下。非合理的な行動よ。"
20041-340 = "それに、危険だわ。"
20041-350 = "私から離れないで。\nこれからも\nずっと隣にいなさい。"
20041-360 = "わ、私……何か不適切な\nことを、言ったかしら……？"
20041-370 = "貴方という可能性が\n世界に生まれ落ちた記念日ね。\n…お誕生日、おめでとう先生。"
20041-380 = "誕生日……これまであまり、\n馴染みがなかったの。"
20041-390 = "でも……\nこういう気持ちになるのね。"
20041-400 = "……お礼をいうわ。先生。"
20041-410 = "「一年がはじまる」という\n概念そのものが非合理的よ。"
20041-420 = "季節が一巡しただけに\n過ぎないわ。"
20041-430 = "……でも、社会的な規範意識を\n無視できないのも、\n理解はできる。"
20041-440 = "……新年、\n明けましておめでとう、先生。"
20041-450 = "……理解できないわ。\nクリスマス？\n記念日って、一体……"
20041-460 = "プレゼント……？私に……？"
20041-470 = "その、ありがとう、先生。"
20041-480 = "……全く、ロジックが\n分からないのだけれども。\n好意は受け取っておくわ。"
20041-490 = "仮装をして飴を\n要求するなんて……"
20041-500 = "未だに\n理解できないのだけれど……"
20041-510 = "先生が相手なら……\nいいかしら……？"
20041-520 = "トリックオアトリート"
20041-530 = "……ふふっ。"
20041-550 = "こういう事をさせるために、\n貴方を呼んだわけじゃ、\nないのだけれど……"
20041-560 = "自分でやるわ。\n先生は座っていてちょうだい。"
20041-570 = "あ、貴方はもう少し、\n先生としての自覚を持ちなさい。"
20041-580 = "こんなことで時間を\n浪費するなんて非合理的よ。"
20041-590 = "他にもっと重要な\n仕事があるでしょう？"
20041-600 = "ッ……！な、なにを……"
20041-610 = "私の「お世話」……！？"
20041-620 = "り……理解に苦しむわ……\nでも……"
20041-630 = "……貴方は、\nそういう人だったわね。"
20041-640 = "……分かったわ。"
20041-650 = "最後まで受け止めましょう。"
20041-660 = "貴方がする……\n「お世話」とやらを。"
20041-2600 = "射撃は不得手だけれど……\n自分の身程度は守ってみせるわ。\nそれから……先生、貴方のことも。"
