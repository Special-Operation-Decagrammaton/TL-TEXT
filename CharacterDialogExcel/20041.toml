[translation]
20041-10 = "Blue Archive."
20041-20 = "Sou, do Seminário da Millennium Science School. Vou lhe apresentar a resposta mais racional."
20041-30 = "Se buscamos uma disposição racional..."
20041-40 = "Aquele enfeite... acho que falta praticidade nele..."
20041-50 = "Não seria melhor ingerir cafeína em cápsulas?"
20041-60 = "A maior felicidade para o maior número de pessoas... será que isso se aplica aqui também?"
20041-70 = "...Vamos evitar multidões."
20041-80 = "Bem-vindo de volta, Sensei. Eu também acabei de chegar."
20041-90 = "Eu calculei o momento exato da sua chegada, mas..."
20041-100 = "Parece que não houve erros no resultado."
20041-110 = "Pontual, Sensei."
20041-120 = "Este é o cronograma de hoje. Dê uma olhada, por favor."
20041-130 = "Acredito que buscar a racionalidade traz a máxima eficiência."
20041-140 = "Embora, certamente, não seja apenas isso."
20041-150 = "Foi você quem me fez pensar assim."
20041-160 = "Sensei, você já olhou para o céu noturno?"
20041-170 = "A luz das estrelas chegou até nós vinda do passado."
20041-180 = "Ou seja — quando olhamos para as estrelas,"
20041-190 = "podemos dizer que estamos observando o 'passado' e o 'presente' ao mesmo tempo."
20041-200 = "...Mesmo assim,"
20041-210 = "não é possível observar o 'futuro'."
20041-220 = "O 'futuro' é um amontoado de elementos incertos."
20041-230 = "Deveríamos nos preocupar com isso,"
20041-240 = "ou deveríamos ter esperança como uma possibilidade..."
20041-250 = "Nunca consegui chegar a uma resposta."
20041-260 = "Mas..."
20041-270 = "se você estiver nesse futuro..."
20041-280 = "talvez eu consiga formular uma hipótese diferente."
20041-290 = "Quando um aluno da Millennium visitar o Schale,"
20041-300 = "compartilhe o cronograma comigo."
20041-310 = "Conto com você."
20041-320 = "Um passeio agora...?"
20041-330 = "Rejeitado. É uma ação irracional."
20041-340 = "Além disso, é perigoso."
20041-350 = "Não se afaste de mim. Fique ao meu lado para sempre, a partir de agora."
20041-360 = "E-eu... disse algo inapropriado...?"
20041-370 = "É o aniversário do dia em que a possibilidade chamada 'você' nasceu no mundo. ...Feliz aniversário, Sensei."
20041-380 = "Aniversário... até agora, não era algo com que eu estivesse acostumada."
20041-390 = "Mas... é assim que se sente, então."
20041-400 = "...Agradeço, Sensei."
20041-410 = "O conceito de que 'um ano começa' é, por si só, irracional."
20041-420 = "É apenas o ciclo das estações se completando."
20041-430 = "...Mas entendo que não se pode ignorar as normas sociais."
20041-440 = "...Feliz Ano Novo, Sensei."
20041-450 = "...Não consigo entender. Natal? O que é, afinal, um dia comemorativo..."
20041-460 = "Um presente...? Para mim...?"
20041-470 = "Bem, obrigada, Sensei."
20041-480 = "...Eu não entendo a lógica por trás disso, mas aceitarei sua gentileza."
20041-490 = "Se fantasiar e exigir doces..."
20041-500 = "Ainda não consigo entender, mas..."
20041-510 = "Se for com o Sensei...\nAcho que tudo bem...?"
20041-520 = "Doces ou travessuras."
20041-530 = "......Fufu."
20041-550 = "Não foi para fazer esse tipo de coisa\nque eu chamei você aqui, mas..."
20041-560 = "Eu mesma farei.\nSensei, apenas sente-se aí."
20041-570 = "Ah, você deveria ter um pouco mais\nde consciência como Sensei."
20041-580 = "Desperdiçar tempo com algo assim\né irracional."
20041-590 = "Não existem outros trabalhos\nmais importantes?"
20041-600 = "T...! O, o que você está..."
20041-610 = "Cuidar de mim...!?"
20041-620 = "É... difícil de entender...\nMas..."
20041-630 = "......Você sempre foi\nesse tipo de pessoa, não é."
20041-640 = "......Entendido."
20041-650 = "Vou aceitar até o fim."
20041-660 = "Esse tal de \"cuidar de mim\"\nque você quer fazer."
20041-2600 = "Eu não sou boa com tiro, mas...\nPelo menos conseguirei proteger a mim mesma.\nE também... Sensei, protegerei você."
