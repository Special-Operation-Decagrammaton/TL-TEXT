[translation]
10081-10 = "Blue Archive, é isso aí!"
10081-20 = "Eu me chamo Yukari Kadenokouji!\nComo um membro orgulhoso da Hyakkiyako, farei o meu melhor, de corpo e alma, pelo Sensei!"
10081-30 = "Hum, hum, entendo.\nEntão este é o Schale...!\n...Um lugar cheio de charme, não é mesmo!"
10081-40 = "Eu estava treinando desde o amanhecer, mas...\nUaaah, o sono está me vencendo."
10081-50 = "(Sinto uma presença que não é comum...\nSerá que o Schale é, na verdade, um covil de demônios?!)"
10081-60 = "Muito bem.\nComo membro da Hyakkiyako, preciso ser um exemplo para todos..."
10081-70 = "Fu-fu-fu~♪\nA marcha triunfal da Yukari começou~!"
10081-80 = "Fu-fu! Seja bem-vindo, Sensei!\nEstou perfeitamente preparada para o trabalho!"
10081-90 = "Vamos, por favor!\nSente-se!"
10081-100 = "Sim! Eu estava esperando por este momento!"
10081-110 = "Conto com você para o dia de hoje também, Sensei!"
10081-120 = "Hum, hum, entendo. Então o trabalho no Schale é assim.\nEstou aprendendo muito!"
10081-130 = "As tarefas da Hyakkiyako e o trabalho de plantão.\nAmbos são trabalhos árduos, mas..."
10081-140 = "Eu farei tudo com perfeição!\nSim! Afinal, eu sou uma elite da Hyakkiyako!"
10081-150 = "Fu-fu-fu~♪\nA invencível Hyakkiyako~\nA lenda da Yukari está apenas começando~!"
10081-160 = "Sim, Sensei! Se precisar de mim, não hesite em chamar, a qualquer hora!"
10081-170 = "Bem, o que faremos quando o trabalho de hoje terminar?"
10081-180 = "Vamos à loja de doces?\nOu bater um recorde no fliperama?"
10081-190 = "Hmm, estou em dúvida sobre qual escolher."
10081-200 = "Feliz aniversário!\nParabéns pelo seu dia, Sensei!"
10081-210 = "Estou feliz por poder compartilhar um dia tão especial como este.\nEu, Yukari Kadenokouji, farei deste o melhor aniversário de todos!"
10081-220 = "Então, primeiro, vamos começar criando uma lista de desejos...!"
10081-230 = "...Eh? Mais do que isso, criar memórias comigo já é o suficiente...?"
10081-240 = "Au... M-mas isso acaba sendo um desafio ainda maior, eu acho..."
10081-250 = "C-claro, não é que eu não goste, mas..."
10081-260 = "Ah, é que... você não esqueceu do dia do meu nascimento... e só de receber seus parabéns, Sensei..."
10081-270 = "Eu... acabei abrindo um sorriso sem querer..."
10081-280 = "Percebi novamente que a felicidade está mais perto do que eu pensava..."
10081-290 = "Feliz Ano Novo!\nDesejo a você um próspero ano novo, Sensei!"
10081-300 = "Não sou só eu que estou empolgada com a virada do ano, certo?"
10081-310 = "Por isso, por favor... para que nada de ruim aconteça...\nVamos patrulhar a cidade juntos esta noite!"
10081-320 = "Feliz Natal! Sensei!"
10081-330 = "Acabei de convidar a Renge-senpai, a Kikyou-senpai... e a Nagusa-senpai também!"
10081-340 = "Por favor, venha comer o yokan de Natal com a gente da Hyakkiyako!"
10081-350 = "Fu-fu! Com certeza será um momento muito divertido!"
10081-360 = "Eu saí agora pouco e levei um susto!"
10081-370 = "A cidade estava cheia de monstros e demônios... O que aconteceu aqui?!"
10081-380 = "Eh? Halloween? Um evento para se divertir fantasiado de fantasma?"
10081-390 = "Sensei, você está brincando demais! O Setsubun ainda está longe! Tentar me enganar assim, que gracinha!"
10081-410 = "Ufufu, aqui, estou aqui, Sensei."
10081-420 = "Está tudo bem, não esperei tanto assim."
10081-430 = "Foi apenas uma hora antes do horário combinado, só isso."
10081-440 = "Não, não tem um motivo especial, é só que..."
10081-450 = "Pensar em para onde iríamos hoje, o que faríamos, se você me ensinaria algo novo..."
10081-460 = "Quando comecei a pensar nisso, não consegui ficar parada..."
10081-470 = "Ah, mas quero que saiba que eu gosto desse tempo de espera."
10081-480 = "Se for para estar com o Sensei, até o tempo de espera se torna um momento maravilhoso que faz meu coração disparar."
10081-490 = "Bem, não podemos ficar parados aqui!"
10081-500 = "Fu-fu! Hoje também, por favor, me mostre este mundo brilhante e belo! Sensei!"
10081-2600 = "Eh? Isso é para mim...? É um símbolo de confiança...? Então é uma prova disso!? Se for assim, continuarei deixando minha marca na história para não decepcionar o Sensei!"
