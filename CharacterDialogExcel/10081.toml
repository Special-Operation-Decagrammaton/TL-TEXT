[translation]
10081-10 = "ぶる～～あーかいぶ、ですの！"
10081-20 = "身共は勘解由小路ユカリと申します！\n誇り高き百花繚乱の一員として……\n先生のために、誠心誠意努めてまいりましょう！"
10081-30 = "ふむふむなるほど、\nここがしゃーれ……！\n……趣のある\nところですね！"
10081-40 = "早朝から鍛錬を\nしていたのですが……\nふわぁ、眠気が\n襲ってきますの。"
10081-50 = "(何やら、只者ではない\n気配が……しゃーれは、\n実は伏魔殿だったのかも\nしれませんの！)"
10081-60 = "さてと。\n百花繚乱として、\n皆様の手本に\nなりませんと……"
10081-70 = "ふっふん～ふん～♪\nユカリ快進撃\nですの～！"
10081-80 = "ふふっ！\nいらっしゃいまし、先生！\n御勤めの準備はぱーふぇくとに\n整っておりますのよ！"
10081-90 = "さあ、どうぞ！\nおかけくださいまし！"
10081-100 = "ええ！身共は、\nこの時を\nお待ちしておりましたわ！"
10081-110 = "本日も一日、\nよろしくお願い致しますね、\n先生！"
10081-120 = "ふむ、ふむ、なるほど。\nしゃーれの御勤めとは\nこのようなものなのですね。\n学ばせていただいておりますわ！"
10081-130 = "百花繚乱の業務と当番業務。\nどれも大変な御勤めでは\nございますが……。"
10081-140 = "身共はすべて完璧に\nこなしてみせましょう！\nええ！ 身共、百花繚乱\nえりーとですもの！"
10081-150 = "ふっふん～ふん～♪ \n無敵の百花繚乱～\nユカリ伝説は\n始まったばかり～ですの♪"
10081-160 = "はい、先生！身共に御用が\nございましたら、何時なんどきで\nあろうとも遠慮なく\nお申し付けくださいまし！"
10081-170 = "さて、本日の御勤めが\n終わったら如何いたしましょう？"
10081-180 = "駄菓子屋に参ります？\nそれとも、げーむせんたぁで\n記録更新？"
10081-190 = "うーん、どれにするか\n悩んでしまいます。"
10081-200 = "はっぴーばーすでー！\nお誕生日、おめでとう\nございます！先生！"
10081-210 = "このようなめでたい日を共に\nすることができて幸せです。\n身共、勘解由小路ユカリが\n最高の誕生日にいたしますわね！"
10081-220 = "それではまず、\nうぃっしゅりすとの\n作成から……！"
10081-230 = "……え？ そんなことよりも、\n身共と思い出が\n作れたら十分……？"
10081-240 = "あう……。む、むしろ……\nより難問になってしまったような\n気がいたしますわ……。"
10081-250 = "も、もちろん、\n嫌では、ありませんが……。"
10081-260 = "あっ、その……身共の生誕の日を\n忘れずにいて下さって……先生に\n言祝いでいただけただけで……"
10081-270 = "その……思わず、\n口元が緩んでしまい……。"
10081-280 = "幸福とは、思ったより\n近くにあるのだと改めて\n実感しましたわ……。"
10081-290 = "はっぴ～にゅ～いや～！\n謹んで新春の\nお慶びを申し上げますわ！先生！"
10081-300 = "年が明けて\nわくわくしているのは、\nきっと身共だけでは\nありませんよね！"
10081-310 = "ですから、どうか……\n悪しき事が起こらぬように……。\n今夜も一緒に町を\n巡回いたしましょう！"
10081-320 = "めり～くりすま～す！\nですわ！先生！"
10081-330 = "先程、レンゲ先輩、\nキキョウ先輩……、\nそしてナグサ先輩にも\n声をかけたところですの！"
10081-340 = "ぜひ先生も百花繚乱で\nくりすま～す羊羹を\n召し上がって行ってください！"
10081-350 = "ふふっ！きっと！\nとても楽しい時間になりますわ！"
10081-360 = "身共、先ほど出かけて\nびっくりしてしまいましたの！"
10081-370 = "街中に魑魅魍魎が溢れていて……\n一体何があったの！\nと思いまして！"
10081-380 = "え？はろうぃーん？お化けの\n仮装をして楽しむ行事、ですの？"
10081-390 = "先生も冗談が過ぎますわよ！\n節分はまだ先ですのに！\n身共を騙そうとするなんて、\nお可愛いこと！"
10081-410 = "うふふっ、ここです、\n身共はここにおりますわ、先生。"
10081-420 = "大丈夫です、\nそれほど待っておりませんの。"
10081-430 = "約束の時刻より、\nほんの1時間ほど\n早く足を運んでしまった\nだけですから。"
10081-440 = "いえ、何か特別な\n理由があるわけではなく、\nただ……。"
10081-450 = "本日はどこへ足を運ぼうか、\n何をしようか、また新しい事を\nご教示いただけるだろうか……"
10081-460 = "そんなふうに考え始めたら、\nいても立っても\nいられなくなってしまって……。"
10081-470 = "あ、申し上げておきますが、\n身共はこうして待っている\n時間というのも好きなのですよ？"
10081-480 = "先生と共に在れるのであれば、\n待ち時間さえも鼓動高鳴る\nすてきなひと時となりますから。"
10081-490 = "さ、こうしている\n場合じゃありませんの！"
10081-500 = "ふふっ！本日も身共に、\n眩く美しい世界を\n教えてくださいまし！先生！"
10081-2600 = "えっ？ これを、身共に……？これは\n信頼の象徴である、と……？その証と\nいうことなのですね！？それであれば、\n身共は、先生を失望させないように\nこれからも伝説を残していく所存ですわ！"
