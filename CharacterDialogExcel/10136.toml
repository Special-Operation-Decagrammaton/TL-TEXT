[translation]
10136-10 = "Blue Archive."
10136-20 = "Nestas condições... eu também preciso trocar de roupa, né.\nO que acha, Sensei? Estou bem assim?"
10136-30 = "Ugh... estou precisando\nde cafeína."
10136-40 = "Da próxima vez, quero vir\ncom você, Sensei."
10136-50 = "Vou descansar um pouco ali..."
10136-60 = "Esta mochila\nestá meio quente..."
10136-70 = "Que paz..."
10136-80 = "Eu vi você chegando pelo\nmeu visor.\nConto com você hoje também."
10136-90 = "Quer um café quente?\nO meu é gelado, então\nnão se confunda."
10136-100 = "Se eu estou com calor?\nHmm, não sei.\nAcho que ainda estou bem."
10136-110 = "Bem, mesmo que esteja calor,\nse eu puder ficar com você, Sensei..."
10136-120 = "Acho que consigo\nsuportar qualquer coisa."
10136-130 = "Queria que me chamasse mais para o serviço."
10136-140 = "Pela minha eficiência também."
10136-150 = "Hmm, não é que estudar no Schale\nseja necessariamente mais produtivo, mas..."
10136-160 = "Eu só quero ficar ao seu lado, Sensei."
10136-170 = "Pronto, Sensei, terminei."
10136-180 = "Hehe,\nterminei rápido, não acha?"
10136-190 = "Será que existe outra aluna\ntão competente quanto eu?\nO que você acha, Sensei?"
10136-200 = "Você sempre diz que eu deveria\npensar nos sentimentos dos outros\nao falar, não é?"
10136-210 = "Eu achava que isso\nera ineficiente."
10136-220 = "Agora... talvez eu tenha começado\na entender o motivo."
10136-230 = "Porque eu me importo com o que você sente,\ncom o que você está pensando,\nSensei."
10136-240 = "Você sempre me diz para"
10136-250 = "me dar bem com todo mundo, mas..."
10136-260 = "...sinceramente, que trabalhão."
10136-270 = "Só de ter você, Sensei, já é o suficiente."
10136-280 = "Eu não esqueci.\nHoje é o seu aniversário, né, Sensei?"
10136-290 = "Já garanti a segurança\nda área, então—"
10136-300 = "Se quiser, podemos sair?"
10136-310 = "Só nós dois, claro."
10136-320 = "Obrigada por comemorar\no meu aniversário."
10136-330 = "Hm? O que eu quero de presente?"
10136-340 = "Não precisa, eu já ganhei."
10136-350 = "O presente de ter você, Sensei."
10136-360 = "Ano Novo..."
10136-370 = "Antigamente, eu só pensava\nque era apenas mais um dia\ndentre os 365."
10136-380 = "Agora, talvez seja um pouco diferente."
10136-390 = "Hehe, feliz ano novo, Sensei."
10136-400 = "Eu gosto do Natal."
10136-410 = "Porque é fresco."
10136-420 = "Hã? Existe Natal\nque não é fresco...?\nIsso seria terrível."
10136-430 = "Eu costumava pensar no Halloween\napenas como um dia para\nconsumir calorias rapidamente."
10136-440 = "Mas desta vez, acho que vou\naproveitar o evento de verdade."
10136-450 = "Claro, vou fazer travessuras\ne pedir doces também.\nNão pretendo me segurar."
10136-470 = "Bem-vindo, Sensei."
10136-480 = "O céu está estranho, não é?"
10136-490 = "Parece com o céu noturno\nque conhecemos, mas..."
10136-500 = "Se olhar bem, é completamente diferente."
10136-510 = "É como eu agora."
10136-520 = "Eu nunca tinha parado\npara olhar para cima\ndesse jeito antes, mas..."
10136-530 = "Ultimamente, eu gosto disso."
10136-540 = "Mas por que será?"
10136-550 = "Toda vez que olho para cima,\no rosto do Sensei vem à minha mente."
10136-560 = "Hehe, por que será, né?"
10136-570 = "Sensei."
10136-580 = "Eu estou muito feliz\npor ter conhecido você, Sensei."
10136-590 = "Sim, de verdade.\nEu realmente sinto isso."
10136-2600 = "É a primeira vez que vejo uma arma com esse formato,\nmas... para o bem da missão,\nvou aprender a usá-la rapidamente.\n...Pelo bem do Sensei também."
