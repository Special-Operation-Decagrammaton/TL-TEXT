[translation]
10125-10 = "にゅっふっふ～……ブルーアーカイブ！"
10125-20 = "ワイルドハント芸術学院、オカルト研究会の白尾エリと\n申します。世界は魔法に満ちているんです。\nそう、この出会いのように！"
10125-30 = "どこかで\nポルターガイストでも\n起きないかな……。"
10125-40 = "にゅふ……\n新しい魔法が\n思い浮かびそう……。"
10125-50 = "むむっ……\n濃厚なマナを\n感知しましたよ。"
10125-60 = "にゅっふっふ……\nお出かけは\nワクワクしますね！"
10125-70 = "ここを\nアトリエにしたら……\n傑作が\n生まれるかも……！"
10125-80 = "お待ちしておりました、\nマスター！"
10125-90 = "今日も魔法の研究に\n励みましょう！"
10125-100 = "お、マスター！"
10125-110 = "ちょうど、\n「運命の輪」のカードを\n引いたところだったんです！"
10125-120 = "魔法のような一日に\nなりそうですね、マスター！"
10125-130 = "昨日、学院の新たなオカルト話を\n入手したんです！"
10125-140 = "にゅふふ～、気になります？\nやっぱり、マスターも\n「こっち側」ですね！"
10125-150 = "あ、マスター！\nちょうど、オフィスの床に\n魔方陣を描いていたんです。"
10125-160 = "ご安心を！\n爆発魔法ではありませんから。\nにゅふふっ。"
10125-170 = "マスター、知ってますか？"
10125-180 = "銃を撃ちながら、\n強化魔法を唱えると……"
10125-190 = "威力が増すんです！"
10125-200 = "いつか私も、\n「創世の影像」のような傑作を\n生み出してみせます……！"
10125-210 = "マスター、\n私の芸術活動、\n見守っていてくださいね！"
10125-220 = "お誕生日おめでとうございます、\nマスター！"
10125-230 = "マスターの肖像画、\nこちらに飾っておきますね！"
10125-240 = "嬉しいですか？\nそうでしょうとも！"
10125-250 = "今日ほど特別な日もありません。\nなんと私の誕生日にして……"
10125-260 = "ハロウィン！なんです！"
10125-270 = "この二つの交差……\nまさに運命ですよね？\nにゅふふっ！"
10125-280 = "新年ですね……。"
10125-290 = "今年も、\n魔法に満ちた一年に\nなりますように！"
10125-300 = "クリスマスは、\n大切な方と過ごす日……。"
10125-310 = "マスター、\nそれほど私の魔法に夢中とは！\n嬉しいです！"
10125-320 = "今日は街中が\n魔力でいっぱいです！"
10125-330 = "さて、どんなイタズラを\nしましょうか……にゅふふ。"
10125-350 = "……はじめて絵を描いた日を、\n思い出します。"
10125-360 = "あのときは……\nまっすぐ、純粋に、"
10125-370 = "キャンバスと\n向き合っていました。"
10125-380 = "今の私は……違います。"
10125-390 = "何を描けばいいのか\n分からなくなって、\n自信を失ってしまって……。"
10125-400 = "そんなとき、\nマスターが教えてくれたんです。"
10125-410 = "「夢」という魔法は、\nもう心の中に宿ってるって。"
10125-420 = "夢があるなら……これからは、\n道に迷わずに済みそうです。"
10125-430 = "マスター……\nよければ、私と同じ道を\n歩みませんか？"
10125-440 = "色とりどりの夢でいっぱいの、\n魔法の道を！"
10125-2600 = "にゅふふふ、\n私専用の魔法の杖！\n完璧な魔法で、期待にお応えしますとも！"
