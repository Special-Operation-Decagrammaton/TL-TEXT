[translation]
10125-10 = "Nyu-fu-fu... Blue Archive!"
10125-20 = "Meu nome é Eri Shirao, do Clube de Pesquisa Oculta da Academia de Artes Wildhunt. O mundo está repleto de magia. Sim, exatamente como este nosso encontro!"
10125-30 = "Será que não vai rolar um poltergeist em algum lugar...?"
10125-40 = "Nyu-fu... Sinto que uma nova magia está prestes a surgir..."
10125-50 = "Mumu... Detectei uma mana muito densa por aqui."
10125-60 = "Nyu-fu-fu... Sair para passear é tão empolgante!"
10125-70 = "Se eu transformar este lugar em um ateliê... talvez eu crie uma obra-prima...!"
10125-80 = "Estava à sua espera, Mestre!"
10125-90 = "Vamos nos dedicar aos estudos de magia hoje também!"
10125-100 = "Oh, Mestre!"
10125-110 = "Eu estava justamente tirando uma carta da 'Roda da Fortuna'!"
10125-120 = "Parece que teremos um dia mágico, Mestre!"
10125-130 = "Ontem, descobri um novo conto oculto da academia!"
10125-140 = "Nyu-fu-fu, ficou curioso? Sabia que você também é do 'nosso lado', Mestre!"
10125-150 = "Ah, Mestre! Eu estava justamente desenhando um círculo mágico no chão do escritório."
10125-160 = "Pode ficar tranquilo! Não é uma magia explosiva. Nyu-fu-fu."
10125-170 = "Mestre, sabia de uma coisa?"
10125-180 = "Se você conjurar uma magia de fortalecimento enquanto dispara sua arma..."
10125-190 = "O poder aumenta!"
10125-200 = "Um dia, eu também criarei uma obra-prima como a 'Imagem da Gênese'...!"
10125-210 = "Mestre, continue observando minhas atividades artísticas, está bem?"
10125-220 = "Feliz aniversário, Mestre!"
10125-230 = "Vou deixar o retrato do Mestre pendurado bem aqui!"
10125-240 = "Está feliz? Eu sabia que ficaria!"
10125-250 = "Não existe dia mais especial do que hoje. Afinal, é o meu aniversário e..."
10125-260 = "É Halloween!"
10125-270 = "O cruzamento dessas duas datas... é puro destino, não é? Nyu-fu-fu!"
10125-280 = "Ano Novo, hein..."
10125-290 = "Que este ano também seja repleto de magia!"
10125-300 = "O Natal é um dia para passar com quem amamos..."
10125-310 = "Mestre, você está tão fascinado pela minha magia! Fico feliz!"
10125-320 = "Hoje, a cidade inteira está cheia de poder mágico!"
10125-330 = "Bem, que tipo de travessura vamos fazer... Nyu-fu-fu."
10125-350 = "...Lembro-me do dia em que pintei pela primeira vez."
10125-360 = "Naquela época... eu estava focada,"
10125-370 = "encarando a tela de forma pura e direta."
10125-380 = "A Eri de hoje... é diferente."
10125-390 = "Eu não sabia mais o que pintar, perdi a confiança..."
10125-400 = "Foi então que o Mestre me ensinou."
10125-410 = "Que a magia chamada 'sonho' já habita dentro do meu coração."
10125-420 = "Se eu tenho um sonho... de agora em diante, não precisarei mais me perder no caminho."
10125-430 = "Mestre... se quiser, por que não caminha pelo mesmo caminho que eu?"
10125-440 = "Um caminho mágico, repleto de sonhos coloridos!"
10125-2600 = "Nyu-fu-fu, minha varinha mágica exclusiva! Com uma magia perfeita, atenderei às suas expectativas!"
