[translation]
10036-10 = "B-Blue Archive……！"
10036-20 = "M-me chamo Wakaba Hinata……\nMuito prazer……"
10036-30 = "E-eu não sei bem……\nEstou me sentindo um pouco\nnervosa……"
10036-40 = "Incrível,\ntantas coisas……"
10036-50 = "A-às vezes, é bom relaxar\num pouco em lugares\nassim, não é……?"
10036-60 = "Nnn, estou cansada……"
10036-70 = "S-será que tudo bem\nficar relaxando\nassim……?"
10036-80 = "Ah, bem-vindo de volta, Sensei!\nQue o seu dia de hoje\nseja tranquilo……!"
10036-90 = "Bom trabalho, Sensei!\nEu estava justamente terminando\nde organizar as coisas por aqui……!"
10036-100 = "Na verdade, eu adoro\nser útil para alguém……!"
10036-110 = "M-mas, será que eu……\nestou sendo realmente útil\npara o Sensei……?"
10036-120 = "Eu sempre acabo\ncometendo erros……"
10036-130 = "Mesmo tendo sido encarregada\nda gestão de várias coisas……"
10036-140 = "P-por favor, deixe-me fazer qualquer coisa!\nEu vou me esforçar ao máximo, então……!"
10036-150 = "Ultimamente, parece que estão\nespalhando uns boatos estranhos\nsobre mim, não é……?"
10036-160 = "Mesmo perguntando para as\noutras integrantes da Sisterhood,\nelas não me contam nada……"
10036-170 = "Se precisar carregar bagagens ou organizar algo,\npode deixar comigo……!"
10036-180 = "Apesar da aparência,\neu sou a responsável pela gestão!"
10036-190 = "Sensei, feliz\naniversário!"
10036-200 = "Para mim, hoje também é\num dia muito especial e importante!"
10036-210 = "S-Sensei…… é que,\nbem…… na verdade……"
10036-220 = "H-hoje é o meu\naniversário……!\nEntão, hoje…… bem,"
10036-230 = "você poderia ficar\nao meu lado……!?"
10036-240 = "Ano novo, não é……"
10036-250 = "Espero que este ano eu consiga\nmostrar uma versão mais digna\nde mim para o Sensei……!"
10036-260 = "Hoje é o festival de Natal……!"
10036-270 = "Embora eu ainda tenha muito a melhorar,\neu também sou um membro da Sisterhood."
10036-280 = "Por favor, deixe-me rezar\npelo Sensei hoje."
10036-290 = "Ah, hoje é\nHalloween……?"
10036-300 = "Por isso que tem tanta gente\nvestida de formas diferentes lá fora……"
10036-310 = "……Ah. S-só para garantir, isso aqui\nnão é uma fantasia, é o meu\nvisual de sempre, viu……!?"
10036-330 = "Isso……\nme desculpe, Sensei."
10036-340 = "Acabei causando\ntranstornos a você……"
10036-350 = "Eu achei que não fosse\nnada demais, mas……"
10036-360 = "Mesmo me orgulhando de ter um corpo resistente,\nque vergonha……"
10036-370 = "Como você disse,\nvou descansar um pouco."
10036-380 = "E, hum…… enquanto isso,\nvocê poderia ficar comigo?"
10036-390 = "Assim, eu me sinto\nmuito mais tranquila……"
10036-400 = "Sim, obrigada."
10036-410 = "……O Sensei é muito gentil."
10036-2600 = "V-você deposita tanta expectativa em mim…….\n……Estou feliz.\nVou me esforçar para corresponder às suas expectativas……!"
