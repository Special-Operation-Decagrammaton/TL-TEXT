[translation]
10036-10 = "ぶ、ブルーアーカイブ……！"
10036-20 = "わ、若葉ヒナタと申します……\nよろしくお願いします……"
10036-30 = "な、何だかその……\n緊張、してしまい\nますね……。"
10036-40 = "すごい、\n色んな物が……。"
10036-50 = "た、たまにはこういう\nところで、ゆっくりして\nても良いですよね……？"
10036-60 = "んん、疲れた……。"
10036-70 = "こ、こんなに\nゆっくりしてて\n良いんでしょうか……？"
10036-80 = "あ、お帰りなさいませ、先生！\n今日もどうか、安らかな\n一日になりますように……！"
10036-90 = "お疲れ様です、先生！\nちょうどこの辺りのお片づけを\n終えたところでして……！"
10036-100 = "実は私、誰かのお役に立てるのが\nすっごく好きでして……！"
10036-110 = "で、ですがその、私は……\nきちんと先生のお役に、\n立てていますでしょうか……？"
10036-120 = "私、いっつもミスして\nばかりで……。"
10036-130 = "せっかく、諸々の管理を担当\nさせてもらっているのに……。"
10036-140 = "ぜ、ぜひ何でもやらせて\nください！とりあえず、\n頑張りますので……！"
10036-150 = "何だか最近、私のことに\nついて色々と変な噂が\n流れているとか……？"
10036-160 = "シスターフッドの\nみなさんに聞いても、\n教えてくださらなくて……。"
10036-170 = "荷物運びや片付けなど、\nそういったことでしたらぜひ\n私にお任せください……！"
10036-180 = "こう見えても、\n管理担当ですので！"
10036-190 = "先生、お誕生日\nおめでとうございます！"
10036-200 = "私にとっても今日は、\nすっごく特別で大切な日です！"
10036-210 = "せ、先生……その、\nえっと……実は……。"
10036-220 = "きょ、今日、\n私の誕生日、でして……！\nえっと、なので今日は……その、"
10036-230 = "ずっとそばに\nいてくださいませんか……！？"
10036-240 = "新年、ですね……"
10036-250 = "今年はもっと、\n先生に立派な姿を\n見せられますように……！"
10036-260 = "今日は聖誕祭ですね……！"
10036-270 = "至らぬ点ばかりではありますが、\n私もシスターフッドの一員です。"
10036-280 = "ぜひ今日は、\n先生のために祈らせてください。"
10036-290 = "あ、今日は\nハロウィーンでしたか……？"
10036-300 = "それで、先ほどから外で\n色んな格好の方が……。"
10036-310 = "……あ。ね、念のためですが、\n私のこれは仮装ではなく、\nいつもの格好ですからね……！？"
10036-330 = "その……\nすみませんでした、先生。"
10036-340 = "何だか、ご迷惑を\nおかけしてしまって……。"
10036-350 = "大したことないのではと、\n思っていたのですが……。"
10036-360 = "丈夫な身体が自慢でしたのに、\n面目ないです……。"
10036-370 = "仰る通り、\n少し休もうと思います。"
10036-380 = "それで、あの……その間、\n一緒にいていただけませんか？"
10036-390 = "その方が、\n気持ちもずっと楽で……"
10036-400 = "はい、ありがとうございます。"
10036-410 = "……先生は、優しいですね。"
10036-2600 = "こ、ここまで期待してくださるなんて……。\n……嬉しいです。\n頑張って、期待にお応えしてみせます……！"
