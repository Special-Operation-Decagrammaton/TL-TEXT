[translation]
20026-10 = "ブルー、アーカイブ。"
20026-20 = "土木、建設、撤去……\n工務が必要なときは、いつでも呼んでくれ。\n革命とストライキなら……なお歓迎だ！"
20026-30 = "現場の最重要項目は、\n一に安全、\n二に安全だ。"
20026-40 = "ここの建築様式は……\n……悪くないとだけ\n言っておこう。"
20026-50 = "あたしたち工務部の\n手にかかれば、\nこの程度……"
20026-60 = "週3日労働……\nなんて美しい響き……"
20026-70 = "ここのプリンは……\n事務局から\n普及されるものとは\n違うように思うな。"
20026-80 = "さあ、今日も安全第一！"
20026-90 = "シャーレ無事故\n新記録を目指そうではないか！"
20026-100 = "……遅刻ではないか。\nサボタージュか？"
20026-110 = "シャーレの先生が\nサボタージュすることが"
20026-120 = "一体なんの証明になるのか、\nあたしには理解できないが……。"
20026-130 = "安全、よし！確認、よし！\n無事故、よし！"
20026-140 = "プリンなら何を混ぜても好きだ。"
20026-150 = "カスタードクリームでも、\nチョコレートでも、\nフルーツでも……"
20026-160 = "……水を混ぜた\nプリンは除くがな。"
20026-170 = "（次回のクーデターの名目は、\n何にしようかな……？）"
20026-180 = "先生、夜勤の\n頻度が高いのでは……？"
20026-190 = "時間外手当は\nきちんと受け取っているのか？"
20026-200 = "先輩は今頃\nどうしているのだろう……？"
20026-210 = "元気にしているといいのだが。"
20026-220 = "おめでとう、先生。"
20026-230 = "今日は、あなたと言う\nもう一人の同志の生誕を\n祝おうじゃないか。"
20026-240 = "ふふ……先生、\n今日がなんの日か、分かるか？"
20026-250 = "そうだとも。市民が自由を求めて\n武器を手にし、"
20026-260 = "勇敢に立ち上がった\n偉大なる記念日……！"
20026-270 = "ん……\nあたしの誕生日……？"
20026-280 = "……あ、忘れてた。"
20026-290 = "今年こそ\nレッドウィンター連邦学園の\n事務局を占拠し、"
20026-300 = "労働者にとっての地上の楽園が\n築けますように……！"
20026-310 = "良い子にしかプレゼントを\n配給しないだなんて……。"
20026-320 = "サンタクロースめ、やつは\n悪辣なブルジョワに違いない。"
20026-330 = "過去に、ハロウィン限定の\nカボチャ混ぜプリンを\n食べたことがあったが……"
20026-340 = "微かな甘みに\n高級感があって……"
20026-350 = "これがおやつに\n支給されるなら、週末の仕事も\n構わないと思ったんだ……。"
20026-360 = "うひゃっ！？あ、あたしは、\n今なんて……！？"
20026-380 = "ふふ、今日は寒いから、\n遠くまでよく見えるな。"
20026-390 = "ほら、先生も\nそこに立ってないで、\n登って来い。"
20026-400 = "心配は無用だ。"
20026-410 = "象が登っても壊れないくらい、\n頑丈に建ててある。"
20026-420 = "……そういえばこの足場、"
20026-430 = "あたし達、工務部に\nどこか似ている気がするな。"
20026-440 = "建設に欠かせない\n重要な資材だが、"
20026-450 = "作業が終わったら、\nまるで最初から\n存在しなかったかのように\n消えてしまう――"
20026-460 = "だからなのかな。\n現場のどの風景より、"
20026-470 = "足場から見下ろすこの景色が、\nあたしは一番好きだ。"
20026-480 = "建物の端から\n更に一歩進んだ先、"
20026-490 = "誰かがこの外壁の外側で\n一生懸命に汗を流したと言う、\n痕跡の視点。"
20026-500 = "……完工した建物からは\n感じることができない\nこの景色を、"
20026-510 = "あたしは、\n先生と共有したかった。"
20026-2600 = "丈夫で信頼できる装備こそ、\n現場のベストパートナーだ。\nそういう意味で……\nこいつはあたしを\n失望させたことがない。"
