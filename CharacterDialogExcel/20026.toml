[translation]
20026-10 = "Blue Archive."
20026-20 = "Obras civis, construção, demolição... \nSempre que precisar de serviços de engenharia, pode me chamar. \nE se for para uma revolução ou greve... melhor ainda!"
20026-30 = "O item mais importante no canteiro de obras é, \nem primeiro lugar, a segurança, \ne em segundo lugar, a segurança."
20026-40 = "O estilo arquitetônico daqui é... \n...direi apenas que não é ruim."
20026-50 = "Nas mãos do nosso Departamento de Engenharia, \num trabalho desse nível..."
20026-60 = "Trabalhar apenas 3 dias por semana... \nQue som maravilhoso..."
20026-70 = "Sinto que o pudim daqui... \né diferente daquele que é \ndistribuído pela Secretaria."
20026-80 = "Muito bem, segurança em primeiro lugar hoje também!"
20026-90 = "Que tal mirarmos em um novo recorde \nde zero acidentes no Schale!"
20026-100 = "...Você está atrasado. \nIsso é sabotagem?"
20026-110 = "Eu não consigo entender \npor que o professor do Schale"
20026-120 = "faria uma sabotagem, \nmas..."
20026-130 = "Segurança, ok! Verificação, ok! \nSem acidentes, ok!"
20026-140 = "Eu gosto de pudim, não importa o que misturem nele."
20026-150 = "Seja creme de confeiteiro, \nchocolate, \nou frutas..."
20026-160 = "...exceto pudim misturado com água."
20026-170 = "(Qual será o pretexto para o próximo golpe de estado, \nserá que penso...)"
20026-180 = "Professor, a frequência do seu \ntrabalho noturno não está muito alta...?"
20026-190 = "Você está recebendo corretamente \nas horas extras?"
20026-200 = "O que será que a veterana \nestá fazendo agora...?"
20026-210 = "Espero que ela esteja bem."
20026-220 = "Parabéns, professor."
20026-230 = "Hoje, vamos celebrar o nascimento \nde mais um camarada: você."
20026-240 = "Fufu... professor, \nvocê sabe que dia é hoje?"
20026-250 = "Exatamente. É o grande dia comemorativo \nem que os cidadãos pegaram em armas \nem busca da liberdade,"
20026-260 = "e se levantaram bravamente...!"
20026-270 = "Hum... \nO meu aniversário...?"
20026-280 = "...Ah, eu tinha esquecido."
20026-290 = "Que este ano, finalmente, \nnós possamos ocupar a Secretaria \nda Academia Federal Red Winter,"
20026-300 = "e construir um paraíso na terra \npara os trabalhadores...!"
20026-310 = "Distribuir presentes apenas para as crianças boazinhas..."
20026-320 = "Aquele Papai Noel, ele \ndeve ser um burguês cruel."
20026-330 = "Uma vez, eu comi um pudim \nmisturado com abóbora de edição limitada de Halloween, mas..."
20026-340 = "O leve dulçor \ntinha um toque sofisticado..."
20026-350 = "Se isso fosse distribuído como lanche, \neu não me importaria de trabalhar nos fins de semana..."
20026-360 = "Ué!? O-o que foi que eu \nacabei de dizer...!?"
20026-380 = "Fufu, hoje está frio, então \ndá para ver bem longe."
20026-390 = "Vamos, professor, \nnão fique parado aí, \nsuba aqui."
20026-400 = "Não precisa se preocupar."
20026-410 = "Está construído de forma tão resistente \nque nem um elefante derrubaria."
20026-420 = "...Falando nisso, este andaime,"
20026-430 = "sinto que ele se parece um pouco \ncom o nosso Departamento de Engenharia."
20026-440 = "É um material essencial \npara a construção, mas,"
20026-450 = "quando o trabalho termina, \nele desaparece como se \nnunca tivesse existido desde o início —"
20026-460 = "Talvez seja por isso. \nMais do que qualquer outra paisagem no canteiro,"
20026-470 = "eu gosto mais desta vista \nque se tem do alto do andaime."
20026-480 = "Um passo além \nda borda do edifício,"
20026-490 = "o ponto de vista dos vestígios de alguém que suou \nmuito do lado de fora desta parede externa."
20026-500 = "...Eu queria compartilhar \nesta vista, que não se pode sentir \ndepois que o prédio está pronto,"
20026-510 = "com você, \nprofessor."
20026-2600 = "Equipamentos resistentes e confiáveis são os melhores parceiros em campo.\nNesse sentido...\nEsse aqui nunca me decepcionou."
