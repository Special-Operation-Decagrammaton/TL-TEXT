[translation]
10001-20 = "O que devo fazer agora?\nMe ensine, Sensei."
10001-30 = "Por que será?\nSinto meu coração acelerado."
10001-40 = "Ultimamente, esse tipo de coisa\nestá na moda."
10001-50 = "Hmm..."
10001-60 = "Se for aqui, posso tirar\nminhas roupas... não posso?"
10001-70 = "É um espaço lindo.\nNa verdade, não entendo\nmuito bem o porquê."
10001-80 = "Sensei.\nEu estava te esperando."
10001-90 = "...Ah, Sensei?\nQuando você chegou?"
10001-100 = "Eimi, do Departamento de Investigação de Fenômenos Ocultos.\nEm espera."
10001-110 = "Já me disseram várias vezes\npara não tirar a roupa em qualquer lugar."
10001-120 = "É um comportamento natural regular a temperatura corporal quando está calor,\nentão por que todos reagem assim?"
10001-130 = "Não está um pouco quente aqui?"
10001-140 = "Costumam dizer que não tenho emoções.\nMas não entendo bem\no que isso significa."
10001-150 = "Será que vou conseguir\nme formar na escola...?"
10001-160 = "Hoje é o dia em que\nvocê nasceu, Sensei?"
10001-170 = "Sim.\nEntão é um dia feliz."
10001-180 = "Porque se hoje não existisse, eu não teria\npodido te conhecer."
10001-190 = "Aniversário...?\nAh, agora que você falou,\nexiste algo assim, né."
10001-200 = "Não precisa me parabenizar.\nNão tem um significado tão grande assim."
10001-210 = "Hm?\nMesmo assim, se você quer comemorar...\nAh, obrigado..."
10001-220 = "Não é diferente de ontem,\né apenas um dia comum."
10001-230 = "É estranho como me sinto\nrenovada, não é?"
10001-240 = "Sim.\nFeliz Ano Novo."
10001-250 = "Ouvi dizer que hoje é um dia especial,\nmas por que é um dia especial\npara os namorados também?"
10001-260 = "Me ensine, Sensei."
10001-270 = "Se eu não der doces no Halloween,\nque tipo de travessura\nserá feita comigo...?"
10001-290 = "Sensei, o que achou desta roupa?\nCombina comigo?"
10001-300 = "Roupa de baixo também é um tipo de roupa,\nentão não vejo problema\nem mostrar para os outros."
10001-310 = "Esta roupa de baixo parece um pouco\npequena para mim... Será que não tem\num tamanho maior?"
10001-320 = "Hmm... não dá.\nVou me trocar e te mostrar\ncomo fica no meu corpo."
10001-330 = "Hm...?\nNão posso me trocar aqui?\nO vestiário é apertado\ne dá muito trabalho..."
10001-2600 = "Fácil de usar até para iniciantes......\nFerramenta de execução tática multiuso."
