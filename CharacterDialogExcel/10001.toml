[translation]
10001-20 = "今から何をすればいい？\n教えて、先生。"
10001-30 = "何でだろう。\nなんか、ときめいた。"
10001-40 = "最近はこういうのが\n流行なんだ。"
10001-50 = "ふーん…。"
10001-60 = "ここでなら服を\n脱いでも…ダメ？"
10001-70 = "美しい空間だね。\n実はよく分かって\nないけど。"
10001-80 = "先生。\n待ってたよ。"
10001-90 = "…あれ、先生？\nいつ来た？"
10001-100 = "特異現象捜査部のエイミ。\n待機中。"
10001-110 = "所構わず脱ぐなって、\n何回も指摘された。"
10001-120 = "暑い時は体温調節をするのが\n自然な行動なのに、\n皆どうしたのかな。"
10001-130 = "ここ少し暑くない？"
10001-140 = "感情がないって\nよく言われるけど。\nそれがどんな意味なのか\nよく分からない。"
10001-150 = "学校、無事に\n卒業できるのかな…。"
10001-160 = "今日が先生の\n生まれた日なの？"
10001-170 = "うん。\nそしたら幸せな日だね。"
10001-180 = "今日がなかったら、先生に\n会うこともできなかったから。"
10001-190 = "誕生日…？\nあ、そういえば\nそんなのがあったね。"
10001-200 = "別に祝ってくれなくていいよ。\n大した意味もないし。"
10001-210 = "うん？\nそれでも祝ってくれる\nなら…あ、ありがとう…。"
10001-220 = "昨日と変わらない、\nただの平凡な一日なのに。"
10001-230 = "新鮮な気持ちになるのは\n不思議なことだね？"
10001-240 = "うん。\nハッピーニューイヤー。"
10001-250 = "今日は特別な\n日だと聞いたけど、\nどうして 恋人たちにも\n特別な日なの？"
10001-260 = "教えて、先生。"
10001-270 = "ハロウィンに飴を\nあげないと、どんな\nいたずらをされるんだろう…？"
10001-290 = "先生、この服はどう？\n似合ってる？"
10001-300 = "下着も服の一種だから、\n別に人に見せても\nいいんじゃないのかな。"
10001-310 = "この下着、私にはちょっと\n小さそう…。もっと大きい\nサイズはないのかな。"
10001-320 = "うーん…ダメ。\nやっぱり着替えて、直接\n着てる姿を見せてあげる。"
10001-330 = "うん…？\nここで着替えちゃダメ？\n更衣室は狭くて\n面倒なのに…。"
10001-2600 = "初心者にも使いやすい……\n多目的戦術施行道具。"
