[translation]
26014-10 = "ブルー、アーカイブ。"
26014-20 = "ミレニアムサイエンススクールの角楯カリン、準備はできてる。……こ、この服装、大丈夫そうか？"
26014-30 = "どこかに鏡は……"
26014-40 = "時間ができた……\n先生はどこに……"
26014-50 = "ここは可愛い\n家具が多いな……\n気に入った。"
26014-60 = "敵の気配は\nなさそうだ。\n警戒を少し緩める。"
26014-70 = "この辺の掃除を……\n……いや、制服の\nときは止めておこう。"
26014-80 = "ああ、先生。待ってた。"
26014-90 = "……なんでって？\n護衛に理由が必要だろうか。"
26014-100 = "おかえり、先生。\nそれから、お疲れ様。"
26014-110 = "うん？ああ、\n今日は制服を着ている。\n……理由？"
26014-120 = "ふふ……なんだろうな。\n当ててみてくれ。"
26014-130 = "いつもと違う服装だからか、\n少し勘が鋭くなって\nいるようだ。"
26014-140 = "制服を着る機会が\nあまりなくて……\n変なところはないだろうか？"
26014-150 = "そうは言ったが……\nみ、見すぎだ先生！"
26014-160 = "任務遂行に支障はない。\nこれまで通り、\n遠慮なく言ってほしい。"
26014-170 = "おはようございます、先生。\n今日も一日、\nよろしくお願いします。"
26014-180 = "生徒として挨拶を\nしてみたのだけど……\nへ、変だっただろうか？"
26014-190 = "お誕生日おめでとう。\n欲しいものがあれば\n言ってくれ。"
26014-200 = "先生が喜ぶものを、\n贈りたいんだ。"
26014-210 = "誕生日……ありがとう。\n今日は一日中、先生と一緒に\nいられるのか……嬉しい。"
26014-220 = "先生、明けましておめでとう。\n今年はもう少し、\nこうして私と……"
26014-230 = "な、何でもない。"
26014-240 = "クリスマスを過ごすのに、\nこの服装は平凡すぎる気が……"
26014-250 = "……似合ってるから大丈夫？\nあ、ありがとう。"
26014-260 = "ハロウィーンか。\n普段あまり制服を着ないから"
26014-270 = "なんだかもう仮装を\nしているような気分だ。"
26014-290 = "……あっ！先生！\nま、待ってくれ！"
26014-300 = "このまま渡すのは、\nちょっと……！"
26014-310 = "その、私が脚で\n挟んでしまったもの、\nだから……"
26014-320 = "これは私が食べるから、\n先生はこっちを……！"
26014-330 = "……あ。"
26014-340 = "これは私の食べかけ……"
26014-350 = "ち、違う！\nそういう意味じゃなくて……！"
26014-360 = "やっぱこっちの……\n……！では、なくて！"
26014-370 = "本当に、そんなつもりは……！"
26014-380 = "ど、どちらを渡しても……\nうう……"
26014-390 = "わ、私はどうすれば……！"
26014-2600 = "いつでも、どんな姿でも、\n先生のために駆けつけると誓おう。"
