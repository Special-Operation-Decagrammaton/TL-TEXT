[translation]
26014-10 = "Blue Archive."
26014-20 = "Karin Kakudate da Millennium Science School, pronta para o serviço. ...E-esta roupa, está tudo bem?"
26014-30 = "Onde tem um espelho..."
26014-40 = "Tive um tempo livre... Onde está o Sensei..."
26014-50 = "Aqui tem muitos móveis fofos... Gostei."
26014-60 = "Não parece haver sinais de inimigos. Vou relaxar um pouco a vigilância."
26014-70 = "Vou limpar por aqui... ...Não, melhor não fazer isso enquanto estiver de uniforme."
26014-80 = "Ah, Sensei. Estava te esperando."
26014-90 = "...Por que? Será que preciso de um motivo para te escoltar?"
26014-100 = "Bem-vindo de volta, Sensei. E bom trabalho hoje."
26014-110 = "Hm? Ah, hoje estou usando o uniforme. ...O motivo?"
26014-120 = "Fufu... Quem sabe. Tente adivinhar."
26014-130 = "Talvez seja por estar com uma roupa diferente, mas meus sentidos parecem estar mais aguçados."
26014-140 = "Não tenho muitas oportunidades de usar o uniforme... Será que tem algo estranho nele?"
26014-150 = "Eu disse isso, mas... V-você está olhando demais, Sensei!"
26014-160 = "Isso não atrapalha a execução das missões. Como sempre, pode me pedir o que precisar sem hesitar."
26014-170 = "Bom dia, Sensei. Conto com você para o dia de hoje também."
26014-180 = "Tentei te cumprimentar como uma aluna... F-ficou estranho?"
26014-190 = "Feliz aniversário. Se quiser alguma coisa, é só me dizer."
26014-200 = "Quero te dar algo que te deixe feliz, Sensei."
26014-210 = "Aniversário... Obrigado. Vou poder ficar o dia todo com você, Sensei... Estou feliz."
26014-220 = "Sensei, feliz ano novo. Este ano, quem sabe, um pouco mais assim comigo..."
26014-230 = "N-não é nada."
26014-240 = "Sinto que esta roupa é comum demais para passar o Natal..."
26014-250 = "...Combina comigo, então está tudo bem? A-ah, obrigado."
26014-260 = "Halloween, é? Como não costumo usar uniforme,"
26014-270 = "sinto que já estou fantasiada."
26014-290 = "...Ah! Sensei! E-espere!"
26014-300 = "Te entregar assim, é um pouco...!"
26014-310 = "É que... isso foi algo que eu prendi entre as minhas pernas..."
26014-320 = "Eu vou comer isso, então o Sensei fica com este aqui...!"
26014-330 = "...Ah."
26014-340 = "Isso é o que eu já tinha começado a comer..."
26014-350 = "N-não é isso! Não foi nesse sentido...!"
26014-360 = "Na verdade, este aqui... ...! Não, não é isso!"
26014-370 = "Eu realmente não tive essa intenção...!"
26014-380 = "Q-qualquer um que eu te entregue... Uuu..."
26014-390 = "O-o que eu devo fazer...!"
26014-2600 = "Prometo que, a qualquer momento e em qualquer traje, correrei para ajudar você, Sensei."
