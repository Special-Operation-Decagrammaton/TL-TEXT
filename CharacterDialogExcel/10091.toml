[translation]
10091-10 = "Ah, ah... Blue Archive."
10091-20 = "Vocal, huh... Well, since it's come to this, I'll do my best. Nice to meet you, Sensei."
10091-30 = "Whoa... so many people! Is this place okay?"
10091-40 = "If I sing here, I'll stand out, right?"
10091-50 = "After singing a bit, I got hungry."
10091-60 = "I won't stand out too much, right? ...Well, maybe I'm overthinking it."
10091-70 = "I wonder where everyone is."
10091-80 = "You're here, Sensei. How is it? Does it suit me?"
10091-90 = "Ah, Sensei! Over here, over here!"
10091-100 = "Since we're here... should I sing a song for you?"
10091-110 = "J-just kidding... Just a joke, a joke."
10091-120 = "Hm? A mask?"
10091-130 = "...Ah, it's not what you're thinking, Sensei."
10091-140 = "It's easier to move in than I thought."
10091-150 = "Maybe I should add this to my everyday wardrobe."
10091-160 = "Practicing here..."
10091-170 = "...would probably be a nuisance, wouldn't it?"
10091-180 = "Sensei, today is your birthday, right?"
10091-190 = "If you'd like, maybe we could go to karaoke..."
10091-200 = "W-would you like to go?"
10091-210 = "I was thinking... I could sing a birthday song for you."
10091-220 = "Today is my birthday."
10091-230 = "Um... Sensei... could you sing \"that\" for me?"
10091-240 = "Happy New Year, Sensei."
10091-250 = "I look forward to working with you again this year."
10091-260 = "Christmas, huh... I wonder if I was a good girl this year?"
10091-270 = "Halloween? Ah... no wonder it's so noisy."
10091-280 = "Sensei... don't you have something to give me?"
10091-300 = "...Come on, hurry up!"
10091-310 = "Say 'ah'! Before it falls!"
10091-320 = "If you don't eat it, I can't eat either!"
10091-330 = "Here, say 'ah'!"
10091-340 = "...Eh?"
10091-350 = "Are you okay? You eat first...?"
10091-360 = "Eh...? This spoon, is it Kazusa's...?"
10091-370 = "...Huh? ...Wait?"
10091-380 = "Spoon...? Mine...?"
10091-390 = "...Ah."
10091-400 = "Waaaaahhh!? Forget what I just said!"
10091-2600 = "Really, I never thought things would turn out like this. Hehe... it's a bit late to say this, but I'm really glad I met you, Sensei. ...Thank you very much."
