[translation]
10091-10 = "あ、あー……ブルーアーカイブ。"
10091-20 = "ボーカルか……まぁ、こうなった以上頑張るよ。\nよろしくね、先生。"
10091-30 = "うわっ……人多っ！\n大丈夫？ここ。"
10091-40 = "ここで歌ったら\n浮いちゃうよね？"
10091-50 = "ちょっと歌ったら、\nお腹空いてきたな。"
10091-60 = "目立ったりしないよね？\n……まぁ、考えすぎか。"
10091-70 = "みんな、どこに\n居るんだろ。"
10091-80 = "来たんだ、先生。\nどう？似合ってる？"
10091-90 = "あ、先生！こっち、こっち！"
10091-100 = "せっかくだから……\n一曲、歌ってあげようか？"
10091-110 = "な、なんてね……\n冗談、冗談。"
10091-120 = "ん？マスク？"
10091-130 = "……ああ、先生が思ってる\nようなのとは違うよ。"
10091-140 = "思ったより\n動きやすいね、これ。"
10091-150 = "普段着のレパートリーに\n入れようかな。"
10091-160 = "ここで練習を……"
10091-170 = "……するのは、\n流石に迷惑だよね。"
10091-180 = "先生、今日誕生日だよね？"
10091-190 = "良かったら、\n一緒にカラオケでも……"
10091-200 = "い、行きませんか？"
10091-210 = "その……\nお、お祝いの歌でも\n歌おうかなぁ……って。"
10091-220 = "今日は私の誕生日なんだ。"
10091-230 = "その……先生……\n「あれ」歌ってくれない？"
10091-240 = "あけましておめでと\nうございます。先生。"
10091-250 = "今年も宜しくお願いします。"
10091-260 = "クリスマス、か……\n私、今年はいい子だったかなぁ？"
10091-270 = "ハロウィン？あぁ……\nどうりで騒がしいと思ったら。"
10091-280 = "先生……私に何か渡すもの、\nあるんじゃない？"
10091-300 = "……ほら、早く！"
10091-310 = "あ～んして！\n落ちる前に！"
10091-320 = "先生が食べてくれないと、\n私も食べらんないから！"
10091-330 = "はい、あ～ん！"
10091-340 = "……え？"
10091-350 = "大丈夫？先に食べて……？"
10091-360 = "え……？このスプーン、\nカズサのだし？"
10091-370 = "……へ？\n……あれ？"
10091-380 = "スプーン……？\n私の……？"
10091-390 = "……あ。"
10091-400 = "うわああああぁ！？\n今のナシ！"
10091-2600 = "ほんと、まさかこんなことになるなんて。\nふふ……今更だけど、先生に会えて本当に\n良かった。……ありがとうございます。"
