[translation]
13009-10 = "ブルー…アーカイブ…"
13009-20 = "夢かと思った、今この瞬間…。\nこんにちは。先生。\nこれからよろしくね。"
13009-30 = "なんだか眠たくなるような\nのんびりとした空間だね～"
13009-40 = "夢を見てる気分なの。\nなんでだろう？"
13009-50 = "あはは！\nあー…笑ったら\n眠くなった。"
13009-60 = "わ～ここなら\nゆっくりできそう～"
13009-70 = "うふふふっ。\n新しい枕が届くよ。\n楽しみすぎる。"
13009-80 = "あはは！さ、さっき…！\n夢で…先生が…\nああ、もうダメ、\n面白すぎる！あはは。"
13009-90 = "あはは！あ～よく寝た！\nうん？そんな姿を\n見るのは初めて？"
13009-100 = "ふぁ～。\nおはよう…先生。"
13009-110 = "え？朝じゃない？"
13009-120 = "別にいいでしょ～"
13009-130 = "ふあ。先生…ごめん…\nもうちょっと寝る。"
13009-140 = "先生も…ここに横になる？"
13009-150 = "ふあー…あれ？\n先生。来てた？"
13009-160 = "昼寝にちょうど\nいい時間なのに…"
13009-170 = "一旦寝て起きたら、もっと\n仕事も捗るんじゃないかな？"
13009-180 = "夜に何をしてたら\nそんなに眠いのかって？"
13009-190 = "ふふっ。先生になら\n教えてあげようかな～"
13009-200 = "ふぁ…ん…。"
13009-210 = "起きてから一番\n初めに会う人が\n先生だとは"
13009-220 = "…いいね。"
13009-230 = "（このまま時間が止まって\nほしい。なんだか、\nすごく心地いい気持ち）"
13009-240 = "お誕生日おめでとう先生。"
13009-250 = "私が膝枕してあげるから\nひと眠りする？"
13009-260 = "今日が…\n私の誕生日…？"
13009-270 = "記念にもっと寝ないと…\nそれがいいね。"
13009-280 = "明けましておめでとう。\n今年はもうちょっと\n頑張って起きてるね。"
13009-290 = "クリスマスは好き…。"
13009-300 = "百鬼夜行では少し\n珍しい祭りだけど"
13009-310 = "たくさんの人が\n幸せそうな顔をする、\n聖なる夜だからね。"
13009-320 = "今日は、眠るには\nもったいない日だね。"
13009-330 = "街に出ようよ、先生。"
13009-340 = "きっと起きてても、\n夢を見てるような\n気分になれるから。"
13009-360 = "先生…\n来てくれたんだね…"
13009-370 = "うん、今は修行中…。\n座禅をしてた…。"
13009-380 = "居眠りしてたんじゃないの、\nって…？"
13009-390 = "違うよ…。\nこれも、れっきとした、\n修行の一環だから…。"
13009-400 = "近場にこんな、\n修行にぴったりの場所が\nあったなんて…。"
13009-410 = "幸せ。まるで、\n夢を見てるみたいな\n気分…。"
13009-420 = "この幸せも、全部、\n先生のお陰なのかな…？"
13009-430 = "ん…ほら、\n先生もそんな\nところにいないで、"
13009-440 = "私と一緒に…。"
13009-450 = "…寝よ？"
13009-2600 = "この武器は……夢なのかな……\nずっと願ってたことが、叶った。"
