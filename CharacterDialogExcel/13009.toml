[translation]
13009-10 = "Blue... Archive..."
13009-20 = "Pensei que fosse um sonho, este momento agora...\nOlá, Sensei.\nConto com você daqui para frente."
13009-30 = "É um ambiente tão relaxante\nque dá até sono~"
13009-40 = "Sinto como se estivesse sonhando.\nPor que será?"
13009-50 = "Ahaha!\nAh... depois de rir,\nme deu sono."
13009-60 = "Uau~ aqui parece ser\num ótimo lugar para relaxar~"
13009-70 = "Ufufu.\nMeu travesseiro novo vai chegar.\nEstou tão ansiosa."
13009-80 = "Ahaha! A-agora há pouco...!\nNo sonho... o Sensei estava...\nAh, não aguento, é engraçado demais! Ahaha."
13009-90 = "Ahaha! Ah, dormi tão bem!\nHã? É a primeira vez que\nme vê assim?"
13009-100 = "Uaa... \nBom dia... Sensei."
13009-110 = "Eh? Não é de manhã?"
13009-120 = "Não tem problema, né~"
13009-130 = "Ua. Sensei... desculpa...\nVou dormir mais um pouco."
13009-140 = "O Sensei também... quer deitar aqui?"
13009-150 = "Uaa... ué?\nSensei. Você veio?"
13009-160 = "Mesmo sendo a hora perfeita\npara uma soneca..."
13009-170 = "Se eu tirar uma soneca e acordar, acho que o trabalho vai render mais, não acha?"
13009-180 = "O que eu faço à noite para\nficar com tanto sono, você pergunta?"
13009-190 = "Fufu. Acho que posso contar\npara o Sensei~"
13009-200 = "Ua... hum..."
13009-210 = "A primeira pessoa que vejo\nao acordar\nser o Sensei..."
13009-220 = "...é muito bom."
13009-230 = "(Queria que o tempo parasse aqui.\nDe alguma forma, é uma sensação\ntão agradável)"
13009-240 = "Feliz aniversário, Sensei."
13009-250 = "Quer que eu te ofereça meu colo como travesseiro\npara você tirar uma soneca?"
13009-260 = "Hoje é...\no meu aniversário...?"
13009-270 = "Tenho que dormir mais para comemorar...\nIsso seria bom."
13009-280 = "Feliz Ano Novo.\nEste ano vou me esforçar\npara ficar acordada um pouco mais."
13009-290 = "Eu gosto do Natal..."
13009-300 = "Embora seja um festival um pouco\nincomum em Hyakkiyako,"
13009-310 = "é uma noite sagrada onde\nmuitas pessoas\nficam com rostos felizes."
13009-320 = "Hoje é um dia bom demais\npara passar dormindo."
13009-330 = "Vamos sair pela cidade, Sensei."
13009-340 = "Tenho certeza de que, mesmo acordada,\nme sentirei como se estivesse\nem um sonho."
13009-360 = "Sensei...\nVocê veio me ver..."
13009-370 = "Sim, estou treinando agora...\nEstava meditando..."
13009-380 = "Não estava cochilando,\nvocê diz...?"
13009-390 = "Não é isso...\nIsso também é, sem dúvida,\nparte do meu treinamento..."
13009-400 = "Quem diria que um lugar tão perfeito\npara treinar ficava\ntão perto..."
13009-410 = "Que felicidade. É como se eu estivesse\nem um sonho..."
13009-420 = "Será que toda essa felicidade\ntambém é graças ao Sensei...?"
13009-430 = "Hum... olha,\nSensei, não fique aí parado,"
13009-440 = "venha comigo..."
13009-450 = "...vamos dormir?"
13009-2600 = "Esta arma é... um sonho, será...? O que eu sempre desejei, se tornou realidade."
