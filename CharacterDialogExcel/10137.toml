[translation]
10137-10 = "Blue Archive~"
10137-20 = "Ah, oi, oi. Sou a Konoka Shima, do Departamento de Segurança Pública da Academia Valkyrie. Que tal darmos uma olhada na previsão do dia juntos?"
10137-30 = "Quanta gente..."
10137-40 = "(Bom, quanto aos criminosos... Bem, acho que não tem nenhum por aqui.)"
10137-50 = "Ué? Onde foi que eu coloquei meu distintivo...?"
10137-60 = "Que paz... Ah, que tédio."
10137-70 = "Isso aqui é legalizado?"
10137-80 = "Opa. Como estão as coisas?"
10137-90 = "Vai ver, de repente você já tem uma ficha criminal sem nem saber..."
10137-100 = "Tô brincando, é só piada!"
10137-110 = "A Valkyrie fica bem mesmo sem mim."
10137-120 = "Na verdade, a taxa de prisões até sobe quando eu estou por perto..."
10137-130 = "É como se eles ficassem me provocando, sabe?"
10137-140 = "Por isso, acho que é melhor eu ficar por aqui, brincadeirinha."
10137-150 = "Sensei, você escreve muito bem, hein? Que inveja."
10137-160 = "Ah, mas se precisar de relatórios de incidentes ou cartas de desculpas, eu sou especialista,"
10137-170 = "então é só me pedir!"
10137-180 = "Chá, chá, um chazinho."
10137-190 = "...Acho que já está na hora de trocar esse sachê."
10137-200 = "Depois de 30 infusões, já nem tem mais gosto de nada..."
10137-210 = "Disciplina! Disciplina! Disciplina!"
10137-220 = "...Não acha que, quando repetem tanto, acaba ficando engraçado?"
10137-230 = "Bom, passar disso já seria um problema, claro..."
10137-240 = "Sensei, como foi a sua sorte hoje?"
10137-250 = "Sensei, feliz aniversário!"
10137-260 = "Como eu não sei bem o que você gosta,"
10137-270 = "vamos direto para o shopping agora!"
10137-280 = "Parabéns pra mim... Parabéns pra mim..."
10137-290 = "Parabéns pra... Konoka..."
10137-300 = "Sensei, feliz ano novo!"
10137-310 = "Vamos prender esses delinquentes que estão fazendo bagunça!"
10137-320 = "É Natal, né... Todo mundo parece tão grato, mas..."
10137-330 = "O Papai Noel é um reincidente em invasão de domicílio, né?"
10137-340 = "Agorinha mesmo, me disseram: 'Doces ou travessuras!'"
10137-350 = "Achei que era um assalto e acabei colocando algemas na pessoa..."
10137-360 = "Podiam ter me avisado que era Halloween..."
10137-380 = "Ah, droga, estou toda encharcada..."
10137-390 = "Ugh... que frio."
10137-400 = "Começou a chover."
10137-410 = "E dizem que não vai parar até a noite... Ah, puxa vida."
10137-420 = "Bom, pelo menos serviu para esfriar a cabeça."
10137-430 = "Hã? Ah, entendi."
10137-440 = "Seria mentira dizer que não estou frustrada."
10137-450 = "Todo esse esforço desperdiçado, e ainda por cima toda molhada..."
10137-460 = "Mas, como dizia a previsão..."
10137-470 = "Como meu parceiro estava ao meu lado, foi um bom dia."
10137-480 = "...Tudo graças a você, Sensei."
10137-490 = "Por isso, na verdade..."
10137-500 = "Estou feliz."
10137-510 = "...Ah, não, quer dizer, esquece!"
10137-520 = "Dá para se abrigar da chuva assim, então eu quis dizer que me sinto sortuda e feliz por isso!"
10137-530 = "É, é só isso mesmo..."
10137-2600 = "Ah, eu queria muito isso! Com isso aqui, as coisas vão ficar bem mais fáceis de resolver!"
