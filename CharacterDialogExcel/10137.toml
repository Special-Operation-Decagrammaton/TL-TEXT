[translation]
10137-10 = "Blue~ Archive~"
10137-20 = "Ah, e aí, e aí.\nSou Shima Konoka, do Departamento\nde Segurança Pública da Escola de Polícia Valkyrie.\nQuer dar uma olhada no horóscopo de hoje comigo?"
10137-30 = "Tem tanta~ gente aqui~"
10137-40 = "(Bom, cadê os criminosos...\né, acho que\nnão tem nenhum por aqui)"
10137-50 = "Ué?\nOnde foi que eu meti\no meu distintivo...?"
10137-60 = "Tão pacífico.\nHaa... Que tédio."
10137-70 = "Isso aqui\né legalizado?"
10137-80 = "E aí. Como é que tão as coisas?"
10137-90 = "Será que você ganhou uma ficha criminal\nenquanto a gente não se via..."
10137-100 = "Tô brinca~ndo, é só piada!"
10137-110 = "A Valkyrie vai ficar bem\nmesmo sem mim aqui."
10137-120 = "Na verdade, quando eu tô lá, a taxa de prisão\nacaba aumentando, sabe..."
10137-130 = "Parece que a minha presença\nacaba provocando eles ou algo assim."
10137-140 = "Por isso, acho que é melhor\neu ficar por aqui, brincadeirinha."
10137-150 = "Sensei, você escreve tão bem~\nQue inveja."
10137-160 = "Ah, mas se for relatórios de incidentes\ne cartas de desculpas, eu sou craque,"
10137-170 = "Então me avise quando precisar!"
10137-180 = "Chá~ Hora do chá~"
10137-190 = "...Acho que já tá na hora de\ntrocar esse saquinho de chá."
10137-200 = "Na trigésima vez, já não tem\nmais gosto de nada..."
10137-210 = "Ação disciplinar! Ação disciplinar! Ação disciplinar!"
10137-220 = "...Se você ficar repetindo isso,\nnão começa a parecer engraçado?"
10137-230 = "Bom,\npassar disso já seria ruim, mas..."
10137-240 = "Sensei, como estava a sua sorte hoje?"
10137-250 = "Sensei, feliz aniversário!"
10137-260 = "Como eu não sei muito bem\ndo que você gosta,"
10137-270 = "Nós vamos pro shopping\nagora mesmo!"
10137-280 = "Happy birthday~ to~ me~\nHappy birthday~ to~ me~"
10137-290 = "Happy birthday~\ndear, Konoka~"
10137-300 = "Sensei, feliz\nAno Novo!"
10137-310 = "Vamos lá reprimir\nos delinquentes que tão festejando~!"
10137-320 = "É Natal, né...\nTodo mundo parece\ntão grato por isso, mas..."
10137-330 = "O Papai Noel é um infrator reincidente\nde invasão de domicílio, né."
10137-340 = "Agorinha pouco,\nalguém me disse:\n'Doces ou travessuras!'."
10137-350 = "Achei que fosse um assalto,\nentão acabei algemando a pessoa..."
10137-360 = "Eles deviam ter avisado logo\nque era pro Halloween..."
10137-380 = "Ah cara, tô encharcada..."
10137-390 = "Uugh... que frio."
10137-400 = "Começou a chover pra valer, né."
10137-410 = "E disseram que não ia parar até de noite...\nHaa..."
10137-420 = "Bom, acho que foi na medida certa\npra esfriar a cabeça."
10137-430 = "Hã? Ah, uhm."
10137-440 = "Se eu dissesse que não tô frustrada,\neu estaria mentindo."
10137-450 = "Tivemos um monte de trabalho à toa,\nficamos ensopados..."
10137-460 = "Mas foi como o horóscopo disse."
10137-470 = "Como o meu parceiro estava do meu lado,\nfoi um bom dia."
10137-480 = "...É tudo graças a você, Sensei."
10137-490 = "Então, se for pra escolher uma palavra――"
10137-500 = "Eu estou feliz."
10137-510 = "...Ah, não, digo!"
10137-520 = "Eu quis dizer que tô com sorte e feliz\npor podermos nos abrigar da chuva assim!"
10137-530 = "É s-só isso... mesmo..."
10137-2600 = "Ah, eu queria isso aqui!\nCom isso a conversa vai se resolver rapidinho!"