[translation]
10137-10 = "ぶる～あ～かいぶ～"
10137-20 = "あー、どもども。\nヴァルキューレ警察学校、\n公安局の志真コノカっす。\n今日の占い、一緒に見てみません？"
10137-30 = "人が～おおいなぁ～"
10137-40 = "（さぁて犯罪者は……\nまぁ、\nここにはいないか）"
10137-50 = "あれっ？\nあたしのバッジ……\nどこやったっけ……。"
10137-60 = "平和だなー。\nはぁ……暇だ。"
10137-70 = "これって\n合法なんすか？"
10137-80 = "ちわーっす。調子どっすか？"
10137-90 = "見ない間に前科持ちに\nなってたり……"
10137-100 = "なーんて、冗談ですって！"
10137-110 = "あたしが居なくても\nヴァルキューレは大丈夫っすよ。"
10137-120 = "というか、いるほうが逮捕率\nあがるんすよね……"
10137-130 = "なーんか、ちょっかい\nかけてくるっていうか。"
10137-140 = "だから、こっちいる方が\nいい気がする、なんちゃって。"
10137-150 = "先生、文章うまいっすねぇ～\nいいなぁ。"
10137-160 = "あ、でも始末書と反省文\nなら得意なんで、"
10137-170 = "必要な時は言ってください！"
10137-180 = "お茶～お茶～っと。"
10137-190 = "……このティーバッグ、\nそろそろ替え時かな。"
10137-200 = "30番煎じはさすがに\n味しなくなってきた……。"
10137-210 = "懲戒！懲戒！懲戒！"
10137-220 = "……って、繰り返し言われると\n面白く感じてきません？"
10137-230 = "まぁ、\nこれ以上はマズいっすけど……。"
10137-240 = "先生、今日の運勢どうでした？"
10137-250 = "先生、お誕生日おめでとうっす！"
10137-260 = "何が好きかちょっと\nわからないんで、"
10137-270 = "今からショッピングモール\n行くっすよ！"
10137-280 = "はっぴば～すで～とぅ～みぃ～\nはっぴば～すで～とぅ～みぃ～"
10137-290 = "はっぴば～すでぇ～\nでぃあ、このかぁ～"
10137-300 = "先生、明けまして\nおめでとうございます！"
10137-310 = "浮かれてる不良を\n取り締まりに行くっすよ～！"
10137-320 = "クリスマスっすねぇ……\nなんかみんな\nありがたがってますけど……"
10137-330 = "サンタって不法侵入の\n常習犯っすよね、あれ。"
10137-340 = "さっき、\nキャンディーくれなきゃ\nいたずらするぞ！\nって言われたんすけど。"
10137-350 = "強盗かと思ってつい\n手錠掛けちゃって……"
10137-360 = "ハロウィンなら早く\n言ってほしかったっすね……。"
10137-380 = "あーあ、びしょ濡れ……。"
10137-390 = "うぅ……さっむ。"
10137-400 = "降り始めちゃいましたね。"
10137-410 = "夜までは止まないらしいのに……\nはぁ……。"
10137-420 = "まぁ、頭を冷やすには\nちょうどよかったっすかね。"
10137-430 = "はぇ？ああ、うーん。"
10137-440 = "悔しくないって言ったら\n嘘になるっすよ。"
10137-450 = "いろいろ無駄骨になるわ、\n濡れ鼠になるわ……。"
10137-460 = "でも、占いの通りっす。"
10137-470 = "バディが隣にいたから、\n良い1日になりました。"
10137-480 = "……先生のおかげっすよ。"
10137-490 = "だから、どちらかというと――"
10137-500 = "幸せです。"
10137-510 = "……あっ、いや、その！"
10137-520 = "こうやって雨宿りもできて、\nラッキーで幸せだなって意味で！"
10137-530 = "そ、それだけ……っすから……。"
10137-2600 = "あ、これ欲しかったんすよ！\nこれがあれば話が簡単に済むっすからね！"
