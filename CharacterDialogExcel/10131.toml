[translation]
10131-10 = "Blue Archive, é isso."
10131-20 = "Saudações, Sensei. Meu nome é Takane Miyoshi, do Departamento Editorial da Academia Federal de Red Winter. É um prazer conhecê-lo."
10131-30 = "Hum... Este lugar tem uma atmosfera agradável, não é?"
10131-40 = "Será que o Wi-Fi funciona bem aqui? Preciso fazer o upload da minha crítica logo..."
10131-50 = "Um tempo para conversar sobre histórias enquanto tomamos um chá... É maravilhoso, de verdade."
10131-60 = "(Este espaço... Como será que devo escrever uma crítica sobre ele...?)"
10131-70 = "Será que eu poderia tirar uma foto...?"
10131-80 = "Saudações, Sensei. Fufu... Hoje é um bom dia."
10131-90 = "Afinal, pude encontrar você, Sensei."
10131-100 = "Estou muito feliz por termos nos encontrado."
10131-110 = "Ah, será que fui formal demais?"
10131-120 = "Bem... então..."
10131-130 = "Olá, Sensei!"
10131-140 = "Guerra de bolas de neve é algo sem regras. Em Red Winter, costumamos fazer isso com frequência, mas..."
10131-150 = "Só existe uma única regra: é proibido colocar pedras dentro delas."
10131-160 = "Afinal, dói se acertar alguém, não é?"
10131-170 = "Eh? Você quer ouvir a 'tal risada'? E-eh, bem... isso é..."
10131-180 = "U-uuh... T-tudo bem. Se você insiste tanto assim..."
10131-190 = "Ohohohoho!"
10131-200 = "...Eu nunca mais farei isso!"
10131-210 = "Sensei, você gosta de hóquei no gelo? Eu adoro!"
10131-220 = "A patinação coordenada, o movimento dos tacos..."
10131-230 = "Os contatos físicos, as trombadas de ombro e as brigas...!"
10131-240 = "E o golpe de estado feito pela plateia que não ficou satisfeita com o resultado...!"
10131-250 = "Ah... finja que não ouviu a última parte..."
10131-260 = "Uma crítica é... o ato de recortar uma história e registrar essas emoções com suas próprias palavras."
10131-270 = "Nesse sentido, talvez seja parecido com a fotografia."
10131-280 = "Fufu, por isso... bem."
10131-290 = "Sensei, eu poderia tirar uma foto sua?"
10131-300 = "Às vezes, algumas pessoas dizem que sou uma jovem de família nobre, mas..."
10131-310 = "Isso é um grande equívoco."
10131-320 = "Eu sou Takane Miyoshi. Nada mais, nada menos que isso!"
10131-330 = "Eh...? 'Entendido. Princesa do país da neve'...?"
10131-340 = "Ah, Sensei...!"
10131-350 = "...? Hoje? Aconteceu alguma coisa?"
10131-360 = "Acho que é apenas um dia comum, um dos 365 dias do ano."
10131-370 = "Fufu. É brincadeira, Sensei."
10131-380 = "Feliz aniversário."
10131-390 = "Então, a partir de agora... sobre o dia em que o Sensei nasceu..."
10131-400 = "Vou expressar minha própria crítica sobre isso."
10131-410 = "Hoje, é?"
10131-420 = "Acho que é apenas um dia comum, um dos 365 dias do ano."
10131-430 = "Sim... é... verdade..."
10131-440 = "Uuuuuuu..."
10131-450 = "A-ah, chega! Sensei, você é muito mau!"
10131-460 = "Pensei mesmo que você tinha esquecido do meu aniversário!?"
10131-470 = "Você vai assumir a responsabilidade por ter me feito entender errado, não vai?"
10131-480 = "Feliz Ano Novo, Sensei."
10131-490 = "Conto com você para este ano também."
10131-500 = "Assim como o início de uma história é crucial, a forma como passamos o Ano Novo..."
10131-510 = "É algo que define\ncomo será o ano inteiro."
10131-520 = "Por isso...\nque tal uma\ntangerina?"
10131-530 = "No Ano Novo de Red Winter,\ntangerinas e kotatsu\nsão a regra de ouro."
10131-540 = "Natal..."
10131-550 = "As histórias sobre o\nPapai Noel são contadas\nem muitos lugares, não é?"
10131-560 = "Em Red Winter, temos a\n'Donzela da Neve', que é a\nparceira do Papai Noel."
10131-570 = "Sim, uma parceira\nalém das renas..."
10131-580 = "Por isso, hoje, eu serei\na sua 'Donzela da Neve',\nSensei."
10131-590 = "Pensando na origem\ndo Halloween..."
10131-600 = "De certa forma,\no Halloween é..."
10131-610 = "Talvez o dia em que os criadores\npossam obter a maior\ninspiração de todas."
10131-620 = "Embora, deixando\nisso de lado."
10131-630 = "Mesmo que eu ganhe doces,\nainda farei travessuras, sabe?"
10131-640 = "Ei!"
10131-660 = "Sensei, olhe só...\nÉ uma aurora boreal."
10131-670 = "Dizem que, nas histórias,\né assim que vemos os guardiões\ndo céu..."
10131-680 = "aproveitando seus banquetes."
10131-690 = "Aqueles que eu pensava que\nestariam sempre comigo..."
10131-700 = "Já não posso mais\nencontrá-los."
10131-710 = "O mundo continua como sempre,\ninfinitamente frio\ne distante."
10131-720 = "Ainda assim, quando olho para\na aurora e nutro esperança, é porque..."
10131-730 = "neste lugar, existe um\n'parceiro' que permanecerá\ncomigo até o fim."
10131-740 = "Deve ser por isso."
10131-750 = "Fufu. Sim, agora essa é\na configuração, 'Sensei'."
10131-760 = "Pode tirar a foto,\npor favor?"
10131-2600 = "Você conhece o ditado de que a caneta é mais forte que a espada? Sim, exatamente. Fufu... Para aqueles que enviaram palavras insensíveis sobre minhas críticas — vamos ter um... 'diálogo' bem ponderado."
