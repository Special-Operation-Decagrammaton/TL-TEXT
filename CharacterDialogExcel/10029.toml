[translation]
10029-10 = "ブル～……アーカイブー！"
10029-20 = "やあやあ、会えて嬉しいよ先生。\n今日もキャンディーみたいな、甘ーい1日になりそうだぁ。"
10029-30 = "何か、おやつは……"
10029-40 = "うん、\n良い雰囲気だね～"
10029-50 = "ひーまーだー"
10029-60 = "あれ、先生は……？"
10029-70 = "おお……！\nこれは……！"
10029-80 = "おかえり、先生。\nとりあえず何か食べる？"
10029-90 = "にひ、待ってたよ～。"
10029-100 = "どうしたの、先生？\n……口寂しい？\n飴ちゃんでもあげようか？"
10029-110 = "ところで先生、\nお口直しには何が好き？"
10029-120 = "別に私だって、\nいっつもお菓子の話ばっかり\nしてるわけじゃないよ～？"
10029-130 = "先生……\n別腹、って知ってる？"
10029-140 = "これもまた、\nスイーツに込められた哲学……"
10029-150 = "どう、感動した？"
10029-160 = "先生のお誕生日……"
10029-170 = "仕方ない、\n今日は私が奢ってあげよう！"
10029-180 = "先生、先生。\n今日が何の日か、\nもちろん知ってるよね？"
10029-190 = "すっっっごいの期待してるよ？"
10029-200 = "さあ今年の新作は\nどんな感じかなー？"
10029-210 = "一緒に買いに行こう、先生！"
10029-220 = "果たして今年もサンタさんは、\n私のことを見捨ててしまうのか！"
10029-230 = "それとも今年の\nサンタさんは先生！？"
10029-240 = "今日はキャンディーが\nたくさん貰える日……！"
10029-250 = "行くよ、先生！あ、\nそこのスペースは空けといて！\n今日からしばらく\nキャンディー置き場になるから！"
10029-270 = "見て見て先生！すごい……！\nこんなにたくさん！！"
10029-280 = "それに、どれもこれも\n見たことない！！"
10029-290 = "初めて見た\nお菓子ばっかり……！！"
10029-300 = "……あはっ。ごめんごめん、\n何だか急に気が抜けちゃって。"
10029-310 = "ありがとね、先生。"
10029-320 = "こうして付き合ってくれて。"
10029-330 = "ほんと、感謝してるんだ―。"
10029-340 = "先生とこうしていられて、\n嬉しいし、楽しいの。"
10029-2600 = "うお、すごいねこれ……。\n私で良いの？\n返品とかナシだからね～？"
