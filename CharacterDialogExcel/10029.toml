[translation]
10029-10 = "Blu~... Archive!"
10029-20 = "Ei, ei, fico feliz em te ver, Sensei.\nHoje também parece que vai ser um dia doce, igual a um bombom."
10029-30 = "Algum... lanchinho?"
10029-40 = "Sim,\nque clima bom, né?"
10029-50 = "Tô taaaão entediada..."
10029-60 = "Ué, cadê o Sensei...?"
10029-70 = "Oh...!\nIsso é...!"
10029-80 = "Bem-vindo de volta, Sensei.\nQuer comer alguma coisa?"
10029-90 = "Hehe, eu estava te esperando~."
10029-100 = "O que foi, Sensei?\n...Está com vontade de comer algo?\nQuer que eu te dê uma bala?"
10029-110 = "Aliás, Sensei,\no que você gosta para limpar o paladar?"
10029-120 = "Não é como se eu ficasse\nsó falando de doces\no tempo todo, sabe~?"
10029-130 = "Sensei...\nVocê sabe o que é 'sobremesa'?"
10029-140 = "Isso também é uma filosofia\ncontida nos doces..."
10029-150 = "E aí, ficou impressionado?"
10029-160 = "O aniversário do Sensei..."
10029-170 = "Não tem jeito,\nhoje eu pago para você!"
10029-180 = "Sensei, Sensei.\nVocê sabe que dia é hoje,\nclaro que sabe, né?"
10029-190 = "Estou esperando algo incrííível, viu?"
10029-200 = "Vamos ver como são\nas novidades deste ano?"
10029-210 = "Vamos comprar juntos, Sensei!"
10029-220 = "Será que este ano o Papai Noel\nvai me abandonar de novo!"
10029-230 = "Ou será que o Papai Noel\ndeste ano é o Sensei!?"
10029-240 = "Hoje é o dia de ganhar\nmuitas balas...!"
10029-250 = "Vamos, Sensei! Ah,\ndeixe aquele espaço livre!\nA partir de hoje, ele vai ser\no depósito de balas por um tempo!"
10029-270 = "Olha só, Sensei! Incrível...!\nTanta coisa assim!!"
10029-280 = "E tudo isso aqui\neu nunca vi antes!!"
10029-290 = "Só tem doces que\neu nunca vi na vida...!!"
10029-300 = "...Ah. Desculpa, desculpa,\nde repente eu relaxei demais."
10029-310 = "Obrigada, Sensei."
10029-320 = "Por ter vindo comigo."
10029-330 = "Sério, sou muito grata."
10029-340 = "Estar assim com você, Sensei,\né feliz e divertido."
10029-2600 = "Uau, isso é incrível...\nTem certeza que é para mim?\nNada de devoluções, hein~?"
