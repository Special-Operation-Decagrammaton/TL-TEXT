[translation]
23005-20 = "奥空アヤネです。\nただ今より、先生の支援を担当します。"
23005-30 = "あはは…"
23005-40 = "これ、高そう…"
23005-50 = "ここにお菓子とか\n隠しておこうかな…"
23005-60 = "どういう原理で\n動いてるんだろう…？"
23005-70 = "これって大丈夫なのかな…？"
23005-80 = "お疲れさまです、先生。\n本日のスケジュールを\nお伝えしますね。"
23005-90 = "お待ちしておりました。\n先生。"
23005-100 = "今日はどんなお仕事を\nされますか？"
23005-110 = "スケジュールについては、\n私もチェックしておきますね。"
23005-120 = "えっ、今夜、二人っきりで\n徹夜なんですか！？"
23005-130 = "わ、私はその、問題ない、\nですが…。\nその、周りからの目が…。"
23005-140 = "…え、あっ、\nご冗談、でしたか…"
23005-150 = "はい。"
23005-160 = "お誕生日おめでとう\nございます、先生。"
23005-170 = "今日は誕生日パーティーに\n行かれる、ということで\nよろしいでしょうか？"
23005-180 = "えっ、\n私も一緒に、ですか？"
23005-190 = "え、あ…！\n私の誕生日、\nご存知だったんですか！？"
23005-200 = "あ、あぅ…\nありがとうございます…。"
23005-210 = "全然、\n予想していませんでした…。"
23005-220 = "今年もよろしく\nお願いいたします、先生。"
23005-230 = "先生と一緒にまた新たな\n1年を過ごせるなんて、\n嬉しいです。"
23005-240 = "クリスマス…。\nたまにはこういうにぎやかな\n季節も良いですね…。"
23005-250 = "え？一緒に、外へ？\nわ、私とですか！？"
23005-260 = "ハッピーハロウィーン！\nにぎやかな一日ですね、\n先生。"
23005-280 = "…？…先生？\nそこにいらっしゃいます、よね？"
23005-290 = "メガネが無いと…\nちょっとよく見えなくて。"
23005-300 = "え？あ、はい。確かに私、\nほとんどずっと付けて\nますもんね。"
23005-310 = "あ、あはは…流石に、\n顔を洗う時は外しますから。"
23005-320 = "な、なんだか顔が\n熱いです…。"
23005-330 = "先生に、恥ずかしいところを\n見られてしまって…。"
23005-340 = "はいっ？！か、可愛いって…\nそんな…"
23005-350 = "あ、あぅぅ…。"
23005-360 = "そ、そんなに\n見つめられますと…。"
23005-370 = "は…恥ずかしいです…。"
23005-2600 = "あはは……こんなすごいものを\n私に扱えるのかどうか分かりませんが、\nマニュアルや関連書籍を漁れば、\nどうにかなりますかね……。\nありがとうございます、先生……！"
