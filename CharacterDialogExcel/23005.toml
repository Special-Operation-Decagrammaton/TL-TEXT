[translation]
23005-20 = "Sou a Okusora Ayane.\nA partir de agora, serei responsável pelo seu suporte, Sensei."
23005-30 = "Ahaha..."
23005-40 = "Isso parece caro..."
23005-50 = "Será que eu deveria esconder\nalguns doces aqui...?"
23005-60 = "Como será que isso funciona...?"
23005-70 = "Será que isso é seguro...?"
23005-80 = "Bom trabalho, Sensei.\nVou lhe informar sobre\na agenda de hoje."
23005-90 = "Estava à sua espera,\nSensei."
23005-100 = "Que tipo de trabalho\nvamos fazer hoje?"
23005-110 = "Eu também vou verificar\na agenda, tudo bem?"
23005-120 = "Eh, vamos passar a noite toda\nsozinhos aqui hoje!?"
23005-130 = "E-eu, bem, não tenho problemas com isso, mas...\nO que os outros vão pensar..."
23005-140 = "...Eh, ah,\nfoi uma brincadeira, né..."
23005-150 = "Sim."
23005-160 = "Feliz aniversário,\nSensei."
23005-170 = "Posso confirmar que você\nvai a uma festa de aniversário\nhoje?"
23005-180 = "Eh,\neu também vou junto?"
23005-190 = "Eh, ah...!\nVocê sabia que era\no meu aniversário!?"
23005-200 = "A-au...\nMuito obrigada..."
23005-210 = "Eu não esperava\npor isso de jeito nenhum..."
23005-220 = "Conto com você este ano\ntambém, Sensei."
23005-230 = "Estou feliz por poder passar\nmais um ano ao seu lado,\nSensei."
23005-240 = "Natal...\nÉ bom ter uma época\ntão agitada de vez em quando..."
23005-250 = "Eh? Sair juntos?\nC-comigo!?"
23005-260 = "Feliz Halloween!\nÉ um dia bem agitado,\nSensei."
23005-280 = "...? ...Sensei?\nVocê está aí, não está?"
23005-290 = "Sem meus óculos...\neu não consigo ver muito bem."
23005-300 = "Eh? Ah, sim. É verdade, eu\npraticamente os uso o tempo todo."
23005-310 = "Ah, ahaha... Bem, eu os tiro\npara lavar o rosto, claro."
23005-320 = "M-meu rosto está\nmeio quente..."
23005-330 = "Você acabou me vendo\nem um momento embaraçoso..."
23005-340 = "Hã?! D-dizer que sou fofa...\nIsso não se faz..."
23005-350 = "A-auuu..."
23005-360 = "S-se você ficar me encarando\nassim..."
23005-370 = "É... é embaraçoso..."
23005-2600 = "Ahaha... Não sei se vou conseguir lidar com algo tão incrível, mas se eu pesquisar os manuais e livros relacionados, talvez eu dê um jeito... Muito obrigada, Sensei...!"
