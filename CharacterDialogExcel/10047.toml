[translation]
10047-10 = "Blue... Archive?"
10047-20 = "Acabei de encontrar um caranguejo andando de ladinho na praia.\nSensei, vamos lá ver?"
10047-30 = "Que refrescante~"
10047-40 = "Uau, isso é...\nSorvete?"
10047-50 = "Vamos construir uma casa\npara o caranguejo\naqui por perto."
10047-60 = "Lenço, ok.\nPá, ok...\nSim, acho que dá para fazer um castelo de areia com isso."
10047-70 = "Eu queria brincar de derrubar o graveto na areia\ncom o pessoal do Clube Yin-Yang."
10047-80 = "Bem-vindo de volta, Sensei.\nO que houve hoje~?"
10047-90 = "Sensei, faz tempo..."
10047-100 = "Ah, não faz tanto tempo assim?\nA partir de quando se considera 'muito tempo'?"
10047-110 = "Neste verão, vou fazer\num haiku ainda melhor..."
10047-120 = "Eu fiz um haiku novo recentemente.\nQuer ouvir?"
10047-130 = "Sim, entendi."
10047-140 = "O verão chegou,\nquente e refrescante,\nque delícia."
10047-150 = "Já que é verão, queria algo\nmais brilhante..."
10047-160 = "Ah, perguntou o que estou procurando?"
10047-170 = "...O que será, hein?"
10047-180 = "Ouvi dizer que, quando as pessoas se esforçam, elas conseguem brilhar."
10047-190 = "Onde será que\na gente brilha, hein?"
10047-200 = "...Na testa?"
10047-210 = "Hoje é o seu aniversário, Sensei?"
10047-220 = "Então, feliz aniversário, Sensei~\nGraças a este dia, eu pude te conhecer..."
10047-230 = "Sim, parece um milagre."
10047-240 = "O meu... aniversário?\nObrigada, Sensei."
10047-250 = "Ah, falando nisso, a chefe Niya disse para eu te chamar.\nParece que vão fazer\numa festa de comemoração."
10047-260 = "...Ah, uma festa de\naniversário para mim?\nÉ sério?"
10047-270 = "Feliz Ano Novo~\nConto com você este ano também, Sensei."
10047-280 = "Sensei, Feliz Natal~"
10047-290 = "Será que eu fui uma boa menina este ano?\nSe fui, o Namahage não vai vir, né?"
10047-300 = "Ah, não é bem assim?"
10047-310 = "Gostosuras ou travessuras~"
10047-320 = "Qual você escolhe, Sensei? Travessuras?\nEntão eu fico com as gostosuras."
10047-330 = "...Quem será que vai dar as gostosuras?"
10047-350 = "Sensei, o que houve?"
10047-360 = "Seu rosto está vermelho?"
10047-370 = "Se estiver tudo bem, então está ótimo."
10047-380 = "Mas, Sensei,\nolha aqui, olha aqui."
10047-390 = "O casco da tartaruga é\nmuito duro, sabe~"
10047-400 = "Mas, na verdade, a parte da cauda\né bem fofinha.\nBem fofinha~"
10047-410 = "O que acha?\nQuer tocar também, Sensei?\nÉ bem fofinho."
10047-420 = "Sensei?\nÉ aqui, é aqui?"
10047-430 = "Agora não é\num bom momento...?"
10047-440 = "...Por quê? Como assim?\nSensei~?"
10047-2600 = "Você vai me dar isso?\nUau, obrigada~.\nEntão agora é a minha vez, né?\nFique esperando pelo meu presente~"
