[translation]
10047-10 = "ブル～…アーカイブ？"
10047-20 = "さっき…海辺でしゃかしゃか歩く、\nワタリガニさんを見つけたの。\n先生、一緒に見にいこ？"
10047-30 = "涼しい～"
10047-40 = "わあ、これって…\nアイスクリーム？"
10047-50 = "この辺に、\nワタリガニさんの\nお家を作ろう。"
10047-60 = "ハンカチOK、\nスコップOK…\nうん、これで砂のお城、\n作れそうだね。"
10047-70 = "陰陽部の\nみんなと砂山で\n棒倒しとかしたいな。"
10047-80 = "おかえり、先生\n今日はどうしたの～？"
10047-90 = "先生、久しぶり…"
10047-100 = "あれ、久しぶりって\nほどじゃない？\nどこからが久しぶり？"
10047-110 = "この夏は、\nもっと良い俳句をー…"
10047-120 = "最近、\n新しい俳句を作ったの\n聞きたい？"
10047-130 = "うん、分かった"
10047-140 = "夏が来て\n熱くて冷えて\n美味しいね。"
10047-150 = "せっかくの夏だし、\nもっとキラキラしたものを…"
10047-160 = "え、何を探してるのって？"
10047-170 = "…何だろうね？"
10047-180 = "人は頑張ると、輝く\nことができるって聞いたの。"
10047-190 = "一体、どこが\n光るんだろうね？"
10047-200 = "…おでこ？"
10047-210 = "今日って、先生の誕生日？"
10047-220 = "じゃあ早速お誕生日おめでとう、\n先生～この日があるから、\n私は先生に会えた…"
10047-230 = "うん、奇跡みたいだね。"
10047-240 = "私の、誕生日…?\nありがとう、先生"
10047-250 = "あ、そういえば、ニヤ部長が\n先生を呼んできてって言ってたよ\n何か、お祝いパーティーを\nするんだって。"
10047-260 = "…え、私の\n誕生日パーティー？\nそうなの？"
10047-270 = "あけましておめでとう～\n今年もよろしくね、先生。"
10047-280 = "先生、メリークリスマ～ス。"
10047-290 = "私は今年、良い子だったかな？\nそれなら、なまはげは来ないね。"
10047-300 = "え、ちょっと違う？"
10047-310 = "トリック·オア·トリート～"
10047-320 = "先生はどっち？トリック？\nじゃあ私、オアをやるね。"
10047-330 = "…トリートは誰がやるのかな？"
10047-350 = "先生、どうしたの？"
10047-360 = "顔が赤いよ？"
10047-370 = "大丈夫なら、良いけど。"
10047-380 = "それより先生、\nこっち見て、こっち。"
10047-390 = "亀さんの甲羅はね、\nすごく硬いんだけど～"
10047-400 = "実は尻尾のところは、\nふわふわしてるの。\nふわふわ～って"
10047-410 = "どう？\n先生も触ってみない？\nふわふわだよ。"
10047-420 = "先生？\nこっちだよ、こっち？"
10047-430 = "今はちょっと\n困る…？"
10047-440 = "…なんで？どうして？\n先生～？"
10047-2600 = "これ、くれるの？\nわぁ、ありがと～。\nじゃあ次は、私の番かな～？\nお返し、楽しみにしててね～"
