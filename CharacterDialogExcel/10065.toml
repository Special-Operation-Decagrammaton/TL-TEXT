[translation]
10065-10 = "Blue Archive"
10065-20 = "Sou Kaho, vice-presidente do Conselho Yin-Yang da Academia Hyakkiyako. É um prazer conhecê-lo."
10065-30 = "Se fosse aqui... talvez pudéssemos construir a embaixada de Hyakkiyako..."
10065-40 = "Artigos de Hyakkiyako... onde devo exibi-los?"
10065-50 = "Ah... agora mesmo... senti a presença da minha ídolo favorita...!?"
10065-60 = "Hehe, é bom ver tanto movimento. Esse tipo de atmosfera não é nada mal."
10065-70 = "Tantos alunos de várias academias aqui... Percebi novamente o quão incrível o Schale é."
10065-80 = "Estava à sua espera, Sensei. Como está a sua agenda para hoje?"
10065-90 = "Sim, estou pronta."
10065-100 = "Vamos trabalhar juntos, Hyakkiyako e Schale, lado a lado."
10065-110 = "Chamou por mim?"
10065-120 = "Como vice-presidente do Conselho Yin-Yang, é uma grande honra estar de plantão no Schale, mas..."
10065-130 = "Às vezes fico um pouco insegura se estou fazendo um bom trabalho."
10065-140 = "...Você disse que sempre sou útil?"
10065-150 = "Hehe, muito obrigada. Fico feliz em ouvir isso."
10065-160 = "Quando as coisas ficam difíceis, os artigos da Chise-chan me dão ânimo."
10065-170 = "...Gostaria de um também, Sensei?"
10065-180 = "O Schale é realmente incrível..."
10065-190 = "Conseguir interagir com tantos alunos e ainda manter tudo funcionando tão bem..."
10065-200 = "Hehe, eu também... vou me esforçar para aprender e não ficar para trás."
10065-210 = "Algum dia, por favor, visite o Conselho Yin-Yang em Hyakkiyako."
10065-220 = "Prometo oferecer a melhor hospitalidade."
10065-230 = "Niya-sama e Chise-chan certamente ficarão felizes."
10065-240 = "Hehe, feliz aniversário, Sensei."
10065-250 = "Eu estava justamente planejando um banquete em Hyakkiyako para celebrar o seu dia..."
10065-260 = "Ah, não pode...? Apenas os parabéns já são o suficiente...?"
10065-270 = "Eu achei que fosse uma boa ideia... Não pode mesmo...? Entendo..."
10065-280 = "O-o meu aniversário...?"
10065-290 = "...Não, é que fiquei um pouco surpresa."
10065-300 = "Ser parabenizada por alguém que não é do Conselho Yin-Yang..."
10065-310 = "Estou muito feliz. Obrigada, Sensei."
10065-320 = "Hehe, feliz ano novo, Sensei. Conto com você este ano também."
10065-330 = "É Natal, não é?"
10065-340 = "Dizem que o Papai Noel e o Namahage são parecidos, então este ano, usando isso como tema, poderíamos fazer um evento exclusivo de Hyakkiyako..."
10065-350 = "Hã? Não é bem assim...? Só em Hyakkiyako...?"
10065-360 = "Entendo... Então é uma questão de diferença cultural. Que curioso."
10065-370 = "Feliz Halloween, Sensei!"
10065-380 = "Para não ficar atrás da cultura do Halloween, no próximo Setsubun, vamos dizer 'Feliz Setsubun!' enquanto jogamos feijões."
10065-400 = "Sensei, o que acha?"
10065-410 = "Esses olhos redondos e inocentes... essa expressão de quem está pensando profundamente..."
10065-420 = "Diga-me, não é simplesmente adorável demais!?"
10065-430 = "Ah, essa forma que os céus criaram... é magnífica..."
10065-440 = "Valeu a pena viver por isso...!"
10065-450 = "Sim. Elas são realmente todas adoráveis e muito preciosas para mim."
10065-460 = "As adoráveis, as descoladas, as frias, as belas..."
10065-470 = "Hehe... é como se fossem os alunos de Hyakkiyako."
10065-480 = "Como todos são diferentes, às vezes acabam entrando em conflito, mas..."
10065-490 = "Penso que cada um deles é um aluno precioso com uma personalidade brilhante."
10065-500 = "Se... Sensei...!? Uu... de repente, assim..."
10065-510 = "Ah, ah... obri... gado... Sensei..."
10065-2600 = "Receber algo tão especial assim do Sensei... Farei o meu melhor para retribuir essa confiança com um desempenho à altura. Muito obrigada, Sensei."
