[translation]
10065-10 = "ブルーアーカイブ"
10065-20 = "百鬼夜行連合学院、陰陽部副部長、\n桑上カホと申します。\nどうぞよろしくお願い致します。"
10065-30 = "ここになら…\n百鬼夜行の\n大使館を建てても…"
10065-40 = "百鬼夜行のグッズ…\nどこに飾りましょう？"
10065-50 = "はっ…今…\nマイスイートアイドルの\n気配がっ…！？"
10065-60 = "ふふっ、\n賑やかで良いですね。\nこういう雰囲気も\n悪くないものです。"
10065-70 = "様々な学園の\n生徒がこんなに…\n改めて、シャーレのすごさを\n実感しました。"
10065-80 = "お待ちしておりました、先生。\n本日のご予定は\nいかがでしょうか？"
10065-90 = "はい、準備はできております。"
10065-100 = "百鬼夜行とシャーレ、\n二人三脚で頑張りましょう。"
10065-110 = "お呼びでしょうか？"
10065-120 = "陰陽部の副部長として、\nシャーレの当番になったことは\nとても光栄なのですが…"
10065-130 = "上手くやれているか、\n少し不安に\nなる時があります。"
10065-140 = "…いつも\n助かっている、ですか？"
10065-150 = "ふふっ、\nありがとうございます。\n良かったです。"
10065-160 = "辛い時は、\nチセちゃんのグッズに\n元気をもらっています。"
10065-170 = "…先生もお一ついかがですか？"
10065-180 = "シャーレは本当に\nすごいですね…"
10065-190 = "こんなにたくさんの生徒と\n交流しながらうまく\nやれているだなんて…"
10065-200 = "ふふ、私も…\n負けないよう、頑張って\n学んでいきますね。"
10065-210 = "いつか、\n百鬼夜行の陰陽部に\nお越しください。"
10065-220 = "最高のおもてなしを\nお約束します。"
10065-230 = "ニヤ様も、チセちゃんも\nきっと喜びます。"
10065-240 = "ふふっ、お誕生日\nおめでとうございます。先生。"
10065-250 = "ちょうど、先生のために\n百鬼夜行で祝宴を\n企画していまして…"
10065-260 = "えっ、ダメ…ですか？\nお祝いの言葉だけで十分…？"
10065-270 = "良いアイデアだと思ったのに…\nダメですか…そうですか…"
10065-280 = "わ、私の誕生日…ですか？"
10065-290 = "…いえ、少し驚いただけです。"
10065-300 = "陰陽部員以外の\n人から祝われるなんて…"
10065-310 = "嬉しいです。\nありがとうございます、先生。"
10065-320 = "ふふ、明けまして\nおめでとうございます、\n先生。今年もよろしく\nお願い致しますね。"
10065-330 = "クリスマスですね。"
10065-340 = "サンタクロースとなまはげは\n似ていると言われますから、\n今年はそれをネタに\n百鬼夜行独自のイベントを…"
10065-350 = "え？そんな事ない…？\n百鬼夜行だけ…？"
10065-360 = "なるほど…\n文化の違いという\nものなのですね。\n不思議です。"
10065-370 = "ハッピーハロウィーン！\nです、先生。"
10065-380 = "ハロウィーン文化に\n負けないよう、百鬼夜行も\n次の節分は「はっぴー節分！」\nと言って豆を投げる\n事にしましょう。"
10065-400 = "先生、いかがでしょう？"
10065-410 = "この無邪気なまん丸の瞳に…\n深く考え込むような表情…"
10065-420 = "もう、本当にめちゃくちゃ\n可愛くないですか！？"
10065-430 = "はぁ天が与えた造形…\n最高…"
10065-440 = "生きててよかった…！"
10065-450 = "はい。本当に、\nみんな可愛くて\n大切な子なんです。"
10065-460 = "愛くるしい子、\n格好良い子、\nクールな子、\n美しい子…"
10065-470 = "ふふっ…\nまるで百鬼夜行の\n生徒みたいですね。"
10065-480 = "みんな違うからこそ、\n時にぶつかる事もありますが…"
10065-490 = "それぞれが輝く個性を\n持った大切な生徒だな、\nと思いまして。"
10065-500 = "せ…先生…！？\nうぅ…急にそんな…"
10065-510 = "あ、あ…ありが‥…とう…\nございます…先生…"
10065-2600 = "このように特別な物を\n先生から頂けるだなんて…\n期待に恥じない活躍ができるよう、\n尽力いたします。\nありがとうございます、先生。"
