[translation]
10093-10 = "ブルーアーカイブ～"
10093-20 = "あっ！先生だ！ヤッホー！キララだよ！\nあたしのこと待ってたの？あははっ！嬉しいな！"
10093-30 = "どっかに友達に\nなれそうな子、\n居ないかな～"
10093-40 = "結構広い場所だね！\n超気に入ったかも！"
10093-50 = "あっ？先生！\n先生！こっち！"
10093-60 = "角度をこうしたら……\nうん！自撮りに\nぴったりかも！"
10093-70 = "ここのカフェ、パフェも\n売ってるのかな？甘い\nもの食べたいんだけど～"
10093-80 = "おっはよ～先生！\n今日も忙しい？"
10093-90 = "今日のお当番は\nキララちゃんです～"
10093-100 = "超ドキドキしない？\n先生もそう思う？"
10093-110 = "昨日友達と行ったカフェがね、\nホントすごかったの！\n今度一緒行こ！"
10093-120 = "先生、ちょっと疲れてない？\nあっちで一休みしよっか？"
10093-130 = "うわぁ……この仕事量、\nあたしだったら諦めてたかも！\n先生、有能なんだね～"
10093-140 = "先生、昨日の自撮り見る？\nどう？可愛いでしょ～"
10093-150 = "え？スマホの壁紙に……？"
10093-160 = "そ、それはちょっと\n恥ずかしいかもぉ！？"
10093-170 = "仕事なんてササッと終わらせて、\n遊びに行こうよ！"
10093-180 = "お誕生日おめでとう、先生！"
10093-190 = "プレゼントは……あたしだよ！"
10093-200 = "今日一日、先生とずっと\n一緒だから、よろしくね！"
10093-210 = "あははっ！\nやっぱ覚えててくれたんだ！"
10093-220 = "ありがと！\nおかげで元気100%回復だよ！"
10093-230 = "今年は去年より、\n超キラキラで、\nもっとワイワイしてほしいなあ！"
10093-240 = "あ、先生！\nメリークリスマス！"
10093-250 = "この飴？先生にあげるね！\nはい、あ～んして！"
10093-270 = "どうしたの？先生。\nもじもじして。"
10093-280 = "そんなんじゃ、\n休み時間終わっちゃうよ？"
10093-290 = "あ～もしかして、\nペディキュアの\n塗り方わからないとか？"
10093-300 = "やり方は簡単だよ！\nまず塗るところをよ～く見て……"
10093-310 = "ひゃっ……う、うん！\nそうやって！"
10093-320 = "そ、その……\n顔、近すぎじゃないかなあ……\nあははっ！"
10093-330 = "先生、鼻息めっちゃ\n当たるんだけど……？"
10093-340 = "せ、先生に任せるのは、\nやっぱちょっと\n恥ずかしいかも……。"
10093-350 = "あははっ！ううん！\nな、なんでもないよ！"
10093-360 = "早く塗って、勉強に戻ろ！"
10093-2600 = "先生…これ、あたしにくれるの？\nさ、サンキュー！\nううん、こういう時は\n真面目に言うべきだね。\nありがとう、先生。"
