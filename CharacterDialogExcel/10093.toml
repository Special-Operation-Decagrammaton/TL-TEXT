[translation]
10093-10 = "Blue Archive~"
10093-20 = "Ah! Sensei! Yahoo! É a Kirara! \nVocê estava me esperando? Ahaha! Que legal!"
10093-30 = "Será que não tem\nalguém por aqui\nque possa ser minha amiga?"
10093-40 = "Que lugar espaçoso! \nAcho que adorei!"
10093-50 = "Ah? Sensei! \nSensei! Aqui!"
10093-60 = "Se eu ajustar o ângulo assim... \nIsso! Acho que ficou perfeito\npara uma selfie!"
10093-70 = "Será que esse café\nvende parfait também? \nQueria comer algo doce~"
10093-80 = "Bom dia, Sensei! \nEstá ocupado hoje também?"
10093-90 = "A responsável de hoje\né a Kirara~"
10093-100 = "Não é super emocionante? \nVocê não acha, Sensei?"
10093-110 = "O café que eu fui ontem com uma amiga, \nfoi incrível! \nVamos juntos da próxima vez!"
10093-120 = "Sensei, você não está um pouco cansado? \nQue tal descansarmos ali?"
10093-130 = "Uau... com essa quantidade de trabalho, \neu já teria desistido! \nVocê é muito competente, Sensei~"
10093-140 = "Sensei, quer ver a selfie de ontem? \nO que achou? Estou bonita, né?"
10093-150 = "Hã? Como papel de parede do celular...?"
10093-160 = "I-isso é um pouco\nvergonhoso, sabia!?"
10093-170 = "Vamos terminar esse trabalho logo\npara a gente ir se divertir!"
10093-180 = "Feliz aniversário, Sensei!"
10093-190 = "O presente... sou eu!"
10093-200 = "Vou ficar com você o dia todo hoje, \nentão conto com você!"
10093-210 = "Ahaha! \nSabia que você ia lembrar!"
10093-220 = "Obrigada! \nGraças a isso, recuperei 100% das minhas energias!"
10093-230 = "Espero que este ano seja\nainda mais brilhante e\nanimado que o ano passado!"
10093-240 = "Ah, Sensei! \nFeliz Natal!"
10093-250 = "Esse doce? Vou te dar! \nVamos, abre a boca!"
10093-270 = "O que foi, Sensei? \nEstá todo tímido."
10093-280 = "Desse jeito, \no intervalo vai acabar, sabia?"
10093-290 = "Ah~ será que você\nnão sabe como\npassar esmalte?"
10093-300 = "É fácil! \nPrimeiro, olhe bem para onde vai pintar..."
10093-310 = "Hya... s-sim! \nIsso mesmo!"
10093-320 = "E-esse... \nSeu rosto não está perto demais...? \nAhaha!"
10093-330 = "Sensei, sua respiração está\nbatendo toda em mim...?"
10093-340 = "D-deixar na mão do Sensei, \nno fim das contas, \né um pouco vergonhoso..."
10093-350 = "Ahaha! Não, não! \nN-não é nada!"
10093-360 = "Vamos terminar logo para voltar aos estudos!"
10093-2600 = "Sensei... isso é para mim? \nS-sankyu! \nNão, nessas horas\neu deveria falar sério. \nObrigada, Sensei."
