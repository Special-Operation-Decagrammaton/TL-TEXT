[translation]
20048-10 = "Blue... Archive."
20048-20 = "Como vai, Sensei. Espero que este descanso seja um momento de paz para o seu coração."
20048-30 = "(Eu gostaria de... me deitar um pouco...)"
20048-40 = "Todos são tão... livres, não é?"
20048-50 = "Este é um lugar maravilhoso, com uma brisa suave."
20048-60 = "Esta decoração... será uma ótima referência para interiores."
20048-70 = "Café... talvez eu deva aproveitar esta oportunidade para experimentar."
20048-80 = "Eu estava à sua espera, Sensei."
20048-90 = "Eu estava verificando a carga de trabalho, mas..."
20048-100 = "Acho que hoje poderemos realizar as tarefas com calma."
20048-110 = "Claro, eu ajudarei você."
20048-120 = "Falaremos sobre os documentos mais tarde. Primeiro... tome isto."
20048-130 = "Vamos aproveitar um pouco de chá antes."
20048-140 = "Será por causa do fim das férias? Não consigo me concentrar no trabalho de jeito nenhum..."
20048-150 = "Ainda assim, é justamente por causa da rotina diária que os dias de folga brilham."
20048-160 = "Da mesma forma que o amargor do chá realça a doçura dos doces."
20048-170 = "Embora, claro, haja momentos em que eu gostaria de saborear apenas o que é doce..."
20048-180 = "Fufu... Sim, vamos voltar ao trabalho, Sensei."
20048-190 = "Fufu, feliz aniversário, Sensei."
20048-200 = "Eu reservei um hotel resort para você."
20048-210 = "Que tal passar o dia de hoje sem ser incomodado por ninguém?"
20048-220 = "Sobre este traje?"
20048-230 = "Pensei em associar a imagem do meu aniversário ao verão e ao traje de banho que você tanto gosta."
20048-240 = "Para que, quando esta estação chegar, você possa se lembrar de mim."
20048-250 = "Para isso, um pouco de ousadia é mais eficaz, não acha?"
20048-260 = "Feliz Ano Novo, Sensei."
20048-270 = "Ambos estamos sempre muito ocupados, mas... para que possamos ter tempo de relaxar novamente,"
20048-280 = "vamos nos dedicar ao trabalho diário este ano também."
20048-290 = "Este traje é, por assim dizer, uma promessa para isso."
20048-300 = "..."
20048-310 = "Atchim."
20048-320 = "Sensei, poderia me dizer seus planos para agora? Se não se importar..."
20048-330 = "Que tal nos sentarmos perto da lareira e desfrutarmos de alguns doces?"
20048-340 = "Afinal, um festival não precisa ser apenas sobre agitação e barulho."
20048-350 = "Mesmo sendo Halloween, hesito em sair pela cidade com este traje."
20048-360 = "De qualquer forma, ainda há uma pilha de casos que precisam ser resolvidos hoje."
20048-370 = "Sim? Doce ou travessura...?"
20048-380 = "Fufu, então aqui está o doce. É um quitute feito com folhas de chá. Aproveite."
20048-390 = "Foi uma boa ideia me preparar. Só de ver essa sua expressão, já estou satisfeita."
20048-400 = "Eu estava à sua espera, Sensei."
20048-410 = "Eu estava verificando a carga de trabalho, mas..."
20048-420 = "Acho que hoje poderemos realizar as tarefas com calma."
20048-430 = "Claro, eu ajudarei você."
20048-440 = "Falaremos sobre os documentos mais tarde. Primeiro... tome isto."
20048-450 = "Vamos aproveitar um pouco de chá antes."
20048-460 = "Será por causa do fim das férias? Não consigo me concentrar no trabalho de jeito nenhum..."
20048-470 = "Ainda assim, é justamente por causa da rotina diária que os dias de folga brilham."
20048-480 = "Da mesma forma que o amargor do chá realça a doçura dos doces."
20048-490 = "Embora, claro, haja momentos em que eu gostaria de saborear apenas o que é doce..."
20048-500 = "Fufu... Sim, vamos voltar ao trabalho, Sensei."
20048-510 = "Fufu, feliz aniversário, Sensei."
20048-520 = "Eu reservei um hotel resort para você."
20048-530 = "Que tal passar o dia de hoje sem ser incomodado por ninguém?"
20048-540 = "Sobre este traje?"
20048-550 = "Pensei em associar a imagem do meu aniversário ao verão e aos trajes de banho que você tanto gosta, Sensei."
20048-560 = "Para que, quando esta estação chegar, você possa se lembrar de mim."
20048-570 = "Para isso, algo um pouco mais estimulante seria mais eficaz, não acha?"
20048-580 = "Feliz Ano Novo, Sensei."
20048-590 = "Ambos estamos muito ocupados, mas... para que possamos ter tempo de relaxar novamente,"
20048-600 = "vamos nos dedicar ao nosso trabalho diário este ano também."
20048-610 = "Este traje é, por assim dizer... uma forma de fazer um pedido."
20048-620 = "……"
20048-630 = "Atchim."
20048-640 = "Sensei, posso perguntar quais são seus planos para agora? Se não se importar..."
20048-650 = "Que tal nos sentarmos perto da lareira e desfrutarmos de alguns doces?"
20048-660 = "Afinal, aproveitar um festival não significa apenas sair por aí fazendo barulho."
20048-670 = "Mesmo sendo Halloween, hesito em sair pela cidade vestida assim."
20048-680 = "De qualquer forma, ainda há uma pilha de assuntos que precisam ser resolvidos hoje."
20048-690 = "Sim? Doces ou travessuras...?"
20048-700 = "Fufu, então aqui está o doce. É um quitute feito com folhas de chá. Por favor, aceite."
20048-710 = "Foi bom ter me preparado. Só de ver essa sua expressão, já estou satisfeita."
20048-730 = "...O que aconteceu para você estar aqui?"
20048-740 = "Você parece tão exausto..."
20048-750 = "...? Poderia ser um pouco mais específico?"
20048-760 = "O mar é um lugar onde um pequeno erro pode levar a um acidente perigoso."
20048-770 = "Você não está sendo muito claro..."
20048-780 = "Dependendo da situação, a resposta necessária muda, então—"
20048-790 = "Entendo, era isso então."
20048-800 = "Fico aliviada em saber que não era uma situação perigosa."
20048-810 = "Dizem que o primeiro desafio do surfe é conseguir encontrar o equilíbrio."
20048-820 = "É algo que todos passam no começo."
20048-830 = "Dito isso... mesmo que você queira descansar,"
20048-840 = "você vai acabar pegando um resfriado desse jeito."
20048-850 = "Venha por aqui."
20048-860 = "Preparei uma bebida quente para você."
20048-2600 = "Embora seja uma arma pequena... a responsabilidade que ela carrega não é nada leve. Para que eu não seja esmagada por esse peso... por favor, cuide de mim."
