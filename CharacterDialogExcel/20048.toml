20048-700 = "ふふっ、ではトリートを。\n紅茶の茶葉を使った\nお菓子です。どうぞ。"
20048-710 = "準備しておいて正解でしたね。\n先生のその表情を\n見られただけで満足です。"
20048-730 = "……こんなところで\nどうなさったんですか？"
20048-740 = "そんなに\nぐったりとされて……。"
20048-750 = "……？もう少し具体的に\n伺っても？"
20048-760 = "海は、一歩間違えば危険な\n事故につながりかねない\n場所ですから。"
20048-770 = "要領を得ませんね……。"
20048-780 = "状況に応じて、求められる\n対応は異なりますので――"
20048-790 = "なるほど、\nそういうことでしたか。"
20048-800 = "危険な状態ではなかったようで、\n一安心です。"
20048-810 = "バランス感覚を掴むまでが、\nサーフィンの最初の\n山場とも申します。"
20048-820 = "最初のうちは、\n誰もが経験することですよ。"
20048-830 = "とはいえ……\n休憩されるにしても、"
20048-840 = "それではお身体が\n冷えてしまいますね。"
20048-850 = "こちらへどうぞ。"
20048-860 = "温かい飲み物も\nご用意しておりますので。"
20048-2600 = "小型の銃ではありますが……\nこれが担う責任は、決して軽くありません。\nその重さに押しつぶされてしまわぬように。\n私を、どうか見守っていてください。"
