[translation]
20059-10 = "ブルーアーカイブ！くふふっ！"
20059-20 = "くふふっ、ムツキちゃんだいへんし～ん！\nさ、何して欲しい？なんでも言ってごらん？"
20059-30 = "ここでみんなと\nドレスパーティー\nしたいな～"
20059-40 = "くふふっ、\n先生ってこういうの\nが好きなんだ？"
20059-50 = "誰か遊んで\nくれないかなぁ～？"
20059-60 = "あれ、いじったら\n面白そう♪"
20059-70 = "くふふっ！\n楽しいなぁ〜\nなんか\n好きなんだよね、ここ"
20059-80 = "いらっしゃい、先生！"
20059-90 = "ドレス姿の可愛い\nムツキちゃんを待たせるなんて、"
20059-100 = "いいご身分だねぇ？"
20059-110 = "こっちこっち！\n今日は何して遊ぶ？"
20059-120 = "どう？ムツキちゃん、\n大人っぽい？"
20059-130 = "くふっ。正直に言って\nいいんだよ？"
20059-140 = "今日の私はいつもより\n\"大人\"なんだから。"
20059-150 = "問題でーす！\nどうしてムツキちゃんはドレスを\n着ているのでしょう！"
20059-160 = "当てられたら特別な\nプレゼントをあ・げ・る♪"
20059-170 = "間違えたら罰として〜"
20059-180 = "……私の\n椅子になってもらおっかな♪"
20059-190 = "今日はいつもより\n大人っぽい遊びをしようよ。"
20059-200 = "何をするかは\n……先生が決めていいよ？"
20059-210 = "さっき「お姉さん」って\n呼ばれちゃった。\nドレス着てたからかな？"
20059-220 = "くふふっ。\n先生からも呼ばれてみたいな～？"
20059-230 = "このドレス、\n便利屋のみんなと選んだの。"
20059-240 = "特別な思い出の服だからね、\n大切に着たいんだ。"
20059-250 = "先生、今日誕生日だよね？"
20059-260 = "じゃあパーティーしよっ！\nパーティー♪"
20059-270 = "あははっ！\nお祝いしてくれてありがと、\n先生♪"
20059-280 = "先生が喜ぶかなって思って\nドレスを着てみたんだけど……\nどう？嬉しい？"
20059-290 = "先生、あけおめ～\n今年も楽しい一年に\nなるといいね♪"
20059-300 = "先生もそう思うでしょ？"
20059-310 = "クリスマスに\nドレスを着るのって、\n何か特別な意味があるのかな？"
20059-320 = "一緒に調べてみない？\nくふふっ。"
20059-330 = "私のドレスが赤い理由\n……なんでか分かる？"
20059-340 = "血がついても\n目立たないから――"
20059-350 = "なーんて！\nあははっ！騙された～？"
20059-370 = "あのね？こう見えても私、"
20059-380 = "結構信頼してるんだよ？\n先生のこと。"
20059-390 = "え、意外？"
20059-400 = "……いつも\nイタズラばっかりしてるから？"
20059-410 = "くふふっ。\n私だって誰彼構わず\nやるわけじゃないって。"
20059-420 = "まあ、だから\n……そのお金をどうするかは、\n任せるよ。"
20059-430 = "先生なら、\nちゃんと意味のあることに\n使ってくれるでしょ？"
20059-440 = "どっかに寄付してもいいし、"
20059-450 = "先生の\n活動資金にしてもいいし……。"
20059-460 = "それが嫌なら、\n先生が預かるってことにして――"
20059-470 = "私たちの未来の\nために取っておいても、\nいいかもね？"
20059-480 = "え？何を言っているのかって？"
20059-490 = "くふふっ！さあ？"
20059-500 = "どういう意味だろうね♪"
20059-2600 = "くふふっ♪これこれ〜\nこの手応えが好きなんだよね～"
