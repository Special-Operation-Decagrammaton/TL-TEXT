[translation]
20059-10 = "Blue Archive! Kufufu!"
20059-20 = "Kufufu, a Mutsumi-chan vai se transformar~! Então, o que quer que eu faça? Pode pedir qualquer coisa."
20059-30 = "Queria fazer uma festa a fantasia aqui com todo mundo~"
20059-40 = "Kufufu, então o Sensei gosta dessas coisas, é?"
20059-50 = "Será que alguém vai brincar comigo~?"
20059-60 = "Ah, parece divertido mexer nisso ♪"
20059-70 = "Kufufu! Que legal~ Meio que... gosto daqui, sabe."
20059-80 = "Bem-vindo, Sensei!"
20059-90 = "Fazer a Mutsumi-chan, toda bonita de vestido, esperar..."
20059-100 = "Você se acha muito importante, hein?"
20059-110 = "Aqui, aqui! O que vamos fazer hoje?"
20059-120 = "Que tal? A Mutsumi-chan está mais madura?"
20059-130 = "Kufu. Pode falar a verdade, sabia?"
20059-140 = "Hoje eu estou mais 'adulta' do que o normal."
20059-150 = "Pergunta! Por que a Mutsumi-chan está vestindo esse vestido?"
20059-160 = "Se acertar, ganha um presente especial de minha parte ♪"
20059-170 = "Se errar, a penalidade é..."
20059-180 = "... Você vai ser a minha cadeira, tá bem?"
20059-190 = "Hoje vamos fazer uma brincadeira mais adulta."
20059-200 = "O que vamos fazer... pode escolher, Sensei?"
20059-210 = "Agora pouco me chamaram de 'mocinha'. Deve ser por causa do vestido, né."
20059-220 = "Kufufu. Queria ser chamada assim pelo Sensei também~"
20059-230 = "Esse vestido, eu escolhi com a galera da Empresa de Conveniência."
20059-240 = "É uma roupa de memórias especiais, então quero usar com cuidado."
20059-250 = "Sensei, hoje é seu aniversário, né?"
20059-260 = "Então vamos fazer uma festa! Festa ♪"
20059-270 = "Ahaha! Obrigada por comemorar comigo, Sensei ♪"
20059-280 = "Pensei que o Sensei fosse gostar, então vesti o vestido... Gostou? Ficou feliz?"
20059-290 = "Sensei, feliz Ano Novo~ Espero que este ano seja divertido também ♪"
20059-300 = "Você concorda comigo, né?"
20059-310 = "Usar um vestido no Natal... será que tem algum significado especial?"
20059-320 = "Que tal a gente descobrir juntos? Kufufu."
20059-330 = "O motivo do meu vestido ser vermelho... você sabe por quê?"
20059-340 = "É pra disfarçar quando sujar de sangue –"
20059-350 = "Brincadeira! Ahaha! Caiu, né?"
20059-370 = "Quer saber? Mesmo com essa minha cara..."
20059-380 = "Eu confio bastante em você, sabia?"
20059-390 = "Hã, surpreso?"
20059-400 = "... Porque eu só fico pregando peça em você?"
20059-410 = "Kufufu. Não faço isso com qualquer um, não."
20059-420 = "Então... o que fazer com esse dinheiro... vou deixar na sua mão."
20059-430 = "Com você, vai saber usar em algo que preste, né?"
20059-440 = "Pode doar pra alguma instituição..."
20059-450 = "Pode usar nas suas atividades..."
20059-460 = "Se não quiser, você fica com ele, e..."
20059-470 = "Quem sabe a gente guarda para o nosso futuro?"
20059-480 = "Hã? Que foi? Não entendeu o que eu disse?"
20059-490 = "Kufufu! Ora, ora..."
20059-500 = "O que será que eu quis dizer, hein ♪"
20059-2600 = "Kufufu ♪ Isso aí... É disso que eu gosto mesmo~"