[translation]
20059-10 = "Blue Archive! Ку-фу-фу!"
20059-20 = "Ку-фу-фу, Муцуки-тян перевоплотилась! Ну, и чего ты от меня хочешь? Проси о чём угодно!"
20059-30 = "Я хочу устроить здесь вечеринку в платьях вместе со всеми."
20059-40 = "Ку-фу-фу, так вот какие вещи тебе по вкусу, Сенсей?"
20059-50 = "Интересно, придёт ли кто-нибудь со мной поиграть?"
20059-60 = "О, а вот с этим было бы весело поиграться."
20059-70 = "Ку-фу-фу! Как же весело. Сама не знаю почему, но мне здесь безумно нравится."
20059-80 = "Добро пожаловать, Сенсей!"
20059-90 = "Заставить такую милашку в платье, как Муцуки-чан, ждать..."
20059-100 = "а у тебя отличная выдержка, не находишь?"
20059-110 = "Сюда, сюда! Во что мы сегодня играем?"
20059-120 = "Ну как? Я выгляжу взрослой, Сенсей?"
20059-130 = "Хех. Можешь ответить честно, понимаешь?"
20059-140 = "Сегодня я куда более «взрослая», чем обычно."
20059-150 = "Мини-викторина! Как думаешь, почему Муцуки-тян сегодня в платье?"
20059-160 = "Если угадаешь, я сделаю тебе особенный подарок!"
20059-170 = "А если ошибёшься, то в наказание..."
20059-180 = "...мне, пожалуй, придётся сделать из тебя свой стул!"
20059-190 = "Давай сегодня сыграем во что-нибудь более взрослое, чем обычно."
20059-200 = "А чем именно мы займёмся... я позволю решить тебе, Сенсей."
20059-210 = "Чуть раньше меня кто-то назвал «юной леди». Интересно, это всё из-за платья?"
20059-220 = "Ку-фу-фу. Я бы тоже не отказалась услышать это от тебя, Сенсей!"
20059-230 = "Я выбирала это платье вместе со всей нашей бандой из Клуба 68."
20059-240 = "Оно полно особенных воспоминаний, так что я хочу беречь его."
20059-250 = "Сенсей, сегодня ведь твой день рождения, верно?"
20059-260 = "Тогда устроим вечеринку! Вечеринку!"
20059-270 = "Ахаха! Спасибо, что празднуешь вместе со мной, Сенсей!"
20059-280 = "Я надела это платье, потому что подумала, что оно тебя порадует... Ну так что, порадовал?"
20059-290 = "С Новым годом, Сенсей! Надеюсь, этот год тоже принесёт нам кучу веселья."
20059-300 = "Ты ведь тоже так думаешь, Сенсей?"
20059-310 = "Есть ли какой-то особый смысл в том, чтобы надевать вечернее платье на Рождество?"
20059-320 = "Почему бы нам не разузнать об этом вместе? Ку-фу-фу."
20059-330 = "А ты знаешь, почему моё платье именно красное?"
20059-340 = "Это на случай, если на него попадёт кровь — так будет незаметно..."
20059-350 = "Да шучу я! Ахаха! Ну что, я тебя провела?"
20059-370 = "Знаешь что? Пусть я и веду себя вот так,"
20059-380 = "но на самом деле я тебе очень даже доверяю, Сенсей."
20059-390 = "Ой, неужели это так удивительно?"
20059-400 = "...Это из-за того, что я вечно всех разыгрываю?"
20059-410 = "Ку-фу-фу. Я ведь не с каждым так поступаю, знаешь ли."
20059-420 = "Ну так вот... я оставляю за тобой право решать, что делать с этими деньгами."
20059-430 = "Если это ты, Сенсей, я уверена, ты найдёшь им отличное применение, верно?"
20059-440 = "Ты мог бы пожертвовать их куда-нибудь,"
20059-450 = "или пустить на нужды Шале..."
20059-460 = "А если тебе это не нравится, можешь просто припрятать их —"
20059-470 = "и, например, отложить на наше совместное будущее?"
20059-480 = "А? Что я имею в виду?"
20059-490 = "Ку-фу-фу! Кто знает?"
20059-500 = "Что же это могло значит?"
20059-2600 = "Ку-фу-фу! Вот это, прямо вот это... Обожаю это чувство."