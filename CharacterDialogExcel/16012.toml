[translation]
16012-10 = "Blue Archive~!"
16012-20 = "Professor, feliz ano novo! Vamos procurar algo gostoso para comer juntos!"
16012-30 = "Um lugar... interessante, em vez de apenas maravilhoso, não é?"
16012-40 = "De alguma forma... sinto um cheiro... delicioso."
16012-50 = "Tenho que tomar cuidado para não me sujar."
16012-60 = "Sempre que estou prestes a comer algo gostoso, parece que algo sempre atrapalha..."
16012-70 = "Tudo bem, com certeza vou crescer! Ainda tenho potencial, não tenho...?"
16012-80 = "Bem-vindo de volta, Professor! Termine logo esse trabalho e vamos comer algo gostoso!"
16012-90 = "Eu também vou ajudar!"
16012-100 = "Ora, Professor, onde você estava? Hã? Por que eu estava esperando? É porque eu..."
16012-110 = "...Esquece, o que você quer que eu diga?!"
16012-120 = "Por acaso você ficou encantado com meu quimono?"
16012-130 = "C-claro que sim. Você não está me confundindo com uma simples comilona, está?"
16012-140 = "Qual é o meu prato de Osechi favorito? Hmmm, é difícil escolher. É que tudo é tão gostoso!"
16012-150 = "Ei, até quando você vai ficar trabalhando?"
16012-160 = "Vamos logo, vamos sair para nos divertir."
16012-170 = "Ah... se eu fosse boa na cozinha... assim poderíamos fazer algo juntos."
16012-180 = "O que foi? Ficou carente?"
16012-190 = "N-não é que eu esteja pensando nisso!"
16012-200 = "Hehe, hoje é seu aniversário, Professor. Como celebração, vou sair com você!"
16012-210 = "Você não esqueceu o meu aniversário, esqueceu? Prepare-se logo, vamos sair!"
16012-220 = "Fufu... o que será que você vai me convidar para comer hoje?"
16012-230 = "Feliz ano novo, Professor! Este visual?"
16012-240 = "O-olha... é ano novo, né. O-o que achou...? Eu estava pensando se você não tinha algum comentário..."
16012-250 = "Combina comigo? E-estou bonita...?"
16012-260 = "P-pare! J-já chega!"
16012-270 = "O Natal também tem muita comida gostosa! Desta vez..."
16012-280 = "Espero que ninguém atrapalhe na hora de comer."
16012-290 = "O Halloween, comparado a outros festivais, parece um pouco sem graça... Será que é porque é só abóbora?"
16012-300 = "Bem, como é gostoso, tudo bem!"
16012-320 = "Aqui, Professor. Vou te dar um."
16012-330 = "Ei, por que está tão surpreso! V-veio a mais por acaso!"
16012-340 = "Quer dizer, isso foi você quem comprou... Além disso, hoje o dia todo..."
16012-350 = "(Pensando bem, hoje passei o dia todo com o Professor...)"
16012-360 = "(Ai, o que eu estou pensando!)"
16012-370 = "Já chega! Eu disse que vou te dar, então aceite!"
16012-2600 = "Eu me tornei mais forte... ...Só vou dizer isso uma vez, então escute com atenção! Aquilo... obrigado. Tudo isso é graças a você, Professor. Sou muito grata."
