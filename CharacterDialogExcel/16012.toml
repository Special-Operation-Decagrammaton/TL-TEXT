[translation]
16012-10 = "ブルーアーカイブ～！"
16012-20 = "先生、あけましておめでとうー！\n一緒においしいもの、探しに行きましょ！"
16012-30 = "素敵な……という\nより、面白そうな\nところね？"
16012-40 = "なんだか……\nおいしそうな\n匂いが……。"
16012-50 = "汚さないように\n気をつけないと。"
16012-60 = "おいしいものを\n食べようとしてる\nときに限って、いつも\n邪魔が入るような……。"
16012-70 = "大丈夫、きっと\n大きくなれるはず！\nまだ可能性は\nあるわよね……？"
16012-80 = "おかえりなさい、先生！\n早く仕事なんて終わりにして\nおいしいもの食べに行きましょ！"
16012-90 = "私も手伝うから！"
16012-100 = "もう、先生ったらどこ\n行ってたのよ？えっ、\nなんで待ってたのかって？\nそんなの先生のことが…"
16012-110 = "…って、なに言わせる気よ！"
16012-120 = "もしかして、着物姿に\n見惚れちゃった？"
16012-130 = "と、当然でしょ。私をただの\n食いしん坊と勘違いしてるん\nじゃないの？"
16012-140 = "一番好きなおせち料理？\nん～、選ぶのが難しいなぁ。\nだってどれもおいしいんだもの！"
16012-150 = "ね～、いつまで仕事\nしてるの～？"
16012-160 = "はやく～はやく\n遊びに行きましょうよ～。"
16012-170 = "はぁ……私が料理上手\nだったらなぁ。そうしたら\n一緒に何か作れるのに。"
16012-180 = "なあに？\n寂しくなっちゃったの？"
16012-190 = "べ、別に私がそう思ってる\nわけじゃなくて！"
16012-200 = "えへへ、今日は先生の\nお誕生日ね。お祝いに\n一緒にお出かけしてあげる！"
16012-210 = "私の誕生日、忘れた\nわけじゃないでしょ？\n早く支度して行くわよ！"
16012-220 = "ふふ……今日は何を\nごちそうしてもらおっかな～？"
16012-230 = "あけましておめでとう、先生！\nこの格好？"
16012-240 = "ほ、ほら……お正月だからね。\nど、どうかな……？なんか\n感想とかないのかな～って。"
16012-250 = "似合ってる？か、可愛い……？"
16012-260 = "す、ストップ！\nも、もういいから！"
16012-270 = "クリスマスもおいしいものが\nいっぱいだよね！\n今度こそ……"
16012-280 = "食べる時邪魔されないと\nいいんだけど。"
16012-290 = "ハロウィーンって、他の\nお祭りと比べてちょっと\n物足りないというか……。\nカボチャばかりだからかな？"
16012-300 = "ま、おいしいから\nいいんだけどね！"
16012-320 = "はい、先生。一個あげる、"
16012-330 = "って、なんでそんなに驚くの！\nた、たまたま多く入ってたの！"
16012-340 = "というかこれ、先生が\n買ってくれたものだし……。\nそれに、今日は一日中……。"
16012-350 = "(そういえば、今日は\nずっと先生と……)"
16012-360 = "(わ、私ってば、\n何を考えてるの！)"
16012-370 = "もう！私があげるって\n言ってるんだからいいじゃない！"
16012-2600 = "私、強くなったんだね……。\n……一度しか言わないから、\nちゃんと聞いてるのよ！\nその……ありがとう。全部、\n先生のおかげ。感謝してる。"
