[translation]
10129-10 = "Blue Ar... chive."
10129-20 = "I-isso também é uma extensão das tarefas do comitê de vigilância... sim.\nFarei o meu melhor pela segurança da Trinity e do Sensei."
10129-30 = "Aqui é tão pacífico...\nÉ algo muito bom."
10129-40 = "（Aquela pessoa, será que\nela está tentando\npuxar assunto\ncomigo?）"
10129-50 = "（A-algum tópico...\nNão consigo pensar em nada...\nE olha que eu pensei\nsobre isso ontem à noite...!）"
10129-60 = "（Será que eu deveria\nter trocado de roupa\nafinal das contas...）"
10129-70 = "Já mapeei as\nrotas de evacuação."
10129-80 = "Bem-vindo de volta, Sensei.\nEu estava esperando por você."
10129-90 = "Obrigada por me chamar.\nEstou pronta para entrar em ação a qualquer momento."
10129-100 = "Obrigada por vir\nmesmo estando\ntão ocupado."
10129-110 = "Tarefas do comitê de vigilância,\nestou pronta a qualquer hora."
10129-120 = "O-o que achou?"
10129-130 = "Este traje...\nNão está estranho?"
10129-140 = "N-não. Não é como se eu\nquisesse que você me elogiasse...!"
10129-150 = "As novidades do comitê de vigilância... é?"
10129-160 = "Bem, por enquanto,\nestá tudo correndo bem."
10129-170 = "Ah, sobre isso...\nNão é como se este tivesse se tornado\no uniforme oficial do comitê\nde vigilância, viu!"
10129-180 = "Bolt Catch! Thermite White!"
10129-190 = "S-Sensei!?\nDesde quando você está aí!?"
10129-200 = "Estou assistindo a obras de garotas mágicas\npara fins de pesquisa, mas..."
10129-210 = "Vi uma obra que dizia que\n'se o poder de fogo for alto,\nisso se torna magia'...\nachei extremamente interessante."
10129-220 = "Aquela parede da sala de trabalho...\né uma estrutura temporária, certo?"
10129-230 = "Parece ser perfeita para\nrealizar disparos perfurantes."
10129-240 = "Feliz aniversário.\nSe não se importar, que tal\ndarmos uma caminhada juntos?"
10129-250 = "Eh, de presente...\nVocê quer que eu diga... uma fala de garota mágica!?"
10129-260 = "I-isso é pedir demais,\npor favor...!"
10129-270 = "U-uuh..."
10129-280 = "Magical, Lyrical...\nThermite White!"
10129-290 = "......Isso serve?"
10129-300 = "Meu aniversário, é?"
10129-310 = "Ah, já é esse dia,\né mesmo."
10129-320 = "Tinha passado\ncompletamente despercebido.\nObrigada por\nme parabenizar."
10129-330 = "Algum presente que eu queira?\nHmm..."
10129-340 = "Não tenho nenhum em especial.\nJá recebi o suficiente,\nafinal de contas."
10129-350 = "Feliz Ano Novo.\nConto com você\neste ano também."
10129-360 = "Um desejo de Ano Novo,\né?"
10129-370 = "Ficaria feliz se pudéssemos nos cumprimentar\nassim no ano que vem também."
10129-380 = "É uma época em que a cidade\nfica cheia de gente.\nEntendo o sentimento\nde ficar empolgado."
10129-390 = "Fico feliz em poder proteger...\ne em saber que estou protegendo essa paz."
10129-400 = "No caminho até aqui,\nrecebi doces de muitas pessoas, mas..."
10129-410 = "Também me disseram para\nnão fazer travessuras..."
10129-420 = "Será que as pessoas realmente\nacham que eu sou do tipo\nque faz travessuras?"
10129-440 = "S-Sensei!?"
10129-450 = "A-algum assunto pendente!?"
10129-460 = "Quer dizer, desde quando\nvocê estava aí!"
10129-470 = "Eu estava concentrada na música\ne não percebi nada..."
10129-480 = "Mas, fico feliz que\ntenha sido o Sensei."
10129-490 = "Ah, e-este traje, é\nsobre isso...!"
10129-500 = "É para uma investigação secreta\ndo comitê de vigilância..."
10129-510 = "N-não é como se fosse\nmeu hobby...! Não é!\nSério!"
10129-520 = "Eu só vesti para ver se o tamanho servia...!"
10129-530 = "(E-ele disse que eu estou fofa...)"
10129-540 = "(Ser elogiada de repente... ugh...!)"
10129-550 = "(Ainda não estou acostumada a ser elogiada.)"
10129-560 = "(Eu fico feliz, mas... mas...!)"
10129-570 = "Por favor, mantenha em segredo o que viu hoje para os outros!"
10129-580 = "Isso é... um assunto confidencial!"
10129-2600 = "Bem... eu acho esse tipo de item fofo, mas... será que realmente combina comigo?"
