[translation]
10066-10 = "Blue Archive!"
10066-20 = "Mesmo mudando de classe para empregada, a Alice continua sendo a Alice.\nObserve, Sensei!"
10066-30 = "……Por onde devemos\ncomeçar a limpeza?"
10066-40 = "Este é um lugar onde\nparece que uma subquest\nvai começar……!"
10066-50 = "Alice sabe.\nPelo que parece, existe algo\nchamado maid café no mundo!"
10066-60 = "Uma empregada precisa\nde um mestre.\nO mestre da Alice é……\nclaro que é o Sensei!"
10066-70 = "O nível de empregada\naumentou!\nA compatibilidade entre a Alice\ne o uniforme de empregada\nmelhorou um pouco."
10066-80 = "Bem-vindo de volta,\nmestre!"
10066-90 = "Deixe tudo com a\nempregada Alice."
10066-100 = "Pode pedir qualquer coisa."
10066-110 = "Porque agora a Alice\né a empregada do Sensei!"
10066-120 = "Hoje a Alice é\numa empregada e uma heroína!"
10066-130 = "Ou seja, uma empregada heroína!"
10066-140 = "Uma empregada heroína é o que se torna\nao dominar as artes de empregada\ne de heroína."
10066-150 = "Se fosse em um RPG, seria uma classe avançada!"
10066-160 = "Ao vestir o uniforme de empregada, sinto que\nminhas habilidades de limpeza aumentaram!"
10066-170 = "Sensei, tem algum lugar\nque precise de limpeza?"
10066-180 = "Ouvi dizer que empregadas\nfazem vários tipos de trabalho!"
10066-190 = "Cozinhar, limpar, lavar roupa♪\nDestruição, ataques, segurança\ne até a paz mundial!"
10066-200 = "Ouvi dizer que, para um atirador,\na calma é essencial."
10066-210 = "Se, Sensei?\nSe você fizer carinho na minha cabeça assim……"
10066-220 = "……Uau. A Alice\nperdeu a calma……"
10066-230 = "Sensei, por favor, me diga\nqual é a agenda de hoje!"
10066-240 = "Vamos ficar de bobeira\no dia todo……?\nAh, a Alice também……?"
10066-250 = "Sim!\nA Alice também vai ficar de bobeira!"
10066-260 = "Feliz aniversário,\nSensei!"
10066-270 = "O que você gostaria\nde ganhar de presente?"
10066-280 = "O dia em que conheci todos do\nDepartamento de Desenvolvimento de Jogos\ne o Sensei……"
10066-290 = "A Alice nunca vai esquecer\no que aconteceu naquele dia."
10066-300 = "Sensei, conto com você\ndaqui para frente também!"
10066-310 = "Feliz Ano Novo,\nSensei!"
10066-320 = "Qual deveria ser o primeiro\ntrabalho da empregada Alice?"
10066-330 = "……Só de estar ao seu lado\njá é o suficiente?"
10066-340 = "A Alice sabe."
10066-350 = "Seja no jogo ou na realidade,\no Natal é hora de eventos!"
10066-360 = "Feliz Halloween!"
10066-370 = "É o dia em que todos se fantasiam\ncomo personagens de jogos, né!"
10066-380 = "Ou será que…… é o dia em que\no jogo se torna realidade?"
10066-400 = "Se, Sensei!?\nA Alice ainda está\nse preparando, então……"
10066-410 = "A forma da Alice\nque superou a condição de empregada\ne mudou de classe……"
10066-420 = "Eu queria mostrar\npara o Sensei……"
10066-430 = "Por favor, espere só mais um pouco\naté que a Alice esteja pronta."
10066-440 = "É isso mesmo!\nA Alice não tem mais\nmedo de ser empregada!"
10066-450 = "Tudo isso graças ao fato\nde o Sensei estar aqui."
10066-460 = "Se estiver com o Sensei……"
10066-470 = "A Alice consegue completar\nqualquer masmorra."
10066-480 = "Sim! A Alice\nestá pronta para\na aventura!"
10066-2600 = "Isso é…… a espada sagrada lendária fortalecida pelo poder da Alice e do Sensei……! Obrigado, Sensei! A Alice vai aumentar ainda mais o nível de empregada e se tornar uma empregada heroína!"
