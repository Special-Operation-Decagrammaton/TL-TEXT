[translation]
10066-10 = "ブルーアーカイブ！"
10066-20 = "メイドにジョブチェンジしても、アリスはアリスです。\n見ていてください、先生！"
10066-30 = "……どこからお\n掃除しましょう？"
10066-40 = "サブクエストが\n発生しそうな\n場所です……！"
10066-50 = "アリス、知ってます。\n世の中には\nメイドカフェというものが\nあるらしいです！"
10066-60 = "メイドには\nご主人様が必要です。\nアリスのご主人様は……\nもちろん先生です！"
10066-70 = "メイドレベルが\n上がりました！\nアリスとメイド服の相性は、\n少し良くなってきました。"
10066-80 = "おかえりなさいませ、\nご主人様！"
10066-90 = "メイドのアリスに\n何でもお任せください。"
10066-100 = "何でも言ってください。"
10066-110 = "今のアリスは\n先生のメイドなので！"
10066-120 = "今日のアリスは\nメイドであり勇者！"
10066-130 = "つまりメイド勇者です！"
10066-140 = "メイド勇者とは、メイドと\n勇者を極めた先にあります。"
10066-150 = "RPGで例えるなら上級職です！"
10066-160 = "メイド服に着替えると、お掃除\nスキルが上がった気がします！"
10066-170 = "先生、どこかお掃除する\nところはありますか？"
10066-180 = "メイドは様々な\nお仕事をこなすと聞きました！"
10066-190 = "お料理、お掃除、お洗濯♪\n破壊に強襲、警備に\n世界平和まで！"
10066-200 = "狙撃手にとって、\n平常心が大事だと聞きました。"
10066-210 = "せ、先生？\nそんなに頭を撫でられると……"
10066-220 = "……ふわぁ。アリスは\n平常心を失ってしまいました……"
10066-230 = "先生、今日のスケジュールを\n教えてください！"
10066-240 = "一日中、\nゴロゴロするんですか……？\nえ、アリスも……？"
10066-250 = "はい！\nアリスもゴロゴロします！"
10066-260 = "お誕生日\nおめでとうございます、先生！"
10066-270 = "記念アイテムは\n何が良いですか？"
10066-280 = "ゲーム開発部のみんな、\nそして先生と出会った日……"
10066-290 = "あの日の出来事を、\nアリスは忘れません。"
10066-300 = "先生、これからも\nよろしくお願いします！"
10066-310 = "あけまして\nおめでとうございます、先生！"
10066-320 = "メイドアリスの初仕事、\n何が良いですか？"
10066-330 = "……そばに居るだけで\n良いんですか？"
10066-340 = "アリス、知っています。"
10066-350 = "ゲームでも現実でも、\nクリスマスはイベントの\n時間です！"
10066-360 = "ハッピーハロウィーン！"
10066-370 = "みんなでゲームのキャラクター\nみたいに仮装する日ですね！"
10066-380 = "それとも……ゲームが\n現実になる日なのでしょうか？"
10066-400 = "せ、先生！？\nアリス、まだ\n準備中なので……"
10066-410 = "メイドを克服し、\nジョブチェンジした\nアリスの姿……"
10066-420 = "先生に見せようと\n思ったのですが……"
10066-430 = "アリスの支度が整うまで、\nもう少しだけ\n待っていてください。"
10066-440 = "その通りです！\nもうメイドは\n怖くありません！"
10066-450 = "これも全部、先生が\n居てくれたおかげです。"
10066-460 = "先生と一緒なら……"
10066-470 = "アリスはどんな\nダンジョンでも\n攻略できますから。"
10066-480 = "はいっ！アリス、\n冒険の準備が\n整いました！"
10066-2600 = "これは……アリスと先生の\n力で強化した伝説の聖剣……！\nありがとうございます、先生！\nアリス、もっとメイドレベルを\n上げて、メイド勇者になります！"
