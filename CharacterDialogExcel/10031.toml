[translation]
10031-10 = "ブルーアーカイブ。"
10031-20 = "ふふっ、今年も私に依頼したいと？\n全くしょうがないわね、先生は。\n私の活躍、今年もすぐそばで見届けると良いわ。"
10031-30 = "うっ……新年早々、\nお財布が軽い……"
10031-40 = "リーダーとして\n大事なもの、\nそれは余裕よ。"
10031-50 = "えっ、社長って普通、\n社員にお年玉あげないと\nいけないの！？"
10031-60 = "高い着物、\n緊張するわね……\n気をつけて\n歩かないと……"
10031-70 = "疲れたわね……\nところで、\nうちの社員はどこ？"
10031-80 = "おかえりなさい、先生。\nさあ、今日の\nスケジュールを始めるわよ。"
10031-90 = "待ってたわよ。\nさあ、私が先生のことを\nエスコートしてあげるわ。"
10031-100 = "今年もうちと契約するのね、\n素晴らしい選択だわ♪"
10031-110 = "髪の毛、こんなに\n高く巻いて重くないかって？"
10031-120 = "別に、強いて言えば、\n髪のセットの値段は\n高かったけど……。"
10031-130 = "え？\nな、なんでもないわよ……！"
10031-140 = "この着物、綺麗でしょう？\n美しいでしょう？"
10031-150 = "私の方が、もっと綺麗……？"
10031-160 = "お、お世辞はよして！"
10031-170 = "ふふふ、私たち便利屋の\n用意周到さを\n舐めてもらっては困るわ。"
10031-180 = "え、ど、どういう\n意味かって……？"
10031-190 = "その、た、誕生日\nおめでとう、ってことよ！"
10031-200 = "ふふ、今日は特別な日よ、先生。"
10031-210 = "え？知ってる、って？"
10031-220 = "あ……えっと、\nその、あ、ありがとう……。"
10031-230 = "あけましておめでとう。先生。"
10031-240 = "今年は去年より、もっと\n特別な一年になるわよ、ふふ。"
10031-250 = "メリークリスマ～ス！\nなんでそんな\n浮かれてるのかって？"
10031-260 = "だって、\n新年までもう少しだもの♪"
10031-270 = "……トリック・オア・トリート？"
10031-280 = "そこに座りなさい、先生。"
10031-290 = "ハロウィーンよりお正月の方が\n勝っている理由を\n教えてあげるから。"
10031-310 = "ふふ、歩くのが遅いわよ、先生。\nえ？私が速い、って？\nそんなことないわよ。"
10031-320 = "まあ、いつ何時も用件には\n遅れたりしないようにって、\n普段から心がけては\nいるけどね、社長として。"
10031-330 = "早起きは三文の徳……。"
10031-340 = "今年の便利屋は、\n去年以上に機敏に、\n積極的に活動していくわよ。"
10031-350 = "もちろん、先生も一緒によ。"
10031-360 = "私たち便利屋の活動は、\nもう同業者である先生無しで\nやっていくなんてわけには\nいかないんだから。"
10031-370 = "そうして一緒に仕事を\nする時間が、これからもずっと、\nずっと続いていくといいわね。"
10031-380 = "……あ、あくまでも仕事！\n仕事としての話だから！"
10031-390 = "（だ、だめっ、今、自分が何を\n言ってるのか、自分でも\nよくわからなくなってる……！）"
10031-2600 = "これぞ、虎に翼ってやつね。\n……合ってるわよね？"
