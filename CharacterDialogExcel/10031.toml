[translation]
10031-10 = "Blue Archive."
10031-20 = "Fufu, quer me contratar de novo este ano?\nVocê não tem jeito mesmo, Sensei.\nÉ melhor ficar bem perto para testemunhar meu desempenho este ano."
10031-30 = "Ugh... logo no início do ano,\nminha carteira já está leve..."
10031-40 = "Como líder,\na coisa mais importante\né ter compostura."
10031-50 = "Hã? Normalmente, um presidente\ntem que dar presentes de Ano Novo\npara seus funcionários!?"
10031-60 = "Este quimono caro,\ndeixa a gente tensa...\nTenho que tomar cuidado\nao andar..."
10031-70 = "Estou cansada...\nA propósito,\nonde estão meus funcionários?"
10031-80 = "Bem-vindo de volta, Sensei.\nVamos lá, vamos começar\no cronograma de hoje."
10031-90 = "Eu estava te esperando.\nVamos, eu vou te escoltar,\nSensei."
10031-100 = "Vai renovar o contrato conosco este ano também, né?\nUma escolha excelente♪"
10031-110 = "Quer saber se meu cabelo\nnão fica pesado com esse penteado alto?"
10031-120 = "Não exatamente, mas se quer saber,\no preço para arrumar o cabelo\nfoi bem alto, isso sim..."
10031-130 = "Hã?\nN-não é nada...!"
10031-140 = "Este quimono, não é lindo?\nNão é maravilhoso?"
10031-150 = "Eu sou ainda mais bonita...?"
10031-160 = "P-pare com esses elogios!"
10031-170 = "Fufufu, não subestime\na nossa preparação\nna Problem Solver 68."
10031-180 = "Hã? O que eu quero dizer\ncom isso...?"
10031-190 = "É que... bem, feliz aniversário,\né isso que eu quis dizer!"
10031-200 = "Fufu, hoje é um dia especial, Sensei."
10031-210 = "Hã? Você já sabia?"
10031-220 = "Ah... bem, isso, ah, obrigada..."
10031-230 = "Feliz Ano Novo, Sensei."
10031-240 = "Este ano será ainda mais\nespecial que o anterior, fufu."
10031-250 = "Feliz Natal!\nPor que estou tão\nempolgada, você pergunta?"
10031-260 = "Porque falta pouco\npara o Ano Novo♪"
10031-270 = "...Doces ou travessuras?"
10031-280 = "Sente-se aí, Sensei."
10031-290 = "Vou te explicar por que o Ano Novo\né superior ao Halloween."
10031-310 = "Fufu, você anda devagar, Sensei.\nHã? Eu que sou rápida?\nNão é nada disso."
10031-320 = "Bem, como presidente, eu sempre me esforço\npara nunca me atrasar para nenhum compromisso,\nindependentemente da ocasião."
10031-330 = "Deus ajuda quem cedo madruga..."
10031-340 = "Este ano, a Problem Solver 68\nserá ainda mais ágil e\nativa do que no ano passado."
10031-350 = "Claro, com você junto, Sensei."
10031-360 = "As atividades da nossa empresa\nnão podem mais continuar\nsem você, que é nosso parceiro."
10031-370 = "Espero que esse tempo que passamos trabalhando juntos\ncontinue assim, para sempre,\npor muito tempo."
10031-380 = "...Ah, é só trabalho!\nEstou falando apenas de trabalho!"
10031-390 = "(N-não, agora eu mesma\nnão sei mais o que estou\ndizendo...!)"
10031-2600 = "Isso é o que chamam de dar asas a um tigre.\n...Está correto, né?"
