[translation]
20040-10 = "Blue Archive~"
20040-20 = "Fez você esperar, Sensei.\nSou Satsuki Kyogoku, chefe do departamento de inteligência do Pandemonium.\nFufu, prazer em conhecê-lo."
20040-30 = "Vamos começar a coletar\ninformações para o Schale."
20040-40 = "Hmm?\nNão parece nada mal."
20040-50 = "Vou infiltrar aquelas crianças\npor aqui..."
20040-60 = "Técnicas de interrogatório\nalém das nossas...\nFico curiosa..."
20040-70 = "Alguém gostaria de ser\nminha cobaia para\npraticar hipnose?"
20040-80 = "Olá, Sensei.\nHoje eu sou a responsável. Fufu."
20040-90 = "Sensei é um candidato a colaborador do Pandemonium."
20040-100 = "Aproveitarei esta oportunidade para\nte observar com bastante calma.\nFufu."
20040-110 = "Ora? Quem você acha\nque eu sou?"
20040-120 = "Terminarei o trabalho do Schale\nem um piscar de olhos."
20040-130 = "Eu sou Satsuki Kyogoku,\nchefe do departamento de inteligência\ndo Pandemonium."
20040-140 = "Bem, acho que você já sabe disso.\nFufu."
20040-150 = "Tome cuidado para não\nbater o pé na quina\nda mesa."
20040-160 = "Porque isso...\ndói, não é?"
20040-170 = "Onde será que estão as informações\nconfidenciais do Schale..."
20040-180 = "...Será que estão escondidas\nna copa?"
20040-190 = "Fufu.\nTalvez eu deva investigar\npela seleção de doces."
20040-200 = "Sensei, você tem interesse\nno Projeto NK Ultra?"
20040-210 = "Se for agora, posso te aceitar\ncom condições excepcionais."
20040-220 = "Olhe bem para este pêndulo...\nVamos lá..."
20040-230 = "Sensei está com vontade de ir embora..."
20040-240 = "Sensei está com vontade de faltar ao trabalho..."
20040-250 = "...Você já é assim sempre? Hmm."
20040-260 = "Hoje é o seu aniversário, não é, Sensei?"
20040-270 = "Sim, é claro que eu me lembro."
20040-280 = "Como um candidato a colaborador do Pandemonium,\na existência do Sensei é valiosa."
20040-290 = "...Bem, mesmo que não fosse, acho que eu me lembraria."
20040-300 = "Fufu,\nfeliz aniversário, Sensei."
20040-310 = "Hmm, você se lembrou\ndo meu aniversário."
20040-320 = "Como esperado da capacidade de\ncoleta de informações do Schale."
20040-330 = "Não é à toa que vocês são\nnossos rivais."
20040-340 = "Fora isso...\nAgradeço pelos parabéns."
20040-350 = "Feliz Ano Novo, Sensei."
20040-360 = "Espero que este ano,\ncom a sua colaboração,"
20040-370 = "o Projeto NK Ultra\ntenha algum progresso."
20040-380 = "Sensei, você gosta?"
20040-390 = "...Do clima de Natal, digo."
20040-400 = "...Você entendeu errado? O que exatamente?"
20040-410 = "O Halloween é um dia que a Ibuki\nestá esperando ansiosamente."
20040-420 = "Já preparou os doces?\nFufu, eu também estou\nansiosa por isso."
20040-440 = "Ugh... o que é\nisso...?"
20040-450 = "I-isso é estranho...\nSinto uma vontade incontrolável\nde obedecer às ordens do Sensei..."
20040-460 = "S-sim... entendido..."
20040-470 = "...Eu vou...\nme dar bem com o\nComitê Disciplinar..."
20040-480 = "...Mas, tirando a Makoto-chan, eu não tenho uma relação ruim com eles, na verdade."
20040-490 = "H-hã?"
20040-500 = "Ugh... eu não vou... ser má...\ncom o Sensei..."
20040-510 = "I-isso é covardia!"
20040-520 = "Mesmo sendo um adulto,\nfez o que quis comigo usando hipnose!"
20040-530 = "Hmph, pensar que você tentaria\nme hipnotizar..."
20040-540 = "Você não é nada descuidado, Sensei."
20040-550 = "E então? Não quer participar\ndo meu projeto NK Ultra?"
20040-560 = "S-sim... se é uma ordem..."
20040-2600 = "Ora, você está bem preparado.\nHehe, isso ajuda muito, Sensei."
