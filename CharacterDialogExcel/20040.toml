[translation]
20040-10 = "ブルー、アーカイブ～"
20040-20 = "待たせたわね、先生。\n万魔殿の情報部長、京極サツキよ。\nふふっ、よろしく。"
20040-30 = "シャーレの情報収集と\nいきましょう。"
20040-40 = "ふ～ん？\nいい感じじゃない。"
20040-50 = "ここにあの子たちを\n潜入させて……"
20040-60 = "うち以外の\n尋問技術、\n気になるわね……"
20040-70 = "催眠術の練習台……\n誰かなって\nくれないかしら？"
20040-80 = "こんにちは、先生。\n今日の当番は私よ。ふふっ。"
20040-90 = "先生は万魔殿の協力者候補。"
20040-100 = "この機にじ～っくり、\n観察させてもらおうかしら。\nふふ。"
20040-110 = "あら？私を誰だと\n思っているの？"
20040-120 = "シャーレの仕事くらい、\n一瞬で終わらせてあげる。"
20040-130 = "京極サツキ、\n万魔殿の情報部長を\n務めているわ。"
20040-140 = "まあ、知ってると思うけど。\nふふっ。"
20040-150 = "デスクの角に\n足をぶつけないよう、\n気をつけなさい。"
20040-160 = "……だってそれ、\n痛いじゃない。"
20040-170 = "シャーレの機密情報って\nどこにあるのかしらね……"
20040-180 = "……意外と給湯室に\nあったりして？"
20040-190 = "ふふっ。\nお菓子のラインナップから\n調べてみようかしら。"
20040-200 = "先生、NKウルトラ計画に\n興味はあるかしら？"
20040-210 = "今なら破格の条件で\n迎え入れてあげる。"
20040-220 = "この振り子をよくみて……\nさあ……"
20040-230 = "先生は退勤したくなぁ～る……"
20040-240 = "仕事をサボりたくなぁ～る……"
20040-250 = "……常にそう？ふぅん。"
20040-260 = "今日は先生の誕生日でしょう？"
20040-270 = "ええ、もちろん覚えてるわ。"
20040-280 = "万魔殿の協力者候補として、\n先生の存在は貴重だもの。"
20040-290 = "……まぁ、そうでなくても\n覚えていたと思うけど。"
20040-300 = "ふふ、\nお誕生日おめでとう、先生。"
20040-310 = "ふ～ん、\n私の誕生日、覚えていたの。"
20040-320 = "さすがはシャーレの\n情報収集能力。"
20040-330 = "私たちのライバルな\nだけあるわね。"
20040-340 = "それはそうと……\nお祝いの言葉、感謝するわ。"
20040-350 = "明けましておめでとう、先生。"
20040-360 = "今年こそ、\n先生に協力してもらった上で、"
20040-370 = "NKウルトラ計画に\n進展があるといいわね。"
20040-380 = "先生、好き？"
20040-390 = "……クリスマス\nムードのことよ。"
20040-400 = "……勘違いしたって、何を？"
20040-410 = "ハロウィーンはイブキが\n楽しみにしている日なの。"
20040-420 = "お菓子の用意はいいかしら？\nふふっ、\n私も楽しみにしてるのよ。"
20040-440 = "うう……なによ、\nこれ……？"
20040-450 = "へ、変だわ……\n先生の命令に、従わないと\nいけない気持ちに……"
20040-460 = "え、えっ……はい……"
20040-470 = "……私は、\n風紀委員会と\n……仲良く、します。"
20040-480 = "……でもマコトちゃんなら\nまだしも、私は別に\n仲が悪いわけじゃないのよ。"
20040-490 = "う、うん？"
20040-500 = "くっ……私は……先生に……\n意地悪……しませ、ん……"
20040-510 = "ひ、卑怯よ！"
20040-520 = "大人のくせに、\n催眠で私に好き勝手して！"
20040-530 = "ふん、この私に催眠を\nかけるだなんて……"
20040-540 = "油断ならないわね、先生。"
20040-550 = "どう？私のNKウルトラ計画に\n参加する気はない？"
20040-560 = "は、はい……ご命令なら……"
20040-2600 = "あら、用意がいいじゃない。\nふふ、助かるわ先生。"
