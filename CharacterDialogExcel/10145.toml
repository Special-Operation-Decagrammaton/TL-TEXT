[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10145-10 = "Blue Archive...\nPois bem... fufu."
10145-20 = "Umu... os raios de sol estão bem fortes.\nVenha, Sensei, chegue mais perto..."
10145-30 = "Fufu...\nÉ um clima bem\nmisterioso, não é...?"
10145-40 = "Oh, aquilo é...?\nQue fascinante."
10145-50 = "Descansar, hein.\nÉ uma sensação muito agradável."
10145-60 = "(Será que tem algum\nlugar para eu me deitar...)"
10145-70 = "Café com leite...\nPorém, acabei de levar uma\nbronca da Saya por causa da cafeína."
10145-80 = "Você veio, Sensei."
10145-90 = "Hm? Ah, este maiô...?"
10145-100 = "Considere isso como um 'serviço'\nespecial apenas para você. Fufu."
10145-110 = "Seja bem-vindo, Sensei."
10145-120 = "Aqui é sempre tão confortável.\nIsso também faz parte dos seus truques\npara aumentar a eficiência do trabalho?"
10145-130 = "O fato de eu não me importar em\nestar vestida assim com você..."
10145-140 = "Estou perguntando se você\nsabe o significado por trás disso.\nFufu... você é um adulto bem maldoso."
10145-150 = "O meu desejo...?"
10145-160 = "Hum..."
10145-170 = "......O que acha de sairmos juntos,\napenas nós dois, agora mesmo?"
10145-180 = "Sozinhos, apenas eu e você.\nPara fugir do calor, é claro."
10145-190 = "E se eu desejasse passar a noite\nem uma pousada com você agora...?"
10145-200 = "O que você faria?"
10145-210 = "Fufu...\nNão se assuste tanto, é uma brincadeira."
10145-220 = "Pelo menos por enquanto."
10145-230 = "Hm... estou tonta.\nAh... isso com certeza é――"
10145-240 = "Se você não me colocar no seu colo e\nfizer cafuné na minha cabeça..."
10145-250 = "Eu sinto que não vou me curar."
10145-260 = "......Fingir que não sabe de nada\nnão vai funcionar comigo, ouviu?"
10145-270 = "Estar constantemente sob tensão\nnão faz bem para a saúde de ninguém."
10145-280 = "Às vezes, é crucial descansar...\nOu seja――"
10145-290 = "Sensei!\nA Kiki quer descansar juntinho do Sensei!"
10145-300 = "......É o que eu quero dizer."
10145-310 = "O calor do verão infunde\numa grande vitalidade no corpo, mas..."
10145-320 = "Tudo que é em excesso\nacaba fazendo mal."
10145-330 = "Sabe, Sensei.\nVocê poderia――esfriar o meu corpo?"
10145-340 = "Fufu, o que significa essa sua cara?\nEu só estava pedindo para você me\nabanar com um leque, sabia?"
10145-350 = "As palavras carregam um grande\npoder apenas por serem proferidas.\nE as minhas palavras não são exceção."
10145-360 = "Porém――isso mesmo.\nApenas por hoje, eu lhe concederei\n'qualquer coisa' que desejar."
10145-370 = "Afinal, hoje é o\ndia do seu aniversário."
10145-380 = "Vamos, pode me dizer\no que você quer.\nEu realizarei 'qualquer coisa'."
10145-390 = "Eu sou sempre muito grata a você, Sensei."
10145-400 = "Ah, é verdade――\nQuando se celebra algo entre mestre e aprendiz..."
10145-410 = "Ouvi dizer que existem\ncertas formalidades."
10145-420 = "No entanto,\neu não sou de me apegar a regras.\nPode celebrar como achar melhor."
10145-430 = "O Ano Novo chegou."
10145-440 = "Mesmo na maior das intimidades,\nnunca se deve esquecer a cortesia."
10145-450 = "Desejo do fundo do meu coração\nque este seja um ano de muitos frutos."
10145-460 = "É o Natal."
10145-470 = "Presentes para as crianças boas,\ne carvão para as crianças más...\nEra assim a lenda, não é?"
10145-480 = "A Kiki também foi uma boa menina este ano, né?\nO que o Sensei acha?"
10145-490 = "......Eu fui uma boa menina, não fui?"
10145-500 = "Halloween...\nTambém conhecido como o dia\ndos grandes mistérios e maravilhas."
10145-510 = "Será que é por causa da minha roupa,\nou será que há algum outro motivo...\nMas estou me sentindo com um pouco de frio."
10145-520 = "Fufu, pois bem...\nVocê poderia me esquentar?"
10145-540 = "O que acha, Sensei?"
10145-550 = "Esta paisagem, que antes\ntransbordava em cores――agora está assim."
10145-560 = "Sim, tornou-se algo bem mais refinado."
10145-570 = "O rio, a água, a névoa, as montanhas..."
10145-580 = "E o Sensei...\nApenas você está refletido nos meus olhos."
10145-590 = "O que exatamente está refletido nos seus olhos?"
10145-600 = "Eu, e essa paisagem majestosa..."
10145-610 = "Será que... estou aprisionada\nnesses seus dois olhos?"
10145-620 = "Fufu... você já ouviu\ncontarem esta lenda?"
10145-630 = "Que as fadas celestiais cavalgam os ventos――\nE dançam pelos céus como plumas."
10145-640 = "Feche os seus olhos e\nrespire profundamente, Sensei."
10145-650 = "Se fizer isso, ali também――"
10145-660 = "Poderá sentir a minha presença."
10145-2600 = "Sensei, o que você acha que\nesta arma carrega dentro de si?\n......Na minha opinião, acredito que\nseja a prova do nosso vínculo imutável."