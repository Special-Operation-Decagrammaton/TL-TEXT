[translation]
10145-10 = "Blue Archive,\nWell then... hehe."
10145-20 = "Hmm... the sun is quite strong. Here, Sensei, come over here..."
10145-30 = "Hmm, what a strange temperature..."
10145-40 = "Oh, what is that...? How interesting."
10145-50 = "Rest, is it? It feels pleasant."
10145-60 = "(Where is a place\nI can lie down...)"
10145-70 = "Iced coffee... but Saya just scolded me about caffeine, so..."
10145-80 = "You've come, Sensei."
10145-90 = "Hm? Ah, this swimsuit..."
10145-100 = "It's something like a service for you. Hehe."
10145-110 = "Welcome, Sensei."
10145-120 = "It's always easy to spend time here. Is this also to increase work efficiency?"
10145-130 = "The reason I don't mind\nbeing dressed like this is..."
10145-140 = "I'm asking if that's the reason. Hehe, what a wicked adult you are."
10145-150 = "My wish...?"
10145-160 = "Hmm..."
10145-170 = "...How about the two of us just head out somewhere like this?"
10145-180 = "Just the two of us, you and I. A summer retreat, of course."
10145-190 = "If I were to ask for a place to stay for the night like this..."
10145-200 = "What would you do?"
10145-210 = "Hehe... don't be so surprised, I'm just joking."
10145-220 = "For now, at least."
10145-230 = "Nn... I feel dizzy. Ah... this is—"
10145-240 = "Unless you give me a lap pillow\nand pat my head..."
10145-250 = "I don't think I'll get better, you know?"
10145-260 = "...You can't just play dumb, you know?"
10145-270 = "Being constantly tense is not good for your health."
10145-280 = "Rest is important sometimes... in other words—"
10145-290 = "Sensei! Kiki wants to rest with you!"
10145-300 = "...That is what I mean."
10145-310 = "The summer heat gives the body vitality, but..."
10145-320 = "Too much of a good thing can be just as bad."
10145-330 = "Say, Sensei. Won't you... cool down my heat?"
10145-340 = "Hehe, what's with that face? It's enough if you just fan me with a paper fan, you know?"
10145-350 = "Words carry deep meaning just by being spoken. Especially coming from me, it goes without saying."
10145-360 = "But—I suppose so. Just for today, I will do 'anything' you ask."
10145-370 = "After all, today is your birthday."
10145-380 = "Come now, speak your wish. I shall grant you 'anything'."
10145-390 = "I am always grateful to you, Sensei."
10145-400 = "Ah, that's right—when it comes to celebrations between a master and disciple..."
10145-410 = "I hear there is a certain etiquette."
10145-420 = "However, I am not one to fuss over such things. Do as you please."
10145-430 = "It's the New Year."
10145-440 = "Even among close friends, one must not forget courtesy."
10145-450 = "I pray that this year will be a fruitful one for you as well."
10145-460 = "It's Christmas."
10145-470 = "Presents for the good children, coal for the bad ones... was that how it went?"
10145-480 = "Kiki was a good child this year, right? What do you think, Sensei?"
10145-490 = "...I'm a good child, aren't I?"
10145-500 = "Halloween... one could also call it a day of wonders."
10145-510 = "Is it because of this outfit, or is there another reason... I feel a bit chilly."
10145-520 = "Hehe, I see... won't you warm me up?"
10145-540 = "How is it, Sensei?"
10145-550 = "The scenery that was so full of color—is now like this."
10145-560 = "Mm, it has become quite refined."
10145-570 = "The river, the water, the mist, the mountains..."
10145-580 = "And Sensei... you are the only thing reflected in my eyes."
10145-590 = "What is reflected in your eyes?"
10145-600 = "Amidst me and this scenery..."
10145-610 = "Have you locked me away in those eyes of yours?"
10145-620 = "Hehe... have you ever heard a tale like this?"
10145-630 = "That a celestial maiden rides the wind—and dances in the sky like a feather."
10145-640 = "Close your eyes and try taking a breath, Sensei."
10145-650 = "If you do, even there—"
10145-660 = "You might just be able to feel me."
10145-2600 = "What do you see in what is imbued within this weapon, Sensei? ...I believe it represents the unchanging bond between the two of us."