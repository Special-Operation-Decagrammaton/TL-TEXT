[translation]
10145-10 = "ブルーアーカイブ、\nじゃ……ふふっ。"
10145-20 = "ふむ……日差しが強いのう。\nほれ、先生、こっちへ……。"
10145-30 = "ふむ、\n不思議な\n気温さな……。"
10145-40 = "ほう、あれは……？\n興味深いのう。"
10145-50 = "休息、じゃな。\n心地よいものじゃ。"
10145-60 = "（横になれる\n場所は……）"
10145-70 = "ミルクコーヒー……\nしかし、カフェインは\nサヤに叱られたばかり\nじゃからのう。"
10145-80 = "来たかえ、先生。"
10145-90 = "うん？ああ、この水着か……。"
10145-100 = "其方のためのサービス、\nみたいなものじゃ。ふふ。"
10145-110 = "よくきたの、先生。"
10145-120 = "ここはいつも過ごしやすいのう。\nこれも業務の効率を\nあげるためかえ？"
10145-130 = "このような格好でも\n苦にならぬのは……"
10145-140 = "そういうことなのかと\n聞いておるのじゃ。\nふふっ、悪い大人じゃのう。"
10145-150 = "妾の望み……？"
10145-160 = "ふむ……。"
10145-170 = "……二人でこのまま、\nどこかへ出かけるのはどうじゃ？"
10145-180 = "其方と妾の二人きりで、じゃ。\nもちろん、避暑じゃよ。"
10145-190 = "このまま妾が一夜の\n宿を望んだら……。"
10145-200 = "其方は、どうする？"
10145-210 = "ふふっ……\nそう驚くでない、冗談じゃ。"
10145-220 = "今のところは、な。"
10145-230 = "ん……目眩がする。\nああ……これは――"
10145-240 = "其方が膝枕をして\n頭を撫でてくれないと……。"
10145-250 = "治らないような気がするのう？"
10145-260 = "……知らぬ存ぜぬは通らぬぞ？"
10145-270 = "常に緊張していては、\n身体によくないというもの。"
10145-280 = "時には休息も大事じゃ……\nつまり――"
10145-290 = "先生！\nキキは先生と休みたいです！"
10145-300 = "……というわけじゃ。"
10145-310 = "夏の熱気は身体に\n活力を与えてくれるが……。"
10145-320 = "過ぎたるは猶\n及ばざるが如し、じゃ。"
10145-330 = "のう、先生。\n妾の熱を――冷ましてくれぬか？"
10145-340 = "ふふっ、なんじゃその顔は。\nうちわで扇いでくれれば\nそれで良いのじゃぞ？"
10145-350 = "言の葉は発するだけで\n強い意味を持つ。\n妾ともなれば、\n言わずもがなじゃ。"
10145-360 = "だが――そうじゃな。\n今日だけは「なんでも」\n其方にしてやろう。"
10145-370 = "今日は、\n其方の誕生日じゃからの。"
10145-380 = "ほれ、\n其方の望みを口にするが良い。\n「なんでも」叶えてやろう。"
10145-390 = "先生にはいつも感謝しておる。"
10145-400 = "ああ、そうじゃ――\n師弟間での祝い事の際には……。"
10145-410 = "作法があると耳にする。"
10145-420 = "じゃが、\n妾はうるさい方ではないからの。\n好きにするが良い。"
10145-430 = "新年、じゃな。"
10145-440 = "親しき仲であっても\n礼節を忘れてはならぬ。"
10145-450 = "本年も実り多き年であるよう、\n願っておるよ。"
10145-460 = "クリスマスじゃな。"
10145-470 = "良い子にはプレゼントを、\n悪い子には石炭を……\nじゃったかのう。"
10145-480 = "キキは今年も良い子でしたよね？\n先生はどう思います？"
10145-490 = "……良い子、じゃろう？"
10145-500 = "ハロウィーン……\nまたの名を摩訶不思議な日、\nとも言えよう。"
10145-510 = "この格好じゃからか、\nそれとも別の理由があるのか……\nなんだか肌寒いのう。"
10145-520 = "ふふっ、そうさな……\n温めてはくれぬかの？"
10145-540 = "どうじゃ、先生。"
10145-550 = "あれほど色彩に溢れていた\n景観が――この通り。"
10145-560 = "うむ、洗練されたのう。"
10145-570 = "川、水、霧、山……。"
10145-580 = "そして先生……\n其方だけが妾の目に映っておる。"
10145-590 = "其方の目には何が映っておる？"
10145-600 = "妾とこの景色のなか……。"
10145-610 = "妾を、その両の瞳に\n閉じ込めておるかえ？"
10145-620 = "ふふっ……このような逸話を\n聞いたことはあるかのう？"
10145-630 = "仙女は風に乗り――\n羽のように空を舞うのだと。"
10145-640 = "目を閉じて息を\n吸い込んでみるのじゃ、先生。"
10145-650 = "そうすれば、そこにも――"
10145-660 = "妾を感じられるやもしれぬぞ？"
10145-2600 = "先生はこの武器に\n込められしものを何と捉える？\n……妾は、二人の変わらぬ絆を\n示すもの、だと思っておるよ。"
