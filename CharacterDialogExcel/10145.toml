[translation]
10145-10 = "Blue Archive.\nНу что ж... Хе-хе."
10145-20 = "Хм... Солнце довольно припекает. Сюда, Сенсей, иди ближе ко мне..."
10145-30 = "Хм, какая странная температура..."
10145-40 = "О, что это там такое?.. Как интересно."
10145-50 = "Отдых, значит? Весьма приятное чувство."
10145-60 = "(Где бы здесь\nприлечь...)"
10145-70 = "Кофе со льдом... Но Сайя только что отругала меня за кофеин, так что..."
10145-80 = "Ты пришёл, Сенсей."
10145-90 = "Хм? А, этот купальник..."
10145-100 = "Считай это чем-то вроде эксклюзивного сервиса для тебя. Хе-хе."
10145-110 = "Добро пожаловать, Сенсей."
10145-120 = "Проводить здесь время всегда так легко. Это тоже ради повышения эффективности работы?"
10145-130 = "Причина, по которой я не против\nбыть одетой вот так..."
10145-140 = "Я спрашиваю, в этом ли причина? Хе-хе, какой же ты всё-таки коварный взрослый."
10145-150 = "Моё желание...?"
10145-160 = "Хм..."
10145-170 = "...Как насчёт того, чтобы нам двоим просто сбежать куда-нибудь в таком виде?"
10145-180 = "Только ты и я, вдвоём. Летнее уединение, разумеется."
10145-190 = "Если бы я попросила место, чтобы остаться на ночь в таком виде..."
10145-200 = "Что бы ты сделал?"
10145-210 = "Хе-хе... Не пугайся так, я просто шучу."
10145-220 = "По крайней мере, пока что."
10145-230 = "Нн... Голова кружится. Ах... кажется, я—"
10145-240 = "Если ты не разрешишь мне прилечь к тебе на колени\nи не погладишь по голове..."
10145-250 = "Не думаю, что мне станет лучше, понимаешь?"
10145-260 = "...Нельзя же просто делать вид, что ничего не замечаешь, верно?"
10145-270 = "Постоянное напряжение вредно для твоего здоровья."
10145-280 = "Иногда отдых просто необходим... Иными словами —"
10145-290 = "Сенсей! Кики хочет отдыхать вместе с тобой!"
10145-300 = "...Вот это я и имела в виду."
10145-310 = "Летняя жара наполняет тело энергией, но..."
10145-320 = "Хорошего должно быть в меру, иначе станет только хуже."
10145-330 = "Скажи, Сенсей. Не хочешь ли ты... охладить мой пыл?"
10145-340 = "Хе-хе, что за лицо? Будет вполне достаточно, если ты просто помашешь на меня бумажным веером, понимаешь?"
10145-350 = "Слова обретают глубокий смысл, стоит лишь произнести их вслух. Особенно когда они исходят от меня, это само собой разумеется."
10145-360 = "Но — пожалуй, ладно. Только сегодня я исполню «любую» твою просьбу."
10145-370 = "В конце концов, сегодня твой день рождения."
10145-380 = "Ну же, загадывай желание. Я исполню для тебя «всё что угодно»."
10145-390 = "Я всегда благодарна тебе, Сенсей."
10145-400 = "Ах, точно — когда дело доходит до праздников между мастером и учеником..."
10145-410 = "Я слышала, что существует определённый этикет."
10145-420 = "Впрочем, я не из тех, кто зацикливается на подобных мелочах. Поступай как знаешь."
10145-430 = "Вот и Новый год."
10145-440 = "Даже между близкими друзьями нельзя забывать о вежливости."
10145-450 = "Я молюсь, чтобы этот год стал плодотворным и для тебя тоже."
10145-460 = "Наступило Рождество."
10145-470 = "Подарки для послушных детей, уголь для непослушных... Кажется, так это было?"
10145-480 = "Кики ведь была послушной девочкой в этом году, правда? Что думаешь, Сенсей?"
10145-490 = "...Я ведь послушная девочка, да?"
10145-500 = "Хэллоуин... Можно также назвать его днём чудес."
10145-510 = "То ли из-за этого наряда, то ли по какой-то другой причине... Мне немного зябко."
10145-520 = "Хе-хе, вот как... Не хочешь согреть меня?"
10145-540 = "Как тебе, Сенсей?"
10145-550 = "Пейзаж, который прежде был столь полон красок, теперь стал таким."
10145-560 = "Мм, в этом есть своё изящество."
10145-570 = "Река, вода, туман, горы..."
10145-580 = "И ты, Сенсей... Ты — единственное, что отражается в моих глазах."
10145-590 = "А что отражается в твоих глазах?"
10145-600 = "Среди меня и всего этого пейзажа..."
10145-610 = "Заточил ли ты меня в плен своего взгляда?"
10145-620 = "Хе-хе... Слышал ли ты когда-нибудь подобное сказание?"
10145-630 = "О том, как небесная дева оседлала ветер — и кружится в поднебесье, словно пёрышко."
10145-640 = "Закрой глаза и попробуй сделать вдох, Сенсей."
10145-650 = "И если ты сделаешь это, то даже там —"
10145-660 = "ты сможешь ощутить моё присутствие."
10145-2600 = "Что ты видишь в том, чем наделено это оружие, Сенсей? ...Я верю, что оно символизирует неизменную связь между нами двумя."