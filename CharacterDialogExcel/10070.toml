[translation]
10070-10 = "ブルー、アーカイブ。"
10070-20 = "山海経高級中学校所属、\n玄龍門の執行部長、近衛ミナだ。\n我々の行く手を阻むものは、全て私が処理しよう！"
10070-30 = "迷う船には、拠り所となる\n灯台が必要だ。\nだから、先生が…\nその…や、やっぱり聞か\nなかったことにしてくれ！"
10070-40 = "かぐわしい茶の香りだ…\nまだあまり\n得意ではないが、\nいいものだな。"
10070-50 = "静中の動を\n感じる場所とは…\nまさにここを\n指すのだろうな。"
10070-60 = "山海経のカフェは、\n実際は茶屋に\n近いんだよな…"
10070-70 = "良い香りだ…\n少し、肩の力を\n抜こうかな。"
10070-80 = "ああ、先生か。\nこんな場所で会うなんて、\n世間は狭いものだな…"
10070-90 = "ん？\nここはシャーレだから\n普通…？"
10070-100 = "そ、そうか。"
10070-110 = "待ってたぞ、先生。"
10070-120 = "今日はどんな世界が我々を\n迎えてくれるんだろうか。\nワクワクしてしまうな。"
10070-130 = "人は独りでは\n生きていけない…"
10070-140 = "ありきたりな言葉だが。\nまぁ、嫌いではない。"
10070-150 = "人は、他人を\n警戒する生き物だ…\nそして、同じだけ\n信用するものでもある。"
10070-160 = "私は、先生を\n信じるべきなのだろうか、\nそれとも…。"
10070-170 = "そう心配するな、先生。\n明日になれば、全て治まるさ。"
10070-180 = "映画は良いものだ。\n歳月という名の\n折り紙付きのものは、\n尚良い。"
10070-190 = "名作だから\n生き残ったのではない、\n生き残ったからこそ\n名作と呼ぶのだ。"
10070-200 = "時折、\n何者かになりたいと\n思うことがある。"
10070-210 = "何でもいいから、\n今の自分よりも\n優れた何かに――"
10070-220 = "そうか…だから、\n「映画」だったんだな。"
10070-230 = "おめでとう、先生。\n何がって、\nそりゃあ先生の\n誕生日のことさ。"
10070-240 = "プレゼントは――\n私が厳選した、\nノワール映画10選だ！"
10070-250 = "さあ、一緒に\n観ようじゃないか！"
10070-260 = "ふぅ…\n先生から誕生日を\n祝われるこの感じ、\n悪くないな。"
10070-270 = "一日中、机に\n向かっているのも\n体に悪いだろう。"
10070-280 = "今日一日\n私に付き合ってくれ！"
10070-290 = "新年か…\nあけましておめでとう、先生。"
10070-300 = "先生は、\n今年の目標は\n決めたのか？"
10070-310 = "私はもちろん…\n更にハードボイルドな人生を\n送ること、だな。"
10070-320 = "クリスマス…祭り事か。"
10070-330 = "祭り事という言葉は、\nいろんな意味で\n使われているな。"
10070-340 = "…何故そんな目で見る？\n深い意味は無いぞ。"
10070-350 = "ハロウィーンか…\n子供たちが\n忙しい時期だな。"
10070-360 = "久しぶりに\n梅花園に寄って、\n飴でも配るか…"
10070-370 = "よかったら先生も\n一緒にどうだ？"
10070-390 = "そうだな…\n雨の日の景色は好きだ。"
10070-400 = "色々なものが\nシンプルに見える。 "
10070-410 = "白と黒――\nノワールの世界。"
10070-420 = "この世界は、\n眩しすぎるほどの\n光彩で構成されている。"
10070-430 = "だが、人々は\nその事実に気付かない…"
10070-440 = "私だって\n例外ではないが。"
10070-450 = "ノワールの世界は、\n違うんだ。"
10070-460 = "少なくとも…\n分かりやすい。"
10070-470 = "ただ…そうだな。\nせめて傘くらいは…"
10070-480 = "道に迷わぬよう、\n明るい色のものが\n良いだろう。"
10070-2600 = "素晴らしい…\nピッタリじゃないか、\nまるで最初から私の物で\nあったかのようだ…\nフッ、準備はできた。\nさあ、行こうじゃないか。"
