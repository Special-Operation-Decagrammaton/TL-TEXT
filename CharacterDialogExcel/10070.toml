[translation]
10070-10 = "Blue Archive."
10070-20 = "Sou a Konoe Mina, chefe executiva do Genryumon, da Academia Shanhaijing.\nCuidarei de qualquer um que tente bloquear o nosso caminho!"
10070-30 = "Um navio perdido precisa de um farol\npara se guiar.\nPor isso, Sensei...\nIsso... não, esqueça o que eu disse!"
10070-40 = "Que aroma de chá agradável...\nAinda não sou muito acostumada,\nmas é algo bom."
10070-50 = "Um lugar onde se sente o movimento\ndentro da quietude...\nDeve ser exatamente\naqui."
10070-60 = "O café de Shanhaijing,\nna verdade, é mais parecido\ncom uma casa de chá..."
10070-70 = "Que aroma bom...\nTalvez eu deva relaxar\num pouco os ombros."
10070-80 = "Ah, Sensei.\nEncontrar você em um lugar desses,\no mundo é pequeno mesmo..."
10070-90 = "Hm?\nComo aqui é o Schale,\né normal...?"
10070-100 = "E-entendo."
10070-110 = "Eu estava te esperando, Sensei."
10070-120 = "Que tipo de mundo nos receberá\nhoje, eu me pergunto.\nEstou ficando empolgada."
10070-130 = "As pessoas não conseguem\nviver sozinhas..."
10070-140 = "É um clichê,\nmas não desgosto disso."
10070-150 = "Os seres humanos são criaturas\nque desconfiam dos outros...\nE, ao mesmo tempo,\nque também confiam."
10070-160 = "Será que eu deveria\nconfiar em você, Sensei,\nou talvez..."
10070-170 = "Não se preocupe tanto, Sensei.\nQuando o amanhã chegar, tudo se resolverá."
10070-180 = "Filmes são ótimos.\nAqueles que possuem o selo de aprovação\nchamado tempo,\nsão ainda melhores."
10070-190 = "Não é que sobreviveram por serem obras-primas,\nelas são chamadas de obras-primas\njustamente por terem sobrevivido."
10070-200 = "Às vezes,\neu sinto vontade de\nme tornar outra pessoa."
10070-210 = "Qualquer coisa serve, contanto que seja\nalgo superior\na quem sou agora—"
10070-220 = "Entendo... então era por isso\nque era um \"filme\"."
10070-230 = "Parabéns, Sensei.\nO motivo? Ora,\né claro que é pelo seu\naniversário."
10070-240 = "O presente é—\numa seleção de 10 filmes noir\nque escolhi a dedo!"
10070-250 = "Vamos lá, por que não\nassistimos juntos?"
10070-260 = "Ufa...\nEssa sensação de ser parabenizada\npelo Sensei no meu aniversário,\nnão é nada mal."
10070-270 = "Ficar sentado na mesa\no dia todo\nfaz mal para a saúde."
10070-280 = "Passe o dia de hoje\ncomigo!"
10070-290 = "Ano Novo, é...\nFeliz Ano Novo, Sensei."
10070-300 = "Sensei, você já\ndecidiu suas metas\npara este ano?"
10070-310 = "Eu, é claro...\npretendo viver uma vida\nainda mais hard-boiled."
10070-320 = "Natal... uma festividade, é."
10070-330 = "A palavra festividade\né usada com\nvários significados."
10070-340 = "...Por que me olha assim?\nNão tem nenhum significado oculto."
10070-350 = "Halloween, é...\nÉ uma época\nagitada para as crianças."
10070-360 = "Faz tempo que não passo\nno Jardim das Ameixeiras,\nquem sabe eu distribua alguns doces..."
10070-370 = "Se quiser, Sensei,\npor que não vem comigo?"
10070-390 = "Pois é...\nEu gosto da paisagem em dias de chuva."
10070-400 = "Várias coisas\nparecem mais simples."
10070-410 = "Branco e preto—\no mundo noir."
10070-420 = "Este mundo é composto\npor cores brilhantes\naté demais."
10070-430 = "Mas as pessoas\nnão percebem esse fato..."
10070-440 = "Embora eu também\nnão seja exceção."
10070-450 = "O mundo noir\né diferente."
10070-460 = "Pelo menos...\né fácil de entender."
10070-470 = "Só que... é isso.\nAo menos um guarda-chuva..."
10070-480 = "Para não se perder no caminho,\num de cor clara\nseria melhor."
10070-2600 = "Incrível...\nNão é perfeito? É como se\ntivesse sido meu desde o início...\nHum, estou pronta.\nVamos nessa."
