[translation]
10018-20 = "ゲーム開発部、部長……ユズです。\nほ、本当に……わたしを連れてってくれるんですか？"
10018-30 = "きっと先生も……\nオトナな女性が\n好きなはず、だよね？"
10018-40 = "本格的に\nゲームを勉強したい。"
10018-50 = "ゆったりとした空間\nだね。こんなところで\nすやすやしたいな。"
10018-60 = "うーん。\n隠れられる場所は\nないのかな。"
10018-70 = "ひゃっ！\nど、どうしてここに！"
10018-80 = "せ、先生。いらっしゃい。\n待ってました。"
10018-90 = "先生……\nお帰りなさい。"
10018-100 = "先生の頼みなら……\n喜んでお受けします。"
10018-110 = "はい。どんなことでも\nおっしゃってください。"
10018-120 = "ベストを……\n尽くします！"
10018-130 = "あ。\n猫も飼いたいです。"
10018-140 = "ゲームと猫さえあれば、\n世の中を生きていけます。"
10018-150 = "……はい。先生。\nわたしも、強くなります。"
10018-160 = "先生とみんなが……\nわたしを守ってくれたように、\nわたしもみんなの\n力になりたいです。"
10018-170 = "（この人に……\n相応しいわたしになりたい。）"
10018-180 = "お誕生日おめでとう\nございます、先生。"
10018-190 = "本当に……\n本当に……！"
10018-200 = "きょ、今日はわたしの\n誕生日です。"
10018-210 = "キヴォトスの文化の\n日ですからね……\n忘れちゃダメですよ。"
10018-220 = "明けまして\nおめでとうございます。"
10018-230 = "わたし、もっと成長した姿を、\nお見せしますから。"
10018-240 = "メ、メリークリスマス……\n先生。"
10018-250 = "サンタとゲームは……\n似ています。\nどちらもトキメキを\nプレゼントしてくれるので。"
10018-260 = "街が、光るカボチャと\n飴で溢れていますね。"
10018-270 = "わ、わたしも行ってみたいです。\n先生と一緒に……。"
10018-290 = "先生とじゃなかったら……\nできなかったと思います。"
10018-300 = "みんなにプレゼントが\nできたのは、\n先生のおかげです。"
10018-310 = "先生が助けて\nくれたように……"
10018-320 = "先生にわたしが必要な\n瞬間が来たら、\n何でも言ってくださいね。"
10018-330 = "……必ず、\n恩返しします。"
10018-2600 = "体の中で……力が漲ってる感じです。\nこれが……勇気でしょうか？"
