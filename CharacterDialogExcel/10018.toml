[translation]
10018-20 = "Do Departamento de Desenvolvimento de Jogos, a presidente... Yuzu. V-você realmente... vai me levar com você?"
10018-30 = "Tenho certeza de que o Sensei também... gosta de mulheres adultas, não é?"
10018-40 = "Quero estudar jogos de verdade."
10018-50 = "Que espaço relaxante. Eu adoraria tirar uma soneca em um lugar assim."
10018-60 = "Hmm. Será que não tem nenhum lugar para se esconder?"
10018-70 = "Eek! P-por que você está aqui?!"
10018-80 = "S-Sensei. Bem-vindo. Eu estava te esperando."
10018-90 = "Sensei... bem-vindo de volta."
10018-100 = "Se é um pedido do Sensei... eu aceito com prazer."
10018-110 = "Sim. Pode me pedir qualquer coisa."
10018-120 = "Vou dar o meu melhor!"
10018-130 = "Ah. Eu também quero ter um gato."
10018-140 = "Se eu tiver jogos e um gato, consigo viver neste mundo."
10018-150 = "...Sim, Sensei. Eu também vou me tornar mais forte."
10018-160 = "Assim como o Sensei e todos me protegeram... eu também quero ser útil para todos."
10018-170 = "(Eu quero me tornar alguém... digna desta pessoa.)"
10018-180 = "Feliz aniversário, Sensei."
10018-190 = "Sério... sério mesmo...!"
10018-200 = "H-hoje é o meu aniversário."
10018-210 = "É o Dia da Cultura de Kivotos, afinal... você não pode esquecer, viu."
10018-220 = "Feliz Ano Novo."
10018-230 = "Eu vou mostrar a você uma versão minha que cresceu ainda mais."
10018-240 = "F-feliz Natal... Sensei."
10018-250 = "O Papai Noel e os jogos... são parecidos. Ambos nos presenteiam com emoção."
10018-260 = "A cidade está cheia de abóboras brilhantes e doces."
10018-270 = "E-eu também quero ir. Junto com o Sensei..."
10018-290 = "Se não fosse com o Sensei... acho que eu não teria conseguido."
10018-300 = "Conseguir dar presentes para todos... foi graças ao Sensei."
10018-310 = "Assim como o Sensei me ajudou..."
10018-320 = "Se chegar um momento em que o Sensei precise de mim, pode me pedir qualquer coisa."
10018-330 = "...Eu certamente vou retribuir o favor."
10018-2600 = "Sinto como se uma força estivesse transbordando dentro de mim. Será que... isso é coragem?"
