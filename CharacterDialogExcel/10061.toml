[translation]
10061-10 = "Blue Archive."
10061-20 = "Sou eu, Sakurako Utazumi, da Irmandade da Academia Trinity.\nQue haja paz em seus dias."
10061-30 = "Então este é o lugar\nque o Sensei está\ndecorando..."
10061-40 = "Muitas pessoas\nvieram visitar, não é?"
10061-50 = "A atmosfera é bem\ndiferente da catedral."
10061-60 = "De vez em quando...\né bom estar\nem um lugar assim."
10061-70 = "Embora a forma seja diferente,\nsinto uma sensação\nde paz."
10061-80 = "Eu estava à sua espera, Sensei.\nQue haja bênçãos sobre você hoje também."
10061-90 = "Ah, Sensei...\nEu estava justamente\norando por você."
10061-100 = "Ajudar o Sensei no Schale..."
10061-110 = "Como é diferente do meu trabalho habitual,\nestou um pouco nervosa."
10061-120 = "Trabalho na catedral... você diz?"
10061-130 = "Está tudo bem.\nJá ajustei\nminha agenda."
10061-140 = "Sim, Sensei.\nSe houver algo que eu possa fazer,\npor favor, diga-me..."
10061-150 = "Seja sobre assuntos da catedral,\ntarefas gerais, ou qualquer outra coisa...\nsinta-se à vontade para me pedir."
10061-160 = "Você parece cansado.\nHá algo em que eu possa\nte ajudar?"
10061-170 = "É um dia especial,\nrepleto de gratidão."
10061-180 = "Para mim também... é assim."
10061-190 = "Muito obrigada, Sensei."
10061-200 = "Ter o aniversário celebrado...\né realmente algo feliz."
10061-210 = "Um ano se passou e pude\nreceber um novo ano."
10061-220 = "Que este ano também seja\nmuito feliz para você, Sensei."
10061-230 = "Sim.\nHoje é, sem dúvida,\num dia especial."
10061-240 = "Espero que isso\ntambém chegue ao Sensei."
10061-250 = "A véspera do dia de festa...\né o dia mais agitado, não é?"
10061-260 = "Não, não é que eu não goste.\nPorque a alegria aumenta\nquando é compartilhada."
10061-280 = "Eu não gostaria de esconder\nmuitas coisas de você,\nSensei, mas..."
10061-290 = "Devido à minha posição, é difícil\nrevelar tudo —"
10061-300 = "Mas, apenas o fato de que\n'eu tenho segredos'..."
10061-310 = "Fico feliz por ter\npodido te contar."
10061-320 = "Não espero que\nme compreenda."
10061-330 = "E nem desejo que..."
10061-340 = "Ainda assim, o desejo de mostrar\nquem eu realmente sou...\nexiste."
10061-350 = "Eu estava ansiosa, pensando se\nmesmo sendo assim, você\nme aceitaria."
10061-360 = "Recebi uma resposta\nmais cedo do que esperava."
10061-370 = "Muito, muito\nobrigada, Sensei."
10061-2600 = "Você está me concedendo misericórdia. Aceito com gratidão. Que um dia, chegue o momento em que eu possa retribuir essa bondade."
