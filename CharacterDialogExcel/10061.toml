[translation]
10061-10 = "ブルーアーカイブ。"
10061-20 = "トリニティ総合学園、\nシスターフッド所属の歌住サクラコです。\n日々に安寧があらんことを。"
10061-30 = "ここが、\n先生が飾りつけて\nいるという…。"
10061-40 = "いろんな方が\nいらしていますね。"
10061-50 = "聖堂とは雰囲気が\n随分と違いますね。"
10061-60 = "たまには…\nこういう場所に\nいるのも良いものです。"
10061-70 = "形は違いますが、\n穏やかな\n気持ちになります。"
10061-80 = "お待ちしておりました、先生。\n今日も祝福があらんことを。"
10061-90 = "あ、先生…。\nちょうど、先生のために\n祈りを捧げていたところです。"
10061-100 = "シャーレで先生の補佐を…"
10061-110 = "普段の仕事と違うので、\n少し緊張します。"
10061-120 = "聖堂の仕事…ですか？"
10061-130 = "大丈夫ですよ。\n日程の調整は\n済ませております。"
10061-140 = "はい、先生。\n私にできることが\nありましたら、なんなりと…。"
10061-150 = "聖堂に関することも、\n一般的な業務も、\nそれ以外でも…なんなりと\nお申し付けくださいね。"
10061-160 = "お疲れのご様子ですね。\n私にお手伝いできる\nことはありますか？"
10061-170 = "感謝に満ちた\n特別な日ですね。"
10061-180 = "私にとっても…そう。"
10061-190 = "ありがとうございます、先生。"
10061-200 = "誕生日を祝ってもらうのは…\nやはり幸せなことですね。"
10061-210 = "一年が過ぎ、新たな年を\n迎えることができました。"
10061-220 = "今年も先生にとって\n幸せな年でありますよう。"
10061-230 = "はい。\n今日は間違いなく\n特別な日です。"
10061-240 = "先生にも、\n伝わると良いのですが。"
10061-250 = "祝祭の日の前日…\n一番騒がしい日ですね。"
10061-260 = "いいえ、嫌いなわけでは\nありません。喜びは\n分け合うほど\n大きくなりますから。"
10061-280 = "先生に対して、\nあまり隠し事を\nしたくはないのですが…"
10061-290 = "私の立場上、全てを\n明かすことは難しく――"
10061-300 = "ですが、私に\n「秘密があるという事実」\nだけでも…"
10061-310 = "お伝えする事ができて、\n良かったです。"
10061-320 = "理解を得られるとは\n思っておりません。"
10061-330 = "それを望む事も…"
10061-340 = "それでも、私の素顔を\nお見せしたい気持ちは…\nあるのです。"
10061-350 = "その…そのような私でも\n良いのか、不安では\nあったのですが。"
10061-360 = "思っていたよりも早く、\n答えを頂いてしまいましたね。"
10061-370 = "本当に…\nありがとうございます、先生。"
10061-2600 = "私に慈悲を与えてくださるのですね。\n有難く頂戴いたします。いつか、このご恩を\nお返しできる日が訪れますように。"
