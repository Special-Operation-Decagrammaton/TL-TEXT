[translation]
26012-10 = "Blue~~~ Archive!"
26012-20 = "Sou Kirino, do Departamento de Segurança Pública da Escola de Polícia Valkyrie, atuando como salva-vidas!\nDeixe as situações perigosas nas mãos desta oficial!"
26012-30 = "Sim! É um\nlugar seguro!"
26012-40 = "Aquela pessoa me preocupa\num pouco...\nVou ficar de olho."
26012-50 = "(Serviço, escuta,\nintegridade, e um sorriso!\nNão posso esquecer!)"
26012-60 = "Isso...\nEu queria ter um desses\nno parque aquático também!"
26012-70 = "A localização do DEA é..."
26012-80 = "Eu estava esperando pelo senhor, Sensei!\nQue tal fazermos um aquecimento?"
26012-90 = "Olá, Sensei!\nO senhor está tendo\num dia seguro hoje?"
26012-100 = "Quando for entrar na água,\ntem que começar a se molhar\nindo das partes mais distantes do coração!"
26012-110 = "Hm? O senhor precisa da ajuda\ndesta oficial!?"
26012-120 = "Confirmar a reação, chamar a emergência,\nchecar a respiração... E depois disso..."
26012-130 = "N-Não me diga!\nEu já vou lembrar!"
26012-140 = "Se o senhor se afogar, não se preocupe!\nEsta oficial vai correndo te salvar!"
26012-150 = "Acidentes na água podem\nacontecer a qualquer momento!"
26012-160 = "O escritório da Schale\nnão é uma exceção!"
26012-170 = "Feliz aniversário, Sensei!"
26012-180 = "Como presente de aniversário,\nquando o senhor for\nao parque aquático,\neu vou te guiar no toboágua\nduas vezes seguidas!"
26012-190 = "Muito obrigada\npor me dar os parabéns!"
26012-200 = "Espero que o senhor também passe\num dia divertido e seguro, Sensei."
26012-210 = "Espero que todos consigam\npassar este ano em segurança."
26012-220 = "Feliz Natal!"
26012-230 = "Sensei, gostaria de comer comigo\nno restaurante que esta oficial sempre frequenta?"
26012-240 = "Em festivais animados,\no perigo está sempre presente!"
26012-250 = "Não estamos na piscina, mas\nprecisamos tomar muito\ncuidado com acidentes!"
26012-270 = "Sensei! O senhor está bem!?"
26012-280 = "Que alívio...\nO senhor acordou."
26012-290 = "Eu achei que\nalgo terrível tinha\nacontecido."
26012-300 = "A reanimação cardiopulmonar...\nParece que não será necessária."
26012-310 = "Perto da água, é preciso\nestar sempre prestando atenção\nà situação ao redor!"
26012-320 = "Porque por mais confiança\nque a pessoa tenha na natação,\num imprevisto pode\nacontecer a qualquer momento."
26012-330 = "Claro que, se tiver uma\nsalva-vidas como esta oficial por perto,\nnão haverá nenhum problema!"
26012-340 = "Esta oficial estará sempre te vigiando,\nentão pode ficar tranquilo!"
26012-2600 = "M-Minha mira pode não ser a melhor, mas\nfarei o meu melhor pelo senhor, Sensei!"