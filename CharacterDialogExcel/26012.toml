[translation]
26012-10 = "Blue Archive!"
26012-20 = "Sou Kirino, salva-vidas do Departamento de Segurança Pública, pertencente à Academia de Polícia Valkyrie!\nDeixe qualquer situação perigosa comigo!"
26012-30 = "Sim! É um lugar\nseguro, não é!"
26012-40 = "Aquela pessoa, estou um pouco\npreocupada com ela...\nVou ficar de olho."
26012-50 = "(Servir, ouvir,\nser sincera e sorrir!\nNão posso esquecer!)"
26012-60 = "Isso...\nseria bom ter no\nparque aquático também!"
26012-70 = "A localização do DEA é..."
26012-80 = "Estava à sua espera, Sensei!\nQue tal fazermos alguns exercícios de aquecimento?"
26012-90 = "Olá, Sensei!\nEstá tendo um dia seguro\nhoje também?"
26012-100 = "Ao entrar na água,\ncomece molhando as partes\nmais distantes do coração!"
26012-110 = "Hm? Precisa da\najuda desta oficial!?"
26012-120 = "Verificar reação, relatório de emergência,\nverificar respiração... e depois disso..."
26012-130 = "N-não me diga!\nJá vou me lembrar!"
26012-140 = "Não se preocupe se estiver se afogando!\nEsta oficial virá te salvar!"
26012-150 = "Acidentes aquáticos podem\nacontecer a qualquer momento!"
26012-160 = "O escritório do Schale\nnão é exceção!"
26012-170 = "Parabéns, Sensei!"
26012-180 = "Quando vier ao\nparque aquático,\ncomo presente de aniversário,\nte levarei no toboágua\nduas vezes seguidas!"
26012-190 = "Obrigada por\ncomemorar comigo!"
26012-200 = "Sensei, tenha um dia\ndivertido e seguro também."
26012-210 = "Que este ano todos\npossam ficar em segurança."
26012-220 = "Feliz Natal!"
26012-230 = "Sensei, gostaria de comer comigo\nno meu restaurante favorito?"
26012-240 = "Festivais movimentados\nsempre trazem perigos!"
26012-250 = "Não é uma piscina, mas\nainda assim é bom\ntomar cuidado com acidentes!"
26012-270 = "Sensei! Você está bem!?"
26012-280 = "Ainda bem...\nVocê acordou."
26012-290 = "Pensei que algo\nterrível tivesse\nacontecido."
26012-300 = "Parece que a\nressuscitação cardiopulmonar\nnão será necessária."
26012-310 = "Perto da água,\né preciso estar sempre\natento ao ambiente!"
26012-320 = "Mesmo para quem tem\nmuita confiança em nadar,\nimprevistos podem\nacontecer a qualquer momento."
26012-330 = "Claro, se tiver uma salva-vidas\ncomo eu por perto,\nnão há problema!"
26012-340 = "Pode ficar tranquilo, pois\nestarei sempre vigiando!"
26012-2600 = "E-eu não sou boa de mira, mas\nvou dar o meu melhor pelo Sensei!"
