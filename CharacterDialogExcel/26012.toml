[translation]
26012-10 = "ブル～～～アーカイブ！"
26012-20 = "ヴァルキューレ警察学校所属、\n生活安全局ライフセーバーのキリノです！\n危険な状況は本官にお任せください！"
26012-30 = "うん！安全な\n場所ですね！"
26012-40 = "あの人、少し\n心配ですね…\n見張っておきます。"
26012-50 = "（奉仕、傾聴、\n誠実、そして笑顔！\n忘れないように！）"
26012-60 = "これ…\nウォーターパークに\nもほしいですね！"
26012-70 = "AEDの位置は……"
26012-80 = "お待ちしておりました、先生！\n準備運動でもいかがでしょう？"
26012-90 = "こんにちは、先生！\n今日も安全な一日を\n過ごしてらっしゃいますか？"
26012-100 = "水に入るときは\n心臓に遠いところから\n濡らしていくんですよ！"
26012-110 = "ん？本官の助けが\n必要でしょうか！？"
26012-120 = "反応確認、緊急報告、\n呼吸確認……その次は……"
26012-130 = "い、言わないでください！\nもうすぐ思い出しますから！"
26012-140 = "溺れても心配しないでください！\n本官が助けに行きますから！"
26012-150 = "水難事故はいつ何時でも\n発生するものです！"
26012-160 = "シャーレのオフィスだって\n例外ではありません！"
26012-170 = "おめでとうございます、先生！"
26012-180 = "ウォーターパークに\nいらっしゃった際には、\nお誕生日プレゼントとして、\nスライダーを2回連続で\n案内しますね！"
26012-190 = "祝ってくださり\nありがとうございます！"
26012-200 = "先生も、楽しく安全な\n一日をお過ごしください。"
26012-210 = "今年はみんなが\n安全に過ごせますように。"
26012-220 = "メリークリスマス、です！"
26012-230 = "先生、本官の行きつけの\nお店で一緒に食べませんか？"
26012-240 = "賑やかなお祭りには\n危険がつきものです！"
26012-250 = "プールではありませんが、\n事故には気をつけたい\nところです！"
26012-270 = "先生！大丈夫ですか！？"
26012-280 = "よかった……\n目が覚めたんですね。"
26012-290 = "大変なことに\nなってしまったのかと\n思いました。"
26012-300 = "心肺蘇生法は……\n必要なさそうですね。"
26012-310 = "水辺では、\n常に周囲の状況に\n注意を払う必要があります！"
26012-320 = "どんなに泳ぎに\n自信がある人でも、\n不測の事態はいつでも\n起こりうるからです。"
26012-330 = "もちろん、本官のような\nライフセーバーがいれば\n問題ないのですが！"
26012-340 = "本官がいつも見守っているのでご\n安心ください！"
26012-2600 = "しゃ、射撃は得意ではありませんが、\n先生のために全力を尽くします！"
