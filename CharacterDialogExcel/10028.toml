[translation]
10028-10 = "Blue Archive."
10028-20 = "Tcharam! Olha só, Mestre!\nÉ a Asuna em traje de coelhinha!"
10028-30 = "Pula, pula!\nA Asuna coelhinha chegou!"
10028-40 = "Aqui também parece\nser um lugar\nsuper divertido!"
10028-50 = "Ahahaha!\nO que é isso? Que engraçado!"
10028-60 = "Ué, para onde\no Mestre foi?\nSerá que eu vou procurar?"
10028-70 = "Em parques de diversões\ntambém costuma ter\nessas coelhinhas\ncomo eu, né!"
10028-80 = "Bem-vindo de volta, Mestre!\nEu estava te esperando\nvestida de coelhinha fofa!"
10028-90 = "O que te interessa, Mestre?\nAs orelhas? O rabo?\nOu talvez...?"
10028-100 = "Hum, o que foi?\nGostou desse traje?\nQuer experimentar um também, Mestre?"
10028-110 = "Não se pode deixar\numa coelhinha\nse sentir sozinha."
10028-120 = "Por isso, você tem que\nme fazer muitos carinhos, Mestre!"
10028-130 = "Ahahahaha!\nEi, faz cócegas,\nMestre!"
10028-140 = "Hum, estou um pouco entediada..."
10028-150 = "Era o que eu pensava, mas como\no Mestre veio me ver,\nestá tudo ótimo! Eba!"
10028-160 = "Como será que se leva\numa coelhinha\npara passear, hein?"
10028-170 = "...Mestre, quer tentar\nfazer isso agora?"
10028-180 = "Feliz aniversário, Mestre!\nComo é seu aniversário, vou te dar\na Asuna de presente\nneste traje fofo de coelhinha!"
10028-190 = "Mestre, você sabe\nque dia é hoje?"
10028-200 = "Fufu, bom, hoje eu vou\nquerer brincar ainda mais\ndo que o de costume!"
10028-210 = "O ano novo começou, Mestre!\nNão se preocupe, a Asuna vai\nficar do seu lado este ano também!"
10028-220 = "Feliz Natal, Mestre!"
10028-230 = "Hum?\nPor que estou de coelhinha\nno Natal, você pergunta?"
10028-240 = "Ora, ora,\né uma coelhinha Noel!"
10028-250 = "Todo mundo está com trajes engraçados!\nMas acho que a Asuna não perde\ncom esse visual,"
10028-260 = "Vamos lá, Mestre!\nVamos atacar juntos!"
10028-280 = "Ué,\no que você está fazendo\naqui a essa hora, Mestre?"
10028-290 = "...Eu?\nComo pode ver, vim\nlavar roupa!"
10028-300 = "...Por que estou vestida assim\nse vim lavar roupa, você pergunta?"
10028-310 = "Na verdade, fora este traje,\ncoloquei tudo para lavar."
10028-320 = "Até as roupas de baixo estão lá,\nentão não tenho mais nada para vestir!"
10028-330 = "Ei, não é mentira, viu?\n...Quer ver e conferir\npor si mesmo?"
10028-340 = "Ahaha, seu rosto ficou vermelho!\nMas, Mestre, por que\nvocê veio aqui?"
10028-350 = "...Ah, você veio\nme ver?\nA essa hora?"
10028-360 = "Que alegria! Eu estava aqui\nsozinha e entediada!!"
10028-370 = "Obrigada, Mestre!!\nEntão, do que vamos brincar?"
10028-2600 = "Tcharam!\nAsuna em traje de coelhinha, forma completa!\nBrincadeirinha!"
