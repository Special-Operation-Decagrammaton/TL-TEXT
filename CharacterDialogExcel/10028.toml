[translation]
10028-10 = "ブルーアーカイブ。"
10028-20 = "じゃーん！見て見て、ご主人様！\nバニー姿のアスナだよ！"
10028-30 = "ぴょんぴょん！\nバニーのアスナ参上！"
10028-40 = "ここもすっごく\n楽しそうな\nところだね！"
10028-50 = "あははは！\n何これ面白い！"
10028-60 = "あれ、ご主人様\nどこ行ったんだろ？\n探しに行こっかな～？"
10028-70 = "遊園地とかにもよく、\n今の私みたいな\nウサギさんたちが\nいるよね！"
10028-80 = "おかえり、ご主人様！\n可愛いバニーさんの格好で\n待ってたよ！"
10028-90 = "ご主人様が興味あるのは、\n耳？しっぽ？\nそれとも～……？"
10028-100 = "ん、どうしたの？\nこの衣装気に入った？\nじゃあご主人様も着てみる？"
10028-110 = "ウサギさんは\n寂しくさせちゃ\nダメなんだよ。"
10028-120 = "だから、ご主人様にたくさん\n撫でてもらわないと！"
10028-130 = "あははははっ！\nちょっ、くすぐったいよ\nご主人様～！"
10028-140 = "うーん、ちょっと暇だなあ……"
10028-150 = "って思ってたけど、\nちょうどご主人様が\n来てくれたから\nオールオッケー！わーい！"
10028-160 = "ウサギさんって、どうやって\n散歩に連れて行くんだろうね？"
10028-170 = "……ご主人様、\n今からやってみる？"
10028-180 = "ハッピーバースデー、ご主人様！\n誕生日なので、ご主人様には\nこの可愛いバニー姿の\nアスナちゃんをプレゼント！"
10028-190 = "ご主人様、\n今日は何の日か知ってる？"
10028-200 = "ふふっ、さーて、\n今日はいつも以上に\nたくさん遊んで\nもらっちゃおうかな！"
10028-210 = "新年が始まったね、ご主人様！\n大丈夫、今年もアスナが\nそばにいてあげるから！"
10028-220 = "メリークリスマス、ご主人様！"
10028-230 = "ん？\nクリスマスなのにどうして\nバニー姿なのかって？"
10028-240 = "あれあれ、\nバニーサンタってやつ！"
10028-250 = "みんな面白い格好してるね！\nでもアスナもこの衣装なら\n負けてなさそうだし、"
10028-260 = "さあ、ご主人様！\n一緒に突撃ー！"
10028-280 = "あれ、\nこんな時間にどうしたの、\nご主人様？"
10028-290 = "……私？\n私は見ての通り、\n洗濯をしに！"
10028-300 = "……洗濯しに来たのに、\n何でその格好なのって？"
10028-310 = "実は今、この衣装以外、\n全部洗っちゃってて。"
10028-320 = "下着も全部入れちゃったから、\n他に着るもの無くってさー？"
10028-330 = "えー、嘘じゃないよ～？\n……何なら直接見て、\n確かめてみる？"
10028-340 = "あははっ、顔真っ赤！\nところでご主人様は、\nどうしてここに？"
10028-350 = "……え、私に会いに\n来てくれたの？\nこんな時間に？"
10028-360 = "嬉しー！ちょうど一人で、\n退屈してたところだったの！！"
10028-370 = "ありがとう、ご主人様！！\nじゃあ、何して遊ぼっか？"
10028-2600 = "じゃーん！\nバニー姿のアスナ、完全体！\nなんちゃって！"
