[translation]
20056-10 = "Blue! Archive!"
20056-20 = "Ни-ха-ха-ха! Ты наконец-то добрался сюда, Сенсей! Прямиком туда, где тебя ждёт Куросаки Коюки!"
20056-30 = "(Отличное место, чтобы спрятаться... прямо здесь!)"
20056-40 = "(Интересно... прокатит ли здесь карточка Семинара?)"
20056-50 = "Ты ведь не шёл за мной по пятам до самого этого места... правда?"
20056-60 = "Сенсей, ты где-о~?"
20056-70 = "Сегодняшний кофе... случайный купаж?! Угх... я не особо такое люблю."
20056-80 = "А! Сенсей, ты как раз вовремя!"
20056-90 = "Я как раз собиралась открыть бустер с карточками!"
20056-100 = "Привет, Сенсей!"
20056-110 = "Можно мне взять вкусняшек? Ты ведь не против, да?"
20056-120 = "Ну, вообще-то я их уже ем! Ни-ха-ха!"
20056-130 = "Сегодня моя очередь дежурить?"
20056-140 = "Погоди секундочку, я сбегаю за ковриком для пикника!"
20056-150 = "Пошли-пошли, мы идём в игровые автоматы! Сенсей!"
20056-160 = "Сенсей, ну иди уже скорее сюда!"
20056-170 = "...Можешь выключить свет на секунду?"
20056-180 = "Шале — такое классное место~!"
20056-190 = "Никаких тебе дронов-ищейщиков, никаких защитных ставен, чтобы запирать людей..."
20056-200 = "Как насчёт того, чтобы устраивать наши «размышления» здесь, в Шале, а не в карцере?"
20056-210 = "Отличная же идея, правда? Ну скажи, что отличная!"
20056-220 = "С днём рождения! Сенсей!"
20056-230 = "Давай не будем спать всю ночь и проиграем до упаду!!"
20056-240 = "Чего бы мне хотелось...?"
20056-250 = "Хм-м~?"
20056-260 = "Ты точно уверен, что хочешь это услышать? Жалеть потом не будешь?"
20056-270 = "Сегодня же последний день в году!"
20056-280 = "Так что неважно, что мы сегодня натворим, всю уборку можно просто оставить на следующий год! Ни-ха-ха!"
20056-290 = "...А? Сегодня не последний день?"
20056-300 = "Год уже вовсю идёт? Это ещё что значит?!"
20056-310 = "Чтобы Санта точно смог добраться в целости и сохранности,"
20056-320 = "я отключила всю систему безопасности! Ни-ха-ха!"
20056-330 = "Подумать только, мне разрешают разгуливать по улицам в таком наряде...!"
20056-340 = " Какой чудесный день!"
20056-360 = "А-а-а-ах?! Ну зачем ты сейчас использовал этот приём!!"
20056-370 = "Я же говорила тебе подождать, пока я не пойду первой!"
20056-380 = "Ты пытаешься разрушить мою идеальную стратегию?!"
20056-390 = "Я ради этого даже проснулась пораньше и заняла для тебя место, Сенсей!!"
20056-400 = "...Э? Это вообще из другой оперы?"
20056-410 = "Раз уж ты так заговорил, Сенсей, это ведь ты закинул больше монеток...?"
20056-420 = "Угх... ну... это правда, но всё равно..."
20056-430 = "Хмф... объявляем перемирие! Временное перемирие!"
20056-440 = "Вот увидишь! В следующий раз я точно справлюсь лучше!"
20056-450 = "...Ни-ха-ха!"
20056-460 = "...Ни-ха-ха."
20056-2600 = "Я уверена, что моей самой большой удачей в жизни была встреча с тобой, Сенсей! Так что... ну, я выложусь на полную! Рассчитываю на тебя!"