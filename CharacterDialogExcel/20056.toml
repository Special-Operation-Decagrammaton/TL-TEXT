[translation]
20056-10 = "ブルー！アーカイブ！"
20056-20 = "に・は・は・はー！\nついにここまで来ちゃいましたね、先生！\nこの黒崎コユキの元に！"
20056-30 = "（隠れられそうな\n場所は……ここ！）"
20056-40 = "（ここ……\nセミナーのカードって\n使えますかね？）"
20056-50 = "まさかここまで\n追いかけて\nきたりなんて\n……ねぇ？"
20056-60 = "先生どこ\nいるんですか～？"
20056-70 = "今日のコーヒーは……\nランダムブレンド！？\nうぇ……あんまり\n得意じゃないのに。"
20056-80 = "あ！先生いいところに～！"
20056-90 = "ちょうどカードパック\n開けるところだったんですよ！"
20056-100 = "こんにちは、先生！"
20056-110 = "お菓子食べてもいいですか？\nいいですよね？"
20056-120 = "ま、もう食べてるんですけどね！\nにははっ！"
20056-130 = "当番ですか？"
20056-140 = "ちょっと待っててください、\nレジャーシート取ってきます！"
20056-150 = "ほらほら、\nゲーセン行きますよ！\n先生！"
20056-160 = "先生早く\nこっちきてください！"
20056-170 = "……ちょっと電気消して\nもらっていいです？"
20056-180 = "シャーレは\nいいところですね～！"
20056-190 = "追跡用ドローンもないし、\n進入防止の\nシャッターもないし……。"
20056-200 = "反省部屋の代わりに\nシャーレで反省するって\nいうのはどうでしょう？"
20056-210 = "いいですよね？\nいいって言ってください！"
20056-220 = "ハッピーバースデー！\n先生！"
20056-230 = "今夜は徹夜で\n遊びまくりましょう！！"
20056-240 = "欲しいもの……？"
20056-250 = "ふ～ん？"
20056-260 = "本当に聞いちゃって\nいいんです？\n後悔、しません？"
20056-270 = "今日は一年の\n最後の日！"
20056-280 = "だから今日は何をしても、\n後片付けは来年に\nすればいいんです！\nにはは！"
20056-290 = "……えっ？\n最後の日じゃない？"
20056-300 = "もう年が明けてる？\nどういうことですか！？"
20056-310 = "サンタさんが\n無事に来れるよう、"
20056-320 = "セキュリティは\n全部解除しておきました！\nにははっ！"
20056-330 = "こんな格好で\n往来を歩き回って\nいいなんて……！"
20056-340 = "なんて\nいい日なんでしょう！"
20056-360 = "あぁっ！？\nなんで今その技\n出すんですか！！"
20056-370 = "私の後でやって\nくださいって\nいったのに！"
20056-380 = "完璧な作戦を\n崩すつもりですか！？"
20056-390 = "先生のために\n朝早く起きて\n場所まで取ったのに！！"
20056-400 = "……え？\nそれとこれとは\n別の話？"
20056-410 = "それを言うなら\n先生の方が\nコインを多く出してる……？"
20056-420 = "うーん……\nそれはそう、\nですけど……。"
20056-430 = "むぅ……\n休戦にしましょう！\n一時休戦！"
20056-440 = "そうですね！\n次は絶対\nうまくやってみせます！"
20056-450 = "……にはは！"
20056-460 = "……にはは。"
20056-2600 = "きっと、一番の幸運は先生に\n出会えたことなんでしょうね！\nだから、まぁ……全力で頑張りますよ！\nよろしくお願いしますね！"
