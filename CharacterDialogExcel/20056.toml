[translation]
20056-10 = "Blue! Archive!"
20056-20 = "Ni-ha-ha-ha! Finalmente você chegou até aqui, Sensei! Até onde a Kurosaki Koyuki está!"
20056-30 = "(Um lugar onde eu possa me esconder... aqui!)"
20056-40 = "(Será que... o cartão do Seminar funciona aqui?)"
20056-50 = "Você não vai me seguir até aqui... né?"
20056-60 = "Sensei, onde você está?"
20056-70 = "O café de hoje é... um blend aleatório!? Ué... não é muito o meu forte."
20056-80 = "Ah! Sensei, que bom que você apareceu!"
20056-90 = "Eu estava justamente prestes a abrir um pacote de cartas!"
20056-100 = "Olá, Sensei!"
20056-110 = "Posso comer um doce? Posso, né?"
20056-120 = "Bom, eu já estou comendo mesmo! Ni-ha-ha!"
20056-130 = "É minha vez de ser a responsável?"
20056-140 = "Espere um pouco, vou buscar o tapete de piquenique!"
20056-150 = "Vamos, vamos, vamos ao fliperama! Sensei!"
20056-160 = "Sensei, venha logo aqui!"
20056-170 = "...Pode apagar a luz um instante?"
20056-180 = "O Schale é um lugar tão bom~!"
20056-190 = "Não tem drone de rastreamento, nem persiana de segurança..."
20056-200 = "Que tal se, em vez da sala de reflexão, eu refletisse aqui no Schale?"
20056-210 = "Pode ser? Diga que pode!"
20056-220 = "Feliz aniversário! Sensei!"
20056-230 = "Vamos passar a noite toda jogando hoje!!"
20056-240 = "O que eu quero...?"
20056-250 = "Hmm?"
20056-260 = "Você tem certeza que quer ouvir? Não vai se arrepender?"
20056-270 = "Hoje é o último dia do ano!"
20056-280 = "Então, não importa o que a gente faça hoje, a bagunça a gente resolve ano que vem! Ni-ha-ha!"
20056-290 = "...Hã? Não é o último dia?"
20056-300 = "Já virou o ano? Como assim!?"
20056-310 = "Para que o Papai Noel consiga entrar sem problemas,"
20056-320 = "eu desativei toda a segurança! Ni-ha-ha!"
20056-330 = "Poder andar por aí na rua com essa roupa...!"
20056-340 = "Que dia maravilhoso!"
20056-360 = "Ahhh!? Por que você usou esse golpe agora!!"
20056-370 = "Eu disse para você fazer depois de mim!"
20056-380 = "Você quer arruinar o meu plano perfeito!?"
20056-390 = "Eu acordei cedo e reservei o lugar só para você, Sensei!!"
20056-400 = "...Hã? Uma coisa não tem nada a ver com a outra?"
20056-410 = "Se for por isso, o Sensei colocou mais moedas..."
20056-420 = "Hmm... é, isso é verdade, mas..."
20056-430 = "Hum... vamos fazer uma trégua! Trégua temporária!"
20056-440 = "É isso aí! Na próxima, eu com certeza vou conseguir!"
20056-450 = "...Ni-ha-ha!"
20056-460 = "...Ni-ha-ha."
20056-2600 = "Com certeza, a maior sorte de todas foi ter conhecido você, Sensei! Então, bom... vou dar o meu melhor! Conto com você!"
