[translation]
10111-10 = "ブルーアーカイブ！"
10111-20 = "ミレニアムサイエンススクールの美甘ネル、\nただいま参上したぜ、っと……。\nあぁ？この服？なにかおかしいっていうのか？"
10111-30 = "（なんだあれ？\nカッケェ！）"
10111-40 = "まあ、悪くねぇな。\nちっと一休みするか。"
10111-50 = "なんか落ち着か\nねえんだよな……\n上着がないからか？"
10111-60 = "先生は\nいつ来るんだ……？"
10111-70 = "お、これいいな！\n部室に飾りたい\nくらいだ。"
10111-80 = "よ、先生！"
10111-90 = "あぁ？べ、別に待ってた\nわけじゃねぇぞ！？"
10111-100 = "何しょぼくれてんだよ。"
10111-110 = "あたしがそばに居るだろ！"
10111-120 = "なーんか、\nムズムズするんだよな……"
10111-130 = "普段と違うからだろうけどさ。"
10111-140 = "はぁ……上着が恋しいぜ。"
10111-150 = "あぁ？制服を着て\n大人しくなった？"
10111-160 = "んなわけあるか！\n今日はちょっと\n元気がないだけだ。"
10111-170 = "なっ……制服、\nよく似合ってるね……！？"
10111-180 = "ほ、褒めても何も出ねぇぞ！"
10111-190 = "先生、得意な教科はあるか？"
10111-200 = "いや……なんだ？\nせっかく制服着てることだし、\n勉強でもしようかと。"
10111-210 = "今一番落ち着ける場所……"
10111-220 = "ここじゃねぇか？"
10111-230 = "今日は先生の誕生日だろ？\n誕生日おめでとさん！"
10111-240 = "せっかくだし、\n遊びに行かねぇか？"
10111-250 = "ははっ！やっぱ覚えてて\nくれたのか！"
10111-260 = "ありがとな！"
10111-270 = "明けましておめでとう、先生。\n今年もよろしくな。"
10111-280 = "ん？なんで制服なのかって？"
10111-290 = "そりゃあ……\n先生が似合うって\n言ってくれたし……"
10111-300 = "今日くらいは\n着てもいいかなって。"
10111-310 = "クリスマスか……"
10111-320 = "あ、そうだ。\nプレゼントに\nあたしの上着はどうだ？"
10111-330 = "今着てないし、\n羽織ってみろよ！"
10111-340 = "他の連中は毎日制服きてるけど\nあたしにとっては\n仮装みたいなもんなんだよな。"
10111-360 = "お！見ろよ先生！\n色んなもんがあるぞ！"
10111-370 = "ん？どうかしたのか？"
10111-380 = "あ～、まぁ……\nそりゃあな。"
10111-390 = "今はC＆Cでもないし、\n先生とは先輩後輩の\n関係でもないだろ。"
10111-400 = "ここに知り合いなんて\nいねぇしさ。"
10111-410 = "今くらい、許してくれよ。"
10111-420 = "というか、やっぱ……"
10111-430 = "普段みたいな方がいいか？"
10111-440 = "ははっ！\nそう言うと思った！"
10111-450 = "まあ、そんなに時間に\n余裕があるわけじゃねえし……"
10111-460 = "そろそろ行こうぜ！\n次はあっちだ！"
10111-2600 = "考えてみたら全然普段と\n変わんねぇんだけど……\nなーんか、特別に感じるんだよな。\n……ま、あたしと先生の仲だし、\n気にしてもしょうがないか！"
