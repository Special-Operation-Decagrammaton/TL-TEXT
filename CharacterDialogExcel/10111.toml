[translation]
10111-10 = "Blue Archive!"
10111-20 = "Neru Mikamo da Millennium Science School, \ncheguei na área, e então... \nAh? Essa roupa? Tem algo de errado com ela?"
10111-30 = "(O que é aquilo? \nQue legal!)"
10111-40 = "Bom, não é nada mal. \nVou descansar um pouco."
10111-50 = "Sinto que não consigo \nficar parada... \nSerá porque estou sem o meu casaco?"
10111-60 = "Quando é que o \nSensei vai chegar...?"
10111-70 = "Oh, isso é legal! \nAté queria decorar \na sala do clube com isso."
10111-80 = "Ei, Sensei!"
10111-90 = "Ah? E-eu não estava te esperando, \nnem pense nisso!"
10111-100 = "Por que está com essa cara de desânimo?"
10111-110 = "Eu estou aqui com você!"
10111-120 = "Sinto uma sensação \nestranha, como se estivesse \nme coçando toda..."
10111-130 = "Deve ser porque estou diferente do habitual."
10111-140 = "Ah... sinto falta do meu casaco."
10111-150 = "Ah? Ficou comportada \npor estar de uniforme?"
10111-160 = "Nem vem com essa! \nÉ só que hoje eu não estou \ncom muita energia."
10111-170 = "Nossa... esse uniforme, \nficou muito bom em você...!"
10111-180 = "E-ei, não é como se eu fosse ganhar algo só porque você me elogiou!"
10111-190 = "Sensei, você tem alguma matéria favorita?"
10111-200 = "Não... por quê? \nJá que estou vestindo o uniforme, \npensei em estudar um pouco."
10111-210 = "O lugar onde me sinto \nmais tranquila agora..."
10111-220 = "Não seria aqui?"
10111-230 = "Hoje é o aniversário do Sensei, né? \nParabéns pelo seu dia!"
10111-240 = "Já que estamos aqui, \nque tal darmos uma volta?"
10111-250 = "Haha! Sabia que você \nlembraria!"
10111-260 = "Valeu!"
10111-270 = "Feliz Ano Novo, Sensei. \nConto com você este ano também."
10111-280 = "Hm? Por que estou de uniforme?"
10111-290 = "Bem... \nJá que você disse que \nficou bom em mim..."
10111-300 = "Pensei que não teria problema \nusar hoje."
10111-310 = "Natal, hein..."
10111-320 = "Ah, é verdade. \nQue tal o meu casaco \ncomo presente?"
10111-330 = "Eu não estou usando agora, \npode vestir se quiser!"
10111-340 = "As outras pessoas usam uniforme todo dia, mas para mim, \né como se fosse uma fantasia."
10111-360 = "Oh! Olha só, Sensei! \nTem um monte de coisa aqui!"
10111-370 = "Hm? Aconteceu alguma coisa?"
10111-380 = "Ah, bem... \nÉ, pois é."
10111-390 = "Agora não estamos na C&C, \ne nem temos aquela \nrelação de veterana e novato."
10111-400 = "E não tem ninguém \nque eu conheça por aqui."
10111-410 = "Me deixa aproveitar um pouco agora."
10111-420 = "Ou melhor, será que..."
10111-430 = "Você prefere como eu sou normalmente?"
10111-440 = "Haha! \nEu sabia que você diria isso!"
10111-450 = "Bom, não é como se tivéssemos \ntanto tempo assim..."
10111-460 = "Vamos logo! \nO próximo lugar é ali!"
10111-2600 = "Pensando bem, não é nada diferente do meu dia a dia... \nMas, de alguma forma, parece especial. \n...Bem, é entre mim e o Sensei, \nnão tem por que se preocupar com isso!"
