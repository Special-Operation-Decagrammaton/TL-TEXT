[translation]
16020-10 = "Blue Archive!"
16020-20 = "Hey! How have you been?\nI guess this is our first time properly introducing ourselves.\nI'm Tenjinyama Otogi, the sniper of FOX Platoon.\nI'll be counting on you from here on out, Sensei."
16020-30 = "(So sleepy... I wonder if there's any coffee...)"
16020-40 = "Alright! Maybe I should do some muscle training while I'm at it."
16020-50 = "Whoa... You're really fired up, aren't you..."
16020-60 = "(Have I seen this somewhere in the Correctional Bureau before...?)"
16020-70 = "Oh, is this new merchandise for \"Full Jelly\"?\nI should take a picture."
16020-80 = "Hey, welcome back, Sensei.\nSo... what should we do today?"
16020-90 = "Shh, Sensei. Be quiet.\nThere's a butterfly over there."
16020-100 = "I'm a sniper, after all.\nI'm trained to notice the little details."
16020-110 = "Like, for example—"
16020-120 = "Uh... Sensei.\nIt's a bit awkward to bring up, but..."
16020-130 = "Your fly is wide open."
16020-140 = "Ugh, my shoulders are so stiff...\nSensei, could you give them a rub?"
16020-150 = "It really hurts, you know~"
16020-160 = "Please!"
16020-170 = "Before I joined SRT, I was thinking I'd just move on to the academy in my home district and maybe become a member of the Disciplinary Committee."
16020-180 = "It was a strange academy, though~"
16020-190 = "They had this weird local rule where you had to decide who the club president was through a duel."
16020-200 = "FOX3... Kurumi is the point man, but she worries about everything too much."
16020-210 = "...Even though I've always been there to watch her back."
16020-220 = "Every once in a while, I find myself missing the bread I ate at the Correctional Bureau."
16020-230 = "I wonder if I can have it shipped here."
16020-240 = "Happy birthday, Sensei."
16020-250 = "We'll do our best to make sure this wonderful day remains peaceful and safe.\nLeave it to us."
16020-260 = "My birthday? You didn't really have to celebrate it, you know..."
16020-270 = "Well... but I'm happy you did. Thanks."
16020-280 = "Happy New Year, Sensei."
16020-290 = "I really hope the academy gets restored this year."
16020-300 = "I don't really have many good memories of Christmas..."
16020-310 = "Back in the day, I ate a cookie that was on the table, but it had sleeping pills in it..."
16020-320 = "Ugh, I was so sleepy for the entire holiday break, I couldn't help it."
16020-330 = "I've had enough of that, thank you very much~"
16020-340 = "Halloween, huh... There sure are a lot of people wearing costumes lately."
16020-350 = "I wear all sorts of outfits for my infiltration missions, so..."
16020-360 = "Well, if you really insist, Sensei, I suppose I could wear one for you."
16020-370 = "What do you like?"
16020-390 = "Ugh... bitter..."
16020-400 = "Why do old beans have to taste so bad?"
16020-410 = "Romance... huh.\n...I suppose so."
16020-420 = "If I didn't have any romance in my life, I probably wouldn't have made it this far."
16020-430 = "When you were little, didn't you ever dream of having a secret base?"
16020-440 = "But when you actually build one, it's nothing like what you imagined..."
16020-450 = "It's cramped, and there's not much you can actually do in there."
16020-460 = "It felt like... being confronted with the difference between dreams and reality."
16020-470 = "The ideal adult, and life at SRT."
16020-480 = "But, maybe that's exactly why."
16020-490 = "I've come to think that no matter what shape reality takes, it has its own flavor."
16020-500 = "What do you think, Sensei? About this old coffee filled with romance?"
16020-510 = "Hehe... Once again, welcome to my world."
16020-2600 = "I've received the FOX-82 sniper rifle.\nIt's perfect for ultra-long-range sniping and breaking through obstacles...\nThough, my shoulders get pretty stiff if I fire it too much."