[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
16020-10 = "Blue Archive!" 
16020-20 = "E aí! Sentiu minha falta?\nAcho que é a primeira vez\nque nos apresentamos direito, né.\nAtiradora de Elite do Esquadrão FOX,\nTenjinyama Otogi.\nEspero que cuide muito bem de mim\n(e do meu corpo) daqui pra frente, Sensei." 
16020-30 = "（Que sono...\nserá que não tem um cafézinho...\nou algo mais quente pra me acordar?）" 
16020-40 = "Beleza!\nAcho que vou aproveitar a brecha pra fazer\nuns agachamentos e suar a camisa." 
16020-50 = "Ooh...\nA sua energia tá\ntransbordando hoje, hein..." 
16020-60 = "（Será que eu já\nvi essa coisinha na\nCorreccional antes...?）" 
16020-70 = "Ah, isso aqui é\no merchandise novo da\n\"Furu Jelly\", né?\nVou bater uma fotinha de lembrança~" 
16020-80 = "E aí, bem-vindo de volta, Sensei.\nE então... qual a posição e\no que a gente vai fazer hoje?" 
16020-90 = "Shh, Sensei. Fica quietinho.\nTem uma borboleta pousada bem ali." 
16020-100 = "Eu sou uma atiradora de elite, esqueceu?\nOs meus olhos sempre vão direto\npros \"mínimos detalhes\"." 
16020-110 = "Pois é... tipo, por exemplo--" 
16020-120 = "Aaah... Sensei.\nÉ meio constrangedor falar isso em voz alta, mas..." 
16020-130 = "A porta do seu \"zoológico\" tá escancarada.\nO zíper da sua calça tá todo aberto, sabia?" 
16020-140 = "Uugh~ Meus ombros tão duros...\nSensei~, você não quer vir aqui\npor trás e dar uma massageada gostosa neles?" 
16020-150 = "Tão doendo de verdade, sabia~?" 
16020-160 = "Por favorzinho!" 
16020-170 = "Antes de vestir a farda da SRT,\neu quase continuei na escola\ndo meu distrito pra\nvirar cadete do\nComitê de Disciplina, acredita?" 
16020-180 = "Era uma escola bem bizarra, viu~" 
16020-190 = "Lá, as alunas tinham uma\nregra local maluca de\ndecidir quem ia ser a Presidente\nna base da porrada e do duelo." 
16020-200 = "A FOX3... a Kurumi\né a nossa batedora de vanguarda,\nmas ela é paranóica e histérica demais." 
16020-210 = "……Mesmo sabendo que sou eu\nquem fica de olho (e protege)\na retaguarda dela o tempo todo." 
16020-220 = "De vez em quando~, me bate\numa saudade safada daquele pãozinho seco\nque a gente comia na Correcional." 
16020-230 = "Será que dá pra pedir\npor delivery agora?" 
16020-240 = "Feliz aniversário, Sensei." 
16020-250 = "Pra garantir que você chegue inteiro na cama\nnesse dia tão maravilhoso,\neu vou suar a camisa pra te proteger.\nDeixa tudo comigo." 
16020-260 = "Meu aniversário?\nVocê não precisava gastar sua energia\ncomemorando isso comigo..." 
16020-270 = "Bom... eu adorei a festinha, confesso.\nObrigada por me fazer suar." 
16020-280 = "Feliz Ano Novo, Sensei." 
16020-290 = "Seria ótimo se a\nnossa Academia erguesse as portas\nde novo esse ano." 
16020-300 = "Natal é uma data\nque não me traz memórias\nmuito gostosas..." 
16020-310 = "Antigamente, eu fui morder uns biscoitos\nlargados na mesa e tavam batizados\ncom sonífero pesado..." 
16020-320 = "Haaah... passei o feriado inteiro dopada\ne dormindo sem parar. Foda, né?" 
16020-330 = "Tô fora de passar por um apagão\ndesses de novo~" 
16020-340 = "Halloween, hein...\nA quantidade de alunas usando\nfantasias fofas e curtinhas sempre multiplica." 
16020-350 = "Como o meu currículo de espionagem\njá me fez vestir todo tipo de trapo e roupa...\neu nem ligo muito." 
16020-360 = "Maaas, se o Sensei implorar\ne estiver com muito tesão pra me ver de fantasia...\neu abro uma exceção pra você." 
16020-370 = "Qual é o seu fetiche?\nEnfermeira, súcubo, coelhinha...?" 
16020-390 = "Ugh... amargo..." 
16020-400 = "Por que grãos de café velhos\ntêm um gosto de terra tão ruim?" 
16020-410 = "Romance... e fascínio...\n……É, faz sentido." 
16020-420 = "Se eu não fosse fascinada por essas loucuras,\neu não teria sobrevivido e suado\naté chegar aqui." 
16020-430 = "Quando você era um pirralho,\nnão ficava salivando pra montar\numa \"Base Secreta\" no escuro?" 
16020-440 = "Mas quando você monta uma na vida real...\nA experiência passa longe da fantasia..." 
16020-450 = "É abafado, apertado, e você\nquase não tem espaço pra fazer nada gostoso." 
16020-460 = "É tipo...\ntomar um banho de água fria da realidade\nna cara dos seus sonhos sujos, sabe?" 
16020-470 = "A nossa visão dos adultos,\na rotina militar da SRT... tudo ilusão." 
16020-480 = "Mas...\né exatamente por isso." 
16020-490 = "Que a gente começa a ver que,\nmesmo a realidade sendo crua,\nela tem o seu tesão e seu charme." 
16020-500 = "E você, Sensei? O que acha\ndesse \"café velho\" cheio de charme\ne mistério que eu sou?" 
16020-510 = "Ufufu... Deixe-me dar as boas vindas de novo.\nSinta-se à vontade pra entrar...\nno meu mundinho particular." 
16020-2600 = "Fuzil de Precisão Antimaterial FOX-82,\nrecebido e engatilhado.\nÉ o brinquedo perfeito pra meter chumbo de longe\ne arrombar qualquer barricada...\nMas confesso que dar uns tiros assim tão fortes...\nme deixa com o ombro todo dolorido e duro." 