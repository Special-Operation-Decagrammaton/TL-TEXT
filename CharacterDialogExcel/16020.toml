[translation]
16020-10 = "ブルーアーカイブ！"
16020-20 = "やあ！元気してた？\n改めて挨拶するのは初めて、かな。\nFOX小隊の狙撃手、天神山オトギ。\nこれからよろしくね、先生。"
16020-30 = "（ねむ……コーヒー\nないかなぁ……）"
16020-40 = "よっし！\n今のうちに筋トレでも\nしよっかな。"
16020-50 = "おお……\n気合がみなぎって\nるねぇ……。"
16020-60 = "（矯正局で\n見たことある\nような……？）"
16020-70 = "あ、これって\n「フルゼリー」の\n新しいグッズかな。\n撮っとこ～"
16020-80 = "やあ、おかえり先生。\nそれで……今日は何すればいい？"
16020-90 = "シーッ、先生。静かに。\nそこにちょうちょがいるんだ。"
16020-100 = "スナイパーだからね。\n細かいところに目が行くんだ。"
16020-110 = "そうだね……例えばーー"
16020-120 = "あー……先生。\nちょっと言いにくいんだけど……"
16020-130 = "社会の窓が、全開だよ。"
16020-140 = "う～肩凝った……\nせんせ～、ちょっと\n叩いてくれない？"
16020-150 = "本当に痛くてさぁ～"
16020-160 = "お願い！"
16020-170 = "SRTに入る前は、\n通ってた自治区の学園に\nそのまま進学して、\n風紀委員にでも\nなろうかなって思ってたんだ。"
16020-180 = "不思議な学園でさ～"
16020-190 = "そこでは、決闘で部長を\n決めるっていう、\n変なローカルルール\nがあったんだ。"
16020-200 = "FOX3……クルミは\nポイントマンなのに、\nあれこれ心配し過ぎ。"
16020-210 = "……クルミの背中は、\n私がずっと守ってるのにさ。"
16020-220 = "たま～に、矯正局で食べた\nコッペパンが\n恋しくなるんだよねぇ。"
16020-230 = "取り寄せとかできるのかな、\nあれ。"
16020-240 = "誕生日おめでと、先生。"
16020-250 = "今日という素晴らしい日が\n平穏無事であるよう、\n私たちも頑張るからさ。\n任せてよね。"
16020-260 = "誕生日？\n別に祝ってくれなくても\nいいのに……。"
16020-270 = "まぁ……でも嬉しいよ。\nありがとね。"
16020-280 = "あけましておめでと、先生。"
16020-290 = "今年こそは、\n学園が復活するといいんだけど。"
16020-300 = "クリスマスって、\nあんまいい思い出が\nないんだよねぇ……。"
16020-310 = "昔、テーブルにあったクッキー\n食べたら睡眠薬入りでさ……"
16020-320 = "はぁ、連休中ずっと眠くて\n仕方なかったんだよね。"
16020-330 = "あんなのはもうコリゴリだよ～"
16020-340 = "ハロウィーンかぁ……\n仮装してる人、\nなんか増えるよね。"
16020-350 = "私は潜入任務で\n色んな衣装着てるからなぁ……。"
16020-360 = "まぁでも、先生が\nどうしてもっていうなら\n着てあげてもいいよ？"
16020-370 = "何が好き？"
16020-390 = "うっ……にが……。"
16020-400 = "古い豆ってどうしてこう\n美味しくないんだろ。"
16020-410 = "ロマン……かぁ。\n……そうだね。"
16020-420 = "ロマンがなかったら、\nここまで来られなかった\nだろうし。"
16020-430 = "小さい頃にさ、\n秘密基地に憧れたりしなかった？"
16020-440 = "でも、実際に作ってみると\n思ってたのと全然違って……。"
16020-450 = "狭いし、あんまり\nできることもなくてさ。"
16020-460 = "なんか……\n夢と現実を突きつけられた\nみたいだったんだよね。"
16020-470 = "理想の大人も、SRTの生活も。"
16020-480 = "でも、\nだからこそっていうのかな。"
16020-490 = "現実がどんな形でも、\n味があるって思うように\nなったっていうか。"
16020-500 = "先生はさ、ロマンが詰まった\n古いコーヒー、どう思う？"
16020-510 = "ふふっ……改めまして、\n私の世界へようこそ。"
16020-2600 = "FOX-82式スナイパーライフル、\n受け取ったよ。\n超長距離狙撃や障害物の撃破には\nもってこい……。\nでも、連発すると肩凝るんだよねぇ。"
