[translation]
16020-10 = "Blue Archive!"
16020-20 = "Ei! Como você está?\nAcho que é a primeira vez que nos cumprimentamos formalmente.\nSou Otogi Tenjinyama, a atiradora do Esquadrão FOX.\nConto com você daqui em diante, Sensei."
16020-30 = "(Sono... será que não tem café por aqui?)"
16020-40 = "Beleza!\nAcho que vou aproveitar para fazer um treino muscular agora."
16020-50 = "Nossa...\nVocê está transbordando energia, hein..."
16020-60 = "(Já vi isso em algum lugar no Departamento Correcional...?)"
16020-70 = "Ah, será que isso é um novo item de colecionador de \"Full Jelly\"?\nVou tirar uma foto."
16020-80 = "Ei, bem-vindo de volta, Sensei.\nE então... o que devemos fazer hoje?"
16020-90 = "Psiu, Sensei. Silêncio.\nTem uma borboleta ali."
16020-100 = "Como sou uma atiradora, acabo reparando nos mínimos detalhes."
16020-110 = "É verdade... por exemplo—"
16020-120 = "Ah... Sensei.\nÉ um pouco difícil de dizer, mas..."
16020-130 = "Sua braguilha está aberta."
16020-140 = "Ai, que dor nos ombros... Sensei, pode dar uma massageada?"
16020-150 = "Está doendo de verdade, sabe?"
16020-160 = "Por favor!"
16020-170 = "Antes de entrar na SRT, eu pretendia seguir na escola do meu distrito e talvez me tornar uma Comitê Disciplinar."
16020-180 = "Era uma escola bem estranha, sabe?"
16020-190 = "Lá, existia uma regra local bizarra onde o líder era decidido através de um duelo."
16020-200 = "FOX3... A Kurumi é a nossa linha de frente, mas ela se preocupa demais com tudo."
16020-210 = "...Sendo que eu sempre protejo as costas da Kurumi."
16020-220 = "De vez em quando, sinto saudades daquele pão que comíamos no Departamento Correcional."
16020-230 = "Será que dá para encomendar aquilo?"
16020-240 = "Feliz aniversário, Sensei."
16020-250 = "Nós vamos nos esforçar para que este dia maravilhoso seja tranquilo e sem problemas.\nPode deixar com a gente."
16020-260 = "Aniversário? Não precisava se incomodar em comemorar..."
16020-270 = "Bom... mas fico feliz. Obrigada."
16020-280 = "Feliz Ano Novo, Sensei."
16020-290 = "Espero que este ano a escola finalmente seja restaurada."
16020-300 = "Eu não tenho muitas lembranças boas de Natal..."
16020-310 = "Antigamente, comi um biscoito que estava na mesa e ele tinha sonífero..."
16020-320 = "Ah, passei o feriado inteiro morrendo de sono, não teve jeito."
16020-330 = "Não quero passar por isso nunca mais!"
16020-340 = "Halloween, hein... Tem cada vez mais gente fantasiada por aí."
16020-350 = "Eu já uso tantas roupas diferentes nas minhas missões de infiltração..."
16020-360 = "Mas, se você fizer questão, Sensei, eu posso usar uma fantasia para você."
16020-370 = "Do que você gosta?"
16020-390 = "Ugh... amargo..."
16020-400 = "Por que grãos velhos têm um gosto tão ruim?"
16020-410 = "Romance... é mesmo.\n...É verdade."
16020-420 = "Se não fosse pelo romance, acho que não teríamos chegado até aqui."
16020-430 = "Quando você era pequeno, nunca sonhou em ter uma base secreta?"
16020-440 = "Mas, quando a gente finalmente construía, era totalmente diferente do que imaginávamos..."
16020-450 = "Era apertado e não dava para fazer quase nada lá dentro."
16020-460 = "Foi como se... tivessem jogado a realidade na minha cara."
16020-470 = "Tanto o adulto ideal quanto a vida na SRT."
16020-480 = "Mas, talvez seja justamente por isso."
16020-490 = "Aprendi a achar que, não importa a forma que a realidade tome, ela tem o seu valor."
16020-500 = "Sensei, o que você acha desse café velho cheio de romance?"
16020-510 = "Fufu... Bem-vindo de volta ao meu mundo."
16020-2600 = "Recebi o rifle de precisão FOX-82.\nÉ perfeito para tiros de ultra longa distância e para destruir obstáculos...\nMas, se eu disparar muitas vezes, fico com dor no ombro."
