[translation]
10126-10 = "ブルー……アーカイブ……イヒッ。"
10126-20 = "ワイルドハント芸術学院の板垣カノエ……。\n今日、会えることも……知ってたよ。\n私たち、赤い糸で結ばれてるからね……イヒッ。"
10126-30 = "前世で……\nこんなとこには\n来てない……。"
10126-40 = "オカルトグッズも……\n置いとかなきゃ。"
10126-50 = "あそこ……\n”何か”いるねぇ。"
10126-60 = "狭くて暗い場所……\nないかな……。"
10126-70 = "召喚の儀……ここで\nやってもいいかな？"
10126-80 = "先生、待ってたよ。"
10126-90 = "前世から、ずっと。"
10126-100 = "おかえり、先生……。"
10126-110 = "私……体温が低いんだ。"
10126-120 = "だから、そばで\nあっためてもらわないと……\nダメなの……イヒッ。"
10126-130 = "このヘアゴムのお陰で……"
10126-140 = "私、\n\"見える”んだよねぇ。"
10126-150 = "イヒッ……"
10126-160 = "冗談だよぉ……。"
10126-170 = "私の特製ポーション……"
10126-180 = "いるぅ？"
10126-190 = "先生のために……\n「いろいろ」入れたんだぁ。"
10126-200 = "運命は……”在る”んだよ……。"
10126-210 = "私たちの出会いが……\nそれを証明してる。"
10126-220 = "私は\nどんな声でも出せるよぉ……。"
10126-230 = "聞いてみたい声質があったら、\nなんでも言ってねぇ……。"
10126-240 = "お誕生日おめでとう……先生。"
10126-250 = "前世でも……\nお祝いしたねぇ。\nイヒヒッ……。"
10126-260 = "今日は死者の日で……"
10126-270 = "私の誕生日。"
10126-280 = "眠れる魂たちを想って……"
10126-290 = "一緒に祈ろう。"
10126-300 = "明けましておめでとう、先生。"
10126-310 = "本年もどうぞ\nよろしくお願いいたします。"
10126-320 = "いまの、大人っぽかった？\nイヒッ……。"
10126-330 = "クリスマスを\n先生と過ごせるなんて、\nカノエ、うれしいっ♡"
10126-340 = "今日はもう、\n離さないんだからっ♡"
10126-350 = "ハロウィン……"
10126-360 = "オカ研が暗闇の中で輝く日。"
10126-370 = "さぁ、かぼちゃの\nランタンを作ろうかぁ……\nイヒッ。"
10126-390 = "せ、先生……\nその、収録の前に……\n聞いてほしいことがあるの。"
10126-400 = "じ、実は……\n私、ずっと\n隠してたことがあって……。"
10126-410 = "わ、私……\n恥ずかしがり屋で、\nうまく話せなくて。"
10126-420 = "それを隠すために、\n陰気なキャラを演じてた……。"
10126-430 = "オカルトに手を出したのも、\n自分を変えたかったから。"
10126-440 = "これを知っているのは……\n先生だけ。"
10126-450 = "だから……\n内緒にしてね？"
10126-460 = "せ、先生のこと、\n信じてる、よ……。"
10126-470 = "……イヒッ、イヒヒ。\nねえ、信じたぁ？"
10126-480 = "先生は、\n可愛いものが好きなんでしょ？"
10126-490 = "じゃあ、\n私のことも……\n好き、だよねぇ？"
10126-500 = "イヒッ……！"
10126-2600 = "さすが先生……\nわかってる、ねぇ。イヒヒッ。"
