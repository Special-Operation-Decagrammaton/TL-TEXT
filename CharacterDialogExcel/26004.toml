[translation]
26004-20 = "本の中の物語のように、\n私たちの物語が、始まります！"
26004-30 = "本が足りていませんね。\n本棚をいっぱいにしないとです。"
26004-40 = "わあ、\n本を読むのには\n最適なお部屋ですね。"
26004-50 = "あっ、\nこの本見たことありません！"
26004-60 = "ふふふふふっ！\nフラグが立ちましたよ～。"
26004-70 = "ふふ、うふふ！\n良いアイデアが浮かびました！"
26004-80 = "お帰りなさい、先生！\n前にお渡しした本は\n読んでみましたか？"
26004-90 = "今日はどんな本を\nおすすめしましょう？"
26004-100 = "お小遣いをもらったら、\nまず本を買います。\n服や食事はその次です。"
26004-110 = "どんな本が好きか、ですか？\nうーん…\n私は好き嫌いなく\n全部読みますから…。"
26004-120 = "先生、その本は\nおすすめしませんよ。\nそこから4ページ先で、\n主人公があっけなく\n死んでしまいますから。"
26004-130 = "…あれ、\n私ネタバレしちゃいました？"
26004-140 = "ここにも、もう少し本が\nあった方が良さそう\nなのですが…。\n私が何冊か、おすすめの\n本をお持ちしましょうか？"
26004-150 = "みんなにもっと、\n本を読んでほ\nしいのですが…。"
26004-160 = "お誕生日おめでとう\nございます。先生！\n欲しい本がありましたら、\n何でもおっしゃってくださいね！"
26004-170 = "ふふっ、私は心から\n本が好きですけど…。\n誕生日のたびに\n本ばかりをもらうのは、\n少しだけ残念でした。"
26004-180 = "今日は、先生からの\n特別なプレゼントが\n欲しいです！"
26004-190 = "明けましておめでとう\nございます！\n今年も一年、\nよろしくお願いします。"
26004-200 = "メリークリスマ～ス。\n先生、今日は本当に\n特別な日なんですよ！"
26004-210 = "こんな日に先生と\n一緒にいられて…\n嬉しいです、ふふっ！"
26004-220 = "ハロウィーンが始まりました！\nふふっ、怪奇小説やホラー小説の\n特集を準備しないとですね。"
26004-240 = "えっと……ぐ、偶然ですね。\nまさかぴったり\n同じタイミングで……。"
26004-250 = "先に見つけて、\n先生にご報告\nしたかったのですが……。"
26004-260 = "……いえ。\n先に手をかけたのは\n私かもしれません……よね？"
26004-270 = "うーん、どうしましょう。\nどうしてもと仰るのなら、\n譲っても良いのですが……。"
26004-280 = "……なんて、冗談です。"
26004-290 = "貸し出し記録を付けて、\nすぐお渡しします。無事に\n見つかって何よりです。"
26004-300 = "どうでしたか？\n図書館でのこういった時間も……\n何だか楽しくありません？"
26004-310 = "他では味わえない良さと\n言いますか、この場所なら\nではと言いますか……。"
26004-320 = "……ですので、\nぜひこれからも。\nお好きなタイミングで\nここに来てください。"
26004-330 = "……私、\n待ってますから！"
26004-2600 = "ふふ、返却期限を\n延滞してしまった\n方は覚悟してくださいね。"
