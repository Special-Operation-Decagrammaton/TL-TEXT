[translation]
26004-20 = "Como nas histórias dos livros,\na nossa história começa agora!"
26004-30 = "Estão faltando livros.\nPrecisamos encher essa estante."
26004-40 = "Uau,\neste é o lugar perfeito\npara ler um livro."
26004-50 = "Ah,\neu nunca vi este livro antes!"
26004-60 = "Fufufufufu!\nO gatilho foi ativado~."
26004-70 = "Fufu, ufufu!\nTive uma ótima ideia!"
26004-80 = "Bem-vindo de volta, Sensei!\nVocê leu o livro que\neu te emprestei antes?"
26004-90 = "Que tipo de livro\ndeveria te recomendar hoje?"
26004-100 = "Quando recebo minha mesada,\na primeira coisa que faço é comprar livros.\nRoupas e comida ficam para depois."
26004-110 = "Que tipo de livro eu gosto?\nHumm...\nEu leio de tudo,\nsem restrições..."
26004-120 = "Sensei, eu não recomendo\nesse livro.\nDaqui a 4 páginas,\no protagonista morre\nde um jeito bem sem graça."
26004-130 = "...Ah,\nserá que eu dei um spoiler?"
26004-140 = "Parece que seria bom ter\nmais alguns livros aqui...\nQuer que eu traga\nalguns dos meus favoritos?"
26004-150 = "Eu queria que todos\nlessem mais livros..."
26004-160 = "Feliz aniversário,\nSensei! Se houver algum livro\nque você queira, pode me pedir\nqualquer coisa!"
26004-170 = "Fufu, eu amo livros de verdade, mas...\nEra um pouco decepcionante\nreceber apenas livros\ntoda vez que chegava meu aniversário."
26004-180 = "Hoje, eu quero um\npresente especial\ndo Sensei!"
26004-190 = "Feliz Ano Novo!\nConto com você\npara este ano também."
26004-200 = "Feliz Natal.\nSensei, hoje é um dia\nrealmente especial!"
26004-210 = "Poder estar com o Sensei\nem um dia como este...\nEstou feliz, fufu!"
26004-220 = "O Halloween começou!\nFufu, preciso preparar uma\nseleção de romances de mistério e terror."
26004-240 = "Bem... q-que coincidência.\nNão acredito que chegamos\nno mesmo momento..."
26004-250 = "Eu queria ter encontrado primeiro\ne avisado o Sensei, mas..."
26004-260 = "...Não.\nTalvez tenha sido eu\nquem tocou nele primeiro... né?"
26004-270 = "Humm, o que faremos?\nSe você insiste tanto,\neu posso ceder, mas..."
26004-280 = "...Estou brincando."
26004-290 = "Vou registrar o empréstimo\ne te entrego agora mesmo. Fico feliz\nque tenha encontrado."
26004-300 = "O que achou?\nPassar um tempo assim na biblioteca...\nNão é divertido?"
26004-310 = "É um charme que não se encontra\nem outros lugares, ou melhor,\né algo único deste lugar..."
26004-320 = "...Por isso, por favor,\ncontinue vindo aqui\nsempre que quiser."
26004-330 = "...Eu estarei\nte esperando!"
26004-2600 = "Fufu, quem atrasar a\ndata de devolução\nque se prepare."
