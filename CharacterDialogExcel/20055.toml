[translation]
20055-10 = "Blue…… *sniff*……! Archive!"
20055-20 = "Millennium Science School……\nSou do Clube de Desenvolvimento de Jogos, Yuzu Hanaoka…….\nE-estou vestida assim, mas……\nConto com você……."
20055-30 = "（Um cotidiano pacífico……\nAgora eu entendo bem,\no quanto isso é precioso）"
20055-40 = "O sofá……\nEle não vai disparar de repente,\nvai……?"
20055-50 = "É quentinho,\ne tem um cheiro bom……\nÉ muito bom.\nHehehe."
20055-60 = "Eu não quero……\nentrar num armário\npor um bom tempo…… uuu."
20055-70 = "Sério, isso……\nnão está um pouco\nchamativo demais……?\nUuuu……."
20055-80 = "Fueee……!\nE-esse traje, é que……."
20055-90 = "……B-bem-vindo de volta,\nSensei."
20055-100 = "E-estava te esperando,\nSensei……!"
20055-110 = "Partir logo para a missão……"
20055-120 = "N-não é isso.\nVamos começar\no trabalho de plantão……!"
20055-130 = "Este traje é mais confortável\ndo que eu pensava, mas……"
20055-140 = "Mais do que isso…… é\nvergonhoso……."
20055-150 = "A textura do traje é meio\nestranha, né.\nParece até que vai repelir as balas."
20055-160 = "Deveria estar cobrindo meu corpo todo, mas……\nme sinto um pouco inquieta……\nuuu……."
20055-170 = "Este traje…… também pode\nse conectar ao computador……."
20055-180 = "Será que vai ser útil……\nna hora do plantão?"
20055-190 = "A-está com calor……?"
20055-200 = "E-este traje……\na superfície é fria,\né muito bom, sabia……?"
20055-210 = "Feliz\naniversário……!"
20055-220 = "A-ah, de presente de\naniversário……"
20055-230 = "Eu preparei um\njogo para você……."
20055-240 = "O-o que achou……?"
20055-250 = "M-muito obrigada,\nSensei……"
20055-260 = "Por não ter se esquecido\nde mim……."
20055-270 = "Aconteceram tantas coisas, mas\num ano passou num\npiscar de olhos, não é?"
20055-280 = "……Feliz\nano novo,\nSensei."
20055-290 = "N-não é uma roupa de Papai Noel, mas……\né-é vermelha, então…… é, é\nquase a mesma coisa, né."
20055-300 = "F-feliz Natal,\nSensei!"
20055-310 = "H-há tantas pessoas com trajes\nmais incríveis que o meu……!"
20055-320 = "Ah, n-não, não é que\neu quisesse usar algo assim\ntambém……!"
20055-340 = "Olhe só, Sensei."
20055-350 = "Este é o mundo que eu protegi."
20055-360 = "……Claro, eu sei."
20055-370 = "Que não fui só eu\nque vi essa cena."
20055-380 = "Na época do torneio,\nvocê disse algo assim, não disse?"
20055-390 = "Que este momento,\nque o jogo.\nÉ a nossa realidade."
20055-400 = "Por isso, mesmo que seja um mundo com um final\njá definido……."
20055-410 = "Mesmo que todos neste mundo,"
20055-420 = "sigam o mesmo\ncenário……."
20055-430 = "As escolhas que fiz,\nestes sentimentos……."
20055-440 = "Sem dúvida, são reais."
20055-2600 = "Treinar como se fosse pra valer.\nE fazer valer como se fosse um jogo……!\nEu vou dar o meu melhor……!"
