[translation]
23006-20 = "Ehehe, aqui é a Shizuko, do Comitê Organizador do Festival~. Conto com você a partir de agora, Sensei? Hein? ...Ah, sim, sim, é isso mesmo, é só o meu discurso de vendas!"
23006-30 = "Moe moe kyun... Será que fiz certo?"
23006-40 = "Preciso planejar tudo direitinho para o próximo festival."
23006-50 = "O que será que eu coloco no novo menu da Hyakkiyako...?"
23006-60 = "Para o próximo festival, que tal algo novo e ousado...? Tipo, todas nós usando coelhinhas estilo quimono?"
23006-70 = "Este lugar parece ótimo para uma filial da Hyakkiyako!"
23006-80 = "Ah, bem-vindo de volta, Sensei! Nyan nyan!"
23006-90 = "...É, essa foi perfeita."
23006-100 = "Uuu... estou cansada..."
23006-110 = "Ah, Sensei, bem-vindo de volta! Venha, venha por aqui, não seja tímido~!"
23006-120 = "Me chamou? Com que tipo de trabalho posso ajudar hoje? Pode deixar tudo comigo~!"
23006-130 = "Ultimamente, só de estar perto de você, acabo relaxando sem nem perceber~."
23006-140 = "...A culpa é sua, Sensei."
23006-150 = "Ah, quando eu voltar, ainda tenho trabalho da Hyakkiyako para fazer."
23006-160 = "...Você acha que é difícil?"
23006-170 = "Não, não, não é nada demais~. Isso também é algo que eu preciso fazer."
23006-180 = "Hã? Eu sou fofa?"
23006-190 = "Ah, não zombe de mim. Você já conhece o meu verdadeiro eu, não conhece, Sensei..."
23006-200 = "...Você acha isso fofo? U-ugh..."
23006-210 = "Sensei, você é do tipo que segura bem o dinheiro na carteira? É melhor tomar cuidado,"
23006-220 = "porque os festivais de Hyakkiyako e o anmitsu da Hyakkiyako são tentadores o suficiente para fazer você abrir a mão, sabe?"
23006-230 = "Feliz aniversário, Sensei!"
23006-240 = "Vamos, vamos para a Hyakkiyako. Como presidente do Comitê Organizador do Festival, vou organizar uma festa de aniversário digna de um festival para você!"
23006-250 = "Hã, v-você vai comemorar o meu aniversário?"
23006-260 = "...! Ah, n-não olhe! Agora, provavelmente, minha cara não está apresentável..."
23006-270 = "...Ehe, ehehe...!"
23006-280 = "Feliz Ano Novo! É Ano Novo, então vamos ficar bem quentinhos debaixo do kotatsu~"
23006-290 = "Ei, ah... só mais 5 minutinhos...!"
23006-300 = "Hoje é Natal! É dia de festival! Nós, do Comitê Organizador do Festival, é claro que não vamos deixar passar! Vamos lá, Sensei!"
23006-310 = "Doces ou travessuras! Vamos, Sensei, para os alunos que vierem aqui, vamos empurrar o anmitsu da Hyakkiyako para eles!"
23006-320 = "Hã, não pode? Por quê!?"
23006-340 = "Fufu, bem-vindo de volta... mestre~?"
23006-350 = "É isso mesmo~. Como pode ver, estou atualmente em pleno momento de vadiagem."
23006-360 = "...É estranho. Eu sempre achei que não deveria fazer esse tipo de coisa, que precisava ficar sempre alerta..."
23006-370 = "Mas quando estou com você... De alguma forma, eu acabo relaxando..."
23006-380 = "Ei, Sensei? Venha aqui."
23006-390 = "...Você vai assumir a responsabilidade por me deixar assim, não vai?"
23006-2600 = "Isso é um item exclusivo que não se encontra em nenhum festival, né? Ehehe, vou cuidar muito bem disso! Sensei!"
