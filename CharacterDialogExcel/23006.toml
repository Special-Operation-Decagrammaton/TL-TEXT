[translation]
23006-20 = "えへへ、お祭り運営委員会のシズコです～。\nこれからよろしくお願いしますね、先生？え？\n……ああ、はいはいそうですよ、営業用の台詞です！"
23006-30 = "萌え萌えきゅ～ん……\nこれで合ってるかな？"
23006-40 = "次のお祭りに向けて、\nしっかりと計画を\n立てなくちゃ。"
23006-50 = "百夜堂の新メニュー、\n何にしようかな……？"
23006-60 = "次のお祭りに、何か新しくて\n大胆な試みを……全員で着物\n風バニーガール、とか？"
23006-70 = "ここ、\n百夜堂の出張店舗の\n場所に良さそう！"
23006-80 = "あっ、おかえりなさい先生！\nにゃんにゃん！"
23006-90 = "……うん、今のは完璧。"
23006-100 = "うう……疲れた……。"
23006-110 = "あっ、先生、おかえりなさい！\nさあさあこちらへ、\n遠慮なさらず～！"
23006-120 = "お呼びでしょうか？\n今日はどんな仕事の\nお手伝いをします？\n何でもお任せあれですよ～！"
23006-130 = "最近そばにいるだけで、\n知らず知らずのうちに\n気が緩んでしまうんですよね～。"
23006-140 = "……先生のせいですよ？"
23006-150 = "あ、帰ったらまだ\n百夜堂の仕事が\nあるんでした。"
23006-160 = "……大変だね、ですか？"
23006-170 = "いえいえ、大したことでは\n無いですよ～。これも私が\nやるべきことですから。"
23006-180 = "えっ？可愛い、ですか？"
23006-190 = "はあ、揶揄わないでください、\n先生は私の素顔を知ってる\nじゃないですか……"
23006-200 = "……それが可愛い？\nう、ぐっ……。"
23006-210 = "先生、財布の紐は固い方ですか？\n気を付けた方が良いですよ、"
23006-220 = "百鬼夜行のお祭りと百夜堂の\nあんみつは、それを\nこじ開けてしまうほど\n魅力的ですからね？"
23006-230 = "お誕生日おめでとう\nございます、先生！"
23006-240 = "さ、百夜堂に行きましょう。\nお祭り運営委員会の\n委員長権限で、お祭りみたいな\nお誕生日会を開きますから！"
23006-250 = "えっ、わ、私の誕生日を\n祝ってくださるんですか？"
23006-260 = "……っ！あ、み、\n見ないでください！\n今、多分見せられない\n顔になってますから……！"
23006-270 = "……っ、えへっ、\nえへへっ……！"
23006-280 = "ハッピーニューイヤー！\nお正月ですし、こたつの\n中でぬくぬくするとしましょう～"
23006-290 = "ちょっ、あ、\nあと5分だけ……！"
23006-300 = "今日はクリスマス！お祭りの\n日です！私たちお祭り運営委\n員会はもちろん見逃しませんよ！\nさあ行きましょう、先生！"
23006-310 = "トリックオアトリート！\nさあ先生、やって来た生徒には、\n百夜堂のあんみつを\n押し売りしてやりましょう！"
23006-320 = "え、ダメなんですか？\nどうして！？"
23006-340 = "ふふっ、お帰りなさいませ～\nご主人様～？"
23006-350 = "そうですよぉ～。\n見ての通り、現在進行形で\nおサボり中で～す。"
23006-360 = "……不思議ですね。こういう\nことはしちゃいけないって、\n気を張ってなきゃって、ずっと\n思ってたはずなんですが……。"
23006-370 = "先生と一緒にいると……。\nなんだか、\n気が抜けちゃうって言うか……。"
23006-380 = "ほら、先生？\nこっちに来てください。"
23006-390 = "……私をこんな風にした責任、\n取ってくれますよね？"
23006-2600 = "これ、どんなお祭りでも\n手に入らない非売品、ですね。\nえへへっ、大切にします！先生！"
