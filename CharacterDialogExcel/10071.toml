[translation]
10071-10 = "ブルーアーカイブ。"
10071-20 = "こちらRABBIT1。着替え完了しました。\nこれより、潜入作戦を開始します。"
10071-30 = "（シャワーを…\n浴びたいのですが…)"
10071-40 = "どこからか、\n美味しい匂いが…。"
10071-50 = "（…もっと可愛い水着\nにすればよかった）"
10071-60 = "ここが、先生の…\n私はいま何を…。"
10071-70 = "…先生は…\nどちらに…。"
10071-80 = "お帰りなさい、先生。"
10071-90 = "準備は万全です。\nどんな命令でも、\n完璧に遂行してみせます。"
10071-100 = "こんにちは、先生。\nお待ちしておりました。"
10071-110 = "え…？\n水着姿で待っていて、\n寒くないのか、ですか？"
10071-120 = "問題ありません。\nどんな服装であろうと、\n待っている時間は\n苦ではありませんから。"
10071-130 = "あの…この水着、\n似合ってますでしょうか？"
10071-140 = "今までSRT特殊学園の\n指定水着しか\n着てこなかったので、"
10071-150 = "このような\n可愛らしいデザインは…\n少し、落ち着きませんね。"
10071-160 = "サキほどではありませんが…\n水泳は、少し自信があります。"
10071-170 = "今は作戦中ではないので…\n作戦外のことも、\nお手伝いできます。"
10071-180 = "ウサギは水が\n苦手だからなのでしょうか…"
10071-190 = "ウサギ柄の水着を\n見たことがありません…"
10071-200 = "逆に、牛は泳ぎが\n得意だからなのか、\n牛柄の水着は売っているのを\n見かけました…"
10071-210 = "ウサギ柄があってもいいのに。"
10071-220 = "もっと気軽に\nお声がけください。"
10071-230 = "私たちは、先生のために\n常時待機していますので。"
10071-240 = "お誕生日\nおめでとうございます、先生。"
10071-250 = "その…あまり\n余裕がないので、プレゼントは\n用意できませんでしたが…。"
10071-260 = "その代わり、\n今日はなんでもしますので。\n――なんなりとご指示を。"
10071-270 = "私の誕生日…ですか。"
10071-280 = "ふふっ…"
10071-290 = "プレゼントなら、\nもういただいているので\n大丈夫です。"
10071-300 = "明けまして\nおめでとうございます、先生。"
10071-310 = "今年は、作戦でなくても\n一緒に海へ…。"
10071-320 = "…失礼しました。\nなんでもありません。"
10071-330 = "今日という日に、\nこの服装はあまり\n相応しくないですね。"
10071-340 = "…次回は、似合う恰好を…。"
10071-350 = "外が騒がしいですね…。"
10071-360 = "今日のこの時間は、大切に\n過ごしたかったのですが。"
10071-380 = "おはようございます。"
10071-390 = "先生も、朝の散歩ですか？"
10071-400 = "私はいつもの\nジョギングの代わりに、\nひと泳ぎしようと\n思いまして。"
10071-410 = "せっかくの海ですから、\n普段とは違う事をするのも\n悪くないかなと。"
10071-420 = "…早朝からこのような\n姿をお見せしてしまって、\n少し、恥ずかしいです。"
10071-430 = "……くしゅん。"
10071-440 = "少々、長居しすぎて\nしまったみたいですね…\n身体が冷えてきました。"
10071-450 = "…そうですね。"
10071-460 = "ウサギは水に\n入ってはいけないと\n言われていますが…。"
10071-470 = "私は、ウサギでは\nありませんので。"
10071-2600 = "RABBIT-31式短機関銃、\n受領しました。水中戦に備え、\n内部パーツを一部交換しましたが、\nその…外部のパーツも、\n可愛らしいものに変えたほうが\nよかったでしょうか…？"
