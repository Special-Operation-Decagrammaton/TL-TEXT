[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10071-10 = "Blue Archive." 
10071-20 = "Aqui é RABBIT 1. Traje trocado.\nIniciando missão de infiltração." 
10071-30 = "（Eu queria…… tomar um banho……)" 
10071-40 = "Um cheiro gostoso vindo de algum lugar……" 
10071-50 = "（……Deveria ter escolhido um\ntraje de banho mais fofo）" 
10071-60 = "Este é o escritório do Sensei……\nO que eu estou fazendo agora……" 
10071-70 = "……Sensei está……\nonde……" 
10071-80 = "Bem-vindo de volta, Sensei." 
10071-90 = "Preparativos 100% concluídos.\nNão importa qual seja a missão,\neu a executarei perfeitamente." 
10071-100 = "Olá, Sensei.\nEu estava te esperando." 
10071-110 = "Eh……?\nVocê pergunta se não sinto frio\npor esperar de traje de banho?" 
10071-120 = "Não há problema algum.\nNão importa a roupa que eu esteja vestindo,\no tempo de espera não é sofrimento para mim." 
10071-130 = "Ahn…… este traje de banho,\nele combina comigo?" 
10071-140 = "Até agora, eu só usava\nos trajes de banho designados\npela Academia Especial SRT, então……" 
10071-150 = "Esses designs fofinhos……\nme deixam um pouco desconcertada." 
10071-160 = "Não chega ao nível da Saki, mas……\neu tenho um pouco de confiança nas minhas habilidades de natação." 
10071-170 = "Como não estamos em operação agora……\nposso ajudar com outras coisas\nalém da missão." 
10071-180 = "Será que os coelhos\nnão são fãs de água……" 
10071-190 = "Eu nunca vi um traje de banho\ncom estampa de coelho……" 
10071-200 = "Por outro lado, não sei se é porque\nas vacas são boas nadadoras,\nmas já vi trajes de banho com estampa de vaca à venda……" 
10071-210 = "Eles poderiam fazer um com estampa de coelho, né?" 
10071-220 = "Por favor,\nsinta-se à vontade para me chamar." 
10071-230 = "Nós estamos em prontidão constante\npara o Sensei." 
10071-240 = "Feliz Aniversário,\nSensei." 
10071-250 = "Ahn…… Como o meu orçamento estava\num pouco apertado, eu não consegui\npreparar nenhum presente, mas……" 
10071-260 = "Em troca,\nhoje eu farei qualquer coisa que você pedir.\n――Por favor, me dê suas ordens." 
10071-270 = "Meu aniversário…… é?" 
10071-280 = "Fufu……" 
10071-290 = "Se for sobre presentes,\ncomo já recebi o seu,\nnão precisa se preocupar com isso." 
10071-300 = "Feliz Ano Novo,\nSensei." 
10071-310 = "Neste ano, mesmo que não seja a trabalho,\nquem sabe possamos ir à praia juntos……" 
10071-320 = "……Desculpe.\nNão foi nada." 
10071-330 = "Esta roupa\nnão é muito apropriada\npara um dia como hoje." 
10071-340 = "……Na próxima vez, vou vestir algo\nmais adequado……" 
10071-350 = "A rua está bem barulhenta hoje, não é……" 
10071-360 = "Eu queria passar este momento\nde forma bem valorosa hoje, mas……" 
10071-380 = "Bom dia." 
10071-390 = "Você também está fazendo uma caminhada matinal, Sensei?" 
10071-400 = "Eu estava pensando em\ndar um mergulho em vez do meu\njogging de costume." 
10071-410 = "Já que estamos na praia,\nachei que seria legal\nfazer algo um pouco diferente do habitual." 
10071-420 = "……Deixar que me veja assim,\ntão cedo pela manhã……\nme deixa um pouco envergonhada." 
10071-430 = "……Atchim." 
10071-440 = "Parece que eu acabei ficando\nmuito tempo na água……\nMeu corpo começou a esfriar." 
10071-450 = "……Tem razão." 
10071-460 = "Dizem que coelhos\nnão devem entrar na água, mas……" 
10071-470 = "Como pode ver,\neu não sou um coelho." 
10071-2600 = "RABBIT Submetralhadora Tipo-31,\nrecebida. Substituí algumas peças internas\npara combate aquático, mas……\nSerá que eu deveria ter mudado as peças externas\npara algo mais fofo……?" 