[translation]
10071-10 = "Blue Archive."
10071-20 = "Aqui é RABBIT 1. Troca de roupa concluída.\nIniciarei a operação de infiltração agora."
10071-30 = "(Eu queria... tomar um banho...)"
10071-40 = "De algum lugar, vem um cheiro delicioso..."
10071-50 = "(...Deveria ter escolhido um traje de banho mais fofo.)"
10071-60 = "Este é o lugar do Sensei... O que estou fazendo aqui...?"
10071-70 = "...Onde o Sensei... está...?"
10071-80 = "Bem-vindo de volta, Sensei."
10071-90 = "Estou pronta. Qualquer que seja a ordem, irei executá-la com perfeição."
10071-100 = "Olá, Sensei. Estava esperando por você."
10071-110 = "Eh...? Você pergunta se não estou com frio por estar esperando de traje de banho?"
10071-120 = "Não há problema. Não importa a roupa, o tempo de espera não é um incômodo para mim."
10071-130 = "Diga-me... este traje de banho, ele combina comigo?"
10071-140 = "Como eu só usava o traje de banho designado pela Academia SRT até agora,"
10071-150 = "um design tão fofo assim... me deixa um pouco desconfortável."
10071-160 = "Não tanto quanto a Saki, mas... tenho um pouco de confiança na natação."
10071-170 = "Como não estamos em operação agora... posso ajudar com outras coisas fora do serviço."
10071-180 = "Será que é porque coelhos não gostam de água...?"
10071-190 = "Nunca vi um traje de banho com estampa de coelho..."
10071-200 = "Pelo contrário, como vacas são boas nadadoras, vi que vendem trajes de banho com estampa de vaca..."
10071-210 = "Seria bom se houvesse com estampa de coelho também."
10071-220 = "Por favor, sinta-se à vontade para me chamar."
10071-230 = "Nós estamos sempre de prontidão pelo Sensei."
10071-240 = "Feliz aniversário, Sensei."
10071-250 = "Bem... como não tenho muita folga, não consegui preparar um presente..."
10071-260 = "Em troca, farei qualquer coisa hoje. — Por favor, dê suas ordens."
10071-270 = "Meu aniversário... é?"
10071-280 = "Fufu..."
10071-290 = "Se for um presente, eu já recebi, então está tudo bem."
10071-300 = "Feliz Ano Novo, Sensei."
10071-310 = "Este ano, mesmo que não seja uma operação, quem sabe possamos ir à praia juntos..."
10071-320 = "...Perdão. Não é nada."
10071-330 = "Neste dia, esta roupa não é muito apropriada, não é?"
10071-340 = "...Da próxima vez, usarei algo que combine..."
10071-350 = "O lado de fora está barulhento..."
10071-360 = "Eu queria ter passado este tempo de hoje com mais calma."
10071-380 = "Bom dia."
10071-390 = "Sensei também está fazendo uma caminhada matinal?"
10071-400 = "Eu pensei em dar um mergulho, em vez da minha corrida habitual."
10071-410 = "Já que estamos na praia, pensei que não seria ruim fazer algo diferente do habitual."
10071-420 = "...Fico um pouco envergonhada de aparecer assim logo cedo."
10071-430 = "......Atchim."
10071-440 = "Parece que fiquei tempo demais aqui... meu corpo começou a esfriar."
10071-450 = "...É verdade."
10071-460 = "Dizem que coelhos não devem entrar na água, mas..."
10071-470 = "Eu não sou um coelho, afinal."
10071-2600 = "Submetralhadora RABBIT-31, recebida. Em preparação para o combate subaquático, troquei algumas peças internas, mas... será que eu deveria ter trocado as peças externas por algo mais fofo também...?"
