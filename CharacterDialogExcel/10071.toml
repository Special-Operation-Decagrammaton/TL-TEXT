[translation]
10071-10 = "Blue Archive."
10071-20 = "Aqui é RABBIT1. Troca de roupa concluída.\nIniciando a operação de infiltração a partir deste momento."
10071-30 = "（Eu... gostaria de tomar\num banho logo...)"
10071-40 = "Sinto um cheiro\ndelicioso vindo\nde algum lugar..."
10071-50 = "（...Eu deveria ter\nescolhido um maiô\nmais fofo...)"
10071-60 = "Então aqui é o... do Sensei...\nO que eu estou fazendo agora..."
10071-70 = "…Para onde será…\no Sensei foi…?"
10071-80 = "Bem-vindo de volta, Sensei."
10071-90 = "Os preparativos estão completos.\nQualquer que seja a ordem,\neu a executarei com perfeição."
10071-100 = "Olá, Sensei.\nEstava à sua espera."
10071-110 = "Eh...? Se eu não estou\ncom frio esperando aqui\nvestida assim?"
10071-120 = "Não há problema.\nNão importa o traje,\no tempo que passo esperando\nnão é doloroso."
10071-130 = "Uhm... o senhor acha que\neste maiô ficou bem em mim?"
10071-140 = "Como até agora eu só\nvestia os modelos padrão\nda Academia Especial SRT,"
10071-150 = "Um design adorável\ncomo este me deixa...\num pouco inquieta."
10071-160 = "Não tanto quanto a Saki, mas...\ntenho um pouco de confiança\nna minha natação."
10071-170 = "Como não estamos em missão\nagora... posso ajudar com\nassuntos fora do protocolo."
10071-180 = "Será que é porque coelhos\ntêm aversão à água...?"
10071-190 = "Nunca vi um maiô com\nestampa de coelhinho..."
10071-200 = "Por outro lado, talvez porque\nvacas saibam nadar bem,\neu já vi biquínis de estampa\nde vaca à venda..."
10071-210 = "Deveria existir uma de coelhinho também."
10071-220 = "Por favor, sinta-se à vontade\npara falar comigo."
10071-230 = "Nós estamos sempre de prontidão\npara servir ao senhor, Sensei."
10071-240 = "Feliz aniversário,\nSensei."
10071-250 = "Uhm... como não tive\nmuito tempo sobrando, não pude\npreparar um presente apropriado..."
10071-260 = "Em troca, hoje farei qualquer coisa\nque o senhor pedir.\n——Dê-me suas ordens, quaisquer que sejam."
10071-270 = "O meu aniversário...?"
10071-280 = "Fufu..."
10071-290 = "Sobre o presente, não se preocupe,\neu sinto que já o recebi\n(apenas por estar aqui)."
10071-300 = "Feliz Ano Novo,\nSensei."
10071-310 = "Este ano, mesmo que não seja\npor uma missão, vamos à praia..."
10071-320 = "…Peço perdão.\nNão foi nada."
10071-330 = "Para o dia de hoje,\neste traje não parece\nmuito adequado, não é?"
10071-340 = "…Na próxima vez, usarei\nalgo mais apropriado…"
10071-350 = "Está barulhento lá fora..."
10071-360 = "Eu queria passar este momento\ncom o senhor de forma mais\ntranquila e cuidadosa."
10071-380 = "Bom dia."
10071-390 = "O senhor também veio para\num passeio matinal, Sensei?"
10071-400 = "Em vez do meu jogging\nhabitual, decidi dar um\nmergulho matinal."
10071-410 = "Já que estamos no mar, pensei\nque fazer algo diferente do\ncomum não seria má ideia."
10071-420 = "…Mas mostrar-me assim\ntão cedo pela manhã é\num pouco embaraçoso."
10071-430 = "……Atchim!"
10071-440 = "Parece que acabei ficando\ntempo demais na água...\nmeu corpo está esfriando."
10071-450 = "…É verdade."
10071-460 = "Dizem que coelhos não\ndevem entrar na água, mas…"
10071-470 = "Eu não sou um coelho,\nafinal de contas."
10071-2600 = "Submetralhadora RABBIT-31,\nrecebida. Para o combate subaquático,\ntroquei algumas peças internas, mas...\nUhm... será que eu deveria ter\ntrocado as peças externas por\ncoisas mais fofinhas também...?"