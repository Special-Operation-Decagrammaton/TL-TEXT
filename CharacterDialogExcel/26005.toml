[translation]
26005-20 = "小さいからって舐めないで！\n将来性はものすっごいんだから！"
26005-30 = "…私の成長はまだ\n終わってないの！信じて！"
26005-40 = "ふふっ。\n一眠りしていこっかな。"
26005-50 = "はあ…先生は\nなんであんなに\n空気が読めないんだろう。"
26005-60 = "美味しいスイーツが食べたーい、\nあっ！先生！"
26005-70 = "ん？えー…牛乳は、嫌い。\n飲まなきゃいけないって\n分かってるから、尚更！\nえ？それ、い、イチゴ牛乳？"
26005-80 = "頭撫でないでっ！\nもうっ…\n子ども扱いは嫌なの。"
26005-90 = "私も…\nあと何年か経ったら…\n妹じゃなくて、\n恋人に見えるかな？"
26005-100 = "牛乳なら1L飲んでる。\n仕方なく、毎日、毎日、毎日ね！"
26005-110 = "と、当番になれば、先生と\n美味しいお菓子を食べる\n時間があるはずよね？"
26005-120 = "ほら、今日も頑張って！\n私が手伝ってあげるから！"
26005-130 = "あの、先生、\n疲れてない？"
26005-140 = "お、美味しいスイーツでも\n食べに行く?"
26005-150 = "ほら！私がいる限り\nサボろうとするのは\n諦めなさい！\nさ、仕事の時間よ！\n任務を始めましょう！"
26005-160 = "誕生日おめでとう、先生！\n近くに良いスイーツ\n屋さんがあるの、行こ！"
26005-170 = "お、お祝いしてくれて\nありがとう。"
26005-180 = "（あと誕生日が何回来たら…\nそばにいた時に、お似合いって\n思ってもらえるのかな？）"
26005-190 = "べ、別に何も、\n変なことは考えてないけど？\n何をそんなにじっと\n見つめてるのよ？！"
26005-200 = "明けましておめでとう！\n今年の目標？\nそんなの決まってるでしょ！\nナイスバディになることよ！！"
26005-210 = "メリークリスマス！\nクリスマスって大好き！\n街が、私の好きな色で\nいっぱいになるから！"
26005-220 = "Trick or Treat～\n放課後スイーツ部には\n特別な日、ハロウィーンよ！\n外に行こう！"
26005-230 = "幽霊には興味ないけど、\n飴は大事だからね！"
26005-250 = "ほんと、先生には驚か\nされっぱなしっていうか、"
26005-260 = "振り回されっぱなしっ\nていうか……。"
26005-270 = "……ん？\n何をそんな、\nじっと見てるわけ？"
26005-280 = "ねぇ、\nまさかまた変なこと\n考えてないでしょうね？"
26005-290 = "私は先生の\nオモチャじゃ\nないんだから、"
26005-300 = "いい加減やめないと\n本当に怒るよ。"
26005-310 = "……いやまあ、\n別に心の底から嫌、って\nわけじゃないけど……。"
26005-320 = "……ふふっ。"
26005-330 = "（いつか……）"
26005-340 = "（いつかこうやって\n隣に……堂々と、\n並んで歩ける日が……）"
26005-2600 = "こんなの貰っちゃったら……\n本気で頑張るしかないじゃん！"
