[translation]
26005-20 = "Não me subestime só porque sou pequena!\nMeu potencial para o futuro é incrível!"
26005-30 = "…Meu crescimento ainda\nnão acabou! Acredite em mim!"
26005-40 = "Hehe.\nTalvez eu tire uma soneca."
26005-50 = "Ah… por que o Sensei\né tão alheio\nàs coisas?"
26005-60 = "Quero comer doces deliciosos,\nah! Sensei!"
26005-70 = "Hm? Bem… eu odeio leite.\nJá sei que tenho que beber,\nentão isso me irrita ainda mais!\nHã? Isso é, é leite de morango?"
26005-80 = "Não faça carinho na minha cabeça!\nQual é…\nNão gosto de ser tratada como criança."
26005-90 = "Será que…\ndaqui a alguns anos…\nem vez de uma irmãzinha,\nvocê vai me ver como uma namorada?"
26005-100 = "Estou bebendo 1L de leite.\nSem escolha, todo dia, todo dia, todo dia!"
26005-110 = "S-se eu for a responsável, devo ter\ntempo para comer doces\ndeliciosos com o Sensei, certo?"
26005-120 = "Vamos, dê o seu melhor hoje também!\nEu vou te ajudar!"
26005-130 = "Ei, Sensei,\nvocê não está cansado?"
26005-140 = "Que tal irmos comer\nalgum doce delicioso?"
26005-150 = "Vamos! Enquanto eu estiver aqui,\ndesista de tentar vadiar!\nAgora, hora do trabalho!\nVamos começar a missão!"
26005-160 = "Feliz aniversário, Sensei!\nTem uma doceria ótima aqui perto,\nvamos lá!"
26005-170 = "O-obrigada por\ncomemorar comigo."
26005-180 = "(Quantos aniversários mais faltam…\npara que, quando eu estiver ao seu lado,\nvocê me ache uma boa companhia?)"
26005-190 = "E-eu não estou pensando\nem nada estranho, tá?\nPor que você está me olhando\ntão fixamente?!"
26005-200 = "Feliz Ano Novo!\nMinha meta para este ano?\nIsso já está decidido, né!\nÉ ficar com um corpo incrível!!"
26005-210 = "Feliz Natal!\nEu amo o Natal!\nPorque a cidade fica\ncheia das minhas cores favoritas!"
26005-220 = "Doces ou Travessuras~\nPara o Clube de Doces depois da aula,\neste é um dia especial, o Halloween!\nVamos sair!"
26005-230 = "Não tenho interesse em fantasmas,\nmas balas são importantes, sabe!"
26005-250 = "Sério, o Sensei vive me surpreendendo,"
26005-260 = "ou melhor, vive me\nfazendo de boba……."
26005-270 = "……Hm?\nPor que você está me olhando\ntão fixamente?"
26005-280 = "Ei,\nvocê não está pensando em\nalgo estranho de novo, né?"
26005-290 = "Eu não sou\nbrinquedo do Sensei,"
26005-300 = "se você não parar logo,\neu vou ficar brava de verdade."
26005-310 = "……Bem, na verdade,\nnão é como se eu odiasse\nlá no fundo, mas……."
26005-320 = "……Hehe."
26005-330 = "(Algum dia……)"
26005-340 = "(Algum dia, o dia em que eu puder\ncaminhar ao seu lado……\norgulhosamente……)"
26005-2600 = "Se eu ganhei algo assim……\nnão tenho escolha a não ser me esforçar de verdade!"
