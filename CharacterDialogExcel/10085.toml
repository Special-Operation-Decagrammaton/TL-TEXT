[translation]
10085-10 = "ブルー、アーカイブ。"
10085-20 = "電波が届かない状況…\nハッカーにとっては過酷な環境だけど、ヴェリタスの\nメンバーだもの、この程度で諦めたりしないよ。"
10085-30 = "ここ、\n暖かくていいな…。"
10085-40 = "（あの格好…\n寒くないのかな…）"
10085-50 = "「妖怪MAX」を一杯。\n割らずに…\nストレートで。"
10085-60 = "（快適過ぎる…\nここから永遠に\n出たくないなぁ…）"
10085-70 = "（変な名前の\nWi-Fiが\nいっぱい…）"
10085-80 = "ううっ…出かけるの？\n今から？"
10085-90 = "もうちょっとここに\n居たいんだけど…。"
10085-100 = "待ってたよ、先生。"
10085-110 = "…寒くない？\nコーヒー淹れようか？"
10085-120 = "最近のキャンプ用ベッドって、\n結構良さげなのが多いんだ…"
10085-130 = "一個買って部室に\n置こうかな…"
10085-140 = "キャンプ装備のほとんどは\n組み立てが簡単だから、"
10085-150 = "インドア派の生徒にも\n需要があると思う。"
10085-160 = "…もちろん、\n片付けはその何倍も\n面倒くさいんだけど。"
10085-170 = "キャンプ場で食べる\nレトルト食品って、なんで\nあんなに美味しいのかな？"
10085-180 = "次の機会があったら、\n「妖怪MAX」を全種類持って\n行って飲み比べてみたいかも。"
10085-190 = "にぎやかな場所で\nコーディングを\nしていると、"
10085-200 = "キャンプ場の静寂が\n少しだけ、恋しくなる。"
10085-210 = "ネットのない時代は\nどうやって暇つぶしを\nしてたんだろ…？"
10085-220 = "先生、今日誕生日でしょ？"
10085-230 = "プレゼントというには\n違うかもだけど、欲しい\n情報があったら言って。"
10085-240 = "なんでも調べるよ。"
10085-250 = "私に関する情報でも…\n別にいいよ。"
10085-260 = "誕生日プレゼント…？\nわざわざ、いいのに…"
10085-270 = "…じゃあ、カフェラテを一杯、\n淹れてくれる？\n練乳入りの、濃いめで。"
10085-280 = "明けましておめでとう、先生。"
10085-290 = "さっき、ミレニアムタワーの\n前で甘酒を配ってたよ。"
10085-300 = "結構甘くて美味しかった…"
10085-310 = "甘酒味の\n「妖怪MAX」とか、\nいいかも。"
10085-320 = "人がたくさん…\nみんな、こんな寒いのに\nよく外に出られるね。"
10085-330 = "クリスマスイブを最も快適に\n過ごせる場所は、ふかふかで\n温かいお布団の中なのに。"
10085-340 = "……変な意味じゃないよ！？"
10085-350 = "ハロウィーンの予定？"
10085-360 = "お菓子をたくさん買って、\nみんなとゲームするつもり。"
10085-370 = "毎年この時期は、\n好きなホラーゲームの\n新作が出るからね。"
10085-390 = "空が、光でいっぱい…。"
10085-400 = "こんなに\nきらきらした夜空は、\nはじめてかも。"
10085-410 = "あの光一つ一つが、\n膨大な情報を持つ\nノードだと思うと"
10085-420 = "なんか、畏敬の念すら\n覚えるかも。"
10085-430 = "私の知っている\n情報をすべて重ねても"
10085-440 = "あの光には、\n届かないんだろうな…"
10085-450 = "…それでも私は、諦めない。"
10085-460 = "真理は必ず、\n光を向くものだから。"
10085-470 = "空の上にある遠くの星へ、\n敬意を込めた挨拶を。"
10085-480 = "こんにちは、お元気ですか？"
10085-2600 = "山登りで改めて銃の重さを\n思い知った…今度、\n軽量モデルに改造してみようかな。"
