[translation]
10085-10 = "Blue Archive."
10085-20 = "Sem sinal de rede... É um ambiente hostil para um hacker, mas como sou membro da Veritas, não vou desistir por causa disso."
10085-30 = "Aqui é tão quentinho... que bom."
10085-40 = "(Aquele traje... não está com frio?)"
10085-50 = "Um \"Youkai MAX\", por favor. Sem misturar... puro."
10085-60 = "(É confortável demais... não quero sair daqui nunca mais...)"
10085-70 = "(Tem um monte de Wi-Fi com nomes estranhos...)"
10085-80 = "Ugh... Você vai sair? Agora?"
10085-90 = "Eu queria ficar aqui mais um pouco..."
10085-100 = "Eu estava te esperando, Sensei."
10085-110 = "...Não está com frio? Quer que eu prepare um café?"
10085-120 = "As camas de acampamento de hoje em dia são bem boas, sabia..."
10085-130 = "Estou pensando em comprar uma para deixar na sala do clube..."
10085-140 = "A maioria dos equipamentos de acampamento é fácil de montar,"
10085-150 = "então acho que também tem demanda entre os alunos que preferem ficar dentro de casa."
10085-160 = "...Claro, desmontar dá muito mais trabalho."
10085-170 = "Por que será que comida pronta de acampamento é tão gostosa?"
10085-180 = "Se tiver uma próxima oportunidade, talvez eu leve todos os tipos de \"Youkai MAX\" para comparar."
10085-190 = "Quando estou programando em um lugar barulhento,"
10085-200 = "sinto um pouco de falta do silêncio do acampamento."
10085-210 = "Como as pessoas passavam o tempo antes da internet existir...?"
10085-220 = "Sensei, hoje é seu aniversário, né?"
10085-230 = "Talvez não seja bem um presente, mas se quiser alguma informação, é só pedir."
10085-240 = "Eu pesquiso qualquer coisa."
10085-250 = "Até informações sobre mim... não me importo."
10085-260 = "Presente de aniversário...? Não precisava se incomodar..."
10085-270 = "...Então, pode preparar um café com leite para mim? Bem forte e com leite condensado."
10085-280 = "Feliz Ano Novo, Sensei."
10085-290 = "Estavam distribuindo amazake na frente da Millennium Tower agorinha."
10085-300 = "Era bem doce e gostoso..."
10085-310 = "Um \"Youkai MAX\" sabor amazake seria uma boa ideia."
10085-320 = "Quanta gente... Como todos conseguem sair nesse frio?"
10085-330 = "O melhor lugar para passar a véspera de Natal é dentro de um cobertor fofinho e quentinho."
10085-340 = "......Não foi nesse sentido, tá!?"
10085-350 = "Planos para o Halloween?"
10085-360 = "Pretendo comprar muitos doces e jogar videogame com todo mundo."
10085-370 = "Nessa época do ano sempre lançam jogos de terror novos que eu gosto."
10085-390 = "O céu está cheio de luz..."
10085-400 = "Talvez seja a primeira vez que vejo um céu noturno tão brilhante."
10085-410 = "Ao pensar que cada uma daquelas luzes é um nó com uma quantidade imensa de dados,"
10085-420 = "sinto até uma certa reverência."
10085-430 = "Mesmo que eu somasse todo o conhecimento que possuo,"
10085-440 = "acho que não chegaria aos pés daquela luz..."
10085-450 = "...Ainda assim, eu não vou desistir."
10085-460 = "Porque a verdade sempre se volta para a luz."
10085-470 = "Um cumprimento respeitoso às estrelas distantes lá no céu."
10085-480 = "Olá, como vocês estão?"
10085-2600 = "Subir a montanha me fez perceber o peso da arma novamente... Da próxima vez, talvez eu tente modificar para um modelo mais leve."
