[translation]
10094-10 = "Blue! Archive!"
10094-20 = "O que você acha de empregadas, Sensei? Não seria um tema incrível para uma história?"
10094-30 = "Café... empregada... Parece que tem relação, mas ao mesmo tempo, não..."
10094-40 = "Se eu trabalhasse aqui... eu teria que limpar todo esse chão, né... ugh."
10094-50 = "Bolo... chá... parece delicioso... Espera? Será que sou eu quem tem que servir?"
10094-60 = "Queria tirar uma soneca escondida em algum lugar..."
10094-70 = "Que tal uma história sobre a jornada de uma empregada que começa em um café...?"
10094-80 = "Você chegou, meu mestre!"
10094-90 = "E aí? Sensei? Foi uma saudação bem de empregada, né?"
10094-100 = "Iupii, Sensei! A empregada Momoi estava aqui se comportando direitinho esperando por você!"
10094-110 = "Como será que eu faço para escapar do trabalho de empregada...?"
10094-120 = "Eca, Sensei!? Quando você chegou!?"
10094-130 = "Se todo mundo cuidasse das tarefas domésticas por conta própria, meu trabalho seria bem menor!"
10094-140 = "Hã? É verdade, mas você está dizendo que isso também se aplica a mim? Nem vem..."
10094-150 = "Sensei~ estou entediada. Vamos jogar alguma coisa juntos~"
10094-160 = "Hm? Está perguntando se eu não sou uma empregada agora?"
10094-170 = "Então é só a gente jogar um jogo onde aparecem empregadas!"
10094-180 = "Escrever o roteiro de um jogo não é nada fácil... especificamente falando...!"
10094-190 = "...Enfim, é uma coisa complicada!"
10094-200 = "Se você estiver preocupado sem saber o que fazer..."
10094-210 = "Nesse caso, você pode deixar tudo nas mãos de uma empregada confiável e descansar um pouco!"
10094-220 = "Como eu, por exemplo!"
10094-230 = "Para celebrar o aniversário do meu mestre!"
10094-240 = "Hã? Quer uma frase mais típica de empregada? Eu acabei de dizer uma."
10094-250 = "Mas, é verdade. Feliz aniversário, Sensei! O presente é..."
10094-260 = "O direito de passar a noite em claro jogando comigo!"
10094-270 = "Não entendo muito bem, mas dizem que acompanhar as atividades da empregada também é trabalho do mestre..."
10094-280 = "Então, Sensei...? Você não tem nada para me dar?"
10094-290 = "Uau! Obrigado, Sensei!"
10094-300 = "Hã? Sério? Você preparou algo para a Midori também?"
10094-310 = "Ano novo... como o tempo voa... Feliz ano novo, Sensei."
10094-320 = "Quais jogos será que vão lançar este ano? Estou ansiosa!"
10094-330 = "No Natal, tem muitos jogos em promoção especial..."
10094-340 = "Essa é a chance de fazer compras! Sensei!"
10094-350 = "Halloween... essa também é uma época que tem tudo a ver com o nosso Clube de Desenvolvimento de Jogos..."
10094-360 = "Aqui, pegue! São balas que a empregada Momoi preparou!"
10094-370 = "Hã? É o contrário? Será...?"
10094-390 = "Hehe... doces, que delícia..."
10094-400 = "O sol está tão quentinho... e o sofá tão fofinho..."
10094-410 = "Umm... limpeza...?"
10094-420 = "Eu vou fazer... só deixa eu comer isso... e descansar um pouquinho..."
10094-430 = "Ué? Sensei?"
10094-440 = "Entendi. Então isso ainda é um sonho."
10094-450 = "Poder encontrar o Sensei até nos sonhos... que sonho bom..."
10094-460 = "Hoje, talvez aconteça algo divertido... hehe..."
10094-470 = "Mumu... ah, uma vida extra..."
10094-2600 = "Escuta, Sensei! Dizem que para uma empregada, o equipamento é o mais importante! Infiltração, explosões, segurança de dados. E, claro, a paz mundial... Para fazer esse tipo de trabalho, você precisa de um bom equipamento!"
