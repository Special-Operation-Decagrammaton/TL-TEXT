[translation]
10094-10 = "ブルー！アーカイブ！"
10094-20 = "メイドって先生はどう思う？\n物語のネタとして、最高じゃない？"
10094-30 = "カフェ……メイド……\n関係がありそうな、\n無さそうな……"
10094-40 = "もし私がここで働いてたら\n……ここの床、全部掃除しなきゃなんないんだよね……うぅぅ。"
10094-50 = "ケーキ……紅茶……\n美味しそう……\nあれ？もしかして、\n私が用意する側？"
10094-60 = "どこかでこっそり\n寝たいなぁ……"
10094-70 = "カフェから始まる\nメイドの旅！\nみたいなお話は\nどうかな……？"
10094-80 = "来たか、我が主よ！"
10094-90 = "どう？先生？\nメイドっぽい挨拶でしょ？"
10094-100 = "ヤッホー、先生！\nメイドモモイ、\nちゃんといい子にして\n待ってたんだよ！"
10094-110 = "どうすればぁ～\nメイドの仕事から\n逃げられるのかなぁ～"
10094-120 = "うげっ、先生！？\nいつ来たの！？"
10094-130 = "普段からみんな、\n自分で家事をやってたら\n仕事も減ったのに～！"
10094-140 = "え？たしかに\nその通りだけど私にも\n当てはまる話、だって？\nそんなぁ……"
10094-150 = "先生～暇ぁ。\n一緒にゲームしよ～"
10094-160 = "ん？今の私は\nメイドじゃないかって？"
10094-170 = "じゃあ、メイドが登場する\nゲームをすればいいよね！"
10094-180 = "ゲームのシナリオを\n書くのは簡単じゃあない……\n具体的には……！"
10094-190 = "……とにかく、難しいことなの！"
10094-200 = "何をどうすればいいか\n悩んでいるのなら……"
10094-210 = "そのときは、頼もしい\nメイドに全てを任せて、\n休むのもありだよ！"
10094-220 = "例えば、この私にとか！"
10094-230 = "我が主の誕生日を祝して！"
10094-240 = "え？もっとメイドらしい\nフレーズがほしいって？\n今言ったじゃん。"
10094-250 = "でも、そうだね。\nお誕生日おめでとう、先生！\nプレゼントは……"
10094-260 = "私と一緒に！\n徹夜ゲームする権利だよ！"
10094-270 = "よく分かんないけど、\nメイドの動向を把握するのも、\n主人のお仕事なんだってさ……"
10094-280 = "だから先生……？\n私に何か渡すものとかない？"
10094-290 = "わぁ！ありがとう、先生！"
10094-300 = "え？ほんと？\nミドリの分も用意してくれたの？"
10094-310 = "新年か……早いなぁ……\nあけましておめでとう、先生。"
10094-320 = "今年はどんなゲームが\n発売されるんだろ？\n楽しみだね！"
10094-330 = "クリスマスには、\n特別セール中の\nゲームがたくさんある……"
10094-340 = "これはショッピングの\nチャンスだよ！先生！"
10094-350 = "ハロウィン……\nこれもまた、\n私たちゲーム開発部と\n縁のあるシーズン……"
10094-360 = "はい、これ！\nメイドモモイが\n用意した飴だよ！"
10094-370 = "え？その反対だって？\nそうだったっけ……？"
10094-390 = "うへへ……\nお菓子、美味しい……。"
10094-400 = "日差しが温かくて……\nソファもふわふわ……。"
10094-410 = "うぅん……おそうじ……？"
10094-420 = "するから……これだけ食べて……\nちょっと休んでから……。"
10094-430 = "あれ？先生？"
10094-440 = "そっか。\nこれ、まだ夢なんだね。"
10094-450 = "夢の中でも\n先生に会えるなんて……\nいい夢だねぇ……。"
10094-460 = "今日はなんだか、\n楽しいことがあるかも……\nうへへ……。"
10094-470 = "むにゃむにゃ……\nあ、ボーナスライフだ……。"
10094-2600 = "聞いて、先生！\nメイドには何よりも装備が大事なんだって！\n潜入、爆破、機密確保。\nそして、世界平和……\nそういう仕事をするには、\nいい装備がなくちゃね！"
