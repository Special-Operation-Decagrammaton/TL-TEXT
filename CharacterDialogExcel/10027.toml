[translation]
10027-10 = "ブルーアーカイブ。"
10027-20 = "どんな衣装だとしても、やることは変わらない。\n与えられたミッションを遂行する……それだけだ。"
10027-30 = "綺麗な場所だ、\n悪くない。"
10027-40 = "……なんだか、\nすごく視線を感じる。"
10027-50 = "そういえばこの衣装……\n先生の感想を\n聞いてないな……"
10027-60 = "ん……？\nあそこにいるのは、\nまさか……？"
10027-70 = "……やることが無い\nけど、たまにはこういう\n時間も悪くない、か。"
10027-80 = "おかえり、先生。\nそろそろ来る頃だと思ってた。"
10027-90 = "先生、作戦の時間だ。\n出発しよう。"
10027-100 = "この格好……？\n何か、変かな……？"
10027-110 = "服装が変わっても、\n内面がすぐ\n変わるわけじゃない。"
10027-120 = "私はいつも通りだ、うん。"
10027-130 = "……先生、どうかした？"
10027-140 = "……え？耳を、触りたい？"
10027-150 = "狙撃手にとって\n大切なのは平常心だ。"
10027-160 = "……先生？\nどこをそんなにジッと……。"
10027-170 = "ちょ、ちょっと先生！？\n黙ってないで、何か……っ！"
10027-180 = "メイド服の時は、\nメイドとしての\n気持ちで動いていたけど……"
10027-190 = "この格好だと、\nどういう気持ちで\nいれば良いんだ……？"
10027-200 = "お誕生日おめでとう、先生。"
10027-210 = "私にできる奉仕だったら、\n何でも言ってほしい。"
10027-220 = "誕生日……？\nあ、ありがとう……\nえ、プレゼント？"
10027-230 = "……いや、大丈夫だ。\nもう、十分貰ってる。"
10027-240 = "は、ハッピーニューイヤー……！\n……えっと、\nこれで合ってるのか？"
10027-250 = "クリスマスか……。"
10027-260 = "まあ確かに、この状況は\nプレゼントと言えないでも\nないけど……。"
10027-270 = "みんなして仮装をする日……"
10027-280 = "なら、この格好で\n歩き回っても大丈夫か……？"
10027-300 = "せ、先生！？\nちがっ、これはその……！"
10027-310 = "待って！今は、姿勢を\n変えるわけにいかなくて……！"
10027-320 = "えっと、今は狙撃任務中で……！"
10027-330 = "ターゲットから\n狙いを外すわけには\nいかないし、だから……！"
10027-340 = "……え、こっちは大丈夫……？"
10027-350 = "……むしろ、\nそのままでお願い？\nちょっ……！"
10027-360 = "な、何だか喜んでる\nみたいだけど、\nこれは流石に……！"
10027-370 = "やっぱり無理だ、\n恥ずかしい……っ！"
10027-380 = "え、気にせず続けて……？"
10027-390 = "き、気にせずに\nいられるか！バカっ！"
10027-2600 = "こんな良いものを貰ったら、\n次からは余計にミスなんて出来ないな。\n……大丈夫。\n先生の背中は、私に任せて。"
