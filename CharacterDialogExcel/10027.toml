[translation]
10027-10 = "Blue Archive."
10027-20 = "Não importa qual seja o traje, o que eu preciso fazer não muda. Cumprir a missão que me foi dada... é só isso."
10027-30 = "É um lugar bonito, não é ruim."
10027-40 = "...De alguma forma, sinto muitos olhares sobre mim."
10027-50 = "Falando nisso, este traje... ainda não ouvi a opinião do Sensei..."
10027-60 = "Hm...? Aquela pessoa ali, não pode ser...?"
10027-70 = "...Não tenho nada para fazer, mas, de vez em quando, esse tempo também não é ruim, né?"
10027-80 = "Bem-vindo de volta, Sensei. Eu já imaginava que você chegaria por volta desta hora."
10027-90 = "Sensei, é hora da operação. Vamos partir."
10027-100 = "Este visual...? Tem algo de estranho nele...?"
10027-110 = "Mesmo que a roupa mude, meu interior não muda tão facilmente."
10027-120 = "Eu continuo a mesma de sempre, sim."
10027-130 = "...Sensei, aconteceu alguma coisa?"
10027-140 = "...Eh? Você quer tocar nas minhas orelhas?"
10027-150 = "Para um atirador, o mais importante é manter a calma."
10027-160 = "...Sensei? Por que você está encarando tanto..."
10027-170 = "Ei, ei, Sensei!? Não fique aí parado, diga alguma coisa...!"
10027-180 = "Quando eu estava com o uniforme de empregada, eu agia com o sentimento de uma empregada, mas..."
10027-190 = "Com este visual, que tipo de sentimento eu deveria ter...?"
10027-200 = "Feliz aniversário, Sensei."
10027-210 = "Se for um serviço que eu possa prestar, pode me pedir qualquer coisa."
10027-220 = "Aniversário...? Ah, obrigado... Eh, um presente?"
10027-230 = "...Não, está tudo bem. Eu já recebi o suficiente."
10027-240 = "Fe-feliz ano novo...! ...Err, é assim que se diz?"
10027-250 = "Natal, é..."
10027-260 = "Bem, certamente, esta situação não deixa de ser um presente, mas..."
10027-270 = "Um dia em que todos se fantasiam..."
10027-280 = "Então, não tem problema andar por aí com este visual...?"
10027-300 = "Se-Sensei!? Não, isso é, na verdade...!"
10027-310 = "Espere! Agora eu não posso mudar de posição...!"
10027-320 = "Err, agora estou em uma missão de sniper...!"
10027-330 = "Eu não posso tirar a mira do alvo, então, por isso...!"
10027-340 = "...Eh, aqui está tudo bem...?"
10027-350 = "...Pelo contrário, você quer que eu continue assim? Ei...!"
10027-360 = "Vo-você parece estar feliz, mas isso é demais...!"
10027-370 = "Não dá, é impossível, que vergonha...!"
10027-380 = "Eh, para eu continuar sem me importar...?"
10027-390 = "Co-como eu vou conseguir não me importar! Seu bobo!"
10027-2600 = "Depois de ganhar algo tão bom, não posso cometer erros daqui para frente. ...Está tudo bem. Pode deixar as suas costas comigo, Sensei."
