[translation]
10088-10 = "ブルーアーカイブ"
10088-20 = "こんにちは。あんまり……着慣れてないから、\nちょっと変だったらごめん……。よろしくね、先生。"
10088-30 = "悪くないセンスだね。"
10088-40 = "視線を\n感じるような…。"
10088-50 = "…ふーん。先生って、\nこういうのが\n好きなんだ？"
10088-60 = "…なんだか落ち着く。"
10088-70 = "座れそうな場所、\n無いかな？"
10088-80 = "いらっしゃい、先生。\n今日は何をすればいい？"
10088-90 = "おはよう、先生。\n今日、予定ある？"
10088-100 = "なかったら… その…"
10088-110 = "いや、なんでもない。"
10088-120 = "このドレス…似合ってる…？"
10088-130 = "…ありがとう。\nそう言ってもらえて嬉しい。"
10088-140 = "先生が気に入ったなら、\nこれからも着てみようかな。"
10088-150 = "あっ…えっと、\nたまに、だけど。"
10088-160 = "なんだか、いつもと\n違う感じがする。"
10088-170 = "私らしくないっていうか…\nなんでだろう…。"
10088-180 = "まあ…こういうのも\n悪くないかな。ふふ。"
10088-190 = "…あ、今の話、他の人には\n言わないでね。分かった？"
10088-200 = "お誕生日おめでとう、先生。\n何かやってほしいこと、ある？"
10088-210 = "…あ、やるっていっても\n仕事じゃないから。"
10088-220 = "私の誕生日…？"
10088-230 = "あ、そうだった。"
10088-240 = "ありがとう。\nすっかり忘れてた。"
10088-250 = "明けましておめでとう、先生。"
10088-260 = "せっかくドレスを\n着てるんだし…"
10088-270 = "パーティーでも、する？"
10088-280 = "クリスマスだね…。"
10088-290 = "…え？こんな格好で\n一緒に歩いてたら、\n誤解されるよ。いいの？"
10088-300 = "ハロウィーンの仮装…？"
10088-310 = "私はもう準備万端だよ。"
10088-330 = "…いいね。"
10088-340 = "こうやって…\n誰かと一緒にボーッと\n時間を過ごすなんて…"
10088-350 = "…ほとんどしたことないかも。"
10088-360 = "…そう、いつも一人。\n別にそれで良いと思ってたし。"
10088-370 = "…本当に？"
10088-380 = "ふふ、良かった、\n先生も気に入ってくれて。"
10088-390 = "いいよね、こうやって\n静かに過ごすのってさ。"
10088-400 = "…あ、別に普段がイヤって\nわけではないんだけど。"
10088-410 = "…先生なら分かってるか。"
10088-420 = "ふう…あのさ…。"
10088-430 = "…少しだけ…。"
10088-440 = "もう少しだけ…\nここにいて。"
10088-2600 = "たまに思うんだ。今までいろんなモノを\n貰ってきたけど…ちゃんと返せるのかなって。\nでも…たぶんそんな日は来ないから、\n先に言っておくね。…ありがとう、先生。\nこれからも…頑張るよ。"
