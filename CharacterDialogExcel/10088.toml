[translation]
10088-10 = "Blue Archive"
10088-20 = "Olá. Eu não estou muito... acostumada a usar isso, então, desculpe se estiver um pouco estranho... Conto com você, Sensei."
10088-30 = "Você tem um bom gosto."
10088-40 = "Sinto como se estivessem\nme olhando..."
10088-50 = "...Hum. Então o Sensei\ngosta desse tipo de coisa?"
10088-60 = "...De alguma forma, me sinto calma."
10088-70 = "Será que não tem\num lugar para sentar?"
10088-80 = "Bem-vindo, Sensei.\nO que devemos fazer hoje?"
10088-90 = "Bom dia, Sensei.\nVocê tem planos para hoje?"
10088-100 = "Se não tiver... então..."
10088-110 = "Não, não é nada."
10088-120 = "Este vestido... combina comigo...?"
10088-130 = "...Obrigada.\nFico feliz que tenha dito isso."
10088-140 = "Se o Sensei gostou, acho que\nvou usá-lo mais vezes."
10088-150 = "Ah... bem, só de vez\nem quando, claro."
10088-160 = "Sinto que estou um pouco\ndiferente do habitual."
10088-170 = "Não parece muito comigo...\nPor que será...?"
10088-180 = "Bem... acho que isso\nnão é tão ruim. Fufu."
10088-190 = "...Ah, não conte isso para\nmais ninguém, entendeu?"
10088-200 = "Feliz aniversário, Sensei.\nTem algo que você queira que eu faça?"
10088-210 = "...Ah, e quando digo fazer algo,\nnão estou falando de trabalho."
10088-220 = "Meu aniversário...?"
10088-230 = "Ah, é verdade."
10088-240 = "Obrigada.\nEu tinha esquecido completamente."
10088-250 = "Feliz Ano Novo, Sensei."
10088-260 = "Já que estou usando\num vestido..."
10088-270 = "Que tal fazermos uma festa?"
10088-280 = "É Natal, né..."
10088-290 = "...Hã? Se a gente andar por aí\nvestidos assim, vão entender errado.\nTudo bem para você?"
10088-300 = "Uma fantasia de Halloween...?"
10088-310 = "Eu já estou pronta."
10088-330 = "...Que bom."
10088-340 = "Passar o tempo assim...\nsem fazer nada com alguém..."
10088-350 = "...Acho que nunca fiz isso antes."
10088-360 = "...É, eu sempre estive sozinha.\nE achava que estava tudo bem assim."
10088-370 = "...Sério mesmo?"
10088-380 = "Fufu, que bom que\nvocê também gostou, Sensei."
10088-390 = "É bom passar o tempo\nassim, em silêncio, né?"
10088-400 = "...Ah, não é que eu não goste\nda nossa rotina normal."
10088-410 = "...Mas acho que o Sensei já sabe disso."
10088-420 = "Ufa... escuta..."
10088-430 = "...Só um pouquinho..."
10088-440 = "Fique aqui comigo...\nsó mais um pouco."
10088-2600 = "Às vezes eu penso. Já recebi tantas coisas até hoje... será que vou conseguir retribuir tudo? Mas... acho que esse dia nunca vai chegar, então vou dizer logo. ...Obrigada, Sensei. Vou continuar me esforçando daqui para frente."
