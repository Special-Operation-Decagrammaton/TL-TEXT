[translation]
20007-10 = "Eu sou a Hatsune Miku, uma cantora virtual que canta para todos! É um prazer conhecê-lo!"
20007-20 = "Que palco maravilhoso...!"
20007-30 = "A tecnologia de Kivotos... é incrível...!"
20007-40 = "~~~♪~~~♪"
20007-50 = "A música deste café... é tão relaxante."
20007-60 = "(Isto é... uma cebolinha? Por que... está aqui?)"
20007-70 = "Olá, Sensei! Que tipo de música você quer ouvir hoje?"
20007-80 = "Ah, eu estava esperando por você, Sensei!"
20007-90 = "Vamos lá, é hora de começar os preparativos para um novo palco!"
20007-100 = "Eu sou originalmente uma cantora virtual, mas aqui em Kivotos, recebi um corpo que me permite cantar livremente."
20007-110 = "Não sei como agradecer, mas se houver algo que eu possa fazer, por favor, me diga!"
20007-120 = "Se for pelo Sensei, eu cantarei o quanto você quiser!"
20007-130 = "Você me chamou, Sensei!?"
20007-140 = "Se eu enrolar uma cebolinha no pescoço, será que consigo cantar com uma voz ainda mais bonita...?"
20007-150 = "Eu sou uma cantora virtual, alguém que canta e entrega os sentimentos contidos nas músicas!"
20007-160 = "Feliz aniversário, Sensei!"
20007-170 = "Por favor, ouça a minha música de aniversário! Se o Sensei desejar, eu cantarei o dia inteiro!"
20007-180 = "Hoje é um dia muito, muito especial para mim..."
20007-190 = "Poder estar com o Sensei em um dia tão importante... eu estou tão feliz!"
20007-200 = "Feliz Ano Novo, Sensei! Vamos fazer deste ano um ano maravilhoso novamente!"
20007-210 = "Feliz Natal! Vamos cantar canções natalinas juntos!"
20007-220 = "Hum... quem é você?"
20007-230 = "Se for para uma entrevista, por favor, entre em contato com o meu empresário..."
20007-240 = "...Brincadeirinha. Hehe, foi só uma pequena travessura. Afinal, hoje é Halloween!"
20007-260 = "(Todos estão ouvindo a minha música... e as minhas palavras...)"
20007-270 = "(Cantar colocando os meus sentimentos... é uma sensação tão boa...!)"
20007-280 = "(Poder cantar para todos desta maneira... é tão alegre, tão divertido...!)"
20007-290 = "(Eu quero continuar cantando assim... para sempre e sempre...!)"
20007-2600 = "Com isso, eu vou conseguir levar a minha música para ainda mais pessoas...!"
