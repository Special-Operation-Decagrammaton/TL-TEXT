[translation]
13011-10 = "ブルーアーカイブ！"
13011-20 = "これから、すっごく面白い物語が始まるよ！"
13011-30 = "ゲーム～ゲーム～\nゲームがやりたい～"
13011-40 = "あれ？これちっちゃ\nい時にやったあの\nシリーズじゃん！？"
13011-50 = "うーん、これじゃ部員たちの\nおやつ代が足りない。\nアルバイトでもしようかな。"
13011-60 = "あっ！\n唐突に良いシナリオの\nアイデアが浮かんだ！"
13011-70 = "やった！\nクリア！！"
13011-80 = "おかえり、先生！\n早く任務を始めよう！"
13011-90 = "準備完了！行こう、先生！\n次のクエストをクリアしに！"
13011-100 = "ゲームを楽しめる人とゲームが\n上手い人は別なことも多いよ。"
13011-110 = "先生はどっち？"
13011-120 = "あっ！今日新作の\nゲームの発売日だった！"
13011-130 = "元々今日はレイドに\n行こうと思ってたのに！\n当番になっちゃうなんて……！"
13011-140 = "……まあ、\nこっちも好きだからいいけど。"
13011-150 = "先生！任務とかは後でいいから\nとりあえずゲームしに行こう！"
13011-160 = "先生はいいな……。\n欲しいゲームがあったら\nいつでも買えるんでしょ？"
13011-170 = "先生！お誕生日おめでとう！\n今日はゲーム開発部の\nみんなと一緒に美味しい\nもの食べに行こう！"
13011-180 = "先生！今日は私と\nミドリの誕生日なの！"
13011-190 = "一緒にできる2人用\nゲーム買って～。"
13011-200 = "ハッピーニューイヤー！\n今年も楽しくゲームやろ！"
13011-210 = "クリスマスか……\nうーん、"
13011-220 = "先生が赤い服を\n着て、ゲーム機を\nプレゼントしてくれたら\n最高のクリスマスなのに！"
13011-230 = "わあ！ハロウィンだ！\nなんだかワクワクする！\n先生！早く飴ちょうだい！"
13011-250 = "見て、先生！\nこっち側のスタンプ、\n全部集められたよ！"
13011-260 = "これでクエストクリア、だね！\nやった！"
13011-270 = "最初はどうなるか\nと思ったけど……。"
13011-280 = "やっぱり先生と私、\n相性バッチリだね！"
13011-290 = "って、うわぁっ！？\n先生！？"
13011-300 = "汗まみれじゃん！\n大丈夫！？"
13011-310 = "あはっ、大丈夫なら良かった。\n今日も先生のおかげで、\nすっごく楽しかったよ！"
13011-320 = "もしまたこういう\nイベントがあったら、"
13011-330 = "その時もまた、\n一緒に参加しようね！\n先生！"
13011-2600 = "こ……これが……私の専用装備！\nこれで私も、超強化型JK！"
