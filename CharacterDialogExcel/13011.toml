[translation]
13011-10 = "Blue Archive!"
13011-20 = "Uma história super interessante vai começar agora!"
13011-30 = "Jogo~ jogo~\nQuero jogar um jogo~"
13011-40 = "Ué? Essa não é aquela\nsérie que eu jogava\nquando era pequena!?"
13011-50 = "Hmm, desse jeito o dinheiro\npara os lanches das integrantes\nnão vai dar. Acho que vou\nprocurar um bico."
13011-60 = "Ah!\nDe repente, tive uma\nideia ótima para o cenário!"
13011-70 = "Consegui!\nZerei!!"
13011-80 = "Bem-vindo de volta, Sensei!\nVamos começar a missão logo!"
13011-90 = "Preparação concluída! Vamos, Sensei!\nPara zerar a próxima missão!"
13011-100 = "Quem gosta de jogar nem sempre\né bom em jogos, sabia?"
13011-110 = "Qual dos dois você é, Sensei?"
13011-120 = "Ah! Hoje era o dia de\nlançamento daquele\njogo novo!"
13011-130 = "Eu pretendia ir na\nraid hoje!\nE logo agora que estou de plantão...!"
13011-140 = "......Bem,\ncomo eu também gosto disso, tudo bem."
13011-150 = "Sensei! Missões podem esperar, vamos\njogar alguma coisa primeiro!"
13011-160 = "Que bom para você, Sensei...\nSe quiser um jogo,\npode comprar a qualquer hora, né?"
13011-170 = "Sensei! Feliz aniversário!\nHoje, vamos sair para comer\nalgo gostoso com todo mundo\ndo Clube de Desenvolvimento de Jogos!"
13011-180 = "Sensei! Hoje é o meu\ne o aniversário da Midori!"
13011-190 = "Compra um jogo para\ndois pra gente jogar junto~"
13011-200 = "Feliz Ano Novo!\nVamos jogar bastante este ano também!"
13011-210 = "Natal, hein...\nHmm,"
13011-220 = "Seria o Natal perfeito se o\nSensei vestisse uma roupa vermelha\ne me desse um console\nde presente!"
13011-230 = "Uau! É Halloween!\nEstou tão animada!\nSensei! Me dá um doce logo!"
13011-250 = "Olha, Sensei!\nConsegui completar todos\nos selos deste lado!"
13011-260 = "Missão concluída, né!\nConsegui!"
13011-270 = "No começo eu não sabia\no que ia acontecer..."
13011-280 = "Mas no fim, a gente\ncombina muito bem, Sensei!"
13011-290 = "Espera, uaaah!?\nSensei!?"
13011-300 = "Você está todo suado!\nEstá tudo bem!?"
13011-310 = "Ah, que bom que está bem.\nGraças a você, hoje foi\nmuito divertido também!"
13011-320 = "Se tiver outro evento\ncomo este,"
13011-330 = "vamos participar\njuntos de novo, tá?\nSensei!"
13011-2600 = "E... este é... meu equipamento exclusivo!\nAgora eu também sou uma colegial super reforçada!"
