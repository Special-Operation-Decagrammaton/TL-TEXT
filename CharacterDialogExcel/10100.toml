[translation]
10100-10 = "ブルーアーカイブ。"
10100-20 = "アビドスの砂狼シロコ…。\nん、またよろしくね、先生。"
10100-30 = "ここは…\n悪くない…。"
10100-40 = "平和だね、ここは。"
10100-50 = "ん、休憩しようかな。"
10100-60 = "これは…なに？\n開けてみていいの…？"
10100-70 = "（この家具…先生の\n好みなのかな…）"
10100-80 = "忙しそうだけど…\n手伝おうか？"
10100-90 = "ん、待ってたよ、先生。\n仕事が終わるまで、\n帰さないから。"
10100-100 = "先生、書類仕事、\n少し終わらせたよ。"
10100-110 = "ん？教わってないのに、\nどうやったのかって？"
10100-120 = "…前、やったことあるから。"
10100-130 = "休憩室にある\nお菓子、なんだけど…"
10100-140 = "ごめん、ちょっと\n食べちゃった。"
10100-150 = "もっと食べていいの？"
10100-160 = "…ありがとう。"
10100-170 = "先生、遅くまで仕事？"
10100-180 = "私も、一緒に居てあげる。"
10100-190 = "何でそんなにじーっと\n見てるの…？"
10100-200 = "ん、睨めっこ対決、\n受けて立つ。"
10100-210 = "あれもこれも全部、\n懐かしいものばかり。"
10100-220 = "誕生日、おめでとう。"
10100-230 = "その、よかったら\n一緒にライディング…"
10100-240 = "ん？その提案は\n今日で2回目？"
10100-250 = "私の誕生日だね、\nありがとう。"
10100-260 = "…先生、こっちの私も、\nお祝いしてあげて。"
10100-270 = "あけましておめでとう、先生。"
10100-280 = "また新しい一年が始まるね。\n先生の今年の目標は？"
10100-290 = "クリスマスだね…\n私へのプレゼントは？"
10100-300 = "ふふ、冗談だよ。\nメリークリスマス、先生。"
10100-310 = "トリック・オア・トリート。"
10100-320 = "ん、先に言ったのは私。\nお菓子、もらうね。"
10100-340 = "…いつも通りだね、\nここは。"
10100-350 = "変わったのは、\n私だけか。"
10100-360 = "ん…でも、変わって\nないものもあって、\n少し安心した。"
10100-370 = "先生、私、\nまた自転車に\n乗ってみたいと思う。"
10100-380 = "色々と壁はあるかも\nしれないけど…"
10100-390 = "でも、先生が\n居てくれたら…\nできる気がするの。"
10100-400 = "ん、ありがとう。先生。"
10100-2600 = "私に、ここまで\nしてくれるんだ。う、ううん。\n不満とかじゃなくて。\nただ、ちょっと驚いただけ…。"
