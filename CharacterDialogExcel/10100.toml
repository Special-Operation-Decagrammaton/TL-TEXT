[translation]
10100-10 = "Blue Archive."
10100-20 = "Shiroko Sunaookami de Abydos...\nHum, prazer em vê-lo novamente, Sensei."
10100-30 = "Aqui é...\nNão é ruim..."
10100-40 = "É um lugar pacífico, não é?"
10100-50 = "Hum, acho que vou descansar um pouco."
10100-60 = "O que é isso...?\nPosso abrir...?"
10100-70 = "(Este móvel... será que é\ndo gosto do Sensei...)"
10100-80 = "Parece ocupado...\nQuer que eu ajude?"
10100-90 = "Hum, eu estava te esperando, Sensei.\nNão vou te deixar ir\naté terminar o trabalho."
10100-100 = "Sensei, adiantei um pouco\ndo seu trabalho com a papelada."
10100-110 = "Hum? Quer saber como eu fiz\nsem ninguém me ensinar?"
10100-120 = "...Porque eu já fiz isso antes."
10100-130 = "Sobre os doces que estão\nna sala de descanso..."
10100-140 = "Desculpe, acabei\ncomendo um pouco."
10100-150 = "Posso comer mais?"
10100-160 = "...Obrigada."
10100-170 = "Sensei, trabalhando até tarde?"
10100-180 = "Eu também vou ficar aqui com você."
10100-190 = "Por que você está me encarando\ntanto assim...?"
10100-200 = "Hum, desafio de encarada,\neu aceito."
10100-210 = "Tudo isso aqui,\nme traz tantas lembranças."
10100-220 = "Feliz aniversário."
10100-230 = "Hum, se você quiser,\npodemos dar uma volta de bicicleta..."
10100-240 = "Hum? Essa é a segunda vez\nque eu sugiro isso hoje?"
10100-250 = "É o meu aniversário, né?\nObrigada."
10100-260 = "...Sensei, comemore comigo\ntambém."
10100-270 = "Feliz Ano Novo, Sensei."
10100-280 = "Um novo ano está começando.\nQual é o seu objetivo para este ano, Sensei?"
10100-290 = "É Natal...\nOnde está o meu presente?"
10100-300 = "Fufu, é brincadeira.\nFeliz Natal, Sensei."
10100-310 = "Doces ou travessuras."
10100-320 = "Hum, eu disse primeiro.\nVou pegar os doces."
10100-340 = "...Está tudo como sempre,\npor aqui."
10100-350 = "Será que a única que mudou\nfui eu?"
10100-360 = "Hum... mas tem coisas que não\nmudaram, e isso me deixa\num pouco aliviada."
10100-370 = "Sensei, eu acho que quero\nandar de bicicleta\nnovamente."
10100-380 = "Talvez existam vários obstáculos\npelo caminho, mas..."
10100-390 = "Mas, se você estiver comigo...\nSinto que consigo."
10100-400 = "Hum, obrigada, Sensei."
10100-2600 = "Você faria tudo isso por mim. N-não, não é que eu esteja insatisfeita. É só que... fiquei um pouco surpresa."
