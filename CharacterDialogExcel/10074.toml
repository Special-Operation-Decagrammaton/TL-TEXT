[translation]
10074-10 = "Blue Archive~!"
10074-20 = "Tomar um banho de água fria faz a gente se sentir renovado, sabe?♡\nSensei... gostaria de... brincar na água também?"
10074-30 = "Ora,\naquela pessoa é..."
10074-40 = "Eu não fazia ideia de que\nexistia um lugar\ntão adorável assim..."
10074-50 = "Se eu brincasse na água aqui,\nlevaria uma bronca, não é?"
10074-60 = "Fufu,\nestou sentindo\nseu olhar intenso♡"
10074-70 = "Posso chegar\nmais perto?"
10074-80 = "Eu estava esperando por você,\nSensei."
10074-90 = "Claro,\ncontinuarei vestida assim por todo o tempo♡"
10074-100 = "Bem-vindo de volta, Sensei.\nNão gostaria de fazer uma caminhada\ncomigo antes do trabalho?"
10074-110 = "Até eu mesma sinto que\nfiquei um pouco mais\natrevida do que antes."
10074-120 = "Especialmente\nquando estou com você, Sensei."
10074-130 = "Se houver algo que eu possa fazer,\npor favor, não hesite\nem me pedir."
10074-140 = "Ah, não toque aí... \nFufufu♡"
10074-150 = "Fufu, me desculpe.\nEu não tinha a intenção de\ndeixar você sem jeito."
10074-160 = "Sim? Minhas roupas?\nEu acho que já estou\nvestida de forma bem recatada."
10074-170 = "Se não me engano, hoje\né o seu aniversário, Sensei, não é?"
10074-180 = "O presente que eu preparei para você é...\nUfufu♡"
10074-190 = "Meu aniversário...\nAh, é verdade."
10074-200 = "Um presente...?"
10074-210 = "Eu já recebo presentes\ntodos os dias, sabia?"
10074-220 = "Feliz Ano Novo,\nSensei."
10074-230 = "Espero apenas que estes dias de paz\ncontinuem por mais um ano."
10074-240 = "Natal..."
10074-250 = "Se eu saísse por aí vestida assim,\nacho que veria a cara de surpresa\nde todo mundo♡"
10074-260 = "Hoje é Halloween.\nVou sugerir casualmente\nque todos se vistam assim."
10074-280 = "Você encontrou este lugar facilmente.\nOu foi apenas uma coincidência?"
10074-290 = "Sendo você, Sensei...\nCom certeza deve ter sido\npor acaso, não é?"
10074-300 = "Fufu... não fique\ntão nervoso.\nEu estou vestida adequadamente."
10074-310 = "Eu só queria\nsentir a temperatura da água."
10074-320 = "Sensei, você também...\nNão gostaria de vir aqui?"
10074-330 = "Este lugar...\né o oposto completo\nda fonte de Trinity."
10074-340 = "Sem ninguém por perto,\num estado natural..."
10074-350 = "Sim. É um estado autêntico,\nsem nenhum tipo de adorno."
10074-360 = "Por isso, eu queria\nque você sentisse isso\ncomigo."
10074-370 = "...Se você estiver de acordo, Sensei."
10074-2600 = "A vida nos reserva muitas coisas, mas... a pessoa que sou hoje é alguém que a minha versão do passado jamais teria imaginado. Tudo graças a você, Sensei. Muito obrigada."
