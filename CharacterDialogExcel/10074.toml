[translation]
10074-10 = "ブルーアーカイブ～！"
10074-20 = "冷たい水を浴びると、気持ちまでスッキリしますよ♡\n先生も……水遊び……いかがですか？"
10074-30 = "あら、\nあの人は……。"
10074-40 = "こんなに\n可愛らしい空間が\nあったなんて……。"
10074-50 = "ここで水遊びをしたら、\n怒られてしまいますね。"
10074-60 = "ふふ、\n熱い視線を\n感じます♡"
10074-70 = "もっと\n近くに行っても、\nいいですか？"
10074-80 = "お待ちしておりましたよ、\n先生。"
10074-90 = "もちろん、\nずーっとこの格好で♡"
10074-100 = "おかえりなさい、先生。\n私と一緒に、仕事前の\nお散歩に行きませんか？"
10074-110 = "自分でも、前より少し\n意地悪になった\n気がします。"
10074-120 = "先生が相手のときは、\n特に。"
10074-130 = "私にできることがありましたら、\nなんでもおっしゃって\nくださいね。"
10074-140 = "ああ、そこを触っちゃ……\nふふふ♡"
10074-150 = "ふふ、ごめんなさい。\n先生を困らせるつもりは\nなかったんです。"
10074-160 = "はい？服、ですか？\nこれでも十分厚着だと\n思うのですが。"
10074-170 = "たしか、今日は\n先生の誕生日でしたよね？"
10074-180 = "私からのプレゼントは……\nうふふ♡"
10074-190 = "私の誕生日……\nああ、そうでした。"
10074-200 = "プレゼント……？"
10074-210 = "普段から、\nいただいていますよ？"
10074-220 = "あけまして\nおめでとうございます、先生。"
10074-230 = "今年もこの穏やかな日々が\n続くことを、願うばかりです。"
10074-240 = "クリスマス……。"
10074-250 = "この格好で外に出たら、\n皆さんの驚いた顔が\n見れそうですね♡"
10074-260 = "今日はハロウィーンです。\nさりげなく、皆さんに\nこの格好を勧めてみますね。"
10074-280 = "よくここを見つけましたね。\nそれとも、偶然ですか？"
10074-290 = "先生のことですから……\nきっとたまたま、\nなんでしょうね。"
10074-300 = "ふふ……そんなに\n慌てないでください。\n服はちゃんと着てますから。"
10074-310 = "水の温度を、\n感じたかったんです。"
10074-320 = "先生も……\nこちらへどうぞ？"
10074-330 = "ここは……\nトリニティの噴水とは\n真逆の姿をしています。"
10074-340 = "人影のない、\n自然な姿……。"
10074-350 = "ええ。何も着飾ってない、\nありのままの姿なんです。"
10074-360 = "だから、\nそれを一緒に\n感じてほしくて。"
10074-370 = "……先生さえ、\nよろしければ。"
10074-2600 = "生きていると色々なことがありますが……\n今の私は、以前の私では\n想像もつかなかったでしょう。\n先生のおかげです。\nありがとうございます。"
