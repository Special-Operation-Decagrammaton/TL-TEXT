[translation]
20022-10 = "Blue Archive."
20022-20 = "Sensei, você já comeu o soba da virada? Espero que possamos ter um ano tranquilo juntos."
20022-30 = "É importante medir os ingredientes com precisão ao cozinhar."
20022-40 = "Este quimono... é lindo."
20022-50 = "Qual foi o meu primeiro sonho do ano mesmo?"
20022-60 = "Espero que este ano seja repleto de dias tranquilos..."
20022-70 = "Ufa, será que posso descansar um pouco aqui...?"
20022-80 = "Ah, Sensei! Bem-vindo de volta."
20022-90 = "Está com fome? Quer que eu prepare algo?"
20022-100 = "Bem-vindo de volta! Vou esquentar sua comida agora mesmo."
20022-110 = "Preparei tudo com muito carinho hoje também."
20022-120 = "E-então... o que achou do meu quimono?"
20022-130 = "Ficaria muito feliz se você tivesse gostado..."
20022-140 = "Fiquei nervosa em mostrar o quimono para você, Sensei, mas..."
20022-150 = "Valer a pena todo o esforço."
20022-160 = "Você sabia? O seu esforço, Sensei, serve de inspiração para todos os alunos."
20022-170 = "Claro que... para mim também, hehe."
20022-180 = "O osechi é um prato que dá muito trabalho, mas..."
20022-190 = "É justamente por isso que vale a pena preparar."
20022-200 = "Estar aqui com você, Sensei, me deixa um pouco mais relaxada."
20022-210 = "Já está na hora de eu ir..."
20022-220 = "Hã? Quer que eu fique mais um pouco?"
20022-230 = "É o seu aniversário, Sensei! Parabéns."
20022-240 = "Fico muito feliz em poder comemorar com você!"
20022-250 = "O que você gostaria de comer hoje?"
20022-260 = "Uau... você se lembrou do meu aniversário."
20022-270 = "Muito obrigada...!"
20022-280 = "Só de ouvir suas palavras, meu coração já se enche de alegria."
20022-290 = "Feliz Ano Novo, Sensei."
20022-300 = "Como é Ano Novo, resolvi vestir um quimono."
20022-310 = "Também preparei osechi. Gostaria de comer comigo?"
20022-320 = "Já é Natal... o ano está chegando ao fim, não é?"
20022-330 = "Estou pensando em preparar uma pequena festa, o que acha, Sensei?"
20022-340 = "A época do Halloween é tão animada e divertida."
20022-350 = "Seria bom se pudéssemos comer a abóbora decorativa depois também..."
20022-370 = "Eu estou... muito feliz."
20022-380 = "Muito obrigada por tudo, Sensei."
20022-390 = "Eu só recebo coisas de você, Sensei."
20022-400 = "Quem sempre come minha comida com mais gosto... é sempre você, Sensei..."
20022-410 = "Isso... para mim, é o melhor presente de todos."
20022-420 = "Por isso, então... Sensei."
20022-430 = "Pode continuar contando comigo, está bem?"
20022-2600 = "É estranho... quando você está por perto, Sensei, sinto que posso fazer qualquer coisa. Vou me esforçar este ano também, então, por favor, continue olhando por mim."
