[translation]
20022-10 = "ブルーアーカイブ。"
20022-20 = "先生、年越しそばは食べましたか？\n今年はお互い、穏やかな一年を\n過ごせますように。"
20022-30 = "料理はしっかり\n計量するのが\n大切なんですよ。"
20022-40 = "この着物……きれい。"
20022-50 = "今年の初夢……\nなんだったっけ？"
20022-60 = "どうか今年は、穏やかな\n日々が続きますように\n……。"
20022-70 = "ふぅ、ここなら少し\n休めるかな……？"
20022-80 = "あ、先生！\nおかえりなさい。"
20022-90 = "お腹は空いていませんか？\n何かお作りしましょうか？"
20022-100 = "おかえりなさい！\nすぐにお食事を温めますね。"
20022-110 = "今日も\n愛情を込めてご用意しました。"
20022-120 = "そ、その……着物、\nどう、でしょうか？"
20022-130 = "気に入っていただけたら、\n嬉しいのですが……。"
20022-140 = "先生に着物姿を見て\nもらうのは緊張しましたけど、"
20022-150 = "頑張って良かったです。"
20022-160 = "知っていましたか？\n先生の頑張る姿は生徒たちの\n励みになっているんです。"
20022-170 = "もちろん……\n私にとってもです、えへへっ。"
20022-180 = "おせちは\n手間のかかる料理ですが、"
20022-190 = "そういうものこそ作り\n甲斐があるんです。"
20022-200 = "こうして先生と一緒にいると、\nなんだか気が緩んでしまいます。"
20022-210 = "そろそろ行かないと……"
20022-220 = "えっ？\nもう少し一緒に、ですか？"
20022-230 = "先生のお誕生日ですね！\nおめでとうございます。"
20022-240 = "私もお祝いできて\nうれしいです！"
20022-250 = "今日は\nどんな料理がいいですか？"
20022-260 = "わあ……私の誕生日、\n覚えていてくださったんですね。"
20022-270 = "ありがとうございます……！"
20022-280 = "先生からのお言葉だけで、\n胸がいっぱいです。"
20022-290 = "あけまして\nおめでとうございます、先生。"
20022-300 = "せっかくのお正月なので、\n着物に袖を通してみました。"
20022-310 = "おせちも用意してありますよ。\n一緒にいかがですか？"
20022-320 = "もうクリスマス……\n今年も終わりが\n近づいてきましたね。"
20022-330 = "ささやかなパーティーの準備を\nしようと思うのですが、\n先生もいかがですか？"
20022-340 = "ハロウィーンの季節は活気が\nあって楽しいですね。"
20022-350 = "飾り用の\nジャック・オー・ランタンも、\n後で食べられたら良いのですが\n……。"
20022-370 = "本当に……嬉しいです。"
20022-380 = "いつも\nありがとうございます、先生。"
20022-390 = "先生からは、色々と\nいただいてばかりですね。"
20022-400 = "私の料理を、誰よりも\nおいしく食べてくださるのは……\nいつも先生で……。"
20022-410 = "それが……私にとって、\n一番のプレゼントなんです。"
20022-420 = "なので、その……先生。"
20022-430 = "これからも、お願いしますね？"
20022-2600 = "不思議です……先生がそばにいると、\nなんでもできそうな気持ちになるんです。\n今年も頑張りますから、どうか、\n見守っていてくださいね。"
