[translation]
20049-10 = "Blue Archive."
20049-20 = "Está quente e pegajoso... E então, o que vamos fazer?"
20049-30 = "Que tédio..."
20049-40 = "(Ei... o que é isso?)"
20049-50 = "Então é assim que as outras pessoas costumam passar o tempo..."
20049-60 = "Eu já disse que não tenho interesse. ...Sério mesmo."
20049-70 = "(Professor... o que será que ele está fazendo?)"
20049-80 = "Atrasado de novo? Haa... eu também acabei de chegar, mas enfim."
20049-90 = "...Não é como se eu estivesse te esperando. É que... bom trabalho."
20049-100 = "Interesse no mar...? Não tenho."
20049-110 = "...Tinha muita água, né. Pena que não dava para beber."
20049-120 = "Lembranças do mar...? Não precisa se preocupar com isso."
20049-130 = "\"Foi divertido, vamos de novo\"...?"
20049-140 = "Você diz essas coisas tão levianamente..."
20049-150 = "...Então, quando vamos?"
20049-160 = "...Eu acho que tudo isso é inútil. O mar, o traje de banho, tudo."
20049-170 = "...Para você, Professor, nada disso é inútil?"
20049-180 = "Eu já disse para parar de falar essas coisas estranhas...!"
20049-190 = "...Se ficarmos aqui, podemos beber água limpa o quanto quisermos, né."
20049-200 = "Não, não é nada..."
20049-210 = "Será que todos se divertiram no mar? Eu...? "
20049-220 = "Não me diverti. Nem um pouco."
20049-230 = "É que... não tem nenhum significado profundo, mas... tem algo que você queira?"
20049-240 = "E-eu só estava perguntando!"
20049-250 = "Vida e morte não têm sentido. Por isso, não há necessidade de celebrar."
20049-260 = "Mesmo que você comemore por mim, Professor, não vai mudar nada..."
20049-270 = "..."
20049-280 = "...Obrigada."
20049-290 = "Um novo ano começou. Se fosse a minha eu de antigamente, talvez dissesse que estou um passo mais perto da morte..."
20049-300 = "Quer saber como me sinto agora?"
20049-310 = "Por que... você pergunta essas coisas?"
20049-320 = "Ainda não me acostumei com esse tipo de clima... mas todos parecem felizes."
20049-330 = "Negociar doces ou travessuras... qual é o sentido disso?"
20049-340 = "Isso é uma bala...? Eu nem fiz nenhuma travessura."
20049-350 = "Ué... hoje não era um dia para isso?"
20049-370 = "Hmm..."
20049-380 = "Mais um pouco... aqui também..."
20049-390 = "Colocar o galho aqui... neste ângulo..."
20049-400 = "...Pronto, acho que assim está bom."
20049-410 = "...Ué?"
20049-420 = "Por que eu estou fazendo um castelo de areia...?"
20049-430 = "...! Professor...!"
20049-440 = "Você planejou me fazer fazer isso desde o começo, não foi...!"
20049-450 = "...Eu não estou me divertindo nem um pouco, ouviu?!"
20049-2600 = "Será que isso é útil aqui...? \"Tudo depende de como se usa a arma\"? Haa... você é muito bom com as palavras, não é? Entendi... obrigada."
