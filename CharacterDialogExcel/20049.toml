[translation]
20049-10 = "ブルー、アーカイブ。"
20049-20 = "暑いし、ベタベタする……。\nで、何するの？"
20049-30 = "退屈……。"
20049-40 = "（あれ……何？）"
20049-50 = "他の人は普段\nこう過ごしてるんだ……。"
20049-60 = "だから、\n興味ないってば。\n……本当に。"
20049-70 = "（先生……\n何してるんだろ）"
20049-80 = "また遅刻？\nはぁ……私も、\n今来たとこだけど。"
20049-90 = "……待ってたわけじゃないから。\nその……お疲れ様。"
20049-100 = "海に興味……？\nないよ。"
20049-110 = "……水が、たくさんあったね。\n飲めなかったけど。"
20049-120 = "海の思い出……？\n別にいいでしょ、そんなこと。"
20049-130 = "「楽しかったから、\nまた行こう」……？"
20049-140 = "そういうこと\n軽々しく言って……。"
20049-150 = "……で、いつ行くの？"
20049-160 = "……全部無駄なものだと\n思ってるよ。\n海も、水着もね。"
20049-170 = "……先生には\n全部無駄じゃない？"
20049-180 = "だから、\n変なこと言わないでってば……！"
20049-190 = "……ここにいたら、綺麗な水を\n好きなだけ飲めるんだね。"
20049-200 = "ううん、なんでもないよ……。"
20049-210 = "みんな、海は楽しめたのかな。\n私……？"
20049-220 = "楽しくなかったよ。\nこれっぽっちも。"
20049-230 = "その……別に、\n深い意味はないんだけど……\n欲しいものって、ある？"
20049-240 = "き、聞いてみただけだから！"
20049-250 = "生も死も、無意味。\nだから、祝う必要もないよ。"
20049-260 = "先生が祝ってくれたとこで、\n何も……。"
20049-270 = "……。"
20049-280 = "……ありがと。"
20049-290 = "新しい年が始まったね。\n昔の私なら、また死に\n近づいたって\n言ってたのかな……。"
20049-300 = "今はどうなのか、って？"
20049-310 = "なんで……そんなこと聞くの？"
20049-320 = "こういう雰囲気、\nまだ慣れないけど……。\nみんな、楽しそうだね。"
20049-330 = "いたずらとお菓子の交渉……。\n何の意味があるの？"
20049-340 = "これ、飴……？\n私、別にいたずらしてないけど。"
20049-350 = "あれ……今日は\nそういう日じゃなかったっけ。"
20049-370 = "ん……。"
20049-380 = "もうちょっと……\nこっちも削って……。"
20049-390 = "ここに枝を……この角度で……。"
20049-400 = "……うん、これでいいかな。"
20049-410 = "……あれ？"
20049-420 = "なんで私、\n砂の城なんて作ってるの……？"
20049-430 = "……っ！先生……！"
20049-440 = "最初からこうさせる\nつもりだったんじゃ……！"
20049-450 = "……全然、\nこれっぽっちも、\n楽しんでないからね！"
20049-2600 = "こんなとこで使うかな……。\n「武器も使いよう」？\nはぁ……そういうとこ、口回るよね。\nわかった……ありがとう。"
