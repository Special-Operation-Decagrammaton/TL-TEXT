[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10097-10 = "Blue~~~ Archive!" 
10097-20 = "RABBIT 3, chegando no local~\nKuhihi... Já que estamos no mar,\neu posso usar e abusar dos explosivos sem problemas, né?" 
10097-30 = "Será que não tem nenhuma granada\ndando sopa por aí..." 
10097-40 = "Haa... Que cansaço..." 
10097-50 = "Tô sentindo o cheiro da ruína..." 
10097-60 = "Kuhihi.\nCom o que será que\nesse botão tá conectado..." 
10097-70 = "A parede corta-fogo desse café\né desnecessariamente dura, sabia..." 
10097-80 = "Bem-vindo, Sensei.\nQual praia nós vamos bombardear\ncom muito estilo hoje?" 
10097-90 = "Aah, eu já estava esperando você me pedir." 
10097-100 = "Plantei dezenas de bombas e deixei todas\npreparadas pra você dar a ordem de detonação." 
10097-110 = "O que foi? Cê nunca pediu algo assim...?" 
10097-120 = "Relaxa, relaxa, depois da primeira explosão\nvocê pega o gosto rapidinho.\nKuhihi..." 
10097-130 = "Esse traje de banho é meio pequeno\ne fica cavando na pele..." 
10097-140 = "Mas quer saber... o perigo dele escapar a qualquer segundo\nque é a parte boa...\nHaa, haa..." 
10097-150 = "Nadar? Mas é claro que eu sei nadar, ué?" 
10097-160 = "Apesar de ser uma operadora,\neu ainda sou uma soldada da SRT." 
10097-170 = "Sabe, quando eu encaro a imensidão desse oceano profundo\ntem vezes que eu sinto mais um terror puro\ndo que de fato um medo de afogar..." 
10097-180 = "Se eu caísse num buraco escuro e sem fundo,\nlá no abismo do oceano..." 
10097-190 = "Imagine o quão caótico e desesperador\nisso não seria...\nHaa, haa..." 
10097-200 = "Ugh, me deu uma fominha...\nSensei, não tem nenhum docinho aí com você?" 
10097-210 = "Será que eu comi... muito Kusaya...?\nEsse gosto horrível de peixe podre não quer sair da minha boca..." 
10097-220 = "Feliz Aniversário, Sensei." 
10097-230 = "O que acha de, em vez de soprar velinhas esse ano,\na gente não apaga o pavio aceso de uma banana de dinamite com um sopro?" 
10097-240 = "Eu te garanto que seria\numa memória super inesquecível. Kuhihi..." 
10097-250 = "O que eu quero ganhar de presente de aniversário?" 
10097-260 = "Hmm... Acho que um vale-presente pra ajuste de roupas seria bom." 
10097-270 = "Sempre que eu compro roupas com um tamanho que sirva no meu busto\nas proporções das mangas e do comprimento ficam totalmente zoadas, sabe.\nA blusa fica curta e as mangas sobram~" 
10097-280 = "Feliz Ano Novo, Sensei.\nEspero poder contar com toda a sua\najuda militar irada de novo este ano. Fufu..." 
10097-290 = "Sensei. Dá um pulinho no Parque dos Coelhinhos\nnesse Natal, se você tiver um tempinho." 
10097-300 = "Nós vamos fazer\numa puta festa de churrasco." 
10097-310 = "Vai ter um peru gigante com toda certeza, mas...\nTambém tô preparando o meu Kusaya especial\nsó pra festa." 
10097-320 = "Kuhihi... E, a propósito,\nisso tem que ser segredo das meninas do esquadrão, beleza?" 
10097-330 = "Tava achando estranho o tanto de gente fantasiada de fantasma...\nentão já é Halloween, né..." 
10097-340 = "......Hm? Se eu tenho medo\nde fantasmas, você pergunta?" 
10097-350 = "Claro que não, nunca na vida.\nEles já não são, literalmente, formas de existência arruinadas e mortas?" 
10097-370 = "Hmm... Não importa quanto eu olhe,\nsinto que falta muito poder de fogo nisso..." 
10097-380 = "Mas, se tá saindo fumaça, tudo bem." 
10097-390 = "Sabe... sentir esse cheiro,\ntraz umas memórias à tona." 
10097-400 = "Na época que eu ainda frequentava a SRT...\nNão, talvez seja de uma época mais distante que essa?" 
10097-410 = "Quando eu sinto o cheiro desse negócio,\nlembro dos meus verões de quando era criança." 
10097-420 = "Que bizarro, sério mesmo." 
10097-430 = "Isso aqui é o cheiro do veneno e da ruína\nque massacra os insetos, mas" 
10097-440 = "Pode trazer nostalgia e conforto\ndependendo da pessoa..." 
10097-450 = "Acho que as pessoas, no fundo,\namam o cheiro da ruína e do apocalipse, não é?\nKuhihi..." 
10097-460 = "Sensei.\nChega um pouquinho mais pra cá." 
10097-470 = "Se uns insetos ou sanguessugas vierem em cima de você\nvai ser o maior saco..." 
10097-480 = "Vamos ficar bem inundados\nnessa fumaça de ruína por hoje à noite, belê?" 
10097-2600 = "Pistola RABBIT Tipo-224, recebida com sucesso.\nFalando nisso, se eu nem vou entrar na água,\npor que preciso fazer a impermeabilização?\nQue saco..." 