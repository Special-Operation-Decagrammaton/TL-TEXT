[translation]
10097-10 = "Blue~~~ Archive!"
10097-20 = "RABBIT3, chegando ao local~\nKuhihi... Já que estamos no meio do mar,\nnão tem problema se eu usar o quanto\nde bombas eu quiser, né?"
10097-30 = "Será que não tem nenhuma\ngranada de mão caída por aqui..."
10097-40 = "Haa... Que cansaço..."
10097-50 = "Sinto um cheiro de ruína no ar..."
10097-60 = "Kuhihi.\nEu me pergunto em que será que\nesse botão aqui está conectado..."
10097-70 = "As paredes corta-fogo deste Café\nsão resistentes até demais, sabia..."
10097-80 = "Bem-vindo, Sensei.\nQual praia nós vamos\nbombardear hoje?"
10097-90 = "Ah, eu estava esperando\nas instruções do Sensei."
10097-100 = "Eu já instalei um monte\nde bombas para podermos\ndetonar a qualquer momento."
10097-110 = "Você disse que nunca me\ndeu esse tipo de instrução...?"
10097-120 = "Calma, calma, não tem\nproblema, não acha?\nKuhihi..."
10097-130 = "Esse maiô é um pouco pequeno, então ele\nfica apertando e entrando na minha pele..."
10097-140 = "Mas é exatamente isso que\no torna tão bom...\nHaa, haa..."
10097-150 = "Nadar? Mas é claro que eu sei nadar."
10097-160 = "Mesmo sendo uma operadora de comunicações,\neu ainda sou membro da SRT."
10097-170 = "Quando eu fico olhando para\nesse mar azul, às vezes eu sinto terror\nao invés de fascínio."
10097-180 = "Se eu caísse naquele\nabismo sem fundo..."
10097-190 = "Quão ruinosa será que\nseria essa sensação...\nHaa, haa..."
10097-200 = "Uuh, que fome... Sensei,\npor acaso você não tem\nnada doce aí?"
10097-210 = "Kusaya... acho que comi demais...\nO cheiro de peixe não\nquer sair da minha boca..."
10097-220 = "Feliz aniversário, Sensei."
10097-230 = "Este ano, em vez de soprar velinhas,\no que você acha de soprar o\npavio de uma bomba?"
10097-240 = "Com certeza vai se tornar\numa lembrança inesquecível.\nKuhihi..."
10097-250 = "O que eu quero de\npresente de aniversário?"
10097-260 = "Uhm... acho que um\nvale de ajustes de costura."
10097-270 = "É que quando eu compro roupas para caberem\nno tamanho do meu busto, o resto sempre\nfica com o tamanho esquisito.\nO comprimento fica curto, mas as mangas sobram~"
10097-280 = "Feliz Ano Novo, Sensei.\nEstou contando com bastante apoio logístico\nseu este ano também. Fufu..."
10097-290 = "Sensei. No Natal, se você tiver um tempinho,\ndá uma passada lá no Parque dos Coelhinhos."
10097-300 = "Nós estamos planejando fazer\numa festa de churrasco."
10097-310 = "Vai ter um peru gigante, é claro...\nmas eu também estou preparando\num kusaya especial."
10097-320 = "Kuhihi... Ah, mas é claro que isso é um\nsegredo só nosso, não conte pro resto do esquadrão."
10097-330 = "Eu tava achando que tinha muita gente\nvestida de fantasma, então já é Halloween..."
10097-340 = "……Hm? Se eu não tenho\nmedo de fantasmas?"
10097-350 = "De jeito nenhum, magina.\nEles são existências que já entraram\nem ruína há muito tempo, não são?"
10097-370 = "Uhm. Não importa quantas vezes eu olhe,\no poder de fogo disso me parece muito fraco..."
10097-380 = "Bom, tá saindo fumaça,\nentão acho que serve."
10097-390 = "Sabe...\nfazia muito tempo que eu\nnão sentia esse cheiro."
10097-400 = "Na época em que eu ainda estava na SRT...\nnão, talvez muito antes disso?"
10097-410 = "Ficar sentindo esse cheirinho\nme faz lembrar dos verões do passado."
10097-420 = "É bem misterioso, na verdade."
10097-430 = "Mesmo sendo um aroma de ruína\nque é letal para os insetos,"
10097-440 = "Algumas pessoas sentem uma\ncerta nostalgia ao sentir ele..."
10097-450 = "Talvez os humanos gostem de ruína\nmuito mais do que imaginam.\nKuhihi..."
10097-460 = "Sensei.\nVocê pode chegar um\npouquinho mais perto?"
10097-470 = "Seria um problemão se algum inseto\nruim chegasse perto de você, então..."
10097-480 = "Vamos tomar um bom banho\ndessa fumaça juntos esta noite."
10097-2600 = "Pistola RABBIT-224, recebida.\nMas vem cá, eu nem vou entrar na água,\npor que eu sou obrigada a impermeabilizar o equipamento?\nQue saco..."