[translation]
10097-10 = "ブル～～～アーカイブ！"
10097-20 = "RABBIT3、現場に到着～\nくひひ……海の上なら、\n思いっきり爆弾を使っても問題ないよね？"
10097-30 = "どこかに手榴弾\n落ちてないかな……"
10097-40 = "はぁ……疲れた……"
10097-50 = "破滅の匂いが……"
10097-60 = "くひひ。\nこのボタン、何と\n繋がってるんだろう…"
10097-70 = "カフェの防火壁、\n無駄に硬いんだよね……"
10097-80 = "いらっしゃい、先生。\n今日はどのビーチを\n爆撃しに行く？"
10097-90 = "あ、先生の指示を待ってたんだ。"
10097-100 = "いつでも起爆できるよう、\nたくさん爆弾を\n設置しておいたよ。"
10097-110 = "そんな指示したことないって…？"
10097-120 = "まぁまぁ、別にいいじゃん。\nくひひ…"
10097-130 = "この水着、ちょっと小さくて肌に\n食い込んじゃうんだよね……"
10097-140 = "でも、それがいいんだ……\nはぁ、はぁ……"
10097-150 = "水泳？もちろんできるよ？"
10097-160 = "オペレーターとはいえ、\nSRTの一員だからね。"
10097-170 = "紺碧の海を眺めてると\n驚異以上に恐怖を\n感じる時があるんだよね。"
10097-180 = "底の見えない、\nあの深淵に落ちちゃったら……"
10097-190 = "どれだけ破滅的な\n気分になるんだろうってね……\nはぁ、はぁ……"
10097-200 = "うぅ、お腹すいた……先生、\n何か甘いもの持ってない？"
10097-210 = "くさや……食べ過ぎたのかな……\n口の中の生臭さが消えないよ……"
10097-220 = "お誕生日おめでとう、先生。"
10097-230 = "今年はろうそくじゃなくて\n爆弾の導火線を吹き\n消してみるのはどう？"
10097-240 = "きっと忘れられない\n思い出になるよ。くひひ……"
10097-250 = "誕生日プレゼントに欲しいもの？"
10097-260 = "うーん……服のお直し券かなぁ。"
10097-270 = "服をバストサイズに合わせて\n買うといつもサイズが微妙に\n合わないんだよね。\n丈短いのに袖余っちゃってさ～"
10097-280 = "明けましておめでとう、先生。\n今年もたくさんの支援、\n期待してるからね。ふふ……"
10097-290 = "先生。クリスマス、時間あったら\n子ウサギ公園に寄って。"
10097-300 = "バーベキューパーティー\nをする予定なんだ。"
10097-310 = "大きな七面鳥はもちろん……\n特製のくさやも\n用意してるからね。"
10097-320 = "くひひ… あ、もちろん\n小隊の皆には内緒だよ。"
10097-330 = "お化けの仮装が多いと思ったら、\nもうハロウィンか……"
10097-340 = "……ん？お化けは\n怖くないのかって？"
10097-350 = "まさか、全然。\nすでに破滅してしまった\n存在でしょ？"
10097-370 = "うーん。何回見ても\n火力弱く感じるなぁ……"
10097-380 = "ま、煙が出てるからいっか。"
10097-390 = "なんか……この匂いを\n嗅ぐのも、久しぶりだなぁ。"
10097-400 = "SRTに居たころ……いや、\nそれよりずっと前かも？"
10097-410 = "これを嗅いでいると、\n昔の夏を思い出すんだ。"
10097-420 = "ほんと、不思議。"
10097-430 = "これは虫にとって有害な\n破滅の香りなのに、"
10097-440 = "人によっては懐かしく\n感じるなんて……"
10097-450 = "人って、案外破滅が\n好きなのかも。\nくひひ……"
10097-460 = "先生。\nもうちょっとこっちに寄れる？"
10097-470 = "先生に悪い虫が寄ってきたら\n大変だし……"
10097-480 = "今晩はこれをたっぷり\n浴びてこうね。"
10097-2600 = "RABBIT-224式拳銃、受領したよ。\nていうか、私は水に入らないのに、\n防水対策しなきゃダメなの？\nめんど……"
