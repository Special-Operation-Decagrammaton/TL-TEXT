[translation]
10097-10 = "Blue Archive!"
10097-20 = "RABBIT3, chegando ao local~\nHehehe... se estamos no mar,\nnão tem problema usar bombas à vontade, né?"
10097-30 = "Será que não tem nenhuma granada\ncaída por aí..."
10097-40 = "Ah... que cansaço..."
10097-50 = "O cheiro da ruína..."
10097-60 = "Hehehe.\nCom o que será que\neste botão está conectado..."
10097-70 = "O firewall do café\né desnecessariamente resistente..."
10097-80 = "Bem-vindo, Sensei.\nQual praia vamos bombardear\nhoje?"
10097-90 = "Ah, eu estava esperando pelas suas instruções, Sensei."
10097-100 = "Instalei várias bombas para que possamos\ndetonar a qualquer momento."
10097-110 = "Você disse que nunca deu essa ordem...?"
10097-120 = "Ora, ora, não tem problema.\nHehehe..."
10097-130 = "Este traje de banho é um pouco pequeno e\nacaba entrando na pele..."
10097-140 = "Mas é isso que é bom...\nAh, ah..."
10097-150 = "Nadar? Claro que eu consigo."
10097-160 = "Apesar de ser uma operadora,\nainda sou um membro da SRT."
10097-170 = "Às vezes, olhar para o mar azul\nme dá mais medo do que\nqualquer ameaça."
10097-180 = "Se eu caísse naquele abismo\nsem fim..."
10097-190 = "Imagino o quão catastrófico\neu me sentiria...\nAh, ah..."
10097-200 = "Ugh, estou com fome... Sensei,\nvocê tem algo doce aí?"
10097-210 = "Será que comi kusaya demais...\nO gosto de peixe na minha boca\nnão desaparece..."
10097-220 = "Feliz aniversário, Sensei."
10097-230 = "Que tal apagar o pavio de uma bomba\nem vez de velas\neste ano?"
10097-240 = "Com certeza será uma lembrança\ninequecível. Hehehe..."
10097-250 = "O que eu quero de presente de aniversário?"
10097-260 = "Hmm... talvez um vale-ajuste de roupas."
10097-270 = "Quando compro roupas baseadas no tamanho do busto,\no caimento nunca fica perfeito.\nO comprimento fica curto e as mangas sobram~"
10097-280 = "Feliz Ano Novo, Sensei.\nEspero contar com seu apoio\neste ano também. Fufu..."
10097-290 = "Sensei. Se tiver tempo no Natal,\npasse no Parque dos Coelhinhos."
10097-300 = "Estamos planejando fazer\num churrasco."
10097-310 = "Além de um peru enorme...\ntambém preparei um\nkusaya especial."
10097-320 = "Hehehe... ah, claro,\né segredo para o resto do esquadrão."
10097-330 = "Tantas fantasias de fantasma... então\njá é Halloween..."
10097-340 = "...Hm? Se eu tenho\nmedo de fantasmas?"
10097-350 = "De jeito nenhum.\nEles já são seres que\nforam arruinados, não é?"
10097-370 = "Hmm. Não importa quantas vezes eu veja,\na potência de fogo parece fraca..."
10097-380 = "Bem, já que está saindo fumaça, tudo bem."
10097-390 = "Sabe... faz tempo que não\nsinto esse cheiro."
10097-400 = "Desde a época em que estava na SRT... não,\ntalvez muito antes disso?"
10097-410 = "Sentir esse cheiro me faz\nlembrar do verão de antigamente."
10097-420 = "É realmente estranho."
10097-430 = "Embora este seja um aroma de ruína\nprejudicial para os insetos,"
10097-440 = "é curioso como algumas pessoas\no acham nostálgico..."
10097-450 = "Talvez as pessoas, no fundo,\ngostem da ruína.\nHehehe..."
10097-460 = "Sensei.\nPode chegar um pouco mais perto?"
10097-470 = "Seria um problema se algum\ninseto indesejado se aproximasse de você..."
10097-480 = "Vamos nos banhar nisso\nesta noite."
10097-2600 = "Pistola RABBIT-224 recebida. Dito isso, eu nem vou entrar na água, por que preciso de proteção à prova d'água? Que chato..."
