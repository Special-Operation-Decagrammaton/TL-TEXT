[translation]
26011-10 = "Blue Archive!"
26011-20 = "Olá, Sensei!\nSou a Ruiko Saten, do 1º ano da Escola Secundária Sakugawa! É um prazer conhecê-lo!"
26011-30 = "Ué, aquela pessoa é..."
26011-40 = "Uau!! Esse lugar é\nincrível, não é!"
26011-50 = "À primeira vista parece normal, mas\nquando você olha com atenção,\né um pouco diferente...\nHum! Que divertido!"
26011-60 = "Então este é o famoso...\nCafé de outro mundo..."
26011-70 = "É um lugar bem\naconchegante,\nhehe."
26011-80 = "Sensei!\nEstava esperando por você!\nO que vamos fazer hoje?"
26011-90 = "Bem-vindo de volta, Sensei.\nHá algo que eu possa\nfazer por você?"
26011-100 = "Este lugar parece\ncom o nosso mundo,\nmas ao mesmo tempo é totalmente diferente...\nÉ fascinante."
26011-110 = "Hã? Vai sair para caminhar agora?\n...Eu também quero ir!\nMe leve com você,\nSensei!"
26011-120 = "Tudo aqui é\ntão interessante,\nneste lugar!"
26011-130 = "Foi uma coincidência, mas...\nfoi muito bom ter vindo para cá!"
26011-140 = "E você, Sensei?\nDesde que chegamos...\nsua rotina ficou um pouco\nmais divertida?"
26011-150 = "Feliz aniversário!\nParabéns pelo seu dia,\nSensei!"
26011-160 = "Tem alguma coisa que\nvocê queira ganhar?"
26011-170 = "Feliz Ano Novo!\nSensei! O tempo passa\nvoando, não é mesmo..."
26011-180 = "Conto com você este ano também,\nSensei!"
26011-190 = "Então aqui também\ntem Natal!?"
26011-200 = "Sendo assim, será que\na gente consegue ver\no Papai Noel voando por aí!?"
26011-210 = "Halloween...!\nSensei! Vamos colocar\nalguma fantasia também!"
26011-230 = "Hum~, não parece ter\nnada de estranho por aqui."
26011-240 = "...Sensei,\npor que essa cara de preocupado?\nÉ só uma máquina\nde arremesso de beisebol."
26011-250 = "Sim. Mas,\nprovavelmente vai dar tudo certo."
26011-260 = "Eu tenho uma certa\nconfiança no meu taco."
26011-270 = "...Por que\nesse olhar de desconfiança?"
26011-280 = "Quer fazer uma aposta?"
26011-290 = "Se eu não rebater em 3 bolas,\neu saio do bastidor sem reclamar."
26011-300 = "Em troca, se eu conseguir\nrebater pelo menos uma,\nvocê me paga uma bebida\nnaquela máquina ali!"
26011-310 = "O que acha?\nPara você,\nnão é um mau negócio, né?"
26011-320 = "...Hehe."
26011-2600 = "Ah... isso é para mim...? É uma\nsensação estranha... Obrigada. B-bem,\nfarei o meu melhor! ...Sinto muito por não\nconseguir dizer nada além disso. Haha..."
