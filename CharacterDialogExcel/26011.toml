[translation]
26011-10 = "ブルーアーカイブ！"
26011-20 = "こんにちは、先生！\n柵川中学1年、佐天涙子です！よろしくお願いします！"
26011-30 = "あれ、あの人は……"
26011-40 = "おお！！なんかここ、\nすごいですね！"
26011-50 = "一見普通っぽいんですけど、\nよくよく見ると\nちょっと変わってる……\nうーん！楽しい！"
26011-60 = "ここが噂に聞く……\n異世界のカフェ……"
26011-70 = "なんだか落ち\n着きますね、\nへへっ。"
26011-80 = "先生！\nお待ちしてました！\n今日は何をするんですか？"
26011-90 = "おかえりなさい、先生。\n私にできること、\n何かありますか？"
26011-100 = "ここって、\n私たちの世界に\n似ているようで全然違って……\n面白いんですよね。"
26011-110 = "え？今から散歩？\n……私も行きたいです！\n連れていってください、\n先生！"
26011-120 = "何から何まで、\n面白い世界ですね、\nここ！"
26011-130 = "偶然ではありましたけど……\nここに来てよかったです！"
26011-140 = "先生はどうですか？\n私たちが来てから……\n毎日がちょっとは\n楽しくなりました？"
26011-150 = "ハッピーバースデー！\nお誕生日おめでとうございます、\n先生！"
26011-160 = "何か欲しいもの、\nありますか？"
26011-170 = "あけまして\nおめでとうございます！先生！\n時間が経つのって、\n本当あっという間ですね……。"
26011-180 = "今年もよろしくお願いします、\n先生！"
26011-190 = "ここにもクリスマスが\nあるんですか！？"
26011-200 = "じゃあじゃあ、\nサンタさんが飛んでるところ、\n見れますかね！？"
26011-210 = "ハロウィーン……！\n先生！私たちも\n何か被りに行きましょう！"
26011-230 = "ん～、特に変わったところは……\nなさそうかな。"
26011-240 = "……先生、\n顔がこわばってません？\nただのバッティング\nマシーンですって。"
26011-250 = "はい。でも、\nたぶん大丈夫です。"
26011-260 = "バッティングには、\nそれなりに自信がありますから。"
26011-270 = "……なんですか、\nその疑いの眼差しは。"
26011-280 = "じゃあ、賭けでもします？"
26011-290 = "3球以内に打てなかったら、\n大人しく打席を離れます。"
26011-300 = "その代わり、\nもし1球でも打てたら、\nそこの自販機で\n飲み物を奢ってください！"
26011-310 = "どうですか？\n先生にとっても、\n悪い話じゃないですよね？"
26011-320 = "……へへっ。"
26011-2600 = "えっ……これを、私に……？へ、変な\n感じですね……ありがとうございます。と、\nとりあえず、頑張りますね！……それしか\n言えなくて、すみません。ははっ……。"
