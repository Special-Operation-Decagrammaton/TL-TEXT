10043-820 = "もちろん\n焚火のせいもありますが…。"
10043-830 = "あなた様の声、\nその言葉一つ一つが…。"
10043-840 = "今はこの私のためだけに、\n紡がれているのだと思うと…"
10043-850 = "…まだ私は、色々と\n至らぬ身ではあります。"
10043-860 = "あなた様のそばに\nいることで、\nたくさん迷惑をかけ"
10043-870 = "また、間違いを\n犯してしまうかも\nしれません。"
10043-880 = "それでも、\n私はこうしてあなた様の…"
10043-890 = "先生のおそばにいても、\nよろしいでしょうか…？"
10043-900 = "ありがとうございます…"
10043-910 = "そんなあなた様だから、\n私は…"
10043-2600 = "私のために、こちらを…？\nこのワカモ、あらためて誓います…\nあなた様と私を遮るものは、\nこの力で全て屠って見せると。\nふふっ、うふふふっ…♥"
