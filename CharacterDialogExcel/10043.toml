[translation]
10043-10 = "Ufufu, Blue Archive~"
10043-20 = "Mesmo sob o sol escaldante ou dentro da água fria... eu seguirei você para onde quer que vá. Por isso, neste verão, não se afaste de mim, está bem? Meu... que... ri... do♥"
10043-30 = "Aqui está refrescante, ufufu...♥"
10043-40 = "Eu mal posso esperar para mostrar este visual ao Sensei..."
10043-50 = "Ah... meu querido, onde exatamente você foi...?"
10043-60 = "Está um pouco barulhento, não acha...?"
10043-70 = "Sinto um olhar vindo de algum lugar... Seria, por acaso, o do Sensei...? Ufufu..."
10043-80 = "Ora, Sensei. Bem-vindo de volta."
10043-90 = "Eu, Wakamo, estive esperando por você ansiosamente, contando cada segundo♥"
10043-100 = "Bem-vindo de volta, Sensei. Estou pronta para tudo."
10043-110 = "Vamos, pode me pedir o que quiser."
10043-120 = "Fufu, ufufu..."
10043-130 = "Pode me pedir qualquer coisa, viu?"
10043-140 = "Sim, literalmente \"qualquer coisa\"... é o que quero dizer♥"
10043-150 = "O verão é a estação em que todos ficam mais desinibidos e com o coração agitado..."
10043-160 = "Sendo assim, não seria estranho se qualquer coisa acontecesse, não é?"
10043-170 = "Fufu..."
10043-180 = "Meu querido, eu poderia me aproximar ainda mais...? ...Ah, você disse que posso o quanto eu quiser?"
10043-190 = "Ah, sério...!?"
10043-200 = "Ah, bem, então, i-isso..."
10043-210 = "Ah, s-sim... c-com licença..."
10043-220 = "Já que estamos aqui, eu queria passear com o Sensei, mas..."
10043-230 = "Com esse calor, parece melhor esperar até o sol se pôr."
10043-240 = "O verão tem dias tão longos que chega a ser um problema."
10043-250 = "Quando será que poderei sair para passear com você..."
10043-260 = "Se eu não fico sufocada com a máscara no verão... você pergunta?"
10043-270 = "Fufu, não se preocupe. Esta máscara é feita sob medida, exclusiva para o verão♥"
10043-280 = "Claro, se você desejar... não me importaria de mostrar o que há por baixo dela..."
10043-290 = "...Ufufu, o que você vai fazer?"
10043-300 = "Foi porque hoje, o dia em que você nasceu, existe, que eu pude encontrar você."
10043-310 = "Pensando nisso, vejo o quão maravilhoso este dia realmente é..."
10043-320 = "Feliz aniversário, do fundo do meu coração. Meu querido."
10043-330 = "O meu... aniversário...?"
10043-340 = "Ah, eu sinto que vou desmaiar agora mesmo... Não é por causa do verão, é porque estou feliz demais..."
10043-350 = "Sensei, muito obrigada...♥"
10043-360 = "Ufufu, feliz ano novo, Sensei."
10043-370 = "Assim, mais um ano se passa ao seu lado, e nossas memórias continuam a se acumular."
10043-380 = "Feliz Natal, meu querido...♥"
10043-390 = "A sós, em um dia tão especial e com um traje especial..."
10043-400 = "Estou muito ansiosa pelo dia de hoje... ufufufu."
10043-410 = "Doces ou travessuras, Sensei."
10043-420 = "Ah? Uma máscara para o Halloween... você diz?"
10043-430 = "I-isso... bem, se você quer saber, eu tenho uma."
10043-440 = "Ora, Sensei. Bem-vindo de volta."
10043-450 = "Eu, Wakamo, estive esperando por você ansiosamente, contando cada segundo♥"
10043-460 = "Bem-vindo de volta, Sensei. Estou pronta para tudo."
10043-470 = "Vamos, pode me pedir o que quiser."
10043-480 = "Fufu, ufufu..."
10043-490 = "Pode me pedir qualquer coisa, viu?"
10043-500 = "Sim, literalmente \"qualquer coisa\"... é o que quero dizer♥"
10043-510 = "Falando em verão,\né a estação em que todos ficam mais desinibidos\ne com o coração agitado..."
10043-520 = "Sendo assim,\nnão seria estranho se qualquer coisa\nacontecesse, não é?"
10043-530 = "Fufu..."
10043-540 = "Senhor, eu poderia me aproximar\nainda mais de você...?\n...Eh, o quanto eu quiser?"
10043-550 = "Eh, sério...?"
10043-560 = "Ah, bem, então, isso..."
10043-570 = "Ah, s-sim...\nC-com licença..."
10043-580 = "Já que estamos aqui, eu queria\npassear com o Sensei, mas..."
10043-590 = "Com este calor, parece melhor\nesperar até o sol se pôr."
10043-600 = "O verão tem dias tão longos\nque chega a ser um problema."
10043-610 = "Quando será que poderei\nir passear com você,\nmeu senhor...?"
10043-620 = "Isso, se você ficar me encarando assim...\nEu..."
10043-630 = "Agora, honestamente, isso...\nÉ embaraçoso..."
10043-640 = "Já que é verão...\nSendo assim...\nEu tomei uma decisão."
10043-650 = "Esta Wakamo,\nmesmo que você veja tudo de mim,\ncontanto que seja para você...!"
10043-660 = "Foi porque o dia de hoje, em que o Sensei nasceu,\nexistiu, que eu pude\nencontrar você."
10043-670 = "Pensando nisso,\ncomo este dia de hoje\né maravilhoso..."
10043-680 = "Feliz aniversário,\ndo fundo do meu coração.\nMeu senhor."
10043-690 = "O meu... aniversário...?"
10043-700 = "Ah, eu sinto que vou\ndesmaiar a qualquer momento...\nNão é por causa do verão,\né porque estou feliz demais..."
10043-710 = "Sensei, muito obrigada...♥"
10043-720 = "Ufufu, um feliz\nAno Novo para você, Sensei."
10043-730 = "Assim, mais uma vez, envelhecendo\nao seu lado, as memórias\nvão se acumulando, não é?"
10043-740 = "Feliz Natal,\nmeu senhor...♥"
10043-750 = "Em um dia tão especial,\ncom trajes especiais, a sós..."
10043-760 = "Estou muito ansiosa\npor este dia de hoje...\nUfufufu."
10043-770 = "Gostosuras ou travessuras,\nSensei."
10043-780 = "Eh? Uma máscara\nde Halloween...?"
10043-790 = "I-isso é...\nSe você quer saber,\neu tenho uma."
10043-810 = "Fufu, está quente, não é..."
10043-820 = "Claro que é por causa\nda fogueira também, mas..."
10043-830 = "A sua voz,\ncada uma dessas palavras..."
10043-840 = "Ao pensar que, agora, elas estão sendo\ntecidas apenas para mim..."
10043-850 = "...Eu ainda sou alguém\ncheia de falhas."
10043-860 = "Por estar ao seu lado,\nacabo causando muitos\ntranstornos"
10043-870 = "e talvez eu acabe\ncometendo erros\nnovamente."
10043-880 = "Mesmo assim,\neu continuo aqui, ao seu..."
10043-890 = "Eu posso continuar\nao seu lado, Sensei...?"
10043-900 = "Muito obrigada..."
10043-910 = "É por você ser assim\nque eu..."
10043-2600 = "Isto é para mim...? Esta Wakamo jura novamente... que usará este poder para abater tudo o que tentar nos separar. Fufu, ufufufu...♥"
