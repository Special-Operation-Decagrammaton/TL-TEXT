[translation]
10043-10 = "うふふ、ブル～アーカイブ～"
10043-20 = "たとえ熱い日差しの下でも、冷たい水の中でも…\nどこへでも付き従いますわ。ですのでこの夏も、\n私から離れないでくださいね？あ・な・た・様♥"
10043-30 = "ここは涼しいですね、\nうふふ…♥"
10043-40 = "この姿を、\n早く先生にお見せ\nしたいのですが…"
10043-50 = "はぁ…あなた様、\n一体どちらへ…？"
10043-60 = "少し騒がしいですね…"
10043-70 = "どこからか、視線が…\nこれはまさか、\n先生の…？うふふっ…"
10043-80 = "あら、先生。\nおかえりなさいませ。"
10043-90 = "このワカモ、\n一日千秋の思いで\nお待ちしておりました♥"
10043-100 = "おかえりなさいませ、先生。\n準備は万全です。"
10043-110 = "さあ、何なりと\nお申し付けください。"
10043-120 = "ふふっ、うふふっ…"
10043-130 = "私に何でも\nお申し付けくださいね。"
10043-140 = "ええ、文字通り\n「何でも」…です♥"
10043-150 = "夏といえば、\n誰もが開放的になり、\n心が浮足立つ季節…"
10043-160 = "となれば、\nどんなことが起きても\nおかしくありませんよね？"
10043-170 = "ふふっ…"
10043-180 = "あなた様、もっとおそばに\n寄ってもよろしいでしょうか…？\n…え、いくらでも？"
10043-190 = "えっ、ええ…っ！？"
10043-200 = "あ、えっと、ではそ、その…"
10043-210 = "あっ、は、はい…\nし、失礼いたします…"
10043-220 = "せっかくですし、先生と一緒に\nお散歩がしたかったのですが…"
10043-230 = "この暑さでは、日が暮れるまで\n待った方が良さそうですね。"
10043-240 = "夏は日が長くて\n困ってしまいます。"
10043-250 = "いつになったら、\nあなた様と一緒に\nお散歩に行けるのでしょうか…"
10043-260 = "夏にお面で\n息苦しくないか…ですか？"
10043-270 = "ふふ、大丈夫です。\nこのお面は特注の、\n夏専用のものですから♥"
10043-280 = "もちろんあなた様が望むなら…\nこの下を見せることも、\nやぶさかでは…"
10043-290 = "…うふふっ、\nいかがなさいますか？"
10043-300 = "先生が生まれた今日という日が\nあったからこそ、私はあなた様と\n巡り会えました。"
10043-310 = "そう考えると、\n今日この日がどれだけ\n素晴らしいものか…。"
10043-320 = "お誕生日、\n心よりおめでとうございます。\nあなた様。"
10043-330 = "私の、誕生日…？"
10043-340 = "ああ、私、今にも\n倒れてしまいそうです…\n夏のせいではなく、\nあまりにも嬉しくて…"
10043-350 = "先生、ありがとうございます…♥"
10043-360 = "うふふっ、新年あけまして\nおめでとうございます。先生。"
10043-370 = "こうしてまたあなた様と\n一緒に年を重ね、思い出が\n積み重なっていくのですね。"
10043-380 = "メリークリスマス、\nあなた様…♥"
10043-390 = "こんな特別な日に\n特別な恰好で二人きり…"
10043-400 = "今日一日、\nとても楽しみですね…\nうふふふっ。"
10043-410 = "トリックオアトリートです、\n先生。"
10043-420 = "え？ハロウィーン用の\nお面…ですか？"
10043-430 = "そ、それは…\nあるといえば、\nあるのですが。"
10043-440 = "あら、先生。\nおかえりなさいませ。"
