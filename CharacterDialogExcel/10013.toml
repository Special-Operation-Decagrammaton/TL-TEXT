[translation]
10013-20 = "きひひひひひひいっ～～\nきゃははははは！"
10013-30 = "あ…。うあああ…。\nどうしよう、どうしよう。"
10013-40 = "話かけないで\nください…。"
10013-50 = "私は端っこに\nいます…。"
10013-60 = "こ、こんにちは…。"
10013-70 = "う、うあああ…。"
10013-80 = "こ…こんにちは。先生。\n私がここで見張ってました。"
10013-90 = "ツルギ、待機中！\nよ、よろしくお願いします！！"
10013-100 = "きょ、今日も\n良い一日ですねええっ！！"
10013-110 = "…ち、違う！これじゃない！\n何をしゃべればいいの！"
10013-120 = "きひひ。いひひひひっ～"
10013-130 = "…あ、あれ？\nみ、見てたんですか？\nはぅわわわわわ！？！？"
10013-140 = "あ…。\nな…。\nなんでも話してください。"
10013-150 = "わ、私は\nお、大人の仕事とか\nよく分からないので…！"
10013-160 = "で、でも！\nぜひやらせてください！"
10013-170 = "（家に帰りたい…。\n一緒にいて嬉しいけど\n何を話せばいいのか…）"
10013-180 = "た、誕生日？！\nわ、私は\n何をすればいいですか？"
10013-190 = "何をしなきゃいけないですか？"
10013-200 = "た、誕生日？\n私の誕生日ですか？"
10013-210 = "はい？\nで、で、で、デートですか？"
10013-220 = "デート？"
10013-230 = "こ、今年も\nよろしくお願いします～！"
10013-240 = "クリスマス…。\n大人のデート…。"
10013-250 = "うああああ！\nな、なんでもありません！！"
10013-260 = "ハロウィン…。\nフェスティバル…。\nパーティー…。"
10013-270 = "はい？\nべ、べつに何も！"
10013-290 = "（逃げる？\n今すぐにでも窓から\n飛び降りる？）"
10013-300 = "（死ぬかな？死ぬよな？\n死にたい…。殺す？\nいや、違う違う！）"
10013-310 = "な、な、な、な、なにを、\nは…話そうと…。"
10013-320 = "こ、こんなところは…。\n私には似合わないのに…。"
10013-330 = "あ、うう…。\nまだ私は準備が…。"
10013-340 = "（ぎゃあああああ～～！\nなんでこんなところに\n来ちゃったのおー！！）"
10013-2600 = "ふふふふふー\nうふふふふふふふふふー\nくははははははははははははっ～！！"
