[translation]
20029-10 = "ブルー、アーカイブ～。"
20029-20 = "夏……海……楽しみでいっぱいですね、先生。\nも、もちろん修行も忘れていませんよ。"
20029-30 = "皆さんが寛げる場所を\n作ってみましょうか。"
20029-40 = "涼しいところですね。\nゆっくり\n休めそうです。"
20029-50 = "皆さん楽しんでる\nみたいで……\n良かったです。"
20029-60 = "ツバキちゃんと\nカエデちゃんは、\n今頃何をしているん\nでしょう……"
20029-70 = "知らずに\nゆだってしまう……\n夏……怖いですね！"
20029-80 = "おかえりなさい、先生。\n準備はできておりますから、\n何でも仰ってくださいね。"
20029-90 = "あ、先生！\nいえ、大丈夫です……\n待つのは慣れておりますから。"
20029-100 = "夏、海……本当に魔法の\nような言葉ですね。"
20029-110 = "私も、修行をついうっかり\n忘れてしまうくらいに……"
20029-120 = "読心術で……\n先生の考えを\n当ててみましょうか？"
20029-130 = "先生は……私と一緒に時間を\n過ごしたいのですね。"
20029-140 = "どうでしょう？当たりましたか？"
20029-150 = "今日は先生の仕事を\n手伝うために来たのに……"
20029-160 = "いけませんね、私。\nずっと…… 他の事ばかり\n考えてしまいます。\n修行不足ですね……"
20029-170 = "レモネードはいかがですか？\nそれと、軽食の\nサンドイッチも……"
20029-180 = "たくさん作ってきたので、\nよろしければどうぞ。"
20029-190 = "暑かったら……私のパラソルに\nいらしてください。"
20029-200 = "その……膝枕、とか、\nどうでしょう？"
20029-210 = "先生のお誕生日……\n本当に素敵な日ですね。"
20029-220 = "ふふ、お誕生日おめでとう\nございます。先生。"
20029-230 = "私の誕生日を……\n祝ってくださるのですか？"
20029-240 = "うれしいです、本当に……\n言葉にできないくらい。"
20029-250 = "ふふっ。プレゼント、\nもういただいてしまいましたね？"
20029-260 = "あけましておめでとう\nございます、先生。"
20029-270 = "もう新年なのですね。\n一緒にお祈りをしましょうか？"
20029-280 = "私のお願い、ですか？\nふふっ……内緒です。"
20029-290 = "クリスマスですね。先生。\nいい子がプレゼントを\nもらえるという……。"
20029-300 = "それで……その……\nいかがでしょう、先生。\n私は……いい子、でしたか？"
20029-310 = "わあ、ハロウィーンですね。\n飴も、いたずらも準備して\nありますよ。"
20029-320 = "え？ 両方準備する必要は\nない……？たしかに……？"
20029-340 = "このまま……\nこの時間が永遠に\nなってしまえばいいのに。"
20029-350 = "このまま、\n写真や絵のように\n時が記録されて\n――そうしたら……"
20029-360 = "先生も同じ気持ち、\nなのですか？"
20029-370 = "それは……なんだか、\n照れますね。"
20029-380 = "私は今日……\n修行を忘れるくらい……\n幸せでした。"
20029-390 = "その……先生。"
20029-400 = "いつかまた……\nこのような時間を\n作っていただけ\nますでしょうか？"
20029-2600 = "こんな素敵なプレゼントを\nいただけるなんて……\n胸にあふれる私の気持ちを、\nきちんと言葉にして伝えたいのですが……\n上手く、まとまらなくて……\nその……ありがとうございます、先生。"
