[translation]
20029-10 = "Blue Archive."
20029-20 = "Verão... mar... estou muito animada, Sensei. M-mas, é claro, não me esqueci do meu treinamento."
20029-30 = "Que tal criarmos um lugar onde todos possam relaxar?"
20029-40 = "Um lugar fresco, não é? Parece que dá para descansar tranquilamente aqui."
20029-50 = "Parece que todos estão se divertindo... Fico feliz."
20029-60 = "O que será que a Tsubaki e a Kaede estão fazendo agora..."
20029-70 = "Acabar desmaiando sem nem perceber... O verão... é assustador, não é!"
20029-80 = "Bem-vindo de volta, Sensei. Já está tudo pronto, então pode me pedir o que precisar."
20029-90 = "Ah, Sensei! Não, está tudo bem... Já estou acostumada a esperar."
20029-100 = "Verão, mar... são palavras que parecem ter um toque de magia."
20029-110 = "A ponto de eu até me esquecer do meu treinamento..."
20029-120 = "Quer que eu tente adivinhar o que você está pensando... usando leitura mental?"
20029-130 = "Sensei... você quer passar um tempo comigo, não é?"
20029-140 = "E então? Eu acertei?"
20029-150 = "Eu vim hoje para ajudar o Sensei com o trabalho, mas..."
20029-160 = "Eu não tenho jeito mesmo. Fico pensando em outras coisas o tempo todo. Preciso treinar mais..."
20029-170 = "Aceita uma limonada? E também preparei alguns sanduíches..."
20029-180 = "Fiz bastante, então, se quiser, pode pegar."
20029-190 = "Se estiver com calor... venha ficar sob o meu guarda-sol."
20029-200 = "O que acha de... um colo para descansar?"
20029-210 = "O aniversário do Sensei... é um dia realmente maravilhoso."
20029-220 = "Fufu, feliz aniversário, Sensei."
20029-230 = "Você vai... comemorar o meu aniversário?"
20029-240 = "Estou tão feliz, de verdade... nem consigo encontrar palavras."
20029-250 = "Fufu. Você já me deu o presente, não deu?"
20029-260 = "Feliz Ano Novo, Sensei."
20029-270 = "Já é um novo ano. Vamos fazer uma oração juntos?"
20029-280 = "Meu pedido, você pergunta? Fufu... é segredo."
20029-290 = "É Natal, Sensei. Dizem que as crianças boazinhas ganham presentes..."
20029-300 = "Então... hum... o que acha, Sensei? Eu... fui uma criança boazinha?"
20029-310 = "Uau, é Halloween. Já preparei tanto os doces quanto as travessuras."
20029-320 = "Hã? Não precisava preparar os dois...? É verdade, né...?"
20029-340 = "Queria que esse momento... durasse para sempre."
20029-350 = "Se o tempo pudesse ser registrado como em uma foto ou pintura... então..."
20029-360 = "Você sente o mesmo, Sensei?"
20029-370 = "Isso... me deixa um pouco envergonhada."
20029-380 = "Hoje eu... fui tão feliz que até me esqueci do treinamento."
20029-390 = "Sobre isso... Sensei."
20029-400 = "Algum dia... você poderia reservar um tempo como este para nós novamente?"
20029-2600 = "Receber um presente tão maravilhoso... Eu queria conseguir expressar em palavras tudo o que estou sentindo agora, mas... não consigo organizar meus pensamentos... hum... muito obrigada, Sensei."
