[translation]
10112-10 = "ブル～アーカイブ！"
10112-20 = "ご主人さ――あ、今は先生って呼んだ方がいいかな？\n楽しいこと、い～っぱいしようね！"
10112-30 = "ここ広いねー！\n私が案内して\nあげようか？"
10112-40 = "えへへっ、せっかく\n制服に着替えたし…\n遊んじゃおっかな♪"
10112-50 = "お腹空いて\nきちゃった…\nお菓子食べちゃお♪"
10112-60 = "みんな可愛い～！\n一緒に\n写真撮りた～い！"
10112-70 = "先生どこ～？視線は\n感じるんだけどなあ…\nちょっと\n探してみよっかな。"
10112-80 = "先生、お手伝い\nできることある？\nなんでも言ってね！"
10112-90 = "今日はなにしよっか？\n先生は何して遊びたい？"
10112-100 = "制服、どうかな？\nごしゅ…"
10112-110 = "ううん、先生の\n感想聞きたいな！"
10112-120 = "任務は楽しいけど、"
10112-130 = "こうして先生と\nいるのも好き～"
10112-140 = "先生、お散歩いかない？\n私がワンちゃんになるから！"
10112-150 = "え？ダメ？なんで～？"
10112-160 = "先生はいつも\nどんなお仕事してるの？"
10112-170 = "それって私も\n手伝えるやつ？\nお掃除なら得意だよ～！"
10112-180 = "わっ！\nマンガはっけーん！\nこれ先生の？"
10112-190 = "…え、違う？\n先生の匂いがするのに？"
10112-200 = "問題っ！今日は\n何の日でしょ～？\n…正解は～"
10112-210 = "私の大好きな、\n先生のお誕生日～！\nぱちぱちぱち！"
10112-220 = "あははっ、\nハッピーバースデー！\n先生！"
10112-230 = "わっ！私の誕生日、\n覚えてたんだ！"
10112-240 = "すごい！嬉しい！\n先生大好き～！"
10112-250 = "明けましておめでとう～！\n先生！"
10112-260 = "今年も私とた～くさん、\n遊んでくれるんでしょ？\n楽しみにしてるね、あはっ！"
10112-270 = "メリークリスマ～ス！\n先生！サンタさんから\nプレゼントはもらった？"
10112-280 = "え…大人はもらえない？"
10112-290 = "じゃあ、私があげよっか？\n何でも言って！"
10112-300 = "街中が面白い仮装の\n人で賑わってるね！"
10112-310 = "こんな楽しい日に\n出かけないなんて、\nもったいないよ～！"
10112-320 = "さあ先生！\n一緒にいこ～！"
10112-340 = "じゃーん！\n先生とアスナが、\n繋がっちゃいました！"
10112-350 = "どう？\nこれならどこにいるのか、\n分かるんじゃない？"
10112-360 = "…どうしたの？\nそんな顔して。"
10112-370 = "ん？逆、だっけ？\n私に巻いた\nほうがよかった？"
10112-380 = "…あれ？…あ、ああ！\nたしかに！"
10112-390 = "…あはっ、あははは！\nヘンなの！"
10112-400 = "これ、ほんとに…"
10112-410 = "ワンちゃんと\n散歩してるみたい！"
10112-420 = "じゃあ…今の先生は、\nアスナのワンちゃんだね？"
10112-430 = "アスナのワンちゃんは、\nワンワンって言えるかな？"
10112-440 = "ふふっ！\nちゃんと言えたら\nご褒美あげるから、ね？"
10112-2600 = "やったぁ！\nこれでもっ～と\n楽しく遊べるね！\nありがとう、先生！"
