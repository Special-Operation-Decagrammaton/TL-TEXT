[translation]
10112-10 = "Blue Archive!"
10112-20 = "Mestre— ah, acho que é melhor te chamar de Sensei agora, né?\nVamos nos divertir muuuito!"
10112-30 = "Aqui é tão espaçoso!\nQuer que eu te\nmostre o lugar?"
10112-40 = "Hehehe, já que me dei ao trabalho\nde colocar o uniforme...\nque tal a gente brincar um pouco?♪"
10112-50 = "Comecei a sentir\nfome...\nVou comer um docinho♪"
10112-60 = "Todo mundo é tão fofo!\nQuero tirar uma foto\ncom todo mundo!"
10112-70 = "Onde está o Sensei? Sinto que alguém está me olhando...\nAcho que vou\nprocurar um pouco."
10112-80 = "Sensei, tem algo em que eu\npossa ajudar?\nÉ só pedir!"
10112-90 = "O que vamos fazer hoje?\nDo que você quer brincar, Sensei?"
10112-100 = "O que achou do uniforme?\nMes..."
10112-110 = "Não, eu quero saber\no que você achou, Sensei!"
10112-120 = "As missões são divertidas, mas,"
10112-130 = "eu também gosto de ficar\nassim com o Sensei~"
10112-140 = "Sensei, vamos passear?\nEu serei a sua cachorrinha!"
10112-150 = "Hã? Não pode? Por queee?"
10112-160 = "Que tipo de trabalho o Sensei\ncostuma fazer?"
10112-170 = "É algo em que eu\nposso ajudar?\nSe for limpeza, eu sou ótima nisso!"
10112-180 = "Uau!\nAchei um mangá!\nÉ seu, Sensei?"
10112-190 = "…Hã, não é?\nMas tem o seu cheiro..."
10112-200 = "Pergunta! Você sabe\nque dia é hoje?\n...A resposta é..."
10112-210 = "O dia do meu favorito,\no aniversário do Sensei!\nParabéns, parabéns!"
10112-220 = "Ahaha, feliz aniversário,\nSensei!"
10112-230 = "Uau! Você lembrou\ndo meu aniversário!"
10112-240 = "Incrível! Que felicidade!\nEu adoro o Sensei!"
10112-250 = "Feliz Ano Novo,\nSensei!"
10112-260 = "Este ano você vai brincar\nmuito comigo também, né?\nEstou ansiosa, ahaha!"
10112-270 = "Feliz Natal,\nSensei! Já ganhou\npresente do Papai Noel?"
10112-280 = "Hã... adultos não ganham?"
10112-290 = "Então, quer que eu te dê um?\nÉ só pedir!"
10112-300 = "A cidade está cheia de gente\ncom fantasias engraçadas!"
10112-310 = "É um desperdício não sair\nnum dia tão divertido\ncomo hoje!"
10112-320 = "Vamos lá, Sensei!\nVamos juntos!"
10112-340 = "Tcharam!\nO Sensei e a Asuna\nficaram conectados!"
10112-350 = "O que achou?\nAssim, você vai saber\nonde eu estou, não vai?"
10112-360 = "…O que foi?\nCom essa cara..."
10112-370 = "Hm? Foi o contrário?\nEra melhor ter enrolado\nem mim?"
10112-380 = "…Ué? ...Ah, ah!\nÉ verdade!"
10112-390 = "…Ahaha, ahahahaha!\nQue estranho!"
10112-400 = "Isso, na verdade..."
10112-410 = "Parece que estou passeando\ncom um cachorrinho!"
10112-420 = "Então... agora o Sensei\né o cachorrinho da Asuna, né?"
10112-430 = "Será que o cachorrinho da Asuna\nsabe dizer au au?"
10112-440 = "Fufu! Se você disser direitinho,\neu te dou uma recompensa, tá?"
10112-2600 = "Eba! Agora a gente vai\npoder se divertir\nainda mais!\nObrigada, Sensei!"
