[translation]
26015-10 = "Blue Archive, hein~"
26015-20 = "Ta-da! Ichika, reporting for duty! I never imagined I'd be able to come to the beach with you, Sensei~ Well, I'm counting on you this time too!"
26015-30 = "Whew... I can finally catch my breath..."
26015-40 = "This outfit... did I try a bit too hard?"
26015-50 = "When I'm free... I feel a bit restless..."
26015-60 = "Man~ Everyone is shining so bright~"
26015-70 = "Everyone is so unique, aren't they~"
26015-80 = "Ah! Sensei! I've been waiting for you~"
26015-90 = "Let's finish up the work quickly and head to the beach!"
26015-100 = "Welcome back, Sensei!"
26015-110 = "I finished sorting the documents for you."
26015-120 = "No, no, it wasn't really anything special."
26015-130 = "Sigh... in the end..."
26015-140 = "Even at the beach, the work doesn't really change, does it~"
26015-150 = "Oh, you too, Sensei?"
26015-160 = "I guess that's just how it is, huh~"
26015-170 = "Hm? ...Are you curious about these sunglasses?"
26015-180 = "I heard we were going to the beach, so I got a bit fired up... how... do I look?"
26015-190 = "Eh... cu, cute..."
26015-200 = "Is that so? Hehe, it was worth wearing them then~!"
26015-210 = "Um... Sensei, what should I do?"
26015-220 = "You said I could do whatever I want..."
26015-230 = "That's actually the hardest thing to do..."
26015-240 = "Whoa, the documents are piling up..."
26015-250 = "I think it's cool that you don't just give up on this amount of work."
26015-260 = "Whenever you're in trouble, you can call me anytime!"
26015-270 = "Would you like some tea to go with your work?"
26015-280 = "Actually, my senior taught me how to brew it the other day~"
26015-290 = "Sensei! Happy Birthday!"
26015-300 = "I wanted to be the first one to celebrate your birthday, so I was waiting..."
26015-310 = "By the way, what are your plans for later..."
26015-320 = "Ah, I see. Well, I figured as much. It's work, right..."
26015-330 = "Then, let's get it over with quickly!"
26015-340 = "Don't worry, if we do it together, it'll be done in no time!"
26015-350 = "Um... it is my birthday today, but..."
26015-360 = "Oh, wow... you remembered...?"
26015-370 = "Man, haha. That... really hits home..."
26015-380 = "Happy New Year~!"
26015-390 = "Man, last year was quite a handful with everything that happened~"
26015-400 = "Oops, complaining right at the start of the new year isn't great."
26015-410 = "Well then, I'm counting on you this year too, Sensei!"
26015-420 = "Sensei, do you still have work left?"
26015-430 = "I finished all the Justice Task Force work before coming here, but..."
26015-440 = "Why, you ask? Well, that's because..."
26015-450 = "Well, that's fine, isn't it?"
26015-460 = "Anyway, I'm free today."
26015-470 = "Consider my 'help' as a gift. I'm looking forward to your gift too, Sensei!"
26015-480 = "Candy...? Are you giving me some?"
26015-490 = "Ah! It's Halloween, isn't it! Man, I didn't intend for this outfit to be a costume, but..."
26015-500 = "But, I'll take the candy. ...Nom."
26015-510 = "Eu já comi, então\nnão tem como devolver, viu?"
26015-530 = "Por acaso você não está\nme confundindo com outra pessoa?"
26015-540 = "Tipo, achando que por eu ser da Trinity,\nsou uma senhorita de coração bondoso\ncriada em uma estufa?"
26015-550 = "O Comitê de Justiça é um grupo que\nassume todas as tarefas sujas\nda Trinity, sabia?"
26015-560 = "Essa gargantilha que eu sempre uso.\nSe eu te dissesse que, na verdade,\né uma \"coleira\"... o que você faria?"
26015-570 = "Só existe um motivo para colocar\numa \"coleira\" em alguém."
26015-580 = "Como você é um professor perspicaz,\nacho que já deve saber."
26015-590 = "E quando essa\n\"coleira\" for removida,\no que vai acontecer também..."
26015-600 = "Você consegue imaginar, não consegue?"
26015-610 = "...Ah, desculpe.\nAcho que exagerei um pouco."
26015-620 = "Se isso te serviu de lição,\nnão saia dizendo qualquer coisa por aí, viu?"
26015-630 = "O que você pretendia fazer\nse eu fosse realmente perigosa?"
26015-640 = "Haha... bem,\nfaço isso apenas na sua frente, professor. E também..."
26015-650 = "O que aconteceu hoje,\nvamos levar para o túmulo.\nNós dois."
26015-2600 = "Bem... farei o meu melhor. Mesmo que não seja o que você espera, não vale reclamar, viu? Afinal, foi você quem me fez levar isso a sério, professor."
