[translation]
26015-10 = "ブルーアーカイブっす～"
26015-20 = "じゃじゃーん！イチカ、登場っす！\n先生と一緒に海にこられるなんて思いもしなかったっすよ～ま、今回もよろしくっす！"
26015-30 = "ふぅ……\nやっと一息つける\nっすね……。"
26015-40 = "この格好……\n張り切り\nすぎっすかね？"
26015-50 = "暇だと……\nそれはそれで落ち着か\nないっすね……。"
26015-60 = "いや～\nみんなキラキラ\nしてるっすね～"
26015-70 = "皆さん\n個性的っすよね～"
26015-80 = "あ！先生！\n待ってたっすよ～"
26015-90 = "ぱぱっと仕事終わらせて、\n海に行くっすよ！"
26015-100 = "先生、おかえりっす！"
26015-110 = "書類の仕分け、\n終わらせといたっすよ。"
26015-120 = "いやいや、\n別に大したことはしてないっすよ。"
26015-130 = "はぁ……結局……。"
26015-140 = "海に行っても、\nやることはいつもと\n変わらないんすよね～"
26015-150 = "あ、先生もっすか？"
26015-160 = "やっぱ、そんなもんすよね～"
26015-170 = "ん？……この\nサングラスが\n気になるんすか？"
26015-180 = "海って聞いて、\n気合入れてみたんすけど……\nどう……っすかね。"
26015-190 = "えっ……かわ、いい……。"
26015-200 = "そう……っすか。\nふふっ、かけてきた\n甲斐があったっすね～！"
26015-210 = "あの……先生、\n何したらいいっすか？"
26015-220 = "好きにしてていいって……。"
26015-230 = "そういうのが\n一番難しいんすよね……。"
26015-240 = "わっ、書類が山積みに……。"
26015-250 = "この量を投げ出さないとこ、\n私はかっこいいと思うっすよ。"
26015-260 = "困ったときは、\nいつでも呼んでくれて\nいいっすから！"
26015-270 = "仕事のお供に、\n紅茶はいかがっすか？"
26015-280 = "実はこの間、\n先輩に淹れ方を\n教えてもらったんすよ～"
26015-290 = "先生！\nお誕生日おめでとうっす！"
26015-300 = "一番最初に先生をお祝いしたくて\n待ってたんすけど……。"
26015-310 = "ちなみに、この後のご予定は……"
26015-320 = "あっ、はい。\nまぁ分かってたっす。\n仕事っすよね……。"
26015-330 = "じゃ、\nさっさと終わらせるっすよ！"
26015-340 = "大丈夫、二人でやれば\nあっという間っすから！"
26015-350 = "ええと……たしかに今日は\n私の誕生日、っすけど……。"
26015-360 = "あっ、えぇ……\n覚えてくれてたんすか……？"
26015-370 = "いやぁ、あはは。\nこれは……効くっすね……。"
26015-380 = "明けましておめでとうっす～！"
26015-390 = "いや～去年はいろいろあって\n大変だったっすねぇ～"
26015-400 = "おっと、新年早々\n愚痴ってのもあれっすね。"
26015-410 = "んじゃ、\n今年もよろしくっす、先生！"
26015-420 = "先生、まだ仕事残ってるんすか？"
26015-430 = "私は、\n正義実現委員会の仕事を全部\n片してから来てるんすけど……。"
26015-440 = "なんでって、それは……。"
26015-450 = "それはまあ、\nいいじゃないっすか。"
26015-460 = "とにかく、\n今日の私は暇っすから。"
26015-470 = "私からは「お手伝い」を\nプレゼントってことで。\n先生からのプレゼントも、\n期待してるっすよ！"
26015-480 = "飴……？くれるんすか？"
26015-490 = "あっ！ハロウィーンっすね！\nいやぁ、この格好、\n仮装のつもりじゃ\nなかったんすけど……。"
26015-500 = "でも、飴はもらっとくっす。\n……あむ。"
26015-510 = "食べちゃったから、\nもう返せないっすからね。"
26015-530 = "もしかして私のこと、\n勘違いしてませんか？"
26015-540 = "トリニティだから、\n温室育ちの心優しい\nお嬢様なんじゃないかって。"
26015-550 = "正義実現委員会は、\nトリニティの荒事を一手に\n引き受ける集団なんですよ？"
26015-560 = "私がいつもつけてるチョーカー。\nあれ、実は「首輪」だって\n言ったら……どうします？"
26015-570 = "何かに「首輪」をつける\n理由は一つ。"
26015-580 = "察しのいい先生なら、\n分かると思うんですけど。"
26015-590 = "そしてその\n「首輪」が外れたとき、\n何が起こるのかも――"
26015-600 = "想像、できますよね？"
26015-610 = "……って、すみません。\nちょっとやりすぎたっすね。"
26015-620 = "これに懲りたら、\n滅多なこと言っちゃダメっすよ？"
26015-630 = "私が本当に危ないヤツだったら、\nどうするつもりだったんすか？"
26015-640 = "はは……まぁ、\nこんなのは先生の前で\nだけっすから。それと……"
26015-650 = "今日のことは、\n墓まで持ってくっすよ。\n二人で。"
26015-2600 = "えっと……まぁ、尽力するっす。\n期待通りじゃなくっても、\n文句言いっこなしっすよ？\n私を本気にさせたのは、先生なんすから。"
