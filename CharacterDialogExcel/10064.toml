[translation]
10064-10 = "Blue Archive."
10064-20 = "É só uma roupa nova porque é Ano Novo.\nConto com você este ano também, Sensei."
10064-30 = "Este ano também...\nEspero que tudo corra bem.\n...Com tudo, sabe."
10064-40 = "Ah...\nTem tanta coisa\npara pensar."
10064-50 = "Falando sério,\no que eu desejo é saúde e paz.\nSério, só isso."
10064-60 = "Espero que sejam apenas\nproblemas que eu\nconsiga resolver."
10064-70 = "Eu até que gostei\ndesta roupa.\nNão é ruim."
10064-80 = "Bem-vindo de volta, Sensei.\nFeliz Ano Novo."
10064-90 = "Trabalhar logo no início do ano...\nVocê também não tem vida fácil, Sensei."
10064-100 = "Não, é que de alguma forma\nnão consigo ver isso como algo alheio."
10064-110 = "De quimono...\nEu pareço ainda mais fofa?"
10064-120 = "Ah... você só sabe\ndizer essas coisas."
10064-130 = "Ah... já chega de me provocar,\nSensei."
10064-140 = "Meus sentimentos reais...?\nJ-já chega disso."
10064-150 = "Sobre o pessoal da Problem Solver...\nNão é bem preocupação, é mais que eu fico de olho neles."
10064-160 = "Espero que este ano\nnão aconteça nada de ruim."
10064-170 = "O que houve, Sensei?\nSe eu puder ser útil,\né só pedir."
10064-180 = "Mesmo que não seja um pedido de trabalho,\nse for por você, Sensei,\neu me esforçarei..."
10064-190 = "Ah, esquece o que eu disse.\nEsqueça."
10064-200 = "Feliz aniversário, Sensei.\nQuer alguma coisa?"
10064-210 = "Eu tenho uma quantidade\nrazoável de álbuns, mas..."
10064-220 = "O meu... aniversário?"
10064-230 = "Você se lembrou.\n...Não é nada ruim ser parabenizada por você, Sensei."
10064-240 = "Estou feliz, obrigada."
10064-250 = "O ano começou.\nFeliz Ano Novo, Sensei.\nQue este ano seja excelente para nós."
10064-260 = "...Um presente de Ano Novo para mim?\n...Sério...?"
10064-270 = "Natal...\nO Ano Novo já está quase chegando."
10064-280 = "Como foi o seu ano?"
10064-290 = "Halloween...\nUm dia barulhento."
10064-300 = "Eu não desgosto\ndesse tipo de atmosfera."
10064-320 = "Já está quase na hora do primeiro trem."
10064-330 = "Não é o som que eu esperava, mas...\nIsso também não é ruim."
10064-340 = "Diferente do sino da véspera de Ano Novo que toca uma vez por ano,"
10064-350 = "esse é um som comum\nque toca toda manhã, mas..."
10064-360 = "Porque o Ano Novo\ntambém não passa de\nmais um dia comum."
10064-370 = "Talvez este seja o som ideal\npara se ouvir neste dia."
10064-380 = "Que este ano também\nseja um bom ano."
10064-390 = "Feliz Ano Novo,\nSensei."
10064-2600 = "Sensei, você está realmente bem...?\nNão... esquece.\nVou me esforçar para corresponder às expectativas que você depositou em mim."
