[translation]
10064-10 = "ブルーアーカイブ。"
10064-20 = "新年だから、新しい服なだけ。\n今年もよろしくね、先生。"
10064-30 = "今年も……\n無事だといいんだけど。\n……いろいろと。"
10064-40 = "はあ……。\n考えることが\nたくさん。"
10064-50 = "真面目な話、\n願うのは健康と平和。\nほんと、それだけ。"
10064-60 = "解決できる\n問題だけにして\nほしいな。"
10064-70 = "この服、\nそこそこ気に入ってる。\n悪くない。"
10064-80 = "おかえり、先生。\nあけましておめでとう。"
10064-90 = "年明けから仕事だなんて……\n先生も大変だね。"
10064-100 = "いや、なんだか\n他人事に思えなくて。"
10064-110 = "着物だと……\nますます可愛く見える？"
10064-120 = "はぁ……そんな事\nばっかり言って。"
10064-130 = "はあ……からかうのも\nいい加減にして、先生。"
10064-140 = "本心……？\nも、もういいから。"
10064-150 = "便利屋のことは……\n心配というよりは、\n気になってる感じ。"
10064-160 = "今年は何事も\nないといいんだけど。"
10064-170 = "どうしたの、先生？\n私で役に立てるなら、\nなんでも言って。"
10064-180 = "依頼じゃなくても、\n先生のことなら\n頑張るよ……。"
10064-190 = "や、今のなし。\n忘れて。"
10064-200 = "お誕生日おめでとう、先生。\nなにか欲しいものある？"
10064-210 = "アルバムなら\nそれなりに持ってるけど。"
10064-220 = "私の……誕生日？"
10064-230 = "覚えててくれたんだ。\n……先生に祝ってもらえるのは、\n悪くないね。"
10064-240 = "嬉しいよ、ありがと。"
10064-250 = "年が明けたね。\nあけましておめでとう、先生。\n今年もいい年になりますように。"
10064-260 = "……私にお年玉を？\n……わざわざ……？"
10064-270 = "クリスマス……。\nもう少しで新年だね。"
10064-280 = "今年はどんな年だった？"
10064-290 = "ハロウィーン……\n騒がしい日。"
10064-300 = "こういう雰囲気、\n別に嫌いじゃないよ。"
10064-320 = "もうすぐ始発の時間だね。"
10064-330 = "期待していた音ではないけど……\nこれも、悪くない。"
10064-340 = "年に一度の除夜の鐘と違って"
10064-350 = "これ、毎朝鳴ってる\nなんでもない音だけど……"
10064-360 = "お正月も、\n日々の一日に\n過ぎないからさ。"
10064-370 = "今日という日に聞く音は、\nこれがいいのかも。"
10064-380 = "今年もいい\n一年でありますように。"
10064-390 = "あけましておめでとう、\n先生。"
10064-2600 = "先生、本当に大丈夫……？\nいや……違うか。\nかけてくれた期待に見合うよう頑張るね。"
