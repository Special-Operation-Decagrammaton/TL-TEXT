[translation]
20046-10 = "にゃはっ？ブルーアーカイブ～"
20046-20 = "さぁ～さぁ～皆の衆！刮目してご覧あれ♪百鬼夜行連合学院、陰陽部部長、天地ニヤのおなーりー！\n……なんちゃって。にゃははっ！"
20046-30 = "にゃは～\n……ちょっと一息。\nんふ、\nサボってないですよぉ？"
20046-40 = "先生には\nこのような趣味が……\nふむふむ。"
20046-50 = "惚れ惚れする\n光景ですねぇ♪\nにゃははっ！"
20046-60 = "カホは心配性だなぁ♪\nちゃ～んと頑張って\n働いてるのに……。\nま、嘘なんですが♪\nにゃははっ！"
20046-70 = "これはカホが……\nあっちはチセちゃんが\n喜びそうですねぇ……。"
20046-80 = "おやおや、随分と\nのんびり屋さんなんですねぇ？\n私を待たせる人なんて、\n先生くらいなものです♪"
20046-90 = "んふふ、なんだか新鮮な\n気持ちですよぉ？"
20046-100 = "にゃはっ！\nおかえりなさいませ、\nなんちゃって♪"
20046-110 = "あら、\nいらっしゃったんですね先生。"
20046-120 = "さてさて、\n挨拶はこの辺にして…"
20046-130 = "お茶にでもしましょうか♪"
20046-140 = "…ダメですかぁ？ちょ～っと、\n早かったかもですね、\nにゃははっ！"
20046-150 = "にゃ～働きたくないですよぉ～"
20046-160 = "どうしてシャーレまで\nきて仕事しないと\nいけないんですかぁ～"
20046-170 = "陰陽部でもしてないのに……\nえ～？した方がいいですかぁ？"
20046-180 = "まぁ、ですよねぇ～"
20046-190 = "にゃはっ、さすが先生♪"
20046-200 = "んふ、先生が\nこちら側の人間だって、\n知ってるんですよぉ？"
20046-210 = "またまた〜、\nとぼけても無駄ですよぉ？"
20046-220 = "ほら、\n一緒にゴロゴロしましょ♪"
20046-230 = "はいはい、\nちゃんと頑張ってますよっと。"
20046-240 = "ほ、ほんとですよ！"
20046-250 = "ん〜、\nいいお散歩日和ですねぇ。"
20046-260 = "こんな日はお外を\n楽しみませんか～？"
20046-270 = "んふふっ……\n良いアイデアが浮かびました。"
20046-280 = "んん～？気になります？"
20046-290 = "聞いちゃったら\nつまらないですよぉ？\nにゃはっ♪"
20046-300 = "ふむ。今日は先生が\n生まれた日――ですよね♪"
20046-310 = "お誕生日おめでとう\nございますぅ。"
20046-320 = "こうして直接お祝いを\n伝えられるなんて……\n良い日ですねぇ？"
20046-330 = "んん～？\nそんなに警戒しなくても\nいいじゃないですかぁ……"
20046-340 = "純粋に\nお祝いしてるだけなのに……"
20046-350 = "悲しいなぁ。ぐすんぐすん。"
20046-360 = "んふふっ♪"
20046-370 = "さてさて、\n今日は何の日でしょう～？"
20046-380 = "……どうやら、\n言うまでもないようですねぇ。"
20046-390 = "先生と私の仲ですから。\nこれ以上の詮索は\n無粋というもの。"
20046-400 = "んふふ、準備してますよね？\n誕生日プレゼント！"
20046-410 = "謹んで――新年の\nお祝いを申し上げます。"
20046-420 = "本年もどうぞよろしく\nお願い致します……にゃはっ♪"
20046-430 = "私だってこういう\n時ぐらいはちゃんと\n弁えてるんですよぉ？"
20046-440 = "にゃは～今日は楽しい～\nメリークリスマス～"
20046-450 = "可愛い後輩にプレゼントを\n買って帰ろう～っと♪"
20046-460 = "…え？私にプレゼントですか？"
20046-470 = "…あ、ありがとうございます。"
20046-480 = "にゃはは～百鬼夜行の\n外にはこんな面白い\n文化があるんですねぇ♪"
20046-490 = "ん～？お菓子が\nなければ悪戯する……？"
20046-500 = "んん～？立場、\n逆になってません～？"
20046-510 = "というかお菓子なんて\n持っておりませんが……。"
20046-520 = "な、何をする気ですか、\n先生！？"
20046-540 = "にゃ、にゃはは……\nもしも～し、先生～？"
20046-550 = "あらあら、怖い顔……。\n先生には似合いませんよぉ？"
20046-560 = "もしかして……\n本当に怒ってます？"
20046-570 = "いや、まぁ……\n分かっていますけど……\nにゃは……。"
20046-580 = "ええと……はい……\n申し訳ありません。"
20046-590 = "でもほら、\nなんといいますかぁ〜\nこちらにも事情という\nものがありましてねぇ～？"
20046-600 = "にゃはっ！？いえいえ！"
20046-610 = "滅相もない！\n反省していますとも！ええ！"
20046-620 = "ええ……心から\n反省しておりますので……"
20046-630 = "どうか、\n許してもらえませんか？"
20046-2600 = "……お気持ちはありがたいのですが。\nいやはや、私に何を求めていらっしゃるのやら。んふふ……ですが、先生のご期待を\n裏切るわけにもいきませんし？\n困ってしまいますねぇ……本当に♪"
