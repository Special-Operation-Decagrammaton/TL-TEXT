[translation]
20046-10 = "Nya-ha? Blue Archive~"
20046-20 = "Ora, ora, todos vocês! Abram bem os olhos e contemplem♪ A chegada da presidente do Departamento de Yin e Yang da Academia Hyakkiyako, Amachi Niya!\n……Brincadeirinha. Nya-haha!"
20046-30 = "Nya-ha~\n……Só uma pausa rápida.\nNfu,\nNão estou matando serviço, viu?"
20046-40 = "O Sensei tem\nesse tipo de hobby……\nHum, hum."
20046-50 = "Uma visão\nencantadora, não é?♪\nNya-haha!"
20046-60 = "A Kaho é tão preocupada♪\nMesmo que eu esteja\ntrabalhando duro……\nBem, isso é mentira♪\nNya-haha!"
20046-50 = "Uma visão\nencantadora, não é?♪\nNya-haha!"
20046-60 = "A Kaho é tão preocupada♪\nMesmo que eu esteja\ntrabalhando duro……\nBem, isso é mentira♪\nNya-haha!"
20046-70 = "Isso é algo que a Kaho...\nAquilo ali a Chise-chan\niria adorar……"
20046-80 = "Ora, ora, você é bem\nrelaxado, não é?\nAlguém que me faz esperar,\nsó o Sensei mesmo♪"
20046-90 = "Nfufu, sinto uma sensação\ntão renovadora, sabe?"
20046-100 = "Nya-ha!\nBem-vindo de volta,\nbrincadeirinha♪"
20046-110 = "Ah,\nvocê chegou, Sensei."
20046-120 = "Bem, bem,\ndeixando as saudações de lado..."
20046-130 = "Que tal tomarmos um chá?♪"
20046-140 = "…Não pode? Talvez tenha sido\num pouco cedo demais,\nnya-haha!"
20046-150 = "Nya~ não quero trabalhar~"
20046-160 = "Por que eu tenho que vir até o Schale\ne trabalhar~"
20046-170 = "Eu nem faço isso no Departamento de Yin e Yang……\nEh~? É melhor eu fazer?"
20046-180 = "Bem, é verdade~"
20046-190 = "Nya-ha, como esperado do Sensei♪"
20046-200 = "Nfu, eu sei que o Sensei\né uma pessoa do meu tipo, sabe?"
20046-210 = "Lá vem você de novo~,\nnão adianta fingir, viu?"
20046-220 = "Vamos,\nvenha descansar comigo♪"
20046-230 = "Sim, sim,\nestou trabalhando direitinho."
20046-240 = "É, é verdade mesmo!"
20046-250 = "N~,\num ótimo dia para um passeio."
20046-260 = "Que tal aproveitarmos\no dia lá fora~?"
20046-270 = "Nfufu……\nUma ótima ideia me veio à mente."
20046-280 = "Nn~? Está curioso?"
20046-290 = "Se eu contar,\nperde a graça, sabe?\nNya-ha♪"
20046-300 = "Hum. Hoje é o dia em que o Sensei\nnasceu――não é?♪"
20046-310 = "Feliz aniversário."
20046-320 = "Poder vir aqui pessoalmente\npara te parabenizar……\nQue dia bom, não é?"
20046-330 = "Nn~?\nNão precisa ficar\ntão na defensiva……"
20046-340 = "Eu só estou\nte parabenizando de verdade……"
20046-350 = "Que triste. Snif, snif."
20046-360 = "Nfufu♪"
20046-370 = "Bem, bem,\nque dia é hoje, hein~?"
20046-380 = "……Pelo visto,\nnão preciso nem dizer."
20046-390 = "Somos próximos, Sensei.\nFicar perguntando mais que isso\né falta de tato."
20046-400 = "Nfufu, você preparou, né?\nO presente de aniversário!"
20046-410 = "Respeitosamente――desejo a você\num feliz ano novo."
20046-420 = "Conto com você\neste ano também……nya-ha♪"
20046-430 = "Até eu sei me comportar\nnessas horas,\nsabe?"
20046-440 = "Nya-ha~ hoje é divertido~\nFeliz Natal~"
20046-450 = "Vou comprar um presente\npara minha querida kouhai~♪"
20046-460 = "…Eh? Um presente para mim?"
20046-470 = "…Ah, muito obrigada."
20046-480 = "Nya-haha~ fora de Hyakkiyako\nexistem culturas tão interessantes, né♪"
20046-490 = "N~? Se não tiver doces,\nvou fazer uma travessura……?"
20046-500 = "Nn~? Os papéis\nnão estão invertidos~?"
20046-510 = "Quer dizer, eu não tenho nenhum doce comigo, sabe...?"
20046-520 = "O-o que você pretende fazer, Sensei!?"
20046-540 = "Nya, nyahaha... Alô, alô... Sensei?"
20046-550 = "Ora, ora, que cara assustadora... Isso não combina com você, Sensei."
20046-560 = "Por acaso... você está realmente bravo?"
20046-570 = "Não, bem... eu entendo, mas... nyaha..."
20046-580 = "Bem... sim... peço mil desculpas."
20046-590 = "Mas veja bem, como posso dizer... eu também tenho as minhas razões, sabe?"
20046-600 = "Nyaha!? Não, não!"
20046-610 = "De jeito nenhum! Estou arrependida, sim! Com certeza!"
20046-620 = "Sim... estou arrependida de coração, então..."
20046-630 = "Por favor, você não poderia me perdoar?"
20046-2600 = "...Agradeço o seu sentimento. Ora, ora, não sei o que você espera de mim. Nufu... mas não posso decepcionar as expectativas do Sensei, não é? Que situação complicada... realmente♪"
