[translation]
10095-10 = "ブルー、アーカイブ。"
10095-20 = "今日は……メイドになってみました。\nよろしくお願いいたします……ご主人様。"
10095-30 = "メイド…カフェ…\n流石にベタすぎ\nますね…"
10095-40 = "モチーフになりそうな\nものがたくさん……"
10095-50 = "ここのお掃除、\n大変そう……"
10095-60 = "ゲームをするメイドって\n新しいかな……？\n実はそうでも\nないのかな……"
10095-70 = "ここで\nアルバイトとか、\nできるかな……？"
10095-80 = "おかえりなさい、先生！\n会いたかったです！\n今日は何から\nお手伝いしましょうか？"
10095-90 = "おかえりなさいませ、\nご主人様！会いたかったです！\n本日は何をいたしましょう？"
10095-100 = "メイド服を纏ったのですから、\n完璧なメイドを目指します。"
10095-110 = "そして……メイドに\n必要なのは「ご主人様」です！"
10095-120 = "その……似合ってますか？"
10095-130 = "……可愛い、でしょうか？"
10095-140 = "そう言ってくださると……\n嬉しいです。えへへ。"
10095-150 = "色んな理由でメイド服を\n着ることになりましたけど……"
10095-160 = "今では良かったと\n思えるようになりました。\n先生も見てくださることですし。"
10095-170 = "シャーレのお片付けなら、\n全力でやりますよ。\nうちの部室の10倍は\n丁寧に……！"
10095-180 = "え？部室の片付けにも\n力を入れて欲しい……？"
10095-190 = "当番の日は、ドキドキします。\n当番開始の1時間くらい\n前からそわそわして、\n幸せになるんです。"
10095-200 = "今日はご主人様の\n誕生日ですよね？"
10095-210 = "えへへ。ご主人様の誕生日を\n覚えておくのも、\nメイドのお仕事ですからね！"
10095-220 = "誕生日はふつう、\n家族と一緒に\n過ごすものですが……"
10095-230 = "私……今日は……\n今日だけは……\n先生と一緒に、\n過ごしたいです……"
10095-240 = "あけまして\nおめでとうございます、先生。"
10095-250 = "よかったら\n一緒にお参りに\n出かけませんか？"
10095-260 = "クリスマス……\n何か食べたい\nご馳走とかありますか？"
10095-270 = "メイドは、よく記念日に\n特別な料理を\n作っていたそうです。"
10095-280 = "……私、料理はそこまで\n得意じゃないですが、\n頑張りますね！"
10095-290 = "ハロウィンにメイドの仮装は\nちょっと地味なんじゃないかって\n言われました……\n仮装じゃないんですけどね！"
10095-310 = "も、申し訳ございません。\nご主人様！"
10095-320 = "私、また間違っちゃって、\n転んじゃって……"
10095-330 = "大丈夫……です。\nご主人様からの、お叱りなら……"
10095-340 = "どんなものでも……\n受け止めますから……"
10095-350 = "……ど、どうでしょう？"
10095-360 = "で、でもこれはそういう\nシチュエーションですし！"
10095-370 = "写真を撮ってほしいと\nお願いしたのは、私ですし……"
10095-380 = "えっと、先生？"
10095-390 = "本日のメイドミドリは、\nご満足いただけたでしょうか？"
10095-2600 = "ペンも、お掃除道具も、銃も……\n道具という点では似ています。\nもっと良い道具があれば、\nたくさんのことができるでしょう。\nありがとうございます、ご主人様。\n絶対に、忘れません。"
