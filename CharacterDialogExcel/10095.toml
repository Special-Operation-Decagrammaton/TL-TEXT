[translation]
10095-10 = "Blue Archive."
10095-20 = "Hoje... eu me vesti de empregada.\nPor favor, cuide de mim... mestre."
10095-30 = "Café... de empregada...\nÉ um clichê e tanto,\nnão é..."
10095-40 = "Tem tantas coisas aqui\nque dariam ótimos temas..."
10095-50 = "Limpar este lugar\nparece ser bem difícil..."
10095-60 = "Será que uma empregada que joga videogame\né algo novo...? \nNa verdade, será que não é...?"
10095-70 = "Será que eu conseguiria\ntrabalhar de meio período\naqui...?"
10095-80 = "Bem-vindo de volta, Sensei!\nEu estava com saudades!\nCom o que posso ajudar\nhoje?"
10095-90 = "Bem-vindo de volta,\nmestre! Eu estava com saudades!\nO que deseja que eu faça hoje?"
10095-100 = "Já que estou vestindo este uniforme, vou me esforçar para ser uma empregada perfeita."
10095-110 = "E... o que uma empregada precisa é de um \"mestre\"!"
10095-120 = "E então... ficou bom em mim?"
10095-130 = "...Estou bonita?"
10095-140 = "Fico feliz... que você diga isso. Ehehe."
10095-150 = "Acabei vestindo este uniforme por vários motivos, mas..."
10095-160 = "Agora eu sinto que foi uma boa escolha.\nAinda mais porque o Sensei está me vendo."
10095-170 = "Se for para arrumar o Schale, eu farei com toda a minha força.\nCom dez vezes mais cuidado\ndo que na nossa sala do clube...!"
10095-180 = "Hã? Você quer que eu me esforce\npara arrumar a sala do clube também...?"
10095-190 = "Nos dias em que fico de plantão, meu coração dispara.\nFico ansiosa cerca de uma hora antes de começar,\ne isso me deixa feliz."
10095-200 = "Hoje é o aniversário do mestre, não é?"
10095-210 = "Ehehe. Lembrar do aniversário do mestre\ntambém é parte do trabalho\nde uma empregada, sabe!"
10095-220 = "Normalmente, as pessoas passam\no aniversário com a família,\nmas..."
10095-230 = "Eu... hoje... \nSó por hoje...\nEu queria passar\ncom o Sensei..."
10095-240 = "Feliz ano novo,\nSensei."
10095-250 = "Se não se importar,\npoderíamos ir visitar o santuário\njuntos?"
10095-260 = "Natal... \nTem algum banquete\nque você queira comer?"
10095-270 = "Dizem que as empregadas costumavam\npreparar pratos especiais\nnas datas comemorativas."
10095-280 = "...Eu não sou tão boa\nna cozinha, mas\nvou me esforçar!"
10095-290 = "Me disseram que usar fantasia de empregada no Halloween é um pouco sem graça...\nMas não é uma fantasia!"
10095-310 = "Pe-peço perdão.\nMestre!"
10095-320 = "Eu errei de novo,\ntropecei..."
10095-330 = "Está tudo bem...\nSe for uma bronca\ndo mestre..."
10095-340 = "Eu aceitarei...\nqualquer coisa..."
10095-350 = "...E-então, o que achou?"
10095-360 = "Ma-mas essa é a situação, afinal!"
10095-370 = "Fui eu quem pediu para tirar fotos..."
10095-380 = "Ei, Sensei?"
10095-390 = "A Midori empregada de hoje\nfoi satisfatória para você?"
10095-2600 = "Canetas, ferramentas de limpeza, armas... \nEm termos de serem utensílios, eles são parecidos. \nCom ferramentas melhores, \nseria possível fazer muitas coisas. \nObrigada, mestre. \nEu nunca vou esquecer disso."
