[translation]
13001-20 = "えーっと…\nそれで、今から何をすればいいの？"
13001-30 = "さっきのあれ…夢、\nだったのかな？"
13001-40 = "だるい…。"
13001-50 = "象さんをカフェで飼うためには…。"
13001-60 = "ん、んん？"
13001-70 = "ふぁーあ…。"
13001-80 = "先生、来たんだ？\nうん…てきとうに座って。"
13001-90 = "…私のことは\n気にしないで、\n仕事してて。"
13001-100 = "…空が青いね。"
13001-110 = "悪霊退散、悪霊退散。"
13001-120 = "先生は…\n家に帰らないの？"
13001-130 = "先生、私、俳句を\n詠んでみたんだけど\n…聞く？"
13001-140 = "お昼には\nとり天食べた\n名古屋めし"
13001-150 = "お誕生日\nおめでとう、先生。"
13001-160 = "今日が誕生日って\nいうことは…"
13001-170 = "先生が生まれた日は、\n今日ってこと？"
13001-180 = "今日が私の誕生日…？\n本当に…？"
13001-190 = "初夢にトマトが\n出て来たけど…"
13001-200 = "これは、縁起良いのかな？"
13001-210 = "サンタクロースは、\n誰が悪い子なのか\n知ってるの？"
13001-220 = "それ…\nなまはげじゃない？"
13001-230 = "カボチャスープ\n飲みたいな…。"
13001-250 = "ようこそ、先生。\nここは静かだから…\n俳句を作るのに\nちょうど良くて。"
13001-260 = "今日は先生と一緒で…\nすごく楽しかった。"
13001-270 = "それで私、\n気づいたの。"
13001-280 = "私が作りたかった俳句、\nそれは…。"
13001-290 = "今日ずっと感じていた\nこの気持ちを、\n込めたものだったんだって。"
13001-300 = "日は暮れど"
13001-310 = "今なお続く"
13001-320 = "音ふたつ"
13001-330 = "…先生と一緒なら、\nまだまだいくつでも、"
13001-340 = "詠めそうな気がする。"
13001-350 = "次もまた、\n付き合ってくれる？"
13001-360 = "あ…先生、見て。"
13001-370 = "月、綺麗だね。"
13001-380 = "本当に、綺麗…。"
13001-2600 = "これ……私の？"
