[translation]
13001-20 = "Hum... Então, o que eu deveria fazer agora?"
13001-30 = "Aquilo de agora... será que foi um sonho?"
13001-40 = "Que preguiça..."
13001-50 = "Para criar um elefante no café..."
13001-60 = "Hm, hmmm?"
13001-70 = "Aaaah..."
13001-80 = "Sensei, você veio? Sim... sente-se em qualquer lugar."
13001-90 = "...Não se preocupe comigo, pode continuar trabalhando."
13001-100 = "...O céu está azul, né?"
13001-110 = "Espíritos malignos, vão embora. Espíritos malignos, vão embora."
13001-120 = "Sensei... você não vai para casa?"
13001-130 = "Sensei, eu tentei escrever um haikai... quer ouvir?"
13001-140 = "No almoço, comi toriten, comida de Nagoya."
13001-150 = "Feliz aniversário, Sensei."
13001-160 = "Se hoje é seu aniversário, isso significa que..."
13001-170 = "O dia em que o Sensei nasceu é hoje?"
13001-180 = "Hoje é meu aniversário...? É sério...?"
13001-190 = "Um tomate apareceu no meu primeiro sonho do ano, mas..."
13001-200 = "Será que isso é um bom presságio?"
13001-210 = "O Papai Noel sabe quem são as crianças más?"
13001-220 = "Isso... não é um Namahage?"
13001-230 = "Queria tomar uma sopa de abóbora..."
13001-250 = "Bem-vindo, Sensei. Aqui é silencioso, então... é perfeito para escrever haikais."
13001-260 = "Hoje, estar com o Sensei... foi muito divertido."
13001-270 = "E então eu percebi."
13001-280 = "O haikai que eu queria escrever, era..."
13001-290 = "Algo que expressasse esse sentimento que senti o dia todo."
13001-300 = "O sol se põe, mas"
13001-310 = "Ainda continuam"
13001-320 = "Dois sons"
13001-330 = "...Se for com o Sensei, sinto que ainda consigo"
13001-340 = "Escrever muitos outros."
13001-350 = "Você vai me acompanhar na próxima também?"
13001-360 = "Ah... Sensei, olhe."
13001-370 = "A lua está linda, né?"
13001-380 = "Realmente, muito linda..."
13001-2600 = "Isso... é meu?"
