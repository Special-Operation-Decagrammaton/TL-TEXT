[translation]
20045-10 = "ブルーアーカイブ～！"
20045-20 = "百鬼夜行連合学院、\nお祭り運営委員会の朝比奈フィーナ！\n皆さんをご案内しマス！"
20045-30 = "Wow〜、任侠映画の\nセットみたいで\nカッコイイデス！"
20045-40 = "（このテレビ……\n映画が観られマス！）"
20045-50 = "なんだかどこかで\n見たことある\n気がしマス！"
20045-60 = "素敵な方が多いデス……\nフィーナも負けて\nいられマセン！"
20045-70 = "なんだか眠く\nなってきマシタ……。"
20045-80 = "全員集まりマシタぜ、お頭！\n……いえ、センセイ！"
20045-90 = "センセイ！今日はフィーナが\n当番のガイドを務めマス！"
20045-100 = "制服を身に纏い、\n先頭に立って道を示す……。"
20045-110 = "なんだか任侠みたいデスね！"
20045-120 = "百鬼夜行は私の\n庭のようなものです！"
20045-130 = "案内なら\n任せてクダサイ！"
20045-140 = "ワタシたちのやり方で\nお出迎えしマス！"
20045-150 = "覚悟してクダサイ！"
20045-160 = "センセイと一緒なら\n無敵デス！"
20045-170 = "センセイ、\n今日はBirthdayデスね？"
20045-180 = "宴の準備は\nバッチリデス！"
20045-190 = "今日はフィーナの\nBirthdayデス！"
20045-200 = "Happy birthday\nto me～！"
20045-210 = "Happy New Year！"
20045-220 = "新年おめでとう\nございマス、お頭！"
20045-230 = "……いや、センセイ！"
20045-240 = "ホッホッホー、\nメリークリスマス！\nデス、センセイ！"
20045-250 = "Trick or Treat!\nHalloween、デス！"
20045-270 = "うーん、ハッ！"
20045-280 = "……なんだか、緊張していた\nみたいデス。"
20045-290 = "お客さんと一緒の間は\n夢中だったから、\n気づかなったのデスが……"
20045-300 = "こうして先生と一緒にいると、\nなんだか心が落ち着きマス。"
20045-310 = "軽やかに動くためには\nストレッチは必須デス！\nもう一度！"
20045-320 = "ん、んん、うーん！"
20045-330 = "え？肩の力を抜いた方が\nイイ……デスか？"
20045-340 = "そ、その……これは\nガイドとして気合いを\n入れているといいマスか……。"
20045-350 = "二人っきりだと……\nその……。"
20045-360 = "つい、リラックスして\nしまうから……。"
20045-2600 = "1段階、イヤ、\n500段階は成長できた気がしマス！"
