[translation]
20045-10 = "Blue Archive~!"
20045-20 = "Da Academia Hyakkiyako, do Comitê de Operações do Festival, Asahina Fina! Vou guiar todos vocês!"
20045-30 = "Uau, parece o cenário de um filme de yakuza, é muito legal!"
20045-40 = "(Essa TV... dá para assistir filmes nela!)"
20045-50 = "Sinto que já vi isso em algum lugar antes!"
20045-60 = "Tem muita gente incrível aqui... A Fina não pode ficar para trás!"
20045-70 = "Estou começando a ficar com sono..."
20045-80 = "Todos se reuniram, chefe! ...Digo, Sensei!"
20045-90 = "Sensei! Hoje a Fina será a guia de plantão!"
20045-100 = "Vestir o uniforme e liderar o caminho..."
20045-110 = "Parece coisa de yakuza, não é?"
20045-120 = "Hyakkiyako é como se fosse o meu quintal!"
20045-130 = "Pode deixar a guia comigo!"
20045-140 = "Vamos dar as boas-vindas do nosso jeito!"
20045-150 = "Prepare-se!"
20045-160 = "Com o Sensei, somos invencíveis!"
20045-170 = "Sensei, hoje é seu aniversário, né?"
20045-180 = "A preparação para a festa está perfeita!"
20045-190 = "Hoje é o aniversário da Fina!"
20045-200 = "Feliz aniversário para mim~!"
20045-210 = "Feliz Ano Novo!"
20045-220 = "Feliz Ano Novo, chefe!"
20045-230 = "...Não, Sensei!"
20045-240 = "Ho ho ho, Feliz Natal! Digo, Sensei!"
20045-250 = "Gostosuras ou travessuras! É Halloween!"
20045-270 = "Hmm, ha!"
20045-280 = "...Parece que eu estava tensa."
20045-290 = "Enquanto estava com os visitantes, eu estava tão concentrada que nem percebi, mas..."
20045-300 = "Estando aqui com o Sensei, meu coração se acalma."
20045-310 = "Para se mover com leveza, alongar é essencial! Mais uma vez!"
20045-320 = "Hmm, hnn, ugh!"
20045-330 = "Eh? É melhor... relaxar os ombros?"
20045-340 = "B-bem... é que eu estava tentando me esforçar como guia..."
20045-350 = "Quando estamos a sós... é que..."
20045-360 = "Eu acabo relaxando demais..."
20045-2600 = "Sinto que cresci um nível, não, 500 níveis!"
