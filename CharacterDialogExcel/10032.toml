[translation]
10032-10 = "ブルーアーカイブ~！"
10032-20 = "あははっ！お待たせ、先生！\n今年もたーっくさん、私と遊んでくれるよねっ？"
10032-30 = "みんなで\n羽根つきとか\nしたいな～"
10032-40 = "先生とは何して\n遊ぼっかな～♪"
10032-50 = "笑う門には福来る～♪"
10032-60 = "オモチャはっけ～ん♪"
10032-70 = "先生に甘えたら、\nお年玉もらえるかな？"
10032-80 = "新年から頑張ってる\n先生のために、\nムツキちゃんが来てあげたよ～！"
10032-90 = "おかえり先生～♪\nず～っと待ってたよっ♡"
10032-100 = "先生先生、\n今日は何して遊ぶ？"
10032-110 = "じゃんけん？缶蹴り？\nそれとも……"
10032-120 = "か・く・れ・ん・ぼ？"
10032-130 = "あっ、でも分かってるよ。\n遊んでばっかりじゃ\nダメなんだよね？\n大人だから、仕事もしないと？"
10032-140 = "そこでナイスな\n提案なんだけど～……"
10032-150 = "私が手伝ってあげよっか！"
10032-160 = "うーん、こういう\n格好だからかな～？\nなんかちょっとだけ、\n気合が入るかも？"
10032-170 = "ほらほら先生、頑張って！\n早く仕事終わらせて、\nそしたらたっくさん遊ぼう！"
10032-180 = "先生とこーんなに\n長い付き合いになるなんて……"
10032-190 = "これってもう、運命かも！？"
10032-200 = "お誕生日おめでとー、先生！\nちゃーんと覚えてたよ！"
10032-210 = "先生のお誕生日も、\n私とずーっと遊んでくれるって\nいう約束も、忘れてなんて\nあげないんだから！くふふっ♪"
10032-220 = "私の誕生日、\nお祝いしてくれるの？"
10032-230 = "くふふっ！じゃあ、\n何してもらおっかな～……？"
10032-240 = "うーん、そしたら二人で、\n何かいたずらしに行こう！\n一緒だったら絶対楽しいよっ！"
10032-250 = "あけましておめでと、先生！\nハッピーニューイヤ～！\nボナネ～！グーテン・タ～ク！！"
10032-260 = "ん？最後のは間違ってるって？\nあはっ、大正解～！"
10032-270 = "新年の前に、今日は\nメリークリスマスだよ先生！"
10032-280 = "くふふっ、今日も先生と\nたっくさん遊びたいなっ！"
10032-290 = "トリック・オア・トリートー！\nというわけで、先生のことを\n食べちゃうぞ～♪"
10032-300 = "え～？ダメなのー？"
10032-320 = "あはっ、ざ～んねん！\n私の勝ちだよ、先生！"
10032-330 = "くふふっ、\nここまでの健闘は\n認めてあげるけど～……"
10032-340 = "勝負の世界は厳しいものだから、\n仕方ないよね？くふっ♪"
10032-350 = "さーて、\n何を描いちゃおっかなぁ？\nマル？バツ？\nそれとも他のが良い？"
10032-360 = "今なら先生の言うこと、\n何でも聞いてあげるよ？"
10032-370 = "あっ、でも気が変わっちゃった。\n普通の記号だと\nちょっと寂しいし……"
10032-380 = "お顔全体に、\nくまなく塗ってあげるねっ！"
10032-2600 = "あははっ、良いね良いね！\nこれならもっと楽しく遊べちゃうかもっ！"
