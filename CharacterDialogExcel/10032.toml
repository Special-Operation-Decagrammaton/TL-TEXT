[translation]
10032-10 = "Blue Archive~!"
10032-20 = "Ahaha! Desculpe a demora, Sensei!\nVocê vai brincar muuuito comigo esse ano também, né?"
10032-30 = "Eu queria jogar\nHanetsuki com\ntodo mundo~"
10032-40 = "O que será que eu vou\njogar com o Sensei~♪"
10032-50 = "A sorte sorri para quem sorri~♪"
10032-60 = "Achei um brinquedoo~♪"
10032-70 = "Se eu for mimada pelo Sensei,\nserá que ganho um otoshidama?"
10032-80 = "Para o Sensei que está\nse esforçando desde o Ano Novo,\na Mutsuki-chan veio dar uma forcinha~!"
10032-90 = "Bem-vindo de volta, Sensei~♪\nEstive te esperando por muuuito tempo♡"
10032-100 = "Sensei, Sensei,\ndo que vamos brincar hoje?"
10032-110 = "Pedra, papel e tesoura? Chuta-lata?\nOu então..."
10032-120 = "Es・con・de・es・con・de?"
10032-130 = "Ah, mas eu sei, viu.\nNão dá pra ficar só\nbrincando o tempo todo, né?\nVocê é um adulto, então tem que trabalhar também?"
10032-140 = "Por isso, eu tenho\numa ótima proposta~..."
10032-150 = "Deixa que eu te ajudo!"
10032-160 = "Hmm, será que é\nporque estou vestida assim~?\nSinto que estou me\nempolgando um pouquinho mais!"
10032-170 = "Vamos, vamos, Sensei, força!\nTermine o trabalho rapidinho,\ne depois vamos brincar de montão!"
10032-180 = "Pensar que eu e o Sensei\nestaríamos juntos por taaanto tempo..."
10032-190 = "Será que isso já é o destino!?"
10032-200 = "Feliz aniversáriooo, Sensei!\nEu lembrei direitinho, viu!"
10032-210 = "O aniversário do Sensei,\ne a sua promessa de brincar comigo\npara seeempre... eu não vou\nesquecer de jeito nenhum! Kufufu~♪"
10032-220 = "Você vai\ncomemorar o meu aniversário?"
10032-230 = "Kufufu! Então,\no que será que eu vou pedir pra você fazer~...?"
10032-240 = "Hmmm, então vamos nós dois\nfazer alguma pegadinha!\nJuntos, com certeza vai ser divertido!"
10032-250 = "Feliz Ano Novo, Sensei!\nHappy New Year~!\nBonne Année~! Guten Tag!!"
10032-260 = "Hm? A última estava errada, você disse?\nAhaha, na mosca~!"
10032-270 = "Antes do Ano Novo, hoje é\nFeliz Natal, Sensei!"
10032-280 = "Kufufu, hoje também quero\nbrincar de montão com você, Sensei!"
10032-290 = "Gostosuras ou travessuras~!\nSendo assim, acho que\nvou devorar o Sensei~♪"
10032-300 = "Eeh~? Não pode?"
10032-320 = "Ahaha, que peeena!\nEu venci, Sensei!"
10032-330 = "Kufufu,\nvou reconhecer o seu\nesforço até aqui, mas~..."
10032-340 = "O mundo das competições é rigoroso,\nentão não tem jeito, né? Kufu~♪"
10032-350 = "Bom,\no que será que eu vou desenhar?\nUm círculo? Um X?\nOu prefere outra coisa?"
10032-360 = "Só por agora, eu faço o que\no Sensei pedir, sabia?"
10032-370 = "Ah, mas mudei de ideia.\nUsar símbolos normais\né meio sem graça..."
10032-380 = "Vou pintar o seu rosto\ninteirinho, de ponta a ponta!"
10032-2600 = "Ahaha, isso, isso!\nCom isso, a brincadeira vai ficar muito mais divertida!"