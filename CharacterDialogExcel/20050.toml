[translation]
20050-10 = "Blue! Ar, Kai, Bu!"
20050-20 = "Eu sou Ritsu Usuba, da Academia de Artes Wildhunt!\nPrazer em te conhecer!"
20050-30 = "Será que dá para colocar\nminhas obras ali?"
20050-40 = "Será que não dá para deixar\neste lugar um pouco mais\nventilado?\nAh! ...Talvez dê para\nfazer um buraco ali!"
20050-50 = "Que cheirinho bom\nde café...\nSerá que dá para expressar isso?"
20050-60 = "Hmm, vejamos, quais são as próximas importações..."
20050-70 = "Se eu levar esse bolo\ndaqui para casa...\nTenho certeza de que o pessoal\nda academia vai adorar!"
20050-80 = "Ei, Sensei, o que você estava fazendo?"
20050-90 = "Que dia lindo! \nVamos brincar, Sensei!"
20050-100 = "Atividades de clube? Eu adoro!\nPorque elas fazem todo mundo feliz!"
20050-110 = "Sabe, quando eu vejo pedras ou argila,\neu sinto que preciso..."
20050-120 = "Dar forma às crianças\nque estão lá dentro!\nE você, Sensei?"
20050-130 = "Só de olhar, não dá para saber\no tamanho..."
20050-140 = "Sensei, posso te dar um abraço bem apertado?"
20050-150 = "O Schale é um lugar tão confortável...\nÉ como tocar em mármore!"
20050-160 = "Sensei♪\nDeixa o trabalho de lado\ne vem brincar comigo!"
20050-170 = "Sensei, obrigado por ter nascido!"
20050-180 = "Eu sou tão feliz\npor ter você aqui, Sensei!"
20050-190 = "Ei, ei! Sabia?\nHoje é meu aniversário!"
20050-200 = "Hoje eu quero ficar\nbrincando com você o dia todo!"
20050-210 = "Feliz Ano Novo, Sensei!\nVamos ver o pessoal tocando o sino!"
20050-220 = "...Hã? Já acabou?"
20050-230 = "Sensei! Neve!! O mundo lá fora está todo branco!\nJá que estamos aqui, que tal\nfazermos uma escultura de neve juntos?"
20050-240 = "Sensei! Rápido, rápido!"
20050-250 = "Hoje é dia de batalha\npor doces e chocolates!"
20050-270 = "Ah..."
20050-280 = "Que fresquinho..."
20050-290 = "Este lugar não é incrível?"
20050-300 = "Dizem que é um reservatório\nsubterrâneo bem antigo..."
20050-310 = "Eles cavaram um buraco enorme,\nlevantaram várias colunas..."
20050-320 = "E esculpiram cada uma\ndelas..."
20050-330 = "...Não é lindo?"
20050-340 = "Eu queria muito\nque você visse isso, Sensei."
20050-350 = "Vem, chega mais perto."
20050-360 = "Vamos ver a mesma paisagem juntos."
20050-2600 = "Uau! Eu queria isso há tanto tempo!\nObrigado, Sensei! Estou muito feliz!"
