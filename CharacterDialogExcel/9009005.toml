[translation]
9009005-420 = "С возвращением, Сенсей.\nПожалуйста, выберите задачу."
9009005-430 = "Вы можете составить своё расписание\nпрямо здесь."
9009005-440 = "С какой работы\nвы бы хотели начать сегодня?"
9009005-450 = "Ваши студенты уже ждут.\nЯ обязательно поддержу вас, Сенсей."
9009005-460 = "Сенсей...\nВы совсем не изменились.\nЯ так рада."
9009005-470 = "Режим ожидания.\nВы можете свободно настроить расписание\nздесь."
9009005-480 = "Хм..."
9009005-490 = "Интересно, когда же появятся первые ростки?.."
9009005-500 = "...Давайте понаблюдаем за ними ещё немного."
9009005-510 = "Ах."