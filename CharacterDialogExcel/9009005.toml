[translation]
9009005-10 = "Conexão confirmada."
9009005-20 = "Sensei [USERNAME].\nEstava à sua espera."
9009005-30 = "É hora de começar o trabalho.\nSensei [USERNAME]."
9009005-40 = "Por qual trabalho vamos começar?\nSensei?"
9009005-50 = "Em espera.\nExistem muitas tarefas que\nprecisam ser resolvidas."
9009005-60 = "Aqui você pode gerenciar\nvários trabalhos, Sensei."
9009005-70 = "Sensei [USERNAME].\nPor favor, escolha o trabalho desejado."
9009005-80 = "Há muitos trabalhos que\nprecisam ser resolvidos.\nEntão, por favor."
9009005-90 = "Confusão. Ação incompreensível.\nNão me cutuque. Vou acabar quebrando."
9009005-100 = "Entendido. Então o Sensei não\ntem nada específico para fazer agora.\nEstá entediado, não é?"
9009005-110 = "Hmm..."
9009005-120 = "Hmm..."
9009005-130 = "..."
9009005-140 = "Ah...!"
9009005-150 = "Então é isso...\nEntendi como funciona."
9009005-160 = "...É assim que funciona."
9009005-170 = "Hum... entendo."
9009005-180 = "Hum...\nEntão essa é a estrutura."
9009005-190 = "...Ah."
9009005-200 = "Se começar a chover, com isso..."
9009005-210 = "Será que vai ser útil...?"
9009005-220 = "Eu também... junto com..."
9009005-230 = "Ah."
9009005-240 = "Ei, você consegue ver aquilo? Plana-chan?"
9009005-250 = "Está falando daquilo, Senpai?"
9009005-260 = "Sim! Aquilo mesmo!"
9009005-270 = "E quanto àquele lado?"
9009005-280 = "Hmm..."
9009005-290 = "...Ah."
9009005-300 = "Encarando"
9009005-310 = "Hmm..."
9009005-320 = "...Sinto um olhar sobre mim."
9009005-330 = "...Isso é incômodo."
9009005-340 = "Ah."
9009005-350 = "Autenticação concluída."
9009005-360 = "Bem-vindo,\nSensei [USERNAME]."
9009005-370 = "Processo de conexão do\nSensei confirmado.\nConto com você."
9009005-380 = "Shittim Chest, restrições removidas.\nProcesso \"Peret Uza\"\noperando de forma limitada."
9009005-390 = "Em espera.\nSensei, quais são suas ordens?"
9009005-400 = "Agora estou invencível,\nduas vezes mais forte que o normal."
9009005-410 = "Vou unir forças com a\nArona-senpai para\najudar o Sensei."
9009005-420 = "Bem-vindo de volta, Sensei.\nPor favor, escolha um trabalho."
9009005-430 = "Aqui você pode definir\na agenda do Sensei."
9009005-440 = "Por qual trabalho você quer\ncomeçar hoje?"
9009005-450 = "As alunas estão esperando.\nEu vou dar suporte ao Sensei."
9009005-460 = "O Sensei está...\ncomo sempre.\nFico aliviada."
9009005-470 = "Em espera.\nSinta-se à vontade para\nescolher sua agenda."
9009005-480 = "Hmm..."
9009005-490 = "Quando será que o broto vai nascer?"
9009005-500 = "...Vamos observar\nmais um pouco."
9009005-510 = "Ah."
