[translation]
10060-10 = "Blue Archive~♪"
10060-20 = "Ei! Onde você quer que eu escave? Ou prefere que eu desenterre algo? É só pedir!"
10060-30 = "Este é o lugar do Sensei...? Uau...!!"
10060-40 = "Não vai brotar uma fonte termal aqui, né?"
10060-50 = "Bem, é o lugar do Sensei, então... vou abrir uma exceção."
10060-60 = "Ué? Aquela pessoa é... Ah!"
10060-70 = "Tem muita gente aqui. É bem agitado, não é legal?"
10060-80 = "Ah, Sensei! Bem-vindo de volta. O que vamos fazer hoje? Criar uma fonte termal?"
10060-90 = "Eu estava te esperando, Sensei! Pode pedir o que quiser! Vou começar agora mesmo!"
10060-100 = "E então, o que eu devo fazer aqui?"
10060-110 = "Quer que eu te aqueça? Ou talvez..."
10060-120 = "Hm? Quando não tenho trabalho? ...O que eu costumo fazer mesmo?"
10060-130 = "Ah! Eu estava procurando trabalho!"
10060-140 = "Quando vejo algo emaranhado, não consigo me segurar."
10060-150 = "É mais rápido escavar tudo e começar do zero!"
10060-160 = "Está com fome? Quer que eu prepare um miojo?"
10060-170 = "Hã? Ferramentas?"
10060-180 = "...Vou usar isso aqui~♪"
10060-190 = "Se dá para ajustar a potência?"
10060-200 = "Dá sim! Provavelmente. Nunca tentei, mas dá!"
10060-210 = "Feliz aniversário, Sensei! Hoje o dia está fervendo!"
10060-220 = "Isso! Hoje é meu aniversário! O que eu quero de presente...?"
10060-230 = "Algo que dê para escavar?"
10060-240 = "Feliz Ano Novo~!"
10060-250 = "Este ano, por favor, me dê muitos trabalhos... e muitos obstáculos e terrenos para escavar!!"
10060-260 = "É hoje? O dia em que dão presentes para quem se comportou bem?"
10060-270 = "Legal! O que será que eu vou ganhar? Estou ansiosa!"
10060-280 = "Tem muita gente com roupas estranhas na cidade..."
10060-290 = "Talvez hoje eu consiga fugir mesmo se o Comitê Disciplinar me encontrar?"
10060-310 = "Ah! Era você mesmo, Sensei! Eu estava te esperando!"
10060-320 = "Estava ocupado? Desculpa! Mas é que estou com pressa!"
10060-330 = "Ah... é verdade, mas... isso não é uma fonte termal que brota para sempre."
10060-340 = "Só restam algumas horas! Eu queria que o Sensei viesse antes que secasse!"
10060-350 = "...Hã? É verdade? Eu que fiz sozinha!"
10060-360 = "Apesar da aparência, eu sou do Departamento de Desenvolvimento de Fontes Termais! E não consigo ignorar quem precisa de água quente."
10060-370 = "E acima de tudo, se o Sensei estiver envolvido, melhor ainda! ...Hehe!"
10060-380 = "Vamos, não seja tímido, entre! A temperatura está perfeita agora!"
10060-390 = "É uma fonte termal especial da Meg feita só para o Sensei!!"
10060-2600 = "Ué, é para mim? Por quê? Hum... eu sou meio boba, então não entendo muito bem... mas, bem, se eu me esforçar, tudo dá certo, né? Ahahaha!!"
