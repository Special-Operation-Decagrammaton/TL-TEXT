[translation]
10060-10 = "ブルーアーカイブ～♪"
10060-20 = "やっほ～！どこ削ってほしい？\nそれとも掘り起こしとく？なんでも言って～！"
10060-30 = "ここが、先生の…？\nおおっ…！！"
10060-40 = "温泉…は\n湧かないよねぇ。"
10060-50 = "ま、先生の場所だし。\nここは\n例外にしとこっと。"
10060-60 = "あれ？\nあの人は…ハッ！"
10060-70 = "人が多いね。\nわちゃわちゃしてて\nいいじゃん！"
10060-80 = "おっ、先生！おかえり～。\n今日は何する？温泉作る？"
10060-90 = "待ってたよ、先生！\n何でも言って！\nすぐに取りかかるから！"
10060-100 = "んで、私ここで\n何すればいいの？"
10060-110 = "あっためてあげよっか？\nそれとも…。"
10060-120 = "ん？仕事がない時？\n…なにしてたっけ？"
10060-130 = "あ！仕事探してた！"
10060-140 = "もつれてるの見ると\n我慢できないんだよね。"
10060-150 = "全部削って、最初から\nやり直したほうが早い！"
10060-160 = "お腹空いたの？\nカップ麺でも作ろっか？"
10060-170 = "え？道具？"
10060-180 = "…これで作るよ～♪"
10060-190 = "出力調整はできるのかって？"
10060-200 = "できるよ？多分。\nやったことないけどね！"
10060-210 = "お誕生日おめでとう、先生！\n今日はアツい日だね！"
10060-220 = "そ！今日は、私の誕生日！\n誕生日プレゼントで\n欲しいもの…？"
10060-230 = "削れるなにか？"
10060-240 = "あけましておめでとう～！"
10060-250 = "今年はもっとたくさんの\n仕事を…障害物と\n掘れる土地をください！！"
10060-260 = "今日だっけ？\nいい子にしてたら\nプレゼントが贈られる日って。"
10060-270 = "いいね！私は何が\nもらえんのかな？\n楽しみ！"
10060-280 = "街に不思議な\n格好の子がいっぱい…。"
10060-290 = "今日は風紀委員に\n見つかっても\n逃げられるかも？"
10060-310 = "あ～！\nやっぱ先生だったんだ！\n待ってたよ！"
10060-320 = "忙しかった？ごめん！\nでも急いでて！"
10060-330 = "ああ～\nそれはそうなんだけど…\nこれ、湧き続ける\n温泉じゃないんだ。"
10060-340 = "あと数時間しかなくて！\n枯れちゃう前に、\n先生に来て欲しかったんだ！"
10060-350 = "…え？そうだよ？\n一人で作ったよ！"
10060-360 = "こう見えても温泉開発部だし！\nそれに、お湯を求める人を\n見て見ぬふりなんてできないし。"
10060-370 = "なにより、先生が\n関わってるってなったらね！\n…ひひっ！"
10060-380 = "ささ！遠慮しないで入って！\n今が一番いい温度だから！"
10060-390 = "メグ特製の\n先生専用温泉だよ！！"
10060-2600 = "あれっ、くれるの？なんで？\nう～ん。私、バカだから\nよく分かんないけど…。\nま、一生懸命やりゃなんとかなるよね！\nあははは！！"
