[translation]
10033-10 = "ブルーアーカイブ……うふふ。"
10033-20 = "うふふ……ようやく見つけました。\nもう逃がしませんわ、あなた様♥\nもう私のお傍から、離れないでくださいね……？"
10033-30 = "いつもでしたら、\nこんなにゆったりとは\nできませんからね……"
10033-40 = "うふふふふ♡"
10033-50 = "ああっ、あなた様、\nどちらにいらっしゃる\nのですか？"
10033-60 = "あらあら。"
10033-70 = "ふふふ、\n困ってしまいますね。"
10033-80 = "今お戻りですか、先生？"
10033-90 = "このワカモ、こちらで\nあなた様のお帰りを"
10033-100 = "ずっと待っておりました。"
10033-110 = "お待ちしておりました、先生。\nふふふふふ♥"
10033-120 = "お望みは何でしょう？"
10033-130 = "たとえどのようなことで\nあっても、準備は\n出来ておりますので。"
10033-140 = "さあ、この私めに、\nどんなことでも\nご命令くださいませ。"
10033-150 = "全てあなた様のものです。\nこの身も、心も、全部。"
10033-160 = "お望みのことは、\n何でも仰ってください。"
10033-170 = "はい、何なりと♡"
10033-180 = "ああ、今すぐあなた様に\n抱きしめてほしいのに……"
10033-190 = "我慢しないといけないだなんて、\n何という過酷な\n試練なのでしょう……。"
10033-200 = "このお面が\nお気に召したのですか？"
10033-210 = "ふふっ、私も\nすごく気に入っております。"
10033-220 = "お望みでしたら、\nいつでも脱がせていただいて\n構いませんよ……？"
10033-230 = "……お面の中、\n気になりません？"
10033-240 = "あなた様が\nお生まれになった日……"
10033-250 = "こんなにも喜ばしい日に\nご一緒できるだなんて、\n夢のようです。"
10033-260 = "あら、私の誕生日、\n覚えていてくださったのですか？"
10033-270 = "ああ、嬉しいです……\n私、もう思い残すことは\n何ひとつございません……。"
10033-280 = "あけまして\nおめでとうございます。"
10033-290 = "今年もあなた様と一緒に、\n楽しい思い出を作れますよう。"
10033-300 = "クリスマス、恋人たちは一体\nどのようなことを\nするのでしょうか？"
10033-310 = "うふふふ、私、\nこういったことに\nあまり詳しくなくって♡"
10033-320 = "じっくりねっとり、\n教えていただけませんか？\nせ・ん・せ・い？"
10033-330 = "このお面は\nハロウィーン用では\nありませんのに。"
10033-340 = "先ほど通りすがりの方に\nそう聞かれて、\n少し悲しい気持ちに\nなってしまいました。"
10033-350 = "今お戻りですか、先生？"
10033-360 = "このワカモ、こちらで\nあなた様のお帰りを"
10033-370 = "ずっと待っておりました。"
10033-380 = "お待ちしておりました、先生。\nふふふふふ♥"
10033-390 = "お望みは何でしょう？"
10033-400 = "たとえどのようなことで\nあっても、準備は\n出来ておりますので。"
10033-410 = "さあ、この私めに、\nどんなことでも\nご命令くださいませ。"
10033-420 = "全てあなた様のものです。\nこの身も、心も、全部。"
10033-430 = "お望みのことは、\n何でも仰ってください。"
10033-440 = "はい、何なりと♡"
10033-450 = "ああ、今すぐあなた様に\n抱きしめてほしいのに……"
10033-460 = "我慢しないといけないだなんて、\n何という過酷な\n試練なのでしょう……。"
10033-470 = "私の顔なんて、そんなに\n見つめられましても……。"
10033-480 = "素顔をお見せするのは、\nあなた様にだけですから……。"
10033-490 = "……ですが、そんなに\n見つめられてしまいますと……\n恥ずかしいです。"
10033-500 = "あなた様が\nお生まれになった日……"
10033-510 = "こんなにも喜ばしい日に\nご一緒できるだなんて、\n夢のようです。"
10033-520 = "あら、私の誕生日、\n覚えていてくださったのですか？"
10033-530 = "ああ、嬉しいです……\n私、もう思い残すことは\n何ひとつございません……。"
10033-540 = "あけまして\nおめでとうございます。"
10033-550 = "今年もあなた様と一緒に、\n楽しい思い出を作れますよう。"
10033-560 = "クリスマス、恋人たちは一体\nどのようなことを\nするのでしょうか？"
10033-570 = "うふふふ、私、\nこういったことに\nあまり詳しくなくって♡"
10033-580 = "じっくりねっとり、\n教えていただけませんか？\nせ・ん・せ・い？"
10033-600 = "嬉しいです……！\nこのワカモ、全てはこうして\nあなた様と会うためだけに……！"
10033-610 = "どうにか直接、\nこの気持ちを、この想いを、\nお伝えしたくって……"
10033-620 = "こうしてお会いできたのも\nきっと、赤い糸で結ばれた\n運命のお導き……。"
10033-630 = "あ、あぁ…… そ、そんなに\n見つめられては……！"
10033-640 = "いくら私といえども、\n恥ずかしく\nなってしまいます……。"
10033-650 = "あなた様のその視線だけで、\n身体のあちこちから、\nもどかしさが溢れ出して……っ。"
10033-660 = "ですが…… あなた様が\nそうお望みなのであれば……\nはい♡"
10033-670 = "さあ、どうぞこちらへ。\nもっともっと、私のお傍に……\nうふふふふっ♡"
10033-2600 = "さあ、このワカモ、\nすでに準備はできております。\nこれを使って、あなた様の敵を\n余すことなく排除いたします。\nふふふふふふふ……。"
