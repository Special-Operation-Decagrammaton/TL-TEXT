[translation]
10033-10 = "Blue Archive…… ufufu."
10033-20 = "Ufufu…… finalmente encontrei você.\nNão vou deixar você escapar, meu querido♥\nPor favor, não se afaste mais do meu lado……?"
10033-30 = "Se fosse em tempos normais,\nnão conseguiríamos ficar\ntão relaxados assim……"
10033-40 = "Ufufufufu♡"
10033-50 = "Ah, meu querido,\nonde você está?"
10033-60 = "Ora, ora."
10033-70 = "Fufufu,\nque situação complicada."
10033-80 = "Já está de volta, Sensei?"
10033-90 = "Eu, Wakamo, fiquei aqui\nesperando pelo seu retorno"
10033-100 = "o tempo todo."
10033-110 = "Estava à sua espera, Sensei.\nFufufufufu♥"
10033-120 = "Qual é o seu desejo?"
10033-130 = "Não importa o que seja,\nestou pronta para atender."
10033-140 = "Vamos, pode me ordenar\nqualquer coisa que desejar."
10033-150 = "Tudo é seu.\nMeu corpo, meu coração, tudo."
10033-160 = "Diga-me o que deseja,\nseja o que for."
10033-170 = "Sim, qualquer coisa que pedir♡"
10033-180 = "Ah, eu queria tanto que você\nme abraçasse agora mesmo……"
10033-190 = "Ter que me conter assim,\nque provação cruel\nesta é……."
10033-200 = "Você gostou\ndesta máscara?"
10033-210 = "Fufu, eu também\ngosto muito dela."
10033-220 = "Se você desejar,\npode tirá-la de mim\na qualquer momento……?"
10033-230 = "……Não tem curiosidade\nsobre o que há por trás da máscara?"
10033-240 = "O dia em que você\nnasceu……"
10033-250 = "Poder estar com você em um dia\ntão feliz como este,\nparece um sonho."
10033-260 = "Ora, você se lembrou\ndo meu aniversário?"
10033-270 = "Ah, estou tão feliz……\nNão tenho mais nenhum\narrependimento na vida……."
10033-280 = "Feliz Ano Novo."
10033-290 = "Espero que possamos criar\nmemórias felizes juntos este ano também."
10033-300 = "No Natal, o que será que\nos casais costumam\nfazer?"
10033-310 = "Ufufu, eu não entendo\nmuito bem dessas coisas♡"
10033-320 = "Poderia me ensinar\ncom calma e carinho?\nSe-n-se-i?"
10033-330 = "Esta máscara não é\npara o Halloween, sabe."
10033-340 = "Alguém que passou por mim\nme perguntou isso,\ne fiquei um pouco triste."
10033-350 = "Já está de volta, Sensei?"
10033-360 = "Eu, Wakamo, fiquei aqui\nesperando pelo seu retorno"
10033-370 = "o tempo todo."
10033-380 = "Estava à sua espera, Sensei.\nFufufufufu♥"
10033-390 = "Qual é o seu desejo?"
10033-400 = "Não importa o que seja,\nestou pronta para atender."
10033-410 = "Vamos, pode me ordenar\nqualquer coisa que desejar."
10033-420 = "Tudo é seu.\nMeu corpo, meu coração, tudo."
10033-430 = "Diga-me o que deseja,\nseja o que for."
10033-440 = "Sim, qualquer coisa que pedir♡"
10033-450 = "Ah, eu queria tanto que você\nme abraçasse agora mesmo……"
10033-460 = "Ter que me conter assim,\nque provação cruel\nesta é……."
10033-470 = "Mesmo que você fique me encarando\nassim……"
10033-480 = "Eu só mostro meu rosto verdadeiro\npara você……"
10033-490 = "……Mas, se você continuar me olhando\nassim……\nEu fico envergonhada."
10033-500 = "O dia em que você\nnasceu……"
10033-510 = "Poder estar com você em um dia tão feliz... parece até um sonho."
10033-520 = "Ora, você se lembrou do meu aniversário?"
10033-530 = "Ah, estou tão feliz... Agora, não tenho mais nenhum arrependimento nesta vida..."
10033-540 = "Feliz Ano Novo."
10033-550 = "Espero que possamos criar memórias felizes juntos este ano também."
10033-560 = "O que será que os casais fazem no Natal?"
10033-570 = "Ufufu, eu não entendo muito bem dessas coisas...♡"
10033-580 = "Poderia me ensinar com calma e dedicação? P-r-o-f-e-s-s-o-r?"
10033-600 = "Estou tão feliz...! Eu, Wakamo, existo apenas para encontrar você desta forma...!"
10033-610 = "Eu queria tanto poder expressar meus sentimentos e pensamentos diretamente a você..."
10033-620 = "O fato de termos nos encontrado assim deve ser, certamente, guiado pelo destino e pelo fio vermelho que nos une..."
10033-630 = "A-ah... S-se você me olhar desse jeito..."
10033-640 = "Mesmo eu, acabo ficando envergonhada..."
10033-650 = "Apenas com esse seu olhar, uma inquietação transborda por todo o meu corpo...!"
10033-660 = "Mas... se é isso que você deseja... então, sim...♡"
10033-670 = "Venha, aproxime-se. Fique ainda mais perto de mim... Ufufufufu...♡"
10033-2600 = "Muito bem, eu, Wakamo, já estou preparada. Usarei isto para eliminar todos os seus inimigos, sem deixar um sequer. Fufufufufufu..."
