[translation]
10107-10 = "ブル～アーカイブ～！"
10107-20 = "号外！ごうが～い！\n万魔殿の書紀、元宮チアキが\nシャーレに到着しましたよ～！"
10107-30 = "ここ、\n面白いですね～！"
10107-40 = "これはスクープの\n予感がします！"
10107-50 = "あ！あの方と\n友達になりたいです！"
10107-60 = "ここに「週刊万魔殿」の\nスタンドを\n置いたら……"
10107-70 = "これは！\nイブキちゃん大喜び\n間違いなしですね！"
10107-80 = "あっ！先生おかえりなさい～！"
10107-90 = "早速インタビューを\n始めたいんですが、\nいいですか～？"
10107-100 = "こんにちは、先生～！\n今日も一日、\n張り切っていきましょう～！"
10107-110 = "は～い！\n元宮チアキ、\nただいま待機中で～す！"
10107-120 = "何かネタ……\nお手伝いすることは\nありますか～？"
10107-130 = "今週の「週刊万魔殿」、\n読みました？"
10107-140 = "特別付録の「かわいい\nイブキちゃんブロマイド」が\nもう最高で！"
10107-150 = "これ、来週の「週刊万魔殿」に\n載せるマコト先輩の\n写真なんですけど～"
10107-160 = "……はい？\n小さすぎて全然見えない？"
10107-170 = "お仕事中の先生の姿！\nはい！目線くださ～い！"
10107-180 = "表情固いですよ～\nはい、リラックスリラックス～"
10107-190 = "書記としても、当番としても、\nなんでもやりますから！"
10107-200 = "いつでも言ってくださいね、\n先生！"
10107-210 = "お誕生日\nおめでとうございます！"
10107-220 = "「先生が生まれた日」特集を\n組んでみました！"
10107-230 = "それではインタビューの回答、\nお願いします！"
10107-240 = "あれっ、そういえば\n私の誕生日でしたね。"
10107-250 = "編集に夢中で忘れてました～！\nあはは、\nありがとうございます～！"
10107-260 = "明けまして\nおめでとうございます！"
10107-270 = "先生には「週刊万魔殿」の\n新年号、最初の読者に\nなっていただきます！"
10107-280 = "メリークリスマスです～！"
10107-290 = "ささ、ツリーの前に\n立ってください！\n写真、撮りますよ～！"
10107-300 = "今日のこの日をず～っと、\n楽しみにしてました！"
10107-310 = "街中に変わった人がいっぱい！\n友達になってきますね～！"
10107-330 = "あははっ！\nシャッターチャンス、\nとらえました！"
10107-340 = "居眠りする先生の顔！\n次号の表紙にピッタリです！"
10107-350 = "これで「週刊万魔殿」特集号の\n準備は万全！"
10107-360 = "さっすが私！\nまたスクープを\nゲットしちゃいました～！"
10107-370 = "ふふっ、書記の行動力、\n侮っちゃいけませんよ～？"
10107-380 = "そうだ！この勢いで、\n先生の謎に\n迫っていきましょうか……？"
10107-390 = "靴下に空いた穴の謎、\nとか……！"
10107-400 = "えっ！意地悪な子は\n「机の下閉じ込めの刑」に\n処す……！？"
10107-410 = "ご、ごめんなさ～い！\n出してください～！"
10107-2600 = "やった～！すっごく嬉しいです！\n特ダネゲットした時と\n同じかそれ以上に……！"
