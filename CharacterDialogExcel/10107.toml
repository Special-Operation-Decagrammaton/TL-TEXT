[translation]
10107-10 = "Blue Archive!"
10107-20 = "Edição extra! Edição extra!\nChiaki Motomiya, a secretária do Pandemonium,\nchegou ao Schale!"
10107-30 = "Aqui é\ninteressante, né!"
10107-40 = "Sinto que isso vai ser\num furo de reportagem!"
10107-50 = "Ah! Eu quero\nficar amiga daquela pessoa!"
10107-60 = "Se eu colocar um expositor\ndo \"Pandemonium Semanal\"\naqui..."
10107-70 = "Isso é!\nA Ibuki-chan com certeza\nvai ficar muito feliz!"
10107-80 = "Ah! Sensei, bem-vindo de volta!"
10107-90 = "Eu queria começar a entrevista\nimediatamente, pode ser?"
10107-100 = "Olá, Sensei!\nVamos dar o nosso melhor\nhoje também!"
10107-110 = "Sim!\nChiaki Motomiya,\naguardando ordens!"
10107-120 = "Tem algum furo...\nou algo em que eu possa ajudar?"
10107-130 = "Você leu o \"Pandemonium Semanal\"\ndesta semana?"
10107-140 = "O brinde especial, o \"card colecionável\nda fofa Ibuki-chan\",\nestá incrível!"
10107-150 = "Esta é uma foto da Makoto-senpai\nque vou colocar na edição\nda semana que vem..."
10107-160 = "...Sim?\nEstá pequena demais e não dá para ver?"
10107-170 = "Sensei trabalhando! \nIsso! Olhe para a câmera, por favor!"
10107-180 = "Sua expressão está muito tensa!\nIsso, relaxa, relaxa..."
10107-190 = "Como secretária ou como assistente,\neu faço qualquer coisa!"
10107-200 = "Pode me pedir a qualquer hora,\nSensei!"
10107-210 = "Feliz\naniversário!"
10107-220 = "Preparei uma edição especial\nsobre o \"Dia em que o Sensei nasceu\"!"
10107-230 = "Então, por favor, responda\nàs perguntas da entrevista!"
10107-240 = "Ah, é verdade, hoje\né o meu aniversário."
10107-250 = "Eu estava tão focada na edição que esqueci!\nAhaha,\nobrigada!"
10107-260 = "Feliz\nAno Novo!"
10107-270 = "Sensei, você será o primeiro leitor\nda edição de Ano Novo\ndo \"Pandemonium Semanal\"!"
10107-280 = "Feliz Natal!"
10107-290 = "Vamos, fique na frente\nda árvore!\nVou tirar uma foto!"
10107-300 = "Eu estava esperando por este dia\nhá muito tempo!"
10107-310 = "Tem muita gente estranha na cidade!\nVou lá fazer amizade com eles!"
10107-330 = "Ahaha!\nCapturei o momento\nperfeito!"
10107-340 = "O rosto do Sensei cochilando!\nÉ perfeito para a capa da próxima edição!"
10107-350 = "Com isso, a edição especial do\n\"Pandemonium Semanal\" está pronta!"
10107-360 = "Como esperado de mim!\nConsegui outro furo\nde reportagem!"
10107-370 = "Hehe, não subestime a capacidade\nde ação de uma secretária, viu?"
10107-380 = "Já sei! Com esse ímpeto,\nque tal investigarmos os mistérios\ndo Sensei...?"
10107-390 = "Como o mistério do buraco\nna sua meia...!"
10107-400 = "Ei! Crianças malvadas serão\n\"condenadas a ficar presas debaixo da mesa\"...!?"
10107-410 = "D-desculpa!\nMe tira daqui!"
10107-2600 = "Eba! Estou muito feliz!\nIgual ou até mais do que quando\nconsigo um furo de reportagem...!"
