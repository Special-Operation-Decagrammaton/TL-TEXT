[translation]
23003-20 = "Estou feliz em te ver, Sensei.\nVou te mostrar o poder\nda Millennium."
23003-30 = "Será que não dá para fazer\nas máquinas de venda automática\nliberarem apenas\nbebidas energéticas...?"
23003-40 = "Hmm... Acho que vou tirar\num cochilo antes de\ncontinuar, sabe?"
23003-50 = "Estou precisando de açúcar..."
23003-60 = "Se eu consertar isso aqui e\najustar aquilo ali...\nPronto.\nSerá que eu deveria modificar agora mesmo?"
23003-70 = "Hmm. Ah? Ah, o que eu estou fazendo?\nEu estava jogando um jogo novo."
23003-80 = "Ei, Sensei.\nAceita um café?"
23003-90 = "Bem-vindo, Sensei.\nVocê chegou cerca de 43 segundos\nmais cedo do que eu previ."
23003-100 = "Pode não parecer, mas\neu sou muito boa em jogos."
23003-110 = "Quer tentar jogar contra mim\numa vez, Sensei?"
23003-120 = "Trapaça...?"
23003-130 = "Por mais que eu seja uma hacker,\neu nunca usaria isso em um jogo\nque estou jogando apenas\npor diversão."
23003-140 = "O que nós fazemos\nparece tão radical assim?"
23003-150 = "O conhecimento deve ser livre..."
23003-160 = "Sim, é uma frase muito boa."
23003-170 = "Este refrigerante doce é a\nbebida das pessoas inteligentes."
23003-180 = "Feliz aniversário, Sensei."
23003-190 = "Hoje, vou te conceder a bênção\nde Hare para que, não importa\nqual código você escreva,\nnão apareça nenhum bug."
23003-200 = "Hmm, o Raspberry Pi que eu\nmencionei não é\neste aqui, mas..."
23003-210 = "De qualquer forma, obrigada\npor celebrar o meu aniversário."
23003-220 = "Olá,\nnovo mundo."
23003-230 = "Você sabia disso, Sensei?"
23003-240 = "O Natal é o dia do ano em que\n“aquilo” acontece\ncom mais frequência."
23003-250 = "Fufu, é isso mesmo...\nÉ hacking."
23003-260 = "Se eu não vou sair para\naproveitar o festival lá fora?"
23003-270 = "O festival de Halloween também\nacontece dentro\ndos monitores."
23003-290 = "Ufa...\nUma chuva repentina logo agora."
23003-300 = "Ultimamente, nem dá para confiar\nna previsão do tempo, é complicado."
23003-310 = "Bem... O que vamos fazer\ndaqui para frente?"
23003-320 = "(Hmm... Será que o que eu disse\nsoou de um jeito estranho?)"
23003-330 = "(Mas é a minha primeira vez em uma\nlan house, e eu nem sei o que as\npessoas costumam fazer\nem lugares assim...)"
23003-340 = "(Além disso, este espaço é\ntão apertado...\nO rosto do Sensei está tão perto...)"
23003-350 = "Ei, v-você vai tomar banho primeiro?\nEspere, o quê, por que?!"
23003-360 = "Ah, para lavar o cabelo porque\nse molhou na chuva? ...Desculpe,\nnão, não ligue para isso."
23003-370 = "Então as lan houses também\ntêm chuveiros, né?"
23003-380 = "Ah, olha só, Sensei.\nO bar de bebidas é de graça.\nSerá que tem energético?"
23003-390 = "Internet liberada, bebidas de graça.\nIsso é maravilhoso, é um espaço\nperfeito para pessoas\ncomo eu."
23003-400 = "Dá para ficar aqui\npara sempre, não dá?"
23003-410 = "Ah, bem... O que eu disse agora\nnão teve segundas intenções.\nNão me entenda mal..."
23003-2600 = "É uma arma antiga, mas... ela carrega\nmemórias que não podem ser quantificadas."
