[translation]
23003-20 = "会えて嬉しい、先生。\nミレニアムの力を、\n先生に見せてあげる。"
23003-30 = "自販機から\nエナジードリンクだけが\n出るようには\nできないのかな…？"
23003-40 = "ううーん…。\nちょっと一眠りしてから\n続けようかな？"
23003-50 = "糖分が足りない…。"
23003-60 = "これをこうやって直して、\nあそこをああやって直せば…\nよし。\nすぐ改造してみようかな？"
23003-70 = "ふーん。うん？\nああ、何してるかって？\n新作のゲームを やってたの。"
23003-80 = "や、先生。\nコーヒーはいかが？"
23003-90 = "ようこそ、先生。\n私の予想より約43秒\n早く到着したね。"
23003-100 = "こう見えてゲームは\n結構上手い方だよ。"
23003-110 = "先生も一度相手してみる？"
23003-120 = "チート…？"
23003-130 = "いくらハッカーでも、\n楽しさのためにやってる\nゲームにそんなのを\n使うはずないでしょ。"
23003-140 = "私たちがやることが、\nそんなに過激に見えた?"
23003-150 = "知識は自由であるべき…。"
23003-160 = "うん、やっぱりいい言葉だね。"
23003-170 = "この甘い炭酸飲料こそ\n知性ある人の飲み物だよ。"
23003-180 = "お誕生日おめでとう、先生。"
23003-190 = "今日一日はどんな\nコードを書いても\nバグが出ないハレの\nご加護を授けよう。"
23003-200 = "うーん、私が言った\nラズベリーパイは\nこれじゃないけど…。"
23003-210 = "でも誕生日を\n祝ってくれて\nありがとう。"
23003-220 = "ハロー、\nニューワールド。"
23003-230 = "あれ知ってる、先生？"
23003-240 = "クリスマスは1年の中で\n“あれ”が一番多く\n行われる日なの。"
23003-250 = "ふふ、それはそう…\nハッキングだよ。"
23003-260 = "外のお祭りを楽しみに\n出かけないのかって?"
23003-270 = "ハロウィーンのお祭りは\nモニターの中でも\n開かれているもの。"
23003-290 = "ふう…\n急に夕立だなんて。"
23003-300 = "最近は、天気予報も\n信頼できなくて困るね。"
23003-310 = "さて…\nこの後、何をしようか？"
23003-320 = "（ん…今の言葉、もしかして\n変な意味に聞こえたかな？）"
23003-330 = "（でも、ネットカフェなんて\n私も初めてだし、\n普通こういう所で\n何をするものなのか\nも知らないし…）"
23003-340 = "（というかこの空間、\n狭くて…\n先生の顔が近い…っ）"
23003-350 = "え、さ、先にシャワーを\n浴びてくるって？\nちょっと、なっ、どうして？！"
23003-360 = "あ、雨に濡れたから、\n髪を洗いに？…ごめん、\nいや、気にしないで。"
23003-370 = "ネットカフェには、\nシャワーの設備もあるんだね。"
23003-380 = "あ、見て、先生。\nドリンクバーが無料だって。\nエナジードリンクもあるかな？"
23003-390 = "ネットも自由に使えるし、\nドリンクも無料だし。\nこれは素晴らしい、\n完全に私のような\n人間のための空間。"
23003-400 = "ここになら、\nいつまででもずっと\nいられそうだね？"
23003-410 = "あ、えっと…今のも、\n別に変な意味ではないから。\n誤解しないでね…。"
23003-2600 = "古い武器だけど……この武器には\n数値化できない思い出が込められてる。"
