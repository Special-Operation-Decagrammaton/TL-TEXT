[translation]
10000-20 = "Fufu, quer colaborar comigo?\nBem, eu não vou recusar.\nMas saiba que me contratar sai caro, viu? Sensei."
10000-30 = "Se o meu escritório\nfosse decorado assim..."
10000-40 = "Quanto será que custa\no aluguel daqui?"
10000-50 = "Fufufu.\nO futuro da Problem Solver 68\né brilhante."
10000-60 = "Ah, isso me faz\nlembrar da época\ndo ensino fundamental."
10000-70 = "Eu deveria fazer uma festa de\ncomemoração com meus funcionários\nem um lugar assim algum dia."
10000-80 = "Sensei! Bem-vindo.\nHoje também, eu mesma\nvou te proteger!"
10000-90 = "Eu estava te esperando.\nNão importa o pedido, a Problem Solver 68\nsempre o cumprirá!"
10000-100 = "Fufu.\nEstou ansiosa pela nossa\ncolaboração, Sensei."
10000-110 = "Ahaha!\nVocê quer ver as minhas\nhabilidades, não é?"
10000-120 = "…Eh?\nNão é isso?"
10000-130 = "Hora extra até tarde hoje…?\nEntão, como vamos fazer\ncom o nosso encontro de hoje à noite?"
10000-140 = "N-não tínhamos esse compromisso?\nAh, ahaha!\nÉ verdade, que cabeça a minha."
10000-150 = "Fufu. Sensei. A investigação da minha\nProblem Solver 68 é impecável.\nFeliz aniversário."
10000-160 = "Eh, foi ontem?\nDes... desculpe..."
10000-170 = "…Não tem como ser isso!\nÉ hoje mesmo, eu tenho certeza!!"
10000-180 = "Trate de se lembrar,\nhoje é o meu aniversário!"
10000-190 = "Algum dia, isso vai se tornar\num feriado em Kivotos."
10000-200 = "Feliz Ano Novo. Bem,\nnão importa o pedido deste ano,\neu vou garantir o melhor resultado."
10000-210 = "Natal, hein…\nFalando nisso,\no último pedido que recebemos"
10000-220 = "foi a eliminação do\n\"Papai Noel\"…"
10000-230 = "Uwaaaaah!\nQ-que coisa estranha é essa!"
10000-240 = "N-não, eu não estou\nsurpresa nem um pouco,\né verdade!!"
10000-260 = "(Fufu, não fique aí babando\nenquanto me vê trabalhar, viu?)"
10000-270 = "(Espera, não é um número errado!\nNós não somos uma loja de sushi, sabia!?)"
10000-280 = "Hmm. Que complicado. Nós estamos\ncom a agenda bem cheia\nno momento."
10000-290 = "(Entrega? É óbvio\nque não fazemos isso!)"
10000-300 = "Sim, sim, sim.\nEu entendo."
10000-310 = "(Perceba logo que ligou errado e desligue,\nque conversa longa, meu Deus…)"
10000-320 = "Hmm. É um problema difícil.\nNo balanço contábil deste período…\npor causa das taxas de juros recentes…"
10000-330 = "(Eu não estou perguntando\no preço do sushi!)"
10000-340 = "Ah, sim.\nEu confirmei.\nEntendo."
10000-350 = "(Eu não perguntei\nquais são suas preferências de sushi…\nQuem é essa pessoa?)"
10000-360 = "Hm?\nSe não é um\nengano telefônico?"
10000-370 = "O-o que você está dizendo?\nEu estou trabalhando de verdade!"
10000-2600 = "Fufufu. Com isso……\nqualquer coisa acaba com um único disparo."
