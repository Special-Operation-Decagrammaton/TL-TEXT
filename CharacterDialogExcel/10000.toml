[translation]
10000-20 = "ふふ、この私に協力したいと？\nまあ、断りはしないけど。\n私を雇うなら高くつくわよ？先生。"
10000-30 = "我が事務所も\nこんな風に飾ったら…"
10000-40 = "ここの家賃、\nどれぐらいかしら。"
10000-50 = "ふふふ。\n便利屋の未来は\n明るいわ。"
10000-60 = "はあ、\n中学校の頃を\n思い出すわね。"
10000-70 = "我が職員たちと\n一度はこんなところで\n打ち上げしなくちゃね。"
10000-80 = "先生！いらっしゃい。\n今日もこの私が\n先生を警護してあげるわ！"
10000-90 = "待ってたわ。\nどんな依頼でも、便利屋は必ず\n遂行するから！"
10000-100 = "ふふっ。\n先生とのコラボレーション、\n期待してるわよ。"
10000-110 = "あはは！\nこの私の能力を見たいのね？"
10000-120 = "…え？\n違うの？"
10000-130 = "今日は遅くまで残業…？\nじゃあ今夜のデートは\nどうするつもり？"
10000-140 = "そ、そんな約束なかった？\nあ、あはは！\nそうだったわね、私ったら。"
10000-150 = "ふふ。先生。我が便利屋の\n調査にスキはない。\nお誕生日おめでとう。"
10000-160 = "えっ昨日だったの？\nご…ごめん…。"
10000-170 = "…ってそんなわけないでしょ！\n今日で合ってるわよ！！"
10000-180 = "ちゃんと覚えておいて、\n今日はこの私の誕生日なの！"
10000-190 = "いつかキヴォトスの\n祝日になるんだから。"
10000-200 = "明けましておめでとう。まあ、\n今年もどんな依頼であろうと、\n最高の結果にしてみせるから。"
10000-210 = "クリスマスか…。\nそういえば\n直近で受けた依頼は"
10000-220 = "「サンタクロース」の\n排除だったわね…。"
10000-230 = "うわあああっ！\nな、なにその変なのは！"
10000-240 = "ち、ちがう、\n全然驚いてないわ、\n本当よ！！"
10000-260 = "（ふふっ、私の働く姿に\n見惚れちゃ困るわよ？）"
10000-270 = "（って、かけ間違いじゃ\nないの！うちはお寿司屋さん\nじゃないんだけど！？）"
10000-280 = "うーん。困りましたね。\nうちは今、スケジュールが\nキツキツでして。"
10000-290 = "（配達？しないに\n決まってるでしょう！）"
10000-300 = "ええ、はい、はい。\n分かります。"
10000-310 = "（早くかけ間違いだって\n気づいて切りなさいよ、\n話長いわよ…）"
10000-320 = "うーん。難しい問題ですね。\n今期の会計上では…\n近頃の金利の問題で…。"
10000-330 = "（お寿司の値段\n聞いてんじゃないわよ！）"
10000-340 = "ああ、はい。\n確認いたしました。\nなるほど。"
10000-350 = "（あなたのお寿司の\n好みなんか\n聞いてないわよ…。\n何なの、この人）"
10000-360 = "ん？\n間違い電話じゃ\nないのかって？"
10000-370 = "な、何言ってるの？\nちゃんと仕事中よ！"
10000-2600 = "ふふふ。これなら……\n何だろうと一発でお終いね。"
