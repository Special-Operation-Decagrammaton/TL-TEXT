[translation]
20015-10 = "ブル～～アーカイブッ！"
20015-20 = "修行部のマスコット、ババンと登場！\nお待たせ先生！で、今日は何しよっか？"
20015-30 = "ふぁ、ねむ……\n目が、もう……\nんむ……"
20015-40 = "私の測定によると……\nここは、鬼ごっこに\n最適な場所！"
20015-50 = "ふんふん～♪\nねぇねぇ、\n今日は何する？"
20015-60 = "素敵なレディーになる\nためには、休息も大切\n……！って、\nこの間TVで見た！"
20015-70 = "ツバキ先輩と\nミモリ先輩\n今は何してるのかな～"
20015-80 = "あっ、先生！\n待ってた待ってた！\n今日は何をする？"
20015-90 = "先生遅い！\nもう『ムシクィーン』\n始まっちゃうよ！？"
20015-100 = "今日は何をして……"
20015-110 = "も、もちろん宿題もやるけど！"
20015-120 = "素敵なレディーになるためには、\n毎日の鍛錬が必須！"
20015-130 = "え、鍛錬の内容？"
20015-140 = "今日はとりあえず、\n縄跳び100回！"
20015-150 = "あ、先生知ってる？\nキヴォトスにも正義の\nヒーローがいるんだって！"
20015-160 = "たしか、カイテン……\n何だっけ？"
20015-170 = "え、正義のヒーローじゃないの？\nちょっと違う？"
20015-180 = "……うーん、なんか大人の\n事情があるの？難しいね。"
20015-190 = "先生は今日も仕事？\n仕事って、そんなに面白い？"
20015-200 = "……え、先生？\n何でそんな顔してるの？"
20015-210 = "だ、大丈夫……！？\n何かごめん……"
20015-220 = "心配しないで、\n私がいてあげるから！"
20015-230 = "これも将来、立派なレディーに\nなるための訓練だから"
20015-240 = "今日は私が、\n先生の秘書になってあげる！\nえへへっ！嬉しい？"
20015-250 = "あっ、先生！\nお誕生日おめでとう！"
20015-260 = "はい！今日のために\n用意した、私からの\n特別な誕生日プレゼント！"
20015-270 = "え、中身？\n私がこないだ捕まえたセミだよ！"
20015-280 = "ほらほら、早く開けて！"
20015-290 = "え、お誕生日？"
20015-300 = "うん、ありがとー先生！\nこれで私も、立派なレディに\nまた一歩近付いたかな？"
20015-310 = "そうだと良いなっ！"
20015-320 = "あけましておめでとう、先生！"
20015-330 = "え、お年玉くれるの？\n本当に？"
20015-340 = "やったーー！先生大好き！"
20015-350 = "メリークリスマ～ス！\nツバキ先輩とミモリ先輩を呼んで"
20015-360 = "みんなでパーティーしよ！\n早くチキン食べたい！"
20015-370 = "この間、TVで見たんだけど……\nハロウィンって、お菓子メーカー\nの陰謀なんだって！"
20015-380 = "純粋な夢を利用するなんて\n許せない！断固反対！"
20015-390 = "……え？このお菓子、\n私にくれるの？"
20015-400 = "やったー！\nえへへっ、ありがと！"
20015-420 = "……ふふっ。"
20015-430 = "なんだか今日は、\n色んな事があったなー。"
20015-440 = "色々バタバタの\n一日だったけど……。"
20015-450 = "先生のおかげで、\nまた一歩立派なレディーに\n近付けたかも！？"
20015-460 = "ありがとね、先生！"
20015-470 = "いつも私のこと、\n手伝ってくれて！"
20015-480 = "本当！？やった！"
20015-490 = "じゃあこの嬉しい気持ちを\n込めて……先生に攻撃！"
20015-500 = "くらえ、「ドリルホーンの\nウサギ・究極体」の\nドリルインパクトー！！"
20015-510 = "にひひっ！"
20015-2600 = "うぉー、カッコイイ……へえ……おお……\nわぁ……これ、もしかしてもっと\n強くなれるやつ？あははっ！\n私、さらにパワーアップしちゃいそう！\n先生、ありがとー！"
