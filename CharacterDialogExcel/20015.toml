[translation]
20015-10 = "Blue Archive!"
20015-20 = "A mascote do Clube de Treinamento, Baban, chegou com tudo!\nEsperei por você, Sensei! Então, o que vamos fazer hoje?"
20015-30 = "Ah, que sono...\nMeus olhos estão, já...\nNhm..."
20015-40 = "De acordo com as minhas medições...\nEste é o lugar perfeito\npara um pega-pega!"
20015-50 = "Hum hum~♪\nEi, ei,\no que vamos fazer hoje?"
20015-60 = "Para me tornar uma dama elegante,\ndescansar também é importante\n...! Foi o que eu vi na TV outro dia!"
20015-70 = "O que será que a Tsubaki-senpai\ne a Mimori-senpai\nestão fazendo agora?"
20015-80 = "Ah, Sensei!\nEu estava te esperando! Esperando mesmo!\nO que vamos fazer hoje?"
20015-90 = "Sensei, você está atrasado!\nO 'Mushiking' já vai\ncomeçar, sabia!?"
20015-100 = "O que vamos fazer hoje..."
20015-110 = "E-eu também vou fazer a lição de casa, claro!"
20015-120 = "Para me tornar uma dama elegante,\no treinamento diário é essencial!"
20015-130 = "Ah, quer saber o conteúdo do treinamento?"
20015-140 = "Hoje, por enquanto,\nvou pular corda 100 vezes!"
20015-150 = "Ah, Sensei, você sabia?\nDizem que Kivotos também tem\num herói da justiça!"
20015-160 = "Se não me engano, Kaiten...\nComo era mesmo?"
20015-170 = "Ué, ele não é um herói da justiça?\nÉ um pouco diferente?"
20015-180 = "...Hmm, será que tem algum\nassunto de adulto envolvido? Que complicado."
20015-190 = "Sensei, você está trabalhando hoje também?\nTrabalhar é tão divertido assim?"
20015-200 = "...Ué, Sensei?\nPor que você está com essa cara?"
20015-210 = "V-você está bem...!?\nDesculpa por alguma coisa..."
20015-220 = "Não se preocupe,\neu vou ficar aqui com você!"
20015-230 = "Isso também é um treinamento para me tornar\numa dama exemplar no futuro."
20015-240 = "Hoje eu vou ser\na secretária do Sensei!\nEhehe! Ficou feliz?"
20015-250 = "Ah, Sensei!\nFeliz aniversário!"
20015-260 = "Sim! Preparei isso hoje\nespecialmente para você,\né o meu presente de aniversário!"
20015-270 = "Ué, o que tem dentro?\nÉ uma cigarra que eu peguei outro dia!"
20015-280 = "Anda, anda, abre logo!"
20015-290 = "Ué, é meu aniversário?"
20015-300 = "Sim, obrigada, Sensei!\nSerá que com isso eu dei mais um passo\npara me tornar uma dama exemplar?"
20015-310 = "Espero que sim!"
20015-320 = "Feliz Ano Novo, Sensei!"
20015-330 = "Ué, você vai me dar um otoshidama?\nSério mesmo?"
20015-340 = "Ebaaa! Eu te amo, Sensei!"
20015-350 = "Feliz Natal!\nVamos chamar a Tsubaki-senpai e a Mimori-senpai"
20015-360 = "e fazer uma festa com todo mundo!\nQuero comer frango logo!"
20015-370 = "Eu vi na TV outro dia...\nque o Halloween é uma conspiração\ndas fabricantes de doces!"
20015-380 = "Usar sonhos puros assim\né imperdoável! Sou totalmente contra!"
20015-390 = "...Ué? Esse doce,\nvocê vai me dar?"
20015-400 = "Eba!\nEhehe, obrigada!"
20015-420 = "...Fufu."
20015-430 = "Hoje aconteceram\ntantas coisas, né."
20015-440 = "Foi um dia bem agitado,\nmas..."
20015-450 = "Graças ao Sensei, acho que dei\nmais um passo para me tornar\numa dama exemplar!?"
20015-460 = "Obrigada, Sensei!"
20015-470 = "Por sempre me\najudar!"
20015-480 = "Sério!? Eba!"
20015-490 = "Então, para expressar essa alegria...\nUm ataque no Sensei!"
20015-500 = "Toma essa, o 'Impacto de Broca'\ndo 'Coelho de Chifre de Broca - Forma Suprema'!!"
20015-510 = "Nihihi!"
20015-2600 = "Uau, que legal... nossa... oh...\nUau... isso, será que é algo que\nme deixa ainda mais forte? Ahaha!\nEu sinto que vou ficar ainda mais poderosa!\nObrigada, Sensei!"
