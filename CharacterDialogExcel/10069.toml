[translation]
10069-10 = "Blue Archive."
10069-20 = "Meu nome é Akeshiro Rumi.\nSou a presidente da Associação Genbu da Academia Shanhaijing.\nPode me chamar de Rumi, sem cerimônias."
10069-30 = "A decoração daqui...\nSerá que eu poderia\naproveitar na Associação?"
10069-40 = "Os doces daqui\nsão uma boa referência."
10069-50 = "Faz quanto tempo que não tenho\num momento de paz assim...?"
10069-60 = "A única coisa que eu não quero\né ter que lutar contra o pessoal\nda Genryumon aqui."
10069-70 = "Que paz...\nHum, é muito bom."
10069-80 = "Ah, é você, Sensei."
10069-90 = "Pensei que tinha esquecido\nde vir aqui.\nHaha."
10069-100 = "Bem-vindo, Sensei."
10069-110 = "Você tem coragem de deixar a presidente\nda Associação Genbu esperando,\nnão é?"
10069-120 = "Então aqui é o Schale...\nAh, perdão."
10069-130 = "Faz tempo que não saio\nda cozinha.\nFiquei um pouco surpresa."
10069-140 = "Para um cozinheiro,\na cozinha é um campo de batalha..."
10069-150 = "Sendo assim, este lugar\né o seu campo de batalha,\nSensei."
10069-160 = "Aqui tem pelo menos\nutensílios básicos\nde cozinha, né?"
10069-170 = "Não, é que eu pensei\nem preparar algo."
10069-180 = "Comer é importante, sabe, Sensei?"
10069-190 = "Não pule refeições e\nnão coma qualquer coisa.\nEntendido?"
10069-200 = "Por que eu gosto de cozinhar?\nBem... acho que é porque\na comida é honesta."
10069-210 = "Quanto mais esforço você dedica,\nmais saboroso fica, e\nquanto mais você pesquisa,\nmais possibilidades surgem."
10069-220 = "Talvez seja um pouco\nparecido com você, Sensei."
10069-230 = "Haha, eu lembro sim.\nHoje é o seu aniversário,\nnão é, Sensei?"
10069-240 = "Por isso, preparei um macarrão da longevidade.\nTambém tem pêssegos de sobremesa.\nComa tudo até o fim, viu?"
10069-250 = "Meu aniversário...?\nObrigada, Sensei."
10069-260 = "Faz tempo que não recebo\nparabéns de alguém."
10069-270 = "Como presidente da Associação,\nmuitas vezes acabo perdendo\na noção das datas."
10069-280 = "Feliz Ano Novo!\nConto com você este ano também!"
10069-290 = "Ano Novo combina com guioza, né!\nPreparei um kagami mochi, peixe cozido,\ne ozoni também, além disso..."
10069-300 = "Hum?\nSe comer tudo,\nacha que vai explodir...?"
10069-310 = "Natal, é...\nNão estou muito acostumada,\nmas é um dia com uma atmosfera boa."
10069-320 = "Estava pensando em fazer\ntanghulu hoje. O que acha?"
10069-330 = "Halloween, é...\nNão estou acostumada,\nmas sei que tipo de dia é."
10069-340 = "Então, que tal eu fazer\nalgum bolinho lunar\ncom abóbora?"
10069-360 = "Ah... entendi.\nEntão está um pouco transparente."
10069-370 = "Bem, não se preocupe.\nNão vai diminuir nada, né."
10069-380 = "...Se eu soubesse que seria assim,\nteria escolhido uma lingerie mais bonita."
10069-390 = "Foi um pouco\ndesperdício, talvez?"
10069-400 = "Haha, você desviou o olhar.\nEu não estou nem um pouco\nincomodada, sabe?"
10069-410 = "Sensei, você tem esse lado\ninesperado, hein...\nFufu, gostei."
10069-420 = "Já que estamos aqui, será que\neu deveria te deixar ainda mais\nsem jeito...?"
10069-2600 = "Acho importante ter ferramentas\nque se adaptam às suas mãos.\nSeja um utensílio de cozinha ou uma arma."
