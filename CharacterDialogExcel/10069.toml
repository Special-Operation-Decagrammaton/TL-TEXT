[translation]
10069-10 = "ブルーアーカイブ。"
10069-20 = "あたしの名前は朱城ルミ。\n山海経高級中学校の玄武商会で会長をやってるんだ。\n気軽にルミって呼んでね。"
10069-30 = "ここの内装…\n商会にも活用して\nみようかな。"
10069-40 = "ここの茶菓は、\n参考になるね。"
10069-50 = "こんなのどかな時間、\nいつぶりだろう…？"
10069-60 = "ここで玄龍門の\n子たちと戦うのだけは、\n勘弁だなぁ。"
10069-70 = "平和だなぁ…\nん、いいこと。"
10069-80 = "なあんだ、先生か。"
10069-90 = "ここに来る事、\n忘れちゃったのかと\n思ったよ。ははっ。"
10069-100 = "いらっしゃい、先生。"
10069-110 = "玄武商会の会長を\n待たせるなんて、\nいい度胸してるんじゃない？"
10069-120 = "ここがシャーレ…\nああ、ごめん。"
10069-130 = "厨房の外に出たのは\n久しぶりでね。\nちょっとビックリしちゃった。"
10069-140 = "料理人にとって\n厨房は戦場…。"
10069-150 = "となると、ここは\n先生にとっての戦場、かな。"
10069-160 = "ここって、簡単な\n調理器具くらいは\nあるよね？"
10069-170 = "いや、なんか作ろっかなって。"
10069-180 = "ご飯は大事だよ？先生。"
10069-190 = "食事を抜かないこと、\n適当に済まさないこと。\nわかった？"
10069-200 = "料理が好きな理由？\nそうだねぇ…\n料理は正直だから、かな。"
10069-210 = "手間をかけた分\n美味しくなるし、\n研究した分\n可能性が生まれる。"
10069-220 = "先生に…\nちょっと似てるかもね。"
10069-230 = "はは、覚えてるよ、\n今日は先生の\n誕生日だろう？"
10069-240 = "だから、長寿麺を作ったんだ。\nデザートに桃もあるよ。\n最後まで頑張って食べてね？"
10069-250 = "あたしの誕生日…？\nありがとう、先生。"
10069-260 = "人に祝ってもらうのは\n久しぶりだな。"
10069-270 = "商会長をやってると、\n日付の感覚が\nなくなることが多くてさ。"
10069-280 = "あけましておめでとう！\n今年もよろしくね！"
10069-290 = "新年といえば餃子だよね！\nここに鏡餅と、魚の煮つけ、\nお雑煮も用意してあるよ、\nそれから…"
10069-300 = "ん？\n全部食べたら、\nお腹がはち切れそう…？"
10069-310 = "クリスマスか…\nあんまり馴染みはないけど、\n雰囲気があっていい日だよね。"
10069-320 = "今日は糖葫芦を作ろうと\n思ってるんだ。どう？"
10069-330 = "ハロウィンか…\n馴染みはないけど、\nなんの日かは知ってるよ。"
10069-340 = "じゃあ、\nカボチャ入りの\n月餅でも作ろっか？"
10069-360 = "あ…そっか。\nちょっと透けちゃってるのか。"
10069-370 = "ま、気にしないでよ。\n減るもんじゃないしさ。"
10069-380 = "…こうなると分かってたら、\nもっと可愛い下着にしたのに。"
10069-390 = "ちょっと、\nもったいなかったかも？"
10069-400 = "ははっ、\n目そらしちゃって。\nあたしは\n全然気にしてないよ？"
10069-410 = "先生って意外と\nそういうところ\nあるんだね…\nふふっ、気に入った。"
10069-420 = "せっかくだし、もーっと\n困らせちゃおっかな…？"
10069-2600 = "手に馴染む道具って\n大事だと思う。\n調理器具も、銃も、ね。"
