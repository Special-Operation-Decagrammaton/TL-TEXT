[translation]
10017-20 = "レッドウィンター連邦学園、書記長のお出ましだ！\n光栄に思うがいい、カムラッド！"
10017-30 = "うむ、よしよし。\n書記長は満足だ。"
10017-40 = "うむ、異常なし。"
10017-50 = "えっへん、\n書記長の\nお出ましだぞ。"
10017-60 = "今日も平和だな、よし！\nこれも全て、\nおいらのおかげだ！"
10017-70 = "（髭……\n取れてないよな？）"
10017-80 = "待っていたぞ、カムラッド！\nやることがたくさんある！\n怠けることは許さん！"
10017-90 = "来たか、カムラッド！\n一緒に片づけなきゃいけない\n任務がいっぱいあるんだから、\n覚悟しとけよ！"
10017-100 = "おいらを呼んだか、\nカムラッド？"
10017-110 = "今日もおいらと共に、\n革命を起こそうではないか！"
10017-120 = "ようやくおいらの権威を\n理解できたか？"
10017-130 = "なに、恐れることは無い。\nおいらは寛大だからな！"
10017-140 = "ん、\n髭が取れてる……？"
10017-150 = "ひゃぁぁっ！？\nだ、だめっ、\nおいらの権威が……！？"
10017-160 = "……って、取れてないじゃん！\nそうやって何度もからかうと、\n粛清するぞ！？"
10017-170 = "ふふふ、ふふふふっ……\n今日も一日、\nカムラッドと一緒に\nいられるなんてな。"
10017-180 = "お誕生日？\nそうだったのか？"
10017-190 = "よし、ではカムラッドの\n誕生日である今日を、\nレッドウィンターの\n記念日とする！"
10017-200 = "あ、うう……\n何だか恥ずかしいな、"
10017-210 = "お祝いなんてされると、\n権威が……"
10017-220 = "い、いや、もちろん嬉しい！\nありがとう、カムラッド！"
10017-230 = "あけましておめでとう、\nカムラッド。\nこの一年の計画は立てたか？"
10017-240 = "もしまだなら、\nおいらと一緒に決めるとしよう！"
10017-250 = "今日はクリスマスだ！\n大きな髭の真っ赤な老人が\nプレゼントを配ると聞いたが……"
10017-260 = "良いな！\nおいらもプレゼントほしい！"
10017-270 = "皆が派手な仮装を……\nなるほど、ハロウィンか。"
10017-280 = "ん？いや、この髭は\nハロウィンの仮装\nなんかじゃない！"
10017-290 = "そ、それ以上からかうと\n粛清するぞ！？"
10017-300 = "待っていたぞ、カムラッド！\nやることがたくさんある！\n怠けることは許さん！"
10017-310 = "来たか、カムラッド！\n一緒に片づけなきゃいけない\n任務がいっぱいあるんだから、\n覚悟しとけよ！"
10017-320 = "おいらを呼んだか、\nカムラッド？"
10017-330 = "今日もおいらと共に、\n革命を起こそうではないか！"
10017-340 = "ようやくおいらの権威を\n理解できたか？"
10017-350 = "なに、恐れることは無い。\nおいらは寛大だからな！"
10017-360 = "ふふふ、ふふふふっ……\n今日も一日、\nカムラッドと一緒に\nいられるなんてな。"
10017-370 = "こ、こうしてリラックスした\n状態でいるのは、\nカムラッドの前でだけだ！"
10017-380 = "か、からかうな！\n粛清するぞ！？"
10017-390 = "そ、そろそろ髭、\nつけさせて……"
10017-400 = "このままは何だか、\n恥ずかしい……"
10017-410 = "お誕生日？\nそうだったのか？"
10017-420 = "よし、ではカムラッドの\n誕生日である今日を、\nレッドウィンターの\n記念日とする！"
10017-430 = "あ、うう……\n何だか恥ずかしいな、"
10017-440 = "お祝いなんてされると、\n権威が……"
10017-450 = "い、いや、もちろん嬉しい！\nありがとう、カムラッド！"
10017-460 = "あけましておめでとう、\nカムラッド。\nこの一年の計画は立てたか？"
10017-470 = "もしまだなら、\nおいらと一緒に決めるとしよう！"
10017-480 = "今日はクリスマスだ！\n大きな髭の真っ赤な老人が\nプレゼントを配ると聞いたが……"
10017-490 = "良いな！\nおいらもプレゼントほしい！"
10017-510 = "あはははは！\n……うん、まだ足りないな！\nもっともーっと大きくしよう！"
10017-520 = "は、は……はっくしょん！\n……くすん。"
10017-530 = "ええいっ、構うな！\n今は集中しているんだ！"
10017-540 = "寒くないか……って？\nひ弱だな、カムラッド！\nおいらはこれぐらい\nなんともない！"
10017-550 = "まだまだ、\nあと3時間は遊べるぞ！"
10017-560 = "良いことを思いついたぞ、\nカムラッドはそこに\n雪だるまを作れ！"
10017-570 = "こっちでおいらが作ったのを、\nその横に添えよう！"
10017-580 = "ん？何でって？\n良いと思わないか？"
10017-590 = "……その二つの間に、\n小さい雪だるまも作ろうか……"
10017-600 = "あっ、も、もちろんそれで\nカムラッドが良いならね！？"
10017-2600 = "気に入ったぞ……これぞおいらの権威！\nおいらの力！そしておいらの髭！\nいっそ恐ろしいくらいだな……\nだが心配するな、カムラッド。\nおいらはいつも、お前の味方だ！"
