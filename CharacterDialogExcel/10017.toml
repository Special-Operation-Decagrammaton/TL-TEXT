[translation]
10017-20 = "A Secretária-Geral da Academia Federal Red Winter chegou!\nSinta-se honrado, camarada!"
10017-30 = "Hum, muito bem.\nA Secretária-Geral está satisfeita."
10017-40 = "Hum, nada de anormal."
10017-50 = "Ehem, a\nSecretária-Geral\nchegou."
10017-60 = "Hoje também está tudo em paz, ótimo!\nIsso é tudo\ngraças a mim!"
10017-70 = "(O bigode...\nNão caiu, né?)"
10017-80 = "Eu estava te esperando, camarada!\nTemos muito o que fazer!\nNão permitirei preguiça!"
10017-90 = "Você veio, camarada!\nTemos muitas missões para\nresolver juntos, então\nesteja preparado!"
10017-100 = "Você me chamou,\ncamarada?"
10017-110 = "Vamos fazer uma revolução\ncomigo hoje também!"
10017-120 = "Finalmente conseguiu entender\na minha autoridade?"
10017-130 = "Ora, não há o que temer.\nEu sou magnânima!"
10017-140 = "Hum, o\nbigode caiu...?"
10017-150 = "Aaaah!?\nN-não, a\nminha autoridade..."
10017-160 = "...espera, não caiu nada! Se continuar me provocando assim,\nvou te expurgar!"
10017-170 = "Fufufu, fufufufu...\nPassar o dia de hoje\ncom o camarada..."
10017-180 = "Aniversário?\nEra hoje?"
10017-190 = "Muito bem, então o dia de hoje, o aniversário do camarada,\nserá um feriado\nem Red Winter!"
10017-200 = "Ah, hum...\nÉ um pouco vergonhoso,"
10017-210 = "ser celebrada assim,\na minha autoridade..."
10017-220 = "N-não, é claro que estou feliz!\nObrigada, camarada!"
10017-230 = "Feliz ano novo,\ncamarada.\nJá fez seus planos para este ano?"
10017-240 = "Se ainda não, vamos\ndecidir juntos!"
10017-250 = "Hoje é Natal!\nOuvi dizer que um velho de barba grande e roupas vermelhas\ndistribui presentes..."
10017-260 = "Que legal!\nEu também quero um presente!"
10017-270 = "Todos com fantasias chamativas...\nEntendo, é Halloween."
10017-280 = "Hum? Não, este bigode\nnão é uma fantasia\nde Halloween!"
10017-290 = "S-se continuar me provocando,\nvou te expurgar!"
10017-300 = "Eu estava te esperando, camarada!\nTemos muito o que fazer!\nNão permitirei preguiça!"
10017-310 = "Você veio, camarada!\nTemos muitas missões para\nresolver juntos, então\nesteja preparado!"
10017-320 = "Você me chamou,\ncamarada?"
10017-330 = "Vamos fazer uma revolução\ncomigo hoje também!"
10017-340 = "Finalmente conseguiu entender\na minha autoridade?"
10017-350 = "Ora, não há o que temer.\nEu sou magnânima!"
10017-360 = "Fufufu, fufufufu...\nPassar o dia de hoje\ncom o camarada..."
10017-370 = "E-estar relaxada\ndeste jeito,\né só na frente do camarada!"
10017-380 = "N-não me provoque!\nVou te expurgar!"
10017-390 = "D-deixe eu colocar\no bigode de volta..."
10017-400 = "Ficar assim é um pouco\nvergonhoso..."
10017-410 = "Aniversário?\nEra hoje?"
10017-420 = "Muito bem, então o dia de hoje, o aniversário do camarada,\nserá um feriado\nem Red Winter!"
10017-430 = "Ah, hum...\nÉ um pouco vergonhoso,"
10017-440 = "ser celebrada assim,\na minha autoridade..."
10017-450 = "N-não, é claro que estou feliz!\nObrigada, camarada!"
10017-460 = "Feliz ano novo,\ncamarada.\nJá fez seus planos para este ano?"
10017-470 = "Se ainda não, vamos\ndecidir juntos!"
10017-480 = "Hoje é Natal!\nOuvi dizer que um velho de barba grande e roupas vermelhas\ndistribui presentes..."
10017-490 = "Que legal!\nEu também quero um presente!"
10017-510 = "Ahahahaha!\n...Hum, ainda não é o suficiente!\nVou fazer ficar ainda maior!"
10017-520 = "Ha, ha... Atchim!\n...Snif."
10017-530 = "Ei, não se importe comigo!\nEstou concentrada agora!"
10017-540 = "Se estou com frio...? \nQue fraco, Camarada! \nPara mim, isso aqui \nnão é nada!"
10017-550 = "Ainda não acabou, \ndá para brincar por mais 3 horas!"
10017-560 = "Tive uma ideia brilhante, \nCamarada, faça um boneco de neve \nali mesmo!"
10017-570 = "Vamos colocar o que eu fiz \naqui do lado!"
10017-580 = "Hm? Por que? \nNão acha que seria legal?"
10017-590 = "……Que tal fazermos um boneco de neve \nmenor entre os dois……"
10017-600 = "Ah, b-bem, claro, \nse você estiver de acordo, Camarada!?"
10017-2600 = "Gostei... isto é a minha autoridade! \nO meu poder! E o meu bigode! \nÉ quase assustador, não é... \nMas não se preocupe, Camarada. \nEu estarei sempre do seu lado!"
