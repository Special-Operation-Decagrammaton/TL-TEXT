[translation]
10079-10 = "ブルーアーカイブ！"
10079-20 = "常盤台中学2年、御坂美琴。\n私の手伝いが必要なら言ってちょうだい。"
10079-30 = "ここが\nシャーレの\nカフェ……。"
10079-40 = "な、なんなの。\nあれ……！？"
10079-50 = "ヘンな物が\nたくさんあるわね。"
10079-60 = "こ、これは結構\nかわいいかも……。"
10079-70 = "ん？誰かに\n呼ばれてる？"
10079-80 = "あ、先生。こっち、こっち。\nちょっと来るの遅いわよ。\n待ってたんだから。"
10079-90 = "お疲れ様、先生。\n私？ずっとここにいたけど。"
10079-100 = "なんとなーく、\n一人で出かけるのは\nまだハードル\n高いというか……。"
10079-110 = "停電の時に助けてほしい？\nはいはい、冗談でしょ。"
10079-120 = "……まぁ、\n助けなくもないけどさ。"
10079-130 = "たまーに、\n学園都市に似てると\n感じる事があるんだよね、\nここ。"
10079-140 = "先生、\nよかったら\n風にあたらない？"
10079-150 = "ここってしゃべる\n猫も多いわよね……\n一体どういう事なのかしら？"
10079-160 = "あ、いや！\nなんでもない！"
10079-170 = "お！先生、\n今日誕生日？\nおめでとう！\nなにか欲しい物ある？"
10079-180 = "え？あ、ありがとう。\nまさか誕生日もここで\n過ごすことになるなんて……"
10079-190 = "あはは……\nちょっと複雑な気持ちだわ。"
10079-200 = "あけましておめでと、\n先生！"
10079-210 = "そういえば、\nここでは新年は\n何をして過ごすの？"
10079-220 = "クリスマスか……\nこっちでもお祝いするのね。\n先生は出かける約束とかある？"
10079-230 = "なんか外が騒がしいわね。\nこんな日はなーんか\n色々起こるのよね……"
10079-250 = "うーーーん。"
10079-260 = "ずっと眺めてたら、\nちょっとは可愛く\n見えてきたような……"
10079-270 = "結局、これはブタなの……？\nそれともカバ？"
10079-280 = "……えっ、鳥！？\n嘘でしょ！？"
10079-290 = "そ、それはそうだけど……"
10079-300 = "あはは……ま、\nどっちでもいいわ。"
10079-310 = "というか、よく考えたら……"
10079-320 = "これ、先生からの\nプレゼントなのよね。"
10079-330 = "……大切にするわ。"
10079-340 = "ありがとう、先生。"
10079-2600 = "正直言って、ちょっと珍しいというか……。\n普段はこういうの、持ち歩いてないからさ。\nわざわざ用意してもらっちゃって\n……ありがと。期待に応えられるよう、\nちゃんとやるわね。"
