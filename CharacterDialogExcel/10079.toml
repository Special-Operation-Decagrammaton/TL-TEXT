[translation]
10079-10 = "Blue Archive!"
10079-20 = "Estudante do 2º ano da Escola Tokiwadai, Misaka Mikoto.\nSe precisar da minha ajuda, é só falar."
10079-30 = "Então este é o\nCafé do Schale……."
10079-40 = "O-o que é isso?\nAquilo ali……!?"
10079-50 = "Tem um monte de\ncoisas estranhas aqui, hein."
10079-60 = "I-isso aqui até que\né bem fofinho……."
10079-70 = "Hm? Alguém está\nme chamando?"
10079-80 = "Ah, Sensei. Por aqui, por aqui.\nVocê demorou um pouco, sabia?\nEu estava te esperando."
10079-90 = "Bom trabalho, Sensei.\nEu? Eu estive aqui o tempo todo."
10079-100 = "É que, de certa forma,\nsair sozinha ainda é um\npouco difícil para mim, sabe……."
10079-110 = "Quer que eu te ajude se houver um blecaute?\nAh, qual é, você está brincando, né?"
10079-120 = "……Bem, não é como se eu\nnão fosse te ajudar."
10079-130 = "Às vezes, sinto que\neste lugar se parece\ncom a Cidade Acadêmica, sabe?"
10079-140 = "Sensei,\nque tal a gente\nir pegar um ar?"
10079-150 = "Tem muitos gatos que falam\npor aqui também, né……\nO que será que isso significa?"
10079-160 = "Ah, não! \nNão é nada!"
10079-170 = "Oh! Sensei, \né seu aniversário hoje?\nParabéns!\nQuer ganhar alguma coisa?"
10079-180 = "Eh? Ah, obrigado.\nEu nunca imaginei que passaria\nmeu aniversário aqui também……"
10079-190 = "Ahaha……\nÉ um sentimento um pouco complicado."
10079-200 = "Feliz Ano Novo,\nSensei!"
10079-210 = "Falando nisso,\no que vocês fazem para\npassar o Ano Novo aqui?"
10079-220 = "Natal, hein……\nVocês comemoram aqui também.\nVocê tem algum compromisso, Sensei?"
10079-230 = "O lado de fora está bem barulhento.\nDias assim sempre\ntrazem várias coisas, né……"
10079-250 = "Hmmmm."
10079-260 = "Depois de olhar por tanto tempo,\ncomeçou a parecer um pouco\nfofinho, eu acho……"
10079-270 = "No fim das contas, isso é um porco……?\nOu um hipopótamo?"
10079-280 = "……Eh, um pássaro!?\nNão pode ser!?"
10079-290 = "B-bem, é verdade, mas……"
10079-300 = "Ahaha…… bom,\ntanto faz."
10079-310 = "Na verdade, pensando bem……"
10079-320 = "Isso é um presente\ndo Sensei, né."
10079-330 = "……Vou cuidar bem disso."
10079-340 = "Obrigada, Sensei."
10079-2600 = "Para ser sincera, é algo um tanto incomum…….\nEu não costumo carregar coisas assim por aí.\nObrigada por ter se dado ao trabalho de preparar isso\n……Agradeço. Vou me esforçar para corresponder às expectativas."
