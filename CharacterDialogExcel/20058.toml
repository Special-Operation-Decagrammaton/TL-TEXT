[translation]
20058-10 = "ブルーアーカイブ！"
20058-20 = "やっほ。ゲヘナ学園2年、旗見エリカ。\nよろしくね。"
20058-30 = "わ、\n結構人いるんだね。\nいつもこうなのかな？"
20058-40 = "先生と一緒に\nやったら楽しそう。"
20058-50 = "これって先生の\n趣味なのかな？"
20058-60 = "（これ、\n誰のなんだろ？）"
20058-70 = "ん……？\nなんか視線を感じる。"
20058-80 = "やっほ、先生♪\n待ってたよ。"
20058-90 = "おかえり！会いたかった。"
20058-100 = "（ちょっと待って……\n私今なんて？）"
20058-110 = "今日の当番は私だよ。\n何かあったらいつでも言って。"
20058-120 = "先生って、\n仕事頑張ってるよね。\nあんまそうは見えないけど。"
20058-130 = "ふふっ……\n頑張ってる大人って\nカッコいいな～"
20058-140 = "って、思っただけ。"
20058-150 = "先生が「先生」を\n続けてるのってどうして？"
20058-160 = "なんか、気になって……。"
20058-170 = "守るべきものがあるから、か……"
20058-180 = "ふうん。"
20058-190 = "じゃあ私のことも……\n守ってくれる？"
20058-200 = "こっちの書類は終わったよ。"
20058-210 = "結構キツかったー！"
20058-220 = "まぁ、先生の役に立ってるなら\nいいんだけどさ。"
20058-230 = "ん？レオパード柄？好きだよ。"
20058-240 = "銃以外にも色々レオパード柄\nで揃えたりしてるくらいにはね♪"
20058-250 = "他に持ってる\nレオパード柄の私物？"
20058-260 = "ふふっ……教えてあーげない♪"
20058-270 = "先生、お誕生日おめでと～！"
20058-280 = "世界の誰よりも\n幸せな日でありますよーに！"
20058-290 = "えっ……私の誕生日、\n覚えてたの？"
20058-300 = "先生って本当に\n罪づくりな人だよね。"
20058-310 = "……期待、\nさせちゃってどうする気？"
20058-320 = "あけましておめでとう、先生！\n今年もいっぱい思い出作ろうね。"
20058-330 = "クリスマスっていい日だよね。"
20058-340 = "雰囲気が\nワクワクするっていうか、\nドキドキするっていうか……。"
20058-350 = "特別な日って感じ……\n一緒にいるだけで、ね。"
20058-360 = "ガオーッ！\nお菓子くれなきゃ食べちゃうぞ！"
20058-370 = "ほら、\n食べられないように頑張って。"
20058-390 = "ようこそ、先生。"
20058-400 = "ここが、私だけの秘密基地――"
20058-410 = "一人の時間が欲しい時に、\n来る場所。"
20058-420 = "ふふっ、\nでも秘密基地っていうには、\nちょっと広いかも。"
20058-430 = "……なんか、\n先生に共有したかったんだよね。"
20058-440 = "私がいつも見ている景色とか……\n感じてる空気、とか。"
20058-450 = "理由を聞かれてもなんとなく、\nしか言えないんだけど……。"
20058-460 = "そうだね……\n秘密の場所を教えるのって、"
20058-470 = "特別の証だからさ。"
20058-480 = "先生は、私の特別な人ってこと。"
20058-490 = "……ふふっ。"
20058-500 = "ここは静かでしょ？"
20058-510 = "まあでも……私の心は、\nちょっと騒がしいんだけどね。"
20058-2600 = "あれ、私の好み覚えててくれたんだ？\nあははっ、いつもありがとね。\nそしたら……なにかお礼、しないとね。"
