[translation]
20058-10 = "Blue Archive!"
20058-20 = "Opa. Erika Hatami, segundo ano da Gehenna. Prazer."
20058-30 = "Nossa, tem bastante gente aqui. É sempre assim?"
20058-40 = "Seria divertido fazer alguma coisa junto com o professor."
20058-50 = "Será que isso é do gosto do professor?"
20058-60 = "(Isso é... de quem será?)"
20058-70 = "Hum...? Tô sentindo um olhar."
20058-80 = "Opa, professor ♪ Tava esperando você."
20058-90 = "Bem-vindo! Senti saudade."
20058-100 = "(Espera aí... o que eu acabei de falar?)"
20058-110 = "Hoje eu tô de plantão. Se precisar de algo, é só falar."
20058-120 = "Professor, você se esforça no trabalho, né. Mesmo não parecendo muito."
20058-130 = "Fufu... adulto que se esforça é legal, hein~"
20058-140 = "Só pensei nisso."
20058-150 = "Por que o professor continua sendo 'professor'?"
20058-160 = "Fiquei curiosa..."
20058-170 = "Porque tem coisas que ele quer proteger, é..."
20058-180 = "Hum."
20058-190 = "Então você também vai... me proteger?"
20058-200 = "Esses documentos aqui já foram."
20058-210 = "Foi bem puxado!"
20058-220 = "Bom, se está ajudando o professor, tá valendo."
20058-230 = "Hã? Estampa de leopardo? Eu gosto, sim."
20058-240 = "Tanto que eu tenho várias coisas com essa estampa, além da arma."
20058-250 = "Outros pertences com estampa de leopardo?"
20058-260 = "Fufu... segredo ♪"
20058-270 = "Professor, feliz aniversário~!"
20058-280 = "Que seja o dia mais feliz do mundo!"
20058-290 = "Hã... Você lembrou do meu aniversário?"
20058-300 = "Professor, você é mesmo alguém que gera expectativas."
20058-310 = "... Tá criando falsas esperanças, hein."
20058-320 = "Feliz Ano Novo, professor! Vamos criar muitas lembranças este ano também."
20058-330 = "Natal é um dia bom, né."
20058-340 = "A atmosfera é... meio animada, meio emocionante..."
20058-350 = "Parece um dia especial... só de estar junto, sabe."
20058-360 = "Rawr! Se não me der doce, vou te comer!"
20058-370 = "Vamos ver se você consegue evitar ser comido."
20058-390 = "Bem-vindo, professor."
20058-400 = "Aqui é o meu... quartel-general secreto."
20058-410 = "O lugar onde eu venho quando quero ficar sozinha."
20058-420 = "Fufu, mas chamar de quartel-general... é meio grande, né."
20058-430 = "... Sei lá, eu queria compartilhar isso com você."
20058-440 = "As paisagens que eu sempre vejo... a sensação que eu tenho."
20058-450 = "Não sei explicar direito, mas... é meio que sem motivo."
20058-460 = "É que... contar um lugar secreto é tipo..."
20058-470 = "uma prova de que você é especial."
20058-480 = "Significa que você é uma pessoa especial para mim."
20058-490 = "... Fufu."
20058-500 = "Aqui é quieto, né?"
20058-510 = "Mas... meu coração está um pouco agitado."
20058-2600 = "Ah, você lembrou do meu gosto? Ahaha, valeu sempre. Então... vou ter que te agradecer de alguma forma, né."