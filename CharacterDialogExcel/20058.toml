[translation]
20058-10 = "Blue Archive!"
20058-20 = "Привет. Я Эрика Хатами, учусь на втором курсе в Академии Геенна.\nПриятно познакомиться."
20058-30 = "Ого,\nтут довольно много народу.\nЗдесь всегда так?"
20058-40 = "Кажется, было бы весело\nзаниматься этим вместе с Сенсеем."
20058-50 = "Это одно из\nхобби Сенсея?"
20058-60 = "(Интересно, чьё\nэто?)"
20058-70 = "Хм?.. \nМне кажется, или за мной кто-то наблюдает."
20058-80 = "Привет, Сенсей♪\nЯ как раз тебя ждала."
20058-90 = "С возвращением! Я скучала по тебе."
20058-100 = "(Погодите-ка...\nЧто я только что ляпнула?)"
20058-110 = "Сегодня моя очередь дежурить.\nДай знать, если тебе что-нибудь понадобится."
20058-120 = "Сенсей, а ты действительно усердно трудишься.\nПусть по тебе сразу и не скажешь."
20058-130 = "Хе-хе...\nВзрослые, которые так стараются,\nвыглядят довольно круто, правда?"
20058-140 = "Просто мысли вслух."
20058-150 = "И всё-таки, почему ты продолжаешь быть «Сенсеем»?"
20058-160 = "Да так, ничего особенного, просто стало любопытно..."
20058-170 = "Потому что у тебя есть вещи, которые необходимо защищать, вот оно как..."
20058-180 = "Ясно."
20058-190 = "Тогда... ты\nи меня защитишь?"
20058-200 = "Я закончила с этими документами."
20058-210 = "Это было довольно заморно!"
20058-220 = "Ну, раз уж это полезно для тебя, Сенсей,\nя совсем не против."
20058-230 = "Хм? Леопардовый принт? Обожаю его."
20058-240 = "Я даже зашла так далеко, что собираю кучу вещей с леопардовым узором помимо своего оружия, понимаешь?♪"
20058-250 = "Какие ещё личные вещи\nу меня леопардовые?"
20058-260 = "Хе-хе... Не скажу♪"
20058-270 = "С днём рождения, Сенсей!"
20058-280 = "Я желаю тебе стать самым счастливым человеком\nво всём мире!"
20058-290 = "Погоди... ты правда помнишь\nпро мой день рождения?"
20058-300 = "Сенсей, ты самый настоящий\nсердцеед, ты в курсе?"
20058-310 = "...И что ты планируешь делать,\nвот так даря мне надежду?"
20058-320 = "С Новым годом, Сенсей! Давай и в этом году создадим кучу общих воспоминаний."
20058-330 = "Рождество — такой чудесный день, правда?"
20058-340 = "Вокруг такая волнующая атмосфера, или, скорее... сердце так и бьётся..."
20058-350 = "Такой особенный день...\nЯ имею в виду, просто быть здесь, рядом с тобой."
20058-360 = "Р-р-раур!\nГони сладости, не то я тебя съем!"
20058-370 = "Ну же,\nпостарайся сделать всё возможное, чтобы тебя не съели."
20058-390 = "Добро пожаловать, Сенсей."
20058-400 = "Это моя личная секретная база —"
20058-410 = "место, куда я прихожу,\nкогда хочется побыть одной."
20058-420 = "Хе-хе,\nхотя оно, пожалуй, слишком огромное,\nчтобы называть его просто секретной базой."
20058-430 = "...Мне просто очень хотелось разделить его с тобой, Сенсей."
20058-440 = "Пейзаж, на который я всегда смотрю... и атмосфера, которую я здесь чувствую."
20058-450 = "Даже если ты спросишь почему, я смогу лишь ответить, что это просто интуиция..."
20058-460 = "Наверное, так и есть...\nКогда показываешь кому-то своё секретное место,"
20058-470 = "это доказательство того, что человек тебе дорог."
20058-480 = "Это значит, что ты для меня особенный человек, Сенсей."
20058-490 = "...Хе-хе."
20058-500 = "Здесь так тихо, правда?"
20058-510 = "Ну, хотя... в моём сердце сейчас,\nвообще-то, довольно шумно."
20058-2600 = "О, так ты помнишь мои вкусы? Ахаха, спасибо как и всегда. В таком случае... я просто обязана сделать тебе ответный подарок, верно?"