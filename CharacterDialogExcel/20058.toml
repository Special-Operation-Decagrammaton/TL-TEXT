[translation]
20058-10 = "Blue Archive!"
20058-20 = "Hey there. I'm Erika Hatami, a second-year at Gehenna Academy.\nNice to meet you."
20058-30 = "Whoa,\nthere are quite a lot of people here.\nIs it always like this?"
20058-40 = "It looks like it would be fun\nto do this with Sensei."
20058-50 = "Is this one of\nSensei's hobbies?"
20058-60 = "(I wonder whose\nthis is?)"
20058-70 = "Hmm...? \nI feel like someone's watching me."
20058-80 = "Hey, Sensei♪\nI was waiting for you."
20058-90 = "Welcome back! I missed you."
20058-100 = "(Wait a second...\nWhat did I just say?)"
20058-110 = "It's my turn to be on duty today.\nLet me know if you need anything."
20058-120 = "Sensei, you really work hard.\nEven if you don't look like it."
20058-130 = "Hehe...\nAdults who work hard\nare pretty cool, aren't they?"
20058-140 = "Just a thought."
20058-150 = "Why do you keep being a \"Sensei,\" anyway?"
20058-160 = "I don't know, I was just curious..."
20058-170 = "Because you have things you need to protect, huh..."
20058-180 = "I see."
20058-190 = "Then... will you\nprotect me, too?"
20058-200 = "I've finished these documents."
20058-210 = "That was pretty tough!"
20058-220 = "Well, as long as it's helpful to you, Sensei,\nI don't mind."
20058-230 = "Hm? Leopard print? I love it."
20058-240 = "I've even gone as far as collecting various things in leopard print besides my gun, you know♪"
20058-250 = "Any other personal items\nI have in leopard print?"
20058-260 = "Hehe... I'm not telling you♪"
20058-270 = "Happy birthday, Sensei!"
20058-280 = "I hope you have the happiest day\nof anyone in the world!"
20058-290 = "Wait... you remembered\nmy birthday?"
20058-300 = "Sensei, you really are\na heartbreaker, you know that?"
20058-310 = "...What are you planning to do,\ngetting my hopes up like this?"
20058-320 = "Happy New Year, Sensei! Let's make lots of memories this year, too."
20058-330 = "Christmas is such a nice day, isn't it?"
20058-340 = "The atmosphere is just so exciting,\nor maybe it's more like... heart-pounding..."
20058-350 = "It feels like such a special day...\nJust being here with you, I mean."
20058-360 = "Rawr!\nGive me some candy or I'll eat you!"
20058-370 = "Come on,\ntry your best not to get eaten."
20058-390 = "Welcome, Sensei."
20058-400 = "This is my own secret base—"
20058-410 = "The place I come to\nwhen I want some time alone."
20058-420 = "Hehe,\nthough it might be a bit big\nto call it a secret base."
20058-430 = "...I just,\nI wanted to share it with you, Sensei."
20058-440 = "The scenery I always look at...\nand the atmosphere I feel here."
20058-450 = "Even if you asked me why, I could only say it's just a feeling..."
20058-460 = "I guess so...\nShowing someone your secret place,"
20058-470 = "is proof that they're special."
20058-480 = "It means you're my special person, Sensei."
20058-490 = "...Hehe."
20058-500 = "It's quiet here, isn't it?"
20058-510 = "Well, though... my heart is\na little noisy, actually."
20058-2600 = "Oh, you remembered my preferences? Ahaha, thanks as always. In that case... I have to give you something in return, don't I?"