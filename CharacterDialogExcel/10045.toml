[translation]
10045-10 = "ブル～アーカイブ～。"
10045-20 = "ふぁあ～…あ、先生～。\nせっかくなんだし、のんびり行こうよ～"
10045-30 = "ほほえましい\n光景だねぇ…まあ、\n余裕があるのは\n良いことだ。"
10045-40 = "さーて、どこか横に\nなれるところは…"
10045-50 = "どこか\n寛げそうな場所は…"
10045-60 = "…お、\n良さそうだねぇ？"
10045-70 = "何これ…？"
10045-80 = "やぁやぁ先生、お疲れ様ー\n今日くらいは\nのんびりしない？"
10045-90 = "先生おかえり～。"
10045-100 = "…ん、私？\nずーっとここで\n休憩してたよー？"
10045-110 = "まさかこの格好で、\n働かせるつもりかー？\nなんて？"
10045-120 = "相変わらず\n先生は忙しそうだねぇ。"
10045-130 = "…これを手伝えば良い？"
10045-140 = "んー？まあ、確かに\n休みたい気持ちは\nやまやまだけど…"
10045-150 = "先生が働いてるのに、\nその横で休むのもねぇ？"
10045-160 = "疲れたら\nいつでも言ってね、先生。"
10045-170 = "枕代わりに、\nこの浮き輪とかどう？"
10045-180 = "今日はどんなことが\n起きるのかな～？"
10045-190 = "お誕生日おめでとう、先生。\n何か欲しいものでもある？"
10045-200 = "…私にできる範囲なら、\n何でも良いけど？"
10045-210 = "…あ、そっか。\n私の誕生日か。"
10045-220 = "ありがとう、先生…\n覚えててもらえるのは、\n嬉しいことだね。"
10045-230 = "うへへ。"
10045-240 = "あけましておめでとう、\n先生～"
10045-250 = "…今年もたくさん、\n楽しいことがあると良いね"
10045-260 = "何か騒がしいと思ったら、\nクリスマスか～"
10045-270 = "ま、おじさんも別に、\nこの空気は\n嫌いじゃないけどね。"
10045-280 = "ただ、ちょっとこの格好じゃ\n外には出られないかなー？"
10045-290 = "色んな仮装の\n人がたくさんだぁ。"
10045-300 = "…え、何その視線。"
10045-310 = "これは仮装じゃ\nないってば～"
10045-330 = "いやぁ、たまんないねぇ…\nこれぞまさに楽園…"
10045-340 = "涼しい日陰…\n心地良い海風…\n穏やかな波の音…"
10045-350 = "いやぁ、\nここに来られて良かった～\n最高だねぇ、\nまるで夢みたいな場所だー…"
10045-360 = "…先生もそんな\nとこにずっと立ってないで、\n横になってみたら？"
10045-370 = "あんまり広くはないけど、\nどう？良い感じだよ～？"
10045-380 = "うへー、\nなるほどそう来たか…。"
10045-390 = "まあ、何となく\n予想はしてたけどね。"
10045-400 = "別にいいのに…"
10045-410 = "まあ、そういうところ\n嫌いじゃないけど。"
10045-420 = "…えへへ。"
10045-2600 = "ここまでしてくれるとか…\nほんと、変わってるねえ先生も。\nまぁ良いけど…じゃあ私も、\n今まで以上に頑張らないとね？"
