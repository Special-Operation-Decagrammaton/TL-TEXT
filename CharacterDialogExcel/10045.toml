[translation]
10045-10 = "Blue Archive."
10045-20 = "Yaaawn... Ah, Sensei.\nSince we're already here, let's just take it easy~"
10045-30 = "What a heartwarming\nsight... Well, having\nsome free time is\na good thing."
10045-40 = "Now then, is there anywhere\nI can lie down..."
10045-50 = "Is there anywhere\nI can relax..."
10045-60 = "...Oh,\nthis looks good, doesn't it?"
10045-70 = "What is this...?"
10045-80 = "Hey there, Sensei, good work today.\nWhy don't you take it easy\nfor today?"
10045-90 = "Welcome back, Sensei~."
10045-100 = "...Hm, me?\nI've been resting here\nthe whole time, you know?"
10045-110 = "You aren't planning on making me\nwork in this outfit, are you?\nJust kidding."
10045-120 = "You're as busy as ever,\naren't you, Sensei?"
10045-130 = "...Do you need help with this?"
10045-140 = "Hmm? Well, I certainly\nwould love to rest, but..."
10045-150 = "It feels a bit wrong to rest\nright next to you while\nyou're working, doesn't it?"
10045-160 = "If you get tired,\nlet me know anytime, Sensei."
10045-170 = "How about using this floatie\nas a pillow?"
10045-180 = "I wonder what kind of things\nwill happen today~?"
10045-190 = "Happy birthday, Sensei.\nIs there anything you want?"
10045-200 = "...As long as it's within\nmy power, anything is fine."
10045-210 = "...Ah, that's right.\nIt's my birthday."
10045-220 = "Thank you, Sensei...\nIt makes me happy\nthat you remembered."
10045-230 = "Uhehe."
10045-240 = "Happy New Year,\nSensei~"
10045-250 = "...I hope we have plenty of\nfun things happen this year too."
10045-260 = "I was wondering why it was so noisy,\nit's Christmas, huh~"
10045-270 = "Well, this old timer doesn't\nexactly hate this\natmosphere, though."
10045-280 = "It's just that, I don't think I can\ngo outside in this outfit, can I?"
10045-290 = "There are so many people\nin different costumes."
10045-300 = "...Eh, what's with that look?"
10045-310 = "I told you, this isn't\na costume~"
10045-330 = "Man, this is irresistible...\nThis is truly paradise..."
10045-340 = "Cool shade...\nComfortable sea breeze...\nCalm sound of the waves..."
10045-350 = "Man,\nI'm glad I came here~\nIt's the best, it's like\na dream come true..."
10045-360 = "...Sensei, don't just stand there,\nwhy don't you try lying down too?"
10045-370 = "It's not very big, but\nhow is it? Feels nice, right~?"
10045-380 = "Uhee, I see,\nso that's how it is..."
10045-390 = "Well, I kind of\nexpected it, though."
10045-400 = "You didn't have to..."
10045-410 = "Well, I don't hate that\nside of you, though."
10045-420 = "...Ehehe."
10045-2600 = "To think you'd go this far for me...\nYou really are something else, Sensei. Well, that's fine... then I guess I'll have to work even harder than before, right?"
