[translation]
16011-10 = "ブルーアーカイブ"
16011-20 = "あら、先生。こちらでもお会いしましたね。\nトリニティ総合学園、正義実現委員会の羽川ハスミ。\nこの度はトリニティを代表して実行委員を務めることになりました。\n何卒よろしくお願いいたします。"
16011-30 = "…よく片付いた\n場所ですね。"
16011-40 = "競技場でもないのに\nこんな格好でいるのは\n変でしょうか…？"
16011-50 = "あ…あれは…?"
16011-60 = "いつもと違って、\nちょっと走りたく\nなりますね。"
16011-70 = "（ううっ…\nダイエットの\n大敵が…）"
16011-80 = "お待ちしておりました、先生。\n本日の試合日程はこちらです。"
16011-90 = "お疲れ様です、先生。\n今日はどんな日でしたか？"
16011-100 = "この格好だと、\n普段より動きやすいからか"
16011-110 = "少しだけ浮かれて\nしまっているような気がします。"
16011-120 = "浮かれすぎるのは\n良くないですが…\n少しだけなら…。"
16011-130 = "結構運動したからか、\n少しお腹が空いてきたような…"
16011-140 = "運動はいつやっても\n良いものです。健康な体には、\n健康な精神が宿るのですから。"
16011-150 = "先生、もしよろしければ…\nレモンの蜂蜜漬けなど、\nいかがでしょう？"
16011-160 = "お誕生日\nおめでとうございます、先生。"
16011-170 = "今日という日を\n先生と迎えられてとても\n嬉しく思います。"
16011-180 = "…何か欲しいものでも\nありますか？"
16011-190 = "…私の誕生日ですか?"
16011-200 = "業務に追われすぎて、\n完全に頭から抜けておりました。"
16011-210 = "覚えていてくださって\nありがとうございます、先生。"
16011-220 = "明けまして\nおめでとうございます、先生。"
16011-230 = "今年も運動を重ねて\n身体を鍛え、健康な一年を\n過ごせるよう努力いたします。"
16011-240 = "メリークリスマスです、先生。\nもしよろしければ、一緒に\nお出かけでもいかがでしょう？"
16011-250 = "この格好もハロウィンの仮装…\nに見えるでしょうか。"
16011-260 = "先生がそう思うのでしたら、\n私からは何も…ええ。"
16011-280 = "ううん…うぅっ…\nくっ…ふっ…！"
16011-290 = "分かってはいましたが…\nやはり難しいようですね。"
16011-300 = "先生、すみません…\nご覧の通り、このような\n状況となってしまいまして…"
16011-310 = "そうでなくても\nお忙しいのに…"
16011-320 = "余計にお手間を\nおかけしてしまって、\n申し訳ございません。"
16011-330 = "去年まではよく\n着ていた服のはずなのに…"
16011-340 = "どうして…\n一年の間にこのような…。"
16011-350 = "い、いえ、\nあまり大きな違いは…。"
16011-360 = "その…あまり、\n体重は変わってないはず…\nなのですが"
16011-370 = "た、たぶん…。"
16011-2600 = "ありがとうございます、先生。\nまるで優勝旗をいただいたような気分です。\n先生が一緒にいてくださる以上、\n今後も負けることはありません。\nですので、これからも\nよろしくお願いいたしますね。"
