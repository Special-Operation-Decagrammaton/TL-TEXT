[translation]
16011-10 = "Blue Archive"
16011-20 = "Ora, Sensei. Nos encontramos aqui também, hein.\nSou Hasumi Hanekawa, do Comitê de Justiça da Academia Trinity.\nFui designada para atuar como membro do comitê executivo representando Trinity desta vez.\nConto com o seu apoio."
16011-30 = "…É um lugar\nbem arrumado."
16011-40 = "É estranho eu estar\nvestida assim, mesmo não\nsendo um estádio…?"
16011-50 = "Ah… o que é aquilo…?"
16011-60 = "Diferente do habitual,\ndá até uma vontade\nde correr um pouco."
16011-70 = "(Ugh…\nO maior inimigo\nda dieta…)"
16011-80 = "Estava à sua espera, Sensei.\nAqui está a agenda das partidas de hoje."
16011-90 = "Bom trabalho, Sensei.\nComo foi o seu dia hoje?"
16011-100 = "Talvez seja porque, com este traje,\né mais fácil de se mover do que o normal,"
16011-110 = "sinto que estou um pouco\nmais animada do que deveria."
16011-120 = "Não é bom ficar animada demais, mas…\npor um pouquinho, talvez…"
16011-130 = "Talvez por ter me exercitado bastante,\ncomecei a sentir um pouco de fome…"
16011-140 = "Exercitar-se é sempre bom. Afinal, mente sã, corpo são."
16011-150 = "Sensei, se não se importar…\nque tal um pouco de limão em conserva com mel?"
16011-160 = "Feliz aniversário,\nSensei."
16011-170 = "Fico muito feliz em poder\npassar este dia ao seu lado,\nSensei."
16011-180 = "…Há algo que você\ngostaria de ganhar?"
16011-190 = "…Meu aniversário?"
16011-200 = "Estava tão ocupada com o trabalho\nque tinha esquecido completamente."
16011-210 = "Obrigada por se lembrar,\nSensei."
16011-220 = "Feliz Ano Novo,\nSensei."
16011-230 = "Este ano também me esforçarei para\nme exercitar, fortalecer o corpo\ne ter um ano saudável."
16011-240 = "Feliz Natal, Sensei.\nSe não se importar, que tal\nsairmos juntos?"
16011-250 = "Será que este traje…\nparece uma fantasia de Halloween?"
16011-260 = "Se você acha isso, Sensei,\nentão eu não tenho nada a dizer… sim."
16011-280 = "Não… ugh…\nDroga… uff…!"
16011-290 = "Eu já sabia, mas…\nparece que é realmente difícil."
16011-300 = "Sensei, me desculpe…\nComo pode ver, acabei\nnesta situação…"
16011-310 = "Mesmo que você já\nesteja tão ocupado…"
16011-320 = "Sinto muito por lhe causar\nainda mais trabalho."
16011-330 = "Deveria ser uma roupa que eu\ncostumava usar até o ano passado…"
16011-340 = "Por que…\nem um ano, isso aconteceu…"
16011-350 = "N-não, não há\ntanta diferença assim…"
16011-360 = "É que… o peso não deveria\nter mudado tanto…\nmas"
16011-370 = "T-talvez…"
16011-2600 = "Obrigada, Sensei.\nSinto como se tivesse recebido uma bandeira de campeã.\nEnquanto você estiver ao meu lado, Sensei,\nnão perderei mais nenhuma vez.\nPor isso, conto com você\ndaqui para frente."
