[translation]
10096-10 = "ブルー、アーカイブ。"
10096-20 = "ヴァルキューレ警察学校、公安局局長、尾刃カンナです。\n任務の特性上、このような姿でご挨拶申し上げる無礼をお許しください。"
10096-30 = "要救助者は……\n居ないな。"
10096-40 = "少し休憩を\n取っておこうか。"
10096-50 = "いつでも\n出動できるよう、\n準備運動は怠らない。"
10096-60 = "ううん……\nいくつか気になる\nところはあるが……"
10096-70 = "休憩が終わったら\nパトロールを\n始めるとするか。"
10096-80 = "お待しておりました、先生。\n私の力が必要であれば、\nいつでもお申し付けください。"
10096-90 = "いらっしゃいましたか、先生。"
10096-100 = "これよりシャーレの\n水上安全は私が\n責任を負います。"
10096-110 = "え？ここには\nプールがない……？"
10096-120 = "水着はあまり慣れておらず……\nお見苦しかったら\n申し訳ありません。"
10096-130 = "事故は予期せぬ時に\n起きるものです。"
10096-140 = "すぐに対処できるよう、\n常に気を配っております。"
10096-150 = "コーヒー？\n邪魔になるので、\n一杯しか飲んでいません。"
10096-160 = "人命救助はともかく、\n接客や案内には\nあまり自信がありません……。"
10096-170 = "眠い時は身体を\n動かすと良いですよ。"
10096-180 = "さあ、起きてください。\nライフセーバー式の\n準備運動をお教えします。"
10096-190 = "お誕生日\nおめでとうございます、先生。"
10096-200 = "今日一日は\n安心してお過ごしください。"
10096-210 = "先生の安全は、\n私が守りますから。"
10096-220 = "ああ、もう\n私の誕生日なのですね。"
10096-230 = "あまり普段と\n変わらない気もしますが……。"
10096-240 = "また新しい年が明けましたね。\nどうか今年は\n事故がないことを願います。"
10096-250 = "人々が浮かれる日こそ、\nライフセーバーは\n気を配らなければなりません。"
10096-260 = "……でも、先生と\nコーヒーを飲むくらいは、\n構いませんよね。"
10096-270 = "飴はあまり好きでは\nないのですが……"
10096-280 = "え？ではイタズラを……？\n危険でなければ\n構いませんが……。"
10096-290 = "そのような行為は……\nわ、私にだけやってくださいね。"
10096-310 = "ふう……たしかに\n疲労が取れた\n感じがしますね。"
10096-320 = "大丈夫です。\nこれも点検項目の\n一つですから。"
10096-330 = "それに……\n働き者には\n褒賞がなければ。"
10096-340 = "……あと、先生には\nいつもお世話に\nなっていますから。"
10096-350 = "だからこれは……\n私から先生に送る\n小さなプレゼントです。"
10096-360 = "えっ！？\nそ、そんなわけ\nないじゃないですか！"
10096-370 = "私がいるのは、その……"
10096-380 = "……先生の安全を\n守るためです！\n私はライフセーバーですから！"
10096-2600 = "先生からいただいた信頼の証……\nなるほど。ライフセーバーの荷は重いものです。\n期待を裏切らないよう、最善を尽くします。"
