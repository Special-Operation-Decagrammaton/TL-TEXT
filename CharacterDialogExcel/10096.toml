[translation]
10096-10 = "Blue, Archive."
10096-20 = "Sou Oba Kanna, diretora do Departamento de Segurança Pública da Escola de Polícia Valkyrie.\nPor favor, perdoe a indelicadeza de me apresentar com este traje devido à natureza da minha missão."
10096-30 = "Nenhuma vítima precisando de resgate... por aqui."
10096-40 = "Acho que vou fazer uma pequena pausa."
10096-50 = "Não negligencio o aquecimento para poder entrar em ação a qualquer momento."
10096-60 = "Hmm... Tem algumas coisas que estão me incomodando, mas..."
10096-70 = "Acho que vou começar a patrulha assim que o meu intervalo terminar."
10096-80 = "Eu estava esperando por você, Sensei. Se precisar da minha força, é só pedir a qualquer momento."
10096-90 = "Ah, você chegou, Sensei."
10096-100 = "De agora em diante, eu assumirei a responsabilidade pela segurança aquática da Schale."
10096-110 = "Eh? Não tem... piscina aqui...?"
10096-120 = "Não estou muito acostumada com trajes de banho... Peço desculpas se a minha aparência for desagradável."
10096-130 = "Acidentes acontecem quando menos se espera."
10096-140 = "Estou sempre atenta para poder lidar com qualquer situação imediatamente."
10096-150 = "Café? Como pode acabar atrapalhando, estou me limitando a apenas uma xícara."
10096-160 = "Salvar vidas é uma coisa, mas não tenho muita confiança em atendimento ao cliente ou recepção..."
10096-170 = "Quando estiver com sono, é bom exercitar o corpo."
10096-180 = "Vamos, levante-se. Vou lhe ensinar o aquecimento no estilo salva-vidas."
10096-190 = "Feliz aniversário, Sensei."
10096-200 = "Por favor, passe o dia de hoje com tranquilidade."
10096-210 = "Afinal, eu protegerei a sua segurança."
10096-220 = "Ah, já é o meu aniversário de novo."
10096-230 = "Sinto que não é muito diferente de um dia comum, mas..."
10096-240 = "Mais um ano se inicia. Espero que este ano não ocorra nenhum acidente."
10096-250 = "É justamente nos dias em que as pessoas estão festejando que um salva-vidas deve estar mais atento."
10096-260 = "...Mas acho que não tem problema tomar um café com o senhor, Sensei."
10096-270 = "Eu não sou muito fã de doces, mas..."
10096-280 = "Eh? Então você vai fazer uma 'travessura'...? Se não for perigoso, eu não me importo..."
10096-290 = "Esse tipo de ato... p-p-por favor, faça apenas comigo, certo?"
10096-310 = "Fuu... Certamente sinto que o cansaço foi embora."
10096-320 = "Não se preocupe. Isso também faz parte dos meus itens de inspeção."
10096-330 = "Além disso... quem trabalha duro merece uma recompensa."
10096-340 = "...E também, o senhor sempre cuida muito bem de mim, Sensei."
10096-350 = "Então isto... é um pequeno presente meu para o senhor."
10096-360 = "Eh!? N-Não é nada disso que você está pensando!"
10096-370 = "O motivo de eu estar aqui é, bem..."
10096-380 = "...É para proteger a segurança do Sensei! Afinal, eu sou uma salva-vidas!"
10096-2600 = "Uma prova da confiança que recebi do Sensei... Entendo. O fardo de uma salva-vidas é pesado. Farei o meu melhor para não decepcionar as suas expectativas."