[translation]
10096-10 = "Blue Archive."
10096-20 = "Sou Kanna, chefe do Departamento de Segurança Pública da Academia Valkyrie. Por favor, perdoe a minha falta de modos ao cumprimentá-lo desta forma, devido à natureza da minha missão."
10096-30 = "Não há... ninguém precisando de resgate aqui."
10096-40 = "Acho que vou tirar uma pequena pausa."
10096-50 = "Não descuido dos meus exercícios de aquecimento, para que eu possa entrar em ação a qualquer momento."
10096-60 = "Hmm... Há algumas coisas que me preocupam, mas..."
10096-70 = "Quando a pausa terminar, acho que começarei a patrulha."
10096-80 = "Estava à sua espera, Sensei. Se precisar da minha ajuda, por favor, não hesite em pedir."
10096-90 = "Você chegou, Sensei."
10096-100 = "A partir de agora, eu serei responsável pela segurança aquática do Schale."
10096-110 = "Hã? Não tem uma piscina aqui...?"
10096-120 = "Não estou muito acostumada a usar roupa de banho... Peço desculpas se isso for um incômodo para você."
10096-130 = "Acidentes acontecem quando menos esperamos."
10096-140 = "Estou sempre atenta para poder agir imediatamente."
10096-150 = "Café? Como atrapalha, só tomei uma xícara."
10096-160 = "Deixando o salvamento de vidas de lado, não tenho muita confiança em atendimento ao cliente ou em servir de guia..."
10096-170 = "Quando estiver com sono, é bom movimentar o corpo."
10096-180 = "Vamos, acorde. Vou te ensinar os exercícios de aquecimento dos salva-vidas."
10096-190 = "Feliz aniversário, Sensei."
10096-200 = "Passe o dia de hoje com tranquilidade."
10096-210 = "Pois eu protegerei a sua segurança, Sensei."
10096-220 = "Ah, então hoje é o meu aniversário."
10096-230 = "Não sinto que seja muito diferente do dia a dia, mas..."
10096-240 = "Um novo ano começou. Espero que este ano não ocorra nenhum acidente."
10096-250 = "Justamente nos dias em que as pessoas estão empolgadas, os salva-vidas precisam estar atentos."
10096-260 = "...Mas, tomar um café com você, Sensei, não tem problema, certo?"
10096-270 = "Eu não gosto muito de doces, mas..."
10096-280 = "Hã? Então você vai fazer uma travessura...? Se não for perigoso, tudo bem..."
10096-290 = "Esse tipo de comportamento... fa-faça apenas comigo, por favor."
10096-310 = "Ufa... Sinto que realmente recuperei as energias."
10096-320 = "Está tudo bem. Isso também faz parte da lista de verificações."
10096-330 = "Além disso... quem trabalha duro merece uma recompensa."
10096-340 = "...E também, porque você sempre cuida de mim, Sensei."
10096-350 = "Por isso, este é... um pequeno presente meu para você, Sensei."
10096-360 = "Hã!? N-não é nada disso que você está pensando!"
10096-370 = "Eu estou aqui porque, bem..."
10096-380 = "...É para proteger a sua segurança, Sensei! Afinal, eu sou uma salva-vidas!"
10096-2600 = "A prova da confiança que recebi de você, Sensei... Entendo. O fardo de um salva-vidas é pesado. Farei o meu melhor para não decepcionar as suas expectativas."
