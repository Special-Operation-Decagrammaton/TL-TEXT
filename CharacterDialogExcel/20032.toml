[translation]
20032-10 = "ブルー、アーカイブ。"
20032-20 = "いつもよりちょっと身体が軽いかも。\n涼しいからかな。"
20032-30 = "ヒマリ先輩がいない、\nいまのうちに……。"
20032-40 = "ここに\nかき氷があれば、\n完璧なんだけど。"
20032-50 = "エアコンの\nスイッチは……。"
20032-60 = "暑くなってきた……\nここ、人多いし。"
20032-70 = "ここなら、\n一生暮らせそう。"
20032-80 = "おかえり、先生。\n部屋、涼しくしておいたよ。"
20032-90 = "お疲れ様、先生。\n……どうして驚くの？"
20032-100 = "どうしてずっと\nこの格好なのか……？"
20032-110 = "……気に入ってるから？"
20032-120 = "ここ……暑すぎる……\nエアコンの温度、\n下げてもいい？"
20032-130 = "やっぱり、\nジャケット脱ごうかな……。"
20032-140 = "下着はダメで、\n水着は大丈夫……？"
20032-150 = "一体何が違うの？\n防水機能の有り無し？"
20032-160 = "机の下からこんな\n雑誌を見つけたよ。\nいい資料がいっぱい。"
20032-170 = "……どうしたの、先生。\n慌てちゃって。"
20032-180 = "お誕生日おめでとう、先生。\n今日は先生の好きな服で\n過ごそうと思うんだけど……"
20032-190 = "何かリクエストとかある？"
20032-200 = "先生が一緒に\n過ごしてくれるっていうから、"
20032-210 = "最高効率の\n誕生日プランを\n作ってきたの。"
20032-220 = "今日は1秒も\n無駄にしたくない。"
20032-230 = "あけましておめでとう、先生。\n今年は、自分でも納得できる\n実力を身につけたいな。"
20032-240 = "クリスマスだね。\nこの日に合う服を\n持ってきたから、着替えて……"
20032-250 = "……えーっと、\n今の格好が一番……？"
20032-260 = "ハロウィンっていいよね。\nどんな服でも、\nみんな喜んでくれるし。"
20032-280 = "うん？\n寒くないよ。大丈夫。"
20032-290 = "逆に、いまが涼しくて\nちょうどいいくらい。"
20032-300 = "いい気分……\n先生も入る？"
20032-310 = "ふーん。いいけど。"
20032-320 = "もうちょっとしたら出るから、\n少しだけ待っててね。先生。"
20032-2600 = "服や環境が変わっても……\nこれがあればもう大丈夫。"
