[translation]
20032-10 = "Blue Archive."
20032-20 = "Sinto meu corpo um pouco mais leve que o normal.\nSerá por causa do frescor?"
20032-30 = "A Himari-senpai não está aqui,\né a minha chance..."
20032-40 = "Se tivesse uma raspadinha\naqui, seria\nperfeito."
20032-50 = "O interruptor do\nar-condicionado é..."
20032-60 = "Começou a ficar quente...\nTem muita gente aqui."
20032-70 = "Daria para viver\naqui para sempre."
20032-80 = "Bem-vindo de volta, Sensei.\nDeixei o quarto fresquinho para você."
20032-90 = "Bom trabalho, Sensei.\n...Por que está surpreso?"
20032-100 = "Por que eu continuo\nusando esse traje...?"
20032-110 = "...Porque eu gosto dele?"
20032-120 = "Aqui... está quente demais...\nPosso baixar a temperatura\ndo ar-condicionado?"
20032-130 = "Será que eu deveria\ntirar o casaco...?"
20032-140 = "Roupa íntima não pode,\nmas roupa de banho pode...?"
20032-150 = "Qual é a diferença, afinal?\nSe é à prova d'água ou não?"
20032-160 = "Encontrei esta revista\nsob a mesa.\nTem ótimos materiais aqui."
20032-170 = "...O que houve, Sensei?\nVocê parece agitado."
20032-180 = "Feliz aniversário, Sensei.\nEu pensei em passar o dia\ncom a roupa que você gosta, mas..."
20032-190 = "Tem algum pedido?"
20032-200 = "Já que você disse que\npassaria o dia comigo,"
20032-210 = "eu preparei o plano de\naniversário com a\nmaior eficiência possível."
20032-220 = "Não quero desperdiçar\nnem um segundo hoje."
20032-230 = "Feliz Ano Novo, Sensei.\nEste ano, quero adquirir\numa habilidade que me satisfaça."
20032-240 = "É Natal, né.\nTrouxe uma roupa que combina\ncom o dia, então vou me trocar..."
20032-250 = "...Ah, entendi.\nO traje atual é o melhor...?"
20032-260 = "O Halloween é legal, né.\nNão importa a roupa,\ntodos ficam felizes."
20032-280 = "Hm?\nNão estou com frio. Está tudo bem."
20032-290 = "Pelo contrário, agora está fresco\ne na medida certa."
20032-300 = "Que sensação boa...\nVocê também vai entrar, Sensei?"
20032-310 = "Hmm. Tudo bem, então."
20032-320 = "Já vou sair, então\nespere só um pouco, Sensei."
20032-2600 = "Mesmo que as roupas ou o ambiente mudem...\nCom isso aqui, já estou bem."
