[translation]
20000-20 = "Eu previ que seria agora e fiquei esperando. O momento em que o Sensei chama o meu nome... este exato instante."
20000-30 = "“Se você me der um pouco mais de tempo e orçamento”...? Isso não passa de uma desculpa para a própria falta de competência."
20000-40 = "Obter o melhor resultado dentro do tempo e orçamento concedidos. É isso que um mestre faz."
20000-50 = "Que tal construirmos uma estátua do Sensei aqui? Posso fazer com que as articulações dos braços e pernas se movam."
20000-60 = "Hum... descobri alguns itens de reparo e melhoria nos componentes internos... Hã? Não posso consertar?"
20000-70 = "Se quiser, posso instalar algumas armadilhas para surpreender quem vier aqui. Hum? Disse que não?"
20000-80 = "Bom dia, Sensei. Deixei a lista de tarefas de hoje na sua mesa. Por favor, dê uma olhada."
20000-90 = "Hum... acho que o progresso das tarefas do Sensei está um pouco ineficiente no momento."
20000-100 = "Vou procurar uma maneira melhor."
20000-110 = "Estar aqui com o Sensei assim... hehe... é divertido."
20000-120 = "Sensei, o que achou? Meus equipamentos... foram úteis?"
20000-130 = "Se eu gosto de criar coisas úteis? Isso também, mas..."
20000-140 = "Isso não é um hobby, é o meu modo de vida."
20000-150 = "Eu gosto de manutenção. A sensação de quando o coração de uma máquina morta volta a bater,"
20000-160 = "a sensação de que algo foi realizado... eu amo isso."
20000-170 = "(Esse sorriso do Sensei... para mim, é a maior motivação de todas.)"
20000-180 = "Feliz aniversário, Sensei. Por você ter nascido e vindo até nós... estou feliz."
20000-190 = "Algo que eu queira de presente? Não tenho."
20000-200 = "...Porque eu já recebi muito."
20000-210 = "Feliz Ano Novo. Este ano, vou mostrar a você uma versão minha ainda melhor e mais aprimorada..."
20000-220 = "Para o Papai Noel conseguir entregar presentes para todas as crianças de Kivotos em apenas uma noite..."
20000-230 = "As renas dele teriam que atingir, no mínimo, uma velocidade superior a Mach 4."
20000-240 = "Dia das Bruxas, é... É um dia anticientífico, mas é um dia estranho que, de alguma forma, faz o coração acelerar."
20000-260 = "Obrigada, Sensei. Esta paisagem só é possível graças a você."
20000-270 = "É linda, não é? Fico feliz que tenha dado tempo."
20000-280 = "Hum? Por que eu me esforcei tanto... você pergunta?"
20000-290 = "Porque eu queria que as alunas do Millennium pudessem caminhar em segurança por um caminho noturno brilhante."
20000-300 = "Porque o que eu posso fazer... é apenas isso."
20000-310 = "E para mim... momentos como este já são algo mais maravilhoso do que qualquer \"presente\"."
20000-320 = "O que acha, Sensei? Ainda temos tempo, então..."
20000-330 = "Poderia... ficar comigo por mais um pouco?"
20000-2600 = "Quero criar muito mais coisas. E assim... quero ser ainda mais útil para o Sensei."
