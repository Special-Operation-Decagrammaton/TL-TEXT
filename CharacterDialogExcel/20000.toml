[translation]
20000-20 = "今頃だと予測して、待ってた。\n先生が私の名前を呼んでくれる…今この瞬間を。"
20000-30 = "「今少し時間と予算を\nいただければ」…？\n自分の能力不足に対する\n言い訳に過ぎない。"
20000-40 = "与えられた時間と予算内で\nベストな結果を出すこと。\nそれがマイスターというもの。"
20000-50 = "ここに先生の銅像を建てるのはどうかな?\n手足の関節が動くように作れるよ。"
20000-60 = "ん…内部のいくつかの項目から\n修理と改善事項を発見…\nえ？修理しちゃダメ？"
20000-70 = "お望みなら、\n来た人がびっくりするような\n罠を設置してあげるけど。\nうん？ダメって？"
20000-80 = "おはよう先生。\n今日の任務リストを\n机に置いておいたの。\n確認してほしい。"
20000-90 = "ん…今の先生の\n任務進行は多少、\n非効率的な状態だと思う。"
20000-100 = "もっといいやり方を\n探してみる。"
20000-110 = "こうやって先生と\n一緒にいると…\nふふ…楽しい。"
20000-120 = "先生、どう？\n私の装備たち…\n役に立ったかな？"
20000-130 = "有用な物を作ることが\n楽しいかって？\nそれもあるけど…"
20000-140 = "これは趣味じゃなく、\n生き様だよ。"
20000-150 = "整備は好き。\n死んでいた機械の心臓が\nまた動き出す時の、"
20000-160 = "何かが叶えられたっていう、\nその感覚を愛してる。"
20000-170 = "（先生のその笑顔が…\n私にとっては最高の\nモチベーションなの）"
20000-180 = "お誕生日おめでとう先生。\n先生が生まれて、そして\n私たちのところに来てくれて。\n…嬉しい。"
20000-190 = "プレゼントで欲しいもの？\nない。"
20000-200 = "…もう、たくさんもらってるから。"
20000-210 = "明けましておめでとう。\n今年はより改善されて、\n向上した私を見せて\nあげるね…。"
20000-220 = "サンタクロースさんが\nたった一晩でキヴォトスの\n子供たちにプレゼントを渡す\nためには…"
20000-230 = "彼のトナカイは最低\nマッハ4以上の速度を出さなきゃ\nいけないはず。"
20000-240 = "ハロウィーンデーか…\n非科学的な日だけど、\nなんだかときめく、\n不思議な日だね。"
20000-260 = "ありがとう、先生。\nこの風景は、\n先生のおかげで叶ってるの。"
20000-270 = "美しいでしょ？\n間に合ってよかった。"
20000-280 = "うん？どうしてそんなに…\n頑張ったのかって？"
20000-290 = "ミレニアムの生徒たちが、\n安全に。輝く夜道が歩ける\nようにしてあげたかったから。"
20000-300 = "私にできることは…\nこれくらいしかないから。"
20000-310 = "そして私にとって…\nこういう瞬間はすでに\n「プレゼント」以上の\n素敵なものなの。"
20000-320 = "どう、先生?\nまだ時間はあるから…"
20000-330 = "もう少し…\n一緒にいてくれる？"
20000-2600 = "もっとたくさんの物が作りたい。\nそうして……もっと先生の力になりたい。"
