[translation]
20023-10 = "ブルーアーカイブ。"
20023-20 = "ヴァルキューレ警察学校、公安局局長の尾刃カンナです。\n犯罪者の尋問なら、お任せを。"
20023-30 = "ここのコーヒー…\nなかなかいい香りだ。"
20023-40 = "疲れた…。"
20023-50 = "こんなところに\n探偵ウサギシリーズの\n新作が…？"
20023-60 = "うっ、防衛室から\n連絡が…。"
20023-70 = "今日もキヴォトスが\n平和でありますよう。"
20023-80 = "お待ちしておりました、先生。"
20023-90 = "公安局の力が\n必要でしたら、いつでも。"
20023-100 = "…事件ですか？"
20023-110 = "少々お待ちを。\n令状を発行してきます。"
20023-120 = "公安局が出動するためには、\n必要な書類が多くて…"
20023-130 = "シャーレの迅速な対応が\nうらやましくなる時があります。"
20023-140 = "もちろん私には、\nこれらの責任を負う能力も\n権限もありませんが…。"
20023-150 = "コーヒーを淹れてこようと\n思うのですが…\n先生も飲みますか？"
20023-160 = "生活安全局の子たちは\nいい警察ではあります…"
20023-170 = "ですが重犯罪を担当するには\nまだ早いです。"
20023-180 = "ドーナッツは\n好きではありません。\n手が汚れますから。"
20023-190 = "狂犬のあだ名は…"
20023-200 = "その…恥ずかしいですから、\nあまり人前では\n呼ばないでください。"
20023-210 = "今日は誕生日でしたか。\nおめでとうございます。"
20023-220 = "ヴァルキューレ警察学校に\n籍を置く身として、"
20023-230 = "直接贈り物をすることは\nできませんが…。"
20023-240 = "もしよろしければ、\nいきつけのお店でご馳走します。"
20023-250 = "あ…今日は私の誕生日でしたか。"
20023-260 = "朝から局員たちに\n祝われはしましたが…"
20023-270 = "昨日、無事逮捕できた事を\n言われているのかと\n勘違いしておりました。"
20023-280 = "明けまして\nおめでとうございます。"
20023-290 = "今年は捜査中に\n顔を合わせることが\n少ないといいですね。"
20023-300 = "…もしかして、今日も夜勤を？"
20023-310 = "残念ながら\n私も今日は当直です。"
20023-320 = "…せっかくのクリスマスです。"
20023-330 = "ブラックコーヒーの代わりに、\n甘いラテはいかがですか？"
20023-340 = "すぐお持ちします。"
20023-350 = "ハロウィーン…。"
20023-360 = "捜査を遅延させる\n厄介な時期が戻ってきましたね。"
20023-370 = "仮装集団の中に\n犯罪者が紛れてしまうと、"
20023-380 = "モンタージュ照合が\n難しくなりますので…"
20023-390 = "苦手です。"
20023-410 = "先生がこのような屋台に\nいらっしゃるとは…"
20023-420 = "予想外でした…。"
20023-430 = "そうですか？"
20023-440 = "私はここが、\n一番落ち着くんです。"
20023-450 = "皆が恐れる不休の\n公安局の局長であっても…"
20023-460 = "…鎧を外せる\n場所ぐらい、必要ですから。"
20023-470 = "ですので今日は、"
20023-480 = "見なかったことに\nしていただけると、幸いです。"
20023-2600 = "そういえば、この銃が扱えず\n苦労をしていた時もありました。\n銃に慣れてきた今は、\nほとんど使う機会がなくなって残念ですが…。"
