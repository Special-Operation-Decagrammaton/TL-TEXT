[translation]
20023-10 = "Blue Archive."
20023-20 = "Sou Kanna, chefe do Departamento de Segurança Pública da Academia de Polícia Valkyrie. Se precisar interrogar criminosos, pode deixar comigo."
20023-30 = "Este café aqui... tem um aroma muito bom."
20023-40 = "Estou exausta..."
20023-50 = "Tem um volume novo da série Coelho Detetive aqui...?"
20023-60 = "Droga, recebi um contato da Sala de Defesa..."
20023-70 = "Que Kivotos continue em paz hoje também."
20023-80 = "Eu estava à sua espera, Sensei."
20023-90 = "Se precisar da força do Departamento de Segurança Pública, conte comigo a qualquer momento."
20023-100 = "...É um caso?"
20023-110 = "Espere um momento. Vou emitir o mandado."
20023-120 = "Para o Departamento de Segurança Pública entrar em ação, há muita papelada necessária..."
20023-130 = "Às vezes sinto inveja da agilidade do Schale."
20023-140 = "Claro que eu não tenho a capacidade nem a autoridade para assumir essas responsabilidades, mas..."
20023-150 = "Estou pensando em passar um café... O Sensei gostaria de um?"
20023-160 = "O pessoal do Departamento de Segurança Comunitária são bons policiais..."
20023-170 = "Mas ainda é cedo demais para eles lidarem com crimes graves."
20023-180 = "Não gosto de donuts. Eles sujam as mãos."
20023-190 = "Sobre o apelido de 'Cão Raivoso'..."
20023-200 = "Isso... é um pouco vergonhoso, então, por favor, não me chame assim na frente dos outros."
20023-210 = "Então hoje é seu aniversário? Parabéns."
20023-220 = "Como alguém que faz parte da Academia de Polícia Valkyrie,"
20023-230 = "não posso lhe dar um presente diretamente, mas..."
20023-240 = "Se não se importar, gostaria de lhe pagar uma refeição no meu restaurante favorito."
20023-250 = "Ah... hoje é meu aniversário?"
20023-260 = "Os membros do departamento me parabenizaram desde cedo, mas..."
20023-270 = "Eu achei que eles estivessem falando sobre a prisão que conseguimos realizar ontem."
20023-280 = "Feliz Ano Novo."
20023-290 = "Espero que este ano a gente não precise se encontrar tanto durante as investigações."
20023-300 = "...Por acaso, você está no turno da noite hoje também?"
20023-310 = "Infelizmente, eu também estou de plantão hoje."
20023-320 = "...É Natal, afinal."
20023-330 = "Em vez de café preto, que tal um latte doce?"
20023-340 = "Trarei agora mesmo."
20023-350 = "Halloween..."
20023-360 = "Essa época problemática que atrasa as investigações voltou."
20023-370 = "Quando criminosos se misturam entre as pessoas fantasiadas,"
20023-380 = "fica difícil fazer a identificação facial..."
20023-390 = "Eu não gosto disso."
20023-410 = "Encontrar o Sensei em uma barraca como esta..."
20023-420 = "Foi inesperado..."
20023-430 = "Você acha?"
20023-440 = "Para mim, este é o lugar onde me sinto mais tranquila."
20023-450 = "Mesmo sendo a temida chefe do Departamento de Segurança Pública que nunca descansa..."
20023-460 = "...eu preciso de um lugar onde possa tirar a armadura."
20023-470 = "Por isso, hoje,"
20023-480 = "ficaria grata se pudesse fingir que não me viu."
20023-2600 = "Falando nisso, houve uma época em que tive dificuldades por não saber manusear esta arma. Agora que me acostumei, é uma pena que quase não tenha oportunidades de usá-la..."
