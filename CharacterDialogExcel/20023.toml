[translation]
20023-10 = "Blue Archive."
20023-20 = "Sou Oba Kanna, diretora do Departamento de Segurança Pública da Escola de Polícia Valkyrie.\nSe precisar interrogar criminosos, deixe comigo."
20023-30 = "O café daqui...\nTem um aroma muito bom."
20023-40 = "Estou exausta..."
20023-50 = "O novo volume da série\ndo Coelho Detetive\nnum lugar como este...?"
20023-60 = "Ugh, uma mensagem\nda Sala de Defesa..."
20023-70 = "Que Kivotos esteja em paz\nhoje também."
20023-80 = "Eu estava esperando por você, Sensei."
20023-90 = "Se precisar da força\ndo Departamento de Segurança Pública, estarei à disposição."
20023-100 = "...É algum incidente?"
20023-110 = "Aguarde um momento.\nVou emitir um mandado."
20023-120 = "Para que o Departamento de Segurança Pública entre em ação,\nsão necessários muitos documentos..."
20023-130 = "Às vezes, eu sinto inveja\nda capacidade de resposta rápida da Schale."
20023-140 = "Claro que eu não tenho\na capacidade nem a autoridade\npara arcar com essas responsabilidades..."
20023-150 = "Eu estava pensando em preparar um café...\nO senhor também quer, Sensei?"
20023-160 = "As garotas do Departamento de Segurança Pública\nsão boas policiais..."
20023-170 = "Mas ainda é cedo para elas\nlidarem com crimes graves."
20023-180 = "Eu não gosto\nde donuts.\nEles sujam as mãos."
20023-190 = "O apelido 'Cão Louco'..."
20023-200 = "Sabe... é vergonhoso, então\npor favor, não me chame assim\nna frente dos outros."
20023-210 = "Hoje é o seu aniversário?\nMeus parabéns."
20023-220 = "Como alguém matriculada\nna Escola de Polícia Valkyrie,"
20023-230 = "Eu não posso lhe dar\num presente diretamente, mas..."
20023-240 = "Se estiver tudo bem para o senhor,\neu pagarei uma refeição no meu restaurante de sempre."
20023-250 = "Ah... hoje é o meu aniversário?"
20023-260 = "As agentes me deram parabéns\ndesde hoje de manhã, mas..."
20023-270 = "Eu acabei interpretando errado\ne achei que estivessem falando da prisão bem-sucedida de ontem."
20023-280 = "Feliz\nAno Novo."
20023-290 = "Espero que este ano nós\nnos encontremos menos\ndurante as investigações."
20023-300 = "...Por acaso, o senhor vai fazer o turno da noite hoje também?"
20023-310 = "Infelizmente,\neu também estou de plantão hoje."
20023-320 = "...Afinal, é Natal."
20023-330 = "Em vez de café preto,\nque tal um latte docinho?"
20023-340 = "Vou buscar num instante."
20023-350 = "Halloween..."
20023-360 = "Aquela época problemática\nque atrasa as investigações voltou."
20023-370 = "Se os criminosos se infiltrarem\nno meio da multidão fantasiada,"
20023-380 = "Fica difícil comparar\ncom os retratos falados..."
20023-390 = "Eu odeio essa data."
20023-410 = "Eu não esperava que o Sensei\nviesse a uma barraca de comida como esta..."
20023-420 = "Foi uma surpresa..."
20023-430 = "Acha mesmo?"
20023-440 = "Para mim, aqui é\no lugar mais relaxante."
20023-450 = "Mesmo a Diretora da Segurança Pública,\ntemida por todos e que trabalha sem parar..."
20023-460 = "...Precisa de pelo menos um lugar\npara tirar a sua armadura."
20023-470 = "Portanto, por hoje,"
20023-480 = "Ficaria grata se o senhor\nfingisse que não me viu aqui."
20023-2600 = "Pensando bem, houve uma época em que eu tinha dificuldades\npara manusear essa arma.\nÉ uma pena que, agora que finalmente me acostumei com ela,\nquase não tenho mais oportunidades de usá-la..."