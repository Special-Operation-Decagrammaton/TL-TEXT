[translation]
10067-10 = "Blue Archive."
10067-20 = "Olá, Sensei. Sou a Toki.\nDeixe-me mostrar a essência de uma agente\nvestida com trajes de infiltração."
10067-30 = "Um chá da tarde\ntranquilo...\nÉ uma experiência\nbastante revigorante."
10067-40 = "Este lugar realmente\nenriquece a alma."
10067-50 = "Se eu tivesse tempo e\norçamento suficientes...\nEu também gostaria de\ncriar um espaço assim."
10067-60 = "Como agente, a vigilância é\nindispensável, mas...\nAo vir aqui, acabo me\ndescuidando um pouco."
10067-70 = "Cada vez que visito este lugar,\nele me faz refletir sobre\nvárias coisas.\nNo bom sentido."
10067-80 = "Olá, Sensei."
10067-90 = "A responsável de hoje\nsou eu, a coelhinha."
10067-100 = "Conto com você.\nBoing, boing."
10067-110 = "Bem-vindo de volta, Sensei.\nEu estava esperando por você."
10067-120 = "Como é algo importante,\nirei repetir."
10067-130 = "Eu estava esperando por você.\nBoing, boing."
10067-140 = "Eu sou uma coelha,\nentão não sou um cachorro, mas..."
10067-150 = "Se você me fizer esperar\naté este ponto..."
10067-160 = "Vou acabar fazendo alguma travessura, viu?"
10067-170 = "Me chamou? \nBem, o que faremos agora?"
10067-180 = "Escolta? Combate? Destruição?\nSabotagem? Ou talvez ser um herói da justiça?"
10067-190 = "Hm?...\nSó me chamou por chamar...?"
10067-200 = "O trabalho no Schale\né algo curioso."
10067-210 = "Parece ser ocupado,\nmas ao mesmo tempo não..."
10067-220 = "Não é que eu queira\ntrabalhar ativamente."
10067-230 = "Eu também tenho\nvontade de vadiar."
10067-240 = "Mas... sabe, eu quero\nser útil para você, Sensei."
10067-250 = "Sensei, por favor, me ajude.\nUm incidente ocorreu."
10067-260 = "O grande incidente de que\neu estou sem fazer nada."
10067-270 = "Feliz aniversário,\nSensei."
10067-280 = "Hm? Sim,\nclaro que me lembro."
10067-290 = "Uma memória excelente é\num dos requisitos para\num agente de elite."
10067-300 = "Então, vamos sair\npara comemorar agora."
10067-310 = "Meu aniversário...\nObrigada por\nse lembrar."
10067-320 = "Mas, agora eu sou\numa agente."
10067-330 = "Por favor, que a comemoração\nseja discreta, em um lugar\nonde estejamos apenas nós dois."
10067-340 = "O ano novo chegou.\nO tempo voa."
10067-350 = "Você já definiu suas\nmetas para o ano novo?"
10067-360 = "Vou te ajudar para que você\nnão desista logo de cara."
10067-370 = "É Natal."
10067-380 = "Hm? Não, estou bem."
10067-390 = "Não estou com frio\nnem nada. Atchim!"
10067-400 = "...Por favor, finja que\nnão viu isso. Snif."
10067-410 = "É Halloween."
10067-420 = "É um dia em que vejo muitas pessoas\ncom fantasias parecidas com a minha."
10067-430 = "...Será que todas elas\nquerem ser agentes?"
10067-450 = "Hm... Sensei...?"
10067-460 = "O que houve...?\nPor que está com essa\nexpressão estranha...?"
10067-470 = "Se não se importar,\nposso dormir um pouco\nmais...?"
10067-480 = "Hm...?\nDisse para eu acordar...?"
10067-490 = "...Não quero.\nEu quero dormir mais."
10067-500 = "Além disso, esta cama...\nÉ quente, fofinha, e\neu gosto dela."
10067-510 = "Não importa o que diga,\nSensei, eu vou dormir..."
10067-520 = "Hmm... estou com sono..."
10067-2600 = "Ouvi dizer que, às vezes, é importante ser honesta e expressar seus sentimentos como eles realmente são.\nMuito obrigada, Sensei.\nDo fundo do meu coração, sou muito grata."
