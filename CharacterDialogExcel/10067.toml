[translation]
10067-10 = "ブルーアーカイブ。"
10067-20 = "こんにちは、先生。トキです。\n潜入用衣装に身を包んだエージェントとしての真髄、\nお見せしましょう。"
10067-30 = "穏やかな\nティータイム……。\nなかなか新鮮な\n経験です。"
10067-40 = "ここは、心を豊かに\nしてくれますね。"
10067-50 = "十分な時間と\n予算があったら……\n私もこういう空間を\n作りたいです。"
10067-60 = "エージェントたる者、油断は\n禁物なのですが……\nここに来ると、つい気が\n緩んでしまうのです。"
10067-70 = "訪れるたびに、\nいろいろな事を\n考えさせてくれる場所です。\n良い意味で。"
10067-80 = "こんにちは、先生。"
10067-90 = "本日の当番は\nバニーの私です。"
10067-100 = "どうぞよろしくお願いします。\nぴょんぴょん。"
10067-110 = "おかえりなさい、先生。\nお待ちしておりました。"
10067-120 = "大事なことなので\nもう一度言います。"
10067-130 = "お待ちしておりました。\nぴょんぴょん。"
10067-140 = "私はウサギなので\n犬ではありませんが……"
10067-150 = "ここまで待てを\nされてしまいますと……。"
10067-160 = "いたずらをしてしまいますよ？"
10067-170 = "お呼びでしょうか？\nさて、何を致しましょう。"
10067-180 = "護衛ですか？戦闘？破壊？\n工作？それとも正義の味方？"
10067-190 = "ん？……\n呼んでみただけ……？"
10067-200 = "シャーレの業務は\n不思議ですね。"
10067-210 = "忙しいようで、\n忙しくないような……。"
10067-220 = "別に、積極的に仕事が\nしたいわけではありません。"
10067-230 = "私だってサボりたい\n気持ちもあります。"
10067-240 = "ですが……その、\n先生のお力になりたいのです。"
10067-250 = "先生、助けてください。\n事件が起こりました。"
10067-260 = "私が暇をしているという\n大事件です。"
10067-270 = "お誕生日\nおめでとうございます、先生。"
10067-280 = "ん？ええ、\n当然覚えております。 "
10067-290 = "優れた記憶力は\n最高のエージェントの\n条件でもありますから。"
10067-300 = "では、今からお祝いに\n出かけるとしましょう。"
10067-310 = "誕生日……\n覚えていてくださり\nありがとうございます。"
10067-320 = "ですが、\n今の私はエージェント。"
10067-330 = "お祝いもまた内密に、\n二人きりの場所で\nお願い致します。"
10067-340 = "年が明けましたね。\n光陰矢の如しです。"
10067-350 = "新年の目標は立てましたか？"
10067-360 = "三日坊主にならないよう\nお手伝いしましょう。"
10067-370 = "クリスマスですね。"
10067-380 = "ん？いいえ、平気です。"
10067-390 = "別に寒くなんか\nありません。はくしょ！"
10067-400 = "……見なかったことに\nしてください。ぐすん。"
10067-410 = "ハロウィーンですね。"
10067-420 = "街で私のような仮装をした\n人をよく見かける日です。"
10067-430 = "……みな、エージェント\n志望なのでしょうか？"
10067-450 = "ん……先生……？"
10067-460 = "どうされました……？\nそんな、おかしな\n顔をして……？"
10067-470 = "差し支えなければ、\nもう少し寝ても\n良いでしょうか……？"
10067-480 = "んん……？\nとりあえず起きてって……？"
10067-490 = "……嫌です。\n私はもっと寝たいです。"
10067-500 = "それにこのベッド……\nあったかくて、ふかふかで、\n気に入っているのです。"
10067-510 = "先生がなんと言おうと、\n私は寝ます……。"
10067-520 = "んん……眠い……。"
10067-2600 = "時には素直に、\nありのままの気持ちを\n伝えることも大事と聞きました。\nありがとうございます、先生。\n心から、感謝しております。"
