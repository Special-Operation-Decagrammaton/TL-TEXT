[translation]
10133-10 = "Blue Archive."
10133-20 = "Vou te mostrar a resposta mais racional para dominar o domínio eletrônico."
10133-30 = "Este lugar também é um tipo de espaço conceitual... Precisa ser analisado."
10133-40 = "Eu queria conseguir ser boa em arrumar as coisas..."
10133-50 = "...Pelo visto, a sensibilidade do Sensei é próxima da minha."
10133-60 = "Se eu criar o 'Avant-Garde-kun Type.Maid', talvez eu o coloque aqui."
10133-70 = "Vou usar o máximo que puder... com cuidado."
10133-80 = "Eu estava esperando, Sensei."
10133-90 = "Vou te oferecer um suporte de trabalho eficiente. É racional, não é?"
10133-100 = "Vamos começar o trabalho. Pode me pedir qualquer coisa."
10133-110 = "Dizem que... o tempo não flui."
10133-120 = "É a teoria de que o passado, o presente e o futuro existem no mesmo instante."
10133-130 = "Se essa teoria estiver correta..."
10133-140 = "Significa que, agora mesmo, ainda estamos no meio daquele grande incidente."
10133-150 = "Sinceramente, tenho interesse no que tem dentro do seu PC."
10133-160 = "Com este traje, eu poderia hackear o dispositivo do Sensei facilmente."
10133-170 = "...Pode ficar tranquilo. Eu não gosto... de métodos assim."
10133-180 = "O que será que existe além do mundo observável?"
10133-190 = "Eu quero saber a resposta."
10133-200 = "...Junto com você."
10133-210 = "Eu deveria ter preparado um traje para o Sensei também."
10133-220 = "Assim, poderíamos ter aproveitado o espaço conceitual juntos."
10133-230 = "...Deveríamos sair assim na realidade?"
10133-240 = "Não dá para sair com este visual."
10133-250 = "A gravidade existe em todos os lugares."
10133-260 = "...Sim, entre você e eu também."
10133-270 = "Inconscientemente, estamos caindo na direção um do outro."
10133-280 = "Feliz aniversário, Sensei."
10133-290 = "Como presente, preparei um Avant-Garde-kun especializado em suporte de trabalho."
10133-300 = "...Hã? Você quer receber o suporte... diretamente de mim?"
10133-310 = "Is-isso... é complicado..."
10133-320 = "Ah, então hoje... era o meu aniversário."
10133-330 = "Eu estava tão imersa na missão que tinha esquecido."
10133-340 = "Quando me concentro em algo... acabo não prestando atenção em outras coisas."
10133-350 = "Graças ao Sensei, criei uma boa memória. Obrigada."
10133-360 = "Sensei, feliz ano novo."
10133-370 = "Existem roupas adequadas para o ano novo, não existem?"
10133-380 = "...Será que assim está bom?"
10133-390 = "Muito bem-vindo...? Se é assim... então tudo bem."
10133-400 = "Parece que hoje é o dia de celebrar o nascimento de alguém."
10133-410 = "Eu não consigo entender muito bem essas coisas, mas..."
10133-420 = "Agradeço por ter reservado este tempo para mim."
10133-430 = "Fantasmas? Eu não acredito neles."
10133-440 = "Existências que não podem interagir com a gravidade ou forças eletromagnéticas..."
10133-450 = "São coisas que nossos olhos não conseguem captar."
10133-460 = "...Não entendeu? Por quê?"
10133-480 = "Ufa... me acalmei."
10133-490 = "Eu não levei em consideração a temperatura interna."
10133-500 = "Logo eu... parece que me distraí com o resultado que estava diante de mim..."
10133-510 = "...Deixe-me descansar um pouco."
10133-520 = "Com esse calor, meu raciocínio não está muito..."
10133-530 = "……Sensei?\nPor que você está com essa cara……."
10133-540 = "……Ah!!"
10133-550 = "(E-eu…… o que eu……!?)"
10133-560 = "I-isso\nnão foi de propósito……!\nMe desculpe……!"
10133-570 = "E-eu já estou\nbem, então……!"
10133-2600 = "Proteger a todos……\nEssa vontade forte é o que\nme faz puxar o gatilho."
