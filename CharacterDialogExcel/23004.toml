[translation]
23004-20 = "O que torna uma garota bela não é a maquiagem, mas sim a paixão."
23004-30 = "…Se eu fizer um robô do Sensei… talvez eu fique rica."
23004-40 = "Falando nisso, já está na hora de fazer a manutenção do helicóptero também."
23004-50 = "Hmm… que tal um vaso sanitário com funções de combate?"
23004-60 = "Por que ninguém precisa de roupas íntimas com camuflagem óptica…? E olha que eu estava confiante nisso…"
23004-70 = "Hmm… será que não tem nada precisando de conserto?"
23004-80 = "Bem-vindo, Sensei. Conto com você hoje."
23004-90 = "Me chamar foi uma escolha racional."
23004-100 = "Vou me esforçar para corresponder a essa expectativa."
23004-110 = "(Hmm… o Sensei é… realmente difícil de analisar.)"
23004-120 = "…Como calculado. Assim, podemos ficar juntos."
23004-130 = "As batalhas do Millennium são decididas por quão bons são os engenheiros que estão com você."
23004-140 = "Nós nos tornamos capazes de fazer muito mais por estarmos com o Sensei."
23004-150 = "A verdadeira beleza das máquinas é ser racional, precisa e simples."
23004-160 = "Feliz aniversário, Sensei."
23004-170 = "Então, qual é a sua idade de fabricação este ano?"
23004-180 = "Hoje é meu aniversário?"
23004-190 = "Entendo. Eu tinha esquecido. Não era algo muito importante…"
23004-200 = "Mas… é estranhamente bom saber que o Sensei está comemorando comigo."
23004-210 = "Feliz Ano Novo, Sensei."
23004-220 = "Este ano, eu serei uma pessoa mais gentil."
23004-230 = "…Porque o Sensei está aqui."
23004-240 = "Seria bom se o Papai Noel me desse equipamentos de última geração."
23004-250 = "Hum? Você acha melhor eu mesma fabricar?"
23004-260 = "Bem. Isso é…"
23004-270 = "O Papai Noel?"
23004-280 = "Me pediram para fazer um boneco de abóbora que se move."
23004-290 = "No entanto, recusaram a entrega porque eu incluí uma função de autodestruição."
23004-300 = "……Não consigo entender. Um robô sem função de autodestruição é apenas sucata."
23004-320 = "Vejamos… hum, o eixo está ficando frouxo."
23004-330 = "Isso significa que o rolamento está…"
23004-340 = "Sim, talvez seja necessário trocar as peças."
23004-350 = "……Sensei, você acha interessante ficar olhando isso?"
23004-360 = "Se para o Sensei está tudo bem, eu não me importo, mas…"
23004-370 = "Como envolve um pouco de perigo, recomendo que você se sente ali para observar…"
23004-380 = "Pedaços de metal afiados ficam espalhados por toda parte por aqui,"
23004-390 = "o cheiro de óleo é forte, e além disso…"
23004-400 = "seu rosto vai ficar coberto de suor e fuligem, então…"
23004-410 = "Não, esqueça… ignore o que eu disse agora."
23004-420 = "……Entendo, exatamente como eu pensei."
23004-430 = "Falta óleo lubrificante e a parte do rolamento parece estar desgastada."
23004-440 = "Pode pegar aquela chave inglesa ali para mim?"
23004-450 = "Ah… desculpe, isso foi apenas… um hábito meu."
23004-460 = "……Ainda assim, é inegável que é mais eficiente quando alguém ajuda ao lado,"
23004-470 = "e meu ânimo também melhora."
23004-480 = "Seu rosto vai ficar sujo de fuligem também, mas…"
23004-490 = "Você poderia me ajudar?"
23004-2600 = "O milagre que realizo com as pontas dos meus dedos. Design e fabricação. Sensei, espere pelo que farei daqui em diante."
