[translation]
20038-10 = "Blue Archive."
20038-20 = "Red Winter... não, bem-vindo a Shanhaijing. Para não manchar a dignidade do meu bigode, farei o possível para lhe oferecer todo o meu apoio."
20038-30 = "Ufa... Este lugar é fresco, que alívio."
20038-40 = "(Chá... sem geleia? Que jeito peculiar de beber...)"
20038-50 = "Vou usar este design como referência para os produtos da Cherino-chan."
20038-60 = "Será por causa da roupa leve? Meus movimentos ficaram mais fáceis."
20038-70 = "A partir de agora, trarei as últimas informações sobre a grande Cherino-sama!"
20038-80 = "Bem-vindo, já decidiu o seu pedido?"
20038-90 = "...Tentei imitar a atendente da Associação Xuanwu. Como me saí? Fufu."
20038-100 = "Estava à sua espera, Sensei. Gostaria de um chá gelado?"
20038-110 = "Ufa... este calor... vai levar um tempo até eu me acostumar."
20038-120 = "Shanhaijing realmente valoriza a educação. Vejo muitas crianças dentro do distrito autônomo."
20038-130 = "Eu gosto de crianças, sabe? Afinal, elas são o futuro da escola."
20038-140 = "A apresentação do Clube de Ópera de Pequim me fez pensar novamente sobre os vários tipos de oratória que existem."
20038-150 = "No próximo discurso regular, vou incorporar elementos da ópera de Pequim. Fufu."
20038-160 = "Os pratos da Associação Xuanwu são todos excelentes, mas são um pouco gordurosos..."
20038-170 = "Estou preocupada com o equilíbrio nutricional da Cherino-chan."
20038-180 = "Eu dei um bigode de presente para a líder da Xuanlongmen, mas... fui educadamente recusada."
20038-190 = "Eu achei que combinaria com ela..."
20038-200 = "Feliz aniversário, Sensei."
20038-210 = "Comprei os pães recheados especiais da Associação Xuanwu."
20038-220 = "Err... tem um pão recheado na minha cabeça...?"
20038-230 = "...Ah, é verdade, hoje é meu aniversário. Eu estava tão concentrada no trabalho que... acabei esquecendo."
20038-240 = "Não se preocupe com presentes."
20038-250 = "...Se você insiste tanto..."
20038-260 = "Poderia tirar uma soneca comigo? Fufu."
20038-270 = "Feliz Ano Novo, Sensei. Já teve seu primeiro sonho do ano?"
20038-280 = "Meu primeiro sonho foi... um pesadelo onde a Cherino-chan me ultrapassava em altura..."
20038-290 = "Uma festa de Natal em Shanhaijing... É algo muito bom."
20038-300 = "Embora seja uma pena não termos conseguido decorar com visco."
20038-310 = "Como fantasia de Halloween, peguei emprestadas algumas máscaras do Clube de Ópera de Pequim."
20038-320 = "Tem muitas máscaras com bigodes desenhados..."
20038-330 = "Será que o pessoal de Shanhaijing gosta de bigodes?"
20038-350 = "Brisa fresca... uma sombra perfeita... e ainda me refrescando com um leque..."
20038-360 = "Fufu. Realmente, esta é uma experiência inédita."
20038-370 = "Cada uma dessas experiências expande nossos horizontes, não é?"
20038-380 = "Oh? Talvez não seja algo tão interessante assim?"
20038-390 = "Fufu, Sensei. Não fique olhando daí... venha aqui."
20038-400 = "Veja, eu vou te abanar com o leque."
20038-2600 = "Dizem que as palavras são mais poderosas que as armas, mas... ...a arma é mais rápida para convencer alguém."
