[translation]
20038-10 = "ブルーアーカイブ。"
20038-20 = "レッドウィンター……いや、山海経へようこそ。\n髭の威厳に恥じぬよう、誠心誠意、\nお力添えいたしますね。"
20038-30 = "ふぅ……\nここは涼しくて\n助かりました。"
20038-40 = "（ジャムなしで\n紅茶を…？変わった\n飲み方ですね…）"
20038-50 = "このデザイン、\nチェリノちゃん\nグッズの参考に\nいたします。"
20038-60 = "軽装だからでしょうか？\n動きが楽になりました。"
20038-70 = "これより、偉大なる\nチェリノ様の\n最新情報を\nお届けします！"
20038-80 = "いらっしゃいませ、\nご注文はお決まりですか？"
20038-90 = "…玄武商会の店員さんを\n真似てみました。\nどうでした？ふふ。"
20038-100 = "お待ちしておりました、先生。\n冷たいお茶はいかがですか？"
20038-110 = "ふぅ…この暑さ…慣れるまで\n時間がかかりそうです。"
20038-120 = "山海経は教育を\n重んじるだけありますね。\n自治区内で子どもを\n見かけることが多いです。"
20038-130 = "子どもは好きですよ？\n学園の未来とも言えますから。"
20038-140 = "京劇部の公演、話術にも\n様々な種類があるのだと\n改めて考えるキッカケに\nなりました。"
20038-150 = "次回の定期演説では、\n京劇の要素を\n取り入れてみます。ふふ。"
20038-160 = "玄武商会のお料理は\nどれも絶品ですが、\n少々コッテリしていて…"
20038-170 = "チェリノちゃんの栄養バランスが\n心配です。"
20038-180 = "玄龍門の門主様に髭の\nプレゼントをしたのですが…\n丁重に断られてしまいました。"
20038-190 = "似合うと思ったのですが…"
20038-200 = "お誕生日\nおめでとうございます、先生。"
20038-210 = "玄武商会の特製肉まんを\n買ってまいりました。"
20038-220 = "ええーと…私の頭に、\n肉まんはついてませんよ…？"
20038-230 = "…ああ、そういえば\n私の誕生日ですね。\n仕事に集中していたので…\nうっかり失念しておりました。"
20038-240 = "プレゼントのことは\n気にしないでください。"
20038-250 = "…どうしても、\nとおっしゃるのなら…"
20038-260 = "お昼寝の時間、\n添い寝をお願いできますか？\nふふ。"
20038-270 = "明けましておめでとう\nございます、先生。\n初夢は見ましたか？"
20038-280 = "私の初夢は…チェリノちゃんに\n身長を追い越されるという…\n悪夢でした…"
20038-290 = "山海経での\nクリスマスパーティー…。\n良いものですね。"
20038-300 = "ヤドリギを飾れなかったのは\n残念ですが。"
20038-310 = "ハロウィーンの仮装として、\n京劇部からいくつかお面を\n借りてきました。"
20038-320 = "髭の描いてあるお面が\n多いですね…"
20038-330 = "山海経のみなさん、\n実は髭がお好きなのかも？"
20038-350 = "涼しい風…\nちょうどよい日陰…\n更にはうちわで涼む…。"
20038-360 = "ふふ。たしかにこれは\n初めての経験です。"
20038-370 = "こういった経験一つ一つが\n視野を広げてくれるのですね。"
20038-380 = "あら？あまり面白いものでは\nないかもしれませんよ？"
20038-390 = "ふふ、先生。\nそんなところで見てないで…\nこちらにお越しください。"
20038-400 = "ほら、うちわで扇いで\n差し上げますので。"
20038-2600 = "言葉は銃より優れる、と言いますが……\n……銃のほうが説得は早いですから。"
