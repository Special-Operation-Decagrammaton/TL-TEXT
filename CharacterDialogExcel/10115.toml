[translation]
10115-10 = "Blue Archive!"
10115-20 = "Millennium Science School, rebatedora número 4, Rei Nozomi. Meu objetivo é... 10% de aproveitamento!"
10115-30 = "Sumire-senpai... ela não está por aqui, né...?"
10115-40 = "O descanso também é importante para um treino eficiente..."
10115-50 = "A cafeína ajuda a melhorar o desempenho nos exercícios, não ajuda?"
10115-60 = "(Eu não deveria... pular o treino de hoje, né?)"
10115-70 = "Aquele chantilly parece delicioso... não, preciso resistir."
10115-80 = "Bem-vindo de volta, Sensei! Eu estava organizando a lista de tarefas de hoje."
10115-90 = "Não é nada demais, é o de sempre. Eu também cuidava do gerenciamento da agenda do clube de beisebol."
10115-100 = "Bom dia! Hoje também! Conto com você!"
10115-110 = "...Hehe, isso foi só uma saudação pré-jogo."
10115-120 = "Quer que eu ajude com algo? Sou boa em organizar dados e fazer estatísticas!"
10115-130 = "...Não tão boa quanto as veteranas do Seminar, claro."
10115-140 = "Eu? Se for para escolher, sou do tipo que gosta de atividades ao ar livre."
10115-150 = "...Embora eu só vá ao campo de treino ou ao estádio. Isso conta como ar livre...?"
10115-160 = "Trabalhar no Schale é ótimo! É um motivo legítimo para descansar."
10115-170 = "Mas já estou começando a querer treinar."
10115-180 = "Se terminarmos cedo, quer sair comigo?"
10115-190 = "Chegaram cards limitados na loja do estádio!"
10115-200 = "Sensei, você já foi a um centro de rebatidas?"
10115-210 = "Acho que você vai adorar! Rebater a bola com toda a força é muito revigorante!"
10115-220 = "Sensei, hoje é seu aniversário, não é?"
10115-230 = "Hehe, sou boa em memorizar números. Como a média de rebatidas dos jogadores ou anuários de beisebol..."
10115-240 = "Enfim! Feliz aniversário!"
10115-250 = "Vou fazer o meu melhor para te ajudar hoje! Continue contando comigo, hehe..."
10115-260 = "Olá, Sensei!"
10115-270 = "...Ah! Meu aniversário...? Ah, obrigado... V-você se lembrou..."
10115-280 = "P-p-presente!? Não! Eu só... só de você ter me parabenizado, já fico feliz...!"
10115-290 = "...Estou muito feliz. Hehe..."
10115-300 = "Feliz Ano Novo, Sensei!"
10115-310 = "Este ano, vou conseguir um home run com estas mãos...!"
10115-320 = "Não, antes disso, preciso chegar aos 30% de aproveitamento...?"
10115-330 = "...Vou começar mirando nos 10%!"
10115-340 = "A intertemporada é o momento de fortalecer a base e acumular forças para a próxima primavera..."
10115-350 = "...Então, Sensei, vamos comer frango hoje! Ah, peru assado também seria bom!"
10115-360 = "Hoje é o dia de se fantasiar de fantasma..."
10115-370 = "Dizem que 'não há nada mais assustador do que o desempenho do clube de beisebol de Millennium'..."
10115-380 = "Mas agora que eu entrei, não vou deixar que digam mais isso!"
10115-400 = "Esta foi a primeira bola que eu peguei..."
10115-410 = "É a bola do meu primeiro home run, uma lembrança."
10115-420 = "Quando comecei a jogar beisebol, eu a carregava para todo lugar."
10115-430 = "Aquele home run que vi naquele dia..."
10115-440 = "Eu queria poder rebater da mesma forma algum dia."
10115-450 = "Como ela ficou toda gasta, agora a guardo no meu armário."
10115-460 = "Quando sinto que vou desistir, olhar para esta bola..."
10115-470 = "Me faz lembrar do porquê comecei... e me dá energia."
10115-480 = "...É um amuleto muito importante para mim."
10115-2600 = "Muito obrigada por me orientar com tanta dedicação! Vou me tornar uma rebatedora de 30% logo e retribuir o favor, Sensei! ...Quer dizer, posso começar pelos 10%?"
