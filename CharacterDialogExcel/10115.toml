[translation]
10115-10 = "ブルー、アーカイブ！"
10115-20 = "ミレニアムサイエンススクール、\n4番バッター、野正レイです。\n目指すは……打率1割、です！"
10115-30 = "スミレ先輩……\nさすがにここには\nいませんよね……？"
10115-40 = "効率的な練習の\nためには休息も\n大事……。"
10115-50 = "カフェインは運動効果を\n上げてくれるんで\nしたっけ。"
10115-60 = "（今日の練習、\nサボっちゃ……\nダメだよなぁ）"
10115-70 = "あのホイップクリーム、\n美味しそう……\nいや、我慢我慢。"
10115-80 = "おかえりなさい、先生！\n今日のToDoリストを\nまとめていました。"
10115-90 = "別にいつものことですよ？\n野球部のスケジュール管理も\nしていましたから。"
10115-100 = "おはようございます！本日も！\nよろしくお願いしますっ！"
10115-110 = "……へへ、今のは\n試合前の挨拶です。"
10115-120 = "何かお手伝いしましょうか？\nデータをまとめたり\n統計を取るのは得意ですよ！"
10115-130 = "……セミナーの先輩ほどじゃ、\nないですけど。"
10115-140 = "私ですか？\nどちらかというと\nアウトドア派です。"
10115-150 = "……といっても、練習場か\nスタジアムくらいしか\n行きませんが。\nアウトドアっていうのかな…？"
10115-160 = "シャーレ当番、いいですね！\nちゃんと休む理由になります。"
10115-170 = "でも、そろそろ練習したく\nなってきました。"
10115-180 = "もし、早く終わったら\n一緒に出かけませんか？"
10115-190 = "スタジアムショップに\n限定カードが\n入荷されたんですよ！"
10115-200 = "先生はバッティングセンターに\n行ったこと、ありますか？"
10115-210 = "絶対気に入ると思いますよ！\n思いっきりボールを\n打ってると、スカーッと\nして気持ちいいんです！"
10115-220 = "先生、今日お誕生日ですよね？"
10115-230 = "へへ、数字を覚えるのは\n得意なんです。\n選手の打率とか、\n野球の年鑑とか……"
10115-240 = "とにかく！お誕生日、\nおめでとうございます！"
10115-250 = "今日一日、私にできることは\n精一杯やりますので！\nこれからも、よろしく\nお願いします、へへ……"
10115-260 = "こんにちは、先生！"
10115-270 = "……えっ！私の誕生日……？\nあ、ありがとうございます……\nお、覚えてて\nくださったんですね……"
10115-280 = "プ、ププ、プレゼント！？\nいえっ！私はその、先生に\n祝ってもらえただけで……！"
10115-290 = "……すごく、嬉しいです。\nへへっ……"
10115-300 = "明けましておめでとう\nございます、先生！"
10115-310 = "今年こそ、この手で\nホームランを……！"
10115-320 = "いや、その前に3割打者に\nなるところから……？"
10115-330 = "……1割から目指します！"
10115-340 = "オフシーズンは、\n次の春にむけて\n足元を固め、\n力を蓄えるとき……"
10115-350 = "……ということで先生、\n今日はチキンにしましょう！\nあ、ローストターキーでも\nいいですね！"
10115-360 = "今日はお化けに仮装する日……"
10115-370 = "「ミレニアムの野球部の\n成績ほどホラーなもの\nはない」……なんて、\n言われてたみたいですが……"
10115-380 = "私が入った以上、\nもうそんなことは\n言わせませんよ！"
10115-400 = "これは私が初めて捕った……"
10115-410 = "思い出の、\nホームランボールです。"
10115-420 = "野球を始めたての頃、\nよく持ち歩いてました。"
10115-430 = "あの日みたホームランを――"
10115-440 = "いつか、自分でも同じように\n打ちたいと思って。"
10115-450 = "今はボロボロに\nなってしまったので\nロッカーに保管しています。"
10115-460 = "くじけそうな時は、\nこのボールを見ると"
10115-470 = "初心に戻れるような気がして…\n元気をもらえる。"
10115-480 = "……大切な、お守りなんです。"
10115-2600 = "ここまで丁寧にご指導くださり、\nありがとうございます！\n早く3割打者になって、\n先生に恩返ししますね！\n…………えっと、1割からでいいですか？"
