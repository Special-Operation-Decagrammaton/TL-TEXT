[translation]
16003-20 = "É uma extensão das tarefas da brigada de autodefesa, não é? Pela segurança de Trinity, cooperarei o quanto for necessário."
16003-30 = "（Este lugar é tão pacífico...）"
16003-40 = "（Ah... este enfeite, que fofo...）"
16003-50 = "（Provavelmente, algo tão fofo não combina comigo...）"
16003-60 = "A segurança deste lugar é... impressionante. Não há nada a apontar."
16003-70 = "Descansar também faz parte da missão."
16003-80 = "Bem-vindo, Sensei. Sei que está ocupado, mas ainda assim, quero vê-lo o máximo que puder."
16003-90 = "Sensei, eu estava à sua espera. Vamos logo fazer a patrulha juntos."
16003-100 = "Eu passo uma impressão tão fria assim...?"
16003-110 = "Atividades da brigada de autodefesa? É claro que é difícil, mas... é algo que alguém precisa fazer."
16003-120 = "Não há tempo para descansar."
16003-130 = "A justiça é algo que deve ser corrigido a partir de pequenas coisas."
16003-140 = "Eu... disse algo indelicado?"
16003-150 = "Feliz aniversário, Sensei."
16003-160 = "Hoje é o seu aniversário, Sensei. Que tal fazermos um passeio tranquilo em vez de patrulhar?"
16003-170 = "Dizem que não há um grande significado em comemorar o dia em que se nasceu, mas ser parabenizada por você, Sensei..."
16003-180 = "Sinto como se tivesse ganhado algo muito especial."
16003-190 = "Qual é o seu objetivo de ano novo, Sensei? O meu é... continuar me esforçando na patrulha, como sempre."
16003-200 = "Com o feriado prolongado se aproximando, é uma época em que todos ficam mais relaxados."
16003-210 = "É justamente agora que devemos patrulhar com ainda mais rigor!"
16003-220 = "Tantas pessoas estranhas na cidade... O Halloween é um festival assim?"
16003-240 = "...... É lindo."
16003-250 = "Daqui, parece que dá até para alcançar as estrelas."
16003-260 = "Ultimamente, tenho conseguido passar momentos calmos e tranquilos assim..."
16003-270 = "...... Talvez desde que conheci você, Sensei."
16003-280 = "...... Sensei."
16003-290 = "Se não se importar, poderia continuar ao meu lado daqui em diante?"
16003-300 = "Talvez eu sempre acabe falando apenas coisas entediantes, mas..."
16003-310 = "Mesmo assim, um dia, eu também..."
16003-320 = "...... Sim. Um dia, com certeza."
16003-2600 = "Como esperado, usar uma arma com a qual estou acostumada é o melhor."
