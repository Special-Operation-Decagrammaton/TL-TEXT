[translation]
16003-20 = "自警団任務の延長ですね。\nトリニティの安全のためなら、\nいくらでも協力します。"
16003-30 = "（ここは平和ですね）"
16003-40 = "（あ…この飾り、\n可愛い…）"
16003-50 = "（多分、こんな可愛い物は\n私には似合わない…）"
16003-60 = "ここのセキュリティは…\n素晴らしいですね。\n非の打ち所が\nありません。"
16003-70 = "休憩も任務の一部です。"
16003-80 = "ようこそ、先生。\nお忙しいとは思いますが、\nそれでも、\nできるだけお会いしたいです。"
16003-90 = "先生、お待ちしておりました。\n早く一緒にパトロールに\n行きましょう。"
16003-100 = "私ってそんなに\n冷たい印象ですか…？"
16003-110 = "自警団の活動ですか？\nもちろん大変ですが…\n誰かがやらないといけない\n事ですから。"
16003-120 = "休んでいる暇はありません。"
16003-130 = "正義というものは、\n一つの小さなことから\n正すのが大事なのです。"
16003-140 = "何か…私、失礼なことでも？"
16003-150 = "お誕生日おめでとう\nございます、先生。"
16003-160 = "今日は先生のお誕生日ですし、\nパトロールの代わりにのんびり\nお散歩でもいかがですか？"
16003-170 = "生まれた日を記念する\nことに大きな意味はないと\n言いますが、先生に祝って\nいただけるなんて…"
16003-180 = "なんだかとっても\n得をした気分ですね。"
16003-190 = "先生の、新年の目標は\nなんですか?\n私は…いつも通り、頑張って\nパトロールをすることです。"
16003-200 = "連休を目前にして、\n皆さんの気が緩む時期ですね。"
16003-210 = "こういう時こそ、もっと厳しく\nパトロールしましょう!"
16003-220 = "変な人たちが街にたくさん…。\nハロウィンって、\nこういうお祭りなんですか？"
16003-240 = "……綺麗ですね。"
16003-250 = "ここからなら、\n星が掴めてしまいそうです。"
16003-260 = "ここ最近はこうしてゆっくりと、\n落ち着いた時間も\n過ごすことができて……。"
16003-270 = "……先生と出会った頃から、\nかもしれません。"
16003-280 = "……先生。"
16003-290 = "よろしければ\nこれからも、一緒に\n居ていただけますでしょうか。"
16003-300 = "私はいつも、つまらない\nことばかり口にしてしまうかも\nしれませんが……。"
16003-310 = "それでもいつかは、\n私も……。"
16003-320 = "……はい。\nいつか、きっと。"
16003-2600 = "やはり、手慣れた\n武器を使うのが一番ですね。"
