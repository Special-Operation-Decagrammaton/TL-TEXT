[translation]
10108-10 = "ブルーアーカイブ。"
10108-20 = "こんな時間に呼び出すなんて……も、もちろん全然大丈夫ですけど！今日の件は、後日ちゃんと埋め合わせしてもらいますから、覚悟しててくださいね？"
10108-30 = "ちょっと眠い\n……かも。"
10108-40 = "どこかに休める\n場所は……。"
10108-50 = "暑すぎず寒すぎない\n場所は……。"
10108-60 = "（先生と一緒に横に\nなったり、とか……）"
10108-70 = "リラックスできる\nお茶って、何が\nあったかな……？"
10108-80 = "あ、いらしたんですね。先生。"
10108-90 = "そ、そんなに待っては\nいませんよ……！"
10108-100 = "こんにちは、先生。"
10108-110 = "今日はラフな\n格好だね、って……？"
10108-120 = "それは先生がいきなり\n呼び出したからで……！"
10108-130 = "私だって、もっと可愛い\n服にしたかったのに……。"
10108-140 = "そういえば先生は\n寝る時何を着ます？"
10108-150 = "べべ、別にやましい\nこととか考えてないです！"
10108-160 = "なんとなく、ただ、\n気になっただけです……"
10108-170 = "規則的な生活、\n栄養摂取、睡眠。\nどれも全部重要なことです。"
10108-180 = "わ、私が管理してあげても\nいいんですよ？"
10108-190 = "せ、先生がよければ、\nですけど……"
10108-200 = "寝不足は思考回路を乱して、\nミスを引き起こします。"
10108-210 = "人間は機械みたいに\n完璧ではありませんから。"
10108-220 = "しっかり休めてますか？"
10108-230 = "たしかに、顔からしてそんな\n感じがするような、\nしないような……。"
10108-240 = "時々、憧れの人と一緒に\n朝を迎えられたらな、\nなんて思ったりします。"
10108-250 = "ふ、深い意味は\nありませんよ！？"
10108-260 = "お誕生日おめでとう\nございます、\n先生。"
10108-270 = "プレゼントとして……\n私の枕を一日貸してあげます！"
10108-280 = "……。"
10108-290 = "じょ、冗談ですから！\n本気にしないでください！？"
10108-300 = "私の誕生日、\n覚えてくださってたんですね。\n先生、ありがとうございます。"
10108-310 = "プレゼントは……\n先生がくれるものなら\n何でも嬉しいです。"
10108-320 = "えっ？「今持っている\nものなら何でもあげる、\nユウカが選んで」……？"
10108-330 = "じゃ、じゃあ……"
10108-340 = "…準備はできてるんですよね、\n先生？"
10108-350 = "あけまして\nおめでとうございます、先生。\n新年最初の日を先生と\n一緒に過ごせるなんて……"
10108-360 = "これまでのことを思うと……\n想像もできなかったと\n思います。"
10108-370 = "今までクリスマスなんて、\n忙しい日としか\n思ってませんでした。"
10108-380 = "…今回はどうなのか、って？"
10108-390 = "ふふっ……先生が\n当ててみてもいいんですよ？"
10108-400 = "ハロウィーンですね…\nこの格好のまま\n出かけても大丈夫、\nって言われたんですが…"
10108-410 = "これは、\n喜ぶべきなんでしょうか…？"
10108-430 = "せ、先生？\nこんな時間にどうして……？"
10108-440 = "え、えっと……\nこれは、その…… "
10108-450 = "ちょっと寝付けなくて、\n散歩に出たら……"
10108-460 = "そこの貼り紙の\n「エンジェルチキン」が\n目に入ったんです……。"
10108-470 = "だ、だって、仕方ないでしょう？"
10108-480 = "この時間のエンジェルチキンは、\n揚げたてなんです！"
10108-490 = "あっつあつで肉汁\nたっぷりなんですから！\n買わない手はありません！"
10108-500 = "だ、だからその……\n別に、毎日毎日、"
10108-510 = "夜食を取ってるわけじゃ、\nないんですから……。"
10108-520 = "えっと……よかったら、"
10108-530 = "先生も一口、食べますか？"
10108-2600 = "ありがとうございます、先生。\nこれで睡眠を邪魔する要素を\n合理的に排除できそうです。"
