[translation]
20028-10 = "ブルーアーカイブ！"
20028-20 = "わ、若葉ヒナタと申します！\n頑張りますので、何なりと仰ってください！"
20028-30 = "ここの内装、\nとっても可愛いです…！"
20028-40 = "あの、\n荷物運びでしたら、\nいつでも！"
20028-50 = "あれ？名前を\n呼ばれたような気が…。"
20028-60 = "リラックスできる、\n素敵な場所ですね。"
20028-70 = "先生は…\nどちらにいらっしゃるの\nでしょう…？"
20028-80 = "お、お疲れ様です、先生。"
20028-90 = "その…\n一緒に海辺の散歩でも、\nいかがでしょうか？"
20028-100 = "おかえりなさいませ、先生。"
20028-110 = "きょ、今日も、愛と喜びに\n満ちた一日でありますように。"
20028-120 = "先生のお仕事、\n是非お手伝いさせてください！"
20028-130 = "夏は好き、ですか…？"
20028-140 = "はい、もちろん！\n春も、秋も、冬も\n大好きです。"
20028-150 = "夏ならではの楽しみ、\n海ならではの楽しみを、\n大切にしたいと思っています。"
20028-160 = "んー…\n本当のことを申し上げますと、\n水着でいるのは…\n少し、恥ずかしいです。"
20028-170 = "み、水着姿でも、\nお祈りに支障は\nありませんので！"
20028-180 = "お誕生日\nおめでとうございます、先生！"
20028-190 = "来年のこの日も、\nお祝いの言葉が\n伝えられますように。"
20028-200 = "あっ、私の誕生日…\n覚えていてくださったんですね！"
20028-210 = "ありがとうございます…\n本当に嬉しいです。"
20028-220 = "明けまして\nおめでとうございます、先生。"
20028-230 = "健やかな一年になりますように、\n心からお祈りしております。"
20028-240 = "聖誕祭ですね！"
20028-250 = "私たち\nシスターフッドにとって\n特別な日です。"
20028-260 = "…ふ、服装は、\n関係ありませんから！"
20028-270 = "ハロウィーンですね！\n町中の楽しそうな笑顔に、\n私も嬉しくなってしまいます！"
20028-290 = "ん…んん…？\nあら…？"
20028-300 = "ここ…思っていた以上に、\nリラックスできる…。"
20028-310 = "適度に涼しくて、\nでも冷えすぎず…\n顔は影に隠れますし…。"
20028-320 = "ポカポカしていて…\n横になっていると、\n眠ってしまいそうです。"
20028-330 = "ところで、その…\n先生の前で私だけ、\n横になっているのは…"
20028-340 = "な、なんだか…\n申し訳ないような…。"
20028-350 = "か、かしこまりました。\nそれでは、お言葉に甘えて…。"
20028-360 = "リラックスして…楽に…。"
20028-370 = "…ふぅん…んにゃぁ…\nふへへっ…。"
20028-380 = "…はっ！？\nわ、私は今何を…！？"
20028-390 = "わ、忘れてください、\n今のは忘れてください！\n先生！！"
20028-2600 = "その…なんとお礼を言えば良いのか…。\nいえ、言葉だけでは伝えきれません…。\nこのご恩は…\n必ず行動で示してみせます、先生。"
