[translation]
20028-10 = "Blue Archive!"
20028-20 = "Eu, eu sou a Wakaba Hinata! Farei o meu melhor, então, por favor, peça o que precisar!"
20028-30 = "A decoração daqui... é muito fofa...!"
20028-40 = "Hum, se precisar de ajuda para carregar bagagens, estou sempre à disposição!"
20028-50 = "Ué? Tive a impressão de que me chamaram..."
20028-60 = "É um lugar maravilhoso, dá para relaxar bastante."
20028-70 = "O Sensei... onde será que ele está...?"
20028-80 = "O-olá, Sensei, bom trabalho."
20028-90 = "Hum... que tal darmos uma caminhada pela praia juntos?"
20028-100 = "Bem-vindo de volta, Sensei."
20028-110 = "Que, que o seu dia de hoje também seja repleto de amor e alegria."
20028-120 = "Por favor, deixe-me ajudar com o seu trabalho, Sensei!"
20028-130 = "Você gosta... do verão?"
20028-140 = "Sim, claro! Eu também amo a primavera, o outono e o inverno."
20028-150 = "Quero aproveitar ao máximo as alegrias que só o verão e o mar podem proporcionar."
20028-160 = "Hum... para ser sincera... ficar de roupa de banho é... um pouco constrangedor."
20028-170 = "M-mesmo de roupa de banho, isso não atrapalha em nada as minhas orações!"
20028-180 = "Feliz aniversário, Sensei!"
20028-190 = "Espero poder lhe transmitir meus votos de felicidades no ano que vem também."
20028-200 = "Ah, meu aniversário... você se lembrou!"
20028-210 = "Muito obrigada... estou muito feliz."
20028-220 = "Feliz Ano Novo, Sensei."
20028-230 = "Rezo de coração para que você tenha um ano cheio de saúde."
20028-240 = "É o festival de Natal!"
20028-250 = "Para nós, da Sisterhood, é um dia muito especial."
20028-260 = "...A, a roupa não tem nada a ver com isso!"
20028-270 = "É o Halloween! Ver os sorrisos de alegria por toda a cidade me deixa feliz também!"
20028-290 = "Hum... hum...? Ora...?"
20028-300 = "Aqui... é mais relaxante do que eu imaginava..."
20028-310 = "É fresco na medida certa, sem ser frio demais... e meu rosto fica na sombra..."
20028-320 = "Está tão quentinho... deitada aqui, sinto que vou acabar pegando no sono."
20028-330 = "Aliás, hum... ficar deitada aqui sozinha na frente do Sensei..."
20028-340 = "É, de alguma forma... sinto que estou sendo indelicada..."
20028-350 = "C-compreendido. Então, vou aceitar sua gentileza..."
20028-360 = "Relaxar... ficar à vontade..."
20028-370 = "...Hum... nnyaa... hehe..."
20028-380 = "...Ah!? O, o que eu acabei de fazer...!?"
20028-390 = "E, esqueça isso, por favor, esqueça o que acabou de acontecer! Sensei!!"
20028-2600 = "Hum... como posso agradecer...? Não, palavras não são suficientes... Essa dívida de gratidão... eu certamente irei retribuir com ações, Sensei."
