[translation]
20044-10 = "Blue Archive."
20044-20 = "Você veio, treinador. Quando estiver com sede, não hesite em me chamar."
20044-30 = "Um lugar onde parece que dá para se concentrar no exercício é..."
20044-40 = "O café é um lugar que serve bebidas... Sendo assim, eu também..."
20044-50 = "Vou adicionar um shake de proteína ao menu especial e..."
20044-60 = "Se quiser, aceitaria um?"
20044-70 = "Aqui, o treino muscular também parece que vai render."
20044-80 = "Bem-vindo de volta, treinador."
20044-90 = "Acabei de mudar os tipos de bebidas, gostaria de experimentar?"
20044-100 = "O meu papel hoje é cuidar da condição física do 'Sensei'."
20044-110 = "Hidratação e proteína — servirei ambos ao mesmo tempo. Se precisar, estou à disposição."
20044-120 = "Eu... gosto de pessoas que não desistem."
20044-130 = "Pessoas que não param de caminhar, que continuam desafiando a si mesmas para sempre."
20044-140 = "...Pois é. Não é impressão sua que temos muitos pontos em comum."
20044-150 = "O importante é definir metas e construir resultados pouco a pouco."
20044-160 = "Mesmo que não consiga manter o ritmo, não tem problema."
20044-170 = "Se você já deu o primeiro passo, o resto a gente dá um jeito."
20044-180 = "Não sei por que, mas quando estou usando o uniforme de meio período, sempre me pedem para torcer por alguém."
20044-190 = "Não sei o motivo, mas... se isso ajudou a animar vocês, fico feliz."
20044-200 = "Parece que você está cansado."
20044-210 = "Tenho confiança na minha massagem, então pode me chamar a qualquer momento."
20044-220 = "...E agora, vem acompanhada de uma bebida esportiva."
20044-230 = "Feliz aniversário, treinador."
20044-240 = "Aqui está, uma caixa de proteína de presente. Por favor, aceite."
20044-250 = "Uma comemoração vinda do 'Sensei'... é um pouco constrangedor, não acha?"
20044-260 = "Que tal... fazermos um treinamento especial de reforço comigo?"
20044-270 = "...Hum, se for um presente, então todos os sabores de shake de proteína..."
20044-280 = "Fufu, feliz ano novo."
20044-290 = "Que este ano seja repleto de saúde para você."
20044-300 = "É Natal. Um dia em que é fácil ganhar gordura."
20044-310 = "Mas não se preocupe."
20044-320 = "Gordura é combustível acumulado..."
20044-330 = "Ou seja, significa que você está pronto para um treino cheio de energia...!"
20044-340 = "...Treinador? Para onde vai?"
20044-350 = "Preparei balas de proteína sob encomenda para este dia."
20044-360 = "É sabor abóbora."
20044-370 = "É uma obra-prima com equilíbrio nutricional perfeito."
20044-380 = "Pegue uma. O sabor... eu não sei dizer."
20044-400 = "Bom trabalho! Treinador!"
20044-410 = "Sinceramente, foi uma corrida magnífica."
20044-420 = "Por favor, preparei uma bebida para você."
20044-430 = "Sim, esse esforço merece ser recompensado."
20044-440 = "Afinal, é só com uma recompensa adequada que as coisas fazem sentido."
20044-450 = "Claro, nem tudo no mundo..."
20044-460 = "recebe uma avaliação proporcional ao esforço."
20044-470 = "Ainda assim, eu..."
20044-480 = "quero que as pessoas que se esforçaram sejam devidamente recompensadas."
20044-490 = "Vamos, beba."
20044-500 = "Eu também vou tomar uma."
20044-2600 = "Agradeço pela orientação detalhada. Não vou me contentar com isso e continuarei me esforçando. Vamos lá, treinador, mais uma série!"
