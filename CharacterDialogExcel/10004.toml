[translation]
10004-20 = "Sou a Hina, presidente do Comitê de Disciplina.\nAcho que você já sabe meu nome... Prazer em conhecê-lo."
10004-30 = "Coisas fofas..."
10004-40 = "Eu queria tirar uma soneca, mas..."
10004-50 = "Parece que não há\nnenhum problema grave.\nFelizmente."
10004-60 = "Tudo bem se eu\ndescansar um pouco, né?"
10004-70 = "Isso é um pouco vergonhoso..."
10004-80 = "Ah, eu estava\nte esperando, Sensei."
10004-90 = "Não precisa me tratar\nde forma especial."
10004-100 = "Aqui, eu sou apenas\numa integrante comum."
10004-110 = "Ei... p-por favor, não me\nfaça carinho assim."
10004-120 = "Afinal, eu sou a presidente do Comitê de Disciplina e... a-alguém pode acabar nos vendo..."
10004-130 = "Não importa se nos virem?! O-o que você está dizendo?!"
10004-140 = "Não tente fazer as coisas de qualquer jeito! Trabalhe direito!"
10004-150 = "Eu vou te ajudar com tudo o que você precisar, Sensei.\nMe avise quando precisar de mim."
10004-160 = "(Eu quero ser mimada.\nQuero brincar.\nQuero até poder reclamar um pouco...)"
10004-170 = "(Mas se eu fizer isso,\nsó vai ser estranho...)"
10004-180 = "O quê?! O-o que eu estou pensando? N-nada demais!!"
10004-190 = "Sensei... hoje é seu aniversário, né? Eu posso... te dar os parabéns?"
10004-200 = "Você não queria... que alguém mais fofa\nte desse os parabéns?"
10004-210 = "N-não é isso?"
10004-220 = "Ah, entendi. Obrigada, Sensei. Meu aniversário... Eu tinha esquecido."
10004-230 = "Hm? Quer sair comigo?"
10004-240 = "O ano novo chegou.\nConto com você este ano também."
10004-250 = "Eu também vou me esforçar um pouco."
10004-260 = "Natal... Tem certeza de que quer passar\num dia desses comigo?"
10004-270 = "Eu... fico feliz, mas..."
10004-280 = "Na verdade, não sei muito sobre o Halloween. Nunca fui muito a festivais."
10004-290 = "Mas dá para sentir bem a atmosfera animada."
10004-310 = "Se você ficar me encarando assim... até eu fico com vergonha."
10004-320 = "É estranho.\nSinto-me tranquila\nquando estou com você, Sensei."
10004-330 = "Na verdade... eu gosto\ndessa sua expressão."
10004-340 = "Ah... não quero pensar\nem nada."
10004-2600 = "Toda história tem um fim.\nEu vou acompanhar você até o último momento."
