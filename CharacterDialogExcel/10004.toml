[translation]
10004-20 = "風紀委員長のヒナ。\n私の名前は知ってると思うけど…。よろしく。"
10004-30 = "カワイイ物…"
10004-40 = "昼寝したいけど…"
10004-50 = "大きな問題は\nなさそうだね。\n幸い。"
10004-60 = "ゆっくりしてても\nいいよね？"
10004-70 = "ちょっと恥ずかしいな…。"
10004-80 = "ああ、\n待ってたよ。先生。"
10004-90 = "別に特別扱いを\nする必要はない。"
10004-100 = "ここではただの一人の\n部員にすぎないから。"
10004-110 = "あの…そ、そんなに\n撫でないでくれる？"
10004-120 = "これでも一応風紀委員長だし\nだ、誰かに見られるかも\nしれないし…。"
10004-130 = "見られても関係ない？！\nな、なにを言ってるの？！"
10004-140 = "適当に済ませようとしないで！\n仕事はきちんとやって！"
10004-150 = "先生が望むことは\n全力で手伝うから。\n必要な時は言って。"
10004-160 = "（甘えたい。\nじゃれ合いたい。\n泣き言だって言いたい…）"
10004-170 = "（でも私がやったら\n気持ち悪いだけ…）"
10004-180 = "なに？！\nな、なにを考えてるかって？\nべ、別になにも！！"
10004-190 = "先生…今日はお誕生日だね、\nお祝いを、\n私がしてもいいの？"
10004-200 = "もうちょっと…。\n可愛いヤツにお祝い\nしてもらいたいとか…。"
10004-210 = "ち、ちがうの？"
10004-220 = "あ、ああ。ありがとう、先生。\n私の誕生日か…。\n忘れてた。"
10004-230 = "うん？\n一緒に出かけようって？"
10004-240 = "年が明けたね。\n今年も一年よろしく。"
10004-250 = "私も少しは頑張るから。"
10004-260 = "クリスマス…。\nこんな日に私と一緒で\nいいの？"
10004-270 = "私は…嬉しいけど…。"
10004-280 = "実はハロウィンのことはよく\n知らない。あまりお祭りに\n行ったこともないから。"
10004-290 = "でも賑やかな雰囲気は\nよく伝わってくる。"
10004-310 = "そんなにじっと見られたら…\nいくら私でも恥ずかしい。"
10004-320 = "不思議だね。\n先生と一緒にいると\nなんだか安心する。"
10004-330 = "実は…\n先生のそういう顔が好き。"
10004-340 = "はあ…。\n何も考えたくない。"
10004-2600 = "どんな物語でも終わりはある。\n私がその最後まで見届けてあげる。"
