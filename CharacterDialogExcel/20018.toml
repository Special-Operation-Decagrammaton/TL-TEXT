[translation]
20018-10 = "Blue Archive~."
20018-20 = "Academia Especial SRT, Esquadrão RABBIT, Kazukura Moe. Hehehe... se precisar de suporte, pode deixar comigo."
20018-30 = "Ei, posso usar este lugar como nossa nova base?"
20018-40 = "...Bem, até que é um lugar tranquilo."
20018-50 = "Estou sem balas... (doces)."
20018-60 = "Digo, não tem nenhum botão de lançamento importante dando sopa por aí...?"
20018-70 = "Hehehe..."
20018-80 = "Ah, bem-vindo de volta, Sensei. Você parece ocupado como sempre hoje, hehehe..."
20018-90 = "Oh, é o Sensei. Você não parece estar sempre ocupado?"
20018-100 = "Está na hora de reabastecer os suprimentos do Esquadrão RABBIT..."
20018-110 = "Ham... Repor o açúcar é essencial, né. Não vou abrir mão disso!"
20018-120 = "Ah... estou com vontade de comer aquele Inari Sushi que a veterana fez antes."
20018-130 = "Sério, por que não podemos contar balas como suprimentos básicos?"
20018-140 = "Açúcar é como combustível para um operador, afinal."
20018-150 = "Parece ocupado com o trabalho. Quer que eu te ajude?"
20018-160 = "Bem, pode deixar comigo. Hehehe..."
20018-170 = "Feliz aniversário, Sensei. Então..."
20018-180 = "Que tal comemorarmos com uns fogos de artifício bem chamativos?"
20018-190 = "Bolo de aniversário? Não, para mim, só os fogos de artifício já bastam..."
20018-200 = "É isso, se for para fazer, que seja algo bem espalhafatoso e intenso... hehehe."
20018-210 = "Dizem que em Shanhaijing existe o costume de soltar fogos de artifício no Ano Novo para afastar o azar."
20018-220 = "Sério, que cultura maravilhosa... hehehe."
20018-230 = "Neste Natal, o Esquadrão RABBIT inteiro vai comer peru."
20018-240 = "Hm? No parque de sempre, é claro."
20018-250 = "Hm? Código de incêndio...? O que é isso?"
20018-260 = "Essa lanterna de abóbora... se eu jogar aquele pó nela, acho que queimaria de um jeito bem bonito..."
20018-270 = "Ha... ha..."
20018-290 = "Sensei... existem muitas coisas neste mundo, não é?"
20018-300 = "Botões que você não deve apertar, limites que você não deve ultrapassar."
20018-310 = "Algumas coisas, uma vez escolhidas, não têm volta e levam à destruição."
20018-320 = "Um passo em falso e é o fim, mas ainda assim, pode ser algo que satisfaça o seu coração..."
20018-330 = "Nessas horas, o que você faria, Sensei?"
20018-340 = "Eu sei que é uma pergunta sem sentido. Você é uma pessoa séria, afinal."
20018-350 = "Mas eu... talvez eu ultrapasse esse limite."
20018-360 = "Porque esse momento de destruição também é uma oportunidade de provar a mim mesma."
20018-370 = "Por isso, Sensei..."
20018-380 = "Esse limite... que tal ultrapassá-lo comigo?"
20018-2600 = "Pistola modelo RABBIT-224, recebida. ...Ei, ela é bem pequena, mas tem poder de fogo de verdade?"
