[translation]
20018-10 = "Blue Archive~."
20018-20 = "Sou Kazekura Moe,\ndo Esquadrão RABBIT da Academia\nEspecial SRT. Kuhihi...\ndeixa o suporte tático comigo."
20018-30 = "Posso transformar isso aqui\nna minha nova base\nde operações?"
20018-40 = "……Até que aqui\né um lugar bem relaxante."
20018-50 = "Tô precisando\nde mais doces..."
20018-60 = "Por acaso não tem nenhum\nbotão de lançamento importante\njogado por aqui...?"
20018-70 = "Kuhihi..."
20018-80 = "Ah, bem-vindo de volta, Sensei.\nHoje você parece ocupado como\nsempre, hein. Kuhihi..."
20018-90 = "Oh, é o Sensei.\nPor que será que você tá sempre\ntão atolado de coisas?"
20018-100 = "Acho que já tá na hora\nde reabastecer os suprimentos\ndo Esquadrão RABBIT..."
20018-110 = "Nham...\nRepor a glicose é super importante.\nEu não abro mão disso nem morta!"
20018-120 = "Aaah... me deu vontade de comer\naquele inarizushi que a minha veterana\nfez pra mim há um tempo atrás."
20018-130 = "Fala sério, por que eles\nnão consideram os meus pirulitos\ncomo suprimentos básicos de sobrevivência?"
20018-140 = "Sendo que o açúcar\né praticamente o combustível primário\nde uma operadora de comunicações."
20018-150 = "Cê parece cheio de\ntrabalho aí. Quer que\neu dê uma mãozinha?"
20018-160 = "Bom, deixa tudo comigo.\nKuhihi..."
20018-170 = "Feliz aniversário, Sensei.\nE pra comemorar..."
20018-180 = "O que acha de um show de fogos\nde artifício bem escandaloso\ncomo presente?"
20018-190 = "Bolo de aniversário?\nAh, não ligo pra isso, pra mim\nsó os explosivos já bastam..."
20018-200 = "Isso mesmo, já que é pra fazer,\ntem que ser uma explosão de arrebentar\nos tímpanos... kuhihi."
20018-210 = "Dizem que lá na Shanhaijing eles\ntêm o costume de soltar fogos no\nAno Novo pra afastar os maus espíritos."
20018-220 = "Sinceramente,\nque cultura maravilhosa...\nKuhihi."
20018-230 = "Neste Natal, nós decidimos que\ntodo o Esquadrão RABBIT\nvai comer um peru assado."
20018-240 = "Hm? Mas é claro que\nvai ser lá no parque de sempre."
20018-250 = "Hã? Lei de Prevenção de Incêndios...?\nQue diabos é isso?"
20018-260 = "Essa lanterna de abóbora...\nSe eu jogar aquele meu pó nela,\ngaranto que vai queimar muito mais bonito..."
20018-270 = "Haa, haa..."
20018-290 = "Sensei... existem vários tipos\nde coisas nesse mundo, sabia."
20018-300 = "Botões que não devem ser apertados,\ne linhas que não devemos cruzar."
20018-310 = "Algumas dessas coisas, se você escolher\numa única vez, é um caminho sem volta,\nque leva direto para a ruína."
20018-320 = "Um passo em falso e é o fim,\nmas mesmo assim, isso pode ser a única coisa\ncapaz de satisfazer os desejos do coração..."
20018-330 = "Nessa hora, o que você faria, Sensei?"
20018-340 = "Eu sei que é uma pergunta inútil.\nO Sensei é todo certinho e responsável."
20018-350 = "Mas eu...\neu sinto que acabaria cruzando\nessa linha com gosto."
20018-360 = "Afinal, esse breve instante de ruína\né a chance perfeita para eu provar\nquem eu realmente sou."
20018-370 = "Por isso, Sensei..."
20018-380 = "Essa linha perigosa...\nVocê não quer cruzar ela comigo?"
20018-2600 = "Pistola RABBIT-224,\nrecebida com sucesso.\n...Ei, isso aqui é bem pequeno.\nTem certeza de que tem um poder de fogo decente?"