[translation]
20018-10 = "ブルーアーカイブ～。"
20018-20 = "SRT特殊学園、\nRABBIT小隊の風倉モエ。\nくひひ……支援なら、私に任せて。"
20018-30 = "ここ、\n新しい拠点に\nしちゃって良い？"
20018-40 = "……まあ、\n割と落ち着くかも。"
20018-50 = "飴が足りない……。"
20018-60 = "何かこう、大事な\n発射ボタンとか落ちて\nないもんかねー……？"
20018-70 = "くひひ……"
20018-80 = "ああ、お帰り先生。\n今日も相変わらず\n忙しそうだね、くひひ……。"
20018-90 = "お、先生じゃん。\nなーんかずっと\n忙しそうだね？"
20018-100 = "そろそろRABBIT小隊の\n備品でも補充しておくか……。"
20018-110 = "はむ……\n糖分補給は大事っしょ。\nこれは譲ってたまるか！"
20018-120 = "あー……前に先輩が\n作ってくれた、あのいなり\n寿司が食べたい気分。"
20018-130 = "全く、どうして基本的な\n補給品として飴をカウント\nしちゃいけないんだ？"
20018-140 = "糖分はオペレーターにとって、\n燃料みたいなもんなのに"
20018-150 = "仕事、忙しそうじゃん。\n手伝ってあげようか？"
20018-160 = "まぁ、任せてみなって。\nくひひ……。"
20018-170 = "誕生日おめでと、先生。\nってことで……"
20018-180 = "一発派手に、\nお祝いの花火とかどう？"
20018-190 = "誕生日ケーキ？\nいや別に、私には\n花火さえあればそれで……。"
20018-200 = "そうだね、どうせなら\nド派手で強烈なのを……\nくひひ。"
20018-210 = "山海経では新年に花火を\n打ち上げて厄除けをする\n風習があるらしいよ。"
20018-220 = "ほんっと、\n良い文化だねぇ……\nくひひ。"
20018-230 = "今年のクリスマスは、\nRABBIT小隊全員で\n七面鳥を食べることになってさ。"
20018-240 = "ん？もちろん\nいつもの公園でだよ。"
20018-250 = "ん？消防法……？\nなにそれ？"
20018-260 = "このカボチャのランタン……\nあの粉をかけたらもっと\n綺麗に燃えそうじゃん……"
20018-270 = "はあ、はあ……"
20018-290 = "先生……世の中には\n色んなものがあるでしょ。"
20018-300 = "押しちゃいけないボタンとか、\n超えちゃダメな一線とか。"
20018-310 = "中には、一度選んだら\n取り返しのつかない、破滅に\n繋がるようなものもある。"
20018-320 = "一歩間違えたら終わり、\nそれでも自分の心を満足\nさせられるかもしれない……"
20018-330 = "そんな時、先生はどうする？"
20018-340 = "無意味な質問だってことは\n分かってるよ。\n先生は真面目だしね。"
20018-350 = "でも私は……その一線を、\n超えちゃうかもしれない。"
20018-360 = "だってその破滅の瞬間は、\n私自身を証明できる\n機会でもある。"
20018-370 = "だから、先生……"
20018-380 = "その一線……\n私と一緒に、超えてみない？"
20018-2600 = "RABBIT-224式拳銃、\n確かに受け取った。\n……ねぇ、これ結構小さいけど、\nちゃんと火力出る？"
