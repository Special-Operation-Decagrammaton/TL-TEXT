[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
20018-10 = "Blue Archive~." 
20018-20 = "Kazekura Moe do Esquadrão RABBIT,\nda Academia Especial SRT.\nKuhihi…… Se precisar de suporte tático, joga pra mim." 
20018-30 = "Vou tomar a liberdade\nde fazer daqui a minha\nnova base de operações, bele?" 
20018-40 = "……Bem,\naté que dá pra relaxar aqui." 
20018-50 = "Tô ficando com falta\nde pirulitos……" 
20018-60 = "Sabe me dizer se\ntem algum botão de lançamento\nsuper importante de bobeira por aí……?" 
20018-70 = "Kuhihi……" 
20018-80 = "Aaah, bem-vindo, Sensei.\nCê parece estar ocupado pra caramba\nhoje também. Kuhihi……" 
20018-90 = "Opa, é o Sensei.\nComo sempre com a cara\nenfiada em trabalho, hein?" 
20018-100 = "Acho que já passou\nda hora de ir reabastecer os suprimentos\ndo Esquadrão RABBIT……" 
20018-110 = "Hmgm……\nAçúcar no cérebro é essencial, tá ligado?\nDaqui, eu não saio, e daqui ninguém me tira!" 
20018-120 = "Ah~…… Tô a fim de comer\naquele inari sushi que a minha veterana\nfez pra gente antes." 
20018-130 = "Fala sério, por que eles proíbem de\ncolocar doces e pirulitos\nna lista de ração básica?" 
20018-140 = "Cê sabe muito bem que açúcar pra um operador\né que nem combustível num tanque." 
20018-150 = "O trabalho parece\ntá osso duro, hein.\nQuer que eu dê uma forcinha?" 
20018-160 = "Bem, deixa comigo que é sucesso.\nKuhihi……" 
20018-170 = "Feliz Aniversário, Sensei.\nE pra comemorar com classe……" 
20018-180 = "Que tal uma queima\nde fogos colossal?" 
20018-190 = "Bolo de Aniversário?\nAh de boa, pra mim só o clarão\ndos foguetes já enche o estômago……" 
20018-200 = "Sendo assim, já que vamos explodir o céu,\ntem que ser os grandalhões pra deixar todo mundo surdo……\nKuhihi." 
20018-210 = "Dizem que lá por Shanhaijing,\neles têm a tradição de estourar rojão no\nAno Novo pra afastar os maus espíritos." 
20018-220 = "E vou te falar,\nque tradição foda eles têm……\nKuhihi." 
20018-230 = "Neste Natal a gente combinou que\ntodo o Esquadrão RABBIT ia comer\num peru assado gigante." 
20018-240 = "Hm? Claro que vai ser\nno parque de sempre, ué." 
20018-250 = "Hm? Leis de Prevenção de Incêndio……?\nQue bagulho é esse?" 
20018-260 = "Esta lanterna de abóbora……\nSe a gente jogar aquele pó especial nela,\ndu-vi-do que não incendeia mil vezes mais bonito……" 
20018-270 = "Haa, haa……" 
20018-290 = "Sensei…… Existem vários tipos\nde coisas no nosso mundo, não acha?" 
20018-300 = "Botões que não devemos apertar,\ne linhas que nunca devem ser cruzadas." 
20018-310 = "Algumas delas, se você as escolher uma única vez,\nnão tem mais volta, nos levando diretamente\nà mais pura ruína." 
20018-320 = "Se você errar um passo, é o fim.\nMas mesmo assim, há sempre uma chance de que isso possa\nsatisfazer totalmente os desejos do coração……" 
20018-330 = "Se algo assim surgisse, o que você faria, Sensei?" 
20018-340 = "Eu sei muito bem que\nessa pergunta é boba.\nAfinal, você é uma pessoa muito certinha, Sensei." 
20018-350 = "Mas eu…… pode ser que eu acabe,\ncruzando essa linha." 
20018-360 = "Porque o instante dessa ruína,\ntambém é uma chance de provar\nque eu sou eu mesma." 
20018-370 = "É por isso, Sensei……" 
20018-380 = "Essa linha proibida……\nPor que você não tenta cruzar ela, junto comigo?" 
20018-2600 = "Pistola RABBIT Tipo-224,\nrecebida com sucesso.\n……Ei, isso aqui é miudinho demais,\ntem certeza que a potência dela aguenta o tranco?" 