[translation]
10012-20 = "O treinamento com pesos é uma ciência.\nÉ um campo onde as teorias de ponta do Millennium brilham intensamente."
10012-30 = "Humm..."
10012-40 = "Será que tem algum lugar\nonde possamos treinar...?"
10012-50 = "Este parece ser um bom lugar\npara fazer exercícios com pesos livres."
10012-60 = "Eh? Fazer alongamento\njuntos?"
10012-70 = "Sim, agora vamos fazer uma corrida\njuntos?"
10012-80 = "Bem-vindo de volta, Treinador.\nVamos nos esforçar juntos hoje também."
10012-90 = "Eu estava esperando por você.\nEntão, vamos começar\no treinamento."
10012-100 = "Quando o ponto de vista muda,\no mundo parece diferente."
10012-110 = "Até mesmo escadas são\nexcelentes equipamentos de exercício."
10012-120 = "Então, primeiro,\nvamos começar com\numa corrida."
10012-130 = "Sim? Por que eu não estou\nde uniforme, você pergunta?"
10012-140 = "Porque é inconveniente\npara treinar."
10012-150 = "Ultimamente, o treinamento muscular\nestá na moda entre os alunos."
10012-160 = "...Sim, desculpe.\nFoi apenas um delírio meu."
10012-170 = "As coxas são chamadas de\nsegundo coração.\nPrecisamos treiná-las\ncom afinco."
10012-180 = "Treinador, feliz aniversário.\nEu preparei um presente,\nmas..."
10012-190 = "Eh? Por acaso seria\num haltere?"
10012-200 = "Obrigada por\ncomemorar comigo."
10012-210 = "Algo que eu quero?"
10012-220 = "Bem... uma proteína\nde altíssima qualidade...\nNão, espera!"
10012-230 = "E-eu quero um\nboneco de gato fofinho!"
10012-240 = "Se eu pudesse fazer um pedido,\nseria que todos continuem\nsaudáveis durante este ano."
10012-250 = "O Natal é,"
10012-260 = "o dia em que o salvador\nnasceu, não é?"
10012-270 = "Não sei muito bem, mas\no salvador certamente\ndevia ser musculoso."
10012-280 = "Treinador,\nquer comer uma\nbala de proteína?"
10012-290 = "Eh?\nO sabor?"
10012-300 = "...Eu também já tive uma época\nem que achava que\nessas coisas eram importantes."
10012-320 = "O que acha, Treinador?\nExercício é divertido, não é?"
10012-330 = "Não sente que está\nficando mais saudável?"
10012-340 = "Ah, bem...\nPor favor, não me encare\ntanto assim."
10012-350 = "(Eu fico com uma aparência terrível\ndurante o treino...)"
10012-360 = "O-onde você está\nolhando...?"
10012-370 = "...Treinador,\ntenho um pedido."
10012-380 = "Vamos continuar\nexercitando juntos\npara sempre."
10012-390 = "Eu quero que o Treinador\ncontinue saudável."
10012-400 = "O-o motivo? B-bem, isso é..."
10012-410 = "Fufu. Tente adivinhar."
10012-2600 = "Conseguir lidar com algo assim também é um resultado do treinamento. Mas não vou me satisfazer com a situação atual e continuarei me esforçando. Treinador."
