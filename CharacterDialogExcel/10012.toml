[translation]
10012-20 = "ウェイトトレーニングは科学です。\nミレニアムの最先端の理論が、輝きを放つ領域なんです。"
10012-30 = "へぇ…。"
10012-40 = "トレーニングできる\nところはあるのかな…。"
10012-50 = "フリーウェイトをするのに\n良さそうなところです。"
10012-60 = "え？\n一緒にストレッチを、ですか？"
10012-70 = "はい、次は一緒にロードワークを？"
10012-80 = "おかえりなさい、トレーナー。\n今日も一緒に頑張りましょう。"
10012-90 = "お待ちしておりました。\nそれではトレーニングを\n始めましょう。"
10012-100 = "視点が変わると、\n世界が変わって見えます。"
10012-110 = "階段だって立派な\n運動器具です。"
10012-120 = "それではまず、\nロードワークから\n始めましょう。"
10012-130 = "はい？なぜ制服では\nないのか、ですか？"
10012-140 = "トレーニングするのに\n不便だからです。"
10012-150 = "最近生徒の間では筋トレが\n流行っているんですよ。"
10012-160 = "…はい、すみません。\n私の妄想です。"
10012-170 = "太ももは第2の心臓と\n呼ばれています。\nしっかり鍛錬し\nないといけません。"
10012-180 = "トレーナー、お誕生日\nおめでとうございます。\nプレゼントを\n用意したんですが…"
10012-190 = "え？もしかして\nダンベルかな、ですか？"
10012-200 = "祝ってくださって\nありがとうございます。"
10012-210 = "欲しい物ですか？"
10012-220 = "えーっと…\n最高級のプロテイン…\nではなく！"
10012-230 = "か、可愛い猫の人形が、\n欲しいです！"
10012-240 = "願い事があるとすれば、\n今年一年もまたみんな、\n健康で過ごしてほしいですね。"
10012-250 = "クリスマスとは、"
10012-260 = "かつて救世主が\n生まれた日だ\nそうですね。"
10012-270 = "よく知りませんが、\n救世主はきっと\n筋肉質に違いないです。"
10012-280 = "トレーナー、\nプロテインキャンディ\n食べますか？"
10012-290 = "え？\n味ですか？"
10012-300 = "…私にも、\nそういうのが大事だと\n思っていた時期がありました。"
10012-320 = "どうですかトレーナー、\n運動は、楽しいでしょう？"
10012-330 = "健康になる感じが、\nしませんか？"
10012-340 = "あ、えっと…\nあ、あまり見つめないで\nください。"
10012-350 = "(トレーニング中は\nひどい見た目だし…)"
10012-360 = "ど、どこを\n見てるんですか…？"
10012-370 = "…トレーナー、\nお願いがあります。"
10012-380 = "これからも、\nずっと一緒に\n運動をしましょう。"
10012-390 = "私はトレーナーが\n健康でいてほしいです。"
10012-400 = "り、理由ですか？\nそ、それは…。"
10012-410 = "ふふっ。\n当ててみてください。"
10012-2600 = "こんなものを扱えるようになったのも、\nトレーニングの成果ですね。\nですが、現状に満足せず、\n引き続き努力します。トレーナー。"
