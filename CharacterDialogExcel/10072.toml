[translation]
10072-10 = "Blue... Archive!"
10072-20 = "RABBIT2, preparativos para a operação concluídos.\nMesmo no mar, não negligenciarei meu dever de vigilância!"
10072-30 = "(Como eu imaginava, é difícil\nse movimentar com essa roupa\nem lugares fechados...)"
10072-40 = "(Será que...\naquilo ali\né comestível...?)"
10072-50 = "Para a próxima operação...\nUsar um traje daquele tipo também não seria uma má ideia."
10072-60 = "Não me diga que aquilo é...\nA tal arma que eu só tinha\nvisto nos manuais táticos...?"
10072-70 = "Reconhecimento em andamento. Sem anormalidades."
10072-80 = "Você veio, Sensei.\nEu estava bem no meio\nda manutenção da minha arma."
10072-90 = "U-Uwah!?\nDesde quando você está aí?"
10072-100 = "E-Eu não estava matando trabalho, viu!?"
10072-110 = "Hoje também está muito quente."
10072-120 = "Já tomou as devidas precauções contra insolação?"
10072-130 = "Tome cuidado com a desidratação,\nlembre-se de beber bastante água."
10072-140 = "E não se esqueça de ingerir sal também."
10072-150 = "Para falar a verdade, eu não\ngosto muito do mar."
10072-160 = "Porque as armas estragam fácil aqui..."
10072-170 = "Mas ser capaz de se adaptar\nperfeitamente a qualquer ambiente\né o que faz de nós alunas da SRT."
10072-180 = "Na beira do mar,\neu uso um mapa tático\ncom tratamento impermeável."
10072-190 = "A Moe me recomendou um\nequipamento GPS à prova d'água, mas..."
10072-200 = "Eu não quero.\nO papel tem o seu próprio valor,\nque só ele possui!"
10072-210 = "(Seria tão bom se eu\npudesse vir à praia com\nas outras membros do esquadrão,\nem uma situação fora de missão...)"
10072-220 = "O que aconteceu com\no meu capacete de aço de sempre?"
10072-230 = "Este chapéu estilo boonie\né o substituto dele."
10072-240 = "Pode não parecer, mas ele é\nfeito de material à prova de balas, sabia?"
10072-250 = "Feliz aniversário, Sensei."
10072-260 = "Eu assumo os trabalhos que\ndemandam mais tempo.\nVá para casa mais cedo e descanse por hoje."
10072-270 = "Fazer turno da noite\njusto no dia do seu aniversário...\nseria muito triste."
10072-280 = "...Um presente de aniversário?\nEu não... preciso de nada..."
10072-290 = "Mas se você não se importar...\nVamos jantar juntos."
10072-300 = "Pode ser qualquer coisa,\naté mesmo uma marmita\nde loja de conveniência."
10072-310 = "Feliz Ano Novo, Sensei.\nOs meus objetivos para este ano...?"
10072-320 = "Deixa eu ver... se possível,\ncomer pratos com peixe fresco\npelo menos uma vez por semana..."
10072-330 = "Ah, não... quero dizer...\nA restauração da Academia Especial SRT!"
10072-340 = "Ah, Sensei.\nSe você tiver um tempo livre à noite,\npoderia vir dar uma passada\nno Parque dos Coelhinhos?"
10072-350 = "Como é Natal,\na Moe trouxe um peru gigante,"
10072-360 = "Mas acho que nós do Esquadrão RABBIT\nnão vamos conseguir comer tudo sozinhas."
10072-370 = "Fazer um churrasco na Schale\né meio complicado...\nentão vamos fazer a festa no parque mesmo."
10072-380 = "Ultimamente, tenho a impressão de estar\nvendo muitas marmitas de loja\nde conveniência com abóbora."
10072-390 = "Não me diga que...\nessa é a tal da temporada de\nHalloween que falam nos boatos?"
10072-410 = "(Vamos lá, Sensei.\nAcalme-se e\nolhe para mim.)"
10072-420 = "(Isso, muito bem.\nSolte a respiração devagar.)"
10072-430 = "(Fufu,\ncomo esperado do Sensei.\nVocê aprende rápido.)"
10072-440 = "(...Sinto uma sensação estranha.)"
10072-450 = "(Ficar a sós com o Sensei\ndebaixo d'água, conversando\napenas com olhares e gestos\nsem dizer uma única palavra...)"
10072-460 = "(É como se...)"
10072-470 = "(...Hã? Você está dizendo\nque a minha respiração parece ofegante?)"
10072-480 = "(Não, não é nada.\nEstá tudo bem!\nSem problemas!)"
10072-490 = "(Por algum motivo,\na minha respiração está\ninstável, diferente do normal...)"
10072-500 = "(...Talvez fazer um mergulho\ncom o Sensei ainda tenha\nsido cedo demais para mim.)"
10072-2600 = "Metralhadora RABBIT-26,\nrecebida com sucesso.\nO tratamento de impermeabilização está\nperfeito para garantir que ela não quebre debaixo d'água.\nClaro que, assim que o combate terminar,\nvou ter que fazer a manutenção rigorosa dela..."