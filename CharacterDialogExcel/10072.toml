[translation]
10072-10 = "ブルー、アーカイブ！"
10072-20 = "RABBIT2、作戦準備完了。\n海とはいえ、警戒任務は怠らないぞ！"
10072-30 = "（やはりこの格好、\n室内では\n動きづらいな…）"
10072-40 = "（あれは…\n食べられるん\nだろうか…？）"
10072-50 = "次の作戦では…\nああいう格好をするのも、\n悪くないかもしれないな。"
10072-60 = "あれはまさか…\n教範でしか\n見たことがない、\n例の武器…？"
10072-70 = "偵察中、異常なし。"
10072-80 = "来たか、先生。\n丁度、銃の整備を\nするところだったんだ。"
10072-90 = "う、うわっ！？\nいつの間に？"
10072-100 = "べ、別にサボってないぞ！？"
10072-110 = "今日も暑っいなぁ。"
10072-120 = "熱中症対策はできてるか？"
10072-130 = "脱水に気をつけるんだぞ、\n水の補給はしっかりとな。"
10072-140 = "あと、塩も摂ったほうがいい。"
10072-150 = "本当は、そんなに\n海は好きじゃないんだ。"
10072-160 = "銃器が壊れやすいから…。"
10072-170 = "だが、どんな環境でも\n完璧に対応できてこそ、\nSRTの生徒だからな。"
10072-180 = "海辺では、\n防水処理をした\n戦術地図を使っている。"
10072-190 = "モエには防水機能付きの\nGPS装備を勧められたが…"
10072-200 = "私は嫌だ。\n紙には紙にしかない\n価値があるのだからな！"
10072-210 = "（任務ではない形で、\n他の隊員とも一緒に、\n海に来れたら\nよかったのだが…）"
10072-220 = "いつもの鉄帽は\nどうしたのかって？"
10072-230 = "このブーニーハットが\n鉄帽の代わりだ。"
10072-240 = "こう見えて、防弾素材で\nできてるんだぞ？"
10072-250 = "お誕生日おめでとう、先生。"
10072-260 = "時間がかかる仕事は、\n私がやっておくから。\n今日は先に帰って休んどけ。"
10072-270 = "誕生日の日に夜勤だなんて…\n悲しいからな。"
10072-280 = "…誕生日プレゼント？\n別に…要らない…。"
10072-290 = "でも、先生がよければ…\n一緒に晩飯を食べよう。"
10072-300 = "メニューは、\nコンビニ弁当でも\nなんでもいいから。"
10072-310 = "あけましておめでとう、先生。\n今年の目標…？"
10072-320 = "そうだな…できれば、\n週に1回は新鮮な\n魚料理を…。"
10072-330 = "あ、いや…\nSRT特殊学園の復活だな！"
10072-340 = "あ、先生。\n夜に時間があったら、\n子ウサギ公園に\n来てくれないか？"
10072-350 = "クリスマスだから、\nモエが大きな七面鳥を\n持ってきたんだけど、"
10072-360 = "RABBIT小隊だけじゃ\n食べ切れそうにないんだ。"
10072-370 = "シャーレでバーベキューは\n難しいし…\n公園でパーティーにしよう。"
10072-380 = "ここ最近、カボチャの\n入ったコンビニ弁当を\nよく見かける\n気がするんだが。"
10072-390 = "もしかして…\nこれが噂に聞く\nハロウィーンシーズン？"
10072-410 = "（さあ、先生。\n落ち着いて、\nこっちを見るんだ）"
10072-420 = "（そうそう、ゆっくり。\n息をゆっくり吐いて）"
10072-430 = "（ふふっ、\nさすが先生。\n習得が早いな）"
10072-440 = "（…なんか変な感じだ）"
10072-450 = "（海の中で先生と\n二人きり、言葉もなく\n視線とジェスチャーだけで\n会話していると…）"
10072-460 = "（まるで…）"
10072-470 = "（…えっ？呼吸が\n苦しそうに見える？）"
10072-480 = "（いや、\n何も問題ない。\n大丈夫だ！）"
10072-490 = "（なんだか、\nいつもと違って…\n呼吸が不安定だ）"
10072-500 = "（…先生とのダイブ、\n私にはまだ早かったのかも\nしれないな)"
10072-2600 = "RABBIT26式機関銃、\n確かに受け取った。\n水中でも壊れないように、\n防水処理もバッチリだ。\nもちろん、戦闘が終わったら\nきちんと整備しないとだけど…。"
