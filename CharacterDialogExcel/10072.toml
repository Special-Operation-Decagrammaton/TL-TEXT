[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10072-10 = "Blue, Archive!" 
10072-20 = "RABBIT 2, preparativos para a operação concluídos.\nMesmo estando no mar, não negligenciarei o meu dever de vigilância!" 
10072-30 = "（Como eu imaginava, essa roupa\né muito difícil de se movimentar\nem ambientes fechados...）" 
10072-40 = "（Será que aquilo ali...\ndá pra comer...?）" 
10072-50 = "Na nossa próxima operação...\nMe vestir daquele jeito\ntalvez não seja uma má ideia." 
10072-60 = "Não me diga que aquilo é...\nAquela arma que eu só vi\nnos manuais de operações...?" 
10072-70 = "Em reconhecimento, nada de anormal." 
10072-80 = "Você veio, Sensei.\nEu estava prestes a começar\na manutenção da minha arma." 
10072-90 = "U-Uwaah!?\nQuando foi que você chegou aí?" 
10072-100 = "N-Não pense que eu estava matando serviço!?" 
10072-110 = "Hoje o dia tá quente de novo." 
10072-120 = "Está tomando as medidas contra insolação?" 
10072-130 = "Tome cuidado com a desidratação,\nlembre-se de beber bastante água." 
10072-140 = "Além disso, é bom ingerir um pouco de sal também." 
10072-150 = "Pra falar a verdade, eu não gosto\nmuito do mar." 
10072-160 = "Porque as armas quebram com muita facilidade aqui..." 
10072-170 = "No entanto, ser capaz de se adaptar perfeitamente\na qualquer ambiente é o que faz de mim\numa aluna da SRT." 
10072-180 = "Na praia, nós utilizamos\nmapas táticos que passaram por\num tratamento de impermeabilização." 
10072-190 = "A Moe me recomendou um\nequipamento GPS à prova d'água, mas..." 
10072-200 = "Eu recusei.\nO papel possui um valor\nque apenas o papel pode ter!" 
10072-210 = "（Teria sido tão bom se eu\npudesse ter vindo ao mar com as outras\nsem ser em uma missão...）" 
10072-220 = "Você quer saber\no que houve com o meu capacete tático?" 
10072-230 = "Este chapéu de selva (boonie hat)\né o substituto do capacete." 
10072-240 = "Apesar da aparência, ele é\nfeito de material à prova de balas, sabia?" 
10072-250 = "Feliz Aniversário, Sensei." 
10072-260 = "Deixe o trabalho demorado comigo.\nVá para casa mais cedo e descanse por hoje." 
10072-270 = "Fazer hora extra no dia do próprio aniversário...\nÉ algo muito triste." 
10072-280 = "......Presente de aniversário?\nEu não... preciso disso..." 
10072-290 = "Mas, se você quiser, Sensei...\nNós podemos jantar juntos." 
10072-300 = "O cardápio pode ser\numa marmita de loja de conveniência\nou qualquer outra coisa." 
10072-310 = "Feliz Ano Novo, Sensei.\nOs meus objetivos para este ano...?" 
10072-320 = "Deixe-me ver... se possível,\neu gostaria de comer um prato de peixe fresco\npelo menos uma vez por semana..." 
10072-330 = "A-Ah, não...\nO meu objetivo é a reabertura da Academia Especial SRT!" 
10072-340 = "Ah, Sensei.\nSe você tiver um tempo livre à noite,\npoderia dar uma passada\nno Parque dos Coelhinhos?" 
10072-350 = "Como é Natal,\na Moe trouxe um peru enorme para a gente, mas" 
10072-360 = "Acho que só o Esquadrão RABBIT\nnão vai dar conta de comer tudo." 
10072-370 = "Fazer um churrasco na Schale\né meio complicado...\nEntão vamos fazer uma festa no parque." 
10072-380 = "Ultimamente, tenho a impressão\nde que as marmitas das lojas de conveniência\nestão vindo com muita abóbora." 
10072-390 = "Não me diga...\nSerá que essa é a famosa\ntemporada de Halloween?" 
10072-410 = "（Muito bem, Sensei.\nMantenha a calma\ne olhe para cá.）" 
10072-420 = "（Isso, bem devagar.\nSolte a respiração aos poucos.）" 
10072-430 = "（Fufu,\ncomo esperado de você, Sensei.\nAprende rápido.）" 
10072-440 = "（......Tem algo estranho.）" 
10072-450 = "（Ficar a sós com o Sensei no mar,\nsem dizer uma única palavra,\napenas conversando por meio\nde olhares e gestos...）" 
10072-460 = "（Parece até que...）" 
10072-470 = "（......Eh? A minha respiração\nparece ofegante?）" 
10072-480 = "（N-Não,\nnão há problema nenhum.\nEu estou bem!）" 
10072-490 = "（Por algum motivo,\ndiferente do habitual...\nA minha respiração está instável.）" 
10072-500 = "（......Acho que talvez,\nmergulhar a sós com o Sensei\nainda seja um pouco cedo demais para mim.）" 
10072-2600 = "Metralhadora RABBIT Tipo-26,\nrecebida com sucesso.\nA impermeabilização está perfeita\npara que não quebre mesmo debaixo d'água.\nClaro que, quando a batalha acabar,\nvou ter que fazer uma manutenção completa..." 