[translation]
10039-10 = "ぶ、ブルー……アーカイブ……"
10039-20 = "SRT特殊学園、\nRABBIT小隊の霞沢ミユ、です……\nあの、もう帰……っちゃ、だめですよね……"
10039-30 = "あ、えっと、その……"
10039-40 = "（話しかけたい、\nけど……怖い……）"
10039-50 = "（温かいココアとか、\n飲みたい……）"
10039-60 = "（私みたいな\n出来損ない、こんなところに\nいちゃいけないんじゃ……）"
10039-70 = "な、何か、\n遮蔽物は……？"
10039-80 = "お、お疲れ様です、先生……"
10039-90 = "先生のお好きな時に、\n呼んでください……\nその、待つのは得意なので……"
10039-100 = "あの、先生……\n私の名前、覚えてますか……？"
10039-110 = "新しい友達を作るなんて、\nそんな難しいこと……"
10039-120 = "RABBIT小隊、\nもっと仲良くなれたら\n良いのに……"
10039-130 = "もっと他の隊員みたいに、\n存在感があれば……"
10039-140 = "私なんて、どこにでも\nいる小石みたいな\nものなので……"
10039-150 = "そもそもどうして\n私なんかが、SRTに……"
10039-160 = "せ、先生がその……\n本日、誕生日だと\n聞きまして……。"
10039-170 = "野宿の立場なので、その、\nしっかりしたプレゼントは\nお渡しできないのですが……。"
10039-180 = "えっと、\nお祝いの言葉だけは、\nどうにか伝えたくて……。"
10039-190 = "えっ……私の誕生日、\nですか……？"
10039-200 = "ど、どうして覚えて……\nそんな……。"
10039-210 = "あ、ありがとうございます……\n本当に、嬉しいです……！"
10039-220 = "今年は、SRTに\n帰れると良いですね……"
10039-230 = "サンタクロースさんは、\n悪い子にはプレゼントを\n渡さないとか……"
10039-240 = "いえ、そもそもサンタクロース\nさんも、私の存在を忘れている\nかもしれませんね……。"
10039-250 = "そういえば昔、ハロウィーン\nということでお化けの\n仮装をしたのですが。"
10039-260 = "誰も、私の存在に\n気付いてくれませんでした……。"
10039-280 = "呼吸を整えて……"
10039-290 = "目標に、集中……。"
10039-300 = "距離1,150m、\n風は東北東から15ノット……"
10039-310 = "温湿度による\n誤差を補正……"
10039-320 = "あ、あの……先生、できれば\nその、そういった悪戯は\nご遠慮いただけますと……"
10039-330 = "えっと、\n照準が乱れてしまうので……"
10039-340 = "……なるほど。\nこれは邪魔ではなく、"
10039-350 = "実践に近い状況下での\n狙撃訓練、ということ\nですよね……"
10039-360 = "SRTでも、似たような訓練を\nしたような気が……"
10039-370 = "ひゃぅっ……！？"
10039-380 = "せ、先生……！\nいくら何でも、耳に息を\n吹きかけるのは……！？"
10039-390 = "（うぅ……せ、先生の\n吐息が、この距離で……）"
10039-400 = "（しょ、照準が\nぶれるっ……！）"
10039-2600 = "RABBIT39式小銃、\n確かに受け取りました。\n……やはり、少し重いですね。"
