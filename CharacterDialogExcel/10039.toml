[translation]
10039-10 = "B-Blue... Archive..."
10039-20 = "Da Academia SRT,\nRABBIT Squad, Kasumizawa Miyu... aqui.\nHum, eu não posso... ir para casa agora, né..."
10039-30 = "Ah, bem, é que..."
10039-40 = "(Eu quero falar com ele,\nmas... estou com medo...)"
10039-50 = "(Eu queria tomar... um chocolate quente...)"
10039-60 = "(Uma inútil como eu\nnão deveria estar\nem um lugar como este...)"
10039-70 = "A-algum tipo de\ncobertura...?"
10039-80 = "O-obrigada pelo seu trabalho, Sensei..."
10039-90 = "Por favor, me chame\nquando quiser, Sensei...\nÉ que, eu sou boa em esperar..."
10039-100 = "Hum, Sensei...\nVocê se lembra... do meu nome?"
10039-110 = "Fazer novos amigos,\nque coisa tão difícil..."
10039-120 = "Seria tão bom se o\nRABBIT Squad\nfosse mais unido..."
10039-130 = "Se eu tivesse mais presença,\ncomo as outras integrantes..."
10039-140 = "Eu sou só como uma pedrinha\nque está em qualquer lugar..."
10039-150 = "Por que será que\nalguém como eu... entrou na SRT..."
10039-160 = "S-Sensei, eu ouvi dizer que...\nhoje é o seu aniversário..."
10039-170 = "Como eu estou vivendo ao relento, não consigo\nte dar um presente de verdade, mas..."
10039-180 = "Bem, eu só queria\nde alguma forma...\nte desejar os parabéns."
10039-190 = "Ah... o meu aniversário,\nvocê disse...?"
10039-200 = "C-como você se lembrou...\nNão pode ser..."
10039-210 = "M-muito obrigada...\nEu estou realmente muito feliz...!"
10039-220 = "Seria bom se pudéssemos\nvoltar para a SRT este ano..."
10039-230 = "Dizem que o Papai Noel\nnão dá presentes para\ncrianças más..."
10039-240 = "Bem, talvez o Papai Noel\ntambém tenha se esquecido\nda minha existência..."
10039-250 = "Falando nisso, antigamente, no Halloween,\neu me fantasiei de fantasma."
10039-260 = "Ninguém percebeu\na minha presença..."
10039-280 = "Ajustando a respiração..."
10039-290 = "Focando no alvo..."
10039-300 = "Distância de 1.150m,\nvento de 15 nós vindo de nordeste..."
10039-310 = "Corrigindo o erro\npela temperatura e umidade..."
10039-320 = "A-ah... Sensei, se possível,\npor favor, evite esse tipo\nde brincadeira..."
10039-330 = "É que, isso acaba\nprejudicando a minha mira..."
10039-340 = "Entendo.\nEntão isso não é uma interrupção,"
10039-350 = "mas sim um treinamento de precisão\nem condições próximas à realidade,\nnão é..."
10039-360 = "Sinto que já fiz um treinamento\nparecido na SRT..."
10039-370 = "Hyaaa...!? "
10039-380 = "S-Sensei...! \nNão importa o motivo, soprar no meu ouvido é...!"
10039-390 = "(Uuu... o hálito do Sensei,\na essa distância...)"
10039-400 = "(A-a mira está... tremendo...!)"
10039-2600 = "Rifle modelo RABBIT39,\nrecebido com sucesso.\n...Realmente, é um pouco pesado."
