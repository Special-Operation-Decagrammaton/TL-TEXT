[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10039-10 = "B-Blue... Archive..." 
10039-20 = "Sou Miyu Kasumizawa,\ndo Esquadrão RABBIT da Academia Especial SRT...\nAh, e-eu não posso... ir embora ainda, né..." 
10039-30 = "A-Ah, ahm, veja bem..." 
10039-40 = "（Quero falar com ele,\nmas... tenho medo...）" 
10039-50 = "（Queria tomar um\nchocolate quente, ou algo assim...）" 
10039-60 = "（Uma inútil como eu,\nnão deveria estar num lugar\ncomo esse, deveria...?）" 
10039-70 = "T-Tem alguma cobertura\npor aqui...?" 
10039-80 = "B-Bom trabalho, Sensei..." 
10039-90 = "Pode me chamar sempre\nque quiser, Sensei...\nSabe, eu sou muito boa em esperar..." 
10039-100 = "A-Ahm, Sensei...\nVocê ainda lembra... do meu nome?" 
10039-110 = "Fazer novas amizades\né algo tão difícil..." 
10039-120 = "Seria tão bom se eu\nconseguisse me dar melhor com\no Esquadrão RABBIT..." 
10039-130 = "Se ao menos eu tivesse mais presença,\ncomo as outras integrantes..." 
10039-140 = "Eu sou apenas como\numa pedrinha qualquer\nque você encontra em todo lugar..." 
10039-150 = "Para começo de conversa,\npor que alguém como eu\nentrou para a SRT..." 
10039-160 = "S-Sensei, ouvi dizer...\nque hoje é\no seu aniversário..." 
10039-170 = "Como eu moro na rua,\nme desculpe por não poder te dar\num presente de verdade..." 
10039-180 = "Mas, ahm,\neu queria muito pelo menos te dar\nos meus parabéns..." 
10039-190 = "Eh... O meu\naniversário...?" 
10039-200 = "C-Como você se lembrou...\nNão pode ser..." 
10039-210 = "M-Muito obrigada...\nEu estou muito feliz, de verdade...!" 
10039-220 = "Espero que este ano nós\npossamos voltar para a SRT..." 
10039-230 = "Ouvi dizer que o Papai Noel\nnão dá presentes para crianças más..." 
10039-240 = "Na verdade, é bem provável\nque o próprio Papai Noel\ntenha se esquecido da minha existência..." 
10039-250 = "Isso me lembra de quando\nme fantasiei de fantasma\npara o Halloween uma vez." 
10039-260 = "Ninguém percebeu que\neu estava lá..." 
10039-280 = "Controlando a respiração..." 
10039-290 = "Concentrando... no alvo." 
10039-300 = "Distância de 1.150m,\nvento de leste-nordeste a 15 nós..." 
10039-310 = "Compensando o erro por\numidade e temperatura..." 
10039-320 = "A-Ahm... Sensei, se possível,\npoderia evitar esse\ntipo de brincadeira..." 
10039-330 = "E-Etto,\nisso vai arruinar a minha mira..." 
10039-340 = "......Entendo.\nVocê não quer me atrapalhar," 
10039-350 = "Isso faz parte de um treinamento\nde tiro simulando\numa situação real, não é..." 
10039-360 = "Acho que já fiz um treinamento\nparecido na SRT..." 
10039-370 = "Hyaah...!?" 
10039-380 = "S-Sensei...!\nPor mais que eu entenda a proposta,\nsoprar de levinho na minha orelha é...!?" 
10039-390 = "（Uuu... A-A respiração\ndo Sensei... logo a essa distância...）" 
10039-400 = "（M-Minha mira...\nvai falhar...!）" 
10039-2600 = "Fuzil RABBIT Tipo-39,\nrecebido com sucesso.\n……Como eu imaginava, é um pouco pesado." 