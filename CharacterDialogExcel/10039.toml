[translation]
10039-10 = "B-Blue... Archive..."
10039-20 = "Sou Kasumizawa Miyu,\ndo Esquadrão RABBIT da Academia\nEspecial SRT...\nUhm, eu não posso simplesmente...\nir embora e voltar pra casa agora, não é..."
10039-30 = "Ah, uhm, sabe..."
10039-40 = "（Eu queria tanto puxar assunto...\nmas eu tô com medo...)"
10039-50 = "（Eu queria beber\num cacau bem quentinho...)"
10039-60 = "（Será que um fracasso\ninútil que nem eu deveria mesmo estar\nnum lugar tão bom como este...?)"
10039-70 = "N-Não tem nenhum lugar aqui\npra eu me esconder\ne usar de cobertura...?"
10039-80 = "B-Bom trabalho, Sensei..."
10039-90 = "Pode me chamar...\nquando o senhor quiser...\nSabe, eu sou muito boa em esperar..."
10039-100 = "Uhm, Sensei...\nVocê ainda se lembra\ndo meu nome...?"
10039-110 = "Fazer novos amigos\né uma coisa tão difícil..."
10039-120 = "Seria tão bom se nós,\ndo Esquadrão RABBIT,\npudéssemos nos dar melhor..."
10039-130 = "Se ao menos eu tivesse\numa presença mais forte, como as\noutras garotas do esquadrão..."
10039-140 = "Alguém como eu não passa\nde uma pedrinha qualquer\njogada na rua..."
10039-150 = "Afinal de contas, por que alguém\ncomo eu foi entrar para a SRT...?"
10039-160 = "S-Sensei, uhm...\nEu ouvi dizer que hoje\né o seu aniversário..."
10039-170 = "Como eu moro na rua e acampo,\neu não pude preparar\num presente decente para lhe entregar, mas..."
10039-180 = "Uhm, eu pelo menos\nqueria dar um jeito de lhe\ndesejar os meus parabéns..."
10039-190 = "Eh... O meu aniversário...?"
10039-200 = "C-Como é que você se lembrou...\nNão acredito..."
10039-210 = "M-Muito obrigada...\nEu estou realmente feliz...!"
10039-220 = "Tomara que a gente\nconsiga voltar para a SRT\neste ano..."
10039-230 = "Dizem que o Papai Noel\nnão dá presentes para\nas crianças más, mas..."
10039-240 = "Não, pensando bem,\né provável que o Papai Noel já tenha\naté esquecido que eu existo..."
10039-250 = "Falando nisso, há muito tempo atrás,\neu me fantasiei de fantasma\npara o Halloween."
10039-260 = "E ninguém sequer\npercebeu que eu estava lá..."
10039-280 = "Regulando a respiração..."
10039-290 = "Foco total no alvo..."
10039-300 = "Distância de 1.150m,\nvento soprando do nordeste a 15 nós..."
10039-310 = "Corrigindo margem de erro\ndevido à temperatura e umidade..."
10039-320 = "A-Ah... Sensei, se possível,\nuhm, eu pediria que o senhor\nparasse com essas brincadeiras..."
10039-330 = "É que... a minha mira\nacaba ficando toda tremida..."
10039-340 = "……Entendo.\nIsso não é uma distração."
10039-350 = "Isso é um treinamento de tiro\nem condições que simulam as\ndificuldades de um combate real, não é...?"
10039-360 = "Acho que já me fizeram\npassar por um treinamento\nparecido lá na SRT..."
10039-370 = "Hyaauhh...!?"
10039-380 = "S-Sensei...!\nPor mais que seja um treinamento,\nsoprar na minha orelha é...!?"
10039-390 = "(Uuh... S-Sentir a respiração\ndo Sensei assim tão perto...)"
10039-400 = "(A-A minha mira... \ntá tremendo toda...!)"
10039-2600 = "Fuzil RABBIT-39,\nrecebido com sucesso.\n...Como eu imaginava, é um pouco pesado, né."