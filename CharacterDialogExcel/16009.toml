[translation]
16009-10 = "Blue! Archive!"
16009-20 = "Fufufu... Sorry to keep you waiting!\nI'm the president of the Ninjutsu Research Club, Michiru Chidori...\nReporting for duty! I'll be counting on you from now on, Sensei!"
16009-30 = "Now then,\nwhat kind of video should I\nupload to the channel next?"
16009-40 = "\"Girl's Ninja Scroll\nMichiru-chi\"...\nAiming for 100\nchannel subscribers!"
16009-50 = "Ah, I just thought of\na new ninjutsu!"
16009-60 = "Wait... when does the new volume of\n\"Kamaboko\nWind-Blast Chronicles\" come out?"
16009-70 = "Ugh, there are students from other schools\neverywhere... I really don't want to\ninteract with them..."
16009-80 = "Ah, Sensei!\nGeez, you're late!"
16009-90 = "Anyway, want to see the\noriginal ninjutsu I made today?"
16009-100 = "Welcome back, Sensei. I'm fully\nprepared for work, but...\nwell..."
16009-110 = "Before that,\nhelp me with my homework! Please!"
16009-120 = "The Ninjutsu Research Club\nisn't officially recognized\nyet, but..."
16009-130 = "I won't give up. Someday, the day\nwill come when ninjas are\npublicly recognized!"
16009-140 = "I wonder if everyone will turn into\nninjas like zombies for some\nreason..."
16009-150 = "My juniors are working hard\nto help spread the way of the ninja."
16009-160 = "Izuna and Tsukuyo are\nboth such good girls!"
16009-170 = "Uuu... The subscriber count for\n\"Girl's Ninja Scroll Michiru-chi\"\nisn't going up... What am I missing?"
16009-180 = "...Maybe dinosaur elements?"
16009-190 = "Hmm? What's that, the \"Seduction Jutsu\"\nyou mentioned before...?"
16009-200 = "W-w-w-what are you saying,\nSensei!? That means blowing a kiss\nat the camera, right!?"
16009-210 = "Something that lewd is\nabsolutely impossible!"
16009-220 = "Ah, found you, Sensei!\nHappy Birthday!"
16009-230 = "Fufu, today the Ninjutsu Research Club\nhas prepared something amazing\nfor you, Sensei."
16009-240 = "We call it...\n\"Operation: All-Day Ambush\"!"
16009-250 = "All day today,\nme, Izuna, and Tsukuyo!"
16009-260 = "We'll pop out from anywhere\nand surprise you!\nHehehe, let's start!!"
16009-270 = "Ugyaa!?\nB-birthday?"
16009-280 = "Ah, is that what it was... Besides,\nhaving you celebrate me, Sensei...\n...well, that's not bad, is it?"
16009-290 = "Fu, fufu, fufufufu..."
16009-300 = "Happy New Year, Sensei."
16009-310 = "I declare that this year will be\nthe year of the ninja. My ninja\nsensor is telling me so!"
16009-320 = "Christmas, huh... Things like this\nalways come out during this\nseason, don't they?"
16009-330 = "The devilish trap known as\n\"Limited Edition\"..."
16009-340 = "It's really tough on my wallet,\nso I wish they'd give it a rest..."
16009-350 = "If you say trick-or-treat,\nyou get candy..."
16009-360 = "Then if I say \"Trick-or-Ninja!\",\nwon't everyone subscribe to the\nchannel...?"
16009-370 = "Eh, probably not?\nYeah, you're right..."
16009-390 = "Then, I shall show you!"
16009-400 = "The new Michiru-style ninjutsu\nthat I devised!"
16009-410 = "\"Ninjutsu: Sparkling\nFire Jutsu\"!"
16009-420 = "Ahaha, Sensei!\nHow is it?\nIsn't it great?"
16009-430 = "Did you get a good shot\nof my cool side?"
16009-440 = "This ninja-like\nfantasticness... Perfect!"
16009-450 = "As expected, I am the strongest\npresident of the Ninjutsu Research Club!"
16009-460 = "Ah, it gets even better\nfrom here, so make sure\nto watch!"
16009-470 = "Ready, set...!!"
16009-2600 = "Whoa, you're giving this to me too...!?\nI-I feel a little bit responsible, but...\n...No, leave it to me, Sensei!\nI shall show you the true essence\nof Michiru-style ninjutsu!"
