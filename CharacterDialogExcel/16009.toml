[translation]
16009-10 = "ブルー！アーカイブ！"
16009-20 = "ふふふっ……おっ待たせー！\n忍術研究部部長、千鳥ミチル……\nここに参上！これからよろしくね、先生殿！"
16009-30 = "さーて、\n次はチャンネルにどんな\n動画をアップしよっかな。"
16009-40 = "「少女忍法帖\nミチルっち」……\n目指せ、チャンネル\n登録者100名！"
16009-50 = "あ、新しい\n忍術思いついた！"
16009-60 = "あれ……「かまぼこ\n突風伝」の新刊発売日、\nいつだっけ？"
16009-70 = "うっ、あちこちに他校の\n生徒が……あんまり\n接触したくない……"
16009-80 = "あ、先生殿！\nもう、遅かったじゃん！"
16009-90 = "とりあえず今日私が作った\n自作忍術、見てみない？"
16009-100 = "よくぞお戻りになりました、\n先生殿お仕事の準備は\n十全、なんだけど……"
16009-110 = "その前に、\n宿題手伝って！お願い！"
16009-120 = "忍術研究部は、\nまだ正式に認可されて\nないけど……"
16009-130 = "でも諦めない。いつかは\n忍者が、公に認められる\n日が来るはず！"
16009-140 = "何かの原因でみんな\nゾンビみたいに、忍者に\nなったりしないかな……"
16009-150 = "忍者を広めるために、\n後輩たちも頑張ってくれてるの。"
16009-160 = "イズナもツクヨも、\nすっごく良い子！"
16009-170 = "うう……「少女忍法帖ミチル\nっち」のチャンネル登録者数が\n増えない……何が足りないんだろ"
16009-180 = "……恐竜要素とか？"
16009-190 = "んー？なに、いつか言ってた\n「色仕掛けの術」……？"
16009-200 = "な、ななな何言っちゃってるの\n先生殿！？それ、\nカメラに向かって投げキッス\nとかってことでしょ！？"
16009-210 = "そんなハレンチなの\n絶対無理っ！"
16009-220 = "あっ、先生殿発見！\nお誕生日おめでとー！"
16009-230 = "ふふっ、今日は忍術研究部\n一同先生殿のために\nすっごいのを用意したの"
16009-240 = "名付けて……\n「一日待ち伏せ大作戦」！"
16009-250 = "今日一日、\n私もイズナもツクヨも！"
16009-260 = "どっからでも現れて\n驚かしてあげる！\nひひっ、じゃあスタート！！"
16009-270 = "うぎゃぁっ！？\nた、誕生日？"
16009-280 = "あー、何かと思った……それに、\n先生殿に祝ってもらえるなんて\n……ま、悪くないね？"
16009-290 = "ふ、ふふっ、ふふふふっ……"
16009-300 = "あけましておめでとう、先生殿。"
16009-310 = "断言するけど、今年は忍者の\n年になるね私の忍者センサーが、\nそう言ってる！"
16009-320 = "クリスマスかー……こういう\n時期には、絶対出るんだよね"
16009-330 = "何かと、\n「限定版」っていう\n悪魔の罠が……"
16009-340 = "ほんっと、\nお財布的な意味で困るから、\n勘弁してほしい……"
16009-350 = "トリックオアトリートって\n言えば、お菓子を貰える……"
16009-360 = "じゃあ「トリックオアニンジャ\n！」って言えば、みんなチャン\nネル登録してくれるんじゃ……？"
16009-370 = "え、多分無理？\nだよねー……"
16009-390 = "ではお見せして進ぜよう！"
16009-400 = "私が考案した、\n新しいミチル流忍術！"
16009-410 = "「忍法・キラキラ\nファイアーの術」！"
16009-420 = "あははっ、先生殿ー！\nどうどう？\n良い感じじゃない？"
16009-430 = "私のかっこいい姿、\n綺麗に撮れてる？"
16009-440 = "この忍者らしい\nファンタスティックさ……完璧！"
16009-450 = "やはり私こそ、\n忍術研究部最強の部長！"
16009-460 = "あ、ここからがまた\n凄くなるんだよ、\nちゃんと見ててね！"
16009-470 = "せーーのぉっ！！"
16009-2600 = "うおー、こんなものまで私に……！？\nちょっ、ちょっとだけ責任感じちゃうけど……\n……ううん、でも任せて、先生殿！\n見せて進ぜよう、ミチル流忍術……\nその真髄を！"
