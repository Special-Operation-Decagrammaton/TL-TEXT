[translation]
20043-10 = "Blue Archive!"
20043-20 = "Feliz Ano Novo, Sensei!\nEste ano, vamos partir para uma aventura gastronômica!"
20043-30 = "Que tipo de sabores\nserá que vamos encontrar\neste ano?"
20043-40 = "Uma aventura\ngastronômica,\nestou tão animada!"
20043-50 = "Se for aqui...\nTalvez eu queira comer aquilo!"
20043-60 = "Primeiro, preciso\ntrazer o meu molho\nsecreto especial!"
20043-70 = "Quer comer um\ntakoyaki de menta\ncom sardinha?"
20043-80 = "Ah! Bem-vindo de volta!\nEu estava te esperando, Sensei!"
20043-90 = "Sensei, bom trabalho hoje!\nAqui, um abraço de\nboas-vindas!"
20043-100 = "...Eh?\nSó o gesto já basta?\nÉ mesmo?"
20043-110 = "Se você diz, Sensei..."
20043-120 = "Sensei!\nQuando terminar o trabalho,\nvamos comer algo gostoso!"
20043-130 = "Eh? Você não sabe\nquando vai terminar...?"
20043-140 = "Ah, não...\nQue triste..."
20043-150 = "Sabe, eu mudei bastante\ndes que conheci o Sensei!"
20043-160 = "Bem...\nEspecificamente..."
20043-170 = "..."
20043-180 = "De qualquer forma,\neu mudei!"
20043-190 = "Me avise se sua\ngarganta estiver ruim."
20043-200 = "Tcharam!\nBala de alcaçuz salgada!"
20043-210 = "Dizem que é bom para a garganta!\nE o sabor é super interessante também!"
20043-220 = "Ei, ei, Sensei!\nQue tipo de momento\nvocê considera especial?"
20043-230 = "Para mim, era procurar\ncoisas gostosas e encontrar\nsabores novos...\n...era, pelo menos."
20043-240 = "Agora, o tempo que passo\ncom o Sensei é o mais\nespecial de todos."
20043-250 = "Comidas gostosas me dão\nemocões que eu nunca\nimaginei sentir!"
20043-260 = "Por isso, quero tentar\ncoisas novas e diferentes!"
20043-270 = "E então, o que você acha, Sensei?"
20043-280 = "Ah, eu lembro!\nHoje é o aniversário\ndo Sensei, né?"
20043-290 = "Eu escrevi para não\nesquecer! Ehehe."
20043-300 = "Tcharam!\nEu comprei um bolo!"
20043-310 = "...Meu pó especial?\nAinda não coloquei, não."
20043-320 = "Ah! Meu aniversário!\nVocê lembrou?\nQue felicidade!"
20043-330 = "Ehehe, vamos comer\no bolo juntos!"
20043-340 = "Eh? É estranho quem\nrecebe o presente\npreparar o bolo?"
20043-350 = "Nada disso! O importante\né comer o bolo! Não tem\nnada mais importante que isso!"
20043-360 = "Ehehe! Como é Ano Novo,\neu vesti um quimono!\nO que achou?"
20043-370 = "Mas é um pouco difícil\ncomer com ele.\nTenho que tomar cuidado\ncom as mangas..."
20043-380 = "Peru e frango!\nTorta de carne e gemada!"
20043-390 = "Se tiver o meu molho\nsecreto especial ali...\nOs preparativos de Natal\nestão perfeitos!"
20043-400 = "Ah, tem a parte do\nSensei também, viu!"
20043-410 = "Bala e torta de abóbora~\nParece delicioso!"
20043-420 = "Se eu colocar a minha\ncobertura especial,\nacho que vai ficar com\num sabor ainda mais interessante!"
20043-430 = "...Ah,\ncoloquei demais..."
20043-450 = "Sabe, Sensei."
20043-460 = "Dizem que, além do osechi,\nexistem muitas outras comidas\nde Ano Novo!"
20043-470 = "Por isso, preparei\num montão!"
20043-480 = "Eu? Eu estou..."
20043-490 = "Só de ver o Sensei comendo,\neu já fico feliz, sabe?"
20043-500 = "E também...\nEstar assim com o Sensei"
20043-510 = "Se pudermos ficar os dois\njuntos, já estou satisfeita!"
20043-520 = "Ah! Bem..."
20043-530 = "Eu acabei de dizer\nalgo um pouco embaraçoso..."
20043-540 = "Ma-mas!\nEu estou feliz!"
20043-550 = "Sem problemas! Está tudo bem!"
20043-2600 = "A aventura gastronômica\nàs vezes traz perigos...\nPor isso, eu vou\nproteger o Sensei!"
