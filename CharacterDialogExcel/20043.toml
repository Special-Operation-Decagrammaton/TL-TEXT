[translation]
20043-10 = "ブル～アーカイブ！"
20043-20 = "あけましておめでとうー！先生！\n今年も美食の冒険へ、いざゆかーん！"
20043-30 = "今年はどんな味に\n出会えるんだろう～？"
20043-40 = "び～しょくの\n～ぼ～けん\n楽しみだなぁ！"
20043-50 = "ここだと……\nアレ食べたいかも！"
20043-60 = "まずは私\n特製・秘伝ソースを\n持ってこなきゃ！"
20043-70 = "イワシミント\nたこ焼き、\n食べない？"
20043-80 = "あっ！おかえりー！\n待ってたよ、先生！"
20043-90 = "先生、今日も\nお疲れ様！はい、\nおかえりなさいのぎゅ～！"
20043-100 = "……え？\n気持ちだけでいい？\nそう？"
20043-110 = "先生がそう言うなら……"
20043-120 = "先生！\nお仕事終わったら、\n美味しいの食べに行こう！"
20043-130 = "えっ？いつ終わるか、\n分からないの……？"
20043-140 = "そんなぁ……\n寂しいよお……"
20043-150 = "私、先生にあってから\nだいぶ変わったんだよ！"
20043-160 = "えっとね……\n具体的には～"
20043-170 = "……"
20043-180 = "とにかく、\n変わったんだよ！"
20043-190 = "喉の調子が悪かったら\n言ってね"
20043-200 = "じゃーん！\n塩味のリコリスキャンディ！"
20043-210 = "これ、喉にいいんだって！\n味もすっごく面白いんだよ！"
20043-220 = "ねえねえ先生！\nどんな時間が\n特別だったりする？"
20043-230 = "私はね、美味しいものを\n探したり、新しい\n味と出会うこと……\n……だったんだけど。"
20043-240 = "今はね、先生との時間が\n一番、特別なんだ。"
20043-250 = "美味しいものは私に、\n想像もしなかった\nドキドキをくれるんだ！"
20043-260 = "だからね、もっと\n色んな新しいことに\n挑戦してみたいんだ～！"
20043-270 = "ね、先生はどう思う？"
20043-280 = "あ、覚えてるよ！\n今日は先生の\n誕生日でしょ？"
20043-290 = "忘れないよう、ちゃんと\n書いておいたの！\nえへへっ"
20043-300 = "じゃじゃ～ん！\nケーキ買ってきたんだ！"
20043-310 = "……私特製・パウダー？\nまだかけてないよ？"
20043-320 = "あ！私の誕生日！\n覚えてくれてたの？\n嬉しい！"
20043-330 = "えへへっ、ケーキ、\n一緒に食べよ～！"
20043-340 = "え？祝ってもらう\n側がケーキを\n用意するのって、ヘン？"
20043-350 = "そんなことないよ！\nケーキを食べるっていうのが\n大事なの！他に大切な\nことなんてないよ！"
20043-360 = "えへへっ！\nお正月だから着物を\n着てみたの！どうかな？"
20043-370 = "でも、ごはん食べるの\nちょっと大変なんだ。\n袖を気を\nつけなきゃいけなくて……"
20043-380 = "七面鳥とチキン！\nミンスパイにエッグノッグ！"
20043-390 = "そこに私特製・秘伝ソースが\nあれば……クリスマスの\n準備はバッチリ！"
20043-400 = "あ、ちゃんと\n先生の分もあるよ～！"
20043-410 = "キャンディと\nかぼちゃのパイ～\n美味しそう！"
20043-420 = "私特製・アイシングを\nかけたら、もっ～と\n面白い味になると思う！"
20043-430 = "……あっ、\nかけすぎちゃった……"
20043-450 = "あのね、先生。"
20043-460 = "お正月の料理って、\nおせちの他にも\nいろいろあるんだって！"
20043-470 = "だから、い～っぱい\n用意してみたの！"
20043-480 = "私？私は……"
20043-490 = "先生が食べてるとこ、\n見てるだけで幸せだよ？"
20043-500 = "あとは……\n先生とこうして"
20043-510 = "二人でいられたら\nそれで満足！かな！"
20043-520 = "あっ！えっと……"
20043-530 = "ちょっと、恥ずかしい\nこと言っちゃった……"
20043-540 = "で、でも！\n幸せだから！"
20043-550 = "問題ない！大丈夫！"
20043-2600 = "美食の冒険はときに\n危険が伴うもの……\nだから、私が\n先生を守ってあげるね！"
