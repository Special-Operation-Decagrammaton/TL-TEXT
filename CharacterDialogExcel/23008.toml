[translation]
23008-10 = "Blue Archive."
23008-20 = "Todo encontro é inevitável... De agora em diante, conto com você, Sensei."
23008-30 = "Sinto uma presença sagrada... É um lugar maravilhoso, não é?"
23008-40 = "O tempo está bom hoje também."
23008-50 = "Se não for pedir muito... posso descansar um pouco aqui?"
23008-60 = "Que este lugar seja abençoado daqui em diante, para sempre."
23008-70 = "Que este mundo possa ser, ao menos um pouco, mais pacífico..."
23008-80 = "Bem-vindo de volta, Sensei. Fico feliz em vê-lo hoje também."
23008-90 = "Estou rezando para que você tenha um bom dia hoje também."
23008-100 = "Você não gostaria de ouvir um pouco do que tenho a dizer?"
23008-110 = "I-isso é indecente, não pode..."
23008-120 = "(Que minhas orações possam proteger o Sensei...)"
23008-130 = "Quando estiver passando por momentos difíceis, saiba que pode contar comigo."
23008-140 = "Se for o Sensei..."
23008-150 = "Não, tenho certeza de que ficará tudo bem."
23008-160 = "Foi porque o Sensei nasceu neste dia que pudemos nos encontrar desta forma."
23008-170 = "Neste dia, ofereço minha mais sincera gratidão."
23008-180 = "Poder estar com o Sensei no seu aniversário..."
23008-190 = "Estou tão feliz que até me preocupo se não serei punida por isso mais tarde."
23008-200 = "Feliz Ano Novo. Que tipo de coisas maravilhosas nos esperam este ano..."
23008-210 = "Estou ansiosa desde já."
23008-220 = "Hoje é o dia do nascimento de alguém grandioso..."
23008-230 = "Vamos passar este dia sagrado com devoção."
23008-240 = "Um doce... ah, não, está tudo bem."
23008-250 = "Como irmã, a moderação é importante, afinal."
23008-270 = "...Obrigada por vir, Sensei."
23008-280 = "Sim, eu estava rezando pelo Sensei."
23008-290 = "Um lugar silencioso como este é perfeito para orações."
23008-300 = "Até o meu coração, que deveria estar apenas rezando, parece estar sendo purificado..."
23008-310 = "O caminho que o Sensei trilhou até aqui, e o caminho que escolherá daqui em diante..."
23008-320 = "Que neles, por favor, haja o máximo de paz e felicidade possível..."
23008-330 = "Eh, você não reza por si mesmo...?"
23008-340 = "Isso é... não, está tudo bem."
23008-350 = "Se o Sensei estiver feliz, eu também estarei."
23008-360 = "Ou seja, talvez esta seja uma oração... por nós dois."
23008-2600 = "Eu não gostaria muito de usar armas, mas... se for pela paz, farei o necessário."
