[translation]
23008-10 = "ブルーアーカイブ。"
23008-20 = "全ての出会いは必然……\nこれからどうぞよろしくお願いします、先生。"
23008-30 = "神聖な気配が\n感じられます、\n素晴らしい場所ですね。"
23008-40 = "今日も\n良いお天気ですね。"
23008-50 = "少しくらいでしたら……\nここで、\n休憩していっても\n良いでしょうか？"
23008-60 = "これから先ずっと、\nこの場所に\n祝福がありますように。"
23008-70 = "この世が、\n少しでも平和で\nありますように……"
23008-80 = "おかえりなさい、先生。\n今日もお会いできて嬉しいです。"
23008-90 = "今日も良い一日に\nなりますように、\n祈っておりますね。"
23008-100 = "少し、お話を\n聞いていかれませんか？"
23008-110 = "ふ、不埒なことは\n駄目ですよ……？"
23008-120 = "（私の祈りが、先生を\n守ってくれますように……）"
23008-130 = "辛いときは、私に\n頼ってくださっても\n良いのですよ。"
23008-140 = "先生でしたら……"
23008-150 = "いえ、きっと大丈夫です。"
23008-160 = "今日この日に先生が\n生を受けたからこそ、\n私たちはこうして\n出会うことができました。"
23008-170 = "今日という日に、\n心からの感謝を。"
23008-180 = "お誕生日にこうして、\n先生と一緒に\nいられるだなんて……"
23008-190 = "幸せ過ぎてなんだか、\nあとで罰が下って\nしまわないか心配です。"
23008-200 = "あけまして\nおめでとうございます。\n今年はどんな素敵なことが\n待っているのか……"
23008-210 = "今から楽しみですね。"
23008-220 = "今日は、\n偉大なる方の降誕祭……。"
23008-230 = "敬虔に、\nこの聖なる一日を\n過ごすとしましょう。"
23008-240 = "飴さん……あ、いえ、\n大丈夫です。"
23008-250 = "シスターとして、\n節制は大切ですので。"
23008-270 = "……来ていただいて\nありがとうございます、先生。"
23008-280 = "はい、先生のことを\n祈っておりました。"
23008-290 = "このように静かな場所は、\nお祈りにピッタリです。"
23008-300 = "祈っているはずの私の心も、\nまるで洗われていくようで……。"
23008-310 = "先生がこれまで\n積み上げてきた道、\nそしてこれから選ばれる道……。"
23008-320 = "そこにどうか、\nできるだけ多くの平和と、\n幸せがありますように……。"
23008-330 = "え、自分のことも\n祈らないの……ですか？"
23008-340 = "それは……\nいえ、大丈夫なんです。"
23008-350 = "先生が幸せでしたら、\n私も幸せですので。"
23008-360 = "つまりこれは、\n私たちのための祈り……\nなのかもしれません。"
23008-2600 = "あまり、武器は使いたくないのですが……\n平和のためでしたら。"
