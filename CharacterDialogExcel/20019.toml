[translation]
20019-10 = "ブルーアーカイブ"
20019-20 = "ご主人様のメイド、アカネです。\nいえ…今はご主人様のウサギさん、\nと申し上げるべきでしょうか？"
20019-30 = "綺麗に\n整頓されていますね。\n掃除は…大切です。"
20019-40 = "いらっしゃいませ。\nご注文は紅茶ですか？\n…ふふっ。"
20019-50 = "ご主人様は本当に…\n特別なお方なのです。"
20019-60 = "もう少し\n整理できる\nところは…"
20019-70 = "この際、ご主人様と\n一緒にウサギの道を\n歩んでみるのも…？"
20019-80 = "お待ちしておりました、\nご主人様。"
20019-90 = "アカネはご主人様だけの\n忠実なウサギです。"
20019-100 = "ぴょんぴょん！"
20019-110 = "おかえりなさいませ、\nご主人様。準備は\n全て終わっております…"
20019-120 = "勤勉なウサギですから。"
20019-130 = "ウサギになりきるのは\n楽しいか…ですか？\nうふふ、そうですね…"
20019-140 = "どう見えます？"
20019-150 = "ご要望がありましたら、\nいつでもお申し付けください。\nお待ちしておりますので。"
20019-160 = "ご主人様とのこの一瞬は、\n私にとってかけがえのない\n大切な時間です。"
20019-170 = "爆弾は一番効率的な\n掃除道具なんですよ。"
20019-180 = "じょ、冗談です…\nそんな目で見ないでください、\nご主人様。"
20019-190 = "ウサギになりきる事は、\nより完璧なエージェントに\n近づくための一歩。"
20019-200 = "もしくは、より完璧な\nメイドに近づくための\n一歩かもしれませんね。"
20019-210 = "お誕生日おめでとう\nございます、ご主人様！"
20019-220 = "本日は、ウサギからの\n特別なご奉仕を、\n期待していてくださいね？"
20019-230 = "ウサギの特別な奉仕、ですか？"
20019-240 = "うふふ…さあ、\n何でしょうね？"
20019-250 = "大丈夫。\n怖くないですよ～\nさあ、よしよし…。"
20019-260 = "私の誕生日を覚えて\nくださっていたのですか？"
20019-270 = "ありがとうございます、\nご主人様。これ以上に\n嬉しいことはございません。"
20019-280 = "あけまして\nおめでとうございます、\nご主人様。"
20019-290 = "…もう新年ですね。\n今年は本当に良い事が\nたくさんありますように…。"
20019-300 = "クリスマスですね、\nご主人様。"
20019-310 = "ご主人様となら毎日が\n特別ですが…今日は\nとびきり特別な日です。"
20019-320 = "寒がっている\nウサギのために…\nおそばに\nいてくださりませんか？"
20019-330 = "あ、ハロウィーンですね。\n私のこの格好も、\n今日だけは普通に見えますね。"
20019-340 = "それで…どんな\nイタズラがいいですか？\nお菓子をくださっても、\nイタズラはしますからね？"
20019-360 = "申し訳ございません…\nこんな考え、メイドとしては\n失格のはずなのに。"
20019-370 = "私…自信を\nなくしておりました。"
20019-380 = "ご主人様はいつも多くのものを\n背負っていて、それなのに\n大丈夫だと笑っていて。"
20019-390 = "私は…全然その重荷を、\n代わりに持って\n差し上げられず…。"
20019-400 = "ですが、ご主人様の\nお言葉で、再び前を\n向けそうです。"
20019-410 = "これからも、\nふつつかものですが何卒\nよろしくお願いいたします。\nご主人様。"
20019-2600 = "これでもっと完璧な…\n「ウサギ」になれますね。"
