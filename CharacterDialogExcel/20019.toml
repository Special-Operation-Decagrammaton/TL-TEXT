[translation]
20019-10 = "Blue Archive"
20019-20 = "Sou sua empregada, Akane.\nNão... talvez eu devesse dizer...\nsua coelhinha agora, mestre?"
20019-30 = "Está tudo\norganizado perfeitamente.\nA limpeza é... essencial."
20019-40 = "Seja bem-vindo.\nGostaria de um chá?\n...Fufu."
20019-50 = "O mestre é realmente...\numa pessoa especial."
20019-60 = "Ainda há lugares\nque precisam ser\norganizados..."
20019-70 = "Já que estamos aqui, que tal\ncaminhar pelo caminho do coelho\njunto comigo, mestre...?"
20019-80 = "Estava à sua espera,\nmestre."
20019-90 = "Akane é a coelhinha\nfiel apenas ao mestre."
20019-100 = "Pulo, pulo!"
20019-110 = "Bem-vindo de volta,\nmestre. Tudo já está\npreparado..."
20019-120 = "Porque sou uma coelhinha diligente."
20019-130 = "Se é divertido agir como\num coelho...? Ufufu, bem..."
20019-140 = "Como estou?"
20019-150 = "Se tiver algum pedido,\npor favor, me avise a qualquer momento.\nEstarei aguardando."
20019-160 = "Este momento com o mestre\né um tempo precioso e\nirsubstituível para mim."
20019-170 = "Bombas são as ferramentas de\nlimpeza mais eficientes, sabe."
20019-180 = "É, é uma brincadeira...\nNão me olhe desse jeito,\nmestre."
20019-190 = "Agir como um coelho é um passo\npara me tornar uma agente\nainda mais perfeita."
20019-200 = "Ou talvez, um passo para me tornar\numa empregada ainda mais\nperfeita, não é?"
20019-210 = "Feliz aniversário,\nmestre!"
20019-220 = "Hoje, espere por um\nserviço especial da sua coelhinha,\ncerto?"
20019-230 = "Um serviço especial de coelhinha, diz?"
20019-240 = "Ufufu... bem,\no que será?"
20019-250 = "Está tudo bem.\nNão precisa ter medo~\nVenha, venha..."
20019-260 = "Você se lembrou\ndo meu aniversário?"
20019-270 = "Muito obrigada,\nmestre. Não há nada que\nme deixe mais feliz que isso."
20019-280 = "Feliz ano novo,\nmestre."
20019-290 = "...Já é um novo ano.\nEspero que este ano seja\ncheio de coisas boas..."
20019-300 = "É Natal,\nmestre."
20019-310 = "Cada dia é especial ao seu lado,\nmas hoje é um dia\nextremamente especial."
20019-320 = "Para esta coelhinha\nque está com frio...\nvocê não poderia\nficar ao meu lado?"
20019-330 = "Ah, é Halloween.\nAté meu visual parece\nnormal apenas hoje."
20019-340 = "Então... que tipo de\ntruque você quer?\nMesmo que me dê doces,\neu ainda vou fazer uma travessura, viu?"
20019-360 = "Peço perdão...\nMesmo que esse tipo de pensamento\nseja inaceitável para uma empregada."
20019-370 = "Eu... perdi\na confiança em mim mesma."
20019-380 = "O mestre sempre carrega tantas coisas,\ne ainda assim, sorri dizendo que está tudo bem."
20019-390 = "E eu... não consegui\ncarregar esse peso\npor você..."
20019-400 = "Mas, com as suas palavras,\nsinto que posso olhar para frente\nnovamente."
20019-410 = "Continuarei sendo uma pessoa simples,\nmas conto com o seu apoio.\nMestre."
20019-2600 = "Com isso, posso me tornar uma...\n\"coelhinha\" ainda mais perfeita."
