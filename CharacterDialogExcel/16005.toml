[translation]
16005-10 = "Blue Archive!"
16005-20 = "Kihihi... Ah, Se-Sensei...!?"
16005-30 = "I-Is it really okay... for me to be here..."
16005-40 = "Ugh, hah!? Se-Sensei...!?"
16005-50 = "U-Um... excuse me... ugh... Uwaaaaaah!"
16005-60 = "This is even more nerve-wracking... than the battlefield..."
16005-70 = "I-I'm not really... used to places like this...!"
16005-80 = "W-Welcome back, Sensei!"
16005-90 = "I-I look forward to working with you again today..."
16005-100 = "I-I've been waiting for you! Sensei!"
16005-110 = "Kuhi... kuhihi... kuhihihihi!!"
16005-120 = "Kyaaa!"
16005-130 = "Hahahahahaha!!! Kyahhahahaha!!"
16005-140 = "...Ah. Se-Sensei...?"
16005-150 = "H-How long have you been there..."
16005-160 = "Eh...? You've been there the whole time...!? T-That's...!!"
16005-170 = "T-This is... um..."
16005-180 = "How should I explain this..."
16005-190 = "S-Sensei's birthday...! I-If there's anything I can do, please tell me, Sensei...!"
16005-200 = "...Eh? My birthday...? Y-You're celebrating... my birthday...!?"
16005-210 = "...Th-Thank you very much, Sensei...!"
16005-220 = "I-I look forward to another year with you, Sensei...!"
16005-230 = "I-I might not be dressed appropriately... for a day like this..."
16005-240 = "...Eh? You think... it's actually not bad...?"
16005-250 = "The whole city is glowing mysteriously, and it's so lively..."
16005-260 = "So this is... Halloween..."
16005-280 = "Kihi, kyahhahahahaha!"
16005-290 = "Ah, I'm sorry... Thank you, Sensei."
16005-300 = "This is my first time playing at the beach like this. It's fun, but..."
16005-310 = "At the same time, I didn't realize it would be this physically exhausting..."
16005-320 = "I'm a little... tired."
16005-330 = "...Come to think of it, Sensei. I just remembered something..."
16005-340 = "This swimsuit has been... a little tight..."
16005-350 = "Could it be... that the size... is wrong..."
16005-360 = "Ah, oh... d-did something happen!?"
16005-370 = "D-D-Did I say something... weird again...!?"
16005-2600 = "Ufufufu... with this, it's certain... Uhihihihihi!!!"
