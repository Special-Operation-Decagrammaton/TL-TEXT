[translation]
16005-10 = "ブルーアーカイブぅー！"
16005-20 = "きひひっ……あっ、せ、先生……！？"
16005-30 = "こ、ここにいても、\n本当に良いのか……"
16005-40 = "うぅ、はっ！？\nせ、先生……！？"
16005-50 = "え、えっと……\nあのぅ……うう……\nうああぁぁぁあ！"
16005-60 = "戦場より、\n落ち着かない……"
16005-70 = "わ、私にはその、\nこういうところは\nあまり……！"
16005-80 = "お、おかえりなさい先生！"
16005-90 = "きょ、今日もよろしく、\nお願いします……っ。"
16005-100 = "お、お待ちして\nおりました！\n先生！"
16005-110 = "くひ……くひひ……\nくひひひひ！！"
16005-120 = "きゃぁぁっ"
16005-130 = "ははははははははは！！！\nきゃひゃひゃひゃひゃ！！"
16005-140 = "……あっ。\nせ、先生……？"
16005-150 = "い、いつからそこに……"
16005-160 = "え……？\nさっきからずっと……！？\nそ、そんな……！！"
16005-170 = "こ、これは……その……"
16005-180 = "何と説明をすれば……"
16005-190 = "せ、先生のお誕生日……！\nわ、私にできることなら、\n何でも言ってください、\n先生……！"
16005-200 = "……え？誕生日……？\nわ、私の誕生日をお祝い……！？"
16005-210 = "……あ、ありがとう\nございます、先生……！"
16005-220 = "こ、今年もよろしく\nお願いします、先生……！"
16005-230 = "こ、こういう日には\nあまり相応し\nくない身なりかもしれません……"
16005-240 = "……え？\n逆に悪くない、ですか……？"
16005-250 = "街全体が怪しく光ってて、\n賑やかで……"
16005-260 = "これが、\nハロウィン……。"
16005-280 = "きひっ、\nきゃははははははっ！"
16005-290 = "あ、すみません……\nありがとうございます、先生。"
16005-300 = "こうして海で遊んだのは、\n初めてでして。\n楽しいですが、"
16005-310 = "同時に思ったより体力が\n要るものなのですね……。"
16005-320 = "ちょっとだけ、\n疲れました。"
16005-330 = "……そういえば先生。\nふと思い出したのですが、"
16005-340 = "この水着ずっと、\n少し窮屈で…。"
16005-350 = "もしかして、\nサイズが合って\nないのでしょうか……。"
16005-360 = "あ、あれ……\nど、どうかしましたか！？"
16005-370 = "わ、わ、私また、\n何か変なことを……！？"
16005-2600 = "うふふふ……これで、確実に……\nうひひひひひっ！！！"
