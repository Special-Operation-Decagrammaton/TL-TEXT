[translation]
10140-10 = "Blue Archive."
10140-20 = "Sou da SRT, a ponta de lança do Esquadrão FOX, Takakura Kurumi. Deixe a escolta do Sensei comigo. Vou te proteger com tudo o que tenho. É isso, conto com você."
10140-30 = "(Ah, aquela decoração na arma é tão fofa... Onde será que vendem?)"
10140-40 = "(Será que... eu sou a que parece mais madura aqui...?)"
10140-50 = "Essa janela aqui é tão limpa... parece até o meu escudo."
10140-60 = "Ai, ai, que dor muscular... Será que exagerei no treino?"
10140-70 = "Com confiança... de cabeça erguida... Eu sou uma veterana!"
10140-80 = "Ah, bem-vindo de volta, Sensei. Você parece estar de bom humor. O que houve?"
10140-90 = "Eu estava te esperando, Sensei."
10140-100 = "Então, qual missão devemos fazer hoje?"
10140-110 = "Fufu, você pode contar mais comigo, sabia?"
10140-120 = "Sou uma elite da SRT, dou conta de qualquer coisa!"
10140-130 = "Hmm..."
10140-140 = "Hã!? N-não é nada!"
10140-150 = "Não, não aconteceu nada em especial..."
10140-160 = "É que... eu só pensei que é legal ver um adulto focado no trabalho."
10140-170 = "...Ei! Isso é motivo de risada?"
10140-180 = "...Que dia bonito."
10140-190 = "Talvez eu vá ver como estão as minhas veteranas mais tarde."
10140-200 = "A FOX4... Otogi, quando ela se concentra, acaba perdendo a noção do que acontece ao redor."
10140-210 = "Ela não percebe nem se houver uma explosão por perto."
10140-220 = "...Bem, quando a situação parece perigosa, eu vou lá, então está tudo bem."
10140-230 = "O Schale... recebe visitas do Conselho Estudantil Federal às vezes...?"
10140-240 = "Ah, entendi... Não, nada não."
10140-250 = "É que lutamos contra elas durante uma invasão anterior, então só me sinto um pouco desconfortável."
10140-260 = "Feliz aniversário, Sensei."
10140-270 = "É que... eu não preparei um presente para hoje..."
10140-280 = "...Quer tocar nas minhas orelhas?"
10140-290 = "Meu aniversário...?"
10140-300 = "Hã! C-como você sabe disso?"
10140-310 = "Você ouviu antes...? Ah, entendi."
10140-320 = "Você tem uma ótima memória! Ah, obrigada!"
10140-330 = "Feliz Ano Novo."
10140-340 = "Depois disso, vou jogar hanetsuki com o pessoal do esquadrão... Se quiser, o Sensei também pode vir?"
10140-350 = "Eu gosto da época de Natal. A cidade fica toda brilhante..."
10140-360 = "Seria melhor se não tivéssemos treino."
10140-370 = "Todo mundo não está animado demais?"
10140-380 = "Em dias de festival assim, a criminalidade aumenta, então deveríamos ter cuidado."
10140-390 = "Hã? Minha boca...?"
10140-400 = "Ah, qual é! Eu só estava provando a sopa de abóbora!"
10140-420 = "O quê! O-o que foi, Sensei, desde quando você está aí?"
10140-430 = "E-eu não estou nervosa nem nada!"
10140-440 = "É só que... o tempo foi um pouco difícil..."
10140-450 = "<Iniciando a foto...>"
10140-460 = "<3, 2, 1.>"
10140-470 = "Di-diga X!"
10140-480 = "Ah... fechei os olhos de novo..."
10140-490 = "Quando começam a contar, eu acabo ficando nervosa..."
10140-500 = "Ah, não! Eu não estou nervosa! É só que eu acabo fechando os olhos—"
10140-510 = "<Iniciando a foto...>"
10140-520 = "Chegou!"
10140-530 = "<3, 2, 1.>"
10140-540 = "Ni, ni!"
10140-550 = "Ah, qual é! Fechou de novo... Por que isso acontece?!"
10140-2600 = "Recebi a submetralhadora FOX-45. Eu preferiria algo com um pouco mais de poder de fogo, mas... acho que serve. Meu papel é ser a ponta de lança do esquadrão. É sobre proteger, não sobre destruir."
