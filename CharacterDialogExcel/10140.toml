[translation]
10140-10 = "Blue Archive."
10140-20 = "Я Такакура Куруми, поинтмен отряд FOX Особой академии SRT.\nПредоставь свою защиту мне, Сенсей. Я буду охранять тебя изо всех сил.\nМы договорились, так что я рассчитываю на тебя."
10140-30 = "(Ой, это украшение на пушку такое милое... Интересно, где такие продаются?)"
10140-40 = "(Неужели... я здесь выгляжу самой взрослой...?)"
10140-50 = " Это окно такое чистое... Прямо как мой щит."
10140-60 = "Угх, мышцы так болят... Неужели я переборщила с тренировками...?"
10140-70 = "Спину прямо... грудь вперёд... Я ветеран!"
10140-80 = "О, с возвращением, Сенсей. Похоже, ты в хорошем настроении. Что случилось?"
10140-90 = "Я ждала тебя, Сенсей."
10140-100 = "Итак, за какую операцию возьмёмся сегодня?"
10140-110 = "Хе-хе, знаешь, ты можешь полагаться на меня почаще."
10140-120 = "В конце концов, я элита SRT! С чем угодно справлюсь!"
10140-130 = "Хмм..."
10140-140 = "Хах!? Н-ничего подобного!"
10140-150 = "Нет, вовсе ничего не случилось и вообще..."
10140-160 = "Просто... я подумала, что взрослые, сосредоточенные на работе, выглядят довольно круто."
10140-170 = "...Эй! Разве над этим стоит смеяться!?"
10140-180 = "...Хорошая погода."
10140-190 = "Может, попозже схожу проведать младшеклассников."
10140-200 = "FOX4... Отоги, стоит ей сосредоточиться, как она напрочь забывает обо всём вокруг."
10140-210 = "Она даже не заметит, если прямо рядом с ней бабахнет взрыв."
10140-220 = "...Ну, если запахнет жареным, я буду рядом, так что всё в порядке."
10140-230 = "Schale... Сюда ведь иногда заглядывает Генеральный студенческий совет...?"
10140-240 = "О-ох, вот как... Нет, ничего."
10140-250 = "Мы ведь сражались с ними, когда совершили налёт в прошлый раз, так что теперь как-то неловко."
10140-260 = "С днём рождения, Сенсей."
10140-270 = "Эм... Я не приготовила подарок на сегодня..."
10140-280 = "...Хочешь... потрогать мои ушки?"
10140-290 = "Мой день рождения...?"
10140-300 = "Хах! К-как ты узнал?"
10140-310 = "Слышал об этом раньше...? Я-ясно..."
10140-320 = "У тебя хорошая память! С-спасибо!"
10140-330 = "С Новым годом."
10140-340 = "Я собираюсь позже сыграть в ханецуки с остальными из отряда... Не хочешь присоединиться, Сенсей?"
10140-350 = "Мне очень нравится рождественская пора. Весь город так сверкает..."
10140-360 = "Было бы ещё лучше, если бы не тренировки."
10140-370 = "Вам не кажется, что все слишком сильно увлекаются?"
10140-380 = "Казалось бы, нужно быть осторожнее, ведь в такие праздники уровень преступности обычно растёт."
10140-390 = "Ась? Мой рот...?"
10140-400 = "Ну же! Я просто пробовала тыквенный суп!"
10140-420 = "Эй! Ч-что ты тут делаешь, Сенсей? С каких это пор ты подсматриваешь?"
10140-430 = "Я-я совсем не нервничаю!"
10140-440 = "Просто... подгадать момент немного сложно..."
10140-450 = "<Начало фотосъёмки.>"
10140-460 = "<3, 2, 1.>"
10140-470 = "Ч-чи-из!"
10140-480 = "Угх... Я опять закрыла глаза..."
10140-490 = "Каждый раз, когда кто-то начинает отсчёт, я просто так сильно нервничаю..."
10140-500 = "Ой, нет! Дело не в том, что я нервничаю! Я просто случайно закрываю глаза—"
10140-510 = "<Начало фотосъёмки.>"
10140-520 = "Вот сейчас!"
10140-530 = "<3, 2, 1.>"
10140-540 = "Ч-чи-из!"
10140-550 = "Ну вот опять! Я снова их закрыла... Почему это постоянно происходит?!"
10140-2600 = "Пистолет-пулемёт FOX-45 получен. Я бы предпочла что-то с большей огневой мощью... но ладно. Моя роль — поинтмен отряда. Я здесь для того, чтобы защищать, а не разрушать."