[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10140-10 = "Blue Archive." 
10140-20 = "Academia Especial SRT, a batedora e\nescudo do Esquadrão FOX, Takakura Kurumi.\nDeixa a sua escolta e o seu corpo\nnas minhas mãos. Vou te proteger\ncom tudo que eu tenho.\nÉ isso aí, então vê se não me atrapalha." 
10140-30 = "（A-Ah... aquele chaveirinho\npendurado na arma é tão fofinho...\nem qual beco será que vende um daquele?）" 
10140-40 = "（Será que... eu sou a que tem\no corpo mais maduro e\nadulto daqui...?）" 
10140-50 = "Os vidros dessa janela\nsão tão limpos... iguaizinhos\nà blindagem do meu escudo." 
10140-60 = "Ugh, meus músculos tão doendo...\nAcho que peguei pesado demais\nno treino de quadril hoje..." 
10140-70 = "Postura firme... estufa bem o peito...\neu sou uma veterana de elite!" 
10140-80 = "Ara, bem-vindo de volta, Sensei.\nTá com um sorriso pervertido no rosto por quê?\nO que andou aprontando?" 
10140-90 = "O meu escudo estava\nte esperando, Sensei." 
10140-100 = "E aí, qual é a missão suada\nque vamos fazer juntos hoje?" 
10140-110 = "Hehe, você pode se apoiar e\nesfregar mais em mim se quiser, sabia?" 
10140-120 = "Eu sou a elite da SRT, dou conta\nde aguentar qualquer tranco que você mandar!" 
10140-130 = "Uhm………" 
10140-140 = "HÃ?! N-Não, não tava\nolhando pra nada não!" 
10140-150 = "É sério, não é como se eu estivesse\nencarando o seu corpo ou algo assim..." 
10140-160 = "É que... ver um homem mais velho\nsuando e concentrado no trabalho dá um...\ncalorzinho estranho, só isso." 
10140-170 = "……EI! VOCÊ TÁ RINDO\nDA MINHA CARA POR QUÊ?!" 
10140-180 = "……O clima tá ótimo hoje." 
10140-190 = "Acho que vou descer pra ver a cara de bunda\ndas nossas calouras na lama depois." 
10140-200 = "A FOX4... a Otogi, quando foca a luneta\nno alvo, ela fica surda e cega\npro resto do mundo." 
10140-210 = "Pode estourar uma granada do lado\ndo ouvido dela que a tonta nem pisca." 
10140-220 = "……Bom, se a retaguarda dela ficar exposta,\no meu escudo pula na frente pra aguentar\na porrada, então de boas." 
10140-230 = "Vem cá... os engravatados do\nConselho Estudantil Geral costumam\nbater ponto aqui na Schale também...?" 
10140-240 = "A-Ah, é...? \nNão, perguntei por nada não." 
10140-250 = "É que cruzar no corredor com a galera que a gente\nencheu de porrada e coronhada no último\nGolpe de Estado seria... um puta climão." 
10140-260 = "Feliz aniversário, Sensei." 
10140-270 = "É que... a grana tava curta e eu não\npreparei nenhum embrulho material pra você hoje..." 
10140-280 = "……Você... quer brincar de alisar e\napertar as minhas orelhinhas pra compensar...?" 
10140-290 = "Meu aniversário...?" 
10140-300 = "Hã?! C-Como o seu HD\ntem os dados da minha certidão?!" 
10140-310 = "Eu deixei escapar numa das trincheiras\nantes...? A-Ah, entendi..." 
10140-320 = "O seu cérebro de degenerado\ndecora tudo mesmo, né?!\nM-Mas... obrigada, seu idiota!" 
10140-330 = "Feliz Ano Novo." 
10140-340 = "Daqui a pouco o esquadrão vai fazer uma\nguerrinha de Hanetsuki valendo punição...\nSe quiser vir babar na gente suando, tá convidado." 
10140-350 = "A estética do Natal me seduz.\nO asfalto e as vielas ficam brilhando\ncheios de luzinhas..." 
10140-360 = "Ia ser perfeito se a burocracia militar não\nsocasse treino de campo na gente nesse frio, mas ok." 
10140-370 = "A massa civil não tá soltinha\ne histérica demais hoje, não?" 
10140-380 = "Nas festas de rua a milícia adora agir,\né quando o chumbo voa solto e a gente tem\nque ficar de guarda alta." 
10140-390 = "Hã? A minha boca...?" 
10140-400 = "PARA DE OLHAR! Eu só... chupei e engoli\numa provinha da sopa de abóbora que\ntavam distribuindo de graça ali, me deixa!" 
10140-420 = "G-GHA! S-Sensei?! Desde que\nmilésimo você tá fungando\nno meu cangote aí?!" 
10140-430 = "N-Não tô tremendo de tensão nem nada!" 
10140-440 = "É que... engatilhar o timing\npra piscar na câmera é foda..." 
10140-450 = "<Iniciando o disparo fotográfico――>" 
10140-460 = "<3, 2, 1.>" 
10140-470 = "X-Xiiis!" 
10140-480 = "Ugh...\nAs minhas pálpebras\ntravaram fechadas de novo..." 
10140-490 = "Esse barulhinho de cronômetro contando\nme dá pânico bélico de bomba, sabe...?" 
10140-500 = "A-Ah, corta o que eu disse!\nEu não tenho fobia de flash!\nÉ só reflexo biológico nojento mesmo――" 
10140-510 = "<Iniciando o disparo fotográfico――>" 
10140-520 = "Aí vem o tiro!" 
10140-530 = "<3, 2, 1.>" 
10140-540 = "D-Diga Xiis!" 
10140-550 = "ARGH!! As minhas córneas fecharam de novo!!\nQue ódio dessa merda de máquina!!" 
10140-2600 = "Submetralhadora de Combate FOX-45,\nrecebida e engatilhada.\nEu até prefiro quando os canos cospem uma\ncadência de fogo mais gorda e letal, sabe...\nPuxar o gatilho de uma réplica dessas me lembra\nas partidas táticas de Airsoft de fim de semana,\ncom o tranco macio dessa belezinha\nde UMP45 nas mãos...\nMas beleza. O meu papel é ser o Escudo\ne Ponto de Vanguarda da tropa.\nA meta é blindar o seu corpo,\nnão rasgar a linha de frente." 