[translation]
10140-10 = "ブルーアーカイブ。"
10140-20 = "SRT特殊学園、FOX小隊のポイントマン、\n高倉クルミよ。\n先生の護衛は私に任せて。全力で守るわ。\nそういうことだから、よろしくね。"
10140-30 = "（あ、あの銃の\nデコレーション可愛い……\nどこで売ってるんだろ？）"
10140-40 = "（なんか……\n私が一番大人っぽく\n見えたり……？）"
10140-50 = "ここの窓って\n綺麗ね……まるで\n私の盾みたい。"
10140-60 = "うう、筋肉痛……。\n訓練やりすぎ\nちゃったかな……。"
10140-70 = "堂々と……\n胸を張って……\n私はベテラン！"
10140-80 = "あら、おかえり先生。\nなんか機嫌いいわね。\nどうしたの？"
10140-90 = "待っていたわ、先生。"
10140-100 = "それで、今日はどの\n作戦をすればいいの？"
10140-110 = "ふふっ、\nもっと私に頼っていいのよ？"
10140-120 = "SRTのエリートだもの、\nなんでもこなしてみせるわ！"
10140-130 = "うーん………。"
10140-140 = "えっ！？な、何でもないわ！"
10140-150 = "いや、特になにか\nあったわけじゃなくて……。"
10140-160 = "その……\n仕事に集中している大人って\nいいなぁって思っただけよ。"
10140-170 = "……ちょっと！そこ笑うとこ！？"
10140-180 = "……いい天気。"
10140-190 = "後で後輩たちの顔でも\n見に行こうかしら。"
10140-200 = "FOX4……オトギって、\n一度集中すると周りが\n見えなくなるのよね。"
10140-210 = "近くで爆発が起きても\n気づかないくらい。"
10140-220 = "……まあ、ヤバそうな時は私が\nいくからいいんだけど。"
10140-230 = "シャーレって……\n連邦生徒会が\n来ることもあるの……？"
10140-240 = "そ、そう……。\nいや、別に。"
10140-250 = "以前襲撃した時に戦ったから、\nちょっと気まずいだけよ。"
10140-260 = "お誕生日おめでとう、先生。"
10140-270 = "その……今日、プレゼント、\n用意してなくて……。"
10140-280 = "……私の耳……触ってみる？"
10140-290 = "私の誕生日……？"
10140-300 = "えっ！な、なんで知ってるの？"
10140-310 = "前に聞いたことがある……？\nそ、そう……。"
10140-320 = "記憶力が良いのね！\nあ、ありがとう！"
10140-330 = "あけましておめでとう。"
10140-340 = "この後、小隊のみんなと\n羽つきで勝負するんだけど……\nよかったら先生も来ない？"
10140-350 = "クリスマスシーズンって\n好きなのよね。\n街中がキラキラしてて……"
10140-360 = "訓練がなければもっと\n良かったんだけど。"
10140-370 = "みんな浮かれすぎじゃない？"
10140-380 = "こういうお祭りの日って、\n犯罪が増えるから\n気をつけなきゃいけないのに。"
10140-390 = "え？口元……？"
10140-400 = "もう！かぼちゃスープの\n試食をさせてもらっただけ！"
10140-420 = "なっ！な、なによ先生、\nいつからいたの？"
10140-430 = "べ、別に緊張なんてしてないわ！"
10140-440 = "ただ……ちょっと\nタイミングが難しくて……。"
10140-450 = "<撮影を行います――>"
10140-460 = "<3、2、1。>"
10140-470 = "に、にっ！"
10140-480 = "うっ……\nまた目瞑っちゃった……。"
10140-490 = "数字を数えられると、\nなんか緊張しちゃうのよね……。"
10140-500 = "あ、いや！\n緊張してるわけじゃないのよ！\nただ、目を瞑っちゃうだけで――"
10140-510 = "<撮影を行います――>"
10140-520 = "来た！"
10140-530 = "<3、2、1。>"
10140-540 = "に、にっ！"
10140-550 = "もう！また閉じちゃった……\nなんでなのよー！　"
10140-2600 = "FOX-45式サブマシンガン、\n受け取ったわ。もうちょっと火力が\n高い方が嬉しいけど……。まあいっか。\n私の役割は小隊のポイントマン。\n守りであって、撃破じゃないし。"
