[translation]
10140-10 = "Blue Archive."
10140-20 = "I'm Takakura Kurumi, point man for the SRT Special Academy's FOX Platoon.\nLeave your protection to me, Sensei. I'll guard you with everything I've got.\nThat's the deal, so I'm counting on you."
10140-30 = "(Oh, that gun decoration is so cute... I wonder where they sell those?)"
10140-40 = "(Am I... the one who looks the most mature here...?)"
10140-50 = "This window is so clean... It's almost like my shield."
10140-60 = "Ugh, my muscles are so sore... Did I overdo it with the training...?"
10140-70 = "Stand tall... chest out... I am a veteran!"
10140-80 = "Oh, welcome back, Sensei. You seem to be in a good mood. What's up?"
10140-90 = "I've been waiting for you, Sensei."
10140-100 = "So, which operation should we handle today?"
10140-110 = "Hehe, you can rely on me more, you know?"
10140-120 = "I'm an SRT elite, after all! I can handle anything!"
10140-130 = "Hmm..."
10140-140 = "Huh!? N-nothing at all!"
10140-150 = "No, it's not like anything happened or anything..."
10140-160 = "It's just... I was thinking that adults who are focused on their work are pretty cool."
10140-170 = "...Hey! Is that something to laugh at!?"
10140-180 = "...Nice weather."
10140-190 = "Maybe I'll go check on the underclassmen later."
10140-200 = "FOX4... Otogi, she loses track of everything around her once she focuses."
10140-210 = "She wouldn't even notice if an explosion happened right next to her."
10140-220 = "...Well, I'll be there if things get dangerous, so it's fine."
10140-230 = "Schale... Does the General Student Council come here sometimes...?"
10140-240 = "O-oh, I see... No, it's nothing."
10140-250 = "We fought them when we raided them before, so it's just a bit awkward."
10140-260 = "Happy birthday, Sensei."
10140-270 = "Um... I didn't prepare a gift for today..."
10140-280 = "...Do you want to... touch my ears?"
10140-290 = "My birthday...?"
10140-300 = "Huh! H-how did you know?"
10140-310 = "You heard it before...? I-I see..."
10140-320 = "You have a good memory! T-thank you!"
10140-330 = "Happy New Year."
10140-340 = "I'm going to play battledore with the rest of the platoon later... Would you like to join us, Sensei?"
10140-350 = "I really like the Christmas season. The whole city is so sparkly..."
10140-360 = "It would be even better if I didn't have training."
10140-370 = "Isn't everyone getting a little too carried away?"
10140-380 = "You'd think they'd be more careful, since crime tends to increase on holidays like this."
10140-390 = "Huh? My mouth...?"
10140-400 = "Geez! I was just sampling some pumpkin soup!"
10140-420 = "Hey! W-what are you doing here, Sensei? Since when were you watching?"
10140-430 = "I-I'm not nervous at all!"
10140-440 = "It's just... the timing is a little difficult..."
10140-450 = "<Starting the photo shoot.>"
10140-460 = "<3, 2, 1.>"
10140-470 = "Ch-cheese!"
10140-480 = "Ugh... I closed my eyes again..."
10140-490 = "Whenever someone counts down, I just get so nervous..."
10140-500 = "Oh, no! It's not that I'm nervous! I just end up closing my eyes—"
10140-510 = "<Starting the photo shoot.>"
10140-520 = "Here it comes!"
10140-530 = "<3, 2, 1.>"
10140-540 = "Ch-cheese!"
10140-550 = "Geez! I closed them again... Why does this keep happening?!"
10140-2600 = "I've received the FOX-45 submachine gun. I would've preferred something with a bit more firepower... but oh well. My role is the platoon's point man. I'm here to protect, not to destroy."