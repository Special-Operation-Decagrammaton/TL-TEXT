[translation]
10092-10 = "Blue Archive~!!"
10092-20 = "Pode criar expectativas... não, crie expectativas! Pela minha apresentação!!"
10092-30 = "É bem espaçoso aqui... talvez seja perfeito para tocar."
10092-40 = "Eu queria praticar, mas tem muita gente..."
10092-50 = "Estou com fome, será que tem algum doce por perto?"
10092-60 = "Acho que vou descansar um pouco..."
10092-70 = "Ué. Não disseram que íamos nos reunir aqui?"
10092-80 = "P-Professor!? Quando você chegou...!?"
10092-90 = "E-eu? Só estava... praticando um pouco..."
10092-100 = "Bem-vindo, Professor!"
10092-110 = "B-bem, se... se por acaso..."
10092-120 = "Quer uma música de fundo...? Quer que eu toque algo?"
10092-130 = "Sabe, quando estou assim, sinto uma confiança maior do que o normal."
10092-140 = "Q-que foi!? Por que está me encarando desse jeito...?"
10092-150 = "Se quer alguma coisa, é só pedir!"
10092-160 = "Eu deveria ter trazido algo para comer..."
10092-170 = "Professor, tem algo que você queira comer?"
10092-180 = "Eu achava que praticar era definitivamente mais divertido que as aulas, mas..."
10092-190 = "Quando a gente leva a sério, dá um trabalhão também."
10092-200 = "Hm? Está perguntando se eu não estou ocupada com a prática?"
10092-210 = "B-bem, é verdade, mas..."
10092-220 = "Quer dizer, por que perguntou isso do nada!? Fez de propósito, né!? Tentando dizer algo brega!!"
10092-230 = "Happy Birthday to you♪ Happy Birthday to you♪"
10092-240 = "...Por que estou cantando, você pergunta!?"
10092-250 = "Não diga coisas desnecessárias!"
10092-260 = "H-hã? Meu aniversário...?"
10092-270 = "Então você lembrava mesmo, né?"
10092-280 = "Feliz Ano Novo, Professor!"
10092-290 = "Tem alguma música que você queira ouvir?"
10092-300 = "Natal, hein!"
10092-310 = "Q-que foi!? Não é como se eu tivesse idade para acreditar em Papai Noel!"
10092-320 = "É um dia bem agitado, né! Eu não desgosto. Na verdade, queria fazer alguma coisa, sabe?"
10092-340 = "Ufa... ufa... C-consegui... Eu consegui..."
10092-350 = "S-sério...? Você sentiu o mesmo enquanto ouvia?"
10092-360 = "Você não está brincando comigo, né? É... você realmente acha isso?"
10092-370 = "Sinto meu coração... batendo forte..."
10092-380 = "É a primeira vez que sinto algo assim..."
10092-390 = "...Professor... Pensando bem, acho que foi a primeira vez que mostrei isso para você."
10092-400 = "Como posso dizer... é que..."
10092-410 = "...O meu lado... 'maneiro'..."
10092-2600 = "Não importa a situação, você continua sendo o Professor... Entendi. Eu também sou assim, né? Não importa a situação... se precisar de mim, me chame! Eu vou!"
