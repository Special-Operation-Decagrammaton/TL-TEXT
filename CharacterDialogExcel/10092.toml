[translation]
10092-10 = "ブルーアーカイブ～！！"
10092-20 = "期待していいから…いや期待して！\n私の演奏！！"
10092-30 = "結構広いわね…\n演奏するのに\nちょうど良いかも。"
10092-40 = "練習しようと\n思ったのに、\n人が多い…。"
10092-50 = "お腹空いた、どこかに\n甘い物無いかな？"
10092-60 = "ちょっと\n休もうかな…。"
10092-70 = "あれ。\nここに集まるって\n言ってなかった？"
10092-80 = "せ、先生！？\nいつ来たの…！？"
10092-90 = "わ、私？\nれ、練習をちょっと…。"
10092-100 = "ようこそ、先生！"
10092-110 = "も、もしその…その…。"
10092-120 = "BGM…いる？\n演奏、しようか？"
10092-130 = "なんか、こうしてると\nいつもより自信が\n溢れてくるんだよね。"
10092-140 = "な、なに！？\n何でそんなにじっと\n見てくるのよ…？"
10092-150 = "欲しいものがあるなら\n口で言ってよ！"
10092-160 = "何か食べ物でも\n持ってくればよかった…。"
10092-170 = "先生、食べたい物ある？"
10092-180 = "練習の方が授業より絶対\n楽しいと思ってたんだけど、"
10092-190 = "真面目にやると\nこっちも大変なのよね。"
10092-200 = "うん？練習で\n忙しいんじゃないかって？"
10092-210 = "そ、それはそうだけど…。"
10092-220 = "というか、何で急に聞くのよ！？\nわざとでしょ！？\nクサいこと言おうとして！！"
10092-230 = "ハッピーバースデートゥーユー♪ハッピーバースデートゥーユー♪"
10092-240 = "…何で歌うのって！？"
10092-250 = "余計なこといわない！"
10092-260 = "う、ううん？私の誕生日…？"
10092-270 = "やっぱり、覚えてたんだ？"
10092-280 = "あけましておめでとう、先生！"
10092-290 = "聞きたい曲とかある？"
10092-300 = "クリスマスかー！"
10092-310 = "な、何！？別にもう\nサンタを信じるような\n歳じゃないから！？"
10092-320 = "わちゃわちゃな日だね！\n嫌いじゃない。\nむしろ何かしたいわね？"
10092-340 = "ふぅ……ふう…。\n…や、やった…。\nやり遂げたわ…。"
10092-350 = "そ、そう…？\n先生が聴いてた\n感じもそうだった…？"
10092-360 = "ふざけてるんじゃないわよね？\nこれは…本当にそう思ってる？"
10092-370 = "なんか…ドキドキして…。"
10092-380 = "こんなの、初めて…。"
10092-390 = "…先生…。\n思い返して見たら、先生に\n初めて見せたんじゃないかな。"
10092-400 = "なんというか…\nその…。"
10092-410 = "…私の\n「格好いい」姿…\nってやつ…。"
10092-2600 = "どんな状況でも先生は先生なんだね…。\nそっか。私も同じなんだよね？\nどんな状況でも…\n必要なら呼んでよね！私、行くから！"
