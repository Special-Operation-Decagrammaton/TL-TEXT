[translation]
26000-10 = "Blue Archive"
26000-20 = "Quando as provações forem assustadoras, ou quando sentir que vai sucumbir às dificuldades, eu estarei aqui para enfrentá-las com você."
26000-30 = "Está na hora de garantir suprimentos médicos."
26000-40 = "Hum. Bem, não é ruim."
26000-50 = "É um ambiente confortável."
26000-60 = "As condições sanitárias aqui são... excelentes."
26000-70 = "Temperatura corporal normal, pulso estável. Hum. Sem problemas."
26000-80 = "Bem-vindo, Sensei. Há documentos esperando pela sua aprovação."
26000-90 = "O Comitê Disciplinar preza pela ordem. O Schale não deveria ser assim também?"
26000-100 = "Vou lhe contar um segredo meu, mas..."
26000-110 = "Eu também não gosto muito de injeções."
26000-120 = "A estupidez é incurável. Você não sabia disso?"
26000-130 = "Sim? Quer que eu sorria um pouco?"
26000-140 = "...Se for apenas quando estivermos a sós, é possível."
26000-150 = "(...Por enquanto, se eu a fizer desmaiar e aplicar respiração boca a boca...)"
26000-160 = "(Isso não conta...?)"
26000-170 = "Sim? O que estou pensando, você pergunta? ...Não é nada."
26000-180 = "Feliz aniversário, Sensei. Acabou de chegar uma injeção nutritiva perfeita."
26000-190 = "Poderia abaixar as calças...?"
26000-200 = "Não, é só no bumbum!"
26000-210 = "É seu aniversário. Só por hoje, acho que não tem problema se eu monopolizar o Sensei."
26000-220 = "Você... poderia segurar minha mão?"
26000-230 = "Feliz Ano Novo, Sensei. O ano passado foi bem agitado, mas..."
26000-240 = "...Ainda assim, fico feliz que você estivesse lá, Sensei."
26000-250 = "Eu gosto do Natal. Porque a cidade fica cheia de vermelho. Você também gosta de vermelho, Sensei?"
26000-260 = "......Já vou avisando, não é como se eu gostasse de sangue."
26000-270 = "Um presente de Halloween para o Sensei. Aceita um doce? É sem açúcar, então faz bem para a saúde."
26000-290 = "Ah, eu não estava prestando muita atenção, mas..."
26000-300 = "Essa situação, bem, como posso dizer... não é muito boa..."
26000-310 = "Ei, Sensei...? Bem, se você não disser algo, isso..."
26000-320 = "Se o silêncio continuar por muito tempo, acaba ficando estranho..."
26000-330 = "Não, não é como se eu estivesse cobrando algo...! Bem, como eu deveria dizer isso..."
26000-340 = "Nessas horas, o que eu deveria fazer..."
26000-350 = "...Ufa."
26000-360 = "Não... está tudo bem, sim."
26000-370 = "Fufu. Sério, isso é embaraçoso... O que será que é isso?"
26000-380 = "Só de estar com o Sensei, por algum motivo, não consigo agir como sempre..."
26000-390 = "Sério, que situação complicada... em vários sentidos..."
26000-2600 = "A realidade de que é preciso mais poder para tratar mais pessoas é uma ironia nada divertida. Ainda assim, farei o meu melhor... com as capacidades que possuo."
