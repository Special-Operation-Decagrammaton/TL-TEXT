[translation]
26000-10 = "ブルー、アーカイブ"
26000-20 = "試練が怖いとき、苦難に\n負けそうなとき、私が一緒に\n立ち向かってあげましょう。"
26000-30 = "そろそろ医薬品を\n確保しないと。"
26000-40 = "ふむ。まあ、\n悪くはないです。"
26000-50 = "居心地が良いですね。"
26000-60 = "ここの衛生状態は…\n素晴らしいですね。"
26000-70 = "体温平熱、脈拍正常。\nふむ。問題ないですね。"
26000-80 = "ようこそ先生。\n先生の決裁待ちの書類が\nありますよ。"
26000-90 = "風紀委員会は秩序を望みます。\nシャーレもそうではない\nのでしょうか？"
26000-100 = "一つ、私の秘密を\n教えますが…。"
26000-110 = "私も注射はあまり\n好きではありません。"
26000-120 = "バカは治療不可能です。\nご存知なかったですか？"
26000-130 = "はい？少しは笑えと？"
26000-140 = "…二人っきりの時だけなら、\n可能です。"
26000-150 = "(…とりあえず気絶させて\n人工呼吸をすれば…）"
26000-160 = "（それはノーカウント…？)"
26000-170 = "はい？\n何を考えているか、ですか？\n…何でもありません。"
26000-180 = "お誕生日おめでとうございます\n先生。ちょうど良い栄養注射が\n入荷しました。"
26000-190 = "ズボンを下ろしてくださ…？"
26000-200 = "いえお尻だけです！"
26000-210 = "誕生日です。今日だけは、\n先生を独占しても\nよさそうですね。"
26000-220 = "手を…\n握ってくれますか？"
26000-230 = "明けましておめでとう\nございます先生。\n去年はバタバタ\nしてましたけど…。"
26000-240 = "…でも、先生がいてくれて\nよかったです。"
26000-250 = "クリスマスは好きです。\n街に赤の色が増えますから。\n先生も、赤色は好きですか？"
26000-260 = "……言っておきますが、\n別に血が好きというわけでは\nありませんよ。"
26000-270 = "先生にハロウィンのお祝いを。\n飴はいかがですか？\n無糖なので体にいいですよ。"
26000-290 = "あ、あまり\n意識してませんでしたが…。"
26000-300 = "この状況はその、\nあまり良くないと\n言いますか…"
26000-310 = "あの、先生…？\nえっと、何か\n言っていただけないと、その…。"
26000-320 = "あまり沈黙が続くと、\nかえって変な感じに…。"
26000-330 = "いえ、その催促とかでは\nないのですが…！えっと、\n何と言えば良いのでしょうか…。"
26000-340 = "こういう時は、\nどうしたら…。"
26000-350 = "…ふぅ。"
26000-360 = "いえ…\n大丈夫です、はい。"
26000-370 = "ふふっ。本当に、\n困ってしまいます…\n何なんでしょうね、これは。"
26000-380 = "先生と一緒に\nいるというだけで、\n何故かいつも通りでは\nいられなくて…。"
26000-390 = "本当に、困りましたね…\n色々と…。"
26000-2600 = "より多くの人を治療するためには\nもっと多くの力が必要だ、\nという現実は、面白くない皮肉ですね。\nそれでも私の能力でできる限り……\n最善を尽くします。"
