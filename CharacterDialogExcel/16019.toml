[translation]
16019-10 = "Blue Archive."
16019-20 = "Empregada perfeita, reconhecimento perfeito.\nSou Asuma Toki.\nPode ficar tranquilo e deixar tudo comigo."
16019-30 = "O descanso é importante.\nAcho que quatro dias de folga por semana\nseria o ideal."
16019-40 = "Não há um lugar\nonde eu possa\ndescansar o corpo?"
16019-50 = "Cafeína e açúcar são\nindispensáveis."
16019-60 = "A receita deste café...\nestá dentro da média."
16019-70 = "Vamos descansar\npara a próxima missão."
16019-80 = "Hmm..."
16019-90 = "Nnn..."
16019-100 = "Ah!?"
16019-110 = "Sensei, você chegou."
16019-120 = "...Não é isso.\nNão é como se eu estivesse cochilando\npor estar entediada."
16019-130 = "Talvez eu estivesse esperando que o Sensei\nchegasse perto para me acordar..."
16019-140 = "Não tenho segundas intenções\ncomo essa, de verdade."
16019-150 = "Sensei,\nestava à sua espera."
16019-160 = "Então, vamos começar\no trabalho de hoje."
16019-170 = "Limpeza feita, lista de tarefas pronta,\ncafé pronto, doces prontos."
16019-180 = "Está tudo preparado."
16019-190 = "Sim, por favor, me elogie\nrapidamente."
16019-200 = "Pensei seriamente\nsobre hobbies e..."
16019-210 = "Cheguei à conclusão de que basta fazer\no que se acha divertido."
16019-220 = "Por isso, Sensei."
16019-230 = "Quer ler mangá comigo?\nOu talvez jogar?"
16019-240 = "Assistir a uma live também seria bom."
16019-250 = "Renovei meu equipamento, alcançando\nmais leveza e velocidade."
16019-260 = "Mas... às vezes sinto falta\ndo peso e do poder de fogo\nde antes."
16019-270 = "Por que os seres humanos\nnão conseguem estar\nem estado de superposição?"
16019-280 = "...É uma pena."
16019-290 = "Em uma live que vi\nrecentemente,"
16019-300 = "quando comentei sobre\npentes infinitos e pistolas duplas..."
16019-310 = "Recebi um 'curtir' do\nGenryumon da Academia Shanhaijing."
16019-320 = "Por que será...?"
16019-330 = "Às vezes, penso de repente\nsobre o fim do mundo."
16019-340 = "Não tem um significado especial."
16019-350 = "É só que, se esse dia chegasse,\no que eu faria?"
16019-360 = "O que você faria, Sensei?"
16019-370 = "Eu... já decidi\no que farei."
16019-380 = "...Mas não vou contar."
16019-390 = "Acho que é melhor ter\num ou dois segredos."
16019-400 = "Existem muitas coisas importantes\nno reconhecimento, mas..."
16019-410 = "Conhecer o inimigo\ne conhecer a si mesmo"
16019-420 = "garante o sucesso da operação."
16019-430 = "Ou seja, precisamos\nnos entender profundamente."
16019-440 = "...Não entende o que quero dizer?"
16019-450 = "Eu entendo, então\nnão há problema."
16019-460 = "Eu sei."
16019-470 = "Hoje é o dia memorável em que o Sensei\nrealizou seu primeiro reconhecimento\nneste mundo."
16019-480 = "Se houver algum registro\nde reconhecimento, por favor,\nmostre-me também."
16019-490 = "Como protagonista do dia..."
16019-500 = "Exijo um presente\nà altura desta data."
16019-510 = "Isso é..."
16019-520 = "Amor e uma recompensa."
16019-530 = "Feliz Ano Novo."
16019-540 = "Um novo ano da minha vida\ncomeça a partir daqui."
16019-550 = "Então, Sensei."
16019-560 = "Vamos planejar nossas vidas\njuntos."
16019-570 = "O Sensei dar um presente de\nNatal para um aluno..."
16019-580 = "Por isso, eu também\npreparei um presente\npara você."
16019-590 = "Sim. O presente sou eu."
16019-600 = "...Não é uma piada.\nAqui."
16019-610 = "Ouvi dizer que doces e balas\nsão excelentes rações de\ncombate."
16019-620 = "Ou seja, no Halloween, eles\nsão os alimentos mais\npráticos que existem."
16019-630 = "Se o Halloween se encaixa\nnessa situação, você pergunta?"
16019-640 = "Isso é..."
16019-650 = "Porque eu decidi que é."
16019-670 = "Que belo nascer do sol."
16019-680 = "Aqui, podemos observar\nessa paisagem todos os dias."
16019-690 = "Embora, como só estou aqui\nhá alguns dias, meus registros\nsejam limitados..."
16019-700 = "Talvez não seja todos os dias,\nna verdade."
16019-710 = "Sim."
16019-720 = "Mas, daqui, sinto que as cores\nsão completamente diferentes."
16019-730 = "O céu... e a terra brilhando\nem tons de laranja..."
16019-740 = "Eu gosto desse tempo que\npasso compartilhando a\npaisagem com você, Sensei."
16019-750 = "Poder transmitir o que\nmove meu coração neste\nmomento..."
16019-760 = "Este instante só existe\nagora, neste momento."
16019-770 = "E nunca mais voltará."
16019-780 = "Sensei."
16019-790 = "Se o momento "final" chegasse\nagora..."
16019-800 = "Eu gostaria de estar ao seu\nlado para compartilhar esse\ninstante..."
16019-810 = "Posso ser a "última" pessoa\na estar com você?"
16019-2600 = "Mudar de arma exige uma decisão corajosa. É algo tão sério quanto trocar o cardápio do café da manhã de torradas para panquecas. Mas, se for algo que recebi de você, Sensei... a história muda completamente."
