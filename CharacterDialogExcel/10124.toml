[translation]
10124-10 = "Blue Archive."
10124-20 = "Trinity, Comitê de Justiça... não. Saudações formais não combinam com um lugar como este. Sou Hasumi Hanekawa. Mais uma vez, é um prazer conhecê-lo."
10124-30 = "Este traje... é realmente chamativo, não é?"
10124-40 = "Eu deveria fazer dieta neste verão... mas há muitas tentações por aqui..."
10124-50 = "Um descanso adequado aumenta a eficiência do trabalho. Eu sei disso na teoria, mas..."
10124-60 = "Por que será que tudo o que comemos na praia parece ser tão delicioso?"
10124-70 = "Da próxima vez que viermos, talvez devêssemos convidar o pessoal do comitê também."
10124-80 = "Professor, bom trabalho."
10124-90 = "Então, vamos começar as tarefas de hoje."
10124-100 = "Descansar primeiro? De jeito nenhum."
10124-110 = "Bem... depois que terminarmos uma boa parte, talvez possamos sair para caminhar."
10124-120 = "Eu estava esperando, pois sabia que o Professor viria."
10124-130 = "...Sim, eu estava esperando o tempo todo. Como o Professor é uma pessoa íntegra, eu sabia que não quebraria sua promessa."
10124-140 = "Eu também sou assim...?"
10124-150 = "Fufu, é verdade. Talvez você tenha razão."
10124-160 = "Você me chamou?"
10124-170 = "Eh, ser mais relaxada...?"
10124-180 = "Você pede coisas difíceis, não é..."
10124-190 = "Se quiser descansar, prepararei um chá para você."
10124-200 = "Não é nada para se gabar, mas tenho um conhecimento razoável sobre isso."
10124-210 = "Um traje de banho como este..."
10124-220 = "Afinal, não combina comigo, não é..."
10124-230 = "Eh? Bonito...?"
10124-240 = "Professor, você sempre diz essas coisas..."
10124-250 = "O mar é muito perigoso."
10124-260 = "Atividades na água consomem muitas calorias, então fico com fome rapidamente."
10124-270 = "Mar, traje de banho, verão..."
10124-280 = "Embora estejamos fora da rotina, o fato de eu ser um membro do Comitê de Justiça não muda."
10124-290 = "Feliz aniversário, Professor."
10124-300 = "Eu sempre recebo tudo de você e nunca consegui retribuir nada."
10124-310 = "Já que é uma boa oportunidade, você tem algum pedido?"
10124-320 = "Aniversário...?"
10124-330 = "Ah, falando nisso. É verdade."
10124-340 = "...Mesmo que eu tenha esquecido, o Professor se lembrou direitinho."
10124-350 = "Essa consideração... me deixa muito feliz."
10124-360 = "Muito obrigada, de verdade."
10124-370 = "Feliz Ano Novo, Professor."
10124-380 = "Quando nos conhecemos, eu não imaginava que nosso vínculo duraria tanto."
10124-390 = "Além disso, passar o Ano Novo com você vestida assim... é algo inesperado."
10124-400 = "Feliz Natal."
10124-410 = "Professor, se não se importar, gostaria de ir à praia?"
10124-420 = "Nadar no inverno faz bem para a saúde, sabia?"
10124-430 = "Parece que este traje está sendo confundido com uma fantasia. No caminho para cá, as crianças me pediram doces."
10124-440 = "...Eh, até você, Professor!? Bem, é que eu não estou carregando doces agora..."
10124-460 = "Ugh... Hmph! Nnnn..."
10124-470 = "Ah, entrou! Por pouco, mas..."
10124-480 = "Como pode ver!"
10124-490 = "Sem problemas!"
10124-500 = "Nenhum!"
10124-510 = "Se eu perder um pouco mais de peso, ficará no tamanho exato!"
10124-520 = "Está tudo bem!\nEu escolhi este traje de banho!"
10124-530 = "Na verdade, eu prefiro este...!"
10124-2600 = "Desde que entrei para o Comitê de Justiça, o que eu desejo proteger nunca mudou. No entanto... com o passar do tempo, o número de coisas que quero proteger só tem aumentado. Juro por esta arma: enquanto eu estiver viva, não permitirei que ninguém cause mal ao Sensei."
