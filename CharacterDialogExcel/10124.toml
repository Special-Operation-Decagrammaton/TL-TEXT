[translation]
10124-10 = "ブルーアーカイブ。"
10124-20 = "トリニティ総合学園、正義実現委員……いえ。このような場に、堅苦しい挨拶は不釣り合いですね。羽川ハスミです。改めまして、よろしくお願いいたします。"
10124-30 = "この格好は……\nさすがに\n目立ちますね。"
10124-40 = "この夏こそダイエットを……とはいえ、\nここには誘惑が\n多すぎますね……。"
10124-50 = "適切な休息こそが、仕事の効率を上昇させる。\n頭では分かって\nいるのですが……。"
10124-60 = "海で食べるものを\n何でも美味しく\n感じてしまうのは……\nなぜなのでしょう？"
10124-70 = "今度来るときは、\n委員会の皆さんも\nお誘いしましょうか。"
10124-80 = "先生、お疲れ様です。"
10124-90 = "では、本日の業務を\n始めましょう。"
10124-100 = "休憩してから？\nダメです。"
10124-110 = "そうですね……\nある程度進めたら、\n散歩にでも行きましょうか。"
10124-120 = "先生がいらっしゃると思い、\n待機しておりました。"
10124-130 = "……ええ、ずっと\nお待ちしておりました。\n先生は誠実な方ですから、\n約束を違えることはないと\n思っておりますので。"
10124-140 = "私も同じ……？"
10124-150 = "ふふ、そうですね。\nそうかもしれません。"
10124-160 = "お呼びですか？"
10124-170 = "え、もっと気楽に……？"
10124-180 = "難しいことを仰いますね……。"
10124-190 = "休憩でしたら、\nお茶をご用意しますよ。"
10124-200 = "自慢するほどではありませんが、\nそれなりに知識はありますので。"
10124-210 = "このような水着……。"
10124-220 = "やはり私には\n似合わないですよね……。"
10124-230 = "え？かわいい……？"
10124-240 = "先生はまた、そうやって……。"
10124-250 = "海はとても危険です。"
10124-260 = "水中での活動は\nカロリー消費が高く、\nすぐにお腹が減って\nしまいますから。"
10124-270 = "海、水着、夏……。"
10124-280 = "非日常の中ではありますが、\n私が正義実現委員会の\n一員であることは揺るぎません。"
10124-290 = "お誕生日おめでとうございます、\n先生。"
10124-300 = "いつも私がいただいてばかりで、\nなんのお返しも\nできていませんでしたね。"
10124-310 = "いい機会ですし、\n何かご要望はありますか？"
10124-320 = "誕生日……？"
10124-330 = "あ、そういえば。\nそうでしたね。"
10124-340 = "……私が忘れてしまっていても、\n先生はちゃんと\n覚えていてくださる。"
10124-350 = "その気遣いが……\nとても嬉しいです。"
10124-360 = "本当に、\nありがとうございます。"
10124-370 = "明けまして\nおめでとうございます、先生。"
10124-380 = "お会いしたばかりの頃は、\nここまでご縁が続くものだとは\n思っていませんでした。"
10124-390 = "それに、こんな格好で新年を\nご一緒するようになるなんて……\n分からないものですね。"
10124-400 = "メリークリスマス、です。"
10124-410 = "先生、もしよろしければ\n海に行きませんか？"
10124-420 = "寒中水泳は健康に良いんですよ。"
10124-430 = "この格好、\n仮装だと思われるようで。\n来る途中、子供たちにお菓子を\nねだられてしまいました。"
10124-440 = "……えっ、先生まで！？\nその、今はお菓子を\n持ち歩いてなくて……。"
10124-460 = "くぅ……\nふんっ！ぬぬぬ……。"
10124-470 = "はっ、入りました！\nギリギリ、ですが……。"
10124-480 = "ご覧の通り！"
10124-490 = "何の問題も！"
10124-500 = "ございません！"
10124-510 = "もう少し体を絞れば、\nジャストサイズになります！"
10124-520 = "大丈夫です！\n水着はこれにします！"
10124-530 = "むしろ、これが良いんです……！"
10124-2600 = "正義実現委員会に入ってから、私の守りたいものはずっと変わりません。ですが……そのうちに、守りたい対象がどんどん増えているのです。この銃に誓いましょう。私の眼が黒いうちは、誰であろうと、先生に危害を加えることは許さない、と。"
