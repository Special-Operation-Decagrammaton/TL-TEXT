[translation]
20039-10 = "ブルーアーカイブ、じゃ。"
20039-20 = "山海経高級中学校、玄龍門の門主。竜華キサキじゃ。\nふふ。妾の力が必要かの？"
20039-30 = "ふむ……香の\n置き場は……。"
20039-40 = "（山海経の外は…\n本当に多種\n多様じゃな）"
20039-50 = "一服するのに\nよさそうな\n場所じゃな…。"
20039-60 = "（あれは…\n何じゃ…？）"
20039-70 = "ふふ……此処は\n居心地が良いのう。"
20039-80 = "来たかの、先生。\nふふ、玄龍門の門主を\n待たせるとはいい度胸じゃ。"
20039-90 = "待っておったぞ。先生。"
20039-100 = "力で人は治められぬ。\n心を無くしてしまうからの。"
20039-110 = "何ぞ用でもあるかの？ふむ…\n声をかけてみただけ、と？"
20039-120 = "ふふ。其方はイタズラが\n好きなのじゃな。構わぬ、\n妾もよくやるからの。"
20039-130 = "山海経の外に\n出るのは久々じゃ。"
20039-140 = "だって……此処には\n其方がおるじゃろう？"
20039-150 = "時がこのまま\n止まってしまえばいい、\nそう思ったことは\nないかの？先生。"
20039-160 = "妾はあるぞ。\nいま、そう思っておる。"
20039-170 = "香をたいてみたのじゃ。\n不思議な香りがするじゃろう？"
20039-180 = "一服いかがかな？"
20039-190 = "疲れたのであれば\n共に眠ればよい…\nそうじゃろう？"
20039-200 = "忘れるはずがない。\nああ覚えているとも。"
20039-210 = "ほれ、早く支度するのじゃ。\n山海経流の最高のもてなしを\nご覧に入れよう。"
20039-220 = "……そうか、覚えていたか。"
20039-230 = "礼を言う、先生。\n多くの者から祝福されるが……"
20039-240 = "其方からの言葉を\n一番嬉しく思っておるぞ。"
20039-250 = "ふふ。あけまして\nおめでとう、じゃな。"
20039-260 = "ふむ？これは先生が\n渡すべきもの、じゃと……？"
20039-270 = "……。"
20039-280 = "そうじゃったな！"
20039-290 = "クリスマス……そうじゃな、\n穏やかな日を過ごしてくれ。"
20039-300 = "ハロウィーン、か？\n詳しくは知らぬが……"
20039-310 = "ほれ、カボチャと\nナツメの料理じゃ。\n其方と一緒に\n食べたいと思ってな。"
20039-330 = "ふふ……ようやくこちらを\n見てくれたかの。"
20039-340 = "じゃが、先生。\n一度考えてみてくれぬか？"
20039-350 = "妾は今、弱っているのかも\nしれぬが……"
20039-360 = "弱ったふりを\nしているだけかもしれぬ。"
20039-370 = "あるいは……先生の出方を\n伺っているだけなのやも。"
20039-380 = "単に――其方を心から\n信じているだけかも\nしれぬしな？"
20039-390 = "だが……そうじゃな、\nこれだけは確約できる。"
20039-400 = "此処で何が起こったとて……"
20039-410 = "妾が其方を責めることは\n無いじゃろう。……永劫にな。"
20039-2600 = "ご苦労じゃった、先生。\nふふ、妾が言うのものでは\nないのかもしれぬが……\n心より感謝しておる。\n妾のすべてを懸けて、大切にしよう。"
