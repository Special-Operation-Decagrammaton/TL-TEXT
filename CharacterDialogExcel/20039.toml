[translation]
20039-10 = "Blue Archive, é isso."
20039-20 = "Sou Kisaki Ryuge, a líder da Genryumon da Escola Secundária Shanhaijing.\nFufu. Precisa da minha força?"
20039-30 = "Hum... Onde devo colocar... o incenso?"
20039-40 = "(O mundo fora de Shanhaijing é... realmente muito diverso, não é?)"
20039-50 = "Este parece ser um bom lugar... para descansar um pouco."
20039-60 = "(O que é... aquilo...?)"
20039-70 = "Fufu... Este lugar é bem confortável."
20039-80 = "Você veio, Sensei.\nFufu, tem coragem de deixar a líder da Genryumon esperando, hein?"
20039-90 = "Eu estava te esperando, Sensei."
20039-100 = "Não se governa pessoas pela força. Pois assim, elas perdem o coração."
20039-110 = "Precisa de algo? Hum... Só queria me cumprimentar?"
20039-120 = "Fufu. Você gosta de pregar peças, não é? Não me importo, eu também faço isso com frequência."
20039-130 = "Faz tempo que não saio de Shanhaijing."
20039-140 = "Porque... você está aqui, não está?"
20039-150 = "Você nunca desejou que o tempo parasse exatamente assim, Sensei?"
20039-160 = "Eu desejei. E, neste momento, estou desejando."
20039-170 = "Acendi um incenso. Sente esse aroma peculiar?"
20039-180 = "Gostaria de descansar um pouco?"
20039-190 = "Se estiver cansado, podemos dormir juntos... não acha?"
20039-200 = "Eu jamais esqueceria. Ah, eu me lembro, sim."
20039-210 = "Vamos, prepare-se logo. Vou lhe mostrar a melhor hospitalidade ao estilo de Shanhaijing."
20039-220 = "......Entendo, você se lembrava."
20039-230 = "Agradeço, Sensei. Recebo bênçãos de muitas pessoas, mas..."
20039-240 = "As suas palavras são as que mais me alegram."
20039-250 = "Fufu. Feliz Ano Novo, então."
20039-260 = "Hum? Isso é algo que o Sensei deveria me entregar...?"
20039-270 = "......"
20039-280 = "É verdade!"
20039-290 = "Natal... entendo, espero que tenha um dia tranquilo."
20039-300 = "Halloween, é? Não sei muito sobre isso, mas..."
20039-310 = "Aqui, preparei um prato de abóbora com tâmara. Queria comer com você."
20039-330 = "Fufu... Finalmente olhou para mim."
20039-340 = "Mas, Sensei. Você poderia pensar um pouco sobre isso?"
20039-350 = "Talvez eu esteja fragilizada agora..."
20039-360 = "Ou talvez eu esteja apenas fingindo estar."
20039-370 = "Ou talvez... eu esteja apenas observando qual será o seu próximo passo."
20039-380 = "Ou simplesmente... talvez eu apenas confie em você de todo o meu coração."
20039-390 = "Mas... é verdade, posso garantir uma coisa."
20039-400 = "Não importa o que aconteça aqui..."
20039-410 = "Eu jamais o culparei. ...Por toda a eternidade."
20039-2600 = "Bom trabalho, Sensei. Fufu, talvez não caiba a mim dizer isso, mas... agradeço do fundo do meu coração. Vou dedicar tudo o que tenho para cuidar disso."
