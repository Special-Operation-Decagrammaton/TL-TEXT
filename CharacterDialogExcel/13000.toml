[translation]
13000-10 = "Blue Archive."
13000-20 = "Prometo oferecer o melhor dos serviços,\ncomo forma de saudação\nao meu mestre."
13000-30 = "Este lugar está bem\nlimpo, não é?\nCom certeza deve haver uma\nempregada competente de prontidão."
13000-40 = "Dieta, é?...\nHouve uma época em que\neu também me preocupava\ncom isso. Fufu."
13000-50 = "Seja muito bem-vindo.\nPosso preparar uma xícara\nde chá quente para você?"
13000-60 = "Mestre, Sensei, ou talvez... querido?\nFufu.\nComo você prefere\nque eu o chame?"
13000-70 = "Ora. Isso era algo que\neu deveria ter feito...\nAgora estou ainda mais motivada.\nMes-tre."
13000-80 = "Bem-vindo de volta, mestre.\nObrigada pelo seu trabalho hoje."
13000-90 = "Aceita um pouco de chá?\nAcabamos de receber\nas melhores folhas."
13000-100 = "Sim. Eu já organizei\nos documentos.\nDeixe comigo."
13000-110 = "Deseja alguma coisa?\nResponderei com\no melhor dos serviços."
13000-120 = "Uma carta chegou."
13000-130 = "Ora, que caligrafia adorável."
13000-140 = "Que tal se eu\nlesse para você?"
13000-150 = "Talvez não seja um desejo\nmuito elegante.\nMas, mestre."
13000-160 = "Continue chamando\na Akane sempre."
13000-170 = "Feliz aniversário,\nmestre."
13000-180 = "O fato de você ter vindo\naqui, mestre..."
13000-190 = "...me deixa feliz."
13000-200 = "O nascimento é uma bênção."
13000-210 = "Desde o momento em que\nconheci você, mestre,\neu sempre fui grata\npor isso."
13000-220 = "Feliz Ano Novo～～."
13000-230 = "Conto com você para este\nnovo ano também, mestre!"
13000-240 = "Feliz Natal~."
13000-250 = "O meu presente para você\né o melhor dos serviços\ne o meu sorriso."
13000-260 = "Qual é o presente\ndo Sensei?"
13000-270 = "Vamos lá. Se não me der um doce,\nvou fazer uma travessura~?"
13000-280 = "Embora, pessoalmente, eu prefira\nas travessuras."
13000-300 = "Ora. Bem-vindo de volta."
13000-310 = "Como foi o seu dia hoje?"
13000-320 = "Ah, mestre. Acabamos de receber\nas melhores folhas de chá."
13000-330 = "Posso preparar uma xícara\npara você?"
13000-340 = "Sim? Você disse que aqui\nnão é a nossa casa?"
13000-350 = "Fufu.\nNão me importo."
13000-360 = "Mesmo que não seja a nossa casa,\nnós estamos juntos\nagora, não estamos?"
13000-2600 = "Ser esperada por alguém... é algo que faz o coração palpitar tanto assim, não é?\nAkane responderá ao mestre com o melhor dos serviços."
