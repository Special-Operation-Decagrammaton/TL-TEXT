[translation]
20024-10 = "ブルー、アーカイブ。"
20024-20 = "ごきげんよう。\nトリニティ総合学園、ティーパーティーの\nホストを務めております桐藤ナギサと申します。微力な\nがら先生のお役に立てるよう尽力してまいります。"
20024-30 = "ふふっ。\nごきげんよう。"
20024-40 = "コーヒーの香りも…\nたまには、\nいいものですね。"
20024-50 = "(ここは大勢の生徒が\n集う場。より一層、気を\n引き締めねば……)"
20024-60 = "あら、なんて可愛らしい\nお茶菓子なのでしょう。"
20024-70 = "（ここの椅子は\nずいぶんと\n柔らかそうですね）"
20024-80 = "ごきげんよう、先生。"
20024-90 = "少し遅くなるようでしたので、\nお茶を淹れて\nお待ちしておりました。"
20024-100 = "おかえりなさい、先生。"
20024-110 = "よろしければ、\n業務を始める前に\n紅茶はいかがですか？"
20024-120 = "ふふ。\n今日もいいお天気ですね。"
20024-130 = "日課が終わりましたら、\nお散歩でもいかがでしょう？"
20024-140 = "あら？茶器を温める\nウォーマーは、一体どこに……"
20024-150 = "あ……。"
20024-160 = "業務に集中していると、\nここがシャーレの執務室である\nことをつい忘れてしまいます……"
20024-170 = "失礼いたしました。"
20024-180 = "シャーレの執務室は\nティーパーティーと違って\n人目が少なく、落ち着きますね。"
20024-190 = "トリニティ生の模範となる\nためには、日頃から人目を\n意識をすることが大切です。"
20024-200 = "(なんだか……\n安心したからか、\n眠くなってきました……)"
20024-210 = "ティーパーティーの業務は\nデスクワークが多いですから、\n椅子選びが重要なのです。"
20024-220 = "よろしければ先生も、\nシャーレに新しい\n椅子を買ってみては？"
20024-230 = "お誕生日\nおめでとうございます、\n先生。"
20024-240 = "特別な茶葉を\nご用意いたしました。"
20024-250 = "業務を終えられましたら、\nトリニティのテラスに\nいらしてください。"
20024-260 = "お誕生日プレゼント\n……ですか？"
20024-270 = "ええと、\n特別なにか欲しい物は\nありませんが……。"
20024-280 = "先生と一日を共に\n過ごせるのなら、\nそれ以上の贈り物はありません。"
20024-290 = "あけまして\nおめでとうございます。"
20024-300 = "今年も変わらぬご指導を、\nよろしくお願いいたします。"
20024-310 = "……今年もあと少しで\n終わりますね。"
20024-320 = "先生、クリスマスケーキは\n召し上がりましたか？"
20024-330 = "もし、まだでしたら「クリスマス\nプリン」を用意しましたので、\nご一緒にいかがですか？"
20024-340 = "これはミカさんから頂いた\nハロウィーン限定パンプキン\nティーなのですが……"
20024-350 = "味が少し、\n妙です……。"
20024-360 = "……え？\nパンプキンティーではなく…\nパンプキンスープペースト……？"
20024-370 = "ミ—カ—さーんー！"
20024-390 = "ふふっ……ほのかに香る\nベルガモットの風味が、\n爽やかで良いですね。"
20024-400 = "（……これは、やはり昆布……\n誤魔化しようのない\n香りがしますね……）"
20024-410 = "このすっきりとした後味が、\nお茶菓子にとても\nよく合いますね……。"
20024-420 = "（昆布の出汁が強すぎて、\n口内でお菓子の\n味と喧嘩を……）"
20024-430 = "……？先生にとっても\n初めての味わいでしたか？"
20024-440 = "そ、そうでしょうね……\nあまり手に入らないタイプの\n茶葉ですし……ふ、ふふ……。"
20024-450 = "（……バレてませんよね？\n香りはちょっとアレですが、\n色はそれっぽいですし……）"
20024-460 = "（こうなると分かっていたら、\n無理をせずに普通の紅茶を\n頼んでおけば……）"
20024-2600 = "この拳銃は小さいですから、お茶を淹れる\n際の邪魔にならず愛用しておりました。\nですが、護身にはあまり向いていないのかも\nしれません。もしもの時は……\nよろしくお願い致しますね、先生。"
