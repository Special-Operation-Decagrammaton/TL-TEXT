[translation]
20024-10 = "Blue Archive."
20024-20 = "Saudações.\nSou Kirifuji Nagisa, anfitriã do Chá das Cinco da Academia Trinity. Farei o meu melhor para ser útil ao Sensei, mesmo que com meus esforços limitados."
20024-30 = "Fufu.\nSaudações."
20024-40 = "O aroma do café também...\nÀs vezes, é algo\nmuito bom."
20024-50 = "(Este é um lugar onde muitos alunos se reúnem. Devo ficar ainda mais atenta...)"
20024-60 = "Ora, que doces de chá\nmais adoráveis."
20024-70 = "(Esta cadeira parece\nser bem\nconfortável.)"
20024-80 = "Saudações, Sensei."
20024-90 = "Como parecia que você ia se atrasar,\npreparei um chá\ne fiquei esperando."
20024-100 = "Bem-vindo de volta, Sensei."
20024-110 = "Se não se importar,\nque tal um chá\nantes de começarmos o trabalho?"
20024-120 = "Fufu.\nO dia está lindo hoje também."
20024-130 = "Quando terminar suas tarefas,\nque tal darmos uma caminhada?"
20024-140 = "Ora? Onde será que foi parar\no aquecedor de bule..."
20024-150 = "Ah..."
20024-160 = "Quando me concentro no trabalho,\nacabo esquecendo que este é\no escritório do Schale..."
20024-170 = "Peço perdão."
20024-180 = "O escritório do Schale é mais calmo\nque o Chá das Cinco,\npois há menos pessoas por perto."
20024-190 = "Para ser um exemplo para os alunos de Trinity,\né importante estar sempre consciente\nde que estamos sendo observados."
20024-200 = "(Talvez por me sentir...\nsegura, estou começando\na ficar com sono...)"
20024-210 = "O trabalho do Chá das Cinco\nenvolve muita papelada,\nentão a escolha da cadeira é essencial."
20024-220 = "Se quiser, Sensei,\npor que não compra uma cadeira\nnova para o Schale?"
20024-230 = "Feliz\naniversário,\nSensei."
20024-240 = "Preparei um tipo\nespecial de folha de chá."
20024-250 = "Quando terminar seu trabalho,\npor favor, venha até o terraço\nde Trinity."
20024-260 = "Um presente de\naniversário...?"
20024-270 = "Bem,\nnão há nada em especial\nque eu queira, mas..."
20024-280 = "Se eu puder passar o dia\ncom você, Sensei,\nnão há presente maior que esse."
20024-290 = "Feliz\nAno Novo."
20024-300 = "Conto com sua orientação\ncontínua este ano também."
20024-310 = "...O ano está quase\nacabando, não é?"
20024-320 = "Sensei, você já comeu\no bolo de Natal?"
20024-330 = "Se ainda não, preparei um \"pudim\nde Natal\", gostaria de\ncomer comigo?"
20024-340 = "Este é um chá de abóbora\nedição limitada de Halloween\nque ganhei da Mika-san, mas..."
20024-350 = "O sabor está um pouco,\nestranho..."
20024-360 = "...Hã?\nNão é chá de abóbora, mas sim...\npasta de sopa de abóbora...?"
20024-370 = "Mika-saaaan!"
20024-390 = "Fufu... o aroma suave\nde bergamota é\nrefrescante e agradável."
20024-400 = "(...Isso é, sem dúvida, alga kombu...\nO aroma é impossível\nde disfarçar...)"
20024-410 = "Este retrogosto refrescante\ncombina muito bem\ncom os doces..."
20024-420 = "(O caldo de kombu é forte demais,\ne está brigando com o sabor\ndo doce na minha boca...)"
20024-430 = "...? Foi um sabor novo\npara você também, Sensei?"
20024-440 = "B-bem, imagino que sim... É um tipo\nde folha de chá difícil de encontrar,\nafinal... fu, fufu..."
20024-450 = "(...Ele não percebeu, percebeu?\nO aroma é um pouco peculiar, mas\na cor parece correta...)"
20024-460 = "(Se eu soubesse que seria assim,\nteria pedido um chá comum\nsem me esforçar tanto...)"
20024-2600 = "Como esta pistola é pequena, eu a usava com frequência por não atrapalhar na hora de servir o chá. Mas talvez ela não seja muito adequada para autodefesa. Se algo acontecer... conto com você, Sensei."
