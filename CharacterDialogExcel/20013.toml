[translation]
20013-10 = "ブルーアーカイブ。"
20013-20 = "ヴェリタスの副部長、各務チヒロ。\nもしうちの子たちが問題を起こしたら、\nすぐに私に知らせて。"
20013-30 = "何だか、また\nうちの子たちが\nやらかしたらしいね……"
20013-40 = "んっ……流石に、\n徹夜をすると\n少し疲れる。"
20013-50 = "あれ……\nもしかしてこれ、\nまたサーバーが\n爆発した……？"
20013-60 = "（ここ、コーヒーとか\n売ってないのかな）"
20013-70 = "（このセキュリティ\nレベルだと…… まあ\n10秒あれば十分かな）"
20013-80 = "おはよ、先生。\n今日も忙しそうだね。"
20013-90 = "先生、離席する時は\nスクリーンセーバーを\n忘れないように。"
20013-100 = "誰かが悪意をもって、\n先生の個人情報を\n奪おうとしたらどうするの？"
20013-110 = "知識は自由であるべき……。\n良い言葉だけど、\n重みのある言葉だよね。"
20013-120 = "ヴェリタスは、\nただの変わり者たちの\n遊び場じゃない。"
20013-130 = "セミナーとかに情報を\n独占されないように……\nそれを目的にして\n設立された組織なんだ。"
20013-140 = "まあ、その結果集まった\nメンバーが変わり者\nばっかりなのは、\n否定しないけど……。"
20013-150 = "できれば、私の前で\nヴェリタスのことを\n「トラッカーズ」って呼ぶのは、\nやめてほしい……。"
20013-160 = "ヒマリの考えてることは、\n私にも全部は分からないよ。"
20013-170 = "先生の情報を手に入れようと、\n色々とハッキングしてくる\n生徒たちが\nいるみたいだね……。"
20013-180 = "二人……いや、三人？\nもしかしたら\nもっといるかも……。"
20013-190 = "誕生日おめでとう、先生。\n今日も明日も、\n先生の幸せな日常が\n守られますように。"
20013-200 = "……え？\nあっ……今日、\n私の誕生日か。"
20013-210 = "どうも普段から、誰かの\n情報を気にしてばっかりでね……\n自分の情報が抜けてたのは\nちょっと恥ずかしいな。"
20013-220 = "明けましておめでとう、先生。\n新年を迎えたことだし、\n溜まったデータの整理でも\n一緒にどう？"
20013-230 = "クリスマスイブの\nカフェはのんびりしてて、\n徹夜作業にピッタリ。"
20013-240 = "ハロウィンだからって、\n別に自分でペイントとかは\nしないけど……"
20013-250 = "まあ、放っておいても\nマキが勝手に描きに来るから。"
20013-260 = "……ふふっ、可愛いよね。"
20013-280 = "ふふっ、やっぱり\nひと仕事終えた後のコーヒーは\n格別だね。"
20013-290 = "……ん？\nカフェとかだと思った？"
20013-300 = "ごめんね。こんな時間だから\nもうどこもやってないし、\nここぐらいしか飲めるところが\n無くってさ。"
20013-310 = "私、いつも徹夜明けはここで、\nコーヒーを飲むことにしてて。"
20013-320 = "この自販機はこんな時間でも、\n誰にも見られてなくても、\n淡々ときちんと\n自分の役目を果たしてる。"
20013-330 = "何だかそういうところが、\n自分の役目に\n重なってるような気がして……。"
20013-340 = "……先生も、\nこのコーヒーの味が\n分かってくれたら、\n嬉しいな。"
20013-2600 = "ホワイトハッカーにとっても、\n銃は必需品。\n例えば、そうだね……\n失礼なクライアントがいた時とか……。"
