[translation]
20013-10 = "Blue Archive."
20013-20 = "Sou a vice-presidente da Veritas, Chihiro Kagami.\nSe as minhas crianças causarem algum problema,\nme avise imediatamente."
20013-30 = "Parece que as minhas crianças\nfizeram besteira\nde novo..."
20013-40 = "Hum... honestamente,\nficar acordada a noite toda\ndeixa a gente um pouco cansada."
20013-50 = "Ué...\nSerá que o servidor\nexplodiu de novo...?"
20013-60 = "(Será que não vendem\ncafé por aqui?)"
20013-70 = "(Com esse nível de segurança...\nBem, 10 segundos seriam o suficiente.)"
20013-80 = "Bom dia, Sensei.\nParece que você está ocupado hoje também."
20013-90 = "Sensei, não se esqueça de ativar\no protetor de tela\nquando se ausentar."
20013-100 = "O que você faria se alguém, com más intenções,\ntentasse roubar suas informações pessoais?"
20013-110 = "O conhecimento deve ser livre...\nÉ uma frase bonita,\nmas tem um peso enorme, não é?"
20013-120 = "A Veritas não é apenas\num parquinho para\npessoas excêntricas."
20013-130 = "Foi uma organização fundada\ncom o objetivo de impedir que\no Seminar monopolizasse\nas informações..."
20013-140 = "Bem, não vou negar que os membros\nque acabaram se reunindo aqui\nsão todos uns excêntricos..."
20013-150 = "Se possível, eu gostaria que você\nparasse de chamar a Veritas\nde 'Trackers' na minha frente..."
20013-160 = "Nem eu consigo entender\ntudo o que a Himari está pensando."
20013-170 = "Parece que tem algumas alunas\ntentando hackear várias coisas\npara conseguir informações\nsobre você, Sensei..."
20013-180 = "Duas... não, três?\nTalvez até\ntenha mais..."
20013-190 = "Feliz aniversário, Sensei.\nQue o seu dia a dia seja protegido,\nhoje e amanhã."
20013-200 = "...Hã?\nAh... hoje é\no meu aniversário?"
20013-210 = "É que eu passo tanto tempo cuidando\ndas informações dos outros...\nÉ um pouco vergonhoso ter esquecido\nque hoje era o meu dia."
20013-220 = "Feliz Ano Novo, Sensei.\nJá que o ano começou, que tal\norganizarmos os dados acumulados\njuntos?"
20013-230 = "O café na véspera de Natal\né bem tranquilo, perfeito\npara trabalhar a noite toda."
20013-240 = "Só porque é Halloween,\nnão significa que eu vá\nme pintar ou algo do tipo..."
20013-250 = "Bem, mesmo que eu não faça nada,\na Maki vem aqui e desenha sozinha."
20013-260 = "...Fufu, é fofo, não é?"
20013-280 = "Fufu, o café depois de terminar\num trabalho é realmente\nespecial."
20013-290 = "...Hum?\nVocê achou que era um café?"
20013-300 = "Desculpe. É uma hora dessas,\nnão tem mais nada aberto,\ne este é o único lugar\nonde dá para beber algo."
20013-310 = "Eu sempre tomo café aqui\ndepois de virar a noite."
20013-320 = "Essa máquina de venda automática,\nmesmo a essa hora, sem ninguém olhando,\ncumpre seu papel\nde forma calma e correta."
20013-330 = "Sinto que esse lado dela\nse sobrepõe ao\nmeu próprio papel..."
20013-340 = "...Eu ficaria feliz se você,\nSensei, também pudesse\napreciar o sabor deste café."
20013-2600 = "Para um hacker ético, a arma\ntambém é um item essencial.\nPor exemplo, digamos...\npara quando aparece um cliente mal-educado..."
