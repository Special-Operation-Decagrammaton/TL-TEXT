[translation]
10134-10 = "Blue Archive!"
10134-20 = "Alice, indo nessa!"
10134-30 = "Isso... é idêntico à Kei!"
10134-40 = "Alice está começando a ficar... um pouquinho com sono..."
10134-50 = "Esta é uma área proibida para PK!"
10134-60 = "(Escaneamento concluído. Reação hostil... nenhuma)"
10134-70 = "Onde será que está o carregador?"
10134-80 = "Hehehe, a Alice já sabia que o Sensei viria."
10134-90 = "Porque o sistema de interceptação automática da Alice reagiu."
10134-100 = "Sensei, eu estava esperando por você!"
10134-110 = "Está tudo bem!"
10134-120 = "A Alice pode esperar o quanto for preciso!"
10134-130 = "O método de voo deste traje parece um pouco com um jogo que a Alice jogou antes."
10134-140 = "Mas, diferente dos jogos, a realidade é em primeira pessoa, então é muito confuso...!"
10134-150 = "A Alice também quer ver em visão de TPS!"
10134-160 = "Sensei? Aconteceu alguma coisa?"
10134-170 = "Ah! Você estava vendo, né?"
10134-180 = "Isso mesmo, a Alice entrou pela janela agora pouco!"
10134-190 = "Neste modo, a Alice possui atributo de luz e atributo de voo!"
10134-200 = "...Eh? Você quer que eu entre pela porta normalmente porque é perigoso?"
10134-210 = "Este equipamento é instável, então precisa de manutenção periódica."
10134-220 = "Mas não se preocupe!"
10134-230 = "A Himari-senpai, a Rio-senpai e até a Utaha-senpai..."
10134-240 = "Disseram que eu posso trazer para elas a qualquer momento!"
10134-250 = "Só que... se eu pedir para uma, as outras duas ficam de mau humor..."
10134-260 = "O que a Alice deve fazer..."
10134-270 = "Uuuuu...!"
10134-280 = "Uuu... as asas são grandes e eu acabo batendo em tudo."
10134-290 = "Como será que as pessoas que têm asas fazem no dia a dia?"
10134-300 = "Das pessoas que a Alice conhece, a que tem as maiores asas é..."
10134-310 = "Ah! Depois vou perguntar para a Presidente do Comitê Disciplinar!"
10134-320 = "A Kei me disse: 'Se você ficar só jogando, uma hora vai acabar virando a Momoi'..."
10134-330 = "O que isso significa?"
10134-340 = "A Alice ama a Momoi, então... eu quero ser como a Momoi!"
10134-350 = "...A-até você, Sensei, por que está com essa reação? É igual à da Kei!"
10134-360 = "Sensei, feliz aniversário!"
10134-370 = "O aniversário do Sensei é o dia em que o Sensei nasceu, né."
10134-380 = "É estranho pensar que existiu um tempo em que o Sensei ainda não existia..."
10134-390 = "Hehehe, Sensei, você se lembra?"
10134-400 = "Hoje é o dia em que a Alice e o Sensei... o dia em que a Alice conheceu todo mundo!"
10134-410 = "A Alice não se lembra de quando nasceu..."
10134-420 = "Mas hoje, com certeza, é o aniversário da Alice!"
10134-430 = "Sensei, feliz ano novo!"
10134-440 = "É uma pena, mas... a Alice não poderá acompanhar você na jornada daqui para frente."
10134-450 = "Este ano, eu prometi ver o primeiro nascer do sol com meus amigos no jogo online,"
10134-460 = "então vou passar a noite em claro jogando..."
10134-470 = "Eh...? Você vai sair agora?"
10134-480 = "Uuuu! N-não pode ser...!"
10134-490 = "Ta-dã!"
10134-500 = "Hoje a Alice vai mudar de classe para Papai Noel!"
10134-510 = "No lugar do Papai Noel, que está ocupado,\nnós vamos voar pelo céu\ne entregar presentes\npara todo mundo!"
10134-520 = "Ah, mas aí eu vou acabar\nficando longe do Sensei...\nHmm."
10134-530 = "...Ah!\nSensei, por favor, seja\no Rudolph, a rena!"
10134-540 = "Uaaah!\nSensei, me ajude!"
10134-550 = "Tem um monte de gente vindo\ne pedindo para tirar\nfotos comigo!"
10134-560 = "Alice não está usando\nfantasia, mas mesmo assim!"
10134-580 = "Hehehe.\nSensei, você ficou surpreso?"
10134-590 = "Eu queria ver este céu noturno\njunto com o Sensei...\nPor isso te chamei."
10134-600 = "É tão...\nLindo, não é?"
10134-610 = "No mundo da Alice,\ne em mundos que ainda\nnão visitamos..."
10134-620 = "Eu tenho certeza de que existem\nmuitas coisas lindas assim."
10134-630 = "Mas... é estranho."
10134-640 = "O mundo é tão lindo assim...\nEntão por que as pessoas\nbrigam entre si?"
10134-650 = "Assim como aquele céu estrelado, este mundo\nestá transbordando de coisas belas,\no suficiente para que todos\npossam compartilhar..."
10134-660 = "...É, a Alice\nainda não entende."
10134-2600 = "A espada de luz sempre\nme mostrou o caminho a seguir.\nÉ... exatamente\ncomo o Sensei!"
