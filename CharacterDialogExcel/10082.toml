[translation]
10082-10 = "Blue Archive!"
10082-20 = "Fuwa Renge, Capitã de Ataque da Hyakkaryouran, da Academia Aliada Hyakkiyako, apresentando-se para o dever! Sensei, digo, Mestre, darei tudo de mim para te ajudar e também nas \"atividades da juventude\"! Conto com você!"
10082-30 = "U-Uau... isso é...\nTodo mundo aqui tá\naproveitando a \"juventude\" ao máximo...\nEntão essa é... a Schale..."
10082-40 = "Hmm, que tipo de\n\"atividade da juventude\"\ndevemos fazer a seguir...?"
10082-50 = "Será que a Yukari\ntá se comportando\ndireitinho...?"
10082-60 = "Que lugar confortável~\nQueria que a sala do nosso clube\nfosse assim também..."
10082-70 = "Se tiver algum aluno problemático...\nEu mesma vou dar um jeito\nna atitude dele."
10082-80 = "Oh, Sensei.\nTrabalhando na Schale de novo hoje?"
10082-90 = "Eu te ajudo!"
10082-100 = "Espera aí!\nVocê não pode ficar matando serviço, Sensei!"
10082-110 = "Eu tô de olho,\nentão vê se leva o trabalho a sério."
10082-120 = "Você também passa por poucas e boas, né, Sensei."
10082-130 = "Trabalho, trabalho e mais trabalho..."
10082-140 = "......Por algum motivo,\nsinto uma certa afinidade com isso."
10082-150 = "Quando tô treinando o pessoal\nda Hyakkaryouran, o dia\npassa num piscar\nde olhos..."
10082-160 = "E se, quando eu me der conta,\nminha \"juventude\" já tiver passado?!"
10082-170 = "Não, não, isso seria um desastre!"
10082-180 = "Eu não odeio\nas atividades da Hyakkaryouran, sabe."
10082-190 = "Não consigo ignorar uma confusão,\ne adoro ensinar as novatas,\né algo que vale a pena."
10082-200 = "É só que, sabe... aquilo."
10082-210 = "Enquanto posso, eu queria construir\nmais daquelas memórias,\ntipo, radiantes e tals..."
10082-220 = "Você me entende,\nné, Sensei?!"
10082-230 = "Sensei... Digo, Mestre.\nNós somos a \"dupla mestre e discípula da juventude\", não somos?"
10082-240 = "Então nós temos o dever de...\naproveitar mais a juventude.\nSendo assim..."
10082-250 = "Aqui!\nO novo volume de \"Koi yo Koi\"!\nÉ pra você!"
10082-260 = "Essa é mais uma\nobra-prima absurda!\nVocê tem que ler!"
10082-270 = "Os acontecimentos agridoces\nsão simplesmente irresistíveis!"
10082-280 = "O Sensei...\nquer dizer, o Mestre, sempre\ntem me ajudado muito."
10082-290 = "Então, Mestre,\nnão hesite em me pedir as coisas também."
10082-300 = "Se for algo que eu possa fazer,\neu faço qualquer coisa."
10082-310 = "Sensei, hoje é seu aniversário, certo?\nHaha, você não imagina\no quanto eu esperei por esse dia!"
10082-320 = "Vamos lá! Vamos sair\npra comemorar o seu aniversário!"
10082-330 = "Com a intimidade que a gente tem,\nnão precisa se preocupar com os detalhes."
10082-340 = "Vamos criar um monte\nde memórias hoje!\nVai ser super divertido, te garanto!"
10082-350 = "Ehh,\nfeliz aniversário?"
10082-360 = "......A-Ah, s-sim,\nobrigada."
10082-370 = "Ah, não!\nNão é que eu não tenha gostado...!"
10082-380 = "É que eu não tava\nnem um pouco preparada pra isso..."
10082-390 = "Acho que meu rosto tá\nfervendo agora!\nVou dar uma esfriada nele,\nespera um pouquinho aí!"
10082-400 = "Feliz Ano Novo,\nSensei. Espera..."
10082-410 = "O ano já virou?!\nFoi tão rápido que chega a bater uma deprê..."
10082-420 = "Não, enquanto a gente tá aqui atoa\no tempo continua passando!"
10082-430 = "Beleza, esse ano com certeza vamos fazer\num monte de \"atividades da juventude\"!\nÉ uma promessa, Mestre!"
10082-440 = "Feliz Natal,\nSensei... Digo, Mestre."
10082-450 = "Ah, não precisa nem falar.\nHoje é... um dia muito importante\npra \"juventude\"!"
10082-460 = "Não podemos ficar parados!\nVamos ver a iluminação de Hyakkiyako\nagora mesmo!"
10082-470 = "\"Mestre e discípula da juventude\", atividades iniciadas!"
10082-480 = "Eu tava achando que tinha muita gente\ncom roupas estranhas na cidade,\nentão hoje é Halloween."
10082-490 = "Faz sentido, é um evento\nclássico da \"juventude\", né."
10082-500 = "......Beleza,\neu não vou ficar pra trás!\nMestre! Vamos nos fantasiar!"
10082-510 = "Eu vou de Namahage!\nE você, Mestre... do que vai?"
10082-520 = "Já que vamos fazer isso,\nbora fazer com uma qualidade absurda\npra surpreender todo mundo!"
10082-540 = "I-Isso mesmo!\nVocê percebeu só de bater o olho!\nComo esperado do Mestre!"
10082-550 = "E-Eu preparei isso\nespecialmente pro Mestre...!"
10082-560 = "Até hoje eu só fiquei\nsendo egoísta com o Sensei\ne nunca te agradeci\ndireito, então..."
10082-570 = "Como eu acabei te dando trabalho...\nisso é, tipo, uma forma de mostrar\nminha gratidão..."
10082-580 = "C-Como foi a primeira vez que eu fiz..."
10082-590 = "Acho que não posso...\ngarantir muito o sabor..."
10082-600 = "Sinto que esse tipo de coisa\nainda é um pouco adiantado\npra mim, mas..."
10082-610 = "M-Mas eu\ndei o meu melhor...!"
10082-620 = "A-A-Ah, sim..."
10082-630 = "Então, p-por favor...\na-aproveite\na refeição..."
10082-2600 = "I-Isso é... aquele famoso...!?\nÉ o que chamam de \"juventude\", né...!\nC-Calma... fude, fude.\nA-Obrigada, Mestre...\nVou guardar com muito carinho."