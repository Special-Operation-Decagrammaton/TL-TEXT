[translation]
10082-10 = "ブルーアーカイブ！"
10082-20 = "百鬼夜行連合学院所属、百花繚乱の切り込み隊長、不破レンゲ、ここに参上！先生、いや、師匠の手伝いも「青春活動」も全力でいくから！よろしくな！"
10082-30 = "う、うわあ…これは…\nどいつもこいつも、\n「青春」を謳歌してやがる…\nこれが…シャーレ…。"
10082-40 = "うーん、次は\nどんな「青春活動」\nをしよう…？"
10082-50 = "ユカリのやつ、\nちゃんと大人しく\nやってるかな……。"
10082-60 = "快適だなぁ～\nうちの部室もこうだと\nいいんだけど……。"
10082-70 = "もしも問題児がいたら…\nアタシが根性を\n叩きなおしてやる。"
10082-80 = "おっ、先生。\n今日もシャーレの仕事？"
10082-90 = "アタシも手伝うよ！"
10082-100 = "ちょっと待った！\n先生がサボっちゃダメだろ？"
10082-110 = "アタシが見てるんだから、\nちゃんと真面目にやりなよ。"
10082-120 = "先生も大変なんだね。"
10082-130 = "仕事に、仕事に、仕事……"
10082-140 = "……なーんか、\n親近感が湧くんだよな。"
10082-150 = "百花繚乱の皆を\n訓練してると、1日なんて\nあっという間に\n過ぎちゃうんだよな……。"
10082-160 = "このまま気がついたら\n「青春時代」が過ぎてたり！？"
10082-170 = "いやいや、そんなの困るよ！"
10082-180 = "百花繚乱の活動は\n嫌いじゃないよ。"
10082-190 = "いざこざは放っておけないし、\n後輩を教えるのだって、\nやりがいがあって好き。"
10082-200 = "ただ、その……アレだよ。"
10082-210 = "今のうちに、もっとこう、\nキラキラした思い出を\n作っておきたいというか……"
10082-220 = "先生なら分かって\nくれるよね！？"
10082-230 = "先生……いや、師匠。\nアタシたちは「青春師弟」だろ？"
10082-240 = "だからもっと……\n青春を堪能する義務がある。\nということで……。"
10082-250 = "はい！\n「恋よ鯉」の新刊！\nあげる！"
10082-260 = "これがまた\nとんでもない名作でさ！\n絶対読んでほしいんだ！"
10082-270 = "甘酸っぱい展開がもう、\nたまらないの！"
10082-280 = "いつも先生……\n師匠には、たくさん\n助けられてる。"
10082-290 = "だから師匠も、\n遠慮なく言ってくれ。"
10082-300 = "アタシにできることなら、\nなんでもするから。"
10082-310 = "先生、今日は誕生日だろう？\nははっ、今日という日を\nどれだけ待ったことか！"
10082-320 = "さ！外に出て誕生日祝いを\nしようじゃないか！"
10082-330 = "先生とアタシの仲だし、\n細かいことはいいって。"
10082-340 = "今日はたくさん\n思い出を作ろう！\n絶対、楽しいぞ？"
10082-350 = "えーっと、\n誕生日おめでとう？"
10082-360 = "……あ、う、うん、\nありがとう。"
10082-370 = "あっ、違う！\n嫌ってわけじゃなくて……！"
10082-380 = "こういうの、\n全然予想してなくて……"
10082-390 = "あ、アタシいま、\n顔熱いかも！\n冷やしてくるから、\nちょっと待ってて！"
10082-400 = "あけましておめでとう、\n先生。って……"
10082-410 = "もう年明けてるの！？\n早すぎて凹んでくるよ……"
10082-420 = "いや、こうしてる間も\n時間は過ぎてるよな！"
10082-430 = "よし、今年こそ、たくさん\n「青春活動」をしよう！\n約束だよ！師匠！"
10082-440 = "メリークリスマス、\n先生……いや、師匠。"
10082-450 = "ああ、皆まで言うな。\n今日は……「青春」にとって、\n重要な日！"
10082-460 = "こうしちゃいられない！\n百鬼夜行のイルミネーション、\nいますぐ見に行くよ！"
10082-470 = "「青春師弟」、活動開始！"
10082-480 = "街中に変な恰好の人が\n多いなぁと思ったら、今日、\nハロウィーンだったのか。"
10082-490 = "たしかに、「青春」の\n定番行事ではあるよね。"
10082-500 = "……よし、\n負けてられない！\n師匠！仮装するよ！"
10082-510 = "アタシはなまはげになる！\n師匠は……何にする？"
10082-520 = "どうせやるなら、\n超絶クオリティで\n全員驚かそうよ！"
10082-540 = "そ、そう！\n一目で気がつくなんて！\nさすが師匠！"
10082-550 = "し、師匠のために、\n用意してきたものなんだ……！"
10082-560 = "これまで先生には、\nワガママを言ってばかりで、\nちゃんとしたお礼は、\nできてなかったし……。"
10082-570 = "迷惑をかけちゃったから……\nその、感謝の\n気持ちというか……。"
10082-580 = "は、初めて作ったから……"
10082-590 = "あんまり、味は保証\nできない、かも……。"
10082-600 = "こういうの、アタシには\nちょっと早い気も、\nするけど……。"
10082-610 = "で、でも、\n頑張ったんだ……！"
10082-620 = "あ、う、うん……。"
10082-630 = "じゃあ、お、おいしく……\nめ、召し上がって\nください……。"
10082-2600 = "こ、これは……噂に聞く、あの……！？\n「青春」ってやつだよね……！\nお、落ち着こう……ふぅ、ふぅ。\nあ、ありがとう、師匠……\n大切に、する。"
