[translation]
9009004-10 = "Bem, eu gostaria muito que o Sensei pudesse resolver isso..."
9009004-20 = "Poderia, por favor,\ncuidar deste assunto para mim?"
9009004-30 = "Eu queria ser capaz de trabalhar tão bem quanto o Sensei..."
9009004-40 = "Ah...\nserá que eu sou a pessoa certa para isso...?"
9009004-50 = "A-acaso houve alguma falha nas informações que passei...?"
9009004-60 = "Sinto que essa tarefa é pesada demais para mim..."
9009004-70 = "A Rin-senpai é incrível.\nDiferente de mim, ela nunca se sente insegura e sempre resolve tudo com agilidade..."
9009004-80 = "I-incrível...\nVocê já resolveu?"
9009004-90 = "C-como esperado...!\nVocê resolveu tão facilmente..."
9009004-100 = "J-já terminou!?\nI-isso é incrível...!"
9009004-110 = "Você terminou com tanta facilidade...!?\nC-como esperado do Sensei."
9009004-120 = "O trabalho de hoje termina aqui.\nBom trabalho!"
9009004-130 = "Com isso, os casos urgentes foram resolvidos.\nMuito obrigada!"
9009004-140 = "Conto com você novamente amanhã...!"