[translation]
10089-10 = "ブルーアーカイブ。"
10089-20 = "あら、今回はどんな依頼？\nそれともビジネスの提案かしら？\nまあどちらにしても……来てくれて嬉しいわ、先生。"
10089-30 = "あ、あの人はっ……！？\nでもここなら……\n大丈夫よね……？"
10089-40 = "ここの雰囲気……\n嫌いじゃないわ。"
10089-50 = "そろそろ大きめの\n仕事を一つ、キメたい\nところだけど……。"
10089-60 = "どこかにいい取引先、\nないかしら……。"
10089-70 = "うーん……\n今月の運営費、\nどうしよう……。"
10089-80 = "おかえりなさい、先生。"
10089-90 = "早速、仕事の話をしましょう？"
10089-100 = "待ってたわ。\n今日の依頼はなにかしら？"
10089-110 = "もちろん\nエスコートしてくれるのでしょう？"
10089-120 = "どんな依頼でも\n言ってちょうだい。"
10089-130 = "今日の私たちは……特別だもの。"
10089-140 = "せっかくの正装ですもの……"
10089-150 = "ねえ、先生、\n一緒にお出かけしましょう？"
10089-160 = "ど、ドレスが似合ってる……！？"
10089-170 = "あ、当たり前よ！\n私は社長なんだから！"
10089-180 = "……ふふ。"
10089-190 = "うぅ……このドレス、\nクリーニング代高そう……"
10089-200 = "う、うん！？\nべ、別に、何も言ってないわ！"
10089-210 = "ねえ、たまには仕事以外の\n話もしていいのよ？"
10089-220 = "ふふふ、\n今日はとびっきり特別な日ね……"
10089-230 = "覚えているに\n決まってるじゃない。"
10089-240 = "お誕生日、おめでとう、先生。"
10089-250 = "え、えっ……！？\n私の誕生日……だけど……\n覚えててくれたの！？"
10089-260 = "あ、あ、ありがとう……。"
10089-270 = "明けましておめでとう、先生。"
10089-280 = "言うまでもないけど、\n私たちの協力関係は続くから。\n今年もしっかり、頼むわよ。"
10089-290 = "私たち便利屋にとっては、\nいつもと変わらない\n日だけど……。"
10089-300 = "そうね、先生と一緒なら、\n意味のある日になりそうだわ。"
10089-310 = "街中が浮かれているわね……。"
10089-320 = "先生は、どう？\nパーティでも開く？"
10089-340 = "はぁ……\nこんなことになるなんて、\n思いもしなかったわ。"
10089-350 = "でも……先生の言った通り、\nこういうのも悪くはないわね。"
10089-360 = "正直、不思議だったのよ……"
10089-370 = "ちゃんとした格好の大人が、\nどうしてこんな所でわざわざ\nご飯を食べるのか……。"
10089-380 = "でも……\n今なら、少しわかる気がするわ。"
10089-390 = "それぞれ理由は違っても……"
10089-400 = "きっと、\nみんなこういう\n気持ちだったのかな、って。"
10089-410 = "……先生も、\nきっとそうなのよね。"
10089-420 = "ふふ……私も少しは……\n先生に近づけたのかしら？"
10089-2600 = "長い付き合いだもの。\n信頼してる、なんて言葉……今更よね。\nそうね……これからもよろしく、先生。\n……ええ、これだけで十分よ。"
