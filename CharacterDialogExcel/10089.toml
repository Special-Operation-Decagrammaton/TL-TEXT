[translation]
10089-10 = "Blue Archive."
10089-20 = "Ora, que tipo de pedido é este desta vez?\nOu seria uma proposta de negócios?\nBem, de qualquer forma... fico feliz que tenha vindo, Sensei."
10089-30 = "A-aquela pessoa...!?\nMas se for aqui...\nDeve ficar tudo bem, né...?"
10089-40 = "A atmosfera deste lugar...\nEu não desgosto."
10089-50 = "Já está na hora de\nfechar um trabalho\ngrande, mas..."
10089-60 = "Será que não tem\nalgum bom cliente por aí...?"
10089-70 = "Hum... o que eu faço\ncom as despesas operacionais\ndeste mês...?"
10089-80 = "Bem-vindo de volta, Sensei."
10089-90 = "Vamos falar de trabalho logo?"
10089-100 = "Eu estava esperando.\nQual é o pedido de hoje?"
10089-110 = "Claro que você vai\nme escoltar, não vai?"
10089-120 = "Pode falar qualquer\ntipo de pedido."
10089-130 = "Hoje nós somos... especiais."
10089-140 = "Já que estou vestida a rigor..."
10089-150 = "Ei, Sensei,\nvamos sair juntos?"
10089-160 = "O-o vestido combina comigo...!?"
10089-170 = "C-claro que sim!\nEu sou a presidente, afinal!"
10089-180 = "……Fufu."
10089-190 = "Ugh... esse vestido,\no custo da lavanderia deve ser alto..."
10089-200 = "H-hein!?\nN-não é nada, eu não disse nada!"
10089-210 = "Ei, de vez em quando, podemos\nfalar de outras coisas além de trabalho, sabe?"
10089-220 = "Fufufu,\nhoje é um dia extremamente especial..."
10089-230 = "É claro que eu me lembro."
10089-240 = "Feliz aniversário, Sensei."
10089-250 = "E-eh...!?\nÉ o meu aniversário... mas...\nVocê se lembrou!?"
10089-260 = "O-o-obrigada..."
10089-270 = "Feliz Ano Novo, Sensei."
10089-280 = "Nem preciso dizer, mas nossa relação de cooperação vai continuar. Conto com você este ano também."
10089-290 = "Para nós da Problem Solver,\né um dia como qualquer outro, mas..."
10089-300 = "É verdade, se for com o Sensei, parece que vai ser um dia significativo."
10089-310 = "A cidade toda está animada, né..."
10089-320 = "E você, Sensei?\nVai dar alguma festa?"
10089-340 = "Ah... eu nunca imaginei\nque as coisas chegariam a esse ponto."
10089-350 = "Mas... como você disse, Sensei,\nisso não é algo ruim."
10089-360 = "Sinceramente, eu achava estranho..."
10089-370 = "Por que adultos, vestidos adequadamente,\nse dariam ao trabalho de comer\nem um lugar como este..."
10089-380 = "Mas... agora, acho que entendo um pouco."
10089-390 = "Mesmo que os motivos sejam diferentes..."
10089-400 = "Acho que todos deviam\nestar se sentindo\nassim, talvez."
10089-410 = "……O Sensei também\nprovavelmente se sente assim, né."
10089-420 = "Fufu... será que eu também consegui...\nme aproximar um pouco do Sensei?"
10089-2600 = "Já nos conhecemos há muito tempo. Dizer que confio em você... é redundante agora, não é? Pois é... continue contando comigo, Sensei. ...Sim, isso já é o suficiente."
