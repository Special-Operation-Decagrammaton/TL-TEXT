[translation]
10062-10 = "ブルーアーカイブ。"
10062-20 = "ミレニアムサイエンススクール、C&C所属、コールサイン04。\n飛鳥馬トキです。\n完璧な補佐をお約束いたします。"
10062-30 = "ここは……どのような\n空間なのでしょう。"
10062-40 = "カフェ……\n聞いたことは\nあります。"
10062-50 = "糖分が含まれた飲料は、\n疲労回復に非常に\n有効です。"
10062-60 = "私だってお茶くらいは\n淹れられます……\nと言いますか、\n慣れております。"
10062-70 = "ここのインテリアは\n参考に\nなりそうですね。"
10062-80 = "来ましたか、先生。"
10062-90 = "お待ちしておりました。\n本日も補佐いたします。"
10062-100 = "来てくださり\nありがとうございます、先生。"
10062-110 = "何をいたしましょうか？"
10062-120 = "当番……ですか。\n指示を受けた以上は\n善処いたします。"
10062-130 = "……終わったら、\nご褒美をください。"
10062-140 = "先生はなかなか\n指示を出さない方ですね。"
10062-150 = "それならば、勝手に\nさせていただいても\n構いませんね？"
10062-160 = "休み時間が\n必要ではないのか、ですか？"
10062-170 = "先生のおかげで、\n十分休めております。"
10062-180 = "ウサギの真似なら少しできます。"
10062-190 = "ぴょん。"
10062-200 = "……迅速に褒めてください。"
10062-210 = "何なりとご指示ください。"
10062-220 = "C&Cの名に恥じぬよう、\n最善を尽くします。"
10062-230 = "お誕生日おめでとうございます、\n先生。パチパチパチ。"
10062-240 = "誕生日を祝うことは、\n補佐する者としての\n義務ですから。"
10062-250 = "はい？誕生日……？"
10062-260 = "あ……祝ってくださり\nありがとうございます。"
10062-270 = "まさか口だけで終わらせる\nつもりではありませんよね？"
10062-280 = "いきましょう。\n私が補佐します。"
10062-290 = "新年です。"
10062-300 = "心機一転、新しいメイドへと\nバージョンアップしました。"
10062-310 = "これにより、一層完璧な\n補佐を行えるでしょう。"
10062-320 = "黙らないで、\n迅速に頷いてください。"
10062-330 = "こういう場の挨拶ぐらい、\n私も知っています。"
10062-340 = "メリークリスマス、ですよね。"
10062-350 = "それでは今から、\n空中を飛び回って\n先生の安全を脅かす。"
10062-360 = "サンタクロースという敵を\n撃ち落としてきます。"
10062-370 = "ハロウィンを記念して最強の\nメイドモードを展開しました。"
10062-380 = "……ここは\n「いつもと変わらないよ！」と\nツッコむところですよ。"
10062-400 = "むさ苦しいところですが、\nどうぞ。先生。"
10062-410 = "いつも通り、\n装備の点検をしておりました。"
10062-420 = "ご心配をおかけし、\n申し訳ありません。"
10062-430 = "はい、常に最善の状態を\n保つようにしています。"
10062-440 = "C&Cの名に相応しい、"
10062-450 = "そんな\nメイドになるためにも。"
10062-460 = "そう……でしょうか。\n特別なことでは\nないと思いますが。"
10062-470 = "先生がそう言って\nくださって……少し……"
10062-480 = "決めました。"
10062-490 = "今日の整備は、\n普段より完璧に実行します。"
10062-500 = "目標は\n「キヴォトス最強のメイド」、\n「メイドの中のメイド」です。"
10062-510 = "それでは先生……"
10062-520 = "おそばで、\n見守っていてくださいね？"
10062-2600 = "ここまで目をかけてくださるなんて……\n決めました。この先、身辺警護の\n一切をお任せください。"
