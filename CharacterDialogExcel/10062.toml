[translation]
10062-10 = "Blue Archive."
10062-20 = "Millennium Science School, C&C, codinome 04.\nSou Asuma Toki.\nPrometo oferecer um suporte perfeito."
10062-30 = "Que tipo de espaço... é este?"
10062-40 = "Café...\nJá ouvi falar\ndisso."
10062-50 = "Bebidas com açúcar\nsão muito eficazes\npara recuperar a fadiga."
10062-60 = "Eu também sei preparar chá...\nNa verdade,\nestou acostumada."
10062-70 = "A decoração daqui\nparece ser uma boa\nreferência."
10062-80 = "Chegou, Sensei?"
10062-90 = "Estava à sua espera.\nHoje também darei suporte."
10062-100 = "Obrigada por vir,\nSensei."
10062-110 = "O que deseja que eu faça?"
10062-120 = "Dever de plantão... é?\nJá que recebi as ordens,\nfarei o meu melhor."
10062-130 = "...\nQuando terminar, me dê uma recompensa."
10062-140 = "Sensei, você demora\npara dar ordens, não é?"
10062-150 = "Nesse caso, não se importa\nse eu agir por conta própria,\ncerto?"
10062-160 = "Se eu preciso de\num intervalo?\nÉ isso?"
10062-170 = "Graças ao Sensei,\ndescanso o suficiente."
10062-180 = "Eu consigo imitar um coelho um pouco."
10062-190 = "Pulo."
10062-200 = "...\nPor favor, me elogie rapidamente."
10062-210 = "Por favor, ordene o que quiser."
10062-220 = "Farei o meu melhor para não\ndesonrar o nome da C&C."
10062-230 = "Feliz aniversário,\nSensei. Clap, clap, clap."
10062-240 = "Celebrar o aniversário é\num dever de quem\npresta suporte."
10062-250 = "Sim? Aniversário...?"
10062-260 = "Ah... obrigada\npor me parabenizar."
10062-270 = "Você não pretende\ndeixar apenas nas palavras,\npretende?"
10062-280 = "Vamos.\nEu darei o suporte."
10062-290 = "É ano novo."
10062-300 = "Com uma nova mentalidade, fiz um upgrade\npara uma nova versão de empregada."
10062-310 = "Com isso, poderei oferecer\num suporte ainda mais perfeito."
10062-320 = "Não fique em silêncio,\nconcorde rapidamente."
10062-330 = "Eu também sei como\nsaudar em ocasiões como esta."
10062-340 = "Feliz Natal, certo?"
10062-350 = "Então, a partir de agora,\nvou voar pelos céus\ne eliminar a ameaça\nà segurança do Sensei."
10062-360 = "Vou abater o inimigo\nchamado Papai Noel."
10062-370 = "Em comemoração ao Halloween,\nativou o modo de empregada suprema."
10062-380 = "...\nEsta é a hora de você dizer\n'Não está diferente do habitual!'\ne me provocar."
10062-400 = "É um lugar um pouco apertado,\nmas fique à vontade, Sensei."
10062-410 = "Como sempre,\nestava verificando os equipamentos."
10062-420 = "Sinto muito por\nter lhe preocupado."
10062-430 = "Sim, sempre tento\nmanter o melhor estado possível."
10062-440 = "Para ser digna do nome da C&C,"
10062-450 = "para me tornar\nessa tipo de empregada."
10062-460 = "É... mesmo?\nNão acho que seja\nnada especial."
10062-470 = "Ouvir isso do Sensei...\nme deixa um pouco..."
10062-480 = "Decidi."
10062-490 = "A manutenção de hoje\nserá executada com mais perfeição que o normal."
10062-500 = "Meu objetivo é ser a\n'Empregada mais forte de Kivotos',\na 'Empregada das empregadas'."
10062-510 = "Então, Sensei..."
10062-520 = "Por favor, fique ao meu lado\ne me observe, está bem?"
10062-2600 = "Para você cuidar de mim até este ponto... \nJá decidi. De agora em diante, deixe toda a sua segurança pessoal por minha conta."
