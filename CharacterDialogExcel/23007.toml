[translation]
23007-10 = "Blue Archive."
23007-20 = "Sou Urawa Hanako.\nDe agora em diante, conto com você para muitas coisas.\n……Sim, para muitas \"coisas\" mesmo."
23007-30 = "Ora, que lugar adorável."
23007-40 = "Foi você quem decorou este interior, Sensei?\nÉ maravilhoso."
23007-50 = "Se eu deixar isso aqui, será que alguém vai se surpreender……?"
23007-60 = "……Fufu, que tal eu pregar uma peça?"
23007-70 = "Este espaço, só de olhar, já é divertido."
23007-80 = "Bem-vindo de volta, Sensei.\nConto com você hoje também."
23007-90 = "Fufu.\nEu estava te esperando, Sensei."
23007-100 = "Fufu.\nFicar de \"plantão\" aqui é muito divertido, não é?"
23007-110 = "Agora, só estamos nós dois aqui……"
23007-120 = "Isso significa que posso criar expectativas?"
23007-130 = "O que isso significa…… você pergunta?"
23007-140 = "Significa exatamente o que você deseja, Sensei."
23007-150 = "Sensei, tem algo que você queira que eu faça?"
23007-160 = "Fufu, era essa expressão que eu queria ver no seu rosto."
23007-170 = "Feliz aniversário, Sensei."
23007-180 = "Não quer ganhar nada?\nSe não quiser nada, então……"
23007-190 = "Pode ser \"aquilo\" também, sabe?"
23007-200 = "Um presente de aniversário, é……"
23007-210 = "Ah, Sensei como presente, talvez seja algo maravilhoso."
23007-220 = "O embrulho, posso ser eu quem vai abrir……?"
23007-230 = "Este ano também, conto com você para muitas coisas, Sensei."
23007-240 = "Talvez eu te cause muitos problemas, mas, por favor, não desista de mim, está bem?"
23007-250 = "Noite sagrada……\nAh, estou muito ansiosa……"
23007-260 = "……Ah, foi só um pensamento em voz alta.\nNão se preocupe."
23007-270 = "Falando em Halloween, é o dia em que se pode mostrar um pouco mais de pele de forma casual……"
23007-280 = "……Eh, um mal-entendido, você diz?"
23007-300 = "Olá, Sensei."
23007-310 = "Obrigada por ter vindo."
23007-320 = "Ficar assim é refrescante e muito agradável."
23007-330 = "Este é o meu lugar favorito, fufu……"
23007-340 = "Já que estamos aqui, que tal você também, Sensei?"
23007-350 = "Que tal tirarmos as roupas juntos aqui……?"
23007-360 = "Assim, expondo a pele em plena luz do dia,"
23007-370 = "não é que acaba ficando divertido?"
23007-380 = "Sinto como se estivéssemos fazendo algo proibido……"
23007-2600 = "……Sensei, você é uma pessoa problemática.\nQuer tanto assim ver \"tudo sobre mim\"?\nFufu…… estou falando das minhas habilidades.\nO que será que você estava pensando agora mesmo?"
