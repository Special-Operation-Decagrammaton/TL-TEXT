[translation]
23007-10 = "ブルーアーカイブ。"
23007-20 = "浦和ハナコです。\nこれから色々とよろしくお願いしますね。\n……はい、それはもう「色々」と。"
23007-30 = "あら、\n可愛らしい\nところですね。"
23007-40 = "この内装は先生が？\n素敵ですね。"
23007-50 = "ここに置いていったら、\n誰かが驚くで\nしょうか……？"
23007-60 = "……ふふっ、\nちょっといたずらでも\nしておきましょうか。"
23007-70 = "この空間、\n見ているだけで\n楽しいですね。"
23007-80 = "おかえりなさい、先生。\n今日もよろしく\nお願いいたします。"
23007-90 = "ふふっ。\nお待ちしておりましたよ、先生。"
23007-100 = "ふふっ。\nここで「当番」をするのは、\nすごく楽しいですね？"
23007-110 = "今ここにいるのは\n私たち二人だけ……"
23007-120 = "これは、期待しても\n良いんでしょうか？"
23007-130 = "どういう意味か……ですか？"
23007-140 = "それはもう、先生の\nお望み通りの意味で。"
23007-150 = "先生、何か私に\nしてほしいことは\nありますか？"
23007-160 = "ふふっ、\n先生のその表情が\n見たかったんです。"
23007-170 = "お誕生日おめでとう\nございます、先生。"
23007-180 = "何か欲しいものなどは\nありませんか？\n何も無いのでしたら……"
23007-190 = "「あれ」、\nでも良いんですよ？"
23007-200 = "誕生日プレゼント、ですか……。"
23007-210 = "あ、先生がプレゼント、\nなんて素敵かもしれませんね。"
23007-220 = "包みは、\n私が解いても良いですか……？"
23007-230 = "今年も色々と\nよろしくお願いします、先生。"
23007-240 = "困らせてしまうことも\n多いかもしれませんが、\nこれからも私のこと、\n見捨てないでくださいね？"
23007-250 = "聖なる夜……\nああ、すごく楽しみですね……"
23007-260 = "……あ、\nただの独り言です。\nお気になさらず。"
23007-270 = "ハロウィンといえば、\nさりげなく大胆な\n露出ができる日……"
23007-280 = "……え、誤解、ですか？"
23007-300 = "こんにちは、先生。"
23007-310 = "来ていただいて、\nありがとうございます。"
23007-320 = "こうしていると涼しくて、\nとっても気持ち良いんですよ。"
23007-330 = "私にとっての特等席なんです、\nふふっ……。"
23007-340 = "せっかくですし、\n先生もいかがですか？"
23007-350 = "ここで一緒に、\n脱いでしまいません……？"
23007-360 = "こうして、\nこんな真っ昼間から\n素肌をさらしていると、"
23007-370 = "何だか楽しくなって\nくるんですよ？"
23007-380 = "イケないことをしてる……\nそんな感じがして。"
23007-2600 = "……先生は困った方ですね。\nそんなに「私の全部」が見たいのですか？\nふふっ……実力のお話です。\n今、一体何を考えていたのでしょう？"
