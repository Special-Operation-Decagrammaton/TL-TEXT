[translation]
10056-10 = "Blue Archive."
10056-20 = "Feliz Natal! Aqui é a Serina, da Unidade de Socorro!\nVamos tornar este Natal especial!"
10056-30 = "Pessoal, por favor,\ncuidem-se para não\npegar um resfriado."
10056-40 = "Será que remédios de\nprimeiros socorros servem\ncomo presente...?"
10056-50 = "Um presente para\nas crianças boazinhas...\nO que seria bom?"
10056-60 = "Não se esforce\ndemais. A saúde\nvem em primeiro lugar."
10056-70 = "Rezo do fundo do meu\ncoração pela saúde de todos."
10056-80 = "Bem-vindo de volta, Sensei!\nA Serina de hoje é a Papai Noel,\nsabe? Fufu."
10056-90 = "Estava à sua espera, Sensei!\nFeliz Natal!"
10056-100 = "Está preocupado com os\npresentes para as crianças?"
10056-110 = "Quer pensar nisso\ncomigo...? Fufu."
10056-120 = "Pelo bem dos sonhos das crianças,\no Papai Noel é necessário."
10056-130 = "Se eu fosse uma\nPapai Noel de verdade..."
10056-140 = "Será que eu poderia ter sido\nmais útil ao Sensei...?"
10056-150 = "Chamou? Sim, aqui é a sua Serina."
10056-160 = "A Serina de hoje\né a Papai Noel."
10056-170 = "Sinta-se à vontade para\nme chamar a qualquer momento."
10056-180 = "Se for sobre estar preparada...\nEu já estou."
10056-190 = "Sensei, feliz\naniversário!"
10056-200 = "Pode ficar na expectativa\npelo seu presente."
10056-210 = "Aniversário...\nO meu, por acaso...?"
10056-220 = "Ah, eu estava tão ocupada\nque acabei esquecendo!\nMuito obrigada!"
10056-230 = "Mal passou o Natal e\njá estamos no Ano Novo."
10056-240 = "Feliz Ano\nNovo."
10056-250 = "Ficarei muito feliz se a\nfelicidade de todos continuar\npor muito tempo."
10056-260 = "É Natal! O que acha...\nEstou bem vestida?"
10056-270 = "Quando eu estava andando com essa roupa,\nme confundiram com uma\nfantasia de Halloween."
10056-280 = "Não foi minha intenção,\nmas..."
10056-300 = "S-Sensei?\nEste cachecol é...\npara mim?"
10056-310 = "M-mas... hoje\neu sou a Papai Noel."
10056-320 = "Na verdade, eu deveria ser\na pessoa a dar o presente..."
10056-330 = "Receber algo\ndo Sensei..."
10056-340 = "Ah, então até o Papai Noel\npode ganhar uma recompensa...?"
10056-350 = "Se você diz assim..."
10056-360 = "Fufu."
10056-370 = "Muito obrigada,\nvou cuidar muito bem dele."
10056-2600 = "Uau, muito obrigada. Você sabia? O Papai Noel não pode dar presentes para crianças que estão chorando. Por isso, Sensei, por favor, não chore, está bem?"
