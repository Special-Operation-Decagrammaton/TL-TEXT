[translation]
10056-10 = "ブルーアーカイブ。"
10056-20 = "メリークリスマス！救護騎士団のセリナです！\n特別なクリスマスにしましょうね！"
10056-30 = "皆さん、風邪には\n気を付けて\nくださいね。"
10056-40 = "救急薬もプレゼントに\nなるかな……。"
10056-50 = "良い子に贈る\nプレゼント……\n何がいいでしょう？"
10056-60 = "無理しちゃダメ\nですよ。健康が\n一番です。"
10056-70 = "皆さんの健康を\n心から祈っています。"
10056-80 = "おかえりなさい、先生！\n今日のセリナはサンタさん\nですよ？ふふっ。"
10056-90 = "お待ちしておりました、先生！\nメリークリスマス！"
10056-100 = "子供たちに渡す\nプレゼントでお悩みですか？"
10056-110 = "私と一緒に考えましょうか……\nふふっ。"
10056-120 = "子供たちの夢のためにも、\nサンタさんは必要です。"
10056-130 = "もし私が本物の\nサンタさんだったなら……"
10056-140 = "もっと先生の\nお役に立てたのかな……？"
10056-150 = "お呼びですか？\nはい、先生のセリナです。"
10056-160 = "今日のセリナは\nサンタさんですよ。"
10056-170 = "いつでも声を\nかけてくださいね。"
10056-180 = "心の準備なら……\nできていますから。"
10056-190 = "先生、お誕生日\nおめでとうございます！"
10056-200 = "プレゼント、期待して\n待っていてくださいね。"
10056-210 = "誕生日……\n私の、ですか……？"
10056-220 = "あっ、忙しくて\n忘れていました！\nありがとうございます！"
10056-230 = "クリスマスかと思えば、\nもうお正月ですね。"
10056-240 = "あけまして\nおめでとうございます。"
10056-250 = "これからも皆さんの\n幸せが続いたら、\n私もうれしいです。"
10056-260 = "クリスマスですね！\nどうでしょう……\n似合ってますか？"
10056-270 = "この格好で歩いていたら、\nハロウィーンの仮装と\n間違えられてしまいました。"
10056-280 = "意識したわけでは\nないんですが……。"
10056-300 = "せ、先生？\nこのマフラーを\n……私に？"
10056-310 = "で、でも……今日の\n私はサンタさんですよ。"
10056-320 = "本当は、私がプレゼントを\n渡すほうなのに……"
10056-330 = "先生から\nいただけるだなんて……"
10056-340 = "えっ、サンタさんにも\nご褒美があってもいい……？"
10056-350 = "そうおっしゃるなら……"
10056-360 = "ふふっ。"
10056-370 = "ありがとうございます、\n大切にしますね。"
10056-2600 = "わぁ、ありがとうございます。\n知っていますか？サンタさんは泣いている\n子にはプレゼントは渡せないんです。\nだから、先生は泣かないでくださいね？"
