[translation]
20002-20 = "ぼく様、登場！\n今回の実験の被験体はどこだ？"
20002-30 = "ふふ、この部屋。\nぼく様の実験室として\n使ってもいいかも"
20002-40 = "次回はメイを相手に\n何の実験をしようかな？"
20002-50 = "これぐらいの温度と湿度なら、\nぼく様の可愛い菌たちが\n育つのにとても良さそうだね。\nふーふっふっふ…"
20002-60 = "あっ、どっかから\nチーズの匂いがするのだ！"
20002-70 = "ネズ助、この！\n暴れるな！"
20002-80 = "お帰り、先生！\nちょうど新薬を実験するために\n呼ぼうとしてたのだ。"
20002-90 = "なに、またぼく様に会いたくて\n来たの？仕方ないな～"
20002-100 = "ぼく様は！偉大なのだ！"
20002-110 = "ネズ助はハムスターなのかな？\nそれともモルモットかな？\n正解は…次回なのだ！"
20002-120 = "世界的に、歴史的に、\n一番愛されたキャラクターは\nいつもネズミだったのだ～！"
20002-130 = "毒と薬は、使い道で\n変わってくる両刃の剣だよね！"
20002-140 = "可愛いモルモットだね。\n一緒にぼく様と\n実験をしないか？"
20002-150 = "お誕生日おめでとう、先生。"
20002-160 = "うん？なんで誕生日を\n覚えてるか？そりゃあ研究者\nとして当たり前の心得なのだ！"
20002-170 = "ぼく様の誕生日を祝って\nくれるの？見た目によらず\n記憶力がいいね、先生！"
20002-180 = "日曜日にも出勤するから\n日にちを数えられないと\n思ってたのに。"
20002-190 = "今年もよろしくなのだ、先生。\n今年こそ絶対不老不死の霊薬を\n作ってみせるよ！"
20002-200 = "巨大なプレゼント袋を担いだ\n老人が、キヴォトスの全域を\nうろつくシーズンが来たのだ。"
20002-210 = "あの老人はいったいどんな薬を\n飲んだらあれだけ元気に\nいられるんだろ？"
20002-220 = "ハロウィンに市内を歩くあの\n死体たちは、いったいどんな\n薬を注射されたのだ？"
20002-230 = "ぼく様の知らない薬が\nあるなんて、悔しい…！"
20002-250 = "ぼく様らしくない、\nこんなミスをするなんて。"
20002-260 = "なんてことだ…。\n先生から目が離せない…！"
20002-270 = "先生、ぼくの前から離れ…\nやっぱり、離れないで！"
20002-280 = "このまま…少しだけ\n一緒にいて…。"
20002-290 = "うう…困ったのだ。\nでも、どうしても先生から\n目が離せない…。"
20002-300 = "今ぼくの目には先生が…"
20002-310 = "とっても美味しいチーズの塊に\n見えるのだ！"
20002-320 = "ダメだ、先生…\nちょっとだけ、一口…\n一口だけ噛ませてくれない？"
20002-2600 = "ぼく様の拳銃がやっと届いたか！\nもちろん、この恐ろしい細菌兵器に\n比べれば優しいレベルだけど。"
