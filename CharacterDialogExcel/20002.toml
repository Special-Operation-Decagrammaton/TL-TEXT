[translation]
20002-20 = "O grande eu, chegou!\nOnde está o sujeito de teste para o experimento de hoje?"
20002-30 = "Fufu, este quarto.\nTalvez eu possa usá-lo\ncomo meu laboratório."
20002-40 = "Que tipo de experimento devo fazer\ncom a Mei na próxima vez?"
20002-50 = "Com essa temperatura e umidade,\nparece perfeito para os meus\nfungos fofinhos crescerem.\nFu-fufufu..."
20002-60 = "Ah, sinto cheiro de\nqueijo vindo de algum lugar!"
20002-70 = "Nezusuke, seu...!\nNão se debata!"
20002-80 = "Bem-vindo, Sensei!\nEu estava justamente prestes a te chamar\npara testar um novo remédio."
20002-90 = "O quê, veio me ver de novo\nporque estava com saudades? Não tem jeito, né~"
20002-100 = "O grande eu! É magnífico!"
20002-110 = "Será que o Nezusuke é um hamster?\nOu será um porquinho-da-índia?\nA resposta... fica para a próxima!"
20002-120 = "Mundialmente, historicamente,\nos personagens mais amados\nsempre foram ratos~!"
20002-130 = "Veneno e remédio são uma faca de dois gumes,\ntudo depende de como você os usa!"
20002-140 = "Que porquinho-da-índia fofo.\nQuer fazer experimentos\ncomigo?"
20002-150 = "Feliz aniversário, Sensei."
20002-160 = "Hm? Por que eu lembraria do seu aniversário?\nOra, isso é o básico para\nqualquer pesquisador!"
20002-170 = "Você vai comemorar\no meu aniversário? Apesar da aparência,\nvocê tem uma boa memória, Sensei!"
20002-180 = "Eu trabalho até aos domingos,\nentão achei que você não conseguiria\ncontar os dias."
20002-190 = "Conto com você este ano também, Sensei.\nEste ano, com certeza, eu vou\ncriar o elixir da imortalidade!"
20002-200 = "Chegou a temporada em que um velho\ncarregando um saco gigante de presentes\nperambula por todo o Kivotos."
20002-210 = "Que tipo de remédio aquele velho tomou\npara conseguir ter tanta energia\nnessa idade?"
20002-220 = "Aqueles cadáveres que andam pela cidade no Halloween,\nque tipo de remédio\nfoi injetado neles?"
20002-230 = "É frustrante saber que existe\num remédio que eu desconheço...!"
20002-250 = "Isso não é a minha cara,\ncometer um erro desses."
20002-260 = "Não pode ser...\nNão consigo tirar os olhos de você, Sensei...!"
20002-270 = "Sensei, saia da minha frente...\nNão, espere, não saia!"
20002-280 = "Fique assim...\nSó mais um pouco comigo..."
20002-290 = "Ugh... que problema.\nMas, eu simplesmente não consigo\ntirar os olhos de você, Sensei..."
20002-300 = "Agora, aos meus olhos, você..."
20002-310 = "Parece um pedaço de queijo delicioso!"
20002-320 = "Não dá, Sensei...\nSó um pouquinho, uma mordida...\nVocê não me deixa dar só uma mordidinha?"
20002-2600 = "Minha pistola finalmente chegou! É claro, comparada a esta arma bacteriológica aterrorizante, ela é bem inofensiva."
