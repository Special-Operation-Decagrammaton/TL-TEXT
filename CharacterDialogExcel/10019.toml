[translation]
10019-10 = "Blue Archive."
10019-20 = "Shirasu Azusa. Acabei de me transferir para a Academia Trinity. Minha especialidade é agir sozinha. Meu ponto forte é ser pequena e fácil de me esconder... Acho que é só isso. Tem mais alguma coisa que queira saber?"
10019-30 = "Hum. Bem, não é ruim."
10019-40 = "(Tem tantas coisas raras aqui...)"
10019-50 = "O que é aquilo?"
10019-60 = "Hehe. Interessante."
10019-70 = "Q-que fofo...!"
10019-80 = "Eu estava esperando pelo Sensei. Qual é a missão de hoje? Tem algo em que eu possa ajudar?"
10019-90 = "Bem-vindo de volta, Sensei. Se houver algo que eu possa fazer, é só me dizer."
10019-100 = "Se tudo é em vão, por que será que estamos vivos...?"
10019-110 = "Ah, não, não é nada."
10019-120 = "Missões, objetivos, alcançar essas coisas."
10019-130 = "Eu nunca tinha pensado em nada além disso."
10019-140 = "...Até agora."
10019-150 = "Será que estou sendo útil...?"
10019-160 = "Hã, c-claro que sim?"
10019-170 = "E-entendo..."
10019-180 = "...Eu sei. Não tenho nada de interessante em mim. Se você estava esperando por algo assim, sinto muito."
10019-190 = "Eu... algum dia..."
10019-200 = "Posso acabar decepcionando as expectativas do Sensei."
10019-210 = "Mesmo que tudo seja sem sentido, se o Sensei estiver aqui, sinto que está tudo bem..."
10019-220 = "Feliz aniversário."
10019-230 = "Meu aniversário... Você vai comemorar?"
10019-240 = "Tudo bem eu ser celebrada por ter nascido?"
10019-250 = "...Estou feliz. Obrigada."
10019-260 = "Bom trabalho este ano também. Que possamos estar juntos no próximo..."
10019-270 = "N-não é nada!"
10019-280 = "Natal... Falando em festival sagrado, é um dos dias mais importantes do ano."
10019-290 = "Será que alguém como eu deveria estar aqui num dia desses...?"
10019-300 = "É um dia bem agitado, mas não tenho interesse especial nisso."
10019-310 = "...Mas, se o Sensei gosta, então acho que posso acompanhar um pouco."
10019-330 = "Você está definitivamente me provocando, Sensei."
10019-340 = "...B-bem, não é como se eu odiasse isso lá no fundo, mas..."
10019-350 = "Uuu, que fofo...! Eu queria muito conhecer essa criaturinha...!"
10019-360 = "Ehehe, ehehe... Ehehe..."
10019-370 = "Ah... ...Isso, não, não é nada..."
10019-380 = "(Eu não deveria me aproximar mais do que isso...)"
10019-390 = "Mas, por que o Sensei trouxe um lugar tão fofo assim...?"
10019-400 = "...O Sensei também gosta? Sério?"
10019-410 = "Você não está só me tratando como criança e fingindo, né?"
10019-420 = "...Bem, tanto faz, na verdade."
10019-2600 = "Quero que o Sensei decida como usar este poder. Porque agora... eu estou aqui por sua causa, Sensei."
