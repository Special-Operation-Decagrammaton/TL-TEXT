[translation]
10019-10 = "ブルーアーカイブ。"
10019-20 = "白洲アズサ。最近、トリニティ総合学園に転校してきたばかり。得意なことは単独行動。長所は小柄で隠れやすいところ…それぐらいかな。他に何か聞きたいことは？"
10019-30 = "ふむ。まあ、\n悪くない。"
10019-40 = "（珍しいものが\nいっぱいだ…）"
10019-50 = "あれは何だろう？"
10019-60 = "ふふ。おもしろい。"
10019-70 = "か、かわいい……！"
10019-80 = "先生のことを待ってた。\n今日の任務は何？\n私に手伝えることはある？"
10019-90 = "おかえり、先生。\n私にできることが\nあったら言って。"
10019-100 = "すべてが無駄なら\n私たちはなぜ\n生きてるんだろう……"
10019-110 = "あっ、いや、なんでもない。"
10019-120 = "任務、目標、\nそれらの達成。"
10019-130 = "これ以外のことを\n考えたことなんてなかった"
10019-140 = "……今までは。"
10019-150 = "私は役に立ててるのかな……"
10019-160 = "え、も、もちろん？"
10019-170 = "そ、そう……"
10019-180 = "……分かってる。私には、\n何の面白みも無いって。\nそういうのを\n期待してたら、ごめん。"
10019-190 = "私は… いつか"
10019-200 = "先生の期待を\n裏切るかもしれない。"
10019-210 = "全てが無意味だとしても、\n先生がいるなら\nそれで良いって思える……"
10019-220 = "お誕生日おめでとう。"
10019-230 = "私の誕生日……\n祝ってくれるの？"
10019-240 = "生まれてきたことを、\n祝ってもらっても良いの？"
10019-250 = "……嬉しい。ありがとう。"
10019-260 = "今年もお疲れ様。\n来年も一緒に……"
10019-270 = "な、なんでもない！"
10019-280 = "クリスマス……\n聖誕祭と言えば、\n一年の中でもかなり大切な日。"
10019-290 = "こんな日に私なんかが\n一緒で良いのか……？"
10019-300 = "なんだかすごく賑やか\nな日だけど、\n特に興味はない。"
10019-310 = "……ただ、\n先生が好きならまあ、\n私も少し付き合おうか。"
10019-330 = "絶対にからかってるでしょ、\n先生。"
10019-340 = "……ま、まあ別に、\n心底嫌ってわけじゃ\nないけど……。"
10019-350 = "ううっ、可愛い……！\nこの子、\nずっと会いたかった……！"
10019-360 = "えへっ、えへへ……\nえへへ……"
10019-370 = "っ……\n…そのっ、\nいや何でもない……。"
10019-380 = "（これ以上、\n距離を縮めるわけには\nいかないのに……）"
10019-390 = "でも、先生がどうして\nこんな可愛い場所を……？"
10019-400 = "……先生も好き？\n本当に？"
10019-410 = "子ども扱いして、\n合わせたりしてない？"
10019-420 = "……まあ、\n別にどっちでも良いけど。"
10019-2600 = "この力をどういう風に使うか、\n先生に決めてほしい。\n私は今……先生のためにここにいるから。"
