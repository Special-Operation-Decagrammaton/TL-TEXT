[translation]
10051-10 = "Blue Archive."
10051-20 = "A líder de torcida do Millennium, Shiraishi Utaha.\nCom razão fria e paixão ardente,\nvou torcer por todos."
10051-30 = "É um espaço\ncheio de paixão."
10051-40 = "Se eu começar a torcer aqui,\naté onde será que minha voz alcança?"
10051-50 = "Queria fazer uma\nginástica rítmica aqui\ncom todo mundo..."
10051-60 = "(Hehe, tive uma ideia\ninteressante para\num plano de torcida.)"
10051-70 = "Não sei por que...\nSinto que falta\num pouco de ânimo."
10051-80 = "Olá, Sensei.\nSe precisar de torcida,\npode me chamar a qualquer momento."
10051-90 = "Vamos lá, Sensei.\nHoje também, vamos colocar ânimo\ne começar o dia com energia!"
10051-100 = "Animar as pessoas\né algo importante."
10051-110 = "Para obter resultados\ncriativos também."
10051-120 = "Aconteceu algo difícil? \nTudo bem, primeiro,\nvamos tentar de novo."
10051-130 = "Quando estou assim\ncom o Sensei..."
10051-140 = "Sinto que posso fazer qualquer coisa."
10051-150 = "Um Meister, por assim dizer, talvez seja\ncomo um líder de torcida\npara as máquinas..."
10051-160 = "Não é nada mal mostrar\nessa faceta para o Sensei."
10051-170 = "O que achou?\nEstá um pouco... diferente?"
10051-180 = "Ah, hoje é\no aniversário do Sensei."
10051-190 = "Hoje, vou ser a líder de torcida\nexclusiva do Sensei."
10051-200 = "Meu aniversário...? \nJá chegou essa época, é?"
10051-210 = "Ah, mas não sinto\nque seja algo tão especial."
10051-220 = "Como o Sensei\ntorce por mim,"
10051-230 = "sinto como se fosse\nmeu aniversário\no ano todo."
10051-240 = "Obrigada, Sensei."
10051-250 = "O ano começou.\nPara que todos fiquem animados desde o primeiro dia, \nque tal começarmos uma competição de torcida?"
10051-260 = "O Papai Noel é apaixonado, não é?\nSerá que alguém\nestá torcendo por ele?"
10051-270 = "Ah... talvez os sonhos e esperanças das crianças\nsejam a fonte dessa paixão."
10051-280 = "Sobre aquilo... não foi de propósito\nque eu explodi todas as\nluminárias de abóbora\nque estavam na sala de descanso..."
10051-290 = "Eu só... achei que as abóboras\nficariam mais bonitas\nbrilhando a 60 quadros por segundo..."
10051-310 = "Rah! Rah!\nMillennium!"
10051-320 = "Vai! Vai! Ganha! Ganha!\nMillennium!"
10051-330 = "Hehe... O que achou, Sensei?\nNão acha que é um espetáculo incrível?"
10051-340 = "Nesta ginástica rítmica, estou usando robôs\nequipados com novos dispositivos Bluetooth, então,"
10051-350 = "posso realizar até as coreografias\nmais complexas\ncom perfeição."
10051-360 = "...Hum? Se é para usar máquinas na apresentação,\nnão seria mais eficiente\ninstalar uma tela?"
10051-370 = "Sensei,\npor favor, pare com esse papo\nsem romance."
10051-380 = "A visão de painéis analógicos se movendo\nem uníssono para completar a imagem,"
10051-390 = "tem um impacto e uma emoção\nque não podem ser comparados\na uma tela."
10051-400 = "Afinal, o romance que nos faz o coração disparar\né algo muito distante da \"eficiência\"."
10051-2600 = "O aroma da paixão é o combustível\nque aguça a inspiração\nde um Meister."
