[translation]
10051-10 = "ブルーアーカイブ。"
10051-20 = "ミレニアムの応援団長、白石ウタハ。\n冷たい理性と熱い情熱で、\n皆を応援するとしよう。"
10051-30 = "情熱でいっぱいの\n空間だね。"
10051-40 = "ここで応援を始めたら、\nどこまで声が届くかな。"
10051-50 = "ここで皆と一緒に、\nマスゲームを\nしてみたい…"
10051-60 = "（ふふ、面白い\n応援計画を\n思いついたよ）"
10051-70 = "なんだろう…\n気合いが\n足りないような。"
10051-80 = "やあ、先生。\n応援が必要なら、\nいつでも声をかけてくれ。"
10051-90 = "さあ、先生。\n今日も気合いを入れて、\n元気に一日をはじめよう！"
10051-100 = "人を元気づけるのは\n大事なことだ。"
10051-110 = "クリエイティブな結果を\n得るためにもね。"
10051-120 = "辛いことがあったのかい？\n大丈夫、まずは\nもう一度やってみよう。"
10051-130 = "こうして先生と\n一緒にいると…"
10051-140 = "何でもできそうな気がするよ。"
10051-150 = "マイスターとはいわば、\n機械たちの応援団長のような\n存在なのかもしれないね…"
10051-160 = "先生にこんな姿を\n見せるのも悪くないね。"
10051-170 = "どうだい？\n少しは…新鮮かな？"
10051-180 = "ああ、今日は\n先生の誕生日か。"
10051-190 = "今日一日は、先生だけの\n応援団長になるとしよう。"
10051-200 = "私の誕生日…？\nもうそんな時期なんだね。"
10051-210 = "ああ、でもあんまり\n特別な感じはしないな。"
10051-220 = "先生が私を\n応援してくれてるから、"
10051-230 = "年中ずっと\n誕生日みたいな\n気持ちなんだ。"
10051-240 = "ありがとう、先生。"
10051-250 = "年が明けたね。\n新年初日から皆が元気に\nなれるよう、応援合戦を\nはじめるとしようか。"
10051-260 = "サンタは情熱的だね。\n誰かに応援でも\nされてるのだろうか。"
10051-270 = "ああ…子供たちの夢と希望、が\n情熱の源なのかもしれないね。"
10051-280 = "その…休憩室にあった\nカボチャのランプを\n全部爆破させたのは、\nわざとじゃあないんだ…"
10051-290 = "私はただ…カボチャが\n60フレームで\n光っていたほうが\n綺麗だと思って…"
10051-310 = "フレー！フレー！\nミレニアム！"
10051-320 = "行け！行け！勝て！勝て！\nミレニアム！"
10051-330 = "ふふ… どうだい、先生？\nすごい光景だと思わないか？"
10051-340 = "このマスゲームには、\n新型ブルートゥース装置を\n搭載したロボットを\n使用しているから、"
10051-350 = "どんなに複雑な振付でも\n完璧に演出する\nことができるんだ。"
10051-360 = "…うん？演出に機械を\n使用するぐらいなら、\nスクリーンを設置したほうが\n効率的なのではないのかって？"
10051-370 = "先生、\nロマンのない話は\n辞めたまえ。"
10051-380 = "アナログのパネルが一斉に\n動いて完成される光景には、"
10051-390 = "スクリーンとは比べ物に\nならないほどの迫力と\n感動があるんだよ。"
10051-400 = "元来、胸高鳴る瞬間を\n与えるロマンは、「効率」とは\n程遠いものだからね。"
10051-2600 = "情熱の香りこそ、\nマイスターのインスピレーションを\n研ぎ澄ませる動力さ。"
