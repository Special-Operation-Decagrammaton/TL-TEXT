[translation]
10037-10 = "Blue Archive!"
10037-20 = "Foi você quem me chamou, Sensei?\nVocê está com as instruções da Presidente Cherino?"
10037-30 = "Seria bom se eu pudesse\ntomar um copo de\ncompota gelada..."
10037-40 = "É tão quente e\nfofinho,\nque dá até sono..."
10037-50 = "Opa, não pode.\nTenho que fazer um\ntreinamento rigoroso logo...!"
10037-60 = "Este espaço é amplo,\nparece perfeito para\num treinamento de investida."
10037-70 = "E se eu acabar\nme perdendo\naqui dentro...?"
10037-80 = "Tempo é dinheiro, Sensei!\nDa próxima vez,\nvolte mais rápido!"
10037-90 = "Voltou, Sensei?\nHoje também vamos investir com tudo!"
10037-100 = "Nós da Red Winter\ncaçamos como ursos,\nsem medo de nada!"
10037-110 = "Se ficar de preguiça,\nvou te denunciar à secretaria\npor suspeita de sabotagem!"
10037-120 = "O-onde você está tocando!\nVou te mandar para a classe especial!"
10037-130 = "Hm, você perguntou\nquem é Medved?"
10037-140 = "Medved é o meu\nurso de pelúcia fiel,\nque dorme comigo."
10037-150 = "Se ele não estiver aqui,\neu não consigo dormir bem."
10037-160 = "A Presidente Cherino é fofa...?"
10037-170 = "Sim, sim! Eu também acho!"
10037-180 = "Hoje é o seu\naniversário, Sensei?\nQue dia auspicioso."
10037-190 = "Vou entrar em contato com a secretaria\npara providenciar\nsuprimentos especiais para você."
10037-200 = "Não há necessidade de tomar\nmedidas especiais só porque\né o meu aniversário."
10037-210 = "Mas, se o Sensei\nestiver comigo..."
10037-220 = "Talvez eu fique\num pouco feliz."
10037-230 = "Para que possamos investir em qualquer lugar\ndurante este ano,\nvou deixar tudo preparado!"
10037-240 = "Papai Noel...\nVisitar todas as escolas de Kivotos\nem uma única noite,"
10037-250 = "que velocidade assustadora!"
10037-260 = "Disse que vai dividir doces\nse eu não fizer travessuras...?"
10037-270 = "O que está dizendo?\nDoces devem ser distribuídos\npara todos os alunos igualmente!"
10037-290 = "Droga... essa sujeira na fresta,\nvocê é bem persistente, hein."
10037-300 = "Mas, por quanto tempo\nconseguirá resistir ao ataque\ndesta Chefe do Comitê de Segurança?"
10037-310 = "Hehe...\nNão subestime o poder\ndesta nova arma."
10037-320 = "Com este detergente\nque comprei recentemente,"
10037-330 = "até as frestas mais difíceis\nficarão impecáveis!"
10037-340 = "Ah, espere, Sensei!\nEu não disse para secar bem\nespelhos e vidros com um pano seco"
10037-350 = "depois de lavar com detergente?!"
10037-360 = "Nesse tipo de coisa,\nusar jornal"
10037-370 = "é o que faz recuperar\no brilho verdadeiro!"
10037-380 = "Além disso, usar esse tipo de\nproduto de limpeza em locais fechados\né bastante perigoso."
10037-390 = "Não se esqueça de\nsempre ventilar o local ao usar!"
10037-400 = "Depois de garantir a segurança,\nvamos exterminar completamente\nos poluentes que ameaçam"
10037-410 = "o ambiente sanitário da Red Winter!"
10037-2600 = "Um equipamento impressionante,\ncom isso, poderemos eliminar os inimigos."
