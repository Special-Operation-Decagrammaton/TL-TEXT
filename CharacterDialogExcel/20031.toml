[translation]
20031-10 = "Blue Archive~"
20031-20 = "Ei, Sensei, bem-vindo à Estância Termal 227.\nNão se preocupe comigo, fique à vontade e relaxe."
20031-30 = "（De algum lugar...\nUm ar frio...）"
20031-40 = "（Essa sensação de agitação,\nhá quanto tempo...\nNão é ruim.）"
20031-50 = "Hmm~ que cheiro bom."
20031-60 = "Ué...? \nIsso estragou?"
20031-70 = "Este copo é...\nDaquele dia de inverno."
20031-80 = "Estância Termal 227, aberta para negócios."
20031-90 = "Bem-vindo, Sensei.\nAceita uma bebida de boas-vindas?"
20031-100 = "Hmm, acho que meu corpo está um pouco quente... \nprovavelmente porque fiquei mergulhada na água quente."
20031-110 = "Fiquei sabendo recentemente que, \nse você fermentar leite, \nparece que fica parecido com isso?"
20031-120 = "Ou seja, se eu usar \nleite de frutas..."
20031-130 = "Não me olhe com essa cara. \nEu não vou fazer isso."
20031-140 = "A Nodoka é incrível, né? \nEu acho que não tenho a mesma \npaixão que ela..."
20031-150 = "Se encontrar um urso na fonte termal, \nnão se assuste. \nEle é um dos nossos funcionários."
20031-160 = "……Claro, é brincadeira."
20031-170 = "Sensei, não se esforce demais. \nSe você sofrer, \nmuitas pessoas ficarão tristes."
20031-180 = "Feliz aniversário, Sensei. \nPreparei um banho especial para hoje. \nVamos juntos mais tarde."
20031-190 = "Hã, vai aproveitar sozinho?"
20031-200 = "Pooor quêêêê."
20031-210 = "Vai comprar algo gostoso para mim? \nPor causa do aniversário?"
20031-220 = "Fufu, o que será que eu escolho~"
20031-230 = "Bem, qualquer coisa que o Sensei me der \nestá ótimo."
20031-240 = "……Desde que não seja curry."
20031-250 = "（Espero que este ano \nseja parecido com o ano passado）"
20031-260 = "Ah, Sensei, fiz uma bebida que combina com peru, \nleve uma para você."
20031-270 = "A fermentação ainda... \nnão deve ter começado. \nAinda, né? Fufu."
20031-280 = "A abóbora, \ntanto pelo aroma quanto pelo açúcar, \nacho que é perfeita."
20031-290 = "Ah, estou falando do suco de abóbora. \nNão ligue, não ligue."
20031-310 = "Aqui, Sensei. \nEstá frio fora do cobertor, não está?"
20031-320 = "Não seja teimoso, \nvenha para cá."
20031-330 = "O cobertor está bem fofinho, \ne está quentinho, viu?"
20031-340 = "Acho que você vai pegar no sono rapidinho aqui."
20031-350 = "Se só o cobertor \nnão estiver aquecendo..."
20031-360 = "Eu posso ser sua bolsa de água quente."
20031-370 = "Hã? A bolsa de água quente que estava aqui...?"
20031-380 = "Bem... eu bebi o conteúdo."
20031-390 = "É que, dentro do cobertor... \nestava na temperatura perfeita \npara aquecer o Mols..."
20031-400 = "Quando estava trabalhando agora há pouco, \ntroquei o conteúdo da bolsa de água quente \npelo meu Mols especial."
20031-410 = "Mas... não tem jeito, né? \nJá que chegamos a esse ponto, \nnão tem outra forma de aquecer o corpo..."
20031-420 = "Então, hoje à noite, \no Sensei vai ser \na minha bolsa de água quente."
20031-2600 = "Bem, se não precisarmos usar armas, \nseria o ideal... \nMas se for necessário, não tem jeito, né."
