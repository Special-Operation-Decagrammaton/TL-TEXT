[translation]
20031-10 = "ブルーアーカイブ～"
20031-20 = "やっほ～先生、227号温泉郷へようこそ。\n私のことは気にせず、ゆっくりしてってね。"
20031-30 = "（どこからか\n冷たい空気が……）"
20031-40 = "（この賑やかな感じ、\n久しぶり……\n嫌いじゃない）"
20031-50 = "ん～いいにおい。"
20031-60 = "あれ……？\nこれダメに\nなっちゃった？"
20031-70 = "この一杯は……\nあの冬の日に。"
20031-80 = "227号温泉郷、営業開始だよ。"
20031-90 = "いらっしゃい、先生。\nウェルカムドリンクはいかが？"
20031-100 = "ん－熱めのお湯に浸かって\nたからかちょっと\n身体が火照ってるかも……。"
20031-110 = "最近知ったんだけど、\n牛乳を発酵させても\nそれっぽくなるらしいよ？"
20031-120 = "つまり、フルーツ牛乳を\n使えば……"
20031-130 = "そんな目で見ないでよ。\nやらないってば。"
20031-140 = "ノドカってすごいよねぇ。\n私にはノドカのような\n情熱はないんだろうなぁ……。"
20031-150 = "温泉で熊と出会っても\nビックリしないでね。\nうちの従業員なんだ。"
20031-160 = "……もちろん、冗談だけど。"
20031-170 = "先生、無理しないようにね。\n先生がつらい思いをすると、\n悲しむ子がいっぱいいるんだよ。"
20031-180 = "お誕生日おめでと、先生。\n今日のために特別なお\n風呂を用意したよ。\n後で一緒に行こうね。"
20031-190 = "えっ、ひとりで楽しむ？"
20031-200 = "なーんーでーさーー。"
20031-210 = "美味しいものを買ってくれるの？\n誕生日だから？"
20031-220 = "フフッ、何にしよっかな～。"
20031-230 = "ま、先生がくれるものなら\n何でもいいんだけどね。"
20031-240 = "……カレー以外なら。"
20031-250 = "（今年も、去年と同じような\n年だったらいいな）"
20031-260 = "あっ先生、七面鳥に合う\nドリンクを作ったから、\n一つ持ってってよ。"
20031-270 = "まだ発酵は……\nしてないはず。\nまだ、ね。ふふっ。"
20031-280 = "かぼちゃは、\n香り的にも糖分的にも\nピッタリだと\n思うんだよねぇ。  "
20031-290 = "あ、かぼちゃジュースの話ね。\n気にしない気にしない。"
20031-310 = "はい、先生。\nお布団の外は寒いでしょ？"
20031-320 = "意地張らないで\nこっちにおいでよ。"
20031-330 = "お布団もふかふかだし、\n温まってるよ？"
20031-340 = "こっちならすぐ寝付けると思う。"
20031-350 = "もし、お布団だけじゃ\n寒いなら……"
20031-360 = "私が湯たんぽの代わりになるよ。"
20031-370 = "え？元々あった湯たんぽ……？"
20031-380 = "えっとね……中身、\n飲んじゃった。"
20031-390 = "その、お布団の中がさ……\nモルスを温めるのに\nちょうどいい温度で……"
20031-400 = "さっき仕事してる時に、\n湯たんぽの中身を\n特製モルスに入れ替えたの。"
20031-410 = "でも……しょうがないよね？\nこうなっちゃった以上、\n体を温める方法は他にないし……"
20031-420 = "だから今夜は、\n先生が湯たんぽの\n代わりになってよ。"
20031-2600 = "まあ、武器の出番がないなら\nそれが一番だけど……\n必要なら、仕方ないよね。"
