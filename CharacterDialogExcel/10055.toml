[translation]
10055-10 = "Blue Archive"
10055-20 = "Ah, Sensei. Que tal uma bebida antes do trabalho? Hehe... Não é alcoólica, pode ficar tranquilo."
10055-30 = "Tem tantas coisas fofas aqui."
10055-40 = "Aquilo é...?"
10055-50 = "A temperatura ideal para a fermentação."
10055-60 = "Aqui é quentinho... Eu queria ficar aqui só mais um pouco."
10055-70 = "Vou misturar um pouco daquilo nisto..."
10055-80 = "Bem-vindo, Sensei. Eu estava à toa mesmo."
10055-90 = "Que tal conversarmos um pouco?"
10055-100 = "Bem-vindo de volta, Sensei. Você parece cansado..."
10055-110 = "Quer beber alguma coisa?"
10055-120 = "O Schale é bem iluminado e quentinho."
10055-130 = "Se eu ficar aqui distraída, vou acabar dormindo..."
10055-140 = "Hm? Quer que eu ajude em algo?"
10055-150 = "Da próxima vez, acho que eu vou convidar o Sensei."
10055-160 = "Hmm-hmm-hmm~♪"
10055-170 = "Por que eu misturei álcool na ração de compota antigamente, você pergunta?"
10055-180 = "Bem, vejamos..."
10055-190 = "Faz tanto tempo que nem consigo me lembrar... Hehe."
10055-200 = "Feliz aniversário, Sensei."
10055-210 = "Que tal uma compota comemorativa?"
10055-220 = "Falando nisso, hoje é meu aniversário, não é?"
10055-230 = "Não vou pedir nada absurdo, pode ficar tranquilo... Hehe."
10055-240 = "Feliz Ano Novo, Sensei."
10055-250 = "É Ano Novo, então um pouco de amazake não faz mal, né?"
10055-260 = "...Hm? Não pode?"
10055-270 = "Feliz Natal, Sensei. Tem algo que você queira?"
10055-280 = "Eu?"
10055-290 = "...Para mim, o que eu tenho agora já é o suficiente."
10055-300 = "Estou com vontade de tomar suco de abóbora."
10055-310 = "Claro que sem fermentação, né."
10055-330 = "Que vista noturna linda..."
10055-340 = "Obrigada por me mostrar uma paisagem tão maravilhosa, Sensei."
10055-350 = "...Fico feliz que diga isso, mas..."
10055-360 = "No fundo, eu ainda gosto de onde estou agora."
10055-370 = "...Em uma cidade como esta, não dá para ver as estrelas muito bem, né?"
10055-380 = "Com luzes tão fortes, fica difícil encontrar as estrelas..."
10055-390 = "Por isso, para mim, só de observá-las da escuridão já basta."
10055-400 = "Desde que eu esteja com alguém importante e tenha uma bebida gostosa..."
10055-410 = "O lugar não importa nem um pouco."
10055-2600 = "Este lança-granadas é bom para fazer fogo, mas não é muito prático para caçar. ...Mas bem, acho que serve para espantar ursos."
