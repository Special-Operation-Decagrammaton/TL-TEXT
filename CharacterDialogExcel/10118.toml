[translation]
10118-10 = "Blue Archive~!"
10118-20 = "Seja pilotando trens ou construindo trilhos!\nPode deixar comigo! Pahyahya!"
10118-30 = "Ah, então é aqui?\nHeh~"
10118-40 = "Acho que vou ficar aqui\nmatando o tempo hoje♪"
10118-50 = "Tem um monte de coisa\ninteressante aqui!\nDevia ter vindo\nmais cedo~"
10118-60 = "Eu tinha algo para dizer\nao Sensei, mas...\ncomo ele não está aqui...\nBem, tanto faz. Esqueci."
10118-70 = "Ah~ que relaxante~\nSinto que vou dormir aqui mesmo.\nMas talvez seja um desperdício\nde tempo, né? Aha!"
10118-80 = "Ei, vai me deixar\nesperando até quando?"
10118-90 = "Bem-vindo de volta, pahya."
10118-100 = "Sensei, você está atrasado!"
10118-110 = "Como você ousa deixar sua assistente esperando?"
10118-120 = "Bem, eu também acabei de chegar!"
10118-130 = "E então,\no que vamos fazer? Pode pedir qualquer coisa."
10118-140 = "Ah, mas nada de trabalho\nde escritório ou coisas do tipo."
10118-150 = "...\"Então não tem trabalho\"?"
10118-160 = "O Sensei só faz\nesse tipo de trabalho, né."
10118-170 = "Então eu vou te dar\num doce para comer."
10118-180 = "Pronto, abre a boca!"
10118-190 = "Pahyahya!"
10118-200 = "O Sensei tem um lado\nmeio desajeitado, né."
10118-210 = "Especificamente..."
10118-220 = "Claro que eu não vou te contar.\nPahyahya!"
10118-230 = "Ei, não está me cutucando\ndemais não?"
10118-240 = "Está entediado?"
10118-250 = "Se você vai ficar me provocando,\nespero que esteja preparado\npara as consequências, né?"
10118-260 = "Ah, eu não quero fazer\nnada chato, viu?"
10118-270 = "Hoje é o aniversário do Sensei, né?\nEu sei, viu♪"
10118-280 = "Feliz aniversário!\nBem, eu não tenho presente, mas..."
10118-290 = "Hã? Eu? Do que você está falando?"
10118-300 = "Ah, o que foi, o que foi?"
10118-310 = "Presente de aniversário? Sério!?"
10118-320 = "Pahya! Valeu.\nA Hikari e eu vamos cuidar muito bem disso."
10118-330 = "Já é um ano novo, hein~\nO que será que vai acontecer este ano?"
10118-340 = "Sensei,\nqual foi sua resolução de ano novo?"
10118-350 = "Essa época do ano me deixa\nmeio inquieta~"
10118-360 = "É como se eu estivesse\nflutuando, sabe?\nPor que será? Pahya."
10118-370 = "Vai ser super divertido\nficar com o Sensei!\nVamos passar o tempo juntos."
10118-380 = "Ah, esqueci os doces!"
10118-390 = "Desse jeito\nvou acabar levando uma travessura...\nO que eu faço?"
10118-410 = "O que achou da vista da cabine de comando?"
10118-420 = "Essa hora do dia é especialmente bonita."
10118-430 = "Eu gosto... do pôr do sol."
10118-440 = "Nós temos um sistema\nde condução automática,\nmas eu quase não uso."
10118-450 = "Porque não tem graça, né?\nDirigir é algo que você tem que\nfazer com as próprias mãos."
10118-460 = "Oh? O Sensei quer tentar também~?"
10118-470 = "Ahahahaha!\nÉ brincadeira, brincadeira!"
10118-480 = "O Sensei não tem licença de maquinista."
10118-490 = "Não importa o que aconteça,\neu não deixaria um amador tocar nos controles."
10118-2600 = "O que é isso? É para mim?\nOba♪ Com isso, vou varrer todos os obstáculos!\nPahyahya!"
