[translation]
10118-10 = "ブルーアーカイブ～！"
10118-20 = "列車操縦でも線路建設でも！\n何でも任せてよ！パヒャヒャッ！"
10118-30 = "あーここが例の？\nへぇ～"
10118-40 = "今日はここで\nサボってこっかな♪"
10118-50 = "面白そうなの\nいっぱいあるじゃん！\nもっと早く\n来ればよかった～"
10118-60 = "先生に言いたいこと\nあったんだけど、\nいないし……。\nま、いっか。忘れちゃった。"
10118-70 = "は～落ち着く～\nこのまま寝ちゃいそう。\nでもそれは時間が\nもったいないかも？あはっ！"
10118-80 = "ちょっと、\nいつまで待たせる気？"
10118-90 = "おかえりなさい、パヒャッ。"
10118-100 = "せんせーおそーい！"
10118-110 = "当番を待たせてどーすんのさ。"
10118-120 = "ま、私も今来たとこだけど！"
10118-130 = "んで、\n何すんの？何でも言ってよ。"
10118-140 = "あー、でも事務作業とか\nそういうのナシで。"
10118-150 = "……「それじゃ仕事がない」？"
10118-160 = "先生ってそういう\n仕事ばっかなんだ。"
10118-170 = "んじゃお菓子\n食べさせてあげるね。"
10118-180 = "はい、あーん！"
10118-190 = "パヒャヒャッ！"
10118-200 = "先生って不器用な\nとこあるよね。"
10118-210 = "具体的には……"
10118-220 = "教えるわけないでしょ。\nパヒャヒャッ！"
10118-230 = "ちょっと、\nつつきすぎじゃない？"
10118-240 = "暇なの？"
10118-250 = "ちょっかい出すんだから\nそれ相応の覚悟\n持ってるんだよね？"
10118-260 = "えー、つまんないことは\nやりたくないよー？"
10118-270 = "今日は先生の誕生日でしょ？\n知ってるって♪"
10118-280 = "お誕生日おめでとう！\nま、プレゼントはないけど。"
10118-290 = "は？私？何言ってんの？"
10118-300 = "え、なになに？"
10118-310 = "誕生日プレゼント？マジ！？"
10118-320 = "パヒャッ！どーも。\nヒカリと二人で大事にするよ。"
10118-330 = "もう新しい年かぁ～\n今年は何が起きるんだろうね。"
10118-340 = "先生、\n新年の抱負って何にした？"
10118-350 = "この時期って妙に\n落ち着かないんだよね～"
10118-360 = "なんかこう、\nふわふわするっていうか？\nなんでだろね？パヒャッ"
10118-370 = "先生といたら\nすっごく楽しそう！\n一緒に過ごそうね。"
10118-380 = "あっ、お菓子忘れた！"
10118-390 = "これじゃ\nイタズラされちゃうじゃん……\nどうしよ。"
10118-410 = "運転室からの景色はどう？"
10118-420 = "この時間帯は特に綺麗でさ。"
10118-430 = "好きなんだよね……夕暮れ。"
10118-440 = "自動運転システムも\nあるんだけど、\nあんま使わないんだ。"
10118-450 = "だってつまんないじゃん？\n運転はやっぱ自分の\n手でやらなきゃ。"
10118-460 = "お？先生もやってみる～？"
10118-470 = "あはははっ！\nじょーだんじょーだん！"
10118-480 = "先生は機関士の免許ないし。"
10118-490 = "いくらなんでも流石に\n素人に触らせないよ。"
10118-2600 = "何これ？くれるの？\nやりぃ♪これで障害物を一掃ってね！\nパヒャヒャッ！"
