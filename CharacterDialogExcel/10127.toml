[translation]
10127-10 = "ブルー、アーカイ……ブ？"
10127-20 = "わ、ワイルドハント芸術学院、桜井ミヨと申します。\nど、どうして私が呼ばれたのか分かりませんが……\nよろしくお願いします。"
10127-30 = "（ゆっくり\n原稿ができそうな\n場所……ないかな）"
10127-40 = "タイプライターを\n使ったら迷惑になって\nしまうでしょうか……。"
10127-50 = "皆さん、のびのびと……\nワイルドハントとは\n大違いです。"
10127-60 = "（先生……\nどんなコーヒーが\nお好きなのでしょう？）"
10127-70 = "ええと、あそこから進入して、脱出は……って、ここではそんなの探さなくてもいいのに……。"
10127-80 = "あ、先生……\nすみません、本に夢中で……。"
10127-90 = "えっ、書いているものですか？\n……か、完結してからの\nお楽しみです！"
10127-100 = "あの、何か困っていることは\nありませんか？"
10127-110 = "合法であれば、なんでも……。"
10127-120 = "気にせず執筆に\n集中していいんですか？\nそれが作家の仕事だから……？"
10127-130 = "先生を見ながら、\nお話を書きたいです……"
10127-140 = "理由がなきゃ……だめですか？"
10127-150 = "小説を書いていると、\n日常の何もかもが\n伏線に見えてしまうんです。"
10127-160 = "私がここへ来たのも……。"
10127-170 = "今日は、先生がワイルドハントに\nいらっしゃらないので……\n来ちゃいました。"
10127-180 = "こうして私の物語に\n登場してくれて……\nありがとうございます、先生。"
10127-190 = "ほしいもの、ですか？\nうーん……"
10127-200 = "２時間ほど、お話させて\nいただいてもいいでしょうか？"
10127-210 = "今日が、\n今年の一ページ目ですね。\nよければ、私と一緒に\n読み進めませんか？"
10127-220 = "メリークリスマスです。\n先生のほしいもの……\n調達してきますよ。"
10127-230 = "キャンディーです。\nあ～んしてください。"
10127-240 = "断ると……イタズラ、\nしちゃいますよ？"
10127-260 = "……こんなところで、\n何をされているんですか？"
10127-270 = "ずっと先生を\n探していたのに……。"
10127-280 = "さっきから\n少し苦しそうですが……。"
10127-290 = "もしかして、\nあまり体調が\n良くないのですか……？"
10127-300 = "なるほど、悪夢……。"
10127-310 = "きっと、罰が当たったんですよ。"
10127-320 = "最近、よくワイルドハントに\nいらしてるのに……。"
10127-330 = "一度も、\n私に連絡しなかったから。"
10127-340 = "……ふふ、冗談ですよ。"
10127-350 = "でも、こうやって先生に\nお会いできて……\n私、嬉しいです。"
10127-2600 = "もし叶うなら、\nこの瞬間を本にしたいです。\n私たちの思い出を……\nいつでも読み返せるように。"
