[translation]
10127-10 = "Blue... Archi... ve?"
10127-20 = "Eu, eu sou Sakurai Miyo, da Academia de Artes Wildhunt.\nEu, eu não sei por que fui chamada, mas...\nConto com você."
10127-30 = "(Será que não tem... um lugar onde eu possa terminar meu manuscrito com calma?)"
10127-40 = "Será que incomodaria se eu usasse a máquina de escrever...?"
10127-50 = "Todos aqui são tão relaxados... É bem diferente de Wildhunt."
10127-60 = "(Sensei... que tipo de café será que você gosta?)"
10127-70 = "Bem, entrar por ali e escapar por... ah, não preciso procurar por rotas de fuga aqui, né..."
10127-80 = "Ah, Sensei... Desculpe, eu estava imersa no livro..."
10127-90 = "Ah, o que estou escrevendo? ...É, é uma surpresa para quando eu terminar!"
10127-100 = "Diga, tem algo em que eu possa ajudar?"
10127-110 = "Se for algo legal, qualquer coisa..."
10127-120 = "Posso me concentrar na escrita sem me preocupar? É esse o trabalho de um escritor, afinal...?"
10127-130 = "Eu quero escrever uma história... observando o Sensei."
10127-140 = "Precisa de um motivo... para isso?"
10127-150 = "Quando escrevo romances, tudo no dia a dia começa a parecer um prenúncio."
10127-160 = "Até o fato de eu ter vindo para cá..."
10127-170 = "Hoje, como o Sensei não foi a Wildhunt... eu vim até você."
10127-180 = "Obrigada por aparecer na minha história... Sensei."
10127-190 = "Algo que eu quero? Hum..."
10127-200 = "Você poderia conversar comigo por umas duas horas?"
10127-210 = "Hoje é a primeira página deste ano. Se não se importar, gostaria de ler o resto comigo?"
10127-220 = "Feliz Natal. O que você quer, Sensei... eu vou conseguir para você."
10127-230 = "É um doce. Diga 'ah'."
10127-240 = "Se recusar... eu vou te pregar uma peça, viu?"
10127-260 = "...O que você está fazendo em um lugar como este?"
10127-270 = "Eu estive procurando pelo Sensei o tempo todo..."
10127-280 = "Você parece um pouco angustiado desde agora..."
10127-290 = "Por acaso, você não está se sentindo bem...?"
10127-300 = "Entendo, um pesadelo..."
10127-310 = "Com certeza foi um castigo."
10127-320 = "Você tem vindo tanto a Wildhunt ultimamente..."
10127-330 = "Mas não entrou em contato comigo nenhuma vez."
10127-340 = "...Fufu, é brincadeira."
10127-350 = "Mas, estou feliz... por poder encontrar o Sensei assim."
10127-2600 = "Se fosse possível, eu gostaria de transformar este momento em um livro. Para que nossas memórias... possam ser lidas a qualquer momento."
