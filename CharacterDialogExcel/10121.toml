[translation]
10121-10 = "ぶる～！あーかいぶ～！"
10121-20 = "百花繚乱紛争調停委員会、勘解由小路ユカリ……\n華麗にさま～でびゅ～、ですの！\nびーちでも活躍して参りますわ！"
10121-30 = "いつ何時でも、\n身共は\nぱ～ふぇくと！ですの！"
10121-40 = "ああっ！\nこれは先生が\n仰っていた……！"
10121-50 = "これは……？\n海でのえちけっと、\nなるものでしょうか？"
10121-60 = "少し肌寒いような……\nっくしゅっ！"
10121-70 = "ふん～ふふん～\n超無敵の～\nユカリ出動ですわ～♪"
10121-80 = "せんせーっ！！\n海ですわ、海ーっ！！"
10121-90 = "お仕事が終わりましたら、\n一緒にお出かけしませんか？"
10121-100 = "「島々や\n千々に砕きて\n夏の海――」"
10121-110 = "……あっ、先生！\nお待ちしておりましたわ！"
10121-120 = "さすがは先生ですの！\n海を前にしても\n動じないその御姿……。"
10121-130 = "身共は楽しくて\nうきうきして、\nずっと落ち着かないと\nいうのに……"
10121-140 = "これが真の大人、\nなのですね！\nぜひお手本と\nさせてくださいまし！"
10121-150 = "どうしてこんなに時間が\n過ぎるのは早いのでしょう……"
10121-160 = "はっ……！これがかの有名な、\nさま～たいむですの！？"
10121-170 = "ふんふふんふ～ん♪"
10121-180 = "えっ？仕事中でも楽しそう？"
10121-190 = "ええ！楽しいですの！\nだって、先生と一緒ですから！"
10121-200 = "集中、集中……。"
10121-210 = "ああっ……！\nやはりこの時間が楽しすぎて、\n集中できませんの！"
10121-220 = "先生、\n身共は一体どうすれば……！！"
10121-230 = "ひ、ひゃあっ！？"
10121-240 = "い、居眠りなんて\nしていませんわ！"
10121-250 = "えり～とたる者、\n水遊びで疲れる、など……。"
10121-260 = "はあっぴば～すで～！\n今年初めてのお祝いは\n身共がちょうだいしますの！"
10121-270 = "ああっ！\nもしかして身共が最初では\nなかったでしょうか……？"
10121-280 = "でも、それはよいことですわ！"
10121-290 = "先生を想ってくださる方が、\nそれだけいると\nいう証左ですもの！"
10121-300 = "あっ、先生。\n身共の誕生日、覚えて\nくださっていたのですね。"
10121-310 = "身共、沢山の方に\n祝っていただいて……\n本当に幸せ者だと感じました。"
10121-320 = "でもやっぱり……\n先生からのお言葉が一番、\nほしくて……。"
10121-330 = "身共ったら、\n欲張りな子です……。"
10121-340 = "はあっぴにゅ～いや～、\nですの！"
10121-350 = "謹んで新年のご挨拶を\n申し上げますわ！"
10121-360 = "できることなら、\nこのまま一日先生と\n過ごしたいのですが……。"
10121-370 = "新年は一番気が緩む時期……\n百花繚乱は忙しくなるのです！"
10121-380 = "今日は生憎と\nご一緒できませんが……。"
10121-390 = "その代わり、\n今年も一緒にふぁいと～！\nしていただきますの！"
10121-400 = "よろしくお願い致しますね、\n先生！"
10121-410 = "先生！\nめり～くりすま～すですわ！"
10121-420 = "先生と一緒に来る冬の海は……\n風情がありますの。"
10121-430 = "もちろん、\n海には入りませんわ！"
10121-440 = "こうして一緒にいるだけで……\n幸せですから。"
10121-450 = "ふっふん！身共、\n新しい文化を\n身につけましたの！"
10121-460 = "今日はもんすた～に扮して、\nきゃんでぃをいただく日だと！"
10121-470 = "ああっ……！\nでも水着では、もんすたーに\nなれないのでは！？"
10121-490 = "（先生！身共を探しに\nいらしてくださったの\nですね！）"
10121-500 = "（いつもは遠くから\n見ていただけの海が……。）"
10121-510 = "（こんなにも美しい\n光景を秘めていたなんて。）"
10121-520 = "（それを、先生とこうして\n二人で眺めることが\nできるだなんて……。）"
10121-530 = "（ああ、身共はなんて\n幸せ者なのでしょう。）"
10121-540 = "（あれ……先生？\nなんだか顔色が……？）"
10121-550 = "（身共、何かおかしな\nことでも？）"
10121-560 = "（上……？上にはお日様しか\nありませんよ……。）"
10121-570 = "（え……？\nそうじゃない……？）"
10121-2600 = "これは身共と先生の約束のしるしです。\nきっと、これを見るたびに、身共は先生の\nことを思い浮かべるのでしょう。\nまったく……先生はいけずなお方です。"
