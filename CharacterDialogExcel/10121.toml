[translation]
10121-10 = "Blue! Archive!"
10121-20 = "Do Comitê de Mediação de Conflitos Hyakkiyako, Kageyama Yukari... \nUma estreia de verão esplêndida, é o que digo! \nTambém farei um ótimo trabalho na praia!"
10121-30 = "A qualquer momento, \neu sou \nperfeita! É o que digo!"
10121-40 = "Ah! \nIsso é o que o \nSensei estava dizendo...!"
10121-50 = "Isto é...? \nSeria algo chamado \netiqueta na praia?"
10121-60 = "Está um pouco frio... \nAtchim!"
10121-70 = "Hum-hum-hum~ \nA super invencível \nYukari está entrando em ação~♪"
10121-80 = "Sensei!! \nÉ o mar, o mar!!"
10121-90 = "Quando o trabalho terminar, \npodemos sair juntos?"
10121-100 = "“Ilhas e mais ilhas \nquebradas em mil pedaços \nno mar de verão――”"
10121-110 = "...Ah, Sensei! \nEu estava esperando por você!"
10121-120 = "Como esperado do Sensei! \nMesmo diante do mar, \nessa sua postura imperturbável..."
10121-130 = "Eu estou tão animada \ne empolgada, \nque não consigo ficar \nquieta de jeito nenhum..."
10121-140 = "Então é isso que significa \nser um adulto de verdade! \nPor favor, deixe-me \nseguir o seu exemplo!"
10121-150 = "Por que o tempo passa \ntão rápido assim..."
10121-160 = "Ah...! Seria este o famoso \nhorário de verão!?"
10121-170 = "Hum-hum-hum-hum~♪"
10121-180 = "Hã? Parece que estou me divertindo mesmo durante o trabalho?"
10121-190 = "Sim! É divertido! \nAfinal, estou com o Sensei!"
10121-200 = "Foco, foco..."
10121-210 = "Ah...! \nComo esperado, este momento é tão divertido \nque não consigo me concentrar!"
10121-220 = "Sensei, \no que eu devo fazer...!!"
10121-230 = "Ai, ahhh!?"
10121-240 = "Eu, eu não estava \ncochilando!"
10121-250 = "Alguém que é da elite \nnão deveria se cansar \npor causa de brincadeiras na água..."
10121-260 = "Feliz aniversário! \nEu serei a primeira a \ncomemorar este ano!"
10121-270 = "Ah! \nSerá que eu não fui \na primeira...?"
10121-280 = "Mas isso é algo bom!"
10121-290 = "É a prova de que existem \ntantas pessoas que \ncarregam o Sensei no coração!"
10121-300 = "Ah, Sensei. \nVocê se lembrou do \nmeu aniversário."
10121-310 = "Eu recebi parabéns de \ntantas pessoas... \nSenti que sou uma pessoa \nrealmente feliz."
10121-320 = "Mas, ainda assim... \nAs palavras do Sensei são as que \neu mais queria ouvir..."
10121-330 = "Eu sou mesmo \numa criança gananciosa..."
10121-340 = "Feliz ano novo, \né o que digo!"
10121-350 = "Desejo a você \num feliz ano novo!"
10121-360 = "Se fosse possível, \neu gostaria de passar o dia \ntodo com o Sensei..."
10121-370 = "O ano novo é a época em que as pessoas ficam mais relaxadas... \nO comitê Hyakkiyako fica muito ocupado!"
10121-380 = "Infelizmente, hoje \nnão poderemos ficar juntos..."
10121-390 = "Em troca, \neste ano também vamos \nlutar juntos!"
10121-400 = "Conto com você, \nSensei!"
10121-410 = "Sensei! \nFeliz Natal!"
10121-420 = "O mar de inverno que venho ver \ncom o Sensei... \nTem um charme especial."
10121-430 = "Claro, \neu não vou entrar \nna água!"
10121-440 = "Só de estar aqui com você... \nEu já me sinto feliz."
10121-450 = "Humph! Eu, \naprendi uma \ncultura nova!"
10121-460 = "Que hoje é o dia de se fantasiar de monstro \ne ganhar doces!"
10121-470 = "Ah...! \nMas de roupa de banho, \nserá que dá para virar um monstro!?"
10121-490 = "(Sensei! Você veio \nme procurar, \nnão foi!)"
10121-500 = "(O mar que eu sempre \nvia de longe...)"
10121-510 = "(Quem diria que ele escondia \numa visão tão \nbonita assim.)"
10121-520 = "(Poder contemplar isso assim, a sós com o Sensei...)"
10121-530 = "(Ah, como eu sou uma pessoa afortunada.)"
10121-540 = "(Hm...? Sensei? Por que o seu rosto está com essa cor...?)"
10121-550 = "(Eu disse algo estranho, por acaso?)"
10121-560 = "(Acima...? Não há nada acima além do sol...)"
10121-570 = "(Eh...? Não é isso...?)"
10121-2600 = "Este é o símbolo da promessa entre mim e o Sensei. Com certeza, toda vez que eu olhar para isso, me lembrarei do Sensei. Realmente... o Sensei é uma pessoa travessa."
