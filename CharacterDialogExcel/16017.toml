[translation]
16017-10 = "ブ、ブルーアーカイブ……でいいんですか……？"
16017-20 = "ハ、ハイランダー鉄道学園……\nう、内海、アオバです……\nよろしくしないで、いいですけど……"
16017-30 = "み、みんな、笑顔……\n人生、楽しそうで\nいいですね……。"
16017-40 = "ここは……\n広いですね……うちの\n宿直室もこれくらい\nスペースがあれば……。"
16017-50 = "わ、私ここに\nいていいん\nでしょうか……？"
16017-60 = "（なんだか油の臭いが\n染みついちゃってる\n気が……最悪ですけど）"
16017-70 = "落ち着いて深呼吸……\nすー、はー！"
16017-80 = "あ、おかえりなさい、です。\n先生。"
16017-90 = "な、何かお仕事とか\nありませんか？"
16017-100 = "このオフィス……\nなんだか落ち着く\n匂いがする……。"
16017-110 = "あ、はっ……！\nひ、独り言のつもり\nだったんですけど……！？"
16017-120 = "手伝えそうな\nことがあったら、\n声をかけてください……。"
16017-130 = "な、直してほしいものとか、\nありませんか……？"
16017-140 = "修理くらいなら、\nできますけど……。"
16017-150 = "……その……給湯室に\nあった駄菓子って"
16017-160 = "……た、食べても\nいいんですか……？"
16017-170 = "ハイランダーでは\nこんなおやつ、\nで、でませんけど……。"
16017-180 = "へへ……いただきます！"
16017-190 = "あの……書類とかは、\nちょっと……ですが……"
16017-200 = "簡単な計算くらいなら、\nできると……\n思いますけど……。"
16017-210 = "そ、その……"
16017-220 = "宿直室からカップ麺を\nもってきたんですけど……"
16017-230 = "せ、先生も一緒に……\n食べます……？"
16017-240 = "その……\n今日、お誕生日と\n聞いたんですけど……"
16017-250 = "さ、差し上げられるもの\nこれくらいしか……\nその……"
16017-260 = "スパナ、どうぞ！"
16017-270 = "お誕生日、\nおめでとうございます……！"
16017-280 = "はいいっ！？\nえっ！そのっ！"
16017-290 = "私の誕生日で……\nあってますけど……！"
16017-300 = "う、うう……っ"
16017-310 = "き、期待していなかったと\n言えば噓になります、けどっ！"
16017-320 = "……ありがとうございます……\nすごく……嬉しいです。"
16017-330 = "今年が良い年であるよう……"
16017-340 = "ちょっとくらい、\n期待してみても\nいいですけど。"
16017-350 = "クリスマス……\nプレゼント……。"
16017-360 = "いや……さすがにそれは\n望みすぎっていうか……。"
16017-370 = "期待すると\n後がつらいだけだし……"
16017-380 = "考えるのやめよ……。"
16017-390 = "か、仮装はちょっと……\nあんまり……。"
16017-400 = "そういうのって、\n似合う人がするものだと、\n思いますけど……。"
16017-420 = "こ、来ないで\nほしいんです……\nけど……！"
16017-430 = "ふ、服に……っ！"
16017-440 = "油の匂いが\nついちゃうんで……\nよ、よくないんで……！"
16017-450 = "す、すぐ脱ぐので……\nそ、そこで待ってて……\nくださいっ！"
16017-460 = "え？ 一体……\nどういう……？"
16017-470 = "あっ……えっと……"
16017-480 = "あああっ！？\nそ、そのっ！"
16017-490 = "う、うわぁああああっ！"
16017-2600 = "む、ムカつく人がいたら……\nこ、これで撃ち抜いちゃえば\nいいんですよね……？"
