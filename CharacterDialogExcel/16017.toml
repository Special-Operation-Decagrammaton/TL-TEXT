[translation]
16017-10 = "B-Blue Archive... é isso mesmo...?"
16017-20 = "D-da Academia Ferroviária Highlander...\nE-Utsumi Aoba...\nNão precisa ser gentil comigo, mas..."
16017-30 = "To-todos, sorrindo...\nA vida parece tão divertida,\né bom, né..."
16017-40 = "Aqui é...\nBem espaçoso...\nSe o meu dormitório tivesse\nesse espaço todo..."
16017-50 = "E-eu posso mesmo\nficar aqui...?"
16017-60 = "(Sinto que o cheiro de óleo\nficou impregnado em mim...\nQue situação horrível)"
16017-70 = "Respire fundo e se acalme...\nInspira, expira!"
16017-80 = "Ah, bem-vindo de volta.\nSensei."
16017-90 = "T-tem algum trabalho\npara eu fazer?"
16017-100 = "Este escritório...\nTem um cheiro que\nme deixa calma..."
16017-110 = "Ah, ah...!\nE-eu pretendia falar\nsozinha, mas...!"
16017-120 = "Se tiver algo em que\neu possa ajudar,\npor favor, me chame..."
16017-130 = "T-tem algo que você\nqueira que eu conserte...?"
16017-140 = "Se for apenas reparos,\neu consigo fazer..."
16017-150 = "……Aquele…… doce que\nestava na copa"
16017-160 = "……D-dá para\ncomer...?"
16017-170 = "Na Highlander\nnão dão esse tipo\nde lanche..."
16017-180 = "Hehe... vou aceitar!"
16017-190 = "Bem... documentos e coisas assim,\neu não sou muito boa, mas..."
16017-200 = "Cálculos simples,\neu acho que\nconsigo fazer..."
16017-210 = "E-então..."
16017-220 = "Eu trouxe um macarrão instantâneo\ndo dormitório..."
16017-230 = "S-Sensei, você quer...\ncomer junto...?"
16017-240 = "Bem...\nOuvi dizer que hoje\né seu aniversário..."
16017-250 = "É a única coisa que\neu posso te dar...\nBem..."
16017-260 = "Tome, uma chave inglesa!"
16017-270 = "Feliz\naniversário...!"
16017-280 = "Hã!?\nEh! Isso! Aquilo!"
16017-290 = "É o meu aniversário...\nSim, é verdade...!"
16017-300 = "U-uuu..."
16017-310 = "S-seria mentira dizer que\neu não estava esperando, mas!"
16017-320 = "……Muito obrigada……\nEstou…… muito feliz."
16017-330 = "Que este ano seja bom..."
16017-340 = "Eu acho que posso\nesperar um pouco."
16017-350 = "Presente de...\nNatal..."
16017-360 = "Não... acho que isso\né pedir demais..."
16017-370 = "Criar expectativas só\ntraz decepção depois..."
16017-380 = "Vou parar de pensar nisso."
16017-390 = "F-fantasia é um pouco...\nNão é muito a minha cara..."
16017-400 = "Acho que esse tipo de coisa\né para quem combina com isso..."
16017-420 = "N-não chegue perto...\nPor favor...!"
16017-430 = "Na minha roupa...!"
16017-440 = "O cheiro de óleo\nvai passar para você...\nN-não é bom...!"
16017-450 = "V-vou tirar logo...\nE-espere aí...\nPor favor!"
16017-460 = "Eh? O que...\nComo assim...?"
16017-470 = "Ah... bem..."
16017-480 = "Aaaah!?\nI-isso!"
16017-490 = "U-uwaaaaaaah!"
16017-2600 = "S-se tiver alguém que te irrita...\nÉ só dar um tiro nele\ncom isso, né...?"
