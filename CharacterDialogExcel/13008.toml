[translation]
13008-20 = "Sou a Kuromi Serika. Já vou avisando, já que vou estar com você, trate de levar isso a sério, entendeu?"
13008-30 = "Hmm, será que eu deveria ter sido um pouco mais gentil com ele?"
13008-40 = "Ainda não está na hora de ir para o trabalho de meio período..."
13008-50 = "Será que você está procurando por um trabalho de meio período aqui..."
13008-60 = "Uau! Que feliz..."
13008-70 = "Ahaha."
13008-80 = "Bem-vindo, Sensei. Eu estava te esperando."
13008-90 = "…Quer dizer, não, não é isso! Eu não estava esperando tanto assim!"
13008-100 = "Pelo menos enquanto eu estiver aqui, trabalhe direito."
13008-110 = "…Eu também vou ajudar."
13008-120 = "Estou em espera agora. Algum problema?"
13008-130 = "Escuta aqui. Se você tem tempo livre, vá fazer o que precisa ser feito!"
13008-140 = "(Já que estou tão perto de você, preste um pouco mais de atenção em mim...)"
13008-150 = "Não é bom se esforçar demais, sabia? Se precisar, eu posso te ajudar."
13008-160 = "Ei, fe-feliz aniversário. E, obrigada por estar sempre comigo."
13008-170 = "…N-não ria!"
13008-180 = "Hã? Aniversário. Ah... obrigada. Você... se lembrou..."
13008-190 = "Ehehe!"
13008-200 = "Ano Novo, hein... Talvez ir ao templo..."
13008-210 = "N-não é como se eu quisesse ir com você, tá?!"
13008-220 = "Feliz Natal! De qualquer forma, o Sensei deve estar livre no Natal, né?"
13008-230 = "É uma pena ficar sozinho... Então, só por hoje, eu vou te fazer companhia!"
13008-240 = "Iih! N-não é como se eu estivesse com medo, tá?"
13008-250 = "Doces em formato de olho ou cabeças de abóbora, não dão medo nenhum, sabia?"
13008-270 = "(Tenho que me esforçar mais. Não posso deixar que esta cidade desapareça...)"
13008-280 = "Agora... eu tenho um adulto em quem posso confiar..."
13008-290 = "Sensei, venha aqui. Quer subir comigo?"
13008-300 = "…Ahaha, brincadeira. Isso seria impossível, né?"
13008-310 = "Ei, você está ouvindo? O clima está super sério agora."
13008-320 = "…Francamente."
13008-330 = "…Hm? Disse que fiz um bom trabalho?"
13008-340 = "Como assim, você sabe do meu esforço..."
13008-350 = "Q-que história é essa?! Pare de tentar me consolar do nada!!"
13008-360 = "I-isso é diferente, só entrou um cisco no meu olho...!"
13008-370 = "(Mas se não fosse pelo Sensei... talvez eu tivesse desistido muito antes.)"
13008-380 = "O-o que foi?! Por que você está parado aí me olhando...?"
13008-390 = "Pode apertar para mim?"
13008-400 = "N-não está tudo bem! E se alguém vir a gente?!"
13008-410 = "…N-não é nada!!"
13008-420 = "Se descobrirem que estou aqui num encontro a sós com o Sensei..."
13008-2600 = "Beleza, acho que assim posso ser útil para todo mundo!"
