[translation]
13008-20 = "黒見セリカよ。\n言っとくけど私が一緒になる以上\n真面目にやってよね？"
13008-30 = "うーん、少しは\n親切にしてあげた方が\nよかったかな。"
13008-40 = "バイトに行く時間は…\nまだみたい。"
13008-50 = "ここ、アルバイト\n探してたりとかって…"
13008-60 = "わあ！うれし…"
13008-70 = "あはは。"
13008-80 = "ようこそ先生。\n待ってたわよ。"
13008-90 = "…って違う違う！\nそんなに待ってないから！"
13008-100 = "私がいる時ぐらいは\n真面目に働いてよ。"
13008-110 = "…私も手伝うからさ。"
13008-120 = "今待機中。\n何か用？"
13008-130 = "あんたね。\nそんな暇があったら、\nやるべきことをやんなさいよ！"
13008-140 = "（私がこんなに\nそばにいるんだから\n少しは興味を持ってよ…）"
13008-150 = "あまり無理するのも\n良くないよ？必要なら\n私が手伝ってもいいよ。"
13008-160 = "あの、お、お誕生日\nおめでとう。あと、いつも\n一緒にいてくれてありがとう。"
13008-170 = "…わ、笑うな！"
13008-180 = "え？誕生日。\nあ…ありがとう。\n覚えて…くれてたのね…。"
13008-190 = "えへへ！"
13008-200 = "正月か…。\n初詣でも…。"
13008-210 = "べ、別に一緒に行きたいって\nわけじゃないんだからね？！"
13008-220 = "メリークリスマ～ス\nどうせ先生は、\nクリスマスも暇でしょう？"
13008-230 = "独りぼっちは\nかわいそうだから…。\n今日だけは相手してあげる！"
13008-240 = "ひっ！\nべ、別にちっとも怖くないし？"
13008-250 = "目玉のキャンディーとか\nカボチャの頭とか\n本当にちっとも怖くないけど？"
13008-270 = "（もっと頑張るしかない。\nこの町が無くなりそうなのを\n放っておくわけには\nいかないから…）"
13008-280 = "今は…\n頼れる大人もいるから…。"
13008-290 = "先生、こっちに来て。\n私と一緒に乗る？"
13008-300 = "…あはは、冗談だよ。\nいくらなんでも\nそれは無理だよね。"
13008-310 = "あの～、聞いてる？\n今めっちゃ真面目な\n雰囲気なんだから。"
13008-320 = "…まったく。"
13008-330 = "…うん？ご苦労様って？"
13008-340 = "私の努力を\nよく知ってるって、何それ…。"
13008-350 = "な、何の話？！いきなり\n慰めてくるのはやめて！！"
13008-360 = "こ、これは違うの、\n目にゴミが入っただけよ…！"
13008-370 = "（でも先生じゃなかったら…\n私はもっと前に\n諦めてたかもしれない）"
13008-380 = "な、なに？！何で\nそんなにじっとしているの…？"
13008-390 = "押してくれる？"
13008-400 = "だ、大丈夫じゃないわ！\n誰かが見てたら\nどうするつもり！"
13008-410 = "…な、なんでもないわよ！！"
13008-420 = "こ、こうやって先生と\n二人っきりでデートしてる\nことがバレてしまったら…。"
13008-2600 = "よし、これなら少しは\nみんなの役に立てると思う！"
