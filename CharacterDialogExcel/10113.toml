[translation]
10113-10 = "ブルー、アーカイブ。"
10113-20 = "こんにちは、先生。\nゲヘナ学園救急医学部所属の氷室セナです。今日はお休みなので……よかったら一緒にお出かけしませんか？"
10113-30 = "ここは\n安全みたいですね。"
10113-40 = "穏やかな空間ですが、\n気を緩めては\nなりません。"
10113-50 = "先生と一緒に\n来てみたい\nですね……。"
10113-60 = "あの家具の配置……\n少し気になりますね。"
10113-70 = "こういう場所こそ、\n死た…負傷者が出ないよう\n注意しないとなりません。"
10113-80 = "おかえりなさい、先生。"
10113-90 = "せっかくのお休みなので、\nシャーレに\n立ち寄ってみました。"
10113-100 = "先生は勤務中で、\n私はお休み……"
10113-110 = "せっかくですし、今日一日だけ\n先生もお休みにしませんか？"
10113-120 = "趣味……？\n薬品の整理と待機、\nでしょうか。"
10113-130 = "一般的な趣味ではないと、\n分かっていますが……"
10113-140 = "私はそれなりに\n楽しんでいますよ。"
10113-150 = "シャーレでの待機も\n楽しいものですね。"
10113-160 = "ここには先生が\nいらっしゃるので。"
10113-170 = "私と一緒で\nやりにくかったりしませんか？"
10113-180 = "……むしろ嬉しい？"
10113-190 = "ありがとうございます。"
10113-200 = "では、私も素直に\n喜ぶべきなのでしょう。"
10113-210 = "海、ですか？"
10113-220 = "そう、ですね……好きな理由"
10113-230 = "私と縁遠いように見える、\nというのは分かります。"
10113-240 = "ですが海でなら\n変わったした……"
10113-250 = "……失礼。\n負傷者を確認できそうなので。"
10113-260 = "うまく言葉にできませんが、\n先生と過ごす時間は――"
10113-270 = "私にとってすごく\n新鮮なのです。"
10113-280 = "特別な時間、といいますか。"
10113-290 = "先生は……\n私の大切な人という意味です。"
10113-300 = "お誕生日\nおめでとうございます、\n先生。"
10113-310 = "ケーキや糖分の摂り過ぎには\n注意してください。"
10113-320 = "万が一の際には、\n私が応急処置に\n当たりますので。"
10113-330 = "本日は私の誕生日です。"
10113-340 = "え？ケーキを買ってある……？"
10113-350 = "……。"
10113-360 = "ありがとうございます、先生。\nでは最初の一口は\n先生にお譲りします。"
10113-370 = "新年ですね。\n今年一年も健康な日々で\nありますように。"
10113-380 = "クリスマスは素敵な日です。"
10113-390 = "怪我や火災、体調不良などの\n不安要素を除けば、ですが。"
10113-400 = "そう心配しないでください。\n私がここに居ますから。"
10113-410 = "ハロウィーンですね。\n糖類の過剰な摂取に\n気をつけてください。"
10113-420 = "先生を思ってのことですよ。\n本当に。"
10113-440 = "……たしかに、\n少し水が冷たいですね。"
10113-450 = "これでは低体温症に\nなってしまうかもしれません。"
10113-460 = "人によっては、意識が\n朦朧とする場合もありますので。"
10113-470 = "ああ、これが……"
10113-480 = "「雰囲気」を台無しに\nしてしまう、ですね。"
10113-490 = "……自分自身でも、\n少し驚いています。"
10113-500 = "ですが、こうして新しい\n出来事がたくさんあった\n一日を過ごしたのなら、"
10113-510 = "今回だけは、新しい\n言葉を、使ってみるのも\nいいかもしれません。"
10113-520 = "……この水は本当に、\n冷たいです。"
10113-530 = "でも……不快な冷たさでは、\nありません。"
10113-2600 = "休日でも手入れは大事です。\n死た……負傷者にこちらの\n事情など分からないのですから。"
