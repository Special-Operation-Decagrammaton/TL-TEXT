[translation]
10113-10 = "Blue Archive."
10113-20 = "Olá, Sensei.\nSou Himuro Sena, do Departamento de Medicina de Emergência da Academia Gehenna. Hoje é minha folga, então... se não se importar, gostaria de sair comigo?"
10113-30 = "Parece que aqui\né seguro."
10113-40 = "É um ambiente calmo,\nmas não podemos\nbaixar a guarda."
10113-50 = "Eu adoraria vir\naqui com o\nSensei..."
10113-60 = "Aquela disposição dos móveis...\nme deixa um pouco intrigada."
10113-70 = "É justamente em lugares assim que\ndevo ficar atenta para que\nninguém se machuque."
10113-80 = "Bem-vindo de volta, Sensei."
10113-90 = "Como hoje é minha folga,\nresolvi dar uma passada\nno Schale."
10113-100 = "O Sensei está trabalhando,\ne eu estou de folga..."
10113-110 = "Já que estamos aqui, por que o Sensei\nnão tira o dia de folga também?"
10113-120 = "Hobbies...? Acho que\norganizar medicamentos\ne ficar de prontidão."
10113-130 = "Sei que não é um hobby\ncomum, mas..."
10113-140 = "Eu me divirto bastante\ndo meu jeito."
10113-150 = "Ficar de prontidão no Schale\ntambém é divertido."
10113-160 = "Porque o Sensei\nestá aqui."
10113-170 = "Não fica desconfortável\ncomigo por perto?"
10113-180 = "...Na verdade, você fica feliz?"
10113-190 = "Muito obrigada."
10113-200 = "Então, acho que devo\naceitar isso com alegria."
10113-210 = "O mar, você diz?"
10113-220 = "Bem... sobre o motivo de eu gostar..."
10113-230 = "Entendo que pareça algo\nque não combina comigo."
10113-240 = "Mas no mar, talvez eu pudesse..."
10113-250 = "...Perdão.\nAcho que vi alguém ferido."
10113-260 = "Não sei explicar direito, mas o tempo\nque passo com o Sensei é..."
10113-270 = "Algo extremamente\nnovo para mim."
10113-280 = "Um momento especial, por assim dizer."
10113-290 = "Sensei... você é\nalguém muito importante para mim."
10113-300 = "Feliz aniversário,\nSensei."
10113-310 = "Por favor, tome cuidado para não\nexagerar no bolo ou nos doces."
10113-320 = "Se acontecer qualquer coisa,\neu farei os primeiros socorros."
10113-330 = "Hoje é o meu aniversário."
10113-340 = "Hã? Você comprou um bolo...?"
10113-350 = "..."
10113-360 = "Muito obrigada, Sensei.\nEntão, deixo a primeira\nfatia para você."
10113-370 = "Ano novo, não é?\nQue este ano seja repleto\nde saúde para você."
10113-380 = "O Natal é um dia maravilhoso."
10113-390 = "Isso se ignorarmos os riscos de\nferimentos, incêndios ou mal-estar."
10113-400 = "Não se preocupe tanto.\nEu estou aqui com você."
10113-410 = "É Halloween.\nCuidado com o consumo\nexagerado de açúcar."
10113-420 = "Estou dizendo isso por sua causa.\nDe verdade."
10113-440 = "...Realmente,\na água está um pouco fria."
10113-450 = "Isso pode acabar causando\numa hipotermia."
10113-460 = "Dependendo da pessoa, a consciência\npode ficar um pouco turva."
10113-470 = "Ah, então é isso..."
10113-480 = "É isso que chamam de\n\"estragar o clima\", não é?"
10113-490 = "...Até eu mesma\nestou um pouco surpresa."
10113-500 = "Mas, se passei um dia com tantas\nexperiências novas como hoje,"
10113-510 = "talvez não seja má ideia\nusar palavras novas\npela primeira vez."
10113-520 = "……esta água é realmente\nfria."
10113-530 = "Mas…… não é um frio\ndesagradável."
10113-2600 = "Mesmo nos dias de folga, a manutenção é importante.\nAfinal, os mortos…… os feridos não entendem a nossa\nsituação."
