[translation]
10141-10 = "ブルー……アーカイ……ブ。"
10141-20 = "お、お見苦しい格好かもしれませんが……\nよ、よろしくお願いします……。"
10141-30 = "（この格好……\n調子に乗っていると\n思われない\nでしょうか……？）"
10141-40 = "えっと、\n一番目立たない\n場所は……。"
10141-50 = "コーヒー、\nいい匂い……えへへ。"
10141-60 = "ここにまで\n追ってきたりは\n……ないですよね？"
10141-70 = "お土産にしたら……\nき、きっと\n喜んでくれますよね？"
10141-80 = "こ、こんにちは、先生！"
10141-90 = "あ……ど、ドレス姿、"
10141-100 = "や、やっぱり変、\nでしょうか……？"
10141-110 = "お、おかえりなさい、先生！"
10141-120 = "ええと……\n気を引き締めようと思って、\nこの格好にしたのですが……。"
10141-130 = "いつでも命令してください……！\n爆弾はたくさんありますので！"
10141-140 = "あ、あの……\n何か御用はありませんか？"
10141-150 = "……え？休んでていい？"
10141-160 = "で、ですが、\n今は仕事中、ですよね……。"
10141-170 = "そ、そんなに\n見つめられると……"
10141-180 = "は、恥ずかしいです……。"
10141-190 = "人事を尽くして……\n全力で……\n手段は問わずに……。"
10141-200 = "お誕生日おめでとうございます、\n先生。"
10141-210 = "わ、私からの\nお祝いなんかでよければ……\nどうぞ、受け取ってください！"
10141-220 = "た、誕生日……私の！？\nえっ、ええっ！？"
10141-230 = "祝ってくださるんですか！？"
10141-240 = "ど、どうしましょう……\nパーティーの\n準備なんてできてなくて……。"
10141-250 = "明けましておめでとう\nございます……。"
10141-260 = "あの……\n一年の始まりですよ……？"
10141-270 = "私なんかと過ごしていて\n本当にいいんですか……？"
10141-280 = "メリークリスマス、です……！"
10141-290 = "先生がご希望でしたら……\nサンタを捕獲してきます！"
10141-300 = "トリックオアトリート！"
10141-310 = "あ、飴――\nがなければ弾丸を……！"
10141-320 = "……こ、これで合ってますか？"
10141-340 = "……雑草が好きなのは、\n美しいからじゃ、ないです。"
10141-350 = "私は、雑草の硬いところが\n好きなんです。"
10141-360 = "どんな荒地でも\n強く根を張る、粘り強さ――"
10141-370 = "それこそが、私の理想。"
10141-380 = "美しくある必要はありません。"
10141-390 = "輝かなくてもいいんです。"
10141-400 = "大切な人と、\nただ過ごせるなら……。"
10141-410 = "せ、先生と\n一緒にいられるのなら……。"
10141-420 = "私は、それで……。"
10141-430 = "……好き、なんです。"
10141-2600 = "私なんかがこれをいただく資格なんて……\nい、いえ……先生が決めたことです。\nありがとうございます！"
