[translation]
10141-10 = "Blue... Archi... ve."
10141-20 = "Desculpe pela aparência... mas... prazer em conhecê-lo..."
10141-30 = "(Com essa roupa... será que vão achar que estou me achando?)"
10141-40 = "Deixa eu ver... qual é o lugar mais discreto..."
10141-50 = "O café... que cheiro bom... ehehe."
10141-60 = "Eles não vão vir até aqui atrás de mim... né?"
10141-70 = "Se eu der de lembrancinha... c-com certeza vão gostar, né?"
10141-80 = "B-boa tarde, Sensei!"
10141-90 = "Ah... essa roupa..."
10141-100 = "F-ficou estranha, né...?"
10141-110 = "B-bem-vindo de volta, Sensei!"
10141-120 = "Bom... eu quis ficar mais concentrada, por isso vesti isso..."
10141-130 = "Pode mandar qualquer ordem...! Tenho muitas bombas!"
10141-140 = "A... precisa de alguma coisa?"
10141-150 = "... Hã? Posso descansar?"
10141-160 = "M-mas agora estamos trabalhando, né..."
10141-170 = "Se você fica me olhando assim..."
10141-180 = "Fico sem graça..."
10141-190 = "Fazer tudo o que estiver ao meu alcance... com todas as forças... sem me importar com os meios."
10141-200 = "Feliz aniversário, Sensei."
10141-210 = "Se o senhor aceitar... um presente meu... por favor, aceite!"
10141-220 = "A-aniversário... meu!? Hein? Heeem!?"
10141-230 = "Vão comemorar comigo!?"
10141-240 = "O-que eu faço... não preparei nada para a festa..."
10141-250 = "Feliz Ano Novo..."
10141-260 = "Sabe... é o começo do ano, né...?"
10141-270 = "Tem certeza de que quer passar isso com alguém como eu...?"
10141-280 = "Feliz Natal...!"
10141-290 = "Se o senhor quiser... eu vou lá e capturo o Papai Noel!"
10141-300 = "Doces ou travessuras!"
10141-310 = "Se não tiver doce... vai bala...!"
10141-320 = "... É... é assim mesmo?"
10141-340 = "Não é porque as ervas daninhas são bonitas que eu gosto delas."
10141-350 = "Eu gosto da parte resistente delas."
10141-360 = "De como elas criam raízes fortes em qualquer terreno árido... essa perseverança..."
10141-370 = "É isso que é o meu ideal."
10141-380 = "Não precisa ser bonita."
10141-390 = "Não precisa brilhar."
10141-400 = "Se eu puder passar o tempo... com alguém especial..."
10141-410 = "Se puder estar com o Sensei..."
10141-420 = "Então, pra mim..."
10141-430 = "... é o que eu... gosto."
10141-2600 = "Eu não mereço ganhar isso... n-não, foi o Sensei que decidiu. Muito obrigada!"