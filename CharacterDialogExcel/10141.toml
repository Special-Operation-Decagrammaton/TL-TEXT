[translation]
10141-10 = "Blue... Archi... ve."
10141-20 = "Я-я прошу прощения, если мой вид непригляден... П-пожалуйста, относитесь ко мне хорошо..."
10141-30 = "(Этот наряд... Не думаете ли вы, что я слишком сильно увлекаюсь...?)"
10141-40 = "Эм, где здесь... самое незаметное место?"
10141-50 = "Кофе... так вкусно пахнет... хе-хе."
10141-60 = "Вы ведь не... пойдёте за мной прямо сюда, правда?"
10141-70 = "Если я куплю это в качестве сувенира... о-они ведь наверняка обрадуются, да?"
10141-80 = "П-привет, Сенсей!"
10141-90 = "Ах... э-это платье..."
10141-100 = "О-оно правда такое странное...?"
10141-110 = "С-возвращением, Сенсей!"
10141-120 = "Эм... Я подумала, что нужно постараться оставаться сосредоточенной, поэтому выбрала этот наряд, но..."
10141-130 = "Пожалуйста, отдавайте мне приказы в любое время...! У меня полно взрывчатки!"
10141-140 = "Э-эм... у вас есть для меня какие-нибудь задания?"
10141-150 = "...Ась? Мне нужно отдохнуть?"
10141-160 = "Н-но мы ведь сейчас на дежурстве, разве нет...?"
10141-170 = "Е-если вы будете так на меня смотреть..."
10141-180 = "Э-это смущает..."
10141-190 = "Делать всё, что в чьих-то силах... со всем моим усердием... любыми необходимыми средствами..."
10141-200 = "С днём рождения, Сенсей."
10141-210 = "Е-если вы готовы принять поздравление от кого-то вроде меня... пожалуйста, возьмите это!"
10141-220 = "М-мой день рождения... мой!? Э, э-э-э-е?!"
10141-230 = "Вы собираетесь отпраздновать его ради меня!?"
10141-240 = "Ч-что же мне делать... Я совсем не подготовилась к вечеринке..."
10141-250 = "С Новым годом..."
10141-260 = "Эм... это ведь начало нового года, знаете ли...?"
10141-270 = "Вы точно уверены, что вам нормально проводить его с кем-то вроде меня...?"
10141-280 = "Счастливого Рождества...!"
10141-290 = "Если такова ваша воля, Сенсей... я пойду и поймаю Санту для вас!"
10141-300 = "Сладость или гадость!"
10141-310 = "Ах, если конфет нет... тогда я пущу в ход пули...!"
10141-320 = "...Я-я всё правильно сказала?"
10141-340 = "...Я люблю сорняки не потому, что они красивые."
10141-350 = "Я люблю сорняки за то, что они стойкие."
10141-360 = "Упорство, позволяющее крепко пустить корни в любой пустоши —"
10141-370 = "вот мой идеал."
10141-380 = "Нет никакой необходимости быть красивой."
10141-390 = "Всё в порядке, если я не буду сиять."
10141-400 = "До тех пор, пока я могу просто проводить время... с человеком, который мне дорог."
10141-410 = "Е-если я могу быть с вами, Сенсей..."
10141-420 = "этого мне вполне достаточно..."
10141-430 = "...Вы мне нравитесь."
10141-2600 = "Неужели я и правда заслуживаю получить это...? Н-нет... это было ваше решение, Сенсей. Большое вам спасибо!"