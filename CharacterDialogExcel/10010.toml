[translation]
10010-20 = "アビドス対策委員会２年生\n砂狼シロコ。よろしく。"
10010-30 = "へぇ…。\nまあまあ広い所だね。\n適度な運動をするには\n十分だ。"
10010-40 = "ふむ…。"
10010-50 = "次のライディングは\nどこに行こうか？"
10010-60 = "先生は放課後は\n何の仕事を\nしてるのかな…？"
10010-70 = "そういえば銃器の\n点検時間だったね。"
10010-80 = "やってほしい事があるなら\n何でも言って。"
10010-90 = "ようこそ、先生。\n今日もよろしく。"
10010-100 = "先生を手伝うために\nここにいるよ。"
10010-110 = "（何でそんなにじーっと\n見てるの？）"
10010-120 = "…あの、私の顔に\n何かついてる？"
10010-130 = "え、ただ顔を見たかっただけ？\n…そ、そう。"
10010-140 = "こうやって一緒にいるのも\n悪くないね。"
10010-150 = "誕生日おめでとう。先生。\n記念として一緒に\nジョギングでもしない？"
10010-160 = "…嫌なの？"
10010-170 = "私の誕生日…\n覚えてるとは\n思わなかった。"
10010-180 = "いや、もちろん嬉しい。\nうん。本当だよ。"
10010-190 = "明けましておめでとう、先生。\n今年もよろしく。"
10010-200 = "メリークリスマス。\n今日は特別な日なんだって。"
10010-210 = "どういう風に特別なのか\nわからないけど…"
10010-220 = "先生、教えてくれない？"
10010-230 = "…ハロウィン。\n特別な記憶はない。\n都市はいつも静かだったから。"
10010-240 = "うん。\n賑やかな都市が\n見られたらいいね。"
10010-260 = "何かやってほしい事ある？"
10010-270 = "（何を考えてるのか\n気になる）"
10010-280 = "（これから\n何をするつもりだろう…？）"
10010-290 = "先生を手伝うために\nここにいるから。"
10010-300 = "こ、こんなに撫でられても…\n別に困ることなんて…。"
10010-2600 = "私も、少しは強くなったかな？\nうん、これならみんなの力になれる。"
