[translation]
20010-10 = "ブルーアーカイブ。"
20010-20 = "227号温泉郷へようこそおいでくださいました、\n先生。このノドカ、温泉郷の女将として\n真心を込めておもてなしさせていただきます。"
20010-30 = "227号温泉郷にも、\nこういった家具が\nあると良さそうですね。"
20010-40 = "このカフェはいつも\nにぎやかで……秘訣は\n何なのでしょうか？"
20010-50 = "うぉぉ……\n高そうな物が……"
20010-60 = "（あれ、\nたしかこの辺りに、\nさっきまで先生が……）"
20010-70 = "（旧校舎……まだ\n戻りたくないな……）"
20010-80 = "227号温泉郷、\nこれより営業開始です！"
20010-90 = "おかえりなさいませ、先生。\nお食事になさいますか？\nそれともお風呂になさいますか？"
20010-100 = "……？あ、やっ、その！"
20010-110 = "私たちの温泉郷では、\nそのようなサービスは、\nえっと……！"
20010-120 = "先生、この着物……\nどうでしょうか？"
20010-130 = "その、頑張って借りて\nみたのですが……"
20010-140 = "……似合ってますか？\nえへ、えへへ……"
20010-150 = "レッドウィンター連邦学園\n唯一の温泉郷として、その名に\n恥じないように頑張ります！"
20010-160 = "うへ、うぇへへ……"
20010-170 = "あ、や、み、\n見てないですよ……？"
20010-180 = "先生、お風呂に入りたく\nなったらぜひ私たちのところに\n来てくださいね。\n絶対ですよ！分かりましたか！？"
20010-190 = "温泉開発部の方々もですが……\nなんだかゲヘナには、\n変わった生徒が多いですね？"
20010-200 = "お誕生日\nおめでとうございます、先生！"
20010-210 = "今日は一日、私たちの\n温泉郷でのんびり\n休まれていきませんか？"
20010-220 = "あ、そういえば私の誕生日……"
20010-230 = "えっと、でしたら、その……"
20010-240 = "今日はほんの少しだけ、\n甘えても良いですか……？"
20010-250 = "今年も美味しくて\n良さげなものがいっぱい\n食べられますように……！"
20010-260 = "会席料理に\nクリスマスケーキって、\nやはり変でしょうか…？"
20010-270 = "ハロウィンを記念して、\n私たち227号温泉郷では現在\nカボチャ味の「うんめえ棒」を\nプレゼント中です！"
20010-290 = "はぁ……良いお湯ですね。\nもう入っただけで痛みが\n無くなったような気分です。"
20010-300 = "辺りの風景も、\nすごくきれいで……。"
20010-310 = "庭園も素晴らしいですし、\n本当に素敵な場所ですね。"
20010-320 = "屋根があって、\n星空が見えないのは\n少し残念ですが……"
20010-330 = "……いえ、これで\n良かったのかもしれません。"
20010-340 = "先生とふたりっきりで\n温泉を楽しめるだなんて、\nこんな幸せ……"
20010-350 = "お星様には、\n秘密にしておかないと。"
20010-2600 = "逆にあまり、温泉郷でこの武器を\n使う機会が少ないと良いのですが……。\nいざという時は、はい！"
