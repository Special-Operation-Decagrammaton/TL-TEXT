[translation]
20010-10 = "Blue Archive."
20010-20 = "Seja bem-vindo ao Resort Termal 227, Professor. Eu, Nodoka, como gerente do resort, cuidarei de você com toda a minha dedicação."
20010-30 = "Seria ótimo se o Resort Termal 227 também tivesse móveis como estes."
20010-40 = "Este café é sempre tão movimentado... Qual será o segredo?"
20010-50 = "Uau... Coisas que parecem tão caras..."
20010-60 = "(Ué, eu jurava que o Professor estava por aqui até agora pouco...)"
20010-70 = "(O prédio antigo... Eu não quero voltar para lá ainda...)"
20010-80 = "O Resort Termal 227 está aberto para negócios!"
20010-90 = "Bem-vindo de volta, Professor. Vai querer jantar? Ou prefere um banho?"
20010-100 = "...? Ah, não, isso!"
20010-110 = "No nosso resort, esse tipo de serviço, bem...!"
20010-120 = "Professor, o que achou deste quimono?"
20010-130 = "Eu me esforcei para conseguir emprestado..."
20010-140 = "...Combina comigo? Ehe, ehehe..."
20010-150 = "Como o único resort termal da Academia Federal Red Winter, farei o meu melhor para honrar o nosso nome!"
20010-160 = "Uhe, uhehe..."
20010-170 = "Ah, n-não, eu não estava olhando...?"
20010-180 = "Professor, se quiser tomar um banho, venha nos visitar, viu? É uma promessa! Entendido!?"
20010-190 = "Além do pessoal do Departamento de Desenvolvimento de Fontes Termais... Gehenna tem muitos alunos peculiares, não é?"
20010-200 = "Feliz aniversário, Professor!"
20010-210 = "Que tal passar o dia descansando tranquilamente no nosso resort hoje?"
20010-220 = "Ah, falando nisso, meu aniversário..."
20010-230 = "Bem, se for assim, então..."
20010-240 = "Hoje, só por um pouquinho, posso ser mimada por você...?"
20010-250 = "Espero que este ano eu possa comer muitas coisas deliciosas e maravilhosas...!"
20010-260 = "Servir um banquete kaiseki com bolo de Natal... será que é estranho?"
20010-270 = "Para comemorar o Halloween, nós do Resort Termal 227 estamos distribuindo um 'Unmee-bo' sabor abóbora!"
20010-290 = "Ah... que água maravilhosa. Sinto como se toda a minha dor tivesse desaparecido só de entrar."
20010-300 = "A paisagem ao redor também é tão linda..."
20010-310 = "O jardim é magnífico, é um lugar realmente encantador."
20010-320 = "É uma pena que o teto nos impeça de ver o céu estrelado..."
20010-330 = "...Não, talvez seja melhor assim."
20010-340 = "Poder aproveitar as fontes termais a sós com o Professor... tanta felicidade..."
20010-350 = "Tenho que manter isso em segredo das estrelas."
20010-2600 = "Na verdade, espero que não tenhamos muitas oportunidades de usar esta arma no resort... Mas, se for necessário, estou pronta!"
