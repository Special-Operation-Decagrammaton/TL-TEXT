[translation]
20025-10 = "ぶ、ブルー……アーカイブ……"
20025-20 = "あ、あの……ま、また来ることになりました……\n新年早々……すみません……"
20025-30 = "あ、す、すみません。\n私なんかがこんな綺麗な\n服を着るなんて……。"
20025-40 = "せ、先生……？\nいらっしゃら\nないのかな……。"
20025-50 = "ここが先生の……。\nど、どうして\n私なんかがここに……。"
20025-60 = "も、もしかして\n浮いてしまっているん\nでしょうか……。"
20025-70 = "隠れたい……。"
20025-80 = "あ、明けましておめでとう\nございます、先生……！！"
20025-90 = "わざわざ呼んで\nくださるなんて……\nすみません！！"
20025-100 = "……はっ！？\nあ、ありがとうございます！"
20025-110 = "おかえりなさい、先生！\nお、お待ちしておりました！"
20025-120 = "何を……すれば良い\nでしょうか……。新年……\n一体、何を爆破したら……。"
20025-130 = "ここで私に何が\nできるんでしょうか……。"
20025-140 = "今年の計画ですか……？"
20025-150 = "か、考えておくべき\nでしたか……！？"
20025-160 = "わ、私はただ……\n今年も……。"
20025-170 = "先生の言うことを\nよく聞くのが……\n目標、ですが……。"
20025-180 = "す、すみません。\nいつもこんな感じで\nすみません……。"
20025-190 = "お……お誕生日\nおめでとうございます……。"
20025-200 = "その……\n不快にならないように、\n小さく言いました……。"
20025-210 = "わ、私の誕生日ですか……！？\nな、なんでそんな……"
20025-220 = "つまらない事を\n覚えてくださっていたん\nですか……！？"
20025-230 = "明けましておめでとう\nございます……！も、もし、\n新年が嫌でしたら私が新年を……"
20025-240 = "消してきます！"
20025-250 = "も、もう\nクリスマスだなんて……。"
20025-260 = "そういえば、サンタは\n先生の許可をもらって\nシャーレに来ていますか……？"
20025-270 = "もし、そうで\nないのなら……。"
20025-280 = "あ……ハロウィーン……。\nその、今年は撃って\nないです……。"
20025-300 = "ひ、ひいぃ……！？\nあ、あ……。先生……！？\nい、いつの間に……！？"
20025-310 = "い、いえ！その、\n別に問い詰めているつもりでは\nないんですけど！！本当に！！"
20025-320 = "あれ、なんだか前にも\n似たようなことが……\nあったような……"
20025-330 = "は、はい……？これですか？\n門松……ですが……。"
20025-340 = "せ、先生がこういうのは\n気持ちが大事だと\n仰っていたので……。"
20025-350 = "それなら、ずっと育ててきた\nこの子がいいのかな、と……。"
20025-360 = "ま、まさか、\nまた余計なことを\nしてしまいましたか……！？"
20025-370 = "すみませんすみません\nすみませんすみません\nすみません……。"
20025-380 = "えっ、ん……！？はい……？\nほ、本当……ですか……？"
20025-390 = "大丈夫……\nでしょうか……？"
20025-400 = "……へ……。\n……へへ……。"
20025-2600 = "今年も、来年も……。\nそして来世も……！\n先生が嫌いなものは、\n私がすべて消しちゃいますから！"
