[translation]
20025-10 = "B-Blue... Archive..."
20025-20 = "A-Ah... e-eu acabei vindo de novo... Desculpe... logo no início do ano..."
20025-30 = "A-ah, d-desculpe. Alguém como eu... vestindo roupas tão bonitas..."
20025-40 = "P-Sensei...? Será que... você não está aqui...?"
20025-50 = "Este é o lugar do Sensei... P-por que alguém como eu... está aqui..."
20025-60 = "S-será que... eu estou sobrando aqui...?"
20025-70 = "Quero me esconder..."
20025-80 = "A-ah, feliz ano novo, Sensei...!!"
20025-90 = "Você se deu ao trabalho de me chamar... Desculpe!!"
20025-100 = "......Hã!? A-ah, muito obrigada!"
20025-110 = "Bem-vindo de volta, Sensei! E-eu estava esperando por você!"
20025-120 = "O que... eu deveria fazer...? Ano novo... O que exatamente... eu deveria explodir..."
20025-130 = "O que eu poderia fazer aqui..."
20025-140 = "Planos para este ano...?"
20025-150 = "D-deveria ter pensado nisso...!?"
20025-160 = "E-eu só... este ano também..."
20025-170 = "Ouvir bem o que o Sensei diz... é o meu objetivo, mas..."
20025-180 = "D-desculpe. Desculpe por ser sempre assim..."
20025-190 = "F-feliz aniversário..."
20025-200 = "É que... eu disse baixinho... para não te incomodar..."
20025-210 = "O-o meu aniversário...!? P-por que você..."
20025-220 = "Você se lembrou de algo tão insignificante...!?"
20025-230 = "Feliz ano novo...! S-se, se você não gosta do ano novo, eu posso..."
20025-240 = "Eu vou apagá-lo!"
20025-250 = "J-já é... Natal..."
20025-260 = "Falando nisso, o Papai Noel pediu permissão ao Sensei para vir ao Schale...?"
20025-270 = "Se não for o caso..."
20025-280 = "Ah... Halloween... É que, este ano... eu não atirei em nada..."
20025-300 = "I-iiih...!? A-ah... Sensei...!? D-desde quando você está aí...!?"
20025-310 = "N-não! É que, eu não estou tentando te interrogar!! De verdade!!"
20025-320 = "Ué, parece que algo parecido... já aconteceu antes..."
20025-330 = "S-sim...? Isso? É um Kadomatsu, mas..."
20025-340 = "Como o Sensei disse que, nessas coisas, o que importa é a intenção..."
20025-350 = "Pensei que seria bom usar esta plantinha que venho cuidando há tempos..."
20025-360 = "N-não me diga que... eu fiz algo desnecessário de novo...!?"
20025-370 = "Desculpe, desculpe, desculpe, desculpe, desculpe..."
20025-380 = "Eh, hã...!? Sim...? É... é verdade...?"
20025-390 = "Será que... está tudo bem...?"
20025-400 = "......He... ......hehe..."
20025-2600 = "Este ano, e no próximo também... E na próxima vida...! Tudo o que o Sensei odiar, eu vou apagar completamente!"
