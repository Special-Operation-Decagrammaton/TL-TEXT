[translation]
16006-10 = "ブルーアーカイブ！"
16006-20 = "夏！夏だよ先生！\n今年の夏は私と一緒に、\n美味しいものをたくさん食べに行こう！"
16006-30 = "夏の風物詩といえば、\nかき氷……そうめん……\n鮎の塩焼き…\nじゅるっ……はっ！？"
16006-40 = "今度、先生と\n海に行ったら……\nたこ焼き100個\n食べよーっと！"
16006-50 = "夏と言えば……\n焼きそば！ざるそば！\n流しそうめん！"
16006-60 = "ここ、涼しくて\n気持ちいい～"
16006-70 = "水着の準備オッケー。\nクーラ―ボックスも\nオッケー。\n夏の準備は完璧！"
16006-80 = "あっ、先生っ！\n海行こう、海！"
16006-90 = "仕事をしないと？\nじゃあそれが終わる\nまで待ってるからっ！"
16006-100 = "ルンルン～♪\nあ、おかえり先生。"
16006-110 = "私はもう準備できてるから、\n先生のこと待ってるね。"
16006-120 = "ん？\n何の話……って？\nもちろん、\n海に行く準備だよ！"
16006-130 = "夏と言えば海の家！\nもう、すぐにでも行くしか\nないよね！先生！"
16006-140 = "赤、黄、緑……\nはたまた青……"
16006-150 = "先生はどれが一番好き……？"
16006-160 = "……ん？かき氷の\nシロップの話だよ？"
16006-170 = "先生、海で泳いでると\nすぐにお腹が空くでしょ？"
16006-180 = "そこで私が解決策を\n考えたんだけど……"
16006-190 = "普通に泳ぐのにも使えて、\nお腹が空いたらそのまま\n食べられる浮き輪を\n買えば良いと思うの！"
16006-200 = "どう、名案でしょ！？\nエッヘン！"
16006-210 = "え、そんな浮き輪はない？\n……どうして！？"
16006-220 = "お誕生日おめでとう、先生！"
16006-230 = "それじゃあせっかくだし、\n今日は一緒に\nシャーレで水遊びしよ！"
16006-240 = "なんと、今日は私の\n誕生日なんだよ。先生！\nだからほら、泳ぎに行こう！"
16006-250 = "夏はまだ少し先だけど、\n先生と一緒なのにそんなの\n待ってられないよ！"
16006-260 = "あけましておめでとう！\n先生！"
16006-270 = "お正月のお雑煮ももちろん\n良いけど、今年も先生と\n一緒に、夏のグルメを味わえる\n日が待ち遠しいな！えへへっ！"
16006-280 = "メリークリスマ～ス！\nクリスマスに水着で\n寒くないの……って？"
16006-290 = "大丈夫！\nさっきまで熱々の\nうどんを食べてたから！"
16006-300 = "ハロウィンといえば、\nちょっと変わった格好を\nして飴をもらう日……。"
16006-310 = "もしかして……\n今の私なら\nイケるんじゃ！？"
16006-330 = "せ、先生助けてぇ～……！"
16006-340 = "んんっ、変な感じするぅ……\n湿っててヌルヌルして、\nうえぇん……！"
16006-350 = "いやっ、やめて～！\n私はまだ食べられる\nわけにはいかないのー！"
16006-360 = "まだまだ食べたいものが\n山ほどあるんだからー！！"
16006-370 = "ひぅっ！？ううっ、\nこのままやられる\nわけには……っ！"
16006-380 = "はっ！もしかして、\nこのままタコに\n食べられるぐらいなら\nいっそのこと……！"
16006-390 = "私が先に食べちゃえば\nいいのかも！？"
16006-2600 = "夏の専用装備！？\n私のために用意してくれたの！？\nわ～い！嬉しい、ありがとー！"
