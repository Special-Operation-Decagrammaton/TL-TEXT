[translation]
16006-10 = "Blue Archive!"
16006-20 = "Verão! É verão, Sensei!\nNeste verão, vamos sair juntos\npara comer muita coisa gostosa!"
16006-30 = "Falando em tradições de verão,\ntemos raspadinha... somen...\npeixe ayu grelhado no sal...\nnham... opa!?"
16006-40 = "Da próxima vez que eu for\nà praia com o Sensei...\nvou comer 100 takoyakis!"
16006-50 = "Falando em verão...\nYakisoba! Zaru soba!\nSomen escorregadio!"
16006-60 = "Aqui está tão fresco\ne agradável~"
16006-70 = "Roupa de banho pronta.\nCooler também\npronto.\nPreparativos para o verão perfeitos!"
16006-80 = "Ah, Sensei!\nVamos à praia, vamos!"
16006-90 = "Tem que trabalhar?\nEntão eu vou ficar aqui\nesperando você terminar!"
16006-100 = "Lalala~♪\nAh, bem-vindo de volta, Sensei."
16006-110 = "Eu já estou pronta,\nentão vou ficar te esperando."
16006-120 = "Hm?\nDo que eu estou falando...?\nClaro que é sobre\nos preparativos para a praia!"
16006-130 = "Verão significa quiosques na praia!\nNão tem como não ir\nlogo, né! Sensei!"
16006-140 = "Vermelho, amarelo, verde...\nou talvez azul..."
16006-150 = "Qual deles o Sensei gosta mais...?"
16006-160 = "...Hm? Estou falando da\ncalda da raspadinha, claro!"
16006-170 = "Sensei, a gente fica com fome\nrapidinho quando nada na praia, né?"
16006-180 = "Por isso, eu pensei em\numa solução..."
16006-190 = "Eu acho que deveríamos comprar\numa boia que serve para nadar\ne que também dá para comer\nquando a fome bater!"
16006-200 = "O que achou, não é uma ideia genial!?\nHumph!"
16006-210 = "Hã, não existe uma boia dessas?\n...Por que não!?"
16006-220 = "Feliz aniversário, Sensei!"
16006-230 = "Já que é assim, hoje vamos\nbrincar na água aqui\nno Schale!"
16006-240 = "Quem diria, hoje é o meu\naniversário, Sensei!\nEntão vamos, vamos nadar!"
16006-250 = "O verão ainda vai demorar um pouco,\nmas como estou com o Sensei,\nnão consigo esperar!"
16006-260 = "Feliz Ano Novo!\nSensei!"
16006-270 = "O ozoni de Ano Novo é ótimo,\nmas mal posso esperar pelo dia\nde curtir as comidas de verão\ncom o Sensei de novo! Ehehe!"
16006-280 = "Feliz Natal!\nNão estou com frio por estar\nde roupa de banho no Natal... você diz?"
16006-290 = "Está tudo bem!\nEu acabei de comer um\nudon bem quentinho!"
16006-300 = "Falando em Halloween, é o dia de\nusar fantasias diferentes\ne ganhar doces..."
16006-310 = "Será que...\ncomigo agora\nserá que dá certo!?"
16006-330 = "Se-Sensei, socorro...!"
16006-340 = "Nnn, que sensação estranha...\nEstá úmido e viscoso,\nbuááá...!"
16006-350 = "Não, pare com isso!\nEu ainda não posso\nser comida!"
16006-360 = "Ainda tem tanta coisa\nque eu quero comer!!"
16006-370 = "Hii!? Ugh,\nnão posso ser derrotada\nassim...!"
16006-380 = "Ah! Será que, se for para\nser comida por um polvo,\né melhor eu..."
16006-390 = "Talvez seja melhor eu\ncomê-lo primeiro!?"
16006-2600 = "Equipamento especial de verão!?\nVocê preparou isso para mim!?\nEba! Que felicidade, obrigada!"
