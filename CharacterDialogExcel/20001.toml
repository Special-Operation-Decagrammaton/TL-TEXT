[translation]
20001-10 = "ブルーアーカイブ"
20001-20 = "元々私の主はミレニアム\nそのものだけど、今日だけは…\n先生がご主人様だ。"
20001-30 = "数学の勉強を\nしなきゃいけない。\nはあ。\n数字はうんざりだ。"
20001-40 = "綺麗な場所だ…。\n私もいつかおしゃれな…\nあっ？\nき、聞いてた？！"
20001-50 = "たまには休憩も大事。"
20001-60 = "可愛いもの？好きだよ。\nそれも、すごく。\n何か問題が？"
20001-70 = "ネル先輩やアスナ先輩は\nいつも先頭に立つから。\n私？彼女たちの背後を\n守るのが私の役割。"
20001-80 = "うん？先生か。\n…待ってた。"
20001-90 = "先生のスケジュールは確認した。\n今日もよろしく。"
20001-100 = "ターゲット確認。\n目標を排除する。"
20001-110 = "…冗談。\n隠れなくていいよ。"
20001-120 = "問題ない。先生。\nその件はもうとっくに\n解決した。"
20001-130 = "…どうやって？\nそ、それは…。\n…気にしなくても大丈夫だ。"
20001-140 = "今日はどんな\n任務を遂行する？\nなんであれ、\n私は手伝うよ。"
20001-150 = "おめでとう先生。\n無愛想だから…\nうまく話せないけど。"
20001-160 = "先生がここに来てくれて\n本当に、嬉しい。"
20001-170 = "誕生日か…。\n別に喜ぶような\nことではないけど。"
20001-180 = "先生が祝ってくれると、\n特別な気分になるね。"
20001-190 = "明けましておめでとう先生。\n今年もよろしく。"
20001-200 = "クリスマスか…。\nサンタはいらない。"
20001-210 = "先生がいるから。"
20001-220 = "トリートオアファイアー！\n飴をくれないと発砲する！"
20001-230 = "…あれ？\nこういうのじゃない？"
20001-250 = "ほ、本当に…こんなことで\nご褒美になるのか…？"
20001-260 = "あ…いや…やっぱり…"
20001-270 = "恥ずかしすぎる。\nでも、先生がいいなら…。"
20001-280 = "うん？もっと強く…？\nわ、わかった。"
20001-290 = "先生がいいなら…\n私も…いい。"
20001-300 = "ああっ！\nい、いきなり立たないで！\n危ないから！"
20001-2600 = "戦争の勝率は、\n武器の発展具合に比例するもの。\n先生、これからの私の活躍を期待してて。"
