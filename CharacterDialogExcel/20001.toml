[translation]
20001-10 = "Blue Archive"
20001-20 = "Originalmente, minha mestra é a Millennium\nem si, mas só por hoje...\nSensei é meu mestre."
20001-30 = "Eu preciso estudar\nmatemática.\nAh.\nNúmeros são um saco."
20001-40 = "Que lugar bonito...\nEu também, algum dia, algo elegante...\nAh?\nVo-você estava ouvindo?!"
20001-50 = "De vez em quando, descansar também é importante."
20001-60 = "Coisas fofas? Eu gosto.\nE muito, inclusive.\nAlgum problema com isso?"
20001-70 = "A Neru-senpai e a Asuna-senpai\nestão sempre na linha de frente.\nEu? Proteger as costas delas\né o meu papel."
20001-80 = "Hm? É o Sensei.\n...Eu estava esperando."
20001-90 = "Verifiquei a agenda do Sensei.\nConto com você hoje também."
20001-100 = "Alvo confirmado.\nEliminando o objetivo."
20001-110 = "...Brincadeira.\nNão precisa se esconder."
20001-120 = "Sem problemas, Sensei.\nEsse assunto já foi\nresolvido há muito tempo."
20001-130 = "...Como?\nIs-isso é...\n...Não precisa se preocupar com isso."
20001-140 = "Que tipo de missão\nvamos realizar hoje?\nSeja qual for,\neu vou ajudar."
20001-150 = "Parabéns, Sensei.\nComo sou um pouco fria...\nNão consigo falar muito bem."
20001-160 = "Fico realmente feliz\nque o Sensei tenha vindo aqui."
20001-170 = "Aniversário, é...\nNão é como se fosse algo\npara se comemorar."
20001-180 = "Quando o Sensei me parabeniza,\neu me sinto especial."
20001-190 = "Feliz Ano Novo, Sensei.\nConto com você este ano também."
20001-200 = "Natal, é...\nNão preciso de Papai Noel."
20001-210 = "Porque eu tenho o Sensei."
20001-220 = "Doces ou Fogo!\nSe não me der um doce, eu atiro!"
20001-230 = "...Ué?\nNão é assim que se diz?"
20001-250 = "Sé-sério mesmo... isso conta\ncomo uma recompensa...?"
20001-260 = "Ah... não... na verdade..."
20001-270 = "É vergonhoso demais.\nMas, se o Sensei quer..."
20001-280 = "Hm? Com mais força...?\nEn-entendido."
20001-290 = "Se o Sensei quer...\neu também... quero."
20001-300 = "Aah!\nNão levante de repente!\nÉ perigoso!"
20001-2600 = "A taxa de vitória em uma guerra\né proporcional ao desenvolvimento das armas.\nSensei, espere pelo meu desempenho daqui para frente."
