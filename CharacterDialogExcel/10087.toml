[translation]
10087-10 = "Blue Archive."
10087-20 = "Fufu, Sensei, o que achou deste vestido? ...Pode ser sincero e me elogiar, sabe. ...Bem, dito isso, a opinião do Sensei servirá apenas como referência."
10087-30 = "Neste momento, eu sou...\nUma espiã...\nFufun."
10087-40 = "Onde será que a\nPresidente Hina\nestá?"
10087-50 = "Este traje é fácil de se mover,\nentão eu gosto dele, mas...\nestá um pouco frio..."
10087-60 = "Ufa, espero que hoje,\npelo menos, não haja\nnenhum problema..."
10087-70 = "(Fufu, aqui eu preciso\nmanter a compostura...)"
10087-80 = "Bem-vindo de volta, Sensei."
10087-90 = "Hoje, eu, Ako Amau,\nvou te ajudar\nespecialmente♪"
10087-100 = "Ora, Sensei.\nNão está um pouco atrasado?"
10087-110 = "Bem, não que eu me importe..."
10087-120 = "Hoje eu serei a sua\nassistente, Sensei.\nConto com você."
10087-130 = "Uma excelente oficial administrativa\nque finalmente foi a campo."
10087-140 = "Sim... essa sou eu."
10087-150 = "Sim. Este vestido\né a minha determinação."
10087-160 = "Enquanto eu estiver vestindo isso,\nsou uma agente\nperfeita."
10087-170 = "Para ser mais específica...\nAgora eu sou a heroína\nde um filme de espionagem..."
10087-180 = "Tenho um coração forte\no suficiente para isso."
10087-190 = "Mesmo que eu troque de vestido,\neu continuo sendo eu."
10087-200 = "Não há brechas na minha\nassistência ao trabalho do Sensei."
10087-210 = "...Portanto, por favor,\nconcentre-se no trabalho."
10087-220 = "Hã? Parece que estou mais\nempolgada que o normal?"
10087-230 = "...Isso não é um equívoco? Mesmo que\no que eu esteja vestindo mude,\neu continuo sendo eu."
10087-240 = "Se for para dizer algo, é apenas\nque estou pensando: 'Esta é uma chance\nde ajudar ainda mais a Presidente Hina'.\nSério mesmo."
10087-250 = "Hã? Minha ajuda foi\nmuito útil...?"
10087-260 = "E-entendo... Fico feliz que tenha\nficado satisfeito com a\nminha assistência."
10087-270 = "...Você pode entender melhor o meu valor\ne me agradecer mais,\nsabe?"
10087-280 = "Fufu..."
10087-290 = "Sensei, feliz\naniversário."
10087-300 = "Já que é uma ocasião especial...\nQue tal passar o dia\ncomigo?"
10087-310 = "Sobre o que faremos exatamente..."
10087-320 = "Bem... que tal... p-passar a noite\ntoda fazendo palavras cruzadas...?"
10087-330 = "N-não ria! Eu não esperava\nque você fosse perguntar!"
10087-340 = "Ora, você vai celebrar\no meu aniversário?"
10087-350 = "Obrigada. Então, já que é meu aniversário..."
10087-360 = "...Posso pedir qualquer coisa?"
10087-370 = "Fufu... tem certeza de que pode dizer isso?\nVocê nem sabe que tipo de\npedido eu vou fazer..."
10087-380 = "Feliz Ano Novo,\nSensei."
10087-390 = "Conseguimos passar o ano novo\njuntos mais uma vez."
10087-400 = "...Quando nos conhecemos, eu nunca\nimaginei que poderíamos passar\no tempo desta maneira."
10087-410 = "Estou profundamente emocionada."
10087-420 = "Feliz Natal, Sensei."
10087-430 = "Só o nome 'Festival de Natal'\njá dá uma sensação\nespecial, não é?"
10087-440 = "Se não se importar, que tal\ncaminharmos juntos pela cidade\ncom as luzes brilhando?"
10087-450 = "...Diga logo que sim."
10087-460 = "Sim, eu sei. Hoje é\nHalloween."
10087-470 = "O dia em que as pessoas interagem\nescolhendo entre doces ou travessuras..."
10087-480 = "O que você escolhe, Sensei?"
10087-490 = "...Você não vai escolher\ntravessuras... vai?"
10087-510 = "I-isso é um problema! Se\nalguém mais perceber..."
10087-520 = "Isso vai acabar\nnum desastre...!"
10087-530 = "D-de todas as horas,\njusto agora...!"
10087-540 = "Será que é porque\neu vim com o\nSensei...?"
10087-550 = "Sensei!\nFaça alguma coisa!"
10087-560 = "Rápido, antes que\neu me meta em encrenca!"
10087-570 = "Hã? Q-que foi?\nPor que essa cara..."
10087-580 = "...Hmm?"
10087-590 = "O-o que foi?\nO que exatamente você encontrou...?"
10087-600 = "I-isso é, bem...\nDevoluções dão muito\ntrabalho, sabe..."
10087-610 = "É que... o trabalho no\nComitê Disciplinar está\ncorrido, e eu não tive tempo..."
10087-620 = "De qualquer forma, é isso!\nDeixe como está!\nNão questione!"
10087-2600 = "Obrigada por seu apoio contínuo. Como o Sensei já deve saber — eu, Amau Ako, jamais o decepcionarei. Nem no passado, nem no futuro. Por favor, continue esperando grandes coisas de mim."
