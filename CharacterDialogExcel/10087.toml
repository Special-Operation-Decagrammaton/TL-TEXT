[translation]
10087-10 = "ブルーアーカイブ。"
10087-20 = "ふふ、先生、どうでしょうこのドレス？…ここは素直に褒めてくださればいいんですよ。…まあ、といっても先生の意見はあくまで参考にするだけですが。"
10087-30 = "今の私は…\n一人のスパイ…\nふふん。"
10087-40 = "ヒナ委員長は、\nどこにいらっしゃるの\nでしょうか。"
10087-50 = "この格好、動きやすくて\n好きなんですが…\n少しだけ寒いような…。"
10087-60 = "ふぅ、今日だけは、\nトラブルがないと\nいいのですが…"
10087-70 = "（ふふ、ここでは\n余裕をもって…）"
10087-80 = "おかえりなさい、先生。"
10087-90 = "今日は私、天雨アコが、\n特・別・に、あなたを\n手伝って差し上げます♪"
10087-100 = "あら、先生。\n少し遅くないですか？"
10087-110 = "まあ、構いませんが…"
10087-120 = "今日は私が先生を\n補佐いたします。\nよろしくお願いしますね。"
10087-130 = "ついに自ら現場に\n赴いた優秀な行政官。"
10087-140 = "ええ…それが私です。"
10087-150 = "ええ。このドレスは\n私の覚悟です。"
10087-160 = "これを身にまとっている\n間は、私は完璧な\nエージェントなのです。"
10087-170 = "もっと詳しくいえば…\n今の私はスパイ映画の\nヒロイン…"
10087-180 = "そのくらい強靭な心を\n持っているのです。"
10087-190 = "ドレスに着替えたとしても\n私は私です。"
10087-200 = "先生の業務補佐に\n隙などありません。"
10087-210 = "…ですから、仕事に\n集中してください。"
10087-220 = "え？なんだかいつもより\n浮かれてる？"
10087-230 = "…それは勘違いでは？\n身に纏うものが変わったと\nしても私は私ですよ。"
10087-240 = "強いていうのであれば、\n「これでもっとヒナ委員長の\n補佐ができるチャンス」とか\n思ってる程度です。本当に。"
10087-250 = "え？手伝ってもらって\nとても助かった…？"
10087-260 = "そ、そうですか…私の補佐に\nご満足いただけたようで\n何よりです。"
10087-270 = "…もっと私の価値を理解して、\n感謝してくださっても\nいいんですよ？"
10087-280 = "ふふっ…"
10087-290 = "先生、お誕生日\nおめでとうございます。"
10087-300 = "せっかくですから…\n今日は私と一緒に\n過ごしませんか？"
10087-310 = "具体的に何をするか…"
10087-320 = "そうですね…その…ひ、\n一晩中クロスワードを、\nする、とか…？"
10087-330 = "わ、笑わないでください！\nまさか聞かれるとは\n思わなかったんです！"
10087-340 = "あら、私の誕生日を\n祝ってくださるのですね？"
10087-350 = "ありがとうございます。\nそれでは、誕生日ですから…"
10087-360 = "…何でもお願いしていい？"
10087-370 = "ふふ…そんなこと言って\nいいんですか？私が、\nどういうお願いをするのか…\n知らないくせに。"
10087-380 = "明けましておめでとう\nございます。先生。"
10087-390 = "こうしてまた一緒に\n新年を迎えることが\nできましたね。"
10087-400 = "…初めてお会いした時は、\nこんな風に時を\n過ごせるだなんて\n思いもしなかったのに。"
10087-410 = "なんだか、感無量です。"
10087-420 = "メリークリスマスです、先生。"
10087-430 = "聖誕祭という名前だけでも\nなんだか特別な\n感じがしますね。"
10087-440 = "もしよかったら、一緒に\nイルミネーションが輝く\n街を歩いたりなんて、\nどうでしょう？"
10087-450 = "…ここはすぐ\nOKしてくださいよ。"
10087-460 = "ええ、分かっていますとも。\n今日はハロウィーン。"
10087-470 = "お菓子かいたずらかを\n選んで人々が交流する日…"
10087-480 = "先生はどちらにしますか？"
10087-490 = "…まさか、いたずらを\n選んだりなんて…\nしませんよね？"
10087-510 = "こ、このままでは困ります！\nもしも他の人が\n気づいてしまったら…"
10087-520 = "大変なことに\nなってしまいます…！"
10087-530 = "よ、よりによって\nこんなタイミングで…！"
10087-540 = "やっぱり、\nこれは先生と\n一緒に来たから…？"
10087-550 = "先生！\nなんとかしてください！"
10087-560 = "私が大変なことに\nなる前に、早く！"
10087-570 = "え？な、何ですか？\nその顔は…"
10087-580 = "…んん？"
10087-590 = "な、何ですか？\n一体何を見つけたんですか…？"
10087-600 = "そ、それは、その…\n返品には、色々と手間が\nかかるものですから…。"
10087-610 = "その…風紀委員会の\n仕事が忙しくて、時間が\nなかったというか…。"
10087-620 = "とにかくそういう\nことですから！\nそういうことにして\nおいてください！"
10087-2600 = "変わらぬご支援、ありがとうございます。\n先生はもうすでにご存知でしょうけれど――\n私、天雨アコはあなたを決して失望させません。これまでも、これからも。今後の私にどうぞご期待くださいね。"
