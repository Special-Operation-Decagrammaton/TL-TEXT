[translation]
10044-10 = "Blue Archive!"
10044-20 = "Finalmente chegamos ao mar~! \nVamos lá, Sensei, vamos nos divertir muito!"
10044-30 = "Fico feliz que todos \nestejam se divertindo~"
10044-40 = "Oh? \nO que é aquilo...?"
10044-50 = "Tem muita gente \naqui, não é~."
10044-60 = "Que tal sentarmos um pouco \npara descansar?"
10044-70 = "Aqui é fresco e \nagradável, não é~"
10044-80 = "Bem-vindo de volta, Sensei! \nO que vamos fazer hoje?"
10044-90 = "Ah, Sensei! \nEu estava te esperando~☆"
10044-100 = "O verão é quente, mas por outro lado, \ntambém tem muitas \ncoisas divertidas para fazer!"
10044-110 = "Só de ouvir a palavra 'mar', \nvocê não sente uma \nempolgação, Sensei~?"
10044-120 = "Hum...? \nSensei, o que houve?"
10044-130 = "Tem alguma coisa \nno meu traje de banho~?"
10044-140 = "Falando nisso, Sensei, \nvocê sabe nadar?"
10044-150 = "Queria abrir um guarda-sol \ne passar o dia relaxando \ncom calma~☆"
10044-160 = "Feliz \naniversário, \nSensei!"
10044-170 = "Hoje é um dia especial, \nque tal brincarmos no mar juntos?"
10044-180 = "Hoje é meu aniversário! \nVamos lá, vamos nos divertir muito!"
10044-190 = "Prefere bola de praia \nou quebrar a melancia?☆"
10044-200 = "Feliz \nAno Novo☆"
10044-210 = "Muito obrigada por tudo, \ncomo sempre. \nVamos fazer muitas coisas \ndivertidas este ano também, certo?"
10044-220 = "Feliz Natal, Sensei!"
10044-230 = "Já que estamos aqui, \nque tal comermos algo juntos? \nAlgo gelado ou algo quente!"
10044-240 = "Halloween, é..."
10044-250 = "Já que é uma ocasião especial, \nque tal um teste de coragem~?"
10044-270 = "Olhe só, Sensei! \nEstá brilhando! \nO mar parece um céu estrelado!"
10044-280 = "Foi por isso que \nvocê me trouxe \naqui?"
10044-290 = "Agora que penso nisso, acho que \nestava escrito no panfleto também."
10044-300 = "'À noite, o plâncton brilha \ne cintila como estrelas'..."
10044-310 = "É realmente lindo."
10044-320 = "...Fufu, \nquem sabe~?"
10044-330 = "Brincadeira. \nAcho que vou dormir \nmuito bem esta noite."
10044-340 = "Obrigada, Sensei... \nFoi realmente um dia como um sonho."
10044-350 = "Eu... estou feliz \npor ter vindo aqui."
10044-360 = "Mas, só mais um pouquinho..."
10044-370 = "...Só mais um pouquinho, \nfique comigo."
10044-2600 = "Uau, muito obrigada~! \nCom toda a minha gratidão ao Sensei... \nVou me esforçar para ser ainda mais \nútil para você!"
