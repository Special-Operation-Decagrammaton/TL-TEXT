[translation]
10044-10 = "ブルーアーカイブ！"
10044-20 = "ようやく海に到着です～！\nさあ先生、たっくさん遊びましょうね！"
10044-30 = "みんなが楽しそうで\n良かったです～"
10044-40 = "あら？\nあれは…？"
10044-50 = "人が\nたくさんですね～。"
10044-60 = "ちょっと座って\n休みましょうか？"
10044-70 = "ここは涼しくて\n良いですね～"
10044-80 = "おかえりなさい、先生！\n今日は何をしましょうか？"
10044-90 = "あ、先生！\nお待ちしてました～☆"
10044-100 = "夏は暑いですけどその分、\n楽しいこともたくさん\nありますよね！"
10044-110 = "海と聞くだけで、何だか\nワクワクしてきませんか～？"
10044-120 = "えっと…？\n先生、どうしました？"
10044-130 = "私の水着に、\n何か付いてましたか～？"
10044-140 = "そういえば先生って、\n泳げるんです？"
10044-150 = "ビーチパラソルを広げて、\nゆったりのんびり\n過ごしたいですね～☆"
10044-160 = "お誕生日\nおめでとうございます、\n先生！"
10044-170 = "今日は特別な日ですし、\n一緒に海で遊びませんか？"
10044-180 = "今日は私の誕生日です！\nさあ、たくさん遊びましょう！"
10044-190 = "ビーチボールが良いですか、\nそれともスイカ割りですか？☆"
10044-200 = "新年あけまして\nおめでとうございます☆"
10044-210 = "本当に、いつも\nありがとうございます。\n今年もたくさん、\n楽しいことをしましょうね？"
10044-220 = "メリークリスマスです、先生！"
10044-230 = "せっかくですし、\n何か一緒に食べませんか？\n冷たい物でも、温かい物でも！"
10044-240 = "ハロウィーンですか…"
10044-250 = "ではせっかくですし、\n肝試しとかどうでしょう～？"
10044-270 = "見てください、先生！\n光ってます！\n海がまるで星空みたいです！"
10044-280 = "このために、\n私をここに連れてきて\nくださったんですか？"
10044-290 = "そういえば、パンフレットにも\n書いてあったような気がします。"
10044-300 = "「夜になるとプランクトンが\n光って、星のように輝く」って…"
10044-310 = "本当に、綺麗ですね。"
10044-320 = "…ふふっ、\nどうでしょうね～？"
10044-330 = "なんて、冗談です。\n今夜は気持ちよく\n眠れそうです。"
10044-340 = "ありがとうございます、先生…\n本当に、夢のような一日でした。"
10044-350 = "私…ここに来られて\nよかったです。"
10044-360 = "ですが、もう少しだけ…。"
10044-370 = "…ほんの少しだけ、\n一緒にいてください。"
10044-2600 = "わぁ、ありがとうございます～！\n先生への感謝を、たっぷり込めて…\nこれでさらに先生のお役にたてるよう、\n頑張りますね！"
