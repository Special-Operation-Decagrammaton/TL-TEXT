[translation]
20008-10 = "ブルーアーカイブ。"
20008-20 = "ゲヘナ学園風紀委員会所属の行政官、天雨アコ。\n今後は業務提携とのことで、どうぞよろしくお願いいたしますね。"
20008-30 = "なるほど……\nまあ、悪くない\n設備ですね"
20008-40 = "次のシャーレとの\n提携業務は…"
20008-50 = "委員長…\nきちんとお食事を\n取られてる\nでしょうか…？"
20008-60 = "なんだかフワフワと\nした雰囲気ですね…\nまあ、どうでも\n良いのですが…"
20008-70 = "いざという時には…\nいえ、それでは委員長が\n困ってしまいますね\nやめておきましょう"
20008-80 = "あら、おはようございます先生。\nではお仕事を始めましょうか？"
20008-90 = "終わるまで、帰れるとは\n思わないでくださいね？"
20008-100 = "あら、先生。\n予定より早かったですね？\nそれについては\n褒めてあげましょう。"
20008-110 = "先生？\n手が止まっていませんか？"
20008-120 = "残業になると私の\n帰りも遅くなって、\n私が困るのですが。"
20008-130 = "……進捗が良くないですね。"
20008-140 = "はあ、仕方ありません。"
20008-150 = "私も手伝います。"
20008-160 = "今からはお食事はもちろん、\nお手洗いなども含めて\n全部私が管理しますから、\n言った通りにしてください。"
20008-170 = "まさか、不満なんて\n無いですよね？"
20008-180 = "なんだ、やれば\nできるじゃないですか"
20008-190 = "って先生、\nまさかとは思いますが…"
20008-200 = "先ほどまでは\nサボっていたと\nいうことですか…！？"
20008-210 = "お疲れの時は言ってくださいね。\nそれをケアするのもまた、\n私の役目ですので。"
20008-220 = "お誕生日おめでとうございます、\n先生。ふふっ、せっかくならと\n先週から完璧なスケジュールを\n立てておきました。"
20008-230 = "寸分の隙も無い、\n完璧な一日に\nしてあげましょう。"
20008-240 = "私の、誕生日……？"
20008-250 = "……先生、今は\nそれより大事な\nお仕事がたくさん――"
20008-260 = "え？私の誕生日より\n大事な仕事なんてない……？"
20008-270 = "またそういう……\nまあ、一応感謝はしておきます。"
20008-280 = "明けまして\nおめでとうございます。\n先生。"
20008-290 = "新年だからといって、\n仕事があることに\n変わりはありませんが。まあ、\n少しくらいお手伝いしますよ。"
20008-300 = "さあ先生、\n聖夜を共に過ごしましょうか？"
20008-310 = "……この大量の仕事を\n片付けないことには、\n帰るに帰れませんからね。"
20008-320 = "ハロウィーン、\nお菓子を交換し合う日ですね。"
20008-330 = "まあ、お仕事に\n糖分摂取は必要ですし……\n先生も、いかがですか？"
20008-350 = "うぅっ、こんな格好……っ！"
20008-360 = "この屈辱、絶対に\n忘れませんからね……！"
20008-370 = "えっ！？\nま、待ってください！\nこれ以上は約束と\n違うじゃないですか！？"
20008-380 = "お、お散歩！？\n正気ですか！？このまま！？"
20008-390 = "そ、それは流石に……。"
20008-400 = "ご、ごめんなさい……\n少し調子に乗り過ぎました……"
20008-410 = "あ、あの……\nいつまでこうしていれば\n良いんですか……？"
20008-2600 = "全く、こういう大胆なアプローチを平然と……\nまあ良いでしょう。あなたの\n目の前にいる生徒がどれだけ優秀なのか、\n骨の髄まで教えてあげます。"
