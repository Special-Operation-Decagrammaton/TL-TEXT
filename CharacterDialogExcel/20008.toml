[translation]
20008-10 = "Blue Archive."
20008-20 = "Sou eu, Ako Amau, oficial administrativa do Comitê de Disciplina da Academia Gehenna. A partir de agora, trabalharemos em parceria. Conto com você."
20008-30 = "Entendo... Bem, não são instalações ruins."
20008-40 = "Qual é a próxima tarefa em parceria com o Schale...?"
20008-50 = "A Presidente... será que ela está se alimentando direito...?"
20008-60 = "O ambiente aqui é meio relaxado, não é...? Bem, não que isso importe..."
20008-70 = "Se for necessário... não, isso deixaria a Presidente em apuros. Melhor deixar para lá."
20008-80 = "Ah, bom dia, Sensei. Vamos começar o trabalho?"
20008-90 = "Não pense que poderá ir embora antes de terminarmos, entendeu?"
20008-100 = "Ah, Sensei. Chegou mais cedo do que o planejado? Vou te elogiar por isso."
20008-110 = "Sensei? Por que parou de trabalhar?"
20008-120 = "Se você fizer hora extra, eu também vou sair tarde, e isso é um problema para mim."
20008-130 = "......O progresso não está bom."
20008-140 = "Haa, não tem jeito."
20008-150 = "Eu vou ajudar."
20008-160 = "De agora em diante, eu vou gerenciar tudo, desde as suas refeições até as suas idas ao banheiro. Faça exatamente como eu disser."
20008-170 = "Você não tem nenhuma reclamação, tem?"
20008-180 = "Ora, veja só, você consegue quando se esforça."
20008-190 = "Espera, Sensei... não me diga que..."
20008-200 = "Você estava enrolando até agora...!?"
20008-210 = "Me avise quando estiver cansado. Cuidar disso também é minha função."
20008-220 = "Feliz aniversário, Sensei. Fufu, preparei um cronograma perfeito desde a semana passada, já que é uma data especial."
20008-230 = "Vou garantir que você tenha um dia perfeito, sem nenhum erro."
20008-240 = "O meu... aniversário...?"
20008-250 = "......Sensei, agora temos muitas tarefas mais importantes do que isso――"
20008-260 = "Hã? Não existe trabalho mais importante do que o meu aniversário...?"
20008-270 = "Lá vem você de novo... Bem, de qualquer forma, agradeço."
20008-280 = "Feliz Ano Novo, Sensei."
20008-290 = "Só porque é Ano Novo, não significa que o trabalho vai sumir. Bem, eu ajudo um pouco."
20008-300 = "Vamos lá, Sensei, vamos passar a véspera de Natal juntos?"
20008-310 = "......Porque se não terminarmos essa montanha de trabalho, não poderemos ir para casa."
20008-320 = "Halloween, o dia de trocar doces, não é?"
20008-330 = "Bem, precisamos de açúcar para trabalhar... Sensei, quer um pouco?"
20008-350 = "Ugh, esse traje...!"
20008-360 = "Eu nunca vou esquecer essa humilhação...!"
20008-370 = "Hã!? E-espere! Isso não estava no combinado, estava!?"
20008-380 = "U-um passeio!? Você está louco!? Desse jeito!?"
20008-390 = "I-isso já é demais..."
20008-400 = "D-desculpe... Eu me empolguei um pouco demais..."
20008-410 = "A-ah... até quando eu tenho que ficar assim...?"
20008-2600 = "Francamente, você faz abordagens tão ousadas com tanta naturalidade... Bem, tudo bem. Vou te mostrar até a medula dos ossos o quão talentosa é a aluna que está diante de você."
