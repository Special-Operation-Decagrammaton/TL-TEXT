[translation]
20006-10 = "Blue Archive!"
20006-20 = "O que foi? Era para ser meu dia de folga... Bem, se é o Sensei me chamando, não tem jeito."
20006-30 = "Não tem nenhuma bebida\ncom sabor de queijo?"
20006-40 = "É um bom lugar para\npassar o dia de folga."
20006-50 = "Será que isso aqui\nserve para experimentos?"
20006-60 = "Ei, não precisa ficar com medo,\nNezusuke."
20006-70 = "Oho~,\nisso é bem..."
20006-80 = "Ufa, ufa... \nAh, você chegou?"
20006-90 = "...Quer comer isso comigo?"
20006-100 = "Você chegou!!\nFrancamente, me fazer\nesperar desse jeito..."
20006-110 = "Como punição, você vai me ajudar\ncom um experimento depois!\nFufufufufu...!"
20006-120 = "Hum, essa textura mastigável\ndo macarrão cortado à faca é, sem dúvida,\ndeliciosa não importa quando eu coma..."
20006-130 = "É uma das verdades\ndeste mundo."
20006-140 = "O quê? É estranho eu\ncomer comida normal?\nNem vem, eu não sou\no Nezusuke!"
20006-150 = "Uma roupa maravilhosa\nque combina comigo...?"
20006-160 = "U-hahahaha!\nÉ claro, eu fico bem\ncom qualquer coisa que eu vista!"
20006-170 = "Porque dá para conseguir\nmuita inspiração fora\ndo laboratório também."
20006-180 = "Como quando provoco o Kin,\nou quando perturbo a Mei..."
20006-190 = "Hum...? \nEstá vazando?\nO quê?"
20006-200 = "Feliz aniversário,\nSensei."
20006-210 = "Não tenho um presente, mas\ntenho uma bebida que estou testando,\nquer provar?"
20006-220 = "Ugh, não consegui criar o elixir da imortalidade\ne acabei ficando um ano mais velha..."
20006-230 = "Hum? Se eu me importo em envelhecer?\nHaha, claro que não.\nNão sou a instrutora Shun."
20006-240 = "Poder começar o ano\ncom o Sensei..."
20006-250 = "Este ano com certeza\nserá de muita sorte para mim!"
20006-260 = "Sensei, tem algo que você queira?"
20006-270 = "Não tenho ouro, mas\nposso te dar um remédio que deixa\nsuas mãos e pés dourados. Hahaha!"
20006-280 = "Doces ou travessuras!\nSe não me der doces,\nvou fazer uma travessura!"
20006-290 = "Claro que, mesmo que você me dê doces,\neu vou fazer uma travessura de qualquer jeito,\nu-hahahaha!"
20006-310 = "Fufu... entendo, \nisso tem um cheiro\nbastante impressionante..."
20006-320 = "Realmente,\ncomer assim desse jeito\nparece difícil..."
20006-330 = "Então,\nprimeiro, para tirar o cheiro,\nvou colocar uma colher de desodorizante..."
20006-340 = "E para diminuir\na sensibilidade olfativa,\nduas colheres de pó de mostarda..."
20006-350 = "Fique gostoso, fique gostoso~."
20006-360 = "Ah, opa?\nSem querer, coloquei\nmostarda demais!"
20006-370 = "Bem, não é nada\ncom que se preocupar."
20006-380 = "Se eu colocar um pouco mais\nde desodorizante,\nprovavelmente vai ficar bom!"
20006-2600 = "Eu não sou genial apenas nas pesquisas,\nmas também na pontaria!"
