[translation]
20006-10 = "ブルーアーカイブ！"
20006-20 = "なんなのだ、せっかくの休日だったのに……\nま、先生の呼び出しなら仕方ないのだ。"
20006-30 = "チーズ味の\n飲み物はないのか？"
20006-40 = "休日を過ごすのには\nいい場所なのだ。"
20006-50 = "これ、実験には\n使えないのかな？"
20006-60 = "ほら、怖がらなくて\n良いんだぞ、ネズ助。"
20006-70 = "おほ～、\nこれはかなり……。"
20006-80 = "ふう、ふう……\nあ、あれ？来てたのだ？"
20006-90 = "……これ、一緒に食べる？"
20006-100 = "待ってたのだ！！\n全く、ぼく様を\n待たせるなんて……"
20006-110 = "罰として今度実験に\n付き合うように！\nふっふっふっふっ……！"
20006-120 = "うむ、刀削麵のこの\nモチっとした食感はやはり、\nいつ食べても美味しい……"
20006-130 = "この世における\n真理の一つなのだ。"
20006-140 = "なに、ぼく様が普通の食べ物を\n食べるのがおかしいのか？\nそんな、ぼく様は\nネズ助じゃないし！"
20006-150 = "ぼく様に似合ってて\n素敵な服……？"
20006-160 = "うーはっはっはっ！\nそりゃあもちろん、ぼく様は\n何を着ても似合うのだ！"
20006-170 = "インスピレーションは\n研究室の外でもいっぱい\nもらえるからな。"
20006-180 = "キンをからかう時とか、\nメイをいじめる時とか……。"
20006-190 = "うん……？\n漏れてる？\n何が？"
20006-200 = "お誕生日\nおめでとうなのだ、先生。"
20006-210 = "プレゼントがない代わりに\n実験中の飲み物ならあるけど、\n飲んでみる？"
20006-220 = "うう、不老不死の霊薬を\n作れないまま、また一歳歳を\n取ってしまったのだ……。"
20006-230 = "うん？歳を取るのを\n気にしてるのかって？\nはは、まさか。\nシュン教官じゃあるまいし。"
20006-240 = "先生と一緒に一年を\n始められるなんて……"
20006-250 = "ぼく様は今年も\n大吉に違いない！"
20006-260 = "先生、何か欲しい物はあるか？"
20006-270 = "黄金は無いけど、\n手足が黄金の色に染まる薬なら\nあげられるぞ。ははは！"
20006-280 = "Trick or Treat！\nお菓子をくれないと\nいたずらするのだ！"
20006-290 = "もちろんお菓子をくれても\nいたずらはするけどな、\nうーはっはっはっ！"
20006-310 = "ふふ……なるほど、\nこれは中々\nすごい匂いなのだ……。"
20006-320 = "確かに\nこのまま食べるのは\n難しそうだし……。"
20006-330 = "じゃあ、\nまず匂いを消すために\n消臭剤を1さじ……。"
20006-340 = "あとは嗅覚を\n鈍らせるために、\nからしの粉を2さじ……。"
20006-350 = "美味しくなあれ～なのだ～。"
20006-360 = "あ、あれっ？\n間違えて、からし粉を\n入れすぎてしまったのだ！"
20006-370 = "まあ、気にするほどの\nことでも無いのだ。"
20006-380 = "代わりに消臭剤を\nもう少し入れれば、\n多分大丈夫！"
20006-2600 = "ぼく様は研究だけでなく\n射撃の腕も天才なのだ！"
