[translation]
10063-10 = "ブルー！アーカイブ！"
10063-20 = "なんか面白いことないですか～？\n黒崎コユキ、来ちゃいました！！\nに・は・は・は！！"
10063-30 = "うわぁ！なんだか\n不思議なものが\nいっぱいですね！"
10063-40 = "こ、ここって安全\n地帯ですよね！？\n誰かに連れていかれたり\nとかしませんよね！？"
10063-50 = "へぇ、ここが\n噂の……。"
10063-60 = "もしかしてここって……\n騒がしい人は追い出される\nシステムだったりします\n！？"
10063-70 = "はっ……！！\n……お腹空いたぁ。"
10063-80 = "お帰りなさい、先生！"
10063-90 = "待ちくたびれましたよ～！"
10063-100 = "にはは、先生！"
10063-110 = "……え？いえ？\n何も触ってませんよ？"
10063-120 = "多分……？"
10063-130 = "なにかお役に立ちたいです～"
10063-140 = "もしかして……\nじっとしているほうが\n役に立ったり？"
10063-150 = "計算……ですか？"
10063-160 = "楽勝ですよ！\n好きじゃないだけで。"
10063-170 = "もしかして、パスワードを\n確認するために呼びました？"
10063-180 = "私はメモ帳じゃないですよ～？"
10063-190 = "あ、私がここにいるって\n先輩たちに言ってくれました？"
10063-200 = "ちゃんと連絡してないと、\nあとで怒られちゃうから……。"
10063-210 = "え？退屈じゃないですよ～？"
10063-220 = "……うん？……さあ？\nなんででしょう？"
10063-230 = "ハッピーバースデー！\nせ・ん・せ・い！"
10063-240 = "今日は先生のお願い、\nなんでも聞いて\nあげちゃいますよ！"
10063-250 = "はいっ！今日は私の\n誕生日です！"
10063-260 = "にははっ！今日は\n運がいい日だといいなぁ～\nそうじゃないと困ります！"
10063-270 = "あけまして\nおめでとうございます～！"
10063-280 = "うあ～もう1年が\n過ぎちゃった……！"
10063-290 = "……あれ？年って過ぎるもの？\nそれとも来るもの？\nどっちだと思います？"
10063-300 = "メリークリスマース！\n今日はたくさん遊んで良い日！"
10063-310 = "そうですよね？"
10063-320 = "今日はなんだか、\n変な恰好をした人が\n多いですね～。"
10063-330 = "……私ですか？\nわ、私～は～そんなこと～"
10063-340 = "ないような～そうでもない\n……ような？にはは……？"
10063-360 = "先生！見てください！！\n四葉のクローバーですよ！！"
10063-370 = "どういうこと！？\nさっきまでなかったのに！"
10063-380 = "もしかして……\nいきなり生えたとか？"
10063-390 = "や、そんなの\nありえないか……。"
10063-400 = "見落としてたのかな\n……？"
10063-410 = "先生はいつ\n気づいたんですか？"
10063-420 = "それに、どうやって、\nこんな……"
10063-430 = "タイミングよく…\n見つかる、なんて……？"
10063-440 = "……！！！"
10063-450 = "……なるほど……！\nそうですね……！！"
10063-460 = "……はい！"
10063-470 = "そう考えたほうが、\nきっと……。"
10063-480 = "……楽しいですもんね！！"
10063-2600 = "えっ……んん？？\nいいんですか？\nこれ、本当に大丈夫ですか！？\n先生、もしかして私のこと……\n本当に、信じてくれるんですか……？"
