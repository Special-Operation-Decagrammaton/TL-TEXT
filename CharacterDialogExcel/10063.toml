[translation]
10063-10 = "Blue! Archive!"
10063-20 = "Não tem nada de interessante acontecendo? Kurosaki Koyuki, cheguei!! Ni-ha-ha-ha!!"
10063-30 = "Uau! Tem um monte de coisas estranhas por aqui!"
10063-40 = "E-esse lugar é uma zona segura, né!? Ninguém vai me levar embora nem nada do tipo, né!?"
10063-50 = "Hee, então aqui é o tal lugar..."
10063-60 = "Será que esse lugar... tem um sistema para expulsar pessoas barulhentas!?"
10063-70 = "Ah...!! ...Estou com fome."
10063-80 = "Bem-vindo de volta, Sensei!"
10063-90 = "Eu estava cansada de esperar~!"
10063-100 = "Ni-ha-ha, Sensei!"
10063-110 = "...Eh? Não? Eu não toquei em nada, viu?"
10063-120 = "Talvez...?"
10063-130 = "Quero ser útil em alguma coisa~"
10063-140 = "Será que... ficar parada é o que me torna útil?"
10063-150 = "Cálculos... você diz?"
10063-160 = "É moleza! Eu só não gosto de fazer."
10063-170 = "Você me chamou para verificar uma senha, por acaso?"
10063-180 = "Eu não sou um bloco de notas, sabia~?"
10063-190 = "Ah, você avisou para as veteranas que eu estou aqui?"
10063-200 = "Se eu não avisar direito, vou acabar levando bronca depois..."
10063-210 = "Eh? Eu não estou entediada~!"
10063-220 = "...Hum? ...Quem sabe? Por que será?"
10063-230 = "Feliz aniversário! Se-n-se-i!"
10063-240 = "Hoje eu vou atender qualquer pedido seu, Sensei!"
10063-250 = "Sim! Hoje é o meu aniversário!"
10063-260 = "Ni-ha-ha! Espero que hoje seja um dia de sorte~ Se não for, eu estou encrencada!"
10063-270 = "Feliz Ano Novo~!"
10063-280 = "Uau~ Já se passou um ano...!"
10063-290 = "...Ué? O ano é algo que passa? Ou algo que chega? O que você acha?"
10063-300 = "Feliz Natal! Hoje é um dia ótimo para brincar bastante!"
10063-310 = "Não é mesmo?"
10063-320 = "Hoje tem muita gente vestida de um jeito estranho, né~"
10063-330 = "...Eu? E-eu~ sou~ esse tipo de~"
10063-340 = "Não é bem assim~ ou talvez seja~? Ni-ha-ha...?"
10063-360 = "Sensei! Olha só!! É um trevo de quatro folhas!!"
10063-370 = "Como assim!? Até agora pouco não tinha nada aqui!"
10063-380 = "Será que... ele brotou do nada?"
10063-390 = "Ah, isso é impossível..."
10063-400 = "Será que eu não vi...?"
10063-410 = "Quando foi que você percebeu, Sensei?"
10063-420 = "E além disso, como você conseguiu..."
10063-430 = "Encontrar isso... bem na hora certa...?"
10063-440 = "...!!!"
10063-450 = "...Entendi...! É verdade...!!"
10063-460 = "...Sim!"
10063-470 = "Pensar dessa forma, com certeza..."
10063-480 = "...É mais divertido, né!!"
10063-2600 = "Eh... hum?? Sério? Isso é mesmo seguro!? Sensei, será que você... realmente confia em mim...?"
