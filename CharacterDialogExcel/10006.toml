[translation]
10006-20 = "あなたが先生か？今日から私が一緒にいてあげる。\n任務なら、私に任せて。"
10006-30 = "へえ、中々いい感じ。"
10006-40 = "少し休んでから行くとしよう。"
10006-50 = "正義実現委員会のやつらは、\nめんどくさいんだよな…。"
10006-60 = "まったく、仕方ないな。\n手伝うよ。"
10006-70 = "はあ、どうしてこうなったんだ。\nまあ…別に悪くはないけど。"
10006-80 = "や、お帰り。\n先生、今日の任務は何？"
10006-90 = "サボろうとするなよ。\n私がいつも見守ってるからな。"
10006-100 = "…いや、\n変な意味じゃないから！"
10006-110 = "しばらくは余裕があるから…\n少しは手伝うよ。"
10006-120 = "問題を起こす奴らって、\nなんでこんなに多いんだ。"
10006-130 = "まあ、\n絶対に規則に従え\nとは言わない。"
10006-140 = "従わない場合、\n責任を取らせるだけだ。"
10006-150 = "誰もが納得で\nきる規則なんてない。"
10006-160 = "だからこそ、\n強制する必要がある。"
10006-170 = "先生、\nあなたの指揮力は\n信頼してるよ。"
10006-180 = "ん？！な、なに？！\n今日が誕生日？"
10006-190 = "し、仕方ないな。\n今日は、その、\nどんな任務でも\n協力するから！"
10006-200 = "祝ってくれて\nありがとう。"
10006-210 = "私も少しは成長したんだし…。\nこれからはもうちょっと、\n真面目になってみようかな…？"
10006-220 = "先生。\n新年も、一緒に頑張ろう。"
10006-230 = "クリスマスか。\n今となっては元の\n意味を失ってるけど。"
10006-240 = "まあ、今のも悪くはない。"
10006-250 = "Trick or Treat、か。\nまあ、面白い日ではある。"
10006-260 = "どう、先生？\n一緒に、外に出てみない？"
10006-280 = "なに、その表情は。\n変なこと考えてないよな？"
10006-290 = "いつまで見てるんだ？\n早くして。"
10006-300 = "んんっ…んぅっ、\nはうっ…。"
10006-310 = "痛かったか、って？\nげ、ゲヘナの風紀委員が\nこれぐらいで\n痛がるはずないだろ！"
10006-320 = "ただ…少し、\nくすぐったかっただけ。"
10006-330 = "何やってるんだ、\n包帯がほつれる。"
10006-340 = "先生だったら…\n手が触れるぐらいなら\n気にしないから。"
10006-350 = "ちゃんと、\n最後までやって。"
10006-2600 = "成果で応える。\n今の私の気持ちを証明できるのは、\nそれしかないから。"
