10098-610 = "先生、一緒に\n出かけてみない～？"
10098-630 = "いやーもうこんな時間に\nなっちゃったかぁ。"
10098-640 = "こうなったら、朝まで\n待つしかないねぇ。"
10098-650 = "…へ？"
10098-660 = "またまたぁ～こんな\nおじさんといたって、\n別に楽しくないでしょ～"
10098-670 = "う、うへぇ～…\nその設定、まだやるの…？"
10098-680 = "おじさんにはちょっと\n荷が重いかも～"
10098-690 = "…まあ、先生が相棒役を\n買って出てくれるのなら、\n合わせるけどさぁ。"
10098-700 = "んじゃ、ヒーローと相棒の\n質素な夕食にしよっか。\n…非常食だけど。"
10098-710 = "それは、そうだけどさぁ～…"
10098-720 = "おじさんはこれが\n好きなんだ。\n大目にみてよ～"
10098-2600 = "…おじさんの力が必要になったら、\nいつでも言うんだよ？\n先生のことは、いつだって\n最優先だからさ。"
