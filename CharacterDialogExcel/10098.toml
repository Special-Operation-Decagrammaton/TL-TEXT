[translation]
10098-10 = "…ブルーアーカイブ。"
10098-20 = "いやー、大事になっちゃったね～\nこれは…おじさんが出なきゃいけないね。"
10098-30 = "（遮蔽物…確認。\n出口…確認）"
10098-40 = "とりあえず、\n弾薬を確認しよう。"
10098-50 = "うへ…\n気が休まらないなぁ…\nこんな時は、先生に\n会いたいかも…"
10098-60 = "この髪型、\nたしかに楽だけど…\n変じゃないかなぁ。"
10098-70 = "今日は昼寝する気に\nならないなぁ…。"
10098-80 = "お～先生、お疲れ～"
10098-90 = "来る途中大丈夫だった～？\n後つけられたりしてないー？"
10098-100 = "先生～今日もお仕事頑張って～"
10098-110 = "このおじさんがちゃーんと\n見てるからね？"
10098-120 = "あれ、先生はこういう\n恰好が好きなのか…"
10098-130 = "う～ん…おじさんには\nよく分からないなぁ…"
10098-140 = "糖分は大事だからね～\nアメは持ち歩いてるんだ～\n先生も一つ、要る？"
10098-150 = "ん～…はぁ。"
10098-160 = "先生～\n悪いけど、マッサージ\nお願いしてもいい～？"
10098-170 = "この格好、すぐ肩が\n凝るんだよねぇ。"
10098-180 = "壁に背を向ける。\nこれが室内戦の基本だよ～"
10098-190 = "そそ、今のその位置。\nそれなりに使えるから、\n覚えておいて～"
10098-200 = "先生は今日も残業～？"
10098-210 = "はい、あったかいコーヒー。"
10098-220 = "これで夜戦に備えてね。"
10098-230 = "先生、お誕生日おめでと～"
10098-240 = "プレゼントは…うーん、"
10098-250 = "私の銃でも触ってみる～？"
10098-260 = "ああ、私の誕生日だったかあ…\n別にあんま気にしてないけど…"
10098-270 = "先生に\n覚えてもらえてるのは……\nちょっと嬉しいかな。"
10098-280 = "明けましておめでとう、先生。"
10098-290 = "今年は先生も私も、\nのんびりできるといいね～"
10098-300 = "クリスマスプレゼントかぁ…"
10098-310 = "もらえるなら、銃の\n整備セットがいいなぁ。"
10098-320 = "そろそろ買い替えたいと\n思ってるんだ～"
10098-330 = "うへー今日なら\nこの格好でも\n普通に見えるかな？"
10098-340 = "先生、一緒に\n出かけてみない～？"
10098-350 = "お～先生、お疲れ～"
