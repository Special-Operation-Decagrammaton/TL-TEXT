[translation]
10098-10 = "…Blue Archive."
10098-20 = "Nossa, a coisa ficou séria, hein~ \nAcho que... o tio aqui vai ter que entrar em ação."
10098-30 = "(Cobertura... confirmada. \nSaída... confirmada.)"
10098-40 = "Por enquanto, \nvou verificar a munição."
10098-50 = "Uhe... \nNão consigo descansar... \nNessas horas, acho que queria \nver o Sensei..."
10098-60 = "Esse penteado, \né bem prático, mas... \nserá que não está estranho?"
10098-70 = "Hoje não estou nem um pouco \na fim de tirar uma soneca..."
10098-80 = "Opa, Sensei, bom trabalho~"
10098-90 = "Foi tudo bem no caminho? \nNinguém te seguiu, né?"
10098-100 = "Sensei~ bom trabalho hoje também~"
10098-110 = "O tio aqui vai ficar \nde olho em você, tá?"
10098-120 = "Ué, então o Sensei gosta \ndesse tipo de visual..."
10098-130 = "Hmm... para o tio aqui, \né meio difícil de entender..."
10098-140 = "Açúcar é importante, sabe~ \nEu sempre carrego balas comigo~ \nQuer uma, Sensei?"
10098-150 = "Hmm... ah."
10098-160 = "Sensei~ \nDesculpa, mas será que você \npode me dar uma massagem?"
10098-170 = "Com esse visual, meus ombros \nficam tensos rapidinho."
10098-180 = "Ficar de costas para a parede. \nEsse é o básico do combate em ambientes fechados~"
10098-190 = "Isso, exatamente nessa posição. \nÉ bem útil, então \nguarda aí na memória~"
10098-200 = "Sensei, fazendo hora extra \nde novo?"
10098-210 = "Aqui, um café quentinho."
10098-220 = "Para você se preparar para a batalha noturna."
10098-230 = "Sensei, feliz aniversário~"
10098-240 = "O presente é... hum,"
10098-250 = "Quer tentar tocar na minha arma?"
10098-260 = "Ah, era meu aniversário, né... \nEu não ligo muito para isso, mas..."
10098-270 = "Saber que o Sensei \nse lembrou... \né até que legal."
10098-280 = "Feliz ano novo, Sensei."
10098-290 = "Espero que este ano, tanto eu quanto você, \npossamos relaxar um pouco~"
10098-300 = "Presente de Natal, hein..."
10098-310 = "Se for para ganhar algo, \nqueria um kit de manutenção de armas."
10098-320 = "Estou pensando que já está na hora \nde trocar o meu~"
10098-330 = "Uhe~ será que hoje \nesse visual parece \nnormal?"
10098-340 = "Sensei, que tal a gente \nsair um pouco?"
10098-350 = "Opa, Sensei, bom trabalho~"
10098-360 = "Foi tudo bem no caminho? \nNinguém te seguiu, né?"
10098-370 = "Sensei~ bom trabalho hoje também~"
10098-380 = "O tio aqui vai ficar \nde olho em você, tá?"
10098-390 = "Ué, então o Sensei gosta \ndesse tipo de visual..."
10098-400 = "Hmm... para o tio aqui, \né meio difícil de entender..."
10098-410 = "Açúcar é importante, sabe~ \nEu sempre carrego balas comigo~ \nQuer uma, Sensei?"
10098-420 = "Hmm... ah."
10098-430 = "Sensei~ \nDesculpa, mas será que você \npode me dar uma massagem?"
10098-440 = "Com esse visual, meus ombros \nficam tensos rapidinho."
10098-450 = "Ficar de costas para a parede. \nEsse é o básico do combate em ambientes fechados~"
10098-460 = "Isso, exatamente nessa posição. \nÉ bem útil, então \nguarda aí na memória~"
10098-470 = "Sensei, fazendo hora extra \nde novo?"
10098-480 = "Aqui, um café quentinho."
10098-490 = "Para você se preparar para a batalha noturna."
10098-500 = "Sensei, feliz aniversário~"
10098-510 = "O presente é... hum,"
10098-520 = "Quer tocar na minha arma?"
10098-530 = "Ah, é meu aniversário, né... Não que eu me importe muito com isso..."
10098-540 = "Saber que o Sensei\nlembrou... me deixa\num pouco feliz."
10098-550 = "Feliz Ano Novo, Sensei."
10098-560 = "Espero que este ano\npossamos relaxar bastante,\nSensei e eu."
10098-570 = "Um presente de Natal, hein..."
10098-580 = "Se for para ganhar algo,\neu adoraria um kit de\nmanutenção para armas."
10098-590 = "Estou pensando em trocar\no meu em breve."
10098-600 = "Uhee, será que com esse visual\neu pareço normal\npara hoje?"
10098-610 = "Sensei, quer sair\npor aí comigo?"
10098-630 = "Nossa, já ficou\ntarde assim, hein."
10098-640 = "Já que chegamos a esse ponto,\no jeito é esperar até de manhã."
10098-650 = "…Hã?"
10098-660 = "Ah, para com isso... Não deve ser nada divertido ficar com uma velha como eu, né?"
10098-670 = "U-uhee... Você ainda vai\ncontinuar com esse cenário...?"
10098-680 = "Isso pode ser um pouco\npesado demais para mim."
10098-690 = "…Bem, se o Sensei se voluntariou para ser meu parceiro, eu vou entrar na brincadeira."
10098-700 = "Então, vamos ter um jantar modesto de herói e parceiro. ...Mesmo que seja comida de emergência."
10098-710 = "É, pode até ser, mas..."
10098-720 = "Eu gosto disso.\nFaz vista grossa para mim, vai."
10098-2600 = "…Se precisar da força da titia, é só falar, viu? O Sensei é sempre a minha prioridade máxima."
