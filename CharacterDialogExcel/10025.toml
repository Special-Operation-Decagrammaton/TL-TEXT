[translation]
10025-10 = "ブルーアーカイブ！"
10025-20 = "こっ、子供扱いしないでください……！\nこれでも心は変わらず、みんなのお姉さんですから！"
10025-30 = "（この視線で\n見るカフェは、何だか\n不思議ですね……）"
10025-40 = "うーん……この身長だと、\nみんなにとっても\n少し不便かもしれません。"
10025-50 = "（も、もう少し……\n背伸びをすれば、\n何とか……！）"
10025-60 = "んん……\n眠くなって\nきました……"
10025-70 = "今はせっかく\nこういう身体ですし…\nお昼寝、\nしても良いですよね？"
10025-80 = "おかえりなさい、です！\n先生！今日の授業も\nよろしくお願いします！"
10025-90 = "むにゃ……んん……"
10025-100 = "ラムレーズン入りの\n苺チョコは、ちょっと……。"
10025-110 = "……んん、あっ、\nわわっ！先生！？"
10025-120 = "い、居眠りなんて、\nしてませんよ……？"
10025-130 = "大人しく、良い子にして\n待ってますから！"
10025-140 = "はい！こんな体ですが、\n私はシュンですよ！"
10025-150 = "先生、先生！「ロジス」の\nラムレーズンチョコを\n頂いてしまいました！"
10025-160 = "い、一個だけ、\n今食べても良いですか……？"
10025-170 = "食事前だから\nおやつはダメ……？"
10025-180 = "で、でも……こんなに\n美味しそうなのに……。"
10025-190 = "……い、一個だけなので……\nダメ、ですか？"
10025-200 = "ハッピーバースデートゥーユー♪\nハッピーバースデートゥーユー♬"
10025-210 = "ハッピーバースデー\nディアしぇっ……"
10025-220 = "ううっ、\n噛んでしまいました……。"
10025-230 = "あっ、今日って私の誕生日、\nでしたっけ……？"
10025-240 = "すっかり忘れて\nしまっていました……。"
10025-250 = "えっと、\nということは今年で……\nこの場合、\nいくつになるのでしょうか？"
10025-260 = "あけまして\nおめでとうございます、先生！\n以前行った神社へ、\n甘酒を飲みに行きましょう！"
10025-270 = "サンタさんは……\n私のところにはきっと\n来てくれないですよね……。"
10025-280 = "それでも大丈夫です。\n今年のクリスマスは、\n先生と一緒ですから！"
10025-290 = "ふふ、今の私なら\n飴をもらえそうですね！"
10025-310 = "ふふ、この中は\nほとんど変わっていませんね。"
10025-320 = "私が書いた、\n自分との約束も……\nあの時のままです。"
10025-330 = "懐かしい……。"
10025-340 = "この約束、\n今こうして見てみると、\nほとんどは守る\nことができましたね。"
10025-350 = "ではせっかくですし、\n今度はここに将来の夢でも\n書いてみましょうか？"
10025-360 = "そ、それは教えられません！\n秘密です……！"
10025-370 = "大人には教えられない、\n子供だけの秘密……\nですから。ふふっ。"
10025-2600 = "今の私には少し大きい気もしますが……\nでもやっぱりこの武器が一番です！"
