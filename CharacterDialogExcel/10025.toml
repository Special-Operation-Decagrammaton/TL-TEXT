[translation]
10025-10 = "Blue Archive!"
10025-20 = "N-não me trate como uma criança...! Mesmo assim, meu coração continua o mesmo, eu ainda sou a irmã mais velha de todos!"
10025-30 = "(Ver o café deste ângulo... é um pouco estranho, não é?)"
10025-40 = "Hmm... com essa altura, talvez seja um pouco inconveniente para todos."
10025-50 = "(S-se eu me esticar só mais um pouco... talvez eu consiga alcançar!)"
10025-60 = "Hmm... estou começando a ficar com sono..."
10025-70 = "Já que estou com este corpo agora... não tem problema tirar uma soneca, tem?"
10025-80 = "Bem-vindo de volta! Sensei! Conto com você na aula de hoje também!"
10025-90 = "Munya... hmm..."
10025-100 = "Chocolate de morango com rum e passas é um pouco..."
10025-110 = "...Hmm, ah, uau! Sensei!?"
10025-120 = "E-eu não estava cochilando, eu juro...?"
10025-130 = "Vou ficar aqui quietinha, sendo uma boa menina, esperando!"
10025-140 = "Sim! Mesmo com esse corpo, eu ainda sou a Shun!"
10025-150 = "Sensei, Sensei! Eu ganhei um chocolate de rum e passas da \"Logis\"!"
10025-160 = "P-posso comer só um agora...?"
10025-170 = "Não posso comer doces antes da refeição...?"
10025-180 = "M-mas... parece tão delicioso..."
10025-190 = "...É só um... não pode mesmo?"
10025-200 = "Happy Birthday to you♪ Happy Birthday to you♬"
10025-210 = "Happy Birthday dear prof..."
10025-220 = "Ugh, eu acabei tropeçando nas palavras..."
10025-230 = "Ah, hoje é meu aniversário, não é...?"
10025-240 = "Eu tinha esquecido completamente..."
10025-250 = "Bem, isso significa que este ano... neste caso, quantos anos eu faço?"
10025-260 = "Feliz Ano Novo, Sensei! Vamos ao santuário que visitamos antes para tomar amazake!"
10025-270 = "O Papai Noel... provavelmente não virá me visitar, não é..."
10025-280 = "Mas tudo bem. Este Natal, eu estou com você, Sensei!"
10025-290 = "Hehe, com a minha aparência atual, acho que consigo ganhar doces!"
10025-310 = "Hehe, este lugar quase não mudou nada."
10025-320 = "A promessa que escrevi para mim mesma... continua exatamente como naquela época."
10025-330 = "Que nostálgico..."
10025-340 = "Olhando para esta promessa agora, vejo que consegui cumprir quase tudo."
10025-350 = "Já que estamos aqui, que tal escrevermos um sonho para o futuro?"
10025-360 = "I-isso eu não posso contar! É um segredo...!"
10025-370 = "É um segredo só de criança, que adultos não podem saber... entende? Hehe."
10025-2600 = "Sinto que ela é um pouco grande para mim agora... mas ainda assim, esta é a melhor arma!"
