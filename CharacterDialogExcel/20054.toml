[translation]
20054-10 = "Blue Archive"
20054-20 = "Infiltração, suporte de retaguarda, chefia.\nA supergênia, pura, frágil e onipotente hacker beldade, Akeboshi Himari, está pronta para entrar em cena.\nProfessor, esperei por você."
20054-30 = "(A temperatura do ar-condicionado\nnão está baixa demais?)"
20054-40 = "É um lugar perfeito\npara fazer uma pausa."
20054-50 = "O consumo moderado de cafeína\ntraz muitos benefícios, sabia?"
20054-60 = "Um lugar onde se pode relaxar\né algo importante."
20054-70 = "Vou dispensar\nas bebidas geladas."
20054-80 = "Eu previ a chegada do Professor."
20054-90 = "Como eu sabia, você pergunta?"
20054-100 = "Fufu, é segredo.\nBeldades sempre têm\nseus mistérios."
20054-110 = "Professor, bom trabalho."
20054-120 = "……Oh?\nPor que está com essa cara\nde quem não entendeu nada?"
20054-130 = "O meio de transporte até o Schale?\nOra, é claro que foi este aqui—"
20054-140 = "Vim na minha cadeira de rodas."
20054-150 = "Não está curioso sobre\na cor da sorte de hoje?"
20054-160 = "Sim? Por que a pergunta repentina?"
20054-170 = "Pensei em mudar o papel de parede\ndo seu monitor para essa cor."
20054-180 = "……Não precisa ser tão tímido."
20054-190 = "A evolução da inteligência artificial\né algo impressionante."
20054-200 = "Ainda assim, na minha opinião,\nela não consegue substituir\ncompletamente os humanos."
20054-210 = "Afinal, existem coisas que\nsó as pessoas podem fazer."
20054-220 = "Por exemplo……"
20054-230 = "……Como isto aqui."
20054-240 = "Se tiver algum problema\nou algo difícil,"
20054-250 = "por favor, me conte a qualquer momento."
20054-260 = "Afinal, agora eu posso, literalmente—"
20054-270 = "“voar até você”."
20054-280 = "Hmm… ugh… oh?"
20054-290 = "Eu estava dormindo um pouquinho."
20054-300 = "Estava analisando a relação\nentre o sono REM e o sono não-REM."
20054-310 = "……Professor, gostaria de\nse juntar a mim?"
20054-320 = "Agora sou sua equipe de suporte pessoal—"
20054-330 = "e uma supergênia, pura, frágil\ne onipotente hacker beldade."
20054-340 = "Fufu, uma sorte dessas\nnão se encontra todo dia, não é?"
20054-350 = "……Isso também vale para mim."
20054-360 = "Professor, feliz aniversário."
20054-370 = "Por acaso você achou\nque eu não saberia?"
20054-380 = "Como celebração, planejei\num roteiro de passeio.\nO que acha de irmos juntos?"
20054-390 = "Olá, Professor.\nVocê se lembra que dia é hoje?"
20054-400 = "Isso mesmo, é meu aniversário.\nPor isso, vim buscar\no meu presente."
20054-410 = "Bem, como presente—\nvamos fazer um passeio juntos."
20054-420 = "Sim? Você pergunta se isso basta?"
20054-430 = "Sim.\nNa verdade, é exatamente isso que eu quero."
20054-440 = "O tempo que passo com o Professor\né o melhor presente\nque eu poderia receber."
20054-450 = "Feliz Ano Novo."
20054-460 = "Com certeza, muitas coisas\nacontecerão este ano também."
20054-470 = "Mas também haverá coisas\nque não mudarão."
20054-480 = "Sim, como o meu charme."
20054-490 = "……Continuarei me esforçando para que o Professor\nperceba o meu charme, está bem?"
20054-500 = "Não é racional se deixar levar\nsó porque é Natal."
20054-510 = "Há quem diga isso."
20054-520 = "Mas a verdade, às vezes, está escondida além da razão."
20054-530 = "Então, Sensei? Poderia me fazer as honras de me escoltar?"
20054-540 = "Para onde quer que seja... eu ficarei muito feliz em ir."
20054-550 = "Sinto que o Halloween de hoje em dia tem um ar de evento forte demais."
20054-560 = "Dito isso, se serve como um motivo para passar os dias de forma divertida, talvez haja um significado nisso."
20054-570 = "Bem, deixando isso de lado, hoje estou com vontade de pregar uma peça..."
20054-580 = "Então, vou ter que recusar os doces, tudo bem?♪"
20054-600 = "É estranho, não é?"
20054-610 = "Mesmo sendo igual ao Millennium, ainda consigo olhar para o céu noturno daqui."
20054-620 = "As estrelas que brilham são diferentes daquelas que conhecemos."
20054-630 = "É difícil colocar em palavras... é uma sensação difícil de descrever."
20054-640 = "Sim...!?"
20054-650 = "Ah, muito obrigada. Bem... vou aceitar isso como um elogio."
20054-660 = "...Mesmo estando sob o mesmo céu noturno."
20054-670 = "Não significa necessariamente que possamos entender um ao outro."
20054-680 = "Mas, pelo menos, estamos sob o \"mesmo\" céu noturno."
20054-690 = "Acho que isso pode ser, pelo menos, um ponto de partida para nos entendermos."
20054-700 = "É assim que eu penso."
20054-710 = "O que você acha, Sensei?"
20054-2600 = "Muito obrigada. Na verdade, o ideal seria não precisar usar armas... mas, estar preparado é sempre importante."
