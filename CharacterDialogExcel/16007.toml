[translation]
16007-10 = "Blue Archive."
16007-20 = "É uma honra conhecê-lo, Sensei.\nSe não se importar, como uma saudação,\ngostaria de ouvir sobre os feitos\nheroicos da Presidente Cherino até hoje?"
16007-30 = "A agitação começa\ncom pequenas coisas,\nlentamente..."
16007-40 = "Fufu, é um acessório\ntão fofo que\ncombinaria muito bem\ncom a Presidente Cherino."
16007-50 = "Este espaço é\nquente e agradável, não é?"
16007-60 = "Da próxima vez, com certeza,\ntrazerei a Presidente Cherino aqui...!"
16007-70 = "Ué? Sinto a presença\nda Presidente em algum lugar..."
16007-80 = "Bem-vindo de volta, Sensei.\nAo retornar, por acaso\nvocê não viu a\nPresidente Cherino por aí?"
16007-90 = "Fufu, eu estava esperando por você,\nSensei. Vamos nos esforçar juntos\npela revolução de Kivotos\nhoje também!"
16007-100 = "Estou registrando cada movimento\nda Presidente Cherino\nneste caderno."
16007-110 = "Por acaso...\nVocê também gostaria de ler, Sensei?"
16007-120 = "Não pode,\né um segredo de garota."
16007-130 = "Para o dia em que a\nAcademia Red Winter\nassumir o controle de Kivotos,"
16007-140 = "preciso aprimorar\nminha oratória desde já..."
16007-150 = "Fufu, você não acha o bigode\nda Presidente Cherino fofo?"
16007-160 = "Feliz aniversário,\nSensei. Como presente, vou lhe dar\nmeu tesouro mais precioso..."
16007-170 = "A escova de dentes que a\nPresidente Cherino usava!"
16007-180 = "Meu aniversário, você diz?"
16007-190 = "Fufu. Por favor, certifique-se de\ncomemorar o aniversário da\nPresidente Cherino também."
16007-200 = "Ah, é claro que fico feliz\npor você ter vindo\nme parabenizar também."
16007-210 = "Este ano, com certeza...\nQue a Academia Red Winter\nse torne a maior\nde toda Kivotos..."
16007-220 = "Ultimamente, a intuição da Presidente Cherino\ntem ficado afiada demais,\ne isso é um problema..."
16007-230 = "Ela não deveria ter descoberto\nque o Papai Noel\nna verdade não existe..."
16007-240 = "Ora, ora, mesmo que venha até mim,\nnão tenho nada para lhe oferecer."
16007-250 = "Porque todos os meus doces\npertencem à Presidente Cherino."
16007-270 = "Ufa, foi uma nevasca tão forte\nque não dava para ver\nabsolutamente nada..."
16007-280 = "Sensei, por que não\ntira o seu casaco?"
16007-290 = "Se continuar com essas roupas molhadas,\nacabará pegando um resfriado, sabe?"
16007-300 = "...Sensei?\nO que houve?\nHá algo que o incomoda?"
16007-310 = "Com essa expressão, será que..."
16007-320 = "O discurso de agora não foi o suficiente\ne você quer ouvir ainda mais\nsobre a Presidente Cherino?"
16007-330 = "Já que estamos nessa situação,\né a oportunidade perfeita."
16007-340 = "Então, até a neve parar,\nvamos conversar sobre a\ngrandiosidade da Presidente Cherino♪"
16007-2600 = "Esta arma para mim...?\nFufu, muito obrigada, Sensei."
