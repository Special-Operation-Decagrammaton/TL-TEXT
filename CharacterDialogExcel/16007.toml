[translation]
16007-10 = "ブルーアーカイブ。"
16007-20 = "こうしてお会いできて光栄です、先生。\nよろしければご挨拶代わりに、チェリノ会長の\nこれまでの偉業についてお聞きになられますか？"
16007-30 = "扇動は、\n小さなことから\nゆっくりと……。"
16007-40 = "ふふ、チェリノ会長に\nよく似合いそうな、\n可愛いらしい\n小物ですね。"
16007-50 = "この空間は、\n暖かくていいですね。"
16007-60 = "次は必ず、ここに\nチェリノ会長と……！"
16007-70 = "あれ？どこからか\n会長の気配が……。"
16007-80 = "お帰りなさいませ、先生。\nお戻りの際に、どこかで\nチェリノ会長を\n見ませんでしたか？"
16007-90 = "ふふ、お待ちしておりました、\n先生。今日もキヴォトスの\n革命のため、一緒に\n頑張りましょう！"
16007-100 = "チェリノ会長の一挙手一投足を\n全て、このノートに\n記録しております。"
16007-110 = "もしかして……\n先生もお読みになりたいですか？"
16007-120 = "ダメです、\n女の子の秘密ですよ。"
16007-130 = "レッドウィンター連邦学園が\nキヴォトスを掌握する、\nその日に備えて、"
16007-140 = "今から話術を\n磨いておかないと……。"
16007-150 = "ふふ、チェリノ会長のおひげ、\n可愛いと思いませんか？"
16007-160 = "お誕生日おめでとうございます、\n先生。プレゼントに、\n私のとっておきの宝物……"
16007-170 = "チェリノ会長が使っていた\n歯ブラシを差し上げます！"
16007-180 = "私の誕生日、ですか？"
16007-190 = "ふふっ。ぜひ、\nチェリノ会長のお誕生日も\nお祝いしてあげてくださいね。"
16007-200 = "あぁ、もちろんこうして\n祝っていただけて、\n私も嬉しいです。"
16007-210 = "今年こそ……。\nレッドウィンター連邦学園が、\nキヴォトスで一番の\n学園になりますように……。"
16007-220 = "近頃チェリノ会長の勘が\n鋭くなってきていて\n大変です……。"
16007-230 = "実はサンタクロースは\nいないなんてこと、\n気づいてはいけませんのに……。"
16007-240 = "あらあら、私のところに来ても、\n何も差し上げられませんよ。"
16007-250 = "私の飴はすべて、\nチェリノ会長のものですから。"
16007-270 = "ふぅ、何も見えなく\nなるほどすごい\n吹雪でしたね……。"
16007-280 = "先生も、上着を\n脱いではいかがですか？"
16007-290 = "そのまま濡れた服を着ていると、\n風邪を引いてしまいますよ？"
16007-300 = "……先生？\nどうかされましたか、\n何か気になることでも？"
16007-310 = "その表情、もしかして……"
16007-320 = "先ほどの演説では足りず、\nもっとチェリノ会長の\nお話が聞きたいのですか？"
16007-330 = "こんなタイミングですし、\nちょうど良いですね。"
16007-340 = "では雪が止むまで、\n一緒にチェリノ会長の\n偉大さについて\n語り合うとしましょう♪"
16007-2600 = "私のためにこの銃を……？\nふふ、ありがとうございます。先生。"
