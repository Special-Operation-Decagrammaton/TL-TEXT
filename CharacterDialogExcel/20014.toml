[translation]
20014-10 = "Blue Archive!"
20014-20 = "Aqui é Saki Sorai, do Esquadrão RABBIT da Academia SRT.\nE então, onde está o manual de instruções do Schale?"
20014-30 = "Todo mundo aqui\nestá relaxado demais\n...Que decepção."
20014-40 = "Até onde a vista alcança,\nsó vejo caras de bobos."
20014-50 = "Mesmo que estejamos no intervalo,\na disciplina militar mínima\ndeve ser mantida..."
20014-60 = "(Onde está o manual\npara usar isso...?)"
20014-70 = "(O que é aquilo? Nunca vi\nno manual de instruções...)"
20014-80 = "...Ah, era você, Sensei."
20014-90 = "Pensei que fosse algum intruso suspeito,\nquase atirei."
20014-100 = "...Atrasado.\nCada segundo conta durante uma operação,\njá esqueceu disso?"
20014-110 = "...Se tem tempo para brincadeiras,\nconcentre-se no trabalho."
20014-120 = "Como dizem por aí,\numa arma é como um bom amigo."
20014-130 = "Se você cuidar bem dela,\nnunca te trairá."
20014-140 = "Falhas no equipamento\nsão prova de negligência."
20014-150 = "No fim das contas, manuais de papel são os melhores."
20014-160 = "Não precisam de carga\ne não há risco de hackeamento."
20014-170 = "...Eu disse que não.\nQuem tira o capacete\ndurante uma operação?"
20014-180 = "As veteranas teriam terminado esse serviço\ncom muito mais rapidez..."
20014-190 = "Às vezes, sinto vergonha\nda minha própria inexperiência..."
20014-200 = "Feliz aniversário, Sensei.\nE então, quer alguma coisa?"
20014-210 = "...Hã, meu capacete!?\nEste que estou usando agora!?"
20014-220 = "I-Isso, mesmo que seja\numa ordem sua, Sensei...!?"
20014-230 = "...Ah. Você se lembrou\ndo meu aniversário."
20014-240 = "Obrigada, Sensei."
20014-250 = "Eu mesma costumo esquecer,\na menos que verifique na minha agenda..."
20014-260 = "Espero que este ano,\neu consiga voltar para a SRT..."
20014-270 = "Natal... É justamente quando as pessoas baixam a guarda\nque devemos ficar em alerta máximo."
20014-280 = "...Sensei, quem te deu\nesse disfarce horrível?"
20014-290 = "Fantasia de Halloween...?\nO que é isso?"
20014-300 = "...Ah, era você, Sensei."
20014-310 = "Pensei que fosse algum intruso suspeito,\nquase atirei."
20014-320 = "...Atrasado.\nCada segundo conta durante uma operação,\njá esqueceu disso?"
20014-330 = "...Se tem tempo para brincadeiras,\nconcentre-se no trabalho."
20014-340 = "Como dizem por aí,\numa arma é como um bom amigo."
20014-350 = "Se você cuidar bem dela,\nnunca te trairá."
20014-360 = "Falhas no equipamento\nsão prova de negligência."
20014-370 = "No fim das contas, manuais de papel são os melhores."
20014-380 = "Não precisam de carga\ne não há risco de hackeamento."
20014-390 = "As veteranas teriam terminado esse serviço\ncom muito mais rapidez..."
20014-400 = "Às vezes, sinto vergonha\nda minha própria inexperiência..."
20014-410 = "N-Não é isso!\nÉ por questões operacionais...\nEu só tirei temporariamente!"
20014-420 = "Feliz aniversário, Sensei.\nE então, quer alguma coisa?"
20014-430 = "...Ah. Você se lembrou\ndo meu aniversário."
20014-440 = "Obrigada, Sensei."
20014-450 = "Eu mesma costumo esquecer,\na menos que verifique na minha agenda..."
20014-460 = "Espero que este ano,\neu consiga voltar para a SRT..."
20014-470 = "Natal... É justamente quando as pessoas baixam a guarda\nque devemos ficar em alerta máximo."
20014-480 = "...Sensei, quem te deu\nesse disfarce horrível?"
20014-490 = "Fantasia de Halloween...?\nO que é isso?"
20014-510 = "Ngh, ugh...!"
20014-520 = "……Tsc.\nEstá entupido por dentro?\nNão sai de jeito nenhum."
20014-530 = "Preciso deixar\nmais lubrificado..."
20014-540 = "Sensei,\npode me passar aquele\nlubrificante que está aí?"
20014-550 = "Oh, com isso\nserá que vai...?"
20014-560 = "Ah... \nO momento em que removo a ferrugem assim,\né realmente satisfatório..."
20014-570 = "……Está incomodado com o jeito que estou fazendo,\na ponto de não conseguir olhar diretamente?"
20014-580 = "H-Haaah!?\nIsso é um trabalho sagrado de manutenção!\nO que você está dizendo, seu idiota!?"
20014-2600 = "Metralhadora RABBIT-26,\nrecebida com sucesso.\n……Sim. Esse peso é reconfortante."
