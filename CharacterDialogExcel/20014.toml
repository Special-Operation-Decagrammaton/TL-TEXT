20014-510 = "Nnnh, kuuh...!" 
20014-520 = "......Tch.\nTá entupido por dentro?\nNão quer sair de jeito nenhum." 
20014-530 = "Preciso deixar...\nmais escorregadio..." 
20014-540 = "Sensei,\npode me passar o óleo lubrificante\nque está aí?" 
20014-550 = "Opa, acho que\nagora vai, não...?" 
20014-560 = "Aah...\no instante em que arrancamos toda a sujeira\ne a ferrugem assim, é uma sensação muito gostosa..." 
20014-570 = "......Por algum motivo o movimento das minhas mãos tá te distraindo,\ne você não consegue olhar direto pra mim?" 
20014-580 = "Tsk, hããã!?\nEsse é um trabalho de manutenção sagrado, sabia!\nO que você tá pensando na sua cabeça suja, seu imbecil!?" 
20014-2600 = "Metralhadora RABBIT Tipo-26,\nrecebida com sucesso.\n......É. Esse peso com certeza me traz segurança." 