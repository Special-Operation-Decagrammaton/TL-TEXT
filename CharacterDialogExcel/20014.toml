[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
20014-10 = "Blue Archive!" 
20014-20 = "Sou Sorai Saki do Esquadrão RABBIT,\nda Academia Especial SRT.\nE então, onde fica o manual de operações da Schale?" 
20014-30 = "Todo mundo com a guarda baixa...\nQue vergonhoso." 
20014-40 = "Até onde a vista alcança,\nsó tem gente com cara de tacho." 
20014-50 = "Mesmo que estejamos em pausa,\nexiste um mínimo de disciplina militar que..." 
20014-60 = "（Onde será que está\no manual de instruções para usar isso...?）" 
20014-70 = "（O que é aquilo,\nnunca vi nada parecido nem no manual...）" 
20014-80 = "......Ah, era você, Sensei." 
20014-90 = "Vi uma sombra e pensei que fosse alguém suspeito,\nquase que eu atirei em você." 
20014-100 = "......Você está atrasado.\nEm uma operação, um minuto pode ser a diferença entre a vida e a morte,\njá esqueceu disso?" 
20014-110 = "......Se tem tempo pra ficar de brincadeira,\nfoca no trabalho." 
20014-120 = "Eles dizem que a sua arma é\ncomo o seu melhor amigo." 
20014-130 = "Se você cuidar e confiar nela de verdade,\nela nunca vai te trair quando você mais precisar." 
20014-140 = "Falha nos equipamentos\nsó acontece quando o soldado é um desleixado." 
20014-150 = "Eu já sabia, o manual no papel sempre vence." 
20014-160 = "Você não precisa carregar a bateria\ne é totalmente imune a ataques hackers." 
20014-170 = "......Quando eu digo não, é não.\nQue tipo de imbecil tira o capacete no meio de uma operação." 
20014-180 = "Se fossem as nossas veteranas, teriam resolvido\numa tarefa boba como essa com uma velocidade e eficiência mil vezes maiores..." 
20014-190 = "Sabe, de vez em quando, eu me sinto tão patética por causa da minha inexperiência..." 
20014-200 = "Feliz Aniversário, Sensei.\nEntão, qual o seu pedido?" 
20014-210 = "......O quê, o meu capacete tático!?\nEsse daqui que eu tô usando na cabeça!?" 
20014-220 = "P-Por mais que seja uma ordem do Sensei,\nisso é...!" 
20014-230 = "......Ah. Você realmente se lembrou\ndo meu aniversário." 
20014-240 = "Muito obrigada, Sensei." 
20014-250 = "Pra ser sincera, se eu não checar meu próprio diário,\neu acabo esquecendo do meu aniversário de vez em quando..." 
20014-260 = "Seria muito bom se este ano\nnós conseguíssemos reabrir a SRT..." 
20014-270 = "Natal... É num momento de festividade como este, onde todo mundo abaixa a guarda,\nque nós precisamos dobrar a nossa vigilância e alerta geral." 
20014-280 = "......Sensei, quem te deu esse disfarce horrível?" 
20014-290 = "Uma f-fantasia de Halloween...?\nMas o que é isso?" 
20014-300 = "......Ah, era você, Sensei." 
