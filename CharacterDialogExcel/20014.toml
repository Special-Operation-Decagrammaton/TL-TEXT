[translation]
20014-10 = "ブルーアーカイブ！"
20014-20 = "SRT特殊学園、RABBIT小隊の空井サキだ。\nで、シャーレの教範はどこにある？"
20014-30 = "どいつもこいつも\n気が緩みっぱなし\n……情けない。"
20014-40 = "見渡す限り、\nアホ面ばっかりだ。"
20014-50 = "いくら休憩中とは言え、\n最低限の軍紀と\nいうものがだな……。"
20014-60 = "（これを使うための\nマニュアルは\nどこに……？）"
20014-70 = "（何だあれ、教範でも\n見たことない……）"
20014-80 = "……ああ、先生だったか。"
20014-90 = "何だか怪しい奴がいると思って、\n危うく撃つところだった。"
20014-100 = "……遅い。\n作戦中の1分1秒は命取り、\nもう忘れたのか？"
20014-110 = "……ふざけてる暇があったら、\n仕事に集中しろ。"
20014-120 = "よく言うだろう、\n銃器は良い友人と一緒。"
20014-130 = "きちんと向き合えば、\n裏切ることは無いって。"
20014-140 = "機器の故障なんてのが\n起きるのは、怠け者の証拠だ。"
20014-150 = "やはり教範は紙に限る。"
20014-160 = "充電の必要も無ければ、\nハッキングの心配も無いからな。"
20014-170 = "……ダメと言ったらダメだ。\n作戦中に鉄帽を\n外す奴がいるか。"
20014-180 = "先輩たちならこんな当番くらい、\nもっとスピーディに\nこなせてたはず……"
20014-190 = "時々、自分の未熟さが\n情けなくなるな……"
20014-200 = "誕生日おめでとう、先生。\nそれで、何か欲しいものは？"
20014-210 = "……え、私の鉄帽！？\n今被ってるこれ！？"
20014-220 = "そ、それはいくら、\n先生の命令でも……！？"
20014-230 = "……あぁ。誕生日、\n覚えててくれたのか。"
20014-240 = "ありがとう、先生。"
20014-250 = "自分でも手帳とかで\n確認しない限り、\nよく忘れるんだよな……"
20014-260 = "今年は、SRTに\n戻れたら良いけど……"
20014-270 = "クリスマス……こうやって\n多くの人が油断する時こそ、\n徹底的に警戒しないと。"
20014-280 = "……先生、そのひどい\n偽装は誰から貰ったんだ？"
20014-290 = "ハロウィーンの、仮装……？\n何だそれ？"
20014-300 = "……ああ、先生だったか。"
20014-310 = "何だか怪しい奴がいると思って、\n危うく撃つところだった。"
20014-320 = "……遅い。\n作戦中の1分1秒は命取り、\nもう忘れたのか？"
20014-330 = "……ふざけてる暇があったら、\n仕事に集中しろ。"
20014-340 = "よく言うだろう、\n銃器は良い友人と一緒。"
20014-350 = "きちんと向き合えば、\n裏切ることは無いって。"
20014-360 = "機器の故障なんてのが\n起きるのは、怠け者の証拠だ。"
20014-370 = "やはり教範は紙に限る。"
20014-380 = "充電の必要も無ければ、\nハッキングの心配も無いからな。"
20014-390 = "先輩たちならこんな当番くらい、\nもっとスピーディに\nこなせてたはず……"
20014-400 = "時々、自分の未熟さが\n情けなくなるな……"
20014-410 = "ち、違う！\nこれは作戦上の問題で……\n一時的に外してるだけだっての！"
20014-420 = "誕生日おめでとう、先生。\nそれで、何か欲しいものは？"
20014-430 = "……あぁ。誕生日、\n覚えててくれたのか。"
20014-440 = "ありがとう、先生。"
20014-450 = "自分でも手帳とかで\n確認しない限り、\nよく忘れるんだよな……"
20014-460 = "今年は、SRTに\n戻れたら良いけど……"
20014-470 = "クリスマス……こうやって\n多くの人が油断する時こそ、\n徹底的に警戒しないと。"
20014-480 = "……先生、そのひどい\n偽装は誰から貰ったんだ？"
20014-490 = "ハロウィーンの、仮装……？\n何だそれ？"
20014-510 = "んっ、くぅっ……！"
20014-520 = "……ちっ。\n中が詰まってるのか、\n全然抜けない。"
20014-530 = "もっと、\n滑りを良くしないと……。"
20014-540 = "先生、\nそこにある潤滑油を\nこっちの方にくれるか？"
20014-550 = "おっ、これなら\nいけるんじゃ……？"
20014-560 = "あぁ……\nこうして錆をはがしてる瞬間は、\n本当に気持ち良い……"
20014-570 = "……何だか手つきが気になって、\nちょっと直視できない？"
20014-580 = "っ、はぁぁっ！？\nこれは神聖な手入れの作業だぞ！\n何言ってんだバカ！？"
20014-2600 = "RABBIT26式機関銃、\n確かに受け取った。\n……うん。やはりこの重さ、安心する。"
