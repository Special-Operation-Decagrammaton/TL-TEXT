[translation]
20014-10 = "Blue Archive!"
20014-20 = "Sou Sorai Saki, do Esquadrão RABBIT da Academia Especial SRT.\nE então, onde é que ficam os manuais táticos da Schale?"
20014-30 = "Todo mundo aqui\ntem a guarda completamente\nbaixa... Que patético."
20014-40 = "Até onde a vista alcança,\nsó vejo gente com cara de bobo."
20014-50 = "Por mais que estejamos\nem horário de descanso,\nainda existe um mínimo de disciplina\nmilitar a ser seguida..."
20014-60 = "(Onde é que está\no manual de instruções\npara usar isso...?)"
20014-70 = "(O que diabos é aquilo? Eu\nnunca vi isso nem nos\nmanuais táticos...)"
20014-80 = "……Ah, era você, Sensei."
20014-90 = "Achei que fosse alguém suspeito,\nquase que eu atirei em você."
20014-100 = "……Atrasado.\nUm minuto ou um segundo durante uma operação\npodem ser fatais, já se esqueceu disso?"
20014-110 = "……Se você tem tempo para brincadeiras,\nconcentre-se no seu trabalho."
20014-120 = "Como dizem por aí,\narmas de fogo são como bons amigos."
20014-130 = "Se você as tratar com o devido respeito,\nelas nunca te trairão."
20014-140 = "Uma falha no equipamento\né a prova absoluta de que o operador é preguiçoso."
20014-150 = "Como eu imaginava, os melhores\nmanuais são os de papel."
20014-160 = "Não precisam ser carregados na tomada,\ne não há risco de serem hackeados."
20014-170 = "……Quando eu digo não, é não.\nQuem em sã consciência tira o capacete\nno meio de uma operação?"
20014-180 = "As nossas veteranas com certeza\nteriam terminado uma tarefa como essa\nmuito mais rápido..."
20014-190 = "Às vezes, a minha própria\ninexperiência me deixa patética..."
20014-200 = "Feliz aniversário, Sensei.\nE então, tem algo que você queira de presente?"
20014-210 = "……Hã, o meu capacete de aço!?\nEsse aqui que eu estou usando agora!?"
20014-220 = "I-Isso, por mais que seja\numa ordem do Sensei...!?"
20014-230 = "……Ah. Você lembrou\ndo meu aniversário."
20014-240 = "Obrigada, Sensei."
20014-250 = "Se eu não der uma olhada\nna minha agenda,\neu acabo sempre esquecendo..."
20014-260 = "Este ano, seria muito bom\nse nós pudéssemos voltar para a SRT..."
20014-270 = "Natal... É exatamente quando\na maioria das pessoas baixa a guarda\nque nós precisamos redobrar a vigilância."
20014-280 = "……Sensei, quem foi que te deu\nessa camuflagem horrível?"
20014-290 = "Fantasia de... Halloween...?\nO que é isso?"
20014-300 = "……Ah, era você, Sensei."
20014-310 = "Achei que fosse alguém suspeito,\nquase que eu atirei em você."
20014-320 = "……Atrasado.\nUm minuto ou um segundo durante uma operação\npodem ser fatais, já se esqueceu disso?"
20014-330 = "……Se você tem tempo para brincadeiras,\nconcentre-se no seu trabalho."
20014-340 = "Como dizem por aí,\narmas de fogo são como bons amigos."
20014-350 = "Se você as tratar com o devido respeito,\nelas nunca te trairão."
20014-360 = "Uma falha no equipamento\né a prova absoluta de que o operador é preguiçoso."
20014-370 = "Como eu imaginava, os melhores\nmanuais são os de papel."
20014-380 = "Não precisam ser carregados na tomada,\ne não há risco de serem hackeados."
20014-390 = "As nossas veteranas com certeza\nteriam terminado uma tarefa como essa\nmuito mais rápido..."
20014-400 = "Às vezes, a minha própria\ninexperiência me deixa patética..."
20014-410 = "N-Não é isso!\nIsso é por causa de um problema operacional...\nEu só tirei ele temporariamente, entendeu!?"
20014-420 = "Feliz aniversário, Sensei.\nE então, tem algo que você queira de presente?"
20014-430 = "……Ah. Você lembrou\ndo meu aniversário."
20014-440 = "Obrigada, Sensei."
20014-450 = "Se eu não der uma olhada\nna minha agenda,\neu acabo sempre esquecendo..."
20014-460 = "Este ano, seria muito bom\nse nós pudéssemos voltar para a SRT..."
20014-470 = "Natal... É exatamente quando\na maioria das pessoas baixa a guarda\nque nós precisamos redobrar a vigilância."
20014-480 = "……Sensei, quem foi que te deu\nessa camuflagem horrível?"
20014-490 = "Fantasia de... Halloween...?\nO que é isso?"
20014-510 = "Nngh, kuuuh...!"
20014-520 = "……Tch.\nSerá que tem algo entupido lá dentro?\nNão quer sair de jeito nenhum."
20014-530 = "Preciso deixar isso...\nmais escorregadio..."
20014-540 = "Sensei,\npode me passar esse óleo lubrificante\nque está aí com você?"
20014-550 = "Oh, com isso acho\nque vai dar certo...?"
20014-560 = "Aaah...\nEsse momento em que a ferrugem vai descascando\né tão gostoso..."
20014-570 = "……Você disse que os movimentos da minha mão\nestão te distraindo e você não consegue olhar direto?"
20014-580 = "H-Hãaaah!?\nEste é um trabalho de manutenção sagrado!\nO que você está dizendo, seu idiota!?"
20014-2600 = "Metralhadora RABBIT-26,\nrecebida com sucesso.\n...Sim. Como eu imaginava, esse peso me traz paz de espírito."