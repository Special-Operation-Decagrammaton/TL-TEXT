[translation]
26001-20 = "ミレニアムサイエンススクール所属、音瀬コタマ。\n先生の声が聞こえたので、ここに来ました。"
26001-30 = "このカフェには\n盗聴器が…\nふむ、なるほど…"
26001-40 = "電波の受信状態が\n不安定です。"
26001-50 = "おかしいですね\n先生のGPS情報が\nこの付近で捕捉\nされたのに…"
26001-60 = "カフェの新作デザートをチェック…\n個人用ブログにアップロード…。"
26001-70 = "モモフレンズの\n新作グッズ…\nキタコレ…。"
26001-80 = "来ましたか。足音でもう\n先生だと分かってました。"
26001-90 = "ビクッ…\nいきなり来られたので、\nキャア、と悲鳴をあげる\nところでした。"
26001-100 = "先生の通話記録は女子高生の\n名前で溢れてますね。"
26001-110 = "説明を要求します。"
26001-120 = "…犯罪？\n何のことでしょうか。\n盗聴は犯罪ではありません。"
26001-130 = "先ほど、先生のSNSの\n鍵アカウントに上がった内容に\nついて説明してください\nますか？"
26001-140 = "先生、良かったら\n歌を歌ってくれませんか？"
26001-150 = "この録音機に向かって。"
26001-160 = "どこかで先生を探す少女たちの\n声が聞こえます。"
26001-170 = "…無視しましょう。"
26001-180 = "お誕生日おめでとう\nございます、先生。\nもう何度も同じことを\n聞いてると思いますが…。"
26001-190 = "お祝いの言葉は、どれだけ\n繰り返し言っても価値の\n下がらない、完璧な言葉の\n一つです。"
26001-200 = "誕生日…祝ってくださって\nありがとうございます。"
26001-210 = "今日もらった数多くのお祝いの\n中で、先生の声でのお祝いが、\n私には一番価値のある\n言葉でした。"
26001-220 = "新年はどんな音よりも、\n先生の声を、\nもっと聴きたいです"
26001-230 = "クリスマスに傍受装置へ\n耳を澄ませていると\n様々な面白い話が聞けます。"
26001-240 = "例えば…\n恋人たちの甘いささやきとか。"
26001-250 = "ハロウィーンのお化けが出す\nラップ音はどんな音\nなんでしょうか。"
26001-260 = "機会があればぜひ一度盗聴…\nいや、録音してみたいです。"
26001-280 = "…あっ、先生。"
26001-290 = "すみません…夢中になっていて、\n気がつきませんでした。"
26001-300 = "これ、\nですか？"
26001-310 = "…ふふっ。せっかくですし、\n先生も聞いてみますか？"
26001-320 = "はい。これは音楽ではなく、\nカフェにいる人たちの会話や\n音が収録された、"
26001-330 = "いわゆる\n「環境音」です。"
26001-340 = "リズムもメロディーも\nありませんが…"
26001-350 = "耳を澄ませていると、\n様々な音や声が\n聞こえてきます。"
26001-360 = "人々が織りなすこの音色が、\n私にとってはなぜだか、\nどんな音楽よりも、\n心に響いて…。"
26001-370 = "いつまでも、\n聴いていたくなるんです。"
26001-2600 = "ヘルツ調整中……\nよく聞こえてますか?"
