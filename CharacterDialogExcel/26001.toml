[translation]
26001-20 = "Do Instituto de Ciências Millennium, Otose Kotama.\nOuvi a voz do Sensei, então vim até aqui."
26001-30 = "Tem um dispositivo de escuta\nneste café...\nHumm, entendo..."
26001-40 = "A recepção do sinal\nestá instável."
26001-50 = "Que estranho.\nO GPS do Sensei foi\ndetectado por aqui, mas..."
26001-60 = "Verificando a nova sobremesa do café...\nFazendo upload para o meu blog pessoal..."
26001-70 = "Novos itens dos\nMomofriends...\nFinalmente chegaram..."
26001-80 = "Você chegou. Pelo som dos seus passos,\neu já sabia que era o Sensei."
26001-90 = "Ai...!\nVocê apareceu de repente,\nquase soltei um grito."
26001-100 = "O registro de chamadas do Sensei está\ncheio de nomes de garotas do ensino médio."
26001-110 = "Exijo uma explicação."
26001-120 = "…Crime?\nDo que está falando?\nEscuta clandestina não é crime."
26001-130 = "Poderia me explicar o conteúdo\nque foi postado na conta privada\ndo SNS do Sensei agora pouco?"
26001-140 = "Sensei, se não se importar,\npoderia cantar uma música?"
26001-150 = "Diretamente para este gravador."
26001-160 = "Consigo ouvir as vozes de garotas\nprocurando pelo Sensei em algum lugar."
26001-170 = "…Vamos ignorar."
26001-180 = "Feliz aniversário,\nSensei.\nImagino que já tenha ouvido\nisso várias vezes, mas..."
26001-190 = "Palavras de felicitações são uma das\npoucas coisas perfeitas que não perdem\no valor, não importa quantas vezes\nsejam repetidas."
26001-200 = "Aniversário... obrigado por\ncomemorar comigo."
26001-210 = "Dentre as muitas felicitações que recebi hoje,\na voz do Sensei foi a que teve\nmais valor para mim."
26001-220 = "No ano novo, mais do que qualquer som,\neu quero ouvir a voz do Sensei."
26001-230 = "No Natal, quando aguçamos os ouvidos\ncom dispositivos de interceptação,\npodemos ouvir várias histórias interessantes."
26001-240 = "Por exemplo...\nSussurros doces de amantes."
26001-250 = "Que tipo de som será que os fantasmas\nde Halloween fazem?"
26001-260 = "Se tiver a chance, eu adoraria escutar...\nQuer dizer, gravar."
26001-280 = "…Ah, Sensei."
26001-290 = "Desculpe... eu estava tão concentrada\nque não percebi sua presença."
26001-300 = "Isso\naqui?"
26001-310 = "…Hehe. Já que estamos aqui,\ngostaria de ouvir também, Sensei?"
26001-320 = "Sim. Não é música, mas sim conversas\ne sons das pessoas que estão no café,"
26001-330 = "o chamado\n\"som ambiente\"."
26001-340 = "Não tem ritmo nem melodia, mas..."
26001-350 = "Se você aguçar os ouvidos,\npode ouvir vários sons e vozes."
26001-360 = "Essa sinfonia tecida pelas pessoas,\npor algum motivo, para mim,\nsoa mais profundamente do que\nqualquer música..."
26001-370 = "Eu poderia ficar ouvindo\npara sempre."
26001-2600 = "Ajustando a frequência……\nEstá ouvindo bem?"
