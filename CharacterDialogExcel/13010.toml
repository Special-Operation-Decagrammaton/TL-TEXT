[translation]
13010-10 = "Blue Archive"
13010-20 = "As condições foram cumpridas.\nNós definiremos este momento de hoje\ncomo um laço, e iremos prová-lo."
13010-30 = "Ué?\nEu não me lembro desse espaço aqui."
13010-40 = "Desse jeito eu vou falir...\nPreciso reduzir os gastos..."
13010-50 = "Hm?\nQuer descansar um pouco?\nEu também tenho cerca de 1890 segundos\nde tempo livre."
13010-60 = "Sinto que algo divertido\nvai acontecer hoje.\nEstatisticamente falando~."
13010-70 = "Sensei. Hoje também vou\nte dar todo o meu suporte."
13010-80 = "Bem-vindo, Sensei.\nVamos começar a reunião de reflexão agora."
13010-90 = "Ah,\nonde você vai?"
13010-100 = "Prooo-fessooor~.\nPor favor, se esforce um pouco mais!"
13010-110 = "Sensei. No momento, tenho 34 coisas\npara dizer sobre as suas\natitudes."
13010-120 = "(...uma delas é\numa palavra especial, aliás)"
13010-130 = "Mas sinto que ultimamente você\ntem agido como o Sensei de verdade."
13010-140 = "Sim?\nGraças a mim, você diz?"
13010-150 = "Hãã?\n...C-claro que sim!"
13010-160 = "Sensei.\nAntes de começarmos o trabalho,\nprimeiro, defina os objetivos e\na direção a seguir."
13010-170 = "Feliz aniversário,\nSensei."
13010-180 = "Hoje faz cerca de...\ndesde que o Sensei\nnasceu."
13010-190 = "Sim?\nNão posso calcular?"
13010-200 = "Hoje é o meu aniversário.\nO presente,\neu mesma vou escolher."
13010-210 = "Vamos sair?\nNão precisa ser nada caro!"
13010-220 = "Na matemática, o começo é fundamental.\nQue tal começarmos o início\ndeste ano juntos?"
13010-230 = "Natal, hein...\nNormalmente, dias assim\nnão são nada divertidos."
13010-240 = "Mas agora que você está aqui, Sensei,\nestá um pouco mais divertido."
13010-250 = "Proporcionalmente à população\nda cidade acadêmica,\na quantidade de balas\ncirculando em Kivotos atualmente"
13010-260 = "e suas calorias são...\n(murmúrios)"
13010-280 = "Francamente... você é um adulto, então\ntenha um consumo planejado\ncomo um adulto de verdade."
13010-290 = "Você não é uma criança que\nrecebe mesada e\ngasta tudo de uma vez, né?"
13010-300 = "Além disso, sou só eu\nque te ajudo a organizar\nesses recibos..."
13010-310 = "Da próxima vez,\neu não vou ajudar de jeito nenhum!"
13010-320 = "Sanduíche de frango comprado na conveniência\nhá 15 dias, 500 ienes...\nCompra de mangá novo, 450 ienes..."
13010-330 = "Hm...? Anteontem à noite,\nno \"Club Fuwarin\"\n20 mil ienes...?"
13010-340 = "P-Sensei!\nO que é exatamente\nesse recibo!"
13010-350 = "Um educador que deveria ser\nmodelo para os alunos, indo\na um lugar tão... tão\nduvidoso como esse...!"
13010-360 = "Não acredito!\nQue baixo!"
13010-370 = "Hã, \"Club Fuwarin\"\né o nome de um\ngacha de jogo de celular...?"
13010-380 = "...Ufa.\nEu achei que, tipo..."
13010-390 = "Quer dizer, não, não!\nMesmo assim, gastar 20 mil ienes\nde uma vez é gastar demais!"
13010-400 = "Proibido compras por impulso!\nO consumo deve ser planejado!"
13010-2600 = "Isso é...\num item que vai dar um lucro enorme!"
