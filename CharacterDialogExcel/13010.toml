[translation]
13010-10 = "ブルーアーカイブ"
13010-20 = "条件はクリアされました。\n私たちは今日この瞬間を\n絆と定義し、証明することになるでしょう。"
13010-30 = "あれ？\nこんな空間あったっけ？"
13010-40 = "このままだと破産する…。\n出費を減らさないと…。"
13010-50 = "うん？\n少し休んでいきますか？\n私も、約1890秒くらいの\n余裕はありますから。"
13010-60 = "なんだか今日は楽しいことが\nありそうな気がする。\n確率的に～。"
13010-70 = "先生。今日も全力で\nあなたをアシストしますね。"
13010-80 = "ようこそ、先生。\n今から反省会を始めます。"
13010-90 = "あっ、\nどこに行くんですか？"
13010-100 = "せ～ん～せ～い～。\nもう少し頑張ってください！"
13010-110 = "先生。今、先生の\n行動について言いたいことが\n34個あります。"
13010-120 = "（…そのうちの一つは\n特別な言葉だけど）"
13010-130 = "でも最近は先生らしく\nなった気がします。"
13010-140 = "はい？\n私のおかげ、ですか？"
13010-150 = "うえぇっ？\n…も、もちろんです！"
13010-160 = "先生。\n業務を始める前に\nまず、これからの目標と\n方向性を策定してください。"
13010-170 = "お誕生日おめでとう\nございます、先生。"
13010-180 = "今日で先生が\n生まれてから\n約…"
13010-190 = "はい？\n計算しちゃダメですか？"
13010-200 = "今日は私の誕生日です。\nプレゼントは、\n私が選びますね。"
13010-210 = "さあ、出かけませんか？\n高い物じゃなくてもいいので！"
13010-220 = "数学でも初めが肝心です。\n今年の始まりを、\n一緒に始めましょうか？"
13010-230 = "クリスマスか…。\n普段こういう日は\nちっとも楽しくないけど。"
13010-240 = "今は先生がいてくれて、\n少しは楽しいですね。"
13010-250 = "学園都市の人口に\n比例してみると、\n現在のキヴォトスに\n流通している"
13010-260 = "飴の数とそのカロリーは…\n（ぶつぶつ）"
13010-280 = "まったく…大人なんですから、\nしっかりと大人らしく計画的な\n消費をしてください。"
13010-290 = "お小遣いをもらって\nパーッと使っちゃう\n子供じゃないんですよ？"
13010-300 = "それに、こうして領収証の\n整理を手伝ってくれる\nのなんて、私くらい\nなんですから…。"
13010-310 = "次はもう、\n絶対に手伝いませんからね！"
13010-320 = "15日前にコンビニで購入\nしたチキンサンド500円…\n新刊の漫画購入で450円…。"
13010-330 = "ん…？一昨日の夜、\n「クラブ・ふわりん」\nで2万円…？"
13010-340 = "せ、先生！\nいったい何ですか、\nこの領収証は！"
13010-350 = "生徒たちの模範となるべき\n教育者が、こんな、い、\nいかがわしいお店に\n行くだなんて…！"
13010-360 = "信じられません！\n最低です！"
13010-370 = "え、「クラブ・ふわりん」\nっていう名前の、\nスマホゲームのガチャ…？"
13010-380 = "…ふぅ。\nてっきり私、その…。"
13010-390 = "って、いやいや！\nそれでも一回で2万円は\n課金しすぎです！"
13010-400 = "衝動買いは禁止！\n消費はちゃんと計画的にっ！"
13010-2600 = "これは……\nものすごいプラスになるやつだ！"
