[translation]
16018-10 = "Blue Archive!"
16018-20 = "Sou a líder do Grupo do Capacete, Kawakoma Love. Ei, Sensei!! Você está muito perto! Afaste-se!!"
16018-30 = "Será que não tem um lugar para pendurar o capacete?"
16018-40 = "Eu já vi isso... em algum lugar...?"
16018-50 = "(Será que eu deveria falar com ele...?)"
16018-60 = "Aqui é bem legal, não é? Dá até para se proteger da chuva."
16018-70 = "Eu deveria ter trazido o pessoal do Grupo do Capacete também..."
16018-80 = "Ah, Sensei. Oi."
16018-90 = "O que vamos fazer hoje? Beisebol?"
16018-100 = "Bem-vindo, Sensei."
16018-110 = "Não tem nenhuma história interessante para contar?"
16018-120 = "Você não tem interesse em capacetes?"
16018-130 = "Acho que combinaria muito com você, Sensei."
16018-140 = "Capacetes são estilosos e práticos, sabia?"
16018-150 = "Protegem a cabeça e ainda ficam ótimos. É o máximo, não é?"
16018-160 = "(...As pessoas que vêm ao Schale quase nunca usam capacete.)"
16018-170 = "(Só de olhar, eu já fico inquieta... Não consigo relaxar assim!)"
16018-180 = "Sensei... você é tão ocupado assim?"
16018-190 = "Como você sempre aparece em todos os lugares, achei que você fosse um desocupado."
16018-200 = "Fufun, fufuun, nfufufun..."
16018-210 = "Nfuun, capacetes são demais!!"
16018-220 = "Ah, hoje não é o aniversário do Sensei?"
16018-230 = "Feliz aniversário! Coma bastante coisa gostosa, viu!"
16018-240 = "Sabe... desde ontem, o pessoal do meu grupo tem ficado cochichando pelos cantos."
16018-250 = "Disseram que tinham um assunto sério para tratar comigo... O que será que eles estão planejando?"
16018-260 = "Um novo ano começou! Espero que todos continuem saudáveis e ganhem muito dinheiro este ano!"
16018-270 = "Feliz Natal, Sensei!"
16018-280 = "Bem, Papai Noel não visita crianças más, mas..."
16018-290 = "Não tem problema entrar no clima, né?"
16018-300 = "Haa, haa..."
16018-310 = "E-estou exausta..."
16018-320 = "Eles vieram dizendo 'doces ou travessuras'..."
16018-330 = "Mas eu não tinha nenhum doce comigo..."
16018-340 = "Aí eles ficaram fazendo travessuras! Ah, que raiva!!"
16018-360 = "Um, dois, três, quatro, cinco, seis. Isso!"
16018-370 = "Estão todos os seis aqui!"
16018-380 = "Vocês precisam ouvir o que a mamãe diz, entenderam?"
16018-390 = "A pata mãe também parece estar bem agora."
16018-400 = "Caso encerrado!"
16018-410 = "Q-que, que, que... O que você está dizendo!!"
16018-420 = "Sensei, isso não é um pouco rude?"
16018-430 = "Hã? ...Ah!? Bem..."
16018-440 = "A-ah! E-então é isso!?"
16018-450 = "C-claro! Eu sou a líder! Eu tenho que ser capaz de fazer isso!"
16018-460 = "(O Sensei realmente se enganou ao falar? Ou ele fez de propósito...?)"
16018-470 = "(De qualquer forma, isso me irrita! Se foi de propósito, é mais irritante ainda!!)"
16018-480 = "(Será que... ele fez de propósito mesmo...?)"
16018-2600 = "Ah! Era exatamente isso que eu queria! Obrigada, Sensei♪"
