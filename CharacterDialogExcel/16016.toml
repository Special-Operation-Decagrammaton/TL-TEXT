[translation]
16016-10 = "Blue Archive!"
16016-20 = "Sou da Unidade de Primeiros Socorros... não, do Antique Seraphim. Meu nome é Mine Aomori. É um prazer conhecê-lo."
16016-30 = "Este lugar é..."
16016-40 = "Gostei muito."
16016-50 = "Eu gostaria de praticar\na coreografia..."
16016-60 = "Fufu, há muitos\nespectadores aqui..."
16016-70 = "Preciso praticar para\ncorresponder às expectativas...!"
16016-80 = "Bem-vindo de volta, Sensei."
16016-90 = "Tenho algo para discutir com você,\nteria um momento?"
16016-100 = "Você chegou na hora certa.\nO ensaio acabou de terminar."
16016-110 = "É uma sensação estranha\nfazer o turno de serviço\nvestida assim..."
16016-120 = "Você parece cansado...\nQue tal uma música para\nrecuperar as energias?"
16016-130 = "Eu sou alguém que sempre\nrecebe ensinamentos seus, Sensei, mas..."
16016-140 = "Se for sobre dança e canto,\ntalvez eu possa te ensinar."
16016-150 = "Se tiver algum pedido,\npor favor, sinta-se à vontade para dizer."
16016-160 = "Isso também faz parte\ndo serviço aos fãs."
16016-170 = "Feliz aniversário,\nSensei."
16016-180 = "Posso cantar uma música\npara comemorar?"
16016-190 = "...Você se lembrou."
16016-200 = "Bem... como um\npresente de aniversário..."
16016-210 = "Gostaria de sair comigo?"
16016-220 = "Feliz Ano Novo,\nSensei."
16016-230 = "Espero que este ano nos encontremos\nmais no palco do que\nno campo de primeiros socorros."
16016-240 = "O dia sagrado...\nÉ o dia de cantar\ncânticos natalinos, certo?"
16016-250 = "E-esta roupa, não foi\ncom essa intenção..."
16016-260 = "...Mas se chamarem de\nfantasia, talvez\nseja verdade."
16016-270 = "Essa relação... parece a de um ídolo\ne seu empresário. O Sensei dá o suporte\ne eu fico nos palcos. Se fosse realmente\nassim, seria bom... mas é uma pena."
16016-280 = "I-isso é... bem..."
16016-290 = "Sinto que é diferente\ndo que eu imaginava...!"
16016-300 = "N-não! Não é que\neu não goste, mas..."
16016-310 = "M-mas! Também não é\ncomo se eu gostasse...!"
16016-320 = "É verdade que eu mesma\ngosto de coisas fofas, mas..."
16016-330 = "O objeto de \"fofura\"\nser eu mesma é..."
16016-340 = "E-essa... essa situação..."
16016-350 = "Eu não estava esperando por isso...!"
16016-360 = "V-você está me provocando,\nSensei?"
16016-370 = "P-por favor, não diga\nessas coisas...!"
16016-380 = "E-eu... o que eu\ndeveria fazer...!"
