[translation]
16016-10 = "ブルーアーカイブ！"
16016-20 = "救護騎士団…いえ、アンティーク・セラフィムのメンバー。蒼森ミネと申します。どうぞよろしくお願いいたします。"
16016-30 = "ここは…"
16016-40 = "大変気に\n入りました。"
16016-50 = "振り付けの練習を\nしたいのですが…"
16016-60 = "ふふ、\nオーディエンスが\nたくさんいますね…"
16016-70 = "ご期待に\n応えられるよう、\n練習しなければ…！"
16016-80 = "おかえりなさい、先生。"
16016-90 = "ご相談したいことが\nあるのですが、少しお時間、\nよろしいでしょうか？"
16016-100 = "ちょうど良いところに\nいらっしゃいましたね。\nさきほど、リハーサルが\n終了いたしました。"
16016-110 = "なんだかこの格好で\n当番をするのは\n不思議な気分ですね…"
16016-120 = "お疲れのご様子ですね…\n疲労回復の歌など、\nいかがでしょうか？"
16016-130 = "いつも先生から教えて\nいただいてばかりの\n私ですが…"
16016-140 = "ダンスと歌でしたら、\nお教えできるかもしれません。"
16016-150 = "何かご要望がありましたら、\n何なりとお申し付けください。"
16016-160 = "これもファンサービスの\n一環、です。"
16016-170 = "お誕生日、おめでとう\nございます、先生。"
16016-180 = "お祝いに一曲、歌っても\nよろしいでしょうか。"
16016-190 = "…覚えていて\nくださったのですね。"
16016-200 = "その…誕生日\nプレゼントとして…"
16016-210 = "一緒にお出かけしませんか？"
16016-220 = "明けましておめでとう\nございます、先生。"
16016-230 = "今年は救護の場ではなく、\nステージでお会いする日が\n多くなるよう祈っております。"
16016-240 = "聖なる日…\nキャロルを歌う日、で\n間違いないでしょうか？"
16016-250 = "こ、この格好は、\nそういうつもりでは…"
16016-260 = "…ですが、仮装と\n言われたら\nそうかもしれません。"
16016-270 = "この関係…まるで、アイドルと\nマネージャーのようですね。\n先生が支援し、私が表舞台に立つ。\n本当にそうなら、\nよかったのですが…残念です。"
16016-280 = "こ、これは…その…"
16016-290 = "想定していたものと…\n違う気がするのですが…！"
16016-300 = "い、いえ！\n嫌というわけでは…\nないのですが…"
16016-310 = "で、ですが！\n好きというわけでも\nないです…！"
16016-320 = "たしかに、私自身は\nかわいいものが\n好きですが…"
16016-330 = "「かわいい」の対象が\n自分というのは…"
16016-340 = "そ、その…\nそういう状況を…"
16016-350 = "想定していたわけでは…！"
16016-360 = "か、からかっていますよね、\n先生？"
16016-370 = "そ、そんな言葉を\n言わないでください…！"
16016-380 = "わ、私……\nどうすれば……！"
