[translation]
20030-10 = "ブルーアーカイブ。"
20030-20 = "運動…そして食欲の季節！まさに美食の祭典…。\nこの絶好の機会、堪能するより他ありませんわ。"
20030-30 = "さあ、美食の探検と\n洒落込みましょうか。"
20030-40 = "さて、どこから\n行きましょう…？"
20030-50 = "食事とは、\n至高の行為。"
20030-60 = "運動効果を\n高めるためにも、\nきちんとした食事は\n必要不可欠ですわ。"
20030-70 = "休憩が終わり\nましたら、屋台巡りに\nいきませんか？"
20030-80 = "おかえりなさいませ、先生。"
20030-90 = "本日のご予定を伺っても？"
20030-100 = "私をこんなに待たせるなんて…。"
20030-110 = "でも、先生の事でしたら…\n私、いくらでも待てますわ。\nふふ。"
20030-120 = "せっかくの体操服ですし…\n競技に参加したい気持ちも\nあるのですが…。"
20030-130 = "試合に出て、応援をし、\n美味しいものを口にする…。"
20030-140 = "実に、完璧な循環ですわ。"
20030-150 = "身体が軽くなった\nようなこの感覚…。"
20030-160 = "体操服とは、良いものですね。"
20030-170 = "いつもより、心に余裕が\n生まれた気がします。"
20030-180 = "この服装のおかげかしら？\nそれとも先生の…？"
20030-190 = "ふふ…。"
20030-200 = "先生、この後、少し\nお時間いただけますか？"
20030-210 = "絶品の屋台へ\nご案内いたしますわ。"
20030-220 = "ええ、もちろん覚えております。"
20030-230 = "今日は、先生のお誕生日。"
20030-240 = "軽装で動きやすいですし…\n一緒に遠出なんて、\nいかがでしょう？"
20030-250 = "私の誕生日の\nお祝いだなんて…"
20030-260 = "ありがとうございます。\nプレゼントは、すでに\n頂いておりますのに…。"
20030-270 = "滅多にない機会ですから、\n我儘をひとつ。"
20030-280 = "よろしければ…\n私の屋台巡りに\n付き合ってください。"
20030-290 = "あけましておめでとう\nございます、先生。"
20030-300 = "新たな年の記念すべき\n始まりの日…。"
20030-310 = "魅力的な屋台料理が\nたくさん堪能できる\n時期でもありますわ。"
20030-320 = "さあ、それでは\n出かけましょうか。"
20030-330 = "クリスマスを共に過ごす…\nふふ、素敵な響きですわね。"
20030-340 = "先生と囲む食卓に\n相応しい料理を\nお持ちしましたわ。"
20030-350 = "さあ、いただきましょう。"
20030-360 = "この格好…\nハロウィーンの仮装だと\n思われてしまったみたいで…。"
20030-370 = "その時に、近くの屋台で\nカボチャのスナックを\n見つけたのです。"
20030-380 = "一緒に参りませんか？"
20030-400 = "心躍る、美味しい\n競技でしたわね。"
20030-410 = "顔は少し汚れて\nしまいましたけれども…。"
20030-420 = "ですが、未知の領域とも\n言える小麦粉の中から"
20030-430 = "自分の感覚だけで\n飴を見つける行為は…。"
20030-440 = "美食を探求する過程と、\nどこか似ているような\n気がして…"
20030-450 = "とても新鮮でした。"
20030-460 = "あ、そうです！"
20030-470 = "先生、いかがでしょう？"
20030-480 = "先程とったこの飴…\n分けて差し上げましょうか？"
20030-2600 = "こちらも総力を挙げて参りましょう。\nこのように目をかけてくださる、\n先生のためにも。"
