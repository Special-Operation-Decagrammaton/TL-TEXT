[translation]
20030-10 = "Blue Archive."
20030-20 = "Exercícios... e a estação do apetite! É o verdadeiro festival da gastronomia... Esta oportunidade perfeita, não há nada a fazer a não ser aproveitá-la ao máximo."
20030-30 = "Vamos, que tal nos aventurarmos\npela gastronomia?"
20030-40 = "Bem, por onde\ndeveríamos começar...?"
20030-50 = "Comer é um\nato supremo."
20030-60 = "Para aumentar os efeitos\ndo exercício, uma refeição\nadequada é indispensável."
20030-70 = "Quando o descanso\nacabar, que tal irmos\nvisitar as barracas?"
20030-80 = "Bem-vindo de volta, Sensei."
20030-90 = "Poderia me contar seus planos para hoje?"
20030-100 = "Me fazer esperar tanto assim..."
20030-110 = "Mas, tratando-se do Sensei... eu posso esperar o quanto for necessário. Fufu."
20030-120 = "Já que estou com este uniforme de ginástica... tenho vontade de participar das competições, mas..."
20030-130 = "Participar das partidas, torcer, e comer coisas deliciosas..."
20030-140 = "É, de fato, um ciclo perfeito."
20030-150 = "Essa sensação de que\nmeu corpo ficou mais leve..."
20030-160 = "Uniforme de ginástica é algo bom, não é?"
20030-170 = "Sinto que meu coração está\nmais tranquilo que o habitual."
20030-180 = "Será por causa desta roupa?\nOu será por causa do Sensei...?"
20030-190 = "Fufu..."
20030-200 = "Sensei, você teria um pouco\nde tempo depois disso?"
20030-210 = "Vou te guiar até uma barraca\nde iguarias excepcionais."
20030-220 = "Sim, é claro que me lembro."
20030-230 = "Hoje é o aniversário do Sensei."
20030-240 = "Como estou com roupas leves e fáceis de se mover... que tal darmos um passeio juntos?"
20030-250 = "Comemorar o\nmeu aniversário..."
20030-260 = "Muito obrigada. Embora eu já tenha\nrecebido o presente..."
20030-270 = "Como é uma oportunidade rara,\nfarei um pedido egoísta."
20030-280 = "Se não se importar...\npor favor, me acompanhe\nna visita às barracas."
20030-290 = "Feliz Ano Novo,\nSensei."
20030-300 = "O dia memorável que marca\no início de um novo ano..."
20030-310 = "É também uma época em que se pode\naproveitar muitas comidas\ndeliciosas de barraca."
20030-320 = "Bem, então,\nvamos sair?"
20030-330 = "Passar o Natal juntos... Fufu, que som maravilhoso."
20030-340 = "Trouxe pratos dignos\nde uma mesa compartilhada\ncom o Sensei."
20030-350 = "Vamos, vamos comer."
20030-360 = "Este visual... parece que pensaram\nque era uma fantasia\nde Halloween..."
20030-370 = "Naquela hora, encontrei um\nsnack de abóbora em uma\nbarraca próxima."
20030-380 = "Não gostaria de ir comigo?"
20030-400 = "Foi uma competição emocionante\ne deliciosa, não foi?"
20030-410 = "Embora meu rosto tenha ficado\num pouco sujo..."
20030-420 = "Mas, o ato de encontrar o doce\ndentro da farinha, que pode ser\nchamado de território desconhecido,"
20030-430 = "usando apenas meus sentidos..."
20030-440 = "Sinto que é um pouco parecido\ncom o processo de explorar\na gastronomia..."
20030-450 = "Foi muito refrescante."
20030-460 = "Ah, é verdade!"
20030-470 = "Sensei, o que acha?"
20030-480 = "Este doce que peguei agora há pouco...\nquer que eu divida com você?"
20030-2600 = "Vamos dar o nosso melhor com força total também. Pelo bem do Sensei, que cuida tanto de nós."
