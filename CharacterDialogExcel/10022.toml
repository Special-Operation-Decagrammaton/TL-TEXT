[translation]
10022-10 = "……Blue Archive."
10022-20 = "Presidente do Comitê Disciplinar de Gehenna, Hina.\n……Isto é apenas um traje para o treinamento de verão, entende?"
10022-30 = "Este traje de banho,\nserá que está estranho……?"
10022-40 = "Será por causa do\ntreinamento……\nmeu corpo está um pouco cansado."
10022-50 = "Trajes de banho fofos\nnão combinam comigo……"
10022-60 = "Aqui é fresco……\nPerfeito para\no treinamento."
10022-70 = "Preciso pensar no\nconteúdo do próximo\ntreinamento……"
10022-80 = "Ah, bem-vindo de volta, Sensei.\nJá estou pronta para\no treinamento."
10022-90 = "Conto com você\npara este verão também."
10022-100 = "……Bem, se você ficar\nme olhando assim, então……."
10022-110 = "Este traje de banho?\nAchei que seria ideal\npara o treinamento do acampamento."
10022-120 = "Não é como se eu estivesse\ncom expectativas ou animada……"
10022-130 = "Quer dizer, talvez só\num pouquinho……"
10022-140 = "Treinar é bom, mas\ndescansar também é importante?"
10022-150 = "……Certamente é um argumento válido.\nMas eu não posso\nme dar ao luxo de relaxar."
10022-160 = "Algo que eu possa fazer……?"
10022-170 = "Obrigada, Sensei.\nSó de ouvir isso,\njá fico feliz."
10022-180 = "Até o último momento\nem que este verão terminar……"
10022-190 = "Eu estarei bem ao seu lado,\npara te ajudar, Sensei."
10022-200 = "Hoje é o seu aniversário,\nSensei?"
10022-210 = "Bem, o que eu faço……\nTem algo que eu possa fazer?"
10022-220 = "Caminhar pela praia\njuntos……?\nFufu. Se for só isso,\nfaço com prazer."
10022-230 = "Meu aniversário……?\nAh, agora que você mencionou."
10022-240 = "Algo que eu queira……?\nNão, nada em especial……"
10022-250 = "Ei, vamos logo\npular no mar juntos?"
10022-260 = "Es-espera um pouco, Sensei!\nEu, eu preciso me preparar mentalmente……!"
10022-270 = "Feliz Ano Novo, Sensei."
10022-280 = "Conto com você neste verão também.\nSe possível, este ano,\ne no próximo verão também……"
10022-290 = "Feliz Natal, Sensei."
10022-300 = "Eu não entendo muito bem\no quão especial\neste dia é."
10022-310 = "Mas fico feliz\npor poder passar\neste dia com você, Sensei."
10022-320 = "Halloween, é……\nNão estou muito acostumada, mas……"
10022-330 = "É tão animado quanto o mar no verão,\ne todos parecem estar se divertindo."
10022-350 = "Por que todo mundo gosta tanto\ndo mar……? Eu sempre\npensei nisso."
10022-360 = "Todos parecem felizes, mas\neu simplesmente não conseguia\ngostar……"
10022-370 = "Não dá para ver nada dentro da água,\ne fico ansiosa quando não sinto o chão……"
10022-380 = "Você nunca se sentiu assim,\nSensei?"
10022-390 = "Especialmente o mar à noite,\né como a escuridão,\nassustador……"
10022-400 = "Só de olhar, parece que\nvai me engolir,\ne eu não conseguia gostar……"
10022-410 = "Mas…… agora,\nsinto que entendo um pouco\no sentimento de todos."
10022-420 = "O mar……\nera tão bonito assim."
10022-430 = "É estranho…… até agora,\nnunca tinha pensado\ndessa forma."
10022-440 = "Obrigada, Sensei.\nPor estar comigo……"
10022-450 = "E por me ensinar\ntantas coisas."
10022-2600 = "Isso é para mim……?\nEntendido, aceito com gratidão.\nAté o último momento, até aquele instante……\nEu vou corresponder às suas expectativas, Sensei."
