[translation]
10022-10 = "……ブルーアーカイブ。"
10022-20 = "ゲヘナの風紀委員長、ヒナ。\n……これはあくまで、夏のトレーニング合宿のための格好だから。"
10022-30 = "この水着、\n変じゃないかな……？"
10022-40 = "トレーニングの\nせいか……\n少し体がだるい。"
10022-50 = "可愛い水着なんて、\n私には似合わない……"
10022-60 = "ここは涼しいね……\nトレーニングに\nぴったり。"
10022-70 = "次のトレーニングの\n内容を考えないと……"
10022-80 = "ああ、おかえり。先生。\nトレーニングの\n準備ならもうできてるよ。"
10022-90 = "今年の夏も、\nよろしく。"
10022-100 = "……えっと、そうやって\nあんまり見られると、その……。"
10022-110 = "この水着？\n合宿のトレーニングには\nちょうど良いかなって。"
10022-120 = "別に期待とか、\n楽しみにしてたわけじゃ……。"
10022-130 = "その、ほんの\n少しくらいしか……。"
10022-140 = "トレーニングもいいけど、\n休息も大事？"
10022-150 = "……確かにそれも正論。\nでも、私がサボる\nわけにはいかないから。"
10022-160 = "何かできること……？"
10022-170 = "ありがとう、先生。\nそう言ってくれるだけで、\n私は嬉しい。"
10022-180 = "この夏が終わる、\n最後の瞬間まで……。"
10022-190 = "私がすぐそばで、\n先生のことを助けるから。"
10022-200 = "今日、先生のお誕生日？"
10022-210 = "えっと、どうしよう……\n私に何かできることある？"
10022-220 = "一緒に、海辺を散歩……？\nふふっ。そんなことで\n良いなら、喜んで。"
10022-230 = "私の誕生日……？\nああ、そういえばそうだった。"
10022-240 = "何か欲しいもの……？\nいや、別に何も……。"
10022-250 = "えっ、取り合えず\n一緒に海に飛び込もう？"
10022-260 = "ちょ、ちょっと待って先生！\nこ、心の準備が……！"
10022-270 = "明けましておめでとう。先生。"
10022-280 = "今年の夏もよろしくね。\nできれば今年も、\nまたその次の夏も……。"
10022-290 = "メリークリスマス、先生。"
10022-300 = "今日がどれだけ\n特別な日なのか、\n私はよく分かってないけど。"
10022-310 = "先生と一緒に\n迎えられたことは、\n嬉しいって思える。"
10022-320 = "ハロウィンか……。\nちょっと慣れないけど……"
10022-330 = "夏の海みたいに賑やかで、\nみんな楽しそうね。"
10022-350 = "何でみんな、そんなに\n海が好きなんだろう……って、\nずっとそう思ってた。"
10022-360 = "みんなは楽しそうだけど、\n私はどうしても\n好きになれなくて……"
10022-370 = "水の中はよく見えないし、\n足がつかないと不安だし……"
10022-380 = "先生も、そう思ったことない？"
10022-390 = "特に夜の海は、\nまるで暗闇みたいに\n不気味で……"
10022-400 = "見てるだけで\n吸い込まれそうで、\n好きになれなかったけど……"
10022-410 = "でも……今は、\nみんなの気持ちが\n少しだけ分かった気がする。"
10022-420 = "海って、\nこんなに綺麗だったのね。"
10022-430 = "不思議……今まで、\nこんな風に思った\nことなかったのに。"
10022-440 = "ありがとう、先生。\n一緒にいてくれて……"
10022-450 = "色んなことを、\n教えてくれて。"
10022-2600 = "これを、私に……？\n分かった、ありがたく受け取る。\n最後の瞬間、その時まで……\n先生の期待に応えてみせるから。"
