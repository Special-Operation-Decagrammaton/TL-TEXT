[translation]
10049-10 = "ブルーアーカイブ。"
10049-20 = "トリニティ総合学園、\n放課後スイーツ部の杏山カズサ。\nえっと、よろしく……お願い、します。"
10049-30 = "……可愛いね。\n悪くない。"
10049-40 = "これ、座っても\n良いのかな……"
10049-50 = "何か美味しそうな\nものが……"
10049-60 = "のんびりした時間……\n悪くないね。"
10049-70 = "これ、\n先生のセンス……？"
10049-80 = "ああ。\nおかえりなさい、先生。\n今日は何をするの？"
10049-90 = "待ってたよ、先生。\n手伝える事があったら、\n何でも言って。"
10049-100 = "何かあったら、\nいつでも言って。"
10049-110 = "あー、でも、小難しい文章を\n読んだりするのは苦手だから……\nそういうのはパスで。"
10049-120 = "ここにいると、何だか\n落ち着く……ちょっと、\n眠くなってきたかも。"
10049-130 = "先生、\nそろそろ何か食べたら？\n……外で何か買ってこようか？"
10049-140 = "……ん？ああ、\n気にしないで先生が\n仕事してるのを見てただけ。"
10049-150 = "え、中学の頃の話……？\n……知らない方が\n良いと思うけど。"
10049-160 = "お誕生日おめでとう、先生。\nプレゼントとかは特に\n無いんだけど……"
10049-170 = "えっと、一緒に散歩でもどう？"
10049-180 = "そっか、私の誕生日だったね\n……うん。ありがとう、先生。\n嬉しいよ。"
10049-190 = "あけましておめでとう、先生。\n今年もよろしくね。"
10049-200 = "年が明けても、\n何かが大きく変わった\n感じはしないけど"
10049-210 = "……それも\n悪くはないかな。"
10049-220 = "クリスマス……か。"
10049-230 = "この後、予定とかある？\n実はその、一応用意して\nあって……"
10049-240 = "ハロウィン……にぎやかだね。\n騒がしいのはあんまり好きじゃ\nないんだけど……。"
10049-260 = "も、もしかして、\n最初から気づいてた……？"
10049-270 = "そっか……\nまあ気づいてない\nわけが無いよね……。"
10049-280 = "いや別に、\n避けてたわけじゃ\nないんだけど……。"
10049-290 = "ただちょっと……\nその……今……\nすっぴん、だから……。"
10049-300 = "あんまり、\n近づくのはちょっと……！"
10049-310 = "っていうか先生、\nそう言ってるのに\n近づかないで。"
10049-320 = "……そ、そう？\n……そうかな？"
10049-330 = "まあ……それなら\n良いんだけど……。"
10049-340 = "……何、その反応。"
10049-350 = "なっ、何！？\n何でそんなに笑うのさ！？"
10049-360 = "ちょっと！！！"
10049-2600 = "……あ、ごめん。\nいや、どうしてこんなものまでくれたのかなって\n思って……先生を手伝える機会が、\nこれからもあるってことかな？\n役に立てるなら良いけど。"
