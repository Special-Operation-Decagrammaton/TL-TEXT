[translation]
20020-10 = "ブル～アーカイブ～。ふふっ。"
20020-20 = "ヴェリタスの部長兼、特異現象捜査部の部長…ミレニアム最高の天才清楚系病弱美少女ハッカーの明星ヒマリと申します。\nふふっ、よろしくお願いしますね、先生。"
20020-30 = "（この部屋、\n少々冷えますね…）"
20020-40 = "たくさんの方が\nいますね…\n…少々疲れます。"
20020-50 = "あら、こんなものが\nあるなんて。なんだか\n面白いですね。"
20020-60 = "ふふっ。この広さなら、\nヴェリタスのみんなや\nエイミと一緒にピクニックが\nできそうですね。"
20020-70 = "悪くない場所ですね。もう少し\n便利機能も充実していると\nいいのですが。…軽く\nハッキングしてみましょうか。"
20020-80 = "あら、お疲れ様です先生。\nお待ちしておりました。"
20020-90 = "では、本日の仕事を\n始めましょうか？ふふっ。"
20020-100 = "いつもお忙しい先生の\nお手伝いに、ミレニアムの\n超天才病弱美少女ハッカーが\n馳せ参じました。"
20020-110 = "歓迎の拍手は無いのですか？\nこう、パチパチパチ…\nというような。"
20020-120 = "ミレニアムの清楚な高嶺の\n花であり、みなさんの憧れである\n「全知」の学位を持つ眉目秀麗な\n乙女から仕事を\n手伝ってもらえるなんて…"
20020-130 = "先生はとびっきりの\n幸運の持ち主ですね。"
20020-140 = "…私の自己紹介が毎回違う？"
20020-150 = "ふふっ。よく気づきましたね、\nその通り、毎回変えております…"
20020-160 = "全部本当の事ですけどね？"
20020-170 = "どうも自分の事を正確に\n伝えようとすると、\nいつも長くなってしまいまして…"
20020-180 = "その都度表現を\n変えているのです。"
20020-190 = "言葉とは、とても\n難しいものですね…。"
20020-200 = "ヴェリタスは変わり者の\n集団だというお話を\n時折小耳に挟むのですが、\nとても残念でなりません…"
20020-210 = "私という稀代の美少女が\nいるというのに、一体\nどういうことなのでしょう？"
20020-220 = "こうしてお仕事を\n手伝っていると、新鮮な\n発見がたくさんあります。"
20020-230 = "先生は普段から\nさまざまなお仕事を\nされているのですね。"
20020-240 = "すぅ…すぅ…"
20020-250 = "ひゃっ…！？\nべ、別に寝てなんかいません。\n本当ですよ？"
20020-260 = "…そうですねあえていうなら、\nレム睡眠とノンレム睡眠の\n関係を考察していただけです。\nええ、そうですとも。"
20020-270 = "あ、お誕生日\nおめでとうございます。先生。"
20020-280 = "今日のような日を私と一緒に\n過ごせるなんて、本当に\n素晴らしい一日になりますね。"
20020-290 = "あら、もう少し喜んでも\n良いんですよ？ふふっ。"
20020-300 = "私の誕生日ですか？\nありがとうございます。"
20020-310 = "…もちろん部員たちから\n祝われた時も\n嬉しかったのですが。"
20020-320 = "先生からお言葉を\nもらえるのは…このような\n気持ちになるのですね。"
20020-330 = "…ふふっ、ええ。\nとても興味深いです。"
20020-340 = "あら…\n新しい年になりましたね。\nあけまして\nおめでとうございます。"
20020-350 = "こうして1年が終わり、\nまた新しい年が訪れ、\nその節目を\n共に過ごすことができる…"
20020-360 = "ふふっ、悪くないですね。\n先生、今年も\nよろしくお願いします。"
20020-370 = "クリスマス…ですか。"
20020-380 = "きっと記念すべき\n日なんでしょうね。"
20020-390 = "ふふっ…\nでは、せっかくですし、\n映画でもご一緒にいかがですか、\n先生？"
20020-400 = "…ハロウィーン、ですか。\n後輩たちは特に\nハロウィーンが好きでした。"
20020-410 = "たしか、イタズラするのに\nぴったりな日だと\n言っていたような。"
20020-420 = "ふふっ、決めました先生。\n久しぶりにみんなでお菓子\nパーティーを開きましょう。"
20020-440 = "ふふっ、どうでしょう？\nミレニアム最高の美少女の足を\n洗う機会なんて…。"
20020-450 = "なかなかお目にかかれ…\nかかれないはずの…。"
20020-460 = "っ…？\n思ったより…\nなんだか変な…"
20020-470 = "奇妙な…\nは、恥ずかしいというか…\nど、どうして…？"
20020-480 = "げ、言語化が難しい感情が…！"
20020-490 = "ただ、先生が私の足を\n丁寧に洗ってくださっている\nだけだというのに…\nどうして…？"
20020-500 = "ふ、ふふっ。ええ、\nもちろん覚悟はできて\nおりますので、お気になさらず。\nどうぞ、心ゆくまで…！"
20020-510 = "…覚悟は、できている…\nはず、ですので。"
20020-520 = "え、ええ…で、では…\nよろしくお願いします…。"
20020-2600 = "まあ、こんなに貴重なものを\nいただけるなんて。\nなにかお願い事でもあるのですか？\n私は超天才美少女ですから、\n何でも叶えて差し上げ…え？\nいつも頼りにしているから…？\nそ、そうでしたか…\nありがとうございます…先生。"
