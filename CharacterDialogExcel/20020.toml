[translation]
20020-10 = "Blue Archive. Hehe."
20020-20 = "Sou a chefe da Veritas e também da Divisão de Investigação de Fenômenos Singulares... Prazer, sou Himari Akeboshi, a hacker mais genial, pura e frágil do Millennium.\nHehe, conto com você, Sensei."
20020-30 = "（Este quarto... está um pouco frio...）"
20020-40 = "Tem muita gente aqui... ...estou um pouco cansada."
20020-50 = "Ora, que interessante encontrar algo assim por aqui."
20020-60 = "Hehe. Com esse espaço todo, daria até para fazer um piquenique com o pessoal da Veritas e a Eimi."
20020-70 = "Não é um lugar ruim. Seria melhor se tivesse mais funções úteis, porém... Que tal eu dar uma hackeada de leve?"
20020-80 = "Ora, olá, Sensei. Estava à sua espera."
20020-90 = "Então, vamos começar o trabalho de hoje? Hehe."
20020-100 = "A super genial e frágil hacker do Millennium veio para ajudar o Sensei, que está sempre tão ocupado."
20020-110 = "Não vai ter uma salva de palmas de boas-vindas? Sabe, algo como... clap, clap, clap..."
20020-120 = "Receber ajuda no trabalho de uma donzela de beleza estonteante, que possui o grau de 'Onisciência', é a flor mais pura e inalcançável do Millennium e o sonho de todos..."
20020-130 = "Você é uma pessoa de muita sorte, Sensei."
20020-140 = "…Minha apresentação muda toda vez?"
20020-150 = "Hehe. Percebeu, é? Pois é, eu mudo toda vez..."
20020-160 = "Mas tudo o que digo é verdade, viu?"
20020-170 = "É que, quando tento descrever a mim mesma com precisão, acabo sempre me alongando demais..."
20020-180 = "Por isso, mudo a forma de me expressar a cada vez."
20020-190 = "As palavras são coisas muito difíceis, não é?"
20020-200 = "Ouço dizerem por aí que a Veritas é um bando de esquisitos, o que é uma pena..."
20020-210 = "Como podem dizer isso, sendo que eu, uma beldade sem igual, faço parte do grupo?"
20020-220 = "Ajudar com o trabalho assim me traz muitas descobertas novas."
20020-230 = "Você faz diversos tipos de trabalho no dia a dia, não é, Sensei?"
20020-240 = "Zzz... zzz..."
20020-250 = "Ah...!? E-eu não estava dormindo. É sério!"
20020-260 = "…Bom, se quer saber, eu estava apenas analisando a relação entre o sono REM e o sono não-REM. Sim, exatamente isso."
20020-270 = "Ah, feliz aniversário, Sensei."
20020-280 = "Poder passar um dia como hoje ao meu lado... com certeza será um dia maravilhoso."
20020-290 = "Ora, pode ficar um pouco mais feliz, sabe? Hehe."
20020-300 = "Meu aniversário? Muito obrigada."
20020-310 = "…Claro que fiquei feliz quando os membros do clube me parabenizaram."
20020-320 = "Mas receber suas palavras... é um sentimento diferente, não é?"
20020-330 = "…Hehe, sim. É muito interessante."
20020-340 = "Ora... um novo ano começou. Feliz Ano Novo."
20020-350 = "O ano termina, um novo começa, e poder passar essa virada ao seu lado..."
20020-360 = "Hehe, não é nada mal. Sensei, conto com você este ano também."
20020-370 = "Natal... é?"
20020-380 = "Com certeza é um dia memorável."
20020-390 = "Hehe... Já que estamos aqui, que tal assistirmos a um filme juntos, Sensei?"
20020-400 = "…Halloween, é? As minhas veteranas gostavam muito de Halloween."
20020-410 = "Se não me engano, diziam que era o dia perfeito para pregar peças."
20020-420 = "Hehe, decidi, Sensei. Vamos fazer uma festa de doces com todo mundo depois de tanto tempo."
20020-440 = "Hehe, o que acha? Uma oportunidade de lavar os pés da maior beldade do Millennium..."
20020-450 = "É algo que você dificilmente... não deveria conseguir ver..."
20020-460 = "…? Mais do que eu pensava... é algo meio estranho..."
20020-470 = "É bizarro... ou melhor, é vergonhoso... por que...?"
20020-480 = "É um sentimento difícil de colocar em palavras...!"
20020-490 = "É só o Sensei lavando meus pés com cuidado, mas... por que...?"
20020-500 = "H-hehe. Sim, claro que estou preparada, não se preocupe. Pode continuar, o quanto quiser...!"
20020-510 = "…Eu deveria estar... preparada..."
20020-520 = "E-eh... B-bem... \nConto com você..."
20020-2600 = "Ora, receber algo tão valioso assim... \nVocê tem algum pedido? \nComo sou uma super gênia beldade, \nposso realizar qualquer coisa... hein? \nPorque você sempre conta comigo...? \nE-entendo... \nMuito obrigada... Sensei."
