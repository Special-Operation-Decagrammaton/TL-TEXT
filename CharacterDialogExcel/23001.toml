[translation]
23001-20 = "Sou a Fuuka, do Clube de Refeições.\nSe houver algo que queira comer,\npode me pedir a qualquer momento."
23001-30 = "Será que dá para\ncozinhar aqui também?"
23001-40 = "O que será que vou\nfazer para o jantar hoje..."
23001-50 = "Desse jeito, talvez\nos ingredientes não sejam suficientes."
23001-60 = "Acho que vou ter que\npassar no mercado..."
23001-70 = "Vamos começar a cozinhar?"
23001-80 = "Bom trabalho! Preparei\numa refeição quentinha.\nVai comer agora?"
23001-90 = "Sensei, você prefere o ovo\ncom a gema mole?\nEstilo sunny side up?\nOu talvez um omelete?"
23001-100 = "Você tem se alimentado\ndireito? Quer que eu\nprepare algo para você?"
23001-110 = "Cozinhar para todos é\ncansativo, mas estou bem."
23001-120 = "Ahaha...\nVocê está preocupado comigo?"
23001-130 = "Estou curiosa sobre\nsua comida favorita."
23001-140 = "Hm?\nPor que, você pergunta?"
23001-150 = "É segredo!"
23001-160 = "Hmm... O que seria bom\npreparar para o Sensei\nficar mais animado..."
23001-170 = "Sensei. Feliz\naniversário."
23001-180 = "Em um dia como hoje, imagino\nque você vá comer algo\nmuito especial..."
23001-190 = "Bem, se... se não se importar,\nposso preparar a comida\ndo seu aniversário?"
23001-200 = "Ah...\nÉ o meu aniversário?"
23001-210 = "Ah, ahaha... Eu sempre\nfico preocupada apenas com\no aniversário dos outros..."
23001-220 = "...Estou feliz.\nObrigada."
23001-230 = "Um novo ano\ncomeça agora!"
23001-240 = "Estava pensando em fazer\num Ozoni, o que acha?"
23001-250 = "Natal..."
23001-260 = "Estava pensando em preparar\num jantar especial..."
23001-270 = "C-claro, se o\nSensei quiser!"
23001-280 = "Sopa de abóbora, torta de\nabóbora, gratinado de abóbora..."
23001-290 = "Pensei em tentar fazer\ntudo o que eu conseguir."
23001-300 = "Afinal, é Halloween.\nDo que você gosta,\nSensei?"
23001-320 = "Eu já imaginava que\nseria assim... Você estava\ncomendo só instantâneos de novo, né?"
23001-330 = "Não pode, você precisa\nse alimentar direito."
23001-340 = "Vou preparar algo agora mesmo,\nentão espere um pouco."
23001-350 = "Poxa, não cuidar da saúde\né um péssimo hábito seu, Sensei."
23001-360 = "Sim? V-você quer comer a minha\ncomida todos os dias?"
23001-370 = "A-ahaha...\nS-se o Sensei quiser...\nClaro, por mim\nnão tem problema..."
23001-2600 = "Ahaha...\nNão estou acostumada com esse tipo de apoio, mas farei o meu melhor para ser útil ao Sensei."
