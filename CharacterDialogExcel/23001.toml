[translation]
23001-20 = "給食部のフウカです。\n食べたいものがあったら、\nいつでも仰ってください。"
23001-30 = "ここでも料理が\nできるかな？"
23001-40 = "今日の夕食は\n何にしよう…。"
23001-50 = "このままじゃ、\n食材が足りないかも。"
23001-60 = "スーパーに\n寄らなきゃかも…。"
23001-70 = "料理を始めましょうか。"
23001-80 = "お疲れ様です！\n温かい食事を\nご用意しましたけど、\n今召し上がりますか？"
23001-90 = "先生、卵は半熟の\nままがいいですか？\nサニーサイドアップ？\nそれとも卵焼き？"
23001-100 = "ご飯はちゃんと\n食べてますか？\n何か作りましょうか？"
23001-110 = "皆のために料理を\n作るのは大変ですが、\n大丈夫です。"
23001-120 = "あはは…。\n心配してくださるのですか？"
23001-130 = "好きな食べ物、\n気になります。"
23001-140 = "ん？\n何でか、ですって？"
23001-150 = "秘密です！"
23001-160 = "うーん…。先生が\nもっと元気になるような\n料理、何が良いかな…。"
23001-170 = "先生。お誕生日\nおめでとうございます。"
23001-180 = "今日みたいな日には\nきっと、すごく特別な\nものを召し上がるかと\n思うのですが…。"
23001-190 = "えっと、よ…よろしければ、\n私がお誕生日のお料理を\n作ってもいいでしょうか？"
23001-200 = "あれ…。\n私の誕生日ですか？"
23001-210 = "あ、あはは…。いつも\n他の方のお誕生日ばかり\n気にしていたので…。"
23001-220 = "…嬉しいです。\nありがとうございます。"
23001-230 = "新しい一年が\n始まりますね！"
23001-240 = "お雑煮を作ろうかと\n思うのですが、\nいかがでしょう？"
23001-250 = "クリスマス…。"
23001-260 = "特別な夕食を作ろうかと\n思っているのですが…。"
23001-270 = "も、もちろん、\n先生がよろしければ！"
23001-280 = "カボチャスープとか、\nカボチャパイとか、\nカボチャのグラタンとか、"
23001-290 = "作れそうなものは\n全部作ってみようかと\n思いまして。"
23001-300 = "ハロウィーンですからね。\n先生はどんなのが\n好きですか？"
23001-320 = "こうなっていると\n思っていました…。\nまたインスタントばかり\n食べてましたね？"
23001-330 = "ダメですよ、\n食事はちゃんと取らないと。"
23001-340 = "私がすぐ作りますから、\nちょっと待っててください。"
23001-350 = "もう、健康に気を付けないのは\n先生の悪い癖ですよ。"
23001-360 = "はい？ま、毎日私の作った\n料理が食べたい、ですか？"
23001-370 = "あ、あはは…\nせ、先生さえよろしければ…。\nもちろん、\n私は構わないのですが…。"
23001-2600 = "あはは……\nこういった支援には慣れていませんが、\n先生のお役に立てるよう、\n最善を尽くします。"
