[translation]
20027-10 = "Blue Archive."
20027-20 = "É hora de pescar, Sensei. Vamos."
20027-30 = "Aqui... não parece que vou conseguir nada."
20027-40 = "Aquilo é...?"
20027-50 = "Se ao menos tivesse um pesqueiro..."
20027-60 = "...Será que dá para pegar aquilo?"
20027-70 = "...Hm? Que barulho foi esse?"
20027-80 = "Bem-vindo de volta, Sensei."
20027-90 = "Talvez não seja algo que se diga para alguém que acabou de chegar, mas..."
20027-100 = "...Vamos sair?"
20027-110 = "Eu estava te esperando, Sensei."
20027-120 = "Não é uma chance que aparece sempre."
20027-130 = "Vou fazer o máximo que puder."
20027-140 = "Sensei, tem algo que você queira fazer?"
20027-150 = "Onde quer ir e o que quer fazer? Ou está com fome?"
20027-160 = "Estou vestindo isso por sua causa, Sensei."
20027-170 = "Hm, vou pescar algo grande, pode esperar."
20027-180 = "Ar-condicionado e ventiladores são bons, mas..."
20027-190 = "Talvez eu prefira ficar debaixo d'água."
20027-200 = "Falando nisso... Sensei, você sabe nadar? Quer que eu te ensine?"
20027-210 = "Feliz aniversário, Sensei."
20027-220 = "O banquete de aniversário... pode ser sashimi?"
20027-230 = "Ah, é meu aniversário..."
20027-240 = "Você lembrou... obrigado, Sensei."
20027-250 = "Ano Novo... né. Feliz Ano Novo, Sensei."
20027-260 = "Hm. Vamos a vários lugares juntos neste ano também."
20027-270 = "Natal... é."
20027-280 = "Debaixo d'água não é... mais quente."
20027-290 = "...É, não deu certo."
20027-300 = "Halloween... vi alguém usando uma abóbora na cabeça."
20027-310 = "...Será que eu deveria tentar usar uma também?"
20027-330 = "...Cheguei, Sensei."
20027-340 = "...Hm, consegui. ...Agora dá para fazer."
20027-350 = "Aquele prato que vi no panfleto."
20027-360 = "Já preparei os utensílios de cozinha, então não tem problema."
20027-370 = "...Ainda bem que você veio comigo, Sensei."
20027-380 = "Se estivesse sozinha, talvez tivesse desistido no meio do caminho."
20027-390 = "Não... não é isso. Até mesmo o motivo de eu ter começado a pensar nisso agora..."
20027-400 = "Tudo... foi porque você estava comigo, Sensei."
20027-410 = "...Sensei. ...Obrigada."
20027-2600 = "Mesmo vindo a um lugar como este... você não muda, Sensei. Sempre me dando suporte... não, obrigado por me ajudar."
