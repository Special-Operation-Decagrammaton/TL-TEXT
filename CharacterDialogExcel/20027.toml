[translation]
20027-10 = "ブルーアーカイブ。"
20027-20 = "釣りの時間だよ、先生。行こう。"
20027-30 = "ここでは…\n獲れそうにない。"
20027-40 = "あれは…？"
20027-50 = "釣り堀があれば…。"
20027-60 = "…あれ、獲れるかな？"
20027-70 = "…ん？今の音は…。"
20027-80 = "おかえり、先生。"
20027-90 = "今来たばっかの人に\nかける言葉じゃ\nないかもしれないけど…"
20027-100 = "…外、出よっか。"
20027-110 = "待ってたよ、先生。"
20027-120 = "そう何度もある\nチャンスじゃないから。"
20027-130 = "できることは\n最大限やってみる。"
20027-140 = "先生、なにかしたいことある？"
20027-150 = "どこに行って、何したい？\nそれともお腹空いた？"
20027-160 = "これ、先生のために着てる。"
20027-170 = "ん、大物を獲ってくるから\n期待してて。"
20027-180 = "エアコンや\n扇風機もいいけど…"
20027-190 = "水中の方が好きかも。"
20027-200 = "そういえば…\n先生は、泳げる？教えようか？"
20027-210 = "お誕生日\nおめでとう、先生。"
20027-220 = "誕生日のご馳走…\nお刺身でいい？"
20027-230 = "あ、誕生日…。"
20027-240 = "覚えてくれてたんだ、\nありがとう。先生。"
20027-250 = "新年…だね。\nあけましておめでとう、先生。"
20027-260 = "ん。新年も一緒に、\n色んなとこ行こう。"
20027-270 = "クリスマス…か。"
20027-280 = "水中の方が温か…くはない。"
20027-290 = "…やっぱり無理か。"
20027-300 = "ハロウィン…\nカボチャを被った人を見たよ。"
20027-310 = "…私も被ってみようかな。"
20027-330 = "…ただいま、先生。"
20027-340 = "…ん、成功した。\n…これで、作れるよ。"
20027-350 = "パンフレットで見た、\nあの料理。"
20027-360 = "料理道具も準備したから、\n問題ない。"
20027-370 = "…先生が一緒に\n来てくれてよかった。"
20027-380 = "一人だったら、途中で\nやめてたかもしれない。"
20027-390 = "ううん…そんなことない。\n今も、これを考えるように\nなったきっかけも。"
20027-400 = "すべて…先生が\nいてくれたから。"
20027-410 = "…先生。…ありがとう。"
20027-2600 = "こういうところに来ても…\n先生は変わらないね。\nいつも支援…いや。\n…助けてくれて、ありがとう。"
