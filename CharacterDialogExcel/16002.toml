[translation]
16002-20 = "説明や解説が必要なら\n私に任せてください！"
16002-30 = "正解はいつも\n問題のそばにあります。\n誤答もそうですが。"
16002-40 = "うん？どこからか、誰かが！\n説明を必要としてる気がします。"
16002-50 = "うう、説明してあげたい！\n今すぐ！"
16002-60 = "謎はすべて解けました！"
16002-70 = "私の説明はいつも完璧です。\n長すぎる、ということだけ除けば！"
16002-80 = "ようこそ先生！\n今日の日程について\n説明しますね！"
16002-90 = "良い一日ですね先生！\nとりあえずブリーフィング室\nに来てください！"
16002-100 = "気になることがあれば\n声に出して呼んでくださいね！"
16002-110 = "助けてコトリ！\nって！"
16002-120 = "良い質問ですね、先生！\nその質問にお答えしましょう！"
16002-130 = "このメガネですか？\nカッコいいでしょう？\n先生もかけてみますか？"
16002-140 = "説明は無知という暗闇を\n克服する光になります。"
16002-150 = "…あまり煌びやかなだけでも\nダメですが。"
16002-160 = "あっ、誰かが今、\n何かを知りたがってます。"
16002-170 = "先生！\n今すぐ出動しましょう！"
16002-180 = "お誕生日おめでとうございます\n先生！誕生日というのは、\n自分が生まれた日を記念\nした特別な日でして…"
16002-190 = "あっ！\nどこに行くんですか？？"
16002-200 = "誕生日を迎えたので、\nちょっと私の話をしますと…"
16002-210 = "あっ！待ってください！\nまだ私の話は終わってません！"
16002-220 = "まだ「起承転結」の\n「起」ぐらいですよ！"
16002-230 = "新年あけましておめでとう\nございます！"
16002-240 = "今年は、なんだか先生の\n授業をもっとたくさん\n受けたい気持ちですね。"
16002-250 = "メリークリスマス！\n救世主と呼ばれた赤ちゃんが\n誕生したと言われるこの日！\nどうして恋人たちの日に…"
16002-260 = "うん？\n恋人…？"
16002-270 = "トリックオアトリート！\n飴をくれないと\n説明をしま…"
16002-280 = "って、わっ！\nこんなにたくさん要りません！"
16002-300 = "え……えぇぇっ！？\nど、どうしてそんな急に、\nえ、そ、それは……っ！？"
16002-310 = "すみません、念のため、\nもう一度聞いても……？"
16002-320 = "え、あ、う……\nそ、そうでしたか……"
16002-330 = "え、えっと、\nそれは何と言いますか………。"
16002-340 = "ち、ちなみになぜ急に\nそのようなことを……？\n何かその、理由ですとか……。"
16002-350 = "や、えっと、特に無くても\n大丈夫なのですが！"
16002-360 = "も、もちろん\n自分のことですから、\n知ってますし……！？"
16002-370 = "え、えっと、\nわ、私のことですよね！？\n私は普段その、"
16002-380 = "例えば色んな\n知識を吸収したり、先生のことを\n考えたり、それからえっと……！"
16002-390 = "……？\nあれ、今私、\n何て言いました……？"
16002-400 = "色んな知識を吸収したり、\n先生のこと、を……。"
16002-410 = "あ、あはは……。"
16002-420 = "いや今のはその……っ！\nうぅ、あぅぅ……！"
16002-2600 = "この武器の名は……\nプロフェッサーK！"
