[translation]
10054-10 = "Blue Archive!"
10054-20 = "Para cultivar um espírito saudável, devemos cultivar o corpo... Que haja bênçãos em seu caminho."
10054-30 = "Uau... Que lugar maravilhoso."
10054-40 = "Há alguém... que precise de ajuda?"
10054-50 = "Que tal fazermos uma pequena pausa?"
10054-60 = "Sinto que meu corpo está mais leve que o habitual..."
10054-70 = "...Fufu."
10054-80 = "Bem-vindo de volta, Sensei!"
10054-90 = "Rezo para que hoje também seja um dia maravilhoso."
10054-100 = "Bem-vindo de volta, Sensei."
10054-110 = "Preparei um pouco de água gelada."
10054-120 = "Gostaria de aceitar?"
10054-130 = "Hoje, não como uma irmã,"
10054-140 = "mas como uma atleta, cumprirei esta tarefa."
10054-150 = "Talvez por estar diferente do meu traje habitual..."
10054-160 = "Sinto-me um pouco inquieta."
10054-170 = "Sensei..."
10054-180 = "Digo, se não se importar, posso ficar ao seu lado?"
10054-190 = "Que as bênçãos estejam com você, Sensei."
10054-200 = "...A vestimenta não importa na hora de rezar, sabe?"
10054-210 = "Como este traje mostra mais do que o normal..."
10054-220 = "Sinto-me um pouco envergonhada..."
10054-230 = "Feliz aniversário, Sensei."
10054-240 = "Há algo que você queira?"
10054-250 = "U-uma comemoração de aniversário... para mim...?"
10054-260 = "Uau... Muito obrigada...!"
10054-270 = "Feliz Ano Novo, Sensei."
10054-280 = "Que tal nos exercitarmos juntos este ano também?"
10054-290 = "É uma noite sagrada."
10054-300 = "Se quiser, gostaria de fazer uma oração comigo?"
10054-310 = "É um dia bem animado."
10054-320 = "De alguma forma, até eu começo a me sentir alegre."
10054-340 = "Haa, haa... Desculpe, Sensei..."
10054-350 = "Não era minha intenção... haa..."
10054-360 = "que você me visse neste estado..."
10054-370 = "Desculpe, primeiro... vou me acalmar, e depois continuamos..."
10054-380 = "Haa... fuu..."
10054-390 = "Eh...!? Ah, digo, não foi nesse sentido...!"
10054-400 = "S-só de ouvir suas palavras, já sou muito grata..."
10054-410 = "Sim..."
10054-420 = "(O Sensei se preocupar comigo...)"
10054-430 = "(Eu nunca imaginei que algo assim pudesse acontecer...)"
10054-440 = "Ei..."
10054-450 = "Não sei se deveria dizer isso, mas..."
10054-460 = "Sinto como se estivesse tendo o Sensei só para mim..."
10054-470 = "Isso pode acabar sendo um pecado... mas,"
10054-480 = "eu... estou muito feliz... neste momento..."
10054-2600 = "Assim como o tiro que anuncia o início de uma partida, que esta pequena arma também sirva apenas para a paz..."
