[translation]
10054-10 = "ブルーアーカイブ！"
10054-20 = "健全な精神を育成するべく\n肉体を育む……\nその行く道にご加護があらんことを。"
10054-30 = "わぁ……\n素敵な場所ですね。"
10054-40 = "手助けが必要な方は……\nいらっしゃる\nでしょうか？"
10054-50 = "ひと休み\nしていきましょうか？"
10054-60 = "いつもより身体が\n軽い気がします……。"
10054-70 = "……ふふっ。"
10054-80 = "おかえりなさいませ、先生！"
10054-90 = "本日も素敵な一日と\nなりますよう、祈っております。"
10054-100 = "おかえりなさい、先生。"
10054-110 = "冷たいお水をご用意しました。"
10054-120 = "よろしければいかがでしょう？"
10054-130 = "今日はシスターではなく、"
10054-140 = "一人の選手としてこの業務を\n務めさせていただきます。"
10054-150 = "普段の格好と\n違うからか……"
10054-160 = "なんだか\n落ち着かないですね。"
10054-170 = "先生……"
10054-180 = "その、もしよろしければ、\nおそばにいてもいいですか？"
10054-190 = "先生にどうか\nご加護があらんことを。"
10054-200 = "……お祈りに\n服装は関係ありませんよ？"
10054-210 = "普段より\n色々見える格好なので……"
10054-220 = "少し恥ずかしい気も、\nします……。"
10054-230 = "お誕生日\nおめでとうございます、先生。"
10054-240 = "何か欲しいものはありますか？"
10054-250 = "た、誕生日祝い、\nですか……？私の……？"
10054-260 = "わぁ……\nありがとうございます……！"
10054-270 = "明けまして\nおめでとうございます、先生。"
10054-280 = "今年も……一緒に\n運動なんていかがでしょうか？"
10054-290 = "聖なる夜ですね。"
10054-300 = "よろしければ、\n一緒にお祈りを捧げませんか？"
10054-310 = "賑やかな日ですね。"
10054-320 = "なんだか\n私まで楽しくなってきます。"
10054-340 = "はぁ、はぁ……\nすみません、先生……。"
10054-350 = "こんな姿を……はぁ……"
10054-360 = "お見せするつもりでは\nなかったのですが……。"
10054-370 = "すみません、まずは……\n落ち着いてから、続きを……。"
10054-380 = "はぁ……ふぅ……。"
10054-390 = "えっ……！？\nあっ、その、\n別にそういう意味では……！"
10054-400 = "お、お言葉だけでも\nとてもありがたいです……"
10054-410 = "ええ……。"
10054-420 = "（先生が……私のことを気に\nかけてくださるなんて……）"
10054-430 = "（そんな事、思いも\nしておりませんでした……）"
10054-440 = "あの……"
10054-450 = "こんな事を、口にして良いのか\n分かりませんが……。"
10054-460 = "先生を\n独り占めしているみたいで……"
10054-470 = "こんな事、\n罰があたってしまうかも\nしれません……でも、"
10054-480 = "私……この時間が、\nとても幸せ……なんです……。"
10054-2600 = "試合の始まりを知らせる銃声のように、\nどうかこの小さな武器も、\n平和のためのものでありますよう……。"
