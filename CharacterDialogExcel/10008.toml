[translation]
10008-10 = "Blue Archive!"
10008-20 = "Ah???\nCaramba, no fim das contas você me achou.\nJá que chegamos a esse ponto, não tenho escolha a não ser te ajudar."
10008-30 = "Heh, é um lugar\nbastante agradável."
10008-40 = "O que foi? Está tentando\nme apoiar?\nHa! Que interessante."
10008-50 = "A coisa mais interessante?\nBem, isso seria\nvencer, é claro."
10008-60 = "Bem... então... \nI-idiota! Sensei, seu idiota!"
10008-70 = "Ugh... que vergonha, mas...\nO-obrigada!"
10008-80 = "Ei... então, tipo... \nV-vamos juntos!"
10008-90 = "Ei, Sensei!\nVocê demorou, hein."
10008-100 = "Vamos lá, Sensei!\nVamos nos divertir hoje também!"
10008-110 = "Caramba, me fazer\nesperar desse jeito,\nque inacreditável."
10008-120 = "Muito bem, \nque tal irmos fazer uma limpeza?"
10008-130 = "A sensação de trabalhar com alguém incrível,\njá entendeu como é, né?"
10008-140 = "Vou fazer o trabalho direitinho."
10008-150 = "Se precisar de ajuda,\né só falar.\nEu faço qualquer coisa."
10008-160 = "Ei, Sensei.\nFeliz aniversário!\nÉ que... por acaso... eu ganhei\num bolo, e..."
10008-170 = "...Quer comer?"
10008-180 = "Haha, Sensei!\nSabe que dia é hoje?\nNão que eu me importe se\nvocê não sabia, mas,"
10008-190 = "eu vou ganhar um presente.\nVamos, a-go-ra-mes-mo!"
10008-200 = "Ei, Sensei.\nFeliz Ano Novo.\nEste ano... então..."
10008-210 = "Ah, droga!\nÉ só um 'conto com você'!!"
10008-220 = "Ei, Sensei.\nFeliz Natal... né?"
10008-230 = "...Não tem?\nO presente!"
10008-240 = "Ei, Sensei.\nDoces ou travessuras."
10008-250 = "...Hã?\nVocê não sabe o que isso significa?"
10008-270 = "Bem-vindo, Sensei.\nMeu assento especial,\nsinta-se à vontade!"
10008-280 = "Eu gosto desta escola.\nE também... deste momento."
10008-290 = "Se estou com medo? Nem um pouco.\nSó estou com o coração acelerado."
10008-300 = "Bem, de vez em quando, matar aula\nnão é nada mal. Hahaha!"
10008-2600 = "Um demônio com um porrete, um dragão com asas.\nE eu, com\nduas submetralhadoras!"
