[translation]
10008-10 = "ブルーアーカイブ！"
10008-20 = "あぁ？？？\nったく、結局見つかっちまったか。\nこうなった以上、手伝うしかねえな。"
10008-30 = "へぇ、なかなか\nいい場所だな。"
10008-40 = "なんだ？応援でもして\nくれてんのか？\nはっ！面白いじゃん。"
10008-50 = "一番面白い事？\nまあ、そりゃあ\n勝つことだな。"
10008-60 = "えっと…だから…\nバ、バカ！先生のバカ野郎！"
10008-70 = "うぅ…恥ずかしい、けど。\nあ、ありがとな！"
10008-80 = "なあ…だからその…\nい、一緒に行くぞ！"
10008-90 = "よお、先生！\n遅かったじゃん。"
10008-100 = "ほら、先生！\n今日も楽しく行こうぜ！"
10008-110 = "ったく、あたしを\n待たせるとは、\n呆れたもんだぜ。"
10008-120 = "さあ～て、\n掃除でもしに行くか？"
10008-130 = "最高の奴と一緒に働く感覚、\nもう分かっただろ？"
10008-140 = "仕事はきっちりやるぞ。"
10008-150 = "助けが必要なら\nいつでも言えよ。\n何でもやってやる。"
10008-160 = "よお、先生。\nハッピーバースデー！\nあのさ…。偶然…もらった\nケーキがあるんだけど…"
10008-170 = "…食べるか？"
10008-180 = "はは、先生！\n今日が何の日か分かるか？\n別に知らなかった、\nでもいいけど、"
10008-190 = "あたしはプレゼントを\nもらうからな。\nほら、い・ま・す・ぐ！"
10008-200 = "よお、先生。\nハッピーニューイヤーだな。\n今年も…だから…。"
10008-210 = "あぁもう！\nよろしくってことだよ！！"
10008-220 = "よお、先生。\nメリークリスマス…だろ？"
10008-230 = "…ないのか？\nプレゼントだよ！"
10008-240 = "よお、先生。\nトリックオアトリートだよ。"
10008-250 = "…はぁっ？\nどんな意味か知らねえのか？"
10008-270 = "ようこそ、先生。\nあたしだけの特等席、\n歓迎するぜ！"
10008-280 = "あたしはこの学園が好きだ。\nそれに…この瞬間も。"
10008-290 = "怖くないのかって？全然。\nただ、ドキドキはしてる。"
10008-300 = "まあ、たまにはサボるのも\n悪くねぇな。ははは！"
10008-2600 = "鬼に金棒、龍に翼。\nそしてあたしには\n二丁のサブマシンガン！"
