[translation]
10080-10 = "Blue Archive."
10080-20 = "Ora, eu já deveria ter me apresentado... Será que você não se lembra? Ufufu."
10080-30 = "Ora, que decoração adorável, não acha?"
10080-40 = "Você tem bom gosto."
10080-50 = "Tem muita gente interessante por aqui, né?"
10080-60 = "De alguma forma... sinto-me relaxada."
10080-70 = "Talvez seja porque não preciso me preocupar com nada aqui... Não é nada mal."
10080-80 = "Bem-vindo, Sensei. ...Apesar da aparência, eu esperei bastante, viu☆"
10080-90 = "Hm? ...Eu só estava aqui por estar. Não tenho um guia e não queria sair muito por aí."
10080-100 = "O trabalho de Sensei parece ser igual ao que eu conheço, mas ao mesmo tempo, é diferente."
10080-110 = "O trabalho parece exaustivo... Quer que eu ajude? ...Claro, do jeito normal, é claro."
10080-120 = "Na verdade, minha cabeça ainda dói um pouco agora."
10080-130 = "O controle remoto...? É importante, com certeza, mas... não é como se houvesse algo de especial nele, sabe?"
10080-140 = "Falando nisso, o que tem de bom para comer por aqui? Pode me levar a algum lugar que você recomende?"
10080-150 = "É o seu aniversário, Sensei, não é? Como devo comemorar?"
10080-160 = "...A propósito, tem alguém com quem você queira passar o dia?"
10080-170 = "Feliz ano novo, Sensei. ...Será que essa é a saudação correta por aqui?"
10080-180 = "Natal, é... Quantas vezes você já fez o papel de Papai Noel, Sensei?"
10080-190 = "Lá fora está barulhento, né. Bem... aqui não me incomoda."
10080-210 = "...O que foi? Aconteceu alguma coisa?"
10080-220 = "De qualquer forma, eu acho que isso ia acontecer uma hora ou outra, não acha?"
10080-230 = "Não é?"
10080-240 = "...O controle remoto? ...Você realmente vai perguntar sobre isso?"
10080-250 = "Talvez falte um pouco de consideração da sua parte?"
10080-260 = "Se uma garota não quer falar sobre algo..."
10080-270 = "Não tente forçar a barra, viu☆"
10080-280 = "Entendido? Você não viu nada e, para começo de conversa, nada aconteceu."
10080-290 = "...Não é, Sensei?"
10080-2600 = "Você também é uma pessoa peculiar. Ah, não digo isso de um jeito ruim. ...Normalmente, as pessoas não confiam em alguém cujos pensamentos elas não conseguem ler... mas vou considerar que você apenas não está desconfiando de mim, pode ser?"
