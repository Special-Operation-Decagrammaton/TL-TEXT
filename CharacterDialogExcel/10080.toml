[translation]
10080-10 = "ブルーアーカイブ。"
10080-20 = "あら、自己紹介はしたはずだけど……\nもしかして覚えてないのかしら？うふふっ。"
10080-30 = "あら、なかなか可愛い\nインテリアじゃない？"
10080-40 = "センスあるじゃない。"
10080-50 = "面白そうな\n子が多いわねぇ。"
10080-60 = "なんだか……\n落ち着くかも。"
10080-70 = "気を使わなくていい\n場所だからかしら……\n悪くないわね。"
10080-80 = "いらっしゃい、先生。\n……こう見えて、\n結構待ったんだゾ☆"
10080-90 = "ん？……なんとなく、\nここにいただけよぉ。\nガイドもいないし、\nあんまり出かけたくなくって。"
10080-100 = "先生のお仕事って、\n私が知ってるものと\n同じようで違うのねぇ。"
10080-110 = "お仕事、大変そうねぇ……\n手伝いましょうか？\n……もちろん、\n普通のやり方よぉ。"
10080-120 = "実はまだ、\n今も頭がちょっと\n痛むのよぉ。"
10080-130 = "リモコン……？\nたしかに大事だけどぉ……\n別にアレ自体に\n何かあるわけじゃないのよ？"
10080-140 = "そういえばココって\n何が美味しいのかしらぁ？\nおすすめのお店、\n連れてってくれない？"
10080-150 = "先生のお誕生日よね？\nどう祝ってあげましょう。"
10080-160 = "……ちなみに、\n一緒に過ごしたい子とか、\nいるかしら？"
10080-170 = "あけましておめでと、先生。\n……ココでもこの\n挨拶で合ってるのかしらぁ？"
10080-180 = "クリスマス、ねぇ……。\n先生は、何回サンタに\nなったのかしら？"
10080-190 = "外が騒がしいわね。\nまあ……ココなら\n構わないけどぉ。"
10080-210 = "……なぁに？\nどうかしたのかしらぁ。"
10080-220 = "いずれにせよ、\nいつかこうなる事だったと\n思うのだけど？"
10080-230 = "そうでしょう？"
10080-240 = "……リモコン？\n……それ、聞いちゃう？"
10080-250 = "ちょっと気配りが\n足りないかもぉ？"
10080-260 = "女の子が\n話そうとしていないならぁ……"
10080-270 = "無理に聞こうとしちゃ\nダメだゾ☆"
10080-280 = "いい？あなたは\n何も見ていないし、\nそもそも何も起きてなかった。"
10080-290 = "……そうよねぇ、先生？"
10080-2600 = "あなたも変わってるわねぇ。\nああ、悪い意味では無いのよぉ。……普通は\n頭の中を読んでない相手のことなんて、\n信じないんだけど……疑ってない程度、\nって事にしておこうかしら？"
