[translation]
10016-10 = "Blue Archive."
10016-20 = "Vou ajudar o Sensei com a minha melhor performance."
10016-30 = "Humm... Este jogo é interessante."
10016-40 = "Hmm, parece que lançaram a sequência daquele jogo... Certo! Vou fazer um bico para comprar!"
10016-50 = "Quando eu for um pouco mais adulta... talvez eu deixe meu cabelo crescer."
10016-60 = "Por favor... venha... venha... Saiu!"
10016-70 = "Certo. Se continuar assim... eu limpo a fase!"
10016-80 = "Bem-vindo, Sensei. Conto com você hoje também."
10016-90 = "Darei o meu melhor. Para que o dia de hoje, meu e do Sensei, seja um dia significativo."
10016-100 = "Estou preocupada com as meninas do Clube de Desenvolvimento de Jogos."
10016-110 = "Embora, para mim... esteja tudo bem, já que estou com o Sensei."
10016-120 = "Ah, Sensei, você também experimentou o nosso jogo, não foi? O que você achou mais interessante?"
10016-130 = "Quero desenhar coisas mais bonitas. Para isso... preciso de muitas experiências."
10016-140 = "O Sensei também pode me ajudar com isso?"
10016-150 = "Quando desenho, não quero colocar apenas 'moe', mas também 'afeto'."
10016-160 = "Hmm. Meu dinheiro este mês está bem apertado..."
10016-170 = "A gente recebe um salário quando se torna uma aluna responsável pelo turno?"
10016-180 = "Sensei. Do fundo do meu coração, feliz aniversário."
10016-190 = "Mas eu não sei o que você gosta..."
10016-200 = "Que tal irmos escolher juntos?"
10016-210 = "O aniversário deve ser passado com a família."
10016-220 = "Que tal... a minha irmã e o Sensei passarem comigo?"
10016-230 = "Feliz Ano Novo. Conto com você para mais este ano!"
10016-240 = "Feliz Natal! É que... parece que hoje é o dia dos namorados."
10016-250 = "É, é só isso mesmo!"
10016-260 = "Eu não gosto muito do Halloween, mas como este ano o Sensei e todos estão aqui..."
10016-270 = "É divertido."
10016-290 = "Até agora, eu não tinha muito interesse em jogos que não fossem de pixel art, mas..."
10016-300 = "Existem jogos assim no fliperama, não é?"
10016-310 = "Sinto que meus horizontes se expandiram, aprendi muito."
10016-320 = "...Obrigada, Sensei, por me trazer aqui."
10016-330 = "...Graças a isso, estou me divertindo muito agora."
10016-340 = "Ah, é verdade..."
10016-350 = "Sobre hoje... não conte para a minha irmã, está bem?"
10016-360 = "Promete, promete mesmo!"
10016-2600 = "Não sei se é apropriado descrever uma arma assim, mas... ela é linda. Estou feliz."
