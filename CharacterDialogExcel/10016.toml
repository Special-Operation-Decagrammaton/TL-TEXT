[translation]
10016-10 = "ブルーアーカイブ。"
10016-20 = "最高のプレイで先生をお手伝いしますね。"
10016-30 = "へえ……\nこのゲーム、\n面白い。"
10016-40 = "うーん、あのゲームの\n続編が出たらしいけど……\nよし！アルバイトしよう！"
10016-50 = "もう少し大人に\nなったら……\n髪を伸ばして\nみようかな。"
10016-60 = "お願いだから\n……出て……\n出て……出た！"
10016-70 = "よし。\nこのままいけば\n……クリア！"
10016-80 = "ようこそ、先生。\n今日もよろしくお願いします。"
10016-90 = "ベストを尽くします。\n先生と私の今日が、\n意味のある一日になるように。"
10016-100 = "ゲーム開発部の\n子たちが心配ですね。"
10016-110 = "私は先生と一緒に\nいるから……いいですけど。"
10016-120 = "あっ、先生もうちの\nゲームやってみたんですよね？\nどこが一番面白かったですか？"
10016-130 = "もっと美しいものを\n描きたいです。そのためには……\nたくさんの経験が必要です。"
10016-140 = "先生も、手伝ってくれますか？"
10016-150 = "私は絵を描く時、\n「萌え」だけではなく\n「愛おしさ」も込めたいです。"
10016-160 = "うーん。今月もお小遣いが\nギリギリ……。"
10016-170 = "当番の生徒に\nなったら給料が出るんですか？"
10016-180 = "先生。心から、お誕生日\nおめでとうございます。"
10016-190 = "でも何が好きか\n分からなくて……"
10016-200 = "一緒に選びに行きませんか？"
10016-210 = "お誕生日は家族と一緒に\n過ごさなくちゃいけません。"
10016-220 = "お姉ちゃんと……先生も\n一緒に……いかがですか？"
10016-230 = "明けまして\nおめでとうございます。\n今年も一年、\nよろしくお願いします！"
10016-240 = "メリークリスマス！\nその……今日は\n恋人たちの日らしいです。"
10016-250 = "た、ただそれだけです！"
10016-260 = "ハロウィンはそんなに好きじゃ\nないですけど今年からは、\n先生とみんながいるから……"
10016-270 = "楽しいです。"
10016-290 = "今までドット絵の\nゲーム以外にはあまり興味が\nなかったんですけど……"
10016-300 = "ゲームセンターにはこう\nいったゲームもあるんですね。"
10016-310 = "視野が広がった気がします、\n勉強になりました。"
10016-320 = "……ありがとうございます、\n先生、ここに連れて来て\nくださって。"
10016-330 = "……そのお陰で私、\n今、すごく楽しいです。"
10016-340 = "あ、そうだ……"
10016-350 = "今日のこと、\nお姉ちゃんには……\n内緒ですよ？"
10016-360 = "絶対、絶対ですからね！"
10016-2600 = "武器にこんな表現をするのは\n合ってるのか分かりませんが……\n美しいですね。嬉しいです。"
