[translation]
10035-10 = "ブルー……アーカイブ……。"
10035-20 = "うあぁっ……！？\nあ、先生、でしたか……。\n誰かと思って、ビックリしました……。"
10035-30 = "こ、ここは……\n一体……？"
10035-40 = "し、視線を感じる……\nうぅっ……。"
10035-50 = "そ、外にいるよりは、\nマシかもしれません……。"
10035-60 = "えっと……\nあ、あれは……？"
10035-70 = "で、できるだけ話しかけ\nないでもらえると……。\nあ、せ、先生は例外です……。"
10035-80 = "お、お疲れ様です、先生……。\n実はその、先生にお薦めしたい\n子たちが、いまして……。"
10035-90 = "……えぁっ！？せ、先生……！？\nあれ、い、いつからそこに\nいらっしゃいました……？"
10035-100 = "べ、別に何も変なことは\nしていませんよ……！？"
10035-110 = "た、ただ本当に本を\n読んでいただけで……！"
10035-120 = "普段は古書館以外の場所だと、\n落ち着かないのですが……。"
10035-130 = "ここは何だか、結構……\n先生がいらっしゃるから、\nでしょうか……？"
10035-140 = "あ、そ、その……。\nい、いえ……何でも、\nありません……。"
10035-150 = "先生は、\nいつも忙しそうですね……。"
10035-160 = "わ、私に何か、\nお手伝いできることは\nありますか？"
10035-170 = "も、もしありましたら、\nぜひ……！"
10035-180 = "ここにも、本がたくさん……。"
10035-190 = "……え、見ない方が良い\nものもあるんですか？\nす、すみません……！"
10035-200 = "お、お誕生日\nおめでとうございます、\n先生……！"
10035-210 = "今日は一日お休みして……\nよろしければ一緒に、\n本でも読みませんか……？"
10035-220 = "きょ、今日は一応、\n私の誕生日、でして……。"
10035-230 = "も、もしよろしければ\nなのですが、その……"
10035-240 = "と、隣……隣に座っても、\n良いですか……？"
10035-250 = "新しい一年……\n私は、変わることが\nできるんでしょうか……？"
10035-260 = "先生が一緒なら、\nもしかしたら……。"
10035-270 = "うぅ……さ、\n騒がしい日ですね……。"
10035-280 = "うるさいのは、\n好きではありません……。"
10035-290 = "あ、でも……こういう日に、\n暖かい暖炉の前で本を読むのは、\n結構好きだったりします……。"
10035-300 = "け、警備システムを\n強化しなくては……！"
10035-310 = "今日は、調子に乗った無礼者が\nたくさん来る日で……！"
10035-320 = "飴がどうとかで、\n無理やり押しかけて\nくるんです……！"
10035-330 = "ああもうっ……！"
10035-350 = "あ、ありがとうございました、\n先生……その、\n助かりました……。"
10035-360 = "……これ、ですか？\nえっと、解読作業を\nしていまして。"
10035-370 = "この古書館には……\n昔の言葉で書かれた本が、\nたくさんあるんです。"
10035-380 = "この子たちも、\n誰かに伝えたいことを\n抱えたまま、待っている\nはずなので……。"
10035-390 = "他にやる人もいませんし……\nそれで、私が……。"
10035-400 = "……すみません、\n面白くない話……でしたよね？"
10035-410 = "……っ！あ、えっと、その……\nそこまで褒めていただけると、\nその……。"
10035-420 = "何と返せば良いのか……\n言葉が、見つからなくなって\nしまいますね……ふふっ……。"
10035-2600 = "しょ、正直なことを言うと、まだよく\n分かっていません……どうしてこんな私に、\nここまでのことを……で、ですが……\nこんなに良くしていただいたからには、\nはい……！が、頑張ってみます……！"
