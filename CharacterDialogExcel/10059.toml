[translation]
10059-10 = "Blue Archive~☆"
10059-20 = "Misono Mika, finalmente chegou~☆ Acho que é assim que se diz, né?\nAh, já temos intimidade, então não precisamos de quebra-gelo, né?\nConto com você daqui para frente, Sensei."
10059-30 = "Hmm.\nÉ um pouco apertado, mas...\nAté que isso é\nbom, não é?"
10059-40 = "Ahaha!\nO que é isso?\nQue divertido☆"
10059-50 = "Eu também tinha algo\nparecido com isso\nantigamente..."
10059-60 = "Aqui não parece\nser entediante."
10059-70 = "O Sensei\nnão está aqui..."
10059-80 = "Sensei, bem-vindo de volta!\nEu estava te esperando!"
10059-90 = "Bem-vindo de volta, Sensei!\nEu me comportei direitinho\nenquanto você estava fora."
10059-100 = "Hmm~!\nHoje também está um dia lindo!"
10059-110 = "Não é um desperdício ficar trabalhando\nem um dia como este?"
10059-120 = "...Se não se importar, que tal darmos\num passeio depois do trabalho?"
10059-130 = "Ei... o trabalho de plantonista\né desse jeito mesmo?"
10059-140 = "N-não é como se eu estivesse\nesperando alguma coisa..."
10059-150 = "Hmm...\nNão é que eu esteja entediada, mas..."
10059-160 = "Quer que eu ajude em algo?\nSe você me deixar, eu vou me esforçar!"
10059-170 = "Hee...\nEntão é assim que o Sensei\nfica quando está trabalhando..."
10059-180 = "Feliz aniversário, Sensei!"
10059-190 = "Quer que eu cante\numa música de aniversário?"
10059-200 = "Ué, está com vergonha?"
10059-210 = "Ué... você sabia\nquando era meu aniversário?"
10059-220 = "S-sim... obrigada..."
10059-230 = "Ahaha, fui descoberta."
10059-240 = "Feliz Ano Novo, Sensei!"
10059-250 = "Mesmo sendo desse jeito, espero que\npossamos nos dar bem este ano também☆"
10059-260 = "É uma noite sagrada, Sensei."
10059-270 = "Você tem algum plano para hoje?"
10059-280 = "...Se não se importar,\nque tal passar comigo?"
10059-290 = "Feliz Halloween☆\nOuvi dizer que estão vendendo\nacessórios exclusivos de hoje!"
10059-300 = "Que tal irmos\nàs compras juntos?"
10059-320 = "...Sensei, você foi enganado."
10059-330 = "O que vamos fazer? \nNão tem outro jeito a não ser\nficar aqui até de manhã, né?"
10059-340 = "Acreditar em mim tão facilmente...\nSensei, você é realmente..."
10059-350 = "Eu disse tantas vezes\npara não confiar em mim..."
10059-360 = "Hm? Se você fizer barulho aqui...\nTodo mundo vai descobrir, sabe?\nTudo bem para você?"
10059-370 = "...Por mim, tudo bem."
10059-380 = "...Ué.\nPor acaso... você ficou bravo?"
10059-390 = "Você já sabia que eu era\numa aluna problemática,\nnão sabia...?"
10059-400 = "É que... \nEu não queria te causar problemas."
10059-410 = "Eu não quero... \nque o Sensei me odeie..."
10059-420 = "Mas... só um pouquinho...\nSó um pouquinho mesmo..."
10059-430 = "Eu queria ficar\ncom você, Sensei..."
10059-2600 = "Ah... fico feliz que você seja tão gentil comigo, mas... se continuar assim, as coisas podem acabar chegando a um ponto sem volta, sabia? Sensei. ...Tudo bem para você? Por mim... está tudo bem☆"
