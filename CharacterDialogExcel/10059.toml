[translation]
10059-10 = "ブルーアーカイブ～☆"
10059-20 = "聖園ミカ、ついに登場～☆ って感じかな？\nあっ、私と先生の仲だしアイスブレイクとかは\nいらないよね？これからよろしくね、先生。"
10059-30 = "ふーん。\nちょっと狭いけど…\nこれはこれで\n良いんじゃない？"
10059-40 = "あははっ！\n何これ、\nおもしろーい☆"
10059-50 = "私も昔、\nこれと似たようなの\n持ってたなぁ…。"
10059-60 = "ここは\n退屈しなさそう。"
10059-70 = "先生は\n居ないのかぁ…。"
10059-80 = "先生、おかえり！\n待ってたよ！"
10059-90 = "おかえり、先生！\nちゃーんといい子で\nお留守番してたよ。"
10059-100 = "ん～！\n今日も良い天気だね！"
10059-110 = "こんな日に仕事ばかりなんて、\n勿体なくない？"
10059-120 = "…良かったら、仕事終わりに\nお散歩とかどうかな？"
10059-130 = "あのさ…当番って、\nこういうのなの？"
10059-140 = "べ、別に何か\n期待してるわけじゃ…。"
10059-150 = "うーん…\n別に退屈なわけじゃないけど…。"
10059-160 = "何か手伝おっか？\n任せてもらえたら、頑張るね！"
10059-170 = "へぇ…。\n先生が仕事する姿って\nこんな感じなんだね…。"
10059-180 = "お誕生日おめでとう、先生！"
10059-190 = "バースデーソング\n歌ってあげよっか？"
10059-200 = "えっ、恥ずかしい？"
10059-210 = "あれ…私の誕生日、\n知ってたんだ？"
10059-220 = "う、うん…ありがとね…"
10059-230 = "あははっ、バレちゃったかぁ。"
10059-240 = "あけましておめでとう、先生！"
10059-250 = "こんな私だけど、\n今年もよろしくね☆"
10059-260 = "聖なる夜だね、先生。"
10059-270 = "今日は何か予定ある？"
10059-280 = "…よかったら、\n私と一緒に過ごさない？"
10059-290 = "ハッピーハロウィーン☆\n今日限定のアクセサリーが\n売られてるらしいよ！"
10059-300 = "一緒にショッピングとか、\nどうかな？"
10059-320 = "…先生は、騙されたんだよ。"
10059-330 = "どうしようね？\nもう、朝までここに\nいるしかないよ？"
10059-340 = "こーんな簡単に\n私を信じちゃうなんて、\n先生ってホント…"
10059-350 = "あれほど\n「私を信じないで」って\n言ったのに…"
10059-360 = "ん？ここで騒いだら…\nみんなにバレちゃうよ？\nいいの？"
10059-370 = "…私は、別にいいけど。"
10059-380 = "…あれ。\nもしかして…怒った？"
10059-390 = "私が問題児だって\nことくらい、先生だって\n知ってたでしょ…？"
10059-400 = "その…\n困らせたかったんじゃないの。"
10059-410 = "先生に、\n嫌われるのは…やだ…"
10059-420 = "でも…ちょっとだけ…\nほんのちょっとでいいから…"
10059-430 = "先生と、一緒に\nいたかったの…。"
10059-2600 = "あー…こんなに良くしてくれるのは\n嬉しいけど…このままじゃ、\n取り返しのつかないことになっちゃうかも\nしれないよ？先生。…いいの？\n私は…いいんだけどさ☆"
