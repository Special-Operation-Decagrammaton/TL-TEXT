[translation]
10139-10 = "Blue Archive."
10139-20 = "I am Yoshino Niko of SRT Special Academy's FOX Platoon. \nI may be inexperienced, but I look forward to working with you."
10139-30 = "(The smell of... \nfried tofu... it's so good...)"
10139-40 = "If you'd like, \nwould you like to have some \nfreshly made \ninarizushi?"
10139-50 = "It's a great day for laundry. \nThe blankets should dry nicely."
10139-60 = "I wonder if... \nthings like this \nare popular lately?"
10139-70 = "Spending a day off \nlike this... \nit's quite nice."
10139-80 = "Did you call for me?"
10139-90 = "If you need anything, \nplease don't hesitate to ask."
10139-100 = "Welcome back, Sensei. \nOperational preparations are complete."
10139-110 = "Oh, Sensei... are you feeling a bit \nclingy today?"
10139-120 = "……That's fine. \nPlease, come here."
10139-130 = "Yes, I'm right here."
10139-140 = "I wake up a little early \non mission days \nto make bento boxes."
10139-150 = "After all, an army marches on its stomach, as they say."
10139-160 = "Bento..."
10139-170 = "Would you like me to \nmake one for you next time?"
10139-180 = "To redeem my reputation..."
10139-190 = "From now on, \nI want to be of help to you, Sensei."
10139-200 = "Happy birthday, \nSensei."
10139-210 = "I've put my heart into making you some red bean rice inarizushi!"
10139-220 = "Please, go ahead and eat!"
10139-230 = "A birthday celebration... \nThank you, Sensei."
10139-240 = "Every year, the members of my platoon \ncelebrate for me. \nIt gets quite lively, you know?"
10139-250 = "But this year, there's one more person \nwho has come to celebrate with me."
10139-260 = "Happy New Year, \nSensei."
10139-270 = "Have you been to the shrine yet?"
10139-280 = "I went to pray \nfor everyone's health."
10139-290 = "For the members of my platoon, of course, \nand for you as well, Sensei."
10139-300 = "At SRT Special Academy, the FOX Platoon \nusually takes on the role of Santa Claus \nfor Christmas."
10139-310 = "But it always ends up \nturning into a mock battle halfway through..."
10139-320 = "Before we know it, everyone is exhausted \nand falls asleep. Hehe."
10139-330 = "Oooooh..."
10139-340 = "Hehe, did I scare you? \nSo even you have things you're afraid of, Sensei. \nThat's good to know."
10139-350 = "Eh? The thing you're most afraid of \nis a bunny girl outfit...?"
10139-360 = "That is, um...? \nIs that like the 'Manju-kowai' story...?"
10139-380 = "Hehe, it's frying quite well."
10139-390 = "It's nice and fluffy... \nI'm looking forward to the result."
10139-400 = "Ah, not yet."
10139-410 = "I still have to \nfry it one more time."
10139-420 = "First at a low temperature. \nThen, by frying it at a high temperature,"
10139-430 = "the moisture is removed, making for delicious fried tofu."
10139-440 = "Fried tofu is actually \na dish that takes a lot of \ntime and effort."
10139-450 = "In the old days, it was even used \nas an offering to pray for a good harvest \nand peace for the year."
10139-460 = "My wish is for everyone around me \nto be happy \nand to live in peace."
10139-470 = "If the feelings I've put into this fried tofu \ncan reach you... \nI would be very happy."
10139-2600 = "FOX-870 shotgun, \nreceived and confirmed. \nPlease leave the close-quarters support to me."