[translation]
10139-10 = "ブルーアーカイブ。"
10139-20 = "SRT特殊学園、FOX小隊の吉野ニコです。 \n不束者ではありますが、どうぞよろしくお願いします。"
10139-30 = "（油揚げの……\nいい匂い……）"
10139-40 = "よかったら、\nできたての\nおいなりさん\n食べていきませんか？"
10139-50 = "今日は洗濯日和だね。\n毛布がよく乾きそう。"
10139-60 = "最近はこういうのが\n流行っている\nのかな……？"
10139-70 = "こういう\n休日の過ごし方、\n良いかも……。"
10139-80 = "お呼びでしょうか？"
10139-90 = "何かありましたら、\n遠慮なく言ってくださいね。"
10139-100 = "おかえりなさい、先生。\n作戦準備は完了しています。"
10139-110 = "あら、先生……今日は\n甘えん坊さんな日なんですね？"
10139-120 = "……いいですよ、\nこちらへどうぞ。"
10139-130 = "はい、ニコはここにいますよ。"
10139-140 = "お弁当を作るために、\n作戦の日はちょっと\n早起きをするんです。"
10139-150 = "腹が減ってはなんとやら、\nといいますからね。"
10139-160 = "お弁当……"
10139-170 = "今度から、\n先生の分もお作りしましょうか？"
10139-180 = "汚名返上のためにも……"
10139-190 = "これからは、\n先生のお力になりたいです。"
10139-200 = "お誕生日おめでとうございます、\n先生。"
10139-210 = "真心をこめて、赤飯の\nおいなりさんを作ってきました！"
10139-220 = "どうぞ、召し上がってください！"
10139-230 = "誕生日のお祝い……\nありがとうございます、先生。"
10139-240 = "毎年、小隊のみんなが\n祝ってくれていて。\nそれが結構賑やかなんですよ？"
10139-250 = "ですが今年はもう1人、\n祝ってくれる人が増えました。"
10139-260 = "明けまして\nおめでとうございます、先生。"
10139-270 = "お参りはもう行きましたか？"
10139-280 = "私はみんなの健康を\n祈ってきました。"
10139-290 = "小隊のみんなはもちろん、\n先生のぶんも。"
10139-300 = "SRT特殊学園のクリスマスは、\nFOX小隊がサンタ役を\n務めていました。"
10139-310 = "でも、いつも途中から\n模擬戦みたいになって……"
10139-320 = "気づいたらみんな、疲れ果てて\n寝てしまうんです。ふふっ。"
10139-330 = "うらめしや～"
10139-340 = "ふふっ、びっくりしました？\n先生にも怖いものが\nあったんですね。\n勉強になりました。"
10139-350 = "え？一番怖いのは\nバニーガールの格好……？"
10139-360 = "それは、えっと……？\nまんじゅうこわい……？"
10139-380 = "ふふ、よく揚がっていますね。"
10139-390 = "ふっくらしていて……\n仕上がりが楽しみです。"
10139-400 = "あ、まだダメですよ。"
10139-410 = "この後、もう1回\n揚げるんですから。"
10139-420 = "最初は低い温度で。\n次に高い温度で揚げると、"
10139-430 = "水分が抜けて美味しい\n油揚げになるんです。"
10139-440 = "油揚げって実は、\nすごく時間と手間のかかる\n料理なんですよ。"
10139-450 = "それこそ昔は、\n1年の豊作と安寧を願う\nお供え物だったんだとか。"
10139-460 = "私の願いは、\n周りのみんなが幸せで、\n平穏無事に過ごせること。"
10139-470 = "油揚げに込めた私の気持ちが\n伝わってくれたら……\n嬉しいですね。"
10139-2600 = "FOX-870式ショットガン、\nたしかに受領しました。\n近接支援は、私にお任せください。"
