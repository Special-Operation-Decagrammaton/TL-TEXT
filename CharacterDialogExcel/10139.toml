[translation]
10139-10 = "Blue Archive."
10139-20 = "Sou a Niko Yoshimi, do Esquadrão FOX da Academia SRT. \nEmbora eu não seja muito experiente, conto com o seu apoio."
10139-30 = "(Que cheiro bom... \nde tofu frito...)"
10139-40 = "Se quiser, \npor que não come \num inari-zushi \nacabado de fazer?"
10139-50 = "Hoje é um ótimo dia para lavar roupa. \nOs cobertores vão secar rapidinho."
10139-60 = "Será que esse tipo de coisa \nestá na moda \nultimamente...?"
10139-70 = "Passar o dia de folga \nassim... \nacho que é bom."
10139-80 = "Me chamou?"
10139-90 = "Se precisar de algo, \nnão hesite em me dizer."
10139-100 = "Bem-vindo de volta, Sensei. \nA preparação para a operação está concluída."
10139-110 = "Ora, Sensei... hoje você está \nquerendo um pouco de mimo, não é?"
10139-120 = "……Tudo bem, \npode vir aqui."
10139-130 = "Sim, a Niko está aqui."
10139-140 = "Para preparar o almoço, \nnos dias de operação, \neu acordo um pouco mais cedo."
10139-150 = "Como dizem, um exército marcha com o estômago cheio."
10139-160 = "O almoço..."
10139-170 = "Da próxima vez, \nquer que eu prepare uma porção para você também?"
10139-180 = "Para limpar o meu nome..."
10139-190 = "De agora em diante, \neu quero ser útil para você, Sensei."
10139-200 = "Feliz aniversário, \nSensei."
10139-210 = "Preparei um inari-zushi de sekihan \ncom todo o meu carinho!"
10139-220 = "Por favor, sirva-se!"
10139-230 = "Uma comemoração de aniversário... \nMuito obrigada, Sensei."
10139-240 = "Todo ano, o pessoal do esquadrão \ncomemora comigo. \nÉ sempre bem agitado, sabe?"
10139-250 = "Mas este ano, ganhei mais uma pessoa \npara comemorar comigo."
10139-260 = "Feliz Ano Novo, \nSensei."
10139-270 = "Você já foi ao templo fazer suas preces?"
10139-280 = "Eu rezei pela saúde \nde todos."
10139-290 = "Pelo pessoal do esquadrão, é claro, \ne também por você, Sensei."
10139-300 = "No Natal da Academia SRT, \no Esquadrão FOX costumava \nfazer o papel de Papai Noel."
10139-310 = "Mas sempre acabava \nvirando um tipo de simulação de combate..."
10139-320 = "Quando percebíamos, todos estavam exaustos \ne dormindo. Fufu."
10139-330 = "Urameshiya~"
10139-340 = "Fufu, te assustei? \nEntão o Sensei também \ntem medo de algo. \nBom saber."
10139-350 = "Hã? O que você mais teme \né o traje de coelhinha...?"
10139-360 = "Isso é, bem... \nÉ como o conto do 'Manju Kowai'?"
10139-380 = "Fufu, está fritando muito bem."
10139-390 = "Está ficando bem fofinho... \nEstou ansiosa pelo resultado."
10139-400 = "Ah, ainda não está pronto."
10139-410 = "Depois disso, \nainda preciso fritar mais uma vez."
10139-420 = "Primeiro em temperatura baixa. \nDepois, ao fritar em temperatura alta,"
10139-430 = "a umidade sai e o tofu frito \nfica delicioso."
10139-440 = "Na verdade, o tofu frito \né um prato que exige \nmuito tempo e esforço."
10139-450 = "Dizem que, antigamente, \nera uma oferenda para desejar \numa boa colheita e paz durante o ano."
10139-460 = "O meu desejo é que \ntodos ao meu redor sejam felizes \ne vivam em paz e segurança."
10139-470 = "Se o sentimento que coloquei \nno tofu frito puder chegar até você... \neu ficaria muito feliz."
10139-2600 = "Espingarda modelo FOX-870, \nrecebida com sucesso. \nDeixe o suporte de curto alcance comigo."
