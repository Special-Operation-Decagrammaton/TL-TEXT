[translation]
10139-10 = "Blue Archive."
10139-20 = "Я Йошино Нико из отряда FOX Особой академии SRT. \nВозможно, мне ещё не хватает опыта, но я с нетерпением жду возможности поработать с вами."
10139-30 = "(Этот запах... \nжареного тофу... так вкусно пахнет...)"
10139-40 = "Если хотите, \nне желаете ли отведать \nсвежеприготовленных \nинари-суши?"
10139-50 = "Отличный день для стирки. \nОдеяла должны как следует высохнуть."
10139-60 = "Интересно... \nподобные вещи \nсейчас популярны?"
10139-70 = "Провести выходной \nвот так... \nдовольно приятно."
10139-80 = "Вы звали меня?"
10139-90 = "Если вам что-нибудь понадобится, \nпожалуйста, обращайтесь без колебаний."
10139-100 = "С возвращением, Сенсей. \nПриготовления к операции завершены."
10139-110 = "Ох, Сенсей... вам сегодня \nхочется немного \nнежности?"
10139-120 = "……Всё в порядке. \nПожалуйста, идите сюда."
10139-130 = "Да, я прямо здесь."
10139-140 = "В дни миссий я встаю \nнемного пораньше, \nчтобы приготовить бенто."
10139-150 = "В конце концов, как говорится, война войной, а обед по расписанию."
10139-160 = "Бенто..."
10139-170 = "Хотите, я \nприготовлю одно для вас в следующий раз?"
10139-180 = "Чтобы восстановить мою репутацию..."
10139-190 = "Отныне \nя хочу быть вам полезной, Сенсей."
10139-200 = "С днём рождения, \nСенсей."
10139-210 = "Я вложила всю душу в приготовление этих инари-суши с красным рисом для вас!"
10139-220 = "Пожалуйста, угощайтесь!"
10139-230 = "Празднование дня рождения... \nСпасибо, Сенсей."
10139-240 = "Каждый год девочки из моего отряда \nустраивают для меня праздник. \nЭто всегда проходит довольно шумно, знаете ли?"
10139-250 = "Но в этом году появился ещё один человек, \nкоторый пришёл отпраздновать вместе со мной."
10139-260 = "С Новым годом, \nСенсей."
10139-270 = "Вы уже ходили в храм?"
10139-280 = "Я ходила помолиться \nза здоровье каждого."
10139-290 = "За членов моего отряда, конечно же, \nи за вас тоже, Сенсей."
10139-300 = "В Особой академии SRT отряд FOX \nобычно берёт на себя роль Санта-Клауса \nна Рождество."
10139-310 = "Но на полпути всё всегда \nпревращается в тренировочный бой..."
10139-320 = "И не успеваем мы опомниться, как все уже без сил \nзасыпают. Хе-хе."
10139-330 = "У-у-у-ух..."
10139-340 = "Хе-хе, я вас напугала? \nЗначит, у вас тоже есть вещи, которых вы боитесь, Сенсей. \nБуду знать."
10139-350 = "Эсь? Вещь, которой вы боитесь больше всего — \nэто костюм девятки-кролика...?"
10139-360 = "Это, эм...? \nПрямо как в той истории про «Страшные мандзю»...?"
10139-380 = "Хе-хе, обжаривается отлично."
10139-390 = "Получается таким нежным и пышным... \nС нетерпением жду результата."
10139-400 = "Ах, ещё не время."
10139-410 = "Мне нужно \nобжарить его ещё раз."
10139-420 = "Сначала при низкой температуре. \nА затем, обжаривая при высокой,"
10139-430 = "из него удаляется лишняя влага, и получается восхитительный жареный тофу."
10139-440 = "Жареный тофу — это блюдо, \nкоторое на самом деле требует \nмного времени и усилий."
10139-450 = "В прежние времена его даже использовали \nв качестве подношения, чтобы помолиться о хорошем урожае \nи мире в наступающем году."
10139-460 = "Моё желание — чтобы все вокруг меня \nбыли счастливы \nи жили в мире."
10139-470 = "Если чувства, которые я вложила в этот жареный тофу, \nсмогут дойти до вас... \nя буду очень счастлива."
10139-2600 = "Дробовик FOX-870 \nполучен и проверен. \nПожалуйста, предоставьте ближнюю поддержку мне."