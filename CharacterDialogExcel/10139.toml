[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10139-10 = "Blue Archive."
10139-20 = "Academia Especial SRT, Yoshino Niko do Esquadrão FOX.\nPosso ser um pouco inexperiente, mas...\npor favor, cuide bem de mim (e do meu corpo)."
10139-30 = "（Uhn... esse cheirinho doce e úmido...\ndo Abura-age fritando...）"
10139-40 = "Se o senhor quiser,\nnão gostaria de provar e engolir\nos meus Inarizushis molhadinhos e\nrecém-saídos do fogo?"
10139-50 = "Hoje o dia está perfeito pra suar e lavar a roupa.\nOs meus cobertores vão secar rapidinho\ndepois da nossa bagunça..."
10139-60 = "Será que esse tipo de... \"brincadeira pervertida\"...\né o que está na moda\nhoje em dia...?"
10139-70 = "Passar o dia de folga\nagarradinha assim com você...\né uma delícia."
10139-80 = "O meu radar apitou. Me chamou, mestre?"
10139-90 = "Se a sua luxúria exigir qualquer coisa,\nnão hesite em me pedir, tá bom?"
10139-100 = "Bem-vindo de volta, Sensei.\nOs meus preparativos táticos (e o meu corpo)\njá estão prontos."
10139-110 = "Ara, ara, Sensei...\nHoje o senhor está bem manhoso e carente, não está?"
10139-120 = "……Tudo bem, eu deixo.\nVenha, deite no meu colo e aproveite."
10139-130 = "Isso, a mamãe Niko está bem aqui pra você."
10139-140 = "Para garantir a sua marmita (e a sua energia),\neu acordo bem cedinho\nnos dias de missão."
10139-150 = "Sabe como dizem, né?\nUm saco vazio não para em pé na hora de... \"batalhar\"."
10139-160 = "Uma marmitinha suculenta..."
10139-170 = "Da próxima vez...\neu devo preparar uma bem carnuda\npra encher a sua boca também?"
10139-180 = "Para limpar a minha honra manchada..."
10139-190 = "De hoje em diante,\neu quero servir ao senhor com todas as minhas forças."
10139-200 = "Feliz aniversário,\nmeu querido Sensei."
10139-210 = "Eu preparei Inarizushis de feijão vermelho\ncom todo o meu amor (e suor) pra você!"
10139-220 = "Pode abrir a boca. Coma e engula tudo!"
10139-230 = "Comemorar o meu aniversário assim...\nMuito obrigada por ser tão intenso, Sensei."
10139-240 = "Todo ano as meninas do esquadrão\nfazem uma festa pra mim.\nE a bagunça na cama é sempre garantida, sabia?"
10139-250 = "Mas este ano...\neu tenho mais um homem especial\npra me dar os parabéns de perto."
10139-260 = "Feliz Ano Novo,\nmeu Comandante."
10139-270 = "Já foi rezar no santuário para purificar\nesses seus pensamentos sujos?"
10139-280 = "Eu acabei de rezar\npelo vigor físico de todo mundo."
10139-290 = "Do esquadrão inteiro, claro,\nmas principalmente pelo seu fôlego."
10139-300 = "No Natal da SRT,\nera o Esquadrão FOX que vestia as roupinhas curtas\ne brincava de Mamãe Noel."
10139-310 = "Mas a brincadeira sempre\nesquentava e virava um combate\ncorpo-a-corpo suado..."
10139-320 = "E quando a gente via, estávamos todas\nexaustas e largadas na cama. Ufufu~"
10139-330 = "Buuu~ Eu vou puxar o seu pé na cama~"
10139-340 = "Ufufu, o seu coração disparou?\nEntão o Sensei corajoso também tem\nalguma fraqueza, não é?\nVou anotar essa vulnerabilidade no meu HD."
10139-350 = "Ara? A coisa que te dá mais \"medo\"\né me ver vestida de Coelhinha (Bunny Girl)...?"
10139-360 = "Isso por acaso é...\numa psicologia reversa pra me forçar\na usar uma pra você...?"
10139-380 = "Ufufu. O óleo ferveu e tá fritando bem gostoso."
10139-390 = "Tá ficando tão macio, grosso e inchado...\nMal posso esperar pra botar na boca."
10139-400 = "Ara, tire a mão! Ainda não pode comer."
10139-410 = "Depois disso, eu ainda vou\nmergulhar ele no tacho quente mais uma vez."
10139-420 = "Primeiro a gente provoca numa temperatura bem baixinha.\nE depois frita no calor máximo..."
10139-430 = "Assim ele chora todo o líquido\ne vira um Abura-age delicioso e crocante."
10139-440 = "A arte de fazer um bom Abura-age,\nna verdade, exige muita fricção,\nsuor e paciência com as mãos."
10139-450 = "Nas eras antigas,\neles eram a oferenda mística sagrada\npra garantir fertilidade, fartura e prazer o ano todo."
10139-460 = "O meu desejo mais profundo\né que as minhas garotas gozem de paz,\ne que você fique exausto e feliz comigo."
10139-470 = "Se todo o amor (e suor) que eu injetei nesse Abura-age\ntocar o fundo do seu estômago...\neu serei a mulher mais feliz do mundo."
10139-2600 = "Escopeta de Combate FOX-870,\nrecebida e engatilhada.\nSe quiser suporte no \"corpo a corpo\" de perto,\ndeixe tudo nas minhas mãos."