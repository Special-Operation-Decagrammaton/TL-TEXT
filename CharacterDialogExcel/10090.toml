[translation]
10090-10 = "ブルーアーカイブ"
10090-20 = "こんにちは、先生。\n百鬼夜行連合学院所属、お祭り運営委員会の里浜……\nウミカです。お祭り、好きですか？"
10090-30 = "カフェ祭りって\nいうのを、提案\nしてみようかな……？"
10090-40 = "人がたくさん\n歩き回ってる……\nふむ、ふむむ……"
10090-50 = "このままでも\n十分いいところだけど、\n何かを少しだけ\n足してみれば……"
10090-60 = "社長なら\nどう考えるかな……"
10090-70 = "着物風\nバニーガールは\nちょっと……"
10090-80 = "あ、先生！\nいらっしゃいませ。\n何をお手伝いすればいいですか？"
10090-90 = "いらっしゃったんですね、先生！\n何から始めましょうか？"
10090-100 = "最善を尽くします！"
10090-110 = "シャーレは何だか\n不思議ですね……\nわくわくするというか……"
10090-120 = "お祭りの現場みたいです！  "
10090-130 = "新しくて楽しいものを\n見るのが好きです。\nそういった雰囲気の\n中で一緒にいるのが好きです。"
10090-140 = "先生と一緒にいるのが……\nやっぱり、好きです。"
10090-150 = "百鬼夜行に来てたくさんのことを\n学び、たくさんのことが\n変わりましたが。"
10090-160 = "でも、私はお祭りが\n一番好きです。"
10090-170 = "もっとたくさんのことを学んで、\n上手になりたいです。"
10090-180 = "だから、先生。\nいろいろなことをたくさん\n教えてください。  "
10090-190 = "百夜堂の仕事が終わったら\nお祭りの準備をして。\n合間に授業を聞いて、\nテストの準備をして……"
10090-200 = "やることが多すぎます！"
10090-210 = "え？シャーレも……\nそうなんですか……？"
10090-220 = "先生！聞きました！\n今日がお誕生日なんですね！"
10090-230 = "ですので……\n今日開かれるお祭りを\n私がご案内します！"
10090-240 = "キヴォトスではどこかで\n今日もお祭りが\n開かれていますから！"
10090-250 = "はい？はい。そうです……\n今日は私の誕生日でしたね。"
10090-260 = "えへへ。\n先生に祝ってもらえるのって……\nなんだか、すごく嬉しいですね。"
10090-270 = "新年ですね！\n新年のお祭りに行きましょう！"
10090-280 = "そんなものがあるのかって？\nありますよ！\nなければ作ればいいんです！"
10090-290 = "クリスマス……祝祭の日ですね！\nじっとしている\nわけにはいきません！\n早く出かけましょう、先生！"
10090-300 = "ハロウィーンって\n愉快なお祭りですよね！\nパレード、お菓子、仮装、\nそれからTrick or Treat!"
10090-310 = "先生はどんな\n仮装がお好きですか？\n私が全部用意しますね！"
10090-330 = "お祭りへようこそ、先生！"
10090-340 = "えへへ。どうですか？\n今までずっと準備して\nいたのは……全部、この\n瞬間のためでした！"
10090-350 = "誰にも知らせてないし、\n誰も招待していません。"
10090-360 = "このお祭りは……\n先生のためのものですから！"
10090-370 = "他に誰もいない、\n私と先生だけのお祭り……"
10090-380 = "ちょっと恥ずかしいですが……\n気に入ってくれたら嬉しいです！"
10090-2600 = "あの……その……\nありがとう、ございます。先生！\nあうう、こんなものをいただけるとは\n思ってもいなかったので……\n私、頑張ります。\nこれからも見守っててください！"
