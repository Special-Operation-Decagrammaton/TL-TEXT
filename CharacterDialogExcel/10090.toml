[translation]
10090-10 = "Blue Archive"
10090-20 = "Olá, Sensei. Sou a Umika, do Comitê de Operações de Festivais da Academia Hyakkiyako... Você gosta de festivais?"
10090-30 = "Será que eu deveria sugerir... um festival de café?"
10090-40 = "Tem tanta gente andando por aí... Hum, entendo..."
10090-50 = "Já é um lugar ótimo assim, mas se eu adicionasse só um pouquinho de algo..."
10090-60 = "O que a presidente pensaria sobre isso..."
10090-70 = "Uma coelhinha com quimono é um pouco..."
10090-80 = "Ah, Sensei! Bem-vindo. Como posso ajudar?"
10090-90 = "Você chegou, Sensei! Por onde começamos?"
10090-100 = "Farei o meu melhor!"
10090-110 = "Schale é um lugar meio misterioso... ou talvez, empolgante..."
10090-120 = "Parece o local de um festival!"
10090-130 = "Gosto de ver coisas novas e divertidas. Gosto de estar junto de alguém nesse tipo de atmosfera."
10090-140 = "Estar com você, Sensei... é o que eu mais gosto."
10090-150 = "Vim para Hyakkiyako, aprendi muitas coisas e muita coisa mudou."
10090-160 = "Mas, ainda assim, o que eu mais gosto são os festivais."
10090-170 = "Quero aprender mais e me tornar melhor nisso."
10090-180 = "Por isso, Sensei, por favor, me ensine muitas coisas."
10090-190 = "Terminar o trabalho na Hyakkiyado, preparar o festival, assistir às aulas nos intervalos, estudar para as provas..."
10090-200 = "Tem coisa demais para fazer!"
10090-210 = "Hã? Em Schale também é... assim?"
10090-220 = "Sensei! Eu soube! Hoje é o seu aniversário!"
10090-230 = "Por isso... eu vou te guiar pelo festival que está acontecendo hoje!"
10090-240 = "Porque em Kivotos, sempre tem algum festival acontecendo em algum lugar!"
10090-250 = "Sim? Ah, sim. É verdade... hoje é o meu aniversário."
10090-260 = "Hehe. Ser parabenizada por você, Sensei... é algo que me deixa muito feliz."
10090-270 = "É ano novo! Vamos ao festival de ano novo!"
10090-280 = "Se eu pergunto se existe um? Existe sim! Se não existir, é só criar um!"
10090-290 = "Natal... é um dia de celebração! Não dá para ficar parada! Vamos logo, Sensei!"
10090-300 = "Halloween é um festival muito divertido, né! Desfiles, doces, fantasias e, claro, Trick or Treat!"
10090-310 = "Que tipo de fantasia você gosta, Sensei? Eu preparo tudo para você!"
10090-330 = "Bem-vindo ao festival, Sensei!"
10090-340 = "Hehe. O que achou? Tudo o que eu preparei até agora... foi por causa deste momento!"
10090-350 = "Não contei para ninguém e não convidei ninguém."
10090-360 = "Porque este festival... é só para você, Sensei!"
10090-370 = "Um festival onde não há mais ninguém, apenas eu e você..."
10090-380 = "É um pouco vergonhoso, mas... ficaria muito feliz se você gostasse!"
10090-2600 = "Bem... hum... muito obrigada, Sensei! Ahh, eu não esperava ganhar algo assim... Eu vou me esforçar. Por favor, continue cuidando de mim!"
