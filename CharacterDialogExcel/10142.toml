[translation]
10142-10 = "Blue... Archive."
10142-20 = "Since we've come all the way to the beach... I want to make unforgettable memories with everyone. \nSensei, will you... join me?"
10142-30 = "I wonder where\nit's the coolest..."
10142-40 = "I'm looking forward to... the social gathering."
10142-50 = "I want to show... \nthat I can act like \na committee chair."
10142-60 = "I don't really... \nwant to stand out..."
10142-70 = "I want to cherish... \ntoday's memories."
10142-80 = "Welcome back, Sensei. \nI hope I can be of help today, too."
10142-90 = "Oh... I was waiting for you. \nWe're going to the beach, right? \nI've already changed."
10142-100 = "What do you... think of this?"
10142-110 = "I couldn't find a swimsuit \nthat suited me as well as I thought..."
10142-120 = "Why did I choose white...?"
10142-130 = "Because everyone told me... \nthat this one was good..."
10142-140 = "The secret to my skincare?"
10142-150 = "It's not like I'm doing \nanything particularly special..."
10142-160 = "Oh. Maybe it's thanks to the yakitori?"
10142-170 = "They say you only realize the value of something after you've lost it."
10142-180 = "That was the case for me, too. So—"
10142-190 = "I won't let go again. Never."
10142-200 = "Ever since my right arm was consumed by the twilight, \nI forgot how to rely on anyone's hand."
10142-210 = "That's why I always thought alone, \nand tried to solve everything by myself."
10142-220 = "...But it's different now. \nBecause I have you and everyone else, Sensei."
10142-230 = "I'm counting on you... from here on out."
10142-240 = "There's someone whose presence alone \nmakes me feel at ease."
10142-250 = "I heard it's that person's \nbirthday today."
10142-260 = "So, to make it a memorable day, \nI'll celebrate in this outfit."
10142-270 = "Happy birthday, Sensei."
10142-280 = "I think there's a meaning \nto me being born in winter."
10142-290 = "Like a flower that blooms \nunder the bright sun \nafter enduring the harshness of winter..."
10142-300 = "I want to bloom in full glory someday, too."
10142-310 = "Happy New Year, Sensei."
10142-320 = "It's better to talk about cheerful things \nat least during the New Year, right?"
10142-330 = "So, even if it's just for show..."
10142-340 = "I tried wearing something \nthat would make me feel bright..."
10142-350 = "What do you think?"
10142-360 = "I'm actually quite resistant to the cold. \nSee, I'm in a swimsuit right now and I'm fine."
10142-370 = "Oh... would red clothes have been... \nbetter...?"
10142-380 = "A swimsuit on a day like today..."
10142-390 = "Did I just... \nput on a swimsuit?"
10142-400 = "Is this cosplay?"
10142-410 = "Wait, it's not?"
10142-420 = "The world of cosplay \nis really deep, isn't it..."
10142-440 = "Let's go with this strategy for now."
10142-450 = "They'll likely come at us with everything they've got from the start."
10142-460 = "...Sensei?"
10142-470 = "Are you actually looking at my signals?"
10142-480 = "Looking away from the start... \nthat's not like you."
10142-490 = "What on earth are you looking at..."
10142-500 = "Oh... I see."
10142-510 = "I'm sorry."
10142-520 = "It makes it hard to concentrate, doesn't it?"
10142-530 = "Because I'm... \na mysterious, beautiful girl."
10142-540 = "This is how I give signals in beach volleyball..."
10142-550 = "Should I change the way I do it, \neven now?"
10142-560 = "...No, I suppose it's too late for that."
10142-570 = "Let's go with this, Sensei."
10142-580 = "If it's us... we'll be fine."
10142-2600 = "I am still lacking in so many ways. \nEven so, I want to keep holding this Hyakuren. \nIt's not... \nto play the role of the Hyakkiyako committee chair. \n—It's to face my own heart."