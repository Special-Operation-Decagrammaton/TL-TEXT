[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10142-10 = "Blue... Archive." 
10142-20 = "Já que viemos para a praia...\neu quero criar memórias inesquecíveis com todos.\nSensei, você também... vai me acompanhar?" 
10142-30 = "Onde será que fica\no lugar mais fresquinho...?" 
10142-40 = "A nossa confraternização...\nmal posso esperar." 
10142-50 = "Eu quero mostrar...\num lado mais digno\nde uma presidente." 
10142-60 = "Eu não quero...\nchamar muita atenção..." 
10142-70 = "Quero guardar com carinho\nas memórias de hoje." 
10142-80 = "Bem-vindo de volta, Sensei.\nEspero poder ser útil hoje também." 
10142-90 = "Ah... Estava te esperando.\nNós vamos à praia, né?\nJá coloquei a minha roupa." 
10142-100 = "O que... achou?" 
10142-110 = "Foi mais difícil do que eu pensei\nencontrar um maiô que combinasse comigo..." 
10142-120 = "O motivo de eu ter escolhido branco...?" 
10142-130 = "É que todo mundo me disse\nque esse ficaria ótimo..." 
10142-140 = "O segredo para cuidar da pele?" 
10142-150 = "Eu não faço nada\nmuito especial, mas..." 
10142-160 = "Ah. Talvez seja\ngraças aos yakitoris?" 
10142-170 = "Dizem que a gente só dá valor\nàs coisas importantes depois que as perde." 
10142-180 = "Aconteceu o mesmo comigo. Por isso――" 
10142-190 = "Eu nunca mais vou soltá-las. Aconteça o que acontecer." 
10142-200 = "Desde que o meu braço direito foi engolido\npelo crepúsculo, eu havia esquecido o que\nera me apoiar nas mãos de outra pessoa." 
10142-210 = "Por isso, eu sempre pensava em tudo sozinha,\ntentando resolver tudo por conta própria." 
10142-220 = "......Mas agora é diferente.\nPorque eu tenho o Sensei e as meninas." 
10142-230 = "Daqui para frente... continue cuidando de mim." 
10142-240 = "Sabe, existe uma pessoa que só de estar\npor perto, já me deixa mais tranquila." 
10142-250 = "E me disseram que hoje\né o aniversário dessa pessoa." 
10142-260 = "Então, para que fique na memória,\nvou celebrar vestida assim." 
10142-270 = "Feliz aniversário, Sensei." 
10142-280 = "Acho que existe um significado\npor eu ter nascido no inverno." 
10142-290 = "Assim como as flores que,\napós superarem a dureza do inverno,\ndesabrocham sob a luz de um dia radiante..." 
10142-300 = "Eu também quero desabrochar um dia." 
10142-310 = "Feliz Ano Novo, Sensei." 
10142-320 = "Pelo menos no Ano Novo,\né bom termos conversas mais alegres." 
10142-330 = "Por isso, decidi começar\npela aparência..." 
10142-340 = "Tentei vestir algo que me deixasse\ncom um humor mais animado..." 
10142-350 = "O que acha?" 
10142-360 = "Eu sou bem resistente ao frio.\nOlha, estou de maiô agora e estou bem." 
10142-370 = "Ah... Teria sido melhor\nse eu estivesse com roupas vermelhas hoje...?" 
10142-380 = "Vestir maiô num dia como hoje..." 
10142-390 = "Será que eu só\nvesti um maiô mesmo?" 
10142-400 = "Tá parecendo um cosplay?" 
10142-410 = "Ué, não?" 
10142-420 = "O mundo do cosplay\né bem profundo, não é..." 
10142-440 = "Vamos começar com essa tática." 
10142-450 = "Eles com certeza virão com tudo\ndesde o começo." 
10142-460 = "......Sensei?" 
10142-470 = "Você está prestando atenção nos meus sinais?" 
10142-480 = "Desviar o olhar logo no começo...\nisso não é a sua cara." 
10142-490 = "O que exatamente você está olhan..." 
10142-500 = "Ah... entendi." 
10142-510 = "Me desculpe." 
10142-520 = "Desse jeito, fica difícil de concentrar." 
10142-530 = "Afinal, eu...\nsou uma garota linda e misteriosa." 
10142-540 = "No vôlei de praia, é assim\nque a gente dá os sinais..." 
10142-550 = "Acha que eu deveria\nmudar a forma de fazer isso agora?" 
10142-560 = "......Acho que não dá, já é tarde demais." 
10142-570 = "Vamos continuar assim mesmo, Sensei." 
10142-580 = "Se formos nós dois... vai ficar tudo bem." 
10142-2600 = "Eu ainda sou cheia de falhas e defeitos.\nMesmo assim, quero continuar segurando a Hyakuren.\nE não é...\nPara fingir ser a presidente da Hyakkaryouran.\n――E sim para enfrentar o meu próprio coração." 