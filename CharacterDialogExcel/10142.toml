[translation]
10142-10 = "ブルー……アーカイブ。"
10142-20 = "こうして海に来たんだもの……みんなと忘れられない思い出を作りたいんだ。\n先生も、一緒に……付き合ってくれる？"
10142-30 = "一番涼しいのは\nどこだろう……。"
10142-40 = "親睦会……楽しみ。"
10142-50 = "委員長らしい\nところを……\n見せたいな。"
10142-60 = "あんまり、\n目立ちたく\nないな……。"
10142-70 = "今日の思い出、\n大切にしたい。"
10142-80 = "おかえり、先生。\n今日もお役に立てたらいいな。"
10142-90 = "あ……待ってたよ。\n海に行くんだよね？\nもう着替えておいたよ。"
10142-100 = "これ……どう、かな？"
10142-110 = "思ったより似合う\n水着が見つからなくて……。"
10142-120 = "白を選んだ理由……？"
10142-130 = "これが良いって、\nみんなに言われたから……。"
10142-140 = "スキンケアの秘訣？"
10142-150 = "別に特別なことをしている\nわけじゃないんだけど……。"
10142-160 = "あ。もしかしたら\n焼き鳥のおかげかも？"
10142-170 = "大切なものは失ってから\n気づくって、よく言うよね。"
10142-180 = "私もそうだった。だから――"
10142-190 = "もう手放さない。絶対に。"
10142-200 = "右腕が黄昏に呑まれてから、\n私は誰かの手にすがることを\n忘れてしまった。"
10142-210 = "だからいつも一人で考えて、\n全部自分で解決しようとしてた。"
10142-220 = "……だけど、今は違う。\n先生とみんながいるから。"
10142-230 = "これからも……よろしくね。"
10142-240 = "そばにいるだけで\n安心できる人がいるんだ。"
10142-250 = "今日はその人の\n誕生日なんだって。"
10142-260 = "だから思い出に残るように、\nこの格好でお祝いするね。"
10142-270 = "お誕生日おめでとう、先生。"
10142-280 = "私が冬に生まれたのには\n意味があるんだと思う。"
10142-290 = "冬の厳しさを越えて、\n麗らかな日の下に咲く\n花のように……。"
10142-300 = "私もいつか、咲き誇りたいんだ。"
10142-310 = "あけましておめでとう、先生。"
10142-320 = "お正月くらいは\n明るい話がいいよね。"
10142-330 = "だから形からでは\nあるんだけど……"
10142-340 = "明るい気分になれる\n格好にしてみたんだ……"
10142-350 = "どうかな？　"
10142-360 = "寒さには強いほうだよ。\nほら、今も水着だけど平気。"
10142-370 = "あ……今日は赤い服の方が……\n良かった……？"
10142-380 = "今日みたいな日に水着……。"
10142-390 = "私はただ\n水着を着ただけなのかな？"
10142-400 = "コスプレになってる？"
10142-410 = "え、違う？"
10142-420 = "コスプレの世界って\n奥深いんだね……。"
10142-440 = "最初はこの作戦でいこう。"
10142-450 = "向こうは序盤から\n全力で来るだろうから。"
10142-460 = "……先生？"
10142-470 = "私のサイン、ちゃんと見てる？"
10142-480 = "最初からよそ見をするなんて、\nらしくないね。"
10142-490 = "一体何を見て……。"
10142-500 = "あ……そっか。"
10142-510 = "ごめんなさい。"
10142-520 = "逆に集中できないよね。"
10142-530 = "私が……\nミステリアスな美少女だから。"
10142-540 = "ビーチバレーはこうやって\nサインを出すんだけど……。"
10142-550 = "今からでも、\nやり方を変えたほうがいいかな？"
10142-560 = "……ダメか、流石に遅いよね。"
10142-570 = "このままいこう、先生。"
10142-580 = "私たちなら……大丈夫。"
10142-2600 = "私はまだまだ足りないことだらけ。\nそれでも、この百蓮を持ち続けたいと思う。\nそれは……\n百花繚乱の委員長を演じるためじゃない。\n――自分自身の心と向き合うために。"
