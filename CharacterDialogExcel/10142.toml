[translation]
10142-10 = "Б-блю... Арха... йв."
10142-20 = "Раз уж мы проделали такой путь до пляжа... Я хочу оставить незабываемые воспоминания вместе со всеми. \nСенсей, ты... присоединишься ко мне?"
10142-30 = "Интересно, где тут\nпрохладнее всего...?"
10142-40 = "Я с нетерпением жду... нашей дружеской встречи."
10142-50 = "Я хочу показать... \nчто способна вести себя \nкак председатель комитета."
10142-60 = "Мне не очень-то... \nхочется выделяться..."
10142-70 = "Я хочу сберечь... \nсегодняшние воспоминания."
10142-80 = "С возвращением, Сенсей. \nНадеюсь, я и сегодня смогу чем-то помочь."
10142-90 = "Ох... Я как раз тебя ждала. \nМы ведь собираемся на пляж, верно? \nЯ уже переоделась."
10142-100 = "Что ты... думаешь об этом?"
10142-110 = "Я не смогла найти купальник, \nкоторый подошёл бы мне так хорошо, как я думала..."
10142-120 = "И почему я выбрала белый...?"
10142-130 = "Просто все вокруг твердили... \nчто мне пойдёт именно этот..."
10142-140 = "Секрет моего ухода за кожей?"
10142-150 = "Да я не делаю \nничего такого особенного..."
10142-160 = "Ох. Может, это всё благодаря якитори?"
10142-170 = "Говорят, истинную ценность вещей осознаёшь только тогда, когда их теряешь."
10142-180 = "Со мной было точно так же. Так что —"
10142-190 = "Я больше их не отпущу. Никогда."
10142-200 = "С тех пор, как мою правую руку поглотили сумерки, \nя позабыла, как это — полагаться на чью-то ладонь."
10142-210 = "Вот почему я всегда размышляла в одиночестве \nи пыталась со всем разобраться сама."
10142-220 = "...Но теперь всё иначе. \nВедь у меня есть ты и все остальные, Сенсей."
10142-230 = "Я рассчитываю на тебя... и в будущем."
10142-240 = "Есть один человек, от одного присутствия которого \nмне сразу становится спокойно."
10142-250 = "Я слышала, что у этого человека \nсегодня день рождения."
10142-260 = "Так что, чтобы сделать этот день незабываемым, \nя поздравлю его в этом наряде."
10142-270 = "С днём рождения, Сенсей."
10142-280 = "Мне кажется, в том, что я родилась зимой, \nесть особый смысл."
10142-290 = "Словно цветок, который распускается \nпод ярким солнцем, \nпреодолев суровую зиму..."
10142-300 = "Я тоже хочу однажды расцвести во всей красе."
10142-310 = "С Новым годом, Сенсей."
10142-320 = "Стоит поговорить о чём-то весёлом \nхотя бы на Новый год, верно?"
10142-330 = "Так что, пускай даже ради вида..."
10142-340 = "Я попыталась надеть то, \nчто поднимет мне настроение..."
10142-350 = "Ну и как тебе?"
10142-360 = "На самом деле я довольно устойчива к холоду. \nВот, видишь, я сейчас в купальнике, и мне нормально."
10142-370 = "Ох... Может, красная одежда была бы... \nлучше...?"
10142-380 = "Купальник в такой день..."
10142-390 = "Я что, правда... \nпросто надела купальник?"
10142-400 = "Это косплей?"
10142-410 = "Погоди, разве нет?"
10142-420 = "Мир косплея \nи правда такой глубокий, да...?"
10142-440 = "Давай пока придерживаться этой стратегии."
10142-450 = "Они наверняка набросятся на нас со всеми силами с самого начала."
10142-460 = "...Сенсей?"
10142-470 = "Ты вообще следишь за моими знаками?"
10142-480 = "Смотреть в сторону с самого начала... \nэто на тебя не похоже."
10142-490 = "Куда ты вообще смотришь...?"
10142-500 = "Ох... Вот как, понятно."
10142-510 = "Прости."
10142-520 = "Так ведь трудно сосредоточиться, да?"
10142-530 = "Потому что я... \nзагадочная красавица."
10142-540 = "Вот так я подаю знаки в пляжном волейболе..."
10142-550 = "Мне стоит изменить способ, \nпрямо сейчас?"
10142-560 = "...Нет, полагаю, для этого уже слишком поздно."
10142-570 = "Давай сделаем это, Сенсей."
10142-580 = "Если мы вместе... всё будет в порядке."
10142-2600 = "Мне всё ещё многого не хватает. \nИ всё же я хочу продолжать держать этот Хякурэн. \nЭто вовсе не для того... \nчтобы играть роль председателя комитета Хяквияко. \n— Это для того, чтобы взглянуть в лицо собственному сердцу."