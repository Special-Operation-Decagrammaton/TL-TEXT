[translation]
10142-10 = "Blue... Archive."
10142-20 = "Já que viemos à praia... quero fazer memórias inesquecíveis com todos.\nSensei, você... me faria companhia?"
10142-30 = "Onde será...\no lugar mais fresco?"
10142-40 = "A festa de confraternização... estou ansiosa."
10142-50 = "Quero mostrar...\num lado que seja digno\nde uma presidente."
10142-60 = "Eu não quero...\nchamar muita\natenção..."
10142-70 = "Quero guardar com carinho,\nas memórias de hoje."
10142-80 = "Bem-vindo de volta, Sensei.\nEspero poder ser útil hoje também."
10142-90 = "Ah... Estava te esperando.\nNós vamos à praia, certo?\nJá me troquei."
10142-100 = "Como... estou?"
10142-110 = "Não consegui encontrar uma roupa de banho\nque combinasse tanto quanto eu imaginava..."
10142-120 = "O motivo de eu ter escolhido branco...?"
10142-130 = "É que todas me disseram,\nque esse ficaria bom..."
10142-140 = "O segredo para cuidar da pele?"
10142-150 = "Não é como se eu estivesse\nfazendo nada de especial..."
10142-160 = "Ah. Talvez seja\ngraças ao yakitori?"
10142-170 = "Dizem muito que só percebemos o valor\ndas coisas importantes depois de perdê-las."
10142-180 = "Isso aconteceu comigo também. Por isso..."
10142-190 = "Não vou soltar de novo. Nunca."
10142-200 = "Desde que meu braço direito foi engolido pelo crepúsculo,\neu havia me esquecido de como\nme apoiar na mão de alguém."
10142-210 = "Então eu sempre pensava sozinha,\ne tentava resolver tudo por mim mesma."
10142-220 = "...Mas agora é diferente.\nPorque eu tenho o Sensei e as outras."
10142-230 = "Por favor... continue cuidando de mim."
10142-240 = "Há pessoas que só de estarem perto\njá nos deixam tranquilos."
10142-250 = "Disseram que hoje é\no aniversário dessa pessoa."
10142-260 = "Então, para que seja inesquecível,\nvou celebrar usando essa roupa."
10142-270 = "Feliz aniversário, Sensei."
10142-280 = "Eu acho que há um significado\npor eu ter nascido no inverno."
10142-290 = "Como uma flor que desabrocha sob o sol radiante,\napós superar a rigidez do inverno..."
10142-300 = "Eu também quero florescer orgulhosamente algum dia."
10142-310 = "Feliz Ano Novo, Sensei."
10142-320 = "Pelo menos no Ano Novo\né bom ter conversas mais alegres, não é?"
10142-330 = "Então, mesmo que seja apenas\npela aparência..."
10142-340 = "Eu decidi colocar uma roupa\nque trouxesse um clima mais alegre..."
10142-350 = "O que acha?"
10142-360 = "Eu sou boa em lidar com o frio.\nVeja, estou de roupa de banho mas estou bem."
10142-370 = "Ah... Você preferia que eu estivesse...\nusando vermelho hoje...?"
10142-380 = "Usar roupa de banho num dia como hoje..."
10142-390 = "Eu estou apenas\nusando uma roupa de banho?"
10142-400 = "Isso conta como cosplay?"
10142-410 = "Hã, não?"
10142-420 = "O mundo do cosplay\né bem complexo, né..."
10142-440 = "Vamos com essa estratégia no início."
10142-450 = "Já que eles devem vir com tudo\ndesde o começo."
10142-460 = "...Sensei?"
10142-470 = "Você está prestando atenção nos meus sinais?"
10142-480 = "Não é do seu feitio ficar\nolhando para o lado desde o começo."
10142-490 = "Para o que você está olhando..."
10142-500 = "Ah... entendi."
10142-510 = "Desculpe."
10142-520 = "Desse jeito você não vai conseguir se concentrar."
10142-530 = "É porque eu sou...\numa garota linda e misteriosa."
10142-540 = "É assim que se faz sinais\nno vôlei de praia, mas..."
10142-550 = "Ainda dá tempo,\nserá que devo mudar a forma de fazer isso?"
10142-560 = "...Não dá, já é tarde demais, né."
10142-570 = "Vamos continuar assim, Sensei."
10142-580 = "Nós ficaremos... bem."
10142-2600 = "Ainda me falta muita coisa.\nMas, mesmo assim, quero continuar portando a Hyakuren.\nIsso não é...\npara fingir ser a presidente da Hyakkaryouran.\n--É para poder enfrentar o meu próprio coração."