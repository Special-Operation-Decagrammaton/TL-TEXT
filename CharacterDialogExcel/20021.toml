[translation]
20021-10 = "ブルーアーカイブ！"
20021-20 = "メリークリスマ～ス！\nサンタさんの代わりに、\nハナエが来ましたよ！"
20021-30 = "こんにちは！\nサンタ服だけど\nハナエですよ～！"
20021-40 = "手術とプレゼントが\n必要な人～、\nいませんか～？"
20021-50 = "クリスマスでも\n救護騎士団の\n準備はバッチリです！"
20021-60 = "煙突は……どこに\nあるのでしょう？"
20021-70 = "クリスマスにチャリティー\nイベントがあるんです。\n私もそこでみんなと\n一緒に歌いますよ～"
20021-80 = "先生、先生！欲しい\nものはありませんか？"
20021-90 = "サンタの私がプレゼント\nしちゃいますよ～！"
20021-100 = "先生、最近忙しそう\nですね……今日も\n帰りが遅かったですし、"
20021-110 = "疲労がとれる簡単な\n手術をしましょうか？"
20021-120 = "私は今日も元気です！\n先生はお変わりありませんか？"
20021-130 = "具合が悪いときは、\nハナエを呼んでください！"
20021-140 = "注射も手術も\nプレゼントしちゃいます！"
20021-150 = "冬は凍傷に気を\n付けてくださいね！"
20021-160 = "一歩でも間違えたら、\n患部を切断する\nことになっちゃいますから！"
20021-170 = "クリスマスが待ち遠しいですね！\n胸がワクワクしちゃいます！"
20021-180 = "先生も楽しみだと\n嬉しいです！"
20021-190 = "先生、先生！\nクリスマスプレゼントに\nおっきなウサギのぬいぐるみ\nなんてどうですか？"
20021-200 = "わあ、お誕生日\nおめでとうございます！"
20021-210 = "はい、こちら！プレゼントの中に\nプレゼントを入れてみました！\nどうでしょう！"
20021-220 = "えっ……\nマトリョーシカみたい\n……ですか？"
20021-230 = "今日は私の誕生日です！\nプレゼントは……"
20021-240 = "先生が欲しいです！えへへ。"
20021-250 = "先生、もう新年ですよ！\nあけましておめでとう\nございます！"
20021-260 = "クリスマスは過ぎちゃったけど、\nまだサンタ服でも\n大丈夫でしょうか？"
20021-270 = "先生、クリスマスですよ！"
20021-280 = "今年もサンタさん、\n来てくれるかなぁ。"
20021-290 = "ハロウィンも大好きな\nお祭りの一つです！"
20021-300 = "でも……なんだか\n治療や手術が必要な\n人が多そうですね？"
20021-320 = "これは……私なりの\nサンタさんを\nお迎えする準備です。"
20021-330 = "サンタさんが寒くないよう、\n暖炉に火を入れて……"
20021-340 = "クリスマスツリーを可愛く\n飾り付けるんです。"
20021-350 = "サンタさん、\n待ってますよ～って。"
20021-360 = "そうすると、必ず靴下に\nプレゼントを入れて\nくれるんです！"
20021-370 = "そして今年はですね……"
20021-380 = "サンタさんにお礼を\nしようと思っています！"
20021-390 = "えへへ、どうでしょう？\n手作りクッキーと\n新鮮なミルクです！"
20021-2600 = "よし、準備オッケーです！"
