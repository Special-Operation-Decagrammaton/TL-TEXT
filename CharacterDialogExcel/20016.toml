[translation]
20016-10 = "Haa... Blue Archive..."
20016-20 = "Haa, como as coisas chegaram a esse ponto... Bem, já que chegamos aqui, vou fazer o que precisa ser feito."
20016-30 = "Algum lugar onde eu possa\nler livros em paz..."
20016-40 = "Ah, que\naborrecimento..."
20016-50 = "Não gosto muito\nde lugares\nbarulhentos..."
20016-60 = "Algum lugar onde eu\nnão seja descoberta..."
20016-70 = "Entendo, talvez aqui\neu não seja encontrada."
20016-80 = "Haa, o que é isso de\nsistema de turno..."
20016-90 = "Sim, sim, já que me pediram, vou me esforçar."
20016-100 = "Ah... bem-vindo de volta, Sensei.\nVeja, há uma montanha de\ntrabalho chato acumulado."
20016-110 = "Fuu..."
20016-120 = "Que tal a gente\nfugir um pouco?"
20016-130 = "...Estou fazendo tudo direitinho, viu?"
20016-140 = "É um saco, mas...\nHaa, não tem jeito."
20016-150 = "O que foi? Eu já terminei\ntudo o que precisava\nser feito."
20016-160 = "O que houve? Precisa\nde algum favor?"
20016-170 = "Não precisa fazer essa cara, eu sei\nmuito bem que hoje é o\nseu aniversário, Sensei."
20016-180 = "...Não tem jeito, vou\ncomemorar com você."
20016-190 = "Feliz aniversário,\nSensei."
20016-200 = "...Sim? Meu aniversário...\nOnde você descobriu isso..."
20016-210 = "Não, não é que\neu não goste..."
20016-220 = "Por favor, vá para o outro lado.\nSeria melhor se você não\nse aproximasse agora."
20016-230 = "Feliz ano novo."
20016-240 = "Bem, se eu tivesse\nalgum desejo..."
20016-250 = "Espero que este ano tenha\no menor número possível\nde problemas."
20016-260 = "Todo mundo está tão animado..."
20016-270 = "Não, não é que eu não goste."
20016-280 = "Sair lá fora é complicado, então, já que não tem jeito, vou ficar aqui com você, Sensei..."
20016-290 = "Sim, sim, me dê logo o doce."
20016-300 = "...Eh? Você quer que eu diga direito?"
20016-310 = "Sim, sim, gostosuras ou travessuras."
20016-330 = "Fufu, não acha que este é um lugar nada mal?"
20016-340 = "Estas almofadas fofas,\ne todos esses lanches reunidos."
20016-350 = "E ainda por cima, muitos\nlivros e jogos."
20016-360 = "É o meu espaço de descanso\nparticular, do qual me orgulho.\nO que achou?"
20016-370 = "Fufu, pode ficar mais impressionado\ne me elogiar, sabe?"
20016-380 = "Bem, já que tenho um cúmplice, que tal a gente matar o tempo hoje também?"
20016-390 = "Ei, Sensei?"
20016-2600 = "Haa, francamente... Depois de tudo o que você fez, não tem como eu não levar isso a sério."
