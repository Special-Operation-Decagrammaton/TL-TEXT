[translation]
20016-10 = "はぁ……ブルーアーカイブ……"
20016-20 = "はあ、どうしてこんなことに……。\nまあこうなった以上、やることはやりますよ。"
20016-30 = "静かに本を\n読めるところは……"
20016-40 = "あぁ、\nめんどくさい……"
20016-50 = "あんまり\n騒がしいのは\nちょっと……"
20016-60 = "どこか、\nバレなさそうな\nところは……"
20016-70 = "なるほど、ここなら\n見つからないかも\nしれませんね。"
20016-80 = "はぁ、\n何ですか当番制って……"
20016-90 = "はいはい、\n頼まれたからには頑張りますよ。"
20016-100 = "ああ……おかえりなさい、先生\nほら、めんどうな仕事が\n山積みですよ。"
20016-110 = "ふぅ……"
20016-120 = "ちょっとどこかで\nサボりません？"
20016-130 = "……ちゃんとやってますよ？"
20016-140 = "めんどくさいですが……\nはぁ、仕方ありませんね。"
20016-150 = "何ですか。\nやるべきことは、\nちゃんと終わらせましたが。"
20016-160 = "どうしました、\n何か頼み事でも？"
20016-170 = "そんな顔しなくても、\n今日が先生の誕生日って\nことくらい知ってます。"
20016-180 = "……仕方ありませんね、\n祝ってあげますよ。"
20016-190 = "お誕生日\nおめでとうございます、先生。"
20016-200 = "……はい？私の誕生日……\nどこでそれを……"
20016-210 = "いえ、\n別に嫌というわけでは……"
20016-220 = "ちょっとあっち行ってて\nください、今は近寄ら\nないでもらえると。"
20016-230 = "あけまして\nおめでとうございます。"
20016-240 = "そうですね、\n願うことがあるとすれば……"
20016-250 = "今年は面倒ごとが、\nできるだけ少ないと\n良いですね。"
20016-260 = "誰も彼も浮かれてますね……"
20016-270 = "いえ、別に嫌というわけでは"
20016-280 = "外に出るのもアレですし、\n仕方ないので先生と\n一緒にいてあげますか……"
20016-290 = "はい、とっとと飴ください。"
20016-300 = "……え？ちゃんと言ってほしい？"
20016-310 = "はいはい、\nトリックオアトリートー"
20016-330 = "ふふっ、中々悪くない\n場所だと思いませんか。"
20016-340 = "このふかふかな座布団、\n揃えられた幾つものおやつ。"
20016-350 = "さらには本や\nゲームまでたくさん。"
20016-360 = "私だけの、\n自慢の休憩スペースです。\nどうですか？"
20016-370 = "ふふっ、もっと感心して、\n褒めてくれても良いんですよ？"
20016-380 = "さて、今は共犯がいる\nことですし、今日も今日とて\nサボるとしましょうか？"
20016-390 = "ねえ、先生？"
20016-2600 = "はぁ、全く……ここまでしてもらって、\n本気を出さないわけには\nいかないじゃないですか。"
