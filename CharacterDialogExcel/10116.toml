[translation]
10116-10 = "ブ、ブルー、アーカイブ。"
10116-20 = "アリウススクワッドのサオリだ……\nこれは、任務のために着ている。\n……本当だ。"
10116-30 = "潜入作戦の練習に\nちょうど良さそうだ。"
10116-40 = "いつか、\nあの子たちにも……\nドレスを。"
10116-50 = "任務以外でこれを着る\n機会があるの\nだろうか……。"
10116-60 = "視線を感じる……\nもしかして、\n目立っているのか？"
10116-70 = "便利屋68……\nやはり、\n只者ではないな……"
10116-80 = "おかえりなさい、先生……\n待っていたぞ。"
10116-90 = "……この格好で出迎えるのは、\n少し気恥ずかしいな。"
10116-100 = "服装の影響だろうか？\nいつもより大胆な動きが\nできるようになった。"
10116-110 = "どんな任務でも\n遂行してみせよう。"
10116-120 = "こういったドレスは、\n特別な日に\n着用するものだと聞いた。"
10116-130 = "そうとは\n知らなかったのだが……。"
10116-140 = "他意があったわけではない。\nただ……せっかく\n着替えたのだから、\n見てもらいたくて。"
10116-150 = "……これを着た時に、\nまた会いに行っても\n良いだろうか？"
10116-160 = "……それだけで\n特別な日になるから。"
10116-170 = "今日のために、\nステップを練習したんだ。\n一緒に、踊ってくれるか？"
10116-180 = "私が生まれた日に、\n意味などない……\n……昔はそう考えていた。"
10116-190 = "だが、今は違う……\nこれも先生のおかげだな。"
10116-200 = "お参りには行ったか？\n私も今行ってきたところだ。"
10116-210 = "何を願ったのかは……秘密だ。"
10116-220 = "聖夜は、大切な人と\n過ごすものらしいな。"
10116-230 = "……深い意味はない。"
10116-240 = "ハロウィーンの仮装には\nそぐわないな……\nなにか被り物でも\nした方が良いのだろうか？"
10116-250 = "おかえりなさい、先生……\n待っていたぞ。"
10116-260 = "……この格好で出迎えるのは、\n少し気恥ずかしいな。"
10116-270 = "服装の影響だろうか？\nいつもより大胆な動きが\nできるようになった。"
10116-280 = "どんな任務でも\n遂行してみせよう。"
10116-290 = "こういったドレスは、\n特別な日に\n着用するものだと聞いた。"
10116-300 = "そうとは\n知らなかったのだが……。"
10116-310 = "他意があったわけではない。\nただ……せっかく\n着替えたのだから、\n見てもらいたくて。"
10116-320 = "……これを着た時に、\nまた会いに行っても\n良いだろうか？"
10116-330 = "……それだけで\n特別な日になるから。"
10116-340 = "今日のために、\nステップを練習したんだ。\n一緒に、踊ってくれるか？"
10116-350 = "私が生まれた日に、\n意味などない……\n……昔はそう考えていた。"
10116-360 = "だが、今は違う……\nこれも先生のおかげだな。"
10116-370 = "お参りには行ったか？\n私も今行ってきたところだ。"
10116-380 = "何を願ったのかは……秘密だ。"
10116-390 = "聖夜は、大切な人と\n過ごすものらしいな。"
10116-400 = "……深い意味はない。"
10116-410 = "ハロウィーンの仮装には\nそぐわないな……\nなにか被り物でも\nした方が良いのだろうか？"
10116-430 = "こ、こうすればいいのか……？"
10116-440 = "先生がいうのなら……\nだが、これは少し……。"
10116-450 = "普段は、\n絶対取らないポーズだから。"
10116-460 = "両手が塞がっていると、\n少し不安になる。"
10116-470 = "パートナーを\n信頼していなければ難しいな。"
10116-480 = "もしかして……\nそれを示す挨拶、だったのか？"
10116-490 = "ならば……\n先生が満足するまで、\nこうしていよう。"
10116-500 = "それが……私の信頼の証だ。"
10116-2600 = "おかげで遂行できる仕事の幅が増えた。\n依頼でもなんでも、応えてみせよう。"
