[translation]
10116-10 = "Bl-Blue, Archive."
10116-20 = "Sou aqui, do Esquadrão Arius... Estou vestindo isso por causa de uma missão. ...É verdade."
10116-30 = "Parece ser perfeito para praticar operações de infiltração."
10116-40 = "Algum dia... eu gostaria que elas também... pudessem usar vestidos."
10116-50 = "Será que terei alguma oportunidade de usar isso fora de uma missão...?"
10116-60 = "Sinto olhares sobre mim... Será que estou chamando atenção demais?"
10116-70 = "A Problem Solver 68... Como esperado, não são pessoas comuns..."
10116-80 = "Bem-vindo de volta, Sensei... Eu estava te esperando."
10116-90 = "...É um pouco embaraçoso te receber vestida assim."
10116-100 = "Será por causa da roupa? Sinto que consigo fazer movimentos mais ousados que o normal."
10116-110 = "Eu cumprirei qualquer missão que me for dada."
10116-120 = "Ouvi dizer que vestidos como este são usados em dias especiais."
10116-130 = "Eu não sabia disso, mas..."
10116-140 = "Não tive segundas intenções. É só que... já que me troquei, queria que você visse."
10116-150 = "...Posso vir te encontrar de novo quando estiver vestindo isso?"
10116-160 = "...Só isso já tornaria o dia especial."
10116-170 = "Pratiquei alguns passos para hoje. Você dançaria comigo?"
10116-180 = "O dia em que nasci não tem significado... ...Eu pensava assim antigamente."
10116-190 = "Mas agora é diferente... Isso também é graças a você, Sensei."
10116-200 = "Você já foi fazer suas orações? Eu acabei de voltar de lá."
10116-210 = "O que eu pedi... é segredo."
10116-220 = "Parece que a véspera de Natal é um dia para passar com alguém importante."
10116-230 = "...Não tem nenhum significado profundo."
10116-240 = "Isso não combina com uma fantasia de Halloween... Será que eu deveria usar algum acessório de cabeça?"
