[translation]
10038-10 = "ブルーアーカイブ。"
10038-20 = "SRT特殊学園、RABBIT小隊の月雪ミヤコです。\n先生、ご指示を。"
10038-30 = "……可愛い飾りを\n発見しました。"
10038-40 = "これぐらいの空間なら、\n私一人でも制圧\nできそうな……"
10038-50 = "こんなところに\n狙撃ポイントが……"
10038-60 = "……受信中、\n感度良好。"
10038-70 = "何か問題でも\nありましたか？"
10038-80 = "お帰りなさい、先生。"
10038-90 = "ここでずっと、次の命令を\nお待ちしておりました。"
10038-100 = "またお会いできて\n嬉しいです、先生。\n何かやることは……？"
10038-110 = "RABBIT小隊、\nいつでも出撃可能です。"
10038-120 = "急に気になったのですが……"
10038-130 = "ウサギはどうやって\n鳴くんでしょうか？"
10038-140 = "ぴょん、ぴょん……とか？"
10038-150 = "手強い敵に出会ったら、\nぜひ私たちを呼んでください。"
10038-160 = "RABBIT小隊の\nエンブレム……"
10038-170 = "可愛いと思いませんか？"
10038-180 = "お誕生日\nおめでとうございます、先生。"
10038-190 = "先生のお誕生日が\n十全なものになるよう、"
10038-200 = "今日は一日、\n密着警護していますね。"
10038-210 = "そういえば、今日は\n私の誕生日でしたね……。"
10038-220 = "いえ、プレゼントは\n大丈夫です。"
10038-230 = "先生の安全こそが、\n私の喜びですから。"
10038-240 = "今年こそは、SRTを\n復活させられるでしょうか……？"
10038-250 = "サンタクロース……"
10038-260 = "ぜひいつか、一度\nお手合わせ願いたい\n相手です。"
10038-270 = "お化けであっても、\n銃弾が通じるなら\n怖くないのですが……。"
10038-290 = "綺麗……。"
10038-300 = "夜景があまりに美しくて、\n危うく目的を忘れる\nところでした。"
10038-310 = "ふふっ、\n作戦中に油断なんて\nダメなのですけど……。"
10038-320 = "……えっと\n……急なのですが、\n先生……。"
10038-330 = "その……いつも\n一緒にいてくださって、\nありがとうございます。"
10038-340 = "先生がいらっしゃら\nなかったら……"
10038-350 = "私も、RABBIT小隊も、\nここまで成長でき\nなかったと思います。"
10038-360 = "なので今度、\nよろしければ、その――"
10038-370 = "……？連絡が……"
10038-380 = "なるほど、\nここから500ｍの地点に……"
10038-390 = "はい。すぐに突入の準備を、\nとのことです。"
10038-400 = "先生、ラペルリングと\nハーネスを装着してください。"
10038-410 = "え？使い方が\nわからない……ですか？\nそ、そうでしたか……。"
10038-420 = "……大丈夫です。\nでは、ここで待っててください。\nすぐに終えて戻ってきます。"
10038-430 = "それでまた先生と、\nゆっくりこの夜景が\n見たいので。"
10038-2600 = "RABBIT31式短機関銃、\n確かに受け取りました。\n……可愛い。"
