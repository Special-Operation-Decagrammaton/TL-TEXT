[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10038-10 = "Blue Archive."
10038-20 = "Sou Tsukiyuki Miyako, Esquadrão RABBIT,\nAcademia Especial SRT.\nÀs suas ordens, Sensei."
10038-30 = "……Encontrei um\nornamento muito fofo."
10038-40 = "Um espaço com essas dimensões,\neu consigo neutralizar\nmesmo sozinha……"
10038-50 = "E pensar que um local desses\nteria um ponto de sniper……"
10038-60 = "……Na escuta,\nrecepção limpa e clara."
10038-70 = "Ocorreu algum\nproblema?"
10038-80 = "Bem-vindo de volta, Sensei."
10038-90 = "Estive esperando aqui o tempo todo\npelas suas próximas ordens."
10038-100 = "Fico feliz em\nvê-lo novamente, Sensei.\nQuais são as ordens……?"
10038-110 = "Esquadrão RABBIT,\npronto para ação a qualquer momento."
10038-120 = "Uma dúvida repentina\nme ocorreu agora……"
10038-130 = "Como é exatamente que\nos coelhos 'falam'?"
10038-140 = "Pyon, pyon…… talvez?"
10038-150 = "Se encontrar algum inimigo formidável,\npor favor, chame por nós."
10038-160 = "O emblema do\nEsquadrão RABBIT……"
10038-170 = "Não acha ele bem fofo?"
10038-180 = "Feliz Aniversário,\nSensei."
10038-190 = "Para garantir que o seu aniversário\nseja absolutamente perfeito,"
10038-200 = "Eu serei a sua guarda-costas\npessoal o dia inteiro hoje."
10038-210 = "Falando nisso, hoje é o\nmeu aniversário, não é……"
10038-220 = "Não se preocupe\ncom presentes."
10038-230 = "A segurança do Sensei\njá é a minha maior alegria."
10038-240 = "Será que neste ano nós finalmente\nconseguiremos reerguer a SRT……?"
10038-250 = "O Papai Noel……"
10038-260 = "Ele com certeza é um oponente contra\nquem eu adoraria testar\nas minhas habilidades algum dia."
10038-270 = "Mesmo que sejam fantasmas,\nse balas normais funcionarem contra eles,\nnão há o que temer, mas……"
10038-290 = "Que lindo……"
10038-300 = "A visão noturna é tão deslumbrante\nque eu quase me esqueci\ndo meu objetivo."
10038-310 = "Fufu,\nabaixar a guarda no meio de uma missão\né inaceitável, mas……"
10038-320 = "……Ahm\n……Isso é bem repentino,\nmas, Sensei……"
10038-330 = "Sabe…… Muito obrigada\npor estar sempre\nao nosso lado."
10038-340 = "Se você não\nestivesse conosco……"
10038-350 = "Tanto eu quanto o Esquadrão RABBIT\njamais teríamos crescido\ntanto até aqui."
10038-360 = "Portanto, da próxima vez,\nse você estiver livre, poderíamos――"
10038-370 = "……？Recebendo transmissão……"
10038-380 = "Entendido,\num local a 500 metros daqui……"
10038-390 = "Sim. 'Iniciem as preparações\npara invasão imediatamente'."
10038-400 = "Sensei, por favor,\nvista a sua cadeirinha e arnês de rapel."
10038-410 = "Eh? Você não sabe\ncomo usar……?\nA-Ah, compreendo……"
10038-420 = "……Tudo bem.\nNesse caso, aguarde aqui.\nEu terminarei tudo e voltarei num instante."
10038-430 = "Para que assim,\neu possa admirar esta vista noturna\ncom calma ao seu lado."
10038-2600 = "RABBIT Submetralhadora Tipo-31,\nrecebida com sucesso.\n……Que fofa."