[translation]
10038-10 = "Blue Archive."
10038-20 = "Aqui é Tsukiyuki Miyako, do Esquadrão RABBIT da Academia SRT.\nProfessor, quais são as ordens?"
10038-30 = "……Encontrei um\nenfeite fofo."
10038-40 = "Para um espaço deste tamanho,\nacho que consigo dominar\nsozinha……"
10038-50 = "Um ponto de sniper\nem um lugar desses……"
10038-60 = "……Recebendo sinal,\nsinal excelente."
10038-70 = "Houve algum\nproblema?"
10038-80 = "Bem-vindo de volta, Professor."
10038-90 = "Fiquei aqui o tempo todo,\nesperando pelas próximas ordens."
10038-100 = "Estou feliz em vê-lo\nnovamente, Professor.\nHá algo para fazer……?"
10038-110 = "Esquadrão RABBIT,\npronto para sair a qualquer momento."
10038-120 = "Fiquei curiosa de repente……"
10038-130 = "Como é que os coelhos\nfazem para se comunicar?"
10038-140 = "Tipo, pular, pular……?"
10038-150 = "Se encontrar um inimigo difícil,\npor favor, chame a gente."
10038-160 = "O emblema do\nEsquadrão RABBIT……"
10038-170 = "Não acha fofo?"
10038-180 = "Feliz aniversário,\nProfessor."
10038-190 = "Para que o seu aniversário\nseja perfeito,"
10038-200 = "hoje eu farei sua\nescolta pessoal o dia todo."
10038-210 = "Falando nisso, hoje é\no meu aniversário, não é……?"
10038-220 = "Não, não precisa\nde presente."
10038-230 = "A segurança do Professor\né a minha alegria."
10038-240 = "Será que este ano finalmente\npoderemos restaurar a SRT……?"
10038-250 = "Papai Noel……"
10038-260 = "É alguém com quem eu\ngostaria de treinar\num dia."
10038-270 = "Mesmo que seja um fantasma,\nse balas funcionarem contra ele,\nnão tenho medo……"
10038-290 = "Que lindo……."
10038-300 = "A vista noturna é tão bela\nque quase esqueci\ndo meu objetivo."
10038-310 = "Fufu, não deveria me distrair\ndurante uma missão, mas……"
10038-320 = "……Bem,\n……é repentino,\nProfessor……."
10038-330 = "É que…… obrigado por estar\nsempre comigo."
10038-340 = "Se o Professor não estivesse\naqui……"
10038-350 = "Acho que nem eu, nem o Esquadrão RABBIT,\nteríamos crescido tanto."
10038-360 = "Por isso, da próxima vez,\nse não se importar, eu……"
10038-370 = "……? Uma mensagem……"
10038-380 = "Entendido,\na 500 metros daqui……"
10038-390 = "Sim. Preparar para invasão\nimediata, entendido."
10038-400 = "Professor, por favor, coloque\no anel de rapel e o arnês."
10038-410 = "Eh? Você não sabe\ncomo usar……? A-ah, entendo……."
10038-420 = "……Tudo bem.\nEntão, espere aqui.\nVoltarei logo após terminar."
10038-430 = "Porque eu quero ver essa vista noturna\ncom calma com o Professor\nnovamente."
10038-2600 = "Submetralhadora modelo RABBIT 31,\nrecebida com sucesso.\n……Que fofa."
