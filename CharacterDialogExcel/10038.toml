[translation]
10038-10 = "Blue Archive."
10038-20 = "Sou Tsukiyuki Miyako, do Esquadrão RABBIT da Academia Especial SRT.\nSensei, aguardando suas ordens."
10038-30 = "……Encontrei uma decoração\nmuito fofa aqui."
10038-40 = "Um espaço deste tamanho...\nAcho que eu conseguiria subjugar\ntudo sozinha..."
10038-50 = "Um ponto de observação para\nfranco-atiradores num lugar\ncomo este..."
10038-60 = "……Recebendo,\nsinal limpo."
10038-70 = "Houve algum problema?"
10038-80 = "Bem-vindo de volta, Sensei."
10038-90 = "Eu estive esperando aqui\no tempo todo pelas suas\npróximas ordens."
10038-100 = "Estou feliz em vê-lo\nnovamente, Sensei.\nTem algo que precise ser feito...?"
10038-110 = "Esquadrão RABBIT,\npronto para a ação a qualquer momento."
10038-120 = "Fiquei curiosa sobre uma\ncoisa de repente..."
10038-130 = "Que tipo de som\nos coelhos fazem?"
10038-140 = "Será que é... 'pyon, pyon'?"
10038-150 = "Se você encontrar um inimigo\nformidável, por favor,\nnão hesite em nos chamar."
10038-160 = "O emblema do\nEsquadrão RABBIT..."
10038-170 = "Você não acha fofo?"
10038-180 = "Feliz aniversário,\nSensei."
10038-190 = "Para garantir que o seu\naniversário seja perfeito,"
10038-200 = "Hoje eu estarei atuando como\nsua escolta de proteção\naproximada o dia todo."
10038-210 = "Falando nisso, hoje\né o meu aniversário, não é..."
10038-220 = "Não, eu não\npreciso de presentes."
10038-230 = "A segurança do Sensei\njá é a minha maior alegria."
10038-240 = "Será que este ano,\nfinalmente conseguiremos\nrestaurar a SRT...?"
10038-250 = "Papai Noel..."
10038-260 = "Ele é um oponente com quem\neu definitivamente gostaria\nde ter uma disputa de\nhabilidades algum dia."
10038-270 = "Mesmo se for um fantasma,\nse as balas funcionarem nele,\neu não tenho medo..."
10038-290 = "Que lindo..."
10038-300 = "A vista noturna é tão bela\nque eu quase esqueci o\nnosso objetivo aqui."
10038-310 = "Fufu,\nembora baixar a guarda durante\numa operação seja inaceitável..."
10038-320 = "……Uhm\n……Isso é repentino, mas,\nSensei..."
10038-330 = "Sabe... muito obrigada por\nestar sempre ao\nnosso lado."
10038-340 = "Se o senhor\nnão estivesse aqui..."
10038-350 = "Acho que nem eu, nem o\nEsquadrão RABBIT teríamos\nconseguido crescer tanto assim."
10038-360 = "Por isso, da próxima vez,\nse o senhor quiser, nós poderíamos――"
10038-370 = "……? Uma transmissão..."
10038-380 = "Entendido,\nnum ponto a 500m daqui..."
10038-390 = "Sim. As ordens são para nos\nprepararmos para invadir\nimediatamente."
10038-400 = "Sensei, por favor, coloque\no cinto de segurança e\no mosquetão de rapel."
10038-410 = "Hã? O senhor não sabe\ncomo usá-los...?\nE-Entendo..."
10038-420 = "……Tudo bem.\nEntão, por favor, espere-me aqui.\nEu terminarei isso rápido e voltarei."
10038-430 = "Para que eu possa continuar\nassistindo a essa vista noturna\ncom você, Sensei."
10038-2600 = "Submetralhadora RABBIT-31,\nrecebida com sucesso.\n……Que fofa."