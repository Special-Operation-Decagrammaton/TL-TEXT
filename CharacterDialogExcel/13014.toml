[translation]
13014-10 = "Blue Archive! Haha!"
13014-20 = "Quando se fala em atividades de juventude no verão, só pode ser a praia! Estão todos prontos?"
13014-30 = "O Sensei realmente... faz uns quartos assim..."
13014-40 = "Hã, tem isso aqui também."
13014-50 = "Aquela Kikyou... o que será que ela está tramando agora?"
13014-60 = "Nossa sala de mediação... será que não dá para mudar para cá?"
13014-70 = "A praia é mesmo o máximo, né!"
13014-80 = "Mestre! Bem-vindo! Eu estava te esperando!"
13014-90 = "Vamos, vamos para a praia!"
13014-100 = "O mar e a juventude estão nos chamando."
13014-110 = "Vamos terminar o trabalho logo!"
13014-120 = "Uniforme? Estava mais quente do que eu pensava, então tirei."
13014-130 = "...Ma-mas biquíni e roupa de baixo são coisas diferentes, não são!?"
13014-140 = "Mestre, você já usou biquíni por baixo do uniforme?"
13014-150 = "É prático, não preciso perder tempo me trocando lá fora."
13014-160 = "...Hã? Roupa de baixo para a volta?"
13014-170 = "Eu escolhi este biquíni junto com o pessoal da Hyakkiyako."
13014-180 = "É mais fácil de se mover do que eu pensava, é bem legal."
13014-190 = "Que tipo de biquíni você gosta, Sensei?"
13014-200 = "...Ah. Não, não é isso, é que... se fosse para eu usar, entende!"
13014-210 = "Quero passar este verão de forma divertida com todo mundo também."
13014-220 = "Claro, você também vem, Mestre, hehe."
13014-230 = "Hoje é o aniversário do Mestre..."
13014-240 = "Isso significa que é o dia perfeito para atividades de juventude, né!"
13014-250 = "Vamos, vamos, não fique aí parado!"
13014-260 = "Temos que criar memórias inesquecíveis!"
13014-270 = "...Hã!? A-ah, você lembrou do meu aniversário."
13014-280 = "Não... ahaha... estou muito feliz."
13014-290 = "Obrigada... por estar comigo hoje."
13014-300 = "Feliz Ano Novo, Mestre!"
13014-310 = "Hã, se eu não estou com frio?"
13014-320 = "Como eu treino bastante..."
13014-330 = "Atchim!"
13014-340 = "Feliz Natal, Mestre!"
13014-350 = "É justamente no frio que temos a chance de treinar!"
13014-360 = "Vamos! Vamos fazer fricção a seco!"
13014-370 = "Doces ou travessuras! Halloween de biquíni!"
13014-380 = "...E aí? Se surpreendeu?"
13014-390 = "É que... quando você me olha em silêncio, eu fico um pouco..."
13014-400 = "Pode não parecer, mas estou criando coragem..."
13014-420 = "A juventude passa num piscar de olhos, né."
13014-430 = "Queima intensamente e logo se apaga..."
13014-440 = "Como essa chama."
13014-450 = "Eu também pensava exatamente assim."
13014-460 = "...Que minha juventude acabaria apenas com o treinamento."
13014-470 = "Mas agora é diferente."
13014-480 = "Mudou depois que conheci o Mestre."
13014-490 = "Cada dia é divertido e gratificante."
13014-500 = "Claro, o tempo não volta atrás, mas..."
13014-510 = "Ainda temos muito tempo para viver a juventude daqui para frente."
13014-520 = "Se a chama estiver prestes a apagar,\nbasta colocar\nlenha nova nela."
13014-530 = "Por isso, Mestre..."
13014-540 = "Você vai passar\na juventude comigo\npara sempre... né?"
13014-2600 = "Oh, uau...! \nA juventude com o Mestre tomou forma! \nObrigado! \nVou guardar isso como um tesouro para a vida toda!"
