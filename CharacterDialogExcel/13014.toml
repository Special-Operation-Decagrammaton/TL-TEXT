[translation]
13014-10 = "ブルーアーカイブ！ははっ！"
13014-20 = "夏の青春活動っていえば、海しかないよな！\n皆、準備はいい？"
13014-30 = "先生は\nこういう部屋を\n作るんだなぁ……。"
13014-40 = "へぇ、こんなのも\nあるんだ。"
13014-50 = "キキョウのやつ……\n今度は何を\n企んでるんだか。"
13014-60 = "アタシらの調停室……\nここに引っ越せ\nないかな……。"
13014-70 = "やっぱ海って\n最高だよな！"
13014-80 = "師匠！お帰り！\n待ってたんだ！"
13014-90 = "ほら、海に行くよ！"
13014-100 = "海と青春がアタシたちを\n呼んでる。"
13014-110 = "仕事はさっさと\n終わらせちゃおう！"
13014-120 = "制服？\n思ったより暑かったから、\n脱いできたよ。"
13014-130 = "……み、水着と下着は\n違うんだけど！？"
13014-140 = "師匠はさ、\n制服の下に水着を\n着たことってある？"
13014-150 = "外で着替える手間が\nなくて楽なんだ。"
13014-160 = "……え？帰りの下着？"
13014-170 = "この水着、\n百花繚乱の皆と\n一緒に選んだんだ。"
13014-180 = "思ったより動きやすくて\nいい感じ。"
13014-190 = "先生はどんな水着が好き？"
13014-200 = "……あっ。いやっ違くて、\nじ、自分で着るなら、の話！"
13014-210 = "今年の夏も、みんなと\n楽しく過ごしたいな。"
13014-220 = "もちろん、師匠も\n一緒だよ、へへっ。"
13014-230 = "今日は師匠の誕生日……"
13014-240 = "ってことは青春活動に\nピッタリの日、だね！"
13014-250 = "ほらほら、\nボケっとしてないで！"
13014-260 = "忘れられない想い出を\n作らなきゃ！"
13014-270 = "……ふぇっ！？\nあ、アタシの誕生日、\n覚えてくれてたのか。"
13014-280 = "いや……あはは……\nすっごい嬉しい。"
13014-290 = "ありがとう……\n今日、一緒にいてくれて。"
13014-300 = "あけまして\nおめでとう、師匠！"
13014-310 = "え、寒くないのかって？"
13014-320 = "アタシは\n鍛えてるから……"
13014-330 = "っくしゅん！"
13014-340 = "メリークリスマス、師匠！"
13014-350 = "寒い時こそ\n修行のチャンス！"
13014-360 = "ほら！\n乾布摩擦しにいこう！"
13014-370 = "トリック・オア・トリート！\n水着でハロウィーン！"
13014-380 = "……どう？驚いた？"
13014-390 = "その……黙って\n見つめられると、\nちょっと……"
13014-400 = "こう見えても、勇気を\n出してるんだけど……。"
13014-420 = "青春って、あっという\n間なんだよな。"
13014-430 = "激しく燃え上がって、\nすぐに消えちゃう……"
13014-440 = "この炎みたいに。"
13014-450 = "アタシも、\nずっとそう思ってた。"
13014-460 = "……鍛錬だけで、青春が\n終わっちゃうんだろう\nなって。"
13014-470 = "でも、今は違う。"
13014-480 = "師匠と出会って\n変わったんだ。"
13014-490 = "毎日が楽しくて、\n充実してる。"
13014-500 = "もちろん、時間は\n戻らないけど……。"
13014-510 = "これからだって、\nまだまだ青春できる。"
13014-520 = "炎が消えそうなら、\n新しい薪をくべてやれば\nいいんだ。"
13014-530 = "だから師匠……"
13014-540 = "ずっと一緒に\n青春してくれる……\nよな？"
13014-2600 = "おっ、おぉ……！\n師匠との青春が形になってる！\nありがとう！\n一生の宝物にするよ！"
