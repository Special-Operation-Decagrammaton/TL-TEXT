[translation]
10058-10 = "Blue Archive!"
10058-20 = "Sou, a líder do Esquadrão de Socorro, Aomori Mine. Quem aqui precisa de assistência médica?"
10058-30 = "Não há ninguém... que precise de socorro?"
10058-40 = "Este lugar... é muito relaxante."
10058-50 = "Que tal fazermos uma festa do chá aqui?"
10058-60 = "Todos precisam de descanso. O Esquadrão de Socorro não é exceção."
10058-70 = "Uma xícara de chá após as refeições, para a saúde e a beleza."
10058-80 = "Seja bem-vindo, Sensei. Vamos nos esforçar juntos hoje também pela paz em Kivotos."
10058-90 = "Sensei, aconteceu alguma coisa hoje?"
10058-100 = "Não, estou acostumada a esperar, então não se preocupe."
10058-110 = "Aconteceu algo? Se precisar da minha ajuda, pode me chamar a qualquer momento."
10058-120 = "Parece estar ocupado hoje também... Deixe-me ajudar com algo."
10058-130 = "Sempre que estiver cansado, é só me dizer."
10058-140 = "Chá, doces, um colo para descansar... Se for algo que eu possa fazer, farei qualquer coisa."
10058-150 = "Seria melhor se o Esquadrão de Socorro nunca precisasse entrar em ação."
10058-160 = "Que dias tranquilos como estes continuem."
10058-170 = "O prédio do Esquadrão de Socorro não é ruim, mas este lugar também é muito agradável."
10058-180 = "Quem sabe, talvez mudar a filial para cá..."
10058-190 = "Ah, não, esqueça. Foi só um pensamento em voz alta."
10058-200 = "Sensei, feliz aniversário."
10058-210 = "Preparei um kit de primeiros socorros capaz de tratar vários tipos de ferimentos, o que acha...?"
10058-220 = "...Apenas o meu carinho já basta? Entendo..."
10058-230 = "...Você se lembrou. Muito obrigada..."
10058-240 = "Estou muito feliz."
10058-250 = "Então... hoje, posso pedir um pouco de mimo? Fufu."
10058-260 = "Feliz Ano Novo."
10058-270 = "Vamos lá, Sensei... Devemos ir?"
10058-280 = "Este ano também estenderemos nossas mãos para ajudar a todos."
10058-290 = "Dizem que o Natal é um dia para 'compartilhar' a 'gratidão'."
10058-300 = "Diga-me, Sensei... o que você gostaria de ganhar de presente de Natal?"
10058-310 = "Quando chega o Halloween, sempre me dizem: 'Que cosplay de cavaleiro incrível'."
10058-320 = "Para mim, são apenas roupas comuns... Todo ano, sinto um pouco de frustração."
10058-340 = "Sensei, você está bem? Não se feriu, não é?"
10058-350 = "O ar da noite é tão agradável..."
10058-360 = "O cheiro da grama, o som do rio... meu coração se acalma."
10058-370 = "...O que houve?"
10058-380 = "Estou brilhando... demais?"
10058-390 = "Fufu, talvez seja verdade."
10058-400 = "Se não estiver se sentindo confortável, pode se apoiar em mim ou descansar a cabeça no meu colo, se quiser."
10058-410 = "Não se preocupe. Aconteça o que acontecer, eu certamente protegerei você, Sensei."
10058-2600 = "Obrigada por sua preocupação. ...Dedicarei tudo o que sou para ser o seu apoio, Sensei."
