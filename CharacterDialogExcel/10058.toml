[translation]
10058-10 = "ブルーアーカイブ！"
10058-20 = "救護騎士団団長、蒼森ミネと申します。\n救護が必要な方はどちらでしょうか？"
10058-30 = "救護が必要な方は…\nいらっしゃい\nませんか？"
10058-40 = "ここは…気持ちが\n安らぎますね。"
10058-50 = "ここでお茶会を\n開くのは\nどうでしょう？"
10058-60 = "誰にでも休息は\n必要です。もちろん、\n救護騎士団にも。"
10058-70 = "健康と美容の\nために、食後に\n一杯の紅茶を。"
10058-80 = "ようこそお越しくださいました、\n先生。本日もキヴォトスの平和の\nため、共に励みましょう。"
10058-90 = "先生、今日は\n何かあったのですか？"
10058-100 = "いえ、待つのは\n慣れていますので、\nお気になさらず。"
10058-110 = "どうかなさいましたか？\n私の手が必要でしたら、\nいつでもお呼びください。"
10058-120 = "今日も忙しそうですね…\n何かお手伝いさせてください。"
10058-130 = "お疲れの時はいつでも\nおっしゃってください。"
10058-140 = "紅茶にお茶菓子、膝枕…\n私に出来ることでしたら、\n何なりと。"
10058-150 = "救護騎士団の出番など、\nないに越したことはありません。"
10058-160 = "そんな穏やかな日々が\n続きますように。"
10058-170 = "救護騎士団の建物も\n悪くありませんが、こちらも\nなかなか素敵ですね。"
10058-180 = "いっそのこと、\n支部を移転するというのも…"
10058-190 = "あ、いえ。独り言ですので\nお構いなく。"
10058-200 = "先生、お誕生日\nおめでとうございます。"
10058-210 = "様々な怪我に対応できる\n救急箱をご用意したのですが、\nいかがでしょう…？"
10058-220 = "…お気持ちだけで十分？\nそう、ですか…。"
10058-230 = "…覚えていて\nくださったのですね。\nありがとうございます…"
10058-240 = "とても、うれしいです。"
10058-250 = "では…今日は少しだけ\n甘えさせていただいても、\nよろしいでしょうか？ふふ。"
10058-260 = "新年明けまして\nおめでとうございます。"
10058-270 = "さあ、先生…\n参りましょうか。"
10058-280 = "今年も皆さんに救いの手を\n差し伸べるのです。"
10058-290 = "クリスマスというのは、\n「感謝」を「分け合う」ための\n日と聞きます。"
10058-300 = "その…先生、\nクリスマスプレゼントは\n何がよろしいですか？"
10058-310 = "ハロウィーンの日になると\n「素敵な騎士のコスプレですね」\nと言われるのです。"
10058-320 = "私にとっては\n普段着なのですが…\n毎年、無念でなりません。"
10058-340 = "先生、大丈夫ですか？\nお怪我などはありませんか？"
10058-350 = "夜の空気は気持ちが\n良いですね…。"
10058-360 = "草の香りに、\n川のせせらぎ…\n心が落ち着きます。"
10058-370 = "…どうされましたか？"
10058-380 = "眩しい…ですか…？"
10058-390 = "ふふ、確かに\nそうかもしれませんね。"
10058-400 = "落ち着かないようでしたら、\n私にもたれたり膝でお休み\nいただいても構いませんよ。"
10058-410 = "ご心配なさらないでください。\nたとえ何があっても、私が\n必ず先生をお守りしますので。"
10058-2600 = "お気遣いくださり\nありがとうございます。\n…私の全てを賭して、\n先生のお力となりましょう。"
