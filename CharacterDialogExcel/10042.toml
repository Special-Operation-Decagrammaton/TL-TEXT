10042-450 = "……Estou muito feliz.\nObrigada."
10042-2600 = "Desisti de pensar, desisti de decidir……\nEu apenas vivi seguindo um destino traçado.\nMas, de agora em diante……\nSim. Obrigada, Sensei."
