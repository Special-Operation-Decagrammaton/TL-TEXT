10042-280 = "……?\nTem algo no meu rosto?"
10042-290 = "Então isso é ser responsável……\nEu queria tentar fazer isso um pouco."
10042-300 = "Feliz aniversário\npara você……"
10042-310 = "Eu fiz exatamente como aprendi, mas\nessa sua expressão……\nSerá que eu fiz errado?"
