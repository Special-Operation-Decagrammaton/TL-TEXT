[translation]
10042-10 = "ブルーアーカイブ。"
10042-20 = "……私の名前は秤アツコ。\n先生は、私に何を望むの？\nそれが私にできることなら良いけど。"
10042-30 = "（ススッ、スッ……）"
10042-40 = "ふーん？"
10042-50 = "少し落ち着かないけど\n……うん、嫌じゃない。"
10042-60 = "これが、\n普通の会話……？"
10042-70 = "ここ……花を\n置いたら良さそう。"
10042-80 = "先生、お疲れ様。"
10042-90 = "おかえり、先生。"
10042-100 = "何か、\n頼みたいことが\nあったら言って。"
10042-110 = "ここにも、\n花を飾って良い？"
10042-120 = "望みがあったら、\n何でも言って。"
10042-130 = "これが当番……\nちょっとやってみたかった。"
10042-140 = "ハッピーバースデー\nトゥーユー……"
10042-150 = "習った通りにやったんだけど、\nその表情……\nもしかして間違ってた？"
10042-160 = "誕生日……？\n……うん。どんな意味かは\n知ってる。最近習ったから。"
10042-170 = "お祝いをしてもらったら、\nお礼を言うってことも。\nえっと、ありがとうございます。"
10042-180 = "新年……こうしてまた、\n一年間が過ぎていくんだね。"
10042-190 = "普段とは違う日々\nばっかりで……今度の\n新しい年は、どうなるのかな。"
10042-200 = "聖夜……\n習った。うん。"
10042-210 = "こういう日に相応しい花が\nあれば良かったんだけど……\n後で調べて来るね。"
10042-220 = "飴？私にくれるの？\nありがとう……\nところで、どうして？"
10042-230 = "先生、お疲れ様。"
10042-240 = "おかえり、先生。"
10042-250 = "何か、\n頼みたいことが\nあったら言って。"
10042-260 = "ここにも、\n花を飾って良い？"
10042-270 = "望みがあったら、\n何でも言って。"
10042-280 = "……？\n私の顔に、何かついてる？"
10042-290 = "これが当番……\nちょっとやってみたかった。"
10042-300 = "ハッピーバースデー\nトゥーユー……"
10042-310 = "習った通りにやったんだけど、\nその表情……\nもしかして間違ってた？"
10042-320 = "誕生日……？\n……うん。どんな意味かは\n知ってる。最近習ったから。"
10042-330 = "お祝いをしてもらったら、\nお礼を言うってことも。\nえっと、ありがとうございます。"
10042-340 = "新年……こうしてまた、\n一年間が過ぎていくんだね。"
10042-350 = "普段とは違う日々\nばっかりで……今度の\n新しい年は、どうなるのかな。"
10042-360 = "聖夜……\n習った。うん。"
10042-370 = "こういう日に相応しい花が\nあれば良かったんだけど……\n後で調べて来るね。"
10042-380 = "飴？私にくれるの？\nありがとう……\nところで、どうして？"
10042-400 = "この花、\nもしかして……。"
10042-410 = "……持ってきて、\nくれたんだ。"
10042-420 = "私のために……？"
10042-430 = "……そっか。"
10042-440 = "……大切にするね、\nずっと。"
10042-450 = "……すごく嬉しい。\nありがとう。"
10042-2600 = "考えることを諦めて、\n決めることを諦めて……\nただ、決まった運命をなぞって生きてきた。\nでも、これからは……\nうん。ありがとう、先生。"
