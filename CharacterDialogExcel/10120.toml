[translation]
10120-10 = "Blue... Archive!"
10120-20 = "Ei, ei, Sensei.\nBem-vindo ao meu palco.\n...Consegue acompanhar este ritmo?"
10120-30 = "Este é um lugar onde\num som belo\npode ser tocado."
10120-40 = "O momento de\nrevelar minha performance...\nfinalmente chegou!"
10120-50 = "Onde eu deveria\ncolocar a bateria..."
10120-60 = "Doces...\nOnde estão...!"
10120-70 = "Será que o Sensei\ntambém virá..."
10120-80 = "Bem-vindo ao meu palco!"
10120-90 = "Hehe, brincadeira.\nJá que estamos aqui,\nque tal fazermos uma sessão?"
10120-91 = "Você chegou, meu público!"
10120-92 = "Vamos lá,\nque tal o preço do ingresso de hoje ser...\nuh, uma torta de banana com chocolate?"
10120-100 = "Bem-vindo de volta, Sensei.\nQuer um doce?"
10120-110 = "Doces são maravilhosos, né?\nPosso continuar praticando enquanto como."
10120-120 = "Se eu praticar aqui,\nserá que contribuo para\nte manter acordado, Sensei...?"
10120-130 = "Por que será...\nque a melodia parece tão doce?"
10120-140 = "Eu queria fazer uma decoração\nmais rock 'n' roll,\npode me ajudar?"
10120-150 = "Feliz aniversário,\nSensei."
10120-160 = "Tem algum doce que você queira comer?"
10120-170 = "Hoje é o dia em que\neu estreei no mundo...!"
10120-180 = "Aliás, você está livre,\nné, Sensei?"
10120-190 = "Feliz Ano Novo, Sensei."
10120-200 = "Estava pensando em espantar\nos maus pensamentos com a bateria,\nque tal se juntar a mim?"
10120-210 = "Preciso deixar um doce\nem cima da chaminé..."
10120-220 = "Assim, o Papai Noel\ncom certeza vai encontrar!"
10120-230 = "Poder ganhar doces\nde graça..."
10120-240 = "É um dia realmente\nmaravilhoso, né, Sensei?"
10120-260 = "A-aqui...\nÉ aqui... Sensei..."
10120-270 = "Uuu...\nDentro do conjunto de bateria...\nTem um..."
10120-280 = "Preto e que se move rápido...\nAquele bicho."
10120-290 = "Não importa o quanto eu procure,\nnão consigo encontrar..."
10120-300 = "O-o que você está dizendo,\nSensei!?"
10120-310 = "Não existe nenhuma estudante\nem Kivotos que não tenha medo\ndisso, sabia!?"
10120-320 = "É muito mais assustador\ndo que balas de verdade, sabia!?"
10120-330 = "Uuu, se continuar assim..."
10120-340 = "O biscoito de macadâmia de edição limitada\nque eu consegui com tanto esforço,"
10120-350 = "vai virar comida dele..."
10120-360 = "Por isso, por favor, Sensei..."
10120-370 = "Me ajude..."
10120-2600 = "Oh... É como se eu tivesse\nconseguido baquetas que são\numa extensão dos meus dedos...\nEstou encantada\ncom o seu bom gosto, Sensei."
