[translation]
10120-10 = "ブルー……アーカイブ！"
10120-20 = "やあやあ、先生。\n私のステージへようこそ。\n……このリズムについて来れるかな？"
10120-30 = "美しい響きが\n奏でられそうな\n場所だ。"
10120-40 = "私の演奏を\n披露するときが……\nついに！"
10120-50 = "どこにドラムを\n置こう……。"
10120-60 = "甘いもの……\nどこだ……！"
10120-70 = "先生も\n来るのだろうか……。"
10120-80 = "我がステージへようこそ！"
10120-90 = "にひ、なーんてね。\nせっかくだし、\nセッションでもしてみる？"
10120-91 = "来たか、オーディエンスよ！"
10120-92 = "さあ、\n此度のチケット代を……えっと、\nチョコバナナタルトでどう？"
10120-100 = "おかえり、先生。\nキャンディー食べる？"
10120-110 = "キャンディは素敵だよねぇ。\nこのまま練習できるし。"
10120-120 = "ここで練習したら、\n先生の眠気覚ましに\n貢献できたり……する？"
10120-130 = "何故だろう……\n旋律が甘く感じられるのは。"
10120-140 = "もっとロックな飾り付けを\nしたいんだけど\n手伝ってくれる～？"
10120-150 = "ハッピーバースデー、\nだね。先生。"
10120-160 = "食べたいスイーツとかある？"
10120-170 = "今日は、この私が\n世にデビューした日……！"
10120-180 = "ところで、予定は\n空いてるのだよね、先生？"
10120-190 = "あけましておめでとう、先生。"
10120-200 = "ドラムで煩悩を\nかき消してみようかなって\n思うんだけど、一緒にどう？"
10120-210 = "煙突の上にキャンディーを\n置いておかないと……"
10120-220 = "そうすれば、サンタさんも\nきっと見つけてくれる！"
10120-230 = "タダでスイーツを\nもらえるだなんて。"
10120-240 = "ほっんとう、\n素敵な日だよね、先生。"
10120-260 = "こ、こっち……\nこっちだ……せんせ……。"
10120-270 = "うう……\nドラムセットの中に……\nいるんだ……"
10120-280 = "黒くてカサカサ動く……\nあいつが。"
10120-290 = "いくら探しても\n見つからなくてぇ……。"
10120-300 = "な、何を言ってるのだ、\n先生！？"
10120-310 = "キヴォトスで\nアレを怖がらない\n女子高生なんて\nいないんだよ！？"
10120-320 = "銃弾なんかより\nよっぽど怖いんだよぉ！？"
10120-330 = "うぅ、このままでは……"
10120-340 = "せっかく手に入れた\n限定マカダミアクッキーが、"
10120-350 = "餌食になってしまう……"
10120-360 = "だからお願い、先生……"
10120-370 = "助けてぇ……。"
10120-2600 = "おぉー……まるで指先と\n一心同体のスティックを手に\n入れたような気持ち……。\n先生のセンスに\n惚れ惚れしてしまうな。"
