[translation]
10048-10 = "ブルーアーカイブ"
10048-20 = "アリウススクワッドのサオリだ。\n…先生には色々と、世話になった。\nせめてその分の働きはしよう。よろしく頼む。"
10048-30 = "ふむ…"
10048-40 = "こういう場所は\n慣れないな…"
10048-50 = "これは、なんだ…？"
10048-60 = "理解ができない…"
10048-70 = "なるほど、これは\nそういう物なのか…"
10048-80 = "準備ならできている。\n何かあれば\n言うが良い、先生。"
10048-90 = "待っていたぞ、先生。"
10048-100 = "…なんだ、その反応は。"
10048-110 = "私は、役に立てているか？"
10048-120 = "…なら良い。それだけで、\n私はここにいられる。"
10048-130 = "全ては虚しいのに、\nどうして私たちは\n生きているのか…"
10048-140 = "私はまだ、\nその答えを知らない。"
10048-150 = "私は…これからも、\n足掻くしかない。"
10048-160 = "命令してくれ、先生\n私はそのために、\nここにいるのだから。"
10048-170 = "私はまだ、生きていても\nいいのだろうか…"
10048-180 = "…先生の誕生日、\nだと聞いた。"
10048-190 = "すまないが、\nこういう時に何を\nすべきかを私は知らない。"
10048-200 = "ただ…お前がいなければ、\n私も今ここにはいなかった。"
10048-210 = "だから、先生。\nあらためて感謝しよう。"
10048-220 = "…私はこれまで誕生日など、\nほとんど祝ったことがなかった"
10048-230 = "だから、その言葉の\n受け取り方も\nまだ分からない。"
10048-240 = "その資格があるのかも。"
10048-250 = "いつかこの日を、\n心から祝うことが\nできるだろうか…。"
10048-260 = "1年の終わりか…そうだな。\nこの世界の日々は、\n相変わらず冷たくて苦痛だが…"
10048-270 = "それでも、\n時は流れていくのか。"
10048-280 = "聖夜か…別に、\n何の感想も無い。"
10048-290 = "この世界の苦痛が、\nそれによって\n減るとは思えない。"
10048-300 = "…全ては、虚しいだけだ。"
10048-310 = "どうやらお祭りらしいが…\n特に興味は無いな。"
10048-320 = "ただ虚しいだけだ。"
10048-330 = "準備ならできている。\n何かあれば\n言うが良い、先生。"
