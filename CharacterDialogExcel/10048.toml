10048-600 = "ぐっ…はぁ…"
10048-610 = "…気にするな、\nよくあることだ。"
10048-620 = "ただ私の詰めが、\n甘かっただけで…"
10048-630 = "何も変わってないというのに…\n勘違いをしてしまった。"
10048-640 = "げほっ、げほっ…！"
10048-650 = "そんな顔をするな、\n痛みには慣れている。"
10048-660 = "今までと何も変わらない。\n今さらの話だ。"
10048-670 = "今はこれで良い…"
10048-680 = "もう少し、このままで…"
10048-2600 = "お前は…どうして私のことを信頼できる？\nあんなことがあったというのに…\n裏切られても、構わないというのか？\nまだ私には分からないことだらけだが、\nそれでも…私は、最善を尽くそう。"
