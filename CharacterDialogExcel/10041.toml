10041-530 = "……Sensei?\nVocê voltou."
10041-540 = "Esqueceu de algo\nimportante?"
10041-550 = "……Eu?"
10041-560 = "Está preocupado... comigo?"
10041-570 = "Se preocupar com algo\ntão trivial assim..."
10041-580 = "Você não tem nada melhor para fazer,\nmesmo sendo um adulto."
10041-590 = "Este mundo frio e barulhento,\ne eu também."
10041-600 = "……Não importa o quanto chova,\nnada será lavado ou\nlimpado de verdade."
10041-610 = "……Dizer que não é assim.\nSe eu pudesse acreditar nisso,\ncomo uma tola..."
10041-2600 = "Não vou perguntar o motivo, mas me entregar algo assim... No mundo que eu conhecia, não existiam pessoas como você. Que estranho.\n……Vou deixar este poder com você por enquanto, Sensei."
