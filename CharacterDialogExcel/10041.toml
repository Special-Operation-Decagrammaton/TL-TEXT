[translation]
10041-10 = "Blue Archive."
10041-20 = "……Sou a Misaki, do Esquadrão Arius.\nComo agora sou como um cão de caça sem dono……\nFico sob seu comando. Pode me dar ordens como quiser."
10041-30 = "Está um pouco barulhento, não acha?"
10041-40 = "……Tudo aqui\né novidade para mim."
10041-50 = "……Isso é divertido?"
10041-60 = "Não tenho interesse."
10041-70 = "……O que você está fazendo?"
10041-80 = "……Eu estava esperando aqui o tempo todo.\nEntão, Sensei. Qual é a ordem de hoje?"
10041-90 = "Você parece ocupado.\nBem, deve ser porque você é um adulto."
10041-100 = "……Aconteceu alguma coisa?\nSe precisar, eu ajudo."
10041-110 = "Se você me pedir, farei qualquer coisa.\nÉ só dizer."
10041-120 = "Se eu for necessária,\nnão me importo com o que seja."
10041-130 = "Não sou do tipo que\npuxa conversa."
10041-140 = "Se essa é a ordem,\nbem, eu obedeço."
10041-150 = "Você acha que eu sou o tipo de pessoa\nque consegue divertir\no Sensei?"
10041-160 = "Eu nunca entendi o sentido\nde celebrar o dia em que se nasce."
10041-170 = "Mas…… agora, sinto algo\n um pouco diferente."
10041-180 = "……Ainda bem que\nvocê está aqui."
10041-190 = "O sentido de celebrar o nascimento,\nainda não entendo muito bem."
10041-200 = "Se eu não tivesse nascido,\nnem precisaria pensar\nsobre a morte."
10041-210 = "Bem, isso é……\ncomo uma doença,\nsuponho."
10041-220 = "Desculpe, não era isso\nque eu queria dizer……"
10041-230 = "É que, obrigada."
10041-240 = "Conseguimos terminar o ano, né.\nNão sei como será\no próximo ano, mas……"
10041-250 = "……Desculpe.\nNão estou acostumada\ncom esse tipo de celebração."
10041-260 = "De qualquer forma, não quero estragar\no clima, então\nvou ficar quieta."
10041-270 = "Desculpe, mas\nnão tenho interesse\nem travessuras."
10041-280 = "……Hã?\nSe eu não fizer travessuras,\nvou ganhar um doce em troca?"
10041-290 = "……Isso é uma ordem?"
10041-300 = "……Eu estava esperando aqui o tempo todo.\nEntão, Sensei. Qual é a ordem de hoje?"
