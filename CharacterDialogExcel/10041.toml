[translation]
10041-10 = "ブルーアーカイブ。"
10041-20 = "……アリウススクワッドのミサキ。\n今は主のいない猟犬みたいなものだから……\nリードはあげる。好きに命令して。"
10041-30 = "少し騒がしいね。"
10041-40 = "……初めて\n見るものばっかり。"
10041-50 = "……それ、楽しいの？"
10041-60 = "別に興味ない。"
10041-70 = "……何をしてるの？"
10041-80 = "……ずっと待機してた。\nで、先生。今日の命令は何？"
10041-90 = "何だか忙しそうだね。\nまあ、大人だからか。"
10041-100 = "……何かあった？\n必要なら手伝うけど"
10041-110 = "言われれば何だってする。\n何でも言って。"
10041-120 = "必要とされるなら、\n何だって構わない。"
10041-130 = "雑談は、積極的にする\n方じゃない。"
10041-140 = "それが命令なら、\nまぁ、従うけど。"
10041-150 = "私が、先生を\n楽しませられる\nようなタイプだと思う？"
10041-160 = "私は、生まれた日を祝う\n意味を理解できなかった。"
10041-170 = "でも……今は少しだけ\n感じることがある。"
10041-180 = "……あなたが、\nここにいてくれてよかった。"
10041-190 = "生まれた日を祝う意味は、\n今でもあんまりよく分からない。"
10041-200 = "そもそも生まれなければ、\n死について考える事も\nなかったのに。"
10041-210 = "まあ、これは……\n病気みたいなもの\nなんだろうね。"
10041-220 = "ごめん、こういう事を\n言いたかったわけじゃ\nなくて……"
10041-230 = "その、ありがとう。"
10041-240 = "何とか一年を終えられたね。\n今年はまた、どうなるの\nかわからないけど……。"
10041-250 = "……ごめん。\nこういうお祝いには\n慣れてなくて。"
10041-260 = "とにかく、良い雰囲気に\n水を差したくないから、\n静かにしてるね。"
10041-270 = "悪いけど、\n悪戯とかには\n興味ないから。"
10041-280 = "……え？\nいたずらをしないなら、\n代わりに飴？"
10041-290 = "……それは、命令？"
10041-300 = "……ずっと待機してた。\nで、先生。今日の命令は何？"
10041-310 = "何だか忙しそうだね。\nまあ、大人だからか。"
10041-320 = "……何かあった？\n必要なら手伝うけど"
10041-330 = "言われれば何だってする。\n何でも言って。"
10041-340 = "必要とされるなら、\n何だって構わない。"
10041-350 = "雑談は、積極的にする\n方じゃない。"
10041-360 = "それが命令なら、\nまぁ、従うけど。"
10041-370 = "私が、先生を\n楽しませられる\nようなタイプだと思う？"
10041-380 = "私は、生まれた日を祝う\n意味を理解できなかった。"
10041-390 = "でも……今は少しだけ\n感じることがある。"
10041-400 = "……あなたが、\nここにいてくれてよかった。"
10041-410 = "生まれた日を祝う意味は、\n今でもあんまりよく分からない。"
10041-420 = "そもそも生まれなければ、\n死について考える事も\nなかったのに。"
10041-430 = "まあ、これは……\n病気みたいなもの\nなんだろうね。"
10041-440 = "ごめん、こういう事を\n言いたかったわけじゃ\nなくて……"
10041-450 = "その、ありがとう。"
10041-460 = "何とか一年を終えられたね。\n今年はまた、どうなるの\nかわからないけど……。"
10041-470 = "……ごめん。\nこういうお祝いには\n慣れてなくて。"
10041-480 = "とにかく、良い雰囲気に\n水を差したくないから、\n静かにしてるね。"
10041-490 = "悪いけど、\n悪戯とかには\n興味ないから。"
10041-500 = "……え？\nいたずらをしないなら、\n代わりに飴？"
10041-510 = "……それは、命令？"
10041-530 = "……先生？\n帰ってきたんだ。"
10041-540 = "何か、\n大事な忘れ物でも？"
10041-550 = "……私？"
10041-560 = "私を、心配して……？"
10041-570 = "そんな、\nくだらないことまで\n気にするなんて……。"
10041-580 = "暇なんだね、\n大人なのに。"
10041-590 = "この冷たくて騒がしい\n世の中も、私も。"
10041-600 = "……どれだけ雨が降った\nところで、洗い流されて\n綺麗にはならない。"
10041-610 = "……そんなことないん\nだって。馬鹿みたいに、\n信じられたら……"
10041-2600 = "もう理由なんて聞かないけど、\n私にわざわざこんなものを渡すなんて\n私の知ってた世界に、あなたみたいな\n人はいなかった。変な人。\n……この力は、今は先生に託すとするよ。"
