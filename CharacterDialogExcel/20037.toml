[translation]
20037-10 = "Blue~ Archive..."
20037-20 = "Ugeh, quer me fazer trabalhar em mais um serviço problemático...?\nBom, se é um pedido do Sensei, eu posso te acompanhar por enquanto..."
20037-30 = "Será que tem algum lugar\npor aqui onde eu possa\ncomer donuts escondida?"
20037-40 = "Não me diga que\ntem trabalho até aqui...?\nNão pode ser, sério~?"
20037-50 = "（Se eu dormir de óculos\nde sol... será que vai parecer\nque estou trabalhando...?）"
20037-60 = "Este maiô é\nbem simples e\nnão chama muito a atenção, né."
20037-70 = "Bom, hoje eu\nnão vou entrar na piscina\nmesmo... então tudo bem."
20037-80 = "Ah, Sensei~, você não\nvai para a piscina hoje?"
20037-90 = "Bom trabalho, Sensei. Foi mal,\nmas pode pegar aquele controle remoto pra mim?"
20037-100 = "Hm? Missão? É melhor que uma\nsalva-vidas não tenha trabalho, né?"
20037-110 = "É muito estranho, né.\nEu não odeio nadar,\nmas quando vira trabalho\nme dá uma preguiça na hora..."
20037-120 = "Se comer donuts virasse\nmeu trabalho, será que\neu ficaria com preguiça também?\n...Bom, não pretendo testar para descobrir."
20037-130 = "Já que estou aqui,\na Schale está segura hoje."
20037-140 = "Fufu, não precisa agradecer.\nMe dar uma caixa de donuts já é o suficiente."
20037-150 = "Ouvi dizer que um donut e\numa caneca são na verdade a mesma coisa, mas...\nNão faço a menor ideia do que isso significa..."
20037-160 = "Hm? Trabalho de papelada?\nUma coisa é normalmente, mas\nagora eu sou uma salva-vidas, sabe."
20037-170 = "Se acontecer algo perigoso\ndurante o trabalho, eu te salvo."
20037-180 = "Feliz aniversário, Sensei.\nQuer que eu te dê\nuns ingressos pro parque aquático\nde presente?"
20037-190 = "Presente de aniversário...\nEu queria ganhar férias..."
20037-200 = "Eh? Eu posso descansar na Schale?"
20037-210 = "Como esperado do Sensei! Eu confiava em você!"
20037-220 = "Feliz Ano Novo, Sensei.\nEspero que a quantidade de trabalho diminua neste ano."
20037-230 = "Não me diga que tem gente\nque vem brincar na água numa época dessas."
20037-240 = "Vamos comer um\nbolo de Natal, Sensei."
20037-250 = "Halloween, né. É um dia em que\nas travessuras aumentam, mas..."
20037-260 = "Mesmo que eu saia com essa roupa,\nnão vai adiantar de nada, né?"
20037-270 = "Por isso, vou ficar quietinha aqui~"
20037-290 = "U-Ué...?"
20037-300 = "Nnnnggh!"
20037-310 = "......Kuuuh."
20037-320 = "N-Não quer sair...\nNão me diga que vou ficar\nassim pro resto da vida...?"
20037-330 = "Ei, Sensei. Me dá uma ajudinha!"
20037-340 = "De agora em diante eu vou diminuir\nas vezes em que mato trabalho,\ne vou trabalhar direito, então..."
20037-350 = "Eu até te dou meus\ndonuts secretos!"
20037-360 = "Hyaa!? T-Tocar por trás é um pouco...!?"
20037-2600 = "Hmm. Não achava que você iria tão longe por mim.\nSe acontecer alguma coisa com o senhor, Sensei,\neu vou te salvar com todas as minhas forças.\n...Mas posso descansar até esse momento chegar?"