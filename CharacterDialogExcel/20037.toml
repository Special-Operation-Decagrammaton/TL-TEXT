[translation]
20037-10 = "ぶる～あ～かいぶ……"
20037-20 = "うげっ、ま～た面倒な仕事させる気……？\nまぁ、先生の頼みなら一応付き合うけどさぁ……"
20037-30 = "ドーナッツを隠れて\n食べられそうな\n場所はないかなぁ？"
20037-40 = "まさか、\nここでも仕事…？\nまさかまさか～？"
20037-50 = "（サングラスを\nかけたまま寝たら…仕事中に\n見えるかな…？）"
20037-60 = "この水着、\nわりと地味で\n目立たないんだよね。"
20037-70 = "まぁ、今日は\nプールに入ること\nないし…いっか"
20037-80 = "あ、先生～、今日は\nプールに行かないの？"
20037-90 = "お疲れ、先生。悪いんだけど、\nあそこのリモコンとってくれる？"
20037-100 = "ん？任務？ライフセーバーの\n仕事って無いほうがいいでしょ？"
20037-110 = "ほんと不思議だよね。\n水泳は嫌いじゃないんだけど、\n仕事ってなると急に\nめんどくさくなるんだから…"
20037-120 = "ドーナッツを食べるのも\n仕事になっちゃったら、\n面倒だと思うのかな？\n…まぁ、試すつもりはないけど。"
20037-130 = "私がいるから、\n今日のシャーレは安全だね。"
20037-140 = "ふふ、お礼なんていいよ。\nドーナッツ1箱くれたら十分。"
20037-150 = "ドーナッツとマグカップは、\n実は同じだって聞いたけど…\nどういう意味か、さっぱり…"
20037-160 = "うん？書類仕事？\n普段ならともかく、\n今はライフセーバーだからねぇ。"
20037-170 = "仕事中、危険なことがあったら\n助けてあげる。"
20037-180 = "誕生日おめでとう、先生。\nプレゼントとして、\nウォーターパークの\n利用券でもあげよっか？"
20037-190 = "誕生日プレゼント…\n休暇がほしいなぁ…"
20037-200 = "え？シャーレで休んでいい？"
20037-210 = "さすが先生！信じてたよ！"
20037-220 = "明けましておめでとう、先生。\n今年は仕事が減るといいね。"
20037-230 = "まさか、こんな季節に水遊びする\n人なんて居ないよね。"
20037-240 = "クリスマスケーキでも\n食べよう、先生。"
20037-250 = "ハロウィンか。いたずらが\n多くなる日だけど……"
20037-260 = "こんな格好で出かけても、\n何の役にも立たないよ？"
20037-270 = "だから、ここでジッとしてるね～"
20037-290 = "あ、あれれ……？"
20037-300 = "んぐぐぐっ！"
20037-310 = "……くうぅ。"
20037-320 = "ぬ、抜けない……\nまさか一生この\nままじゃないよね……？"
20037-330 = "ねえ、先生。ちょっと助けて！"
20037-340 = "これからはサボる\n回数も減らすし、\n仕事も真面目にするから……"
20037-350 = "あと、秘蔵のドーナッツも\nあげるから！"
20037-360 = "ひゃっ！？う、後ろから\n触るのはちょっと！？"
20037-2600 = "うーん。まさか、ここまでしてくれるとは。\n先生に何かあったら、\n全力で助けてあげるね。\n……その時が来るまでは休んでもいい？"
