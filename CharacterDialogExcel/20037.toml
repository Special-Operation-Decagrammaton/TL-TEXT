[translation]
20037-10 = "Blue Archive..."
20037-20 = "Ugh, você vai me dar mais trabalho chato...? Bem, se é um pedido do Sensei, eu até ajudo..."
20037-30 = "Será que tem algum lugar onde eu possa comer donuts escondida?"
20037-40 = "Não me diga que... tem trabalho aqui também? Sério mesmo?"
20037-50 = "(Se eu dormir de óculos escuros... será que vai parecer que estou trabalhando?)"
20037-60 = "Esse traje de banho é bem discreto, não chama muita atenção."
20037-70 = "Bem, hoje eu não vou entrar na piscina mesmo... então tudo bem."
20037-80 = "Ah, Sensei, você não vai para a piscina hoje?"
20037-90 = "Bom trabalho, Sensei. Desculpe o incômodo, mas pode pegar aquele controle remoto para mim?"
20037-100 = "Hm? Missão? É melhor não ter trabalho de salva-vidas, né?"
20037-110 = "É muito estranho. Eu não odeio nadar, mas quando vira trabalho, de repente fica tão chato..."
20037-120 = "Será que se comer donuts virasse um trabalho, eu acharia chato também? ...Bem, não pretendo descobrir."
20037-130 = "Como eu estou aqui, o Schale está seguro hoje."
20037-140 = "Hehe, não precisa agradecer. Uma caixa de donuts já é o suficiente."
20037-150 = "Ouvi dizer que donuts e canecas são, na verdade, a mesma coisa... mas não entendi nada do que isso significa..."
20037-160 = "Hm? Trabalho de papelada? Normalmente eu até faria, mas agora sou uma salva-vidas."
20037-170 = "Se acontecer algo perigoso durante o trabalho, eu vou te salvar."
20037-180 = "Feliz aniversário, Sensei. Quer que eu te dê um ingresso para o parque aquático de presente?"
20037-190 = "Presente de aniversário... eu queria umas férias..."
20037-200 = "Hã? Posso descansar no Schale?"
20037-210 = "Como esperado do Sensei! Eu sabia que podia confiar em você!"
20037-220 = "Feliz Ano Novo, Sensei. Espero que este ano tenha menos trabalho."
20037-230 = "Não deve ter ninguém querendo brincar na água nessa época do ano, né?"
20037-240 = "Vamos comer um bolo de Natal, Sensei."
20037-250 = "Halloween, hein? É um dia com muitas travessuras, mas..."
20037-260 = "Sair vestida assim não vai ajudar em nada, sabe?"
20037-270 = "Por isso, vou ficar quietinha aqui mesmo~"
20037-290 = "Ah, ué...?"
20037-300 = "Nghhh!"
20037-310 = "...Zzz."
20037-320 = "N-não sai... Não me diga que vou ficar assim para sempre...?"
20037-330 = "Ei, Sensei. Me ajuda aqui, rapidinho!"
20037-340 = "De agora em diante, vou faltar menos e levar o trabalho a sério, então..."
20037-350 = "E também, vou te dar meus donuts secretos!"
20037-360 = "Hya!? E-ei, não me toque por trás!"
20037-2600 = "Hmm. Eu não esperava que você fosse fazer tudo isso. Se algo acontecer com você, Sensei, eu vou te salvar com todas as minhas forças. ...Até lá, posso descansar um pouco?"
