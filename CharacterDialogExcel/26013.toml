[translation]
26013-10 = "ブルー、アーカイブ。"
26013-20 = "アリウススクワッド、秤アツコ。\n……ふふ、畏まりすぎたかな？"
26013-30 = "いい写真、\n撮れるかな？"
26013-40 = "（サッちゃん、\n元気にしてるといいな）"
26013-50 = "どこかで、\nお花の香りがする。"
26013-60 = "ここ、\nゆっくりできそう。"
26013-70 = "これは……？\n初めてみた。"
26013-80 = "こんにちは、先生。\n私にできること、ある？"
26013-90 = "おかえり、先生。\n今日もよろしくね。"
26013-100 = "ミサキと「ツーショット」を\n撮ったよ。……二人とも変な顔、\nふふ。もう一回、撮りたいかも。"
26013-110 = "その……変に聞こえるかも\nしれないけど……\n先生の写真、撮ってもいい？"
26013-120 = "こんな日でも、\n先生はお仕事なんだ。"
26013-130 = "サッちゃんも今頃……\nううん、なんでもない。"
26013-140 = "先生、私の水着、大丈夫そう？\n変じゃないかな。"
26013-150 = "お祭りの景品コーナーで焼き\nそばの交換券をもらったんだ。\nヒヨリ、気に入ってくれるかな。"
26013-160 = "お誕生日おめでとう、先生。\n今日はプレゼントを渡す日、\nだよね。覚えてるよ。"
26013-170 = "プレゼントに……私はどうかな？\n今日一日は、先生の言う事、\nなんでも聞くよ。"
26013-180 = "ありがとう、先生。\nプレゼントは大丈夫……"
26013-190 = "それより、\n一緒に散歩してほしい。"
26013-200 = "明けましておめでとう、先生。"
26013-210 = "新しい年……\n今年はなにが起こるのか、\n楽しみだね。"
26013-220 = "メリークリスマス、先生。\n特別な日は、写真にしなきゃ。"
26013-230 = "はい、こっち見て。"
26013-240 = "いたずら……お菓子……？\nごめん、ハロウィーンの\nことはまだ、よく知らなくて。"
26013-250 = "だから先生に、\n教えてもらいたい。"
26013-270 = "写真、いっぱい\n撮ってきたけど……\nこうして撮られるのは初めて。"
26013-280 = "こういうとき、どうしたらいいか\n分からない……"
26013-290 = "こう、笑えばいいのかな？"
26013-300 = "もっとお花のほうに寄る……？\nわかった。"
26013-310 = "ハマナス……\nいいにおい。"
26013-320 = "偶然見つけた場所だけど……\n先生のおかげで、ここに来れた。"
26013-330 = "ありがとう先生。\n素敵な思い出になったよ。"
26013-2600 = "あ、これ……ありがとう、先生。\nすごく、気に入ったよ。\nこれは先生のために、使うから。"
