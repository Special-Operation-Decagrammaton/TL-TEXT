[translation]
26013-10 = "Blue Archive."
26013-20 = "Esquadrão Arius, Atsuko Joumae.\n……Hehe, será que fui formal demais?"
26013-30 = "Será que consigo\ntirar uma boa foto?"
26013-40 = "(Espero que a Sa-chan\nesteja bem.)"
26013-50 = "Sinto cheiro de flores\nem algum lugar."
26013-60 = "Parece que dá para\nrelaxar aqui."
26013-70 = "O que é isso……?\nÉ a primeira vez que vejo."
26013-80 = "Olá, Sensei.\nTem algo que eu possa fazer?"
26013-90 = "Bem-vindo de volta, Sensei.\nConto com você hoje também."
26013-100 = "Tirei uma foto com a Misaki.\n……Nós duas fizemos caretas,\nhehe. Acho que quero tirar outra."
26013-110 = "Isso…… pode soar estranho,\nmas……\nposso tirar uma foto sua, Sensei?"
26013-120 = "Mesmo em um dia como este,\no Sensei está trabalhando."
26013-130 = "A Sa-chan deve estar……\nNão, não é nada."
26013-140 = "Sensei, meu traje de banho está bom?\nNão está estranho?"
26013-150 = "Ganhei um vale-yakisoba na barraca\nde prêmios do festival.\nSerá que a Hiyori vai gostar?"
26013-160 = "Feliz aniversário, Sensei.\nHoje é o dia de entregar presentes,\nné? Eu me lembro."
26013-170 = "Que tal eu mesma como presente?\nHoje, o dia todo, farei\ntudo o que você pedir."
26013-180 = "Obrigada, Sensei.\nNão precisa de presente……"
26013-190 = "Em vez disso,\nquero que caminhe comigo."
26013-200 = "Feliz Ano Novo, Sensei."
26013-210 = "Um novo ano……\nEstou ansiosa para ver o que\nacontecerá este ano."
26013-220 = "Feliz Natal, Sensei.\nDias especiais precisam ser registrados."
26013-230 = "Isso, olhe para cá."
26013-240 = "Travessuras…… doces……?\nDesculpe, ainda não sei muito\nsobre o Halloween."
26013-250 = "Por isso, quero que\nvocê me ensine, Sensei."
26013-270 = "Eu tirei muitas fotos, mas……\né a primeira vez que sou fotografada."
26013-280 = "Não sei como devo agir\nem momentos assim……"
26013-290 = "Devo sorrir assim?"
26013-300 = "Chegar mais perto das flores……?\nEntendido."
26013-310 = "Rosa-rugosa……\nQue cheiro bom."
26013-320 = "Foi um lugar que encontrei por acaso, mas……\ngraças a você, Sensei, pude vir aqui."
26013-330 = "Obrigada, Sensei.\nFoi uma lembrança maravilhosa."
26013-2600 = "Ah, isso…… obrigada, Sensei.\nGostei muito.\nVou usar isso por sua causa."
