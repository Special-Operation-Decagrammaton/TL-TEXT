[translation]
26008-10 = "ブル~アーカイブ！"
26008-20 = "夏と言えば、海の家！舞台が海でも、\nお祭り運営委員会は止まりませんよ！\n河和シズコ、行っきま～す！"
26008-30 = "夏の新しい\n主力商品…うーん、\n何かヒントは…"
26008-40 = "フランチャイズ経営が、こんなに\n大変だったなんて…\n会議、会議、会議！\nそしてまた会議が…"
26008-50 = "何か、次のお祭りに\n活かせそうなものは…"
26008-60 = "いつか百夜堂を、\nキヴォトスいちの\n喫茶店に…！"
26008-70 = "あ、良いこと\n思いついた！\nイエスっ！"
26008-80 = "あ、先生！\nおかえりなさいませ～！\n今日は暑いですね～、"
26008-90 = "はいお飲み物どうぞ！"
26008-100 = "…うん、良い流れ"
26008-110 = "あっっつい…"
26008-120 = "って先生！？\nいつの間に…！えっと、\nおかえりなさいませ～！"
26008-130 = "海の家にいる時は、\nそちらにも\n会いに来てくださいね？"
26008-140 = "百夜堂はいつも\nあなたのおそばに！"
26008-150 = "このフレーズ、\n良くないですか？\nどうですか？"
26008-160 = "えっ…水着が、可愛い…？\n似合ってる…？"
26008-170 = "ま、またまたぁ…\n百夜堂のオーナーに\nそういう営業トークは…"
26008-180 = "えっ、そうじゃない？\n本気？"
26008-190 = "も、もう、こういう時だけ\n真面目な顔しないでください！"
26008-200 = "複数店舗の管理は\n大変じゃないかって？"
26008-210 = "うーん、\nまあそうですね。"
26008-220 = "…大変って言ったら、\n手伝ってくれますか？"
26008-230 = "先生と一緒にいると、\n毎日夏祭りみたいな気分です。"
26008-240 = "…ふふっ。\n意味が分からないなら、\nまだ知らなくていいですよ。"
26008-250 = "お誕生日\nおめでとうございます、先生！"
26008-260 = "今ちょうど海の家の方の\n百夜堂で、誕生日\n限定メニューを出してるんです。\nいかがでしょう？"
26008-270 = "…ちなみに、\n先生専用ですよ？"
26008-280 = "私の、誕生日…？\nぐっ、油断してたところに\nストレートな攻撃…"
26008-290 = "え、あ、\nいや気にしないでください。\n嫌とかそういうのじゃないので！"
26008-300 = "…えへっ、えへへっ"
26008-310 = "あけまして\nおめでとうございます！\nもう新年ですか、ついこの\n間まで夏だった感じなのに…"
26008-320 = "よし、とにかく新年も、\n元気よく行きましょう！"
26008-330 = "夏も百夜堂！\nクリスマスも百夜堂！\nお祭りは年がら年中\n続いてるんです！"
26008-340 = "というわけで、\nさあ行きましょう！先生！"
26008-350 = "お菓子を買ってくれないと、\nいたずらしちゃいますよ？"
26008-360 = "…じょ、冗談です！\n無理に買わなくても\n大丈夫です！"
26008-370 = "まあ、\n私としてはどっちでも\n得ですが…。"
26008-390 = "先生。私、\n自分のするべき\nことが分かりました。"
26008-400 = "考えてみれば\n当たり前のことなのに、\n今になって気づくとは…\nシズコ、一生の不覚！"
26008-410 = "知ってるかもしれませんが、\n私って欲張りなんですよ？"
26008-420 = "やりたいことも、\n欲しい物も\nたくさんありますが、\n一つも諦めません。"
26008-430 = "みんなを喜ばせることも、\n商売としての成功も！"
26008-440 = "百夜堂を、\nキヴォトスいちの\n喫茶店にすることも！"
26008-450 = "私、全部\n逃したくないんです！\n全部！"
26008-460 = "もちろん…\n先生のことも！"
26008-2600 = "いつもこうやって、\n私のことを気にかけてくれて…。\nありがとうございます、先生。\n先生がいれば、百夜堂はまだまだ\n進化して行けちゃいそうです！\n…うん、今のは良い感じ？"
