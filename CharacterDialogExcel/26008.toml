[translation]
26008-10 = "Blue Archive!"
26008-20 = "Falando em verão, falamos de quiosques de praia! Mesmo que o palco seja o mar, o Comitê de Operações do Festival não vai parar! Kawa Shizuko, lá vou eu!"
26008-30 = "O novo produto principal\ndo verão... hum,\nalguma dica..."
26008-40 = "Quem diria que gerenciar\numa franquia seria\ntão difícil...\nReuniões, reuniões, reuniões!\nE mais reuniões..."
26008-50 = "Alguma coisa que eu possa\naproveitar para o\npróximo festival..."
26008-60 = "Um dia, farei da Hyakkiyako\na melhor cafeteria\nde Kivotos...!"
26008-70 = "Ah, tive uma\nboa ideia!\nIsso!"
26008-80 = "Ah, Sensei!\nBem-vindo de volta!\nEstá calor hoje, não é?"
26008-90 = "Aqui, pegue uma bebida!"
26008-100 = "...Sim, um bom fluxo."
26008-110 = "Que caaaalor..."
26008-120 = "Sensei!?\nDesde quando você está aí...!\nBem, bem-vindo de volta!"
26008-130 = "Quando eu estiver no quiosque\nda praia, venha me ver\npor lá também, tá?"
26008-140 = "A Hyakkiyako está sempre\nao seu lado!"
26008-150 = "Essa frase,\nnão é boa?\nO que acha?"
26008-160 = "Eh... meu traje de banho,\né fofo...? Combina comigo...?"
26008-170 = "V-vamos lá...\nEsse tipo de conversa de vendas\npara a dona da Hyakkiyako..."
26008-180 = "Eh, não é isso?\nÉ sério?"
26008-190 = "A-ah, não faça essa cara\nde sério só nessas horas!"
26008-200 = "Se gerenciar várias lojas\né difícil?"
26008-210 = "Hum,\nbem, é sim."
26008-220 = "...Se eu disser que é difícil,\nvocê vai me ajudar?"
26008-230 = "Estar com o Sensei me faz sentir\ncomo se fosse um festival de verão\ntodos os dias."
26008-240 = "...Hehe.\nSe você não entende o que isso significa,\nainda não precisa saber."
26008-250 = "Feliz aniversário,\nSensei!"
26008-260 = "Estamos servindo um menu\nde aniversário exclusivo\nna Hyakkiyako da praia agora.\nO que acha?"
26008-270 = "...A propósito,\né exclusivo para o Sensei, viu?"
26008-280 = "Meu aniversário...? Ugh, um ataque\ndireto quando eu estava\ndesprevenida..."
26008-290 = "Ah, não, não ligue para isso.\nNão é que eu não goste nem nada disso!"
26008-300 = "...Ehe, ehehe."
26008-310 = "Feliz ano novo!\nJá é ano novo? Parece que\nfoi verão ainda ontem..."
26008-320 = "Certo, de qualquer forma, vamos\ncomeçar o ano novo com energia!"
26008-330 = "Verão é Hyakkiyako!\nNatal é Hyakkiyako!\nO festival continua\no ano inteiro!"
26008-340 = "Sendo assim,\nvamos nessa! Sensei!"
26008-350 = "Se não comprar doces,\nvou te pregar uma peça!"
26008-360 = "...B-brincadeira!\nNão precisa comprar\nà força!"
26008-370 = "Bem, para mim,\nambos são vantajosos..."
26008-390 = "Sensei. Eu descobri\no que preciso fazer."
26008-400 = "Pensando bem, é algo óbvio,\nmas perceber só agora...\nShizuko, que falha imperdoável!"
26008-410 = "Talvez você saiba, mas\neu sou gananciosa, sabia?"
26008-420 = "Tenho muitas coisas que quero fazer\ne muitas coisas que quero,\nmas não vou desistir de nada."
26008-430 = "Fazer todos felizes,\ne ter sucesso nos negócios também!"
26008-440 = "E fazer da Hyakkiyako\na melhor cafeteria\nde Kivotos!"
26008-450 = "Eu não quero deixar\nnada escapar!\nNada!"
26008-460 = "Claro que...\nvocê também, Sensei!"
26008-2600 = "Sempre cuidando de mim desse jeito...\nObrigada, Sensei. Com você por perto, sinto que a Hyakkiyako ainda vai evoluir muito!\n...Sim, essa ficou boa?"
