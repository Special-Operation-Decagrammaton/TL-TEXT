[translation]
26009-CVGroup_CommonSkill-1 = "P-por favor, aceite isto!"
26009-CVGroup_ExSkill_1-1 = "Me esconder... ainda é algo em que tenho confiança!"
26009-CVGroup_ExSkill_2-1 = "Para que não me encontrem...!"
26009-CVGroup_ExSkill_3-1 = "Ali...!"
26009-CVGroup_ExSkill_Level_1-1 = "Alvo confirmado!"
26009-CVGroup_ExSkill_Level_2-1 = "Por favor, acerte...!"
26009-CVGroup_ExSkill_Level_3-1 = "P-por favor, não se mova!"
26009-CVGroup_Formation_In_1-1 = "E-eu...? Sério...?"
26009-CVGroup_Formation_In_2-1 = "Se o Sensei estiver comigo... eu também...!"
26009-CVGroup_Formation_Select-1 = "Uuu... eu quero ir para casa..."
26009-CVGroup_Growup_1-1 = "S-Sensei!? Bem, é que... auuu..."
26009-CVGroup_Growup_2-1 = "Muito obrigada, como sempre. É muito bom... ter o Sensei por perto."
26009-CVGroup_Growup_3-1 = "Dando um passo de cada vez assim... eu também quero mudar a mim mesma."
26009-CVGroup_Growup_4-1 = "Como agora eu sou uma empregada... quero ser útil para o Sensei."
26009-CVGroup_Relationship_Up_1-1 = "Ei, Sensei... N-não! Esqueça, não é nada..."
26009-CVGroup_Relationship_Up_2-1 = "Eu consegui me esforçar porque o Sensei estava comigo. Palavras não são o suficiente para expressar, mas... bem... muito obrigada."
26009-CVGroup_Relationship_Up_3-1 = "Sensei... o que você acha de... empregadas? ...E o que acha deste traje?"
26009-CVGroup_Relationship_Up_4-1 = "Bem... quando eu conseguir ser um pouco mais positiva, tenho algo para lhe dizer, Sensei. Hã, agora!? I-isso é...!"
