[translation]
20009-CVGroup_CommonSkill-1 = "おいらの目から逃れられるとでも思ったか！"
20009-CVGroup_ExSkill_1-1 = "こうなったら殲滅だ！"
20009-CVGroup_ExSkill_2-1 = "粛清の時間だ！"
20009-CVGroup_ExSkill_3-1 = "行け、粛清君1号！"
20009-CVGroup_ExSkill_Level_1-1 = "不穏分子らを一掃してしまえー！"
20009-CVGroup_ExSkill_Level_2-1 = "偉大なる髭のもとに！"
20009-CVGroup_ExSkill_Level_3-1 = "この威力、とくと味わうが良い！"
20009-CVGroup_Formation_In_1-1 = "ふふ、おいらに任せたまえ！"
20009-CVGroup_Formation_In_2-1 = "おいらの出番か！"
20009-CVGroup_Formation_Select-1 = "うむ！このまま温泉へ突撃だ！"
20009-CVGroup_Growup_1-1 = "ふふっ、見たかカムラッド！\n目を見張るようなおいらの成長を……！"
20009-CVGroup_Growup_2-1 = "十分な休息もまた、成長のための近道である！"
20009-CVGroup_Growup_3-1 = "おいらに似合う、もっと立派な髭を用意しないとな。"
20009-CVGroup_Growup_4-1 = "おぉ……！\nおいらの成長速度は、自分でも怖いぐらいだ！"
20009-CVGroup_Relationship_Up_1-1 = "カムラッドと一緒なら、今年の冬休みもきっと最高だな！"
20009-CVGroup_Relationship_Up_2-1 = "……カムラッドは、おいらのことを裏切らないよな？"
20009-CVGroup_Relationship_Up_3-1 = "よし、カムラッドには特別な勲章を授与しよう！"
20009-CVGroup_Relationship_Up_4-1 = "えへへ……ありがとう、カムラッド。"
