[translation]
20009-CVGroup_CommonSkill-1 = "Achou mesmo que conseguiria escapar dos meus olhos?!"
20009-CVGroup_ExSkill_1-1 = "Já que chegamos a esse ponto, é hora de aniquilar!"
20009-CVGroup_ExSkill_2-1 = "É hora da purga!"
20009-CVGroup_ExSkill_3-1 = "Vá, Purificador nº 1!"
20009-CVGroup_ExSkill_Level_1-1 = "Eliminem todos os elementos subversivos!"
20009-CVGroup_ExSkill_Level_2-1 = "Pelo grande bigode!"
20009-CVGroup_ExSkill_Level_3-1 = "Sinta o verdadeiro poder disso!"
20009-CVGroup_Formation_In_1-1 = "Hehe, pode deixar comigo!"
20009-CVGroup_Formation_In_2-1 = "É a minha vez!"
20009-CVGroup_Formation_Select-1 = "Sim! Vamos avançar direto para a fonte termal!"
20009-CVGroup_Growup_1-1 = "Hehe, viu só, Camarada?\nO meu crescimento é de cair o queixo...!"
20009-CVGroup_Growup_2-1 = "Um descanso adequado também é um atalho para o crescimento!"
20009-CVGroup_Growup_3-1 = "Preciso arranjar um bigode mais imponente que combine comigo."
20009-CVGroup_Growup_4-1 = "Oh...! \nAté eu me assusto com a velocidade do meu crescimento!"
20009-CVGroup_Relationship_Up_1-1 = "Com você, Camarada, as férias de inverno deste ano certamente serão as melhores!"
20009-CVGroup_Relationship_Up_2-1 = "...Você não vai me trair, vai, Camarada?"
20009-CVGroup_Relationship_Up_3-1 = "Muito bem, vou conceder uma medalha especial a você, Camarada!"
20009-CVGroup_Relationship_Up_4-1 = "Hehehe... obrigado, Camarada."
