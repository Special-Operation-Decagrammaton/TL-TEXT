[translation]
13007-CVGroup_Battle_Buffed_1-1 = "うん、良しっ！"
13007-CVGroup_Battle_Covered_1-1 = "隠れるね！"
13007-CVGroup_Battle_Defense_1-1 = "この程度？"
13007-CVGroup_Battle_In_1-1 = "さあ、行くよ！"
13007-CVGroup_Battle_In_2-1 = "早く終わらせてご飯食べに行こう！"
13007-CVGroup_Battle_Move_1-1 = "はぁ、お腹空いてきた……。"
13007-CVGroup_Battle_Move_2-1 = "おやつでも持ってくれば良かった……。"
13007-CVGroup_Battle_Recovery_1-1 = "サンキュー！この恩は返すよ！"
13007-CVGroup_Battle_TacticalAction_1-1 = "移動しよう！"
13007-CVGroup_Battle_Victory_1-1 = "へへ。それじゃあ食べてみ……\nはあ？！な、なんでええ！"
13007-CVGroup_Battle_Victory_2-1 = "じゃーん、私の最後の……\nう、うえええ！？"
13007-CVGroup_CommonSkill-1 = "許さない！"
13007-CVGroup_ExSkill_1-1 = "ふふーん……\nえええっ！うわあああん！"
13007-CVGroup_ExSkill_2-1 = "お団子～お団子～\nうええ！？"
13007-CVGroup_ExSkill_3-1 = "へへっ……うわっ？\nああもうっ！"
13007-CVGroup_ExSkill_Level_1-1 = "まだ味見もしてないのに！！"
13007-CVGroup_ExSkill_Level_2-1 = "このやろー！"
13007-CVGroup_ExSkill_Level_3-1 = "ぶっ壊してやるー！！"
13007-CVGroup_Formation_In_1-1 = "やってやろうじゃないの！"
13007-CVGroup_Formation_In_2-1 = "任せといて～"
13007-CVGroup_Formation_Select-1 = "は、離して！"
13007-CVGroup_Growup_1-1 = "ち、小さくないから！\nまだ成長期で、これから大きくなるの！"
13007-CVGroup_Growup_2-1 = "よく分からないけど……\nちょっと、強くなった気がする！"
13007-CVGroup_Growup_3-1 = "いっぱい食べて、いっぱい強くなって……\nそれで、いっぱい色んな所に行こうね！先生！"
13007-CVGroup_Growup_4-1 = "まだまだ大丈夫、いくらでも食べられそう！"
13007-CVGroup_Relationship_Up_1-1 = "食べ物を奢ってくれるからって、別に好きになるとかじゃ……\nほ、本当だって！"
13007-CVGroup_Relationship_Up_2-1 = "また美味しい物を奢ってくれるなんて……\n先生はいい人だね……。"
13007-CVGroup_Relationship_Up_3-1 = "可愛いって言われるのも嫌いじゃないけど……\nな、なんでもない！"
13007-CVGroup_Relationship_Up_4-1 = "えっと……必要な時は……私を呼んでね。\nせ、先生のことなら、いつでも手伝うから！"
13007-CVGroup_Tactic_In_1-1 = "私が先頭に立つ！"
13007-CVGroup_Tactic_In_2-1 = "勝てば美味しいものが食べられる！"
13007-CVGroup_Tactic_Victory_1-1 = "どう！完璧な勝利でしょう？"
13007-CVGroup_Tactic_Victory_2-1 = "先生！本当にご飯奢ってくれるんだよね？"
