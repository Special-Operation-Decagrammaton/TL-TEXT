[translation]
13007-CVGroup_Battle_Buffed_1-1 = "Sim, ótimo!"
13007-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
13007-CVGroup_Battle_Defense_1-1 = "Só isso?"
13007-CVGroup_Battle_In_1-1 = "Vamos lá!"
13007-CVGroup_Battle_In_2-1 = "Vamos acabar logo com isso para ir comer!"
13007-CVGroup_Battle_Move_1-1 = "Ah, estou começando a ficar com fome..."
13007-CVGroup_Battle_Move_2-1 = "Devia ter trazido algum lanche..."
13007-CVGroup_Battle_Recovery_1-1 = "Valeu! Vou retribuir esse favor!"
13007-CVGroup_Battle_TacticalAction_1-1 = "Vamos nos mover!"
13007-CVGroup_Battle_Victory_1-1 = "Hehe. Então, vamos provar... \nHã?! P-por queee?!"
13007-CVGroup_Battle_Victory_2-1 = "Tcharam, meu último... \nU-ueeeeh!?"
13007-CVGroup_CommonSkill-1 = "Não vou te perdoar!"
13007-CVGroup_ExSkill_1-1 = "Fufun... \nEeeeh! Uwaaaan!"
13007-CVGroup_ExSkill_2-1 = "Dango~ Dango~ \nUee!?"
13007-CVGroup_ExSkill_3-1 = "Hehe... Ué? \nAh, qual é!"
13007-CVGroup_ExSkill_Level_1-1 = "Eu nem tinha provado ainda!!"
13007-CVGroup_ExSkill_Level_2-1 = "Seu idiota!"
13007-CVGroup_ExSkill_Level_3-1 = "Vou destruir tudo!!"
13007-CVGroup_Formation_In_1-1 = "Vamos mostrar do que somos capazes!"
13007-CVGroup_Formation_In_2-1 = "Pode deixar comigo~"
13007-CVGroup_Formation_Select-1 = "S-solta!"
13007-CVGroup_Growup_1-1 = "E-eu não sou pequena! \nAinda estou na fase de crescimento, vou ficar maior!"
13007-CVGroup_Growup_2-1 = "Não entendo muito bem, mas... \nSinto que fiquei um pouco mais forte!"
13007-CVGroup_Growup_3-1 = "Comer bastante, ficar forte... \nE então, vamos a muitos lugares juntos! Sensei!"
13007-CVGroup_Growup_4-1 = "Ainda estou bem, acho que consigo comer muito mais!"
13007-CVGroup_Relationship_Up_1-1 = "Só porque você me paga comida, não significa que eu... \nÉ-é verdade!"
13007-CVGroup_Relationship_Up_2-1 = "Você me pagar algo gostoso de novo... \nSensei, você é uma boa pessoa..."
13007-CVGroup_Relationship_Up_3-1 = "Não é que eu não goste de ser chamada de fofa, mas... \nN-não é nada!"
13007-CVGroup_Relationship_Up_4-1 = "Bem... quando precisar... me chame. \nS-se for pelo Sensei, eu ajudo a qualquer hora!"
13007-CVGroup_Tactic_In_1-1 = "Eu vou na frente!"
13007-CVGroup_Tactic_In_2-1 = "Se ganharmos, vamos comer algo gostoso!"
13007-CVGroup_Tactic_Victory_1-1 = "E então? Uma vitória perfeita, não é?"
13007-CVGroup_Tactic_Victory_2-1 = "Sensei! Você vai mesmo me pagar uma refeição, né?"
