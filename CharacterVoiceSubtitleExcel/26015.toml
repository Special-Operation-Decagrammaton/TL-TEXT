[translation]
26015-CVGroup_CommonSkill-1 = "Apoio de fogo, lá vou eu~"
26015-CVGroup_ExSkill_1-1 = "Calma, calma, se acalmem um pouco... ahaha..."
26015-CVGroup_ExSkill_2-1 = "Eu avisei para não se machucarem... não avisei?"
26015-CVGroup_ExSkill_3-1 = "É só eu tirar os olhos por um segundo... haa..."
26015-CVGroup_ExSkill_Level_1-1 = "Haha! Ahahahaha! ...haa."
26015-CVGroup_ExSkill_Level_2-1 = "Ah, que se dane tudo!! Ahahahaha... haha..."
26015-CVGroup_ExSkill_Level_3-1 = "Ahaha!! Pode vir então!! ...ah, puxa vida."
26015-CVGroup_Formation_In_1-1 = "Estou pronta a qualquer momento~"
26015-CVGroup_Formation_In_2-1 = "Puxa, não tem nem tempo para descansar, né~"
26015-CVGroup_Formation_Select-1 = "Sério, até aqui também... ah, esquece o que eu disse."
26015-CVGroup_Growup_1-1 = "Então é assim, e fica desse jeito... entendi!\nO Sensei realmente sabe ensinar muito bem!"
26015-CVGroup_Growup_2-1 = "Ué, vai me dar de novo?\nEntão eu vou ter que me esforçar ainda mais!"
26015-CVGroup_Growup_3-1 = "Eu fico feliz que você cuide tanto de mim, mas...\nSerá que... você me acha uma \"criança problemática\"...?"
26015-CVGroup_Growup_4-1 = "Não precisa se preocupar só comigo, Sensei.\nEu não vou ficar emburrada se você der atenção para as outras."
26015-CVGroup_Relationship_Up_1-1 = "Eu já disse que já chega... fufu... mas aceito com gratidão."
26015-CVGroup_Relationship_Up_2-1 = "Qualquer dia desses, vou ter que retribuir isso direito.\nNão vou deixar você dizer que não precisa."
26015-CVGroup_Relationship_Up_3-1 = "Bem... eu fico feliz que você seja tão legal comigo, mas~\nEu não sou uma pessoa muito interessante, sabe?"
26015-CVGroup_Relationship_Up_4-1 = "Haa... Sensei, eu não sei se você é atencioso ou não...\nNão, esquece o que eu disse."
