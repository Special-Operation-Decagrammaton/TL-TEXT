[translation]
26015-CVGroup_CommonSkill-1 = "支援射撃、行くっすよ～"
26015-CVGroup_ExSkill_1-1 = "まあまあ、ちょっと落ち着いて……あはは……。"
26015-CVGroup_ExSkill_2-1 = "怪我しないうちに……って、言ったっすからね？"
26015-CVGroup_ExSkill_3-1 = "ちょっと目を離したらすぐっ……はぁ……。"
26015-CVGroup_ExSkill_Level_1-1 = "ははっ！あははははっ！……はぁ。"
26015-CVGroup_ExSkill_Level_2-1 = "もうどうにでもなれっす！！あはははは……はは……。"
26015-CVGroup_ExSkill_Level_3-1 = "あはは！！上等っすよ！！……あーあ。"
26015-CVGroup_Formation_In_1-1 = "いつでもいけるっすよ～"
26015-CVGroup_Formation_In_2-1 = "いやぁ、休む暇もないっすね～"
26015-CVGroup_Formation_Select-1 = "やっぱ、ここでもか……あ、こっちの話っす。"
26015-CVGroup_Growup_1-1 = "これがこうだから、こうなって……なるほど！\nやっぱり先生は教えるの上手っすね！"
26015-CVGroup_Growup_2-1 = "あれっ、またくれるんすか？\nじゃあ、もっと頑張らないとっすね！"
26015-CVGroup_Growup_3-1 = "たくさん面倒見てもらうのは嬉しいっすけど……\nもしかして……「手がかかる子」だと思われてたりするっす……？"
26015-CVGroup_Growup_4-1 = "私ばっかり構わなくて大丈夫っすよ、先生。\n別に他の子見てても拗ねないっすから。"
26015-CVGroup_Relationship_Up_1-1 = "もう十分って言ってるのに……ふふっ……ありがたくいただくっす。"
26015-CVGroup_Relationship_Up_2-1 = "そのうち、ちゃんとお返ししないとっすね。\n必要ない、なんて言わせないっすから。"
26015-CVGroup_Relationship_Up_3-1 = "えっと……よくしてもらえるのは嬉しいんすけど～\n私、あんまり面白い人間じゃないっすよ？"
26015-CVGroup_Relationship_Up_4-1 = "はぁ……先生って気が利くんだかそうじゃないんだか……。\nいや、こっちの話っすよ。"
