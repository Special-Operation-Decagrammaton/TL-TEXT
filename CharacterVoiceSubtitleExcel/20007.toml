20007-CVGroup_ExSkill_2-1 = "ここからは私のステージだよ！"
20007-CVGroup_ExSkill_3-1 = "オンステージ！"
20007-CVGroup_ExSkill_Level_1-1 = "ミュージック、スタート！"
