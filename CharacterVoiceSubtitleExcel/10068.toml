[translation]
10068-CVGroup_Battle_Buffed_1-1 = "あ、ありがとうございます……。"
10068-CVGroup_Battle_Defense_1-1 = "無駄ですよ！"
10068-CVGroup_Battle_In_1-1 = "おっ！私が先頭なんですね？"
10068-CVGroup_Battle_In_2-1 = "恐れることなく、前へ！"
10068-CVGroup_Battle_Move_1-1 = "まだまだ行きますよ～！"
10068-CVGroup_Battle_Move_2-1 = "次、いきます！"
10068-CVGroup_Battle_Recovery_1-1 = "はっ、あ、ありがとうございます……！？"
10068-CVGroup_Battle_TacticalAction_1-1 = "はあっ！！"
10068-CVGroup_Battle_Victory_1-1 = "んむ！当然の結果です！"
10068-CVGroup_Battle_Victory_2-1 = "次いきますよ、次！"
10068-CVGroup_CommonSkill-1 = "必殺！勝利のポーズ！"
10068-CVGroup_ExSkill_1-1 = "とりゃあー！！"
10068-CVGroup_ExSkill_2-1 = "ここに参上！！"
10068-CVGroup_ExSkill_3-1 = "勝負です！"
10068-CVGroup_ExSkill_Level_1-1 = "逃がしませんよ！"
10068-CVGroup_ExSkill_Level_2-1 = "挑戦状を受け取ってください！"
10068-CVGroup_ExSkill_Level_3-1 = "覚悟してください！"
10068-CVGroup_Formation_In_1-1 = "ついに！私の出番ですね！"
10068-CVGroup_Formation_In_2-1 = "はい！いつでもいけますよ！"
10068-CVGroup_Formation_Select-1 = "宇沢レイサにお任せください！"
10068-CVGroup_Growup_1-1 = "こ、これを、私に……ですか？"
10068-CVGroup_Growup_2-1 = "ありがとうございます、先生！\nこれからも頑張りますね！"
10068-CVGroup_Growup_3-1 = "宇沢レイサの成長に、終わりはありません！"
10068-CVGroup_Growup_4-1 = "成長には責任が伴うもの！\nもっともっと頑張ります！"
10068-CVGroup_Relationship_Up_1-1 = "先生さえよろしければ……\nその、先生の護衛をもっとしたいです……！"
10068-CVGroup_Relationship_Up_2-1 = "先生には……\nその、情けないところを多くお見せした気もしますが……\n大丈夫、ですよね……？"
10068-CVGroup_Relationship_Up_3-1 = "私がいまここにいるのは、全部先生のおかげです。"
10068-CVGroup_Relationship_Up_4-1 = "これまで通り……いえ、これからも！\nよろしく！お願いいたします！"
10068-CVGroup_Tactic_In_1-1 = "私の力が必要でしたら、どこにでも！"
10068-CVGroup_Tactic_In_2-1 = "皆さんと一緒に、私、宇沢レイサが参ります！"
10068-CVGroup_Tactic_Victory_1-1 = "ふう！楽勝でしたね！"
10068-CVGroup_Tactic_Victory_2-1 = "ふう！正義は必ず勝つんです！"
