[translation]
10068-CVGroup_Battle_Buffed_1-1 = "Ah, o-obrigada..."
10068-CVGroup_Battle_Defense_1-1 = "É inútil!"
10068-CVGroup_Battle_In_1-1 = "Oh! Eu serei a linha de frente?"
10068-CVGroup_Battle_In_2-1 = "Sem medo, vamos em frente!"
10068-CVGroup_Battle_Move_1-1 = "Ainda vamos continuar!"
10068-CVGroup_Battle_Move_2-1 = "Próximo, vamos lá!"
10068-CVGroup_Battle_Recovery_1-1 = "Hah, ah, obrigada...!?"
10068-CVGroup_Battle_TacticalAction_1-1 = "Haaah!!"
10068-CVGroup_Battle_Victory_1-1 = "Hmm! É o resultado esperado!"
10068-CVGroup_Battle_Victory_2-1 = "Vamos para a próxima, próxima!"
10068-CVGroup_CommonSkill-1 = "Golpe fatal! Pose de vitória!"
10068-CVGroup_ExSkill_1-1 = "Toryaa!!"
10068-CVGroup_ExSkill_2-1 = "Cheguei aqui!!"
10068-CVGroup_ExSkill_3-1 = "É um desafio!"
10068-CVGroup_ExSkill_Level_1-1 = "Não vou deixar você escapar!"
10068-CVGroup_ExSkill_Level_2-1 = "Por favor, aceite este desafio!"
10068-CVGroup_ExSkill_Level_3-1 = "Prepare-se!"
10068-CVGroup_Formation_In_1-1 = "Finalmente! É a minha vez!"
10068-CVGroup_Formation_In_2-1 = "Sim! Estou pronta a qualquer momento!"
10068-CVGroup_Formation_Select-1 = "Deixe com Uzawa Reisa!"
10068-CVGroup_Growup_1-1 = "I-isso é para mim...?"
10068-CVGroup_Growup_2-1 = "Obrigada, Sensei!\nVou continuar me esforçando!"
10068-CVGroup_Growup_3-1 = "O crescimento de Uzawa Reisa não tem fim!"
10068-CVGroup_Growup_4-1 = "Crescer traz responsabilidades!\nVou me esforçar ainda mais!"
10068-CVGroup_Relationship_Up_1-1 = "Se o Sensei não se importar...\nBem, eu gostaria de ser sua guarda-costas mais vezes...!"
10068-CVGroup_Relationship_Up_2-1 = "Sinto que mostrei ao Sensei...\nmuitos dos meus momentos patéticos, mas...\nEstá tudo bem, né...?"
10068-CVGroup_Relationship_Up_3-1 = "Eu estar aqui agora é graças ao Sensei."
10068-CVGroup_Relationship_Up_4-1 = "Como sempre... não, daqui para frente também!\nConto com você! Por favor!"
10068-CVGroup_Tactic_In_1-1 = "Se precisar da minha força, irei a qualquer lugar!"
10068-CVGroup_Tactic_In_2-1 = "Eu, Uzawa Reisa, irei junto com todos vocês!"
10068-CVGroup_Tactic_Victory_1-1 = "Ufa! Foi uma vitória fácil!"
10068-CVGroup_Tactic_Victory_2-1 = "Ufa! A justiça sempre vence!"
