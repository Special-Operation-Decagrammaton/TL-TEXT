20059-CVGroup_ExSkill_Level_1-1 = "Смотри, смотри! Это же милая сладкая вата, правда?"
20059-CVGroup_ExSkill_Level_2-1 = "Ахаха! Получай!"
20059-CVGroup_ExSkill_Level_3-1 = "Ну что, мог ты такое предсказать?"
20059-CVGroup_Formation_In_1-1 = "Мы играем здесь? Конечно! А что делать-то будем?"
20059-CVGroup_Formation_In_2-1 = "Ку-фу-фу, предоставь это мне!"
20059-CVGroup_Formation_Select-1 = "Что-что? Что это за игра?"
20059-CVGroup_Growup_1-1 = "Кажется, Муцуки-чан выросла!\nНу, угадаешь, какая именно моя часть стала больше?"
