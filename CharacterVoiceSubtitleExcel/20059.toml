[translation]
20059-CVGroup_UITitle_Idle1-1 = "Blue Archive! Kufufu!"
20059-CVGroup_CharacterGet_Idle1-1 = "Kufufu, a Mutsumi-chan vai se transformar~! Então, o que você quer que eu faça? Pode pedir qualquer coisa."
20059-CVGroup_Cafe_Idle1-1 = "Queria fazer uma festa a fantasia aqui com todo mundo~"
20059-CVGroup_Cafe_Idle2-1 = "Kufufu, então o Sensei gosta dessas coisas, é?"
20059-CVGroup_Cafe_Idle3-1 = "Será que alguém vai brincar comigo~?"
20059-CVGroup_Cafe_Idle4-1 = "Ah, parece divertido mexer nisso ♪"
20059-CVGroup_Cafe_Idle5-1 = "Kufufu! Que legal~ meio que... gosto daqui, sabe."
20059-CVGroup_WeaponGet_Idle1-1 = "Kufufu ♪ isso aí... É disso que eu gosto mesmo~"
20059-CVGroup_UIEventLobby_Enter1-1 = "Vamos ver qual vai ser o bicho que vai aparecer dessa vez, hein~?"
20059-CVGroup_UIEventLobby_Enter2-1 = "Parece que vai ser bem divertido também!"
20059-CVGroup_UIEventLobby_Idle1-1 = "Faz a travessura como se fosse coisa séria! E as coisas sérias com um toque de travessura ♪"
20059-CVGroup_UIEventLobby_Idle2-1 = "Hum... a rota de infiltração... vai ser por ali?"
20059-CVGroup_UIEventLobby_Idle3-1 = "Que foi? Quer brincar com a Mutsumi? Kufufu."
20059-CVGroup_UIEventLobby_Idle4-1 = "Quando o trabalho acabar, que tal ir comigo assistir a uma ópera? Prometo que vai ser legal ♪"
20059-CVGroup_CommonSkill-1 = "ちょ～っと熱いよ？"
20059-CVGroup_ExSkill_1-1 = "くふふ、騙されちゃった？"
20059-CVGroup_ExSkill_2-1 = "サプラーイズ！"
20059-CVGroup_ExSkill_3-1 = "じゃーん。これなーんだ？"
20059-CVGroup_ExSkill_Level_1-1 = "ほらほらっ！可愛いわたあめだよ？"
20059-CVGroup_ExSkill_Level_2-1 = "あははっ！くらえ～"
20059-CVGroup_ExSkill_Level_3-1 = "予想できたかな？"
20059-CVGroup_Formation_In_1-1 = "ここで遊ぶの？いいよ！なにする？"
20059-CVGroup_Formation_In_2-1 = "くふふっ、任せて！"
20059-CVGroup_Formation_Select-1 = "なになに～？どういう遊び？"
20059-CVGroup_Growup_1-1 = "ムツキちゃん、成長したみたい！\nさて、どこが成長したでしょ～か？"
20059-CVGroup_Growup_2-1 = "これってつまり……も～っとすごいイタズラしてもいいってことだよね？くふふっ！"
20059-CVGroup_Growup_3-1 = "大丈夫？手に負えなくなっても知らないよ～？"
20059-CVGroup_Growup_4-1 = "あはははっ！もっと楽しく遊べそう！"
20059-CVGroup_Relationship_Up_1-1 = "先生さぁ、自分がやってることの意味……ちゃんと分かってるの？くふふ。"
20059-CVGroup_Relationship_Up_2-1 = "あははっ！私も先生のこと、だーい好き！いろんな意味でね♪"
20059-CVGroup_Relationship_Up_3-1 = "ふぅん……この感情の名前、私知ってる。\n気になるなら、教えてあげよっか？"
20059-CVGroup_Relationship_Up_4-1 = "へ～？ふーん？そっかあ。\n先生は、も～っと私と仲良くなりたいんだね。"