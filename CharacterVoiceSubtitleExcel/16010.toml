[translation]
16010-CVGroup_Battle_Buffed_1-1 = "Hum... para mim?"
16010-CVGroup_Battle_Defense_1-1 = "Hum... é inútil."
16010-CVGroup_Battle_In_1-1 = "Como eu pensei... não estou acostumada a aparecer em público com esse visual."
16010-CVGroup_Battle_In_2-1 = "Eu não sou desse tipo, mas... não tem jeito."
16010-CVGroup_Battle_Move_1-1 = "Para onde agora?"
16010-CVGroup_Battle_Move_2-1 = "Obrigada, pessoal."
16010-CVGroup_Battle_Recovery_1-1 = "Ah! Obrigada. Eu estava precisando disso."
16010-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu."
16010-CVGroup_Battle_Victory_1-1 = "O efeito da torcida... o que achou?"
16010-CVGroup_Battle_Victory_2-1 = "Minha sinceridade... chegou até você?"
16010-CVGroup_CommonSkill-1 = "E-eu sou uma líder de torcida... afinal...!"
16010-CVGroup_ExSkill_1-1 = "Força! Força...!\nUgh... que vergonha."
16010-CVGroup_ExSkill_2-1 = "Rah! Rah...!\n...Auu."
16010-CVGroup_ExSkill_3-1 = "Vai! Lute!\n...É assim que se faz?"
16010-CVGroup_ExSkill_Level_1-1 = "...Na verdade, parece que isso é melhor."
16010-CVGroup_ExSkill_Level_2-1 = "Vamos fazer como sempre..."
16010-CVGroup_ExSkill_Level_3-1 = "E-e isso, o que acha...?"
16010-CVGroup_Formation_In_1-1 = "...Sim. Se for pelo Sensei."
16010-CVGroup_Formation_In_2-1 = "Você... precisa de torcida?"
16010-CVGroup_Formation_Select-1 = "Ra... rah...! Rah...!"
16010-CVGroup_Growup_1-1 = "Uma sensação estranha... mas não é ruim.\nSerá que posso pedir mais, Sensei?"
16010-CVGroup_Growup_2-1 = "O que você achou, Sensei?\nEspero que... tenha gostado."
16010-CVGroup_Growup_3-1 = "Diz que tenho bom gosto?\nIsso... fui eu mesma quem fiz."
16010-CVGroup_Growup_4-1 = "Não importa o visual, eu busco o melhor.\n...Sim, porque sou uma meister."
16010-CVGroup_Relationship_Up_1-1 = "Eu não tinha essa intenção originalmente, mas...\nSe é o que o Sensei deseja, vou ficar com esse visual por mais um tempo."
16010-CVGroup_Relationship_Up_2-1 = "Se precisar de mim, é só falar.\nEmbora, ficar sempre com esse visual seja um pouco..."
16010-CVGroup_Relationship_Up_3-1 = "Estou diferente do habitual...? Será?\nBem, mas... é que estou com esse visual..."
16010-CVGroup_Relationship_Up_4-1 = "Sinto que, embora eu deva ser a que torce, acabo sendo a que recebe apoio.\n...Não, estou feliz. Conto com você daqui para frente, Sensei."
16010-CVGroup_Tactic_In_1-1 = "Lute, Sensei."
16010-CVGroup_Tactic_In_2-1 = "Sim. Por enquanto, vou dar o meu melhor."
16010-CVGroup_Tactic_Victory_1-1 = "Ufa... acabou.\nE então? Foi bom?"
16010-CVGroup_Tactic_Victory_2-1 = "Fazer várias coisas usando cosplay não é nada mal.\n...Talvez seja porque estou com o Sensei."
