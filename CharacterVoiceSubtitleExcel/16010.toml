[translation]
16010-CVGroup_Battle_Buffed_1-1 = "ん……私に？"
16010-CVGroup_Battle_Defense_1-1 = "ん……無駄だよ。"
16010-CVGroup_Battle_In_1-1 = "やっぱり……この姿で、人前に出るのは慣れない。"
16010-CVGroup_Battle_In_2-1 = "私、そういうタイプじゃないんだけど……仕方ない。"
16010-CVGroup_Battle_Move_1-1 = "次はどこ？"
16010-CVGroup_Battle_Move_2-1 = "みんな、ありがとう。"
16010-CVGroup_Battle_Recovery_1-1 = "あっ！ありがとう。ちょうど必要だった。"
16010-CVGroup_Battle_TacticalAction_1-1 = "行くよ。"
16010-CVGroup_Battle_Victory_1-1 = "応援の効果……どう？"
16010-CVGroup_Battle_Victory_2-1 = "私の真心……伝わった？"
16010-CVGroup_CommonSkill-1 = "い、一応チアリーダー……だから……！"
16010-CVGroup_ExSkill_1-1 = "頑張れ！頑張れ……！\nうぅ……恥ずかしい。"
16010-CVGroup_ExSkill_2-1 = "フレー！フレー…！\n……あうぅ。"
16010-CVGroup_ExSkill_3-1 = "行けー！ファイトー！\n……これで合ってる？"
16010-CVGroup_ExSkill_Level_1-1 = "……いっそ、こっちのほうが良さそう。"
16010-CVGroup_ExSkill_Level_2-1 = "いつも通りにしよう……。"
16010-CVGroup_ExSkill_Level_3-1 = "こ、これはどう……？"
16010-CVGroup_Formation_In_1-1 = "……うん。先生のためなら。"
16010-CVGroup_Formation_In_2-1 = "応援が……必要なの？"
16010-CVGroup_Formation_Select-1 = "ふ、フレー……！フレー……！"
16010-CVGroup_Growup_1-1 = "不思議な気分……でも、悪くはない。\nもっとお願いしようかな、先生。"
16010-CVGroup_Growup_2-1 = "先生的にはどう？\n気に入ってくれたら……いいんだけど。"
16010-CVGroup_Growup_3-1 = "センスがいいって？\nこれ……私が作ったもの、だよ。"
16010-CVGroup_Growup_4-1 = "どんな格好であれ、最高を目指すよ。\n……そう、マイスターだから。"
16010-CVGroup_Relationship_Up_1-1 = "元々そういうつもりじゃなかったけど……\n先生が望むなら、もうちょっとこの格好でいるね。"
16010-CVGroup_Relationship_Up_2-1 = "私のことが必要だったらいつでも言って。\nいつもこの格好で、っていうのはアレだけど……。"
16010-CVGroup_Relationship_Up_3-1 = "いつもと様子が違う……？そう、かな。\nまぁ、でも……こういう格好、だし………。"
16010-CVGroup_Relationship_Up_4-1 = "なんだか、応援する立場なのに、むしろ私が応援されてるような。\n……ううん、嬉しい。これからもよろしくね、先生。"
16010-CVGroup_Tactic_In_1-1 = "ファイト、だよ。先生。"
16010-CVGroup_Tactic_In_2-1 = "うん。とりあえず、頑張ってみる。"
16010-CVGroup_Tactic_Victory_1-1 = "ふう……終わったね。\nどう？良い感じだった？"
16010-CVGroup_Tactic_Victory_2-1 = "コスプレ姿で色々するのも悪くないね。\n……先生と一緒だからかな。"
