[translation]
10106-CVGroup_Battle_Buffed_1-1 = "必ずお返しいたしましょう。"
10106-CVGroup_Battle_Covered_1-1 = "聞こえません。"
10106-CVGroup_Battle_Defense_1-1 = "効きませんよ。"
10106-CVGroup_Battle_In_1-1 = "すぐに楽にして差し上げます。"
10106-CVGroup_Battle_In_2-1 = "この歌声、皆様に届いておりますか？"
10106-CVGroup_Battle_Move_1-1 = "まだ終わりではありません。"
10106-CVGroup_Battle_Move_2-1 = "次のパートへ！"
10106-CVGroup_Battle_Recovery_1-1 = "心より御礼申し上げます。"
10106-CVGroup_Battle_TacticalAction_1-1 = "はっ！"
10106-CVGroup_Battle_Victory_1-1 = "素晴らしい時間でした。\nステージは楽しんでいただけたでしょうか？"
10106-CVGroup_Battle_Victory_2-1 = "これで……皆様に少しは近づけたのでしょうか？"
10106-CVGroup_CommonSkill-1 = "え、えっと……こうですね！\nわっぴ～！"
10106-CVGroup_ExSkill_1-1 = "いつでも見守っておりますので……\nあ、あれ！？"
10106-CVGroup_ExSkill_2-1 = "さあ、こちらへ……\nふえっ！？"
10106-CVGroup_ExSkill_3-1 = "ふふっ……うふふっ……\n……え、ええっ！？"
10106-CVGroup_ExSkill_Level_1-1 = "な、何故！？\nどうしてですか……？"
10106-CVGroup_ExSkill_Level_2-1 = "なにか間違えてしまったのでしょうか……？"
10106-CVGroup_ExSkill_Level_3-1 = "こんな事になるだなんて……。"
10106-CVGroup_Formation_In_1-1 = "時が来たのですね。"
10106-CVGroup_Formation_In_2-1 = "参りましょう。"
10106-CVGroup_Formation_Select-1 = "期待していてくださいね。\n……あっ……こ、公演の……話です……。"
10106-CVGroup_Growup_1-1 = "自身を戒めなければならないのに……\n先生といると、つい気が緩んでしまうのです。"
10106-CVGroup_Growup_2-1 = "感謝いたします、先生。\nこのご恩……どのようにお返ししていけば良いのでしょう。"
10106-CVGroup_Growup_3-1 = "力が溢れてくるような気がします。\nその……この言い方は語弊を生むかもしれませんが。"
10106-CVGroup_Growup_4-1 = "日々、精進していくものではありますが……\nたまにはこのようにお力添えいただくのも良いものですね。"
10106-CVGroup_Relationship_Up_1-1 = "その……もし先生がよろしければ\nデュエットなど……いかがでしょう？"
10106-CVGroup_Relationship_Up_2-1 = "どのように伝えれば\n皆様に誤解を与えずに済むのでしょう……？"
10106-CVGroup_Relationship_Up_3-1 = "この感情の説明が難しく……\nこのままではいけないと思っているのですが……。"
10106-CVGroup_Relationship_Up_4-1 = "先生のために祈りましょう。\n……「歌いましょう」が正しいのでしょうか？"
10106-CVGroup_Tactic_In_1-1 = "この程度であれば造作もないこと。"
10106-CVGroup_Tactic_In_2-1 = "お客様が多くいらっしゃっていますね。\n……ライブの話です。"
10106-CVGroup_Tactic_Victory_1-1 = "ふふっ……造作もなかったですね。"
10106-CVGroup_Tactic_Victory_2-1 = "楽しい公演でした。\n是非またやりたいものです。"
