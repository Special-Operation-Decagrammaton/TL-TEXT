[translation]
10106-CVGroup_Battle_Buffed_1-1 = "Com certeza irei retribuir."
10106-CVGroup_Battle_Covered_1-1 = "Não consigo ouvir."
10106-CVGroup_Battle_Defense_1-1 = "Isso não funciona em mim."
10106-CVGroup_Battle_In_1-1 = "Vou aliviar o seu sofrimento agora mesmo."
10106-CVGroup_Battle_In_2-1 = "Esta canção, será que está chegando a todos vocês?"
10106-CVGroup_Battle_Move_1-1 = "Ainda não acabou."
10106-CVGroup_Battle_Move_2-1 = "Para a próxima parte!"
10106-CVGroup_Battle_Recovery_1-1 = "Agradeço do fundo do meu coração."
10106-CVGroup_Battle_TacticalAction_1-1 = "Hah!"
10106-CVGroup_Battle_Victory_1-1 = "Foi um momento maravilhoso.\nSerá que vocês aproveitaram o show?"
10106-CVGroup_Battle_Victory_2-1 = "Com isso... será que consegui me aproximar um pouco mais de todos vocês?"
10106-CVGroup_CommonSkill-1 = "E-err... é assim, né!\nWappi~!"
10106-CVGroup_ExSkill_1-1 = "Estarei sempre vigiando vocês, então...\nAh, o quê!?"
10106-CVGroup_ExSkill_2-1 = "Vamos, por aqui...\nEh!?"
10106-CVGroup_ExSkill_3-1 = "Fufu... ufufu...\n...E-eeh!?"
10106-CVGroup_ExSkill_Level_1-1 = "P-por quê!?\nPor que isso aconteceu...?"
10106-CVGroup_ExSkill_Level_2-1 = "Será que eu fiz algo de errado...?"
10106-CVGroup_ExSkill_Level_3-1 = "Eu não esperava que fosse acontecer algo assim..."
10106-CVGroup_Formation_In_1-1 = "Chegou a hora, então."
10106-CVGroup_Formation_In_2-1 = "Vamos nessa."
10106-CVGroup_Formation_Select-1 = "Por favor, fiquem na expectativa.\n...Ah... estou falando da... apresentação..."
10106-CVGroup_Growup_1-1 = "Eu deveria me manter contida, mas...\nQuando estou com o Sensei, acabo relaxando demais."
10106-CVGroup_Growup_2-1 = "Sou muito grata, Sensei.\nComo poderei retribuir essa gentileza...?"
10106-CVGroup_Growup_3-1 = "Sinto como se meu poder estivesse transbordando.\nBem... talvez essa forma de dizer cause um mal-entendido."
10106-CVGroup_Growup_4-1 = "Embora eu deva me dedicar todos os dias...\nÉ bom receber esse tipo de apoio de vez em quando."
10106-CVGroup_Relationship_Up_1-1 = "Bem... se o Sensei não se importar,\nque tal um dueto...?"
10106-CVGroup_Relationship_Up_2-1 = "Como posso transmitir isso\nsem que todos entendam errado...?"
10106-CVGroup_Relationship_Up_3-1 = "É difícil explicar esse sentimento...\nSinto que não deveria estar assim..."
10106-CVGroup_Relationship_Up_4-1 = "Vou rezar pelo Sensei.\n...Será que o correto seria dizer 'vou cantar'?"
10106-CVGroup_Tactic_In_1-1 = "Isso não é nada difícil."
10106-CVGroup_Tactic_In_2-1 = "Há muitos clientes presentes, não é?\n...Estou falando do show."
10106-CVGroup_Tactic_Victory_1-1 = "Fufu... não foi nada difícil."
10106-CVGroup_Tactic_Victory_2-1 = "Foi uma apresentação divertida.\nCom certeza quero fazer de novo."
