[translation]
10012-CVGroup_Battle_Buffed_1-1 = "Muito obrigada!"
10012-CVGroup_Battle_Defense_1-1 = "É inútil!"
10012-CVGroup_Battle_In_1-1 = "Eu quero ser útil ao treinador."
10012-CVGroup_Battle_In_2-1 = "Vou mostrar os resultados de todo o meu esforço até agora."
10012-CVGroup_Battle_Move_1-1 = "Um estímulo na medida certa."
10012-CVGroup_Battle_Move_2-1 = "O treino de hoje também está divertido."
10012-CVGroup_Battle_Recovery_1-1 = "Teria sido melhor se fosse proteína, mas..."
10012-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu!"
10012-CVGroup_Battle_Victory_1-1 = "N-não olhe tanto assim para mim."
10012-CVGroup_Battle_Victory_2-1 = "B-bom trabalho."
10012-CVGroup_CommonSkill-1 = "Alvo travado!"
10012-CVGroup_ExSkill_1-1 = "Muito bem.\nEntão, lá vou eu!"
10012-CVGroup_ExSkill_2-1 = "Ufa...\nPreparação concluída!"
10012-CVGroup_ExSkill_3-1 = "Respire fundo...\nLá vou eu!"
10012-CVGroup_ExSkill_Level_1-1 = "Um, dois, três!"
10012-CVGroup_ExSkill_Level_2-1 = "Hah! Ha! Haa!"
10012-CVGroup_ExSkill_Level_3-1 = "Hah! Yah! Lá vou eu!"
10012-CVGroup_Formation_In_1-1 = "Vamos começar o treinamento."
10012-CVGroup_Formation_In_2-1 = "Seguirei as instruções do treinador."
10012-CVGroup_Formation_Select-1 = "Um, dois, um, dois!"
10012-CVGroup_Growup_1-1 = "O treinamento é difícil, mas se for por este momento, eu consigo aguentar."
10012-CVGroup_Growup_2-1 = "Quero me tornar uma versão ainda melhor de mim mesma.\n...Junto com o treinador."
10012-CVGroup_Growup_3-1 = "Treinador, vamos nos exercitar juntos.\nExercícios trazem muitos benefícios."
10012-CVGroup_Growup_4-1 = "Hoje também...\nMuito obrigada."
10012-CVGroup_Relationship_Up_1-1 = "Toda vez que vejo o treinador, meu peito aperta.\nPor que será?"
10012-CVGroup_Relationship_Up_2-1 = "Treinador, quer fazer uma queda de braço comigo?\nN-não é como se eu quisesse segurar a sua mão nem nada disso..."
10012-CVGroup_Relationship_Up_3-1 = "Quando estou com o treinador, minha frequência cardíaca aumenta."
10012-CVGroup_Relationship_Up_4-1 = "Vamos suar um pouco juntos?"
10012-CVGroup_Tactic_In_1-1 = "O treinamento de hoje será em formato prático?"
10012-CVGroup_Tactic_In_2-1 = "Treinador, conto com você."
10012-CVGroup_Tactic_Victory_1-1 = "É gratificante poder obter resultados."
10012-CVGroup_Tactic_Victory_2-1 = "Sinto que fiquei um nível mais forte."
