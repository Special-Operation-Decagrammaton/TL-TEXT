[translation]
10012-CVGroup_Battle_Buffed_1-1 = "ありがとうございます！"
10012-CVGroup_Battle_Defense_1-1 = "無駄です！"
10012-CVGroup_Battle_In_1-1 = "私、トレーナーの役に立ちたいです。"
10012-CVGroup_Battle_In_2-1 = "今までの成果を、お見せします。"
10012-CVGroup_Battle_Move_1-1 = "ちょうどいい具合の刺激ですね。"
10012-CVGroup_Battle_Move_2-1 = "今日のトレーニングも楽しいですね。"
10012-CVGroup_Battle_Recovery_1-1 = "プロテインならもっとよかったのですが……。"
10012-CVGroup_Battle_TacticalAction_1-1 = "行きます！"
10012-CVGroup_Battle_Victory_1-1 = "そ、そんなに見ないでください。"
10012-CVGroup_Battle_Victory_2-1 = "お、お疲れ様でした。"
10012-CVGroup_CommonSkill-1 = "ロックオン！"
10012-CVGroup_ExSkill_1-1 = "よっし。\nでは、行きます！"
10012-CVGroup_ExSkill_2-1 = "ふぅー……。\n準備オッケー！"
10012-CVGroup_ExSkill_3-1 = "スーッ……。\n行きます！"
10012-CVGroup_ExSkill_Level_1-1 = "いち、にの、さんっ！"
10012-CVGroup_ExSkill_Level_2-1 = "ふっ！はっ！はあっ！"
10012-CVGroup_ExSkill_Level_3-1 = "はっ！やっ！行きますっ！"
10012-CVGroup_Formation_In_1-1 = "トレーニングを始めましょう。"
10012-CVGroup_Formation_In_2-1 = "トレーナーの指示に従います。"
10012-CVGroup_Formation_Select-1 = "いっち、にっ、いっち、にっ！"
10012-CVGroup_Growup_1-1 = "トレーニングは辛いですがこの瞬間のためなら、耐えられます。"
10012-CVGroup_Growup_2-1 = "もっと素敵な自分になりたいです。\n……トレーナーと一緒に。"
10012-CVGroup_Growup_3-1 = "トレーナーも、一緒に運動しましょう。\n運動は本当にいいことづくめです。"
10012-CVGroup_Growup_4-1 = "今日も……\nありがとうございます。"
10012-CVGroup_Relationship_Up_1-1 = "トレーナーに会うたびに、胸が苦しくなります。\nどうしてでしょうか。"
10012-CVGroup_Relationship_Up_2-1 = "トレーナー、私と腕相撲してみませんか？\nけ、決してトレーナーと手をつなぎたくて、\nというわけでは……ありません。"
10012-CVGroup_Relationship_Up_3-1 = "トレーナーと一緒にいると、心拍数が増加します。"
10012-CVGroup_Relationship_Up_4-1 = "一緒に、汗を流しに行きませんか？"
10012-CVGroup_Tactic_In_1-1 = "今日のトレーニングは、実践形式にしますか。"
10012-CVGroup_Tactic_In_2-1 = "トレーナー、よろしくお願いします。"
10012-CVGroup_Tactic_Victory_1-1 = "結果を得られるというのは、嬉しいことです。"
10012-CVGroup_Tactic_Victory_2-1 = "さらに一段階強くなったのを感じます。"
