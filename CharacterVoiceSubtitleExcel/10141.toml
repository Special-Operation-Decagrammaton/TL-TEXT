[translation]
10141-CVGroup_Battle_Buffed_1-1 = "П-Почему именно я...!?"
10141-CVGroup_Battle_Defense_1-1 = "Ах ты...!"
10141-CVGroup_Battle_In_1-1 = "Не прощу вас, не прощу вас, не прощу..."
10141-CVGroup_Battle_In_2-1 = "Я-Я иду!"
10141-CVGroup_Battle_Move_1-1 = "К-Куда теперь?"
10141-CVGroup_Battle_Move_2-1 = "Я закончила здесь!"
10141-CVGroup_Battle_Recovery_1-1 = "Т-Тебе не стоило так ради меня заходить...!"
10141-CVGroup_Battle_TacticalAction_1-1 = "Хмф!"
10141-CVGroup_Battle_Victory_1-1 = "В-В следующий раз я обязательно...!"
10141-CVGroup_Battle_Victory_2-1 = "Это всё благодаря всем вам...!"
10141-CVGroup_CommonSkill-1 = "Ребята...! Давайте постараемся...!"
10141-CVGroup_ExSkill_1-1 = "С-Сенсей!? ...Получай!"
10141-CVGroup_ExSkill_2-1 = "Осторожно! ...Я не прощу тебя!"
10141-CVGroup_ExSkill_3-1 = "Уа-а-а...!? ...Я-Я сотру тебя в порошок!"
10141-CVGroup_ExSkill_Level_1-1 = "Пожалуйста, просто исчезни!"
10141-CVGroup_ExSkill_Level_2-1 = "Как ты посмел так поступить с Сенсеем...!"
10141-CVGroup_ExSkill_Level_3-1 = "Выкуси это...!"
10141-CVGroup_Formation_In_1-1 = "Я-Я выдвигаюсь!"
10141-CVGroup_Formation_In_2-1 = "Я сделаю... всё, что в моих силах...!"
10141-CVGroup_Formation_Select-1 = "Оно... м-мне идёт? О-О боже... хе-хе..."
10141-CVGroup_Growup_1-1 = "Ты уверен... что мне правда можно это взять...?"
10141-CVGroup_Growup_2-1 = "Что-то настолько ценное для меня...!? К-Как я вообще смогу отплатить тебе...!?"
10141-CVGroup_Growup_3-1 = "Для кого-то вроде меня... спасибо тебе огромное...!"
10141-CVGroup_Growup_4-1 = "С этой силой... я смогу сметнуть абсолютно всех врагов Сенсея...!"
10141-CVGroup_Relationship_Up_1-1 = "Спасибо, спасибо, спасибо вам...!"
10141-CVGroup_Relationship_Up_2-1 = "Какое красивое... Ах, это платье такое красивое, правда? Погоди, я-я...!?"
10141-CVGroup_Relationship_Up_3-1 = "М-Мне правда можно... быть настолько счастливой...?"
10141-CVGroup_Relationship_Up_4-1 = "Спасибо. Мой дорогой... Сенсей..."
10141-CVGroup_Tactic_In_1-1 = "Если я с Сенсеем, я пойду куда угодно...!"
10141-CVGroup_Tactic_In_2-1 = "Я... раздавлю их всех...!"
10141-CVGroup_Tactic_Victory_1-1 = "К-Как и ожидалось, Сенсей потрясающий!"
10141-CVGroup_Tactic_Victory_2-1 = "Да! Я выбросила этот мусор прямо в мусорный бак!"