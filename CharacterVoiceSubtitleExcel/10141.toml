[translation]
10141-CVGroup_Battle_Buffed_1-1 = "ど、どうして私なんかに……！？"
10141-CVGroup_Battle_Defense_1-1 = "この……！"
10141-CVGroup_Battle_In_1-1 = "許さない許さない許さない……。"
10141-CVGroup_Battle_In_2-1 = "い、行きます！"
10141-CVGroup_Battle_Move_1-1 = "つ、次はどこですか？"
10141-CVGroup_Battle_Move_2-1 = "こっちは終わりました！"
10141-CVGroup_Battle_Recovery_1-1 = "こ、ここまでしていただかなくても……！"
10141-CVGroup_Battle_TacticalAction_1-1 = "ふっ！"
10141-CVGroup_Battle_Victory_1-1 = "つ、次も、必ず……！"
10141-CVGroup_Battle_Victory_2-1 = "全部、みんなのおかげです……！"
10141-CVGroup_CommonSkill-1 = "みんな……！頑張りましょう……！"
10141-CVGroup_ExSkill_1-1 = "せ、先生！？……この！"
10141-CVGroup_ExSkill_2-1 = "危ない！……許しません！"
10141-CVGroup_ExSkill_3-1 = "うわああ……！？……け、消してやる！"
10141-CVGroup_ExSkill_Level_1-1 = "消えてください！"
10141-CVGroup_ExSkill_Level_2-1 = "先生になんてことを……！"
10141-CVGroup_ExSkill_Level_3-1 = "食らえ……！"
10141-CVGroup_Formation_In_1-1 = "い、いってきます！"
10141-CVGroup_Formation_In_2-1 = "さ、最善を……尽くします……！"
10141-CVGroup_Formation_Select-1 = "に、似合ってますか？そ、そんな……えへへ……。"
10141-CVGroup_Growup_1-1 = "本当に……もらっていいんですか……？"
10141-CVGroup_Growup_2-1 = "こんなに貴重なものを私に……！？\nど、どうお返しすれば……！"
10141-CVGroup_Growup_3-1 = "私なんかのために……本当に、ありがとうございます……！"
10141-CVGroup_Growup_4-1 = "この力があれば……先生の敵を全部薙ぎ払うことだって……！"
10141-CVGroup_Relationship_Up_1-1 = "ありがとうございます、ありがとうございます、\nありがとうございます……！"
10141-CVGroup_Relationship_Up_2-1 = "綺麗……ああ、このドレス、綺麗ですよね。\nえっ、わ、私が……！？"
10141-CVGroup_Relationship_Up_3-1 = "わ、私……こんなに幸せでいいんでしょうか……？"
10141-CVGroup_Relationship_Up_4-1 = "ありがとうございます。\n私の大切な……先生……。"
10141-CVGroup_Tactic_In_1-1 = "先生と一緒なら、どこへでも……！"
10141-CVGroup_Tactic_In_2-1 = "全員……潰します……！"
10141-CVGroup_Tactic_Victory_1-1 = "や、やっぱり先生はすごいです！"
10141-CVGroup_Tactic_Victory_2-1 = "はい！ゴミはゴミ箱にぶち込みました！"
