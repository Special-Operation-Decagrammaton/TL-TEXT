[translation]
16002-CVGroup_Battle_Buffed_1-1 = "Obrigada pelo suporte!"
16002-CVGroup_Battle_Defense_1-1 = "Fufu, é inútil!"
16002-CVGroup_Battle_In_1-1 = "Se seguirem as instruções, com certeza venceremos!"
16002-CVGroup_Battle_In_2-1 = "Nossos ataques acertarão!\nOs ataques inimigos serão evitados!\nAssim, alcançaremos a vitória!"
16002-CVGroup_Battle_Move_1-1 = "Ufa, aqui já é seguro!"
16002-CVGroup_Battle_Move_2-1 = "Continuando o avanço, avançar!"
16002-CVGroup_Battle_Recovery_1-1 = "Oh! Vou explicar agora o valor desse suporte!"
16002-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover!"
16002-CVGroup_Battle_Victory_1-1 = "Ai! Que quente!\nE-ei, será que me empolguei demais para uma batalha?"
16002-CVGroup_Battle_Victory_2-1 = "Uau! Que susto!\nAh, o aparelho ainda estava ligado...! Hehe♡"
16002-CVGroup_CommonSkill-1 = "Isso vai doer!"
16002-CVGroup_ExSkill_1-1 = "Vou mostrar a vocês a minha capacidade!"
16002-CVGroup_ExSkill_2-1 = "A aula vai começar!"
16002-CVGroup_ExSkill_3-1 = "Existem explicações que são mais eloquentes que as palavras."
16002-CVGroup_ExSkill_Level_1-1 = "Overclock Fire!!"
16002-CVGroup_ExSkill_Level_2-1 = "Poder de fogo, potência máxima!"
16002-CVGroup_ExSkill_Level_3-1 = "Vou abrir caminho!"
16002-CVGroup_Formation_In_1-1 = "É a minha vez!"
16002-CVGroup_Formation_In_2-1 = "Planejo ter um grande desempenho!\nFiquem na expectativa!"
16002-CVGroup_Formation_Select-1 = "Não tenho muita confiança em combate real, mas!\nEhehehe!"
16002-CVGroup_Growup_1-1 = "Por que será...\nSinto que o poder da lógica foi mais fortalecido do que a minha arma."
16002-CVGroup_Growup_2-1 = "Mais do que longas conversas ou lógicas redundantes,\nquero uma capacidade mais concreta."
16002-CVGroup_Growup_3-1 = "Não quero ser alguém que só sabe falar.\nSe estiver com o Sensei, vai dar tudo certo, né?"
16002-CVGroup_Growup_4-1 = "Com certeza serei útil para aqueles que sofrem com a dor de não entender algo!"
16002-CVGroup_Relationship_Up_1-1 = "Quanto mais explico, mais fácil o mundo se torna de compreender."
16002-CVGroup_Relationship_Up_2-1 = "Sempre que adquiro um novo conhecimento, meu coração dispara.\nE... quando estou com o Sensei, descubro novos sentimentos."
16002-CVGroup_Relationship_Up_3-1 = "Um dia, também quero ser uma professora.\nNão para dar minhas próprias aulas, mas para ouvir as histórias dos alunos, como o Sensei faz."
16002-CVGroup_Relationship_Up_4-1 = "Deveria ser capaz de explicar tudo, mas o meu coração... hehe.\nDesculpe. Não consigo explicar isso facilmente."
16002-CVGroup_Tactic_In_1-1 = "Tem um inimigo ali!\n...Ah, você já tinha visto?"
16002-CVGroup_Tactic_In_2-1 = "Se derrotarmos o inimigo, venceremos!\n...Ah, isso era óbvio, né?"
16002-CVGroup_Tactic_Victory_1-1 = "Nós vencemos!"
16002-CVGroup_Tactic_Victory_2-1 = "Minha previsão estava errada.\nNós somos fortes demais!"
