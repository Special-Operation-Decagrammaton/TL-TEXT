[translation]
16002-CVGroup_Battle_Buffed_1-1 = "支援、ありがとうございます！"
16002-CVGroup_Battle_Defense_1-1 = "ふふっ、無駄です！"
16002-CVGroup_Battle_In_1-1 = "ご説明通り行動していただければきっと勝てます！"
16002-CVGroup_Battle_In_2-1 = "私たちの攻撃は的中！\n敵の攻撃は回避！\nそうしたら勝利します！"
16002-CVGroup_Battle_Move_1-1 = "ふう、ここはもう安全です！"
16002-CVGroup_Battle_Move_2-1 = "続けて前進します、前進！"
16002-CVGroup_Battle_Recovery_1-1 = "おおっ！この支援の価値について今から説明します！"
16002-CVGroup_Battle_TacticalAction_1-1 = "移動します！"
16002-CVGroup_Battle_Victory_1-1 = "あっ！熱っ！\nちょ、ちょっと戦闘にしては、はしゃぎすぎちゃいましたか～"
16002-CVGroup_Battle_Victory_2-1 = "わっ！びっくりした！\nあ、電源が入ったままだったか……！てへっ♡"
16002-CVGroup_CommonSkill-1 = "これは痛いですよ！"
16002-CVGroup_ExSkill_1-1 = "私の実力をお見せしましょう！"
16002-CVGroup_ExSkill_2-1 = "講義を始めます！"
16002-CVGroup_ExSkill_3-1 = "言葉より雄弁な説明というものがあります。"
16002-CVGroup_ExSkill_Level_1-1 = "オーバークロック・ファイアーー！！"
16002-CVGroup_ExSkill_Level_2-1 = "火力、フル稼働！"
16002-CVGroup_ExSkill_Level_3-1 = "道を開きます！"
16002-CVGroup_Formation_In_1-1 = "私の出番ですね！"
16002-CVGroup_Formation_In_2-1 = "大活躍の予定！\n期待しててくださいね！"
16002-CVGroup_Formation_Select-1 = "実戦はちょーっと、自信はないけど！\nえへへへ！"
16002-CVGroup_Growup_1-1 = "どうしてだろう……。\n銃よりも、論理の力がもっと強化された気分……。"
16002-CVGroup_Growup_2-1 = "ただ長い話や冗長な論理よりも、\nもっと確かな実力が欲しいです。"
16002-CVGroup_Growup_3-1 = "口だけ達者な人にはなりたくありません。\n先生と一緒なら、大丈夫ですよね？"
16002-CVGroup_Growup_4-1 = "分からないという苦痛に苦しむ人たちに、私が役に立てるはずです！"
16002-CVGroup_Relationship_Up_1-1 = "説明をすればするほど、世界はさらに理解しやすくなります。"
16002-CVGroup_Relationship_Up_2-1 = "何か新しい知識を得るたびにドキドキします。\nそして……先生と一緒にいると新しい感情を見つけます。"
16002-CVGroup_Relationship_Up_3-1 = "私もいつか先生になりたいです。\n私の講義を開くためにではなく先生のように、\n生徒たちの話を聞いてあげたいんです。"
16002-CVGroup_Relationship_Up_4-1 = "すべてのことを説明できるはずなのに私の心は……へへ。\nごめんなさい。簡単には説明できません。"
16002-CVGroup_Tactic_In_1-1 = "敵がいますよ！\n……あ、見えてますか?"
16002-CVGroup_Tactic_In_2-1 = "敵を倒せば勝利です！\n……あ、当然のことでしたか?"
16002-CVGroup_Tactic_Victory_1-1 = "私たちの勝利ですね！"
16002-CVGroup_Tactic_Victory_2-1 = "予想が外れました。\n私たちは強すぎます！"
