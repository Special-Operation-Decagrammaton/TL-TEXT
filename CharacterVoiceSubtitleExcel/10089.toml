[translation]
10089-CVGroup_Battle_Buffed_1-1 = "Um bom investimento."
10089-CVGroup_Battle_Covered_1-1 = "Acha mesmo que pode me derrotar?"
10089-CVGroup_Battle_Defense_1-1 = "Hmm, é só isso?"
10089-CVGroup_Battle_In_1-1 = "Muito bem... vamos começar."
10089-CVGroup_Battle_In_2-1 = "Pessoal, vamos lá."
10089-CVGroup_Battle_Move_1-1 = "Área limpa."
10089-CVGroup_Battle_Move_2-1 = "Ainda restam alguns.\nVamos para o próximo."
10089-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10089-CVGroup_Battle_TacticalAction_1-1 = "Haa!"
10089-CVGroup_Battle_Victory_1-1 = "Já acabou?\nFoi um trabalho mais fácil do que eu pensava."
10089-CVGroup_Battle_Victory_2-1 = "Fufu, superou as expectativas, não é?"
10089-CVGroup_CommonSkill-1 = "Fufu... ah, ei!?"
10089-CVGroup_ExSkill_1-1 = "Uma proposta da presidente."
10089-CVGroup_ExSkill_2-1 = "Você já deve ter ouvido falar do meu nome, não é?"
10089-CVGroup_ExSkill_3-1 = "Aceite com gratidão."
10089-CVGroup_ExSkill_Level_1-1 = "Se tiver interesse, entre em contato."
10089-CVGroup_ExSkill_Level_2-1 = "Lembre-se do nome: Problem Solver 68."
10089-CVGroup_ExSkill_Level_3-1 = "E então? Não é uma má proposta, certo?"
10089-CVGroup_Formation_In_1-1 = "Fufu... entendo."
10089-CVGroup_Formation_In_2-1 = "Uma decisão sensata."
10089-CVGroup_Formation_Select-1 = "Algum assunto comigo... Kyaa!?\nUfa..."
10089-CVGroup_Growup_1-1 = "Você tem visão de futuro.\n...Eu prometo, nunca vou decepcionar você, Sensei."
10089-CVGroup_Growup_2-1 = "Ser tão valorizada assim... Eu também preciso me esforçar mais para melhorar."
10089-CVGroup_Growup_3-1 = "Fique tranquilo.\nMesmo que eu fique mais forte, não vou deixar você para trás, Sensei."
10089-CVGroup_Growup_4-1 = "Fufu...\nContinue esperando grandes coisas de mim daqui para frente."
10089-CVGroup_Relationship_Up_1-1 = "O quanto eu deveria me abrir com o Sensei...?\nIsso é complicado."
10089-CVGroup_Relationship_Up_2-1 = "Sinto que palavras não são o suficiente, mas...\n...Eu sou grata a você, Sensei."
10089-CVGroup_Relationship_Up_3-1 = "O que eu deveria dizer em momentos como este...\n...Até eu tenho coisas que não sei."
10089-CVGroup_Relationship_Up_4-1 = "Sensei, sobre isso... não, esqueça, não é nada."
10089-CVGroup_Tactic_In_1-1 = "Este trabalho é perfeito para mim."
10089-CVGroup_Tactic_In_2-1 = "Não se preocupe. Deixe comigo."
10089-CVGroup_Tactic_Victory_1-1 = "Nas minhas mãos, isso é o esperado."
10089-CVGroup_Tactic_Victory_2-1 = "E então, ficou satisfeito?"
