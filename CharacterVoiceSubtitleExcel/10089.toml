[translation]
10089-CVGroup_Battle_Buffed_1-1 = "良い投資ね。"
10089-CVGroup_Battle_Covered_1-1 = "私を倒せるとでも？"
10089-CVGroup_Battle_Defense_1-1 = "ふーん、その程度かしら？"
10089-CVGroup_Battle_In_1-1 = "さあ……はじめましょう。"
10089-CVGroup_Battle_In_2-1 = "皆、行くわよ。"
10089-CVGroup_Battle_Move_1-1 = "ここは片付いたわね。"
10089-CVGroup_Battle_Move_2-1 = "まだ残党がいるわ。\n次に向かうわよ。"
10089-CVGroup_Battle_Recovery_1-1 = "ありがとう。"
10089-CVGroup_Battle_TacticalAction_1-1 = "はあっ！"
10089-CVGroup_Battle_Victory_1-1 = "もう終わり？\n思ったより簡単な依頼だったわね。"
10089-CVGroup_Battle_Victory_2-1 = "ふふ、期待以上、だったでしょう？"
10089-CVGroup_CommonSkill-1 = "ふふ……あっ、ちょっと！？"
10089-CVGroup_ExSkill_1-1 = "社長からの提案よ。"
10089-CVGroup_ExSkill_2-1 = "名前くらいは、聞いたことあるでしょう？"
10089-CVGroup_ExSkill_3-1 = "ありがたく受け取りなさい。"
10089-CVGroup_ExSkill_Level_1-1 = "興味あるなら、連絡してちょうだい。"
10089-CVGroup_ExSkill_Level_2-1 = "便利屋68、覚えておきなさい。"
10089-CVGroup_ExSkill_Level_3-1 = "どう？悪くない提案でしょう？"
10089-CVGroup_Formation_In_1-1 = "ふふっ……なるほど。"
10089-CVGroup_Formation_In_2-1 = "賢明な判断ね。"
10089-CVGroup_Formation_Select-1 = "私に何か用……ひゃあっ！？\nふぅ……。"
10089-CVGroup_Growup_1-1 = "先見の明があるのね。\n……約束するわ、絶対、先生をガッカリさせないって。"
10089-CVGroup_Growup_2-1 = "ここまで期待されてるなんて……\n私も、もっと自分に磨きをかけないといけないわね。"
10089-CVGroup_Growup_3-1 = "安心して。\n私が強くなっても、先生を置いていったりはしないわよ。"
10089-CVGroup_Growup_4-1 = "ふふっ……\nこの先も、私に期待しててちょうだい。"
10089-CVGroup_Relationship_Up_1-1 = "先生には……どこまで打ち明けたらいいのかしら……\n困ってしまうわね。"
10089-CVGroup_Relationship_Up_2-1 = "言葉だけじゃ、足りない気もするけど……\n……感謝しているわ、先生。"
10089-CVGroup_Relationship_Up_3-1 = "こういうとき、なんと言えば良いのかしら……\n……私にも分からないことくらいあるわよ。"
10089-CVGroup_Relationship_Up_4-1 = "先生、その……いえ、なんでもないわ。"
10089-CVGroup_Tactic_In_1-1 = "この依頼、私にぴったりね。"
10089-CVGroup_Tactic_In_2-1 = "心配は無用よ。私に任せなさい。"
10089-CVGroup_Tactic_Victory_1-1 = "私の手にかかれば、これくらい当然よ。"
10089-CVGroup_Tactic_Victory_2-1 = "どう、満足してもらえたかしら？"
