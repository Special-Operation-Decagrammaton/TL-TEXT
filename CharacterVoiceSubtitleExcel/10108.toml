[translation]
10108-CVGroup_Battle_Buffed_1-1 = "Obrigada, isso me ajudou a despertar!"
10108-CVGroup_Battle_Covered_1-1 = "Vou me esconder aqui!"
10108-CVGroup_Battle_Defense_1-1 = "Eu já sabia disso."
10108-CVGroup_Battle_In_1-1 = "Quando isso acabar, vamos descansar um pouco juntos."
10108-CVGroup_Battle_In_2-1 = "Vamos terminar isso logo para podermos descansar."
10108-CVGroup_Battle_Move_1-1 = "Setor limpo."
10108-CVGroup_Battle_Move_2-1 = "Bem, como esperado."
10108-CVGroup_Battle_Recovery_1-1 = "Acho que me sinto um pouco melhor, obrigada!"
10108-CVGroup_Battle_TacticalAction_1-1 = "Indo para as próximas coordenadas!"
10108-CVGroup_Battle_Victory_1-1 = "Um resultado natural."
10108-CVGroup_Battle_Victory_2-1 = "Então, que tal fazermos um alongamento antes de dormir?"
10108-CVGroup_CommonSkill-1 = "Será que é assim...? \nPronto, perfeito!"
10108-CVGroup_ExSkill_1-1 = "Vejamos... \nAhhh!? \n...Haa."
10108-CVGroup_ExSkill_2-1 = "Com cuidado... \nEspera, não pode ser!? \nUuu..."
10108-CVGroup_ExSkill_3-1 = "Com cuidado, com cuidado... \nEi, espera! \nDe novo...?"
10108-CVGroup_ExSkill_Level_1-1 = "Kyaa!? \nQue susto..."
10108-CVGroup_ExSkill_Level_2-1 = "Ah!? \nBem, tudo bem..."
10108-CVGroup_ExSkill_Level_3-1 = "Hii!? \nM-mas está tudo conforme os cálculos!"
10108-CVGroup_Formation_In_1-1 = "Obrigada, Sensei. \nAcho que é a escolha ideal."
10108-CVGroup_Formation_In_2-1 = "Vou provar que a escolha do Sensei não está errada."
10108-CVGroup_Formation_Select-1 = "Kya!? \nE-esqueça o que acabou de acontecer..."
10108-CVGroup_Growup_1-1 = "Até mesmo um pijama pode ser um traje adequado, \ndesde que você saiba onde usá-lo. \nNão é, Sensei?"
10108-CVGroup_Growup_2-1 = "Pijamas também são roupas funcionais na cama, então... \nN-não tem segundas intenções, viu!?"
10108-CVGroup_Growup_3-1 = "Eu adoro este travesseiro. \nAcho que vou dormir muito bem hoje..."
10108-CVGroup_Growup_4-1 = "Sinto que minha sorte vai melhorar!"
10108-CVGroup_Relationship_Up_1-1 = "Agora... decidi ser sincera. \nObrigada, Sensei... e também... \n...N-não, deixa pra lá!"
10108-CVGroup_Relationship_Up_2-1 = "Eu sei que o Sensei sempre tem muito trabalho. \nE que, mesmo nessas horas, você pensa em mim primeiro... \nEstou muito feliz por ter conhecido você, Sensei."
10108-CVGroup_Relationship_Up_3-1 = "S-s-se, por acaso, você não conseguir dormir à noite... \nEu posso ficar ao seu lado contando logaritmos naturais ou comuns, se quiser..."
10108-CVGroup_Relationship_Up_4-1 = "S-Sensei, com o que você costuma sonhar...? \nP-por exemplo, sonhar comigo, talvez...? \nEu, às vezes, sonho com você..."
10108-CVGroup_Tactic_In_1-1 = "Então, vamos encontrar o caminho certo."
10108-CVGroup_Tactic_In_2-1 = "Não estou cansada! \n...Por enquanto."
10108-CVGroup_Tactic_Victory_1-1 = "Mais um dia perfeito!"
10108-CVGroup_Tactic_Victory_2-1 = "Vitória. \nUm resultado natural, é claro."
