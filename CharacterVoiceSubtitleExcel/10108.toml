[translation]
10108-CVGroup_Battle_Buffed_1-1 = "ありがと、おかげで眠気が覚めたわ！"
10108-CVGroup_Battle_Covered_1-1 = "ここは遮蔽よ！"
10108-CVGroup_Battle_Defense_1-1 = "そんなの分かってたわ。"
10108-CVGroup_Battle_In_1-1 = "これが終わったら、一緒にゆっくり休みましょう。"
10108-CVGroup_Battle_In_2-1 = "ちゃちゃっと終わらせて、ちゃちゃっと休むわよ。"
10108-CVGroup_Battle_Move_1-1 = "セクタークリア。"
10108-CVGroup_Battle_Move_2-1 = "まあ、予想通りね。"
10108-CVGroup_Battle_Recovery_1-1 = "ちょっと元気になったかも、ありがと！"
10108-CVGroup_Battle_TacticalAction_1-1 = "次の座標に移動よ！"
10108-CVGroup_Battle_Victory_1-1 = "当然の結果ね。"
10108-CVGroup_Battle_Victory_2-1 = "それじゃ、みんなで寝る前のストレッチでもしましょうか？"
10108-CVGroup_CommonSkill-1 = "こんな感じかな……？\nよし、カンペキ！"
10108-CVGroup_ExSkill_1-1 = "どれどれ……\nうわあっ！？\n……はぁ。"
10108-CVGroup_ExSkill_2-1 = "そーっと……\nって、うそっ！？\nううぅ……。"
10108-CVGroup_ExSkill_3-1 = "慎重に、慎重に……\nってちょっと！\nまた……？"
10108-CVGroup_ExSkill_Level_1-1 = "きゃあっ！？\nビックリしたぁ……。"
10108-CVGroup_ExSkill_Level_2-1 = "ああっ！？\nまあ、いっか……。"
10108-CVGroup_ExSkill_Level_3-1 = "ひぃっ！？\nで、でも計算通りよ！"
10108-CVGroup_Formation_In_1-1 = "ありがとうございます、先生。\n最適な選択だと思いますよ。"
10108-CVGroup_Formation_In_2-1 = "先生の選択が間違いじゃないと\n証明してみせます。"
10108-CVGroup_Formation_Select-1 = "きゃっ！？\nい、今のは忘れてください……。"
10108-CVGroup_Growup_1-1 = "パジャマだって、\nTPOをわきまえれば立派な衣装なんです。\nそうですよね？先生。"
10108-CVGroup_Growup_2-1 = "パジャマもベッドでは機能的なウェアですから……\nた、他意はありませんよっ！？"
10108-CVGroup_Growup_3-1 = "この枕、お気に入りなんです。\n今日はぐっすり眠れそう……。"
10108-CVGroup_Growup_4-1 = "なんだか運気が上がりそうな予感！"
10108-CVGroup_Relationship_Up_1-1 = "今は……素直になるって決めたんです。\nありがとうございます、先生……あと、\n……や、やっぱり、ここまでで！"
10108-CVGroup_Relationship_Up_2-1 = "先生がいつも大変なこと、知ってます。\nそれにこんな時も、私を真っ先に思ってくれることも……\n先生に会えて、本当によかったです。"
10108-CVGroup_Relationship_Up_3-1 = "も、も、もしも！夜あんまり眠れない、ということでしたら……\n自然対数とか、常用対数とか、隣で数えてあげても、いいですよ……。"
10108-CVGroup_Relationship_Up_4-1 = "せ、先生は普段どんな夢を見ますか……？\nた、たとえば、私の夢、とか……？\n私は、たまに見ることがあります……。"
10108-CVGroup_Tactic_In_1-1 = "それでは、正しい道を探しましょう。"
10108-CVGroup_Tactic_In_2-1 = "疲れてませんよ！\n……今のところは。"
10108-CVGroup_Tactic_Victory_1-1 = "今日も一日カンペキ！"
10108-CVGroup_Tactic_Victory_2-1 = "勝利ですね。\n当然の結果ですけど。"
