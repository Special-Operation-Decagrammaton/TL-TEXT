[translation]
26001-CVGroup_CommonSkill-1 = "Já entendi todos os seus objetivos."
26001-CVGroup_ExSkill_1-1 = "Iniciando interceptação."
26001-CVGroup_ExSkill_2-1 = "Psiu, vou começar a interceptar."
26001-CVGroup_ExSkill_3-1 = "Meus ouvidos não podem ser enganados."
26001-CVGroup_ExSkill_Level_1-1 = "……Capturado."
26001-CVGroup_ExSkill_Level_2-1 = "……Encontrei."
26001-CVGroup_ExSkill_Level_3-1 = "……Encontro.\nEstabelecendo link."
26001-CVGroup_Formation_In_1-1 = "Uma decisão excelente."
26001-CVGroup_Formation_In_2-1 = "Considero uma escolha apropriada."
26001-CVGroup_Growup_1-1 = "Este poder harmonizado é...\nComo uma orquestra refinada."
26001-CVGroup_Growup_2-1 = "Agora estou mais forte.\nNão me importo se quiser testar."
26001-CVGroup_Growup_3-1 = "Esta melodia suave...\nQuero ouvir mais."
26001-CVGroup_Growup_4-1 = "Agora consigo ouvir melhor.\n...Até o som dos batimentos cardíacos do Sensei."
26001-CVGroup_Relationship_Up_1-1 = "Frequência cardíaca elevada, fluxo sanguíneo acelerado, temperatura corporal subindo.\nA causa é... desconhecida."
26001-CVGroup_Relationship_Up_2-1 = "Gravei todas as conversas que tive com o Sensei até agora.\nPor acaso... você quer ouvir?"
26001-CVGroup_Relationship_Up_3-1 = "A voz do Sensei é como música para mim.\nPorque ela eleva o meu coração."
26001-CVGroup_Relationship_Up_4-1 = "……Eu tenho certeza.\nO Sensei é especial para mim."
