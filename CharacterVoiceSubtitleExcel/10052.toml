[translation]
10052-CVGroup_Battle_Buffed_1-1 = "適確な助言、感謝します。"
10052-CVGroup_Battle_Covered_1-1 = "隠れます。"
10052-CVGroup_Battle_Defense_1-1 = "ふふ、そっちじゃありませんよ。"
10052-CVGroup_Battle_In_1-1 = "たまには身体を動かさないとですね。"
10052-CVGroup_Battle_In_2-1 = "では、作戦をはじめます。"
10052-CVGroup_Battle_Move_1-1 = "整理はこの辺にしておきましょうか。"
10052-CVGroup_Battle_Move_2-1 = "この先に、どのような変数が待ち受けているのでしょう？"
10052-CVGroup_Battle_Recovery_1-1 = "ご支援に感謝します。"
10052-CVGroup_Battle_TacticalAction_1-1 = "移動します。"
10052-CVGroup_Battle_Victory_1-1 = "これにて会議を終了します。\nお疲れ様でした。"
10052-CVGroup_Battle_Victory_2-1 = "記録通り完璧♪"
10052-CVGroup_CommonSkill-1 = "迅速に、制圧します。"
10052-CVGroup_ExSkill_1-1 = "なるほど……そこが弱点ですね？"
10052-CVGroup_ExSkill_2-1 = "へぇ……これは興味深いですね。"
10052-CVGroup_ExSkill_3-1 = "ふふ……今度はこちらを攻めてみましょう。"
10052-CVGroup_ExSkill_Level_1-1 = "ちょっと失礼……記録を開始します。"
10052-CVGroup_ExSkill_Level_2-1 = "私の知識がお役に立てるなら、何よりです。"
10052-CVGroup_ExSkill_Level_3-1 = "隠れたところで、私の記録からは逃れられません！"
10052-CVGroup_Formation_In_1-1 = "合理的な選択ですね。"
10052-CVGroup_Formation_In_2-1 = "今回も、よろしくお願いします。"
10052-CVGroup_Formation_Select-1 = "ふふ。より良い意見がありましたら、是非。"
10052-CVGroup_Growup_1-1 = "新しい事を学ぶのは、いつだって楽しいです。"
10052-CVGroup_Growup_2-1 = "ふふ、これはちょっと楽しいかも……。"
10052-CVGroup_Growup_3-1 = "先生の指導はとても分かりやすいですね。"
10052-CVGroup_Growup_4-1 = "確信はできませんが……\n以前より少し成長できたのかもしれません。ふふっ。"
10052-CVGroup_Relationship_Up_1-1 = "ふふっ、先生のお話はまるで暖かな夕焼けみたいですね。"
10052-CVGroup_Relationship_Up_2-1 = "いつもご協力ありがとうございます、先生。"
10052-CVGroup_Relationship_Up_3-1 = "少しばかり、記録が難しいです……\n良い、という言葉だけじゃ、足りないのかも。"
10052-CVGroup_Relationship_Up_4-1 = "今のこの感情は……\n記録に残したく、ありませんね。"
10052-CVGroup_Tactic_In_1-1 = "敵の出現を確認。\n指揮をお願いします。"
10052-CVGroup_Tactic_In_2-1 = "ふふっ、現場のことなら私にお任せください。"
10052-CVGroup_Tactic_Victory_1-1 = "先生の新たな一面をたくさん記録できま……\n……こほん、失礼。非常に勉強になりました。"
10052-CVGroup_Tactic_Victory_2-1 = "素晴らしい指揮でした。\n後でコーヒーでも、ご一緒にいかがですか？"
