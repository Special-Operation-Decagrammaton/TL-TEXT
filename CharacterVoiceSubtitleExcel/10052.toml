[translation]
10052-CVGroup_Battle_Buffed_1-1 = "Agradeço pelo conselho preciso."
10052-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
10052-CVGroup_Battle_Defense_1-1 = "Fufu, não é por aí."
10052-CVGroup_Battle_In_1-1 = "Às vezes é bom movimentar o corpo, não é?"
10052-CVGroup_Battle_In_2-1 = "Então, vamos começar a operação."
10052-CVGroup_Battle_Move_1-1 = "Vamos deixar a organização para depois."
10052-CVGroup_Battle_Move_2-1 = "Que tipo de variáveis nos aguardam lá na frente?"
10052-CVGroup_Battle_Recovery_1-1 = "Agradeço pelo apoio."
10052-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10052-CVGroup_Battle_Victory_1-1 = "Com isso, encerramos a reunião.\nBom trabalho a todos."
10052-CVGroup_Battle_Victory_2-1 = "Perfeito, conforme registrado♪"
10052-CVGroup_CommonSkill-1 = "Vou neutralizar rapidamente."
10052-CVGroup_ExSkill_1-1 = "Entendo... então esse é o ponto fraco?"
10052-CVGroup_ExSkill_2-1 = "Hee... isso é interessante."
10052-CVGroup_ExSkill_3-1 = "Fufu... desta vez, vamos atacar por aqui."
10052-CVGroup_ExSkill_Level_1-1 = "Com licença... vou iniciar o registro."
10052-CVGroup_ExSkill_Level_2-1 = "Se o meu conhecimento puder ser útil, fico feliz."
10052-CVGroup_ExSkill_Level_3-1 = "Não importa onde se escondam, não escaparão dos meus registros!"
10052-CVGroup_Formation_In_1-1 = "Uma escolha racional."
10052-CVGroup_Formation_In_2-1 = "Conto com você desta vez também."
10052-CVGroup_Formation_Select-1 = "Fufu. Se tiver uma opinião melhor, por favor, compartilhe."
10052-CVGroup_Growup_1-1 = "Aprender coisas novas é sempre divertido."
10052-CVGroup_Growup_2-1 = "Fufu, isso pode ser um pouco divertido..."
10052-CVGroup_Growup_3-1 = "As orientações do Sensei são muito fáceis de entender."
10052-CVGroup_Growup_4-1 = "Não tenho certeza, mas...\nTalvez eu tenha crescido um pouco mais do que antes. Fufu."
10052-CVGroup_Relationship_Up_1-1 = "Fufu, as palavras do Sensei são como um pôr do sol caloroso."
10052-CVGroup_Relationship_Up_2-1 = "Muito obrigada pela cooperação de sempre, Sensei."
10052-CVGroup_Relationship_Up_3-1 = "É um pouco difícil de registrar...\nTalvez a palavra 'bom' não seja suficiente."
10052-CVGroup_Relationship_Up_4-1 = "Este sentimento de agora...\nEu não gostaria de deixá-lo registrado."
10052-CVGroup_Tactic_In_1-1 = "Presença inimiga confirmada.\nPor favor, assuma o comando."
10052-CVGroup_Tactic_In_2-1 = "Fufu, pode deixar o trabalho de campo comigo."
10052-CVGroup_Tactic_Victory_1-1 = "Consegui registrar muitos lados novos do Sensei...\n...cof, perdão. Foi um grande aprendizado."
10052-CVGroup_Tactic_Victory_2-1 = "Foi um comando excelente.\nQue tal tomarmos um café juntos depois?"
