[translation]
26012-CVGroup_CommonSkill-1 = "P-Por favor, aceite isso!"
26012-CVGroup_ExSkill_1-1 = "Vejamos... Você aí!\nPor favor, pare!"
26012-CVGroup_ExSkill_2-1 = "Alguém que pareça estar em perigo...\nAh! Você aí!"
26012-CVGroup_ExSkill_3-1 = "Hmm...\nAh! Cuidado!?"
26012-CVGroup_ExSkill_Level_1-1 = "Esta oficial está entrando em ação!"
26012-CVGroup_ExSkill_Level_2-1 = "A salva-vidas chegou!"
26012-CVGroup_ExSkill_Level_3-1 = "Por favor, parem com as brincadeiras perigosas!"
26012-CVGroup_Formation_In_1-1 = "É a vez desta oficial!"
26012-CVGroup_Formation_In_2-1 = "Entrando em ação!"
26012-CVGroup_Growup_1-1 = "Esta oficial se dedicará ainda mais!"
26012-CVGroup_Growup_2-1 = "Sinto que a minha habilidade de natação melhorou um pouquinho!\nN-Não é só impressão minha, né?"
26012-CVGroup_Growup_3-1 = "Segurança em primeiro lugar, segurança em segundo lugar!\nEsta oficial também protegerá a sua segurança, Sensei!"
26012-CVGroup_Growup_4-1 = "Ainda sou inexperiente, mas...\nVou provar que posso me tornar uma salva-vidas capaz de corresponder às expectativas do Sensei!"
26012-CVGroup_Relationship_Up_1-1 = "Sensei, o senhor é bom em natação?\nQuer que esta oficial lhe ensine?"
26012-CVGroup_Relationship_Up_2-1 = "Sabe... o meu intervalo é daqui a pouco, então...\nO senhor não quer... ir no toboágua junto com esta oficial?"
26012-CVGroup_Relationship_Up_3-1 = "Uhm, o senhor não quer nadar comigo...?"
26012-CVGroup_Relationship_Up_4-1 = "Sabe... esta oficial está sempre de olho no Sensei.\nEntão, por favor, olhe para... esta oficial também..."