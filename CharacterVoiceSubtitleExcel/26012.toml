[translation]
26012-CVGroup_CommonSkill-1 = "P-por favor, aceite isto!"
26012-CVGroup_ExSkill_1-1 = "Vejamos... ali!\nPare aí, por favor!"
26012-CVGroup_ExSkill_2-1 = "Alguém que parece estar em perigo... \nAh! Ali!"
26012-CVGroup_ExSkill_3-1 = "Hum... \nAh! Cuidado!?"
26012-CVGroup_ExSkill_Level_1-1 = "Estou entrando em ação!"
26012-CVGroup_ExSkill_Level_2-1 = "A salva-vidas chegou!"
26012-CVGroup_ExSkill_Level_3-1 = "Por favor, parem com essas brincadeiras perigosas!"
26012-CVGroup_Formation_In_1-1 = "É a minha vez de agir!"
26012-CVGroup_Formation_In_2-1 = "Entrando em ação!"
26012-CVGroup_Growup_1-1 = "Vou me dedicar ainda mais!"
26012-CVGroup_Growup_2-1 = "Sinto que minhas habilidades de natação melhoraram um pouco!\nN-não é só impressão minha, é?"
26012-CVGroup_Growup_3-1 = "Segurança em primeiro lugar, e em segundo também!\nEu também protegerei a sua segurança, Sensei!"
26012-CVGroup_Growup_4-1 = "Ainda sou inexperiente, mas...\nEu vou me tornar uma salva-vidas que corresponda às suas expectativas, Sensei!"
26012-CVGroup_Relationship_Up_1-1 = "Sensei, você é bom em nadar?\nQuer que eu te ensine?"
26012-CVGroup_Relationship_Up_2-1 = "Bem... meu horário de intervalo é logo mais...\nV-você não gostaria de ir no toboágua... comigo?"
26012-CVGroup_Relationship_Up_3-1 = "Hum, você não gostaria de nadar comigo...?"
26012-CVGroup_Relationship_Up_4-1 = "Bem... eu estou sempre cuidando de você, Sensei.\nPor isso, Sensei também... deveria cuidar de mim..."
