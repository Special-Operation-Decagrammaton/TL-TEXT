[translation]
26012-CVGroup_CommonSkill-1 = "う、受け取ってください！"
26012-CVGroup_ExSkill_1-1 = "どれどれ……そこ！\n止まってください！"
26012-CVGroup_ExSkill_2-1 = "危なさそうな人は……\nあっ！そこ！"
26012-CVGroup_ExSkill_3-1 = "ふむ……\nあっ！危ない！？"
26012-CVGroup_ExSkill_Level_1-1 = "本官が出動します！"
26012-CVGroup_ExSkill_Level_2-1 = "ライフセーバーが来ましたよ！"
26012-CVGroup_ExSkill_Level_3-1 = "危険な遊びはやめてください！"
26012-CVGroup_Formation_In_1-1 = "本官の出番ですね！"
26012-CVGroup_Formation_In_2-1 = "出動します！"
26012-CVGroup_Growup_1-1 = "本官、さらに精進します！"
26012-CVGroup_Growup_2-1 = "水泳の腕がちょっと上がったような気がします！\nか、勘違いじゃないですよね？"
26012-CVGroup_Growup_3-1 = "一に安全、二も安全！\n先生の安全も本官が守りますよ！"
26012-CVGroup_Growup_4-1 = "まだまだ未熟者ですが……\n先生の期待に応えられるようなライフセーバーになってみせます！"
26012-CVGroup_Relationship_Up_1-1 = "先生、水泳は得意ですか？\n本官が教えましょうか？"
26012-CVGroup_Relationship_Up_2-1 = "その……もうすぐ休憩時間なのですが……\nほ、本官と一緒にウォータースライダーに……乗りませんか？"
26012-CVGroup_Relationship_Up_3-1 = "えっと、一緒に泳ぎませんか……？"
26012-CVGroup_Relationship_Up_4-1 = "その……本官はいつも先生を見守っています。\nだから先生も……本官のことを……。"
