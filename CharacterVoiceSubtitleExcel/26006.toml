[translation]
26006-CVGroup_CommonSkill-1 = "うふふ、全部見えてますよ？"
26006-CVGroup_ExSkill_1-1 = "観測準備完了！"
26006-CVGroup_ExSkill_2-1 = "私の目から逃れることはできません！"
26006-CVGroup_ExSkill_3-1 = "どれどれ……？"
26006-CVGroup_ExSkill_Level_1-1 = "スキャン完了！"
26006-CVGroup_ExSkill_Level_2-1 = "見つけました！"
26006-CVGroup_ExSkill_Level_3-1 = "ふふ……そこにいたんですね？"
26006-CVGroup_Formation_In_1-1 = "わ、わ、私を信じてくださるんですか？"
26006-CVGroup_Formation_In_2-1 = "私みたいな生徒で、よろしければ……。"
26006-CVGroup_Growup_1-1 = "目がぐっとよくなった気がします！"
26006-CVGroup_Growup_2-1 = "これで……\n先生の一挙手一投足を、もっと詳細に……！"
26006-CVGroup_Growup_3-1 = "ありがとうございます、先生。\nこれからも頑張って、もっともっと観察していきます！"
26006-CVGroup_Growup_4-1 = "このまま努力すれば、\nいつかは特別クラスから抜け出せますよね……？"
26006-CVGroup_Relationship_Up_1-1 = "えへへ……こうやって先生と直接顔を合わせて話そうとすると……\n少し、照れますね。"
26006-CVGroup_Relationship_Up_2-1 = "先生と一緒なら、この極寒の中でも怖くありません！"
26006-CVGroup_Relationship_Up_3-1 = "もっと……もーっと先生について知りたいです！"
26006-CVGroup_Relationship_Up_4-1 = "先生、今夜は……\n月が綺麗……ですね。"
