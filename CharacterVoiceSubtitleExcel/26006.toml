[translation]
26006-CVGroup_CommonSkill-1 = "Ufufu, estou vendo tudo, sabia?"
26006-CVGroup_ExSkill_1-1 = "Preparativos de observação concluídos!"
26006-CVGroup_ExSkill_2-1 = "Você não pode escapar dos meus olhos!"
26006-CVGroup_ExSkill_3-1 = "Vejamos, vejamos...?"
26006-CVGroup_ExSkill_Level_1-1 = "Escaneamento concluído!"
26006-CVGroup_ExSkill_Level_2-1 = "Te encontrei!"
26006-CVGroup_ExSkill_Level_3-1 = "Fufu... então você estava aí, não é?"
26006-CVGroup_Formation_In_1-1 = "V-v-você confia em mim?"
26006-CVGroup_Formation_In_2-1 = "Se uma aluna como eu for o suficiente..."
26006-CVGroup_Growup_1-1 = "Sinto que minha visão melhorou bastante!"
26006-CVGroup_Growup_2-1 = "Com isso...\nPoderei observar cada movimento do Sensei com muito mais detalhes...!"
26006-CVGroup_Growup_3-1 = "Muito obrigada, Sensei.\nVou continuar me esforçando para observar você cada vez mais!"
26006-CVGroup_Growup_4-1 = "Se eu continuar me esforçando assim,\num dia eu vou conseguir sair da classe especial, não vou...?"
26006-CVGroup_Relationship_Up_1-1 = "Ehehe... quando tento conversar cara a cara com o Sensei assim...\nFico um pouco envergonhada."
26006-CVGroup_Relationship_Up_2-1 = "Se estiver com o Sensei, não tenho medo nem deste frio extremo!"
26006-CVGroup_Relationship_Up_3-1 = "Quero saber mais... muito mais sobre o Sensei!"
26006-CVGroup_Relationship_Up_4-1 = "Sensei, esta noite...\nA lua está linda, não está?"
