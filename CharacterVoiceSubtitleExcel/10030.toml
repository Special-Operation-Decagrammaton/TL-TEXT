[translation]
10030-CVGroup_Battle_Buffed_1-1 = "期待に応えてみせます。"
10030-CVGroup_Battle_Covered_1-1 = "隠れます。"
10030-CVGroup_Battle_Defense_1-1 = "無駄です！"
10030-CVGroup_Battle_In_1-1 = "前線でも、やるべきことは変わりません。"
10030-CVGroup_Battle_In_2-1 = "この位置での支援は、少し不思議な感じですね。"
10030-CVGroup_Battle_Move_1-1 = "行きましょう。"
10030-CVGroup_Battle_Move_2-1 = "気を緩めないように、進みましょう。"
10030-CVGroup_Battle_Recovery_1-1 = "支援、ありがとうございます。"
10030-CVGroup_Battle_TacticalAction_1-1 = "今行きます。"
10030-CVGroup_Battle_Victory_1-1 = "みなさん、お疲れ様でした。"
10030-CVGroup_Battle_Victory_2-1 = "引き続き、この調子で進んでいきましょう。"
10030-CVGroup_CommonSkill-1 = "バイタル、問題ありません！\n進撃してください！"
10030-CVGroup_ExSkill_1-1 = "まったく……。"
10030-CVGroup_ExSkill_2-1 = "……発見しました。"
10030-CVGroup_ExSkill_3-1 = "はぁ……。"
10030-CVGroup_ExSkill_Level_1-1 = "仕方ありませんね。"
10030-CVGroup_ExSkill_Level_2-1 = "行きます。"
10030-CVGroup_ExSkill_Level_3-1 = "お任せください。"
10030-CVGroup_Formation_In_1-1 = "先生のためなら、いつでも力になりますよ。"
10030-CVGroup_Formation_In_2-1 = "はい。お任せください、先生。"
10030-CVGroup_Formation_Select-1 = "え、えっと、その……？"
10030-CVGroup_Growup_1-1 = "いつも、ありがとうございます。先生。"
10030-CVGroup_Growup_2-1 = "先生からの期待に、必ず応えてみせます。"
10030-CVGroup_Growup_3-1 = "えっと、嬉しいのですが、今気を緩めるわけには……。"
10030-CVGroup_Growup_4-1 = "どうして、こんな私に……？"
10030-CVGroup_Relationship_Up_1-1 = "衣服を変えると、やはり気持ちにも影響があるのでしょうか。\n少し、困りましたね……。"
10030-CVGroup_Relationship_Up_2-1 = "もう少しだけ、このまま休んでいきませんか……？"
10030-CVGroup_Relationship_Up_3-1 = "あまりだらけるわけにはいかないのですが先生と一緒ですと、つい……。"
10030-CVGroup_Relationship_Up_4-1 = "先生はちゃんと、休息は取られていますか？\n少しで良いですから、一緒にひと休みしません？"
10030-CVGroup_Tactic_In_1-1 = "始めましょう。"
10030-CVGroup_Tactic_In_2-1 = "ご心配なさらず、私がいますから。"
10030-CVGroup_Tactic_Victory_1-1 = "しっかりとした準備の賜物です。"
10030-CVGroup_Tactic_Victory_2-1 = "先生の指揮のおかげです、ありがとうございます。"
