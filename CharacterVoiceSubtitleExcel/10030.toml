[translation]
10030-CVGroup_Battle_Buffed_1-1 = "Vou corresponder às expectativas."
10030-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
10030-CVGroup_Battle_Defense_1-1 = "É inútil!"
10030-CVGroup_Battle_In_1-1 = "Mesmo na linha de frente, o que preciso fazer não muda."
10030-CVGroup_Battle_In_2-1 = "Dar suporte a partir desta posição é uma sensação um pouco estranha."
10030-CVGroup_Battle_Move_1-1 = "Vamos lá."
10030-CVGroup_Battle_Move_2-1 = "Não baixem a guarda, vamos avançar."
10030-CVGroup_Battle_Recovery_1-1 = "Obrigada pelo suporte."
10030-CVGroup_Battle_TacticalAction_1-1 = "Estou indo agora."
10030-CVGroup_Battle_Victory_1-1 = "Bom trabalho a todos."
10030-CVGroup_Battle_Victory_2-1 = "Vamos continuar avançando neste ritmo."
10030-CVGroup_CommonSkill-1 = "Sinais vitais, sem problemas!\nPor favor, avancem!"
10030-CVGroup_ExSkill_1-1 = "Sério mesmo..."
10030-CVGroup_ExSkill_2-1 = "...Alvo detectado."
10030-CVGroup_ExSkill_3-1 = "Haa..."
10030-CVGroup_ExSkill_Level_1-1 = "Não tem jeito, não é?"
10030-CVGroup_ExSkill_Level_2-1 = "Vou nessa."
10030-CVGroup_ExSkill_Level_3-1 = "Pode deixar comigo."
10030-CVGroup_Formation_In_1-1 = "Se for pelo Sensei, sempre darei o meu melhor."
10030-CVGroup_Formation_In_2-1 = "Sim. Pode deixar comigo, Sensei."
10030-CVGroup_Formation_Select-1 = "Eh, bem, isso é...?"
10030-CVGroup_Growup_1-1 = "Muito obrigada por tudo, Sensei."
10030-CVGroup_Growup_2-1 = "Com certeza irei corresponder às expectativas do Sensei."
10030-CVGroup_Growup_3-1 = "Bem, eu fico feliz, mas não posso baixar a guarda agora..."
10030-CVGroup_Growup_4-1 = "Por que alguém como eu...?"
10030-CVGroup_Relationship_Up_1-1 = "Será que mudar de roupa realmente afeta o meu humor?\nEstou um pouco confusa..."
10030-CVGroup_Relationship_Up_2-1 = "Você não gostaria de descansar um pouco mais assim...?"
10030-CVGroup_Relationship_Up_3-1 = "Eu não deveria ficar relaxando tanto, mas quando estou com o Sensei, acabo..."
10030-CVGroup_Relationship_Up_4-1 = "Sensei, você tem descansado o suficiente?\nSó um pouquinho, que tal descansarmos juntos?"
10030-CVGroup_Tactic_In_1-1 = "Vamos começar."
10030-CVGroup_Tactic_In_2-1 = "Não se preocupe, eu estou aqui."
10030-CVGroup_Tactic_Victory_1-1 = "É o resultado de uma preparação sólida."
10030-CVGroup_Tactic_Victory_2-1 = "Foi graças ao comando do Sensei, obrigada."
