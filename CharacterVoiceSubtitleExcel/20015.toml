[translation]
20015-CVGroup_CommonSkill-1 = "ドーンッ！あははっ！"
20015-CVGroup_ExSkill_1-1 = "さあ、私のかっこいい姿を……！\nのあっ！？ふぅ……。"
20015-CVGroup_ExSkill_2-1 = "ここで大活躍を……！\nあぁっ！？危ない危ない……。"
20015-CVGroup_ExSkill_3-1 = "ふふっ、ここで必殺技……！\nとあぁっ！？びっくりしたー……。"
20015-CVGroup_ExSkill_Level_1-1 = "信号弾、発射！\n行っけえぇぇっ！"
20015-CVGroup_ExSkill_Level_2-1 = "私だって力になれるんだから！"
20015-CVGroup_ExSkill_Level_3-1 = "ピンチの時こそ颯爽と！\n私、登場！"
20015-CVGroup_Formation_In_1-1 = "おっ、私の番？\n任せて任せて！"
20015-CVGroup_Formation_In_2-1 = "私？私！私だ―！\n頑張る頑張る！"
20015-CVGroup_Growup_1-1 = "うわぁ～、先生これくれるの？\nえへへっ、ありがとー！"
20015-CVGroup_Growup_2-1 = "えぇっ！？これ、私に！？\nやったー！"
20015-CVGroup_Growup_3-1 = "おお、全身に漲るこの力……！\nえ、そういう効果は無い？\nなんだ、気のせいか……"
20015-CVGroup_Growup_4-1 = "え、先生からのプレゼント！？\n……これで少しは、背が伸びたりするかな？"
20015-CVGroup_Relationship_Up_1-1 = "先生先生、今日暇？\nもういっそのこと、修行部に泊まっていかない？"
20015-CVGroup_Relationship_Up_2-1 = "おぉ、これで私も素敵なレディーに……！\nえ、それはちょっと違うかも？んん……？"
20015-CVGroup_Relationship_Up_3-1 = "先生が何かと付き合ってくれるの、本当に嬉しいんだよね。\nうん、すっごく好き。"
20015-CVGroup_Relationship_Up_4-1 = "大事な相手には、プレゼントをあげるものなんだって！\nだから先生には、私の宝物の……この光る石をあげる！\nどう、キラキラしてるでしょ！？"
