[translation]
20015-CVGroup_CommonSkill-1 = "Bum! Ahahaha!"
20015-CVGroup_ExSkill_1-1 = "Certo, observem meu visual incrível...! \nOpa!? Ufa..."
20015-CVGroup_ExSkill_2-1 = "Vou brilhar aqui...! \nAhhh!? Perigo, perigo..."
20015-CVGroup_ExSkill_3-1 = "Hehe, hora do meu golpe especial...! \nUaaah!? Que susto..."
20015-CVGroup_ExSkill_Level_1-1 = "Sinalizador, disparar! \nVai nessa!"
20015-CVGroup_ExSkill_Level_2-1 = "Eu também posso ser útil, sabia!"
20015-CVGroup_ExSkill_Level_3-1 = "É nas horas difíceis que eu apareço com estilo! \nCheguei!"
20015-CVGroup_Formation_In_1-1 = "Oh, é a minha vez? \nDeixa comigo, deixa comigo!"
20015-CVGroup_Formation_In_2-1 = "Eu? Eu! Sou eu! \nVou dar o meu melhor!"
20015-CVGroup_Growup_1-1 = "Uau, Sensei, isso é para mim? \nEhehe, obrigada!"
20015-CVGroup_Growup_2-1 = "Hã!? Isso é para mim!? \nEba!"
20015-CVGroup_Growup_3-1 = "Oh, sinto esse poder percorrendo todo o meu corpo...! \nAh, não tem esse efeito? \nEntendi, deve ter sido impressão minha..."
20015-CVGroup_Growup_4-1 = "Hã, um presente do Sensei!? \n...Será que com isso eu cresço um pouquinho?"
20015-CVGroup_Relationship_Up_1-1 = "Sensei, Sensei, está livre hoje? \nQue tal passar a noite no Clube de Treinamento?"
20015-CVGroup_Relationship_Up_2-1 = "Oh, com isso eu vou me tornar uma dama elegante...! \nAh, não é bem assim? Hmm...?"
20015-CVGroup_Relationship_Up_3-1 = "Eu fico muito feliz quando o Sensei passa um tempo comigo. \nSim, eu gosto muito de você."
20015-CVGroup_Relationship_Up_4-1 = "Dizem que a gente deve dar presentes para as pessoas importantes! \nPor isso, Sensei, vou te dar o meu tesouro... esta pedra brilhante! \nO que achou? Ela brilha bastante, né!?"
