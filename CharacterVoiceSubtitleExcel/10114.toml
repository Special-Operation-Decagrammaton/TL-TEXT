[translation]
10114-CVGroup_Battle_Buffed_1-1 = "ありがとうございます！頑張りますね！"
10114-CVGroup_Battle_Defense_1-1 = "あぅ、危なかったです……"
10114-CVGroup_Battle_In_1-1 = "1番テーブルさん、持っていきますね！"
10114-CVGroup_Battle_In_2-1 = "ご注文はお決まりですか？"
10114-CVGroup_Battle_Move_1-1 = "少々お待ちください！"
10114-CVGroup_Battle_Move_2-1 = "はい！ただいま参ります！"
10114-CVGroup_Battle_Recovery_1-1 = "ありがとうございます！"
10114-CVGroup_Battle_TacticalAction_1-1 = "つ、次の注文は、ええと……"
10114-CVGroup_Battle_Victory_1-1 = "ご来店ありがとうございました！\n……ど、どこ行くのパンちゃん！"
10114-CVGroup_Battle_Victory_2-1 = "ふふっ、先生のおかげです！\n……ぱ、パンちゃん待って！"
10114-CVGroup_CommonSkill-1 = "ご注文のデザートをお持ちしました！"
10114-CVGroup_ExSkill_1-1 = "最後にこれを……\nよし！\nあ、あれ！？"
10114-CVGroup_ExSkill_2-1 = "仕上げに……\nできた！\nひゃあ！？"
10114-CVGroup_ExSkill_3-1 = "そーっと……\nえっ！\nそんな！？"
10114-CVGroup_ExSkill_Level_1-1 = "あううぅ……\nどうしましょう……"
10114-CVGroup_ExSkill_Level_2-1 = "パンちゃん！落ち着いてください！"
10114-CVGroup_ExSkill_Level_3-1 = "あ、暴れないで……"
10114-CVGroup_Formation_In_1-1 = "はい！お待たせしました！"
10114-CVGroup_Formation_In_2-1 = "お呼びでしょうか？"
10114-CVGroup_Formation_Select-1 = "ひゃっ……！\nお待たせしました、パフェです！"
10114-CVGroup_Growup_1-1 = "ありがとうございます、先生！\n私……うまくできましたか？"
10114-CVGroup_Growup_2-1 = "これからも頑張ります！\nひとつずつ、丁寧に！"
10114-CVGroup_Growup_3-1 = "先生に背中を押していただいたから……\n私は今、ここにいるんです……！"
10114-CVGroup_Growup_4-1 = "一番大切なことはお客様の……\n人の役に立つこと、だと思っています。"
10114-CVGroup_Relationship_Up_1-1 = "いつか、美味しいお料理が作れたら……\n一口目を先生に食べていただきたいんです！"
10114-CVGroup_Relationship_Up_2-1 = "今は自分にできることを一生懸命、頑張りたいと思います。\n先生と一緒ならきっと……うまくやれる気がするんです。"
10114-CVGroup_Relationship_Up_3-1 = "先生の傍にいられて、本当によかったです。\n私、先生のことが……\nせ、先生との時間が、大好きです。"
10114-CVGroup_Relationship_Up_4-1 = "先生、よかったらこのパフェ、召し上がってください！\nその……ちゃんと上手に作れたんです！"
10114-CVGroup_Tactic_In_1-1 = "先生、見守っていてください！"
10114-CVGroup_Tactic_In_2-1 = "今日のシフト終わりまで、頑張りますよ！"
10114-CVGroup_Tactic_Victory_1-1 = "またのご来店を、お待ちしております！"
10114-CVGroup_Tactic_Victory_2-1 = "ふふっ、ご来店、ありがとうございました！"
