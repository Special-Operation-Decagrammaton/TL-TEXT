[translation]
10114-CVGroup_Battle_Buffed_1-1 = "Obrigada! Vou dar o meu melhor!"
10114-CVGroup_Battle_Defense_1-1 = "Ah, essa foi por pouco..."
10114-CVGroup_Battle_In_1-1 = "Estou levando para a mesa 1!"
10114-CVGroup_Battle_In_2-1 = "Já decidiram o pedido?"
10114-CVGroup_Battle_Move_1-1 = "Por favor, aguarde um momento!"
10114-CVGroup_Battle_Move_2-1 = "Sim! Já estou indo!"
10114-CVGroup_Battle_Recovery_1-1 = "Muito obrigada!"
10114-CVGroup_Battle_TacticalAction_1-1 = "O, o próximo pedido é, hum..."
10114-CVGroup_Battle_Victory_1-1 = "Obrigada pela preferência!\n...Ei, para onde você vai, Pan-chan!"
10114-CVGroup_Battle_Victory_2-1 = "Hehe, foi graças ao Sensei!\n...Pa, Pan-chan, espere!"
10114-CVGroup_CommonSkill-1 = "Aqui está a sobremesa que pediu!"
10114-CVGroup_ExSkill_1-1 = "Por último, isto...\nPronto!\nAh, o quê!?"
10114-CVGroup_ExSkill_2-1 = "Para finalizar...\nConsegui!\nKyaa!?"
10114-CVGroup_ExSkill_3-1 = "Com cuidado...\nEh!\nNão pode ser!?"
10114-CVGroup_ExSkill_Level_1-1 = "Auuu...\nO que eu faço..."
10114-CVGroup_ExSkill_Level_2-1 = "Pan-chan! Por favor, acalme-se!"
10114-CVGroup_ExSkill_Level_3-1 = "Ah, não se debata..."
10114-CVGroup_Formation_In_1-1 = "Sim! Desculpe a demora!"
10114-CVGroup_Formation_In_2-1 = "Chamou?"
10114-CVGroup_Formation_Select-1 = "Kyaa...!\nDesculpe a demora, aqui está o parfait!"
10114-CVGroup_Growup_1-1 = "Muito obrigada, Sensei!\nEu... me saí bem?"
10114-CVGroup_Growup_2-1 = "Continuarei me esforçando!\nUm passo de cada vez, com cuidado!"
10114-CVGroup_Growup_3-1 = "Como o Sensei me deu esse empurrãozinho...\nÉ por isso que estou aqui agora...!"
10114-CVGroup_Growup_4-1 = "Acho que a coisa mais importante é...\nSer útil para as pessoas."
10114-CVGroup_Relationship_Up_1-1 = "Se um dia eu conseguir fazer uma comida deliciosa...\nQuero que o Sensei seja o primeiro a provar!"
10114-CVGroup_Relationship_Up_2-1 = "Agora, quero me esforçar ao máximo no que posso fazer.\nSinto que, se estiver com o Sensei... tudo dará certo."
10114-CVGroup_Relationship_Up_3-1 = "Fico muito feliz por estar ao lado do Sensei.\nEu... o Sensei...\nE, eu amo o tempo que passo com o Sensei."
10114-CVGroup_Relationship_Up_4-1 = "Sensei, se quiser, por favor, coma este parfait!\nÉ que... eu consegui fazer direitinho!"
10114-CVGroup_Tactic_In_1-1 = "Sensei, por favor, fique de olho em mim!"
10114-CVGroup_Tactic_In_2-1 = "Vou me esforçar até o fim do meu turno hoje!"
10114-CVGroup_Tactic_Victory_1-1 = "Esperamos pela sua próxima visita!"
10114-CVGroup_Tactic_Victory_2-1 = "Hehe, obrigada pela visita!"
