[translation]
10133-CVGroup_Battle_Buffed_1-1 = "Racional."
10133-CVGroup_Battle_Covered_1-1 = "Inútil."
10133-CVGroup_Battle_Defense_1-1 = "Não vai passar."
10133-CVGroup_Battle_In_1-1 = "A resposta em campo não é um problema."
10133-CVGroup_Battle_In_2-1 = "Vamos mobilizar todos os recursos."
10133-CVGroup_Battle_Move_1-1 = "Continuarei prevendo a situação de batalha."
10133-CVGroup_Battle_Move_2-1 = "Para o próximo espaço conceitual."
10133-CVGroup_Battle_Recovery_1-1 = "A carga diminuiu."
10133-CVGroup_Battle_TacticalAction_1-1 = "Garantindo a superioridade tática."
10133-CVGroup_Battle_Victory_1-1 = "Uma vitória artística."
10133-CVGroup_Battle_Victory_2-1 = "Esta é a possibilidade infinita que encontrei com você."
10133-CVGroup_CommonSkill-1 = "Otimização concluída."
10133-CVGroup_ExSkill_1-1 = "A derrota é--\nAlgo decidido."
10133-CVGroup_ExSkill_2-1 = "Iniciando escaneamento.\nEstou vendo através de você."
10133-CVGroup_ExSkill_3-1 = "Transformando o futuro hipotético--\nEm uma realidade racional."
10133-CVGroup_ExSkill_Level_1-1 = "É o alvo ideal."
10133-CVGroup_ExSkill_Level_2-1 = "Vou suprimir isso."
10133-CVGroup_ExSkill_Level_3-1 = "Este é o poder dos elétrons."
10133-CVGroup_Formation_In_1-1 = "Guerra eletrônica é necessária, certo?"
10133-CVGroup_Formation_In_2-1 = "Vou mostrar o poder deste traje."
10133-CVGroup_Formation_Select-1 = "Está um pouco... apertado demais..."
10133-CVGroup_Growup_1-1 = "A atualização do equipamento foi um sucesso.\nGraças a você, Sensei."
10133-CVGroup_Growup_2-1 = "Nós temos uma relação de complementariedade mútua.\nPosso interpretar dessa forma?"
10133-CVGroup_Growup_3-1 = "Investir tantos recursos em mim... \nSim, eu entendo o significado disso."
10133-CVGroup_Growup_4-1 = "Graças ao Sensei... percebi o sentimento chamado \"gratidão\".\n...É só isso que tenho a dizer."
10133-CVGroup_Relationship_Up_1-1 = "De repente, meu corpo começou a esquentar...\nSerá por causa da função de isolamento térmico do traje?"
10133-CVGroup_Relationship_Up_2-1 = "Então é isso... o momento em que algo incerto ganha contorno."
10133-CVGroup_Relationship_Up_3-1 = "Esse déjà vu que sinto nesta interação...\nTalvez seja porque eu já tinha simulado isso no espaço conceitual..."
10133-CVGroup_Relationship_Up_4-1 = "O Sensei prefere me ver de traje?\n...Não, não há um significado profundo na pergunta..."
10133-CVGroup_Tactic_In_1-1 = "Seu comando e minha análise. Uma combinação racional."
10133-CVGroup_Tactic_In_2-1 = "A análise do alvo de observação já terminou. Agora só falta a prática."
10133-CVGroup_Tactic_Victory_1-1 = "Foi um comando racional."
10133-CVGroup_Tactic_Victory_2-1 = "Conseguimos comprovar a racionalidade do espaço conceitual."
