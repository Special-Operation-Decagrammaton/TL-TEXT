[translation]
10086-CVGroup_Battle_Buffed_1-1 = "ありがとう。"
10086-CVGroup_Battle_Defense_1-1 = "無駄。"
10086-CVGroup_Battle_In_1-1 = "行くよ――\nやるべきことは、ただ一つ。"
10086-CVGroup_Battle_In_2-1 = "練習の前に片付けておかないと。"
10086-CVGroup_Battle_Move_1-1 = "少しテンポを上げようか。"
10086-CVGroup_Battle_Move_2-1 = "遅れるわけには、いかないから。"
10086-CVGroup_Battle_Recovery_1-1 = "ありがとう。"
10086-CVGroup_Battle_TacticalAction_1-1 = "移動する。"
10086-CVGroup_Battle_Victory_1-1 = "任務完了。\n……無事に終わったね。"
10086-CVGroup_Battle_Victory_2-1 = "あっ……うん、ありがとう。"
10086-CVGroup_CommonSkill-1 = "練習前に確認しなきゃ。"
10086-CVGroup_ExSkill_1-1 = "あなたのために用意した旋律……。"
10086-CVGroup_ExSkill_2-1 = "練習した姿を――\nあなたに、見せたい。"
10086-CVGroup_ExSkill_3-1 = "拙い音だけど……\n心を込めてあなたに……！"
10086-CVGroup_ExSkill_Level_1-1 = "準備なら、できてる。"
10086-CVGroup_ExSkill_Level_2-1 = "これからが本番。"
10086-CVGroup_ExSkill_Level_3-1 = "心を込めて、演奏する！"
10086-CVGroup_ExSkill_Level_4-1 = "manontroppo!"
10086-CVGroup_ExSkill_Level_5-1 = "でも、やり過ぎないように……！"
10086-CVGroup_ExSkill_Level_6-1 = "自由に、鮮やかに……！"
10086-CVGroup_ExSkill_Level_7-1 = "フィナーレを！"
10086-CVGroup_ExSkill_Level_8-1 = "elegante!"
10086-CVGroup_ExSkill_Level_9-1 = "これで終わり……！"
10086-CVGroup_Formation_In_1-1 = "うん、準備はできてる。"
10086-CVGroup_Formation_In_2-1 = "先生の指示を、待ってた。"
10086-CVGroup_Formation_Select-1 = "あんまり……見ないで。"
10086-CVGroup_Growup_1-1 = "先生のおかげで、また１小節、進めたきがする。\n……ありがとう。"
10086-CVGroup_Growup_2-1 = "私がこうしていられるのも、先生のおかげ。\nそれが、本当に嬉しい。"
10086-CVGroup_Growup_3-1 = "このままもっと強くなって、あなたに恩返ししたい。\nそんな私を、見守ってくれる？"
10086-CVGroup_Growup_4-1 = "先生が私を頼れるように。\nもっと強くなって……成長したい。\nこれが、今の私が考えている全て。"
10086-CVGroup_Relationship_Up_1-1 = "私なんかでも役に立つと教えてくれたのは、先生だよ。\nそんな先生がいたからこそ……私は……\n本当に、ありがとう。"
10086-CVGroup_Relationship_Up_2-1 = "その……こんな格好だから。\nいつも以上に視線を気にしてしまうかも。\n相手が先生なら、いいんだけど……。"
10086-CVGroup_Relationship_Up_3-1 = "こんな私が、本当にここにいてもいいのかな。\n……ふふっ。あなたは、本当に変わらないね。ありがとう。"
10086-CVGroup_Relationship_Up_4-1 = "先生、手を握っててくれる？\nそうしたら……緊張が、少しは落ち着くと思う。"
10086-CVGroup_Tactic_In_1-1 = "ドレスでもやることは変わらない。"
10086-CVGroup_Tactic_In_2-1 = "先生の指示を、信じてるよ。"
10086-CVGroup_Tactic_Victory_1-1 = "やっぱり、先生の指揮は完璧だね。"
10086-CVGroup_Tactic_Victory_2-1 = "完璧な勝利だった。\n……うん。これで練習時間は、確保できた。"
