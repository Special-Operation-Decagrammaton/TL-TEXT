[translation]
10086-CVGroup_Battle_Buffed_1-1 = "Obrigada."
10086-CVGroup_Battle_Defense_1-1 = "Inútil."
10086-CVGroup_Battle_In_1-1 = "Estou indo--\nSó há uma coisa a ser feita."
10086-CVGroup_Battle_In_2-1 = "Preciso terminar isso antes do treino."
10086-CVGroup_Battle_Move_1-1 = "Vamos aumentar um pouco o ritmo?"
10086-CVGroup_Battle_Move_2-1 = "Não posso me atrasar."
10086-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10086-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10086-CVGroup_Battle_Victory_1-1 = "Missão cumprida.\n...Terminou tudo bem."
10086-CVGroup_Battle_Victory_2-1 = "Ah... sim, obrigada."
10086-CVGroup_CommonSkill-1 = "Preciso verificar antes do treino."
10086-CVGroup_ExSkill_1-1 = "A melodia que preparei para você..."
10086-CVGroup_ExSkill_2-1 = "Quero mostrar a você--\nO resultado do meu treino."
10086-CVGroup_ExSkill_3-1 = "É um som simples, mas...\nColoquei meu coração nele para você...!"
10086-CVGroup_ExSkill_Level_1-1 = "Estou pronta."
10086-CVGroup_ExSkill_Level_2-1 = "Agora é para valer."
10086-CVGroup_ExSkill_Level_3-1 = "Vou tocar com todo o meu coração!"
10086-CVGroup_ExSkill_Level_4-1 = "manontroppo!"
10086-CVGroup_ExSkill_Level_5-1 = "Mas, sem exagerar...!"
10086-CVGroup_ExSkill_Level_6-1 = "Livre e vívida...!"
10086-CVGroup_ExSkill_Level_7-1 = "O gran finale!"
10086-CVGroup_ExSkill_Level_8-1 = "elegante!"
10086-CVGroup_ExSkill_Level_9-1 = "É o fim...!"
10086-CVGroup_Formation_In_1-1 = "Sim, estou pronta."
10086-CVGroup_Formation_In_2-1 = "Eu estava esperando pelas instruções do Sensei."
10086-CVGroup_Formation_Select-1 = "Não... não olhe tanto."
10086-CVGroup_Growup_1-1 = "Sinto que, graças ao Sensei, avancei mais um compasso.\n...Obrigada."
10086-CVGroup_Growup_2-1 = "Eu estar aqui assim também é graças ao Sensei.\nFico muito feliz com isso."
10086-CVGroup_Growup_3-1 = "Quero ficar mais forte e retribuir o que fez por mim.\nVocê vai continuar me observando?"
10086-CVGroup_Growup_4-1 = "Para que o Sensei possa contar comigo.\nQuero ficar mais forte... e crescer.\nIsso é tudo o que penso agora."
10086-CVGroup_Relationship_Up_1-1 = "Foi o Sensei quem me ensinou que até alguém como eu pode ser útil.\nFoi por causa do Sensei que eu...\nMuito obrigada."
10086-CVGroup_Relationship_Up_2-1 = "É que... com esse visual.\nTalvez eu fique mais consciente dos olhares do que o normal.\nMas se for o Sensei, tudo bem..."
10086-CVGroup_Relationship_Up_3-1 = "Será que alguém como eu realmente deveria estar aqui?\n...Fufu. Você realmente não muda, né? Obrigada."
10086-CVGroup_Relationship_Up_4-1 = "Sensei, pode segurar minha mão?\nSe fizer isso... acho que meu nervosismo vai passar um pouco."
10086-CVGroup_Tactic_In_1-1 = "Mesmo de vestido, o que preciso fazer não muda."
10086-CVGroup_Tactic_In_2-1 = "Eu confio nas instruções do Sensei."
10086-CVGroup_Tactic_Victory_1-1 = "Como esperado, a regência do Sensei é perfeita."
10086-CVGroup_Tactic_Victory_2-1 = "Foi uma vitória perfeita.\n...Sim. Com isso, consegui garantir meu tempo de treino."
