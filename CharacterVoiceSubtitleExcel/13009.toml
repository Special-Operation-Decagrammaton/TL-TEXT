[translation]
13009-CVGroup_Battle_Buffed_1-1 = "Minha vez, então."
13009-CVGroup_Battle_Defense_1-1 = "……Que incômodo."
13009-CVGroup_Battle_In_1-1 = "Venham atrás de mim."
13009-CVGroup_Battle_In_2-1 = "Eu vou ficar na frente."
13009-CVGroup_Battle_Move_1-1 = "Aqui já está seguro."
13009-CVGroup_Battle_Move_2-1 = "Quero terminar logo para ir dormir~"
13009-CVGroup_Battle_Recovery_1-1 = "O~bri~ga~da~~"
13009-CVGroup_Battle_TacticalAction_1-1 = "Vou mudar de posição um pouco."
13009-CVGroup_Battle_Victory_1-1 = "Ufa……\nAh~~ Fico feliz por ter sido útil."
13009-CVGroup_Battle_Victory_2-1 = "Ufa……\nAh~~ Agora posso dormir tranquila."
13009-CVGroup_CommonSkill-1 = "Ferimentos? Se eu dormir e acordar, eles curam."
13009-CVGroup_ExSkill_1-1 = "Epa... então vamos lá~"
13009-CVGroup_ExSkill_2-1 = "Tem coisas que eu preciso proteger!"
13009-CVGroup_ExSkill_3-1 = "Vamos lá~, vou mostrar o resultado do meu treinamento!"
13009-CVGroup_ExSkill_Level_1-1 = "Ninguém vai deixar... \nNão, ninguém vai atrapalhar o Sensei."
13009-CVGroup_ExSkill_Level_2-1 = "Eu vou liderar. Vamos!"
13009-CVGroup_ExSkill_Level_3-1 = "Não dói~ não dói~."
13009-CVGroup_Formation_In_1-1 = "Entendido... já estou acordando."
13009-CVGroup_Formation_In_2-1 = "Ah~, então vou voltar a dormir depois que a gente retornar."
13009-CVGroup_Formation_Select-1 = "Hmm. Surpreendentemente confortável?"
13009-CVGroup_Growup_1-1 = "Hm?\nSerá porque dormi bem? Sinto que cresci um pouco."
13009-CVGroup_Growup_2-1 = "Como esperado... quando estou com o Sensei... eu me sinto mais animada."
13009-CVGroup_Growup_3-1 = "Agora... acho que até conseguiria hibernar."
13009-CVGroup_Growup_4-1 = "Sonhar é bom, mas...\nDe agora em diante, quero realizar sonhos com o Sensei."
13009-CVGroup_Relationship_Up_1-1 = "Luz do sol quente, travesseiro fofinho, cobertor macio.\nE... o Sensei. ...Isso é bom."
13009-CVGroup_Relationship_Up_2-1 = "A coisa que eu mais odeio no mundo? Despertadores.\nMas... eu não odeio a voz do Sensei."
13009-CVGroup_Relationship_Up_3-1 = "E-eu também levo as coisas a sério às vezes, sabe...\nQuando estou lutando... e quando estou com o Sensei."
13009-CVGroup_Relationship_Up_4-1 = "É felicidade, mas dá medo.\nTenho medo de que este momento seja apenas um sonho e eu acorde de repente..."
13009-CVGroup_Tactic_In_1-1 = "Ah~...\nSerá que aquelas crianças não dormem?"
13009-CVGroup_Tactic_In_2-1 = "Hmm, partiu... boa sorte...\nEh? Eu também vou?"
13009-CVGroup_Tactic_Victory_1-1 = "Bom trabalho, Sensei.\nJá posso dormir?"
13009-CVGroup_Tactic_Victory_2-1 = "Ah~... acabou. Acabou~\nBoa noite~♬"
