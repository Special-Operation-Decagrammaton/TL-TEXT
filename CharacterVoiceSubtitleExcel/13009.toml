[translation]
13009-CVGroup_Battle_Buffed_1-1 = "私の出番だね。"
13009-CVGroup_Battle_Defense_1-1 = "……邪魔だなあ。"
13009-CVGroup_Battle_In_1-1 = "私の後に付いてきて。"
13009-CVGroup_Battle_In_2-1 = "私が前に立つね。"
13009-CVGroup_Battle_Move_1-1 = "ここはもう安全。"
13009-CVGroup_Battle_Move_2-1 = "早く終わらせて寝たい～"
13009-CVGroup_Battle_Recovery_1-1 = "あ～り～が～と～～"
13009-CVGroup_Battle_TacticalAction_1-1 = "ちょっと位置変わるね。"
13009-CVGroup_Battle_Victory_1-1 = "ふぅ……\nはぁ～～役に立ててよかった。"
13009-CVGroup_Battle_Victory_2-1 = "ふぅ……\nはぁ～～これで安心して眠れるね。"
13009-CVGroup_CommonSkill-1 = "傷？寝て起きたら治るよ。"
13009-CVGroup_ExSkill_1-1 = "よっと……じゃあ行こっか～"
13009-CVGroup_ExSkill_2-1 = "守らなきゃいけないものがあるの！"
13009-CVGroup_ExSkill_3-1 = "さあ～、修行の成果を見せるよ！"
13009-CVGroup_ExSkill_Level_1-1 = "誰も私の昼寝は……\nいや、先生の邪魔はさせない。"
13009-CVGroup_ExSkill_Level_2-1 = "私が先頭に立つよ。行こう！"
13009-CVGroup_ExSkill_Level_3-1 = "痛くな～い痛くな～い。"
13009-CVGroup_Formation_In_1-1 = "分かった……今起きるから。"
13009-CVGroup_Formation_In_2-1 = "ふぁ～、それじゃまた帰ってきてから寝るね。"
13009-CVGroup_Formation_Select-1 = "ふむ。意外と快適？"
13009-CVGroup_Growup_1-1 = "うん？\nよく眠れたからか、なんだか成長、した気分だなぁ。"
13009-CVGroup_Growup_2-1 = "やっぱり……先生といる時は……元気が出る。"
13009-CVGroup_Growup_3-1 = "今なら……冬眠もできそう。"
13009-CVGroup_Growup_4-1 = "夢を見るのもいいけど……\nこれからは先生と、夢を叶えたい。"
13009-CVGroup_Relationship_Up_1-1 = "暖かい日差し、フカフカの枕、柔らかい布団。\nそして……先生。……いいね。"
13009-CVGroup_Relationship_Up_2-1 = "世界で一番嫌いなもの？目覚まし時計。\nでも……先生の声は嫌いじゃないよ。"
13009-CVGroup_Relationship_Up_3-1 = "わ、私だって一応本気を出す時はあるよ……。\n戦う時と……先生と一緒にいる時。"
13009-CVGroup_Relationship_Up_4-1 = "幸せだけど怖い。\n今この瞬間が、夢のように目覚めてしまいそうで……。"
13009-CVGroup_Tactic_In_1-1 = "ふぁ～……\nあの子たちは睡眠とらないのかな。"
13009-CVGroup_Tactic_In_2-1 = "んー、しゅっぱーつ……頑張って……\nえ？私も行くの？"
13009-CVGroup_Tactic_Victory_1-1 = "お疲れ様、先生。\nもう寝てもいい？"
13009-CVGroup_Tactic_Victory_2-1 = "ふぁ～……終わった。終わったよ～\nおやすみなさ～い♬"
