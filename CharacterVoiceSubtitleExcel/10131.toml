[translation]
10131-CVGroup_Battle_Buffed_1-1 = "Agradeço pela sua gentileza."
10131-CVGroup_Battle_Covered_1-1 = "Às vezes, é essencial deixar a caneta de lado."
10131-CVGroup_Battle_Defense_1-1 = "É só isso que você tem?"
10131-CVGroup_Battle_In_1-1 = "Olhar para frente, caminhar com elegância.\nA postura é o que revela o caráter de uma pessoa."
10131-CVGroup_Battle_In_2-1 = "Um bom começo leva a um bom desfecho.\nAssim como nas histórias."
10131-CVGroup_Battle_Move_1-1 = "Um fim significa, na verdade, um novo começo."
10131-CVGroup_Battle_Move_2-1 = "Vamos avançar para o próximo parágrafo."
10131-CVGroup_Battle_Recovery_1-1 = "Sou muito grata."
10131-CVGroup_Battle_TacticalAction_1-1 = "Seria ali...?"
10131-CVGroup_Battle_Victory_1-1 = "Ufa... 5 estrelas... Pelo menos uma crítica de 4 estrelas é garantida."
10131-CVGroup_Battle_Victory_2-1 = "Elogios e glória a todos que deram o seu melhor."
10131-CVGroup_CommonSkill-1 = "Use isto."
10131-CVGroup_ExSkill_1-1 = "Ora essa...!\nTenha cuidado!"
10131-CVGroup_ExSkill_2-1 = "Nunca se esqueça de manter a compostura."
10131-CVGroup_ExSkill_3-1 = "Mantenha a elegância no coração.\nOlhe para frente."
10131-CVGroup_ExSkill_Level_1-1 = "Aqui, pegue isto."
10131-CVGroup_ExSkill_Level_2-1 = "Não precisa devolver."
10131-CVGroup_ExSkill_Level_3-1 = "Tome cuidado da próxima vez."
10131-CVGroup_Formation_In_1-1 = "Criticar é o ato de discernir a essência de um texto."
10131-CVGroup_Formation_In_2-1 = "Se for algo que eu possa fazer, conte comigo."
10131-CVGroup_Formation_Select-1 = "Ah...!?\nOra, puxa...!\nPodemos conversar sobre isso mais tarde?"
10131-CVGroup_Growup_1-1 = "O ser humano é alguém que continua avançando em direção a um amanhã melhor.\nO motivo pelo qual não negligencio meus estudos diários e reflito sobre mim mesma... é justamente por isso."
10131-CVGroup_Growup_2-1 = "Enquanto houver possibilidades, não devemos parar de caminhar.\nVenha, dê-me a mão, Sensei. Vamos seguir juntos."
10131-CVGroup_Growup_3-1 = "Surpreendentemente, poucas pessoas conhecem a si mesmas profundamente.\nMesmo eu, sendo uma crítica...\nMas, ao conhecer a si mesmo, é possível dar um novo passo à frente.\nPois é nisso que reside o crescimento."
10131-CVGroup_Growup_4-1 = "A alma gêmea... é um clichê um tanto batido e usado, eu sei.\nMas às vezes dá vontade de se apegar a essas palavras.\nFufu, isso certamente é um guia para que possamos continuar caminhando."
10131-CVGroup_Relationship_Up_1-1 = "De repente, pensei... eu escrevo muitas críticas, mas quase nunca recebo uma avaliação sobre as minhas próprias críticas.\nSim, é isso. Eu acredito que... se fosse você, Sensei, certamente escreveria uma avaliação maravilhosa."
10131-CVGroup_Relationship_Up_2-1 = "Vendo tantas coisas, é difícil encontrar algo que eu goste do fundo do coração.\nMas... como tudo tem exceções, o que isso seria... é um segredo.\nSim, por enquanto... ainda é."
10131-CVGroup_Relationship_Up_3-1 = "Não há nada que faça meu coração vibrar tanto quanto encontrar uma história maravilhosa.\nPara mim, pelo menos.\nE, para mim, uma pessoa maravilhosa é... como uma história.\nNão entende o que quero dizer?\nFufu... por enquanto, tudo bem."
10131-CVGroup_Relationship_Up_4-1 = "Às vezes, penso no 'e se' eu não tivesse conhecido você, Sensei.\nCertamente teria sido uma história cinzenta... e sem altos e baixos.\nO que isso significa, você pergunta?\nFufu... não tem um significado especial.\n...Talvez, provavelmente."
10131-CVGroup_Tactic_In_1-1 = "Bem, vamos dar o primeiro passo."
10131-CVGroup_Tactic_In_2-1 = "Saudações a todos."
10131-CVGroup_Tactic_Victory_1-1 = "Foi uma história que valeu a pena criticar."
10131-CVGroup_Tactic_Victory_2-1 = "Final feliz... pode ser algo comum, mas o que todos desejam é o que torna uma obra uma obra-prima."
