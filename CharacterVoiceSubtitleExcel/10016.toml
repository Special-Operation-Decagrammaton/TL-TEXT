[translation]
10016-CVGroup_Battle_Buffed_1-1 = "Obrigada."
10016-CVGroup_Battle_Covered_1-1 = "Vou me esconder aqui."
10016-CVGroup_Battle_Defense_1-1 = "Foi por pouco...!"
10016-CVGroup_Battle_In_1-1 = "O básico do jogo em grupo é o trabalho de equipe."
10016-CVGroup_Battle_In_2-1 = "Hmm, minha irmã é melhor nisso do que eu."
10016-CVGroup_Battle_Move_1-1 = "Avançar!"
10016-CVGroup_Battle_Move_2-1 = "Quero logo voltar para casa e jogar..."
10016-CVGroup_Battle_Recovery_1-1 = "Agradeço pelo suporte."
10016-CVGroup_Battle_TacticalAction_1-1 = "Estou me movendo!"
10016-CVGroup_Battle_Victory_1-1 = "Concluído. Vamos para a próxima fase."
10016-CVGroup_Battle_Victory_2-1 = "Nós vencemos."
10016-CVGroup_ExSkill_1-1 = "Ah... perdi.\nNão tem jeito!"
10016-CVGroup_ExSkill_2-1 = "Estou um pouco... frustrada.\nBem, vamos tentar."
10016-CVGroup_ExSkill_3-1 = "Ufa...\nPromessa é promessa."
10016-CVGroup_ExSkill_Level_1-1 = "Não tenho nada contra você, mas esteja preparada."
10016-CVGroup_ExSkill_Level_2-1 = "Com precisão, como se estivesse desenhando pixel por pixel...!"
10016-CVGroup_ExSkill_Level_3-1 = "Disparo contínuo! Lá vou eu!"
10016-CVGroup_Formation_In_1-1 = "Entendido. Eu irei."
10016-CVGroup_Formation_In_2-1 = "Ah, sim. Farei o meu melhor."
10016-CVGroup_Formation_Select-1 = "Hmm... ué?"
10016-CVGroup_Growup_1-1 = "Quero melhorar no desenho e ser ainda mais útil para o Sensei."
10016-CVGroup_Growup_2-1 = "É muito gratificante ver que o esforço valeu a pena."
10016-CVGroup_Growup_3-1 = "Quero me tornar mais madura.\nAssim, poderei ser de mais ajuda para todos e para o Sensei."
10016-CVGroup_Growup_4-1 = "Obrigada, Sensei.\nContinuarei... dando o meu melhor."
10016-CVGroup_Relationship_Up_1-1 = "O Sensei é sempre tão gentil."
10016-CVGroup_Relationship_Up_2-1 = "Vamos continuar criando boas memórias com o Clube de Desenvolvimento de Jogos.\nE também... comigo... n-não é nada!"
10016-CVGroup_Relationship_Up_3-1 = "Quando eu terminar de criar um jogo, quero mostrar para o Sensei primeiro."
10016-CVGroup_Relationship_Up_4-1 = "Às vezes... em vez de estar com a minha irmã,\nqueria ter o Sensei só para mim.\nEi... p-podemos dar as mãos?"
10016-CVGroup_Tactic_In_1-1 = "Já que aceitei, farei isso direito."
10016-CVGroup_Tactic_In_2-1 = "Vamos manter a calma e seguir em frente."
10016-CVGroup_Tactic_Victory_1-1 = "Bom trabalho a todos!"
10016-CVGroup_Tactic_Victory_2-1 = "Concluído, excelente trabalho."
10016-CVGroup_CommonSkill-1 = "Eu vou ajudar!"
