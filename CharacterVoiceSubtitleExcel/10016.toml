[translation]
10016-CVGroup_Battle_Buffed_1-1 = "ありがとうございます。"
10016-CVGroup_Battle_Covered_1-1 = "ここに隠れます。"
10016-CVGroup_Battle_Defense_1-1 = "すれすれでした……！"
10016-CVGroup_Battle_In_1-1 = "パーティープレイの基本は、チームワークですよ。"
10016-CVGroup_Battle_In_2-1 = "うーん、こういうのはお姉ちゃんの方が上手なんだけど。"
10016-CVGroup_Battle_Move_1-1 = "前進！"
10016-CVGroup_Battle_Move_2-1 = "早く帰ってゲームしたい……。"
10016-CVGroup_Battle_Recovery_1-1 = "支援、感謝します。"
10016-CVGroup_Battle_TacticalAction_1-1 = "移動します！"
10016-CVGroup_Battle_Victory_1-1 = "クリア。次のステージに移動しましょう。"
10016-CVGroup_Battle_Victory_2-1 = "私たちの勝利です。"
10016-CVGroup_ExSkill_1-1 = "はあ……負けた。\n仕方ないね！"
10016-CVGroup_ExSkill_2-1 = "少し……悔しい。\nさて、やってみよっか。"
10016-CVGroup_ExSkill_3-1 = "ふう……\n約束は約束だから。"
10016-CVGroup_ExSkill_Level_1-1 = "恨みはないけど覚悟して。"
10016-CVGroup_ExSkill_Level_2-1 = "ドットを打つように緻密に……！"
10016-CVGroup_ExSkill_Level_3-1 = "連続射撃！行きます！"
10016-CVGroup_Formation_In_1-1 = "分かりました。私が行きます。"
10016-CVGroup_Formation_In_2-1 = "あ、はい。ベストを尽くします。"
10016-CVGroup_Formation_Select-1 = "うーん……あれ？"
10016-CVGroup_Growup_1-1 = "絵も上手になりたいし、もっと先生のお役にも立ちたいです。"
10016-CVGroup_Growup_2-1 = "努力が報われるのは、本当に嬉しい事です。"
10016-CVGroup_Growup_3-1 = "もっと大人になりたいです。\nそしたらもっとみんなや、先生の……力になってあげられるはずだから。"
10016-CVGroup_Growup_4-1 = "ありがとうございます、先生。\nこれからも……ベストを尽くします。"
10016-CVGroup_Relationship_Up_1-1 = "先生はいつも優しいですね。"
10016-CVGroup_Relationship_Up_2-1 = "これからもゲーム開発部といい思い出を作っていきましょう。\nそして……私とも……な、何でもありません！"
10016-CVGroup_Relationship_Up_3-1 = "ゲームを作ったら、先生へ一番にお見せしたいです。"
10016-CVGroup_Relationship_Up_4-1 = "たまには……お姉ちゃんと一緒にではなく\n私だけで先生を独占したいですね。\nあの……て、手を繋いでもいいですか？"
10016-CVGroup_Tactic_In_1-1 = "引き受けたからにはしっかりとやります。"
10016-CVGroup_Tactic_In_2-1 = "落ち着いて、前に進みましょう。"
10016-CVGroup_Tactic_Victory_1-1 = "みなさんお疲れ様でした！"
10016-CVGroup_Tactic_Victory_2-1 = "クリア、素晴らしいです。"
10016-CVGroup_CommonSkill-1 = "私が手伝います！"
