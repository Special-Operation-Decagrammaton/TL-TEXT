[translation]
20035-CVGroup_CommonSkill-1 = "Sim... tenha bons sonhos..."
20035-CVGroup_ExSkill_1-1 = "Sim, sim, até aqui está bom."
20035-CVGroup_ExSkill_2-1 = "Ué...? \nAté aqui, até aqui."
20035-CVGroup_ExSkill_3-1 = "Pessoal, hora de partir..."
20035-CVGroup_ExSkill_Level_1-1 = "É por aqui, por aqui. \nEm ordem... isso mesmo."
20035-CVGroup_ExSkill_Level_2-1 = "Por aqui, por aqui. \nVou guiar vocês."
20035-CVGroup_ExSkill_Level_3-1 = "Sem pressa... \nSim. É por aqui."
20035-CVGroup_Formation_In_1-1 = "Para onde devo guiar vocês...?"
20035-CVGroup_Formation_In_2-1 = "Se não conseguir dormir à noite... me avise..."
20035-CVGroup_Growup_1-1 = "Continuo treinando hoje... \nAchou que eu estava dormindo mais? É um engano... provavelmente."
20035-CVGroup_Growup_2-1 = "Preciso renovar minhas energias para o treinamento... \nTalvez eu deva começar trocando meu travesseiro?"
20035-CVGroup_Growup_3-1 = "Ser um guia significa levar alguém a algum lugar... \nEu sou a guia do mundo dos sonhos..."
20035-CVGroup_Growup_4-1 = "Sinto os resultados do meu treinamento... \nHoje vou conseguir dormir profundamente..."
20035-CVGroup_Relationship_Up_1-1 = "Para onde devo te guiar, Sensei...? \nSerá que o quarto seria melhor?"
20035-CVGroup_Relationship_Up_2-1 = "Agora eu sou a guia do sono, Kasuga Tsubaki... \nSe sua insônia piorar... me chame..."
20035-CVGroup_Relationship_Up_3-1 = "Eu também consigo ser uma guia comum... \nIsso também faz parte do meu treinamento..."
20035-CVGroup_Relationship_Up_4-1 = "Quando estou com o Sensei, parece que meu treinamento flui melhor... \nSim... como guia, no sono profundo e em tudo mais..."
