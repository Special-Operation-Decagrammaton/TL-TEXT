[translation]
20035-CVGroup_CommonSkill-1 = "はい……いい夢見てね……。"
20035-CVGroup_ExSkill_1-1 = "はい、はい、そこまでね。"
20035-CVGroup_ExSkill_2-1 = "あれ……？\nそこまで、そこまで。"
20035-CVGroup_ExSkill_3-1 = "みんな、出発だよ……。"
20035-CVGroup_ExSkill_Level_1-1 = "こっちだよ、こっち。\n順番に……そうそう。"
20035-CVGroup_ExSkill_Level_2-1 = "こっち、こっち。\n案内してあげる。"
20035-CVGroup_ExSkill_Level_3-1 = "急がずに……\nうん。こっちだよ。"
20035-CVGroup_Formation_In_1-1 = "どこを案内すればいい……？"
20035-CVGroup_Formation_In_2-1 = "夜眠れなかったら…… 言ってね……。"
20035-CVGroup_Growup_1-1 = "今日も修行中……\n睡眠が増えたんじゃないかって？勘\n違いだよ……たぶん。"
20035-CVGroup_Growup_2-1 = "修行のためにもっと心機一転しなきゃ……\nまずは枕から変えてみようかな？"
20035-CVGroup_Growup_3-1 = "ガイドとはどこかに誰かを案内すること……\n私は夢の国のガイドだよ……。"
20035-CVGroup_Growup_4-1 = "修行の成果が感じられるね……\n今日はぐっすり眠れそう……。"
20035-CVGroup_Relationship_Up_1-1 = "どこに案内しようか、先生……？\nやっぱり寝室がいい～？"
20035-CVGroup_Relationship_Up_2-1 = "今の私は睡眠ガイド春日ツバキ……\n不眠症がひどくなったら……呼んでね……。"
20035-CVGroup_Relationship_Up_3-1 = "普通のガイドもちゃんとできるよ……\nこれも修行の一環だし……。"
20035-CVGroup_Relationship_Up_4-1 = "先生と一緒にいると、修行が上手くいくみたい……\nうん……ガイドも、熟睡も、それ以外も……。"
