[translation]
10124-CVGroup_Battle_Buffed_1-1 = "Sim, pode deixar comigo!"
10124-CVGroup_Battle_Covered_1-1 = "Cobertura garantida."
10124-CVGroup_Battle_Defense_1-1 = "É só isso?"
10124-CVGroup_Battle_In_1-1 = "Estou totalmente preparada."
10124-CVGroup_Battle_In_2-1 = "Inimigo avistado. Iniciando combate."
10124-CVGroup_Battle_Move_1-1 = "Inimigos eliminados. Movendo-me para a próxima área."
10124-CVGroup_Battle_Move_2-1 = "Área garantida. Avançando."
10124-CVGroup_Battle_Recovery_1-1 = "Obrigada pelo suporte!"
10124-CVGroup_Battle_TacticalAction_1-1 = "Movendo-me para o ponto alvo."
10124-CVGroup_Battle_Victory_1-1 = "A partir deste momento, encerro o estado de combate."
10124-CVGroup_Battle_Victory_2-1 = "Sim, era o resultado esperado."
10124-CVGroup_CommonSkill-1 = "Melancia é um vegetal, sabia?!"
10124-CVGroup_ExSkill_1-1 = "Se eu olhar com os olhos da mente... isso é o bastante!! Haa!"
10124-CVGroup_ExSkill_2-1 = "Aqui...? Ué? Por aqui? ...Ali!"
10124-CVGroup_ExSkill_3-1 = "Um mestre não escolhe seu pincel... não escolhe... Ei!"
10124-CVGroup_ExSkill_Level_1-1 = "Posso acertar mesmo sem olhar."
10124-CVGroup_ExSkill_Level_2-1 = "Isso é fácil."
10124-CVGroup_ExSkill_Level_3-1 = "Alvo atingido. Como esperado."
10124-CVGroup_Formation_In_1-1 = "Não importa a situação, serei minuciosa.\nNão haverá exceções."
10124-CVGroup_Formation_In_2-1 = "Pode deixar comigo.\nEu já previa que isso aconteceria\nquando fôssemos para as férias."
10124-CVGroup_Formation_Select-1 = "Por favor, me informe a situação. Responderei imediatamente."
10124-CVGroup_Growup_1-1 = "Há lições a serem aprendidas em qualquer lugar.\nObrigada por me orientar."
10124-CVGroup_Growup_2-1 = "O descanso também faz parte do treinamento... Vou gravar na mente que é preciso saber equilibrar as coisas."
10124-CVGroup_Growup_3-1 = "Sim? A aula de hoje termina aqui?\nPor causa do... mar?\nFufu, então, você não gostaria de me fazer companhia?"
10124-CVGroup_Growup_4-1 = "Tudo o que o Sensei me ensinou...\nJamais esquecerei as memórias que me fizeram crescer."
10124-CVGroup_Relationship_Up_1-1 = "Sensei, poderia me dar um pouco mais do seu tempo?\nSó mais um pouco... assim mesmo."
10124-CVGroup_Relationship_Up_2-1 = "Valorizo tudo o que recebi de você.\nOs objetos, as palavras e os sentimentos."
10124-CVGroup_Relationship_Up_3-1 = "Quando continuamos recebendo, acabamos nos acostumando.\nNão posso me tornar gananciosa a ponto de querer mais..."
10124-CVGroup_Relationship_Up_4-1 = "Só mais um passo... n-não, esqueça. Não é nada.\nPor enquanto, valorizarei esta distância."
10124-CVGroup_Tactic_In_1-1 = "Entrando na área de operação. Sensei, aguardo instruções."
10124-CVGroup_Tactic_In_2-1 = "Entrando em estado de combate a partir de agora."
10124-CVGroup_Tactic_Victory_1-1 = "Será que consegui manter a dignidade do meu cargo?"
10124-CVGroup_Tactic_Victory_2-1 = "Operação concluída. Sem falhas."
