[translation]
10124-CVGroup_Battle_Buffed_1-1 = "はい、お任せください！"
10124-CVGroup_Battle_Covered_1-1 = "遮蔽物確保。"
10124-CVGroup_Battle_Defense_1-1 = "その程度ですか？"
10124-CVGroup_Battle_In_1-1 = "万全を期して参ります。"
10124-CVGroup_Battle_In_2-1 = "敵発見。交戦を開始します。"
10124-CVGroup_Battle_Move_1-1 = "敵殲滅。次のエリアへ移動します。"
10124-CVGroup_Battle_Move_2-1 = "エリアを確保。前進します。"
10124-CVGroup_Battle_Recovery_1-1 = "援護、感謝します！"
10124-CVGroup_Battle_TacticalAction_1-1 = "目標地点へ移動します。"
10124-CVGroup_Battle_Victory_1-1 = "現時刻をもって戦闘態勢を解除します。"
10124-CVGroup_Battle_Victory_2-1 = "ええ、当然の結果です。"
10124-CVGroup_CommonSkill-1 = "スイカは野菜ですのでっ！"
10124-CVGroup_ExSkill_1-1 = "心の眼で見れば……この程度っ！！はぁっ！"
10124-CVGroup_ExSkill_2-1 = "ここ……？あれ？こっち？……そこっ！"
10124-CVGroup_ExSkill_3-1 = "弘法筆を選ばず……選ばず……えいっ！"
10124-CVGroup_ExSkill_Level_1-1 = "見なくとも当てられます。"
10124-CVGroup_ExSkill_Level_2-1 = "これくらい、簡単です。"
10124-CVGroup_ExSkill_Level_3-1 = "命中。予想通りですね。"
10124-CVGroup_Formation_In_1-1 = "どんな状況だろうと、徹底的に。\n例外はありません。"
10124-CVGroup_Formation_In_2-1 = "お任せください。\nバカンスへ行くときに、\nこうなることは、想定しておりましたから。"
10124-CVGroup_Formation_Select-1 = "状況を教えてください。すぐに対応します。"
10124-CVGroup_Growup_1-1 = "どこだろうと学びはあるものですね。\nご指導、ありがとうございます。"
10124-CVGroup_Growup_2-1 = "休息も訓練の一部……メリハリをつける、と胸に刻んでおきます。"
10124-CVGroup_Growup_3-1 = "はい？今日の授業はここまで？\n海、だから……？\nふふっ、それでは、付き合っていただけませんか？"
10124-CVGroup_Growup_4-1 = "先生に教えていただいたことの数々……\n私を成長させてくれた想い出は、決して忘れません。"
10124-CVGroup_Relationship_Up_1-1 = "先生、もう少しだけ、お時間をいただけませんか？\nこのまま……もう少しだけ。"
10124-CVGroup_Relationship_Up_2-1 = "いただいたものは、すべて大切にしています。\n物も、言葉も、気持ちも。"
10124-CVGroup_Relationship_Up_3-1 = "貰い続けていると、慣れてきてしまうものです。\nこれ以上、欲張りになるわけには……。"
10124-CVGroup_Relationship_Up_4-1 = "もう一歩だけ……い、いえ。なんでもありません。\n今はこの距離を大切にします。"
10124-CVGroup_Tactic_In_1-1 = "作戦エリアに進入。先生、ご指示を。"
10124-CVGroup_Tactic_In_2-1 = "現時刻より戦闘態勢に入ります。"
10124-CVGroup_Tactic_Victory_1-1 = "肩書なりの面目は保てたでしょうか。"
10124-CVGroup_Tactic_Victory_2-1 = "作戦終了。抜かりはありません。"
