[translation]
10122-CVGroup_Battle_Buffed_1-1 = "Oh～!"
10122-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
10122-CVGroup_Battle_Defense_1-1 = "Acho que não vai fazer efeito～"
10122-CVGroup_Battle_In_1-1 = "Pessoal, estão prontas?"
10122-CVGroup_Battle_In_2-1 = "Sim! Vamos começar."
10122-CVGroup_Battle_Move_1-1 = "Lá vou eu～!"
10122-CVGroup_Battle_Move_2-1 = "Go～ go～!"
10122-CVGroup_Battle_Recovery_1-1 = "Obrigada!"
10122-CVGroup_Battle_TacticalAction_1-1 = "Será que conseguem me parar～?"
10122-CVGroup_Battle_Victory_1-1 = "Vencemos! Professor, você estava olhando?"
10122-CVGroup_Battle_Victory_2-1 = "Bom trabalho! Daqui em diante é hora de brincar♪"
10122-CVGroup_CommonSkill-1 = "Ah, achei algo bonito☆"
10122-CVGroup_ExSkill_1-1 = "Professor, por aqui☆\nFufu, é lindo, né?"
10122-CVGroup_ExSkill_2-1 = "Por aqui, por aqui.\nAqui. É um lugar privilegiado."
10122-CVGroup_ExSkill_3-1 = "Não solte a minha mão, tá?\nEu queria mostrar isso para você, Professor."
10122-CVGroup_ExSkill_4-1 = "Professor! Olha aquilo!"
10122-CVGroup_ExSkill_5-1 = "Uau! É uma estrela cadente!"
10122-CVGroup_ExSkill_6-1 = "Ah...! Olha! ...É lindo, né."
10122-CVGroup_ExSkill_Level_1-1 = "Sim, eu nunca vou esquecer."
10122-CVGroup_ExSkill_Level_2-1 = "Aquelas lembranças daquela época..."
10122-CVGroup_ExSkill_Level_3-1 = "Vou me lembrar para sempre."
10122-CVGroup_ExSkill_Level_4-1 = "Vou pedir licença um pouquinho～!"
10122-CVGroup_ExSkill_Level_5-1 = "Não tem jeito mesmo."
10122-CVGroup_ExSkill_Level_6-1 = "Depois não diga que eu não avisei."
10122-CVGroup_Formation_In_1-1 = "Sim, sim～!"
10122-CVGroup_Formation_In_2-1 = "Você vai me levar?"
10122-CVGroup_Formation_Select-1 = "Hya!\nAh, qual é..."
10122-CVGroup_Growup_1-1 = "Fufu, obrigada, Professor!\nEu vou continuar me esforçando☆"
10122-CVGroup_Growup_2-1 = "Ei, você não precisa se preocupar tanto comigo, sabe?\nEmbora... eu não ache ruim."
10122-CVGroup_Growup_3-1 = "Ser tratada desse jeito... será que... é só comigo?\nNão, deve ser impressão minha."
10122-CVGroup_Growup_4-1 = "Quando você me trata com tanta gentileza assim... eu fico feliz, sabe."
10122-CVGroup_Relationship_Up_1-1 = "Se tiver algo que você queira, é só me falar!\nVou me esforçar para conseguir para você!"
10122-CVGroup_Relationship_Up_2-1 = "Obrigada por... estar sempre olhando por mim."
10122-CVGroup_Relationship_Up_3-1 = "Quando estou com o Professor, meu coração fica quentinho.\n...Eu ficaria feliz se o Professor se sentisse assim também."
10122-CVGroup_Relationship_Up_4-1 = "Sim... obrigada.\nDe verdade... estou muito feliz."
10122-CVGroup_Tactic_In_1-1 = "Relaxa, relaxa～"
10122-CVGroup_Tactic_In_2-1 = "Let's go～☆"
10122-CVGroup_Tactic_Victory_1-1 = "Foi fácil, né☆"
10122-CVGroup_Tactic_Victory_2-1 = "Beleza, próxima!"
