[translation]
20039-CVGroup_CommonSkill-1 = "しばし休んでいくと良い。"
20039-CVGroup_ExSkill_1-1 = "これで完成なのじゃが……。"
20039-CVGroup_ExSkill_2-1 = "この辺りでやめるべきかの……？"
20039-CVGroup_ExSkill_3-1 = "もう少し様子を見たかったのじゃが……。"
20039-CVGroup_ExSkill_Level_1-1 = "さあ、やってみよ。"
20039-CVGroup_ExSkill_Level_2-1 = "あとは任せようかの。"
20039-CVGroup_ExSkill_Level_3-1 = "其方の時間じゃ。"
20039-CVGroup_Formation_In_1-1 = "其方の選択が正しかったと、証明してみせよう。"
20039-CVGroup_Formation_In_2-1 = "共に参ろうか、先生。"
20039-CVGroup_Formation_Select-1 = "ふむ……こちらに来るのじゃ。"
20039-CVGroup_Growup_1-1 = "成長……か。\nふふ、悪くない気分じゃ。"
20039-CVGroup_Growup_2-1 = "せめて妾の……\nいや、なんでもない。"
20039-CVGroup_Growup_3-1 = "可能性とは良いものじゃ。我の先を示してくれる。\nふふ……すべて、其方のおかげじゃ。"
20039-CVGroup_Growup_4-1 = "まだできる、と……？\nふむ……其方がそう言うのなら、そうなのじゃろうな。"
20039-CVGroup_Relationship_Up_1-1 = "生とは流れゆく川のようなもの。\nそして、それを受け止めてくれる相手を求めるものじゃ。\n深い意味はない……が、意味がないわけでもないぞ？"
20039-CVGroup_Relationship_Up_2-1 = "月光はいつから在ったのか、杯を手に空に問う……ふふ。\nもしかすると、先生はずっと其処に居たのやもしれんのう。"
20039-CVGroup_Relationship_Up_3-1 = "空いた手は妾が取ろう。\n満たされぬ心は、妾が埋めよう。\n……ゆえに、其方は今のままでよいのじゃ。"
20039-CVGroup_Relationship_Up_4-1 = "一期に一度の会、とは言うが、うら寂しいものじゃ。\n……じゃが、妾が先生を忘れることはない。\n何があろうと、いつまでも、な。"
