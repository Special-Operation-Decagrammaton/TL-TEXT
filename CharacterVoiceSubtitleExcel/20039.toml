[translation]
20039-CVGroup_CommonSkill-1 = "Descanse um pouco."
20039-CVGroup_ExSkill_1-1 = "Está completo com isso, mas..."
20039-CVGroup_ExSkill_2-1 = "Deveria parar por aqui...?"
20039-CVGroup_ExSkill_3-1 = "Eu queria observar um pouco mais, mas..."
20039-CVGroup_ExSkill_Level_1-1 = "Vamos, tente você."
20039-CVGroup_ExSkill_Level_2-1 = "Deixarei o resto com você."
20039-CVGroup_ExSkill_Level_3-1 = "É a sua vez."
20039-CVGroup_Formation_In_1-1 = "Vou provar que a sua escolha foi a correta."
20039-CVGroup_Formation_In_2-1 = "Vamos juntos, Sensei."
20039-CVGroup_Formation_Select-1 = "Hum... venha por aqui."
20039-CVGroup_Growup_1-1 = "Crescimento... é?\nHehe, não é uma sensação ruim."
20039-CVGroup_Growup_2-1 = "Pelo menos a minha...\nNão, não é nada."
20039-CVGroup_Growup_3-1 = "Possibilidades são algo bom. Elas me mostram o caminho a seguir.\nHehe... tudo graças a você."
20039-CVGroup_Growup_4-1 = "Ainda posso fazer mais, você diz...?\nHum... se você diz, então deve ser verdade."
20039-CVGroup_Relationship_Up_1-1 = "A vida é como um rio que flui. E ela busca alguém que possa recebê-la. Não há um significado profundo... mas também não é algo sem sentido, entende?"
20039-CVGroup_Relationship_Up_2-1 = "Desde quando o luar existe? Pergunto ao céu com uma taça na mão... hehe. Talvez, Sensei, você sempre esteve lá."
20039-CVGroup_Relationship_Up_3-1 = "Eu segurarei sua mão vazia. Eu preencherei seu coração insatisfeito. ...Por isso, você pode continuar sendo exatamente como é."
20039-CVGroup_Relationship_Up_4-1 = "Dizem que um encontro acontece apenas uma vez na vida, mas isso é um tanto solitário. ...Ainda assim, eu nunca esquecerei você, Sensei. Não importa o que aconteça, para sempre."
