[translation]
20011-CVGroup_Battle_Covered_1-1 = "Me escondi!"
20011-CVGroup_Battle_Defense_1-1 = "Isso não funciona em mim!"
20011-CVGroup_CommonSkill-1 = "Sai da frente, sai da frente!"
20011-CVGroup_ExSkill_1-1 = "Fufun~♪\nEspera, ah! O que é isso?!"
20011-CVGroup_ExSkill_2-1 = "Hum, acho que é isso?\nEspera, ah!?"
20011-CVGroup_ExSkill_3-1 = "Hum, parece bom...\nEspera, ah! Por que isso?!"
20011-CVGroup_ExSkill_Level_1-1 = "Eu não vou te perdoar!"
20011-CVGroup_ExSkill_Level_2-1 = "Eu não vou deixar barato!"
20011-CVGroup_ExSkill_Level_3-1 = "Sua...!"
20011-CVGroup_Formation_In_1-1 = "......Você precisa da minha ajuda? Não tem jeito, né."
20011-CVGroup_Formation_In_2-1 = "Eu estou no meio do meu trabalho de meio período, mas...\nBem, acho que posso ajudar um pouquinho."
20011-CVGroup_Growup_1-1 = "N-não é como se eu estivesse feliz...\nBem, talvez só um pouquinho..."
20011-CVGroup_Growup_2-1 = "Com isso, eu serei mais útil...\nN-não é nada!"
20011-CVGroup_Growup_3-1 = "(Quero ficar mais forte e ser útil para o Sensei e para todos...)"
20011-CVGroup_Growup_4-1 = "Vou continuar me esforçando, então\ncontinue cuidando de mim, Sensei!"
20011-CVGroup_Relationship_Up_1-1 = "De alguma forma, a distância entre mim e o Sensei, tipo..."
20011-CVGroup_Relationship_Up_2-1 = "(Q-que isso! Meu coração está disparado...!? Por que, como assim!?)"
20011-CVGroup_Relationship_Up_3-1 = "Por que você é sempre tão gentil comigo?"
20011-CVGroup_Relationship_Up_4-1 = "Eu consigo me esforçar porque o Sensei cuida de mim.\nEntão, tipo... fique sempre ao meu lado, Sensei."
