[translation]
20011-CVGroup_Battle_Covered_1-1 = "隠れたわ！"
20011-CVGroup_Battle_Defense_1-1 = "効かないよっ！"
20011-CVGroup_CommonSkill-1 = "どいたどいた！"
20011-CVGroup_ExSkill_1-1 = "ふふん～♪\nって、あぁっ！何なのよ！"
20011-CVGroup_ExSkill_2-1 = "うん、こんなもんかな？\nって、ああっ！？"
20011-CVGroup_ExSkill_3-1 = "うん、良い感じ…\nって、あぁっ！どうしてっ！？"
20011-CVGroup_ExSkill_Level_1-1 = "許さないんだからぁ！"
20011-CVGroup_ExSkill_Level_2-1 = "ただじゃおかないんだからっ！"
20011-CVGroup_ExSkill_Level_3-1 = "こんのぉっ！"
20011-CVGroup_Formation_In_1-1 = "……私の助けが必要？しょうがないなー"
20011-CVGroup_Formation_In_2-1 = "バイト中なんだけど……\nまあ、ちょっとくらい手伝ってあげるわよ。"
20011-CVGroup_Growup_1-1 = "べ、別に嬉しくなんか……！\nまあ、ちょっとだけ……。"
20011-CVGroup_Growup_2-1 = "これで、もっと役に……\nな、何でもない！"
20011-CVGroup_Growup_3-1 = "（もっと強くなって、先生やみんなの力になりたい……）"
20011-CVGroup_Growup_4-1 = "これからも頑張るから、\n私のこと見守っててよね、先生！"
20011-CVGroup_Relationship_Up_1-1 = "何だか、先生との距離が、その……。"
20011-CVGroup_Relationship_Up_2-1 = "（な、なにこれ！ドキドキする……！？なんで、どうして！？）"
20011-CVGroup_Relationship_Up_3-1 = "どうしていつも、そんなに優しくしてくれるの？"
20011-CVGroup_Relationship_Up_4-1 = "先生が見守っててくれるから、私は頑張れるの。\nだからその……ずっとそばにいてね、先生。"
