[translation]
26002-CVGroup_CommonSkill-1 = "Eu também vou ajudar~"
26002-CVGroup_ExSkill_1-1 = "Um, dois...!\nUé...?"
26002-CVGroup_ExSkill_2-1 = "Se eu virar assim...\nUé...?"
26002-CVGroup_ExSkill_3-1 = "Prontinho, está pronto!\n...Espere um pouco!?"
26002-CVGroup_ExSkill_Level_1-1 = "Ah, ué?"
26002-CVGroup_ExSkill_Level_2-1 = "Vocês não podem comer isso..."
26002-CVGroup_ExSkill_Level_3-1 = "Isso não é para vocês comerem~!"
26002-CVGroup_Formation_In_1-1 = "Sim, vou dar o meu melhor!"
26002-CVGroup_Formation_In_2-1 = "Pode deixar comigo."
26002-CVGroup_Growup_1-1 = "Será que com isso vou conseguir fazer comidas ainda mais gostosas?"
26002-CVGroup_Growup_2-1 = "Para ser boa na cozinha, ter energia é essencial!"
26002-CVGroup_Growup_3-1 = "Hehe, sinto vontade de cozinhar agora!"
26002-CVGroup_Growup_4-1 = "Vou me esforçar para fazer pratos ainda mais deliciosos!"
26002-CVGroup_Relationship_Up_1-1 = "O tempo que passo com o Sensei é tão divertido\nquanto o tempo que passo cozinhando!"
26002-CVGroup_Relationship_Up_2-1 = "O melhor tempero é... com certeza, o amor!"
26002-CVGroup_Relationship_Up_3-1 = "Fico pensando em quais ingredientes usar\npara expressar essa felicidade através do sabor..."
26002-CVGroup_Relationship_Up_4-1 = "Se for uma comida feita para comer com o Sensei,\nqualquer prato fica delicioso."
