[translation]
26002-CVGroup_CommonSkill-1 = "私もお手伝いしますね～"
26002-CVGroup_ExSkill_1-1 = "せーの……！\nあらら……？"
26002-CVGroup_ExSkill_2-1 = "このままひっくり返せば……\nあれ……？"
26002-CVGroup_ExSkill_3-1 = "これで、完成です！\n……ちょっと待って！？"
26002-CVGroup_ExSkill_Level_1-1 = "あ、あれ？"
26002-CVGroup_ExSkill_Level_2-1 = "みなさんが食べちゃだめなのに……。"
26002-CVGroup_ExSkill_Level_3-1 = "みなさんの分ではありません～！"
26002-CVGroup_Formation_In_1-1 = "はい、全力で頑張ります！"
26002-CVGroup_Formation_In_2-1 = "私にお任せください。"
26002-CVGroup_Growup_1-1 = "これでもっと、美味しいごはんが作れるようになれますでしょうか？"
26002-CVGroup_Growup_2-1 = "お料理上手になるためにも、体力は必須です！"
26002-CVGroup_Growup_3-1 = "ふふ、なんだかお料理がしたくなりますね！"
26002-CVGroup_Growup_4-1 = "もっと美味しいお料理を作るために、頑張ります！"
26002-CVGroup_Relationship_Up_1-1 = "先生と一緒に過ごす時間は、\nお料理をしてる時と同じくらい楽しいです！"
26002-CVGroup_Relationship_Up_2-1 = "最高の香辛料は……正しく、愛です！"
26002-CVGroup_Relationship_Up_3-1 = "この幸せを味で表現するためには\nどんな食材を入れれば良いのか……悩みますね。"
26002-CVGroup_Relationship_Up_4-1 = "先生と一緒に食べるお料理なら、\nどのようなお料理でも、美味しいです。"
