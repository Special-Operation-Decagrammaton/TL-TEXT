[translation]
20040-CVGroup_CommonSkill-1 = "弱点は……ここね。"
20040-CVGroup_ExSkill_1-1 = "あなたは段々\nつよくなぁ～る、つよくなぁ～る……"
20040-CVGroup_ExSkill_2-1 = "さあ、私のために頑張って頂戴。"
20040-CVGroup_ExSkill_3-1 = "どう？強くなってきたの、分かるかしら？"
20040-CVGroup_ExSkill_Level_1-1 = "ほら、効いてきたでしょう？"
20040-CVGroup_ExSkill_Level_2-1 = "万魔殿、総攻撃よ！"
20040-CVGroup_ExSkill_Level_3-1 = "ふふ、これが私の力。"
20040-CVGroup_Formation_In_1-1 = "例のアレをお披露目する時がきたのね。"
20040-CVGroup_Formation_In_2-1 = "あら、私の催眠術が必要なの？"
20040-CVGroup_Formation_Select-1 = "ふふっ、そんなに引っ張らなくてもいいのに。"
20040-CVGroup_Growup_1-1 = "ふふ……いい感じね。順調じゃない？"
20040-CVGroup_Growup_2-1 = "すこし、強くなった気がするわ。"
20040-CVGroup_Growup_3-1 = "ふふっ、この調子で頼むわよ、先生？"
20040-CVGroup_Growup_4-1 = "ふぅ……これで目標は達成できたも同然。\n感謝するわ、先生。"
20040-CVGroup_Relationship_Up_1-1 = "これも信頼を築いていく過程、でしょう？"
20040-CVGroup_Relationship_Up_2-1 = "私のこと、信じてるわよね？先生？"
20040-CVGroup_Relationship_Up_3-1 = "先生との距離が縮まった気がするわ。\nそれも……かなり。ふふっ。"
20040-CVGroup_Relationship_Up_4-1 = "先生にはこの先もずうっと、私のそばにいてもらおうかしら。\n……拒否権？あると思うの？ふふっ。"
