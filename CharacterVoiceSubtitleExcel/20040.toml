[translation]
20040-CVGroup_CommonSkill-1 = "O ponto fraco é... aqui."
20040-CVGroup_ExSkill_1-1 = "Você está ficando cada vez\nmais forte, mais forte..."
20040-CVGroup_ExSkill_2-1 = "Vamos, dê o seu melhor por mim."
20040-CVGroup_ExSkill_3-1 = "Como é? Consegue sentir que está ficando mais forte?"
20040-CVGroup_ExSkill_Level_1-1 = "Veja, está fazendo efeito, não está?"
20040-CVGroup_ExSkill_Level_2-1 = "Pandemonium, ataque total!"
20040-CVGroup_ExSkill_Level_3-1 = "Fufu, este é o meu poder."
20040-CVGroup_Formation_In_1-1 = "Chegou a hora de revelar aquilo, não é?"
20040-CVGroup_Formation_In_2-1 = "Ora, precisa da minha hipnose?"
20040-CVGroup_Formation_Select-1 = "Fufu, não precisa me puxar tanto assim."
20040-CVGroup_Growup_1-1 = "Fufu... que sensação boa. Não estamos indo bem?"
20040-CVGroup_Growup_2-1 = "Sinto que fiquei um pouco mais forte."
20040-CVGroup_Growup_3-1 = "Fufu, continue assim, está bem, Sensei?"
20040-CVGroup_Growup_4-1 = "Ufa... com isso, é como se o objetivo já estivesse alcançado.\nSou grata, Sensei."
20040-CVGroup_Relationship_Up_1-1 = "Isso também faz parte do processo de construir confiança, não é?"
20040-CVGroup_Relationship_Up_2-1 = "Você confia em mim, não confia? Sensei?"
20040-CVGroup_Relationship_Up_3-1 = "Sinto que a distância entre mim e o Sensei diminuiu.\nE bastante... Fufu."
20040-CVGroup_Relationship_Up_4-1 = "Estou pensando em manter o Sensei ao meu lado para sempre a partir de agora.\n...Direito de recusa? Você acha que tem um? Fufu."
