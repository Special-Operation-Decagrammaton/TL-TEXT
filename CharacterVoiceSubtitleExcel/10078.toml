[translation]
10078-CVGroup_CommonSkill-1 = "Surpresa."
10078-CVGroup_ExSkill_1-1 = "O ponto principal desta vez é... aqui!"
10078-CVGroup_ExSkill_2-1 = "Isso, isso... é ali!"
10078-CVGroup_ExSkill_3-1 = "Muito bem! Vamos começar!"
10078-CVGroup_ExSkill_Level_1-1 = "Fiuuu... BUM!!\nHAHAHAHAHA!"
10078-CVGroup_ExSkill_Level_2-1 = "Aqui está, um presente!!!\nHAHAHAHAHA!"
10078-CVGroup_ExSkill_Level_3-1 = "Lá vou eu! Hup!\nHAHAHAHAHA!"
10078-CVGroup_Growup_1-1 = "Ora, ora... na vida, às vezes acontecem coisas assim!"
10078-CVGroup_Growup_2-1 = "Diga-me, Sensei... tem certeza disso?\nSe algo acontecer, você também será um cúmplice, sabia?"
10078-CVGroup_Growup_3-1 = "Oh! Era exatamente o que eu estava procurando. Que ajuda!"
10078-CVGroup_Growup_4-1 = "HAHAHAHA! Não se preocupe.\nQue este seja o nosso segredinho, não acha?"
10078-CVGroup_Relationship_Up_1-1 = "Você faria tudo isso por mim?\nQue pessoa peculiar você é!"
10078-CVGroup_Relationship_Up_2-1 = "Sensei, você é... muito interessante.\nSim, estou te elogiando, viu?"
10078-CVGroup_Relationship_Up_3-1 = "Se precisar de algo, é só pedir.\nSim, \"qualquer coisa\". Eu consigo qualquer coisa para você.\nPelos bastidores, discretamente."
10078-CVGroup_Relationship_Up_4-1 = "HAHAHAHAHA!\nObrigado, Sensei!!"
10078-CVGroup_Battle_Buffed_1-1 = "Não que eu precisasse, mas... agradeço!"
10078-CVGroup_Battle_Covered_1-1 = "Isso parece bem resistente!"
10078-CVGroup_Battle_Defense_1-1 = "O que houve?"
10078-CVGroup_Battle_In_1-1 = "Então você quer atrapalhar...\nNão diga que não avisei, hein?"
10078-CVGroup_Battle_In_2-1 = "HAHAHAHAHA!\nMuito bem, vamos ver do que você é capaz!"
10078-CVGroup_Battle_Move_1-1 = "O tempo é limitado! Vamos lá!"
10078-CVGroup_Battle_Move_2-1 = "Vamos, próximo, próximo!"
10078-CVGroup_Battle_Recovery_1-1 = "Oh! Agradeço!"
10078-CVGroup_Battle_TacticalAction_1-1 = "Go, go!"
10078-CVGroup_Battle_Victory_1-1 = "Ufa! Que alívio!"
10078-CVGroup_Battle_Victory_2-1 = "Maravilhoso! Foi fantástico!"
10078-CVGroup_Formation_In_1-1 = "Ah, trabalho, é? Pode deixar comigo!"
10078-CVGroup_Formation_In_2-1 = "Que escolha excelente!\nHAHAHAHAHA!"
10078-CVGroup_Formation_Select-1 = "Muito bem! Vamos voar!"
10078-CVGroup_Tactic_In_1-1 = "Parece um ótimo lugar para escavar!"
10078-CVGroup_Tactic_In_2-1 = "Vamos fazer o nosso trabalho aqui!"
10078-CVGroup_Tactic_Victory_1-1 = "Ótimo! Vamos continuar assim!"
10078-CVGroup_Tactic_Victory_2-1 = "Maravilhoso! Que desenvolvimento de fonte termal fantástico!"
