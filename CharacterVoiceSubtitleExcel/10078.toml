[translation]
10078-CVGroup_CommonSkill-1 = "サプラ～イズ。"
10078-CVGroup_ExSkill_1-1 = "今回のポイントは……ここだな！"
10078-CVGroup_ExSkill_2-1 = "よし、よし……そこだ！"
10078-CVGroup_ExSkill_3-1 = "よーし！さあ、始めるぞ！"
10078-CVGroup_ExSkill_Level_1-1 = "ヒュ――ンバゴォン！！\nハーハッハッハッハ！"
10078-CVGroup_ExSkill_Level_2-1 = "さあ、プレゼントだ！！！\nハーハッハッハッハ！"
10078-CVGroup_ExSkill_Level_3-1 = "いくぞいくぞ～！とぉっ！\nハーハッハッハッハ！"
10078-CVGroup_Growup_1-1 = "いやぁ～人生、時にはこういう事もあるのだな！"
10078-CVGroup_Growup_2-1 = "時に先生……本当に良いのか？\n何か起きたら先生も共犯になるぞ？"
10078-CVGroup_Growup_3-1 = "おお！ちょうど探していたんだ。助かる！"
10078-CVGroup_Growup_4-1 = "ハーハッハッハ！心配ご無用。\nここは我々だけの秘密、といこうじゃあないか。"
10078-CVGroup_Relationship_Up_1-1 = "私にここまでしてくれるだと？\n奇特な者もいたものだ！"
10078-CVGroup_Relationship_Up_2-1 = "先生は……すごく面白いな。\nうむ、褒めてるのだぞ？"
10078-CVGroup_Relationship_Up_3-1 = "何か必要なものがあれば何でも言ってくれ。\nそう、「何でも」だ。どんなものでも用意するさ。\n裏で、そっとな。"
10078-CVGroup_Relationship_Up_4-1 = "ハーハッハッハッハ！\n感謝する、先生！！"
10078-CVGroup_Battle_Buffed_1-1 = "なくても構わんが……感謝する！"
10078-CVGroup_Battle_Covered_1-1 = "これは頑丈そうだな！"
10078-CVGroup_Battle_Defense_1-1 = "どうしたんだ？"
10078-CVGroup_Battle_In_1-1 = "邪魔をするのだな……\nどうなっても知らないぞ？"
10078-CVGroup_Battle_In_2-1 = "ハーハッハッハッハ！\nいいぞ、やってみようじゃないか！"
10078-CVGroup_Battle_Move_1-1 = "時間は限られているからな！いくぞ！"
10078-CVGroup_Battle_Move_2-1 = "さ～、次次～！"
10078-CVGroup_Battle_Recovery_1-1 = "おっ！感謝する！"
10078-CVGroup_Battle_TacticalAction_1-1 = "ゴ～ゴ～！"
10078-CVGroup_Battle_Victory_1-1 = "ふぅ！スッキリしたな！"
10078-CVGroup_Battle_Victory_2-1 = "ワンダフル！素晴らしかったぞ！"
10078-CVGroup_Formation_In_1-1 = "ああ、作業だな！任せてくれ！"
10078-CVGroup_Formation_In_2-1 = "素晴らしい選択じゃないか！\nハーハッハッハッハ！"
10078-CVGroup_Formation_Select-1 = "よ～し！飛んでいくか！"
10078-CVGroup_Tactic_In_1-1 = "掘り心地が良さそうな所じゃあないか！"
10078-CVGroup_Tactic_In_2-1 = "今回の現場をこことしよう！"
10078-CVGroup_Tactic_Victory_1-1 = "グレートだ！このまま進めるぞ！"
10078-CVGroup_Tactic_Victory_2-1 = "ワンダフル！素晴らしい温泉開発だったな！"
