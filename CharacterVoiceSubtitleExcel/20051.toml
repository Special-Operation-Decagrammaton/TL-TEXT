[translation]
20051-CVGroup_CommonSkill-1 = "Com amor! Com coragem! E com o poder da amizade!"
20051-CVGroup_ExSkill_1-1 = "Do alimentador para a câmara... Magia de seis linhas em sentido horário...!"
20051-CVGroup_ExSkill_2-1 = "Poder inabalável!"
20051-CVGroup_ExSkill_3-1 = "Esta sou eu!"
20051-CVGroup_ExSkill_Level_1-1 = "Bolt Forward! Thermite Pink!"
20051-CVGroup_ExSkill_Level_2-1 = "A defensora da justiça, chegou! É isso!"
20051-CVGroup_ExSkill_Level_3-1 = "Brilho! Estrondo! Bam-bam-bam!"
20051-CVGroup_Formation_In_1-1 = "Thermite Pink! Saindo!"
20051-CVGroup_Formation_In_2-1 = "O esquadrão mágico da justiça, vai nessa!"
20051-CVGroup_Formation_Select-1 = "Uzawa Reisa! Também conhecida como... Thermite Pink!"
20051-CVGroup_Growup_1-1 = "Isso... tem certeza de que eu posso aceitar?\nMuito obrigada!"
20051-CVGroup_Growup_2-1 = "Com esse poder que o Sensei me deu, eu vou mostrar que consigo crescer!"
20051-CVGroup_Growup_3-1 = "Uzawa Reisa vai buscar patamares ainda mais altos!"
20051-CVGroup_Growup_4-1 = "Pelo Sensei, eu...! \nPosso fazer uma segunda transformação... não, até dezessete transformações!!"
20051-CVGroup_Relationship_Up_1-1 = "O poder dos laços é forte! Sim, é mesmo!\nÉ o mais forte de todos!"
20051-CVGroup_Relationship_Up_2-1 = "Eu admiro a força dos heróis, mas...\nBem... eu também admiro muito a sua gentileza, Sensei."
20051-CVGroup_Relationship_Up_3-1 = "O Sensei sempre me elogia, não é?\nIsso me deixa... muito feliz."
20051-CVGroup_Relationship_Up_4-1 = "A paz mundial e o Sensei, eu vou proteger... ambos!"
