[translation]
20036-CVGroup_CommonSkill-1 = "Receba isso!"
20036-CVGroup_ExSkill_1-1 = "Ufa, que divertido... wa, waa!?"
20036-CVGroup_ExSkill_2-1 = "Sensei~! Hya!?"
20036-CVGroup_ExSkill_3-1 = "Até que não é tão ruim... mas o queee!?"
20036-CVGroup_ExSkill_Level_1-1 = "Deixei escapar, cuidado!!"
20036-CVGroup_ExSkill_Level_2-1 = "Lá vai voando!!"
20036-CVGroup_ExSkill_Level_3-1 = "Desviaaaaa!!"
20036-CVGroup_Formation_In_1-1 = "Não temos tempo a perder!"
20036-CVGroup_Formation_In_2-1 = "Vamos logo!"
20036-CVGroup_Growup_1-1 = "Sobre isso... brincar é legal, mas...\nTem certeza de que isso está certo...?"
20036-CVGroup_Growup_2-1 = "Isso é bom, muito bom~! \nDessa vez eu não vou me segurar!"
20036-CVGroup_Growup_3-1 = "No fundo, você também quer brincar, né Sensei?\nNão precisa nem dizer, eu já sei!"
20036-CVGroup_Growup_4-1 = "Você pretende organizar um torneio de pistolas d'água? \nEntendi! Eu vou acabar com todo mundo!"
20036-CVGroup_Relationship_Up_1-1 = "...Sim, estou me divertindo muito agora, Sensei."
20036-CVGroup_Relationship_Up_2-1 = "Vou aproveitar ao máximo! \nSe acontecer alguma coisa, você me para, hein!"
20036-CVGroup_Relationship_Up_3-1 = "Essa sensação... acho que é a primeira vez."
20036-CVGroup_Relationship_Up_4-1 = "Se, Sensei. Aquilo... sobre isso...\nVo, você quer... nadar... comigo?"
