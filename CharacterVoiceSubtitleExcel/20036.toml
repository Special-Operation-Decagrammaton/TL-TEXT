[translation]
20036-CVGroup_CommonSkill-1 = "受け取りなさい！"
20036-CVGroup_ExSkill_1-1 = "ふぅ、楽し……わ、わぁ！？"
20036-CVGroup_ExSkill_2-1 = "先生～！ひゃっ！？"
20036-CVGroup_ExSkill_3-1 = "意外と悪くないか……もおおおー！？！？"
20036-CVGroup_ExSkill_Level_1-1 = "逃しちゃった、気を付けて！！"
20036-CVGroup_ExSkill_Level_2-1 = "飛んでくわよ！！"
20036-CVGroup_ExSkill_Level_3-1 = "よけて～～～！！"
20036-CVGroup_Formation_In_1-1 = "迷っている暇は無いわよ！"
20036-CVGroup_Formation_In_2-1 = "さっさと行くわよ！"
20036-CVGroup_Growup_1-1 = "その…遊ぶのは良いんだけど……\n本当にこれで良いんだよね……？"
20036-CVGroup_Growup_2-1 = "いいね、いいね～！\n今回は遠慮しないんだからね！"
20036-CVGroup_Growup_3-1 = "やっぱ先生も遊びたいんだよね？\n言わなくても分かってるって！"
20036-CVGroup_Growup_4-1 = "水鉄砲大会でも開くつもり？\n分かった！私が全部やっつけてあげる！"
20036-CVGroup_Relationship_Up_1-1 = "……うん、今すごく楽しいよ先生。"
20036-CVGroup_Relationship_Up_2-1 = "全力で楽しんでやるんだから！\nなにかあったら先生が止めてよね！"
20036-CVGroup_Relationship_Up_3-1 = "この感じ……なんだか初めてかも。"
20036-CVGroup_Relationship_Up_4-1 = "せ、先生。あの……その……\nい、一緒に……水泳でもする……？"
