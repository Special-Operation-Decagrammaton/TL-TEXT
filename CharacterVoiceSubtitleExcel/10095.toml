[translation]
10095-CVGroup_Battle_Buffed_1-1 = "ありがとうございます。\n元気が出ますね。"
10095-CVGroup_Battle_Covered_1-1 = "隠れます。"
10095-CVGroup_Battle_Defense_1-1 = "その程度、ききません！"
10095-CVGroup_Battle_In_1-1 = "お掃除をはじめます。"
10095-CVGroup_Battle_In_2-1 = "とりあえず始めましょう。\nやることがたくさんです。"
10095-CVGroup_Battle_Move_1-1 = "こちらのお掃除は完了いたしました。"
10095-CVGroup_Battle_Move_2-1 = "それでは次の位置に。"
10095-CVGroup_Battle_Recovery_1-1 = "ありがとうございます。\n元気が出ました。"
10095-CVGroup_Battle_TacticalAction_1-1 = "移動します。"
10095-CVGroup_Battle_Victory_1-1 = "今日のお仕事はこれで終了です。\nいかがでしたか、ご主人様？"
10095-CVGroup_Battle_Victory_2-1 = "やりました、先生！もう……お姉ちゃん！"
10095-CVGroup_CommonSkill-1 = "お掃除は丁寧に……\nうん、できました！"
10095-CVGroup_ExSkill_1-1 = "いち、に……！\nよし、クリア！"
10095-CVGroup_ExSkill_2-1 = "ここと……こっち……！\nやった！"
10095-CVGroup_ExSkill_3-1 = "落ち着いて、ひとつずつ……\nよし！"
10095-CVGroup_ExSkill_Level_1-1 = "スコア更新！\n先生、見てくれました？"
10095-CVGroup_ExSkill_Level_2-1 = "記録更新！\n先生、どうでしょう？"
10095-CVGroup_ExSkill_Level_3-1 = "ランキングサイトにあげてみようかな……。"
10095-CVGroup_Formation_In_1-1 = "はい、先生……いえ、ご主人様。\n私の番ですね。"
10095-CVGroup_Formation_In_2-1 = "わかりました。\n私で良いのですね？"
10095-CVGroup_Formation_Select-1 = "ひやあっ！？\nふぅ……危なかった。"
10095-CVGroup_Growup_1-1 = "どうでしょう、ご主人様？\n私、少しは成長できたのでしょうか？\n生徒として……そして、メイドとして。"
10095-CVGroup_Growup_2-1 = "努力の方向性はもちろん大事ですが……\n時には努力をしているという事実が、安心感を与えてくれるんです。"
10095-CVGroup_Growup_3-1 = "私は……こうして元気をもらえる相手がいて\n本当に良かったと思っています。"
10095-CVGroup_Growup_4-1 = "いつも見守ってくださりありがとうございます。\nこれからもご主人様と一緒に……頑張っていきたいです。"
10095-CVGroup_Relationship_Up_1-1 = "先生……ご主人様……呼び方どっちがいいですか？\n私としては……ご主人様かなぁ……？"
10095-CVGroup_Relationship_Up_2-1 = "私たちの距離、近づいたのでしょうか？\nそれなら……嬉しいです。えへへ。"
10095-CVGroup_Relationship_Up_3-1 = "素晴らしい主人に仕えられることこそ、メイドの喜びと言いますよね。\n先生は私にとってそんな存在です……。"
10095-CVGroup_Relationship_Up_4-1 = "ご～しゅじんさま♪\nえへへ。呼んでみたかっただけです。"
10095-CVGroup_Tactic_In_1-1 = "先生……ご主人様が見てくださってるから……！"
10095-CVGroup_Tactic_In_2-1 = "今だけは、完璧なメイドになってみせます！"
10095-CVGroup_Tactic_Victory_1-1 = "勝ちました！\n……よかったです。"
10095-CVGroup_Tactic_Victory_2-1 = "どうでしょう……？\n私、うまくやれてましたか？"
