[translation]
10095-CVGroup_Battle_Buffed_1-1 = "Obrigada.\nSinto-me revigorada."
10095-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
10095-CVGroup_Battle_Defense_1-1 = "Isso não é nada!"
10095-CVGroup_Battle_In_1-1 = "Vou começar a limpeza."
10095-CVGroup_Battle_In_2-1 = "Vamos começar logo.\nTem muita coisa para fazer."
10095-CVGroup_Battle_Move_1-1 = "A limpeza por aqui foi concluída."
10095-CVGroup_Battle_Move_2-1 = "Então, para a próxima posição."
10095-CVGroup_Battle_Recovery_1-1 = "Obrigada.\nRecuperei minhas energias."
10095-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10095-CVGroup_Battle_Victory_1-1 = "O trabalho de hoje termina aqui.\nO que achou, mestre?"
10095-CVGroup_Battle_Victory_2-1 = "Conseguimos, Sensei! E também... irmã mais velha!"
10095-CVGroup_CommonSkill-1 = "Limpar com cuidado...\nIsso, consegui!"
10095-CVGroup_ExSkill_1-1 = "Um, dois...!\nCerto, limpo!"
10095-CVGroup_ExSkill_2-1 = "Aqui e... ali...!\nConsegui!"
10095-CVGroup_ExSkill_3-1 = "Com calma, um por um...\nIsso!"
10095-CVGroup_ExSkill_Level_1-1 = "Recorde batido!\nSensei, você viu?"
10095-CVGroup_ExSkill_Level_2-1 = "Recorde atualizado!\nSensei, o que achou?"
10095-CVGroup_ExSkill_Level_3-1 = "Será que devo postar no site de ranking...?"
10095-CVGroup_Formation_In_1-1 = "Sim, Sensei... digo, mestre.\nÉ a minha vez, não é?"
10095-CVGroup_Formation_In_2-1 = "Entendido.\nSou eu quem devo ir?"
10095-CVGroup_Formation_Select-1 = "Ahhh!?\nUfa... essa foi por pouco."
10095-CVGroup_Growup_1-1 = "O que acha, mestre?\nSerá que cresci um pouco?\nComo aluna... e como empregada."
10095-CVGroup_Growup_2-1 = "A direção do esforço é importante, claro...\nMas, às vezes, o simples fato de estar se esforçando já traz uma sensação de paz."
10095-CVGroup_Growup_3-1 = "Eu... fico muito feliz por ter alguém que me dá forças assim."
10095-CVGroup_Growup_4-1 = "Obrigada por sempre cuidar de mim.\nQuero continuar me esforçando ao seu lado... mestre."
10095-CVGroup_Relationship_Up_1-1 = "Sensei... mestre... qual forma de chamar você prefere?\nEu, pessoalmente... prefiro mestre...?"
10095-CVGroup_Relationship_Up_2-1 = "Nossa distância diminuiu?\nSe for assim... fico feliz. Ehehe."
10095-CVGroup_Relationship_Up_3-1 = "Dizem que servir a um mestre maravilhoso é a maior alegria de uma empregada.\nSensei, você é essa pessoa para mim..."
10095-CVGroup_Relationship_Up_4-1 = "Meeestre♪\nEhehe. Só queria experimentar chamar assim."
10095-CVGroup_Tactic_In_1-1 = "Sensei... já que o mestre está olhando...!"
10095-CVGroup_Tactic_In_2-1 = "Só por agora, vou me tornar a empregada perfeita!"
10095-CVGroup_Tactic_Victory_1-1 = "Vencemos!\n...Que bom."
10095-CVGroup_Tactic_Victory_2-1 = "O que acha...?\nEu me saí bem?"
