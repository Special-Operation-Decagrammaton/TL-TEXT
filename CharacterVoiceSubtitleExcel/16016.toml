[translation]
16016-CVGroup_Battle_Buffed_1-1 = "Isso ajudou muito."
16016-CVGroup_Battle_Defense_1-1 = "Não vai funcionar!"
16016-CVGroup_Battle_In_1-1 = "Eu assumirei a liderança."
16016-CVGroup_Battle_In_2-1 = "Por favor, ouça o meu ritmo!"
16016-CVGroup_Battle_Move_1-1 = "Para a próxima música!"
16016-CVGroup_Battle_Move_2-1 = "Deixe-se levar pela melodia!"
16016-CVGroup_Battle_Recovery_1-1 = "Agradeço."
16016-CVGroup_Battle_TacticalAction_1-1 = "Hah!"
16016-CVGroup_Battle_Victory_1-1 = "Foi um palco maravilhoso."
16016-CVGroup_Battle_Victory_2-1 = "Uma melodia suave para o local!"
16016-CVGroup_CommonSkill-1 = "No ritmo!"
16016-CVGroup_ExSkill_1-1 = "Vamos levar nossa voz até vocês!"
16016-CVGroup_ExSkill_2-1 = "Vamos nessa!"
16016-CVGroup_ExSkill_3-1 = "Vamos para o sprint final!"
16016-CVGroup_ExSkill_Level_1-1 = "Haaah!"
16016-CVGroup_ExSkill_Level_2-1 = "Lá vou eu!"
16016-CVGroup_ExSkill_Level_3-1 = "Todos juntos!"
16016-CVGroup_Formation_In_1-1 = "Por favor, deixe este assunto comigo."
16016-CVGroup_Formation_In_2-1 = "Prometo uma performance precisa."
16016-CVGroup_Formation_Select-1 = "Fufu, você me chamou?"
16016-CVGroup_Growup_1-1 = "Obrigada pelo apoio, Sensei.\nEu recebi, com certeza."
16016-CVGroup_Growup_2-1 = "Apoio do Sensei... agradeço.\nComo não tenho muitas oportunidades assim, é uma sensação muito estranha."
16016-CVGroup_Growup_3-1 = "Dedicarei meus esforços para que possamos\napresentar um palco ainda melhor."
16016-CVGroup_Growup_4-1 = "Isto é... fufu.\nPor favor, aguarde pelo que vem a seguir."
16016-CVGroup_Relationship_Up_1-1 = "É que... sinto a distância entre mim e o Sensei.\nSe não era essa a sua intenção...\nPoderia se aproximar um pouco mais?"
16016-CVGroup_Relationship_Up_2-1 = "Mesmo sendo um traje diferente do habitual, por algum motivo, meu coração se acalma.\nPor que será...?"
16016-CVGroup_Relationship_Up_3-1 = "Se houver algo que eu possa fazer, é só pedir."
16016-CVGroup_Relationship_Up_4-1 = "Este bater do meu coração...\nAcho que é porque a apresentação está próxima..."
16016-CVGroup_Tactic_In_1-1 = "Vamos proporcionar um momento inesquecível."
16016-CVGroup_Tactic_In_2-1 = "Fufu, pode esperar."
16016-CVGroup_Tactic_Victory_1-1 = "O que achou?\nEstou aguardando suas impressões."
16016-CVGroup_Tactic_Victory_2-1 = "Ufa... consegui cantar até o fim sem problemas."
