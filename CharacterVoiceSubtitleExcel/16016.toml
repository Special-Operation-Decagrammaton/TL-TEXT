[translation]
16016-CVGroup_Battle_Buffed_1-1 = "助かりました。"
16016-CVGroup_Battle_Defense_1-1 = "効きません！"
16016-CVGroup_Battle_In_1-1 = "私がリードいたしましょう。"
16016-CVGroup_Battle_In_2-1 = "私のリズムを聞いて下さい！"
16016-CVGroup_Battle_Move_1-1 = "次の曲目へ！"
16016-CVGroup_Battle_Move_2-1 = "旋律に乗って！"
16016-CVGroup_Battle_Recovery_1-1 = "感謝します。"
16016-CVGroup_Battle_TacticalAction_1-1 = "はっ！"
16016-CVGroup_Battle_Victory_1-1 = "素晴らしいステージでした。"
16016-CVGroup_Battle_Victory_2-1 = "会場にやわらかな旋律を！"
16016-CVGroup_CommonSkill-1 = "リズムに乗って！"
16016-CVGroup_ExSkill_1-1 = "私たちの歌声を届けます！"
16016-CVGroup_ExSkill_2-1 = "さあ、参りましょう！"
16016-CVGroup_ExSkill_3-1 = "ラストスパート、いきましょう！"
16016-CVGroup_ExSkill_Level_1-1 = "はああっ！"
16016-CVGroup_ExSkill_Level_2-1 = "参ります！"
16016-CVGroup_ExSkill_Level_3-1 = "皆様ご一緒に！"
16016-CVGroup_Formation_In_1-1 = "この件は私にお任せください。"
16016-CVGroup_Formation_In_2-1 = "正確なパフォーマンスを、お約束いたします。"
16016-CVGroup_Formation_Select-1 = "ふふ、お呼びでしょうか？"
16016-CVGroup_Growup_1-1 = "ご支援ありがとうございます、先生。\nたしかに、受け取りました。"
16016-CVGroup_Growup_2-1 = "先生からの支援……感謝いたします。\nあまりこういう機会がないので、とても不思議な感覚です。"
16016-CVGroup_Growup_3-1 = "より良いステージをお届けできるよう、\n尽力いたしますね。"
16016-CVGroup_Growup_4-1 = "これは……ふふ。\n今後に期待していてくださいね。"
16016-CVGroup_Relationship_Up_1-1 = "その……先生との距離を感じてしまって。\nそういうつもりではないのでしたら……\nもう少し、近づいていただけますか？"
16016-CVGroup_Relationship_Up_2-1 = "普段と違う衣装なのに、何故だか心が落ち着くのです。\nどうしてでしょう……？"
16016-CVGroup_Relationship_Up_3-1 = "何かできることがありましたら、何なりと。"
16016-CVGroup_Relationship_Up_4-1 = "この胸の高鳴り……\nきっと本番が近いからなのだと、思います……。"
16016-CVGroup_Tactic_In_1-1 = "心に残るひとときを、お届けしましょう。"
16016-CVGroup_Tactic_In_2-1 = "ふふっ、ご期待ください。"
16016-CVGroup_Tactic_Victory_1-1 = "いかがでしょうか？\n感想をお待ちしております。"
16016-CVGroup_Tactic_Victory_2-1 = "ふぅ……無事歌い切ることができました。"
