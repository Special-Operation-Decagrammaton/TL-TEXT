16003-CVGroup_ExSkill_1-1 = "腰を抜かさせてあげましょう。"
16003-CVGroup_ExSkill_2-1 = "天罰の光を！"
16003-CVGroup_ExSkill_3-1 = "これは痛いですよ！"
