16003-CVGroup_Battle_Move_1-1 = "ここはもう安全です。"
16003-CVGroup_Battle_Move_2-1 = "次の目標地点へ移動しましょう。"
16003-CVGroup_Battle_Recovery_1-1 = "助かりました、感謝を。"
