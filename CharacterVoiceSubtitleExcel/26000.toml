[translation]
26000-CVGroup_CommonSkill-1 = "バイタル正常、進んでください。"
26000-CVGroup_ExSkill_1-1 = "痛いですか？\nではこちらを。"
26000-CVGroup_ExSkill_2-1 = "助けが必要なら……\n私にお任せください。"
26000-CVGroup_ExSkill_3-1 = "薬品ではありません。\n未来です。"
26000-CVGroup_ExSkill_Level_1-1 = "ここからはあなたの意志にかかってます。"
26000-CVGroup_ExSkill_Level_2-1 = "諦めないでください。"
26000-CVGroup_ExSkill_Level_3-1 = "私の薬が、あなたを救うでしょう。"
26000-CVGroup_Formation_In_1-1 = "医療支援は、お任せください。"
26000-CVGroup_Formation_In_2-1 = "出撃の時間ですね。"
26000-CVGroup_Growup_1-1 = "成長しました。"
26000-CVGroup_Growup_2-1 = "最善を尽くして、精進いたします。"
26000-CVGroup_Growup_3-1 = "これからはもっと先生のお役に立てそうです。"
26000-CVGroup_Growup_4-1 = "より強くなれましたね。"
26000-CVGroup_Relationship_Up_1-1 = "先生と一緒にいると心拍数に異常が見られます。\n私は医療担当なのに……困りますね。"
26000-CVGroup_Relationship_Up_2-1 = "ふふ、先生は変わっていますね。"
26000-CVGroup_Relationship_Up_3-1 = "顔が熱い気がします。\n風邪ではないようなのですが……おかしいですね。"
26000-CVGroup_Relationship_Up_4-1 = "先生は、本当に手がかかる人ですね。\n……そういうところも、嫌いではないですけど。"
