[translation]
26000-CVGroup_CommonSkill-1 = "Sinais vitais normais, pode prosseguir."
26000-CVGroup_ExSkill_1-1 = "Está doendo?\nEntão, tome isto."
26000-CVGroup_ExSkill_2-1 = "Se precisar de ajuda...\nDeixe comigo."
26000-CVGroup_ExSkill_3-1 = "Não é um remédio.\nÉ o futuro."
26000-CVGroup_ExSkill_Level_1-1 = "Daqui em diante, depende da sua vontade."
26000-CVGroup_ExSkill_Level_2-1 = "Por favor, não desista."
26000-CVGroup_ExSkill_Level_3-1 = "Meu remédio irá salvá-lo."
26000-CVGroup_Formation_In_1-1 = "Pode deixar o suporte médico comigo."
26000-CVGroup_Formation_In_2-1 = "É hora de sair para a missão."
26000-CVGroup_Growup_1-1 = "Eu cresci."
26000-CVGroup_Growup_2-1 = "Farei o meu melhor e continuarei me dedicando."
26000-CVGroup_Growup_3-1 = "A partir de agora, poderei ser ainda mais útil para o Sensei."
26000-CVGroup_Growup_4-1 = "Consegui ficar mais forte."
26000-CVGroup_Relationship_Up_1-1 = "Quando estou com o Sensei, noto uma anormalidade na minha frequência cardíaca.\nE olha que eu sou a responsável médica... que problemático."
26000-CVGroup_Relationship_Up_2-1 = "Fufu, o Sensei é uma pessoa peculiar, não é?"
26000-CVGroup_Relationship_Up_3-1 = "Sinto meu rosto quente.\nNão parece ser um resfriado... que estranho."
26000-CVGroup_Relationship_Up_4-1 = "O Sensei é alguém que realmente dá trabalho.\n...Mas, não é como se eu odiasse esse seu jeito."
