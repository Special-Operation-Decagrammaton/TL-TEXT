13001-CVGroup_Battle_Defense_1-1 = "Algo…… me atingiu……?"
13001-CVGroup_Battle_In_1-1 = "É só eu me livrar do que está no caminho, certo?"
13001-CVGroup_Battle_In_2-1 = "Então, acho que vou começar a me mover."
13001-CVGroup_Battle_Move_1-1 = "……Vamos?"
13001-CVGroup_Battle_Move_2-1 = "Avançando~ Avançando~"
13001-CVGroup_Battle_Recovery_1-1 = "……Ah, obrigada."
13001-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover……."
13001-CVGroup_Battle_Victory_1-1 = "De alguma forma……\nAcabou antes que eu percebesse……."
13001-CVGroup_Battle_Victory_2-1 = "Quem eu acabei de derrotar era um inimigo?"
13001-CVGroup_CommonSkill-1 = "Um tiro…… certeiro."
13001-CVGroup_ExSkill_1-1 = "Hmm…… certo!"
13001-CVGroup_ExSkill_2-1 = "Hmm…… entendi!"
13001-CVGroup_ExSkill_3-1 = "Hmm…… saquei!"
13001-CVGroup_ExSkill_Level_1-1 = "Por enquanto, vamos queimar tudo."
13001-CVGroup_ExSkill_Level_2-1 = "……Disparar?"
13001-CVGroup_ExSkill_Level_3-1 = "Toma essa~"
13001-CVGroup_Formation_In_1-1 = "Ah, uma borboleta……."
