[translation]
10061-CVGroup_Battle_Buffed_1-1 = "助かります。"
10061-CVGroup_Battle_Covered_1-1 = "無駄です。"
10061-CVGroup_Battle_Defense_1-1 = "信仰心が足りていませんよ。"
10061-CVGroup_Battle_In_1-1 = "共に参りましょう。"
10061-CVGroup_Battle_In_2-1 = "これも一つの試練なのですね。"
10061-CVGroup_Battle_Move_1-1 = "続けてまいります。"
10061-CVGroup_Battle_Move_2-1 = "まだ終わっておりません。"
10061-CVGroup_Battle_Recovery_1-1 = "感謝します。"
10061-CVGroup_Battle_TacticalAction_1-1 = "ふっ！"
10061-CVGroup_Battle_Victory_1-1 = "皆様に感謝を。"
10061-CVGroup_Battle_Victory_2-1 = "解決できて何よりです。"
10061-CVGroup_CommonSkill-1 = "結局、こうなってしまうのですね。"
10061-CVGroup_ExSkill_1-1 = "この弾丸に祝福を。"
10061-CVGroup_ExSkill_2-1 = "我らに恵みを与え給え。"
10061-CVGroup_ExSkill_3-1 = "恩寵に感謝を。"
10061-CVGroup_ExSkill_Level_1-1 = "悔い改めてください！"
10061-CVGroup_ExSkill_Level_2-1 = "あなたのためなのです！"
10061-CVGroup_ExSkill_Level_3-1 = "受け止めてください！"
10061-CVGroup_Formation_In_1-1 = "かしこまりました。"
10061-CVGroup_Formation_In_2-1 = "お呼びでしょうか？"
10061-CVGroup_Formation_Select-1 = "あ、あら……？\nこれは……？"
10061-CVGroup_Growup_1-1 = "あ、ありがとうございます。\nこうして、目をかけていただくのは……\nあまり、慣れませんね。"
10061-CVGroup_Growup_2-1 = "このご恩を、どう返していけば良いのでしょう……。"
10061-CVGroup_Growup_3-1 = "その行いに祝福があらんことを。"
10061-CVGroup_Growup_4-1 = "施しを遠慮するものではありませんね……\nありがとうございます。"
10061-CVGroup_Relationship_Up_1-1 = "先生……その……。\nな、なんでもありません……。"
10061-CVGroup_Relationship_Up_2-1 = "先生に何かをお伝えするたびに……\nこのような言葉でよいのだろうかと、悩んでしまいます。"
10061-CVGroup_Relationship_Up_3-1 = "先生ほど私を理解してくださる方も……。\nあまり、おりませんでしたので。"
10061-CVGroup_Relationship_Up_4-1 = "一応……皆のためのシスター……ですから。\nですが……その……。"
10061-CVGroup_Tactic_In_1-1 = "幸いがあらんことを。"
10061-CVGroup_Tactic_In_2-1 = "皆様、何卒よろしくお願い致します。"
10061-CVGroup_Tactic_Victory_1-1 = "皆様に恩寵があらんことを。"
10061-CVGroup_Tactic_Victory_2-1 = "平和でありますように。"
