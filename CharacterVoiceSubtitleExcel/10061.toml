[translation]
10061-CVGroup_Battle_Buffed_1-1 = "Isso ajuda muito."
10061-CVGroup_Battle_Covered_1-1 = "É inútil."
10061-CVGroup_Battle_Defense_1-1 = "Sua fé é insuficiente."
10061-CVGroup_Battle_In_1-1 = "Vamos juntos."
10061-CVGroup_Battle_In_2-1 = "Isso também é uma provação, não é?"
10061-CVGroup_Battle_Move_1-1 = "Continuarei avançando."
10061-CVGroup_Battle_Move_2-1 = "Ainda não terminamos."
10061-CVGroup_Battle_Recovery_1-1 = "Sou grata."
10061-CVGroup_Battle_TacticalAction_1-1 = "Hmph!"
10061-CVGroup_Battle_Victory_1-1 = "Minha gratidão a todos."
10061-CVGroup_Battle_Victory_2-1 = "Fico feliz que tenha sido resolvido."
10061-CVGroup_CommonSkill-1 = "No fim, as coisas acabam assim, não é?"
10061-CVGroup_ExSkill_1-1 = "Que esta bala receba uma bênção."
10061-CVGroup_ExSkill_2-1 = "Concedei-nos a vossa graça."
10061-CVGroup_ExSkill_3-1 = "Agradeço pela graça recebida."
10061-CVGroup_ExSkill_Level_1-1 = "Arrependa-se!"
10061-CVGroup_ExSkill_Level_2-1 = "É para o seu próprio bem!"
10061-CVGroup_ExSkill_Level_3-1 = "Por favor, aceite isto!"
10061-CVGroup_Formation_In_1-1 = "Entendido."
10061-CVGroup_Formation_In_2-1 = "Chamou por mim?"
10061-CVGroup_Formation_Select-1 = "Oh, céus...\nO que é isto...?"
10061-CVGroup_Growup_1-1 = "Mu-muito obrigada.\nNão estou muito acostumada a receber tanta atenção assim..."
10061-CVGroup_Growup_2-1 = "Como poderei retribuir tamanha bondade...?"
10061-CVGroup_Growup_3-1 = "Que haja bênçãos sobre suas ações."
10061-CVGroup_Growup_4-1 = "Não devo recusar uma dádiva...\nMuito obrigada."
10061-CVGroup_Relationship_Up_1-1 = "Sensei... sobre isso...\nN-não é nada..."
10061-CVGroup_Relationship_Up_2-1 = "Sempre que tento dizer algo ao Sensei...\nFico preocupada se estas são as palavras certas."
10061-CVGroup_Relationship_Up_3-1 = "Não houve muitas pessoas...\nque me compreendessem tão bem quanto o Sensei."
10061-CVGroup_Relationship_Up_4-1 = "Eu sou, tecnicamente... uma irmã para todos...\nMas... sobre isso..."
10061-CVGroup_Tactic_In_1-1 = "Que a sorte esteja convosco."
10061-CVGroup_Tactic_In_2-1 = "Conto com todos vocês."
10061-CVGroup_Tactic_Victory_1-1 = "Que a graça esteja com todos."
10061-CVGroup_Tactic_Victory_2-1 = "Que haja paz."
