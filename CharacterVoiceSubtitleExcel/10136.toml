[translation]
10136-CVGroup_Battle_Buffed_1-1 = "Obrigada, continue contando comigo daqui para frente."
10136-CVGroup_Battle_Defense_1-1 = "Ataque, neutralizado."
10136-CVGroup_Battle_In_1-1 = "Deixe a retaguarda comigo."
10136-CVGroup_Battle_In_2-1 = "Sinal de anomalia confirmado."
10136-CVGroup_Battle_Move_1-1 = "Indo para a próxima área."
10136-CVGroup_Battle_Move_2-1 = "Área ocupada com sucesso."
10136-CVGroup_Battle_Recovery_1-1 = "Suporte tático confirmado."
10136-CVGroup_Battle_TacticalAction_1-1 = "Movimentação tática, iniciada."
10136-CVGroup_Battle_Victory_1-1 = "Você viu, Sensei? Eu consegui."
10136-CVGroup_Battle_Victory_2-1 = "Já está tudo bem, Sensei. Não há mais inimigos."
10136-CVGroup_CommonSkill-1 = "Isso pode estar um pouco quente, não?"
10136-CVGroup_ExSkill_1-1 = "Alvo eliminado."
10136-CVGroup_ExSkill_2-1 = "Próximo alvo."
10136-CVGroup_ExSkill_3-1 = "Como esperado, está um pouco quente."
10136-CVGroup_ExSkill_Level_1-1 = "Sim, vou dar o meu melhor."
10136-CVGroup_ExSkill_Level_2-1 = "Alvo designado."
10136-CVGroup_ExSkill_Level_3-1 = "É ali."
10136-CVGroup_Formation_In_1-1 = "Me diga qual é o alvo."
10136-CVGroup_Formation_In_2-1 = "Hoje eu sou a atiradora de elite."
10136-CVGroup_Formation_Select-1 = "Lock-on no coração do Sensei.\n...É, eu não estou muito acostumada com isso."
10136-CVGroup_Growup_1-1 = "Será que eu cresci um pouco?"
10136-CVGroup_Growup_2-1 = "Fico feliz se estou crescendo. É mais eficiente para as operações."
10136-CVGroup_Growup_3-1 = "Obrigada, Sensei.\nGraças a você, eu me tornei mais forte."
10136-CVGroup_Growup_4-1 = "Será que eu mudei?\nDizem que a gente muda conforme convive com os outros."
10136-CVGroup_Relationship_Up_1-1 = "Bem... pode ser um pouco tarde para dizer isso.\nMas eu tenho consciência de que sou muito lenta.\nPor isso, quero que o Sensei fique de olho em mim para que eu não vá longe demais."
10136-CVGroup_Relationship_Up_2-1 = "Chegue um pouco mais perto.\nPronto, ficou perfeito agora que estamos colados.\nCompartilhar o calor corporal é eficiente, não acha?"
10136-CVGroup_Relationship_Up_3-1 = "Olhando para trás, sinto que tudo é cheio de mistérios.\nE, entre eles, a existência mais misteriosa para mim é... o Sensei, talvez.\nFufu, o Sensei é realmente interessante."
10136-CVGroup_Relationship_Up_4-1 = "Se acontecer alguma coisa, me chame imediatamente.\nEu definitivamente vou te proteger.\nPara isso... não importa qual seja o preço que eu tenha que pagar."
10136-CVGroup_Tactic_In_1-1 = "Iniciando reconhecimento de força."
10136-CVGroup_Tactic_In_2-1 = "O objetivo é buscar e destruir."
10136-CVGroup_Tactic_Victory_1-1 = "O que achou, Sensei? Foi bom, não foi?"
10136-CVGroup_Tactic_Victory_2-1 = "Aqui já está seguro."
