10136-CVGroup_Relationship_Up_3-1 = "Looking back on it now, I think there are so many mysteries in this world.\nAnd among them, the most mysterious existence to me is... you, Sensei.\nHehe, you're truly interesting."
10136-CVGroup_Relationship_Up_4-1 = "Call me immediately if anything happens.\nI will protect you, no matter what.\nFor that sake... I don't care what price I have to pay."
