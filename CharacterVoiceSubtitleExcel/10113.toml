[translation]
10113-CVGroup_Battle_Buffed_1-1 = "Agradeço."
10113-CVGroup_Battle_Covered_1-1 = "Segurança, garantida."
10113-CVGroup_Battle_Defense_1-1 = "Isso não terá efeito."
10113-CVGroup_Battle_In_1-1 = "É uma situação de emergência, não é?"
10113-CVGroup_Battle_In_2-1 = "Fui informada de que é uma emergência, não se preocupe com o meu traje."
10113-CVGroup_Battle_Move_1-1 = "Mudança de resposta. Estou me movendo."
10113-CVGroup_Battle_Move_2-1 = "Que tipo de mortos... digo, feridos estão lá?"
10113-CVGroup_Battle_Recovery_1-1 = "Agradeço pelo tratamento adequado."
10113-CVGroup_Battle_TacticalAction_1-1 = "É por ali."
10113-CVGroup_Battle_Victory_1-1 = "Resposta concluída.\nVamos voltar, Sensei."
10113-CVGroup_Battle_Victory_2-1 = "Recuperação concluída.\nBom trabalho."
10113-CVGroup_CommonSkill-1 = "Sem anormalidades.\nMuito bem."
10113-CVGroup_ExSkill_1-1 = "As ondas estão... \nOh? \nPor favor, espere um momento."
10113-CVGroup_ExSkill_2-1 = "É tão agradável... \nOpa. \nÉ uma emergência."
10113-CVGroup_ExSkill_3-1 = "Que bela vista... \nHm? \nDeixe comigo."
10113-CVGroup_ExSkill_Level_1-1 = "Iniciando resposta."
10113-CVGroup_ExSkill_Level_2-1 = "Não se preocupe."
10113-CVGroup_ExSkill_Level_3-1 = "Cadáveres... digo, feridos, certo?"
10113-CVGroup_Formation_In_1-1 = "Hoje não é meu turno, mas... se o Sensei me chamou."
10113-CVGroup_Formation_In_2-1 = "O que houve, Sensei?"
10113-CVGroup_Formation_Select-1 = "Armas de fogo. Suprimentos médicos.\nPreparação concluída."
10113-CVGroup_Growup_1-1 = "Dizem que o descanso faz as pessoas crescerem.\nUm bom exemplo, não é?"
10113-CVGroup_Growup_2-1 = "Obrigada, Sensei.\nNão consigo expressar bem em palavras, mas... o Sensei é alguém muito importante para mim."
10113-CVGroup_Growup_3-1 = "Vou me dedicar para ajudar mais mortos... digo, feridos."
10113-CVGroup_Growup_4-1 = "Sinto que consegui crescer.\nIsso é tudo graças ao Sensei."
10113-CVGroup_Relationship_Up_1-1 = "Ultimamente, tenho ficado curiosa sobre o que o Sensei faz nos seus dias de folga.\nSim, pensei em ajustar minha folga para passarmos juntos."
10113-CVGroup_Relationship_Up_2-1 = "Só por agora, quero que olhe para mim.\nBem... pode-se dizer que estou misturando assuntos pessoais."
10113-CVGroup_Relationship_Up_3-1 = "Pode ser impressão minha, mas...\nsinto que não temos nos visto muito ultimamente.\nSe não se importar, você teria um tempo depois?"
10113-CVGroup_Relationship_Up_4-1 = "Só de encontrar o Sensei, o objetivo do meu dia já foi alcançado.\nSe quiser, podemos discutir os planos futuros?"
10113-CVGroup_Tactic_In_1-1 = "Depois, por favor, me conte como você passa seus dias de folga."
10113-CVGroup_Tactic_In_2-1 = "Sim, estou pronta. Não se preocupe comigo."
10113-CVGroup_Tactic_Victory_1-1 = "Fico feliz que tenha terminado sem problemas."
10113-CVGroup_Tactic_Victory_2-1 = "Se não se importar, gostaria de passar o resto do tempo com você?"
