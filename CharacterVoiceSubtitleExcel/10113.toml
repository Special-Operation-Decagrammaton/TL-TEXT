[translation]
10113-CVGroup_Battle_Buffed_1-1 = "ありがとうございます。"
10113-CVGroup_Battle_Covered_1-1 = "安全、確保。"
10113-CVGroup_Battle_Defense_1-1 = "効果はありませんよ。"
10113-CVGroup_Battle_In_1-1 = "緊急事態なのですね。"
10113-CVGroup_Battle_In_2-1 = "緊急事態だと伺っています、服装はお気になさらず。"
10113-CVGroup_Battle_Move_1-1 = "対応変更。移動します。"
10113-CVGroup_Battle_Move_2-1 = "どんな死た……負傷者がいるのでしょうか。"
10113-CVGroup_Battle_Recovery_1-1 = "適切な手当、感謝します。"
10113-CVGroup_Battle_TacticalAction_1-1 = "あちらですね。"
10113-CVGroup_Battle_Victory_1-1 = "対応完了。\n戻りましょう、先生。"
10113-CVGroup_Battle_Victory_2-1 = "回収完了。\nお疲れ様でした。"
10113-CVGroup_CommonSkill-1 = "異常なし。\n良いですね。"
10113-CVGroup_ExSkill_1-1 = "波が……\nあら？\n少々お待ちください。"
10113-CVGroup_ExSkill_2-1 = "気持ちいいですね……\nおっと\n緊急事態です。"
10113-CVGroup_ExSkill_3-1 = "いい景色です……\nん？\n私にお任せください。"
10113-CVGroup_ExSkill_Level_1-1 = "対応、開始します。"
10113-CVGroup_ExSkill_Level_2-1 = "ご心配なく。"
10113-CVGroup_ExSkill_Level_3-1 = "死体……いえ、負傷者ですね。"
10113-CVGroup_Formation_In_1-1 = "今日は当番ではありませんが……先生がお呼びとあらば。"
10113-CVGroup_Formation_In_2-1 = "いかがしましたか、先生？"
10113-CVGroup_Formation_Select-1 = "銃器。医薬品。\n準備完了しました。"
10113-CVGroup_Growup_1-1 = "休息は人を成長させると言います。\n好例ですね。"
10113-CVGroup_Growup_2-1 = "ありがとうございます、先生。\nうまく言葉にできませんが……先生は大切な方です。"
10113-CVGroup_Growup_3-1 = "より多くの死た……負傷者を助けるべく、精進します。"
10113-CVGroup_Growup_4-1 = "自分でも成長できたと感じています。\nこれも全部先生のおかげです。"
10113-CVGroup_Relationship_Up_1-1 = "最近、先生がお休みの日に何をしているのか気になってしまうんです。\nええ、休みを合わせて一緒にしようと思いまして。"
10113-CVGroup_Relationship_Up_2-1 = "今だけは私を見てほしいのです。\nそうですね……私情を挟んでいると言えます。"
10113-CVGroup_Relationship_Up_3-1 = "気のせいかもしれませんが、\n最近、先生とあまり会えていない気がしておりまして。\nもしよろしければ、この後お時間ありますか？"
10113-CVGroup_Relationship_Up_4-1 = "先生とお会いできただけで今日の目的が達成できました。\nよかったら、今後の予定を話し合いませんか？"
10113-CVGroup_Tactic_In_1-1 = "後で先生の休日の過ごし方を教えて下さい。"
10113-CVGroup_Tactic_In_2-1 = "ええ、準備はできています。お構いなく。"
10113-CVGroup_Tactic_Victory_1-1 = "無事に終わってなによりです。"
10113-CVGroup_Tactic_Victory_2-1 = "よろしければ、残りの時間は一緒に過ごしませんか？"
