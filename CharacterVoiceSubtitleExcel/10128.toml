[translation]
10128-CVGroup_Battle_Buffed_1-1 = "Coloque na minha conta...!"
10128-CVGroup_Battle_Covered_1-1 = "Ufa... consegui me esconder...!"
10128-CVGroup_Battle_Defense_1-1 = "He, hehe, i-isso não é nada...!"
10128-CVGroup_Battle_In_1-1 = "Muito bem, vamos buscar a nossa 'vitória'!"
10128-CVGroup_Battle_In_2-1 = "Deixe o suprimento comigo."
10128-CVGroup_Battle_Move_1-1 = "Vamos nessa!"
10128-CVGroup_Battle_Move_2-1 = "Relaxe, relaxe~"
10128-CVGroup_Battle_Recovery_1-1 = "Obrigada pela transação...!"
10128-CVGroup_Battle_TacticalAction_1-1 = "Hah!"
10128-CVGroup_Battle_Victory_1-1 = "Foi uma transação bem tranquila."
10128-CVGroup_Battle_Victory_2-1 = "Não se esqueça de me dar uma boa avaliação depois, viu?"
10128-CVGroup_CommonSkill-1 = "Hehe, tenho ótimos produtos aqui, sabia?"
10128-CVGroup_ExSkill_1-1 = "Psiu, o que você acabou de ver é segredo comercial, viu?"
10128-CVGroup_ExSkill_2-1 = "O que achou? Fui incrível, não fui?"
10128-CVGroup_ExSkill_3-1 = "Muito bem, vamos cair fora antes que percebam!"
10128-CVGroup_ExSkill_Level_1-1 = "Vim entregar as balas!"
10128-CVGroup_ExSkill_Level_2-1 = "Entregas rápidas e cuidadosas!"
10128-CVGroup_ExSkill_Level_3-1 = "Não importa quem seja o cliente, ele é um cliente! Vim fazer a entrega!"
10128-CVGroup_Formation_In_1-1 = "Sim, eu garanto que você não vai se arrepender."
10128-CVGroup_Formation_In_2-1 = "O item que você procura é... a 'vitória', não é?"
10128-CVGroup_Formation_Select-1 = "Hehe... opa! ...Ufa."
10128-CVGroup_Growup_1-1 = "Onde você conseguiu algo assim...!\nMuito obrigada, Sensei!"
10128-CVGroup_Growup_2-1 = "Hã, um investimento... tudo isso!?\nHehe, não vou te decepcionar!"
10128-CVGroup_Growup_3-1 = "Tudo isso para mim...?\n...Existe algo que você queira muito, Sensei?"
10128-CVGroup_Growup_4-1 = "Muito obrigada.\nEu certamente atenderei às suas expectativas...!"
10128-CVGroup_Relationship_Up_1-1 = "Mídia, arte... quer que eu te ensine do meu jeito?"
10128-CVGroup_Relationship_Up_2-1 = "É estranho, né?\nQuando converso com você, Sensei, acabo perdendo a noção do tempo."
10128-CVGroup_Relationship_Up_3-1 = "Diga... você gosta de filmes?\nAh... não, não tem segundas intenções, eu juro...!"
10128-CVGroup_Relationship_Up_4-1 = "Mesmo podendo nos ver a qualquer hora...\nPor que será?\nQue eu sinto vontade de te manter sempre por perto..."
10128-CVGroup_Tactic_In_1-1 = "Muito bem, vamos fazer uma pesquisa de mercado."
10128-CVGroup_Tactic_In_2-1 = "O que será que eu preciso para vencer..."
10128-CVGroup_Tactic_Victory_1-1 = "Hehe, como esperado."
10128-CVGroup_Tactic_Victory_2-1 = "Vim entregar a 'vitória'. Ah, pode carimbar aqui, por favor."
