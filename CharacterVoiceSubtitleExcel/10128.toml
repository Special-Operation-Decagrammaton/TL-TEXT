[translation]
10128-CVGroup_Battle_Buffed_1-1 = "お代はツケといてください……！"
10128-CVGroup_Battle_Covered_1-1 = "はぁ～隠れられた……！"
10128-CVGroup_Battle_Defense_1-1 = "ふ、ふふっ、こ、この程度……！"
10128-CVGroup_Battle_In_1-1 = "さあ、「勝利」を仕入れに行きますよ！"
10128-CVGroup_Battle_In_2-1 = "補給はお任せあれ。"
10128-CVGroup_Battle_Move_1-1 = "さあ、行きましょう！"
10128-CVGroup_Battle_Move_2-1 = "リラックスリラックス～"
10128-CVGroup_Battle_Recovery_1-1 = "お取引、ありがとうございます……！"
10128-CVGroup_Battle_TacticalAction_1-1 = "ふっ！"
10128-CVGroup_Battle_Victory_1-1 = "スムーズなお取引でしたね。"
10128-CVGroup_Battle_Victory_2-1 = "後で高評価の方、よろしくお願いしますよ。"
10128-CVGroup_CommonSkill-1 = "ふふ、いい物揃ってますよ？"
10128-CVGroup_ExSkill_1-1 = "しーっ、今見たものは企業秘密ですよ？"
10128-CVGroup_ExSkill_2-1 = "どうです？カッコよかったでしょう？"
10128-CVGroup_ExSkill_3-1 = "さあ、バレないうちにずらかりますよ！"
10128-CVGroup_ExSkill_Level_1-1 = "弾丸、お届けにあがりました！"
10128-CVGroup_ExSkill_Level_2-1 = "お届けは迅速かつ丁寧に！"
10128-CVGroup_ExSkill_Level_3-1 = "どんな相手だろうとお客様ですから！\nお届けに参りました！"
10128-CVGroup_Formation_In_1-1 = "ええ、後悔はさせませんとも。"
10128-CVGroup_Formation_In_2-1 = "お求めの品は……「勝利」、ですかね？"
10128-CVGroup_Formation_Select-1 = "ふふっ……うあぁっとと！……ふぅ。"
10128-CVGroup_Growup_1-1 = "一体、どこでこんなものを……！\nありがとうございます、先生！"
10128-CVGroup_Growup_2-1 = "えっ、投資……こんなに！？\nふふっ、失望はさせませんよ！"
10128-CVGroup_Growup_3-1 = "私にここまで……？\n……なにか、どうしても欲しいモノでもあるんですか？"
10128-CVGroup_Growup_4-1 = "ありがとうございます。\nご期待には、必ず……！"
10128-CVGroup_Relationship_Up_1-1 = "メディアに、芸術……私なりに教えて差し上げましょうか？"
10128-CVGroup_Relationship_Up_2-1 = "おかしいですよね。\n先生としゃべっていると、つい時間を忘れちゃうんです。"
10128-CVGroup_Relationship_Up_3-1 = "あの……映画はお好きですか？\nえっ……あ、いえ、他意は無いんですが……！"
10128-CVGroup_Relationship_Up_4-1 = "いつでも会えるのに……。\nなぜでしょう。\n手元に置いておきたい、と思ってしまうのは……。"
10128-CVGroup_Tactic_In_1-1 = "さて、市場調査といきますか。"
10128-CVGroup_Tactic_In_2-1 = "どんなモノがあれば勝てるかな……。"
10128-CVGroup_Tactic_Victory_1-1 = "ふふ、予想通りです。"
10128-CVGroup_Tactic_Victory_2-1 = "「勝利」をお届けに参りました。あ、ハンコはこちらに。"
