[translation]
10018-CVGroup_Battle_Buffed_1-1 = "M-muito obrigada!"
10018-CVGroup_Battle_Covered_1-1 = "E-eu vou me esconder aqui e atraí-los! Aproveite agora!"
10018-CVGroup_Battle_Defense_1-1 = "Se for só isso, e-está tudo bem!"
10018-CVGroup_Battle_In_1-1 = "P-pelo menos, preciso mostrar uma postura digna de uma presidente..."
10018-CVGroup_Battle_In_2-1 = "Vamos avançar com calma e cuidado."
10018-CVGroup_Battle_Move_1-1 = "Consegui dar conta de alguma forma...\nV-vou continuar!"
10018-CVGroup_Battle_Move_2-1 = "Foi por pouco..."
10018-CVGroup_Battle_Recovery_1-1 = "Obrigada pela sua consideração."
10018-CVGroup_Battle_TacticalAction_1-1 = "E-eu vou!"
10018-CVGroup_Battle_Victory_1-1 = "Ufa. Fico feliz... por ter sido útil."
10018-CVGroup_Battle_Victory_2-1 = "O-obrigada pelo seu trabalho duro! ...Hehe."
10018-CVGroup_CommonSkill-1 = "E-eu vou dar o meu melhor!"
10018-CVGroup_ExSkill_1-1 = "Lá vou eu..."
10018-CVGroup_ExSkill_2-1 = "A mira... está definida."
10018-CVGroup_ExSkill_3-1 = "Acho que isso... é interessante."
10018-CVGroup_ExSkill_Level_1-1 = "Retro, seja eterno!"
10018-CVGroup_ExSkill_Level_2-1 = "Prepare-se!"
10018-CVGroup_ExSkill_Level_3-1 = "Este é o sofrimento da criação!"
10018-CVGroup_Formation_In_1-1 = "S-se o Sensei precisa de mim...\nEu também..."
10018-CVGroup_Formation_In_2-1 = "V-vou me esforçar para nos darmos bem...\nTalvez..."
10018-CVGroup_Formation_Select-1 = "V-você me escolheu? \nUuu... vou tentar!"
10018-CVGroup_Growup_1-1 = "Graças ao Sensei...\nMe sinto um pouco... mais tranquila."
10018-CVGroup_Growup_2-1 = "Eu quero... \nme tornar alguém com mais confiança."
10018-CVGroup_Growup_3-1 = "Quando sinto medo? Hum... \nQuando o Sensei não está por perto... eu acho."
10018-CVGroup_Growup_4-1 = "E-eu não sou nada forte, mas...\nVou me esforçar. Porque eu realmente gosto de todos."
10018-CVGroup_Relationship_Up_1-1 = "E-eu não estou sendo um incômodo, estou? \nSendo assim... hehe. Fico feliz."
10018-CVGroup_Relationship_Up_2-1 = "Eu não entendo bem... \nÉ um sentimento que eu realmente não entendo, mas... estou feliz."
10018-CVGroup_Relationship_Up_3-1 = "Quando você dá aulas ou nos comanda... \nDe alguma forma, Sensei... hum... você é realmente incrível."
10018-CVGroup_Relationship_Up_4-1 = "E-eu também, sobre o Sensei... \nBem, isso... é-é vergonhoso!"
10018-CVGroup_Tactic_In_1-1 = "C-com outras pessoas...!? \nV-vou me esforçar!"
10018-CVGroup_Tactic_In_2-1 = "Hã!? \nV-vou dar o meu melhor..."
10018-CVGroup_Tactic_Victory_1-1 = "Ufa. Que bom."
10018-CVGroup_Tactic_Victory_2-1 = "Sucesso... estou feliz. \nEntão é essa a sensação."
