[translation]
10018-CVGroup_Battle_Buffed_1-1 = "あ、ありがとうございます！"
10018-CVGroup_Battle_Covered_1-1 = "こ、ここに隠れて引き付けます！今のうちに！"
10018-CVGroup_Battle_Defense_1-1 = "これぐらいなら、だ、大丈夫です！"
10018-CVGroup_Battle_In_1-1 = "と、とりあえず部長らしい姿を見せないと……。"
10018-CVGroup_Battle_In_2-1 = "落ち着いて、気をつけながら、進みましょう。"
10018-CVGroup_Battle_Move_1-1 = "なんとかやり遂げました……\nつ、続けて行きます！"
10018-CVGroup_Battle_Move_2-1 = "危ないところでした……。"
10018-CVGroup_Battle_Recovery_1-1 = "ご配慮、ありがとうございます。"
10018-CVGroup_Battle_TacticalAction_1-1 = "い、行きます！"
10018-CVGroup_Battle_Victory_1-1 = "ふー。役に立って……嬉しいです。"
10018-CVGroup_Battle_Victory_2-1 = "お、お疲れ様でした！……えへへ。"
10018-CVGroup_CommonSkill-1 = "が、頑張ります！"
10018-CVGroup_ExSkill_1-1 = "行きます……。"
10018-CVGroup_ExSkill_2-1 = "照準は……定まりました。"
10018-CVGroup_ExSkill_3-1 = "これは……面白いと思います。"
10018-CVGroup_ExSkill_Level_1-1 = "レトロよ、永遠であれ！"
10018-CVGroup_ExSkill_Level_2-1 = "覚悟してください！"
10018-CVGroup_ExSkill_Level_3-1 = "これが創作の苦しみです！"
10018-CVGroup_Formation_In_1-1 = "せ、先生が必要としてくれるのであれば……\nわたしも……。"
10018-CVGroup_Formation_In_2-1 = "な、仲良くなれるように頑張ります……\nたぶん……。"
10018-CVGroup_Formation_Select-1 = "わ、わたしをですか？\nうう……やってみます！"
10018-CVGroup_Growup_1-1 = "先生のおかげで……\n少し……安心しました。"
10018-CVGroup_Growup_2-1 = "もっと……\n自信のあるわたしになりたいです。"
10018-CVGroup_Growup_3-1 = "怖い時ですか？うーん……\n先生がそばにいない時……でしょうか。"
10018-CVGroup_Growup_4-1 = "わ、わたしはちっとも強くないですが……。\n頑張ります。みんなのことが、本当に好きだから。"
10018-CVGroup_Relationship_Up_1-1 = "め、迷惑かけてないですよね？\nそれなら……えへへ。よかったです。"
10018-CVGroup_Relationship_Up_2-1 = "よく分からないんです……\n本当によく分からない気持ちなのですが……嬉しい、です。"
10018-CVGroup_Relationship_Up_3-1 = "授業や指揮をしてくださる時……\nなんだか先生は……あのぉ……本当にカッコいいというか。"
10018-CVGroup_Relationship_Up_4-1 = "わ、わたしも先生のこと……\nえっと、その……は、恥ずかしい！"
10018-CVGroup_Tactic_In_1-1 = "ほ、他の人達と一緒に……！？\nが、頑張ります！"
10018-CVGroup_Tactic_In_2-1 = "ええっ！？\nベ、ベストは尽くします……。"
10018-CVGroup_Tactic_Victory_1-1 = "ふー。よかった。"
10018-CVGroup_Tactic_Victory_2-1 = "成功……嬉しいです。\nこんな気分なんですね。"
