10028-CVGroup_Relationship_Up_3-1 = "あーもうやっぱりご主人様最高！！\n大好き！！！"
10028-CVGroup_Relationship_Up_4-1 = "ウサギは寂しいと弱っちゃうんだって！\nだからよろしくね、ご主人様！"
10028-CVGroup_Tactic_In_1-1 = "見てみて、バニーさんだよ！"
10028-CVGroup_Tactic_In_2-1 = "わーお！やることがたくさんありそうだねっ！"
10028-CVGroup_Tactic_Victory_1-1 = "わーい、やったー！"
10028-CVGroup_Tactic_Victory_2-1 = "作戦完了ー！\n次も一緒にやろうね、ご主人様！"
