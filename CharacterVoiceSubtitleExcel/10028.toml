[translation]
10028-CVGroup_Battle_Buffed_1-1 = "何これ、すごいね！"
10028-CVGroup_Battle_Covered_1-1 = "あはは、ちょっと待っててね～！"
10028-CVGroup_Battle_Defense_1-1 = "無駄無駄～！"
10028-CVGroup_Battle_In_1-1 = "さあ、全力で行くよ！\nみんな、ついて来てね！"
10028-CVGroup_Battle_In_2-1 = "さあ、みんな！\nお楽しみの時間だよ！"
10028-CVGroup_Battle_Move_1-1 = "次つぎー！"
10028-CVGroup_Battle_Move_2-1 = "やっほー！まだまだ行くよ～！"
10028-CVGroup_Battle_Recovery_1-1 = "ありがと！"
10028-CVGroup_Battle_TacticalAction_1-1 = "今はバニーさんだから、ぴょーんって！"
10028-CVGroup_Battle_Victory_1-1 = "あー！楽しかった！\n私の活躍、どうだった？ご主人様？"
10028-CVGroup_Battle_Victory_2-1 = "もう終わり？\n不完全燃焼だよ～。"
10028-CVGroup_CommonSkill-1 = "イッツショータイム！"
10028-CVGroup_ExSkill_1-1 = "じゃーん！見て見て！"
10028-CVGroup_ExSkill_2-1 = "バニーさんからのサプライズ！"
10028-CVGroup_ExSkill_3-1 = "はいこれ、プレゼント！"
10028-CVGroup_ExSkill_Level_1-1 = "楽しいねーっ！"
10028-CVGroup_ExSkill_Level_2-1 = "行っくよ～！"
10028-CVGroup_ExSkill_Level_3-1 = "あはははははっ！"
10028-CVGroup_Formation_In_1-1 = "私の番だねっ！"
10028-CVGroup_Formation_In_2-1 = "うん、準備オッケー！"
10028-CVGroup_Formation_Select-1 = "あははっ、楽しい！"
10028-CVGroup_Growup_1-1 = "バニーのアスナ、さらに強くなったよ！"
10028-CVGroup_Growup_2-1 = "これ以上強くなって、本当に大丈夫かな？"
10028-CVGroup_Growup_3-1 = "ありがとー、ご主人様！"
10028-CVGroup_Growup_4-1 = "これからも楽しく遊ぼうね、ご主人様！"
10028-CVGroup_Relationship_Up_1-1 = "ありがとう、ご主人様！\nこれからもーっと頑張るね！"
