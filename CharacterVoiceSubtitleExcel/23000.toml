[translation]
23000-CVGroup_CommonSkill-1 = "Pessoal, vamos lá!"
23000-CVGroup_ExSkill_1-1 = "Hum hum~,\nEh, é para jogar?"
23000-CVGroup_ExSkill_2-1 = "Vou comer... hã? Eeeeeh!?"
23000-CVGroup_ExSkill_3-1 = "Uau~!\nHm? I-isso não pode ser..."
23000-CVGroup_ExSkill_Level_1-1 = "A-ah...!"
23000-CVGroup_ExSkill_Level_2-1 = "V-vai lá..."
23000-CVGroup_ExSkill_Level_3-1 = "Que desperdício..."
23000-CVGroup_Formation_In_1-1 = "Vou ajudar com toda a minha força!"
23000-CVGroup_Formation_In_2-1 = "Vou me esforçar hoje também!"
23000-CVGroup_Formation_Select-1 = "Aaaah... Sensei, quer um pouco também?"
23000-CVGroup_Growup_1-1 = "Muito obrigada, Sensei!"
23000-CVGroup_Growup_2-1 = "Ehehe, pode contar mais comigo, viu~."
23000-CVGroup_Growup_3-1 = "Ta-dã! Eu fiquei mais forte!"
23000-CVGroup_Growup_4-1 = "Muito obrigada por tudo~\nSensei, ehehe."
23000-CVGroup_Relationship_Up_1-1 = "Ehehe, eu fico um pouco envergonhada, Sensei."
23000-CVGroup_Relationship_Up_2-1 = "Poder ficar com o Sensei...\nEu estou muito feliz."
23000-CVGroup_Relationship_Up_3-1 = "Sensei! Hoje, amanhã e depois de amanhã também!\nVocê vai ficar comigo para sempre, né?"
23000-CVGroup_Relationship_Up_4-1 = "Doces são bons, mas...\nEu prefiro ficar com o Sensei."
