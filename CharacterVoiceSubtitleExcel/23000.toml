[translation]
23000-CVGroup_CommonSkill-1 = "みんな、ファイトです！"
23000-CVGroup_ExSkill_1-1 = "ふんふん～、\nえ、投げるの？"
23000-CVGroup_ExSkill_2-1 = "いただきま……へ？えぇえ！？"
23000-CVGroup_ExSkill_3-1 = "わあ～！\nん？そ、そんなぁ……。"
23000-CVGroup_ExSkill_Level_1-1 = "あ、あぁ……！"
23000-CVGroup_ExSkill_Level_2-1 = "い、いけぇ……。"
23000-CVGroup_ExSkill_Level_3-1 = "もったいない……。"
23000-CVGroup_Formation_In_1-1 = "全力でお手伝いします！"
23000-CVGroup_Formation_In_2-1 = "今日も頑張ります！"
23000-CVGroup_Formation_Select-1 = "あーん……先生も食べますか？"
23000-CVGroup_Growup_1-1 = "ありがとうございます、先生！"
23000-CVGroup_Growup_2-1 = "えへへっ、もっと私に頼ってもいいんですよ～。"
23000-CVGroup_Growup_3-1 = "ジャ～ン！強くなりました！"
23000-CVGroup_Growup_4-1 = "いつもありがとうございます～\n先生、えへへっ。"
23000-CVGroup_Relationship_Up_1-1 = "えへへっ、少し照れちゃいますね、先生。"
23000-CVGroup_Relationship_Up_2-1 = "先生と一緒にいられて……。\n私、本当に嬉しいです。"
23000-CVGroup_Relationship_Up_3-1 = "先生！今日も、明日も、明後日も！\nずっと、私と一緒にいてくれますよね？"
23000-CVGroup_Relationship_Up_4-1 = "スイーツもいいですけど……。\nやっぱり、先生と一緒にいる方が好きです。"
