[translation]
10074-CVGroup_Battle_Buffed_1-1 = "Obrigada.\nDepois eu retribuo."
10074-CVGroup_Battle_Covered_1-1 = "Vou me esconder~"
10074-CVGroup_Battle_Defense_1-1 = "Não vai me alcançar~"
10074-CVGroup_Battle_In_1-1 = "É hora de uma divertida brincadeira na água♡"
10074-CVGroup_Battle_In_2-1 = "Fufu, vamos lá~"
10074-CVGroup_Battle_Move_1-1 = "Vamos para lá~"
10074-CVGroup_Battle_Move_2-1 = "Ainda vamos continuar~"
10074-CVGroup_Battle_Recovery_1-1 = "Muito obrigada♡"
10074-CVGroup_Battle_TacticalAction_1-1 = "Ei!"
10074-CVGroup_Battle_Victory_1-1 = "Mais alguém quer se refrescar?"
10074-CVGroup_Battle_Victory_2-1 = "O que houve?\nÉ só um balão de água, sabe?"
10074-CVGroup_CommonSkill-1 = "Lá vai♡"
10074-CVGroup_ExSkill_1-1 = "Pessoal, venham por aqui♡"
10074-CVGroup_ExSkill_2-1 = "Vou molhar vocês bastante♡"
10074-CVGroup_ExSkill_3-1 = "Fufu, o que acha disso~?"
10074-CVGroup_ExSkill_Level_1-1 = "Não fujam♡"
10074-CVGroup_ExSkill_Level_2-1 = "Que refrescante~!"
10074-CVGroup_ExSkill_Level_3-1 = "O verão tem que ser assim♡"
10074-CVGroup_Formation_In_1-1 = "Ora, você me escolheu?"
10074-CVGroup_Formation_In_2-1 = "Fufu, parece interessante."
10074-CVGroup_Formation_Select-1 = "Ah...!\nSeja um pouco mais gentil ali..."
10074-CVGroup_Growup_1-1 = "Do Sensei...! Isso é incrível...!\nFufu, estou brincando."
10074-CVGroup_Growup_2-1 = "Eu sempre sou ajudada por esse seu jeito direto, Sensei."
10074-CVGroup_Growup_3-1 = "De vez em quando, cuide de si mesmo também, viu?"
10074-CVGroup_Growup_4-1 = "Recebi algo maravilhoso novamente."
10074-CVGroup_Relationship_Up_1-1 = "Já que estamos na praia, que tal criarmos algumas memórias juntos?"
10074-CVGroup_Relationship_Up_2-1 = "O mar está lindo.\n...Não tem nenhum significado profundo.\n...Por enquanto."
10074-CVGroup_Relationship_Up_3-1 = "Quando estou ao seu lado, Sensei, acabo pensando em várias coisas."
10074-CVGroup_Relationship_Up_4-1 = "Sensei, como está se sentindo agora?\n...Eu estou me divertindo. Muito."
10074-CVGroup_Tactic_In_1-1 = "Ah, tantos assim...! Inimigos...!"
10074-CVGroup_Tactic_In_2-1 = "Eu vou com você."
10074-CVGroup_Tactic_Victory_1-1 = "Fufu, foi uma experiência e tanto♡"
10074-CVGroup_Tactic_Victory_2-1 = "Ah~ que refrescante~! Sensei, o que achou?"
