[translation]
20047-CVGroup_CommonSkill-1 = "夏だからこその策を。"
20047-CVGroup_ExSkill_1-1 = "私が水を怖がるとでも？"
20047-CVGroup_ExSkill_2-1 = "ふふ、この程度……。"
20047-CVGroup_ExSkill_3-1 = "私の泳ぎを目に焼き付けて。"
20047-CVGroup_ExSkill_Level_1-1 = "んん……順調……。"
20047-CVGroup_ExSkill_Level_2-1 = "ん……このまま……まっすぐ……。"
20047-CVGroup_ExSkill_Level_3-1 = "吸って……吐いて……ううん……。"
20047-CVGroup_Formation_In_1-1 = "奇策をご所望？"
20047-CVGroup_Formation_In_2-1 = "ふふっ、良い判断だね。"
20047-CVGroup_Formation_Select-1 = "……い、いつまでこうしているつもり？"
20047-CVGroup_Growup_1-1 = "教学相長ず。成長は弛まぬ学びの中にある。\nあんたとは、そんな関係でいたいね。"
20047-CVGroup_Growup_2-1 = "あんたは色々なことを気づかせてくれる……。\nやっぱり、優秀なんだね。"
20047-CVGroup_Growup_3-1 = "私はまだ、学びの最中にいる。\n完璧になるまで、そばで見ていて。"
20047-CVGroup_Growup_4-1 = "この先も成長し続けるから……\nみんなと……あんたのために。"
20047-CVGroup_Relationship_Up_1-1 = "こんなに私に構って……一体何をさせたいの？\nふぅん……分かった。\nじゃあ、泳ぎを教えるチャンスをあげる。"
20047-CVGroup_Relationship_Up_2-1 = "ずいぶん積極的なんだね……\nそういうの……嫌いじゃないかも。"
20047-CVGroup_Relationship_Up_3-1 = "まぁ、こういうのも……悪くないかもね。"
20047-CVGroup_Relationship_Up_4-1 = "「特別な縁」って、意外と身近に転がってるものだと言うよね。\n……別に？そういう話を聞いただけ。"
