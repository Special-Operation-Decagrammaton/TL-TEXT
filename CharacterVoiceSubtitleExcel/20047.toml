[translation]
20047-CVGroup_CommonSkill-1 = "Um plano que só funciona por causa do verão."
20047-CVGroup_ExSkill_1-1 = "Você acha mesmo que eu tenho medo de água?"
20047-CVGroup_ExSkill_2-1 = "Hehe, isso é só o começo..."
20047-CVGroup_ExSkill_3-1 = "Grave bem a minha natação na sua memória."
20047-CVGroup_ExSkill_Level_1-1 = "Hmm... indo bem..."
20047-CVGroup_ExSkill_Level_2-1 = "Hmm... continue assim... em linha reta..."
20047-CVGroup_ExSkill_Level_3-1 = "Inspire... expire... não, não..."
20047-CVGroup_Formation_In_1-1 = "Deseja um plano inusitado?"
20047-CVGroup_Formation_In_2-1 = "Hehe, uma boa decisão."
20047-CVGroup_Formation_Select-1 = "...A-até quando você pretende ficar assim?"
20047-CVGroup_Growup_1-1 = "Ensinar é aprender. O crescimento está no aprendizado constante.\nQuero ter esse tipo de relação com você."
20047-CVGroup_Growup_2-1 = "Você me faz perceber tantas coisas...\nComo esperado, você é excelente."
20047-CVGroup_Growup_3-1 = "Eu ainda estou no meio do meu aprendizado.\nFique ao meu lado até que eu me torne perfeita."
20047-CVGroup_Growup_4-1 = "Vou continuar crescendo daqui em diante...\nPor todos... e por você."
20047-CVGroup_Relationship_Up_1-1 = "Você me dá tanta atenção... o que exatamente quer que eu faça?\nHumm... entendi.\nEntão, vou te dar a chance de me ensinar a nadar."
20047-CVGroup_Relationship_Up_2-1 = "Você é bem proativo, não é...\nTalvez... eu não desgoste disso."
20047-CVGroup_Relationship_Up_3-1 = "Bem, talvez esse tipo de coisa... não seja tão ruim."
20047-CVGroup_Relationship_Up_4-1 = "Dizem que um \"laço especial\" pode estar mais perto do que imaginamos.\n...O quê? Só ouvi dizer isso."
