16018-CVGroup_ExSkill_6-1 = "Vou esmagar vocês!"
16018-CVGroup_ExSkill_Level_4-1 = "Podem bater bastante nos inimigos! Mas não se machuquem!"
16018-CVGroup_ExSkill_Level_5-1 = "Não peguem leve, vão com tudo!"
