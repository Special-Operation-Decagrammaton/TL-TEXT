16018-CVGroup_Battle_Defense_1-1 = "O capacete não é só um enfeite, sabia!"
16018-CVGroup_Battle_In_1-1 = "Eu aceito o desafio!"
16018-CVGroup_Battle_In_2-1 = "Venham um de cada vez! Eu não tenho o dia todo!"
