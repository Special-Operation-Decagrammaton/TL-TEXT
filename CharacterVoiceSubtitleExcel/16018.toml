16018-CVGroup_Battle_TacticalAction_1-1 = "Indo para lá!"
16018-CVGroup_Battle_Victory_1-1 = "Da próxima vez, traga seus amigos também!"
16018-CVGroup_Battle_Victory_2-1 = "Bem, acho que vocês trabalharam tanto quanto nós, não é?"
16018-CVGroup_CommonSkill-1 = "Vão! Peguem eles!"
16018-CVGroup_ExSkill_1-1 = "Grupo do Capacete! Estão prontas?"
16018-CVGroup_ExSkill_2-1 = "Prestem bastante atenção!"
16018-CVGroup_ExSkill_3-1 = "Subestimando o Grupo do Capacete, hein? Isso vai ser interessante!!"
16018-CVGroup_ExSkill_Level_1-1 = "Overhand!"
16018-CVGroup_ExSkill_Level_2-1 = "Lá vou eu! Bum!"
16018-CVGroup_ExSkill_Level_3-1 = "Vou acabar com isso num piscar de olhos!"
16018-CVGroup_ExSkill_4-1 = "Grupo do Capacete, atacar!"
