16018-CVGroup_Relationship_Up_3-1 = "Faz tanto tempo que não me tratam como uma aluna... ah..."
16018-CVGroup_Relationship_Up_4-1 = "Ei! Tem gente por perto! Não faça carinho na minha cabeça agora!"
16018-CVGroup_Tactic_In_1-1 = "Deixe comigo!"
16018-CVGroup_Tactic_In_2-1 = "Acho que isso conta como um aquecimento leve."
