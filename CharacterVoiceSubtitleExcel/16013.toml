[translation]
16013-CVGroup_Battle_Buffed_1-1 = "あ、ありがとうございます！"
16013-CVGroup_Battle_Covered_1-1 = "し、遮蔽！！"
16013-CVGroup_Battle_Defense_1-1 = "効かないわよ！"
16013-CVGroup_Battle_In_1-1 = "き、緊張しないように……\n頑張る！いける！"
16013-CVGroup_Battle_In_2-1 = "へ、平気よ！実力はこっちの方が上なんだから！！"
16013-CVGroup_Battle_Move_1-1 = "つ、次！"
16013-CVGroup_Battle_Move_2-1 = "まだっ！"
16013-CVGroup_Battle_Recovery_1-1 = "あ、ありがと……。"
16013-CVGroup_Battle_TacticalAction_1-1 = "ひゃっ！"
16013-CVGroup_Battle_Victory_1-1 = "こ、これぐらい当然よ！"
16013-CVGroup_Battle_Victory_2-1 = "ど、どこ見てるのよっ！？\nスケベっ！！"
16013-CVGroup_CommonSkill-1 = "わ、わあ……。"
16013-CVGroup_ExSkill_1-1 = "……こ、こんな事を！？"
16013-CVGroup_ExSkill_2-1 = "って、これは私のじゃっ……！"
16013-CVGroup_ExSkill_3-1 = "違うんだからっ！！"
16013-CVGroup_ExSkill_Level_1-1 = "許さないっ！！"
16013-CVGroup_ExSkill_Level_2-1 = "くらえっ！！"
16013-CVGroup_ExSkill_Level_3-1 = "うわああああ～！！"
16013-CVGroup_Formation_In_1-1 = "私の力が必要なの？"
16013-CVGroup_Formation_In_2-1 = "し、仕方ないわね！"
16013-CVGroup_Formation_Select-1 = "ちょっと！\nな、なによ！何する気！？"
16013-CVGroup_Growup_1-1 = "あ、ありがとう……ございます……先生。"
16013-CVGroup_Growup_2-1 = "あ、当たり前よね！だって私、エリートだし！\n……ありがとう。"
16013-CVGroup_Growup_3-1 = "こ、こんなにたくさんもらっちゃって、いいの……？"
16013-CVGroup_Growup_4-1 = "先生が色々してくれた分、真面目にやるから……！"
16013-CVGroup_Relationship_Up_1-1 = "また、海……\n一緒にいってくれる……？"
16013-CVGroup_Relationship_Up_2-1 = "変なの……先生のそばにいると、心が……。\nえ、えっ、なに！別に何も言ってないけど！？"
16013-CVGroup_Relationship_Up_3-1 = "こういう時間がもっといっぱいあったらいいのに……。"
16013-CVGroup_Relationship_Up_4-1 = "次は、私が素敵なところに連れてってあげる！"
16013-CVGroup_Tactic_In_1-1 = "わ、私についてきて！"
16013-CVGroup_Tactic_In_2-1 = "わ、分かった、任せて！"
16013-CVGroup_Tactic_Victory_1-1 = "か、勝った！\nこれが私の実力なのよ！"
16013-CVGroup_Tactic_Victory_2-1 = "みんな、お疲れ様……！"
