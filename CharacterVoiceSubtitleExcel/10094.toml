[translation]
10094-CVGroup_Battle_Buffed_1-1 = "Sim! Obrigada!"
10094-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
10094-CVGroup_Battle_Defense_1-1 = "Não vai me acertar!"
10094-CVGroup_Battle_In_1-1 = "O jogo é como a vida real,\ne a vida real é como um jogo!"
10094-CVGroup_Battle_In_2-1 = "Para entrar no clima de empregada, esse tipo de trabalho também é necessário, né?"
10094-CVGroup_Battle_Move_1-1 = "Por enquanto, trabalho concluído!"
10094-CVGroup_Battle_Move_2-1 = "Limpeza concluída! Estou tão cansada..."
10094-CVGroup_Battle_Recovery_1-1 = "Obrigada!"
10094-CVGroup_Battle_TacticalAction_1-1 = "Onde é o próximo?"
10094-CVGroup_Battle_Victory_1-1 = "Hum-hum-hum~ Viu só, Sensei?\nA Momoi empregada de hoje estava incrível, não estava?"
10094-CVGroup_Battle_Victory_2-1 = "Wahahaha! Isto é— espera, ahhh!?"
10094-CVGroup_CommonSkill-1 = "Eu não quero limpar... Ué!?"
10094-CVGroup_ExSkill_1-1 = "Errei de novo! Ué, o que é isso?"
10094-CVGroup_ExSkill_2-1 = "Eu já estou brava! \nUé? Que sorte!"
10094-CVGroup_ExSkill_3-1 = "Poxa, era para ter acertado!\nMas o que é isso?"
10094-CVGroup_ExSkill_Level_1-1 = "Achei, um item raro!"
10094-CVGroup_ExSkill_Level_2-1 = "Ohhh, que poder é esse...!"
10094-CVGroup_ExSkill_Level_3-1 = "Agora eu...!\nNão tenho medo de nada!"
10094-CVGroup_Formation_In_1-1 = "Acho que vou entrar no clima de empregada!"
10094-CVGroup_Formation_In_2-1 = "Vou resolver tudo, como uma empregada!"
10094-CVGroup_Formation_Select-1 = "Ieei! Está vendo, Sensei?\nEu vou limpar tudo para você!"
10094-CVGroup_Growup_1-1 = "Subi de nível! Meu nível de empregada também subiu!\nUé? Como assim o nível de empregada ainda não subiu?\nSensei! O que você quer dizer com isso?"
10094-CVGroup_Growup_2-1 = "Sensei! Hehe, eu fiquei mais forte.\nUé? Então você quer que a gente limpe juntos?\nIsso é... um pouco..."
10094-CVGroup_Growup_3-1 = "Contemplem o crescimento da Momoi empregada!\nO que achou, Sensei?"
10094-CVGroup_Growup_4-1 = "Ah, não tem jeito mesmo.\nEu, a poderosa Momoi empregada, vou resolver tudo para você!"
10094-CVGroup_Relationship_Up_1-1 = "E-estar com o Sensei é realmente divertido.\nIsso... é o que eu sinto de verdade, viu?"
10094-CVGroup_Relationship_Up_2-1 = "Escuta, Sensei!\nDizem que para uma empregada, a recompensa é importante!\nEntão, como recompensa... vamos brincar comigo!"
10094-CVGroup_Relationship_Up_3-1 = "Empregadas também são humanas!\nSe não descansarem, elas quebram...\nEntão! A partir de agora, o Sensei vai descansar comigo! Ehehe."
10094-CVGroup_Relationship_Up_4-1 = "Quando uma empregada aparece em um jogo...\nela quase sempre vira um alvo de conquista, né?\nEntão, Sensei. Por que você não tenta... me conquistar também?"
10094-CVGroup_Tactic_In_1-1 = "Vamos terminar logo isso para ir jogar!"
10094-CVGroup_Tactic_In_2-1 = "Sem problemas!\nEu estou aqui!"
10094-CVGroup_Tactic_Victory_1-1 = "Limpeza concluída!\nBem, é isso aí!"
10094-CVGroup_Tactic_Victory_2-1 = "Eu sou uma garota que consegue fazer as coisas!\nÉ isso mesmo!"
