10037-CVGroup_Battle_Defense_1-1 = "Fraco! Muito fraco!"
10037-CVGroup_Battle_In_1-1 = "Ataquem!"
10037-CVGroup_Battle_In_2-1 = "Ura!"
10037-CVGroup_Battle_Move_1-1 = "O inimigo está recuando! Não os deixem escapar!"
10037-CVGroup_Battle_Move_2-1 = "Rumo à vitória, avancem!"
10037-CVGroup_Battle_Recovery_1-1 = "Agradeço pelo apoio, camarada."
10037-CVGroup_Battle_TacticalAction_1-1 = "Avancem, continuem avançando!"
10037-CVGroup_Battle_Victory_1-1 = "Camaradas, muito bem. Magnífico!"
10037-CVGroup_Battle_Victory_2-1 = "Um ataque frontal é sempre uma estratégia eficaz."
10037-CVGroup_CommonSkill-1 = "Fraco!"
10037-CVGroup_ExSkill_1-1 = "Por aqui!"
10037-CVGroup_ExSkill_2-1 = "Vou atacar agora mesmo!"
10037-CVGroup_ExSkill_3-1 = "Ataquem!"
10037-CVGroup_ExSkill_Level_1-1 = "Não tenho medo de balas!"
10037-CVGroup_ExSkill_Level_2-1 = "Vamos com bravura!"
10037-CVGroup_ExSkill_Level_3-1 = "À frente, atacar!"
10037-CVGroup_Formation_In_1-1 = "Uma boa decisão, Sensei."
