10037-CVGroup_Battle_Recovery_1-1 = "支援に感謝する、姉妹よ。"
10037-CVGroup_Battle_TacticalAction_1-1 = "前進、前進せよ！"
10037-CVGroup_Battle_Victory_1-1 = "諸君、よくやった。素晴らしい！"
10037-CVGroup_Battle_Victory_2-1 = "突撃は、いつも有効な戦略だ。"
10037-CVGroup_CommonSkill-1 = "甘い！"
