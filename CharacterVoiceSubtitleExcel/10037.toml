10037-CVGroup_Relationship_Up_4-1 = "Com o Sensei por perto, o frio de Red Winter nem é tão ruim assim!\nHaha!"
10037-CVGroup_Tactic_In_1-1 = "Camaradas, eu liderarei a vanguarda."
10037-CVGroup_Tactic_In_2-1 = "Pela grande Presidente Cherino!"
10037-CVGroup_Tactic_Victory_1-1 = "Camaradas, a vitória é nossa!"
10037-CVGroup_Tactic_Victory_2-1 = "Vamos celebrar a vitória!"
