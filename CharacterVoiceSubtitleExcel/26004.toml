[translation]
26004-CVGroup_CommonSkill-1 = "知識は心の糧ですね～"
26004-CVGroup_ExSkill_1-1 = "ふんふん……面白いです！"
26004-CVGroup_ExSkill_2-1 = "おおお～、感動しました！"
26004-CVGroup_ExSkill_3-1 = "はぁー……これは、愛！？"
26004-CVGroup_ExSkill_Level_1-1 = "みなさん！もっと読書してください！"
26004-CVGroup_ExSkill_Level_2-1 = "私と一緒に読書しましょう！"
26004-CVGroup_ExSkill_Level_3-1 = "これもまた、本の力です！"
26004-CVGroup_Formation_In_1-1 = "ふふっ、仕方ないですね～\n行きます！"
26004-CVGroup_Formation_In_2-1 = "私の力がお役に立てるなら……！"
26004-CVGroup_Growup_1-1 = "ありがとうございます、先生。"
26004-CVGroup_Growup_2-1 = "本を読めば読むほど、強くなれます！"
26004-CVGroup_Growup_3-1 = "本には、世界中の知恵が盛り込まれています。"
26004-CVGroup_Growup_4-1 = "また知識が増えましたね～"
26004-CVGroup_Relationship_Up_1-1 = "愛がどんなものか、知ってます。\n本でしっかり学びましたから。"
26004-CVGroup_Relationship_Up_2-1 = "ふふ、まるで良い本を読んだ後のような、幸せな気持ちです。"
26004-CVGroup_Relationship_Up_3-1 = "書物では学べなかったものがありました。\n例えば、先生のこととか。"
26004-CVGroup_Relationship_Up_4-1 = "知らなかったことを知ることができるのは、とても嬉しいことです。\n先生は……私について、どれぐらい知りたいですか?"
