[translation]
26004-CVGroup_CommonSkill-1 = "O conhecimento é o alimento da alma, não é?"
26004-CVGroup_ExSkill_1-1 = "Hmm, hmm... Isso é interessante!"
26004-CVGroup_ExSkill_2-1 = "Ohhh~, fiquei emocionada!"
26004-CVGroup_ExSkill_3-1 = "Ah... Seria isso, amor!?"
26004-CVGroup_ExSkill_Level_1-1 = "Pessoal! Leiam mais livros, por favor!"
26004-CVGroup_ExSkill_Level_2-1 = "Vamos ler juntos!"
26004-CVGroup_ExSkill_Level_3-1 = "Isso também é o poder dos livros!"
26004-CVGroup_Formation_In_1-1 = "Fufu, não tem jeito, né~\nVamos lá!"
26004-CVGroup_Formation_In_2-1 = "Se o meu poder puder ser útil...!"
26004-CVGroup_Growup_1-1 = "Muito obrigada, Sensei."
26004-CVGroup_Growup_2-1 = "Quanto mais eu leio, mais forte eu fico!"
26004-CVGroup_Growup_3-1 = "Os livros contêm a sabedoria de todo o mundo."
26004-CVGroup_Growup_4-1 = "Meu conhecimento aumentou novamente~"
26004-CVGroup_Relationship_Up_1-1 = "Eu sei como é o amor.\nAprendi muito bem nos livros."
26004-CVGroup_Relationship_Up_2-1 = "Fufu, sinto-me feliz, como se tivesse acabado de ler um bom livro."
26004-CVGroup_Relationship_Up_3-1 = "Havia coisas que eu não podia aprender nos livros.\nPor exemplo, sobre você, Sensei."
26004-CVGroup_Relationship_Up_4-1 = "É muito gratificante poder aprender coisas que eu não sabia.\nSensei... o quanto você quer saber sobre mim?"
