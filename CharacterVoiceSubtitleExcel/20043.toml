[translation]
20043-CVGroup_CommonSkill-1 = "Quer provar um pouquinho?"
20043-CVGroup_ExSkill_1-1 = "Ham, nham nham... \nHumm...? \nAqui, pode pegar!"
20043-CVGroup_ExSkill_2-1 = "Am... \nAh... \nQuer comer isso?"
20043-CVGroup_ExSkill_3-1 = "Ham ham... \nAh, desculpa! \nToma, pode ficar com este!"
20043-CVGroup_ExSkill_Level_1-1 = "Tcharam! \nBom apetite!"
20043-CVGroup_ExSkill_Level_2-1 = "Não está com fome? \nToma, come!"
20043-CVGroup_ExSkill_Level_3-1 = "Iupii! \nAqui, pra você!"
20043-CVGroup_Formation_In_1-1 = "Me chamou?"
20043-CVGroup_Formation_In_2-1 = "Opa! Eu também vou!"
20043-CVGroup_Formation_Select-1 = "Uau! Sensei, por aqui, por aqui!"
20043-CVGroup_Growup_1-1 = "Hã!? Tudo isso? Posso mesmo? \nEhehe, itadakimasu!"
20043-CVGroup_Growup_2-1 = "Tudo está uma delícia! Obrigada, Sensei!"
20043-CVGroup_Growup_3-1 = "Posso mesmo aceitar tudo isso!? \nDa próxima vez, vou te levar no meu restaurante favorito!"
20043-CVGroup_Growup_4-1 = "Que sabor curioso! \nAh, isso é comida, né?"
20043-CVGroup_Relationship_Up_1-1 = "O que você pediu na oração? \nEu pedi para poder ficar mais tempo com você, Sensei!"
20043-CVGroup_Relationship_Up_2-1 = "Ficar com você faz meu coração disparar! \nMuito mais do que quando eu preparo meu molho secreto especial!"
20043-CVGroup_Relationship_Up_3-1 = "Sensei, posso segurar sua mão? \nEhehe! Já que estamos aqui, vamos andar de braços dados!"
20043-CVGroup_Relationship_Up_4-1 = "Olhar para o seu rosto me deixa com uma sensação tão quentinha... \nMuito mais do que quando como algo gostoso, \nou quando descubro um sabor novo. Sinto que estou muito feliz!"
