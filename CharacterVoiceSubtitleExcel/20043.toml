[translation]
20043-CVGroup_CommonSkill-1 = "味見していく？"
20043-CVGroup_ExSkill_1-1 = "はむ、もぐもぐ……\nんん……？\nはいどーぞ！"
20043-CVGroup_ExSkill_2-1 = "あむ……\nあ……\nこれ食べる？"
20043-CVGroup_ExSkill_3-1 = "はむはむ……\nあ、ごめん！\nこっちあげるね！"
20043-CVGroup_ExSkill_Level_1-1 = "じゃじゃーん！\n美味しく召し上がれ～！"
20043-CVGroup_ExSkill_Level_2-1 = "お腹空いてない？\nはい、食べて！"
20043-CVGroup_ExSkill_Level_3-1 = "やっほ～！\nこれどうぞ！"
20043-CVGroup_Formation_In_1-1 = "呼んだ～？"
20043-CVGroup_Formation_In_2-1 = "はーい！私も行くよ！"
20043-CVGroup_Formation_Select-1 = "わっ！先生、こっちこっち！"
20043-CVGroup_Growup_1-1 = "えっ！？こんなに？いいの？\nえへへ、いっただきま～す！"
20043-CVGroup_Growup_2-1 = "どれも美味しい！ありがと、先生！"
20043-CVGroup_Growup_3-1 = "こんなにもらっちゃっていいの！？\n今度、オススメのお店に連れてったげるね！"
20043-CVGroup_Growup_4-1 = "不思議な味～！\nあ、これ食べ物だよね？"
20043-CVGroup_Relationship_Up_1-1 = "お参りでなにお願いした～？\n私はね、先生ともっと一緒にいれますように～ってお願いしたよ！"
20043-CVGroup_Relationship_Up_2-1 = "先生と一緒にいるとすっごくドキドキするんだ！\n私特製・秘伝ソースを作ったとき以上に、すっごく！"
20043-CVGroup_Relationship_Up_3-1 = "先生、手、つないでもいいー？\nえへへっ！せっかくだから、腕組んじゃお！"
20043-CVGroup_Relationship_Up_4-1 = "先生の顔を見てると、なんだかぽかぽかするんだ……\n美味しいものを食べたときよりも、\n新しい味を見つけたときよりも。すっごく幸せ～って感じ！"
