[translation]
10046-CVGroup_Battle_Buffed_1-1 = "Arte Ninja, Técnica da Gratidão! Versão de Verão!"
10046-CVGroup_Battle_Covered_1-1 = "Arte Ninja! Técnica de Ocultação!"
10046-CVGroup_Battle_Defense_1-1 = "É inútil!"
10046-CVGroup_Battle_In_1-1 = "Izuna, liderando a vanguarda!"
10046-CVGroup_Battle_In_2-1 = "Rápida como uma ninja!\nMissão, iniciada!"
10046-CVGroup_Battle_Move_1-1 = "Vamos para o próximo, Mestre!"
10046-CVGroup_Battle_Move_2-1 = "Movendo-me! Hup!"
10046-CVGroup_Battle_Recovery_1-1 = "Ah, muito obrigada!"
10046-CVGroup_Battle_TacticalAction_1-1 = "Sasa-sa...!"
10046-CVGroup_Battle_Victory_1-1 = "Conseguimos, Mestre!\nÉ a vitória da Izuna e dos outros!"
10046-CVGroup_Battle_Victory_2-1 = "Ehehe! O que achou, Mestre?\nA Izuna se esforçou muito!"
10046-CVGroup_CommonSkill-1 = "Arte Ninja! Técnica do Puku-Puku!"
10046-CVGroup_ExSkill_1-1 = "Hup! Izuna, apresentando-se!"
10046-CVGroup_ExSkill_2-1 = "Isto também é uma Arte Ninja estilo Izuna!"
10046-CVGroup_ExSkill_3-1 = "Arte Ninja! Técnica do Vôlei de Praia!"
10046-CVGroup_ExSkill_Level_1-1 = "Super chute super poderoso!"
10046-CVGroup_ExSkill_Level_2-1 = "Este é o poder total da Izuna!"
10046-CVGroup_ExSkill_Level_3-1 = "Deixe-me mostrar a Izuna do verão!"
10046-CVGroup_Formation_In_1-1 = "Sim! Mestre!\nIzuna, apresentando-se!"
10046-CVGroup_Formation_In_2-1 = "É a vez da Izuna!"
10046-CVGroup_Formation_Select-1 = "Neste verão também, por favor, peça o que quiser à Izuna, Mestre!\nNin-nin!"
10046-CVGroup_Growup_1-1 = "Isto é para a Izuna...?\nMuito obrigada, Mestre!"
10046-CVGroup_Growup_2-1 = "A Izuna cresceu!\nSendo assim, vamos brincar logo! Mestre!"
10046-CVGroup_Growup_3-1 = "Com isto, devo conseguir aguentar o calor...!?\nSendo assim, Mestre, vamos brincar juntos!"
10046-CVGroup_Growup_4-1 = "Graças ao Mestre, a Izuna conseguiu ficar tão forte!\nContinuarei me esforçando pelo Mestre!"
10046-CVGroup_Relationship_Up_1-1 = "Poder estar com o Mestre neste verão também...\nA Izuna está muito feliz!"
10046-CVGroup_Relationship_Up_2-1 = "Mestre! Mestre! Meeeeestre!\nEhehe! De alguma forma, só de te chamar assim,\neu já fico feliz!"
10046-CVGroup_Relationship_Up_3-1 = "...? Aconteceu alguma coisa?\nNão, não, certamente o tempo está bom, mas\nenquanto estiver protegendo o Mestre, não me importo com o calor!"
10046-CVGroup_Relationship_Up_4-1 = "(Ao olhar para o Mestre, meu rosto fica quente... por que será?)"
10046-CVGroup_Tactic_In_1-1 = "Fique de olho no desempenho da Izuna, Mestre!"
10046-CVGroup_Tactic_In_2-1 = "Com a chegada do verão, deixarei que veja a Arte Ninja estilo Izuna ainda mais evoluída!"
10046-CVGroup_Tactic_Victory_1-1 = "Missão cumprida!\nVamos logo brincar no mar! Mestre!"
10046-CVGroup_Tactic_Victory_2-1 = "Não há oponente que a Arte Ninja estilo Izuna não possa derrotar! Provavelmente!"
