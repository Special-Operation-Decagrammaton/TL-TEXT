[translation]
10046-CVGroup_Battle_Buffed_1-1 = "忍法、感謝の術！夏バージョン！"
10046-CVGroup_Battle_Covered_1-1 = "忍法！隠れ身の術！"
10046-CVGroup_Battle_Defense_1-1 = "無駄ですっ！"
10046-CVGroup_Battle_In_1-1 = "イズナ、先陣を切ります！"
10046-CVGroup_Battle_In_2-1 = "忍のように素早く！\n任務、開始です！"
10046-CVGroup_Battle_Move_1-1 = "次に行きましょう、主殿！"
10046-CVGroup_Battle_Move_2-1 = "移動します！とぅっ！"
10046-CVGroup_Battle_Recovery_1-1 = "あっ、ありがとうございます！"
10046-CVGroup_Battle_TacticalAction_1-1 = "サササッ……！"
10046-CVGroup_Battle_Victory_1-1 = "やりましたよ主殿！\nイズナたちの勝利ですね！"
10046-CVGroup_Battle_Victory_2-1 = "えへへっ！どうでしょう主殿！\nイズナ、たくさん頑張りました！"
10046-CVGroup_CommonSkill-1 = "忍法！ぷくぷくの術！"
10046-CVGroup_ExSkill_1-1 = "とぉっ！イズナ、参ります！"
10046-CVGroup_ExSkill_2-1 = "これもまたイズナ流忍法っ！"
10046-CVGroup_ExSkill_3-1 = "忍法！ビーチバレーの術！"
10046-CVGroup_ExSkill_Level_1-1 = "超強力スーパーシュートぉ！"
10046-CVGroup_ExSkill_Level_2-1 = "これが、イズナの本気です！"
10046-CVGroup_ExSkill_Level_3-1 = "夏のイズナを、お見せしましょう！"
10046-CVGroup_Formation_In_1-1 = "はい！主殿！\nイズナ、参ります！"
10046-CVGroup_Formation_In_2-1 = "イズナの番ですね！"
10046-CVGroup_Formation_Select-1 = "この夏も、イズナに何なりとご用命ください主殿！\nニンニン！"
10046-CVGroup_Growup_1-1 = "これを、イズナに……？\nありがとうございます、主殿！"
10046-CVGroup_Growup_2-1 = "イズナ、成長しました！\nというわけで、さっそく遊びましょう！主殿！"
10046-CVGroup_Growup_3-1 = "これで、暑さにも耐えられるはず……！？\nというわけで主殿、一緒に遊びましょう！"
10046-CVGroup_Growup_4-1 = "主殿のおかげで、イズナはここまで強くなれました！\nこれからも主殿のために頑張りますね！"
10046-CVGroup_Relationship_Up_1-1 = "この夏も、主殿と一緒にいられるなんて……。\nイズナ、すっごく幸せです！"
10046-CVGroup_Relationship_Up_2-1 = "あるじ殿！主殿！あ～る～じ～殿！\nえへへっ！何だかこうしてお呼びするだけで、\n楽しくなってしまいます！"
10046-CVGroup_Relationship_Up_3-1 = "……？どうかしましたか？\nいえいえ、確かに良い天気ですが、\n主殿の護衛をしている間は暑さなど気になりません！"
10046-CVGroup_Relationship_Up_4-1 = "（主殿を見ていると、何だか顔が熱く……どうしてでしょう？）"
10046-CVGroup_Tactic_In_1-1 = "イズナの活躍、見守っててくださいね！主殿！"
10046-CVGroup_Tactic_In_2-1 = "夏を迎えて、より進化したイズナ流忍法をお見せしましょう！"
10046-CVGroup_Tactic_Victory_1-1 = "任務完了です！\n早く海に遊びに行きましょう！主殿！"
10046-CVGroup_Tactic_Victory_2-1 = "イズナ流忍術をもってして、倒せない相手はいません！多分！"
