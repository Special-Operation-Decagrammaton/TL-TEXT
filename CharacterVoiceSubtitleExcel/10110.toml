[translation]
10110-CVGroup_Battle_Buffed_1-1 = "Deixe-me expressar minha gratidão."
10110-CVGroup_Battle_Covered_1-1 = "Uma breve calmaria, não é?"
10110-CVGroup_Battle_Defense_1-1 = "É inútil."
10110-CVGroup_Battle_In_1-1 = "Vamos retribuir, mesmo que minimamente."
10110-CVGroup_Battle_In_2-1 = "Com licença."
10110-CVGroup_Battle_Move_1-1 = "Devemos continuar a caminhar?"
10110-CVGroup_Battle_Move_2-1 = "É algo que continua ininterruptamente."
10110-CVGroup_Battle_Recovery_1-1 = "Sou grata pelo favor."
10110-CVGroup_Battle_TacticalAction_1-1 = "Hmm."
10110-CVGroup_Battle_Victory_1-1 = "Ah, eu já conseguia prever."
10110-CVGroup_Battle_Victory_2-1 = "Não houve contratempos."
10110-CVGroup_CommonSkill-1 = "……É aqui!"
10110-CVGroup_ExSkill_1-1 = "……Você chegou até aqui, muito bem."
10110-CVGroup_ExSkill_2-1 = "……Deveria lhe dar as boas-vindas?"
10110-CVGroup_ExSkill_3-1 = "……Entendo, um olhar magnífico."
10110-CVGroup_ExSkill_Level_1-1 = "É bom pensar na eternidade."
10110-CVGroup_ExSkill_Level_2-1 = "Vamos celebrar o tempo que passamos juntos agora."
10110-CVGroup_ExSkill_Level_3-1 = "Não tenho objeções em conversar."
10110-CVGroup_Formation_In_1-1 = "Algum pedido?"
10110-CVGroup_Formation_In_2-1 = "Não me oponho."
10110-CVGroup_Formation_Select-1 = "Entendo, existe essa probabilidade também."
10110-CVGroup_Growup_1-1 = "Crescimento... uma transformação com direção,\ndiferente de uma recuperação, não é?"
10110-CVGroup_Growup_2-1 = "Força é algo curioso, você não acha?"
10110-CVGroup_Growup_3-1 = "Entendo, se assumirmos que ela existe.\nVocê tem interesse em ver o meu verdadeiro potencial?"
10110-CVGroup_Growup_4-1 = "Minha gratidão a você, e um elogio ao futuro."
10110-CVGroup_Relationship_Up_1-1 = "Estou começando a interpretar sua existência, pouco a pouco.\nE quanto a você?"
10110-CVGroup_Relationship_Up_2-1 = "Conte-me sobre você, Sensei.\nO que você vê, o que sente e o que pensa sobre mim?"
10110-CVGroup_Relationship_Up_3-1 = "Um gesto como este...\nVocê pretende me fazer criar expectativas para o futuro?"
10110-CVGroup_Relationship_Up_4-1 = "Não há muito que eu possa fazer.\nPor isso, quero começar confirmando a sua existência."
10110-CVGroup_Tactic_In_1-1 = "É bom que você observe com seus próprios olhos."
10110-CVGroup_Tactic_In_2-1 = "Hmm... isso está dentro do meu alcance de compreensão."
10110-CVGroup_Tactic_Victory_1-1 = "Isso atendeu às suas expectativas?"
10110-CVGroup_Tactic_Victory_2-1 = "Foi do seu agrado?"
