[translation]
10110-CVGroup_Battle_Buffed_1-1 = "感謝を述べておこう。"
10110-CVGroup_Battle_Covered_1-1 = "束の間の平穏だね。"
10110-CVGroup_Battle_Defense_1-1 = "無意味だよ。"
10110-CVGroup_Battle_In_1-1 = "少しでも報いるとしよう。"
10110-CVGroup_Battle_In_2-1 = "お邪魔するよ。"
10110-CVGroup_Battle_Move_1-1 = "歩みを続けようか。"
10110-CVGroup_Battle_Move_2-1 = "連綿と続くものだ。"
10110-CVGroup_Battle_Recovery_1-1 = "恩に着るよ。"
10110-CVGroup_Battle_TacticalAction_1-1 = "ふむ。"
10110-CVGroup_Battle_Victory_1-1 = "ああ、視えていたからね。"
10110-CVGroup_Battle_Victory_2-1 = "滞りは無い。"
10110-CVGroup_CommonSkill-1 = "……此処だ！"
10110-CVGroup_ExSkill_1-1 = "……よくぞ辿り着いたね。"
10110-CVGroup_ExSkill_2-1 = "……歓迎を、するべきだろうか。"
10110-CVGroup_ExSkill_3-1 = "……成程、素晴らしい眼だ。"
10110-CVGroup_ExSkill_Level_1-1 = "悠久を想うと良い。"
10110-CVGroup_ExSkill_Level_2-1 = "今、共に在る時間を賛美しよう。"
10110-CVGroup_ExSkill_Level_3-1 = "語らうことに異存は無いとも。"
10110-CVGroup_Formation_In_1-1 = "ご用命かい？"
10110-CVGroup_Formation_In_2-1 = "吝かではないな。"
10110-CVGroup_Formation_Select-1 = "成程、こういった蓋然性もあるか。"
10110-CVGroup_Growup_1-1 = "成長……回復とは異にする、\n指向性のある変容か。"
10110-CVGroup_Growup_2-1 = "強さとは妙なものだ、そうは思わないかい？"
10110-CVGroup_Growup_3-1 = "そうだね、もし存在すると仮定するならば。\n私の本気というものに、興味はあるかい？"
10110-CVGroup_Growup_4-1 = "君に感謝を、そして未来への賛辞を。"
10110-CVGroup_Relationship_Up_1-1 = "君という存在を、少しずつ解釈できてきたよ。\n君の方はどうかな？"
10110-CVGroup_Relationship_Up_2-1 = "君のことを教えてくれたまえ、先生。\n何を見、何を感じ、私をどう想うのか？"
10110-CVGroup_Relationship_Up_3-1 = "このような行い……。\n未来への期待を抱かせるつもりかい？"
10110-CVGroup_Relationship_Up_4-1 = "私にできることは多くない。\nだからまずは、君という存在を確かめることから始めたい。"
10110-CVGroup_Tactic_In_1-1 = "その目で見届けると良い。"
10110-CVGroup_Tactic_In_2-1 = "ふむ……これくらいは理解の範疇だ。"
10110-CVGroup_Tactic_Victory_1-1 = "君のお眼鏡には叶ったかい？"
10110-CVGroup_Tactic_Victory_2-1 = "お気に召したかな？"
