[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10110-CVGroup_Battle_Buffed_1-1 = "Vou te agradecer muito por isso depois~" 
10110-CVGroup_Battle_Covered_1-1 = "Um momentinho de paz só pra nós." 
10110-CVGroup_Battle_Defense_1-1 = "Não adianta tentar." 
10110-CVGroup_Battle_In_1-1 = "Vou te recompensar um pouquinho por isso." 
10110-CVGroup_Battle_In_2-1 = "Com licença... vou entrar." 
10110-CVGroup_Battle_Move_1-1 = "Vamos continuar a nossa caminhada?" 
10110-CVGroup_Battle_Move_2-1 = "Isso é algo contínuo e incessante." 
10110-CVGroup_Battle_Recovery_1-1 = "Fico te devendo uma." 
10110-CVGroup_Battle_TacticalAction_1-1 = "Fufu." 
10110-CVGroup_Battle_Victory_1-1 = "Ah, sim. Eu já estava vendo tudo." 
10110-CVGroup_Battle_Victory_2-1 = "Nenhum obstáculo à vista." 
10110-CVGroup_CommonSkill-1 = "……Bem aqui!" 
10110-CVGroup_ExSkill_1-1 = "……Olha só onde você conseguiu chegar." 
10110-CVGroup_ExSkill_2-1 = "……Será que eu deveria te dar as boas-vindas?" 
10110-CVGroup_ExSkill_3-1 = "……Entendo, você tem olhos maravilhosos." 
10110-CVGroup_ExSkill_Level_1-1 = "Imagine a eternidade." 
10110-CVGroup_ExSkill_Level_2-1 = "Vamos celebrar o tempo que passamos juntos agora." 
10110-CVGroup_ExSkill_Level_3-1 = "Não tenho objeções a uma boa conversa (e algo a mais)." 
10110-CVGroup_Formation_In_1-1 = "Tem alguma ordem especial pra mim?" 
10110-CVGroup_Formation_In_2-1 = "Eu não vou recusar." 
10110-CVGroup_Formation_Select-1 = "Entendi. Então existe essa probabilidade também." 
10110-CVGroup_Growup_1-1 = "Crescimento... É uma transformação com direção,\nbem diferente de uma simples recuperação, não é?" 
10110-CVGroup_Growup_2-1 = "A força é uma coisinha tão peculiar...\nvocê não acha, Sensei?" 
10110-CVGroup_Growup_3-1 = "Se é que isso existe...\nVocê tem interesse em me ver falando (e agindo) a sério?" 
10110-CVGroup_Growup_4-1 = "Meus agradecimentos a você...\ne os meus mais sinceros elogios ao nosso futuro juntos." 
10110-CVGroup_Relationship_Up_1-1 = "Estou começando a decifrar cada pedacinho seu...\nE quanto a você? Já me decifrou?" 
10110-CVGroup_Relationship_Up_2-1 = "Me conte todos os seus segredos, Sensei.\nO que você vê, o que sente...\ne que tipo de pensamentos você tem sobre mim?" 
10110-CVGroup_Relationship_Up_3-1 = "Fazer esse tipo de coisa comigo...\nEstá tentando me deixar cheia de expectativas\npara o nosso futuro?" 
10110-CVGroup_Relationship_Up_4-1 = "Não há muito que eu possa fazer.\nPor isso, primeiro, quero começar certificando e tocando a sua existência." 
10110-CVGroup_Tactic_In_1-1 = "Você pode observar tudo com esses seus olhos." 
10110-CVGroup_Tactic_In_2-1 = "Fufu... Isso está perfeitamente dentro da minha compreensão." 
10110-CVGroup_Tactic_Victory_1-1 = "Será que eu consegui agradar o seu paladar?" 
10110-CVGroup_Tactic_Victory_2-1 = "E aí, foi do jeito que você gosta?" 