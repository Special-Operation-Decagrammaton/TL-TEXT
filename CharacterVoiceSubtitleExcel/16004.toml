[translation]
16004-CVGroup_Battle_Buffed_1-1 = "Um ótimo suporte!"
16004-CVGroup_Battle_Defense_1-1 = "Que ataque cócegas, hein!"
16004-CVGroup_Battle_In_1-1 = "Vamos? Juntos!"
16004-CVGroup_Battle_In_2-1 = "Começou. Vamos lá!"
16004-CVGroup_Battle_Move_1-1 = "Onde está o próximo oponente?"
16004-CVGroup_Battle_Move_2-1 = "Avançar sem parar!"
16004-CVGroup_Battle_Recovery_1-1 = "Retribuirei esse favor com toda a minha alma!"
16004-CVGroup_Battle_TacticalAction_1-1 = "Estou me movendo!"
16004-CVGroup_Battle_Victory_1-1 = "Yoo-hoo!\nMesmo que o céu perdoe!\nA Phina não vai perdoar!"
16004-CVGroup_Battle_Victory_2-1 = "Wao! Nós vencemos!\nSério, foi a melhor batalha de todas!"
16004-CVGroup_CommonSkill-1 = "Hmph! Concentração total!"
16004-CVGroup_ExSkill_1-1 = "Vou com tudo agora!"
16004-CVGroup_ExSkill_2-1 = "É melhor se preparar!"
16004-CVGroup_ExSkill_3-1 = "Minha arma está queimando de calor."
16004-CVGroup_ExSkill_Level_1-1 = "Eu avisei!"
16004-CVGroup_ExSkill_Level_2-1 = "Disparos como chamas!"
16004-CVGroup_ExSkill_Level_3-1 = "Vou atirar em tudo!"
16004-CVGroup_Formation_In_1-1 = "Sim! Eu estava esperando!"
16004-CVGroup_Formation_In_2-1 = "Hehe, entendi. Vamos lá!"
16004-CVGroup_Formation_Select-1 = "Hehe, você precisa de mim, né? Não é?"
16004-CVGroup_Growup_1-1 = "Sensei! Hoje também vou queimar de paixão!"
16004-CVGroup_Growup_2-1 = "Algo queimando intensamente dentro do meu peito...\nIsso é coragem? Se não for, então..."
16004-CVGroup_Growup_3-1 = "Sensei, não, posso te chamar de mestre!?"
16004-CVGroup_Growup_4-1 = "A Phina de hoje evoluiu ainda mais do que a de ontem!"
16004-CVGroup_Relationship_Up_1-1 = "A cultura de Hyakkiyako é interessante.\nÉ linda, misteriosa e faz meu coração disparar."
16004-CVGroup_Relationship_Up_2-1 = "Sensei!\nConto com sua orientação e apoio daqui para frente!"
16004-CVGroup_Relationship_Up_3-1 = "Sensei, sou feliz por ter te conhecido.\nOntem, hoje e também amanhã."
16004-CVGroup_Relationship_Up_4-1 = "Estou feliz por ter vindo para cá.\nPorque pude conhecer a cultura de Hyakkiyako, meus amigos e...\nO Sensei."
16004-CVGroup_Tactic_In_1-1 = "Sensei! Pode continuar me dando ordens!"
16004-CVGroup_Tactic_In_2-1 = "Agora, vamos ao combate, com honra!"
16004-CVGroup_Tactic_Victory_1-1 = "Foi a melhor decisão!"
16004-CVGroup_Tactic_Victory_2-1 = "Como esperado do Sensei!"
