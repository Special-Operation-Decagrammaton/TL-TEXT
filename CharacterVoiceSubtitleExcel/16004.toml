[translation]
16004-CVGroup_Battle_Buffed_1-1 = "Niceな支援デス！"
16004-CVGroup_Battle_Defense_1-1 = "くすぐったい攻撃デスね！"
16004-CVGroup_Battle_In_1-1 = "行きマスか？一緒に！"
16004-CVGroup_Battle_In_2-1 = "始まりマシタね。行きマショウ！"
16004-CVGroup_Battle_Move_1-1 = "次の相手はどこデスか？"
16004-CVGroup_Battle_Move_2-1 = "止まらず前進、デス！"
16004-CVGroup_Battle_Recovery_1-1 = "この恩は！全身全霊でお返ししマス！"
16004-CVGroup_Battle_TacticalAction_1-1 = "移動しマス！"
16004-CVGroup_Battle_Victory_1-1 = "yoo-hoo！\nたとえ天が許しても！\nフィーナが許しマセン！"
16004-CVGroup_Battle_Victory_2-1 = "Wao！勝ちました！\n本当に、最高の戦闘デシタ！"
16004-CVGroup_CommonSkill-1 = "ふっっ！精神統一しマス！"
16004-CVGroup_ExSkill_1-1 = "ワタシ、本気で行きマス！"
16004-CVGroup_ExSkill_2-1 = "覚悟した方がいいデスよ！"
16004-CVGroup_ExSkill_3-1 = "ワタシの銃が、熱く燃え上がってマス。"
16004-CVGroup_ExSkill_Level_1-1 = "警告はしマシタよ！"
16004-CVGroup_ExSkill_Level_2-1 = "炎のように乱射！"
16004-CVGroup_ExSkill_Level_3-1 = "撃ちまくりマス！"
16004-CVGroup_Formation_In_1-1 = "ハイ！待ってマシた！"
16004-CVGroup_Formation_In_2-1 = "ふふっ、分かりました。行きマス！"
16004-CVGroup_Formation_Select-1 = "ふふっ、ワタシが必要デスよね？そうデスよね？"
16004-CVGroup_Growup_1-1 = "センセイ！今日も熱く燃え上がりマスよ！"
16004-CVGroup_Growup_2-1 = "胸の内側から熱く燃え上がる何か……。\nこれは、勇気デスか？そうじゃナイなら……。"
16004-CVGroup_Growup_3-1 = "センセイ、いや、師匠と呼んでもいいデスか！？"
16004-CVGroup_Growup_4-1 = "今日のワタシは、昨日のワタシよりさらに進化していマス！"
16004-CVGroup_Relationship_Up_1-1 = "百鬼夜行の文化は面白いデス。\n美しくて、神秘的で、ドキドキしマス。"
16004-CVGroup_Relationship_Up_2-1 = "センセイ！\n今後もご指導ご鞭撻のほど、よろしくお願いしマス！"
16004-CVGroup_Relationship_Up_3-1 = "センセイ、アナタに会えて幸せデス。\n昨日も、今日も、そして明日も。"
16004-CVGroup_Relationship_Up_4-1 = "ここに来れて嬉しいデス。\n百鬼夜行の文化と、友達とそして……\nセンセイに会えマシタから。"
16004-CVGroup_Tactic_In_1-1 = "センセイ！どんどん指示してクダサイ！"
16004-CVGroup_Tactic_In_2-1 = "イザ、尋常に、勝負！"
16004-CVGroup_Tactic_Victory_1-1 = "最高の判断デシタ！"
16004-CVGroup_Tactic_Victory_2-1 = "さすがセンセイ、デス！"
