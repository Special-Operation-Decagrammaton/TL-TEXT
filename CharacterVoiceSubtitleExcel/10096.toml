[translation]
10096-CVGroup_Battle_Buffed_1-1 = "Agradeço a ajuda."
10096-CVGroup_Battle_Covered_1-1 = "Vou me proteger. Preciso de apoio!"
10096-CVGroup_Battle_Defense_1-1 = "Não vai funcionar!"
10096-CVGroup_Battle_In_1-1 = "Eu vou liderar.\nSigam-me."
10096-CVGroup_Battle_In_2-1 = "Vítima localizada. Estou indo."
10096-CVGroup_Battle_Move_1-1 = "Mudando de posição."
10096-CVGroup_Battle_Move_2-1 = "O próximo é por aqui."
10096-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10096-CVGroup_Battle_TacticalAction_1-1 = "Movendo-me."
10096-CVGroup_Battle_Victory_1-1 = "Confirmei que todos estão bem.\nMas não podemos baixar a guarda."
10096-CVGroup_Battle_Victory_2-1 = "Se isso ajudar a manter todos um pouco mais seguros..."
10096-CVGroup_CommonSkill-1 = "(Som de apito)"
10096-CVGroup_ExSkill_1-1 = "Sigam as regras!"
10096-CVGroup_ExSkill_2-1 = "Ei, parem com isso!"
10096-CVGroup_ExSkill_3-1 = "Evitem comportamentos perigosos."
10096-CVGroup_ExSkill_Level_1-1 = "É pela segurança de todos."
10096-CVGroup_ExSkill_Level_2-1 = "Ajam de acordo com a ordem!"
10096-CVGroup_ExSkill_Level_3-1 = "Não se esqueçam de fazer o aquecimento!"
10096-CVGroup_Formation_In_1-1 = "Há alguém precisando de resgate?"
10096-CVGroup_Formation_In_2-1 = "Entendido. Eu irei."
10096-CVGroup_Formation_Select-1 = "...Alguma coisa?"
10096-CVGroup_Growup_1-1 = "Ainda tenho muito a aprender...\nVou me esforçar mais."
10096-CVGroup_Growup_2-1 = "Muito... obrigada.\nÉ mais do que alguém como eu merece."
10096-CVGroup_Growup_3-1 = "Fico honrada por receber tanta atenção...\nObrigada, Sensei."
10096-CVGroup_Growup_4-1 = "Farei o meu melhor para corresponder à confiança que depositou em mim."
10096-CVGroup_Relationship_Up_1-1 = "Espero que todos possam aproveitar o verão com tranquilidade."
10096-CVGroup_Relationship_Up_2-1 = "Não se esqueça do aquecimento.\nEu vou te ensinar, vamos fazer juntos."
10096-CVGroup_Relationship_Up_3-1 = "Sensei, por favor, fique onde eu possa te ver.\n...Afinal, agora eu sou uma salva-vidas."
10096-CVGroup_Relationship_Up_4-1 = "Uma salva-vidas deve manter a calma o tempo todo, mas...\nÉ difícil quando você está por perto, Sensei.\nPor que será...?"
10096-CVGroup_Tactic_In_1-1 = "Iniciando a operação."
10096-CVGroup_Tactic_In_2-1 = "Garantindo a segurança."
10096-CVGroup_Tactic_Victory_1-1 = "Conseguimos evitar danos maiores."
10096-CVGroup_Tactic_Victory_2-1 = "Segurança garantida.\nBom trabalho."
