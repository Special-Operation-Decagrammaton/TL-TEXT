[translation]
10096-CVGroup_Battle_Buffed_1-1 = "Obrigada pelo apoio."
10096-CVGroup_Battle_Covered_1-1 = "Buscando cobertura. Peço suporte!"
10096-CVGroup_Battle_Defense_1-1 = "Isso não vai funcionar!"
10096-CVGroup_Battle_In_1-1 = "Eu vou liderar a vanguarda.\nSigam-me."
10096-CVGroup_Battle_In_2-1 = "Vítima precisando de resgate confirmada. Estou a caminho."
10096-CVGroup_Battle_Move_1-1 = "Mudando de posição."
10096-CVGroup_Battle_Move_2-1 = "O próximo é por aqui."
10096-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10096-CVGroup_Battle_TacticalAction_1-1 = "Movimentando."
10096-CVGroup_Battle_Victory_1-1 = "Consegui confirmar que todos estão seguros.\nPorém, não podemos baixar a guarda."
10096-CVGroup_Battle_Victory_2-1 = "Se com isso, todos puderem passar o tempo com um pouco mais de segurança..."
10096-CVGroup_CommonSkill-1 = "(Som de apito)"
10096-CVGroup_ExSkill_1-1 = "Sigam as regras!"
10096-CVGroup_ExSkill_2-1 = "Você aí, pare o que está fazendo!"
10096-CVGroup_ExSkill_3-1 = "Por favor, abstenham-se de ações perigosas."
10096-CVGroup_ExSkill_Level_1-1 = "É para a segurança de todos."
10096-CVGroup_ExSkill_Level_2-1 = "Ajam de acordo com a ordem e a disciplina!"
10096-CVGroup_ExSkill_Level_3-1 = "Façam o aquecimento adequadamente!"
10096-CVGroup_Formation_In_1-1 = "Há alguém precisando de resgate?"
10096-CVGroup_Formation_In_2-1 = "Entendido. Eu irei."
10096-CVGroup_Formation_Select-1 = "……Alguma coisa?"
10096-CVGroup_Growup_1-1 = "Ainda tenho muito o que melhorar, mas...\nme dedicarei ainda mais."
10096-CVGroup_Growup_2-1 = "M-Muito... obrigada.\nIsso é mais do que alguém como eu merece."
10096-CVGroup_Growup_3-1 = "Receber tanta atenção e cuidado assim...\nMuito obrigada, Sensei."
10096-CVGroup_Growup_4-1 = "Farei o meu melhor para corresponder à confiança que me foi dada."
10096-CVGroup_Relationship_Up_1-1 = "Espero que todos possam curtir o verão com tranquilidade."
10096-CVGroup_Relationship_Up_2-1 = "Não se esqueçam do aquecimento.\nEu vou ensinar, então vamos fazer juntos."
10096-CVGroup_Relationship_Up_3-1 = "Sensei, por favor, fique onde eu possa vê-lo.\n...Afinal, agora eu sou uma salva-vidas."
10096-CVGroup_Relationship_Up_4-1 = "Uma salva-vidas precisa se manter sempre calma, mas...\nquando o senhor está por perto, isso se torna bem difícil.\nPor que será, não é..."
10096-CVGroup_Tactic_In_1-1 = "Iniciando a operação."
10096-CVGroup_Tactic_In_2-1 = "Garantindo a segurança."
10096-CVGroup_Tactic_Victory_1-1 = "Conseguimos evitar danos maiores."
10096-CVGroup_Tactic_Victory_2-1 = "Segurança garantida.\nBom trabalho a todos."