[translation]
10096-CVGroup_Battle_Buffed_1-1 = "世話になった。"
10096-CVGroup_Battle_Covered_1-1 = "遮蔽する。支援を頼む！"
10096-CVGroup_Battle_Defense_1-1 = "効かない！"
10096-CVGroup_Battle_In_1-1 = "私が先導しよう。\nついてくるように。"
10096-CVGroup_Battle_In_2-1 = "要救助者を確認。すぐ行く。"
10096-CVGroup_Battle_Move_1-1 = "位置を変更する。"
10096-CVGroup_Battle_Move_2-1 = "次はこっちだな。"
10096-CVGroup_Battle_Recovery_1-1 = "ありがとう。"
10096-CVGroup_Battle_TacticalAction_1-1 = "移動する。"
10096-CVGroup_Battle_Victory_1-1 = "無事を確認できました。\nしかし油断は禁物です。"
10096-CVGroup_Battle_Victory_2-1 = "これで、少しでも皆が安全に過ごせるのなら……"
10096-CVGroup_CommonSkill-1 = "（ホイッスルの音）"
10096-CVGroup_ExSkill_1-1 = "規則に従うように！"
10096-CVGroup_ExSkill_2-1 = "そこ、動作やめ！"
10096-CVGroup_ExSkill_3-1 = "危険な行動は、慎むように。"
10096-CVGroup_ExSkill_Level_1-1 = "皆の安全のためだ。"
10096-CVGroup_ExSkill_Level_2-1 = "秩序に則って行動するように！"
10096-CVGroup_ExSkill_Level_3-1 = "準備運動をしっかりするように！"
10096-CVGroup_Formation_In_1-1 = "要救助者がいるのですか？"
10096-CVGroup_Formation_In_2-1 = "分かりました。私が行きましょう。"
10096-CVGroup_Formation_Select-1 = "……何か？"
10096-CVGroup_Growup_1-1 = "まだまだ至らないところの多い私ですが……\nもっと精進します。"
10096-CVGroup_Growup_2-1 = "ありがとう……ございます。\n私のような者には過分なくらいです。"
10096-CVGroup_Growup_3-1 = "こんなに目をかけていただくなんて……\nありがとうございます、先生。"
10096-CVGroup_Growup_4-1 = "いただいた信頼に応えられるよう、最善を尽くします。"
10096-CVGroup_Relationship_Up_1-1 = "皆が安心して夏を楽しめますように。"
10096-CVGroup_Relationship_Up_2-1 = "準備運動をお忘れなく。\n私がお教えしますので、一緒にやりましょう。"
10096-CVGroup_Relationship_Up_3-1 = "先生、私の目の届く範囲にいてください。\n……今の私はライフセーバーですから。"
10096-CVGroup_Relationship_Up_4-1 = "ライフセーバーは常に冷静で在らねばならないのですが、\n先生がそばにいると、どうにも難しいですね。\n何故でしょうか……。"
10096-CVGroup_Tactic_In_1-1 = "作戦を開始します。"
10096-CVGroup_Tactic_In_2-1 = "安全を確保します。"
10096-CVGroup_Tactic_Victory_1-1 = "大きな被害が出ずにすみました。"
10096-CVGroup_Tactic_Victory_2-1 = "安全確保完了。\nお疲れ様でした。"
