[translation]
20042-CVGroup_CommonSkill-1 = "Dê uma olhada na minha arte!"
20042-CVGroup_ExSkill_1-1 = "Onde está o sinal? ...Achei!\n...Ei, espera... Aaaah!?"
20042-CVGroup_ExSkill_2-1 = "Conecte, conecte...\nIsso! U-uau!"
20042-CVGroup_ExSkill_3-1 = "Por favor, conecte... Uau!\nE-ei...!?"
20042-CVGroup_ExSkill_Level_1-1 = "Uau, errei...!\nB-bem, tanto faz..."
20042-CVGroup_ExSkill_Level_2-1 = "Ugh... \nEca... Você viu isso agora?"
20042-CVGroup_ExSkill_Level_3-1 = "Aaaah!?\nPo-pouso bem-sucedido...!"
20042-CVGroup_Formation_In_1-1 = "Hã? Tenho que sair?"
20042-CVGroup_Formation_In_2-1 = "Poxa! Eu já estou ocupada o suficiente só com o acampamento!?"
20042-CVGroup_Formation_Select-1 = "Ah, isso é bom! Me leve assim mesmo~"
20042-CVGroup_Growup_1-1 = "Sinto que já me acostumei com o acampamento, mas...\n...Será que isso é uma coisa boa?"
20042-CVGroup_Growup_2-1 = "Ainda falta muito caminho, mas\nsinto que descobri para onde devo ir!"
20042-CVGroup_Growup_3-1 = "Sim, com isso acho que consigo me esforçar mais!"
20042-CVGroup_Growup_4-1 = "Oh, a inspiração surgiu!"
20042-CVGroup_Relationship_Up_1-1 = "Obrigada sempre, Sensei.\nIsso é de coração!"
20042-CVGroup_Relationship_Up_2-1 = "Subir a montanha é difícil, mas...\n...Se o Sensei estiver junto, acho que tudo bem."
20042-CVGroup_Relationship_Up_3-1 = "Sensei, que tal darmos uma volta juntos?\nN-não tem segundas intenções, viu!?\n...O tempo está bom, não está?"
20042-CVGroup_Relationship_Up_4-1 = "(Ué? Que estranho...\nAgora há pouco o rosto do Sensei parecia brilhar tanto...)"
