[translation]
20045-CVGroup_CommonSkill-1 = "Por favor, venham comigo!"
20045-CVGroup_ExSkill_1-1 = "Estou indo!"
20045-CVGroup_ExSkill_2-1 = "Deixe com a guia!"
20045-CVGroup_ExSkill_3-1 = "A cavalaria chegou!"
20045-CVGroup_ExSkill_Level_1-1 = "Vamos fazer um estrondo!"
20045-CVGroup_ExSkill_Level_2-1 = "Com isso, está tudo OK!"
20045-CVGroup_ExSkill_Level_3-1 = "Oh! Vai explodir!"
20045-CVGroup_Formation_In_1-1 = "Precisa de um guia, não é?"
