[translation]
20019-CVGroup_CommonSkill-1 = "Vou deixar aqui."
20019-CVGroup_ExSkill_1-1 = "Este é o alvo da limpeza de hoje?"
20019-CVGroup_ExSkill_2-1 = "Toda essa bagunça..."
20019-CVGroup_ExSkill_3-1 = "Vamos limpar tudo direitinho."
20019-CVGroup_ExSkill_Level_1-1 = "Sim, aqui está."
20019-CVGroup_ExSkill_Level_2-1 = "Por favor, aceite os meus sentimentos."
20019-CVGroup_ExSkill_Level_3-1 = "Por favor, aproveite."
20019-CVGroup_Formation_In_1-1 = "Muito bem, vamos começar a limpeza?"
20019-CVGroup_Formation_In_2-1 = "Meu coração está batendo mais forte que o normal...\nSerá porque estou com você, mestre?"
20019-CVGroup_Formation_Select-1 = "Fufu, vai valer a pena limpar isso."
20019-CVGroup_Growup_1-1 = "Estou sendo útil, pelo menos um pouco?"
20019-CVGroup_Growup_2-1 = "Como empregada e como coelhinha,\nespero ser útil ao senhor, mestre."
20019-CVGroup_Growup_3-1 = "Eu cresci, pyon pyon!"
20019-CVGroup_Growup_4-1 = "Para conseguir atender às suas expectativas, mestre...\nEu me tornei mais refinada."
20019-CVGroup_Relationship_Up_1-1 = "Coelhinhas precisam de amor, sabe.\nPyon pyon!"
20019-CVGroup_Relationship_Up_2-1 = "Muito obrigada, mestre.\nContinue contando comigo."
20019-CVGroup_Relationship_Up_3-1 = "Tudo é graças ao senhor, mestre.\nFufu... realmente, tudo."
20019-CVGroup_Relationship_Up_4-1 = "Não deixe a Akane coelhinha escapar, está bem?"
