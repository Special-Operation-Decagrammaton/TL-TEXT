[translation]
20019-CVGroup_CommonSkill-1 = "ここに置いておきますね。"
20019-CVGroup_ExSkill_1-1 = "こちらが本日の掃除対象でしょうか？"
20019-CVGroup_ExSkill_2-1 = "こんなに散らかして……。"
20019-CVGroup_ExSkill_3-1 = "綺麗に片付けてしまいましょう。"
20019-CVGroup_ExSkill_Level_1-1 = "はい、どうぞ。"
20019-CVGroup_ExSkill_Level_2-1 = "私の気持ちを受け取ってくださいませ。"
20019-CVGroup_ExSkill_Level_3-1 = "どうぞご堪能ください。"
20019-CVGroup_Formation_In_1-1 = "さあ、それではお掃除を始めましょうか？"
20019-CVGroup_Formation_In_2-1 = "普段より胸が高鳴って……\nこれも、ご主人様と一緒にいるからでしょうか？"
20019-CVGroup_Formation_Select-1 = "ふふっ、お掃除のしがいがありますね。"
20019-CVGroup_Growup_1-1 = "少しは、お役に立てておりますでしょうか？"
20019-CVGroup_Growup_2-1 = "メイドとしても、ウサギとしても、\nご主人様のお役に立てますように。"
20019-CVGroup_Growup_3-1 = "成長しましたよ、ぴょんぴょん！"
20019-CVGroup_Growup_4-1 = "ご主人様のご期待にお応えできるように……\n洗練されてきました。"
20019-CVGroup_Relationship_Up_1-1 = "ウサギには愛が必要なんですよ。\nぴょんぴょん！"
20019-CVGroup_Relationship_Up_2-1 = "ありがとうございますご主人様。\nこれからもご期待ください。"
20019-CVGroup_Relationship_Up_3-1 = "全てご主人様のおかげです。\nふふっ……本当に、全てが。"
20019-CVGroup_Relationship_Up_4-1 = "ウサギのアカネを、逃さないでくださいね？"
