[translation]
10009-CVGroup_Battle_Buffed_1-1 = "Me sinto revigorada!"
10009-CVGroup_Battle_Defense_1-1 = "Isso não dói, sabia?"
10009-CVGroup_Battle_In_1-1 = "Ataquem! Vamos roubar todos os lanches dos inimigos!"
10009-CVGroup_Battle_In_2-1 = "Vamos acabar logo com isso para podermos comer!"
10009-CVGroup_Battle_Move_1-1 = "Já acabou? Quando é a hora da comida?"
10009-CVGroup_Battle_Move_2-1 = "Depois que a gente cuidar deles, posso ir comer?"
10009-CVGroup_Battle_Recovery_1-1 = "Valeu! Mas agora fiquei com fome..."
10009-CVGroup_Battle_TacticalAction_1-1 = "Indo para lá~"
10009-CVGroup_Battle_Victory_1-1 = "Sim, isso aí!"
10009-CVGroup_Battle_Victory_2-1 = "Um hambúrguer depois de uma briga é simplesmente o melhor!"
10009-CVGroup_CommonSkill-1 = "Ei!"
10009-CVGroup_ExSkill_1-1 = "Apareça!\nHambúrguer de Chocolate Deluxe!"
10009-CVGroup_ExSkill_2-1 = "Ei! Eu preparei isso exatamente para momentos como este!"
10009-CVGroup_ExSkill_3-1 = "Tcharam!! O lanche chegou!"
10009-CVGroup_ExSkill_Level_1-1 = "Isso dá energia!"
10009-CVGroup_ExSkill_Level_2-1 = "Uoooooh!!"
10009-CVGroup_ExSkill_Level_3-1 = "Oh! Energia carregada!\nPrepare-se!"
10009-CVGroup_Formation_In_1-1 = "Ok."
10009-CVGroup_Formation_In_2-1 = "Pronta~"
10009-CVGroup_Formation_Select-1 = "(mastiga, mastiga)"
10009-CVGroup_Growup_1-1 = "Obrigada, Sensei!\nSinto que minha barriga está um pouco mais cheia."
10009-CVGroup_Growup_2-1 = "Por que você sempre me dá comidas tão preciosas?"
10009-CVGroup_Growup_3-1 = "Obrigada pela refeição~!"
10009-CVGroup_Growup_4-1 = "Certo! Vamos comer muita coisa gostosa e ganhar forças!"
10009-CVGroup_Relationship_Up_1-1 = "Vamos fazer um tour gastronômico!"
10009-CVGroup_Relationship_Up_2-1 = "Não importa o que eu coma ou onde eu coma, é divertido!\nSerá que é porque estou com o Sensei?"
10009-CVGroup_Relationship_Up_3-1 = "O que vamos comer da próxima vez?"
10009-CVGroup_Relationship_Up_4-1 = "Uau~"
10009-CVGroup_Tactic_In_1-1 = "Vamos acabar logo com isso e ir comer!"
10009-CVGroup_Tactic_In_2-1 = "Ah~, acho que tem um restaurante famoso e delicioso por aqui~"
10009-CVGroup_Tactic_Victory_1-1 = "Sensei~ vencemos~\nVocê vai me pagar algo gostoso, né~?"
10009-CVGroup_Tactic_Victory_2-1 = "Ah! Já está na hora de comer, sabia?\nDepressa, depressa!"
