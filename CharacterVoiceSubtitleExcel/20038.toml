[translation]
20038-CVGroup_CommonSkill-1 = "O perfume das belas flores e a brisa quente... Que atmosfera encantadora."
20038-CVGroup_ExSkill_1-1 = "O restaurante chinês está de portas abertas!"
20038-CVGroup_ExSkill_2-1 = "Por favor, experimente o pãozinho de pudim aprovado pela Secretária-Geral Cherino!"
20038-CVGroup_ExSkill_3-1 = "Saboreie o gosto da grande revolução!"
20038-CVGroup_ExSkill_Level_1-1 = "Por favor, respeitem a fila."
20038-CVGroup_ExSkill_Level_2-1 = "O serviço de Red Winter é igual para todos."
20038-CVGroup_ExSkill_Level_3-1 = "Que tal o meu restaurante favorito para o almoço?"
20038-CVGroup_Formation_In_1-1 = "Pode deixar comigo."
20038-CVGroup_Formation_In_2-1 = "Contemplem a essência de Red Winter."
20038-CVGroup_Formation_Select-1 = "Sensei, você não está com calor?"
20038-CVGroup_Growup_1-1 = "Dedicarei meu esforço pela Academia Federal de Red Winter e pela Presidente Cherino."
20038-CVGroup_Growup_2-1 = "Muito obrigada pelos seus conselhos maravilhosos."
20038-CVGroup_Growup_3-1 = "Se continuarmos assim...\nQuem sabe eu não consiga trazer você para Red Winter em breve... fufu."
20038-CVGroup_Growup_4-1 = "A Genryumon sabe muito bem como conquistar o coração das pessoas.\n...Fufu, é algo a se tomar cuidado."
20038-CVGroup_Relationship_Up_1-1 = "Sinto que alguém está me olhando...\n...Será que devo deixar a fenda mais profunda?"
20038-CVGroup_Relationship_Up_2-1 = "Pequenas mentiras e agitações começam entre os nossos.\nSim... eu, há muito tempo, tenho sentimentos por você, Sensei."
20038-CVGroup_Relationship_Up_3-1 = "Está meio quente hoje, não acha...\nSerá por causa da temperatura?"
20038-CVGroup_Relationship_Up_4-1 = "Sensei... você consegue atrair as pessoas\nmesmo sem precisar dizer uma palavra."
