[translation]
20038-CVGroup_CommonSkill-1 = "美しい花の香りと暖かな風……趣がありますね。"
20038-CVGroup_ExSkill_1-1 = "中華料理店、新装開店です！"
20038-CVGroup_ExSkill_2-1 = "チェリノ書記長お墨付きのプリンまんを、どうぞ！"
20038-CVGroup_ExSkill_3-1 = "偉大なる革命の味を、ご賞味ください！"
20038-CVGroup_ExSkill_Level_1-1 = "順番を守ってくださいね。"
20038-CVGroup_ExSkill_Level_2-1 = "レッドウィンターのサービスは皆に平等ですので。"
20038-CVGroup_ExSkill_Level_3-1 = "お昼に、私のオススメのお店はいかがでしょう？"
20038-CVGroup_Formation_In_1-1 = "お任せください。"
20038-CVGroup_Formation_In_2-1 = "レッドウィンターの真髄をご覧あれ。"
20038-CVGroup_Formation_Select-1 = "先生、暑くはないですか？"
20038-CVGroup_Growup_1-1 = "レッドウィンター連邦学園とチェリノ会長のために、精進いたします。"
20038-CVGroup_Growup_2-1 = "素晴らしい助言をありがとうございます。"
20038-CVGroup_Growup_3-1 = "このままいけば……\nそのうち先生をレッドウィンターに引き入れることも……ふふ。"
20038-CVGroup_Growup_4-1 = "玄龍門は人の心を掴むのがお上手なのですね。\n……ふふ、要注意かと。"
20038-CVGroup_Relationship_Up_1-1 = "なんだか、視線を感じますね……？\n……スリットをもっと深くしてみましょうか。"
20038-CVGroup_Relationship_Up_2-1 = "小さな嘘と扇動は身内から。\nええ……私、かねてより先生をお慕いしておりまして。"
20038-CVGroup_Relationship_Up_3-1 = "今日はなんだか暑いですね……\n気温が高いから？"
20038-CVGroup_Relationship_Up_4-1 = "先生は……言葉をかわさずとも\n人を惹きつけることができるのですね。"
