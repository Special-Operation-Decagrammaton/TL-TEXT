[translation]
10142-CVGroup_Battle_Buffed_1-1 = "Спасибо за вашу заботу."
10142-CVGroup_Battle_Defense_1-1 = "Я так и знала."
10142-CVGroup_Battle_In_1-1 = "Я не большой любитель жары, но... я сделаю всё, что в моих силах."
10142-CVGroup_Battle_In_2-1 = "Посмотрите на меня в деле, Сенсей."
10142-CVGroup_Battle_Move_1-1 = "Давайте продвигаться с осторожностью."
10142-CVGroup_Battle_Move_2-1 = "Все идут за мной?"
10142-CVGroup_Battle_Recovery_1-1 = "Это... и есть дружба."
10142-CVGroup_Battle_TacticalAction_1-1 = "Я выдвигаюсь."
10142-CVGroup_Battle_Victory_1-1 = "Да, мы победили."
10142-CVGroup_Battle_Victory_2-1 = "В этом и заключается сила Хяккарюран."
10142-CVGroup_CommonSkill-1 = "Серьёзный поединок."
10142-CVGroup_ExSkill_1-1 = "Так вот оно какое, летнее море..."
10142-CVGroup_ExSkill_2-1 = "Морской бриз так приятен..."
10142-CVGroup_ExSkill_3-1 = "Белые волны... как красиво."
10142-CVGroup_ExSkill_Level_1-1 = "Было слишком ярко?"
10142-CVGroup_ExSkill_Level_2-1 = "Возможно, я сияла чуточку слишком сильно."
10142-CVGroup_ExSkill_Level_3-1 = "Я сделала это ненамеренно, но..."
10142-CVGroup_Formation_In_1-1 = "Да, Хякурэн тоже со мной."
10142-CVGroup_Formation_In_2-1 = "Моя правая рука теперь в порядке. Предоставьте это мне."
10142-CVGroup_Formation_Select-1 = "Если вы этого желаете, Сенсей... я последую за вами."
10142-CVGroup_Growup_1-1 = "С этим... одна печать на моей правой руке была снята."
10142-CVGroup_Growup_2-1 = "Понимаю. Значит, мне всё ещё было куда расти."
10142-CVGroup_Growup_3-1 = "Я покажу вам силу, которую вернула себе из сумерек."
10142-CVGroup_Growup_4-1 = "Такое чувство, будто бутон наконец-то распустился.\nСпасибо вам, всё это благодаря вам, Сенсей."
10142-CVGroup_Relationship_Up_1-1 = "Подобно тому, как с таянием снега приходит весна...\nПохоже, время для новой жизни пришло и в моё опустошённое сердце."
10142-CVGroup_Relationship_Up_2-1 = "Вы действительно очень добры.\nЯ надеюсь когда-нибудь стать похожей на вас, Сенсей."
10142-CVGroup_Relationship_Up_3-1 = "Спасибо, что всегда верите в меня.\n...Я рассчитываю на вас, Сенсей."
10142-CVGroup_Relationship_Up_4-1 = "У меня нет особых достоинств, кроме моей красоты, но...\nНичего, если... я останусь рядом с вами, Сенсей?"
10142-CVGroup_Tactic_In_1-1 = "Я покажу всем, кто я такая."
10142-CVGroup_Tactic_In_2-1 = "Я приведу нас к победе."
10142-CVGroup_Tactic_Victory_1-1 = "Я рада, что смогла оправдать ваши ожидания, Сенсей."
10142-CVGroup_Tactic_Victory_2-1 = "Я больше... ни для кого не замена."