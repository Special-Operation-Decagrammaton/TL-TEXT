[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10142-CVGroup_Battle_Buffed_1-1 = "Obrigada por se preocupar comigo." 
10142-CVGroup_Battle_Defense_1-1 = "Eu já sabia." 
10142-CVGroup_Battle_In_1-1 = "Não sou muito boa com o calor, mas... vou me esforçar." 
10142-CVGroup_Battle_In_2-1 = "Sensei, fique de olho no meu desempenho." 
10142-CVGroup_Battle_Move_1-1 = "Vamos avançar com cautela." 
10142-CVGroup_Battle_Move_2-1 = "Pessoal, estão me acompanhando?" 
10142-CVGroup_Battle_Recovery_1-1 = "Isso é que é... amizade." 
10142-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu." 
10142-CVGroup_Battle_Victory_1-1 = "Sim, a vitória é nossa." 
10142-CVGroup_Battle_Victory_2-1 = "Este é o poder da Hyakkaryouran." 
10142-CVGroup_CommonSkill-1 = "Um duelo a sério." 
10142-CVGroup_ExSkill_1-1 = "Então este é o mar no verão..." 
10142-CVGroup_ExSkill_2-1 = "A brisa está tão gostosa..." 
10142-CVGroup_ExSkill_3-1 = "As ondas brancas... são tão lindas." 
10142-CVGroup_ExSkill_Level_1-1 = "Foi muito ofuscante?" 
10142-CVGroup_ExSkill_Level_2-1 = "Acho que brilhei demais." 
10142-CVGroup_ExSkill_Level_3-1 = "Não era a minha intenção fazer isso, mas..." 
10142-CVGroup_Formation_In_1-1 = "Sim, já estou com a Hyakuren comigo." 
10142-CVGroup_Formation_In_2-1 = "O meu braço direito está bem agora. Deixa comigo." 
10142-CVGroup_Formation_Select-1 = "Se é o que o Sensei quer... eu obedeço." 
10142-CVGroup_Growup_1-1 = "Com isso... mais um selo do meu braço direito foi desfeito." 
10142-CVGroup_Growup_2-1 = "Entendi. Parece que eu ainda tinha espaço para crescer." 
10142-CVGroup_Growup_3-1 = "O poder que eu recuperei do crepúsculo... vou mostrá-lo a você." 
10142-CVGroup_Growup_4-1 = "Sinto como se um botão de flor estivesse se abrindo.\nObrigada, isso é tudo graças ao Sensei." 
10142-CVGroup_Relationship_Up_1-1 = "Assim como a primavera chega quando a neve derrete...\nParece que finalmente chegou a hora de brotar no meu coração desolado." 
10142-CVGroup_Relationship_Up_2-1 = "Você é gentil, como sempre.\nEu também quero me tornar igual ao Sensei um dia." 
10142-CVGroup_Relationship_Up_3-1 = "Obrigada por sempre acreditar em mim.\n...Eu conto com você, Sensei." 
10142-CVGroup_Relationship_Up_4-1 = "Eu não tenho nenhum outro talento além de ser bonita, mas...\nSerá que eu... posso ficar ao seu lado, Sensei?" 
10142-CVGroup_Tactic_In_1-1 = "Vou mostrar a todos quem eu sou." 
10142-CVGroup_Tactic_In_2-1 = "Vou guiar vocês rumo à vitória." 
10142-CVGroup_Tactic_Victory_1-1 = "Fico feliz se eu consegui corresponder às expectativas do Sensei." 
10142-CVGroup_Tactic_Victory_2-1 = "Eu já não sou mais... o \"substituto\" de ninguém." 