[translation]
10142-CVGroup_Battle_Buffed_1-1 = "Obrigada por se preocupar comigo."
10142-CVGroup_Battle_Defense_1-1 = "Eu já sabia."
10142-CVGroup_Battle_In_1-1 = "Eu não sou boa com o calor, mas... vou me esforçar."
10142-CVGroup_Battle_In_2-1 = "Observe minhas ações, Sensei."
10142-CVGroup_Battle_Move_1-1 = "Vamos prosseguir com cautela."
10142-CVGroup_Battle_Move_2-1 = "Estão todos me acompanhando?"
10142-CVGroup_Battle_Recovery_1-1 = "Isso é... o que os amigos fazem."
10142-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu."
10142-CVGroup_Battle_Victory_1-1 = "Sim, a vitória é nossa."
10142-CVGroup_Battle_Victory_2-1 = "Este é o poder da Hyakkaryouran."
10142-CVGroup_CommonSkill-1 = "Batalha séria."
10142-CVGroup_ExSkill_1-1 = "Então esse é o mar do verão..."
10142-CVGroup_ExSkill_2-1 = "A brisa é tão agradável..."
10142-CVGroup_ExSkill_3-1 = "As ondas brancas... são lindas."
10142-CVGroup_ExSkill_Level_1-1 = "Fui muito radiante?"
10142-CVGroup_ExSkill_Level_2-1 = "Talvez eu tenha brilhado demais."
10142-CVGroup_ExSkill_Level_3-1 = "Não foi de propósito, mas..."
10142-CVGroup_Formation_In_1-1 = "Sim, também peguei a Hyakuren."
10142-CVGroup_Formation_In_2-1 = "Meu braço direito está bem agora. Deixe comigo."
10142-CVGroup_Formation_Select-1 = "Se é isso que o Sensei quer... eu irei seguir."
10142-CVGroup_Growup_1-1 = "Com isso... um dos selos do meu braço direito foi quebrado."
10142-CVGroup_Growup_2-1 = "Entendi. Parece que ainda tenho espaço para crescer."
10142-CVGroup_Growup_3-1 = "Meu poder que foi recuperado do crepúsculo... vou te mostrar."
10142-CVGroup_Growup_4-1 = "Sinto como se um botão de flor tivesse desabrochado.\nObrigada, é tudo graças ao Sensei."
10142-CVGroup_Relationship_Up_1-1 = "Assim como a primavera chega quando a neve derrete...\nParece que chegou o momento de brotar em meu coração devastado."
10142-CVGroup_Relationship_Up_2-1 = "Você é realmente muito gentil.\nEu também quero ser como o Sensei um dia."
10142-CVGroup_Relationship_Up_3-1 = "Obrigada por sempre acreditar em mim.\n...Eu confio em você, Sensei."
10142-CVGroup_Relationship_Up_4-1 = "Além de ser uma mulher bonita, não tenho nada de especial...\nMas... posso continuar ao seu lado, Sensei?"
10142-CVGroup_Tactic_In_1-1 = "Vou mostrar a todos quem eu sou."
10142-CVGroup_Tactic_In_2-1 = "Eu guiarei vocês até a vitória."
10142-CVGroup_Tactic_Victory_1-1 = "Ainda bem, se consegui corresponder às expectativas do Sensei."
10142-CVGroup_Tactic_Victory_2-1 = "Eu não sou mais... o 'substituto' de ninguém."