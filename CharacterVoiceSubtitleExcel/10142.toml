[translation]
10142-CVGroup_Battle_Buffed_1-1 = "Thank you for your concern."
10142-CVGroup_Battle_Defense_1-1 = "I knew it."
10142-CVGroup_Battle_In_1-1 = "I'm not a fan of the heat, but... I'll do my best."
10142-CVGroup_Battle_In_2-1 = "Watch me in action, Sensei."
10142-CVGroup_Battle_Move_1-1 = "Let's proceed with caution."
10142-CVGroup_Battle_Move_2-1 = "Is everyone following me?"
10142-CVGroup_Battle_Recovery_1-1 = "This is... friendship."
10142-CVGroup_Battle_TacticalAction_1-1 = "Here I go."
10142-CVGroup_Battle_Victory_1-1 = "Yes, we won."
10142-CVGroup_Battle_Victory_2-1 = "This is the power of the Hyakkaryouran."
10142-CVGroup_CommonSkill-1 = "A serious match."
10142-CVGroup_ExSkill_1-1 = "So this is the summer sea..."
10142-CVGroup_ExSkill_2-1 = "The breeze feels nice..."
10142-CVGroup_ExSkill_3-1 = "White waves... so beautiful."
10142-CVGroup_ExSkill_Level_1-1 = "Was it too bright?"
10142-CVGroup_ExSkill_Level_2-1 = "Maybe I shone a bit too brightly."
10142-CVGroup_ExSkill_Level_3-1 = "I didn't mean to, but..."
10142-CVGroup_Formation_In_1-1 = "Yes, I have Hyakuren with me too."
10142-CVGroup_Formation_In_2-1 = "My right arm is fine now. Leave it to me."
10142-CVGroup_Formation_Select-1 = "If that's what you want, Sensei... I'll follow your lead."
10142-CVGroup_Growup_1-1 = "With this... one seal on my right arm has been broken."
10142-CVGroup_Growup_2-1 = "I see. So I still had room to grow."
10142-CVGroup_Growup_3-1 = "I'll show you the power I reclaimed from the twilight."
10142-CVGroup_Growup_4-1 = "It feels like a bud has finally opened.\nThank you, this is all thanks to you, Sensei."
10142-CVGroup_Relationship_Up_1-1 = "Just as spring arrives when the snow melts...\nIt seems a time for new growth has come to my desolate heart as well."
10142-CVGroup_Relationship_Up_2-1 = "You really are kind.\nI hope to be like you someday, Sensei."
10142-CVGroup_Relationship_Up_3-1 = "Thank you for always believing in me.\n...I'm counting on you, Sensei."
10142-CVGroup_Relationship_Up_4-1 = "I don't really have any merits other than being beautiful, but...\nIs it okay... if I stay by your side, Sensei?"
10142-CVGroup_Tactic_In_1-1 = "I'll show everyone who I am."
10142-CVGroup_Tactic_In_2-1 = "I'll lead us to victory."
10142-CVGroup_Tactic_Victory_1-1 = "I'm glad I could live up to your expectations, Sensei."
10142-CVGroup_Tactic_Victory_2-1 = "I am no longer... a 'replacement' for anyone."