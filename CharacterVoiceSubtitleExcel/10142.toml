[translation]
10142-CVGroup_Battle_Buffed_1-1 = "気遣ってくれてありがとう。"
10142-CVGroup_Battle_Defense_1-1 = "分かってたよ。"
10142-CVGroup_Battle_In_1-1 = "暑いのは苦手だけど……頑張るね。"
10142-CVGroup_Battle_In_2-1 = "私の活躍を、見ていて、先生。"
10142-CVGroup_Battle_Move_1-1 = "慎重に進もう。"
10142-CVGroup_Battle_Move_2-1 = "みんな、ついてきてる？"
10142-CVGroup_Battle_Recovery_1-1 = "これが……友達。"
10142-CVGroup_Battle_TacticalAction_1-1 = "行くよ。"
10142-CVGroup_Battle_Victory_1-1 = "うん、私たちの勝ち。"
10142-CVGroup_Battle_Victory_2-1 = "これが、百花繚乱の力。"
10142-CVGroup_CommonSkill-1 = "真剣勝負。"
10142-CVGroup_ExSkill_1-1 = "これが夏の海……。"
10142-CVGroup_ExSkill_2-1 = "風が気持ちいい……。"
10142-CVGroup_ExSkill_3-1 = "白い波……綺麗。"
10142-CVGroup_ExSkill_Level_1-1 = "眩しかったかな？"
10142-CVGroup_ExSkill_Level_2-1 = "輝きすぎちゃったかな。"
10142-CVGroup_ExSkill_Level_3-1 = "狙ったわけじゃないんだけど……。"
10142-CVGroup_Formation_In_1-1 = "うん、百蓮も持ったよ。"
10142-CVGroup_Formation_In_2-1 = "右腕、今なら大丈夫。任せて。"
10142-CVGroup_Formation_Select-1 = "先生がそうしたいなら……従うよ。"
10142-CVGroup_Growup_1-1 = "これで……右腕の封印が1つ解けた。"
10142-CVGroup_Growup_2-1 = "そっか。私にもまだ伸びしろがあったんだね。"
10142-CVGroup_Growup_3-1 = "黄昏から取り戻した、私の力……見せてあげる。"
10142-CVGroup_Growup_4-1 = "つぼみが開いたような感じがする。\nありがとう、先生のおかげだよ。"
10142-CVGroup_Relationship_Up_1-1 = "雪が解けたら、春が訪れるように……。\n荒れ果てた私の心にも、芽吹きの時が来たみたい。"
10142-CVGroup_Relationship_Up_2-1 = "やっぱり優しいね。\n私も、いつか先生みたいになりたいな。"
10142-CVGroup_Relationship_Up_3-1 = "いつも信じてくれてありがとう。\n……先生のこと、頼りにしてるよ。"
10142-CVGroup_Relationship_Up_4-1 = "美人なこと以外、特に取り柄がないんだけど……\n先生のそばにいても……いいかな？"
10142-CVGroup_Tactic_In_1-1 = "私が誰なのか、みんなに伝えるの。"
10142-CVGroup_Tactic_In_2-1 = "勝利へ導くね。"
10142-CVGroup_Tactic_Victory_1-1 = "先生の期待に応えられたなら、良かった。"
10142-CVGroup_Tactic_Victory_2-1 = "私はもう……誰かの「代わり」じゃない。"
