[translation]
13013-CVGroup_Battle_Buffed_1-1 = "あ、ありがとうございます！"
13013-CVGroup_Battle_Covered_1-1 = "隠れます！"
13013-CVGroup_Battle_Defense_1-1 = "ど、どうってことないです！"
13013-CVGroup_Battle_In_1-1 = "小説の主人公みたいに……前を向いて！"
13013-CVGroup_Battle_In_2-1 = "漫画の主人公みたいに……思いっきり！"
13013-CVGroup_Battle_Move_1-1 = "移動します！"
13013-CVGroup_Battle_Move_2-1 = "次の場所は……どこでしょう？"
13013-CVGroup_Battle_Recovery_1-1 = "おかげで……元気になりました！"
13013-CVGroup_Battle_TacticalAction_1-1 = "行きます！"
13013-CVGroup_Battle_Victory_1-1 = "ヘヘ……秘密の蔵書を見つけた気分です。"
13013-CVGroup_Battle_Victory_2-1 = "知識は力ですから……守られなければなりません。"
13013-CVGroup_CommonSkill-1 = "ここは何度読んでも……うへへ……。"
13013-CVGroup_ExSkill_1-1 = "図書館ではお静かに……！"
13013-CVGroup_ExSkill_2-1 = "読書の邪魔になります……！"
13013-CVGroup_ExSkill_3-1 = "大きな音を立てないでください……！"
13013-CVGroup_ExSkill_Level_1-1 = "静かにしてください……！"
13013-CVGroup_ExSkill_Level_2-1 = "罰則です……！"
13013-CVGroup_ExSkill_Level_3-1 = "もう、ひどいです……！"
13013-CVGroup_Formation_In_1-1 = "私が、お力になれるなら……。"
13013-CVGroup_Formation_In_2-1 = "は、はいっ！\n任せてください……！"
13013-CVGroup_Formation_Select-1 = "あ、先生も読んでみますか？\n私の大好きな本なんです！"
13013-CVGroup_Growup_1-1 = "先生！見てください……！\n私、成長しました……！"
13013-CVGroup_Growup_2-1 = "ありがとうございます、先生。\nこれも全部、先生のおかげです。"
13013-CVGroup_Growup_3-1 = "今のこの気持ち……うまく言葉にできませんけど……\nずっと探していた絶版本を発見したときに、似てる気がします……。"
13013-CVGroup_Growup_4-1 = "前進するって……こんなに楽しいことだったんですね。\nえへへ……嬉しいです。"
13013-CVGroup_Relationship_Up_1-1 = "先生に出会えて、本当に良かったです。\nそうでなかったら、私は……きっと……。"
13013-CVGroup_Relationship_Up_2-1 = "こういう時、たしかあの漫画では……うへへ……。\nはっ！？い、いえ！\nな、何も想像してませんよ！？"
13013-CVGroup_Relationship_Up_3-1 = "先生は普段、どんな本を読みますか……？\n私が探してあげます！\nえっと……探せる範囲で、ですが。"
13013-CVGroup_Relationship_Up_4-1 = "先生と一緒にいると……なんだか、力が沸いてきます。\n今なら何でもできそうです……！"
13013-CVGroup_Tactic_In_1-1 = "始めます。"
13013-CVGroup_Tactic_In_2-1 = "全部、うまくいきますように。"
13013-CVGroup_Tactic_Victory_1-1 = "ふぅ……よかったです……。"
13013-CVGroup_Tactic_Victory_2-1 = "先生がいてくださったおかげです……。"
