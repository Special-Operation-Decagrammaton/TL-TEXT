[translation]
13013-CVGroup_Battle_Buffed_1-1 = "Ah, muito obrigada!"
13013-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
13013-CVGroup_Battle_Defense_1-1 = "N-não foi nada!"
13013-CVGroup_Battle_In_1-1 = "Como a protagonista de um romance... vou seguir em frente!"
13013-CVGroup_Battle_In_2-1 = "Como a protagonista de um mangá... com toda a minha força!"
13013-CVGroup_Battle_Move_1-1 = "Estou me movendo!"
13013-CVGroup_Battle_Move_2-1 = "O próximo lugar é... onde será?"
13013-CVGroup_Battle_Recovery_1-1 = "Graças a isso... me sinto revigorada!"
13013-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu!"
13013-CVGroup_Battle_Victory_1-1 = "Hehe... sinto como se tivesse encontrado um livro secreto na biblioteca."
13013-CVGroup_Battle_Victory_2-1 = "Conhecimento é poder, afinal... e deve ser protegido."
13013-CVGroup_CommonSkill-1 = "Não importa quantas vezes eu leia essa parte... uhehe..."
13013-CVGroup_ExSkill_1-1 = "Silêncio na biblioteca...!"
13013-CVGroup_ExSkill_2-1 = "Isso atrapalha a leitura...!"
13013-CVGroup_ExSkill_3-1 = "Por favor, não faça tanto barulho...!"
13013-CVGroup_ExSkill_Level_1-1 = "Por favor, faça silêncio...!"
13013-CVGroup_ExSkill_Level_2-1 = "Isso é uma punição...!"
13013-CVGroup_ExSkill_Level_3-1 = "Poxa, isso é terrível...!"
13013-CVGroup_Formation_In_1-1 = "Se eu puder ser de ajuda..."
13013-CVGroup_Formation_In_2-1 = "S-sim!\nDeixe comigo...!"
13013-CVGroup_Formation_Select-1 = "Ah, Sensei, gostaria de ler também?\nÉ um dos meus livros favoritos!"
13013-CVGroup_Growup_1-1 = "Sensei! Olhe só...!\nEu cresci...!"
13013-CVGroup_Growup_2-1 = "Muito obrigada, Sensei.\nIsso tudo é graças ao senhor."
13013-CVGroup_Growup_3-1 = "Esse sentimento de agora... não consigo explicar muito bem com palavras... mas sinto que é parecido com quando encontro um livro esgotado que eu estava procurando há muito tempo..."
13013-CVGroup_Growup_4-1 = "Seguir em frente... é algo tão divertido.\nEhehe... estou feliz."
13013-CVGroup_Relationship_Up_1-1 = "Foi muito bom ter conhecido o Sensei.\nSe não fosse por isso, eu... com certeza..."
13013-CVGroup_Relationship_Up_2-1 = "Nessas horas, naquele mangá... uhehe...\nHã!? N-não!\nE-eu não estou imaginando nada!"
13013-CVGroup_Relationship_Up_3-1 = "Sensei, que tipo de livro o senhor costuma ler...?\nEu posso procurar para você!\nBem... dentro do que estiver ao meu alcance, é claro."
13013-CVGroup_Relationship_Up_4-1 = "Quando estou com o Sensei... sinto que ganho forças.\nSinto que posso fazer qualquer coisa agora...!"
13013-CVGroup_Tactic_In_1-1 = "Vou começar."
13013-CVGroup_Tactic_In_2-1 = "Espero que tudo dê certo."
13013-CVGroup_Tactic_Victory_1-1 = "Ufa... que bom..."
13013-CVGroup_Tactic_Victory_2-1 = "Foi graças à presença do Sensei..."
