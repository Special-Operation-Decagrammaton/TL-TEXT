10097-CVGroup_Battle_Buffed_1-1 = "Opa, valeu!" 
10097-CVGroup_Battle_Covered_1-1 = "Me dá cobertura." 
10097-CVGroup_Battle_Defense_1-1 = "Ingênuo... Muito ingênuo!" 
10097-CVGroup_Battle_In_1-1 = "Kuhihi... Já que tô aqui, que tal eu atirar com tudo o que eu tenho?" 
10097-CVGroup_Battle_In_2-1 = "Ah... Essa sensação é irresistível...!" 
10097-CVGroup_Battle_Move_1-1 = "Aqui, nada de anormal." 
10097-CVGroup_Battle_Move_2-1 = "Tô me movendo." 
10097-CVGroup_Battle_Recovery_1-1 = "Suprimentos confirmados!" 
10097-CVGroup_Battle_TacticalAction_1-1 = "Limpo~" 
10097-CVGroup_Battle_Victory_1-1 = "Isso... isso... é bom demais...!" 
10097-CVGroup_Battle_Victory_2-1 = "Haa... haa... Eu vou explodir de emoção...!" 
10097-CVGroup_CommonSkill-1 = "Só porque é balão de água não quer dizer que você deva abaixar a guarda, viu?" 
10097-CVGroup_ExSkill_1-1 = "Posição do alvo confirmada... Poder de Fogo MÁXIMO!" 
10097-CVGroup_ExSkill_2-1 = "Aqui é RABBIT 3.\nAtaque autorizado!" 
10097-CVGroup_ExSkill_3-1 = "Mísseis... Aah... Eles tão voando lindamente!" 
10097-CVGroup_ExSkill_Level_1-1 = "Tão perto... Perto pra caramba...!" 
10097-CVGroup_ExSkill_Level_2-1 = "Alpha! Mike! Foxtrot!" 
10097-CVGroup_ExSkill_Level_3-1 = "Simplesmente maravilhoso..." 
10097-CVGroup_Formation_In_1-1 = "E aí, qual lugar nós vamos mandar pros ares agora?" 
10097-CVGroup_Formation_In_2-1 = "Kuhihi... Eu tava te esperando." 
10097-CVGroup_Formation_Select-1 = "Haa, haa...\nSeria tão foda se os mísseis reais também ficassem gigantes assim..." 
10097-CVGroup_Growup_1-1 = "Entendi, entendi...\nSe eu conectar aqui e ali, vou conseguir uma explosão das grandes..." 
10097-CVGroup_Growup_2-1 = "Kuhihi... Com isso eu vou poder explodir coisas até não querer mais." 
10097-CVGroup_Growup_3-1 = "Relaxa. Eu entendi perfeitamente~" 
10097-CVGroup_Growup_4-1 = "Haa, haa...\nTá queimando, tô queimando todinha..." 
10097-CVGroup_Relationship_Up_1-1 = "Se tiver algum obstáculo no caminho, é só me chamar.\nEu explodo tudo lindamente pra você. Kuhihi..." 
10097-CVGroup_Relationship_Up_2-1 = "Algum dia, quando você se sentir tão encurralado que não consiga mais aguentar, me chame.\nEu te acompanho em qualquer apocalipse que seja." 
10097-CVGroup_Relationship_Up_3-1 = "Quando eu olho pra você, Sensei, a linha que separa a ruína da sanidade fica bem embaçada pra mim.\n...Isso é um problema, sabia?" 
10097-CVGroup_Relationship_Up_4-1 = "Valeu, Sensei.\nGraças a você, descobri que o coração das pessoas também pode estourar igualzinho a uma bomba." 
10097-CVGroup_Tactic_In_1-1 = "Nnnh! Fazia tempo que eu não mexia o corpo, hein~" 
10097-CVGroup_Tactic_In_2-1 = "Colocar a operadora na linha de frente é pura maldade, né~" 
10097-CVGroup_Tactic_Victory_1-1 = "Ué? Já acabou?\nEu ainda tenho um monte de bombas sobrando, sabia?" 
10097-CVGroup_Tactic_Victory_2-1 = "Kuhihi... Se isso não foi o suficiente pra resolver a fita,\nQuer dizer que a gente só precisa trazer muito maaais bombas na próxima vez, né?" 
