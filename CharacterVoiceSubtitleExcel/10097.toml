[translation]
10097-CVGroup_Battle_Buffed_1-1 = "Ah, valeu!"
10097-CVGroup_Battle_Covered_1-1 = "Preciso de cobertura."
10097-CVGroup_Battle_Defense_1-1 = "Fraco... muito fraco!"
10097-CVGroup_Battle_In_1-1 = "Hehehe... já que estamos aqui, que tal atirarmos com tudo?"
10097-CVGroup_Battle_In_2-1 = "Ah... essa sensação, é irresistível...!"
10097-CVGroup_Battle_Move_1-1 = "Aqui, tudo normal."
10097-CVGroup_Battle_Move_2-1 = "Estou me movendo."
10097-CVGroup_Battle_Recovery_1-1 = "Suprimentos confirmados!"
10097-CVGroup_Battle_TacticalAction_1-1 = "Limpo~"
10097-CVGroup_Battle_Victory_1-1 = "Bom... muito bom... é perfeito demais...!"
10097-CVGroup_Battle_Victory_2-1 = "Ah... ah... vai explodir...!"
10097-CVGroup_CommonSkill-1 = "Só porque é um balão d'água, não baixe a guarda, tá?"
10097-CVGroup_ExSkill_1-1 = "Posição do alvo confirmada... poder de fogo no máximo!"
10097-CVGroup_ExSkill_2-1 = "Aqui é RABBIT 3.\nAutorizo o ataque!"
10097-CVGroup_ExSkill_3-1 = "Míssil... ah... ele vai voar!"
10097-CVGroup_ExSkill_Level_1-1 = "Perto... perigosamente perto...!"
10097-CVGroup_ExSkill_Level_2-1 = "Alfa! Mike! Foxtrot!"
10097-CVGroup_ExSkill_Level_3-1 = "É maravilhoso..."
10097-CVGroup_Formation_In_1-1 = "Então, o que vamos explodir agora?"
10097-CVGroup_Formation_In_2-1 = "Hehehe... eu estava esperando."
10097-CVGroup_Formation_Select-1 = "Ah, ah... \nSeria tão bom se mísseis de verdade também pudessem ficar maiores..."
10097-CVGroup_Growup_1-1 = "Entendi, entendi... \nSe eu conectar isso aqui com aquilo ali, vai dar uma explosão enorme..."
10097-CVGroup_Growup_2-1 = "Hehehe... agora acho que vou conseguir explodir tudo de verdade."
10097-CVGroup_Growup_3-1 = "Tudo bem. Entendi perfeitamente~"
10097-CVGroup_Growup_4-1 = "Ah, ah... \nEstá queimando, vai incendiar tudo..."
10097-CVGroup_Relationship_Up_1-1 = "Se tiver algum obstáculo, é só me chamar.\nEu explodo tudo direitinho para você. Hehehe..."
10097-CVGroup_Relationship_Up_2-1 = "Algum dia, se você se sentir encurralado a ponto de não aguentar mais, me chame.\nEu vou te acompanhar em qualquer ruína que for."
10097-CVGroup_Relationship_Up_3-1 = "Quando olho para o Sensei, a fronteira da ruína fica meio confusa, sabe.\n...Que problemático."
10097-CVGroup_Relationship_Up_4-1 = "Obrigada, Sensei.\nGraças a você, descobri que o coração humano também pode explodir como uma bomba."
10097-CVGroup_Tactic_In_1-1 = "Hmm! Faz tempo que não mexo o corpo~"
10097-CVGroup_Tactic_In_2-1 = "Colocar a operadora na linha de frente é muita crueldade, né~"
10097-CVGroup_Tactic_Victory_1-1 = "Ué? Já acabou?\nMas ainda sobraram bombas?"
10097-CVGroup_Tactic_Victory_2-1 = "Hehehe... se não dá para resolver com essa quantidade,\nsignifica que é só preparar muito, muito mais, né?"
