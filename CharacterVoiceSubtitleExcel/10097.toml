[translation]
10097-CVGroup_Battle_Buffed_1-1 = "Ah, valeu!"
10097-CVGroup_Battle_Covered_1-1 = "Preciso de cobertura."
10097-CVGroup_Battle_Defense_1-1 = "Ingênuo... Ingênuo demais!"
10097-CVGroup_Battle_In_1-1 = "Kuhihi... Já que estamos aqui, que tal a gente atirar com tudo o que tem direito?"
10097-CVGroup_Battle_In_2-1 = "Aah... essa sensação é irresistível...!"
10097-CVGroup_Battle_Move_1-1 = "Aqui, sem anormalidades."
10097-CVGroup_Battle_Move_2-1 = "Tô me movendo."
10097-CVGroup_Battle_Recovery_1-1 = "Suprimentos confirmados!"
10097-CVGroup_Battle_TacticalAction_1-1 = "Limpo~"
10097-CVGroup_Battle_Victory_1-1 = "Isso... isso é bom... isso é bom demais...!"
10097-CVGroup_Battle_Victory_2-1 = "Haa... Haa... Sinto que vou estourar...!"
10097-CVGroup_CommonSkill-1 = "Não pode baixar a guarda só porque são balõezinhos de água, sabia?"
10097-CVGroup_ExSkill_1-1 = "Posição do alvo confirmada... Poder de fogo no MÁXIMO!"
10097-CVGroup_ExSkill_2-1 = "Aqui é RABBIT3.\nAtaque autorizado!"
10097-CVGroup_ExSkill_3-1 = "Os mísseis... Aaaah... Já estão voando!"
10097-CVGroup_ExSkill_Level_1-1 = "Tá perto... tá perigosamente perto...!"
10097-CVGroup_ExSkill_Level_2-1 = "Alpha! Mike! Foxtrot!"
10097-CVGroup_ExSkill_Level_3-1 = "Isso é simplesmente maravilhoso..."
10097-CVGroup_Formation_In_1-1 = "E então, qual é o lugar que a gente vai mandar pelos ares agora?"
10097-CVGroup_Formation_In_2-1 = "Kuhihi... eu tava esperando por isso."
10097-CVGroup_Formation_Select-1 = "Haa, haa...\nSeria tão bom se os mísseis de verdade pudessem crescer e ficar grandões também..."
10097-CVGroup_Growup_1-1 = "Entendi, entendi...\nSe eu conectar aqui e aqui, vai gerar uma explosão gigante..."
10097-CVGroup_Growup_2-1 = "Kuhihi... Com isso aqui vou poder explodir tudo com força total."
10097-CVGroup_Growup_3-1 = "Não se preocupa. Eu entendi perfeitamente~"
10097-CVGroup_Growup_4-1 = "Haa, haa...\nTá queimando, vai queimar tudo e virar cinzas..."
10097-CVGroup_Relationship_Up_1-1 = "Se tiver qualquer obstáculo no seu caminho, pode me chamar.\nEu explodo ele lindamente pra você. Kuhihi..."
10097-CVGroup_Relationship_Up_2-1 = "Se algum dia você for encurralado ao ponto de não aguentar mais, me chame.\nEu te acompanho em qualquer tipo de ruína que aparecer pela frente."
10097-CVGroup_Relationship_Up_3-1 = "Sempre que olho pro Sensei, a linha que separa a normalidade da ruína acaba ficando embaçada na minha cabeça...\n...Que problema, hein."
10097-CVGroup_Relationship_Up_4-1 = "Obrigada, Sensei.\nGraças a você, agora eu sei que o coração humano também pode explodir igualzinho a uma bomba."
10097-CVGroup_Tactic_In_1-1 = "Hnn! Bora esticar esse corpo depois de tanto tempo~"
10097-CVGroup_Tactic_In_2-1 = "Colocar a operadora de comunicações na linha de frente é uma tremenda crueldade, sabia~"
10097-CVGroup_Tactic_Victory_1-1 = "Ué? Já acabou?\nMas eu ainda tenho um monte de bombas sobrando!"
10097-CVGroup_Tactic_Victory_2-1 = "Kuhihi... Se não dá pra resolver o problema com essa quantidade,\nIsso quer dizer que eu só preciso preparar mui~to mais na próxima vez, não é?"