[translation]
20001-CVGroup_CommonSkill-1 = "Eu não erro."
20001-CVGroup_ExSkill_1-1 = "Alvo confirmado."
20001-CVGroup_ExSkill_2-1 = "Alvo na mira."
20001-CVGroup_ExSkill_3-1 = "Deixe comigo."
20001-CVGroup_ExSkill_Level_1-1 = "Não deixarei os inimigos do Sensei escaparem."
20001-CVGroup_ExSkill_Level_2-1 = "Missão, iniciada."
20001-CVGroup_ExSkill_Level_3-1 = "Vou explodir tudo com um tiro."
20001-CVGroup_Formation_In_1-1 = "Deixe o suporte da retaguarda comigo."
20001-CVGroup_Formation_In_2-1 = "Se for sobre precisão, é minha especialidade."
20001-CVGroup_Formation_Select-1 = "Visibilidade, boa."
20001-CVGroup_Growup_1-1 = "Obrigada, Sensei.\nUsarei este poder que você me deu para ajudar aqueles que precisam da C&C."
20001-CVGroup_Growup_2-1 = "Este poder... é pelo Sensei!"
20001-CVGroup_Growup_3-1 = "Qualquer que seja o pedido, deixe comigo."
20001-CVGroup_Growup_4-1 = "O treinamento é amargo, mas seus frutos são doces."
20001-CVGroup_Relationship_Up_1-1 = "…Um sentimento incomum.\nNunca senti algo assim antes…"
20001-CVGroup_Relationship_Up_2-1 = "Encontrei um sentimento que quero transmitir.\nTransmiti-lo será, certamente, a missão mais importante para mim."
20001-CVGroup_Relationship_Up_3-1 = "Só de ter o Sensei por perto... sinto algo especial.\nPor que será?"
20001-CVGroup_Relationship_Up_4-1 = "Acho que estou crescendo.\nComo aluna, como empregada... e também...\nN-não é nada."
