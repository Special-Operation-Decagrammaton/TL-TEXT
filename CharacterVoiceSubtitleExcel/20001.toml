20001-CVGroup_Relationship_Up_3-1 = "先生がそばにいるというだけで……特別な気持ちになる。\nどうしてだろう？"
20001-CVGroup_Relationship_Up_4-1 = "成長してると思う。\n生徒として、メイドとして……そして……\nな、なんでもない。"
