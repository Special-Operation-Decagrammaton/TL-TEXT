[translation]
20001-CVGroup_CommonSkill-1 = "外さない。"
20001-CVGroup_ExSkill_1-1 = "ターゲット確認。"
20001-CVGroup_ExSkill_2-1 = "目標を捉えた。"
20001-CVGroup_ExSkill_3-1 = "私に任せて。"
20001-CVGroup_ExSkill_Level_1-1 = "先生の敵は逃さない。"
20001-CVGroup_ExSkill_Level_2-1 = "任務、開始。"
20001-CVGroup_ExSkill_Level_3-1 = "一発で吹っ飛ばす。"
20001-CVGroup_Formation_In_1-1 = "後方支援は任せて。"
20001-CVGroup_Formation_In_2-1 = "狙撃なら、専門だから。"
20001-CVGroup_Formation_Select-1 = "視界、良好。"
20001-CVGroup_Growup_1-1 = "ありがとう先生。\n先生がくれたこの力はC&Cの助けを必要とする人たちのために使う。"
20001-CVGroup_Growup_2-1 = "この力……先生のために！"
20001-CVGroup_Growup_3-1 = "どんな依頼でも、私に任せて。"
20001-CVGroup_Growup_4-1 = "訓練は苦いけど、その実は甘いものだ。"
20001-CVGroup_Relationship_Up_1-1 = "……珍しい気分。\nこんな気持ちは……初めてだから。"
