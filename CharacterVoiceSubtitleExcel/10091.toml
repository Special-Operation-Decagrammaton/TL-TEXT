[translation]
10091-CVGroup_Battle_Buffed_1-1 = "お～！なにこれ！"
10091-CVGroup_Battle_Defense_1-1 = "無駄だって。"
10091-CVGroup_Battle_In_1-1 = "あー、あー、マイクテスト……よし。"
10091-CVGroup_Battle_In_2-1 = "それじゃ……始めよっか！"
10091-CVGroup_Battle_Move_1-1 = "まだまだ。"
10091-CVGroup_Battle_Move_2-1 = "終わりじゃないよね？"
10091-CVGroup_Battle_Recovery_1-1 = "サンキュー。"
10091-CVGroup_Battle_TacticalAction_1-1 = "ふっ！"
10091-CVGroup_Battle_Victory_1-1 = "どうだった？先生。\n悪くなかったでしょ？"
10091-CVGroup_Battle_Victory_2-1 = "良いライブになったね！\n……なんちゃって。"
10091-CVGroup_CommonSkill-1 = "どれどれ……うん！よし！"
10091-CVGroup_ExSkill_1-1 = "ふぅ……はぁっ"
10091-CVGroup_ExSkill_2-1 = "うん！いけるよ。"
10091-CVGroup_ExSkill_3-1 = "大丈夫。いっぱい練習したから。"
10091-CVGroup_ExSkill_Level_1-1 = "ついてきて。"
10091-CVGroup_ExSkill_Level_2-1 = "私たちの歌を聴け！"
10091-CVGroup_ExSkill_Level_3-1 = "……行くよ！"
10091-CVGroup_Formation_In_1-1 = "ここで歌うの……？"
10091-CVGroup_Formation_In_2-1 = "あれ……場所合ってる？"
10091-CVGroup_Formation_Select-1 = "ちょ、待って！先生……！\n余計目立っちゃう！"
10091-CVGroup_Growup_1-1 = "練習の成果を感じるかも。"
10091-CVGroup_Growup_2-1 = "少し、腕が上がってきたかも……？"
10091-CVGroup_Growup_3-1 = "なんだか、マネージャーがついてくれたみたいな感じだね。\nあ、いや！今のなし！忘れて！"
10091-CVGroup_Growup_4-1 = "勉強も、これぐらい早く習得できたらいいのに……はは。"
10091-CVGroup_Relationship_Up_1-1 = "なんか……だんだん気になってくるような……。\nあ、いや！ただの独り言。"
10091-CVGroup_Relationship_Up_2-1 = "別に大した意味じゃないんだけどさ……\n「何かあったら、いつでも言って」って言ったの。\nまだ有効だからね。"
10091-CVGroup_Relationship_Up_3-1 = "先生、今日時間ある？\nん？あ、や、別に大した用事はないんだけど。"
10091-CVGroup_Relationship_Up_4-1 = "たまに、ちょーっと距離感が近すぎたんじゃないかって……\n思うときがあってさ……。"
10091-CVGroup_Tactic_In_1-1 = "うわっ……多いなぁ……。"
10091-CVGroup_Tactic_In_2-1 = "ライブ……じゃないか。"
10091-CVGroup_Tactic_Victory_1-1 = "……また呼んでよね。"
10091-CVGroup_Tactic_Victory_2-1 = "結構いけるんじゃない？"
