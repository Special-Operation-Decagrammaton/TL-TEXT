[translation]
10091-CVGroup_Battle_Buffed_1-1 = "Oh! O que é isso!"
10091-CVGroup_Battle_Defense_1-1 = "É inútil."
10091-CVGroup_Battle_In_1-1 = "Ah, ah, teste de microfone... Certo."
10091-CVGroup_Battle_In_2-1 = "Então... vamos começar!"
10091-CVGroup_Battle_Move_1-1 = "Ainda não acabou."
10091-CVGroup_Battle_Move_2-1 = "Não é o fim, né?"
10091-CVGroup_Battle_Recovery_1-1 = "Valeu."
10091-CVGroup_Battle_TacticalAction_1-1 = "Hmph!"
10091-CVGroup_Battle_Victory_1-1 = "Como foi, Sensei?\nNão foi nada mal, né?"
10091-CVGroup_Battle_Victory_2-1 = "Foi um bom show!\n...Brincadeirinha."
10091-CVGroup_CommonSkill-1 = "Vejamos... hum! Certo!"
10091-CVGroup_ExSkill_1-1 = "Ufa... hah."
10091-CVGroup_ExSkill_2-1 = "Sim! Eu consigo."
10091-CVGroup_ExSkill_3-1 = "Tudo bem. Eu treinei bastante."
10091-CVGroup_ExSkill_Level_1-1 = "Venha comigo."
10091-CVGroup_ExSkill_Level_2-1 = "Ouça a nossa música!"
10091-CVGroup_ExSkill_Level_3-1 = "...Vamos lá!"
10091-CVGroup_Formation_In_1-1 = "Vou cantar aqui...?"
10091-CVGroup_Formation_In_2-1 = "Ué... o lugar está certo?"
10091-CVGroup_Formation_Select-1 = "Ei, espera! Sensei...!\nEu vou acabar me destacando demais!"
10091-CVGroup_Growup_1-1 = "Sinto os resultados do treino."
10091-CVGroup_Growup_2-1 = "Será que melhorei um pouco...?"
10091-CVGroup_Growup_3-1 = "Sinto como se tivesse ganhado um empresário.\nAh, não! Esquece o que eu disse! Esquece!"
10091-CVGroup_Growup_4-1 = "Se eu conseguisse aprender as matérias da escola tão rápido quanto isso... haha."
10091-CVGroup_Relationship_Up_1-1 = "Sabe... estou começando a ficar curiosa sobre você...\nAh, não! Esquece, só estou falando sozinha."
10091-CVGroup_Relationship_Up_2-1 = "Não tem nenhum significado especial, mas...\nQuando eu disse 'se precisar de algo, é só falar', saiba que ainda vale."
10091-CVGroup_Relationship_Up_3-1 = "Sensei, você tem tempo hoje?\nHm? Ah, não, não é nada importante."
10091-CVGroup_Relationship_Up_4-1 = "Às vezes, eu penso que talvez...\ntenhamos ficado próximos demais..."
10091-CVGroup_Tactic_In_1-1 = "Uau... quanta gente..."
10091-CVGroup_Tactic_In_2-1 = "Isso não é... um show, né?"
10091-CVGroup_Tactic_Victory_1-1 = "...Me chame de novo, viu?"
10091-CVGroup_Tactic_Victory_2-1 = "Acho que fomos muito bem, não acha?"
