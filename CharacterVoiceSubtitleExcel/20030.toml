[translation]
20030-CVGroup_CommonSkill-1 = "Aqui está!"
20030-CVGroup_ExSkill_1-1 = "Bem, o próximo é...\nHehe, é divertido."
20030-CVGroup_ExSkill_2-1 = "O próximo é...\nEste é o caminho da exploração."
20030-CVGroup_ExSkill_3-1 = "Eia...!\nRumo a uma gastronomia ainda melhor!"
20030-CVGroup_ExSkill_Level_1-1 = "O que acha disto?"
20030-CVGroup_ExSkill_Level_2-1 = "Hehe, isto também é uma novidade."
20030-CVGroup_ExSkill_Level_3-1 = "Sim, por favor, sirva-se."
20030-CVGroup_Formation_In_1-1 = "Para um momento inesquecível de sabor...\nVamos lá."
20030-CVGroup_Formation_In_2-1 = "Pois uma mente sã reside em uma gastronomia sã."
20030-CVGroup_Formation_Select-1 = "Vou levá-lo por uma empolgante jornada gastronômica."
20030-CVGroup_Growup_1-1 = "Exercitar o corpo é bom de vez em quando."
20030-CVGroup_Growup_2-1 = "Obrigada por sempre cuidar de mim, Sensei."
20030-CVGroup_Growup_3-1 = "Agradeço por toda a sua consideração...\nSe precisar de recomendações de barracas de comida, deixe comigo."
20030-CVGroup_Growup_4-1 = "Hehe, este dia ficará gravado em meu coração para sempre.\n...Porque algo muito maravilhoso aconteceu."
20030-CVGroup_Relationship_Up_1-1 = "Eu... quando estou ao seu lado, Sensei, vários sentimentos transbordam.\nVocê sabia disso?"
20030-CVGroup_Relationship_Up_2-1 = "É justamente porque você está aqui, Sensei, que eu consigo brilhar."
20030-CVGroup_Relationship_Up_3-1 = "A gastronomia após o exercício é algo especial.\nE se for junto com você, Sensei, é ainda mais..."
20030-CVGroup_Relationship_Up_4-1 = "O uniforme de ginástica... combina comigo...? \nHe, hehe, b-bem, é algo óbvio, mas...\nObrigada."
