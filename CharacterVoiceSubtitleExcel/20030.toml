[translation]
20030-CVGroup_CommonSkill-1 = "差し上げますわ！"
20030-CVGroup_ExSkill_1-1 = "さて、次は……\nふふ、楽しいですわ。"
20030-CVGroup_ExSkill_2-1 = "この次は……\nこれぞ探究の道。"
20030-CVGroup_ExSkill_3-1 = "よいしょ、っと……\nさらなる美食へ！"
20030-CVGroup_ExSkill_Level_1-1 = "こういうのはいかがでしょう？"
20030-CVGroup_ExSkill_Level_2-1 = "ふふ、こういうのも新鮮ですね。"
20030-CVGroup_ExSkill_Level_3-1 = "はい、どうぞ召し上がってください。"
20030-CVGroup_Formation_In_1-1 = "味わったら忘れられないような一時へ……\nさあ、参りましょう。"
20030-CVGroup_Formation_In_2-1 = "健全な精神は、健全な美食に宿るものですから。"
20030-CVGroup_Formation_Select-1 = "胸躍る美食ロードに連れて行って差し上げますわ。"
20030-CVGroup_Growup_1-1 = "体を動かすのも、たまには良いですね。"
20030-CVGroup_Growup_2-1 = "いつも見守ってくださり、ありがとうございます。先生。"
20030-CVGroup_Growup_3-1 = "何から何まで……お気遣い、感謝いたします。\n屋台の案内でしたら、私にお任せください。"
20030-CVGroup_Growup_4-1 = "ふふ、今日という日は、ずっと心に刻まれることでしょう。\n……とても素敵なことがありましたから。"
20030-CVGroup_Relationship_Up_1-1 = "私……先生のお側にいると、様々な感情が溢れてくるのです。\n先生は、ご存知でしたか？"
20030-CVGroup_Relationship_Up_2-1 = "先生がいらっしゃるからこそ、私は輝けるのですわ。"
20030-CVGroup_Relationship_Up_3-1 = "運動後の美食は格別なもの。\nそれが、先生と共にできるのであれば、なおのこと……。"
20030-CVGroup_Relationship_Up_4-1 = "体操服……似合って、いますか……？\nふ、ふふ、し、至極当然のことですが……\nありがとうございます。"
