[translation]
16007-CVGroup_Battle_Buffed_1-1 = "支援、感謝いたします。"
16007-CVGroup_Battle_Covered_1-1 = "隠れます。"
16007-CVGroup_Battle_Defense_1-1 = "ふふ、危ないところでした。"
16007-CVGroup_Battle_In_1-1 = "支援射撃でしたら、私にお任せください！"
16007-CVGroup_Battle_In_2-1 = "恐れることはありません……突撃！"
16007-CVGroup_Battle_Move_1-1 = "次の場所に移動しましょうか？"
16007-CVGroup_Battle_Move_2-1 = "勝利は目前です！"
16007-CVGroup_Battle_Recovery_1-1 = "あら、ありがとうございます。"
16007-CVGroup_Battle_TacticalAction_1-1 = "移動します！"
16007-CVGroup_Battle_Victory_1-1 = "みなさん、レッドウィンターの勝利です！"
16007-CVGroup_Battle_Victory_2-1 = "さすがです、みなさんのことを信じておりました！"
16007-CVGroup_CommonSkill-1 = "そこのあなた！集中してください！"
16007-CVGroup_ExSkill_1-1 = "私は信じます……\nチェリノ会長の勝利を！"
16007-CVGroup_ExSkill_2-1 = "チェリノ会長による、チェリノ会長のための！"
16007-CVGroup_ExSkill_3-1 = "レッドウィンター連邦学園よ……永遠に！"
16007-CVGroup_ExSkill_Level_1-1 = "みなさん、こちらに耳を傾けてください！"
16007-CVGroup_ExSkill_Level_2-1 = "みなさん、勝利は目前に迫っています！"
16007-CVGroup_ExSkill_Level_3-1 = "私たちの革命は……必ずや成功することでしょう！"
16007-CVGroup_Formation_In_1-1 = "これもまた、チェリノ会長のため……！"
16007-CVGroup_Formation_In_2-1 = "ご期待にお応えしてみせます。"
16007-CVGroup_Formation_Select-1 = "あら？何か問題でも……？"
16007-CVGroup_Growup_1-1 = "この力は革命のために、大事に使わせていただきます。"
16007-CVGroup_Growup_2-1 = "チェリノ会長のために、もっと頑張ります！"
16007-CVGroup_Growup_3-1 = "これで不穏分子を、より効率よく制圧できますね！"
16007-CVGroup_Growup_4-1 = "革命的といっても過言ではないほどの支援、感謝いたします！"
16007-CVGroup_Relationship_Up_1-1 = "先生。あなたのこと、信頼しているんですよ。"
16007-CVGroup_Relationship_Up_2-1 = "先生の前では、なんだか嘘をつきにくいですね……。"
16007-CVGroup_Relationship_Up_3-1 = "ふう……なんだか顔が熱くて……。\n今日は暑いですね。"
16007-CVGroup_Relationship_Up_4-1 = "先生を見るたびにどこか胸が切なくなるこの気持ちは、もしかして……\n革命の前兆、でしょうか？"
16007-CVGroup_Tactic_In_1-1 = "まだあちこちに、会長への忠誠を誓わない不穏分子たちがいるようですね。"
16007-CVGroup_Tactic_In_2-1 = "綺麗に掃除いたしましょう。"
16007-CVGroup_Tactic_Victory_1-1 = "ふふ、ご覧になっていますか、チェリノ会長？"
16007-CVGroup_Tactic_Victory_2-1 = "レッドウィンターが進む先に、敗北などありません！"
