[translation]
16007-CVGroup_Battle_Buffed_1-1 = "Agradeço pelo apoio."
16007-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
16007-CVGroup_Battle_Defense_1-1 = "Fufu, essa foi por pouco."
16007-CVGroup_Battle_In_1-1 = "Se precisa de fogo de suporte, pode deixar comigo!"
16007-CVGroup_Battle_In_2-1 = "Não há o que temer... Avante!"
16007-CVGroup_Battle_Move_1-1 = "Devemos nos mover para a próxima posição?"
16007-CVGroup_Battle_Move_2-1 = "A vitória está logo ali!"
16007-CVGroup_Battle_Recovery_1-1 = "Ora, muito obrigada."
16007-CVGroup_Battle_TacticalAction_1-1 = "Estou me movendo!"
16007-CVGroup_Battle_Victory_1-1 = "Pessoal, é uma vitória para Red Winter!"
16007-CVGroup_Battle_Victory_2-1 = "Como esperado, eu confiava em todos vocês!"
16007-CVGroup_CommonSkill-1 = "Você aí! Preste atenção!"
16007-CVGroup_ExSkill_1-1 = "Eu acredito...\nNa vitória da Presidente Cherino!"
16007-CVGroup_ExSkill_2-1 = "Pela Presidente Cherino, e para a Presidente Cherino!"
16007-CVGroup_ExSkill_3-1 = "Red Winter, a Academia Federal... para sempre!"
16007-CVGroup_ExSkill_Level_1-1 = "Pessoal, por favor, ouçam-me!"
16007-CVGroup_ExSkill_Level_2-1 = "Pessoal, a vitória está próxima!"
16007-CVGroup_ExSkill_Level_3-1 = "Nossa revolução... certamente será um sucesso!"
16007-CVGroup_Formation_In_1-1 = "Isso também é pela Presidente Cherino...!"
16007-CVGroup_Formation_In_2-1 = "Farei jus às suas expectativas."
16007-CVGroup_Formation_Select-1 = "Ora? Algum problema...?"
16007-CVGroup_Growup_1-1 = "Usarei este poder com sabedoria pela revolução."
16007-CVGroup_Growup_2-1 = "Vou me esforçar ainda mais pela Presidente Cherino!"
16007-CVGroup_Growup_3-1 = "Com isso, poderei suprimir os elementos subversivos com mais eficiência!"
16007-CVGroup_Growup_4-1 = "Agradeço por este apoio, que não seria exagero chamar de revolucionário!"
16007-CVGroup_Relationship_Up_1-1 = "Sensei. Eu confio em você, sabe?"
16007-CVGroup_Relationship_Up_2-1 = "Na frente do Sensei, é difícil mentir..."
16007-CVGroup_Relationship_Up_3-1 = "Ufa... meu rosto está tão quente...\nEstá calor hoje, não está?"
16007-CVGroup_Relationship_Up_4-1 = "Esse sentimento que aperta meu peito toda vez que vejo o Sensei, será que é...\nUm prenúncio de uma revolução?"
16007-CVGroup_Tactic_In_1-1 = "Parece que ainda há elementos subversivos por aí que não juraram lealdade à Presidente."
16007-CVGroup_Tactic_In_2-1 = "Vamos fazer uma limpeza completa."
16007-CVGroup_Tactic_Victory_1-1 = "Fufu, está vendo isso, Presidente Cherino?"
16007-CVGroup_Tactic_Victory_2-1 = "Onde Red Winter pisa, não existe derrota!"
