[translation]
10101-CVGroup_Battle_Buffed_1-1 = "支援、感謝する。"
10101-CVGroup_Battle_Covered_1-1 = "遮蔽する。"
10101-CVGroup_Battle_Defense_1-1 = "甘い。"
10101-CVGroup_Battle_In_1-1 = "前方に立つ。"
10101-CVGroup_Battle_In_2-1 = "みなの夏のために。"
10101-CVGroup_Battle_Move_1-1 = "移動する。"
10101-CVGroup_Battle_Move_2-1 = "次はどこだ。"
10101-CVGroup_Battle_Recovery_1-1 = "感謝しよう。"
10101-CVGroup_Battle_TacticalAction_1-1 = "次。"
10101-CVGroup_Battle_Victory_1-1 = "任務完了。"
10101-CVGroup_Battle_Victory_2-1 = "……そろそろ練習に行きたいのだが。"
10101-CVGroup_CommonSkill-1 = "今日の業務も、丁寧にいこう。"
10101-CVGroup_ExSkill_1-1 = "私にできること、私がしたいことは……！"
10101-CVGroup_ExSkill_2-1 = "何かが、見える……！"
10101-CVGroup_ExSkill_3-1 = "胸が、高鳴る……！"
10101-CVGroup_ExSkill_Level_1-1 = "これを……！"
10101-CVGroup_ExSkill_Level_2-1 = "もう一曲……！"
10101-CVGroup_ExSkill_Level_3-1 = "今だ！"
10101-CVGroup_Formation_In_1-1 = "何をすればいい？"
10101-CVGroup_Formation_In_2-1 = "業務を全うする。"
10101-CVGroup_Formation_Select-1 = "次はどんな業務だ？"
10101-CVGroup_Growup_1-1 = "……これで業務が円滑に進む。礼を言おう。"
10101-CVGroup_Growup_2-1 = "これを……本当に受け取っていいのか……？"
10101-CVGroup_Growup_3-1 = "次の給料が入ったら、この恩は必ず……\n……むっ、い、要らない……？"
10101-CVGroup_Growup_4-1 = "計り知れないほど、たくさんの恩が先生にあるというのに、\n今の私には、感謝の言葉を返すしかできないのが……もどかしいな。"
10101-CVGroup_Relationship_Up_1-1 = "先生の変わらぬ支援に、感謝を。"
10101-CVGroup_Relationship_Up_2-1 = "その……もしよければ……先生のために演奏を……\nあ、いや、なんでもない。"
10101-CVGroup_Relationship_Up_3-1 = "私は常に、先生を応援している。\n……それだけ、覚えていてくれ。"
10101-CVGroup_Relationship_Up_4-1 = "働いて給料をもらうのは簡単だ。\nしかし先生の信頼に応えるのは……とても難しく感じる。"
10101-CVGroup_Tactic_In_1-1 = "現場に到着した。"
10101-CVGroup_Tactic_In_2-1 = "準備完了。行くぞ。"
10101-CVGroup_Tactic_Victory_1-1 = "ステージの時間には間に合いそうだ。"
10101-CVGroup_Tactic_Victory_2-1 = "業務、完了だ。"
