[translation]
10101-CVGroup_Battle_Buffed_1-1 = "Agradeço pelo suporte."
10101-CVGroup_Battle_Covered_1-1 = "Vou me proteger."
10101-CVGroup_Battle_Defense_1-1 = "Muito ingênuo."
10101-CVGroup_Battle_In_1-1 = "Vou para a linha de frente."
10101-CVGroup_Battle_In_2-1 = "Pelo verão de todos."
10101-CVGroup_Battle_Move_1-1 = "Movendo-me."
10101-CVGroup_Battle_Move_2-1 = "Para onde agora?"
10101-CVGroup_Battle_Recovery_1-1 = "Minha gratidão."
10101-CVGroup_Battle_TacticalAction_1-1 = "Próximo."
10101-CVGroup_Battle_Victory_1-1 = "Missão cumprida."
10101-CVGroup_Battle_Victory_2-1 = "……Eu gostaria de ir praticar logo."
10101-CVGroup_CommonSkill-1 = "Vamos realizar as tarefas de hoje com cuidado."
10101-CVGroup_ExSkill_1-1 = "O que eu posso fazer, o que eu quero fazer é……!"
10101-CVGroup_ExSkill_2-1 = "Eu consigo ver algo……!"
10101-CVGroup_ExSkill_3-1 = "Meu coração está acelerado……!"
10101-CVGroup_ExSkill_Level_1-1 = "Tome isto……!"
10101-CVGroup_ExSkill_Level_2-1 = "Mais uma música……!"
10101-CVGroup_ExSkill_Level_3-1 = "Agora!"
10101-CVGroup_Formation_In_1-1 = "O que devo fazer?"
10101-CVGroup_Formation_In_2-1 = "Vou cumprir meu dever."
10101-CVGroup_Formation_Select-1 = "Qual é a próxima tarefa?"
10101-CVGroup_Growup_1-1 = "……Com isso, o trabalho fluirá melhor. Meus agradecimentos."
10101-CVGroup_Growup_2-1 = "Eu posso…… realmente aceitar isso……?"
10101-CVGroup_Growup_3-1 = "Quando eu receber meu próximo salário, certamente retribuirei este favor……\n……Hm? V-você não quer……?"
10101-CVGroup_Growup_4-1 = "Embora eu tenha uma dívida imensurável com o Sensei,\né frustrante que, por enquanto, eu só possa retribuir com palavras de gratidão."
10101-CVGroup_Relationship_Up_1-1 = "Agradeço pelo seu apoio constante, Sensei."
10101-CVGroup_Relationship_Up_2-1 = "Bem…… se você quiser…… eu poderia tocar para você……\nAh, não, esqueça."
10101-CVGroup_Relationship_Up_3-1 = "Eu estou sempre torcendo por você, Sensei.\n……Apenas lembre-se disso."
10101-CVGroup_Relationship_Up_4-1 = "Trabalhar e receber um salário é fácil.\nMas corresponder à confiança do Sensei…… parece muito difícil."
10101-CVGroup_Tactic_In_1-1 = "Cheguei ao local."
10101-CVGroup_Tactic_In_2-1 = "Preparação concluída. Vamos lá."
10101-CVGroup_Tactic_Victory_1-1 = "Acho que chegarei a tempo para o show."
10101-CVGroup_Tactic_Victory_2-1 = "Tarefa concluída."
