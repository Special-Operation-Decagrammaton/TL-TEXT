[translation]
20053-CVGroup_CommonSkill-1 = "Vou te ensinar os segredos da arte!"
20053-CVGroup_ExSkill_1-1 = "Este é o estilo Michiru... Unyaaa!?"
20053-CVGroup_ExSkill_2-1 = "Contemple! Esta é a mais nova kame... raaa!?"
20053-CVGroup_ExSkill_3-1 = "Diário Ninja da Garota Michiru-chi, come-çaaa!?"
20053-CVGroup_ExSkill_Level_1-1 = "Kya, chi... unyaaa!?"
20053-CVGroup_ExSkill_Level_2-1 = "Ufa... m-meus olhos!?"
20053-CVGroup_ExSkill_Level_3-1 = "Ufa... nada de fotos de bastidores!"
20053-CVGroup_Formation_In_1-1 = "A, ah. Aqui é Undercover Zero-One.\n...Espera, é assim que se faz?"
20053-CVGroup_Formation_In_2-1 = "O local da nossa missão é... aqui, né!"
20053-CVGroup_Formation_Select-1 = "Este vestido é para a missão...\nMas... hum, Sensei, o que você acha?"
20053-CVGroup_Growup_1-1 = "Essa sensação... isso é um ajuste perfeito..."
20053-CVGroup_Growup_2-1 = "Mesmo que a roupa mude, meu estado de espírito continua o mesmo!"
20053-CVGroup_Growup_3-1 = "Me dar algo tão raro assim significa que...\nSensei, você também quer seguir o caminho ninja?"
20053-CVGroup_Growup_4-1 = "Hehe, e então?\nEu... estou fofa... não, estou mais forte?"
20053-CVGroup_Relationship_Up_1-1 = "Isso é um pouco vergonhoso, talvez..."
20053-CVGroup_Relationship_Up_2-1 = "O que achou deste penteado?\nEu me esforcei bastante para arrumar..."
20053-CVGroup_Relationship_Up_3-1 = "Eh, fofa...? \nSensei, você de novo... he-hehe..."
20053-CVGroup_Relationship_Up_4-1 = "Com este visual, como guarda-costas do Sensei...\nEu posso ficar ao seu lado...?"
