[translation]
10017-CVGroup_Battle_Buffed_1-1 = "悪くないサポートだな、カムラッド！"
10017-CVGroup_Battle_Covered_1-1 = "反逆だ！隠れろ！"
10017-CVGroup_Battle_Defense_1-1 = "ふふん、無駄だ！"
10017-CVGroup_Battle_In_1-1 = "出発だ！"
10017-CVGroup_Battle_In_2-1 = "さあ、行こう！"
10017-CVGroup_Battle_Move_1-1 = "休んでいる暇などないぞ！"
10017-CVGroup_Battle_Move_2-1 = "この勢いで、全部やっつけるのだ！"
10017-CVGroup_Battle_Recovery_1-1 = "よし、よし。"
10017-CVGroup_Battle_TacticalAction_1-1 = "進め進めー！"
10017-CVGroup_Battle_Victory_1-1 = "うむ、どうだ。書記長の力、思い知ったか？\n……？あ、髭が……！"
10017-CVGroup_Battle_Victory_2-1 = "所詮この程度か、ふははははは！\n……ん？あ、うあぁ！？"
10017-CVGroup_CommonSkill-1 = "粛清してやる！"
10017-CVGroup_ExSkill_1-1 = "さあ来い、親衛隊！\nあそこだ！撃て―！"
10017-CVGroup_ExSkill_2-1 = "行け、我が親衛隊！\n粛清対象はあそこだ！"
10017-CVGroup_ExSkill_3-1 = "親衛隊！\n総員、攻撃！"
10017-CVGroup_ExSkill_Level_1-1 = "全部やっつけてしまえ！"
10017-CVGroup_ExSkill_Level_2-1 = "よし！攻撃だ！"
10017-CVGroup_ExSkill_Level_3-1 = "粛清、粛清、粛清だ！"
10017-CVGroup_Formation_In_1-1 = "うむ、良い選択だ。"
10017-CVGroup_Formation_In_2-1 = "おいらの権威を示す時が来たか。"
10017-CVGroup_Formation_Select-1 = "あ、あれっ！？\nは、離せ！"
10017-CVGroup_Growup_1-1 = "この溢れ出る力……\n見ているか、カムラッド！"
10017-CVGroup_Growup_2-1 = "悪くない、悪くないぞ……\nおいらの成長に限界はない！"
10017-CVGroup_Growup_3-1 = "これぞまさに、レッドウィンターの力だ！"
10017-CVGroup_Growup_4-1 = "やるではないか、カムラッド！"
10017-CVGroup_Relationship_Up_1-1 = "お、おいらに恥をかかせたら、粛清だからな！？"
10017-CVGroup_Relationship_Up_2-1 = "あ……ありがと、カムラッド。"
10017-CVGroup_Relationship_Up_3-1 = "な、なんだよ～？"
10017-CVGroup_Relationship_Up_4-1 = "エヘ、エヘヘヘ……。"
10017-CVGroup_Tactic_In_1-1 = "諸君、準備せよ！"
10017-CVGroup_Tactic_In_2-1 = "皆の者、義務を果たす時が来たぞ！"
10017-CVGroup_Tactic_Victory_1-1 = "これがレッドウィンターの力だ！"
10017-CVGroup_Tactic_Victory_2-1 = "おいらの雄姿、ちゃんと見ていたか、カムラッド？"
