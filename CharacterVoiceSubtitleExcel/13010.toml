[translation]
13010-CVGroup_Battle_Buffed_1-1 = "ありがと～"
13010-CVGroup_Battle_Covered_1-1 = "隠れるわ、支援をお願い！"
13010-CVGroup_Battle_Defense_1-1 = "無駄よ。"
13010-CVGroup_Battle_In_1-1 = "計算は完璧。\n落ち着いて行こう！"
13010-CVGroup_Battle_In_2-1 = "私たちの勝率はかなり高い。\n自信をもって行こう！"
13010-CVGroup_Battle_Move_1-1 = "ま、ここまでは計算通りね。"
13010-CVGroup_Battle_Move_2-1 = "計算が合っていれば、すぐに次の目標が見えてくるはず。"
13010-CVGroup_Battle_Recovery_1-1 = "うん。ちょうどいい量ね。"
13010-CVGroup_Battle_TacticalAction_1-1 = "行くわよ！"
13010-CVGroup_Battle_Victory_1-1 = "計算通り。完璧～"
13010-CVGroup_Battle_Victory_2-1 = "数学は真実を導く。\n私たちの勝ちよ。"
13010-CVGroup_CommonSkill-1 = "まだ終わらないわよ？"
13010-CVGroup_ExSkill_1-1 = "悲しみも、怒りもすべて因数分解してやるわ。"
13010-CVGroup_ExSkill_2-1 = "現在の状況と条件……\nよし。これは勝ちね。"
13010-CVGroup_ExSkill_3-1 = "攻撃が私に命中する確率は……\n極めて低い！"
13010-CVGroup_ExSkill_Level_1-1 = "単なる計算結果にすぎないわ。"
13010-CVGroup_ExSkill_Level_2-1 = "合理と理性は無慈悲よ。"
13010-CVGroup_ExSkill_Level_3-1 = "勝利を、証明するわ。"
13010-CVGroup_Formation_In_1-1 = "合理的な選択ね。"
13010-CVGroup_Formation_In_2-1 = "これ、報酬は出るんです？"
13010-CVGroup_Formation_Select-1 = "ふふーん。\nやっぱり先生は賢いですね。"
13010-CVGroup_Growup_1-1 = "成果を見せるチャンス。\n待ってました！"
13010-CVGroup_Growup_2-1 = "数値で感じられる結果というのは人をドキドキさせますね。"
13010-CVGroup_Growup_3-1 = "次の任務は、黒字を期待してくださいね。"
13010-CVGroup_Growup_4-1 = "こんな表現はあまり好きじゃないけど……\n今の私！測定不能です！"
13010-CVGroup_Relationship_Up_1-1 = "体力も時間もたくさん使っちゃった気がしますけど……\n先生といると得した気分です。"
13010-CVGroup_Relationship_Up_2-1 = "計算ができません。\n今この気持ちがですよ。"
13010-CVGroup_Relationship_Up_3-1 = "いつも測定や、計算だけを考えてたけど\n今は、ただこの瞬間を感じていたい。"
13010-CVGroup_Relationship_Up_4-1 = "どうしてかな。\n説明できない感覚だけど……嫌いじゃない。"
13010-CVGroup_Tactic_In_1-1 = "敵の位置を確認。\n先生。指揮をお願いします！"
13010-CVGroup_Tactic_In_2-1 = "敵の位置を確認。\n距離、至近。\n戦力、計算完了。"
13010-CVGroup_Tactic_Victory_1-1 = "スマートに勝利～"
13010-CVGroup_Tactic_Victory_2-1 = "運がよかった？\nいいえ。計算通りです。"
