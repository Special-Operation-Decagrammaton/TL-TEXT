[translation]
13010-CVGroup_Battle_Buffed_1-1 = "Obrigada~"
13010-CVGroup_Battle_Covered_1-1 = "Vou me esconder, preciso de apoio!"
13010-CVGroup_Battle_Defense_1-1 = "Inútil."
13010-CVGroup_Battle_In_1-1 = "Os cálculos estão perfeitos.\nVamos manter a calma!"
13010-CVGroup_Battle_In_2-1 = "Nossa taxa de vitória é bem alta.\nVamos com confiança!"
13010-CVGroup_Battle_Move_1-1 = "Bem, até aqui tudo conforme o cálculo."
13010-CVGroup_Battle_Move_2-1 = "Se os cálculos estiverem certos, logo veremos o próximo objetivo."
13010-CVGroup_Battle_Recovery_1-1 = "Sim. A quantidade está perfeita."
13010-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu!"
13010-CVGroup_Battle_Victory_1-1 = "Como calculado. Perfeito~"
13010-CVGroup_Battle_Victory_2-1 = "A matemática conduz à verdade.\nNós vencemos."
13010-CVGroup_CommonSkill-1 = "Ainda não acabou, sabia?"
13010-CVGroup_ExSkill_1-1 = "Vou fatorar toda a sua tristeza e raiva."
13010-CVGroup_ExSkill_2-1 = "Situação e condições atuais...\nCerto. Isso é uma vitória."
13010-CVGroup_ExSkill_3-1 = "A probabilidade de um ataque me atingir é...\nExtremamente baixa!"
13010-CVGroup_ExSkill_Level_1-1 = "É apenas um resultado de cálculo."
13010-CVGroup_ExSkill_Level_2-1 = "A lógica e a razão são impiedosas."
13010-CVGroup_ExSkill_Level_3-1 = "Vou provar a vitória."
13010-CVGroup_Formation_In_1-1 = "Uma escolha racional."
13010-CVGroup_Formation_In_2-1 = "Diga, haverá alguma recompensa por isso?"
13010-CVGroup_Formation_Select-1 = "Fufun.\nComo esperado do Sensei, você é inteligente."
13010-CVGroup_Growup_1-1 = "Uma chance de mostrar resultados.\nEu estava esperando por isso!"
13010-CVGroup_Growup_2-1 = "Resultados que podem ser sentidos através de números fazem o coração bater mais forte."
13010-CVGroup_Growup_3-1 = "Para a próxima missão, pode esperar um saldo positivo."
13010-CVGroup_Growup_4-1 = "Não gosto muito desse tipo de expressão, mas...\nAgora eu estou! Imensurável!"
13010-CVGroup_Relationship_Up_1-1 = "Sinto que gastei muita energia e tempo, mas...\nSinto que saí ganhando por estar com o Sensei."
13010-CVGroup_Relationship_Up_2-1 = "Não consigo calcular.\nEste sentimento agora, digo."
13010-CVGroup_Relationship_Up_3-1 = "Eu sempre pensava apenas em medições e cálculos, mas\nagora, só quero sentir este momento."
13010-CVGroup_Relationship_Up_4-1 = "Por que será?\nÉ uma sensação que não consigo explicar, mas... não desgosto."
13010-CVGroup_Tactic_In_1-1 = "Posição do inimigo confirmada.\nSensei, por favor, assuma o comando!"
13010-CVGroup_Tactic_In_2-1 = "Posição do inimigo confirmada.\nDistância, curtíssima.\nForças, cálculo concluído."
13010-CVGroup_Tactic_Victory_1-1 = "Vitória com estilo~"
13010-CVGroup_Tactic_Victory_2-1 = "Foi sorte?\nNão. Foi conforme o cálculo."
