[translation]
16009-CVGroup_Battle_Buffed_1-1 = "Oh, sinto que fiquei mais forte... ou talvez não!"
16009-CVGroup_Battle_Defense_1-1 = "Ah, isso não vai funcionar comigo!"
16009-CVGroup_Battle_In_1-1 = "Fufun!\nMuito bem, missão iniciada!"
16009-CVGroup_Battle_In_2-1 = "Hmm, b-bem, vamos começar!"
16009-CVGroup_Battle_Move_1-1 = "Certo, vamos para a próxima!"
16009-CVGroup_Battle_Move_2-1 = "Ugh, ainda tem mais...?"
16009-CVGroup_Battle_Recovery_1-1 = "Obrigada pela ajuda!"
16009-CVGroup_Battle_TacticalAction_1-1 = "Shubabababa!"
16009-CVGroup_Battle_Victory_1-1 = "Viu só? Esse é o poder do nosso Clube de Pesquisa de Ninjutsu!"
16009-CVGroup_Battle_Victory_2-1 = "Sim, como esperado, o Ninjutsu estilo Michiru não tem pontos cegos!"
16009-CVGroup_CommonSkill-1 = "Por enquanto, vou recuperar minha energia mental com itens ninja..."
16009-CVGroup_ExSkill_1-1 = "N-Ninpou estilo Michiru!"
16009-CVGroup_ExSkill_2-1 = "V-vou te mostrar a Arte do Fogo!"
16009-CVGroup_ExSkill_3-1 = "Não subestime a presidente do Clube de Pesquisa de Ninjutsu!"
16009-CVGroup_ExSkill_Level_1-1 = "Uau, que quente!?"
16009-CVGroup_ExSkill_Level_2-1 = "Ninpou, tá quente, tá quente, tá quente!?"
16009-CVGroup_ExSkill_Level_3-1 = "Ugyaaa!!\nTááá quente!?"
16009-CVGroup_Formation_In_1-1 = "Ugyaaa!?\nQ-que susto...\nAh, vamos sair agora? Entendido!"
16009-CVGroup_Formation_In_2-1 = "Fufu... agora é a minha vez!\n...Ei, não é? É sim, né?"
16009-CVGroup_Formation_Select-1 = "Domo, Sensei-dono. Sou a Michiru.\n...Muito bem, quais são as ordens?"
16009-CVGroup_Growup_1-1 = "Ei, isso é para mim!?\nFufu, como esperado, o Sensei-dono tem bom olho...\nBrincadeirinha. Nyahaha."
16009-CVGroup_Growup_2-1 = "Oh, com isso vou ficar ainda mais forte...!!"
16009-CVGroup_Growup_3-1 = "Bem, é que...\nAh, obri...gada...?"
16009-CVGroup_Growup_4-1 = "Fufu, finalmente cheguei até aqui.\nPara retribuir as expectativas do Sensei-dono, vou mostrar um desempenho impecável!"
16009-CVGroup_Relationship_Up_1-1 = "Noaaa!?\nEi, muito perto! Muito perto! O espaço pessoal!\nAh, isso é ruim para o meu coração..."
16009-CVGroup_Relationship_Up_2-1 = "Quando estou com o Sensei-dono, sinto que...\nMesmo alguém como eu pode fazer qualquer coisa...\n...O que é isso? Que estranho."
16009-CVGroup_Relationship_Up_3-1 = "Q-que distância é essa!? Está me provocando? É uma pegadinha!?\nB-bem, não é que eu não goste, mas..."
16009-CVGroup_Relationship_Up_4-1 = "Ugh, muito perto... não, talvez eu devesse tomar a iniciativa...?\nIsso, com a minha técnica de sedução...\n...Esquece, como eu poderia fazer algo tão vergonhoso!"
16009-CVGroup_Tactic_In_1-1 = "Clube de Pesquisa de Ninjutsu, em ação!"
16009-CVGroup_Tactic_In_2-1 = "Vou te mostrar o terror dos ninjas!\nPrepare-se!"
16009-CVGroup_Tactic_Victory_1-1 = "Missão cumprida!\n...Fuh, ficou perfeito."
16009-CVGroup_Tactic_Victory_2-1 = "Para o nosso Clube de Pesquisa de Ninjutsu, isso é moleza!\nMuito fácil!"
