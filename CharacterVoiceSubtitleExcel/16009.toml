[translation]
16009-CVGroup_Battle_Buffed_1-1 = "おおっ、何か強くなった気が……しないわけでもない！"
16009-CVGroup_Battle_Defense_1-1 = "あはっ、そんなの通じないよ！"
16009-CVGroup_Battle_In_1-1 = "ふふ～ん！\nよーし、任務開始！"
16009-CVGroup_Battle_In_2-1 = "うーん、と、とりあえず始めよう！"
16009-CVGroup_Battle_Move_1-1 = "よっし、次行こう！"
16009-CVGroup_Battle_Move_2-1 = "うー、まだ続くの……？"
16009-CVGroup_Battle_Recovery_1-1 = "お助け感謝ー！"
16009-CVGroup_Battle_TacticalAction_1-1 = "シュババババッ！"
16009-CVGroup_Battle_Victory_1-1 = "どう、これぞ私たち忍術研究部の力なんだから！"
16009-CVGroup_Battle_Victory_2-1 = "うん、やっぱりミチル流忍術に死角無し！"
16009-CVGroup_CommonSkill-1 = "とりあえず、忍者グッズで精神力を回復……。"
16009-CVGroup_ExSkill_1-1 = "ミ、ミチル流忍法っ！"
16009-CVGroup_ExSkill_2-1 = "か、火遁の術、見せてあげる！"
16009-CVGroup_ExSkill_3-1 = "忍術研究部の部長を、舐めるなぁっ！"
16009-CVGroup_ExSkill_Level_1-1 = "うわ、熱っ！？"
16009-CVGroup_ExSkill_Level_2-1 = "忍法あっちちちちっ！？"
16009-CVGroup_ExSkill_Level_3-1 = "うぎゃあっ！！\nあっっっつ！？"
16009-CVGroup_Formation_In_1-1 = "うぎゃあっ！？\nび、びっくりした……\nあ、今から出陣？了解！"
16009-CVGroup_Formation_In_2-1 = "ふふっ……さあ、私の出番だね！\n……え、違う？合ってる？"
16009-CVGroup_Formation_Select-1 = "ドーモ、先生殿。ミチルです。\n……さあ、ご用命を！"
16009-CVGroup_Growup_1-1 = "え、これくれるの？私に！？\nふふっ、やはり先生殿は見る目があるね……\nなんちゃって。にゃははっ。"
16009-CVGroup_Growup_2-1 = "おおっ、これでますます強く……！！"
16009-CVGroup_Growup_3-1 = "えっと、そのー……\nあー、ありが、とう……？"
16009-CVGroup_Growup_4-1 = "ふふっ、ついに私もここまで来た。\n先生殿の期待に応えて、八面六臂の活躍をご覧に入れようぞ！"
16009-CVGroup_Relationship_Up_1-1 = "のあぁっ！？\nちょっ、近い！近いって！距離感！\nあー、心臓に悪い……。"
16009-CVGroup_Relationship_Up_2-1 = "先生殿と一緒だと、何だか……\nこんな私でも、何でもできるんじゃないかって気持ちに……。\n……なにこれ、変なの。"
16009-CVGroup_Relationship_Up_3-1 = "な、何この距離感！？からかってる？ドッキリ！？\nべ、別に嫌ってわけじゃないけど……。"
16009-CVGroup_Relationship_Up_4-1 = "うっ、近い……いやいっそのこと、こっちから……？\nそうだ、私の色仕掛けの術で……\nって、そんな恥ずかしいことできるか！"
16009-CVGroup_Tactic_In_1-1 = "忍術研究部、始動！"
16009-CVGroup_Tactic_In_2-1 = "忍者の恐ろしさ、見せてあげるんだから！\n覚悟ぉ！"
16009-CVGroup_Tactic_Victory_1-1 = "任務完了！\n……ふっ、決まった。"
16009-CVGroup_Tactic_Victory_2-1 = "私たち忍術研究部にとって、これくらい朝飯前だよ！\nちょろいちょろい！"
