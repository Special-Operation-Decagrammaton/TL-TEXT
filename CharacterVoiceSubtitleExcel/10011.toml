[translation]
10011-CVGroup_Battle_Buffed_1-1 = "お手伝いありがとうございます！"
10011-CVGroup_Battle_Covered_1-1 = "隠れます！"
10011-CVGroup_Battle_Defense_1-1 = "ふふ、そんな悪戯は通用しませんよ。"
10011-CVGroup_Battle_In_1-1 = "さあ、みんなでお散歩に行きましょうか？"
10011-CVGroup_Battle_In_2-1 = "みんな、道に迷わないように気を付けてね～！"
10011-CVGroup_Battle_Move_1-1 = "みんな、こっちよ！"
10011-CVGroup_Battle_Move_2-1 = "道に迷わないように気をつけてね！"
10011-CVGroup_Battle_Recovery_1-1 = "あら、ありがとう。"
10011-CVGroup_Battle_TacticalAction_1-1 = "場所を移動します！"
10011-CVGroup_Battle_Victory_1-1 = "みんなご苦労様でした！"
10011-CVGroup_Battle_Victory_2-1 = "次からは仲良くするんですよ？"
10011-CVGroup_CommonSkill-1 = "よいしょ～！"
10011-CVGroup_ExSkill_1-1 = "悪い子、発見！"
10011-CVGroup_ExSkill_2-1 = "ふふ、お姉さんがやるのをよく見ててね。"
10011-CVGroup_ExSkill_3-1 = "これで終わらせてしまいましょう！"
10011-CVGroup_ExSkill_Level_1-1 = "めっ、ですよ。"
10011-CVGroup_ExSkill_Level_2-1 = "バン！"
10011-CVGroup_ExSkill_Level_3-1 = "バーン！"
10011-CVGroup_Formation_In_1-1 = "ふふ、素晴らしい選択ですね。"
10011-CVGroup_Formation_In_2-1 = "お姉さんにお任せください！"
10011-CVGroup_Formation_Select-1 = "あら、何か問題が……？"
10011-CVGroup_Growup_1-1 = "成長はいつも気持ちのいいことですね。"
10011-CVGroup_Growup_2-1 = "体の隅々にまで力が染み渡って……\n気分が高揚しますね～"
10011-CVGroup_Growup_3-1 = "心も体も丈夫、になりました！"
10011-CVGroup_Growup_4-1 = "子供たちに教えるためには、\n私が率先して成長しないといけないでしょう？"
10011-CVGroup_Relationship_Up_1-1 = "先生とご一緒していると……\n私もたまには、子供みたいに甘えたくなります。"
10011-CVGroup_Relationship_Up_2-1 = "先生は本当に特別な方ですね。\n生徒たちにとっても、私にとっても。"
10011-CVGroup_Relationship_Up_3-1 = "先生との授業、楽しみにしています。"
10011-CVGroup_Relationship_Up_4-1 = "この瞬間が、永遠に続くといいですね。"
10011-CVGroup_Tactic_In_1-1 = "言うこと聞かない悪い子はどこかな～？"
10011-CVGroup_Tactic_In_2-1 = "さあ、かくれんぼスタートね！"
10011-CVGroup_Tactic_Victory_1-1 = "えらい、えらい。\nみんなよくできました！"
10011-CVGroup_Tactic_Victory_2-1 = "よくできました、みんな！\nお家に帰ったら復習するのを、忘れないでね！"
