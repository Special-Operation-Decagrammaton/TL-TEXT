[translation]
10011-CVGroup_Battle_Buffed_1-1 = "Obrigada pela ajuda!"
10011-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
10011-CVGroup_Battle_Defense_1-1 = "Fufu, essas travessuras não vão funcionar comigo."
10011-CVGroup_Battle_In_1-1 = "Vamos todos dar um passeio?"
10011-CVGroup_Battle_In_2-1 = "Pessoal, tomem cuidado para não se perderem!"
10011-CVGroup_Battle_Move_1-1 = "Pessoal, por aqui!"
10011-CVGroup_Battle_Move_2-1 = "Tomem cuidado para não se perderem!"
10011-CVGroup_Battle_Recovery_1-1 = "Ora, obrigada."
10011-CVGroup_Battle_TacticalAction_1-1 = "Mudando de posição!"
10011-CVGroup_Battle_Victory_1-1 = "Bom trabalho a todos!"
10011-CVGroup_Battle_Victory_2-1 = "Da próxima vez, sejam amigáveis, entenderam?"
10011-CVGroup_CommonSkill-1 = "Heave-ho!"
10011-CVGroup_ExSkill_1-1 = "Criança malvada, encontrada!"
10011-CVGroup_ExSkill_2-1 = "Fufu, observem bem como a irmã mais velha faz."
10011-CVGroup_ExSkill_3-1 = "Vamos acabar com isso agora!"
10011-CVGroup_ExSkill_Level_1-1 = "Isso não se faz."
10011-CVGroup_ExSkill_Level_2-1 = "Bang!"
10011-CVGroup_ExSkill_Level_3-1 = "Baaang!"
10011-CVGroup_Formation_In_1-1 = "Fufu, uma escolha maravilhosa."
10011-CVGroup_Formation_In_2-1 = "Deixem comigo!"
10011-CVGroup_Formation_Select-1 = "Ora, há algum problema...?"
10011-CVGroup_Growup_1-1 = "Crescer é sempre uma sensação agradável."
10011-CVGroup_Growup_2-1 = "Sinto o poder se espalhando por todo o meu corpo...\nSinto-me tão animada!"
10011-CVGroup_Growup_3-1 = "Tanto minha mente quanto meu corpo ficaram mais fortes!"
10011-CVGroup_Growup_4-1 = "Para poder ensinar as crianças,\neu preciso ser a primeira a crescer, não é?"
10011-CVGroup_Relationship_Up_1-1 = "Quando estou com o Sensei...\nÀs vezes, eu também sinto vontade de ser mimada como uma criança."
10011-CVGroup_Relationship_Up_2-1 = "O Sensei é uma pessoa realmente especial.\nTanto para os alunos quanto para mim."
10011-CVGroup_Relationship_Up_3-1 = "Estou ansiosa pela nossa aula, Sensei."
10011-CVGroup_Relationship_Up_4-1 = "Seria maravilhoso se este momento durasse para sempre."
10011-CVGroup_Tactic_In_1-1 = "Onde estão as crianças malvadas que não me ouvem?"
10011-CVGroup_Tactic_In_2-1 = "Muito bem, o esconde-esconde começou!"
10011-CVGroup_Tactic_Victory_1-1 = "Muito bem, muito bem.\nTodos fizeram um ótimo trabalho!"
10011-CVGroup_Tactic_Victory_2-1 = "Muito bem, pessoal!\nNão se esqueçam de revisar quando chegarem em casa!"
