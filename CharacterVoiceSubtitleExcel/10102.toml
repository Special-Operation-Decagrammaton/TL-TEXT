[translation]
10102-CVGroup_Battle_Buffed_1-1 = "Hehehe, por alguém como eu..."
10102-CVGroup_Battle_Covered_1-1 = "P-preciso me esconder..."
10102-CVGroup_Battle_Defense_1-1 = "E-eu desviei, mas!?"
10102-CVGroup_Battle_In_1-1 = "P-por enquanto, vou começar..."
10102-CVGroup_Battle_In_2-1 = "Não sei se alguém como eu será útil, mas..."
10102-CVGroup_Battle_Move_1-1 = "Ainda tem mais...?"
10102-CVGroup_Battle_Move_2-1 = "A-avançar!"
10102-CVGroup_Battle_Recovery_1-1 = "Hehehe, obrigada."
10102-CVGroup_Battle_TacticalAction_1-1 = "E-espere um pouco!"
10102-CVGroup_Battle_Victory_1-1 = "E-hehehe, nós vencemos, mas...\nNão tem nenhum prêmio?"
10102-CVGroup_Battle_Victory_2-1 = "Vamos voltar logo para o local do festival...!"
10102-CVGroup_CommonSkill-1 = "Ah, quando está calor, fazemos assim..."
10102-CVGroup_ExSkill_1-1 = "D-desta vez, com certeza...!"
10102-CVGroup_ExSkill_2-1 = "Não vou deixar você escapar...!"
10102-CVGroup_ExSkill_3-1 = "Meu alvo é o primeiro lugar...!"
10102-CVGroup_ExSkill_Level_1-1 = "Faltam 5 tiros!"
10102-CVGroup_ExSkill_Level_2-1 = "V-vou atirar!"
10102-CVGroup_ExSkill_Level_3-1 = "Por favor, acerte!"
10102-CVGroup_Formation_In_1-1 = "E-estou vestida assim, será que tem problema?"
10102-CVGroup_Formation_In_2-1 = "S-sim...!\nJá estou pronta, mas...!"
10102-CVGroup_Formation_Select-1 = "E-hehehe...\nAcho que é minha vez de sair..."
10102-CVGroup_Growup_1-1 = "V-você vai dar isso para mim...?\nNão estou me enganando, né?"
10102-CVGroup_Growup_2-1 = "Você tem um trabalho que quer me confiar...\nHehehe, é claro que sim..."
10102-CVGroup_Growup_3-1 = "Hehehe, obrigada...\nIsso é bom, mas...\nAcho que um raspadinha me daria mais energia..."
10102-CVGroup_Growup_4-1 = "Está mais divertido que o normal, e não estou acostumada...\nSerá por causa do verão...?\nOu será porque o Sensei está aqui...?"
10102-CVGroup_Relationship_Up_1-1 = "V-você confia em mim...?\nSério mesmo...?"
10102-CVGroup_Relationship_Up_2-1 = "E-eu não sei o que dizer com tantos elogios... não tenho nada para te dar em troca...\nN-não me diga que você está de olho no meu traje de banho!?\n...N-não é isso?"
10102-CVGroup_Relationship_Up_3-1 = "Bem, Sensei, você gosta de yakisoba...?\nQuer ir comer comigo?\nHehehe, desculpe, mas você paga a conta..."
10102-CVGroup_Relationship_Up_4-1 = "Melhorei um pouco desde que conheci o Sensei...\nMas, ainda assim, a vida é algo amargo, não é..."
10102-CVGroup_Tactic_In_1-1 = "Afinal, a vida é algo amargo, não é..."
10102-CVGroup_Tactic_In_2-1 = "C-chegar até aqui e ter que lutar..."
10102-CVGroup_Tactic_Victory_1-1 = "Nós vencemos...\nEmbora eu ache que a luta vai continuar..."
10102-CVGroup_Tactic_Victory_2-1 = "Terminou mais rápido do que eu esperava...\nN-não foi difícil..."
