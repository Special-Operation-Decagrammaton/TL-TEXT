[translation]
10102-CVGroup_Battle_Buffed_1-1 = "えへへ、私なんかのために……。"
10102-CVGroup_Battle_Covered_1-1 = "か、隠れないと……。"
10102-CVGroup_Battle_Defense_1-1 = "よ、避けましたけど！？"
10102-CVGroup_Battle_In_1-1 = "と、とりあえず始めてみます……。"
10102-CVGroup_Battle_In_2-1 = "こんな私が、役に立つかどうかわかりませんが……。"
10102-CVGroup_Battle_Move_1-1 = "まだあるんですか……。"
10102-CVGroup_Battle_Move_2-1 = "ぜ、前進！"
10102-CVGroup_Battle_Recovery_1-1 = "えへへ、ありがとうございます。"
10102-CVGroup_Battle_TacticalAction_1-1 = "ま、待ってください！"
10102-CVGroup_Battle_Victory_1-1 = "え、えへへ、勝ちましたけど……\n景品とかはないんですか？"
10102-CVGroup_Battle_Victory_2-1 = "早くお祭り会場に戻りましょう……！"
10102-CVGroup_CommonSkill-1 = "あ、暑いときは、こうやって……。"
10102-CVGroup_ExSkill_1-1 = "こ、今度こそ……！"
10102-CVGroup_ExSkill_2-1 = "逃がしません……！"
10102-CVGroup_ExSkill_3-1 = "狙うは一等……！"
10102-CVGroup_ExSkill_Level_1-1 = "残り5発！"
10102-CVGroup_ExSkill_Level_2-1 = "う、撃ちます！"
10102-CVGroup_ExSkill_Level_3-1 = "当たってください！"
10102-CVGroup_Formation_In_1-1 = "こ、こんな格好ですが、大丈夫でしょうか？"
10102-CVGroup_Formation_In_2-1 = "は、はい……！\n準備はできましたけど……！"
10102-CVGroup_Formation_Select-1 = "え、えへへ……\n私が出ないとですね……。"
10102-CVGroup_Growup_1-1 = "わ、私にくださるんですか……？\n勘違いじゃないですよね？"
10102-CVGroup_Growup_2-1 = "私に任せたい仕事があるんですね……\nえへへ、やっぱりそうですよね……。"
10102-CVGroup_Growup_3-1 = "えへへ、ありがとうございます……\nこういうのもいいですが、\nやっぱりかき氷の方がもっと元気が出そうです……。"
10102-CVGroup_Growup_4-1 = "い、いつもより楽しくて、なんだか慣れないです……。\n夏だからでしょうか……？\nそれとも先生がいるから……？"
10102-CVGroup_Relationship_Up_1-1 = "わ、私を信じてくださるんですか……？\n本当に……？"
10102-CVGroup_Relationship_Up_2-1 = "そ、そんなに褒められても……私があげられるものはないですが……\nま、まさか私の水着を狙って！？\n……ち、違うんですか？"
10102-CVGroup_Relationship_Up_3-1 = "えっと、先生、焼きそばは好きですか……？\n一緒に食べに行きませんか？\nえへへ、すみません、お会計はお願いします……。"
10102-CVGroup_Relationship_Up_4-1 = "先生に出会ってから少しはマシになりましたが……。\nそれでも人生は辛いものなんですね……。"
10102-CVGroup_Tactic_In_1-1 = "やっぱり人生は辛いものなんですね……。"
10102-CVGroup_Tactic_In_2-1 = "こ、ここまで来て戦闘だなんて……。"
10102-CVGroup_Tactic_Victory_1-1 = "勝ちましたね……\nもちろん戦いは続くと思いますが……。"
10102-CVGroup_Tactic_Victory_2-1 = "予想より早く終わりましたね……\nむ、難しくはなかったので……。"
