[translation]
10035-CVGroup_Battle_Buffed_1-1 = "Ah, v-você vai me ajudar...?"
10035-CVGroup_Battle_Covered_1-1 = "Kyaaaa...!?"
10035-CVGroup_Battle_Defense_1-1 = "Francamente, que desperdício de esforço..."
10035-CVGroup_Battle_In_1-1 = "V-vamos terminar isso logo e ir embora...!"
10035-CVGroup_Battle_In_2-1 = "E-então... bem, c-começando...!"
10035-CVGroup_Battle_Move_1-1 = "A-ainda não acabou...?"
10035-CVGroup_Battle_Move_2-1 = "P-por quanto tempo isso vai continuar...!?"
10035-CVGroup_Battle_Recovery_1-1 = "Ah, muito obrigada..."
10035-CVGroup_Battle_TacticalAction_1-1 = "Ugh...!"
10035-CVGroup_Battle_Victory_1-1 = "P-pessoal, bom trabalho..."
10035-CVGroup_Battle_Victory_2-1 = "C-conseguimos por pouco... ufa..."
10035-CVGroup_CommonSkill-1 = "É nessas horas que precisamos manter o controle mental...!"
10035-CVGroup_ExSkill_1-1 = "O-o que é isso...!"
10035-CVGroup_ExSkill_2-1 = "P-por que as coisas chegaram a esse ponto...!"
10035-CVGroup_ExSkill_3-1 = "Ah, chega...!"
10035-CVGroup_ExSkill_Level_1-1 = "Haa, francamente...!"
10035-CVGroup_ExSkill_Level_2-1 = "S-só desta vez, hein...!?"
10035-CVGroup_ExSkill_Level_3-1 = "Se não fosse um pedido do Sensei...!"
10035-CVGroup_Formation_In_1-1 = "Eh, v-você quer que eu vá...? Sério...?"
10035-CVGroup_Formation_In_2-1 = "Uuu... \nBem, se o Sensei insiste..."
10035-CVGroup_Formation_Select-1 = "Kyaaaa...!?"
10035-CVGroup_Growup_1-1 = "I-isso é, por acaso... \nSignifica que estou me preparando para sair...?"
10035-CVGroup_Growup_2-1 = "I-isso, o que você quer que eu faça com isso...!?"
10035-CVGroup_Growup_3-1 = "S-sinto que ganhei um pouco de motivação... ou talvez não."
10035-CVGroup_Growup_4-1 = "O-o que é isso...? \nEh, v-você está me dando...?"
10035-CVGroup_Relationship_Up_1-1 = "Se fosse outra pessoa, seria complicado... \nMas com o Sensei... sim, está tudo bem."
10035-CVGroup_Relationship_Up_2-1 = "Bem, se não se importar, no futuro... \nAh, não, esqueça o que eu disse... desculpe."
10035-CVGroup_Relationship_Up_3-1 = "Se puder ser de vez em quando, sabe... \nQue tal lermos... um livro juntos?"
10035-CVGroup_Relationship_Up_4-1 = "Na verdade, eu pesquisei todos os gostos do Sensei...! \nE-e-eu acho que acertei, então... \nS-se quiser, adoraria que fizéssemos isso juntos...!"
10035-CVGroup_Tactic_In_1-1 = "Uaa... \nNós vamos mesmo, né..."
10035-CVGroup_Tactic_In_2-1 = "E-eu confio em você, Sensei...!"
10035-CVGroup_Tactic_Victory_1-1 = "P-posso ir embora agora...?"
10035-CVGroup_Tactic_Victory_2-1 = "A-acabou... \nBem, já posso ir, né? \nÉ sério que acabou?"
