[translation]
10035-CVGroup_Battle_Buffed_1-1 = "あ、て、手伝ってくれるんですか……？"
10035-CVGroup_Battle_Covered_1-1 = "ひゃぁぁぁっ……！？"
10035-CVGroup_Battle_Defense_1-1 = "全く、無駄な事を……。"
10035-CVGroup_Battle_In_1-1 = "は、早めに終えて帰りましょう……！"
10035-CVGroup_Battle_In_2-1 = "で、では……えっと、しゅ、出発……！"
10035-CVGroup_Battle_Move_1-1 = "ま、まだ終わりじゃないんですか……？"
10035-CVGroup_Battle_Move_2-1 = "い、一体いつまで続くんですか……！？"
10035-CVGroup_Battle_Recovery_1-1 = "あ、ありがとうございます……。"
10035-CVGroup_Battle_TacticalAction_1-1 = "うぅっ……！"
10035-CVGroup_Battle_Victory_1-1 = "み、みなさん、お疲れ様でした……。"
10035-CVGroup_Battle_Victory_2-1 = "な、何とかギリギリ……ふう……。"
10035-CVGroup_CommonSkill-1 = "こ、こういう時こそメンタル管理……！"
10035-CVGroup_ExSkill_1-1 = "な、何ですかこれは……！"
10035-CVGroup_ExSkill_2-1 = "ど、どうしてこんなことに……！"
10035-CVGroup_ExSkill_3-1 = "あぁ、もうっ……！"
10035-CVGroup_ExSkill_Level_1-1 = "はぁ、全く……！"
10035-CVGroup_ExSkill_Level_2-1 = "こ、今回だけですよ……！？"
10035-CVGroup_ExSkill_Level_3-1 = "先生の頼みでなかったら……っ！"
10035-CVGroup_Formation_In_1-1 = "え、わ、私ですか……？本当に……？"
10035-CVGroup_Formation_In_2-1 = "ううっ……\nまあ、先生がそう仰るのであれば……。"
10035-CVGroup_Formation_Select-1 = "ひゃぁぁっ……！？"
10035-CVGroup_Growup_1-1 = "こ、これはまさか……\n外出の準備を、という意味で……？"
10035-CVGroup_Growup_2-1 = "こ、これを渡して、私に何をやらせようと……！？"
10035-CVGroup_Growup_3-1 = "す、少しだけ、やる気が湧いてきたような……そうでないような。"
10035-CVGroup_Growup_4-1 = "こ、これは何ですか……？\nえ、わ、私に……？"
10035-CVGroup_Relationship_Up_1-1 = "他の方だったら、あれなのですが……\n先生なら……はい、大丈夫、です。"
10035-CVGroup_Relationship_Up_2-1 = "その、これからも、よろしければ……\nあ、いえ、やっぱり気にしないでください……すみません。"
10035-CVGroup_Relationship_Up_3-1 = "たまにで良いので、その……。\n今度、一緒に……本を、読みませんか？"
10035-CVGroup_Relationship_Up_4-1 = "その、実は先生の好みを、全部調査してきまして……！\nた、た、多分合っていると思うのですが、\nよ、よろしければぜひ一緒に……！"
10035-CVGroup_Tactic_In_1-1 = "うあぁ……\n本当に、行くんですね……。"
10035-CVGroup_Tactic_In_2-1 = "せ、先生のこと、信じていますからね……！？"
10035-CVGroup_Tactic_Victory_1-1 = "も、もう帰っても良いですか……？"
10035-CVGroup_Tactic_Victory_2-1 = "お、終わった……\nえっと、もう良いんですよね？\n本当に終わりですよね？"
