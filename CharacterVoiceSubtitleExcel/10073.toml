[translation]
10073-CVGroup_Battle_Buffed_1-1 = "A-ah, obrigada..."
10073-CVGroup_Battle_Covered_1-1 = "Vou ficar aqui."
10073-CVGroup_Battle_Defense_1-1 = "Isso não vai funcionar comigo."
10073-CVGroup_Battle_In_1-1 = "Haa... vamos lá..."
10073-CVGroup_Battle_In_2-1 = "Por que... eu estou na frente...?"
10073-CVGroup_Battle_Move_1-1 = "Ainda tem mais?"
10073-CVGroup_Battle_Move_2-1 = "Vamos acabar logo com isso..."
10073-CVGroup_Battle_Recovery_1-1 = "Muito obrigada."
10073-CVGroup_Battle_TacticalAction_1-1 = "U-ugh...!"
10073-CVGroup_Battle_Victory_1-1 = "Ufa... finalmente, acabou."
10073-CVGroup_Battle_Victory_2-1 = "Haa... \nE-estou cansada... só eu...?"
10073-CVGroup_CommonSkill-1 = "Hum...! Entendi."
10073-CVGroup_ExSkill_1-1 = "Já cheguei no meu limite..."
10073-CVGroup_ExSkill_2-1 = "Foi bom ter me preparado."
10073-CVGroup_ExSkill_3-1 = "Fiquei um pouco mais calma."
10073-CVGroup_ExSkill_Level_1-1 = "V-vai beber...?"
10073-CVGroup_ExSkill_Level_2-1 = "S-se vocês também quiserem..."
10073-CVGroup_ExSkill_Level_3-1 = "Está bem geladinho, viu..."
10073-CVGroup_Formation_In_1-1 = "N-não precisava que eu viesse..."
10073-CVGroup_Formation_In_2-1 = "Entendido... por enquanto..."
10073-CVGroup_Formation_Select-1 = "H-hiaaaa!! \nS-Sensei...!?"
10073-CVGroup_Growup_1-1 = "Fu, fufu... \nBem, às vezes, um verão assim não é tão ruim..."
10073-CVGroup_Growup_2-1 = "Não é tão ruim quanto eu pensava, esse tipo de coisa... hihi..."
10073-CVGroup_Growup_3-1 = "Obrigada, Sensei. \nVou tentar... ser útil..."
10073-CVGroup_Growup_4-1 = "...Essa sensação... entendi, compreendi."
10073-CVGroup_Relationship_Up_1-1 = "O-obrigada, Sensei... \nBem... como agradecimento, quer que eu prepare um americano...?"
10073-CVGroup_Relationship_Up_2-1 = "Se for com o Sensei, sinto que consigo fazer até as coisas que não gosto..."
10073-CVGroup_Relationship_Up_3-1 = "Apenas o Sensei pode me pedir esse tipo de coisa, então..."
10073-CVGroup_Relationship_Up_4-1 = "D-da próxima vez... \nQuando tiver um tempo... \nBem, por favor... me chame."
10073-CVGroup_Tactic_In_1-1 = "O caminho é longo, não é..."
10073-CVGroup_Tactic_In_2-1 = "Bem, já que vamos fazer, vamos fazer direito..."
10073-CVGroup_Tactic_Victory_1-1 = "Bom trabalho, Sensei..."
10073-CVGroup_Tactic_Victory_2-1 = "J-já podemos ir para casa, né...?"
