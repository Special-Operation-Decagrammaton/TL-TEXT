[translation]
10073-CVGroup_Battle_Buffed_1-1 = "た、助かりました……。"
10073-CVGroup_Battle_Covered_1-1 = "ここにします。"
10073-CVGroup_Battle_Defense_1-1 = "そんなの、通じませんよ。"
10073-CVGroup_Battle_In_1-1 = "はぁ……行きます……。"
10073-CVGroup_Battle_In_2-1 = "どうして……私が先頭に……？"
10073-CVGroup_Battle_Move_1-1 = "まだあるんですか。"
10073-CVGroup_Battle_Move_2-1 = "早く片付けましょう……。"
10073-CVGroup_Battle_Recovery_1-1 = "ありがとうございます。"
10073-CVGroup_Battle_TacticalAction_1-1 = "う、ううっ……！"
10073-CVGroup_Battle_Victory_1-1 = "ふぅ……やっと、終わりました。"
10073-CVGroup_Battle_Victory_2-1 = "はぁ……\nつ、疲れてるの……私だけですか……？"
10073-CVGroup_CommonSkill-1 = "ふむ……！なるほど。"
10073-CVGroup_ExSkill_1-1 = "もう、限界です……。"
10073-CVGroup_ExSkill_2-1 = "用意しておいて、正解でした。"
10073-CVGroup_ExSkill_3-1 = "少し、落ち着きました。"
10073-CVGroup_ExSkill_Level_1-1 = "の、飲みますか……？"
10073-CVGroup_ExSkill_Level_2-1 = "み、みなさんも、よろしければ……。"
10073-CVGroup_ExSkill_Level_3-1 = "ちゃんと、冷えてますよ……。"
10073-CVGroup_Formation_In_1-1 = "べ、別に、私が出なくても……。"
10073-CVGroup_Formation_In_2-1 = "分かりました……一応……。"
10073-CVGroup_Formation_Select-1 = "ひ、ひあああ！！\nせ、先生……！？"
10073-CVGroup_Growup_1-1 = "ふ、ふふ……\nまあ、たまにはこういう夏も、無しではありませんね……。"
10073-CVGroup_Growup_2-1 = "思ったより、悪くないですね、こういうのも……ひひ……。"
10073-CVGroup_Growup_3-1 = "ありがとうございます、先生。\nお役に立てるように……やってみます……。"
10073-CVGroup_Growup_4-1 = "……この感覚……なるほど、理解しました。"
10073-CVGroup_Relationship_Up_1-1 = "あ、ありがとうございます、先生……。\nその……お礼に、アメリカーノでも、淹れましょうか……？"
10073-CVGroup_Relationship_Up_2-1 = "先生と一緒なら、苦手なことも、\nなんとか、できそうな気がします……。"
10073-CVGroup_Relationship_Up_3-1 = "私にこんなことをお願いできるのは、先生だけ、ですので……。"
10073-CVGroup_Relationship_Up_4-1 = "こ、今度……。\nお時間ができましたら……\nその、私を……呼んでください。"
10073-CVGroup_Tactic_In_1-1 = "先は長いですね……。"
10073-CVGroup_Tactic_In_2-1 = "まあ、やるからにはちゃんと真面目に……。"
10073-CVGroup_Tactic_Victory_1-1 = "お疲れ様でした、先生……。"
10073-CVGroup_Tactic_Victory_2-1 = "も、もう、帰っていいですよね……？"
