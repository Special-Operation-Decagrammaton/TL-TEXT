[translation]
10127-CVGroup_Battle_Buffed_1-1 = "わ、私にですか……！？"
10127-CVGroup_Battle_Covered_1-1 = "も、もう動きたくありません……。"
10127-CVGroup_Battle_Defense_1-1 = "き、効きませんよ……！"
10127-CVGroup_Battle_In_1-1 = "へ、平和的解決はできないんですか……？"
10127-CVGroup_Battle_In_2-1 = "仕方がない、んですね……。"
10127-CVGroup_Battle_Move_1-1 = "ま、待ってください！"
10127-CVGroup_Battle_Move_2-1 = "まだあるんですか……？"
10127-CVGroup_Battle_Recovery_1-1 = "あ、ありがとうございます……！"
10127-CVGroup_Battle_TacticalAction_1-1 = "よっ、と……！"
10127-CVGroup_Battle_Victory_1-1 = "ふぅ……片づきましたね。"
10127-CVGroup_Battle_Victory_2-1 = "皆さん、お疲れ様でした。"
10127-CVGroup_CommonSkill-1 = "わぁ……！ふふふっ……。"
10127-CVGroup_ExSkill_1-1 = "うう……こんなお話を書きたかったわけじゃないのに……。"
10127-CVGroup_ExSkill_2-1 = "これは……ちょっと。"
10127-CVGroup_ExSkill_3-1 = "もう二度と書きません……。"
10127-CVGroup_ExSkill_Level_1-1 = "落とさずにすみそうです……。"
10127-CVGroup_ExSkill_Level_2-1 = "こ、こちら初稿です……！"
10127-CVGroup_ExSkill_Level_3-1 = "締切は……守りましたよ。"
10127-CVGroup_Formation_In_1-1 = "や、やらなきゃいけませんよね……？"
10127-CVGroup_Formation_In_2-1 = "け、ケンカは良くないです……。"
10127-CVGroup_Formation_Select-1 = "私と二人で、ですか？……いいですよ。"
10127-CVGroup_Growup_1-1 = "ど、どちらで調達してきたんですか……？"
10127-CVGroup_Growup_2-1 = "これは合法のもの……ですよね？"
10127-CVGroup_Growup_3-1 = "物語を畳むのには、力が必要です……\nありがとうございます、先生。"
10127-CVGroup_Growup_4-1 = "先生のおかげで……\nもっと、自分を好きになれそうです。"
10127-CVGroup_Relationship_Up_1-1 = "そ、そんな……申し訳ないです……ありがとうございます。"
10127-CVGroup_Relationship_Up_2-1 = "その……先生のお名前を……\n私の小説に出してもいいですか？"
10127-CVGroup_Relationship_Up_3-1 = "先生……お待ちしていました。\nその……お会いしたかったです。"
10127-CVGroup_Relationship_Up_4-1 = "先生といると、幸せな物語の中にいるような気分になるんです。\nどうか、このお話が……ずっと続きますように……。"
10127-CVGroup_Tactic_In_1-1 = "げ、原稿に戻りたいです……。"
10127-CVGroup_Tactic_In_2-1 = "ど、どうしてこんな無意味なことを……。"
10127-CVGroup_Tactic_Victory_1-1 = "……勝って、しまいました。"
10127-CVGroup_Tactic_Victory_2-1 = "ええと、作戦通り……ですね……。"
