[translation]
10127-CVGroup_Battle_Buffed_1-1 = "P-para mim...?"
10127-CVGroup_Battle_Covered_1-1 = "E-eu não quero mais me mover..."
10127-CVGroup_Battle_Defense_1-1 = "I-isso não funciona em mim...!"
10127-CVGroup_Battle_In_1-1 = "N-não podemos resolver isso pacificamente...?"
10127-CVGroup_Battle_In_2-1 = "Não tem outro jeito, né...?"
10127-CVGroup_Battle_Move_1-1 = "E-espere um pouco!"
10127-CVGroup_Battle_Move_2-1 = "Ainda tem mais...?"
10127-CVGroup_Battle_Recovery_1-1 = "M-muito obrigada...!"
10127-CVGroup_Battle_TacticalAction_1-1 = "Opa...!"
10127-CVGroup_Battle_Victory_1-1 = "Ufa... terminamos por aqui."
10127-CVGroup_Battle_Victory_2-1 = "Pessoal, bom trabalho a todos."
10127-CVGroup_CommonSkill-1 = "Uau...! Hehehe..."
10127-CVGroup_ExSkill_1-1 = "Uuu... eu não queria escrever uma história assim..."
10127-CVGroup_ExSkill_2-1 = "Isso é... um pouco demais."
10127-CVGroup_ExSkill_3-1 = "Eu nunca mais vou escrever isso..."
10127-CVGroup_ExSkill_Level_1-1 = "Parece que não vou deixar cair..."
10127-CVGroup_ExSkill_Level_2-1 = "A-aqui está o primeiro rascunho...!"
10127-CVGroup_ExSkill_Level_3-1 = "Eu... cumpri o prazo."
10127-CVGroup_Formation_In_1-1 = "E-eu tenho que fazer isso, né...?"
10127-CVGroup_Formation_In_2-1 = "B-brigar não é bom..."
10127-CVGroup_Formation_Select-1 = "Comigo, a sós...? ...Tudo bem."
10127-CVGroup_Growup_1-1 = "O-onde você conseguiu isso...?"
10127-CVGroup_Growup_2-1 = "Isso é algo legal... né?"
10127-CVGroup_Growup_3-1 = "É preciso força para encerrar uma história...\nObrigada, Sensei."
10127-CVGroup_Growup_4-1 = "Graças ao Sensei...\nSinto que posso gostar mais de mim mesma."
10127-CVGroup_Relationship_Up_1-1 = "N-não precisa... sinto muito... muito obrigada."
10127-CVGroup_Relationship_Up_2-1 = "Bem... Sensei, eu poderia...\ncolocar seu nome no meu romance?"
10127-CVGroup_Relationship_Up_3-1 = "Sensei... eu estava esperando.\nBem... eu queria te ver."
10127-CVGroup_Relationship_Up_4-1 = "Quando estou com o Sensei, sinto como se estivesse dentro de uma história feliz.\nPor favor, que essa história... dure para sempre..."
10127-CVGroup_Tactic_In_1-1 = "E-eu quero voltar para o meu manuscrito..."
10127-CVGroup_Tactic_In_2-1 = "P-por que temos que fazer algo tão sem sentido..."
10127-CVGroup_Tactic_Victory_1-1 = "...Nós vencemos."
10127-CVGroup_Tactic_Victory_2-1 = "Bem, foi conforme o plano... né...?"
