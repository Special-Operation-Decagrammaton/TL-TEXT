[translation]
10063-CVGroup_Battle_Buffed_1-1 = "はっ、私にくれるんですか！？"
10063-CVGroup_Battle_Defense_1-1 = "にははは！させませんよ～だ！"
10063-CVGroup_Battle_In_1-1 = "今は、私が！隊長なんだから！！"
10063-CVGroup_Battle_In_2-1 = "ぐずぐずしてるヒマはないです！"
10063-CVGroup_Battle_Move_1-1 = "追い込めー！"
10063-CVGroup_Battle_Move_2-1 = "このままいきますよ！！"
10063-CVGroup_Battle_Recovery_1-1 = "ありがとうございますっ！"
10063-CVGroup_Battle_TacticalAction_1-1 = "はっちゃー！"
10063-CVGroup_Battle_Victory_1-1 = "楽勝楽勝～！バーン！"
10063-CVGroup_Battle_Victory_2-1 = "ちょろいちょろい！バーン！"
10063-CVGroup_CommonSkill-1 = "にははははー！！"
10063-CVGroup_ExSkill_1-1 = "ど・れ・に・し・よ・う……うええっ！？"
10063-CVGroup_ExSkill_2-1 = "こういう状況なら……うああっ！？"
10063-CVGroup_ExSkill_3-1 = "こんな時のために……うわっ！？"
10063-CVGroup_ExSkill_Level_1-1 = "ま……これでいいですよね？"
10063-CVGroup_ExSkill_Level_2-1 = "結果良ければすべてオッケー！……ってね？"
10063-CVGroup_ExSkill_Level_3-1 = "これぞ醍醐味……ってやつ？"
10063-CVGroup_Formation_In_1-1 = "やってみよ～！"
10063-CVGroup_Formation_In_2-1 = "面白いこと、起きますように！"
10063-CVGroup_Formation_Select-1 = "うわぁあああ！？"
10063-CVGroup_Growup_1-1 = "えっ？私に？……本当ですか？\n渡す人を間違えたとかじゃなくて？"
10063-CVGroup_Growup_2-1 = "にははは……！大きな力だあ……！\nえ？大いなる責任？\nなんですかそれ？"
10063-CVGroup_Growup_3-1 = "誰にも私は止められなーい！\n……先生は除く！先輩たちも除く！"
10063-CVGroup_Growup_4-1 = "あ、これはちょっと……いくらなんでもさすがに……\nいや、むしろ良いのかも？\nにはっ……こんなにしてもらっちゃっていいんですか～？"
10063-CVGroup_Relationship_Up_1-1 = "ええっ！？なんですか！？\nプレゼント！？私に！？先生から！？"
10063-CVGroup_Relationship_Up_2-1 = "プレゼント、誠にありがとうございますっ！\n大人相手には礼儀正しく、ねっ！"
10063-CVGroup_Relationship_Up_3-1 = "私今日、なんかしましたっけ……？"
10063-CVGroup_Relationship_Up_4-1 = "ありがとうございます……\n大切にします……本当に。"
10063-CVGroup_Tactic_In_1-1 = "げっ！？\nちょっと多くないですか！？"
10063-CVGroup_Tactic_In_2-1 = "んと……これ全部やるんですか？"
10063-CVGroup_Tactic_Victory_1-1 = "私を呼んだ甲斐、あったでしょ～？"
10063-CVGroup_Tactic_Victory_2-1 = "次も呼んでくださいね～？"
