[translation]
10063-CVGroup_Battle_Buffed_1-1 = "Ah, é para mim!?"
10063-CVGroup_Battle_Defense_1-1 = "Ni-hahaha! Nem pense nisso!"
10063-CVGroup_Battle_In_1-1 = "Agora, eu sou a capitã!"
10063-CVGroup_Battle_In_2-1 = "Não temos tempo a perder!"
10063-CVGroup_Battle_Move_1-1 = "Encurralem eles!"
10063-CVGroup_Battle_Move_2-1 = "Vamos seguir assim mesmo!"
10063-CVGroup_Battle_Recovery_1-1 = "Muito obrigada!"
10063-CVGroup_Battle_TacticalAction_1-1 = "Toma essa!"
10063-CVGroup_Battle_Victory_1-1 = "Vitória fácil, fácil! Bang!"
10063-CVGroup_Battle_Victory_2-1 = "Moleza, moleza! Bang!"
10063-CVGroup_CommonSkill-1 = "Ni-hahahaha!!"
10063-CVGroup_ExSkill_1-1 = "Qual... eu... escolho... Ué!?"
10063-CVGroup_ExSkill_2-1 = "Nessa situação... Uaaah!?"
10063-CVGroup_ExSkill_3-1 = "Para momentos como este... Ué!?"
10063-CVGroup_ExSkill_Level_1-1 = "Bem... isso serve, né?"
10063-CVGroup_ExSkill_Level_2-1 = "Se o resultado é bom, tudo está bem! ...né?"
10063-CVGroup_ExSkill_Level_3-1 = "Isso é o que chamam de... o melhor da experiência?"
10063-CVGroup_Formation_In_1-1 = "Vamos tentar!"
10063-CVGroup_Formation_In_2-1 = "Espero que algo interessante aconteça!"
10063-CVGroup_Formation_Select-1 = "Uwaaaaa!?"
10063-CVGroup_Growup_1-1 = "Hã? Para mim? ...É sério?\nNão é que você entregou para a pessoa errada?"
10063-CVGroup_Growup_2-1 = "Ni-hahaha...! Que grande poder...!\nHã? Grande responsabilidade?\nO que é isso?"
10063-CVGroup_Growup_3-1 = "Ninguém pode me parar!\n...Exceto o Sensei! E os veteranos também!"
10063-CVGroup_Growup_4-1 = "Ah, isso é um pouco... por mais que eu tente...\nNão, talvez seja bom, na verdade?\nNi-ha... posso mesmo aceitar tudo isso?"
10063-CVGroup_Relationship_Up_1-1 = "Eeeh!? O que é isso!?\nUm presente!? Para mim!? Do Sensei!?"
10063-CVGroup_Relationship_Up_2-1 = "Muito obrigada pelo presente!\nTenho que ser educada com os adultos, né!"
10063-CVGroup_Relationship_Up_3-1 = "Eu fiz alguma coisa hoje...?"
10063-CVGroup_Relationship_Up_4-1 = "Muito obrigada...\nVou guardar com carinho... de verdade."
10063-CVGroup_Tactic_In_1-1 = "Eita!?\nNão tem gente demais aqui não!?"
10063-CVGroup_Tactic_In_2-1 = "Hum... tenho que fazer tudo isso?"
10063-CVGroup_Tactic_Victory_1-1 = "Valer a pena me chamar, não valeu?"
10063-CVGroup_Tactic_Victory_2-1 = "Me chame de novo, tá?"
