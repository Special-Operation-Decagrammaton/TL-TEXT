[translation]
20027-CVGroup_CommonSkill-1 = "ん、コレ要らない。"
20027-CVGroup_ExSkill_1-1 = "……！！んっ。"
20027-CVGroup_ExSkill_2-1 = "……！来た。"
20027-CVGroup_ExSkill_3-1 = "今！"
20027-CVGroup_ExSkill_Level_1-1 = "大物だ。"
20027-CVGroup_ExSkill_Level_2-1 = "逃がさない。"
20027-CVGroup_ExSkill_Level_3-1 = "狙いは正確"
20027-CVGroup_Formation_In_1-1 = "なんと、ここに釣りの道具が。"
20027-CVGroup_Formation_In_2-1 = "ん、準備完了。"
20027-CVGroup_Growup_1-1 = "釣りは道具が命。\nありがとう、先生。"
20027-CVGroup_Growup_2-1 = "これなら……もっと大きいのが釣れるかも。"
20027-CVGroup_Growup_3-1 = "お返しに……大物を釣ってくるね。\n期待してて。"
20027-CVGroup_Growup_4-1 = "よし、今すぐ出発しよう。"
20027-CVGroup_Relationship_Up_1-1 = "またこんな……\nいや、ありがとう、先生。"
20027-CVGroup_Relationship_Up_2-1 = "ありがとう、先生。\nところで、食べたい海産物とか、ある？"
20027-CVGroup_Relationship_Up_3-1 = "先生のためなら……\n何でも獲ってくるよ。"
20027-CVGroup_Relationship_Up_4-1 = "楽しいかって……？\nうん……すごく。"
