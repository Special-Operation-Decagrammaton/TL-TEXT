[translation]
20003-CVGroup_CommonSkill-1 = "Apenas mais um."
20003-CVGroup_ExSkill_1-1 = "Munição carregada, mira ajustada.\nIniciando disparo."
20003-CVGroup_ExSkill_2-1 = "Alvo confirmado. Eliminando."
20003-CVGroup_ExSkill_3-1 = "Alvo capturado... a distância é suficiente."
20003-CVGroup_ExSkill_Level_1-1 = "Fogo."
20003-CVGroup_ExSkill_Level_2-1 = "Acerto."
20003-CVGroup_ExSkill_Level_3-1 = "Alvo atingido."
20003-CVGroup_Formation_In_1-1 = "Farei o meu melhor."
20003-CVGroup_Formation_In_2-1 = "Irei corresponder às suas expectativas."
20003-CVGroup_Growup_1-1 = "Agradeço pelo apoio."
20003-CVGroup_Growup_2-1 = "Sinto um poder imenso."
20003-CVGroup_Growup_3-1 = "Ufa... meu espírito de luta está em chamas."
20003-CVGroup_Growup_4-1 = "Darei o meu melhor pela justiça."
20003-CVGroup_Relationship_Up_1-1 = "A justiça que o Sensei possui é...\ncom certeza uma justiça muito admirável."
20003-CVGroup_Relationship_Up_2-1 = "Se o Sensei cometesse um ato maligno, nesse caso...\nNão, isso é impossível.\nPorque o Sensei é a própria justiça."
20003-CVGroup_Relationship_Up_3-1 = "O tempo que passo com o Sensei,\nsempre parece passar rápido demais..."
20003-CVGroup_Relationship_Up_4-1 = "Eu gosto de você, de verdade...\nQ-quero dizer, sobre a justiça, é claro!"
