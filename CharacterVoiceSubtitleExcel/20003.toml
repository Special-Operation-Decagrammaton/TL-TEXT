[translation]
20003-CVGroup_CommonSkill-1 = "残り一人。"
20003-CVGroup_ExSkill_1-1 = "弾丸装填、照準よし。\n射撃開始。"
20003-CVGroup_ExSkill_2-1 = "目標を確認。排除します。"
20003-CVGroup_ExSkill_3-1 = "ターゲット捕捉……距離は十分です。"
20003-CVGroup_ExSkill_Level_1-1 = "ファイアー。"
20003-CVGroup_ExSkill_Level_2-1 = "命中です。"
20003-CVGroup_ExSkill_Level_3-1 = "ヒット。"
20003-CVGroup_Formation_In_1-1 = "ベストを尽くします。"
20003-CVGroup_Formation_In_2-1 = "ご期待に応えてみせます。"
20003-CVGroup_Growup_1-1 = "支援、感謝します。"
20003-CVGroup_Growup_2-1 = "強大な力が感じられますね。"
20003-CVGroup_Growup_3-1 = "ふう……戦意が燃え上がります。"
20003-CVGroup_Growup_4-1 = "正義のために頑張ります。"
20003-CVGroup_Relationship_Up_1-1 = "先生の持つ正義は……\nきっとカッコいい正義なのでしょう。"
20003-CVGroup_Relationship_Up_2-1 = "もしも先生が悪の行いをしたらその時は……。\nいや、そんなはずありません。\n先生は正義そのものですから。"
20003-CVGroup_Relationship_Up_3-1 = "先生と一緒に過ごす時間は、\nなんだかいつも短く感じます……。"
20003-CVGroup_Relationship_Up_4-1 = "好きです、本当に……\nも、もちろん正義のことです！"
