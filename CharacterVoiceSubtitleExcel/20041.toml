[translation]
20041-CVGroup_CommonSkill-1 = "AMAS, cuide disso para mim."
20041-CVGroup_ExSkill_1-1 = "Eu vejo tudo."
20041-CVGroup_ExSkill_2-1 = "Não existem exceções. Você também não é uma."
20041-CVGroup_ExSkill_3-1 = "Acha mesmo que existe um ponto cego?"
20041-CVGroup_ExSkill_Level_1-1 = "É disso que você precisa, não é?"
20041-CVGroup_ExSkill_Level_2-1 = "Este é o seu potencial."
20041-CVGroup_ExSkill_Level_3-1 = "Aceite."
20041-CVGroup_Formation_In_1-1 = "Vou lhe mostrar a solução racional."
20041-CVGroup_Formation_In_2-1 = "Em qualquer situação, faça a escolha correta."
20041-CVGroup_Formation_Select-1 = "Ah!?\n……Obrigada pela ajuda."
20041-CVGroup_Growup_1-1 = "Você cresceu.\n……Ainda precisa de algo?"
20041-CVGroup_Growup_2-1 = "Alocar recursos para quem tem potencial de crescimento……\nUma escolha racional, Sensei."
20041-CVGroup_Growup_3-1 = "Entendo, você tem expectativas sobre mim.\nDeixe comigo. Vou provar com resultados."
20041-CVGroup_Growup_4-1 = "Sobre isso…… eu agradeço, Sensei.\n……Embora eu não saiba se essa é a palavra correta a se usar."
20041-CVGroup_Relationship_Up_1-1 = "Quando estou ao seu lado, meu pulso fica irregular……\nPor que será……?"
20041-CVGroup_Relationship_Up_2-1 = "Sensei…… não seria exagero dizer que você é a única variável que surgiu na minha vida.\n……Dito isso, suas palavras e ações sempre me deixam agitada."
20041-CVGroup_Relationship_Up_3-1 = "Falar sobre o \"futuro\" não tem sentido. Só existem elementos incertos.\nMesmo assim, quando olho para você……\nEu começo a pensar em várias possibilidades."
20041-CVGroup_Relationship_Up_4-1 = "Sensei?…… Só tentei chamar você como as outras alunas fazem.\n……É muito mais difícil colocar em palavras do que eu imaginava."
