[translation]
20041-CVGroup_CommonSkill-1 = "AMAS、ここを頼んだわ。"
20041-CVGroup_ExSkill_1-1 = "私は全てを見ているわ。"
20041-CVGroup_ExSkill_2-1 = "例外なんてないの。貴方もそう。"
20041-CVGroup_ExSkill_3-1 = "死角があるとでも？"
20041-CVGroup_ExSkill_Level_1-1 = "これが必要なのでしょう？"
20041-CVGroup_ExSkill_Level_2-1 = "これが、あなたの可能性よ。"
20041-CVGroup_ExSkill_Level_3-1 = "受け取って頂戴。"
20041-CVGroup_Formation_In_1-1 = "合理的な解をみせてあげる。"
20041-CVGroup_Formation_In_2-1 = "いかなる時でも、正しい選択を。"
20041-CVGroup_Formation_Select-1 = "ひゃあ！？\n……助かったわ。"
20041-CVGroup_Growup_1-1 = "成長したのね。\n……まだ何か？"
20041-CVGroup_Growup_2-1 = "成長の余地がある者にリソースを割く……\n合理的な選択ね、先生。"
20041-CVGroup_Growup_3-1 = "そう、期待しているのね。\n任せなさい。結果で証明するわ。"
20041-CVGroup_Growup_4-1 = "その……感謝するわ、先生。\n……この言葉が正しいのかは、分からないのだけれど。"
20041-CVGroup_Relationship_Up_1-1 = "貴方の隣にいると、脈が不規則になってしまうのだけれど……\nどうしてかしら……。"
20041-CVGroup_Relationship_Up_2-1 = "先生は……私の人生に現れた唯一の変数といっても過言ではないわ。\n……とはいえ、貴方の言動には動揺してばかりね。"
20041-CVGroup_Relationship_Up_3-1 = "「未来」を語っても、意味はない。不確定要素しかないもの。\nだというのに、貴方を見ていると……\n様々な可能性を、考えてしまう。"
20041-CVGroup_Relationship_Up_4-1 = "先生？……他の生徒を真似て呼んでみただけよ。\n……想像の何倍も、言葉にするのは難しいわね、これ。"
