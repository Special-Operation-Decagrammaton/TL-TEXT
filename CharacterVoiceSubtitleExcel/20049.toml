[translation]
20049-CVGroup_CommonSkill-1 = "こ、これは一応持ってきただけで……！"
20049-CVGroup_ExSkill_1-1 = "ふう……。\nあっ！\nよかった……。"
20049-CVGroup_ExSkill_2-1 = "これでよし……。\nっ！？\nふぅ……。"
20049-CVGroup_ExSkill_3-1 = "できた……。\nだめっ！\n無事だね……。"
20049-CVGroup_ExSkill_Level_1-1 = "水遊びの時間。"
20049-CVGroup_ExSkill_Level_2-1 = "水鉄砲、発射。"
20049-CVGroup_ExSkill_Level_3-1 = "溺れて。"
20049-CVGroup_Formation_In_1-1 = "海……あんまり楽しくない。"
20049-CVGroup_Formation_In_2-1 = "はぁ……責任取ってくれるんだよね？"
20049-CVGroup_Formation_Select-1 = "分かった……遊べばいいんでしょ？"
20049-CVGroup_Growup_1-1 = "別に楽しんでるわけじゃないよ。\n先生が連れてきたんだから、責任とって楽しませてよね。"
20049-CVGroup_Growup_2-1 = "私をこんな風にしたのは先生でしょ。\n……ちゃんと最後まで面倒みて。"
20049-CVGroup_Growup_3-1 = "こういうのも悪くないかな……。\n……嘘、忘れて。"
20049-CVGroup_Growup_4-1 = "何じろじろ見てるの……？\nだから楽しんでないって。"
20049-CVGroup_Relationship_Up_1-1 = "見ないで。\nいや、照れてるわけじゃないから……！"
20049-CVGroup_Relationship_Up_2-1 = "わかったよ……もう。\nこういうのも、悪くないね……はい、言ったよ。"
20049-CVGroup_Relationship_Up_3-1 = "明日が……本当に、こんな風に悪いものじゃないって言うなら……\nこれからも、証明し続けて。"
20049-CVGroup_Relationship_Up_4-1 = "私をこんな風にしたのに……。\n責任取るつもりなんて、ないんでしょ。\n……「できることはなんでもやる」？\nじ、自分が何言ってるかわかってるの！？"
