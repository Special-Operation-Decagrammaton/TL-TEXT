[translation]
20049-CVGroup_CommonSkill-1 = "I-Isso aqui é só algo que eu trouxe por precaução...!"
20049-CVGroup_ExSkill_1-1 = "Ufa...\nAh!\nQue bom..."
20049-CVGroup_ExSkill_2-1 = "Pronto, assim está bom...\n!?\nUfa..."
20049-CVGroup_ExSkill_3-1 = "Consegui...\nNão pode!\nEstá tudo bem, né..."
20049-CVGroup_ExSkill_Level_1-1 = "Hora de brincar na água."
20049-CVGroup_ExSkill_Level_2-1 = "Arma d'água, disparar."
20049-CVGroup_ExSkill_Level_3-1 = "Afogue-se."
20049-CVGroup_Formation_In_1-1 = "O mar... não é muito divertido."
20049-CVGroup_Formation_In_2-1 = "Haa... você vai assumir a responsabilidade, né?"
20049-CVGroup_Formation_Select-1 = "Entendi... é só brincar, né?"
20049-CVGroup_Growup_1-1 = "Não é como se eu estivesse me divertindo.\nJá que foi o Sensei quem me trouxe, assuma a responsabilidade e me faça divertir."
20049-CVGroup_Growup_2-1 = "Foi o Sensei quem me deixou assim, né?\n...Cuide de mim até o fim."
20049-CVGroup_Growup_3-1 = "Talvez isso não seja tão ruim assim...\n...Mentira, esquece o que eu disse."
20049-CVGroup_Growup_4-1 = "Por que está me encarando desse jeito...?\nEu já disse que não estou me divertindo."
20049-CVGroup_Relationship_Up_1-1 = "Não olhe.\nNão, não é que eu esteja envergonhada...!"
20049-CVGroup_Relationship_Up_2-1 = "Tá bom, tá bom...\nIsso não é tão ruim assim... pronto, eu disse."
20049-CVGroup_Relationship_Up_3-1 = "Se você diz que o amanhã... realmente não é algo tão ruim assim...\nEntão continue provando isso para mim."
20049-CVGroup_Relationship_Up_4-1 = "Você me deixou assim...\nE não tem a menor intenção de assumir a responsabilidade, né?\n...\"Farei tudo o que estiver ao meu alcance\"?\nS-Sabe pelo menos o que está dizendo!?"
