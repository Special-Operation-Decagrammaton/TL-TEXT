[translation]
20013-CVGroup_CommonSkill-1 = "セキュリティ上の弱点、修復するね。"
20013-CVGroup_ExSkill_1-1 = "こういうクラッキングは好みじゃないけど……。"
20013-CVGroup_ExSkill_2-1 = "可愛い後輩たちのためなら、仕方ない。"
20013-CVGroup_ExSkill_3-1 = "……はぁ。こういうのは今回だけだよ。"
20013-CVGroup_ExSkill_Level_1-1 = "もう少しセキュリティ意識を持った方が良い。"
20013-CVGroup_ExSkill_Level_2-1 = "……うん、全部見えた。"
20013-CVGroup_ExSkill_Level_3-1 = "……BOOM！"
20013-CVGroup_Formation_In_1-1 = "……ん？新しいセキュリティホールでも見つかった？"
20013-CVGroup_Formation_In_2-1 = "了解、すぐに行く。"
20013-CVGroup_Formation_Select-1 = "ふぁ……っ、先生、コーヒー飲まない……？"
20013-CVGroup_Growup_1-1 = "うん、やっぱり学びに限界は存在しないものだ。"
20013-CVGroup_Growup_2-1 = "先生がくれる知識は、いつも目新しいものばかりだね。"
20013-CVGroup_Growup_3-1 = "ありがとう、先生。\nまた少し賢くなれた。"
20013-CVGroup_Growup_4-1 = "へぇ……良いデータだね。"
20013-CVGroup_Relationship_Up_1-1 = "先生に対してハッキングとかはしたくないから……\n思ってることは、素直に教えてほしい。"
20013-CVGroup_Relationship_Up_2-1 = "私はいつもここから、先生のことを支援してるから。"
20013-CVGroup_Relationship_Up_3-1 = "先生みたいに甘っちょろいのは、どうにも放っておけなくて……\n……あくまでセキュリティ的な話。"
20013-CVGroup_Relationship_Up_4-1 = "先生、その……\n今夜、深夜のセキュリティ点検に行っても良い？"
