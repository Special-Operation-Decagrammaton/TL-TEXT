[translation]
20013-CVGroup_CommonSkill-1 = "Vou corrigir as falhas de segurança."
20013-CVGroup_ExSkill_1-1 = "Eu não gosto desse tipo de invasão, mas..."
20013-CVGroup_ExSkill_2-1 = "Pelas minhas adoráveis kouhais, não tenho escolha."
20013-CVGroup_ExSkill_3-1 = "...Haa. Isso só vai acontecer desta vez."
20013-CVGroup_ExSkill_Level_1-1 = "Vocês deveriam ter um pouco mais de consciência sobre segurança."
20013-CVGroup_ExSkill_Level_2-1 = "...Sim, vi tudo."
20013-CVGroup_ExSkill_Level_3-1 = "...BOOM!"
20013-CVGroup_Formation_In_1-1 = "...Hm? Encontrou alguma nova falha de segurança?"
20013-CVGroup_Formation_In_2-1 = "Entendido, estou indo."
20013-CVGroup_Formation_Select-1 = "Ah... Sensei, não quer tomar um café...?"
20013-CVGroup_Growup_1-1 = "Sim, como esperado, não existem limites para o aprendizado."
20013-CVGroup_Growup_2-1 = "O conhecimento que você me dá, Sensei, é sempre algo novo."
20013-CVGroup_Growup_3-1 = "Obrigada, Sensei.\nFiquei um pouco mais inteligente novamente."
20013-CVGroup_Growup_4-1 = "Heh... Bons dados."
20013-CVGroup_Relationship_Up_1-1 = "Eu não quero hackear você, Sensei, então...\nPor favor, me diga o que pensa honestamente."
20013-CVGroup_Relationship_Up_2-1 = "Eu sempre estarei aqui, dando suporte a você, Sensei."
20013-CVGroup_Relationship_Up_3-1 = "Eu simplesmente não consigo ignorar alguém tão ingênuo quanto você, Sensei...\n...Isso é puramente uma questão de segurança, claro."
20013-CVGroup_Relationship_Up_4-1 = "Sensei, sobre isso...\nPosso ir fazer uma verificação de segurança tarde da noite hoje?"
