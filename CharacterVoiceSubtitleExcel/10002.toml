[translation]
10002-CVGroup_Battle_Buffed_1-1 = "あら、ありがとうございます。"
10002-CVGroup_Battle_Covered_1-1 = "ごめんあそばせ。"
10002-CVGroup_Battle_Defense_1-1 = "ふふ、無駄ですわ。"
10002-CVGroup_Battle_In_1-1 = "皆様、ご健闘をお祈りいたしますわ。"
10002-CVGroup_Battle_In_2-1 = "あらまあ、お出ましですわね。\n盛大にお出迎えしてさしあげましょう。"
10002-CVGroup_Battle_Move_1-1 = "参りますわよ｡"
10002-CVGroup_Battle_Move_2-1 = "前進致しますわ。"
10002-CVGroup_Battle_Recovery_1-1 = "恐縮ですわ……！"
10002-CVGroup_Battle_TacticalAction_1-1 = "ふうん｡"
10002-CVGroup_Battle_Victory_1-1 = "うううう～ん、\nこのお味、たまりませんわ！"
10002-CVGroup_Battle_Victory_2-1 = "おおお～\n勝利後のたい焼きは格別ですわね！"
10002-CVGroup_CommonSkill-1 = "そちらですの？"
10002-CVGroup_ExSkill_1-1 = "うふふっ、参ります！"
10002-CVGroup_ExSkill_2-1 = "優雅に参りましょうか？"
10002-CVGroup_ExSkill_3-1 = "さあ、準備はよろしくって？"
10002-CVGroup_ExSkill_Level_1-1 = "お覚悟は出来ていらっしゃるのかしら？"
10002-CVGroup_ExSkill_Level_2-1 = "スコヴィル値1000万級の激辛ですわ！"
10002-CVGroup_ExSkill_Level_3-1 = "突き抜ける優雅さで！"
10002-CVGroup_Formation_In_1-1 = "私の出番ですわね。"
10002-CVGroup_Formation_In_2-1 = "よろしくってよ、お任せください。"
10002-CVGroup_Formation_Select-1 = "うふふっ｡"
10002-CVGroup_Growup_1-1 = "あら、これは新しいお味ですわね。"
10002-CVGroup_Growup_2-1 = "あら、私のためにここまでしてくださるなんて……。"
10002-CVGroup_Growup_3-1 = "たまには、こういうのも悪くありませんわね。\n先生、私の成長、きちんと見守っていてくださいね。"
10002-CVGroup_Growup_4-1 = "うふふっ、感謝いたしますわ。"
10002-CVGroup_Relationship_Up_1-1 = "もう少し、一緒にいていただきたいです。"
10002-CVGroup_Relationship_Up_2-1 = "美味いしいものを頂きたいですわね、\nできれば、ご一緒に。"
10002-CVGroup_Relationship_Up_3-1 = "先生と一緒でしたら、夢に見た至高の味を……\n見つけられるかもしれませんわね。"
10002-CVGroup_Relationship_Up_4-1 = "先生とのお食事は、いつも特別ですの。\n味とは関係なく、ですわ。"
10002-CVGroup_Tactic_In_1-1 = "少しだけはしゃいでみましょうか？"
10002-CVGroup_Tactic_In_2-1 = "お相手してさしあげますわ。"
10002-CVGroup_Tactic_Victory_1-1 = "うふふ……\n祝勝のパーティーを開こうと思うのですが、ご一緒にしませんこと？"
10002-CVGroup_Tactic_Victory_2-1 = "あら、勝利ですわね。うふふ。"
