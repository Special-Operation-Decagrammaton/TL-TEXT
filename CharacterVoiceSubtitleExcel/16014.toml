16014-CVGroup_Relationship_Up_3-1 = "Eu também quero ser uma adulta legal como o Sensei!"
16014-CVGroup_Relationship_Up_4-1 = "Eu estava pensando no Sensei!\nVocê também estava pensando em mim?\nEhehe, nossos corações estão conectados, né!"
16014-CVGroup_Tactic_In_1-1 = "Ibuki, lá vou eu!"
16014-CVGroup_Tactic_In_2-1 = "Vou me esforçar exatamente como você me ensinou!"
16014-CVGroup_Tactic_Victory_1-1 = "Olha só!\nEu venci~!"
