16014-CVGroup_Battle_Recovery_1-1 = "Ehehe, obrigada!"
16014-CVGroup_Battle_TacticalAction_1-1 = "Por aqui~"
16014-CVGroup_Battle_Victory_1-1 = "Ei, ei! Sensei, eu venci!"
16014-CVGroup_Battle_Victory_2-1 = "Vencemos! A Ibuki foi uma boa menina?"
16014-CVGroup_CommonSkill-1 = "Ah! É uma pessoa má!"
16014-CVGroup_ExSkill_1-1 = "Coisas que eu gosto, um monte delas~"
