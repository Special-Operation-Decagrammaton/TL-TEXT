16014-CVGroup_ExSkill_Level_1-1 = "Fui eu que desenhei isso!"
16014-CVGroup_ExSkill_Level_2-1 = "Vamos desenhar todo mundo junto!"
16014-CVGroup_ExSkill_Level_3-1 = "Usando esta cor~"
