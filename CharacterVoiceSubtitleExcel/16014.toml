16014-CVGroup_Growup_4-1 = "Obrigada, Sensei!\nToma! Vou te dar o meu pudim como agradecimento!"
16014-CVGroup_Relationship_Up_1-1 = "...Vou te contar um segredo da Ibuki...\nSabe, quando estou com o Sensei, eu me divirto muito!\nÉ um segredo só nosso, tá?"
