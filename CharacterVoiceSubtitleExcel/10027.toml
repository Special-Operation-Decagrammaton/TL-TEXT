[translation]
10027-CVGroup_Battle_Buffed_1-1 = "Isso ajuda, com isso...!"
10027-CVGroup_Battle_Covered_1-1 = "Encontrei uma cobertura."
10027-CVGroup_Battle_Defense_1-1 = "Se não me acertarem, não faz diferença."
10027-CVGroup_Battle_In_1-1 = "Não estou acostumada a ficar na linha de frente em vez de dar suporte de fogo, mas...\nEstá tudo bem, pode deixar comigo."
10027-CVGroup_Battle_In_2-1 = "Vou provar que não sirvo apenas para suporte de fogo.\nObserve, Sensei."
10027-CVGroup_Battle_Move_1-1 = "Iniciando movimento.\nSensei, dê as ordens."
10027-CVGroup_Battle_Move_2-1 = "Movendo-me para a próxima área."
10027-CVGroup_Battle_Recovery_1-1 = "Agradeço pelo suporte."
10027-CVGroup_Battle_TacticalAction_1-1 = "Para o próximo local."
10027-CVGroup_Battle_Victory_1-1 = "Operação concluída.\nBom trabalho, o comando do Sensei foi perfeito."
10027-CVGroup_Battle_Victory_2-1 = "Missão cumprida.\nIsso também foi graças ao comando do Sensei."
10027-CVGroup_CommonSkill-1 = "Vamos lá!"
10027-CVGroup_ExSkill_1-1 = "Nenhuma anormalidade por enquanto...\n...Ah! Alvo localizado!"
10027-CVGroup_ExSkill_2-1 = "Até agora...\n...Não, encontrei!"
10027-CVGroup_ExSkill_3-1 = "Alvo... capturado!"
10027-CVGroup_ExSkill_Level_1-1 = "Não vou deixar escapar!"
10027-CVGroup_ExSkill_Level_2-1 = "Hmph!"
10027-CVGroup_ExSkill_Level_3-1 = "Fogo!"
10027-CVGroup_Formation_In_1-1 = "Sim, acho que é uma boa escolha."
10027-CVGroup_Formation_In_2-1 = "Não vou deixar você se arrepender."
10027-CVGroup_Formation_Select-1 = "Entendo..."
10027-CVGroup_Growup_1-1 = "Obrigada, Sensei.\nNão vou deixar você se arrepender desta escolha."
10027-CVGroup_Growup_2-1 = "Vou retribuir suas expectativas com resultados."
10027-CVGroup_Growup_3-1 = "Incrível...\nCom isso, sinto que posso lutar muito, muito mais."
10027-CVGroup_Growup_4-1 = "Sempre sou ajudada pelo Sensei assim.\nCom certeza vou retribuir esse favor de alguma forma..."
10027-CVGroup_Relationship_Up_1-1 = "Esse sentimento é...\nAh, não... não é nada."
10027-CVGroup_Relationship_Up_2-1 = "Sempre sou grata ao Sensei.\nÉ verdade, não é bajulação."
10027-CVGroup_Relationship_Up_3-1 = "Não sou boa com palavras...\nMas, mesmo assim, tudo o que digo ao Sensei é a mais pura verdade."
10027-CVGroup_Relationship_Up_4-1 = "Eu queria retribuir de alguma forma...\nMas, por enquanto, tudo o que posso fazer é garantir o sucesso das operações..."
10027-CVGroup_Tactic_In_1-1 = "Iniciando a operação."
10027-CVGroup_Tactic_In_2-1 = "Sem problemas, vamos lá."
10027-CVGroup_Tactic_Victory_1-1 = "Não é nada surpreendente, é o resultado esperado."
10027-CVGroup_Tactic_Victory_2-1 = "Bom trabalho, Sensei. Como esperado do seu comando."
