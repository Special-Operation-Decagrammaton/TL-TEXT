[translation]
10027-CVGroup_Battle_Buffed_1-1 = "助かる、これで……！"
10027-CVGroup_Battle_Covered_1-1 = "遮蔽物を発見。"
10027-CVGroup_Battle_Defense_1-1 = "当たらなければ、意味は無いっ。"
10027-CVGroup_Battle_In_1-1 = "火力支援じゃなくて、前線に立つのはまだ少し不慣れだけど……\n大丈夫、任せて。"
10027-CVGroup_Battle_In_2-1 = "火力支援だけが能じゃないって、証明してみせる。\n見てて、先生。"
10027-CVGroup_Battle_Move_1-1 = "移動を開始する。\n先生、指示を。"
10027-CVGroup_Battle_Move_2-1 = "次の区域に移動する。"
10027-CVGroup_Battle_Recovery_1-1 = "支援に感謝する。"
10027-CVGroup_Battle_TacticalAction_1-1 = "次の場所へ。"
10027-CVGroup_Battle_Victory_1-1 = "作戦成功。\nお疲れ様、先生の指揮も完璧だった。"
10027-CVGroup_Battle_Victory_2-1 = "ミッションコンプリート。\nこれも先生の指揮のおかげだ。"
10027-CVGroup_CommonSkill-1 = "行くぞ！"
10027-CVGroup_ExSkill_1-1 = "特に異変は……\n……っ！目標発見！"
10027-CVGroup_ExSkill_2-1 = "今のところは……\n……いや、見つけた！"
10027-CVGroup_ExSkill_3-1 = "目標……捉えた！"
10027-CVGroup_ExSkill_Level_1-1 = "逃さない！"
10027-CVGroup_ExSkill_Level_2-1 = "ふっ！"
10027-CVGroup_ExSkill_Level_3-1 = "ファイア！"
10027-CVGroup_Formation_In_1-1 = "うん、良い選択だと思う。"
10027-CVGroup_Formation_In_2-1 = "後悔はさせない。"
10027-CVGroup_Formation_Select-1 = "なるほど……。"
10027-CVGroup_Growup_1-1 = "ありがとう、先生。\nこの選択、後悔はさせないから。"
10027-CVGroup_Growup_2-1 = "期待には、結果で応えてみせる。"
10027-CVGroup_Growup_3-1 = "すごいな……。\nこれで、もっともっと戦えそうだ。"
10027-CVGroup_Growup_4-1 = "先生には、いつもこうして助けられてばっかりだ。\nこの恩は、何かの形で必ず……。"
10027-CVGroup_Relationship_Up_1-1 = "この気持ちは……。\nあ、いや……何でもない。"
10027-CVGroup_Relationship_Up_2-1 = "先生には、いつも感謝してる。\n本当だ、お世辞じゃない。"
10027-CVGroup_Relationship_Up_3-1 = "私は、言葉にするのが上手じゃないけど……\nそれでも、こうして先生に対して言ってるのは、全部本当のことだ。"
10027-CVGroup_Relationship_Up_4-1 = "何かでお返しがしたいのだけど……。\n今の私には、まず作戦を成功させることくらいしか……。"
10027-CVGroup_Tactic_In_1-1 = "作戦を開始する。"
10027-CVGroup_Tactic_In_2-1 = "問題無い、行こう。"
10027-CVGroup_Tactic_Victory_1-1 = "驚くほどのことじゃない、当然の結果だ。"
10027-CVGroup_Tactic_Victory_2-1 = "お疲れ様、先生。流石の指揮だった。"
