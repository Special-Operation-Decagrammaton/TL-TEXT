[translation]
13012-CVGroup_Battle_Buffed_1-1 = "ご支援、感謝します！"
13012-CVGroup_Battle_Covered_1-1 = "隠れます！"
13012-CVGroup_Battle_Defense_1-1 = "抵抗しても無駄です！"
13012-CVGroup_Battle_In_1-1 = "迅速に制圧します！"
13012-CVGroup_Battle_In_2-1 = "犯罪者は許しません！"
13012-CVGroup_Battle_Move_1-1 = "ここはもう安全地帯になりました！"
13012-CVGroup_Battle_Move_2-1 = "次の区域へ移動しましょう！"
13012-CVGroup_Battle_Recovery_1-1 = "あ……ありがとうございます。"
13012-CVGroup_Battle_TacticalAction_1-1 = "移動します！"
13012-CVGroup_Battle_Victory_1-1 = "任務、完了しました！"
13012-CVGroup_Battle_Victory_2-1 = "右、左……\nふぅ、ここはもう安全です！"
13012-CVGroup_CommonSkill-1 = "くらえ！"
13012-CVGroup_ExSkill_1-1 = "あなたには黙秘権があります……\nう、うわっ？"
13012-CVGroup_ExSkill_2-1 = "このキヴォトスでの犯罪は許されな……\nうわああっ！"
13012-CVGroup_ExSkill_3-1 = "警告します！\n投降しなければ……ああっ！"
13012-CVGroup_ExSkill_Level_1-1 = "どうしよう、どうしよう？\n……えいやっ！"
13012-CVGroup_ExSkill_Level_2-1 = "こ、公権力を投入します！"
13012-CVGroup_ExSkill_Level_3-1 = "こ、こ、これでも食らっちゃってください！"
13012-CVGroup_Formation_In_1-1 = "出動ですか？"
13012-CVGroup_Formation_In_2-1 = "準備完了です！"
13012-CVGroup_Formation_Select-1 = "ちょ、ちょ、ちょっと待ってください！"
13012-CVGroup_Growup_1-1 = "ずっとこうやって努力していれば……\nいつか警備部への発令をいただけるのでしょうか?"
13012-CVGroup_Growup_2-1 = "キヴォトスの安全のために、精進します！"
13012-CVGroup_Growup_3-1 = "ふふ、今日はいい成果ですね！"
13012-CVGroup_Growup_4-1 = "本官のために力を貸してくださってありがとうございます。"
13012-CVGroup_Relationship_Up_1-1 = "さすが先生ですね！"
13012-CVGroup_Relationship_Up_2-1 = "本官もいつか……\n先生のような立派な大人になりたいです！"
13012-CVGroup_Relationship_Up_3-1 = "本官はまったく……\nこれは業務に過ぎないのに。\n勘違いをするところでした……。"
13012-CVGroup_Relationship_Up_4-1 = "先生と生徒が恋愛をするというのは、\nキヴォトスでは犯罪ではありません！\nい、言いたいことはそれだけです……。"
13012-CVGroup_Tactic_In_1-1 = "市民の安全を最優先で行きましょう！"
13012-CVGroup_Tactic_In_2-1 = "犯罪者はどこですか？"
13012-CVGroup_Tactic_Victory_1-1 = "市民の皆さん、キヴォトスは今日も安全です！"
13012-CVGroup_Tactic_Victory_2-1 = "今日もパトロールにご協力してくださってありがとうございます！"
