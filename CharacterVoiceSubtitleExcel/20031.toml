[translation]
20031-CVGroup_CommonSkill-1 = "温泉まんじゅうでもどう？"
20031-CVGroup_ExSkill_1-1 = "はい、先生。\n今日の祝杯を挙げるよ。"
20031-CVGroup_ExSkill_2-1 = "かんぱ～い！"
20031-CVGroup_ExSkill_3-1 = "ナ・ズダローヴィエ！"
20031-CVGroup_ExSkill_Level_1-1 = "227号温泉郷の特設ドリンクバー、営業開始だよっ。"
20031-CVGroup_ExSkill_Level_2-1 = "お酒じゃないから、みんな安心して飲んでね。"
20031-CVGroup_ExSkill_Level_3-1 = "さあさ、一杯どうぞ。"
20031-CVGroup_Formation_In_1-1 = "おっと……見つかっちゃったか。"
20031-CVGroup_Formation_In_2-1 = "モルスひとつくらい、持ってってもいいよね？"
20031-CVGroup_Growup_1-1 = "おっ、これは印象的な発酵……\nいや、成長だね。"
20031-CVGroup_Growup_2-1 = "これもドリンク作りに使えるかな？\n……ふふ、冗談だって。"
20031-CVGroup_Growup_3-1 = "どこにいても、たゆまぬ努力は大事だよね。"
20031-CVGroup_Growup_4-1 = "いつも手伝ってくれてありがとね、先生。"
20031-CVGroup_Relationship_Up_1-1 = "先生、ちょ～っとあっちの方でおしゃべりしない？"
20031-CVGroup_Relationship_Up_2-1 = "……扉を開けとくからさ。\n暇なら遊びにきていいからね？"
20031-CVGroup_Relationship_Up_3-1 = "先生、いい表情してる。\n何でみんなが夢中になるのか、わかる気がするよ。"
20031-CVGroup_Relationship_Up_4-1 = "いつか本当にお酒を飲めるようになったら……\n最初の一杯は先生と一緒がいいな。"
