[translation]
20031-CVGroup_CommonSkill-1 = "Que tal um bolinho de onsen?"
20031-CVGroup_ExSkill_1-1 = "Sim, Sensei.\nVamos fazer um brinde hoje."
20031-CVGroup_ExSkill_2-1 = "Tim-tim!"
20031-CVGroup_ExSkill_3-1 = "Na zdorovie!"
20031-CVGroup_ExSkill_Level_1-1 = "O bar de bebidas especial da Estância Termal 227 está aberto."
20031-CVGroup_ExSkill_Level_2-1 = "Não é bebida alcoólica, então podem beber sem preocupações."
20031-CVGroup_ExSkill_Level_3-1 = "Vamos lá, sirva-se de um copo."
20031-CVGroup_Formation_In_1-1 = "Opa... fui descoberta?"
20031-CVGroup_Formation_In_2-1 = "Não tem problema levar um mors, né?"
20031-CVGroup_Growup_1-1 = "Oh, essa é uma fermentação impressionante...\nQuer dizer, um crescimento impressionante."
20031-CVGroup_Growup_2-1 = "Será que isso também serve para fazer bebidas?\n...Hehe, brincadeira."
20031-CVGroup_Growup_3-1 = "Não importa onde você esteja, o esforço constante é importante."
20031-CVGroup_Growup_4-1 = "Obrigada por sempre me ajudar, Sensei."
20031-CVGroup_Relationship_Up_1-1 = "Sensei, que tal a gente conversar ali um pouquinho?"
20031-CVGroup_Relationship_Up_2-1 = "...Vou deixar a porta aberta.\nSe estiver livre, pode vir me visitar, tá?"
20031-CVGroup_Relationship_Up_3-1 = "Sensei, você está com uma expressão tão boa.\nComeço a entender por que todos ficam fascinados por você."
20031-CVGroup_Relationship_Up_4-1 = "Quando eu puder beber álcool de verdade um dia...\nEu gostaria que o primeiro brinde fosse com você, Sensei."
