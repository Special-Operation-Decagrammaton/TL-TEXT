[translation]
10098-CVGroup_Formchange1_Battle_Buffed_1-1 = "丈夫になったかも～"
10098-CVGroup_Formchange1_Battle_Defense_1-1 = "止めちゃうよ～？"
10098-CVGroup_Formchange1_Battle_In_1-1 = "覚悟して。"
10098-CVGroup_Formchange1_Battle_In_2-1 = "援護は任せた。"
10098-CVGroup_Formchange1_Battle_Move_1-1 = "まだあるのか～"
10098-CVGroup_Formchange1_Battle_Move_2-1 = "私が先に進むから、心配しないで～"
10098-CVGroup_Formchange1_Battle_Recovery_1-1 = "ありがと～"
10098-CVGroup_Formchange1_Battle_TacticalAction_1-1 = "位置変えるよ。"
10098-CVGroup_Formchange1_Battle_Victory_1-1 = "これくらいへっちゃらだよ～"
10098-CVGroup_Formchange1_Battle_Victory_2-1 = "もう安心していいよ。"
10098-CVGroup_Formchange1_CommonSkill-1 = "立て直してこ～"
10098-CVGroup_Formchange1_ExSkill_1-1 = "今度はおじさんの番だよ～"
10098-CVGroup_Formchange1_ExSkill_2-1 = "通じないよ。"
10098-CVGroup_Formchange1_ExSkill_3-1 = "呼んだー？"
10098-CVGroup_Formchange1_ExSkill_Level_1-1 = "みんな、下がって！"
10098-CVGroup_Formchange1_ExSkill_Level_2-1 = "私が行く！"
10098-CVGroup_Formchange1_ExSkill_Level_3-1 = "それだけ？\nおじさんガッカリしちゃったな～"
10098-CVGroup_Formchange1_Formation_In_1-1 = "気合入れていくよ～"
10098-CVGroup_Formchange1_Formation_In_2-1 = "面倒くさいけど……\nま、ちゃんとやるからさ。"
10098-CVGroup_Formchange1_Formation_Select-1 = "うへ～待機するのも、地味に疲れるね～"
10098-CVGroup_Formchange1_Formchange-1 = "前衛は私に任せて。"
10098-CVGroup_Growup_1-1 = "お？おじさんにくれるの？\nありがとね～"
10098-CVGroup_Growup_2-1 = "うん、たしかに受け取ったよ。\n……じゃあ、悪い子たちを片付けに行こうか。"
10098-CVGroup_Growup_3-1 = "いやーまたもらっちゃったよ。\nそんで、次はどこで戦えばいい？"
10098-CVGroup_Growup_4-1 = "うへぇ～こういうの照れるけど……ありがと先生。\n先生のために、おじさん戦うね。"
10098-CVGroup_Relationship_Up_1-1 = "またこんなの……\nおじさん、照れちゃうよ～"
10098-CVGroup_Relationship_Up_2-1 = "万が一、先生が危険な目にあったら、そのときは……\n……いや、そんなことはさせない。"
10098-CVGroup_Relationship_Up_3-1 = "うへ～先生とパトロール……\n次はいつかな～\n今から楽しみだね～"
10098-CVGroup_Relationship_Up_4-1 = "私がこんな姿でも、先生は信じてくれるんだね。\nうへぇ～なんか恥ずかし～\n……あと、嬉しい。"
10098-CVGroup_Formchange1_Tactic_In_1-1 = "私についてきて。"
10098-CVGroup_Formchange1_Tactic_In_2-1 = "はじめよっか～"
10098-CVGroup_Formchange1_Tactic_Victory_1-1 = "当然の結果かな。"
10098-CVGroup_Formchange1_Tactic_Victory_2-1 = "終わった～\nんじゃ、休もっか。"
