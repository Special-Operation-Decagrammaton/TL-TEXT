[translation]
20020-CVGroup_CommonSkill-1 = "ふふっ……ビックリしましたか？"
20020-CVGroup_ExSkill_1-1 = "天才美少女ハッカーの真髄、お見せしましょう。"
20020-CVGroup_ExSkill_2-1 = "ふふっ……簡単なことです。"
20020-CVGroup_ExSkill_3-1 = "これをこうして……えいっ。"
20020-CVGroup_ExSkill_Level_1-1 = "はい、この通り。"
20020-CVGroup_ExSkill_Level_2-1 = "ここを少し補強しておきましょう。"
20020-CVGroup_ExSkill_Level_3-1 = "興味深い結果ですね。"
20020-CVGroup_Formation_In_1-1 = "あら、私の助けが必要なのですね？"
20020-CVGroup_Formation_In_2-1 = "先生のご要望でしたら……\nええ、いくらでも。"
20020-CVGroup_Formation_Select-1 = "あら、超天才病弱美少女に……\n見惚れてしまいましたか？"
20020-CVGroup_Growup_1-1 = "これが……成長、でしょうか？\nなかなか興味深いですね。ふふっ。"
20020-CVGroup_Growup_2-1 = "期待をかけていただいた分、お応えします。\n私には造作もないことですので。ふふっ。"
20020-CVGroup_Growup_3-1 = "先生と共にいると……ミレニアムの超天才美少女である私でも、\nまだ新たな事を学べるのだと驚いています。ふふっ。"
20020-CVGroup_Growup_4-1 = "ありがとうございます、先生。\n少し楽しくなってきました。"
20020-CVGroup_Relationship_Up_1-1 = "ふふっ……少し近いですよ、先生。\nその、距離感……といいますか。"
20020-CVGroup_Relationship_Up_2-1 = "先生と一緒にいると感じる、この感覚は一体……\n「全知」の学位を持つこの私が、把握できていないものがあるなんて……。"
20020-CVGroup_Relationship_Up_3-1 = "この胸に広がる熱い感情……\nあまり熱には慣れていませんが……\nええ、悪くない気分ですね。"
20020-CVGroup_Relationship_Up_4-1 = "なんだかいつもより暑いですね……ですが、上着は脱ぎません。\n……でないと、顔が熱い理由を気温のせいにできませんから。"
