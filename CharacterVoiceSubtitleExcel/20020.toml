[translation]
20020-CVGroup_CommonSkill-1 = "Hehe... levou um susto?"
20020-CVGroup_ExSkill_1-1 = "Vou mostrar a verdadeira essência de uma hacker genial e bela."
20020-CVGroup_ExSkill_2-1 = "Hehe... é algo simples."
20020-CVGroup_ExSkill_3-1 = "Faço isso assim... e pronto."
20020-CVGroup_ExSkill_Level_1-1 = "Sim, exatamente como planejado."
20020-CVGroup_ExSkill_Level_2-1 = "Vou reforçar este ponto um pouco."
20020-CVGroup_ExSkill_Level_3-1 = "Um resultado interessante, não é?"
20020-CVGroup_Formation_In_1-1 = "Ora, então você precisa da minha ajuda?"
20020-CVGroup_Formation_In_2-1 = "Se é um pedido do Sensei...\nSim, farei o quanto for preciso."
20020-CVGroup_Formation_Select-1 = "Ora, você ficou hipnotizado...\npela super genial e frágil beldade?"
20020-CVGroup_Growup_1-1 = "Isso é... crescimento? É bastante interessante. Hehe."
20020-CVGroup_Growup_2-1 = "Retribuirei à altura das expectativas que depositou em mim.\nPara mim, isso não é nada difícil. Hehe."
20020-CVGroup_Growup_3-1 = "Estar com o Sensei me faz perceber que, mesmo eu, a super genial beldade do Millennium,\nainda tenho coisas novas a aprender. Fico surpresa. Hehe."
20020-CVGroup_Growup_4-1 = "Obrigada, Sensei.\nComecei a me divertir um pouco."
20020-CVGroup_Relationship_Up_1-1 = "Hehe... você está um pouco perto demais, Sensei.\nSobre essa... distância, sabe?"
20020-CVGroup_Relationship_Up_2-1 = "Essa sensação que sinto quando estou com o Sensei, o que seria...\nEu, que possuo o grau de 'Onisciência', não conseguir compreender algo assim..."
20020-CVGroup_Relationship_Up_3-1 = "Esse sentimento caloroso que se espalha pelo meu peito...\nNão estou muito acostumada com febre, mas...\nSim, é uma sensação nada mal."
20020-CVGroup_Relationship_Up_4-1 = "Está um pouco mais quente que o normal, não é? Mas não vou tirar o casaco.\n...Se eu tirar, não poderei culpar a temperatura pelo motivo do meu rosto estar quente."
