[translation]
10090-CVGroup_Battle_Buffed_1-1 = "いつもありがとうございます！"
10090-CVGroup_Battle_Covered_1-1 = "か、隠れますから！"
10090-CVGroup_Battle_Defense_1-1 = "きゃあ！？\nビックリしました……。"
10090-CVGroup_Battle_In_1-1 = "さあ、皆さん！\n準備するものがいっぱいです！"
10090-CVGroup_Battle_In_2-1 = "一つずつ、一つずつ。\n落ち着いてやっていきましょう！"
10090-CVGroup_Battle_Move_1-1 = "次の場所は……？"
10090-CVGroup_Battle_Move_2-1 = "お祭りは続きますよ！"
10090-CVGroup_Battle_Recovery_1-1 = "あ、ありがとうございます！"
10090-CVGroup_Battle_TacticalAction_1-1 = "あそこが良さそうです！"
10090-CVGroup_Battle_Victory_1-1 = "おみこし、パレード、食べ物、花火……\nお祭りはいつも最高ですね！"
10090-CVGroup_Battle_Victory_2-1 = "今回のお祭りもすごかったです！\n先生はいかがでしたか？"
10090-CVGroup_CommonSkill-1 = "なら……今ですね！"
10090-CVGroup_ExSkill_1-1 = "点検、点検……楽しいですね！"
10090-CVGroup_ExSkill_2-1 = "うーん……ふむふむいいですね！"
10090-CVGroup_ExSkill_3-1 = "どれ、どれ……どうでしょう？"
10090-CVGroup_ExSkill_Level_1-1 = "さあ、ここです！"
10090-CVGroup_ExSkill_Level_2-1 = "この辺で花火を……！"
10090-CVGroup_ExSkill_Level_3-1 = "ここが良さそうです！"
10090-CVGroup_Formation_In_1-1 = "もしかしてどこかでお祭りが開催されるのでしょうか！？"
10090-CVGroup_Formation_In_2-1 = "最高のお祭りをご用意します！"
10090-CVGroup_Formation_Select-1 = "わあ！？\nもう、先生。びっくりしたじゃないですか。"
10090-CVGroup_Growup_1-1 = "えへへ。ありがとうございます、先生。\n成長した分……もっと素敵なお祭りを準備できますよね？"
10090-CVGroup_Growup_2-1 = "私はもっと成長できるはずです！\nお祭りのために……そして先生のために！"
10090-CVGroup_Growup_3-1 = "何か一歩進んだ感じがします！\nこういうのも……いいですね。"
10090-CVGroup_Growup_4-1 = "どうですか、先生？\n私……成長しました？それなら、嬉しいです……。"
10090-CVGroup_Relationship_Up_1-1 = "お祭り前日のときめきについて知ってますか……？\n今まさにそんな気分です。えへへ。"
10090-CVGroup_Relationship_Up_2-1 = "あの、先生？私は先生さえいらっしゃるなら……あの……その……\nど、どんなお祭りでも準備できそうです！\nはぁ……こんな言葉をいうつもりじゃなかったのに……。"
10090-CVGroup_Relationship_Up_3-1 = "たまに、こんなことを考えます。\n先生と一緒なら、毎日がお祭りみたいなんじゃないかな、って……。"
10090-CVGroup_Relationship_Up_4-1 = "あの、先生？いろいろ伝えたい言葉はありますが……\n何より……その、ありがとうございます。本心です。"
10090-CVGroup_Tactic_In_1-1 = "私はお祭りが始まる瞬間が一番楽しみなんです！"
10090-CVGroup_Tactic_In_2-1 = "みんなが楽しむ姿は、本当に素敵です！"
10090-CVGroup_Tactic_Victory_1-1 = "すごいお祭りでした！\nそう思いませんか？"
10090-CVGroup_Tactic_Victory_2-1 = "終わりはどこかさみしくもありますが……\nまた次のお祭りがありますから！"
