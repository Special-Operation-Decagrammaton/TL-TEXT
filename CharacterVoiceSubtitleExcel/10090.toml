[translation]
10090-CVGroup_Battle_Buffed_1-1 = "Sempre muito obrigada!"
10090-CVGroup_Battle_Covered_1-1 = "V-vou me esconder!"
10090-CVGroup_Battle_Defense_1-1 = "Kyaa!?\nQue susto..."
10090-CVGroup_Battle_In_1-1 = "Bem, pessoal!\nTem muita coisa para preparar!"
10090-CVGroup_Battle_In_2-1 = "Uma coisa de cada vez.\nVamos fazer com calma!"
10090-CVGroup_Battle_Move_1-1 = "O próximo lugar é...?"
10090-CVGroup_Battle_Move_2-1 = "O festival continua!"
10090-CVGroup_Battle_Recovery_1-1 = "Ah, muito obrigada!"
10090-CVGroup_Battle_TacticalAction_1-1 = "Ali parece ser um bom lugar!"
10090-CVGroup_Battle_Victory_1-1 = "Santuários portáteis, desfiles, comida, fogos de artifício...\nFestivais são sempre os melhores!"
10090-CVGroup_Battle_Victory_2-1 = "O festival de hoje também foi incrível!\nO que achou, Sensei?"
10090-CVGroup_CommonSkill-1 = "Então... é agora!"
10090-CVGroup_ExSkill_1-1 = "Inspeção, inspeção... que divertido!"
10090-CVGroup_ExSkill_2-1 = "Hmm... hum hum, que bom!"
10090-CVGroup_ExSkill_3-1 = "Vejamos, vejamos... o que acha?"
10090-CVGroup_ExSkill_Level_1-1 = "Bem, é aqui!"
10090-CVGroup_ExSkill_Level_2-1 = "Vou soltar os fogos por aqui...!"
10090-CVGroup_ExSkill_Level_3-1 = "Aqui parece ser bom!"
10090-CVGroup_Formation_In_1-1 = "Será que vai ter um festival acontecendo em algum lugar!?"
10090-CVGroup_Formation_In_2-1 = "Vou preparar o melhor festival de todos!"
10090-CVGroup_Formation_Select-1 = "Uau!?\nOra, Sensei. Você me assustou."
10090-CVGroup_Growup_1-1 = "Ehehe. Muito obrigada, Sensei.\nCom esse meu crescimento... poderei preparar festivais ainda mais maravilhosos, não é?"
10090-CVGroup_Growup_2-1 = "Eu ainda posso crescer muito mais!\nPelo bem do festival... e pelo bem do Sensei!"
10090-CVGroup_Growup_3-1 = "Sinto que dei um passo à frente!\nIsso também é... muito bom."
10090-CVGroup_Growup_4-1 = "O que acha, Sensei?\nEu... cresci? Se for o caso, fico feliz..."
10090-CVGroup_Relationship_Up_1-1 = "Você conhece aquela sensação de expectativa na véspera de um festival...?\nEstou me sentindo exatamente assim agora. Ehehe."
10090-CVGroup_Relationship_Up_2-1 = "Ei, Sensei? Se você estiver comigo... eu... bem...\nE-eu sinto que consigo preparar qualquer festival!\nAh... eu não pretendia dizer algo assim..."
10090-CVGroup_Relationship_Up_3-1 = "Às vezes, eu penso nisso.\nQue se eu estiver com o Sensei, todos os dias parecem um festival..."
10090-CVGroup_Relationship_Up_4-1 = "Ei, Sensei? Tenho muitas coisas que gostaria de lhe dizer, mas...\nAcima de tudo... bem, obrigada. É de coração."
10090-CVGroup_Tactic_In_1-1 = "O momento em que o festival começa é o que eu mais espero!"
10090-CVGroup_Tactic_In_2-1 = "Ver todo mundo se divertindo é maravilhoso!"
10090-CVGroup_Tactic_Victory_1-1 = "Foi um festival incrível!\nNão acha?"
10090-CVGroup_Tactic_Victory_2-1 = "O fim é um pouco triste, mas...\nSempre haverá um próximo festival!"
