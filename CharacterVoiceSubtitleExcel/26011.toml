[translation]
26011-CVGroup_CommonSkill-1 = "お、お味は、どうでしょう？"
26011-CVGroup_ExSkill_1-1 = "わ、わぁっ！？\nな、なに！？"
26011-CVGroup_ExSkill_2-1 = "……！！来た！"
26011-CVGroup_ExSkill_3-1 = "……！！来ると思った！"
26011-CVGroup_ExSkill_Level_1-1 = "ここは……よいしょっ！"
26011-CVGroup_ExSkill_Level_2-1 = "はあああーっ！！"
26011-CVGroup_ExSkill_Level_3-1 = "させない！やあっ！！"
26011-CVGroup_Formation_In_1-1 = "わ、私も行っていいんですか！？やったー！"
26011-CVGroup_Formation_In_2-1 = "できる限り頑張ります！"
26011-CVGroup_Growup_1-1 = "く、くれるんですか！？\n……ありがとうございます！頑張ります！"
26011-CVGroup_Growup_2-1 = "よく分からないけど……\nなんだか強くなったような気が……！"
26011-CVGroup_Growup_3-1 = "わあっ！体中から力が湧いてくる！\nこういうものなんですか！？"
26011-CVGroup_Growup_4-1 = "先生！私、今ならなんでもできそうな気がします！"
26011-CVGroup_Relationship_Up_1-1 = "なんて言ったらいいんですかね……\nありがとうございます、じゃ全然足りない気がします……。"
26011-CVGroup_Relationship_Up_2-1 = "えっ、えっ？私にですか？\n本当に、いいんですか……？"
26011-CVGroup_Relationship_Up_3-1 = "先生には、助けられてばかりですね、はは……。"
26011-CVGroup_Relationship_Up_4-1 = "ここに来てから、楽しいことばかりなのは……\nきっと先生のおかげなんだと思います。"
