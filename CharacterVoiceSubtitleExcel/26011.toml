[translation]
26011-CVGroup_CommonSkill-1 = "O-o sabor, como está?"
26011-CVGroup_ExSkill_1-1 = "U-uau!?\nO-o que foi!?"
26011-CVGroup_ExSkill_2-1 = "……!! Veio!"
26011-CVGroup_ExSkill_3-1 = "……!! Eu sabia que viria!"
26011-CVGroup_ExSkill_Level_1-1 = "Aqui é…… opa!"
26011-CVGroup_ExSkill_Level_2-1 = "Haaaaaaah!!"
26011-CVGroup_ExSkill_Level_3-1 = "Não vou deixar! Hyaah!!"
26011-CVGroup_Formation_In_1-1 = "E-eu também posso ir!? Eba!"
26011-CVGroup_Formation_In_2-1 = "Farei o meu melhor!"
26011-CVGroup_Growup_1-1 = "V-você vai me dar isso!?\n……Muito obrigada! Vou me esforçar!"
26011-CVGroup_Growup_2-1 = "Não entendo muito bem, mas……\nSinto como se tivesse ficado mais forte……!"
26011-CVGroup_Growup_3-1 = "Uau! Sinto o poder brotando por todo o meu corpo!\nÉ assim que funciona!?"
26011-CVGroup_Growup_4-1 = "Sensei! Sinto que agora sou capaz de qualquer coisa!"
26011-CVGroup_Relationship_Up_1-1 = "Como eu deveria dizer……\nSinto que um simples 'obrigada' não é o suficiente……."
26011-CVGroup_Relationship_Up_2-1 = "Eh, eh? É para mim?\nTem certeza de que está tudo bem……?"
26011-CVGroup_Relationship_Up_3-1 = "Eu só tenho recebido ajuda do Sensei, haha……."
26011-CVGroup_Relationship_Up_4-1 = "Desde que cheguei aqui, só tenho tido momentos felizes……\nTenho certeza de que é graças ao Sensei."
