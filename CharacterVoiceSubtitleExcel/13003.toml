[translation]
13003-CVGroup_Battle_Buffed_1-1 = "支援、感謝します。"
13003-CVGroup_Battle_Covered_1-1 = "狙撃ポイント、確保しました。"
13003-CVGroup_Battle_Defense_1-1 = "ふふっ、未熟ですね。"
13003-CVGroup_Battle_In_1-1 = "装填完了。\nこれより敵を殲滅します。"
13003-CVGroup_Battle_In_2-1 = "心は熱く、頭は冷静に。\n参ります！"
13003-CVGroup_Battle_Move_1-1 = "もっと、運動をしたほうがいいのかもしれませんね……。"
13003-CVGroup_Battle_Move_2-1 = "クリア。"
13003-CVGroup_Battle_Recovery_1-1 = "美味しいですが量が少し足りな……\nな、なんでもありません。"
13003-CVGroup_Battle_TacticalAction_1-1 = "狙撃ポイントを変更します。"
13003-CVGroup_Battle_Victory_1-1 = "お疲れ様でした。"
13003-CVGroup_Battle_Victory_2-1 = "まだまだです。\nもっと精進します。"
13003-CVGroup_CommonSkill-1 = "参ります。"
13003-CVGroup_ExSkill_1-1 = "攻撃します。"
13003-CVGroup_ExSkill_2-1 = "ターゲット発見。"
13003-CVGroup_ExSkill_3-1 = "目標補足。"
13003-CVGroup_ExSkill_Level_1-1 = "逃がしません。"
13003-CVGroup_ExSkill_Level_2-1 = "撃ち抜く……！"
13003-CVGroup_ExSkill_Level_3-1 = "行きます！"
13003-CVGroup_Formation_In_1-1 = "遠慮は要りません。\n私にお任せください。"
13003-CVGroup_Formation_In_2-1 = "お待ちしておりました。"
13003-CVGroup_Formation_Select-1 = "ふむ……。"
13003-CVGroup_Growup_1-1 = "お気づかいありがとうございます、先生。"
13003-CVGroup_Growup_2-1 = "強くなるにつれて、きちんと必要とされる人になれているのか……。\nいつも悩んでおります。"
13003-CVGroup_Growup_3-1 = "私にここまでのことを……。\n恐縮です。"
13003-CVGroup_Growup_4-1 = "ありがとうございます。"
13003-CVGroup_Relationship_Up_1-1 = "どうしてでしょうか。\n先生と一緒にいると、いつもより緊張してしまいます。"
13003-CVGroup_Relationship_Up_2-1 = "もし今この瞬間が、夢だとしても……\n私、一生の宝物にします。"
13003-CVGroup_Relationship_Up_3-1 = "いつも、そばにおりますから……\n私が必要な時は、いつでも仰ってください。"
13003-CVGroup_Relationship_Up_4-1 = "いつも感謝しております。\n私も頑張らないとですね。"
13003-CVGroup_Tactic_In_1-1 = "敵を発見。\n戦闘準備。"
13003-CVGroup_Tactic_In_2-1 = "出発します。"
13003-CVGroup_Tactic_Victory_1-1 = "お見事です。"
13003-CVGroup_Tactic_Victory_2-1 = "任務、遂行完了。"
