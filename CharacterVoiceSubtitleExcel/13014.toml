13014-CVGroup_Relationship_Up_2-1 = "E-estar com o mestre... faz meu coração disparar. Esse sentimento... sinto que estou quase entendendo o que é!"
13014-CVGroup_Relationship_Up_3-1 = "Este é o sentimento do mestre... Um dia, os meus sentimentos também..."
13014-CVGroup_Relationship_Up_4-1 = "Você quer viver a juventude comigo...? E-eu também, com você, mestre...!"
13014-CVGroup_Tactic_In_1-1 = "Vou te levar pelo caminho da vitória!"
13014-CVGroup_Tactic_In_2-1 = "Hoje eu estou diferente!"
13014-CVGroup_Tactic_Victory_1-1 = "Ah, foi um ótimo comando, mestre!"
13014-CVGroup_Tactic_Victory_2-1 = "Já acabou? Fiquei com um gostinho de quero mais!"
