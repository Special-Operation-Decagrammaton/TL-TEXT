13014-CVGroup_Battle_Defense_1-1 = "Lento, lento demais!"
13014-CVGroup_Battle_In_1-1 = "É hora das atividades de juventude!"
13014-CVGroup_Battle_In_2-1 = "Vou começar a brincadeira na água!"
13014-CVGroup_Battle_Move_1-1 = "É por ali?"
13014-CVGroup_Battle_Move_2-1 = "Sigam-me!"
13014-CVGroup_Battle_Recovery_1-1 = "Sinto a energia fluindo!"
13014-CVGroup_Battle_TacticalAction_1-1 = "Estou me movendo!"
13014-CVGroup_Battle_Victory_1-1 = "Isso sim é o poder da juventude!"
13014-CVGroup_Battle_Victory_2-1 = "Pode deixar a próxima comigo também!"
13014-CVGroup_CommonSkill-1 = "Injeção de juventude!"
13014-CVGroup_ExSkill_1-1 = "Ondas da juventude, vão!"
13014-CVGroup_ExSkill_2-1 = "Estão prontos para curtir o verão?"
13014-CVGroup_ExSkill_3-1 = "Saiam da frente!"
13014-CVGroup_ExSkill_Level_1-1 = "Haha, toma essa!"
13014-CVGroup_ExSkill_Level_2-1 = "Sejam levados pela correnteza!"
13014-CVGroup_ExSkill_Level_3-1 = "Canhão da juventude, disparar!"
13014-CVGroup_Formation_In_1-1 = "Oh! É a minha vez!"
13014-CVGroup_Formation_In_2-1 = "Vou mostrar o poder da juventude!"
