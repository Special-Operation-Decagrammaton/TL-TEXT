13014-CVGroup_Growup_1-1 = "O-obrigada, hehe. Graças ao mestre, eu consegui crescer."
13014-CVGroup_Growup_2-1 = "Poder da juventude aumentado! Com isso, posso fazer ainda mais atividades de juventude! O mestre também vem junto!"
13014-CVGroup_Growup_3-1 = "Oh, fiquei mais forte! É o resultado do nosso treinamento, mestre!"
