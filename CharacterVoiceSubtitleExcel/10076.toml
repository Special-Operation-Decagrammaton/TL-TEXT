[translation]
10076-CVGroup_Battle_Buffed_1-1 = "Isso é……!\nObrigada pela consideração!"
10076-CVGroup_Battle_Defense_1-1 = "É inútil!"
10076-CVGroup_Battle_In_1-1 = "Eh, eu estou na linha de frente?\nMesmo sendo para torcer!?"
10076-CVGroup_Battle_In_2-1 = "Vou ficar na frente!\n……Ah, isso não está certo, né?"
10076-CVGroup_Battle_Move_1-1 = "Sim, vamos para o próximo!"
10076-CVGroup_Battle_Move_2-1 = "Parece que a pausa ainda vai demorar!"
10076-CVGroup_Battle_Recovery_1-1 = "Muito obrigada!!"
10076-CVGroup_Battle_TacticalAction_1-1 = "Yaah!"
10076-CVGroup_Battle_Victory_1-1 = "Será que o efeito da torcida funcionou?"
10076-CVGroup_Battle_Victory_2-1 = "Pessoal, bom trabalho a todos!"
10076-CVGroup_CommonSkill-1 = "Ah, sobre isso!\nDeixe-me explicar!"
10076-CVGroup_ExSkill_1-1 = "Olhem só para cá, lá vou eu!!"
10076-CVGroup_ExSkill_2-1 = "Rah, rah! É agora!"
10076-CVGroup_ExSkill_3-1 = "A torcida da Kotori, lá vai!\nHaaaah!"
10076-CVGroup_ExSkill_Level_1-1 = "Vou com tudo!"
10076-CVGroup_ExSkill_Level_2-1 = "E-eu exagerei um pouco!?"
10076-CVGroup_ExSkill_Level_3-1 = "Uwaaa, o que é isso!\nDesculpeee!!"
10076-CVGroup_Formation_In_1-1 = "Sim! Pode deixar comigo!"
10076-CVGroup_Formation_In_2-1 = "Se precisam de torcida, é a minha vez!"
10076-CVGroup_Formation_Select-1 = "Rah! Rah!\nAh, ainda não era a hora? Ahaha……."
10076-CVGroup_Growup_1-1 = "Isso tudo é pela torcida, por todos vocês, certo!?"
10076-CVGroup_Growup_2-1 = "Muito obrigada, Sensei!\nVou me esforçar pelo tanto que você cuidou de mim!"
10076-CVGroup_Growup_3-1 = "Deveria ser eu quem torce por você……\nIsso me deixa um pouco envergonhada!"
10076-CVGroup_Growup_4-1 = "Sinto que só eu recebo torcida.\nEu também, um dia, farei isso pelo Sensei……!"
10076-CVGroup_Relationship_Up_1-1 = "Sensei…… hum, você não precisa de uma torcida?\nSe eu servir para isso……!"
10076-CVGroup_Relationship_Up_2-1 = "Estou sempre pronta!\nQuando precisar, é só me chamar!"
10076-CVGroup_Relationship_Up_3-1 = "Ficaria feliz se isso servisse como um agradecimento pelo dia a dia……."
10076-CVGroup_Relationship_Up_4-1 = "Roupa de líder de torcida…… você gosta?\nEntão, vou usar todos os dias!"
10076-CVGroup_Tactic_In_1-1 = "Mumu! Parece que isso vai ser uma batalha longa!"
10076-CVGroup_Tactic_In_2-1 = "Mumu…… isso precisa de torcida!"
10076-CVGroup_Tactic_Victory_1-1 = "Ufa…… foi uma partida maravilhosa!\nBom trabalho!"
10076-CVGroup_Tactic_Victory_2-1 = "Ha, ha……\nQ-que bom que terminou tudo bem!"
