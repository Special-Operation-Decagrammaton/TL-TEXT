[translation]
10076-CVGroup_Battle_Buffed_1-1 = "これは……！\nお気遣いありがとうございます！"
10076-CVGroup_Battle_Defense_1-1 = "無駄です！"
10076-CVGroup_Battle_In_1-1 = "えっ、私が最前列ですか？\n応援するのに！？"
10076-CVGroup_Battle_In_2-1 = "先頭に立ちます！\n……あっ、これは違いますかね？"
10076-CVGroup_Battle_Move_1-1 = "はい、次へいきましょう！"
10076-CVGroup_Battle_Move_2-1 = "休憩はまだ先みたいですね！"
10076-CVGroup_Battle_Recovery_1-1 = "ありがとうございます！！"
10076-CVGroup_Battle_TacticalAction_1-1 = "やぁっ！"
10076-CVGroup_Battle_Victory_1-1 = "応援の効果があったのでしょうか？"
10076-CVGroup_Battle_Victory_2-1 = "みなさん、お疲れ様でした！"
10076-CVGroup_CommonSkill-1 = "あっ、それはですね！\n説明しましょう！"
10076-CVGroup_ExSkill_1-1 = "こちらをご覧ください、いきますよー！！"
10076-CVGroup_ExSkill_2-1 = "フレーフレー！今です！"
10076-CVGroup_ExSkill_3-1 = "コトリの応援、いきます！\nはぁぁあっ！"
10076-CVGroup_ExSkill_Level_1-1 = "華麗に参ります！"
10076-CVGroup_ExSkill_Level_2-1 = "す、少しやり過ぎてしまいましたか！？"
10076-CVGroup_ExSkill_Level_3-1 = "うわああっ、なんですかこれ！\nごめんなさーい！！"
10076-CVGroup_Formation_In_1-1 = "はい！私にお任せください！"
10076-CVGroup_Formation_In_2-1 = "応援が必要なら、私の出番ですね！"
10076-CVGroup_Formation_Select-1 = "フレー！フレー！\nあっ、まだでしたか？あはは……。"
10076-CVGroup_Growup_1-1 = "これも全部応援のため、皆さんのためですよね！？"
10076-CVGroup_Growup_2-1 = "ありがとうございます、先生！\n目をかけていただいた分、努力します！"
10076-CVGroup_Growup_3-1 = "応援するのは私の方なのに……\nなんだか照れますね！"
10076-CVGroup_Growup_4-1 = "私ばかり応援してもらっている気がします。\n私も、いつかは先生のために……！"
10076-CVGroup_Relationship_Up_1-1 = "先生……その、応援はいりませんか？\nあの、私でよければ……！"
10076-CVGroup_Relationship_Up_2-1 = "いつだって準備はできています！\n必要な時は何なりとおっしゃってください！"
10076-CVGroup_Relationship_Up_3-1 = "これで日頃のお礼になれば嬉しいですが……。"
10076-CVGroup_Relationship_Up_4-1 = "チア衣装……お好きなんですか？\nなら、毎日着ますよ！"
10076-CVGroup_Tactic_In_1-1 = "むむっ！これは長期戦になりそうですね！"
10076-CVGroup_Tactic_In_2-1 = "むむっ……これは応援が必要です！"
10076-CVGroup_Tactic_Victory_1-1 = "ふぅ……素晴らしい試合でした！\nお疲れ様でした！"
10076-CVGroup_Tactic_Victory_2-1 = "ハァ、ハァ……\nな、なんとか無事に終わってよかったです！"
