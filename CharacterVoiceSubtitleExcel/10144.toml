[translation]
10144-CVGroup_Formchange_ShunSmall_Battle_Buffed_1-1 = "ありがとうございます！"
10144-CVGroup_Formchange_ShunSmall_Battle_Covered_1-1 = "隠れます！"
10144-CVGroup_Formchange_ShunSmall_Battle_Defense_1-1 = "ちょちょいのちょい、です！"
10144-CVGroup_Formchange_ShunSmall_Battle_In_1-1 = "みなさん、よろしくお願いします！"
10144-CVGroup_Formchange_ShunSmall_Battle_In_2-1 = "私が先頭に立ちますね！"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_1-1 = "次は何でしょうか？"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_2-1 = "あそこですね！"
10144-CVGroup_Formchange_ShunSmall_Battle_Recovery_1-1 = "元気になりました！"
10144-CVGroup_Formchange_ShunSmall_Battle_TacticalAction_1-1 = "あっちに行きましょう！"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_1-1 = "勝ちました！先生が見ていてくれたおかげです！"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_2-1 = "えへへ。やりました！褒めてください！"
10144-CVGroup_Formchange_ShunSmall_CommonSkill-1 = "さて……どうですか！"
10144-CVGroup_Formchange_ShunSmall_ExSkill_1-1 = "んん……。\n先生～！"
10144-CVGroup_Formchange_ShunSmall_ExSkill_2-1 = "あいたた……。\n助けてくださ～い！"
10144-CVGroup_Formchange_ShunSmall_ExSkill_3-1 = "うぅーん……。\n抱っこしてください～！"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_1-1 = "頑張りますねっ！"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_2-1 = "よいしょ！"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_3-1 = "行きますよ！"
10144-CVGroup_Formchange_ShunSmall_Formation_In_1-1 = "先生とおでかけ！ですね♪"
10144-CVGroup_Formchange_ShunSmall_Formation_In_2-1 = "えへへっ、とっても楽しみです♪"
10144-CVGroup_Formchange_ShunSmall_Formation_Select-1 = "わわわっ！？\n落ちちゃうかと思いました……えへへ。"
10144-CVGroup_Formchange_ShunSmall_Formchange-1 = "じゃじゃーん！シュエリンです！"
10144-CVGroup_Formchange_ShunSmall_Growup_1-1 = "私、成長したみたいです！\nえっと……いいこと、なんですよね？あれ？"
10144-CVGroup_Formchange_ShunSmall_Growup_2-1 = "この姿になると、色々なことを考えちゃいます。\n身体は大きくなったけれど、果たして成長しているのか……\nあっ、なんだか感傷的になっちゃいましたね！\n今のは聞かなかったことに……。"
10144-CVGroup_Formchange_ShunSmall_Growup_3-1 = "今の私は、期間限定の泡沫……。\nだからこそ、この時間を大切にしたいんです。\n先生とこうやって過ごす瞬間は、かけがえのない宝物ですから。"
10144-CVGroup_Formchange_ShunSmall_Growup_4-1 = "む……なんだか、また大きくなった気がします……。\n……えっ私、何か変なこと言いました？"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_1-1 = "トロピカルフルーツが食べたくなってきました……\n先生はどんなフルーツが好きですか？"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_2-1 = "先生は何をして遊びたいですか？\n私は……おんぶしてもらいたいです！\nそれから……えへへっ、秘密です！"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_3-1 = "小さい頃、水遊びに熱中しすぎて夏風邪を引いちゃったことがあるんです。\n……って、「今」も小さかったですね。\nとにかく！先生も夏風邪には注意するんですよ！"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_4-1 = "今の私が経験する出来事は、過去の上書きになるんでしょうか？\nでもきっと、違いますよね。\nだって、こうして過ごしている全ての時間が、新しい思い出になっているんですから。"
10144-CVGroup_Formchange_ShunSmall_Tactic_In_1-1 = "小さくても、できるんですよ！"
10144-CVGroup_Formchange_ShunSmall_Tactic_In_2-1 = "任せてください！"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_1-1 = "えへへ、先生、見てました？"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_2-1 = "いってきます！"
