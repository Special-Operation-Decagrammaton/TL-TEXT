[translation]
10144-CVGroup_Formchange_ShunSmall_Battle_Buffed_1-1 = "Спасибо!"
10144-CVGroup_Formchange_ShunSmall_Battle_Covered_1-1 = "Я в укрытие!"
10144-CVGroup_Formchange_ShunSmall_Battle_Defense_1-1 = "Проще простого!"
10144-CVGroup_Formchange_ShunSmall_Battle_In_1-1 = "Ребята, я рассчитываю на вас!"
10144-CVGroup_Formchange_ShunSmall_Battle_In_2-1 = "Я поведу нас за собой!"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_1-1 = "Что дальше?"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_2-1 = "Туда!"
10144-CVGroup_Formchange_ShunSmall_Battle_Recovery_1-1 = "Теперь мне гораздо лучше!"
10144-CVGroup_Formchange_ShunSmall_Battle_TacticalAction_1-1 = "Направимся вооон туда!"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_1-1 = "Мы победили! Это всё потому, что вы приглядывали за мной, Сенсей!"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_2-1 = "Хе-хе. Мы сделали это! Пожалуйста, похвалите меня!"
10144-CVGroup_Formchange_ShunSmall_CommonSkill-1 = "А теперь... как вам такое!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_1-1 = "Ннн... Сенсей~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_2-1 = "Ой-ёй... Помогите мне, пожалуйста!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_3-1 = "Ууу... Пожалуйста, возьмите меня на ручки!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_1-1 = "Я сделаю всё, что в моих силах!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_2-1 = "Эх, взяли!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_3-1 = "Я пошла!"
10144-CVGroup_Formchange_ShunSmall_Formation_In_1-1 = "Прогулка с Сенсеем! Как чудесно♪"
10144-CVGroup_Formchange_ShunSmall_Formation_In_2-1 = "Хе-хе-хе, я так взволнована♪"
10144-CVGroup_Formchange_ShunSmall_Formation_Select-1 = "Ой-ёй-ёй!? Мне показалось, что я сейчас упаду... хе-хе."
10144-CVGroup_Formchange_ShunSmall_Formchange-1 = "Та-да! Это Шунлинг!"
10144-CVGroup_Formchange_ShunSmall_Growup_1-1 = "Кажется, я подросла! Эм... это ведь хорошо, правда? Погодите, хорошо ли?"
10144-CVGroup_Formchange_ShunSmall_Growup_2-1 = "В этой форме мне в голову лезут самые разные мысли. Моё тело стало больше, но выросла ли я как личность?.. Ой, что-то я расчувствовалась! Давайте просто притворимся, что я ничего не говорила."
10144-CVGroup_Formchange_ShunSmall_Growup_3-1 = "Нынешняя я — лишь мимолётный мыльный пузырь... Именно поэтому мне так хочется беречь это время. Каждое мгновение, проведённое вот так с вами, Сенсей, — это незаменимое сокровище."
10144-CVGroup_Formchange_ShunSmall_Growup_4-1 = "Хмм... У меня такое чувство, будто я снова выросла... ...Эсь? Я сказала что-то странное?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_1-1 = "Мне так захотелось тропических фруктов... А какие фрукты любите вы, Сенсей?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_2-1 = "Во что вы хотите поиграть, Сенсей? Я... я хочу, чтобы вы покатали меня на спине! А потом... хе-хе, это секрет!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_3-1 = "Когда я была маленькой, я как-то раз так увлеклась игрой в воде, что подхватила летнюю простуду... ...Погодите, но ведь я и «сейчас» маленькая, верно? В любом случае! Вам тоже стоит поберечься от летней простуды, Сенсей!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_4-1 = "Неужели то, что я испытываю сейчас, просто стирает моё прошлое? Но ведь это не может быть так, правда? Потому что каждое мгновение, что мы проводим вместе, становится совершенно новым прекрасным воспоминанием."
10144-CVGroup_Formchange_ShunSmall_Tactic_In_1-1 = "Пусть я и маленькая, я всё равно справлюсь!"
10144-CVGroup_Formchange_ShunSmall_Tactic_In_2-1 = "Предоставьте это мне!"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_1-1 = "Хе-хе, вы смотрели на меня, Сенсей?"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_2-1 = "Я побежала!"