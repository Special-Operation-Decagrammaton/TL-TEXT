10144-CVGroup_Formchange_ShunSmall_Battle_Move_2-1 = "Over there!"
10144-CVGroup_Formchange_ShunSmall_Battle_Recovery_1-1 = "I feel better now!"
10144-CVGroup_Formchange_ShunSmall_Battle_TacticalAction_1-1 = "Let's head over there!"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_1-1 = "We won! It's all thanks to you watching over me, Sensei!"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_2-1 = "Hehe. We did it! Please praise me!"
10144-CVGroup_Formchange_ShunSmall_CommonSkill-1 = "Now then... how's this!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_1-1 = "Nnn... Sensei~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_2-1 = "Ouchie... Help me, please!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_3-1 = "Uuu... Please carry me!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_1-1 = "I'll do my best!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_2-1 = "Heave-ho!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_3-1 = "Here I go!"
10144-CVGroup_Formchange_ShunSmall_Formation_In_1-1 = "An outing with Sensei! How lovely♪"
10144-CVGroup_Formchange_ShunSmall_Formation_In_2-1 = "Hehehe, I'm so excited♪"
10144-CVGroup_Formchange_ShunSmall_Formation_Select-1 = "Whoa, whoa!? I thought I was going to fall... hehe."
10144-CVGroup_Formchange_ShunSmall_Formchange-1 = "Ta-da! It's Shun-rin!"
10144-CVGroup_Formchange_ShunSmall_Growup_1-1 = "It seems I've grown! Um... that's a good thing, right? Wait, is it?"
10144-CVGroup_Formchange_ShunSmall_Growup_2-1 = "Being in this form makes me think about all sorts of things. My body has grown, but I wonder if I've truly grown as a person... Oh, I've gotten all sentimental! Let's just pretend I didn't say that."
10144-CVGroup_Formchange_ShunSmall_Growup_3-1 = "The current me is but a fleeting bubble... That's exactly why I want to cherish this time. Every moment I spend like this with you, Sensei, is an irreplaceable treasure."
10144-CVGroup_Formchange_ShunSmall_Growup_4-1 = "Hmm... I feel like I've grown again... ...Eh? Did I say something strange?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_1-1 = "I've started craving tropical fruit... What kind of fruit do you like, Sensei?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_2-1 = "What do you want to play, Sensei? I... I want you to give me a piggyback ride! And then... hehe, it's a secret!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_3-1 = "When I was little, I once got so absorbed in playing in the water that I caught a summer cold... ...Wait, I'm little 'now' too, aren't I? Anyway! You should be careful of summer colds too, Sensei!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_4-1 = "Are the things I experience now just overwriting my past? But that can't be right, can it? Because every moment we spend together like this is becoming a brand new memory."
10144-CVGroup_Formchange_ShunSmall_Tactic_In_1-1 = "Even if I'm small, I can still do it!"
10144-CVGroup_Formchange_ShunSmall_Tactic_In_2-1 = "Leave it to me!"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_1-1 = "Hehe, were you watching, Sensei?"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_2-1 = "I'm off!"