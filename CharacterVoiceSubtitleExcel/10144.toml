[translation]#[Texto Final. - Filipe 24/06.]
10144-CVGroup_Formchange_ShunSmall_Battle_Buffed_1-1 = "Muito obrigada!"
10144-CVGroup_Formchange_ShunSmall_Battle_Covered_1-1 = "Vou me esconder!"
10144-CVGroup_Formchange_ShunSmall_Battle_Defense_1-1 = "Isso é moleza!"
10144-CVGroup_Formchange_ShunSmall_Battle_In_1-1 = "Pessoal, conto com vocês!"
10144-CVGroup_Formchange_ShunSmall_Battle_In_2-1 = "Eu vou na linha de frente!"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_1-1 = "O que tem depois daqui?"
10144-CVGroup_Formchange_ShunSmall_Battle_Move_2-1 = "É por ali!"
10144-CVGroup_Formchange_ShunSmall_Battle_Recovery_1-1 = "Tô cheia de energia de novo!"
10144-CVGroup_Formchange_ShunSmall_Battle_TacticalAction_1-1 = "Vamos pra lá!"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_1-1 = "Vencemos! É tudo graças ao Sensei que tava torcendo por mim!"
10144-CVGroup_Formchange_ShunSmall_Battle_Victory_2-1 = "Ehehe. Conseguimos! Faz um cafuné em mim!"
10144-CVGroup_Formchange_ShunSmall_CommonSkill-1 = "E então... o que acha disso!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_1-1 = "Nnh...\nSensei~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_2-1 = "Ai, ui...\nMe ajuda, por favor~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_3-1 = "Uhhhnn...\nMe pega no colo~!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_1-1 = "Vou dar o meu melhor!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_2-1 = "Eita, upa!"
10144-CVGroup_Formchange_ShunSmall_ExSkill_Level_3-1 = "Lá vou eu!"
10144-CVGroup_Formchange_ShunSmall_Formation_In_1-1 = "Vou sair pra passear com o Sensei! Né♪"
10144-CVGroup_Formchange_ShunSmall_Formation_In_2-1 = "Ehehe, eu tô muito animada♪"
10144-CVGroup_Formchange_ShunSmall_Formation_Select-1 = "Uwaaah!?\nAchei que ia cair... ehehe."
10144-CVGroup_Formchange_ShunSmall_Formchange-1 = "Tcharãããn! É a Shunzinha!"
10144-CVGroup_Formchange_ShunSmall_Growup_1-1 = "Parece que eu cresci!\nUhn... Isso é uma coisa boa, né? Ué?"
10144-CVGroup_Formchange_ShunSmall_Growup_2-1 = "Ficar com essa aparência me faz pensar em um monte de coisas.\nO meu corpo cresceu, mas será que eu realmente amadureci...\nAh, acabei ficando um pouco sentimental!\nFinja que não ouviu isso..."
10144-CVGroup_Formchange_ShunSmall_Growup_3-1 = "A eu de agora... é como uma bolha de sabão que vai estourar logo.\nE é por isso que quero valorizar tanto esse tempo.\nOs momentos que passo assim com o Sensei são o meu maior tesouro."
10144-CVGroup_Formchange_ShunSmall_Growup_4-1 = "Uhn... Sinto que acabei de ficar um pouquinho maior...\n......Eh? Eu disse alguma coisa estranha?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_1-1 = "Me deu uma vontade de comer frutas tropicais...\nDe que tipo de fruta será que o Sensei gosta?"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_2-1 = "Do que você quer brincar, Sensei?\nEu... queria que você me levasse nas costas!\nE depois... ehehe, é segredo!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_3-1 = "Quando eu era pequena, fiquei tão empolgada brincando na água que acabei pegando um resfriado de verão.\n......Espera, eu estou pequena \"agora\" também, né.\nDe qualquer jeito! O Sensei também tem que tomar cuidado pra não pegar um resfriado!"
10144-CVGroup_Formchange_ShunSmall_Relationship_Up_4-1 = "Será que as coisas que a eu de agora está vivendo vão sobrescrever o meu passado?\nMas com certeza não, né.\nAfinal, cada segundo do tempo que estamos passando juntos está se tornando uma nova e preciosa memória."
10144-CVGroup_Formchange_ShunSmall_Tactic_In_1-1 = "Mesmo sendo pequena, eu consigo!"
10144-CVGroup_Formchange_ShunSmall_Tactic_In_2-1 = "Deixa comigo!"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_1-1 = "Ehehe, você viu, Sensei?"
10144-CVGroup_Formchange_ShunSmall_Tactic_Victory_2-1 = "Tô indo lá!"