[translation]
10135-CVGroup_Battle_Buffed_1-1 = "Th-thank you...!"
10135-CVGroup_Battle_Defense_1-1 = "How boring."
10135-CVGroup_Battle_In_1-1 = "Please, try not to push yourself too hard."
10135-CVGroup_Battle_In_2-1 = "If it's a request from Sensei... I suppose I have no choice."
10135-CVGroup_Battle_Move_1-1 = "That wasn't much of a challenge."
10135-CVGroup_Battle_Move_2-1 = "I just need to go, right? I'll go."
10135-CVGroup_Battle_Recovery_1-1 = "Th-thank you."
10135-CVGroup_Battle_TacticalAction_1-1 = "First, over there...!"
10135-CVGroup_Battle_Victory_1-1 = "A natural result. You were watching, weren't you, Sensei?"
10135-CVGroup_Battle_Victory_2-1 = "Hmph. You should be a little more grateful to me."
10135-CVGroup_CommonSkill-1 = "This is all your fault, too!"
10135-CVGroup_ExSkill_1-1 = "My name is Kei."
10135-CVGroup_ExSkill_2-1 = "I am here."
10135-CVGroup_ExSkill_3-1 = "I am who I am."
10135-CVGroup_ExSkill_Level_1-1 = "I'll help you."
10135-CVGroup_ExSkill_Level_2-1 = "Was I able to be of help?"
10135-CVGroup_ExSkill_Level_3-1 = "I suppose this will do."
10135-CVGroup_Formation_In_1-1 = "Sigh... please don't make me go through all this trouble."
10135-CVGroup_Formation_In_2-1 = "I understand. I just have to do it, right?"
10135-CVGroup_Formation_Select-1 = "Eek...!?\nWhat is so fun about that!?"
10135-CVGroup_Growup_1-1 = "...I've become stronger, haven't I?\nYes, I know.\nI won't deny that this is all thanks to you, Sensei.\nTherefore, I will continue to fight from here on out."
10135-CVGroup_Growup_2-1 = "To resist, I must keep moving forward.\nUntil now, I thought I had to do that all on my own, but...\nI've come to understand that, in the end, people cannot live alone."
10135-CVGroup_Growup_3-1 = "I already told you, didn't I? Thank you.\nEh? You've never heard me say it before...?\nAnyway, I just said it now, so that should be enough, right!?"
10135-CVGroup_Growup_4-1 = "Th-that's why...\nI'm only going to say this once, so listen carefully!\nThis is all thanks to you, Sensei... th-thank you."
10135-CVGroup_Relationship_Up_1-1 = "Wh-what is it? I don't have anything particular to say...?\n...I understand...\nI-I don't dislike you, Sensei... are you happy now!?"
10135-CVGroup_Relationship_Up_2-1 = "Why do you look so gloomy? Is something wrong?\nEh? You think I dislike you...?\nI-I didn't mean it in that way...\n...Honestly. I'll stay by your side until you feel better."
10135-CVGroup_Relationship_Up_3-1 = "Eh? If that's how you feel,\nthen I won't do anything for you anymore...?\nW-when did I ever say that...! I was just...!\nWait, ah!? You're teasing me again, aren't you!?"
10135-CVGroup_Relationship_Up_4-1 = "Sigh... *huff*...\nI rarely say things like this, so listen carefully, okay!?\n...Please, don't do anything too dangerous.\nBecause... I don't want you to disappear, Sensei."
10135-CVGroup_Tactic_In_1-1 = "Sigh... why do I have to..."
10135-CVGroup_Tactic_In_2-1 = "Apparently, I have to do this..."
10135-CVGroup_Tactic_Victory_1-1 = "Well, I suppose this will do."
10135-CVGroup_Tactic_Victory_2-1 = "That was easy. Is there anything else to do?\nNo, it's just a hassle to do it later.\nIt's not like I'm motivated or anything."