[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10135-CVGroup_Battle_Buffed_1-1 = "M-Muito obrigada...!" 
10135-CVGroup_Battle_Defense_1-1 = "Isso é entediante." 
10135-CVGroup_Battle_In_1-1 = "Não exagere demais, ok?" 
10135-CVGroup_Battle_In_2-1 = "Se é um pedido do Sensei... não tenho escolha." 
10135-CVGroup_Battle_Move_1-1 = "Não foi grande coisa." 
10135-CVGroup_Battle_Move_2-1 = "Se temos que ir, então vamos logo." 
10135-CVGroup_Battle_Recovery_1-1 = "A-Ah, obrigada." 
10135-CVGroup_Battle_TacticalAction_1-1 = "Primeiro, para aquele lado...!" 
10135-CVGroup_Battle_Victory_1-1 = "Um resultado óbvio. Você estava assistindo, não é, Sensei?" 
10135-CVGroup_Battle_Victory_2-1 = "Hmph. Trate de demonstrar um pouco mais de gratidão." 
10135-CVGroup_CommonSkill-1 = "Tudo isso é culpa de vocês!" 
10135-CVGroup_ExSkill_1-1 = "O meu nome é Kei." 
10135-CVGroup_ExSkill_2-1 = "Eu estou aqui." 
10135-CVGroup_ExSkill_3-1 = "Eu sou eu mesma." 
10135-CVGroup_ExSkill_Level_1-1 = "Eu vou te dar uma ajudinha." 
10135-CVGroup_ExSkill_Level_2-1 = "Consegui ser útil?" 
10135-CVGroup_ExSkill_Level_3-1 = "Acho que isso deve bastar." 
10135-CVGroup_Formation_In_1-1 = "Haa... Por favor, não me faça perder tempo." 
10135-CVGroup_Formation_In_2-1 = "Eu entendi, é só fazer o trabalho, certo?" 
10135-CVGroup_Formation_Select-1 = "Hyaa...?! O que é tão engraçado?!" 
10135-CVGroup_Growup_1-1 = "...Eu fiquei mais forte, não é?\nSim, eu sei muito bem.\nNão vou negar que foi graças a você, Sensei.\nPortanto, eu continuarei lutando a partir de agora." 
10135-CVGroup_Growup_2-1 = "Para poder resistir, precisamos seguir em frente.\nAté agora, eu pensava que precisava fazer isso sozinha...\nMas no fim das contas, eu entendi que as pessoas não conseguem viver sozinhas." 
10135-CVGroup_Growup_3-1 = "Argh, eu já não agradeci antes?\nEh? Essa é a primeira vez que você ouviu...?\nDe qualquer forma, eu acabei de dizer, então já está bom, não é?!" 
10135-CVGroup_Growup_4-1 = "É-É por isso que...\nEu só vou dizer isso uma vez, então escute com atenção!\nTudo isso foi graças a você, Sensei... muito obrigada." 
10135-CVGroup_Relationship_Up_1-1 = "O-O que foi? Não tenho nada de especial para dizer...!\nTsk... Entendi...\nE-Eu não odeio você, Sensei... Satisfeito agora?!" 
10135-CVGroup_Relationship_Up_2-1 = "Aconteceu alguma coisa para você estar com essa cara triste?\nEh? Você acha que eu te odeio...?\nE-Eu não disse aquilo com essa intenção...\n...Que saco. Eu vou ficar ao seu lado até você se animar." 
10135-CVGroup_Relationship_Up_3-1 = "Eh? Se você vai falar isso,\nentão eu não vou fazer mais nada por você...!\nQ-Quando foi que eu disse isso...?! Eu só estava...!\nEspera, ah?! Você está me provocando de novo, não é?!" 
10135-CVGroup_Relationship_Up_4-1 = "Suu... Haa...\nE-Eu raramente digo coisas desse tipo, então preste muita atenção, ok?!\n...Por favor, tente não se expor a tantos perigos.\nPerder o Sensei... seria algo que eu detestaria." 
10135-CVGroup_Tactic_In_1-1 = "Haa... Por que eu tenho que..." 
10135-CVGroup_Tactic_In_2-1 = "Parece que não tenho escolha a não ser fazer isso..." 
10135-CVGroup_Tactic_Victory_1-1 = "Bem, acho que deu para o gasto." 
10135-CVGroup_Tactic_Victory_2-1 = "Isso foi fácil. Tem mais alguma coisa para fazer?\nNão, é só que deixar para depois seria irritante.\nNão significa que eu esteja motivada." 