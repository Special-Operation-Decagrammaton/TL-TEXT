[translation]
10135-CVGroup_Battle_Buffed_1-1 = "Obrigada...!"
10135-CVGroup_Battle_Defense_1-1 = "Que entediante."
10135-CVGroup_Battle_In_1-1 = "Por favor, não se esforce demais."
10135-CVGroup_Battle_In_2-1 = "Se é um pedido do Sensei... não tenho escolha."
10135-CVGroup_Battle_Move_1-1 = "Não foi nada demais."
10135-CVGroup_Battle_Move_2-1 = "Eu vou, está bem? Eu vou."
10135-CVGroup_Battle_Recovery_1-1 = "Ah, obrigada."
10135-CVGroup_Battle_TacticalAction_1-1 = "Primeiro, ali...!"
10135-CVGroup_Battle_Victory_1-1 = "Um resultado natural. Você estava vendo, não estava, Sensei?"
10135-CVGroup_Battle_Victory_2-1 = "Hum. Agradeça-me um pouco mais."
10135-CVGroup_CommonSkill-1 = "Isso tudo é culpa de vocês!"
10135-CVGroup_ExSkill_1-1 = "Meu nome é Kei."
10135-CVGroup_ExSkill_2-1 = "Eu estou aqui."
10135-CVGroup_ExSkill_3-1 = "Eu sou eu."
10135-CVGroup_ExSkill_Level_1-1 = "Vou te ajudar."
10135-CVGroup_ExSkill_Level_2-1 = "Eu fui útil?"
10135-CVGroup_ExSkill_Level_3-1 = "Será que é isso?"
10135-CVGroup_Formation_In_1-1 = "Haa... por favor, não me faça ter tanto trabalho."
10135-CVGroup_Formation_In_2-1 = "Entendido, eu só preciso fazer, certo?"
10135-CVGroup_Formation_Select-1 = "Kyaa...!?\nO que há de tão divertido nisso!?"
10135-CVGroup_Growup_1-1 = "...Eu fiquei mais forte.\nSim, eu sei.\nNão vou negar que isso é graças ao Sensei.\nPor isso, continuarei lutando daqui em diante."
10135-CVGroup_Growup_2-1 = "Para resistir, preciso seguir em frente.\nAté agora, eu achava que tinha que fazer tudo sozinha, mas...\nNo fim, entendi que as pessoas não conseguem viver sozinhas."
10135-CVGroup_Growup_3-1 = "Eu já não disse? Obrigada.\nHã? É a primeira vez que ouve...?\nDe qualquer forma, eu acabei de dizer, então já chega, não é!?"
10135-CVGroup_Growup_4-1 = "P-por isso...\nSó vou dizer uma vez, então escute com atenção!\nIsso tudo também é graças ao Sensei... obrigada."
10135-CVGroup_Relationship_Up_1-1 = "O-o que foi? Não tenho nada em especial para dizer...?\n...Entendi...\nE-eu não odeio o Sensei... já chega, está bom!?"
10135-CVGroup_Relationship_Up_2-1 = "Por que está com essa cara tão triste?\nHã? Acha que eu te odeio...?\nE-eu não disse nesse sentido...\n...Já chega. Vou ficar ao seu lado até você se animar."
10135-CVGroup_Relationship_Up_3-1 = "Hã? Se diz isso,\nentão não vou mais fazer nada por você...?\nQ-quando foi que eu disse isso...! Eu só...! \nEspera, ah!? Você está me provocando de novo, não está!?"
10135-CVGroup_Relationship_Up_4-1 = "Suu... haa...\nE-esse tipo de coisa, eu raramente digo, então escute com atenção, está bem!?\n...Não faça nada perigoso.\nPorque eu... não quero que o Sensei desapareça."
10135-CVGroup_Tactic_In_1-1 = "Haa... por que eu..."
10135-CVGroup_Tactic_In_2-1 = "Dizem que é algo que precisa ser feito, então..."
10135-CVGroup_Tactic_Victory_1-1 = "Bem, acho que é isso."
10135-CVGroup_Tactic_Victory_2-1 = "Foi fácil. Tem mais alguma coisa para fazer?\nNão, é só que seria um incômodo deixar para depois.\nNão é como se eu estivesse motivada."
