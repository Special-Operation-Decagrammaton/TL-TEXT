[translation]
20017-CVGroup_CommonSkill-1 = "い、痛そうですね……！"
20017-CVGroup_ExSkill_1-1 = "あ、ああっ……！？\nわ、私が行きます！"
20017-CVGroup_ExSkill_2-1 = "あ、えっ……！？\nしょ、少々お待ちを！"
20017-CVGroup_ExSkill_3-1 = "み、みなさん……！？\nし、支援します！"
20017-CVGroup_ExSkill_Level_1-1 = "え、えへへ……\n私には、このくらいしかできないので……。"
20017-CVGroup_ExSkill_Level_2-1 = "で、ではまた、次の場所へ……。"
20017-CVGroup_ExSkill_Level_3-1 = "こういうのも、人生ですよね……。"
20017-CVGroup_Formation_In_1-1 = "はい、準備できました……\nよろしくお願いします。"
20017-CVGroup_Formation_In_2-1 = "えへへ……こ、今回はどんなお仕事で？"
20017-CVGroup_Growup_1-1 = "え、わ、私ですか！？\nつまり、もっと苦しめと……？\nそういうことですか……！？"
20017-CVGroup_Growup_2-1 = "この先は、もっと苦しいんですよね？\nどんどん辛くなるんでしょうけど……\n仕方ないですね……えへへ。"
20017-CVGroup_Growup_3-1 = "強くなればなるほど、今以上に苦しむんですよね……。"
20017-CVGroup_Growup_4-1 = "こんな私でも、役に立てることが……？"
20017-CVGroup_Relationship_Up_1-1 = "あの、私、これ以上はきっと、役に立てないと思いますが……\nどうしたものですかね……。"
20017-CVGroup_Relationship_Up_2-1 = "あ、ありがとうございます……えへへ……。"
20017-CVGroup_Relationship_Up_3-1 = "こんなに私を追い詰めて……\n人生は苦しいものだって教えてくださってるんですか？\nそうですよね？そういうことですよね？"
20017-CVGroup_Relationship_Up_4-1 = "上げては落として、また辛い目に……\nそういうことですよね……。"
