[translation]
20017-CVGroup_CommonSkill-1 = "Ai, parece doloroso...!"
20017-CVGroup_ExSkill_1-1 = "A, ah...!?\nE-eu vou!"
20017-CVGroup_ExSkill_2-1 = "A, eh...!?\nPo-por favor, espere um pouco!"
20017-CVGroup_ExSkill_3-1 = "To-todos...!?\nEu, eu vou dar suporte!"
20017-CVGroup_ExSkill_Level_1-1 = "E-ehehe...\nÉ só isso que eu consigo fazer..."
20017-CVGroup_ExSkill_Level_2-1 = "En-então, vamos para o próximo lugar..."
20017-CVGroup_ExSkill_Level_3-1 = "A vida é feita dessas coisas, não é..."
20017-CVGroup_Formation_In_1-1 = "Sim, estou pronta...\nConto com vocês."
20017-CVGroup_Formation_In_2-1 = "Ehehe... e-e que tipo de trabalho faremos desta vez?"
20017-CVGroup_Growup_1-1 = "E-eu!?\nQuer dizer que devo sofrer ainda mais...?\nÉ isso que você quer dizer...!?"
20017-CVGroup_Growup_2-1 = "Daqui para frente, vai ser ainda mais doloroso, né?\nVai ficar cada vez mais difícil, mas...\nNão tem jeito, né... ehehe."
20017-CVGroup_Growup_3-1 = "Quanto mais forte eu fico, mais eu sofro do que agora, né..."
20017-CVGroup_Growup_4-1 = "Mesmo alguém como eu pode ser útil...?"
20017-CVGroup_Relationship_Up_1-1 = "Bem, eu não acho que serei útil além disso...\nO que eu deveria fazer...?"
20017-CVGroup_Relationship_Up_2-1 = "O-obrigada... ehehe..."
20017-CVGroup_Relationship_Up_3-1 = "Você me pressiona tanto assim...\nEstá me ensinando que a vida é algo doloroso?\nÉ isso, né? É exatamente isso, não é?"
20017-CVGroup_Relationship_Up_4-1 = "Me elevar para depois me derrubar e me fazer passar por sofrimento de novo...\nÉ isso que você quer dizer, né..."
