[translation]
20028-CVGroup_CommonSkill-1 = "Por favor, aceite isto!"
20028-CVGroup_ExSkill_1-1 = "O vento está tão agradável... ah!\nUaaa...!?"
20028-CVGroup_ExSkill_2-1 = "O vento... hya!?\nE-espere, por favor!"
20028-CVGroup_ExSkill_3-1 = "Hum hum~... hm...!?\nM-meu chapéu...!"
20028-CVGroup_ExSkill_Level_1-1 = "Para não perder para o calor!"
20028-CVGroup_ExSkill_Level_2-1 = "Que tal brincarmos na água?"
20028-CVGroup_ExSkill_Level_3-1 = "Falando em verão, é isso, não é?"
20028-CVGroup_Formation_In_1-1 = "Sim, o que vamos fazer?"
20028-CVGroup_Formation_In_2-1 = "V-é a minha vez, né! Vou dar o meu melhor!"
20028-CVGroup_Formation_Select-1 = "E-este traje de banho... o que achou?"
20028-CVGroup_Growup_1-1 = "I-isto é para mim...!?\nSério, tudo bem mesmo...?"
20028-CVGroup_Growup_2-1 = "Muito obrigada, Sensei!\nVou cuidar bem disso."
20028-CVGroup_Growup_3-1 = "Não estou acostumada a receber favores...\nMas estou feliz."
20028-CVGroup_Growup_4-1 = "Vou me esforçar ainda mais...!"
20028-CVGroup_Relationship_Up_1-1 = "Ugh... não consigo nem encontrar palavras para agradecer..."
20028-CVGroup_Relationship_Up_2-1 = "Será que estou sendo realmente útil para o Sensei?"
20028-CVGroup_Relationship_Up_3-1 = "Ficar ao lado do Sensei acalma meu coração...\nPor que será?"
20028-CVGroup_Relationship_Up_4-1 = "Se precisar de qualquer coisa,\npor favor, me diga... qualquer coisa."
