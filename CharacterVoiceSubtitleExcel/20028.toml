[translation]
20028-CVGroup_CommonSkill-1 = "お受け取りください！"
20028-CVGroup_ExSkill_1-1 = "風が気持ちいいで……あっ！\nうああ……！？"
20028-CVGroup_ExSkill_2-1 = "風が……ひゃ！？\nま、待ってください！"
20028-CVGroup_ExSkill_3-1 = "ふんふん～…ん……！？\nわ、私の帽子……！"
20028-CVGroup_ExSkill_Level_1-1 = "暑さに負けないように！"
20028-CVGroup_ExSkill_Level_2-1 = "水遊び、しませんか？"
20028-CVGroup_ExSkill_Level_3-1 = "夏といえば、これですよね！"
20028-CVGroup_Formation_In_1-1 = "はい、何をしましょうか？"
20028-CVGroup_Formation_In_2-1 = "わ、私の出番ですね！頑張ります！"
20028-CVGroup_Formation_Select-1 = "こ、この水着……いかが、でしょう？"
20028-CVGroup_Growup_1-1 = "こ、これを私に……！？\n本当に、良いのでしょうか……？"
20028-CVGroup_Growup_2-1 = "ありがとうございます、先生！\n大切にしますね。"
20028-CVGroup_Growup_3-1 = "なにかしていただくのは慣れていなくて……\nでも、嬉しいです。"
20028-CVGroup_Growup_4-1 = "もっと、頑張りますね……！"
20028-CVGroup_Relationship_Up_1-1 = "うぅ……感謝の言葉も見つかりません……。"
20028-CVGroup_Relationship_Up_2-1 = "私は、ちゃんと先生のお役に立てているのでしょうか？"
20028-CVGroup_Relationship_Up_3-1 = "先生のそばにいると、心が和みます……\nどうしてなのでしょう？"
20028-CVGroup_Relationship_Up_4-1 = "必要なことがありましたら、\nなんでも言ってくださいね……なんでも。"
