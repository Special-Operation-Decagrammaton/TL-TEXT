[translation]
13011-CVGroup_Battle_In_1-1 = "Hmm... se fosse com um controle, eu teria confiança..."
13011-CVGroup_Battle_In_2-1 = "O cenário para a vitória está claro!"
13011-CVGroup_Battle_Recovery_1-1 = "Sempre temos que ficar de olho na barra de vida!"
13011-CVGroup_Battle_Victory_1-1 = "Concluído! Para a próxima fase!"
13011-CVGroup_Battle_Victory_2-1 = "Nossa vitória!"
13011-CVGroup_CommonSkill-1 = "Eu já estou brava!"
13011-CVGroup_ExSkill_1-1 = "Certo... desse jeito... ahhh! Ugh... não acredito!"
13011-CVGroup_ExSkill_2-1 = "Heh, interessante... Ué! Morri!? Não acredito!"
13011-CVGroup_ExSkill_3-1 = "Eu ganhei! Hã!? Eu perdi!? Ah, qual é!"
13011-CVGroup_ExSkill_Level_1-1 = "Agora eu vou ter que pagar um sorvete! A culpa é de vocês!"
13011-CVGroup_ExSkill_Level_2-1 = "Que frustrante... tão frustrante!"
13011-CVGroup_ExSkill_Level_3-1 = "Tome a minha bala de fúria!"
13011-CVGroup_Formation_In_1-1 = "Deixa comigo!"
13011-CVGroup_Formation_In_2-1 = "Certo, é a minha vez!"
13011-CVGroup_Formation_Select-1 = "Ei!? Espera, assim não dá para jogar!"
13011-CVGroup_Growup_1-1 = "Faça com que eu ganhe mais experiência!"
13011-CVGroup_Growup_2-1 = "Subir de nível é sempre um momento emocionante, né!"
13011-CVGroup_Growup_3-1 = "Quero ficar mais forte! Assim poderei ser uma irmã mais velha que protege todo mundo!"
13011-CVGroup_Growup_4-1 = "Meu poder de fogo daqui para frente não vai ser brincadeira!"
13011-CVGroup_Relationship_Up_1-1 = "Se quer aumentar minha afinidade, compre mais jogos novos para mim!"
13011-CVGroup_Relationship_Up_2-1 = "Que... que reviravolta... O que será que vai acontecer agora?"
13011-CVGroup_Relationship_Up_3-1 = "Ué? Será que isso foi um sinal... N-não! Não foi nada!"
13011-CVGroup_Relationship_Up_4-1 = "Para criar o melhor jogo, precisamos de várias experiências. Experiências amorosas também... né?"
13011-CVGroup_Tactic_In_1-1 = "Vamos terminar logo isso e ir para casa!"
13011-CVGroup_Tactic_In_2-1 = "Vou mostrar a minha mira!"
13011-CVGroup_Tactic_Victory_1-1 = "Nesse nível, a dificuldade parece ser fácil!"
13011-CVGroup_Tactic_Victory_2-1 = "Concluído!"
13011-CVGroup_Battle_Buffed_1-1 = "Obrigada!"
13011-CVGroup_Battle_Covered_1-1 = "Achei um lugar para me esconder!"
13011-CVGroup_Battle_Defense_1-1 = "É inútil!"
13011-CVGroup_Battle_Move_1-1 = "Área limpa!"
13011-CVGroup_Battle_Move_2-1 = "Para a próxima fase, avançar!"
13011-CVGroup_Battle_TacticalAction_1-1 = "Vamos por aqui!"
