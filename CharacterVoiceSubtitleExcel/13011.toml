[translation]
13011-CVGroup_Battle_In_1-1 = "うーん……\nパッドでの操作だったら自信あるんだけど……。"
13011-CVGroup_Battle_In_2-1 = "勝利へのシナリオが見えた！"
13011-CVGroup_Battle_Recovery_1-1 = "体力ゲージはいつも、注意深く確認しておかなきゃね！"
13011-CVGroup_Battle_Victory_1-1 = "クリア！次のステージへ！"
13011-CVGroup_Battle_Victory_2-1 = "私たちの勝利！"
13011-CVGroup_CommonSkill-1 = "私、もう怒ったんだから！"
13011-CVGroup_ExSkill_1-1 = "よし……このまま……えええっ！\nうう……許せない！"
13011-CVGroup_ExSkill_2-1 = "へえ、おもしろ……\nうわっ！死んだ！？信じられない！"
13011-CVGroup_ExSkill_3-1 = "私の勝ちっ！\nえっ！？負けたじゃん！？もおおおおぉっ！"
13011-CVGroup_ExSkill_Level_1-1 = "アイスおごらなきゃいけなくなったじゃん！\nあなたたちのせいだよ！"
13011-CVGroup_ExSkill_Level_2-1 = "くやしぃ……くやしい！"
13011-CVGroup_ExSkill_Level_3-1 = "私の、怒りの弾丸を食らえ！"
13011-CVGroup_Formation_In_1-1 = "任せてよ～"
13011-CVGroup_Formation_In_2-1 = "さあ、私の番か！"
13011-CVGroup_Formation_Select-1 = "ひゃぁっ！？\nちょっ、これじゃゲームできないじゃん！"
13011-CVGroup_Growup_1-1 = "経験値をもっと貰えるようにして！"
13011-CVGroup_Growup_2-1 = "レベルアップって、いつもときめく瞬間だよね！"
13011-CVGroup_Growup_3-1 = "もっと強くなりたい！\nそうすればみんなを守れるお姉ちゃんになれるから！"
13011-CVGroup_Growup_4-1 = "これからの私の火力、半端じゃないよ！"
13011-CVGroup_Relationship_Up_1-1 = "私の好感度を上げたいなら、新作のゲームをもっと買って！"
13011-CVGroup_Relationship_Up_2-1 = "な……なんて伏線……。\nこのまま行ったら、どうなっちゃうんだろ！"
13011-CVGroup_Relationship_Up_3-1 = "あれ？もしかして今フラグ……\nち、ちがう！立ってない！"
13011-CVGroup_Relationship_Up_4-1 = "最高のゲームを作るためにはやっぱり色んな経験が必要なの。\n恋愛経験も……ね？"
13011-CVGroup_Tactic_In_1-1 = "早く終わらせて帰ろう！"
13011-CVGroup_Tactic_In_2-1 = "私のエイムを見せてあげる！"
13011-CVGroup_Tactic_Victory_1-1 = "これぐらいなら難易度はEasyって感じだね！"
13011-CVGroup_Tactic_Victory_2-1 = "クリア！"
13011-CVGroup_Battle_Buffed_1-1 = "ありがとっ！"
13011-CVGroup_Battle_Covered_1-1 = "隠れるとこ見っけ！"
13011-CVGroup_Battle_Defense_1-1 = "無駄だよ～！"
13011-CVGroup_Battle_Move_1-1 = "ここはクリアっ！"
13011-CVGroup_Battle_Move_2-1 = "次のステージへ、前進～！"
13011-CVGroup_Battle_TacticalAction_1-1 = "こっちに行こ～！"
