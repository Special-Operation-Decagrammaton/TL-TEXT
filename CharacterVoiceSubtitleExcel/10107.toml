[translation]
10107-CVGroup_Battle_Buffed_1-1 = "Muito obrigada!"
10107-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
10107-CVGroup_Battle_Defense_1-1 = "Opa, eu desviei!"
10107-CVGroup_Battle_In_1-1 = "Preparar... já!"
10107-CVGroup_Battle_In_2-1 = "A reportagem começou!"
10107-CVGroup_Battle_Move_1-1 = "Vamos seguir em frente!"
10107-CVGroup_Battle_Move_2-1 = "Vou indo na frente!"
10107-CVGroup_Battle_Recovery_1-1 = "Muito obrigada! Me sinto renovada!"
10107-CVGroup_Battle_TacticalAction_1-1 = "Ei!"
10107-CVGroup_Battle_Victory_1-1 = "Foi moleza!"
10107-CVGroup_Battle_Victory_2-1 = "Prontinho, foi uma reportagem bem produtiva!"
10107-CVGroup_CommonSkill-1 = "Já decidi, a próxima matéria será sobre isso!"
10107-CVGroup_ExSkill_1-1 = "Sinto cheiro de furo de reportagem...\nAh! Fui descoberta!"
10107-CVGroup_ExSkill_2-1 = "Hum, hum, entendo...\nUau! Cuidado!"
10107-CVGroup_ExSkill_3-1 = "Deixa eu ver...\nAhaha! Que perigo! Vamos fugir!"
10107-CVGroup_ExSkill_Level_1-1 = "Aqui, pegue!"
10107-CVGroup_ExSkill_Level_2-1 = "Estou no meio de uma reportagem!"
10107-CVGroup_ExSkill_Level_3-1 = "Vai doer um pouquinho, viu?"
10107-CVGroup_Formation_In_1-1 = "Precisa de ajuda?"
10107-CVGroup_Formation_In_2-1 = "Talvez eu encontre um bom furo de reportagem!"
10107-CVGroup_Formation_Select-1 = "Estou pronta!"
10107-CVGroup_Growup_1-1 = "Uau! Muito obrigada, Sensei!"
10107-CVGroup_Growup_2-1 = "Sim! Vou continuar queimando meu espírito de redatora e seguir com tudo!"
10107-CVGroup_Growup_3-1 = "Sinto que fiquei um pouco mais forte!\nAgora acho que até o recrutamento para o \"Pandemonium Semanal\" vai dar certo!"
10107-CVGroup_Growup_4-1 = "Uau! Que felicidade! Sinto que até poderia voar agora!\nSensei! Vou tirar uma foto, venha aparecer comigo!\nDigam xis!"
10107-CVGroup_Relationship_Up_1-1 = "Ahaha... não sei por que, mas fiquei um pouco envergonhada!"
10107-CVGroup_Relationship_Up_2-1 = "Isso é... muito bom.\nHã... estou mais quieta que o normal? Eu?"
10107-CVGroup_Relationship_Up_3-1 = "Ah, puxa vida!\nNessas horas, eu não sei que cara fazer!"
10107-CVGroup_Relationship_Up_4-1 = "Ei, eu não consigo colocar em palavras, mas!\nEstou com vontade de entrevistar o Sensei um pouco mais!\nNão pode... será?"
10107-CVGroup_Tactic_In_1-1 = "Vamos atacar todos juntos!"
10107-CVGroup_Tactic_In_2-1 = "Vamos dar o nosso melhor!"
10107-CVGroup_Tactic_Victory_1-1 = "Prontinho! Missão cumprida!"
10107-CVGroup_Tactic_Victory_2-1 = "Consegui tirar muitas fotos boas!"
