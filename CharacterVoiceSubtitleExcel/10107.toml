[translation]
10107-CVGroup_Battle_Buffed_1-1 = "ありがとうございま～す！"
10107-CVGroup_Battle_Covered_1-1 = "隠れます！"
10107-CVGroup_Battle_Defense_1-1 = "おっと、避けちゃいました！"
10107-CVGroup_Battle_In_1-1 = "よーい！ドン！"
10107-CVGroup_Battle_In_2-1 = "取材開始です！"
10107-CVGroup_Battle_Move_1-1 = "ドンドンいきますよ～！"
10107-CVGroup_Battle_Move_2-1 = "先、行きますね！"
10107-CVGroup_Battle_Recovery_1-1 = "ありがとうございます！元気でました！"
10107-CVGroup_Battle_TacticalAction_1-1 = "やっ！"
10107-CVGroup_Battle_Victory_1-1 = "楽勝でしたね～！"
10107-CVGroup_Battle_Victory_2-1 = "はいっ、充実した取材でした！"
10107-CVGroup_CommonSkill-1 = "次の特集は、これに決めた！"
10107-CVGroup_ExSkill_1-1 = "ネタの匂いが……\nあはっ！バレちゃいました！"
10107-CVGroup_ExSkill_2-1 = "ふむふむなるほど……？\nわっ！危ない！"
10107-CVGroup_ExSkill_3-1 = "どれどれ……？\nあはは！やっば！逃げろ～！"
10107-CVGroup_ExSkill_Level_1-1 = "はい、どうぞ！"
10107-CVGroup_ExSkill_Level_2-1 = "今取材中なんで！"
10107-CVGroup_ExSkill_Level_3-1 = "ちょ～っと痛みますよ～？"
10107-CVGroup_Formation_In_1-1 = "お手伝いが必要ですか？"
10107-CVGroup_Formation_In_2-1 = "いいネタ、見つかるかも～！"
10107-CVGroup_Formation_Select-1 = "準備オッケーです！"
10107-CVGroup_Growup_1-1 = "わあっ！ありがとうございます！先生！"
10107-CVGroup_Growup_2-1 = "はいっ！これからも書記魂を燃やして、ガンガンいきますよ～！"
10107-CVGroup_Growup_3-1 = "すこし強くなった気がします！\n今なら「週刊万魔殿」の勧誘活動もうまくいきそうな……！"
10107-CVGroup_Growup_4-1 = "わあ～！嬉しい！今なら空も飛べちゃいそうです！\n先生！写真撮りますから、一緒に映ってください！\nはい、チーズ！"
10107-CVGroup_Relationship_Up_1-1 = "あははっ……なんだかちょっと、照れますね！"
10107-CVGroup_Relationship_Up_2-1 = "これは……嬉しいです。\nえ……いつもより大人しい？私が、ですか？\nそ、そんなことないですよ～！"
10107-CVGroup_Relationship_Up_3-1 = "うう～もう！\nこういうとき、どんな顔をすればいいのか分かりません！"
10107-CVGroup_Relationship_Up_4-1 = "あのっ、うまく言葉にできないのですが！\nもう少しだけ……先生を取材したい気分です！\nだめ、ですかね……？"
10107-CVGroup_Tactic_In_1-1 = "みんなで突撃しますよ～！"
10107-CVGroup_Tactic_In_2-1 = "頑張っていきましょ！"
10107-CVGroup_Tactic_Victory_1-1 = "はいっ！任務完了、です！"
10107-CVGroup_Tactic_Victory_2-1 = "良い写真がたくさん撮れました～！"
