[translation]
10023-CVGroup_Battle_Buffed_1-1 = "よし、行くぞ！"
10023-CVGroup_Battle_Covered_1-1 = "一旦隠れる……！"
10023-CVGroup_Battle_Defense_1-1 = "無駄だ！"
10023-CVGroup_Battle_In_1-1 = "これより、夏合宿のトレーニングを開始する！"
10023-CVGroup_Battle_In_2-1 = "砂のお城みたいに、跡形も無く壊してやる！"
10023-CVGroup_Battle_Move_1-1 = "場所を移動する。"
10023-CVGroup_Battle_Move_2-1 = "狙撃ポイントへ移動する。"
10023-CVGroup_Battle_Recovery_1-1 = "ありがとう。"
10023-CVGroup_Battle_TacticalAction_1-1 = "よし、早く次の場所へ行こう。"
10023-CVGroup_Battle_Victory_1-1 = "言っても聞かないバカには、銃弾を食らわせるしかない。"
10023-CVGroup_Battle_Victory_2-1 = "全く、海だからといって浮かれ過ぎだ……。\nバカ共め……。"
10023-CVGroup_CommonSkill-1 = "そらっ！"
10023-CVGroup_ExSkill_1-1 = "全く、せっかくの休憩時間が……。"
10023-CVGroup_ExSkill_2-1 = "少しくらい、ゆっくりさせてくれ……。"
10023-CVGroup_ExSkill_3-1 = "せっかくの非番の日なんだけどな……。"
10023-CVGroup_ExSkill_Level_1-1 = "逃すか！"
10023-CVGroup_ExSkill_Level_2-1 = "どんな状況でも、逃しはしない！"
10023-CVGroup_ExSkill_Level_3-1 = "違反者には罰を！"
10023-CVGroup_Formation_In_1-1 = "問題無い。"
10023-CVGroup_Formation_In_2-1 = "ここでも任務があるのか……。"
10023-CVGroup_Formation_Select-1 = "ちょっと、変なとこ触るな！"
10023-CVGroup_Growup_1-1 = "これも、夏の合宿の成果だな。"
10023-CVGroup_Growup_2-1 = "なるほど……確かに技術が身についてるみたいだ。"
10023-CVGroup_Growup_3-1 = "夏だから、海だからって、\nトレーニングを怠るわけにはいかない。"
10023-CVGroup_Growup_4-1 = "うん、確かに成長してる……\n……ちょっと、どこを見てるんだ！？"
10023-CVGroup_Relationship_Up_1-1 = "先生のこと……頼りにしてるから。"
10023-CVGroup_Relationship_Up_2-1 = "今年の夏は、付き合ってもらうよ。\n……やっ、そのっ、トレーニングの話！"
10023-CVGroup_Relationship_Up_3-1 = "……もしかして、ずっと私の後をつけてきたのか？\nえぇ……嘘だろ……。"
10023-CVGroup_Relationship_Up_4-1 = "全く、本当に不思議な人だ。\nヘンタイで、大人なのに情けなくて……。\n……でも、何だか放っておけない。"
10023-CVGroup_Tactic_In_1-1 = "規則違反者はどこだ！？"
10023-CVGroup_Tactic_In_2-1 = "さて、準備運動でもするか。"
10023-CVGroup_Tactic_Victory_1-1 = "全く、うっとうしいやつらだった。"
10023-CVGroup_Tactic_Victory_2-1 = "これでようやく、ゆっくり休憩ができる。"
