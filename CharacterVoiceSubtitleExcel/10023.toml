[translation]
10023-CVGroup_Battle_Buffed_1-1 = "Certo, vamos lá!"
10023-CVGroup_Battle_Covered_1-1 = "Vou me esconder por enquanto...!"
10023-CVGroup_Battle_Defense_1-1 = "Inútil!"
10023-CVGroup_Battle_In_1-1 = "A partir de agora, o treinamento do acampamento de verão vai começar!"
10023-CVGroup_Battle_In_2-1 = "Vou destruir vocês sem deixar rastros, como um castelo de areia!"
10023-CVGroup_Battle_Move_1-1 = "Mudando de posição."
10023-CVGroup_Battle_Move_2-1 = "Indo para o ponto de sniper."
10023-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10023-CVGroup_Battle_TacticalAction_1-1 = "Certo, vamos logo para o próximo local."
10023-CVGroup_Battle_Victory_1-1 = "Para idiotas que não ouvem, só resta levar bala."
10023-CVGroup_Battle_Victory_2-1 = "Francamente, só porque estamos na praia, estão todos animados demais... Bando de idiotas..."
10023-CVGroup_CommonSkill-1 = "Toma essa!"
10023-CVGroup_ExSkill_1-1 = "Francamente, bem na hora do meu descanso..."
10023-CVGroup_ExSkill_2-1 = "Me deixem relaxar um pouco..."
10023-CVGroup_ExSkill_3-1 = "E olha que hoje é meu dia de folga..."
10023-CVGroup_ExSkill_Level_1-1 = "Não vai escapar!"
10023-CVGroup_ExSkill_Level_2-1 = "Não importa a situação, você não vai escapar!"
10023-CVGroup_ExSkill_Level_3-1 = "Infratores serão punidos!"
10023-CVGroup_Formation_In_1-1 = "Sem problemas."
10023-CVGroup_Formation_In_2-1 = "Tem uma missão aqui também, é...?"
10023-CVGroup_Formation_Select-1 = "Ei, não toque onde não deve!"
10023-CVGroup_Growup_1-1 = "Isso também é um resultado do acampamento de verão."
10023-CVGroup_Growup_2-1 = "Entendo... parece que realmente adquiri novas habilidades."
10023-CVGroup_Growup_3-1 = "Só porque é verão ou porque estamos na praia, não significa que posso negligenciar o treinamento."
10023-CVGroup_Growup_4-1 = "Sim, estou definitivamente crescendo... ...Ei, para onde você está olhando!?"
10023-CVGroup_Relationship_Up_1-1 = "Sensei... eu conto com você."
10023-CVGroup_Relationship_Up_2-1 = "Você vai me acompanhar neste verão. ...Ah, digo, é sobre o treinamento!"
10023-CVGroup_Relationship_Up_3-1 = "...Por acaso, você esteve me seguindo esse tempo todo? Sério... não pode ser..."
10023-CVGroup_Relationship_Up_4-1 = "Francamente, você é uma pessoa realmente estranha. Um pervertido, um adulto patético... ...Mas, por algum motivo, não consigo te deixar sozinho."
10023-CVGroup_Tactic_In_1-1 = "Onde estão os infratores das regras!?"
10023-CVGroup_Tactic_In_2-1 = "Bem, vamos fazer um aquecimento."
10023-CVGroup_Tactic_Victory_1-1 = "Francamente, que gente irritante."
10023-CVGroup_Tactic_Victory_2-1 = "Agora, finalmente, posso descansar um pouco."
