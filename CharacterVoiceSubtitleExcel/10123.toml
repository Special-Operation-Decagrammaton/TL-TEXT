[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
10123-CVGroup_Battle_Buffed_1-1 = "Eu te agradeço muito."
10123-CVGroup_Battle_Covered_1-1 = "Vou aproveitar pra dar uma pausa curta (e suada)."
10123-CVGroup_Battle_Defense_1-1 = "Parece que me subestimaram."
10123-CVGroup_Battle_In_1-1 = "Que recepção mais calorosa e apaixonada, não é?"
10123-CVGroup_Battle_In_2-1 = "Vou superar todos os seus fetiches e ideias fixas."
10123-CVGroup_Battle_Move_1-1 = "O que será que vai sair do buraco agora...?"
10123-CVGroup_Battle_Move_2-1 = "As cortinas ainda estão se abrindo, certo?"
10123-CVGroup_Battle_Recovery_1-1 = "Serei eternamente grata a você."
10123-CVGroup_Battle_TacticalAction_1-1 = "Fuh."
10123-CVGroup_Battle_Victory_1-1 = "E esta... sou eu em toda a minha glória."
10123-CVGroup_Battle_Victory_2-1 = "......Bang! O espetáculo acabou."
10123-CVGroup_CommonSkill-1 = "Hmm... Até que a foto ficou perfeitinha demais."
10123-CVGroup_ExSkill_1-1 = "Não precisamos de preliminares enroladas, não é?"
10123-CVGroup_ExSkill_2-1 = "Vamos, grave o meu corpo na sua memória."
10123-CVGroup_ExSkill_3-1 = "Eu sou a dona desta historinha picante."
10123-CVGroup_ExSkill_Level_1-1 = "Foi um momentinho doce, gostoso e efêmero, né."
10123-CVGroup_ExSkill_Level_2-1 = "Obrigada por devorar tudo com os olhos em silêncio."
10123-CVGroup_ExSkill_Level_3-1 = "É a minha carta na manga, só pra agora."
10123-CVGroup_Formation_In_1-1 = "Vamos deixar o vento nos levar... ou fazer o que der na telha."
10123-CVGroup_Formation_In_2-1 = "Aparecer assim com o corpo à mostra... não é nada mau."
10123-CVGroup_Formation_Select-1 = "Entendi. Parece que você já tem os seus planos safados em mente."
10123-CVGroup_Growup_1-1 = "Crescimento significa a expansão das possibilidades (e das minhas medidas).\nSinto que agora posso ir para qualquer lugar que eu quiser."
10123-CVGroup_Growup_2-1 = "Não adianta chorar pelo leite derramado.\nVou agarrar o agora e aproveitar a existência do momento."
10123-CVGroup_Growup_3-1 = "Será que o meu crescimento (e as minhas curvas) tem algum limite...\nVocê não quer descobrir de perto?"
10123-CVGroup_Growup_4-1 = "Dizem que as coisas dependem da forma como você as sente...\nEntendi. Eu estou me sentindo incrivelmente radiante agora."
10123-CVGroup_Relationship_Up_1-1 = "Como agradecimento... vou expor mais uma coisinha sobre mim para você.\nQue tal darmos uma voltinha de carro sozinhos da próxima vez?\nPode deixar que eu pego no volante (e no controle da situação)."
10123-CVGroup_Relationship_Up_2-1 = "Parece que estou recebendo uma avaliação e tanto de você.\nFico super feliz em saber que o meu esforço não foi em vão."
10123-CVGroup_Relationship_Up_3-1 = "Continuar colocando peso apenas de um lado da balança é um péssimo hábito seu, sabia?\nSe continuar assim... ela vai ficar inclinada para o meu lado pra sempre, e eu vou abusar disso."
10123-CVGroup_Relationship_Up_4-1 = "Essa sua reação física... é por causa dos maiôs em geral...\nou é tesão de me ver vestida assim...?\nDe qualquer forma, acabei de entender muito bem os seus gostos."
10123-CVGroup_Tactic_In_1-1 = "Não teremos tempo nem para sentir tédio."
10123-CVGroup_Tactic_In_2-1 = "Bom, por qual buraquinho devemos começar?"
10123-CVGroup_Tactic_Victory_1-1 = "Fufu... O que você está vendo aqui é apenas uma miragem ardente de verão. Não é mesmo?"
10123-CVGroup_Tactic_Victory_2-1 = "Então é possível ter esse tipo de diversão também..."