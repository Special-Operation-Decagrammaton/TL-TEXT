[translation]
10123-CVGroup_Battle_Buffed_1-1 = "Agradeço."
10123-CVGroup_Battle_Covered_1-1 = "Vou fazer uma pequena pausa."
10123-CVGroup_Battle_Defense_1-1 = "Você me subestimou, não é?"
10123-CVGroup_Battle_In_1-1 = "Que recepção calorosa, não acha?"
10123-CVGroup_Battle_In_2-1 = "Vou mostrar que posso superar seus preconceitos."
10123-CVGroup_Battle_Move_1-1 = "O que será que vai aparecer a seguir...?"
10123-CVGroup_Battle_Move_2-1 = "A cortina ainda continua subindo, não é?"
10123-CVGroup_Battle_Recovery_1-1 = "Sou grata."
10123-CVGroup_Battle_TacticalAction_1-1 = "Hmph."
10123-CVGroup_Battle_Victory_1-1 = "Isto é... quem eu sou."
10123-CVGroup_Battle_Victory_2-1 = "...Bang! E assim termina o espetáculo."
10123-CVGroup_CommonSkill-1 = "Hmm... ficou surpreendentemente bom."
10123-CVGroup_ExSkill_1-1 = "Explicações são desnecessárias, não acha?"
10123-CVGroup_ExSkill_2-1 = "Vamos, grave isso na sua memória."
10123-CVGroup_ExSkill_3-1 = "A protagonista desta história sou eu."
10123-CVGroup_ExSkill_Level_1-1 = "Foi um momento doce e fugaz."
10123-CVGroup_ExSkill_Level_2-1 = "Agradeço por sua atenção."
10123-CVGroup_ExSkill_Level_3-1 = "Algo especial, apenas para agora."
10123-CVGroup_Formation_In_1-1 = "Vamos seguir o fluxo do vento, que tal?"
10123-CVGroup_Formation_In_2-1 = "Estar no palco principal assim não é nada mal."
10123-CVGroup_Formation_Select-1 = "Entendo. Parece que temos chances de vitória."
10123-CVGroup_Growup_1-1 = "Crescer é expandir as possibilidades.\nSinto que agora posso ir a qualquer lugar."
10123-CVGroup_Growup_2-1 = "O arrependimento não adianta nada.\nVamos agarrar o presente que existe agora."
10123-CVGroup_Growup_3-1 = "Será que o crescimento tem um fim...? Não está curioso?"
10123-CVGroup_Growup_4-1 = "Dizem que as coisas dependem de como as sentimos...\nEntendo. Sinto-me radiante."
10123-CVGroup_Relationship_Up_1-1 = "Como agradecimento... vou te contar mais uma coisa sobre mim.\nQue tal sairmos para dirigir juntos da próxima vez?\nPode deixar a direção comigo."
10123-CVGroup_Relationship_Up_2-1 = "Parece que estou recebendo uma ótima avaliação.\nFico feliz que não tenha sido apenas um esforço em vão da minha parte."
10123-CVGroup_Relationship_Up_3-1 = "Acho que é um mau hábito seu continuar colocando peso em apenas um lado da balança.\nSe continuar assim, ela nunca vai se equilibrar, não é?"
10123-CVGroup_Relationship_Up_4-1 = "Essa sua reação é por causa do traje de banho... ou por me ver nele?\nDe qualquer forma, minha compreensão sobre você se aprofundou."
10123-CVGroup_Tactic_In_1-1 = "Não tenho tempo para sentir tédio."
10123-CVGroup_Tactic_In_2-1 = "Bem, por onde devemos começar?"
10123-CVGroup_Tactic_Victory_1-1 = "Fufu... o que está aqui é apenas uma miragem. Não é?"
10123-CVGroup_Tactic_Victory_2-1 = "Então esse tipo de diversão também existe."
