[translation]
10123-CVGroup_Battle_Buffed_1-1 = "礼を言うよ。"
10123-CVGroup_Battle_Covered_1-1 = "小休止をいただくよ。"
10123-CVGroup_Battle_Defense_1-1 = "甘く見られたものだね。"
10123-CVGroup_Battle_In_1-1 = "随分と熱烈な歓迎じゃあないか。"
10123-CVGroup_Battle_In_2-1 = "君の固定観念を超えてみせよう。"
10123-CVGroup_Battle_Move_1-1 = "次は一体何が出てくるのか……。"
10123-CVGroup_Battle_Move_2-1 = "まだ幕は上がり続けているのだろう？"
10123-CVGroup_Battle_Recovery_1-1 = "感謝するよ。"
10123-CVGroup_Battle_TacticalAction_1-1 = "ふっ。"
10123-CVGroup_Battle_Victory_1-1 = "これこそが――私だよ。"
10123-CVGroup_Battle_Victory_2-1 = "……バン！これで終幕だ。"
10123-CVGroup_CommonSkill-1 = "ふむ……存外に良く撮れたな。"
10123-CVGroup_ExSkill_1-1 = "能書きは不要だろう？"
10123-CVGroup_ExSkill_2-1 = "さあ、記憶に刻むと良い。"
10123-CVGroup_ExSkill_3-1 = "この物語の主役は私なのだよ。"
10123-CVGroup_ExSkill_Level_1-1 = "玉響の甘美なひと時だったね。"
10123-CVGroup_ExSkill_Level_2-1 = "ご静聴、感謝するよ。"
10123-CVGroup_ExSkill_Level_3-1 = "今だけの、とっておきだ。"
10123-CVGroup_Formation_In_1-1 = "風の吹くまま、やってみようか。"
10123-CVGroup_Formation_In_2-1 = "こうして表舞台に出るのも、悪くないものだね。"
10123-CVGroup_Formation_Select-1 = "なるほど。勝算があるようだね。"
10123-CVGroup_Growup_1-1 = "成長とは、可能性の拡張だ。\n今なら、どこへだろうといける気がするよ。"
10123-CVGroup_Growup_2-1 = "後悔先に立たず。\n今という実存を握りしめるとしよう。"
10123-CVGroup_Growup_3-1 = "成長に果てはあるのか……気にならないかい？"
10123-CVGroup_Growup_4-1 = "物事は感じ方次第とはよく言ったものだが……\n成程。晴れやかな心地だ。"
10123-CVGroup_Relationship_Up_1-1 = "お礼に……また一つ、私のことを教えよう。\n今度、一緒にドライブに出かけてみないかい？\nハンドルは任せておいてくれ。"
10123-CVGroup_Relationship_Up_2-1 = "上々の評価を貰えているようだね。\n私の空回りではないようで、何よりだ。"
10123-CVGroup_Relationship_Up_3-1 = "天秤の片一方にだけ重りを載せ続けるのは、君の悪い癖だと思うがね。\nこのままでは、いつまでも傾いたままじゃないか。"
10123-CVGroup_Relationship_Up_4-1 = "君のその反応は、水着に対してか……はたまた私の水着姿に対してか……。\nいずれにせよ、君への理解が深まったよ。"
10123-CVGroup_Tactic_In_1-1 = "退屈だと感じる暇などないよ。"
10123-CVGroup_Tactic_In_2-1 = "さて、どこから手をつけようか。"
10123-CVGroup_Tactic_Victory_1-1 = "ふふ……ここにいるのはあくまで陽炎。そうだろう？"
10123-CVGroup_Tactic_Victory_2-1 = "こういう楽しみもあるのだね。"
