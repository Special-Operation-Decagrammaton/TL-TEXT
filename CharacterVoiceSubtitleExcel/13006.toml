[translation]
13006-CVGroup_CommonSkill-1 = "びっくりさせてあげるからね！"
13006-CVGroup_ExSkill_1-1 = "じゃーん！花火を始めよっかな！"
13006-CVGroup_ExSkill_2-1 = "ドキドキする時間がやってきたよ！"
13006-CVGroup_ExSkill_3-1 = "さあ、行っくよ～！"
13006-CVGroup_ExSkill_Level_1-1 = "くらえ～パーン！\nあはははは！面白い。"
13006-CVGroup_ExSkill_Level_2-1 = "きゃははは！\nポップコーンみたい！"
13006-CVGroup_ExSkill_Level_3-1 = "がんがん撃っちゃってー……\nば！く！は！つ！"
13006-CVGroup_Growup_1-1 = "よし！先生の期待にどんどん応えてあげる～！"
13006-CVGroup_Growup_2-1 = "どう？私のこと、もっと大切に思えるようになった？"
13006-CVGroup_Growup_3-1 = "くふふふ、もっと強くなった感じ～"
13006-CVGroup_Growup_4-1 = "私のことをここまで大切にしてくれるってことは……\n私に！愛情があるからだよね～！\nそうでしょ？"
13006-CVGroup_Relationship_Up_1-1 = "先生と一緒にいると、なんだかいつもより楽しいの。\n理由は分かんないけど。"
13006-CVGroup_Relationship_Up_2-1 = "今度は私から先生にお願いごとしてみよっかな～"
13006-CVGroup_Relationship_Up_3-1 = "くふふ～、走っていって、ギューッてしがみつきたいな。"
13006-CVGroup_Relationship_Up_4-1 = "楽しいから一緒にいるんだって思ってた。\nでも……それだけじゃなかった。きゃはっ。"
13006-CVGroup_Battle_Buffed_1-1 = "あは、ありがと。"
13006-CVGroup_Battle_Defense_1-1 = "無駄無駄～。"
13006-CVGroup_Battle_In_1-1 = "うん、とりあえず楽しく行ってみよう！"
13006-CVGroup_Battle_In_2-1 = "よ～し依頼を始めよう！"
13006-CVGroup_Battle_Move_1-1 = "きゃははっ、楽しかった～"
13006-CVGroup_Battle_Move_2-1 = "こっちには何があるのかな？"
13006-CVGroup_Battle_Recovery_1-1 = "あはは、ありがと～！"
13006-CVGroup_Battle_TacticalAction_1-1 = "いっくよ～"
13006-CVGroup_Battle_Victory_1-1 = "ぐる～んっ、楽しかった！"
13006-CVGroup_Battle_Victory_2-1 = "じゃじゃーん！勝利、勝利！"
13006-CVGroup_Formation_In_1-1 = "今すぐ行く！"
13006-CVGroup_Formation_In_2-1 = "依頼の時間、開始だよ！"
13006-CVGroup_Formation_Select-1 = "くふふ、やっぱり私が必要でしょ？"
13006-CVGroup_Tactic_In_1-1 = "わ～い！楽しく遊んでみよっかな？"
13006-CVGroup_Tactic_In_2-1 = "こいつ？とりあえずやっつけておくね～"
13006-CVGroup_Tactic_Victory_1-1 = "もう終わったでしょ？\n先生！早く遊ぼ、遊ぼ！"
13006-CVGroup_Tactic_Victory_2-1 = "くふふふ……楽しかった。"
