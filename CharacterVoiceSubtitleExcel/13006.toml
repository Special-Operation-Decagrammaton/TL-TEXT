[translation]
13006-CVGroup_CommonSkill-1 = "Vou te dar um susto, viu!"
13006-CVGroup_ExSkill_1-1 = "Tcharam! Que tal começarmos os fogos de artifício?"
13006-CVGroup_ExSkill_2-1 = "Chegou a hora de sentir o coração bater forte!"
13006-CVGroup_ExSkill_3-1 = "Vamos lá!"
13006-CVGroup_ExSkill_Level_1-1 = "Toma essa, bum!\nAhahahaha! Que divertido."
13006-CVGroup_ExSkill_Level_2-1 = "Kya-hahaha!\nParece pipoca!"
13006-CVGroup_ExSkill_Level_3-1 = "Atirem com tudo...\nE!X!P!L!O!S!Ã!O!"
13006-CVGroup_Growup_1-1 = "Certo! Vou continuar correspondendo às expectativas do Sensei!"
13006-CVGroup_Growup_2-1 = "E então? Agora você consegue me valorizar ainda mais?"
13006-CVGroup_Growup_3-1 = "Kufufu, sinto que fiquei ainda mais forte."
13006-CVGroup_Growup_4-1 = "Se você me valoriza tanto assim, significa que...\nVocê tem sentimentos por mim, né!\nNão é?"
13006-CVGroup_Relationship_Up_1-1 = "Quando estou com o Sensei, tudo parece mais divertido que o normal.\nNão sei bem o porquê."
13006-CVGroup_Relationship_Up_2-1 = "Desta vez, acho que vou ser eu a pedir algo ao Sensei."
13006-CVGroup_Relationship_Up_3-1 = "Kufufu~, dá vontade de correr até você e te dar um abraço bem apertado."
13006-CVGroup_Relationship_Up_4-1 = "Eu achava que ficava com você só porque era divertido.\nMas... não era só isso. Kya-ha."
13006-CVGroup_Battle_Buffed_1-1 = "Ah, obrigada."
13006-CVGroup_Battle_Defense_1-1 = "Inútil, inútil~."
13006-CVGroup_Battle_In_1-1 = "Certo, vamos nos divertir por enquanto!"
13006-CVGroup_Battle_In_2-1 = "Muito bem, vamos começar o trabalho!"
13006-CVGroup_Battle_Move_1-1 = "Kya-hahah, foi divertido~"
13006-CVGroup_Battle_Move_2-1 = "O que será que tem por aqui?"
13006-CVGroup_Battle_Recovery_1-1 = "Ahaha, obrigada~!"
13006-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu~"
13006-CVGroup_Battle_Victory_1-1 = "Giru-n, foi divertido!"
13006-CVGroup_Battle_Victory_2-1 = "Tcharam! Vitória, vitória!"
13006-CVGroup_Formation_In_1-1 = "Já estou indo!"
13006-CVGroup_Formation_In_2-1 = "Hora do trabalho, começando!"
13006-CVGroup_Formation_Select-1 = "Kufufu, você precisava de mim, não precisava?"
13006-CVGroup_Tactic_In_1-1 = "Eba! Que tal nos divertirmos um pouco?"
13006-CVGroup_Tactic_In_2-1 = "Esse cara? Vou acabar com ele rapidinho~"
13006-CVGroup_Tactic_Victory_1-1 = "Já acabou, né?\nSensei! Vamos brincar, vamos brincar!"
13006-CVGroup_Tactic_Victory_2-1 = "Kufufufu... foi divertido."
