[translation]
23005-CVGroup_CommonSkill-1 = "さあ！お願いします！"
23005-CVGroup_ExSkill_1-1 = "状況を把握しました。\n行きます！！"
23005-CVGroup_ExSkill_2-1 = "支援のタイミング……！\n逃しません！"
23005-CVGroup_ExSkill_3-1 = "……今です！"
23005-CVGroup_ExSkill_Level_1-1 = "後方支援、到着しました！"
23005-CVGroup_ExSkill_Level_2-1 = "タイミングばっちりですね……！"
23005-CVGroup_ExSkill_Level_3-1 = "間に合ったみたいですね。"
23005-CVGroup_Formation_In_1-1 = "後方支援はお任せください。"
23005-CVGroup_Formation_In_2-1 = "私が支援を担当します。"
23005-CVGroup_Growup_1-1 = "あはは……お気遣いありがとうございます、先生。"
23005-CVGroup_Growup_2-1 = "これで皆さんのことを、もっとサポートできますね。"
23005-CVGroup_Growup_3-1 = "えっと、私、これ以上成長してもいいのでしょうか……。"
23005-CVGroup_Growup_4-1 = "はい。先生のご期待に、応えてみせます。"
23005-CVGroup_Relationship_Up_1-1 = "えっと……先生とこうして親しくなれるのは大変嬉しいのですが……\nま、周りの皆さんから変に思われたら、どうしましょう……？"
23005-CVGroup_Relationship_Up_2-1 = "いつもこうして、先生にお世話になってばかりで……\nどう恩返しすれば良いのか、悩んでしまいます。"
23005-CVGroup_Relationship_Up_3-1 = "まだ先生から学べていないことがたくさんあるので……\nもう少し、一緒にいたいです。"
23005-CVGroup_Relationship_Up_4-1 = "今こうしていられるのは、\n私にはもったいないくらいの時間だなと、思う時があります。\nあはは……いえ、なんでもありません。"
