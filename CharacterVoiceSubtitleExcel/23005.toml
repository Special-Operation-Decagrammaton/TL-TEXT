[translation]
23005-CVGroup_CommonSkill-1 = "Certo! Conto com vocês!"
23005-CVGroup_ExSkill_1-1 = "Situação compreendida.\nVamos nessa!!"
23005-CVGroup_ExSkill_2-1 = "O momento do suporte...!\nNão vou deixar passar!"
23005-CVGroup_ExSkill_3-1 = "……Agora!"
23005-CVGroup_ExSkill_Level_1-1 = "Suporte de retaguarda, chegando!"
23005-CVGroup_ExSkill_Level_2-1 = "O timing foi perfeito...!"
23005-CVGroup_ExSkill_Level_3-1 = "Parece que cheguei a tempo."
23005-CVGroup_Formation_In_1-1 = "Pode deixar o suporte de retaguarda comigo."
23005-CVGroup_Formation_In_2-1 = "Eu ficarei responsável pelo suporte."
23005-CVGroup_Growup_1-1 = "Ahaha... obrigada pela consideração, Sensei."
23005-CVGroup_Growup_2-1 = "Com isso, poderei dar ainda mais suporte a todos."
23005-CVGroup_Growup_3-1 = "Hum, será que tudo bem eu crescer ainda mais do que isso...?"
23005-CVGroup_Growup_4-1 = "Sim. Vou me esforçar para atender às suas expectativas, Sensei."
23005-CVGroup_Relationship_Up_1-1 = "Bem... eu fico muito feliz em poder ser próxima de você, Sensei, mas...\nO que faremos se as pessoas ao redor pensarem algo estranho...?"
23005-CVGroup_Relationship_Up_2-1 = "Eu sempre recebo tanto cuidado de você, Sensei...\nFico até preocupada sobre como posso retribuir esse favor."
23005-CVGroup_Relationship_Up_3-1 = "Ainda há muitas coisas que não aprendi com você...\nPor isso, quero ficar mais um pouco ao seu lado."
23005-CVGroup_Relationship_Up_4-1 = "Às vezes, penso que o tempo que passo aqui com você\né bom demais para alguém como eu.\nAhaha... não, não é nada."
