[translation]
20052-CVGroup_CommonSkill-1 = "Por favor, assine aqui."
20052-CVGroup_ExSkill_1-1 = "Obrigada pela compra. Mufufu♪"
20052-CVGroup_ExSkill_2-1 = "Venham, aproximem-se e vejam só."
20052-CVGroup_ExSkill_3-1 = "Agradeço sempre pela preferência."
20052-CVGroup_ExSkill_Level_1-1 = "Sim~ com certeza!\nMufufu..."
20052-CVGroup_ExSkill_Level_2-1 = "Isso vai dar um bom lucro..."
20052-CVGroup_ExSkill_Level_3-1 = "As vendas estão ótimas... Mufufu."
20052-CVGroup_Formation_In_1-1 = "Vamos expandir nossos canais de venda?"
20052-CVGroup_Formation_In_2-1 = "Isso... sinto cheiro de um grande lucro...!"
20052-CVGroup_Formation_Select-1 = "Opa, me chamou?\nUm contrato? Expansão de negócios? Qual dos dois?"
20052-CVGroup_Growup_1-1 = "Melhor hoje do que ontem, melhor amanhã do que hoje...\nO crescimento diário nos levará a lucros mais brilhantes... opa, perdão.\nNos levará a um futuro melhor."
20052-CVGroup_Growup_2-1 = "Para garantir a sobrevivência do Departamento de Publicações, eu, como chefe, preciso me tornar mais forte...\nSerá que não tem algum contrato lucrativo dando sopa por aí...?"
20052-CVGroup_Growup_3-1 = "Ora, sinto que meu raciocínio ficou mais rápido.\nProfessor, se estiver procurando por um agente de contratos competente...\nSim, sim, estou aqui, mufufu."
20052-CVGroup_Growup_4-1 = "Como forma de agradecimento, escrevi meus sentimentos neste papel~\nAh, eu gostaria que você carimbasse aqui para confirmar o recebimento~\n...O texto parece um contrato? I-impressão sua~!"
20052-CVGroup_Relationship_Up_1-1 = "Hum... isso significa que a minha "afinidade" com o Professor aumentou?\n...O que eu acho?\nHum... você faz perguntas difíceis, hein."
20052-CVGroup_Relationship_Up_2-1 = "Como chefe do Departamento de Publicações, ter dificuldade em expressar sentimentos em palavras é...\nBem, então, é que...\nEu nunca senti algo assim antes..."
20052-CVGroup_Relationship_Up_3-1 = "Ah...\nTalvez seja melhor eu falar logo de uma vez e tirar esse peso das costas!\nEntão, Professor, um momento...\nAh, hum... não é nada, se puder me dar um pouco mais de tempo..."
20052-CVGroup_Relationship_Up_4-1 = "Posso deixar brechas em um contrato, mas mentir é inaceitável... ah, serei honesta.\nEstou muito feliz por ser sua aluna, Professor.\nGraças a você, meus textos ficaram incrivelmente belos.\n...Por isso, continue... revisando e corrigindo meus textos, está bem?"
