[translation]
20046-CVGroup_CommonSkill-1 = "たーまやー！にゃはっ！"
20046-CVGroup_ExSkill_1-1 = "ちょ～っと、猫の手、差し上げましょか。"
20046-CVGroup_ExSkill_2-1 = "んふふ。なぁんにも、してませんよぉ？私は。"
20046-CVGroup_ExSkill_3-1 = "にゃはっ、お恥ずかしいところをお見せしました♪"
20046-CVGroup_ExSkill_Level_1-1 = "絶景かな絶景かな〜"
20046-CVGroup_ExSkill_Level_2-1 = "さて、整えていきましょか♪"
20046-CVGroup_ExSkill_Level_3-1 = "お祭りはこれからですよぉ～？"
20046-CVGroup_Formation_In_1-1 = "にゃは～…私じゃないとダメですかぁ？"
20046-CVGroup_Formation_In_2-1 = "感謝してくださいね？\n私が動くことなんて早々ないんですから。"
20046-CVGroup_Formation_Select-1 = "あらあら～？"
20046-CVGroup_Growup_1-1 = "万事、順調快調絶好調♪実に感動的ですねぇ～"
20046-CVGroup_Growup_2-1 = "ふむ……こんな手が……\nまたひとつ賢くなりました♪"
20046-CVGroup_Growup_3-1 = "あらあら……先生も悪ですねぇ？\nこんなに頂いちゃって、いいんですか？"
20046-CVGroup_Growup_4-1 = "均衡を保つのも大変なんですよね。\n天秤を水平に保つためには、\nずっと動き続ける必要があるんですから。"
20046-CVGroup_Relationship_Up_1-1 = "困りましたねぇ……私、陰陽部の部長ですしぃ？\n肩入れしてはいけないのですけど……ほんと、困りますわぁ。"
20046-CVGroup_Relationship_Up_2-1 = "ふむ……これが駆け引きというやつなのですねぇ。\nはっ！た、ただの独り言ですよぉ？にゃはは……。"
20046-CVGroup_Relationship_Up_3-1 = "にゃはっ！？っ、少し、驚いてしまいました。\nええ……驚いた、だけですよぉ？"
20046-CVGroup_Relationship_Up_4-1 = "せ……先生……その……な、なんでもないですよぉ？\nにゃははっ〜！"
