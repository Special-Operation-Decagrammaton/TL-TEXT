[translation]
20002-CVGroup_CommonSkill-1 = "実験記録001、観察開始。"
20002-CVGroup_ExSkill_1-1 = "さあ、それではぼく様の傑作を試してみようか！"
20002-CVGroup_ExSkill_2-1 = "ふーふっふっふ。\nいってらっしゃいなのだ、ネズ助！"
20002-CVGroup_ExSkill_3-1 = "この瞬間を待っていたのだ！"
20002-CVGroup_ExSkill_Level_1-1 = "割れろ！"
20002-CVGroup_ExSkill_Level_2-1 = "広がれ！"
20002-CVGroup_ExSkill_Level_3-1 = "これ一つで身動きできなくなるぞ？"
20002-CVGroup_Formation_In_1-1 = "ようやくぼく様の真価を発揮できる時が来たのだ！"
20002-CVGroup_Formation_In_2-1 = "ふふ、ぼく様の活躍を期待してるといいのだ！"
20002-CVGroup_Growup_1-1 = "なんだこれ？ものすごい力を感じるのだ！"
20002-CVGroup_Growup_2-1 = "グレードアップしたのだ！"
20002-CVGroup_Growup_3-1 = "ふーふっふっふ、\nもっと面白い実験ができそうだ！"
20002-CVGroup_Growup_4-1 = "もっと、もーっと強くなりたい！"
20002-CVGroup_Relationship_Up_1-1 = "偉大なぼく様と仲良くなるチャンスなんて、\n先生にとってすっごいお得なことなのだ！"
20002-CVGroup_Relationship_Up_2-1 = "ぼく様の研究はすべて機密事項だけど……\n先生になら少しだけ見せてもいいのだ。"
20002-CVGroup_Relationship_Up_3-1 = "先生と一緒なら……\nどんな難題でも簡単に解決できそう。"
20002-CVGroup_Relationship_Up_4-1 = "もしかしてチーズ……好き？\n先生にも、ぼく様と同じものを好きでいて欲しいんだけど。"
