[translation]
20002-CVGroup_CommonSkill-1 = "Registro de experimento 001, iniciando observação."
20002-CVGroup_ExSkill_1-1 = "Muito bem, vamos testar a minha obra-prima!"
20002-CVGroup_ExSkill_2-1 = "Fu-fu-fu-fu.\nVá lá, Nezuke!"
20002-CVGroup_ExSkill_3-1 = "Eu estava esperando por este momento!"
20002-CVGroup_ExSkill_Level_1-1 = "Quebre!"
20002-CVGroup_ExSkill_Level_2-1 = "Espalhe-se!"
20002-CVGroup_ExSkill_Level_3-1 = "Com isso aqui, você não vai conseguir se mexer, né?"
20002-CVGroup_Formation_In_1-1 = "Finalmente chegou a hora de mostrar o meu verdadeiro valor!"
20002-CVGroup_Formation_In_2-1 = "Fufu, é melhor você esperar grandes feitos de mim!"
20002-CVGroup_Growup_1-1 = "O que é isso? Sinto um poder incrível!"
20002-CVGroup_Growup_2-1 = "Eu subi de nível!"
20002-CVGroup_Growup_3-1 = "Fu-fu-fu-fu,\nacho que vou conseguir fazer experimentos ainda mais interessantes!"
20002-CVGroup_Growup_4-1 = "Eu quero ficar mais, muito mais forte!"
20002-CVGroup_Relationship_Up_1-1 = "Ter a chance de ser amigo do grande eu é uma oportunidade incrível para você, Sensei!"
20002-CVGroup_Relationship_Up_2-1 = "Minhas pesquisas são todas confidenciais, mas... para você, Sensei, posso mostrar um pouquinho."
20002-CVGroup_Relationship_Up_3-1 = "Se estiver com você, Sensei... acho que qualquer problema difícil pode ser resolvido facilmente."
20002-CVGroup_Relationship_Up_4-1 = "Por acaso você... gosta de queijo? Eu queria que você gostasse das mesmas coisas que eu, Sensei."
