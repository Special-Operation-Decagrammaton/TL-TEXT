[translation]
16012-CVGroup_Battle_Buffed_1-1 = "Valeu!\nDepois eu te agradeço!"
16012-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
16012-CVGroup_Battle_Defense_1-1 = "Dá pra ver tudo!"
16012-CVGroup_Battle_In_1-1 = "Sensei, olha só, tá?\nJá estou indo!"
16012-CVGroup_Battle_In_2-1 = "Isso aqui é moleza!"
16012-CVGroup_Battle_Move_1-1 = "Será que tem... algo para comer por aqui?"
16012-CVGroup_Battle_Move_2-1 = "Estou com tanta fome..."
16012-CVGroup_Battle_Recovery_1-1 = "Valeu pela ajuda!"
16012-CVGroup_Battle_TacticalAction_1-1 = "Vamos em frente!"
16012-CVGroup_Battle_Victory_1-1 = "Já está tudo bem agora...?\nHã!? Vazio!?"
16012-CVGroup_Battle_Victory_2-1 = "Aqui é seguro, né...?\nHã, por que isso!?"
16012-CVGroup_CommonSkill-1 = "Ei!"
16012-CVGroup_ExSkill_1-1 = "Devagar, com cuidado...\nUaaah!?\nO que você está fazendo!!"
16012-CVGroup_ExSkill_2-1 = "Hum-hum♪\nKyaaaah!?\nN-não vou te perdoar...!"
16012-CVGroup_ExSkill_3-1 = "Um, dois...\nWa, waah!?\nPor que só eu...!"
16012-CVGroup_ExSkill_Level_1-1 = "Toma isso!!!"
16012-CVGroup_ExSkill_Level_2-1 = "Já não quero mais saber!"
16012-CVGroup_ExSkill_Level_3-1 = "Explodam tudo!!!"
16012-CVGroup_Formation_In_1-1 = "Então você não consegue sem mim, né?"
16012-CVGroup_Formation_In_2-1 = "Deixa comigo! Vou acabar com isso rapidinho!"
16012-CVGroup_Formation_Select-1 = "Ei! Vai bagunçar tudo!"
16012-CVGroup_Growup_1-1 = "Será que cresci um pouco...\nHã? Que está bom assim? Não brinca comigo!\nIsso é importante para mim!"
16012-CVGroup_Growup_2-1 = "Por que será que a comida que a gente come em dias especiais é tão gostosa...\nO que você acha, Sensei?"
16012-CVGroup_Growup_3-1 = "Se eu ficar mais forte, será que vou conseguir comer mais...\nNão tem nada a ver? E-eu já sei disso, não precisa me dizer!"
16012-CVGroup_Growup_4-1 = "Hehehe, e aí?\nVocê mudou um pouco a sua opinião sobre mim, não mudou?"
16012-CVGroup_Relationship_Up_1-1 = "Ei... esse visual, combina comigo?\nNão estou muito acostumada com esse tipo de coisa...\nQ-que foi, por que está rindo!"
16012-CVGroup_Relationship_Up_2-1 = "Sensei, você é... uma pessoa estranha.\nQuando estou com você... n-não, esquece! Esquece o que eu disse!"
16012-CVGroup_Relationship_Up_3-1 = "N-não é como se eu fosse te dar algo só porque você me elogiou!\nQuer dizer... b-bem, talvez eu dê."
16012-CVGroup_Relationship_Up_4-1 = "Que tal a gente ir comer algo gostoso qualquer dia desses?\nSabe, só nós dois... né?"
16012-CVGroup_Tactic_In_1-1 = "Presta bastante atenção!"
16012-CVGroup_Tactic_In_2-1 = "Vou terminar isso logo para ir comer, comer!"
16012-CVGroup_Tactic_Victory_1-1 = "Hum-hum, o que será que vou pedir para você me pagar hoje?"
16012-CVGroup_Tactic_Victory_2-1 = "Eu venci!\nBom, era de se esperar, né!"
