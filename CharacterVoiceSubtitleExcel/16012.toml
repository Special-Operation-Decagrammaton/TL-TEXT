[translation]
16012-CVGroup_Battle_Buffed_1-1 = "サンキュー！\nあとでお礼するわね！"
16012-CVGroup_Battle_Covered_1-1 = "隠れるわね！"
16012-CVGroup_Battle_Defense_1-1 = "見え見えなのよ！"
16012-CVGroup_Battle_In_1-1 = "先生、見ててね？\n行ってきまーす！"
16012-CVGroup_Battle_In_2-1 = "これくらい楽勝なんだから！"
16012-CVGroup_Battle_Move_1-1 = "何か……食べれるものないかな？"
16012-CVGroup_Battle_Move_2-1 = "お腹空いちゃった……。"
16012-CVGroup_Battle_Recovery_1-1 = "助かったわ！"
16012-CVGroup_Battle_TacticalAction_1-1 = "どんどん行ってみよ～！"
16012-CVGroup_Battle_Victory_1-1 = "もう大丈夫かな……？\nえっ！？空っぽ！？"
16012-CVGroup_Battle_Victory_2-1 = "ここなら安全よね……？\nえっ、どうして！？"
16012-CVGroup_CommonSkill-1 = "やあっ！"
16012-CVGroup_ExSkill_1-1 = "ゆっくり、気をつけて……。\nうあああっ！？\nなにすんのよぉおお！！"
16012-CVGroup_ExSkill_2-1 = "ふんふ～ん♪\nきゃあああっ！？\nゆ、許さない……！"
16012-CVGroup_ExSkill_3-1 = "よいしょ、よいしょ……。\nわ、わぁっ！？\nな、なんで私だけ……！"
16012-CVGroup_ExSkill_Level_1-1 = "くらいなさーい！！！"
16012-CVGroup_ExSkill_Level_2-1 = "もう知らないわよ！"
16012-CVGroup_ExSkill_Level_3-1 = "全部弾けちゃえ！！！"
16012-CVGroup_Formation_In_1-1 = "やっぱ私がいないとダメなんだ？"
16012-CVGroup_Formation_In_2-1 = "任せて！すぐに終わらせるんだから！"
16012-CVGroup_Formation_Select-1 = "ちょっと！崩れちゃうでしょ！"
16012-CVGroup_Growup_1-1 = "ちょっとは伸びたかな……。\nえ？このままでいいって？冗談じゃないわよ！\n私にとっては大事なことなの！"
16012-CVGroup_Growup_2-1 = "特別な日に食べる料理って、どうしてあんなにおいしいのかしら……\n先生はどう思う？"
16012-CVGroup_Growup_3-1 = "もっと強くなったら、食べられる量も増えるかな……。\n関係ないって？い、言われなくても分かってるわよ！"
16012-CVGroup_Growup_4-1 = "えへへ、どうかな？\n私のこと、ちょっとは見直したんじゃない？"
16012-CVGroup_Relationship_Up_1-1 = "ねえ……この格好、似合ってるかな？\nこういうの、あんまり慣れてないんだけど……。\nな、なに笑ってるの！"
16012-CVGroup_Relationship_Up_2-1 = "先生って……不思議な人。\n一緒にいると……や、やっぱなんでもない！忘れて！"
16012-CVGroup_Relationship_Up_3-1 = "ほ、褒めたって何も出ないんだからね！\nその……で、出ないことも……ないけど。"
16012-CVGroup_Relationship_Up_4-1 = "今度、おいしいものでも食べに行かない？\nその、二人だけで……ね。"
16012-CVGroup_Tactic_In_1-1 = "よーく見てるのよ！"
16012-CVGroup_Tactic_In_2-1 = "ちゃっちゃと終わらせて、ごはんごは～ん！"
16012-CVGroup_Tactic_Victory_1-1 = "ふっふーん、今日は何を奢ってもらおっかな？"
16012-CVGroup_Tactic_Victory_2-1 = "私の勝ちー！\nま、当然だけどね！"
