[translation]
10040-CVGroup_Battle_Buffed_1-1 = "ありがとう、ございます！"
10040-CVGroup_Battle_Covered_1-1 = "隠れ、ました！\n大丈夫です、本当です……！"
10040-CVGroup_Battle_Defense_1-1 = "通じま、せんっ！"
10040-CVGroup_Battle_In_1-1 = "忍術研究部の、名にかけて……！\n頑張ります！"
10040-CVGroup_Battle_In_2-1 = "忍者としての、任務ですね……！"
10040-CVGroup_Battle_Move_1-1 = "移動、します！"
10040-CVGroup_Battle_Move_2-1 = "忍者は、素早いんです……！"
10040-CVGroup_Battle_Recovery_1-1 = "ありがとう、ございます！"
10040-CVGroup_Battle_TacticalAction_1-1 = "サササッ……っと！"
10040-CVGroup_Battle_Victory_1-1 = "あれ、もしかして勝てました……？わぁっ……！"
10040-CVGroup_Battle_Victory_2-1 = "勝利、ですよね……？\nこれも、忍者の力……？"
10040-CVGroup_CommonSkill-1 = "手裏剣、痛いですよ……！"
10040-CVGroup_ExSkill_1-1 = "ツクヨ流、忍術……！\nあうぅっ！？"
10040-CVGroup_ExSkill_2-1 = "今の私に、できることを……！あっ！"
10040-CVGroup_ExSkill_3-1 = "立派な忍者に、なるためにも……！ひゃっ！？"
10040-CVGroup_ExSkill_Level_1-1 = "忍法、変わり身の術……！"
10040-CVGroup_ExSkill_Level_2-1 = "これは、得意なんです……！"
10040-CVGroup_ExSkill_Level_3-1 = "今の私は、木、誰がどう見ても木……！"
10040-CVGroup_Formation_In_1-1 = "私、ですか……？\nえっと、頑張ります……。"
10040-CVGroup_Formation_In_2-1 = "頑張り、ます……！\n立派な忍者に、なりたいので……！"
10040-CVGroup_Formation_Select-1 = "その、あんまりじっと、見ないでいただけると……。"
10040-CVGroup_Growup_1-1 = "え、私のために……えっと、頑張り、ます。"
10040-CVGroup_Growup_2-1 = "頑張ります、立派な忍者に、なりたいので……！"
10040-CVGroup_Growup_3-1 = "先生のご期待に、応えられるように……！"
10040-CVGroup_Growup_4-1 = "いつか、一人前になって……！"
10040-CVGroup_Relationship_Up_1-1 = "こんな、私でも……先生のために、頑張りたい……。"
10040-CVGroup_Relationship_Up_2-1 = "先生が、いてくれるから……\n私は、こうして……。"
10040-CVGroup_Relationship_Up_3-1 = "えっ！？私、ですか？\n大きいから、たまたま目に入った……とかでは、なく？"
10040-CVGroup_Relationship_Up_4-1 = "先生、ありがとう、ございます……\nこんな私、ですが……それでも……"
10040-CVGroup_Tactic_In_1-1 = "みなさん、怪我しないように、頑張りましょう……。"
10040-CVGroup_Tactic_In_2-1 = "こんな私で、良ければ……はいっ……。"
10040-CVGroup_Tactic_Victory_1-1 = "もしかして、勝てました……？\n良かった、です……。"
10040-CVGroup_Tactic_Victory_2-1 = "これぞ忍者の力、です！\nはい……！"
