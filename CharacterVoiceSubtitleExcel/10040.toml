[translation]
10040-CVGroup_Battle_Buffed_1-1 = "Muito, obrigada!"
10040-CVGroup_Battle_Covered_1-1 = "Eu me, escondi!\nEstá tudo bem, é verdade...!"
10040-CVGroup_Battle_Defense_1-1 = "Não vai, passar!"
10040-CVGroup_Battle_In_1-1 = "Em nome do Clube de Pesquisa Ninjutsu...!\nEu farei o meu melhor!"
10040-CVGroup_Battle_In_2-1 = "É uma missão, como ninja...!"
10040-CVGroup_Battle_Move_1-1 = "Estou, me movendo!"
10040-CVGroup_Battle_Move_2-1 = "Ninjas são, muito rápidos...!"
10040-CVGroup_Battle_Recovery_1-1 = "Muito, obrigada!"
10040-CVGroup_Battle_TacticalAction_1-1 = "Sasasa... pronto!"
10040-CVGroup_Battle_Victory_1-1 = "Ué, será que nós vencemos...? Uau...!"
10040-CVGroup_Battle_Victory_2-1 = "Vitória, não é...? \nIsso também é, o poder de um ninja...?"
10040-CVGroup_CommonSkill-1 = "Shuriken, dói, sabia...!"
10040-CVGroup_ExSkill_1-1 = "Ninjutsu estilo Tsukuyo...!\nAuuu!?"
10040-CVGroup_ExSkill_2-1 = "Vou fazer o que, eu consigo agora...! Ah!"
10040-CVGroup_ExSkill_3-1 = "Para me tornar uma ninja exemplar...! Hya!?"
10040-CVGroup_ExSkill_Level_1-1 = "Arte ninja, técnica de substituição...!"
10040-CVGroup_ExSkill_Level_2-1 = "Eu sou, muito boa nisso...!"
10040-CVGroup_ExSkill_Level_3-1 = "Agora eu sou uma árvore, quem quer que olhe, sou uma árvore...!"
10040-CVGroup_Formation_In_1-1 = "Eu, será...? \nBem, farei o meu melhor..."
10040-CVGroup_Formation_In_2-1 = "Farei, o meu melhor...! \nPorque eu quero me tornar, uma ninja exemplar...!"
10040-CVGroup_Formation_Select-1 = "Bem, se você pudesse, não ficar me encarando tanto..."
10040-CVGroup_Growup_1-1 = "Eh, por minha causa...? Bem, farei, o meu melhor."
10040-CVGroup_Growup_2-1 = "Farei o meu melhor, porque quero me tornar, uma ninja exemplar...!"
10040-CVGroup_Growup_3-1 = "Para conseguir, atender às expectativas do Sensei...!"
10040-CVGroup_Growup_4-1 = "Algum dia, eu serei uma profissional...!"
10040-CVGroup_Relationship_Up_1-1 = "Mesmo sendo, assim... eu quero me esforçar, pelo Sensei..."
10040-CVGroup_Relationship_Up_2-1 = "Porque o Sensei, está aqui comigo... \nEu, desse jeito..."
10040-CVGroup_Relationship_Up_3-1 = "Eh!? Eu? \nNão é só porque eu sou grande, que você acabou me notando...?"
10040-CVGroup_Relationship_Up_4-1 = "Sensei, muito, obrigada... \nMesmo eu sendo, assim... ainda assim..."
10040-CVGroup_Tactic_In_1-1 = "Pessoal, vamos nos esforçar para não nos machucarmos..."
10040-CVGroup_Tactic_In_2-1 = "Se eu, desse jeito, servir... sim..."
10040-CVGroup_Tactic_Victory_1-1 = "Será que, nós vencemos...? \nQue bom..."
10040-CVGroup_Tactic_Victory_2-1 = "Este é o poder de um ninja! \nSim...!"
