[translation]
23002-CVGroup_CommonSkill-1 = "Dor, dor, vai embora~"
23002-CVGroup_ExSkill_1-1 = "Uau! Não! \nEi, peguei!"
23002-CVGroup_ExSkill_2-1 = "Ah! Cuidado! \n...Por favor, fique tranquilo!"
23002-CVGroup_ExSkill_3-1 = "Ah! Peguei! \nAgora está seguro!"
23002-CVGroup_ExSkill_Level_1-1 = "Vou começar a medicação! \nTalvez... tenha feito efeito demais?"
23002-CVGroup_ExSkill_Level_2-1 = "Vou iniciar o tratamento! \nAh! Coloquei demais!"
23002-CVGroup_ExSkill_Level_3-1 = "Isso deve acabar com a dor! \n...Ta, talvez?"
23002-CVGroup_Formation_In_1-1 = "Se for tratamento, pode deixar comigo!"
23002-CVGroup_Formation_In_2-1 = "Eu vou ajudar!"
23002-CVGroup_Formation_Select-1 = "Olhe só! Fiquei muito melhor!"
23002-CVGroup_Growup_1-1 = "Eu sempre estou cheia de energia, \nmas agora estou mais animada do que nunca!"
23002-CVGroup_Growup_2-1 = "Seria ótimo se não houvesse mais ninguém se sentindo mal! \nVamos fazer isso acontecer, Sensei!"
23002-CVGroup_Growup_3-1 = "Vou me esforçar mais. Pelo Sensei. \nE para me tornar uma kouhai da qual as veteranas possam se orgulhar!"
23002-CVGroup_Growup_4-1 = "Às vezes eu cometo erros, mas não fico desanimada. \nPorque o Sensei... sempre me ajuda!"
23002-CVGroup_Relationship_Up_1-1 = "Graças ao Sensei, eu consigo ser feliz!"
23002-CVGroup_Relationship_Up_2-1 = "Eu também vou me esforçar para compartilhar a felicidade \nque recebi do Sensei com outras pessoas!"
23002-CVGroup_Relationship_Up_3-1 = "O que vence a dor não é o tratamento... \nÉ o amor. \nO Sensei me ensinou isso."
23002-CVGroup_Relationship_Up_4-1 = "Ehehe~ As bochechas do Sensei~, cutucada♪"
