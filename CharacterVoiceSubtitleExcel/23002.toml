[translation]
23002-CVGroup_CommonSkill-1 = "痛いの痛いの、飛んでいけ～"
23002-CVGroup_ExSkill_1-1 = "わわっ！ダメ！\nえいっ、捕まえた！"
23002-CVGroup_ExSkill_2-1 = "あっ！危ない！\n……ご安心ください！"
23002-CVGroup_ExSkill_3-1 = "ああっ！キャッチ！\nこれで安全です！"
23002-CVGroup_ExSkill_Level_1-1 = "投薬を始めます！\n少し……効きすぎたかも？"
23002-CVGroup_ExSkill_Level_2-1 = "治療を開始します！\nあっ！入れすぎちゃった！"
23002-CVGroup_ExSkill_Level_3-1 = "これで痛みが無くなるはず！\n……た、たぶん?"
23002-CVGroup_Formation_In_1-1 = "治療なら私に任せてください！"
23002-CVGroup_Formation_In_2-1 = "私が手伝います！"
23002-CVGroup_Formation_Select-1 = "見てください！こんなに元気になりましたよ！"
23002-CVGroup_Growup_1-1 = "いつも元気いっぱいの私ですけど、\n今はいつも以上に元気が満ち溢れてます！"
23002-CVGroup_Growup_2-1 = "具合の悪い方が、ひとりもいなくなったらいいですね！\n私と先生で、実現させていきましょう！"
23002-CVGroup_Growup_3-1 = "もっと努力します。先生のために。\nそして、先輩たちにとって自慢の後輩になるために！"
23002-CVGroup_Growup_4-1 = "ミスをすることもありますが、落ち込んだりしません。\n先生が……助けてくださいますから！"
23002-CVGroup_Relationship_Up_1-1 = "先生のおかげで、私は幸せになれます！"
23002-CVGroup_Relationship_Up_2-1 = "私も、先生にいただいた幸せを\n他の人達に分けてあげられるよう頑張ります！"
23002-CVGroup_Relationship_Up_3-1 = "痛みに打ち勝つのは治療ではなく……。\n愛なんですね。\n先生が教えてくれたんです。"
23002-CVGroup_Relationship_Up_4-1 = "えへへ～先生のほっぺた～、ツン♪"
