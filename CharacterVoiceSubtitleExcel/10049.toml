[translation]
10049-CVGroup_Battle_Buffed_1-1 = "さあ、頑張るとしよっか。"
10049-CVGroup_Battle_Defense_1-1 = "悪いね。"
10049-CVGroup_Battle_In_1-1 = "やるからには、トコトンやろう。"
10049-CVGroup_Battle_In_2-1 = "行くよ、ついてきて。"
10049-CVGroup_Battle_Move_1-1 = "まだ残ってる？"
10049-CVGroup_Battle_Move_2-1 = "終わり……じゃないよね？"
10049-CVGroup_Battle_Recovery_1-1 = "あ、ありがと。"
10049-CVGroup_Battle_TacticalAction_1-1 = "さて、と。"
10049-CVGroup_Battle_Victory_1-1 = "……うん、OK。"
10049-CVGroup_Battle_Victory_2-1 = "うん、たまにはこういうのも悪くない。"
10049-CVGroup_CommonSkill-1 = "うん、美味しい"
10049-CVGroup_ExSkill_1-1 = "ゆっくり食べる暇もない……。"
10049-CVGroup_ExSkill_2-1 = "……ああ、そっち？"
10049-CVGroup_ExSkill_3-1 = "……うん、間に合ったかな。"
10049-CVGroup_ExSkill_Level_1-1 = "ほら、行くよ。"
10049-CVGroup_ExSkill_Level_2-1 = "悪く思わないでね。"
10049-CVGroup_ExSkill_Level_3-1 = "くらえっ……！"
10049-CVGroup_Formation_In_1-1 = "……ん？私も？"
10049-CVGroup_Formation_In_2-1 = "えっと……まあ、とりあえずやってみるけど。"
10049-CVGroup_Formation_Select-1 = "……先生？何？"
10049-CVGroup_Growup_1-1 = "えっと……あ、ありがとう。先生。"
10049-CVGroup_Growup_2-1 = "他の子だっているのに……何で、私に？"
10049-CVGroup_Growup_3-1 = "これからも頑張って……って意味？\nまあ、ありがたく貰うね。"
10049-CVGroup_Growup_4-1 = "こういうのは慣れないな……\n別に、嫌ってわけじゃないけど。"
10049-CVGroup_Relationship_Up_1-1 = "こういうのって、何て表現したら良いのかな……。"
10049-CVGroup_Relationship_Up_2-1 = "先生、その……\nいや、ごめん。何でもない。"
10049-CVGroup_Relationship_Up_3-1 = "「ありがとう」って伝えるのが、\nどうしてこんなに難しいんだろうね。"
10049-CVGroup_Relationship_Up_4-1 = "何て言うか、その……\nいつも、ありがと。"
10049-CVGroup_Tactic_In_1-1 = "何だか久しぶりだな、こういうの……。"
10049-CVGroup_Tactic_In_2-1 = "本腰、入れないとね……\nじゃあ、行こうか。"
10049-CVGroup_Tactic_Victory_1-1 = "……へえ、やるじゃん。"
10049-CVGroup_Tactic_Victory_2-1 = "楽勝、かな。\nお疲れ、先生。"
