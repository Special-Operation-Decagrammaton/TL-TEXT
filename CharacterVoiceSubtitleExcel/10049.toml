[translation]
10049-CVGroup_Battle_Buffed_1-1 = "Bem, vamos dar o nosso melhor."
10049-CVGroup_Battle_Defense_1-1 = "Foi mal."
10049-CVGroup_Battle_In_1-1 = "Já que vamos fazer isso, vamos até o fim."
10049-CVGroup_Battle_In_2-1 = "Vamos lá, me sigam."
10049-CVGroup_Battle_Move_1-1 = "Ainda sobrou alguém?"
10049-CVGroup_Battle_Move_2-1 = "Isso não é... o fim, né?"
10049-CVGroup_Battle_Recovery_1-1 = "Ah, obrigada."
10049-CVGroup_Battle_TacticalAction_1-1 = "Muito bem."
10049-CVGroup_Battle_Victory_1-1 = "……Sim, OK."
10049-CVGroup_Battle_Victory_2-1 = "Sim, às vezes isso não é nada mal."
10049-CVGroup_CommonSkill-1 = "Sim, está gostoso."
10049-CVGroup_ExSkill_1-1 = "Não tenho nem tempo para comer com calma..."
10049-CVGroup_ExSkill_2-1 = "……Ah, é por ali?"
10049-CVGroup_ExSkill_3-1 = "……Sim, acho que cheguei a tempo."
10049-CVGroup_ExSkill_Level_1-1 = "Olha só, lá vou eu."
10049-CVGroup_ExSkill_Level_2-1 = "Não me leve a mal, tá?"
10049-CVGroup_ExSkill_Level_3-1 = "Toma essa...!"
10049-CVGroup_Formation_In_1-1 = "……Hm? Eu também?"
10049-CVGroup_Formation_In_2-1 = "Bem... bom, vou tentar fazer isso por enquanto."
10049-CVGroup_Formation_Select-1 = "……Sensei? O que foi?"
10049-CVGroup_Growup_1-1 = "Bem... ah, obrigada, Sensei."
10049-CVGroup_Growup_2-1 = "Tem tantas outras garotas... por que, logo eu?"
10049-CVGroup_Growup_3-1 = "Isso significa que é para eu continuar me esforçando...? Bem, aceito com gratidão."
10049-CVGroup_Growup_4-1 = "Não estou acostumada com esse tipo de coisa... Não que eu não goste, claro."
10049-CVGroup_Relationship_Up_1-1 = "Como será que eu deveria expressar isso..."
10049-CVGroup_Relationship_Up_2-1 = "Sensei, sobre isso... Não, desculpe. Não é nada."
10049-CVGroup_Relationship_Up_3-1 = "Por que será que é tão difícil dizer 'obrigada'?"
10049-CVGroup_Relationship_Up_4-1 = "Como posso dizer... Sempre, obrigada."
10049-CVGroup_Tactic_In_1-1 = "Faz tempo que não faço algo assim..."
10049-CVGroup_Tactic_In_2-1 = "Preciso levar isso a sério... Então, vamos lá."
10049-CVGroup_Tactic_Victory_1-1 = "……Heh, nada mal."
10049-CVGroup_Tactic_Victory_2-1 = "Vitória fácil, eu diria. Bom trabalho, Sensei."
