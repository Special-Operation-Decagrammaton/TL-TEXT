[translation]
10105-CVGroup_Battle_Buffed_1-1 = "これを、私に……！？"
10105-CVGroup_Battle_Covered_1-1 = "隠れます！"
10105-CVGroup_Battle_Defense_1-1 = "あうっ！"
10105-CVGroup_Battle_In_1-1 = "それでは……行ってきます！"
10105-CVGroup_Battle_In_2-1 = "私の歌を届けてきます！"
10105-CVGroup_Battle_Move_1-1 = "次のパートにいきましょう！"
10105-CVGroup_Battle_Move_2-1 = "まだ歌は終わっておりません。"
10105-CVGroup_Battle_Recovery_1-1 = "感謝します！"
10105-CVGroup_Battle_TacticalAction_1-1 = "やっ！"
10105-CVGroup_Battle_Victory_1-1 = "また次のステージでお会いしましょう。"
10105-CVGroup_Battle_Victory_2-1 = "楽しい時間はあっという間でしたね。"
10105-CVGroup_CommonSkill-1 = "き、きらきら～……はわ……！？"
10105-CVGroup_ExSkill_1-1 = "本番は練習のように……！"
10105-CVGroup_ExSkill_2-1 = "自分を信じて……！"
10105-CVGroup_ExSkill_3-1 = "私、やってみせますから！"
10105-CVGroup_ExSkill_Level_1-1 = "この想い……受け取ってください！"
10105-CVGroup_ExSkill_Level_2-1 = "あなたに届きますように……！"
10105-CVGroup_ExSkill_Level_3-1 = "皆さんのお力になりたいんです！"
10105-CVGroup_Formation_In_1-1 = "ポジション、OKです！"
10105-CVGroup_Formation_In_2-1 = "この位置で大丈夫でしょうか？"
10105-CVGroup_Formation_Select-1 = "はい！準備はできておりますよ、先生。"
10105-CVGroup_Growup_1-1 = "これは……先生がスポンサーになってくださっている、ということでしょうか？\nご期待に応えられるよう、頑張ります！"
10105-CVGroup_Growup_2-1 = "お心遣い、感謝いたします。\n最高のパフォーマンスでお返しいたしますね！"
10105-CVGroup_Growup_3-1 = "不思議と、緊張がやわらぐような……\nきっと、先生のおかげですね。"
10105-CVGroup_Growup_4-1 = "先生のおかげで、自信がどんどん湧いてきます。\n今なら、何でもできるような気がするんです。"
10105-CVGroup_Relationship_Up_1-1 = "先生も、私のことを好意的に受け止めてくださっているのでしょうか？\n……そうだと、良いのですが。"
10105-CVGroup_Relationship_Up_2-1 = "誰かのために歌うのがアイドルなら……\n私は……先生のアイドルになりたいです。"
10105-CVGroup_Relationship_Up_3-1 = "先生……\n私から、目を離さないでくださいね……？"
10105-CVGroup_Relationship_Up_4-1 = "こんなことを思うのは、罪かもしれません……\nですが、今だけは……私を見ていてください、先生。"
10105-CVGroup_Tactic_In_1-1 = "私たちの歌を、皆さんに！"
10105-CVGroup_Tactic_In_2-1 = "安らぎが届きますように。"
10105-CVGroup_Tactic_Victory_1-1 = "素敵なライブになりましたね。"
10105-CVGroup_Tactic_Victory_2-1 = "私のステージ……いかがでしたか？"
