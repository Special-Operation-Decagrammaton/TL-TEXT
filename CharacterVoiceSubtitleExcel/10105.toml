[translation]
10105-CVGroup_Battle_Buffed_1-1 = "Isso... para mim!?"
10105-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
10105-CVGroup_Battle_Defense_1-1 = "Ai!"
10105-CVGroup_Battle_In_1-1 = "Então... estou indo!"
10105-CVGroup_Battle_In_2-1 = "Vou levar minha música até vocês!"
10105-CVGroup_Battle_Move_1-1 = "Vamos para a próxima parte!"
10105-CVGroup_Battle_Move_2-1 = "A música ainda não acabou."
10105-CVGroup_Battle_Recovery_1-1 = "Agradeço!"
10105-CVGroup_Battle_TacticalAction_1-1 = "Ya!"
10105-CVGroup_Battle_Victory_1-1 = "Nos vemos no próximo palco."
10105-CVGroup_Battle_Victory_2-1 = "O tempo divertido passou rápido demais, não é?"
10105-CVGroup_CommonSkill-1 = "Brilho, brilho... hawa...!?"
10105-CVGroup_ExSkill_1-1 = "A apresentação será como o ensaio...!"
10105-CVGroup_ExSkill_2-1 = "Acredite em si mesma...!"
10105-CVGroup_ExSkill_3-1 = "Eu vou conseguir fazer isso!"
10105-CVGroup_ExSkill_Level_1-1 = "Este sentimento... por favor, aceite!"
10105-CVGroup_ExSkill_Level_2-1 = "Espero que chegue até você...!"
10105-CVGroup_ExSkill_Level_3-1 = "Eu quero ser útil para todos vocês!"
10105-CVGroup_Formation_In_1-1 = "Posição, OK!"
10105-CVGroup_Formation_In_2-1 = "Esta posição está boa?"
10105-CVGroup_Formation_Select-1 = "Sim! Estou pronta, Sensei."
10105-CVGroup_Growup_1-1 = "Isso significa que... o Sensei está sendo meu patrocinador?\nVou me esforçar para corresponder às expectativas!"
10105-CVGroup_Growup_2-1 = "Agradeço pela sua consideração.\nRetribuirei com a melhor performance possível!"
10105-CVGroup_Growup_3-1 = "É estranho, mas meu nervosismo está diminuindo...\nCom certeza é graças ao Sensei."
10105-CVGroup_Growup_4-1 = "Graças ao Sensei, minha confiança está crescendo cada vez mais.\nSinto que agora posso fazer qualquer coisa."
10105-CVGroup_Relationship_Up_1-1 = "O Sensei também me vê com bons olhos?\n...Espero que sim."
10105-CVGroup_Relationship_Up_2-1 = "Se ser um ídolo significa cantar para alguém...\nEntão eu... quero ser a ídolo do Sensei."
10105-CVGroup_Relationship_Up_3-1 = "Sensei...\nPor favor, não tire os olhos de mim...?"
10105-CVGroup_Relationship_Up_4-1 = "Pensar assim pode ser um pecado...\nMas, só por agora... olhe apenas para mim, Sensei."
10105-CVGroup_Tactic_In_1-1 = "Nossa música para todos vocês!"
10105-CVGroup_Tactic_In_2-1 = "Espero que a paz chegue até vocês."
10105-CVGroup_Tactic_Victory_1-1 = "Foi um show maravilhoso."
10105-CVGroup_Tactic_Victory_2-1 = "O meu palco... o que achou?"
