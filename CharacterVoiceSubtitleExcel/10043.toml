[translation]
10043-CVGroup_Battle_Buffed_1-1 = "ふふ、それでは参りましょう。"
10043-CVGroup_Battle_Covered_1-1 = "あら、ちょうど良いところに。"
10043-CVGroup_Battle_Defense_1-1 = "無意味ですよ。"
10043-CVGroup_Battle_In_1-1 = "では、はじめましょうか？"
10043-CVGroup_Battle_In_2-1 = "遮るなら、バラバラに致しますね？"
10043-CVGroup_Battle_Move_1-1 = "もう少し、お散歩が続きそうですね？"
10043-CVGroup_Battle_Move_2-1 = "さあ、行きましょうか。"
10043-CVGroup_Battle_Recovery_1-1 = "ふふ、ありがとうございます。"
10043-CVGroup_Battle_TacticalAction_1-1 = "場所を変えましょうか？"
10043-CVGroup_Battle_Victory_1-1 = "うふふ、この勝利を……\nあなた様に……♥"
10043-CVGroup_Battle_Victory_2-1 = "気持ちの良い勝利ですね……\nうふふっ♥"
10043-CVGroup_CommonSkill-1 = "……コバエがうるさいですね？"
10043-CVGroup_ExSkill_1-1 = "あなた様とのこの時間……\n……邪魔が入りましたね？"
10043-CVGroup_ExSkill_2-1 = "ああ、この幸せな瞬間……\n……お邪魔虫でしょうか？"
10043-CVGroup_ExSkill_3-1 = "先生、もっとおそばに……\n……先に片づけましょうか"
10043-CVGroup_ExSkill_Level_1-1 = "よくも、邪魔をしてくれましたね……。"
10043-CVGroup_ExSkill_Level_2-1 = "全て、叩き潰して差し上げます！"
10043-CVGroup_ExSkill_Level_3-1 = "消え去りなさい！"
10043-CVGroup_Formation_In_1-1 = "私を見つけてくださったのですね。うふふ……。"
10043-CVGroup_Formation_In_2-1 = "はぁい、先生のためならいくらでも……。"
10043-CVGroup_Formation_Select-1 = "あら、そんな急に撫でられてしまいますと……♥"
10043-CVGroup_Growup_1-1 = "このワカモ、先生から頂いたお力でさらに強くなりました……。\nこの全ての力は、あなた様だけのために……♥"
10043-CVGroup_Growup_2-1 = "また、強くなってしまいそうですね？\nいえ、あなた様が望むのでしたらいくらでも……♥"
10043-CVGroup_Growup_3-1 = "ああ、ますます強くなってしまいました……うふふっ。"
10043-CVGroup_Growup_4-1 = "うふふ……嬉しいです……\nこんなにも私を必要としてくださるなんて……。"
10043-CVGroup_Relationship_Up_1-1 = "さあ、もっと私のそばで……\n私は、どこにも行きませんので。"
10043-CVGroup_Relationship_Up_2-1 = "たとえ季節が移ろっていっても……\nあなた様は変わらず、私のことを愛してくださるのですね……\nああ……。"
10043-CVGroup_Relationship_Up_3-1 = "先生……あなたさま……\nあなた様、ふふふ、あ・な・た・様……♥\nああ、この溢れる想いは、どうすれば伝わるのでしょう……。"
10043-CVGroup_Relationship_Up_4-1 = "お慕いしておりますあなた様だけを、いつまでも……\n海よりも深く……。"
10043-CVGroup_Tactic_In_1-1 = "では、共に参りましょうか？"
10043-CVGroup_Tactic_In_2-1 = "さあ、見守っててくださいますか？"
10043-CVGroup_Tactic_Victory_1-1 = "これくらい、軽い散歩のようなものです。"
10043-CVGroup_Tactic_Victory_2-1 = "ふふっ♥\nご満足いただけましたでしょうか、あなた様？"
