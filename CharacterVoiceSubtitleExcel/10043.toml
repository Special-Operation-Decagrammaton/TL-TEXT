[translation]
10043-CVGroup_Battle_Buffed_1-1 = "Fufu, então vamos nessa."
10043-CVGroup_Battle_Covered_1-1 = "Ora, que lugar perfeito."
10043-CVGroup_Battle_Defense_1-1 = "Isso é inútil."
10043-CVGroup_Battle_In_1-1 = "Então, vamos começar?"
10043-CVGroup_Battle_In_2-1 = "Se pretende me impedir, quer que eu te despedace?"
10043-CVGroup_Battle_Move_1-1 = "Parece que nosso passeio vai durar um pouco mais, não é?"
10043-CVGroup_Battle_Move_2-1 = "Vamos, vamos nessa."
10043-CVGroup_Battle_Recovery_1-1 = "Fufu, obrigada."
10043-CVGroup_Battle_TacticalAction_1-1 = "Que tal mudarmos de lugar?"
10043-CVGroup_Battle_Victory_1-1 = "Ufufu, esta vitória...\nPara você...♥"
10043-CVGroup_Battle_Victory_2-1 = "Uma vitória muito satisfatória...\nUfufu♥"
10043-CVGroup_CommonSkill-1 = "...Essas moscas são irritantes, não são?"
10043-CVGroup_ExSkill_1-1 = "Este tempo com você...\n...foi interrompido, não foi?"
10043-CVGroup_ExSkill_2-1 = "Ah, este momento de felicidade...\n...será que é um intruso?"
10043-CVGroup_ExSkill_3-1 = "Sensei, fique mais perto de mim...\n...deixe-me cuidar disso primeiro."
10043-CVGroup_ExSkill_Level_1-1 = "Como ousa atrapalhar..."
10043-CVGroup_ExSkill_Level_2-1 = "Vou esmagar todos vocês!"
10043-CVGroup_ExSkill_Level_3-1 = "Desapareça!"
10043-CVGroup_Formation_In_1-1 = "Você me encontrou. Ufufu..."
10043-CVGroup_Formation_In_2-1 = "Sim, pelo Sensei, eu farei qualquer coisa..."
10043-CVGroup_Formation_Select-1 = "Ora, se você me fizer carinho tão de repente...♥"
10043-CVGroup_Growup_1-1 = "Esta Wakamo ficou ainda mais forte com o poder que recebeu do Sensei...\nTodo esse poder é apenas para você...♥"
10043-CVGroup_Growup_2-1 = "Parece que vou ficar ainda mais forte, não é?\nNão, se é isso que você deseja, farei o quanto for preciso...♥"
10043-CVGroup_Growup_3-1 = "Ah, eu fiquei ainda mais forte... ufufu."
10043-CVGroup_Growup_4-1 = "Ufufu... estou tão feliz...\nQue você precise tanto de mim assim..."
10043-CVGroup_Relationship_Up_1-1 = "Venha, fique mais perto de mim...\nEu não vou a lugar nenhum."
10043-CVGroup_Relationship_Up_2-1 = "Mesmo que as estações mudem...\nVocê continuará me amando como sempre, não é...\nAh..."
10043-CVGroup_Relationship_Up_3-1 = "Sensei... meu querido...\nVocê, fufufu, meu... que-ri-do...♥\nAh, como posso transmitir esse sentimento que transborda..."
10043-CVGroup_Relationship_Up_4-1 = "Eu te amo, apenas você, para sempre...\nMais profundo que o oceano..."
10043-CVGroup_Tactic_In_1-1 = "Então, vamos juntos?"
10043-CVGroup_Tactic_In_2-1 = "Vamos, você vai ficar observando?"
10043-CVGroup_Tactic_Victory_1-1 = "Isso não passou de um leve passeio."
10043-CVGroup_Tactic_Victory_2-1 = "Fufu♥\nVocê ficou satisfeito, meu querido?"
