[translation]
10004-CVGroup_Battle_Buffed_1-1 = "Suporte confirmado."
10004-CVGroup_Battle_Defense_1-1 = "Inútil."
10004-CVGroup_Battle_In_1-1 = "Entrando em combate. Vou invadir o mais rápido possível."
10004-CVGroup_Battle_In_2-1 = "Vamos lá."
10004-CVGroup_Battle_Move_1-1 = "Ah, que incômodo..."
10004-CVGroup_Battle_Move_2-1 = "Nossa, não importa o quanto eu faça, nunca acaba..."
10004-CVGroup_Battle_Recovery_1-1 = "Certo, recuperei."
10004-CVGroup_Battle_TacticalAction_1-1 = "Movendo-me."
10004-CVGroup_Battle_Victory_1-1 = "É, era o resultado esperado."
10004-CVGroup_Battle_Victory_2-1 = "Vitória. O que devo fazer agora?"
10004-CVGroup_CommonSkill-1 = "Vamos."
10004-CVGroup_ExSkill_1-1 = "Vou usar a força."
10004-CVGroup_ExSkill_2-1 = "Minha vez."
10004-CVGroup_ExSkill_3-1 = "Alvo confirmado."
10004-CVGroup_ExSkill_Level_1-1 = "Vamos ver quanto tempo você aguenta, né?"
10004-CVGroup_ExSkill_Level_2-1 = "Não tem como escapar."
10004-CVGroup_ExSkill_Level_3-1 = "Não vou deixar você fugir."
10004-CVGroup_Formation_In_1-1 = "Ah. Não tem jeito."
10004-CVGroup_Formation_In_2-1 = "Estou pronta."
10004-CVGroup_Formation_Select-1 = "Tudo bem."
10004-CVGroup_Growup_1-1 = "Fiquei mais forte..."
10004-CVGroup_Growup_2-1 = "Ainda consigo crescer..."
10004-CVGroup_Growup_3-1 = "Vou usar esse poder pelo Sensei."
10004-CVGroup_Growup_4-1 = "Obrigada por se importar comigo."
10004-CVGroup_Relationship_Up_1-1 = "Alguém como eu está bem...?"
10004-CVGroup_Relationship_Up_2-1 = "Obrigada... por ficar comigo, Sensei."
10004-CVGroup_Relationship_Up_3-1 = "Eu não sei muito bem o que fazer em momentos assim... desculpe."
10004-CVGroup_Relationship_Up_4-1 = "Esse calor...\nSerá que é o calor do Sensei que estou sentindo?"
10004-CVGroup_Tactic_In_1-1 = "É um incômodo, mas...\nBem, é algo que precisa ser feito."
10004-CVGroup_Tactic_In_2-1 = "Seguirei as instruções do Sensei."
10004-CVGroup_Tactic_Victory_1-1 = "Uma missão desse nível não é nada demais."
10004-CVGroup_Tactic_Victory_2-1 = "Foi um trabalho simples, mas bom trabalho, Sensei."
