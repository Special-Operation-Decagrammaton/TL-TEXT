[translation]
20010-CVGroup_CommonSkill-1 = "Cliente, há algo em que eu possa ajudar?"
20010-CVGroup_ExSkill_1-1 = "É a culinária kaiseki da Estância Termal 227!"
20010-CVGroup_ExSkill_2-1 = "É o nosso prato especial!"
20010-CVGroup_ExSkill_3-1 = "Está repleto de ingredientes luxuosos!"
20010-CVGroup_ExSkill_Level_1-1 = "Vou servir um por um, começando por quem estiver com mais fome!"
20010-CVGroup_ExSkill_Level_2-1 = "Temos comida de sobra, então não se preocupe!"
20010-CVGroup_ExSkill_Level_3-1 = "Por favor, fique à vontade e aproveite!"
20010-CVGroup_Summon_Retreat_01-1 = "Nosso expediente termina por aqui hoje!"
20010-CVGroup_Summon_Retreat_02-1 = "D-desculpe! Os ingredientes acabaram!"
20010-CVGroup_Formation_In_1-1 = "Vou mostrar a verdadeira essência de uma proprietária!"
20010-CVGroup_Formation_In_2-1 = "V-vou dar o meu melhor na hospitalidade!"
20010-CVGroup_Formation_Select-1 = "Sensei, depois do banho... você está tão... hehehe..."
20010-CVGroup_Growup_1-1 = "Hehe. O que achou, Sensei? Como está a minha presença?"
20010-CVGroup_Growup_2-1 = "Será que agora eu me tornei uma proprietária de verdade?"
20010-CVGroup_Growup_3-1 = "Preciso me esforçar ainda mais pela nossa estância termal...!"
20010-CVGroup_Growup_4-1 = "Muito obrigada por sempre apoiar a nossa Turma Especial 227—\nQuer dizer, a nossa Estância Termal 227!"
20010-CVGroup_Relationship_Up_1-1 = "Estou sempre cuidando de você, Sensei...\nSim, sempre...!"
20010-CVGroup_Relationship_Up_2-1 = "Hehe, o rosto do Sensei está radiante hoje também."
20010-CVGroup_Relationship_Up_3-1 = "Sempre deixo o melhor quarto reservado para você, Sensei!"
20010-CVGroup_Relationship_Up_4-1 = "Afinal, o Sensei é o nosso cliente VIP na estância termal!"
