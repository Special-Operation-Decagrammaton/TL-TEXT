[translation]
20010-CVGroup_CommonSkill-1 = "お客様、何かお困りのことはありませんか？"
20010-CVGroup_ExSkill_1-1 = "227号温泉郷の会席料理です！"
20010-CVGroup_ExSkill_2-1 = "自慢のお料理です！"
20010-CVGroup_ExSkill_3-1 = "豪華な素材がたっぷりです！"
20010-CVGroup_ExSkill_Level_1-1 = "お腹が空いてる方から、順番にお渡しいたします！"
20010-CVGroup_ExSkill_Level_2-1 = "料理はたっぷりありますので！"
20010-CVGroup_ExSkill_Level_3-1 = "どうぞ、ごゆるりとお楽しみください！"
20010-CVGroup_Summon_Retreat_01-1 = "本日の営業はこれにて終了です！"
20010-CVGroup_Summon_Retreat_02-1 = "す、すみません！材料切れです！"
20010-CVGroup_Formation_In_1-1 = "女将の真髄、お見せします！"
20010-CVGroup_Formation_In_2-1 = "ぜ、全力でおもてなししますっ！"
20010-CVGroup_Formation_Select-1 = "お風呂上がりの先生……すごく……ぐふふ……。"
20010-CVGroup_Growup_1-1 = "ふふっ。先生どうですか、私のこの貫禄！"
20010-CVGroup_Growup_2-1 = "これで私も、立派な女将になれたでしょうか？"
20010-CVGroup_Growup_3-1 = "温泉郷のために、もっと頑張らないと……！"
20010-CVGroup_Growup_4-1 = "いつも私たち227号特別クラ――\nいえ、227号温泉郷を支援していただき、ありがとうございます！"
20010-CVGroup_Relationship_Up_1-1 = "いつも、先生のことを見守っていますよ……\nはい、いつも……！"
20010-CVGroup_Relationship_Up_2-1 = "ふふっ、今日も先生のお顔は輝いてますね。"
20010-CVGroup_Relationship_Up_3-1 = "先生のために、いつも一番良いお部屋は空けてますので！"
20010-CVGroup_Relationship_Up_4-1 = "先生は私たちの温泉郷における、VIPのお客様ですから！"
