[translation]
20000-CVGroup_CommonSkill-1 = "支援射撃開始。"
20000-CVGroup_ExSkill_1-1 = "敵の位置を確認……\n発砲準備完了。"
20000-CVGroup_ExSkill_2-1 = "力が漲ってる……行こう！"
20000-CVGroup_ExSkill_3-1 = "今装填してるのは……怒り。"
20000-CVGroup_ExSkill_Level_1-1 = "それなりに……大変なことになるかも？"
20000-CVGroup_ExSkill_Level_2-1 = "ターゲットへ直撃……成功。"
20000-CVGroup_ExSkill_Level_3-1 = "先生の敵は……許さない。"
20000-CVGroup_Formation_In_1-1 = "私が……行く……。"
20000-CVGroup_Formation_In_2-1 = "少し、嬉しいかも。"
20000-CVGroup_Formation_Select-1 = "ん……先生の手、あったかい。落ち着く。"
20000-CVGroup_Growup_1-1 = "完成はない。それを追求する過程があるだけ。\nマイスターなら、誰もがそう。"
20000-CVGroup_Growup_2-1 = "要約すると、私、強くなった。"
20000-CVGroup_Growup_3-1 = "先生と一緒なら、意欲が湧く。\nもっと……もっとたくさん教えて。"
20000-CVGroup_Growup_4-1 = "戦闘が好きなわけではないけど、\n私も、先生の力になりたい。"
20000-CVGroup_Relationship_Up_1-1 = "もし今私の先生に対する心を検査したら……\nきっと、陽性だと思う。"
20000-CVGroup_Relationship_Up_2-1 = "これからの私はどこで、何をするんだろう？\n誰も分からないと思うけど、私は分かってる。\n先生と一緒に行く。"
20000-CVGroup_Relationship_Up_3-1 = "不思議だね。記憶機能に問題でもあるのかな？\n言いたいことがたくさんあったのに。\n先生の顔を見ると、思い出せなくなるの。"
20000-CVGroup_Relationship_Up_4-1 = "運命なんて信じてない。\nでも、先生に出会ったその瞬間から……\n運命に感謝するようになったの。"
