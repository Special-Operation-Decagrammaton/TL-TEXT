[translation]
20000-CVGroup_CommonSkill-1 = "Iniciando fogo de suporte."
20000-CVGroup_ExSkill_1-1 = "Confirmando a posição do inimigo...\nPreparada para disparar."
20000-CVGroup_ExSkill_2-1 = "Sinto o poder transbordar... Vamos lá!"
20000-CVGroup_ExSkill_3-1 = "O que estou carregando agora é... fúria."
20000-CVGroup_ExSkill_Level_1-1 = "Isso pode acabar... ficando bem sério, talvez?"
20000-CVGroup_ExSkill_Level_2-1 = "Impacto direto no alvo... sucesso."
20000-CVGroup_ExSkill_Level_3-1 = "Não vou perdoar... quem for inimigo do Sensei."
20000-CVGroup_Formation_In_1-1 = "Eu... vou..."
20000-CVGroup_Formation_In_2-1 = "Estou um pouco feliz, talvez."
20000-CVGroup_Formation_Select-1 = "Hmm... A mão do Sensei é quente. Me acalma."
20000-CVGroup_Growup_1-1 = "Não existe perfeição. Existe apenas o processo de buscá-la.\nTodo Meister sabe disso."
20000-CVGroup_Growup_2-1 = "Resumindo, eu fiquei mais forte."
20000-CVGroup_Growup_3-1 = "Estando com o Sensei, sinto motivação.\nMe ensine... me ensine muito mais."
20000-CVGroup_Growup_4-1 = "Não é que eu goste de lutar, mas...\nEu também quero ser útil para o Sensei."
20000-CVGroup_Relationship_Up_1-1 = "Se testassem meus sentimentos pelo Sensei agora...\nTenho certeza de que daria positivo."
20000-CVGroup_Relationship_Up_2-1 = "Onde e o que eu farei daqui para frente? \nNinguém sabe, mas eu sei.\nEu vou seguir com o Sensei."
20000-CVGroup_Relationship_Up_3-1 = "É estranho. Será que há algum problema na minha função de memória?\nEu tinha tantas coisas para dizer.\nMas quando vejo o rosto do Sensei, não consigo me lembrar de nada."
20000-CVGroup_Relationship_Up_4-1 = "Não acredito em destino.\nMas, desde o momento em que conheci o Sensei...\nComecei a ser grata ao destino."
