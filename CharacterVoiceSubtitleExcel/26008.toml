[translation]
26008-CVGroup_CommonSkill-1 = "出張版百夜堂名物！\n「河和たこ焼き」ですよ～！"
26008-CVGroup_ExSkill_1-1 = "百夜堂出張版！\n海の家ですよ～！"
26008-CVGroup_ExSkill_2-1 = "さあ、お召し上がりください！"
26008-CVGroup_ExSkill_3-1 = "さあ、かき氷はいかがでしょうか？"
26008-CVGroup_ExSkill_Level_1-1 = "夏と言ったら、やっぱりこれですよね！"
26008-CVGroup_ExSkill_Level_2-1 = "暑いの暑いの、飛んでけ～！"
26008-CVGroup_ExSkill_Level_3-1 = "まだまだい～っぱいありますよ！"
26008-CVGroup_Formation_In_1-1 = "百夜堂、出張しま～す！"
26008-CVGroup_Formation_In_2-1 = "百夜堂、開店で～す！"
26008-CVGroup_Growup_1-1 = "先生、どうですか？\n私のこと、ちょっとは見直しましたか？\nあ、そ、そうですか……。"
26008-CVGroup_Growup_2-1 = "さあ、また強くなってしまいました！\n今のうちがお買い得かもしれませんよ～？"
26008-CVGroup_Growup_3-1 = "私、まだまだ成長できそうです！\nふふっ、これは期待できますね？"
26008-CVGroup_Growup_4-1 = "私、まだまだ進化し続けてますよ～！\n先生も、しっかりついてきてくださいね？"
26008-CVGroup_Relationship_Up_1-1 = "大事ではない関係なんてありませんが、\nそれでも先生との関係は何だか、特別な感じがします。"
26008-CVGroup_Relationship_Up_2-1 = "営業も大事ですが、その後は、えっと……\nい、いえ、やっぱり何でもないです！"
26008-CVGroup_Relationship_Up_3-1 = "（先生とのこういう時間がもっと続けばいいのに……夏が終わったら、無くなっちゃうのかな）"
26008-CVGroup_Relationship_Up_4-1 = "夏の海って、不思議ですね。楽しくて、ワクワクして……\nそれでいて、どこか切ないところが。"
