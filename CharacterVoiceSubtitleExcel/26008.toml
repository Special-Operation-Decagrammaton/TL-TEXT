[translation]
26008-CVGroup_CommonSkill-1 = "Especialidade da filial itinerante da Hyakkiyako!\nÉ o \"Takoyaki Kawa\"!"
26008-CVGroup_ExSkill_1-1 = "Filial itinerante da Hyakkiyako!\nÉ a nossa casa de praia!"
26008-CVGroup_ExSkill_2-1 = "Vamos, sirva-se!"
26008-CVGroup_ExSkill_3-1 = "Então, que tal uma raspadinha?"
26008-CVGroup_ExSkill_Level_1-1 = "Quando se fala em verão, tem que ser isso, não é?"
26008-CVGroup_ExSkill_Level_2-1 = "Calor, calor, vá embora!"
26008-CVGroup_ExSkill_Level_3-1 = "Ainda temos muito mais!"
26008-CVGroup_Formation_In_1-1 = "A Hyakkiyako está saindo em viagem!"
26008-CVGroup_Formation_In_2-1 = "A Hyakkiyako está aberta para negócios!"
26008-CVGroup_Growup_1-1 = "Sensei, o que achou?\nVocê mudou um pouco a sua opinião sobre mim?\nAh, é, é mesmo..."
26008-CVGroup_Growup_2-1 = "Veja só, fiquei mais forte de novo!\nTalvez seja uma boa oportunidade para fazer negócio comigo agora, não acha?"
26008-CVGroup_Growup_3-1 = "Eu ainda consigo crescer muito mais!\nHehe, isso é promissor, não é?"
26008-CVGroup_Growup_4-1 = "Eu continuo evoluindo cada vez mais!\nSensei, certifique-se de me acompanhar, viu?"
26008-CVGroup_Relationship_Up_1-1 = "Não existe relacionamento que não seja importante, mas\nainda assim, sinto que a minha relação com o Sensei é algo especial."
26008-CVGroup_Relationship_Up_2-1 = "Os negócios são importantes, mas depois disso, bem...\nN-não, esqueça, não é nada!"
26008-CVGroup_Relationship_Up_3-1 = "(Eu queria que esses momentos com o Sensei durassem mais... Será que eles vão acabar quando o verão terminar?)"
26008-CVGroup_Relationship_Up_4-1 = "O mar no verão é algo misterioso. É divertido, empolgante...\nE, ao mesmo tempo, tem um toque de melancolia."
