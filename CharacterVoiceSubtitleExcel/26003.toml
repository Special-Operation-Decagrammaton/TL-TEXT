[translation]
26003-CVGroup_CommonSkill-1 = "Dodói, dodói, vai embora~"
26003-CVGroup_ExSkill_1-1 = "Ufa... preparei isso para vocês!"
26003-CVGroup_ExSkill_2-1 = "Epa, os suprimentos chegaram!"
26003-CVGroup_ExSkill_3-1 = "Aqui estão os suprimentos para vocês!"
26003-CVGroup_ExSkill_Level_1-1 = "Por favor, peguem seus suprimentos!"
26003-CVGroup_ExSkill_Level_2-1 = "Um de cada vez, começando pelos que não estão se sentindo bem!"
26003-CVGroup_ExSkill_Level_3-1 = "Usem com cuidado, viu!"
26003-CVGroup_Formation_In_1-1 = "P-pode deixar comigo!"
26003-CVGroup_Formation_In_2-1 = "Vou dar o meu melhor!"
26003-CVGroup_Growup_1-1 = "Sinto que estou muito mais saudável!"
26003-CVGroup_Growup_2-1 = "Seria tão bom se eu pudesse compartilhar essa energia com quem não está se sentindo bem..."
26003-CVGroup_Growup_3-1 = "Vou me esforçar ainda mais por aqueles que não estão bem!"
26003-CVGroup_Growup_4-1 = "Será que eu cresci um pouquinho?\nHehehe..."
26003-CVGroup_Relationship_Up_1-1 = "Estar com o Sensei parece curar o meu coração..."
26003-CVGroup_Relationship_Up_2-1 = "Fufu, que felicidade~"
26003-CVGroup_Relationship_Up_3-1 = "Eu não posso ser a médica particular só do Sensei, mas...\nEstou sempre pensando no Sensei."
26003-CVGroup_Relationship_Up_4-1 = "Vamos construir um mundo pacífico juntos!"
