26003-CVGroup_ExSkill_2-1 = "よいしょ、補給品が届きましたよ！"
26003-CVGroup_ExSkill_3-1 = "皆さんのための補給品です！"
26003-CVGroup_ExSkill_Level_1-1 = "補給品を受け取ってください！"
26003-CVGroup_ExSkill_Level_2-1 = "具合の悪い方から、順番に！"
