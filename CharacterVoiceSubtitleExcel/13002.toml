[translation]
13002-CVGroup_Battle_Buffed_1-1 = "ありがとうございます～"
13002-CVGroup_Battle_Covered_1-1 = "これは頑丈そうですね。"
13002-CVGroup_Battle_Defense_1-1 = "無駄ですよ。"
13002-CVGroup_Battle_In_1-1 = "戦闘を始めましょうか～"
13002-CVGroup_Battle_In_2-1 = "一生懸命やらないとお仕置きですよ～\n敵も……味方も……♥"
13002-CVGroup_Battle_Move_1-1 = "こちらに面白いものがありそうですね。"
13002-CVGroup_Battle_Move_2-1 = "楽しみですね♥"
13002-CVGroup_Battle_Recovery_1-1 = "ふーん……ちょっと物足りませんね。"
13002-CVGroup_Battle_TacticalAction_1-1 = "へえ～"
13002-CVGroup_Battle_Victory_1-1 = "勝利の秘訣はただ一つ～\n偏食をしないことですよ～！うふっ～♥"
13002-CVGroup_Battle_Victory_2-1 = "勝利って、甘い味がしますね。\nもっと食べたいです。\nもっとも～っとたくさん！！"
13002-CVGroup_CommonSkill-1 = "覚悟しなさ～い？"
13002-CVGroup_ExSkill_1-1 = "装填完了。\n照準合わせます……！"
13002-CVGroup_ExSkill_2-1 = "スペシャルな一発、行きます！"
13002-CVGroup_ExSkill_3-1 = "少～しだけ、怒ってますよ～"
13002-CVGroup_ExSkill_Level_1-1 = "ウェルダンでお願いします～"
13002-CVGroup_ExSkill_Level_2-1 = "熱いうちに召し上がれ～"
13002-CVGroup_ExSkill_Level_3-1 = "ほっかほかの榴弾、行きます！"
13002-CVGroup_Formation_In_1-1 = "はい～、任せてください！"
13002-CVGroup_Formation_In_2-1 = "フフッ、行ってみましょうか～"
13002-CVGroup_Formation_Select-1 = "フフフフ……♥"
13002-CVGroup_Growup_1-1 = "先生は私に……とっても期待してくれてるんですね。フフッ。"
13002-CVGroup_Growup_2-1 = "強くなるのはいいことです。\nもっと色んなことが、できるようになるって意味ですから。"
13002-CVGroup_Growup_3-1 = "食べれば食べるほど強くなる……\n女子高生の基本的な心得です。"
13002-CVGroup_Growup_4-1 = "あら。私もまだ成長期なんですよ。\n背も、心も……すべてが大きくなってますから～"
13002-CVGroup_Relationship_Up_1-1 = "一度も「食べ過ぎちゃダメ～」とか、思ったことなかったのに……。\n先生と一緒にいると……フフフッ。"
13002-CVGroup_Relationship_Up_2-1 = "フフフッ……。\n先生と一緒にいる時のこの緊張感。\n嫌いじゃないです。"
13002-CVGroup_Relationship_Up_3-1 = "どうしようかな～\n先生と一緒にいると～\n少～し、危険な気持ちになりますね。"
13002-CVGroup_Relationship_Up_4-1 = "先生のご配慮、感謝します。\n私が必要な時はいつでも言ってください。"
13002-CVGroup_Tactic_In_1-1 = "先生の期待に、お応えしますね～"
13002-CVGroup_Tactic_In_2-1 = "フフッ。ぶっ壊してみましょうか～"
13002-CVGroup_Tactic_Victory_1-1 = "完璧な勝利ですね～"
13002-CVGroup_Tactic_Victory_2-1 = "それじゃあ……食べに行きますか？\n何をって……な・ん・で・も。"
