[translation]
13002-CVGroup_Battle_Buffed_1-1 = "Muito obrigada~"
13002-CVGroup_Battle_Covered_1-1 = "Isso parece bem resistente."
13002-CVGroup_Battle_Defense_1-1 = "É inútil."
13002-CVGroup_Battle_In_1-1 = "Vamos começar a batalha~"
13002-CVGroup_Battle_In_2-1 = "Se não se esforçarem, vão levar um castigo~ \nOs inimigos... e os aliados também...♥"
13002-CVGroup_Battle_Move_1-1 = "Parece que tem algo interessante por aqui."
13002-CVGroup_Battle_Move_2-1 = "Estou ansiosa por isso♥"
13002-CVGroup_Battle_Recovery_1-1 = "Hmm... ainda não é o suficiente."
13002-CVGroup_Battle_TacticalAction_1-1 = "Ora, ora~"
13002-CVGroup_Battle_Victory_1-1 = "O segredo da vitória é apenas um~ \nNão ser exigente com a comida~! Ufu~♥"
13002-CVGroup_Battle_Victory_2-1 = "A vitória tem um gosto doce. \nQuero comer mais. \nMuito, muito mais!!"
13002-CVGroup_CommonSkill-1 = "Prepare-se~?"
13002-CVGroup_ExSkill_1-1 = "Carregamento concluído. \nEstou mirando...!"
13002-CVGroup_ExSkill_2-1 = "Um disparo especial, lá vai!"
13002-CVGroup_ExSkill_3-1 = "Estou um pouquiiiiinho brava, sabe~"
13002-CVGroup_ExSkill_Level_1-1 = "Por favor, sirva bem passado~"
13002-CVGroup_ExSkill_Level_2-1 = "Coma enquanto está quente~"
13002-CVGroup_ExSkill_Level_3-1 = "Granada bem quentinha, lá vai!"
13002-CVGroup_Formation_In_1-1 = "Sim~, pode deixar comigo!"
13002-CVGroup_Formation_In_2-1 = "Fufu, vamos nessa~"
13002-CVGroup_Formation_Select-1 = "Fufufufu...♥"
13002-CVGroup_Growup_1-1 = "O Sensei... tem muitas expectativas sobre mim, não é? Fufu."
13002-CVGroup_Growup_2-1 = "Ficar mais forte é bom. \nSignifica que serei capaz de fazer muito mais coisas."
13002-CVGroup_Growup_3-1 = "Quanto mais você come, mais forte fica... \nÉ o princípio básico de uma estudante do ensino médio."
13002-CVGroup_Growup_4-1 = "Ora. Eu ainda estou na fase de crescimento, sabe. \nMinha altura, meu coração... tudo está crescendo~"
13002-CVGroup_Relationship_Up_1-1 = "Eu nunca tinha pensado em coisas como 'não coma demais'... \nMas quando estou com o Sensei... fufufu."
13002-CVGroup_Relationship_Up_2-1 = "Fufufu... \nEssa tensão que sinto quando estou com o Sensei. \nEu não desgosto."
13002-CVGroup_Relationship_Up_3-1 = "O que eu faço~ \nQuando estou com o Sensei~ \nSinto um pouco de perigo."
13002-CVGroup_Relationship_Up_4-1 = "Agradeço pela sua consideração, Sensei. \nSempre que precisar de mim, é só chamar."
13002-CVGroup_Tactic_In_1-1 = "Vou corresponder às expectativas do Sensei~"
13002-CVGroup_Tactic_In_2-1 = "Fufu. Vamos destruir tudo~"
13002-CVGroup_Tactic_Victory_1-1 = "Uma vitória perfeita~"
13002-CVGroup_Tactic_Victory_2-1 = "Então... vamos comer alguma coisa? \nO quê... qualquer coisa."
