[translation]
16001-CVGroup_Battle_Buffed_1-1 = "あ、何だか良い感じ！"
16001-CVGroup_Battle_Covered_1-1 = "ふふっ、ゾクゾクするね！"
16001-CVGroup_Battle_Defense_1-1 = "あはっ、全然痛くないよ～？"
16001-CVGroup_Battle_In_1-1 = "全員！戦闘配置へ！\n派手に行ってみようか！"
16001-CVGroup_Battle_In_2-1 = "C&Cエージェントの力を見せてあげる！"
16001-CVGroup_Battle_Move_1-1 = "お掃除完了～♪\n次、行こう！"
16001-CVGroup_Battle_Move_2-1 = "うん、オールクリア！\n綺麗になったね♪"
16001-CVGroup_Battle_Recovery_1-1 = "最高！大好き！"
16001-CVGroup_Battle_TacticalAction_1-1 = "ふふっ、さあ次次♪"
16001-CVGroup_Battle_Victory_1-1 = "よっしゃ。ちょっとウォーミングアップできたかな！\nあれ？ふふっ。"
16001-CVGroup_Battle_Victory_2-1 = "んん～、すごくよかった。\nあらら、見ちゃった？"
16001-CVGroup_CommonSkill-1 = "覚悟しなさい！"
16001-CVGroup_ExSkill_1-1 = "アスナ！行っくよー！"
16001-CVGroup_ExSkill_2-1 = "ふふっ全然当たらないよ～。"
16001-CVGroup_ExSkill_3-1 = "いちかばちかやってみようかな！"
16001-CVGroup_ExSkill_Level_1-1 = "誰にも私を止められない！"
16001-CVGroup_ExSkill_Level_2-1 = "イッツショータイム！"
16001-CVGroup_ExSkill_Level_3-1 = "アスナ！ここに参上！"
16001-CVGroup_Formation_In_1-1 = "アスナだよ！先生！よろしく！"
16001-CVGroup_Formation_In_2-1 = "ふふっ！やっぱり私が必要なんだね！"
16001-CVGroup_Formation_Select-1 = "ヤッホー！まっかせてね～"
16001-CVGroup_Growup_1-1 = "これからが本番ね！"
16001-CVGroup_Growup_2-1 = "あれ？なんだか頭がよくなった気分！"
16001-CVGroup_Growup_3-1 = "ご主人様の期待に私は絶対、何としてでも応えるから！"
16001-CVGroup_Growup_4-1 = "ふふっ、ご主人様は私に何を望んでるの？\n今の私なら叶えてあげられるよ！"
16001-CVGroup_Relationship_Up_1-1 = "ご主人様は私に興味津々なんだね！"
16001-CVGroup_Relationship_Up_2-1 = "ご主人様が私のご奉仕を必要としてくれるなら、\nいつでもどこでも、何でもするよ！"
16001-CVGroup_Relationship_Up_3-1 = "ご主人様と一緒にいるの、楽しい！\nこれからも私と楽しく過ごそうね！"
16001-CVGroup_Relationship_Up_4-1 = "ご主人様！心配しないで！\n私はずっとご主人様のそばを離れないから！"
16001-CVGroup_Tactic_In_1-1 = "コールサインゼロワン、アスナ！\n行っくよー！"
16001-CVGroup_Tactic_In_2-1 = "さあ～それでは任務を始めてみようかな、っと！"
16001-CVGroup_Tactic_Victory_1-1 = "この空気、最高！"
16001-CVGroup_Tactic_Victory_2-1 = "みんなお疲れ！\nすっごくよかったよ！"
