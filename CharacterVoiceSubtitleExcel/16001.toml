[translation]
16001-CVGroup_Battle_Buffed_1-1 = "Ah, sinto que estou ótima!"
16001-CVGroup_Battle_Covered_1-1 = "Fufu, que emocionante!"
16001-CVGroup_Battle_Defense_1-1 = "Ah, não doeu nada~?"
16001-CVGroup_Battle_In_1-1 = "Pessoal! Posições de combate!\nVamos fazer um estrondo!"
16001-CVGroup_Battle_In_2-1 = "Vou mostrar o poder de uma agente da C&C!"
16001-CVGroup_Battle_Move_1-1 = "Limpeza concluída~♪\nVamos para a próxima!"
16001-CVGroup_Battle_Move_2-1 = "Certo, tudo limpo!\nFicou tudo brilhando, né?♪"
16001-CVGroup_Battle_Recovery_1-1 = "Incrível! Adorei!"
16001-CVGroup_Battle_TacticalAction_1-1 = "Fufu, vamos para a próxima♪"
16001-CVGroup_Battle_Victory_1-1 = "Isso. Acho que serviu como um aquecimento!\nHã? Fufu."
16001-CVGroup_Battle_Victory_2-1 = "Hmm~, foi muito bom.\nAh, você viu?"
16001-CVGroup_CommonSkill-1 = "Prepare-se!"
16001-CVGroup_ExSkill_1-1 = "Asuna! Lá vou eu!"
16001-CVGroup_ExSkill_2-1 = "Fufu, não consegue me acertar~."
16001-CVGroup_ExSkill_3-1 = "Acho que vou arriscar tudo!"
16001-CVGroup_ExSkill_Level_1-1 = "Ninguém pode me parar!"
16001-CVGroup_ExSkill_Level_2-1 = "É hora do show!"
16001-CVGroup_ExSkill_Level_3-1 = "Asuna! Cheguei!"
16001-CVGroup_Formation_In_1-1 = "Sou a Asuna! Sensei! Prazer em conhecê-lo!"
16001-CVGroup_Formation_In_2-1 = "Fufu! Viu só, você precisava de mim!"
16001-CVGroup_Formation_Select-1 = "Yoo-hoo! Pode deixar comigo~"
16001-CVGroup_Growup_1-1 = "Agora é que a diversão começa!"
16001-CVGroup_Growup_2-1 = "Hã? Sinto como se estivesse mais inteligente!"
16001-CVGroup_Growup_3-1 = "Eu vou atender às expectativas do meu mestre, não importa o que aconteça!"
16001-CVGroup_Growup_4-1 = "Fufu, o que você deseja de mim, mestre?\nCom o meu estado atual, posso realizar qualquer coisa!"
16001-CVGroup_Relationship_Up_1-1 = "Você está muito interessado em mim, não é, mestre?"
16001-CVGroup_Relationship_Up_2-1 = "Se você precisa dos meus serviços, mestre,\neu farei qualquer coisa, a qualquer hora e em qualquer lugar!"
16001-CVGroup_Relationship_Up_3-1 = "É tão divertido estar com você, mestre!\nVamos continuar nos divertindo juntos!"
16001-CVGroup_Relationship_Up_4-1 = "Mestre! Não se preocupe!\nEu nunca vou sair do seu lado!"
16001-CVGroup_Tactic_In_1-1 = "Callsign Zero-One, Asuna!\nLá vou eu!"
16001-CVGroup_Tactic_In_2-1 = "Muito bem, vamos começar a missão!"
16001-CVGroup_Tactic_Victory_1-1 = "Essa atmosfera é incrível!"
16001-CVGroup_Tactic_Victory_2-1 = "Bom trabalho, pessoal!\nFoi fantástico!"
