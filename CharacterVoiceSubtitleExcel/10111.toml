[translation]
10111-CVGroup_Battle_Buffed_1-1 = "おぅ、サンキュー！"
10111-CVGroup_Battle_Covered_1-1 = "ダリぃな！"
10111-CVGroup_Battle_Defense_1-1 = "くすぐってぇなぁ！"
10111-CVGroup_Battle_In_1-1 = "おっし、行くぞ！"
10111-CVGroup_Battle_In_2-1 = "んだよ、この量は。"
10111-CVGroup_Battle_Move_1-1 = "次！"
10111-CVGroup_Battle_Move_2-1 = "まだ残ってんのか？"
10111-CVGroup_Battle_Recovery_1-1 = "ありがとよ！"
10111-CVGroup_Battle_TacticalAction_1-1 = "はっ！"
10111-CVGroup_Battle_Victory_1-1 = "こんなもんかよ……。"
10111-CVGroup_Battle_Victory_2-1 = "相手があたしだって気づかなかったのかよ。"
10111-CVGroup_CommonSkill-1 = "お、なんかすごいな？"
10111-CVGroup_ExSkill_1-1 = "はあ、面倒くせえな。\nおい、そこ動くなよ？"
10111-CVGroup_ExSkill_2-1 = "てめぇら、歯ァ食いしばってろよ。"
10111-CVGroup_ExSkill_3-1 = "悪気……？\nあるに決まってんだろ！"
10111-CVGroup_ExSkill_4-1 = "そろそろケリつけようぜ？"
10111-CVGroup_ExSkill_5-1 = "そうかよ！んじゃ、こっちの番だな！"
10111-CVGroup_ExSkill_6-1 = "無駄、無駄ァ！"
10111-CVGroup_ExSkill_Level_1-1 = "手間かけさせやがって！"
10111-CVGroup_ExSkill_Level_2-1 = "すぐに終わらせてやる。"
10111-CVGroup_ExSkill_Level_3-1 = "これで終わりだ。"
10111-CVGroup_ExSkill_Level_4-1 = "おらおらぁー！"
10111-CVGroup_ExSkill_Level_5-1 = "ははっ！！！"
10111-CVGroup_ExSkill_Level_6-1 = "無駄なんだよ！"
10111-CVGroup_Formation_In_1-1 = "しゃあねえな。"
10111-CVGroup_Formation_In_2-1 = "あ？また仕事か？"
10111-CVGroup_Formation_Select-1 = "はあ……上着がねぇと、\nなんかビミョーなんだよな。"
10111-CVGroup_Growup_1-1 = "悪い気はしねぇな！サンキュ！"
10111-CVGroup_Growup_2-1 = "え？ああまぁ、その……ありがとな。"
10111-CVGroup_Growup_3-1 = "なんつーか、本当の生徒と先生みたいだよな。\n……いや、合ってるか。"
10111-CVGroup_Growup_4-1 = "ありがとうございます！先生！\n……ってのはどうだ？変か？"
10111-CVGroup_Relationship_Up_1-1 = "どんな格好だろうとあたしはあたしだ。\n先生もいつも通りに接してくれよな。"
10111-CVGroup_Relationship_Up_2-1 = "うーん、なんか胸がポカポカするっていうか、\nむずむずするっていうか……\nいや、別にイヤじゃねぇんだけど。"
10111-CVGroup_Relationship_Up_3-1 = "な、なんかいつもより恥ずかしい気が……\nクソッ！なんだよこれ！？"
10111-CVGroup_Relationship_Up_4-1 = "よかったら散歩でも行かねえか？\n案内するぜ。"
10111-CVGroup_Tactic_In_1-1 = "案内すんのも楽じゃねえな。"
10111-CVGroup_Tactic_In_2-1 = "ちっと多すぎねぇか？"
10111-CVGroup_Tactic_Victory_1-1 = "よし、キレイになったな。"
10111-CVGroup_Tactic_Victory_2-1 = "足りないとこがあるなら言いな。\n一気に終わらせてやるよ。"
