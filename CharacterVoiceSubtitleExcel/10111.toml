[translation]
10111-CVGroup_Battle_Buffed_1-1 = "Ah, valeu!"
10111-CVGroup_Battle_Covered_1-1 = "Que saco!"
10111-CVGroup_Battle_Defense_1-1 = "Isso faz cócegas!"
10111-CVGroup_Battle_In_1-1 = "Beleza, vamos nessa!"
10111-CVGroup_Battle_In_2-1 = "Qual é, quanta gente."
10111-CVGroup_Battle_Move_1-1 = "Próximo!"
10111-CVGroup_Battle_Move_2-1 = "Ainda tem mais?"
10111-CVGroup_Battle_Recovery_1-1 = "Valeu!"
10111-CVGroup_Battle_TacticalAction_1-1 = "Hah!"
10111-CVGroup_Battle_Victory_1-1 = "Era só isso...?"
10111-CVGroup_Battle_Victory_2-1 = "Eles não perceberam que era eu?"
10111-CVGroup_CommonSkill-1 = "Oh, isso é impressionante, não é?"
10111-CVGroup_ExSkill_1-1 = "Ah, que incômodo.\nEi, não se mexa, tá?"
10111-CVGroup_ExSkill_2-1 = "Vocês, preparem-se para o impacto."
10111-CVGroup_ExSkill_3-1 = "Má intenção...?\nClaro que eu tenho!"
10111-CVGroup_ExSkill_4-1 = "Vamos acabar logo com isso?"
10111-CVGroup_ExSkill_5-1 = "É isso, né? Então, agora é a minha vez!"
10111-CVGroup_ExSkill_6-1 = "Inútil, inútil!"
10111-CVGroup_ExSkill_Level_1-1 = "Me dando trabalho, hein!"
10111-CVGroup_ExSkill_Level_2-1 = "Vou acabar com isso rapidinho."
10111-CVGroup_ExSkill_Level_3-1 = "Isso acaba aqui."
10111-CVGroup_ExSkill_Level_4-1 = "Vamos lá!"
10111-CVGroup_ExSkill_Level_5-1 = "Haha!!!"
10111-CVGroup_ExSkill_Level_6-1 = "É inútil!"
10111-CVGroup_Formation_In_1-1 = "Não tem outro jeito."
10111-CVGroup_Formation_In_2-1 = "Ah? Mais trabalho?"
10111-CVGroup_Formation_Select-1 = "Ah... sem o casaco,\nme sinto meio estranha."
10111-CVGroup_Growup_1-1 = "Não é uma sensação ruim! Valeu!"
10111-CVGroup_Growup_2-1 = "Eh? Ah, bom, sobre isso... obrigado."
10111-CVGroup_Growup_3-1 = "Como posso dizer, parece que somos aluno e professor de verdade.\n...Não, espera, isso está certo."
10111-CVGroup_Growup_4-1 = "Muito obrigado! Professor!\n...O que acha disso? Ficou estranho?"
10111-CVGroup_Relationship_Up_1-1 = "Não importa como eu me vista, eu continuo sendo eu.\nProfessor, continue me tratando como sempre."
10111-CVGroup_Relationship_Up_2-1 = "Hmm, sinto meu peito aquecido, ou talvez,\nmeio agitado...\nNão que eu não goste, mas..."
10111-CVGroup_Relationship_Up_3-1 = "E-estou me sentindo mais envergonhada que o normal...\nDroga! O que é isso!?"
10111-CVGroup_Relationship_Up_4-1 = "Se quiser, quer dar uma volta? Eu te guio."
10111-CVGroup_Tactic_In_1-1 = "Servir de guia não é fácil."
10111-CVGroup_Tactic_In_2-1 = "Não tem gente demais aqui?"
10111-CVGroup_Tactic_Victory_1-1 = "Beleza, tudo limpo."
10111-CVGroup_Tactic_Victory_2-1 = "Se faltou alguma coisa, é só falar.\nVou acabar com tudo de uma vez."
