[translation]
10069-CVGroup_Battle_Buffed_1-1 = "お、ありがと。"
10069-CVGroup_Battle_Covered_1-1 = "大丈夫だって。"
10069-CVGroup_Battle_Defense_1-1 = "せいぜい頑張りな？"
10069-CVGroup_Battle_In_1-1 = "はいはい、呼ばれましたよっと。\nんで、何食べたい？"
10069-CVGroup_Battle_In_2-1 = "腹が減っては戦はできぬ、これ本当だからね？"
10069-CVGroup_Battle_Move_1-1 = "あっちいこっか。"
10069-CVGroup_Battle_Move_2-1 = "よし、移動するよ。"
10069-CVGroup_Battle_Recovery_1-1 = "や～助かった！"
10069-CVGroup_Battle_TacticalAction_1-1 = "進むよ。"
10069-CVGroup_Battle_Victory_1-1 = "ま、こんなもんかな。\n皆、お疲れ～。"
10069-CVGroup_Battle_Victory_2-1 = "皆お疲れ。\nお腹空いてる人～?"
10069-CVGroup_CommonSkill-1 = "装填、発射！"
10069-CVGroup_ExSkill_1-1 = "よいしょ、っと……！\nはい！召し上がれ！"
10069-CVGroup_ExSkill_2-1 = "それじゃ……！\nはっ！これでどうかな？"
10069-CVGroup_ExSkill_3-1 = "お代わりは！\nまだまだあるよ～"
10069-CVGroup_ExSkill_Level_1-1 = "はい、出来上がり……それっ！"
10069-CVGroup_ExSkill_Level_2-1 = "よし、できた……。\nたーんとお食べ！"
10069-CVGroup_ExSkill_Level_3-1 = "お腹空いちゃった？\n好きなだけ食べて！"
10069-CVGroup_Formation_In_1-1 = "なんか作ろっか？"
10069-CVGroup_Formation_In_2-1 = "あたしの手伝いが必要？任せて。"
10069-CVGroup_Formation_Select-1 = "うわっ……！危ないな。\n優しく触ってね。"
10069-CVGroup_Growup_1-1 = "あれ、あたし強くなっちゃった？"
10069-CVGroup_Growup_2-1 = "この感覚……うん、悪くないね。\n先生のおかげかな。"
10069-CVGroup_Growup_3-1 = "ありがとう、先生。\n今度、玄武商会に来てくれる？\nご馳走するからさ。"
10069-CVGroup_Growup_4-1 = "強くなったから、ご飯をこれからもっとたくさん作れるんじゃ……？\n先生、お腹空いてない？"
10069-CVGroup_Relationship_Up_1-1 = "私は皆の料理人で、厨房長で、商会長だけど……。\nたまに……たった一人だけの……\n特別な何かになりたいと、思うことがあるんだ。"
10069-CVGroup_Relationship_Up_2-1 = "ん……ごめん、先生。\nこんな気持ちは、その……慣れてなくてさ。\nというか、はじめて……で……。"
10069-CVGroup_Relationship_Up_3-1 = "今日……先生を招待したいんだけど。どう？\n商会長としてじゃなく、一生徒の、ルミとして。"
10069-CVGroup_Relationship_Up_4-1 = "責任というのは大変で、重たくて、\n時に……手放したくもなる。\n……ありがとう、先生。今の話、聞いてくれて。"
10069-CVGroup_Tactic_In_1-1 = "じゃ、はじめよっか。\nしっかりついてきて。"
10069-CVGroup_Tactic_In_2-1 = "敵か……。\n交渉ができたら良かったんだけど。"
10069-CVGroup_Tactic_Victory_1-1 = "はい、次！"
10069-CVGroup_Tactic_Victory_2-1 = "こんなの朝飯前だよ。"
