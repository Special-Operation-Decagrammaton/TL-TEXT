[translation]
10069-CVGroup_Battle_Buffed_1-1 = "Oh, obrigada."
10069-CVGroup_Battle_Covered_1-1 = "Eu estou bem, relaxa."
10069-CVGroup_Battle_Defense_1-1 = "Dê o seu melhor, tá?"
10069-CVGroup_Battle_In_1-1 = "Sim, sim, fui chamada, né?\nE então, o que você quer comer?"
10069-CVGroup_Battle_In_2-1 = "Não se pode lutar de estômago vazio, isso é um fato, sabia?"
10069-CVGroup_Battle_Move_1-1 = "Vamos para lá."
10069-CVGroup_Battle_Move_2-1 = "Certo, vamos nos mover."
10069-CVGroup_Battle_Recovery_1-1 = "Ah~ salvou minha vida!"
10069-CVGroup_Battle_TacticalAction_1-1 = "Avançando."
10069-CVGroup_Battle_Victory_1-1 = "Bem, acho que foi isso.\nBom trabalho, pessoal."
10069-CVGroup_Battle_Victory_2-1 = "Bom trabalho, pessoal.\nAlguém está com fome?"
10069-CVGroup_CommonSkill-1 = "Carregar, disparar!"
10069-CVGroup_ExSkill_1-1 = "Eita...!\nPronto! Sirva-se!"
10069-CVGroup_ExSkill_2-1 = "Então...!\nHa! O que acha disso?"
10069-CVGroup_ExSkill_3-1 = "Quer repetir?\nAinda tem mais aqui~"
10069-CVGroup_ExSkill_Level_1-1 = "Pronto, está feito... lá vai!"
10069-CVGroup_ExSkill_Level_2-1 = "Certo, terminei...\nComa bastante!"
10069-CVGroup_ExSkill_Level_3-1 = "Ficou com fome?\nComa o quanto quiser!"
10069-CVGroup_Formation_In_1-1 = "Quer que eu prepare algo?"
10069-CVGroup_Formation_In_2-1 = "Precisa da minha ajuda? Pode deixar comigo."
10069-CVGroup_Formation_Select-1 = "Uau...! Cuidado.\nToque com delicadeza, por favor."
10069-CVGroup_Growup_1-1 = "Ué, eu fiquei mais forte?"
10069-CVGroup_Growup_2-1 = "Essa sensação... hum, não é nada mal.\nSerá que é graças ao Sensei?"
10069-CVGroup_Growup_3-1 = "Obrigada, Sensei.\nVocê pode vir à Associação Genbu qualquer dia desses?\nEu vou preparar um banquete para você."
10069-CVGroup_Growup_4-1 = "Já que fiquei mais forte, será que agora consigo cozinhar ainda mais...?\nSensei, você não está com fome?"
10069-CVGroup_Relationship_Up_1-1 = "Eu sou a cozinheira de todos, a chefe da cozinha e a presidente da associação, mas...\nÀs vezes... eu penso em querer ser...\nAlgo especial para apenas uma pessoa."
10069-CVGroup_Relationship_Up_2-1 = "Hum... desculpe, Sensei.\nEu não estou acostumada com esse tipo de sentimento...\nQuer dizer, é a primeira vez... para mim..."
10069-CVGroup_Relationship_Up_3-1 = "Hoje... eu queria te convidar para algo. O que acha?\nNão como presidente da associação, mas como uma aluna, a Lumi."
10069-CVGroup_Relationship_Up_4-1 = "A responsabilidade é algo difícil e pesado, e\nàs vezes... dá vontade de largar tudo.\n...Obrigada, Sensei. Por me ouvir."
10069-CVGroup_Tactic_In_1-1 = "Então, vamos começar.\nFique bem perto de mim."
10069-CVGroup_Tactic_In_2-1 = "Inimigos, hein...\nSeria bom se pudéssemos negociar."
10069-CVGroup_Tactic_Victory_1-1 = "Certo, próximo!"
10069-CVGroup_Tactic_Victory_2-1 = "Isso é moleza para mim."
