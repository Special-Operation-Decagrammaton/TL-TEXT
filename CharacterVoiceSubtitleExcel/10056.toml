[translation]
10056-CVGroup_Battle_Buffed_1-1 = "Senti uma energia renovada.\nMuito obrigada!"
10056-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
10056-CVGroup_Battle_Defense_1-1 = "Ah! Essa foi por pouco..."
10056-CVGroup_Battle_In_1-1 = "Pessoal, vamos partir!"
10056-CVGroup_Battle_In_2-1 = "Vamos começar!"
10056-CVGroup_Battle_Move_1-1 = "Para onde vamos agora?"
10056-CVGroup_Battle_Move_2-1 = "Já estou indo!"
10056-CVGroup_Battle_Recovery_1-1 = "Muito obrigada!"
10056-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10056-CVGroup_Battle_Victory_1-1 = "Vencemos!\nEntão, vamos distribuir os presentes!"
10056-CVGroup_Battle_Victory_2-1 = "Bom trabalho a todos.\nTivemos um Natal maravilhoso, não é?"
10056-CVGroup_CommonSkill-1 = "É um presente!\nEspero que goste..."
10056-CVGroup_ExSkill_1-1 = "O amor está se espalhando."
10056-CVGroup_ExSkill_2-1 = "Que, junto com este som, haja esperança."
10056-CVGroup_ExSkill_3-1 = "Está tudo bem, vai dar certo."
10056-CVGroup_ExSkill_Level_1-1 = "Que seus dias sejam repletos de alegria."
10056-CVGroup_ExSkill_Level_2-1 = "A Ordem dos Hospitalários está com você!"
10056-CVGroup_ExSkill_Level_3-1 = "Que essa dor seja removida."
10056-CVGroup_Formation_In_1-1 = "Fufu, sinto-me feliz por algum motivo."
10056-CVGroup_Formation_In_2-1 = "Que haja bênçãos..."
10056-CVGroup_Formation_Select-1 = "Feliz Natal!"
10056-CVGroup_Growup_1-1 = "Tentar ser o Papai Noel... é uma boa experiência."
10056-CVGroup_Growup_2-1 = "Muito obrigada, Sensei.\nEstou muito feliz... meu coração está cheio de gratidão."
10056-CVGroup_Growup_3-1 = "Será que consegui ficar um pouco parecida com o Papai Noel?"
10056-CVGroup_Growup_4-1 = "Acho que fui eu quem recebeu a felicidade."
10056-CVGroup_Relationship_Up_1-1 = "Que todos tenham um Natal feliz..."
10056-CVGroup_Relationship_Up_2-1 = "Digo... será que é permitido ser o Papai Noel de apenas uma pessoa especial?\nN-não, esqueça o que eu disse!"
10056-CVGroup_Relationship_Up_3-1 = "Meu coração está transbordando com o presente do Sensei..."
10056-CVGroup_Relationship_Up_4-1 = "Sou sempre grata a você... sim, de todo o meu coração."
10056-CVGroup_Tactic_In_1-1 = "Você confia em mim?"
10056-CVGroup_Tactic_In_2-1 = "Farei o meu melhor."
10056-CVGroup_Tactic_Victory_1-1 = "Que bom!\nEstão todos bem."
10056-CVGroup_Tactic_Victory_2-1 = "Será que fui útil?"
