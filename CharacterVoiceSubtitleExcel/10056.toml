[translation]
10056-CVGroup_Battle_Buffed_1-1 = "元気が出ました。\nありがとうございます！"
10056-CVGroup_Battle_Covered_1-1 = "隠れます！"
10056-CVGroup_Battle_Defense_1-1 = "きゃっ！危ないところでした……。"
10056-CVGroup_Battle_In_1-1 = "皆さん、出発です！"
10056-CVGroup_Battle_In_2-1 = "始めていきましょう！"
10056-CVGroup_Battle_Move_1-1 = "次はどこでしょう？"
10056-CVGroup_Battle_Move_2-1 = "今行きます！"
10056-CVGroup_Battle_Recovery_1-1 = "ありがとうございます！"
10056-CVGroup_Battle_TacticalAction_1-1 = "移動します。"
10056-CVGroup_Battle_Victory_1-1 = "勝ちました！\nそれでは、プレゼントを配りにいきましょう！"
10056-CVGroup_Battle_Victory_2-1 = "皆さん、お疲れさまでした。\n素敵なクリスマスになりましたね！"
10056-CVGroup_CommonSkill-1 = "プレゼントです！\n気に入っていただけたらいいんですが……。"
10056-CVGroup_ExSkill_1-1 = "愛が広がっていきます。"
10056-CVGroup_ExSkill_2-1 = "この音と共に、希望があらんことを。"
10056-CVGroup_ExSkill_3-1 = "大丈夫、うまくいきますよ。"
10056-CVGroup_ExSkill_Level_1-1 = "喜びに満ちた日々でありますよう。"
10056-CVGroup_ExSkill_Level_2-1 = "救護騎士団がご一緒します！"
10056-CVGroup_ExSkill_Level_3-1 = "その苦痛が取り払われますよう。"
10056-CVGroup_Formation_In_1-1 = "ふふっ、なんだか嬉しいですね。"
10056-CVGroup_Formation_In_2-1 = "祝福があらんことを……。"
10056-CVGroup_Formation_Select-1 = "メリークリスマス！"
10056-CVGroup_Growup_1-1 = "サンタさんになってみるのも……良い経験ですね。"
10056-CVGroup_Growup_2-1 = "ありがとうございます、先生。\nとても嬉しいです……いつも感謝でいっぱいです。"
10056-CVGroup_Growup_3-1 = "私、少しはサンタさんらしくなれたでしょうか？"
10056-CVGroup_Growup_4-1 = "私のほうが、幸せをもらってしまいましたね。"
10056-CVGroup_Relationship_Up_1-1 = "皆さんにとって、幸せなクリスマスになりますように……。"
10056-CVGroup_Relationship_Up_2-1 = "その……たった一人のためのサンタさんも許されるんでしょうか……\nな、何でもありませんっ！"
10056-CVGroup_Relationship_Up_3-1 = "先生からのプレゼントで胸がいっぱいです……。"
10056-CVGroup_Relationship_Up_4-1 = "いつも感謝しています……はい、心から。"
10056-CVGroup_Tactic_In_1-1 = "私を信じてくださいますか？"
10056-CVGroup_Tactic_In_2-1 = "精一杯、頑張りますね。"
10056-CVGroup_Tactic_Victory_1-1 = "良かったです！\n皆さんご無事ですね。"
10056-CVGroup_Tactic_Victory_2-1 = "私、お役に立てたんでしょうか？"
