[translation]
20057-CVGroup_CommonSkill-1 = "Muito bem, vamos começar a limpeza."
20057-CVGroup_ExSkill_1-1 = "Ora, olá?"
20057-CVGroup_ExSkill_2-1 = "Então você veio até aqui."
20057-CVGroup_ExSkill_3-1 = "Por favor, abaixe-se."
20057-CVGroup_ExSkill_Level_1-1 = "Bem, vamos finalizar isso."
20057-CVGroup_ExSkill_Level_2-1 = "O trabalho de hoje termina aqui."
20057-CVGroup_ExSkill_Level_3-1 = "Vamos limpar tudo perfeitamente."
20057-CVGroup_Formation_In_1-1 = "Para onde vamos?"
20057-CVGroup_Formation_In_2-1 = "Por favor, aproveite o cotidiano do Millennium com calma."
20057-CVGroup_Formation_Select-1 = "É uma sensação nova ser chamada assim formalmente.\n……Sensei?"
20057-CVGroup_Growup_1-1 = "Como uma empregada perfeita, devo ser exemplar tanto nos estudos quanto nas artes marciais.\nComo aluna, o mesmo se aplica."
20057-CVGroup_Growup_2-1 = "Obrigada por sempre cuidar de mim.\nMe esforçarei para corresponder às suas expectativas, Mestre."
20057-CVGroup_Growup_3-1 = "Tudo é fruto do esforço diário.\nSe, por acaso, o Sensei pudesse compartilhar esse cotidiano comigo……\nTalvez um futuro diferente nos aguarde."
20057-CVGroup_Growup_4-1 = "Como ganhei um pouco mais de tempo, estive pensando em novas formas de limpeza.\nUltimamente, tenho pesquisado sobre cartuchos explosivos para remoção……"
20057-CVGroup_Relationship_Up_1-1 = "Às vezes, eu fico imaginando.\nComo teria sido se eu tivesse conhecido o Sensei de outra forma?\nPor exemplo…… se fôssemos \"colegas de classe\"……\nFufu, mas…… acho que o Sensei sempre será o \"Sensei\", não é?"
20057-CVGroup_Relationship_Up_2-1 = "Usar o uniforme é algo natural para mim.\nMas, ouvir que ele me cai bem é algo que sempre me deixa feliz."
20057-CVGroup_Relationship_Up_3-1 = "Muito obrigada por tudo, Sensei.\nE…… e também……\nUfa, eu achei que estava preparada, mas é surpreendentemente difícil.\nNão, é que, bem…… eu, eu amo você……"
20057-CVGroup_Relationship_Up_4-1 = "Existe uma sala de aula que fica vazia depois da escola……\nSe eu te convidasse, o Sensei viria?\n……Fufu. É brincadeira. Por enquanto, ainda não."
