[translation]
20057-CVGroup_CommonSkill-1 = "さあ、お掃除を始めましょう。"
20057-CVGroup_ExSkill_1-1 = "あら、こんにちは？"
20057-CVGroup_ExSkill_2-1 = "こちらにいらっしゃったのですね。"
20057-CVGroup_ExSkill_3-1 = "伏せていてくださいね。"
20057-CVGroup_ExSkill_Level_1-1 = "では、仕上げといきましょう。"
20057-CVGroup_ExSkill_Level_2-1 = "本日のお仕事は、こちらで終わり。"
20057-CVGroup_ExSkill_Level_3-1 = "綺麗に掃除いたしましょう。"
20057-CVGroup_Formation_In_1-1 = "どちらへ行かれますか？"
20057-CVGroup_Formation_In_2-1 = "ミレニアムの日常をごゆっくりお楽しみください。"
20057-CVGroup_Formation_Select-1 = "改まってこうお呼びするのも新鮮ですね。\n……先生？"
20057-CVGroup_Growup_1-1 = "完璧なメイドとして、文武両道でなければなりません。\n生徒としても同じく。"
20057-CVGroup_Growup_2-1 = "いつも気にかけてくださりありがとうございます。\nご主人様に応えられるよう、尽力いたします。"
20057-CVGroup_Growup_3-1 = "すべては毎日の積み重ね。\nもしも、その日常を先生が共にしてくださるとしたら……\nあるいは、異なる未来が待ち受けているのかもしれません。"
20057-CVGroup_Growup_4-1 = "余裕ができてきたので、新しいお掃除の仕方を考えていたんです。\n最近は撤去用の爆裂カートリッジを研究していまして……。"
20057-CVGroup_Relationship_Up_1-1 = "ときどき、想像してしまうのです。\nもしも先生と違う出会い方をしていたら、と。\n例えば……「同級生」だったのなら……。\nふふっ、ですが……やはり先生は「先生」なのでしょうね。"
20057-CVGroup_Relationship_Up_2-1 = "制服を着るのは当たり前です。\nですが、似合うと言っていただけるのはいつでも嬉しいのですよ？"
20057-CVGroup_Relationship_Up_3-1 = "いつもありがとうございます、先生。\nそして……そして……。\nふぅ、覚悟したつもりでしたが、意外と難しいものですね。\nいえ、ですから、その……お、お慕い申して……おります……。"
20057-CVGroup_Relationship_Up_4-1 = "放課後、誰も来ない教室があるのですが……\nお誘いしたら、先生は来てくださるのでしょうか？\n……ふふっ。冗談です。今は、まだ。"
