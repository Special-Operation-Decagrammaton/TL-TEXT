[translation]
20057-CVGroup_CommonSkill-1 = "Что ж, давайте начнём уборку."
20057-CVGroup_ExSkill_1-1 = "Ох, здравствуйте."
20057-CVGroup_ExSkill_2-1 = " Так вы всё-таки пришли сюда."
20057-CVGroup_ExSkill_3-1 = "Пожалуйста, не поднимайтесь."
20057-CVGroup_ExSkill_Level_1-1 = "А теперь давайте покончим с этим."
20057-CVGroup_ExSkill_Level_2-1 = "На этом сегодняшняя работа завершена."
20057-CVGroup_ExSkill_Level_3-1 = "Давайте уберем здесь всё как следует."
20057-CVGroup_Formation_In_1-1 = "Куда мы направляемся?"
20057-CVGroup_Formation_In_2-1 = "Пожалуйста, наслаждайтесь временем, проведённым в Миллениуме."
20057-CVGroup_Formation_Select-1 = "Чувствую себя необычно, когда меня вот так зовут.\n...Сенсей?"
20057-CVGroup_Growup_1-1 = "Как идеальная горничная, я должна преуспевать как в учёбе, так и в боевых искусствах.\nИ как прилежная ученица — тоже."
20057-CVGroup_Growup_2-1 = "Спасибо, что всегда приглядываете за мной.\nЯ сделаю всё возможное, чтобы оправдать ваши ожидания, Мастер."
20057-CVGroup_Growup_3-1 = "Всё строится на повседневной рутине.\nЕсли бы вы разделили эту повседневную жизнь со мной, Сенсей...\nВозможно, нас бы ждало совсем другое будущее."
20057-CVGroup_Growup_4-1 = "У меня появилось немного свободного времени, поэтому я размышляла о новых способах уборки.\nНедавно я изучала применение разрывных патронов для целей зачистки..."
20057-CVGroup_Relationship_Up_1-1 = "Иногда я ловлю себя на фантазиях.\nЧто если бы мы встретились иначе, Сенсей?\nНапример... если бы мы были «одноклассниками»...\nХе-хе, хотя... думаю, вы в любом случае остались бы моим «Сенсеем»."
20057-CVGroup_Relationship_Up_2-1 = "Носить эту форму вполне естественно.\nНо мне всегда приятно, когда вы говорите, что она мне идёт."
20057-CVGroup_Relationship_Up_3-1 = "Спасибо вам за всё, Сенсей.\nИ... и...\n*Вздох*, мне казалось, я была готова, но это на удивление трудно.\nНет, я имею в виду... ну... вы... вы мне... очень дороги..."
20057-CVGroup_Relationship_Up_4-1 = "После уроков есть один класс, куда никто и никогда не заглядывает...\nЕсли бы я пригласила вас туда, вы бы пришли, Сенсей?\n...Хе-хе. Просто шутка. Ну, по крайней мере, пока что."