[translation]
20033-CVGroup_CommonSkill-1 = "我が演説を聞くが良い！"
20033-CVGroup_ExSkill_1-1 = "キヒヒッ！撃て！\n……あれ？ぎゃ、逆？"
20033-CVGroup_ExSkill_2-1 = "キキキッ！全弾発射！\n……うん？は、反対？"
20033-CVGroup_ExSkill_3-1 = "行け！行け！行け！キヒャヒャヒャヒャ！\n……えっ、こ、こっちじゃない！？"
20033-CVGroup_ExSkill_Level_1-1 = "う、うあああっ！？"
20033-CVGroup_ExSkill_Level_2-1 = "そ、そんなああああ！！！"
20033-CVGroup_ExSkill_Level_3-1 = "う、うああっ、ま、間違えたああああ！！"
20033-CVGroup_Formation_In_1-1 = "この私に助けを乞うか？キキキッ。"
20033-CVGroup_Formation_In_2-1 = "キッキッ、先生のお手並み拝見といこうじゃあないか。"
20033-CVGroup_Formation_Select-1 = "マコト様への不敬、許してやろう。"
20033-CVGroup_Growup_1-1 = "なるほど、指導者の極地に達したこの私にも、\nまだ成長の余地があったとはな……キシシッ！"
20033-CVGroup_Growup_2-1 = "先生からご支援いただけるとはな……\nならば遠慮なく。キッキッキッ"
20033-CVGroup_Growup_3-1 = "ほぉ……先生はずいぶんと期待してくれているのだな。\n良いだろう。応えてやろうじゃないか、キキキッ！"
20033-CVGroup_Growup_4-1 = "優秀な人材には、それ相応の報酬があって然るべき。\nキッキッキッ、当然のことだな。"
20033-CVGroup_Relationship_Up_1-1 = "最近、先生との会話が楽しくなってきた気がするぞ。\nキキッ、先生もそう感じているのではないか？"
20033-CVGroup_Relationship_Up_2-1 = "ああ、先生、そこにいたのか。\nちょうど暇ができたところだ、少しの間、歓談といこうじゃないか。"
20033-CVGroup_Relationship_Up_3-1 = "多忙な日々から離れ、ゆったり過ごす時間というのも悪くはないな。\n……キシシッ、気に入った。"
20033-CVGroup_Relationship_Up_4-1 = "キッキッキッ、この私をもっと頼っていいぞ、先生。私は万魔殿のリーダー、天下の羽沼マコト様なのだからな。"
