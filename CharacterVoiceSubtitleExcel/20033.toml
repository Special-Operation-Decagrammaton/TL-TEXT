[translation]
20033-CVGroup_CommonSkill-1 = "Escutem bem o meu discurso!"
20033-CVGroup_ExSkill_1-1 = "Kihihi! Atirem!\n……Ué? A-ao contrário?"
20033-CVGroup_ExSkill_2-1 = "Kikiki! Disparo total!\n……Hm? O-o lado oposto?"
20033-CVGroup_ExSkill_3-1 = "Vão! Vão! Vão! Kihyahyahyahya!\n……Ei, n-não é por aqui!?"
20033-CVGroup_ExSkill_Level_1-1 = "U-uaaaah!?"
20033-CVGroup_ExSkill_Level_2-1 = "N-não pode ser!!!"
20033-CVGroup_ExSkill_Level_3-1 = "U-uaaah, e-eu errei tudo!!!"
20033-CVGroup_Formation_In_1-1 = "Está implorando pela minha ajuda? Kikiki."
20033-CVGroup_Formation_In_2-1 = "Kikki, vamos ver do que você é capaz, Sensei."
20033-CVGroup_Formation_Select-1 = "Vou perdoar sua falta de respeito com a Makoto-sama."
20033-CVGroup_Growup_1-1 = "Entendo, então até eu, que alcancei o ápice da liderança,\nainda tinha espaço para crescer... Kishishi!"
20033-CVGroup_Growup_2-1 = "Receber apoio do Sensei, é?...\nSendo assim, não vou me conter. Kikkikki."
20033-CVGroup_Growup_3-1 = "Ho... O Sensei tem grandes expectativas sobre mim, pelo visto.\nMuito bem. Vou retribuir, kikiki!"
20033-CVGroup_Growup_4-1 = "Talentos excepcionais merecem recompensas à altura.\nKikkikki, é o que deve ser feito."
20033-CVGroup_Relationship_Up_1-1 = "Sinto que conversar com o Sensei tem ficado divertido ultimamente.\nKiki, o Sensei não sente o mesmo?"
20033-CVGroup_Relationship_Up_2-1 = "Ah, Sensei, você estava aí.\nJusto agora que estou livre, que tal termos uma conversa?"
20033-CVGroup_Relationship_Up_3-1 = "Passar um tempo relaxando, longe dos dias atarefados, não é nada mal.\n...Kishishi, eu gostei."
20033-CVGroup_Relationship_Up_4-1 = "Kikkikki, pode contar mais comigo, Sensei. Afinal, eu sou a líder do Pandemonium, a grande Hanuma Makoto!"
