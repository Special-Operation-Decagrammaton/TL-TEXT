[translation]
26007-CVGroup_CommonSkill-1 = "Apoio de fogo, lá vou eu!"
26007-CVGroup_ExSkill_1-1 = "Eu também vou ajudar!"
26007-CVGroup_ExSkill_2-1 = "Não apenas de longe, eu também vou...!"
26007-CVGroup_ExSkill_3-1 = "Por favor, espere um pouco!"
26007-CVGroup_ExSkill_Level_1-1 = "Desculpe a demora!"
26007-CVGroup_ExSkill_Level_2-1 = "Sinto muito, me atrasei!"
26007-CVGroup_ExSkill_Level_3-1 = "Cheguei!"
26007-CVGroup_Formation_In_1-1 = "Sim, pode deixar comigo."
26007-CVGroup_Formation_In_2-1 = "A manutenção está perfeita."
26007-CVGroup_Formation_Select-1 = "Aconteceu alguma coisa?"
26007-CVGroup_Growup_1-1 = "Bem, muito obrigada por tudo, Sensei."
26007-CVGroup_Growup_2-1 = "Muito obrigada mesmo por tudo.\nEu certamente retribuirei esse favor...!"
26007-CVGroup_Growup_3-1 = "Fufu... \nParece que eu só recebo ajuda do Sensei o tempo todo."
26007-CVGroup_Growup_4-1 = "Como você sempre me ajuda, eu também vou me esforçar...!"
26007-CVGroup_Relationship_Up_1-1 = "...Diz que o clima está diferente do habitual?\nS-será mesmo...?"
26007-CVGroup_Relationship_Up_2-1 = "Eu acabo pensando...\nque seria bom se este momento durasse para sempre."
26007-CVGroup_Relationship_Up_3-1 = "Será por causa do traje de banho...\nque me sinto um pouco mais...\nanimada do que o normal?"
26007-CVGroup_Relationship_Up_4-1 = "Muito obrigada...\nEu realmente agradeço de coração."
