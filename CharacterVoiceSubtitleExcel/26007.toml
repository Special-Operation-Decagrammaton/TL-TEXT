[translation]
26007-CVGroup_CommonSkill-1 = "火力支援、行きます！"
26007-CVGroup_ExSkill_1-1 = "私も、手助けします！"
26007-CVGroup_ExSkill_2-1 = "遠くからではなく、私も……！"
26007-CVGroup_ExSkill_3-1 = "少々お待ちください！"
26007-CVGroup_ExSkill_Level_1-1 = "お待たせしました！"
26007-CVGroup_ExSkill_Level_2-1 = "すみません、遅くなりました！"
26007-CVGroup_ExSkill_Level_3-1 = "到着しました！"
26007-CVGroup_Formation_In_1-1 = "はい、お任せください。"
26007-CVGroup_Formation_In_2-1 = "整備はもうバッチリです。"
26007-CVGroup_Formation_Select-1 = "どうかされましたか？"
26007-CVGroup_Growup_1-1 = "その、いつもありがとうございます、先生。"
26007-CVGroup_Growup_2-1 = "本当にいつもありがとうございます。\nこのご恩は、必ず……！"
26007-CVGroup_Growup_3-1 = "ふふっ……\n何だか先生には、いつも助けていただいてばかりですね。"
26007-CVGroup_Growup_4-1 = "いつも助けられてばかりなので、私も頑張ります……！"
26007-CVGroup_Relationship_Up_1-1 = "……いつもと雰囲気が違う、ですか？\nそ、そうでしょうか……。"
26007-CVGroup_Relationship_Up_2-1 = "この瞬間が……\nずっと続いたら良いなって、思ってしまいます。"
26007-CVGroup_Relationship_Up_3-1 = "水着だからでしょうか……\n何だかいつもより、こう……\nつい浮かれてしまうと言いますか。"
26007-CVGroup_Relationship_Up_4-1 = "ありがとうございます……\n本当に、心から感謝しているんです。"
