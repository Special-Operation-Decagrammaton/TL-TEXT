[translation]
20029-CVGroup_CommonSkill-1 = "Coma bastante, por favor."
20029-CVGroup_ExSkill_1-1 = "Heave, ho... \nSensei, é por aqui."
20029-CVGroup_ExSkill_2-1 = "Muito bem, tudo pronto... \nSeja bem-vindo, Sensei."
20029-CVGroup_ExSkill_3-1 = "O mar está maravilhoso... \nSim, eu estava esperando por você."
20029-CVGroup_ExSkill_Level_1-1 = "Descansar é importante, afinal."
20029-CVGroup_ExSkill_Level_2-1 = "Tome cuidado com os raios UV, está bem?"
20029-CVGroup_ExSkill_Level_3-1 = "Pessoal, sintam-se à vontade."
20029-CVGroup_Formation_In_1-1 = "Sim, Sensei. \nEu estava esperando por você."
20029-CVGroup_Formation_In_2-1 = "De alguma forma, estou animada... \nQue tipo de verão nos espera?"
20029-CVGroup_Growup_1-1 = "Um treinamento de verão, é? \nFufu. Fico feliz."
20029-CVGroup_Growup_2-1 = "Será que isso é... o resultado do treinamento? \nOu será graças ao Sensei...?"
20029-CVGroup_Growup_3-1 = "Graças ao fato de o Sensei ter olhado por mim... \nEu consegui crescer tanto. \nMuito obrigada."
20029-CVGroup_Growup_4-1 = "De alguma forma... estou muito animada. \nMeu coração está disparado... estou feliz."
20029-CVGroup_Relationship_Up_1-1 = "Se for com o Sensei... \nSinto que algo maravilhoso vai acontecer."
20029-CVGroup_Relationship_Up_2-1 = "Se possível, gostaria de ficar meio passo atrás do Sensei... \nAh, é vergonhoso dizer isso em voz alta..."
20029-CVGroup_Relationship_Up_3-1 = "...Estou feliz. \nEste tempo que passo com o Sensei..."
20029-CVGroup_Relationship_Up_4-1 = "Ei, Sensei... não, não é nada. \nÉ que... por favor, espere um pouco mais. \n...Só mais um pouco."
