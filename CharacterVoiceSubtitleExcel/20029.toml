[translation]
20029-CVGroup_CommonSkill-1 = "たくさん食べていってくださいね。"
20029-CVGroup_ExSkill_1-1 = "よいしょ、よいしょ……\n先生、こちらですよ。"
20029-CVGroup_ExSkill_2-1 = "さて、準備は万全……\nようこそおいでくださりました、先生。"
20029-CVGroup_ExSkill_3-1 = "素敵な海ですね……\nええ、お待ちしておりました。"
20029-CVGroup_ExSkill_Level_1-1 = "休憩は大事ですから。"
20029-CVGroup_ExSkill_Level_2-1 = "紫外線には気をつけてくださいね？"
20029-CVGroup_ExSkill_Level_3-1 = "皆さん、よろしければどうぞ。"
20029-CVGroup_Formation_In_1-1 = "はい、先生。\nお待ちしておりました。"
20029-CVGroup_Formation_In_2-1 = "なんだか、楽しみですね……\nどんな夏が、私たちを待っているのでしょう？"
20029-CVGroup_Growup_1-1 = "夏の修行、ですね……\nふふっ。嬉しいです。"
20029-CVGroup_Growup_2-1 = "これは……修行の成果でしょうか。\nそれとも先生のおかげ、でしょうか……？"
20029-CVGroup_Growup_3-1 = "先生が見てくださったおかげで……\n私、こんなに成長できました。\nありがとうございます。"
20029-CVGroup_Growup_4-1 = "何だか……とても楽しみです。\n私、今胸がときめいて……幸せです。"
20029-CVGroup_Relationship_Up_1-1 = "先生と一緒なら……\n素敵な事が起こりそうな予感がします。"
20029-CVGroup_Relationship_Up_2-1 = "できるなら、先生の半歩後ろを……\nはうぅ、口に出そうとすると恥ずかしいです……。"
20029-CVGroup_Relationship_Up_3-1 = "……幸せです。\n先生とご一緒するこの時間……。"
20029-CVGroup_Relationship_Up_4-1 = "あの、先生……いいえ、なんでもありません。\nその……もう少し待っていてください。\n……もう少し、だけ。"
