[translation]
10000-CVGroup_Battle_Buffed_1-1 = "これが権力よ！"
10000-CVGroup_Battle_Covered_1-1 = "攻撃位置を確保。"
10000-CVGroup_Battle_Defense_1-1 = "ふふふ、残念ね。"
10000-CVGroup_Battle_In_1-1 = "さあ、我が職員たち。\n仕事の時間よ。"
10000-CVGroup_Battle_In_2-1 = "依頼を始める！"
10000-CVGroup_Battle_Move_1-1 = "ほら、見たでしょう？\n依頼は確実に遂行するんだから。"
10000-CVGroup_Battle_Move_2-1 = "さあ、移動するわよ。"
10000-CVGroup_Battle_Recovery_1-1 = "ふふ。これがVIPのもてなしってやつね。"
10000-CVGroup_Battle_TacticalAction_1-1 = "移動するわ。"
10000-CVGroup_Battle_Victory_1-1 = "便利屋に任せておけば、完璧なんだから。"
10000-CVGroup_Battle_Victory_2-1 = "ふふっ！依頼解決よ！"
10000-CVGroup_CommonSkill-1 = "覚悟しなさい？"
10000-CVGroup_ExSkill_1-1 = "ふーん、ターゲット発見。"
10000-CVGroup_ExSkill_2-1 = "片手でも命中させられるわ。"
10000-CVGroup_ExSkill_3-1 = "一撃で十分よ。"
10000-CVGroup_ExSkill_Level_1-1 = "ぶちのめすわ。"
10000-CVGroup_ExSkill_Level_2-1 = "あはは！命中よ！"
10000-CVGroup_ExSkill_Level_3-1 = "どう？かっこいいでしょ？"
10000-CVGroup_Formation_In_1-1 = "ふふふ。素晴らしい選択ね。"
10000-CVGroup_Formation_In_2-1 = "任せなさい！"
10000-CVGroup_Formation_Select-1 = "ふふ、そんなに望むなら助けてあげてもいいわ。"
10000-CVGroup_Growup_1-1 = "さすがは私ね。"
10000-CVGroup_Growup_2-1 = "ふふふ。よく見ておくことね。\nこれからの私を！"
10000-CVGroup_Growup_3-1 = "私の真価をよく見ておきなさい！"
10000-CVGroup_Growup_4-1 = "ふふふふ。また強くなったわ。"
10000-CVGroup_Relationship_Up_1-1 = "ふふ。先生は運がいいわ。\nこう見えて私、結構大物なの！"
10000-CVGroup_Relationship_Up_2-1 = "顧客とここまで近くなるのは……\nち、違う！先生は常連だから大丈夫！"
10000-CVGroup_Relationship_Up_3-1 = "先生の依頼なら……\nなんでも……や、やってあげるわ！"
10000-CVGroup_Relationship_Up_4-1 = "ありがとう、先生。\n先生のおかげで、本当に素敵な私になれたわ。"
10000-CVGroup_Tactic_In_1-1 = "企業と小隊を率いるのは、私の専門よ。"
10000-CVGroup_Tactic_In_2-1 = "リーダー！\n社長であるこの私にふさわしいポジションね！"
10000-CVGroup_Tactic_Victory_1-1 = "ふふ。これくらい簡単よ。"
10000-CVGroup_Tactic_Victory_2-1 = "どう、先生？\n格が違うってこういうこと。"
