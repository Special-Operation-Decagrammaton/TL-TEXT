[translation]
10103-CVGroup_Battle_Buffed_1-1 = "O que é esse poder...?"
10103-CVGroup_Battle_Covered_1-1 = "Formem a linha!"
10103-CVGroup_Battle_Defense_1-1 = "Indestrutível!"
10103-CVGroup_Battle_In_1-1 = "Pela grandiosa Red Winter!"
10103-CVGroup_Battle_In_2-1 = "Avancem até os confins de Kivotos!"
10103-CVGroup_Battle_Move_1-1 = "Perseguam o inimigo!"
10103-CVGroup_Battle_Move_2-1 = "Ataquem! Ataquem agora!"
10103-CVGroup_Battle_Recovery_1-1 = "Agradeço pela cooperação."
10103-CVGroup_Battle_TacticalAction_1-1 = "Não hesitem!"
10103-CVGroup_Battle_Victory_1-1 = "Todo o treinamento valeu a pena."
10103-CVGroup_Battle_Victory_2-1 = "O ataque é a tática suprema!"
10103-CVGroup_CommonSkill-1 = "Ataque surpresa, sucesso!"
10103-CVGroup_ExSkill_1-1 = "O que é isso... Uau!?"
10103-CVGroup_ExSkill_2-1 = "O que diabos tem no fundo desta floresta... A-abelhas!?"
10103-CVGroup_ExSkill_3-1 = "Não há sinal de ursos... U-uau!?"
10103-CVGroup_ExSkill_Level_1-1 = "À frente, uma colmeia!"
10103-CVGroup_ExSkill_Level_2-1 = "A-afastem-se!"
10103-CVGroup_ExSkill_Level_3-1 = "Eliminando o fator de risco!"
10103-CVGroup_Formation_In_1-1 = "Sim! Eu irei!"
10103-CVGroup_Formation_In_2-1 = "Ficou mais fácil de se mover!"
10103-CVGroup_Formation_Select-1 = "E-espere!\nEste vestido não está um pouco aberto demais...!?"
10103-CVGroup_Growup_1-1 = "Isso também é refrescante e bom."
10103-CVGroup_Growup_2-1 = "(Este livro... sinto que já o li antes...?)"
10103-CVGroup_Growup_3-1 = "Hum, isso é interessante."
10103-CVGroup_Growup_4-1 = "Só porque está calor, não é motivo para negligenciar o treinamento."
10103-CVGroup_Relationship_Up_1-1 = "Tenho consciência de que minha visão é mais limitada que a dos outros... \nPor isso, por favor... fique ao meu lado, Sensei."
10103-CVGroup_Relationship_Up_2-1 = "Pessoalmente, não gosto de roupas muito reveladoras.\nMas se o Sensei diz que está tudo bem... então tudo bem."
10103-CVGroup_Relationship_Up_3-1 = "Seria bom se eu pudesse retribuir ao Sensei com algo além de medalhas..."
10103-CVGroup_Relationship_Up_4-1 = "Eu... não, a minha Red Winter, sempre acredita no Sensei."
10103-CVGroup_Tactic_In_1-1 = "Este caminho é bem complicado..."
10103-CVGroup_Tactic_In_2-1 = "(Não tenho muita confiança em caminhos que não conheço...)"
10103-CVGroup_Tactic_Victory_1-1 = "Fufu, viu só?\nEsta é a figura heroica da Red Winter!"
10103-CVGroup_Tactic_Victory_2-1 = "Não há derrota no caminho da supremacia da Red Winter!"
