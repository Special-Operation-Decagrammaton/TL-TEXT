[translation]
23008-CVGroup_CommonSkill-1 = "安らぎがあらんことを……。"
23008-CVGroup_ExSkill_1-1 = "聖なる力よ……。"
23008-CVGroup_ExSkill_2-1 = "祈りを、そして……。"
23008-CVGroup_ExSkill_3-1 = "心から願います……。"
23008-CVGroup_ExSkill_Level_1-1 = "全ての方に、祝福を……！"
23008-CVGroup_ExSkill_Level_2-1 = "全ての方に、救いを……！"
23008-CVGroup_ExSkill_Level_3-1 = "全ての方に、ご加護を……！"
23008-CVGroup_Formation_In_1-1 = "これが、私に与えられた運命なのでしたら……！"
23008-CVGroup_Formation_In_2-1 = "はい、喜んで。"
23008-CVGroup_Formation_Select-1 = "この祈りが、皆さんのお役に立てますよう……。"
23008-CVGroup_Growup_1-1 = "そのお気持ちに応えられるよう、\n誠心誠意努力いたしますね。"
23008-CVGroup_Growup_2-1 = "聖なる力が、身体の中に溢れて……。"
23008-CVGroup_Growup_3-1 = "今後も、より一層精進してまいります……！"
23008-CVGroup_Growup_4-1 = "こんなに素敵な物を、私に……\nこれを私が頂いてしまっても、良いのでしょうか？"
23008-CVGroup_Relationship_Up_1-1 = "何だか、心が安らぐようです。"
23008-CVGroup_Relationship_Up_2-1 = "先生……私、先生のことを、\n心から尊敬しております。"
23008-CVGroup_Relationship_Up_3-1 = "愛とは崇高なもの、ですが……困りましたね。"
23008-CVGroup_Relationship_Up_4-1 = "どうしましょう、この気持ちは……。"
