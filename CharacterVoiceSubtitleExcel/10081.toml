[translation]
10081-CVGroup_Battle_Buffed_1-1 = "Fufu, com licença!"
10081-CVGroup_Battle_Defense_1-1 = "Isso não funciona comigo!"
10081-CVGroup_Battle_In_1-1 = "Todos! Venham comigo!"
10081-CVGroup_Battle_In_2-1 = "Como a elite da Hyakkaryouran,\neu, Yukari, estou aqui!"
10081-CVGroup_Battle_Move_1-1 = "Vamos seguir em frente!"
10081-CVGroup_Battle_Move_2-1 = "Continuaremos nosso avanço triunfante!"
10081-CVGroup_Battle_Recovery_1-1 = "Aceito com gratidão!"
10081-CVGroup_Battle_TacticalAction_1-1 = "Vou mudar de posição!"
10081-CVGroup_Battle_Victory_1-1 = "Fufu! É o resultado esperado!"
10081-CVGroup_Battle_Victory_2-1 = "Fufun! Esta é uma vitória perfeita!\nV-sign! É isso."
10081-CVGroup_CommonSkill-1 = "Vou mostrar a vocês o meu desempenho!"
10081-CVGroup_ExSkill_1-1 = "Colocando minha determinação nisso..."
10081-CVGroup_ExSkill_2-1 = "Se é algo que eu devo fazer, então certamente..."
10081-CVGroup_ExSkill_3-1 = "Não por outra pessoa, mas pelas minhas próprias mãos..."
10081-CVGroup_ExSkill_Level_1-1 = "Mirando bem... fogo!"
10081-CVGroup_ExSkill_Level_2-1 = "Com toda a minha sinceridade!"
10081-CVGroup_ExSkill_Level_3-1 = "Vou mostrar a vocês o meu poder total!"
10081-CVGroup_Formation_In_1-1 = "É hora do nosso avanço triunfante, não é?"
10081-CVGroup_Formation_In_2-1 = "Fufu, então você precisa da minha força?"
10081-CVGroup_Formation_Select-1 = "Sim! Pode deixar comigo!"
10081-CVGroup_Growup_1-1 = "Este coração que bate forte ao receber a confiança do Sensei...\nSim, eu também responderei com toda a minha força, sem mentiras."
10081-CVGroup_Growup_2-1 = "Receber algo tão valioso assim...\nPara corresponder às expectativas, continuarei me esforçando!"
10081-CVGroup_Growup_3-1 = "Sim. Farei uma revisão completa de tudo o que o Sensei me ensinou,\npara memorizar tudo sem deixar passar nada!"
10081-CVGroup_Growup_4-1 = "Eu, Yukari...\nComo parte da Hyakkaryouran, dei mais um passo à frente!"
10081-CVGroup_Relationship_Up_1-1 = "Quando estou com o Sensei, meu coração se acalma naturalmente...\nSinto-me... muito feliz."
10081-CVGroup_Relationship_Up_2-1 = "Então é isso que significa receber forças apenas por poder servir ao seu lado.\nFufu... é um tanto misterioso."
10081-CVGroup_Relationship_Up_3-1 = "Sim, graças à presença do Sensei,\npude ser apenas a Yukari.\nMuito obrigada, de verdade."
10081-CVGroup_Relationship_Up_4-1 = "Ah, ora...?\nDesde o momento em que encontrei o Sensei, meu coração começou a bater forte...\nO que farei se meu coração acabar explodindo!?"
10081-CVGroup_Tactic_In_1-1 = "Vou mostrar a vocês um exemplo da Hyakkaryouran."
10081-CVGroup_Tactic_In_2-1 = "Fufu, o início da lenda de Yukari!"
10081-CVGroup_Tactic_Victory_1-1 = "Operação concluída.\nTodos, um desempenho maravilhoso!"
10081-CVGroup_Tactic_Victory_2-1 = "Fufu! Uma vitória absolutamente completa!\nGraças aos esforços de todos!"
