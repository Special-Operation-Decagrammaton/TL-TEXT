[translation]
10081-CVGroup_Battle_Buffed_1-1 = "ふふっ、ごめん遊ばせ！"
10081-CVGroup_Battle_Defense_1-1 = "効きませんわ！"
10081-CVGroup_Battle_In_1-1 = "皆様！身共に御供参りなさい！"
10081-CVGroup_Battle_In_2-1 = "百花繚乱のえりーとたる身共、\nユカリが参りますわ！"
10081-CVGroup_Battle_Move_1-1 = "次へ参りましょう！"
10081-CVGroup_Battle_Move_2-1 = "このまま快進撃を続けますわよ！"
10081-CVGroup_Battle_Recovery_1-1 = "ありがたく頂戴しますわ！"
10081-CVGroup_Battle_TacticalAction_1-1 = "場所を変えますわ！"
10081-CVGroup_Battle_Victory_1-1 = "ふふっ！当然の結果ですのよ！"
10081-CVGroup_Battle_Victory_2-1 = "ふっふーん！これは完璧なびくとり～です！\nぶいっ！ですの。"
10081-CVGroup_CommonSkill-1 = "身共の活躍、見せてさしあげましょう！"
10081-CVGroup_ExSkill_1-1 = "身共の決意を込めて……。"
10081-CVGroup_ExSkill_2-1 = "身共がやるべき事であるのならば、必ずや……。"
10081-CVGroup_ExSkill_3-1 = "他の誰でもない、身共の手で……。"
10081-CVGroup_ExSkill_Level_1-1 = "よく狙って……撃ちます！"
10081-CVGroup_ExSkill_Level_2-1 = "身共の真心を込めて！"
10081-CVGroup_ExSkill_Level_3-1 = "身共の全力、お見せいたしましょう！"
10081-CVGroup_Formation_In_1-1 = "快進撃のお時間ですのね！"
10081-CVGroup_Formation_In_2-1 = "ふふっ、これは身共の力が必要なのですね？"
10081-CVGroup_Formation_Select-1 = "ええ！身共にお任せくださいまし！"
10081-CVGroup_Growup_1-1 = "先生の信頼を受けて高鳴るこの鼓動……\nええ、身共も、嘘偽りなく全力でお応えいたしますわ。"
10081-CVGroup_Growup_2-1 = "こんな貴重なものを頂けるだなんて……\nご期待に添えるよう、身共は精進してまいります！"
10081-CVGroup_Growup_3-1 = "ええ。先生に教わったあまねく全て、予習、復習を徹底し\n取りこぼしのないよう記憶してまいりますの！"
10081-CVGroup_Growup_4-1 = "身共、ユカリは……\n百花繚乱として、また一歩前進いたしましたわ！"
10081-CVGroup_Relationship_Up_1-1 = "先生といると、自然と心が解きほぐされて……\nとても……幸せな気分になるのです。"
10081-CVGroup_Relationship_Up_2-1 = "そばにお仕えできるだけでお力をいただけるというのは、\nこういうことなのですね。\nふふ……なんだか不思議ですの。"
10081-CVGroup_Relationship_Up_3-1 = "はい、先生がいて下さったおかげで、\n身共は、ただのユカリでいられましたわ。\n本当に、ありがとう存じます。"
10081-CVGroup_Relationship_Up_4-1 = "あ、あら……？\n先生に会った瞬間から、鼓動が高鳴って……。\n身共の心臓が破裂してしまったら、一体どうしましょう！？"
10081-CVGroup_Tactic_In_1-1 = "百花繚乱としてのお手本、見せてさしあげましょう。"
10081-CVGroup_Tactic_In_2-1 = "ふふっ、ユカリ伝説の始まりですのよ！"
10081-CVGroup_Tactic_Victory_1-1 = "作戦終了。\n皆様、素晴らしいご活躍です！"
10081-CVGroup_Tactic_Victory_2-1 = "ふふっ！まさに完全勝利！\n皆様と力を合わせたおかげです！"
