[translation]
10008-CVGroup_Battle_Buffed_1-1 = "Eu nem precisava disso..."
10008-CVGroup_Battle_Covered_1-1 = "Beleza, vamos nessa!"
10008-CVGroup_Battle_Defense_1-1 = "É só isso que você tem!?"
10008-CVGroup_Battle_In_1-1 = "Vocês... \nVamos acabar com tudo!"
10008-CVGroup_Battle_In_2-1 = "Callsign 00... \nIniciando a limpeza."
10008-CVGroup_Battle_Move_1-1 = "Já limpei a maior parte, próximo!"
10008-CVGroup_Battle_Move_2-1 = "Até que vale a pena lutar contra vocês!"
10008-CVGroup_Battle_Recovery_1-1 = "Heh, você tem bom gosto, não tem?"
10008-CVGroup_Battle_TacticalAction_1-1 = "Ha, é por ali!"
10008-CVGroup_Battle_Victory_1-1 = "O maior erro de vocês foi tentar bloquear o meu caminho."
10008-CVGroup_Battle_Victory_2-1 = "Limpeza concluída."
10008-CVGroup_CommonSkill-1 = "Ah!? Quer morrer?"
10008-CVGroup_ExSkill_1-1 = "Ah??? Quer que eu te mate???"
10008-CVGroup_ExSkill_2-1 = "Tá de brincadeira?"
10008-CVGroup_ExSkill_3-1 = "Não me subestime!"
10008-CVGroup_ExSkill_Level_1-1 = "ORA ORA ORA ORA!!!"
10008-CVGroup_ExSkill_Level_2-1 = "Escolheu o oponente errado!"
10008-CVGroup_ExSkill_Level_3-1 = "Lixo tem que ser limpo!!"
10008-CVGroup_Formation_In_1-1 = "Haa... então vamos fazer isso?"
10008-CVGroup_Formation_In_2-1 = "É um saco, mas não tem jeito."
10008-CVGroup_Formation_Select-1 = "Ah? Que irritante!"
10008-CVGroup_Growup_1-1 = "Haha, Sensei, ótima escolha. \nPode esperar."
10008-CVGroup_Growup_2-1 = "Heh, parece bom. \nPode deixar comigo!"
10008-CVGroup_Growup_3-1 = "Nossa, estou tão animada. \nVamos começar, Sensei?"
10008-CVGroup_Growup_4-1 = "Sensei, tenha confiança. \nEu estou aqui com você."
10008-CVGroup_Relationship_Up_1-1 = "Uwaaa! Não chegue tão perto! \nEu vou te matar! Eu disse que vou te matar!"
10008-CVGroup_Relationship_Up_2-1 = "Sabe... ter você aqui, Sensei... não é uma sensação ruim. \nAh, droga. O que eu estou dizendo?"
10008-CVGroup_Relationship_Up_3-1 = "Por que será? Quando vejo o Sensei... \nEu me sinto estranha."
10008-CVGroup_Relationship_Up_4-1 = "Obrigada, Sensei. \nÉ bom ter você por perto."
10008-CVGroup_Tactic_In_1-1 = "Heh. Então este é o campo de batalha."
10008-CVGroup_Tactic_In_2-1 = "Vou elogiar vocês por não fugirem."
10008-CVGroup_Tactic_Victory_1-1 = "Esse tipo de luta é a minha especialidade."
10008-CVGroup_Tactic_Victory_2-1 = "Ha! Sensei, você é melhor do que eu pensava."
