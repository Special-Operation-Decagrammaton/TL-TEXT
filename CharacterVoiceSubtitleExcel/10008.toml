10008-CVGroup_Battle_TacticalAction_1-1 = "はっ、そっちか！"
10008-CVGroup_Battle_Victory_1-1 = "てめぇらの最大のミスは、あたしの行く手を塞いだってことだ。"
10008-CVGroup_Battle_Victory_2-1 = "清掃完了だ。"
10008-CVGroup_CommonSkill-1 = "あぁ！？殺されてぇのか？"
