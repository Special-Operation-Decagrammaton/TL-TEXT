[translation]
10129-CVGroup_Battle_Buffed_1-1 = "Suporte recebido!"
10129-CVGroup_Battle_Covered_1-1 = "Vou me esconder!"
10129-CVGroup_Battle_Defense_1-1 = "Por favor, parem de resistir!"
10129-CVGroup_Battle_In_1-1 = "Retém do ferrolho. Te... Termite White!"
10129-CVGroup_Battle_In_2-1 = "Poder mágico, carregamento concluído!"
10129-CVGroup_Battle_Move_1-1 = "Espero que ninguém me veja..."
10129-CVGroup_Battle_Move_2-1 = "Indo para a próxima posição."
10129-CVGroup_Battle_Recovery_1-1 = "Luz da cura, muito obrigada!"
10129-CVGroup_Battle_TacticalAction_1-1 = "Avançando!"
10129-CVGroup_Battle_Victory_1-1 = "Para mim, continuar sendo a justiça... essa é a minha recompensa."
10129-CVGroup_Battle_Victory_2-1 = "Então eu... ainda tenho forças para proteger alguém."
10129-CVGroup_CommonSkill-1 = "Magia para a frente!"
10129-CVGroup_ExSkill_1-1 = "E-eu, como desligo isso!?"
10129-CVGroup_ExSkill_2-1 = "V-vou me transformar!? E-ei!"
10129-CVGroup_ExSkill_3-1 = "Com a amizade! E o amor! E, bem... poder de fogo!?"
10129-CVGroup_ExSkill_Level_1-1 = "Sinalizador, direto para cima!"
10129-CVGroup_ExSkill_Level_2-1 = "Vou fazer brilhar!"
10129-CVGroup_ExSkill_Level_3-1 = "A luz da magia!"
10129-CVGroup_Formation_In_1-1 = "A próxima missão de patrulha... entendi."
10129-CVGroup_Formation_In_2-1 = "Ah... sim! Conto com você!"
10129-CVGroup_Formation_Select-1 = "Com essa altura, acho que a observação será mais fácil."
10129-CVGroup_Growup_1-1 = "M-muito obrigada, Sensei... é que, ser observada assim, me deixa um pouco envergonhada."
10129-CVGroup_Growup_2-1 = "Obrigada por zelar pela minha forma de justiça.\nSou sempre grata por isso."
10129-CVGroup_Growup_3-1 = "Eu sempre busquei forças para proteger alguém até o fim."
10129-CVGroup_Growup_4-1 = "Obrigada por estar sempre cuidando de mim assim."
10129-CVGroup_Relationship_Up_1-1 = "Obrigada por estar sempre comigo, Sensei."
10129-CVGroup_Relationship_Up_2-1 = "Fico muito feliz que você confie em mim... e que venha me ver assim."
10129-CVGroup_Relationship_Up_3-1 = "A felicidade é algo que está mais perto do que imaginamos, não é?"
10129-CVGroup_Relationship_Up_4-1 = "Se você me permitir... eu quero continuar protegendo você para sempre, Sensei."
10129-CVGroup_Tactic_In_1-1 = "Patrulha Mágica, começando!"
10129-CVGroup_Tactic_In_2-1 = "Iniciando a missão agora... t-tem gente demais aqui...!"
10129-CVGroup_Tactic_Victory_1-1 = "Evacuação concluída. Vou continuar a missão."
10129-CVGroup_Tactic_Victory_2-1 = "Segurança garantida. Sensei, quais as ordens?"
