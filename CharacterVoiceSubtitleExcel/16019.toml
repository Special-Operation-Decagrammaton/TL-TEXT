[translation]
16019-CVGroup_Battle_Buffed_1-1 = "Obrigada pelo suporte."
16019-CVGroup_Battle_Covered_1-1 = "Segurança garantida."
16019-CVGroup_Battle_Defense_1-1 = "Isso não é o suficiente para me afetar."
16019-CVGroup_Battle_In_1-1 = "Deixe a linha de frente comigo."
16019-CVGroup_Battle_In_2-1 = "Usar duas pistolas não é apenas para parecer legal."
16019-CVGroup_Battle_Move_1-1 = "Setor limpo."
16019-CVGroup_Battle_Move_2-1 = "Retomando o reconhecimento."
16019-CVGroup_Battle_Recovery_1-1 = "Agradeço pelo suprimento."
16019-CVGroup_Battle_TacticalAction_1-1 = "Mudando de posição."
16019-CVGroup_Battle_Victory_1-1 = "Falha não é uma opção. Yahoo."
16019-CVGroup_Battle_Victory_2-1 = "Apenas cumpri a missão. V."
16019-CVGroup_CommonSkill-1 = "Opa.\nCom isso, não há problemas."
16019-CVGroup_ExSkill_1-1 = "Reconhecimento perfeito, Asuma Toki.\nIndo agora."
16019-CVGroup_ExSkill_2-1 = "Tudo começa a partir destas mãos."
16019-CVGroup_ExSkill_3-1 = "Suporte ou supressão, ambos são especialidades minhas."
16019-CVGroup_ExSkill_Level_1-1 = "O manuseio da arma também está perfeito."
16019-CVGroup_ExSkill_Level_2-1 = "Duas pistolas são versáteis."
16019-CVGroup_ExSkill_Level_3-1 = "Armas e equipamentos dependem de como são usados."
16019-CVGroup_Formation_In_1-1 = "Chamou?"
16019-CVGroup_Formation_In_2-1 = "Estou pronta para sair a qualquer momento."
16019-CVGroup_Formation_Select-1 = "Troca de arma.\nPerfeito."
16019-CVGroup_Growup_1-1 = "Asuma Toki, subindo de nível.\nMeus sentimentos pelo Sensei também subiram de nível.\nE, por outro lado, os sentimentos do Sensei por mim também subiram."
16019-CVGroup_Growup_2-1 = "Fiquei ainda mais forte com isso.\n...Pensando bem, sinto que ainda não é o suficiente.\nPor isso, por favor, fique comigo por mais um tempo."
16019-CVGroup_Growup_3-1 = "As pessoas não crescem apenas ficando mais fortes.\nÉ por isso que devemos nos apoiar mutuamente.\n...Estou pronta a qualquer momento. Sensei."
16019-CVGroup_Growup_4-1 = "A versão que evoluiu é a Toki Perfeita.\n...Não, corrijo.\nIsso só vale quando o Sensei está por perto."
16019-CVGroup_Relationship_Up_1-1 = "Entendo.\nCom isso, minha presença para o Sensei aumentou um pouco mais, não é?\n...O contrário? Impossível."
16019-CVGroup_Relationship_Up_2-1 = "Não se preocupe.\nEnquanto a sortuda Maid Agente de Reconhecimento estiver aqui,\nnenhum obstáculo entrará em nosso caminho."
16019-CVGroup_Relationship_Up_3-1 = "Se existe algo como nível de afinidade, deve ser agora que ele aumenta.\nSinto que subiu uns 10 mil pontos agora."
16019-CVGroup_Relationship_Up_4-1 = "Sensei, não está com frio?\nEu estou um pouco... não, estou com muito frio.\nPor isso, por favor, chegue um pouco mais perto."
16019-CVGroup_Tactic_In_1-1 = "Iniciando reconhecimento."
16019-CVGroup_Tactic_In_2-1 = "O conteúdo da missão já está na minha cabeça."
16019-CVGroup_Tactic_Victory_1-1 = "Objetivo alcançado. Por favor, me elogie rapidamente."
16019-CVGroup_Tactic_Victory_2-1 = "Área limpa."
