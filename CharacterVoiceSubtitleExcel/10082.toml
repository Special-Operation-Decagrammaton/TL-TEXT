[translation]
10082-CVGroup_Battle_Buffed_1-1 = "ちょうどいいところに！"
10082-CVGroup_Battle_Covered_1-1 = "遮蔽完了！"
10082-CVGroup_Battle_Defense_1-1 = "効かないよ！"
10082-CVGroup_Battle_In_1-1 = "先頭はアタシ！\nさ、ついておいで！"
10082-CVGroup_Battle_In_2-1 = "はっ！百花繚乱の底力、みせてやる！"
10082-CVGroup_Battle_Move_1-1 = "次！"
10082-CVGroup_Battle_Move_2-1 = "隊列を守って！行くよ！"
10082-CVGroup_Battle_Recovery_1-1 = "おっ！ありがと！"
10082-CVGroup_Battle_TacticalAction_1-1 = "場所移動するよ！"
10082-CVGroup_Battle_Victory_1-1 = "切り込み隊長の名は伊達じゃないんだよ！"
10082-CVGroup_Battle_Victory_2-1 = "我が行く道、勝利あるのみ！"
10082-CVGroup_CommonSkill-1 = "よし、気合い入れていくよ！"
10082-CVGroup_ExSkill_1-1 = "アタシが、百花繚乱の切り込み隊長だ！"
10082-CVGroup_ExSkill_2-1 = "じゃ、こっちも本気で相手するよ！"
10082-CVGroup_ExSkill_3-1 = "まだ！終わっちゃいない！"
10082-CVGroup_ExSkill_Level_1-1 = "はっ、耐えてみな！"
10082-CVGroup_ExSkill_Level_2-1 = "さぁ、一発逆転だ！"
10082-CVGroup_ExSkill_Level_3-1 = "どうだい、これが百花繚乱の射撃術だよ！"
10082-CVGroup_Formation_In_1-1 = "いいよ！アタシの出番だな？"
10082-CVGroup_Formation_In_2-1 = "ああ、任せてくれ！"
10082-CVGroup_Formation_Select-1 = "ま、待って、師匠！\nまだ……心の準備が……！"
10082-CVGroup_Growup_1-1 = "先生のおかげでアタシは成長した。\nああ、全部師匠のおかげだよ。ありがとう。"
10082-CVGroup_Growup_2-1 = "こういう教え方もあるんだ……。\nアタシには思いつきもしなかったよ。\n先生……いや、師匠はやっぱ、すごいなぁ。"
10082-CVGroup_Growup_3-1 = "すごい！なんか、力が湧いてくるっていうか。\nうん！凄い！とにかく、凄いんだよ！"
10082-CVGroup_Growup_4-1 = "要するに、先生はアタシに期待してくれてるんだろ？\nははっ！任せときな！全力で応えるよ！"
10082-CVGroup_Relationship_Up_1-1 = "いや、たしかに「青春活動」を一緒にしたい、とは言ったけど……\nこんなことまでして……いいの……かな！？"
10082-CVGroup_Relationship_Up_2-1 = "（えっ、これ、大丈夫？大丈夫なやつ？先生と距離が、近い……！うああっ！どうしよ！）"
10082-CVGroup_Relationship_Up_3-1 = "ん―――！\n先生と一緒にいると、なんだかこそばゆくて……！\nうああっ！ごめん！！！グラウンド走ってくる！"
10082-CVGroup_Relationship_Up_4-1 = "……あ……その。……いや、体調は大丈夫だよ！ただ、その……\n師匠ってアタシのこと、大切にしてくれてるんだなぁって……\nそ、そう思っただけ！"
10082-CVGroup_Tactic_In_1-1 = "百花繚乱の実力、とくとご覧あれ！"
10082-CVGroup_Tactic_In_2-1 = "さっと終わらせてくるよ！"
10082-CVGroup_Tactic_Victory_1-1 = "ははっ、先生の指揮あってこその勝利だな。"
10082-CVGroup_Tactic_Victory_2-1 = "作戦終了！\n皆、素晴らしい連携だったよ！"
