[translation]
10082-CVGroup_Battle_Buffed_1-1 = "Bem na hora!"
10082-CVGroup_Battle_Covered_1-1 = "Cobertura concluída!"
10082-CVGroup_Battle_Defense_1-1 = "Isso não funciona em mim!"
10082-CVGroup_Battle_In_1-1 = "Eu vou na frente!\nVamos, me sigam!"
10082-CVGroup_Battle_In_2-1 = "Hah! Vou mostrar o verdadeiro poder da Hyakkiyako!"
10082-CVGroup_Battle_Move_1-1 = "Próximo!"
10082-CVGroup_Battle_Move_2-1 = "Mantenham a formação! Vamos!"
10082-CVGroup_Battle_Recovery_1-1 = "Oh! Valeu!"
10082-CVGroup_Battle_TacticalAction_1-1 = "Mudando de posição!"
10082-CVGroup_Battle_Victory_1-1 = "O título de capitã de vanguarda não é só enfeite!"
10082-CVGroup_Battle_Victory_2-1 = "Onde eu piso, só existe vitória!"
10082-CVGroup_CommonSkill-1 = "Certo, vamos com tudo!"
10082-CVGroup_ExSkill_1-1 = "Eu sou a capitã de vanguarda da Hyakkiyako!"
10082-CVGroup_ExSkill_2-1 = "Bem, então vou levar isso a sério também!"
10082-CVGroup_ExSkill_3-1 = "Ainda não! Não acabou!"
10082-CVGroup_ExSkill_Level_1-1 = "Hah, tente aguentar isso!"
10082-CVGroup_ExSkill_Level_2-1 = "Vamos, é hora da virada!"
10082-CVGroup_ExSkill_Level_3-1 = "O que achou? Essa é a técnica de tiro da Hyakkiyako!"
10082-CVGroup_Formation_In_1-1 = "Beleza! É a minha vez, né?"
10082-CVGroup_Formation_In_2-1 = "Ah, pode deixar comigo!"
10082-CVGroup_Formation_Select-1 = "E-espera, Mestre!\nAinda não... não estou preparada mentalmente...!"
10082-CVGroup_Growup_1-1 = "Graças ao Sensei, eu cresci.\nAh, é tudo graças a você, Mestre. Obrigado."
10082-CVGroup_Growup_2-1 = "Então existe esse jeito de ensinar...\nEu nunca teria pensado nisso.\nSensei... não, o Mestre é realmente incrível."
10082-CVGroup_Growup_3-1 = "Incrível! É como se uma força estivesse surgindo dentro de mim.\nSim! Incrível! De qualquer forma, é incrível!"
10082-CVGroup_Growup_4-1 = "Em resumo, o Sensei tem expectativas sobre mim, né?\nHaha! Pode deixar! Vou responder com tudo o que tenho!"
10082-CVGroup_Relationship_Up_1-1 = "Não, eu realmente disse que queria fazer "atividades de juventude" com você, mas...\nChegar a esse ponto... será que... está tudo bem!?"
10082-CVGroup_Relationship_Up_2-1 = "(Ei, isso é seguro? É algo seguro? A distância entre mim e o Sensei está... curta demais...! Uaaah! O que eu faço!)"
10082-CVGroup_Relationship_Up_3-1 = "Nnn---!\nQuando estou com o Sensei, sinto um formigamento estranho...!\nUaaah! Desculpa!!! Vou correr pelo campo!"
10082-CVGroup_Relationship_Up_4-1 = "...Ah... é. ...Não, minha saúde está ótima! Só que, sabe...\nEu pensei que o Mestre realmente se importa comigo...\nÉ, só pensei nisso!"
10082-CVGroup_Tactic_In_1-1 = "Contemplem o verdadeiro poder da Hyakkiyako!"
10082-CVGroup_Tactic_In_2-1 = "Vou terminar isso rapidinho!"
10082-CVGroup_Tactic_Victory_1-1 = "Haha, essa vitória só foi possível graças ao comando do Sensei."
10082-CVGroup_Tactic_Victory_2-1 = "Operação encerrada!\nPessoal, que coordenação maravilhosa!"
