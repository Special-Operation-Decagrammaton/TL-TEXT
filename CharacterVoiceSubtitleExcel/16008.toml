[translation]
16008-CVGroup_Battle_Buffed_1-1 = "……Não seria melhor dar isso pra outra pessoa em vez de mim?\nBom, agradeço de qualquer forma."
16008-CVGroup_Battle_Covered_1-1 = "Opa."
16008-CVGroup_Battle_Defense_1-1 = "Haha, isso faz cócegas."
16008-CVGroup_Battle_In_1-1 = "Bom, vamos tentar levar isso de boa."
16008-CVGroup_Battle_In_2-1 = "Não precisa ter tanta pressa, vamos fazer de qualquer jeito."
16008-CVGroup_Battle_Move_1-1 = "……É por aqui?"
16008-CVGroup_Battle_Move_2-1 = "……Ué, é pra cá mesmo?"
16008-CVGroup_Battle_Recovery_1-1 = "Ooh, valeu."
16008-CVGroup_Battle_TacticalAction_1-1 = "A patrulha desta área está encerrada, só pra constar."
16008-CVGroup_Battle_Victory_1-1 = "Café e donuts depois do trabalho... o melhor."
16008-CVGroup_Battle_Victory_2-1 = "Aah, que cansaço, que cansaço...\nPreciso repor a glicose."
16008-CVGroup_CommonSkill-1 = "……Se acertar, estamos no lucro."
16008-CVGroup_ExSkill_1-1 = "Hora do intervalo~"
16008-CVGroup_ExSkill_2-1 = "Com licença um instante.\nVamos descansar primeiro."
16008-CVGroup_ExSkill_3-1 = "Hora do donut."
16008-CVGroup_ExSkill_Level_1-1 = "Não importa a situação, não podemos perder a calma."
16008-CVGroup_ExSkill_Level_2-1 = "Nham, nham... Que delícia."
16008-CVGroup_ExSkill_Level_3-1 = "Um cafezinho cairia bem agora~"
16008-CVGroup_Formation_In_1-1 = "……Ei, eu preciso ir mesmo?"
16008-CVGroup_Formation_In_2-1 = "Que preguiça..."
16008-CVGroup_Formation_Select-1 = "Que sono..."
16008-CVGroup_Growup_1-1 = "Isso, pra mim...?\n...Por quê? Não confundiu de pessoa?"
16008-CVGroup_Growup_2-1 = "Por mim, do jeito que está já tá de bom tamanho..."
16008-CVGroup_Growup_3-1 = "Bom, de qualquer forma, agradeço a boa vontade do Sensei."
16008-CVGroup_Growup_4-1 = "Me esforçar mais do que isso... Hmmm...\nNão sobrou nenhum donut por aí?\nSe tiver, eu dou um jeito..."
16008-CVGroup_Relationship_Up_1-1 = "Fufu, o Sensei também quer matar trabalho comigo?"
16008-CVGroup_Relationship_Up_2-1 = "Na verdade, eu odeio quando atrapalham o meu descanso, mas...\nBom, se for o Sensei, tudo bem."
16008-CVGroup_Relationship_Up_3-1 = "Descansar aqui assim é bem relaxante~"
16008-CVGroup_Relationship_Up_4-1 = "Sensei, sabe, hã, ah...\nEnfim, quer um donut?"
16008-CVGroup_Tactic_In_1-1 = "Eeh, por que eu sou a líder...?"
16008-CVGroup_Tactic_In_2-1 = "……Hã, eu na vanguarda...?\nTá falando sério?"
16008-CVGroup_Tactic_Victory_1-1 = "Acabou? Acabou, né?\nBeleza, vambora, partiu casa."
16008-CVGroup_Tactic_Victory_2-1 = "Céus... Eu não achava mesmo que a gente ia vencer."