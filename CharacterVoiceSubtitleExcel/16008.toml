[translation]
16008-CVGroup_Battle_Buffed_1-1 = "……Por que não faz isso por outra pessoa em vez de mim?\nBem, de qualquer forma, agradeço."
16008-CVGroup_Battle_Covered_1-1 = "Opa."
16008-CVGroup_Battle_Defense_1-1 = "Haha, isso faz cócegas."
16008-CVGroup_Battle_In_1-1 = "Bem, vamos fazer isso de um jeito tranquilo."
16008-CVGroup_Battle_In_2-1 = "Não precisa se apressar tanto, vamos levar na boa."
16008-CVGroup_Battle_Move_1-1 = "……É por aqui?"
16008-CVGroup_Battle_Move_2-1 = "……Ué, é por aqui mesmo?"
16008-CVGroup_Battle_Recovery_1-1 = "Oh, obrigado."
16008-CVGroup_Battle_TacticalAction_1-1 = "Patrulha desta área concluída, é isso."
16008-CVGroup_Battle_Victory_1-1 = "Café e donuts depois do trabalho... é o melhor."
16008-CVGroup_Battle_Victory_2-1 = "Ah, que cansaço...\nPreciso repor o açúcar."
16008-CVGroup_CommonSkill-1 = "……Se acertar, é sorte."
16008-CVGroup_ExSkill_1-1 = "Hora do intervalo."
16008-CVGroup_ExSkill_2-1 = "Com licença.\nVamos descansar um pouco."
16008-CVGroup_ExSkill_3-1 = "Hora do donut."
16008-CVGroup_ExSkill_Level_1-1 = "Não importa a situação, não podemos perder a calma."
16008-CVGroup_ExSkill_Level_2-1 = "Nham, nham... que delícia."
16008-CVGroup_ExSkill_Level_3-1 = "Um café também cairia bem."
16008-CVGroup_Formation_In_1-1 = "……Ei, eu realmente preciso ir?"
16008-CVGroup_Formation_In_2-1 = "Que preguiça..."
16008-CVGroup_Formation_Select-1 = "Que sono..."
16008-CVGroup_Growup_1-1 = "Isso é para mim...?\n……Por quê? Não está confundindo a pessoa?"
16008-CVGroup_Growup_2-1 = "Eu, na verdade, já estou satisfeita como estou..."
16008-CVGroup_Growup_3-1 = "Bem, de qualquer forma, aceitarei a gentileza do Sensei."
16008-CVGroup_Growup_4-1 = "Me esforçar mais do que isso, hum...\nNão tem nenhum donut sobrando?\nSe tiver, eu dou um jeito..."
16008-CVGroup_Relationship_Up_1-1 = "Fufu, Sensei, quer matar aula comigo?"
16008-CVGroup_Relationship_Up_2-1 = "Na verdade, eu odeio que interrompam meu descanso...\nMas, sendo o Sensei, tudo bem."
16008-CVGroup_Relationship_Up_3-1 = "Descansar aqui assim, de alguma forma, é relaxante~"
16008-CVGroup_Relationship_Up_4-1 = "Sensei, tipo, é, ah...\nPor enquanto, quer um donut?"
16008-CVGroup_Tactic_In_1-1 = "Ehh, por que eu sou a líder...?"
16008-CVGroup_Tactic_In_2-1 = "……Ehh, eu na frente...?\nEstá falando sério?"
16008-CVGroup_Tactic_Victory_1-1 = "Acabou? Acabou mesmo?\nBeleza, vamos embora, vamos embora."
16008-CVGroup_Tactic_Victory_2-1 = "Nossa... eu realmente não achei que a gente fosse ganhar."
