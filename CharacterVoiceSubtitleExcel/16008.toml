[translation]
16008-CVGroup_Battle_Buffed_1-1 = "……私より、他の誰かにやってあげたら？\nまあ、一応感謝するけど。"
16008-CVGroup_Battle_Covered_1-1 = "おっとぉ。"
16008-CVGroup_Battle_Defense_1-1 = "ははっ、くすぐったいじゃん。"
16008-CVGroup_Battle_In_1-1 = "さて、まあ良い感じにやろう。"
16008-CVGroup_Battle_In_2-1 = "そんなに焦らなくて良いから、てきとうに。"
16008-CVGroup_Battle_Move_1-1 = "……こっちの方？"
16008-CVGroup_Battle_Move_2-1 = "……あれ、こっちで合ってる？"
16008-CVGroup_Battle_Recovery_1-1 = "おお、ありがとう。"
16008-CVGroup_Battle_TacticalAction_1-1 = "この区域のパトロールは終了、ってことで。"
16008-CVGroup_Battle_Victory_1-1 = "働いた後のコーヒーとドーナッツ……最高。"
16008-CVGroup_Battle_Victory_2-1 = "あー、疲れた疲れた……\n糖分補給しなきゃ。"
16008-CVGroup_CommonSkill-1 = "……当たったらラッキーってことで。"
16008-CVGroup_ExSkill_1-1 = "休憩時間だー"
16008-CVGroup_ExSkill_2-1 = "ちょっと失礼。\n休んでからにしよう。"
16008-CVGroup_ExSkill_3-1 = "ドーナッツタイムってことで。"
16008-CVGroup_ExSkill_Level_1-1 = "どんな状況でも、余裕を失っちゃダメなんだって。"
16008-CVGroup_ExSkill_Level_2-1 = "あむ、あむ……美味い。"
16008-CVGroup_ExSkill_Level_3-1 = "コーヒーも欲しいところだなー"
16008-CVGroup_Formation_In_1-1 = "……ねぇ、私まで行く必要ある？"
16008-CVGroup_Formation_In_2-1 = "めんどくさ……。"
16008-CVGroup_Formation_Select-1 = "ねっむ……。"
16008-CVGroup_Growup_1-1 = "これを、私に……？\n……なんで？相手間違えてない？"
16008-CVGroup_Growup_2-1 = "私は別に、今のままで十分なんだけど……。"
16008-CVGroup_Growup_3-1 = "まあ、一応先生の好意はありがたく受け取っておく。"
16008-CVGroup_Growup_4-1 = "これ以上頑張るのは、うーん……\nドーナッツとか余ってない？\nそれさえあれば、何とか……。"
16008-CVGroup_Relationship_Up_1-1 = "ふふっ、先生も私と一緒にサボる？"
16008-CVGroup_Relationship_Up_2-1 = "本当は、休憩を邪魔されるのは嫌いなんだけど……\nまあ、先生なら別に良いや。"
16008-CVGroup_Relationship_Up_3-1 = "ここでこうして休憩するの、何だか落ち着くな～"
16008-CVGroup_Relationship_Up_4-1 = "先生その、えっと、あー……\nとりあえず、ドーナッツ食べる？"
16008-CVGroup_Tactic_In_1-1 = "え゛、どうして私がリーダー……？"
16008-CVGroup_Tactic_In_2-1 = "……え、私が先頭に……？\nマジで言ってる？"
16008-CVGroup_Tactic_Victory_1-1 = "終わった？終わったよね？\nよっしゃ帰ろ帰ろ。"
16008-CVGroup_Tactic_Victory_2-1 = "いやー……本当に勝てるとは思ってなかった。"
