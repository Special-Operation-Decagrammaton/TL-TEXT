[translation]
10071-CVGroup_Battle_Buffed_1-1 = "支援、届きました。"
10071-CVGroup_Battle_Covered_1-1 = "援護をお願いします。"
10071-CVGroup_Battle_Defense_1-1 = "被害、ありません。"
10071-CVGroup_Battle_In_1-1 = "突入します！"
10071-CVGroup_Battle_In_2-1 = "敵を発見、対応します！"
10071-CVGroup_Battle_Move_1-1 = "クリア。"
10071-CVGroup_Battle_Move_2-1 = "次。"
10071-CVGroup_Battle_Recovery_1-1 = "ありがとうございます。"
10071-CVGroup_Battle_TacticalAction_1-1 = "次のエリアに移動します。"
10071-CVGroup_Battle_Victory_1-1 = "見事な指揮でした、先生。"
10071-CVGroup_Battle_Victory_2-1 = "すべて、先生のおかげです。"
10071-CVGroup_CommonSkill-1 = "UVカットも……任務の一環です。"
10071-CVGroup_ExSkill_1-1 = "新しいドローンを試してみましょう。"
10071-CVGroup_ExSkill_2-1 = "飛行ドローン、稼働開始。"
10071-CVGroup_ExSkill_3-1 = "コードネーム「ビーチスポーツ」を開始します。"
10071-CVGroup_ExSkill_Level_1-1 = "着弾を確認しました。"
10071-CVGroup_ExSkill_Level_2-1 = "タンゴ、ダウン。"
10071-CVGroup_ExSkill_Level_3-1 = "命中しました。"
10071-CVGroup_Formation_In_1-1 = "了解です。"
10071-CVGroup_Formation_In_2-1 = "異常ありません。"
10071-CVGroup_Formation_Select-1 = "……ご、ご用でしょうか？"
10071-CVGroup_Growup_1-1 = "支援、感謝します。\n必ずやご期待に応えてみせます。"
10071-CVGroup_Growup_2-1 = "その……普段といただくものが違うような……\n……潜入任務中だから、ですか？"
10071-CVGroup_Growup_3-1 = "先生にいただいたもの、一つも無駄にはいたしません。"
10071-CVGroup_Growup_4-1 = "確かに受け取りました。\nありがとうございます。"
10071-CVGroup_Relationship_Up_1-1 = "よ、よろしいのですか？\nこんなに気を配っていただいて……\nい、嫌というわけではありません。"
10071-CVGroup_Relationship_Up_2-1 = "ありがとうございます、先生。\n大切にします。"
10071-CVGroup_Relationship_Up_3-1 = "お礼に、私にできることはないでしょうか？\nなんでもいいのですが……。"
10071-CVGroup_Relationship_Up_4-1 = "その……せっかくですし、もし先生さえよければ……。"
10071-CVGroup_Tactic_In_1-1 = "作戦を開始します。"
10071-CVGroup_Tactic_In_2-1 = "現場は把握しています。\n突入します。"
10071-CVGroup_Tactic_Victory_1-1 = "水着であろうと、どんな服装であろうと、\n作戦遂行に支障はありません。"
10071-CVGroup_Tactic_Victory_2-1 = "これで一安心ですね。"
