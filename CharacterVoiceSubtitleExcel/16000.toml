[translation]
16000-CVGroup_Battle_Buffed_1-1 = "Ah, m-muito obrigada!"
16000-CVGroup_Battle_Defense_1-1 = "N-não doeu nada!"
16000-CVGroup_Battle_In_1-1 = "E-então, vamos apagar tudo!"
16000-CVGroup_Battle_In_2-1 = "E-então... tome cuidado...\nVamos lá acabar com eles."
16000-CVGroup_Battle_Move_1-1 = "C-conforme as ordens, acabei com todos."
16000-CVGroup_Battle_Move_2-1 = "A-ainda não! Eu ainda consigo lutar!"
16000-CVGroup_Battle_Recovery_1-1 = "V-você vai dar isso para mim?"
16000-CVGroup_Battle_TacticalAction_1-1 = "E-eu vou!"
16000-CVGroup_Battle_Victory_1-1 = "Se for o seu desejo...\nEu eliminarei... qualquer um."
16000-CVGroup_Battle_Victory_2-1 = "E-ei, hum...\nEu... me saí bem?"
16000-CVGroup_CommonSkill-1 = "Ah, sangue... Eu não vou perdoar."
16000-CVGroup_ExSkill_1-1 = "E-eu vou!"
16000-CVGroup_ExSkill_2-1 = "P-por enquanto, eu vou atirar!"
16000-CVGroup_ExSkill_3-1 = "Haruka, indo!"
16000-CVGroup_ExSkill_Level_1-1 = "A-aaaaaaah!"
16000-CVGroup_ExSkill_Level_2-1 = "Aaaaaah!"
16000-CVGroup_ExSkill_Level_3-1 = "Morra, morra, morra!"
16000-CVGroup_Formation_In_1-1 = "Hieee...? E-eu?!"
16000-CVGroup_Formation_In_2-1 = "S-sério que sou eu?!"
16000-CVGroup_Formation_Select-1 = "Eh... ué?"
16000-CVGroup_Growup_1-1 = "Isso é bom demais para alguém como eu..."
16000-CVGroup_Growup_2-1 = "Por que você é tão bom comigo...?"
16000-CVGroup_Growup_3-1 = "P-preciso retribuir o favor.\nCom certeza, absolutamente, custe o que custar, eu vou retribuir!"
16000-CVGroup_Growup_4-1 = "C-com o meu eu de agora...\nTalvez eu consiga... atender às suas expectativas!"
16000-CVGroup_Relationship_Up_1-1 = "Sensei...\nMuito obrigada, de verdade..."
16000-CVGroup_Relationship_Up_2-1 = "Sensei...\nMeu coração está cheio de vontade de retribuir o que você faz por mim."
16000-CVGroup_Relationship_Up_3-1 = "Sensei...\nSe houver algo que você queira apagar, por favor, me diga.\nE-eu vou... apagar tudo!"
16000-CVGroup_Relationship_Up_4-1 = "Ah... b-bem...\n...Muito obrigada, Sensei."
16000-CVGroup_Tactic_In_1-1 = "Sim! Eu vou apagar tudo!"
16000-CVGroup_Tactic_In_2-1 = "S-sim! E-eu vou matar! Todos eles!"
16000-CVGroup_Tactic_Victory_1-1 = "Ufa... como você pediu, eu terminei tudo."
16000-CVGroup_Tactic_Victory_2-1 = "E-eu me esforcei ao máximo!"
