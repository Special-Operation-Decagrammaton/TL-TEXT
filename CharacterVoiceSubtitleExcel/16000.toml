[translation]
16000-CVGroup_Battle_Buffed_1-1 = "あ、ありがとうございます！"
16000-CVGroup_Battle_Defense_1-1 = "い、痛くありませんっ！"
16000-CVGroup_Battle_In_1-1 = "で、ではすべて消してしまいましょう！"
16000-CVGroup_Battle_In_2-1 = "で、では……気を付けて……\nやっつけに行きましょう。"
16000-CVGroup_Battle_Move_1-1 = "め、命令通り全部、やっつけました。"
16000-CVGroup_Battle_Move_2-1 = "ま、まだです！まだやれます！"
16000-CVGroup_Battle_Recovery_1-1 = "わ、私にくれるんですか？"
16000-CVGroup_Battle_TacticalAction_1-1 = "い、行きます！"
16000-CVGroup_Battle_Victory_1-1 = "ご希望でしたら……\n誰でも……排除しますから。"
16000-CVGroup_Battle_Victory_2-1 = "え、えっと……\n私……大丈夫でした？"
16000-CVGroup_CommonSkill-1 = "あ、血が……許さない。"
16000-CVGroup_ExSkill_1-1 = "い、行きます！"
16000-CVGroup_ExSkill_2-1 = "と、とりあえず撃ちます！"
16000-CVGroup_ExSkill_3-1 = "ハルカ、行きます！"
16000-CVGroup_ExSkill_Level_1-1 = "う、うわあああああっ！"
16000-CVGroup_ExSkill_Level_2-1 = "うわああ！"
16000-CVGroup_ExSkill_Level_3-1 = "死んでください死んでください死んでください！"
16000-CVGroup_Formation_In_1-1 = "ひぇっ……？わ、私ですか！？"
16000-CVGroup_Formation_In_2-1 = "ほ、本当に私なんですか？！"
16000-CVGroup_Formation_Select-1 = "え……うえっ？"
16000-CVGroup_Growup_1-1 = "わ、私なんかにはもったいないです……。"
16000-CVGroup_Growup_2-1 = "どうして私に、ここまでよくしてくれるんですか……？"
16000-CVGroup_Growup_3-1 = "お、恩返ししなきゃ。\n必ず、絶対に、何がなんでも、恩返ししますから！"
16000-CVGroup_Growup_4-1 = "い、今の私なら……\nご期待に……応えられるかも！"
16000-CVGroup_Relationship_Up_1-1 = "先生……。\n本当に、ありがとうございます……。"
16000-CVGroup_Relationship_Up_2-1 = "先生には……。\n恩返ししたい気持ちで、いっぱいです。"
16000-CVGroup_Relationship_Up_3-1 = "先生……。\n消したいものがあったら、私に教えてください。\nぜ、全部……消しますから！"
16000-CVGroup_Relationship_Up_4-1 = "あ……そ、その……。\n……ありがとうございます、先生。"
16000-CVGroup_Tactic_In_1-1 = "はいっ！私がすべて消しちゃいます！"
16000-CVGroup_Tactic_In_2-1 = "は、はいっ！こ、殺します！全員！"
16000-CVGroup_Tactic_Victory_1-1 = "ふぅ……言われた通り、すべてやり遂げました。"
16000-CVGroup_Tactic_Victory_2-1 = "い、一生懸命頑張りました！"
