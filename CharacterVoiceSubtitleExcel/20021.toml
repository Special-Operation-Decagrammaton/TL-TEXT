[translation]
20021-CVGroup_CommonSkill-1 = "Onde estão os que precisam de tratamento~?"
20021-CVGroup_ExSkill_1-1 = "É um presente para todos~!"
20021-CVGroup_ExSkill_2-1 = "Hoje eu sou o Papai Noel!"
20021-CVGroup_ExSkill_3-1 = "Vou entregar felicidade a todos!"
20021-CVGroup_ExSkill_Level_1-1 = "Aqui, aceite este presente!"
20021-CVGroup_ExSkill_Level_2-1 = "Por favor, aceite!"
20021-CVGroup_ExSkill_Level_3-1 = "Você gostou?"
20021-CVGroup_Formation_In_1-1 = "Vou dar o meu melhor como Papai Noel!"
20021-CVGroup_Formation_In_2-1 = "Pode deixar comigo!"
20021-CVGroup_Formation_Select-1 = "É um presente para o Sensei!"
20021-CVGroup_Growup_1-1 = "O Papai Noel é realmente incrível... Mas, como agora eu sou o Papai Noel, vou me esforçar para chegar perto do verdadeiro!"
20021-CVGroup_Growup_2-1 = "Já que estou vestindo esta roupa, vou dar o meu melhor! Sensei, você também vai me ajudar?"
20021-CVGroup_Growup_3-1 = "Mesmo que eu não possa me tornar o verdadeiro Papai Noel, quero entregar felicidade a todos!"
20021-CVGroup_Growup_4-1 = "Que um dia, todos possam ser felizes!"
20021-CVGroup_Relationship_Up_1-1 = "Algo importante no Natal...? É claro que é o amor!"
20021-CVGroup_Relationship_Up_2-1 = "Sensei! Você não tem interesse em um trenó que corre a Mach 2?"
20021-CVGroup_Relationship_Up_3-1 = "Espero que todos sejam tão felizes quanto eu estou agora."
20021-CVGroup_Relationship_Up_4-1 = "Se eu pudesse ganhar apenas um presente... eu escolheria passar um tempo com o Sensei!"
