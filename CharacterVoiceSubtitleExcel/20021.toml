[translation]
20021-CVGroup_CommonSkill-1 = "治療が必要な方はどこですか～？"
20021-CVGroup_ExSkill_1-1 = "みんなにプレゼントですよ～！"
20021-CVGroup_ExSkill_2-1 = "今日一日はサンタですから！"
20021-CVGroup_ExSkill_3-1 = "みんなに幸せをお届けします！"
20021-CVGroup_ExSkill_Level_1-1 = "はい、プレゼントをどうぞ！"
20021-CVGroup_ExSkill_Level_2-1 = "受け取ってください！"
20021-CVGroup_ExSkill_Level_3-1 = "気に入ってもらえましたか？"
20021-CVGroup_Formation_In_1-1 = "サンタとして頑張りますね！"
20021-CVGroup_Formation_In_2-1 = "任せてください！"
20021-CVGroup_Formation_Select-1 = "先生にプレゼントです！"
20021-CVGroup_Growup_1-1 = "サンタさんって本当にすごいです……\nでも、今は私がサンタなので、本物に近づけるよう頑張ります！"
20021-CVGroup_Growup_2-1 = "この服を着たからには、頑張りますよ！\n先生も、手伝ってくれますか？"
20021-CVGroup_Growup_3-1 = "本物のサンタさんにはなれなくても、\nみんなに幸せを届けたいです！"
20021-CVGroup_Growup_4-1 = "いつの日か、みんなが幸せになれますように！"
20021-CVGroup_Relationship_Up_1-1 = "クリスマスに大切なもの……？\nそれはもちろん、愛ですよ！"
20021-CVGroup_Relationship_Up_2-1 = "先生！マッハ2で走るソリに興味はありませんか？"
20021-CVGroup_Relationship_Up_3-1 = "今の私と同じくらい、みんなが幸せでありますように。"
20021-CVGroup_Relationship_Up_4-1 = "1つだけプレゼントがもらえるなら……\n私は先生との時間がいいです！"
