10066-CVGroup_Battle_Victory_2-1 = "Missão cumprida!\nEssa é uma das falas favoritas da Alice!"
10066-CVGroup_CommonSkill-1 = "Esfregar, esfregar... pronto!"
10066-CVGroup_ExSkill_1-1 = "Hora da limpeza, limpeza~♪\nAh! Preparação concluída!"
