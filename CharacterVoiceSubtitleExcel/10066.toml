[translation]
10066-CVGroup_Battle_Buffed_1-1 = "バフを貰いました！"
10066-CVGroup_Battle_Defense_1-1 = "回避します！"
10066-CVGroup_Battle_In_1-1 = "メイドパワーでお掃除していきます。"
10066-CVGroup_Battle_In_2-1 = "ジョブチェンジしても、アリスに変わりはありません。"
10066-CVGroup_Battle_Move_1-1 = "アリス、お掃除を続けます。"
10066-CVGroup_Battle_Move_2-1 = "移動します。"
10066-CVGroup_Battle_Recovery_1-1 = "HPが回復しました！"
10066-CVGroup_Battle_TacticalAction_1-1 = "目標に向かいます。"
10066-CVGroup_Battle_Victory_1-1 = "作戦成功！\n流石です、先生！"
10066-CVGroup_Battle_Victory_2-1 = "ミッションコンプリート！\nアリスの好きなセリフです！"
10066-CVGroup_CommonSkill-1 = "きゅっ、きゅっ……よし！"
10066-CVGroup_ExSkill_1-1 = "お掃除、お掃除～♪\nあっ！準備完了です！"
10066-CVGroup_ExSkill_2-1 = "お掃除タイム～♪\nんん？行けます！"
10066-CVGroup_ExSkill_3-1 = "よいしょ、よいしょ。\nあれ？頑張ります！"
10066-CVGroup_ExSkill_Level_1-1 = "ターゲット、ロックオン……光よ！"
10066-CVGroup_ExSkill_Level_2-1 = "アリスの目からは逃げられません！"
10066-CVGroup_ExSkill_Level_3-1 = "揺るがぬ意志で、光よ！"
10066-CVGroup_Formation_In_1-1 = "メイドのアリスです、よろしくお願いします！"
10066-CVGroup_Formation_In_2-1 = "今日のアリスの役割は……\n光属性の単体アタッカーです！"
10066-CVGroup_Formation_Select-1 = "うぅ……\nこの新スキン、まだ慣れません……。"
10066-CVGroup_Growup_1-1 = "メイドレベルアーップ！\nアリスのステータスが上昇しました！"
10066-CVGroup_Growup_2-1 = "メイドとしても、勇者としても、\nアリスにレベルキャップはありません！"
10066-CVGroup_Growup_3-1 = "メイド勇者になるには、どうしたら良いのか考えました。\nメイドと勇者のレベルを両方上げれば良いのです！\n先生、手伝ってください！"
10066-CVGroup_Growup_4-1 = "先生と一緒なら、立派なメイド勇者になれるはずです。\nこれからも、ずっとアリスのそばに居てください！"
10066-CVGroup_Relationship_Up_1-1 = "先生！メイド服は似合ってますか？"
10066-CVGroup_Relationship_Up_2-1 = "えへへ、先生と一緒に居られてアリスは嬉しいです。\nもっとナデナデしてください！"
10066-CVGroup_Relationship_Up_3-1 = "今日のアリスはメイドです！\nなので、先生の肩を叩きます！トントン！"
10066-CVGroup_Relationship_Up_4-1 = "アリスの親愛度が上昇しました！\nもう少し、甘えても良いですか……？"
10066-CVGroup_Tactic_In_1-1 = "クエスト開始！\nアリス、行きます！"
10066-CVGroup_Tactic_In_2-1 = "アリスはメイド勇者になります！"
10066-CVGroup_Tactic_Victory_1-1 = "やりました！\n先生、褒めてください！"
10066-CVGroup_Tactic_Victory_2-1 = "お掃除クエスト、完了です！"
