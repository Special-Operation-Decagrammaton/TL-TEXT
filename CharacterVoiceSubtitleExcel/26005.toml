[translation]
26005-CVGroup_CommonSkill-1 = "O que acha disso!?"
26005-CVGroup_ExSkill_1-1 = "Toma essa!"
26005-CVGroup_ExSkill_2-1 = "Hmph! Vou acabar com você!"
26005-CVGroup_ExSkill_3-1 = "Prepare-se!"
26005-CVGroup_ExSkill_Level_1-1 = "Haaaaa!"
26005-CVGroup_ExSkill_Level_2-1 = "E agora, o que acha!?"
26005-CVGroup_ExSkill_Level_3-1 = "Toma isso também!"
26005-CVGroup_Formation_In_1-1 = "Agradeça por eu ter me juntado a você!"
26005-CVGroup_Formation_In_2-1 = "Não tem jeito, vamos nessa!"
26005-CVGroup_Formation_Select-1 = "Kya!? O-o que foi de repente!?"
26005-CVGroup_Growup_1-1 = "Ah... ah... obrigada!"
26005-CVGroup_Growup_2-1 = "Hmph! Sensei!\nVocê pode contar mais comigo, sabia!"
26005-CVGroup_Growup_3-1 = "Isso! \nCom isso, eu fiquei muito mais forte!\nCom certeza eu até cresci, né!?"
26005-CVGroup_Growup_4-1 = "............Obrigada, Sensei.\nUm dia, eu vou te retribuir."
26005-CVGroup_Relationship_Up_1-1 = "É, como posso dizer, isso... \nÉ, é meio vergonhoso!"
26005-CVGroup_Relationship_Up_2-1 = "Hoje... foi divertido.\nN-não estou mentindo!"
26005-CVGroup_Relationship_Up_3-1 = "N-não entenda errado!\nÉ só que o tempo com o Sensei foi divertido demais!\nAh! Sinto que falei algo errado?!"
26005-CVGroup_Relationship_Up_4-1 = "Ah... ah... obrigada!\nN-neste momento, não consigo pensar em outras palavras.\nMas... na próxima, é que...!"
