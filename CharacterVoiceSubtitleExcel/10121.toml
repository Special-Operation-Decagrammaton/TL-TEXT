[translation]
10121-CVGroup_Battle_Buffed_1-1 = "Com certeza irei atender às suas expectativas!"
10121-CVGroup_Battle_Covered_1-1 = "Pronto! Já me escondi!"
10121-CVGroup_Battle_Defense_1-1 = "Hmph! Isso é muito pouco!"
10121-CVGroup_Battle_In_1-1 = "Por favor, sigam-me! Vamos nessa!"
10121-CVGroup_Battle_In_2-1 = "Vou mostrar a vocês a verdadeira habilidade de uma elite!"
10121-CVGroup_Battle_Move_1-1 = "Vamos aproveitar esse ímpeto!"
10121-CVGroup_Battle_Move_2-1 = "Vou seguir o fluxo~!"
10121-CVGroup_Battle_Recovery_1-1 = "Muito obrigada, de verdade!"
10121-CVGroup_Battle_TacticalAction_1-1 = "Por favor, não me deixem para trás!"
10121-CVGroup_Battle_Victory_1-1 = "Viram só o meu avanço glorioso?"
10121-CVGroup_Battle_Victory_2-1 = "Hehe! Isso é apenas o começo da lenda de Yukari!"
10121-CVGroup_CommonSkill-1 = "Que sabor único!"
10121-CVGroup_ExSkill_1-1 = "Tudo é tão maravilhoso que estou ficando tonta...\nO que eu faço!?"
10121-CVGroup_ExSkill_2-1 = "É um festival~! \nUé...? Ahhh!?"
10121-CVGroup_ExSkill_3-1 = "Então é assim que é um festival de verão...!\n...I-isso é um pouco intenso demais!?"
10121-CVGroup_ExSkill_Level_1-1 = "P-perigoso~!!"
10121-CVGroup_ExSkill_Level_2-1 = "Ahhhhhh!"
10121-CVGroup_ExSkill_Level_3-1 = "Estou em apuros!"
10121-CVGroup_Formation_In_1-1 = "Sim! Pode deixar comigo, de verdade!\nO que faremos?"
10121-CVGroup_Formation_In_2-1 = "Sinto meu corpo leve...\nEste traje é realmente muito fácil de se mover!"
10121-CVGroup_Formation_Select-1 = "Para onde quer que seja! \nEu acompanharei você!"
10121-CVGroup_Growup_1-1 = "A expectativa que o Sensei depositou em mim... jamais irei traí-la!"
10121-CVGroup_Growup_2-1 = "Ainda sou inexperiente, mas... continuarei me esforçando para corresponder às suas expectativas, Sensei!"
10121-CVGroup_Growup_3-1 = "O aprendizado nunca termina... Dizem que a vida inteira é um aprendizado. O Sensei sempre me mostra mundos que eu desconhecia... Sou verdadeiramente grata."
10121-CVGroup_Growup_4-1 = "Quero me tornar mais forte... para ser útil ao Sensei. Mais do que nunca... muito mais!"
10121-CVGroup_Relationship_Up_1-1 = "Cada momento como este é como um presente para mim. E ainda assim... o Sensei continua me dando ainda mais."
10121-CVGroup_Relationship_Up_2-1 = "Sinto um sentimento muito caloroso brotando do fundo do meu peito. Não entendo bem esse sentimento... O Sensei saberia me dizer o que é?"
10121-CVGroup_Relationship_Up_3-1 = "As flores murcham um dia, mas certamente não se arrependem de terem desabrochado. Sim... se é isso que o Sensei deseja, eu florescerei com todo o meu esplendor. Fique ao meu lado e observe."
10121-CVGroup_Relationship_Up_4-1 = "Do fundo do meu coração, sou muito grata. Jamais esquecerei este momento."
10121-CVGroup_Tactic_In_1-1 = "O Hyakkiyako está aqui! Vou mostrar a todo o Kivotos quem eu sou!"
10121-CVGroup_Tactic_In_2-1 = "Vou começar a lenda invencível de Kageyuzukoji Yukari!"
10121-CVGroup_Tactic_Victory_1-1 = "Hehe! Esse é o poder do Hyakkiyako!"
10121-CVGroup_Tactic_Victory_2-1 = "Uma vitória perfeita! Bom trabalho a todos!"
