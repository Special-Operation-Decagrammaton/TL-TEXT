[translation]
10121-CVGroup_Battle_Buffed_1-1 = "必ずご期待にお答えしてみせますの！"
10121-CVGroup_Battle_Covered_1-1 = "ささ！隠れましたの！"
10121-CVGroup_Battle_Defense_1-1 = "ふっふん！甘いですわ！"
10121-CVGroup_Battle_In_1-1 = "身共の後についてきてくださいませ！参りますわ！"
10121-CVGroup_Battle_In_2-1 = "えりーとの実力、お見せいたしますの！"
10121-CVGroup_Battle_Move_1-1 = "この勢いで参りましょう！"
10121-CVGroup_Battle_Move_2-1 = "流れに乗っていきますの～！"
10121-CVGroup_Battle_Recovery_1-1 = "さんきゅーべりいまっち、ですわ！"
10121-CVGroup_Battle_TacticalAction_1-1 = "置いていかないでくださいまし！"
10121-CVGroup_Battle_Victory_1-1 = "身共の華麗なる快進撃、ご覧になりましたの？"
10121-CVGroup_Battle_Victory_2-1 = "ふふっ！ユカリ伝説の始まりに過ぎませんわ！"
10121-CVGroup_CommonSkill-1 = "ゆに～くなお味ですの！"
10121-CVGroup_ExSkill_1-1 = "どれも素敵で目が回って……\nしまいますの！？"
10121-CVGroup_ExSkill_2-1 = "ふぇすてぃばる～ですわ！\nあら……？きゃぁっ！？"
10121-CVGroup_ExSkill_3-1 = "これが夏祭りなのですね……！\n……しょ、少々過激ですわ！？"
10121-CVGroup_ExSkill_Level_1-1 = "で、でんじゃらすですの～！！"
10121-CVGroup_ExSkill_Level_2-1 = "きゃああぁっ！"
10121-CVGroup_ExSkill_Level_3-1 = "身共、ぴんちですの！"
10121-CVGroup_Formation_In_1-1 = "はい！身共におまかせくださいませ、ですの！\n何をいたしましょう？"
10121-CVGroup_Formation_In_2-1 = "身体が軽い……\nこの装束、本当に動きやすいですの！"
10121-CVGroup_Formation_Select-1 = "どこへでもなんなりと！\nお供いたしますわ！"
10121-CVGroup_Growup_1-1 = "先生からいただいた身共への期待……決して裏切りませんわ！"
10121-CVGroup_Growup_2-1 = "身共はまだまだ未熟者ですが……\n先生のご期待に沿えるよう、これからも精進してまいりますの！"
10121-CVGroup_Growup_3-1 = "学びに終わりはありません……人生全てが学びである、と。\n先生は、いつも身共に知らない世界を見せてくださる……\n本当に、感謝しております。"
10121-CVGroup_Growup_4-1 = "身共、もっと強くなって……先生のお力になりたいのです。\nこれまで以上に……もっと！"
10121-CVGroup_Relationship_Up_1-1 = "この一瞬一瞬が、身共にとっては贈り物のようなものです。\nなのに……先生はまた、こうして与えてくださるのですね。"
10121-CVGroup_Relationship_Up_2-1 = "胸の内側から、とてもあたたかな感情がこみ上げてくるのです。\nこの気持ち、身共はよく分かりません……先生は、ご存知ですの？"
10121-CVGroup_Relationship_Up_3-1 = "花はいつか枯れてしまいますが、決して芽吹いたことを後悔しないでしょう。\nええ……先生が望むのであれば、身共は咲き誇ってみせます。そばで見ていてくださいね。"
10121-CVGroup_Relationship_Up_4-1 = "本当に、心より感謝いたします。\n身共は決してこの瞬間を忘れませんわ。"
10121-CVGroup_Tactic_In_1-1 = "百花繚乱に身共あり！\nと、キヴォトス中に知らしめてみせますわ！"
10121-CVGroup_Tactic_In_2-1 = "身共、勘解由小路ユカリの無敵伝説を始めていきますの！"
10121-CVGroup_Tactic_Victory_1-1 = "ふふっ！これが百花繚乱の力、ですの！"
10121-CVGroup_Tactic_Victory_2-1 = "ぱ～ふぇくとな勝利ですの！\nお疲れ様でございました、皆様！"
