[translation]
26013-CVGroup_CommonSkill-1 = "Fufu, que cheiro bom."
26013-CVGroup_ExSkill_1-1 = "Sensei, sorria."
26013-CVGroup_ExSkill_2-1 = "Vou tirar uma foto sua."
26013-CVGroup_ExSkill_3-1 = "Deixe-me tirar uma foto."
26013-CVGroup_ExSkill_Level_1-1 = "Aqui, parece que dá para tirar uma boa foto."
26013-CVGroup_ExSkill_Level_2-1 = "……Ok, diga xis."
26013-CVGroup_ExSkill_Level_3-1 = "Certo, vou tirar."
26013-CVGroup_Formation_In_1-1 = "Fico feliz que tenha me chamado."
26013-CVGroup_Formation_In_2-1 = "Entendido."
26013-CVGroup_Growup_1-1 = "É para mim……?\nVou cuidar bem disso."
26013-CVGroup_Growup_2-1 = "Aprender coisas novas é divertido, né?"
26013-CVGroup_Growup_3-1 = "Tanto assim……\nSerá que, por acaso, você tem expectativas sobre mim……?"
26013-CVGroup_Growup_4-1 = "Obrigada, Sensei.\nPor sempre me mostrar novas paisagens."
26013-CVGroup_Relationship_Up_1-1 = "Vou ficar aqui ao seu lado, Sensei.\n……De alguma forma, é o que eu quero fazer."
26013-CVGroup_Relationship_Up_2-1 = "Eu sempre recebo tanto de você, Sensei.\nEu queria poder retribuir de várias formas também……"
26013-CVGroup_Relationship_Up_3-1 = "Fufu, obrigada.\nVou tirar uma foto para registrar o momento."
26013-CVGroup_Relationship_Up_4-1 = "Ah, nessas horas…… eu deveria agradecer direito, né?\nSim, eu que agradeço, conto com você."
