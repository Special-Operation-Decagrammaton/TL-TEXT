[translation]
26013-CVGroup_CommonSkill-1 = "ふふ、いい香り。"
26013-CVGroup_ExSkill_1-1 = "先生、笑って。"
26013-CVGroup_ExSkill_2-1 = "写真、撮ってあげる。"
26013-CVGroup_ExSkill_3-1 = "一枚、撮らせて。"
26013-CVGroup_ExSkill_Level_1-1 = "ここ、いい写真が撮れそう。"
26013-CVGroup_ExSkill_Level_2-1 = "……はい、チーズ。"
26013-CVGroup_ExSkill_Level_3-1 = "はい、撮るね。"
26013-CVGroup_Formation_In_1-1 = "呼んでくれてうれしい。"
26013-CVGroup_Formation_In_2-1 = "確認した。"
26013-CVGroup_Growup_1-1 = "くれるの……？\n大切にするね。"
26013-CVGroup_Growup_2-1 = "学んでいくって、楽しいね。"
26013-CVGroup_Growup_3-1 = "こんなに……\nもしかして私、期待されてるのかな……？"
26013-CVGroup_Growup_4-1 = "ありがとう、先生。\nいつも新しい景色、みせてくれて。"
26013-CVGroup_Relationship_Up_1-1 = "先生の隣にいるね。\n……なんとなく、そうしたいの。"
26013-CVGroup_Relationship_Up_2-1 = "先生には、いつももらってばかり。\n私からもいろいろ、したいのに……。"
26013-CVGroup_Relationship_Up_3-1 = "ふふ、ありがとう。\n記念に写真、撮っておくね。"
26013-CVGroup_Relationship_Up_4-1 = "あっ、こういうときは……ちゃんとお礼を、だったね。\nはい、こちらこそ、よろしくお願いします。"
