[translation]
10062-CVGroup_Battle_Buffed_1-1 = "Isso ajudou."
10062-CVGroup_Battle_Defense_1-1 = "Isso é tudo?"
10062-CVGroup_Battle_In_1-1 = "Executando ordens."
10062-CVGroup_Battle_In_2-1 = "Como desejar."
10062-CVGroup_Battle_Move_1-1 = "Movendo-me."
10062-CVGroup_Battle_Move_2-1 = "Qual é a próxima área?"
10062-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10062-CVGroup_Battle_TacticalAction_1-1 = "Indo para o próximo."
10062-CVGroup_Battle_Victory_1-1 = "Sensei, está vendo? \nPaz, paz."
10062-CVGroup_Battle_Victory_2-1 = "Vamos avançar, \nVee, vee."
10062-CVGroup_CommonSkill-1 = "Lá vou eu."
10062-CVGroup_CommonSkill_2-1 = "Yaaaaah!"
10062-CVGroup_ExSkill_1-1 = "Abi-Eshuh, transição."
10062-CVGroup_ExSkill_2-1 = "Transmitindo coordenadas."
10062-CVGroup_ExSkill_3-1 = "Traje de força, ativado."
10062-CVGroup_ExSkill_4-1 = "Este é o meu... poder total!"
10062-CVGroup_ExSkill_5-1 = "Alvo confirmado. \nTrava de mira."
10062-CVGroup_ExSkill_6-1 = "Abi-Eshuh, modo de aniquilação."
10062-CVGroup_ExSkill_Level_1-1 = "Equipamento completo."
10062-CVGroup_ExSkill_Level_2-1 = "Iniciando combate."
10062-CVGroup_ExSkill_Level_3-1 = "Indo com força total."
10062-CVGroup_ExSkill_Level_4-1 = "Haaah!"
10062-CVGroup_ExSkill_Level_5-1 = "Disparar!"
10062-CVGroup_ExSkill_Level_6-1 = "Fogo!"
10062-CVGroup_Formation_In_1-1 = "Então, vamos começar."
10062-CVGroup_Formation_In_2-1 = "Vamos eliminar tudo o que estiver no caminho. \nEsse é o meu trabalho."
10062-CVGroup_Formation_Select-1 = "Entendo... então é isso."
10062-CVGroup_Growup_1-1 = "Ainda não posso dizer que estou completa... \nmas cheguei um pouco mais perto da perfeição."
10062-CVGroup_Growup_2-1 = "Com isso, poderei ajudar o Sensei ainda mais."
10062-CVGroup_Growup_3-1 = "Obrigada, Sensei. \nFarei o meu melhor para atender às suas expectativas."
10062-CVGroup_Growup_4-1 = "Agradeço por confiar em mim. \nMe esforçarei para não envergonhar o nome da C&C."
10062-CVGroup_Relationship_Up_1-1 = "Nosso vínculo se aprofundou ainda mais, Sensei. \nSim... por isso, continue olhando mais para mim."
10062-CVGroup_Relationship_Up_2-1 = "Dizem que um vínculo é uma relação especial formada entre as pessoas. \nOu seja, significa que o Sensei se tornou alguém especial para mim."
10062-CVGroup_Relationship_Up_3-1 = "...Embora eu pareça assim, há várias emoções girando dentro de mim. \nPor isso, Sensei... retribua com a mesma intensidade."
10062-CVGroup_Relationship_Up_4-1 = "Compartilhar sentimentos um com o outro é exatamente isso, não é... \nNão fique em silêncio... \nÉ constrangedor, sabia?"
10062-CVGroup_Tactic_In_1-1 = "Farei o que estiver ao meu alcance."
10062-CVGroup_Tactic_In_2-1 = "Pode dar as instruções."
10062-CVGroup_Tactic_Victory_1-1 = "Vitória alcançada. \nYahoo... o que achou?"
10062-CVGroup_Tactic_Victory_2-1 = "Missão concluída. \nFufu, ficou satisfeito?"
