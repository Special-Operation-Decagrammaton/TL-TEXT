[translation]
10062-CVGroup_Battle_Buffed_1-1 = "助かりました。"
10062-CVGroup_Battle_Defense_1-1 = "それで終わりですか？"
10062-CVGroup_Battle_In_1-1 = "命令を遂行します。"
10062-CVGroup_Battle_In_2-1 = "仰せのままに。"
10062-CVGroup_Battle_Move_1-1 = "移動します。"
10062-CVGroup_Battle_Move_2-1 = "次の地域はどこですか？"
10062-CVGroup_Battle_Recovery_1-1 = "ありがとうございます。"
10062-CVGroup_Battle_TacticalAction_1-1 = "次へ参ります。"
10062-CVGroup_Battle_Victory_1-1 = "先生、見てますか？\nピース、ピース。"
10062-CVGroup_Battle_Victory_2-1 = "次へ進みましょう、\nヴィー、ヴィー。"
10062-CVGroup_CommonSkill-1 = "いきます。"
10062-CVGroup_CommonSkill_2-1 = "やああああっ！"
10062-CVGroup_ExSkill_1-1 = "アビ・エシュフ、移行。"
10062-CVGroup_ExSkill_2-1 = "座標を送信します。"
10062-CVGroup_ExSkill_3-1 = "パワードスーツ、起動。"
10062-CVGroup_ExSkill_4-1 = "これが私の、全力……！"
10062-CVGroup_ExSkill_5-1 = "目標確認。\nロックオン。"
10062-CVGroup_ExSkill_6-1 = "アビ・エシュフ、殲滅モード。"
10062-CVGroup_ExSkill_Level_1-1 = "装着完了。"
10062-CVGroup_ExSkill_Level_2-1 = "戦闘を開始します。"
10062-CVGroup_ExSkill_Level_3-1 = "全力でまいります。"
10062-CVGroup_ExSkill_Level_4-1 = "はああっ！"
10062-CVGroup_ExSkill_Level_5-1 = "発射！"
10062-CVGroup_ExSkill_Level_6-1 = "ファイヤー！"
10062-CVGroup_Formation_In_1-1 = "それでは、始めます。"
10062-CVGroup_Formation_In_2-1 = "立ち塞がるすべてを排除しましょう。\nそれが私の仕事です。"
10062-CVGroup_Formation_Select-1 = "なるほど……これが例の。"
10062-CVGroup_Growup_1-1 = "まだ完全、とはいえませんが……\nより一層完璧に近づきました。"
10062-CVGroup_Growup_2-1 = "これで、より先生の補佐が捗ります。"
10062-CVGroup_Growup_3-1 = "ありがとうございます、先生。\n期待に応えられるよう尽力します。"
10062-CVGroup_Growup_4-1 = "私を信じてくださったこと、感謝します。\nC&Cの名に恥じぬよう、努めます。"
10062-CVGroup_Relationship_Up_1-1 = "先生との絆が更に深まりましたね。\nええ……ですから、先生はもっと私の事を見てくださいね。"
10062-CVGroup_Relationship_Up_2-1 = "絆とは、人と人の間に結ばれる特別な関係と言われています。\nつまり、先生が私の特別な方になった、ということです。"
10062-CVGroup_Relationship_Up_3-1 = "……こう見えても、私の中で様々な感情が渦巻いているのです。\nですから先生……同じだけの感情を返してくださいね。"
10062-CVGroup_Relationship_Up_4-1 = "互いに思いを分け合うというのは、こういうこと、ですよね……。\n黙らないでください……\n恥ずかしいではないですか。"
10062-CVGroup_Tactic_In_1-1 = "できることをするまでです。"
10062-CVGroup_Tactic_In_2-1 = "指示をどうぞ。"
10062-CVGroup_Tactic_Victory_1-1 = "勝利しました。\nやっほー……いかがでしょうか。"
10062-CVGroup_Tactic_Victory_2-1 = "任務完了です。\nふふ、ご満足いただけましたか？"
