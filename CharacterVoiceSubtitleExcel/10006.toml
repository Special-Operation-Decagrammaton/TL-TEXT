[translation]
10006-CVGroup_Battle_Buffed_1-1 = "Valeu."
10006-CVGroup_Battle_Covered_1-1 = "Preparada!"
10006-CVGroup_Battle_Defense_1-1 = "Hmph."
10006-CVGroup_Battle_In_1-1 = "Muito bem, vamos nessa!"
10006-CVGroup_Battle_In_2-1 = "Seguindo ordens, avançar!"
10006-CVGroup_Battle_Move_1-1 = "Certo, vamos acabar logo com isso."
10006-CVGroup_Battle_Move_2-1 = "Próximo!"
10006-CVGroup_Battle_Recovery_1-1 = "Agradeço, sou grata."
10006-CVGroup_Battle_TacticalAction_1-1 = "Movendo-me!"
10006-CVGroup_Battle_Victory_1-1 = "Este é o poder do Comitê Disciplinar de Gehenna."
10006-CVGroup_Battle_Victory_2-1 = "Eu sozinha já teria sido o suficiente."
10006-CVGroup_CommonSkill-1 = "Tome isso."
10006-CVGroup_ExSkill_1-1 = "Recarga concluída, prepare-se."
10006-CVGroup_ExSkill_2-1 = "Entrou no alcance, lá vou eu."
10006-CVGroup_ExSkill_3-1 = "Não subestime uma atiradora do Comitê Disciplinar de Gehenna!"
10006-CVGroup_ExSkill_Level_1-1 = "Não adianta fugir!"
10006-CVGroup_ExSkill_Level_2-1 = "Isso acaba aqui!"
10006-CVGroup_ExSkill_Level_3-1 = "Prepare-se!\nSeus infratores das regras!"
10006-CVGroup_Formation_In_1-1 = "Deixe comigo."
10006-CVGroup_Formation_In_2-1 = "Se essa é a ordem."
10006-CVGroup_Formation_Select-1 = "Bem, eu vou obedecer, mas...\nConte comigo, Sensei."
10006-CVGroup_Growup_1-1 = "Hã, realmente...\nSinto que fiquei mais forte."
10006-CVGroup_Growup_2-1 = "De agora em diante, se tiver missões difíceis, deixe comigo."
10006-CVGroup_Growup_3-1 = "Dar o meu melhor e obter resultados.\nParece algo natural, mas...\nQuando acontece, fico realmente feliz."
10006-CVGroup_Growup_4-1 = "Obrigada, Sensei.\nConto com você daqui para frente."
10006-CVGroup_Relationship_Up_1-1 = "Será que você se tornou um Sensei em quem posso confiar um pouco mais?"
10006-CVGroup_Relationship_Up_2-1 = "Minha cabeça sempre esteve cheia apenas com o Comitê Disciplinar, mas\nultimamente estou um pouco... obcecada por outras coisas.\nN-não é por você, Sensei, é pelo Schale!"
10006-CVGroup_Relationship_Up_3-1 = "Recebi uma nova missão.\nQue tal se a cumprirmos juntos e...\nBem... passarmos um tempo nos divertindo no caminho de volta?"
10006-CVGroup_Relationship_Up_4-1 = "N-não chegue tão perto de repente!\nPor que, você pergunta? É que...\nEu preciso me preparar mentalmente!"
10006-CVGroup_Tactic_In_1-1 = "Sem objeções, partindo."
10006-CVGroup_Tactic_In_2-1 = "Vou aniquilá-los."
10006-CVGroup_Tactic_Victory_1-1 = "Não vou baixar a guarda."
10006-CVGroup_Tactic_Victory_2-1 = "Um resultado esperado."
