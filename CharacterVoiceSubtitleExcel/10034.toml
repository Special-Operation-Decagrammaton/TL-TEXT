[translation]
10034-CVGroup_Battle_Buffed_1-1 = "Fufu, obrigada."
10034-CVGroup_Battle_Covered_1-1 = "Aqui é seguro, não é?"
10034-CVGroup_Battle_Defense_1-1 = "Ufa, deu tudo certo!"
10034-CVGroup_Battle_In_1-1 = "Desta vez, deixem que eu vá na frente."
10034-CVGroup_Battle_In_2-1 = "Eliminar o perigo antecipadamente também é uma forma de apoio dedicado. Então, vamos começar?"
10034-CVGroup_Battle_Move_1-1 = "Estão todos bem? Sim, então vamos seguir."
10034-CVGroup_Battle_Move_2-1 = "Está tudo bem, eu ainda consigo lutar...!"
10034-CVGroup_Battle_Recovery_1-1 = "Ah, obrigada."
10034-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10034-CVGroup_Battle_Victory_1-1 = "Como me saí, Sensei? Eu me esforcei bastante."
10034-CVGroup_Battle_Victory_2-1 = "Fufu, Sensei. Pode me elogiar?"
10034-CVGroup_CommonSkill-1 = "Preparei um almoço para vocês!"
10034-CVGroup_ExSkill_1-1 = "Vamos lá, pessoal, reúnam-se aqui."
10034-CVGroup_ExSkill_2-1 = "Que tal fazermos uma pausa?"
10034-CVGroup_ExSkill_3-1 = "Ah, eu tenho algo especial aqui!"
10034-CVGroup_ExSkill_Level_1-1 = "Fufu, estão todos aqui?"
10034-CVGroup_ExSkill_Level_2-1 = "Preparei bastante coisa."
10034-CVGroup_ExSkill_Level_3-1 = "Pessoal, comam bem e deem o seu melhor, certo?"
10034-CVGroup_Formation_In_1-1 = "Eu...? Sim, se é o que o Sensei deseja, farei com prazer."
10034-CVGroup_Formation_In_2-1 = "Sim, ajudar o Sensei, não é? Pode deixar comigo."
10034-CVGroup_Formation_Select-1 = "Fufu, Sensei. Há algo que eu possa fazer?"
10034-CVGroup_Growup_1-1 = "Ah, entendo... Esse tipo de treinamento também existe, não é?"
10034-CVGroup_Growup_2-1 = "Não sou muito boa em conflitos, mas quero me tornar forte pelo Sensei."
10034-CVGroup_Growup_3-1 = "Mesmo eu, que ainda sou fraca... Não, é justamente por eu ser fraca agora. De agora em diante, poderei me tornar ainda mais forte, não poderei?"
10034-CVGroup_Growup_4-1 = "O caminho do treinamento ainda é árduo... Mas vou me dedicar ainda mais. Por mim mesma e pelo Sensei."
10034-CVGroup_Relationship_Up_1-1 = "Nosso laço... está ficando cada vez mais profundo, não é, Sensei?"
10034-CVGroup_Relationship_Up_2-1 = "Com isso, poderei ficar mais perto do Sensei... Ah, não, não é nada...!"
10034-CVGroup_Relationship_Up_3-1 = "Não sei como expressar esse sentimento que transborda do fundo do meu coração. Mas só posso dizer uma coisa: ...Fico feliz por estar ao seu lado, Sensei."
10034-CVGroup_Relationship_Up_4-1 = "Você me considera tão importante assim... Obrigada, Sensei. ...Podemos ficar de mãos dadas por mais um pouco?"
10034-CVGroup_Tactic_In_1-1 = "Vou mostrar os resultados do meu treinamento."
10034-CVGroup_Tactic_In_2-1 = "Darei o meu melhor para ser útil ao Sensei."
10034-CVGroup_Tactic_Victory_1-1 = "Fico feliz por ter sido útil ao Sensei."
10034-CVGroup_Tactic_Victory_2-1 = "Eu fui útil? Fufu, fico feliz então."
