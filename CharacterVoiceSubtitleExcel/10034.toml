[translation]
10034-CVGroup_Battle_Buffed_1-1 = "ふふっ、ありがとうございます。"
10034-CVGroup_Battle_Covered_1-1 = "ここなら安全ですね。"
10034-CVGroup_Battle_Defense_1-1 = "ふう、何とかなりました！"
10034-CVGroup_Battle_In_1-1 = "今だけは、私が前を歩かせていただきますね。"
10034-CVGroup_Battle_In_2-1 = "事前に危険を排除することもまた、内助の功というもの。\nでは、始めましょうか。"
10034-CVGroup_Battle_Move_1-1 = "皆さん、大丈夫ですか？\nはい、では次行きましょう。"
10034-CVGroup_Battle_Move_2-1 = "大丈夫、まだ戦えます……！"
10034-CVGroup_Battle_Recovery_1-1 = "あっ、ありがとうございます。"
10034-CVGroup_Battle_TacticalAction_1-1 = "移動しますね。"
10034-CVGroup_Battle_Victory_1-1 = "いかがですか、先生？\n私、頑張りました。"
10034-CVGroup_Battle_Victory_2-1 = "ふふ、先生。\n褒めていただけますか？"
10034-CVGroup_CommonSkill-1 = "お弁当を用意していますよ！"
10034-CVGroup_ExSkill_1-1 = "さあ皆さん、集まってくださ～い。"
10034-CVGroup_ExSkill_2-1 = "休憩にしましょうか？"
10034-CVGroup_ExSkill_3-1 = "そうだ、とっておきのものがあるんです！"
10034-CVGroup_ExSkill_Level_1-1 = "ふふ、これで全員でしょうか？"
10034-CVGroup_ExSkill_Level_2-1 = "たくさん準備しましたよ。"
10034-CVGroup_ExSkill_Level_3-1 = "皆さん、しっかり食べて頑張ってくださいね？"
10034-CVGroup_Formation_In_1-1 = "私、ですか……？\nはい、先生のご要望でしたら、喜んで。"
10034-CVGroup_Formation_In_2-1 = "はい、先生のお手伝いですね。\nお任せください。"
10034-CVGroup_Formation_Select-1 = "ふふっ、先生。\n何か私にできることはありますか？"
10034-CVGroup_Growup_1-1 = "あっ、なるほど……\nこういう形の修行もあるのですね。"
10034-CVGroup_Growup_2-1 = "争いごとは得意ではありませんが、\n先生のために強くなりたいです。"
10034-CVGroup_Growup_3-1 = "まだ弱い私でも……\nいえ、今はまだ弱いからこそ。\nこれから先、もっと強くなれますよね。"
10034-CVGroup_Growup_4-1 = "修行の道のりはまだまだ険しいですが……。\nもっと精進します。\n私自身のためにも、先生のためにも。"
10034-CVGroup_Relationship_Up_1-1 = "私たちの絆……\nもっともっと、深くなっていくのですね。先生。"
10034-CVGroup_Relationship_Up_2-1 = "これで、より先生のお傍に……\nあっ、いえ、何でもありません……！"
10034-CVGroup_Relationship_Up_3-1 = "この胸の奥から沸き上がる感情を、どう表現すればいいのか分かりません。\nただ、これだけは言えます。\n……私、先生のお傍にいられてよかったです。"
10034-CVGroup_Relationship_Up_4-1 = "私のことを、こんなにも大切に思ってくださっているだなんて……。\nありがとうございます、先生。\n……もう少しだけ、こうして手を繋いだままでも良いですか？"
10034-CVGroup_Tactic_In_1-1 = "修行の成果、お見せしますね。"
10034-CVGroup_Tactic_In_2-1 = "先生のお役に立てるよう、全力を尽くします。"
10034-CVGroup_Tactic_Victory_1-1 = "先生のお役に立つことができて、よかったです。"
10034-CVGroup_Tactic_Victory_2-1 = "私、お役に立てましたでしょうか？\nふふっ、でしたら良かったです。"
