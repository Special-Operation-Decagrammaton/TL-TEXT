[translation]
10125-CVGroup_Battle_Buffed_1-1 = "補助魔法、ありがとうございます！"
10125-CVGroup_Battle_Covered_1-1 = "障壁魔法です！"
10125-CVGroup_Battle_Defense_1-1 = "回避魔法！"
10125-CVGroup_Battle_In_1-1 = "さて……どの魔法をご覧にいれましょう。"
10125-CVGroup_Battle_In_2-1 = "アルカナの示す場所へ……！"
10125-CVGroup_Battle_Move_1-1 = "今日は……こっちだと出ています！"
10125-CVGroup_Battle_Move_2-1 = "魔法があれば、どこへだって！"
10125-CVGroup_Battle_Recovery_1-1 = "にゅふ！魔力が湧いてきます！"
10125-CVGroup_Battle_TacticalAction_1-1 = "にゅふふ！"
10125-CVGroup_Battle_Victory_1-1 = "マスターの導きのおかげです！"
10125-CVGroup_Battle_Victory_2-1 = "にゅふふ、魔法あっての勝利です！"
10125-CVGroup_CommonSkill-1 = "ア、アブラカタブラ……！"
10125-CVGroup_ExSkill_1-1 = "引きました！最高のカードです！"
10125-CVGroup_ExSkill_2-1 = "魔法の力、お見せしましょう！"
10125-CVGroup_ExSkill_3-1 = "アルカナの導きあれ！"
10125-CVGroup_ExSkill_Level_1-1 = "星よ……輝け！"
10125-CVGroup_ExSkill_Level_2-1 = "アルカナよ……切り札となれ！"
10125-CVGroup_ExSkill_Level_3-1 = "聖なる波動を……ここに！！"
10125-CVGroup_Formation_In_1-1 = "やっぱ、私の魔法がないと始まりませんよね！"
10125-CVGroup_Formation_In_2-1 = "さあ、共に奇跡を起こしましょう！"
10125-CVGroup_Formation_Select-1 = "見てください！飛行魔法成功です！"
10125-CVGroup_Growup_1-1 = "こ、これは……マナが満ちていきます……！"
10125-CVGroup_Growup_2-1 = "私の潜在魔力を引き出してくださっているんですね！\nマスター！"
10125-CVGroup_Growup_3-1 = "絵も、このくらい上手になりたいです……！"
10125-CVGroup_Growup_4-1 = "磨きます！魔力も……画力も！"
10125-CVGroup_Relationship_Up_1-1 = "これが……マスターからの気持ち……。"
10125-CVGroup_Relationship_Up_2-1 = "きゅ、急に動悸が……！？\nま、マスター……魅了魔法を使ったのですか！？"
10125-CVGroup_Relationship_Up_3-1 = "ま、マスター……こんな気持ちは……\n占いにも出ていませんでした……！"
10125-CVGroup_Relationship_Up_4-1 = "マスターのお言葉には、不思議な魔力がありますね……。\nこの魔力をお借りして、作品を描き上げます！"
10125-CVGroup_Tactic_In_1-1 = "私の魔法とマスターの指揮が揃えば、\n向かうところ敵なし、です！"
10125-CVGroup_Tactic_In_2-1 = "さあ、我が驚愕の魔法をご覧あれ！"
10125-CVGroup_Tactic_Victory_1-1 = "にゅふ……この結果は占いで見えてましたよ！"
10125-CVGroup_Tactic_Victory_2-1 = "次なる魔法に、乞うご期待です！にゅふふ。"
