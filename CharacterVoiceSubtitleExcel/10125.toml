[translation]
10125-CVGroup_Battle_Buffed_1-1 = "Obrigada pela magia de suporte!"
10125-CVGroup_Battle_Covered_1-1 = "Magia de barreira!"
10125-CVGroup_Battle_Defense_1-1 = "Magia de esquiva!"
10125-CVGroup_Battle_In_1-1 = "Muito bem... que tipo de magia vocês gostariam de ver?"
10125-CVGroup_Battle_In_2-1 = "Para onde os arcanos indicarem...!"
10125-CVGroup_Battle_Move_1-1 = "Hoje... diz que é por aqui!"
10125-CVGroup_Battle_Move_2-1 = "Com magia, posso ir a qualquer lugar!"
10125-CVGroup_Battle_Recovery_1-1 = "Nyufu! Sinto o poder mágico fluindo!"
10125-CVGroup_Battle_TacticalAction_1-1 = "Nyufufu!"
10125-CVGroup_Battle_Victory_1-1 = "Graças à orientação do Mestre!"
10125-CVGroup_Battle_Victory_2-1 = "Nyufufu, esta vitória foi graças à magia!"
10125-CVGroup_CommonSkill-1 = "A, Abracadabra...!"
10125-CVGroup_ExSkill_1-1 = "Eu tirei! É a carta perfeita!"
10125-CVGroup_ExSkill_2-1 = "Vou mostrar o poder da magia!"
10125-CVGroup_ExSkill_3-1 = "Que os arcanos nos guiem!"
10125-CVGroup_ExSkill_Level_1-1 = "Estrelas... brilhem!"
10125-CVGroup_ExSkill_Level_2-1 = "Arcanos... tornem-se meu trunfo!"
10125-CVGroup_ExSkill_Level_3-1 = "Que a onda sagrada... esteja aqui!!"
10125-CVGroup_Formation_In_1-1 = "Como eu pensei, nada começa sem a minha magia, não é?"
10125-CVGroup_Formation_In_2-1 = "Vamos, vamos criar um milagre juntos!"
10125-CVGroup_Formation_Select-1 = "Olhem só! A magia de voo foi um sucesso!"
10125-CVGroup_Growup_1-1 = "I-isso é... o mana está transbordando...!"
10125-CVGroup_Growup_2-1 = "Você está despertando meu potencial mágico, não é?\nMestre!"
10125-CVGroup_Growup_3-1 = "Eu também quero ficar tão boa assim em desenhar...!"
10125-CVGroup_Growup_4-1 = "Vou aprimorar! Tanto meu poder mágico... quanto minha habilidade artística!"
10125-CVGroup_Relationship_Up_1-1 = "Isso é... o sentimento do Mestre..."
10125-CVGroup_Relationship_Up_2-1 = "A-ai, meu coração disparou de repente...!?\nM-Mestre... você usou uma magia de encantamento em mim!?"
10125-CVGroup_Relationship_Up_3-1 = "M-Mestre... esse sentimento... nem nas minhas previsões apareceu...!"
10125-CVGroup_Relationship_Up_4-1 = "As palavras do Mestre possuem uma magia misteriosa...\nVou usar esse poder mágico para terminar minha obra!"
10125-CVGroup_Tactic_In_1-1 = "Se combinarmos minha magia com o comando do Mestre,\nnão haverá inimigo que nos pareça!"
10125-CVGroup_Tactic_In_2-1 = "Vamos, contemplem minha magia surpreendente!"
10125-CVGroup_Tactic_Victory_1-1 = "Nyufu... eu já tinha visto esse resultado nas minhas previsões!"
10125-CVGroup_Tactic_Victory_2-1 = "Aguardem pela próxima magia! Nyufufu."
