[translation]
10092-CVGroup_Battle_Buffed_1-1 = "Nada mal!"
10092-CVGroup_Battle_Covered_1-1 = "Por enquanto, aqui!"
10092-CVGroup_Battle_Defense_1-1 = "Inútil!"
10092-CVGroup_Battle_In_1-1 = "Se é para fazer, vou fazer direito!"
10092-CVGroup_Battle_In_2-1 = "Começaremos no meu sinal!"
10092-CVGroup_Battle_Move_1-1 = "Vamos para o próximo compasso!"
10092-CVGroup_Battle_Move_2-1 = "A apresentação ainda não acabou!"
10092-CVGroup_Battle_Recovery_1-1 = "Obrigada!"
10092-CVGroup_Battle_TacticalAction_1-1 = "Haa!"
10092-CVGroup_Battle_Victory_1-1 = "Ha, ha. Ha...\nConseguimos...!"
10092-CVGroup_Battle_Victory_2-1 = "...Sim! É isso aí!"
10092-CVGroup_CommonSkill-1 = "Vou tingir tudo com o meu timbre!"
10092-CVGroup_ExSkill_1-1 = "Preste bastante atenção!"
10092-CVGroup_ExSkill_2-1 = "A empolgação está subindo!"
10092-CVGroup_ExSkill_3-1 = "Este é o clímax!"
10092-CVGroup_ExSkill_Level_1-1 = "Lá vou eu!"
10092-CVGroup_ExSkill_Level_2-1 = "Consegue me acompanhar!?"
10092-CVGroup_ExSkill_Level_3-1 = "Concentre-se em mim!"
10092-CVGroup_Formation_In_1-1 = "Não tem jeito, eu farei isso por você!"
10092-CVGroup_Formation_In_2-1 = "Quer ouvir a minha música?"
10092-CVGroup_Formation_Select-1 = "Ha! Acho que só eu mesma para dar conta, não é?"
10092-CVGroup_Growup_1-1 = "Será que melhorei?"
10092-CVGroup_Growup_2-1 = "Eu vou me esforçar!"
10092-CVGroup_Growup_3-1 = "Já cheguei a este nível...?\nSerá que eu tenho talento!?"
10092-CVGroup_Growup_4-1 = "Vou retribuir à altura das expectativas que depositaram em mim!\n...Através da música!"
10092-CVGroup_Relationship_Up_1-1 = "V-você pode mesmo me dar isso...?\nN-não que eu pretenda retribuir, viu!"
10092-CVGroup_Relationship_Up_2-1 = "Fala uma coisa, depois outra...\nVocê é uma pessoa difícil de entender..."
10092-CVGroup_Relationship_Up_3-1 = "A música... Ouça com atenção.\nE não conte para ninguém!"
10092-CVGroup_Relationship_Up_4-1 = "E-estou feliz, mas...\nVocê não está tentando me dizer para continuar na banda, está?"
10092-CVGroup_Tactic_In_1-1 = "Q-que foi? Uma briga de repente!?"
10092-CVGroup_Tactic_In_2-1 = "Não era para a gente tocar!?"
10092-CVGroup_Tactic_Victory_1-1 = "Hum! Era o esperado, não é?"
10092-CVGroup_Tactic_Victory_2-1 = "Foi uma boa apresentação, não foi?"
