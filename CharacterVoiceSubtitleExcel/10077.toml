[translation]
10077-CVGroup_CommonSkill-1 = "うまくいったんすかね～？"
10077-CVGroup_ExSkill_1-1 = "あ～あ。またっすか……？"
10077-CVGroup_ExSkill_2-1 = "はぁ……もう勘弁してほしいっす。"
10077-CVGroup_ExSkill_3-1 = "今取り込み中っす……。"
10077-CVGroup_ExSkill_Level_1-1 = "じゃ、頼んだっすよ～"
10077-CVGroup_ExSkill_Level_2-1 = "今度おごるんで！"
10077-CVGroup_ExSkill_Level_3-1 = "あとでいいっすか？\n今取り込み中で～"
10077-CVGroup_Growup_1-1 = "わっ！くれるんすか？\nありがとうっす、先生！"
10077-CVGroup_Growup_2-1 = "そんな事しても、別に何も出ないっすよ？"
10077-CVGroup_Growup_3-1 = "あははっ、こんだけもらっちゃったら、\nめちゃくちゃ頑張るしかないっすね～"
10077-CVGroup_Growup_4-1 = "ええーっと……。\n光栄っすけど、その……ははっ。"
10077-CVGroup_Relationship_Up_1-1 = "その……困りました……\nなんとお礼を言えば……。"
10077-CVGroup_Relationship_Up_2-1 = "こういうときって……\n素直に喜んでいいんです、よね？"
10077-CVGroup_Relationship_Up_3-1 = "このご恩は、いつか必ず返すっす！\nどういう風に返すかは、その時までのお楽しみってことで！"
10077-CVGroup_Relationship_Up_4-1 = "なんだか、こそばゆいというか、妙な感じがするっす……。\n気のせいっすかね……？"
10077-CVGroup_Battle_Buffed_1-1 = "助かったっす！"
10077-CVGroup_Battle_Covered_1-1 = "おっと！"
10077-CVGroup_Battle_Defense_1-1 = "無駄っすよ～"
10077-CVGroup_Battle_In_1-1 = "私について来～い……\nこれでいいっすか？"
10077-CVGroup_Battle_In_2-1 = "さあ、行くっすよ～！"
10077-CVGroup_Battle_Move_1-1 = "さっさと終わらせるっす～"
10077-CVGroup_Battle_Move_2-1 = "この調子でいくっすよ～！"
10077-CVGroup_Battle_Recovery_1-1 = "やっほ～"
10077-CVGroup_Battle_TacticalAction_1-1 = "よっ。"
10077-CVGroup_Battle_Victory_1-1 = "皆さん本当すごいっすね！"
10077-CVGroup_Battle_Victory_2-1 = "いや～なんとかなるもんっすね！"
10077-CVGroup_Formation_In_1-1 = "了解っす！"
10077-CVGroup_Formation_In_2-1 = "私っすか？"
10077-CVGroup_Formation_Select-1 = "あれっ……？\n出番、間違えたっすか？"
10077-CVGroup_Tactic_In_1-1 = "いよいよ始まるっすね。"
10077-CVGroup_Tactic_In_2-1 = "いや～やることがいっぱいっす。"
10077-CVGroup_Tactic_Victory_1-1 = "皆さん、お疲れ様っす！"
10077-CVGroup_Tactic_Victory_2-1 = "ふぅ！一段落ついたし、帰るっすよ～"
