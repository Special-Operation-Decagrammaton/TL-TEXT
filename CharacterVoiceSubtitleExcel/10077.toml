[translation]
10077-CVGroup_CommonSkill-1 = "Será que deu certo?"
10077-CVGroup_ExSkill_1-1 = "Ah, não. De novo...?"
10077-CVGroup_ExSkill_2-1 = "Haa... eu queria que me dessem um tempo."
10077-CVGroup_ExSkill_3-1 = "Estou ocupada agora..."
10077-CVGroup_ExSkill_Level_1-1 = "Então, conto com você, hein."
10077-CVGroup_ExSkill_Level_2-1 = "Depois eu te pago um lanche!"
10077-CVGroup_ExSkill_Level_3-1 = "Pode ser depois? Estou ocupada agora."
10077-CVGroup_Growup_1-1 = "Uau! É pra mim? Obrigado, Sensei!"
10077-CVGroup_Growup_2-1 = "Não precisa fazer isso, não vai ganhar nada em troca, sabe?"
10077-CVGroup_Growup_3-1 = "Ahaha, se ganhei tudo isso, não tenho escolha a não ser me esforçar ao máximo!"
10077-CVGroup_Growup_4-1 = "Err... é uma honra, mas... sabe... haha."
10077-CVGroup_Relationship_Up_1-1 = "Isso... que complicado... como eu deveria agradecer...?"
10077-CVGroup_Relationship_Up_2-1 = "Nessas horas... eu deveria simplesmente ficar feliz, né?"
10077-CVGroup_Relationship_Up_3-1 = "Vou retribuir esse favor algum dia! Como vou retribuir? Isso é uma surpresa para quando chegar a hora!"
10077-CVGroup_Relationship_Up_4-1 = "Sinto um formigamento, ou talvez uma sensação estranha... Será que é só impressão minha?"
10077-CVGroup_Battle_Buffed_1-1 = "Valeu pela ajuda!"
10077-CVGroup_Battle_Covered_1-1 = "Opa!"
10077-CVGroup_Battle_Defense_1-1 = "É inútil!"
10077-CVGroup_Battle_In_1-1 = "Me sigam... assim está bom?"
10077-CVGroup_Battle_In_2-1 = "Vamos nessa!"
10077-CVGroup_Battle_Move_1-1 = "Vamos acabar logo com isso."
10077-CVGroup_Battle_Move_2-1 = "Vamos continuar nesse ritmo!"
10077-CVGroup_Battle_Recovery_1-1 = "Eba!"
10077-CVGroup_Battle_TacticalAction_1-1 = "Ei."
10077-CVGroup_Battle_Victory_1-1 = "Vocês são realmente incríveis!"
10077-CVGroup_Battle_Victory_2-1 = "Nossa, deu tudo certo no final!"
10077-CVGroup_Formation_In_1-1 = "Entendido!"
10077-CVGroup_Formation_In_2-1 = "Eu?"
10077-CVGroup_Formation_Select-1 = "Ué...? Será que me chamaram na hora errada?"
10077-CVGroup_Tactic_In_1-1 = "Finalmente vai começar."
10077-CVGroup_Tactic_In_2-1 = "Nossa, tem tanta coisa para fazer."
10077-CVGroup_Tactic_Victory_1-1 = "Bom trabalho a todos!"
10077-CVGroup_Tactic_Victory_2-1 = "Ufa! Terminamos essa parte, vamos para casa!"
