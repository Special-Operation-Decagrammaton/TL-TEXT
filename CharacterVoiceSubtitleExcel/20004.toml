[translation]
20004-CVGroup_CommonSkill-1 = "Aqui, é para prevenir a insolação."
20004-CVGroup_ExSkill_1-1 = "Não temos nem tempo para descansar..."
20004-CVGroup_ExSkill_2-1 = "Eu estava ansiosa por esse descanso, mas..."
20004-CVGroup_ExSkill_3-1 = "Ainda bem que preparei as bebidas."
20004-CVGroup_ExSkill_Level_1-1 = "Não exagere nas bebidas gaseificadas."
20004-CVGroup_ExSkill_Level_2-1 = "Que tal um banho de refrigerante?"
20004-CVGroup_ExSkill_Level_3-1 = "Vou lavar todo o mal."
20004-CVGroup_Formation_In_1-1 = "Mais um incidente?"
20004-CVGroup_Formation_In_2-1 = "Mesmo em um resort, não podemos baixar a guarda."
20004-CVGroup_Formation_Select-1 = "Quer beber algo?"
20004-CVGroup_Growup_1-1 = "Cumprirei tanto as missões quanto o descanso com dedicação."
20004-CVGroup_Growup_2-1 = "Como esperado, quando o Sensei ensina, fica fácil de entender."
20004-CVGroup_Growup_3-1 = "Este treinamento também foi muito produtivo."
20004-CVGroup_Growup_4-1 = "Este é o poder da justiça..."
20004-CVGroup_Relationship_Up_1-1 = "Quando estou com o Sensei, até este sol forte parece agradável."
20004-CVGroup_Relationship_Up_2-1 = "Que praia maravilhosa... Obrigado por me trazer a um lugar assim. Como esperado, o Sensei é uma pessoa justa."
20004-CVGroup_Relationship_Up_3-1 = "Sensei, que tal irmos brincar naquela praia de novo? A-até a justiça precisa de descanso às vezes!"
20004-CVGroup_Relationship_Up_4-1 = "Sensei. Bem, é que... Ah, quer comer um picolé comigo?"
