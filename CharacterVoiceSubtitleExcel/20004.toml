[translation]
20004-CVGroup_CommonSkill-1 = "どうぞ、熱中症対策です。"
20004-CVGroup_ExSkill_1-1 = "休む暇もありませんね……。"
20004-CVGroup_ExSkill_2-1 = "せっかくの休息、楽しみにしていたのですが……。"
20004-CVGroup_ExSkill_3-1 = "飲み物を準備しておいて良かったです。"
20004-CVGroup_ExSkill_Level_1-1 = "炭酸の飲み過ぎはダメですよ。"
20004-CVGroup_ExSkill_Level_2-1 = "炭酸シャワーはいかがですか？"
20004-CVGroup_ExSkill_Level_3-1 = "悪は全て、洗い流します。"
20004-CVGroup_Formation_In_1-1 = "また何か事件ですか？"
20004-CVGroup_Formation_In_2-1 = "リゾート地でも、油断は禁物です。"
20004-CVGroup_Formation_Select-1 = "飲みます？"
20004-CVGroup_Growup_1-1 = "任務も休息も、しっかりとやります。"
20004-CVGroup_Growup_2-1 = "やはり先生に教えていただくと、分かりやすいです。"
20004-CVGroup_Growup_3-1 = "今回も充実した訓練でした。"
20004-CVGroup_Growup_4-1 = "これが、正義の力……。"
20004-CVGroup_Relationship_Up_1-1 = "先生と一緒ですと、\nこのような強い日差しも、気持ち良く感じられますね。"
20004-CVGroup_Relationship_Up_2-1 = "素敵な海辺……こんなところに連れてきてくれて、ありがとうございます。\nやはり先生は、正義のお方ですね。"
20004-CVGroup_Relationship_Up_3-1 = "先生、またこの前の海辺まで遊びに行きませんか？\nせ、正義にも時には、休息が必要なので！"
20004-CVGroup_Relationship_Up_4-1 = "先生。えっと、その……。\nあ、アイスキャンディー……\n一緒に食べますか？"
