[translation]
10072-CVGroup_Battle_Buffed_1-1 = "Ooh... sinto o poder transbordando...!"
10072-CVGroup_Battle_Defense_1-1 = "Isso aqui é à prova de balas, viu!"
10072-CVGroup_Battle_In_1-1 = "Combate, iniciar."
10072-CVGroup_Battle_In_2-1 = "Engajamento, iniciar!"
10072-CVGroup_Battle_Move_1-1 = "Próximo, vamos lá!"
10072-CVGroup_Battle_Move_2-1 = "Avançando em direção ao alvo!"
10072-CVGroup_Battle_Recovery_1-1 = "Isso ajuda muito!"
10072-CVGroup_Battle_TacticalAction_1-1 = "Limpo!"
10072-CVGroup_Battle_Victory_1-1 = "Conheça o inimigo e a si mesmo, e você não temerá o resultado de cem batalhas!"
10072-CVGroup_Battle_Victory_2-1 = "Esse nível de dificuldade é moleza para uma operadora das Forças Especiais da SRT!"
10072-CVGroup_CommonSkill-1 = "Preparar, fogo!"
10072-CVGroup_ExSkill_1-1 = "(Fufu... ah, que bela vista...)"
10072-CVGroup_ExSkill_2-1 = "(Deixe as operações subaquáticas comigo!)"
10072-CVGroup_ExSkill_3-1 = "(É por isso que eu não consigo parar de mergulhar...!)"
10072-CVGroup_ExSkill_Level_1-1 = "Foxtrot, lançando!"
10072-CVGroup_ExSkill_Level_2-1 = "É por ali!"
10072-CVGroup_ExSkill_Level_3-1 = "Isso aqui vai doer, viu?"
10072-CVGroup_Formation_In_1-1 = "A missão desta vez é um combate subaquático...\nSerá que eu vou me sair bem...?"
10072-CVGroup_Formation_In_2-1 = "Seja combate em montanhas ou no mar――\nA SRT não tem pontos cegos!"
10072-CVGroup_Formation_Select-1 = "Ei... é perigoso, não chegue perto durante a operação!"
10072-CVGroup_Growup_1-1 = "Mesmo que o local mude,\nnão podemos negligenciar o treinamento de forma alguma."
10072-CVGroup_Growup_2-1 = "Eu acredito firmemente que o suor derramado hoje nos guiará para a vitória de amanhã."
10072-CVGroup_Growup_3-1 = "Não é querendo me gabar, mas...\nTalvez eu tenha ficado um pouquinho mais forte...?"
10072-CVGroup_Growup_4-1 = "(Com isso, acho que... me aproximei um pouco mais das veteranas, não é?)"
10072-CVGroup_Relationship_Up_1-1 = "Bem, se for o Sensei...\nQualquer ordem que você me der... eu aceito."
10072-CVGroup_Relationship_Up_2-1 = "Não quero mostrar um lado patético e vergonhoso meu.\n...Especialmente na frente do Sensei."
10072-CVGroup_Relationship_Up_3-1 = "Isso é, uhm...\nUma espécie de agradecimento por você estar sempre me ajudando, eu acho..."
10072-CVGroup_Relationship_Up_4-1 = "Se estiver com problemas, me chame a qualquer momento.\nMesmo que não seja sobre assuntos da SRT."
10072-CVGroup_Tactic_In_1-1 = "Eu assumo a vanguarda aqui!"
10072-CVGroup_Tactic_In_2-1 = "Iniciando buscas.\nAvançando com atenção para não sofrermos uma emboscada."
10072-CVGroup_Tactic_Victory_1-1 = "Ah, uma vitória exatamente como o planejado na operação!"
10072-CVGroup_Tactic_Victory_2-1 = "Como eu imaginava... os manuais táticos não mentem."