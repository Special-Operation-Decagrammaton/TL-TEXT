[translation]
10072-CVGroup_Battle_Buffed_1-1 = "Oh... sinto o poder fluindo...!"
10072-CVGroup_Battle_Defense_1-1 = "Eu estou à prova de balas, então não se preocupe!"
10072-CVGroup_Battle_In_1-1 = "Combate, iniciado."
10072-CVGroup_Battle_In_2-1 = "Engajamento, iniciado!"
10072-CVGroup_Battle_Move_1-1 = "Próximo, vamos lá!"
10072-CVGroup_Battle_Move_2-1 = "Avançar em direção ao objetivo!"
10072-CVGroup_Battle_Recovery_1-1 = "Isso ajuda muito!"
10072-CVGroup_Battle_TacticalAction_1-1 = "Limpo!"
10072-CVGroup_Battle_Victory_1-1 = "Se você conhece o inimigo e a si mesmo, não precisa temer o resultado de cem batalhas!"
10072-CVGroup_Battle_Victory_2-1 = "Para um agente especial da SRT, isso é moleza!"
10072-CVGroup_CommonSkill-1 = "Preparem-se, atirar!"
10072-CVGroup_ExSkill_1-1 = "(Hehe... ah, que bela vista...)"
10072-CVGroup_ExSkill_2-1 = "(Deixe as operações subaquáticas comigo!)"
10072-CVGroup_ExSkill_3-1 = "(É por isso que não consigo parar de mergulhar...!)"
10072-CVGroup_ExSkill_Level_1-1 = "Foxtrot, lançado!"
10072-CVGroup_ExSkill_Level_2-1 = "É por ali!"
10072-CVGroup_ExSkill_Level_3-1 = "Isso vai doer, sabia?"
10072-CVGroup_Formation_In_1-1 = "A missão de hoje é um combate subaquático...\nSerá que vou me sair bem...?"
10072-CVGroup_Formation_In_2-1 = "Seja em combate de montanha ou marítimo--\nNão há pontos cegos para nós da SRT!"
10072-CVGroup_Formation_Select-1 = "Ei... é perigoso, não chegue perto durante a operação!"
10072-CVGroup_Growup_1-1 = "Mesmo que o local mude,\nnão posso negligenciar o treinamento."
10072-CVGroup_Growup_2-1 = "Acredito que o suor derramado hoje levará à vitória de amanhã."
10072-CVGroup_Growup_3-1 = "Não é querendo me gabar, mas...\nEu acho que fiquei um pouco mais forte...?"
10072-CVGroup_Growup_4-1 = "(Será que com isso... eu me aproximei um pouco dos veteranos?)"
10072-CVGroup_Relationship_Up_1-1 = "Bem, se for o Sensei...\nQualquer ordem que você me der... está tudo bem."
10072-CVGroup_Relationship_Up_2-1 = "Não quero mostrar uma figura patética.\n...Especialmente na frente do Sensei."
10072-CVGroup_Relationship_Up_3-1 = "Isso é, bem...\nUm agradecimento por sempre me ajudar, eu acho..."
10072-CVGroup_Relationship_Up_4-1 = "Se estiver com problemas, pode me chamar a qualquer momento.\nMesmo que não seja sobre a SRT."
10072-CVGroup_Tactic_In_1-1 = "Eu vou liderar o caminho!"
10072-CVGroup_Tactic_In_2-1 = "Iniciando busca.\nCuidado com emboscadas, vamos avançar."
10072-CVGroup_Tactic_Victory_1-1 = "Ah, uma vitória exatamente como planejado!"
10072-CVGroup_Tactic_Victory_2-1 = "Como esperado... o manual não mente."
