[translation]
10072-CVGroup_Battle_Buffed_1-1 = "おお……力がみなぎる……！"
10072-CVGroup_Battle_Defense_1-1 = "こっちは防弾だからな！"
10072-CVGroup_Battle_In_1-1 = "戦闘、開始。"
10072-CVGroup_Battle_In_2-1 = "交戦、開始！"
10072-CVGroup_Battle_Move_1-1 = "次、いくぞ！"
10072-CVGroup_Battle_Move_2-1 = "目標に向かって、前進！"
10072-CVGroup_Battle_Recovery_1-1 = "助かる！"
10072-CVGroup_Battle_TacticalAction_1-1 = "クリア！"
10072-CVGroup_Battle_Victory_1-1 = "敵を知り己を知れば、百戦危うからず！"
10072-CVGroup_Battle_Victory_2-1 = "この程度、SRT特殊隊員にとっては朝飯前だ！"
10072-CVGroup_CommonSkill-1 = "構えろ、撃て！"
10072-CVGroup_ExSkill_1-1 = "（ふふっ……ああ、いい景色だ……）"
10072-CVGroup_ExSkill_2-1 = "（水中作戦は、私に任せてくれ！）"
10072-CVGroup_ExSkill_3-1 = "（これだから、ダイビングはやめられない……！）"
10072-CVGroup_ExSkill_Level_1-1 = "フォックストロット、投下！"
10072-CVGroup_ExSkill_Level_2-1 = "あっちだ！"
10072-CVGroup_ExSkill_Level_3-1 = "こいつは痛いぞ？"
10072-CVGroup_Formation_In_1-1 = "今回の任務は水中戦か……。\nうまくできるだろうか……。"
10072-CVGroup_Formation_In_2-1 = "山岳戦も海上戦も――\n私たちSRTに死角はない！"
10072-CVGroup_Formation_Select-1 = "ちょっ……危険だから、作戦中は近づくな！"
10072-CVGroup_Growup_1-1 = "たとえ場所が変わったとしても、\n訓練を蔑ろにはできないからな。"
10072-CVGroup_Growup_2-1 = "今日流した汗が、明日の勝利に繋がると信じている。"
10072-CVGroup_Growup_3-1 = "別に自慢ではないが……\n私、ちょっと強くなったかも……？"
10072-CVGroup_Growup_4-1 = "（これで少しは……先輩たちに近づいたかな）"
10072-CVGroup_Relationship_Up_1-1 = "まあ先生なら……\nどんな命令を出されても……いいか。"
10072-CVGroup_Relationship_Up_2-1 = "無様な姿は見せたくない。\n……先生の前では、特に。"
10072-CVGroup_Relationship_Up_3-1 = "これは、その……\nいつも助けてくれてる、お礼、というか……。"
10072-CVGroup_Relationship_Up_4-1 = "困ったことがあれば、いつでも呼んでくれ。\nSRTの事じゃなくても、な。"
10072-CVGroup_Tactic_In_1-1 = "ここは私が先導する！"
10072-CVGroup_Tactic_In_2-1 = "捜索開始。\n奇襲に注意し、前進する。"
10072-CVGroup_Tactic_Victory_1-1 = "ああ、作戦通りの勝利だな！"
10072-CVGroup_Tactic_Victory_2-1 = "やはり……教範は嘘をつかない。"
