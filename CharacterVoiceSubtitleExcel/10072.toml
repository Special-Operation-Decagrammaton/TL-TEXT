[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10072-CVGroup_Battle_Buffed_1-1 = "Ooh... Estou transbordando poder...!" 
10072-CVGroup_Battle_Defense_1-1 = "Isto aqui é à prova de balas!" 
10072-CVGroup_Battle_In_1-1 = "Combate, iniciar." 
10072-CVGroup_Battle_In_2-1 = "Engajamento, iniciar!" 
10072-CVGroup_Battle_Move_1-1 = "Próximo, vamos!" 
10072-CVGroup_Battle_Move_2-1 = "Avançando em direção ao alvo!" 
10072-CVGroup_Battle_Recovery_1-1 = "Isso me salva!" 
10072-CVGroup_Battle_TacticalAction_1-1 = "Limpo!" 
10072-CVGroup_Battle_Victory_1-1 = "Conheça o inimigo e conheça a si mesmo, e não correrá perigo em cem batalhas!" 
10072-CVGroup_Battle_Victory_2-1 = "Este nível de desafio é fichinha para um soldado especial da SRT!" 
10072-CVGroup_CommonSkill-1 = "Preparem-se, fogo!" 
10072-CVGroup_ExSkill_1-1 = "(Fufu... Ah, que vista maravilhosa...)" 
10072-CVGroup_ExSkill_2-1 = "(Pode deixar as operações subaquáticas comigo!)" 
10072-CVGroup_ExSkill_3-1 = "(É por isso que eu não consigo parar de mergulhar...!)" 
10072-CVGroup_ExSkill_Level_1-1 = "Foxtrot, lançado!" 
10072-CVGroup_ExSkill_Level_2-1 = "É pra lá!" 
10072-CVGroup_ExSkill_Level_3-1 = "Esse carinha aqui machuca, sabia?" 
10072-CVGroup_Formation_In_1-1 = "Nossa missão desta vez é de combate subaquático...\nSerá que me sairei bem...?" 
10072-CVGroup_Formation_In_2-1 = "Seja combate em montanhas ou guerra naval――\nA nossa SRT não possui pontos cegos!" 
10072-CVGroup_Formation_Select-1 = "Ei... não chegue perto durante a operação, é perigoso!" 
10072-CVGroup_Growup_1-1 = "Mesmo que o local tenha mudado,\nnão podemos negligenciar o nosso treinamento." 
10072-CVGroup_Growup_2-1 = "Acredito que o suor derramado hoje nos levará à vitória de amanhã." 
10072-CVGroup_Growup_3-1 = "Não é por me gabar, mas...\nAcho que fiquei um pouco mais forte...?" 
10072-CVGroup_Growup_4-1 = "(Acho que com isso...\nConsegui chegar um passo mais perto das minhas veteranas.)" 
10072-CVGroup_Relationship_Up_1-1 = "Bem, se for o Sensei...\nNão me importo de receber qualquer tipo de ordem..." 
10072-CVGroup_Relationship_Up_2-1 = "Eu não quero mostrar uma postura patética e incompetente.\n...Especialmente na frente do Sensei." 
10072-CVGroup_Relationship_Up_3-1 = "Isso é, ahm...\nComo um agradecimento por sempre estar me ajudando..." 
10072-CVGroup_Relationship_Up_4-1 = "Se estiver com problemas, me chame a qualquer momento.\nMesmo que não seja relacionado a assuntos da SRT." 
10072-CVGroup_Tactic_In_1-1 = "Eu assumo a vanguarda aqui!" 
10072-CVGroup_Tactic_In_2-1 = "Iniciando varredura.\nAvançando com cautela contra ataques surpresa." 
10072-CVGroup_Tactic_Victory_1-1 = "Sim, uma vitória exatamente como planejada na operação!" 
10072-CVGroup_Tactic_Victory_2-1 = "Como eu esperava...\nO manual nunca mente." 