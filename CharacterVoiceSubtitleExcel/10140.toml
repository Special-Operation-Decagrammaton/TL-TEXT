[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
10140-CVGroup_Battle_Buffed_1-1 = "Timing perfeito! Me encheu de energia!" 
10140-CVGroup_Battle_Defense_1-1 = "Não vou deixar encostar um dedo no Sensei!" 
10140-CVGroup_Battle_In_1-1 = "Iniciando o massacre tático!" 
10140-CVGroup_Battle_In_2-1 = "FOX3, rasgando a linha de frente!" 
10140-CVGroup_Battle_Move_1-1 = "Buraco limpo e seguro!" 
10140-CVGroup_Battle_Move_2-1 = "Avançando pra próxima posição de abate." 
10140-CVGroup_Battle_Recovery_1-1 = "Ufa, valeu pela injeção de vigor!" 
10140-CVGroup_Battle_TacticalAction_1-1 = "Cobre a minha retaguarda, anda!" 
10140-CVGroup_Battle_Victory_1-1 = "Essa é a letalidade brutal da SRT, gravou?!" 
10140-CVGroup_Battle_Victory_2-1 = "Anotou o poder das Forças Especiais nas\nsuas córneas, ou tava só olhando pro meu corpo?!" 
10140-CVGroup_CommonSkill-1 = "Dois tiros no peito... e um no meio da fuça!" 
10140-CVGroup_ExSkill_1-1 = "Olha bem pra cá, seu lixo―― Diga xis~!" 
10140-CVGroup_ExSkill_2-1 = "Bora, abre um sorrisinho cego pra foto." 
10140-CVGroup_ExSkill_3-1 = "Foxtrot! Engole esse clarão!" 
10140-CVGroup_ExSkill_Level_1-1 = "Escudo de Flashbang, sobrecarregando!" 
10140-CVGroup_ExSkill_Level_2-1 = "Pode vir com tudo, o meu escudo\n(e o meu corpo) aguenta a porrada!" 
10140-CVGroup_ExSkill_Level_3-1 = "Deixou você todo arrepiadinho e cego, não deixou?" 
10140-CVGroup_Formation_In_1-1 = "FOX3. Minha farda tá pronta pra suar." 
10140-CVGroup_Formation_In_2-1 = "Chegou a hora de eu brilhar (e você babar)!" 
10140-CVGroup_Formation_Select-1 = "Hehe, a blindagem desse escudo aqui...\nEPA! Tira a mão daí, o que você tá apalpando?!" 
10140-CVGroup_Growup_1-1 = "Acho que o meu corpo tá desenvolvendo bem\ncom tanto suor... Se eu continuar nesse ritmo,\nlogo logo eu viro uma \"mulherão gostosa\" pra você, né?" 
10140-CVGroup_Growup_2-1 = "Isso sim que é um treino de me deixar pingando!" 
10140-CVGroup_Growup_3-1 = "Sinto que as minhas curvas... digo,\na minha visão de campo ampliou.\nCulpa do seu \"adestramento\" focado, Sensei." 
10140-CVGroup_Growup_4-1 = "（A minha carcaça tá muito rígida...\npreciso de alongamento e fricção\npesada pra amaciar logo.）" 
10140-CVGroup_Relationship_Up_1-1 = "E-Ei, bota um freio aí... Você não conhece limite\nde distância pessoal?! Tá colando demais o corpo!\nÉ Danger Close, seu pervertido!!" 
10140-CVGroup_Relationship_Up_2-1 = "I-Isso aqui que a gente tá fazendo também faz\nparte do treinamento tático de contato físico, tá legal?!\nN-Não vai achando que eu tô com segundas intenções, seu sádico!" 
10140-CVGroup_Relationship_Up_3-1 = "O seu corpo tá precisando de algo? Uma massagem,\nágua, eu mesma...? P-Peraí, não vai querer\nnada mesmo?! Seu cego!" 
10140-CVGroup_Relationship_Up_4-1 = "Até que o seu ombro serve pra eu me apoiar\nquando tô exausta... Você é um adulto\nbem esquisitão e degenerado, sabia? Fufu." 
10140-CVGroup_Tactic_In_1-1 = "FOX3. Pisei na zona do alvo. Pronta pro bote." 
10140-CVGroup_Tactic_In_2-1 = "Relaxa e curte a vista. Eu tô bem aqui\nna sua frente rebolando... quer dizer,\nbloqueando os tiros!" 
10140-CVGroup_Tactic_Victory_1-1 = "Hehe, você grudou o olho em mim e babou com\no meu desempenho lá no meio, não babou?" 
10140-CVGroup_Tactic_Victory_2-1 = "Ufa... O dia rendeu muito suor hoje!\nO seu desempenho foi bom também, Sensei!" 