[translation]
10140-CVGroup_Battle_Buffed_1-1 = "Идеальный тайминг!"
10140-CVGroup_Battle_Defense_1-1 = "Я не оставлю вам прохода!"
10140-CVGroup_Battle_In_1-1 = "Начало операции!"
10140-CVGroup_Battle_In_2-1 = "FOX3, выдвигаюсь!"
10140-CVGroup_Battle_Move_1-1 = "Чисто!"
10140-CVGroup_Battle_Move_2-1 = "Движусь к следующей точке."
10140-CVGroup_Battle_Recovery_1-1 = "Спасибо!"
10140-CVGroup_Battle_TacticalAction_1-1 = "Прикрой меня!"
10140-CVGroup_Battle_Victory_1-1 = "Вот она — истинная суть SRT!"
10140-CVGroup_Battle_Victory_2-1 = "Ну что, хорошо разглядел силу спецподразделения?"
10140-CVGroup_CommonSkill-1 = "Два в корпус... один в голову!"
10140-CVGroup_ExSkill_1-1 = "Посмотри сюда — скажи «чи-и-из»!"
10140-CVGroup_ExSkill_2-1 = "Ну же, улыбочку, улыбочку!"
10140-CVGroup_ExSkill_3-1 = "Фокстрот!"
10140-CVGroup_ExSkill_Level_1-1 = "Щит-вспышка, зарядка!"
10140-CVGroup_ExSkill_Level_2-1 = "Давайте, нападайте, я приму всё на себя!"
10140-CVGroup_ExSkill_Level_3-1 = "Это было больно, правда?"
10140-CVGroup_Formation_In_1-1 = "FOX3, к развёртыванию готова."
10140-CVGroup_Formation_In_2-1 = "Теперь моя очередь!"
10140-CVGroup_Formation_Select-1 = "Хе-хе, этот щит... Погоди, эй! Верни обратно!"
10140-CVGroup_Growup_1-1 = "Я прям чувствую, как уверенно расту. Если так пойдёт и дальше, скоро моя фигура станет отличной."
10140-CVGroup_Growup_2-1 = "Это была хорошая тренировка!"
10140-CVGroup_Growup_3-1 = "Чувствую, что мой кругозор расширился. Пожалуй, я обязана этим тебе, Сенсей."
10140-CVGroup_Growup_4-1 = "(Моё тело начинает ржаветь... Нужно возвращаться в форму.)"
10140-CVGroup_Relationship_Up_1-1 = "Э-эй... ты вообще знаешь, что такое безопасная дистанция!? Ты слишком близко! Это же «опасная зона»!"
10140-CVGroup_Relationship_Up_2-1 = "Э-это просто часть моих тренировок, ясно? Не вздумай ничего такого себе накрутить!"
10140-CVGroup_Relationship_Up_3-1 = "Тебе что-нибудь нужно? Я добуду это для тебя... погоди, тебе правда ничего не надо?"
10140-CVGroup_Relationship_Up_4-1 = "А ты на удивление надёжный, Сенсей. Честно, ты такой странный взрослый. Хе-хе."
10140-CVGroup_Tactic_In_1-1 = "FOX3, мы прибыли в целевую зону."
10140-CVGroup_Tactic_In_2-1 = "Не волнуйся. Я иду впереди!"
10140-CVGroup_Tactic_Victory_1-1 = "Хе-хе, видел, как я выложилась на полную?"
10140-CVGroup_Tactic_Victory_2-1 = "Фух... мы сегодня отлично потрудились! Тебе тоже хорошей работы, Сенсей!"