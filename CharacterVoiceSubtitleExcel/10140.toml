[translation]
10140-CVGroup_Battle_Buffed_1-1 = "ナイスタイミング！"
10140-CVGroup_Battle_Defense_1-1 = "通さないわよ！"
10140-CVGroup_Battle_In_1-1 = "作戦開始！"
10140-CVGroup_Battle_In_2-1 = "FOX3、突入！"
10140-CVGroup_Battle_Move_1-1 = "クリア！"
10140-CVGroup_Battle_Move_2-1 = "次のポイントへ向かうわ。"
10140-CVGroup_Battle_Recovery_1-1 = "ありがと！"
10140-CVGroup_Battle_TacticalAction_1-1 = "援護をお願い！"
10140-CVGroup_Battle_Victory_1-1 = "これがSRTの真髄よ！"
10140-CVGroup_Battle_Victory_2-1 = "特殊部隊の実力、ちゃんと目に焼き付けた？"
10140-CVGroup_CommonSkill-1 = "ボディーに2発……ヘッドに1発！"
10140-CVGroup_ExSkill_1-1 = "こっちを見なさい――はいっ、チーズ！"
10140-CVGroup_ExSkill_2-1 = "ほら、笑顔笑顔。"
10140-CVGroup_ExSkill_3-1 = "フォックストロット！"
10140-CVGroup_ExSkill_Level_1-1 = "フラッシュシールド、チャージ開始！"
10140-CVGroup_ExSkill_Level_2-1 = "来なさい、受け止めてあげる！"
10140-CVGroup_ExSkill_Level_3-1 = "ピリっとしたんじゃない？"
10140-CVGroup_Formation_In_1-1 = "FOX3、準備完了しているわ。"
10140-CVGroup_Formation_In_2-1 = "私の出番ね！"
10140-CVGroup_Formation_Select-1 = "ふふ、この盾はね……\nって、ちょっと！返しなさいよ！"
10140-CVGroup_Growup_1-1 = "なんだか着実に成長している実感があるわ。\nこのままいけば、すぐにナイスバディになれるかも。"
10140-CVGroup_Growup_2-1 = "良い訓練だったわ！"
10140-CVGroup_Growup_3-1 = "視野が広くなったような気がするわ。これも先生のおかげなのかもね。"
10140-CVGroup_Growup_4-1 = "（身体が鈍ってる……早く取り戻さないと）"
10140-CVGroup_Relationship_Up_1-1 = "ちょ、ちょっと……適正距離って分かる！？\n近すぎ！Danger Closeよ！？"
10140-CVGroup_Relationship_Up_2-1 = "こ、これも訓練の一環、なんだから。\nか、勘違いしないでよね！"
10140-CVGroup_Relationship_Up_3-1 = "何か必要なものはある？\n用意するわよ……って、本当にないの？"
10140-CVGroup_Relationship_Up_4-1 = "意外と先生って頼りがいがあるのよね。\n本当、変な大人。ふふっ。"
10140-CVGroup_Tactic_In_1-1 = "FOX3、目標エリアに到着したわ。"
10140-CVGroup_Tactic_In_2-1 = "心配しないで。私が先頭にいるわ！"
10140-CVGroup_Tactic_Victory_1-1 = "ふふっ、私の大活躍、見ててくれた？"
10140-CVGroup_Tactic_Victory_2-1 = "ふぅ……今日も頑張ったわね！\n先生もお疲れ様！"
