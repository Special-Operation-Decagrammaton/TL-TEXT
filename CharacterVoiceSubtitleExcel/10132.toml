[translation]
10132-CVGroup_Battle_Buffed_1-1 = "Muito, obrigada...!"
10132-CVGroup_Battle_Covered_1-1 = "Estilo Tsukuyo, técnica de ocultação...!"
10132-CVGroup_Battle_Defense_1-1 = "Eu não vou... deixar...!"
10132-CVGroup_Battle_In_1-1 = "Vamos seguir... pela passarela rumo à vitória...!"
10132-CVGroup_Battle_In_2-1 = "Pessoal, é hora do show...!"
10132-CVGroup_Battle_Move_1-1 = "Indo para o próximo estágio...!"
10132-CVGroup_Battle_Move_2-1 = "Ainda tem mais alguém...?"
10132-CVGroup_Battle_Recovery_1-1 = "Isso me ajudou...!"
10132-CVGroup_Battle_TacticalAction_1-1 = "É por aqui...?"
10132-CVGroup_Battle_Victory_1-1 = "É o final. Bom trabalho a todos...!"
10132-CVGroup_Battle_Victory_2-1 = "Que tal irmos comer um lámen... na comemoração?"
10132-CVGroup_CommonSkill-1 = "Ugh... eu quero comer lámen..."
10132-CVGroup_ExSkill_1-1 = "Mesmo em uma situação difícil, um ninja nunca desiste...!"
10132-CVGroup_ExSkill_2-1 = "Se eu fosse uma ninja... em um momento como este...!"
10132-CVGroup_ExSkill_3-1 = "Mesmo que meu vestido... rasgue...!"
10132-CVGroup_ExSkill_Level_1-1 = "Eu vou... parar isso...!"
10132-CVGroup_ExSkill_Level_2-1 = "Por favor, fiquem atrás de mim...!"
10132-CVGroup_ExSkill_Level_3-1 = "Estilo Tsukuyo, nova técnica de substituição...!"
10132-CVGroup_Formation_In_1-1 = "Eh! Um convite...? Para mim?"
10132-CVGroup_Formation_In_2-1 = "Eu vou... caminhar até o fim...!"
10132-CVGroup_Formation_Select-1 = "Hmm... Hya!? Ugh..."
10132-CVGroup_Growup_1-1 = "Sinto como se estivessem... me observando muito.\nÉ só impressão minha, né...?"
10132-CVGroup_Growup_2-1 = "Crescimento...? \nSerá que eu realmente tenho talento...?"
10132-CVGroup_Growup_3-1 = "Tanto assim... é um desperdício para mim..."
10132-CVGroup_Growup_4-1 = "Meu palco começa agora.\nPor favor, veja... a nova forma da ninja Tsukuyo...!"
10132-CVGroup_Relationship_Up_1-1 = "O vestido... combina comigo...? É verdade? Ehehe..."
10132-CVGroup_Relationship_Up_2-1 = "Se o Sensei estiver me observando... eu posso seguir... qualquer caminho..."
10132-CVGroup_Relationship_Up_3-1 = "Em vez de ficar sozinha no palco... eu prefiro... estar ao lado do Sensei..."
10132-CVGroup_Relationship_Up_4-1 = "Entre o que eu sou boa e o que eu gosto...\nSe eu tiver que escolher um, eu... prefiro o que eu gosto."
10132-CVGroup_Tactic_In_1-1 = "Por favor, cuidado... onde pisa...!"
10132-CVGroup_Tactic_In_2-1 = "Modelo... não, a ninja Tsukuyo... está indo!"
10132-CVGroup_Tactic_Victory_1-1 = "Que bom que terminou... sem problemas...!"
10132-CVGroup_Tactic_Victory_2-1 = "Pessoal, alguém... se machucou...?"
