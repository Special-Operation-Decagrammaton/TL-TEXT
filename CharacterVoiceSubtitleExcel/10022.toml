[translation]
10022-CVGroup_Battle_Buffed_1-1 = "Obrigada."
10022-CVGroup_Battle_Defense_1-1 = "Inútil."
10022-CVGroup_Battle_In_1-1 = "Deste ponto em diante, o treinamento do acampamento de verão começa."
10022-CVGroup_Battle_In_2-1 = "Todos, não se atrasem. Vamos."
10022-CVGroup_Battle_Move_1-1 = "Está quente, que incômodo..."
10022-CVGroup_Battle_Move_2-1 = "Haa... ainda tem mais?"
10022-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10022-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10022-CVGroup_Battle_Victory_1-1 = "Operação concluída.\nE-então... eu preferiria que você não ficasse me encarando tanto."
10022-CVGroup_Battle_Victory_2-1 = "Isso não foi nada demais.\nPor isso... não olhe tanto para mim."
10022-CVGroup_CommonSkill-1 = "Ali."
10022-CVGroup_ExSkill_1-1 = "Eu também preciso proteger a disciplina deste mar."
10022-CVGroup_ExSkill_2-1 = "Não tem jeito, vou usar a força."
10022-CVGroup_ExSkill_3-1 = "...Então sou eu quem tem que fazer isso, né?"
10022-CVGroup_ExSkill_Level_1-1 = "Por que não desiste logo?"
10022-CVGroup_ExSkill_Level_2-1 = "Não vou deixar você escapar."
10022-CVGroup_ExSkill_Level_3-1 = "Mesmo sendo um treinamento, não terei piedade."
10022-CVGroup_Formation_In_1-1 = "Combate, entendido."
10022-CVGroup_Formation_In_2-1 = "...Se for sobre os preparativos, já estou pronta."
10022-CVGroup_Formation_Select-1 = "...O que foi? O que devo fazer?"
10022-CVGroup_Growup_1-1 = "Parece que o acampamento realmente surtiu efeito."
10022-CVGroup_Growup_2-1 = "Embora eu esteja vestida assim...\nSe precisar da minha ajuda, é só falar."
10022-CVGroup_Growup_3-1 = "Eu ainda posso ficar mais forte...\nQuero me tornar mais forte por você também, Sensei."
10022-CVGroup_Growup_4-1 = "Obrigada por tudo sempre.\n...Eu sou assim, mas ficaria feliz se você confiasse mais em mim."
10022-CVGroup_Relationship_Up_1-1 = "Este verão também, poderei ficar junto com o Sensei."
10022-CVGroup_Relationship_Up_2-1 = "É um verão tão especial, tem certeza que quer ficar com uma garota entediante como eu?\n...Você quer ficar comigo? E-entendo..."
10022-CVGroup_Relationship_Up_3-1 = "A-ah, não fique tão perto...\nMesmo eu, bem... com esse traje, é realmente vergonhoso."
10022-CVGroup_Relationship_Up_4-1 = "As mãos do Sensei são frescas e agradáveis...\nLá fora o sol está brilhando tanto, então, bem, só mais um pouco..."
10022-CVGroup_Tactic_In_1-1 = "É trabalhoso, mas isso também faz parte do treinamento."
10022-CVGroup_Tactic_In_2-1 = "Sensei, por favor, me dê as instruções."
10022-CVGroup_Tactic_Victory_1-1 = "Como tive as instruções do Sensei, uma vitória como esta é natural."
10022-CVGroup_Tactic_Victory_2-1 = "Operação concluída... mas foi um pouco fácil demais.\nPara um treinamento, não foi o suficiente..."
