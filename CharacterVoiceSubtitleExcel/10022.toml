[translation]
10022-CVGroup_Battle_Buffed_1-1 = "ありがとう。"
10022-CVGroup_Battle_Defense_1-1 = "無駄。"
10022-CVGroup_Battle_In_1-1 = "これより、夏合宿のトレーニングを始める。"
10022-CVGroup_Battle_In_2-1 = "総員、遅れないように。行こう。"
10022-CVGroup_Battle_Move_1-1 = "暑い、めんどくさい……。"
10022-CVGroup_Battle_Move_2-1 = "はあ……まだいるの？"
10022-CVGroup_Battle_Recovery_1-1 = "ありがとう。"
10022-CVGroup_Battle_TacticalAction_1-1 = "移動する。"
10022-CVGroup_Battle_Victory_1-1 = "作戦成功。\nその……あんまりじっと見ないでほしい。"
10022-CVGroup_Battle_Victory_2-1 = "これくらい大したことじゃない。\nだから……そんなにこっち見ないで。"
10022-CVGroup_CommonSkill-1 = "そこっ。"
10022-CVGroup_ExSkill_1-1 = "この海の風紀も、私が守らないと。"
10022-CVGroup_ExSkill_2-1 = "仕方ない、実力行使で。"
10022-CVGroup_ExSkill_3-1 = "……私がやらないと、か。"
10022-CVGroup_ExSkill_Level_1-1 = "そろそろ諦めたら？"
10022-CVGroup_ExSkill_Level_2-1 = "逃がさない。"
10022-CVGroup_ExSkill_Level_3-1 = "トレーニングとはいえ、容赦はしない。"
10022-CVGroup_Formation_In_1-1 = "戦闘ね、了解。"
10022-CVGroup_Formation_In_2-1 = "……準備ならもうできてる。"
10022-CVGroup_Formation_Select-1 = "……なに、どうすればいい？"
10022-CVGroup_Growup_1-1 = "ちゃんと合宿の効果があったみたい。"
10022-CVGroup_Growup_2-1 = "こんな格好だけど……\n私の助けが必要なら、いつでも言って。"
10022-CVGroup_Growup_3-1 = "私はまだまだ強くなれる……\n先生のためにも、強くなりたい。"
10022-CVGroup_Growup_4-1 = "いつもありがとう。\n……こんな私だけど、もう少し頼ってくれると嬉しい。"
10022-CVGroup_Relationship_Up_1-1 = "今年の夏も、先生と一緒にいられるんだね。"
10022-CVGroup_Relationship_Up_2-1 = "せっかくの夏なのに、私みたいなつまらない子と一緒で良いの？\n……私と一緒「が」良い？そ、そう……。"
10022-CVGroup_Relationship_Up_3-1 = "あ、あんまりくっつかないで……。\nいくら私でも、その……。\nこの格好だと、流石に恥ずかしい。"
10022-CVGroup_Relationship_Up_4-1 = "先生の手、ひんやりしてて気持ちいい……。\n外はこんなに日が照ってるし、その、もう少し……。"
10022-CVGroup_Tactic_In_1-1 = "面倒だけど、これもトレーニングの一環。"
10022-CVGroup_Tactic_In_2-1 = "先生、指示をお願い。"
10022-CVGroup_Tactic_Victory_1-1 = "先生の指示もあったんだから、これくらいの勝利は当然。"
10022-CVGroup_Tactic_Victory_2-1 = "作戦成功……でも、少し簡単すぎ。\nトレーニングにしては物足りない……。"
