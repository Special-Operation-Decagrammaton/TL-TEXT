[translation]
10047-CVGroup_Battle_Buffed_1-1 = "力が湧いてくる～"
10047-CVGroup_Battle_Covered_1-1 = "ここに隠れてて良い～？"
10047-CVGroup_Battle_Defense_1-1 = "なんか、くすぐったい。"
10047-CVGroup_Battle_In_1-1 = "邪魔なもの、壊しちゃうね～"
10047-CVGroup_Battle_In_2-1 = "お散歩に、出発～"
10047-CVGroup_Battle_Move_1-1 = "次はどっち～？"
10047-CVGroup_Battle_Move_2-1 = "こっちに行ってみよ～"
10047-CVGroup_Battle_Recovery_1-1 = "あれ、ありがとう～"
10047-CVGroup_Battle_TacticalAction_1-1 = "こっちこっち～"
10047-CVGroup_Battle_Victory_1-1 = "見て見て、先生勝利のポーズ～"
10047-CVGroup_Battle_Victory_2-1 = "夏バージョンの、勝利のポーズ～どう？"
10047-CVGroup_CommonSkill-1 = "シュート～？"
10047-CVGroup_ExSkill_1-1 = "キラキラがたくさんだ～"
10047-CVGroup_ExSkill_2-1 = "さあさあ、進んでいこう～"
10047-CVGroup_ExSkill_3-1 = "夏の海、フィーバーだね～"
10047-CVGroup_ExSkill_Level_1-1 = "たしかこの辺にー……発見バーン。"
10047-CVGroup_ExSkill_Level_2-1 = "持ってたはずだけど～……\nあ、あった。榴弾、発射～"
10047-CVGroup_ExSkill_Level_3-1 = "んーと、えーっと……うん。\nとりあえず、撃ってみよっか。"
10047-CVGroup_Formation_In_1-1 = "日差しがぽかぽか～"
10047-CVGroup_Formation_In_2-1 = "んーと……\n……準備、OK？"
10047-CVGroup_Formation_Select-1 = "泳ぎに、行くの？"
10047-CVGroup_Growup_1-1 = "夏の日差しを浴びた時みたいな……。"
10047-CVGroup_Growup_2-1 = "うん、強くなった～\nもしかして、先生も一緒に強くなってる？"
10047-CVGroup_Growup_3-1 = "ふわふわした、雲みたいな気分～"
10047-CVGroup_Growup_4-1 = "次は戦車に……\nその次は、ロケットになりたいな。"
10047-CVGroup_Relationship_Up_1-1 = "先生と一緒にポカポカになれて……\n幸せって、このことかも？"
10047-CVGroup_Relationship_Up_2-1 = "先生、聞いて聞いて胸が、\nドクンドクンって言ってる。"
10047-CVGroup_Relationship_Up_3-1 = "先生と一緒にいると色んな俳句が浮かんできて、楽しい。"
10047-CVGroup_Relationship_Up_4-1 = "キラキラがいっぱいの夏だけど……\n一番キラキラなのは、やっぱり……。"
10047-CVGroup_Tactic_In_1-1 = "お散歩お散歩～……\nえ、違うの？"
10047-CVGroup_Tactic_In_2-1 = "キラキラを探して、前進～"
10047-CVGroup_Tactic_Victory_1-1 = "これで終わり～？\nじゃあ帰ろ、先生～"
10047-CVGroup_Tactic_Victory_2-1 = "私たちの、勝ち？\nじゃあもう、泳ぎに行ってもいい？"
