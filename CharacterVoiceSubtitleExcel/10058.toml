[translation]
10058-CVGroup_Battle_Buffed_1-1 = "Muito obrigada."
10058-CVGroup_Battle_Defense_1-1 = "Vou neutralizar isso!"
10058-CVGroup_Battle_In_1-1 = "Eu irei na frente, por favor, cubra as minhas costas."
10058-CVGroup_Battle_In_2-1 = "Esquadrão de Socorro, em frente."
10058-CVGroup_Battle_Move_1-1 = "Vamos avançar."
10058-CVGroup_Battle_Move_2-1 = "Movendo-me."
10058-CVGroup_Battle_Recovery_1-1 = "Muito obrigada.\nSinto-me melhor agora."
10058-CVGroup_Battle_TacticalAction_1-1 = "Para onde devemos ir agora?"
10058-CVGroup_Battle_Victory_1-1 = "O socorro foi concluído com sucesso."
10058-CVGroup_Battle_Victory_2-1 = "Nossa vitória.\nMas não podemos baixar a guarda."
10058-CVGroup_CommonSkill-1 = "Darei o meu melhor!"
10058-CVGroup_ExSkill_1-1 = "Lá vou eu!"
10058-CVGroup_ExSkill_2-1 = "É ali, então."
10058-CVGroup_ExSkill_3-1 = "Afastem-se!"
10058-CVGroup_ExSkill_Level_1-1 = "Levando socorro ao campo de batalha!"
10058-CVGroup_ExSkill_Level_2-1 = "Com orgulho e convicção em meu coração!"
10058-CVGroup_ExSkill_Level_3-1 = "Até o último momento!"
10058-CVGroup_Formation_In_1-1 = "Entendido, vamos nessa."
10058-CVGroup_Formation_In_2-1 = "É a vez do Esquadrão de Socorro."
10058-CVGroup_Formation_Select-1 = "O-o que está acontecendo!?"
10058-CVGroup_Growup_1-1 = "Por que... você faria tanto por mim...?"
10058-CVGroup_Growup_2-1 = "Muito obrigada, Sensei."
10058-CVGroup_Growup_3-1 = "Fufu, parece que acabei sendo eu quem recebeu o socorro desta vez."
10058-CVGroup_Growup_4-1 = "Se não se importar, gostaria de tomar um chá com você algum dia?\nQuero retribuir o favor."
10058-CVGroup_Relationship_Up_1-1 = "É um sentimento ao qual não estou acostumada...\nÉ algo leve... que aquece o meu peito...\nSinto-me um pouco tímida."
10058-CVGroup_Relationship_Up_2-1 = "Você percebeu?\n...Que o Sensei está me mudando, pouco a pouco."
10058-CVGroup_Relationship_Up_3-1 = "Se eu pudesse... ser de alguma ajuda para você..."
10058-CVGroup_Relationship_Up_4-1 = "O Sensei sempre me dá mais do que eu poderia retribuir...\nVocê é uma pessoa problemática, de verdade... fufu."
10058-CVGroup_Tactic_In_1-1 = "Deixe comigo. Eu serei a linha de frente."
10058-CVGroup_Tactic_In_2-1 = "Que a bênção alcance a todos."
10058-CVGroup_Tactic_Victory_1-1 = "Pessoal, alguém se feriu?"
10058-CVGroup_Tactic_Victory_2-1 = "Não deixarei ninguém que precise de \"socorro\" para trás.\nÉ o meu dever."
