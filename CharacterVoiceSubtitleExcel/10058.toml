[translation]
10058-CVGroup_Battle_Buffed_1-1 = "ありがとうございます。"
10058-CVGroup_Battle_Defense_1-1 = "無力化します！"
10058-CVGroup_Battle_In_1-1 = "私が前に出ますので、背中をお願いします。"
10058-CVGroup_Battle_In_2-1 = "救護騎士団、参ります。"
10058-CVGroup_Battle_Move_1-1 = "進みましょう。"
10058-CVGroup_Battle_Move_2-1 = "移動します。"
10058-CVGroup_Battle_Recovery_1-1 = "ありがとうございます。\n楽になりました。"
10058-CVGroup_Battle_TacticalAction_1-1 = "次はどちらでしょうか？"
10058-CVGroup_Battle_Victory_1-1 = "無事に救護が完了しました。"
10058-CVGroup_Battle_Victory_2-1 = "私たちの勝利です。\nしかし、油断は禁物ですよ。"
10058-CVGroup_CommonSkill-1 = "全力で参ります！"
10058-CVGroup_ExSkill_1-1 = "参ります！"
10058-CVGroup_ExSkill_2-1 = "そちらですね。"
10058-CVGroup_ExSkill_3-1 = "下がってください！"
10058-CVGroup_ExSkill_Level_1-1 = "戦場に救護の手を！"
10058-CVGroup_ExSkill_Level_2-1 = "誇りと信念を胸に刻み！"
10058-CVGroup_ExSkill_Level_3-1 = "最後のその瞬間まで！"
10058-CVGroup_Formation_In_1-1 = "かしこまりました、参りましょう。"
10058-CVGroup_Formation_In_2-1 = "救護騎士団の出番ですね。"
10058-CVGroup_Formation_Select-1 = "な、何が起きているのでしょうか！？"
10058-CVGroup_Growup_1-1 = "私に……どうしてここまで……？"
10058-CVGroup_Growup_2-1 = "ありがとうございます、先生。"
10058-CVGroup_Growup_3-1 = "ふふ、私が救護を受ける事になってしまいましたね。"
10058-CVGroup_Growup_4-1 = "よろしければ、今度お茶でもいかがですか？\n何かお礼がしたいのです。"
10058-CVGroup_Relationship_Up_1-1 = "あまり慣れない感情ですね……\nふわふわとしていて……胸が温かくなるような……\nくすぐったい気分です。"
10058-CVGroup_Relationship_Up_2-1 = "お気づきでしょうか？\n……先生が私を、少しずつ変えているのだと。"
10058-CVGroup_Relationship_Up_3-1 = "私が……何かお力になれたら……。"
10058-CVGroup_Relationship_Up_4-1 = "先生は、いつも返しきれないほどのものを私に与えるんですから……\n困ったお方です、本当に……ふふっ。"
10058-CVGroup_Tactic_In_1-1 = "お任せを。私が先頭に立ちます。"
10058-CVGroup_Tactic_In_2-1 = "全ての人々に恵みを。"
10058-CVGroup_Tactic_Victory_1-1 = "皆さん、お怪我はありませんか？"
10058-CVGroup_Tactic_Victory_2-1 = "「救護」が必要な方を誰一人、逃がさない。\n当然のことです。"
