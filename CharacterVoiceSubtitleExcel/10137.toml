[translation]
10137-CVGroup_Battle_Buffed_1-1 = "Muito obrigada, de verdade!"
10137-CVGroup_Battle_Defense_1-1 = "Se não mirar direito, não vai acertar, sabia?"
10137-CVGroup_Battle_In_1-1 = "Mãos ao alto! Se se mexer, eu atiro!\nAh... quer dizer, pode se mexer se quiser, tá?"
10137-CVGroup_Battle_In_2-1 = "Flagrante detectado! Entrando em ação!"
10137-CVGroup_Battle_Move_1-1 = "Não dá para ir para casa agora?"
10137-CVGroup_Battle_Move_2-1 = "Ei, não podemos deixar o resto para amanhã?"
10137-CVGroup_Battle_Recovery_1-1 = "Valeu mesmo!"
10137-CVGroup_Battle_TacticalAction_1-1 = "Vamos de táxi, vai!"
10137-CVGroup_Battle_Victory_1-1 = "Ei, como suspeito, você tem direito a um advogado... \nComo é que era mesmo?"
10137-CVGroup_Battle_Victory_2-1 = "Só tenho um par de algemas, então é melhor vir comigo sem reclamar!"
10137-CVGroup_CommonSkill-1 = "Meu livro! Trate de me reembolsar!"
10137-CVGroup_ExSkill_1-1 = "A polícia chegou!"
10137-CVGroup_ExSkill_2-1 = "Executando a justiça!"
10137-CVGroup_ExSkill_3-1 = "Aperte os dentes!"
10137-CVGroup_ExSkill_Level_1-1 = "Vale a pena capturar!"
10137-CVGroup_ExSkill_Level_2-1 = "Não resista!"
10137-CVGroup_ExSkill_Level_3-1 = "Se tem alguma reclamação, entre para a Valkyrie."
10137-CVGroup_Formation_In_1-1 = "Tá bom, tá bom, eu faço.\nAi, que preguiça..."
10137-CVGroup_Formation_In_2-1 = "Qual era a minha posição no horóscopo de hoje mesmo?"
10137-CVGroup_Formation_Select-1 = "Ah... que bom esticar as costas!"
10137-CVGroup_Growup_1-1 = "Fiquei mais forte!\n...Acho que o número de pessoas que vou mandar para o hospital vai aumentar."
10137-CVGroup_Growup_2-1 = "Oh, com isso aqui, será que eu não conseguiria virar policial de verdade?\nTô brincando!"
10137-CVGroup_Growup_3-1 = "Promoção? Adorei!\nNunca se sabe quando vou ser rebaixada de novo!"
10137-CVGroup_Growup_4-1 = "Opa! É isso! Sinto uma energia renovada!"
10137-CVGroup_Relationship_Up_1-1 = "O que foi, Sensei? Você gosta de mim?\nSério? Mas tem tantas outras garotas mais gentis por aí, não tem?"
10137-CVGroup_Relationship_Up_2-1 = "Ei... eu também sou uma garota, sabe...\nPosso não parecer, mas sou sensível, viu?"
10137-CVGroup_Relationship_Up_3-1 = "Ser parceira do Sensei só traz coisas boas!"
10137-CVGroup_Relationship_Up_4-1 = "Muito obrigada... por tudo...\nAh, não, quer dizer... por várias coisas."
10137-CVGroup_Tactic_In_1-1 = "Ei, você tem um mandado? Porque eu não tenho!"
10137-CVGroup_Tactic_In_2-1 = "Onde será que eles se esconderam?"
10137-CVGroup_Tactic_Victory_1-1 = "Alguns danos colaterais estão dentro do aceitável!"
10137-CVGroup_Tactic_Victory_2-1 = "Vitória fácil. Nem serviu como aquecimento!"
