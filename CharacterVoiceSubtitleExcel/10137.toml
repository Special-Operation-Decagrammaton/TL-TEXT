[translation]
10137-CVGroup_Battle_Buffed_1-1 = "感謝感激雨あられ～"
10137-CVGroup_Battle_Defense_1-1 = "ちゃんと狙わないと当たらないっすよ。"
10137-CVGroup_Battle_In_1-1 = "手を上げろ！動いたら撃つ！\nあ……動いてもいいからね？"
10137-CVGroup_Battle_In_2-1 = "現行犯発見！しゅつど～"
10137-CVGroup_Battle_Move_1-1 = "ここで帰っちゃダメっすか？"
10137-CVGroup_Battle_Move_2-1 = "えー、残りは明日にしません？"
10137-CVGroup_Battle_Recovery_1-1 = "あざーっす！"
10137-CVGroup_Battle_TacticalAction_1-1 = "タクシーで移動しましょうよ～"
10137-CVGroup_Battle_Victory_1-1 = "えー、被疑者であるあなたは弁護士の立ち合いを……\nなんだっけ。"
10137-CVGroup_Battle_Victory_2-1 = "手錠は1つしかないんで。大人しくついてくるっすよ～"
10137-CVGroup_CommonSkill-1 = "あたしの本！ちゃんと弁償してよね！"
10137-CVGroup_ExSkill_1-1 = "警察とうじょ～！"
10137-CVGroup_ExSkill_2-1 = "正義執行！"
10137-CVGroup_ExSkill_3-1 = "歯ァ食いしばっときな！"
10137-CVGroup_ExSkill_Level_1-1 = "捕まえ甲斐があるぅ！"
10137-CVGroup_ExSkill_Level_2-1 = "抵抗しなさんなって！"
10137-CVGroup_ExSkill_Level_3-1 = "文句があるなら、ヴァルキューレに入ることだね。"
10137-CVGroup_Formation_In_1-1 = "はいはい、やりますよーっと。\nはぁ、めんど……。"
10137-CVGroup_Formation_In_2-1 = "今日の占い、何位だったっけ？"
10137-CVGroup_Formation_Select-1 = "あぁ……腰が伸びる～"
10137-CVGroup_Growup_1-1 = "強くなったっす！\n……病院送りの人数が増えそうっすね。"
10137-CVGroup_Growup_2-1 = "おぉ～、これなら警察にでもなれちゃうんじゃないですか？\nな～んて。"
10137-CVGroup_Growup_3-1 = "昇進っすか？大歓迎っす！\nいつ降格しちゃうか分かりませんし！"
10137-CVGroup_Growup_4-1 = "おっ！これこれ！みなぎるっすねぇ！"
10137-CVGroup_Relationship_Up_1-1 = "なんすか先生、あたしのこと好きなんすか？\nえー？もっと優しい子とかいっぱい居るのに？"
10137-CVGroup_Relationship_Up_2-1 = "あの……あたしも一応女の子なんで……。\nこう見えて繊細なんすよ？"
10137-CVGroup_Relationship_Up_3-1 = "先生のバディやってると、いいことだらけっすね！"
10137-CVGroup_Relationship_Up_4-1 = "いつも……ありがとうございます……\nあ、や、その……色々と。"
10137-CVGroup_Tactic_In_1-1 = "あ、令状持ってます？あたしは無いっすよ！"
10137-CVGroup_Tactic_In_2-1 = "どこに隠れたのかな～？"
10137-CVGroup_Tactic_Victory_1-1 = "多少の被害は許容範囲内っす！"
10137-CVGroup_Tactic_Victory_2-1 = "楽勝楽勝。準備運動にもならなかったっすよ！"
