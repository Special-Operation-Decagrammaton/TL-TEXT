[translation]
10137-CVGroup_Battle_Buffed_1-1 = "Я так благодарна, это просто дождь из благословений!"
10137-CVGroup_Battle_Defense_1-1 = "Вы ни во что не попадёте, если не будете целиться как следует."
10137-CVGroup_Battle_In_1-1 = "Руки вверх! Не двигаться, или я буду стрелять!\nА... вообще-то, можете двигаться, всё нормально."
10137-CVGroup_Battle_In_2-1 = "Пойманы с поличным! Выдвигаюсь!"
10137-CVGroup_Battle_Move_1-1 = "Может, мы уже просто пойдём домой?"
10137-CVGroup_Battle_Move_2-1 = "Угх, разве нельзя оставить всё остальное на завтра?"
10137-CVGroup_Battle_Recovery_1-1 = "Весьма признательна!"
10137-CVGroup_Battle_TacticalAction_1-1 = "Давайте просто возьмём туда такси!"
10137-CVGroup_Battle_Victory_1-1 = "Кхм, как подозреваемый, вы имеете право на присутствие адвоката...\nПогодите, а как там дальше было?"
10137-CVGroup_Battle_Victory_2-1 = "У меня всего одна пара наручников, так что давайте идите со мной по-хорошему."
10137-CVGroup_CommonSkill-1 = "Моя книга! Ты мне за неё ответишь!"
10137-CVGroup_ExSkill_1-1 = "Полиция на месте!"
10137-CVGroup_ExSkill_2-1 = "Правосудие в действии!"
10137-CVGroup_ExSkill_3-1 = "Стисни зубы!"
10137-CVGroup_ExSkill_Level_1-1 = "Тебя точно стоит поймать!"
10137-CVGroup_ExSkill_Level_2-1 = "Даже не думай сопротивляться!"
10137-CVGroup_ExSkill_Level_3-1 = "Если тебя что-то не устраивает, сам иди служить в Валькирию."
10137-CVGroup_Formation_In_1-1 = "Да-да, я делаю. Угх, какая же тягомотина..."
10137-CVGroup_Formation_In_2-1 = "На каком я там месте была в сегодняшнем гороскопе?"
10137-CVGroup_Formation_Select-1 = "Ах... как хорошо спину потянуть."
10137-CVGroup_Growup_1-1 = "Я стала сильнее!\n...Похоже, количество людей, которых я отправлю в больницу, теперь вырастет."
10137-CVGroup_Growup_2-1 = "О! С такими темпами я, может, даже стану настоящим копом?\n...Да шучу я."
10137-CVGroup_Growup_3-1 = "Повышение? Забираю!\nКто знает, когда меня снова понизят!"
10137-CVGroup_Growup_4-1 = "О! Вот оно! Я чувствую прилив сил!"
10137-CVGroup_Relationship_Up_1-1 = "Что такое, Сенсей? Я тебе типа нравлюсь или вроде того?\nАсь? Но разве вокруг нет кучи девчонок поприятнее?"
10137-CVGroup_Relationship_Up_2-1 = "Ну... вообще-то я девушка, знаешь ли...\nИ на самом деле я довольно хрупкая, веришь ты в это или нет."
10137-CVGroup_Relationship_Up_3-1 = "В том, чтобы быть твоим напарником, Сенсей, одни только плюсы!"
10137-CVGroup_Relationship_Up_4-1 = "Спасибо... за всё...\nА, нет, я имею в виду... вообще за всё."
10137-CVGroup_Tactic_In_1-1 = "Эй, у вас есть ордер? Потому что у меня его точно нет!"
10137-CVGroup_Tactic_In_2-1 = "Интересно, где они могли спрятаться?"
10137-CVGroup_Tactic_Victory_1-1 = "Небольшой сопутствующий ущерб вполне укладывается в допустимые рамки!"
10137-CVGroup_Tactic_Victory_2-1 = "Проще простого. Это даже на разминку не тянуло!"