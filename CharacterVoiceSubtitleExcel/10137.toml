[translation]
10137-CVGroup_Battle_Buffed_1-1 = "I'm so grateful, it's raining blessings!"
10137-CVGroup_Battle_Defense_1-1 = "You won't hit anything if you don't aim properly."
10137-CVGroup_Battle_In_1-1 = "Hands up! Don't move or I'll shoot!\nAh... actually, it's fine if you move."
10137-CVGroup_Battle_In_2-1 = "Caught in the act! Moving out!"
10137-CVGroup_Battle_Move_1-1 = "Can't we just go home now?"
10137-CVGroup_Battle_Move_2-1 = "Ugh, can't we leave the rest for tomorrow?"
10137-CVGroup_Battle_Recovery_1-1 = "Much obliged!"
10137-CVGroup_Battle_TacticalAction_1-1 = "Let's just take a taxi there!"
10137-CVGroup_Battle_Victory_1-1 = "Ahem, as the suspect, you have the right to have a lawyer present...\nWait, how did that go again?"
10137-CVGroup_Battle_Victory_2-1 = "I've only got one pair of handcuffs, so just come along quietly."
10137-CVGroup_CommonSkill-1 = "My book! You better pay me back for that!"
10137-CVGroup_ExSkill_1-1 = "The police are here!"
10137-CVGroup_ExSkill_2-1 = "Justice execution!"
10137-CVGroup_ExSkill_3-1 = "Clench your teeth!"
10137-CVGroup_ExSkill_Level_1-1 = "You're worth catching!"
10137-CVGroup_ExSkill_Level_2-1 = "Don't bother resisting!"
10137-CVGroup_ExSkill_Level_3-1 = "If you've got a problem with it, join Valkyrie yourself."
10137-CVGroup_Formation_In_1-1 = "Yeah, yeah, I'm doing it.\nUgh, what a drag..."
10137-CVGroup_Formation_In_2-1 = "What place was I in for today's horoscope again?"
10137-CVGroup_Formation_Select-1 = "Ah... feels good to stretch my back."
10137-CVGroup_Growup_1-1 = "I've gotten stronger!\n...Looks like the number of people I send to the hospital is gonna go up."
10137-CVGroup_Growup_2-1 = "Oh! At this rate, maybe I could even become a real cop?\n...Just kidding."
10137-CVGroup_Growup_3-1 = "A promotion? I'll take it!\nWho knows when I'll get demoted again!"
10137-CVGroup_Growup_4-1 = "Oh! This is it! I'm feeling pumped!"
10137-CVGroup_Relationship_Up_1-1 = "What is it, Sensei? Do you like me or something?\nEh? But aren't there plenty of nicer girls around?"
10137-CVGroup_Relationship_Up_2-1 = "Um... I am a girl, you know...\nI'm actually pretty delicate, believe it or not."
10137-CVGroup_Relationship_Up_3-1 = "Being your partner, Sensei, has nothing but perks!"
10137-CVGroup_Relationship_Up_4-1 = "Thank you... for everything...\nAh, no, I mean... for all of it."
10137-CVGroup_Tactic_In_1-1 = "Hey, do you have a warrant? 'Cause I definitely don't!"
10137-CVGroup_Tactic_In_2-1 = "Where could they be hiding, I wonder?"
10137-CVGroup_Tactic_Victory_1-1 = "A little collateral damage is within the acceptable range!"
10137-CVGroup_Tactic_Victory_2-1 = "Easy peasy. That wasn't even a warm-up!"