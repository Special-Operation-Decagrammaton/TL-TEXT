[translation]
10137-CVGroup_Battle_Buffed_1-1 = "Muitíssimo obrigada~"
10137-CVGroup_Battle_Defense_1-1 = "Se não mirar direito, não vai acertar, saca."
10137-CVGroup_Battle_In_1-1 = "Mãos ao alto! Se se mover, eu atiro!\nAh... mas você pode se mover se quiser, tá?"
10137-CVGroup_Battle_In_2-1 = "Pego em flagrante! Entrando em ação~"
10137-CVGroup_Battle_Move_1-1 = "Não dá pra eu ir pra casa agora não?"
10137-CVGroup_Battle_Move_2-1 = "Eeeh, não podemos deixar o resto pra amanhã?"
10137-CVGroup_Battle_Recovery_1-1 = "Valeuzão!"
10137-CVGroup_Battle_TacticalAction_1-1 = "Vamos nos mover de táxi~"
10137-CVGroup_Battle_Victory_1-1 = "Eeeh, como suspeito, você tem o direito à presença de um advogado...\nComo era o resto mesmo?"
10137-CVGroup_Battle_Victory_2-1 = "Eu só tenho um par de algemas. Então venha quietinho~"
10137-CVGroup_CommonSkill-1 = "O meu livro! Você vai me pagar por isso!"
10137-CVGroup_ExSkill_1-1 = "Polícia na área~!"
10137-CVGroup_ExSkill_2-1 = "Justiça executada!"
10137-CVGroup_ExSkill_3-1 = "Cerra esses dentes!"
10137-CVGroup_ExSkill_Level_1-1 = "Vai dar gosto de te prender!"
10137-CVGroup_ExSkill_Level_2-1 = "Para de resistir!"
10137-CVGroup_ExSkill_Level_3-1 = "Se tem alguma reclamação, entre para a Valkyrie."
10137-CVGroup_Formation_In_1-1 = "Tá, tá, já tô indo.\nHaa, que preguiça..."
10137-CVGroup_Formation_In_2-1 = "Em qual posição o meu signo ficou no horóscopo de hoje mesmo?"
10137-CVGroup_Formation_Select-1 = "Aaah... esticando as costas~"
10137-CVGroup_Growup_1-1 = "Fiquei mais forte!\n...Acho que o número de pessoas mandadas pro hospital vai aumentar."
10137-CVGroup_Growup_2-1 = "Ooh~, com isso eu até conseguiria virar policial, não acha?\nBriiincadeira."
10137-CVGroup_Growup_3-1 = "Uma promoção? Super bem-vinda!\nAfinal, eu nunca sei quando vou ser rebaixada de novo!"
10137-CVGroup_Growup_4-1 = "Oh! É isso aí! Tô cheia de energia!"
10137-CVGroup_Relationship_Up_1-1 = "Qual é a sua, Sensei? Por acaso você gosta de mim?\nEeeh? Sendo que tem um monte de garotas muito mais gentis por aí?"
10137-CVGroup_Relationship_Up_2-1 = "Uhm... eu ainda sou uma garota, sabe...\nPosso não parecer, mas eu sou delicada."
10137-CVGroup_Relationship_Up_3-1 = "Ser parceira do Sensei só tem vantagens!"
10137-CVGroup_Relationship_Up_4-1 = "Sempre... muito obrigada...\nAh, não, digo... por tudo."
10137-CVGroup_Tactic_In_1-1 = "Ah, você tem um mandado? Porque eu não tenho!"
10137-CVGroup_Tactic_In_2-1 = "Onde será que se esconderam~?"
10137-CVGroup_Tactic_Victory_1-1 = "Alguns danos colaterais estão dentro da margem aceitável!"
10137-CVGroup_Tactic_Victory_2-1 = "Moleza, moleza. Não serviu nem como aquecimento!"