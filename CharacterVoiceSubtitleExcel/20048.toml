[translation]
20048-CVGroup_CommonSkill-1 = "止まってください。"
20048-CVGroup_ExSkill_1-1 = "こうしてちゃんと休めるのは、いつぶりでしょうか……。"
20048-CVGroup_ExSkill_2-1 = "後のことは、お任せします……。"
20048-CVGroup_ExSkill_3-1 = "何もしないをする――悪くないですね……。"
20048-CVGroup_ExSkill_Level_1-1 = "日差しが心地良いですね、ふふ。"
20048-CVGroup_ExSkill_Level_2-1 = "海に、風に、紅茶……。"
20048-CVGroup_ExSkill_Level_3-1 = "ゆっくり参りましょう。"
20048-CVGroup_Formation_In_1-1 = "ふふっ、お出かけ日和ですね。"
20048-CVGroup_Formation_In_2-1 = "手早く片づけて夏を満喫しましょう。"
20048-CVGroup_Formation_Select-1 = "ふわぁ……あ。ふふっ。"
20048-CVGroup_Growup_1-1 = "あら……お心遣い、感謝申し上げます。"
20048-CVGroup_Growup_2-1 = "能力があってこそ、余裕が生まれるというもの。\n先生、ありがとうございます。"
20048-CVGroup_Growup_3-1 = "この高揚感は……\nまるで良い茶葉に出会ったときのようです。"
20048-CVGroup_Growup_4-1 = "だいぶ実力がついてきたと思うのですが……\n先生から見て、いかがでしょうか？"
20048-CVGroup_Relationship_Up_1-1 = "雲ひとつない晴れた空……日差しがまぶしいですね、先生。"
20048-CVGroup_Relationship_Up_2-1 = "先生、サマーベッドなら、私の隣が空いておりますよ。\nここでしばし、ゆっくりされていかれては？"
20048-CVGroup_Relationship_Up_3-1 = "先生とのティータイムは……\nいつもの茶葉でも、特別な味に感じるんです。"
20048-CVGroup_Relationship_Up_4-1 = "先生と訪れた海……素敵な思い出を、ありがとうございます。"
