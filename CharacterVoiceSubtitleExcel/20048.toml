[translation]
20048-CVGroup_CommonSkill-1 = "Por favor, pare."
20048-CVGroup_ExSkill_1-1 = "Faz quanto tempo que não consigo descansar assim de verdade...?"
20048-CVGroup_ExSkill_2-1 = "Deixo o resto com você..."
20048-CVGroup_ExSkill_3-1 = "Fazer nada... não é nada mal..."
20048-CVGroup_ExSkill_Level_1-1 = "A luz do sol está tão agradável, fufu."
20048-CVGroup_ExSkill_Level_2-1 = "O mar, a brisa, o chá..."
20048-CVGroup_ExSkill_Level_3-1 = "Vamos com calma."
20048-CVGroup_Formation_In_1-1 = "Fufu, é um dia perfeito para um passeio."
20048-CVGroup_Formation_In_2-1 = "Vamos terminar isso rápido e aproveitar o verão."
20048-CVGroup_Formation_Select-1 = "Uaa... ah. Fufu."
20048-CVGroup_Growup_1-1 = "Ora... agradeço pela sua consideração."
20048-CVGroup_Growup_2-1 = "É justamente por ter habilidade que se ganha tranquilidade.\nSensei, muito obrigada."
20048-CVGroup_Growup_3-1 = "Essa sensação de euforia...\nÉ como quando encontro folhas de chá de excelente qualidade."
20048-CVGroup_Growup_4-1 = "Acho que melhorei bastante minhas habilidades...\nNa sua opinião, Sensei, como estou?"
20048-CVGroup_Relationship_Up_1-1 = "Um céu sem nuvens... a luz do sol está radiante, Sensei."
20048-CVGroup_Relationship_Up_2-1 = "Sensei, há um lugar vago ao meu lado na espreguiçadeira.\nQue tal descansar um pouco aqui comigo?"
20048-CVGroup_Relationship_Up_3-1 = "A hora do chá com você...\nAté as folhas de sempre parecem ter um sabor especial."
20048-CVGroup_Relationship_Up_4-1 = "Este mar que visitei com você... obrigada por criar memórias tão maravilhosas."
