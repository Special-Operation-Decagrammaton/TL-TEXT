[translation]
10143-CVGroup_Formchange_Shun_Battle_Buffed_1-1 = "Thank you very much."
10143-CVGroup_Formchange_Shun_Battle_Covered_1-1 = "I'll hide for a moment."
10143-CVGroup_Formchange_Shun_Battle_Defense_1-1 = "We have to try a little harder, don't we?"
10143-CVGroup_Formchange_Shun_Battle_In_1-1 = "Be sure to watch your step."
10143-CVGroup_Formchange_Shun_Battle_In_2-1 = "Please follow me so you don't get lost."
10143-CVGroup_Formchange_Shun_Battle_Move_1-1 = "I wonder what's waiting for us next?"
10143-CVGroup_Formchange_Shun_Battle_Move_2-1 = "It's over there."
10143-CVGroup_Formchange_Shun_Battle_Recovery_1-1 = "Phew. That was a big help."
10143-CVGroup_Formchange_Shun_Battle_TacticalAction_1-1 = "Shall we head over there?"
10143-CVGroup_Formchange_Shun_Battle_Victory_1-1 = "Yes, it was a very good day."
10143-CVGroup_Formchange_Shun_Battle_Victory_2-1 = "Playing with everyone... it was so much fun."
10143-CVGroup_Formchange_Shun_CommonSkill-1 = "Oh my... hehe."
10143-CVGroup_Formchange_Shun_ExSkill_1-1 = "Hehe.\nOh?\nProblem solved, I suppose."
10143-CVGroup_Formchange_Shun_ExSkill_2-1 = "This is fun.\nOh?\nLet's keep going."
10143-CVGroup_Formchange_Shun_ExSkill_3-1 = "Eek!\nWhat is that...?\nUfufu."
10143-CVGroup_Formchange_Shun_ExSkill_Level_1-1 = "Oh, my."
10143-CVGroup_Formchange_Shun_ExSkill_Level_2-1 = "Be careful, okay?"
10143-CVGroup_Formchange_Shun_ExSkill_Level_3-1 = "Did something happen?"
10143-CVGroup_Formchange_Shun_Formation_In_1-1 = "Let's play, but be careful not to get hurt."
10143-CVGroup_Formchange_Shun_Formation_In_2-1 = "If anything happens, tell me right away, okay?"
10143-CVGroup_Formchange_Shun_Formation_Select-1 = "Oh... are you going to lift me up high? Hehe."
10143-CVGroup_Formchange_Shun_Formchange-1 = "Oh, please wait a moment."
10143-CVGroup_Formchange_Shun_Growup_1-1 = "Watching the children grow warms my heart so much.\nEh? You feel the same way about me, Sensei...?\nOh, my... thank you."
10143-CVGroup_Formchange_Shun_Growup_2-1 = "Striving to continue growing is important.\nThat is why I am so happy that you are watching over me like this, Sensei."
10143-CVGroup_Formchange_Shun_Growup_3-1 = "Is it possible for me to still grow...?\nI... I find myself wanting to be spoiled, just like the other children."
10143-CVGroup_Formchange_Shun_Growup_4-1 = "As an instructor at the Plum Blossom Garden, I am in a position to watch over the children.\nSo... it feels a bit embarrassing to be in the student's position like this."
10143-CVGroup_Formchange_Shun_Relationship_Up_1-1 = "I've prepared some tropical fruits.\nIs there anything you'd like to eat?\nIt's all for you, Sensei, so please have whatever you like."
10143-CVGroup_Formchange_Shun_Relationship_Up_2-1 = "If we were to be all alone together...\nWhat would you want to do, Sensei?\nI... I have something I'd like to do."
10143-CVGroup_Formchange_Shun_Relationship_Up_3-1 = "Even in summer, you mustn't let your guard down.\nSummer colds are the most dangerous, you know.\nIf you were to catch a cold, Sensei... I would be the one to nurse you back to health."
10143-CVGroup_Formchange_Shun_Relationship_Up_4-1 = "Memories are fun and beautiful...\nBut at times, they can also feel a bit lonely.\nThough I do wish for them to remain beautiful forever."
10143-CVGroup_Formchange_Shun_Tactic_In_1-1 = "It's alright, I'm with you."
10143-CVGroup_Formchange_Shun_Tactic_In_2-1 = "Please trust in me."
10143-CVGroup_Formchange_Shun_Tactic_Victory_1-1 = "Now, everyone. Please make sure to follow along, okay?"
10143-CVGroup_Formchange_Shun_Tactic_Victory_2-1 = "Don't be in such a rush~"