[translation]
10143-CVGroup_Formchange_Shun_Battle_Buffed_1-1 = "ありがとうございます。"
10143-CVGroup_Formchange_Shun_Battle_Covered_1-1 = "少し隠れます。"
10143-CVGroup_Formchange_Shun_Battle_Defense_1-1 = "もうちょっと頑張らないといけませんよ？"
10143-CVGroup_Formchange_Shun_Battle_In_1-1 = "足元にはちゃんと気をつけるんですよ。"
10143-CVGroup_Formchange_Shun_Battle_In_2-1 = "はぐれないようついてきてくださいね。"
10143-CVGroup_Formchange_Shun_Battle_Move_1-1 = "次は何が待っているのでしょう？"
10143-CVGroup_Formchange_Shun_Battle_Move_2-1 = "あそこですね。"
10143-CVGroup_Formchange_Shun_Battle_Recovery_1-1 = "ふうっ。助かりました。"
10143-CVGroup_Formchange_Shun_Battle_TacticalAction_1-1 = "あちらへ移動しましょうか。"
10143-CVGroup_Formchange_Shun_Battle_Victory_1-1 = "ええ、とても良い日でした。"
10143-CVGroup_Formchange_Shun_Battle_Victory_2-1 = "みなさんと遊ぶことができて……楽しかったです。"
10143-CVGroup_Formchange_Shun_CommonSkill-1 = "あらまあ……ふふっ。"
10143-CVGroup_Formchange_Shun_ExSkill_1-1 = "ふふっ。\nあら？\n問題解決、ですね。"
10143-CVGroup_Formchange_Shun_ExSkill_2-1 = "楽しいです。\nあっ？\n続けましょう。"
10143-CVGroup_Formchange_Shun_ExSkill_3-1 = "ひゃっ！\nあれは……？\nうふふ。"
10143-CVGroup_Formchange_Shun_ExSkill_Level_1-1 = "あら、あら。"
10143-CVGroup_Formchange_Shun_ExSkill_Level_2-1 = "気をつけるんですよ？"
10143-CVGroup_Formchange_Shun_ExSkill_Level_3-1 = "何かありましたか？"
10143-CVGroup_Formchange_Shun_Formation_In_1-1 = "怪我に気をつけて遊びましょうね。"
10143-CVGroup_Formchange_Shun_Formation_In_2-1 = "何かあったら、すぐに言うんですよ？"
10143-CVGroup_Formchange_Shun_Formation_Select-1 = "あら……高い高い、してくださるんですか？ふふっ。"
10143-CVGroup_Formchange_Shun_Formchange-1 = "あら、少々お待ちくださいね。"
10143-CVGroup_Formchange_Shun_Growup_1-1 = "子どもたちの成長を見守っていると、とても心が温かくなるんです。\nえっ？先生も同じ気持ちで私のことを……？\nも、もう……ありがとうございます。"
10143-CVGroup_Formchange_Shun_Growup_2-1 = "成長を続けようと努力することは、大切です。\nですから、私も……こうして、先生が見守ってくださることがとても嬉しいんです。"
10143-CVGroup_Formchange_Shun_Growup_3-1 = "私でもまだ成長できるのでしょうか……？\nその……私も、他の子みたいに甘えたくなってしまいます。"
10143-CVGroup_Formchange_Shun_Growup_4-1 = "梅花園の教官は……子供たちを見守る立場にあります。\nだから……こんな風に自分が生徒の立場になるのは、なんだか照れくさいですね。"
10143-CVGroup_Formchange_Shun_Relationship_Up_1-1 = "トロピカルフルーツをご用意しました。\nなにか食べたいものはありますか？\n全部、先生の分ですからお好きなものをどうぞ。"
10143-CVGroup_Formchange_Shun_Relationship_Up_2-1 = "もしも、私と二人きりになれたとしたら……。\n先生は何をしたいですか？\n私……やりたいことが、あるんです。"
10143-CVGroup_Formchange_Shun_Relationship_Up_3-1 = "夏といえども油断してはいけません。\n夏風邪が一番怖いんですからね。\n先生が風邪を引いてしまった時は……私が看病してさしあげますけど"
10143-CVGroup_Formchange_Shun_Relationship_Up_4-1 = "思い出とは、楽しくて、美しくて……。\n時に、物寂しく感じるものでもあります。\n美しいままであってほしいと、願っているのですけどね。"
10143-CVGroup_Formchange_Shun_Tactic_In_1-1 = "大丈夫です、私がついていますから。"
10143-CVGroup_Formchange_Shun_Tactic_In_2-1 = "私を信じてください。"
10143-CVGroup_Formchange_Shun_Tactic_Victory_1-1 = "さあ、みなさん。ちゃんとついてきてくださいね？"
10143-CVGroup_Formchange_Shun_Tactic_Victory_2-1 = "あまり慌てないでくださいね～"
