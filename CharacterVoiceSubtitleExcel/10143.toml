[translation]
10143-CVGroup_Formchange_Shun_Battle_Buffed_1-1 = "Большое вам спасибо."
10143-CVGroup_Formchange_Shun_Battle_Covered_1-1 = "Я спрячусь ненадолго."
10143-CVGroup_Formchange_Shun_Battle_Defense_1-1 = "Нам нужно постараться чуточку сильнее, верно?"
10143-CVGroup_Formchange_Shun_Battle_In_1-1 = "Обязательно смотрите под ноги."
10143-CVGroup_Formchange_Shun_Battle_In_2-1 = "Пожалуйста, идите за мной, чтобы не потеряться."
10143-CVGroup_Formchange_Shun_Battle_Move_1-1 = "Интересно, что же ждёт нас дальше?"
10143-CVGroup_Formchange_Shun_Battle_Move_2-1 = "Это вооон там."
10143-CVGroup_Formchange_Shun_Battle_Recovery_1-1 = "Фух. Это очень помогло."
10143-CVGroup_Formchange_Shun_Battle_TacticalAction_1-1 = "Направимся туда?"
10143-CVGroup_Formchange_Shun_Battle_Victory_1-1 = "Да, это был чудесный day."
10143-CVGroup_Formchange_Shun_Battle_Victory_2-1 = "Играть со всеми... было так весело."
10143-CVGroup_Formchange_Shun_CommonSkill-1 = "О боже... хе-хе."
10143-CVGroup_Formchange_Shun_ExSkill_1-1 = "Хе-хе.\nОй?\nДумаю, проблема решена."
10143-CVGroup_Formchange_Shun_ExSkill_2-1 = "Это весело.\nОй?\nДавайте продолжать."
10143-CVGroup_Formchange_Shun_ExSkill_3-1 = "Ой!\nЧто это такое...?\nУфуфу."
10143-CVGroup_Formchange_Shun_ExSkill_Level_1-1 = "О боже."
10143-CVGroup_Formchange_Shun_ExSkill_Level_2-1 = "Будьте осторожны, хорошо?"
10143-CVGroup_Formchange_Shun_ExSkill_Level_3-1 = "Что-то случилось?"
10143-CVGroup_Formchange_Shun_Formation_In_1-1 = "Давайте поиграем, но будьте осторожны, чтобы не пораниться."
10143-CVGroup_Formchange_Shun_Formation_In_2-1 = "Если что-то случится, сразу же скажите мне, ладно?"
10143-CVGroup_Formchange_Shun_Formation_Select-1 = "Ох... вы поднимете меня высоко-высоко? Хе-хе."
10143-CVGroup_Formchange_Shun_Formchange-1 = "Ох, пожалуйста, подождите минутку."
10143-CVGroup_Formchange_Shun_Growup_1-1 = "Наблюдение за тем, как растут дети, так согревает мне душу.\nАсь? Вы чувствуете то же самое по отношению ко мне, Сенсей...?\nО боже... спасибо вам."
10143-CVGroup_Formchange_Shun_Growup_2-1 = "Стремление к постоянному росту очень важно.\nИменно поэтому я так счастлива, что вы вот так приглядываете за мной, Сенсей."
10143-CVGroup_Formchange_Shun_Growup_3-1 = "Неужели я всё ещё могу расти...?\nЯ... мне кажется, что мне хочется, чтобы меня побаловали, совсем как маленьких детей."
10143-CVGroup_Formchange_Shun_Growup_4-1 = "Как инструктор Сада Цветущей Сливы, я должна сама приглядывать за детьми.\nПоэтому... немного неловко оказываться вот так на месте ученицы."
10143-CVGroup_Formchange_Shun_Relationship_Up_1-1 = "Я приготовила немного тропических фруктов.\nЧто бы вы хотели попробовать?\nЭто всё для вас, Сенсей, так что угощайтесь чем пожелаете."
10143-CVGroup_Formchange_Shun_Relationship_Up_2-1 = "Если бы мы остались совсем одни...\nЧто бы вы хотели сделать, Сенсей?\nУ меня... есть кое-что, чего бы мне хотелось."
10143-CVGroup_Formchange_Shun_Relationship_Up_3-1 = "Даже летом нельзя терять бдительность.\nЛетняя простуда — самая коварная, знаете ли.\nЕсли вы простудитесь, Сенсей... я буду той, кто выхаживает вас."
10143-CVGroup_Formchange_Shun_Relationship_Up_4-1 = "Воспоминания — это весело и прекрасно...\nНо порой от них становится немного одиноко. Хотя мне и хочется, чтобы они навсегда оставались прекрасными."
10143-CVGroup_Formchange_Shun_Tactic_In_1-1 = "Всё в порядке, я с вами."
10143-CVGroup_Formchange_Shun_Tactic_In_2-1 = "Пожалуйста, доверьтесь мне."
10143-CVGroup_Formchange_Shun_Tactic_Victory_1-1 = "Итак, ребята. Пожалуйста, не отставайте, хорошо?"
10143-CVGroup_Formchange_Shun_Tactic_Victory_2-1 = "Не нужно так спешить~"