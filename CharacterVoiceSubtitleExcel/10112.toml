10112-CVGroup_Relationship_Up_2-1 = "やっぱ先生といると楽しいなぁ。"
10112-CVGroup_Relationship_Up_3-1 = "なんでも聞いて！\n先生のためならいつでも駆けつけるよ！"
10112-CVGroup_Relationship_Up_4-1 = "先生の傍にいられて、\n私いますっごく幸せなんだ！\nこれからもず～っと、一緒にいようね！"
10112-CVGroup_Tactic_In_1-1 = "私が案内するよ！"
10112-CVGroup_Tactic_In_2-1 = "んー！ワクワクしてきた！"
10112-CVGroup_Tactic_Victory_1-1 = "任務完了！みんなお疲れ～！"
10112-CVGroup_Tactic_Victory_2-1 = "次も、私に任せて！"
