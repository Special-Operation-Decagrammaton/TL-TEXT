10112-CVGroup_Growup_1-1 = "あ、なんかちょっと強くなったかも！"
10112-CVGroup_Growup_2-1 = "ふふっ、ありがと！先生優しい～！"
10112-CVGroup_Growup_3-1 = "なんか力が湧いてくるような……？\nこの感覚、好きかも！"
