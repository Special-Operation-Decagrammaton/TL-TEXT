[translation]
10112-CVGroup_Battle_Buffed_1-1 = "わっ！今のどうやったのー！？"
10112-CVGroup_Battle_Covered_1-1 = "余裕余裕～"
10112-CVGroup_Battle_Defense_1-1 = "うん？どうしたの？"
10112-CVGroup_Battle_In_1-1 = "みんな、ちゃんとついてきてね！"
10112-CVGroup_Battle_In_2-1 = "あはは、いこいこ！"
10112-CVGroup_Battle_Move_1-1 = "みんな、次行くよ～！"
10112-CVGroup_Battle_Move_2-1 = "クリア！レッツゴー！"
10112-CVGroup_Battle_Recovery_1-1 = "ありがと！"
10112-CVGroup_Battle_TacticalAction_1-1 = "行こっか！"
10112-CVGroup_Battle_Victory_1-1 = "大勝利ー！いつも通りだね！"
10112-CVGroup_Battle_Victory_2-1 = "あー！楽しかった！\nね、もっかいしないー？"
10112-CVGroup_CommonSkill-1 = "みんな～！こっちこっち！"
10112-CVGroup_ExSkill_1-1 = "……ん？\nあ！いた！！"
10112-CVGroup_ExSkill_2-1 = "……あっ！\nやっぱりー！"
10112-CVGroup_ExSkill_3-1 = "……あれあれ？\nもしかして！"
10112-CVGroup_ExSkill_Level_1-1 = "そこにいたんだ！"
10112-CVGroup_ExSkill_Level_2-1 = "あははっ！みーつけた！"
10112-CVGroup_ExSkill_Level_3-1 = "見逃さないよ！"
10112-CVGroup_Formation_In_1-1 = "しゅっぱーつ！"
10112-CVGroup_Formation_In_2-1 = "手伝えばいいの？"
