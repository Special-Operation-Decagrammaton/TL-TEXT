10060-CVGroup_Battle_Move_2-1 = "Limpo!!"
10060-CVGroup_Battle_Recovery_1-1 = "Obrigada! Vou dar o meu melhor!"
10060-CVGroup_Battle_TacticalAction_1-1 = "Ufa!"
10060-CVGroup_Battle_Victory_1-1 = "Hya~ pessoal, bom trabalho!"
10060-CVGroup_Battle_Victory_2-1 = "Senti que foi um ótimo trabalho!"
10060-CVGroup_CommonSkill-1 = "Que tal isso~?"
10060-CVGroup_ExSkill_1-1 = "Wahahahaha!!!"
10060-CVGroup_ExSkill_2-1 = "Vai, vai, vai, vai!!!"
10060-CVGroup_ExSkill_3-1 = "Ainda não é o suficiente, né?"
10060-CVGroup_ExSkill_Level_1-1 = "Vou dar um montããão~!!"
10060-CVGroup_ExSkill_Level_2-1 = "Não precisa se acanhar~!!"
10060-CVGroup_ExSkill_Level_3-1 = "E então, é uma sensação boa, né?"
