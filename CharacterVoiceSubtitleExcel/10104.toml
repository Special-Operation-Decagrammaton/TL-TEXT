[translation]
10104-CVGroup_Battle_Buffed_1-1 = "漲る力を感じます！"
10104-CVGroup_Battle_Covered_1-1 = "隠れます。"
10104-CVGroup_Battle_Defense_1-1 = "ぬるい！"
10104-CVGroup_Battle_In_1-1 = "気を引き締めていきましょう。"
10104-CVGroup_Battle_In_2-1 = "己を信じて、進むのみです。"
10104-CVGroup_Battle_Move_1-1 = "次へ参ります！"
10104-CVGroup_Battle_Move_2-1 = "落ち着いて、動じずに。"
10104-CVGroup_Battle_Recovery_1-1 = "ありがとうございます！"
10104-CVGroup_Battle_TacticalAction_1-1 = "場所を変えましょう！"
10104-CVGroup_Battle_Victory_1-1 = "鍛錬の成果、ですね。"
10104-CVGroup_Battle_Victory_2-1 = "ふぅ、いい汗をかきました！"
10104-CVGroup_CommonSkill-1 = "いやあっ！\n……自重します。"
10104-CVGroup_ExSkill_1-1 = "ふっ！はっ！\n一撃必殺！"
10104-CVGroup_ExSkill_2-1 = "ふっ！えいっ！\n一点必中！"
10104-CVGroup_ExSkill_3-1 = "はっ！いやっ！\n鎧袖一触！"
10104-CVGroup_ExSkill_Level_1-1 = "くらえ！"
10104-CVGroup_ExSkill_Level_2-1 = "どうだ！"
10104-CVGroup_ExSkill_Level_3-1 = "抜本塞源！"
10104-CVGroup_Formation_In_1-1 = "謹んでお受けいたします。"
10104-CVGroup_Formation_In_2-1 = "粉骨砕身。全力で取り組みます。"
10104-CVGroup_Formation_Select-1 = "流れる水のごとく。"
10104-CVGroup_Growup_1-1 = "先生がいてくださったから……\n初心を忘れず、精進することができています。"
10104-CVGroup_Growup_2-1 = "マネージャーの仕事と鍛錬には、共通点があります。\n両方とも、己を信じる力が求められるのです。"
10104-CVGroup_Growup_3-1 = "先生が見守ってくださったおかげで、\n今日も一歩前進、できたように思います。"
10104-CVGroup_Growup_4-1 = "折れることなく真っすぐに。受け入れて柔軟に。\n肝心なのは、バランスです。"
10104-CVGroup_Relationship_Up_1-1 = "わ、私は、その……\n可愛らしい返事とかは、あまり得意ではなく……\nご、ご理解いただき、ありがとうございます、先生。"
10104-CVGroup_Relationship_Up_2-1 = "先生のそばにいると、私の心が波立つというか……\n……これ以上は、その、聞かないでください……。"
10104-CVGroup_Relationship_Up_3-1 = "こういうとき、先生のために\n何ができるのだろうと、考えてしまいます。\n……やはりここは、私と共にカンフーの修練を！"
10104-CVGroup_Relationship_Up_4-1 = "護衛が必要でしたら、いつでもお申し付けください。\n全身全霊で先生をお守りします！\n……そんなに全力じゃなくて大丈夫……？で、ですが……。"
10104-CVGroup_Tactic_In_1-1 = "カンフーの極意、お見せしましょう。"
10104-CVGroup_Tactic_In_2-1 = "さあ、参ります！"
10104-CVGroup_Tactic_Victory_1-1 = "最後まで、気を抜かずに。"
10104-CVGroup_Tactic_Victory_2-1 = "一意専心……精進します。"
