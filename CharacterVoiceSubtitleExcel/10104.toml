[translation]
10104-CVGroup_Battle_Buffed_1-1 = "Sinto um poder transbordante!"
10104-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
10104-CVGroup_Battle_Defense_1-1 = "Fraco!"
10104-CVGroup_Battle_In_1-1 = "Vamos manter o foco."
10104-CVGroup_Battle_In_2-1 = "Acreditar em si mesmo e seguir em frente, é só isso."
10104-CVGroup_Battle_Move_1-1 = "Indo para o próximo!"
10104-CVGroup_Battle_Move_2-1 = "Com calma, sem hesitar."
10104-CVGroup_Battle_Recovery_1-1 = "Muito obrigada!"
10104-CVGroup_Battle_TacticalAction_1-1 = "Vamos mudar de posição!"
10104-CVGroup_Battle_Victory_1-1 = "O resultado do meu treinamento, eu suponho."
10104-CVGroup_Battle_Victory_2-1 = "Ufa, que bom exercício!"
10104-CVGroup_CommonSkill-1 = "Ei! \n...Vou me conter."
10104-CVGroup_ExSkill_1-1 = "Fu! Ha! \nUm golpe, um abate!"
10104-CVGroup_ExSkill_2-1 = "Fu! Ei! \nUm ponto, um acerto!"
10104-CVGroup_ExSkill_3-1 = "Ha! Ei! \nVitória fácil!"
10104-CVGroup_ExSkill_Level_1-1 = "Tome isso!"
10104-CVGroup_ExSkill_Level_2-1 = "O que achou disso!"
10104-CVGroup_ExSkill_Level_3-1 = "Eliminação total!"
10104-CVGroup_Formation_In_1-1 = "Aceito com gratidão."
10104-CVGroup_Formation_In_2-1 = "Darei o meu melhor, de corpo e alma."
10104-CVGroup_Formation_Select-1 = "Como a água que flui."
10104-CVGroup_Growup_1-1 = "Graças à sua presença, Sensei... \nConsegui me dedicar sem esquecer do meu propósito inicial."
10104-CVGroup_Growup_2-1 = "O trabalho de gerente e o treinamento têm algo em comum. \nAmbos exigem a força de acreditar em si mesmo."
10104-CVGroup_Growup_3-1 = "Graças ao seu apoio, Sensei, \nsinto que dei mais um passo à frente hoje."
10104-CVGroup_Growup_4-1 = "Sem quebrar, mantendo a retidão. Aceitando, com flexibilidade. \nO segredo é o equilíbrio."
10104-CVGroup_Relationship_Up_1-1 = "Eu, bem... \nNão sou muito boa em dar respostas fofas... \nO-obrigada por entender, Sensei."
10104-CVGroup_Relationship_Up_2-1 = "Quando estou perto do Sensei, meu coração fica agitado... \n...Por favor, não me pergunte mais nada sobre isso..."
10104-CVGroup_Relationship_Up_3-1 = "Nessas horas, fico pensando no que posso fazer pelo Sensei. \n...Acho que a solução é praticar Kung Fu comigo!"
10104-CVGroup_Relationship_Up_4-1 = "Se precisar de escolta, é só pedir. \nProtegerei o Sensei com toda a minha alma! \n...Não precisa ser com tanta intensidade...? M-mas..."
10104-CVGroup_Tactic_In_1-1 = "Vou mostrar a essência do Kung Fu."
10104-CVGroup_Tactic_In_2-1 = "Vamos lá!"
10104-CVGroup_Tactic_Victory_1-1 = "Até o fim, sem baixar a guarda."
10104-CVGroup_Tactic_Victory_2-1 = "Foco total... continuarei me dedicando."
