[translation]
20037-CVGroup_CommonSkill-1 = "É gostoso, então vou dividir com você~"
20037-CVGroup_ExSkill_1-1 = "Uuh, que preguiça...\n...Beleza, assim serve!"
20037-CVGroup_ExSkill_2-1 = "Quero descansa~r...\nAh, já sei!"
20037-CVGroup_ExSkill_3-1 = "Tem que ter um jeito melhor...\n...Pronto! Terminei!"
20037-CVGroup_ExSkill_Level_1-1 = "Acho que vou comer um donut quando isso acabar~"
20037-CVGroup_ExSkill_Level_2-1 = "Se acertar, não é culpa minha, hein~"
20037-CVGroup_ExSkill_Level_3-1 = "Bom, acho que assim tá de boa~"
20037-CVGroup_Formation_In_1-1 = "……Eu preciso mesmo ir?"
20037-CVGroup_Formation_In_2-1 = "Será que não tem ninguém mais qualificado do que eu pra isso...?"
20037-CVGroup_Growup_1-1 = "Eeh... Eu não quero me esforçar muito, mas...\nBom, vou aceitar e agradecer."
20037-CVGroup_Growup_2-1 = "Hã? Tem certeza?\nEu não tô com tanta vontade assim de trabalhar..."
20037-CVGroup_Growup_3-1 = "Sabe... mesmo sem você fazer tudo isso,\neu pelo menos vou ficar de olho em você quando for entrar na piscina."
20037-CVGroup_Growup_4-1 = "Eu não tô a fim, mas... já que ganhei isso, acho que tenho que trabalhar, né...\nSe possível, eu ficaria feliz se você me desse uns donuts também..."
20037-CVGroup_Relationship_Up_1-1 = "Não tô matando trabalho~ Tô trabalhando direitinho.\nMeus olhos tão se mexendo, não tão?"
20037-CVGroup_Relationship_Up_2-1 = "O Sensei também acha a piscina gostosa?\nOlha, senta aqui do meu lado e dá uma descansada."
20037-CVGroup_Relationship_Up_3-1 = "Se é pra matar trabalho...\nEu prefiro matar trabalho junto com o Sensei, fufu."
20037-CVGroup_Relationship_Up_4-1 = "Uma boia do tamanho perfeito.\nUma piscina de correnteza... Uuhm, é o paraíso...\nQuer vir junto, Sensei?"