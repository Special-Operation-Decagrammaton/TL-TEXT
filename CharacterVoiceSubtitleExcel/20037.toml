[translation]
20037-CVGroup_CommonSkill-1 = "美味しいから分けてあげるよ～"
20037-CVGroup_ExSkill_1-1 = "うぅ、めんどくさい……\n……よし、これなら！"
20037-CVGroup_ExSkill_2-1 = "休みた～い……\nあ、そうだ！"
20037-CVGroup_ExSkill_3-1 = "何かいい方法は……\n……よし！これで完了！"
20037-CVGroup_ExSkill_Level_1-1 = "終わったら、ドーナッツでも食べよっかな～"
20037-CVGroup_ExSkill_Level_2-1 = "当たっても知らないからね～"
20037-CVGroup_ExSkill_Level_3-1 = "まぁ、別にこれでいいよね～"
20037-CVGroup_Formation_In_1-1 = "……行かなきゃダメ？"
20037-CVGroup_Formation_In_2-1 = "私より適任がいるんじゃないかなぁ……。"
20037-CVGroup_Growup_1-1 = "えぇ……あんま頑張りたくないんだけど……\nまぁ、一応ありがたく貰うね。"
20037-CVGroup_Growup_2-1 = "え？ほんとにいいの？\n私、そこまでやる気ないんだけど……。"
20037-CVGroup_Growup_3-1 = "その……ここまでしてくれなくても、\n先生がプールに入る時くらい、ちゃんと見守ってあげるからさ。"
20037-CVGroup_Growup_4-1 = "気は進まないけど……もらった分は仕事しなきゃだよねぇ……\nできれば、ドーナッツもくれたら嬉しいんだけど……。"
20037-CVGroup_Relationship_Up_1-1 = "サボってないよ～ちゃんと仕事中。\n目は動かしてるからさ。"
20037-CVGroup_Relationship_Up_2-1 = "先生もプール気持ちいい？\nほら、隣に座って一休みしよ。"
20037-CVGroup_Relationship_Up_3-1 = "どうせサボるなら……\n先生と一緒にサボっていたいよね、ふふ。"
20037-CVGroup_Relationship_Up_4-1 = "ちょうどいいサイズの浮き輪。\n流れるプール……う～ん極楽……\n先生も一緒にどう？"
