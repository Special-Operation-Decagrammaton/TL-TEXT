[translation]
20037-CVGroup_CommonSkill-1 = "É gostoso, então vou dividir com você~"
20037-CVGroup_ExSkill_1-1 = "Ugh, que preguiça...\n...Certo, assim deve dar!"
20037-CVGroup_ExSkill_2-1 = "Quero descansar...\nAh, já sei!"
20037-CVGroup_ExSkill_3-1 = "Algum jeito bom de...\n...Pronto! Terminado!"
20037-CVGroup_ExSkill_Level_1-1 = "Quando eu terminar, acho que vou comer um donut~"
20037-CVGroup_ExSkill_Level_2-1 = "Não me culpe se você for atingido, viu~"
20037-CVGroup_ExSkill_Level_3-1 = "Bem, acho que isso serve, né~"
20037-CVGroup_Formation_In_1-1 = "...Eu realmente tenho que ir?"
20037-CVGroup_Formation_In_2-1 = "Não tem alguém mais qualificado do que eu...?"
20037-CVGroup_Growup_1-1 = "Eh... eu não queria me esforçar tanto assim...\nMas, bem, vou aceitar com gratidão."
20037-CVGroup_Growup_2-1 = "Hã? É sério mesmo?\nEu não estou com tanta vontade de fazer isso..."
20037-CVGroup_Growup_3-1 = "Olha... você não precisava ter feito tudo isso,\nmas vou ficar de olho em você quando entrar na piscina, tá bom?"
20037-CVGroup_Growup_4-1 = "Não estou muito animada, mas... acho que tenho que trabalhar pelo que recebi...\nSe puder me dar um donut também, eu ficaria feliz..."
20037-CVGroup_Relationship_Up_1-1 = "Não estou matando serviço~ Estou trabalhando, sim.\nMeus olhos estão acompanhando tudo."
20037-CVGroup_Relationship_Up_2-1 = "A piscina também está gostosa para você, Sensei?\nVem, senta aqui do lado e descansa um pouco."
20037-CVGroup_Relationship_Up_3-1 = "Se for para matar serviço de qualquer jeito...\nEu preferiria matar com você, Sensei, hehe."
20037-CVGroup_Relationship_Up_4-1 = "Uma boia do tamanho perfeito.\nUma piscina de correnteza... hum, que paraíso...\nQuer vir junto, Sensei?"
