[translation]
10130-CVGroup_Battle_Buffed_1-1 = "Obrigada. Vou me esforçar."
10130-CVGroup_Battle_Covered_1-1 = "Vou me proteger. Peço apoio."
10130-CVGroup_Battle_Defense_1-1 = "Ainda não é o suficiente!"
10130-CVGroup_Battle_In_1-1 = "Entrando. Por favor, sigam-me."
10130-CVGroup_Battle_In_2-1 = "Está tudo bem. Acredite em mim."
10130-CVGroup_Battle_Move_1-1 = "Limpo."
10130-CVGroup_Battle_Move_2-1 = "Avançando."
10130-CVGroup_Battle_Recovery_1-1 = "Obrigada, isso ajudou muito."
10130-CVGroup_Battle_TacticalAction_1-1 = "Movendo-me."
10130-CVGroup_Battle_Victory_1-1 = "Ficou satisfeito? Se sim, fico feliz."
10130-CVGroup_Battle_Victory_2-1 = "Supressão concluída. Espero que isso resolva o problema."
10130-CVGroup_CommonSkill-1 = "De uma nota de zero a dez, quanto eu tirei? Sensei."
10130-CVGroup_ExSkill_1-1 = "……Todos estão esperando."
10130-CVGroup_ExSkill_2-1 = "……É o meu trabalho."
10130-CVGroup_ExSkill_3-1 = "……Vamos terminar logo com isso?"
10130-CVGroup_ExSkill_Level_1-1 = "Recarga concluída."
10130-CVGroup_ExSkill_Level_2-1 = "Continuando o combate."
10130-CVGroup_ExSkill_Level_3-1 = "Fogo de supressão, iniciado."
10130-CVGroup_Formation_In_1-1 = "Sim, Sensei."
10130-CVGroup_Formation_In_2-1 = "Entendido, vou me preparar."
10130-CVGroup_Formation_Select-1 = "Ahhh!?\nN-não estou assustada... é, é verdade."
10130-CVGroup_Growup_1-1 = "Sinto uma sensação estranha...\nSerá que isso é o que chamam de 'crescimento' lá fora?"
10130-CVGroup_Growup_2-1 = "Então é assim que se sente ao crescer.\nEu também consigo seguir em frente assim, não é?"
10130-CVGroup_Growup_3-1 = "Eu quero mudar.\n……Pode manter isso em segredo dos outros?"
10130-CVGroup_Growup_4-1 = "'Acredite em mim e me siga'……?\nHaa... de onde vem toda essa confiança?\nBem, mas... acho que posso acreditar em você pelo menos uma vez."
10130-CVGroup_Relationship_Up_1-1 = "É um pouco embaraçoso colocar isso em palavras.\nFiquei em dúvida sobre qual seria a melhor forma de dizer...\nMas acho que o mais simples é o melhor.\nÉ que... estou muito feliz por ter você aqui, Sensei."
10130-CVGroup_Relationship_Up_2-1 = "Na verdade, ainda não confio 100% em você, Sensei.\nMas... confio uns 95%."
10130-CVGroup_Relationship_Up_3-1 = "Você disse que todos os alunos são importantes para você, não disse?\nNo começo eu não entendia bem, mas... ultimamente, comecei a entender o significado disso.\nAo mesmo tempo, sinto um pouco de tristeza por isso..."
10130-CVGroup_Relationship_Up_4-1 = "Você sempre diz para eu contar com você, mas...\nPara mim, só isso parece um pouco insuficiente... ou talvez, não seja o bastante.\nN-não tem nenhum significado profundo! \nÉ só que... eu também quero retribuir. Retribuir na mesma medida em que fui ajudada é o estilo de Arius."
10130-CVGroup_Tactic_In_1-1 = "Bem, que tipo de lugar é este?"
10130-CVGroup_Tactic_In_2-1 = "Entendo, é esse tipo de sensação."
10130-CVGroup_Tactic_Victory_1-1 = "Foi uma batalha desafiadora."
10130-CVGroup_Tactic_Victory_2-1 = "Este é o estilo de Arius."
