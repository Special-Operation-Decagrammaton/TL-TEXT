[translation]
16006-CVGroup_Battle_Buffed_1-1 = "よーっし！力が湧いてきた！"
16006-CVGroup_Battle_Defense_1-1 = "無駄無駄～！"
16006-CVGroup_Battle_In_1-1 = "暑いし、お腹も空いたけど……\n食事前の運動は大事！"
16006-CVGroup_Battle_In_2-1 = "ご飯の前に、ぱっぱと終わらせよう！"
16006-CVGroup_Battle_Move_1-1 = "まだいるの～？お腹空いた～。"
16006-CVGroup_Battle_Move_2-1 = "ちゃちゃっと片付けて、\n何か冷たい飲み物でも買いに行こ！"
16006-CVGroup_Battle_Recovery_1-1 = "やる気マーックス！\nでもそろそろお腹空いた……。"
16006-CVGroup_Battle_TacticalAction_1-1 = "こっちに行こー！"
16006-CVGroup_Battle_Victory_1-1 = "夏の美食を巡る旅は、まだまだこれからだよー！"
16006-CVGroup_Battle_Victory_2-1 = "よし、じゃあ早く海の家に行こう！"
16006-CVGroup_CommonSkill-1 = "（しゃくしゃくしゃくしゃく……！）"
16006-CVGroup_ExSkill_1-1 = "どれにしよっかな～！\n……うん、これっ！"
16006-CVGroup_ExSkill_2-1 = "うーん悩む～！\n……よし、これにしよっと！"
16006-CVGroup_ExSkill_3-1 = "ジュース～！ジュース～！\nよ～っし！"
16006-CVGroup_ExSkill_Level_1-1 = "んくっんくっ……ぷはあ！"
16006-CVGroup_ExSkill_Level_2-1 = "ちゅ～っ！ごくっ、\nうん！冷えてる～！"
16006-CVGroup_ExSkill_Level_3-1 = "美味しい……！\nごちそうさまー！"
16006-CVGroup_Formation_In_1-1 = "お出かけの準備、できたよ～！"
16006-CVGroup_Formation_In_2-1 = "ラジャー！"
16006-CVGroup_Formation_Select-1 = "あっ、先生も一口いる～？"
16006-CVGroup_Growup_1-1 = "どんな感じ……って？\nんーとね、美味しかったよ！\nチョコ味のウナギと同じくらい！"
16006-CVGroup_Growup_2-1 = "ふぅ、お腹いっぱーい！\nありがとう、先生！"
16006-CVGroup_Growup_3-1 = "先生、ごちそうさま！\n今度はまた一緒に、冷やし中華でも食べに行こう！"
16006-CVGroup_Growup_4-1 = "わあっ！先生がくれたこれ、すっごく美味しい！\nえ、食べ物じゃない？\nまあまあ、美味しかったからOKってことで！"
16006-CVGroup_Relationship_Up_1-1 = "やっぱり先生と一緒にいると楽しいなー！"
16006-CVGroup_Relationship_Up_2-1 = "二人でこれ食べよう、先生！\nくっついてると余計に暑いけど、\nでもやっぱり一緒に食べたいし！"
16006-CVGroup_Relationship_Up_3-1 = "先生、私ちょっと変かも……。\nドキドキが止まらなくて……。\n熱中症かなぁ……？"
16006-CVGroup_Relationship_Up_4-1 = "先生と一緒なら、今年の夏こそ食べたい物ぜーんぶ制覇できるかも！\n行こ、先生！"
16006-CVGroup_Tactic_In_1-1 = "みんなで夏のグルメ巡りにしゅっぱーつ！"
16006-CVGroup_Tactic_In_2-1 = "海の家まで、もうすぐのはず……！"
16006-CVGroup_Tactic_Victory_1-1 = "んんーーっ、終わったー！\nじゃ、とびっきり辛いかき氷でも食べに行こう、先生！"
16006-CVGroup_Tactic_Victory_2-1 = "よしっ！これで終わりだよね？\nじゃあ早くレモン焼きそばを食べに行かないと！"
