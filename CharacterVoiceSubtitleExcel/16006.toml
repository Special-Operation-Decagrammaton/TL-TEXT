[translation]
16006-CVGroup_Battle_Buffed_1-1 = "Isso! Senti minhas forças renovadas!"
16006-CVGroup_Battle_Defense_1-1 = "Inútil, inútil!"
16006-CVGroup_Battle_In_1-1 = "Está calor e estou com fome, mas...\nExercício antes da refeição é importante!"
16006-CVGroup_Battle_In_2-1 = "Vamos acabar logo com isso antes de comer!"
16006-CVGroup_Battle_Move_1-1 = "Ainda tem gente aqui? Estou com tanta fome..."
16006-CVGroup_Battle_Move_2-1 = "Vamos terminar isso rapidinho e\nir comprar algo gelado para beber!"
16006-CVGroup_Battle_Recovery_1-1 = "Motivação no máximo!\nMas já estou ficando com fome..."
16006-CVGroup_Battle_TacticalAction_1-1 = "Vamos por aqui!"
16006-CVGroup_Battle_Victory_1-1 = "A jornada pela gastronomia de verão está só começando!"
16006-CVGroup_Battle_Victory_2-1 = "Beleza, então vamos logo para a barraca de praia!"
16006-CVGroup_CommonSkill-1 = "(Nhac, nhac, nhac, nhac...!)"
16006-CVGroup_ExSkill_1-1 = "Qual será que eu escolho?!\n...Hum, essa aqui!"
16006-CVGroup_ExSkill_2-1 = "Hum, estou em dúvida!\n...Certo, vou escolher essa!"
16006-CVGroup_ExSkill_3-1 = "Suco! Suco!\nIsso mesmo!"
16006-CVGroup_ExSkill_Level_1-1 = "Glup, glup... Ahhh!"
16006-CVGroup_ExSkill_Level_2-1 = "Sluuurp! Glup,\nHum! Que refrescante!"
16006-CVGroup_ExSkill_Level_3-1 = "Que delícia...!\nObrigada pela refeição!"
16006-CVGroup_Formation_In_1-1 = "Já estou pronta para sair!"
16006-CVGroup_Formation_In_2-1 = "Entendido!"
16006-CVGroup_Formation_Select-1 = "Ah, Sensei, quer um pedacinho também?"
16006-CVGroup_Growup_1-1 = "Como eu me sinto...? \nHumm, estava delicioso! \nQuase tão bom quanto enguia com sabor de chocolate!"
16006-CVGroup_Growup_2-1 = "Ufa, estou satisfeita!\nObrigada, Sensei!"
16006-CVGroup_Growup_3-1 = "Sensei, obrigada pela refeição!\nDa próxima vez, vamos comer um macarrão gelado juntos!"
16006-CVGroup_Growup_4-1 = "Uau! Isso que você me deu é muito gostoso!\nComo é, não é comida?\nBom, estava gostoso, então está tudo bem!"
16006-CVGroup_Relationship_Up_1-1 = "É sempre divertido estar com você, Sensei!"
16006-CVGroup_Relationship_Up_2-1 = "Vamos comer isso juntos, Sensei!\nFicar grudada assim dá mais calor, mas eu quero comer com você!"
16006-CVGroup_Relationship_Up_3-1 = "Sensei, acho que estou um pouco estranha...\nMeu coração não para de bater forte...\nSerá que é insolação?"
16006-CVGroup_Relationship_Up_4-1 = "Se estiver com você, Sensei, talvez eu consiga provar todas as comidas que quero neste verão!\nVamos, Sensei!"
16006-CVGroup_Tactic_In_1-1 = "Partiu, pessoal, para o nosso tour gastronômico de verão!"
16006-CVGroup_Tactic_In_2-1 = "Já devemos estar perto da barraca de praia...!"
16006-CVGroup_Tactic_Victory_1-1 = "Ahhh, acabou!\nEntão, vamos comer uma raspadinha super apimentada, Sensei!"
16006-CVGroup_Tactic_Victory_2-1 = "Beleza! Acabou, né?\nEntão temos que ir logo comer o yakisoba de limão!"
