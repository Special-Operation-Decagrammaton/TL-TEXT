[translation]
20058-CVGroup_CommonSkill-1 = "もうちょっと頑張れる？"
20058-CVGroup_ExSkill_1-1 = "何があるかな……\n……ん。\nこれにしよ。"
20058-CVGroup_ExSkill_2-1 = "ん～……\nあっ……\nこれ可愛い！"
20058-CVGroup_ExSkill_3-1 = "ふんふんふん～\nん？\nこれは買い、だね。"
20058-CVGroup_ExSkill_Level_1-1 = "はい、あげる。"
20058-CVGroup_ExSkill_Level_2-1 = "よかったらもらってって。"
20058-CVGroup_ExSkill_Level_3-1 = "プレゼントだよ。"
20058-CVGroup_Formation_In_1-1 = "ん、今日はいい感じ。"
20058-CVGroup_Formation_In_2-1 = "一緒に行くの？オッケー。"
20058-CVGroup_Formation_Select-1 = "わぁっ！？\nちょっと先生……\nはぁ、先に言ってよね。"
20058-CVGroup_Growup_1-1 = "ん……いい気分。元気チャージ、みたいな？"
20058-CVGroup_Growup_2-1 = "不思議だね。力が湧いてくる気がする～"
20058-CVGroup_Growup_3-1 = "ねえ先生……それ、またやってほしいな。"
20058-CVGroup_Growup_4-1 = "なんか中毒性あるんだよね……ちょっと危ないかも。"
20058-CVGroup_Relationship_Up_1-1 = "最近先生とよく会うかも？なんでだろね。"
20058-CVGroup_Relationship_Up_2-1 = "なんかいっぱいくれるじゃん。\n嬉しいけど……もらってばっかはなぁ。\n先生は欲しいもの、ある？"
20058-CVGroup_Relationship_Up_3-1 = "んー……クセになりそ。\nあんまり甘やかさないでよ？困っちゃう。"
20058-CVGroup_Relationship_Up_4-1 = "ほんとさ……先生が甘やかすからダメになっちゃいそ。\n……もう。私ばっかドキドキさせられてる気がするんだけど？"
