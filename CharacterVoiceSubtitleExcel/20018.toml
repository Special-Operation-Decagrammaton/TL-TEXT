[translation]
20018-CVGroup_CommonSkill-1 = "Fogo!"
20018-CVGroup_ExSkill_1-1 = "Kuhihi... Disparem todas as munições!"
20018-CVGroup_ExSkill_2-1 = "Haa, haa... Não consigo mais me segurar!"
20018-CVGroup_ExSkill_3-1 = "Nossa, isso me dá arrepios...!"
20018-CVGroup_ExSkill_Level_1-1 = "Vamos lá, vamos fazer algo bem chamativo!"
20018-CVGroup_ExSkill_Level_2-1 = "Kuhihi... É por isso que eu não consigo parar..."
20018-CVGroup_ExSkill_Level_3-1 = "Haa, haa... Que lindo..."
20018-CVGroup_Formation_In_1-1 = "O que é, o que é~? Sinto um cheirinho de perigo vindo de algum lugar."
20018-CVGroup_Formation_In_2-1 = "Parece que estão precisando da minha ajudinha?"
20018-CVGroup_Formation_Select-1 = "Kuhihi... Vamos explodir tudo de um jeito bem espetacular~"
20018-CVGroup_Growup_1-1 = "Kuhihi... Valeu, Sensei."
20018-CVGroup_Growup_2-1 = "Eu posso, eu posso fazer muito mais do que isso..."
20018-CVGroup_Growup_3-1 = "O Sensei me dá tantas coisas que eu já estou de barriga cheia..."
20018-CVGroup_Growup_4-1 = "Tô ficando empolgada...\nIsso aí, agora a diversão começou de verdade!"
20018-CVGroup_Relationship_Up_1-1 = "Por algum motivo, sinto que o Sensei tá sempre me ajudando.\nKuhihi..."
20018-CVGroup_Relationship_Up_2-1 = "Sabe como é...\nDá a sensação de que estamos prestes a cruzar uma linha perigosa."
20018-CVGroup_Relationship_Up_3-1 = "……Quer um doce?\nSó tenho esse aqui que eu já estava chupando, mas tudo bem."
20018-CVGroup_Relationship_Up_4-1 = "Se for junto com o Sensei, encarar uma ruína espetacular e barulhenta não parece nada mau... kuhihi."