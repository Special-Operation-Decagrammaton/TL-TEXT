20018-CVGroup_CommonSkill-1 = "Fire!!" 
20018-CVGroup_ExSkill_1-1 = "Kuhihi…… Disparando todas as balas!" 
20018-CVGroup_ExSkill_2-1 = "Haa, haa…… Não dá mais pra segurar!" 
20018-CVGroup_ExSkill_3-1 = "Ah~, isso sempre me dá calafrios……!" 
20018-CVGroup_ExSkill_Level_1-1 = "Aqui vamos nós, e vai ser espalhafatoso!" 
20018-CVGroup_ExSkill_Level_2-1 = "Kuhihi…… Por essas e outras que eu não consigo largar dessa vida……" 
20018-CVGroup_ExSkill_Level_3-1 = "Haa, haa…… Tão lindo……" 
20018-CVGroup_Formation_In_1-1 = "Aê, qual é a fita~? Tô sentindo o cheiro de caos no ar." 
20018-CVGroup_Formation_In_2-1 = "Vão precisar da minha forcinha, é?" 
20018-CVGroup_Formation_Select-1 = "Kuhihi…… Bora mandar tudo pelos ares com muito estilo~" 
20018-CVGroup_Growup_1-1 = "Kuhihi…… Valeuzão, Sensei." 
20018-CVGroup_Growup_2-1 = "Isso me dá mais energia pra explodir coisas maiores……" 
20018-CVGroup_Growup_3-1 = "O Sensei já me deu tantas coisas boas que eu não tenho mais onde estocar……" 
20018-CVGroup_Growup_4-1 = "Tô começando a ferver por dentro……\nIrado, isso aqui tá ficando bem divertido!" 
20018-CVGroup_Relationship_Up_1-1 = "Sinto que o Sensei tá sempre correndo para me salvar ou me ajudar quando a coisa fica feia.\nKuhihi……" 
20018-CVGroup_Relationship_Up_2-1 = "Por algum motivo, sinto que……\nEstamos quase passando dos limites." 
20018-CVGroup_Relationship_Up_3-1 = "……Quer um pirulito?\nEu só tenho esse, e já tá meio babado." 
20018-CVGroup_Relationship_Up_4-1 = "Dizem que, do lado do Sensei, até o caos mais estrondoso se torna tolerável…… kuhihi." 