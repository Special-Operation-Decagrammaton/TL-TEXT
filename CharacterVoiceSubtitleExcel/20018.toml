[translation]
20018-CVGroup_CommonSkill-1 = "Fogo!"
20018-CVGroup_ExSkill_1-1 = "Kuhihi... Disparar tudo!"
20018-CVGroup_ExSkill_2-1 = "Ah, ah... Não aguento mais!"
20018-CVGroup_ExSkill_3-1 = "Ah, que arrepio bom...!"
20018-CVGroup_ExSkill_Level_1-1 = "Vamos lá, vamos fazer um estrondo!"
20018-CVGroup_ExSkill_Level_2-1 = "Kuhihi... É por isso que não consigo parar..."
20018-CVGroup_ExSkill_Level_3-1 = "Ah, ah... Que lindo..."
20018-CVGroup_Formation_In_1-1 = "O que, o que? Sinto um cheiro de perigo vindo de algum lugar."
20018-CVGroup_Formation_In_2-1 = "Sente que precisa da minha ajuda?"
20018-CVGroup_Formation_Select-1 = "Kuhihi... Vamos explodir tudo de um jeito bem chamativo."
20018-CVGroup_Growup_1-1 = "Kuhihi... Obrigado, Sensei."
20018-CVGroup_Growup_2-1 = "Eu deveria ser capaz de fazer muito, muito mais..."
20018-CVGroup_Growup_3-1 = "Como o Sensei me dá tantas coisas, já estou satisfeita..."
20018-CVGroup_Growup_4-1 = "Estou ficando empolgada...\nQue bom, as coisas estão ficando divertidas!"
20018-CVGroup_Relationship_Up_1-1 = "Sinto que o Sensei está sempre me ajudando com tudo.\nKuhihi..."
20018-CVGroup_Relationship_Up_2-1 = "Sabe, é como se...\nEstivéssemos prestes a cruzar uma linha."
20018-CVGroup_Relationship_Up_3-1 = "...Quer um doce?\nSó tenho um que eu já comecei a comer."
20018-CVGroup_Relationship_Up_4-1 = "Se for com o Sensei, até mesmo encontrar uma ruína espetacular seria... kuhihi."
