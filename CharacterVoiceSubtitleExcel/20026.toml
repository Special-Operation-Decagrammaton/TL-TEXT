[translation]
20026-CVGroup_CommonSkill-1 = "みんな、頭上に気をつけろ！"
20026-CVGroup_ExSkill_1-1 = "低品質なプリンを許すなー！"
20026-CVGroup_ExSkill_2-1 = "レッドウィンター連邦学園の事務局は変革せよ！"
20026-CVGroup_ExSkill_3-1 = "ストライキを開始する！"
20026-CVGroup_ExSkill_Level_1-1 = "労働者の権利を！\nさらなる保障を！"
20026-CVGroup_ExSkill_Level_2-1 = "全キヴォトスの労働者よ、団結せよ！"
20026-CVGroup_ExSkill_Level_3-1 = "志を一つに！\n恐れることはない！"
20026-CVGroup_Formation_In_1-1 = "ふむ、今日の現場はどこだ？"
20026-CVGroup_Formation_In_2-1 = "最善を尽くし、労働の価値を証明しよう。"
20026-CVGroup_Formation_Select-1 = "労働者の権利を！より高らかに叫ぶのだ！"
20026-CVGroup_Growup_1-1 = "努力と労働の対価として、成長があるのは当然のことだ。"
20026-CVGroup_Growup_2-1 = "先生の指導は、分かりやすくて良い。感謝する。"
20026-CVGroup_Growup_3-1 = "革命を成功させるために、啓蒙は必要不可欠だ。"
20026-CVGroup_Growup_4-1 = "これで次回の作業も、安全に進行できそうだ。"
20026-CVGroup_Relationship_Up_1-1 = "先生のおかげで、あたしたちの部はより確固たるものとなった。"
20026-CVGroup_Relationship_Up_2-1 = "先生になら、いつでも背中を任せられるな。"
20026-CVGroup_Relationship_Up_3-1 = "この気持ちは、その……革命的だな！"
20026-CVGroup_Relationship_Up_4-1 = "独占だなんて、ブルジョワがやるような悪質な行為だが……\n先生が相手だと……少し、欲が出てしまうな。"
