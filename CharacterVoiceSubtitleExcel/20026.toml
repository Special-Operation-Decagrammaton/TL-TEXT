[translation]
20026-CVGroup_CommonSkill-1 = "Pessoal, cuidado com o que cai lá de cima!"
20026-CVGroup_ExSkill_1-1 = "Não tolerem pudins de baixa qualidade!"
20026-CVGroup_ExSkill_2-1 = "A secretaria da Academia Red Winter deve ser reformada!"
20026-CVGroup_ExSkill_3-1 = "Iniciando a greve!"
20026-CVGroup_ExSkill_Level_1-1 = "Direitos aos trabalhadores!\nMais garantias!"
20026-CVGroup_ExSkill_Level_2-1 = "Trabalhadores de todo o Kivotos, uni-vos!"
20026-CVGroup_ExSkill_Level_3-1 = "Com um só propósito!\nNão há o que temer!"
20026-CVGroup_Formation_In_1-1 = "Hum, onde é o local de trabalho de hoje?"
20026-CVGroup_Formation_In_2-1 = "Vamos dar o nosso melhor e provar o valor do trabalho."
20026-CVGroup_Formation_Select-1 = "Direitos aos trabalhadores! Gritem mais alto!"
20026-CVGroup_Growup_1-1 = "É natural que o crescimento venha como recompensa pelo esforço e pelo trabalho."
20026-CVGroup_Growup_2-1 = "A orientação do Sensei é clara e útil. Agradeço."
20026-CVGroup_Growup_3-1 = "Para que a revolução seja bem-sucedida, a iluminação é indispensável."
20026-CVGroup_Growup_4-1 = "Com isso, o próximo trabalho também poderá ser realizado com segurança."
20026-CVGroup_Relationship_Up_1-1 = "Graças ao Sensei, nosso clube se tornou muito mais sólido."
20026-CVGroup_Relationship_Up_2-1 = "Ao Sensei, posso confiar minhas costas a qualquer momento."
20026-CVGroup_Relationship_Up_3-1 = "Esse sentimento é, bem... revolucionário!"
20026-CVGroup_Relationship_Up_4-1 = "Monopolizar alguém é um ato malicioso típico da burguesia, mas...\nQuando se trata do Sensei... sinto um pouco de ganância."
