[translation]
10115-CVGroup_Battle_Buffed_1-1 = "Sinto que agora consigo mirar em 40% de aproveitamento!"
10115-CVGroup_Battle_Covered_1-1 = "Esquiva!"
10115-CVGroup_Battle_Defense_1-1 = "Infield fly!"
10115-CVGroup_Battle_In_1-1 = "Isso também é um treino, né!"
10115-CVGroup_Battle_In_2-1 = "Um dia, eu vou causar uma tempestade de revolução no clube de beisebol...!"
10115-CVGroup_Battle_Move_1-1 = "É hora da troca?"
10115-CVGroup_Battle_Move_2-1 = "Espero chegar a tempo!"
10115-CVGroup_Battle_Recovery_1-1 = "Muito obrigada! Sinto-me melhor."
10115-CVGroup_Battle_TacticalAction_1-1 = "Lá vou eu...!"
10115-CVGroup_Battle_Victory_1-1 = "Ah! Como foi o meu swing agora?"
10115-CVGroup_Battle_Victory_2-1 = "Um dia eu vou me tornar uma rebatedora de 30%!"
10115-CVGroup_CommonSkill-1 = "Eu peguei!"
10115-CVGroup_ExSkill_1-1 = "Concentração mental... Vai dar...! Ué!?"
10115-CVGroup_ExSkill_2-1 = "Vamos... Venha...! Ah!?"
10115-CVGroup_ExSkill_3-1 = "Certo... Aqui...! Por que!?"
10115-CVGroup_ExSkill_Level_1-1 = "Uau! Ué!? Se for assim..."
10115-CVGroup_ExSkill_Level_2-1 = "Uaaaaa!? Não tem jeito...!"
10115-CVGroup_ExSkill_Level_3-1 = "Já era! Não tenho escolha...!"
10115-CVGroup_Formation_In_1-1 = "Se tem algo que é o brilho do beisebol, é o home run!"
10115-CVGroup_Formation_In_2-1 = "Por favor, aguarde ansiosamente, Sensei!"
10115-CVGroup_Formation_Select-1 = "Opa. Um eliminado!... Entendeu?"
10115-CVGroup_Growup_1-1 = "Muito obrigada! Isso só foi possível graças ao apoio do Sensei!"
10115-CVGroup_Growup_2-1 = "Será que... eu melhorei um pouco? Se a minha média de rebatidas subiu, então está ótimo."
10115-CVGroup_Growup_3-1 = "Não importa o que seja, eu vou encarar com seriedade. No beisebol e em tudo mais."
10115-CVGroup_Growup_4-1 = "Não é só sobre o home run chamativo. O tempo gasto treinando para a partida também faz parte do beisebol... Para alcançar uma vitória que nunca conseguiria sozinha, todos se dedicam ao máximo em suas posições... É esse lado do beisebol que eu gosto."
10115-CVGroup_Relationship_Up_1-1 = "Posso te contar um dos meus sonhos? Se eu conseguir rebater um home run... eu quero dar essa bola de presente para o Sensei."
10115-CVGroup_Relationship_Up_2-1 = "Existem muitas coisas que não podem ser explicadas apenas com dados e estatísticas. As partidas são assim também... Existem emoções e dramas que não aparecem apenas nos números. Tipo... a mudança em mim quando estou ao lado do Sensei."
10115-CVGroup_Relationship_Up_3-1 = "Agora... eu não sei por que, mas estou inquieta... Se eu rebater um home run... será que é esse tipo de sentimento...? Hehe."
10115-CVGroup_Relationship_Up_4-1 = "Desde muito tempo atrás, eu admiro o beisebol. Não seria exagero dizer que ele é a minha vida. ...Talvez o Sensei seja uma existência parecida com o beisebol para mim."
10115-CVGroup_Tactic_In_1-1 = "A partida começou."
10115-CVGroup_Tactic_In_2-1 = "Não acaba até que termine!"
10115-CVGroup_Tactic_Victory_1-1 = "Obrigada pelas orientações! Bom trabalho, Sensei."
10115-CVGroup_Tactic_Victory_2-1 = "Fufun! Eu consegui!"
