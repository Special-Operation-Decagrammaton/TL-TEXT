[translation]
10115-CVGroup_Battle_Buffed_1-1 = "今なら打率4割狙える気がします！"
10115-CVGroup_Battle_Covered_1-1 = "回避！"
10115-CVGroup_Battle_Defense_1-1 = "インフィールドフライ！"
10115-CVGroup_Battle_In_1-1 = "これも練習、ですね！"
10115-CVGroup_Battle_In_2-1 = "いつか、野球部に革命の嵐を起こしてみせますよ……！"
10115-CVGroup_Battle_Move_1-1 = "チェンジですか？"
10115-CVGroup_Battle_Move_2-1 = "間に合いますように！"
10115-CVGroup_Battle_Recovery_1-1 = "ありがとうございます！楽になりました。"
10115-CVGroup_Battle_TacticalAction_1-1 = "いきます……！"
10115-CVGroup_Battle_Victory_1-1 = "やあっ！\n今のスイング、どうでした？"
10115-CVGroup_Battle_Victory_2-1 = "いつか3割打者になってみせます！"
10115-CVGroup_CommonSkill-1 = "捕りました！"
10115-CVGroup_ExSkill_1-1 = "精神統一……\nいける……！\nうわあっ！？"
10115-CVGroup_ExSkill_2-1 = "さあ……\n来い……！\nああっ！？"
10115-CVGroup_ExSkill_3-1 = "よし……\nここ……！\nなんで！？"
10115-CVGroup_ExSkill_Level_1-1 = "わっ！わあっ！？\nこうなったら……"
10115-CVGroup_ExSkill_Level_2-1 = "うあああ！？\n仕方ない……！"
10115-CVGroup_ExSkill_Level_3-1 = "もうダメだ！\nやむを得ません……！"
10115-CVGroup_Formation_In_1-1 = "野球の華といえば、ホームラン！です！"
10115-CVGroup_Formation_In_2-1 = "楽しみにしていてくださいね、先生！"
10115-CVGroup_Formation_Select-1 = "おっ……と。\nワンアウト！……ですよ？"
10115-CVGroup_Growup_1-1 = "ありがとうございます！\nこれも先生の応援あってこそです！"
10115-CVGroup_Growup_2-1 = "少しは……うまく……なったんでしょうか？\n打率が上がってるならいいんですが。"
10115-CVGroup_Growup_3-1 = "どんなことだろうと、真剣に向き合いますよ。\n野球も、それ以外も。"
10115-CVGroup_Growup_4-1 = "華やかなホームランだけじゃないんです。\n試合のために練習を重ねる時間も野球の一部で……\n一人では絶対に成し遂げられない勝利を掴むために、全員がそれぞれのポジションに全力で臨む……\n野球のそういうところが、私は好きなんです。"
10115-CVGroup_Relationship_Up_1-1 = "私の夢を一つ、お話してもいいですか？\nもしホームランを打ったら……そのボールは、先生にプレゼントしたいです。"
10115-CVGroup_Relationship_Up_2-1 = "データや統計だけじゃ説明できないモノって、たくさんあるんですよね。\n試合もそうですし……数字だけでは見えてこない、感情やドラマがあります。\nその……先生の隣にいる時の、私の変化も。"
10115-CVGroup_Relationship_Up_3-1 = "今……なんだか落ち着かなくて……\nホームランを打ったら……こんな気持ち、なんですかね……へへ。"
10115-CVGroup_Relationship_Up_4-1 = "ずっと昔から、野球に憧れてきました。私の人生といっても過言ではありません。\n……先生は私にとっての野球と同じような存在かも……しれません。"
10115-CVGroup_Tactic_In_1-1 = "試合開始です。"
10115-CVGroup_Tactic_In_2-1 = "終わるまで終わりじゃありません！"
10115-CVGroup_Tactic_Victory_1-1 = "ご指導ありがとうございます！\nお疲れ様でした、先生。"
10115-CVGroup_Tactic_Victory_2-1 = "ふふん！やりましたよ！"
