[translation]
10039-CVGroup_Battle_Buffed_1-1 = "Ah, muito obrigada..."
10039-CVGroup_Battle_Covered_1-1 = "Eu me escondi..."
10039-CVGroup_Battle_Defense_1-1 = "Será que... até os inimigos estão me ignorando?"
10039-CVGroup_Battle_In_1-1 = "(Será que vou conseguir fazer isso direito...)"
10039-CVGroup_Battle_In_2-1 = "Desculpe, se não for pedir muito, \npor favor, venham comigo..."
10039-CVGroup_Battle_Move_1-1 = "Mudando de posição..."
10039-CVGroup_Battle_Move_2-1 = "P-por favor, me deem cobertura..."
10039-CVGroup_Battle_Recovery_1-1 = "Eh... isso é para mim?"
10039-CVGroup_Battle_TacticalAction_1-1 = "E-estou me movendo..."
10039-CVGroup_Battle_Victory_1-1 = "Será que eu realmente deveria estar aqui...?"
10039-CVGroup_Battle_Victory_2-1 = "N-não se preocupem comigo..."
10039-CVGroup_CommonSkill-1 = "E-eu vou dar cobertura..."
10039-CVGroup_ExSkill_1-1 = "No fim das contas, eu sou só um lixo que não consegue fazer nada..."
10039-CVGroup_ExSkill_2-1 = "Eu sou apenas uma pedrinha no caminho..."
10039-CVGroup_ExSkill_3-1 = "Eu não deveria ter entrado na SRT..."
10039-CVGroup_ExSkill_Level_1-1 = "Por favor, não se preocupem comigo..."
10039-CVGroup_ExSkill_Level_2-1 = "Para mim, este espaço é o ideal..."
10039-CVGroup_ExSkill_Level_3-1 = "Desculpe, por favor, me deixem sozinha..."
10039-CVGroup_Formation_In_1-1 = "C-combate...?"
10039-CVGroup_Formation_In_2-1 = "Para não atrapalhar as outras..."
10039-CVGroup_Formation_Select-1 = "Auu..."
10039-CVGroup_Growup_1-1 = "Eu posso mesmo receber algo tão bom assim...?"
10039-CVGroup_Growup_2-1 = "Minha compreensão sobre táticas se aprofundou..."
10039-CVGroup_Growup_3-1 = "Pelo menos... vou me esforçar para não envergonhar o nome da SRT."
10039-CVGroup_Growup_4-1 = "Preciso crescer de alguma forma para não ser um peso para as outras..."
10039-CVGroup_Relationship_Up_1-1 = "As instruções do Sensei são boas... não são assustadoras..."
10039-CVGroup_Relationship_Up_2-1 = "Sensei... você vai me encontrar, não vai? \nSempre, em qualquer momento."
10039-CVGroup_Relationship_Up_3-1 = "Espero que, mesmo alguém como eu, possa ser útil ao Sensei..."
10039-CVGroup_Relationship_Up_4-1 = "...Sensei. Por favor, não me perca de vista, está bem...?"
10039-CVGroup_Tactic_In_1-1 = "E-eu sou a líder...?"
10039-CVGroup_Tactic_In_2-1 = "P-por que isso foi acontecer..."
10039-CVGroup_Tactic_Victory_1-1 = "Bem, nós vencemos...? \nSério mesmo...?"
10039-CVGroup_Tactic_Victory_2-1 = "Isso é impossível... \nAlguém como eu ser a líder e ainda assim vencer..."
