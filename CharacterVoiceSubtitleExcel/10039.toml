[translation]
10039-CVGroup_Battle_Buffed_1-1 = "あ、ありがとうございます……。"
10039-CVGroup_Battle_Covered_1-1 = "隠れました……。"
10039-CVGroup_Battle_Defense_1-1 = "もしかして、敵にも無視されてます……？"
10039-CVGroup_Battle_In_1-1 = "（上手く、できるかな……）"
10039-CVGroup_Battle_In_2-1 = "すみません、できればで良いのですが、\n私についてきてください……。"
10039-CVGroup_Battle_Move_1-1 = "ポジション、変更します……。"
10039-CVGroup_Battle_Move_2-1 = "え、援護射撃、お願いします……。"
10039-CVGroup_Battle_Recovery_1-1 = "え……これ、私の分、ですか？"
10039-CVGroup_Battle_TacticalAction_1-1 = "い、移動します……。"
10039-CVGroup_Battle_Victory_1-1 = "私、ここにいても、良いのでしょうか……？"
10039-CVGroup_Battle_Victory_2-1 = "わ、私のことは、お気になさらず……。"
10039-CVGroup_CommonSkill-1 = "え、援護します……。"
10039-CVGroup_ExSkill_1-1 = "やっぱり私は、何もできないゴミ屑なんだ……。"
10039-CVGroup_ExSkill_2-1 = "私はその辺の小石……。"
10039-CVGroup_ExSkill_3-1 = "SRTに、入らなければ良かった……。"
10039-CVGroup_ExSkill_Level_1-1 = "私のことなんて、気にしないでください……。"
10039-CVGroup_ExSkill_Level_2-1 = "私には、この空間がちょうど良いので……。"
10039-CVGroup_ExSkill_Level_3-1 = "すみません、ひとりにさせてください……。"
10039-CVGroup_Formation_In_1-1 = "せ、戦闘ですか……？"
10039-CVGroup_Formation_In_2-1 = "他の子の邪魔に、ならないように……。"
10039-CVGroup_Formation_Select-1 = "あうぅ……。"
10039-CVGroup_Growup_1-1 = "こんな良いものを、私が頂いても……？"
10039-CVGroup_Growup_2-1 = "戦術への理解が、より深まりました……。"
10039-CVGroup_Growup_3-1 = "せめて、SRTの名に恥じないよう……頑張ります。"
10039-CVGroup_Growup_4-1 = "どうにか成長して、他のみんなの足を引っ張らないようにしないと……。"
10039-CVGroup_Relationship_Up_1-1 = "先生の指示、良いですね……怖く、ないので……。"
10039-CVGroup_Relationship_Up_2-1 = "先生は……私のこと、見つけてくれますよね？\nいつも、どんな時も。"
10039-CVGroup_Relationship_Up_3-1 = "こんな私でも、先生のお役に立てると良いのですが……。"
10039-CVGroup_Relationship_Up_4-1 = "……先生。私のこと、見失わないでくださいね……？"
10039-CVGroup_Tactic_In_1-1 = "わ、私がリーダー、ですか？"
10039-CVGroup_Tactic_In_2-1 = "ど、どうしてこんなことに……。"
10039-CVGroup_Tactic_Victory_1-1 = "えっと、私たちの勝ち、ですか……？\n本当に……？"
10039-CVGroup_Tactic_Victory_2-1 = "そんな、おかしいです……\n私なんかがリーダーになって、勝てただなんて……。"
