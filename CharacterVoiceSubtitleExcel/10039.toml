[translation]
10039-CVGroup_Battle_Buffed_1-1 = "M-Muito obrigada..."
10039-CVGroup_Battle_Covered_1-1 = "Estou escondida..."
10039-CVGroup_Battle_Defense_1-1 = "Será que... até os inimigos estão me ignorando...?"
10039-CVGroup_Battle_In_1-1 = "(Será que vou conseguir fazer isso direito...?)"
10039-CVGroup_Battle_In_2-1 = "Me desculpem, mas se possível... por favor, me sigam..."
10039-CVGroup_Battle_Move_1-1 = "Mudando de posição..."
10039-CVGroup_Battle_Move_2-1 = "P-Por favor, peço fogo de cobertura..."
10039-CVGroup_Battle_Recovery_1-1 = "Eh... i-isso é para mim...?"
10039-CVGroup_Battle_TacticalAction_1-1 = "M-Me movendo..."
10039-CVGroup_Battle_Victory_1-1 = "Será que... tem problema eu estar aqui...?"
10039-CVGroup_Battle_Victory_2-1 = "P-Por favor, não se importem comigo..."
10039-CVGroup_CommonSkill-1 = "D-Dando cobertura..."
10039-CVGroup_ExSkill_1-1 = "Como eu imaginava, não passo de um lixo inútil que não consegue fazer nada..."
10039-CVGroup_ExSkill_2-1 = "Eu sou só uma pedrinha qualquer na rua..."
10039-CVGroup_ExSkill_3-1 = "Eu nunca deveria ter entrado para a SRT..."
10039-CVGroup_ExSkill_Level_1-1 = "Por favor, não liguem para mim..."
10039-CVGroup_ExSkill_Level_2-1 = "Este espaço aqui (na lixeira) tem o tamanho perfeito para mim..."
10039-CVGroup_ExSkill_Level_3-1 = "Me desculpem, mas me deixem sozinha..."
10039-CVGroup_Formation_In_1-1 = "C-Combate...?"
10039-CVGroup_Formation_In_2-1 = "Espero não acabar atrapalhando as outras meninas..."
10039-CVGroup_Formation_Select-1 = "Auuuh..."
10039-CVGroup_Growup_1-1 = "Tem certeza de que eu posso receber algo tão bom assim...?"
10039-CVGroup_Growup_2-1 = "Sinto que minha compreensão sobre táticas se aprofundou..."
10039-CVGroup_Growup_3-1 = "Pelo menos para não envergonhar o nome da SRT... eu vou me esforçar."
10039-CVGroup_Growup_4-1 = "Tenho que dar um jeito de evoluir, para não acabar arrastando o resto do esquadrão para baixo comigo..."
10039-CVGroup_Relationship_Up_1-1 = "As ordens do Sensei são boas... porque elas não dão medo..."
10039-CVGroup_Relationship_Up_2-1 = "Sensei... você vai sempre me encontrar, não vai?\nSempre, em qualquer situação."
10039-CVGroup_Relationship_Up_3-1 = "Espero que, mesmo sendo assim, eu consiga ser minimamente útil para o senhor..."
10039-CVGroup_Relationship_Up_4-1 = "...Sensei. Por favor, não me perca de vista, tá bom...?"
10039-CVGroup_Tactic_In_1-1 = "E-Eu sou a líder...?"
10039-CVGroup_Tactic_In_2-1 = "C-Como as coisas acabaram assim..."
10039-CVGroup_Tactic_Victory_1-1 = "Uhm, nós ganhamos...?\nSério...?"
10039-CVGroup_Tactic_Victory_2-1 = "Isso não faz o menor sentido...\nComo é que a gente conseguiu ganhar com alguém como eu de líder...?"