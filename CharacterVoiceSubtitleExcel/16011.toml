[translation]
16011-CVGroup_Battle_Buffed_1-1 = "声援、感謝します。"
16011-CVGroup_Battle_Covered_1-1 = "隠れます。"
16011-CVGroup_Battle_Defense_1-1 = "残念です。もっと頑張ってください。"
16011-CVGroup_Battle_In_1-1 = "それではまず、走ってみましょうか。"
16011-CVGroup_Battle_In_2-1 = "正々堂々と参ります。"
16011-CVGroup_Battle_Move_1-1 = "急ぎましょう。"
16011-CVGroup_Battle_Move_2-1 = "まだ終わっていません。"
16011-CVGroup_Battle_Recovery_1-1 = "ありがとうございます。"
16011-CVGroup_Battle_TacticalAction_1-1 = "次へ行きましょう。"
16011-CVGroup_Battle_Victory_1-1 = "素晴らしい試合でした。"
16011-CVGroup_Battle_Victory_2-1 = "これくらいは達成できないといけませんね。"
16011-CVGroup_CommonSkill-1 = "集中します。"
16011-CVGroup_ExSkill_1-1 = "美味しそう……。"
16011-CVGroup_ExSkill_2-1 = "うぅ……。"
16011-CVGroup_ExSkill_3-1 = "耐え難い誘惑です……。"
16011-CVGroup_ExSkill_Level_1-1 = "集中、集中……！"
16011-CVGroup_ExSkill_Level_2-1 = "こんな時こそ深呼吸を……！"
16011-CVGroup_ExSkill_Level_3-1 = "しっかりしなさい、ハスミ！"
16011-CVGroup_Formation_In_1-1 = "お任せください。"
16011-CVGroup_Formation_In_2-1 = "お待ちしておりました。\n先生、ご指示を。"
16011-CVGroup_Formation_Select-1 = "せん……せい？"
16011-CVGroup_Growup_1-1 = "期待してくださった分、結果でお返しいたしますね。"
16011-CVGroup_Growup_2-1 = "ありがとうございます。\nこのご恩は、いつか必ず……。"
16011-CVGroup_Growup_3-1 = "これも試合のサポート……でしょうか？"
16011-CVGroup_Growup_4-1 = "こんなに期待していただいたのですから、\n全力を尽くすしかないですね。"
16011-CVGroup_Relationship_Up_1-1 = "お側にいてくださるだけでも心強いです。"
16011-CVGroup_Relationship_Up_2-1 = "先生さえよろしければ、もう少し一緒に……。"
16011-CVGroup_Relationship_Up_3-1 = "たまには先生も……\n欲しいものをおっしゃってくださいね。"
16011-CVGroup_Relationship_Up_4-1 = "ありがとうございます……\nこんな風に励ましていただいたのは久しぶりです。"
16011-CVGroup_Tactic_In_1-1 = "試合開始です。"
16011-CVGroup_Tactic_In_2-1 = "最善を尽くします。"
16011-CVGroup_Tactic_Victory_1-1 = "素晴らしい作戦でした、先生。"
16011-CVGroup_Tactic_Victory_2-1 = "たまにはこういう格好も、動きやすくて良いですね。"
