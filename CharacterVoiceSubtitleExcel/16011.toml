[translation]
16011-CVGroup_Battle_Buffed_1-1 = "Agradeço pelo apoio."
16011-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
16011-CVGroup_Battle_Defense_1-1 = "Que pena. Por favor, esforce-se mais."
16011-CVGroup_Battle_In_1-1 = "Então, vamos começar correndo?"
16011-CVGroup_Battle_In_2-1 = "Irei com toda a honestidade."
16011-CVGroup_Battle_Move_1-1 = "Vamos nos apressar."
16011-CVGroup_Battle_Move_2-1 = "Ainda não terminamos."
16011-CVGroup_Battle_Recovery_1-1 = "Muito obrigada."
16011-CVGroup_Battle_TacticalAction_1-1 = "Vamos para o próximo."
16011-CVGroup_Battle_Victory_1-1 = "Foi uma partida maravilhosa."
16011-CVGroup_Battle_Victory_2-1 = "Devemos ser capazes de alcançar pelo menos isso."
16011-CVGroup_CommonSkill-1 = "Vou me concentrar."
16011-CVGroup_ExSkill_1-1 = "Parece delicioso..."
16011-CVGroup_ExSkill_2-1 = "Ugh..."
16011-CVGroup_ExSkill_3-1 = "É uma tentação difícil de resistir..."
16011-CVGroup_ExSkill_Level_1-1 = "Foco, foco...!"
16011-CVGroup_ExSkill_Level_2-1 = "É nessas horas que preciso respirar fundo...!"
16011-CVGroup_ExSkill_Level_3-1 = "Mantenha a compostura, Hasumi!"
16011-CVGroup_Formation_In_1-1 = "Pode deixar comigo."
16011-CVGroup_Formation_In_2-1 = "Eu estava esperando por você.\nSensei, quais são as ordens?"
16011-CVGroup_Formation_Select-1 = "Pro... fessor?"
16011-CVGroup_Growup_1-1 = "Retribuirei a sua expectativa com resultados."
16011-CVGroup_Growup_2-1 = "Muito obrigada.\nUm dia, com certeza, retribuirei este favor..."
16011-CVGroup_Growup_3-1 = "Isso também é um suporte para a partida...?"
16011-CVGroup_Growup_4-1 = "Já que você depositou tanta expectativa em mim,\nnão tenho escolha a não ser dar o meu melhor."
16011-CVGroup_Relationship_Up_1-1 = "Apenas ter você ao meu lado já me dá coragem."
16011-CVGroup_Relationship_Up_2-1 = "Se não for um incômodo, Sensei, gostaria de ficar mais um pouco..."
16011-CVGroup_Relationship_Up_3-1 = "De vez em quando, você também deveria...\nme dizer o que deseja."
16011-CVGroup_Relationship_Up_4-1 = "Muito obrigada... Fazia tempo que não recebia um incentivo assim."
16011-CVGroup_Tactic_In_1-1 = "A partida começou."
16011-CVGroup_Tactic_In_2-1 = "Farei o meu melhor."
16011-CVGroup_Tactic_Victory_1-1 = "Foi uma estratégia excelente, Sensei."
16011-CVGroup_Tactic_Victory_2-1 = "Às vezes, vestir-se assim também é bom, é fácil de se mover."
