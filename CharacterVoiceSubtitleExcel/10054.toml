[translation]
10054-CVGroup_Battle_Buffed_1-1 = "Vou me esforçar pelo apoio que me deram!"
10054-CVGroup_Battle_Covered_1-1 = "Ah...!?"
10054-CVGroup_Battle_Defense_1-1 = "I-isso não funciona em mim...!"
10054-CVGroup_Battle_In_1-1 = "Vamos seguir o espírito esportivo!"
10054-CVGroup_Battle_In_2-1 = "Vamos com tudo!"
10054-CVGroup_Battle_Move_1-1 = "P-para a próxima pista, vamos lá...!"
10054-CVGroup_Battle_Move_2-1 = "Por favor, venham comigo...!"
10054-CVGroup_Battle_Recovery_1-1 = "Muito obrigada, isso me motiva!"
10054-CVGroup_Battle_TacticalAction_1-1 = "O-opa!"
10054-CVGroup_Battle_Victory_1-1 = "Ufa... conseguimos terminar."
10054-CVGroup_Battle_Victory_2-1 = "E-então, o que achou...? Fui bem?"
10054-CVGroup_CommonSkill-1 = "Preparar... já!"
10054-CVGroup_ExSkill_1-1 = "E-espere um pouco, por favor...!"
10054-CVGroup_ExSkill_2-1 = "P-por favor, aguarde um momento...!"
10054-CVGroup_ExSkill_3-1 = "Ah... u-uau..."
10054-CVGroup_ExSkill_Level_1-1 = "Vou te entregar agora."
10054-CVGroup_ExSkill_Level_2-1 = "S-sim. Aqui está!"
10054-CVGroup_ExSkill_Level_3-1 = "Cuidado para não deixar cair, está bem?"
10054-CVGroup_Formation_In_1-1 = "V-vou dar o meu melhor...!"
10054-CVGroup_Formation_In_2-1 = "Estou ficando um pouco nervosa..."
10054-CVGroup_Formation_Select-1 = "S-sim... o que houve!?"
10054-CVGroup_Growup_1-1 = "Não sou muito boa com exercícios, mas...\nVou tentar me esforçar um pouco mais."
10054-CVGroup_Growup_2-1 = "Eu deveria ter me esforçado mais nas aulas de educação física..."
10054-CVGroup_Growup_3-1 = "Muito obrigada, Sensei.\nEu vou me esforçar!"
10054-CVGroup_Growup_4-1 = "Com o seu apoio, Sensei,\nsinto que sou capaz de qualquer coisa."
10054-CVGroup_Relationship_Up_1-1 = "Se não se importar...\nSensei, gostaria de se exercitar comigo?"
10054-CVGroup_Relationship_Up_2-1 = "É a primeira vez que esperam algo de mim assim...\nFico um pouco nervosa..."
10054-CVGroup_Relationship_Up_3-1 = "Continue olhando para mim só mais um pouco, Sensei."
10054-CVGroup_Relationship_Up_4-1 = "Sempre quero mostrar a você, Sensei, quem eu realmente sou, sem mentiras."
10054-CVGroup_Tactic_In_1-1 = "De forma justa e honesta, vamos lá...!"
10054-CVGroup_Tactic_In_2-1 = "Pessoal, vamos nos esforçar!"
10054-CVGroup_Tactic_Victory_1-1 = "Bom trabalho.\nFoi um resultado excelente."
10054-CVGroup_Tactic_Victory_2-1 = "Foi graças ao esforço de todos vocês."
