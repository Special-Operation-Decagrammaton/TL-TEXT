[translation]
10054-CVGroup_Battle_Buffed_1-1 = "応援してくださった分、頑張りますね！"
10054-CVGroup_Battle_Covered_1-1 = "っ……！？"
10054-CVGroup_Battle_Defense_1-1 = "き、効きませんよっ……！"
10054-CVGroup_Battle_In_1-1 = "スポーツマンシップに則って参りましょう！"
10054-CVGroup_Battle_In_2-1 = "張り切って参りましょう！"
10054-CVGroup_Battle_Move_1-1 = "つ、次のトラックに行きましょう……！"
10054-CVGroup_Battle_Move_2-1 = "ついてきてください……！"
10054-CVGroup_Battle_Recovery_1-1 = "ありがとうございます、励みになります！"
10054-CVGroup_Battle_TacticalAction_1-1 = "よ……っと！"
10054-CVGroup_Battle_Victory_1-1 = "ふぅ……なんとか終わりましたね。"
10054-CVGroup_Battle_Victory_2-1 = "ど、どうでしょうか……大丈夫でした？"
10054-CVGroup_CommonSkill-1 = "よーい……ドン！"
10054-CVGroup_ExSkill_1-1 = "ま、待ってくださいね……！"
10054-CVGroup_ExSkill_2-1 = "しょ、少々お待ちください……！"
10054-CVGroup_ExSkill_3-1 = "あ……わ…わぁ……。"
10054-CVGroup_ExSkill_Level_1-1 = "今お渡ししますね。"
10054-CVGroup_ExSkill_Level_2-1 = "は、はいっ。こちらです！"
10054-CVGroup_ExSkill_Level_3-1 = "落とさないよう、気をつけてくださいね。"
10054-CVGroup_Formation_In_1-1 = "さ、最善を尽くします……！"
10054-CVGroup_Formation_In_2-1 = "なんだか緊張してきました……。"
10054-CVGroup_Formation_Select-1 = "は、はいっ……なんでしょうか！？"
10054-CVGroup_Growup_1-1 = "運動はあまり得意ではありませんが……\nもう少し頑張ってみますね。"
10054-CVGroup_Growup_2-1 = "普段から、もう少し体育の授業を頑張れば良かったです……。"
10054-CVGroup_Growup_3-1 = "ありがとうございます、先生。\n私、頑張りますね！"
10054-CVGroup_Growup_4-1 = "先生の応援があれば、\nなんでもできてしまうような気持ちになります。"
10054-CVGroup_Relationship_Up_1-1 = "もしよろしければ……\n先生もご一緒に、運動しませんか？"
10054-CVGroup_Relationship_Up_2-1 = "こんな風に期待されるのは初めてで……\n少し緊張してしまいます……。"
10054-CVGroup_Relationship_Up_3-1 = "もう少しだけ、私のこと見ていてください、先生。"
10054-CVGroup_Relationship_Up_4-1 = "いつだって、嘘偽りのない姿を先生にお見せしたいです。"
10054-CVGroup_Tactic_In_1-1 = "正々堂々、参ります……！"
10054-CVGroup_Tactic_In_2-1 = "みなさん、頑張りましょう！"
10054-CVGroup_Tactic_Victory_1-1 = "お疲れ様でした。\n素晴らしい成績です。"
10054-CVGroup_Tactic_Victory_2-1 = "みなさんが頑張ってくださったおかげです。"
