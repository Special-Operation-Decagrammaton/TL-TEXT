[translation]
10083-CVGroup_Battle_Buffed_1-1 = "今の支援、作戦に活かすね。"
10083-CVGroup_Battle_Covered_1-1 = "これも戦略のうち。"
10083-CVGroup_Battle_Defense_1-1 = "効かないよ。"
10083-CVGroup_Battle_In_1-1 = "これは私が手がけた作戦だから……\n先頭に立つよ。"
10083-CVGroup_Battle_In_2-1 = "百花繚乱の実力、その目に焼きつけて。"
10083-CVGroup_Battle_Move_1-1 = "準備完了、次へ移動する。"
10083-CVGroup_Battle_Move_2-1 = "作戦通り。\n心配はいらない。"
10083-CVGroup_Battle_Recovery_1-1 = "ありがとう。助かった。"
10083-CVGroup_Battle_TacticalAction_1-1 = "もっと有利な位置へ。"
10083-CVGroup_Battle_Victory_1-1 = "百花繚乱の参謀に、勝利は当たり前。"
10083-CVGroup_Battle_Victory_2-1 = "勝つのは、当然のことだから。"
10083-CVGroup_CommonSkill-1 = "参考にして。"
10083-CVGroup_ExSkill_1-1 = "次の手は……。"
10083-CVGroup_ExSkill_2-1 = "戦局を揺るがす一手を。"
10083-CVGroup_ExSkill_3-1 = "成すべきは、ただ一つ。"
10083-CVGroup_ExSkill_Level_1-1 = "――そこ。"
10083-CVGroup_ExSkill_Level_2-1 = "手加減はいらない。\n全力でいくよ。"
10083-CVGroup_ExSkill_Level_3-1 = "百花繚乱の力、存分に味わうといい。"
10083-CVGroup_Formation_In_1-1 = "私の力が必要？\n……だと思ってた。"
10083-CVGroup_Formation_In_2-1 = "ふふっ、私を呼ぶと思ってた。"
10083-CVGroup_Formation_Select-1 = "……勝手にすれば？"
10083-CVGroup_Growup_1-1 = "こんなものを渡すなんて……一体何が望みなの？\nだって、取引ってそういうものだよね。"
10083-CVGroup_Growup_2-1 = "何を企んでいるか知らないけど……\nくれるなら遠慮はしない。"
10083-CVGroup_Growup_3-1 = "……あれだけ言われてるのに、まだこんなものを……。\nあんたって本当に……変な人。"
10083-CVGroup_Growup_4-1 = "あんたのおかげで私は成長した。\n否定はしないよ、これは客観的な事実。\nだから……お礼くらいは、言っておく。ふん。"
10083-CVGroup_Relationship_Up_1-1 = "……先生、距離、近いよ。\n……嫌とは言ってない。"
10083-CVGroup_Relationship_Up_2-1 = "あ、先生。どこに行ってたの？\n私の目の届くところにいて。"
10083-CVGroup_Relationship_Up_3-1 = "先生の好意、確かに受け取った。\n次は私の番。\n覚悟しておいて。"
10083-CVGroup_Relationship_Up_4-1 = "私があんたを頼りにしているのは事実。だから約束して――\nあんたも私を頼る、って。"
10083-CVGroup_Tactic_In_1-1 = "百花繚乱に代々伝わる兵法術。\nあんた達に見せてあげる。"
10083-CVGroup_Tactic_In_2-1 = "先生、指揮を。\n私の作戦で支える。"
10083-CVGroup_Tactic_Victory_1-1 = "あんたの指揮と私の作戦。\n適うヤツなんて、いるはずない。"
10083-CVGroup_Tactic_Victory_2-1 = "私の作戦に点数をつけるとしたら……\n10点満点中の100万点、ってとこかな？"
