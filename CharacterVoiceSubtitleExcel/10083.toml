[translation]
10083-CVGroup_Battle_Buffed_1-1 = "Vou aproveitar esse apoio na operação."
10083-CVGroup_Battle_Covered_1-1 = "Isso também faz parte da estratégia."
10083-CVGroup_Battle_Defense_1-1 = "Não vai funcionar."
10083-CVGroup_Battle_In_1-1 = "Como esta é uma operação que eu planejei... vou liderar a frente."
10083-CVGroup_Battle_In_2-1 = "Gravem bem o poder da Hyakkaryouran."
10083-CVGroup_Battle_Move_1-1 = "Preparação concluída, avançando para o próximo ponto."
10083-CVGroup_Battle_Move_2-1 = "Conforme o planejado. Não precisa se preocupar."
10083-CVGroup_Battle_Recovery_1-1 = "Obrigada. Isso ajudou."
10083-CVGroup_Battle_TacticalAction_1-1 = "Para uma posição mais vantajosa."
10083-CVGroup_Battle_Victory_1-1 = "Para a estrategista da Hyakkaryouran, a vitória é algo natural."
10083-CVGroup_Battle_Victory_2-1 = "Vencer é o esperado, afinal."
10083-CVGroup_CommonSkill-1 = "Use como referência."
10083-CVGroup_ExSkill_1-1 = "O próximo movimento é..."
10083-CVGroup_ExSkill_2-1 = "Um movimento para abalar o campo de batalha."
10083-CVGroup_ExSkill_3-1 = "Só há uma coisa a ser feita."
10083-CVGroup_ExSkill_Level_1-1 = "— Ali."
10083-CVGroup_ExSkill_Level_2-1 = "Sem necessidade de conter forças. Vou com tudo."
10083-CVGroup_ExSkill_Level_3-1 = "Aproveite para sentir o poder da Hyakkaryouran."
10083-CVGroup_Formation_In_1-1 = "Precisa da minha força? ...Eu imaginei que sim."
10083-CVGroup_Formation_In_2-1 = "Fufu, eu sabia que você me chamaria."
10083-CVGroup_Formation_Select-1 = "...Faça o que quiser."
10083-CVGroup_Growup_1-1 = "Me dar algo assim... o que você quer em troca? Afinal, é assim que funcionam as negociações, não é?"
10083-CVGroup_Growup_2-1 = "Não sei o que você está planejando, mas... se vai me dar, não vou recusar."
10083-CVGroup_Growup_3-1 = "...Mesmo depois de tudo o que foi dito, você ainda me dá algo assim... Você é realmente... uma pessoa estranha."
10083-CVGroup_Growup_4-1 = "Graças a você, eu cresci. Não vou negar, é um fato objetivo. Por isso... vou te agradecer. Humpf."
10083-CVGroup_Relationship_Up_1-1 = "...Sensei, você está muito perto. ...Não que eu esteja reclamando."
10083-CVGroup_Relationship_Up_2-1 = "Ah, Sensei. Onde você estava? Fique onde eu possa te ver."
10083-CVGroup_Relationship_Up_3-1 = "Recebi sua gentileza, Sensei. Agora é a minha vez. Esteja preparado."
10083-CVGroup_Relationship_Up_4-1 = "É verdade que eu dependo de você. Então, prometa-me... que você também dependerá de mim."
10083-CVGroup_Tactic_In_1-1 = "A arte militar transmitida por gerações na Hyakkaryouran. Vou mostrar a vocês."
10083-CVGroup_Tactic_In_2-1 = "Sensei, assuma o comando. Eu darei suporte com minha estratégia."
10083-CVGroup_Tactic_Victory_1-1 = "Seu comando e minha estratégia. Não há ninguém que possa nos vencer."
10083-CVGroup_Tactic_Victory_2-1 = "Se fosse para dar uma nota para a minha estratégia... que tal 1 milhão de pontos de 10?"
