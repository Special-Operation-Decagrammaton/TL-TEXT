[translation]
23006-CVGroup_CommonSkill-1 = "邪魔はさせません！"
23006-CVGroup_ExSkill_1-1 = "百夜堂、出張販売ですっ！\n……ああっ！？"
23006-CVGroup_ExSkill_2-1 = "百夜堂はどこへでも出張販売します！\nあっ！茶器が……！"
23006-CVGroup_ExSkill_3-1 = "ここで活動資金を稼がないと……！\n……うわわっ！？"
23006-CVGroup_ExSkill_Level_1-1 = "こ、こんなことではめげません！"
23006-CVGroup_ExSkill_Level_2-1 = "ちょっ、激しすぎますっ！"
23006-CVGroup_ExSkill_Level_3-1 = "うっ、お店の物なのに……！"
23006-CVGroup_Formation_In_1-1 = "さすが先生、お目が高いですね～！"
23006-CVGroup_Formation_In_2-1 = "よしっ、お祭りの予算を稼ぐチャンス……\nじゃなくて、が、頑張りま～っす！"
23006-CVGroup_Growup_1-1 = "えへへっ、シズコはぁ～\n先生がシズコのこと大切にしてくれて、と～っても嬉しいです～！\nにゃんにゃん！……うん、私可愛い！"
23006-CVGroup_Growup_2-1 = "わ～い、成長しました～！ぶいっ！"
23006-CVGroup_Growup_3-1 = "ま、まあ、期待に応えられるようには頑張りますけど……？"
23006-CVGroup_Growup_4-1 = "先生にこんなに良くしてもらって……\nシズコ、あらためて頑張ります！\n百夜堂の店主兼、看板娘として！"
23006-CVGroup_Relationship_Up_1-1 = "（ち、近いっ……！？せ、先生との距離が、こんな……！だ、大丈夫かな？大丈夫なのかな！？）"
23006-CVGroup_Relationship_Up_2-1 = "この甘い気持ち……\n百夜堂のあんみつを、口いっぱいに頬張った時みたいな……。"
23006-CVGroup_Relationship_Up_3-1 = "先生と一緒にいるといつも、\nまるでお祭りの日みたいな気分になります。\n本当に不思議ですね……。"
23006-CVGroup_Relationship_Up_4-1 = "楽しいお祭りもいつかは終わるもの、と言いますね。\nでもせめて、本当にその時が来るまで。\nもう少し、そばにいてもいいですか？"
