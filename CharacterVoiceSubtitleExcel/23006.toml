[translation]
23006-CVGroup_CommonSkill-1 = "Não vou deixar que atrapalhem!"
23006-CVGroup_ExSkill_1-1 = "Hyakkiyako, vendas itinerantes em ação!\n……Ahhh!?"
23006-CVGroup_ExSkill_2-1 = "A Hyakkiyako faz vendas itinerantes em qualquer lugar!\nAh! O conjunto de chá……!"
23006-CVGroup_ExSkill_3-1 = "Preciso ganhar fundos para as atividades aqui……!\n……Uwaaa!?"
23006-CVGroup_ExSkill_Level_1-1 = "E-eu não vou desanimar por causa disso!"
23006-CVGroup_ExSkill_Level_2-1 = "Ei, isso é intenso demais!"
23006-CVGroup_ExSkill_Level_3-1 = "Ugh, e pensar que são itens da loja……!"
23006-CVGroup_Formation_In_1-1 = "Como esperado do Sensei, você tem um ótimo olho para as coisas!"
23006-CVGroup_Formation_In_2-1 = "Certo, uma chance de ganhar o orçamento para o festival……\nQuer dizer, e-eu vou dar o meu melhor!"
23006-CVGroup_Growup_1-1 = "Ehehe, a Shizuko está... muito feliz que o Sensei cuide tão bem de mim!\nNyan nyan! ...Sim, eu sou fofa!"
23006-CVGroup_Growup_2-1 = "Uau, eu cresci! V de vitória!"
23006-CVGroup_Growup_3-1 = "B-bem, eu vou me esforçar para corresponder às expectativas, mas...?"
23006-CVGroup_Growup_4-1 = "O Sensei tem sido tão bom para mim……\nShizuko vai se esforçar ainda mais agora! Como dona e garota-propaganda da Hyakkiyako!"
23006-CVGroup_Relationship_Up_1-1 = "(P-perto demais……!? A distância entre mim e o Sensei está tão……! E-está tudo bem? Será que está tudo bem mesmo!?)"
23006-CVGroup_Relationship_Up_2-1 = "Esse sentimento doce……\nÉ como quando encho a boca com o anmitsu da Hyakkiyako."
23006-CVGroup_Relationship_Up_3-1 = "Sempre que estou com o Sensei,\nsinto como se fosse dia de festival.\nÉ realmente um mistério……"
23006-CVGroup_Relationship_Up_4-1 = "Dizem que até os festivais mais divertidos chegam ao fim um dia.\nMas, pelo menos, até que esse momento realmente chegue……\nVocê poderia ficar um pouco mais ao meu lado?"
