[translation]
20044-CVGroup_CommonSkill-1 = "一杯、どうぞ。"
20044-CVGroup_ExSkill_1-1 = "お買い上げありがとうございます。\nん？\nハッ！"
20044-CVGroup_ExSkill_2-1 = "少々お待ちください。\nおや？\nそこ！"
20044-CVGroup_ExSkill_3-1 = "はい、どうぞ。\nうん？\nせいやっ！"
20044-CVGroup_ExSkill_Level_1-1 = "はあっ！"
20044-CVGroup_ExSkill_Level_2-1 = "やっ！"
20044-CVGroup_ExSkill_Level_3-1 = "受け取ってください！"
20044-CVGroup_Formation_In_1-1 = "ドリンク、いかがですか？"
20044-CVGroup_Formation_In_2-1 = "皆さんの活力になれば。"
20044-CVGroup_Formation_Select-1 = "飲まれますか？"
20044-CVGroup_Growup_1-1 = "どうかしましたか？\nドリンクサーバー？\nああ、全身運動の負荷にちょうど良いんです。"
20044-CVGroup_Growup_2-1 = "トレーニングでも、アルバイトでも、\n大切なのは笑顔、そして思いやりです。"
20044-CVGroup_Growup_3-1 = "誰かの役に立ちたいのなら、\nまずは自分自身が地に足着いていなければなりません。"
20044-CVGroup_Growup_4-1 = "昨日より今日、今日より明日――\nより高みを目指して。"
20044-CVGroup_Relationship_Up_1-1 = "スマイルは無料です。\nおまけでもう一回分おつけいたしますね。\nふふ、これは本心からのスマイルですよ。"
20044-CVGroup_Relationship_Up_2-1 = "いつもトレーニングに付き合っていただき、ありがとうございます。\n今日はペースを落として、ゆっくり過ごすとしましょうか。"
20044-CVGroup_Relationship_Up_3-1 = "トレーナー……いえ、先生のおかげで私は\n良き学びの中で日々を過ごすことができています。\nこれからも、私と二人三脚で進んで行ってくれますか？"
20044-CVGroup_Relationship_Up_4-1 = "運動もアルバイトも、トレーナーが同行すると効率が増加するのです。\nどうしてか分かりますか？\n……私は、その答えを知っています。"
