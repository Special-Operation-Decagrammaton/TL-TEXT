[translation]
20044-CVGroup_CommonSkill-1 = "Um copo, por favor."
20044-CVGroup_ExSkill_1-1 = "Obrigada pela compra.\nHm?\nAh!"
20044-CVGroup_ExSkill_2-1 = "Espere um momento, por favor.\nOh?\nAli!"
20044-CVGroup_ExSkill_3-1 = "Aqui, pegue.\nHm?\nSeiya!"
20044-CVGroup_ExSkill_Level_1-1 = "Haa!"
20044-CVGroup_ExSkill_Level_2-1 = "Ya!"
20044-CVGroup_ExSkill_Level_3-1 = "Por favor, aceite!"
20044-CVGroup_Formation_In_1-1 = "Gostaria de uma bebida?"
20044-CVGroup_Formation_In_2-1 = "Espero que isso lhes dê energia."
20044-CVGroup_Formation_Select-1 = "Vai beber algo?"
20044-CVGroup_Growup_1-1 = "Aconteceu algo?\nO dispensador de bebidas?\nAh, ele é perfeito para adicionar carga ao meu exercício de corpo inteiro."
20044-CVGroup_Growup_2-1 = "Seja no treinamento ou no trabalho de meio período,\no importante é o sorriso e a consideração."
20044-CVGroup_Growup_3-1 = "Se você quer ser útil para alguém,\nprimeiro precisa estar com os pés firmes no chão."
20044-CVGroup_Growup_4-1 = "Melhor hoje do que ontem, melhor amanhã do que hoje--\nSempre buscando patamares mais altos."
20044-CVGroup_Relationship_Up_1-1 = "O sorriso é gratuito.\nVou te dar mais um de brinde.\nFufu, este sorriso vem do fundo do meu coração."
20044-CVGroup_Relationship_Up_2-1 = "Obrigada por sempre me acompanhar nos treinos.\nQue tal diminuirmos o ritmo hoje e relaxarmos um pouco?"
20044-CVGroup_Relationship_Up_3-1 = "Treinador... não, Sensei, graças a você, eu\ntenho conseguido passar meus dias em um bom aprendizado.\nVocê continuará caminhando lado a lado comigo daqui para frente?"
20044-CVGroup_Relationship_Up_4-1 = "Tanto nos exercícios quanto no trabalho, a eficiência aumenta quando o treinador me acompanha.\nVocê sabe por quê?\n...Eu sei a resposta."
