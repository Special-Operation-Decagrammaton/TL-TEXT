[translation]
20032-CVGroup_CommonSkill-1 = "Sim, é uma das minhas melhores criações."
20032-CVGroup_ExSkill_1-1 = "Este lugar é... o Paraíso dos Pinguins?"
20032-CVGroup_ExSkill_2-1 = "Todos parecem estar se divertindo."
20032-CVGroup_ExSkill_3-1 = "Eu também queria tentar, um mergulho no gelo flutuante."
20032-CVGroup_ExSkill_Level_1-1 = "Venha aqui."
20032-CVGroup_ExSkill_Level_2-1 = "Cuidado para não esbarrar em nada."
20032-CVGroup_ExSkill_Level_3-1 = "Respeitem a vez de cada um."
20032-CVGroup_Formation_In_1-1 = "Entendido, pode deixar comigo. Estou me sentindo melhor do que o normal hoje."
20032-CVGroup_Formation_In_2-1 = "Minha condição está excelente."
20032-CVGroup_Growup_1-1 = "Investir em mim é a máxima eficiência...?"
20032-CVGroup_Growup_2-1 = "Parece que o treinamento intensivo deu resultados. Que bom."
20032-CVGroup_Growup_3-1 = "Ainda não é o suficiente... Preciso me dedicar mais."
20032-CVGroup_Growup_4-1 = "Cheguei até aqui graças a você, Sensei."
20032-CVGroup_Relationship_Up_1-1 = "Obrigada, Sensei."
20032-CVGroup_Relationship_Up_2-1 = "...Eu sempre acabo sendo ajudada por você, não é?"
20032-CVGroup_Relationship_Up_3-1 = "Que estranho. Mesmo estando calor, eu me sinto muito bem."
20032-CVGroup_Relationship_Up_4-1 = "Se você estiver comigo, Sensei, talvez lugares quentes não sejam tão ruins assim."
