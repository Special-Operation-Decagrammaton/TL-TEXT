[translation]
20032-CVGroup_CommonSkill-1 = "はい、自信作だよ。"
20032-CVGroup_ExSkill_1-1 = "ここが……ペンギンパラダイス？"
20032-CVGroup_ExSkill_2-1 = "みんな楽しそう。"
20032-CVGroup_ExSkill_3-1 = "私もやってみたいな、流氷ダイブ。"
20032-CVGroup_ExSkill_Level_1-1 = "こっちおいで。"
20032-CVGroup_ExSkill_Level_2-1 = "ぶつからないよう、気をつけてね。"
20032-CVGroup_ExSkill_Level_3-1 = "順番を守って。"
20032-CVGroup_Formation_In_1-1 = "分かった、任せて。今の私はいつもより調子がいいから。"
20032-CVGroup_Formation_In_2-1 = "コンディションは絶好調だよ。"
20032-CVGroup_Growup_1-1 = "私に投資する事が、最高効率……？"
20032-CVGroup_Growup_2-1 = "特訓の成果が出たみたい。よかった。"
20032-CVGroup_Growup_3-1 = "まだ足りない……\nもっと精進しないと。"
20032-CVGroup_Growup_4-1 = "ここまで来れたのは、先生のおかげだよ。"
20032-CVGroup_Relationship_Up_1-1 = "ありがとう、先生。"
20032-CVGroup_Relationship_Up_2-1 = "……いつも、助けられてばかりだね。"
20032-CVGroup_Relationship_Up_3-1 = "変なの。暑いのに、なんだか気分がいい。"
20032-CVGroup_Relationship_Up_4-1 = "先生が一緒なら、暑いところも嫌じゃないかも。"
