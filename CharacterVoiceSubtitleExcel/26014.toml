[translation]
26014-CVGroup_CommonSkill-1 = "Alvo confirmado!"
26014-CVGroup_ExSkill_1-1 = "Isso é... bem...\n...! Cuidado!"
26014-CVGroup_ExSkill_2-1 = "Ah, isso é...\n...! Abaixe-se!"
26014-CVGroup_ExSkill_3-1 = "Eu não acho que eu...\n...! Por aqui!"
26014-CVGroup_ExSkill_Level_1-1 = "Perigo eliminado.\nJá está tudo bem."
26014-CVGroup_ExSkill_Level_2-1 = "Sem problemas.\nEu vou resolver isso."
26014-CVGroup_ExSkill_Level_3-1 = "Iniciando suporte.\nDeixe o resto comigo."
26014-CVGroup_Formation_In_1-1 = "Está procurando um guia?"
26014-CVGroup_Formation_In_2-1 = "Vou trabalhar vestida assim...?"
26014-CVGroup_Formation_Select-1 = "Ugh... o comprimento disso me incomoda."
26014-CVGroup_Growup_1-1 = "Sensei, eu nunca vou esquecer... \neste favor que me fez."
26014-CVGroup_Growup_2-1 = "Não é o meu traje habitual, mas... \nhá trabalhos que só posso fazer vestida assim."
26014-CVGroup_Growup_3-1 = "Fazer tudo isso por mim... \nobrigada. Com este poder, eu protegerei o Sensei."
26014-CVGroup_Growup_4-1 = "Sensei... entendi. \nVou me esforçar para corresponder às suas expectativas."
26014-CVGroup_Relationship_Up_1-1 = "O que você acha... de eu estar vestida assim, Sensei?"
26014-CVGroup_Relationship_Up_2-1 = "Hoje farei a escolta pessoal do Sensei. \nCom este traje... \nnão levantarei suspeitas."
26014-CVGroup_Relationship_Up_3-1 = "Estar ao lado do Sensei usando este uniforme... \né algo novo e agradável."
26014-CVGroup_Relationship_Up_4-1 = "Embora eu esteja em missão... \nsempre posso arranjar um tempo para conversar com você. \nPode me chamar a qualquer momento."
