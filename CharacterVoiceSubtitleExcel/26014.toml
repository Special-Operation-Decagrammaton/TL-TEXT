[translation]
26014-CVGroup_CommonSkill-1 = "ターゲット、確認！"
26014-CVGroup_ExSkill_1-1 = "その……えっと……\n……！危ない！"
26014-CVGroup_ExSkill_2-1 = "ああ、それは……\n……！伏せろ！"
26014-CVGroup_ExSkill_3-1 = "ちょっと私では……\n……！こっちに！"
26014-CVGroup_ExSkill_Level_1-1 = "危険を排除した。\nもう大丈夫だ。"
26014-CVGroup_ExSkill_Level_2-1 = "問題ない。\n私が解決する。"
26014-CVGroup_ExSkill_Level_3-1 = "援護開始。\nあとは任せてくれ。"
26014-CVGroup_Formation_In_1-1 = "ガイドを探しているのか？"
26014-CVGroup_Formation_In_2-1 = "この格好で仕事をするのか……？"
26014-CVGroup_Formation_Select-1 = "うっ……丈が、気になる。"
26014-CVGroup_Growup_1-1 = "先生、この恩は……\n絶対に忘れない。"
26014-CVGroup_Growup_2-1 = "いつもの格好ではないが……\nこの姿でしかできない仕事も、あるから。"
26014-CVGroup_Growup_3-1 = "私に、ここまで……\nありがとう。この力で、先生を守ってみせる。"
26014-CVGroup_Growup_4-1 = "先生……分かった。\n期待に応えられるよう、善処する。"
26014-CVGroup_Relationship_Up_1-1 = "先生はこの格好……どう思う？"
26014-CVGroup_Relationship_Up_2-1 = "今日は先生の身辺警護を行う。\nこの服装なら……\n怪しまれることもないだろう。"
26014-CVGroup_Relationship_Up_3-1 = "制服姿で先生の隣に立つのは……\nなんだか新鮮で、良いな。"
26014-CVGroup_Relationship_Up_4-1 = "任務中ではあるが……\n先生と話す時間は作れる。\nいつでも声をかけてくれ。"
