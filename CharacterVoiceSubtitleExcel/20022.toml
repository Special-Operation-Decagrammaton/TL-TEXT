[translation]
20022-CVGroup_CommonSkill-1 = "気をつけてください！"
20022-CVGroup_ExSkill_1-1 = "それでは、行きましょうか。"
20022-CVGroup_ExSkill_2-1 = "心を込めて作りました！"
20022-CVGroup_ExSkill_3-1 = "出発しますね。"
20022-CVGroup_ExSkill_Level_1-1 = "給食部の特製おせちです！"
20022-CVGroup_ExSkill_Level_2-1 = "真心いっぱいですよ！"
20022-CVGroup_ExSkill_Level_3-1 = "おかわりなら、たくさんありますよ！"
20022-CVGroup_Formation_In_1-1 = "準備はできています。"
20022-CVGroup_Formation_In_2-1 = "お正月料理をご用意しますね。"
20022-CVGroup_Growup_1-1 = "いつもありがとうございます、先生。"
20022-CVGroup_Growup_2-1 = "これを私に……？\n頂いても良いのでしょうか？"
20022-CVGroup_Growup_3-1 = "どうしましょう……お返しできるものが何も……。\nえっ？すでにもらっている……？"
20022-CVGroup_Growup_4-1 = "こんなに成長できるだなんて……。\n全部、先生のおかげです。\nありがとうございます。"
20022-CVGroup_Relationship_Up_1-1 = "何かあったら、いつでも声をかけてくださいね。\nいつでも、ですよ……？"
20022-CVGroup_Relationship_Up_2-1 = "先生と一緒に過ごす日々は、\n私にとってかけがえのない時間なんです。"
20022-CVGroup_Relationship_Up_3-1 = "せ、先生？\nえへへ……呼んでみたかっただけです。"
20022-CVGroup_Relationship_Up_4-1 = "先生に……伝えたい言葉があるんです。\nいつか伝えるので、待っていてくれますか？"
