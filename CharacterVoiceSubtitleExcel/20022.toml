[translation]
20022-CVGroup_CommonSkill-1 = "Por favor, tome cuidado!"
20022-CVGroup_ExSkill_1-1 = "Bem, vamos nessa."
20022-CVGroup_ExSkill_2-1 = "Preparei com todo o meu coração!"
20022-CVGroup_ExSkill_3-1 = "Estamos partindo."
20022-CVGroup_ExSkill_Level_1-1 = "É o osechi especial do Clube de Merenda!"
20022-CVGroup_ExSkill_Level_2-1 = "Está cheio de sinceridade!"
20022-CVGroup_ExSkill_Level_3-1 = "Se quiser repetir, temos bastante!"
20022-CVGroup_Formation_In_1-1 = "Estou pronta."
20022-CVGroup_Formation_In_2-1 = "Vou preparar os pratos de Ano Novo."
20022-CVGroup_Growup_1-1 = "Muito obrigada por tudo, Sensei."
20022-CVGroup_Growup_2-1 = "Isto é para mim...? Posso mesmo aceitar?"
20022-CVGroup_Growup_3-1 = "O que eu faço... não tenho nada para retribuir... Hã? Eu já recebi...?"
20022-CVGroup_Growup_4-1 = "Eu nunca imaginei que poderia crescer tanto... Tudo isso é graças ao Sensei. Muito obrigada."
20022-CVGroup_Relationship_Up_1-1 = "Se precisar de algo, por favor, me chame a qualquer momento. A qualquer momento, viu...?"
20022-CVGroup_Relationship_Up_2-1 = "Os dias que passo com o Sensei são um tempo insubstituível para mim."
20022-CVGroup_Relationship_Up_3-1 = "S-Sensei? Ehehe... eu só queria te chamar."
20022-CVGroup_Relationship_Up_4-1 = "Sensei... tenho palavras que gostaria de lhe dizer. Você poderia esperar até que eu as diga algum dia?"
