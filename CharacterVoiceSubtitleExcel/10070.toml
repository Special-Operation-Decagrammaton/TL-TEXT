[translation]
10070-CVGroup_Battle_Buffed_1-1 = "受けた恩は、必ず返そう。"
10070-CVGroup_Battle_Covered_1-1 = "隠れる。"
10070-CVGroup_Battle_Defense_1-1 = "それで終わりなのか？"
10070-CVGroup_Battle_In_1-1 = "さあ、時間だ。"
10070-CVGroup_Battle_In_2-1 = "私が先頭に立とう。"
10070-CVGroup_Battle_Move_1-1 = "動かぬ者に、勝利は無い。"
10070-CVGroup_Battle_Move_2-1 = "あそこだな？"
10070-CVGroup_Battle_Recovery_1-1 = "感謝する。"
10070-CVGroup_Battle_TacticalAction_1-1 = "移動する。"
10070-CVGroup_Battle_Victory_1-1 = "我が友には敬愛を、裏切り者には銃弾を……フッ。"
10070-CVGroup_Battle_Victory_2-1 = "私はただ、今を噛み締めているだけさ……フッ。"
10070-CVGroup_CommonSkill-1 = "もう一度いこう。"
10070-CVGroup_ExSkill_1-1 = "ふぅ……未来のために。"
10070-CVGroup_ExSkill_2-1 = "さて……相手はどいつだ？"
10070-CVGroup_ExSkill_3-1 = "今こそ……立ち上がる時だろう。"
10070-CVGroup_ExSkill_Level_1-1 = "さらばだ。フーッ。"
10070-CVGroup_ExSkill_Level_2-1 = "お別れだ。……ふぅ。"
10070-CVGroup_ExSkill_Level_3-1 = "雨が、降りそうだな。……はっ。"
10070-CVGroup_Formation_In_1-1 = "我が生に、意味はあるのだろうか。"
10070-CVGroup_Formation_In_2-1 = "我々には未来があるだろう？"
10070-CVGroup_Formation_Select-1 = "わ、私は子供じゃない！"
10070-CVGroup_Growup_1-1 = "強くなった気がするが……\nこれも、先生のおかげなのか？"
10070-CVGroup_Growup_2-1 = "今日の私は、昨日の私より成長した……\nフッ、そういうことだ。"
10070-CVGroup_Growup_3-1 = "『君の瞳に乾杯』――この状況でなぜ、って……？\nそんな事も分からないのか？仕方ないな――\n……すまない。ノリで言っただけだ。"
10070-CVGroup_Growup_4-1 = "我々は守るものがあると、強くなれる――\nそれは何かって……？\nっ……！いちいち聞かないでくれ！"
10070-CVGroup_Relationship_Up_1-1 = "鳥をしとめる時は、慎重でなければならない。\n早すぎても、遅すぎてもならないのだ。\nなんで鳥かって……？さ、さあな……。"
10070-CVGroup_Relationship_Up_2-1 = "いつしか、私たちにも終わりが訪れるだろう。\nそれまで、互いに通じ合っていたいものだな……。\nクゥー！我ながらいいセリフだった！"
10070-CVGroup_Relationship_Up_3-1 = "一歩ずつ、ゆっくりと距離を縮めていこう。\nそうしたら、いつかは……\n……どうなるんだ？"
10070-CVGroup_Relationship_Up_4-1 = "……慣れないことはするものじゃない、とはいうが……。\nしかし、挑戦しなければ得られないものがある、という言葉も……。\nうう、なんでもない。忘れてくれ。"
10070-CVGroup_Tactic_In_1-1 = "嗚呼、醒めない夢はない、という事か。"
10070-CVGroup_Tactic_In_2-1 = "良いじゃないか、最高のポジションだ。"
10070-CVGroup_Tactic_Victory_1-1 = "運命は、己が手で掴み取るものだ。"
10070-CVGroup_Tactic_Victory_2-1 = "常にこうあるべきだ。\n環境に左右などされたくはないな。"
