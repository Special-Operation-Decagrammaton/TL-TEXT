[translation]
10070-CVGroup_Battle_Buffed_1-1 = "A dívida que recebi, eu certamente pagarei."
10070-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
10070-CVGroup_Battle_Defense_1-1 = "Foi só isso?"
10070-CVGroup_Battle_In_1-1 = "Muito bem, é hora."
10070-CVGroup_Battle_In_2-1 = "Eu serei a linha de frente."
10070-CVGroup_Battle_Move_1-1 = "Para quem não se move, não há vitória."
10070-CVGroup_Battle_Move_2-1 = "É ali, não é?"
10070-CVGroup_Battle_Recovery_1-1 = "Agradeço."
10070-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10070-CVGroup_Battle_Victory_1-1 = "Respeito e amor aos meus amigos, e balas aos traidores... Hmph."
10070-CVGroup_Battle_Victory_2-1 = "Eu só estou saboreando o momento... Hmph."
10070-CVGroup_CommonSkill-1 = "Vamos mais uma vez."
10070-CVGroup_ExSkill_1-1 = "Ufa... Pelo futuro."
10070-CVGroup_ExSkill_2-1 = "Bem... quem é o oponente?"
10070-CVGroup_ExSkill_3-1 = "Agora é... a hora de se levantar."
10070-CVGroup_ExSkill_Level_1-1 = "Adeus. Haa."
10070-CVGroup_ExSkill_Level_2-1 = "É uma despedida. ...Ufa."
10070-CVGroup_ExSkill_Level_3-1 = "Parece que vai chover. ...Hah."
10070-CVGroup_Formation_In_1-1 = "Será que a minha vida tem algum significado?"
10070-CVGroup_Formation_In_2-1 = "Nós temos um futuro, não temos?"
10070-CVGroup_Formation_Select-1 = "E-eu não sou uma criança!"
10070-CVGroup_Growup_1-1 = "Sinto que fiquei mais forte, mas...\nIsso também é graças ao Sensei?"
10070-CVGroup_Growup_2-1 = "O eu de hoje cresceu mais do que o eu de ontem...\nHmph, é isso mesmo."
10070-CVGroup_Growup_3-1 = "“Um brinde aos seus olhos” — por que eu diria isso nessa situação, você pergunta?\nVocê não entende nem isso? Não tem jeito mesmo...\n...Desculpe. Eu só entrei na onda."
10070-CVGroup_Growup_4-1 = "Nós ficamos mais fortes quando temos algo a proteger—\nO que seria isso, você pergunta?\n...Ah! Não fique perguntando tudo!"
10070-CVGroup_Relationship_Up_1-1 = "Ao caçar um pássaro, é preciso ser cauteloso.\nNão pode ser cedo demais, nem tarde demais.\nPor que um pássaro, você pergunta?... B-bem, quem sabe..."
10070-CVGroup_Relationship_Up_2-1 = "Algum dia, o nosso fim também chegará.\nAté lá, espero que possamos nos entender bem...\nUau! Essa foi uma boa fala, se é que posso dizer!"
10070-CVGroup_Relationship_Up_3-1 = "Vamos diminuir a distância passo a passo, lentamente.\nE então, algum dia...\n...O que vai acontecer?"
10070-CVGroup_Relationship_Up_4-1 = "...Dizem que não devemos fazer coisas às quais não estamos acostumados...\nMas também dizem que há coisas que só se conquista se você se arriscar...\nUgh, esqueça. Não ligue para isso."
10070-CVGroup_Tactic_In_1-1 = "Ah, então quer dizer que todo sonho tem um despertar."
10070-CVGroup_Tactic_In_2-1 = "Nada mal, é uma posição excelente."
10070-CVGroup_Tactic_Victory_1-1 = "O destino é algo que se conquista com as próprias mãos."
10070-CVGroup_Tactic_Victory_2-1 = "Deveria ser sempre assim.\nNão quero ser influenciado pelo ambiente."
