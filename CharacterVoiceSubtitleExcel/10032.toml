10032-CVGroup_Tactic_Victory_1-1 = "Hmm, acho que não foi o suficiente, né?\nEi, vamos brincar mais!"
10032-CVGroup_Tactic_Victory_2-1 = "Kufufu, acho que é isso por hoje?\nEntão, o que vamos brincar agora?"
