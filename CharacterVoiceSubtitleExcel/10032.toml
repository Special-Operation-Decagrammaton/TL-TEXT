10032-CVGroup_Relationship_Up_4-1 = "Foi muito divertido brincar bastante com você no ano passado.\nEntão, este ano e no próximo, vamos brincar muito, muito mesmo, Sensei!"
10032-CVGroup_Tactic_In_1-1 = "Vamos nos divertir este ano também?"
