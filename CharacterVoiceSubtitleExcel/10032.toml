10032-CVGroup_Growup_4-1 = "先生、私のことすっごい好きなんだね……？\nくふふっ、ここまで先生が期待してくれてるんだから、\n今年は今まで以上にかっこいいところ、たくさん見せてあげるね！"
10032-CVGroup_Relationship_Up_1-1 = "先生のことを見てると胸がきゅってなるの。\nこれ、なんでだと思う？"
10032-CVGroup_Relationship_Up_2-1 = "うーん、先生の傍にいると、何だかむずむずする……\nだからぁ……くふふっ！\nちょっかい出しても仕方ないよね！"
10032-CVGroup_Relationship_Up_3-1 = "先生、私まだまだ全然足りてないよ？\nだからもう少し……先生と、楽しく遊びたいなっ！"
10032-CVGroup_Relationship_Up_4-1 = "去年は先生とたくさん遊べて、\nすっごい楽しかったよだから今年も来年も、\nたくさんたっくさん遊ぼうね、先生！"
10032-CVGroup_Tactic_In_1-1 = "さあ、今年も楽しく遊ぼっか？"
10032-CVGroup_Tactic_In_2-1 = "くふふっ！楽しむ準備はOK？"
10032-CVGroup_Tactic_Victory_1-1 = "んー、ちょっと不完全燃焼かな～？\nね、もっと遊ぼっ！"
10032-CVGroup_Tactic_Victory_2-1 = "くふふっ、こんなところかな？\nじゃあ、次は何して遊ぶ？"
