10032-CVGroup_Battle_Recovery_1-1 = "わーいっ！ありがとー！"
10032-CVGroup_Battle_TacticalAction_1-1 = "ちょっと場所変えよっか！"
10032-CVGroup_Battle_Victory_1-1 = "くふふっ、うん、意外と面白かったよ！"
10032-CVGroup_Battle_Victory_2-1 = "ふふっ、ちょっとは楽しかったし、まあ合格点かな？"
10032-CVGroup_CommonSkill-1 = "これでどうだ～！"
10032-CVGroup_ExSkill_1-1 = "あはっ♪\n良いね良いねー！"
10032-CVGroup_ExSkill_2-1 = "わお、すっご～い！\nあ、良いこと思いついた！"
10032-CVGroup_ExSkill_3-1 = "たーまや～！\nすっごい花火だね～！"
10032-CVGroup_ExSkill_Level_1-1 = "私も負けないよ！食らえーっ！"
10032-CVGroup_ExSkill_Level_2-1 = "じゃーん！\nムツキちゃんの特製花火ー！"
10032-CVGroup_ExSkill_Level_3-1 = "くふふっ\n私もちょうど、良いもの持ってたんだ～！"
10032-CVGroup_Formation_In_1-1 = "私に任せて、先生！\nとっておきの作戦があるから！"
10032-CVGroup_Formation_In_2-1 = "どんな依頼でも良いよ、言ってみて？"
10032-CVGroup_Formation_Select-1 = "くふふっ、先生は～、\n私とどんなことして遊びたい？"
10032-CVGroup_Growup_1-1 = "先生、どう？\nちょっと大きくなったと思わない？"
10032-CVGroup_Growup_2-1 = "くふふっ♪\n先生のおかげで私、こ～んなに強くなったんだよ！"
