10032-CVGroup_Battle_Victory_1-1 = "Kufufu, é, foi surpreendentemente divertido!"
10032-CVGroup_Battle_Victory_2-1 = "Fufu, foi um pouco divertido, então acho que está aprovado?"
10032-CVGroup_CommonSkill-1 = "Toma essa!"
10032-CVGroup_ExSkill_1-1 = "Ah♪\nMuito bom, muito bom!"
10032-CVGroup_ExSkill_2-1 = "Uau, incrível!\nAh, tive uma ideia!"
10032-CVGroup_ExSkill_3-1 = "Que espetáculo!\nQue fogos de artifício incríveis!"
10032-CVGroup_ExSkill_Level_1-1 = "Eu não vou perder! Toma isso!"
10032-CVGroup_ExSkill_Level_2-1 = "Tcharam!\nOs fogos de artifício especiais da Mutsuki!"
