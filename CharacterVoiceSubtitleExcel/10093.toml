10093-CVGroup_Relationship_Up_4-1 = "そ、その、なんていうか、こういうの初めてで……。\nか、顔真っ赤？\nぜ、全然そんなことないんですけどぉ！あははっ！"
10093-CVGroup_Tactic_In_1-1 = "いいよ！あたしも気合入れよっかな！"
10093-CVGroup_Tactic_In_2-1 = "そうしよっか！"
10093-CVGroup_Tactic_Victory_1-1 = "先生！先生！\n任務完了だって～！"
