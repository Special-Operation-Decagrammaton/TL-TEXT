10093-CVGroup_CommonSkill-1 = "もーっ、しょうがないなぁ！"
10093-CVGroup_ExSkill_1-1 = "この写真超バエるじゃん！\nみんなに見せよ～っと！"
10093-CVGroup_ExSkill_2-1 = "これをこうして……じゃ～ん！"
10093-CVGroup_ExSkill_3-1 = "ハッシュタグよーし……\nうんうん、いい感じ！"
10093-CVGroup_ExSkill_Level_1-1 = "超気に入った！"
