[translation]
20008-CVGroup_CommonSkill-1 = "風紀委員会からの支給品です！"
20008-CVGroup_ExSkill_1-1 = "判明している戦闘データを送ります。"
20008-CVGroup_ExSkill_2-1 = "データはこれとこれと……。"
20008-CVGroup_ExSkill_3-1 = "風紀委員の情報収集能力、お見せします。"
20008-CVGroup_ExSkill_Level_1-1 = "分析完了、弱点は把握済みです。"
20008-CVGroup_ExSkill_Level_2-1 = "あとはお任せしますね？"
20008-CVGroup_ExSkill_Level_3-1 = "ふふっ、準備は万全ですから。"
20008-CVGroup_Formation_In_1-1 = "お仕事ですね。はい、お任せください。"
20008-CVGroup_Formation_In_2-1 = "シャーレとしての業務上の指示……ということでしょうか。\nでしたら仕方ありません。"
20008-CVGroup_Formation_Select-1 = "本当は穏便に済ませなかったのですが……\nやるしかなさそうですね。"
20008-CVGroup_Growup_1-1 = "先生からのご支援、ありがたく頂戴しますね。"
20008-CVGroup_Growup_2-1 = "成長……していますね。\n自分でもその、ビックリです。"
20008-CVGroup_Growup_3-1 = "こういうことは、気軽にすることではないでしょうに……\n……何が狙いですか？何かしてほしいことでも？"
20008-CVGroup_Growup_4-1 = "その……ありがとうございます。先生。\n……何ですか、その顔は。\n私だって何かをしてもらえば、感謝くらいします。まったく……。"
20008-CVGroup_Relationship_Up_1-1 = "あの、ちょっと距離が近くないですか……？\nい、いえ、意識しているとかではなく……。"
20008-CVGroup_Relationship_Up_2-1 = "……業務外での関係でもお望みなんですか？\nそういうのは早いですよ……まだ。"
20008-CVGroup_Relationship_Up_3-1 = "これがどういう感情なのか……\nもう少し、検討する時間をください。\n本当に、少しで良いので。"
20008-CVGroup_Relationship_Up_4-1 = "はぁ……ええ、認めますよ。\n先生のことを嫌いだとは思っていません。\nで、それで？だったら何なんですか？"
