[translation]
10051-CVGroup_Battle_Buffed_1-1 = "応援、有難く受け取るよ。"
10051-CVGroup_Battle_Defense_1-1 = "どんな壁も、私たちを止められない！"
10051-CVGroup_Battle_In_1-1 = "応援を始めよう！"
10051-CVGroup_Battle_In_2-1 = "すべてを出し切り、燃やすんだ！"
10051-CVGroup_Battle_Move_1-1 = "次の舞台へ、移動しようか。"
10051-CVGroup_Battle_Move_2-1 = "今回の応援も伝わったみたいだね！"
10051-CVGroup_Battle_Recovery_1-1 = "支援、ありがとう。"
10051-CVGroup_Battle_TacticalAction_1-1 = "いかなる状況であろうと、応援は続く！"
10051-CVGroup_Battle_Victory_1-1 = "心のこもった応援は、皆に届くものだね。"
10051-CVGroup_Battle_Victory_2-1 = "情熱には、合理以上の価値がある。"
10051-CVGroup_CommonSkill-1 = "これが、私たちの情熱だ！"
10051-CVGroup_ExSkill_1-1 = "情熱をこめて！"
10051-CVGroup_ExSkill_2-1 = "フレー！フレー！"
10051-CVGroup_ExSkill_3-1 = "行け！そこだ！"
10051-CVGroup_ExSkill_Level_1-1 = "いち！に！さん！し！"
10051-CVGroup_ExSkill_Level_2-1 = "私たちの前に何が立ちはだかろうとも！"
10051-CVGroup_ExSkill_Level_3-1 = "もっと強く！もっと熱く！"
10051-CVGroup_Formation_In_1-1 = "どこからか情熱の香りがするね。"
10051-CVGroup_Formation_In_2-1 = "熱い情熱を持つのも、マイスターの心得の一つ。"
10051-CVGroup_Formation_Select-1 = "私の応援が必要かな？"
10051-CVGroup_Growup_1-1 = "ありがとう。\n先生の応援の気持ち、私にも伝わったよ。"
10051-CVGroup_Growup_2-1 = "情熱と成長か…\nマイスターにピッタリの言葉だね。"
10051-CVGroup_Growup_3-1 = "私はこれからも止まらないよ。\n先生も、一緒に来てくれるかい？"
10051-CVGroup_Growup_4-1 = "全部、先生のおかげだ。感謝するよ。"
10051-CVGroup_Relationship_Up_1-1 = "どんな応援にも……愛情の要素は欠かせない。\nそれを覚えていてくれ、先生。"
10051-CVGroup_Relationship_Up_2-1 = "今の私は応援団長。\n……だから、全力で先生を応援するよ。"
10051-CVGroup_Relationship_Up_3-1 = "人の心は……不思議だ。\n先生は、そこにいるだけで私の力になる。"
10051-CVGroup_Relationship_Up_4-1 = "先生には、生徒に秘められた情熱を引き出す才能があると思う。\n……少なくとも私はそう感じるよ。"
10051-CVGroup_Tactic_In_1-1 = "応援なら任せてくれ。"
10051-CVGroup_Tactic_In_2-1 = "雷ちゃん、セットアップ。"
10051-CVGroup_Tactic_Victory_1-1 = "これがミレニアムの……ロマンだ！"
10051-CVGroup_Tactic_Victory_2-1 = "これがミレニアムの力、そして情熱だよ。"
