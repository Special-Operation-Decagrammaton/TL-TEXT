[translation]
10051-CVGroup_Battle_Buffed_1-1 = "Agradeço pelo apoio, aceitarei com gratidão."
10051-CVGroup_Battle_Defense_1-1 = "Nenhum muro pode nos deter!"
10051-CVGroup_Battle_In_1-1 = "Vamos começar a torcida!"
10051-CVGroup_Battle_In_2-1 = "Dê tudo de si e queime de paixão!"
10051-CVGroup_Battle_Move_1-1 = "Vamos nos mover para o próximo palco."
10051-CVGroup_Battle_Move_2-1 = "Parece que nossa torcida chegou até eles desta vez também!"
10051-CVGroup_Battle_Recovery_1-1 = "Obrigada pelo suporte."
10051-CVGroup_Battle_TacticalAction_1-1 = "Não importa a situação, a torcida continua!"
10051-CVGroup_Battle_Victory_1-1 = "Uma torcida feita de coração sempre alcança a todos."
10051-CVGroup_Battle_Victory_2-1 = "A paixão tem um valor que vai além da lógica."
10051-CVGroup_CommonSkill-1 = "Esta é a nossa paixão!"
10051-CVGroup_ExSkill_1-1 = "Com toda a nossa paixão!"
10051-CVGroup_ExSkill_2-1 = "Rah! Rah!"
10051-CVGroup_ExSkill_3-1 = "Vá! É ali!"
10051-CVGroup_ExSkill_Level_1-1 = "Um! Dois! Três! Quatro!"
10051-CVGroup_ExSkill_Level_2-1 = "Não importa o que esteja no nosso caminho!"
10051-CVGroup_ExSkill_Level_3-1 = "Mais forte! Mais intenso!"
10051-CVGroup_Formation_In_1-1 = "Sinto um cheiro de paixão vindo de algum lugar."
10051-CVGroup_Formation_In_2-1 = "Ter uma paixão ardente também é um dos princípios de um Meister."
10051-CVGroup_Formation_Select-1 = "Precisa da minha torcida?"
10051-CVGroup_Growup_1-1 = "Obrigada.\nSenti o seu apoio, Sensei."
10051-CVGroup_Growup_2-1 = "Paixão e crescimento, hein...\nSão palavras perfeitas para um Meister."
10051-CVGroup_Growup_3-1 = "Eu não vou parar por aqui.\nVocê virá comigo, Sensei?"
10051-CVGroup_Growup_4-1 = "Tudo isso é graças a você, Sensei. Sou muito grata."
10051-CVGroup_Relationship_Up_1-1 = "Em qualquer tipo de torcida... o elemento do afeto é indispensável.\nLembre-se disso, Sensei."
10051-CVGroup_Relationship_Up_2-1 = "Agora eu sou a líder da torcida.\n...Por isso, vou torcer por você com todas as minhas forças, Sensei."
10051-CVGroup_Relationship_Up_3-1 = "O coração humano é... algo misterioso.\nSó de você estar aqui, Sensei, já me dá forças."
10051-CVGroup_Relationship_Up_4-1 = "Acho que você tem o talento de despertar a paixão escondida nos alunos, Sensei.\n...Pelo menos é o que eu sinto."
10051-CVGroup_Tactic_In_1-1 = "Pode deixar a torcida comigo."
10051-CVGroup_Tactic_In_2-1 = "Raichan, preparar."
10051-CVGroup_Tactic_Victory_1-1 = "Isso é o... romance de Millennium!"
10051-CVGroup_Tactic_Victory_2-1 = "Este é o poder de Millennium, e a nossa paixão."
