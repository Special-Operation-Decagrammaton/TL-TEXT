[translation]
20006-CVGroup_CommonSkill-1 = "これに耐えられるものなら耐えてみるのだ！"
20006-CVGroup_ExSkill_1-1 = "いやっほ～！"
20006-CVGroup_ExSkill_2-1 = "思いっきり楽しむのだ！"
20006-CVGroup_ExSkill_3-1 = "もっともっと早く！"
20006-CVGroup_ExSkill_Level_1-1 = "さあ、プレゼントなのだ！"
20006-CVGroup_ExSkill_Level_2-1 = "ふふ、これでもくらえ！"
20006-CVGroup_ExSkill_Level_3-1 = "くらうのだ！"
20006-CVGroup_Formation_In_1-1 = "ようやくぼく様の出番か！"
20006-CVGroup_Formation_In_2-1 = "ぼく様のカッコいい活躍、期待してると良いのだ！"
20006-CVGroup_Growup_1-1 = "こんなに強力なものを持ってくるとは……\n先生もなかなかやるのだ。"
20006-CVGroup_Growup_2-1 = "おお、これは……\nものすごく強くなった気分なのだ！"
20006-CVGroup_Growup_3-1 = "ふっふっふ、ぼく様は現在進行形で成長してるのだ！"
20006-CVGroup_Growup_4-1 = "これも新しい実験か？\nふむ、悪くない！"
20006-CVGroup_Relationship_Up_1-1 = "さすが先生なのだ！"
20006-CVGroup_Relationship_Up_2-1 = "うへへ……\nはっ！いやっ、ぼく様はこんな間抜けな笑い方はしない！\nうーはっはっはっ！"
20006-CVGroup_Relationship_Up_3-1 = "先生を見ているとこみ上げる、この複雑な気持ちは何なのだ……？\n本当に困った難題なのだ……。"
20006-CVGroup_Relationship_Up_4-1 = "チーズか先生かでどっちかを選べというなら……\nうーん、両方選べる方法はないのか？"
