[translation]
10145-CVGroup_Battle_Buffed_1-1 = "В следующий раз я тоже буду на вас рассчитывать."
10145-CVGroup_Battle_Covered_1-1 = "Думаю, мне стоит ненадолго укрыться."
10145-CVGroup_Battle_Defense_1-1 = "Мне всё ещё не хватает дисциплины."
10145-CVGroup_Battle_In_1-1 = "Обязательно выжгите этот мой летний образ в своей памяти, хорошо?"
10145-CVGroup_Battle_In_2-1 = "Если уж мы собрались отдыхать, то делать это нужно изо всех сил. Это ведь вполне естественно, не так ли?"
10145-CVGroup_Battle_Move_1-1 = "Переместимся в другое место?"
10145-CVGroup_Battle_Move_2-1 = "Куда теперь?"
10145-CVGroup_Battle_Recovery_1-1 = "Я благодарна вам."
10145-CVGroup_Battle_TacticalAction_1-1 = "Выдвигаемся?"
10145-CVGroup_Battle_Victory_1-1 = "Вы ведь смотрели на меня, Сенсей?\nНу же... ученица, которая усердно трудилась, заслуживает награды, верно?"
10145-CVGroup_Battle_Victory_2-1 = "Сбежать от жары время от времени — это прекрасно.\nЧто ж, Сенсей... вы свободны до конца дня?"
10145-CVGroup_CommonSkill-1 = " Как грубо."
10145-CVGroup_ExSkill_1-1 = "Ох...?\nАх...!?\nХа-а..."
10145-CVGroup_ExSkill_2-1 = "Боже мой...\nОй!?\nЭто... случайность..."
10145-CVGroup_ExSkill_3-1 = "Фуфу...\nЧто!?\n...А на дворе и правда лето."
10145-CVGroup_ExSkill_Level_1-1 = "Стало посвежее, но... ха-а."
10145-CVGroup_ExSkill_Level_2-1 = "Похоже, у нас незваный гость."
10145-CVGroup_ExSkill_Level_3-1 = "Подобное происшествие не испортит мне настроение."
10145-CVGroup_Formation_In_1-1 = "Боже правый...\nА ведь мне хотелось провести это время в покое."
10145-CVGroup_Formation_In_2-1 = "Хм, вы хотите провести время со мной?\nФуфу, вообще-то это с самого начала было моим намерением."
10145-CVGroup_Formation_Select-1 = "Ну как? Мне идёт?\nФуфу, можете не торопиться и рассмотреть как следует."
10145-CVGroup_Growup_1-1 = "Иметь завтрашний день — это такое счастье.\nДа, такое же чистое счастье, как отпуск."
10145-CVGroup_Growup_2-1 = "Именно потому, что всегда есть к чему стремиться, люди и растут.\nИ это замечательно."
10145-CVGroup_Growup_3-1 = "Благодаря тому, что вы приглядывали за мной...\nЯ смогла зайти так далеко. Моей благодарности нет предела."
10145-CVGroup_Growup_4-1 = "Кики, я выросла!\nФуфу, вы удивлены, Сенсей?\nЭто секрет только между нами двумя, идёт?"
10145-CVGroup_Relationship_Up_1-1 = "Молодая листва, тень и прохладный бриз... сколько же дней прошло с окончания весны?\nЛетние облака внезапно стали такими высокими.\nФуфу... вы понимаете, что это значит?"
10145-CVGroup_Relationship_Up_2-1 = "Говорят же, что внешний вид — это лишь самый верхний слой внутреннего мира?\nНужно одеваться подобающе времени и месту.\nФуфу... всё верно.\nИменно поэтому перед вами я предстала в таком виде."
10145-CVGroup_Relationship_Up_3-1 = "Говорят, если ты рядом с верным другом, то не стоит бояться, куда бы ты ни пошёл, верно?\nТак... не согласитесь ли вы остаться со мной, куда бы мы ни отправились? Сенсей."
10145-CVGroup_Relationship_Up_4-1 = "Кики говорит...\n«Я люблю тебя больше всех на свете, Сенсей!»\nФуфу. Ну не нужно делать такое лицо.\nВы ведь уже наверняка к этому привыкли, не так ли?"
10145-CVGroup_Tactic_In_1-1 = "Хм, давайте поищем дорогу."
10145-CVGroup_Tactic_In_2-1 = "Интересно, найдётся ли здесь хоть какая-то тень."
10145-CVGroup_Tactic_Victory_1-1 = "Ха-а... а я-то наивно полагала, что приехала сюда ради отпуска."
10145-CVGroup_Tactic_Victory_2-1 = "Вышло неплохое развлечение."