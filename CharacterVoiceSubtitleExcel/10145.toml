[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10145-CVGroup_Battle_Buffed_1-1 = "Conto com a sua ajuda de novo."
10145-CVGroup_Battle_Covered_1-1 = "Vou me esconder um pouquinho."
10145-CVGroup_Battle_Defense_1-1 = "Ainda lhes falta muito treino."
10145-CVGroup_Battle_In_1-1 = "Gravem a minha imagem de verão muito bem nas suas memórias."
10145-CVGroup_Battle_In_2-1 = "Se vamos brincar, que seja com tudo. Não é o óbvio?"
10145-CVGroup_Battle_Move_1-1 = "Vamos mudar de lugar."
10145-CVGroup_Battle_Move_2-1 = "Para onde vamos agora?"
10145-CVGroup_Battle_Recovery_1-1 = "Eu te agradeço."
10145-CVGroup_Battle_TacticalAction_1-1 = "É hora de nos movermos."
10145-CVGroup_Battle_Victory_1-1 = "Você estava observando, não estava? Sensei.\nVamos lá... Uma aluna dedicada merece uma recompensa, não concorda?"
10145-CVGroup_Battle_Victory_2-1 = "Fugir do calor de vez em quando também é bom.\nAgora, Sensei... Você tem algum plano pra depois daqui?"
10145-CVGroup_CommonSkill-1 = "Seus insolentes."
10145-CVGroup_ExSkill_1-1 = "Oh...?\nTsc...!?\nHah..."
10145-CVGroup_ExSkill_2-1 = "Ora...\nHyaah!?\nIsso foi um mero acidente..."
10145-CVGroup_ExSkill_3-1 = "Fufu...\nQuê!?\n...O verão não perdoa mesmo."
10145-CVGroup_ExSkill_Level_1-1 = "Realmente, o ar ficou mais fresco, mas... hah."
10145-CVGroup_ExSkill_Level_2-1 = "Parece que tivemos alguns mal-educados por aqui."
10145-CVGroup_ExSkill_Level_3-1 = "Não perderei a minha postura por tão pouco."
10145-CVGroup_Formation_In_1-1 = "Céus...\nEu só queria passar um tempo em paz."
10145-CVGroup_Formation_In_2-1 = "Umu, você quer passar um tempo comigo?\nFufu, eu já planejava isso desde o início."
10145-CVGroup_Formation_Select-1 = "O que achou? Ficou bom em mim?\nFufu, pode me olhar o quanto desejar."
10145-CVGroup_Growup_1-1 = "Saber que teremos um amanhã é algo a ser comemorado.\nSim, tanto quanto um período de férias."
10145-CVGroup_Growup_2-1 = "As pessoas só podem crescer quando possuem espaço e margem para isso.\nÉ uma coisa esplêndida."
10145-CVGroup_Growup_3-1 = "Porque você estava lá para me ver...\nEu pude chegar tão longe.\nNunca poderei te agradecer o suficiente."
10145-CVGroup_Growup_4-1 = "Kiki, crescendooo!\nFufu, te peguei de surpresa? Sensei.\nEsse é um segredinho só nosso, tá bom?"
10145-CVGroup_Relationship_Up_1-1 = "Novas folhas, sombras longas, e a brisa fresca... Já se foram os dias de primavera.\nAs nuvens de verão de repente se erguem como montanhas escarpadas.\nFufu... Você entende o significado deste poema?"
10145-CVGroup_Relationship_Up_2-1 = "Dizem que a nossa aparência é a camada mais exterior da nossa alma, não dizem?\nÉ por isso que devemos nos vestir de acordo com a ocasião.\nFufu... Pois é.\nE é exatamente por isso que estou usando isso na sua frente."
10145-CVGroup_Relationship_Up_3-1 = "Dizem que, ao lado de um amigo de toda uma vida, nenhum lugar no mundo causa temor.\nPortanto... Você não iria comigo a qualquer lugar? Sensei."
10145-CVGroup_Relationship_Up_4-1 = "Sabe de uma coisa, a Kiki...\nA Kiki ama o Sensei mais do que tudo no mundo!\nFufu. Não faça uma cara dessas.\nVocê já não deveria estar acostumado com isso?"
10145-CVGroup_Tactic_In_1-1 = "Umu, vamos procurar um caminho."
10145-CVGroup_Tactic_In_2-1 = "Será que não encontraremos a sombra de uma árvore?"
10145-CVGroup_Tactic_Victory_1-1 = "Hah... Eu achei que tínhamos vindo para tirar férias."
10145-CVGroup_Tactic_Victory_2-1 = "Foi um bom entretenimento."