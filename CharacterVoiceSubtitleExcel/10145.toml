[translation]
10145-CVGroup_Battle_Buffed_1-1 = "I'll be counting on you next time as well."
10145-CVGroup_Battle_Covered_1-1 = "I think I shall take cover for a moment."
10145-CVGroup_Battle_Defense_1-1 = "My discipline is lacking."
10145-CVGroup_Battle_In_1-1 = "Make sure to burn this summer version of me into your memory, alright?"
10145-CVGroup_Battle_In_2-1 = "If we're going to play, we do it with all our might. That's only natural, isn't it?"
10145-CVGroup_Battle_Move_1-1 = "Shall we move to another location?"
10145-CVGroup_Battle_Move_2-1 = "Where to next?"
10145-CVGroup_Battle_Recovery_1-1 = "I am grateful."
10145-CVGroup_Battle_TacticalAction_1-1 = "Shall we move?"
10145-CVGroup_Battle_Victory_1-1 = "You were watching, weren't you, Sensei?\nCome now... a student who worked hard deserves a reward, don't they?"
10145-CVGroup_Battle_Victory_2-1 = "Escaping the heat is nice once in a while.\nNow then, Sensei... are you free for the rest of the day?"
10145-CVGroup_CommonSkill-1 = "How rude."
10145-CVGroup_ExSkill_1-1 = "Oh...?\nAh...!?\nHaa..."
10145-CVGroup_ExSkill_2-1 = "My, my...\nEek!?\nThis is... an accident..."
10145-CVGroup_ExSkill_3-1 = "Fufu...\nWhat!?\n...It really is summer, isn't it."
10145-CVGroup_ExSkill_Level_1-1 = "It certainly has cooled down, but... haa."
10145-CVGroup_ExSkill_Level_2-1 = "It seems there was an intruder."
10145-CVGroup_ExSkill_Level_3-1 = "I won't be put in a bad mood by something like this."
10145-CVGroup_Formation_In_1-1 = "Good grief...\nI wanted to spend this time peacefully."
10145-CVGroup_Formation_In_2-1 = "Hmm, do you wish to spend time with me?\nFufu, that was my intention from the start, you know?"
10145-CVGroup_Formation_Select-1 = "How is it? Does it suit me?\nFufu, feel free to take your time and look."
10145-CVGroup_Growup_1-1 = "It is a joyous thing to have a tomorrow.\nYes, just as joyous as a vacation."
10145-CVGroup_Growup_2-1 = "It is precisely because there is room for improvement that people can grow.\nThat is a good thing."
10145-CVGroup_Growup_3-1 = "Because you were watching over me...\nI was able to come this far.\nI cannot thank you enough."
10145-CVGroup_Growup_4-1 = "Kiki, I've grown!\nFufu, were you surprised, Sensei?\nThis is a secret between just the two of us, okay?"
10145-CVGroup_Relationship_Up_1-1 = "New leaves, shade, and cool breezes... how many days since spring has passed?\nThe summer clouds are suddenly so towering.\nFufu... do you understand the meaning of this?"
10145-CVGroup_Relationship_Up_2-1 = "They say that one's appearance is the outermost layer of one's inner self, don't they?\nOne must dress appropriately for the time and place.\nFufu... that's right.\nThat is why I am wearing this in front of you."
10145-CVGroup_Relationship_Up_3-1 = "They say that if you are with a lifelong friend, you need not fear wherever you go, right?\nSo... won't you stay with me, wherever we may go? Sensei."
10145-CVGroup_Relationship_Up_4-1 = "Kiki says...\nI love you more than anyone in the world, Sensei!\nFufu. Don't make such a face.\nYou're getting used to it by now, aren't you?"
10145-CVGroup_Tactic_In_1-1 = "Hmm, let's go find our way."
10145-CVGroup_Tactic_In_2-1 = "I wonder if there's any shade."
10145-CVGroup_Tactic_Victory_1-1 = "Haa... and I thought I came here for a vacation."
10145-CVGroup_Tactic_Victory_2-1 = "That was a fine diversion."