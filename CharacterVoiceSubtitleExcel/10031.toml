[translation]
10031-CVGroup_Battle_Buffed_1-1 = "ふふっ、助かるわ。"
10031-CVGroup_Battle_Covered_1-1 = "安全を確保したわ。"
10031-CVGroup_Battle_Defense_1-1 = "ふふ、無駄よ？"
10031-CVGroup_Battle_In_1-1 = "勇猛精進……さぁ、始めるわよ！"
10031-CVGroup_Battle_In_2-1 = "さあ、今年も仕事始めと行きましょうか！"
10031-CVGroup_Battle_Move_1-1 = "ほら、ぐずぐずしてる時間は無いわよ。"
10031-CVGroup_Battle_Move_2-1 = "次、行くわよ！"
10031-CVGroup_Battle_Recovery_1-1 = "ふふっ、感謝するわ。"
10031-CVGroup_Battle_TacticalAction_1-1 = "移動するわ。"
10031-CVGroup_Battle_Victory_1-1 = "今年の運勢は、見るまでもなく大吉みたいね。"
10031-CVGroup_Battle_Victory_2-1 = "今年も立ち上がりから完璧ね。"
10031-CVGroup_CommonSkill-1 = "ふふっ！"
10031-CVGroup_ExSkill_1-1 = "見てなさい、私の実力……\nえ？あっ、ああっ！？"
10031-CVGroup_ExSkill_2-1 = "しっかりと見てなさい……\nあ、あれ？えぇっ！？"
10031-CVGroup_ExSkill_3-1 = "これぐらい朝飯前……\nあっ！ちょっ、まっ……！"
10031-CVGroup_ExSkill_Level_1-1 = "こっ、のっ……せぃっ！！"
10031-CVGroup_ExSkill_Level_2-1 = "わっ、ちょっ……チェストぉ！"
10031-CVGroup_ExSkill_Level_3-1 = "やっ、とっ……とぉっ！？"
10031-CVGroup_Formation_In_1-1 = "ふふっ、見る目あるじゃない。"
10031-CVGroup_Formation_In_2-1 = "その依頼、受けてあげるわ。"
10031-CVGroup_Formation_Select-1 = "こっ、この着物高いんだから！\n扱いには気を付けなさいよ！？"
10031-CVGroup_Growup_1-1 = "さすがは私、まだまだ成長の余地があるということね。"
10031-CVGroup_Growup_2-1 = "ふふっ、私の真価がますます発揮されつつあるわね。"
10031-CVGroup_Growup_3-1 = "ふ、ふふっ。\n私のすごさ、ようやく分かったかしら？"
10031-CVGroup_Growup_4-1 = "ふふっ、こうしてどんどん強くなる私のこと……\nもっともっと頼っても良いのよ、先生？"
10031-CVGroup_Relationship_Up_1-1 = "先生と私、なかなか良いパートナーだと思わない？"
10031-CVGroup_Relationship_Up_2-1 = "ふふん、喜びなさい。\nこれからも、ずっと一緒にいてあげるわ。"
10031-CVGroup_Relationship_Up_3-1 = "先生は、私にとってもう単なる依頼人じゃなくて……\nそ、その……そう、VIPなのよ！"
10031-CVGroup_Relationship_Up_4-1 = "いつの間にか先生と、こんなところまで来ていたなんて……\n今年はもちろん、来年も……よろしく頼むわね、先生。"
10031-CVGroup_Tactic_In_1-1 = "私のようなリーダーに、相応しい仕事ね。"
10031-CVGroup_Tactic_In_2-1 = "その信頼に、応えてあげるわ。"
10031-CVGroup_Tactic_Victory_1-1 = "ふふ、当然の結果ね。"
10031-CVGroup_Tactic_Victory_2-1 = "どう、これが格の違いってやつよ！"
