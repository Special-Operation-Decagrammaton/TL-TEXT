[translation]
10031-CVGroup_Battle_Buffed_1-1 = "Fufu, isso ajuda."
10031-CVGroup_Battle_Covered_1-1 = "Segurança garantida."
10031-CVGroup_Battle_Defense_1-1 = "Fufu, é inútil, sabia?"
10031-CVGroup_Battle_In_1-1 = "Diligência e bravura... Vamos começar!"
10031-CVGroup_Battle_In_2-1 = "Muito bem, vamos começar o trabalho deste ano!"
10031-CVGroup_Battle_Move_1-1 = "Ei, não temos tempo a perder."
10031-CVGroup_Battle_Move_2-1 = "Próximo, vamos lá!"
10031-CVGroup_Battle_Recovery_1-1 = "Fufu, agradeço."
10031-CVGroup_Battle_TacticalAction_1-1 = "Vou me mover."
10031-CVGroup_Battle_Victory_1-1 = "A sorte deste ano parece ser excelente, nem preciso consultar."
10031-CVGroup_Battle_Victory_2-1 = "Começamos o ano com perfeição novamente."
10031-CVGroup_CommonSkill-1 = "Fufu!"
10031-CVGroup_ExSkill_1-1 = "Observe minha verdadeira habilidade...\nHã? Ah, aaah!?"
10031-CVGroup_ExSkill_2-1 = "Observe com atenção...\nAh, o quê? Eeh!?"
10031-CVGroup_ExSkill_3-1 = "Isso é moleza para mim...\nAh! Espere, não...!"
10031-CVGroup_ExSkill_Level_1-1 = "D-droga... toma essa!"
10031-CVGroup_ExSkill_Level_2-1 = "Uau, espere... Chesto!"
10031-CVGroup_ExSkill_Level_3-1 = "Ei, espere... o quê!?"
10031-CVGroup_Formation_In_1-1 = "Fufu, você tem bom olho."
10031-CVGroup_Formation_In_2-1 = "Eu aceitarei esse pedido."
10031-CVGroup_Formation_Select-1 = "E-esse quimono é caro, então trate-o com cuidado, entendeu!?"
10031-CVGroup_Growup_1-1 = "Como esperado de mim, ainda tenho muito espaço para crescer."
10031-CVGroup_Growup_2-1 = "Fufu, meu verdadeiro valor está sendo demonstrado cada vez mais."
10031-CVGroup_Growup_3-1 = "Fu, fufu. Finalmente percebeu o quão incrível eu sou?"
10031-CVGroup_Growup_4-1 = "Fufu, já que estou ficando cada vez mais forte assim... Você pode contar comigo ainda mais, Sensei."
10031-CVGroup_Relationship_Up_1-1 = "Não acha que eu e você formamos uma ótima dupla, Sensei?"
10031-CVGroup_Relationship_Up_2-1 = "Fufun, sinta-se honrado. Vou continuar ao seu lado para sempre."
10031-CVGroup_Relationship_Up_3-1 = "Para mim, você não é mais apenas um cliente, Sensei... E-é... isso, você é um VIP!"
10031-CVGroup_Relationship_Up_4-1 = "Nem percebi que tínhamos chegado tão longe, Sensei... Este ano, e no próximo também... conto com você."
10031-CVGroup_Tactic_In_1-1 = "Um trabalho digno de uma líder como eu."
10031-CVGroup_Tactic_In_2-1 = "Vou retribuir essa confiança."
10031-CVGroup_Tactic_Victory_1-1 = "Fufu, um resultado esperado."
10031-CVGroup_Tactic_Victory_2-1 = "O que achou? Isso é o que chamamos de diferença de classe!"
