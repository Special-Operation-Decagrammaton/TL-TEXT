16020-CVGroup_Formation_Select-1 = "О, а ты на удивление сильный, да?\nАхаха, в таком случае, не против, если я на тебя облокочусь?"
16020-CVGroup_Growup_1-1 = "Ладненько, начнём особую тренировку!"
