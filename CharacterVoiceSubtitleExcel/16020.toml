[translation]
16020-CVGroup_Battle_Buffed_1-1 = "なんか力が湧いてきた～！"
16020-CVGroup_Battle_Covered_1-1 = "遮蔽中。援護は任せたよ！"
16020-CVGroup_Battle_Defense_1-1 = "大丈夫。弾き飛ばした。"
16020-CVGroup_Battle_In_1-1 = "FOX4、進入。"
16020-CVGroup_Battle_In_2-1 = "みんな、頑張ろっか。"
16020-CVGroup_Battle_Move_1-1 = "次のポイントへ。"
16020-CVGroup_Battle_Move_2-1 = "移動開始。"
16020-CVGroup_Battle_Recovery_1-1 = "助かった～ありがと！"
16020-CVGroup_Battle_TacticalAction_1-1 = "位置がバレたかも。"
16020-CVGroup_Battle_Victory_1-1 = "FOX4、任務完了！"
16020-CVGroup_Battle_Victory_2-1 = "FOX小隊の勝利！いぇい♪"
16020-CVGroup_CommonSkill-1 = "ヒット。"
16020-CVGroup_ExSkill_1-1 = "距離、3500ヤード――風、東北東から15ノット……。"
16020-CVGroup_ExSkill_2-1 = "この魔弾から逃れられるかな？"
16020-CVGroup_ExSkill_3-1 = "この一発で……決める！"
16020-CVGroup_ExSkill_Level_1-1 = "偵察ドローン、展開。"
16020-CVGroup_ExSkill_Level_2-1 = "みーつけた♪"
16020-CVGroup_ExSkill_Level_3-1 = "HEIAP弾に切り替えるよ。"
16020-CVGroup_Formation_In_1-1 = "FOX4、準備できてるよ！"
16020-CVGroup_Formation_In_2-1 = "ふわぁ……もうそんな時間？"
16020-CVGroup_Formation_Select-1 = "お、意外と力持ちなんだ？\nあははっ、それじゃあ寄りかかってもいいかな？"
16020-CVGroup_Growup_1-1 = "それじゃ、特別訓練を始めよっか！"
16020-CVGroup_Growup_2-1 = "手伝ってくれてありがと。\nやっぱ先生は頼りになるなぁ。"
16020-CVGroup_Growup_3-1 = "今日は調子いいかも。\n成長を実感できる？って感じ。"
16020-CVGroup_Growup_4-1 = "はぁ……後輩にカッコ悪いとこは見せらんないよね。"
16020-CVGroup_Relationship_Up_1-1 = "あははっ。やっぱ変な大人。"
16020-CVGroup_Relationship_Up_2-1 = "SRT特殊学園が復活するその日まで、よろしくね、先生。"
16020-CVGroup_Relationship_Up_3-1 = "呼ばれたらいつでも駆けつけるよ！\nだから……その……。\n先生も、私が声かけたら、すぐ応答してよ？約束！"
16020-CVGroup_Relationship_Up_4-1 = "あなたのハートを狙い撃ち！\n……なんちゃって。あははっ！\n言ってみたかったんだ、こういうセリフ。\nべ、別に深い意味なんてないよ？"
16020-CVGroup_Tactic_In_1-1 = "敵配置確認っと……ターゲットはどれかな？"
16020-CVGroup_Tactic_In_2-1 = "ちょっ……私が先頭なの？"
16020-CVGroup_Tactic_Victory_1-1 = "チョロイチョロイ♪"
16020-CVGroup_Tactic_Victory_2-1 = "さっさと帰ろ～っと。\nお腹ペコペコだよ。"
