16020-CVGroup_Relationship_Up_4-1 = "Целюсь прямо в твоё сердце!\n...Да шучу я! Ахаха!\nВсегда хотелось сказать такую реплику.\nЭ-это же не значит ничего такого глубокого, ясно?"
