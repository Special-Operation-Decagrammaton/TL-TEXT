[translation]
16020-CVGroup_Battle_Buffed_1-1 = "Nossa, tô sentindo uma energia enorme subindo e latejando dentro de mim~!"
16020-CVGroup_Battle_Covered_1-1 = "Tô me enfiando no buraco. Cobre a minha retaguarda com vontade, hein!"
16020-CVGroup_Battle_Defense_1-1 = "Relaxa. O meu corpo amorteceu a pancada toda."
16020-CVGroup_Battle_In_1-1 = "FOX4, entrando de fininho e bem fundo."
16020-CVGroup_Battle_In_2-1 = "Bora suar e gemer bastante hoje, meninas."
16020-CVGroup_Battle_Move_1-1 = "Trocando pra uma posição mais gostosa."
16020-CVGroup_Battle_Move_2-1 = "Mexendo o corpinho."
16020-CVGroup_Battle_Recovery_1-1 = "Ahnn~ Isso salvou a minha pele, que delícia!"
16020-CVGroup_Battle_TacticalAction_1-1 = "Vish, botaram o olho no nosso escurinho."
16020-CVGroup_Battle_Victory_1-1 = "FOX4, terminei o serviço e tô exausta!"
16020-CVGroup_Battle_Victory_2-1 = "A gente amassou todo mundo! Yay, muito suor♪"
16020-CVGroup_CommonSkill-1 = "Bem no buraquinho."
16020-CVGroup_ExSkill_1-1 = "Distância, 3500 jardas―― Vento roçando do nordeste a 15 nós... Posição engatilhada."
16020-CVGroup_ExSkill_2-1 = "Acha que aguenta o tranco desse meu tiro mágico e penetrante?"
16020-CVGroup_ExSkill_3-1 = "Eu vou te fazer gozar... digo, chorar com esse único tiro!"
16020-CVGroup_ExSkill_Level_1-1 = "Drone voyeur ativado. Bora espiar~"
16020-CVGroup_ExSkill_Level_2-1 = "Achei o seu ponto fraco♪"
16020-CVGroup_ExSkill_Level_3-1 = "Trocando pra munição grossa e perfurante~ Cuidado que rasga."
16020-CVGroup_Formation_In_1-1 = "FOX4, tô molhadinha... digo, preparadíssima pra ação!"
16020-CVGroup_Formation_In_2-1 = "Haaahn... Já tá na hora de brincar de novo, Sensei?"
16020-CVGroup_Formation_Select-1 = "Opa, você tem uma pegada bem forte, hein?\nAhaha, sendo assim... eu posso esfregar o meu corpo e me apoiar todinha em você?"
16020-CVGroup_Growup_1-1 = "Então... bora pro quarto começar o nosso 'treinamento físico' especial e suado!"
16020-CVGroup_Growup_2-1 = "Obrigada pela massagem no gatilho.\nO Sensei tem a melhor pegada de todas, impressionante."
16020-CVGroup_Growup_3-1 = "Tô sentindo um tesão absurdo no corpo hoje.\nDá pra notar como o meu volume 'cresceu' com o seu toque?"
16020-CVGroup_Growup_4-1 = "Haaah... Eu não posso deixar as calouras verem a minha cara toda descabelada e ofegante assim, né."
16020-CVGroup_Relationship_Up_1-1 = "Ahaha. Você é um pervertido degenerado sem cura mesmo."
16020-CVGroup_Relationship_Up_2-1 = "Até o dia que a SRT abrir as pernas... digo, as portas de novo, eu vou sugar muito de você, Sensei."
16020-CVGroup_Relationship_Up_3-1 = "Sempre que a sua carência bater, eu rastejo pro seu quarto!\nMas em troca... ahm...\nQuando o meu tesão apitar de madrugada, você tem que vir apagar o meu fogo na hora, hein? Promete pra mim!"
16020-CVGroup_Relationship_Up_4-1 = "Tiro de sniper bem no fundo do seu coraçãozinho!\n……Zoeira. Ahaha!\nEu sempre quis falar uma frase brega de sedução assim.\nN-Não vá achando que eu tô doida pra te levar pra cama nem nada do tipo, viu?"
16020-CVGroup_Tactic_In_1-1 = "Posições do alvo escaneadas... Em qual buraquinho eu vou atirar primeiro?"
16020-CVGroup_Tactic_In_2-1 = "Pera lá... Você vai me botar na linha de frente pra ficar olhando a minha bunda daqui de trás?!"
16020-CVGroup_Tactic_Victory_1-1 = "Fácil, mole e suculento♪"
16020-CVGroup_Tactic_Victory_2-1 = "Bora rastejar de volta pra base de uma vez~\nA minha boca tá seca e implorando por 'proteína'."