[translation]
10055-CVGroup_Battle_Buffed_1-1 = "Depois eu te agradeço."
10055-CVGroup_Battle_Covered_1-1 = "Aqui parece bom."
10055-CVGroup_Battle_Defense_1-1 = "Isso não funciona em mim."
10055-CVGroup_Battle_In_1-1 = "Opa, parece que começou."
10055-CVGroup_Battle_In_2-1 = "Ah, então vamos nessa."
10055-CVGroup_Battle_Move_1-1 = "Vamos para a próxima."
10055-CVGroup_Battle_Move_2-1 = "Ainda tinha mais?"
10055-CVGroup_Battle_Recovery_1-1 = "Oh, obrigado."
10055-CVGroup_Battle_TacticalAction_1-1 = "Opa."
10055-CVGroup_Battle_Victory_1-1 = "Que tal uma bebida para comemorar...\nTá bom, tá bom, entendi."
10055-CVGroup_Battle_Victory_2-1 = "Já que nos esforçamos, uma bebida...\n...É brincadeira."
10055-CVGroup_CommonSkill-1 = "Aqui, isso vai te aquecer."
10055-CVGroup_ExSkill_1-1 = "Fui descoberta?"
10055-CVGroup_ExSkill_2-1 = "Se fui descoberta, não tem jeito."
10055-CVGroup_ExSkill_3-1 = "Está curioso sobre este frasco?"
10055-CVGroup_ExSkill_Level_1-1 = "Ainda não fermentou, mas garanto o sabor."
10055-CVGroup_ExSkill_Level_2-1 = "Este aqui é um pouco apimentado."
10055-CVGroup_ExSkill_Level_3-1 = "Mais um copo, por favor!"
10055-CVGroup_Formation_In_1-1 = "Hm? Eu sirvo?"
10055-CVGroup_Formation_In_2-1 = "Vou tentar o meu melhor por enquanto."
10055-CVGroup_Formation_Select-1 = "Hmm, então é disso que você gosta?"
10055-CVGroup_Growup_1-1 = "Obrigada, Sensei.\nComo agradecimento, algo... hmm, acho que seria melhor se estivesse fermentado."
10055-CVGroup_Growup_2-1 = "Sinto muito por estar sempre recebendo coisas.\nEu também queria retribuir."
10055-CVGroup_Growup_3-1 = "Tudo isso... posso aceitar?\nEstou feliz... mas."
10055-CVGroup_Growup_4-1 = "Por tudo o que recebi, vou me esforçar pelo Sensei."
10055-CVGroup_Relationship_Up_1-1 = "Não é que eu não goste, mas...\nTalvez seja um sentimento que não combine muito comigo."
10055-CVGroup_Relationship_Up_2-1 = "Sempre sou grata ao Sensei por me aceitar como sou."
10055-CVGroup_Relationship_Up_3-1 = "Estou me sentindo um pouco bem.\nNão conte para a Nodoka."
10055-CVGroup_Relationship_Up_4-1 = "Que tal conversarmos enquanto bebemos algo da próxima vez?\n...Água também serve."
10055-CVGroup_Tactic_In_1-1 = "Muito bem... vamos animar as coisas."
10055-CVGroup_Tactic_In_2-1 = "Temos uma montanha de coisas para fazer."
10055-CVGroup_Tactic_Victory_1-1 = "Para uma encrenqueira de Red Winter, não foi um bom trabalho?"
10055-CVGroup_Tactic_Victory_2-1 = "Posso brindar à vitória?"
