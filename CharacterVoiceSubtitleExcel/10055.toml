[translation]
10055-CVGroup_Battle_Buffed_1-1 = "後でお礼するね。"
10055-CVGroup_Battle_Covered_1-1 = "ここ、よさそう。"
10055-CVGroup_Battle_Defense_1-1 = "効かないよ。"
10055-CVGroup_Battle_In_1-1 = "おっと、始まったみたいだね。"
10055-CVGroup_Battle_In_2-1 = "あっ、じゃあ行ってみよっか。"
10055-CVGroup_Battle_Move_1-1 = "次いこっか。"
10055-CVGroup_Battle_Move_2-1 = "まだあったんだ。"
10055-CVGroup_Battle_Recovery_1-1 = "お、ありがとう。"
10055-CVGroup_Battle_TacticalAction_1-1 = "よっと。"
10055-CVGroup_Battle_Victory_1-1 = "お祝いということで一杯……\nわかった、わかったって。"
10055-CVGroup_Battle_Victory_2-1 = "頑張ったことだし一杯……\n……冗談だって。"
10055-CVGroup_CommonSkill-1 = "はい、身体が温まるよ。"
10055-CVGroup_ExSkill_1-1 = "バレちゃったか。"
10055-CVGroup_ExSkill_2-1 = "バレたなら仕方ない。"
10055-CVGroup_ExSkill_3-1 = "このフラスコが気になる？"
10055-CVGroup_ExSkill_Level_1-1 = "発酵はまだだけど、味は保証するよ。"
10055-CVGroup_ExSkill_Level_2-1 = "これはちょっとスパイシーなやつだよ。"
10055-CVGroup_ExSkill_Level_3-1 = "もう一杯、どうぞ！"
10055-CVGroup_Formation_In_1-1 = "ん？私でいいの？"
10055-CVGroup_Formation_In_2-1 = "とりあえず頑張ってみるね。"
10055-CVGroup_Formation_Select-1 = "ふーん、こういうのが好きなんだ？"
10055-CVGroup_Growup_1-1 = "ありがとう、先生。\nお礼に何か……うーん、やっぱ発酵させたほうがいいかな。"
10055-CVGroup_Growup_2-1 = "いつも貰ってばかりで悪いね。\n私も何かお返ししたいな。"
10055-CVGroup_Growup_3-1 = "こんなに……いいの？\n嬉しい……けど。"
10055-CVGroup_Growup_4-1 = "色々もらった分、先生のために頑張るよ。"
10055-CVGroup_Relationship_Up_1-1 = "嫌なわけじゃないけど……\n私にはあまり似合わない感情かも。"
10055-CVGroup_Relationship_Up_2-1 = "こんな私を受け止めてくれる先生にはいつも感謝してるよ。"
10055-CVGroup_Relationship_Up_3-1 = "なんだかちょっといい気分。\nノドカには内緒だよ。"
10055-CVGroup_Relationship_Up_4-1 = "今度、飲みながら話でもどうかな？\n……水でも構わないよ。"
10055-CVGroup_Tactic_In_1-1 = "さてと……元気出していこうか。"
10055-CVGroup_Tactic_In_2-1 = "やることが山積みだね。"
10055-CVGroup_Tactic_Victory_1-1 = "レッドウィンターの問題児にしては上出来じゃない？"
10055-CVGroup_Tactic_Victory_2-1 = "勝利の祝杯を上げてもいいかな？"
