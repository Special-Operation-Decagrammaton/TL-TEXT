[translation]
10085-CVGroup_Battle_Buffed_1-1 = "Boa ideia."
10085-CVGroup_Battle_Covered_1-1 = "Firewall, estabelecido."
10085-CVGroup_Battle_Defense_1-1 = "Medidas de segurança em dia."
10085-CVGroup_Battle_In_1-1 = "Vamos fazer isso agora...?"
10085-CVGroup_Battle_In_2-1 = "Cafeína... preciso de cafeína..."
10085-CVGroup_Battle_Move_1-1 = "Certo, estou indo..."
10085-CVGroup_Battle_Move_2-1 = "Vou na frente."
10085-CVGroup_Battle_Recovery_1-1 = "Ah... obrigada."
10085-CVGroup_Battle_TacticalAction_1-1 = "...Hã? Já vamos?"
10085-CVGroup_Battle_Victory_1-1 = "A-acabou?\nJá posso ir para casa?"
10085-CVGroup_Battle_Victory_2-1 = "B-bom trabalho... \nBem, vou indo nessa..."
10085-CVGroup_CommonSkill-1 = "Ufa... isso aquece..."
10085-CVGroup_ExSkill_1-1 = "Ugh, que frio..."
10085-CVGroup_ExSkill_2-1 = "Acampar com um tempo desses..."
10085-CVGroup_ExSkill_3-1 = "Será que já assou...?"
10085-CVGroup_ExSkill_Level_1-1 = "Quer um pouco de batata-doce assada?"
10085-CVGroup_ExSkill_Level_2-1 = "Cuidado, está quente."
10085-CVGroup_ExSkill_Level_3-1 = "Ufa... aqui, pode pegar."
10085-CVGroup_Formation_In_1-1 = "Se é um pedido do Sensei..."
10085-CVGroup_Formation_In_2-1 = "Ugh... eu realmente preciso sair...?"
10085-CVGroup_Formation_Select-1 = "Ufa... sinto que voltei à vida..."
10085-CVGroup_Growup_1-1 = "Isso... talvez até os hackers do fórum fiquem surpresos."
10085-CVGroup_Growup_2-1 = "Essas informações podem ser úteis em ambientes externos."
10085-CVGroup_Growup_3-1 = "Obrigada, Sensei.\nDa próxima vez, mostrarei um desempenho ainda melhor."
10085-CVGroup_Growup_4-1 = "Sim, é uma ideia interessante.\nAprendi bastante."
10085-CVGroup_Relationship_Up_1-1 = "O caminho da verdade não tem fim, não importa o quanto você caminhe.\n...Talvez seja um pouco parecido com o coração humano."
10085-CVGroup_Relationship_Up_2-1 = "Sensei, quer jogar videogame comigo no próximo feriado?"
10085-CVGroup_Relationship_Up_3-1 = "Sabe, olhar para uma montanha enorme me faz lembrar de você, Sensei.\nComo uma paisagem que nunca muda...\nVocê vai ficar sempre por perto, não vai?"
10085-CVGroup_Relationship_Up_4-1 = "Eu não gosto de escalar montanhas, mas...\nSe for com você, Sensei, talvez não seja tão ruim."
10085-CVGroup_Tactic_In_1-1 = "...Hã? Eu vou na frente?"
10085-CVGroup_Tactic_In_2-1 = "Onde estou... quem sou eu..."
10085-CVGroup_Tactic_Victory_1-1 = "Já posso... ir para casa... né?"
10085-CVGroup_Tactic_Victory_2-1 = "Estou exausta... não consigo mais me mover..."
