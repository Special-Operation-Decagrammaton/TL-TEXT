[translation]
10085-CVGroup_Battle_Buffed_1-1 = "ナイスアイデア。"
10085-CVGroup_Battle_Covered_1-1 = "ファイヤーウォール、構築。"
10085-CVGroup_Battle_Defense_1-1 = "セキュリティ対策は万全。"
10085-CVGroup_Battle_In_1-1 = "今からやるの……？"
10085-CVGroup_Battle_In_2-1 = "カフェイン……カフェインが足りない……。"
10085-CVGroup_Battle_Move_1-1 = "じゃあ、行くね……。"
10085-CVGroup_Battle_Move_2-1 = "先に行く。"
10085-CVGroup_Battle_Recovery_1-1 = "あっ……ありがとう。"
10085-CVGroup_Battle_TacticalAction_1-1 = "……え？もう行くの？"
10085-CVGroup_Battle_Victory_1-1 = "お、終わった？\nもう帰っていい？"
10085-CVGroup_Battle_Victory_2-1 = "お、お疲れ～……\nじゃあ、私はこれで……。"
10085-CVGroup_CommonSkill-1 = "ふう……温まる……。"
10085-CVGroup_ExSkill_1-1 = "うう、寒い……。"
10085-CVGroup_ExSkill_2-1 = "こんな天気にキャンプって……。"
10085-CVGroup_ExSkill_3-1 = "焼けたかな……？"
10085-CVGroup_ExSkill_Level_1-1 = "焼き芋、食べる？"
10085-CVGroup_ExSkill_Level_2-1 = "熱いから、気をつけてね。"
10085-CVGroup_ExSkill_Level_3-1 = "ふ―……はい、どうぞ。"
10085-CVGroup_Formation_In_1-1 = "先生の頼みなら……。"
10085-CVGroup_Formation_In_2-1 = "うう……外に出ないとダメなの……？"
10085-CVGroup_Formation_Select-1 = "ふう……生き返る……。"
10085-CVGroup_Growup_1-1 = "これは……フォーラムのハッカーもビックリするかも。"
10085-CVGroup_Growup_2-1 = "いまの情報、野外環境で使えそう。"
10085-CVGroup_Growup_3-1 = "ありがとう、先生。\n次はもっと良い姿を見せるね。"
10085-CVGroup_Growup_4-1 = "うん、面白い発想だね。\n勉強になったよ。"
10085-CVGroup_Relationship_Up_1-1 = "真理の道は、いくら歩いても果てがみえないね。\n……人の心にちょっと似てるかも。"
10085-CVGroup_Relationship_Up_2-1 = "先生、次の休日、一緒にゲームしない？"
10085-CVGroup_Relationship_Up_3-1 = "なんか、大きな山を見てると先生の姿が浮かぶようになったかも。\n変わらない景色みたいに……\n先生もずっとそこにいてくれるよね？"
10085-CVGroup_Relationship_Up_4-1 = "山登りは好きじゃないけど……\n先生と二人でなら、アリかも。"
10085-CVGroup_Tactic_In_1-1 = "……うん？私が先頭なの？"
10085-CVGroup_Tactic_In_2-1 = "ここはどこ……私はだれ……。"
10085-CVGroup_Tactic_Victory_1-1 = "もう帰っても……いい……よね？"
10085-CVGroup_Tactic_Victory_2-1 = "疲れた……もう動けない……。"
