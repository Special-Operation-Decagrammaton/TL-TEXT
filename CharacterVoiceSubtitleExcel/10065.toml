[translation]
10065-CVGroup_Battle_Buffed_1-1 = "ご支援、ありがとうございます。"
10065-CVGroup_Battle_Covered_1-1 = "呼吸を整えて……。"
10065-CVGroup_Battle_Defense_1-1 = "効きませんよ。"
10065-CVGroup_Battle_In_1-1 = "皆さん、ついてきてください。"
10065-CVGroup_Battle_In_2-1 = "怪我のないよう、注意して参りましょう。"
10065-CVGroup_Battle_Move_1-1 = "さぁ、次に行きましょうか？"
10065-CVGroup_Battle_Move_2-1 = "皆さん、行きますよ。"
10065-CVGroup_Battle_Recovery_1-1 = "助かりました。\nありがとうございます。"
10065-CVGroup_Battle_TacticalAction_1-1 = "参りましょう。"
10065-CVGroup_Battle_Victory_1-1 = "ふふっ、これが陰陽部の底力です。"
10065-CVGroup_Battle_Victory_2-1 = "ふふ、少しでも百鬼夜行の宣伝になったのなら良いのですが。"
10065-CVGroup_CommonSkill-1 = "心を落ち着けて……。\n参りましょう。"
10065-CVGroup_ExSkill_1-1 = "わっ！？\n空から……これは……？"
10065-CVGroup_ExSkill_2-1 = "これは……伝説の……！？"
10065-CVGroup_ExSkill_3-1 = "こ、これはっ！\nチセちゃんっ！？"
10065-CVGroup_ExSkill_Level_1-1 = "落とすわけには、いきません！"
10065-CVGroup_ExSkill_Level_2-1 = "すべて回収します！"
10065-CVGroup_ExSkill_Level_3-1 = "チセちゃんっ！待って！！"
10065-CVGroup_Formation_In_1-1 = "はい、なんなりと。"
10065-CVGroup_Formation_In_2-1 = "桑上カホ、参ります。"
10065-CVGroup_Formation_Select-1 = "？何かご用でしょうか？"
10065-CVGroup_Growup_1-1 = "ありがとうございます、先生。\nお陰さまで成長する事ができました。"
10065-CVGroup_Growup_2-1 = "成長を実感できるのは、なかなか嬉しいものですね。"
10065-CVGroup_Growup_3-1 = "先生のおかげで、また強くなれました。\nこの力でもっと、皆さんのお役に立ちたいです。"
10065-CVGroup_Growup_4-1 = "更に成長できたみたいです。\nこんな私でもお力になれるのなら、嬉しい限りです。"
10065-CVGroup_Relationship_Up_1-1 = "こんなに胸が高鳴るなんて……\nその……初めての、感覚……です。"
10065-CVGroup_Relationship_Up_2-1 = "共に過ごす時間が長くなればなるほど、心の距離も縮まるのですね……\n……なるほど。"
10065-CVGroup_Relationship_Up_3-1 = "少し、身体が熱くなってきて……。\nこれは……いえ、もしかして……うっ。"
10065-CVGroup_Relationship_Up_4-1 = "誰かに見守られる立場というのは、初めてです……\nこんなにも嬉しいものなのですね。"
10065-CVGroup_Tactic_In_1-1 = "百鬼夜行の名にかけて。"
10065-CVGroup_Tactic_In_2-1 = "陰陽部の副部長として、成し遂げてみせましょう。"
10065-CVGroup_Tactic_Victory_1-1 = "お役に立てましたでしょうか？"
10065-CVGroup_Tactic_Victory_2-1 = "ふぅ……皆さんがご無事でなによりです。"
