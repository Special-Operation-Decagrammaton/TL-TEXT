[translation]
10065-CVGroup_Battle_Buffed_1-1 = "Obrigada pelo apoio."
10065-CVGroup_Battle_Covered_1-1 = "Ajustando a respiração..."
10065-CVGroup_Battle_Defense_1-1 = "Isso não vai funcionar."
10065-CVGroup_Battle_In_1-1 = "Pessoal, por favor, venham comigo."
10065-CVGroup_Battle_In_2-1 = "Vamos com cuidado para não nos ferirmos."
10065-CVGroup_Battle_Move_1-1 = "Bem, vamos para o próximo?"
10065-CVGroup_Battle_Move_2-1 = "Pessoal, vamos lá."
10065-CVGroup_Battle_Recovery_1-1 = "Isso me salvou.\nObrigada."
10065-CVGroup_Battle_TacticalAction_1-1 = "Vamos lá."
10065-CVGroup_Battle_Victory_1-1 = "Fufu, este é o verdadeiro poder do Departamento Yin-Yang."
10065-CVGroup_Battle_Victory_2-1 = "Fufu, espero que isso tenha servido, ao menos um pouco, para promover Hyakkiyako."
10065-CVGroup_CommonSkill-1 = "Acalmando o coração...\nVamos lá."
10065-CVGroup_ExSkill_1-1 = "Wah!?\nDo céu... o que é isso...?"
10065-CVGroup_ExSkill_2-1 = "Isso é... o lendário...!?"
10065-CVGroup_ExSkill_3-1 = "I-isso é!\nChise-chan!?"
10065-CVGroup_ExSkill_Level_1-1 = "Não posso deixar cair!"
10065-CVGroup_ExSkill_Level_2-1 = "Vou recuperar tudo!"
10065-CVGroup_ExSkill_Level_3-1 = "Chise-chan! Espere!!"
10065-CVGroup_Formation_In_1-1 = "Sim, estou à disposição."
10065-CVGroup_Formation_In_2-1 = "Kuwakami Kaho, apresentando-se."
10065-CVGroup_Formation_Select-1 = "? Precisa de algo?"
10065-CVGroup_Growup_1-1 = "Obrigada, Sensei.\nGraças a você, pude crescer."
10065-CVGroup_Growup_2-1 = "É muito gratificante poder sentir o próprio crescimento."
10065-CVGroup_Growup_3-1 = "Graças ao Sensei, fiquei mais forte novamente.\nQuero usar esse poder para ser ainda mais útil a todos."
10065-CVGroup_Growup_4-1 = "Parece que cresci ainda mais.\nSe alguém como eu puder ser de ajuda, ficarei muito feliz."
10065-CVGroup_Relationship_Up_1-1 = "Meu coração está batendo tão forte... \nEssa... é uma sensação... inédita."
10065-CVGroup_Relationship_Up_2-1 = "Quanto mais tempo passamos juntos, mais a distância entre nossos corações diminui, não é? \n...Entendo."
10065-CVGroup_Relationship_Up_3-1 = "Meu corpo está ficando um pouco quente... \nIsso é... não, será que... ah."
10065-CVGroup_Relationship_Up_4-1 = "É a primeira vez que alguém cuida de mim assim... \nÉ algo que me deixa muito feliz."
10065-CVGroup_Tactic_In_1-1 = "Em nome de Hyakkiyako."
10065-CVGroup_Tactic_In_2-1 = "Como vice-chefe do Departamento Yin-Yang, vou cumprir esta missão."
10065-CVGroup_Tactic_Victory_1-1 = "Fui útil?"
10065-CVGroup_Tactic_Victory_2-1 = "Ufa... fico feliz que todos estejam bem."
