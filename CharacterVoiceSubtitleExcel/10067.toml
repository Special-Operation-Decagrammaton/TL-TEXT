[translation]
10067-CVGroup_Battle_Buffed_1-1 = "Agradeço pelo suporte."
10067-CVGroup_Battle_Covered_1-1 = "Opa, me escondi."
10067-CVGroup_Battle_Defense_1-1 = "É ali?"
10067-CVGroup_Battle_In_1-1 = "Callsign Bunny Zero-Four, entrando em ação."
10067-CVGroup_Battle_In_2-1 = "Iniciando infiltração."
10067-CVGroup_Battle_Move_1-1 = "Vamos lá, go go."
10067-CVGroup_Battle_Move_2-1 = "Movendo-me para o próximo alvo."
10067-CVGroup_Battle_Recovery_1-1 = "Isso ajudou muito."
10067-CVGroup_Battle_TacticalAction_1-1 = "Movendo-me. Pulo, pulo."
10067-CVGroup_Battle_Victory_1-1 = "A missão de hoje foi um sucesso. Pulo, pulo."
10067-CVGroup_Battle_Victory_2-1 = "Pulo. Afinal, sou a melhor agente que existe."
10067-CVGroup_CommonSkill-1 = "O que acha disto?"
10067-CVGroup_ExSkill_1-1 = "Arm Gear, equipar."
10067-CVGroup_ExSkill_2-1 = "Vou lidar com isso."
10067-CVGroup_ExSkill_3-1 = "Alvo, capturado."
10067-CVGroup_ExSkill_Level_1-1 = "Fogo!"
10067-CVGroup_ExSkill_Level_2-1 = "Full Burst...!"
10067-CVGroup_ExSkill_Level_3-1 = "Responderei com força total."
10067-CVGroup_Formation_In_1-1 = "Qual é a missão de infiltração de hoje?"
10067-CVGroup_Formation_In_2-1 = "Entendido.\nEstou me preparando."
10067-CVGroup_Formation_Select-1 = "Sensei, dê suas ordens.\nSou uma coelhinha invencível, afinal."
10067-CVGroup_Growup_1-1 = "Continuarei me esforçando até me tornar a melhor agente coelhinha."
10067-CVGroup_Growup_2-1 = "Proteger o Sensei é o meu trabalho.\nIsso é algo que não abro mão."
10067-CVGroup_Growup_3-1 = "Farei o meu melhor para não envergonhar estas orelhas de coelho.\nHã? Não é isso...?"
10067-CVGroup_Growup_4-1 = "Infiltração, ação, escolta, invasão, empregada, coelhinha.\nPor favor, dê suas ordens."
10067-CVGroup_Relationship_Up_1-1 = "Sensei, você precisa dedicar mais tempo a mim.\nPelo menos o mesmo tempo que passo pensando em você."
10067-CVGroup_Relationship_Up_2-1 = "Ficar com o Sensei me deixa calma.\nSim, a ponto de eu acabar pegando no sono."
10067-CVGroup_Relationship_Up_3-1 = "Conte comigo para o que precisar.\nSe o Sensei desejar, farei qualquer coisa.\n...Fufu, eu queria dizer algo assim pelo menos uma vez."
10067-CVGroup_Relationship_Up_4-1 = "Eu preciso do Sensei.\nAssim como o Sensei precisa de mim.\nProibido dizer coisas constrangedoras? Fufu, eu disse de propósito."
10067-CVGroup_Tactic_In_1-1 = "Não se preocupe.\nSou uma coelhinha, afinal."
10067-CVGroup_Tactic_In_2-1 = "Deixe comigo."
10067-CVGroup_Tactic_Victory_1-1 = "Vitória. Ieei."
10067-CVGroup_Tactic_Victory_2-1 = "Um resultado natural. Yahoo."
