[translation]
10067-CVGroup_Battle_Buffed_1-1 = "支援、感謝します。"
10067-CVGroup_Battle_Covered_1-1 = "やっ、隠れました。"
10067-CVGroup_Battle_Defense_1-1 = "そこですか。"
10067-CVGroup_Battle_In_1-1 = "コールサインバニーゼロフォー、参ります。"
10067-CVGroup_Battle_In_2-1 = "潜入を開始します。"
10067-CVGroup_Battle_Move_1-1 = "行きましょう、ゴーゴー。"
10067-CVGroup_Battle_Move_2-1 = "次のターゲットへ移動します。"
10067-CVGroup_Battle_Recovery_1-1 = "助かりました。"
10067-CVGroup_Battle_TacticalAction_1-1 = "移動します。ぴょんぴょん。"
10067-CVGroup_Battle_Victory_1-1 = "今回のミッションも上出来でしたね。ぴょんぴょん。"
10067-CVGroup_Battle_Victory_2-1 = "ぴょん。私は最高のエージェントですから。"
10067-CVGroup_CommonSkill-1 = "こういうのはいかがでしょう。"
10067-CVGroup_ExSkill_1-1 = "アームギア、装着。"
10067-CVGroup_ExSkill_2-1 = "対応します。"
10067-CVGroup_ExSkill_3-1 = "ターゲット、捕捉。"
10067-CVGroup_ExSkill_Level_1-1 = "ファイヤー！"
10067-CVGroup_ExSkill_Level_2-1 = "フルバースト……！"
10067-CVGroup_ExSkill_Level_3-1 = "全力で対応いたします。"
10067-CVGroup_Formation_In_1-1 = "本日の潜入任務は、何でしょうか？"
10067-CVGroup_Formation_In_2-1 = "かしこまりました。\n準備いたします。"
10067-CVGroup_Formation_Select-1 = "先生、ご命令を。\n私は無敵のバニーガールですから。"
10067-CVGroup_Growup_1-1 = "最高のバニーエージェントになるその日まで、精進を続けます。"
10067-CVGroup_Growup_2-1 = "先生の護衛は私の仕事です。\nこれだけは譲れませんので。"
10067-CVGroup_Growup_3-1 = "このウサミミに恥じぬよう、最善を尽くします。\nはい？それは違う……？"
10067-CVGroup_Growup_4-1 = "潜入、アクション、護衛、侵入、メイド、バニーガール。\n何なりとご指示ください。"
10067-CVGroup_Relationship_Up_1-1 = "先生には、私に割く時間を増やしていただかないと。\n少なくとも、私が先生を想う時間と同じくらいには。"
10067-CVGroup_Relationship_Up_2-1 = "先生と一緒にいると、落ち着きます。\nはい、うっかり眠ってしまうほどに。"
10067-CVGroup_Relationship_Up_3-1 = "いつでも私を頼ってください。\n先生が望むのであれば、いくらでも。\n……ふふ、こういうセリフ、一度は言ってみたかったのです。"
10067-CVGroup_Relationship_Up_4-1 = "私には先生が必要です。\n先生にとって、私が必要であるように。\n恥ずかしいセリフ禁止、ですか？ふふ、わざと言いました。"
10067-CVGroup_Tactic_In_1-1 = "心配無用です。\nバニーですので。"
10067-CVGroup_Tactic_In_2-1 = "私にお任せを。"
10067-CVGroup_Tactic_Victory_1-1 = "勝利しました。いえーい。"
10067-CVGroup_Tactic_Victory_2-1 = "当然の結果です。やっほー。"
