[translation]
20016-CVGroup_CommonSkill-1 = "Ataque."
20016-CVGroup_ExSkill_1-1 = "Haa, bem, Super Invencível Tanque de Ferro 'Toramaru', partindo para a missão..."
20016-CVGroup_ExSkill_2-1 = "Haa, vamos fazer uma patrulha, Toramaru?"
20016-CVGroup_ExSkill_3-1 = "Super Invencível Tanque de Ferro 'Toramaru', avançar...\nO nome é bem vergonhoso, né."
20016-CVGroup_ExSkill_Level_1-1 = "Sim, sim, já estou indo."
20016-CVGroup_ExSkill_Level_2-1 = "Entendido, já vou..."
20016-CVGroup_ExSkill_Level_3-1 = "Não tem outro jeito, né..."
20016-CVGroup_Formation_In_1-1 = "Ah... sim, entendido."
20016-CVGroup_Formation_In_2-1 = "Eu já esperava por isso, mas... haa."
20016-CVGroup_Formation_Select-1 = "Hmm... posso ficar cuidando do lugar?"
20016-CVGroup_Growup_1-1 = "Parece que você não vai me deixar folgar...\nNão tem jeito."
20016-CVGroup_Growup_2-1 = "...O que foi? Está interessado em mim?"
20016-CVGroup_Growup_3-1 = "Heh, você faria tudo isso por mim?"
20016-CVGroup_Growup_4-1 = "Obrigada...\nO que foi? Eu sei agradecer normalmente, sabe."
20016-CVGroup_Relationship_Up_1-1 = "Fufu...\nBem, parece que não somos tão incompatíveis assim."
20016-CVGroup_Relationship_Up_2-1 = "Bem, não é uma sensação ruim ser requisitada, mas..."
20016-CVGroup_Relationship_Up_3-1 = "Esse tipo de abordagem direta é um pouco..."
20016-CVGroup_Relationship_Up_4-1 = "Será que é isso que significa ter uma conexão de alma?"
