[translation]
20016-CVGroup_CommonSkill-1 = "攻撃。"
20016-CVGroup_ExSkill_1-1 = "はぁ、えっと、超無敵鉄甲「虎丸」、出撃……。"
20016-CVGroup_ExSkill_2-1 = "はぁ、パトロールでもしますか、虎丸。"
20016-CVGroup_ExSkill_3-1 = "超無敵鉄甲「虎丸」、前進……\n名前、恥ずかしいですね。"
20016-CVGroup_ExSkill_Level_1-1 = "はいはい、行きますよー"
20016-CVGroup_ExSkill_Level_2-1 = "分かりましたよ、もう……。"
20016-CVGroup_ExSkill_Level_3-1 = "仕方ないですね……。"
20016-CVGroup_Formation_In_1-1 = "あー……はい、了解です。"
20016-CVGroup_Formation_In_2-1 = "予想はしてましたが……はぁ。"
20016-CVGroup_Formation_Select-1 = "ん……留守番、してもいいんですか？"
20016-CVGroup_Growup_1-1 = "サボらせて、くれなさそうですね……\n仕方ありません。"
20016-CVGroup_Growup_2-1 = "……なんですか、私に興味が？"
20016-CVGroup_Growup_3-1 = "へえ、ここまでしてくれるんですね？"
20016-CVGroup_Growup_4-1 = "ありがとうございます……\nなんですか、普通にお礼くらい言いますが。"
20016-CVGroup_Relationship_Up_1-1 = "ふふっ……\nまあ、波長が合わないわけではなさそうですね。"
20016-CVGroup_Relationship_Up_2-1 = "まぁ、頼られるのは嫌な気分ではありませんが……。"
20016-CVGroup_Relationship_Up_3-1 = "そういう積極的なアプローチは、ちょっと……。"
20016-CVGroup_Relationship_Up_4-1 = "心が通うとは、こういうことなのでしょうか。"
