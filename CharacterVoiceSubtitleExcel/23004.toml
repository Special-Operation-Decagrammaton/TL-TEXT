[translation]
23004-CVGroup_CommonSkill-1 = "雷の玉座……。\n戦闘モード！"
23004-CVGroup_ExSkill_1-1 = "さあ。暴れろ。"
23004-CVGroup_ExSkill_2-1 = "ふうん。いい子だ。"
23004-CVGroup_ExSkill_3-1 = "整備完了、作動開始。"
23004-CVGroup_ExSkill_Level_1-1 = "これがミレニアムの猛獣だ。"
23004-CVGroup_ExSkill_Level_2-1 = "驚異的な技術力。\nしっかり目に焼き付けるといい。"
23004-CVGroup_ExSkill_Level_3-1 = "この椅子が君たちを破滅させる。"
23004-CVGroup_Formation_In_1-1 = "技術の優位こそが、勝利を決定づけるんだ。"
23004-CVGroup_Formation_In_2-1 = "合理的な選択だね。"
23004-CVGroup_Growup_1-1 = "先生の気遣い、温かいね。"
23004-CVGroup_Growup_2-1 = "アップグレードというものは人生のQoLを上げてくれる。\nそうして私のQoLもまた、このように。"
23004-CVGroup_Growup_3-1 = "機械を扱えば扱うほど、\n機械に込められた優しさが理解できるようになる。"
23004-CVGroup_Growup_4-1 = "誰かのために、何かを作る。\nそれがマイスターの幸せというものなんだ。"
23004-CVGroup_Relationship_Up_1-1 = "工房で物ばかり作ってたから……\n会話は苦手なはずなんだけど、先生はちょっと違うね。"
23004-CVGroup_Relationship_Up_2-1 = "不思議だな。人間の心というのは。\nどんなメカニズムかは分からないけど、ドキドキする。"
23004-CVGroup_Relationship_Up_3-1 = "まだあくまでロマンに近いけど、いつか宇宙に行ってみたい。\n簡単ではないと思うけどその時は……先生も連れていってあげるよ"
23004-CVGroup_Relationship_Up_4-1 = "私はいつも、この工房にいるよ。\n必要な時は……いつでもここに来て。先生……。"
