[translation]
23004-CVGroup_CommonSkill-1 = "Trono do trovão...\nModo de combate!"
23004-CVGroup_ExSkill_1-1 = "Vamos lá. Cause um estrago."
23004-CVGroup_ExSkill_2-1 = "Hum. Bom garoto."
23004-CVGroup_ExSkill_3-1 = "Manutenção concluída, iniciando operação."
23004-CVGroup_ExSkill_Level_1-1 = "Esta é a fera do Millennium."
23004-CVGroup_ExSkill_Level_2-1 = "Uma proeza tecnológica fenomenal.\nÉ melhor gravar bem na memória."
23004-CVGroup_ExSkill_Level_3-1 = "Esta cadeira levará vocês à ruína."
23004-CVGroup_Formation_In_1-1 = "A superioridade tecnológica é o que determina a vitória."
23004-CVGroup_Formation_In_2-1 = "Uma escolha racional."
23004-CVGroup_Growup_1-1 = "A consideração do Sensei é calorosa."
23004-CVGroup_Growup_2-1 = "Fazer upgrades melhora a qualidade de vida.\nE assim, a minha qualidade de vida também melhora, desta forma."
23004-CVGroup_Growup_3-1 = "Quanto mais eu lido com máquinas,\nmais consigo entender a gentileza contida nelas."
23004-CVGroup_Growup_4-1 = "Criar algo para alguém.\nEssa é a felicidade de um mestre artesão."
23004-CVGroup_Relationship_Up_1-1 = "Como eu só ficava criando coisas na oficina...\nEu deveria ser ruim de conversa, mas o Sensei é um pouco diferente."
23004-CVGroup_Relationship_Up_2-1 = "É estranho. O coração humano.\nNão sei qual é o mecanismo, mas meu coração dispara."
23004-CVGroup_Relationship_Up_3-1 = "Ainda é algo próximo de um sonho, mas um dia quero ir ao espaço.\nSei que não é fácil, mas quando acontecer... eu levo o Sensei comigo."
23004-CVGroup_Relationship_Up_4-1 = "Eu estarei sempre nesta oficina.\nQuando precisar... venha aqui a qualquer momento. Sensei..."
