[translation]
10057-CVGroup_Battle_Buffed_1-1 = "感謝いたしますわ。"
10057-CVGroup_Battle_Covered_1-1 = "こちらに隠れさせていただきますね。"
10057-CVGroup_Battle_Defense_1-1 = "ふふっ、惜しかったですわね。"
10057-CVGroup_Battle_In_1-1 = "皆さま、どうぞよろしくお願い致しますね。"
10057-CVGroup_Battle_In_2-1 = "美食の道を邪魔だてするのですから、\nそれ相応の罰を受ける覚悟がおありなのですね？"
10057-CVGroup_Battle_Move_1-1 = "あちらへ参りましょう。"
10057-CVGroup_Battle_Move_2-1 = "次はどちらへ？"
10057-CVGroup_Battle_Recovery_1-1 = "あら……\nふふっ、ありがとうございます。"
10057-CVGroup_Battle_TacticalAction_1-1 = "ふふっ。"
10057-CVGroup_Battle_Victory_1-1 = "今年もどのような美食が私たちを待っているのでしょう？"
10057-CVGroup_Battle_Victory_2-1 = "うふふ……\nさて、おせち料理を堪能しに参りましょう。"
10057-CVGroup_CommonSkill-1 = "んん～、この味を待ち望んでおりました。"
10057-CVGroup_ExSkill_1-1 = "これは……！？"
10057-CVGroup_ExSkill_2-1 = "そんな……！？"
10057-CVGroup_ExSkill_3-1 = "私にこのようなものを……！？"
10057-CVGroup_ExSkill_Level_1-1 = "なっておりませんわね！"
10057-CVGroup_ExSkill_Level_2-1 = "食への冒涜ですわ！"
10057-CVGroup_ExSkill_Level_3-1 = "食べ物に敬意を払いなさい！"
10057-CVGroup_Formation_In_1-1 = "美食のお時間ですね？"
10057-CVGroup_Formation_In_2-1 = "ええ、分かりました。\n心配ご無用です。"
10057-CVGroup_Formation_Select-1 = "あら、どうなさいました？"
10057-CVGroup_Growup_1-1 = "あら？うふふ……\nありがとうございます、先生。"
10057-CVGroup_Growup_2-1 = "私にこのようなことまでしていただいて……\nよろしいのですか？"
10057-CVGroup_Growup_3-1 = "先生にはお世話になってばかりですわね。\n私の成長していく姿、その目に焼きつけておいてくださいね？"
10057-CVGroup_Growup_4-1 = "私と先生の毎日が幸福に包まれますように。"
10057-CVGroup_Relationship_Up_1-1 = "いつか……いつの日か、美食の道を探究し、\n共に歩める方ができたらと願っていました。\nもし、よろしければ……先生が、なってくださりませんか？"
10057-CVGroup_Relationship_Up_2-1 = "先生はどのような料理がお好きですか？\nよろしければ、一緒に探しにいきましょう。"
10057-CVGroup_Relationship_Up_3-1 = "もう少しだけ……そばにいてくださいませんか？\nはい……もう少しだけ。"
10057-CVGroup_Relationship_Up_4-1 = "お気付きですか？\n私にとって、先生と過ごす瞬間は、いつだって特別なのです。\nそれがたとえ食事とは関係のない時間であったとしても。"
10057-CVGroup_Tactic_In_1-1 = "さぁ、参りましょう。"
10057-CVGroup_Tactic_In_2-1 = "うふふ、楽しみですわね。"
10057-CVGroup_Tactic_Victory_1-1 = "美食の邪魔をするから、そのような目に遭うのですよ。"
10057-CVGroup_Tactic_Victory_2-1 = "生か、食か、それが問題ですわ。"
