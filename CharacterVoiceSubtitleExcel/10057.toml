[translation]
10057-CVGroup_Battle_Buffed_1-1 = "Agradeço imensamente."
10057-CVGroup_Battle_Covered_1-1 = "Vou me esconder aqui, se não se importa."
10057-CVGroup_Battle_Defense_1-1 = "Fufu, foi por pouco, não é?"
10057-CVGroup_Battle_In_1-1 = "Conto com todos vocês."
10057-CVGroup_Battle_In_2-1 = "Já que estão atrapalhando o caminho da gastronomia,\nestão preparados para receber a punição merecida?"
10057-CVGroup_Battle_Move_1-1 = "Vamos para lá."
10057-CVGroup_Battle_Move_2-1 = "Para onde vamos agora?"
10057-CVGroup_Battle_Recovery_1-1 = "Ora... \nFufu, obrigada."
10057-CVGroup_Battle_TacticalAction_1-1 = "Fufu."
10057-CVGroup_Battle_Victory_1-1 = "Que tipo de iguarias nos esperam este ano?"
10057-CVGroup_Battle_Victory_2-1 = "Ufufu... \nBem, vamos aproveitar o Osechi."
10057-CVGroup_CommonSkill-1 = "Hmm, eu estava ansiosa por este sabor."
10057-CVGroup_ExSkill_1-1 = "Isto é...!?"
10057-CVGroup_ExSkill_2-1 = "Como pode...!?"
10057-CVGroup_ExSkill_3-1 = "Fazer algo assim comigo...!?"
10057-CVGroup_ExSkill_Level_1-1 = "Isso não está aceitável!"
10057-CVGroup_ExSkill_Level_2-1 = "É uma blasfêmia contra a comida!"
10057-CVGroup_ExSkill_Level_3-1 = "Tenha respeito pela comida!"
10057-CVGroup_Formation_In_1-1 = "É hora da gastronomia, não é?"
10057-CVGroup_Formation_In_2-1 = "Sim, entendi. \nNão se preocupe."
10057-CVGroup_Formation_Select-1 = "Ora, o que houve?"
10057-CVGroup_Growup_1-1 = "Ora? Ufufu... \nObrigada, Sensei."
10057-CVGroup_Growup_2-1 = "Fazer algo assim por mim... \nTem certeza de que está tudo bem?"
10057-CVGroup_Growup_3-1 = "Sempre sendo cuidada por você, Sensei. \nPor favor, grave em sua memória o meu crescimento, está bem?"
10057-CVGroup_Growup_4-1 = "Que os dias entre mim e o Sensei sejam repletos de felicidade."
10057-CVGroup_Relationship_Up_1-1 = "Um dia... eu desejei que, algum dia, pudesse encontrar alguém para explorar o caminho da gastronomia comigo. \nSe não se importar... você não gostaria de ser essa pessoa, Sensei?"
10057-CVGroup_Relationship_Up_2-1 = "Que tipo de pratos você gosta, Sensei? \nSe quiser, vamos procurar por eles juntos."
10057-CVGroup_Relationship_Up_3-1 = "Poderia ficar ao meu lado... só mais um pouco? \nSim... só mais um pouco."
10057-CVGroup_Relationship_Up_4-1 = "Já percebeu? \nPara mim, os momentos que passo com o Sensei são sempre especiais. \nMesmo que não tenham nada a ver com comida."
10057-CVGroup_Tactic_In_1-1 = "Vamos lá."
10057-CVGroup_Tactic_In_2-1 = "Ufufu, estou ansiosa."
10057-CVGroup_Tactic_Victory_1-1 = "É isso que acontece quando se atrapalha a gastronomia."
10057-CVGroup_Tactic_Victory_2-1 = "Comer ou ser comido, eis a questão."
