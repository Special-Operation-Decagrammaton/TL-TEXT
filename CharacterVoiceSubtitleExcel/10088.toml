[translation]
10088-CVGroup_Battle_Buffed_1-1 = "Boa decisão.\nObrigada."
10088-CVGroup_Battle_Covered_1-1 = "Vou me esconder."
10088-CVGroup_Battle_Defense_1-1 = "Inútil."
10088-CVGroup_Battle_In_1-1 = "Se é para fazer, farei direito."
10088-CVGroup_Battle_In_2-1 = "Tudo bem, estou pronta."
10088-CVGroup_Battle_Move_1-1 = "Área limpa."
10088-CVGroup_Battle_Move_2-1 = "Próximo."
10088-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10088-CVGroup_Battle_TacticalAction_1-1 = "Ufa."
10088-CVGroup_Battle_Victory_1-1 = "Bom trabalho, pessoal.\nE você também, Sensei."
10088-CVGroup_Battle_Victory_2-1 = "Foi um bom comando, Sensei."
10088-CVGroup_CommonSkill-1 = "Não vou deixar escapar."
10088-CVGroup_ExSkill_1-1 = "Como esperado."
10088-CVGroup_ExSkill_2-1 = "Bem, acho que é isso."
10088-CVGroup_ExSkill_3-1 = "Só isso?"
10088-CVGroup_ExSkill_Level_1-1 = "Acabou por aqui."
10088-CVGroup_ExSkill_Level_2-1 = "Te encontrei."
10088-CVGroup_ExSkill_Level_3-1 = "Isso também faz parte do trabalho."
10088-CVGroup_Formation_In_1-1 = "É a minha vez.\nVou me preparar."
10088-CVGroup_Formation_In_2-1 = "Entendido. Vou executar com precisão."
10088-CVGroup_Formation_Select-1 = "Sensei...? O que foi...?"
10088-CVGroup_Growup_1-1 = "Obrigada, Sensei.\nTenho que retribuir o que você fez por mim."
10088-CVGroup_Growup_2-1 = "Por que você faria tanto por mim...\nNão, esquece. Obrigada."
10088-CVGroup_Growup_3-1 = "Desse jeito, nem sei mais quem está ajudando quem."
10088-CVGroup_Growup_4-1 = "...Recebi, com certeza.\nNão vou deixar você se arrepender."
10088-CVGroup_Relationship_Up_1-1 = "Obrigada, Sensei.\nIsso é muito bom."
10088-CVGroup_Relationship_Up_2-1 = "Vou cuidar bem disso."
10088-CVGroup_Relationship_Up_3-1 = "Quando estou assim com você, Sensei,\nsinto que este vestido não é tão ruim assim. É estranho."
10088-CVGroup_Relationship_Up_4-1 = "É um pouco diferente... a sensação de receber algo do que o habitual.\nSerá por causa do traje?"
10088-CVGroup_Tactic_In_1-1 = "Entendi, compreendido."
10088-CVGroup_Tactic_In_2-1 = "Isso é tudo."
10088-CVGroup_Tactic_Victory_1-1 = "E então? Gostou?"
10088-CVGroup_Tactic_Victory_2-1 = "Um resultado nada mal."
