[translation]
10088-CVGroup_Battle_Buffed_1-1 = "良い判断だね。\nありがとう。"
10088-CVGroup_Battle_Covered_1-1 = "隠れる。"
10088-CVGroup_Battle_Defense_1-1 = "無駄。"
10088-CVGroup_Battle_In_1-1 = "やるからには、しっかりやるよ。"
10088-CVGroup_Battle_In_2-1 = "大丈夫、準備はできてる。"
10088-CVGroup_Battle_Move_1-1 = "クリア。"
10088-CVGroup_Battle_Move_2-1 = "次。"
10088-CVGroup_Battle_Recovery_1-1 = "ありがとう。"
10088-CVGroup_Battle_TacticalAction_1-1 = "ふうっ。"
10088-CVGroup_Battle_Victory_1-1 = "お疲れ、みんな。\nあと、先生も。"
10088-CVGroup_Battle_Victory_2-1 = "良い指揮だったよ、先生。"
10088-CVGroup_CommonSkill-1 = "見逃さない。"
10088-CVGroup_ExSkill_1-1 = "想定通り。"
10088-CVGroup_ExSkill_2-1 = "まぁ、こんなものかな。"
10088-CVGroup_ExSkill_3-1 = "この程度？"
10088-CVGroup_ExSkill_Level_1-1 = "これで終わり。"
10088-CVGroup_ExSkill_Level_2-1 = "見つけた。"
10088-CVGroup_ExSkill_Level_3-1 = "これも依頼だから。"
10088-CVGroup_Formation_In_1-1 = "私の番だね。\n準備する。"
10088-CVGroup_Formation_In_2-1 = "分かった。確実に遂行する。"
10088-CVGroup_Formation_Select-1 = "先生……？何……？"
10088-CVGroup_Growup_1-1 = "ありがとう、先生。\nやってもらった分、返さないとね。"
10088-CVGroup_Growup_2-1 = "なんで私に、ここまで……\nいや、なんでもない。ありがとう。"
10088-CVGroup_Growup_3-1 = "これじゃ、どっちが助けられてるか分からないね。"
10088-CVGroup_Growup_4-1 = "……たしかに、受け取った。\n後悔はさせないから。"
10088-CVGroup_Relationship_Up_1-1 = "ありがとう、先生。\nすごく良いね、これ。"
10088-CVGroup_Relationship_Up_2-1 = "大切にするよ。"
10088-CVGroup_Relationship_Up_3-1 = "先生とこうしてると、\nこのドレスもそんなに悪くない気がしてくる。不思議。"
10088-CVGroup_Relationship_Up_4-1 = "なんかちょっと……普段よりもらったときの感じが違う。\n格好のせいかな。"
10088-CVGroup_Tactic_In_1-1 = "なるほど、分かったよ。"
10088-CVGroup_Tactic_In_2-1 = "これで全部ね。"
10088-CVGroup_Tactic_Victory_1-1 = "どう？気に入ってくれた？"
10088-CVGroup_Tactic_Victory_2-1 = "悪くない成果だね。"
