[translation]
10064-CVGroup_Battle_Buffed_1-1 = "支援、確認。"
10064-CVGroup_Battle_Covered_1-1 = "よし……。"
10064-CVGroup_Battle_Defense_1-1 = "余裕。"
10064-CVGroup_Battle_In_1-1 = "今年も、依頼がたくさん……。"
10064-CVGroup_Battle_In_2-1 = "心機一転……いくよ。"
10064-CVGroup_Battle_Move_1-1 = "探索開始。"
10064-CVGroup_Battle_Move_2-1 = "目標、変更。"
10064-CVGroup_Battle_Recovery_1-1 = "ありがたくもらうね。"
10064-CVGroup_Battle_TacticalAction_1-1 = "場所移動。"
10064-CVGroup_Battle_Victory_1-1 = "運がなかったね。"
10064-CVGroup_Battle_Victory_2-1 = "新年、良いスタートになったかな。"
10064-CVGroup_CommonSkill-1 = "ふふ、かわいい。"
10064-CVGroup_ExSkill_1-1 = "こほん……はい、お守り。"
10064-CVGroup_ExSkill_2-1 = "こほん……これ、受け取ってくれる？"
10064-CVGroup_ExSkill_3-1 = "ん……。\nどうだった？"
10064-CVGroup_ExSkill_Level_1-1 = "ご利益あるといいね。"
10064-CVGroup_ExSkill_Level_2-1 = "悪霊退散……ってことで。"
10064-CVGroup_ExSkill_Level_3-1 = "良い一年でありますように。"
10064-CVGroup_Formation_In_1-1 = "私の番？……分かった。"
10064-CVGroup_Formation_In_2-1 = "似合ってる？……良かった。"
10064-CVGroup_Formation_Select-1 = "……何？"
10064-CVGroup_Growup_1-1 = "その……ありがと。\n今年も先生と一緒、だね。"
10064-CVGroup_Growup_2-1 = "期待に応えられるか分からないけど……努力するね。"
10064-CVGroup_Growup_3-1 = "今、どんな顔をすればいい？\nごめん、こういう状況……慣れてなくて。"
10064-CVGroup_Growup_4-1 = "先生には、いつももらってばかりだね……。\nちゃんと返せるかは分からないけど、最善を尽くすよ。"
10064-CVGroup_Relationship_Up_1-1 = "絆って……不思議。\n重なるほど、互いを想うようになるなんて。"
10064-CVGroup_Relationship_Up_2-1 = "あの、こういう事、あまり言わないけど。\n……先生がいてよかったって……思ってる。"
10064-CVGroup_Relationship_Up_3-1 = "先生と新年を迎えたらどんな気分だろうって……\nずっと思ってたけど、これで少し、分かった気がする。"
10064-CVGroup_Relationship_Up_4-1 = "ありがと、似合うって言ってくれて。\nまぁ、お世辞だろうけど。……お世辞じゃない？\nま、待って、先生。今のは、ずるい……。"
10064-CVGroup_Tactic_In_1-1 = "行こう。"
10064-CVGroup_Tactic_In_2-1 = "依頼は迅速に。"
10064-CVGroup_Tactic_Victory_1-1 = "お疲れ、先生。\n服も汚れてないね……良かった。"
10064-CVGroup_Tactic_Victory_2-1 = "新年早々、幸先よくしたいから。"
