[translation]
20023-CVGroup_CommonSkill-1 = "容疑者、確保。"
20023-CVGroup_ExSkill_1-1 = "さぁ、尋問をはじめよう。"
20023-CVGroup_ExSkill_2-1 = "私を騙そうとしても無駄だ。"
20023-CVGroup_ExSkill_3-1 = "「狂犬」の名を、一度は聞いたことがあるだろう？"
20023-CVGroup_ExSkill_Level_1-1 = "ヴァルキューレ公安局だ！止まれ！"
20023-CVGroup_ExSkill_Level_2-1 = "動くな！動いたら犯人と見なす！"
20023-CVGroup_ExSkill_Level_3-1 = "間に合ったか。"
20023-CVGroup_Formation_In_1-1 = "公安局の出番ですか？"
20023-CVGroup_Formation_In_2-1 = "ご命令とあらば。"
20023-CVGroup_Formation_Select-1 = "書類になにか不備でも？"
20023-CVGroup_Growup_1-1 = "なるほど、そんな方法が。\nいい勉強になりました。"
20023-CVGroup_Growup_2-1 = "今日の訓練は……これで十分でしょう。"
20023-CVGroup_Growup_3-1 = "市民のために、日々精進します。"
20023-CVGroup_Growup_4-1 = "局長といえど、鍛錬を怠っては部下の模範になれません。"
20023-CVGroup_Relationship_Up_1-1 = "世の大人が皆、先生のような方であれば、私たちが仕事をする事もないのに……。\n独り言です。気にしないでください。"
20023-CVGroup_Relationship_Up_2-1 = "いくら私でも、先生を尋問して情報を引き出すのは不可能でしょうね。\nふふ……。"
20023-CVGroup_Relationship_Up_3-1 = "先生と生徒の恋愛……？\nな、なにを仰って！"
20023-CVGroup_Relationship_Up_4-1 = "たまには、シャーレを頼るとします。"
