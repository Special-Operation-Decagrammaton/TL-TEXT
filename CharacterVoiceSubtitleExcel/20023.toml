[translation]
20023-CVGroup_CommonSkill-1 = "Suspeito apreendido."
20023-CVGroup_ExSkill_1-1 = "Muito bem, vamos começar o interrogatório."
20023-CVGroup_ExSkill_2-1 = "É inútil tentar me enganar."
20023-CVGroup_ExSkill_3-1 = "Você já deve ter ouvido o nome 'Cão Louco' pelo menos uma vez, não é?"
20023-CVGroup_ExSkill_Level_1-1 = "Departamento de Segurança Pública da Valkyrie! Pare!"
20023-CVGroup_ExSkill_Level_2-1 = "Não se mova! Se se mover, será considerado um criminoso!"
20023-CVGroup_ExSkill_Level_3-1 = "Parece que cheguei a tempo."
20023-CVGroup_Formation_In_1-1 = "É a vez do Departamento de Segurança Pública entrar em ação?"
20023-CVGroup_Formation_In_2-1 = "Se for uma ordem."
20023-CVGroup_Formation_Select-1 = "Há alguma irregularidade na papelada?"
20023-CVGroup_Growup_1-1 = "Entendo, então existe um método assim.\nFoi um ótimo aprendizado."
20023-CVGroup_Growup_2-1 = "O treinamento de hoje... já deve ser o suficiente com isso."
20023-CVGroup_Growup_3-1 = "Pelos cidadãos, eu me dedicarei todos os dias."
20023-CVGroup_Growup_4-1 = "Mesmo sendo a diretora, se eu negligenciar o meu treinamento, não poderei ser um exemplo para os meus subordinados."
20023-CVGroup_Relationship_Up_1-1 = "Se todos os adultos do mundo fossem como você, Sensei, nós nem teríamos trabalho a fazer...\nEstava só falando sozinha. Não ligue para isso."
20023-CVGroup_Relationship_Up_2-1 = "Até mesmo para mim, extrair informações interrogando você seria impossível, Sensei.\nFufu..."
20023-CVGroup_Relationship_Up_3-1 = "Um romance entre Sensei e aluna...?\nO-O que o senhor está dizendo!?"
20023-CVGroup_Relationship_Up_4-1 = "De vez em quando, acho que vou contar com a ajuda da Schale."