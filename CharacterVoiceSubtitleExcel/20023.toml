[translation]
20023-CVGroup_CommonSkill-1 = "Suspeito, capturado."
20023-CVGroup_ExSkill_1-1 = "Muito bem, vamos começar o interrogatório."
20023-CVGroup_ExSkill_2-1 = "É inútil tentar me enganar."
20023-CVGroup_ExSkill_3-1 = "Você já deve ter ouvido o nome 'Cão Louco' pelo menos uma vez, não é?"
20023-CVGroup_ExSkill_Level_1-1 = "Polícia de Valkyrie! Pare!"
20023-CVGroup_ExSkill_Level_2-1 = "Não se mova! Se se mover, será considerado um criminoso!"
20023-CVGroup_ExSkill_Level_3-1 = "Cheguei a tempo."
20023-CVGroup_Formation_In_1-1 = "É a vez da Polícia?"
20023-CVGroup_Formation_In_2-1 = "Se é uma ordem, farei."
20023-CVGroup_Formation_Select-1 = "Alguma irregularidade na papelada?"
20023-CVGroup_Growup_1-1 = "Entendo, esse método... Foi um bom aprendizado."
20023-CVGroup_Growup_2-1 = "O treinamento de hoje... acho que já foi o suficiente."
20023-CVGroup_Growup_3-1 = "Pelo bem dos cidadãos, continuarei me esforçando todos os dias."
20023-CVGroup_Growup_4-1 = "Mesmo sendo a diretora, não posso negligenciar o treinamento se quiser ser um exemplo para meus subordinados."
20023-CVGroup_Relationship_Up_1-1 = "Se todos os adultos do mundo fossem como o Sensei, nós nem teríamos trabalho para fazer... É só um pensamento meu. Não ligue."
20023-CVGroup_Relationship_Up_2-1 = "Mesmo para mim, seria impossível interrogar o Sensei para extrair informações. Hehe..."
20023-CVGroup_Relationship_Up_3-1 = "Romance entre professor e aluno...? O-o que você está dizendo!"
20023-CVGroup_Relationship_Up_4-1 = "De vez em quando, vou contar com o Schale."
