[translation]
10116-CVGroup_Battle_Buffed_1-1 = "適切な支援、感謝する。"
10116-CVGroup_Battle_Defense_1-1 = "虚しいことを。"
10116-CVGroup_Battle_In_1-1 = "先生、指示を。"
10116-CVGroup_Battle_In_2-1 = "全力で行く。"
10116-CVGroup_Battle_Move_1-1 = "次のポイントに移動する。"
10116-CVGroup_Battle_Move_2-1 = "承知した。"
10116-CVGroup_Battle_Recovery_1-1 = "恩に着る。"
10116-CVGroup_Battle_TacticalAction_1-1 = "行くぞ。"
10116-CVGroup_Battle_Victory_1-1 = "任務成功だ。"
10116-CVGroup_Battle_Victory_2-1 = "作戦終了。"
10116-CVGroup_CommonSkill-1 = "整備する。"
10116-CVGroup_ExSkill_1-1 = "見てしまったのか。"
10116-CVGroup_ExSkill_2-1 = "恨みはないが、これも仕事だ。"
10116-CVGroup_ExSkill_3-1 = "邪魔だ。"
10116-CVGroup_ExSkill_Level_1-1 = "さらばだ！"
10116-CVGroup_ExSkill_Level_2-1 = "道を開く！"
10116-CVGroup_ExSkill_Level_3-1 = "はっ！"
10116-CVGroup_Formation_In_1-1 = "特別な任務か。"
10116-CVGroup_Formation_In_2-1 = "迅速に終わらせよう。"
10116-CVGroup_Formation_Select-1 = "的確な采配だな。"
10116-CVGroup_Growup_1-1 = "支援、感謝する。"
10116-CVGroup_Growup_2-1 = "……先生の期待に応えてみせよう。"
10116-CVGroup_Growup_3-1 = "先生がいてくれたから……私は前を向くことができた。"
10116-CVGroup_Growup_4-1 = "先生に感謝の気持ちを返したいのだが……\nすまない、どうすればいいのか分からない。"
10116-CVGroup_Relationship_Up_1-1 = "普段よりも胸が苦しい気がする……\n先生なら、理由を知っているだろうか？"
10116-CVGroup_Relationship_Up_2-1 = "先生と出会ったおかげで、色々なことに変化が起きた。\nこの服もそうだし……私自身も。"
10116-CVGroup_Relationship_Up_3-1 = "最後まで……先生の信頼に応えると誓おう。"
10116-CVGroup_Relationship_Up_4-1 = "任務関係なく、このドレスに袖を通してみたいものだ……\nできれば、先生のために。"
10116-CVGroup_Tactic_In_1-1 = "任務開始。"
10116-CVGroup_Tactic_In_2-1 = "このまま対応する……問題ない。"
10116-CVGroup_Tactic_Victory_1-1 = "感謝する、先生。"
10116-CVGroup_Tactic_Victory_2-1 = "良い経験になった。"
