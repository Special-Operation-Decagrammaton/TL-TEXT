[translation]
26010-CVGroup_CommonSkill-1 = "……ヒット、です。"
26010-CVGroup_ExSkill_1-1 = "あっ、ふぇ！？\nふわああぁ！？"
26010-CVGroup_ExSkill_2-1 = "や、やめて……！"
26010-CVGroup_ExSkill_3-1 = "と、鳥！？どうして！？"
26010-CVGroup_ExSkill_Level_1-1 = "あ、あっち行って……！"
26010-CVGroup_ExSkill_Level_2-1 = "ふわあああぁ―！！"
26010-CVGroup_ExSkill_Level_3-1 = "す……好きにしてください！"
26010-CVGroup_Formation_In_1-1 = "あ、あうぅ……。"
26010-CVGroup_Formation_In_2-1 = "い、今から始まるのですか？"
26010-CVGroup_Formation_Select-1 = "ぼ、帽子が……ひぃん。"
26010-CVGroup_Growup_1-1 = "い、いいのでしょうか……\nその、あんまり上手く、できなかったのに……。"
26010-CVGroup_Growup_2-1 = "私なんかにもったいないです……。\n……いいえ、が、頑張ります……。"
26010-CVGroup_Growup_3-1 = "良い支給品ですね……\nで、でも……私には相応しくない、かも……。"
26010-CVGroup_Growup_4-1 = "わ、私、先生の期待に……\n応えられるのでしょうか……？"
26010-CVGroup_Relationship_Up_1-1 = "先生のためなら……\n何だってできますから。"
26010-CVGroup_Relationship_Up_2-1 = "先生と一緒なら……\n私も、ここにいても、いいんだって、思えます……。"
26010-CVGroup_Relationship_Up_3-1 = "先生……今夜、パトロールに付き合ってくれませんか……？"
26010-CVGroup_Relationship_Up_4-1 = "狙撃手として、ダメなのに……\nどうしても、先生の方に目がいってしまいます……。"
