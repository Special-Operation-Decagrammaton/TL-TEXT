[translation]
10053-CVGroup_Battle_Buffed_1-1 = "あっ、ありがとう！"
10053-CVGroup_Battle_Covered_1-1 = "隠れるわ！\n支援をお願い！"
10053-CVGroup_Battle_Defense_1-1 = "当たるわけないでしょう？"
10053-CVGroup_Battle_In_1-1 = "普段とは違う変数に注意して……前進！"
10053-CVGroup_Battle_In_2-1 = "コンディションは万全！\n結果は決まっていたわ！"
10053-CVGroup_Battle_Move_1-1 = "次の目標は？"
10053-CVGroup_Battle_Move_2-1 = "目標に向かって、前進！"
10053-CVGroup_Battle_Recovery_1-1 = "計算外の補給……感謝するわ！"
10053-CVGroup_Battle_TacticalAction_1-1 = "次に行くわよ！"
10053-CVGroup_Battle_Victory_1-1 = "計算通り、当然の結果ね。"
10053-CVGroup_Battle_Victory_2-1 = "運動も……完璧！"
10053-CVGroup_CommonSkill-1 = "はぁ……一息ついたら、行くわよ！"
10053-CVGroup_ExSkill_1-1 = "さあ、一緒にいくわよ！"
10053-CVGroup_ExSkill_2-1 = "ミレニアムの技術力を見せてあげなさい！"
10053-CVGroup_ExSkill_3-1 = "さあ、起きる時間よ！"
10053-CVGroup_ExSkill_Level_1-1 = "迅速に！"
10053-CVGroup_ExSkill_Level_2-1 = "こっち！"
10053-CVGroup_ExSkill_Level_3-1 = "わ、わあ……思ったより早い……！"
10053-CVGroup_Formation_In_1-1 = "最適な選択ですね。"
10053-CVGroup_Formation_In_2-1 = "証明の時間です。"
10053-CVGroup_Formation_Select-1 = "どうですか？\n活動的かつ合理的でしょう？"
10053-CVGroup_Growup_1-1 = "体操着って効率的な服装ですよね。\n先生もそう思いませんか？"
10053-CVGroup_Growup_2-1 = "そ、そんなに見つめられると困るというか……\nでも、まぁ……先生なら……いいですけど。"
10053-CVGroup_Growup_3-1 = "生まれ変わった気持ちです！\n……動きやすくなっただけですけどね。"
10053-CVGroup_Growup_4-1 = "今回も負けるとは思っていません。\n私の計算は完璧だからです！"
10053-CVGroup_Relationship_Up_1-1 = "無理は禁物ですよ。\n先生も気をつけてくださいね。\n……私も無理しがちだって？ううっ、そうですけど……。"
10053-CVGroup_Relationship_Up_2-1 = "喉が渇いたら、言ってくださいね。\n……いつでも隣でサポートしますから。"
10053-CVGroup_Relationship_Up_3-1 = "体操着を着ると、やる気がどんどん湧いてきます。\nこれは服装のせいでしょうか、それとも……\n先生がそばにいるから？"
10053-CVGroup_Relationship_Up_4-1 = "先生と一緒にいると、私の計算能力が鈍ってしまう時があります。\nご、誤解しないでくださいね。\nその……頭がちょっとぼーっとするって意味です……。"
10053-CVGroup_Tactic_In_1-1 = "たしかに、動きやすくはありますけど……。"
10053-CVGroup_Tactic_In_2-1 = "計算完了。\n絶対に、負けません。"
10053-CVGroup_Tactic_Victory_1-1 = "予測通り。\n完璧～。"
10053-CVGroup_Tactic_Victory_2-1 = "すでに答えは出ていたわ。\n私はそれを検算しただけ。"
