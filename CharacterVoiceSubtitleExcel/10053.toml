[translation]
10053-CVGroup_Battle_Buffed_1-1 = "Ah, obrigada!"
10053-CVGroup_Battle_Covered_1-1 = "Vou me esconder!\nPreciso de apoio!"
10053-CVGroup_Battle_Defense_1-1 = "Como se isso fosse me acertar, não é?"
10053-CVGroup_Battle_In_1-1 = "Prestem atenção nas variáveis diferentes do habitual... Avante!"
10053-CVGroup_Battle_In_2-1 = "Minha condição está perfeita!\nO resultado já estava decidido!"
10053-CVGroup_Battle_Move_1-1 = "Qual é o próximo alvo?"
10053-CVGroup_Battle_Move_2-1 = "Em direção ao alvo, avante!"
10053-CVGroup_Battle_Recovery_1-1 = "Um suprimento fora dos cálculos... Agradeço!"
10053-CVGroup_Battle_TacticalAction_1-1 = "Vou para a próxima!"
10053-CVGroup_Battle_Victory_1-1 = "Como calculado, um resultado natural."
10053-CVGroup_Battle_Victory_2-1 = "O exercício também... foi perfeito!"
10053-CVGroup_CommonSkill-1 = "Haa... Depois de recuperar o fôlego, vamos nessa!"
10053-CVGroup_ExSkill_1-1 = "Vamos, vamos juntos!"
10053-CVGroup_ExSkill_2-1 = "Mostre a eles o poder tecnológico de Millennium!"
10053-CVGroup_ExSkill_3-1 = "Vamos, é hora de acordar!"
10053-CVGroup_ExSkill_Level_1-1 = "Rapidamente!"
10053-CVGroup_ExSkill_Level_2-1 = "Por aqui!"
10053-CVGroup_ExSkill_Level_3-1 = "U-uau... É mais rápido do que eu pensava...!"
10053-CVGroup_Formation_In_1-1 = "Essa é a escolha ideal."
10053-CVGroup_Formation_In_2-1 = "É hora da prova."
10053-CVGroup_Formation_Select-1 = "O que achou?\nÉ ativo e racional, não é?"
10053-CVGroup_Growup_1-1 = "Roupas de ginástica são trajes eficientes, não são?\nO Sensei não acha o mesmo?"
10053-CVGroup_Growup_2-1 = "E-eu fico sem jeito quando você me encara assim...\nMas, bem... se é o Sensei... tudo bem."
10053-CVGroup_Growup_3-1 = "Sinto-me como se tivesse renascido!\n...Embora seja só porque ficou mais fácil de se mover."
10053-CVGroup_Growup_4-1 = "Não acho que vou perder desta vez também.\nPorque meus cálculos são perfeitos!"
10053-CVGroup_Relationship_Up_1-1 = "Não exagere, é proibido se forçar.\nSensei, tome cuidado também.\n...Eu também costumo me forçar? Ugh, é verdade, mas..."
10053-CVGroup_Relationship_Up_2-1 = "Se sentir sede, me avise.\n...Estarei sempre ao seu lado para dar suporte."
10053-CVGroup_Relationship_Up_3-1 = "Quando visto roupas de ginástica, minha motivação aumenta.\nSerá por causa da roupa, ou será porque...\nO Sensei está por perto?"
10053-CVGroup_Relationship_Up_4-1 = "Às vezes, quando estou com o Sensei, minha capacidade de cálculo diminui.\nN-não me entenda mal.\nÉ que... minha cabeça fica um pouco aérea..."
10053-CVGroup_Tactic_In_1-1 = "Certamente, é mais fácil de se mover, mas..."
10053-CVGroup_Tactic_In_2-1 = "Cálculo concluído.\nEu definitivamente não vou perder."
10053-CVGroup_Tactic_Victory_1-1 = "Como previsto.\nPerfeito~."
10053-CVGroup_Tactic_Victory_2-1 = "A resposta já tinha sido encontrada.\nEu apenas conferi os cálculos."
