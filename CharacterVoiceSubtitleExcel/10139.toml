10139-CVGroup_Relationship_Up_4-1 = "SRT特殊学園はなくなっちゃいましたが……\n先生がお傍にいてくださったから、今があります。ありがとうございます。"
10139-CVGroup_Tactic_In_1-1 = "FOX2、待機中です。"
