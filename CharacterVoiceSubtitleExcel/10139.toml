[translation]
10139-CVGroup_Battle_Buffed_1-1 = "Obrigada por me dar essa... força."
10139-CVGroup_Battle_Defense_1-1 = "Não vou deixar encostar num fio de cabelo seu..."
10139-CVGroup_Battle_In_1-1 = "Iniciando as preliminares do combate."
10139-CVGroup_Battle_In_2-1 = "FOX2... entrando fundo agora."
10139-CVGroup_Battle_Move_1-1 = "Trocando de posição. Vem atrás de mim."
10139-CVGroup_Battle_Move_2-1 = "Tudo limpo... e seguro pra gente brincar."
10139-CVGroup_Battle_Recovery_1-1 = "Ufufu, o seu vigor é sempre tão impressionante."
10139-CVGroup_Battle_TacticalAction_1-1 = "Qual é o próximo corpo que eu vou derrubar?"
10139-CVGroup_Battle_Victory_1-1 = "A sua 'liderança' me deixou completamente exausta... foi perfeito."
10139-CVGroup_Battle_Victory_2-1 = "FOX2, terminamos o serviço. Tô toda suada..."
10139-CVGroup_CommonSkill-1 = "Danger Close... Distância de segurança garantida.\n...Iniciando o bombardeio quente!"
10139-CVGroup_ExSkill_1-1 = "Vem cá, estica bem essa mãozona pra mim."
10139-CVGroup_ExSkill_2-1 = "A mamãe chegou, não precisa mais prender o gemido."
10139-CVGroup_ExSkill_3-1 = "Vim te salvar. Ainda tem energia pra se mexer?"
10139-CVGroup_ExSkill_Level_1-1 = "Disparando fumaça! Vamos suar no escurinho!"
10139-CVGroup_ExSkill_Level_2-1 = "Hora de devolver o castigo... com juros."
10139-CVGroup_ExSkill_Level_3-1 = "Relaxe. Essa fumaça vai esconder tudo o que a gente fizer aqui."
10139-CVGroup_Formation_In_1-1 = "FOX2, o meu corpo já está quentinho e pronto pra você."
10139-CVGroup_Formation_In_2-1 = "Eu chego lá (e em você) rapidinho."
10139-CVGroup_Formation_Select-1 = "A marmita tá pronta. E eu sou a sobremesa, tá?"
10139-CVGroup_Growup_1-1 = "Obrigada por me 'ajudar' com tanta intensidade sempre. Fico toda arrepiada."
10139-CVGroup_Growup_2-1 = "Todo esse suor vai garantir que eu aguente o tranco ainda mais na próxima, né?"
10139-CVGroup_Growup_3-1 = "Tudo o que o senhor derramou em mim...\nO meu corpo nunca vai esquecer."
10139-CVGroup_Growup_4-1 = "（Pra servir de exemplo pras calouras, eu preciso rebolar... quer dizer, me esforçar ainda mais...）"
10139-CVGroup_Relationship_Up_1-1 = "Ufufu... O senhor realmente é um adulto com fetiches muito peculiares."
10139-CVGroup_Relationship_Up_2-1 = "Quando a tensão acumular... e não der mais pra segurar, sussurra no meu ouvido.\nA mamãe Niko aguenta tudo o que você tiver pra descarregar."
10139-CVGroup_Relationship_Up_3-1 = "Como recompensa pelo seu esforço... por favor, pode abrir a boca e engolir.\nOs Inarizushis especiais e suculentos da mamãe."
10139-CVGroup_Relationship_Up_4-1 = "A Academia SRT pode até ter fechado as portas...\nMas com o seu corpo coladinho no meu, a minha vontade de lutar tá mais forte do que nunca. Obrigada, meu amor."
10139-CVGroup_Tactic_In_1-1 = "FOX2, na cama... digo, na escuta e aguardando."
10139-CVGroup_Tactic_In_2-1 = "Infiltração na zona alvo concluída. O que vamos fazer no escuro?"
10139-CVGroup_Tactic_Victory_1-1 = "O clímax da missão foi perfeito. Suamos bastante."
10139-CVGroup_Tactic_Victory_2-1 = "Trabalho duro concluído!\nQuando a gente voltar... Você quer comer a janta... Tomar um banho... Ou prefere devorar... a mim~?"