[translation]
10139-CVGroup_Battle_Buffed_1-1 = "Obrigada."
10139-CVGroup_Battle_Defense_1-1 = "Não vou deixar."
10139-CVGroup_Battle_In_1-1 = "Iniciando combate."
10139-CVGroup_Battle_In_2-1 = "FOX2, entrando em posição."
10139-CVGroup_Battle_Move_1-1 = "Movendo para o ponto."
10139-CVGroup_Battle_Move_2-1 = "Área limpa."
10139-CVGroup_Battle_Recovery_1-1 = "Hehe, que reconfortante."
10139-CVGroup_Battle_TacticalAction_1-1 = "Qual é o próximo alvo?"
10139-CVGroup_Battle_Victory_1-1 = "Foi uma liderança perfeita."
10139-CVGroup_Battle_Victory_2-1 = "FOX2, missão cumprida."
10139-CVGroup_CommonSkill-1 = "Danger Close... garantindo distância de segurança.\n...Iniciando bombardeio!"
10139-CVGroup_ExSkill_1-1 = "Aqui, estenda a mão."
10139-CVGroup_ExSkill_2-1 = "Eu cheguei, então já está tudo bem."
10139-CVGroup_ExSkill_3-1 = "Vim te ajudar. Consegue se mover?"
10139-CVGroup_ExSkill_Level_1-1 = "Suporte de cortina de fumaça, iniciando!"
10139-CVGroup_ExSkill_Level_2-1 = "É hora do contra-ataque."
10139-CVGroup_ExSkill_Level_3-1 = "Está tudo bem. Essa poeira vai nos proteger."
10139-CVGroup_Formation_In_1-1 = "FOX2, estamos prontas."
10139-CVGroup_Formation_In_2-1 = "Estarei aí em breve."
10139-CVGroup_Formation_Select-1 = "Eu também trouxe o almoço, viu."
10139-CVGroup_Growup_1-1 = "Obrigada por sempre me ajudar. Fico muito feliz."
10139-CVGroup_Growup_2-1 = "Seria bom se pudéssemos ficar mais fortes com o esforço que dedicamos, não é?"
10139-CVGroup_Growup_3-1 = "Tudo o que recebi do Sensei...\nEu jamais esquecerei."
10139-CVGroup_Growup_4-1 = "(Preciso me esforçar mais para ser um bom exemplo para as minhas veteranas...)"
10139-CVGroup_Relationship_Up_1-1 = "Hehe... você é um adulto estranho, afinal."
10139-CVGroup_Relationship_Up_2-1 = "Quando estiver sofrendo... quando não aguentar mais, me conte em segredo.\nEu cuidarei de você, Sensei."
10139-CVGroup_Relationship_Up_3-1 = "Como forma de agradecimento... se quiser, por favor, coma isto.\nÉ o meu Inari especial."
10139-CVGroup_Relationship_Up_4-1 = "A Academia Especial SRT pode ter acabado, mas...\nGraças ao fato de você estar ao meu lado, Sensei, eu estou aqui hoje. Obrigada."
10139-CVGroup_Tactic_In_1-1 = "FOX2, em espera."
10139-CVGroup_Tactic_In_2-1 = "Chegamos à área alvo."
10139-CVGroup_Tactic_Victory_1-1 = "Operação concluída. Bom trabalho."
10139-CVGroup_Tactic_Victory_2-1 = "Bom trabalho! \nQuando voltarmos, quer comer? Ou prefere um banho?"
