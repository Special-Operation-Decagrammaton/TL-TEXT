10139-CVGroup_Battle_Victory_1-1 = "完璧な指揮でしたね。"
10139-CVGroup_Battle_Victory_2-1 = "FOX2、任務完了です。"
10139-CVGroup_CommonSkill-1 = "Danger Close……安全距離、確保。\n……爆撃開始！"
10139-CVGroup_ExSkill_1-1 = "こっち、手を伸ばして。"
10139-CVGroup_ExSkill_2-1 = "私が来たから、もう大丈夫。"
