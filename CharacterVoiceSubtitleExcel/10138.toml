[translation]
10138-CVGroup_Battle_Buffed_1-1 = "H-hum, que efeito estranho."
10138-CVGroup_Battle_Covered_1-1 = "U-uma pausa, rapidinho!"
10138-CVGroup_Battle_Defense_1-1 = "Isso não funciona em mim!"
10138-CVGroup_Battle_In_1-1 = "Humph, não pense que vai me enganar tão facilmente!"
10138-CVGroup_Battle_In_2-1 = "Pode aparecer, fantasma ou o que quer que seja!\nEu vou provar que você não existe!"
10138-CVGroup_Battle_Move_1-1 = "Daqui para frente... não vai acontecer nada de estranho, né?"
10138-CVGroup_Battle_Move_2-1 = "Dá para ver algo ali... o que será?"
10138-CVGroup_Battle_Recovery_1-1 = "Ah! Obrigada!"
10138-CVGroup_Battle_TacticalAction_1-1 = "Ei!"
10138-CVGroup_Battle_Victory_1-1 = "Não há falhas no meu raciocínio lógico!"
10138-CVGroup_Battle_Victory_2-1 = "Que papo de ocultismo o quê. Francamente."
10138-CVGroup_CommonSkill-1 = "É uma peça única, então trate com cuidado!"
10138-CVGroup_ExSkill_1-1 = "Q-quem está aí!?"
10138-CVGroup_ExSkill_2-1 = "A-algo se moveu ali, não foi!?"
10138-CVGroup_ExSkill_3-1 = "N-não fique se escondendo, apareça logo!"
10138-CVGroup_ExSkill_Level_1-1 = "Eu não vou ser enganada!!"
10138-CVGroup_ExSkill_Level_2-1 = "Você não consegue passar a perna em mim!"
10138-CVGroup_ExSkill_Level_3-1 = "Vou desvendar tudo isso!!"
10138-CVGroup_Formation_In_1-1 = "P-para onde você está me levando...?"
10138-CVGroup_Formation_In_2-1 = "Anda, vai na frente. Eu vou te seguir."
10138-CVGroup_Formation_Select-1 = "SHAA!! M-me coloca no chão, seu Sensei idiota!"
10138-CVGroup_Growup_1-1 = "Não vou ficar satisfeita com isso. Vou continuar crescendo sempre.\nAté o dia em que me tornarei a melhor designer de moda de Kivotos!"
10138-CVGroup_Growup_2-1 = "Ah! Tive uma ideia de design incrível!\nDepois eu mostro para você, Sensei."
10138-CVGroup_Growup_3-1 = "Se eu continuar avançando um passo de cada vez assim...\nAlgum dia eu também...!"
10138-CVGroup_Growup_4-1 = "P-por que...? Sinto minha mente tão clara...\nSerá que isso também é ocultismo...?"
10138-CVGroup_Relationship_Up_1-1 = "E-eu não acredito em destino, tá bom!\nÉ sério!"
10138-CVGroup_Relationship_Up_2-1 = "C-como você sabe do que eu gosto?\nIsso não é... telepatia, né?"
10138-CVGroup_Relationship_Up_3-1 = "Sinto como se... tivessem lançado um feitiço em mim...\nMesmo que eu não acredite em ocultismo..."
10138-CVGroup_Relationship_Up_4-1 = "Não é que eu não goste de ser tratada assim, mas...\nUghhh...!"
10138-CVGroup_Tactic_In_1-1 = "N-não tem nada de estranho por aqui, né?"
10138-CVGroup_Tactic_In_2-1 = "Humph, não tenho medo de superstições!"
10138-CVGroup_Tactic_Victory_1-1 = "O quê? Não foi nada demais."
10138-CVGroup_Tactic_Victory_2-1 = "No fim, era só um boato mesmo."
