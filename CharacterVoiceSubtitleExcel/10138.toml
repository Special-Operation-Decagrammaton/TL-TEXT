[translation]
10138-CVGroup_Battle_Buffed_1-1 = "Х-ха, какой странный эффект."
10138-CVGroup_Battle_Covered_1-1 = "Э-эй, сделай перерыв!"
10138-CVGroup_Battle_Defense_1-1 = "На меня это не подействует!"
10138-CVGroup_Battle_In_1-1 = "Хмф, не думай, что меня так легко обмануть!"
10138-CVGroup_Battle_In_2-1 = "Призраки или кто вы там, выходите! Я докажу, что вы не существуете!"
10138-CVGroup_Battle_Move_1-1 = "Впереди ведь не произойдёт ничего странного... верно?"
10138-CVGroup_Battle_Move_2-1 = "Я что-то вижу вооон там, но... что это?"
10138-CVGroup_Battle_Recovery_1-1 = "Ах! Спасибо тебе!"
10138-CVGroup_Battle_TacticalAction_1-1 = "Эй!"
10138-CVGroup_Battle_Victory_1-1 = "В моём логическом мышлении нет изъянов!"
10138-CVGroup_Battle_Victory_2-1 = "Вот вам и весь оккультизм. Честное слово."
10138-CVGroup_CommonSkill-1 = "Это уникальная вещь, так что береги её как следует!"
10138-CVGroup_ExSkill_1-1 = "К-кто здесь!?"
10138-CVGroup_ExSkill_2-1 = "Ч-что-то только что шевельнулось!?"
10138-CVGroup_ExSkill_3-1 = "Д-не прячься, выходи!?"
10138-CVGroup_ExSkill_Level_1-1 = " Меня не обмануть!!"
10138-CVGroup_ExSkill_Level_2-1 = "Тебе не удастся пустить мне пыль в глаза!?"
10138-CVGroup_ExSkill_Level_3-1 = "Я всё выведу на чистую воду!!"
10138-CVGroup_Formation_In_1-1 = "К-куда ты меня тащишь...?"
10138-CVGroup_Formation_In_2-1 = "Ладно уж, веди. Я пойду за тобой."
10138-CVGroup_Formation_Select-1 = "Фрр!! П-поставь меня на место, Сенсей-дурак!"
10138-CVGroup_Growup_1-1 = "Я не удовлетворюсь малым. Я продолжу расти. До тех пор, пока не стану лучшим дизайнером одежды в Кивотосе!"
10138-CVGroup_Growup_2-1 = "Ах! Мне только что пришёл в голову отличный дизайн! Я покажу его тебе позже, Сенсей."
10138-CVGroup_Growup_3-1 = "Если я продолжу двигаться вперёд вот так, шаг за шагом... когда-нибудь я...!"
10138-CVGroup_Growup_4-1 = "П-почему...? В голове так прояснилось... Неужели это... чертовщина какая-то?"
10138-CVGroup_Relationship_Up_1-1 = "Я-я не верю в судьбу! Я серьёзно!"
10138-CVGroup_Relationship_Up_2-1 = "К-как ты узнал, что мне нравится? Это ведь не... телепатия, да?"
10138-CVGroup_Relationship_Up_3-1 = "Такое чувство... будто меня заколдовали... хотя я вообще не верю во всю эту мистику..."
10138-CVGroup_Relationship_Up_4-1 = "Не то чтобы мне не нравилось такое отношение, но... Угх-х-х...!"
10138-CVGroup_Tactic_In_1-1 = "Здесь ведь нет ничего... странного, правда?"
10138-CVGroup_Tactic_In_2-1 = "Хмф, я не боюсь никаких суеверий!"
10138-CVGroup_Tactic_Victory_1-1 = "Что? Да в этом вообще не было ничего особенного."
10138-CVGroup_Tactic_Victory_2-1 = "Так я и знала, что это всего лишь слухи."