[translation]
10138-CVGroup_Battle_Buffed_1-1 = "ふ、不思議な効果がするのね。"
10138-CVGroup_Battle_Covered_1-1 = "ちょっ、ちょっと休憩！"
10138-CVGroup_Battle_Defense_1-1 = "効かないよ！"
10138-CVGroup_Battle_In_1-1 = "ふんっ、簡単に騙されると思わないでよね！"
10138-CVGroup_Battle_In_2-1 = "幽霊でも何でも出てきなさいよ！\nいないって証明してやるんだから！"
10138-CVGroup_Battle_Move_1-1 = "この先って、なんか変なこと起きたり……しないよね？"
10138-CVGroup_Battle_Move_2-1 = "あそこ、何か見えるけど……なんだろ。"
10138-CVGroup_Battle_Recovery_1-1 = "あっ！ありがとう！"
10138-CVGroup_Battle_TacticalAction_1-1 = "やあっ！"
10138-CVGroup_Battle_Victory_1-1 = "私の論理的思考に、隙はないっ！"
10138-CVGroup_Battle_Victory_2-1 = "何がオカルトよ。まったくもう。"
10138-CVGroup_CommonSkill-1 = "一点ものなんだから、大事にしてよね！"
10138-CVGroup_ExSkill_1-1 = "だっ、誰っ！？"
10138-CVGroup_ExSkill_2-1 = "な、何か動いたんだけど！？"
10138-CVGroup_ExSkill_3-1 = "か、隠れてないで出てきなさい！？"
10138-CVGroup_ExSkill_Level_1-1 = "騙されないんだから！！"
10138-CVGroup_ExSkill_Level_2-1 = "私の目はごまかせないわよ！？"
10138-CVGroup_ExSkill_Level_3-1 = "全部解き明かしてやる！！"
10138-CVGroup_Formation_In_1-1 = "ど、どこへ連れてくつもり……？"
10138-CVGroup_Formation_In_2-1 = "ほら、前行って。ついてってあげるから。"
10138-CVGroup_Formation_Select-1 = "シャーッ！！お、下ろしなさいよバカ先生！"
10138-CVGroup_Growup_1-1 = "こんなところで満足なんかしない。私はずっと成長を続けるの。\nキヴォトス最高のファッションデザイナーになる、その日まで！"
10138-CVGroup_Growup_2-1 = "あっ！いいデザイン思いついた！\n後で先生にも見せてあげるわね。"
10138-CVGroup_Growup_3-1 = "こんな風に一歩ずつ進んでいけば……\nいつか私も……！"
10138-CVGroup_Growup_4-1 = "な、何で……？なんか、頭の中がスッキリしてる……。\nもしかして、これもオカルト……？"
10138-CVGroup_Relationship_Up_1-1 = "わ、私は運命とか信じてないの！\n本当だってば！"
10138-CVGroup_Relationship_Up_2-1 = "なっ、何で私の好きなもの知ってるの？\nテレパシー……とかじゃ、ないよね？"
10138-CVGroup_Relationship_Up_3-1 = "なんか……呪文をかけられたみたい……。\nオカルトなんて、信じてないのに……。"
10138-CVGroup_Relationship_Up_4-1 = "そういう風に接されるの、嫌、じゃないけど……。\nうぅ～～～……！"
10138-CVGroup_Tactic_In_1-1 = "へ、変なものとか……ないよね？"
10138-CVGroup_Tactic_In_2-1 = "ふんっ、迷信なんて怖くないんだから！"
10138-CVGroup_Tactic_Victory_1-1 = "なに？大したことなかったじゃん。"
10138-CVGroup_Tactic_Victory_2-1 = "やっぱただの噂だったんだ。"
