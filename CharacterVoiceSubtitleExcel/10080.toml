[translation]
10080-CVGroup_CommonSkill-1 = "Eu não sou do tipo que se mexe sozinha."
10080-CVGroup_ExSkill_1-1 = "Hmm... você tem certeza mesmo?"
10080-CVGroup_ExSkill_2-1 = "Eu não pretendia chegar a esse ponto, mas..."
10080-CVGroup_ExSkill_3-1 = "Sério, você não tem jeito mesmo."
10080-CVGroup_ExSkill_Level_1-1 = "No fim, sempre acaba assim, né?"
10080-CVGroup_ExSkill_Level_2-1 = "Eu não te avisei?"
10080-CVGroup_ExSkill_Level_3-1 = "Pode fazer como quiser, tá?"
10080-CVGroup_Growup_1-1 = "Talvez não seja ruim, né?\nE então... o que você quer que eu faça?"
10080-CVGroup_Growup_2-1 = "Eu não costumo ficar devendo favores, mas...\nVou me lembrar disso."
10080-CVGroup_Growup_3-1 = "Sinto como se minha mente estivesse mais clara."
10080-CVGroup_Growup_4-1 = "Sinto que ficou mais fácil usar minhas habilidades.\n...Hm? Se está curioso, quer testar?"
10080-CVGroup_Relationship_Up_1-1 = "Você trata todo mundo assim?\nUfufu... isso deve ser um grande carisma, hein."
10080-CVGroup_Relationship_Up_2-1 = "Hmm... será que isso é porque você é o 'Sensei'?"
10080-CVGroup_Relationship_Up_3-1 = "Às vezes eu penso em dar uma espiadinha no que se passa na sua cabeça, sabe?\n...Ah, não se preocupe, eu ainda não fiz isso."
10080-CVGroup_Relationship_Up_4-1 = "Ei...\nNão está sendo gentil demais com uma estranha?"
10080-CVGroup_Battle_Buffed_1-1 = "Isso ajuda bastante."
10080-CVGroup_Battle_Covered_1-1 = "Ora, ora."
10080-CVGroup_Battle_Defense_1-1 = "Que perda de tempo, não acha?"
10080-CVGroup_Battle_In_1-1 = "Bem, é só uma ajudinha, viu."
10080-CVGroup_Battle_In_2-1 = "Acho que vou tentar um pouquinho."
10080-CVGroup_Battle_Move_1-1 = "Ainda tem mais...?"
10080-CVGroup_Battle_Move_2-1 = "Isso ainda não acabou...?"
10080-CVGroup_Battle_Recovery_1-1 = "Obrigada☆"
10080-CVGroup_Battle_TacticalAction_1-1 = "Ah...!"
10080-CVGroup_Battle_Victory_1-1 = "Foi uma luta bem tranquila, né☆"
10080-CVGroup_Battle_Victory_2-1 = "Vou cobrar esse favor de você depois, viu?"
10080-CVGroup_Formation_In_1-1 = "Eu não sou do tipo que fica na linha de frente, sabe."
10080-CVGroup_Formation_In_2-1 = "Se você diz que é necessário, eu faço."
10080-CVGroup_Formation_Select-1 = "Hmm~?"
10080-CVGroup_Tactic_In_1-1 = "Ora, você também faz esse tipo de coisa?"
10080-CVGroup_Tactic_In_2-1 = "Que bom que estou de bom humor hoje, né?"
10080-CVGroup_Tactic_Victory_1-1 = "Eu me esforcei bastante, sabe...\nNão tem nenhuma recompensa para mim~?"
10080-CVGroup_Tactic_Victory_2-1 = "Eu não disse que não conseguia, viu☆"
