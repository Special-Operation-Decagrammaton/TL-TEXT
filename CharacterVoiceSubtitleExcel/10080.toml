[translation]
10080-CVGroup_CommonSkill-1 = "自分で動くタイプじゃないの。"
10080-CVGroup_ExSkill_1-1 = "ふーん……本当に、大丈夫？"
10080-CVGroup_ExSkill_2-1 = "ここまでするつもりはなかったけどぉ……。"
10080-CVGroup_ExSkill_3-1 = "ホント、しょうがないんだから。"
10080-CVGroup_ExSkill_Level_1-1 = "結局こうなっちゃうのよねぇ。"
10080-CVGroup_ExSkill_Level_2-1 = "だからぁ、言ったじゃない？"
10080-CVGroup_ExSkill_Level_3-1 = "好きにやってちょうだぁい？"
10080-CVGroup_Growup_1-1 = "悪くないかもぉ？\nそれで……私は、何をすればいいのかしら？"
10080-CVGroup_Growup_2-1 = "借りは作らない主義だけどぉ……\n覚えておくわね。"
10080-CVGroup_Growup_3-1 = "頭がスッキリするって感じ？"
10080-CVGroup_Growup_4-1 = "なんだか、能力を使いやすくなったかもぉ。\n……ん？気になるなら試してみる？"
10080-CVGroup_Relationship_Up_1-1 = "あなたって他の人にもこんな感じなのぉ？\nうふふ……これはきっと相当な人気力ね。"
10080-CVGroup_Relationship_Up_2-1 = "ふぅん……これも「先生」だからかしら？"
10080-CVGroup_Relationship_Up_3-1 = "たまには頭の中を覗きたいなぁ、と思っているのよぉ？\n……あっ、まだやってないから心配しないでちょうだい。"
10080-CVGroup_Relationship_Up_4-1 = "ちょっと……\nよそ者相手にやりすぎじゃないかしら？"
10080-CVGroup_Battle_Buffed_1-1 = "助かるわぁ。"
10080-CVGroup_Battle_Covered_1-1 = "あらあら。"
10080-CVGroup_Battle_Defense_1-1 = "無駄なことをするのね？"
10080-CVGroup_Battle_In_1-1 = "まっ、あくまでお手伝いだしぃ。"
10080-CVGroup_Battle_In_2-1 = "ちょっとだけ、やってみようかしら。"
10080-CVGroup_Battle_Move_1-1 = "まだいるのぉ……？"
10080-CVGroup_Battle_Move_2-1 = "まだ終わらないのぉ……？"
10080-CVGroup_Battle_Recovery_1-1 = "ありがと☆"
10080-CVGroup_Battle_TacticalAction_1-1 = "っ……！"
10080-CVGroup_Battle_Victory_1-1 = "余裕力って感じの戦いだったゾ☆"
10080-CVGroup_Battle_Victory_2-1 = "この借りは、後で全部返してもらうわよぉ？"
10080-CVGroup_Formation_In_1-1 = "前に出るタイプじゃないんだけどなぁ。"
10080-CVGroup_Formation_In_2-1 = "必要って言うなら、やってあげるけどぉ。"
10080-CVGroup_Formation_Select-1 = "ふぅ～ん？"
10080-CVGroup_Tactic_In_1-1 = "あら、こんなこともするの？"
10080-CVGroup_Tactic_In_2-1 = "今日は機嫌が良くて助かったわねぇ？"
10080-CVGroup_Tactic_Victory_1-1 = "結構頑張ったんだけど……\n何かご褒美は無いのかしら～？"
10080-CVGroup_Tactic_Victory_2-1 = "できない、とは言ってないゾ☆"
