[translation]
10087-CVGroup_Battle_Buffed_1-1 = "Obrigada pelo apoio!"
10087-CVGroup_Battle_Covered_1-1 = "Ufa, me escondi."
10087-CVGroup_Battle_Defense_1-1 = "É inútil!"
10087-CVGroup_Battle_In_1-1 = "Fufu, por favor, grave bem o meu desempenho."
10087-CVGroup_Battle_In_2-1 = "Muito bem, vamos executar a operação."
10087-CVGroup_Battle_Move_1-1 = "Vamos lá, podemos ir?"
10087-CVGroup_Battle_Move_2-1 = "Para o próximo local."
10087-CVGroup_Battle_Recovery_1-1 = "Ah, muito obrigada!"
10087-CVGroup_Battle_TacticalAction_1-1 = "Movendo-me para o próximo ponto."
10087-CVGroup_Battle_Victory_1-1 = "Fufu, foi um desempenho digno de uma administradora!"
10087-CVGroup_Battle_Victory_2-1 = "O que achou?\nEu me esforcei bastante."
10087-CVGroup_CommonSkill-1 = "Não vou deixar você escapar!"
10087-CVGroup_ExSkill_1-1 = "……Como esperado, era isso mesmo."
10087-CVGroup_ExSkill_2-1 = "Pessoal, assumam suas posições!"
10087-CVGroup_ExSkill_3-1 = "Vou eliminar os fatores de risco!"
10087-CVGroup_ExSkill_Level_1-1 = "Não há brechas na nossa rede de cerco!"
10087-CVGroup_ExSkill_Level_2-1 = "Pessoal, vamos lidar com isso com precisão!"
10087-CVGroup_ExSkill_Level_3-1 = "Achou mesmo que conseguiria escapar do Comitê Disciplinar?!"
10087-CVGroup_Formation_In_1-1 = "Sim! Vamos nessa."
10087-CVGroup_Formation_In_2-1 = "Deixe comigo."
10087-CVGroup_Formation_Select-1 = "Se precisar de algo,\npor favor, não hesite em me pedir."
10087-CVGroup_Growup_1-1 = "Seu apoio constante. Obrigada…… fufu."
10087-CVGroup_Growup_2-1 = "Dei mais um passo no meu crescimento.\nSe estou me tornando alguém em quem você pode confiar, então estou satisfeita."
10087-CVGroup_Growup_3-1 = "……Obrigada, Sensei.\n……Sabe, eu sempre sou grata a você, viu?"
10087-CVGroup_Growup_4-1 = "Mais um passo à frente.\nPrometo ser uma assistente ainda mais perfeita para você, agora que cresci."
10087-CVGroup_Relationship_Up_1-1 = "De novo, é?\n……Ora, não vou mais ficar agitada por causa disso.\nObserve só."
10087-CVGroup_Relationship_Up_2-1 = "Ah…… N-não. Eu não estou nem um pouco abalada. De jeito nenhum.\nMesmo que estejamos mais próximos que o normal, não sinto nada de especial!"
10087-CVGroup_Relationship_Up_3-1 = "Você sempre consegue entrar no coração das pessoas sem que elas percebam,\nque tipo de pessoa é você…\n……Isso é injusto. Sério, é muito injusto."
10087-CVGroup_Relationship_Up_4-1 = "Como eu disse antes……\nNão é como se eu odiasse você, Sensei.\n……Aquelas palavras foram sinceras, sem mentiras."
10087-CVGroup_Tactic_In_1-1 = "Sim, vamos começar a operação.\nSensei, por favor, assuma o comando."
10087-CVGroup_Tactic_In_2-1 = "Eu irei pessoalmente ao campo de batalha.\nSensei, por favor, cuide do suporte."
10087-CVGroup_Tactic_Victory_1-1 = "Oh, estou surpresa.\nEu não imaginava que o comando do Sensei fosse tão bom assim."
10087-CVGroup_Tactic_Victory_2-1 = "Sim, foi uma coordenação perfeita.\nFufu, valeu a pena eu ter ido ao campo de batalha."
