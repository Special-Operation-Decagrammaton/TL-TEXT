[translation]
10109-CVGroup_Battle_Buffed_1-1 = "その方向でいきましょう。"
10109-CVGroup_Battle_Covered_1-1 = "援護を、お願いします。"
10109-CVGroup_Battle_Defense_1-1 = "効きませんよ？"
10109-CVGroup_Battle_In_1-1 = "寝る前の軽い運動は、睡眠の質を向上させるといいます。"
10109-CVGroup_Battle_In_2-1 = "早く終わらせて寝ましょう。"
10109-CVGroup_Battle_Move_1-1 = "こちらの整理は終わりました。"
10109-CVGroup_Battle_Move_2-1 = "ターゲットは向こうですね。"
10109-CVGroup_Battle_Recovery_1-1 = "ありがとうございます。"
10109-CVGroup_Battle_TacticalAction_1-1 = "次です。"
10109-CVGroup_Battle_Victory_1-1 = "良い息抜きになりました。"
10109-CVGroup_Battle_Victory_2-1 = "今日の記録はここまで。お疲れ様でした。"
10109-CVGroup_CommonSkill-1 = "ふかふかですね……"
10109-CVGroup_ExSkill_1-1 = "お静かに、と、お伝えしたと思うのですが……"
10109-CVGroup_ExSkill_2-1 = "読後の余韻に浸るには……不向きな場所ですね。"
10109-CVGroup_ExSkill_3-1 = "ふふ、私も参加いたします。"
10109-CVGroup_ExSkill_Level_1-1 = "ふぅ、ようやく静かに。"
10109-CVGroup_ExSkill_Level_2-1 = "では、読書に戻らせていただきます。"
10109-CVGroup_ExSkill_Level_3-1 = "ふふっ、スッキリしました。"
10109-CVGroup_Formation_In_1-1 = "あら……急用でしょうか？"
10109-CVGroup_Formation_In_2-1 = "夜のお散歩ですか？お供いたします。"
10109-CVGroup_Formation_Select-1 = "あら……？\n大胆なんですね、ふふっ。"
10109-CVGroup_Growup_1-1 = "未知との出会いはいつだって……\n驚きとワクワクをくれるんです。"
10109-CVGroup_Growup_2-1 = "今後もご指導ご鞭撻のほど、\nよろしくお願いいたしますね。先生。"
10109-CVGroup_Growup_3-1 = "ふふ、これも記録しなければ。"
10109-CVGroup_Growup_4-1 = "はい、たしかに、受け取りました。\nありがとうございます。"
10109-CVGroup_Relationship_Up_1-1 = "……もう、記録だけでは、満足できそうにありません。"
10109-CVGroup_Relationship_Up_2-1 = "この瞬間が、このまま止まってしまえばいいのに。記録のように。"
10109-CVGroup_Relationship_Up_3-1 = "私は先生のすべてを……記録に残したいんです。"
10109-CVGroup_Relationship_Up_4-1 = "この先も先生を記録し続けられるよう、\nずっとそこに、いてくださいね。"
10109-CVGroup_Tactic_In_1-1 = "問題児の出現を確認。\n指揮は……お任せいたします。"
10109-CVGroup_Tactic_In_2-1 = "ゆっくりついてきてくださいね。"
10109-CVGroup_Tactic_Victory_1-1 = "先生はいつも記録の中の姿とお変わりありませんね。\nふふっ、本日もお疲れ様でした。"
10109-CVGroup_Tactic_Victory_2-1 = "はい、帰りましょうか。\n戻ったら、ぐっすり眠れるお茶を淹れますね。"
