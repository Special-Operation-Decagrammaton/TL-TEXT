[translation]
10109-CVGroup_Battle_Buffed_1-1 = "Vamos seguir nessa direção."
10109-CVGroup_Battle_Covered_1-1 = "Por favor, me dê cobertura."
10109-CVGroup_Battle_Defense_1-1 = "Isso não funciona em mim, sabia?"
10109-CVGroup_Battle_In_1-1 = "Dizem que um exercício leve antes de dormir melhora a qualidade do sono."
10109-CVGroup_Battle_In_2-1 = "Vamos terminar logo para podermos dormir."
10109-CVGroup_Battle_Move_1-1 = "Já terminei de organizar as coisas por aqui."
10109-CVGroup_Battle_Move_2-1 = "O alvo está naquela direção, certo?"
10109-CVGroup_Battle_Recovery_1-1 = "Muito obrigada."
10109-CVGroup_Battle_TacticalAction_1-1 = "Próximo."
10109-CVGroup_Battle_Victory_1-1 = "Foi um bom momento de descanso."
10109-CVGroup_Battle_Victory_2-1 = "O registro de hoje termina aqui. Bom trabalho."
10109-CVGroup_CommonSkill-1 = "É tão fofinho..."
10109-CVGroup_ExSkill_1-1 = "Eu avisei para ficarem em silêncio, não avisei?..."
10109-CVGroup_ExSkill_2-1 = "Este não é um lugar... adequado para apreciar o final de uma leitura."
10109-CVGroup_ExSkill_3-1 = "Fufu, eu também vou participar."
10109-CVGroup_ExSkill_Level_1-1 = "Ufa, finalmente um pouco de silêncio."
10109-CVGroup_ExSkill_Level_2-1 = "Bem, vou voltar à minha leitura."
10109-CVGroup_ExSkill_Level_3-1 = "Fufu, me sinto renovada."
10109-CVGroup_Formation_In_1-1 = "Ora... é algo urgente?"
10109-CVGroup_Formation_In_2-1 = "Um passeio noturno? Eu acompanharei você."
10109-CVGroup_Formation_Select-1 = "Ora...? Você é bem ousado, fufu."
10109-CVGroup_Growup_1-1 = "Encontros com o desconhecido sempre trazem... surpresas e emoção."
10109-CVGroup_Growup_2-1 = "Conto com sua orientação e apoio daqui em diante também, Sensei."
10109-CVGroup_Growup_3-1 = "Fufu, preciso registrar isso também."
10109-CVGroup_Growup_4-1 = "Sim, recebi com sucesso. Muito obrigada."
10109-CVGroup_Relationship_Up_1-1 = "...Sabe, acho que apenas registrar já não é o suficiente para mim."
10109-CVGroup_Relationship_Up_2-1 = "Eu queria que este momento parasse no tempo. Assim como em um registro."
10109-CVGroup_Relationship_Up_3-1 = "Eu quero... registrar tudo sobre você, Sensei."
10109-CVGroup_Relationship_Up_4-1 = "Para que eu possa continuar registrando você daqui em diante, por favor, fique sempre por perto."
10109-CVGroup_Tactic_In_1-1 = "Confirmei o surgimento de um encrenqueiro. O comando... deixo com você."
10109-CVGroup_Tactic_In_2-1 = "Por favor, venha devagar atrás de mim."
10109-CVGroup_Tactic_Victory_1-1 = "Você continua exatamente como nos meus registros, Sensei. Fufu, bom trabalho hoje."
10109-CVGroup_Tactic_Victory_2-1 = "Sim, vamos voltar? Quando chegarmos, vou preparar um chá para você dormir profundamente."
