[translation]
20005-CVGroup_CommonSkill-1 = "É uma bomba do Peroro-sama por tempo limitado!"
20005-CVGroup_ExSkill_1-1 = "C-calma, por favor!\nCrusader-chan!"
20005-CVGroup_ExSkill_2-1 = "Uaa, uwaaa!?"
20005-CVGroup_ExSkill_3-1 = "V-vai cair!?"
20005-CVGroup_ExSkill_Level_1-1 = "E-estou indo!"
20005-CVGroup_ExSkill_Level_2-1 = "Ah, ué, o manche..."
20005-CVGroup_ExSkill_Level_3-1 = "T-tanque, avançar!"
20005-CVGroup_Formation_In_1-1 = "Vamos nadar agora?"
20005-CVGroup_Formation_In_2-1 = "É um dia perfeito para umas férias, não é?"
20005-CVGroup_Formation_Select-1 = "Hyaaa!?"
20005-CVGroup_Growup_1-1 = "Ehehe... será que com isso eu deixei de ser um pouco sem graça?"
20005-CVGroup_Growup_2-1 = "Eu vou me esforçar ainda mais!"
20005-CVGroup_Growup_3-1 = "Se for sobre praticar natação, eu treinei bastante!"
20005-CVGroup_Growup_4-1 = "Pelo Peroro-sama...!"
20005-CVGroup_Relationship_Up_1-1 = "Poder estar com o Sensei assim, este verão com certeza será a melhor das lembranças!"
20005-CVGroup_Relationship_Up_2-1 = "Se estiver com o Sensei, nem o fundo do mar é assustador!"
20005-CVGroup_Relationship_Up_3-1 = "De alguma forma... meu coração está disparado."
20005-CVGroup_Relationship_Up_4-1 = "Sensei, por favor, fique comigo no verão do ano que vem também!"
