[translation]
20005-CVGroup_CommonSkill-1 = "期間限定、ペロロ様爆弾です！"
20005-CVGroup_ExSkill_1-1 = "お、落ち着いてください！\nクルセイダーちゃん！"
20005-CVGroup_ExSkill_2-1 = "わっ、うわわっ？"
20005-CVGroup_ExSkill_3-1 = "お、落ちるっ！？"
20005-CVGroup_ExSkill_Level_1-1 = "い、行きます！"
20005-CVGroup_ExSkill_Level_2-1 = "あ、あれ、操縦桿が……！"
20005-CVGroup_ExSkill_Level_3-1 = "せ、戦車前進です！"
20005-CVGroup_Formation_In_1-1 = "今から泳ぎに行くんですか？"
20005-CVGroup_Formation_In_2-1 = "バカンスにはピッタリの日ですね！"
20005-CVGroup_Formation_Select-1 = "ひゃあっ！？"
20005-CVGroup_Growup_1-1 = "えへへ……これで私も少しくらい、\n地味ではなくなったでしょうか？"
20005-CVGroup_Growup_2-1 = "私、もっと頑張ります！"
20005-CVGroup_Growup_3-1 = "泳ぎの練習でしたら、いっぱいしてきました！"
20005-CVGroup_Growup_4-1 = "ペロロ様のためなら……！"
20005-CVGroup_Relationship_Up_1-1 = "こうして先生と一緒にいられて、\n今年の夏は最高の思い出になりそうです！"
20005-CVGroup_Relationship_Up_2-1 = "先生と一緒なら、深い海の底でも怖くありません！"
20005-CVGroup_Relationship_Up_3-1 = "なんだか……胸がドキドキします。"
20005-CVGroup_Relationship_Up_4-1 = "先生、来年の夏もまた、私と一緒にいてくださいね！"
