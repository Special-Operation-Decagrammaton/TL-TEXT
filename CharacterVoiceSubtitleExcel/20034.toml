[translation]
20034-CVGroup_CommonSkill-1 = "スペシャルな一発、いきますよ～？"
20034-CVGroup_ExSkill_1-1 = "フフッ。運転は慣れてるんですよ～？"
20034-CVGroup_ExSkill_2-1 = "フフッ。楽しいですね～"
20034-CVGroup_ExSkill_3-1 = "うーん……走りましょうか～"
20034-CVGroup_ExSkill_Level_1-1 = "あら？もったいないですね……。"
20034-CVGroup_ExSkill_Level_2-1 = "安全第一、ですよ～？"
20034-CVGroup_ExSkill_Level_3-1 = "緊急停止！\nなんでもないですよ～？"
20034-CVGroup_Formation_In_1-1 = "ワクワク、してますか～？"
20034-CVGroup_Formation_In_2-1 = "楽しみにしていてください、フフッ。"
20034-CVGroup_Formation_Select-1 = "お正月は美味しいものにあふれてますね、色々と★"
20034-CVGroup_Growup_1-1 = "私がどこまで食べられるか……\nいえ、どこまで成長できるか、見守っていてくださいね★"
20034-CVGroup_Growup_2-1 = "まだまだ食べられますよ～？\n新年は美味しいものがい～っぱいですからね！\n味わわないともったいないです★"
20034-CVGroup_Growup_3-1 = "ふふ……この先、どんなスペシャルメニューに出会えるのでしょう～？\n楽しみですね、先生！"
20034-CVGroup_Growup_4-1 = "先生といると、た～くさん新鮮な体験ができるんです。\nでも、もっ～と新しい体験も……してみたいかも？"
20034-CVGroup_Relationship_Up_1-1 = "先生、どこか行きたい場所はありますか～？\n運転でしたら、私にお任せください。"
20034-CVGroup_Relationship_Up_2-1 = "食事は生きる上で最も重要といっても過言ではありません。\nでもそれよりも重要なものだって世の中には……\n……あるのかな？ないのかな？フフッ。"
20034-CVGroup_Relationship_Up_3-1 = "せっかくの晴れ着ですから、先生に見てもらいたい気持ちが……\nあったり……なかったり？フフッ。"
20034-CVGroup_Relationship_Up_4-1 = "分かってます。先生が生徒を大切に思うのは、当たり前のこと……\nでも……先生、実は私、「普通」ってあまり好きじゃないんです★"
