[translation]
20034-CVGroup_CommonSkill-1 = "Um golpe especial, lá vou eu~?"
20034-CVGroup_ExSkill_1-1 = "Fufu. Estou acostumada a dirigir, sabe~?"
20034-CVGroup_ExSkill_2-1 = "Fufu. É divertido, não é~"
20034-CVGroup_ExSkill_3-1 = "Hmm... vamos rodar por aí~"
20034-CVGroup_ExSkill_Level_1-1 = "Ora? Que desperdício..."
20034-CVGroup_ExSkill_Level_2-1 = "Segurança em primeiro lugar, viu~?"
20034-CVGroup_ExSkill_Level_3-1 = "Parada de emergência!\nNão foi nada, viu~?"
20034-CVGroup_Formation_In_1-1 = "Está animado~?"
20034-CVGroup_Formation_In_2-1 = "Por favor, aguarde ansiosamente, fufu."
20034-CVGroup_Formation_Select-1 = "O Ano Novo é cheio de coisas deliciosas, de todos os tipos★"
20034-CVGroup_Growup_1-1 = "O quanto eu consigo comer...\nNão, o quanto eu consigo crescer, por favor, fique de olho em mim★"
20034-CVGroup_Growup_2-1 = "Ainda consigo comer muito mais~?\nO Ano Novo é cheio de coisas deliciosas!\nSeria um desperdício não aproveitar tudo★"
20034-CVGroup_Growup_3-1 = "Fufu... que tipo de menu especial será que encontraremos daqui para frente~?\nEstou ansiosa, Sensei!"
20034-CVGroup_Growup_4-1 = "Quando estou com o Sensei, posso ter muitas experiências novas.\nMas... talvez eu queira ter experiências ainda mais novas?"
20034-CVGroup_Relationship_Up_1-1 = "Sensei, tem algum lugar para onde queira ir~?\nSe for para dirigir, pode deixar comigo."
20034-CVGroup_Relationship_Up_2-1 = "Não é exagero dizer que comer é a coisa mais importante para viver.\nMas será que existem coisas ainda mais importantes no mundo...\n...ou será que não? Fufu."
20034-CVGroup_Relationship_Up_3-1 = "Já que estou com este traje festivo, eu queria que o Sensei me visse...\nOu será que não? Fufu."
20034-CVGroup_Relationship_Up_4-1 = "Eu entendo. É natural que o Sensei se importe com seus alunos...\nMas... Sensei, na verdade, eu não gosto muito de ser \"comum\"★"
