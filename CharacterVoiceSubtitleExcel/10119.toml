[translation]
10119-CVGroup_Battle_Buffed_1-1 = "Estão confiando em mim... com certeza."
10119-CVGroup_Battle_Defense_1-1 = "É só isso?"
10119-CVGroup_Battle_In_1-1 = "Vamos lá."
10119-CVGroup_Battle_In_2-1 = "Vou mostrar o poder da Hyakkiyako."
10119-CVGroup_Battle_Move_1-1 = "Não baixem a guarda."
10119-CVGroup_Battle_Move_2-1 = "Ainda não acabou."
10119-CVGroup_Battle_Recovery_1-1 = "Obrigada."
10119-CVGroup_Battle_TacticalAction_1-1 = "Vamos nos apressar."
10119-CVGroup_Battle_Victory_1-1 = "Ainda há muitas baixas."
10119-CVGroup_Battle_Victory_2-1 = "Não podemos nos deixar levar pelo excesso de confiança."
10119-CVGroup_CommonSkill-1 = "Com isso, está perfeito."
10119-CVGroup_ExSkill_1-1 = "Se for para salvar a todos...!"
10119-CVGroup_ExSkill_2-1 = "Eu... continuarei atuando.\nO papel de Misaki Nagusa...!"
10119-CVGroup_ExSkill_3-1 = "...O medo de perder a todos é maior!"
10119-CVGroup_ExSkill_Level_1-1 = "Isto é... o melhor que posso fazer."
10119-CVGroup_ExSkill_Level_2-1 = "Eu não vou recuar de jeito nenhum!"
10119-CVGroup_ExSkill_Level_3-1 = "Vamos lá, com honra — ao combate!"
10119-CVGroup_Formation_In_1-1 = "...Eu irei."
10119-CVGroup_Formation_In_2-1 = "...Farei o meu melhor."
10119-CVGroup_Formation_Select-1 = "Hii!? ...Sensei, aconteceu alguma coisa?"
10119-CVGroup_Growup_1-1 = "Este é realmente o meu poder? ...Obrigada, Sensei."
10119-CVGroup_Growup_2-1 = "Quem sabe...? Eu só estou fazendo o meu melhor o tempo todo."
10119-CVGroup_Growup_3-1 = "Eu ainda tinha esse poder guardado...\nObrigada, graças ao Sensei eu pude perceber."
10119-CVGroup_Growup_4-1 = "Ainda não é o suficiente... preciso me esforçar mais.\nObrigada por me ensinar, Sensei."
10119-CVGroup_Relationship_Up_1-1 = "A neve derrete quando toca no calor, mas...\nSe eu puder ficar ao lado do Sensei, talvez isso não importe."
10119-CVGroup_Relationship_Up_2-1 = "Eu não tenho nada além de ser uma garota bonita...\nPor que você me trata com tanta gentileza...?"
10119-CVGroup_Relationship_Up_3-1 = "...Mesmo assim, agradeço do fundo do meu coração.\nComo sou uma garota bonita de expressão fria, talvez não pareça."
10119-CVGroup_Relationship_Up_4-1 = "As mãos do Sensei são quentes."
10119-CVGroup_Tactic_In_1-1 = "Chegamos à área da operação."
10119-CVGroup_Tactic_In_2-1 = "Posso não parecer confiável, mas... quero que acredite em mim."
10119-CVGroup_Tactic_Victory_1-1 = "Terminou sem problemas.\nGraças a todos... obrigada."
10119-CVGroup_Tactic_Victory_2-1 = "Isso é o esperado...\nNa verdade, eu poderia ter feito mais."
