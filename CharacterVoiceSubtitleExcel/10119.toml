[translation]
10119-CVGroup_Battle_Buffed_1-1 = "信頼されているんだよね……きっと。"
10119-CVGroup_Battle_Defense_1-1 = "この程度なの？"
10119-CVGroup_Battle_In_1-1 = "行こうか。"
10119-CVGroup_Battle_In_2-1 = "百花繚乱の力、見せてあげる。"
10119-CVGroup_Battle_Move_1-1 = "警戒を怠らないで。"
10119-CVGroup_Battle_Move_2-1 = "まだ終わってない。"
10119-CVGroup_Battle_Recovery_1-1 = "ありがとう。"
10119-CVGroup_Battle_TacticalAction_1-1 = "急ごう。"
10119-CVGroup_Battle_Victory_1-1 = "まだ、被害が多い。"
10119-CVGroup_Battle_Victory_2-1 = "慢心してはダメ。"
10119-CVGroup_CommonSkill-1 = "これで完璧。"
10119-CVGroup_ExSkill_1-1 = "みんなを助けられるのなら……！"
10119-CVGroup_ExSkill_2-1 = "私は……演じ続ける。\n御稜ナグサという役を……！"
10119-CVGroup_ExSkill_3-1 = "……皆を失うことの方が、怖いの！"
10119-CVGroup_ExSkill_Level_1-1 = "これが……私にできる最善。"
10119-CVGroup_ExSkill_Level_2-1 = "絶対に引き下がりはしない！"
10119-CVGroup_ExSkill_Level_3-1 = "いざ尋常に――勝負！"
10119-CVGroup_Formation_In_1-1 = "……私が行こうか。"
10119-CVGroup_Formation_In_2-1 = "……最善を尽くすよ。"
10119-CVGroup_Formation_Select-1 = "ひぅ！？……先生、何かあったの？"
10119-CVGroup_Growup_1-1 = "本当にこれが、私の力なの？……ありがとう、先生。"
10119-CVGroup_Growup_2-1 = "どうだろう……？ずっと、最善を尽くしているだけ。"
10119-CVGroup_Growup_3-1 = "まだこんな力が残っていたんだ……\nありがとう、先生のおかげで気づけた。"
10119-CVGroup_Growup_4-1 = "まだ足りない……もっと、頑張らないと。\n教えてくれてありがとう、先生。"
10119-CVGroup_Relationship_Up_1-1 = "雪は熱に触れると溶けてしまうけど……\n先生のそばにいられるのなら、それでもいいかな。"
10119-CVGroup_Relationship_Up_2-1 = "私って、美人なところしか取り柄がないのに……\nどうしてこんな風に優しくしてくれるの……？"
10119-CVGroup_Relationship_Up_3-1 = "……これでも、心から感謝しているの。\n無表情系美少女だから、そうは見えないかもしれないけど。"
10119-CVGroup_Relationship_Up_4-1 = "先生の手、あったかいね。"
10119-CVGroup_Tactic_In_1-1 = "作戦地域に到着。"
10119-CVGroup_Tactic_In_2-1 = "頼りないかもしれないけど……信じてほしい。"
10119-CVGroup_Tactic_Victory_1-1 = "無事に終わったね。\nみんなのおかげ……ありがとう。"
10119-CVGroup_Tactic_Victory_2-1 = "これくらい当然……\n本当なら、もっとできたのに。"
