[translation]
13000-CVGroup_Battle_Buffed_1-1 = "あら、ありがとうございます。"
13000-CVGroup_Battle_Covered_1-1 = "うふふ、良い位置ですね。"
13000-CVGroup_Battle_Defense_1-1 = "うふふ。"
13000-CVGroup_Battle_In_1-1 = "お任せください。\nご主人様とご一緒することこそ、私のやりがいですから。"
13000-CVGroup_Battle_In_2-1 = "さあ、みなさん。\nキレイに、気持ちよく、殲滅してさしあげます。"
13000-CVGroup_Battle_Move_1-1 = "ふふ、ここも綺麗になりましたね。"
13000-CVGroup_Battle_Move_2-1 = "次の掃除に向かいましょうか？"
13000-CVGroup_Battle_Recovery_1-1 = "あら、気が利きますね。"
13000-CVGroup_Battle_TacticalAction_1-1 = "よいしょっ。"
13000-CVGroup_Battle_Victory_1-1 = "ご主人様に勝利をプレゼントすること。\nそれが私の責任であり任務です。"
13000-CVGroup_Battle_Victory_2-1 = "すべては、ご主人様のために。"
13000-CVGroup_CommonSkill-1 = "あら。そちらにいらっしゃいましたか。"
13000-CVGroup_ExSkill_1-1 = "ご主人様の邪魔者を排除する。"
13000-CVGroup_ExSkill_2-1 = "あら、それでは掃除を始めましょうか？"
13000-CVGroup_ExSkill_3-1 = "ご覧になって。\n標的は……消えますよ。"
13000-CVGroup_ExSkill_Level_1-1 = "優雅に、排除いたします。"
13000-CVGroup_ExSkill_Level_2-1 = "みなさん。お掃除、お願いしますね。"
13000-CVGroup_ExSkill_Level_3-1 = "丁寧にお願いいたしますね。さようなら。"
13000-CVGroup_Formation_In_1-1 = "さあ、それではご奉仕を始めましょうか。"
13000-CVGroup_Formation_In_2-1 = "ご主人様に愛を、敵には鉄槌を。\nそれがC&Cのご奉仕なんです。"
13000-CVGroup_Formation_Select-1 = "誠心誠意、お仕えします。"
13000-CVGroup_Growup_1-1 = "これでより、完璧なご奉仕が……可能になりましたね。"
13000-CVGroup_Growup_2-1 = "アカネは、ご主人様のご期待にお応えします。"
13000-CVGroup_Growup_3-1 = "ご期待くださいご主人様。\nこれからのアカネは、ひと味違いますから。"
13000-CVGroup_Growup_4-1 = "これからのアカネはきっと……\nご主人様を100%満足させられることでしょう。"
13000-CVGroup_Relationship_Up_1-1 = "C&Cのアカネ。\n謹んでご主人様にご奉仕を捧げます。"
13000-CVGroup_Relationship_Up_2-1 = "あら……私を心配してくださるのですか？\nふふっ。嬉しいです。"
13000-CVGroup_Relationship_Up_3-1 = "どうしてでしょう。笑いが止まりません。\nご主人様がそばにいるから、でしょうか？"
13000-CVGroup_Relationship_Up_4-1 = "ご主人様が先生だからご奉仕しているわけではありません。\nご主人様だから、私はメイドになれました。"
13000-CVGroup_Tactic_In_1-1 = "なるほど。見事なご判断です。"
13000-CVGroup_Tactic_In_2-1 = "さあ。それでは始めましょうか？\nお掃除の時間です。"
13000-CVGroup_Tactic_Victory_1-1 = "優雅に勝利すること。\nそれが私の責任であり義務です。"
13000-CVGroup_Tactic_Victory_2-1 = "さすが、私のご主人様ですね。"
