[translation]
13000-CVGroup_Battle_Buffed_1-1 = "Ora, muito obrigada."
13000-CVGroup_Battle_Covered_1-1 = "Ufufu, uma boa posição."
13000-CVGroup_Battle_Defense_1-1 = "Ufufu."
13000-CVGroup_Battle_In_1-1 = "Deixe comigo.\nEstar ao lado do mestre é o que dá sentido ao meu trabalho."
13000-CVGroup_Battle_In_2-1 = "Muito bem, pessoal.\nVamos exterminá-los de forma limpa e satisfatória."
13000-CVGroup_Battle_Move_1-1 = "Fufu, este lugar também ficou limpo."
13000-CVGroup_Battle_Move_2-1 = "Devemos seguir para a próxima limpeza?"
13000-CVGroup_Battle_Recovery_1-1 = "Ora, que atencioso."
13000-CVGroup_Battle_TacticalAction_1-1 = "Ei."
13000-CVGroup_Battle_Victory_1-1 = "Presentear o mestre com a vitória.\nEssa é a minha responsabilidade e o meu dever."
13000-CVGroup_Battle_Victory_2-1 = "Tudo pelo mestre."
13000-CVGroup_CommonSkill-1 = "Ora. Você estava aí?"
13000-CVGroup_ExSkill_1-1 = "Eliminar os obstáculos do mestre."
13000-CVGroup_ExSkill_2-1 = "Ora, então vamos começar a limpeza?"
13000-CVGroup_ExSkill_3-1 = "Observe.\nO alvo... vai desaparecer."
13000-CVGroup_ExSkill_Level_1-1 = "Vou eliminar com elegância."
13000-CVGroup_ExSkill_Level_2-1 = "Pessoal, por favor, cuidem da limpeza."
13000-CVGroup_ExSkill_Level_3-1 = "Por favor, façam com cuidado. Adeus."
13000-CVGroup_Formation_In_1-1 = "Muito bem, vamos começar o serviço."
13000-CVGroup_Formation_In_2-1 = "Amor ao mestre, e o martelo aos inimigos.\nEsse é o serviço da C&C."
13000-CVGroup_Formation_Select-1 = "Servirei com toda a minha sinceridade."
13000-CVGroup_Growup_1-1 = "Com isso, um serviço ainda mais perfeito... tornou-se possível."
13000-CVGroup_Growup_2-1 = "Akane atenderá às expectativas do mestre."
13000-CVGroup_Growup_3-1 = "Espere por mim, mestre.\nA Akane de agora é um pouco diferente."
13000-CVGroup_Growup_4-1 = "A Akane de agora certamente...\nserá capaz de satisfazer o mestre em 100%."
13000-CVGroup_Relationship_Up_1-1 = "Akane da C&C.\nDedico respeitosamente meu serviço ao mestre."
13000-CVGroup_Relationship_Up_2-1 = "Ora... você está preocupado comigo?\nFufu. Fico feliz."
13000-CVGroup_Relationship_Up_3-1 = "Por que será? Não consigo parar de sorrir.\nSerá porque o mestre está por perto?"
13000-CVGroup_Relationship_Up_4-1 = "Não estou servindo porque o mestre é o sensei.\nFoi por ser você, mestre, que pude me tornar uma empregada."
13000-CVGroup_Tactic_In_1-1 = "Entendo. Uma decisão brilhante."
13000-CVGroup_Tactic_In_2-1 = "Muito bem. Vamos começar?\nÉ hora da limpeza."
13000-CVGroup_Tactic_Victory_1-1 = "Vencer com elegância.\nEssa é a minha responsabilidade e o meu dever."
13000-CVGroup_Tactic_Victory_2-1 = "Como esperado do meu mestre."
