[translation]
20024-CVGroup_CommonSkill-1 = "お口に合うと良いのですが。"
20024-CVGroup_ExSkill_1-1 = "素敵なティータイムに音楽は欠かせませんね。"
20024-CVGroup_ExSkill_2-1 = "礼砲は略式で。\nですが、敬意をお忘れなく。"
20024-CVGroup_ExSkill_3-1 = "たまにはフレーバーを変えるのも悪くないですね。"
20024-CVGroup_ExSkill_Level_1-1 = "砲手、支援を。"
20024-CVGroup_ExSkill_Level_2-1 = "お客様のお見送りも、丁寧に。"
20024-CVGroup_ExSkill_Level_3-1 = "トリニティの砲撃術は優秀ですから。"
20024-CVGroup_Formation_In_1-1 = "ふふ、今日は少し遠くまで足を伸ばしてみましょうか。"
20024-CVGroup_Formation_In_2-1 = "食後の運動にちょうど良いですね。"
20024-CVGroup_Growup_1-1 = "先生のお言葉、心に刻んでまいります。"
20024-CVGroup_Growup_2-1 = "ふふ。この力があれば、\nティーパーティーのホストとして不足はないでしょう。"
20024-CVGroup_Growup_3-1 = "なるほど、そういう方法が……。"
20024-CVGroup_Growup_4-1 = "先生にはいただいてばかりですね……\nありがとうございます。"
20024-CVGroup_Relationship_Up_1-1 = "先生とのティータイムは……\nなんだか普段よりお茶を楽しむ時間が長くなってしまいます。"
20024-CVGroup_Relationship_Up_2-1 = "美味しい紅茶が恋しくなりましたら、\nいつでもティーパーティーにお越しください。\nお待ちしております。"
20024-CVGroup_Relationship_Up_3-1 = "ふふ、いつもお気遣いいただき、ありがとうございます。"
20024-CVGroup_Relationship_Up_4-1 = "先生のお心遣いに感謝を。\nトリニティの生徒一同を代表し、お礼申し上げます。"
