[translation]
20024-CVGroup_CommonSkill-1 = "Espero que seja do seu agrado."
20024-CVGroup_ExSkill_1-1 = "Música é indispensável para uma bela hora do chá, não é?"
20024-CVGroup_ExSkill_2-1 = "Uma salva de tiros simplificada.\nMas não se esqueça de prestar suas homenagens."
20024-CVGroup_ExSkill_3-1 = "Mudar o sabor de vez em quando não é nada mal."
20024-CVGroup_ExSkill_Level_1-1 = "Artilheiro, dê suporte."
20024-CVGroup_ExSkill_Level_2-1 = "Despeça-se dos convidados com elegância também."
20024-CVGroup_ExSkill_Level_3-1 = "A artilharia de Trinity é excelente, afinal."
20024-CVGroup_Formation_In_1-1 = "Fufu, que tal nos aventurarmos um pouco mais longe hoje?"
20024-CVGroup_Formation_In_2-1 = "É um ótimo exercício pós-refeição."
20024-CVGroup_Growup_1-1 = "Guardarei as palavras do Sensei em meu coração."
20024-CVGroup_Growup_2-1 = "Fufu. Com este poder,\nnão faltará nada para eu ser uma anfitriã do Chá da Tarde."
20024-CVGroup_Growup_3-1 = "Entendo, existe um método assim..."
20024-CVGroup_Growup_4-1 = "Eu só recebo coisas do Sensei...\nMuito obrigada."
20024-CVGroup_Relationship_Up_1-1 = "A hora do chá com o Sensei...\nDe alguma forma, acabo aproveitando o chá por mais tempo que o habitual."
20024-CVGroup_Relationship_Up_2-1 = "Se sentir saudades de um bom chá,\nvenha ao Chá da Tarde a qualquer momento.\nEstarei esperando."
20024-CVGroup_Relationship_Up_3-1 = "Fufu, obrigada por sempre ser tão atencioso."
20024-CVGroup_Relationship_Up_4-1 = "Agradeço pela consideração do Sensei.\nEm nome de todas as alunas de Trinity, expresso minha gratidão."
