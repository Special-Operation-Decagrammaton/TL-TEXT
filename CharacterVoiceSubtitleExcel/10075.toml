10075-CVGroup_Relationship_Up_1-1 = "Bem... é que, sabe... \nNessas horas, a gente tem que dizer aquela coisa, né... \nEntão, tipo... ah, não consigo!"
10075-CVGroup_Relationship_Up_2-1 = "Delírios são sempre invencíveis! \n...Mas essa situação é... real, né...? \nUaaaaaa..."
10075-CVGroup_Relationship_Up_3-1 = "Estou até impressionada. Você fez tanto por alguém como eu... \n...Obrigada, Sensei. Isso é de coração."
10075-CVGroup_Relationship_Up_4-1 = "Essa palavra, 'laço'... sinto que é usada demais para o peso que tem, mas... \n...Acho que quero valorizar o laço que tenho com você, Sensei."
10075-CVGroup_Tactic_In_1-1 = "Certo, vamos nessa."
10075-CVGroup_Tactic_In_2-1 = "Fufu... o que será que tem aqui?"
