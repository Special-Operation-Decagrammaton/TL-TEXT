10075-CVGroup_Battle_In_1-1 = "Então... vamos procurar ideias para o novo volume!"
10075-CVGroup_Battle_In_2-1 = "Muito bem... por onde devo começar?"
10075-CVGroup_Battle_Move_1-1 = "Para onde vamos agora?"
10075-CVGroup_Battle_Move_2-1 = "Acho que vou seguir em frente."
10075-CVGroup_Battle_Recovery_1-1 = "Meus olhos estão bem abertos agora!"
10075-CVGroup_Battle_TacticalAction_1-1 = "Certo, lá vou eu...!"
10075-CVGroup_Battle_Victory_1-1 = "Belo resultado! \nSerá que eu também tenho talento para isso?"
10075-CVGroup_Battle_Victory_2-1 = "Sim, sim! Que sensação boa! \nCom esse ritmo, o manuscrito também vai..."
10075-CVGroup_CommonSkill-1 = "Vai nessa!"
10075-CVGroup_ExSkill_1-1 = "I-isso é...! \nFufufufu...!"
10075-CVGroup_ExSkill_2-1 = "Chegou...! \nChegou, chegou, chegou...!"
10075-CVGroup_ExSkill_3-1 = "Ah...!? \nA inspiração...!"
10075-CVGroup_ExSkill_Level_1-1 = "Uoooooo! \nO que acha disso?!"
10075-CVGroup_ExSkill_Level_2-1 = "Yaaaaa! \nConsegui!"
10075-CVGroup_ExSkill_Level_3-1 = "Um estalo...! \nPronto, manuscrito finalizado!"
10075-CVGroup_Formation_In_1-1 = "Oh? Sinto cheiro de inspiração por aqui...!"
10075-CVGroup_Formation_In_2-1 = "Minha especialidade é desenhar, sabe?"
10075-CVGroup_Formation_Select-1 = "Ei, pare aí! \nFique nessa pose! Isso, exatamente assim."
10075-CVGroup_Growup_1-1 = "Vim, vi e fiquei mais forte!"
10075-CVGroup_Growup_2-1 = "Quem dera minhas habilidades de desenho melhorassem de forma tão clara assim também."
