[translation]
10014-CVGroup_Battle_Buffed_1-1 = "Arte Ninja! Arte da Gratidão!"
10014-CVGroup_Battle_Covered_1-1 = "Me escondi!"
10014-CVGroup_Battle_Defense_1-1 = "Isso não funciona contra a Izuna!"
10014-CVGroup_Battle_In_1-1 = "Izuna, entrando em ação!"
10014-CVGroup_Battle_In_2-1 = "Pessoal, confiem na Izuna e venham comigo!"
10014-CVGroup_Battle_Move_1-1 = "Izuna, em movimento!"
10014-CVGroup_Battle_Move_2-1 = "Correndo como uma ninja até a próxima área de operação!"
10014-CVGroup_Battle_Recovery_1-1 = "Muito obrigada!"
10014-CVGroup_Battle_TacticalAction_1-1 = "Vupt!"
10014-CVGroup_Battle_Victory_1-1 = "Vitória da Arte Ninja estilo Izuna!"
10014-CVGroup_Battle_Victory_2-1 = "Kon-kon! Vitória, vitória!"
10014-CVGroup_CommonSkill-1 = "Lá vou eu, shuriken! Ei!"
10014-CVGroup_ExSkill_1-1 = "Arte Ninja estilo Izuna!"
10014-CVGroup_ExSkill_2-1 = "Vou mostrar a minha arte ninja!"
10014-CVGroup_ExSkill_3-1 = "Ya! Arte da Cigarra!"
10014-CVGroup_ExSkill_Level_1-1 = "Evasão de emergência!"
10014-CVGroup_ExSkill_Level_2-1 = "Isso também é arte ninja...!\nMais ou menos!"
10014-CVGroup_ExSkill_Level_3-1 = "Vou desviar de tudo!"
10014-CVGroup_Formation_In_1-1 = "Se essa é a ordem do meu mestre!"
10014-CVGroup_Formation_In_2-1 = "Por favor, me dê qualquer tarefa, mestre!"
10014-CVGroup_Formation_Select-1 = "Nin-nin!\nMestre, o que a Izuna deve fazer?"
10014-CVGroup_Growup_1-1 = "Com isso, acho que poderei aprender artes ninja de nível mais alto!"
10014-CVGroup_Growup_2-1 = "Isso também é uma das graças recebidas do meu mestre!"
10014-CVGroup_Growup_3-1 = "Com certeza, vou me tornar uma ninja que consegue atender às expectativas do meu mestre!"
10014-CVGroup_Growup_4-1 = "Mais alto e mais rápido do que antes!\nA Izuna de agora talvez seja a ninja mais forte! Mestre!!"
10014-CVGroup_Relationship_Up_1-1 = "Esse coração acelerado quando estou com o mestre é...\nSenso de dever? Será?"
10014-CVGroup_Relationship_Up_2-1 = "Ficar ao lado do mestre me deixa feliz.\nSerá que essa é a alegria de uma ninja servindo ao seu senhor...?"
10014-CVGroup_Relationship_Up_3-1 = "Por favor, ordene o que quiser!\nA Izuna está aqui para cumprir as ordens do mestre!"
10014-CVGroup_Relationship_Up_4-1 = "A Izuna esteve procurando por um senhor como você por muito tempo.\nFinalmente... finalmente consegui te encontrar.\nA Izuna está muito feliz agora."
10014-CVGroup_Tactic_In_1-1 = "Missão iniciada!"
10014-CVGroup_Tactic_In_2-1 = "Vou mostrar a Arte Ninja estilo Izuna!"
10014-CVGroup_Tactic_Victory_1-1 = "Missão concluída! Hoje também fiz um trabalho perfeito como ninja!"
10014-CVGroup_Tactic_Victory_2-1 = "Dedico esta vitória ao meu mestre!"
