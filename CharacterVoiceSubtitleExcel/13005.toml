[translation]
13005-CVGroup_Battle_Buffed_1-1 = "Suporte recebido."
13005-CVGroup_Battle_Covered_1-1 = "Cobertura encontrada."
13005-CVGroup_Battle_Defense_1-1 = "Só isso?"
13005-CVGroup_Battle_In_1-1 = "Mantenham a calma, é só seguir o plano."
13005-CVGroup_Battle_In_2-1 = "Não baixem a guarda."
13005-CVGroup_Battle_Move_1-1 = "Parece que terminamos por aqui."
13005-CVGroup_Battle_Move_2-1 = "O próximo objetivo é ali, vamos nos mover."
13005-CVGroup_Battle_Recovery_1-1 = "Aceito com gratidão."
13005-CVGroup_Battle_TacticalAction_1-1 = "Mudando a formação."
13005-CVGroup_Battle_Victory_1-1 = "Escolheram o oponente errado."
13005-CVGroup_Battle_Victory_2-1 = "Nem serviu de aquecimento."
13005-CVGroup_CommonSkill-1 = "Prepare-se."
13005-CVGroup_ExSkill_1-1 = "Haa..."
13005-CVGroup_ExSkill_2-1 = "Não tem jeito, né?"
13005-CVGroup_ExSkill_3-1 = "Ufa."
13005-CVGroup_ExSkill_Level_1-1 = "Vou aproveitar esta oportunidade."
13005-CVGroup_ExSkill_Level_2-1 = "Isso deve mudar o rumo da batalha."
13005-CVGroup_ExSkill_Level_3-1 = "Vou mirar no momento do ataque."
13005-CVGroup_Formation_In_1-1 = "Estou indo."
13005-CVGroup_Formation_In_2-1 = "Se é um pedido... então eu faço."
13005-CVGroup_Formation_Select-1 = "Hmm..."
13005-CVGroup_Growup_1-1 = "Escolher a mim, de todas as pessoas...\nEspero que essa seja uma escolha estrategicamente correta."
