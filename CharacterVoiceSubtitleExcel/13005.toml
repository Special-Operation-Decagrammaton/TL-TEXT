13005-CVGroup_Relationship_Up_2-1 = "A equipe de especialistas deve dar as boas-vindas ao Sensei, provavelmente."
13005-CVGroup_Relationship_Up_3-1 = "Se for um pedido do Sensei, será sempre bem-vindo."
13005-CVGroup_Relationship_Up_4-1 = "Foi bom trabalhar com o Sensei."
13005-CVGroup_Tactic_In_1-1 = "Vamos."
13005-CVGroup_Tactic_In_2-1 = "Isso é algo simples."
13005-CVGroup_Tactic_Victory_1-1 = "Bom trabalho, Sensei."
13005-CVGroup_Tactic_Victory_2-1 = "A escolha do Sensei deu certo."
