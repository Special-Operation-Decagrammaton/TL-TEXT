34245-93 = "[ns] \"……!!\""
34245-98 = "Golconda……!!"
34245-99 = "Ah, acalmem-se. Se os assustei, peço perdão.#nEu sou Golconda, da \"Gematria\"……."
34245-100 = "――Dispensemos as apresentações.#nAfinal, talvez já tenhamos nos encontrado antes."
34245-101 = "Eu não vim lutar.#nVim levar a Madame de volta."
34245-102 = "A mim……!?"
34245-103 = "E também não tenho confiança de vencer em combate.#nNem todos da \"Gematria\" conseguem virar monstros como a Madame."
34245-104 = "Sim, Madame. Com isto, ficou claro.#n――O Sensei não é o seu adversário. Esta não é a sua história."
34245-105 = "……!!"
34245-106 = "Os incidentes que você causou, os conflitos, os tantos processos…….#nTudo isso foi rebaixado a \"algo que nem precisa ser conhecido\"."
34245-107 = "Você, longe de protagonista…… não é sequer a adversária do Sensei;#nera apenas um \"MacGuffin\", um artifício de palco."
34245-108 = "……Gh…… guuh……!!"
34245-109 = "Sensei…… quando você intervém, todos os conceitos mudam.#nO desfecho desta história, originalmente, não deveria ser este."
34245-110 = "Uma história de superar as adversidades com amizade e vencer com esforço……?#nO texto que eu desejava deveria ser algo bem mais literário……."
34245-111 = "[s] \"…….\""
34245-112 = "Hum…… perdão. Parece que o desagradei."
34245-113 = "Então, eu levo a Madame comigo.#nMadame, levante-se."
34245-118 = "Cof…… você……."
34245-119 = "[s] \"Espera……!!\""
34245-120 = "Por acaso pretende me impedir?#nPor favor, não tome uma decisão dessas, Sensei."
34245-121 = "Por exemplo…… eu posso produzir todo tipo de ferramenta.#nEssa \"bomba que destrói aureolas\" que você carrega também é obra minha."
34245-122 = "[s] \"……!!\""
34245-123 = "Ah…… claro, não pretendo detoná-la aqui.#nEm você não faz efeito e, além disso, esse experimento, no fim, parece ter sido um fracasso."
34245-124 = "Nunca se pôde confirmar, nem uma única vez, se essa bomba de fato destrói aureolas. O meu plano, decerto, não era esse……#nbom, por isso, ela será descartada."
34245-125 = "Madame, o experimento desta vez fracassou.#nVamos voltar."
34245-126 = "Golconda……!"
34245-127 = "Com licença, Sensei.#nEntão, até a próxima."
