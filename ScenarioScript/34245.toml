[translation]
34245-2 = "GUAAAAAAAH!!"
34245-3 = "Por que, como...!! Eu, a minha...!!"
34245-4 = "O meu plano... o meu território... a minha consciência..."
34245-5 = "A minha... a min-ha..."
34245-6 = "Guh... ah... ah..."
34245-13 = "Haa... haa... haa..."
34245-14 = "É, é o fim...?"
34245-18 = "Ah! A, a Princesa!!"
34245-19 = "A, Atsuko...!!"
34245-21 = "Ainda está ali!"
34245-22 = "A, ai não... v, vamos tirar a Princesa daí rápido!"
34245-32 = "P, Princesa..."
34245-37 = "Princesa... por favor, aguente firme..."
34245-38 = "P, Princesa..."
34245-39 = "...Os ferimentos são graves. Ela está perdendo muito sangue."
34245-40 = "Princesa... Atsuko... eu te imploro, abra os olhos..."
34245-41 = "Por favor... Atsuko... abra, abra os olhos..."
34245-42 = "..."
34245-43 = "..."
34245-51 = "Saori...?"
34245-52 = "Atsuko...!!"
34245-53 = "Princesa..."
34245-54 = "P, Princesa!! Você acordou!?"
34245-55 = "Sim..."
34245-56 = "Saori, Hiyori, Misaki... bom dia a todos."
34245-66 = "Atsuko...!!!"
34245-67 = "Ah, Saori...?"
34245-68 = "Que bom... de verdade, que bom..."
34245-69 = "H, hum...?"
34245-70 = "Atsuko... obrigado por estar viva...#nDe verdade, muito obrigado..."
34245-71 = "...Sim."
34245-72 = "Kuh... ugh..."
34245-73 = "Saori... não chore. Eu estou bem."
34245-74 = "O Sensei nos ajudou, não foi...?"
34245-75 = "Sim... é isso mesmo..."
34245-76 = "Obrigado, Sensei...#nAgora, está tudo bem, não é?"
34245-79 = "...Sim. Está tudo bem, Saori.#nTenho certeza de que tudo acabou."
34245-81 = "[ns] Aproxima-se de Beatrice, que está caída."
34245-85 = "K, guh..."
34245-86 = "[s] \"Acabou, Beatrice.\""
34245-87 = "Como ousa... e, eu ainda... ainda!"
34245-88 = "Não se ache só porque conseguiu atrapalhar um ritual!"
34245-89 = "Eu ainda tenho Barbara e as forças de Arius intactas!#nEu ainda possuo a habilidade de replicação!!"
34245-90 = "Não pense que isso acaba com uma simples vitória――"
34245-92 = "Não, esta história termina aqui."
34245-93 = "[ns] \"...!!\""
34245-98 = "Golconda...!!"
34245-99 = "Ah, por favor, acalme-se. Peço desculpas se o assustei.#nEu sou Golconda, da \"Gematria\"..."
34245-100 = "――Vamos pular as apresentações.#nAfinal, talvez já tenhamos nos encontrado antes."
34245-101 = "Não vim aqui para lutar.#nVim para levar a Madame de volta."
34245-102 = "A mim...!?"
34245-103 = "Além disso, não tenho confiança de que venceria em combate.#nAfinal, nem todos na 'Gematria' conseguem se transformar em monstros como a Madame."
34245-104 = "Sim, Madame. Agora está claro.#n— O Sensei não é seu antagonista. Esta não é a sua história."
34245-105 = "……！！"
34245-106 = "Os incidentes, os conflitos, todos os processos que você causou...#nForam rebaixados a 'coisas que não precisavam ser conhecidas'."
34245-107 = "Você não é a protagonista... nem mesmo uma antagonista do Sensei, você era apenas um 'dispositivo de enredo'."
34245-108 = "……Ku……Guuh……!!"
34245-109 = "Sensei... se você intervir, todos os conceitos mudarão.#nOriginalmente, o final desta história não deveria ser assim."
34245-110 = "Uma história de superar dificuldades com amizade e vencer através do esforço...?#nO texto que eu desejava deveria ser algo muito mais literário..."
34245-111 = "[s] \"…….\""
34245-112 = "Hum... peço desculpas. Parece que ofendi seus sentimentos."
34245-113 = "Sendo assim, levarei a Madame embora.#nMadame, por favor, acorde."
34245-118 = "Geho... você é..."
34245-119 = "[s] \"Espere...!!\""
34245-120 = "Por acaso pretende ficar no meu caminho?#nPor favor, não tome tal decisão, Sensei."
34245-121 = "Por exemplo... eu posso produzir várias ferramentas.#nAquela 'bomba que destrói halos' que você possui também é uma criação minha."
34245-122 = "[s] \"……!!\""
34245-123 = "Ah... claro, não pretendo explodi-la aqui.#nAlém de não ter efeito em você, aquele experimento acabou sendo um fracasso, pelo que parece."
34245-124 = "Nunca consegui confirmar se aquela bomba realmente poderia destruir um halo. Meu plano definitivamente não era esse, mas...#nBem, por isso, pretendo descartá-la."
34245-125 = "Madame, o experimento desta vez foi um fracasso.#nVamos embora."
34245-126 = "Golconda...!"
34245-127 = "Com licença, Sensei.#nAté logo."
34245-134 = "Próximo episódio: Pessoa querida"
