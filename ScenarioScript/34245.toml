[translation]
34245-2 = "GUAAAAAAAAA!!"
34245-3 = "Por que... como...!! Eu, os meus...!!"
34245-4 = "Os meus planos... o meu domínio... a minha consciência..."
34245-5 = "A minh... a miiinh... nnh..."
34245-6 = "Guh... aah... ahh..."
34245-13 = "Haa... haa... haa..."
34245-14 = "A-Acabou...?"
34245-18 = "Ah! A-A Hime-chan tá...!!"
34245-19 = "A-Atsuko...!!"
34245-21 = "Ela ainda tá lá em cima!"
34245-22 = "A-Awa... v-vamos descer a Hime-chan logo!"
34245-32 = "H-Hime-chan..."
34245-37 = "Princesa... aguenta firme..."
34245-38 = "H-Hime-chan..."
34245-39 = "...O ferimento é muito grave. Ela perdeu muito sangue."
34245-40 = "Princesa... Atsuko... por favor, abre os olhos..."
34245-41 = "Eu te imploro... Atsuko... abre, os olhos..."
34245-42 = "……"
34245-43 = "……"
34245-51 = "Saori, chan...?"
34245-52 = "Atsuko...!!"
34245-53 = "Princesa..."
34245-54 = "H-Hime-chan!! Você acordou!?"
34245-55 = "Uhum..."
34245-56 = "Saori, Hiyori, Misaki... bom dia, pessoal."
34245-66 = "Atsuko...!!!"
34245-67 = "Ah, Saori...?"
34245-68 = "Graças a deus... ainda bem... que alívio."
34245-69 = "H-Hã...?"
34245-70 = "Atsuko... obrigada por continuar viva... #nMuito obrigada... de verdade..."
34245-71 = "...É."
34245-72 = "Guh... uuh..."
34245-73 = "Saori... não chora. Eu estou bem."
34245-74 = "O Sensei ajudou vocês, não foi...?"
34245-75 = "É... foi sim..."
34245-76 = "Obrigada, Sensei... #nAgora vai ficar tudo bem, não vai?"
34245-79 = "...Sim. Vai ficar tudo bem, Saori. #nTenho certeza de que acabou."
34245-81 = "[ns] Se aproxima de Beatrice, que está caída."
34245-85 = "K-Kuh..."
34245-86 = "[s] \"É o fim da linha, Beatrice.\""
34245-87 = "Como ousa... e-eu ainda... eu ainda não...!"
34245-88 = "Não fiquem se achando só porque conseguiram interromper um mero ritual!"
34245-89 = "Ainda me resta Barbara e as tropas de Arius, completamente ilesos! #nAlém de que ainda possuo a habilidade de cópia!"
34245-90 = "Acha mesmo que uma única vitória decretaria o meu fim—"
34245-92 = "Não, esta história acaba aqui."
34245-93 = "[ns] \"...!!\""
34245-98 = "Golconda...!!"
34245-99 = "Ah, acalmem-se. Peço desculpas se os assustei. #nEu sou Golconda, do 'Gematria'..."
34245-100 = "—Vamos pular as apresentações. #nAfinal, é provável que já nos conhecemos."
34245-101 = "Não vim aqui para lutar. #nVim apenas buscar a Madame."
34245-102 = "Me buscar...!?"
34245-103 = "Além do mais, não tenho confiança de que venceria um combate. #nNem todos os membros do 'Gematria' conseguem se transformar em monstros como a Madame."
34245-104 = "Sim, Madame. Agora tudo ficou claro. #n—O Sensei não é o seu antagonista. E esta não é a sua história."
34245-105 = "...!!"
34245-106 = "Os incidentes que você causou, os conflitos, o processo em si... #nTudo isso foi rebaixado ao nível de 'detalhes irrelevantes'."
34245-107 = "Você passou longe de ser a protagonista... ou mesmo a antagonista do Sensei. #nFoi apenas uma mera 'peça de cenário'."
34245-108 = "...Kuh... Gah...!!"
34245-109 = "Sensei... quando você interfere, todos os conceitos se alteram. #nEste definitivamente não deveria ser o desfecho desta história."
34245-110 = "Uma história onde amizade supera dificuldades e o esforço triunfa...? #nO texto que eu almejava deveria ser algo muito mais literário..."
34245-111 = "[s] \"……\""
34245-112 = "Hum... queiram me perdoar. Parece que acabei ofendendo-os."
34245-113 = "Sendo assim, levarei a Madame comigo. #nMadame, levante-se."
34245-118 = "*Cof*... Você..."
34245-119 = "[s] \"Espera...!!\""
34245-120 = "Por acaso pretende tentar me impedir? #nPor favor, não tome uma atitude tão insensata, Sensei."
34245-121 = "Por exemplo... eu tenho a capacidade de produzir diversas ferramentas. #nAquela 'bomba capaz de destruir Halos' que você possui foi obra minha, por exemplo."
34245-122 = "[s] \"...!!\""
34245-123 = "Ah... naturalmente, não tenho a intenção de detoná-la aqui. #nNão faria efeito em você, e aquele experimento acabou sendo um fracasso no fim das contas."
34245-124 = "Nunca pude confirmar se aquela bomba realmente era capaz de destruir um Halo. Isso ia contra completamente os meus planos, mas... #nEnfim, pretendo descartá-la em breve."
34245-125 = "Madame, este experimento foi um fracasso. #nVamos para casa."
34245-126 = "Golconda...!"
34245-127 = "Com licença, Sensei. #nAté mais."
34245-134 = "Próximo Episódio; Pessoas Importantes"