34245-85 = "Gh, guh……"
34245-86 = "[s] \"Acabou, Beatrice.\""
34245-87 = "Como ousa…… e-eu ainda…… ainda!"
34245-88 = "Não se envaideçam por terem meramente atrapalhado o ritual!"
34245-89 = "Ainda me restam, intactas, a Bárbara e as forças de Arius!#nE a capacidade de réplica também segue comigo!!"
34245-90 = "Uma mera vitória não faz disto um fim――"
