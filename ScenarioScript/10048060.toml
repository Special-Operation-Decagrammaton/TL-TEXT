[translation]
10048060-1 = "Episódio 6; Revisão do plano"
10048060-3 = "Hum, então \"o céu rígido se distorce\" se refere ao azul-ultramar feito de lápis-lazúli, certo?"
10048060-4 = "E quanto a \"o caracol chora\"?"
10048060-6 = "Refere-se ao púrpura-de-tiro."
10048060-7 = "Hm?"
10048060-8 = "Antigamente, usava-se uma enorme quantidade de secreção de caracóis para produzir o púrpura-de-tiro."
10048060-9 = "Acho que se refere a esse processo."
10048060-10 = "Então, \"apenas o rei sorri\"... o que seria?"
10048060-11 = "Azul e roxo são cores que, desde a antiguidade, apenas a realeza podia obter."
10048060-12 = "Como eu disse, era muito difícil de fabricar e exigia muitos materiais caros."
10048060-13 = "Ou seja, \"céu rígido\" e \"o caracol chora\" são frases que indicam as cores azul e roxa..."
10048060-14 = "Por isso, acho que \"apenas o rei sorri\"."
10048060-15 = "Então... você quer dizer que o alvo é uma pintura que usa muito azul e roxo?"
10048060-16 = "Sim, exatamente."
10048060-17 = "Portanto, se pesquisarmos o catálogo novamente com base nessa informação, saberemos o alvo..."
10048060-19 = "Ei, isso não é o que está na bolsa da Fuyu-chan?"
10048060-20 = "Hm? Eu ainda não roubei nada, viu?"
10048060-21 = "......Ah."
10048060-22 = "Ah...!"
10048060-23 = "\"Quem admira o roxo e o azul\"...!"
10048060-24 = "É isso! O título já nos dava a resposta!"
10048060-25 = "[s] \"Além disso, este aqui é o verdadeiro...!\""
10048060-26 = "É isso mesmo!"
10048060-27 = "......Quem diria que já tínhamos em mãos o alvo do ladrão fantasma."
10048060-31 = "Sensei!?"
10048060-32 = "D-desde quando você está aí...!"
10048060-33 = "[s] \"A Fuyu entrou em contato comigo.\""
10048060-34 = "O nome oficial do Schale é \"Departamento Federal de Investigação\", Schale, não é?"
10048060-35 = "E nossa oponente é uma das infames Sete Prisioneiras, a Ladrã da Benevolência..."
10048060-36 = "Pensei: \"O Sensei do Schale deve saber de algo!\" e pedi ajuda."
10048060-37 = "[s] \"...Não acho que eu saiba tanto assim, na verdade.\""
10048060-38 = "Fufu. Já ajuda se você souber qualquer coisa."
10048060-39 = "Nesse caso, a situação não parece ter mudado muito..."
10048060-40 = "Não é verdade!#nO Sensei trouxe bolos de presente para nós!"
10048060-41 = "Isso já não é o suficiente?"
10048060-43 = "Está muito gostoso! Isso aqui!"
10048060-44 = "[s] \"Fufu. É ainda mais gostoso se comer na loja, sabe?\""
10048060-45 = "Olha, Miyo, experimente também.#nO Sensei entende muito de doces deliciosos."
10048060-46 = "[s] \"Para ser exato, eu conheço alguém que entende de doces...\""
10048060-47 = "Espere, o Sensei tem permissão para trazer comida e bebida?"
10048060-48 = "Parece que, se for sob o pretexto de ser um presente, visitantes podem."
10048060-49 = "Se for um presente, tudo bem...?"
10048060-50 = "Parece que estamos em uma cela de prisão..."
10048060-51 = "Talvez você não esteja tão errada assim."
10048060-52 = "Sendo assim, pensei em um negócio de fornecer comida e bebida através do Sensei, mas..."
10048060-53 = "[s] \"Não pode.\""
10048060-54 = "Ah, droga..."
10048060-58 = "[ns] \"Em vez disso, precisamos pensar logo no plano.\""
10048060-59 = "Ah, é verdade."
10048060-60 = "O problema imediato é..."
10048060-61 = "O Ladrão da Benevolência e nós temos o mesmo alvo."
10048060-62 = "『Quem ama o roxo e o azul?』……。"
10048060-63 = "Nosso objetivo é tirar isso do depósito e substituir pela obra original.#nE o ladrão está tentando roubar esse quadro."
10048060-64 = "……Isso se tornou um problema."
10048060-66 = "Não."
10048060-67 = "Acho que, na verdade, ficou mais fácil."
10048060-68 = "Em que sentido……?"
10048060-69 = "Nosso objetivo não é tirar o quadro do depósito."
10048060-70 = "É, acima de tudo, substituí-lo pela obra original."
10048060-71 = "Podemos simplesmente colocar a obra original depois que o Ladrão da Benevolência roubar a falsificação do depósito."
10048060-72 = "Não seria uma solução perfeita?"
10048060-73 = "……！！"
10048060-74 = "……！！"
10048060-75 = "Não precisamos nos dar ao trabalho de tirar a falsificação de lá."
10048060-76 = "Porque o Ladrão da Benevolência fará isso por nós."
10048060-77 = "Além disso, dizem que tudo o que o Ladrão da Benevolência rouba nunca chega ao mercado……."
10048060-78 = "Se o ladrão tiver sucesso, a falsificação desaparecerá para sempre e restará apenas a obra original."
10048060-79 = "Ou seja, até a limpeza final será feita de forma impecável."
10048060-83 = "……。"
10048060-84 = "Sempre penso nisso, mas a Miyo realmente tem talento para o crime, né?"
10048060-85 = "Isso não foi um elogio, sabia?"
10048060-86 = "Ugh…… não foi para escrever esse tipo de texto que eu escolhi cursar literatura……."
10048060-87 = "[s] \"Que tipo de história a Miyo queria escrever?\""
10048060-88 = "Ah…… bem……."
10048060-89 = "Es-esse assunto não é importante agora――"
10048060-90 = "Romances de amor."
10048060-91 = "A Miyo ficou viciada em romances e começou a escrever os seus próprios."
10048060-93 = "Aaaaaah!!#nFuyu! Fique quieta por um instante!!"
10048060-94 = "É, é verdade, mas mesmo assim!!"
10048060-95 = "[s] \"Eu adoraria ler os romances que a Miyo escreve.\""
10048060-96 = "Eu, eu, eu não vou mostrar, tá bom!?"
10048060-97 = "E além disso, o pedido atual ainda não foi resolvido!"
10048060-98 = "A decodificação da carta de aviso só avançou pela metade……."
10048060-99 = "Ah, é verdade."
10048060-100 = "Ainda tinha a segunda parte do texto, né."
10048060-101 = "「A porta se fecha e se tinge de arco-íris―― vamos nos encontrar no instante mágico」"
10048060-102 = "Hmm…… o que isso significa?"
10048060-103 = "Se a primeira parte é sobre o alvo, a segunda não seria o horário do crime?"
10048060-104 = "Faz sentido……."
10048060-110 = "Hmm……."
10048060-111 = "Por enquanto, vamos voltar para o dormitório hoje."
10048060-112 = "Seria um problema se passássemos do horário de apagar as luzes."
10048060-113 = "É verdade…… o pôr do sol ficou lindo, nem vimos o tempo passar."
10048060-114 = "Sensei, me desculpe. Mesmo você tendo vindo até aqui……."
10048060-115 = "[s] \"Está tudo bem, eu também acabei me atrasando por causa do trabalho.\""
10048060-116 = "Então, vamos te acompanhar até o portão principal."
10048060-117 = "……Espere, Fuyu. O que você acabou de dizer?"
10048060-118 = "Hm……? Horário de apagar as luzes?"
10048060-119 = "Isso foi o que eu disse."
10048060-120 = "Err…… o pôr do sol está lindo?"
10048060-122 = "Isso, é isso...! O pôr do sol!"
10048060-123 = "Hã...?"
10048060-124 = "Olhe só. De que cor está o céu agora?"
10048060-125 = "Laranja...?"
10048060-126 = "Não é só isso, olhe com atenção."
10048060-128 = "O céu do pôr do sol não tem uma cor só."
10048060-129 = "Perto do sol é laranja, mas conforme se afasta, há tons de roxo."
10048060-130 = "As nuvens finas são de um branco opaco, e as nuvens densas são azul-ultramar..."
10048060-131 = "No crepúsculo, várias cores se misturam."
10048060-133 = "“O instante mágico tingido pelo arco-íris”...!!"
10048060-134 = "Isso! A segunda parte da frase não estaria se referindo ao crepúsculo?"
10048060-135 = "Crepúsculo...!"
10048060-136 = "Ah, falando nisso!"
10048060-137 = "Esse período também é chamado de “hora mágica”, não é?"
10048060-138 = "Hora mágica?"
10048060-139 = "Sim. O momento em que o dia e a noite se cruzam, um tempo que parece mágico."
10048060-140 = "Nesse horário, as fotos ficam lindas. #nComo a luz é moderada, as sombras desaparecem."
10048060-141 = "Embora dure, no máximo, uns 20 minutos..."
10048060-142 = "Hora mágica..."
10048060-143 = "Entendo, por isso é o “instante mágico”."
10048060-144 = "Um breve momento dentro de um longo dia."
10048060-145 = "...Mas por que você sabe tanto sobre isso?"
10048060-146 = "Eu curso artes midiáticas. Também entendo um pouco de fotografia."
10048060-147 = "Ah, entendi."
10048060-148 = "Resumindo tudo até agora... isso significa que o ladrão virá ao entardecer?"
10048060-149 = "Hmm, ainda tem algo que me incomoda."
10048060-150 = "?"
10048060-151 = "Tecnicamente, existem duas horas mágicas. Antes do nascer do sol e logo antes do pôr do sol."
10048060-152 = "Por isso, não tenho certeza de qual deles ele virá."
10048060-153 = "Hmm..."
10048060-154 = "“A porta se fecha, o arco-íris se estende — o instante mágico”"
10048060-156 = "Não seria o entardecer?"
10048060-157 = "Hm?"
10048060-158 = "Nós costumamos dizer “fechar as portas”, não dizemos?"
10048060-160 = "Com isso, encerramos! Hoje já é hora de fechar as portas!"
10048060-162 = "...Hora de fechar as portas."
10048060-163 = "E o pôr do sol. A hora mágica..."
10048060-164 = "[s] \"Então, a decifração está completa...?\""
10048060-165 = "Sim, provavelmente."
10048060-166 = "Então, resumindo o conteúdo da carta de aviso..."
10048060-167 = "...Significa que ele virá buscar “quem admira o roxo e o azul” durante a hora mágica do entardecer, certo?"
10048060-173 = "...Sim. Agora temos todas as pistas."
10048060-174 = "Vou corrigir o plano."
10048060-175 = "...!"
10048060-176 = "Quando o ladrão da benevolência aparecer..."
10048060-177 = "Nós daremos todo o suporte possível a ele."
