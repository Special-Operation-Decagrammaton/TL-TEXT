[translation]
10048060-1 = "第6話;プロット修正"
10048060-3 = "えっと、「硬き空がゆがみ」は、ラピスラズリで作ったウルトラマリンを指してるんだよね？"
10048060-4 = "じゃあ「蝸牛は哭き」は？"
10048060-6 = "[ruby=かいむらさきいろ]貝紫色[/ruby]を指しています。"
10048060-7 = "ん？"
10048060-8 = "昔は貝紫色を作るために、大量のカタツムリの分泌液を使っていたんです。"
10048060-9 = "その工程を指しているのかと。"
10048060-10 = "じゃあ「王のみぞ微笑む」……は？"
10048060-11 = "青と紫の2色は、古代より王族だけが手に入れられる色。"
10048060-12 = "今言ったみたいに、製造するのが大変で、高価な材料がたくさん必要だったから。"
10048060-13 = "つまり「硬き空」と「蝸牛は哭き」は、青色と紫色を示す文章で――"
10048060-14 = "だから「王のみぞ微笑む」のだと思います。"
10048060-15 = "つまり……青と紫をたくさん使った絵を狙ってるってこと？"
10048060-16 = "はい、その通りです。"
10048060-17 = "だからこの情報を元に図録をもう一度調べれば、狙いがわか――"
10048060-19 = "ね、それってフユちゃんのカバンにあるやつじゃない？"
10048060-20 = "ん？まだ何も盗んでないよ？"
10048060-21 = "……あ。"
10048060-22 = "あっ……！"
10048060-23 = "『誰が紫、青を愛でるのか』……！"
10048060-24 = "それです！既に題名が答えを教えてくれていました！"
10048060-25 = "[s] \"しかも、こっちが本物……！\""
10048060-26 = "そうなんです！"
10048060-27 = "……まさか、怪盗のターゲットをすでに手に入れていたなんて。"
10048060-31 = "って先生！？"
10048060-32 = "い、いつからこちらに……！？"
10048060-33 = "[s] \"フユから連絡をもらってね。\""
10048060-34 = "シャーレの正式名称は「連邦捜査部」シャーレ、でしょ？"
10048060-35 = "そして私たちの相手は、あの悪名高い七囚人の一人、慈愛の怪盗……。"
10048060-36 = "シャーレの先生なら何かわかるはず！って、お願いしたんです。"
10048060-37 = "[s] \"……話せることはそんなにないとは思うけど。\""
10048060-38 = "ふふ。少しでも知ってるなら助かります。"
10048060-39 = "それじゃ、あまり状況は変わらないような……。"
10048060-40 = "そんなことないよ？#n先生は私たちにケーキの差し入れを持ってきてくれたんだから！"
10048060-41 = "これだけでも十分じゃない？"
10048060-43 = "すごくおいしいよー！これ！"
10048060-44 = "[s] \"ふふっ。お店で食べるともっと美味しいよ？\""
10048060-45 = "ほら、ミヨも食べてみて。#n先生は美味しいスイーツに詳しいんだ。"
10048060-46 = "[s] \"正確には、スイーツに詳しい子と知り合いというか……。\""
10048060-47 = "待ってください、先生は飲食物の持込みができるのですか？"
10048060-48 = "部外者は差し入れって名目ならいけるらしいよ。"
10048060-49 = "差し入れなら大丈夫……？"
10048060-50 = "なんだかまるで牢屋にいるみたい……。"
10048060-51 = "あながち間違ってないかもしれないね。"
10048060-52 = "というわけで、先生を介した飲食物の調達、なんてビジネスを考えてみたんだけど――"
10048060-53 = "[s] \"ダメです。\""
10048060-54 = "ひぃん……。"
10048060-58 = "[ns] \"それより、はやく作戦を考えなきゃ。\""
10048060-59 = "おっと、そうでした。"
10048060-60 = "目下の問題は……。"
10048060-61 = "慈愛の怪盗と私たちのターゲットが同じこと。"
10048060-62 = "『誰が紫、青を愛でるのか』……。 "
10048060-63 = "私たちはこれを収蔵庫から持ち出し、真作と入れ替えるのが目的。#nそして怪盗は、この絵を盗もうとしている。"
10048060-64 = "……面倒なことになりましたね。"
10048060-66 = "いや。 "
10048060-67 = "むしろ簡単になったと思うよ。"
10048060-68 = "どのへんがです……？"
10048060-69 = "私たちの目的は、収蔵庫から絵を持ち出すことじゃない。"
10048060-70 = "あくまで、真作とすり替えることだから。"
10048060-71 = "慈愛の怪盗が収蔵庫の贋作を盗んだ後に、真作を置けばいい。"
10048060-72 = "それで、綺麗におさまるんじゃないですか？"
10048060-73 = "……！！"
10048060-74 = "……！！"
10048060-75 = "私たちが、わざわざ苦労して贋作を持ち出す必要はないわけです。"
10048060-76 = "だって慈愛の怪盗がやってくれるんですから。"
10048060-77 = "それに、慈愛の怪盗が盗んだ物は一切世に出回らないとも聞きますし……。"
10048060-78 = "怪盗が成功さえすれば、贋作は永遠に姿を消し、残るのは真作だけ。"
10048060-79 = "後始末まですっきり終わるというわけです。"
10048060-83 = "……。"
10048060-84 = "いつも思うけど、ミヨってやっぱ犯罪の才能あるよね。"
10048060-85 = "それ、褒めてないんですけど。"
10048060-86 = "うぅぅ……こういう文章が書きたくて文学を専攻してるんじゃないのに……。"
10048060-87 = "[s] \"ミヨはどんな話が書きたかったの？\""
10048060-88 = "あ……えっと……。"
10048060-89 = "そ、その話は、今は重要じゃ――"
10048060-90 = "恋愛小説ですよ。 "
10048060-91 = "ミヨは恋愛小説にどハマりして、自分で書き始めたんです。"
10048060-93 = "わーーーっ！！#nフユ！ちょっと黙っててください！！"
10048060-94 = "た、たしかにそうですけど！！"
10048060-95 = "[s] \"読んでみたいなぁ、ミヨが書いた恋愛小説。\""
10048060-96 = "み、み、見せませんからっ！？ "
10048060-97 = "あと、今回の依頼はまだ解決してませんからね！"
10048060-98 = "予告状の解読も半分しか進んでませんし……。"
10048060-99 = "あっ、そうだった。"
10048060-100 = "まだ後半の文章があったよね。"
10048060-101 = "「戸が閉まり、虹に染まる――魔法の刹那にお会いしましょう」"
10048060-102 = "うーん……どういうこと？"
10048060-103 = "前半がターゲットのことなら、後半は犯行時刻じゃないの？"
10048060-104 = "一理あるかも……。"
10048060-110 = "うーん……。"
10048060-111 = "とりあえず、今日はもう寮に戻りましょう。"
10048060-112 = "消灯時間を過ぎたら面倒ですし。"
10048060-113 = "だね……すっかり、夕焼けが綺麗な時間になっちゃった。"
10048060-114 = "先生、ごめんなさい。せっかく来ていただいたのに……。"
10048060-115 = "[s] \"大丈夫だよ、私も仕事で遅くなっちゃったし。\""
10048060-116 = "じゃあ、正門までお送りしますよ。"
10048060-117 = "……待って、フユ。今なんて言ったんですか？"
10048060-118 = "ん……？消灯時間？"
10048060-119 = "それは私が言ったやつ。"
10048060-120 = "えーっと……夕焼けがきれい？"
10048060-122 = "そう、それ……！夕焼け！"
10048060-123 = "へ……？"
10048060-124 = "ほら見て。今の空は何色ですか？"
10048060-125 = "オレンジ……？"
10048060-126 = "違うでしょ、よく見てください。"
10048060-128 = "夕焼け空は一色じゃない。"
10048060-129 = "太陽の近くはオレンジ色でも、そこから離れたら紫色がある。"
10048060-130 = "薄い雲はくすんだ白で、分厚い雲は、群青色……。"
10048060-131 = "夕暮れ時は、いろんな色が混ざりあう。"
10048060-133 = "「虹に染まる魔法の刹那」……！！"
10048060-134 = "そう！後半の文章は、夕暮れ時を指しているんじゃないでしょうか！"
10048060-135 = "夕暮れ……！"
10048060-136 = "あっ、そういえば！"
10048060-137 = "その時間帯って「マジックアワー」とも呼ぶよね。"
10048060-138 = "マジックアワー？"
10048060-139 = "そう。昼と夜が交差する瞬間の、まるで魔法みたいな時間。"
10048060-140 = "あの時間は写真もすごく綺麗に撮れるんだ。#n適度な光量で、影が消えるから。"
10048060-141 = "ただ、長くても20分くらいしかないんだけど……。"
10048060-142 = "マジックアワー……。"
10048060-143 = "なるほど、だから「魔法の刹那」なんですね。"
10048060-144 = "長い一日の中の、一瞬の時間。"
10048060-145 = "……というかなんでそんなに詳しいんですか？"
10048060-146 = "メディアアート専攻だからね。写真も少しかじってるんだ。"
10048060-147 = "ああ、なるほど。"
10048060-148 = "今までのをまとめると……夕方に怪盗が来るということでしょうか？"
10048060-149 = "んー、まだ引っかかるなぁ。"
10048060-150 = "？"
10048060-151 = "マジックアワーは厳密に言えば二つあるんだ。日の出前と、日没の直前。"
10048060-152 = "だから、どっちに来るのかは分からない気がする。"
10048060-153 = "うーん……。"
10048060-154 = "「戸が閉まり、虹が掛かる――魔法の刹那」"
10048060-156 = "夕方の方じゃない？"
10048060-157 = "ん？"
10048060-158 = "ボクら、「扉を閉じる」って言ったりするじゃん？"
10048060-160 = "これでしゅーりょー！今日はもう扉を閉める時間だね！"
10048060-162 = "……戸を閉める時間。"
10048060-163 = "そして夕焼け。マジックアワー……。"
10048060-164 = "[s] \"じゃあ、これで解読完了……？\""
10048060-165 = "はい、おそらく。"
10048060-166 = "じゃあ、予告状の内容をまとめると……。 "
10048060-167 = "……『誰が紫、青を愛でるのか』を、夕方のマジックアワーの頃に取りに行く。ということですね？"
10048060-173 = "……うん。これで手掛かりは揃いました。"
10048060-174 = "プロットを修正します。"
10048060-175 = "……！"
10048060-176 = "慈愛の怪盗が姿を現した時……。"
10048060-177 = "私たちは、全力で怪盗をサポートします。"
