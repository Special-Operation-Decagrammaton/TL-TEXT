[translation]
10012080-1 = "Episódio 8; Combate de peso"
10012080-4 = "Haa, haa... eles são realmente incríveis... pelo menos têm determinação."
10012080-5 = "Eu queria ter descansado um pouco nas férias..."
10012080-6 = "[s1] \"Hoshino...!\"\n[s2] \"Você está bem? Não se machucou?\""
10012080-7 = "Uhe, está preocupado comigo, Sensei?"
10012080-8 = "Uhe, está preocupado comigo, Sensei?"
10012080-9 = "...Mas não precisa se preocupar. Ainda estou bem tranquila."
10012080-10 = "Além disso..."
10012080-13 = "Ufufu... finalmente poderei salvá-lo, Sensei..."
10012080-14 = "Aguente só mais um pouco. Esta situação também é muito dolorosa e difícil para mim, mas..."
10012080-15 = "Eu vou te resgatar dessas raposas ferozes imediatamente!!"
10012080-16 = "Seduzir e usar o gentil Sensei é algo que jamais será perdoado!"
10012080-17 = "Eu, Wakamo, vou pessoalmente reeducar cada uma delas!!"
10012080-20 = "...É por causa daquele estado em que elas estão."
10012080-21 = "Uhe~, não tem jeito. Acho que o tio aqui vai ter que se esforçar um pouquinho mais, né?"
10012080-22 = "...Hm?"
10012080-23 = "O que foi?"
10012080-24 = "...Ah."
10012080-25 = "O motivo de eu estar tão tranquila?"
10012080-26 = "Hmm... é que eu não preciso lutar sozinha, sabe?"
10012080-27 = "Se fosse a 'eu' de antes, talvez eu não pensasse assim..."
10012080-28 = "Mas agora, eu acredito que todas virão me ajudar."
10012080-29 = "...Já está na hora, será?"
10012080-34 = "[ns3] \"Som de helicóptero...\"\n[ns4] \"...Elas vieram.\""
10012080-35 = "Tcharam☆ Desculpem a demora~!"
10012080-36 = "Tcharam☆ Desculpem a demora~!"
10012080-37 = "...Fufu."
10012080-38 = "...Viu só?"
10012080-39 = "[s5] \"Sim.\"\n[s6] \"A Hoshino estava certa.\""
10012080-45 = "Que bom que chegamos a tempo! Vamos dar cobertura!"
10012080-48 = "Ah, droga! De novo?! Quantas vezes vocês vão atrapalhar até ficarem satisfeitas?!"
10012080-51 = "Alvo definido, lá vou eu."
10012080-53 = "Sim, sim! É hora do castigo~!!"
10012080-61 = "Disparo total~☆"
