[translation]
10012080-1 = "第8話;重機には重機で"
10012080-4 = "はあ、はあ……あいつら本当にすごいね……根性だけはある。"
10012080-5 = "バカンス、ゆっくり休みたかったのになぁ……"
10012080-6 = "[s1] \"ホシノ……！\"\n[s2] \"大丈夫？怪我とかしてない？\""
10012080-7 = "うへ、心配してくれてるの先生？"
10012080-8 = "うへ、心配してくれてるの先生？"
10012080-9 = "……でも心配しないでいいよ。まだ全然余裕。"
10012080-10 = "それに……。"
10012080-13 = "うふふ……やっとお救いできますね、先生……。"
10012080-14 = "いましばらくの辛抱です。私もこの状況、とても辛く苦しいのですが……。"
10012080-15 = "すぐにあの獰猛なキツネたちから助けて差し上げますので！！"
10012080-16 = "優しい先生を誘惑し利用するなんて、絶対に許されることではありません！"
10012080-17 = "このワカモが直接、彼女たちを教育し直して差し上げます！！"
10012080-20 = "……あんな状態だからねぇ。"
10012080-21 = "うへ～、仕方ないなー。ここはおじさんがもうちょっとだけ頑張っちゃおうかな～？"
10012080-22 = "……ん？"
10012080-23 = "なーに？"
10012080-24 = "……ああ。"
10012080-25 = "おじさんが余裕な理由？"
10012080-26 = "うーん……別に一人で戦わなきゃいけないわけじゃないからねぇ～"
10012080-27 = "前の私だったら、そうは思わなかったかもしれないけど……。"
10012080-28 = "今は、みんなが来てくれるって信じてるからさ。"
10012080-29 = "……もうそろそろかな？"
10012080-34 = "[ns3] \"ヘリの音……。\"\n[ns4] \"……来てくれたね。\""
10012080-35 = "ジャーン☆おまたせしました～！"
10012080-36 = "ジャーン☆おまたせしました～！"
10012080-37 = "……ふふ。"
10012080-38 = "……ほら、ね？"
10012080-39 = "[s5] \"うん。\"\n[s6] \"ホシノの言う通りだね。\""
10012080-45 = "間に合ってよかったです！援護します！"
10012080-48 = "ああもう！また来て！何回邪魔すれば気が済むのよ！！"
10012080-51 = "ターゲット設定、行くよ。"
10012080-53 = "うんうん！お仕置きの時間ですよ～！！"
10012080-61 = "全弾発射～☆"
