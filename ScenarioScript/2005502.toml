[translation]
2005502-1 = "Fobia a armários"
2005502-4 = "Sala do Clube de Desenvolvimento de Jogos"
2005502-5 = "[ns] \"Está tudo bem!? O que aconteceu!?\""
2005502-6 = "Sensei, não precisa ficar tão preocupado...!"
2005502-7 = "Sério, não é nada demais..."
2005502-8 = "Ugh... É verdade que é difícil quando algo que antes era seguro deixa de ser."
2005502-9 = "É, exatamente, mas..."
2005502-10 = "..."
2005502-11 = "Na, na verdade... é que."
2005502-12 = "Mesmo entrando no armário, eu não consigo me acalmar..."
2005502-13 = "[s1] \"Isso é realmente uma situação séria.\"\n[s2] \"Você está com um status alterado.\""
2005502-16 = "Se, se você diz assim... talvez seja verdade."
2005502-17 = "[s] \"Desde quando isso começou?\""
2005502-18 = "Bem... eu acho que foi..."
2005502-19 = "Provavelmente desde que voltamos do Continente de Aço."
2005502-20 = "[s3] \"Será que é quando você entra em lugares escuros...\"\n[s4] \"As memórias daquela época voltam à tona?\""
2005502-23 = "N, não. Lugares escuros em si não me incomodam."
2005502-24 = "Não há dúvidas de que as memórias daquela época são a causa, mas..."
2005502-25 = "..."
2005502-26 = "É que... quando entro em lugares apertados, fico pensando se o chão vai ceder..."
2005502-27 = "[s] \"O chão?\""
2005502-28 = "Sim... acabo me lembrando de quando entrei na escotilha de lançamento da nave de transporte."
2005502-29 = "Ficar sentada em um lugar apertado e o chão abrir e eu cair...#ne uma batalha começar logo em seguida..."
2005502-30 = "Essa ansiedade toma conta da minha cabeça... e o armário acabou se tornando um problema."
2005502-31 = "[s] \"Isso é um problema, hein.\""
2005502-32 = "Ma, mas, Sensei."
2005502-33 = "Pelo contrário... talvez tenha sido bom..."
2005502-34 = "[s] \"Bom?\""
2005502-35 = "Sim. Porque agora não consigo mais me esconder dentro do armário..."
2005502-36 = "Talvez isso seja uma oportunidade para... sair mais, como as outras pessoas..."
2005502-37 = "Brincar com muitas pessoas... talvez eu consiga fazer isso."
2005502-38 = "Se eu fizer isso, talvez eu consiga ser normal... é o que eu sinto..."
2005502-39 = "[s] \"Você está falando sério?\""
2005502-40 = "..."
2005502-41 = "...Sensei, o que você acha?"
2005502-42 = "[s5] \"Sua disposição para mudar é admirável.\"\n[s6] \"Mas o motivo disso me preocupa um pouco.\""
2005502-45 = "...É verdade."
2005502-46 = "Eu... talvez ainda não esteja pronta para sair de verdade."
2005502-47 = "Ainda preciso de um lugar para me esconder quando pessoas desconhecidas ou a Yuuka-senpai vêm à sala do clube..."
2005502-48 = "[s] \"Então não tem jeito.\""
2005502-52 = "[ns] \"E se você tentasse treinar entrando no armário?\""
2005502-53 = "Hã? Tre, treinamento? Isso é..."
2005502-54 = "Se, Sensei!?"
2005502-60 = "Po, por que você está com esse visual!?"
2005502-61 = "[ns] \"É claro que tem que ser assim! Modo de Combate UZQueen!\""
2005502-62 = "Como assim \"tem que ser assim\"!?#nÉ só entrar no armário...!?"
2005502-63 = "...Hã?#nVou entrar no armário desse jeito...?"
2005502-64 = "Es, espere um pouco, isso é...!"
2005502-65 = "É, é bem assustador..."
2005502-66 = "Na verdade, com esse visual, as coisas daquela época ficam ainda mais nítidas na minha mente...!"
2005502-67 = "Ugh... As memórias de quando eu escapei de emergência do cockpit do Neo-Vanguarda..."
2005502-72 = "……Hã?"
2005502-74 = "（Seguro firmemente as duas mãos da Yuzu, que parece ansiosa）"
2005502-75 = "P-Professor? Por que você está... segurando minhas mãos?"
2005502-76 = "Eu deveria... sentar dentro do armário?"
2005502-77 = "D-desse jeito...?"
2005502-83 = "D-desse jeito, com certeza... é um pouco melhor..."
2005502-89 = "[ns] \"O que acha?\""
2005502-90 = "E-eu não sei bem..."
2005502-91 = "É como se eu pudesse me sentir um pouco mais tranquila..."
2005502-92 = "Por que será...? A situação não mudou quase nada desde agora há pouco."
2005502-93 = "De alguma forma, eu me sinto calma..."
2005502-94 = "[ns] \"Talvez seja porque estou segurando a mão da Yuzu.\""
2005502-96 = "[ns7] \"Não importa se o chão ceder ou se algo saltar de repente.\"\n[ns8] \"Eu vou te segurar o tempo todo para que você não saia voando para longe, Yuzu.\""
2005502-99 = "O tempo todo... você vai me..."
2005502-100 = "……."
2005502-101 = "Ah..."
2005502-102 = "Muito obrigada, Professor."
2005502-107 = "（Passamos um tempo tranquilo dentro do armário, com as mãos dadas）"
