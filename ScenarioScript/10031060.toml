[translation]
10031060-1 = "Episódio 6; A Decisão da Presidente"
10031060-2 = "（4º dia de preparação para a festa. Enquanto terminava o trabalho no Schale antes de ir ao Pandemonium, recebi uma mensagem da Iroha.）"
10031060-8 = "Sensei……"
10031060-9 = "[s] \"É raro receber uma mensagem da Iroha em vez da Makoto.\""
10031060-10 = "É que... a Makoto-senpai está, digamos, em um estado em que não consigo contato..."
10031060-11 = "Não, na verdade, não é só que não consigo contato... é que ela está em um estado deplorável... #nBem, estar em um estado deplorável é o de sempre, mas..."
10031060-12 = "De qualquer forma, embora seja mais cedo do que o combinado, você poderia vir ao Pandemonium?"
10031060-13 = "[s] \"………？\""
10031060-20 = "（Assim, apressei-me um pouco e visitei o Pandemonium...）"
10031060-23 = "……。"
10031060-24 = "[s] \"Makoto...! O que aconteceu?\""
10031060-28 = "Saudações, Sensei."
10031060-29 = "Você chegou cedo hoje. Fufu, fico feliz em vê-lo."
10031060-33 = "[ns1] \"Iroha! A Makoto quebrou!?\"\n[ns2] \"Entendi na hora por que você está preocupada!\""
10031060-36 = "……Você entendeu, então."
10031060-37 = "A Makoto-senpai naquele estado, não está um pouco estranha ou, sendo sincera, um pouco assustadora...?"
10031060-39 = "Makoto-senpai, você está bem~?"
10031060-40 = "Fufu, Ibuki. Eu estou bem."
10031060-41 = "Ah, é verdade. Temos um chá especial preparado para a festa de hoje. #nO que acha, Sensei?"
10031060-42 = "Ibuki quer chocolate quente~"
10031060-43 = "Sim, chocolate quente também é uma boa escolha."
10031060-44 = "………………。"
10031060-48 = "[ns] \"Bem... pode me contar o que aconteceu?\""
10031060-49 = "……É o seguinte."
10031060-51 = "（3 horas antes do incidente）"
10031060-53 = "Como ousam atrapalhar meu plano de relações públicas...! #nGrr, malditos do Comitê Disciplinar!"
10031060-54 = "Não, por mais que tentássemos, aquilo era impossível..."
10031060-55 = "Mas parece que virou um assunto comentado, então não poderíamos dizer que foi um sucesso? Afinal, eles estavam fazendo barulho~"
10031060-56 = "Não serve...! Se continuar assim, meu plano de mostrar a hierarquia entre nós e o Comitê Disciplinar na festa será prejudicado..."
10031060-57 = "Chiaki! O que os membros do Comitê Disciplinar estão fazendo agora!?"
10031060-58 = "Bem... parece que eles estão fazendo um treinamento temporário para se preparar para o dia da festa."
10031060-59 = "Entendo... Então estamos conseguindo tirar o tempo de prática de piano da Hina."
10031060-60 = "No entanto, isso não é o suficiente. Precisamos ser cautelosos."
10031060-61 = "Quem é o verdadeiro líder com poder em Gehenna, quem merece estar no topo... Para impressionar não apenas todos os alunos de Gehenna, mas também o Sensei do Schale..."
10031060-62 = "Droga! Iroha, traga aquilo!"
10031060-63 = "Aquilo... do que você está falando?"
10031060-68 = "Ah, é verdade. Aquilo não era com a Iroha, eu pedi para a Satsuki preparar..."
10031060-69 = "O que você pediu para a Satsuki-senpai preparar desta vez...?"
10031060-70 = "Ahaha! #nÉ bem a cara da Iroha-chan ficar ansiosa assim que a Makoto-senpai faz algo!"
10031060-71 = "Haa, o que será que ela..."
10031060-76 = "Ufufu. Não se preocupe, Makoto-chan."
10031060-77 = "A versão melhorada do Plano NK Ultra está pronta!"
10031060-78 = "……Sim? Melhorada? Do que você está falando?"
10031060-79 = "Fufu. Até agora, eu fazia com que as pessoas quisessem jurar lealdade ao Pandemonium, mas..."
10031060-80 = "Desta vez, eu ajustei de acordo com os desejos da Makoto-chan."
10031060-81 = "Isso mesmo, para amplificar o amor e o respeito pelo líder!"
10031060-82 = "Kukuku! Como esperado da Satsuki! Atendendo perfeitamente aos meus desejos! #nSe usarmos a hipnose melhorada da Satsuki..."
10031060-83 = "Mesmo que sejam do Comitê Disciplinar, todos deverão ter respeito por esta grande Makoto!"
10031060-84 = "……Não, é por isso que eu queria uma explicação."
10031060-85 = "Muito bem, vamos testar na Iroha primeiro! #nChiaki! Ibuki! Peguem a Iroha!"
10031060-86 = "Hã?! O-o que você está fazendo?!"
10031060-87 = "Sim! Com prazer!#nDesculpe, Iroha-chan.#nSubordinados devem seguir as ordens de seus superiores!"
10031060-88 = "Iroha-senpai! Vamos brincar de pega-pega!"
10031060-92 = "E-ei, espera aí!? A-até você, Ibuki...!"
10031060-97 = "Kukuku. Iroha, vou amplificar o amor e o respeito que você guarda por mim no seu coração!"
10031060-98 = "Você não acha que, ao me dizer essas coisas, mesmo que houvesse algum amor ou respeito, ele desapareceria...?"
10031060-99 = "Vamos lá! Satsuki!"
10031060-100 = "Não se preocupe, Iroha. Você só vai passar a gostar um pouquinho mais da Makoto-chan do que já gosta!"
10031060-101 = "E-espere, por favor...!"
10031060-106 = "Ufufu, lá vamos nós!"
10031060-126 = "[ns] \"...Então, a hipnose que seria usada na Iroha acabou pegando na Makoto?\""
10031060-128 = "...Sim, deve ser o castigo pelas coisas que ela faz no dia a dia."
10031060-129 = "Bem, ela está inofensiva assim, então não podemos simplesmente deixá-la quieta?"
10031060-130 = "...Embora, se ela ficar assim para sempre, vai ser um problema."
10031060-131 = "A Ibuki também gosta da Makoto-senpai assim~"
10031060-132 = "Fufu, eu também gosto muito da Ibuki, de todos do Pandemonium...#ne também de você, Sensei."
10031060-133 = "...Isso está começando a ficar um pouco assustador."
10031060-134 = "...Se o Comitê Disciplinar descobrir a Makoto-chan nesse estado, não vai dar uma confusão enorme?"
10031060-135 = "Especialmente se aquela Administradora descobrir... quem sabe o que pode acontecer."
10031060-136 = "Falando nisso, a Makoto-senpai disse: \"Já que a segurança da festa está em jogo, deixe a prática de piano para depois do treinamento! Sorasaki Hina!\""
10031060-137 = "\"Como presidente do Pandemonium, eu mesma vou supervisionar todo o treinamento!\"... Ela disse algo assim, então temos que ir para o campo de treinamento, não é?"
10031060-138 = "...!#nSe a Makoto-chan sair desse jeito agora, pode acabar rolando uma guerra total!?"
10031060-139 = "[s] \"Por mais que seja, 'guerra total' não é um exagero...?\""
10031060-140 = "Deixando a Presidente do Comitê Disciplinar de lado, a Administradora... ela deve estar esperando secretamente por uma chance de revidar, sabe?#nMesmo assim, você acha que nada vai acontecer, Sensei?"
10031060-141 = "[s] \"...Acho melhor parar de pensar nisso.\""
10031060-142 = "Ahaha~! Você está amarelando, Sensei!"
10031060-143 = "Comitê Disciplinar...?"
10031060-144 = "Hm? Makoto-senpai, o que houve?"
10031060-145 = "............É verdade.#nNós, do Pandemonium, e o Comitê Disciplinar temos vivido em conflito até agora."
10031060-146 = "Sim, um relacionamento que pode ser chamado de cão e gato."
10031060-147 = "Quando parei para pensar na causa disso... uma solução me veio à mente."
10031060-148 = "[s] \"O que você acha que é a causa?\""
10031060-149 = "Sim. O problema é a própria existência do Pandemonium e do Comitê Disciplinar."
10031060-153 = "...Oi?"
10031060-154 = "Se a existência dessas organizações causa disputas inúteis...#ne se isso acaba confundindo os alunos..."
10031060-155 = "Eu, usando minha autoridade como presidente, declaro a dissolução do Pandemonium e do Comitê Disciplinar!"
10031060-166 = "O chocolate quente está uma delícia~"
10031060-168 = "[ns] \"Makoto............?\""
10031060-169 = "Já que decidi isso, não há tempo a perder.#nPreciso avisar todos os alunos rapidamente e dar as boas-vindas a uma nova era...!"
10031060-170 = "Sim, é isso mesmo...#nAfinal, não ganhamos nada continuando com essas disputas!"
10031060-171 = "Tudo pela paz em Gehenna!"
10031060-177 = "E-e-espere um pouco, por favor!? Makoto-senpai!?"
10031060-182 = "Ahahahaha!!!"
10031060-183 = "...Do jeito que as coisas estão, Gehenna vai desaparecer antes mesmo de alcançar a paz, sabia?"
10031060-184 = "[s] \"Ma-Makoto! Espere!\""
10031060-187 = "(Depois disso, consegui alcançar a Makoto que saiu correndo e, de alguma forma, desfiz a hipnose)"
