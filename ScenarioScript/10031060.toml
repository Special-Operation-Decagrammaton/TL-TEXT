[translation]
10031060-1 = "第6話;議長の決断"
10031060-2 = "（パーティー準備4日目。万魔殿に向かう前にシャーレの仕事を片付けていると、イロハから連絡が届いた）"
10031060-8 = "先生……"
10031060-9 = "[s] \"マコトじゃなくてイロハからの連絡だなんて珍しいね。\""
10031060-10 = "それがですね……マコト先輩は連絡が取れない状態というか……"
10031060-11 = "いや、連絡が取れないどころか……どうしようもない状態というか……#nまあ、どうしようもないのは、いつものことなんですが……"
10031060-12 = "とりあえず、約束の時間より早いですが、万魔殿に来ていただけますか？"
10031060-13 = "[s] \"………？\""
10031060-20 = "（そうして、少し急いで万魔殿を訪れると……）"
10031060-23 = "……。"
10031060-24 = "[s] \"マコト……！何があったの？\""
10031060-28 = "ごきげんよう、先生。"
10031060-29 = "今日はお早いですね。ふふっ、お会いできて嬉しいです。"
10031060-33 = "[ns1] \"イロハ！マコトが壊れちゃったよ！？\"\n[ns2] \"どうして困ってるのか一瞬で理解したよ！\""
10031060-36 = "……分かってくれましたか。"
10031060-37 = "あの状態のマコト先輩、変というか正直ちょっと怖くない……？"
10031060-39 = "マコト先輩、だいじょうぶ～？"
10031060-40 = "ふふっ、イブキ。私は大丈夫ですよ。"
10031060-41 = "あ、そうでした。今回のパーティーのために用意した特別な茶葉があります。#nいかがですか、先生？"
10031060-42 = "イブキはココアがいい～"
10031060-43 = "はい、ココアも良いですね。"
10031060-44 = "………………。"
10031060-48 = "[ns] \"えっと……何があったのか聞かせてもらえる？\""
10031060-49 = "……それがですね。"
10031060-51 = "（事件発生3時間前）"
10031060-53 = "この私の広報計画を邪魔するとは……！#nくっ、風紀委員会の奴らめ！"
10031060-54 = "いや、いくら何でもアレは無理がありましたよね……"
10031060-55 = "でも、それなりに話題になってたみたいですし、成功したと言ってもいいんじゃないですか？騒がれてたのは本当ですし～"
10031060-56 = "ダメだ……！このままでは今回のパーティーで我々と風紀委員会の上下関係を知らしめる私の計画に支障が……"
10031060-57 = "チアキ！今、風紀委員会の奴らは何をしている！？"
10031060-58 = "え～っと、パーティーの日に備えて、臨時の訓練を行なってるみたいですね。"
10031060-59 = "なるほど……ヒナのピアノの練習時間は確実に奪えているのだな。"
10031060-60 = "しかし、それだけでは足りない。念には念を入れなくては。"
10031060-61 = "このゲヘナで誰が真の権力を持つリーダーなのか、頂点を立つに値する者なのか……ゲヘナの全生徒はもちろん、シャーレの[USERNAME]先生にも印象付けるためには……"
10031060-62 = "ええいっ！イロハ、アレを持ってこい！"
10031060-63 = "アレって……何のことですか。"
10031060-68 = "あ、そうだった。アレはイロハじゃなくて、サツキに準備させていたか……"
10031060-69 = "今度はサツキ先輩に何を準備させたんですか……？"
10031060-70 = "あははっ！#nマコト先輩が何かすると、すぐ不安がるのイロハちゃんらしいね！"
10031060-71 = "はぁ、いったい何を……"
10031060-76 = "うふふ。大丈夫よ、マコトちゃん。"
10031060-77 = "NKウルトラ計画の改良版なら完成したわ！"
10031060-78 = "……はい？改良って本当に何の話ですか？"
10031060-79 = "ふふ。今までは万魔殿に忠誠を誓いたくなるようにしていたけれど……"
10031060-80 = "今度はマコトちゃんの要望に合わせてチューニングしておいたのよ。"
10031060-81 = "そう、リーダーに対する愛と尊敬心を増幅させるようにね！"
10031060-82 = "クククッ！流石はサツキだ！この私の要望にきちんと応えてくれるとは！#n改良されたサツキの催眠術を使えば……"
10031060-83 = "たとえ風紀委員会だろうと、皆この偉大なマコト様に敬意を抱くはず！"
10031060-84 = "……いや、だから説明をしてもらいたいんですが。"
10031060-85 = "よし、まずはイロハで試すとしよう！#nチアキ！イブキ！イロハを捕まえろ！"
10031060-86 = "はいっ？！な、何をするんですか！？"
10031060-87 = "は～い！喜んで～っ！#nごめんね、イロハちゃん。#n部下は上司の言葉に従うものだから！"
10031060-88 = "イロハ先輩～！鬼ごっこだよ～！"
10031060-92 = "ちょ、ちょっと！？い、イブキまで……！"
10031060-97 = "クククッ。イロハ、お前の中に眠る私に対する愛と尊敬心を増幅してやろう！"
10031060-98 = "私にそんな言葉を言ってる時点で、仮に愛と尊敬心があったとしても無くなるとは思わないんですか……？"
10031060-99 = "さあ！サツキ！"
10031060-100 = "大丈夫よ、イロハ。今よりもちょっとだけマコトちゃんを大好きになるだけだから！"
10031060-101 = "ま、待ってくださ……！"
10031060-106 = "うふふ、行くわよ！"
10031060-126 = "[ns] \"……つまり、イロハにかけようとした催眠がマコトに？\""
10031060-128 = "……はい、日頃のバチが当たったんでしょう。"
10031060-129 = "まぁ、このままでも無害だし、放置しててもいいんじゃない？"
10031060-130 = "……ずっとこのままだと流石に困るけど。"
10031060-131 = "イブキは今のマコト先輩も好き～"
10031060-132 = "ふふ、私もイブキはもちろん、万魔殿の皆さん……#nそして先生も大好きですよ。"
10031060-133 = "……ちょっと怖くなってきたね。"
10031060-134 = "……マコトちゃんのこんな姿を風紀委員会に知られたら、大変なことになるんじゃない？"
10031060-135 = "特に、あの行政官が知ったら……果たして何が起こるのやら。"
10031060-136 = "そういえば、マコト先輩が「パーティーの安全がかかっている以上、ピアノの練習は訓練を終えてからにしろ！[ruby=そらさき]空崎[/ruby]ヒナ！」"
10031060-137 = "「この私が万魔殿の議長として、しっかり全ての訓練を見届けてやる！」とか何とか言ったせいで、訓練場に行かなきゃいけないんですよね？"
10031060-138 = "……！#n今のマコトちゃんが出ていったら、全面戦争が起こるかもしれないわよ！？"
10031060-139 = "[s] \"いくら何でも、全面戦争は言い過ぎじゃ……\""
10031060-140 = "風紀委員長はともかく、行政官は……密かにやり返す機会を狙っているはずですよ？#nそれでも先生は、何も起こらないと思いますか？"
10031060-141 = "[s] \"……考えるのは止めておこうかな。\""
10031060-142 = "あははっ～！そこで日和っちゃうんだ、先生！"
10031060-143 = "風紀委員会……？"
10031060-144 = "ん？マコト先輩、どうしたの～？"
10031060-145 = "…………そうでした。#n私たち万魔殿と風紀委員会は、これまでいがみ合ってきましたね。"
10031060-146 = "そう、まさに犬猿の仲と呼ばれるような関係。"
10031060-147 = "その原因は何だろうと考えたところ……一つの解決策が浮かびました。"
10031060-148 = "[s] \"何が原因だと思ったの？\""
10031060-149 = "ええ。全ては万魔殿と風紀委員会の存在が悪かったのです。"
10031060-153 = "……はい？"
10031060-154 = "組織が存在するせいで不毛な争いが発生するくらいなら……#nそれによって、生徒たちが混乱してしまうくらいなら……"
10031060-155 = "私は議長の権限を行使し、万魔殿と風紀委員会の解散を宣言します！"
10031060-166 = "ココア、おいしい～"
10031060-168 = "[ns] \"マコト…………？\""
10031060-169 = "そうと決まれば、こうしている場合ではありません。#n早く全生徒に告知し、新しい時代を迎えなくては……！"
10031060-170 = "ええ、そうです……#nこれ以上、争いを続けたところで何も得られないのですから！"
10031060-171 = "全てはゲヘナの平和のために！"
10031060-177 = "ちょ、ちょ、ちょっと待ってください！？マコト先輩！？"
10031060-182 = "あはははっ！！！"
10031060-183 = "……あのままだと平和を実現する前に、ゲヘナが跡形も無くなるわよ？"
10031060-184 = "[s] \"ま、マコト！待って！\""
10031060-187 = "（その後、走っていったマコトを捕まえて、どうにか催眠を解いた）"
