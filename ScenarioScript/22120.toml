22120-130 = "[s] \"É isso…… a cidade-fortaleza é só um detalhe a mais.\""
22120-132 = "Pelo que a gente ouve, a maid que faz a escolta da presidente Rio é o maior obstáculo."
22120-133 = "…………"
22120-134 = "A Toki…… era esse o nome, né?"
22120-135 = "Os movimentos dela, naquela hora……"
22120-136 = "era como se……"
22120-137 = "Sim—— era como um \"jogador de cheat\"……"
22120-141 = "O que a gente precisa é de um plano."
22120-147 = "[ns] \"A Neru disse…… \"plano\"!?\""
22120-148 = "V-veterana Neru. Você tá bem? Não tá com febre?"
22120-149 = "Será que é efeito colateral do ferimento grave……?"
22120-150 = "Hãã? Que conversa é essa?"
22120-151 = "……É a presidente em modo missão."
22120-152 = "Isso, isso! A presidente em modo trabalho fica suuuper séria!"
22120-153 = "Fufu, na verdade é isso mesmo."
22120-155 = "E-entendi……!"
22120-156 = "Hmm, veterana Neru……#nposso perguntar o que você quer dizer?"
22120-157 = "Mesmo que a gente chegue bem na cidade-fortaleza.#nComo aquilo é o território da Rio, os nossos movimentos ficam à mostra."
22120-158 = "Diga quem disser o que for, ela é a \"Irmã Mais Velha\", oras."
22120-159 = "[s] \"Como assim……?\""
22120-160 = "É simples. Se tem tempo pra ficar bolando esperteza pra todo lado,#né melhor já meter o pé na porta de cara."
22120-161 = "Mas, presidente, isso é justamente o que a presidente Rio quer……"
22120-162 = "É por isso que eu tô falando que precisa de um plano."
22120-163 = "——Mais precisamente, um plano de distração."
