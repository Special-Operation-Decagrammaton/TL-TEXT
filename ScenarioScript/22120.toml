22120-170 = "Resgatando a Aris……"
22120-171 = "é a nossa vitória……!"
22120-172 = "Mas, veterana Neru, tem certeza?#nA adversária é aquela \"jogadora de cheat\"……"
22120-174 = "Hã? Quem é que você acha que eu sou."
22120-175 = "Aquela ali me passou a perna.#nDa próxima vez que a gente se ver, eu decidi que ia devolver."
22120-176 = "Agora é só executar."
22120-177 = "Entendido, vamos seguir o plano."
22120-178 = "Sim, sim! Deixa com a gente ♪"
22120-179 = "Fufu, vou me esforçar ao máximo."
