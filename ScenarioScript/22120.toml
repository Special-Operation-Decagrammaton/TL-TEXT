22120-12 = "Noa! Isto não é uma história desse nível!"
22120-13 = "Desde sempre eu nunca soube o que se passava na cabeça dela, mas……"
22120-14 = "por mais que seja a presidente…… existe coisa\nque se pode fazer e coisa que não se pode!"
22120-18 = "……Mesmo sendo, no fim, a sua veterana, você não\ntem dó nenhum, hein."
22120-19 = "Né?#nBom, esse jeito é bem a cara da Yuuka!"
22120-20 = "Ora, ufufu ♪#nVocê é confiável, Yuuka."
22120-21 = "……Hm? Como assim?"
22120-22 = "[s1] \"……Yuuka, Noa, por favor.\"\n[s2] \"Quero que vocês descubram pra onde a Rio levou a Aris.\""
22120-23 = "Entendido. Vou verificar as informações internas da Seminar.#nDevem ter ficado rastros da presidente Rio."
22120-24 = "Entendido. Vou verificar as informações internas da Seminar.#nDevem ter ficado rastros da presidente Rio."
22120-26 = "Pode deixar comigo! Vou colaborar com todas as forças!"
22120-28 = "Descobrimos pra onde a presidente Rio levou a Aris!"
22120-29 = "Ouvindo o que o Sensei contou, eu cheguei a\npensar 'não pode ser', mas……"
22120-30 = "quem diria que ela estava mesmo desviando o\norçamento da Seminar……"
22120-31 = "É realmente chocante…… que ela fosse alguém\ncapaz de fazer uma coisa dessas."
22120-32 = "[s] \"Ãh, como assim?\""
22120-33 = "É que…… investigando dados que foram apagados da\nbase de dados da Seminar#n——dados com rastros de terem sido ocultados de propósito……"
22120-34 = "encontramos um fluxo obscuro numa parte do orçamento.#nE conseguimos rastreá-lo."
22120-35 = "E o ponto aonde esse rastreio levou é aqui…… vou colocar na tela agora!"
22120-41 = "[ns] \"Isto é…… uma cidade?\""
22120-42 = "Recuperando documentos que foram apagados da base de dados——#nencontramos os dados de uma certa cidade."
22120-43 = "Codinome \"Eridu\"."
