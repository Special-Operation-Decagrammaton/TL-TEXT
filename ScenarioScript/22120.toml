[translation]
22120-1 = "第12話;作戦会議"
22120-2 = "会長が、アリスちゃんを……？"
22120-3 = "[s] \"うん……それで、ユウカならリオの居場所を知ってるかなと思って。\""
22120-4 = "最近、何か裏で進めている気配はありましたけど……。"
22120-5 = "そんなコトになってしまっていたんですね……。#n少し、ショックです。"
22120-6 = "会長……一体何を企んでいるのかしら。"
22120-7 = "アリスちゃんを"
22120-8 = "誘拐して――"
22120-9 = "その上ヘイローを破壊……？"
22120-10 = "……意味が分からないわよ！"
22120-11 = "普段から突飛な行動をされる方ではありましたが……。"
22120-12 = "ノア！これはそういう次元の話じゃないわ！"
22120-13 = "前々から何を考えてるか分からなかったけど……"
22120-14 = "いくら会長だとしても……やっていい事と悪い事があるのよ！"
22120-18 = "……仮にも自分の先輩なのに、容赦ないね。"
22120-19 = "でしょ？#nま、そういうとこがユウカらしいよね！"
22120-20 = "あら、うふふ♪#n信頼されてるんですね、ユウカちゃん。"
22120-21 = "……ん？どういうこと？"
22120-22 = "[s1] \"……ユウカ、ノア、お願い。\"\n[s2] \"リオがアリスをどこへ連れて行ったのか、調べてほしいんだ。\""
22120-23 = "分かりました。セミナー内部の情報を確認してみます。#nリオ会長の痕跡が残っていると思いますので。"
22120-24 = "分かりました。セミナー内部の情報を確認してみます。#nリオ会長の痕跡が残っていると思いますので。"
22120-26 = "任せてください！全力をあげて協力します！"
22120-28 = "リオ会長がアリスちゃんを連れて行った先が分かりました！ "
22120-29 = "先生のお話を聞いて、まさかとは思ったのですが……。"
22120-30 = "まさか本当にセミナーの予算を横領していたなんて……。"
22120-31 = "本当にショックです……そんな事される方だったなんて。"
22120-32 = "[s] \"えっと、どういう事？\""
22120-33 = "その……セミナーのデータベースから、削除された#n――意図的に隠蔽されたような痕跡があるデータを調べたところ……"
22120-34 = "予算の一部に不透明な流れを発見。#nそれを追跡することに成功しました。"
22120-35 = "そうやって追っていった先がここです……今、画面に映します！"
22120-41 = "[ns] \"これは……都市？\""
22120-42 = "データベース上から消去された資料を復元したところ――#nとある都市のデータを見つけたんです。"
22120-43 = "コードネーム[ruby=Eridu]「エリドゥ」[/ruby]。"
22120-44 = "リオ会長が秘密裏に建設していた……"
22120-45 = "「終焉に備えるための要塞都市」だそうです。"
22120-46 = "[s] \"要塞都市「エリドゥ」……。\""
22120-47 = "一体……いつの間にこんな規模の都市を……。"
22120-48 = "お金の流れを隠す事だって難しかったでしょうに……。"
22120-50 = "あ……。"
22120-51 = "もしかして……#n先日のコユキさんの一件と関係があるのでは……？"
22120-52 = "あっ！"
22120-53 = "コーユーキーー！！"
22120-54 = "[s] \"どうして都市を作ったんだろう？\""
22120-55 = "リオ会長は、ご自身がやると決めた事に関して絶対に迷いません。"
22120-56 = "合理的な判断を――時には重大な決断が必要な場面でも何ら迷うことはなく、#n目標達成のためであれば、ブルドーザーみたいに強引に事を進めてしまう。"
22120-57 = "そうして危険を排除し、キヴォトスの終焉を防ぐべく奔走した結果できたのが……"
22120-58 = "あの要塞都市、「エリドゥ」なのでしょう。"
22120-59 = "アリスちゃんは、「エリドゥ」の中心部にあるタワーに連れて行かれた可能性が高いわ。"
22120-61 = "そこに……アリスが……"
22120-62 = "「エリドゥ」の座標をお伝えしますね。"
22120-63 = "立場上、私たちがお手伝いできるのはここまでですが……"
22120-64 = "お願いします……リオ会長を止めて、アリスちゃんを連れ帰ってきてください！"
22120-65 = "[s] \"うん、任せて。\""
22120-71 = "エリドゥの座標は確認できたけど、問題は潜入方法だね。"
22120-72 = "会長ならきっと、対侵入者用の防御システムを構築してるだろうから。"
22120-73 = "何の準備もなく接近したら……"
22120-74 = "エリドゥが何故「要塞都市」と呼ばれているのか、#n身をもって知ることになるだろうね。"
22120-76 = "じゃ、じゃあどうすればいいの！？"
22120-77 = "近づくことも難しいなんて……。"
22120-79 = "――それはあくまで、「普通に接近した場合」の話だよ。"
22120-81 = "……私たちエンジニア部は別のルートを知ってるんだ。"
22120-82 = "[s] \"別のルート……？\""
22120-83 = "都市建設の「人手」だけだったら、#nリオ会長のドローンで事足りるだろうけど……"
22120-84 = "「資材」となると話は変わってくる。無から有は作れないからね。"
22120-85 = "ミレニアム自治区の郊外には、輸送用の無人列車がたくさんある……。"
22120-86 = "都市建設の資材をミレニアムから運んでいたと仮定するのなら、#nその路線のどれかがエリドゥと繋がってる可能性が高い。"
22120-87 = "じゃあ、路線さえ分かれば……！"
22120-88 = "ああ。エリドゥに行けるよ。"
22120-89 = "で、でも、路線はいっぱいありますよね……？#n一体、どうやって探せばいいんですか！？"
22120-90 = "ああ。なので、その辺りをエンジニア部がサポートしようじゃないか。"
22120-91 = "[s] \"ウタハ、私たちはリオと戦う事になるよ。それなのに……\""
22120-92 = "どうして協力するのかって？"
22120-93 = "決まっているさ。"
22120-94 = "リオ会長は、勝手に[ruby=  ・    ・    ・    ・    ・    ・    ・    ・    ・    ・    ・    ・  ]エンジニア部最大の発明品[/ruby]を奪っていったからね。"
22120-95 = "最大の発明品……？"
22120-96 = "アリスの「スーパーノヴァ」……。"
22120-97 = "ご明察。うちのデータ実測を邪魔するなんて、それは越権行為に他ならないよ。#n事実上、エンジニア部に向けた宣戦布告ってわけさ。#nこれはエンジニア部の部長として、到底看過することはできなくてね……"
22120-98 = "ウタハ先輩の恥ずかしがり屋……"
22120-99 = "え、えっと、一体どういう話、なの？"
22120-100 = "ええ！私が説明しましょう！#nウタハ先輩の論理の流れは次の通りです！"
22120-101 = "友達を助けに行きたいけど、それを口にするにはちょっと恥ずかしい……#nそうだ、いっそ物を奪われた事を口実にしてしまおう……！"
22120-103 = "ちょっと、コトリ。"
22120-108 = "うっ、ううっ！？"
22120-109 = "しーっ。"
22120-110 = "（こくりこくり！！）"
22120-113 = "……よし、これで秘密は守られた。"
22120-114 = "[s] \"ごめん……何一つ守られてないと思うけど。\""
22120-115 = "……守られたんだよ。"
22120-116 = "[s] \"え、う、うん……。\""
22120-117 = "コホン……というわけで、私たちエンジニア部も手伝うよ。"
22120-118 = "うん。"
22120-119 = "えへん！お任せください！"
22120-124 = "（そうして、アリスの居場所も、そこまで向かう手段も見つかったと思われたものの――）"
22120-126 = "[ns] \"……次は、アリスをどうやって連れ戻すかだね。\""
22120-127 = "ええ。要塞都市と呼ぶくらいですから……#nリオ会長には万全の備えがあるのでしょう。"
22120-128 = "都市のセキュリティはもちろん、#n防御システムもかなりのレベルだと思うよ。"
22120-129 = "それに……要塞都市をどうにかしても、まだ問題が残ってる。"
22120-130 = "[s] \"そうだね……要塞都市はおまけにすぎない。\""
22120-132 = "話を聞く限り、リオ会長の護衛をしているメイドが一番の障害ですね。"
22120-133 = "…………。"
22120-134 = "トキさん……でしたよね？"
22120-135 = "あの時の……彼女の動き……"
22120-136 = "まるで……。"
22120-137 = "うん――まるで「チートプレイヤー」……みたいだったね。"
22120-141 = "あたしらに必要なのは作戦だな。"
22120-147 = "[ns] \"ネルが「作戦」って……言った！？\""
22120-148 = "ね、ネル先輩。大丈夫？熱とかない？"
22120-149 = "もしかして、大けがをした反動で……？"
22120-150 = "あぁ？何の話だ？"
22120-151 = "……任務モードの部長だ。"
22120-152 = "そうそう！仕事モードになった部長はと～っても真面目なんだから！"
22120-153 = "ふふっ、実はそうなんです。"
22120-155 = "な、なるほど……！"
22120-156 = "うーん、ネル先輩……。#nどういう意味か聞いてもいいかな？"
22120-157 = "無事要塞都市に着いたとしても、だ。#nそこがリオの領域である以上、あたしらの動きは丸見えだ。"
22120-158 = "誰が何言おうが、あいつは「ビッグシスター」だからよ。"
22120-159 = "[s] \"どういう意味……？\""
22120-160 = "単純な話だよ。あれこれ浅知恵こねくりまわす暇があるんだったら、#n初っ端から突っ込んだ方がいいって事だ。"
22120-161 = "ですが部長、それこそリオ会長の思うツボでは……"
22120-162 = "だから作戦が必要つってんだよ。"
22120-163 = "――正確には陽動作戦か。"
22120-164 = "[s] \"陽動作戦……？\""
22120-165 = "このゲームの勝利条件は単純明快だ。"
22120-166 = "「あたしらがやられる前に、[ruby=アリス]あのチビ[/ruby]を救い出す」"
22120-167 = "あたしらC&Cが正面から突っ込んで騒ぎを起こしてやる。#nそうしたら、リオはもちろんトキ、あいつもあたしらの相手せざるを得ないだろ？"
22120-168 = "その間にお前たちがチビを救え。#nどうだ？簡単な話だろ？"
22120-170 = "アリスを救ったら……"
22120-171 = "私たちの勝利……！"
22120-172 = "でもネル先輩、大丈夫ですか？#n相手はあの「チートプレイヤー」だし……"
22120-174 = "あ？あたしを誰だと思ってやがる。"
22120-175 = "あいつには一杯食わされたからな。#n次会ったらやり返してやるって決めてたんだよ。"
22120-176 = "後はそれを実行するだけだ。"
22120-177 = "分かった、従おう。"
22120-178 = "うんうん！私たちに任せて♪"
22120-179 = "ふふっ、精一杯頑張りますね。"
22120-180 = "（……たしかに、あの時と違ってC&Cが全員いるのなら……#n突破できる可能性は高い……）"
22120-181 = "それではこれで決まりですね。#n正面は部長と一緒に私たちC&Cが担当いたします。"
22120-182 = "後方から潜入するのはその他、ゲーム開発部と私たち……そして先生かな？"
22120-183 = "私たちヴェリタスは遠隔で支援するね。"
22120-184 = "防衛システムのハッキングは私たちに任せて！"
22120-185 = "完璧にやり遂げてみせます。"
22120-187 = "よし、じゃあこれで行こっか！"
22120-188 = "[s] \"うん。\""
22120-189 = "目標は「要塞都市エリドゥ」の中央タワー！#nアリスが連れて行かれた場所！"
22120-190 = "勝手に家出したアリスを！"
22120-191 = "私たちの手で連れ戻すんだよ！"
22120-195 = "[ns] \"それじゃあ、これより――\""
22120-204 = "[ns] \"――作戦開始！\""
22120-206 = "次回;ビッグシスター"
