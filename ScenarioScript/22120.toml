[translation]
22120-1 = "Episódio 12; Reunião de Estratégia"
22120-2 = "A Presidente... sequestrou a Aris-chan...?"
22120-3 = "[s] \"Sim... Por isso achei que a Yuuka talvez soubesse onde a Rio está.\""
22120-4 = "Ultimamente, senti que ela estava tramando alguma coisa nas sombras, mas..."
22120-5 = "Então foi isso que aconteceu... #n Estou um pouco chocada."
22120-6 = "Presidente... o que será que ela está planejando?"
22120-7 = "Sequestrar"
22120-8 = "a Aris-chan――"
22120-9 = "E ainda destruir o Halo...?"
22120-10 = "......Eu não entendo o que ela quer dizer com isso!"
22120-11 = "Ela sempre foi alguém que agia de forma inesperada, mas..."
22120-12 = "Noa! Esse assunto não é desse nível!"
22120-13 = "Eu não sabia o que ela estava pensando desde muito tempo atrás, mas..."
22120-14 = "Mesmo sendo a Presidente... tem coisas que você pode fazer e coisas que você não pode!"
22120-18 = "......Você não tem dó nem da sua própria senpai, né."
22120-19 = "Pois é, né? #n Bem, esse é o jeitinho da Yuuka!"
22120-20 = "Ara, ufufu♪ #n Você é bem confiável, Yuuka-chan."
22120-21 = "......Hm? O que você quer dizer com isso?"
22120-22 = "[s1] \"......Yuuka, Noa, por favor.\"\n[s2] \"Eu queria que vocês descobrissem para onde a Rio levou a Aris.\""
22120-23 = "Entendido. Vou verificar as informações internas do Seminar. #n Acredito que ainda existam vestígios da Presidente Rio."
22120-24 = "Entendido. Vou verificar as informações internas do Seminar. #n Acredito que ainda existam vestígios da Presidente Rio."
22120-26 = "Deixe conosco! Vamos colaborar com tudo o que pudermos!"
22120-28 = "Descobrimos para onde a Presidente Rio levou a Aris-chan!"
22120-29 = "Quando ouvi o que o Sensei disse, imaginei que pudesse ser, mas..."
22120-30 = "Eu não acredito que ela realmente desviou o orçamento do Seminar..."
22120-31 = "Estou realmente chocada... Não imaginava que ela fosse capaz de fazer isso."
22120-32 = "[s] \"Ehm, como assim?\""
22120-33 = "Bom... ao investigar dados que foram deletados do banco de dados do Seminar #n―― vestígios que foram ocultados intencionalmente..."
22120-34 = "Descobrimos um fluxo opaco em parte do orçamento. #n Conseguimos rastrear isso com sucesso."
22120-35 = "O local que rastreamos é este... Vou projetar na tela agora!"
22120-41 = "[ns] \"Isso é... uma cidade?\""
22120-42 = "Ao restaurar os arquivos deletados do banco de dados―― #n encontramos dados de uma certa cidade."
22120-43 = "Codinome 'Eridu'."
22120-44 = "A Presidente Rio estava construindo secretamente..."
22120-45 = "Uma 'Cidade-Fortaleza para se preparar para o Fim'."
22120-46 = "[s] \"Cidade-Fortaleza 'Eridu'......\""
22120-47 = "Como... desde quando ela construiu uma cidade desse tamanho..."
22120-48 = "Deve ter sido difícil esconder todo esse fluxo de dinheiro..."
22120-50 = "Ah..."
22120-51 = "Será que... #n Isso tem relação com o incidente da Koyuki-san de uns dias atrás...?"
22120-52 = "Ah!"
22120-53 = "KOYUKIIII!!"
22120-54 = "[s] \"Por que ela teria criado uma cidade?\""
22120-55 = "A Presidente Rio nunca hesita quando decide fazer alguma coisa."
22120-56 = "Ela toma decisões racionais―― mesmo em momentos que exigem decisões cruciais, ela não hesita nada, #n e se for para atingir seu objetivo, ela segue em frente como um trator."
22120-57 = "O resultado dessa correria para eliminar perigos e prevenir o fim de Kivotos..."
22120-58 = "É aquela Cidade-Fortaleza, 'Eridu'."
22120-59 = "É altamente provável que a Aris-chan tenha sido levada para a torre no centro de 'Eridu'."
22120-61 = "Lá... a Aris está..."
22120-62 = "Vou te passar as coordenadas de 'Eridu'."
22120-63 = "Pela nossa posição, é só até aqui que podemos ajudar, mas..."
22120-64 = "Por favor... pare a Presidente Rio e traga a Aris-chan de volta!"
22120-65 = "[s] \"Sim, deixem comigo.\""
22120-71 = "Conseguimos as coordenadas de Eridu, mas o problema é como nos infiltrar."
22120-72 = "A Presidente com certeza construiu um sistema de defesa contra intrusos lá."
22120-73 = "Se tentarmos nos aproximar sem nenhuma preparação..."
22120-74 = "Você vai descobrir na pele... #n por que Eridu é chamada de 'Cidade-Fortaleza'."
22120-76 = "E-Então o que a gente faz!?"
22120-77 = "Será tão difícil assim chegar lá..."
22120-79 = "――Isso só se fosse uma 'aproximação normal'."
22120-81 = "......Nós do Clube de Engenharia conhecemos uma rota diferente."
22120-82 = "[s] \"Uma rota diferente...?\""
22120-83 = "Se fosse só para transportar 'mão de obra' para a construção da cidade, #n os drones da Presidente Rio seriam suficientes, mas..."
22120-84 = "A história muda quando se trata de 'materiais'. Não dá pra criar nada do nada, né."
22120-85 = "Existem muitos trens não tripulados de transporte nos arredores do distrito escolar da Millennium..."
22120-86 = "Se assumirmos que os materiais da construção da cidade foram transportados da Millennium, #n é bem provável que uma dessas linhas esteja conectada a Eridu."
22120-87 = "Então, se descobrirmos a linha...!"
22120-88 = "Isso. Podemos ir para Eridu."
22120-89 = "Mas, existem muitas linhas, não existem...? #n Como vamos encontrar a certa!?"
22120-90 = "Exato. Por isso, o Clube de Engenharia vai dar todo o suporte necessário."
22120-91 = "[s] \"Utaha, vamos acabar lutando contra a Rio. Mesmo assim...\""
22120-92 = "Quer saber por que vamos colaborar?"
22120-93 = "É simples."
22120-94 = "A Presidente Rio roubou a 'Maior Invenção do Clube de Engenharia' por conta própria."
22120-95 = "A maior invenção...?"
22120-96 = "A 'Supernova' da Aris..."
22120-97 = "Excelente observação. Interferir nos testes de dados do nosso clube é um abuso de autoridade inaceitável. #n Na prática, isso é uma declaração de guerra contra o Clube de Engenharia. #n Como Presidente do Clube de Engenharia, eu não posso deixar isso passar em branco..."
22120-98 = "A timidez da Utaha-senpai..."
22120-99 = "Eh, ehm, o que você quer dizer com isso?"
22120-100 = "Sim! Deixe comigo! #n A lógica de pensamento da Utaha-senpai é a seguinte!"
22120-101 = "Ela quer ajudar os amigos, mas tem vergonha de dizer isso... #n Então, ela decidiu usar o fato de terem roubado algo como desculpa...!"
22120-103 = "Ei, Kotori."
22120-108 = "Ugh, uuugh!?"
22120-109 = "Shhh."
22120-110 = "(Assentindo freneticamente!!)"
22120-113 = "......Certo, segredo guardado."
22120-114 = "[s] \"Desculpa... não acho que isso esteja muito guardado.\""
22120-115 = "......Está sim."
22120-116 = "[s] \"Eh, s-sim......\""
22120-117 = "Cof... Enfim, é por isso que nós do Clube de Engenharia também vamos ajudar."
22120-118 = "Sim."
22120-119 = "Ehem! Podem contar com a gente!"
22120-124 = "(E assim, embora parecesse que tínhamos descoberto onde a Aris estava e como chegar lá――)"
22120-126 = "[ns] \"......A próxima etapa é como vamos trazê-la de volta.\""
22120-127 = "Sim. Como ela chamou de cidade-fortaleza... #n A Presidente Rio deve ter defesas infalíveis."
22120-128 = "Além dos sistemas de segurança da cidade, #n acredito que o sistema de defesa esteja em um nível consideravelmente alto também."
22120-129 = "Além disso... mesmo que a gente consiga lidar com a cidade-fortaleza, ainda resta um problema."
22120-130 = "[s] \"Verdade... a cidade-fortaleza é apenas o bônus.\""
22120-132 = "Pelo que ouvi, a maior barreira será a maid que faz a escolta da Presidente Rio."
22120-133 = "............"
22120-134 = "Toki-san... não é?"
22120-135 = "Aqueles movimentos dela..."
22120-136 = "Pareciam..."
22120-137 = "Sim―― parecia uma 'cheater de videogame'... não é mesmo."
22120-141 = "O que precisamos é de uma estratégia."
22120-147 = "[ns] \"A Neru disse 'estratégia'!?\""
22120-148 = "Neru-senpai, tudo bem? Você não está com febre?"
22120-149 = "Será que é algum efeito colateral daquele ferimento grave...?"
22120-150 = "Hã? Do que vocês estão falando?"
22120-151 = "......É a líder em modo de missão."
22120-152 = "Sim, sim! A líder no modo de trabalho é super séria!"
22120-153 = "Fufu, é verdade."
22120-155 = "E-Entendi...!"
22120-156 = "Hmm, Neru-senpai... #n Posso perguntar o que você quer dizer com isso?"
22120-157 = "Mesmo se chegarmos na cidade-fortaleza, como aquilo é território da Rio, nossos movimentos ficarão totalmente expostos."
22120-158 = "Não importa o que digam, ela é a 'Big Sister'."
22120-159 = "[s] \"O que você quer dizer com...?\""
22120-160 = "É simples. Se formos gastar tempo bolando estratégias complicadas, #n é melhor simplesmente invadir de uma vez."
22120-161 = "Mas, líder, isso não é cair direto na armadilha da Presidente Rio..."
22120-162 = "É por isso que precisamos de uma estratégia."
22120-163 = "――Para ser exata, uma estratégia de diversão."
22120-164 = "[s] \"Uma estratégia de diversão...?\""
22120-165 = "A condição de vitória desse jogo é simples e clara."
22120-166 = "'Resgatar aquela nanica antes que acabem com a gente'"
22120-167 = "Nós, da C&C, invadiremos pela frente e causaremos o caos. #n Com isso, a Rio e a Toki serão forçadas a lidar com a gente, não é?"
22120-168 = "Enquanto isso, vocês resgatam a nanica. #n Que tal? É simples, não é?"
22120-170 = "Se resgatarmos a Aris..."
22120-171 = "Nós vencemos...!"
22120-172 = "Mas Neru-senpai, você tem certeza? #n A oponente é aquela 'cheater'..."
22120-174 = "Hã? Quem você acha que eu sou?"
22120-175 = "Ela me passou a perna da última vez. #n E eu decidi que ia dar o troco na próxima vez que a encontrasse."
22120-176 = "Agora é só colocar em prática."
22120-177 = "Entendido, vamos seguir."
22120-178 = "Sim, sim! Deixem com a gente♪"
22120-179 = "Fufu, darei o meu melhor."
22120-180 = "(......É verdade, diferente daquela vez, agora temos a C&C inteira... #n A chance de passar é alta...)"
22120-181 = "Então está decidido. #n O pessoal da frente será a C&C, junto com a nossa líder."
22120-182 = "Quem fará a infiltração por trás serão os outros, o Clube de Jogos... e acho que o Sensei também, né?"
22120-183 = "Nós da Veritas daremos suporte remoto."
22120-184 = "Deixem a hackeada do sistema de defesa com a gente!"
22120-185 = "Vamos realizar isso com perfeição."
22120-187 = "Beleza, então vamos nessa!"
22120-188 = "[s] \"Sim.\""
22120-189 = "O alvo é a torre central da 'Cidade-Fortaleza Eridu'! #n O lugar para onde levaram a Aris!"
22120-190 = "Vamos trazer de volta a Aris que fugiu de casa!"
22120-191 = "Com as nossas próprias mãos!"
22120-195 = "[ns] \"Sendo assim, a partir de agora――\""
22120-204 = "[ns] \"――Operação iniciada!\""
22120-206 = "Próximo Episódio; Big Sister"