22120-83 = "Se fosse só a \"mão de obra\" pra construir a cidade,#nos drones da presidente Rio dariam conta, mas……"
22120-84 = "quando o assunto é \"material\", a conversa muda. Não se faz algo do nada."
22120-85 = "Nos arredores da zona autônoma da Millennium, há vários trens autônomos de transporte……"
22120-86 = "Supondo que ela transportou o material de construção da Millennium,#nhá alta probabilidade de alguma dessas linhas se conectar a Eridu."
22120-87 = "Então, se a gente descobrir a linha……!"
22120-88 = "Sim. Dá pra chegar em Eridu."
22120-89 = "M-mas tem um monte de linha, né……?#nComo é que a gente vai procurar, afinal!?"
22120-90 = "Sim. Por isso, deixa que o Clube de Engenharia dá esse suporte."
22120-91 = "[s] \"Utaha, a gente vai acabar lutando contra a Rio. E mesmo assim……\""
22120-92 = "Por que estamos colaborando, é isso?"
22120-93 = "Mas é óbvio."
22120-94 = "A presidente Rio levou embora, por conta própria, a 'maior invenção do Clube de Engenharia'."
22120-95 = "A maior invenção……?"
22120-96 = "A \"Supernova\" da Aris……"
22120-97 = "Perspicaz. Atrapalhar a nossa coleta de dados reais não é nada menos que abuso de autoridade.#nNa prática, é uma declaração de guerra contra o Clube de Engenharia.#nComo presidente do Clube de Engenharia, isto eu não posso, de forma alguma, deixar passar……"
22120-98 = "A Utaha é tão tímida……"
22120-99 = "Ã-ãh, afinal, que conversa é essa?"
22120-100 = "Sim! Deixa eu explicar!#nA linha de raciocínio da Utaha é a seguinte!"
22120-101 = "Ela quer ir salvar a amiga, mas falar isso em voz alta dá uma vergonhazinha……#né isso, vou usar de pretexto o fato de terem levado um objeto……!"
22120-103 = "Peraí, Kotori."
22120-108 = "Uh, uuh!?"
22120-109 = "Shhh."
22120-110 = "(Acena, acena!!)"
22120-113 = "……Boa, com isto o segredo está guardado."
