22120-115 = "……Foi guardado, sim."
22120-116 = "[s] \"Ah, é-é……\""
22120-117 = "Cof…… enfim, sendo assim, nós, do Clube de Engenharia, também ajudamos."
22120-118 = "Sim."
22120-119 = "Ãrrã! Podem contar comigo!"
22120-124 = "(E assim, embora parecesse que tanto o paradeiro da Aris quanto o meio de chegar lá tivessem sido encontrados——)"
22120-126 = "[ns] \"……Agora, é como trazer a Aris de volta, né.\""
22120-127 = "Sim. Já que chamam de cidade-fortaleza……#na presidente Rio deve estar com tudo preparado."
22120-128 = "A segurança da cidade, claro, mas#no sistema de defesa também deve ser de um nível e tanto."
