22120-165 = "A condição de vitória deste jogo é simples e clara."
22120-166 = "\"Resgatar aquela baixinha antes que a gente seja derrotada.\""
22120-167 = "A gente, do C&C, mete o pé na porta de frente e faz um auê.#nAí a Rio, claro, e a Toki também, vão ser obrigadas a nos enfrentar, né?"
