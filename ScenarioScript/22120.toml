22120-47 = "Afinal…… quando foi que ela construiu uma cidade desse porte……"
22120-48 = "Esconder o fluxo de dinheiro também deve ter sido difícil……"
22120-50 = "Ah……"
22120-51 = "Não me diga……#nserá que tem relação com aquele caso da Koyuki, outro dia……?"
22120-52 = "Ah!"
22120-53 = "Kooyuukiii!!"
22120-54 = "[s] \"Por que será que ela construiu uma cidade?\""
22120-55 = "A presidente Rio, em relação ao que ela decide fazer, nunca hesita."
22120-56 = "Um julgamento racional—— mesmo em momentos que exigem decisões graves, ela não hesita em nada,#ne, se for pra atingir o objetivo, toca as coisas à força, feito um trator."
22120-57 = "Eliminando os perigos e correndo atrás de impedir o fim de Kivotos, o resultado disso foi……"
22120-58 = "aquela cidade-fortaleza, a \"Eridu\", deve ser."
22120-59 = "Há uma alta probabilidade de a Aris ter sido levada para a torre no centro da \"Eridu\"."
22120-61 = "Ali…… a Aris……"
22120-62 = "Vou passar as coordenadas da \"Eridu\"."
22120-63 = "Pela nossa posição, é até aqui que a gente pode ajudar, mas……"
