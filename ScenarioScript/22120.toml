22120-1 = "Episódio 12: Reunião de Estratégia."
22120-2 = "A presidente, com a Aris……?"
22120-3 = "[s] \"Sim…… e aí eu pensei que a Yuuka talvez soubesse o paradeiro da Rio.\""
22120-4 = "Ultimamente, tinha um clima de que ela estava\ntocando alguma coisa nos bastidores, mas……"
