[translation]
22120-1 = "Episódio 12; Reunião de Estratégia"
22120-2 = "A Presidente... levou a Alice?"
22120-3 = "[s] \"Sim... e por isso pensei que a Yuuka talvez soubesse onde a Rio está.\""
22120-4 = "Ultimamente, eu sentia que ela estava tramando algo pelas costas, mas..."
22120-5 = "Eu não imaginava que as coisas tivessem chegado a esse ponto...#nEstou um pouco chocada."
22120-6 = "Presidente... o que exatamente você está planejando?"
22120-7 = "Sequestrar a Alice..."
22120-8 = "E ainda por cima destruir o halo dela...?"
22120-9 = "Eu não entendo nada disso!"
22120-10 = "Ela sempre foi alguém que tomava atitudes repentinas, mas..."
22120-11 = "Yuuka! Isso não é uma questão de nível comum!"
22120-12 = "Eu já não entendia o que ela pensava há muito tempo, mas..."
22120-13 = "Mesmo sendo a Presidente... existem limites para o que se pode fazer!"
22120-14 = "..."
22120-18 = "..."
22120-19 = "..."
22120-20 = "..."
22120-21 = "..."
22120-22 = "[s1] \"...Yuuka, Noah, por favor.\"\n[s2] \"Preciso que descubram para onde a Rio levou a Alice.\""
22120-23 = "Entendido. Vou verificar as informações internas do Seminar.#nAcredito que ainda existam rastros da Presidente Rio."
22120-24 = "Entendido. Vou verificar as informações internas do Seminar.#nAcredito que ainda existam rastros da Presidente Rio."
22120-26 = "Pode deixar comigo! Vou cooperar com tudo o que puder!"
22120-28 = "Descobri para onde a Presidente Rio levou a Alice!"
22120-29 = "Depois de ouvir o que o Sensei disse, eu achei que não podia ser verdade, mas..."
22120-30 = "Quem diria que ela realmente estava desviando o orçamento do Seminar..."
22120-31 = "Estou realmente chocada... nunca imaginei que ela fosse capaz de algo assim."
22120-32 = "[s] \"Espera, como assim?\""
22120-33 = "Bem... ao investigar dados que foram deletados do banco de dados do Seminar#n— dados que pareciam ter sido ocultados intencionalmente —"
22120-34 = "Descobri um fluxo opaco em parte do orçamento.#nConsegui rastreá-lo."
22120-35 = "O destino que encontrei foi este... vou projetar na tela agora!"
22120-41 = "[ns] \"Isso é... uma cidade?\""
22120-42 = "Ao restaurar os documentos que foram apagados do banco de dados—#nencontrei dados sobre uma certa cidade."
22120-43 = "Codinome \"Eridu\"."
22120-44 = "A Presidente Rio estava construindo secretamente..."
22120-45 = "Uma \"cidade-fortaleza para se preparar para o fim\"."
22120-46 = "[s] \"Cidade-fortaleza 'Eridu'....\""
22120-47 = "Como ela conseguiu construir uma cidade desse tamanho sem ninguém perceber...?"
22120-48 = "Deve ter sido difícil até mesmo esconder o fluxo de dinheiro..."
22120-50 = "Ah..."
22120-51 = "Será que...#nteria alguma relação com o incidente da Koyuki outro dia...?"
22120-52 = "Ah!"
22120-53 = "KOYUKIIII!!"
22120-54 = "[s] \"Por que ela teria construído uma cidade?\""
22120-55 = "A Presidente Rio nunca hesita quando decide fazer algo."
22120-56 = "Ela toma decisões racionais — mesmo em momentos que exigem decisões cruciais, ela não hesita,#ne se for para atingir seu objetivo, ela segue em frente como um trator."
22120-57 = "O resultado de seus esforços para eliminar perigos e evitar o fim de Kivotos foi..."
22120-58 = "Aquela cidade-fortaleza, \"Eridu\"."
22120-59 = "É muito provável que a Alice tenha sido levada para a torre no centro de \"Eridu\"."
22120-61 = "Então... a Alice está lá..."
22120-62 = "Vou te passar as coordenadas de \"Eridu\"."
22120-63 = "Por causa da minha posição, só podemos ajudar até aqui, mas..."
22120-64 = "Por favor... pare a Presidente Rio e traga a Alice de volta!"
22120-65 = "[s] \"Certo, pode deixar comigo.\""
22120-71 = "Conseguimos confirmar as coordenadas de Eridu, mas o problema é como nos infiltrar."
22120-72 = "A Presidente certamente construiu um sistema de defesa contra intrusos por lá."
22120-73 = "Se nos aproximarmos sem qualquer preparação..."
22120-74 = "Você vai descobrir na pele por que Eridu é chamada de \"cidade fortaleza\"."
22120-76 = "E-então, o que devemos fazer!?"
22120-77 = "É difícil até mesmo chegar perto..."
22120-79 = "Isso é apenas se você tentar se aproximar do jeito convencional."
22120-81 = "...Nós, do Clube de Engenharia, conhecemos uma rota diferente."
22120-82 = "[s] \"Uma rota diferente...?\""
22120-83 = "Se fosse apenas para \"mão de obra\" na construção da cidade, os drones da Presidente Rio seriam suficientes, mas..."
22120-84 = "Quando se trata de \"materiais\", a história muda. Não se pode criar algo do nada."
22120-85 = "Nos arredores do distrito de Millennium, existem muitos trens de carga não tripulados..."
22120-86 = "Se assumirmos que os materiais de construção eram transportados de Millennium, é muito provável que uma dessas linhas esteja conectada a Eridu."
22120-87 = "Então, se descobrirmos a linha...!"
22120-88 = "Isso mesmo. Você poderá chegar a Eridu."
22120-89 = "M-mas existem muitas linhas, não é...? Como vamos descobrir qual é a certa!?"
22120-90 = "Ah, é por isso que o Clube de Engenharia vai dar suporte nessa parte."
22120-91 = "[s] \"Utaha, nós vamos lutar contra a Rio. Mesmo assim...\""
22120-92 = "Por que estamos ajudando?"
22120-93 = "É óbvio."
22120-94 = "A Presidente Rio roubou a maior invenção do Clube de Engenharia sem permissão."
22120-95 = "A maior invenção...?"
22120-96 = "A \"Supernova\" da Alice..."
22120-97 = "Exatamente. Interferir nas medições de dados do nosso clube é um abuso de autoridade. Na prática, é uma declaração de guerra contra o Clube de Engenharia. Como presidente do clube, não posso deixar isso passar em branco..."
22120-98 = "A timidez da Utaha-senpai..."
22120-99 = "E-ei, do que vocês estão falando?"
22120-100 = "Sim! Eu explico! O raciocínio da Utaha-senpai é o seguinte!"
22120-101 = "Ela quer ir salvar a amiga, mas tem vergonha de admitir... Então, ela decidiu usar o fato de terem roubado algo como desculpa...!"
22120-103 = "Ei, Kotori."
22120-108 = "Ugh, ugh!?"
22120-109 = "Shiu."
22120-110 = "(Acena freneticamente com a cabeça!!)"
22120-113 = "...Muito bem, o segredo está guardado."
22120-114 = "[s] \"Desculpe... mas acho que não guardou nada.\""
22120-115 = "...Está guardado, sim."
22120-116 = "[s] \"Ah, s-sim...\""
22120-117 = "Ehem... sendo assim, nós do Clube de Engenharia também vamos ajudar."
22120-118 = "Certo."
22120-119 = "Ehem! Pode deixar com a gente!"
22120-124 = "(E assim, embora parecesse que o paradeiro de Alice e os meios para chegar até lá tivessem sido encontrados――)"
22120-126 = "[ns] \"...O próximo passo é como trazer a Alice de volta.\""
22120-127 = "Sim. Já que a chamam de cidade fortaleza... a Presidente Rio deve ter defesas impecáveis."
22120-128 = "Não só a segurança da cidade, mas acho que o sistema de defesa também deve ser de alto nível."
22120-129 = "Além disso... mesmo que consigamos lidar com a cidade fortaleza, ainda resta um problema."
22120-130 = "[s] \"É verdade... a cidade fortaleza é apenas um detalhe.\""
22120-132 = "Pelo que ouvimos, a empregada que está protegendo a Presidente Rio é o maior obstáculo."
22120-133 = "............"
22120-134 = "Toki... era esse o nome dela, certo?"
22120-135 = "Os movimentos dela... naquela hora..."
22120-136 = "Parecia que..."
22120-137 = "Sim, parecia exatamente como uma 'jogadora trapaceira'."
22120-141 = "O que precisamos agora é de um plano."
22120-147 = "[ns] \"A Neru... disse 'plano'!?\""
22120-148 = "Ei, veterana Neru. Você está bem? Não está com febre?"
22120-149 = "Será que foi por causa do choque do ferimento grave...?"
22120-150 = "Hã? Do que você está falando?"
22120-151 = "É a chefe no modo de missão."
22120-152 = "Isso mesmo! Quando a chefe entra no modo de trabalho, ela fica super séria!"
22120-153 = "Fufu, na verdade é isso mesmo."
22120-155 = "E-entendo...!"
22120-156 = "Hum, veterana Neru... #nPosso perguntar o que você quer dizer com isso?"
22120-157 = "Mesmo que a gente chegue na cidade fortaleza em segurança, #ncomo é território da Rio, nossos movimentos estarão sendo vigiados o tempo todo."
22120-158 = "Não importa o que digam, ela é a 'irmã mais velha', afinal."
22120-159 = "[s] \"O que isso significa...?\""
22120-160 = "É simples. Se temos tempo para ficar inventando planos complicados, #né melhor simplesmente atacar de frente desde o início."
22120-161 = "Mas chefe, não é exatamente isso que a presidente Rio quer que façamos...?"
22120-162 = "É por isso que eu disse que precisamos de um plano."
22120-163 = "Para ser mais exata, uma operação de distração."
22120-164 = "[s] \"Operação de distração...?\""
22120-165 = "A condição de vitória deste jogo é clara e simples."
22120-166 = "'Resgatar aquela baixinha antes que acabem com a gente'."
22120-167 = "Nós da C&C vamos atacar de frente e causar um alvoroço. #nAssim, a Rio e a Toki não terão escolha a não ser nos enfrentar, certo?"
22120-168 = "Enquanto isso, vocês resgatam a baixinha. #nE aí? É simples, não é?"
22120-170 = "Se resgatarmos a Aris..."
22120-171 = "Será a nossa vitória...!"
22120-172 = "Mas veterana Neru, tem certeza? #nA oponente é aquela 'jogadora trapaceira'..."
22120-174 = "Hã? Você sabe com quem está falando?"
22120-175 = "Ela me enganou daquela vez. #nEu decidi que, se a encontrasse de novo, daria o troco."
22120-176 = "Agora só falta colocar isso em prática."
22120-177 = "Entendido, vamos seguir o plano."
22120-178 = "Isso mesmo! Deixem com a gente♪"
22120-179 = "Fufu, farei o meu melhor."
22120-180 = "(...Realmente, diferente daquela vez, se toda a C&C estiver aqui... #nas chances de romper a defesa são altas...)"
22120-181 = "Então está decidido. #nA linha de frente ficará por conta de nós da C&C junto com a chefe."
22120-182 = "A infiltração pela retaguarda será feita pelo resto do pessoal, o Departamento de Desenvolvimento de Jogos e nós... e o Sensei, talvez?"
22120-183 = "Nós da Veritas daremos suporte remoto."
22120-184 = "Deixem a invasão do sistema de defesa com a gente!"
22120-185 = "Vamos concluir isso com perfeição."
22120-187 = "Beleza, então vamos nessa!"
22120-188 = "[s] \"Sim.\""
22120-189 = "O alvo é a torre central da 'Cidade Fortaleza Eridu'! #nO lugar para onde levaram a Aris!"
22120-190 = "A Aris, que fugiu de casa por conta própria!"
22120-191 = "Vamos trazê-la de volta com as nossas próprias mãos!"
22120-195 = "[ns] \"Então, a partir de agora--\""
22120-204 = "[ns] \"--Operação iniciada!\""
22120-206 = "Próximo episódio: Irmã Mais Velha"
