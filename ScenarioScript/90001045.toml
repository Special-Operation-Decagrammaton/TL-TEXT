[translation]
90001045-3 = "Os movimentos de Geburah ficaram lentos. #n――Toki!"
90001045-4 = "Entendido, Rio-sama. #nEstou indo!"
90001045-12 = "Desta vez senti que atingimos algo... embora tenha escapado para baixo do gelo."
90001045-13 = "Parece que recuou. É uma pena que tenha escapado, mas――"
90001045-18 = "Nós também precisamos de manutenção e descanso."
90001045-19 = "Geburah, sinal perdido. #nFoi embora em uma velocidade incrível."
90001045-22 = "……."
90001045-28 = "……."
90001045-29 = "Quanto tempo, Presidente Rio. O timing foi perfeito."
90001045-33 = "Aliás, a Chefe está bem?"
90001045-34 = "……Estou perfeitamente bem, sim? #nNão estou nem um pouco chateada por terem roubado a cena, de verdade."
90001045-35 = "Além disso, eu sou uma pessoa generosa."
90001045-36 = "Ah... já entendi que a Chefe está emburrada."
90001045-37 = "Não diga coisas que possam gerar mal-entendidos!"
90001045-42 = "Ehem――"
90001045-43 = "Rio, você tem passado bem?"
90001045-46 = "Eu estou……."
90001045-47 = "Não seria o básico retribuir a saudação?"
90001045-52 = "[ns] \"Vamos nos cumprimentar juntas, Rio.\""
90001045-53 = "É verdade. Então――"
90001045-54 = "Você tem passado bem? #nSabe... estou feliz em te ver."
90001045-55 = "Sim. Eu também sinto isso do fundo do meu coração, Rio-sama."
90001045-56 = "Você tem dormido e acordado cedo? #nNão está mais vivendo com o ciclo de sono invertido como antes, está?"
90001045-57 = "¡¿!?"
90001045-58 = "A maior parte da vida pode ser suprida por robôs domésticos, mas melhorar o ciclo de vida é difícil."
90001045-59 = "E-eu, isso é……."
90001045-60 = "……Estou me esforçando."
90001045-62 = "(De alguma forma, dá para entender como a Presidente e a Toki viviam...)"
90001045-68 = "Bem, vamos entrar no assunto principal."
90001045-69 = "Por que você não voltou para o Millennium até agora―― #ne onde você esteve durante esse tempo, poderia me contar?"
90001045-70 = "Isso é……."
90001045-71 = "Além disso, a tesoureira de certo seminário parece ter muito o que falar com você, sabia?"
90001045-72 = "¡!?"
90001045-73 = "E também... por que você apareceu justamente agora?"
90001045-74 = "Será que é porque você não tinha uma justificativa para voltar――"
90001045-75 = "Ou que não podia voltar sem ter resultados... você não estava pensando em algo assim, estava?"
90001045-79 = "……Eu estava seguindo os rastros deixados pelo poder do \"Deus Sem Nome\"."
90001045-80 = "O poder... do \"Deus Sem Nome\"?"
90001045-81 = "Sim. Aquilo que se manifestou em Kivotos naquele dia continuou deixando rastros mesmo após o fim do incidente."
90001045-82 = "Eu nunca imaginei que acabaria encontrando vocês assim……."
90001045-83 = "(Então, enquanto seguia os rastros do poder do \"Deus Sem Nome\", ela encontrou o profeta de Decagrammaton...?)"
90001045-87 = "Minha filosofia é prevenir e me preparar para os fenômenos anômalos que ocorrem em Kivotos. #nIsso não mudou desde que criei o Departamento de Investigação de Fenômenos Anômalos."
90001045-88 = "Não sou boa em expressar as coisas com palavras. Por isso, foquei no que eu mesma podia fazer."
90001045-89 = "Isso é... a forma como posso me redimir."
90001045-91 = "……."
90001045-92 = "Entendi. Não que importe muito, mas só uma coisa."
90001045-93 = "Você me deixou responsável por todo o Departamento de Investigação de Fenômenos Anômalos e desapareceu, não foi? #nE ainda impôs condições difíceis de recusar."
90001045-94 = "Sim. Pensei que você, sendo quem é, entenderia minha filosofia deixando de lado os sentimentos pessoais."
90001045-95 = "……Isso não seria uma chantagem?"
90001045-96 = "[s3] \"Calma, calma...\"\n[s4] \"Se a Rio não estivesse lá, teria sido perigoso.\""
90001045-99 = "……Sim. Eu entendo isso."
90001045-100 = "Além disso, temos uma grande dívida com você, não apenas por causa deste incidente."
90001045-101 = "Por isso, eu adoraria dizer para você parar de inventar desculpas e voltar logo para o Millennium, mas..."
90001045-102 = "Eu não ouvi direito agora há pouco... você disse alguma coisa?"
90001045-103 = "Não foi nada!"
90001045-104 = "Ei, mas nessa situação, acabamos decidindo trabalhar juntos contra a crise de Kivotos, conforme a vontade da Presidente, certo?"
90001045-105 = "Sim. Eu, uma agente excelente e uma maid perfeita, também estou junto. #nÉ como dizem: é como dar um porrete a um demônio."
90001045-106 = "……Deixando a Toki de lado, qual é o seu estado de espírito como fundadora do Departamento de Investigação de Fenômenos Estranhos?"
90001045-110 = "……Nada em especial."
90001045-111 = "Haa... eu imaginei que diria isso."
90001045-112 = "É certo que o que está acontecendo agora não é normal. #nE ainda não sabemos que tipo de impacto isso terá em Kivotos."
90001045-113 = "Eu entendi apenas que você sabe de alguma coisa."
90001045-114 = "E nós também descobrimos algumas coisas durante o caminho até aqui."
90001045-115 = "Uma proposta. Que tal trocarmos informações?"
90001045-116 = "Concordo. #nAcho que seria eficiente trocar informações... enquanto rastreamos o Geburah. #nO que acha?"
90001045-117 = "Vamos fazer isso. #nEimi, você se lembra da direção para onde o Geburah desapareceu?"
90001045-118 = "Sim, eu lembro. Pode deixar comigo."
90001045-119 = "Então, vamos partir rapidamente."
90001045-121 = "Próximo episódio; Variável"
