[translation]
90001045-3 = "ゲブラの動きが遅くなった。#n――トキ！"
90001045-4 = "承知しました、リオ様。#n参ります！"
90001045-12 = "今回は手応えがあったね……氷の下に逃げちゃったけど。"
90001045-13 = "撤退したようですね。逃してしまったのは残念ですが――"
90001045-18 = "私たちにも、整備と休息が必要です。"
90001045-19 = "ゲブラ、シグナルロスト。#nすごいスピードでいっちゃった。"
90001045-22 = "……。"
90001045-28 = "……。"
90001045-29 = "久しぶり、リオ会長。完璧なタイミングだったね。"
90001045-33 = "ところで、部長は大丈夫？"
90001045-34 = "……全然大丈夫ですよ？#nおいしいところを持っていかれただなんて思っていませんとも、ええ。"
90001045-35 = "それに、私は寛大ですから。"
90001045-36 = "はぁ……部長が拗ねてるのは分かったよ。"
90001045-37 = "誤解を生むようなことを言わないでください！"
90001045-42 = "こほん――"
90001045-43 = "リオ、お元気でしたか？"
90001045-46 = "私は……。"
90001045-47 = "ここは挨拶を返すのが定石ではありませんか？"
90001045-52 = "[ns] \"一緒に挨拶しよっか、リオ。\""
90001045-53 = "そうね。では――"
90001045-54 = "息災だったかしら？#nその……会えて嬉しいわ。"
90001045-55 = "はい。私も心からそう思っております、リオ様。"
90001045-56 = "ちゃんと早寝早起きをされていますか？#n以前のように昼夜逆転の生活を送っていませんよね？"
90001045-57 = "ッ！？"
90001045-58 = "生活の大半は家事ロボットで賄えますが、ライフサイクルの改善だけは難しいですから。"
90001045-59 = "そ、その……。"
90001045-60 = "……努力しているわ。"
90001045-62 = "（なんか、会長とトキがどんな風に暮らしていたのかが分かるような……）"
90001045-68 = "さて、そろそろ本題に入りましょうか。"
90001045-69 = "なぜ今までミレニアムに帰ってこなかったのか――#nそして、その間どこにいたのか、教えていただけますか？"
90001045-70 = "それは……。"
90001045-71 = "あと、某セミナーの会計が、あなたに話したいことがたくさんあるようですよ？"
90001045-72 = "！？"
90001045-73 = "それに……どうしてこのタイミングで現れたのですか？"
90001045-74 = "もしかして、帰ってくる大義名分がないとか――"
90001045-75 = "実績がなければ戻れないだとか……そんなことを考えていたんじゃないですか？"
90001045-79 = "……私は、「名もなき神」の力が残した痕跡を追っていたのよ。"
90001045-80 = "「名もなき神」の……力ですか？"
90001045-81 = "ええ。あの日キヴォトスに顕現したそれは、事件が終わった後も痕跡を残し続けていたの。"
90001045-82 = "まさか、こうして貴方たちと会うことになるなんて……。"
90001045-83 = "（「名もなき神」の力が残した痕跡を追っていたらデカグラマトンの預言者に遭遇した……？）"
90001045-87 = "私の理念は、キヴォトスに起こる異変を未然に防ぎ、それに備えること。#n特異現象捜査部を作ったときから変わらないわ。"
90001045-88 = "人に言葉で伝えるのは苦手なの。だから、自分ができる範囲で注力していたのよ。"
90001045-89 = "それが……私にできる償いだから。"
90001045-91 = "……。"
90001045-92 = "分かりました。別になんでもいいですけど、ひとつだけ。"
90001045-93 = "特異現象捜査部のこと、全て私に任せて消えましたよね？#n断りにくい条件までつけて。"
90001045-94 = "ええ。貴女なら、個人の感情を抜きに私の理念を理解してくれると思ってのことよ。"
90001045-95 = "……それは脅迫なのではありませんか？"
90001045-96 = "[s3] \"まぁまぁ……。\"\n[s4] \"リオがいなかったら危なかったんだから。\""
90001045-99 = "……ええ。それは理解しています。"
90001045-100 = "それに、今回の件以外でも、私たちはあなたに大きな借りがありますから。"
90001045-101 = "ですから、ごちゃごちゃと理由をつけてないでさっさとミレニアムに戻りなさい、と言いたいところですが……。"
90001045-102 = "今、よく聞こえなかったのだけれど……何か言ったのかしら？"
90001045-103 = "何でもありません！"
90001045-104 = "あれ、でもこの状況って、会長の意向通り一緒にキヴォトスの危機に向けて動くことになったんだよね？"
90001045-105 = "そうですね。優秀なエージェントであり、完璧なメイドである私も一緒です。#n鬼に金棒というやつですね。"
90001045-106 = "……トキはおいといて、特異現象捜査部の創始者としての心境はどうなの？"
90001045-110 = "……特にないわ。"
90001045-111 = "はぁ……そう言うと思いました。"
90001045-112 = "今起きていることが普通でないのは確かよ。#nそれがキヴォトスにどのような影響を及ぼすかも判明していない。"
90001045-113 = "あなたが、何かを知っていることだけは理解しました。"
90001045-114 = "そして私たちもこれまでの道中で判明したことがあります。"
90001045-115 = "提案です。情報交換をしませんか？"
90001045-116 = "賛成よ。#n情報交換は……ゲブラを追跡しながら行うのが効率的だと思うのだけれど。#nどうかしら？"
90001045-117 = "そうしましょうか。#nエイミ、ゲブラが消えた方角を覚えていますか？"
90001045-118 = "うん、覚えてるよ。任せて。"
90001045-119 = "では、迅速に出発しましょう。"
90001045-121 = "次回;変数"
