22190-240 = "Sem um arranhão sequer…… como……"
22190-244 = "Pra começar, esse \"armamento\" foi feito junto da cidade-fortaleza, prevendo a ameaça que virá sobre Kivotos."
22190-245 = "E ele concentra a capacidade da cidade-fortaleza——#nou seja, não é exagero dizer que ele é a própria cidade-fortaleza."
22190-246 = "E…… também era algo que eu preparei prevendo o momento em que vocês, do C&C, traíssem."
