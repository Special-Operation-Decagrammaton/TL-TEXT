22190-248 = "você, e o C&C que você lidera—— eram, pra mim, um fator de incerteza."
22190-249 = "Por isso, eu me preparei para o caso de um dia chegar um momento como este."
22190-250 = "[s] \"Este é o poder…… que o \"armamento\" tem.\""
22190-251 = "Toki, recolha o Sensei da Schale."
22190-252 = "……Sim, senhora."
22190-256 = "Isto…… o chassi sofreu…… dano……?"
22190-257 = "Brecha à vista……! Momoi! Agora!"
