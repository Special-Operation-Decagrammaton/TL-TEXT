[translation]
22190-1 = "第19話;チートプレイヤー"
22190-10 = "……！！"
22190-15 = "[ns] \"こんなに攻撃してるのに、傷一つつかないなんて……。\""
22190-16 = "特殊金属で耐久力を増加させている……いや、耐えているわけじゃ、ない……？"
22190-17 = "そもそも、全ての攻撃を無力化してる……？"
22190-23 = "弾丸は到達前に撃墜され、死角からの攻撃も回避している……。"
22190-24 = "待って、おかしい。#nこのデータ量は……ありえない……！"
22190-25 = "要塞都市エリドゥ全域の電力と演算機能が、すべてあの「機体」に集中している……！？"
22190-26 = "これだけの強化を施されたら……未来を予知する事だって……できてしまう……！"
22190-27 = "[s] \"未来を……予知……！？\""
22190-28 = "な、何それ！そんなのラスボスが持ってる能力じゃん！？"
22190-29 = "それって、ただのチートじゃないですか！"
22190-30 = "あ、あうぅ……。"
22190-32 = "まずい。もう戦略とか戦術を話すような段階じゃない……。"
22190-33 = "唯一の変数である先生――貴方の指揮能力を奪い、終止符を打たせてもらうわ。"
22190-34 = "イエス、マム。"
22190-35 = "先生！逃げて！"
22190-36 = "[s] \"くっ……！でも！\""
22190-41 = "[ns] （どうしよう……一体どうすればこの状況を打開できるの！？）"
22190-48 = "先生……相手、は陸上専用の……"
22190-52 = "[ns] \"！！\""
22190-54 = "[ns] \"……ネル！戦う場所を変えよう！\""
22190-55 = "ハァ！？"
22190-56 = "[s] \"屋上に向かうよ……！\""
22190-57 = "……！！"
22190-58 = "はぁ……わーったよ！あんたを信じる！"
22190-66 = "んじゃ、舌噛まないよう、歯ァ食いしばりな！"
22190-68 = "[ns] \"うわぁっ！\""
22190-77 = "ここで逃げるだなんて……！トキ、行きなさい！"
22190-110 = "ターゲットを追撃、屋上に到着しました。"
22190-111 = "よりによって建物の屋上だなんて――"
22190-112 = "……狭いところであればトキとまともに戦える、と。"
22190-113 = "そう判断したのですね、先生。"
22190-114 = "[s] \"いや、狙いはそこじゃない。\""
22190-116 = "[ns] \"ネル！\""
22190-119 = "……頭上！？"
22190-120 = "ハッ！"
22190-123 = "そんな事をしたって無駄です！回避できますから――"
22190-130 = "そうだな。そのバカでかいおもちゃなら、逃げ回れるかもしれねーけど。"
22190-131 = "それは[ruby=・  ・]地上[/ruby]の話だろ？"
22190-133 = "じゃあ、空中はどうだ？"
22190-134 = "……！？"
22190-147 = "クッ、建物の外にはじき出された……？"
22190-149 = "おいおい、まさか空まで飛べるとか言わねぇよなぁ？"
22190-151 = "おら、来いよ！#n落下中でもあたしの攻撃、避けられるかどうか見てやるよ！"
22190-154 = "はぁはぁ……！二人とも一体どこ行っちゃったの！？"
22190-155 = "二人が向かった方角的にはこの辺のはずなんだけど……。"
22190-156 = "……！！あ、あそこ！#nモモイ、上……！"
22190-166 = "おりゃああっ！"
22190-170 = "被弾……ダメージ、軽微……！"
22190-171 = "重力加速に対する演算補正開始。"
22190-172 = "エリドゥのバックアップがある以上……#n空中であっても、行動に支障はありません。"
22190-173 = "対応を再開します。"
22190-178 = "いってぇな！！#nクソ、マジで何なんだよ！"
22190-179 = "空中でも行動できるなんてそんなんアリか……！？"
22190-180 = "ってかマジでチートじゃねぇのか！#nてめぇ！！ふざけんなよ！？"
22190-181 = "ネル先輩。"
22190-182 = "これで終わりです。"
22190-186 = "一斉掃射………！"
22190-187 = "やられてたまるか……！"
22190-194 = "（今の……！）"
22190-195 = "後ろがガラ空きだぜ……！"
22190-196 = "連戦による負傷………ゼロ。"
22190-197 = "対応、再開します。"
22190-198 = "…………ッ！？！？"
22190-217 = "[ns] \"はぁ……はあ……！ネル、大丈夫！？\""
22190-219 = "ああ、先生……あいつはどうなった？"
22190-220 = "[s] \"トキの様子はまだ……というか、傷が……！\""
22190-221 = "……ああ。"
22190-222 = "こんくらい別に……。"
22190-227 = "[ns] \"ネル！？\""
22190-229 = "ネル先輩！"
22190-239 = "あ、ありえない……ビルから落ちたのに……。"
22190-240 = "傷一つない……なんて……。"
22190-244 = "そもそも「[ruby=これ]武装[/ruby]」は、この先訪れるキヴォトスの脅威に備えて要塞都市と共に作ったもの。"
22190-245 = "そして要塞都市の能力を集結させている――#nつまり、要塞都市そのものといっても過言ではないわ。"
22190-246 = "そして……貴女たちC&Cが裏切った時に備えて準備していた物でもあった。"
22190-247 = "ネル、貴女は確かに優秀だけど……"
22190-248 = "貴女と、貴女が率いるC&Cは――私にとって不安要素でもあったの。"
22190-249 = "だから、いつかこのような日が来る場合に備えていたのよ。"
22190-250 = "[s] \"これが「武装」の持つ……力。\""
22190-251 = "トキ、シャーレの先生を回収して。"
22190-252 = "……イエス、マム。"
22190-256 = "これは……機体に、ダメージが……？"
22190-257 = "隙あり……！モモイ！今だよ！"
22190-258 = "うん……！分かった！"
22190-262 = "やあああっ！！"
22190-266 = "目標の逃走を確認。追いますか？"
22190-267 = "いえ……そこまでする必要はないわ。"
22190-268 = "私たちの目的は、あくまで刻限までここを防衛することだから。"
22190-269 = "……承知しました。"
22190-270 = "でも、またやって来るでしょうね。"
22190-271 = "そういう人たちだから。"
22190-272 = "その時こそ――"
22190-274 = "――すべてを終わらせましょう。"
22190-276 = "次回;ゲーマーとして、友達として"
