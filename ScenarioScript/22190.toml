[translation]
22190-1 = "Episódio 19; Cheater"
22190-10 = "......!!"
22190-15 = "[ns] \"Mesmo atacando tanto, ela não tem nem um arranhão......\""
22190-16 = "Ela está aumentando a durabilidade com metal especial... não, espera, não é como se ela estivesse apenas resistindo...?"
22190-17 = "Ela está anulando todos os ataques desde o início...?"
22190-23 = "As balas são abatidas antes de atingir, e ela desvia até de ataques vindo do ponto cego......"
22190-24 = "Espere, isso não faz sentido. #n Essa quantidade de dados é...... impossível......!"
22190-25 = "Toda a energia e poder de processamento da Cidade-Fortaleza Eridu estão concentrados naquela 'máquina'......!?"
22190-26 = "Com esse nível de reforço...... ela até consegue...... prever o futuro......!"
22190-27 = "[s] \"Prever...... o futuro......!?\""
22190-28 = "Q-Que isso! Essa não é uma habilidade que só os chefões finais têm!?"
22190-29 = "Isso não é nada além de trapaça!"
22190-30 = "A, auuh......"
22190-32 = "Droga. Não estamos mais no nível de discutir estratégia ou tática......"
22190-33 = "Sensei, você é a única variável aqui―― vou tomar sua capacidade de comando e dar um ponto final nisso."
22190-34 = "Sim, senhora."
22190-35 = "Sensei! Fuja!"
22190-36 = "[s] \"Grrr......! Mas!\""
22190-41 = "[ns] (O que eu faço... Como eu vou abrir caminho nessa situação!?)"
22190-48 = "Sensei...... ela é especializada em combate terrestre..."
22190-52 = "[ns] \"!!\""
22190-54 = "[ns] \"......Neru! Vamos mudar o lugar da luta!\""
22190-55 = "Hã!?"
22190-56 = "[s] \"Vamos para o telhado......!\""
22190-57 = "......!!"
22190-58 = "Haa... tá bom, tá bom! Vou confiar em você!"
22190-66 = "Então, morda o protetor bocal para não morder a língua!"
22190-68 = "[ns] \"Uwaaah!\""
22190-77 = "Tentar fugir aqui......! Toki, vá atrás dela!"
22190-110 = "Alvo perseguido, cheguei no telhado."
22190-111 = "Logo num telhado de um prédio――"
22190-112 = "......Pensando que pode lutar de igual para igual com a Toki se for num lugar apertado."
22190-113 = "Foi esse seu julgamento, não foi, Sensei?"
22190-114 = "[s] \"Não, o objetivo não é esse.\""
22190-116 = "[ns] \"Neru!\""
22190-119 = "......Acima de mim!?"
22190-120 = "Ha!"
22190-123 = "É inútil fazer isso! Eu consigo desviar――"
22190-130 = "É verdade. Talvez você consiga fugir com esse brinquedo gigante."
22190-131 = "Mas isso é no solo, não é?"
22190-133 = "E então, como é no ar?"
22190-134 = "......!?"
22190-147 = "Grr, ela me jogou para fora do prédio...?"
22190-149 = "Ei, ei, não vai me dizer que você consegue voar também, né?"
22190-151 = "Anda, vem! #n Vou ver se você consegue desviar dos meus ataques enquanto cai!"
22190-154 = "Haa, haa......! Para onde aquelas duas foram!?"
22190-155 = "Pela direção que elas foram, elas deveriam estar por aqui, mas..."
22190-156 = "......!! A, ali! #n Momoi, em cima...!"
22190-166 = "Toma essa!"
22190-170 = "Atingida... dano, mínimo...!"
22190-171 = "Iniciando correção de cálculo para aceleração gravitacional."
22190-172 = "Desde que eu tenha o backup de Eridu...... #n não terei dificuldades em agir, mesmo no ar."
22190-173 = "Retomando resposta."
22190-178 = "Que dor!! #n Droga, o que diabos é isso!"
22190-179 = "Conseguir agir no ar, isso é permitido...!?"
22190-180 = "Na verdade, isso não é trapaça!? #n Sua... tá brincando comigo!?"
22190-181 = "Neru-senpai."
22190-182 = "Isso termina aqui."
22190-186 = "Rajada completa.........!"
22190-187 = "Não vou ser derrotada assim...!"
22190-194 = "(Aquela agora......!)"
22190-195 = "Minhas costas estão totalmente abertas...!"
22190-196 = "Ferimentos por batalha contínua......... zero."
22190-197 = "Retomando resposta."
22190-198 = "............!?"
22190-217 = "[ns] \"Haa... haa...! Neru, está bem?\""
22190-219 = "Ah, Sensei... o que houve com ela?"
22190-220 = "[s] \"A Toki ainda... ou melhor, seus ferimentos...!\""
22190-221 = "......Ah."
22190-222 = "Isso aqui não é nada......"
22190-227 = "[ns] \"Neru!?\""
22190-229 = "Neru-senpai!"
22190-239 = "N, não é possível... mesmo caindo do prédio......"
22190-240 = "Nem um único ferimento...... isso é......"
22190-244 = "Originalmente, esse 'Armamento' foi feito junto com a cidade-fortaleza para se preparar para as ameaças que virão a Kivotos."
22190-245 = "E por concentrar as habilidades da cidade-fortaleza―― #n Não seria exagero dizer que ela mesma é a cidade-fortaleza."
22190-246 = "E também... foi algo que preparei caso vocês da C&C traíssem."
22190-247 = "Neru, você é certamente brilhante, mas..."
22190-248 = "Você, e a C&C que você lidera―― também eram um fator de insegurança para mim."
22190-249 = "Por isso, preparei isso para o caso de um dia como hoje chegar."
22190-250 = "[s] \"Esse é o... poder... que esse 'Armamento' possui.\""
22190-251 = "Toki, resgate o Sensei da Schale."
22190-252 = "......Sim, senhora."
22190-256 = "Isso é... a máquina sofreu dano...?"
22190-257 = "Brecha...! Momoi! Agora!"
22190-258 = "Sim...! Entendi!"
22190-262 = "Yaaaaah!!"
22190-266 = "Fuga do alvo confirmada. Devo perseguir?"
22190-267 = "Não... não há necessidade de ir tão longe."
22190-268 = "Nosso objetivo é, acima de tudo, defender este local até o prazo final."
22190-269 = "......Entendido."
22190-270 = "Mas, elas provavelmente voltarão."
22190-271 = "Esse é o tipo de pessoa que elas são."
22190-272 = "Quando esse dia chegar――"
22190-274 = "――Vamos acabar com tudo."
22190-276 = "Próximo Episódio; Como Gamer, como Amiga"