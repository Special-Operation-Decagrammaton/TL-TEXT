22190-134 = "……!?"
22190-147 = "Kh, fui jogada pra fora do prédio……?"
22190-149 = "Ei, ei, não me diga que você sabe voar até no céu, né?"
22190-151 = "Anda, vem!#nVou ver se você consegue desviar dos meus ataques até em queda livre!"
