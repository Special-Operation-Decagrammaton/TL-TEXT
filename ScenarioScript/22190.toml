22190-262 = "Toma láaa!!"
22190-266 = "Confirmada a fuga do alvo. Persigo?"
22190-267 = "Não…… não precisa ir tão longe."
22190-268 = "O nosso objetivo é, no fim, defender este lugar até a hora marcada."
22190-269 = "……Entendido."
22190-270 = "Mas eles vão voltar, com certeza."
22190-271 = "Porque são esse tipo de gente."
22190-272 = "E é justamente aí——"
