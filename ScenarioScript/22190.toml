[translation]
22190-1 = "Episódio 19; Jogadora Trapaceira"
22190-10 = "……！！"
22190-15 = "[ns] \"Mesmo atacando tanto assim, não consigo deixar nem um arranhão...\""
22190-16 = "Ela está aumentando a durabilidade com metal especial... não, não é como se ela estivesse apenas resistindo...?"
22190-17 = "Na verdade, ela está neutralizando todos os ataques...?"
22190-23 = "As balas são abatidas antes de chegar, e ela até desvia de ataques vindos de pontos cegos..."
22190-24 = "Espere, isso é estranho. #nEssa quantidade de dados... é impossível...!"
22190-25 = "Toda a energia e capacidade de processamento da cidade-fortaleza Eridu estão concentradas naquela \"unidade\"...!?"
22190-26 = "Com esse nível de aprimoramento... ela até seria capaz de... prever o futuro...!"
22190-27 = "[s] \"Prever... o futuro...!?\""
22190-28 = "Q-que isso! Esse não é o tipo de habilidade que um chefe final teria!?"
22190-29 = "Isso não é só trapaça!?"
22190-30 = "A-auuu..."
22190-32 = "Droga. Já não estamos mais no nível de discutir estratégias ou táticas..."
22190-33 = "Vou eliminar a única variável, Sensei — a sua capacidade de comando, e colocar um ponto final nisso."
22190-34 = "Sim, senhora."
22190-35 = "Sensei! Fuja!"
22190-36 = "[s] \"Droga...! Mas!\""
22190-41 = "[ns] (O que eu faço... Como eu posso reverter essa situação!?)"
22190-48 = "Sensei... o oponente é especializado em combate terrestre..."
22190-52 = "[ns] \"!!\""
22190-54 = "[ns] \"...Neru! Vamos mudar o local da luta!\""
22190-55 = "Hã!?"
22190-56 = "[s] \"Vamos para o telhado...!\""
22190-57 = "……！！"
22190-58 = "Ah... entendi! Vou confiar em você!"
22190-66 = "Então, morda os dentes para não cortar a língua!"
22190-68 = "[ns] \"Uwaaa!\""
22190-77 = "Como ousa fugir assim...! Toki, vá atrás dela!"
22190-110 = "Alvo perseguido, cheguei ao telhado."
22190-111 = "Logo no telhado do prédio..."
22190-112 = "...Você pensou que poderia lutar de igual para igual com a Toki em um lugar apertado."
22190-113 = "Foi isso que você concluiu, Sensei."
22190-114 = "[s] \"Não, esse não é o objetivo.\""
22190-116 = "[ns] \"Neru!\""
22190-119 = "...Acima de mim!?"
22190-120 = "Hah!"
22190-123 = "Fazer algo assim é inútil! Eu consigo desviar..."
22190-130 = "É verdade. Com esse brinquedo gigante, talvez você consiga fugir por aí."
22190-131 = "Mas isso é em terra firme, não é?"
22190-133 = "Então, e quanto ao ar?"
22190-134 = "……！？"
22190-147 = "Droga, fui jogada para fora do prédio...?"
22190-149 = "Ei, ei, não me diga que você consegue até voar?"
22190-151 = "Vamos, venha! #nQuero ver se você consegue desviar dos meus ataques mesmo caindo!"
22190-154 = "Ofegante...! Para onde as duas foram!?"
22190-155 = "Pela direção que elas seguiram, deveria ser por aqui..."
22190-156 = "……！！ Ah, ali! #nMomoi, em cima...!"
22190-166 = "Toma essa!"
22190-170 = "Atingida... dano, mínimo...!"
22190-171 = "Iniciando correção de cálculo para aceleração gravitacional."
22190-172 = "Desde que eu tenha o backup de Eridu...#nNão terei problemas em agir, mesmo no ar."
22190-173 = "Retomando o combate."
22190-178 = "Ai, droga!!#nQue porcaria, o que é isso, sério?!"
22190-179 = "Como assim ela consegue se mover no ar...!?"
22190-180 = "Isso não é trapaça, não?!#nEi!! Tá de brincadeira comigo?!"
22190-181 = "Neru-senpai."
22190-182 = "Isso acaba aqui."
22190-186 = "Disparo total.........!"
22190-187 = "Não vou ser derrotada assim.........!"
22190-194 = "(Aquilo agora...!)"
22190-195 = "Sua retaguarda está aberta...!"
22190-196 = "Ferimentos devido às batalhas sucessivas......... zero."
22190-197 = "Retomando o combate."
22190-198 = "............!?"
22190-217 = "[ns] \"Haa... haa...! Neru, você está bem?!\""
22190-219 = "Ah, Sensei... o que aconteceu com ela?"
22190-220 = "[s] \"A Toki ainda está... quer dizer, seus ferimentos...!\""
22190-221 = "......Ah."
22190-222 = "Isso não é nada..."
22190-227 = "[ns] \"Neru?!\""
22190-229 = "Neru-senpai!"
22190-239 = "N-não pode ser... ela caiu do prédio..."
22190-240 = "E não tem nem um arranhão... como..."
22190-244 = "Para começar, este \"armamento\" foi criado junto com a cidade-fortaleza para se preparar para as ameaças que virão a Kivotos."
22190-245 = "E ele concentra as capacidades da cidade-fortaleza —#nem outras palavras, não seria exagero dizer que ele é a própria cidade-fortaleza."
22190-246 = "E também... foi algo que preparei para o caso de vocês da C&C me traírem."
22190-247 = "Neru, você é certamente talentosa, mas..."
22190-248 = "Você e a C&C que você lidera — eram um fator de incerteza para mim."
22190-249 = "Por isso, me preparei para o caso de um dia como este chegar."
22190-250 = "[s] \"Este é o... poder que o 'armamento' possui.\""
22190-251 = "Toki, recupere o Sensei do Schale."
22190-252 = "......Sim, mamãe."
22190-256 = "Isso é... o chassi sofreu danos...?"
22190-257 = "Abertura...! Momoi! Agora!"
22190-258 = "Certo...! Entendido!"
22190-262 = "Yaaaaaah!!"
22190-266 = "Confirmo a fuga do alvo. Devo perseguir?"
22190-267 = "Não... não há necessidade de ir tão longe."
22190-268 = "Nosso objetivo é, acima de tudo, defender este lugar até o momento final."
22190-269 = "......Entendido."
22190-270 = "Mas elas virão de novo, não é?"
22190-271 = "É o tipo de pessoa que elas são."
22190-272 = "E quando esse momento chegar—"
22190-274 = "—vamos acabar com tudo."
22190-276 = "Próximo episódio: Como gamer, como amiga"
