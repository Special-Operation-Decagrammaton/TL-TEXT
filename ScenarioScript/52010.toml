[translation]
52010-1 = "第1話;届かない指先"
52010-13 = "……百花繚乱紛争調停委員会1年、[ruby=ごりょう]御稜[/ruby]ナグサ。"
52010-21 = "同じく百花繚乱紛争調停委員会1年、[ruby=ななかど]七稜[/ruby]アヤメ。"
52010-27 = "両者とも、前へ。"
52010-30 = "古来より伝わる百花繚乱のしきたりに従い――"
52010-31 = "いざ尋常に――"
52010-38 = "勝負！"
52010-46 = "……隙あり。"
52010-64 = "そこっ――！！"
52010-71 = "ぐっ……。"
52010-72 = "一本！それまで！"
52010-77 = "これで201戦、201勝……。"
52010-78 = "今日もありがと、ナグサ！良い試合だったよ。"
52010-82 = "うっ……うぅっ……。"
52010-83 = "な、ナグサ？"
52010-84 = "また……アヤメに負けちゃった……。"
52010-85 = "な、泣かないで！ナグサも強かったよ！？"
52010-86 = "でも……これじゃ、また役立たずになっちゃう。"
52010-87 = "ずっと……頑張ってきたのに、いつもこう……。#n私はアヤメの足元にも及ばない。"
52010-88 = "あまり自分を責めないの。"
52010-94 = "ほら、手。"
52010-97 = "私はいつでもそばにいるから。#nナグサが転んだら、すぐ手を差し伸べられるように。"
52010-101 = "……足手まといでも？"
52010-102 = "もちろん。"
52010-103 = "……泣き虫でも？"
52010-104 = "うん。"
52010-105 = "優柔不断で、一人じゃ何も決められなくて――"
52010-106 = "大丈夫だよ！#nだって私は――"
52010-114 = "私は……あんたを友達だと思ったことなんてないから。"
52010-132 = "……！！"
52010-133 = "はぁっ……はぁ……っ！#n……夢？"
52010-134 = "たしかに、アヤメが……そこにいたのに。"
52010-139 = "……っ！"
52010-142 = "痛……っ。"
52010-143 = "腕の中で、炎が渦巻いているみたい……熱い……。"
52010-144 = "あの時、私がアヤメを止められていれば……。"
52010-148 = "うぅ……っ。"
52010-149 = "ごめ……んっ、アヤメ……。"
52010-150 = "ごめんなさい……っ。"
52010-152 = "役立たずで、弱虫で……。"
52010-153 = "こんな私で……。"
52010-157 = "……ごめんなさい、アヤメ。"
52010-159 = "次回;新たな怪談"
