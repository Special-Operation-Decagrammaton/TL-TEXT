[translation]
52010-1 = "Episódio 1; Pontas dos Dedos Inalcançáveis"
52010-13 = "......Nagusa Goryou, 1º ano do Comitê de Mediação de Conflitos Hyakkaryouran."
52010-21 = "Também do 1º ano do Comitê de Mediação de Conflitos Hyakkaryouran, Ayame Nanakado."
52010-27 = "Ambas, fiquem em posição."
52010-30 = "Seguindo os costumes ancestrais da Hyakkaryouran――"
52010-31 = "Vamos começar com honra――"
52010-38 = "Luta!"
52010-46 = "......Aberto."
52010-64 = "Ali――!!"
52010-71 = "Ugh......"
52010-72 = "Um ponto! Acabou!"
52010-77 = "Isso faz 201 partidas, 201 vitórias..."
52010-78 = "Obrigada pela luta de hoje, Nagusa! Foi uma ótima partida."
52010-82 = "Ugh... ugh..."
52010-83 = "N, Nagusa?"
52010-84 = "De novo... eu perdi para a Ayame..."
52010-85 = "N, não chore! Você também foi forte, Nagusa!?"
52010-86 = "Mas... desse jeito, vou ser inútil de novo."
52010-87 = "Eu... me esforcei tanto, mas sempre acaba assim... #n Eu não chego nem aos pés da Ayame."
52010-88 = "Não se culpe tanto."
52010-94 = "Aqui, a mão."
52010-97 = "Eu estarei sempre ao seu lado. #n Para que, se você cair, eu possa estender minha mão imediatamente."
52010-101 = "......Mesmo sendo um estorvo?"
52010-102 = "Claro."
52010-103 = "......Mesmo sendo chorona?"
52010-104 = "Sim."
52010-105 = "Indecisa, sem conseguir decidir nada sozinha――"
52010-106 = "Está tudo bem! #n Porque eu――"
52010-114 = "Eu... nunca te considerei minha amiga, desde o início."
52010-132 = "......!!"
52010-133 = "Haa... haa...! #n ...Foi um sonho?"
52010-134 = "Era como se a Ayame... estivesse bem ali."
52010-139 = "......!"
52010-142 = "Dói... ugh."
52010-143 = "Parece que há chamas girando dentro do meu braço... está quente..."
52010-144 = "Se eu tivesse conseguido impedir a Ayame naquela hora..."
52010-148 = "Ugh... ugh..."
52010-149 = "Descu... desculpa, Ayame..."
52010-150 = "Sinto muito......"
52010-152 = "Tão inútil, tão covarde..."
52010-153 = "Alguém como eu..."
52010-157 = "......Desculpa, Ayame."
52010-159 = "Próximo Episódio; Novas Histórias de Fantasmas"

