[translation]
52010-1 = "Episódio 1; Pontas dos dedos que não alcançam"
52010-13 = "……Aluna do 1º ano do Comitê de Mediação de Conflitos Hyakkaryouran, Nagusa Goryou."
52010-21 = "Também do 1º ano do Comitê de Mediação de Conflitos Hyakkaryouran, Ayame Nanakado."
52010-27 = "Ambas, avancem."
52010-30 = "Seguindo os costumes ancestrais do Hyakkaryouran――"
52010-31 = "Vamos começar――"
52010-38 = "Combate!"
52010-46 = "……Abertura."
52010-64 = "Ali――!!"
52010-71 = "Guh……."
52010-72 = "Ponto! Acabou!"
52010-77 = "Com isso, 201 lutas, 201 vitórias……."
52010-78 = "Obrigada por hoje também, Nagusa! Foi uma boa luta."
52010-82 = "Ugh…… ugh……."
52010-83 = "N-Nagusa?"
52010-84 = "De novo…… eu perdi para a Ayame……."
52010-85 = "N-não chore! Você também foi forte, Nagusa!?"
52010-86 = "Mas…… desse jeito, eu vou ser inútil de novo."
52010-87 = "Eu me esforcei tanto…… mas sempre acaba assim…….#nEu não chego nem aos pés da Ayame."
52010-88 = "Não se culpe tanto."
52010-94 = "Aqui, sua mão."
52010-97 = "Porque eu estarei sempre ao seu lado.#nPara que, se a Nagusa cair, eu possa estender a mão imediatamente."
52010-101 = "……Mesmo sendo um estorvo?"
52010-102 = "Com certeza."
52010-103 = "……Mesmo sendo uma chorona?"
52010-104 = "Sim."
52010-105 = "Sendo indecisa, sem conseguir decidir nada sozinha――"
52010-106 = "Está tudo bem!#nPorque eu――"
52010-114 = "Eu…… nunca considerei você uma amiga."
52010-132 = "……!!"
52010-133 = "Haa…… haa……!#n……Foi um sonho?"
52010-134 = "Eu tinha certeza de que a Ayame…… estava ali."
52010-139 = "……!"
52010-142 = "Ai……."
52010-143 = "Parece que chamas estão girando dentro do meu braço…… está quente……."
52010-144 = "Se naquela época, eu tivesse conseguido impedir a Ayame……."
52010-148 = "Ugh……."
52010-149 = "Descu……lpe, Ayame……."
52010-150 = "Me desculpe……."
52010-152 = "Sendo inútil, covarde……."
52010-153 = "Sendo assim……."
52010-157 = "……Me desculpe, Ayame."
52010-159 = "Próximo episódio; Uma nova história de fantasmas"
