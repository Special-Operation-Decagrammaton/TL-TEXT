[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42210-1 = "Episódio 21: A Caverna de Caerbannog (2)"
42210-2 = "Sala de Operações do Silo"
42210-5 = "A-Aqui é FOX 3... foi mal, me derrubaram.#nAs 'Coelhinhas' já furaram a barricada e cruzaram o Ponto Lima."
42210-6 = "Aqui é FOX 4, na mesma situação.#nDescobriram meu ninho num piscar de olhos... Suporte de franco-atirador indisponível. Fim de linha."
42210-8 = "Aqui é FOX 2. Os 'Coelhos' armaram as fivelas e estão descendo de rapel pelos cabos em direção ao Ponto Oscar, direto pro seu andar."
42210-9 = "Todas as nossas barreiras de choque foram obliteradas... A estratégia tática colapsou e precisamos reestruturar."
42210-15 = "……Compreendido."
42210-16 = "A partir de agora, a FOX 1 erguerá a linha de defesa primária e engajará os alvos sozinha."
42210-17 = "FOX 2, conforme as minhas ordens prévias, reúna o nosso esquadrão ferido e recue para fora da zona operacional. Garanta a nossa rota de fuga."
42210-21 = "……FOX 2? Confirme o recebimento."
42210-25 = "O rádio morreu..."
42210-26 = "Depois de um deslocamento de ar explosivo colossal como aquele lá em cima... é natural que a infraestrutura e a fiação do prédio tenham fritado."
42210-27 = "……Talvez seja uma ironia piedosa do destino. Isso me poupa de ter que balbuciar mentiras ou palavras vazias para elas."
42210-31 = "Bem. Iniciarei a Defensiva 'Final'."
42210-38 = "RABBIT 1, descida de rapel concluída. Pés no chão."
42210-39 = "Sensei, o senhor está ferido?"
42210-40 = "[s1] \"Eu vim amarrado no cabo de aço descendo igual um saco de batatas cego, mas...\"\n[s2] \"O osso tá inteiro, tudo certo.\""
42210-43 = "Que alívio. Nenhuma fratura aparente durante o choque."
42210-49 = "RABBIT 2, rapel travado e botas no chão."
42210-50 = "……A Sala de Operações maldita fica logo ali na frente, né?"
42210-53 = "……A Sala de Operações maldita fica logo ali na frente, né?"
42210-54 = "Isso aí. É só varrer esse corredor reto e a gente bate a cara na porta do núcleo do silo, o centro de comando."
42210-56 = "O esquadrão tático das veteranas lá em cima virou poeira, mas nós não podemos abaixar a guarda. O bunker lá na frente pode estar forrado de armadilhas autônomas ou sensores."
42210-57 = "Façam uma checagem dupla na munição pesada, e logo em seguida――"
42210-68 = "……Uma exibição militar assombrosamente impecável, Capitã Tsukiyuki."
42210-70 = "……Veterana Yukino."
42210-71 = "A julgar pela sua postura, imagino que o rádio tenha narrado em tempo real a carnificina e a derrota da sua vanguarda lá em cima."
42210-72 = "O relógio parou e a Deusa da Vitória coroou o nosso avanço hoje.#nAbandone esse fuzil inútil e renda-se pacificamente para não derramar mais sangue."
42210-73 = "Não seja prepotente. A leitura do tabuleiro é inversa."
42210-74 = "No exato instante em que as suas botas profanaram o poço deste silo... a 'Guerra' foi matematicamente e tragicamente vencida pela minha facção."
42210-76 = "Do que é... que você tá falando?!"
42210-80 = "O meu polegar, neste exato momento e milissegundo, repousa sobre a chave de ignição manual da ogiva termobárica <A.N.T.I.O.C.H.>."
42210-81 = "Se os pés de vocês cruzarem a soleira e entrarem nesta Sala de Operações... eu forço a mola deste detonador de imediato."
42210-86 = "Cuspir o inferno hiperbárico num vácuo selado de concreto como este... derreterá o corpo, o osso e a arma de cada ser vivo respirando neste andar antes que possamos piscar. No entanto―― a 'Missão e o Sacrifício' serão um sucesso incontestável."
42210-87 = "Sua fanática... A senhora também vai carbonizar o próprio corpo se apertar isso!"
42210-88 = "Os meus batimentos cardíacos são variáveis inúteis na equação da guerra."
42210-89 = "Se a missão e a Glória exigem... a operadora entrega a carne e leva o alvo pro túmulo junto. Essa é a doutrina fria da verdadeira SRT."
42210-92 = "……"
42210-93 = "……Se a respiração e a vida frágil de vocês ainda têm algum valor biológico nas suas cabeças, deem meia-volta e rastejem pro parque.#nÉ o último conselho e a última pena que uma Veterana vos concede."
42210-99 = "……Sensei."
42210-100 = "[s] \"……Você não treinou, chorou na chuva e quebrou montanhas pra chegar aqui e abaixar o fuzil num blefe de homem-bomba, certo?\""
42210-101 = "……Obviamente que não."
42210-102 = "Nós somos cães de guerra do mesmo canil! Se for para o bem da missão final, a RABBIT também está disposta a mergulhar de cabeça no fogo do inferno!!"
42210-104 = "[ns] \"……Então apaguem as chamas dela.\""
42210-105 = "Você tá drogada de niilismo se achou mesmo que o nosso esquadrão ia meter o rabo entre as pernas e fugir com medo do ceifador no último minuto!"
42210-106 = "É sacanagem pura você engatilhar o botão de um brinquedo letal massivo como esse e achar que eu não vou pular aí e roubar a honra da detonação só pra mim... kuhihi..."
42210-107 = "Nenhum milímetro para trás... pelo sangue derramado e pelo Amanhã do nosso nome!"
42210-109 = "Vanguarda, foquem o fogo e barrem qualquer movimento lateral dela!!"
42210-113 = "Esquadrão RABBIT! Invasão de força total na Sala de Operações! CHUTEM A PORTA!"