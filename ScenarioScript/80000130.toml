[translation]
80000130-1 = "Pontas dos dedos frias"
80000130-6 = "Ah, Sensei."
80000130-7 = "Você estava no Schale, que bom."
80000130-8 = "[s1] \"Olá, Nagusa.\"\n[s2] \"Não me lembro de você estar de plantão hoje, aconteceu alguma coisa?\""
80000130-11 = "Hoje é Dia dos Namorados."
80000130-12 = "Enquanto eu fazia a ronda, a informação chegou naturalmente."
80000130-13 = "Aqui, chocolate.#nEu queria te entregar isso."
80000130-14 = "[s3] \"Chocolate da Nagusa...!\"\n[s4] \"Obrigado por vir até aqui, estou muito feliz.\""
80000130-17 = "Não é... nada demais."
80000130-18 = "Como você sempre me ajuda, Sensei,#neu queria te agradecer há muito tempo."
80000130-19 = "Mas, expressar meus sentimentos em um dia comum é um pouco constrangedor..."
80000130-20 = "Por isso, dias como hoje são bem-vindos."
80000130-21 = "[s] \"Com certeza, você tem razão.\""
80000130-25 = "[ns] \"Ué, parece que eu já vi isso em algum lugar...\""
80000130-28 = "É um biscoito de chocolate especial, exclusivo do Distrito de Hyakkiyako.#nTalvez você tenha visto em alguma loja por aí."
80000130-29 = "Ele é coberto com um chocolate branco doce e suave, feito com laticínios de Ebisu."
80000130-30 = "É o meu doce favorito, mas, por algum motivo, o pessoal da Hyakka Ryoran não come muito."
80000130-31 = "Mesmo quando eu compro, acabo comendo tudo sozinha."
80000130-32 = "[s] \"É mesmo? Então, deixa eu provar um pedaço...\""
80000130-37 = "[ns5] \"Que delícia!\"\n[ns6] \"O chocolate derrete no momento em que entra na boca, tem um sabor intenso.\""
80000130-40 = "Sim, eu também gosto disso nele."
80000130-41 = "Se quiser, pode comer mais."
80000130-42 = "[s] \"Bem, antes disso, só um instante...\""
80000130-46 = "Ah..."
80000130-47 = "Você não gostou muito?"
80000130-48 = "Desculpe...#nEu deveria ter percebido quando vi que ninguém mais comia."
80000130-49 = "Afinal, eu sou diferente de todo mundo..."
80000130-50 = "[ns] \"N-não é isso! Não foi o que eu quis dizer...!\""
80000130-52 = "[ns] \"É que, eu pensei em não sujar os documentos...\""
80000130-53 = "Ah... é verdade, esse \"Donzela Branca\" é um chocolate que derrete num instante..."
80000130-54 = "Ué... mas eu, até agora..."
80000130-58 = "...Ah, deve ser por causa da minha temperatura corporal."
80000130-59 = "[s] \"Temperatura corporal?\""
80000130-60 = "Sim... minha temperatura normal é baixa.#nTalvez por isso sempre digam que minhas mãos e pés são frios."
80000130-61 = "...Acho que foi por isso que, diferente dos outros, não sujei minhas mãos."
80000130-62 = "[s7] \"Entendo...\"\n[s8] \"Até que isso é um pouco invejável.\""
80000130-65 = "Fufu..."
80000130-66 = "Só nessas horas que isso acaba sendo útil, né..."
80000130-67 = "Eu também não aguento muito o calor... e não consigo transmitir calor direito para quem está ao meu lado."
80000130-68 = "...Mas eu não sabia. Vejo que também tem um lado bom."
80000130-69 = "[s9] \"Se a Nagusa não se importar...\"\n[s10] \"Pode me dar na boca?\""
80000130-72 = "V-você quer que eu te dê com a minha mão...?"
80000130-73 = "S-se você não se importar, Sensei..."
80000130-78 = "Aqui, Sensei... abre a boca."
80000130-83 = "[ns11] \"Que delícia...\"\n[ns12] \"Meu cérebro está sendo curado...\""
80000130-86 = "Fufu, é mesmo?"
80000130-87 = "...Encontrei uma nova qualidade."
80000130-89 = "(Depois disso, passei um tempo agradável sendo alimentado pela Nagusa)"
