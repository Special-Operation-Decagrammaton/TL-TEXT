[translation]#[Texto Final. - Filipe 08/07.]
70014010-1 = "A Andança do Farmacêutico (1)"
70014010-2 = "(Não é a primeira vez no Mercado Negro, mas……)"
70014010-3 = "(nunca tinha ido tão fundo assim)"
70014010-12 = "(Será que foi má ideia vir sozinha……?)"
70014010-13 = "(Se acontecer alguma coisa, todo mundo vai me dar bronca――)"
70014010-18 = "[ns] \"!?\""
70014010-23 = "Achei!"
70014010-25 = "Então era verdade que tinha uma presa por aqui!"
70014010-26 = "Dá pra ver que você é novo aqui."
70014010-27 = "Haha! Parece que tá pedindo pra ser sequestrado!"
70014010-28 = "Vamo levar!"
70014010-32 = "Vamos ganhar um bom resgate!"
70014010-33 = "Forasteiro paga bem, é uma mão na roda!"
70014010-34 = "Fica quieto. Não quer se machucar, quer?"
70014010-36 = "[ns1] (Eu até me preparei, mas……)\n[ns2] (mesmo se voltar inteiro, vou levar uma bela bronca……)"
70014010-44 = "Trouxemos ele, e agora?"
70014010-45 = "Primeiro…… aquilo! Contato!"
70014010-47 = "Sim. Vamos achar alguém que queira negociar…… depois……"
70014010-48 = "Pera, o quê……?"
70014010-49 = "O que foi?"
70014010-50 = "Nada não……"
70014010-51 = "Então?"
70014010-57 = "(Esse cara não parece com o Sensei da Schale……?)"
70014010-58 = "(Não, impossível. O Sensei não viria a um lugar desses)"
70014010-61 = "Enfim, vamos ganhar uma boa grana."
70014010-62 = "É isso aí! Não consigo parar de rir!"
70014010-63 = "Que barulheira."
70014010-76 = "Cachorro que late não morde."
70014010-77 = "[ns] \"……?\""
70014010-78 = "……?"
70014010-79 = "[s] \"Kai?\""
70014010-80 = "Sensei!?"
70014010-81 = "[s] \"Hã, por quê!?\""
70014010-82 = "Eu é que deveria perguntar."
70014010-87 = "……Bom, dizendo isso."
70014010-88 = "Mas, tanto faz. Não me interessa."
70014010-92 = "……Mas você parece ter interesse, hein?"
70014010-93 = "Kuku…… Aquele dia, eu fui levado para a Agência Correcional."
70014010-94 = "E por quem? Pelo Sensei."
70014010-95 = "Essa oportunidade que surgiu…… não seria a ocasião perfeita para uma vingança?"
70014010-96 = "[s] \"……!\""
70014010-97 = "Hahaha! Que cara boa."
70014010-98 = "Relaxa, não vou te comer."
70014010-99 = "(Por enquanto, é melhor não provocar Kai……)"
70014010-101 = "Voltando ao assunto.#nEu estava sendo transportado num veículo da Agência Correcional."
70014010-102 = "Mas o lugar onde me levaram foi outro."
70014010-112 = "O único que era de verdade era o veículo."
70014010-113 = "Ela deve achar que me fez um favor."
70014010-114 = "Bom, promessa é promessa."
70014010-116 = "[ns] \"Ela……?\""
70014010-117 = "Está curioso?#nMas não posso falar sobre isso."
70014010-118 = "Infelizmente, também é uma promessa."
70014010-119 = "Mas não é absoluta. As coisas estão sempre mudando."
70014010-120 = "Se o Sensei fizer uma promessa melhor―― talvez."
70014010-121 = "A proporção dos ingredientes pode gerar resultados completamente diferentes. Como no desenvolvimento de novos remédios."
70014010-122 = "[s] \"Então vou mudar a pergunta…… você ficou aqui todo esse tempo?\""
70014010-123 = "Não?"
70014010-124 = "É bom para esconder a identidade, mas…… é difícil conseguir materiais e reagentes."
70014010-125 = "Por um tempo, usei um nome falso e fingi ser um médico itinerante."
70014010-126 = "Até fiquei um tempo em Hyakkiyako."
70014010-127 = "[s] \"……E naquela época você não causou problemas.\""
70014010-128 = "É o que parece."
70014010-132 = "……Chegamos.#nAqui é onde eu moro agora."
70014010-134 = "(Segui Kai e subi uma escada velha e escura)"
70014010-142 = "[ns] \"……\""
70014010-144 = "[ns] \"Então aqui é a casa da Kai.\""
70014010-145 = "Na verdade, sou hóspede."
70014010-147 = "(Quando ia perguntar o que significava――)"
70014010-148 = "(uma velha apareceu, arrastando os pés com dificuldade)"
70014010-155 = "Ah…… bem-vindo de volta."
70014010-156 = "Cof, cof……"
70014010-157 = "Ora, quem é esse?"
70014010-158 = "Um hóspede."
70014010-159 = "Ora, que raro."
70014010-160 = "Então é alguém em quem você confia, hein."
70014010-161 = "Cof, cof……!"
70014010-162 = "Desculpa essa cena feia……#nmal consigo ficar de pé…… não estou bem."
70014010-163 = "Por que não volta pro quarto?"
70014010-164 = "Vou fazer isso……"
70014010-165 = "Não posso nem oferecer chá……"
70014010-166 = "……Por favor, fique à vontade."
70014010-172 = "(A velha voltou para o quarto arrastando os pés)"
70014010-173 = "(Logo depois, ouvi seu ronco)"
70014010-177 = "[ns] \"Quem é ela?\""
70014010-178 = "A dona da casa."
70014010-179 = "Tem algo como artrite reumatoide.#nTambém problemas nos pulmões e brônquios."
70014010-180 = "Do jeito que está, nem consegue sair de casa."
70014010-181 = "Mas está melhorando. Antes era pior."
70014010-182 = "Estou mantendo ela estável para evitar que piore."
70014010-186 = "Pela sua expressão…… você não entende a doença, né?"
70014010-187 = "Artrite reumatoide é uma doença autoimune."
70014010-188 = "O sistema imunológico ataca as células saudáveis do próprio corpo em vez de invasores externos."
70014010-189 = "Ou seja, o corpo se destrói."
70014010-190 = "As articulações são um dos primeiros lugares afetados."
70014010-191 = "Mas, fora a coluna, nenhum lugar está seguro.#nSe der azar, pode evoluir para um linfoma."
70014010-192 = "[s] \"Sério!?\""
70014010-193 = "É só o pior cenário."
70014010-194 = "[s3] \"Não me assusta assim……\"\n[s4] \"E você pode curá-la completamente?\""
70014010-197 = "Em geral, não."
70014010-198 = "[s] \"Isso quer dizer……\""
70014010-199 = "Normalmente, o tratamento foca em retardar a progressão."
70014010-200 = "Em alguns casos, ajusta-se a resposta imunológica."
70014010-201 = "Ou seja, só se faz paliativos."
70014010-202 = "Sim, em geral, é assim."
70014010-203 = "Kuku…… entendo o que você quer dizer."
70014010-204 = "Será que EU posso fazer algo?"
70014010-205 = "――Ah, claro."
70014010-206 = "[s] \"Então por que não a cura?\""
70014010-207 = "Estava pensando em dar o próximo passo."
70014010-208 = "Há alguns dias, fiz um acordo com a velha."
70014010-212 = "Ela vai me dar a casa."
70014010-213 = "Foi o que combinamos."
70014010-214 = "Eu pensei: se eu conseguir a posse da casa, posso encerrar essa relação."
70014010-215 = "Pensei nisso."
70014010-216 = "[s] \"Então por que você a mantém estável?\""
70014010-217 = "Quando se está saudável ou doente, qual dos dois pensa melhor?"
70014010-218 = "É uma questão de custo-benefício."
70014010-219 = "Para conseguir a casa."
70014010-220 = "[s] \"……!!!\""
70014010-221 = "Resumindo, ela logo não vai servir pra mais nada."
70014010-222 = "Se quiser me desprezar, fique à vontade."
70014010-223 = "É assim que Shinatani Kai é. Não tenho intenção de esconder."
70014010-224 = "Mas também não saio proclamando isso por aí."
70014010-225 = "[s] \"Mas você pode curá-la, né?\""
70014010-226 = "Sim."
70014010-227 = "Se a pergunta é se posso ou não―― posso, e muito."
70014010-231 = "Hmm? Então você quer que eu cure?"