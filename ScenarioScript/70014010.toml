[translation]
70014010-1 = "The Apothecary's Wanderings (1)"
70014010-2 = "(It's not my first time in the Black Market, but...)"
70014010-3 = "(I've never come this deep before.)"
70014010-12 = "(Was coming alone a bad idea...?)"
70014010-13 = "(If something happens, everyone might get mad at me—)"
70014010-18 = "[ns] \"!?\""
70014010-23 = "Found one!"
70014010-25 = "So it's true that there's a sucker here!"
70014010-26 = "It's obvious they aren't used to this place."
70014010-27 = "Haha! It's like they're begging to be kidnapped, right?"
70014010-28 = "Let's take 'em, quick!"
70014010-32 = "We'll make a fortune in ransom!"
70014010-33 = "Outsiders pay well, so I'm grateful!"
70014010-34 = "Stay quiet. You don't want to get hurt, do you?"
70014010-36 = "[ns1] (I thought I was prepared, but...)\n[ns2] (Even if I make it back safely, I'll probably get a long lecture...)"
70014010-44 = "I brought them here, now what?"
70014010-45 = "First... that! Contact info!"
70014010-47 = "Yeah. Find someone who can handle the transaction... and then..."
70014010-48 = "Wait, huh...?"
70014010-49 = "What's wrong?"
70014010-50 = "No, it's nothing..."
70014010-51 = "What is it?"
70014010-57 = "(Doesn't this person look like the Sensei from Schale...?)"
70014010-58 = "(No, that's impossible. Sensei would never come to a place like this.)"
70014010-61 = "Anyway, let's make sure we earn a good profit."
70014010-62 = "You bet! I can't stop laughing!"
70014010-63 = "You're annoying."
70014010-76 = "Empty vessels make the most noise."
70014010-77 = "[ns] \"...?\""
70014010-78 = "……?"
70014010-79 = "[s] \"Kai?\""
70014010-80 = "Sensei!?"
70014010-81 = "[s] \"Wait, why!?\""
70014010-82 = "That's my line."
70014010-87 = "...Or so I said."
70014010-88 = "Well, it doesn't matter. I don't have much interest in it."
70014010-92 = "...But it seems you do, Sensei?"
70014010-93 = "Heh... That day, I was indeed sent to the Correction Bureau."
70014010-94 = "By none other than your own hand, Sensei."
70014010-95 = "This opportunity that has come around... is it the perfect chance for revenge?"
70014010-96 = "[s] \"...!\""
70014010-97 = "Hahaha! What a great expression."
70014010-98 = "Don't worry, I won't eat you."
70014010-99 = "(I should try not to get on Kai's bad side for now...)"
70014010-101 = "Let's get back to the point. #nI was being transported in a Correction Bureau vehicle."
70014010-102 = "But I was taken to a different place."
70014010-112 = "The only real thing was the vehicle, that's all."
70014010-113 = "With this, she probably thinks she's owed a favor."
70014010-114 = "Well, a 'promise' is important, after all."
70014010-116 = "[ns] \"She...?\""
70014010-117 = "Are you curious? #nHowever, I cannot speak of it freely."
70014010-118 = "Unfortunately, that is also a promise."
70014010-119 = "That said, it's not absolute. Things are constantly in flux."
70014010-120 = "If you, Sensei, were to make a better promise—perhaps."
70014010-121 = "Depending on the ratio of the mixture, you get completely different results. Like developing a new drug."
70014010-122 = "[s] \"Then let me change the question... have you been here the whole time?\""
70014010-123 = "No?"
70014010-124 = "It's convenient for hiding my identity, but... it's difficult to obtain materials and reagents."
70014010-125 = "For a while, I used a fake name and played the part of a wandering doctor."
70014010-126 = "I even received help in Hyakkiyako once or twice."
70014010-127 = "[s] \"...You didn't cause any trouble back then, did you?\""
70014010-128 = "That's just hindsight."
70014010-132 = "...We're here. #nThis is my current 'residence'."
70014010-134 = "(I followed Kai up the old, dark stairs.)"
70014010-142 = "[ns] \"...\""
70014010-144 = "[ns] \"So this is your home, Kai.\""
70014010-145 = "Technically, I'm a freeloader."
70014010-147 = "(Just as I was about to ask what that meant—)"
70014010-148 = "(An old man appeared with a labored gait.)"
70014010-155 = "Ah... welcome back."
70014010-156 = "Cough, cough..."
70014010-157 = "Oh, and who is this?"
70014010-158 = "A guest."
70014010-159 = "Oh, how rare."
70014010-160 = "You must trust them quite a bit, then."
70014010-161 = "Cough, cough...!"
70014010-162 = "Forgive my unsightly appearance... #nI can barely stand... I'm not doing very well."
70014010-163 = "Why don't you go back to your room?"
70014010-164 = "I think I shall..."
70014010-165 = "I can't even offer you tea..."
70014010-166 = "...Please, make yourself at home."
70014010-172 = "(The old man dragged his feet as he returned to his room.)"
70014010-173 = "(Soon, I could hear his breathing as he slept.)"
70014010-177 = "[ns] \"Who was that?\""
70014010-178 = "The landlord."
70014010-179 = "He has something like rheumatoid arthritis. #nHe also suffers from lung and bronchial issues."
70014010-180 = "In that state, he can't even go outside."
70014010-181 = "That said, he is improving. It was much worse before."
70014010-182 = "I've been maintaining him so he stays somewhat better."
70014010-186 = "By the look on your face... I take it you don't understand his condition?"
70014010-187 = "Rheumatism is an autoimmune disease."
70014010-188 = "It occurs when the body's immune system attacks its own normal cells instead of external antigens."
70014010-189 = "In other words, he's destroying himself."
70014010-190 = "The joints are the first place symptoms appear."
70014010-191 = "That said, aside from the spine, you can't be safe anywhere. #nIf he's unlucky, it could even develop into lymphoma."
70014010-192 = "[s] \"It can!?\""
70014010-193 = "That's just the worst-case scenario."
70014010-194 = "[s3] \"Don't scare me like that...\"\n[s4] \"So, can you cure him?\""
70014010-197 = "Generally, no."
70014010-198 = "[s] \"What does that mean...?\""
70014010-199 = "Usually, treatment focuses on slowing the progression."
70014010-200 = "In some cases, we forcibly adjust the immune system's function."
70014010-201 = "In short, there's only a stopgap measure."
70014010-202 = "Yes, generally speaking."
70014010-203 = "Heh... I know what you're trying to say."
70014010-204 = "Can I do it?"
70014010-205 = "—Yes, of course."
70014010-206 = "[s] \"Then why don't you cure him?\""
70014010-207 = "I was just thinking about moving to the next stage."
70014010-208 = "A few days ago, I secured a promise from that old man."
70014010-212 = "He'll hand over the house."
70014010-213 = "That's the promise."
70014010-214 = "I thought about it."
70014010-215 = "Once I get ownership of the house, couldn't I just end this relationship?"
70014010-216 = "[s] \"Then why did you keep him maintained?\""
70014010-217 = "When is someone's mind sharper: when they're healthy, or when they're plagued by illness?"
70014010-218 = "It's a cost-benefit analysis."
70014010-219 = "To get the house, that is."
70014010-220 = "[s] \"...!!!\""
70014010-221 = "In short, he'll be useless soon."
70014010-222 = "If you want to despise me, feel free."
70014010-223 = "Kai Shintani is that kind of person. I have no intention of hiding it."
70014010-224 = "Though I don't go out of my way to advertise it, either."
70014010-225 = "[s] \"But you can cure him, right?\""
70014010-226 = "Yes."
70014010-227 = "If it's a matter of whether I can or not... I could do it any number of times."
70014010-231 = "Hmm? So, you want me to do it?"