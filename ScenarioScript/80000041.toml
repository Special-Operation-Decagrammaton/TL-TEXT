[translation]
80000041-1 = "ふたりっきりの打ち上げ"
80000041-5 = "何か、いつも以上に疲れるアルバイトだった……。"
80000041-6 = "[s] \"すごい数のお客さんだったね……。\""
80000041-7 = "大人気のスイーツのお店だとは知ってたけど、あそこまでだなんて……。"
80000041-8 = "オーダーが全然無くなる気配が無いし、いくら捌いても増えていく一方……。"
80000041-9 = "本来の終業予定時刻、思いっきり超えてたし……まあその分、追加の手当はくれたから良いんだけど。"
80000041-10 = "あ、でも先生にも付き合わせちゃった……"
80000041-11 = "……ごめん、先生。"
80000041-12 = "軽い気持ちで誘ったけど、結構時間貰っちゃって……。"
80000041-13 = "先生はいっつも忙しいって知ってるのに。"
80000041-14 = "[s1] \"ううん、そんなことないよ。\"\n[s2] \"ずっとセリカと一緒で楽しかったから。\""
80000041-15 = "え、えぇっ……！？"
80000041-16 = "え、えぇっ……！？"
80000041-17 = "な、何を急にそんな……べ、別にそんなこと言われても、何もあげたりしないからね！？"
80000041-18 = "[s] \"強いて言うなら、セリカに労ってもらえたら嬉しい。\""
80000041-19 = "え、それって「よしよし」ってしてほしいとか、そういう……？やっ、それはちょっと恥ずかしい……！"
80000041-20 = "ああもう何でそんな残念そうな顔するの！？しないからっ！？"
80000041-21 = "全く……。"
80000041-25 = "……ふふっ。"
80000041-26 = "はぁ……先生に申し訳ないなって気持ちでいっぱいだったのに、何だか私がバカみたいじゃん。"
80000041-27 = "[s3] \"うん、気にしなくて大丈夫だよ。\"\n[s4] \"ああいうアクシデントも楽しいよね。\""
80000041-28 = "うん。それに、今日はどうしてもあそこでバイトしたかったし。"
80000041-29 = "うん。それに、今日はどうしてもあそこでバイトしたかったし。"
80000041-30 = "[s] \"……？\""
80000041-31 = "ふふっ♪びっくりしないでね、先生。"
80000041-32 = "せっかくあんなに有名で忙しいところのアルバイトなんだから、対価がないとね。"
80000041-33 = "じゃじゃーん！"
80000041-39 = "[ns] \"チョコレートケーキ？\""
80000041-40 = "うん、あのお店で一番人気の看板商品なんだって。"
80000041-41 = "あまりにも大人気で、バレンタインの一か月前くらいには予約が完売しちゃうらしいの。"
80000041-42 = "でもあのお店でアルバイトすると、バイト代に加えてこのケーキをプレゼントしてくれるって噂を聞いてね。"
80000041-43 = "[s] \"なるほど、この狙いもあったんだね。\""
80000041-44 = "そうそう。ふふっ、せっかくバレンタインデーなんだし。"
80000041-45 = "[s] \"よくその情報手に入れたね、すごい。\""
80000041-46 = "あはっ、もっと褒めても良いのよ！存分に！"
80000041-47 = "[s] \"「もっと」……頭を撫でる、とか？\""
80000041-51 = "えっ、それはその、別に良いけど……ってうわぁっ！？"
80000041-52 = "ちょっ、待って、ダメ！そこはちょっと敏感で……っ、ストップストップ！"
80000041-54 = "あ、いやその、嫌ってわけじゃないんだけど……あ、ちょっと待った！もう終わり！"
80000041-55 = "はぁ……とにかく、もうこんな時間だけど……。"
80000041-56 = "先生が良ければその、一緒にこのケーキ食べない……？"
80000041-57 = "[s] \"もちろん、喜んで。\""
80000041-58 = "うん！じゃ、行こっか。二人だけでバイトの打ち上げだね。"
80000041-60 = "（その後セリカと一緒に、美味しいケーキを味わった）"
