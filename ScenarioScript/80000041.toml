[translation]
80000041-1 = "Uma comemoração a sós"
80000041-5 = "Foi um trabalho de meio período mais cansativo do que o normal..."
80000041-6 = "[s] \"Tinha uma quantidade incrível de clientes, né...\""
80000041-7 = "Eu sabia que era uma confeitaria muito popular, mas não imaginava que seria tanto assim..."
80000041-8 = "Os pedidos não paravam de chegar, e não importava o quanto a gente atendesse, eles só aumentavam..."
80000041-9 = "Passamos muito do horário previsto para terminar... bem, pelo menos recebi um adicional por isso, então tudo bem."
80000041-10 = "Ah, mas eu acabei fazendo o Sensei passar por isso também..."
80000041-11 = "...Desculpa, Sensei."
80000041-12 = "Eu te chamei sem pensar muito, mas acabamos perdendo bastante tempo..."
80000041-13 = "E eu sei que você está sempre ocupado."
80000041-14 = "[s1] \"Não, não foi nada disso.\"\n[s2] \"Eu me diverti ficando com a Serika o tempo todo.\""
80000041-15 = "E-Eh...!?"
80000041-16 = "E-Eh...!?"
80000041-17 = "P-Por que você diz essas coisas do nada...? N-Não é como se eu fosse te dar alguma coisa só porque você disse isso, viu!?"
80000041-18 = "[s] \"Se for para pedir algo, eu ficaria feliz se a Serika me fizesse um carinho.\""
80000041-19 = "Eh, isso seria tipo... querer que eu faça um "afago"? Ah, isso é um pouco vergonhoso...!"
80000041-20 = "Ah, qual é, por que você está com essa cara de decepcionado!? Eu não vou fazer isso, pronto!"
80000041-21 = "Francamente..."
80000041-25 = "...Fufu."
80000041-26 = "Ah... eu estava me sentindo tão mal pelo Sensei, mas agora sinto que fui uma boba."
80000041-27 = "[s3] \"Sim, não precisa se preocupar com isso.\"\n[s4] \"Esse tipo de imprevisto também é divertido, não é?\""
80000041-28 = "É. Além disso, eu queria muito trabalhar lá hoje."
80000041-29 = "É. Além disso, eu queria muito trabalhar lá hoje."
80000041-30 = "[s] \"...?\""
80000041-31 = "Fufu♪ Não se surpreenda, Sensei."
80000041-32 = "Já que é um trabalho tão famoso e cansativo, tem que ter uma recompensa, né?"
80000041-33 = "Tcharam!"
80000041-39 = "[ns] \"Um bolo de chocolate?\""
80000041-40 = "Sim, dizem que é o carro-chefe mais popular daquela loja."
80000041-41 = "É tão popular que as reservas esgotam cerca de um mês antes do Dia dos Namorados."
80000041-42 = "Mas ouvi dizer que, se você trabalhar lá, eles te dão esse bolo de presente além do salário."
80000041-43 = "[s] \"Entendi, então esse era o seu objetivo também.\""
80000041-44 = "Isso mesmo. Fufu, afinal, é Dia dos Namorados."
80000041-45 = "[s] \"Você é incrível por ter conseguido essa informação.\""
80000041-46 = "Ah, pode me elogiar mais! Pode continuar!"
80000041-47 = "[s] \"'Mais'... que tal um carinho na cabeça?\""
80000041-51 = "Eh, isso, bem, eu não me importo, mas... uwaa!?"
80000041-52 = "Ei, espera, não! Esse lugar é um pouco sensível... pare, pare!"
80000041-54 = "Ah, não, é que... não é que eu não goste, mas... ah, espera um pouco! Já chega!"
80000041-55 = "Ah... de qualquer forma, já está bem tarde, mas..."
80000041-56 = "Se o Sensei quiser, bem... você não quer comer esse bolo comigo?"
80000041-57 = "[s] \"Claro, com prazer.\""
80000041-58 = "Sim! Então, vamos lá. Nossa comemoração de fim de trabalho, só nós dois."
80000041-60 = "(Depois disso, aproveitei o delicioso bolo junto com a Serika)"
