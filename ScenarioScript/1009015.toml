[translation]
1009015-1 = "um mundo"

1009015-2 = "Obrigado por esperar...!"

1009015-3 = "[s1] \"Está tudo bem.\"\n[s2] \"Há algo errado?\""

1009015-6 = "Bem... havia pessoas se preparando para um festival ali perto."

1009015-7 = "Enquanto eu olhava, perdi a noção do tempo..."

1009015-8 = "[s] \"Ah, tem um festival acontecendo agora?\""

1009015-9 = "Na verdade, também é a primeira vez que ouço falar disso... #nUgh, sou famoso por adorar festivais."

1009015-10 = "Pelo que ouvi, o bairro comercial será o anfitrião do evento."

1009015-11 = "A atmosfera era como um bazar que também servia de festival."

1009015-12 = "[s] \"Mas você achou tudo bem. Como esperado de Umika.\""

1009015-13 = "Isso é ultrajante. Ehehe."

1009015-14 = "Mas sim...quando vejo pessoas tão dedicadas ao festival..."

1009015-15 = "Acho que também tenho que dar o meu melhor."

1009015-16 = "[ns] (Você realmente gosta de festivais... você é tão enérgico)"

1009015-17 = "Afinal, os festivais dão cor ao dia a dia."

1009015-18 = "foto? Hmm... o que isso significa..."

1009015-19 = "Acho que os festivais são extraordinários."

1009015-20 = "Claro, não se trata apenas de festivais. #nParques de diversões e destinos de viagem...#nTalvez jogos, filmes, livros, etc. sejam semelhantes."

1009015-21 = "O importante é fugir do dia a dia e sentir que foi para outro lugar."

1009015-22 = "É por isso que acho que precisamos criar um “mundo divertido”!"

1009015-23 = "Você poderia dizer que é um momento em que você pode esquecer a vida cotidiana e se tornar inocente."

1009015-24 = "Um festival animado começa pela manhã e termina com fogos de artifício à noite. #nÉ como se um mundo estivesse se abrindo e depois fechando."

1009015-25 = "Depois de curtir o mundo, todos voltam ao dia a dia revigorados."

1009015-26 = "...Parece uma fantasia onde você vai para outro mundo!"

1009015-27 = "Mas não é apenas uma coisa boa..."

1009015-28 = "O ambiente era tão divertido que acabei comprando muitas coisas..."

1009015-29 = "[s] \"Sim... isso é verdade.\""

1009015-30 = "Isso se torna uma memória."

1009015-31 = "Por exemplo... assim."

1009015-37 = "[ns] \"Boneca?\""

1009015-38 = "Pois é... comprei no meu primeiro festival."

1009015-39 = "Naquela época eu era muito mais criança do que sou agora..."

1009015-40 = "Eu realmente não me lembro por que comprei isso."

1009015-41 = "Eu acho que... no momento em que coloquei os olhos nele, eu quis, não importa o que acontecesse...#nEu sinto que..."

1009015-42 = "[ns] \"Esse tipo de coisa acontece.\""

1009015-44 = "[ns] \"Que tipo de boneca é essa...?\""

1009015-45 = "Na verdade, eu também não sei."

1009015-46 = "A pessoa que estava na barraca naquele momento também não me contou."

1009015-47 = "Estou pensando em perguntar algum dia..."

1009015-48 = "Ehehe... No final das contas ainda não sei."

1009015-49 = "[s] \"Inclusive isso, é uma lembrança do festival.\""

1009015-50 = "sim! Isso mesmo!"

1009015-51 = "...Essa boneca também tem outros segredos."

1009015-52 = "[s] \"Ah, qual é o segredo...!?\""

1009015-53 = "Hum, uh…."

1009015-54 = "Tem outra dessas bonecas."

1009015-60 = "[ns] \"Eles são um par de bonecos!\""

1009015-61 = "Sim, está certo."

1009015-62 = "As barracas têm mais significado porque são um par..."

1009015-66 = "...Ah!"

1009015-67 = "[s] \"O que há de errado?\""

1009015-71 = "Naná, não é nada!"

1009015-72 = "Com licença, senhor! Eu estava de plantão hoje, certo?"

1009015-73 = "Bem, eu tenho que ajudar o professor com o trabalho dele!"

1009015-74 = "[s] \"Umika?\""

1009015-75 = "Vamos, professor! Vamos terminar isso rapidamente!"

1009015-76 = "それと、さきほどお話したお祭りは、明日開かれるようなので……。"
1009015-77 = "Se você não se importa, venha comigo..."

1009015-78 = "[s] \"Tudo bem. Vamos juntos.\""

1009015-79 = "...!"

1009015-80 = "obrigado!"

1009015-82 = "(Então terminei o trabalho com Umika)"

1009015-83 = "(Depois que Umika saiu...)"

1009015-86 = "[ns] \"Hein?\""

1009015-89 = "[ns] \"Isto é...\""

1009015-90 = "(Talvez eu tenha esquecido alguma coisa...)"

1009015-94 = "(...enviei discretamente o Momotalk)"

