[translation]
1009015-1 = "ひとつの世界"
1009015-2 = "お待たせしました……！"
1009015-3 = "[s1] \"大丈夫だよ。\"\n[s2] \"なにかあったの？\""
1009015-6 = "それが……この近くで、お祭りの準備をしている方々がいまして。"
1009015-7 = "それを眺めていたら、時間を忘れてしまい……。"
1009015-8 = "[s] \"あれ、今お祭りやってるんだっけ？\""
1009015-9 = "実は、私も初めて知りまして……。#nうう、お祭り好きの名折れです。"
1009015-10 = "聞いた話では、商店街が主催をしているそうで。"
1009015-11 = "お祭りを兼ねたバザーのような雰囲気でした。"
1009015-12 = "[s] \"でも、よく見つけたね。さすがウミカだよ。\""
1009015-13 = "と、とんでもないです。えへへ。"
1009015-14 = "ですが、そうですね……お祭りにひたむきな方々を見ると……。"
1009015-15 = "私も頑張らなきゃって思います。"
1009015-16 = "[ns] （お祭りが本当に好きなんだな……健気だ）"
1009015-17 = "だって、お祭りがあったら日常に彩りが出ますからね。"
1009015-18 = "え？うーん……どういう意味かというと……。"
1009015-19 = "お祭りは非日常だって、私は思うんです。"
1009015-20 = "もちろん、お祭りだけではないですよ。#n遊園地や旅先……#nゲームや映画、本なども似ているのかもしれませんね。"
1009015-21 = "大事なのは、日常から離れて……#nどこか他の場所に出かけたような気持ちになってもらうこと。"
1009015-22 = "だから、「楽しい世界」を作らなきゃって思うんです！"
1009015-23 = "日々の事を忘れて、無邪気になれる時間とでも言いましょうか。"
1009015-24 = "朝、賑やかなお祭りが始まって……夜の花火で締めくくられる。#nまるで、ひとつの世界が開かれて、閉じるように。"
1009015-25 = "そして、その「世界」を楽しんだみんなは、リフレッシュして日常へ戻っていくんです。"
1009015-26 = "……なんだか、異世界に行くファンタジーみたいだなって！"
1009015-27 = "ですが、良いことだけではありません……。"
1009015-28 = "楽しい空気にあてられて、いろいろと買ってしまったりも……。"
1009015-29 = "[s] \"うん……あるあるだね。\""
1009015-30 = "それが思い出になったりするんですけどね。"
1009015-31 = "例えば……これとか。"
1009015-37 = "[ns] \"人形？\""
1009015-38 = "ええ……初めてのお祭りで買ったんです。"
1009015-39 = "あの頃は、今よりもっと子どもで……。"
1009015-40 = "どうしてこれを買ったのかも、よく覚えてなくて。"
1009015-41 = "たしか……目に入った瞬間、どうしても欲しくなったような……#n気はするのですが……。"
1009015-42 = "[ns] \"そういうこと、あるよね。\""
1009015-44 = "[ns] \"これ、何の人形なんだろう……？\""
1009015-45 = "実は私も知らないんです。"
1009015-46 = "あのときの露店の方も、教えてくれなくて。"
1009015-47 = "いつか聞いてみようと思いながら……。"
1009015-48 = "えへへ……結局、今も分からないままなんですよね。"
1009015-49 = "[s] \"そこも含めて、お祭りの思い出なんだね。\""
1009015-50 = "はい！そうなんです！"
1009015-51 = "……その、他にも、この人形には秘密があるんです。"
1009015-52 = "[s] \"おおっ、その秘密とは……！？\""
1009015-53 = "え、ええと……。"
1009015-54 = "この人形、もう一つあってですね。"
1009015-60 = "[ns] \"ペアの人形なんだね！\""
1009015-61 = "ええ、そうなんです。"
1009015-62 = "ペアだから意味があると、露店の方が……。"
1009015-66 = "……あっ！"
1009015-67 = "[s] \"どうしたの？\""
1009015-71 = "な、ななな何でもありません！"
1009015-72 = "すみません、先生！今日当番でしたよね、私！"
1009015-73 = "せ、先生の仕事のお手伝いをしないと！"
1009015-74 = "[s] \"ウミカ？\""
1009015-75 = "さ、さあ、先生！早く終わらせましょう！"
1009015-76 = "それと、さきほどお話したお祭りは、明日開かれるようなので……。"
1009015-77 = "もし、よろしければ、私と一緒に……。"
1009015-78 = "[s] \"いいよ。一緒に行こう。\""
1009015-79 = "……！"
1009015-80 = "ありがとうございます！"
1009015-82 = "（そうしてウミカと一緒に、仕事を片づけた）"
1009015-83 = "（ウミカが帰っていった後……）"
1009015-86 = "[ns] \"あれ？\""
1009015-89 = "[ns] \"これは……。\""
1009015-90 = "（忘れ物かもしれない……）"
1009015-94 = "（……そっとモモトークを送った）"
