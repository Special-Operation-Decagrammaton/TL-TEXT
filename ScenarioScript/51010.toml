[translation]
51010-1 = "Episódio 1; Prólogo"
51010-6 = "O-onde ele está!?#nPara onde diabos aquele cara foi...!"
51010-13 = "……！"
51010-19 = "Líder! Atrás de você!"
51010-20 = "Tsc, não vou deixar você escapar!"
51010-26 = "Heh! Como é que é isso?!"
51010-27 = "Líder, incrível! Com isso...!"
51010-28 = "Não, ele ainda está...!"
51010-41 = "G-gaaahhh!?"
51010-51 = "――Até aqui.#nDesista, Trupe Chimi."
51010-52 = "O quê... nós não fizemos nada...!"
51010-53 = "Nada...?"
51010-54 = "Até agora pouco, vocês estavam causando problemas para várias pessoas."
51010-56 = "Que falta de educação! Isso é uma acusação falsa!"
51010-57 = "Nós só estávamos agindo pelo grande plano do nosso líder!"
51010-62 = "Líder! Vamos contar a eles sobre o tal plano!"
51010-64 = "Se ouvirem o plano, não me culpem se ficarem tão surpresos a ponto de caírem para trás!"
51010-70 = "……？"
51010-71 = "Ah, não. Quer dizer...#nEu fico sem jeito quando me elogiam tanto assim..."
51010-72 = "Estávamos prestes a começar o \"plano de fazer o que bem entendermos antes do festival da semana que vem\"..."
51010-73 = "…………。"
51010-74 = "Bem, se ninguém estiver a fim, eu estava pensando em desistir..."
51010-76 = "Isso sim é! O plano perfeito do nosso líder!"
51010-77 = "Não vamos deixar ninguém atrapalhar!!"
51010-79 = "E-então esse plano é realmente incrível...?"
51010-81 = "Faz tempo que não volto aqui... mas continua a mesma coisa."
51010-82 = "Mas, já que caiu na minha frente..."
51010-86 = "Não vou deixar que façam o que quiserem daqui em diante."
51010-88 = "Ugh...!"
51010-89 = "E-espere aí!"
51010-90 = "Quem é você para atrapalhar a gente?!"
51010-91 = "Hm...?"
51010-92 = "Aquele haori azul-claro..."
51010-93 = "Ah, é isso mesmo!#nAquele ali, é da \"Hyakka Ryoran\"!"
51010-94 = "O quê!?"
51010-95 = "Se é da Hyakka Ryoran, então――"
51010-97 = "Errado."
51010-99 = "E-eu nem terminei de falar ainda――!?"
51010-101 = "É diferente do que vocês estão imaginando."
51010-102 = "Isso é..."
51010-104 = "……apenas um cosplay."
51010-108 = "Já que vim devolver \"aquilo\"..."
51010-115 = "Eu... não sou mais da Hyakka Ryoran."
51010-121 = "Schale - Escritório"
51010-124 = "(Enquanto eu terminava o trabalho de rotina No Schale...)"
51010-130 = "[ns] \"Sim, aqui é a Schale.\""
51010-132 = "Nya-haha. Sensei, faz tempo que não nos vemos~"
51010-133 = "Como tem passado?"
51010-134 = "[s] \"Eu estava cuidando de algumas tarefas administrativas.\""
51010-137 = "(Os documentos espalhados na mesa estavam todos relacionados a eventos recentes, como \"Relatórios de danos de cada distrito autônomo\" e \"Diretrizes operacionais para o orçamento de apoio\".)"
51010-139 = "Entendo~#nÉ sobre aquilo que enviamos de Hyakkiyako outro dia, não é?"
51010-140 = "Afinal... aconteceram muitas coisas, não é mesmo."
51010-145 = "[ns] \"Mas deixando isso de lado... o que houve?\""
51010-146 = "Ah, é verdade, é verdade."
51010-147 = "O Sensei parece continuar trabalhando ocupado como sempre, não é?"
51010-148 = "Então, para o Sensei que vive mergulhado no trabalho!#nPensei que talvez eu pudesse ser útil em algo... e refleti um pouco sobre isso."
51010-149 = "[s] \"Obrigado pela preocupação...?\""
51010-150 = "Nfufu... se não se importar, por que não vem até Hyakkiyako?"
51010-151 = "Um festival será realizado em breve, sabe."
51010-152 = "É importante relaxar de vez em quando, e#npensei que seria bom se pudesse aproveitar para mudar um pouco os ares."
51010-153 = "Além disso, quero te contar como estão as coisas por aqui...#ne também tenho um pedido um pouquinho pessoal, por assim dizer~"
51010-154 = "[s] \"Um pedido pessoal?\""
51010-155 = "Fufu.#nSe vier a Hyakkiyako, poderá fazer carinho na adorável Chise-nyan, sabia?"
51010-160 = "Nya?"
51010-162 = "Nyahahaha~♪"
51010-163 = "Então, estarei te esperando."
51010-169 = "[ns] \"...Hyakkiyako.\""
51010-173 = "Não existe método para reverter alguém que foi invertido pelo \"Cromatismo\"."
51010-174 = "Isso é――assim como os mortos não retornam à vida.#nÉ uma regra absoluta deste mundo."
51010-175 = "Mas, ainda assim... se dizes que há alguém a quem desejas salvar,"
51010-179 = "――venha visitar-me."
51010-182 = "[ns] \"Talvez eu consiga obter pistas sobre ela...\""
51010-185 = "Próximo episódio: Encontro inesperado (1)"
