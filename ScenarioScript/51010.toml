[translation]
51010-1 = "第1話;プロローグ"
51010-6 = "ど、どこだ！？#nあいつは一体どこに……！"
51010-13 = "……！"
51010-19 = "リーダー！後ろっす！"
51010-20 = "ちっ、逃すか！"
51010-26 = "へっ！どんなもんだい！"
51010-27 = "リーダーすごい！これなら……！"
51010-28 = "いや、あいつはまだ……！"
51010-41 = "ぐ、ぐあああっ！？"
51010-51 = "――ここまで。#n観念して、[ruby=すだまいちざ]魑魅一座[/ruby]。"
51010-52 = "なっ……あたしらは何も……！"
51010-53 = "何も……？"
51010-54 = "さっきまで色んな人に迷惑かけてた。"
51010-56 = "失礼な！言いがかりだ！"
51010-57 = "あたしらはリーダーの偉大なる計画のために、動いていただけだ！"
51010-62 = "リーダー！例の計画を教えてやりましょうよ！"
51010-64 = "計画を聞いたら、驚きすぎて腰抜かしても知らないかんな！"
51010-70 = "……？"
51010-71 = "あっ、いや。なんていうか……#nそこまで持ち上げられると困るんだけど……"
51010-72 = "「来週のお祭り前に好き勝手暴れる計画」を始めようと……"
51010-73 = "…………。"
51010-74 = "まあ、みんなが乗り気じゃないなら、やめようと思ってたというか……"
51010-76 = "これぞ！我らがリーダーの完璧なる計画！"
51010-77 = "邪魔なんかさせねぇっすよ！！"
51010-79 = "や、やっぱりこの計画、すごいんだな……？"
51010-81 = "久しぶりに帰ってきたけど……相変わらずだね。"
51010-82 = "でも、私の目に入ったからには…… "
51010-86 = "これ以上、思い通りにはさせない。"
51010-88 = "うっ……！"
51010-89 = "ま、待てよ！"
51010-90 = "私たちの邪魔をするあんたは何者なんだ！"
51010-91 = "ん……？"
51010-92 = "あの水色の羽織……"
51010-93 = "あっ、やっぱり！#nあいつ、「百花繚乱」っすよ！"
51010-94 = "何っ！？"
51010-95 = "百花繚乱ってことは――"
51010-97 = "違う。"
51010-99 = "ま、まだ最後まで言ってないんだけど――！？"
51010-101 = "あなた達の想像とは違う。"
51010-102 = "これは……"
51010-104 = "……ただの、コスプレだから。"
51010-108 = "「アレ」を返しに来た以上……"
51010-115 = "私は……もう、百花繚乱ではないのだから。"
51010-121 = "シャーレ・執務室"
51010-124 = "（いつも通りシャーレの仕事を片付けていると……）"
51010-130 = "[ns] \"はい、シャーレです。\""
51010-132 = "にゃはは。先生、ご無沙汰しております～"
51010-133 = "いかがお過ごしでしょうか？"
51010-134 = "[s] \"事務作業をしていたところだよ。\""
51010-137 = "（デスクに広げられている書類はどれも、「各自治区の被害状況」や「支援予算の運用指針」など直近の出来事に関連しているものだった）"
51010-139 = "なるほど～#n先日、百鬼夜行からもお送りしたアレですね。"
51010-140 = "色々……ありましたからねぇ。"
51010-145 = "[ns] \"それはそうと……一体どうしたの？\""
51010-146 = "ああ、そうでしたそうでした。"
51010-147 = "先生は相変わらず、お忙しそうに働かれてるみたいですし～？"
51010-148 = "そんな仕事三昧の先生のために！#n私も何かお役に立てないかと思い……少し考えてみたのです。"
51010-149 = "[s] \"お気遣いありがとう……？\""
51010-150 = "んふふ……よろしければ、百鬼夜行にいらっしゃいませんか？"
51010-151 = "もうすぐお祭りが開催されるんですよ。"
51010-152 = "たまには息抜きするのも大事ですし、#n気分転換がてら楽しんでいただけたらな～と思いましてね。"
51010-153 = "それに、こちらの近況もお伝えしておきたいですし……#nちょ～っぴり個人的なお願いもあるといいますか～"
51010-154 = "[s] \"個人的なお願い？\""
51010-155 = "ふふっ。#n百鬼夜行に来たら、愛らし～いチセにゃんをなでなでできますよ？"
51010-160 = "にゃー？"
51010-162 = "にゃははは～♪"
51010-163 = "それでは、お待ちしておりますねぇ。"
51010-169 = "[ns] \"……百鬼夜行。\""
51010-173 = "「色彩」によって反転した者を元に戻す方法など、存在せぬ。"
51010-174 = "其れは――死者が生き返らないのと同様に。#nこの世界の絶対的なルールである。"
51010-175 = "だがそれでも……助けたい者が居ると申すのなら、"
51010-179 = "――妾を訪ねてくりゃれ。"
51010-182 = "[ns] \"もしかしたら、彼女の手がかりを得られるかも……\""
51010-185 = "次回;思いがけない出会い（１）"
