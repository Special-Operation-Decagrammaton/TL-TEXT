[translation]
51010-1 = "Episódio 1; Prólogo"
51010-6 = "O-Onde!? #n Onde ela se meteu...!"
51010-13 = "......!"
51010-19 = "Líder! Atrás de você!"
51010-20 = "Tsc, não vou deixar você escapar!"
51010-26 = "Heh! O que achou disso!?"
51010-27 = "Líder, incrível! Com isso...!"
51010-28 = "Não, ela ainda...!"
51010-41 = "G-Guaaah!?"
51010-51 = "――Até aqui. #n Renda-se, Trupe Sudama."
51010-52 = "O quê... nós não fizemos nada...!"
51010-53 = "Nada...?"
51010-54 = "Até agora pouco vocês estavam causando problemas para um monte de gente."
51010-56 = "Que grosseria! Isso é uma falsa acusação!"
51010-57 = "Nós só estávamos agindo em prol do grande plano da nossa líder!"
51010-62 = "Líder! Conte a ela sobre o nosso plano!"
51010-64 = "Quando ouvir o plano, não me responsabilizo se você cair dura de tanto susto!"
51010-70 = "......?"
51010-71 = "Ah, não. Como posso dizer... #n Fico meio sem jeito com vocês me exaltando tanto..."
51010-72 = "Sobre o 'Plano de causar o caos e fazer o que quisermos antes do festival da semana que vem'..."
51010-73 = "............"
51010-74 = "Bem, se o pessoal não estivesse tão animado, eu até ia desistir..."
51010-76 = "Aí está! O plano perfeito da nossa líder!"
51010-77 = "Não vamos deixar você atrapalhar!!"
51010-79 = "E-Então esse plano é incrível mesmo...?"
51010-81 = "Faz tempo que não volto, mas... continua a mesma coisa de sempre."
51010-82 = "Mas, já que isso chamou a minha atenção... "
51010-86 = "Não vou deixar que façam o que quiserem."
51010-88 = "Ugh...!"
51010-89 = "E-Espera aí!"
51010-90 = "Quem é você para ficar nos atrapalhando!?"
51010-91 = "Hm...?"
51010-92 = "Aquele haori azul-claro..."
51010-93 = "Ah, eu sabia! #n Ela é da 'Hyakkaryouran'!"
51010-94 = "O quê!?"
51010-95 = "Se ela é da Hyakkaryouran, então――"
51010-97 = "Errado."
51010-99 = "E-Eu nem terminei de falar ainda――!?"
51010-101 = "É diferente do que vocês estão imaginando."
51010-102 = "Isso é..."
51010-104 = "......Apenas um cosplay."
51010-108 = "Já que vim devolver 'aquilo'..."
51010-115 = "Eu... não sou mais da Hyakkaryouran."
51010-121 = "Schale - Escritório"
51010-124 = "(Enquanto terminava o trabalho na Schale como de costume...)"
51010-130 = "[ns] \"Alô, aqui é da Schale.\""
51010-132 = "Nyahaha. Sensei, quanto tempo~"
51010-133 = "Como você tem passado?"
51010-134 = "[s] \"Estava fazendo algumas tarefas administrativas.\""
51010-137 = "(Todos os documentos espalhados pela mesa eram sobre eventos recentes, como a 'Situação de Danos de cada Distrito Escolar' e as 'Diretrizes para Operação do Orçamento de Apoio'.)"
51010-139 = "Entendo~ #n É sobre aquilo que enviamos da Hyakkiyako outro dia, não é?"
51010-140 = "Aconteceram... muitas coisas, afinal."
51010-145 = "[ns] \"Mudando de assunto... o que foi dessa vez?\""
51010-146 = "Ah, sim, claro."
51010-147 = "Pelo visto, o Sensei continua trabalhando ocupado como sempre, não é~?"
51010-148 = "E para um Sensei tão atolado de trabalho! #n Pensei se não havia alguma forma de eu ser útil... e cheguei a uma ideia."
51010-149 = "[s] \"Obrigado pela consideração...?\""
51010-150 = "Nfufu... se não for incômodo, que tal vir visitar a Hyakkiyako?"
51010-151 = "Em breve teremos um festival por aqui."
51010-152 = "Tirar um tempo para descansar é importante, #n então pensei que seria bom se você pudesse vir se divertir e mudar um pouco de ares."
51010-153 = "Além disso, também queria te atualizar sobre a nossa situação atual... #n E, digamos, tenho um pedidinho beeeem pessoal a fazer~"
51010-154 = "[s] \"Um pedido pessoal?\""
51010-155 = "Fufu. #n Se vier à Hyakkiyako, você poderá fazer carinho na adorááável Chise-nyan, sabia?"
51010-160 = "Nya?"
51010-162 = "Nyahahaha~♪"
51010-163 = "Sendo assim, estarei aguardando a sua visita."
51010-169 = "[ns] \"......Hyakkiyako.\""
51010-173 = "Não existe método algum para reverter alguém que foi invertido pelas 'Cores'."
51010-174 = "Isso é―― o mesmo que os mortos não voltarem à vida. #n É uma regra absoluta deste mundo."
51010-175 = "No entanto... se ainda assim você diz que há alguém que deseja salvar,"
51010-179 = "――Venha me visitar."
51010-182 = "[ns] \"Talvez eu consiga alguma pista sobre ela...\""
51010-185 = "Próximo Episódio; Um Encontro Inesperado (1)"
