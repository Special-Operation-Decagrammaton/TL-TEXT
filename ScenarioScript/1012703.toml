[translation]
1012703-1 = "esperando a estreia"

1012703-2 = "Rua Zhuhua"

1012703-3 = "(No dia seguinte, voltando de uma visita ao Wild Hunt de manhã cedo para trabalhar...)"

1012703-4 = "[ns] \"Tenho ido muito ao Wild Hunt ultimamente...\""

1012703-5 = "(Passando pela Ala D.U. Shiratri)"

1012703-6 = "Hein, professora?"

1012703-9 = "Ah, bom dia...."

1012703-10 = "[s] \"Miyo? O que há de errado?\""

1012703-11 = "Isso é..."

1012703-12 = "Recebi uma ligação da editora e recebi permissão para sair para uma reunião #n..."

1012703-13 = "[s] \"Do editor!?\""

1012703-14 = "sim. Recentemente enviei o manuscrito de um romance que escrevi em uma placa de Petri para várias editoras."

1012703-15 = "Uma dessas empresas entrou em contato comigo e perguntou se queria publicá-lo..."

1012703-16 = "[s1] \"Bem, era um romance...\"\n[s2] \"Então, esta é sua estreia profissional!\""

1012703-19 = "Bem, ainda nem assinamos contrato de publicação...!"

1012703-20 = "Estou prestes a ter uma reunião."

1012703-21 = "Depois disso a partir das 14:00――"

1012703-22 = "--O que? #n Professor com você também?"

1012703-23 = "Foi isso que você fez por mim..."

1012703-24 = "É melhor ter um terceiro para verificar o conteúdo do contrato?"

1012703-28 = "Então, se for esse o caso..."

1012703-29 = "Obrigado, senhor."

1012703-31 = "(Fui até a editora com Miyo)"

1012703-33 = "Editora/sala de conferências"

1012703-34 = "Estávamos esperando por você, senhor."

1012703-35 = "A propósito, por que existe um professor de placa de Petri...?"

1012703-36 = "[s] \"Ouvi dizer que meu aluno estava assinando um contrato de publicação, então estou acompanhando-o.\""

1012703-37 = "Bem, tudo bem."

1012703-38 = "Então vamos começar. #nPrimeiro gostaria de explicar a nossa posição em relação à assinatura do contrato editorial."

1012703-39 = "Como você sabe, publicar um livro é muito caro."

1012703-40 = "Não apenas custos de impressão, mas também edição, design e marketing."

1012703-41 = "Além disso, há também uma taxa para usar um depósito para armazenar livros não vendidos após a publicação... #nVocê entendeu até aqui?"

1012703-42 = "Oh sim. #nEu sei. Mas por que...?"

1012703-43 = "Queríamos que você entendesse os riscos que corremos ao publicar o romance do Sr. Sakurai."

1012703-44 = "[s] \"Hum, a editora é responsável pelos custos incorridos na publicação...\""

1012703-45 = "sim! Por isso, temos uma sugestão!"

1012703-46 = "Em outras palavras... estou me perguntando se Sakurai-sensei também poderia \"investir\" comigo!"

1012703-47 = "...?"

1012703-48 = "Não se preocupe! Tudo o que você precisa fazer é pagar ao Sr. Sakurai pelos custos de edição, design, impressão... e marketing!"

1012703-49 = "Deixe o resto conosco!"

1012703-50 = "[s] \"Então Miyo terá que pagar todo o custo...\""

1012703-51 = "Eu vejo……!"

1012703-52 = "[s] \"Miyo...?\""

1012703-53 = "Mas isso não é tudo, certo?"

1012703-54 = "sim?"

1012703-55 = "Por exemplo... uma vez lançado um livro, não seria necessário comprar cerca de 500 exemplares com o seu próprio dinheiro para obter uma boa resposta inicial?"

1012703-56 = "Oh sim! Isso mesmo!"

1012703-57 = "E para melhorar a qualidade da minha escrita futura, preciso fazer um curso de redação oferecido pela sua empresa... e mediante pagamento."

1012703-58 = "Você sabe disso muito bem!"

1012703-59 = "Sim claro."

1012703-60 = "--Este é um método comum de fraude."

1012703-64 = "Bem, o contrato...! ?"

1012703-65 = "Vamos, senhor."

1012703-72 = "parque próximo"

1012703-73 = "... Ufa."

1012703-74 = "Por favor, não faça essa cara. Estou muito bem."

1012703-75 = "Parece que você está se perguntando como eles descobriram o golpe."

1012703-76 = "É fácil. Você tem que pensar da perspectiva da outra pessoa. Quando você faz isso, os métodos do crime vêm naturalmente à mente...#nÉ o mesmo que pensar em como “importar” algo para a academia."

1012703-77 = "Então..."

1012703-78 = "...Bom."

1012703-79 = "[s] \"Miyo!?\""

1012703-80 = "Eu me pergunto por que sou tão tendencioso em relação a este lugar..."

1012703-81 = "Mesmo não tendo talento para o que realmente quero fazer..."

1012703-82 = "Só consigo pensar em crime..."

1012703-83 = "Com isso, é impossível eu me tornar um romancista, certo?"

1012703-84 = "[s] \"Ninguém sabe disso.\""

1012703-88 = "Isso não me dá nenhum conforto..."

1012703-89 = "[s] \"Mas Miyo, pelo menos... ela não seguirá o caminho errado.\""

1012703-93 = "[ns] \"――Você perceberá que não está certo.\""

1012703-94 = "……."

1012703-95 = "Tão importante quanto encontrar o caminho certo é evitar o caminho errado."

1012703-96 = "Se eu não tivesse esse talento, provavelmente teria caído no golpe que mencionei anteriormente."

1012703-97 = "Talvez nem tudo seja ruim..."

1012703-98 = "...Mas ainda não consigo gostar."

1012703-99 = "[s3] \"Mas com o dinheiro que ganhei com as atividades do clube...\"\n[s4] \"Posso até comprar uma máquina de escrever nova...\""

1012703-104 = "Isso é...!"

1012703-106 = "(Passei algum tempo conversando com Miyo.)"

