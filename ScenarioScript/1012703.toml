[translation]
1012703-1 = "デビューを待ちながら"
1012703-2 = "繫華街"
1012703-3 = "（翌日、仕事のため早朝からワイルドハントを訪れた帰り道――）"
1012703-4 = "[ns] \"最近、ワイルドハントによく行くなぁ……。\""
1012703-5 = "（D.U.シラトリ区を通りがかった）"
1012703-6 = "あれ、先生？"
1012703-9 = "お、おはようございます……。"
1012703-10 = "[s] \"ミヨ？どうしたの？\""
1012703-11 = "それが……。"
1012703-12 = "出版社から声がかかりまして、#n打ち合わせのために外出許可をいただいたんです……。"
1012703-13 = "[s] \"出版社から！？\""
1012703-14 = "はい。この前シャーレで書いた恋愛小説の原稿を、#nいろいろな出版社に送ってみたんです。"
1012703-15 = "そのうちの一社から、出版したいと声をかけていただいて……。"
1012703-16 = "[s1] \"あれ、恋愛小説だったんだ……。\"\n[s2] \"じゃあ、これでプロデビューだね！\""
1012703-19 = "ま、まだ出版契約も結んでいませんから……！"
1012703-20 = "これから打ち合わせなんですよ。"
1012703-21 = "このあと14時からで――"
1012703-22 = "――えっ？#n先生も一緒に？"
1012703-23 = "そんな……私のためにわざわざ……。"
1012703-24 = "契約書の内容を確認する第三者がいたほうがいい……ですか？"
1012703-28 = "で、でしたら……。"
1012703-29 = "よろしくお願いします、先生。"
1012703-31 = "（ミヨと一緒に出版社へ向かった）"
1012703-33 = "出版社・会議室"
1012703-34 = "お待ちしておりました、[ruby=さくらい]桜井[/ruby]先生。"
1012703-35 = "ところで、なぜシャーレの先生まで……。"
1012703-36 = "[s] \"私の生徒が出版契約を結ぶと聞いたので、その付き添いです。\""
1012703-37 = "ま、まあいいでしょう。"
1012703-38 = "では、始めましょうか。#nまず、出版契約を結ぶにあたり、弊社の立場についてお伝えしておきます。"
1012703-39 = "ご存知の通り、本を出版するまでには、とてもコストがかかります。"
1012703-40 = "印刷費はもちろん、編集やデザイン、マーケティング――"
1012703-41 = "さらに出版した後、売れ残った本を保管する倉庫の利用料も……。#nここまではわかりますか？"
1012703-42 = "え、ええ。#n知っています。ですが、どうしてそれを……？"
1012703-43 = "我々が桜井先生の小説の出版に際し、いかにリスクを負うか、#nご理解いただきたかったのです。"
1012703-44 = "[s] \"あの、出版で生じた費用は出版社が負うものでは……。\""
1012703-45 = "そう！そこで、弊社から一つご提案があるのです！"
1012703-46 = "つまり……桜井先生も共に「投資」していただけないかなと！"
1012703-47 = "……？"
1012703-48 = "ご安心ください！編集、デザイン、印刷……そして、マーケティングの費用を桜井先生にお支払いいただくだけです！"
1012703-49 = "あとは我々にお任せを！"
1012703-50 = "[s] \"それって実質、ミヨが全額負担するんじゃ……。\""
1012703-51 = "なるほど……！"
1012703-52 = "[s] \"ミヨ……？\""
1012703-53 = "でも、それだけではありませんよね？"
1012703-54 = "はい？"
1012703-55 = "例えば……本が発売したら、初動を良くするために自費で500冊ほど購入する必要があるのではないでしょうか？"
1012703-56 = "え、ええ！その通りです！"
1012703-57 = "そして、今後執筆する作品のクオリティ向上のために、#n御社が提供するライティング講座を受講する必要がある……しかも、有料で。"
1012703-58 = "よくご存じですね！"
1012703-59 = "ええ、もちろん。"
1012703-60 = "――よくある、詐欺の手口ですから。"
1012703-64 = "け、契約書が……！？"
1012703-65 = "行きましょう、先生。"
1012703-72 = "近くの公園"
1012703-73 = "……ふぅ。"
1012703-74 = "そんな顔をしないでください。私は本当に大丈夫ですから。"
1012703-75 = "どうやって詐欺を見抜いたのか気になっているようですね。"
1012703-76 = "簡単です。相手の立場で考えればいいんですよ。そうすると、自然と犯罪の手口が浮かんでくる……#n学院への「輸入」方法を考えるときと、同じですね。"
1012703-77 = "ですので……。"
1012703-78 = "……ぐすっ。"
1012703-79 = "[s] \"ミヨ！？\""
1012703-80 = "なんで、こんなところにばっかり偏るんでしょう……。"
1012703-81 = "本当にやりたいことの才能は、全然ないのに……。"
1012703-82 = "犯罪のことばかり頭が回って……。"
1012703-83 = "これじゃ私、恋愛小説家になるなんて無理ですよね？"
1012703-84 = "[s] \"それは誰にも分からないことだよ。\""
1012703-88 = "ぜんぜん慰めになってませんけど……。"
1012703-89 = "[s] \"でもミヨは、少なくとも……間違った道には進まないはず。\""
1012703-93 = "[ns] \"――正しくないことに、気づけるんだから。\""
1012703-94 = "……。"
1012703-95 = "正しい道を見つけるのと同じくらい……#n間違った道を避けることも大事……。"
1012703-96 = "私にこの才能がなかったら、先ほどの詐欺にも騙されていたんでしょうね。"
1012703-97 = "悪いことばかりじゃない……のかも。"
1012703-98 = "……やっぱり好きにはなれませんけど。"
1012703-99 = "[s3] \"でも、部活で稼いだお金があるからこそ……。\"\n[s4] \"新しいタイプライターも買えるんだし……。\""
1012703-104 = "そ、それは……！"
1012703-106 = "（しばらくの間、ミヨと雑談をして時間を過ごした）"
