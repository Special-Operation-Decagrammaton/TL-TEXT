[translation]
10008005-1 = "Prólogo; No início do ano"
10008005-6 = "Muito bem,"
10008005-7 = "todas já se trocaram!"
10008005-14 = "O tempo voa, nem percebemos e já estamos em um novo ano."
10008005-15 = "Pois é... Nossa, passou num piscar de olhos."
10008005-16 = "Olhando para trás, aconteceram tantas coisas no ano passado..."
10008005-17 = "Coisas felizes, tristes, difíceis e decepcionantes..."
10008005-18 = "A proporção de eventos negativos não está um pouco alta?"
10008005-19 = "..."
10008005-20 = "En-enfim! O que importa é que nós, da Problem Solver 68, superamos todas essas adversidades e conseguimos chegar a este novo ano!"
10008005-21 = "E para comemorar isso, vamos agora para um \"certo lugar\"."
10008005-22 = "Um, um certo lugar...?"
10008005-23 = "Já que fomos reunidas de madrugada e estamos todas arrumadas, deve ser algum tipo de evento de Ano Novo, né?"
10008005-25 = "Como esperado, você é perspicaz, Kayoko."
10008005-27 = "Mas vejam bem, desta vez não é um evento qualquer. Afinal, o lugar para onde vamos é... um \"lugar onde os desejos se realizam\"!"
10008005-28 = "Um, um lugar onde os desejos se realizam...?"
10008005-30 = "Ah, acho que vi isso nas redes sociais. É aquele que está na moda ultimamente?"
10008005-31 = "O fato de estar \"na moda nas redes sociais\" já me deixa preocupada..."
10008005-32 = "Isso não seria algum tipo de negócio novo?"
10008005-33 = "Bem, a Aru-chan gosta dessas coisas, né?"
10008005-34 = "Na-não é que eu acredite nisso! É só que vamos para lá, o objetivo é outro!"
10008005-35 = "Hm? Como assim?"
10008005-36 = "Fufu, isso ainda é segredo."
10008005-37 = "Só vou dizer que é para a nossa Problem Solver 68 alcançar patamares mais altos e para que nossos negócios prosperem ainda mais..."
10008005-38 = "Isso está ficando cada vez mais suspeito..."
10008005-39 = "Desta vez, sozinha e animada, que tipo de confusão ela está planejando, hein?"
10008005-40 = "Tenham um pouco mais de fé em mim!"
10008005-41 = "...Mais importante, todas prepararam \"aquilo\", né?"
10008005-43 = "Sim, mais ou menos. Está falando de dinheiro, né?"
10008005-44 = "Como foi uma ordem da presidente, eu preparei."
10008005-45 = "Eu, eu também preparei bastante, como pedido!"
10008005-47 = "Fufu, então está ótimo."
10008005-48 = "É necessário para o nosso objetivo desta vez, então guardem bem."
10008005-54 = "Ei, será que..."
10008005-55 = "Aru-chan, será que é simplesmente \"colocar dinheiro para pedir prosperidade nos negócios\" ou algo assim...?"
10008005-56 = "En-entendi! Se é um \"lugar onde os desejos se realizam\", quanto mais dinheiro colocarmos, melhor nossos trabalhos vão fluir, é isso...!?"
10008005-58 = "Na-não é nada disso! Você acha mesmo que eu pensaria em algo tão simples assim!?"
10008005-60 = "Hmm?"
10008005-61 = "Ah..."
10008005-63 = "Ah, quer saber? Eu conto logo! O que importa é que, desta vez, muitos figurões do submundo estarão nesse lugar!"
10008005-64 = "Figurões... do submundo...?"
10008005-65 = "Exatamente. Sem falar nas organizações famosas pela violência, grupos sombrios que vivem de atividades ilegais, empresas que movimentam dinheiro sujo...! Criminosos de alto nível estarão todos reunidos logo no início do ano!"
10008005-66 = "Mas pensem comigo... vocês acham mesmo que esses figurões se reúnem lá apenas para \"trocar saudações de Ano Novo amigavelmente\"?"
10008005-67 = "A resposta é não! Absolutamente não! O verdadeiro objetivo é... com certeza, uma \"análise\"!"
10008005-68 = "...Análise?"
10008005-69 = "O quanto eles não hesitam em doar, que tipo de roupa estão vestindo, o quão cara é essa roupa... Através de várias informações como essas, eles avaliam a situação uns dos outros e realizam uma \"contenção e análise\" mútua nas sombras!"
10008005-70 = "Com isso, eles entendem as forças uns dos outros e planejam o ano que está por vir..."
10008005-71 = "Tipo: \"Aquela roupa e aquele valor de doação... essa pessoa não pode ser subestimada\", entende!"
10008005-73 = "Então, isso significa que..."
10008005-74 = "Alugar quimonos caros e pedir para \"preparar muito dinheiro para o Ano Novo\" foi por causa disso..."
10008005-75 = "Exato. Porque logo no início do ano novo, essa é a nossa chance de espalhar o nome da 'Problem Solver 68' pelo submundo!"
10008005-76 = "Haa..."
10008005-77 = "E-entendi! Como esperado da Aru-sama! Pensar em algo assim..."
10008005-78 = "Em outras palavras, você só quer se exibir...?"
10008005-79 = "N-não é nada disso! Pelo menos chame de 'estratégia de imagem'!"
10008005-80 = "De qualquer forma, se jogarmos uma quantia chamativa na caixa de ofertas com confiança, não há dúvida de que pareceremos incríveis!"
10008005-81 = "'Nós nem nos importamos com trocados como esse', entende!"
10008005-83 = "I-incrível...! Você é muito legal, Aru-sama!"
10008005-84 = "Ah, mas não é uma boa ideia? Eu concordo!"
10008005-85 = "Bem, eu vou acompanhar, mas..."
10008005-87 = "Fufu, já que todas compartilhamos da mesma visão..."
10008005-88 = "Vou deixar claro novamente: isso não é apenas um evento de ano novo."
10008005-89 = "É a primeira grande disputa do ano, não é exagero dizer que o destino da 'Problem Solver 68' para este ano depende disso... considerem isso como uma missão!"
10008005-92 = "S-sim! Entendido!"
10008005-93 = "Sim,"
10008005-94 = "Vai ser divertido! Vamos, vamos, vamos logo!"
10008005-95 = "De qualquer forma, eu já planejava ir ao templo, então não me importo..."
10008005-97 = "Então, pela prosperidade futura dos negócios da 'Problem Solver 68'..."
10008005-98 = "Vamos, partir!"
10008005-101 = "#video;10007"
