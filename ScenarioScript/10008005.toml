[translation]
10008005-1 = "プロローグ;年の初めに"
10008005-6 = "さあ、"
10008005-7 = "みんな着替えたわね！"
10008005-14 = "早いもので、いつの間にか新しい年を迎えたわね。"
10008005-15 = "そうだね～。いやー、あっという間だったなー。"
10008005-16 = "振り返ってみれば、去年も色んな事があったわ……。"
10008005-17 = "嬉しいこと、悲しいこと、苦しいことや残念だったこと……。"
10008005-18 = "マイナスな出来事の比率、多くない？"
10008005-19 = "……。"
10008005-20 = "とっ、とにかく！大事なことは我々便利屋68が、そういった数々の逆境を無事乗り越えて、こうして新しい年を迎えられたってことよ！"
10008005-21 = "その記念の意味も兼ねて、これから私たちは「とある場所」へと向かうわ。"
10008005-22 = "と、とある場所、ですか……？"
10008005-23 = "こんなにおめかしして早朝に集められたからには、まあお正月的なイベントってことだよね。"
10008005-25 = "流石、鋭いわねカヨコ。"
10008005-27 = "でもね、今回はただのイベントじゃないわ。何せこれから向かう先は……「願い事が叶う場所」、なのよ！"
10008005-28 = "ね、願い事が叶う場所……？"
10008005-30 = "あ、それSNSで見たかも。最近話題のやつ？"
10008005-31 = "「SNSで話題になってる」って時点で心配なんだけど……"
10008005-32 = "それ、そういう新しい商売とかじゃなくて？"
10008005-33 = "まあアルちゃん、そういうの好きだもんねー？"
10008005-34 = "べっ、別に信じてるとかじゃないわよ！？あくまでそこに向かうってだけであって、目的は別にあるんだから！"
10008005-35 = "ん？どういうこと？"
10008005-36 = "ふふっ、それはまだ秘密。"
10008005-37 = "ただこれは我々便利屋68がより高みに至るための、さらなる商売繁盛のためのもの……とだけ言っておくわ。"
10008005-38 = "なんかますます怪しくなってきたね……。"
10008005-39 = "今度はひとり楽しく、どんなやらかしを計画してるんだろうねー。"
10008005-40 = "少しは信用しなさいよ！"
10008005-41 = "……それより、「アレ」はみんな用意したわね？"
10008005-43 = "うん、まあね。お金の話でしょ？"
10008005-44 = "社長命令って言われたから、一応ね。"
10008005-45 = "わ、私もちゃんと、たくさん用意しました！"
10008005-47 = "ふふっ、それなら良いわ。"
10008005-48 = "今回の目的のために必要だから、しっかり持っておきなさいね。"
10008005-54 = "あのさ、もしかして……。"
10008005-55 = "アルちゃん、もしかして単に「お金を入れて商売繁盛のお願いごとをする」とか、そういう……？"
10008005-56 = "な、なるほど！「願い事が叶う場所」なのであれば、お金をたくさん入れた分だけお仕事も上手くいくのでは、ということでしょうか……！？"
10008005-58 = "ち、違うわよ！私がそんな単純なことを考えるとでも！？"
10008005-60 = "ふーん？"
10008005-61 = "はぁ……。"
10008005-63 = "ああもう、それなら教えてあげるわよ！大事なのは今回その場所に、裏社会の大物たちがたくさん来るってこと！"
10008005-64 = "裏社会の、大物たち……？"
10008005-65 = "そうよ。暴力的で有名な組織なんかはもちろんのこと、不法行為に明け暮れる闇の集団とか、ブラックマネーを流通させる会社とか……！とてつもない悪党たちが、新年早々一堂に会するのよ！"
10008005-66 = "でも考えてみなさい……そんな大物たちがわざわざ集まって、目的は「仲良く新年の挨拶をすること」だと思う？"
10008005-67 = "答えはノー！断じてノ―よ！真の目的は……「分析」に違いないわ！"
10008005-68 = "……分析？"
10008005-69 = "どれくらいお賽銭を躊躇わないのか、どんな服を着ているのか、その服がどれだけ高価なのか……そういった様々な情報を通じてお互いの様子を見極め合い、水面下で相互に「牽制と分析」を行うの！"
10008005-70 = "それによってお互いの勢力を把握し、これからの一年の計画を立てる……"
10008005-71 = "「あの服、そしてあのお賽銭の金額……あの人、侮れないわね」、みたいな！"
10008005-73 = "っていうことは、つまり……。"
10008005-74 = "こうしてわざわざ高価な着物を借りたり、「お正月に向けて大金を用意して」って言ってたのは……。"
10008005-75 = "そう。これは新年早々、裏社会において私たち「便利屋68」の名を広げるチャンスだからよ！"
10008005-76 = "はぁ……。"
10008005-77 = "な、なるほど！流石はアル様です！そこまで考えられていただなんて……！"
10008005-78 = "つまり、見栄を張りたいってこと……？"
10008005-79 = "み、見栄とかじゃないわよ！せめて「イメージ戦略」と言いなさい！"
10008005-80 = "とにかく派手な金額を堂々と賽銭箱に投げ込めば、それだけでカッコいいこと間違いなし！"
10008005-81 = "「こんな小銭くらい、私たちは全く気にしないわよ」、ってね！"
10008005-83 = "す、すごいです……！カッコいいですアル様！"
10008005-84 = "あはっ、でも良いんじゃない？私は賛成！"
10008005-85 = "まあ、付き合うけどさ……。"
10008005-87 = "ふふっ、じゃあ全員でビジョンを共有したところで……。"
10008005-88 = "あらためて言っておくけれど、これはただのお正月のイベントなんかじゃないわ。"
10008005-89 = "新年最初の勝負所、「便利屋68」の今年の命運が懸かっていると言っても過言ではないほどの戦い……これもまた、一つの任務だと思いなさい！"
10008005-92 = "は、はいっ！承知しました！"
10008005-93 = "うん、"
10008005-94 = "面白くなりそう！ほらほら、早く行こっ！"
10008005-95 = "どっちにしろお参りは行く予定だったし、構わないけど……。"
10008005-97 = "では「便利屋68」、今後の事業繁栄のために……"
10008005-98 = "さあ、出発よ！"
10008005-101 = "#video;10007"
