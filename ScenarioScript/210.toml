[translation]
210-1 = "浜辺の襲撃者"
210-3 = "やあ～先生。"
210-4 = "また？みたいな顔しないの。ふふ。 "
210-5 = "そろそろ、先生も慣れてきたんじゃない？#nいいねいいね～（パリッ）"
210-6 = "ん－と、今回はねぇ……"
210-7 = "矯正局を脱出した七囚人の一人が、どっかの浜辺で暴れてるみたい。"
210-8 = "詳しくは知らないけど、ホバー船を乗っ取ったんだって。 "
210-9 = "そういうことだから……ねっ、シャーレの出番ってわけ！"
210-10 = "あははっ！こういう展開になるのは先生も分かってたでしょ？"
210-11 = "ちゃちゃっと浜辺に向かっちゃってさ、いつもみたいに頼むよ～"
210-12 = "私はポテチ食べながら待ってるからさ。（パリッ）"
210-17 = "それじゃ、よろしくね～先生。 "
