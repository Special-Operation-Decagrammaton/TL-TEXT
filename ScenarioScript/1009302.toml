[translation]
1009302-1 = "キララの部活"
1009302-2 = "（ゲヘナでの用事を終えた後、帰路で楽しそうに話している生徒が目に入った）"
1009302-10 = "[ns] （楽しそうだな……）"
1009302-12 = "あ、私らはこっちだから！#nまたね、キララ！"
1009302-13 = "まったね～！"
1009302-19 = "あれ？"
1009302-21 = "[USERNAME]先生じゃん、はろはろ～！"
1009302-22 = "お仕事の帰り？あたしもちょうど帰り道！"
1009302-23 = "[s] \"一緒にいた子はお友達？\""
1009302-24 = "そだよ～！さっき会ったばっかだけど！"
1009302-25 = "[s1] \"さっき会ったばっか……？\"\n[s2] \"すごく仲良さそうだったけど！？\""
1009302-28 = "いつ出会ったかなんて、あんま重要じゃなくない？"
1009302-29 = "楽しければそれで良いの♪"
1009302-30 = "先生とも、もうマブダチだと思ってるんだけど？"
1009302-31 = "[s] \"これが、陽キャ……！\""
1009302-32 = "あははっ、何それウケる！"
1009302-33 = "っていうかそれ……もしかして、嫉妬？"
1009302-34 = "あはっ！ごめんごめん♪一緒に帰るから拗ねないでよ～。"
1009302-48 = "その時にさ、コンビニで急に――"
1009302-49 = "あっ、あたしこっちだった！んじゃね！"
1009302-50 = "今日も楽しかったよ～！ありがとね、先生♪"
1009302-51 = "[s] \"ふと気になったんだけど……。\""
1009302-52 = "え？なになに～？"
1009302-53 = "[s3] \"キララは部活とか入らないの？\"\n[s4] \"この時間に帰るってことは、どこにも入ってないのかなって。\""
1009302-56 = "あははっ、真面目な顔するから何かと思った！"
1009302-57 = "んー……一応あたし、部活入ってるよ？"
1009302-58 = "まあでも、確かにふつーの「帰宅部」に見えるかもね？"
1009302-59 = "ふふん、先生には教えてあげちゃおっかな♪"
1009302-60 = "実はちょっと前までは、ほんとに帰宅部だったんだけど……。"
1009302-65 = "あたしの所属してる部活、その名は――"
1009302-66 = "「キラキラ部」！"
1009302-67 = "[s] \"キラキラ……部？\""
1009302-68 = "すんごいワクワクして～#nめーっちゃキラキラしてる部活！"
1009302-69 = "[s] \"な、なるほど……？\""
1009302-70 = "普通の部活動も良いんだけど、あたしにはちょーっと合わないかなって。"
1009302-71 = "毎日同じ活動してると、同じ人と会うことになるでしょ？"
1009302-72 = "それはそれで楽しそうだけどー……#nあたしは、もーっと色んな人と会いたいの！"
1009302-73 = "だから、そういう部活作ったんだ♪"
1009302-74 = "昨日までは知りもしなかったような、新しい人とお友達になったり……。"
1009302-75 = "そのままフードコートに寄っておしゃべりしたり……服買いに行ったり……。"
1009302-76 = "歌いたいな～！って思ったら、そのまますぐにカラオケに行ったり……。"
1009302-77 = "そうやって、色んなことして遊ぶの♪"
1009302-78 = "もちろん、絶対に初対面である必要もないし、#n買い物やカラオケじゃなくても良いんだけど～。#n「とりあえず、楽しく！」が第一かな♪"
1009302-79 = "それがあたし達「キラキラ部」のモットー！"
1009302-80 = "めっちゃキラキラワクワクしてない？"
1009302-81 = "[s] \"うん、キララらしくて良いね。\""
1009302-82 = "あははっ、そうかな？"
1009302-83 = "ま、好き勝手やってるだけだよ。#n先生も、好き勝手にやりたいことしてみない？"
1009302-84 = "あーでも、先生は先生だからダメか！あははっ！"
1009302-85 = "今日も楽しかったなー♪"
1009302-86 = "んー？何でって……。"
1009302-93 = "だってほら、先生とおしゃべりできたじゃん♪マジラッキー！"
1009302-94 = "先生はどーだった？"
1009302-95 = "[s] \"私もキララのことをもっと知れて、楽しかったよ。\""
1009302-96 = "あははっ、良いね良いね！"
