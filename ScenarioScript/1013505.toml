[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013505-1 = "Missão (Quest)"
1013505-2 = "（Eu corri às pressas até a Millennium.）"
1013505-7 = "Te peguei!"
1013505-8 = "M-Me solte……！"
1013505-9 = "Por que quer que a gente solte?\nVocê odeia a gente, Kei-chan?"
1013505-10 = "Essa é uma circunstância\ncompletamente diferente……！"
1013505-11 = "Ah, ela tá envergonhada, é isso?!\nAcho que você e a Aris são\num pouco diferentes no final das contas!"
1013505-12 = "（Eu realmente não consigo compreender\ncomo a Aris recebe o tratamento comum de 'Aris',\nenquanto a minha pessoa foi estigmatizada para o resto da vida\ncom o sufixo infantil 'Kei-chan'!）"
1013505-16 = "[ns1] \"Ué? Eu corri até aqui o mais rápido possível\nimaginando uma emergência...\"\n[ns2] \"Mas ver todas vocês se dando tão bem\né algo adorável!\""
1013505-19 = "Sensei! Você apareceu em excelente hora!\nNa posição de instrutor... eu exijo proteção da sua parte\ne amparo imediato para a aluna oprimida――"
1013505-20 = "Ah, Sensei! Olá!"
1013505-21 = "O Sensei também vai se juntar?"
1013505-22 = "[s] \"Eu prefiro observar de longe\npara não atrapalhar.\""
1013505-23 = "Como é que é?!"
1013505-24 = "……。"
1013505-26 = "EU FUI UMA TOLA POR DEPOSITAR QUALQUER PINGO DE FÉ\nEM UM ADULTO COMO VOCÊ――!!"
1013505-29 = "Isso me lembra...\na Kei-chan é a irmã mais nova e gêmea da Aris, correto?"
1013505-30 = "Eh? Ah, s-sim...\nPodemos classificar o parentesco assim..."
1013505-31 = "Mas a cor do cabelo de vocês é completamente diferente, não é?\nDá até para dizer que são o oposto uma da outra."
1013505-32 = "Ah, agora que você mencionou!"
1013505-33 = "Ah... Haha... Creio que...\nseja um fenômeno perfeitamente normal... suponho..."
1013505-34 = "Entendi, entendi.\nSendo assim... Deixe-me dar os detalhes da\nsua nova e requisitada Missão Principal do dia!"
1013505-35 = "Ainda com esses jogos e missões...?"
1013505-36 = "Ah, você não gosta...?"
1013505-37 = "Hã, n-não é que eu não goste...!"
1013505-41 = "……。"
1013505-42 = "……Eu não acho ruim."
1013505-43 = "É que... É um pouco constrangedor...\nOu melhor, admito que ainda não me acostumei\ncom esses modos informais..."
1013505-45 = "Kyaaahhh!"
1013505-47 = "Eu pressinto o pior――！"
1013505-49 = "Kei-chan, voo~ ceee~ éééé~ tããão~ foooo~ faaa~~!!!"
1013505-54 = "[ns] \"Fofura absolutaaa~~~!!!\""
1013505-55 = "E POR QUE VOCÊ TAMBÉM SE JUNTOU A ELAS?!!!"
1013505-56 = "Suu, haa, fuu... Deixando isso de lado.\nEu preciso que você entregue isto\nna sala de conferências do prédio ao lado."
1013505-57 = "Ah, certo... O que é popularmente conhecido\ncomo uma 'missão de entrega'..."
1013505-58 = "Sim. E desta vez a recompensa será paga adiantada.\nAqui está, um colar."
1013505-59 = "……！"
1013505-60 = "É bem... requintado.\nBelíssimo, eu diria. "
1013505-61 = "Um ornamento dotado de cromado brilhoso mesclado ao azul cerúleo...\nO diamante também aparenta puxar mais pro alaranjado ou amarelado...\nAdornando em uma peça bem equilibrada sem chamar mais atenção visual do que o estritamente necessário. Notável..."
1013505-62 = "Mas... repassar peças e adornos finos\nque presumo valer uma fortuna absurda...\ntem certeza das implicações?"
1013505-64 = "Sem problema. Foram as garotas do\nClube de Desenvolvimento de Novos Materiais\nque fizeram isso como um passatempo com o que sobrou."
1013505-65 = "Até os diamantes e pedras são sintéticos,\nentão sua matéria constitutiva não passa de carbono, afinal."
1013505-67 = "Entendo... Embora a natureza artificial deles\nnão os faça inferiores aos originais."
1013505-69 = "Sendo assim,\nconto com você para a entrega!"
1013505-70 = "Me avise\nse precisar de mais quests!"
1013505-72 = "Não... Acredito que por hoje a cota de exploração\njá se encontra num estado de plena saciedade..."
1013505-73 = "……Haa."
1013505-74 = "Até quando você pretende manter esse sorriso no rosto\nsem ter um propósito para ele...?"
1013505-75 = "[s] \"Fufufu~\""
1013505-76 = "E posso saber o motivo do risinho?"
1013505-77 = "[s] \"Só de poder contemplar algo tão radiante assim,\nnão consigo não ficar admirado~\""
1013505-78 = "Por que você tem a incrível capacidade\nde fazer comentários vergonhosos\nnos momentos mais inoportunos!!"
1013505-81 = "Eu realmente não consigo lidar...\nO que foi que deu em todos vocês?\nEstão com alguma falha generalizada de reconhecimento,\npara dedicarem toda essa irritante atenção direcionada justamente para mim...?"
1013505-82 = "――Espere. Eu já prevejo perfeitamente o que vai sair dessa sua boca.\nVocê ia dizer algo sobre se importar comigo,\nou estava só se aproveitando da situação para dizer que eu sou 'adorável'\nou coisa do tipo, não é?"
1013505-83 = "……O simples fato de eu ter previsto o seu comportamento\nnão é motivo para fazer essa cara de deprimido.\nVocê é um adulto, ajo de acordo com a sua idade..."
1013505-84 = "[s] \"……Então,\no que tem achado do ambiente escolar?\""
1013505-85 = "……。"
1013505-86 = "Possui... as suas...\nconveniências que não renego."
1013505-87 = "[s] \"Entendi, então quer dizer que a vida acadêmica\nganhou um pedacinho no seu coração.\""
1013505-88 = "SUA AUDIÇÃO ESTÁ FUNCIONANDO CORRETAMENTE?!\nPARE DE DISTORCER O SIGNIFICADO LÓGICO DAS MINHAS PALAVRAS\nCOM SUAS PRÓPRIAS INTERPRETAÇÕES!!"
1013505-89 = "Haa……。"
1013505-90 = "Enfim. Eu me encontro operando em uma missão,\nentão não me distraia desnecessariamente."
1013505-91 = "Hum...? Eu acabei de dizer\nque estou no meio de uma q-u-e-s-t..."
1013505-92 = "……！！！"
1013505-93 = "S-Significa uma incumbência!!\nSó um simples dever que eu decidi acatar!"
1013505-94 = "Ahhh!!! Essa feição idiota mais uma vez!\nO que há de errado com você!"
1013505-95 = "[s] \"Mas eu não disse\nabsolutamente nada até agora!\""
1013505-96 = "Então você está permanentemente proibido\nde expor qualquer feição facial desse tipo!!"
1013505-97 = "[s] \"Eu exijo a minha\nliberdade de expressão facial!!\""
1013505-98 = "Não há leis estipuladas\nque se apliquem ao seu caso!"
1013505-99 = "Ei, olha só, a Kei tá ali.\nAs atividades parecem empolgantes desse lado da tela, hein?"
1013505-106 = "Achei essa interrupção totalmente desprovida de fatores de entretenimento!\nAh... Enfim, cheguei na hora ideal.\nFui incumbida da responsabilidade de uma que-- uma entrega particular."
1013505-107 = "Certo, ceeertooo... Ah!\nA simulação dos relatórios de testes na fase de prova\nconcluíram as suas aferições no cálculo."
1013505-108 = "Não seria mais eficiente trocar informações dessa natureza\nempregando pacotes via infraestrutura cibernética global?"
1013505-109 = "Temo... que esse quadro exato\nexija complicações nas vias comuns\nque o fariam recuar e desistir das propostas da Net de maneira quase instantânea..."
1013505-110 = "Explique a causa que corrobore\nsua constatação com dados coerentes, eu peço."
1013505-111 = "Nós classificamos os detalhes dos experimentos sob termos rigorosos...\nA vulnerabilidade de rede compromete arquivos tidos como secretos,\ne qualquer deslize em redes comuns quebrará o embargo\nda informação valiosa para a segurança da Millennium."
1013505-112 = "As desvantagens colossais no sistema primário da internet focam estritamente\nno buraco constante de vulnerabilidades das portas,\nsomadas as imprevisibilidades do seu armazenamento permanente a longo prazo!"
1013505-113 = "Os pontos batem de acordo e não posso encontrar uma refutação válida\nque me faça mudar a decisão de análise. De fato...\nA persistência das antigas fitas magnéticas em armazenar gigabytes massivos\ndo mundo acadêmico ainda segue forte contra os anos e contra os aparatos recentes\npela natureza arcaica e invulnerabilidade que o distanciamento confere a rede sem falhas na internet..."
1013505-114 = "Na verdade... A grande revolução da segurança virá\nquando métodos e soluções mais definitivas brotarem. O mais promissor.\nAo invés de chorar no campo inexplorado, o jeito que adotamos\nfoi focar a atenção naquilo de recursos de que já podemos nos vangloriar e desfrutar das maravilhas!"
1013505-115 = "……A Q-Quest foi dada como oficialmente e integralmente cumprida!\nA honra na comemoração requer, e demanda como de costume, e de lei,\nos nossos serviços diários num Arcade Game pra gastar todos os pontos!\nAs fichas então vão rolar... e o choro na derrota é certeiro!"
1013505-116 = "H-Hã...?\nO q-que foi isso repentino...?"
1013505-117 = "Espera? A animação nas horas jogando no seu rosto\nnas épocas dos duelos intensos parecia queimar até no ambiente em volta!"
1013505-118 = "A-Aqueles episódios contaram com circunstâncias particulares\npara a emulação daqueles sentimentos de divertimento\nnos meus atos e expressões! E, h-hã... não é que……。"
1013505-119 = "[s] \"Sério que o seu coração treme igual o da Aris\ne que ele também aprecia bater botões fervorosamente\nna telinha brilhosa dos mundos criados com pixels de jogos eletrônicos?\""
1013505-120 = "Ela é uma lenda entre os lendários!\nA habilidade escondida vai assustar até mesmo toda essa sua bagagem acumulada de vida!"
1013505-121 = "ESSAS INFORMAÇÕES SÃO... N-NÃO REVELAM A VERDADE!!\nO que motivou a euforia e meus resultados naquele dado instante...\nEram reações particulares de processamento...!!!"
1013505-122 = "Ué... Então naquele dia\nvocê se divertiu com a gente por obrigação...?"
1013505-123 = "E-ISSO TAMBÉM É UMA CONSTAÇÃO\nTOTALMENTE EQUIVOCADA!!!"
1013505-127 = "[ns] \"Fufu, você tem um sério problema para confessar\na verdade sobre os próprios sentimentos, não é?\""
1013505-128 = "Ugh... Você...\nNão fale essas... "
1013505-130 = "SUA AUTORIDADE ADULTA COM ESSAS INTUIÇÕES E RESPOSTAS\nÉ IRRITANTE, CÍNICA E IMPERTINENTE!!!!"