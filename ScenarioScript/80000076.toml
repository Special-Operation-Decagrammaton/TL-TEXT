[translation]
80000076-1 = "責務とイベントの相関性"
80000076-2 = "再開発地区・撤去予定のビル"
80000076-3 = "一応言っておくけど、私はアリウスのみんなを守る立場にある。"
80000076-4 = "[s] \"うん、知ってるよ。\""
80000076-5 = "だから今日先生を呼び出したのも、あくまでその延長線上の話。"
80000076-6 = "まずはそれを覚えておいて。"
80000076-7 = "[s1] \"肝に銘じるよ。\"\n[s2] \"それで……何をすればいい？\""
80000076-8 = "まずは……"
80000076-9 = "まずは……"
80000076-10 = "……ライフラインの確認から、かな。"
80000076-11 = "電気、ガス、水道……そういうのきちんと確保されてるか、点検しないと。"
80000076-12 = "整備の人が来るような場所じゃないから、自分たちでやっておかないといけない。"
80000076-13 = "それは……大変そう、って顔？"
80000076-14 = "でもこれが、私たちにとっての日常だから。"
80000076-15 = "[s3] \"そっか……あ、そういえばさっき電気と水は確認できたよ。\"\n[s4] \"確認としては、それで大丈夫そう？\""
80000076-16 = "……。"
80000076-17 = "……。"
80000076-18 = "意外と鋭いんだね、先生。"
80000076-19 = "じゃあ、次に移ろう。"
80000076-20 = "[s5] \"意外かなぁ！？\"\n[s6] \"何もしてないのに最初の仕事が終わった！！\""
80000076-21 = "騒がないで。大人なのに。"
80000076-22 = "騒がないで。大人なのに。"
80000076-23 = "次は……そうだね。"
80000076-24 = "経路の確認、かな。"
80000076-25 = "なにしろ、ここは完全な無秩序状態……"
80000076-26 = "治安で言えば、ある意味アリウス自治区よりも危うい。"
80000076-27 = "だから万が一に備えて、進入路や退路が確保されてるかどうかを調べる責務がある。"
80000076-28 = "[s7] \"でも私は、ここまで問題なく来られたよ？\"\n[s8] \"となると、経路は確保できてるんじゃないかな？\""
80000076-29 = "……。"
80000076-30 = "……。"
80000076-31 = "まあ……先生がそう言うなら、そうかもね。"
80000076-32 = "……何？別に怒ってないけど。"
80000076-33 = "問題が解決して良かった、って思ってるだけで。"
80000076-35 = "（その後もミサキと一緒に、様々な「責務」を果たしていった）"
80000076-36 = "（しかしその大半は、すぐに解決できるものだった……）"
80000076-38 = "……。"
80000076-39 = "[s] \"ミサキ、他には何がありそう？\""
80000076-40 = "予想外……。"
80000076-41 = "[s] \"……？\""
80000076-42 = "……何でもない。"
80000076-43 = "[s] \"でも今――\""
80000076-44 = "別に、何も言ってないから。"
80000076-45 = "[s] \"そっか。ところで、ずっと言おうと思ってたんだけど……\""
80000076-47 = "[ns] \"……ポケットから、何か出てるよ？\""
80000076-48 = "……！？"
80000076-49 = "い、いつから！？"
80000076-50 = "[s9] \"えっと、ミサキが安全点検のために……。\"\n[s10] \"廃ビルに行こう、って言ったあたりから……？\""
80000076-51 = "……！"
80000076-52 = "……！"
80000076-53 = "最悪……。"
80000076-54 = "[s] \"もしかして、それって……。\""
80000076-55 = "黙って。"
80000076-56 = "……。"
80000076-57 = "（ミサキはしばらく考え込んでいたが、やがてポケットの中のものを差し出してくれた）"
80000076-62 = "[ns11] \"ミサキからのチョコレートだ！\"\n[ns12] \"ありがとう！大切に食べるよ！\""
80000076-63 = "はぁ……こんなはずじゃなかったのに……。"
80000076-64 = "はぁ……こんなはずじゃなかったのに……。"
80000076-65 = "もういい。せっかくだし……ちゃんと食べてよね。"
80000076-66 = "とりあえず、今日はそういう日みたいだし。"
80000076-67 = "先生には、その……少しだけ、お世話になったこともあるから。"
80000076-68 = "他の意味は絶対、絶対、絶っ対に無いから。#nわかった？"
80000076-69 = "……本当にわかってる？#nああもう！にやけてないで、返事！"
80000076-71 = "（顔を真っ赤にして怒るミサキをなだめながら、美味しくチョコレートを食べた）"
