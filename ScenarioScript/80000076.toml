[translation]
80000076-1 = "A correlação entre deveres e eventos"
80000076-2 = "Distrito de reurbanização - Prédio marcado para demolição"
80000076-3 = "Vou deixar claro: eu estou aqui para proteger o pessoal de Arius."
80000076-4 = "[s] \"Sim, eu sei.\""
80000076-5 = "Por isso, chamei o Sensei hoje, como uma extensão disso."
80000076-6 = "Primeiro, guarde isso na memória."
80000076-7 = "[s1] \"Vou levar isso a sério.\"\n[s2] \"Então... o que eu devo fazer?\""
80000076-8 = "Primeiro..."
80000076-9 = "Primeiro..."
80000076-10 = "...acho que verificar as linhas de utilidade pública."
80000076-11 = "Eletricidade, gás, água... precisamos checar se tudo isso está funcionando corretamente."
80000076-12 = "Como não é um lugar onde equipes de manutenção vêm, temos que cuidar disso nós mesmos."
80000076-13 = "Essa cara de... 'parece difícil'?"
80000076-14 = "Mas isso é o nosso cotidiano."
80000076-15 = "[s3] \"Entendi... Ah, falando nisso, já verifiquei a eletricidade e a água.\"\n[s4] \"Isso já é o suficiente para a verificação?\""
80000076-16 = "..."
80000076-17 = "..."
80000076-18 = "Você é mais perspicaz do que parece, Sensei."
80000076-19 = "Então, vamos para a próxima."
80000076-20 = "[s5] \"Surpreso com isso!?\"\n[s6] \"O primeiro trabalho terminou sem eu fazer nada!!\""
80000076-21 = "Não faça barulho. Você é um adulto."
80000076-22 = "Não faça barulho. Você é um adulto."
80000076-23 = "A próxima é... vejamos."
80000076-24 = "Verificar as rotas, eu acho."
80000076-25 = "Afinal, este lugar está em um estado de desordem total..."
80000076-26 = "Em termos de segurança, é, de certa forma, mais perigoso que o Distrito Autônomo de Arius."
80000076-27 = "Por isso, para nos prepararmos para qualquer eventualidade, é meu dever verificar se as rotas de entrada e saída estão seguras."
80000076-28 = "[s7] \"Mas eu consegui chegar até aqui sem problemas, não foi?\"\n[s8] \"Sendo assim, as rotas já não estão seguras?\""
80000076-29 = "..."
80000076-30 = "..."
80000076-31 = "Bem... se o Sensei diz, talvez seja verdade."
80000076-32 = "...O quê? Não estou brava, não."
80000076-33 = "Só estou feliz que o problema tenha sido resolvido."
80000076-35 = "(Depois disso, continuei cumprindo vários outros \"deveres\" junto com Misaki)"
80000076-36 = "(No entanto, a maioria deles eram coisas que podiam ser resolvidas rapidamente...)"
80000076-38 = "..."
80000076-39 = "[s] \"Misaki, o que mais parece ter por aqui?\""
80000076-40 = "Inesperado..."
80000076-41 = "[s] \"...?\""
80000076-42 = "...Não é nada."
80000076-43 = "[s] \"Mas agora há pouco--\""
80000076-44 = "Eu não disse nada, não."
80000076-45 = "[s] \"Entendi. Aliás, eu queria ter dito isso há um tempo...\""
80000076-47 = "[ns] \"...Tem algo saindo do seu bolso?\""
80000076-48 = "...!?"
80000076-49 = "D-desde quando!?"
80000076-50 = "[s9] \"Bem, desde que a Misaki disse para...\"\n[s10] \"...irmos ao prédio abandonado para a verificação de segurança?\""
80000076-51 = "...!"
80000076-52 = "...!"
80000076-53 = "Que horror..."
80000076-54 = "[s] \"Por acaso, isso é...\""
80000076-55 = "Cala a boca."
80000076-56 = "……。"
80000076-57 = "(Misaki ficou pensativa por um tempo, mas logo estendeu o que estava em seu bolso)"
80000076-62 = "[ns11] \"É um chocolate da Misaki!\"\n[ns12] \"Obrigado! Vou comer com muito carinho!\""
80000076-63 = "Ah... não era para ser assim..."
80000076-64 = "Ah... não era para ser assim..."
80000076-65 = "Já chega. Já que estamos aqui... coma direito, está bem?"
80000076-66 = "De qualquer forma, parece que hoje é esse tipo de dia."
80000076-67 = "É que, Sensei... você já cuidou de mim um pouco antes."
80000076-68 = "Não tem nenhum outro significado, absoluta, absoluta, absolutamente nenhum. #nEntendeu?"
80000076-69 = "……Você entendeu mesmo? #nAh, droga! Não fique sorrindo, me responde!"
80000076-71 = "(Enquanto acalmava Misaki, que estava com o rosto vermelho de raiva, comi o chocolate e estava delicioso)"
