[translation]
10010070-1 = "第7話;少し似た人たち（１）"
10010070-11 = "……。"
10010070-15 = "うーん……。"
10010070-16 = "[s1] \"……ウイ？\"\n[s2] \"何か問題でもあった？\""
10010070-17 = "い、いえ、その……。"
10010070-18 = "い、いえ、その……。"
10010070-23 = "何と言いますか、その……自分からお願いしておいて、何ですが……。"
10010070-24 = "ほ、本当に見つけてくるとは……それに、こんなにも早く。ま、まあ、揃わないと作業はできませんし、式典に間に合わないとマズいというのは、そうなのですが……。"
10010070-25 = "特に「[ruby=みずごけにかわ]水苔膠[/ruby]」……こ、これを探すだけでも、優に数日はかかるのではと思ったんです。"
10010070-26 = "あと、なぜかお二方は、ホコリまみれですし……。"
10010070-27 = "すみません、色々ありまして……。"
10010070-28 = "え、えっと……。"
10010070-29 = "……色んな見方がある、ということですかね。"
10010070-30 = "な、何と言いますか、思ったよりと言いましょうか……。"
10010070-31 = "……お疲れ様でした。"
10010070-32 = "……？"
10010070-36 = "[ns] \"ウイ？\""
10010070-42 = "あ、あとこの、ケーキも……何故か形が相当崩れてますが……。"
10010070-44 = "そ、それは……！"
10010070-48 = "……ま、まあ先生もいてのことですし、それなりの理由があったでしょう。何となく察しはします。"
10010070-49 = "そ、それに私は、こうして貰う立場ですし……ありがたく頂きます。"
10010070-50 = "ウイさん……。"
10010070-51 = "と、とはいってもその……仲良くおしゃべりをしている場合では、ありません。"
10010070-52 = "時間が無いこと……それは、お、お二人の方が、よくご存じでしょうし……。"
10010070-53 = "こ、これだけでは、まだ作業を始められません。"
10010070-54 = "精聖薬……よろしくお願いしますね。"
10010070-55 = "は、はい……！"
10010070-57 = "ま、まあ多分、大丈夫だとは思っていますが……。"
10010070-58 = "……？"
10010070-62 = "……いえ。"
10010070-63 = "えっと、お、お待ちしております……。"
