[translation]
1006202-1 = "トキの日課"
1006202-2 = "シャーレオフィス"
1006202-8 = "（今日も、どうにかデスクの前にたどり着いた）"
1006202-9 = "（ところまでは良かったんだけど……）"
1006202-10 = "おはようございます、先生。"
1006202-11 = "[s1] \"誰！？\"\n[s2] \"おはよう、トキ……？\""
1006202-12 = "……。"
1006202-13 = "そうですか。先生は私のことなど忘れてしまった、と。"
1006202-14 = "大丈夫です。#nたとえ忘れられてしまったとしても、問題ありません。"
1006202-15 = "……ですが、私のカチューシャとメイド服は忘却を許さないでしょうね。"
1006202-16 = "[ns3] \"ち、違うんだ！ごめん、急だったから！\""
1006202-18 = "[ns4] \"トキ！トキだよね？[ruby=あすま]飛鳥馬[/ruby]トキ！\""
1006202-19 = "思い出してくださりありがとうございます、先生。"
1006202-20 = "覚えていてくださりありがとうございます、先生。"
1006202-21 = "どうしたのですか？かなり慌てたご様子で……。#n私、何か変なことでもしてしまいましたか？"
1006202-22 = "[ns5] \"そ、そんなことないよ！むしろ会いたかったくらい！\""
1006202-24 = "[ns6] \"でも、次は先に連絡をもらえると助かるかなって。\""
1006202-25 = "ご連絡、しましたが……？"
1006202-26 = "[s7] \"それは、そうだけど……。\""
1006202-27 = "ですが、そうですね……たしかに名乗ってはおりませんでした。"
1006202-28 = "[ns8] \"だよね！？\""
1006202-29 = "――何故、シャーレを訪れたのかと言いますと……。"
1006202-30 = "――何故、シャーレを訪れたのかと言いますと……。"
1006202-31 = "暇……いえ、やることがなくなったからです。"
1006202-32 = "[s] \"それは説明になってないような……。\""
1006202-33 = "そうですか。説明というのは難しいですね……。"
1006202-34 = "[s] （そんなに難しいことかな……）"
1006202-35 = "以前は、お仕えしている人がおりました。"
1006202-36 = "その方のメイド兼ボディーガードとして、#n朝から晩までつきっきりだったのですが……"
1006202-37 = "……少し、事情がありまして。"
1006202-38 = "その方は、私にいくつかの命令を残し、行方を眩ませてしまったのです。"
1006202-39 = "主人を失った私は、どうすればよいか考えてみました。"
1006202-40 = "[s] \"自分で考えて行動するのは大切だよね。\""
1006202-41 = "そこで、シャーレの先生を主人とし、これまで通り過ごせば良い、#nという結論に至りました。"
1006202-42 = "[s] \"ど、どうして……？\""
1006202-43 = "私がこういう状況に陥ったのは、先生にも責任の一端があるからです。#nそうでしょう？"
1006202-48 = "何か問題でも？#nそれとも今になって、ご自身の罪の重さを理解されましたか？"
1006202-49 = "[s] \"理屈めちゃくちゃじゃない！？\""
1006202-50 = "いいえ、これは論理的かつ合理的な結論です。"
1006202-55 = "ですから、今この瞬間より私は先生にお仕えいたします。"
1006202-56 = "[ns] \"ちょっと待って、トキさん？トキ様！？\""
1006202-58 = "（切実な抗議が受け入れられることはなく、こうしてトキの「お世話」が始まったのであった……）"
1006202-60 = "市街地"
1006202-69 = "ねえ、見て！#nシャーレの先生が、生徒にメイド服を着せて散歩させてない？"
1006202-70 = "シャーレの先生は基本的には良い人だけど……時々生徒に良からぬことをさせてるって噂、本当だったんだ……。"
1006202-72 = "ふふっ、私への称賛が聞こえてきますね。"
1006202-73 = "これぞまさにメイドの鑑。#nそうは思いませんか、先生？"
1006202-74 = "[s] \"なんだか誤解されているような……？\""
1006202-79 = "これも良い機会です。#nいかなる脅威からも先生をお守りできる事を証明するとしましょうか。"
1006202-80 = "警戒レベル上昇、戦闘モードに移行します。"
1006202-89 = "えっ！？道端で急に生徒を脱がすなんて……"
1006202-90 = "こんな人目のあるところで……信じられない。"
1006202-91 = "[ns9] \"トキさん！ステイ、ステイ！\" \n[ns10] \"か、解除して！お願いします！\""
1006202-104 = "そうですか……残念です。警戒レベルを戻します。"
1006202-106 = "あ、先生。少しお話があるんですが……。"
1006202-111 = "お待ちください。先生とお話をするのでしたら、まず私を通してください。"
1006202-112 = "え……？"
1006202-113 = "お話したい理由を伺っても？#nどのような内容で、想定される所要時間はどの程度でしょうか？"
1006202-114 = "それとも、私がいては話せないようなことですか？"
1006202-115 = "え、ええっと……。"
1006202-116 = "[ns] \"ちょ、ちょっと待って！\""
1006202-118 = "（こうして一日中、トキに付きっ切りのお世話（？）をされた）"
1006202-119 = "（普段と違う……非常に……斬新な一日だった……）"
1006202-124 = "[ns] \"トキ……今日はお疲れさま……。\""
1006202-125 = "すごくお疲れのようですね。大丈夫ですか？"
1006202-126 = "心配いらない、ですか？#nですが――"
1006202-127 = "……。"
1006202-128 = "私、ご迷惑でしたか？"
1006202-129 = "[s] \"迷惑ではないけど、ちょっとやりすぎだったかもね……。\""
1006202-130 = "そうですか……これでも加減しておりましたが。"
1006202-131 = "……冗談ではありませんよ。"
1006202-136 = "私の目を見てください。むやみに冗談を言うように見えますか？"
1006202-137 = "[s] \"むしろ冗談を言わなさそうだから言ったんだよ！？\""
1006202-138 = "であれば、一安心です。#n先生が正常な思考回路をお持ちということが分かりました。"
1006202-139 = "[s] \"手伝ってくれるのは嬉しいけど、ほどほどにね……？\""
1006202-140 = "そう、でしょうか……"
1006202-141 = "先生はもう少し、ご自身の立場や状況を自覚したほうがよろしいかと思います。"
1006202-142 = "ですが、そう仰るのでしたら……承知しました。"
1006202-143 = "[s11] \"今日はトキと過ごせて楽しかったよ。\"\n[s12] \"でも、明日からはもう少しフランクに接してほしいな。\""
1006202-146 = "フランクに、ですか……。"
1006202-147 = "分かりました、先生。でしたら――"
1006202-148 = "よお、先生。これからよろしく頼むぜ。"
1006202-153 = "冗談です。優秀なメイドの真似をしてみただけですから。#nそんなに驚かないでください。"
1006202-154 = "[s] \"むやみに冗談は言わないって！\""
1006202-155 = "場を和ませようかと思い。"
1006202-156 = "[s] \"裏切ったんだね！私の気持ちを、裏切ったんだね！\""
1006202-157 = "……。"
1006202-158 = "その通りです。私は今、先生の気持ちを裏切りました。私の勝ちです、[ruby=ビクトリー]ぶいっ[/ruby]。"
1006202-159 = "[s] \"生徒に負けた以上、先生を名乗る自信が……。\""
1006202-160 = "それは困ります。先生は私に補佐されなくてはいけませんので。"
1006202-161 = "そうでないと、また暇になってしまうでしょう？"
1006202-162 = "[s] \"これが普段のフランクな姿だったり……？\""
1006202-163 = "……ぷふっ。"
1006202-164 = "でしたら、どうされますか？"
1006202-165 = "[s] \"あはは、それがトキなら喜んで。\""
1006202-166 = "そう仰ってくださり、ありがとうございます、先生。"
1006202-168 = "（トキは満足気な表情で帰っていった）"
1006202-169 = "（そして、次の日……）"
1006202-178 = "おはようございます、先生。"
1006202-179 = "[s] \"こういう展開になると思ってたよ！\""
1006202-180 = "覚えていてくださり、ありがとうございます、先生。"
1006202-181 = "今日も一日、先生を補佐いたしますね。"
1006202-187 = "行きましょうか、先生。"
1006202-189 = "（また今日も騒がしい一日になりそうだ……）"
