[translation]
1004006-1 = "Como uma ninja, esta é a minha chance de brilhar...!"
1004006-2 = "（Certo dia, enquanto procurava um lugar adequado para treinar ninjutsu com Tsukuyo...）"
1004006-3 = "Choco~! Onde você foi, Choco~?!"
1004006-4 = "Ei, aquela criança..."
1004006-5 = "[s] \"Aquela criança que a Tsukuyo ajudou outro dia...?\""
1004006-6 = "Com licença, aconteceu alguma coisa...?"
1004006-7 = "Ah! A irmãzinha que me ajudou outro dia...! E a outra pessoa também...!"
1004006-8 = "[s] \"Olá, sou a 'outra pessoa'. A propósito, o que houve?\""
1004006-9 = "Snif... O Choco sumiu..."
1004006-10 = "Choco... você diz?"
1004006-11 = "Sim, é o meu cachorro... estávamos passeando agora pouco e..."
1004006-12 = "Eu acabei soltando a guia sem querer e ele foi para algum lugar..."
1004006-13 = "O que eu faço? E se eu nunca mais conseguir vê-lo...! Snif... buááá...!"
1004006-14 = "Por favor, tente se acalmar..."
1004006-15 = "Eu sei que não sou a melhor pessoa para dizer isso, mas, bem..."
1004006-16 = "Sensei, o que devemos fazer...!?"
1004006-17 = "[s] \"Está tudo bem, deixe conosco.\""
1004006-19 = "……Eh?"
1004006-20 = "……?"
1004006-21 = "[s1] \"Vamos, Tsukuyo!\"\n[s2] \"Esta é a chance de resolver o problema de alguém e crescer como ninja!\""
1004006-22 = "Entendido...!"
1004006-23 = "Entendido...!"
1004006-24 = "Sim, compreendido...! Como uma ninja, não tenho outra escolha a não ser dar o meu melhor...!"
1004006-25 = "Por favor, não se preocupe. Eu... eu e o Sensei vamos encontrar o Choco, com certeza...!"
1004006-26 = "Snif... é verdade...?"
1004006-27 = "Sim...!"
1004006-28 = "……Sim, obrigada!"
1004006-30 = "O básico para seguir um alvo é começar explorando os lugares onde ele provavelmente apareceria...!"
1004006-31 = "Pelo que você disse, devemos começar procurando pelo caminho do passeio..."
1004006-32 = "[s] \"Incrível! A Tsukuyo de agora parece uma ninja de verdade!\""
1004006-33 = "S-sério...? Hehe... eu tenho estudado bastante para isso..."
1004006-34 = "Finalmente, chegou a hora de colocar em prática...! Por favor, deixe comigo...!"
1004006-35 = "（Talvez eu consiga mostrar uma versão bem legal de mim mesma para o Sensei...!）"
1004006-36 = "[s] \"……A propósito, Tsukuyo.\""
1004006-37 = "Sim, o que houve?"
1004006-38 = "[s] \"Aquele cachorro ali, será que não é o Choco...?\""
1004006-39 = "……Eh?"
1004006-44 = "[ns] \"Ah, ele fugiu.\""
1004006-45 = "Ah...! Ele apareceu, mas fugiu...!?"
1004006-46 = "E-espere, Choco...!"
1004006-53 = "Pare, por favor...!"
1004006-60 = "Pare, pare..."
1004006-66 = "P-pare..."
1004006-73 = "[ns] \"Isso, isso, fique quietinho aí...\""
1004006-75 = "[ns] \"Agora!\""
1004006-82 = "（De alguma forma, conseguimos capturar o Choco com sucesso）"
1004006-84 = "[ns3] \"Tsukuyo, peguei o Choco!\"\n[ns4] \"……Tsukuyo?\""
1004006-90 = "Sensei, me ajude..."
1004006-92 = "[ns] \"Pelo que ouvimos antes, ele estaria por aqui...?\""
1004006-93 = "Sensei, é por aqui..."
1004006-94 = "[s] \"Ouvi uma voz vindo daqui...\""
1004006-97 = "[wa:900]— Ugh..."
1004006-99 = "— Eu tentei [wa:800] passar por aqui [wa:1400] para pegar um atalho, [wa:1900] mas..."
1004006-102 = "[wa:1000]— Como pode ver, [wa:1800] no meio do caminho,"
1004006-104 = "— eu acabei ficando presa..."
1004006-107 = "[wa:600]— Mas, [wa:1200] é justamente nessas [wa:850] horas..."
1004006-109 = "— que com o ninjutsu, [wa:1800] eu deveria conseguir...!?"
1004006-112 = "[wa:400]— Nnn, [wa:1300] nnnnnnnn...!!"
1004006-114 = "— Pelo visto, [wa:1500] não [wa:900] deu certo..."
1004006-117 = "[wa:800]— Ugh, [wa:1600] ugh..."
1004006-119 = "— Sensei... [wa:1900] você poderia me [wa:1500] ajudar...?"
1004006-125 = "Ah, Choco!"
1004006-127 = "Irmãzona! Obrigada por encontrar a Choco!"
1004006-128 = "Não foi nada... Como uma ninja, isso é moleza!"
1004006-129 = "Choco-chan... não me dê mais sustos assim, entendeu?"
1004006-131 = "Kya, ei, não me lamba...! I-isso faz cócegas...! Ah, espere..."
1004006-132 = "Não pode lamber meu rosto assim...!"
1004006-133 = "...A propósito, irmãzona, suas roupas e seu cabelo estão uma bagunça. A Choco estava em um lugar tão perigoso assim?"
1004006-134 = "Bem, é que..."
1004006-135 = "Sabe... aconteceram várias coisas, sim..."
1004006-136 = "...Várias coisas?"
1004006-139 = "Então, tchau para vocês duas! Vamos, Choco!"
1004006-141 = "Fico feliz que ela tenha sido encontrada... mas..."
1004006-142 = "Ugh... Naquela hora, eu achei que nunca mais conseguiria sair de lá..."
1004006-143 = "No momento em que percebi que não conseguia me mover... eu fiquei com tanto medo..."
1004006-144 = "[s5] \"Que bom que está a salvo... e a Choco-chan também foi encontrada.\"\n[s6] \"Acho que agora está tudo resolvido.\""
1004006-145 = "Sim, é verdade...!"
1004006-146 = "Sim, é verdade...!"
1004006-147 = "Eu não consegui brilhar como uma ninja de verdade... mas graças ao Sensei, conseguimos resolver o problema...!"
1004006-148 = "Além disso, aprendi algo hoje também. Como dizem, uma jornada de mil milhas começa com um passo..."
1004006-149 = "Até a próxima... vou estudar técnicas de escape para quando ficar presa em becos estreitos...!"
1004006-150 = "[s] \"Acho que o foco está um pouco errado...?\""
1004006-151 = "Se eu continuar me esforçando pouco a pouco assim... e se estiver com o Sensei..."
1004006-152 = "Talvez um dia eu possa me tornar uma ninja exemplar... Eu comecei a acreditar nisso, mesmo que só um pouquinho..."
1004006-153 = "Dito isso, Sensei."
1004006-154 = "Eu ainda sou inexperiente, mas conto com o seu apoio daqui para frente...!"
1004006-155 = "[s] \"Claro, eu que conto com você também, Tsukuyo.\""
1004006-156 = "Ehehe... sim!"
