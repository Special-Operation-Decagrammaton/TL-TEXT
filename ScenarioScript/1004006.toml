[translation]
1004006-1 = "忍者として、活躍するチャンス……！"
1004006-2 = "（ツクヨと忍術の修行をするため、ちょうど良さそうな場所を探していたある日……）"
1004006-3 = "チョコ～！どこに行ったの、チョコ～！？"
1004006-4 = "あれ、あの子……。"
1004006-5 = "[s] \"この間、ツクヨが助けた子……？\""
1004006-6 = "あの、何か、ありましたか……？"
1004006-7 = "あっ！この前助けてくれたお姉ちゃん……！と、もうひとりの人……！"
1004006-8 = "[s] \"どうも、もうひとりの人です。ところで、何かあったの？\""
1004006-9 = "ぐすっ……チョコが、いなくなっちゃって……。"
1004006-10 = "チョコ……ですか？"
1004006-11 = "うん、うちの犬なんだけど……さっきまで一緒にお散歩してて……。"
1004006-12 = "私がリードをうっかり離しちゃったせいで、どっかに……。"
1004006-13 = "どうしよう、このままもう会えなくなっちゃったら……！うっ……ううっ……！"
1004006-14 = "大丈夫、落ち着いて、ください……"
1004006-15 = "私が言っても、アレかもしれませんが、えっと……。"
1004006-16 = "先生、どうしましょう……！？"
1004006-17 = "[s] \"大丈夫、私たちに任せて。\""
1004006-19 = "……え？"
1004006-20 = "……？"
1004006-21 = "[s1] \"行こう、ツクヨ！\"\n[s2] \"依頼者の悩みを解決しながら、忍者として一歩成長できるチャンス！\""
1004006-22 = "なるほど……！"
1004006-23 = "なるほど……！"
1004006-24 = "はい、了解です……！忍者として、頑張るしかありません……！"
1004006-25 = "心配、しないでください。私が……私と先生が、必ず、チョコちゃんを探してきます……！"
1004006-26 = "ぐすっ……本当……？"
1004006-27 = "はい……！"
1004006-28 = "……うん、ありがとう！"
1004006-30 = "標的を追う時の基本は、まず対象が現れそうな場所を、探索すること……！"
1004006-31 = "先ほど聞いた話からすると、まずはお散歩コースから探していけば……"
1004006-32 = "[s] \"すごい！今のツクヨ、完全に忍者だよ！\""
1004006-33 = "そう、でしょうか……？えへへ……これでも、ずっと勉強、してるので……。"
1004006-34 = "ついに、実践の時です……！どうか、お任せください……！"
1004006-35 = "（もしかしたら先生に、かっこいい姿をお見せできる、かも……！）"
1004006-36 = "[s] \"……ところでツクヨ。\""
1004006-37 = "はい、どうか、されましたか？"
1004006-38 = "[s] \"あそこにいる犬、もしかしてチョコちゃんじゃ……？\""
1004006-39 = "……えっ？"
1004006-44 = "[ns] \"あっ、逃げた。\""
1004006-45 = "ああっ……！出て来てくれたのに、逃げちゃいました……！？"
1004006-46 = "ま、待ってください、チョコちゃん……！"
1004006-53 = "止まって、ください……っ！"
1004006-60 = "止まっ、止まって……"
1004006-66 = "と、止まっ…………"
1004006-73 = "[ns] \"よーしよし、そのままおとなしくしててね……。\""
1004006-75 = "[ns] \"今だ！\""
1004006-82 = "（何とかして、チョコちゃんを捕まえることに成功した）"
1004006-84 = "[ns3] \"ツクヨ、チョコちゃん捕まえたよ！\"\n[ns4] \"……って、ツクヨ？\""
1004006-90 = "先生、助けてください……。"
1004006-92 = "[ns] \"さっき聞いた限りだと、この辺に……？\""
1004006-93 = "先生、こちらです……。"
1004006-94 = "[s] \"こっちの方から声が……。\""
1004006-97 = "[wa:900]― うぅっ……。"
1004006-99 = "― ここを[wa:800]通って、[wa:1400]近道しようと、[wa:1900]したのですが……"
1004006-102 = "[wa:1000]― 見ての通り、[wa:1800]途中で、"
1004006-104 = "― 挟まってしまい……。"
1004006-107 = "[wa:600]― ですが、[wa:1200]こういう[wa:850]時こそ……"
1004006-109 = "― 忍術で、[wa:1800]どうにか……！？"
1004006-112 = "[wa:400]― んんっ、[wa:1300]んんんんんんんっ……！！"
1004006-114 = "― やっぱり、[wa:1500]無理[wa:900]でした……"
1004006-117 = "[wa:800]― うっ、[wa:1600]うっ……"
1004006-119 = "― 先生……[wa:1900]手伝って、[wa:1500]くれませんか……。"
1004006-125 = "あっ、チョコ！"
1004006-127 = "おねえちゃん！チョコを見つけてくれてありがとう！"
1004006-128 = "いえ、大したことでは……忍者として、朝飯前、です！"
1004006-129 = "チョコちゃんも……もう心配させちゃ、ダメですよ？"
1004006-131 = "きゃっ、ちょっ、舐めないで……！く、くすぐったい、です……っ！あっ、ちょっと……！？"
1004006-132 = "そんな、顔、舐められると……！"
1004006-133 = "……ところでおねえちゃん、服も髪もボロボロだね？チョコ、そんなにすごいところにいたの？"
1004006-134 = "えっと、それは……"
1004006-135 = "その……色々ありまして、はい……。"
1004006-136 = "……色々？"
1004006-139 = "それじゃあ二人ともバイバイ！行こう、チョコ！"
1004006-141 = "見つかって、良かったです……が……。"
1004006-142 = "うぅ……あの時は、もう、一生出られないかと、思いました……。"
1004006-143 = "動けない、と分かった瞬間……もう、すごく怖くて……。"
1004006-144 = "[s5] \"無事で良かったよ……チョコちゃんも無事見つかったし。\"\n[s6] \"これで一件落着かな。\""
1004006-145 = "はい、そう、ですね……！"
1004006-146 = "はい、そう、ですね……！"
1004006-147 = "忍者らしく、活躍……は、できませんでしたが……先生のおかげで、解決、できました……！"
1004006-148 = "それに、今日もまた、学びました。千里の道も一歩から、と、言いますし……"
1004006-149 = "次までには……狭い路地に挟まった時の、脱出法を、勉強しておきます……！"
1004006-150 = "[s] \"方向性がちょっと違うような……？\""
1004006-151 = "これからも、こうやって、コツコツと積み上げれば……それに、先生と一緒なら……"
1004006-152 = "いつかは、立派な忍者になれるかも、と……私も、少しですが、そう思えてきました……。"
1004006-153 = "その、先生。"
1004006-154 = "ふつつか者ですが、これからも、よろしくお願い、します……！"
1004006-155 = "[s] \"うん、こちらこそよろしくね。ツクヨ。\""
1004006-156 = "えへへ……はいっ！"
