[translation]
10032050-1 = "Episódio 5; Parecendo experiente, mas sendo desajeitada"
10032050-7 = "Problem Solver 68..."
10032050-13 = "...Saori Joumae."
10032050-14 = "A carta na manga, não pode ser..."
10032050-15 = "...Haa."
10032050-16 = "As coisas ficaram realmente complicadas, presidente."
10032050-21 = "...Quem?"
10032050-22 = "Como assim quem... é a Saori Joumae, né."
10032050-23 = "A mercenária que veio de Arius."
10032050-24 = "Já lutamos contra ela antes, esqueceu?"
10032050-25 = "Joumae, Saori...?"
10032050-26 = "...!"
10032050-27 = "Jo, Joumae Saori!? Aquela que usava um capacete suspeito quando lutamos contra quem deu um calote na gente antes...!?"
10032050-28 = "Sim, essa mesma. Quando a Haruka-chan disse que ia dar um 'oi' e acabou fazendo uma bagunça daquelas!"
10032050-29 = "Hã!? Mas a aura dela está completamente diferente!? Não é outra pessoa não!!?"
10032050-30 = "Kufufu! #nSe for por isso, nós também não estamos?"
10032050-31 = "Estamos todas de vestido, então não tem problema~!"
10032050-37 = "Logo vocês, de todas as pessoas..."
10032050-38 = "Mas, já que chegamos a esse ponto, vou dar o meu melhor!"
10032050-40 = "Ouviu isso? A Aru-chan disse que vai dar o melhor dela."
10032050-41 = "Por que!?!?"
10032050-42 = "Porque é o trabalho delas também, né."
10032050-48 = "...Hm?"
10032050-49 = "Espere, quem está ali é..."
10032050-50 = "[s1] \"Saori, caiu muito bem em você.\"\n[s2] \"O que está fazendo aqui hoje?\""
10032050-53 = "...Ah."
10032050-54 = "...Sensei?"
10032050-55 = "............?"
10032050-56 = "............!?!?"
10032050-57 = "Po, por que o Sensei está aqui...!?"
10032050-58 = "...Hã?"
10032050-59 = "Eu, eu mesmo...?"
10032050-60 = "Eu vim a trabalho, é claro..."
10032050-61 = "Fui ordenado a ficar de prontidão aqui e servir de escolta caso algo acontecesse."
10032050-62 = "Até me deram um vestido para não destoar do evento..."
10032050-63 = "............Vestido."
10032050-67 = "Ah! I, isso é diferente! Não é meu!"
10032050-68 = "Me deram porque era necessário para a operação...!"
10032050-69 = "É verdade que eu escolhi o design, mas...! #nFoi estritamente por causa do trabalho...!"
10032050-70 = "Não é como se fosse uma preferência pessoal ou algo do tipo...! #nNão, bem... eu até que gostei um pouco, mas...!"
10032050-71 = "Nã-nã-não é isso! Isso é, sabe... um código de vestimenta!"
10032050-78 = "...Ela ficou agindo de forma suspeita de repente."
10032050-79 = "É verdade. A imagem dela é um pouco diferente do que eu pensava..."
10032050-80 = "Ela era esse tipo de pessoa?"
10032050-82 = "Po, por falar nisso, Sensei, por que você está aqui...!?"
10032050-83 = "...Hã?"
10032050-84 = "Veio fazer BDs para material didático? A pedido do Conselho Estudantil Geral?"
10032050-85 = "Entendo... Então o Sensei também veio a trabalho."
10032050-86 = "Hum, ambos estamos em uma situação difícil."
10032050-87 = "Ei! Por que vocês estão conversando com esse sorrisinho no rosto!?"
10032050-88 = "Chega disso, me leve logo para um lugar seguro!!"
10032050-89 = "Ah... perdão. Eu acabei me distraindo."
10032050-90 = "Sendo assim, sinto muito, Sensei..."
10032050-102 = "...vou voltar ao trabalho."
10032050-103 = "Assim que eu terminar de evacuar o cliente, entrarei em contato novamente. Até mais..."
10032050-112 = "...!"
10032050-113 = "............!"
10032050-115 = "O que, o que? Você pretende fugir assim?"
10032050-116 = "Não acha isso um pouco solitário?"
10032050-118 = "Vai falar só com o Sensei e ignorar a gente?"
10032050-119 = "Que crueldade~ Nós também temos muuuita coisa para conversar."
10032050-120 = "Afinal de contas..."
10032050-121 = "Pelo nosso relacionamento, não é?"
10032050-123 = "Problem Solver 68..."
10032050-124 = "Eu não tenho intenção de lutar contra vocês agora."
10032050-126 = "Essa frase deveria ser nossa."
10032050-127 = "Vou fazer uma proposta."
10032050-128 = "Deixe o cliente para trás. Se fizer isso, nós também ficaremos na nossa."
10032050-130 = "Então é assim que vai ser..."
10032050-134 = "...Infelizmente, não posso aceitar essa proposta."
10032050-135 = "Eu também aceito meus trabalhos baseada na confiança."
10032050-136 = "O trabalho que me foi dado, eu cumprirei custe o que custar. Caso contrário, não conseguirei novos trabalhos no futuro."
10032050-138 = "............"
10032050-139 = "Que..."
10032050-140 = "Que legal..."
10032050-141 = "Por que você está admirada, Presidente?"
10032050-142 = "[s3] \"Eu entendo o sentimento da Aru.\"\n[s4] \"Realmente, é bem legal.\""
10032050-148 = "Ah, que pena. Nós também não podemos ceder porque é o nosso trabalho, sabe?"
10032050-149 = "Se a negociação fracassou..."
10032050-154 = "AAAAAAHHHHHH!!!"
10032050-157 = "...não temos escolha a não ser ir até o fim."
10032050-158 = "...Então, no fim, vai terminar assim mesmo."
10032050-159 = "Eu vou segurá-las aqui, então corra logo."
10032050-160 = "Correr, você disse...?"
10032050-161 = "...Você está me dando ordens?"
10032050-162 = "O cliente é você, afinal. Vamos, corra."
10032050-167 = "...Rápido!!"
10032050-168 = "...!!!!"
10032050-174 = "Não vou deixar vocês escaparem!"
10032050-175 = "H-Haruka, você já está bem? E os ferimentos..."
10032050-180 = "NÃO ATRAPALHEM O PLANO DA ARU-SAMA!!!"
10032050-192 = "...Parece que ela está bem."
