[translation]
10032050-1 = "第5話;手慣れてそうで不器用に"
10032050-7 = "便利屋68……"
10032050-13 = "……[ruby=じょうまえ]錠前[/ruby]サオリ。"
10032050-14 = "切り札って、まさか……"
10032050-15 = "……はぁ。"
10032050-16 = "本当にややこしくなったね、社長。"
10032050-21 = "……誰？"
10032050-22 = "誰って……錠前サオリでしょ。"
10032050-23 = "アリウス出身の傭兵。"
10032050-24 = "前にも戦ったことあるけど、もう忘れたの？"
10032050-25 = "じょうまえ、さおり……？"
10032050-26 = "……っ！"
10032050-27 = "じょ、錠前サオリ！？以前、私たちのお金を踏み倒した奴と戦ってた時に怪しいヘルメットを被ってたあの……！？"
10032050-28 = "うん、そうだよ。ハルカちゃんが挨拶って言って、派手にやらかした時の！"
10032050-29 = "え！？雰囲気とか全然違うけど！？完全に別人じゃない！！"
10032050-30 = "くふふ！#nそれを言うなら私たちもじゃない～？"
10032050-31 = "お互いドレス姿なんだし～別にいいじゃん～！"
10032050-37 = "よりによって、お前たちだなんて……"
10032050-38 = "だが、こうなった以上は全力で行かせてもらうぞ！"
10032050-40 = "聞いた？アルちゃん、全力だって。"
10032050-41 = "なんで！？！？"
10032050-42 = "あっちも仕事だからでしょ。"
10032050-48 = "……ん？"
10032050-49 = "待て、そこに居るのは……"
10032050-50 = "[s1] \"サオリ、よく似合ってるね。\"\n[s2] \"今日はここで何をしてるの？\""
10032050-53 = "……なっ。"
10032050-54 = "……先生？"
10032050-55 = "…………？"
10032050-56 = "…………！？！？！？"
10032050-57 = "ど、どうして先生がここに……！？"
10032050-58 = "……え？"
10032050-59 = "わ、私か……？"
10032050-60 = "私は、もちろん仕事で来た……"
10032050-61 = "ここで待機して、有事の際は護衛するよう命令された。"
10032050-62 = "会場で浮かないよう、ドレスまで用意されていてだな……"
10032050-63 = "…………ドレス。"
10032050-67 = "はっ！こ、これは違う！私のものじゃない！"
10032050-68 = "作戦上、必要だからと与えられたもので……！"
10032050-69 = "たしかにデザインは私が選んだが……！#nあくまで仕事のため……！"
10032050-70 = "自分の好みとか、そういうのでは……！#nいや、まぁ……多少は気に入っているが……！"
10032050-71 = "ちちち違う！これは、そう……ドレスコードだ！"
10032050-78 = "……急になんか、挙動不審になってるけど。"
10032050-79 = "そうだね。ちょっとイメージと違うような……"
10032050-80 = "あんな人だったっけ……"
10032050-82 = "そ、そういう先生こそ、どうしてここに……！？"
10032050-83 = "……え？"
10032050-84 = "教材用のBDを作りに来た、だと？連邦生徒会から頼まれて？"
10032050-85 = "そうか……先生も仕事で来ているのか。"
10032050-86 = "ふむ、お互い大変だな。"
10032050-87 = "おい！何ニヤニヤしながら会話なんかしてんだ！？"
10032050-88 = "いいからさっさと私を安全な場所まで案内しろっ！！"
10032050-89 = "ああ……すまない。つい、うっかりしていた。"
10032050-90 = "というわけで、悪いが先生……"
10032050-102 = "……仕事に戻らせてもらう。"
10032050-103 = "依頼人の避難が済んだら、また連絡するとしよう。それじゃ……"
10032050-112 = "……！"
10032050-113 = "…………！"
10032050-115 = "なに、なに？まさかこのまま逃げるつもり？"
10032050-116 = "そんなのって寂しくない？"
10032050-118 = "先生とだけ話して、こっちはシカトするわけ？"
10032050-119 = "ひどいなぁ～私たちだって話たいこと、た～くさんあるのに。"
10032050-120 = "他でもない……"
10032050-121 = "私たちの間柄でね。"
10032050-123 = "便利屋68……"
10032050-124 = "今、お前たちと戦う気は無い。"
10032050-126 = "それはこっちの台詞だね。"
10032050-127 = "一つ提案しよう。"
10032050-128 = "依頼人を置いて行きなさい。そうすれば、私たちも大人しくする。"
10032050-130 = "そう来るか……"
10032050-134 = "……残念だが、その提案は受け入れられない。"
10032050-135 = "こちらも信頼で仕事を請け負っているからな。"
10032050-136 = "与えられた仕事は、何があっても遂行する。そうでなければ次の仕事に繋がらないからな。"
10032050-138 = "…………。"
10032050-139 = "カ……"
10032050-140 = "カッコいい……"
10032050-141 = "感心してどうするのよ、社長。"
10032050-142 = "[s3] \"アルの気持ちも分かるよ。\"\n[s4] \"たしかに、カッコいいよね。\""
10032050-148 = "あ～あ、残念。仕事だから譲れないのは、こっちだって一緒なのにさ～"
10032050-149 = "交渉が決裂したなら……"
10032050-154 = "うあああああぁぁぁぁぁ！！！"
10032050-157 = "……最後までやるしかないよねっ。"
10032050-158 = "……やはり、こうなってしまうのか。"
10032050-159 = "ここは私が食い止めるから、早く走れ。"
10032050-160 = "走れ、だと……？"
10032050-161 = "……私に命令するのか？"
10032050-162 = "依頼主はあなただからな。さあ、走れ。"
10032050-167 = "……早く！！"
10032050-168 = "……！！！！"
10032050-174 = "逃すかっ～！"
10032050-175 = "は、ハルカ、もう大丈夫なの？怪我とか……"
10032050-180 = "アル様の計画を邪魔するなぁぁぁぁぁ！！！"
10032050-192 = "……大丈夫みたいね。"
