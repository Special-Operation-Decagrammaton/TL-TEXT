[translation]
10027010-1 = "第1話;ストライキ宣言"
10027010-4 = "[ns1] \"ララ～仕事ってどうして～溜まっていくんだろう～\"\n[ns2] \"やってもやっても終わるどころか増えるなんて～\"\n[ns3] \"不思議なこともあるもんだ～\""
10027010-14 = "えっと……もしもーし、先生？#nうわ……顔色ヤバいよ。大丈夫？"
10027010-15 = "なんか忙しい感じっぽいし、今日は切るね……ゆっくり休んで……"
10027010-16 = "[s] \"メル、どうしたの？何か一大事？\""
10027010-17 = "わわっ急に大声出さないでよ！#nはぁ？私が人の顔色伺ったら悪いの？そういう時くらいあるわよ。"
10027010-18 = "私を何だと思ってんのよ！私がそんな……"
10027010-19 = "……コホン。とにかく。#nまあ……何も……ないわけじゃ、ないけど……。"
10027010-20 = "相談しようと思ったわけじゃないんだけど……たしかに、何も考えずにシャーレに電話してたかも……"
10027010-21 = "でもほら、先生は忙しそうだし……"
10027010-23 = "[ns] \"すぐ行くよ！待ってて！\""
10027010-26 = "ちょ、ちょっと！？先生！？"
10027010-30 = "レッドウィンター連邦学園・図書館"
10027010-33 = "……すごい行動力だね、先生。"
10027010-34 = "[s] \"何を隠そう、働きたくなかったからね！\""
10027010-35 = "いやそれって、結局自分の首を絞めてるだけじゃ……"
10027010-36 = "まぁ……気持ちは分からないでもないけどさぁ。"
10027010-37 = "私も〆切が近づけば近づくほど、部屋の掃除とか始めちゃったりするし……"
10027010-38 = "って、ちょっと待って。なんで私が自白する流れになってんの、これ？"
10027010-39 = "[s] \"なんかメルの声がいつもと違ったような気がして。\""
10027010-40 = "え、私が……？"
10027010-41 = "そんなに余裕なさそうだった……？#nあちゃー……そっか……"
10027010-42 = "[s] \"そういえば、モミジは？\""
10027010-43 = "あ……。"
10027010-44 = "……。"
10027010-45 = "……先生に電話したのはそれが理由でさ。"
10027010-46 = "……ねえ、先生。"
10027010-47 = "モミジが……図書館から出て行っちゃった。"
10027010-51 = "[ns] \"何があったの？\""
10027010-52 = "それが……"
10027010-61 = "[ns] \"う～ん……それはメルが悪いと思うよ。\""
10027010-62 = "先生までそんなこと言うの！？"
10027010-63 = "いや、私もちょっと言い過ぎたかなって思ったけどさぁ！"
10027010-64 = "でも、感想を聞かれたから、一人のクリエイターとして批評しただけなのに……それってそんなに怒ること？"
10027010-65 = "……時と場合によっては、怒るかも……しれないけど……"
10027010-66 = "そういう意味では、私も反省してなくもないけど……"
10027010-67 = "[s] \"そういうケンカって、よくするの？\""
10027010-68 = "そんなに多くはないけど……たまにあるかな。"
10027010-69 = "モミジと私は好みの方向性が違うし……やっぱそういうのって、「こっち側」では結構重要だからさ。解釈か性癖か合致しないと長続きしないっていうか。"
10027010-70 = "でも、前にケンカした時はすぐに仲直りできたし……今回も大丈夫だと思ったんだけど……"
10027010-71 = "モミジ、電話にも出ないし……"
10027010-72 = "……。"
10027010-73 = "どうしたらいいんだろ……"
10027010-74 = "あんなに怒ったモミジ、初めて見た……図書館を出ていったのも初めてだし……"
10027010-75 = "先生、私……どうしたらいいかな……"
10027010-76 = "[s] \"うーん……まず素直に謝ってみるのはどうかな？\""
10027010-77 = "それで解決できるならこんなことになってないよ！"
10027010-78 = "というか、そもそも……電話にも出ないなら謝りようがなくない？"
10027010-79 = "え？先生はそう思わないって……どうして？"
10027010-80 = "[s4] \"メルからの電話に出ないなら、別の方法もあるし……\"\n[s5] \"それでもだめなら、他の方法を一緒に考えるよ。\""
10027010-83 = "どうにか連絡がついたとしても、謝罪で解決するならこんな事になってないよ。#n創作じゃないんだから……"
10027010-84 = "というか、最近のネット小説だって、そんな都合よく仲直りする展開になったら叩かれちゃうよ！？ご都合主義にも程があるって言われるのに！"
10027010-85 = "[s] \"じゃあ、メルはどうすればモミジが許してくれると思うの？\""
10027010-86 = "言葉だけじゃ足りないと思う……"
10027010-87 = "具体的に、仲直りするための方法は……"
10027010-88 = "……"
10027010-89 = "『ルナ』を……"
10027010-90 = "あれ……？"
10027010-96 = "諸事情で最終巻の22巻は……ちょっと、アレですが……"
10027010-97 = "最終巻がどうして存在しないのかなんて、むしろ私が聞きたいくらいです！！"
10027010-103 = "それだ！"
10027010-104 = "先生！私、いいアイデアが浮かんだ！"
10027010-110 = "[ns] \"何かちょっと不安になってきたので、詳しく聞かせてもらえるかな。\""
10027010-111 = "ほら、私とモミジが揉めたのって『ルナ』が原因じゃない？"
10027010-112 = "モミジが出て行ってから調べたんだけど、『ルナ』って巻を重ねるごとに発行部数が減っちゃったらしくて……最終巻は本当にちょっとしか流通してないみたいなんだよね。"
10027010-113 = "だから、最終巻の22巻は……幻の22巻って呼ばれてるんだとか。"
10027010-114 = "それなら、『ルナ』の最終巻を手に入れてモミジにプレゼントすれば、気持ちも伝わるし仲直りもできるんじゃないかなって！"
10027010-115 = "よし、これだ！この作戦でいこう！"
10027010-116 = "[s6] （そこまでする必要あるかなとは思うけど……）\n[s7] （メルのやりたいようにやらせてあげよう……）"
10027010-119 = "なんで何も言わないのさ、先生……え？いい作戦だと思う？"
10027010-120 = "やっぱり先生は分かってるねぇ！先生に相談してよかった！"
10027010-121 = "ん？幻の本が売ってる場所？知らないよ？"
10027010-122 = "まぁ、別にそんなに重要じゃないでしょ。#nとりあえず、やることが決まったんだからあとは実行するだけ！"
10027010-123 = "さあ、『ルナ』を全巻揃えるための、冒険の始まりだよ！"
10027010-124 = "[s8] \"メルが外に出ようと言い出すなんて……。\"\n[s9] \"メルが偉すぎて、涙が出そう……。\""
10027010-127 = "失礼な！そりゃ、私はインドア派だけどさ……"
10027010-128 = "動かなきゃいけない時くらいは分かってるわよ！"
10027010-129 = "さて、目標が決まったんだから……さっさと行くよ！"
10027010-135 = "古本屋通り"
10027010-137 = "ここも久しぶりだなぁ～！#nうーん！懐かしい空気！"
10027010-138 = "[s] \"ここは……！？\""
10027010-139 = "古本屋通りだよ。私たち「知識解放戦線」はよく来るの。"
10027010-140 = "新品を扱う本屋さんは入れ替わりが激しいからね。#n埋もれた名作を見つけるにはこういうとこがもってこいなんだ。"
10027010-141 = "一度流通したものであれば何でも手に入る可能性があるけど……気をつけてね。"
10027010-142 = "先生みたいな古本初心者にとっては、蟻地獄みたいなところだから……！"
10027010-143 = "[s] \"えっ、そんなに怖いところなの？\""
10027010-144 = "ふっふっふっ……まだピンときてない先生に、業界の闇について説明する時が来たようだね……！"
10027010-145 = "まず、古本には色んなものがあるんだけどさ……中には絶版になってしまってプレミア価格になってるものもあるんだよね。#nそういうのはショーケースに陳列されるんだけど。"
10027010-146 = "そういうのを見たら、初心者ほど買っちゃうんだよね。#nでも、中には別にプレミアがついてないものもショーケースに入って同じような価格で売ってたりもするわけ。"
10027010-147 = "ちゃんと見極める審美眼がないと、引っかかっちゃうんだよね～#n普通の古本以外にも、関係者限定非売品本とかのちょっと世に出たらまずいような本もあったりして……"
10027010-148 = "でも、全部が本物という保証なんてないし……魔窟なんだよね。"
10027010-149 = "なんでそんなものがあるのかって？#nまぁ、世に出ちゃまずい本でも、古紙回収に捨てられて再生紙になるくらいなら、作品のファンに届いた方が良かったりするじゃん？"
10027010-150 = "それに、買わずに眺めるだけなら無害だし……むしろワクワクする！"
10027010-151 = "まぁ、そういうことだから……ここなら『ルナ』の最終巻もあるんじゃないかって踏んだわけ。"
10027010-152 = "私の手をし～っかり握っててね？#nここでは油断するとやられてしまうワイルドな野生なんだから！"
10027010-153 = "[s] \"ワイルドは野生という意味ですよ、メルさん。\""
10027010-154 = "……もう！揚げ足取らない！"
10027010-166 = "[ns] \"あれ、ここは図書館？\""
10027010-167 = "……図書館ごと買い取ったんじゃないかな？"
10027010-168 = "よし！今から探していくよ！『ルナ』の最終巻！"
10027010-174 = "[ns] \"もう3時間くらい探し回ってるけど……なかなか見つからないね……\""
10027010-175 = "発行部数が少ないレア品だからね……そう簡単に見つかるとは思ってないけど、ここまでとは……"
10027010-176 = "この辺は大体見て回ったし……次いこ！次！"
10027010-183 = "ここの裏道を通っていけば……"
10027010-184 = "規模は小さいけど、このお店は本当に古い本しか取り扱ってないんだ。"
10027010-185 = "ここなら……きっと！"
10027010-193 = "[ns] \"どうやら、あたりが外れたようです。メル隊長。\""
10027010-194 = "どうして……？計算は完璧だったはずなのに……？"
10027010-201 = "[ns] \"結局、最初の場所に戻ってきちゃったね。\""
10027010-202 = "あり得ない……こんなに探してるのに手がかり一つ見つからないなんて……"
10027010-203 = "『ルナ』……噂は聞いてたけど……これほどの強敵だったとは……！"
10027010-206 = "あら？聞き覚えのある耳障りな声が聞こえると思ったら……やはり貴女だったんですね、メルリーさん。"
10027010-208 = "この声は！？"
10027010-215 = "ごきげんよう、お久しぶりですわね。"
