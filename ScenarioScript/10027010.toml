[translation]
10027010-1 = "Episódio 1: Declaração de Greve"
10027010-4 = "[ns1] \"Lala~ por que será que o trabalho continua acumulando~\"\n[ns2] \"Não importa o quanto eu faça, em vez de acabar, só aumenta~\"\n[ns3] \"Que coisa mais estranha~\""
10027010-14 = "Ei... alô, Sensei?#nNossa... sua expressão está péssima. Você está bem?"
10027010-15 = "Parece que você está ocupado, então vou desligar por hoje... descanse bastante..."
10027010-16 = "[s] \"Mel, o que houve? Aconteceu algo grave?\""
10027010-17 = "Uau, não precisa gritar de repente!#nHã? E se eu estiver preocupada com a expressão dos outros, tem algum problema? Às vezes eu fico assim."
10027010-18 = "O que você pensa de mim?! Eu não sou do tipo que..."
10027010-19 = "...Cof, cof. Enfim.#nBem... não é como se... não tivesse acontecido nada..."
10027010-20 = "Não é que eu quisesse pedir um conselho... mas é verdade, talvez eu tenha ligado para o Schale sem pensar muito..."
10027010-21 = "Mas veja bem, o Sensei parece ocupado..."
10027010-23 = "[ns] \"Estou indo agora mesmo! Espere por mim!\""
10027010-26 = "Ei, espera aí!? Sensei!?"
10027010-30 = "Academia Red Winter - Biblioteca"
10027010-33 = "...Que iniciativa incrível, Sensei."
10027010-34 = "[s] \"Não vou mentir, é porque eu não queria trabalhar!\""
10027010-35 = "Não, isso acaba sendo um tiro no próprio pé, não é?..."
10027010-36 = "Bem... eu entendo como você se sente."
10027010-37 = "Eu também, quanto mais o prazo final se aproxima, mais eu começo a limpar o quarto..."
10027010-38 = "Espera, um minuto. Por que a conversa virou uma confissão minha?"
10027010-39 = "[s] \"Senti que a voz da Mel estava diferente do habitual.\""
10027010-40 = "Ah, eu estava...?"
10027010-41 = "Eu parecia tão sem saída assim?...#nCaramba... entendi..."
10027010-42 = "[s] \"Falando nisso, onde está a Momiji?\""
10027010-43 = "Ah..."
10027010-44 = "..."
10027010-45 = "...Foi por isso que liguei para o Sensei."
10027010-46 = "...Ei, Sensei."
10027010-47 = "A Momiji... saiu da biblioteca."
10027010-51 = "[ns] \"O que aconteceu?\""
10027010-52 = "É que..."
10027010-61 = "[ns] \"Hum... acho que a culpa é sua, Mel.\""
10027010-62 = "Até você, Sensei, vai dizer isso!?"
10027010-63 = "Não, eu também pensei que talvez tivesse exagerado um pouco, mas!"
10027010-64 = "Mas ela me pediu uma opinião, então, como criadora, eu apenas fiz uma crítica... isso é motivo para ficar tão brava?"
10027010-65 = "...Dependendo da situação, talvez seja motivo para ficar brava... sim..."
10027010-66 = "Nesse sentido, não é como se eu não estivesse arrependida..."
10027010-67 = "[s] \"Vocês costumam brigar assim com frequência?\""
10027010-68 = "Não é tão frequente... mas acontece de vez em quando."
10027010-69 = "A Momiji e eu temos gostos diferentes... e, bem, isso é muito importante para o \"nosso lado\". Se a interpretação ou as preferências não baterem, o relacionamento não dura muito."
10027010-70 = "Mas, da última vez que brigamos, fizemos as pazes rapidamente... achei que desta vez seria igual..."
10027010-71 = "A Momiji não atende nem as minhas ligações..."
10027010-72 = "..."
10027010-73 = "O que eu deveria fazer..."
10027010-74 = "Nunca vi a Momiji tão brava assim... e é a primeira vez que ela sai da biblioteca..."
10027010-75 = "Sensei, o que... o que eu devo fazer..."
10027010-76 = "[s] \"Hum... que tal começar pedindo desculpas sinceramente?\""
10027010-77 = "Se isso resolvesse, não estaríamos nessa situação!"
10027010-78 = "Aliás, para começo de conversa... se ela não atende o telefone, não tem nem como pedir desculpas, tem?"
10027010-79 = "Hã? Você acha que não é bem assim... por quê?"
10027010-80 = "[s4] \"Se ela não atende as ligações da Mel, existem outros métodos...\"\n[s5] \"E se isso não funcionar, pensaremos em outras formas juntos.\""
10027010-83 = "Mesmo que eu conseguisse entrar em contato, se um pedido de desculpas resolvesse tudo, não estaríamos nessa situação. #nNão é uma ficção..."
10027010-84 = "Aliás, até nas novels da internet de hoje em dia, se a história se resolvesse de forma tão conveniente, o autor seria detonado! Diriam que é conveniência demais do roteiro!"
10027010-85 = "[s] \"Então, o que você acha que a Momiji aceitaria como pedido de desculpas, Meru?\""
10027010-86 = "Acho que só palavras não bastam..."
10027010-87 = "Concretamente, uma forma de fazer as pazes..."
10027010-88 = "……"
10027010-89 = "O \"Luna\"..."
10027010-90 = "Ué...?"
10027010-96 = "Por vários motivos, o volume 22, o volume final, é... bem, é complicado..."
10027010-97 = "Eu é que queria saber por que o volume final não existe!!"
10027010-103 = "É isso!"
10027010-104 = "Sensei! Tive uma ideia incrível!"
10027010-110 = "[ns] \"Estou começando a ficar um pouco preocupado, pode me explicar melhor?\""
10027010-111 = "Olha, o motivo da briga entre mim e a Momiji não foi o \"Luna\"?"
10027010-112 = "Eu pesquisei depois que a Momiji saiu, e parece que o número de cópias impressas de \"Luna\" foi diminuindo a cada volume... O volume final teve uma tiragem realmente muito pequena."
10027010-113 = "Por isso, o volume 22 é chamado de... o volume lendário."
10027010-114 = "Então, se eu conseguir o volume final de \"Luna\" e der de presente para a Momiji, acho que meus sentimentos serão transmitidos e poderemos fazer as pazes!"
10027010-115 = "Isso, é isso! Vamos seguir com esse plano!"
10027010-116 = "[s6] (Não sei se precisa de tanto...)\n[s7] (Vou deixar a Meru fazer o que ela quer...)"
10027010-119 = "Por que você não diz nada, Sensei... Hein? Você acha que é um bom plano?"
10027010-120 = "Eu sabia que o Sensei entenderia! Que bom que pedi sua opinião!"
10027010-121 = "Hm? Onde vende o livro lendário? Não faço ideia."
10027010-122 = "Bem, isso não é tão importante, né? #nDe qualquer forma, já decidimos o que fazer, agora é só executar!"
10027010-123 = "Vamos lá, é o início da nossa aventura para completar a coleção de \"Luna\"!"
10027010-124 = "[s8] \"A Meru tomando a iniciativa de sair de casa...\"\n[s9] \"A Meru é tão incrível que estou quase chorando...\""
10027010-127 = "Que falta de educação! Eu sou caseira, sim, mas..."
10027010-128 = "Eu sei muito bem quando é hora de agir!"
10027010-129 = "Bom, o objetivo está definido... vamos logo!"
10027010-135 = "Rua dos Sebos"
10027010-137 = "Faz tempo que não venho aqui também! #nHum! Que ar nostálgico!"
10027010-138 = "[s] \"Onde estamos...?\""
10027010-139 = "Na Rua dos Sebos. Nós da \"Frente de Libertação do Conhecimento\" viemos aqui com frequência."
10027010-140 = "As livrarias de livros novos mudam muito rápido. #nPara encontrar obras-primas esquecidas, lugares assim são perfeitos."
10027010-141 = "Existe a possibilidade de encontrar qualquer coisa que já tenha sido publicada, mas... tome cuidado."
10027010-142 = "Para um iniciante em livros usados como você, Sensei, isso aqui é como uma areia movediça...!"
10027010-143 = "[s] \"Nossa, é um lugar tão perigoso assim?\""
10027010-144 = "Hehehe... parece que chegou a hora de explicar os segredos da indústria para o Sensei, que ainda não entendeu a gravidade da situação...!"
10027010-145 = "Primeiro, existem muitos tipos de livros usados... alguns saíram de catálogo e se tornaram itens de colecionador com preços altíssimos. #nEsses costumam ficar expostos nas vitrines."
10027010-146 = "Quando veem coisas assim, os iniciantes acabam comprando. #nMas, às vezes, colocam livros que não têm valor de colecionador na vitrine pelo mesmo preço."
10027010-147 = "Se você não tiver um olhar crítico para avaliar, acaba caindo em uma armadilha. #nAlém de livros usados comuns, existem até livros que não deveriam ter sido publicados, destinados apenas a pessoas ligadas ao meio..."
10027010-148 = "Mas não há garantia de que tudo seja autêntico... é um verdadeiro covil."
10027010-149 = "Por que essas coisas existem? #nBem, mesmo livros que não deveriam vir a público, é melhor que cheguem aos fãs da obra do que serem descartados para reciclagem, não acha?"
10027010-150 = "Além disso, só olhar sem comprar não faz mal... na verdade, é até empolgante!"
10027010-151 = "Bom, é por isso que... eu apostei que o volume final de \"Luna\" poderia estar aqui."
10027010-152 = "Segure firme na minha mão, viu? #nAqui é um ambiente selvagem onde, se você se descuidar, acaba sendo devorado!"
10027010-153 = "[s] \"'Selvagem' já significa 'natureza selvagem', Meru-san.\""
10027010-154 = "......Ah! Pare de implicar comigo!"
10027010-166 = "[ns] \"Ué, isso aqui é uma biblioteca?\""
10027010-167 = "...Será que eles compraram a biblioteca inteira?"
10027010-168 = "Certo! Vamos começar a procurar! O volume final de \"Luna\"!"
10027010-174 = "[ns] \"Já estamos procurando há umas 3 horas, mas... não estamos encontrando nada...\""
10027010-175 = "É um item raro com poucas cópias impressas... Eu não esperava que fosse fácil de achar, mas não imaginei que seria tão difícil..."
10027010-176 = "Já demos uma olhada por aqui... Vamos para o próximo! Próximo!"
10027010-183 = "Se passarmos por este beco..."
10027010-184 = "É pequeno, mas esta loja só vende livros realmente antigos."
10027010-185 = "Se for aqui... com certeza!"
10027010-193 = "[ns] \"Parece que não tivemos sorte, Capitã Meru.\""
10027010-194 = "Por que...? Meus cálculos estavam perfeitos...?"
10027010-201 = "[ns] \"No fim das contas, acabamos voltando para o lugar onde começamos.\""
10027010-202 = "Não pode ser... Procuramos tanto e não encontramos nem uma pista..."
10027010-203 = "\"Luna\"... Eu já tinha ouvido rumores, mas... não sabia que era um inimigo tão formidável...!"
10027010-206 = "Ora? Achei ter ouvido uma voz irritante que me era familiar... e, de fato, era você, Meru-san."
10027010-208 = "Essa voz é...!"
10027010-215 = "Saudações, faz tempo que não nos vemos."
