[translation]
1007405-1 = "不器用な一面"
1007405-4 = "（沈みゆく夕日を浜辺で眺めていると……）"
1007405-8 = "（後ろから足音が聞こえてきた）"
1007405-9 = "[ns1] \"やあ、ハナコ。\"\n[ns2] \"わざわざ来てもらってごめんね。\""
1007405-12 = "いえ、むしろ急なご連絡だったのに、ありがとうございます。"
1007405-13 = "……隣、失礼しますね。"
1007405-14 = "[ns3] （ものすごく近いような……）\n[ns4] \"さ、流石にこの距離は……\""
1007405-17 = "そんな風に言われると、私も傷ついてしまうのですが……"
1007405-21 = "……ふふ、冗談です。"
1007405-22 = "ですが、大事な生徒の可愛いワガママだと思って、許していただけませんか？"
1007405-23 = "それとも、私は先生にとって、大事な生徒ではないのでしょうか……"
1007405-24 = "……なんて、こう言えば先生は断れないと思っていました。"
1007405-28 = "ふふっ……"
1007405-29 = "ありがとうございます。"
1007405-30 = "……それにしても、こんなに素敵な場所を独り占めしていたなんて。"
1007405-34 = "綺麗ですね……空も、海も、全てが茜色に。"
1007405-35 = "きっと、これも今しか見られない景色なのでしょう。"
1007405-36 = "今回の調査を振り返って……#n皆さんと来られたのは、運に恵まれたからだと思いました。"
1007405-37 = "……自分でセッティングしたのに、ですか？"
1007405-38 = "それはそうなのですが……常にうまくいくとは限りませんし。"
1007405-39 = "望んだ結果を得られるかどうかは、運によるところが大きいですから。"
1007405-40 = "もちろん、今回の件は先生が居てくださったおかげですが……"
1007405-41 = "…………。"
1007405-42 = "えっと……"
1007405-43 = "その……"
1007405-44 = "……先生。"
1007405-45 = "[s5] \"今日は話したいことがあるって聞いたけど……\"\n[s6] \"あれ、照れてるの？\""
1007405-48 = "そ、そんなことは。たしかに、少し顔が熱いですが……"
1007405-49 = "……ふふ。"
1007405-50 = "そういう言い方は、あまり良くないですよ。そんな風に言われたら、言いたいこともうまく言葉にできなくなったりしてしまうのですから。"
1007405-51 = "[s7] \"いつものお返しだよ。\"\n[s8] \"ちゃんと、相手に合わせて言葉を選んでるよ。\""
1007405-54 = "……なるほど。"
1007405-55 = "そうですか……ふむ……。"
1007405-56 = "距離が縮まったのは嬉しいのですが、こういう親しさを求めていたわけでは……"
1007405-57 = "[s9] \"夏だからね。\"\n[s10] \"少しは緊張が[ruby=ほぐ]解[/ruby]れたかな？\""
1007405-58 = "ふふっ……まさか、先生に振り回されるなんて。"
1007405-59 = "……もう。またそうやって……"
1007405-63 = "ふふ。"
1007405-64 = "ふふふっ。"
1007405-65 = "でも、仰るとおりかもしれません。#n私は、こういう時でさえ言葉にできないのですから……"
1007405-66 = "……。"
1007405-67 = "……うーん。"
1007405-68 = "…………そうですね。"
1007405-69 = "[ns] ハナコから話してくれるのを待つ。"
1007405-71 = "……先生。"
1007405-72 = "…………。"
1007405-73 = "……本当に、ありがとうございます。"
1007405-74 = "今回のことも、これまでのことも……もう、何から何まで。"
1007405-75 = "先生がいなければ、今の私は存在しません。"
1007405-76 = "お気づきだとは思いますが……#n私は、周囲の評価ほど器用なタイプではないんです。"
1007405-77 = "今こうやって先生にお話ししているのも、自分の中で抱えているものを吐き出して、楽になりたかったからで……"
1007405-78 = "私のこんな考えも……先生には伝わっていると思うのですが……"
1007405-79 = "感謝の言葉を口にするのも……自分自身でその行為を確認したいからなんだと思います。"
1007405-80 = "ですが……"
1007405-81 = "きちんと言葉にできて、良かったです。"
1007405-82 = "本当に、考えれば考えるほど……"
1007405-83 = "この島に……先生と、みなさんと来られて良かったです。"
1007405-84 = "……私ばかり話してしまいましたね、ごめんなさい。"
1007405-85 = "先生は、どうでしたか……？#n少しでも楽しい時間になっていたら、良いのですが……"
1007405-86 = "[s11] \"もちろん、楽しかったよ。\"\n[s12] \"ハナコの気持ちを聞けて良かった。\""
1007405-89 = "ふふっ……良かったです。"
1007405-90 = "……先生。"
1007405-96 = "これからも、よろしくお願いしますね。"
