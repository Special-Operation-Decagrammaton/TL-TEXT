[translation]
84304300200-5 = "……Algoritmo Big Sister."
84304300200-6 = "Simplificando, é um sistema capaz de rastrear todos os dados e informações existentes no Millennium, bem como suas origens."
84304300200-7 = "……Qual é a diferença?"
84304300200-8 = "O que monitoramos normalmente é o 'movimento dos dados', mas não conseguimos ver os detalhes dos dados ou as informações do usuário."
84304300200-9 = "Por exemplo, se alguém envia uma foto para outro lugar, o 'rastreamento de dados' só consegue identificar o fato de que 'uma foto foi movida'."
84304300200-10 = "Mas, com o Algoritmo Big Sister, é possível saber 'tudo': quem tirou a foto, as informações do dispositivo, o álbum dentro do aparelho, o local da captura, o destinatário e até o conteúdo da mensagem."
84304300200-11 = "Hã……?"
84304300200-12 = "Você tem noção do que está dizendo?"
84304300200-13 = "Sim, eu entendo perfeitamente."
84304300200-14 = "Até pouco tempo atrás, eu…… pensava exatamente assim."
84304300200-16 = "Hum……."
84304300200-17 = "Para começar, eu não tinha planos de usá-lo no futuro. Assim que isso terminar, pretendo destruir o sistema imediatamente."
84304300200-18 = "Na verdade, pode-se dizer que finalmente surgiu uma chance de destruir o sistema. Na minha posição atual, nem eu mesma conseguia chegar perto daquele lugar."
84304300200-19 = "O Algoritmo Big Sister está nas profundezas do centro de dados, em um local que não consta nas plantas."
84304300200-20 = "Se vocês me ajudarem, poderemos destruí-lo. ……É o certo a se fazer."
84304300200-21 = "Por enquanto, sou a única que conhece a existência dele, mas……."
84304300200-22 = "Se, por acaso, ele cair nas mãos de alguém, certamente será um desastre total."
