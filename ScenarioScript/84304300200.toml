[translation]
84304300200-5 = "……ビッグシスターアルゴリズム。"
84304300200-6 = "簡単に言えば、ミレニアムに存在する全データと情報、これらの出どころを追跡できるシステムよ。"
84304300200-7 = "……何が違うんだ？"
84304300200-8 = "普段監視しているのは「データの動き」であって、データの詳細や使用者の情報までは分からない。"
84304300200-9 = "例えば、誰かが写真を他の場所に送ったとして。「データ追跡」は「写真が移動した」という事実のみしか分からないわ。"
84304300200-10 = "けれどそれが、ビッグシスターアルゴリズムなら、写真を撮った人物や端末の情報、端末内のアルバム、撮影場所、送信先の相手やメッセージの内容まで「全て」分かる。"
84304300200-11 = "は……？"
84304300200-12 = "それ、言ってる意味分かってんのか？"
84304300200-13 = "ええ、理解しているわ。"
84304300200-14 = "少し前までの私は……そういう考えだったのだもの。"
84304300200-16 = "ふむ……。"
84304300200-17 = "そもそも、今後使う予定なんてなかったわ。これが終わったら、その場でシステムを破棄するつもりよ。"
84304300200-18 = "むしろ、ようやくシステムを破棄するチャンスが来たとも言い換えられる。今の立場では、私でさえも、あの場所に近づけなかったもの。"
84304300200-19 = "ビッグシスターアルゴリズムはデータセンターの最深部、図面上には存在しない場所にある。"
84304300200-20 = "貴女たちが手伝ってくれれば、破棄できる。……これでいいのよ。"
84304300200-21 = "今はまだ、私だけが知っている存在だけれど……。"
84304300200-22 = "万が一誰かの手に渡れば、間違いなく大惨事になるわ。"
