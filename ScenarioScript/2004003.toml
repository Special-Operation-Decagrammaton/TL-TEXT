[translation]
2004003-1 = "Kyogoku Satsuki está perguntando"
2004003-2 = "（Algum tempo depois do contato de Satsuki...）"
2004003-7 = "Fiz você esperar."
2004003-8 = "[s] \"Olá, Satsuki...\""
2004003-9 = "O escritório do Schale continua apertado como sempre."
2004003-10 = "Se você vier para o Pandemônio, posso transformar a praça inteira em um escritório exclusivo para o Sensei, sabia?"
2004003-11 = "[s1] \"Não, está tudo bem.\"\n[s2] \"Isso soa como um castigo...\""
2004003-14 = "Hum... ainda não pretende ceder?#nBem, eu já estava preparada para uma longa batalha."
2004003-15 = "Eu disse antes, não disse? Que ainda existem outros métodos."
2004003-16 = "Hoje pretendo testar um método diferente."
2004003-17 = "Isso mesmo — a tortura."
2004003-18 = "[s] \"Hã!?\""
2004003-19 = "Ora, ficou surpreso por ser algo tão clichê?"
2004003-20 = "O Schale não faz coisas assim também?"
2004003-21 = "[s] \"Eu não faço esse tipo de coisa assustadora!\""
2004003-22 = "Fufu, mas a nossa tortura é um pouco especial.#nTenho certeza de que será muito eficaz no Sensei também."
2004003-23 = "Vamos, sente-se aqui."
2004003-24 = "[s] \"Não, não! Eu dispenso.\""
2004003-25 = "Dizem que o pessoal bárbaro da Trinity prepara chá com ervas venenosas ou ameaça os outros com motosserras, mas..."
2004003-31 = "Em Gehenna, não fazemos torturas que violem a ética, então pode ficar tranquilo."
2004003-35 = "（Sentei-me na cadeira conforme Satsuki insistiu...）"
2004003-37 = "Então, aqui vai a primeira tortura.#nTalvez o Sensei consiga aguentar... fufufu."
2004003-42 = "（Satsuki pegou minha mão...）"
2004003-43 = "[ns] \"O-o que você vai fazer com as minhas unhas...!?\""
2004003-44 = "......Vamos ver, será que você aguenta?"
2004003-52 = "[ns3] \"Você está... cortando minhas unhas?\"\n[ns4] \"Isso é tortura...?\""
2004003-55 = "Ufufu. Ainda não percebeu?"
2004003-56 = "Se eu cortá-las tão curtas assim..."
2004003-57 = "Você não vai mais poder fazer unhas bonitas, sabia?"
2004003-58 = "[s] \"...!\""
2004003-59 = "Alunos comuns entregam informações logo no primeiro dedo."
2004003-60 = "Será que o Sensei consegue aguentar até onde...? Ufufu...!"
2004003-61 = "Se quiser que eu pare, é só dizer que vai \"cooperar\".#nNão vou parar até que o Sensei diga isso, viu?"
2004003-68 = "......"
2004003-74 = "（No fim, Satsuki cortou todas as minhas unhas）"
2004003-76 = "Você está realmente bem?#nUnhas tão curtas... como consegue aguentar?"
2004003-77 = "[s] \"Obrigado, Satsuki. Eu estava pensando em cortá-las mesmo.\""
2004003-78 = "Como esperado do Sensei... conseguir ficar tão calmo sem nem piscar."
2004003-79 = "Mas eu ainda não vou desistir.#nA próxima é..."
2004003-82 = "Vá se trocar e vista isto."
2004003-83 = "[ns] \"Hm... uma camiseta?\""
2004003-84 = "Sim. Peguei no seu guarda-roupa."
2004003-85 = "Para a tortura de agora, preciso de uma camiseta bem branca."
2004003-88 = "（Troquei de roupa para a camiseta, conforme o desejo de Satsuki）"
2004003-90 = "Ufufu. Esse visual combina bastante com você."
2004003-91 = "Então... agora, coma isto."
2004003-92 = "[s5] \"Isso é...\"\n[s6] \"Curry Udon...?\""
2004003-95 = "Ah! Isso mesmo!#nFinalmente percebeu o quão terrível isso é?"
2004003-96 = "É Curry Udon, um dos três pratos que mais sujam a roupa ao comer!"
2004003-98 = "Não é uma camiseta qualquer! Você vai comer vestindo uma camiseta branca, onde a sujeira aparece mais! E, claro, não tem avental!"
2004003-99 = "E então? Consegue aguentar essa pressão?#nAlunas comuns já estariam sofrendo com um estresse terrível antes mesmo de começar a comer!"
2004003-100 = "Será que o Sensei vai conseguir aguentar!?"
2004003-106 = "[ns] \"Que delícia!\""
2004003-107 = "Começou a comer sem hesitar...?#nIsso é inesperado..."
2004003-108 = "Essa ousadia de não se importar nem com os respingos de curry... Como esperado do Sensei."
2004003-112 = "(Devorou o udon de curry em um instante)"
2004003-114 = "Até essa tortura falhou... Você é alguém impressionante... Fufu."
2004003-115 = "Mas, daqui em diante, eu vou falar sério."
2004003-116 = "Desta vez, eu vou conseguir a sua cooperação, Sensei."
2004003-117 = "[s] \"Entendo...\""
2004003-119 = "(Depois disso, Satsuki tentou várias outras torturas?)"
2004003-120 = "(Mas não senti que nenhuma delas fosse um incômodo...)"
2004003-123 = "A tortura aterrorizante do Departamento de Inteligência do Pandemonium não está funcionando...?"
2004003-124 = "Quem diria que você tinha um mental de aço como esse..."
2004003-125 = "Ufa... Esta é a última tortura."
2004003-126 = "Vamos lá, Sensei. Coloque as mãos para trás para que eu possa amarrá-las."
2004003-127 = "Essa expressão de quem pergunta 'o que você pretende fazer?', hein."
2004003-128 = "Desta vez, o importante é impedir que você use as mãos."
2004003-134 = "Ufufu... Está tudo pronto."
2004003-135 = "Então, dê uma olhada nisso."
2004003-136 = "[ns] \"Isso é... um vídeo engraçado de gatos?\""
2004003-137 = "Ah! Exatamente. Este é um vídeo de destaques com várias cenas de gatos."
2004003-138 = "Ao assistir isso, você acaba sorrindo sem perceber... É um material valioso."
2004003-139 = "Vamos lá, está quase na hora, não é?#nNesta cena clímax..."
2004003-144 = "[ns] \"Ah...! O anúncio...!!\""
2004003-146 = "[ns] \"Minhas mãos estão amarradas e não consigo apertar o botão de pular...!\""
2004003-147 = "Uf, ufufufu! O que me diz!? Se sente impotente, não é!?"
2004003-148 = "Quer apertar o botão de pular, não quer? Está curioso para ver o que vem a seguir, né? Ahahaha!"
2004003-149 = "Este anúncio tem um minuto de duração, sabia?#nE ainda por cima, passa um anúncio a cada 30 segundos!"
2004003-150 = "[s] \"Q-que crueldade...\""
2004003-151 = "É maligno, não é? É aterrorizante, não é!?"
2004003-152 = "Um tempo que parece um pesadelo sem fim... Mas se o Sensei jurar lealdade a nós, posso libertar seus braços! Ufufufu!"
2004003-157 = "..."
2004003-158 = "Ugh... Quem diria que até eu ficaria curiosa com a próxima cena."
2004003-159 = "Eu esqueci que também estava assistindo."
2004003-160 = "Quando esse anúncio vai acabar! Ah, qual é!"
2004003-162 = "(Satsuki se encostou por trás)"
2004003-166 = "[ns7] \"Sa, Satsuki...?\"\n[ns8] \"P-perto demais...\""
2004003-169 = "Ofegante... ofegante...#nQuero apertar...! Odeio anúncios...!!"
2004003-170 = "(A respiração ofegante de Satsuki está batendo no meu pescoço...)"
2004003-175 = "[ns] (E-eu sinto que vou acabar revelando a localização daquela base secreta que nem existe!)"
2004003-179 = "[ns] \"Ah... o anúncio acabou.\""
2004003-182 = "Hmm... Então o rabo do gato fica arrepiado daquele jeito."
2004003-183 = "Essa tortura não serve. Até eu fico curiosa."
2004003-184 = "[ns] (A-ainda bem...)"
2004003-185 = "Sensei... você aguentou bem uma tortura rigorosa. Como esperado."
2004003-186 = "Mas eu também aprendi uma coisa."
2004003-187 = "Fique esperando pela próxima, está bem? Fufufu."
2004003-193 = "[ns] \"Sa, Satsuki!? Pelo menos desamarre essa corda antes...!!\""
2004003-195 = "(No fim, pedi para outra aluna desamarrar a corda...)"
2004003-196 = "(……Parece que outro boato estranho vai se espalhar)"
