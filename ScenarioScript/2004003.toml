[translation]
2004003-1 = "京極サツキは尋ねている"
2004003-2 = "（サツキからの連絡後、しばらくして……）"
2004003-7 = "待たせたわね。"
2004003-8 = "[s] \"こんにちは、サツキ……。\""
2004003-9 = "相変わらずシャーレのオフィスは狭いわね。"
2004003-10 = "[ruby=パンデモニウム・ソサエティー]万魔殿に来てく[/ruby]れるなら、#n広場全体を先生専用のオフィスにしてあげてもいいのよ？"
2004003-11 = "[s1] \"いや、大丈夫。\"\n[s2] \"それは罰ゲームのような……。\""
2004003-14 = "ふうん……まだ応じないつもり？#nまあ、長期戦は覚悟の上だけど。"
2004003-15 = "前に言ったでしょう？まだまだ他にも方法があるって。"
2004003-16 = "今日は別の方法を試すつもりよ。"
2004003-17 = "そう――拷問をね。"
2004003-18 = "[s] \"えっ！？\""
2004003-19 = "あら、あまりにも陳腐すぎて驚いたかしら？"
2004003-20 = "シャーレもよくやっているんじゃないの？"
2004003-21 = "[s] \"そんな怖いことしないよ！？\""
2004003-22 = "ふふっ、でも私たちの拷問は少し特殊よ。#nきっと先生にもよく効くわ。"
2004003-23 = "はい、こちらに座ってちょうだい。"
2004003-24 = "[s] \"いやいや！遠慮するよ。\""
2004003-25 = "野蛮なトリニティは、毒草でお茶を淹れたり、電動ノコギリを突きつけたりするらしいけど……。"
2004003-31 = "ゲヘナではそんな倫理に反した拷問はしないから、安心して頂戴。"
2004003-35 = "（サツキに促されるまま椅子に座ってしまった……）"
2004003-37 = "それじゃあ、一つめの拷問よ。#n先生なら耐えられるかもしれないわね……ふふふっ。"
2004003-42 = "（サツキは私の手を取り……）"
2004003-43 = "[ns] \"わ、わわ私の爪をどうするつもり……！？\""
2004003-44 = "……さあ、耐えられるかしら？"
2004003-52 = "[ns3] \"爪を、切ってる……？\"\n[ns4] \"これが拷問……？\""
2004003-55 = "うふふっ。まだ気付かないの？"
2004003-56 = "こーんなに短く切っちゃったら……"
2004003-57 = "もう可愛いネイルはできないのよ？"
2004003-58 = "[s] \"……！\""
2004003-59 = "普通の生徒なら、人差し指あたりで情報を吐くわ。"
2004003-60 = "果たして先生は、どこまで耐えられるのかしら……？うふふっ……！"
2004003-61 = "これを止めたければ、「協力する」と言うことね。#n先生が言うまで私はやめないわよ？"
2004003-68 = "……。"
2004003-74 = "（結局サツキは全部の爪を切ってくれた）"
2004003-76 = "本当に大丈夫なの？#nこんなに短い爪……耐えられるわけ？"
2004003-77 = "[s] \"ありがとねサツキ。ちょうど切ろうと思ってたんだ。\""
2004003-78 = "さすがは先生ね……瞬きもせず平然としていられるだなんて。"
2004003-79 = "でも私はまだ諦めないわよ。#n次は……。"
2004003-82 = "これに着替えてきて頂戴。"
2004003-83 = "[ns] \"ん……Tシャツ？\""
2004003-84 = "ええ。先生のクローゼットから持ってきたわ。"
2004003-85 = "今回の拷問には、真っ白なTシャツが必要なのよ。"
2004003-88 = "（サツキの希望通りTシャツに着替えてきた）"
2004003-90 = "うふふっ。その格好もなかなか似合うわね。"
2004003-91 = "それじゃあ……今からこれを食べて頂戴。"
2004003-92 = "[s5] \"これは……\"\n[s6] \"カレーうどん……？\""
2004003-95 = "アハッ！そうよ！#nこの恐ろしさにようやく気づいたのかしら？"
2004003-96 = "「食べるときに服を汚してしまう料理トップスリー」に入る、カレーうどんよ！"
2004003-98 = "普通のTシャツじゃないわ！汚れが最も目立つ、真っ白なTシャツを着て食べるのよ！当然、エプロンなどないわ！"
2004003-99 = "どう？このプレッシャー、耐えられる？#n普通の生徒なら食べる前から猛烈なストレスに苦しめられるのよ！"
2004003-100 = "果たして先生はどうかしら！？"
2004003-106 = "[ns] \"おいし～！\""
2004003-107 = "何のためらいもなく食べ始めた……？#nこれは予想外だわ……。"
2004003-108 = "カレーが跳ねることもいとわない、この大胆さ……流石先生ね。"
2004003-112 = "（カレーうどんを一瞬で平らげた）"
2004003-114 = "この拷問も失敗するなんて……大した人ね……ふふ。"
2004003-115 = "でも、ここからの私は本気よ。"
2004003-116 = "今度こそ、先生の協力を取り付けるんだから。"
2004003-117 = "[s] \"なるほど……。\""
2004003-119 = "（その後もサツキから様々な拷問？を試されたが）"
2004003-120 = "（特にどれも苦に感じなかった……）"
2004003-123 = "万魔殿情報部の、恐怖の拷問が効かない……？"
2004003-124 = "これほどまでに鋼のメンタルを持ち合わせていたなんて……。"
2004003-125 = "ふぅ……これで最後の拷問よ。"
2004003-126 = "さあ、先生。手を縛れるよう、両手を後ろに出して頂戴。"
2004003-127 = "何をするつもり？と言わんばかりの表情ね。"
2004003-128 = "今回は手を使えないようにすることが大事なのよ。"
2004003-134 = "うふふっ……準備はできたわ。"
2004003-135 = "それじゃ、これを見て頂戴。"
2004003-136 = "[ns] \"これは……ネコのおもしろ映像？\""
2004003-137 = "アハッ！そう。これはネコのいろんなシーンを集めたハイライト映像よ。"
2004003-138 = "これを見れば知らず知らず笑顔になっている自分がいる……そんな貴重な資料よ。"
2004003-139 = "さあ、そろそろね？#nこのクライマックスシーンで……。"
2004003-144 = "[ns] \"ああっ……！広告が……！！\""
2004003-146 = "[ns] \"手が縛られててスキップボタンが押せない……！\""
2004003-147 = "うふっ、うふふふふっ！どうかしら！！無力でしょう！？"
2004003-148 = "スキップボタンを押したいでしょう？次が気になるでしょう？アハハハッ！"
2004003-149 = "この広告は1分もあるのよ？#nしかも30秒ごとに広告が流れるわ！"
2004003-150 = "[s] \"な、なんて残酷な……。\""
2004003-151 = "悪質でしょう？恐ろしいでしょう！？"
2004003-152 = "終わりの見えない悪夢のような時間……でも先生が私たちに忠誠を誓うのなら、腕を解放してあげてもいいのよ！うふふふっ！"
2004003-157 = "……。"
2004003-158 = "うっ……まさか私まで次のシーンが気になるなんて。"
2004003-159 = "私も一緒に観ているのを失念していたわ。"
2004003-160 = "この広告いつ終わるのよ！もう！"
2004003-162 = "（後ろからサツキがもたれてきた）"
2004003-166 = "[ns7] \"さ、サツキ……？\"\n[ns8] \"ち、近い……。\""
2004003-169 = "ふぅ……ふぅ……。#n押したい……！広告なんてイヤ……！！"
2004003-170 = "（サツキの荒い息が首元にかかっている……）"
2004003-175 = "[ns] （な、なんだか、存在しない秘密基地の場所を言っちゃいたい！）"
2004003-179 = "[ns] \"あ……広告終わっちゃった。\""
2004003-182 = "ふーん……ネコの尻尾ってあんな風に逆立つのね。"
2004003-183 = "この拷問はダメね。私まで気になっちゃうもの。"
2004003-184 = "[ns] （よ、よかった……）"
2004003-185 = "先生……厳しい拷問をよく耐え抜いたわね。さすがだわ。"
2004003-186 = "でも私も学んだことがあるのよ。"
2004003-187 = "次を期待してて頂戴？ふふふっ。"
2004003-193 = "[ns] \"さ、サツキ！？この縄を解いてから…‥！！\""
2004003-195 = "（結局、他の生徒に縄をほどいてもらった…‥）"
2004003-196 = "（……また変な噂が広まりそうだ）"
