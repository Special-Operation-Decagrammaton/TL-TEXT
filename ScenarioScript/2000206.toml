[translation]
2000206-1 = "Queijo na Armadilha"
2000206-2 = "Laboratório da Saya"
2000206-3 = "Quer que eu mostre aquele jogo de tabuleiro que mencionei antes?#nHehe. Espere um pouco, vou pegar agora mesmo."
2000206-6 = "Tcharam! Este é o jogo de tabuleiro especial que eu disse.#nO nome dele é \"Queijo na Armadilha\"!"
2000206-7 = "As regras são simples. Você coloca vários modelos de queijo em cima desta armadilha de plástico e, tomando cuidado para não acioná-la, deve pegar os queijos um por um.#nE então, não é fácil?"
2000206-8 = "Vamos jogar agora, e quem perder vai levar um peteleco!"
2000206-9 = "[s] \"Tudo bem.\""
2000206-11 = "Certo, vou separar a parte do queijo que cabe ao Sensei."
2000206-15 = "……Agora que parei para pensar, as mãos do Sensei são grandes e quentes.#nComo esperado, parece mesmo uma mão de adulto."
2000206-16 = "É fofinha, como se eu estivesse fazendo carinho na barriga do Nezuke……."
2000206-17 = "[s] \"Está fazendo cócegas.\""
2000206-18 = "E-eu sei! É que eu…… estava pensando em outra coisa."
2000206-19 = "B-bem, vamos começar o jogo?"
2000206-21 = "Certo, o Sensei começa."
2000206-22 = "[s] Esquiva da armadilha e pega um modelo de queijo."
2000206-24 = "Hmph…… nada mal. Agora é a minha vez!"
2000206-26 = "Hmm…… tem tanto queijo na armadilha, tantos queijos deliciosos……."
2000206-28 = "Era só um que podia pegar? Não, talvez dois também sirvam……."
2000206-29 = "(BAM)"
2000206-30 = "Ai."
2000206-31 = "[s] \"Desta vez a Saya perdeu.\""
2000206-32 = "Ugh…… eu me descuidei. Fiquei distraída com o queijo por um segundo……."
2000206-33 = "Na próxima eu não perco!"
2000206-35 = "Próxima, começando pelo turno da Saya."
2000206-37 = "Ugh, isso é realmente uma armadilha, mas com tanto queijo assim……."
2000206-40 = "(BAM)"
2000206-41 = "Ai!"
2000206-42 = "[s] \"A Saya perdeu de novo.\""
2000206-43 = "Ugh, isso é injusto para mim!#nPor que tinha que ser logo um jogo que envolve pegar queijos?"
2000206-44 = "E-eu sei que fui eu quem escolheu o jogo, mas……#npedir para eu resistir ao queijo é cruel demais!"
2000206-45 = "……O quê? Você diz que, como eu sou um gênio, consigo afastar a tentação do queijo?"
2000206-46 = "Hahaha! Isso é óbvio.#nObserve! Desta vez eu vou ganhar! Mais uma vez!"
2000206-48 = "Próxima, começando pelo turno da Saya novamente."
2000206-50 = "……Aquilo é um modelo, um modelo que não dá para comer……."
2000206-52 = "Mas ao ver aquele amarelo vibrante e essa textura que parece macia, ugh……."
2000206-53 = "(BAM)"
2000206-54 = "Uau!"
