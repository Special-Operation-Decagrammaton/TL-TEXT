[translation]
2000206-1 = "チーズ・イン・ザ・トラップ"
2000206-2 = "サヤの研究室"
2000206-3 = "この前言ってたボードゲームを見せてほしいって？#nふっふっふっ。待つのだ、すぐに出してあげるから。"
2000206-6 = "じゃーん！これがぼく様が言った特製ボードゲームなのだ。#nその名も「チーズ・イン・ザ・トラップ」！"
2000206-7 = "ルールは簡単。このプラスチックの罠の上にチーズの模型をたくさん乗せておいて、罠に引っかからないように気を付けながら、チーズを一つずつ取ってくればいいのだ。#nどう、簡単だろう？"
2000206-8 = "今からこれで一緒に遊ぼう、ゲームに負けた方はデコピンなのだ！"
2000206-9 = "[s] \"いいよ。\""
2000206-11 = "さあ、先生の分のチーズを分けてあげる。"
2000206-15 = "……今更だけど、先生の手は大きくて暖かいのだ。#nさすが、大人の手って感じがする。"
2000206-16 = "ネズ助のお腹を撫でてるみたいにふかふかで……。"
2000206-17 = "[s] \"くすぐったい。\""
2000206-18 = "わ、わ、分かってるのだ！ぼく様ったら……ちょっと違うことを考えてたのだ。"
2000206-19 = "じゃ、じゃあゲームを始めてみようか？"
2000206-21 = "さあ、先生から始めて。"
2000206-22 = "[s] 罠をかいくぐってチーズ模型を一つ取る。"
2000206-24 = "へえ……やるのだ。では今度はぼく様の番ね！"
2000206-26 = "うーん……罠にチーズがいっぱい、美味しそうなチーズがいっぱい……。"
2000206-28 = "取るのは一つだけだっけ？いや、二つでもいいかも……。"
2000206-29 = "（バタンッ）"
2000206-30 = "はうっ。"
2000206-31 = "[s] \"今回はサヤの負けだね。\""
2000206-32 = "うう……油断したのだ。一瞬チーズに気を取られて……。"
2000206-33 = "次は負けないのだ！"
2000206-35 = "次、サヤのターンから。"
2000206-37 = "うう、これは確かに罠なのだ、でもこんなにチーズがいっぱいあるのに……。"
2000206-40 = "（バタンッ）"
2000206-41 = "はうっ！"
2000206-42 = "[s] \"またサヤの負け。\""
2000206-43 = "ううっ、これはぼく様に不利なのだ！#nどうしてよりによってチーズを持ってくるゲームなのだ？"
2000206-44 = "も、もちろんぼく様が選んだゲームではあるけど……#nぼく様にチーズを我慢しろなんて、これはあまりにも過酷すぎるのだ！"
2000206-45 = "……なに？天才であるぼく様ならチーズの誘惑も追い払えるって？"
2000206-46 = "はっはっは！それは当たり前なのだ。#n見てて！今度こそ勝って見せるから！もう一回！"
2000206-48 = "次、再びサヤのターンから。"
2000206-50 = "……あれは模型、食べられない模型なのだ……。"
2000206-52 = "でもあの色鮮やかな黄色と柔らかそうな質感を見ていると、うう……。"
2000206-53 = "（バタンッ）"
2000206-54 = "うわっ！"
