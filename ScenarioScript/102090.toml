[translation]
102090-1 = "Episódio 9;2º Sanctum \"Zona Isolada nos Arredores de Millennium\""
102090-2 = "Vamos iniciar a captura do 2º Sanctum.#nEquipe de defesa, preparadas?"
102090-3 = "Preparação concluída."
102090-4 = "Meu papel é dar suporte na retaguarda pra senpai Tsurugi.#nEmbora, sinceramente, pareça que ela dá conta sozinha… mas estamos prontas."
102090-8 = "OK. E a equipe de paraquedas?"
102090-10 = "Sim, conseguimos infiltrar pelo duto há pouco."
102090-11 = "Agora estamos avançando rumo ao centro da fábrica militar."
102090-12 = "Ahaha! Fazia tempo que eu não saltava de paraquedas, foi divertido~!"
102090-14 = "Aqui já tá tudo pronto. Bora começar logo essa coisa!"
102090-15 = "Uhum. Relembrando o plano mais uma vez――enquanto a equipe de defesa segura o avanço inimigo, a equipe de paraquedas invade o centro da fábrica militar."
102090-16 = "Quando o inimigo for pego de surpresa, o sistema defensivo deles deve entrar em caos…#nAí então a equipe de defesa invade o local."
102090-17 = "Então… operação iniciada!#nNos vemos em frente ao Chesed, pessoal."