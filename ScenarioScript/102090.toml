[translation]
102090-1 = "Episódio 9; 2º Santuário “Área fechada nos arredores do Millennium”"
102090-2 = "Vamos começar a conquistar o 2º Santuário. #nDefense Force, você está pronto?"
102090-3 = "Preparar."
102090-4 = "Sou o apoio logístico do Tsurugi-senpai. #nBem, sinto que ficarei bem com apenas um veterano... mas estou pronto."
102090-8 = "OK. E os pára-quedistas?"
102090-10 = "Sim, consegui entrar furtivamente pelo duto mais cedo."
102090-11 = "Estamos agora a dirigir-nos para o coração da fábrica de munições."
102090-12 = "Ahaha! Pára-quedismo foi divertido pela primeira vez em muito tempo!"
102090-14 = "Você pode ir aqui a qualquer hora. Agora vamos começar!"
102090-15 = "Sim. Confirmando mais uma vez os detalhes da operação: enquanto as forças de defesa impedem o avanço do inimigo, os pára-quedistas atacam o centro da fábrica de munições."
102090-16 = "Se você fizer isso, acho que o sistema de defesa do inimigo ficará confuso com o ataque surpresa...#nDepois disso, a força de defesa invadirá o interior."
102090-17 = "Pois bem... a operação começa! #nPessoal, vejo vocês na frente de Kesedo novamente."
