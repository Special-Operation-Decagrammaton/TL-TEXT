[translation]
102090-1 = "第9話;第2サンクトゥム「ミレニアム郊外の閉鎖地域」"
102090-2 = "第2サンクトゥムの攻略、始めるよ。#n防衛隊、準備できた？"
102090-3 = "準備完了。"
102090-4 = "私はツルギ先輩の後方支援っすね。#nまぁ、先輩一人でも大丈夫な気はしますが……準備おっけーっす。"
102090-8 = "OK。パラシュート隊はどう？"
102090-10 = "はい、先ほどダクトから潜入できました。"
102090-11 = "今は軍需工場の中心部に向かっている。"
102090-12 = "あははっ！パラシュート、久々で楽しかったね～！"
102090-14 = "こっちはいつでも行けるぞ。さあ、とっとと始めようぜ！"
102090-15 = "うん。改めて、作戦内容の確認――防衛隊が敵の進行を食い止めている間に、パラシュート隊が軍需工場の中心部に攻め込む。"
102090-16 = "そうしたら、奇襲を受けた敵の防衛体制が混乱すると思うから……#nその後、防衛隊は中に侵入するよ。"
102090-17 = "それじゃ……作戦開始！#nみんな、ケセド前でまた。"
