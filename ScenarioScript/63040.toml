[translation]
63040-1 = "Episódio 4: Sangue Real"
63040-2 = "Sangue Real."
63040-3 = "Sangue especial, linhagem especial."
63040-4 = "Pensando bem, desde muito tempo, várias pessoas me colocaram em um pedestal."
63040-5 = "Mas... não havia um significado real nisso."
63040-6 = "Não importa o quão especial eu fosse, eu acabava passando pelas mesmas situações terríveis."
63040-7 = "Pelo contrário, as coisas que eu não podia fazer e as que eu não podia dizer só aumentavam."
63040-9 = "Obrigada, Sa-chan."
63040-10 = "Foi porque você estava lá que eu consegui suportar."
63040-12 = "Obrigada, Professor [USERNAME]."
63040-13 = "Sinto que, ao conhecer você, finalmente pude me tornar eu mesma."
63040-15 = "Misaki também, e Hiyori também."
63040-16 = "Se não fosse por todos vocês, eu seria apenas uma boneca que não fala, ou um sacrifício..."
63040-17 = "Teria vivido a vida toda como um símbolo de alguém ou de algo, não é?"
63040-19 = "Será que você se enganou ao entrar em contato com os ritos secretos de Arius?"
63040-20 = "Aquilo que dorme nesta terra. Só porque você se aproximou da resposta, achou que podia fazer qualquer coisa?"
63040-24 = "— Que pena."
63040-25 = "Eu já sabia desse tipo de coisa há muito tempo."
63040-26 = "Mas, graças ao veterano, pude confirmar uma coisa."
63040-27 = "O anjo do apocalipse. Ou melhor, aquele fenômeno... foi o veterano quem o causou."
63040-28 = "E, no início, sem nem perceber. Em certo sentido, pode-se dizer que você o invocou."
63040-29 = "Pode ser algo indesejado para você, mas..."
63040-30 = "Aquilo não é um dos 'sete anjos tocadores de trombeta' descritos nas escrituras."
63040-31 = "Mas, sabe, havia a possibilidade de sublimação. Era uma existência que poderia se tornar real."
63040-32 = "Se o veterano pudesse ter sido um juiz perfeito e impecável, é claro."
63040-33 = "Um... 'juiz' perfeito e impecável?"
63040-34 = "Como eu disse várias vezes, o veterano não é o único Arius."
63040-35 = "O veterano não é o único que conhece os ritos secretos de Arius."
63040-36 = "Mesmo que tenha sido a primeira vez que o veterano soube disso, para mim, eram coisas que eu 'precisava saber'."
63040-37 = "É que era proibido falar sobre isso. ...Isso ainda não mudou, aliás."
63040-38 = "— É assim que funciona o Sangue Real de Arius."
63040-39 = "Mas, deixe-me agradecer."
63040-40 = "Graças ao que o veterano revelou, finalmente pude falar sobre isso."
63040-41 = "Fufu, saber de algo sozinha... e não poder contar a ninguém é muito doloroso."
63040-42 = "[ns] \"Quer dizer... o que isso significa...?\""
63040-43 = "Aquele anjo... não, algo parecido com um anjo."
63040-46 = "Aquilo é um 'fenômeno' onde todos os sentimentos acumulados em Arius ganharam forma."
63040-47 = "Eu te contei antes, não contei? Que Arius se tornou uma terra onde 'algo' acontece."
63040-49 = "[ns] \"Ah...!\""
63040-51 = "Aqui, originalmente, havia 'algo'."
63040-52 = "Raiva, lamento, ressentimento, desespero, resignação... esses pensamentos se acumularam e se reuniram aqui."
63040-54 = "Se Arius desejava a destruição do mundo, você pergunta?"
63040-57 = "Exatamente."
63040-61 = "Existe uma história sobre uma criança que não recebeu calor e queimou a vila para tentar obtê-lo, afinal."
63040-62 = "Para alguém que não tem nada a perder... o fim do mundo pode ser uma 'salvação'."
63040-64 = "[ns1] \"O que você quis dizer com a possibilidade de sublimação?\"\n[ns2] \"Você disse que seria possível se fosse um juiz perfeito e impecável.\""
63040-67 = "É verdade. O que se acumulou em Arius era 'algo' suficiente para levar a esse resultado."
63040-68 = "...Pelo menos, era o suficiente para devolver 'algum tipo de retribuição' a Trinity."
63040-69 = "Mas isso é no caso de o veterano Subaru ser 'perfeito e impecável'."
63040-70 = "Ou seja, faltava alguma coisa?"
63040-71 = "Sim."
63040-72 = "Essa é essa criança."
63040-73 = "Ah...!"
63040-77 = "Eu... eu..."
63040-78 = "Parece que finalmente entendeu."
63040-79 = "No momento em que você 'descartou' essa criança... suas ações perderam a legitimidade, veterano."
63040-80 = "Se você tivesse usado a si mesmo como um meio para construir esse fenômeno, talvez ainda estivesse tudo bem."
63040-81 = "Mas você, veterano, tentou se tornar o 'Anjo Trompetista'."
63040-82 = "Eu entendo como se sente. Não só você, mas todos que ficaram em Arius... de uma forma ou de outra, todos queriam ser juízes."
63040-83 = "Mas sabe..."
63040-84 = "Um juiz, por natureza... precisa ser perfeito e impecável."
63040-85 = "'Você cairá na armadilha que você mesmo preparou'."
63040-86 = "Sendo você, veterano... deve se lembrar desse trecho das escrituras, não é?"
63040-87 = "Se pelo menos Maia não tivesse recorrido a nós... ao Sensei."
63040-88 = "Talvez você ainda pudesse ter se tornado um juiz."
63040-91 = "Por favor... não me abandone!"
63040-103 = "Ah..."
63040-104 = "Ah... ah..."
63040-106 = "Subaru?"
63040-107 = "Ouvi uma voz fraca. Será que...!"
63040-108 = "..."
63040-116 = "Hi-Hiyori-san...?"
63040-117 = "S-se você tem algo a dizer... precisa dizer."
63040-121 = "N-nós viemos até aqui porque queríamos conversar direito, não foi?"
63040-123 = "..."
63040-127 = "...É verdade. Hiyori-san... obrigado."
63040-130 = "Ei, veterano...?#nSabe, eu sempre quis te dizer uma coisa. Desde aquela época, sempre..."
63040-132 = "Está tudo bem, veterano."
63040-133 = "Tudo... vai ficar bem."
63040-134 = "...!"
63040-135 = "Ah, não, talvez não tudo... mas mesmo assim, eu acredito em você, veterano."
63040-136 = "Em você, em todos do esquadrão. Em todos de Arius."
63040-137 = "E também no Sensei [USERNAME].#nEu amo todos vocês."
63040-138 = "Eu ainda quero que Arius continue existindo."
63040-139 = "E que... Arius se transforme em uma escola melhor."
63040-140 = "P-por isso...!"
63040-144 = "Inspira... expira...#nInspira...!!"
63040-145 = "Me ajude, veterano!!!!"
63040-147 = "...!"
63040-148 = "Eu... eu realmente amo a sua gaita, veterano!!!"
63040-150 = "Próximo episódio: A gaita daquele dia"
