[translation]
80000009-1 = "チョコレート大食い大会"
80000009-2 = "ゲヘナ学園・学生食堂"
80000009-3 = "先生、あのお話聞きましたか？"
80000009-4 = "今年のバレンタインデーはセントラル商店街で、新しい大食い大会があるそうです。"
80000009-5 = "対決種目はやはり……「チョコレート」とのことで！"
80000009-6 = "チョコレートクリームのパンや、ケーキの大食い対決は経験がありますが、純粋なチョコレートの大食い大会は初めてなので、ちょっと緊張しちゃいます。"
80000009-7 = "市販のチョコレートは強い甘みとたくさん入っているバターのせいで、すぐに満腹感が生まれてしまうんです。"
80000009-8 = "ですから今日は大会に先んじて、この食堂でチョコレートの大食いを練習しようと思います☆"
80000009-9 = "[s] \"もしかしてこれ、私も食べるパターン？\""
80000009-10 = "もちろんです。大食い大会は他の人と食べることを競い合うもの。一人でたくさん食べても練習にはなりません。"
80000009-11 = "それに、食事はいつだって一人で食べるより、みんなで分け合ったほうが楽しいものでしょう？"
80000009-12 = "ですからこうやって……"
80000009-17 = "大量の板チョコをご用意してみました！"
80000009-18 = "[s] \"この量を二人で！？\""
80000009-19 = "いえいえ、これは先生ひとり分です。"
80000009-20 = "私の分はまた別で用意しているので、安心してください☆"
80000009-21 = "[s] \"いくら何でもこの量は……。\""
80000009-22 = "先生は大人でしょう？始める前から弱音なんてダメですよ。"
80000009-23 = "もし先生がこのチョコレートを全部召し上がることができたら、賞品として私が先生のお願いを何でも一つ聞いてあげます。"
80000009-24 = "なので、頑張ってくださいね♥"
80000009-25 = "さあ、では今からふたりの「チョコレート大食い大会」練習編、スタートです！"
80000009-27 = "（しかしアカリが用意した板チョコは、半分も食べることができなかった。）"
80000009-28 = "（残ったチョコはシャーレに持って帰ってきたので……少しずつ食べようと思う。）"
