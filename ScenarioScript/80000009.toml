[translation]
80000009-1 = "Competição de Comer Chocolate"
80000009-2 = "Academia Gehenna - Refeitório Estudantil"
80000009-3 = "Sensei, você ouviu aquela história?"
80000009-4 = "Dizem que, neste Dia dos Namorados, haverá uma nova competição de comer muito no Distrito Comercial Central."
80000009-5 = "E a categoria do desafio é, obviamente... 'Chocolate'!"
80000009-6 = "Já participei de competições de comer pães com creme de chocolate e bolos, mas é a primeira vez que vejo uma competição focada puramente em chocolate, então estou um pouco nervosa."
80000009-7 = "O chocolate comercial tem um dulçor intenso e muita manteiga, o que faz com que a gente se sinta satisfeita muito rápido."
80000009-8 = "Por isso, hoje, antes da competição, decidi praticar comendo chocolate aqui no refeitório☆"
80000009-9 = "[s] \"Será que isso significa que eu também vou ter que comer?\""
80000009-10 = "Com certeza. Uma competição de comer muito é sobre disputar com outras pessoas. Comer muito sozinha não serve como treino."
80000009-11 = "Além disso, as refeições são sempre mais divertidas quando compartilhadas com os outros do que quando comemos sozinhos, não é?"
80000009-12 = "Então, é por isso que..."
80000009-17 = "Preparei uma grande quantidade de barras de chocolate!"
80000009-18 = "[s] \"Toda essa quantidade para nós dois!?\""
80000009-19 = "Não, não, isso é só a porção do Sensei."
80000009-20 = "A minha porção já está preparada separadamente, então pode ficar tranquilo☆"
80000009-21 = "[s] \"Isso é muita coisa, não importa como você olhe...\""
80000009-22 = "Sensei, você é um adulto, não é? Nada de reclamar antes mesmo de começar."
80000009-23 = "Se o Sensei conseguir comer todo esse chocolate, como prêmio, eu atenderei qualquer pedido que você tiver."
80000009-24 = "Então, dê o seu melhor, tá bom?♥"
80000009-25 = "Muito bem, agora vamos começar a nossa 'Competição de Comer Chocolate', versão treino!"
80000009-27 = "(No entanto, não consegui comer nem metade das barras de chocolate que a Akari preparou.)"
80000009-28 = "(Como trouxe o chocolate que sobrou para o Schale... acho que vou comendo aos poucos.)"
