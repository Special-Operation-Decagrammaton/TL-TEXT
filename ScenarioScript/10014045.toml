[translation]
10014045-5 = "こいつ、威勢の割には大したことなかったわね。"
10014045-6 = "もう床に伸びちゃってるけど……もしかして気絶しちゃった？"
10014045-7 = "こ、こっちは4人だし……先生もいますから……"
10014045-8 = "そうね。#nまったく、一体なんなのよコレ……"
10014045-9 = "やはり素晴らしい、誰も私たちを止められない！！#nこの勢いで周辺を占拠するのだ！！"
10014045-10 = "キャス……"
10014045-11 = "キャスパ……"
10014045-12 = "……キャスパリーグ、でしょ。"
10014045-14 = "い、いや。さすがにそれは違うと思うけど……"
10014045-18 = "ねぇ……ちょっと……"
10014045-19 = "お願いだから、もうやめて。"
10014045-20 = "[s1] \"その……みんな、カズサを理解しようとしてるんだと思う。\"\n[s2] \"やり方はどうかとは思うけどね。\""
10014045-21 = "はぁ……またそんな風に言って……"
10014045-22 = "はぁ……またそんな風に言って……"
10014045-26 = "……いや、もう我慢できない。"
10014045-27 = "先生には申し訳ないけど、これ以上は黙ってられない。#n言いたいことは言わせて。"
10014045-28 = "……あのさ。"
10014045-29 = "もう、こんな馬鹿なことはやめて。#nお願いだから。"
10014045-35 = "ただでさえ、あの馬鹿のせいで大変なのに。#nこれ以上面倒を増やさないで。"
10014045-36 = "……！"
10014045-37 = "……！？"
10014045-38 = "カ、カズサちゃん！？#n私たちは、ただ……！"
10014045-39 = "私達を関わらせたくないのならもう遅いよ。"
10014045-40 = "だって私たちは同じ船に乗ることにした……"
10014045-41 = "ちょっと、まずはカズサの話を聞こうよ。#n言い訳は後でいいでしょ！"
10014045-42 = "……はい。"
10014045-46 = "はぁ……ありがとう、ヨシミ。#nあんたに感謝する日が来るなんてね。"
10014045-47 = "どうしてこんな事したのかはなんとなく分かるし、その気持ちはありがたいけど。#n……もうやめて。"
10014045-48 = "理解しようとしてくれる気持ちは嬉しいんだけどさ。#n私、そんな事頼んだっけ。"
10014045-49 = "今まで言ってなかった理由を考えて。"
10014045-50 = "そ、それは……。"
10014045-51 = "……この際だからハッキリ言っておくけど。"
10014045-52 = "私にとっては、全部忘れたい事なの。"
10014045-53 = "空気悪くしてごめん。そういうことだから、今後は触れないで。#n私も今回の事は見なかったことにするから。"
10014045-54 = "それに、あいつも……"
10014045-55 = "……いいや。#nちょっと疲れた……ごめん、詳しいことは後でまた。"
10014045-56 = "じゃあ……。"
10014045-60 = "カズサちゃん……。"
10014045-61 = "……うーん。"
10014045-62 = "……。"
10014045-66 = "……？"
10014045-67 = "あ、起きた。"
10014045-73 = "…………。"
10014045-74 = "……いえ……起きたのではなく……。"
10014045-75 = "[s] \"……聞いてたんだね。\""
10014045-76 = "……あちゃー。"
10014045-77 = "さっきの言葉を全部聞いたのだな……ううむ、ちょっと困ったね。"
10014045-78 = "えっ？#nナツちゃん、それってどういうこと……？"
10014045-82 = "…………。"
10014045-89 = "え……あれ……？"
10014045-90 = "あの……？"
10014045-96 = "……アイリ。"
10014045-97 = "……？"
10014045-98 = "……うん、今は……"
10014045-100 = "……一人にしてあげた方がよさそうだね。"
