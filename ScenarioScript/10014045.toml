[translation]
10014045-5 = "Esse aí não era grande coisa, apesar de toda a pose."
10014045-6 = "Já está estirado no chão... será que desmaiou?"
10014045-7 = "B-bem, estamos em quatro... e o Sensei também está aqui..."
10014045-8 = "É verdade. #nMas que droga, o que é que está acontecendo aqui..."
10014045-9 = "Incrível como esperado, ninguém pode nos parar!! #nVamos aproveitar o embalo e ocupar os arredores!!"
10014045-10 = "Cas..."
10014045-11 = "Caspa..."
10014045-12 = "...Cait Sith, né?"
10014045-14 = "N-não. Acho que não é bem isso, mas..."
10014045-18 = "Ei... espera aí..."
10014045-19 = "Por favor, parem com isso agora."
10014045-20 = "[s1] \"Eu acho que... todo mundo só está tentando entender a Kazusa.\" \n[s2] \"Embora eu ache que o método não seja o melhor.\""
10014045-21 = "Ah... lá vem você falando desse jeito de novo..."
10014045-22 = "Ah... lá vem você falando desse jeito de novo..."
10014045-26 = "...Não, eu não aguento mais."
10014045-27 = "Desculpe, Sensei, mas não posso mais ficar calada. #nDeixem-me dizer o que preciso dizer."
10014045-28 = "...Escutem."
10014045-29 = "Parem com essa idiotice agora. #nPor favor."
10014045-35 = "Já é difícil o suficiente por causa daquele idiota. #nNão me tragam mais problemas."
10014045-36 = "...!"
10014045-37 = "...!?"
10014045-38 = "K-Kazusa-chan!? #nNós só estávamos...!"
10014045-39 = "Se vocês não queriam se envolver, já é tarde demais."
10014045-40 = "Porque nós decidimos entrar no mesmo barco..."
10014045-41 = "Ei, vamos ouvir a Kazusa primeiro. #nPodemos deixar as desculpas para depois!"
10014045-42 = "...Sim."
10014045-46 = "Ah... obrigada, Yoshimi. #nQuem diria que chegaria o dia em que eu te agradeceria."
10014045-47 = "Eu entendo mais ou menos por que vocês fizeram isso, e agradeço a intenção, mas... #n...parem com isso."
10014045-48 = "Fico feliz que queiram me entender, mas... #nEu pedi para fazerem isso?"
10014045-49 = "Pensem no motivo pelo qual eu não contei até agora."
10014045-50 = "I-isso é..."
10014045-51 = "...Já que estamos falando disso, vou ser clara."
10014045-52 = "Para mim, é algo que eu quero esquecer completamente."
10014045-53 = "Desculpe pelo clima pesado. É isso, então não toquem mais no assunto. #nEu também vou fingir que não vi nada disso."
10014045-54 = "Além disso, ele também..."
10014045-55 = "...Não, esquece. #nEstou um pouco cansada... desculpe, explico os detalhes depois."
10014045-56 = "Então..."
10014045-60 = "Kazusa-chan..."
10014045-61 = "...Hmm."
10014045-62 = "..."
10014045-66 = "...?"
10014045-67 = "Ah, ele acordou."
10014045-73 = "............"
10014045-74 = "...Não... ele não acordou..."
10014045-75 = "[s] \"...Ele estava ouvindo, não estava?\""
10014045-76 = "...Puxa vida."
10014045-77 = "Ele ouviu tudo o que foi dito agora há pouco... hum, isso é um problema."
10014045-78 = "Hã? #nNatsu-chan, o que você quer dizer com isso...?"
10014045-82 = "............"
10014045-89 = "Hã... o quê...?"
10014045-90 = "Hum...?"
10014045-96 = "...Airi."
10014045-97 = "...?"
10014045-98 = "...Sim, agora..."
10014045-100 = "...Parece que é melhor deixá-la sozinha."
