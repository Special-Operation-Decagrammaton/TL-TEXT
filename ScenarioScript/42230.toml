[translation]
42230-1 = "Episódio 23: O Golpe Fracassado"
42230-4 = "Gabinete da Presidente Interina do Conselho Estudantil Geral"
42230-6 = "Fufu... O aroma de um Esmeralda, bebido após um brunch tardio, é realmente excepcional."
42230-7 = "Por ser um grão de café valioso, tive um pouco de dificuldade para conseguir, mas... como uma xícara para comemorar o dia de hoje, esse luxo é justificável."
42230-11 = "Muito bem. Já está na hora da notícia sobre a explosão da Estação Coelhinho ir ao ar..."
42230-18 = "Sim, aqui é Shiranui Kaya, Presidente Interina do Conselho Estudantil Geral."
42230-19 = "Ah, General. Que bom que atendeu."
42230-20 = "O caso da Estação Coelhinho foi concluído com sucesso?"
42230-24 = "...Sim? O FOX Squad falhou na missão...?"
42230-25 = "E além disso, o RABBIT Squad armado está indo em direção ao Conselho Estudantil Geral junto com o Sensei do Schale...?"
42230-26 = "O-o que isso significa? Explique-me novamente."
42230-30 = "Não conseguiram parar os membros da SRT comandados pelo Sensei? #nO-o que exatamente você está dizendo..."
42230-37 = "Eu lhes dei dinheiro, não dei...?"
42230-39 = "Deveriam ter parado eles a qualquer custo!"
42230-51 = "RABBIT 1, chegamos aos trilhos da linha ascendente."
42230-52 = "RABBIT 2, busca no local concluída. Nenhuma outra ameaça encontrada."
42230-54 = "RABBIT 3, acabei de informar a Academia Ferroviária Highlander sobre o acidente e bloqueei a linha que vai para o prédio do Conselho Estudantil Geral."
42230-55 = "A ferrovia não vai se mover pela próxima hora, então podem seguir em frente sem preocupações!"
42230-56 = "Entendido."
42230-57 = "RABBIT 2, RABBIT 4. Existe a possibilidade de o alvo fugir, então vamos invadir o prédio do Conselho Estudantil Geral imediatamente!"
42230-59 = "C-certo...!"
42230-60 = "Deixa comigo!"
42230-66 = "Parece que as raposas da SRT foram derrotadas..."
42230-67 = "Serem derrotadas por garotinhas que nem receberam treinamento adequado... que vergonha para uma força especial."
42230-73 = "Ainda bem que deixei a SOF da Kaiser de prontidão aqui."
42230-74 = "Originalmente, era uma carta na manga para lidar com as raposas, mas cumprirá seu papel perfeitamente contra as coelhas também."
42230-76 = "Eu não sou como aqueles idiotas que baixam a guarda e falham――"
42230-90 = "Tango, abatido!"
42230-95 = "Entendido, vamos continuar avançando."
42230-100 = "D-desculpe...!"
42230-110 = "[ns] \"Desculpe, vou passar na frente.\" "
42230-114 = "O que esses caras pensam que são..."
42230-115 = "Tem um limite para o quanto podem zombar dos outros..."
42230-116 = "...Eu nunca vou perdoar vocês, SRT!"
