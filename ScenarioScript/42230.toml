[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42230-1 = "Episódio 23;O Fim do Golpe"
42230-4 = "Escritório da Presidência Interina do Conselho Estudantil Geral"
42230-6 = "Fufu…… O aroma do café Esmeralda após desfrutar de um brunch tardio é, indiscutivelmente, espetacular."
42230-7 = "Por serem grãos de uma safra incrivelmente rara, deu um pouco de dor de cabeça para contrabandear…… mas, como uma xícara para brindar o dia da minha consagração absoluta, um pouco de luxo é perfeitamente justificável."
42230-11 = "Bem. Já deve estar na hora dos noticiários plantarem a bomba de pânico sobre o \"acidente\" e a explosão na Estação dos Coelhinhos……"
42230-18 = "Sim, aqui fala a Presidente Interina do Conselho Estudantil de Kivotos, Shiranui Kaya."
42230-19 = "Ah, General. Sua ligação é pontual."
42230-20 = "A queima de arquivo na Estação dos Coelhinhos foi concluída com a perfeição que exigi?"
42230-24 = "……Hã? O Esquadrão FOX falhou na operação……?"
42230-25 = "E pior…… O Esquadrão RABBIT furou o bloqueio e está marchando armado ao lado do Sensei da Schale em direção à sede do Conselho Estudantil……?!"
42230-26 = "O-O que diabos você está balbuciando?! Repita esse relatório imediatamente!!"
42230-30 = "Você tá me dizendo que os seus batalhões não conseguiram deter um bando de cadetes sendo comandadas pelo Sensei?!#nD-Do que raios você está falando……?!"
42230-37 = "A KAISER ESTÁ RECEBENDO RIOS DO MEU DINHEIRO……!!"
42230-39 = "CUSTE O QUE CUSTAR, VOCÊS TÊM QUE PARAR AQUELAS PRAGAS!!"
42230-51 = "RABBIT 1. Nós alcançamos os trilhos da via superior."
42230-52 = "RABBIT 2 na escuta. Varredura do perímetro concluída. Nenhuma sentinela ou ameaça nos radares."
42230-54 = "RABBIT 3 no controle. Eu acabei de jogar um \"alerta fantasma de acidente letal\" nos servidores da Academia Ferroviária Highlander. Todas as linhas que cruzam com o prédio do Conselho Estudantil foram lacradas e isoladas."
42230-55 = "Pelos próximos 60 minutos, não vai rolar nem um carrinho de mina nesses trilhos! A rota tá livre e blindada pra gente correr reto~!"
42230-56 = "Copiado e entendido."
42230-57 = "RABBIT 2, RABBIT 4. Se o pânico bater lá no alto, o alvo principal tem risco alto de evacuação.#nVamos apertar o passo e arrombar as portas do Conselho Estudantil antes que a Kaya fuja!"
42230-59 = "E-Entendido……!"
42230-60 = "Deixa comigo!"
42230-66 = "Tsc…… Parece que as benditas Raposas da SRT finalmente foram abatidas e humilhadas……"
42230-67 = "Serem atropeladas por um bando de garotinhas assustadas que não concluíram nem o currículo básico do primeiro ano…… que vergonha irreparável para as Forças Especiais."
42230-73 = "A minha intuição estratégica me salvou hoje. Foi a melhor escolha deixar a Tropa de Elite da Kaiser SOF de prontidão nos trilhos."
42230-74 = "Eu deixei essa carta letal na manga para o caso das Raposas traírem a coleira, mas já que elas morreram…… os meus fuzileiros esmagarão essas Coelhinhas inúteis."
42230-76 = "Eu não sou um amador estúpido que baixa a guarda e permite milagres infant――"
42230-90 = "Tango, abatido!"
42230-95 = "Alvo limpo. Mantenham a velocidade de avanço, meninas!"
42230-100 = "C-Com licença……!"
42230-110 = "[ns] \"Desculpe esbarrar, estamos com um pouco de pressa. Com licença.\""
42230-114 = "O que raios acabou de…… elas me ignoraram?!"
42230-115 = "A petulância de ignorar um General…… Isso passou de todos os limites do desrespeito……!"
42230-116 = "……Vocês vão pagar com sangue por isso, SRT!!"