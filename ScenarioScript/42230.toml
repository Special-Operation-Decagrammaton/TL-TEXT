[translation]
42230-1 = "Episódio 23: O Fim do Golpe"
42230-4 = "Gabinete da Presidência Interina do Conselho Estudantil Geral"
42230-6 = "Fufu… O aroma do café Esmeralda após um brunch tardio é, indiscutivelmente, espetacular."
42230-7 = "Por serem grãos de uma safra incrivelmente rara, deu um pouco de trabalho contrabandear… mas, como uma taça para brindar o dia da minha consagração absoluta, um pouco de luxo é perfeitamente justificável."
42230-11 = "Bem. Já deve estar na hora dos noticiários plantarem a bomba de pânico sobre o 'acidente' e a explosão na Estação dos Coelhinhos…"
42230-18 = "Sim, aqui fala a Presidente Interina do Conselho Estudantil de Kivotos, Shiranui Kaya."
42230-19 = "Ah, General. Sua ligação é pontual."
42230-20 = "A queima de arquivo na Estação dos Coelhinhos foi concluída com a perfeição que exigi?"
42230-24 = "……Hã? O Esquadrão FOX falhou na operação…?"
42230-25 = "E pior… O Esquadrão RABBIT furou o bloqueio e está marchando armado ao lado do Professor da Schale em direção à sede do Conselho Estudantil…?!"
42230-26 = "O-O que o senhor está balbuciando?! Repita esse relatório imediatamente!!"
42230-30 = "Você está me dizendo que os seus batalhões não conseguiram deter um bando de cadetes sendo comandadas pelo Professor?!#nD-Do que caralhos você está falando…?!"
42230-37 = "A KAISER ESTÁ RECEBENDO RIOS DO MEU DINHEIRO…!!"
42230-39 = "CUSTE O QUE CUSTAR, VOCÊS TÊM QUE PARAR AQUELAS PRAGAS!!"
42230-51 = "RABBIT1. Alcançamos os trilhos da via superior."
42230-52 = "RABBIT2 na escuta. Varredura do perímetro concluída. Nenhuma sentinela ou ameaça nos radares."
42230-54 = "RABBIT3 no controle. Acabei de jogar um 'alerta fantasma de acidente fatal' nos servidores da Academia Ferroviária Highlander. Todas as linhas que cruzam com o prédio do Conselho foram lacradas e isoladas."
42230-55 = "Pelos próximos 60 minutos, não vai passar nem um carrinho de mão nesses trilhos! A rota está livre e blindada pra gente correr reto~!"
42230-56 = "Copiado e entendido."
42230-57 = "RABBIT2, RABBIT4. Se o pânico bater lá no alto, o alvo principal tem alto risco de evacuação.#nVamos apertar o passo e arrombar as portas do Conselho antes que a Kaya fuja!"
42230-59 = "E-Entendido…!"
42230-60 = "Deixa comigo!"
42230-66 = "Tsc… Parece que as benditas raposas da SRT finalmente foram abatidas e humilhadas…"
42230-67 = "Serem atropeladas por um bando de garotinhas assustadas que não concluíram nem o básico do primeiro ano… que vergonha irreparável para as Forças Especiais."
42230-73 = "A minha intuição estratégica me salvou hoje. Foi a melhor escolha deixar a Tropa de Elite da Kaiser SOF de prontidão nos trilhos."
42230-74 = "Eu deixei essa carta letal na manga para o caso das raposas traírem a coleira, mas já que elas morreram… os meus fuzileiros esmagarão essas coelhinhas inúteis."
42230-76 = "Eu não sou uma amadora estúpida que baixa a guarda e permite milagres infantis――"
42230-90 = "Tango, abatido!"
42230-95 = "Alvo limpo. Mantenham a velocidade de avanço, meninas!"
42230-100 = "C-Com licença…!"
42230-110 = "[ns] \"Desculpe esbarrar, estamos com um pouco de pressa. Com licença.\""
42230-114 = "O que caralhos acabou de… elas me ignoraram?!"
42230-115 = "A petulância de ignorar um General… Isso passou de todos os limites do desrespeito…!"
42230-116 = "……Vocês vão pagar com sangue por isso, SRT!!"