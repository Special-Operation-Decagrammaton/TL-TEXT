[translation]
3201-1 = "和楽姫の特別な公演（１）"
3201-2 = "では、次の案件に移ります。"
3201-3 = "今回、陰陽部は「[ruby=ひゃっきやこうかんしゃさい]百鬼夜行感謝祭[/ruby]」を執り行います。"
3201-4 = "感謝祭といっても、普段と大きく異なるものではありません。"
3201-5 = "いつも通り、今回も私が準備を担当いたします。"
3201-10 = "まって～"
3201-11 = "チセちゃん、どうかしましたか？"
3201-12 = "えっとね～"
3201-13 = "今回の公演は、私が準備したいの。"
3201-14 = "チセちゃんが……？"
3201-16 = "にゃは、チセがねぇ……"
3201-17 = "ちょっと面白くなりそうかも～？"
3201-18 = "その……わざわざチセちゃんの手を煩わせるまでもないのですが……"
3201-19 = "小道具や舞台装置は前回のものがありますし、そこまで規模が大きいものでもないので……"
3201-20 = "でも、今回の公演は特別だから～"
3201-21 = "私が準備するね？"
3201-22 = "（か、かわいい……！）"
3201-23 = "こ、こほん……分かりました。"
3201-24 = "でしたら、小道具の購入から舞台装置の設営まで、私が全力でお手伝いします。"
3201-25 = "チセちゃんの準備に不足があってはいけませんから。"
3201-26 = "んー、そこまでする必要ある？"
3201-27 = "チセ一人でも大丈夫そうだけどねぇ。"
3201-28 = "陰陽部の副部長として、全力を尽くすのは当然のことです。"
3201-29 = "今まで私が担当してきたわけですし、引き継ぎもありますから……"
3201-31 = "（それに、全部任せるのは自分の仕事を押し付けているようで申し訳ないし……）"
3201-32 = "（チセちゃんのことも心配ですし）"
3201-33 = "んー、大丈夫。"
3201-34 = "カホは休んでて～"
3201-35 = "今日はお日様ぽかぽかだし。"
3201-36 = "私に任せて～"
3201-37 = "それじゃあ、買い出し行ってくるね。"
3201-41 = "ま、待ってください！チセちゃん！！"
3201-42 = "……にゃは、本当に行っちゃったねぇ。"
3201-43 = "普段のチセちゃんらしからぬ言動と行動力……"
3201-44 = "もしかして、これが思春期なのでしょうか！？"
3201-45 = "にゃはは、カホってば大袈裟なんだから。#n今回くらい任せてみたら？"
3201-46 = "チセなりに何か考えがあるんだろうからさ。"
3201-47 = "そ、それはもちろん！私もチセちゃんが作り上げる舞台が気になっていないわけではありませんし……ただ……"
3201-48 = "もし、商店街で大勢に囲まれたりでもしたら……！"
3201-49 = "それに、悪い人がチセちゃんをさらっていくかもしれないじゃないですか……！"
3201-51 = "にゃはは、それは考えすぎじゃないかな～？"
3201-52 = "「和楽姫」の公演でもないしねぇ。"
3201-53 = "うう……やはり心配です！"
3201-54 = "なので、チセちゃんを見守ろうと思います！"
3201-55 = "ほら、ニヤ様も一緒に行きますよ！"
3201-56 = "えー、私も～？"
3201-58 = "いらっしゃい！"
3201-59 = "おぉ、これはこれは！#nチセ様じゃないか、ははっ！"
3201-60 = "こんにちは～"
3201-64 = "にゃは。にしても、コソコソ後ろをつけるなんて……"
3201-65 = "私たちの方が怪しい人になってな～い？"
3201-66 = "し、静かに！聞こえてしまいます！"
3201-67 = "一人で公演の準備をしたいというチセちゃんの意志を汲みつつ、安全を守るにはこれしか方法がないのです！"
3201-68 = "カホの方が声大きい気がするけどなぁ～？"
3201-69 = "っ……！"
3201-70 = "まあ、ここまで来たんだから見守りましょ。"
3201-72 = "「百鬼夜行感謝祭」の道具を買いにきてくれたのかな？"
3201-73 = "であれば……えーっと……"
3201-74 = "あったあった。"
3201-75 = "いつもカホさんが買っていく藍染の傘だ。"
3201-76 = "ええ、それです！チセちゃん！"
3201-77 = "百鬼夜行の伝統工芸品である藍染の傘は、公演を厳かで格調高いものに……！"
3201-82 = "ううん、あっちの桃色にする～"
3201-85 = "！？"
3201-86 = "チセちゃん？どうして……？"
3201-87 = "今までずっと藍染の傘を使ってきましたが……実は気に入っていなかったんですか！？"
3201-88 = "ほぉほぉ、なるほど……そういうことなのかねぇ。"
3201-90 = "アイドルチセの小さな反抗、やね。"
3201-92 = "こちらの桃色でいいのかな？"
3201-93 = "はい、まいど。"
3201-94 = "ありがと～"
3201-95 = "はいよ！またいつでも来てくれ。"
3201-97 = "こんにちは、チセ様！何かお探しですか？"
3201-98 = "うん、お人形が必要なの～"
3201-99 = "かわいい子だといいな。"
3201-100 = "「百鬼夜行感謝祭」の準備中だと伺っております。"
3201-101 = "それなら、こちらのこけしはいかがでしょう？"
3201-102 = "ええ！お人形は感謝祭でとても重要なポジションです！"
3201-103 = "傘は前回と違う色ですが……店主が言う通り、感謝祭で使われるお人形といえば、こけし人形！"
3201-104 = "そちらで合ってますよ、チセちゃん！"
3201-105 = "にゃはは、大人しく見守ろうよ～"
3201-107 = "こけし……"
3201-108 = "かわいいけど、こっちの方がいいな～"
3201-109 = "キツネのお人形ですか……？#n……あっ、いえ。はい、どうぞ。"
3201-110 = "また、違うものを……？"
3201-111 = "うん、これはカホ副部長～"
3201-113 = "わ、私ですか！？"
3201-114 = "……なるほど。流石はチセ、見る目があるねぇ。"
3201-116 = "あと、そこのだるまさんも～"
3201-117 = "はい、どうぞ！"
3201-118 = "これはニヤ部長～"
3201-120 = "ん！？私は、だるま……？"
3201-121 = "もしかして、顔が似てるから……とかじゃないよね？"
3201-122 = "ありがとう～"
3201-123 = "いえ、こちらこそありがとうございました！#n公演、楽しみにしています！！"
3201-128 = "チセちゃん！？#n今度は儀式のお供え用ではなく、オレンジジュースを……！？"
3201-133 = "伝統工芸品の茶器ではなく、キャラクターの描かれたコップを……！？"
3201-138 = "しかも、プリンとアイスまで！？"
3201-143 = "ぜぇ、ぜぇ……"
3201-144 = "こ、こんなに走ってまで、戻る必要あった～？"
3201-145 = "ち、チセちゃんに見つかってはいけませんので。"
3201-146 = "にしてもチセ……何考えてるんだろねぇ。"
3201-147 = "ほとんど普段使わないものばっかり……"
3201-148 = "そ、そうですね……チセちゃん……"
3201-149 = "きっと、何か考えがあるとは思うのですが……"
3201-154 = "とうちゃ～く。"
3201-160 = "お日様、ぽかぽかしてたね～"
3201-161 = "あっ！ち、チセちゃん、おかえりなさい！"
3201-162 = "買い出しは無事に終わりましたか？"
3201-163 = "うん～完璧。"
3201-164 = "これなら公演もうまくいくよ～"
3201-165 = "そ、そうですか。でしたら良かったです。"
3201-166 = "うん、それじゃあ準備してくるね～"
3201-170 = "チセちゃん……。"
