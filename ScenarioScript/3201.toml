[translation]
3201-1 = "A Apresentação Especial da Princesa da Harmonia (1)"
3201-2 = "Bem, vamos passar para o próximo assunto."
3201-3 = "Desta vez, o Clube Yin-Yang realizará o Festival de Agradecimento de Hyakkiyako."
3201-4 = "Embora seja um festival de agradecimento, não é muito diferente do habitual."
3201-5 = "Como sempre, eu ficarei responsável pelos preparativos."
3201-10 = "Espere~"
3201-11 = "Chise-chan, aconteceu alguma coisa?"
3201-12 = "Bem, é que~"
3201-13 = "Eu quero ser a responsável pelos preparativos desta apresentação."
3201-14 = "A Chise-chan...?"
3201-16 = "Nya-ha, a Chise, hein..."
3201-17 = "Isso pode acabar ficando interessante, não acha~?"
3201-18 = "Bem... não há necessidade de incomodar a Chise-chan com isso..."
3201-19 = "Já temos os adereços e o cenário da última vez, e a escala não é tão grande assim..."
3201-20 = "Mas esta apresentação é especial~"
3201-21 = "Posso preparar tudo?"
3201-22 = "(T-tão fofa...!)"
3201-23 = "C-cof... Entendido."
3201-24 = "Nesse caso, eu ajudarei com tudo o que puder, desde a compra dos adereços até a montagem do palco."
3201-25 = "Não podemos permitir que falte nada nos preparativos da Chise-chan."
3201-26 = "Hmm, precisa mesmo ir tão longe?"
3201-27 = "Acho que a Chise dá conta sozinha, sabe."
3201-28 = "Como vice-presidente do Clube Yin-Yang, é natural que eu me esforce ao máximo."
3201-29 = "Sempre fui eu quem cuidou disso, e ainda tem a questão da transição de tarefas..."
3201-31 = "(Além disso, deixar tudo nas mãos dela parece que estou empurrando meu trabalho para ela...)"
3201-32 = "(E também estou preocupada com a Chise-chan)"
3201-33 = "Hmm, está tudo bem."
3201-34 = "Kaho, pode descansar~"
3201-35 = "O sol está tão quentinho hoje."
3201-36 = "Deixe comigo~"
3201-37 = "Então, vou lá fazer as compras."
3201-41 = "E-espere! Chise-chan!!"
3201-42 = "...Nya-ha, ela realmente foi embora."
3201-43 = "Essas palavras e essa iniciativa, tão diferentes da Chise-chan de sempre..."
3201-44 = "Será que isso é a puberdade!?"
3201-45 = "Nya-ha-ha, Kaho, você é muito exagerada. #nPor que não deixa ela tentar desta vez?"
3201-46 = "A Chise deve ter algum plano em mente."
3201-47 = "I-isso é óbvio! Não é como se eu não estivesse curiosa sobre o palco que a Chise-chan vai criar... é só que..."
3201-48 = "E se ela for cercada por uma multidão no centro comercial...!"
3201-49 = "Além disso, pessoas mal-intencionadas podem acabar levando a Chise-chan embora...!"
3201-51 = "Nya-ha-ha, você não está pensando demais nisso~?"
3201-52 = "Não é como se fosse uma apresentação da \"Princesa da Harmonia\"."
3201-53 = "Uuu... ainda assim, estou preocupada!"
3201-54 = "Por isso, vou ficar de olho na Chise-chan!"
3201-55 = "Vamos, Nya-sama, você vem comigo!"
3201-56 = "Ehh, eu também~?"
3201-58 = "Bem-vinda!"
3201-59 = "Oh, vejam só! #nNão é a senhorita Chise? Haha!"
3201-60 = "Olá~"
3201-64 = "Nya-ha. Mas, ficar seguindo ela escondida assim..."
3201-65 = "A gente não está parecendo mais suspeita do que ela?"
3201-66 = "Shh, silêncio! Ela vai acabar ouvindo!"
3201-67 = "Respeitar a vontade da Chise-chan de preparar a apresentação sozinha, ao mesmo tempo em que garantimos a segurança dela, só é possível deste jeito!"
3201-68 = "Mas acho que a voz da Kaho está mais alta que a dela, não está?"
3201-69 = "Ah...!"
3201-70 = "Bem, já que chegamos até aqui, vamos continuar observando."
3201-72 = "Será que ela veio comprar itens para o Festival de Gratidão de Hyakkiyako?"
3201-73 = "Se for isso... hum..."
3201-74 = "Achei, achei."
3201-75 = "É o guarda-chuva tingido de índigo que a Kaho-san sempre compra."
3201-76 = "Sim, é esse mesmo! Chise-chan!"
3201-77 = "O guarda-chuva tingido de índigo, um artesanato tradicional de Hyakkiyako, deixará a apresentação solene e de alto nível...!"
3201-82 = "Não, eu vou querer aquele cor-de-rosa~"
3201-85 = "!?"
3201-86 = "Chise-chan? Por que..."
3201-87 = "Você sempre usou o guarda-chuva tingido de índigo... será que, na verdade, você nunca gostou dele!?"
3201-88 = "Ho ho, entendo... então é assim que as coisas são."
3201-90 = "Uma pequena rebeldia da Idol Chise, hein."
3201-92 = "Este cor-de-rosa serve?"
3201-93 = "Sim, como sempre."
3201-94 = "Obrigada~"
3201-95 = "Certo! Volte sempre que quiser."
3201-97 = "Olá, Chise-sama! Está procurando por algo?"
3201-98 = "Sim, preciso de uma boneca~"
3201-99 = "Espero que seja uma bem fofinha."
3201-100 = "Ouvi dizer que você está se preparando para o Festival de Gratidão de Hyakkiyako."
3201-101 = "Nesse caso, que tal este Kokeshi?"
3201-102 = "Sim! Bonecas são um elemento muito importante no festival!"
3201-103 = "O guarda-chuva é de uma cor diferente da última vez, mas... como o dono da loja disse, quando se fala em bonecas para o festival, estamos falando de Kokeshi!"
3201-104 = "É isso mesmo, Chise-chan!"
3201-105 = "Nyahaha, vamos observar quietinhas~"
3201-107 = "Kokeshi..."
3201-108 = "É fofo, mas prefiro este aqui~"
3201-109 = "Uma boneca de raposa...? #n... Ah, não. Sim, aqui está."
3201-110 = "De novo, algo diferente...?"
3201-111 = "Sim, esta é a vice-diretora Kaho~"
3201-113 = "E-eu!?"
3201-114 = "...Entendo. Como esperado da Chise, ela tem bom olho."
3201-116 = "E aquele Daruma ali também~"
3201-117 = "Sim, aqui está!"
3201-118 = "Este é o diretor Niya~"
3201-120 = "Hein!? Eu sou um... Daruma...?"
3201-121 = "Não é porque o rosto é parecido, né...?"
3201-122 = "Obrigada~"
3201-123 = "Não, nós que agradecemos! #nEstamos ansiosas pela apresentação!!"
3201-128 = "Chise-chan!? #nDesta vez, em vez de oferendas para o ritual, você comprou suco de laranja...!?"
3201-133 = "Em vez de um conjunto de chá artesanal tradicional, você pegou um copo com personagens...!?"
3201-138 = "E ainda por cima, pudim e sorvete!?"
3201-143 = "Ofegante, ofegante..."
3201-144 = "S-será que precisava mesmo correr tanto para voltar?"
3201-145 = "C-certo, não podemos deixar a Chise-chan nos ver."
3201-146 = "Ainda assim, a Chise... o que será que ela está pensando?"
3201-147 = "São quase todas coisas que não usamos normalmente..."
3201-148 = "É, é verdade... Chise-chan..."
3201-149 = "Tenho certeza de que ela deve ter algum plano em mente, mas..."
3201-154 = "Cheguei~."
3201-160 = "O sol estava tão quentinho~"
3201-161 = "Ah! C-Chise-chan, bem-vinda de volta!"
3201-162 = "As compras correram bem?"
3201-163 = "Sim~ Perfeito."
3201-164 = "Com isso, a apresentação vai ser um sucesso~"
3201-165 = "E-entendo. Fico feliz em ouvir isso."
3201-166 = "Sim, então vou lá preparar as coisas~"
3201-170 = "Chise-chan..."
