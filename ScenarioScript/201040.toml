[translation]#[Texto Final. mas eventualmente pode haver alterações na formatação de texto. - Filipe 03/07.]
201040-1 = "Episódio 4: Saudade Azul-Celeste"
201040-2 = "(Depois da visita a Kaya, acompanhei Rin\naté o Conselho Estudantil Geral)"
201040-7 = "……Eu falei que não precisava me acompanhar."
201040-8 = "Se por minha causa você chegar\ntarde em casa, Sensei――"
201040-9 = "[s1] \"Relaxa. Eu faço porque quero.\"\n[s2] \"Perigoso é você sozinha a essa hora, né?\""
201040-12 = "Posso ser boa com papelada, mas ainda sou\nmembro do Conselho Estudantil Geral.#nDelinquente de rua não chega a ser problema."
201040-13 = "Quem corre perigo aqui é você,\nSensei [USERNAME]……"
201040-17 = "……Embora, a esta altura, não faça\nmais sentido dizer isso."
201040-18 = "Aliás, já que veio até o Conselho.#nNão quer entrar um pouco?"
201040-19 = "[s3] \"O convite é tentador, mas……\"\n[s4] \"Entrar na casa de uma aluna é meio……\""
201040-22 = "O que está pensando?!"
201040-23 = "Eu só queria pedir uma verificação.#n……O \"Cajado de Shaked\" que a Kaya\nmencionou mais cedo."
201040-24 = "Para a Kaya, podia parecer um smartwatch\ncomum. Mas, como faz com a \"Caixa de Shittim\",#nvocê talvez consiga reconhecer\no valor dele, Sensei."
201040-25 = "Se aquilo for mesmo um artefato anômalo\ndeixado pela Presidente do Conselho,#npode ajudar a conter o caos de Kivotos.\nOu, quem sabe――"
201040-26 = "Pode ser a chave para rastrear\no paradeiro da Presidente do Conselho\nEstudantil Geral."
201040-27 = "Quero começar a investigação o quanto antes."
201040-28 = "[s5] \"Não precisa ter tanta pressa.\"\n[s6] \"Agora existe algo mais importante.\""
201040-31 = "Mais importante que procurar\na Presidente do Conselho――"
201040-32 = "[s] \"A sua folga, Rin.\""
201040-36 = "[ns7] \"Hoje é seu dia de descanso, né?\"\n[ns8] \"Então nada de assunto de trabalho.\""
201040-39 = "……Está bem."
201040-40 = "Obrigada por me acompanhar o dia todo.\nDescanse bem você também, Sensei."
201040-41 = "Com licença, vou indo primeiro."
201040-46 = "Depósito do gabinete da Presidente do Conselho Estudantil Geral"
201040-50 = "Então esta é…… a arca sagrada."
201040-55 = "O \"Cajado de Shaked\" está aqui dentro……"
201040-56 = "Aparenta estar em ordem……\nmas está trancada."
201040-57 = "……O que é isto?"
201040-58 = "Uma marca que nunca vi…… isto não é algo\nque a Presidente deixou.#nPor quê……?"
201040-59 = "As letras gravadas dizem……"
201040-61 = "Esta pessoa é―― aquela que vos guiou\npara fora do paraíso."
201040-63 = "Senha reconhecida.#nAcesso: atual Presidente interina,\nAdministradora Nanagami Rin."
201040-64 = "Permissão de acesso confirmada.\nAnálise de voz―― 99% de correspondência."
201040-65 = "……Verificação concluída.\nDesfazendo o selo da arca sagrada."
201040-70 = "Não esperava que abrisse tão fácil……"
201040-71 = "Então este é…… o \"Cajado de Shaked\"……"
201040-75 = "Realmente não parece mais\nque um smartwatch comum……"
201040-76 = "É melhor pedir ao Sensei, como planejado."
201040-80 = "Mas…… tal como a \"Caixa de Shittim\",\nque uso a Presidente dava a isto?"
201040-81 = "Controlar o mundo com perfeição é algo\nque só super-humanos como você conseguem……"
201040-82 = "Ainda assim…… será que só um adulto\ncomo o Sensei#ntem permissão pra sequer se aproximar\ndos vestígios que você deixou?"
201040-83 = "……Presidente."
201040-84 = "Neste mundo sem você…… eu não tenho\nconfiança de dar conta do seu papel."
201040-85 = "Se puder ouvir minha voz, ainda que\nseja mentira――"
201040-86 = "――\"Vai ficar tudo bem.\" Diga isso,\npor favor."
201040-87 = "Eu……"
201040-95 = "……Rinzinha."
201040-96 = "Se um dia eu sumisse, o que\nvocê faria, Rinzinha?"
201040-97 = "Se está pensando em férias longas,\nsolicite com 2 semanas de antecedência."
201040-98 = "Não é isso! É um \"e se\"!"
201040-99 = "Se eu me machucasse ou adoecesse e não\npudesse mais vir ao Conselho――"
201040-100 = "Se do nada um acidente me fizesse sumir,\no que você faria, Rinzinha?"
201040-101 = "Difícil de imaginar. Mas, se isso\nacontecesse……"
201040-102 = "……Seria um pouco problemático."
201040-103 = "Se a Presidente sumisse de repente,\nminhas tarefas dobrariam."
201040-104 = "Que maldade! Até nessa situação\nvocê pensa em trabalho?!"
201040-105 = "Naturalmente. Considerando o volume\nde trabalho que a Presidente processa――"
201040-106 = "Ninguém em Kivotos daria conta\nde substituir você."
201040-107 = "……Isso não é verdade.#nCom esforço, qualquer pessoa\nalcança qualquer coisa.#nSó demora um pouquinho, talvez."
201040-108 = "O meu papel não é lá grande coisa, viu?"
201040-109 = "Mas…… existe uma única coisa em que nem\na pessoa mais brilhante pode me substituir."
201040-110 = "E é……"
201040-113 = "……Rin."
201040-114 = "……Rin, acorde."
201040-115 = "Administradora Nanagami Rin!!"
201040-116 = "……"
201040-117 = "Essa voz é……"
201040-119 = "……Bom dia."
201040-120 = "Trabalhou até tarde ontem?"
201040-121 = "Dedicação é ótimo, mas exagerar inverte\no propósito. Quantas vezes já falei?"
201040-126 = "Você é……"
201040-127 = "……Quem é você?"
201040-128 = "Como entrou aqui……?"
201040-129 = "Poxa…… já se esqueceu de mim?\nNão diga uma coisa tão triste."
201040-130 = "Ou será que ainda está meio adormecida?"
201040-132 = "Então vamos refazer as apresentações."
201040-133 = "Eu sou sua velha amiga e――"
201040-134 = "a chefe do Conselho Estudantil Geral, que\nadministra esta cidade acadêmica, Kivotos."
201040-135 = "A Presidente do Conselho Estudantil Geral."
201040-137 = "Próximo Episódio: Erro de Memória"