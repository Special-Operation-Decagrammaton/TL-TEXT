[translation]
201040-1 = "Episódio 4: Nostalgia Azul Celeste"
201040-2 = "（Após a entrevista pesada com a Kaya, encerramos a excursão e eu escoltei a Rin até a porta do Conselho Estudantil.）"
201040-7 = "……Eu alertei o senhor de que a escolta de retorno era irrelevante."
201040-8 = "Se o meu trajeto sequestrar a sua rota e atrasar a sua carga horária de descanso――"
201040-9 = "[s1] \"Relaxa o coração. Eu não vim porque fui forçado, vim porque eu quis.\"\n[s2] \"Até porque deixar uma garota belíssima dessas marchar sozinha num bairro vazio à noite seria um pecado da minha parte.\""
201040-12 = "Por mais que a minha matriz militar seja administrativa, eu porto o brasão do Conselho Estudantil de Kivotos.#nUm esquadrão de delinquentes Sukeban armadas de rua seria poeira pra mim."
201040-13 = "Sendo franca com os riscos vitais do asfalto, quem precisa de guarda-costas armada é o senhor, um adulto sem armas..."
201040-17 = "……Mas enfim, rebater protocolos a esta hora da madrugada é fútil."
201040-18 = "Tendo em vista que as suas solas já pisaram na calçada do Conselho Estudantil...#nGostaria de subir até os meus aposentos para uma estadia breve?"
201040-19 = "[s3] \"Opa... o convite pro café à noite me balança, confesso...\"\n[s4] \"Mas subir no apartamento escuro de uma aluna... as más línguas iam falar que eu tô abusando da inocência alheia...\""
201040-22 = "MAS O QUE ESSE SEU CÉREBRO PERVERTIDO TÁ FANTASIANDO AGORA?!!"
201040-23 = "Eu convidei a Mão da Schale apenas para exercer uma consultoria pericial.#n...Quero que você investigue o tal 'Cajado de Sharkade' que a Kaya delatou na prisão."
201040-24 = "Para os nossos olhos mortais e para a Kaya, o maquinário reluz como um relógio de pulso comercial lixo, mas...#nTalvez um administrador com a permissão divina da 'Caixa de Shittim' leia o DNA do artefato e rastreie o valor oculto."
201040-25 = "Se as teorias se provarem e aquele lixo digital for um OOPArt colossal deixado pela Presidente...#nEsse poder pode frear a carnificina política de Kivotos ou, numa ótica mais poética――"
201040-26 = "Pode abrigar a Chave-Mestra que nos revelará as coordenadas do paradeiro atual da Presidente."
201040-27 = "A impaciência burocrática arde no meu peito. Precisamos engatar os laudos investigativos no artefato sem respiro."
201040-28 = "[s5] \"Calma, respira. Por que você tá pisando no acelerador assim às pressas?\"\n[s6] \"A gente tem uma ordem de prioridade vital não-resolvida na mesa ainda.\""
201040-31 = "Que missão prioritária poderia atropelar os decretos de rastreio e busca da Presidente Desap――"
201040-32 = "[s] \"O descanso da Rin.\""
201040-36 = "[ns7] \"Nossa pauta assinada e sacramentada pro sábado não era tirar você do modo máquina?\"\n[ns8] \"Por isso, bloqueia as planilhas e a burocracia do conselho hoje. Amanhã a gente salva o mundo.\""
201040-39 = "……Entendo e acato."
201040-40 = "Sua consultoria cívica nas ruas foi inestimável hoje. Desejo que sua noite e seus tecidos celulares descansem na paz absoluta."
201040-41 = "A minha guarda se despede. Até logo, Sensei."
201040-46 = "Cofre do Almoxarifado - Sala da Presidente do Conselho Estudantil"
201040-50 = "Este cofre negro... A Arca."
201040-55 = "A anomalia classificada como 'Cajado de Sharkade' habita este interior..."
201040-56 = "A blindagem de titânio visualmente está impecável... Porém os selos digitais do cadeado relatam que ele está inoperante ou cimentado em modo manual."
201040-57 = "……Que runas são essas?"
201040-58 = "Este brasão grafado... a geometria não cruza com os caligráficos da Presidente. Essa marca é forasteira...#nMas como...?"
201040-59 = "A sintaxe entalhada diz..."
201040-61 = "«Este é O Mensageiro―― Aquele que Vos guiará na Marcha para Fora do Paraíso.»"
201040-63 = "Pendente de autenticação criptográfica.#nIdentidade do administrador detectada: Atual Presidente Interina, Chefe de Administração Nanagami Rin."
201040-64 = "Auditoria de poder concedida. Escaneamento da ressonância de cordas vocais―― Matriz compatível em 99%."
201040-65 = "……Protocolo finalizado. Diluindo barreiras. A Arca está Deslacrada."
201040-70 = "A arquitetura e firewalls cederam e afundaram tão facilmente..."
201040-71 = "Esta carcaça reluzente... O tal do 'Cajado de Sharkade'..."
201040-75 = "O hardware transparece ser apenas uma pulseira inteligente fajuta de pulso..."
201040-76 = "Os laudos periciais e os olhos do Sensei precisarão intervir."
201040-80 = "Mas a incógnita não cala... Tanto a onipotência da 'Caixa de Shittim' quanto este maquinário... Que telemetria obscura a Presidente calculava ao soldar esses OOPArts?"
201040-81 = "Deduzo que apenas um Sobre-Humano detentor de DNA absoluto, como Ela, seria capaz de escravizar e operar o mundo inteiro... E se Ela não estivesse aqui..."
201040-82 = "Apenas... os genes alienígenas de um 'Adulto', como o Sensei da Schale... teriam o fardo de sujar as mãos nos escombros dela, não é...?"
201040-83 = "……Presidente."
201040-84 = "No vazio dessa terra sem Lei onde as suas pegadas sumiram... Eu sou consumida pelo pavor burocrático de não conseguir suportar a sua Coroa."
201040-85 = "Se as frequências deste choro afundado cruzarem com a sua consciência... Eu imploro, ainda que seja em forma de ilusão holográfica mentirosa――"
201040-86 = "――Grite que eu vou ficar bem. Mande os meus demônios pararem."
201040-87 = "A minha alma está..."
201040-95 = "……Rin-chan."
201040-96 = "Se os meus rastros no asfalto evaporassem amanhã e eu apagasse desse mundo... O que a Rin-chan faria no tabuleiro vazio?"
201040-97 = "Se os despachos oficiais da senhorita demandarem folga vital, exijo os laudos com assinatura carimbada na minha mesa com quatorze dias de antecedência burocrática."
201040-98 = "Larga a prancheta de PDF e me ouve! Eu tô elaborando um cenário hipotético!"
201040-99 = "Se a minha biologia colapsasse por vírus celular orgânico ou trauma militar e a minha cadeira ficasse oca..."
201040-100 = "Se o fogo das ruas engolisse a minha existência de sopetão... qual seria a sua manobra de emergência, Rin-chan?"
201040-101 = "A logística mental desse colapso distópico beira a irrealidade... Porém, caso esse cenário caótico eclodisse na esfera pública..."
201040-102 = "……Isso geraria um atrito no meu cronograma."
201040-103 = "Sem a engrenagem mestre que é a Presidente absorvendo o impacto, a enxurrada de diretrizes triplicaria o meu esgotamento cerebral."
201040-104 = "Cruel!! No cenário lúgubre da minha morte presumida, a única lágrima do seu choro ia ser pela sua folha de ponto rasgada?!"
201040-105 = "Os números são implacáveis, Senhora. Fazer a telemetria do volume e da magnitude de carga militar e social que as suas mãos moldam no conselho... prova empiricamente que..."
201040-106 = "Nenhuma cobaia orgânica habitando o território de Kivotos preencheria os vazios que você faria."
201040-107 = "……Essa teoria pessimista não tem pé nem cabeça.#nSe esfolarem a pele estudando e derramarem sangue na caneta... qualquer engravatado ergue os escombros e domina o trono.#nA matemática do poder exige tempo, só isso."
201040-108 = "O peso do meu cargo não reflete essa muralha de titânio irreal e inquebrável que as fábulas pintam por aí."
201040-109 = "Porém... mesmo que um Gênio Absoluto forjasse o amanhã, e reinasse com sangue frio e maestria... há um laço espiritual na malha orgânica que jamais pode ser copiado."
201040-110 = "Esse laço irremissível... é..."
201040-113 = "……Rin."
201040-114 = "……Rin, a hibernação já rendeu o necessário. Erga as pálpebras."
201040-115 = "Chefe Administrativa, Nanagami Rin!!"
201040-116 = "……"
201040-117 = "O meu banco de voz... não tem esse registro sonoro..."
201040-119 = "……A aurora já brilhou."
201040-120 = "O seu cérebro mastigou PDF e virou as noites de novo engolida pelas telas de papelada?"
201040-121 = "O empenho suicida e a disciplina honram o brasão, mas... repito ad nauseam: torrar a carne e derreter o sistema nervoso vai engessar as nossas engrenagens vitais lá na frente."
201040-126 = "O seu rosto..."
201040-127 = "……Quem é a senhorita?"
201040-128 = "A malha biométrica desta seção é de blindagem máxima... como você atravessou e invadiu aqui...?"
201040-129 = "Poxa vida... O meu choro vai ser feio agora... Quer dizer que o pó do tempo apagou meu R.G. das suas conexões neurais?"
201040-130 = "Ou o cansaço fritou seu córtex pré-frontal e você tá balbuciando num surto onírico?"
201040-132 = "Entendido... re-assinarei meu pacto e abrirei o protocolo de apresentação formal para reativar as suas memórias cívicas."
201040-133 = "O meu DNA responde como... uma aliada arcaica que suou com você no passado. Mas antes disso――"
201040-134 = "Eu sento no trono supremo que domina e gere as fundações destas avenidas cimentadas. A Monarca que estipula as engrenagens da Torre do Conselho Estudantil e reina sobre toda a nação de Kivotos."
201040-135 = "A Presidente Geral em exercício... ao seu dispor."
201040-137 = "Próximo Episódio: Falha de Memória"