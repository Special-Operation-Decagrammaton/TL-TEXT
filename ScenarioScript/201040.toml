[translation]
201040-1 = "Episódio 4; Nostalgia da cor do céu"
201040-2 = "（Após terminar a reunião com Kaya, levei Rin até o Conselho Estudantil Geral）"
201040-7 = "……Eu disse que não precisava me acompanhar."
201040-8 = "Se o Professor chegar tarde em casa por minha causa――"
201040-9 = "[s1] \"Não se preocupe. Eu faço isso porque quero.\"\n[s2] \"Além disso, não é perigoso andar sozinha a essa hora?\""
201040-12 = "Por mais que eu seja boa com trabalho administrativo, eu sou um membro do Conselho Estudantil Geral. #nQualquer delinquente comum não seria um problema."
201040-13 = "Na verdade, quem corre perigo é o Professor [USERNAME]……."
201040-17 = "……Dizer isso agora não adianta de nada, não é?"
201040-18 = "Mas, já que viemos até o Conselho Estudantil Geral. #nPor que não entra um pouco?"
201040-19 = "[s3] \"Fico feliz com o convite, mas…….\"\n[s4] \"Entrar na casa de uma aluna é um pouco…….\""
201040-22 = "O que você está pensando!"
201040-23 = "Eu só queria pedir que você verificasse algo. #n……Aquele \"Cajado de Shaked\" que a Kaya mencionou mais cedo."
201040-24 = "Mesmo que para a Kaya pareça apenas um smartwatch comum, assim como o \"Shittim Chest\", #ntalvez o Professor consiga entender o valor dele."
201040-25 = "Se aquilo for realmente um artefato deixado pela Presidente do Conselho Estudantil Geral, #npode ser uma ajuda para resolver o caos em Kivotos, ou então――"
201040-26 = "Pode ser a chave para descobrir o paradeiro da Presidente."
201040-27 = "Quero começar a investigação o quanto antes."
201040-28 = "[s5] \"Não acho que precise ter tanta pressa.\"\n[s6] \"Agora temos coisas mais importantes para tratar.\""
201040-31 = "Coisas mais importantes do que encontrar a Presidente do Conselho Estudantil Geral――"
201040-32 = "[s] \"As férias da Rin.\""
201040-36 = "[ns7] \"Hoje é seu dia de folga, não é?\"\n[ns8] \"Então, vamos deixar assuntos de trabalho de lado.\""
201040-39 = "……Entendido."
201040-40 = "Obrigada por me acompanhar hoje. Professor, descanse bem também."
201040-41 = "Então, com licença."
201040-46 = "Depósito dentro da sala da Presidente do Conselho Estudantil Geral"
201040-50 = "Isto é…… a Arca."
201040-55 = "O \"Cajado de Shaked\" está aqui dentro……."
201040-56 = "Não parece ter nada de errado, mas…… está trancado."
201040-57 = "……O que é isso?"
201040-58 = "Tem uma marca que nunca vi antes…… não foi a Presidente quem deixou isso. #nPor que……."
201040-59 = "As letras gravadas são……."
201040-61 = "Este é aquele que os guia para fora do paraíso."
201040-63 = "Senha aprovada. #nAcessado por: Atual Presidente em exercício do Conselho Estudantil Geral, Administradora Rin Nanagami."
201040-64 = "Verificação de autoridade de acesso. Verificação de impressão vocal――99% de correspondência."
201040-65 = "……Verificação concluída. Desbloqueando o selo da Arca."
201040-70 = "Abrir tão facilmente assim……."
201040-71 = "Este é…… o \"Cajado de Shaked\"……."
201040-75 = "Parece apenas um smartwatch comum, mas……."
201040-76 = "Como esperado, vou pedir ao Professor."
201040-80 = "Mas…… assim como o \"Shittim Chest\", para que tipo de propósito a Presidente usava isso?"
201040-81 = "Acho que apenas alguém como você, um super-humano, seria capaz de controlar o mundo perfeitamente……."
201040-82 = "Mesmo assim…… se não for um adulto como o Professor, #nserá que nem mesmo é permitido se aproximar dos vestígios que você deixou?"
201040-83 = "……Presidente."
201040-84 = "Em um mundo sem você…… eu não tenho confiança de que consigo cumprir o seu papel."
201040-85 = "Se você puder me ouvir, mesmo que seja mentira――"
201040-86 = "――Diga que vai ficar tudo bem."
201040-87 = "Eu……."
201040-95 = "……Rin-chan."
201040-96 = "Se eu desaparecesse, o que você faria, Rin-chan?"
201040-97 = "Se estiver pensando em tirar férias longas, por favor, solicite com duas semanas de antecedência."
201040-98 = "Não é isso! É uma hipótese!"
201040-99 = "Se eu me machucasse ou ficasse doente e não pudesse mais vir ao Conselho Estudantil Federal..."
201040-100 = "Se eu me envolvesse em um acidente de repente e desaparecesse, o que você faria, Rin-chan?"
201040-101 = "É difícil imaginar, mas se algo assim acontecesse..."
201040-102 = "......Eu ficaria um pouco em apuros."
201040-103 = "Se a Presidente desaparecesse de repente, minhas tarefas dobrariam, afinal."
201040-104 = "Que cruel! Mesmo nessa situação, você só pensa em trabalho!?"
201040-105 = "É natural. Considerando a quantidade de trabalho que a Presidente processa..."
201040-106 = "Ninguém em Kivotos seria capaz de substituí-la."
201040-107 = "......Não é verdade. #nCom esforço, qualquer um pode realizar qualquer coisa. #nBem, talvez leve um pouco de tempo."
201040-108 = "O meu papel não é nada tão grandioso assim."
201040-109 = "Mas... existe apenas uma coisa que nem a pessoa mais talentosa do mundo poderia substituir."
201040-110 = "Isso é..."
201040-113 = "......Rin."
201040-114 = "......Rin, por favor, acorde."
201040-115 = "Administradora Nanagami Rin!!"
201040-116 = "......"
201040-117 = "Essa voz é..."
201040-119 = "......Bom dia."
201040-120 = "Você trabalhou até tarde ontem?"
201040-121 = "É bom se esforçar, mas já lhe disse várias vezes que não adianta nada se você acabar se prejudicando."
201040-126 = "Você é..."
201040-127 = "......Quem é você?"
201040-128 = "Como você entrou aqui...?"
201040-129 = "Ora... você já se esqueceu de mim? Não diga coisas tão tristes."
201040-130 = "Ou será que você ainda está sonhando acordada?"
201040-132 = "Então, vamos nos apresentar novamente."
201040-133 = "Eu sou sua velha amiga e..."
201040-134 = "A líder do Conselho Estudantil Federal que administra esta cidade acadêmica, Kivotos."
201040-135 = "Sou a Presidente do Conselho Estudantil Federal."
201040-137 = "Próximo episódio: Erro de Memória"
