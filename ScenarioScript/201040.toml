[translation]
201040-1 = "Эпизод 4;Небесно-голубая ностальгия"
201040-2 = "(После того как встреча с Кайей завершилась, я проводил Рин обратно до Генерального Студенческого Совета.)"
201040-7 = "...Кажется, я говорила вам, что в этом нет необходимости и меня не нужно провожать."
201040-8 = "Если вы из-за меня поздно вернётесь домой —"
201040-9 = "[s1] «Не беспокойся об этом. Я делаю это, потому что сам хочу».\n[s2] «К тому же разве не опасно тебе ходить одной в такой час?»"
201040-12 = "Какой бы искусной я ни была в административной работе, я всё же член Генерального Студенческого Совета. #nНесколько случайных хулиганов вряд ли станут для меня проблемой."
201040-13 = "Если кто и в опасности, так это Сенсей [USERNAME]..."
201040-17 = "...Хотя говорить об этом сейчас уже поздновато."
201040-18 = "Как бы то ни было, раз уж вы проделали весь путь до Генерального Студенческого Совета, #nпочему бы не зайти на минутку?"
201040-19 = "[s3] «Я ценю приглашение, но...»\n[s4] «Мне не стоит без дела заходить в кабинет к студенту...»"
201040-22 = "О чём вы вообще думаете!"
201040-23 = "Я лишь хотела попросить вас кое-что проверить. #n...Тот самый \"Посох Шакада\", о котором ранее говорила Кайя."
201040-24 = "Пусть для Кайи он и выглядит как обычные смарт-часы, #nно если на него посмотрите вы, то, возможно, сможете распознать его ценность, прямо как в случае с Сундуком Шиттима."
201040-25 = "Если это действительно артефакт, оставленный Президентом Генерального Студенческого Совета, #nон мог бы помочь справиться с хаосом в Кивотосе или, быть может..."
201040-26 = "Он мог бы стать ключом к поиску местонахождения Президента Генерального Студенческого Совета."
201040-27 = "Я хочу начать расследование как можно скорее."
201040-28 = "[s5] «Не думаю, что нужно так сильно спешить».\n[s6] «Прямо сейчас есть более важные вещи»."
201040-31 = "Что вообще может быть важнее, чем поиски Президента Генерального Студенческого Совета —"
201040-32 = "[s] «Выходной Рин»."
201040-36 = "[ns7] «Сегодня твой выходной, верно?»\n[ns8] «Так что давай оставим дела, связанные с работой, на потом»."
201040-39 = "...Я понимаю."
201040-40 = "Спасибо, что составили мне компанию сегодня. Пожалуйста, вы тоже отдохните, Сенсей."
201040-41 = "Тогда позвольте откланяться."
201040-46 = "Кладовая внутри кабинета Президента Генерального Студенческого Совета"
201040-50 = "Это... Ковчег."
201040-55 = "\"Посох Шакада\" находится внутри этого..."
201040-56 = "Внешне с ним всё в порядке, но... он заперт."
201040-57 = "...Что это?"
201040-58 = "Здесь знак, которого я никогда раньше не видела... его оставила не Президент Генерального Студенческого Совета. #nПочему..."
201040-59 = "Надпись гласит..."
201040-61 = "Этот — тот, кто ведёт вас из рая."
201040-63 = "Пароль принят. #nДоступ пользователя: исполняющая обязанности Президента Генерального Студенческого Совета, администратор Нанагами Рин."
201040-64 = "Доступ подтверждён. Голосовая верификация — 99% совпадения."
201040-65 = "...Проверка завершена. Снятие печати с Ковчега."
201040-70 = "Не верится, что он открылся так легко..."
201040-71 = "Это... \"Посох Шакада\"..."
201040-75 = "Выглядит точь-в-точь как обычные смарт-часы..."
201040-76 = "Как я и думала, мне стоит спросить Сенсея."
201040-80 = "Однако... для чего именно Президент использовала это и Сундук Шиттима?"
201040-81 = "Полагаю, только такой сверхчеловек, как ты, мог идеально контролировать мир..."
201040-82 = "И всё же... если ты не взрослый вроде Сенсея, #nнеужели запрещено даже приближаться к оставленным тобой фрагментам?"
201040-83 = "...Президент."
201040-84 = "В мире без тебя... у меня нет уверенности, что я справлюсь с твоей ролью."
201040-85 = "Если ты слышишь этот голос, пусть это будет даже ложью —"
201040-86 = "— Пожалуйста, скажи мне, что всё будет хорошо."
201040-87 = "Я..."
201040-95 = "...Рин-тян."
201040-96 = "Если бы я исчезла, что бы ты делала, Рин-тян?"
201040-97 = "Если вы планируете долгосрочный отпуск, пожалуйста, подавайте заявление за две недели."
201040-98 = "Да нет же, дело не в этом! Это гипотетически!"
201040-99 = "Если бы я не могла прийти в Генеральный Студенческий Совет из-за травмы или болезни —"
201040-100 = "Если бы я вдруг попала в аварию и пропала без вести, что бы ты делала, Рин-тян?"
201040-101 = "Такое трудно представить, но если бы подобное случилось..."
201040-102 = "...Мне бы пришлось нелегко."
201040-103 = "В конце концов, если Президент внезапно исчезнет, мой объём работы удвоится."
201040-104 = "Ужас какой! Даже в такой ситуации вы всё ещё говорите о работе?!"
201040-105 = "Конечно. Учитывая то количество дел, с которым справляется Президент —"
201040-106 = "Никто в Кивотосе не смог бы занять ваше место."
201040-107 = "...Это не так. #nЕсли приложить достаточно усилий, любой сможет добиться чего угодно. #nПравда, на это может уйти немного времени."
201040-108 = "Моя роль на самом деле не такая уж и важная."
201040-109 = "Но... есть одна вещь, которую не сможет заменить даже самый талантливый человек."
201040-110 = "И это..."
201040-113 = "...Рин."
201040-114 = "...Рин, пожалуйста, проснись."
201040-115 = "Администратор Нанагами Рин!!"
201040-116 = "...."
201040-117 = "Этот голос..."
201040-119 = "...Доброе утро."
201040-120 = "Ты вчера засиделась допоздна за работой?"
201040-121 = "Трудиться — это хорошо, но я много раз говорила тебе, что изнурять себя сверх меры контрпродуктивно."
201040-126 = "Вы..."
201040-127 = "...Кто вы?"
201040-128 = "Как вы сюда попали...?"
201040-129 = "О боже... неужели ты уже забыла меня? Не говори таких грустных вещей."
201040-130 = "Или ты всё ещё спишь на ходу?"
201040-132 = "Тогда позволь мне представиться снова."
201040-133 = "Я твой старый друг —"
201040-134 = "Глава Генерального Студенческого Совета, который управляет этим академическим городом, Кивотосом."
201040-135 = "Я Президент Генерального Студенческого Совета."
201040-137 = "Следующий эпизод;Ошибка памяти"