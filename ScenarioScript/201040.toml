[translation]
201040-1 = "Episode 4;Sky-Blue Nostalgia"
201040-2 = "(After the meeting with Kaya ended, I escorted Rin back to the General Student Council.)"
201040-7 = "...I believe I told you that you didn't need to see me off."
201040-8 = "If you're late getting home because of me—"
201040-9 = "[s1] \"Don't worry about it. I'm doing this because I want to.\"\n[s2] \"Besides, isn't it dangerous for you to be out alone at this hour?\""
201040-12 = "No matter how good I am at administrative work, I am still a member of the General Student Council. #nA few random delinquents are hardly a problem."
201040-13 = "If anything, it's [USERNAME]-sensei who is in danger...."
201040-17 = "...Though it's a bit late to be saying that now."
201040-18 = "Regardless, since you've come all the way to the General Student Council, #nwhy not stop by for a moment?"
201040-19 = "[s3] \"I appreciate the invitation, but....\"\n[s4] \"I shouldn't really be going into a student's office....\""
201040-22 = "What are you thinking!"
201040-23 = "I only wanted to ask you to verify something. #n...That \"Shale-cade Wand\" Kaya was talking about earlier."
201040-24 = "Even if it looks like an ordinary smartwatch to Kaya, #nif you are the one looking at it, you might be able to recognize its value, just like the Shittim Chest."
201040-25 = "If that truly is an OOPArt left behind by the General Student Council President, #nit could help resolve the chaos in Kivotos, or perhaps—"
201040-26 = "It could be the key to finding the whereabouts of the General Student Council President."
201040-27 = "I want to begin the investigation as soon as possible."
201040-28 = "[s5] \"I don't think there's any need to rush that much.\"\n[s6] \"There are more important things right now.\""
201040-31 = "What could possibly be more important than finding the General Student Council President—"
201040-32 = "[s] \"Rin's day off.\""
201040-36 = "[ns7] \"Today is your day off, right?\"\n[ns8] \"So, let's leave work-related matters for later.\""
201040-39 = "...I understand."
201040-40 = "Thank you for keeping me company today. Please get some rest as well, Sensei."
201040-41 = "Then, if you'll excuse me."
201040-46 = "Storage room inside the General Student Council President's office"
201040-50 = "This is... the Ark."
201040-55 = "The \"Shale-cade Wand\" is inside this...."
201040-56 = "It doesn't look like there's anything wrong with it, but... it's locked."
201040-57 = "...What is this?"
201040-58 = "There's a mark I've never seen before... this wasn't left by the General Student Council President. #nWhy...."
201040-59 = "The inscription reads...."
201040-61 = "This one is—the one who leads you from paradise."
201040-63 = "Password accepted. #nAccessing user: Acting General Student Council President, Administrative Officer Rin Nanagami."
201040-64 = "Access authorization confirmed. Voiceprint verification—99% match."
201040-65 = "...Verification complete. Unsealing the Ark."
201040-70 = "I can't believe it opened so easily...."
201040-71 = "This is... the \"Shale-cade Wand\"...."
201040-75 = "It only looks like an ordinary smartwatch...."
201040-76 = "As I thought, I should ask Sensei."
201040-80 = "However... between this and the Shittim Chest, what exactly did the President use these for?"
201040-81 = "I suppose only a superhuman like you could perfectly control the world...."
201040-82 = "Even so... if you aren't an adult like Sensei, #nis it forbidden to even approach the fragments you left behind?"
201040-83 = "...President."
201040-84 = "In a world without you... I don't have the confidence to fulfill your role."
201040-85 = "If you can hear this voice, even if it's a lie—"
201040-86 = "—Please tell me that everything is going to be okay."
201040-87 = "I...."
201040-95 = "...Rin-chan."
201040-96 = "If I were to disappear, what would you do, Rin-chan?"
201040-97 = "If you are considering a long-term leave, please submit an application two weeks in advance."
201040-98 = "No, that's not it! It's a hypothetical!"
201040-99 = "If I couldn't come to the General Student Council because of an injury or illness—"
201040-100 = "If I suddenly got into an accident and went missing, what would you do, Rin-chan?"
201040-101 = "It's hard to imagine, but if something like that were to happen...."
201040-102 = "...I would be a bit troubled."
201040-103 = "If the President were to suddenly disappear, my workload would double, after all."
201040-104 = "That's terrible! Even in that situation, you're still talking about work!?"
201040-105 = "Of course. Considering the amount of work the President handles—"
201040-106 = "No one in Kivotos could take your place."
201040-107 = "...That's not true. #nIf you try hard enough, anyone can achieve anything. #nIt might take a little time, though."
201040-108 = "My role isn't really that big of a deal."
201040-109 = "But... there is one thing that even the most talented person cannot replace."
201040-110 = "And that is...."
201040-113 = "...Rin."
201040-114 = "...Rin, please wake up."
201040-115 = "Administrative Officer Rin Nanagami!!"
201040-116 = "...."
201040-117 = "This voice is...."
201040-119 = "...Good morning."
201040-120 = "Were you working late yesterday?"
201040-121 = "It's good to work hard, but I've told you many times that pushing yourself too far is counterproductive."
201040-126 = "You are...."
201040-127 = "...Who are you?"
201040-128 = "How did you get in here...?"
201040-129 = "Oh my... have you already forgotten me? Don't say such lonely things."
201040-130 = "Or are you still half-asleep?"
201040-132 = "Then, let me introduce myself again."
201040-133 = "I am your old friend—"
201040-134 = "The head of the General Student Council that manages this academy city, Kivotos."
201040-135 = "I am the General Student Council President."
201040-137 = "Next Episode;Memory Error"