[translation]
1000108-1 = "Ferimento"
1000108-2 = "Enfermaria"
1000108-3 = "Por isso eu disse, não é um ferimento tão grave assim..."
1000108-4 = "Não precisa se preocupar, estou bem."
1000108-5 = "[s] \"Mas ainda está saindo sangue, não está?\""
1000108-6 = "É normal sangrar com um arranhão. É assim que a casca se forma e uma pele nova é criada."
1000108-7 = "Não foi isso que eu perguntei, foi? Então..."
1000108-8 = "[s] \"Eimi, você deveria cuidar melhor do seu próprio corpo.\""
1000108-9 = "Mas, se eu me preocupar com o meu corpo durante o combate, minha eficiência cai."
1000108-10 = "Se eu não avançar sem medo de me machucar, não consigo obter a eficiência máxima..."
1000108-11 = "Ai!"
1000108-12 = "Você me assustou passando o antisséptico de repente, Sensei."
1000108-13 = "Se eu não desinfetar direito, vai ficar uma cicatriz? Eu sei disso, mas..."
1000108-14 = "[s] Faço Eimi sentar e continuo a desinfecção."
1000108-19 = "...De alguma forma, estou um pouco envergonhada."
1000108-20 = "[s] \"Eu vou te tratar quantas vezes for preciso, mas não se machuque tanto.\""
1000108-21 = "Entendido, vou tomar cuidado a partir de agora."
1000108-24 = "(Mas, se for para continuar recebendo esse tipo de tratamento do Sensei... talvez me machucar de propósito não seja uma má ideia em termos de eficiência...)"
1000108-26 = "O que eu estou pensando? Não, não é nada."
1000108-28 = "Depois disso, coloquei um curativo no ferimento da Eimi e fomos embora."
