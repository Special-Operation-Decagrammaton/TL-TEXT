[translation]
1000108-1 = "傷"
1000108-2 = "保健室"
1000108-3 = "だから、そんなに大怪我じゃないのに……。"
1000108-4 = "心配しなくても大丈夫。"
1000108-5 = "[s] \"でも、まだ血が出てるよ？\""
1000108-6 = "擦り傷で血が出るのは当然。それでかさぶたができて、新しい肌が作られるんだから。"
1000108-7 = "そういうことを聞いたわけじゃない？だったら……。"
1000108-8 = "[s] \"エイミはもう少し、自分の体を大切にした方がいい。\""
1000108-9 = "でも、戦闘中に体のことに気を遣うと、効率が落ちる。"
1000108-10 = "怪我を恐れずに突撃しないと最高効率を得られな……"
1000108-11 = "痛っ！"
1000108-12 = "急に消毒薬を付けるから、びっくりしたよ、先生。"
1000108-13 = "きちんと消毒しないと痕になる？それは知ってるけど……。"
1000108-14 = "[s] エイミを座らせて消毒を続ける。"
1000108-19 = "……なんだか、少し恥ずかしい。"
1000108-20 = "[s] \"治療は何度でもするけど、あんまり怪我しちゃダメ。\""
1000108-21 = "分かった、これからは気を付ける。"
1000108-24 = "（でも、これからも先生にこうやって治療をしてもらえるんだったら……わざと怪我するのも、効率的には悪くないかも……）"
1000108-26 = "何を考えてるのか、って？ううん、なんでもない。"
1000108-28 = "その後、エイミの傷口に絆創膏を貼ってから帰った。"
