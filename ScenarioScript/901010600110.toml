[translation]#[Texto Final. - Filipe 05/07.]
901010600110-7 = "FOX2, acabei de entrar no ponto Alfa."
901010600110-11 = "Entendido. As outras também, reportem."
901010600110-17 = "FOX3 e FOX4 chegaram ao ponto Sierra."
901010600110-18 = "Vou ficar de olho no entorno igual da última vez e dar apoio remoto pra FOX2."
901010600110-20 = "……Entendido."
901010600110-21 = "O objetivo da operação de hoje é investigar o paradeiro do pescador desaparecido 'Miyaguchi' e descobrir a origem do boato."
901010600110-22 = "A maioria das pessoas do porto parece não ter ligação com o boato, mas pode ter algo que passou despercebido. Investigem com cuidado."
901010600110-24 = "Entendido!"
901010600110-27 = "Aliás, FOX1, na investigação de ontem você encontrou alguma prova nova?"
901010600110-28 = "Investigação de ontem……?"
901010600110-29 = "Sim. Você disse que tinha algo pra investigar e se ausentou de tarde, né?"
901010600110-30 = "Achei que era pra investigar o Caranguejo do Tambor…… mas não foi?"
901010600110-31 = "Ah…… aquilo de ontem."
901010600110-32 = "Não foi nada demais. Só um assunto pessoal."
901010600110-34 = "Hmm~ assunto pessoal, é."
901010600110-35 = "……O que foi, FOX3?"
901010600110-36 = "Nada não. Só que é a primeira vez que vejo a FOX1 se ausentar por um 'assunto pessoal'."
901010600110-37 = "Será que teve alguma mudança de coração?"
901010600110-38 = "A Yukino mudou por causa do [USERNAME]――"
901010600110-39 = "――Assunto pessoal fora da operação é aqui."
901010600110-40 = "Então, FOX2. Fico na sua mão."
901010600110-41 = "Fufu, então vamos começar."