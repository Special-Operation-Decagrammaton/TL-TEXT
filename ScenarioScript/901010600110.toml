[translation]
901010600110-7 = "FOX2, acabei de entrar no Ponto Alfa."
901010600110-11 = "Entendido. Os outros membros também reportem."
901010600110-17 = "FOX3 e FOX4 chegaram ao Ponto Sierra."
901010600110-18 = "Vamos dar apoio remoto à FOX2, vigiando os arredores, como da última vez."
901010600110-20 = "... Entendido."
901010600110-21 = "O objetivo da operação de hoje é investigar o paradeiro do pescador desaparecido 'Miyaguchi' e descobrir a origem dos boatos."
901010600110-22 = "A maioria dos trabalhadores do porto parece não estar envolvida com os boatos, mas pode haver exceções. Investiguem minuciosamente."
901010600110-24 = "Entendido!"
901010600110-27 = "Aliás, FOX1, teve alguma nova evidência na investigação de ontem?"
901010600110-28 = "Investigação de ontem...?"
901010600110-29 = "É. Ontem você disse que tinha algo para investigar e se ausentou à tarde, não foi?"
901010600110-30 = "Pensei que você tinha ido atrás do Caranguejo do Tambor... foi outra coisa?"
901010600110-31 = "Ah... isso."
901010600110-32 = "Nada de especial. Só um assunto pessoal."
901010600110-34 = "Hmm~ 'assunto pessoal', hein."
901010600110-35 = "... O que foi, FOX3?"
901010600110-36 = "Nada, só acho estranho você se ausentar para um 'assunto pessoal'."
901010600110-37 = "Mudou de ideia, foi?"
901010600110-38 = "O que mudou a Yukino foi a chegada do [USERNAME] professor –"
901010600110-39 = "– Chega de conversa fora do assunto."
901010600110-40 = "Então, FOX2. Fico na sua dependência."
901010600110-41 = "Fufu, então vamos começar."