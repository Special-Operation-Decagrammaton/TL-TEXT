[translation]
901010600110-7 = "FOX2, I have entered Point Alpha."
901010600110-11 = "Understood. The other squad members are to report as well."
901010600110-17 = "FOX3 and FOX4 have arrived at Point Sierra."
901010600110-18 = "We'll provide remote support for FOX2 while keeping an eye on the perimeter, just like last time."
901010600110-20 = "……Understood."
901010600110-21 = "Our objective for today is to investigate the whereabouts of the missing fisherman, Miyaguchi, and determine the source of the rumors."
901010600110-22 = "Most of the port staff seem unrelated to the rumors, but there may be something we've overlooked. Investigate thoroughly."
901010600110-24 = "Understood!"
901010600110-27 = "Come to think of it, FOX1, did you find any new evidence during your investigation yesterday?"
901010600110-28 = "Yesterday's investigation……?"
901010600110-29 = "Yeah. You stepped out yesterday afternoon because you had something you wanted to investigate, right?"
901010600110-30 = "I thought you went to look into the Drum Can Crabs…… was I wrong?"
901010600110-31 = "Ah…… about yesterday."
901010600110-32 = "It was nothing of note. Just a strictly personal matter."
901010600110-34 = "Oh? A 'personal matter,' huh?"
901010600110-35 = "……What is it, FOX3?"
901010600110-36 = "Nothing. It's just the first time I've seen FOX1 step out for a 'strictly personal matter.'"
901010600110-37 = "Did you have a change of heart or something?"
901010600110-38 = "Yukino changed because Sensei arrived—"
901010600110-39 = "—That's enough idle chatter unrelated to the mission."
901010600110-40 = "FOX2, I'm counting on you."
901010600110-41 = "Hehe, alright then. Let's get started."