[translation]
1010603-1 = "outro eu"

1010603-2 = "(Sakurako me contatou e eu fui até o local do encontro)"

1010603-5 = "...Você está aqui, senhor?"

1010603-9 = "[ns1] \"...É isso.\"\n[ns2] \"Você está vestido como sempre hoje.\""

1010603-12 = "……sim."

1010603-13 = "Na verdade, há uma razão."

1010603-14 = "Também afeta o conteúdo da consulta."

1010603-18 = "……Sensei."

1010603-19 = "Eu sempre ajo prestando atenção ao que as pessoas ao meu redor pensam."

1010603-20 = "Isso veio naturalmente para mim durante meu tempo como irmã."

1010603-21 = "Tudo isso é feito para evitar qualquer transtorno para você."

1010603-22 = "Mesmo que fosse apenas uma pequena tarefa, tive o cuidado de me comportar como uma irmã #n."

1010603-23 = "Diz-se que uma pessoa faz jus ao seu uniforme... #nMas...."

1010603-24 = "O que aconteceu comigo foi que depois da aula acabei indo para casa com minha fantasia de ídolo."

1010603-25 = "Então, no caminho para casa, conheci uma nova irmã."

1010603-26 = "Como sempre, queria dizer olá para você..."

1010603-31 = "[ns3] \"...O que há de errado nisso?\"\n[ns4] \"Há algum problema...?\""

1010603-34 = "Bem, isso é verdade."

1010603-35 = "Essa pessoa não ouviu falar sobre suas atividades como ídolo?"

1010603-36 = "Eles não perceberam que eu era da Irmandade."

1010603-37 = "e……."

1010603-38 = "A conversa continuou porque eu me enganei por ser um aluno diferente da mesma idade."

1010603-39 = "Tentei esclarecer o mal-entendido dizendo meu nome, mas ela parecia pensar que era \"Sakura\" e não \"Sakurako\"..."

1010603-40 = "Simples assim, fizemos karaokê juntos por três horas..."

1010603-41 = "[s5] \"...Ah.\"\n[s6] \"Hum...\""

1010603-44 = "Muitas vezes pedi oportunidade para explicar, mas não encontrei o momento certo...!"

1010603-48 = "Mais do que tudo, provavelmente foi porque ela estava vestindo uma roupa de ídolo..."

1010603-49 = "Comecei a agir como se não estivesse como sempre."

1010603-50 = "Mesmo quando nos separamos, ele me chamou de \"Sakura-chan\"..."

1010603-51 = "Trocamos informações de contato, mas o que devo fazer?"

1010603-52 = "Acho que ainda não estou ciente disso porque não troquei muitas informações de contato com ninguém da Irmandade."

1010603-53 = "Além disso, eles até prometeram se encontrar novamente..."

1010603-59 = "\"Sakura-chan, vejo você novamente no domingo!\""

1010603-61 = "\"Vou convidar meus outros amigos também! Eles estão ansiosos pela música da Sakura-chan!\""

1010603-63 = "\"Entrarei em contato com você novamente~\""

1010603-68 = "[ns7] \"\"Katazumi Sakura-chan\"... \"\n[ns8] \"Muito popular. \""

1010603-71 = "Eca..."

1010603-72 = "Gostaria de me desculpar por ter enganado você, mas..."

1010603-73 = "Eu estava preocupado que, se revelasse a verdade, me machucaria."

1010603-74 = "...Se ao menos eu tivesse ido para casa depois de me trocar."

1010603-75 = "... Huh?"

1010603-76 = "Ah, é isso..."

1010603-77 = "Não há realmente nenhum problema?"

1010603-78 = "Porém, mesmo se eu disser que falo normalmente..."

1010603-79 = "[s9] \"Sakurako como sempre está bem!\"\n[s10] \"Tenho certeza que vai ficar bem!\""

1010603-82 = "Nunca pensei que funcionaria tão facilmente..."

1010603-83 = "Eu sei o que você sente por mim."

1010603-87 = "……Sensei."

1010603-88 = "Oh sério..."

1010603-89 = "...Está tudo bem?"

1010603-90 = "Concordo……."

1010603-91 = "Se você vai confiar em mim, quanto mais cedo melhor."

1010603-92 = "A situação é diferente do habitual."

1010603-93 = "シスターフッドの歌住サクラコではなく、私個人の問題。"
1010603-94 = "本当のことをお伝えしたとしても……。"
1010603-95 = "A Irmandade não será incomodada. #nEste é um problema pelo qual devo assumir a responsabilidade."

1010603-96 = "[s11] \"Eu também acho que está tudo bem.\"\n[s12] \"Se você for honesto comigo, tenho certeza que vai entender.\""

1010603-99 = "Então, como disse a Senseia..."

1010603-100 = "Muuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuuu..."

1010603-106 = "Eu entrei em contato com você. #nGostaria de conhecê-lo pessoalmente e pedir desculpas."

1010603-107 = "... Ufa."

1010603-108 = "Pode ser que já faça muito tempo que não estou tão nervoso."

1010603-109 = "Obrigado, senhor."

1010603-110 = "Graças a todos que me incentivaram, ganhei coragem."

1010603-111 = "Você me ajudou novamente."

1010603-112 = "Pois bem...."

1010603-113 = "Informaremos sobre isso mais tarde."

1010603-115 = "(Ele encorajou Sakurako, que estava nervosa, e depois voltou para a placa de Petri.)"

