[translation]
1010603-1 = "もう一人の私"
1010603-2 = "（サクラコに連絡をもらい、待ち合わせ場所に向かった）"
1010603-5 = "……いらっしゃいましたか、先生。"
1010603-9 = "[ns1] \"……あれ。\"\n[ns2] \"今日はいつもの格好なんだね。\""
1010603-12 = "……はい。"
1010603-13 = "実は理由がありまして。"
1010603-14 = "相談の内容にも関わっているのです。"
1010603-18 = "……先生。"
1010603-19 = "私は常に、周囲の目を気にしながら行動しております。"
1010603-20 = "これはシスターとして過ごすうえで、自然と身についてきました。"
1010603-21 = "すべては、皆様にご迷惑をかけないため。"
1010603-22 = "ちょっとした用事であっても、#nシスターとして振る舞うよう気をつけておりました。"
1010603-23 = "人は制服通りの人間になると申しますから……。#nですが……。"
1010603-24 = "私としたことが、レッスンを終えてからアイドル衣装のまま帰路についてしまったのです。"
1010603-25 = "そこで、帰り道に新しく入ったシスターの方とお会いしまして。"
1010603-26 = "いつものように、お声がけしたのですが……。"
1010603-31 = "[ns3] \"……それがどうかしたの？\"\n[ns4] \"何か問題でも……？\""
1010603-34 = "ええとですね。"
1010603-35 = "その方は、アイドル活動について聞いていないのか……。"
1010603-36 = "私がシスターフッドの者だと気づかなかったのです。"
1010603-37 = "そして……。"
1010603-38 = "別人の同い年の生徒だと勘違いされたまま、話が進んでしまいました。"
1010603-39 = "誤解を解こうと思い名前をお伝えしたのですが、#n「サクラコ」ではなく「サクラ」だと思われたようで……。"
1010603-40 = "そのまま、一緒にカラオケを三時間も……。"
1010603-41 = "[s5] \"……あっ。\"\n[s6] \"えっと……。\""
1010603-44 = "説明する機会を何度も伺ったのですが、タイミングが掴めず……！"
1010603-48 = "何よりも、アイドル衣装を着ていたせいか……。"
1010603-49 = "いつもの自分ではないような振る舞いをしてしまいました。"
1010603-50 = "別れ際も、「サクラちゃん」と呼ばれ……。"
1010603-51 = "連絡先を交換したのですが、どうすれば良いものでしょう。"
1010603-52 = "シスターフッドの方とあまり連絡先を交換していないので、#n今も気づいていないと思います。"
1010603-53 = "しかも、また会う約束までしてしまい……。"
1010603-59 = "\"サクラちゃん、日曜また会おうね！\""
1010603-61 = "\"ほかの友達も呼んでおくよ！サクラちゃんの歌楽しみにしてるって！\""
1010603-63 = "\"また連絡するね～\""
1010603-68 = "[ns7] \"「歌住サクラちゃん」……。\"\n[ns8] \"大人気だね。\""
1010603-71 = "うぅっ……。"
1010603-72 = "不本意ながら騙す形になってしまい、謝罪をしたいのですが……。"
1010603-73 = "本当のことを打ち明けて、傷ついてしまわないか心配でして。"
1010603-74 = "……私が着替えてから帰っていれば。"
1010603-75 = "……へっ？"
1010603-76 = "そ、そんな……。"
1010603-77 = "本当に、問題ないのでしょうか？"
1010603-78 = "ですが、普通に話すと言っても……。"
1010603-79 = "[s9] \"いつも通りのサクラコで良いんだよ！\"\n[s10] \"きっと大丈夫だから！\""
1010603-82 = "そんな簡単にうまくいくとは……。"
1010603-83 = "私がどう思われているのかくらい、知っております。"
1010603-87 = "……先生。"
1010603-88 = "ほ、本当に……。"
1010603-89 = "……大丈夫なのでしょうか？"
1010603-90 = "そうですね……。"
1010603-91 = "打ち明けるのなら、早いほうが良いに決まっています。"
1010603-92 = "いつもとは、状況も違うわけですし。"
1010603-93 = "シスターフッドの歌住サクラコではなく、私個人の問題。"
1010603-94 = "本当のことをお伝えしたとしても……。"
1010603-95 = "シスターフッドの皆様にご迷惑はかからないでしょう。#nこれは私が責任を負うべき問題ですから。"
1010603-96 = "[s11] \"私も大丈夫だと思うよ。\"\n[s12] \"正直に話せば分かってくれるはずだよ。\""
1010603-99 = "では、先生の仰る通り……。"
1010603-100 = "すぅ、はぁー……。"
1010603-106 = "連絡しました。#n直接お会いして、謝ろうと思います。"
1010603-107 = "……ふぅ。"
1010603-108 = "こんなに緊張するのは、久しぶりかもしれません。"
1010603-109 = "ありがとうございます、先生。"
1010603-110 = "背中を押していただいたおかげで、勇気が出ました。"
1010603-111 = "また助けられてしまいましたね。"
1010603-112 = "では……。"
1010603-113 = "後ほど、ご報告いたします。"
1010603-115 = "（緊張していたサクラコを励ましてから、シャーレに戻った）"
