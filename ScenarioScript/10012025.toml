[translation]
10012025-3 = "こ、こいつらめちゃくちゃ強いじゃん！総員退却！！"
10012025-7 = "うちらが負けるなんて信じらんない！向こう二人しかいないのに！？"
10012025-8 = "ぐっ……うちらジャブジャブヘルメット団がやられるなんて……！"
10012025-9 = "強敵ってわけね……！"
10012025-10 = "でも諦めるわけには……！！"
10012025-14 = "あっ、アイタタタッ！"
10012025-15 = "い、痛い！痛いってば！"
10012025-16 = "くっそー！覚えてなさいよ！"
10012025-17 = "うちらがこのまま諦めると思わないでよね……！！"
10012025-22 = "あいつら……いったい何なの……？"
10012025-23 = "暴れるだけ暴れて、どっか行くなんて……。"
10012025-24 = "……あ～あ。せっかく片付けたのに、振り出しに戻っちゃった。"
10012025-25 = "皆になんて言おうねぇ……。"
10012025-29 = "ただいま戻りましたよ～☆"
10012025-30 = "……先輩たち！？"
10012025-31 = "ナイスタイミングだねぇ。"
10012025-36 = "備品は全部運び出せた。特に壊れたものもなく、無事だったよ。"
10012025-37 = "セリカちゃんたちの方、お片付けは順調です……"
10012025-39 = "……？"
10012025-46 = "ちょ、ちょっと待って！"
10012025-47 = "掃除は終わってる、いや終わってたのよ！先輩と先生とやってたの！"
10012025-48 = "終わってたんだけど、こうなってるのには理由があって……！"
10012025-50 = "セリカちゃん……。"
10012025-51 = "二人で片付けるには広すぎましたからね……大丈夫ですよ。"
10012025-52 = "……ん、今からみんなで手分けすればすぐ終わる。"
10012025-53 = "ほ、本当だってば！？掃除をサボってたんじゃなくて……！"
10012025-54 = "まぁまぁ、今から一緒に片付ければいいんですよ。"
10012025-55 = "みんなで頑張りましょう～☆"
10012025-57 = "本当だってばぁぁぁぁー！！"
10012025-59 = "（その後、掃除が終わってからこれまでの事についてゆっくり説明した）"
10012025-61 = "うう、肩痛い……赤くなってるじゃん……。"
10012025-62 = "やっぱこのままじゃ厳しいよ……どうしよう隊長……？"
10012025-63 = "もう戻る……？他の島を探してみるとか……？"
10012025-65 = "……今、なんて？"
10012025-67 = "ひ、ひいっ……な、何も……。"
10012025-68 = "しょうがないじゃん……！今のうちらじゃ歯がたたないよ。"
10012025-69 = "それにあいつら、まだ仲間がいそうだったし……。"
10012025-71 = "……そうね。"
10012025-72 = "……じゃあ、あんま気が向かないけど……。"
10012025-74 = "……うちらも増員呼ぶとすっかぁ。"
