[translation]
10012025-3 = "E-esses caras são incrivelmente fortes! Recuar, todo mundo!!"
10012025-7 = "Não acredito que perdemos! E eles só estavam em dois!?"
10012025-8 = "Droga... pensar que nós, o Bando do Capacete Jabu-Jabu, seríamos derrotados assim...!"
10012025-9 = "Então eles são inimigos formidáveis...!"
10012025-10 = "Mas não posso desistir agora...!!"
10012025-14 = "Ai, ai, ai!"
10012025-15 = "D-dói! Eu disse que dói!"
10012025-16 = "Droga! Vocês me pagam!"
10012025-17 = "Não pensem que vamos desistir assim tão fácil...!!"
10012025-22 = "Quem diabos são eles...?"
10012025-23 = "Fizeram toda essa bagunça e simplesmente foram embora..."
10012025-24 = "...Ah, droga. Tínhamos acabado de arrumar tudo e voltamos à estaca zero."
10012025-25 = "O que vamos dizer para as outras..."
10012025-29 = "Voltamos!☆"
10012025-30 = "...Senpais!?"
10012025-31 = "Que timing perfeito."
10012025-36 = "Conseguimos transportar todos os equipamentos. Nada foi quebrado, está tudo bem."
10012025-37 = "A limpeza de vocês, Serika-chan e as outras, está indo bem..."
10012025-39 = "...?"
10012025-46 = "E-espera um pouco!"
10012025-47 = "A limpeza já tinha acabado, não, quer dizer, estava acabando! Eu estava fazendo com a Senpai e o Sensei!"
10012025-48 = "Já estava tudo pronto, mas tem um motivo para estar assim agora...!"
10012025-50 = "Serika-chan..."
10012025-51 = "Era grande demais para apenas duas pessoas limparem... Está tudo bem."
10012025-52 = "...Hum, se dividirmos o trabalho agora, terminaremos rápido."
10012025-53 = "É-é verdade, eu juro! Não estávamos enrolando na limpeza...!"
10012025-54 = "Bem, bem, é só começarmos a limpar juntas agora."
10012025-55 = "Vamos nos esforçar juntas!☆"
10012025-57 = "Eu estou falando a verdadeeeee!!"
10012025-59 = "(Depois disso, quando a limpeza terminou, explicamos tudo o que aconteceu com calma)"
10012025-61 = "Ugh, meu ombro dói... está até vermelho..."
10012025-62 = "Como eu pensei, desse jeito não vai dar... O que a gente faz, capitã...?"
10012025-63 = "Vamos voltar...? Ou procurar outra ilha...?"
10012025-65 = "...O que você disse agora?"
10012025-67 = "I-iiih... n-nada..."
10012025-68 = "Não tem como evitar...! Do jeito que estamos, não somos páreo para eles."
10012025-69 = "Além disso, parecia que eles ainda tinham mais aliados..."
10012025-71 = "...É verdade."
10012025-72 = "...Bem, não estou muito animada com isso, mas..."
10012025-74 = "...Acho que vamos ter que chamar reforços também."
