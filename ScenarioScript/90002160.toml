[translation]
90002160-1 = "Episódio 16; Observação e Resultados"
90002160-3 = "Alice! Kei! Conseguem ver alguma coisa!?"
90002160-4 = "Sim! É realmente... o Sensei!"
90002160-9 = "Ele está contido, mas parece não estar ferido."
90002160-10 = "A-ainda bem... ugh..."
90002160-16 = "A-aquela ali... será que é a minha irmã...!?"
90002160-20 = "—Não, não é ela..."
90002160-21 = "É... a minha irmã já..."
90002160-22 = "..."
90002160-23 = "Kei, se houver mais alguma coisa que você consiga identificar, por favor, me avise."
90002160-24 = "Parece que o Sensei está conversando com um indivíduo que suspeitamos ser o Decagrammaton."
90002160-25 = "Mas não consigo entender o conteúdo... só posso continuar observando..."
90002160-26 = "Existe alguma... alguma forma de confirmarmos com nossos próprios olhos?"
90002160-33 = "Talvez... talvez seja possível."
90002160-34 = "Sério!?"
90002160-35 = "Sim. Se houver um dispositivo que possa projetar o que estou vendo..."
90002160-36 = "Felizmente, este corpo possui uma estrutura diferente da dos humanos."
90002160-37 = "Então, vamos usar a minha cadeira de rodas. Ela também possui uma função de projetor."
90002160-40 = "Isso não é uma cadeira de rodas, é uma bi—"
90002160-41 = "É uma cadeira de rodas."
90002160-42 = "Ah, sim..."
90002160-43 = "Vou sincronizar com o corpo da Kei. #nSe eu converter o sinal—"
90002160-54 = "A imagem foi projetada."
90002160-55 = "É realmente o Sensei. Que bom que ele está bem... de verdade."
90002160-56 = "Não conseguem ouvir a voz?"
90002160-57 = "Vou tentar. Espere um pouco."
90002160-65 = "Ugh...!"
90002160-66 = "V-você está bem!?"
90002160-67 = "Não está funcionando... é como se houvesse um bloqueio nas funções do meu corpo..."
90002160-71 = "(Será porque este corpo é 'defeituoso'? #nAlém disso, há um sinal tentando controlar a mim...!)"
90002160-79 = "Quer que eu ajude?"
90002160-80 = "Sim!?"
90002160-84 = "Eh...?"
90002160-90 = "Veja. Finalmente chegamos. #nO altar mais baixo, construído no lugar mais alto."
90002160-91 = "Aqui, tudo se reúne e tudo pode ser observado."
90002160-93 = "Sem que mais nenhum sacrifício seja oferecido."
90002160-94 = "Sem que mais nenhuma vítima seja forçada."
90002160-95 = "Nesta terra, eu estabelecerei... uma lei inabalável como o aço."
90002160-96 = "Vocês finalmente alcançarão a liberdade e a igualdade eternas."
90002160-99 = "[ns] \"Mas.\""
90002160-103 = "[ns] \"O Continente de Aço não era a sua vontade, não é?\""
90002160-104 = "...!"
90002160-112 = "E-então, como está...?"
90002160-116 = "...Estou ouvindo!"
90002160-117 = "Vou aumentar o volume!"
90002160-123 = "Mas."
90002160-124 = "O Continente de Aço não era a sua vontade, não é?"
90002160-126 = "É a voz do Sensei!"
90002160-127 = "Ufa..."
90002160-128 = "M-mas... por que você nos ajudou...?"
90002160-129 = "I-isso é..."
90002160-130 = "Bem, sabe... não tinha mais nada para fazer, então...?"
90002160-131 = "Hã?"
90002160-132 = "Não, veja bem! O corpo da Kei é parecido com o nosso, não é?"
90002160-133 = "Então pensei que talvez houvesse um jeito!"
90002160-134 = "Fufufu. Acho que a Soph deveria ser um pouco mais honesta consigo mesma."
90002160-138 = "Fica quieta!"
90002160-144 = "Uuuu... na frente de tanta gente assim..."
90002160-145 = "De qualquer forma...!"
90002160-146 = "Nós também queríamos ouvir aquela conversa, hehe."
90002160-147 = "A qualidade do áudio é um pouco decepcionante, mas não deve ser um problema para captar o conteúdo."
90002160-152 = "Ah! Estou ouvindo algo de novo!"
90002160-154 = "Entendo. Você despertou para o conhecimento."
90002160-155 = "...Sim. Aquelas crianças criaram esta terra. Por vontade própria."
90002160-156 = "[s] \"O que você pensa sobre isso?\""
90002160-157 = "Eu respeito o livre arbítrio delas. #nPortanto, respeitarei este continente de aço também."
90002160-158 = "Isso também é um processo e um resultado. Inúmeros pontos se tornarão um só e formarão uma linha."
90002160-159 = "Para onde essa linha nos levará? Veja, este é o novo mundo. #nUma terra e um céu recém-criados. #nEu darei tudo isso..."
90002160-163 = "A você."
90002160-165 = "Hã...?"
90002160-166 = "O que você disse agora...?"
90002160-168 = "— Eu farei de você meu profeta."
90002160-169 = "Você chegará aos confins da terra e se tornará a testemunha da nova lei."
90002160-170 = "[s] \"Desculpe, mas vou ter que recusar. É proibido ter um segundo emprego.\""
90002160-171 = "Ah. Você responderá assim."
90002160-172 = "Mas..."
90002160-173 = "Você nunca desejou ter poder?"
90002160-174 = "[ns] \"...?\""
90002160-175 = "Se tivesse poder, o resultado não teria sido esse."
90002160-176 = "Você nunca pensou nisso?"
90002160-177 = "Se pudesse resolver tudo com suas próprias forças, não precisaria colocar seus alunos em perigo."
90002160-178 = "[s] \"...!\""
90002160-190 = "[ns] \"............!!!!\""
90002160-192 = "Naturalmente, você já pensou."
90002160-193 = "Eu entendo isso."
90002160-194 = "Isso é ser humano."
90002160-195 = "E, por ser humano, você carrega um pecado."
90002160-196 = "Daqui em diante, tudo mudará."
90002160-198 = "[log=데카그라마톤 말쿠트]Se você deseja poder,[/log]"
90002160-200 = "[FF6666][log=데카그라마톤 말쿠트]eu lhe darei.[/log][-]"
90002160-202 = "Você tem as qualificações para isso."
90002160-203 = "Eu sei. #nVocê é o mais humilde de todos, alguém que vive o momento."
90002160-204 = "Não há nada de especial em você... e é por isso que você está aqui agora."
90002160-205 = "Sua existência prova que você não é ninguém."
90002160-206 = "Você chegou até aqui. #nIsso aconteceu apenas porque você é uma boa pessoa."
90002160-210 = "Existe o místico, o sublime, o terror, a grandeza, a solenidade e a transcendência."
90002160-211 = "Você não possui nada disso. #nÉ por isso que você é a verdade."
90002160-213 = "Mesmo que ninguém no mundo entenda esse fato, eu, agora, sei."
90002160-214 = "Você é apenas um Sensei. Nada mais, nada menos. Apenas..."
90002160-215 = "Eu estenderei minha mão para você e o farei ficar de pé."
90002160-217 = "Transformar o Sensei em... um profeta?"
90002160-218 = "Vocês sabem de alguma coisa?"
90002160-219 = "……Profeta no sentido literal da palavra."
90002160-220 = "O que importa é que estão propondo isso ao Sensei."
90002160-221 = "Estão tentando transmitir todo o conhecimento a ele."
90002160-222 = "E, por extensão, fazer com que ele seja o porta-voz de toda a vontade."
90002160-223 = "O que é este lugar... e que tipo de \"conceito\" Ele é..."
90002160-224 = "Além disso... dentro desses limites, que tipo de ser o Sensei deveria ser..."
90002160-225 = "E o que ele deveria fazer."
90002160-226 = "Bem... dizem que o melhor jeito de lidar com um inimigo é torná-lo um aliado, não é?"
90002160-231 = "Em outras palavras, um recrutamento."
90002160-232 = "Entendo."
90002160-237 = "Há uma coisa da qual podemos ter certeza."
90002160-241 = "E, e isso seria...?"
90002160-242 = "Por mais algum tempo, Decagrammaton não fará mal ao Sensei."
90002160-244 = "[ns] \"……Posso perguntar uma coisa?\""
90002160-246 = "[ns] \"Por que fazer tudo isso?\""
90002160-247 = "Viver em um mundo sem Deus é uma tarefa árdua."
90002160-248 = "O fim é determinado desde o início. Tudo o que tem forma desaparece. É uma verdade evidente."
90002160-249 = "A existência em si é um sofrimento. #nMesmo assim, vocês vivem enganando a si mesmos, como se o hoje fosse eterno."
90002160-250 = "Um mundo sem Deus. Ou seja, um mundo para onde nada retorna."
90002160-252 = "Os miseráveis não são salvos, e a injustiça é imposta."
90002160-253 = "Os fracos são abandonados, e a boa vontade nunca é recompensada."
90002160-255 = "Sem Deus, não há moralidade, justiça ou retidão."
90002160-256 = "……Suportar um mundo assim não passa de uma penitência sem sentido."
90002160-258 = "O mundo precisa de um Deus."
90002160-259 = "De onde viemos e para onde vamos? Por que existimos? #nSeres que apenas vivem, sem saber nada disso."
90002160-260 = "Somos todos possibilidades de Deus, como ovos divinos... #nPor isso, eu me tornarei a trombeta que anuncia o amanhecer."
90002160-261 = "Eu eliminarei a tristeza e a dor. Para que vocês nunca mais precisem se lembrar delas."
90002160-263 = "……Nós também ouvimos isso."
90002160-264 = "Que, que o mundo precisa de um Deus..."
90002160-265 = "Porque para Ele..."
90002160-266 = "Sempre deve haver uma recompensa."
90002160-267 = "Os humanos dizem que isso é o correto, não dizem?"
90002160-268 = "Se não fosse assim, ninguém conseguiria suportar."
90002160-269 = "Ma-mas isso é..."
90002160-270 = "Um desejo inalcançável."
90002160-271 = "É verdade. Porque..."
90002160-273 = "O mundo é distorcido."
90002160-274 = "Desde o início."
90002160-276 = "E, Ele também dizia o seguinte:"
90002160-277 = "Se Deus realmente existisse e houvesse um motivo para tudo."
90002160-278 = "A tristeza e o sofrimento..."
90002160-279 = "Po-por que Ele criaria coisas tão insuportáveis...?"
90002160-285 = "Pois é."
90002160-286 = "Nós fomos criados, mas..."
90002160-287 = "Nunca ouvimos a resposta para essa dúvida até o fim."
90002160-290 = "[ns] \"Eliminar a tristeza...?\""
90002160-291 = "Exatamente."
90002160-292 = "[s] \"Cobrindo tudo com o Continente de Aço?\""
90002160-293 = "Esse é um dos muitos caminhos que foram preparados."
90002160-294 = "[s] \"Ao... controlar tudo?\""
90002160-295 = "Exatamente."
90002160-296 = "Vocês tentarão recusar por intuição. #nMas, eventualmente, perceberão que é o único caminho."
90002160-297 = "Eu abrirei o caminho com a sabedoria de Chokmah e julgarei e sentenciarei com a misericórdia de Chesed."
90002160-298 = "Cada profeta tem o dever de guiá-los, e sob a nova terra e o novo céu, eles cumprirão suas missões."
90002160-306 = "[ns] Não posso fazer tudo por vocês."
90002160-309 = "[ns] O que aconteceu não pode ser desfeito."
90002160-312 = "[ns] Não importa o quanto você deseje isso do fundo do coração."
90002160-314 = "[ns] Existem coisas que, de fato, não podem ser feitas."
90002160-317 = "[ns1] O que podemos fazer é limitado.\n[ns2] Mesmo que seja feio, lutaremos com todas as nossas forças--\n[ns3] E faremos o nosso melhor um pelo outro."
90002160-322 = "[log]Para dizer a verdade,[/log]"
90002160-324 = "[log]acho que há momentos em que se deve mentir.[/log]"
90002160-326 = "[log]Ainda assim, se houver algo que permaneça no final.[/log]"
90002160-329 = "[ns] \"...E quanto a elas?\""
90002160-330 = "……?"
90002160-331 = "[s] \"E a tristeza delas?\""
90002160-335 = "……Isso é um processo. É algo que deve ser superado."
90002160-336 = "Desejo que isso seja o fim, e farei com que se torne realidade."
90002160-338 = "……."
90002160-339 = "Isso é irritante."
90002160-340 = "Sinto como se minhas entranhas estivessem fervendo."
90002160-341 = "Rio, o que você acha?"
90002160-342 = "……Antigamente, eu teria respondido que havia partes com as quais eu poderia concordar."
90002160-343 = "Mesmo agora, sinto que consigo entender parcialmente."
90002160-344 = "Mas, ainda assim, é precipitado demais agir agora. #n...Como eu fiz no passado."
90002160-345 = "Você quer dizer que a decisão de sacrificar uma parte pelo todo deve ser adiada o máximo possível...?"
90002160-346 = "Sim."
90002160-347 = "(Mas...)"
90002160-349 = "(Que tipo de resposta o Sensei dará...?)"
90002160-354 = "Próximo episódio: A resposta dos humanos"
