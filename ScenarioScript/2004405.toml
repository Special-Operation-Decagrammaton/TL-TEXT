[translation]
2004405-1 = "怪しいトレーニング"
2004405-3 = "お待ちしていました、トレーナー。"
2004405-4 = "[s] \"見てほしいものって？\""
2004405-5 = "こちらです。"
2004405-10 = "[ns] \"これは……？\""
2004405-12 = "マネージャーさんからのお手紙です。"
2004405-13 = "詳細に書かれていますが、要約しますと……。"
2004405-14 = "[s] \"スミレと専属契約を結びたいんだね？\""
2004405-15 = "はい、その通りです。"
2004405-16 = "それだけならお断りするつもりでしたが……"
2004405-17 = "契約以外にも、こんな提案が。"
2004405-18 = "私に「売り子さんと健康に！元気倍増スペシャルフィットネス！」を行ってほしいと！"
2004405-19 = "[s] \"す、スミレにしかできない案件だ！\""
2004405-20 = "私も自分に向いていると思います。"
2004405-21 = "ですが、トレーニング部の部長としての仕事もあり……"
2004405-22 = "本来はそちらに集中するべきなのかもしれませんね……。"
2004405-23 = "でも、それはできません！"
2004405-24 = "そこにトレーニングを必要とする人がいるなら、私は行きます！"
2004405-25 = "[s] \"提案を受けるのは、決定済みなんだね……！\""
2004405-26 = "あっ……つい熱くなってしまいました。すみません、トレーナー。"
2004405-27 = "それで、ここからがご相談したいことなのですが……"
2004405-28 = "これがなかなかに難しい問題で……"
2004405-29 = "この場合、トレーニングウェアと売り子の制服、どちらがいいのでしょう？"
2004405-31 = "（スミレらしい悩みだなと思いつつ……）"
2004405-32 = "（二人で一緒に、スタジアムへと向かった）"
2004405-38 = "おお、スミレさん！お待ちしていました！"
2004405-39 = "こんにちは、マネージャーさん。わざわざのお迎えありが……"
2004405-40 = "……スミレさん？気になることでも？"
2004405-41 = "マネージャーさん、ダイエットにご興味はありますか？"
2004405-42 = "い、いえ、私は太ってもいませんし……。"
2004405-43 = "「食事管理」はダイエットのためのものと考えられがちですが……"
2004405-44 = "トレーニング種目の一つと言っても過言ではありません！"
2004405-45 = "バルクアップを図るなら、"
2004405-46 = "高タンパクで良質な、炭水化物を意識した食事メニューが必要です。"
2004405-47 = "は、はいぃぃ！？"
2004405-48 = "[s] \"スミレ、とりあえず落ち着こう！\""
2004405-49 = "すみません、トレーナー。可能性を秘めた方を見ると、つい熱が入ってしまって……。"
2004405-50 = "か、考えておきます……。それで、スミレさん……"
2004405-51 = "どうでしょう？当スタジアムと専属契約を結び、新たな伝説を作りませんか？"
2004405-52 = "ありがたいお話ですが……"
2004405-53 = "私にはミレニアムトレーニング部の部長としての責務がありますので、それに専念するべきだと考えています。"
2004405-54 = "そうですか……それは残念です。"
2004405-55 = "……では、フィットネスプログラムのトレーナーになっていただきたいという案件に関しては……！"
2004405-56 = "ええ、そちらについては私も興味があります。"
2004405-57 = "健康になりたい人たちがいるということでしたら……。"
2004405-58 = "前向きにご検討いただけますか……！"
2004405-59 = "実は、スミレさん以外にも多くの売り子さんたちがスタジアムにいるのですが……"
2004405-60 = "……重いドリンクサーバーの扱いに苦戦しているわけですね。"
2004405-61 = "そんな売り子の皆さんに、特別プログラムを実施してほしいと。"
2004405-62 = "その通りです！可能であれば、ドリンクサーバーを背負ったままトレーニングをしていただきたいなと……"
2004405-63 = "いかがでしょうか？"
2004405-64 = "こちらの提案は、スミレさんにご満足いただけるかと！"
2004405-65 = "[s] \"どうするの？スミレ。\""
2004405-66 = "……。"
2004405-67 = "トレーナー、答えは一つです。"
2004405-68 = "トレーニングを求めている方がいるならば――"
2004405-69 = "そして、少しでもその方の助けになれるのなら――"
2004405-70 = "私は共にスクワットをやり遂げます！"
2004405-71 = "そして笑顔で、「もう1回行ってみましょう！」と声をかけます！"
2004405-72 = "[s] \"そこは少し加減しようか……！\""
2004405-73 = "その日の筋肉への負荷が、明日の成長に繋がるのです。"
2004405-74 = "最後の1セットが、最高の筋肉を作り上げるための一歩なんですよ！"
2004405-75 = "[s] \"いつの間に、最後の1回が1セットに変わっている……！\""
2004405-76 = "では、この案件を受けていただけるのでしょうか？"
2004405-77 = "もちろんです、マネージャー。"
2004405-78 = "すでにトレーニングメニューは用意してきました！"
2004405-79 = "なんと心強い！"
2004405-80 = "トレーナーもご一緒にどうですか？"
2004405-81 = "[s] \"き、急にお腹が痛くなってきたな……！\""
2004405-82 = "そうですか……。では残念ですが、トレーナーとはまた次の機会に。"
2004405-84 = "皆さん、本当にお疲れ様でした！では最後にフルスクワットをあと1回！"
2004405-85 = "ええっ！？今1セット終わったばかりですよ！？しかも「あと1回」ってさっきも言ってたような……。"
2004405-86 = "そ、そういえば聞いたことがある！ ミレニアムには無限に「あと一回」を繰り返すトレーニング部の部長がいるって……まさか……。"
2004405-87 = "お願いです、せめて休憩を……！"
2004405-88 = "私たち、満タンのドリンクサーバーを背負って、手足には砂袋まで着けているんですよ！？"
2004405-89 = "それなら私も同じです。公平なトレーニング環境ではないですか？"
2004405-90 = "そうですけど……そうじゃないというか……。"
2004405-91 = "さあ、あと少し！手足がまだ動くなら、それは「限界」ではありません。体力が残っている証拠です！"
2004405-92 = "今は苦しいかもしれませんが、未来の自分を想像してみてください――"
2004405-93 = "疲れを知らず、快適なアルバイト生活を送る姿を！"
2004405-94 = "それだけではありません！さらに努力を重ねれば……"
2004405-95 = "いずれ皆さんはスタジアムの伝説となるでしょう！"
2004405-96 = "では、最後にもう1セットいきましょうか！"
2004405-97 = "また増えてるー！！"
2004405-99 = "（こうして、スミレの特別プログラムに参加した売り子の皆さんは……）"
2004405-100 = "（激しい筋肉痛に襲われ、翌日はほとんど動けなかったという……）"
