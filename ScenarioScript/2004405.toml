[translation]
2004405-1 = "Treino suspeito"
2004405-3 = "Estava à sua espera, Treinador."
2004405-4 = "[s] \"O que é que você queria me mostrar?\""
2004405-5 = "É isto aqui."
2004405-10 = "[ns] \"Isto é...?\""
2004405-12 = "É uma carta do gerente."
2004405-13 = "Está escrita em detalhes, mas resumindo..."
2004405-14 = "[s] \"Você quer assinar um contrato exclusivo com a Sumire, é isso?\""
2004405-15 = "Sim, exatamente."
2004405-16 = "Se fosse apenas isso, eu pretendia recusar, mas..."
2004405-17 = "Além do contrato, há esta proposta."
2004405-18 = "Querem que eu realize o \"Especial de Fitness para Vendedores: Saúde e Energia em Dobro!\""
2004405-19 = "[s] \"É um caso que só a Sumire poderia resolver!\""
2004405-20 = "Eu também acho que combina comigo."
2004405-21 = "No entanto, também tenho o meu trabalho como chefe do Clube de Treino..."
2004405-22 = "Talvez eu devesse me concentrar nisso, afinal..."
2004405-23 = "Mas eu não posso fazer isso!"
2004405-24 = "Se há alguém que precisa de treino, eu irei!"
2004405-25 = "[s] \"Então você já decidiu aceitar a proposta...!\""
2004405-26 = "Ah... acabei me empolgando. Desculpe, Treinador."
2004405-27 = "Bem, o que eu queria consultar com você é o seguinte..."
2004405-28 = "Este é um problema bastante difícil..."
2004405-29 = "Neste caso, o que seria melhor: usar roupas de treino ou o uniforme de vendedor?"
2004405-31 = "(Pensando que essa é uma preocupação bem a cara da Sumire...)"
2004405-32 = "(Nós dois fomos juntos para o estádio)"
2004405-38 = "Oh, Sumire! Estávamos à sua espera!"
2004405-39 = "Olá, gerente. Obrigado por vir nos buscar..."
2004405-40 = "...Sumire? Algum problema?"
2004405-41 = "Gerente, você tem interesse em fazer dieta?"
2004405-42 = "N-não, eu nem estou acima do peso..."
2004405-43 = "Costumam pensar que o \"controle alimentar\" serve apenas para dietas, mas..."
2004405-44 = "Não é exagero dizer que é um dos tipos de treino!"
2004405-45 = "Se você quer ganhar massa muscular,"
2004405-46 = "precisa de um cardápio rico em proteínas de qualidade e focado em carboidratos."
2004405-47 = "H-hã!?"
2004405-48 = "[s] \"Sumire, vamos nos acalmar por enquanto!\""
2004405-49 = "Desculpe, Treinador. Quando vejo alguém com potencial, acabo me empolgando..."
2004405-50 = "V-vou pensar sobre isso... Então, Sumire..."
2004405-51 = "O que acha? Gostaria de assinar um contrato exclusivo com nosso estádio e criar uma nova lenda?"
2004405-52 = "É uma oferta generosa, mas..."
2004405-53 = "Tenho minhas responsabilidades como chefe do Clube de Treino do Millennium, então acredito que devo me dedicar a isso."
2004405-54 = "Entendo... Que pena."
2004405-55 = "...Então, quanto à proposta de se tornar a treinadora do programa de fitness...!"
2004405-56 = "Sim, tenho interesse nisso."
2004405-57 = "Se há pessoas que querem ser mais saudáveis..."
2004405-58 = "Poderia considerar com carinho...!"
2004405-59 = "Na verdade, além de você, Sumire, temos muitos outros vendedores no estádio..."
2004405-60 = "...E eles estão tendo dificuldades em lidar com os pesados servidores de bebidas, não é?"
2004405-61 = "Queremos que realize um programa especial para esses vendedores."
2004405-62 = "Exatamente! Se possível, gostaria que treinassem enquanto carregam os servidores de bebidas..."
2004405-63 = "O que acha?"
2004405-64 = "Acredito que esta proposta será satisfatória para você, Sumire!"
2004405-65 = "[s] \"O que vai fazer, Sumire?\""
2004405-66 = "……."
2004405-67 = "Treinador, a resposta é uma só."
2004405-68 = "Se há alguém buscando treinamento —"
2004405-69 = "E se eu puder ajudar essa pessoa, mesmo que seja um pouco —"
2004405-70 = "Eu farei agachamentos junto com ela até o fim!"
2004405-71 = "E com um sorriso, direi: \"Vamos fazer mais uma vez!\""
2004405-72 = "[s] \"Talvez devêssemos pegar leve nessa parte...!\""
2004405-73 = "A carga muscular do dia é o que leva ao crescimento de amanhã."
2004405-74 = "A última série é o passo necessário para construir os melhores músculos!"
2004405-75 = "[s] \"Desde quando a última repetição virou uma série inteira...!\""
2004405-76 = "Então, você aceita este projeto?"
2004405-77 = "Com certeza, gerente."
2004405-78 = "Eu já preparei o menu de treinamento!"
2004405-79 = "Que tranquilidade!"
2004405-80 = "Treinador, por que não se junta a nós?"
2004405-81 = "[s] \"A-ai, de repente comecei a sentir uma dor de barriga...!\""
2004405-82 = "Entendo... Que pena, então deixaremos para uma próxima oportunidade, Treinador."
2004405-84 = "Pessoal, muito obrigado pelo esforço! Agora, para finalizar, mais um agachamento completo!"
2004405-85 = "Hã!? Acabamos de terminar uma série, não foi!? E você disse \"mais uma vez\" agorinha mesmo..."
2004405-86 = "E-espera, já ouvi falar disso! Dizem que no Millennium existe uma chefe do Clube de Treinamento que repete o \"mais uma vez\" infinitamente... não pode ser..."
2004405-87 = "Por favor, nos dê pelo menos um descanso...!"
2004405-88 = "Nós estamos carregando um dispenser de bebidas cheio nas costas e pesos nos braços e pernas!"
2004405-89 = "Eu também estou. Não é um ambiente de treinamento justo?"
2004405-90 = "É, mas... não é bem isso que eu quis dizer..."
2004405-91 = "Vamos, falta pouco! Se seus braços e pernas ainda se movem, isso não é o seu \"limite\". É a prova de que ainda resta energia!"
2004405-92 = "Pode ser doloroso agora, mas tente imaginar o seu eu do futuro —"
2004405-93 = "Uma versão que não conhece o cansaço e vive uma vida de meio período confortável!"
2004405-94 = "E não é só isso! Se continuarem se esforçando..."
2004405-95 = "Eventualmente, todos vocês se tornarão lendas do estádio!"
2004405-96 = "Então, vamos para mais uma série para encerrar!"
2004405-97 = "Aumentou de novo!!"
2004405-99 = "(Assim, os vendedores que participaram do programa especial da Sumire...)"
2004405-100 = "(Foram atingidos por uma dor muscular tão intensa que mal conseguiram se mover no dia seguinte...)"
