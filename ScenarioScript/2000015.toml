[translation]
2000015-1 = "愛着のかたち"
2000015-2 = "（部室の奥から、整備の音が聞こえる）"
2000015-3 = "[ns] \"ヒビキ、着いたよ～！”"
2000015-7 = "あ、先生。#nちょっと待ってて。"
2000015-12 = "はい、先生の自転車。"
2000015-13 = "[s1] \"きれいに直ってる！”\n[s2] \"ありがとう、ヒビキ！”"
2000015-16 = "本当はこの機会にいろいろ改造しようと思ったんだけど――"
2000015-17 = "「修理だけにして」って、先生に何度も言われたから……"
2000015-18 = "安全のためにも、高速榴弾発射機や火炎放射器くらいはつけたかった……。"
2000015-19 = "[s] \"つけたら安全じゃなくなりそうだけど……。\""
2000015-20 = "タイヤだけ変えない？#nチタンエアレス素材に。"
2000015-21 = "スパイクストリップでタイヤが損傷する可能性もあるから……。"
2000015-22 = "[s3] \"いや、大丈夫……。\"\n[s4] \"ふつうの自転車で十分だよ……。\""
2000015-25 = "先生がそこまで言うなら……今回は我慢する。"
2000015-26 = "[s] \"気を遣ってくれてありがとう、ヒビキ。\""
2000015-27 = "先生はどうして改造したがらないの？#nロマンがあるのに。"
2000015-28 = "……ありのままの良さ？"
2000015-29 = "もちろん純正品の美しさは尊重するよ。#n本来の姿に意味があるとも思ってる。"
2000015-30 = "けど、改造による機能の追加は、いわば効率性の極大化。"
2000015-31 = "各々の機能を、一つのツールに集約させて手間を省くの。#n便利じゃない？"
2000015-32 = "改造を拒む理由、ないと思うんだけど……。"
2000015-33 = "[s5] \"言われてみれば……\"\n[s6] \"ヒビキの言う通りかも？\""
2000015-36 = "ふふ、そうでしょ？"
2000015-37 = "……そうだ、効率の極大化といえば――"
2000015-41 = "これ、見てくれる？"
2000015-46 = "[ns] \"これは……ヒビキのゴーグル？\""
2000015-47 = "このゴーグルは何回も改造してるんだ。"
2000015-48 = "超多用途というか、値段をつけられないスーパーブランド品というか……。"
2000015-49 = "これがないと作業に支障が出ちゃうくらい。"
2000015-50 = "[s] \"マイスターの自信作、なんだね！\""
2000015-54 = "うん。まず、目の保護機能はもちろんのこと――"
2000015-55 = "溶接の炎や砂漠の砂塵、自由落下の時に発生する風圧も難なく防げる。"
2000015-56 = "防弾、ブルーライトカット、UVカット機能と……"
2000015-57 = "拡大縮小機能もついてるよ。#n裁縫するときに有効活用してる。"
2000015-58 = "[s] \"裁縫って……コスプレ衣装の？\""
2000015-59 = "うん。衣装とか小道具を作るときに。"
2000015-60 = "裁縫って繊細な作業なんだ。#n用途や表現したいものに応じて適切な方法で縫い込まないといけない。"
2000015-61 = "最新のミシンを使うとしても、狭いところに繰り返し糸を通す作業は、決して簡単じゃない。クッキリ見えるかどうかは大事なの。"
2000015-62 = "それで15焦点レンズ機能を入れたんだ。#n最大限まで拡大すれば分子単位の観測も可能だよ。"
2000015-63 = "[s7] \"や、やりすぎじゃない？？\"\n[s8] \"裁縫に分子まで観測する場面ってある！？\""
2000015-66 = "そういう機能も搭載してるって話。"
2000015-67 = "他にはどんな機能があると思う？"
2000015-68 = "[s] \"戦闘に役立つもの、とか？\""
2000015-69 = "正解。GPS結合型光学測量機能も追加してある。"
2000015-70 = "これさえあれば、観測手やオペレーターがいなくても迫撃砲を発射できるの。"
2000015-71 = "赤外線検知機能？#nもちろんついてるよ。夜間作戦の遂行も余裕。"
2000015-72 = "マイスターとして、一人の生徒として。#n必要な機能はすべて搭載してるの。"
2000015-73 = "[s] \"じゃあ、もしかしてそのゴーグルに……\""
2000015-75 = "[ns] \"ヒビキの好きな自爆機能も……？”"
2000015-77 = "えっと……自爆……機能……？"
2000015-78 = "[s] \"発明品の大半に自爆機能をつけてなかったっけ？\""
2000015-79 = "うーん……このゴーグルに……"
2000015-80 = "自爆機能はついてないよ。"
2000015-81 = "たしかにマイスターの発明品に自爆機能は必須だけど……"
2000015-82 = "このゴーグルには、なぜか入れる気にならなかったというか……"
2000015-83 = "……"
2000015-84 = "どうしてだろ。まだマイスターとしての心構えが足りないのかも。"
2000015-88 = "[ns] \"その気持ち、わかるよ。\""
2000015-89 = "うん？"
2000015-90 = "[s9] \"そのゴーグルは、ヒビキにとって大切なものだから。\"\n[s10] \"愛着があるものが爆発してしまうのは、嫌だったんじゃないかな。\""
2000015-93 = "……"
2000015-94 = "たぶん……そうだと思う。"
2000015-95 = "このゴーグルは……私がずっと前から使ってきたものだし。"
2000015-96 = "最初はデザインがすごく気に入って……追加したい機能を思いつく度に、#n一生懸命改造をして……"
2000015-97 = "長い間、共に歩んできた……"
2000015-98 = "うん……私にとって大切なものなの。"
2000015-99 = "自爆機能を入れなかったのは、多分……"
2000015-100 = "無くなってほしくなかったから。"
2000015-101 = "それが想定や仮定の話であったとしても。"
2000015-102 = "[s11] \"これからもずっと一緒だといいね！\"\n[s12] \"爆発しなければ、だけど。\""
2000015-105 = "……うん。だといいな。"
2000015-110 = "[ns] \"ヒビキ？\""
2000015-111 = "ふふっ……何でもない。"
2000015-112 = "……ちょっと思っただけ。"
2000015-113 = "先生にも、自爆機能はいらないかなって。"
2000015-114 = "[s] \"つけないでね！？\""
2000015-116 = "これからもずっと……よろしくね。"
