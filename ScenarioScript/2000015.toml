[translation]
2000015-1 = "Formas de apego"
2000015-2 = "（Ouve-se sons de manutenção vindo do fundo da sala do clube）"
2000015-3 = "[ns] \"Hibiki, cheguei!\""
2000015-7 = "Ah, Sensei. Espere um pouco."
2000015-12 = "Pronto, a bicicleta do Sensei."
2000015-13 = "[s1] \"Está consertada!\"\n[s2] \"Obrigado, Hibiki!\""
2000015-16 = "Na verdade, eu queria aproveitar a oportunidade para fazer várias modificações, mas..."
2000015-17 = "Como o Sensei me disse várias vezes para 'apenas consertar'..."
2000015-18 = "Pela segurança, eu queria ter instalado pelo menos um lançador de granadas de alta velocidade ou um lança-chamas..."
2000015-19 = "[s] \"Acho que não ficaria muito seguro se você instalasse isso...\""
2000015-20 = "Que tal trocar pelo menos os pneus? Por um material de titânio sem câmara."
2000015-21 = "É que os pneus podem ser danificados por tiras de espinhos..."
2000015-22 = "[s3] \"Não, está tudo bem...\"\n[s4] \"Uma bicicleta comum já é o suficiente...\""
2000015-25 = "Se o Sensei insiste tanto assim... desta vez eu vou me segurar."
2000015-26 = "[s] \"Obrigado por se preocupar, Hibiki.\""
2000015-27 = "Por que o Sensei não quer fazer modificações? Tem tanto charme nisso."
2000015-28 = "……O valor de ser como é?"
2000015-29 = "Claro, eu respeito a beleza das peças originais. Também acho que a forma original tem seu significado."
2000015-30 = "Mas adicionar funções através de modificações é, por assim dizer, a maximização da eficiência."
2000015-31 = "Concentrar cada função em uma única ferramenta para economizar esforço. Não é conveniente?"
2000015-32 = "Não vejo motivos para recusar modificações..."
2000015-33 = "[s5] \"Pensando bem...\"\n[s6] \"Talvez a Hibiki tenha razão?\""
2000015-36 = "Fufu, viu só?"
2000015-37 = "……Ah, falando em maximização da eficiência—"
2000015-41 = "Pode dar uma olhada nisto?"
2000015-46 = "[ns] \"Isso é... o óculos da Hibiki?\""
2000015-47 = "Eu modifiquei esse óculos várias vezes."
2000015-48 = "É algo super versátil, ou melhor, um item de marca superior que não tem preço..."
2000015-49 = "Eu mal consigo trabalhar sem ele."
2000015-50 = "[s] \"Então é uma obra-prima da mestre!\""
2000015-54 = "Sim. Primeiro, além da função de proteção ocular, é claro—"
2000015-55 = "Ele consegue bloquear facilmente o fogo da solda, a poeira do deserto e a pressão do vento gerada durante uma queda livre."
2000015-56 = "Tem proteção à prova de balas, filtro de luz azul, proteção UV e..."
2000015-57 = "Também tem função de zoom. Eu uso bastante quando estou costurando."
2000015-58 = "[s] \"Costurando... roupas de cosplay?\""
2000015-59 = "Sim. Quando faço roupas ou acessórios."
2000015-60 = "Costurar é um trabalho delicado. Você precisa costurar da maneira apropriada, dependendo do uso e do que deseja expressar."
2000015-61 = "Mesmo usando a máquina de costura mais moderna, passar a linha repetidamente em lugares estreitos nunca é fácil. É importante conseguir ver com clareza."
2000015-62 = "Por isso, adicionei uma lente de 15 focos. Se ampliar ao máximo, é possível até observar em nível molecular."
2000015-63 = "[s7] \"N-não é exagero demais??\"\n[s8] \"Existe alguma situação em que você precise observar moléculas para costurar!?\""
2000015-66 = "Estou dizendo que ele também possui esse tipo de função."
2000015-67 = "Que outras funções você acha que ele tem?"
2000015-68 = "[s] \"Algo útil para o combate?\""
2000015-69 = "Correto. Também adicionei uma função de levantamento óptico integrada com GPS."
2000015-70 = "Com isso, posso disparar morteiros mesmo sem um observador ou operador."
2000015-71 = "Função de detecção infravermelha? Claro que tem. Operações noturnas são tranquilas."
2000015-72 = "Como mestre e como aluna. Ele tem todas as funções necessárias."
2000015-73 = "[s] \"Então, será que esse óculos também...\""
2000015-75 = "[ns] \"...tem a função de autodestruição que a Hibiki gosta?\""
2000015-77 = "Bem... autodestruição... função...?"
2000015-78 = "[s] \"Você não tinha colocado funções de autodestruição na maioria das suas invenções?\""
2000015-79 = "Hmm... neste óculos..."
2000015-80 = "Não tem função de autodestruição."
2000015-81 = "É verdade que a autodestruição é essencial para as invenções de um Meister, mas..."
2000015-82 = "Por algum motivo, eu não senti vontade de colocar nesse óculos..."
2000015-83 = "……"
2000015-84 = "Por que será? Talvez eu ainda não tenha a mentalidade necessária como Meister."
2000015-88 = "[ns] \"Eu entendo esse sentimento.\""
2000015-89 = "Hm?"
2000015-90 = "[s9] \"É porque esse óculos é algo importante para você, Hibiki.\"\n[s10] \"Acho que você não queria que algo pelo qual tem tanto carinho acabasse explodindo.\""
2000015-93 = "……"
2000015-94 = "Talvez... eu acho que sim."
2000015-95 = "Este óculos é algo que eu uso há muito tempo."
2000015-96 = "No começo, eu gostei muito do design... e toda vez que pensava em uma nova função, #n eu me esforçava para modificá-lo..."
2000015-97 = "Caminhamos juntos por muito tempo..."
2000015-98 = "Sim... é algo muito importante para mim."
2000015-99 = "O motivo de eu não ter colocado a função de autodestruição, provavelmente, foi..."
2000015-100 = "Porque eu não queria que ele desaparecesse."
2000015-101 = "Mesmo que fosse apenas uma suposição ou uma hipótese."
2000015-102 = "[s11] \"Espero que vocês continuem juntos para sempre!\"\n[s12] \"Desde que ele não exploda, é claro.\""
2000015-105 = "……Sim. Eu espero que sim."
2000015-110 = "[ns] \"Hibiki?\""
2000015-111 = "Hehe... não é nada."
2000015-112 = "……Só pensei em algo."
2000015-113 = "Que talvez o Sensei também não precise de uma função de autodestruição."
2000015-114 = "[s] \"Não coloque, hein!?\""
2000015-116 = "Conto com você... daqui para frente também."
