[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90101010-1 = "Episódio 1: A Dívida do Rancor"
90101010-2 = "Porto Kanezaki, Píer 4"
90101010-5 = "Arf, arf..."
90101010-6 = "Rápido... Tenho que dar o fora daqui logo."
90101010-7 = "Aqueles caras perderam o juízo. Senão não tem como eles terem se metido com \"aquela coisa\"..."
90101010-8 = "Dei uma leve atrasada no pagamento... mas não foi por querer...!"
90101010-9 = "Quem é que faz uma loucura dessas por causa de uma mixaria daquelas?!"
90101010-10 = "De fato, não é lá grande coisa. Mas sabe..."
90101010-15 = "Isso não é lá algo que quem não consegue arranjar nem essa \"mixaria\" deveria dizer, né?"
90101010-16 = "H-Hiii...?!"
90101010-17 = "D-Desculpa! É que agora pouco, veja bem..."
90101010-18 = "Ah, esquenta com isso não. Não precisa se desculpar."
90101010-19 = "Se você falou da boca pra fora ou se tá só pagando de machão, eu tô pouco me lixando."
90101010-20 = "Porém... eu preciso dar um \"exemplo\". Não importa a quantia, tenho que mostrar o que acontece com caloteiro."
90101010-21 = "E-Exemplo... Não me diga que..."
90101010-22 = "Opa, você já tá ligado? Isso poupa muito o meu tempo."
90101010-27 = "Quero que você entre nesse barril."
90101010-28 = "Os bichos aqui tão morrendo de fome, sabe. Não vão parar até encherem o bucho..."
90101010-29 = "E aí... Quanto tempo será que você aguenta?"
90101010-33 = "H-Haha... Qual é, é pegadinha, né? Diz que cê tá de zoeira, por favor!"
90101010-34 = "Não vai me dizer que esse é o barril do tal \"Caranguejo Monstruoso\" que devora tudo pela frente?!"
90101010-35 = "Quem sabe."
90101010-36 = "Isso você mesmo vai ter que descobrir."
90101010-41 = "P-Pera aí! Eu te pago o triplo do que eu peguei... Não, eu te pago cinco vezes mais!"
90101010-47 = "Pelo amor de Deus, me solta! O \"barril\" não, tudo menos isso!"
90101010-49 = "Próximo Episódio: Salsicha de Peixe Sabor Caranguejo"