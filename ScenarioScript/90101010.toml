[translation]
90101010-1 = "Episode 1; How could I leave this grudge unsettled?"
90101010-2 = "Kanezaki Port, Pier 4"
90101010-5 = "Haa... haa..."
90101010-6 = "I have to... I have to get away, fast."
90101010-7 = "Those guys are insane. #nOtherwise, they wouldn't be messing with 'that thing'..."
90101010-8 = "I know my payment was a little late, but... it wasn't on purpose...!"
90101010-9 = "Who goes this far over an amount like that!?"
90101010-10 = "It certainly isn't a large sum. #nBut that is—"
90101010-15 = "Not exactly the kind of talk I'd expect from someone who couldn't even come up with that much, right?"
90101010-16 = "Hii, hiii...!?"
90101010-17 = "I-I'm sorry! That was just, um—"
90101010-18 = "Ah, no need to apologize."
90101010-19 = "Whether that was your honest opinion or just you acting tough, it doesn't matter."
90101010-20 = "But... we need to 'make an example' of you. #nI have to show everyone what happens to those who don't pay up, no matter the amount."
90101010-21 = "M-make an example...? You don't mean..."
90101010-22 = "Oh, you've heard of it? #nThen this will be quick."
90101010-27 = "You're going to get inside this oil drum."
90101010-28 = "These guys are gluttons, you see. They won't stop until they're satisfied..."
90101010-29 = "Now then... I wonder how long you'll last this time?"
90101010-33 = "H-haha... hey, you're joking, right? Tell me you're joking!"
90101010-34 = "You don't actually have those 'Monster Crabs' that eat everything in sight inside that drum, do you!?"
90101010-35 = "Who knows."
90101010-36 = "Why don't you find out for yourself?"
90101010-41 = "W-wait! I'll pay you triple... no, five times what I borrowed!"
90101010-47 = "Please, stop! Anything but the 'oil drum'—!"
90101010-49 = "Next Episode; Crab-Flavored Fish Sausage"