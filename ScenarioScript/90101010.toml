[translation]#[Texto Final. - Filipe 05/07.]
90101010-1 = "Episódio 1: Deixarei Este Rancor Sem Vingança?"
90101010-2 = "Porto de Kanezaki - Píer 4"
90101010-5 = "Haa, haa……"
90101010-6 = "Preciso fugir…… fugir logo daqui."
90101010-7 = "Aqueles caras não batem bem.#nSenão, não tinham mexido com\n\"aquele negócio\"……"
90101010-8 = "Tá, eu atrasei um pouco o pagamento……\nmas não foi de propósito……!"
90101010-9 = "Quem faz tudo isso por uma quantia\ndaquelas?!"
90101010-10 = "Realmente, não é lá grande coisa.#nMas, sabe……"
90101010-15 = "isso não é fala de quem não conseguiu\njuntar nem esse troco, né?"
90101010-16 = "Hii, hiii……!?"
90101010-17 = "D-Desculpa! Isso agora foi…… é que――"
90101010-18 = "Ah, não precisa se desculpar."
90101010-19 = "Se era sincero ou pose, tanto faz\npra mim."
90101010-20 = "Mas…… o \"exemplo\" é necessário.#nSeja qual for a quantia, todos precisam ver\no fim de quem não paga."
90101010-21 = "E-Exemplo…… não me diga que……"
90101010-22 = "Oh, já conhece?#nEntão a conversa vai ser rápida."
90101010-27 = "Você vai entrar neste tambor."
90101010-28 = "Esses aí são gulosos, viu. Não param\naté ficarem satisfeitos……"
90101010-29 = "Vejamos…… quanto tempo você aguenta?"
90101010-33 = "Ha, haha…… ei, é brincadeira, né?\nFala que é brincadeira!"
90101010-34 = "O \"caranguejo monstruoso\" que come qualquer\ncoisa não tá dentro desse tambor, né?!"
90101010-35 = "Sei lá."
90101010-36 = "Confira você mesmo."
90101010-41 = "E-Espera! Pago o triplo do que devo……\nnão, cinco vezes mais!"
90101010-47 = "Por favor, não! O \"tambor\" não――!"
90101010-49 = "Próximo Episódio: Salsicha de Peixe Sabor Caranguejo"
