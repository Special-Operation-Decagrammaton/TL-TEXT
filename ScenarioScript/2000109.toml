[translation]
2000109-1 = "メイドカフェ！（２）"
2000109-2 = "カフェ・メイドラマティック！"
2000109-4 = "……。"
2000109-5 = "……。"
2000109-6 = "そんな顔をしないでほしい。"
2000109-7 = "友人の用事は本当に終わったんだ。#nただ、店長に今日までは手伝ってほしいと言われて仕方なく……。"
2000109-8 = "はあ、こうして仕事なら良い評価を貰えるのに、#nどうして勉強はダメなのか。"
2000109-9 = "[s1] \"勉強する時間に働いてるから……？\"\n[s2] \"認められるのはいいことだよ。\""
2000109-10 = "……否定する言葉がないな。"
2000109-11 = "……否定する言葉がないな。"
2000109-12 = "とにかく、絶対に、#n今日が最後だから！"
2000109-13 = "さあ、先生。注文を。"
2000109-14 = "[s] \"ご褒美。\""
2000109-15 = "ま、またそれか？"
2000109-16 = "そんなの、店長もダメって言っていただろう。"
2000109-17 = "それに……私も先生を踏むのは嫌だ。#nなんだか、いけない感じがする。"
2000109-18 = "[s] \"先生ならともかく、ご主人様を踏むのは正しいことだよ。\""
2000109-19 = "それは全くもって、驚きの論理だな……。"
2000109-20 = "それより早く注文を……。"
2000109-22 = "キャアッ！？ご、ご主人様！ダメです！"
2000109-23 = "ふへへへっ！可愛い！可愛くて最高だ！こんな天国があるなんて！"
2000109-24 = "……まったく、酔っぱらいか。"
2000109-25 = "ああいうお客さんが一番厄介だ……。"
2000109-26 = "それに、こんな時に店長はいったいどこで何をしてるんだ。"
2000109-27 = "ふう、ふう、これがカチューシャってやつ？#nちょっと触ってみてもいいかな～？"
2000109-28 = "くっ、あいつ……。"
2000109-29 = "撃つか……？#nいや、私の銃をこんな室内で使うのは……。"
2000109-30 = "それに、メイドが客を銃で撃ったなんて噂でも流れたら……。"
2000109-32 = "くっ、いったいどうすれば……。"
2000109-34 = "[ns] 立ち上がって、酔っ払いに近寄る。"
2000109-36 = "ん～？誰だお前は！#nお前みたいなの頼んでないぞ！"
2000109-37 = "[s3] \"実はここ、「女装した男性のメイドカフェ」だよ。\"\n[s4] \"私はあなたをテイクアウトしたいけど？\""
2000109-38 = "な、な、なにを言ってる！？"
2000109-39 = "な、な、なにを言ってる！？"
2000109-40 = "[s5] \"今私のそばにいる彼女…… いや、実は「彼」は……。\"\n[s6] \"冗談じゃないよ、本気。\""
2000109-41 = "そ、そんなまさか！天国だと思ったのに、地獄だったなんて！"
2000109-42 = "そ、そんなまさか！天国だと思ったのに、地獄だったなんて！"
2000109-43 = "ち、近寄るな！お、おつりは要らないから、か、帰らせて！"
2000109-45 = "あ、あ、ありがとうございました！"
2000109-46 = "……すごい。"
2000109-47 = "私からも、感謝する。#nありがとう先生。"
2000109-48 = "ちょっと席を外している間に……なんと……！"
2000109-49 = "ヴァルキューレに通報しようとしたのに、いつの間に……。"
2000109-50 = "ありがとうございます、お客様。"
2000109-51 = "こちら、お礼と言っては何ですが、ここのメイドカフェの特別会員証です。"
2000109-52 = "お客様からには今後特別に、入場料をいただかずに何度でも……！"
2000109-53 = "[s7] \"要らない。\"\n[s8] \"それよりもっと欲しいものがあって。\""
2000109-54 = "はい？それはいったいどのような……#n私たちにできることでしたら何なりと……。"
2000109-55 = "はい？それはいったいどのような……#n私たちにできることでしたら何なりと……。"
2000109-56 = "……ま、まさか？"
2000109-57 = "[s] \"ご・褒・美。\""
2000109-58 = "！？"
2000109-59 = "ふう、仕方ありませんね。"
2000109-60 = "なぁっ！？何が仕方ないんだ！"
2000109-64 = "ま、ま、待て！"
2000109-65 = "ま、まだ心の準備が……っ。"
2000109-66 = "……はあ。わ、分かった、分かったから！"
2000109-67 = "……やってあげる。"
2000109-68 = "じゃあ、先生……。"
2000109-70 = "……横になって。"
2000109-73 = "― ほ、[wa:1000]本当に……[wa:2500]こんなことでご褒美になるのか……？"
2000109-75 = "― あ……[wa:1500]いや……[wa:2000]やっぱり……、"
2000109-78 = "― 恥ずかしすぎる。[wa:2500]でも、[wa:1500]先生がいいなら……。"
2000109-81 = "― うん？[wa:2000]もっと[wa:500]強く……？[wa:2000]わ、[wa:1300]わかった。"
2000109-84 = "― 先生がいいなら……[wa:2500]私も……[wa:1500]いい。"
2000109-87 = "― ああっ！[wa:500]い、[wa:700]いきなり立たないで！[wa:1300]危ないから！"
2000109-90 = "先生は……本当に変な人だね。"
2000109-91 = "一応、言っておくけど。"
2000109-92 = "このお店で、こんなことしてあげるのは……今日が最後だから。"
2000109-93 = "……。"
2000109-94 = "はぁ、そんなにがっかりした顔しないで。"
2000109-95 = "代わりに、その……先生が望むなら……お店じゃなくても……。"
2000109-98 = "個人的に……やってあげる、から。"
