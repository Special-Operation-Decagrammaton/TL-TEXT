[translation]
2000109-1 = "Café de empregadas! (2)"
2000109-2 = "Café Maidramático!"
2000109-4 = "……."
2000109-5 = "……."
2000109-6 = "Por favor, não me olhe com essa cara."
2000109-7 = "O assunto do meu amigo realmente terminou. #nÉ que o gerente me pediu para ajudar só até hoje, então não tive escolha……."
2000109-8 = "Ah, se eu recebo boas avaliações trabalhando assim, #npor que não consigo o mesmo nos estudos?"
2000109-9 = "[s1] \"Será porque você trabalha no horário em que deveria estudar……?\"\n[s2] \"É bom ser reconhecido pelo seu esforço.\""
2000109-10 = "……Não tenho como negar isso."
2000109-11 = "……Não tenho como negar isso."
2000109-12 = "De qualquer forma, definitivamente, #nhoje é o último dia!"
2000109-13 = "Vamos, Sensei. Faça seu pedido."
2000109-14 = "[s] \"Uma recompensa.\""
2000109-15 = "D-de novo isso?"
2000109-16 = "O gerente já disse que isso não é permitido."
2000109-17 = "Além disso…… eu também não gosto de pisar no Sensei. #nSinto que é algo errado."
2000109-18 = "[s] \"Se fosse outra pessoa tudo bem, mas pisar no seu mestre é a coisa certa a se fazer.\""
2000109-19 = "Essa é uma lógica surpreendente, sem dúvida……."
2000109-20 = "Em vez disso, faça logo o seu pedido……."
2000109-22 = "Kyaa!? M-mestre! Não faça isso!"
2000109-23 = "Fuhehehe! Que fofo! Tão fofo, é maravilhoso! Quem diria que um paraíso como este existia!"
2000109-24 = "……Francamente, um bêbado."
2000109-25 = "Esse tipo de cliente é o mais problemático……."
2000109-26 = "E onde será que o gerente se meteu numa hora dessas?"
2000109-27 = "Ufa, ufa, então isso é uma tiara? #nPosso tocar um pouquinho?"
2000109-28 = "Grr, esse cara……."
2000109-29 = "Devo atirar……? #nNão, usar minha arma aqui dentro seria……."
2000109-30 = "Além disso, se espalhar o boato de que uma empregada atirou em um cliente……."
2000109-32 = "Droga, o que eu faço……."
2000109-34 = "[ns] Levanta-se e se aproxima do bêbado."
2000109-36 = "Hmm~? Quem é você! #nEu não pedi alguém como você!"
2000109-37 = "[s3] \"Na verdade, este é um 'café de empregadas masculinas travestidas'.\"\n[s4] \"Eu quero levar você para viagem, pode ser?\""
2000109-38 = "O-o-o que você está dizendo!?"
2000109-39 = "O-o-o que você está dizendo!?"
2000109-40 = "[s5] \"Aquela que está ao meu lado agora…… não, na verdade, 'ele' é…….\"\n[s6] \"Não estou brincando, é sério.\""
2000109-41 = "N-não pode ser! Achei que era o paraíso, mas era o inferno!"
2000109-42 = "N-não pode ser! Achei que era o paraíso, mas era o inferno!"
2000109-43 = "N-não chegue perto! P-pode ficar com o troco, só me deixe ir embora!"
2000109-45 = "M-m-muito obrigado!"
2000109-46 = "……Incrível."
2000109-47 = "Eu também agradeço. #nObrigado, Sensei."
2000109-48 = "Enquanto eu estava fora por um momento…… que coisa……!"
2000109-49 = "Eu estava prestes a chamar a Valkyrie, mas quando você fez isso……."
2000109-50 = "Muito obrigado, cliente."
2000109-51 = "Como forma de agradecimento, aqui está um cartão de membro especial deste café de empregadas."
2000109-52 = "A partir de agora, o senhor poderá entrar sem pagar taxa de serviço, quantas vezes quiser……!"
2000109-53 = "[s7] \"Não quero.\"\n[s8] \"Tem outra coisa que eu quero mais do que isso.\""
2000109-54 = "Sim? E o que seria…… #nSe estiver ao nosso alcance, faremos qualquer coisa……."
2000109-55 = "Sim? E o que seria…… #nSe estiver ao nosso alcance, faremos qualquer coisa……."
2000109-56 = "……N-não me diga que?"
2000109-57 = "[s] \"Re-com-pen-sa.\""
2000109-58 = "！？"
2000109-59 = "Huu, não tem jeito, não é?"
2000109-60 = "O quê!? O que você quer dizer com 'não tem jeito'!"
2000109-64 = "Es-es-espere!"
2000109-65 = "Eu, eu ainda não estou preparada mentalmente...!"
2000109-66 = "...Haa. Tá, eu entendi, já entendi!"
2000109-67 = "...Eu faço para você."
2000109-68 = "Então, Sensei..."
2000109-70 = "...Deite-se."
2000109-73 = "― Sé- [wa:1000]sério mesmo... [wa:2500]isso conta como uma recompensa...?"
2000109-75 = "― Ah... [wa:1500]não... [wa:2000]pensando bem...,"
2000109-78 = "― É vergonhoso demais. [wa:2500]Mas, [wa:1500]se o Sensei quer..."
2000109-81 = "― Hm? [wa:2000]Mais [wa:500]forte...? [wa:2000]E- [wa:1300]entendido."
2000109-84 = "― Se o Sensei quer... [wa:2500]eu também... [wa:1500]quero."
2000109-87 = "― Aah! [wa:500]N- [wa:700]não levante de repente! [wa:1300]É perigoso!"
2000109-90 = "O Sensei é... uma pessoa realmente estranha."
2000109-91 = "Só para deixar claro."
2000109-92 = "Fazer isso por você nesta loja... é a última vez hoje."
2000109-93 = "..."
2000109-94 = "Haa, não faça essa cara de decepcionado."
2000109-95 = "Em troca, bem... se o Sensei desejar... mesmo que não seja na loja..."
2000109-98 = "Eu posso... fazer isso pessoalmente para você."
