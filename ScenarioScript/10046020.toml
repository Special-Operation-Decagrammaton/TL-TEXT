[translation]
10046020-1 = "第2話;温泉クライシス"
10046020-14 = "なぜ、ここに部外者が……。#nあそこで一体何を……？"
10046020-18 = "[ns1] \"メグ！？\"\n[ns2] \"どうして……？\""
10046020-24 = "ここは私有地です！"
10046020-25 = "許可のない活動は直ちにやめてください！"
10046020-29 = "……？"
10046020-30 = "聞こえませんでし――"
10046020-35 = "わぁ！誰か来た！#n……って、先生！"
10046020-39 = "ごめんねー、まだ温泉には入れないんだ。#n……あれ？でも、なんで知ってるの？"
10046020-43 = "……先生？お知り合いですか？"
10046020-44 = "[s3] \"えっと、その……。\"\n[s4] \"お、落ち着いて聞いてくれる？\""
10046020-47 = "私は温泉開発部のメグ！#n温泉開発のために、爆弾を設置してるところだよ！"
10046020-51 = "……はい？#n爆弾、ですか……？"
10046020-52 = "いえ、待ってください。温泉開発……？#n聞き覚えが……。"
10046020-58 = "温泉開発部！！#nゲヘナのテロリスト集団ではありませんか！！"
10046020-59 = "こんな日にまで厄介ごとを……！#nやはりゲヘナ！！ゲヘナは許しません！"
10046020-60 = "先生、手出しは無用です……っ！#nえ……？"
10046020-61 = "落ち着いて話し合いを……？"
10046020-66 = "落ち着いてなどいられるものですか！ゲヘナはゲヘナです！"
10046020-67 = "それともまさか、何か他の目的があるかもしれないと。#n先生はそうおっしゃりたいのですか！？"
10046020-68 = "[ns5] \"いや、そこは聞いてみないことには……！\"\n[ns6] \"まだどっちか分からないでしょ……？\""
10046020-71 = "そもそもここは私有地です！#n勝手に立ち入っているのですから、不法侵入じゃないですか！！"
10046020-72 = "しかも爆弾まで設置して……！！"
10046020-73 = "作業を直ちにやめ、ここから立ち去りなさい。#nこれは正義実現委員会からの正式な勧告です！！"
10046020-78 = "なんで……？#nどうせ崩れるんだし、温泉にしちゃおうよ！"
10046020-79 = "なぜ崩れるのが前提なんですか！"
10046020-80 = "だって、「確実に崩れる」って部長が言ってたよ？"
10046020-81 = "……それはどういう？"
10046020-82 = "いえ。相手は言葉が通じないテロリスト！#n議論しようと思ったのが間違いでした！"
10046020-83 = "[s7] \"ハスミ、一度冷静になろう……。\"\n[s8] \"まだ話の続きがあるみたいだし……。\""
10046020-93 = "まずは手を止めなさい！なぜ平然と作業を続けているんですか！！#n致し方ありません。こうなれば力ずくで……。"
10046020-97 = "……え？ちょ、ちょっとダメだよ！#nこれは必ず設置しろ、って部長に言われてるんだから！"
10046020-98 = "ですからここは私有地で――なぜ話が通じないのですか！！"
10046020-103 = "な、なんですか、この力は……！"
10046020-115 = "くっ……なぁっ！？"
10046020-116 = "[s9] \"ハスミを投げた！？\"\n[s10] \"あれは……パワースラム！？\""
10046020-127 = "けほっ、けほっ……！#nまったく……無茶苦茶ですよ！"
10046020-128 = "誰かに放り投げられたのは初めてです……！！"
10046020-129 = "これだけ！この爆弾だけだから！設置するまで待っててよ！"
10046020-130 = "だからそれをするなと言っているんです！#nどうしてこんな簡単なことも伝わらないのですか！！"
10046020-131 = "[s11] \"ハスミとメグは……。\"\n[s12] \"相性が悪いのかも……。\""
10046020-134 = "[ns13] \"私が説得してみるよ。\"\n[ns14] \"できるかどうかは、分からないけど……。\""
10046020-137 = "いえ、先生。#nここは……私に任せてください。"
10046020-138 = "このままでは正義実現委員会の名折れ……。#nこれは私のプライドの問題です！"
10046020-139 = "いくら素手とはいえ、ゲヘナ生に――"
10046020-140 = "テロリストに後れを取るわけにはいきません！！"
10046020-144 = "……はい？"
10046020-145 = "一人で温泉を掘れるほどの怪力……？"
10046020-146 = "だ――"
10046020-151 = "だからといってゲヘナには負けられませんっ！！！"
10046020-152 = "[ns15] \"ですよねー。\"\n[ns16] \"逆鱗に触れてしまったか……。\""
10046020-157 = "もう油断しません！覚悟してください……！！"
10046020-158 = "も～！早く終わらせて帰んなきゃなのに！"
10046020-159 = "あくまで無視するつもりですか……！"
10046020-186 = "大丈夫っすか？#nなんか変な音が聞こえたっすけど……。"
10046020-190 = "……へ？"
10046020-200 = "えっ……ええっ？？"
10046020-212 = "……げほっ、げほっ！"
10046020-213 = "い、いったい何が……。"
10046020-218 = "あああああーっ！もう限界です！！"
10046020-222 = "は、ハスミ先輩……？"
10046020-228 = "ひとまず落ち着いて欲しいっす……。"
10046020-229 = "それから、状況の説明を――"
10046020-236 = "……あ！やっほー！#nこの前、部長と列車に乗ってたよね？"
10046020-242 = "……。"
10046020-244 = "はあぁぁぁぁぁああああぁっ！？！？"
10046020-247 = "お、温泉開発部！？どうしてここにいるんすか！？"
10046020-248 = "今度は何を……！"
10046020-249 = "いや、聞くだけ無駄っすね。問答無用っす！！"
10046020-253 = "……え、先生？"
10046020-254 = "とりあえず落ち着いてほしい……？"
10046020-258 = "な、何を言ってるんすか！#nまさか、何か他の目的があるかもしれないって言いたいんすか！？"
10046020-259 = "[s17] \"イチカぁぁぁっ！？\"\n[s18] \"ハスミと同じことを……。\""
10046020-262 = "ヤツらの目的なんて分かり切ってるっす！"
10046020-263 = "……はい？"
10046020-264 = "……話し合い？"
10046020-269 = "……温泉開発部だけは例外っす！#nあの日からそう決めたっす！！"
10046020-270 = "行きましょう、イチカ！！"
10046020-274 = "私が動きを止めるっす！先輩はその隙をついてください！"
10046020-279 = "はあああっ！！"
10046020-294 = "……っ！そ、そんな……！"
10046020-295 = "あはは！お相撲やってるみたいだね！"
10046020-297 = "イチカ！この馬鹿力相手に遠慮は無用です！#n倒すことだけを考えてください！"
10046020-303 = "はあああっ！！"
10046020-316 = "ちょ、ちょっと！なになに、何の音！？"
10046020-324 = "……え？"
10046020-341 = "いったた……も～、なに……？"
10046020-345 = "あれ、あの子は……？"
10046020-351 = "え～、また増えちゃった……。"
10046020-352 = "邪魔者が多い時は、すぐ帰ってこい、だもんね。#nあとちょっとだったのに！"
10046020-353 = "……え？どういうこと……？"
10046020-354 = "でも、部長の言ったことだし！"
10046020-355 = "よし、撤収ー！"
10046020-356 = "ちょっと話を……あなたは誰……？"
10046020-357 = "それじゃ、まったね～！！"
10046020-363 = "あの子……ゲヘナ……？"
10046020-369 = "待ちなさい！！まだ決着はついていません！！"
10046020-370 = "逃がさないっす！！"
10046020-375 = "わ、わああ！とりあえず落ち着いて！？"
10046020-377 = "（なんとかして二人を落ち着かせたあと、ミカに事情を説明した）"
10046020-380 = "そんなことがあったんだね……。"
10046020-381 = "……醜態を晒してしまい、申し訳ございません。"
10046020-382 = "ううん！全然気にしてないよ！#n二人にも色々と事情はあるだろうし！"
10046020-386 = "……え、なに？先生。"
10046020-387 = "私？大丈夫だけど……どうして？"
10046020-388 = "あー、そっか。うん。"
10046020-389 = "あの時……かわいくないところ、見せちゃったもんね……。"
10046020-390 = "でもほら、それはそれとしてさ？#n決めつけはよくないけど、あの子、怪しいコトしてたんでしょ？"
10046020-391 = "しかも、ゲヘナだし……。"
10046020-392 = "うーん……ちょっと、アレだよね？"
10046020-393 = "でも……今はここを片づけるのが先だと思う。"
10046020-394 = "こんなのナギちゃんが見たら、また気にしちゃうかもしれないし。"
10046020-395 = "あの子もどっか行っちゃったし、もう来ないんじゃないかな……？"
10046020-397 = "いえ、そんなわけないっす！！"
10046020-401 = "え！？"
10046020-402 = "……イチカ？"
10046020-407 = "あいつは温泉開発部……ここに目をつけた以上、必ず戻ってくるっす！"
10046020-408 = "事あるごとに現れて、色んな事が台無しに……。#n全部ごまかし切れるとは限らないんすよ！？"
10046020-409 = "そうなったら、先生にも指揮なり演技なりお願いすることになるっすから……#nすごく迷惑をかけてしまうに決まってるっす！"
10046020-410 = "流石にそこまでは……ね？先生？"
10046020-411 = "[s19] \"そ、んなことは……ない……。\"\n[s20] \"こともない……かも、しれない……。\""
10046020-416 = "せ、先生まで！？じゃあ、ハスミちゃんは……？"
10046020-417 = "僭越ながら申し上げますが……。#n相手がゲヘナの時点で「常識」は通じません。"
10046020-418 = "なにより、イチカのあの断固とした態度。"
10046020-419 = "正義実現委員会の中で最も柔軟な思考を持つイチカでさえ、これほど言うのです。"
10046020-420 = "この機を逃せば、さらに邪魔が入ってくるかと思います。"
10046020-421 = "今日だけは、騒ぎを起こしたくないのに……。"
10046020-422 = "分かった。"
10046020-423 = "脅威が残ってたら、二人もちゃんと休めないもんね。"
10046020-424 = "なら、片づけちゃおっか。"
10046020-427 = "なら、片づけちゃおっか。"
