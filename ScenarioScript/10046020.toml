[translation]
10046020-1 = "Episódio 2: Crise na Fonte Termal"
10046020-14 = "Por que tem um estranho aqui...?#nO que exatamente vocês estão fazendo ali...?"
10046020-18 = "[ns1] \"Meg!?\"\n[ns2] \"Por que você está...\""
10046020-24 = "Isto é uma propriedade privada!"
10046020-25 = "Parem com essas atividades imediatamente, sem permissão!"
10046020-29 = "……?"
10046020-30 = "Eu não ouvi o que você disse—"
10046020-35 = "Uau! Alguém veio!#n...Ah, é o Sensei!"
10046020-39 = "Desculpa, mas ainda não dá para entrar na fonte termal.#n...Ué? Mas como você sabe disso?"
10046020-43 = "...Sensei? Você a conhece?"
10046020-44 = "[s3] \"Bem, é que...\"\n[s4] \"P-pode ouvir com calma?\""
10046020-47 = "Eu sou a Meg, do Departamento de Desenvolvimento de Fontes Termais!#nEstamos instalando bombas para criar uma fonte termal!"
10046020-51 = "...Como é?#nBombas, você disse...?"
10046020-52 = "Não, espere um pouco. Desenvolvimento de fontes termais...?#nEsse nome me soa familiar..."
10046020-58 = "Departamento de Desenvolvimento de Fontes Termais!!#nNão são aquele grupo terrorista de Gehenna?!"
10046020-59 = "Trazer problemas logo em um dia como este...!#nComo esperado de Gehenna!! Eu não vou perdoar Gehenna!"
10046020-60 = "Sensei, não interfira...!#nEh...?"
10046020-61 = "Tentar conversar com calma...?"
10046020-66 = "Como eu poderia ficar calma?! Gehenna é Gehenna!"
10046020-67 = "Ou será que você está tentando dizer que eles podem ter algum outro objetivo?#nÉ isso que você quer dizer, Sensei!?"
10046020-68 = "[ns5] \"Não, é que eu preciso ouvir o lado deles primeiro...!\"\n[ns6] \"Ainda não sabemos qual é a intenção deles...?\""
10046020-71 = "Para começar, isto é uma propriedade privada!#nVocês invadiram sem permissão, isso é invasão de domicílio!!"
10046020-72 = "E ainda por cima instalando bombas...!!"
10046020-73 = "Parem o trabalho imediatamente e vão embora daqui.#nEsta é uma recomendação oficial do Comitê de Justiça!!"
10046020-78 = "Por que...?#nJá que vai desmoronar de qualquer jeito, vamos transformar em uma fonte termal!"
10046020-79 = "Por que você assume que vai desmoronar?!"
10046020-80 = "Porque a chefe disse que \"vai desmoronar com certeza\"!"
10046020-81 = "...O que você quer dizer com isso?"
10046020-82 = "Esquece. Eles são terroristas que não entendem o que a gente fala!#nFoi um erro tentar discutir!"
10046020-83 = "[s7] \"Hasumi, vamos tentar manter a calma...\"\n[s8] \"Parece que ainda tem mais história por trás disso...\""
10046020-93 = "Primeiro, parem o que estão fazendo! Por que continuam trabalhando como se nada estivesse acontecendo!!#nNão tenho escolha. Se é assim, vou ter que usar a força..."
10046020-97 = "...Eh? E-ei, não pode fazer isso!#nA chefe me disse que eu tenho que instalar isso de qualquer jeito!"
10046020-98 = "Eu já disse que isto é uma propriedade privada— por que você não entende o que eu digo!!"
10046020-103 = "Q-que força é essa...!"
10046020-115 = "Droga... O quê!?"
10046020-116 = "[s9] \"Ela arremessou a Hasumi!?\"\n[s10] \"Aquilo foi... um Power Slam!?\""
10046020-127 = "Cof, cof...!#nNossa... isso é um absurdo!"
10046020-128 = "É a primeira vez que alguém me arremessa assim...!!"
10046020-129 = "Só falta isso! É só essa bomba! Espera até eu terminar de instalar!"
10046020-130 = "É justamente isso que eu estou dizendo para não fazer!#nPor que é tão difícil de entender?!"
10046020-131 = "[s11] \"A Hasumi e a Meg...\"\n[s12] \"Talvez não se deem bem...\""
10046020-134 = "[ns13] \"Eu vou tentar convencer ela.\"\n[ns14] \"Não sei se vou conseguir, mas...\""
10046020-137 = "Não, Sensei.#nDeixe isso... comigo."
10046020-138 = "Se as coisas continuarem assim, será uma desonra para o Comitê de Justiça...#nIsso é uma questão de orgulho para mim!"
10046020-139 = "Mesmo que ela use apenas as mãos, eu não posso deixar uma aluna de Gehenna—"
10046020-140 = "Eu não posso perder para uma terrorista!!"
10046020-144 = "...Como é?"
10046020-145 = "Uma força sobre-humana capaz de cavar uma fonte termal sozinha...?"
10046020-146 = "M-mas..."
10046020-151 = "Mesmo assim, eu não posso perder para Gehenna!!!"
10046020-152 = "[ns15] \"Pois é, né.\"\n[ns16] \"Será que eu toquei na ferida dela...?\""
10046020-157 = "Não vou mais baixar a guarda! Prepare-se...!!"
10046020-158 = "Ah, qual é! Eu preciso terminar isso logo pra poder ir embora!"
10046020-159 = "Você pretende continuar me ignorando...!"
10046020-186 = "Você está bem?#nOuvi um barulho estranho agora pouco..."
10046020-190 = "……Hã?"
10046020-200 = "Quê... O quê??"
10046020-212 = "……Cof, cof!"
10046020-213 = "M-mas o que foi que..."
10046020-218 = "Aaaaaah! Já chega, não aguento mais!!"
10046020-222 = "H-Hasumi-senpai...?"
10046020-228 = "Por favor, tente se acalmar..."
10046020-229 = "E depois, explique a situação—"
10046020-236 = "……Ah! Oi!#nVocê estava no trem com a nossa chefe outro dia, né?"
10046020-242 = "……."
10046020-244 = "Haaaaaaah!?!?"
10046020-247 = "O-o Departamento de Desenvolvimento de Fontes Termais!? Por que vocês estão aqui!?"
10046020-248 = "O que vocês vão fazer dessa vez...!"
10046020-249 = "Não, nem adianta perguntar. Não tem conversa com vocês!!"
10046020-253 = "……Hã, Sensei?"
10046020-254 = "Você quer que a gente se acalme...?"
10046020-258 = "Do que você está falando!#nVocê está querendo dizer que elas podem ter outro objetivo!?"
10046020-259 = "[s17] \"Ichikaaaaa!?\"\n[s18] \"Até você, Hasumi...\""
10046020-262 = "O objetivo daquelas ali é óbvio!"
10046020-263 = "……Sim?"
10046020-264 = "……Conversar?"
10046020-269 = "……O Departamento de Desenvolvimento de Fontes Termais é a única exceção!#nEu decidi isso desde aquele dia!!"
10046020-270 = "Vamos, Ichika!!"
10046020-274 = "Eu vou imobilizá-las! Senpai, aproveite a abertura!"
10046020-279 = "Haaaaa!!"
10046020-294 = "……! N-não pode ser...!"
10046020-295 = "Ahaha! Parece que vocês estão lutando sumô!"
10046020-297 = "Ichika! Não precisa ter piedade dessa força bruta!#nPense apenas em derrotá-las!"
10046020-303 = "Haaaaa!!"
10046020-316 = "Ei, ei! O que é isso, que barulho é esse!?"
10046020-324 = "……Hã?"
10046020-341 = "Ai, ai... nossa, o que foi...?"
10046020-345 = "Ué, cadê aquela garota...?"
10046020-351 = "Ah, não, apareceram mais..."
10046020-352 = "A chefe disse que se tivesse muita gente atrapalhando, era pra voltar logo.#nE olha que eu estava quase conseguindo!"
10046020-353 = "……Hã? Como assim...?"
10046020-354 = "Mas, ordens da chefe são ordens!"
10046020-355 = "Beleza, recuar!"
10046020-356 = "Ei, espera, vamos conversar... quem é você...?"
10046020-357 = "Então, até mais!!"
10046020-363 = "Aquela garota... é de Gehenna...?"
10046020-369 = "Espere!! Isso ainda não acabou!!"
10046020-370 = "Não vou deixar você escapar!!"
10046020-375 = "A-ah, espera! Por favor, se acalmem!?"
10046020-377 = "(Depois de conseguir acalmar as duas, expliquei a situação para Mika)"
10046020-380 = "Então foi isso que aconteceu..."
10046020-381 = "......Sinto muito por ter passado por essa situação vergonhosa."
10046020-382 = "Não, não! Não me importo nem um pouco!#nImagino que vocês duas também tenham seus motivos!"
10046020-386 = "......Eh, o que foi, Sensei?"
10046020-387 = "Eu? Estou bem, mas... por quê?"
10046020-388 = "Ah, entendi. Sim."
10046020-389 = "Naquela hora... eu acabei mostrando um lado meu que não é nada fofo..."
10046020-390 = "Mas olha, deixando isso de lado...#nNão é bom tirar conclusões precipitadas, mas aquela garota estava fazendo algo suspeito, não estava?"
10046020-391 = "E ainda por cima, ela é de Gehenna..."
10046020-392 = "Hmm... é um pouco complicado, né?"
10046020-393 = "Mas... acho que a prioridade agora é limpar este lugar."
10046020-394 = "Se a Nagi-chan vir isso, ela pode acabar se preocupando de novo."
10046020-395 = "Aquela garota também já foi embora, então acho que ela não volta mais, né...?"
10046020-397 = "Não, de jeito nenhum!!"
10046020-401 = "Eh!?"
10046020-402 = "......Ichika?"
10046020-407 = "Aquela pessoa é do Departamento de Desenvolvimento de Fontes Termais... Já que ela colocou os olhos aqui, ela com certeza vai voltar!"
10046020-408 = "Ela aparece a todo momento e estraga tudo...#nNão dá para garantir que vamos conseguir esconder tudo para sempre, sabe!?"
10046020-409 = "Se isso acontecer, teremos que pedir para o Sensei nos ajudar com o comando ou com a atuação...#ne com certeza isso vai ser um incômodo enorme para você!"
10046020-410 = "Duvido que chegue a esse ponto... né, Sensei?"
10046020-411 = "[s19] \"I-isso não... vai acontecer...\"\n[s20] \"Talvez... não aconteça...\""
10046020-416 = "A-até você, Sensei!? Então, Hasumi-chan, o que você acha...?"
10046020-417 = "Se me permite dizer...#nQuando o oponente é de Gehenna, o \"senso comum\" não se aplica."
10046020-418 = "Acima de tudo, veja a atitude determinada da Ichika."
10046020-419 = "Mesmo a Ichika, que tem a mentalidade mais flexível dentro do Comitê de Justiça, está dizendo isso."
10046020-420 = "Se perdermos esta oportunidade, acho que teremos ainda mais interferências."
10046020-421 = "Eu só não queria causar nenhum tumulto hoje..."
10046020-422 = "Entendido."
10046020-423 = "Se a ameaça continuar, vocês duas não vão conseguir descansar direito, né."
10046020-424 = "Então, vamos resolver isso de uma vez."
10046020-427 = "Então, vamos resolver isso de uma vez."
