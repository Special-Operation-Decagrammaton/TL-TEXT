[translation]
13035-3 = "うわあっ！？#nこいつら、めちゃくちゃ強いじゃん！"
13035-4 = "損傷大きめー……。"
13035-8 = "しかも囲まれてるし……もしかしてこれ、納期間に合わない感じ？"
13035-9 = "詰みかなー？"
13035-11 = "何なのよ、こいつら……"
13035-13 = "お願いです、説明してください……"
13035-14 = "ハイランダー鉄道学園の皆さん。#nアビドス自治区で何をしていたんですか？"
13035-15 = "大方、そちらも察しがついているのでは？"
13035-23 = "監督官！"
13035-24 = "ヘルプミー。"
13035-26 = "……どなたですか？"
13035-27 = "へぇ、助けに来たんだ？"
13035-29 = "……いや、そうではない。"
13035-31 = "嘘ぉ！？"
13035-32 = "裏切りー？"
13035-34 = "裏切りじゃない。#nだが、仲間だと思われても困るからな。"
13035-35 = "私の名は、[ruby=あさぎり]朝霧[/ruby]スオウ。#nハイランダー鉄道学園、理事会直属の管理監督官だ。"
13035-36 = "管理監督官……？"
13035-37 = "お上の使い走りだと思ってくれて構わない。そこのバ……"
13035-38 = "双子[ruby=たちばな]は橘ヒ[/ruby]カリ[ruby=たちばな]と橘ノ[/ruby]ゾミ。#n二人とも[ruby=Central Control Center]中央管制センター[/ruby]の幹部だ。"
13035-39 = "私とあいつらは互いに監視、牽制し合う関係にある……#nそこだけ理解してもらえれば。"
13035-41 = "っていうか敵！工事の敵で納期の敵！"
13035-42 = "あとさっき、バカとか言いかけてなかったか！？"
13035-43 = "双子じゃなくてバカなんだけどー？#nあれー？"
13035-48 = "我々の学園では、いずれの組織も独立した権限を持っている。#n同じ学園だからといって、あんたたちと仲良しごっこをしてたまるか。"
13035-49 = "各組織が管理する路線――つまり、地域ごとに派閥があると思ってもらって構わない。"
13035-50 = "長々と話してしまったが、まずは謝罪が先だったな。"
13035-51 = "責任の所在は中央管制センター、つまりこのバカどもにあるとはいえ、#n監督官として謝罪する。迷惑をかけた。"
13035-52 = "……。"
13035-53 = "だが、あんたたちもすでに知っているだろう？#n現在アビドス砂漠横断鉄道の開発権は、我々のもとにある、と。"
13035-55 = "えっ！？"
13035-56 = "それは、ネフティスのはずでは？"
13035-58 = "ああ――認識が異なっているようだな。#nあらためて説明しよう。"
13035-59 = "前提として、ハイランダー鉄道学園が私企業と提携することはよくある。"
13035-60 = "そして今は、その相手がネフティスというだけ。#nあんたなら詳しいんじゃないか？#n――[ruby=いざよい]十六夜[/ruby]ノノミ。"
13035-65 = "知り合い？"
13035-66 = "い、いえ。#nですが……"
13035-68 = "とにかく、そのバカどもを解放してもらえないか。#n本件の詳細説明は後日、正式にアビドスで行なうことを約束する。"
13035-69 = "そ、それは……"
13035-70 = "……放してあげて。"
13035-78 = "助かったぁ！"
13035-79 = "ビビったー。"
13035-80 = "質問があれば当日までにまとめておいてほしい。"
13035-81 = "では、失礼する。"
13035-86 = "行っちゃった……"
13035-90 = "……。"
13035-91 = "とりあえず、私たちも帰ろっか。#n向こうから説明に来てくれるって言ってたしさ。"
13035-92 = "[ns] 対策委員会の部室に戻る。"
13035-97 = "次回;流れ行くものたち"
