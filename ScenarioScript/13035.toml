[translation]
13035-3 = "Uwaa!?#nEsses caras são incrivelmente fortes!"
13035-4 = "Danos consideráveis..."
13035-8 = "E ainda por cima estamos cercadas... Será que isso significa que o prazo de entrega não vai ser cumprido?"
13035-9 = "Estamos num beco sem saída?"
13035-11 = "O que são vocês, afinal..."
13035-13 = "Por favor, nos expliquem..."
13035-14 = "Pessoal da Academia Ferroviária Highlander.#nO que vocês estavam fazendo no Distrito Autônomo de Abydos?"
13035-15 = "Acredito que vocês já devam ter uma ideia, não é?"
13035-23 = "Supervisora!"
13035-24 = "Socorro."
13035-26 = "...Quem é você?"
13035-27 = "Ora, então você veio nos ajudar?"
13035-29 = "...Não, não é isso."
13035-31 = "Sério!?"
13035-32 = "Traição?"
13035-34 = "Não é uma traição.#nMas não quero que pensem que somos aliados."
13035-35 = "Meu nome é Asagiri Suou.#nSou uma supervisora administrativa diretamente ligada ao conselho da Academia Ferroviária Highlander."
13035-36 = "Supervisora administrativa...?"
13035-37 = "Pode me considerar apenas uma mensageira dos superiores. Aquelas idiotas..."
13035-38 = "As gêmeas são Tachibana Hikari e Tachibana Nozomi.#nAmbas são executivas do Centro de Controle Central."
13035-39 = "Eu e elas mantemos uma relação de vigilância e contenção mútua...#nBasta entenderem apenas isso."
13035-41 = "Ei, somos inimigas! Inimigas da construção e inimigas do prazo!"
13035-42 = "E você não ia nos chamar de idiotas agora pouco!?"
13035-43 = "Não somos gêmeas, somos idiotas?#nUé?"
13035-48 = "Em nossa academia, cada organização possui autoridade independente.#nSó porque somos da mesma academia, não significa que vamos brincar de amiguinhos com vocês."
13035-49 = "Pense nisso como se cada organização gerenciasse uma linha férrea — ou seja, existem facções para cada região."
13035-50 = "Falei demais, mas primeiro, devo pedir desculpas."
13035-51 = "Embora a responsabilidade seja do Centro de Controle Central, ou seja, dessas idiotas aqui,#ncomo supervisora, peço desculpas. Causamos transtornos."
13035-52 = "..."
13035-53 = "Mas vocês já devem saber, não é?#nAtualmente, o direito de desenvolvimento da Ferrovia Trans-Deserto de Abydos está conosco."
13035-55 = "Hã!?"
13035-56 = "Isso não deveria ser da Nephthys?"
13035-58 = "Ah... parece que há um equívoco no seu entendimento.#nDeixe-me explicar novamente."
13035-59 = "Como premissa, é comum que a Academia Ferroviária Highlander faça parcerias com empresas privadas."
13035-60 = "E agora, essa parceira é a Nephthys.#nVocê não deveria saber bem disso?#n— Izayoi Nonomi."
13035-65 = "Vocês se conhecem?"
13035-66 = "N-não.#nMas..."
13035-68 = "De qualquer forma, poderiam libertar essas idiotas?#nPrometo que darei uma explicação detalhada sobre o caso formalmente em Abydos em uma data futura."
13035-69 = "I-isso é..."
13035-70 = "...Deixe-as ir."
13035-78 = "Salvas!"
13035-79 = "Que susto."
13035-80 = "Se tiverem perguntas, reúnam-nas até o dia marcado."
13035-81 = "Com licença."
13035-86 = "Elas foram embora..."
13035-90 = "..."
13035-91 = "Bem, vamos voltar também.#nElas disseram que virão aqui para nos explicar."
13035-92 = "[ns] Voltando para a sala do Comitê de Contramedidas."
13035-97 = "Próximo episódio: Aqueles que seguem o fluxo"
