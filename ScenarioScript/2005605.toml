[translation]
2005605-1 = "ザ・喫茶ファイター"
2005605-3 = "（……早朝）"
2005605-4 = "（今日は業務をお休みして、近くのゲーセンへ向かった）"
2005605-9 = "お待ちしてました、先生！今なら誰もいません！"
2005605-10 = "席はすでに取ってあります……ほら、早く座ってください！！"
2005605-14 = "[ns1] \"あれ、なんでその格好……。\"\n[ns2] \"ゲーセンにパジャマって、どういう組み合わせ？\""
2005605-17 = "……え？"
2005605-18 = "あ、これですか？寝起きだったので……。"
2005605-19 = "着替える時間なんてありませんよ！#nすぐに列ができちゃうんですから！"
2005605-20 = "今朝だって徹夜で並んでた人が、追い返されてたくらいなんですよ！#n開店凸だって時間の勝負なんです！"
2005605-21 = "だから早く座ってください！#n先生はどうしてこんな時ばっかり細かいこと気にするんですか！"
2005605-22 = "……え？"
2005605-23 = "場所取りも徹夜並みに悪いこと……？"
2005605-28 = "私はちゃんと開店凸したんですから！#nプレイできないよりよっぽどいいじゃないですか！！"
2005605-29 = "[ns] 悪い部分はちゃんと叱る。"
2005605-30 = "う、うっ。わ、分かりました……#n次からはやらないので……。"
2005605-31 = "い、今は誰もいないですし……#n今日のところは見逃してくださいよ……！"
2005605-32 = "[s] ……今日だけだよ、という。"
2005605-33 = "にははは！！そうですよね！そうですよね！"
2005605-34 = "では始めましょう！送った攻略情報は読みました？"
2005605-35 = "あ、もう覚えた？すばらしい！#n先生と私のタッグで――"
2005605-36 = "初の12階制覇を目指しましょう！#nさあ、頑張りましょうね！！"
2005605-37 = "いざ――"
2005605-38 = "……いきます！！"
2005605-40 = "（そうしてコユキと気合いを入れて、新作『ザ・喫茶ファイター』に挑戦した）"
2005605-41 = "（2時間近く、ありったけのコインをつぎ込んでチャレンジしたものの――）"
2005605-46 = "（12階どころか、5階さえも一度しか突破できない#n――そんな状態が続いた……）"
2005605-49 = "[wa:720]― [log=코유키 파자마]あぁっ！？[wa:690]なんで今その技[wa:930]出すんですか！！[/log]"
2005605-51 = "― [log=코유키 파자마]私の後で[wa:680]やってください[wa:660]っていったのに！[/log]"
2005605-54 = "[ns3] \"違うよコユキ。そもそも順番が違うんだ。\"\n[ns4] \"もう一回説明するね。これは――\""
2005605-57 = "[wa:2020]― [log=코유키 파자마]完璧な作戦を[wa:950]崩すつもりですか！？[/log]"
2005605-59 = "― [log=코유키 파자마]先生のために[wa:1120]朝早く起きて[wa:960]場所まで取ったのに！！[/log]"
2005605-62 = "[wa:610]― [log=코유키 파자마]……え？[wa:1350]それと[wa:510]これとは[wa:670]別の話？[/log]"
2005605-64 = "― [log=코유키 파자마]それを言うなら[wa:1290]先生の方が[wa:1100]コインを[wa:430]多く出してる……？[/log]"
2005605-67 = "[wa:690]― [log=코유키 파자마]うーん……[wa:1380]それは[wa:570]そう、[wa:600]ですけど……。[/log]"
2005605-69 = "― [log=코유키 파자마]むぅ……[wa:1310]休戦にしましょう！[wa:1140]一時休戦！[/log]"
2005605-72 = "[ns5] \"そうそう。大切なのはクリアすることだし。\"\n[ns6] \"目標は同じなんだからね！\""
2005605-75 = "[wa:720]― [log=코유키 파자마]そうですね！[wa:1230]次は[wa:460]絶対[wa:530]うまくやってみせます！[/log]"
2005605-77 = "― [log=코유키 파자마]……にはは！[/log]"
2005605-80 = "[wa:1000]― [log=코유키 파자마]……にはは。[/log]"
2005605-83 = "（そのあと小休止を挟んで、気合いを入れ直し――最後のコインを投入した）"
2005605-84 = "（見事に息を合わせて自己ベストは更新したものの……）"
2005605-88 = "（それでも高すぎる7階の壁を越えることはできなかった）"
2005605-91 = "う……ううっ……！"
2005605-92 = "こんなのアリなんですか……うう……はぁ……。"
2005605-93 = "クソゲー……いえ、ゲームなんて呼んじゃいけない……。"
2005605-97 = "うう……お疲れさまでした先生。#n7階止まりでしたけど、楽しかったです。"
2005605-98 = "また今度リベンジを――"
2005605-102 = "……ん？"
2005605-103 = "急に財布を取り出して、どうしたんですか……。"
2005605-104 = "まさか――"
2005605-105 = "そ、そのカード……まさか……！！"
2005605-106 = "[ns7] \"……勝とう。\"\n[ns8] \"コンシューマー版も出たし、それを買うんだ。\""
2005605-109 = "…………。"
2005605-110 = "……！！！"
2005605-111 = "コ、コンシューマー版を買うんですか！？#nそ、そんな手が！？"
2005605-112 = "でもあれ、めちゃくちゃ高かったような……#nあっ、なるほど。これが大人の力ってやつですね！？"
2005605-116 = "先生に一生ついていきます！！#n今日こそクリアしてみせますよ！！"
2005605-117 = "そうと決まれば、行きますよ～！！！"
2005605-119 = "（そのままゲームショップへ向かい『ザ・喫茶ファイター』のデラックス版を買った）"
2005605-120 = "（その後、シャーレの休憩室でコユキと11時間ほどぶっ通しで挑み続け――）"
2005605-124 = "（……ついに、私たちは勝利を掴んだ）"
