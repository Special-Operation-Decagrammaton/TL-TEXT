[translation]
2005605-1 = "The Café Fighter"
2005605-3 = "（……Madrugada）"
2005605-4 = "（Hoje tirei folga do trabalho e fui até o fliperama mais próximo）"
2005605-9 = "Estava te esperando, Sensei! Não tem ninguém aqui agora!"
2005605-10 = "Já reservei a máquina... Vamos, sente-se logo!!"
2005605-14 = "[ns1] \"Ei, por que você está vestida assim...\"\n[ns2] \"Pijama no fliperama? Que combinação é essa?\""
2005605-17 = "……Eh?"
2005605-18 = "Ah, isso? É que eu tinha acabado de acordar..."
2005605-19 = "Não tinha tempo para me trocar! #nLogo vai começar a formar fila!"
2005605-20 = "Até hoje de manhã, teve gente que passou a noite na fila e acabou sendo mandada embora! #nChegar na abertura é uma corrida contra o tempo!"
2005605-21 = "Então, por favor, sente-se logo! #nPor que o Sensei tem que ser tão detalhista logo agora?!"
2005605-22 = "……Eh?"
2005605-23 = "Reservar lugar também é algo ruim, como passar a noite na fila...?"
2005605-28 = "Eu cheguei na abertura direitinho! #nÉ muito melhor do que não conseguir jogar, não é?!"
2005605-29 = "[ns] Repreender o comportamento errado."
2005605-30 = "U-ugh. E-entendido... #nNão farei mais isso da próxima vez..."
2005605-31 = "M-mas agora não tem ninguém... #nDeixa passar dessa vez, vai...!"
2005605-32 = "[s] Dizer que é só por hoje."
2005605-33 = "Ni-hahaha!! É verdade! É verdade!"
2005605-34 = "Então vamos começar! Leu as dicas que eu te mandei?"
2005605-35 = "Ah, já decorou? Incrível! #nCom a nossa dupla, Sensei――"
2005605-36 = "Vamos conquistar o 12º andar pela primeira vez! #nVamos dar o nosso melhor!!"
2005605-37 = "Lá vamos nós――"
2005605-38 = "……Vamos nessa!!"
2005605-40 = "（Assim, com o ânimo renovado junto com Koyuki, desafiamos o novo jogo 'The Café Fighter'）"
2005605-41 = "（Passamos quase 2 horas gastando todas as moedas que tínhamos, mas――）"
2005605-46 = "（Nem o 12º andar, nem mesmo o 5º andar conseguimos passar mais de uma vez #n――esse estado continuou...）"
2005605-49 = "[wa:720]― [log=코유키 파자마]Aaaah!?[wa:690] Por que você usou esse golpe agora!![/log]"
2005605-51 = "― [log=코유키 파자마]Eu disse para você[wa:680] esperar[wa:660] a minha vez![/log]"
2005605-54 = "[ns3] \"Não é isso, Koyuki. A ordem está errada desde o começo.\"\n[ns4] \"Vou explicar de novo. Isso é――\""
2005605-57 = "[wa:2020]― [log=코유키 파자마]Você pretende estragar[wa:950] o plano perfeito!?[/log]"
2005605-59 = "― [log=코유키 파자마]Eu acordei cedo[wa:1120] e reservei o lugar[wa:960] por sua causa!![/log]"
2005605-62 = "[wa:610]― [log=코유키 파자마]……Eh?[wa:1350] Isso[wa:510] e aquilo[wa:670] são coisas diferentes?[/log]"
2005605-64 = "― [log=코유키 파자마]Se for falar disso,[wa:1290] o Sensei que está[wa:1100] gastando[wa:430] mais moedas...?[/log]"
2005605-67 = "[wa:690]― [log=코유키 파자마]Hmm...[wa:1380] Isso[wa:570] é verdade,[wa:600] mas...[/log]"
2005605-69 = "― [log=코유키 파자마]Muuh...[wa:1310] Vamos fazer uma trégua![wa:1140] Trégua temporária![/log]"
2005605-72 = "[ns5] \"Isso mesmo. O importante é zerar o jogo.\"\n[ns6] \"Nós temos o mesmo objetivo, afinal!\""
2005605-75 = "[wa:720]― [log=코유키 파자마]É verdade![wa:1230] Da próxima vez[wa:460] eu vou[wa:530] fazer dar certo![/log]"
2005605-77 = "― [log=코유키 파자마]……Ni-haha![/log]"
2005605-80 = "[wa:1000]― [log=코유키 파자마]……Ni-haha.[/log]"
2005605-83 = "（Depois de uma pequena pausa, nos animamos novamente e inserimos a última moeda）"
2005605-84 = "（Embora tenhamos sincronizado perfeitamente e batido nosso recorde pessoal...）"
2005605-88 = "（Ainda assim, não conseguimos superar a barreira do 7º andar, que era alta demais）"
2005605-91 = "Ugh... ughhh...!"
2005605-92 = "Isso é permitido...? Ugh... haah..."
2005605-93 = "Jogo lixo... não, não posso nem chamar de jogo..."
2005605-97 = "Ugh... bom trabalho, Sensei. #nParamos no 7º andar, mas foi divertido."
2005605-98 = "Vamos tentar de novo na próxima――"
2005605-102 = "……Hm?"
2005605-103 = "Por que você tirou a carteira de repente..."
2005605-104 = "Não pode ser..."
2005605-105 = "E-essa carta... não pode ser...!!"
2005605-106 = "[ns7] \"...Vamos vencer.\"\n[ns8] \"Já lançaram a versão para console, vamos comprá-la.\""
2005605-109 = "............"
2005605-110 = "......!!!"
2005605-111 = "V-você vai comprar a versão para console!?#nE-existe um truque desses!?"
2005605-112 = "Mas aquela versão era caríssima, se não me engano...#nAh, entendi. Então isso é o que chamam de poder de um adulto!?"
2005605-116 = "Vou seguir o Sensei pelo resto da vida!!#nHoje é o dia em que vamos zerar isso!!"
2005605-117 = "Já que decidimos, vamos nessa~!!!"
2005605-119 = "(Fomos direto para a loja de jogos e compramos a edição de luxo de 'The Cafe Fighter')"
2005605-120 = "(Depois disso, passamos 11 horas seguidas jogando sem parar na sala de descanso do Schale com a Koyuki--)"
2005605-124 = "(...Finalmente, alcançamos a vitória)"
