[translation]
200-1 = "総力戦"
200-2 = "シャーレ・オペレーションルーム"
200-3 = "お久しぶりです、先生。シャーレのお仕事は順調ですか？"
200-4 = "本日お願いしたいことは他でもなく、キヴォトスのあちこちで起きている、幾つかの特別な事件を解決していただきたい、ということです。"
200-5 = "たとえば、アビドス砂漠の地下に眠っている巨大な機械怪獣ですとか……。"
200-6 = "ミレニアムの郊外で無人兵器を生産している、秘密の軍需工場ですとか……。"
200-7 = "都市伝説のような話ですが、先生も聞き覚えはありますよね？"
200-8 = "はい。質の悪いデマに過ぎなかった噂が、いつの間にか実体化し、キヴォトスに現れて、果てには実被害までも出しつつあります。"
200-9 = "ただ、生徒会長が不在で忙しいこの時期に、連邦生徒会が直接動くのは少々非効率と言いますか。"
200-10 = "先生は、生徒会長から直々にご指名された方ですから。このくらいの業務、難なくこなせますよね？"
200-11 = "では、シャーレのご活躍を期待しております。"
