[translation]
200-1 = "Total Assault"
200-2 = "Sala de Operações da Schale"
200-3 = "Faz tempo, Sensei. O trabalho No Schale está indo bem?"
200-4 = "O que preciso pedir hoje não é nada menos do que a resolução de alguns incidentes especiais que estão ocorrendo por toda a Kivotos."
200-5 = "Por exemplo, a gigantesca besta mecânica que dorme sob o deserto de Abydos..."
200-6 = "Ou a fábrica de munições secreta que está produzindo armas autônomas nos arredores da Millennium..."
200-7 = "Parecem lendas urbanas, mas você já ouviu falar delas, não é, Sensei?"
200-8 = "Sim. Rumores que não passavam de boatos de mau gosto acabaram se materializando, surgindo em Kivotos e, por fim, causando danos reais."
200-9 = "No entanto, com a Presidente do Conselho Estudantil ausente e todos ocupados, seria um tanto ineficiente para o Conselho Estudantil Federal agir diretamente."
200-10 = "Como você foi pessoalmente nomeado pela Presidente do Conselho Estudantil, Sensei, deve ser capaz de lidar com esse tipo de tarefa sem problemas, certo?"
200-11 = "Bem, espero ansiosamente pelo sucesso da Schale."
