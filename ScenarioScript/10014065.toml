[translation]
10014065-4 = "……ここ？"
10014065-5 = "先生はどうやってこの場所を？"
10014065-6 = "[s1] \"スケバンがこんなに集まってたら……\"\n[s2] \"逆に分かりやすいような……。\""
10014065-7 = "た、たしかに……。"
10014065-8 = "た、たしかに……。"
10014065-9 = "それに、トリニティ自治区でこの規模の騒ぎを起こしたら、当然、正義実現委員会が出てくるもんね。"
10014065-10 = "だから、わざわざトリニティの外まで[ruby=うざわ]宇沢[/ruby]を追い込んだのか。#nここなら、自分たちも思う存分暴れられるから。"
10014065-11 = "ここも長くて今夜……いや、明日の夜明けくらいまでしか保たないだろうけど。#n明日にでもヴァルキューレあたりが押し寄せてくるだろうし。"
10014065-12 = "それはそうとして……"
10014065-16 = "こいつらはなんでここにいるの……？"
10014065-17 = "……こいつらだなんて、ひどいわね。#n助っ人になんてこと言うのよ？"
10014065-18 = "誰が助けてほしいなんて言ったのさ？#n邪魔なだけだから、今からでも帰ったら？"
10014065-19 = "あはは！！面白いじゃん？#n本当に邪魔かどうか、行く前にちょっと試してみる？"
10014065-20 = "ああもう……こっちにもうるさいバカが……#n変な言葉まで覚えて……"
10014065-21 = "今回のことが終わったら、すぐそれ止めなよ……幼稚だから。"
10014065-22 = "なっ……？#nよ、幼稚……？"
10014065-23 = "言ったわね！？"
10014065-25 = "よ、ヨシミちゃん！！カズサちゃん……！#nここで私たちが喧嘩しちゃだめだよ……！"
10014065-26 = "ホント、何しに来たんだよ……"
10014065-27 = "……どうせ、先生が呼んだんでしょ。"
10014065-28 = "[s3] \"どうせなら一緒がいいかなって。\"\n[s4] 知らんぷりする。"
10014065-29 = "先生……。"
10014065-30 = "先生……。"
10014065-34 = "遠慮することはないのだよ、カズサ。我々はこの一帯を食べ尽くす恐怖の「放課後スイーツ団」キャスパリーグの仲間たち。"
10014065-35 = "そして仲間の友人は……私たちの友人でもある。"
10014065-36 = "私たちの友人に手を出した彼女らは、相応の血の代価を支払うことになるだろう。"
10014065-37 = "いや、だから何度も話したじゃん！#n私はあいつと友達なんかじゃ……"
10014065-38 = "……ふっふっふ。認め切れないその姿、まさに「悪友」だな！！"
10014065-39 = "ロマンだ！！"
10014065-40 = "ああもう！！#nその口調やめてって！！恥ずかしくないの！？"
10014065-41 = "そんな言葉使ってたら、絶対あとで枕抱えて後悔するよ！？"
10014065-42 = "……？？？#n今更……ナツが？"
10014065-43 = "残念だけど、めっちゃ気に入ってるっぽいよ？"
10014065-48 = "……ふっ。"
10014065-49 = "……ホント最悪……。#n悪夢だよ、こんなの……"
10014065-53 = "まぁ、今は細かい事いいでしょ！#nほら、やってやろうじゃないの！！"
10014065-54 = "こっちには先生もいるし、よっぽどじゃない限り負けないわよ！！"
10014065-55 = "せ、先生……！#nどうか安全なところからお願いします！"
10014065-56 = "[s5] \"行くよ、放課後スイーツ団！！\"\n[s6] \"レイサを助けよう！！\""
10014065-59 = "いくわよーーー！！"
10014065-60 = "い、いきまぁあす！！"
