[translation]
10014065-4 = "……Aqui?"
10014065-5 = "Sensei, como você encontrou este lugar?"
10014065-6 = "[s1] \"Com tantas delinquentes reunidas aqui...\"\n[s2] \"Até que ficou fácil de achar...\""
10014065-7 = "É, verdade..."
10014065-8 = "É, verdade..."
10014065-9 = "Além disso, se causassem um tumulto desse tamanho no Distrito Autônomo de Trinity, o Comitê de Justiça apareceria na hora, né?"
10014065-10 = "Então foi por isso que se deram ao trabalho de perseguir Uzawa até fora de Trinity? #nAqui, elas podem causar o caos à vontade."
10014065-11 = "Não acho que este lugar vá durar muito, talvez até esta noite... ou melhor, até o amanhecer de amanhã. #nA Valkyrie provavelmente vai aparecer por aqui amanhã mesmo."
10014065-12 = "Deixando isso de lado..."
10014065-16 = "Por que essas pessoas estão aqui...?"
10014065-17 = "……\"Essas pessoas\"? Que grosseria. #nÉ assim que você trata quem veio te ajudar?"
10014065-18 = "Quem pediu ajuda? #nVocês só estão atrapalhando, por que não vão embora?"
10014065-19 = "Ahaha!! Engraçado, não é? #nQuer testar se estamos mesmo atrapalhando antes de ir?"
10014065-20 = "Ah, chega... tem uma idiota barulhenta aqui também... #nE ainda aprendeu a falar essas coisas estranhas..."
10014065-21 = "Quando isso acabar, pare com isso imediatamente... é infantil."
10014065-22 = "O quê...? #nIn-infantil...?"
10014065-23 = "Você disse isso mesmo!?"
10014065-25 = "Yo-Yoshimi-chan!! Kazusa-chan...! #nNão podemos brigar aqui...!"
10014065-26 = "Sério, por que vocês vieram mesmo..."
10014065-27 = "……De qualquer forma, foi o Sensei quem chamou, né."
10014065-28 = "[s3] \"Achei que seria melhor estarmos juntos.\"\n[s4] Fingir que não ouviu."
10014065-29 = "Sensei..."
10014065-30 = "Sensei..."
10014065-34 = "Não precisa se acanhar, Kazusa. Nós somos as integrantes do temível \"Clube de Doces Depois da Aula\", que devora tudo nesta região."
10014065-35 = "E os amigos dos nossos amigos... também são nossos amigos."
10014065-36 = "Elas que tocaram em nossa amiga pagarão o preço com sangue."
10014065-37 = "Não, eu já disse várias vezes! #nEu não sou amiga daquela ali..."
10014065-38 = "……Fufufu. Essa sua negação é a definição de \"amizade verdadeira\"!!"
10014065-39 = "Isso é romântico!!"
10014065-40 = "Ah, chega!! #nPara com esse jeito de falar!! Você não tem vergonha!?"
10014065-41 = "Se continuar falando assim, você vai se arrepender tanto depois que vai querer se esconder debaixo do travesseiro!"
10014065-42 = "……??? #nAgora... a Natsu?"
10014065-43 = "Infelizmente, parece que ela está adorando, né?"
10014065-48 = "……Pff."
10014065-49 = "……Sério, que pesadelo... #nIsso é horrível..."
10014065-53 = "Bem, não vamos nos preocupar com detalhes agora! #nVamos lá, vamos acabar com isso!!"
10014065-54 = "O Sensei está com a gente, então, a menos que aconteça algo muito grave, não vamos perder!!"
10014065-55 = "Se-Sensei...! #nPor favor, fique em um lugar seguro!"
10014065-56 = "[s5] \"Vamos lá, Clube de Doces Depois da Aula!!\"\n[s6] \"Vamos salvar a Reisa!!\""
10014065-59 = "Lá vamos nós!!!"
10014065-60 = "Es-estou indo!!!"
