[translation]
2005102-1 = "Nos encontramos de novo, Reisa."
2005102-2 = "（Em um dia ensolarado, enquanto caminhava em frente ao Schale...）"
2005102-3 = "[ns] \"Que dia lindo.\""
2005102-4 = "A-ah... Sensei..."
2005102-5 = "[s] \"Hm?\""
2005102-9 = "Uuu..."
2005102-13 = "O-olá, Sensei...!"
2005102-14 = "[s1] \"V-você é!!\"\n[s2] \"Thermite Pink!\""
2005102-17 = "N-não é hora para brincadeiras!"
2005102-18 = "Até chegar aqui... aconteceram tantas coisas... ufa..."
2005102-19 = "[s] \"Algum mascote te pediu para fazer um contrato?\""
2005102-20 = "S-se fosse isso, talvez fosse melhor..."
2005102-21 = "Esta roupa é o traje de que falei outro dia..."
2005102-22 = "Chegou hoje, então tentei vestir para testar, mas..."
2005102-23 = "Puf! O puxador do zíper quebrou...!"
2005102-24 = "Fiquei presa dentro da roupa..."
2005102-25 = "Sozinha, não consigo nem ver o zíper, fiquei desesperada... #nEntão vim direto para o Schale!"
2005102-26 = "Por favor, me ajude, Sensei...!"
2005102-27 = "[s3] \"Acho que consigo consertar com os materiais do escritório.\"\n[s4] \"Você veio até aqui vestida assim... deve ter sido difícil.\""
2005102-30 = "Haha, nossa, foi incrível..."
2005102-31 = "Me senti como uma superestrela."
2005102-32 = "Quando entrei no ônibus, as crianças tiraram fotos..."
2005102-33 = "Quando passei em frente ao local do evento, me confundiram com uma das atrizes... e..."
2005102-34 = "Isso é... ser uma... superestrela... haha..."
2005102-35 = "[s5] \"A Reisa está exausta!\"\n[s6] \"Você não gosta de garotas mágicas?\""
2005102-38 = "Eu amo!!!"
2005102-39 = "O tamanho desta roupa ficou perfeito e eu adorei a cor... mas...!"
2005102-40 = "Eu não tive tempo de me preparar mentalmente e acabei me transformando à força!!"
2005102-41 = "Mesmo que você goste de robôs, #nnão ficaria surpreso se tivesse que entrar em um de repente!?"
2005102-42 = "Por favor, me deixe destransformar..."
2005102-43 = "[s7] \"Essa é uma fala que só ouço em animes e mangás!\"\n[s8] \"Vamos logo para o escritório.\""
2005102-46 = "Muito obrigada..."
2005102-49 = "[ns] \"Pronto, agora está tudo bem.\""
2005102-51 = "“Release Form”! ...Brincadeirinha!"
2005102-52 = "Parece mesmo que sou uma garota mágica!"
2005102-53 = "[s] \"Quem diria que eu veria você voltando ao normal!\""
2005102-54 = "Que bom que deu certo."
2005102-55 = "Eu sabia que o Sensei daria um jeito!"
2005102-56 = "Você sempre resolve os meus problemas!"
2005102-57 = "[s] \"Fico feliz em ter ajudado você a se destransformar!\""
2005102-58 = "Ahaha! Como esperado do Sensei!"
2005102-59 = "Bem, vou indo nessa!"
2005102-60 = "Vamos nos ver de novo!"
2005102-61 = "[s9] \"Espere! Você vai sair vestida assim?\"\n[s10] \"O zíper das costas ainda está aberto.\""
2005102-64 = "Ah, é verdade!"
2005102-65 = "Uuu, eu deveria ter trazido uma muda de roupa...!"
2005102-66 = "Uuu... eu só cometo erros..."
2005102-67 = "[s] \"N-não fique tão deprimida!\""
2005102-71 = "（Emprestei um casaco para a Reisa cobrir o traje）"
2005102-72 = "（Reisa recuperou o ânimo e saiu do Schale）"
