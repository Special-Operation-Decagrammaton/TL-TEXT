[translation]
51225-7 = "Hmm... onde é aqui...?"
51225-9 = "Aha! Acordou?"
51225-10 = "Quem é você...?"
51225-11 = "Ara ara, que pe~na. #n Já se esqueceu de mim?"
51225-12 = "Eu sou... a sua representante. "
51225-13 = "Uma... [ruby=Contadora de Histórias de Fantasmas]narradora[/ruby] para transmitir as suas 'emoções' para todos vocês."
51225-14 = "Emoções...?"
51225-19 = "'Essas suas emoções―― eu queria devolver exatamente como são―― você não acha?'"
51225-24 = "Não pode, ser......"
51225-25 = "Veja, olhe para cá? #n É uma paisagem muito, mui~to bonita, não é?"
51225-26 = "Eh...?"
51225-44 = "Isso é... por que o local do festival...!"
51225-45 = "Ahahaha, maravilhoso, não é?"
51225-46 = "Ah, ah! Que elegância...! #n Eu go~sto muito disso."
51225-47 = "Por que... fazer uma coisa tão cruel...!"
51225-48 = "Ara ara, não diga algo tão triste."
51225-49 = "Parece que fui eu quem fiz tudo sozinha, não é."
51225-50 = "......Eh?"
51225-51 = "Eu só transmiti as emoções da Miko-sama no seu lugar."
51225-52 = "Você não está vendo? #n Aquilo ali, na sua frente."
51225-53 = "O que você expeliu..."
51225-58 = "As 'emoções'―― que transbordaram do fundo do seu coração, não é?"
51225-59 = "......!!"
51225-65 = "A... a..."
51225-66 = "Isso é... o meu..."
51225-67 = "As emoções... que nasceram de mim?"
51225-73 = "Ugh...!"
51225-76 = "Você consegue sentir só de olhar, não consegue?"
51225-77 = "A fumaça que gira lá dentro... as chamas que queimam."
51225-78 = "As―― emoções profundas e intensas que preenchem todo o seu corpo!"
51225-80 = "Isso também... é tudo graças a você. Miko-sama."
51225-82 = "Graças... a mim...?"
51225-84 = "Sim, sim. Eu entendo."
51225-85 = "Ninguém dá ouvidos à minha voz... ninguém me entende...!"
51225-86 = "Os outros só pisam nos meus sentimentos, na minha voz e até nos meus desejos."
51225-87 = "Eles só impõem seus desejos e vontades, dizendo 'faça a escolha certa'."
51225-88 = "Por isso―― você estava sofrendo, não estava? Você se cansou, não se cansou?"
51225-89 = "A... u..."
51225-91 = "Por isso... você queria jogar tudo para o alto, não queria?"
51225-92 = "Para aquelas que não ouvem a sua opinião e não te levam a sério―― para aqueles que te lançam tais palavras――"
51225-96 = "[log][ff4444]<――Que tudo queime>[-][/log]"
51225-98 = "Foi isso... que você pensou, não foi?"
51225-100 = "E-Eu..."
51225-102 = "Ahahaha!"
51225-103 = "Aquilo é um [ruby=Representante]Katashiro[/ruby] sem rosto, nascido entre as memórias e emoções que você tem aí."
51225-104 = "Se fosse para dar um nome..."
51225-105 = "Certo... que tal chamá-lo de '[ruby=Sem-Rosto]Katashiro[/ruby]'..."
51225-106 = "Se for aquilo, como você deseja... ele vai transformar Hyakkiyako em um campo queimado até os cantos mais distantes? #n Sim! Uma vista linda e efêmera!"
51225-107 = "Sim, sim! Vai ser uma elegância verdadeiramente maravilhosa."
51225-108 = "Ah――"
51225-115 = "A cidade está queimando."
51225-116 = "Chamas carmesins rastejando pelo chão."
51225-117 = "Gritos de alguém que ecoam de longe."
51225-120 = "Isso tudo é―― minha culpa."
51225-128 = "Por ter pensado aquilo, nem que fosse por um instante."
51225-129 = "Sonhando com a Hyakkaryouran, fugindo dos meus deveres originais――"
51225-133 = "......Um castigo por ter tentado me visualizar como parte da Hyakkaryouran e encenar esse papel."
51225-136 = "(...Entendi)"
51225-137 = "(Por minha culpa...)"
51225-140 = "Aquilo é... [ruby=Meu erro]algo que nasceu de mim[/ruby]."
51225-150 = "Ara ara? Você desmaiou?"
51225-151 = "Que sem graça. Sendo que a festa está só começando."
51225-152 = "Bem, não tem problema. Miko-sama, o seu papel já terminou. #n Daqui em diante é a minha vez."
51225-153 = "Os atores e o palco estão prontos――"
51225-154 = "Finalmente, o que a Kokuriko-sama desejava..."
51225-155 = "A minha própria 'Hyakumonogatari'..."
51225-157 = "Está se completando――"
51225-163 = "[ns] \"Chega disso, Shuro!\""
51225-169 = "Devolva a Yukari......!"
51225-173 = "......Que falta de bom gosto, não?"
51225-177 = "Próximo Episódio; Palavras Falsas"
