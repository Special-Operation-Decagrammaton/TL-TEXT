[translation]
51225-7 = "Hmm... Onde estou...?"
51225-9 = "Ahaha, acordou finalmente?"
51225-10 = "Quem é você...?"
51225-11 = "Ora, ora, que pena. #nJá se esqueceu de mim?"
51225-12 = "Eu sou... a representante de você."
51225-13 = "Uma contadora de histórias, para transmitir os seus 'sentimentos' a vocês."
51225-14 = "Sentimentos...?"
51225-19 = "'Esses seus sentimentos — devolver tudo exatamente como está — você não acha que seria bom?'"
51225-24 = "Não pode ser..."
51225-25 = "Olhe só, veja ali. #nÉ uma paisagem muito, muito bela, não é?"
51225-26 = "Hã...?"
51225-44 = "Isso é... por que o local do festival está...!"
51225-45 = "Ahahaha, é maravilhoso, não é?"
51225-46 = "Ah, ah! Que elegância...! #nEu gostei muuuito disso."
51225-47 = "Por que... fazer algo tão cruel assim...!"
51225-48 = "Ora, ora, não diga coisas tão tristes."
51225-49 = "Parece até que fui eu quem fez tudo sozinha."
51225-50 = "...Hã?"
51225-51 = "Eu apenas transmiti os sentimentos da sacerdotisa em seu lugar, sabe?"
51225-52 = "Não consegue ver? #nAquilo, bem na sua frente."
51225-53 = "Aquilo que você expeliu..."
51225-58 = "São os 'sentimentos' que transbordaram do fundo do seu coração, sabe?"
51225-59 = "...!!"
51225-65 = "Ah... ah..."
51225-66 = "Isso é... o meu..."
51225-67 = "O sentimento... que nasceu de mim?"
51225-73 = "Ah...!"
51225-76 = "Dá para sentir só de olhar, não dá?"
51225-77 = "A fumaça que gira lá dentro... as chamas que ardem."
51225-78 = "Um sentimento profundo e vívido que consome tudo!"
51225-80 = "Isso também... é tudo graças a você, sacerdotisa."
51225-82 = "Graças... a mim...?"
51225-84 = "Sim, sim. Eu entendo."
51225-85 = "Ninguém ouve a minha voz... ninguém me entende...!"
51225-86 = "Os outros apenas pisam nos meus sentimentos, na minha voz e até nos meus desejos."
51225-87 = "Eles apenas impõem seus próprios desejos e ganância, dizendo para eu fazer a escolha certa."
51225-88 = "Por isso... você estava sofrendo, não estava? Você se cansou, não foi?"
51225-89 = "Ah... uh..."
51225-91 = "Por isso... você queria jogar tudo para o alto, não queria?"
51225-92 = "Para aquelas que não ouvem a sua opinião e nem te levam a sério... para aqueles que te dizem tais palavras..."
51225-96 = "[log][ff4444]＜――Que tudo queime até virar cinzas＞[-][/log]"
51225-98 = "Foi isso que você pensou, não foi?"
51225-100 = "Eu... eu..."
51225-102 = "Ahahaha!"
51225-103 = "Aquilo é um katashiro sem rosto, nascido entre as suas memórias e sentimentos."
51225-104 = "Se fosse para dar um nome..."
51225-105 = "Que tal chamá-lo de... 'Katashiro sem rosto'?"
51225-106 = "Se for ele, fará exatamente como você deseja... transformará Hyakkiyako em um campo queimado até o último canto. #nSim! Uma paisagem bela e efêmera!"
51225-107 = "Sim, sim! Será uma elegância verdadeiramente maravilhosa."
51225-108 = "Ah――"
51225-115 = "A cidade está em chamas."
51225-116 = "Chamas carmesins que rastejam pelo chão."
51225-117 = "O grito de alguém ecoando ao longe."
51225-120 = "Isso tudo é... culpa minha."
51225-128 = "Por ter pensado naquelas coisas, mesmo que por um instante."
51225-129 = "Por sonhar com a Hyakkaryouran e fugir das minhas responsabilidades originais..."
51225-133 = "…Um castigo que recebi por ter imaginado a mim mesma como parte da Hyakkaryouran e tentado interpretar esse papel."
51225-136 = "(...Entendo.)"
51225-137 = "(Por minha causa...)"
51225-140 = "Aquilo é... algo que nasceu de mim mesma."
51225-150 = "Ora, ora? Você desmaiou?"
51225-151 = "Que sem graça. E olha que o banquete está apenas começando."
51225-152 = "Bem, não importa. Sacerdotisa, o seu papel já terminou.#nDaqui em diante, é a minha vez."
51225-153 = "Os atores e o palco estão prontos—"
51225-154 = "Finalmente, aquilo que a senhorita Kokuriko desejava..."
51225-155 = "A minha própria \"Hyakki Yagyou\"...!"
51225-157 = "Está completa—"
51225-163 = "[ns] \"Até aqui, Shuro!\""
51225-169 = "Devolva a Yukari...!"
51225-173 = "…Que decepção, não é?"
51225-177 = "Próximo episódio: Palavras Falsas"
