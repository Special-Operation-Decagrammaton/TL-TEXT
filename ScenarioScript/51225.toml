[translation]
51225-7 = "んん……ここは……？"
51225-9 = "アハッ、お目覚めですかぁ？"
51225-10 = "あなたは……？"
51225-11 = "あらあら、ざんね～ん。#nもうお忘れなのですかぁ？"
51225-12 = "手前は……手前さんの代理人です。 "
51225-13 = "手前さんの「感情」を手前さん方に伝えるための……[ruby=怪談家]語り手[/ruby]。"
51225-14 = "感情……？"
51225-19 = "「手前さんのその感情――そのままそ～っくり返してやりたい――そうは思いませんかぁ？」"
51225-24 = "まさ、か……。 "
51225-25 = "ほらほら、こっちをご覧なさい？#nとてもとて～も、美しい景色でしょ？"
51225-26 = "え……？"
51225-44 = "これは……どうして、お祭り会場が……！"
51225-45 = "アハハハッ、素晴らしいでしょ？"
51225-46 = "ああ、ああ！なんという風流……！#n手前、と～っても気に入ってるんです。"
51225-47 = "どうして……こんな非道な事を……！"
51225-48 = "あらあら、そんな寂しい事、言わないでくださいなぁ。"
51225-49 = "まるでぜ～んぶ、手前一人でやったみたいじゃないですかぁ。"
51225-50 = "……え？"
51225-51 = "手前はただ、巫女様の感情を代わりに伝えただけですよぉ？"
51225-52 = "見えませんか？#n手前さんの前にいる、ソレ。"
51225-53 = "手前さんが吐き出した…… "
51225-58 = "胸の奥底から溢れた――「感情」ですよぉ？"
51225-59 = "……！！"
51225-65 = "あ……あ……"
51225-66 = "これが……身共の……"
51225-67 = "身共から、生まれた……感情？"
51225-73 = "っ……！"
51225-76 = "見ているだけで感じとれるでしょ？ "
51225-77 = "その中に渦巻く煙……燃え上がる炎。"
51225-78 = "全身を埋め尽くす、深く鮮烈な――感情が！"
51225-80 = "これも……ぜ～んぶ、手前さんのおかげですよ。巫女様。"
51225-82 = "身共の、おかげ……？"
51225-84 = "ええ、ええ。理解できます。"
51225-85 = "誰も私の声に耳を傾けてくれない……誰も私のことなんて分かってくれない……！"
51225-86 = "他人は、私の気持ちも声も願いさえも、踏みにじっていくだけ。"
51225-87 = "正しい選択をしなさい、と自分の願いと欲を押しつけるだけ。"
51225-88 = "だから――苦しかったのでしょ？疲れてしまったのでしょ？"
51225-89 = "あ……う……"
51225-91 = "だから……ぜ～んぶ、投げ出してしまいたかったのでしょ？"
51225-92 = "自分の意見には耳を傾けず、取り合ってもくれない彼女らに――そんな言葉を浴びせる者に向かって――"
51225-96 = "[log][ff4444]＜――全部燃えてしまえばいい＞[-][/log]"
51225-98 = "と……思ったのでしょ？"
51225-100 = "み……身共は……"
51225-102 = "アハハハッ！"
51225-103 = "アレは、そんな手前さんの記憶と感情の狭間から生まれた、顔を持たない[ruby=かたしろ]形代[/ruby]。"
51225-104 = "名を付けるとすれば…… "
51225-105 = "そうですねぇ、「[ruby=むぼう]無貌[/ruby]の[ruby=かたしろ]形代[/ruby]」……とでも呼びましょかぁ。"
51225-106 = "アレなら手前さんの望み通り……百鬼夜行を隅々まで焼け野原にしてくれますよぉ？#nそう！美しくも儚い絶景を！"
51225-107 = "ええ、ええ！実に素晴らしい風流となってくれるでしょう。"
51225-108 = "ああ――"
51225-115 = "街が燃えている。"
51225-116 = "地を這う紅蓮の炎。"
51225-117 = "遠くから聞こえる誰かの悲鳴。"
51225-120 = "これは全部――自分のせいだ。 "
51225-128 = "一瞬でも自分が、あんなことを思ってしまったせいで。"
51225-129 = "百花繚乱を夢見て、本来の責務から逃げ出して――"
51225-133 = "……百花繚乱としての自分を描いて、その姿を演じようとしたせいで下った、罰。"
51225-136 = "（……そっか）"
51225-137 = "（身共のせいで……）"
51225-140 = "あれは……[ruby=身　共　の　間　違　い]身共から生まれたもの[/ruby]なんだ。"
51225-150 = "あらあらぁ？気を失ってしまいましたかぁ。 "
51225-151 = "面白くないですねぇ。宴はこれからだというのに。"
51225-152 = "ま、構いませんか。巫女様、手前さんの役目はもう終わり。#nここからは手前の番です。"
51225-153 = "役者も舞台も整った――"
51225-154 = "ついに、コクリコ様が望んだ……"
51225-155 = "手前だけの「百物語」が……！"
51225-157 = "完成するのです――"
51225-163 = "[ns] \"そこまでだよ、シュロ！\""
51225-169 = "ユカリを、返してもらう……！"
51225-173 = "……興醒めですねぇ？"
51225-177 = "次回;偽りの言葉"
