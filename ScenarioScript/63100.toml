[translation]
63100-1 = "Episódio 10: Ecclesia para o futuro que nos foi deixado"
63100-5 = "[log]Dia do exame abrangente[/log]"
63100-9 = "……E então?"
63100-10 = "Sim."
63100-11 = "Não sei explicar, mas..."
63100-12 = "Estou me sentindo super confiante."
63100-13 = "Bem, não tenho base nenhuma para isso, mas..."
63100-17 = "Isso significa que você não estudou nada, não é...?"
63100-19 = "Mas olha só."
63100-20 = "Hm?"
63100-21 = "Livros didáticos são feitos para estudar, certo?"
63100-22 = "Sim, é verdade."
63100-23 = "Então, nossos livros didáticos são um fracasso."
63100-24 = "Porque eles falharam em me ensinar."
63100-25 = "Uau, que linha de raciocínio inovadora..."
63100-26 = "De qualquer forma, vamos nos esforçar no exame..."
63100-27 = "Você também..."
63100-28 = "……Espero que todo mundo cometa erros bobos."
63100-29 = "A gente não ia se esforçar um pelo outro...?"
63100-34 = "[ns] \"Pessoal! Estudaram direitinho?\""
63100-35 = "Ah, Sensei!"
63100-36 = "Sensei..."
63100-37 = "Quando parece que você vai tirar nota vermelha de qualquer jeito... o que você faz...?"
63100-38 = "[s1] \"Não precisa se preocupar.\"\n[s2] \"Você não vai saber se não tentar.\"\n[s3] \"Afinal, você não tirou nota vermelha até que o resultado saia.\""
63100-42 = "Uau... que palavras encorajadoras..."
63100-43 = "[s] \"De qualquer forma, boa sorte a todos!\""
63100-44 = "Sim..."
63100-49 = "Sensei, bom dia. Por acaso você veio nos ver partir?"
63100-50 = "Não se preocupe, eu vou fazer o exame direitinho. Seria um desperdício de todo o esforço que fizemos até agora."
63100-55 = "Hm? Achei que o Sensei tinha vindo para nos apoiar..."
63100-56 = "Ah... A-a Misaki também sabia disso... e... #nfoi por isso que ela disse aquilo, não foi...?"
63100-57 = "Foi isso? Desculpe, não tinha percebido..."
63100-59 = "Não, não é isso...!"
63100-60 = "Haa... deixa pra lá."
63100-61 = "Bom, então eu já vou."
63100-62 = "B-boa sorte para nós..."
63100-71 = "Bom dia, Sensei."
63100-72 = "B-bom dia... #n...Ué? Hoje é sua folga...?"
63100-73 = "[s4] \"Tenho trabalho a fazer aqui hoje.\"\n[s5] \"O trabalho de apoiar todas vocês.\""
63100-76 = "E-entendo..."
63100-80 = "……Sensei, o que foi? Por que está me encarando?"
63100-81 = "Sim? Se eu tenho resistência em fazer o exame, é isso...?"
63100-82 = "……Sinceramente, não posso dizer que não tenho."
63100-83 = "Mas... decidi tentar acreditar."
63100-84 = "Acreditar nas vozes das garotas de Arius, que pediram para tentar mais uma vez."
63100-85 = "……E acreditar no Sensei."
63100-86 = "[s] \"……Obrigado.\""
63100-90 = "O-o que foi isso de repente!?"
63100-91 = "[s] \"Obrigado por acreditar em mim.\""
63100-92 = "I-isso é..."
63100-93 = "Eh? O Sensei também, se não for acreditado pelos alunos, na verdade fica inseguro e acaba vacilando...?"
63100-94 = "……."
63100-95 = "Essa é uma resposta um tanto... inesperada..."
63100-97 = "Então eu também estou sendo útil para o Sensei!?"
63100-98 = "[s] \"Com certeza. Obrigado, Maia.\""
63100-105 = "（Fiz carinho na cabeça da Maia）"
63100-106 = "Ehehe... De alguma forma... eu estou feliz... Muito obrigada, Sensei."
63100-111 = "……."
63100-112 = "Eu também——"
63100-118 = "Ah, Senpai! Parece que já está na hora! Vamos nos apressar!"
63100-119 = "Ah, ah, sim..."
63100-120 = "Sim, vamos lá..."
63100-125 = "[ns] \"Já deve estar na hora das provas começarem lá na Trinity...\""
63100-126 = "（Se existe uma coisa boa em ser um adulto）"
63100-127 = "（Talvez seja o fato de não precisar fazer provas. Pensando nisso）"
63100-128 = "（Decidi trabalhar em um café próximo e esperar as provas terminarem）"
63100-135 = "Ah... então acabou..."
63100-136 = "Como foi?"
63100-142 = "……."
63100-143 = "……."
63100-144 = "……Desastre total."
63100-148 = "Mas você nem corrigiu ainda!?"
63100-149 = "É que... sabe como é, a gente sente quando vai mal."
63100-151 = "Bem... na verdade, eu sinto o mesmo..."
63100-152 = "Minha amiga de alma..."
63100-157 = "[ns] \"Pessoal, bem-vindas de volta!\""
63100-159 = "Sensei..."
63100-160 = "Uuu..."
63100-161 = "A prova... foi um fracasso total!"
63100-162 = "[s6] \"Eu não disse? Enquanto o resultado não sai, não é uma nota vermelha.\"\n[s7] \"Então agora, vamos realizar a tradição pós-prova!\""
63100-165 = "Tradição... pós-prova?"
63100-166 = "O que é isso?"
63100-167 = "[s8] \"É a... 'Comemoração de fim de testes'!\"\n[s9] \"Comer coisas gostosas e brincar à vontade!\"\n[s10] \"É uma tradição que devemos proteger a todo custo!\""
63100-174 = "Eu não sabia que existia uma tradição tão maravilhosa...!"
63100-175 = "Talvez as provas não sejam tão ruins assim!"
63100-177 = "Não, acho melhor repensar isso...#nA preparação foi tão difícil, não foi..."
63100-178 = "Mas isso já passou!#nOu seja——!"
63100-179 = "Águas passadas não movem moinhos!"
63100-180 = "……!"
63100-181 = "Isso sim é o estilo Arius!"
63100-183 = "É verdade!"
63100-184 = "Sensei! Podemos... comer bastante?"
63100-185 = "[s11] \"Com certeza!\"\n[s12] \"Então, chamem as outras também!\""
63100-189 = "Sim!"
63100-195 = "（Assim, a primeira prova das garotas de Arius）"
63100-196 = "（Encerrou-se com uma grande comemoração...）"
63100-208 = "Olá, Subaru. Maia, pode se sentar também."
63100-210 = "Olá, Atsuko-san."
63100-211 = "Ah, o-olá... Atsuko, Princesa..."
63100-213 = "Fufu. Você pode me chamar de um jeito mais casual, sabe."
63100-214 = "Nós decidimos isso, não foi? Nós duas."
63100-215 = "M-mesmo dizendo isso...! Mas, mas... ugh..."
63100-216 = "Ah... Atsuko..."
63100-217 = "Sim. Obrigada."
63100-219 = "Então... qual é o motivo da visita de hoje?"
63100-221 = "Ouvi dizer que, no 'mundo exterior', é isso que se faz quando um exame termina."
63100-222 = "Vamos lá, primeiro vamos comer? Dizem que esta cafeteria é famosa pela torta de noz-pecã."
63100-223 = "S-sim... muito obrigada..."
63100-224 = "Fufu, e depois, dizem que as pessoas ficam aqui tomando chá e comentando sobre o exame... como foi para vocês duas?"
63100-225 = "Eu respondi tudo o que eu sabia!"
63100-226 = "Embora houvesse mais coisas que eu não sabia do que as que eu sabia..."
63100-227 = "E você, Subaru?"
63100-229 = "Fiquei pensando: 'então é assim que é o terceiro ano?'. Senti um pouco de diferença."
63100-230 = "Fufu. Mas é um simulado para conhecer a própria capacidade, afinal."
63100-231 = "Não há penalidades nem punições, então acho que podem aceitar os resultados com tranquilidade."
63100-235 = "Hã? E-então, em um exame de verdade, existem punições!?"
63100-236 = "Se o resultado for ruim, você pode ter que fazer aulas de reforço ou..."
63100-237 = "Se as notas continuarem baixas por muito tempo... parece que você pode ser reprovado de ano ou até mesmo não conseguir se formar."
63100-238 = "Ah... então era disso que se tratava a punição..."
63100-239 = "...Sim."
63100-240 = "De certa forma, pode-se dizer que é um mundo gentil."
63100-241 = "..."
63100-242 = "..."
63100-243 = "O que... o esquadrão vai fazer daqui para frente?"
63100-244 = "Vocês estão curiosas, né? Bem, é natural."
63100-245 = "..."
63100-250 = "Pretendo assumir a responsabilidade por Arius."
63100-251 = "...Mais especificamente?"
63100-252 = "Até que Arius tenha seu próprio conselho estudantil, queremos assumir o papel de conselho estudantil provisório."
63100-257 = "O esquadrão... no conselho estudantil? E-então...!"
63100-258 = "Nossa escola... finalmente... vai poder voltar a ser uma escola de verdade!?"
63100-259 = "Depois de centenas de anos!?"
63100-260 = "Vou me esforçar ao máximo para que isso aconteça."
63100-261 = "— Como presidente provisória do conselho estudantil de Arius."
63100-262 = "Presidente do conselho estudantil!?"
63100-263 = "Maia, você está falando alto demais."
63100-264 = "Ah, d-desculpe..."
63100-265 = "...Na verdade, seguindo as tradições de Arius, não há ninguém além de você para esse papel."
63100-266 = "E os outros membros?"
63100-267 = "Provavelmente, a Misaki ficará responsável pela tesouraria."
63100-268 = "Embora ela mesma tenha dito: 'Por que eu tenho que fazer isso... ah, tudo bem, eu faço...'"
63100-269 = "Em outras palavras, significa que 'já que vou fazer, vou me esforçar de verdade'."
63100-270 = "É mesmo...?"
63100-271 = "A Misaki não é muito honesta com os próprios sentimentos. #nAh, não conte isso a ela, senão ela vai ficar muito brava."
63100-272 = "...Ah."
63100-273 = "E também... a Sa-chan será a responsável pelos assuntos gerais e vice-presidente."
63100-274 = "Faz sentido."
63100-275 = "Ela até sugeriu isso como política de gestão da escola: 'Todos devem trabalhar meio período tanto quanto possível'."
63100-276 = "Por que isso...?"
63100-277 = "Ela disse que podemos aprender sobre a sociedade e ganhar um dinheiro extra. #nE que isso também ajudaria na reconstrução de Arius."
63100-278 = "Ela também disse para revisar todos os contratos até que todos se acostumem."
63100-279 = "……Você não está apenas impondo a sua própria experiência?"
63100-280 = "Ora, as pessoas são seres que aprendem com a experiência. #nMas também houve outras sugestões."
63100-281 = "Como assim?"
63100-282 = "……."
63100-286 = "Com isso, a direção geral já ficou clara."
63100-287 = "Sobre o pedido de fundação de clubes, precisamos autorizar considerando o orçamento e a viabilidade, mas……."
63100-288 = "Acho que podemos seguir observando a situação real."
63100-289 = "……Hm? Atsuko, o que você quer dizer com 'quero ouvir desejos mais pessoais'……?"
63100-290 = "Deveríamos estar falando sobre a escola agora."
63100-291 = "Um pedido como presidente do conselho estudantil……?"
63100-292 = "……."
63100-293 = "Se for esse o caso……. #nNão, pode ignorar o que vou dizer……."
63100-297 = "Que talvez…… pudéssemos criar uniformes……."
63100-298 = "Seria legal se fossem fofos e estilosos……."
63100-299 = "Obrigada, Sa-chan. Era exatamente isso que eu queria ouvir."
63100-302 = "Desculpe, vou organizar melhor isso antes de falar."
63100-303 = "Eh? Ah…… entendo."
63100-304 = "Bem, então…… agora é a vez da Hiyori."
63100-305 = "A Hiyori é……."
63100-306 = "……Secretária?"
63100-307 = "Exatamente, secretária como responsável pelos registros, não é? Isso é……."
63100-308 = "Sim…… talvez ela mesma estivesse ciente disso, no começo ela até chorou dizendo 'waaaah'."
63100-309 = "Mas logo se recompôs e mostrou determinação, dizendo que ia se esforçar de verdade."
63100-310 = "É bom ver a Hiyori motivada, então eu também fiquei feliz."
63100-311 = "Eu, eu não entendo muito bem…… mas é bom, né…… a Hiyori-san é gentil, afinal……."
63100-312 = "É verdade…… bem, se você pensa assim……."
63100-313 = "E então, também tenho um pedido para a 'Arius Squad'."
63100-314 = "……Para nós?"
63100-315 = "Poderiam assumir o papel de comitê disciplinar?"
63100-316 = "Comitê…… disciplinar, você diz……?"
63100-317 = "Sim. É o trabalho de proteger a segurança e a disciplina da escola."
63100-318 = "Acho que não poderia pedir isso a ninguém além de você, Subaru."
63100-319 = "……E se eu recusar?"
63100-320 = "Você vai recusar?"
63100-321 = "……."
63100-323 = "Se, senpai……?"
63100-328 = "……Haa."
63100-329 = "Acho que esse jeito de falar não é apropriado."
63100-330 = "Você acha? Mas, mesmo que seja temporário, sou a presidente do conselho estudantil."
63100-331 = "Haa, tudo bem, como quiser."
63100-332 = "(O fato de as pessoas te seguirem apesar de tudo…… é um talento, hein.)"
63100-333 = "……."
63100-334 = "Então, o que pretende fazer no final das contas?"
63100-340 = "Quero transformar Arius em uma escola maravilhosa."
63100-341 = "……Nesse ponto, parece que nossas opiniões coincidem."
63100-342 = "Acho que todos os alunos que permaneceram em Arius sentem algo parecido."
63100-343 = "……Talvez seja verdade. #nSó que…… para realizar isso, não há uma montanha de coisas a fazer?"
63100-344 = "Eu sei. É justamente por isso que, desta vez, não quero abandonar a responsabilidade. #n……Já conversamos sobre isso antes, não é?"
63100-345 = "Você tem confiança?"
63100-346 = "De jeito nenhum. Acho que não conseguiria fazer isso sozinha. #nPor isso, preciso que me dê uma mão."
63100-347 = "E se, ao darmos as mãos, acabarmos todos caindo...?"
63100-348 = "Por outro lado, talvez possamos ajudar a levantar quem caiu."
63100-349 = "De qualquer forma, não sabemos como será o futuro, e não quero ficar pensando só no lado ruim."
63100-350 = "Isso não seria apenas um otimismo sem fundamento?"
63100-351 = "Mas acho que há um significado em agir."
63100-352 = "Eu acredito que isso é o mais importante."
63100-353 = "Para isso, precisamos de uma esperança vaga no futuro, não precisamos?"
63100-358 = "Quero seguir em frente junto com todos."
63100-359 = "……."
63100-360 = "……Entendido."
63100-361 = "Eu também cooperarei ao máximo."
63100-362 = "Afinal, nós não sabemos o que vai acontecer ou o que nos espera."
63100-363 = "……Eu nem imaginava que acabaríamos fazendo um exame."
63100-364 = "Fufu. Eu também fiquei surpresa."
63100-365 = "A-ah, falando nisso... sobre a líder da Trinity..."
63100-366 = "A Mine? Entendi, precisamos conversar sobre isso também, né."
63100-367 = "P-pelo que ouvi, ela não recuperou a consciência naquele dia..."
63100-368 = "Sim, parece que foi isso mesmo."
63100-369 = "Mas não se preocupe. Disseram que ela já se recuperou completamente."
63100-373 = "S-sério!? Que bom...!"
63100-374 = "E, mesmo sem ter conseguido estudar para o exame durante esse tempo, parece que não houve grandes prejuízos."
63100-375 = "É mesmo... Isso é o que mais importa."
63100-376 = "É incrível, né? Mesmo sendo como se ela tivesse selado dentro de si o poder de quatro 'Anjos do Apocalipse'."
63100-377 = "O quê!?"
63100-378 = "A Mine derrotou quatro anjos e acabou desmaiando, não foi?"
63100-379 = "Graças a isso, os sete anjos não entraram em harmonia para liberar todo o poder — foi isso que evitamos."
63100-380 = "Então... ela aguentou firme enquanto carregava quatro anjos!?"
63100-382 = "S-Subaru-senpai...?"
63100-387 = "Ah, desculpe. Eu me exaltei..."
63100-388 = "Parece que, quando a Subaru foi repelida como o último anjo, a Mine também acordou quase ao mesmo tempo."
63100-389 = "Não pode ser... Eu quase perdi a consciência com apenas um... Como é a força de vontade da Mine...?"
63100-390 = "……Talvez isso seja a convicção e a honestidade dela, não acha?"
63100-391 = "Não importa a situação, não importa o sofrimento."
63100-392 = "Ainda assim, ela continua resistindo e seguindo em frente."
63100-393 = "Eu acho que isso... é algo realmente incrível."
63100-395 = "É verdade..."
63100-396 = "Mas... tem uma coisa que eu não consigo entender."
63100-397 = "O quê?"
63100-398 = "Por que ela deixa as pessoas em frangalhos, dizendo que está salvando-as?"
63100-399 = "……."
63100-403 = "Atsuko-san...?"
63100-404 = "Por que colocou a máscara de repente...? #nVocê não disse que ficava difícil de falar assim?"
63100-405 = "(Sussurro, sussurro...)"
63100-406 = "Nós não entendemos linguagem de sinais, sabia!?"
63100-410 = "Ei, você vai fugir!?"
63100-414 = "Ah... mas ela já pagou a conta..."
63100-415 = "Senpai! Eu aprendi uma coisa!"
63100-416 = "É muito importante ter uma rota de fuga para emergências!"
63100-417 = "Não precisava aprender isso com uma situação dessas..."
63100-418 = "Antes de tudo, o melhor é evitar que uma situação dessas aconteça..."
63100-430 = "Ah, Sensei. Seja bem-vindo."
63100-431 = "[s13] \"Parece que todos estão bem!\"\n[s14] \"O trabalho de restauração está indo bem?\""
63100-434 = "Por enquanto, é só este lugar."
63100-435 = "Mas, como este é o ponto de partida..."
63100-436 = "Eu quero mudar Arius, pouco a pouco, a partir daqui."
63100-437 = "...Se o prédio da escola não estiver em condições, ninguém vai querer frequentar."
63100-438 = "Quem sabe, talvez a gente aceite novos alunos ou transferências no futuro."
63100-439 = "M-mas... será que tem alguém que queira estudar em Arius...?"
63100-440 = "Pois é, parece que tem gente, sim."
63100-441 = "Pessoas que querem aprender técnicas exclusivas de Arius... daquelas que não dá para falar muito por aí..."
63100-442 = "M-mas essas técnicas não deveriam desaparecer, se possível...!?"
63100-443 = "Sempre haverá pessoas em qualquer época e lugar que anseiam por poder..."
63100-445 = "Quando descobrirem a realidade, vão fugir rapidinho de qualquer jeito. Não precisa se preocupar."
63100-446 = "[s] \"A-aliás, como todos foram nas provas?\""
63100-447 = "Eu tirei uma média de 90 pontos. Para a primeira vez, acho que não foi ruim, né?"
63100-448 = "...Tirei nota vermelha em algumas."
63100-449 = "Língua pátria... não entendo quando perguntam a opinião do autor."
63100-450 = "Eu fiquei no limite da nota vermelha... Uaaaaaah."
63100-451 = "[s15] \"Não, não, acho que você foi incrível!\"\n[s16] \"Só de ter evitado a nota vermelha, já é um feito e tanto!\""
63100-454 = "Uaaaaaah~! #nEssa sua gentileza acaba doendo no meu peito..."
63100-455 = "[s] \"Da próxima vez é só se esforçar mais!\""
63100-463 = "Voltei do relatório de patrulha... Ah, Sensei. Você veio?"
63100-464 = "Ah, olá. Seja bem-vindo... a Arius!"
63100-465 = "E-então... qual seria o motivo da sua visita?"
63100-466 = "...Hein? Veio perguntar... o resultado das provas?"
63100-467 = "..."
63100-468 = "Desculpe, Sensei... Eu só consegui tirar uma nota no limite da vermelha... #nUaaaaaah!"
63100-469 = "Hein? A Maia também?"
63100-470 = "A Hiyori também?"
63100-471 = "..."
63100-472 = "..."
63100-476 = "N-nós somos... companheiras de evitar a nota vermelha...!"
63100-477 = "Pois é...!"
63100-478 = "Da próxima vez, vamos nos esforçar mais...!"
63100-479 = "Sim...!"
63100-484 = "Uaaaaaah~!"
63100-487 = "[ns] \"Como você foi, Subaru?\""
63100-489 = "...Hein?"
63100-490 = "[s] \"Os outros me contaram, sabia?\""
63100-491 = "..."
63100-492 = "Sensei, na verdade você já sabe, não é?"
63100-493 = "[s] \"...\""
63100-497 = "[ns] \"Disseram que você ficou na média.\""
63100-498 = "...Sim."
63100-499 = "[s] \"Você se esforçou bastante.\""
63100-500 = "...Será que dá para dizer que eu me esforcei?"
63100-509 = "[wa:1850]― [log=스바루]...Realmente, [wa:2000] aconteceram muitas [wa:700] coisas.[/log]"
63100-512 = "[wa:600]― [log=스바루]Olhando para trás agora,[/log]"
63100-514 = "― [log=스바루]chego a pensar que tudo [wa:1100] não passou de um sonho...[/log]"
63100-517 = "[wa:250]― [log=스바루]Mas, [wa:1600]sobre todas as coisas[/log]"
63100-519 = "― [log=스바루]Eu gostaria de [wa:1050]expressar minha gratidão novamente.[/log]"
63100-522 = "[wa:350]― [log=스바루]――Isto é, [wa:1900]do fundo do meu coração.[/log]"
63100-528 = "Hm? Minhas notas?"
63100-529 = "Hmm..."
63100-530 = "Desculpe se soar um pouco... como se eu estivesse me gabando..."
63100-531 = "Bem, isso também é tudo graças ao Sensei."
63100-535 = "Eu tirei... nota máxima."
63100-536 = "Obrigada, Sensei."
63100-537 = "O Sensei é realmente... o benfeitor da minha vida."
