[translation]
1007003-1 = "リコーダーの練習"
1007003-5 = "（シュッ！）"
1007003-12 = "これ以上、逃げ場はないぞ。#n大人しく投降するなら、悪いようにはしない。"
1007003-13 = "チッ……！"
1007003-17 = "[ns1] \"今だよ、ミナ！\"\n[ns2] \"行き止まりに追い込んだよ！\""
1007003-20 = "（次の瞬間、どこかからリコーダーの音が聞こえてきたが……）"
1007003-21 = "（それは形容しがたい奇怪な音色だった）"
1007003-22 = "な、何の音だ……？"
1007003-28 = "[ns] \"み、ミナさん、そのリコーダーは……？\""
1007003-29 = "……（演奏中）"
1007003-31 = "何だよ、いったい……クソッ、最後に苦しませようってか？"
1007003-33 = "……（演奏中）"
1007003-43 = "やっ……やめてくれ！これ以上は耳がっ！！#n降参だ！投降するから許してくれ！！"
1007003-45 = "……。"
1007003-46 = "悪党には、この風情ある音色が分からないのか……！"
1007003-48 = "これ以上、お前らに[ruby=レクイエム]鎮魂曲[/ruby]を捧げる価値はない！"
1007003-55 = "（その後、なぜか怒っているミナによって、不良生徒は取り押さえられた……）"
1007003-57 = "ふぅ……今日の祝杯は苦いな。"
1007003-62 = "[ns] \"それ、ジュースだよね……。\""
1007003-63 = "フッ。"
1007003-64 = "[s3] \"ところで、ミナさん……\"\n[s4] \"あのリコーダーは何だったんでしょうか？\""
1007003-67 = "ああ、リコーダーか。"
1007003-68 = "先生なら、気に入ってくれると信じていたぞ。"
1007003-69 = "以前、映画で見たことがあってな。"
1007003-70 = "オープニングと共にグラスの音が聞こえ――カクテルを一気に飲み干し……#nそのままクラリネットを演奏する主人公。"
1007003-71 = "彼は……その後も同僚が死ぬ時、決まってクラリネットを演奏していた。"
1007003-72 = "それで、私も心に決めたのだ。"
1007003-73 = "相手を取り押さえる前に、[ruby=レクイエム]鎮魂曲[/ruby]を捧げようとな。"
1007003-74 = "[s] \"でもミナが吹いてたのは、リコーダーだよね……？\""
1007003-75 = "……。"
1007003-76 = "いいか、先生。"
1007003-77 = "クラリネットは……難しいんだ。"
1007003-78 = "[s] \"だから、学校で習ったリコーダーを？\""
1007003-79 = "フッ。"
1007003-80 = "[s] \"……。\""
1007003-81 = "それで、先生……演奏はどうだった？"
1007003-82 = "[s] \"……正直に言っても良いかな？\""
1007003-83 = "ああ、もちろんだとも。"
1007003-84 = "[s] \"[ruby=レクイエム]鎮魂曲[/ruby]には聞こえなかったかも……。\""
1007003-85 = "そっ、そうか……。"
1007003-86 = "だが、「これまで」よりも「これから」を語ろうじゃないか。"
1007003-87 = "繰り返される「今」が、やがて「未来」へ繋がる道となるのだから。"
1007003-88 = "[s] \"……リコーダーの練習をする、ってことだよね？\""
1007003-89 = "フッ。"
1007003-90 = "やはり、先生は話が通じるな。"
1007003-92 = "（その後も、ミナの演奏は続いた）"
1007003-98 = "な、なんだ？このリコーダーの音は……？"
1007003-99 = "形容しがたい……なんだこの音は！？"
1007003-106 = "フッ。"
1007003-119 = "ひぃっ！#nリコーダーの音が聞こえてきたぞ……！"
1007003-120 = "この耳[ruby=ざわ]障[/ruby]りな音は、いったい何なんだ……！"
1007003-128 = "……フッ。"
1007003-129 = "#st;[0,0];instant;1;"
1007003-130 = "#clearST"
1007003-133 = "ここ最近、玄龍門の治安が安定してきた。"
1007003-134 = "不良生徒が起こす騒ぎも減って、玄龍門としては喜ばしい限りだ。"
1007003-135 = "ふぅ……自分の仕事が実を結ぶと、気持ちがいいものだな。"
1007003-136 = "[s5] \"リコーダーを吹きながら、不良生徒の取り締まりを行う……\"\n[s6] \"玄龍門の幹部がいるって噂が広まってるみたいだけど……\""
1007003-139 = "ああ、その噂か。私の耳にも入ってきた。"
1007003-140 = "ついに、私の[ruby=レクイエム]鎮魂曲[/ruby]の素晴らしさが知れ渡ってきたのだな？#nこれも演奏力が上がった証拠だろう。"
1007003-141 = "フフッ、これがやり甲斐か。実に素晴らしい。"
1007003-142 = "[s] \"そうだね……。\""
1007003-144 = "（恐ろしいリコーダーの音と共に現れる玄龍門幹部の噂は、あっという間に山海経全域へ広まった。）"
1007003-145 = "（結果的として、山海経の治安維持に役立っているようなので、#nめでたし、めでたし……？）"
