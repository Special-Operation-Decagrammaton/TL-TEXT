[translation]
1007003-1 = "prática de gravador"

1007003-5 = "(Xô!)"

1007003-12 = "Não há mais lugar para escapar. #nSe você se entregar silenciosamente, não farei nada de mal com você."

1007003-13 = "Tsc...!"

1007003-17 = "[ns1] \"Agora, Mina!\"\n[ns2] \"Nós levamos você a um beco sem saída!\""

1007003-20 = "(No momento seguinte, ouvi o som de um gravador vindo de algum lugar...)"

1007003-21 = "(Era um tom estranho que é difícil de descrever.)"

1007003-22 = "O-que som é esse...?"

1007003-28 = "[ns] \"M-Mina-san, aquele gravador é...?\""

1007003-29 = "...(jogando)"

1007003-31 = "Que diabos... caramba, vamos fazer você sofrer no final?"

1007003-33 = "...(jogando)"

1007003-43 = "Sim... pare com isso! Não consigo ouvir mais! ! #nEntregue-se! Por favor, me perdoe porque eu me rendo! !"

1007003-45 = "……."

1007003-46 = "Será que os vilões não entendem esse tom elegante...!?"

1007003-48 = "Não vale a pena dedicar mais nada a você!"

1007003-55 = "(Depois disso, o aluno delinquente foi preso por Mina, que estava irritada por algum motivo...)"

1007003-57 = "Ufa... A comemoração de hoje é agridoce."

1007003-62 = "[ns] \"Isso é suco...\""

1007003-63 = "Huh."

1007003-64 = "[s3] \"A propósito, Mina-san...\"\n[s4] \"O que era aquele gravador?\""

1007003-67 = "Ah, um gravador?"

1007003-68 = "Acreditei que a professora iria gostar."

1007003-69 = "Já vi isso em um filme antes."

1007003-70 = "Na abertura, ouve-se o som de copos - o personagem principal bebe o coquetel de um só gole...#nO protagonista continua a tocar clarinete."

1007003-71 = "彼は……その後も同僚が死ぬ時、決まってクラリネットを演奏していた。"
1007003-72 = "Então, eu também me decidi."

1007003-73 = "Antes de subjugar seu oponente, tente oferecê-lo."

1007003-74 = "[s] \"Mas Mina estava tocando o gravador, certo...?\""

1007003-75 = "……."

1007003-76 = "Ouça, senhor."

1007003-77 = "O clarinete é... difícil."

1007003-78 = "[s] \"Então, o gravador que você aprendeu na escola?\""

1007003-79 = "Huh."

1007003-80 = "[s] \"…….\""

1007003-81 = "Então, professora... como foi a apresentação?"

1007003-82 = "[s] \"...Posso ser honesto?\""

1007003-83 = "Ah, claro."

1007003-84 = "[s] \"Talvez eu não tenha ouvido...\""

1007003-85 = "Oh, eu vejo..."

1007003-86 = "Porém, em vez de falar do passado, vamos falar do futuro."

1007003-87 = "O repetido “agora” eventualmente se tornará o caminho que leva ao “futuro”."

1007003-88 = "[s] \"...Você quer dizer praticar a flauta doce, certo?\""

1007003-89 = "Huh."

1007003-90 = "Como esperado, o professor pode entender."

1007003-92 = "(A performance de Mina continuou depois disso)"

1007003-98 = "O que? Qual é o som deste gravador...?"

1007003-99 = "É difícil descrever... Que som é esse? ?"

1007003-106 = "Huh."

1007003-119 = "Ei! #nEu ouvi o som do gravador...!"

1007003-120 = "O que diabos é esse som estranho...?"

1007003-128 = "...Huh."

1007003-129 = "#st;[0,0];instantâneo;1;"

1007003-130 = "#claroST"

1007003-133 = "Recentemente, a segurança do Genryumon tornou-se estável."

1007003-134 = "O número de comoções causadas por alunos inadimplentes diminuiu, o que deixa Genryumon muito feliz."

1007003-135 = "Hmm... é bom quando seu trabalho dá frutos."

1007003-136 = "[s5] \"Enquanto toca o gravador, ele reprime os alunos delinquentes...\"\n[s6] \"Parece que estão se espalhando rumores de que existem executivos de Genryumon...\""

1007003-139 = "Ah, esse boato? Chegou aos meus ouvidos também."

1007003-140 = "Finalmente minha grandeza está se tornando conhecida, não é? #nIsso também é prova de que sua habilidade de jogo melhorou."

1007003-141 = "Hehe, vale a pena fazer isso? Verdadeiramente maravilhoso."

1007003-142 = "[s] \"Isso mesmo...\""

1007003-144 = "(Rumores de que os executivos da Xuanlongmen apareceram com o som de um gravador assustador se espalharam rapidamente por todo Shanhaijing.)"

1007003-145 = "(Como resultado, parece estar ajudando a manter a ordem pública em Shanhaijing, então #nparabéns, parabéns...?)"

