[translation]
1601602-1 = "写真撮影"
1601602-5 = "（ミネに教えてもらったスタジオを訪ねた）"
1601602-14 = "[ns1] \"忙しそうだね。\"\n[ns2] \"撮影中かな……？\""
1601602-29 = "先生、ようこそお越しくださいました。"
1601602-30 = "……皆さん！"
1601602-34 = "少し休憩といたしましょう。"
1601602-35 = "10分後に再開いたします！"
1601602-37 = "はい！"
1601602-44 = "急なお願いにもかかわらず、ありがとうございます。"
1601602-45 = "ご覧の通り、写真撮影をしていました。"
1601602-46 = "こういった服を着る機会は滅多にないですし、#nせっかくなので活用しようという話になりまして。"
1601602-47 = "……なぜか誤解されている救護騎士団のイメージを改善するために。"
1601602-51 = "[ns3] （なぜか……？）\n[ns4] （誤解……？）"
1601602-54 = "団長の私がアイドル衣装を身に纏えば、対外活動においての周囲の見る目も変わるはずです。"
1601602-55 = "そこで、より効果的にイメージアップするためにはどうすれば良いのか、#n先生にご意見を伺いたかったのです。"
1601602-56 = "そうですね……。"
1601602-60 = "……例えば、どのようなポーズやロケーションだと注目を集められるのでしょうか？"
1601602-61 = "方向性、ですか？"
1601602-62 = "……肝心なことを失念しておりました。"
1601602-63 = "[s5] \"例えば、格好良い姿をアピールするとか……。\"\n[s6] \"見る側の視点でイメージしてみるのはどうかな？\""
1601602-66 = "あれ……。"
1601602-71 = "……何だかおかしくはありませんか？"
1601602-72 = "方向性が決まっていないのに、撮影がスムーズに進むだなんて。"
1601602-73 = "団員の方に聞いてみるとしましょう。"
1601602-74 = "もしかしたら、私が知らないだけかもしれません。"
1601602-81 = "皆さん、少しよろしいでしょうか？"
1601602-85 = "再開する前に、質問があるのです。"
1601602-86 = "今回の撮影の方向性を聞かせてもらえますか？"
1601602-90 = "すでにご存知では……？"
1601602-91 = "……たしか話し合いの途中で、どこかへ行ってしまったような。"
1601602-92 = "「可愛さ」です、団長。"
1601602-96 = "可愛さ、とは……？"
1601602-97 = "……なるほど。"
1601602-98 = "アイドル衣装の「可愛さ」を見せるのですね。"
1601602-99 = "何を仰っているんですか、団長。"
1601602-100 = "今さら恥ずかしがって、とぼける必要はありませんよ。"
1601602-101 = "最初からポーズもバッチリでしたし、てっきり知っているんだと思ってました。"
1601602-102 = "何ですか、その反応は……！？"
1601602-107 = "皆さん、どうしてそんな風に笑いを堪えるような……。"
1601602-111 = "せ、先生まで！"
1601602-115 = "……はい？"
1601602-116 = "つまり、「可愛さ」が指しているのは……。"
1601602-120 = "……私、ですか？"
1601602-121 = "ほ、本当に……？"
1601602-122 = "……このアイドル衣装ではなく？"
1601602-123 = "[ns7] \"その衣装を着たミネが可愛いんだよ。\"\n[ns8] \"ミネも可愛いものが好きって言ってたよね。\"\n[ns9] \"無自覚に可愛いポーズをしてたんだ……。\""
1601602-129 = "……！？"
1601602-130 = "そ、それは……！"
1601602-131 = "私としたことが……。"
1601602-132 = "なんてお恥ずかしい……。"
1601602-135 = "[wa:870]― [log=미네 아이돌]こ、[wa:700]これは……[wa:830]その……[/log]"
1601602-137 = "― [log=미네 아이돌]想定していたものと……[wa:1710]違う[wa:530]気がするのですが……！[/log]"
1601602-140 = "[wa:600]― [log=미네 아이돌]い、[wa:500]いえ！[/log]"
1601602-142 = "― [log=미네 아이돌]嫌というわけでは……[wa:1480]ないのですが……[/log]"
1601602-145 = "― [log=미네 아이돌]で、[wa:770]ですが！[/log]"
1601602-147 = "― [log=미네 아이돌]好きというわけでも[wa:1100]ないです……！[/log]"
1601602-150 = "[wa:1750]― [log=미네 아이돌]たしかに、[wa:950]私自身は[wa:1000]かわいいものが好きですが……[/log]"
1601602-153 = "― [log=미네 아이돌]「かわいい」の対象が[wa:1670]自分というのは……[/log]"
1601602-156 = "[wa:520]― [log=미네 아이돌]そ、[wa:730]その……[wa:1900]そういう状況を……[/log]"
1601602-158 = "― [log=미네 아이돌]想定していた[wa:730]わけでは……！[/log]"
1601602-161 = "[ns10] \"可愛いよ、ミネ！\"\n[ns11] \"せっかくのチャンスだよ！\""
1601602-162 = "[wa:810]― [log=미네 아이돌]か、[wa:840]からかっていますよね、[wa:1440]先生？[/log]"
1601602-163 = "[wa:810]― [log=미네 아이돌]か、[wa:840]からかっていますよね、[wa:1440]先生？[/log]"
1601602-165 = "― [log=미네 아이돌]そ、[wa:900]そんな言葉を[wa:1700]言わないでください……！[/log]"
1601602-168 = "― [log=미네 아이돌]わ、[wa:500]私……[wa:1200]どうすれば……！[/log]"
1601602-171 = "（その後、恥ずかしがるミネの反応に団員は湧き上がった）"
1601602-172 = "（「可愛さ」に「恥ずかしさ」まで加わったミネの撮影会は、成功を収めた）"
1601602-177 = "（しかし、ミネの反対によって、写真は団員たちの個人的なコレクションになってしまった）"
