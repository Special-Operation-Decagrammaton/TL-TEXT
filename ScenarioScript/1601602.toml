[translation]
1601602-1 = "Sessão de fotos"
1601602-5 = "（Visitei o estúdio que a Mine me recomendou）"
1601602-14 = "[ns1] \"Parece que estão ocupados.\"\n[ns2] \"Estão no meio de uma sessão...?\""
1601602-29 = "Sensei, seja bem-vindo."
1601602-30 = "……Pessoal!"
1601602-34 = "Vamos fazer uma pequena pausa."
1601602-35 = "Retornaremos em 10 minutos!"
1601602-37 = "Sim!"
1601602-44 = "Obrigada por vir, mesmo com um pedido tão repentino."
1601602-45 = "Como pode ver, estávamos fazendo uma sessão de fotos."
1601602-46 = "Raramente tenho a oportunidade de usar roupas assim, então #ndecidimos aproveitar a chance."
1601602-47 = "……Tudo para melhorar a imagem do Esquadrão de Socorro, que por algum motivo é mal compreendida."
1601602-51 = "[ns3] （Por algum motivo...?）\n[ns4] （Mal compreendida...?）"
1601602-54 = "Se eu, como líder, vestir um traje de idol, a forma como as pessoas nos veem nas atividades externas deve mudar."
1601602-55 = "Por isso, queria pedir a sua opinião, Sensei, #nsobre como podemos melhorar nossa imagem de forma mais eficaz."
1601602-56 = "Bem……."
1601602-60 = "……Por exemplo, que tipo de pose ou local atrairia mais atenção?"
1601602-61 = "A direção, você diz?"
1601602-62 = "……Esqueci de algo fundamental."
1601602-63 = "[s5] \"Por exemplo, destacar uma postura mais imponente…….\"\n[s6] \"Que tal imaginar sob a perspectiva de quem está vendo?\""
1601602-66 = "Ué……."
1601602-71 = "……Não há algo estranho aqui?"
1601602-72 = "Como a sessão pode estar fluindo tão bem se a direção ainda não foi definida?"
1601602-73 = "Vou perguntar aos membros do esquadrão."
1601602-74 = "Talvez seja apenas algo que eu não saiba."
1601602-81 = "Pessoal, poderiam me dar um momento?"
1601602-85 = "Antes de recomeçarmos, tenho uma pergunta."
1601602-86 = "Poderiam me dizer qual é a direção desta sessão de fotos?"
1601602-90 = "Você já não sabe……?"
1601602-91 = "……Parece que você saiu durante a nossa discussão."
1601602-92 = "É \"fofura\", líder."
1601602-96 = "Fofura, você diz……?"
1601602-97 = "……Entendo."
1601602-98 = "Então é para mostrar a \"fofura\" do traje de idol."
1601602-99 = "O que está dizendo, líder?"
1601602-100 = "Não precisa ficar com vergonha e fingir que não sabe agora."
1601602-101 = "Suas poses estavam perfeitas desde o início, achei que você já sabia."
1601602-102 = "O que é essa reação……!?"
1601602-107 = "Pessoal, por que estão tentando segurar o riso desse jeito……."
1601602-111 = "A-até você, Sensei!"
1601602-115 = "……Sim?"
1601602-116 = "Quer dizer que, a \"fofura\" se refere a……."
1601602-120 = "……A mim?"
1601602-121 = "S-sério mesmo……?"
1601602-122 = "……Não ao traje de idol?"
1601602-123 = "[ns7] \"A Mine fica fofa usando esse traje.\"\n[ns8] \"Você disse que também gosta de coisas fofas, Mine.\"\n[ns9] \"Você estava fazendo poses fofas sem perceber…….\""
1601602-129 = "……!?"
1601602-130 = "I-isso é……!"
1601602-131 = "Eu, que deveria ser a líder……."
1601602-132 = "Que vergonha……."
1601602-135 = "[wa:870]― [log=미네 아이돌]I-isso... [wa:700]é que...[wa:830] bem...[/log]"
1601602-137 = "― [log=미네 아이돌]Sinto que...[wa:1710] é diferente[wa:530] do que eu imaginava...![/log]"
1601602-140 = "[wa:600]― [log=미네 아이돌]N-não, [wa:500]espere![/log]"
1601602-142 = "― [log=미네 아이돌]Não é que eu...[wa:1480] não goste, mas...[/log]"
1601602-145 = "― [log=미네 아이돌]M-mas, [wa:770]espere![/log]"
1601602-147 = "― [log=미네 아이돌]Também não é que eu...[wa:1100] goste disso...![/log]"
1601602-150 = "[wa:1750]― [log=미네 아이돌]Certamente, [wa:950]eu mesma [wa:1000]gosto de coisas fofas, mas...[/log]"
1601602-153 = "― [log=미네 아이돌]Ser eu o alvo da [wa:1670]fofura é...[/log]"
1601602-156 = "[wa:520]― [log=미네 아이돌]I-isso... [wa:730]bem... [wa:1900]eu não estava...[/log]"
1601602-158 = "― [log=미네 아이돌]preparada para [wa:730]uma situação dessas...![/log]"
1601602-161 = "[ns10] \"Você está fofa, Mine!\"\n[ns11] \"É uma oportunidade única!\""
1601602-162 = "[wa:810]― [log=미네 아이돌]V-você está [wa:840]me provocando, [wa:1440]Sensei?[/log]"
1601602-163 = "[wa:810]― [log=미네 아이돌]V-você está [wa:840]me provocando, [wa:1440]Sensei?[/log]"
1601602-165 = "― [log=미네 아이돌]N-não [wa:900]diga esse tipo de coisa...![wa:1700][/log]"
1601602-168 = "― [log=미네 아이돌]O-o que... [wa:500]eu devo fazer...[wa:1200] agora...![/log]"
1601602-171 = "(Depois disso, a reação envergonhada de Mine deixou os membros do grupo em polvorosa)"
1601602-172 = "(A sessão de fotos de Mine, que somou a \"fofura\" à sua \"timidez\", foi um sucesso)"
1601602-177 = "(No entanto, devido à oposição de Mine, as fotos acabaram se tornando uma coleção particular dos membros)"
