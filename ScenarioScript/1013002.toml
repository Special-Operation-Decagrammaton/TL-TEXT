[translation]
1013002-1 = "todo mundo é sênior"
1013002-3 = "Você realmente veio, senhor..."
1013002-4 = "[s] \"A reconstrução de Oita progrediu.\""
1013002-5 = "Sim. Mas aos poucos."
1013002-6 = "[s] \"Não sei se posso dizer isso, mas...\""
1013002-7 = "Tudo bem. o que?"
1013002-8 = "[s] \"Parece bom, não é?\""
1013002-9 = "……Concordo."
1013002-10 = "Eu também acho. Mas ainda sinto que ainda não estou acostumada."
1013002-11 = "Agora é a hora de mudar."
1013002-12 = "……sim? Você está em patrulha?"
1013002-13 = "……."
1013002-14 = "Bem, acho que havia muitas coisas acontecendo..."
1013002-15 = "Acabei assumindo um papel semelhante ao que outras escolas chamam de presidente do comitê disciplinar."
1013002-16 = "Em termos de manutenção da ordem de Ário, é quase igual ao que temos feito até agora."
1013002-17 = "Sinto-me um pouco melhor agora que não preciso me preocupar com ataques externos."
1013002-18 = "...Por que?"
1013002-19 = "Hehe, é uma história simples."
1013002-20 = "Não há muitas pessoas de fora que vêm até Arius e tentam causar comoção."
1013002-21 = "De muitas maneiras."
1013002-27 = "[ns] \"Eu ouvi uma explosão!?\""
1013002-28 = "Vamos."
1013002-32 = "Qual é o alvoroço?"
1013002-37 = "Ah, senpai. Não é grande coisa."
1013002-38 = "Isso mesmo, nós--"
1013002-39 = "Estávamos apenas tendo uma “discussão” no estilo Arius."
1013002-41 = "Ah... entendo."
1013002-45 = "[ns1] \"Estilo Arius...\"\n[ns2] \"Discussão...?\""
1013002-49 = "Você não sabe? sensei."
1013002-50 = "É verdade que ele é um estranho."
1013002-51 = "Na Arius, enfatizamos palavras e ações ao persuadir!"

1013002-55 = "[ns] \"Eu entendo as palavras, mas as ações...?\""
1013002-56 = "Sim! Então nós..."
1013002-57 = "Quando as opiniões conflitam!"
1013002-58 = "Vamos discutir qual “ação” é mais “persuasiva”!"
1013002-59 = "Então, você reconheceu que naquela época era uma bala de 5,56 mm?"
1013002-60 = "Isso não pode ser verdade! Afinal, é uma bala poderosa de 7,62 mm."
1013002-61 = "Huh? O Squad também usa 5,56mm, certo?"
1013002-62 = "Não é porque essas crianças recebem um subsídio especial? #n 7,62 mm é bom para nós!"
1013002-63 = "É verdade que 7,62 mm é poderoso, mas o recuo torna difícil mirar!"
1013002-64 = "É uma perda de tempo mirar. Não é melhor atirar rápido?"
1013002-65 = "Isso é exatamente o que pessoas como você dizem!"
1013002-66 = "É mentira que o recuo de 7,62 mm é enorme! #nSe o projeto e o extintor forem usados ​​corretamente..."
1013002-67 = "Além disso, é simples e volumoso, certo? Você pode carregar 300 cartuchos de 7,62 mm?"
1013002-68 = "Se você pode ou não mirar depende da situação, então é melhor atirar continuamente!"
1013002-69 = "Acho que temos dinheiro para balas como essa! ?"
1013002-76 = "Sim, é isso para vocês dois."
1013002-78 = "Senpai, mas!"
1013002-79 = "Senpai! !"
1013002-81 = "Eu entendi o que os dois estavam falando. #nAmbas as afirmações estão corretas. Esse é um problema difícil."
1013002-82 = "Posso te perguntar a história de como essa história surgiu?"
1013002-84 = "Isso é..."
1013002-85 = "Eu me pergunto qual bala é melhor para proteger nosso Arius..."
1013002-87 = "Bem, todos e eu temos o mesmo desejo de proteger a escola. #n...O que é importante é esse fato."
1013002-88 = "Todos deveriam ter as mesmas aspirações, mas só porque têm maneiras diferentes de pensar..."
1013002-89 = "Não é hora de acabar com as “discussões arianas” radicais?"
1013002-90 = "Romper com amigos só irá destruir você."
1013002-92 = "……certamente."
1013002-93 = "Sim... não é mais o mesmo velho Arius..."
1013002-95 = "Seria bom se você pudesse se lembrar disso quando sentir que está prestes a entrar em uma discussão."
1013002-96 = "Isso porque “falar” custa dinheiro."
1013002-98 = "Desculpe, Senpai..."
1013002-100 = "Hehe. No entanto, estou feliz que ambos se preocupem tanto com a escola."
1013002-101 = "Continuaremos repetindo tentativa e erro. #nÀs vezes você pode querer seguir o caminho antigo."
1013002-102 = "No entanto, vamos enfrentá-lo juntos de novas maneiras, tanto quanto possível. #nVou tentar o meu melhor também."
1013002-103 = "Por favor, me ligue a qualquer momento se estiver com problemas."
1013002-105 = "...! #nSim, Senpai...!"
1013002-106 = "Eu entendo, obrigado, senpai!"
1013002-111 = "Ufa..."
1013002-112 = "[s] \"Você diz algo legal.\""
1013002-113 = "E-É mesmo?"
1013002-114 = "Na verdade, só recentemente pude falar assim..."
1013002-115 = "No passado, eu simplesmente fechava os olhos para tudo."
1013002-116 = "...Mas é certamente um tema importante. #nAmbos os marcadores não são intercambiáveis ​​e 5,56 mm é o padrão externo."
1013002-117 = "Porém, não posso me dar ao luxo de descontinuar a 7,62mm que tenho usado até agora..."
1013002-118 = "Minha arma também é personalizada para 7,62 mm por questão de fornecimento."
1013002-119 = "……."
1013002-120 = "Mas me sinto um pouco aliviado."
1013002-121 = "Para ser honesto, pensei que todos iriam me odiar por desempenhar esse papel."
1013002-122 = "Porém, todos me seguiram...estou muito feliz."
1013002-123 = "[s3] \"Subaru é o sênior em quem você pode confiar.\"\n[s4] \"É porque Subaru é quem uniu todos.\"\"\n1013002-126 = \"n / D. Mesmo que eu te elogie tanto, não vai dar em nada, certo?\"\n1013002-127 = \"...Mas às vezes me sinto culpado e culpado.\"\n1013002-128 = \"Posso fazer tudo o que quiser para ouvi-los e estar ao seu lado, mas...\"\n1013002-129 = \"…….\"\n1013002-130 = \"No final, não creio que seja uma solução fundamental.\"\n1013002-131 = \"Acho que é apenas uma distração.\"\n1013002-132 = \"[s5] \"Tudo bem.\"\n[s6] \"Acho que Subaru também precisa de alguém para conversar.\""

1013002-135 = "foto? O que diabos aconteceu de repente...?"
1013002-136 = "Certamente, “alguém” pode ser necessário para vigiar."
1013002-137 = "Eu posso entender, mas..."
1013002-138 = "Queria que você ouvisse minha história..."
1013002-139 = "[s7] \"Os professores estão lá para momentos como este.\"\n[s8] \"Tenho outros empregos, mas...\""
1013002-142 = "Eu vejo. Isto é o que você ouve falar."
1013002-143 = "Ela atrai os alunos com palavras doces e diz que eles nunca mais conseguirão voltar a ser como eram antes."
1013002-144 = "Bem, eu acho... é um recurso especial do Chronos Channel? Isso é o que eu estava dizendo..."
1013002-145 = "[s] \"Não, não... isso é realmente um mal-entendido...\""
1013002-146 = "Bem, estar tão deprimido..."
1013002-147 = "……."
1013002-148 = "Entendido. Então, se você tiver uma chance da próxima vez, por favor me avise."
1013002-149 = "Quando estou com meu sensei, acabamos conversando sobre várias coisas."
1013002-150 = "Hehe... esse também é um dos truques deles?"
1013002-151 = "[s] \"Não, não... isso é realmente um mal-entendido...\""
1013002-152 = "...Huh? Acho que ouvi a mesma coisa antes."
1013002-154 = "(Voltei para a placa de Petri, sentindo-me um tanto derrotado...)"
