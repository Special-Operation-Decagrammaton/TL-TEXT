[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22110-1 = "Episódio 11: Isso Pouco Importa Agora!"
22110-2 = "……No fim, a presidente levou a Aris embora, né."
22110-3 = "Ei…… isso aqui não tá bem complicado……?"
22110-4 = "Sim, é uma emergência."
22110-6 = "Então, o motivo de a presidente Rio não ter\nconvocado ninguém além da presidente……"
22110-7 = "Provavelmente, ela já previa, desde o início,\nque a líder ia trair."
22110-8 = "Que maldade! Levar a Aris embora e ainda\npor cima maltratar a líder!"
22110-10 = "…………Haah."
22110-11 = "……Presidente?"
22110-12 = "[s] \"Neru……? Ainda tá doendo em algum lugar……?\""
22110-13 = "Ver, bem na minha frente, ela ser levada……#neu só consegui ficar olhando, sem fazer nada……"
22110-15 = "Isso é……"
22110-16 = "Líder, não precisa se atormentar. Você não chegou\na lutar de frente, não foi?"
22110-17 = "Isso! Aquilo não valeu! Não valeu!"
22110-19 = "……Vocês, quando uma missão falha,\nsoltam uma desculpa dessas?"
22110-23 = "Isso é……"
22110-25 = "Aquela que, sem me dar a mínima, levou a Aris embora……"
22110-26 = "Ela disse que era a \"codinome Zero-Quatro\"."
22110-27 = "Toki, foi isso?#n——Akane, você conhece?"
22110-28 = "……Pois é."
22110-29 = "A existência dela, eu conhecia."
22110-30 = "Codinome Zero-Quatro.#nMembro do \"C&C\", mas exclusiva da presidente Rio."
22110-31 = "Por assim dizer, a guarda-costas da presidente Rio……"
22110-32 = "Mas, na real, eu também a vi cara a cara pela primeira vez……"
22110-33 = "Quem diria…… que a presidente ia chegar a usar até\nela pra fazer uma coisa dessas……"
22110-34 = "E ainda, mesmo numa emboscada, dominar a presidente……"
22110-35 = "……Aquela ali, usou alguma coisa estranha."
22110-36 = "[s] \"……Ela disse que era o \"armamento\" que a Rio deu, né.\""
22110-37 = "Ei, Sensei."
22110-38 = "Por que aquela baixinha……"
22110-39 = "……mesmo com aquela conversa de destruir o Halo,\nfoi atrás da Rio?"
22110-40 = "Será que ela entendeu o sentido das palavras\ne foi por vontade própria?"
22110-41 = "Ei…… por que a Rio disse aquelas coisas pra uma\nbaixinha que só sabe jogar um pouquinho?"
22110-42 = "Só eu é que não tô entendendo?#nEi, me explica…… o que diabos é tudo isso?"
22110-43 = "Veterana Neru……"
22110-44 = "[s] \"Por ora…… vamos organizar a situação.\""
22110-46 = "(Enquanto a Momoi não recobrava a consciência, a Aris foi sequestrada pela Rio——)"
22110-47 = "(E a Rio nos disse que o objetivo era destruir o Halo da Aris.)"
22110-49 = "Ou seja, \"Aris\".#nVocê é——"
22110-50 = "o \"Rei Demônio\" que nasceu para destruir este mundo."
22110-52 = "Ah…… ficou difícil de entender?"
22110-53 = "Ou seja—— destruir o seu Halo resolve a questão."
22110-55 = "Sensei, a Aris……#nserá que, como a presidente disse, ela é mesmo……"
22110-56 = "……o \"Rei Demônio\"?"
22110-57 = "[s] \"Midori……\""
22110-61 = "Eu………"
22110-62 = "eu…… não……"
22110-63 = "não sei…… bem……"
22110-64 = "Eu quero ouvir direito o que a Aris sente, e conversar……"
22110-65 = "Quero convencer a presidente de que a Aris não é\nisso……#nde que ela não é \"Rei Demônio\" nenhum……"
22110-66 = "Eu, é……"
22110-67 = "A gente, é………"
22110-72 = "Sensei, o que será que a gente deve fazer?"
22110-76 = "[ns] \"…………\""
22110-78 = "Momoi………………"
22110-81 = "Eis que eu ressurjo!"
22110-82 = "Mana!?"
22110-83 = "[s] \"Momoi……! O corpo tá bem!? E os ferimentos!?\""
22110-84 = "O corpo tá ótimo! Dormi que nem pedra,\na energia tá no talo!"
22110-85 = "Isso…… a Momoi de agora é uma guerreira que pegou\numa poção da prateleira#ne já upou o nível pra além do recomendado pra próxima fase……!"
22110-86 = "Não tenho medo de nada, tô no estado de\ncolegial super-turbinada!"
22110-87 = "Mana……"
22110-88 = "Mana…… a Aris…… a Aris……!"
22110-94 = "Uaah!!? Que foi, que foi!?"
22110-95 = "A Midori entrou no \"modo manhosa por 24 horas\", que\nrola no dia depois de ela ler comentário de hater!? Por quê!?"
22110-99 = "Momoi, a Aris……"
22110-102 = "Suas bobinhas!!"
22110-104 = "M-mana?"
22110-105 = "Momoi……?"
22110-107 = "Olha, sinceramente, coisa difícil eu não entendo bem……!"
22110-108 = "Mas, ouvindo o que todo mundo falou, meu peito\nse apertou……#ne eu não consigo organizar muito as palavras……"
22110-109 = "Mas tem uma coisa de que eu tenho certeza!"
22110-110 = "……Uma coisa certa?"
22110-111 = "É que a gente não tá nem um pouco conformada\ncom essa situação!!"
22110-112 = "Sinceramente, a Aris ser \"Rei Demônio\" ou seja\nlá o que for, isso pouco importa!"
22110-113 = "Eu não quero me despedir da Aris assim!"
22110-114 = "As últimas palavras da Aris não foram nem despedida\nnem nada do tipo!"
22110-115 = "Não é nem um final decente! É péssimo!"
22110-116 = "Por isso eu quero trazer a Aris de volta! Eu vou trazer ela de volta!#nGente, vocês não pensam igual!?"
22110-117 = "Mana……"
22110-118 = "Momoi……"
22110-122 = "……Sim, é isso."
22110-128 = "Ei, baixinha."
22110-129 = "Uá!? Q-que foi…… veterana Neru?"
22110-130 = "Você——"
22110-132 = "falou umas coisas bem certas, hein!"
22110-133 = "É-é……?"
22110-134 = "É exatamente como você disse. Não precisa ficar\npensando demais.#nApanhou, devolve a porrada."
22110-135 = "Se te tomaram alguma coisa, é só tomar de volta.\nSimples e direto."
22110-136 = "E aí, e vocês?#nAkane, Asuna, Karin."
22110-138 = "Fufu…… precisa colocar em palavras?"
22110-139 = "Se é a decisão da presidente."
22110-140 = "Tô dentro~ ♪"
22110-142 = "……Sensei,"
22110-143 = "Por favor! Empresta a sua força pra gente!"
22110-147 = "[ns] \"Momoi…… pessoal……\""
22110-149 = "[ns] \"Entendido. Vamos bolar juntos um jeito de trazer a Aris de volta.\""
22110-151 = "Próximo episódio: Reunião de Estratégia."