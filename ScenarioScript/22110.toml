[translation]
22110-1 = "Episódio 11; Isso não importa agora!"
22110-2 = "……No fim das contas, a Presidente levou a Alice embora, não foi."
22110-3 = "Ei…… isso não é uma situação bem grave……?"
22110-4 = "Sim, é uma situação de emergência."
22110-6 = "Então, o motivo de a Presidente Rio não ter chamado ninguém além da Chefe foi……."
22110-7 = "Provavelmente, ela já esperava desde o início que a líder nos trairia."
22110-8 = "Que horror! Além de levar a Alice, ainda tratar a líder desse jeito!"
22110-10 = "…………Haa."
22110-11 = "……Chefe?"
22110-12 = "[s] \"Neru……? Ainda está sentindo dor em algum lugar……?\""
22110-13 = "Ver ela ser levada bem na minha frente……#nEu não consegui fazer nada além de assistir……."
22110-15 = "Isso é……."
22110-16 = "Líder, não precisa se culpar. Não foi uma luta justa, foi?"
22110-17 = "É isso mesmo! Aquilo não vale! Não vale!"
22110-19 = "……Vocês costumam dar desculpas assim quando uma missão falha?"
22110-23 = "Isso é……."
22110-25 = "Aquela garota, que me ignorou completamente e levou a Alice……"
22110-26 = "Ela se chamou de \"Callsign Zero Four\"."
22110-27 = "Toki, era esse o nome?#n――Akane, você sabe de algo?"
22110-28 = "……Sim."
22110-29 = "Eu sabia da existência dela."
22110-30 = "Callsign Zero Four.#nEmbora pertença à \"C&C\", ela é um membro exclusivo da Presidente Rio."
22110-31 = "Por assim dizer, a guarda-costas da Presidente Rio……."
22110-32 = "Mas esta é a primeira vez que a vejo pessoalmente……"
22110-33 = "Quem diria que a Presidente chegaria ao ponto de usar ela para fazer algo assim……"
22110-34 = "E, mesmo sendo um ataque surpresa, conseguir subjugar a Chefe……."
22110-35 = "……Aquela garota estava usando algo estranho."
22110-36 = "[s] \"……Ela disse que era um \"armamento\" que a Rio deu a ela.\""
22110-37 = "Ei, Sensei."
22110-38 = "Por que aquela pirralha……"
22110-39 = "……foi com a Rio, mesmo depois de ouvirem que ela queria destruir o Halo dela?"
22110-40 = "Será que ela entendeu o significado das palavras e aceitou ir por vontade própria?"
22110-41 = "Ei…… por que a Rio disse aquilo para uma pirralha que só sabe jogar videogame?"
22110-42 = "Só eu que não estou entendendo nada?#nEi, me diz…… o que está acontecendo aqui?"
22110-43 = "Neru-senpai……."
22110-44 = "[s] \"Por enquanto…… vamos organizar a situação.\""
22110-46 = "(Enquanto a Momoi estava inconsciente, a Alice foi sequestrada pela Rio――)"
22110-47 = "(E então, a Rio nos disse que o objetivo dela é destruir o Halo da Alice)"
22110-49 = "Em outras palavras, \"Alice\".#nVocê é――"
22110-50 = "A \"Rei Demônio\" que nasceu para destruir este mundo."
22110-52 = "Ah…… foi difícil de entender?"
22110-53 = "Em suma―― se destruirmos o seu Halo, o problema estará resolvido."
22110-55 = "Sensei, a Alice……#nComo a Presidente disse, será que ela realmente……"
22110-56 = "……é uma \"Rei Demônio\"?"
22110-57 = "[s] \"Midori……\""
22110-61 = "Eu………"
22110-62 = "Eu não……"
22110-63 = "Não sei bem……"
22110-64 = "Eu quero ouvir os sentimentos da Alice e conversar com ela……."
22110-65 = "Quero convencer a Presidente de que a Alice não é nada disso……#nQue ela não é uma \"Rei Demônio\"……."
22110-66 = "Eu, na verdade..."
22110-67 = "Nós, na verdade..."
22110-72 = "Sensei, o que nós devemos fazer?"
22110-76 = "[ns] \"…………。\""
22110-78 = "Momoi………………"
22110-81 = "Cheguei!"
22110-82 = "Irmã!?"
22110-83 = "[s] \"Momoi……! Você está bem? E os ferimentos!?\""
22110-84 = "Eu estou ótima! Dormi super bem e recuperei todas as minhas energias!"
22110-85 = "É isso... Agora eu sou uma guerreira que pegou uma poção na prateleira e terminou de subir o nível acima do recomendado para a próxima fase……!"
22110-86 = "Não tenho medo de nada, estou no modo aluna super fortalecida!"
22110-87 = "Irmã……"
22110-88 = "Irmã…… a Alice…… a Alice!"
22110-94 = "Uau!!? O que, o que foi!?"
22110-95 = "Ela está no \"modo carente de um dia\", aquele que a Midori entra no dia seguinte a ler comentários de haters!? Por quê!?"
22110-99 = "Momoi, a Alice……"
22110-102 = "Sua boba!!"
22110-104 = "I-irmã?"
22110-105 = "Momoi……?"
22110-107 = "Sinceramente, eu não entendo muito bem as coisas complicadas……!"
22110-108 = "Mas quando ouvi o que todos disseram, meu peito ficou apertado……#nEu não consigo organizar muito bem as palavras……"
22110-109 = "Mas tem uma coisa que é certa!"
22110-110 = "……Uma coisa certa?"
22110-111 = "É que nós não aceitamos essa situação!!"
22110-112 = "Sinceramente, não me importa se a Alice é a \"Rei Demônio\" ou qualquer outra coisa!"
22110-113 = "Eu não quero me despedir da Alice desse jeito!"
22110-114 = "As últimas palavras da Alice não foram uma despedida nem nada do tipo!"
22110-115 = "Não foi nem um final decente! É horrível!"
22110-116 = "Por isso eu quero trazer a Alice de volta! Vamos buscá-la!#nPessoal, vocês não concordam!?"
22110-117 = "Irmã……."
22110-118 = "Momoi……."
22110-122 = "……Sim, você tem razão."
22110-128 = "Ei, tampinha."
22110-129 = "Hã!? O-o que foi…… Senpai Neru?"
22110-130 = "Você――"
22110-132 = "Disse algo muito bom, sabia!"
22110-133 = "A-ah, é……?"
22110-134 = "Você está certa. Não precisa ficar pensando demais.#nSe te baterem, é só bater de volta."
22110-135 = "Se levaram algo seu, é só pegar de volta. Simples e direto."
22110-136 = "E então, o que vocês acham?#nAkane, Asuna, Karin."
22110-138 = "Fufu…… precisa mesmo perguntar?"
22110-139 = "Se essa é a decisão da chefe."
22110-140 = "Eu vou junto~♪"
22110-142 = "……Sensei,"
22110-143 = "Por favor! Nos empreste sua força!"
22110-147 = "[ns] \"Momoi…… pessoal…….\""
22110-149 = "[ns] \"Entendido. Vamos pensar juntos em um jeito de trazer a Alice de volta.\""
22110-151 = "Próximo episódio: Reunião de Estratégia"
