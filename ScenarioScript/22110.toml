[translation]
22110-1 = "第11話;そんな事どうでもいいの！"
22110-2 = "……結局、会長がアリスを連れて行ったんだね。"
22110-3 = "ねぇ……これって結構ヤバいんじゃない……？"
22110-4 = "はい、非常事態です。"
22110-6 = "では、リオ会長が部長以外を呼び出さなかったのは……。"
22110-7 = "おそらく、最初からリーダーが裏切ると想定していたのだろう。"
22110-8 = "ひどい！アリスちゃんを連れてった上にリーダーの事もいじめるなんて！"
22110-10 = "…………はあ。"
22110-11 = "……部長？"
22110-12 = "[s] \"ネル……？まだどこか痛む……？\""
22110-13 = "眼の前であいつが連れて行かれるのを……#nあたしは、ただ見てる事しかできなかった……。"
22110-15 = "それは……。"
22110-16 = "リーダー、気に病む必要はない。正面から戦ったわけじゃないんだろう？"
22110-17 = "そうだよ！あんなの無効だよ！無効！"
22110-19 = "……お前らは、任務が失敗してもそんな言い訳をするのか？"
22110-23 = "それは……。"
22110-25 = "あたしを物ともしないでアリスを連れて行ったアイツ……"
22110-26 = "アイツは、自分の事を「コールサインゼロフォー」って言ってた。"
22110-27 = "トキっつったっけ？#n――アカネ、知ってるか？"
22110-28 = "……そうですね。"
22110-29 = "存在は、知っておりました。"
22110-30 = "コールサインゼロフォー。#n「C&C」所属でありながらリオ会長専属のメンバー。"
22110-31 = "いわば、リオ会長のボディーガード……。"
22110-32 = "ですが、私も実際に対面したのは初めてです……"
22110-33 = "まさか……会長が彼女を使ってまでこのような事をしてくるとは……"
22110-34 = "それに、奇襲とはいえ部長を圧倒するだなんて……。"
22110-35 = "……あいつ、なんか変なモン使ってやがった。"
22110-36 = "[s] \"……リオがくれた「武装」だと言ってたね。\""
22110-37 = "なあ、先生。"
22110-38 = "あのチビはどうして……"
22110-39 = "……ヘイローを壊すなんて話をされたのに、リオについて行ったんだ？"
22110-40 = "言葉の意味を理解して、納得した上でついて行ってるのか？"
22110-41 = "なぁ……ゲームがちょっとできる程度のチビに、なんでリオはあんな事を言ったんだ？"
22110-42 = "あたしだけが理解できてないのか？#nなぁ、教えてくれよ……一体これは何なんだ？"
22110-43 = "ネル先輩……。"
22110-44 = "[s] \"とりあえず……状況を整理しよう。\""
22110-46 = "（モモイの意識が戻らない間に、アリスがリオに誘拐され――）"
22110-47 = "（そして、リオはアリスのヘイローを破壊することが目的だと私たちに告げた）"
22110-49 = "つまり、「アリス」。#n貴女は――"
22110-50 = "この世界を滅ぼすために生まれた「魔王」なのよ。"
22110-52 = "ああ……分かりづらかったかしら？"
22110-53 = "つまり――貴女のヘイローを破壊すれば解決する、という事よ。"
22110-55 = "先生、アリスちゃんは……#n会長の言う通り、本当に……"
22110-56 = "……「魔王」なんでしょうか？"
22110-57 = "[s] \"ミドリ……\""
22110-61 = "わたし………"
22110-62 = "わたし、には……"
22110-63 = "よく……わからない……"
22110-64 = "アリスちゃんの気持ちを、ちゃんと聞いて、お話したいよ……。"
22110-65 = "アリスちゃんは、そんなんじゃないって……。#n「魔王」なんかじゃないって……会長を、説得したい……。"
22110-66 = "わたし、は……。"
22110-67 = "わたし達、は………"
22110-72 = "先生、私たちはどうすればいいかな？"
22110-76 = "[ns] \"…………。\""
22110-78 = "モモイ………………"
22110-81 = "降臨！"
22110-82 = "お姉ちゃん！？"
22110-83 = "[s] \"モモイ……！身体は大丈夫！？傷は！？\""
22110-84 = "身体なら大丈夫！ぐっすり寝たから体力も全快！"
22110-85 = "そう……今の私は、棚からポーションを手に入れ、#n次ステージの推奨レベル以上にレベルを上げ終えた戦士……！"
22110-86 = "怖いものなんて何もない、超強化女子生徒状態だよ！"
22110-87 = "おねえちゃん……"
22110-88 = "お姉ちゃん……アリスちゃん……アリスちゃんが！"
22110-94 = "うわっ！！？なになに！？"
22110-95 = "ミドリがアンチコメを読んだ翌日の「一日限定甘えん坊モード」になってるんだけど！？なんで！？"
22110-99 = "モモイ、アリスちゃんが……"
22110-102 = "このおバカさんが！！"
22110-104 = "お、お姉ちゃん？"
22110-105 = "モモイ……？"
22110-107 = "正直、難しい事はよく分かんないけど……！"
22110-108 = "みんなの話を聞いてたら胸がぎゅっとしちゃって……#nあんまり言葉がまとまらないんだけどさ……"
22110-109 = "でも1つだけ確かなことはあるよ！"
22110-110 = "……確かなこと？"
22110-111 = "私たちがこの事態に納得できてないって事！！"
22110-112 = "正直、アリスが「魔王」だろうがなんだろうが、そんな事どうでもいいの！"
22110-113 = "私はアリスとこのままお別れなんて嫌だよ！"
22110-114 = "アリスの最後の言葉、別れの挨拶でもなんでも無いじゃない！"
22110-115 = "まともなエンディングですらない！最悪だよ！"
22110-116 = "だから私はアリスを連れ戻したい！連れ戻しに行くよ！#nみんな、そうじゃないの！？"
22110-117 = "お姉ちゃん……。"
22110-118 = "モモイ……。"
22110-122 = "……うん、そうだね。"
22110-128 = "おい、チビ。"
22110-129 = "わっ！？な、なに……ネル先輩？"
22110-130 = "あんた――"
22110-132 = "なかなか、いい事言うじゃねぇか！"
22110-133 = "う、うん……？"
22110-134 = "あんたの言う通りだ。ゴチャゴチャ考える必要はねぇ。#n殴られたら殴り返せばいい。"
22110-135 = "奪われたモンがあんなら、取り戻せばいい。単純明快だ。"
22110-136 = "なぁ、お前たちはどうだ？#nアカネ、アスナ、カリン。"
22110-138 = "ふふ……言葉にする必要がありますか？"
22110-139 = "それが部長の決定なら。"
22110-140 = "ついてくよ～♪"
22110-142 = "……先生、"
22110-143 = "お願い！私たちに力を貸して！"
22110-147 = "[ns] \"モモイ……みんな……。\""
22110-149 = "[ns] \"分かった。一緒にアリスを連れ戻す方法を考えようか。\""
22110-151 = "次回;作戦会議"
