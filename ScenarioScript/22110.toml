[translation]
22110-1 = "Episódio 11; Que se dane tudo isso!"
22110-2 = "......No fim, a Presidente levou a Aris embora."
22110-3 = "Ei... isso não é tipo, muito, muito ruim...?"
22110-4 = "Sim, é uma situação de emergência."
22110-6 = "Então, o motivo da Presidente Rio não ter chamado mais ninguém além da nossa líder foi..."
22110-7 = "Provavelmente, ela já previa que a líder iria nos trair desde o começo."
22110-8 = "Que crueldade! Além de levar a Aris-chan, ainda judiar da nossa líder!"
22110-10 = "............Haa."
22110-11 = "......Líder?"
22110-12 = "[s] \"Neru......? Você ainda está sentindo dor em algum lugar...?\""
22110-13 = "Eu só... consegui ficar olhando enquanto ela era levada bem na minha frente... #n Eu não consegui fazer nada..."
22110-15 = "Isso não é..."
22110-16 = "Líder, você não precisa se culpar. Você não lutou de igual para igual, não foi?"
22110-17 = "É isso aí! Aquele método foi um golpe baixo! Ilegal!"
22110-19 = "......Vocês sempre dão esse tipo de desculpa quando falham em uma missão?"
22110-23 = "Isso é..."
22110-25 = "Aquela pessoa que me derrotou sem nem fazer esforço e levou a Aris..."
22110-26 = "Ela se chamou de 'Codinome Zero Quatro'."
22110-27 = "Toki, era esse o nome dela? #n ――Akane, você sabe de algo?"
22110-28 = "......Sim."
22110-29 = "Eu conhecia a existência dela."
22110-30 = "Codinome Zero Quatro. #n Embora seja da 'C&C', ela é um membro exclusivo da Presidente Rio."
22110-31 = "Em outras palavras, ela é a guarda-costas pessoal da Presidente Rio..."
22110-32 = "Mas essa é a primeira vez que eu a vejo cara a cara..."
22110-33 = "Quem diria... que a Presidente chegaria ao ponto de usá-la para fazer algo desse tipo..."
22110-34 = "E além disso, dominando a nossa líder, mesmo sendo um ataque surpresa..."
22110-35 = "......Aquela coisa usou algo muito estranho."
22110-36 = "[s] \"......Você disse que era um 'Armamento' dado pela Rio, certo?\""
22110-37 = "Ei, Sensei."
22110-38 = "Por que aquela baixinha..."
22110-39 = "......Ela foi embora com a Rio, mesmo depois de ouvirem que iam destruir o Halo dela?"
22110-40 = "Ela entendeu o significado do que foi dito e aceitou seguir a Rio por vontade própria?"
22110-41 = "Ei... por que a Rio diria uma coisa dessas para uma baixinha que só sabe jogar joguinhos? "
22110-42 = "Será que só eu não estou entendendo nada aqui? #n Ei, me explica... o que está acontecendo afinal?"
22110-43 = "Neru-senpai..."
22110-44 = "[s] \"Vamos... organizar a situação.\""
22100-46 = "(Enquanto a Momoi estava inconsciente, Aris foi sequestrada pela Rio――)"
22100-47 = "(E então, a Rio nos contou que o objetivo dela era destruir o Halo da Aris)"
22090-44 = "'A Princesa dos Deuses Sem Nome, AL-1S'"
22090-65 = "Uma 'Maou' (Rei Demônio) que nasceu para destruir este mundo."
22110-55 = "Sensei, a Aris-chan é... #n Como a Presidente disse, será que ela realmente..."
22110-56 = "...É uma 'Maou'?"
22110-57 = "[s] \"Midori......\""
22110-61 = "Eu........."
22110-62 = "Eu, eu..."
22110-63 = "Não consigo... entender..."
22110-64 = "Eu queria ouvir os sentimentos da Aris-chan e conversar com ela..."
22110-65 = "Eu queria convencer a Presidente de que... a Aris-chan não é nada disso. #n Que ela não é uma 'Maou'..."
22110-66 = "Eu..."
22110-67 = "Nós..."
22110-72 = "Sensei, o que a gente deve fazer?"
22110-76 = "[ns] \"………….\""
22110-78 = "Momoi………………"
22110-81 = "Apareci!"
22110-82 = "Mana!?"
22110-83 = "[s] \"Momoi......! Você está bem!? Seus ferimentos...?\""
22110-84 = "Eu tô bem! Dormi um monte e recuperei todas as minhas energias!"
22110-85 = "Isso... agora eu sou uma guerreira que pegou uma poção no baú e subiu de nível para além do recomendado para a próxima fase...!"
22110-86 = "Não tenho medo de nada, estou no modo 'Aluna Super Fortalecida'!"
22110-87 = "Mana..."
22110-88 = "Mana... A Aris-chan... A Aris-chan foi!"
22110-94 = "Uaaah!!? O que, o que foi!?"
22110-95 = "A Midori entrou no 'modo carente' daquele dia seguinte ao que ela leu os comentários negativos contra a gente!? Por quê!?"
22110-99 = "Momoi, a Aris-chan..."
22110-102 = "Sua idiota!!"
22110-104 = "Ma, mana?"
22110-105 = "Momoi...?"
22110-107 = "Pra falar a verdade, eu não entendo muito bem essas coisas difíceis...! "
22110-108 = "Mas só de ouvir a história de vocês, meu peito dói de um jeito... #n Eu não consigo organizar as palavras..."
22110-109 = "Mas tem uma coisa que eu tenho certeza!"
22110-110 = "...Uma coisa?"
22110-111 = "Que nós não estamos aceitando essa situação de jeito nenhum!!"
22110-112 = "Pra falar a verdade, se a Aris é uma 'Maou' ou qualquer outra coisa, isso não me importa nem um pouco!"
22110-113 = "Eu não aceito dar tchau pra Aris desse jeito!"
22110-114 = "As últimas palavras da Aris não foram nem uma despedida, nem nada disso!"
22110-115 = "Isso nem parece um final de jogo decente! É o pior final de todos!"
22110-116 = "Por isso eu quero trazer a Aris de volta! Vamos lá buscar ela! #n Não é, pessoal!?"
22110-117 = "Mana..."
22110-118 = "Momoi..."
22110-122 = "......Sim, é verdade."
22110-128 = "Ei, baixinha."
22110-129 = "Uaah!? Quê, o que foi... Neru-senpai?"
22110-130 = "Você..."
22110-132 = "Disse uma coisa muito legal, sabia!"
22110-133 = "E, é...?"
22110-134 = "Como você disse. Não precisa ficar pensando em coisas complicadas. #n Se levar um soco, devolva o soco."
22110-135 = "Se roubaram o que é seu, pegue de volta. Simples e direto."
22110-136 = "Ei, e vocês? #n Akane, Asuna, Karin."
22110-138 = "Fufu... Precisa mesmo perguntar?"
22110-139 = "Se essa for a decisão da nossa líder."
22110-140 = "Vou junto~♪"
22110-142 = "......Sensei,"
22110-143 = "Por favor! Nos empreste a sua força!"
22110-147 = "[ns] \"Momoi... pessoal...\""
22110-149 = "[ns] \"Entendido. Vamos pensar em um jeito de trazer a Aris de volta.\""
22110-151 = "Próximo Episódio; Reunião de Estratégia"