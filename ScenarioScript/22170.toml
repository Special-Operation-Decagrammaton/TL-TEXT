[translation]
22170-1 = "Episódio 17; O Trampolim da Virada"
22170-3 = "Chihiro-senpai!?"
22170-4 = "Waaaah! Vice-presidente~!"
22170-5 = "Como esperado. Estávamos esperando por você."
22170-6 = "Mas... como?"
22170-8 = "É verdade! Porque a rede de comunicações de Eridu está...!"
22170-9 = "A Presidente Rio não a tinha sob controle?"
22170-11 = "Sim, a Presidente Rio tem o controle. #n Mas, parece que a Himari preparou uma 'arma secreta' para momentos como este."
22170-12 = "[s] \"Arma secreta...?\""
22170-13 = "Ah... Mana! Aquilo! É aquilo!"
22170-14 = "A, aquilo o quê!?"
22170-15 = "Aquele que encontramos quando tentamos analisar a G.Bible antes!"
22170-24 = "[ns] \"O 'Espelho'......!\""
22170-25 = "Excelente observação. Sim, usamos o 'Espelho' para hackear a rede de Eridu."
22170-26 = "E, de quebra, fiz a Presidente sair de cena."
22170-27 = "Eh, o, o que você quer dizer!? Por acaso, o motivo de a Presidente Himari ter tido o 'Espelho' apreendido pelo conselho estudantil foi...!"
22170-28 = "Será que ela estava se preparando para esse tipo de situação?"
22170-29 = "Como esperado da ex-presidente da Veritas. Não dá para subestimá-la."
22170-30 = "[s] \"Como esperado da Chihiro! A deusa da Veritas!\""
22170-31 = "De, deusa... Sensei... isso é um pouco exagerado demais."
22170-33 = "Ué!? M, mas ir até o depósito de apreensões é super difícil, né!"
22170-34 = "Sozinha, é impossível..."
22170-35 = "Ah, quanto a isso, tive alguém que me ajudou."
22170-36 = "Por sorte, alguém de um clube que conseguiu escapar da vigilância da Presidente――"
22170-40 = "Olá, treinador."
22170-41 = "[s] \"Sumire!?\""
22170-42 = "Fiquei sabendo sobre a Aris e não pude ficar parada... #n Peço desculpas pela intromissão, mas decidi colaborar."
22170-43 = "Sim, você salvou a gente. Obrigado."
22170-48 = "......Bem, é mais ou menos isso, estamos no meio de um combate contra os drones agora."
22170-49 = "Sinceramente, não sei por quanto tempo vamos aguentar... #n Mas bem, vou fazer o que estiver ao meu alcance."
22170-50 = "Se for uma guerra de resistência, pode deixar comigo."
22170-51 = "[s] \"Sumire, obrigado. É muito reconfortante ter você aqui.\""
22170-61 = "Eu sabia... #n Mesmo usando o 'Espelho', o firewall está reagindo."
22170-62 = "Precisamos atacar primeiro antes que a conexão caia."
22170-63 = "É nessas horas que a 'Veritas'―― que a nossa vez entra."
22170-64 = "Sim, pode deixar, Vice-presidente."
22170-65 = "Mesmo que tenhamos que usar todos os nossos recursos! #n Vou manter a rede funcionando!"
22170-66 = "Sim, darei o meu melhor."
22170-68 = "Sim. Deixo a manutenção com vocês. #n Em troca, a partir de agora, eu cuidarei da navegação do Sensei."
22170-69 = "Pessoal―― vocês ainda conseguem lutar, né?"
22170-73 = "[ns] \"Sim, dá pra ir.\""
22170-75 = "Então, vamos ao contra-ataque. Vamos lá!"