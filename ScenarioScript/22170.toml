[translation]
22170-1 = "Episódio 17; O trampolim da reviravolta"
22170-3 = "Chihiro-senpai!?"
22170-4 = "Uwaaa! Vice-presidente!"
22170-5 = "Como esperado. Eu estava esperando por isso."
22170-6 = "Mas... como você conseguiu?"
22170-8 = "É verdade! Porque a rede de comunicação de Eridu está...!"
22170-9 = "Não era a Presidente Rio que a controlava?"
22170-11 = "Sim, a Presidente Rio a controla. #nMas parece que a Himari preparou uma \"arma secreta\" para momentos como este."
22170-12 = "[s] \"Arma secreta...?\""
22170-13 = "Ah... irmã! Aquilo! É aquilo!"
22170-14 = "Ah, o que é \"aquilo\"!?"
22170-15 = "Aquela coisa que encontramos quando tentamos analisar a G.Bible antes!"
22170-24 = "[ns] \"O 'Espelho'...!\""
22170-25 = "Exatamente. Sim, eu usei o \"Espelho\" para hackear a rede de Eridu."
22170-26 = "E, de quebra, fiz a presidente sair de cena."
22170-27 = "Ei, o, o que você quer dizer!? Será que o fato de a Presidente Himari ter tido o \"Espelho\" confiscado pelo conselho estudantil foi...!"
22170-28 = "Será que ela estava se preparando para uma situação como esta?"
22170-29 = "Como esperado da ex-presidente da Veritas. Não dá para subestimá-la."
22170-30 = "[s] \"Como esperado da Chihiro! A deusa da Veritas!\""
22170-31 = "De, deusa... Sensei... isso é um pouco exagerado."
22170-33 = "Ei!? Ma, mas ir até o depósito de itens confiscados é super difícil, não é!"
22170-34 = "Sozinha, com certeza..."
22170-35 = "Ah, sobre isso, houve alguém que me ajudou."
22170-36 = "Por sorte, foi um clube que conseguiu escapar da vigilância da presidente—"
22170-40 = "Olá, treinador."
22170-41 = "[s] \"Sumire!?\""
22170-42 = "Ouvi sobre a Alice e não consegui ficar parada... #nCom sua licença, eu colaborei."
22170-43 = "Sim, isso realmente ajudou. Obrigada."
22170-48 = "...Enfim, é assim que estamos, resistindo bravamente contra os drones."
22170-49 = "Sinceramente, não sei quanto tempo vamos aguentar... #nMas bem, vamos tentar o que pudermos."
22170-50 = "Se for uma guerra de resistência, pode deixar comigo."
22170-51 = "[s] \"Sumire, obrigado. Você é muito confiável.\""
22170-61 = "Como eu pensei... #nMesmo usando o \"Espelho\", o firewall está reagindo."
22170-62 = "Precisamos agir antes que a conexão caia."
22170-63 = "É exatamente agora que a \"Veritas\" — a nossa vez — entra em ação."
22170-64 = "Sim, pode deixar, vice-presidente."
22170-65 = "Mesmo que tenhamos que usar todos os nossos recursos! #nEu vou manter a rede funcionando!"
22170-66 = "Sim, farei o meu melhor."
22170-68 = "Sim. Deixo a manutenção com vocês. #nEm troca, a partir de agora, eu assumirei a navegação do Sensei."
22170-69 = "Pessoal... ainda conseguem lutar, certo?"
22170-73 = "[ns] \"Sim, nós conseguimos.\""
22170-75 = "Então, vamos começar o contra-ataque. Vamos lá!"
