[translation]
22170-1 = "第17話;逆転の踏み台"
22170-3 = "チヒロ先輩！?"
22170-4 = "うわぁ～ん！副部長～！"
22170-5 = "流石です。待っていました。"
22170-6 = "でも……どうやって？"
22170-8 = "そうですよね！だって、エリドゥの通信網は……！"
22170-9 = "リオ会長が掌握してるんじゃなかった？"
22170-11 = "うん、リオ会長が掌握してる。#nでも、こういう時のためにヒマリが「秘密兵器」を用意してくれてたみたい。"
22170-12 = "[s] \"秘密兵器……？\""
22170-13 = "あ……お姉ちゃん！アレ！だよアレ！"
22170-14 = "あ、アレって何！？"
22170-15 = "前にG.Bibleを解析しようとした時に見つけたヤツ！"
22170-24 = "[ns] \"「鏡」……！\""
22170-25 = "ご明察。そう、「鏡」を使ってエリドゥのネットワークをハッキングしたの。"
22170-26 = "ついでに、会長にも退場してもらったよ。"
22170-27 = "え、ど、どういうこと！？もしかして、ヒマリ部長が生徒会に「鏡」を差し押さえられてたのって……！"
22170-28 = "こういう場合に備えてたって事なのかな？"
22170-29 = "さすが元ヴェリタスの部長だ。侮れないね。"
22170-30 = "[s] \"さすがチヒロ！ヴェリタスの女神！\""
22170-31 = "め、女神って……先生……それはちょっと大袈裟すぎ。"
22170-33 = "あれ！？で、でも差押品保管所に行くのってすっごく大変だよね！"
22170-34 = "一人じゃ絶対……。"
22170-35 = "ああ、それなら助けてくれた人がいたの。"
22170-36 = "運良く、会長の監視から抜けられていた部活の――"
22170-40 = "こんにちは、トレーナー。"
22170-41 = "[s] \"スミレ！？\""
22170-42 = "アリスさんのことを伺って、居ても立っても居られず……#n僭越ながら、協力させていただきました。"
22170-43 = "うん、本当に助かったよ。ありがとう。"
22170-48 = "……とまぁ、こんな感じで、絶賛ドローン相手に抗戦中なんだけど。"
22170-49 = "どれくらい持つかは正直分からない……#nけどまぁ、やれるだけやってみるよ。"
22170-50 = "持久戦ならお任せください。"
22170-51 = "[s] \"スミレ、ありがとう。とても頼もしいよ。\""
22170-61 = "やっぱり……。#n「鏡」を使ったとはいえ、ファイアウォールが反応してる。"
22170-62 = "パスが切れる前に先手を打つ必要があるね。"
22170-63 = "こういう時こそ、「ヴェリタス」――私たちの出番だよ。"
22170-64 = "うん、任せて副部長。"
22170-65 = "私たちのリソースを全部使い切ったとしても！#nネットワークを維持してみせるよ！"
22170-66 = "はい、全力を尽くします。"
22170-68 = "うん。維持は任せた。#n代わりに、ここからは先生のナビゲートを私が引き受けるよ。"
22170-69 = "みんな――まだ戦えるよね？"
22170-73 = "[ns] \"うん、いけるよ。\""
22170-75 = "じゃあ反撃開始。いくよ！"
