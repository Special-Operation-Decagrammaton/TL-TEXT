[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22170-1 = "Episódio 17: O Trampolim da Reviravolta."
22170-3 = "Veterana Chihiro!?"
22170-4 = "Buááá! Vice-presidenteee!"
22170-5 = "Era de esperar. Estávamos à espera."
22170-6 = "Mas…… como?"
22170-8 = "Pois é! Porque a rede de comunicação de Eridu……!"
22170-9 = "Não estava sob controle da presidente Rio?"
22170-11 = "Sim, está sob controle da presidente Rio.#nMas, pra uma hora dessas, parece que a Himari tinha preparado uma \"arma secreta\"."
22170-12 = "[s] \"Arma secreta……?\""
22170-13 = "Ah…… mana! Aquilo! É aquilo!"
22170-14 = "A-aquilo o quê!?"
22170-15 = "Aquela coisa que a gente achou quando tentou analisar a G.Bible!"
22170-24 = "[ns] \"O \"Espelho\"……!\""
22170-25 = "Perspicaz. Isso, usamos o \"Espelho\" pra hackear a rede de Eridu."
22170-26 = "De quebra, fiz a presidente sair de cena também."
22170-27 = "Hã, c-como assim!? Não me diga que a presidente Himari ter o \"Espelho\" confiscado pelo Conselho……!"
22170-28 = "Será que era pra se preparar pra um caso desses?"
22170-29 = "Não é à toa que ela é a ex-presidente da Veritas. Não dá pra subestimar."
22170-30 = "[s] \"Não é à toa que é a Chihiro! A deusa da Veritas!\""
22170-31 = "D-deusa…… Sensei…… isso é exagero demais."
22170-33 = "Ué!? M-mas chegar ao depósito de apreensões é super difícil, né!"
22170-34 = "Sozinha, de jeito nenhum……"
22170-35 = "Ah, quanto a isso, teve uma pessoa que me ajudou."
22170-36 = "Por sorte, alguém de um clube que conseguiu escapar da vigilância da presidente——"
22170-40 = "Olá, treinador."
22170-41 = "[s] \"Sumire!?\""
22170-42 = "Ao saber da Aris, eu não consegui ficar parada……#ne, com a devida licença, vim colaborar."
22170-43 = "Sim, foi uma baita ajuda. Obrigada."
22170-48 = "……Enfim, é mais ou menos assim, a gente tá no meio de uma resistência danada contra os drones."
22170-49 = "Quanto tempo a gente aguenta, sinceramente não dá pra saber……#nmas, bom, vou fazer o que der pra fazer."
22170-50 = "Se for batalha de resistência, pode deixar comigo."
22170-51 = "[s] \"Sumire, obrigado. Você é muito confiável.\""
22170-61 = "Eu sabia……#nMesmo usando o \"Espelho\", o firewall está reagindo."
22170-62 = "É preciso agir primeiro, antes que a conexão caia."
22170-63 = "É justamente nessas horas que a \"Veritas\"—— a gente—— entra em ação."
22170-64 = "Sim, deixa comigo, vice-presidente."
22170-65 = "Nem que a gente gaste todos os nossos recursos!#nA gente mantém a rede de pé!"
22170-66 = "Sim, vou dar o meu máximo."
22170-68 = "Sim. Manter, deixo com vocês.#nEm troca, daqui pra frente, a navegação do Sensei fico eu encarregada."
22170-69 = "Pessoal—— ainda conseguem lutar, né?"
22170-73 = "[ns] \"Sim, dá pra ir.\""
22170-75 = "Então, contra-ataque iniciado. Vamos lá!"