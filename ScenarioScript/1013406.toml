[translation]
1013406-1 = "Hora da magia começar"
1013406-2 = "--altura."
1013406-3 = "(...?)"
1013406-4 = "(ouço a voz de Alice de algum lugar)"
1013406-8 = "Se… Sei."
1013406-9 = "(Mas Alice não estava em lugar nenhum.)"
1013406-13 = "sensei! É por aqui!"
1013406-14 = "[ns1] Vire na direção da voz. \n[ns2] Olhe pela janela."
1013406-19 = "[wa:900]― [log=아리스 결전]Ehehe. [wa:1520]Senhor, [wa:1350]você está surpreso? [/registro]"
1013406-21 = "― [log=아리스 결전]Meu sensei e eu queríamos ver esse céu noturno [wa:1900]...[wa:1880]Eu liguei para você. [/registro]"
1013406-24 = "[wa:2230]― [log=아리스 결전]É muito...[wa:1630]É lindo. [/registro]"
1013406-27 = "― [log=아리스 결전]Também no mundo de Alice[/log]"
1013406-29 = "― [log=아리스 결전]Para um mundo onde nunca estive ainda...[/log]"
1013406-32 = "― [log=아리스 결전]Tenho certeza [wa:1140] Algo lindo assim[/log]"
1013406-34 = "― [log=아리스 결전]Acho que são muitos. [/registro]"
1013406-37 = "[wa:2900]― [log=아리스 결전]Mas...[wa:1430]É estranho. [/registro]"
1013406-40 = "― [log=아리스 결전]O mundo é [wa:1790]tão lindo...[/log]"
1013406-42 = "― [log=아리스 결전]Por que as pessoas brigam? [/registro]"
1013406-45 = "[wa:1740]― [log=아리스 결전]Como aquele céu estrelado[/log]"
1013406-47 = "― [log=아리스 결전]Este mundo é[/log]"
1013406-50 = "― [log=아리스 결전]Mesmo que todos compartilhem[/log]"
1013406-52 = "― [log=아리스 결전]Está tudo bem [wa:1840] mesmo estando cheio de [wa:780] coisas lindas... [/log]"
1013406-55 = "[wa:2640]― [log=아리스 결전]...Como esperado, [wa:1880]Alice ainda não entende. [/registro]"
1013406-60 = "Hehehe. Alice está de volta."
1013406-61 = "... Kkkush!"
1013406-62 = "[s3] \"Você está bem? Seu corpo deve ter esfriado!?\"\n[s4] \"Você deve ter pegado um resfriado!?\""
1013406-65 = "tudo bem! Alice ainda não pegou um resfriado!"
1013406-66 = "Ah, a mão do sensei..."
1013406-71 = "É quente e relaxante.... Hehe."
1013406-73 = "(Alice adormeceu assim que eu a aqueci.)"
1013406-74 = "(Levei Alice para o quarto dela sem acordá-la.)"
