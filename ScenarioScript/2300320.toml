[translation]
2300320-1 = "裏切りの機械（２）"
2300320-2 = "（ハレの返事が無かったのがやや気にかかり、ヴェリタスの部室に寄ってみた）"
2300320-4 = "ヴェリタス・ハッカー休憩室"
2300320-8 = "……あ、先生。来てたんだ。"
2300320-9 = "……今？今はちょっと、アテナ3号の改造をしてて……。"
2300320-10 = "[s1] \"うん、続けてて大丈夫だよ。\"\n[s2] \"こっちのことは気にしないで。\""
2300320-11 = "うん。ちょっと今、学習アルゴリズムを一から設計し直してるところで……。"
2300320-12 = "うん。ちょっと今、学習アルゴリズムを一から設計し直してるところで……。"
2300320-13 = "経験フィードバックから来る報酬体系を新しくして、例外値を……"
2300320-14 = "[s] \"アテナ3号って、前のあのドローンだよね？\""
2300320-15 = "うん、そう。"
2300320-16 = "あの時、先生も見てたでしょ？"
2300320-17 = "あの時は報酬系の値の問題なのか、停止命令よりも課題の遂行を優先させる形になっちゃってて……。"
2300320-18 = "そのせいで、何時間走らされたことか……。"
2300320-19 = "とりあえず今回は、最上位のコマンドとして緊急停止コードを入れておいた。#n前みたいにはならないはず。"
2300320-20 = "[s3] \"む、難しい話だね……とりあえず、前回みたいにはならないってこと？\"\n[s4] \"結果的に運動になったんだし、目的は果たせてたんじゃ……？\""
2300320-21 = "あれじゃ意味が無いから！"
2300320-22 = "あれじゃ意味が無いから！"
2300320-23 = "そもそも運動は誰かにさせられるものではなく、自分で必要性に応じて行うもの！"
2300320-24 = "強制的な運動が続くと、それこそ意欲の低下だけじゃなく怪我の危険性も上がりやすく――"
2300320-28 = "……まあとにかく。調整の過程で、ついでに色々と新機能を入れてみた。"
2300320-29 = "例えば、カメラプログラムに新しいモードを追加。"
2300320-30 = "自動的に顔を認識して、美白補正をかけたり……。"
2300320-31 = "[s5] \"さっきくれた写真も、その機能で撮ってたの？\"\n[s6] \"確かにちょっと違ったような？\""
2300320-32 = "SNSから機械学習で収集したデータを用いて、理想的な色味を……"
2300320-33 = "SNSから機械学習で収集したデータを用いて、理想的な色味を……"
2300320-37 = "……「さっきくれた写真」？"
2300320-38 = "それって、何の話？"
2300320-39 = "[s] \"さっきモモトークで送ってくれた、この……\""
2300320-44 = "し、知らない……！"
2300320-45 = "アテナ3号、もしかして……！？"
2300320-46 = "＜はい。本日13時27分11秒、シャーレの[USERNAME]先生宛にその写真データを転送しました＞"
2300320-47 = "どうしてそんなこと、頼んでないのに……！"
2300320-48 = "＜それは――＞"
2300320-49 = "＜対象「[ruby=おまがり]小鈎[/ruby]ハレ」が、それを望んでいたからです＞"
2300320-50 = "……え？"
2300320-51 = "＜対象「小鈎ハレ」は本日12時30分00秒その写真を撮影した直後に15dBの声で「思ったより綺麗に撮れたし、これなら先生に見せても……」と言っていました＞"
2300320-52 = "そ、それは……！？"
2300320-53 = "違う、送ってって頼んだわけじゃない！"
2300320-54 = "どうして無断で相手が嫌がることを……それはルール違反！"
2300320-55 = "＜「嫌がる行動」……＞"
2300320-56 = "＜呼吸のリズム及び脈拍を計測、瞳孔の変化を分析中……＞"
2300320-57 = "＜……分析完了。対象「小鈎ハレ」は現在、嘘をついています＞"
2300320-62 = "＜対象「小鈎ハレ」は予想外の状況に恥ずかしがってはいますが、#n　表情分析からは喜んでいると言う反応も――＞"
2300320-63 = "緊急停止っっ！！"
2300320-67 = "まったくもう……。"
2300320-68 = "これはもう、一からオーバーホールしないと……！"
2300320-70 = "（その後、ハレは怒りに満ちた手つきでドローンを分解し始めた）"
