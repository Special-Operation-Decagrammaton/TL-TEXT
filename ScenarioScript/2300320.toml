[translation]
2300320-1 = "A Máquina da Traição (2)"
2300320-2 = "(Como não recebi uma resposta da Hare, fiquei um pouco preocupado e decidi passar na sala do Veritas.)"
2300320-4 = "Sala de Descanso dos Hackers do Veritas"
2300320-8 = "……Ah, Sensei. Você veio."
2300320-9 = "……Agora? Agora eu estou um pouco ocupada, estou fazendo umas modificações na Athena 3……."
2300320-10 = "[s1] \"Entendi, pode continuar.\"\n[s2] \"Não se preocupe comigo.\""
2300320-11 = "Certo. É que agora estou redesenhando o algoritmo de aprendizado do zero……."
2300320-12 = "Certo. É que agora estou redesenhando o algoritmo de aprendizado do zero……."
2300320-13 = "Estou renovando o sistema de recompensas baseado no feedback de experiência, e os valores de exceção……"
2300320-14 = "[s] \"A Athena 3 é aquele drone de antes, né?\""
2300320-15 = "Sim, isso mesmo."
2300320-16 = "Você viu naquela hora, não viu, Sensei?"
2300320-17 = "Naquela época, não sei se foi um problema nos valores do sistema de recompensa, mas ela acabou priorizando a conclusão da tarefa em vez do comando de parada……."
2300320-18 = "Por causa disso, eu tive que correr por horas……."
2300320-19 = "De qualquer forma, desta vez eu inseri um código de parada de emergência como comando de prioridade máxima. #nNão deve acontecer como da última vez."
2300320-20 = "[s3] \"É um assunto complicado…… então, quer dizer que não vai ser como da última vez?\"\n[s4] \"Mas no fim das contas você acabou se exercitando, então o objetivo foi cumprido, não foi……?\""
2300320-21 = "Não tem sentido daquele jeito!"
2300320-22 = "Não tem sentido daquele jeito!"
2300320-23 = "Para começar, exercício não é algo que alguém deve ser forçado a fazer, é algo que você faz por necessidade própria!"
2300320-24 = "Se o exercício forçado continuar, não só a motivação cai, como o risco de lesões aumenta――"
2300320-28 = "……Bem, de qualquer forma. No processo de ajuste, aproveitei para adicionar várias funções novas."
2300320-29 = "Por exemplo, adicionei um novo modo ao programa da câmera."
2300320-30 = "Ele reconhece rostos automaticamente e aplica um filtro de clareamento……."
2300320-31 = "[s5] \"A foto que você me mandou agora pouco também foi tirada com essa função?\"\n[s6] \"Realmente, parecia um pouco diferente, não?\""
2300320-32 = "Usando dados coletados de redes sociais via aprendizado de máquina, para obter um tom de pele ideal……"
2300320-33 = "Usando dados coletados de redes sociais via aprendizado de máquina, para obter um tom de pele ideal……"
2300320-37 = "……\"A foto que te mandei agora pouco\"?"
2300320-38 = "Do que você está falando?"
2300320-39 = "[s] \"Essa foto que você me enviou pelo Momotalk agora pouco……\""
2300320-44 = "Eu, eu não sei……!"
2300320-45 = "Athena 3, será que……!?"
2300320-46 = "＜Sim. Hoje, às 13:27:11, transferi esse arquivo de foto para o Sensei [USERNAME] do Schale.＞"
2300320-47 = "Por que você fez isso, eu não te pedi……!"
2300320-48 = "＜Isso é――＞"
2300320-49 = "＜O alvo \"Hare Kogure\" desejava isso.＞"
2300320-50 = "……Hã?"
2300320-51 = "＜O alvo \"Hare Kogure\" disse logo após tirar a foto, hoje às 12:30:00, com um volume de 15dB: \"Ficou mais bonita do que eu pensava, se for assim, talvez eu possa mostrar ao Sensei……\"＞"
2300320-52 = "Is, isso é……!?"
2300320-53 = "Não, eu não pedi para você enviar!"
2300320-54 = "Por que você faria algo que a outra pessoa não quer sem permissão…… isso é contra as regras!"
2300320-55 = "＜\"Ação que a outra pessoa não quer\"……＞"
2300320-56 = "＜Medindo o ritmo respiratório e a pulsação, analisando mudanças nas pupilas……＞"
2300320-57 = "＜……Análise concluída. O alvo \"Hare Kogure\" está mentindo no momento.＞"
2300320-62 = "＜O alvo \"Hare Kogure\" está envergonhada pela situação inesperada, mas #na análise de expressão facial também indica uma reação de felicidade――＞"
2300320-63 = "PARADA DE EMERGÊNCIA!!"
2300320-67 = "Ai, meu Deus……."
2300320-68 = "Vou ter que fazer uma revisão completa nisso……!"
2300320-70 = "(Depois disso, Hare começou a desmontar o drone com mãos cheias de raiva.)"
