[translation]
11334030-1 = "コンディション;催眠効果（１）"
11334030-4 = "ただいまー……。"
11334030-5 = "……って何！？どうしてみんな倒れてるの！？"
11334030-6 = "む、無理……もう、これ以上は……。"
11334030-7 = "疲労困憊、満身創痍ー……。"
11334030-8 = "う、うぅ……。"
11334030-9 = "二人はともかくアイリまで！？"
11334030-10 = "……何よ「ともかく」って。"
11334030-11 = "あ、あはは……。"
11334030-12 = "おぉ、どうか慈悲を……。"
11334030-13 = "恵みをー……。"
11334030-17 = "……はぁ。"
11334030-18 = "まぁ、最近みんな練習頑張ってたしね……。"
11334030-22 = "……お菓子買ってきたし、とりあえず食べる？"
11334030-23 = "……！"
11334030-24 = "カズサちゃん……！"
11334030-25 = "偶には良いことするじゃないの、見直したわ！"
11334030-27 = "こういう時だけ調子良いんだから。"
11334030-28 = "……あれ。"
11334030-29 = "もしかして……。"
11334030-30 = "……カズサちゃん？"
11334030-31 = "いや、その、大したことじゃないんだけど……。"
11334030-32 = "…………。"
11334030-34 = "これならみんな、やる気出るかも。"
