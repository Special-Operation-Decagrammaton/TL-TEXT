[translation]
83303100200-7 = "……Ufa. Por enquanto, vamos parar por aqui."
83303100200-8 = "Não adianta continuar praticando se eu estiver cansada, não vai render nada."
83303100200-9 = "Claro, eu me sinto um pouco ansiosa, mas..."
83303100200-16 = "[ns] \"……foi isso que aconteceu, então só queria te avisar. Trapacear não é certo.\""
83303100200-17 = "Entendo. Com razão... achei que estava um pouco silencioso demais."
83303100200-18 = "Bem, a presidente do Pandemonium já fez esse tipo de coisa várias vezes, bastava eu me ausentar por um momento."
83303100200-19 = "Não é nada que me surpreenda agora."
83303100200-20 = "[ns] \"Isso acontece com frequência...?!\""
83303100200-21 = "De qualquer forma, obrigada por me avisar, Sensei."
83303100200-22 = "Vou cuidar desse assunto junto com o Comitê Disciplinar."
83303100200-23 = "[ns] \"Sim. Hina. Então... boa sorte com tudo, inclusive com a prática de piano.\""
83303100200-25 = "Sim."
