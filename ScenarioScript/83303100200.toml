[translation]
83303100200-7 = "……ふぅ。とりあえず、一旦ここまでにしておこう。"
83303100200-8 = "疲れているのに練習を続けても、身にならないし。"
83303100200-9 = "もちろん、焦る気持ちはあるけど……"
83303100200-16 = "[ns] \"……ということがあったから一応伝えておくね。反則はよくないから。\""
83303100200-17 = "なるほど。どうりで……少し静かだと思ってた。"
83303100200-18 = "まあ、私が少し席を空けるだけで、万魔殿の議長は何度もこういうことをしてきたから。"
83303100200-19 = "別に今更のことでもないけど。"
83303100200-20 = "[ns] \"よくあることなんだ……！\""
83303100200-21 = "とにかく連絡してくれてありがとう。先生。"
83303100200-22 = "今回の件は風紀委員会と一緒に対応しておくから。"
83303100200-23 = "[ns] \"うん。ヒナ。じゃあ……ピアノの練習まで含めて頑張ってね。\""
83303100200-25 = "うん。"
