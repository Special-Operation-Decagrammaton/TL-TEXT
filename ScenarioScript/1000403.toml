[translation]
1000403-1 = "Um motivo imponente"
1000403-2 = "Periferia de Gehenna - Beco"
1000403-3 = "Ei, Sensei."
1000403-4 = "[s] \"Este lugar é...\""
1000403-5 = "Ah, esta área foi isolada para o acesso dos alunos devido às atividades disciplinares recentes."
1000403-6 = "Já era um lugar perigoso, mas como reviramos tudo de cabeça para baixo, deve ser seguro por um tempo."
1000403-7 = "E não deve ter ninguém por aqui que me reconheça."
1000403-8 = "Por isso, posso encontrar o Sensei com tranquilidade."
1000403-9 = "[s] \"Não acha que está se preocupando demais com o que os outros pensam?\""
1000403-10 = "……."
1000403-11 = "Não tem jeito, é pelo bem do Sensei."
1000403-12 = "Você deve saber que tenho muitos inimigos. Tanto dentro quanto fora da escola."
1000403-13 = "Não é exagero dizer que estou sendo vigiada a qualquer hora e em qualquer lugar."
1000403-14 = "Então, se descobrirem que alguém como eu está encontrando uma pessoa especial... essa pessoa pode acabar em perigo."
1000403-15 = "[s1] \"Então, que tal nos falarmos online em vez de nos encontrarmos pessoalmente?\"\n[s2] \"Podemos resolver o trabalho por e-mail ou mensagens.\""
1000403-18 = "……."
1000403-19 = "……Isso é verdade, mas..."
1000403-20 = "Bem..."
1000403-21 = "……."
1000403-22 = "[s] \"...Mas também existem trabalhos que precisam ser feitos cara a cara, não é?\""
1000403-23 = "……."
1000403-24 = "……Sinto que você está zombando de mim."
1000403-25 = "É verdade, existem coisas no trabalho que não podem ser feitas sem encontrar a pessoa diretamente."
1000403-26 = "Ou seja, isso também é um tipo de trabalho...!"
1000403-27 = "Estamos nos encontrando apenas por causa do trabalho! Não estou cometendo crime nenhum!"
1000403-28 = "[s3] \"Mas, se virem nós dois sozinhos no meio da noite...\"\n[s4] \"...Será que não vão acabar imaginando coisas e isso pode ser um problema?\""
1000403-29 = "……? É mesmo? Não entendo bem, mas..."
1000403-30 = "……? É mesmo? Não entendo bem, mas..."
1000403-31 = "……Só estamos nos encontrando aqui, sozinhos, no meio da noite."
1000403-32 = "E por causa disso, imaginar coisas... i... coisas..."
1000403-33 = "Bem... isso é, tipo..."
1000403-35 = "……!?"
1000403-36 = "(Parece que ela chegou a uma conclusão)"
1000403-37 = "O-o que você está dizendo!? E-eu com o Sensei...!?"
1000403-38 = "E-eu jamais faria algo tão indecente!"
1000403-39 = "Quem tiver esse tipo de mal-entendido, eu vou..."
1000403-40 = "……."
1000403-41 = "Sempre tem gente que gosta de fofocas assim, não tem jeito."
1000403-42 = "……Mas, pensando bem, encontrar o Sensei no meio da noite pode ser muito perigoso."
1000403-43 = "Talvez seja mais seguro nos encontrarmos em plena luz do dia."
1000403-44 = "Mas durante o dia... o trabalho está acumulado..."
1000403-45 = "……."
1000403-46 = "Quando eu deveria encontrar o Sensei?"
1000403-48 = "(Hina ficou pensativa)"
