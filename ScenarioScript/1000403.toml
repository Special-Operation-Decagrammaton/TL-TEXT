[translation]
1000403-1 = "堂々たる理由"
1000403-2 = "ゲヘナ外郭・スラム街"
1000403-3 = "や、先生。"
1000403-4 = "[s] \"ここは……。\""
1000403-5 = "ああ、この辺りは、この前の風紀活動の影響で、生徒たちの出入りが封鎖された区域。"
1000403-6 = "元々危ない所だったけど、一度全部ひっくり返したからしばらくは安全のはず。"
1000403-7 = "私に気づく奴らもいないだろうし。"
1000403-8 = "だから、安心して先生に会える。"
1000403-9 = "[s] \"そこまで周りを気にしなくてもいいんじゃないか？\""
1000403-10 = "……。"
1000403-11 = "仕方ない、これは先生のためだから。"
1000403-12 = "知ってると思うけど私は敵が多い。学園の中でも、外でも。"
1000403-13 = "いつどこでも狙われてると言っても過言じゃない。"
1000403-14 = "だからそんな私が、特別に会ってる人がいるって知られたら……その人が危ない目に合うかもしれない。"
1000403-15 = "[s1] \"じゃあ直接会わずに、オンラインで会うのはどう？\"\n[s2] \"メールやメッセージでも仕事はできるよ。\""
1000403-18 = "……。"
1000403-19 = "……それは、そうだけど……。"
1000403-20 = "えっと……"
1000403-21 = "……。"
1000403-22 = "[s] \"……でも、顔を合わせてしないといけない仕事もあるよね。\""
1000403-23 = "……。"
1000403-24 = "……なんだか、からかわれてる気がするけど。"
1000403-25 = "それはそう、仕事には人と直接会わないとできないものもある。"
1000403-26 = "つまりこれもその一種、ということ……！"
1000403-27 = "あくまでも仕事のために会ってるだけ！何の罪も犯してない！"
1000403-28 = "[s3] \"でも、深夜に二人っきりでいるのを見られたら……。\"\n[s4] \"……もしかして、色々と想像されて困るかも？\""
1000403-29 = "……？そう？よく分からないけど……。"
1000403-30 = "……？そう？よく分からないけど……。"
1000403-31 = "……ただ、深夜にこうして二人で会ってるだけで。"
1000403-32 = "それで、色々と想像……い……色々……。"
1000403-33 = "えっと……それって、その……。"
1000403-35 = "……っ！？"
1000403-36 = "（とある結論に至ったようだ）"
1000403-37 = "な、な、何を言ってるの！？わ、私が先生と……！？"
1000403-38 = "わ、私がそんなハレンチなことをするわけない！"
1000403-39 = "そんな誤解をするやつらは今すぐに……。"
1000403-40 = "……。"
1000403-41 = "そういうゴシップが好きなやつらはどこにでもいる、仕方ない。"
1000403-42 = "……でも考えてみたら、深夜に先生に会うのはすごく危ないことかもしれない。"
1000403-43 = "逆に白昼堂々会った方が、安全かも。"
1000403-44 = "でも日中は……仕事が立て込んでて……。"
1000403-45 = "……。"
1000403-46 = "私は、いつ先生に会えばいい？"
1000403-48 = "（ヒナはじっと考え込んでしまった）"
