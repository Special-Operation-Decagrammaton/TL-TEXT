[translation]
104050-1 = "Episódio 5; Uma Solução Fácil"
104050-2 = "A conexão da 'Arca' foi cortada com sucesso.#nCom isso, acho que eles não vão conseguir nos hackear por um tempo."
104050-3 = "Isso mesmo. O sistema da Utnapishtim, que tava fora do ar, voltou a funcionar!"
104050-4 = "Então agora dá pra...! É com você, Himari-senpai!!"
104050-8 = "Pode deixar. Vou reconfigurar o sistema de segurança agora.#nVou restaurar o controle sobre a 'Nave Principal de Utnapishtim'."
104050-9 = "Temos que recuperar o controle sobre a 'Arca' também...#nRio, ordene a retirada da Toki!"
104050-10 = "……Toki, esse 'Sanctum' vai desaparecer logo."
104050-15 = "Entendido, então até lá eu――"
104050-16 = "――Por isso, não precisa mais lutar.#nToki, recue agora mesmo."
104050-22 = "……Sinto muito, Rio-sama. É... difícil recuar agora."
104050-26 = "Toki!?"
104050-27 = "Meu corpo... não se move mais... mesmo ainda tendo inimigos por aqui..."
104050-28 = "T-Toki... pelo menos vá para um lugar seguro.#nJá pedi reforços, logo eles vão――"
104050-29 = "……Não, tudo bem.#nEu sei muito bem que não vem reforço nenhum..."
104050-33 = "Com a distância daqui até a Millennium...#né impossível... que cheguem rápido."
104050-39 = "……Sinto muito, Rio-sama."
104050-41 = "！?"
104050-42 = "E, mesmo que por pouco tempo... foi uma honra lutar ao seu lado, Diretora Himari."
104050-43 = "Toki... do que diabos você tá..."
104050-44 = "Eu também... na verdade..."
104050-45 = "……Queria lutar junto com a 'Schale'."
104050-46 = "……Junto com as minhas senpais da C&C."
104050-49 = "……Rio-sama. Pra terminar, por favor, me passe o código de autodestruição da 'Abi-Eshuh'."
104050-50 = "……!?"
104050-51 = "Sendo a Rio-sama, você com certeza tem isso preparado... para o caso de eu te trair."
104050-55 = "Com a energia dessa 'Armadura', deve dar pra destruir o Sanctum."
104050-56 = "……Não, isso não existe. Eu nunca faria isso com você――"
104050-59 = "……Você mencionou o problema do bonde, não foi.#nA minha vida de um lado, e o destino de Kivotos do outro... a escolha é óbvia."
104050-60 = "Naquela hora, você disse que alguém tinha que puxar a alavanca――"
104050-61 = "Não, Toki. Aquilo... aquela pergunta..."
104050-62 = "……Tinha a premissa errada."
104050-63 = "……?"
104050-64 = "Tudo porque eu não tentei procurar por alguém que pudesse me estender a mão..."
104050-65 = "……。"
104050-67 = "Seria muito bom se a resposta fosse tão simples assim..."
104050-69 = "Isso é――"
104050-73 = "Alvo confirmado. O inimigo tá na mira."
104050-78 = "……!?"
104050-79 = "Q-O que é...?"
104050-90 = "S-Senpais...?"
104050-91 = "Opa~ Toki-chan! Chegamos pra te salvar♪"
104050-92 = "É, conseguimos chegar a tempo."
104050-93 = "É verdade, essa foi por pouco."
104050-97 = "Ei, você aí, a novata."
104050-100 = "Nunca mais... fale essas coisas na frente das suas senpais."
104050-101 = "C-Como vocês vieram parar aqui..."
104050-103 = "Ufa... Ainda bem que deu tempo."
104050-104 = "N-Noah...!? Como é que você...!"
104050-105 = "A menos que você tenha o poder de prever o futuro, não tem como――"
104050-106 = "Sim, nós saímos antes que isso acontecesse.#n――Usando o helicóptero mais rápido da Millennium."
104050-107 = "M-Mas como..."
104050-109 = "……Fui eu quem pedi."
104050-110 = "……!!"
104050-111 = "Não chega a ser um 'Sonho Premonitório'... mas é uma habilidade bem parecida... ou talvez eu devesse chamar de 'intuição'..."
104050-112 = "Eu já imaginava que isso fosse acontecer... embora seja difícil explicar o porquê."
104050-113 = "Eu não tinha certeza... mas a Noah confiou em mim."
104050-114 = "Fufu, imagina.#nVocês estão dando o sangue lá na frente, eu só fiz o que podia fazer daqui."
104050-115 = "Até porque, eu tenho uma kohai por perto com uma 'intuição' excelente...#nE também――eu também tive esse pressentimento."
104050-117 = "Então, meninas da C&C.#nDeixo a Toki-san com vocês."
104050-121 = "……。"
104050-122 = "É isso aí, Presidente Rio..."
104050-123 = "Uma solução simples e fácil como essa, de vez em quando... não faz mal a ninguém, não acha?#n...Ainda mais para alguém que passou por tanto sofrimento por saber o que ia acontecer."
104050-124 = "……。"
104050-129 = "……Por enquanto, vamos começar a 'limpeza'!"
104050-130 = "Isso, vamos cuidar do que sobrou."
104050-131 = "Simbora! Bora pra cima!!"
104050-133 = "Showtime!"
104050-136 = "Presidente? Acorda pra vida!"
104050-140 = "Deixa pra falar o que tiver que falar quando a gente voltar pra Millennium!#nNão é hora de ficar moscando!"
104050-141 = "……Você tem razão.#nEntendido, Yuuka."
104050-142 = "Fala sério... a Presidente era esse tipo de pessoa...?"
104050-146 = "Ué, não sabia? A Big Sister parece durona, mas por dentro tem um coração mais sujo que a água da fossa do banheiro."
104050-150 = "……Não entendi muito bem essa comparação."
104050-156 = "Nós também terminamos por aqui. Vamos usar o dispositivo de processamento da 'Utnapishtim' para reiniciar a 'Sequência de Autodestruição' da 'Arca'. Pessoal, preparem-se."
104050-157 = "Mas..."
104050-158 = "Pois é... para fazer isso, essa nave vai ter que explodir junto com a 'Arca'."
104050-159 = "E-Então a gente...?"
104050-160 = "……Vai voltar pra superfície com a 'Sequência de Evacuação' que eu preparei."
104050-162 = "Próximo episódio; Em Pé de Igualdade"