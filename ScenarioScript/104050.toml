[translation]
104050-1 = "第5話;安易な解"
104050-2 = "「箱舟」の接続解除に成功。#nこれで、しばらくはハッキングできないと思う。"
104050-3 = "はい。シャットダウン状態だったウトナピシュティムのシステムも戻ってきました！"
104050-4 = "これなら……！ヒマリ先輩、お願い！！"
104050-8 = "ええ。これより、セキュリティシステムを再設定。#n「ウトナピシュティムの本船」の管制権を修復いたします。"
104050-9 = "「箱舟」の管制権を取り戻さなくてはなりませんね……#nリオ、トキに撤収命令を！"
104050-10 = "……トキ、その「サンクトゥム」はもうじき消滅するわ。"
104050-15 = "ええ、ですので、それまでに――"
104050-16 = "――だからもう、戦わなくて良いわ。#nトキ、早く撤収なさい。"
104050-22 = "……申し訳ありません、リオ様。撤収は……難しいです。"
104050-26 = "トキ！？"
104050-27 = "これ以上……身体が、動きません……まだ、敵が残っているというのに……"
104050-28 = "と、トキ……せめて安全な場所に移動してください。#n支援を要請していますので、すぐに―"
104050-29 = "……いえ、いいのです。#n救援が来ない事くらい、理解しております……"
104050-33 = "この場所とミレニアムの距離、では……#nすぐに到着するだなんて……不可能、ですから。"
104050-39 = "……申し訳ありません、リオ様。"
104050-41 = "！？"
104050-42 = "そして、短い時間でしたが……ご一緒できて、光栄でした、ヒマリ部長。"
104050-43 = "トキ……いったい、何を……"
104050-44 = "私も……本当は……"
104050-45 = "……「シャーレ」と共に、戦いたかったです。"
104050-46 = "……C&Cの先輩方と、一緒に。"
104050-49 = "……リオ様。最後に、[ruby=Abi-Eshuh]「アビ・エシュフ」[/ruby]の自爆コードを教えてください。"
104050-50 = "……っ！？"
104050-51 = "リオ様であれば、用意されていますよね……私が裏切った場合に、備えて。"
104050-55 = "この「武装」のエネルギーであれば、サンクトゥムを破壊できるはずです。"
104050-56 = "……いいえ、そんなもの存在しないわ。貴女に、そんな――"
104050-59 = "……トロッコ問題、と言っていましたね。#n私一人の命と、キヴォトスの存亡――どちらを取るかは、火を見るより明らかです。"
104050-60 = "あの時、誰かがレバーを引くべき、とリオ様は――"
104050-61 = "違うわ、トキ。あれは……あの質問は……"
104050-62 = "……前提そのものを、間違えていたのよ。"
104050-63 = "……？"
104050-64 = "私は、手を差し伸べてくれる人を探す事もせずにいたのだから……"
104050-65 = "……。"
104050-67 = "そのような、簡単な答えであればいいのですが……"
104050-69 = "それは――"
104050-73 = "ターゲット確認。目標を捉えた。"
104050-78 = "……！？"
104050-79 = "こ、これは……？"
104050-90 = "せ、先輩方……？"
104050-91 = "やっほ～トキちゃん！助けに来たよ♪"
104050-92 = "ええ、なんとか間に合いましたね。"
104050-93 = "そうだね、危ないところだった。"
104050-97 = "おい、そこの新人。"
104050-100 = "そんな台詞――二度と[ruby=・]先[/ruby][ruby=・]輩[/ruby]の前で言うんじゃねぇぞ。"
104050-101 = "ど、どうやってここに……"
104050-103 = "ふぅ……なんとか間に合いましたか。"
104050-104 = "の、ノア……！？貴女、一体どうやって……！"
104050-105 = "未来予知でもしない限り、こんな事は――"
104050-106 = "ええ、この状況になる前に出発したんですよ。#n――ミレニアム随一のスピードを誇るヘリを使って。"
104050-107 = "い、一体何を……"
104050-109 = "……私が望んだのだよ。"
104050-110 = "……！！"
104050-111 = "「予知夢」――とまではいかないが、限りなく近い能力……若しくは「勘」とでも形容すべきか……"
104050-112 = "こうなる予感がしていたのだよ……言葉として正確に紡ぐのは難しいのだがね。"
104050-113 = "確信はなかった――だが、ノアは信じてくれた。"
104050-114 = "ふふっ、とんでもないです。#nみなさんが頑張っている中、私にできる事をしたまでです。"
104050-115 = "私の周りにも、何故かと～っても「勘」のいい後輩がいまして……#nそれと――私もそんな予感がしたんです。"
104050-117 = "それでは、C&Cのみなさん。#nトキさんをよろしくお願いしますね。"
104050-121 = "……。"
104050-122 = "そういう事だよ、リオ会長……"
104050-123 = "たまには、このように安易な解があっても、良いのではないだろうか？#n……未来を識ってしまったが故に、苦痛を強いられた者にとっては、尚更。"
104050-124 = "……。"
104050-129 = "……ひとまず、「お掃除」を始めますよ！"
104050-130 = "ああ、残党を処理する。"
104050-131 = "おらぁ！行くぞ！！"
104050-133 = "イッツショータイム！"
104050-136 = "会長？しっかりしてちょうだい！"
104050-140 = "言いたいことがあるなら、ミレニアムに帰ってからにして！#n今はボーっとしてる場合じゃないわよ！"
104050-141 = "……そうね。#n分かったわユウカ。"
104050-142 = "まったく……会長ってこんなキャラだったのかしら……？"
104050-146 = "あら、ご存じなかったのですか？ビッグシスターはああ見えて、中身は浄化槽の濁った水のような心の持ち主なんですよ。"
104050-150 = "……例えがいま一つ分からないんだけど？"
104050-156 = "こちらの作業も終わりました。「ウトナピシュティム」の演算装置を利用し、「箱舟」の「自爆シーケンス」を再起動します。みなさん、ご準備を。"
104050-157 = "ですが……"
104050-158 = "そうね……それを実行するには、この船はここで「箱舟」と一緒に爆発するしかない。"
104050-159 = "じゃ、じゃあ私たちは……？"
104050-160 = "……私が用意した「脱出シーケンス」で地上に帰すわ。"
104050-162 = "次回;同等の条件"
