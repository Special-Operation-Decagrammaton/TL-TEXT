[translation]
10051060-1 = "Episódio 6: Fama em Ascensão"
10051060-2 = "Algum beco"
10051060-3 = "Hehehe... finalmente consegui!"
10051060-4 = "As edições mais recentes das revistas de moda 'BiBi' e 'ron-ro'...!"
10051060-5 = "Juntei e vendi papel velho e cartuchos, sobrevivi comendo apenas marmitas descartadas de lojas de conveniência e matei a sede só com água da torneira... valeu a pena todo o esforço para economizar dinheiro."
10051060-6 = "...Não foi o Sensei quem pagou metade?"
10051060-7 = "M-mas eu paguei a outra metade! O Sensei até me elogiou por isso!"
10051060-8 = "Mais importante, olhem só! #nNa edição deste mês da 'BiBi', tem uma matéria especial sobre a Shine Cat!"
10051060-9 = "Ela é uma designer genial que revolucionou o mundo da moda em Kivotos!"
10051060-10 = "Hum... parece que ela cuidou do desfile de moda em Hyakkiyako."
10051060-11 = "Uau..."
10051060-12 = "Quantas roupas lindas..."
10051060-13 = "Se eu me tornasse uma modelo, será que poderia usar roupas assim o quanto eu quisesse?"
10051060-14 = "Claro, com a minha altura... ser modelo é um sonho distante, mas..."
10051060-15 = "Hmm... será que não existe demanda para esse tipo de perfil?"
10051060-16 = "Hã!? S-sério mesmo!?"
10051060-17 = "Bem, ser alta ajuda a ser modelo, imagino."
10051060-18 = "Essa nova modelo chamada Tsukuyo Oono, que está na matéria da 'ron-ro', tem 1,80m de altura."
10051060-19 = "E os profissionais da área estão rasgando elogios a ela."
10051060-20 = "Ah, também está na 'BiBi'! #nDiz que ela é uma novata que surgiu como um cometa no mundo da moda e está chamando muita atenção..."
10051060-21 = "Os comentários dos críticos também são incríveis. #n'Possui um talento que supera em muito a sua inexperiência' ou 'uma pedra bruta que se aproxima de uma joia'..."
10051060-22 = "Quem tem talento... deve ser muito feliz..."
10051060-23 = "Nem sempre é assim."
10051060-28 = "Por trás do glamour, existe um esforço constante."
10051060-29 = "É como cuidar de uma flor para que ela desabroche; é preciso dedicação contínua."
10051060-30 = "Atsuko..."
10051060-31 = "Aliás, vocês duas."
10051060-32 = "As folhas das ervas que eu estava cultivando sumiram, vocês sabem de algo?"
10051060-37 = "Lembro de alguém falando sobre temperar carne estragada com ervas..."
10051060-43 = "...Ah, aquilo!?"
10051060-45 = "Praça da Academia Trinity"
10051060-48 = "Você já leu a 'Heart Girls' deste mês?"
10051060-49 = "Com certeza."
10051060-50 = "Ultimamente o foco estava muito em estilo de vida, então achei um pouco sem graça, mas..."
10051060-51 = "Fico feliz que a última edição tenha voltado para o tema de moda."
10051060-52 = "Sim, a profundidade das críticas aumentou, e as análises de tendências e os tópicos da indústria ficaram bem mais densos, não é?"
10051060-53 = "Além disso, a resenha sobre a nova modelo que estreou este mês foi impressionante."
10051060-54 = "Você fala da modelo que veio de Hyakkiyako, certo? O nome dela é, se não me engano..."
10051060-55 = "Tsukuyo Oono."
10051060-56 = "Isso! Só pelas fotos ela já tem uma aura incrível..."
10051060-57 = "Tanto o pessoal da indústria quanto os críticos estão unânimes em seus elogios."
10051060-58 = "Estou ansiosa para ver o futuro dela."
10051060-64 = "Instituto de Ciências Millennium"
10051060-68 = "O que você está lendo?"
10051060-69 = "Uma revista acadêmica?"
10051060-70 = "Não é como se eu lesse apenas revistas acadêmicas o tempo todo..."
10051060-71 = "É a edição mais recente da 'ron-ro'."
10051060-72 = "Leitura obrigatória para não ficar por fora das tendências."
10051060-73 = "'ron-ro'? O que é isso?"
10051060-74 = "Não brinca... é uma revista de moda famosa, sabia?"
10051060-75 = "Revista de moda, é...?"
10051060-76 = "Nunca me preocupei com roupas, exceto quando tiraram as medidas para o uniforme..."
10051060-77 = "Estou ocupada demais lendo teses, não sobra espaço para outros tipos de leitura."
10051060-78 = "Ah, entendo... bem, tem gente que é assim mesmo, né."
10051060-79 = "Mas e então? Você estava lendo com tanta concentração, tinha algo interessante escrito?"
10051060-80 = "A crítica sobre a nova modelo é bem interessante."
10051060-81 = "Ela acabou de estrear e a carreira ainda é curta, mas parece que está chamando muita atenção."
10051060-82 = "Hum... o nome dela é... Tsukuyo?"
10051060-83 = "Oh... realmente, ela tem uma aura de quem não é qualquer uma, né."
10051060-89 = "Sala de Entrevistas da Estação de Transmissão Chronos"
10051060-91 = "Muito obrigado por colaborar com a entrevista até aqui!"
10051060-92 = "A-ah, sim... eu que agradeço..."
10051060-93 = "Então, a última pergunta!#nPoderia nos dizer em uma palavra qual é o seu objetivo futuro, Tsukuyo-san!"
10051060-94 = "E-eh!?"
10051060-95 = "Eu, de agora em diante... bem..."
10051060-99 = "……"
10051060-100 = "E-eu, bem, eu..."
10051060-102 = "Vamos lá, Tsukuyo-san! Diga o que está no seu coração, de forma direta e sincera!"
10051060-103 = "S-sincera..."
10051060-104 = "(Olhar fixo)"
10051060-105 = "A-ah, bem... de agora em diante, eu vou me esforçar para me tornar uma modelo de moda incrível...!"
10051060-106 = "(Acena com a cabeça)"
10051060-107 = "Sim! Recebemos suas palavras, ditas com sinceridade, apesar do nervosismo!"
10051060-108 = "Estamos ansiosos pelo seu sucesso, Tsukuyo-san!#nAgora, vamos para um breve intervalo comercial!"
10051060-114 = "Bom trabalho. Você se saiu bem para uma primeira entrevista na TV."
10051060-115 = "A-ah, bem... que tipo de situação é esta, exatamente...?"
10051060-116 = "Bem, é pedir demais que você entenda a situação atual de imediato."
10051060-117 = "Olhe para esta tela. Quantas pessoas assistiram à transmissão ao vivo, quanto o número de visualizações aumentou, quais foram as reações..."
10051060-118 = "……!"
10051060-119 = "Números como estes, você nunca viu antes, não é?"
10051060-120 = "Estes são os números que você criou. É a atenção que você atraiu."
10051060-121 = "O talento como o seu é o que a era atual exige."
10051060-122 = "Ma-mas, eu pertenço ao Clube de Pesquisa de Ninjutsu..."
10051060-123 = "Eu não entendo nada de ninjutsu ou de ninjas."
10051060-124 = "Mas, no mundo da moda... você pode chegar ao topo. Eu tenho certeza disso."
10051060-125 = "Mas eu sou uma ninja..."
10051060-126 = "Se você quer conquistar algo, precisa abrir mão de outra coisa. A escolha é sua."
10051060-127 = "Eu..."
10051060-128 = "Se não consegue chegar a uma resposta, eu te direi.#n...Venha comigo. Essa é a resposta."
10051060-129 = "Mas..."
10051060-134 = "Além disso, você declarou agora pouco, não foi?#nNa frente de muitos espectadores, que 'vai se tornar uma modelo'."
10051060-135 = "……!"
10051060-136 = "Pretende quebrar essa promessa?"
10051060-137 = "O carro está pronto."
10051060-138 = "Vamos, temos o próximo trabalho."
10051060-147 = "Local de filmagem de 'Crônicas Ninja da Garota Michiru'"
10051060-148 = "Presidente! Veja!#nO vídeo que postamos semana passada ganhou 2 visualizações!"
10051060-149 = "Oh! Mais pessoas se embriagaram com o charme dos ninjas!"
10051060-150 = "Tsukuyo! Tsukuyo, venha aqui ver também!"
10051060-154 = "Presidente, a Tsukuyo-dono ainda não chegou."
10051060-155 = "Hã? Ainda não?"
10051060-156 = "Que estranho... O que será que aconteceu?"
10051060-157 = "Estou enviando mensagens pelo MomoTalk faz um tempo, mas não foram visualizadas de jeito nenhum..."
10051060-158 = "Ela deveria saber melhor do que ninguém que temos uma gravação neste horário."
10051060-159 = "Não me diga que aconteceu alguma coisa...?"
10051060-160 = "Com licença. É aqui o local da gravação de hoje?"
10051060-161 = "Hmm?"
10051060-162 = "E-Essa voz...!"
