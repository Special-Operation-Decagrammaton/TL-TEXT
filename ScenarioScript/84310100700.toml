[translation]
84310100700-6 = "Ei, o que houve?"
84310100700-7 = "Você está pálido."
84310100700-11 = "Se não estiver se sentindo bem, me diga."
84310100700-12 = "Ou aconteceu alguma coisa?"
84310100700-14 = "Ah, não, está tudo bem. Não há problema algum."
84310100700-15 = "Digamos que foi apenas uma divergência de opiniões..."
84310100700-18 = "(Contei para Neru e Rio o que aconteceu no local)"
84310100700-21 = "Ah... entendi."
84310100700-22 = "Otohana Sumire..."
84310100700-23 = "É bom que ela seja dedicada ao treinamento, mas continua a mesma de sempre, pelo visto."
84310100700-24 = "Para começo de conversa, é incrível que você tenha conseguido escapar. Sério mesmo."
84310100700-26 = "Se tivesse sido pego, o que será que teria acontecido..."
84310100700-27 = "Bem, é verdade..."
84310100700-29 = "(Neru explicou brevemente sobre os alunos que foram vítimas de Otohana Sumire)"
84310100700-32 = "A taxa de conclusão dos alunos que participam do treinamento da Otohana Sumire é inferior a 2%. E quanto aos que conseguiram voltar para casa andando com as próprias pernas, é menos de 1%."
84310100700-33 = "E a grande maioria restante...?"
84310100700-34 = "...Sobre isso."
84310100700-36 = "(Ao ouvir o que as duas disseram, Seia sentiu um suor frio escorrer pelas costas)"
