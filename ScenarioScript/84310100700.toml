[translation]
84310100700-6 = "おい、どうした？"
84310100700-7 = "顔が青ざめているわ。"
84310100700-11 = "体調が悪いのなら言ってちょうだい。"
84310100700-12 = "それとも、なんかあったのか？"
84310100700-14 = "ああ、いや、大丈夫だ。問題は何もない。"
84310100700-15 = "ただの見解の相違とでも言うべきか……。"
84310100700-18 = "（ネルとリオに会場であったことを話した）"
84310100700-21 = "あー……なるほどな。"
84310100700-22 = "[ruby=おとはな]乙花[/ruby]スミレ……。 "
84310100700-23 = "トレーニングに熱心なのはいいのだけど、相変わらずのようね。"
84310100700-24 = "そもそも、よく逃げ切れたな。すげぇよ。"
84310100700-26 = "もし捕まったら、どうなっていたのだろうか……。"
84310100700-27 = "まぁ、そうだな……"
84310100700-29 = "（乙花スミレの被害にあった生徒について、ネルは概要を話した）"
84310100700-32 = "乙花スミレのトレーニングに参加した生徒の完走率は2%以下よ。自分の足で家に帰りつけた生徒に至っては1%未満。"
84310100700-33 = "残りの大多数は……？"
84310100700-34 = "……それは。"
84310100700-36 = "（二人の話を聞いたセイアは背に冷や汗が伝うのを感じた）"
