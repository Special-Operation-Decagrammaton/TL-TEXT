[translation]
903-1 = "Tiferet: A Bela Redentora que Exalta o Sofrimento"
903-2 = "Eu estava esperando por você, Sensei."
903-3 = "Não temos tempo, então serei breve."
903-4 = "Em uma zona de tundra onde ninguém pisa――"
903-5 = "Uma certa estrutura foi descoberta."
903-6 = "E, ao mesmo tempo, recebemos um sinal de socorro."
903-7 = "Parece que originalmente era usada pela Academia Red Winter, mas..."
903-8 = "A atual Secretaria da Red Winter declarou que não tem conhecimento disso."
903-9 = "Deixando de lado se isso é verdade ou não―― agora, outro problema surgiu..."
903-10 = "Este sinal de socorro... está sendo emitido de forma intermitente."
903-11 = "Não é estranho?#nSendo uma instalação esquecida em uma terra onde ninguém se aproxima."
903-12 = "É difícil imaginar que haja alguém lá."
903-13 = "Embora a possibilidade seja baixa, pensei que pudesse ser um sinal de socorro de algum sobrevivente, então analisei o sinal――"
903-14 = "...Quem estava enviando o sinal de socorro era a IA de gerenciamento do banco de sementes."
903-15 = "Dizia: 'Como o prazo de validade do banco está prestes a expirar, é necessário recuperar os suprimentos armazenados'."
903-16 = "Senti algo estranho nisso também."
903-17 = "A frequência do sinal de socorro era uma que era usada antes da revisão."
903-18 = "Não deveria existir uma IA de alto desempenho como essa na época em que essa versão era utilizada..."
903-19 = "Este caso tem muitos pontos suspeitos.#nMesmo assim, não podemos simplesmente ignorá-lo."
903-20 = "Se sementes de plantas valiosas estiverem armazenadas lá, precisamos protegê-las com urgência."
903-21 = "É por isso que quero solicitar ao Schale uma investigação no local do banco de sementes."
903-22 = "Como Chefe do Departamento Financeiro, preciso estar ciente da quantidade de recursos que dormem em Kivotos."
903-23 = "Mesmo que a propriedade pertença à Red Winter――"
903-24 = "Não pode haver falhas nos registros."
903-25 = "...Mas, por favor, tome cuidado."
903-26 = "'Meu ser é a 'dedicação nascida do sacrifício', e meu epíteto é a 'Bela Redentora que Exalta o Sofrimento''――"
903-27 = "Essa frase estava misturada no sinal de socorro.#nSerá que alguém que esteve na instalação deixou isso escrito?..."
903-28 = "Ou talvez seja fruto do aprendizado autônomo da IA de gerenciamento."
903-29 = "De qualquer forma, saberemos a verdade quando formos ao local."
903-30 = "...Conto com você."
903-31 = "Por mais que não pareça... o Conselho Estudantil Geral confia bastante em você, Sensei."
