[translation]
10040110-1 = "Epílogo parte 3: O suco misto definitivo"
10040110-2 = "（Enquanto Chihiro, Yuuka e Noa saíram para fazer compras...）"
10040110-3 = "Ufa! Foi divertido."
10040110-4 = "Mesmo tendo jogado tantas vezes, ainda consigo sentir a adrenalina. #nRealmente, \"BOOM\" é um clássico."
10040110-5 = "Embora eu tenha sentido uma adrenalina bem diferente da que esperava."
10040110-6 = "Se a Chihiro-senpai tentar usar uma escopeta de verdade, #nprecisamos impedi-la a todo custo..."
10040110-8 = "B-bem... dizem que tem gente que muda de personalidade quando assume o volante. #nVamos considerar que essa é a versão gamer disso."
10040110-9 = "Aliás, fiquei com tanta tensão que minha garganta secou."
10040110-10 = "Hare-senpai. Posso beber este \"Yokai MAX\"?"
10040110-11 = "Pode, mas... ah. Espere, esse é..."
10040110-18 = "— Cof! Cof!"
10040110-19 = "Ei, o que é isso! Que azedo! Será que está vencido?"
10040110-20 = "...Cheguei tarde demais. #nÉ o novo sabor de ameixa em conserva, por isso é azedo."
10040110-21 = "Sabor de ameixa em conserva!?"
10040110-23 = "O \"Yokai MAX\" tem vários sabores peculiares. #nNo mês passado, o sabor de sopa de feijão doce também virou assunto nas redes sociais."
10040110-25 = "O gosto é meio estranho, mas... não é ruim para despertar. #nAjuda a espantar o sono."
10040110-26 = "Ugh... será que foi por causa do sabor de ameixa? Fiquei com vontade de comer arroz branco."
10040110-27 = "Se não tiver, até um saquê doce serviria..."
10040110-32 = "...Ei, senpai. Tive uma ideia brilhante."
10040110-33 = "Se a gente misturar esse \"Yokai MAX\" de ameixa com saquê doce... #nnão acha que ficaria com gosto de arroz com ameixa?"
10040110-35 = "Não acho."
10040110-36 = "Acho que ficaria com um gosto completamente diferente..."
10040110-38 = "Mas, sabe como é, às vezes misturar sucos acaba ficando surpreendentemente bom, né?"
10040110-39 = "Isso aqui pode acabar sendo uma boa ideia..."
10040110-43 = "Fufufu, parece interessante."
10040110-44 = "Uau, que susto! Desde quando você voltou?"
10040110-45 = "Acho que foi por volta de quando vocês estavam jogando \"BOOM\"?"
10040110-46 = "...Como o clima estava tenso, fiquei escondida esse tempo todo."
10040110-48 = "...Foi uma decisão sábia. A vice-líder estava assustadora naquela hora."
10040110-49 = "Mas enfim, vão misturar o \"Yokai MAX\" de ameixa com saquê doce, né? #nNão é uma ótima ideia?"
10040110-50 = "Já que estamos aqui, por que não misturamos várias coisas?"
10040110-51 = "Você está animada demais com isso... #nJá misturou bebidas antes?"
10040110-52 = "Só com as bebidas que tem na geladeira do Seminar. #nMas, claro, não temos suco de ameixa nem saquê doce lá."
10040110-53 = "Mas a gente vê muito isso na internet, não vê? #nTipo, suco de tomate com molho de pimenta que vira gosto de pizza, #nou leite com shoyu que vira gosto de biscoito de arroz..."
10040110-54 = "Nossa... mas pode usar as coisas assim? E a permissão?"
10040110-58 = "Não precisa pedir, precisa?"
10040110-59 = "............Hã?"
10040110-61 = "Se formos pedir permissão para tudo, nunca vamos começar nada! #nAlém disso, é mais rápido pedir perdão depois de fazer!"
10040110-63 = "E-essa é uma forma de pensar bem peculiar..."
10040110-64 = "Dá para sentir a dor da Yuuka-san."
10040110-66 = "Mas será que elas vão dar permissão depois?"
10040110-67 = "Bem, considerando quem são elas..."
10040110-68 = "Imaginei..."
10040110-69 = "Esqueçam isso, vamos logo misturar o Yokai MAX! #nÉ um sabor inédito, estou ansiosa!"
10040110-70 = "Vamos terminar antes que as senpais chatas voltem!"
10040110-71 = "Hum... se a Chihiro-senpai descobrir, ela vai ficar brava, né?"
10040110-72 = "...Ora, ora?"
10040110-73 = "Será que o pessoal da Veritas, conhecidos como os buscadores do saber, #nestão hesitando em buscar a verdade por medo de uma senpai?"
10040110-74 = "Será que é porque..."
10040110-78 = "Estão com medinho?"
10040110-80 = "N-não é nada disso!?"
10040110-81 = "……Já que você disse até aqui, não tem como eu recuar."
10040110-82 = "Eu já tinha ouvido rumores, mas você é muito boa em instigar os outros."
10040110-83 = "Tudo bem, vamos levar isso até o fim!"
10040110-84 = "Então, primeiro, vamos misturar o \"Youkai MAX\" sabor ameixa em conserva com...#namazake na proporção de 1:1――"
10040110-88 = "……Q-que visual incrível."
10040110-89 = "A-a cor……."
10040110-91 = "……Não, acho que ainda dá para encarar desse jeito."
10040110-92 = "Como está o gosto? Ficou com gosto de arroz com ameixa em conserva?"
10040110-99 = "…………Nem um pouco."
10040110-100 = "O azedo e o doce se misturaram e……."
10040110-101 = "Dá para dizer que tem gosto de amazake feito com arroz estragado……."
10040110-103 = "Quer dizer que foi um fracasso?"
10040110-104 = "Só porque você combina notas musicais aleatórias, não significa que o som será bonito.#nÉ a mesma coisa."
10040110-106 = "Falando nisso, acho que ouvi dizer que se misturar leite com uma bebida agridoce,#nvira sabor iogurte."
10040110-107 = "Se adicionarmos leite aqui…… não acha que ficaria com um sabor inovador de iogurte……?"
10040110-108 = "Não tem como isso acontecer.#nPara começar, iogurte é um alimento fermentado e――"
10040110-113 = "Ah. Maki, por acaso você……."
10040110-114 = "Já que começamos, por que não nos aventuramos um pouco?"
10040110-115 = "Aproveitando a oportunidade, vamos misturar todas as bebidas que estávamos curiosas!"
10040110-117 = "Ni-ha-ha-ha-ha-ha-ha-ha!!!!!!!!"
10040110-125 = "Bem……."
10040110-126 = "Hmm……."
10040110-127 = "Que estranho. Não era para ter nenhum tempero aqui……."
10040110-128 = "Tem um cheiro picante e irritante……."
10040110-129 = "Esse líquido roxo escuro…… parece que vai começar a se mover a qualquer momento.#nSe bebermos isso, com certeza vamos passar mal."
10040110-130 = "Mais do que isso…… se a Chihiro-senpai descobrir, não vai ser só uma bronca."
10040110-131 = "Se ela souber que usamos metade das bebidas que estavam aqui para o experimento――"
10040110-132 = "……O que tem as bebidas?"
10040110-138 = "C-Chihiro-senpai……!?#nQuando você voltou……?"
10040110-139 = "Agora pouco. E então, do que vocês estavam falando?"
10040110-140 = "Além disso, o que é esse suco no recipiente?"
10040110-141 = "B-bem……."
10040110-142 = "I-isso mesmo! A Koyuki-chan começou a dizer que misturar várias bebidas criava um sabor misterioso!"
10040110-144 = "……Ei!? Você vai me trair!?"
10040110-146 = "Ko-yu-ki-chan-!?#nBastou eu tirar os olhos de você por um segundo para você aprontar de novo!"
10040110-147 = "Desta vez eu não vou perdoar!!!#nSério, não dá para deixar passar dessa vez!"
10040110-149 = "N-não pode ser……!!"
10040110-151 = "Uaaaaaaaah……!!!"
