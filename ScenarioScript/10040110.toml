[translation]
10040110-1 = "後日談その3;究極のミックスジュース"
10040110-2 = "（チヒロとユウカ、ノアが買い出しで席を外している間のこと……）"
10040110-3 = "ふぅ！楽しかったぁ。"
10040110-4 = "何回プレイしたかわからないくらいなのに、まだスリルを楽しめるなんて。#nやっぱ「BOOM」は名作だね。"
10040110-5 = "思っていたのと違うスリルまで感じてしまいましたけどね。"
10040110-6 = "チヒロ先輩がショットガンを使おうとすることがあれば、#n全力で止めないとだね……。"
10040110-8 = "ま、まあ……ハンドルを握ると性格が変わる人がいるって言うから。#nそのゲーム版だと思おう。"
10040110-9 = "ところで、変な汗かいたから喉渇いちゃった。"
10040110-10 = "ハレ先輩。この「妖怪MAX」、飲んでもいい？"
10040110-11 = "いいけど……あ。待って、それは――"
10040110-18 = "――けほっ！けほっ！"
10040110-19 = "え、なにこれ！酸っぱ！もしかして、賞味期限切れ？"
10040110-20 = "……遅かったか。#n新発売の梅干し味だから、酸っぱいんだ。"
10040110-21 = "梅干し味！？"
10040110-23 = "「妖怪MAX」は変わった味のものがいろいろありますから。#n先月もお汁粉味がSNSで話題になっていました。"
10040110-25 = "味はちょっとアレだけど……目覚ましに飲むと悪くないよ。#n眠気が飛ぶからね。"
10040110-26 = "うぅ……梅干し味だったせいかな。白米が食べたくなってきた。"
10040110-27 = "なければ、甘酒でもいいからほしいかも――"
10040110-32 = "……ねえ、先輩。ちょっとひらめいちゃったんだけどさ。"
10040110-33 = "この梅干し味の「妖怪MAX」ってさ、甘酒と混ぜたら……#nご飯と梅干しの味になると思わない？"
10040110-35 = "思いません。"
10040110-36 = "まったく別の味になると思うけど……。"
10040110-38 = "でも、ジュースって混ぜたら、意外とおいしかったりするでしょ？"
10040110-39 = "これだって、案外イケるかも――"
10040110-43 = "ふっふっふっ、面白そうですね。"
10040110-44 = "うわ、びっくりした！いつの間に戻ってきたの？"
10040110-45 = "皆さんが「BOOM」をプレイしてたあたりだったかな？"
10040110-46 = "……不穏だったので、ずっと気配を消してましたけど。"
10040110-48 = "……賢明です。あの時の副部長は、すさまじかったので。"
10040110-49 = "それより、梅干し味の「妖怪MAX」に甘酒を混ぜるんですよね？#nいい閃きじゃないですか？"
10040110-50 = "せっかくですし、いろいろ混ぜてみませんか！"
10040110-51 = "やけに食いつきが良いね……#n飲み物を混ぜ飲みしたことでもあるの？"
10040110-52 = "セミナーの冷蔵庫にある飲み物でなら。#nさすがに梅干し味のジュースと甘酒はないですけどね。"
10040110-53 = "でも、ネットでよく見るじゃないですか？#nトマトジュースとチリソースでピザ味になるとか、#n牛乳と醤油でお煎餅の味とか――"
10040110-54 = "うわ……それって、勝手に使っていいの？許可は？"
10040110-58 = "取らなくていいんじゃないですか？"
10040110-59 = "…………え？"
10040110-61 = "いちいち許可なんて取ってたら、何も始められませんから！#nそれに、やってからもらった方が手っ取り早く済みますし！"
10040110-63 = "そ、そういう考え方もあるんだ……。"
10040110-64 = "ユウカさんの苦労がしのばれます。"
10040110-66 = "それって、後から許可してもらえるの？"
10040110-67 = "まあ、相手が相手ですし……。"
10040110-68 = "だと思った……。"
10040110-69 = "そんなことより、はやく妖怪MAXを混ぜてみましょ！#n初めての味なので、楽しみです！"
10040110-70 = "口うるさい先輩たちが帰ってくる前に済ませちゃいたいですね！"
10040110-71 = "うーん……チヒロ先輩にバレたら怒られちゃうよね？"
10040110-72 = "……あれあれ？"
10040110-73 = "学問の探究者と名高いあのヴェリタスの皆様が、#n先輩怖さに真理の追究をためらっちゃうんです？"
10040110-74 = "もしかしてなんですが――"
10040110-78 = "ビビっちゃってるんです？"
10040110-80 = "そ、そんなことないけど！？"
10040110-81 = "……ここまで言われたら、引き下がれないかな。"
10040110-82 = "噂には聞いていましたが、扇動がお上手ですね。"
10040110-83 = "いいよ、とことんやってやろうじゃない！"
10040110-84 = "じゃあまず、梅干し味の「妖怪MAX」に……#n甘酒を1:1で混ぜて――"
10040110-88 = "……す、すごいビジュアルですね。"
10040110-89 = "い、色が……。"
10040110-91 = "……いや、このくらいならまだいけるんじゃないかな。"
10040110-92 = "味はどうですか？ご飯と梅干しを一緒に食べる感じになりました？"
10040110-99 = "…………全然。"
10040110-100 = "酸味と甘味が混ざっちゃって……。"
10040110-101 = "腐った米で作った甘酒の味、とでも言えばいいのかな……。"
10040110-103 = "失敗ってこと？"
10040110-104 = "適当な組み合わせの和音が、きれいな音だとは限りませんから。#nそれと同じでしょう。"
10040110-106 = "そういえば、牛乳に甘酸っぱい飲み物を混ぜると#nヨーグルト味になるって聞いた気がします。"
10040110-107 = "ここに牛乳を足したら……斬新なヨーグルト味になりそうじゃないですか……？"
10040110-108 = "そんなわけないでしょ。#nそもそもヨーグルトは発酵食品で――"
10040110-113 = "え。マキ、もしかして……。"
10040110-114 = "もう始めちゃったんだし、ちょっと冒険してみない？"
10040110-115 = "この機に、気になってた飲み物を全部混ぜちゃおうよ！"
10040110-117 = "にははははははー！！！！！！！！"
10040110-125 = "えっと……。"
10040110-126 = "う～ん……。"
10040110-127 = "おかしいなぁ。香辛料なんて入れてないはずなのに……。"
10040110-128 = "ピリッとした刺激臭が……。"
10040110-129 = "この濃い紫色の液体……今にも動き始めそうですね。#nこんなの、飲んだら絶対お腹を壊してしまいます。"
10040110-130 = "それよりこんなの……チヒロ先輩にバレたら、怒られるだけじゃ済まないよ。"
10040110-131 = "ここにあった飲み物を半分も実験に使ったなんて、知られたら――"
10040110-132 = "……飲み物がどうかした？"
10040110-138 = "チ、チヒロ先輩……！？#nいつ帰ってきたの……？"
10040110-139 = "ついさっき。で、何の話してたの？"
10040110-140 = "それに、その容器に入ったジュースは、なに？"
10040110-141 = "え～っと……。"
10040110-142 = "そ、そう！コユキちゃんがいろんな飲み物を混ぜたら、不思議な味がするって言い始めて！"
10040110-144 = "……ちょっ！？裏切る気です！？"
10040110-146 = "コ～ユ～キ～！？#nちょっと目を離した隙に、またやってくれちゃって！"
10040110-147 = "今度こそ許さないんだから！！！#nさすがに許せないよね！"
10040110-149 = "そ、そんなぁ……！！"
10040110-151 = "うああああぁぁぁぁぁああん……！！！"
