[translation]
10028030-1 = "Episódio 3: Para o vagão da frente"
10028030-5 = "Sensei, por que você se deu ao trabalho de vir a um lugar tão remoto?"
10028030-11 = "E ainda por cima com essa garotinha tão adorável da Trinity?"
10028030-15 = "……."
10028030-16 = "Garotinha adorável, é..."
10028030-17 = "[s] \"Kasumi. Não se fala assim com alguém que você acabou de conhecer...\""
10028030-18 = "Ah, Sensei. Por mim tudo bem."
10028030-19 = "Apesar da aparência, sou membro do Comitê de Justiça, então isso não é nada para mim."
10028030-25 = "……Oh?"
10028030-31 = "Ora, ora! Você é alguém com quem dá para conversar!!"
10028030-32 = "Muito bem...! Gostei de você!! Hahaha!!"
10028030-33 = "Isso mesmo, não se preocupe com detalhes. #nNós temos coisas muito mais importantes para tratar, não temos!?"
10028030-34 = "Já que chegamos a esse ponto, temos que resolver isso de forma pacífica e tranquila!"
10028030-35 = "Dada a situação, somos praticamente aliados!"
10028030-36 = "Pelo menos até descermos do trem... com certeza."
10028030-40 = "[ns1] \"...Nós, aliados?\"\n[ns2] \"Até descermos do trem...?\""
10028030-43 = "……Hmm?"
10028030-44 = "O que foi? Essa reação... O choque da explosão foi forte demais? #nOu será que algo está errado...?"
10028030-45 = "Não tem jeito, vou resumir os pontos principais. Vocês duas disseram que estão procurando uma mala em algum lugar deste trem, certo? E eu preciso fugir daqui."
10028030-46 = "Ou seja, nosso objetivo comum é parar o trem e descer — #nVeja, nossos interesses coincidem, não é?"
10028030-50 = "Bem... isso é verdade, mas..."
10028030-56 = "Sinto muito, mas a situação da Kasumi e a nossa são um pouco diferentes."
10028030-57 = "Nós não estamos sendo perseguidas, então... assim que encontrarmos a mala no trem, nosso trabalho acaba."
10028030-58 = "Por isso, não pretendemos acompanhar você—"
10028030-59 = "Ei, ei, você deve ouvir o que os outros têm a dizer até o fim, não é?"
10028030-60 = "Eu entendo que uma adorável senhorita da Trinity não queira se envolver com alguém de Gehenna que tem chifres, mas..."
10028030-61 = "A vida não é como a gente quer."
10028030-62 = "Talvez seja difícil para uma garotinha entender, mas viver é algo muito complicado."
10028030-66 = "Haha..."
10028030-67 = "É, é mesmo... Bem, então, Kasumi."
10028030-68 = "Por que exatamente nós temos que ir com você... posso perguntar?"
10028030-69 = "……Hahaha, é por causa disso."
10028030-73 = "Hmm... um anúncio no trem?"
10028030-74 = "……Oh!"
10028030-75 = "Timing perfeito. Eu sabia que estava quase na hora!"
10028030-79 = "……Ah, ah."
10028030-80 = "Atenção a todos os passageiros e tripulantes a bordo."
10028030-81 = "Há pouco, parte da carga que está sendo transportada explodiu."
10028030-82 = "No momento, a tripulação está se deslocando para verificar o vagão afetado."
10028030-83 = "Para sua segurança, pedimos que todos os passageiros sigam as instruções da tripulação."
10028030-84 = "Além disso, priorizando a segurança dos clientes, o destino deste trem será alterado para um local onde materiais perigosos possam ser tratados."
10028030-85 = "Pedimos desculpas pelo transtorno, mas o trem não fará paradas além do ponto final, \"Distrito de Gehenna, Rua 32-1\"."
10028030-86 = "Agradecemos a compreensão e colaboração de todos."
10028030-91 = "Hã...?"
10028030-92 = "O destino foi alterado...?"
10028030-93 = "[s3] \"O conteúdo não estava estranho?\"\n[s4] \"Tem algo de errado nisso.\""
10028030-99 = "……Além disso, a partir de agora, está proibida a circulação entre assentos e vagões, bem como o uso dos banheiros."
10028030-100 = "Devido à situação de emergência, pedimos que sigam as ordens. Caso saiam de seus assentos, será considerado um motim e os seguranças intervirão. Isso é tudo, quem falou foi o condutor de hoje."
10028030-101 = "[s5] \"Proibido usar o banheiro!?\"\n[s6] \"O que diabos está acontecendo...?\""
10028030-104 = "Hahahahahaha!!"
10028030-105 = "Eu sabia que ia acabar assim! As coisas ficaram agitadas, não ficaram?"
10028030-106 = "Daqui a pouco, eles vão vir com tudo para cima da gente! Isso vai ser um problema!"
10028030-107 = "……Hm? Quer saber o que foi aquele anúncio?"
10028030-108 = "Explosão de parte da carga? Isso é mentira! Você viu também, não viu, Sensei?"
10028030-109 = "Afinal, eles não poderiam anunciar: 'Aceitamos suborno de uma gangue para escoltar um criminoso procurado, mas ele escapou, então vamos lá capturá-lo', poderiam?"
10028030-110 = "Escute, Sensei…… Primeiro, o último vagão onde eu estava era um 'vagão de escolta especial' feito pela gangue que me capturou."
10028030-111 = "E eles permitiram que esse vagão fosse acoplado ao final deste trem…… #nUm vagão de escolta tão óbvio assim, não parece estranho de qualquer ângulo?"
10028030-112 = "O que significa que…… entendeu agora?"
10028030-113 = "[s7] \"Este trem e a gangue……\"\n[s8] \"Estão trabalhando juntos……!?\""
10028030-116 = "Exatamente! Como esperado do Sensei, você entende rápido! Hahahaha!!"
10028030-117 = "No fim das contas, toda a tripulação deste trem está envolvida. #nÉ por isso que o vagão de escolta existe."
10028030-118 = "Mas…… não tem como eles terem colocado aquilo lá de graça, né?"
10028030-119 = "Nossa, deve ter rolado uma quantia considerável de dinheiro!"
10028030-120 = "Mas o 'vagão de escolta' explodiu e quem estava preso nele escapou."
10028030-121 = "Isso é motivo para ficar desesperado, não é?"
10028030-122 = "O trem não vai querer parar de jeito nenhum. #nAfinal, eles receberam algo em troca por isso……"
10028030-123 = "O objetivo deles é 'entregar a Chefe de Desenvolvimento de Fontes Termais, que está sob escolta, para a filial da Gehenna da gangue'."
10028030-124 = "Eles não vão medir esforços para isso…… #nMudar o destino é só o começo."
10028030-125 = "Este trem nunca vai diminuir a velocidade. #nMesmo eu, não conseguiria pular de um trem nessa velocidade."
10028030-126 = "Provavelmente, eu desmaiaria por meio dia com o impacto da queda…… #ne seria capturada nesse meio tempo."
10028030-127 = "……Nessa situação, como você acha que vão tratar vocês duas?"
10028030-128 = "Será que as alunas da Trinity vão receber cooperação?"
10028030-129 = "Será que vocês vão conseguir encontrar aquela mala? #nVocês não disseram que queriam voltar hoje ainda?"
10028030-133 = "……Por isso eu disse, não disse? #nQue não se deve olhar apenas para o que está na frente, mas também para o que está por vir."
10028030-134 = "A senhorita também deveria prestar um pouco mais de atenção ao redor! #nHahahaha!"
10028030-135 = "……Hahaha, ha."
10028030-136 = "As coisas ficaram mais complicadas do que eu pensava…… #nMas isso ainda dá para resolver."
10028030-137 = "A vida tem seus altos e baixos, né…… haha."
10028030-138 = "……Ha, hahahaha."
10028030-143 = "Ali! Encontramos eles!!"
10028030-144 = "Então eles tinham cúmplices mesmo…… Peguem todos que estiverem no vagão!!"
10028030-148 = "……'Cúmplices'?"
10028030-149 = "[ns] \"Estão falando da gente……?\""
10028030-150 = "Oh! A tripulação divertida chegou!"
10028030-151 = "Ei, espere um pouco. Nós não somos cúmplices dessa pessoa—"
10028030-152 = "Capturem todos que estiverem aqui! Sem perguntas, sem exceções!!"
10028030-153 = "Todos, avancem——!!"
10028030-154 = "Ora, ora, isso é um problema! Tem bastante gente, não tem?"
10028030-155 = "Sensei, já que chegamos a esse ponto, conto com você!"
10028030-156 = "E também, aquela ali……"
10028030-161 = "A se-nho-ri-ta também♪"
10028030-165 = "……Sensei."
10028030-166 = "[s9] \"Eu vou assumir o comando, então conto com você, Ichika.\"\n[s10] \"Primeiro, vamos resolver a situação à nossa frente.\""
10028030-169 = "Uau! O momento histórico da concretização do acordo! #nIsso aí, fantástico!!"
10028030-170 = "Então, vamos começar logo! #nEu também não——"
10028030-174 = "pretendo ficar apenas observando! Hahahaha!!"
10028030-177 = "Vamos lá, venham com tudo!!"
