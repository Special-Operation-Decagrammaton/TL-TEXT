[translation]
10028030-1 = "第3話;先頭車両へ"
10028030-5 = "先生は何用で、わざわざこんな僻地に来たんだ？"
10028030-11 = "それもこんな可愛らしい、トリニティのお嬢ちゃんと？"
10028030-15 = "……。"
10028030-16 = "可愛らしいお嬢ちゃん、っすか……"
10028030-17 = "[s] \"カスミ。初対面の人にそれは……\""
10028030-18 = "あ、先生。私なら大丈夫っす。"
10028030-19 = "こう見えても正義実現委員のメンバーなんで、これくらい何ともないっすよ。"
10028030-25 = "……ほぉ？"
10028030-31 = "なんだなんだ！話の通じる奴じゃないか！！"
10028030-32 = "いいぞ……！気に入った！！ハーハッハッハ！！"
10028030-33 = "そうだ、細かいことは気にするな。#n我々にはもっと大事なことがあるだろう！？"
10028030-34 = "こうなったからには穏便に、平和にいかないとな！"
10028030-35 = "状況的に、我々は仲間も同然！"
10028030-36 = "少なくとも、列車を降りるまでは……間違いなくな。"
10028030-40 = "[ns1] \"……私たちが、仲間？\"\n[ns2] \"列車を降りるまで……？\""
10028030-43 = "……んん？"
10028030-44 = "どうした？その反応は。爆発のショックが大きすぎたか？#nそれとも、何か違ったかね……？"
10028030-45 = "仕方ない、要点をまとめようじゃないか。そっちの二人は、この列車のどこかにあるカバンを探すと言っていたな？そして、私はここから逃げなければならない。"
10028030-46 = "つまりお互いの目的は、列車を止めて降りる――#nほら、我々の利害は一致しているだろう？"
10028030-50 = "えっと……それはそうっすけど……"
10028030-56 = "申し訳ないっすが、カスミさんと私たちの状況はちょっと違うんすよね。"
10028030-57 = "私たちは追われてるわけではないので……列車からカバンを見つければそれで終わりっす。"
10028030-58 = "なので、ご一緒するつもりは――"
10028030-59 = "こらこら、人の話は最後まで聞くものだろう？"
10028030-60 = "そりゃあ、トリニティの麗しいお嬢様が、ツノなんか付いたゲヘナの人間とは関わりたくないってのも分かるぞ？だが……"
10028030-61 = "人生とは、思い通りにいかないものさ。"
10028030-62 = "お嬢ちゃんにはまだ難しいかもしれないけど、生きるというのはとかく大変なものなのだよ。"
10028030-66 = "はは……"
10028030-67 = "そ、そっすか……えっとじゃあ、カスミさん。"
10028030-68 = "どうして私たちが同行しなくてはならないのか……聞いてもいいですか？"
10028030-69 = "……フッフッフ、それはだな。"
10028030-73 = "ん……車内放送？"
10028030-74 = "……おお！"
10028030-75 = "完璧なタイミングじゃないか。そろそろだと思っていたぞ！"
10028030-79 = "……あ、あー。"
10028030-80 = "ご乗車中の皆様、及び乗務員にお知らせいたします。"
10028030-81 = "先ほど、輸送中の貨物の一部が爆発しました。"
10028030-82 = "現在、乗務員が該当車両を確認するために動いております。"
10028030-83 = "ご乗車中の皆様は、安全のため乗務員の指示に従っていただきますようお願い申し上げます。"
10028030-84 = "また、お客様の安全を第一に考え、この列車は危険物の処理が可能な場所に行き先を変更いたします。"
10028030-85 = "大変ご迷惑をおかけしますが、終点「ゲヘナ自治区32-1番街」以外には停車いたしません。"
10028030-86 = "皆様のご理解とご協力のほど、よろしくお願い申し上げます。"
10028030-91 = "えっ……？"
10028030-92 = "行き先が変更されたんすか……？"
10028030-93 = "[s3] \"なんか内容が変じゃなかった？\"\n[s4] \"ちょっと違和感があるね。\""
10028030-99 = "……また、これよりお座席や車両間の移動、及びお手洗いの使用を禁止とさせていただきます。"
10028030-100 = "緊急事態のため、従っていただきますようお願い申し上げます。座席を離れた場合は暴動と見なし、警備員が駆けつけます。以上、本日の車掌がお送りいたしました。"
10028030-101 = "[s5] \"お手洗い使用禁止！？\"\n[s6] \"いったい何が起こってるんだろう……？\""
10028030-104 = "ハーハッハッハッハ！！"
10028030-105 = "やっぱりこうなると思っていたぞ！慌ただしくなってきたじゃないか。"
10028030-106 = "あと少しすれば、奴らが押し寄せてくるだろうな！こりゃあ大変だ！"
10028030-107 = "……ん？このアナウンスは何なのかって？"
10028030-108 = "貨物の一部が爆発？そりゃあウソだ！先生も見ただろう？"
10028030-109 = "だって「ギャング団から賄賂をもらって指名手配犯を護送してましたが、脱出されたので取り押さえに行きます」だなんて、アナウンスできないよな？"
10028030-110 = "いいか、先生……まず、私がいた最後尾の車両は、私を捕らえたギャング団たちが作った「特殊護送車両」だったんだ。"
10028030-111 = "で、この列車の最後尾にその車両を繋げることを許可した……#nあんないかにもな護送車両、どこからどう見てもおかしいだろう？"
10028030-112 = "ということは、だ……理解できたか？"
10028030-113 = "[s7] \"この列車とギャング団が……\"\n[s8] \"手を組んでるってこと……！？\""
10028030-116 = "その通り！さすがは先生、理解が早い！ハーハッハッハッハ！！"
10028030-117 = "結局この列車の乗務員は、みーんなグルってことだ。#nだから護送車両が存在する。"
10028030-118 = "でも……そんなものをタダで付けられるわけがないよなぁ？"
10028030-119 = "いやぁ、相当な額が動いただろうな！"
10028030-120 = "だけども「護送車両」は爆発して、捕らわれていた者は脱出したわけだ。"
10028030-121 = "これはもう！焦らざるを得ないだろう？"
10028030-122 = "列車側は、是が非でも停車したくないはずだ。#nそれ相応のモノを受け取ってるわけだから……"
10028030-123 = "奴らの目標は「護送中の温泉開発部長をギャング団のゲヘナ支部に送り届けること」"
10028030-124 = "そのためには手段を選ばないだろうな……#n行き先の変更なんて、まだほんの序の口でしかない。"
10028030-125 = "この列車がスピードを落とすことは決してない。#nさすがの私も、この速度の列車から飛び降りる事は不可能だ。"
10028030-126 = "おそらく、飛び降りた衝撃で半日は気を失うだろうな……#nその間に拘束されて終わりだ。"
10028030-127 = "……この状況で、そっちの2人の扱いはどうなると思う？"
10028030-128 = "トリニティの生徒が果たして協力してもらえるかな？"
10028030-129 = "その[ruby=・   ・   ・]カバン[/ruby]とやらは、ちゃんと見つけられるのか？#n今日中に帰るとか言ってなかったか？"
10028030-133 = "……だから、言っただろう？#n目の前のことばかりじゃなく、先のことも見据えるべきだ、と。"
10028030-134 = "お嬢ちゃんも少しは周囲を見た方がいいぞ！#nハーハッハッハッハ！"
10028030-135 = "……ははは、は。"
10028030-136 = "思った以上に、厄介なことになりましたが……#nこれくらい、まだなんとかなるっすよ。"
10028030-137 = "人生、山あり谷ありっすから……はは。"
10028030-138 = "……は、はははは。"
10028030-143 = "あっちだ！見つけたぞ！！"
10028030-144 = "やっぱり仲間がいたか……車内の奴らを全員集めろ！！"
10028030-148 = "……「仲間」？"
10028030-149 = "[ns] \"私たちのこと……？\""
10028030-150 = "おお！愉快な乗務員が来たぞ！"
10028030-151 = "ちょっ、待ってください。私たちはこの人の仲間じゃ――"
10028030-152 = "ここにいる奴らを全員捕らえろ！問答無用だ、例外はない！！"
10028030-153 = "全員、突入――！！"
10028030-154 = "や～これはこれは大変だ！結構な数だぞ？"
10028030-155 = "先生、こうなったからにはよろしく頼むぞ！"
10028030-156 = "あと、そこの……"
10028030-161 = "お・じ・ょ・う・ち・ゃ・ん・も♪"
10028030-165 = "……先生。"
10028030-166 = "[s9] \"私が指揮をするから、よろしくねイチカ。\"\n[s10] \"まず目の前の状況をなんとかしようか。\""
10028030-169 = "ひゅーっ！記念すべき取引成立の瞬間だな！#nいいぞ、素晴らしい！！"
10028030-170 = "それじゃ、さっそく世話になろう！#n私だって――"
10028030-174 = "[ruby=ぼうかん]傍観[/ruby]してるつもりはないさっ！ハーハッハッハッハ！！"
10028030-177 = "さあ、どーんと来るがいい！！"
