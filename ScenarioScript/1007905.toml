[translation]
1007905-1 = "似たもの同士"
1007905-2 = "（近くのゲームセンターで、[ruby=みさか]御坂[/ruby]を探していると……）"
1007905-3 = "（景品が飾られた棚の前で、釘付けになっている姿を見つけた）"
1007905-10 = "こ、これは……一体……"
1007905-11 = "[s1] \"……御坂？\"\n[s2] \"それが気になるの？\""
1007905-14 = "コレ、何なの……？"
1007905-15 = "……まさか不良品？"
1007905-16 = "いや、でも展示されてるわけだし……"
1007905-21 = "[ns3] \"あ～。\"\n[ns4] \"初めて見る人は、大体同じような反応するかも。\""
1007905-24 = "んん？"
1007905-25 = "えっ、こういうデザインなの？#n……ほ、本当に？"
1007905-26 = "ちょっと……独特なデザインね、いろんな意味で。"
1007905-27 = "……えっ他にも種類があるの？こ、コイツの仲間……？"
1007905-28 = "えーっと……"
1007905-35 = "ほ、本当にいるのね。はは、は……"
1007905-36 = "……え、まだあるの？"
1007905-37 = "商店街に行けば、もっと見られる……？"
1007905-38 = "キヴォトスではそれなりに有名なキャラクターって……冗談よね！？#n何か他のと間違えてるんじゃないの？"
1007905-39 = "そ、そうなのね。うーん……"
1007905-40 = "……先生。"
1007905-41 = "ここに来てから初めて、異世界にいる実感が湧いたわ。"
1007905-42 = "[s5] \"そんなに驚いた顔、初めて見たよ。\"\n[s6] \"そ、そこまで……？\""
1007905-45 = "……世界は広いのね。"
1007905-46 = "それに、ここの事を私がとやかく言うのも、おかしな話だし……"
1007905-47 = "えっ、違うの？"
1007905-48 = "……あぁ、結構好き嫌いが分かれるキャラなんだ。"
1007905-49 = "なるほど……"
1007905-50 = "[s7] \"これが好きな人は、ちょっと物好きな分類かな。\"\n[s8] \"一定数、否定的な人も居るね。\""
1007905-53 = "そ、そっか……物好き、ね。"
1007905-54 = "うーん…………。"
1007905-58 = "[ns9] \"……御坂？\"\n[ns10] \"どうかしたの？\""
1007905-61 = "いや、ちょっとね……"
1007905-62 = "うーん、なんか既視感があるのよ。"
1007905-63 = "……あっ、分かった。"
1007905-64 = "ゲコ太だ。"
1007905-65 = "[s11] \"ゲコ太？\"\n[s12] \"初めて聞く名前だね。\""
1007905-68 = "そっか……"
1007905-69 = "それもそうよね……"
1007905-70 = "先生、私ちょっと考えが足りていなかったかもしれないわ。"
1007905-71 = "このキャラクターだって、私にはあまり理解できないけど……#n誰かにとってはきっと大切な子なのよね。"
1007905-72 = "……私も学園都市では、似たような境遇だったのに。"
1007905-73 = "この子……えっと、名前なんて言ったかしら？"
1007905-74 = "……ペロロ？モモフレンズの？"
1007905-75 = "ペロロも……ゲコ太に近いような気がするわ。"
1007905-76 = "……うーん。"
1007905-77 = "……そう考えたら、ちょっと可愛く見えてきたような。"
1007905-78 = "[s13] \"そんな急に！？\"\n[s14] \"同情してるように聞こえたんだけど……。\""
1007905-81 = "な、何だっていいでしょ！細かいことは気にしないの！"
1007905-82 = "決めた。この街に来たのも、何かの運命かもしれないし。"
1007905-83 = "何か1つくらい買っていこうじゃないの。"
1007905-84 = "えーっと、景品以外の売り場は……あっちね。"
1007905-88 = "うーん……よし、これに決めたわ。先生、レジってどこにあるの？"
1007905-89 = "えっ……代わりに買ってくれるの？"
1007905-90 = "ん、大丈夫かって？"
1007905-91 = "……ああ、ペロロで良いのかって意味？"
1007905-95 = "うーん……そうね。"
1007905-96 = "分からないけど、とりあえず持ち歩いてたら愛着が湧くんじゃない？#n好きになれるよう、努力してみるわ！"
1007905-97 = "[s15] \"努力が必要なレベルなんだ……。\"\n[s16] \"それなら、私からはもう何も言うことは無いよ。\""
1007905-100 = "よし！"
1007905-101 = "こ、これから頼んだわよ！ペロロ！！"
1007905-104 = "[wa:500]― [log=미사카]うーーーん。[/log]"
1007905-107 = "[wa:500]― [log=미사카]ずっと眺めてたら、[/log]"
1007905-109 = "― [log=미사카]ちょっとは[wa:720]可愛く見えてきた[wa:1740]ような……[/log]"
1007905-112 = "[wa:500]― [log=미사카]結局、[wa:970]これはブタなの……？[/log]"
1007905-114 = "― [log=미사카]それともカバ？[/log]"
1007905-117 = "― [log=미사카]……えっ、[wa:200]鳥！？[wa:810]嘘でしょ！？[/log]"
1007905-120 = "[ns17] \"流石にブタやカバには見えないような……。\"\n[ns18] \"ここにクチバシと翼があってね……\""
1007905-124 = "[wa:500]― [log=미사카]そ、[wa:560]それはそうだけど……[/log]"
1007905-126 = "― [log=미사카]あはは……[wa:1500]ま、[wa:730]どっちでもいいわ。[/log]"
1007905-129 = "[wa:500]― [log=미사카]というか、[wa:1300]よく考えたら……[/log]"
1007905-131 = "― [log=미사카]これ、[wa:610]先生からの[wa:1010]プレゼントなのよね。[/log]"
1007905-134 = "[wa:800]― [log=미사카]……[wa:700]大切にするわ。[/log]"
1007905-136 = "― [log=미사카]ありがとう、[wa:340]先生。[/log]"
1007905-139 = "（こうして、御坂にぬいぐるみをプレゼントしたところ……）"
1007905-140 = "（ゲームセンターを出てからも、不思議そうな表情で見つめていた）"
