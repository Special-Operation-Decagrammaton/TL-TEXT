1007905-21 = "[ns3] \"Oh~ \"\n[ns4] \"As pessoas que o veem pela primeira vez podem reagir da mesma forma. \"\"\n[ns4]\"\"\n1007905-24 = \"Hmm?\"\n1007905-25 = \"Esse é o tipo de design de que você está falando? #n...... Ho, realmente?\"\n1007905-26 = \"Ele é um pouco ...... único em seu design, em muitos aspectos.\"\n1007905-27 = \"...... O que, existem outros tipos? O companheiro desse cara é ......?\"\n1007905-28 = \"Vejamos: ......\"\n1007905-35 = \"Ho, você está realmente aqui. Ha, ha: ......\"\n1007905-36 = \"...... O quê, ainda está lá?\"\n1007905-37 = \"Se você for à rua comercial, poderá ver mais: ......?\"\n1007905-38 = \"Um personagem razoavelmente conhecido em Kivothos é uma piada do ......! #nVocê deve estar confundindo-o com outra coisa.\"\n1007905-39 = \"Bem, sim, estou vendo. Hmmm. ......\"\n1007905-40 = \"...... Sensei.\"\n1007905-41 = \"Pela primeira vez desde que cheguei aqui, sinto que estou em outro mundo.\"\n1007905-42 = \"[s5] \"Eu nunca vi você parecer tão surpreso. \"\n[s6] \"Então, isso é muito ......? \"\n1007905-45 = \"...... O mundo é um lugar grande.\"\n1007905-46 = \"E é engraçado que eu seja o único a dizer o que está acontecendo aqui: ......\"\n1007905-47 = \"O quê, não?\"\n1007905-48 = \"...... Oh, ela é uma personagem bastante agradável.\"\n1007905-49 = \"Estou vendo: ......\"\n1007905-50 = \"[s7] \"As pessoas que gostam disso são classificadas como um pouco exigentes. \"\n[s8] \"Há um certo número de pessoas que são negativas. \"\"\n1007905-53 = \"Entendo. ...... Gosta de coisas, certo.\"\n1007905-54 = \"Hmmm. .............\"\n1007905-58 = \"[ns9] \"......Misaka? \"\n[ns10] \"What's wrong? \"\"}\"\n1007905-61 = \"Não, mais ou menos. ......\"\n1007905-62 = \"Hmmm, há uma sensação de déjà vu.\"\n1007905-63 = \"...... Oh, ok.\"\n1007905-64 = \"Gekota.\"\n1007905-65 = \"[s11] \"Gekota? \"\n[s12] \"Eu nunca ouvi esse nome antes. \"\n[s12]\""

