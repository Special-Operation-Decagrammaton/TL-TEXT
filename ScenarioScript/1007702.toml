[translation]
1007702-1 = "何事もほどほどが一番"
1007702-2 = "（シャーレの仕事でトリニティに向かうと……）"
1007702-3 = "（既に校門前でイチカが待っていた）"
1007702-4 = "…………。"
1007702-5 = "……あ。"
1007702-6 = "先生～！こっちっす、こっち。"
1007702-7 = "時間ピッタリっすね。#n忙しいって聞いてたので、もうちょっと遅いかと思ってたっす。"
1007702-8 = "[s1] \"ちゃんと約束した時間には行くよ。\"\n[s2] \"イチカを待たせるわけにはいかないからね。\""
1007702-11 = "はは、そんなに気を遣わなくても良かったんすけどね。"
1007702-12 = "でも、やっぱ嬉しいっす。#n先生が来てくれるって聞いて楽しみにしてたっすから。"
1007702-13 = "今日はツイてる日かも。"
1007702-14 = "……ん？"
1007702-15 = "普段はどんな仕事をしてるのか、って……？#nえーっと……"
1007702-16 = "学園外の人に会ったり、トラブルの仲裁をしたり……"
1007702-17 = "そんな感じで、主に警備と仲裁っすね。"
1007702-18 = "まあ、今回は人手が足りてたから、私が先生と一緒に仕事をすることになった感じっす。"
1007702-19 = "あ、念のため言っておきますが、嫌ってわけじゃないっすから！"
1007702-20 = "むしろ、個人的には助かったというか……"
1007702-21 = "殺伐とした雰囲気の中、仲裁のために立ち会ったり、トラブルに対処するのと比べたら、それはもう……"
1007702-22 = "結構あれってキツいんすよ……はは。"
1007702-23 = "[s3] \"そうだよね……\"\n[s4] \"すごく分かるよ。\""
1007702-26 = "あはは！結構マジトーンっすね。#n案外、似た者同士だったりして。"
1007702-27 = "でも、分かってくれて嬉しいっす。"
1007702-28 = "そういう事だから、ちょっと今日の段取りが悪くてもあまり気にしないでほしいっす。"
1007702-29 = "んじゃ、時間も時間なんでそろそろ行きましょっか。"
1007702-30 = "まずはこっちっす。"
1007702-36 = "もうすぐっす。この先の……"
1007702-37 = "……ん？"
1007702-39 = "ああん？ふざけてんのか？"
1007702-40 = "どら焼きは粒あんだろ！！"
1007702-41 = "はぁ！？#n粒あんとか歯に挟まるじゃねぇか！こしあんはなめらかで口溶けがいいんだよ！"
1007702-42 = "なっ、コイツ……！！"
1007702-43 = "やんのか！？#n粒あんになんか負けねぇぞ？"
1007702-45 = "はぁぁあああっ！？！？"
1007702-47 = "はぁ……小学生じゃないんすから……"
1007702-48 = "……ん？"
1007702-49 = "放置してて大丈夫なのかって……？"
1007702-50 = "……ああ、私が正義実現委員だからっすか？"
1007702-51 = "それは……そうっすが。"
1007702-52 = "んー、どうしましょっか……"
1007702-56 = "……ま、今はいいんじゃないすか？#n今日は先生を案内するのが仕事っすからね。"
1007702-57 = "銃撃戦を始めてるわけでもないんで、今すぐ仲裁に入る必要もないかなーって。#n余計なお節介かもしれませんし。"
1007702-58 = "何かあったら、他の正義実現委員が来るんで大丈夫っす。#n私は先生の仕事を手伝わないと。"
1007702-59 = "ああいうのにいちいち首を突っ込んでたら、先生の用事がいつまで経っても終わらないっすよ。本末転倒じゃないすか。"
1007702-60 = "[s5] \"こっちの予定まで考えてくれてありがとう。\"\n[s6] \"臨機応変だね。\""
1007702-63 = "まあ、うまく線引きができてるだけじゃないっすかね。#n何事もほどほどにって言うじゃないすか。"
1007702-64 = "……ん？"
1007702-65 = "あまり聞かない言葉……？#nああ、他の正義実現委員会のからってことっすか？"
1007702-66 = "たしかに他の皆は、真面目すぎるところもあるんで……"
1007702-67 = "なんとなく想像つくっす、ははは！"
1007702-68 = "……まあ私は、そういうところがカッコいいと思うっすけどね。"
1007702-69 = "いつもヘラヘラしているような私より、ずっと……"
1007702-70 = "……それじゃ、次の場所に出発っと！#nここでお喋りしてても、仕事は進まないっすから。"
1007702-71 = "ほら、行くっすよ、先生。"
1007702-76 = "（騒ぎが起きている場面に何度も遭遇したが、イチカは基本的にスルーしつつ、急ぎの対応が必要そうなところでは応援の連絡を入れていた）"
1007702-77 = "（おかげで、予定通り午後には仕事を終えられた）"
1007702-79 = "ふぅ……こんなところっすかね。"
1007702-80 = "お疲れ様でした、先生！#nなんだかんだ予定通りに終わって良かったっす。"
1007702-81 = "[s7] \"全部イチカのおかげだよ。\"\n[s8] \"今日は本当に助かったよ。\""
1007702-84 = "……私っすか？"
1007702-85 = "またまた～、そんなことを言って。"
1007702-86 = "私も、いつもと違って新鮮だったし楽しかったっす！#nこういう仕事なら、また喜んで受けたいっすね。"
1007702-87 = "……なんで、もし先生が良ければっすけど。"
1007702-88 = "またご一緒できたら嬉しいなー、なんて。はは。"
1007702-89 = "……って言っても、気を遣う必要はないっすからね。"
1007702-90 = "じゃ、送ってくっすよ。"
1007702-91 = "自分の仕事は……うーん、ま、その後でも大丈夫そうっすね。"
1007702-92 = "……ん？ "
1007702-93 = "仕事があったのか、って……？#nあ、別に大したことじゃないんすけど。"
1007702-94 = "いろんなところで騒ぎが起きてたアレっす。"
1007702-95 = "まあ一応、正義実現委員会のメンバーっすから、何か起きてないかくらいは確認しておこうかなと。"
1007702-96 = "先生の仕事を優先しただけで、最初から放置する気はなかったっすよ。"
1007702-97 = "……へ？"
1007702-98 = "一緒に行くんすか……？"
1007702-102 = "ん～、先生は忙しいんじゃ……？"
1007702-103 = "しかも、これは私の仕事っすよ……？"
1007702-104 = "[s9] \"生徒の仕事を手伝うのも、先生の役目だから。\"\n[s10] \"イチカの仕事が遅れた原因は、私に責任があるから。\""
1007702-107 = "そ、そうっすか……？#nんー、いや、なんか違う気がするような……"
1007702-108 = "「そっちの方が気が楽」……？#n先生がっすか？"
1007702-109 = "んー……ん～～～……"
1007702-110 = "…………。"
1007702-111 = "……はは。"
1007702-112 = "ま、そうっすね。#n先生がそこまで言ってくれるなら。"
1007702-113 = "個人的にも、なんかちょっと得した気分っす。"
1007702-114 = "……じゃ、行っちゃいますか！へへっ。"
1007702-115 = "その代わりに……と言っちゃアレなんすが……"
1007702-116 = "私の仕事が終わる頃には日が暮れてるでしょうから、先生を送らせてほしいっす。"
1007702-117 = "その方が……"
1007702-118 = "私の気も楽なんで。"
1007702-120 = "（イチカの仕事を終えてから、シャーレまで送ってもらった）"
