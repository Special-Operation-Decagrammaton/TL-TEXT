[translation]
10053040-1 = "Episódio 4; Estátua de pedra viva e em movimento"
10053040-4 = "Então... ha... o ar está tão bom! \r\n"
10053040-5 = "Hein, professora? Por que você está andando tão atrás de mim? \r\n"
10053040-6 = "[s1] \"Um pouco mais devagar...\"\r\n[s2] \"Minhas pernas...estão no limite...\""
10053040-9 = "Haha, é isso! Você tem que se exercitar regularmente, certo?\r\n\r\n"
10053040-14 = "Não, Konoka é anormal! \r\n"
10053040-15 = "Não importa quantas vezes eu ligue, não vai parar! !"
10053040-16 = "Parece que todo mundo está com falta de exercício... E o Diretor Mo? \r\n"
10053040-21 = "Huh...! Haaa...! \r\n"
10053040-22 = "Está um pouco abaixo. \r\n\r\n"
10053040-23 = "Mas suar faz você se sentir revigorado, certo?"
10053040-24 = "Haaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa...! \r\n"
10053040-25 = "Você nem tem forças para responder? Ahaha! \r\n"
10053040-26 = "Não é motivo de riso...! \r\n"
10053040-33 = "Ufa... finalmente... chegamos ao primeiro ponto... \r\n"
10053040-34 = "Este é realmente o destino? Nada? \r\n"
10053040-35 = "Ei, espere um minuto... vou recuperar o fôlego ――\r\n"
10053040-40 = "avivamento! #nEste é definitivamente o primeiro local a explorar o Monte. Shirakawa."
10053040-41 = "Claro que não há nada. #nSe for um lugar por onde passam pessoas, Tsuchinoko ou fugiu ou foi encontrado."
10053040-42 = "Bem... se você me perguntar, isso é verdade..."
10053040-46 = "...Ei, vou perguntar mais uma vez só para ter certeza."
10053040-47 = "Você vai mesmo vasculhar toda esta montanha? Por uma cobra gorda que nem sei se está aí?"
10053040-52 = "...nesta montanha..."
10053040-53 = "Se houver um Tsuchinoko. \r\n"
10053040-57 = "(30 minutos depois...)"
10053040-61 = "…………."
10053040-66 = "um pouco! Não é cedo para desistir! ?"
10053040-67 = "Acabei de ter um projeto extracorpóreo... Portanto... a existência de almas foi comprovada... Q.E.D."
10053040-68 = "Do que você está falando... \r\n"
10053040-69 = "A professora...?"
10053040-70 = "[ns5] \"O acúmulo de trabalho administrativo danificou meu corpo...!\"\r\n[ns6] (É como um cadáver sem respostas)"
10053040-73 = "Tenho pena dos dois.... \r\n"
10053040-74 = "...Por que você está sorrindo?"
10053040-75 = "Sim? Ele parecia assim? \r\n"
10053040-76 = "Eu estava fazendo isso. Os cantos de sua boca subiram até as orelhas."
10053040-77 = "Hmm... não, não é grande coisa."
10053040-78 = "É surpreendentemente divertido fazer algo juntos. \r\n\r\n"
10053040-79 = "……Concordo."
10053040-80 = "Oi, fiquei um pouco curioso..."
10053040-81 = "Tsubasa não participa das atividades do clube?"
10053040-82 = "Isso não lhe daria mais oportunidades de interagir com as pessoas?"
10053040-83 = "um……. \r\n\r\n"
10053040-87 = "Isso... o que você disse...? É um pouco difícil de explicar para quem está de fora. \r\n"
10053040-88 = "Eu estava lá. Mas... eu não pude continuar."
10053040-89 = "Bem, as atividades do nosso clube são――"
10053040-90 = "Foi descontinuado. Existem várias conquistas e coisas assim. \r\n"
10053040-91 = "……desculpe. \r\n"
10053040-92 = "Não, está tudo bem. Eu não me importo. Não é como se eu tivesse desistido ainda. \r\n"
10053040-93 = "Millennium é uma escola baseada no mérito. #nEntão, se conseguirmos encontrar Tsuchinoko, poderemos reanimar o clube com os resultados!"
10053040-94 = "Bem, eu não ouvi falar de nenhum caso de ser revivido... \r\n\r\n"
10053040-95 = "Por enquanto, vou cooperar. Eu não acho que exista nenhum Tsuchinoko."
10053040-96 = "Tudo bem, no entanto. Há valor em validar e negar até mesmo hipóteses incorretas."
10053040-97 = "...Mais importante, não consigo ver Konoka-kun."
10053040-98 = "Eu o vi fugindo gritando que havia encontrado alguma coisa. \r\n"
10053040-99 = "Vamos ver o que está acontecendo. Konoka-kun é o mais delicado entre nós."
10053040-100 = "...Você está falando sério?"
10053040-101 = "O que você quer dizer?"
10053040-103 = "Uh, aaaaa...."
10053040-104 = "Qual é o atual grito de fraqueza...?"
10053040-105 = "Nunca pensei que algo iria acontecer com Konoka-kun...! ? Vamos nos apressar!"
10053040-109 = "Uau...! S-sensei... por favor me ajude...!"
10053040-110 = "[s7] \"Você está bem!?\"\n[s8] \"Seu rosto está pálido!\""
10053040-113 = "Bem... havia algo enterrado no chão... então eu desenterrei...!"
10053040-118 = "Eu fiz algo errado."
10053040-119 = "O que é isso! ? Parece ameaçador! ?"
10053040-120 = "Parece uma velha caixa de madeira. Não saberei o ano exato até investigar..."
10053040-121 = "O fato de o amuleto de papel estar intacto significa que provavelmente não é tão antigo."
10053040-122 = "Este não é o momento de analisar isso com calma! Isso é uma coisa real! ?"
10053040-126 = "O que você vai fazer? ? É seguro se eu preencher? ? Você quer cavar agora? ? \r\n\r\n"
10053040-127 = "Espere. Por que você não abre?"
10053040-129 = "Você pode abri-lo? ! ! ! \r\n\r\n\r\n"
10053040-134 = "Não, quero que você se acalme e ouça. #nEmbora tendam a ser enfatizadas na mídia como algo ruim, as notas são feitas para desejar felicidade. \r\n"
10053040-135 = "A questão é que, em muitos casos, é na verdade um amuleto da sorte."
10053040-136 = "Pelo menos este é diferente! ? Pelo que parece, é uma maldição! ?"
10053040-137 = "Ah, eu entendo! O diretor é do atributo água! ? #nÉ por isso que ele está tentando trazer o desastre para mim, que tenho um atributo de fogo!"
10053040-139 = "Eu também... gostaria de preencher se possível... \r\n"
10053040-140 = "Bem, não é como se eu acreditasse em maldições ou algo assim! #nMas é falta de etiqueta abrir algo que outra pessoa enterrou sem permissão! \r\n"
10053040-142 = "Hum... \r\n"
10053040-148 = "[ns9] \"Ah...\"\r\n[ns10] \"Eu abri...\""
10053040-154 = "Isto é... uma estátua de pedra? Parece uma boneca feita de pedra."
10053040-155 = "Algo realmente perigoso saiu! ?"
10053040-156 = "Não, é apenas uma boneca de pedra. Não tenha medo."
10053040-157 = "Uma boneca de pedra saiu de uma caixa embrulhada em notas! ? #nNeste ponto, não é \"só\" de jeito nenhum! !"

10053040-162 = "Tudo bem. Infelizmente, isso é uma farsa. \r\n"
10053040-163 = "falso? \r\n"
10053040-168 = "ah. Em primeiro lugar, definitivamente não é uma pedra. É muito leve para uma pedra e a textura da superfície é muito uniforme."
10053040-169 = "Provavelmente é plástico... é uma imitação feita de resina misturada com pó de pedra. #nEm outras palavras, há uma grande probabilidade de que seja um item produzido em massa e não um item artesanal."
10053040-170 = "A caixa, por outro lado, é de madeira e um tanto antiga. #nProvavelmente é um truque para fazer o conteúdo parecer real. \r\n\r\n"
10053040-176 = "Quem poderia fazer uma pegadinha tão elaborada...? \r\n"
10053040-178 = "Surpreendentemente, há muitas pessoas que preparam esse tipo de coisa."
10053040-179 = "Material de vídeo, jogos de RA, marketing barulhento... os motivos são vários."
10053040-180 = "Parece que há casos em que as pessoas só querem surpreender quem o encontrou, e isso é de mau gosto. \r\n"
10053040-181 = "Isso é algo que encontro frequentemente ao explorar ruínas."
10053040-187 = "Ver! Afinal, não foi grande coisa, certo? #nEi, sensei! \r\n"
10053040-188 = "[s11] \"Oh, não acene para mim...\"\r\n[s12] \"Mas estou feliz que seja falso. Agora Konoka pode se sentir à vontade――\""
10053040-195 = "Eu vou cavar! Buraco! \r\n"
10053040-197 = "……dentes? \r\n\r\n"
10053040-199 = "Mesmo que seja apenas uma brincadeira, desde que esteja cheio de intenções maliciosas, ainda é algo sinistro!"
10053040-200 = "Portanto, certifique-se de que nada aconteça! #nVou selá-lo em uma profundidade que ninguém poderá desenterrar! ! \r\n"
10053040-201 = "Em teoria faz sentido, mas... se vamos reduzir o número de vítimas, seria melhor que o recolhêssemos..."
10053040-202 = "Não! ! Essa coisa não deveria ter caído no chão! ! \r\n"
10053040-203 = "É por isso que vou enterrá-lo nas profundezas da terra! !"
10053040-205 = "Ei, pegue uma pá! ! ! Começar! ! ! \r\n\r\n"
10053040-207 = "Eh! ?"
10053040-208 = "...Espere um minuto! ? \r\n\r\n"
10053040-217 = "Ufa! Selo concluído! ! O assunto está resolvido agora! \r\n\r\n"
10053040-218 = "Nossa, me senti revigorado! Sinta-se leve na mente e no corpo! Ahahaha!"
10053040-223 = "Suspiro…suspiro…. Essa criança não é incansável...? \r\n"
10053040-224 = "…………. \r\n"
10053040-229 = "Ele não cavou cerca de 10 metros sozinho...?"
10053040-230 = "A última vez que medi, eram 8 metros... \r\n"
10053040-232 = "Uau, isso é um exagero."
10053040-233 = "Mesmo que eu estivesse apenas brincando um pouco."
10053040-234 = "Não diga isso como uma caixa de areia em um parque..."
10053040-235 = "Ei, todas as Valquírias são assim?"
10053040-236 = "Não, não, ainda tenho um longo caminho a percorrer! A irmã mais velha de Kanna é ainda mais incrível. \r\n"
10053040-241 = "……. \r\n\r\n"
10053040-242 = "Vou viver uma vida boa."
10053040-243 = "...Mesmo."
10053040-248 = "Bem, já era hora..."
10053040-252 = "Você quer descer? \r\n"
10053040-253 = "[s13] \"Viva!!!\"\r\n[s14] \"A busca por Tsuchinoko acabou?\""
10053040-254 = "Não parece que eu a forcei aqui?"
10053040-255 = "Bem, tirar as pessoas é meu verdadeiro trabalho, haha! \r\n\r\n"
10053040-259 = "Ainda falta muito tempo e já é noite."
10053040-260 = "Ou melhor... depois de ver algo assim, ainda não tenho vontade de procurar... \r\n\r\n"
10053040-265 = "Suspiro... finalmente terminou. \r\n\r\n"
10053040-266 = "...Trabalhei tanto e não obtive nenhum resultado."
10053040-267 = "Se você conseguir encontrá-lo em um dia, não será chamado de criatura lendária."
10053040-268 = "Isso pode ser verdade."
10053040-276 = "Huh?"
10053040-277 = "Agora...alguma coisa se moveu nos arbustos? animal……?"
10053040-281 = "...! ! ! \r\n"
10053040-282 = "Kaaaaaaaaaaaaaaaa! ! ! !"
10053040-286 = "[ns15] \"Lena!?\"\r\n[ns16] Veja para onde Lena estava olhando."
10053040-290 = "(A estátua de pedra que deveria estar enterrada ali estava olhando para nós por entre as árvores...!)"
10053040-291 = "None"
10053040-292 = "(E por alguma razão, estava mais sujo do que quando o vi pela primeira vez... e parecia extremamente cansado.)"
10053040-293 = "Sensei, o que você está fazendo?"
10053040-297 = "(Quando desviei o olhar, a estátua de pedra havia desaparecido.)"
10053040-298 = "(...sinto que ganhei alguns ressentimentos estranhos.)"
