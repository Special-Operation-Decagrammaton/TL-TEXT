[translation]
10053040-1 = "第4話;生きて動く石像"
10053040-4 = "すー……はー……、空気うまっ！\r\n"
10053040-5 = "あれ、先生？なんでそんな後ろのほう歩いてるんすか？\r\n"
10053040-6 = "[s1] \"もう少し、ゆっくり……。\"\r\n[s2] \"もう……足が……限界で……。\""
10053040-9 = "ははっ、なんすかそれ！普段から運動しとかないとダメっすよ?\r\n\r\n"
10053040-14 = "いや、コノカが異常なの！\r\n"
10053040-15 = "いくら呼んでも止まらないし！！"
10053040-16 = "みんな運動不足だなぁ……モー所長は？\r\n"
10053040-21 = "はぁっ……！はぁぁぁ……！\r\n"
10053040-22 = "ダウンぎりぎりだねぇ。\r\n\r\n"
10053040-23 = "でも汗かくとスッキリするでしょ？"
10053040-24 = "はぁ……っ、ふはぁ……っ……！\r\n"
10053040-25 = "返事する体力も残ってないか！あははっ！\r\n"
10053040-26 = "笑いごとじゃないでしょ……！\r\n"
10053040-33 = "ふぅ……ようやく……第1ポイントに到着……。\r\n"
10053040-34 = "ほんとにここが目的地なの？何にもないけど？\r\n"
10053040-35 = "ちょ、ちょっと待って……呼吸を整えるから――\r\n"
10053040-40 = "復活！#nここが白川山の最初の探索スポットで間違いない。"
10053040-41 = "何もないのは当然だ。#n人が通る場所なら、ツチノコは逃げているか、もう見つかっているよ。"
10053040-42 = "まぁ……言われてみればそうだけど……。"
10053040-46 = "……ねぇ、念のためにもう1回だけ聞くけど。"
10053040-47 = "本気でこの山を全部探すつもり？いるかどうかも分かんない、太ったヘビのために？"
10053040-52 = "……この山に――"
10053040-53 = "ツチノコがいるというのなら。\r\n"
10053040-57 = "（30分後……）"
10053040-61 = "…………。"
10053040-66 = "ちょっと！ギブアップ早くない！？"
10053040-67 = "たった今……幽体離脱した……ゆえに……魂の存在は証明された……Q.E.D."
10053040-68 = "なに言ってるの……。\r\n"
10053040-69 = "先生は……？"
10053040-70 = "[ns5] \"デスクワークの蓄積で身体が……！\"\r\n[ns6] （返事がないただの屍のようだ）"
10053040-73 = "2人とも情けない……。\r\n"
10053040-74 = "……なんでニヤニヤしてんの？"
10053040-75 = "うん？そんな顔をしていたかね？\r\n"
10053040-76 = "してた。口角が耳まで上がってた。"
10053040-77 = "ふむ……いやなに、別に大したことではないんだ。"
10053040-78 = "みんなで何かするというのは存外に楽しいんだなって。\r\n\r\n"
10053040-79 = "……そうだね。"
10053040-80 = "ねぇ、ちょっと気になったんだけど……。"
10053040-81 = "ツバサって部活には入らないの？"
10053040-82 = "そうすれば人と関わる機会も増えるんじゃない？"
10053040-83 = "あ……。\r\n\r\n"
10053040-87 = "その……なんと言ったものか……。部外者に説明するには少々厄介なんだ。\r\n"
10053040-88 = "入ってはいたんだ。だが……続けられなくなってしまってね。"
10053040-89 = "その、うちの部活は――"
10053040-90 = "廃部になったのだよ。実績とか、色々あってな。\r\n"
10053040-91 = "……ごめん。\r\n"
10053040-92 = "いや、いいんだ。別に構わない。まだ諦めたわけじゃないからな。\r\n"
10053040-93 = "ミレニアムは成果主義の学園だ。#nだから、もしもツチノコを発見できれば、その成果で部を復活できるかもしれない！"
10053040-94 = "まぁ、復活した例は聞いたことがないけど……。\r\n\r\n"
10053040-95 = "とりあえず、協力はするよ。ツチノコは多分いないと思うけど。"
10053040-96 = "それでもいいさ。間違った仮説も、検証して否定することに価値があるからね。"
10053040-97 = "……それより、コノカ君の姿が見えないようだが。"
10053040-98 = "さっき、何か見つけた～とかって叫びながら走っていくのは見たよ。\r\n"
10053040-99 = "様子を見に行こう。コノカ君は我々の中で一番華奢だからね。"
10053040-100 = "……本気で言ってる？"
10053040-101 = "どういう意味かね？"
10053040-103 = "う、うあああ……。"
10053040-104 = "今の脱力系の悲鳴は何……？"
10053040-105 = "まさかコノカ君に何か……！？急ごう！"
10053040-109 = "う、うわぁぁ……！せ、先生……助けて……！"
10053040-110 = "[s7] \"大丈夫！？\"\n[s8] \"顔が真っ青だよ！\""
10053040-113 = "そ、それが……地面に何か埋まってたんで……掘ってみたら……！"
10053040-118 = "やらかしたっす。"
10053040-119 = "なにこれ！？見るからに不吉そうなんだけど！？"
10053040-120 = "古い木箱のようだね。正確な年代は調べてみないと分からないが……。"
10053040-121 = "紙素材の護符が無事だということは、そこまで古くない可能性が高い。"
10053040-122 = "冷静に分析してる場合じゃないって！これ、マジのやつでしょ！？"
10053040-126 = "ど、どどどどうします！？埋め戻したらセーフっすかね！？今すぐ掘りますか！？\r\n\r\n"
10053040-127 = "待て。開けてみないのか？"
10053040-129 = "開けるか！！！！\r\n\r\n\r\n"
10053040-134 = "いや、落ち着いて聞いてほしい。#n悪いものとしてメディアで強調されがちだが、そもそもお札というのは幸せを願って作られるものだ。\r\n"
10053040-135 = "要は、むしろ縁起物である場合のほうが多い。"
10053040-136 = "少なくともコイツは違うだろ！？見た目からして呪いだろ！？"
10053040-137 = "あっ、分かった！所長は水属性なんだな！？#nだから火属性のあたしに災いを呼び込もうとしてるんだ！"
10053040-139 = "わ、私も……できれば埋め戻したい派かな……。\r\n"
10053040-140 = "べ、別に呪いとか信じてるわけじゃないけど！#nでも、誰かが埋めたものを勝手に開けるのは、礼儀としてダメでしょ！\r\n"
10053040-142 = "ふむ……。\r\n"
10053040-148 = "[ns9] \"あ……。\"\r\n[ns10] \"開けちゃった……。\""
10053040-154 = "これは……石像？石でできた人形のようだ。"
10053040-155 = "本当にヤバいの出てきたじゃん！？"
10053040-156 = "いや、ただの石の人形だ。怖がることはない。"
10053040-157 = "お札でぐるぐる巻きの箱から石人形が出てきたんだよ！？#nこの時点で全然「ただの」じゃないから！！"
10053040-162 = "大丈夫だ。残念だが、これは偽物だよ。\r\n"
10053040-163 = "偽物？\r\n"
10053040-168 = "ああ。まず間違いなく石じゃない。石の割に軽すぎるし、表面の質感が均一すぎる。"
10053040-169 = "おそらくプラスチック……レジンに石粉を混ぜて作った模倣品だね。#nつまり、工芸品ではなく高い確率で量産品だ。"
10053040-170 = "それに対して箱は木製で、ある程度古い。#nおおかた、中身を本物らしく見せるための工作だろう。\r\n\r\n"
10053040-176 = "そんな手の込んだイタズラ、一体誰が……。\r\n"
10053040-178 = "それが案外、この手の仕込みモノは多い方なんだ。"
10053040-179 = "映像のネタ、ARゲーム、ノイズマーケティング……理由は様々だがね。"
10053040-180 = "見つけた人を驚かせたいだけ、なんて悪趣味なケースもあるようだ。\r\n"
10053040-181 = "廃墟探索をしていると、よく出くわすものさ。"
10053040-187 = "ほらね！やっぱ大したものじゃなかったでしょ？#nねぇ、先生！\r\n"
10053040-188 = "[s11] \"わ、私に振らないでよぉ……。\"\r\n[s12] \"でも、偽物で良かった。これでコノカも安心――\""
10053040-195 = "掘ります！穴を！\r\n"
10053040-197 = "……は？\r\n\r\n"
10053040-199 = "たとえイタズラだとしても、悪意がこもってる以上は不吉なものに変わりない！"
10053040-200 = "だから万が一も無いように確実に！#n誰にも掘り返せない深さに封印してやる！！\r\n"
10053040-201 = "理屈としては一理あるが……被害者を減らすのなら、我々が回収した方が――"
10053040-202 = "いいや！！これは地上に出ちゃいけないものだったんだ！！\r\n"
10053040-203 = "だから地の底まで埋めてやるんだよ！！"
10053040-205 = "ほら、スコップ持って！！！始め！！！\r\n\r\n"
10053040-207 = "えぇっ！？"
10053040-208 = "……ちょ、ちょっと！？\r\n\r\n"
10053040-217 = "ふぅ！封印完了！！これで一件落着っすね！\r\n\r\n"
10053040-218 = "いや～スッキリした！心も体も軽い！あはははっ！"
10053040-223 = "はぁ……はぁ……。あの子、疲れ知らずなの……？\r\n"
10053040-224 = "…………。\r\n"
10053040-229 = "1人で10メートルくらい掘ってなかった……？"
10053040-230 = "最後に測った時点では、8メートルだった……。\r\n"
10053040-232 = "え～、大げさだって。"
10053040-233 = "ちょっと土いじったくらいだってのに。"
10053040-234 = "公園の砂場みたいに言わないで……。"
10053040-235 = "ねぇ、ヴァルキューレって全員こんな感じなの？"
10053040-236 = "いやいや、あたしなんてまだまだ！カンナの姉御はもっとすごいんだから。\r\n"
10053040-241 = "……。\r\n\r\n"
10053040-242 = "私、善良に生きよう。"
10053040-243 = "……同じく。"
10053040-248 = "さてと、そろそろ――"
10053040-252 = "下山しますか？\r\n"
10053040-253 = "[s13] \"万歳！！！！\"\r\n[s14] \"ツチノコ探しはもう終わり？\""
10053040-254 = "あたしが無理やり連れてきたみたいな言い方じゃないっすか。"
10053040-255 = "まぁ、人を連行するのは本業っすけどね、あははっ！\r\n\r\n"
10053040-259 = "日数にはまだ余裕ありますし、もう夕方っすから。"
10053040-260 = "というか……あんなもん見た後に、まだ探す気にはなれないっすよ……。\r\n\r\n"
10053040-265 = "はぁ……やっと終わった。\r\n\r\n"
10053040-266 = "……これだけ苦労して成果ゼロかぁ。"
10053040-267 = "1日で見つかるなら伝説の生物などと呼ばれはしないさ。"
10053040-268 = "それは……そうかもだけど。"
10053040-276 = "あれ？"
10053040-277 = "今……茂みで何か動かなかった？動物……？"
10053040-281 = "……！！！\r\n"
10053040-282 = "きゃあああああああっ！！！！"
10053040-286 = "[ns15] \"レナ！？\"\r\n[ns16] レナの見ていた場所を見る。"
10053040-290 = "（確かに埋めたはずの石像が、木の間からこちらを見ていた……！）"
10053040-291 = "（…………）"
10053040-292 = "（しかも何だか、最初に見たときより汚れていて……やけに疲れているようにも見えた）"
10053040-293 = "先生～何してるんすか～？"
10053040-297 = "（目をそらした隙に、石像は消えていた）"
10053040-298 = "（……なんだか、変な恨みを買ってしまった気がする）"
