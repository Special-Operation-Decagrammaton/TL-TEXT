[translation]
2005705-1 = "Lado a lado"
2005705-6 = "（Cheguei ao local de encontro com a Akane）"
2005705-7 = "（Era uma sala de aula vazia, onde não se sentia a presença de ninguém）"
2005705-12 = "――Quem sou eu?"
2005705-13 = "[s] \"！？！？！？\""
2005705-15 = "[ns] \"A-Akane!!??\""
2005705-16 = "Fufu, resposta correta♪"
2005705-19 = "Seja bem-vindo, Sensei. Eu estava à sua espera."
2005705-20 = "Ora, ora... parece que te assustei bastante. #nPeço perdão."
2005705-21 = "[s1] \"Está tudo bem.\"\n[s2] \"A propósito, onde estamos?\""
2005705-24 = "Ah, esta sala de aula é..."
2005705-25 = "...Fufu."
2005705-26 = "Reservei-a por cerca de duas horas, então―― ninguém virá."
2005705-27 = "Por que está tão confuso assim...?"
2005705-28 = "Será que você não confia em mim?"
2005705-29 = "[s] \"Não é isso! Não é que eu não confie em você...!\""
2005705-30 = "Nesse caso―― não há problema, certo?"
2005705-36 = "Eu também... confio no Sensei mais do que em qualquer outra pessoa."
2005705-37 = "（Diante da voz suave e irrefutável da Akane, só pude concordar...）"
2005705-40 = "Eu chamei o Sensei aqui porque..."
2005705-41 = "Queria mostrar a você como mudei graças aos seus ensinamentos da última vez."
2005705-42 = "Mas achei que apenas dizer com palavras não seria suficiente para expressar... #nEntão, pensei em te contar de uma forma um pouco especial."
2005705-43 = "[s3] \"Nesse caso, seria melhor não estarmos sozinhos em uma sala de aula...\"\n[s4] \"Acho que não tem problema, não é?\""
2005705-46 = "Por isso, pensei no seguinte."
2005705-47 = "Como diz o ditado, ver para crer, não é?"
2005705-48 = "Então, decidi mostrar diretamente ao Sensei."
2005705-49 = "O método é――"
2005705-50 = "Fufu."
2005705-54 = "Sensei..."
2005705-55 = "De agora em diante, nós somos――"
2005705-56 = "Colegas de classe."
2005705-60 = "[ns] \"！？！？！！！！！\""
2005705-63 = "（E assim, acabei entrando na brincadeira de \"colegas de classe (?)\" com a Akane）"
2005705-64 = "（Enquanto me perguntava se essa era a forma correta de interagir com uma aluna――）"
2005705-69 = "Quem é?"
2005705-70 = "[s] \"Akane...?\""
2005705-71 = "Fufu, acertou."
2005705-76 = "O que houve?"
2005705-77 = "[USERNAME]?"
2005705-78 = "Ah, os óculos?"
2005705-79 = "Eu só quis mudar um pouco o visual..."
2005705-80 = "[USERNAME], você preferia quando eu estava de óculos? #nE olha que me esforcei para colocar lentes. Que pena."
2005705-81 = "[s] \"Não é isso.\""
2005705-82 = "Fufu. Que bom."
2005705-83 = "Falando nisso, agora há pouco――"
2005705-86 = "（Akane continuou a conversa alegremente）"
2005705-87 = "（Ao conversar, senti como se realmente tivesse me tornado colega de classe da Akane）"
2005705-90 = "...Se podemos interagir assim, você se pergunta por que não fizemos isso antes?"
2005705-91 = "..."
2005705-92 = "Eu, mesmo agora, não tenho tanta confiança assim."
2005705-93 = "Até mesmo a forma como estou me apresentando para você agora, [USERNAME], sinto que é uma versão de mim que estou interpretando."
2005705-94 = "……Acho que interpretar a pessoa que queremos mostrar é algo natural. #nMas――"
2005705-95 = "Eu acho que, provavelmente…… estou com medo."
2005705-96 = "[s] \"Medo de que todos descubram quem você realmente é?\""
2005705-97 = "É parecido, mas…… acho que é um pouco diferente."
2005705-102 = "……Quem eu sou de verdade. #nO que me dá medo é que todos descubram que \"nem eu mesma sei quem eu sou\"."
2005705-103 = "Acho que consigo atender às expectativas dos outros."
2005705-104 = "Mas, por mais que eu tente descobrir que tipo de pessoa eu sou, não consigo enxergar nada."
2005705-107 = "Acho que consigo ler o ambiente e conversar. #nComo escolher as palavras certas para não deixar a pessoa desconfortável, coisas assim."
2005705-108 = "……Até porque, como empregada, isso é indispensável."
2005705-109 = "Mas isso é o que a outra pessoa deseja, não é como se eu estivesse mostrando o meu interior, certo?"
2005705-110 = "……Nem eu mesma sei direito o que existe dentro de mim."
2005705-111 = "Por isso acho que sou vazia. Não importa o quanto eu converse ou as palavras adequadas que eu diga."
2005705-112 = "……Não consigo avançar além disso."
2005705-113 = "Eu sei que sou eu mesma quem cria essa parede invisível…… #nMas não sei como quebrá-la."
2005705-114 = "Como você disse, [USERNAME], tentei me aproximar aos poucos. #nSinto que estou mudando um pouco por causa disso."
2005705-115 = "Mas às vezes penso que isso é apenas um paliativo."
2005705-119 = "……Desculpe. Mesmo depois de você ter me ouvido."
2005705-120 = "Você pensou em tudo comigo, e eu só consigo dizer essas coisas."
2005705-122 = "……Tudo acabou sendo em vão."
2005705-126 = "Por que será que as coisas ficam assim……?"
2005705-129 = "[ns] \"Obrigado por conversar comigo sobre isso.\""
2005705-130 = "……Sim."
2005705-131 = "Porque……"
2005705-132 = "……Você é especial, [USERNAME]."
2005705-133 = "Uma das poucas pessoas para quem posso abrir meu coração――"
2005705-134 = "Não, talvez a única……"
2005705-135 = "Pessoa, então……"
2005705-136 = "[s5] \"Sim. Seria bom se, aos poucos, você pudesse aumentar o número de pessoas como eu.\"\n[s6] \"Claro que vai levar tempo e será difícil.\"\n[s7] \"Além disso, eu também não tenho certeza se consigo responder às suas preocupações com confiança, Akane.\""
2005705-140 = "……Você também, [USERNAME]……?"
2005705-141 = "……"
2005705-142 = "Entendo……"
2005705-143 = "Então, você também não tem alguém com quem possa conversar de igual para igual――"
2005705-144 = "[s] \"Fico muito feliz que a Akane tenha se aberto comigo dessa forma.\""
2005705-145 = "……"
2005705-146 = "Fufu."
2005705-147 = "Sabe, às vezes eu penso."
2005705-148 = "Como seria se tivéssemos nos conhecido de outra forma, em outro momento, com outra relação."
2005705-149 = "Se fosse assim―― como teríamos passado nosso tempo?"
2005705-150 = "[s] \"Não é diferente agora?\""
2005705-151 = "Fufu."
2005705-152 = "É verdade, sim. #nCom certeza, agora é assim."
2005705-153 = "……"
2005705-154 = "Ei…… [USERNAME]."
2005705-155 = "[s] \"O que foi?\""
2005705-156 = "Fique aí, tá?"
2005705-160 = "(No momento em que tentei perguntar o porquê――)"
2005705-164 = "Ei! ♪"
2005705-165 = "[ns] \"!!??!!!!!!???\""
2005705-166 = "(Todos os meus sentidos são preenchidos pela Akane――)"
2005705-167 = "Psiu."
2005705-168 = "Não faça muito barulho. #nPodem acabar nos ouvindo."
2005705-172 = "……Obrigada, [USERNAME]."
2005705-173 = "Por ter dito isso――"
2005705-174 = "E por ter me ouvido esse tempo todo."
2005705-175 = "Fiquei realmente feliz."
2005705-176 = "Sim…… sinto isso do fundo do meu coração."
2005705-178 = "……."
2005705-179 = "[s] \"……。\""
2005705-180 = "Olá, Sensei."
2005705-181 = "[s] \"Ah, Akane.\""
2005705-184 = "[wa:350]― [log=아카네 교복]Fufu.[/log]"
2005705-187 = "― [log=아카네 교복]É mais...[/log]"
2005705-189 = "― [log=아카네 교복]embaraçoso do que eu pensava.[/log]"
2005705-192 = "[wa:1530]― [log=아카네 교복]Ser honesta[wa:2200] comigo mesma...[/log]"
2005705-194 = "― [log=아카네 교복]É uma sensação à qual[wa:1100] não estou acostumada.[/log]"
2005705-197 = "[ns] \"B-bem, é a primeira vez, então...?\""
2005705-198 = "[wa:520]― [log=아카네 교복]Sim, [wa:1330] como você disse.[/log]"
2005705-201 = "― [log=아카네 교복]Para mim,[/log]"
2005705-203 = "― [log=아카네 교복]acho que era algo necessário.[/log]"
2005705-206 = "[wa:530]― [log=아카네 교복]Eu acabei[wa:1630] causando[wa:900] muitos problemas ao Sensei.[/log]"
2005705-209 = "― [log=아카네 교복]Ainda assim, [wa:1910] ter conhecido você[wa:3240] foi, sem dúvida――[/log]"
2005705-212 = "― [log=아카네 교복]Sim, [wa:1240] considero que[wa:1550] tive muita sorte.[/log]"
2005705-215 = "[wa:1850]― [log=아카네 교복]Tudo flui,[/log]"
2005705-217 = "― [log=아카네 교복]e eventualmente[wa:360] será esquecido.[/log]"
2005705-220 = "― [log=아카네 교복]Até mesmo este[wa:810] momento, [wa:2830] um dia...[/log]"
2005705-223 = "[wa:1700]― [log=아카네 교복]Mas, [wa:1550] eu me lembrarei.[/log]"
2005705-225 = "― [log=아카네 교복]Mesmo que[wa:530] o Sensei[wa:470] acabe esquecendo.[/log]"
2005705-228 = "― [log=아카네 교복]Pois as coisas realmente importantes,[/log]"
2005705-230 = "― [log=아카네 교복]jamais se perdem.[/log]"
2005705-233 = "(Assim como quando entrei na sala de aula)"
2005705-234 = "(Akane havia desaparecido, como se nunca tivesse estado ali desde o início)"
2005705-235 = "(Cheguei a pensar se tudo não teria sido apenas um sonho)"
2005705-236 = "(Mas o que Akane deixou para trás dizia, em silêncio, que não foi o caso...)"
