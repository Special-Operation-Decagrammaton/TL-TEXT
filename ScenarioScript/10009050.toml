[translation]
10009050-1 = "第5話;襲撃その五"
10009050-3 = "（セナと一緒にパトロールを始め、る前に……）"
10009050-4 = "先生、どうかされましたか？"
10009050-5 = "[s] \"……ごめん、気にしないで。連絡が来るかなって思ったんだけど。\""
10009050-6 = "そうでしたか。"
10009050-10 = "（予想が外れて深く息を吸いつつ、パトロールを再開しようとしたその時――）"
10009050-11 = "おっと、シャーレの先生じゃないか。今回はどうしたんだい？"
10009050-12 = "[s] \"パトロールでこの辺りを回ってまして。\""
10009050-13 = "へぇ、バレンタインだからってことかい？それに生徒さんも一緒か、お疲れさん！"
10009050-14 = "丁度良いな、今朝良いもんが入ってよ。"
10009050-15 = "ほら、持ってきな！いつもお疲れってことで！"
10009050-22 = "[ns] \"あ、ありがとうございます……！\""
10009050-23 = "へっ、礼を言うのはこっちの方さ。いつもあんがとな、これからも頼むぜ！"
10009050-26 = "（その後も、街のあちこちで色んな方と出会い……）"
10009050-28 = "おや、シャーレの[USERNAME]先生じゃないですか？"
10009050-29 = "パトロール？"
10009050-30 = "ははっ、今日もお仕事ですか。"
10009050-31 = "おや、生徒さんも一緒に。お疲れ様。これ新作のアップルチョコなんですが、持っていきませんか？"
10009050-32 = "おっ、先生じゃないすか！"
10009050-33 = "これうちの新商品なんすよ、ほいっ！"
10009050-34 = "先生！よろしければこれ私たちから……！"
10009050-35 = "おお先生！"
10009050-36 = "先生っ！"
10009050-38 = "（あちこちで色々な物を貰いながら回り続け、休憩と整理を兼ねて公園のベンチで休むことにした）"
10009050-41 = "すごい量ですね。"
10009050-42 = "[s] \"申し訳ないくらい、たくさん貰っちゃった……。\""
10009050-43 = "そう思う必要は無いかと思いますよ、住民の皆さんの心遣いなのですから。"
10009050-44 = "私が言うのも何ですが……住民の方々もそうですし、色んな学校の生徒たちが先生には感謝しています。様々な側面でお世話になっていますから。"
10009050-45 = "私もそうです。その気持ちは、十分に理解できます。"
10009050-46 = "[s] \"そんなに大したことはしてないけどね……。\""
10009050-47 = "……確かに先生の行いは、派手なものではないかもしれません。"
10009050-48 = "ですが問題児への対処、街の細かな問題解決。"
10009050-49 = "生徒たちの相談に乗ったり、アドバイスをしたり。"
10009050-50 = "それだけではなく、ただ会いに来てくれること、話を聞いてくれること……。"
10009050-51 = "たとえ、シャーレが元々そのような目的で作られたものだとしても。"
10009050-52 = "それでもその目的以上に、先生が日々色んな事をしてくれて、みんな感謝しているのです。"
10009050-53 = "私を含め、みんなが。"
10009050-57 = "たまたま今日のイベントに合わせて、それが形になったというだけでしょう。先生がいなかったら今日の各所のイベントもきっと、これどころではないほどに混乱していたかと。"
10009050-58 = "[s] \"何だか照れちゃうね。\""
10009050-59 = "……みんな、楽しそうな顔をしていました。"
10009050-60 = "チョコレートなどのお菓子を売ったり、交換したり。普段感謝している人たちに、プレゼントをする……。"
10009050-61 = "バレンタインデーは、そんな光景が見られる日です。"
10009050-62 = "ですが……。"
10009050-63 = "[s] \"……？\""
10009050-64 = "「災厄の狐」、ワカモ……"
10009050-65 = "彼女は何かを狙って、このイベントを荒らしています。少なくとも、そのように見えます。"
10009050-66 = "……一体、何を狙っているのでしょうか？"
10009050-67 = "[s] \"うーん……。\""
10009050-68 = "これまでの何回かの襲撃を見る限り、戦闘の中で彼女は明らかに先生を狙っています。"
10009050-69 = "例えばですが……先生を襲うことで、シャーレの無力化を狙っていると考えることも可能です。"
10009050-70 = "しかし、そのために問題児たちを扇動し、ヴァルキューレの装備まで奪ってこんな大規模な戦闘を起こすのは非合理的です。"
10009050-71 = "もし先生を襲うことが目的なのであれば、そんなことをしていては警戒は強まる一方。もっと効率的で、確実な方法が幾らでもあるはず。"
10009050-72 = "[s] \"確かに……。\""
10009050-73 = "……こう言っては何ですが、彼女の襲撃から身を守るためであれば、先生は今すぐパトロールをやめてシャーレに戻るという手もあります。"
10009050-74 = "シャーレの防備を強化すれば、おそらく被害が及ぶことは無いでしょう。"
10009050-80 = "万が一のことを考えるなら、"
10009050-81 = "パトロール業務よりも先生は今すぐ――"
10009050-82 = "[s] \"それは無しかな。\""
10009050-83 = "……？"
10009050-84 = "[s1] \"生徒からの頼みごとだから。\"\n[s2] \"それに、さっきの街の光景を見たら尚更。\""
10009050-89 = "……今、自分自身だけの安全を考えることはできない、と。"
10009050-90 = "そうですか……ここは感銘を覚えるより、嘆くべきところなのかもしれませんが。"
10009050-91 = "承知しました。それでは万が一にも危険なことになってしまわないよう、私も全力でことに当たるとします。"
10009050-92 = "[s] \"ありがとう、セナ。\""
10009050-94 = "[s] \"あと、多分だけどワカモは……\""
10009050-101 = "先生、緊急事態！"
10009050-102 = "[s] \"うん、来るかなって思ってた。\""
