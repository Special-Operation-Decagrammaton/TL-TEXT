[translation]
10009050-1 = "Episódio 5; Ataque parte cinco"
10009050-3 = "（Antes de começar a patrulha com a Sena...）"
10009050-4 = "Sensei, aconteceu alguma coisa?"
10009050-5 = "[s] \"...Desculpe, não é nada. Só achei que talvez recebesse uma mensagem.\""
10009050-6 = "Entendo."
10009050-10 = "（Suspirando profundamente por minha previsão ter falhado, no momento em que ia retomar a patrulha—）"
10009050-11 = "Ora, se não é o Sensei do Schale. O que manda por aqui hoje?"
10009050-12 = "[s] \"Estamos fazendo uma patrulha pela área.\""
10009050-13 = "Ah, por causa do Dia dos Namorados, é? E com uma aluna junto, bom trabalho!"
10009050-14 = "Veio na hora certa, recebi umas coisas boas hoje de manhã."
10009050-15 = "Toma, pode levar! Pelo seu trabalho duro de sempre!"
10009050-22 = "[ns] \"Ah, muito obrigado...!\""
10009050-23 = "Heh, eu que agradeço. Valeu por tudo, continue assim!"
10009050-26 = "（Depois disso, continuamos encontrando várias pessoas pela cidade...）"
10009050-28 = "Ora, não é o Sensei [USERNAME] do Schale?"
10009050-29 = "Patrulhando?"
10009050-30 = "Haha, trabalhando hoje também, hein."
10009050-31 = "Ah, e com uma aluna também. Bom trabalho. Estes são chocolates de maçã novos, não quer levar um pouco?"
10009050-32 = "Opa, Sensei!"
10009050-33 = "Esse é o nosso novo produto, aqui, pegue!"
10009050-34 = "Sensei! Se não se importar, aceite isto de nós...!"
10009050-35 = "Ah, Sensei!"
10009050-36 = "Sensei!"
10009050-38 = "（Enquanto continuávamos a rodar, recebendo várias coisas por toda parte, decidimos descansar em um banco de praça para fazer uma pausa e organizar tudo）"
10009050-41 = "É uma quantidade impressionante."
10009050-42 = "[s] \"Até me sinto mal de ter recebido tanta coisa...\""
10009050-43 = "Não acho que precise se sentir assim, é um gesto de carinho dos moradores."
10009050-44 = "Embora eu mesma diga isso... tanto os moradores quanto as alunas de várias escolas são gratas ao Sensei. Você nos ajuda de tantas maneiras diferentes."
10009050-45 = "Eu também me sinto assim. Entendo perfeitamente esse sentimento."
10009050-46 = "[s] \"Não fiz nada tão grandioso assim...\""
10009050-47 = "...Certamente, as ações do Sensei podem não parecer algo chamativo."
10009050-48 = "Mas lidar com alunas problemáticas, resolver pequenos problemas da cidade..."
10009050-49 = "Ouvir os desabafos das alunas e dar conselhos."
10009050-50 = "E não apenas isso, o simples fato de vir nos visitar e nos ouvir..."
10009050-51 = "Mesmo que o Schale tenha sido criado originalmente com esse propósito."
10009050-52 = "Ainda assim, o Sensei faz muito mais do que isso todos os dias, e todos são gratos."
10009050-53 = "Incluindo eu, todos nós."
10009050-57 = "Acontece que, com o evento de hoje, isso acabou se materializando. Se o Sensei não estivesse aqui, os eventos de hoje em vários lugares certamente teriam sido muito mais caóticos."
10009050-58 = "[s] \"Fico até sem jeito ouvindo isso.\""
10009050-59 = "...Todos estavam com rostos felizes."
10009050-60 = "Vendendo ou trocando chocolates e doces. Presenteando as pessoas a quem são gratas no dia a dia..."
10009050-61 = "O Dia dos Namorados é um dia em que se pode ver cenas como essa."
10009050-62 = "Mas..."
10009050-63 = "[s] \"...?\""
10009050-64 = "A \"Raposa da Calamidade\", Wakamo..."
10009050-65 = "Ela está visando algo e causando tumulto neste evento. Pelo menos, é o que parece."
10009050-66 = "...O que, afinal, ela está tentando alcançar?"
10009050-67 = "[s] \"Hum...\""
10009050-68 = "Pelo que vimos nos ataques anteriores, durante o combate, ela claramente está mirando no Sensei."
10009050-69 = "Por exemplo... é possível pensar que, ao atacar o Sensei, ela busca neutralizar o Schale."
10009050-70 = "No entanto, incitar alunos problemáticos e até roubar equipamentos da Valkyrie para causar um combate dessa magnitude é irracional."
10009050-71 = "Se o objetivo fosse atacar o Sensei, fazer algo assim só aumentaria a vigilância. Existem métodos muito mais eficientes e certeiros."
10009050-72 = "[s] \"Certamente...\""
10009050-73 = "...Não me leve a mal, mas se o objetivo é se proteger dos ataques dela, o Sensei poderia simplesmente parar a patrulha agora mesmo e voltar para o Schale."
10009050-74 = "Se reforçarmos a segurança do Schale, provavelmente não haverá danos."
10009050-80 = "Pensando na possibilidade de algo dar errado,"
10009050-81 = "Em vez de continuar com a patrulha, o Sensei deveria agora mesmo—"
10009050-82 = "[s] \"Isso não é uma opção.\""
10009050-83 = "...?"
10009050-84 = "[s1] \"Porque é um pedido de uma aluna.\"\n[s2] \"Além disso, depois de ver o que aconteceu na cidade, sinto que é ainda mais necessário.\""
10009050-89 = "...Então, você não consegue pensar apenas na sua própria segurança agora."
10009050-90 = "Entendo... Talvez eu devesse lamentar isso em vez de ficar impressionada."
10009050-91 = "Compreendido. Então, farei o meu melhor para garantir que nada de perigoso aconteça, aconteça o que acontecer."
10009050-92 = "[s] \"Obrigado, Sena.\""
10009050-94 = "[s] \"Além disso, eu tenho um palpite de que a Wakamo...\""
10009050-101 = "Sensei, emergência!"
10009050-102 = "[s] \"Sim, eu já esperava por isso.\""
