[translation]
10032035-3 = "……これで大体は見終わったね。幸い、全員リストに載っている人たちだった。"
10032035-4 = "思ったより数が多くて、ちょっと疲れたなぁ～"
10032035-5 = "一体、アランチーノって人は、どれだけ敵を作ってきたんでしょう……"
10032035-6 = "まあ、ギャングのボスだしね……"
10032035-7 = "だとしても……あの爆弾の量には私も驚いたけど。"
10032035-8 = "あの量じゃ、オペラハウスごと吹っ飛ばすには十分だしね。"
10032035-9 = "と、とりあえず、爆弾は全て路地裏のゴミ箱に捨てておきました……"
10032035-10 = "これで残りは……"
10032035-16 = "……ええ、この部屋だけよ。"
10032035-17 = "[s1] \"出演者の控え室……\"\n[s2] \"準備中だと思うけど、入ってもいいのかな？\""
10032035-20 = "ふ～ん、今さらそこ気にしちゃうんだ？"
10032035-21 = "この人数だと、たしかに邪魔になるかもね。#nちょうど忙しい時間だろうし。"
10032035-22 = "まぁ……中に工作員が隠れてたら、どっちにしろ戦闘になるし、今ここで心配したって意味ないと思うけどね。"
10032035-23 = "……どうする、社長？一斉に入っちゃう？"
10032035-25 = "いいえ、そこまでする必要は無いわ。"
10032035-26 = "私とカヨコの二人で入って、中を調べましょう。"
10032035-27 = "ドレス姿なら、出演者を装えるはず。#n先生は……流石に無理そうね、視線が集まるだろうし。"
10032035-28 = "ムツキとハルカはここで待機。先生の護衛を頼むわ……すぐに戻るから。"
10032035-30 = "おっけ～、何かあったらすぐ連絡してね～"
10032035-31 = "は、はいっ！！命がけでお守りします、先生！！"
10032035-33 = "じゃあ、先生……少し待っててちょうだい。"
10032035-34 = "……うん？大丈夫かって？"
10032035-35 = "ふふっ、大丈夫に決まってるじゃない。"
10032035-36 = "私は便利屋68の社長よ！"
10032035-37 = "行きましょう、カヨコ課長。"
10032035-44 = "……先生、行ってくる。"
10032035-45 = "もし何かあったら、さっきので……いいよね？"
10032035-46 = "[s3] \"うん、大丈夫。\"\n[s4] \"カヨコも何かあったら、すぐ連絡して。\""
10032035-49 = "……ふふ。"
10032035-50 = "……分かった。"
10032035-61 = "[ns5] \"二人とも、おかえり。\"\n[ns6] \"どうだった？\""
10032035-64 = "予想はしてたけど、何も無かったよ。不審な人も、爆弾も見当たらなかった。"
10032035-65 = "出演者の顔まで写真と細かく照らし合わせたわけじゃないけど……"
10032035-66 = "仕方ないでしょ。#nみんな開演前の準備でバタバタしてるし、警備も居たし……"
10032035-67 = "まあ、工作員が出演者に成りすましでもしてない限り、安心していいと思うわ。"
10032035-68 = "一応、名簿を使ってザッとは確認できたし。全員、リストに載っている人たちだった。"
10032035-70 = "ふ～ん。じゃあ、オペラハウスの捜索はこれで終わりって感じ？"
10032035-71 = "次、やることは……"
10032035-78 = "あ、ちょっと失礼するわね……"
10032035-84 = "ふふ、ナイスタイミングだわ。"
10032035-85 = "みんな、準備して。"
10032035-97 = "……ターゲットが到着するわよ。"
