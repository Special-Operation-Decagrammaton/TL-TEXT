[translation]
10032035-3 = "……Pronto, terminei de ver quase tudo. Felizmente, todos eram pessoas que estavam na lista."
10032035-4 = "Tinha mais gente do que eu pensava, estou um pouco cansada~"
10032035-5 = "Quantos inimigos será que esse tal de Arancino conseguiu fazer..."
10032035-6 = "Bem, ele é um chefe de gangue, afinal..."
10032035-7 = "Mesmo assim... eu também fiquei surpresa com aquela quantidade de bombas."
10032035-8 = "Com aquela quantidade, seria o suficiente para explodir a casa de ópera inteira."
10032035-9 = "B-bem, de qualquer forma, joguei todas as bombas em uma lixeira no beco..."
10032035-10 = "Agora, só falta..."
10032035-16 = "……Sim, apenas esta sala."
10032035-17 = "[s1] \"Camarim dos artistas...\"\n[s2] \"Acho que eles estão se preparando, será que podemos entrar?\""
10032035-20 = "Hum, só agora você se preocupa com isso?"
10032035-21 = "Com esse tanto de gente, realmente podemos atrapalhar. #nDeve ser o horário mais movimentado para eles."
10032035-22 = "Bem... se tiver um agente escondido lá dentro, vai virar combate de qualquer jeito, então não acho que adiante se preocupar agora."
10032035-23 = "……O que faremos, presidente? Vamos entrar todos de uma vez?"
10032035-25 = "Não, não há necessidade de ir tão longe."
10032035-26 = "Eu e Kayoko entraremos para verificar o interior."
10032035-27 = "Com vestidos, podemos nos passar por artistas. #nSensei... bem, seria impossível para você, atrairia muitos olhares."
10032035-28 = "Mutsuki e Haruka, fiquem aqui de prontidão. Protejam o Sensei... voltaremos logo."
10032035-30 = "Ok~ Se acontecer alguma coisa, me avise logo~"
10032035-31 = "S-sim!! Vou proteger o Sensei com a minha vida!!"
10032035-33 = "Então, Sensei... espere um pouco, por favor."
10032035-34 = "……Hm? Está perguntando se estou bem?"
10032035-35 = "Fufu, é claro que estou."
10032035-36 = "Eu sou a presidente da Problem Solver 68!"
10032035-37 = "Vamos, gerente Kayoko."
10032035-44 = "……Sensei, já volto."
10032035-45 = "Se acontecer alguma coisa, podemos usar aquilo... tudo bem?"
10032035-46 = "[s3] \"Sim, tudo bem.\"\n[s4] \"Kayoko, se acontecer algo, me avise imediatamente.\""
10032035-49 = "……Fufu."
10032035-50 = "……Entendido."
10032035-61 = "[ns5] \"Bem-vindas de volta, vocês duas.\"\n[ns6] \"Como foi?\""
10032035-64 = "Eu já esperava, mas não tinha nada. Não vi nenhuma pessoa suspeita nem bombas."
10032035-65 = "Não cheguei a comparar o rosto de cada artista com as fotos detalhadamente, mas..."
10032035-66 = "Não tem como, né? #nEstão todos ocupados se preparando para o show, e ainda tinha segurança..."
10032035-67 = "Bem, a menos que um agente tenha se disfarçado de artista, acho que podemos ficar tranquilas."
10032035-68 = "Pelo menos consegui verificar rapidamente usando a lista. Todos eram pessoas que estavam nela."
10032035-70 = "Hum. Então, a busca na casa de ópera termina aqui?"
10032035-71 = "O que faremos a seguir..."
10032035-78 = "Ah, com licença um instante..."
10032035-84 = "Fufu, que timing perfeito."
10032035-85 = "Pessoal, preparem-se."
10032035-97 = "……O alvo está chegando."
