[translation]
10047080-1 = "第8話;接触"
10047080-2 = "つまり……#n寮監隊の宿舎を横切りつつ、魔法陣を描かなければいけないと。"
10047080-3 = "そう……ハイリスクだね……。"
10047080-4 = "ふふ。想定外の試練ですが……それを乗り越えてこそヒロインというもの。"
10047080-5 = "諦めるヒロインもどこかにはいるでしょ！"
10047080-6 = "にゅふふ。残念ながら、私の魔導書に「諦める」という言葉はありません。"
10047080-7 = "寮監隊の方を最後に回せば、なんとかならないでしょうか……。"
10047080-8 = "いざという時は……私が囮になるよぉ。"
10047080-9 = "カラスと猫がいれば……なんとかなる、はず。"
10047080-11 = "カノエ先輩……！"
10047080-15 = "マスター。こんな感じで進めていいでしょうか？"
10047080-16 = "[s1] \"うん。それがみんなの夢につながるのなら。\"\n[s2] \"私も力になるよ。\""
10047080-19 = "やはりあなたは、ヒロインに欠かせない存在であり――#nみんなを守るマスコット……。"
10047080-20 = "私の目に狂いはなかったようですね。"
10047080-21 = "[s] \"でも、危ないことはやめようね。\""
10047080-22 = "にゅふふ、もちろんです！そこまで無謀ではありません！"
10047080-23 = "爆発したらさらに完璧……だとは思いますが……。"
10047080-24 = "先輩……。"
10047080-25 = "あははっ！冗談ですよ、冗談！"
10047080-26 = "マスターの仰る通り、安全第一で進めます。"
10047080-27 = "ワイルドハントに刻まれし古代魔法陣を復活させ、#nみんなの夢を叶える作戦！"
10047080-28 = "その名も……「ヴァルプルギスの夜」です！"
10047080-29 = "うぅ、結局こうなるの……？"
10047080-31 = "材料の調達はどうしましょう？#n学院全体に魔法陣を描くとなれば、それなりの量が必要です。"
10047080-32 = "学院内で調達したら、寮監隊に感づかれる危険も……。"
10047080-33 = "ひと騒動起こしたばかりですし、#n怪しげな動きをすれば当然マークされます……。"
10047080-34 = "大丈夫。安全なルートを……知ってるよぉ……。"
10047080-35 = "[s] \"そんな抜け道があるの？\""
10047080-36 = "先生には、内緒……。"
10047080-37 = "その方が……面白そうだからねぇ、イヒッ。"
10047080-38 = "危険はないから……安心して。"
10047080-39 = "それじゃ……決行日に会おうかぁ。"
10047080-40 = "満月の夜――"
10047080-41 = "「ヴァルプルギスの夜」にね。"
10047080-42 = "イヒッ……イヒヒヒッ……！"
10047080-43 = "[ns] \"う、うん。またね。\""
10047080-45 = "（今日は一旦シャーレに戻ることにした）"
10047080-48 = "次の日。"
10047080-53 = "夜が明けた……。"
10047080-54 = "そろそろ……「接触」の時間かなぁ……。"
10047080-55 = "接触、ですか？"
10047080-56 = "……オカ研の会長なんだし、#n知っておいたほうがいいと思うよぉ？"
10047080-57 = "エリちゃんに、新しい世界を見せてあげる……。"
10047080-67 = "誰かと待ち合わせですか？"
10047080-68 = "しーっ……。"
10047080-75 = "ストップ。動けば、撃つ……。"
10047080-76 = "……えっ！？"
10047080-77 = "『苦痛は、時と共に消えていくが』……？"
10047080-82 = "……『美しさは永遠なり』。"
10047080-83 = "……。"
10047080-84 = "『私は……人生で、決定的な瞬間を見つけたいです』"
10047080-85 = "『歩んできた全てが……決定的な瞬間だよ……』"
10047080-86 = "おおっ！なにやら強いマナを感じるやりとり……！"
10047080-87 = "……ふぅ。"
10047080-88 = "ここで合言葉を知っている方とお会いするとは……。#nなぜ私に……？"
10047080-89 = "急ぎの……お願いがあるんだよねぇ。"
10047080-93 = "わ……わかりました。では、人目につかないところへ……。"
10047080-96 = "……ここなら、大丈夫なはず。"
10047080-97 = "それで……お願いとはなんでしょう？"
10047080-98 = "このリストのものを、指定した場所に[ruby=・]埋[/ruby][ruby=・]め[/ruby][ruby=・]て[/ruby]ほしい。"
10047080-99 = "……満月の夜の前日までにねぇ。"
10047080-108 = "これを……こんなにですか？一体何の用途で……。"
10047080-109 = "イヒッ……そのうちわかるよ。"
10047080-110 = "危険なことには使いませんよね……？"
10047080-111 = "まさか。"
10047080-112 = "信じていい……報酬も、先に払う……。"
10047080-117 = "ふぅ……仕方ありません、分かりました。"
10047080-118 = "イヒッ……よろしく、ミヨちゃん……イヒヒッ。"
10047080-119 = "あっ、ミヨさんと言うのですね！#nはじめまして、私は[ruby=しらお]白尾[/ruby]エリと言います！#nエリと呼んでください！"
10047080-120 = "あ……はい。はじめまして。"
10047080-121 = "ミヨさんはこういう取引に慣れてらっしゃるのですか？"
10047080-122 = "なりゆき、といいますか……。"
10047080-123 = "はぁ……。今度こそ、本当の本当に、足を洗います……。"
10047080-124 = "では、たしかに承りました。私はこれで……。"
10047080-129 = "あんな感じでも、腕は確か……。"
10047080-130 = "通常のルートでは手に入らない……色んな物を持ってきてくれる。"
10047080-131 = "寮監隊の目をすり抜けて……？#n……まさか空間転移を！？"
10047080-132 = "そうかもねぇ……。"
10047080-133 = "イヒッ、用事は済んだし……報告に行くよぉ。"
10047080-135 = "（しばらくして……）"
10047080-140 = "これで材料は揃いましたね。後は本番あるのみです。"
10047080-141 = "満月の夜まで……あと少し。"
10047080-145 = "やっぱりレナちゃんは気が乗りませんか？"
10047080-146 = "見張っときたいけど……流石に、今回の件は危なすぎ。"
10047080-147 = "この前は見逃してもらえたけど、また校則違反をやらかしたら流石に罰則だけじゃすまないわよ……。"
10047080-148 = "もう、やめない？楽しいことは他にもあるよ……？"
10047080-149 = "レナちゃんの気持ちも分かりますが、本物の古代魔法陣が目の前にあったのです。#nしかも、上手く行けばみんなの願いが叶うかもしれない……。"
10047080-150 = "なら、自らの目で確かめてみる……#nそれこそがオカルト研究会だと思うのです！"
10047080-151 = "単に魔除けの意味で作られてたとしたら？"
10047080-152 = "昔の芸術って、そういう作風のも多かったって授業で言ってたよ？"
10047080-153 = "なら……魔法が発動するわけないし。"
10047080-154 = "いくら準備をしても……反省室送りになるのがオチでしょ？"
10047080-155 = "ほんとに……それでもやるの？"
10047080-159 = "レナちゃんは……登山家がどうして山を登ると思う……？"
10047080-160 = "それは……そこに、山があるからだよぉ……。"
10047080-161 = "私もそう。オカルトを研究するのは……#nそこにオカルトがあるから。"
10047080-162 = "レナちゃん、私も……危険は承知の上です……。"
10047080-163 = "でも……やってみたい。だって、願いが叶う魔法ですよ？"
10047080-164 = "みんなの夢を現実にするチャンスが、#nあるかもしれないんです！"
10047080-165 = "芸術は、終わりなき挑戦があったからこそ、発展を遂げてきました。"
10047080-166 = "今回も、そんな挑戦の一つだと思っています。"
10047080-167 = "もちろん、常に成功するわけではありません。失敗もあるでしょう。"
10047080-168 = "しかし――挑戦しなければ、失敗すらできません。"
10047080-169 = "だから私は、迷わず舞台へ上がります。#n努力を重ねた末の舞台は、光を放つものですから。"
10047080-170 = "それに……やってみなければわかりません。#n本当に、願いが叶うかもしれませんよ？"
10047080-175 = "はぁ……そう言うと思った。"
10047080-176 = "それなら、私も言っときたいことがあるの。"
10047080-177 = "……私ね、先輩たちのこと、嫌じゃないよ？#nいっつも実験や儀式に巻き込まれたりするけど……#n一緒にいると、結構楽しいし。"
10047080-178 = "でも、今回だけはダメ。"
10047080-179 = "そもそも私、オカルトなんて信じてないし。だから――"
10047080-183 = "――ここで降りるね。"
