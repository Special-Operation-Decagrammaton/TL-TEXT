[translation]
10047080-1 = "Episódio 8; Contato"
10047080-2 = "Ou seja...#nPrecisamos desenhar o círculo mágico enquanto atravessamos o alojamento da equipe de supervisão do dormitório."
10047080-3 = "Pois é... é um risco muito alto..."
10047080-4 = "Fufu. É um desafio inesperado, mas... superar isso é o que define uma heroína."
10047080-5 = "Tenho certeza de que existem heroínas que desistem em algum lugar!"
10047080-6 = "Nyufufu. Infelizmente, no meu grimório, a palavra \"desistir\" não existe."
10047080-7 = "Não poderíamos deixar a equipe de supervisão por último...?"
10047080-8 = "Se for preciso... eu serei a isca..."
10047080-9 = "Se tivermos o corvo e o gato... deve dar certo."
10047080-11 = "Kanoe-senpai...!"
10047080-15 = "Mestre. Podemos prosseguir dessa forma?"
10047080-16 = "[s1] \"Sim. Se isso levar ao sonho de todos.\"\n[s2] \"Eu também vou ajudar.\""
10047080-19 = "Como esperado, você é uma existência indispensável para uma heroína e—#nO mascote que protege a todos..."
10047080-20 = "Parece que meu julgamento não estava errado."
10047080-21 = "[s] \"Mas nada de coisas perigosas, combinado?\""
10047080-22 = "Nyufufu, claro! Não sou tão imprudente assim!"
10047080-23 = "Embora eu ache que seria ainda mais perfeito se houvesse uma explosão..."
10047080-24 = "Senpai..."
10047080-25 = "Ahaha! É brincadeira, brincadeira!"
10047080-26 = "Como o mestre disse, vamos prosseguir com a segurança em primeiro lugar."
10047080-27 = "A operação para reviver o antigo círculo mágico gravado em Wild Hunt e#nrealizar o sonho de todos!"
10047080-28 = "O nome dela é... \"Noite de Walpurgis\"!"
10047080-29 = "Ugh, vai acabar assim mesmo...?"
10047080-31 = "Como vamos conseguir os materiais?#nSe for para desenhar o círculo mágico em toda a academia, precisaremos de uma quantidade considerável."
10047080-32 = "Se conseguirmos dentro da academia, corremos o risco de sermos descobertos pela equipe de supervisão..."
10047080-33 = "Acabamos de causar um alvoroço, então#nse fizermos movimentos suspeitos, seremos marcados com certeza..."
10047080-34 = "Está tudo bem. Eu conheço... uma rota segura..."
10047080-35 = "[s] \"Existe um atalho assim?\""
10047080-36 = "É segredo... do Sensei..."
10047080-37 = "Porque assim... parece mais divertido, ihi."
10047080-38 = "Não há perigo... pode ficar tranquila."
10047080-39 = "Então... nos vemos no dia da execução."
10047080-40 = "Na noite de lua cheia—"
10047080-41 = "Na \"Noite de Walpurgis\"."
10047080-42 = "Ihi... ihihihi...!"
10047080-43 = "[ns] \"C-certo. Até mais.\""
10047080-45 = "(Decidi voltar para o Schale por hoje)"
10047080-48 = "No dia seguinte."
10047080-53 = "O dia amanheceu..."
10047080-54 = "Já está quase na hora... do \"contato\"..."
10047080-55 = "Contato, você diz?"
10047080-56 = "...Já que você é a presidente do Clube de Ocultismo,#nacho que deveria saber, não acha?"
10047080-57 = "Vou mostrar um novo mundo para a Eri-chan..."
10047080-67 = "Você está esperando alguém?"
10047080-68 = "Shiu..."
10047080-75 = "Pare. Se se mover, eu atiro..."
10047080-76 = "...Hã!?"
10047080-77 = "\"A dor desaparece com o tempo\", mas...?"
10047080-82 = "...\"A beleza é eterna\"."
10047080-83 = "..."
10047080-84 = "『Eu... quero encontrar o momento decisivo da minha vida.』"
10047080-85 = "『Tudo o que você viveu até agora... é o momento decisivo...』"
10047080-86 = "Uau! Que troca de palavras carregada de um mana tão forte...!"
10047080-87 = "……Ufa."
10047080-88 = "Quem diria que eu encontraria alguém que sabe a senha aqui... #nPor que eu...?"
10047080-89 = "Tenho um... pedido urgente para você."
10047080-93 = "E-entendido. Então, vamos para um lugar onde ninguém possa nos ver..."
10047080-96 = "……Aqui deve ser seguro."
10047080-97 = "Então... qual seria o pedido?"
10047080-98 = "Quero que você enterre os itens desta lista nos locais especificados."
10047080-99 = "……Antes da noite de lua cheia, está bem?"
10047080-108 = "Isso tudo... é muita coisa? Para que tipo de uso, exatamente..."
10047080-109 = "Ihi... logo você saberá."
10047080-110 = "Você não vai usar isso para algo perigoso, vai...?"
10047080-111 = "De jeito nenhum."
10047080-112 = "Pode confiar... e a recompensa, eu pago adiantado..."
10047080-117 = "Ufa... não tem jeito, eu aceito."
10047080-118 = "Ihi... conto com você, Miyo-chan... Ihihi."
10047080-119 = "Ah, então seu nome é Miyo-san! #nMuito prazer, eu me chamo Eri Shirao! #nPor favor, me chame de Eri!"
10047080-120 = "Ah... sim. Muito prazer."
10047080-121 = "Miyo-san, você está acostumada com esse tipo de transação?"
10047080-122 = "Foi por acaso, eu diria..."
10047080-123 = "Ai... Desta vez, de verdade, eu vou sair dessa vida..."
10047080-124 = "Bem, o pedido foi aceito. Agora, se me der licença..."
10047080-129 = "Mesmo com esse jeito, ela é muito competente..."
10047080-130 = "Ela consegue trazer várias coisas... que não se encontram por rotas comuns."
10047080-131 = "Passando despercebida pela equipe de monitoramento...? #n...Não me diga que ela usa teletransporte espacial!?"
10047080-132 = "Talvez seja isso..."
10047080-133 = "Ihi, o serviço está feito... vou lá fazer o relatório."
10047080-135 = "（Algum tempo depois...）"
10047080-140 = "Com isso, os materiais estão reunidos. Agora só falta a parte principal."
10047080-141 = "Até a noite de lua cheia... falta pouco."
10047080-145 = "Lena-chan, você ainda não está convencida?"
10047080-146 = "Eu queria ficar de olho, mas... sinceramente, isso é perigoso demais."
10047080-147 = "Da última vez deixaram passar, mas se a gente violar as regras da escola de novo, não vai ser só uma punição simples..."
10047080-148 = "Por que não paramos por aqui? Existem outras coisas divertidas para fazer, não existem...?"
10047080-149 = "Eu entendo como você se sente, Lena-chan, mas um círculo mágico antigo de verdade está bem na nossa frente. #nAlém disso, se der certo, talvez o desejo de todos possa se realizar..."
10047080-150 = "Então, vamos verificar com nossos próprios olhos... #nÉ exatamente isso que o Clube de Pesquisa de Ocultismo faz!"
10047080-151 = "E se isso foi feito apenas como um amuleto de proteção?"
10047080-152 = "Disseram na aula que muitas artes antigas tinham esse estilo, não disseram?"
10047080-153 = "Então... não tem como a magia ser ativada."
10047080-154 = "Não importa o quanto a gente se prepare... o resultado vai ser acabar na sala de detenção, não vai?"
10047080-155 = "Sério mesmo... você ainda quer fazer isso?"
10047080-159 = "Lena-chan... por que você acha que um alpinista escala uma montanha...?"
10047080-160 = "É porque... a montanha está lá..."
10047080-161 = "Eu sou igual. Eu pesquiso o ocultismo porque... #nO ocultismo está lá."
10047080-162 = "Lena-chan, eu também... estou ciente dos perigos..."
10047080-163 = "Mas... eu quero tentar. Afinal, é uma magia que realiza desejos, não é?"
10047080-164 = "Pode ser a chance de tornar os sonhos de todos em realidade!"
10047080-165 = "A arte só se desenvolveu porque houve desafios sem fim."
10047080-166 = "Desta vez também, acredito que seja um desses desafios."
10047080-167 = "Claro, nem sempre teremos sucesso. Haverá falhas também."
10047080-168 = "Mas... se não tentarmos, nem sequer poderemos falhar."
10047080-169 = "Por isso, subirei ao palco sem hesitar. #nUm palco alcançado após muito esforço é algo que irradia luz."
10047080-170 = "Além disso... não saberemos se não tentarmos. #nQuem sabe, o desejo pode realmente se realizar?"
10047080-175 = "Ah... eu sabia que você diria isso."
10047080-176 = "Sendo assim, eu também tenho algo que quero dizer."
10047080-177 = "...Sabe, eu não odeio vocês, veteranos. #nMesmo que eu sempre acabe envolvida em experimentos e rituais... #né bem divertido estar com vocês."
10047080-178 = "Mas, desta vez não dá."
10047080-179 = "Para começar, eu nem acredito em ocultismo. Por isso..."
10047080-183 = "— Vou descer aqui."
