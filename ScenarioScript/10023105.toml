[translation]
10023105-2 = "うっ……！"
10023105-3 = "ふむ、この想定外の力……#nこれが噂に聞く、シャーレの先生なのですね……"
10023105-11 = "王冠、確保したよ！"
10023105-12 = "パンパカパーン！レアアイテムを獲得しました！"
10023105-13 = "あの方は……どうしましょう……？"
10023105-19 = "！！！"
10023105-20 = "これは……私のハンカチをお使いください、先生。"
10023105-22 = "うぅ、目が痛くて開けられない……ゲホ、ゲホッ！#nお姉ちゃん、どこに居るの？"
10023105-24 = "こ、声は聞こえるけど、私も何も見えないよ！"
10023105-29 = "（……球体が靴にぶつかる感触がした）"
10023105-33 = "（今度は確信を持って手に取ると……）"
10023105-34 = "ごきげんよう[ruby=わたくし]、私の[/ruby]声は聞こえておりますね？"
10023105-35 = "[s] \"……うん、聞こえてるよ。\""
10023105-37 = "こんな形でお別れすることになってしまったのは、本心から残念に思っております。"
10023105-38 = "結果的に、王冠は先生の手に渡ってしまいましたが……"
10023105-39 = "[ruby=どうだ]銅田[/ruby]から取り戻す事には成功しましたので。#nこれでブラックマーケットに流れるという、最悪のシナリオは避けられました。"
10023105-40 = "残念ではあるけれど、今回は先生に免じて潔く引き下がるといたしましょう。#nこれが最後、というわけでは無いでしょうから。"
10023105-41 = "[s] \"……いつもこんなに危ない事を？\""
10023105-42 = "…………。"
10023105-43 = "「路傍の石」と「美術品」……先生は両者の違いを、どのような基準で図りますか？"
10023105-44 = "どれほど素晴らしい美術品だとしても、その価値を全員が完璧に理解しているわけではありません。"
10023105-45 = "先ほども申し上げたように、真の価値を理解できるのは私だけ。"
10023105-46 = "であれば……私の管理下に置く方が、美術品にとっても良いのではないでしょうか？"
10023105-47 = "[s] \"だから怪盗を……？\""
10023105-50 = "ええ、そうですとも。これが美に送る私の一途な愛。#n我が身を尽くし、慈しむ――故に「慈愛」。"
10023105-51 = "価値を理解する人が居なければ、その存在は呆気なく闇に埋もれてしまうもの。#nいつの日か、美の理解者が現れる事を願って――"
10023105-52 = "私たちは、生まれながらにして名を持つわけではない。#n呼び名とは、他者に規定されるもの。#nそれは名に留まらず、価値や役割にも通ずる事です。"
10023105-53 = "例えば、そう……世間が私を「慈愛の怪盗」と呼ぶように。"
10023105-54 = "……もちろん、世の中には端から私を理解する気の無い者もおります。#n「狂った偏愛者」と後ろ指を刺される事だって。"
10023105-55 = "故に……先生が彼らと同じ思いを抱いたとしても――"
10023105-56 = "[s] \"私は……そんな風に思わないよ。\""
10023105-57 = "うん……！？"
10023105-60 = "[ns1] \"簡単に分かった気になるつもりは無いけど……\"\n[ns2] \"生徒の気持ちに寄り添って、\"\n[ns3] \"見守るのが私の役目だから。\""
10023105-66 = "ふむ……そのような言葉は、初めて、頂きました。"
10023105-67 = "つまり、先生は……世間に後ろ指を刺されながらも、怪盗で在り続ける私を理解してくださる、と……？"
10023105-68 = "[s] \"大人として、先生として、そう在りたいと思う。\""
10023105-69 = "……もしも怪盗が、いつまでも他者を顧みない[ruby=ゆが]歪[/ruby]んだ子だとしたら……？"
10023105-73 = "[ns] \"それでも最後まで目を離さないよ。\""
10023105-74 = "……！"
10023105-75 = "[s4] \"生徒が道を踏み外したり、苦しんでいたら……\"\n[s5] \"必ず手を差し伸べて、導くよ。\""
10023105-78 = "「それでも、私たちは努力することを諦めないべきだ」と……？"
10023105-79 = "……"
10023105-80 = "一つ、お伺いしても？"
10023105-81 = "こんな私でも……まだ、先生の生徒で居られますか？"
10023105-82 = "[s] \"……うん、もちろん。みんな大切な生徒だよ。\""
10023105-83 = "……"
10023105-84 = "……アキラ。"
10023105-85 = "[s] \"……アキラ？\""
10023105-86 = "ええ。[ruby=きよすみ]清澄[/ruby]アキラ。"
10023105-90 = "それが……仮面に隠された私の本当の名です。"
10023105-94 = "それでは先生――またいつか、お会いしましょう。"
10023105-100 = "ケホッ……"
10023105-101 = "やっと見えてきた！先生、大丈夫？"
10023105-102 = "先生！HPは残っていますか？#n先生はパーティーで一番弱いので、気をつけないと……"
10023105-103 = "ひとまず、外傷は無さそうですね。"
10023105-104 = "[s] \"……大丈夫、ありがとう。\""
10023105-106 = "……先生？"
10023105-107 = "もしかして「慈愛の怪盗」に何かされたんですか？"
10023105-108 = "[s6] \"ううん、何でもないよ。\"\n[s7] \"平気だよ。ところで、王冠は無事？\""
10023105-113 = "はい……わたしが箱の中で、ちゃんと……"
10023105-117 = "よかった……今度は無事です。"
10023105-119 = "（ユズが離さずに持っていた王冠を確認し安堵する）"
10023105-120 = "（「慈愛の怪盗」も明太郎も逃してしまったが、みんなが無事で安心した）"
10023105-124 = "はあ、はあ……！追っ手は来てないか……？"
10023105-125 = "まだだ……私は諦めん。#n……こんなところで諦めてなるものか！"
10023105-126 = "そうだ、そうだとも！何度でも這い上がってやろう！"
10023105-128 = "そうかよ。じゃあ、これも避けてみな。"
10023105-132 = "だっ、誰――だ"
10023105-141 = "があっ！？"
10023105-153 = "んだよ、大したことねぇじゃねぇか。"
10023105-154 = "裏世界の大物だって聞いてたのに、ただのザコだったな。ふぁあ……"
10023105-155 = "お前たち、出て来い。あいつに会いに行くぞ。"
