[translation]
10023105-2 = "Ugh……!"
10023105-3 = "Hmm, esse poder inesperado...#nEntão você é o Sensei do Schale de quem tanto ouvi falar……"
10023105-11 = "Coroa, capturada!"
10023105-12 = "Tan-tan-taran! Você obteve um item raro!"
10023105-13 = "Aquela pessoa é... o que devemos fazer……?"
10023105-19 = "!!!"
10023105-20 = "Isto é... por favor, use o meu lenço, Sensei."
10023105-22 = "Ugh, meus olhos doem tanto que não consigo abri-los... Cof, cof!#nIrmã, onde você está?"
10023105-24 = "E-eu consigo ouvir sua voz, mas também não consigo ver nada!"
10023105-29 = "(...Senti o toque de uma esfera batendo no meu sapato)"
10023105-33 = "(Desta vez, peguei com convicção e...)"
10023105-34 = "Saudações, você consegue ouvir a minha voz, não é?"
10023105-35 = "[s] \"...Sim, estou ouvindo.\""
10023105-37 = "Sinto muito, do fundo do meu coração, que tenhamos que nos despedir desta forma."
10023105-38 = "Como resultado, a coroa acabou indo parar nas mãos do Sensei, mas……"
10023105-39 = "Consegui recuperá-la de Doda.#nCom isso, evitamos o pior cenário: que ela fosse parar no mercado negro."
10023105-40 = "É uma pena, mas desta vez vou recuar graciosamente por sua causa, Sensei.#nAfinal, não creio que esta seja a nossa última vez."
10023105-41 = "[s] \"...Você sempre faz coisas tão perigosas assim?\""
10023105-42 = "…………."
10023105-43 = "\"Pedra de beira de estrada\" e \"obra de arte\"... Com base em que critério o Sensei mede a diferença entre as duas?"
10023105-44 = "Por mais magnífica que seja uma obra de arte, nem todos compreendem perfeitamente o seu valor."
10023105-45 = "Como mencionei anteriormente, sou a única que consegue compreender o seu verdadeiro valor."
10023105-46 = "Sendo assim... não seria melhor para a obra de arte que ela ficasse sob a minha custódia?"
10023105-47 = "[s] \"É por isso que você se tornou uma ladra...?\""
10023105-50 = "Sim, exatamente. Este é o meu amor devoto pela beleza.#nDedico meu corpo e a estimo — por isso, \"Amor Benevolente\"."
10023105-51 = "Se não houver ninguém para compreender o seu valor, a existência de algo acaba sendo enterrada na escuridão sem mais nem menos.#nNa esperança de que, um dia, alguém que compreenda a beleza apareça——"
10023105-52 = "Nós não nascemos com um nome.#nUm nome é algo definido pelos outros.#nIsso não se limita apenas aos nomes, mas também se aplica ao valor e ao papel de cada um."
10023105-53 = "Por exemplo, vejamos... como o mundo me chama de \"Ladra do Amor Benevolente\"."
10023105-54 = "...Claro, há pessoas no mundo que não têm a menor intenção de me compreender.#nHá até quem aponte o dedo para mim, chamando-me de \"fanática louca\"."
10023105-55 = "Portanto... mesmo que o Sensei tenha os mesmos pensamentos que eles——"
10023105-56 = "[s] \"Eu... não penso dessa forma.\""
10023105-57 = "Hum...!?"
10023105-60 = "[ns1] \"Não pretendo dizer que entendo tudo facilmente...\"\n[ns2] \"Mas meu papel é apoiar os sentimentos dos meus alunos,\"\n[ns3] \"e zelar por eles.\""
10023105-66 = "Hum... É a primeira vez que recebo palavras como essas."
10023105-67 = "Em outras palavras, Sensei... você me compreende, mesmo eu sendo uma ladra que é alvo de críticas da sociedade...?"
10023105-68 = "[s] \"Como adulto e como Sensei, é assim que desejo ser.\""
10023105-69 = "...E se a ladra for uma criança distorcida que nunca se importa com os outros...?"
10023105-73 = "[ns] \"Mesmo assim, não tirarei os olhos de você até o fim.\""
10023105-74 = "……!"
10023105-75 = "[s4] \"Se um aluno se desviar do caminho ou estiver sofrendo...\"\n[s5] \"Eu certamente estenderei a mão e o guiarei.\""
10023105-78 = "\"Mesmo assim, não devemos desistir de nos esforçar\", é isso...?"
10023105-79 = "……"
10023105-80 = "Posso lhe perguntar uma coisa?"
10023105-81 = "Mesmo sendo assim... eu ainda posso ser uma aluna do Sensei?"
10023105-82 = "[s] \"...Sim, é claro. Todos vocês são alunos preciosos.\""
10023105-83 = "……"
10023105-84 = "……Akira."
10023105-85 = "[s] \"……Akira?\""
10023105-86 = "Sim. Kiyosumi Akira."
10023105-90 = "Esse é... o meu verdadeiro nome, escondido atrás da máscara."
10023105-94 = "Sendo assim, Sensei... até algum dia."
10023105-100 = "Cof..."
10023105-101 = "Finalmente conseguimos ver! Sensei, você está bem?"
10023105-102 = "Sensei! Ainda tem HP sobrando? #nO Sensei é o mais fraco do grupo, então precisa tomar cuidado..."
10023105-103 = "Por enquanto, parece que não há ferimentos externos."
10023105-104 = "[s] \"...Estou bem, obrigado.\""
10023105-106 = "...Sensei?"
10023105-107 = "Por acaso o \"Ladrão Benevolente\" fez algo com você?"
10023105-108 = "[s6] \"Não, não foi nada.\"\n[s7] \"Estou bem. Aliás, a coroa está salva?\""
10023105-113 = "Sim... eu a mantive bem guardada dentro da caixa..."
10023105-117 = "Que bom... desta vez ela está a salvo."
10023105-119 = "(Verifica a coroa que Yuzu segurava sem soltar e suspira aliviado)"
10023105-120 = "(Embora o \"Ladrão Benevolente\" e Meitaro tenham escapado, sinto-me aliviado por todos estarem bem)"
10023105-124 = "Haa, haa...! Será que não estão vindo atrás de mim...?"
10023105-125 = "Ainda não... Eu não vou desistir. #n...Não vou desistir em um lugar como este!"
10023105-126 = "Isso mesmo, é isso aí! Vou me levantar quantas vezes for preciso!"
10023105-128 = "É mesmo? Então, tente desviar disso aqui também."
10023105-132 = "Qu-quem é... você?"
10023105-141 = "Gaaah!?"
10023105-153 = "Que decepção, não era grande coisa."
10023105-154 = "Ouvi dizer que era um figurão do submundo, mas não passava de um fracote. Bocejo..."
10023105-155 = "Vocês, apareçam. Vamos encontrar aquele cara."
