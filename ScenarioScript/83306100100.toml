[translation]
83306100100-6 = "……さーん……しー……ごー"
83306100100-12 = "……何してるの？"
83306100100-13 = "あ、誰かと思ったら風紀委員長だ。"
83306100100-14 = "イブキとキララちゃんと一緒にかくれんぼしてるとこ。"
83306100100-15 = "ちなみに、私が鬼ね。"
83306100100-16 = "イブキが遊びたいって言ってたのをキララちゃんが聞いて、遊ぶことになったんだよね。"
83306100100-17 = "キララちゃんは小さくて可愛い子が好きだから、まあいつも通りだけどさ。"
83306100100-18 = "でも、そろそろ他の友達と合流して遊ぶ約束してるから、早めに行かないとマズくてさ。"
83306100100-19 = "それなら私が鬼を代わろうか？"
83306100100-20 = "風紀委員長が？"
83306100100-24 = "あ……そういえば、風紀委員長はどんな問題児も絶対に逃さないって噂を聞いたことあるんだけど。"
83306100100-25 = "……つまり、かくれんぼの専門家的な？"
83306100100-26 = "……どこで聞いたのか知らないけど、ただの噂よ。"
83306100100-27 = "あはは、私もSNSで流れてきたのを見ただけだしね。"
83306100100-28 = "でも、代わってくれるんだったらお願いしよっかな。"
