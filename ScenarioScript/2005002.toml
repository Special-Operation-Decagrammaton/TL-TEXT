[translation]
2005002-1 = "A rocha falou!"
2005002-2 = "Escritório do Schale"
2005002-3 = "（Dia seguinte）"
2005002-7 = "（Já se passaram 30 minutos do horário marcado...）"
2005002-8 = "（Não há sinal de que Ritsu virá...）"
2005002-9 = "[ns] \"Ela não atende o telefone...\""
2005002-10 = "（Preocupado e inquieto...）"
2005002-14 = "[ns] \"...Ritsu?\""
2005002-15 = "（A silhueta de Ritsu estava do lado de fora da janela）"
2005002-16 = "（Ritsu está fazendo algo na frente da rocha no jardim...?）"
2005002-17 = "[ns] \"...O que será que ela está fazendo?\""
2005002-20 = "Jardim frontal do Schale"
2005002-21 = "（No momento em que desci para o primeiro andar, o que vi foi...）"
2005002-22 = "（Ritsu estava esculpindo uma rocha maior que ela mesma com um cinzel e um martelo）"
2005002-23 = "[ns] \"Hum, o que é isso...?\""
2005002-25 = "Ah! Sensei!"
2005002-26 = "Ei!"
2005002-27 = "...Ah, é verdade!#nEu estava de plantão hoje, né!"
2005002-28 = "[ns1] \"Fiquei preocupado, Ritsu!\"\n[ns2] \"Isso é uma escultura...?\""
2005002-31 = "Sim!#nEssa rocha me pediu!"
2005002-32 = "[s] \"Uma rocha pediu...?\""
2005002-33 = "Isso! Dentro das rochas, existem várias crianças escondidas com formas diferentes, sabe—"
2005002-34 = "Essa rocha me contou: \"Tem uma criança linda escondida dentro de mim\"."
2005002-35 = "Por isso..."
2005002-36 = "Estou quebrando ela!"
2005002-37 = "[s] \"Por quê!?\""
2005002-38 = "Se eu não fizer isso, não consigo tirá-la de lá."
2005002-39 = "Essa criança que está escondida dentro dessa rocha bruta."
2005002-40 = "[ns3] \"Entendo...!\"\n[ns4] \"Então é isso...!\""
2005002-43 = "[ns] \"A propósito... isso é permitido pelas regras da escola?\""
2005002-44 = "Não é permitido, não!"
2005002-45 = "..."
2005002-46 = "Mudando de assunto, Sensei!"
2005002-47 = "[s] \"Ela mudou de assunto!?\""
2005002-53 = "Pode me colocar nos seus ombros?"
2005002-54 = "[s] \"...Você já não está?\""
2005002-55 = "Uau, que alto!"
2005002-56 = "Hehe... eu sou baixinha, né.#nNão conseguia alcançar a parte de cima!"
2005002-57 = "Agora consigo esculpir! Obrigada, Sensei!"
2005002-60 = "（E assim, Ritsu continuou esculpindo a rocha enquanto estava nos meus ombros...）"
2005002-61 = "（...E uma enorme quantidade de pó de pedra caiu sobre mim）"
2005002-65 = "Ufa, só mais um pouco!"
2005002-66 = "Por fim, vou ajustar essa parte... ué?"
2005002-67 = "Ah! Sensei, você está bem?#nSeu rosto está coberto de pó!"
2005002-68 = "[s] \"E-estou bem... cof!\""
2005002-69 = "O-o que eu faço?"
2005002-70 = "Já sei! Se você me carregar nos ombros de costas—"
2005002-71 = "O pó não vai cair no seu rosto!"
2005002-72 = "[s] \"Nesse caso, a barriga da Ritsu ficaria no meu rosto... melhor não!\""
2005002-73 = "É mesmo? Achei que seria uma boa ideia."
2005002-74 = "Bem, vamos continuar!"
2005002-77 = "（A escultura avança sem problemas...）"
2005002-79 = "Isso! Terminei!"
2005002-80 = "[s] \"Bom trabalho, Ritsu.\""
2005002-81 = "Muito obrigada, Sensei! Hehe."
2005002-82 = "[s5] \"Essa estátua é...\"\n[s6] \"Como posso dizer...\""
2005002-85 = "Sensei, está com dificuldade para dar sua opinião?"
2005002-86 = "Se for isso, não se preocupe!"
2005002-87 = "[s] \"Hã?\""
2005002-88 = "Dizer o que achou de uma obra logo de cara..."
2005002-89 = "Não é difícil?"
2005002-90 = "Eu não sei de que ângulo interpretar a obra...#nE nem sei se as palavras são realmente apropriadas."
2005002-91 = "E na frente do autor, a gente acaba ficando sem jeito, né?"
2005002-92 = "Por isso, se de repente...#nvierem palavras à sua mente sobre essa escultura..."
2005002-93 = "Me conte na hora!"
2005002-94 = "[s] \"Entendido. Obrigado, Ritsu.\""
2005002-95 = "O que vamos fazer com ela? Quer levar para a sua sala?"
2005002-96 = "[s] \"Isso seria bom, mas...\""
2005002-100 = "[ns7] \"Para que muitas pessoas possam ver...\"\n[ns8] \"Acho que quero deixá-la aqui.\""
2005002-103 = "Ah..."
2005002-104 = "...Obrigada, meu coração está transbordando!"
2005002-105 = "Graças ao Sensei, hoje foi um dia maravilhoso!"
2005002-106 = "[s9] \"Ainda é cedo para encerrar o dia.\"\n[s10] \"Ainda temos o trabalho de plantão pela frente...!\""
2005002-109 = "...Eh."
2005002-110 = "[s] \"Vamos lá, rumo ao mundo do trabalho!\""
2005002-111 = "Uééé...!"
2005002-113 = "（Depois disso, terminei o trabalho com a Ritsu, que estava de plantão,#n e conseguimos finalizar tudo por volta do entardecer）"
