[translation]
10002190-1 = "後日談その6;ある種のエクストリームスポーツ"
10002190-2 = "ビーチバレー……つまり、二人一組でチームを組み、砂浜で行う形のバレーボールです。"
10002190-3 = "……なのですが、トリニティの体育の授業では「6人制のバレーボール」しかやったことがないので、ビーチバレーの動きやルールはちょっと良く分からないんですよね……。"
10002190-4 = "だからといって、6人制にするには人数が足りませんし……。"
10002190-5 = "というわけで、今回は特別にスケバンのみなさんに、お相手をお願いすることにしました！"
10002190-11 = "あんたら正気か……？あそこまでドンパチやっておいて、ボール遊びに付き合えって？"
10002190-12 = "いくら負けた身とはいえ、こっちにだってプライドがあんだよ！"
10002190-13 = "あたしらがそんな「はいそうですか」って言うわけが――"
10002190-20 = "……ありまーす！やりたいです！ぜひやらせてください！"
10002190-21 = "じ、実は結構前から、ビーチバレーに興味あったんだよなぁ～。"
10002190-22 = "みんなでやるビーチバレー楽しみだなー！うぇ～い！！！"
10002190-24 = "こんなに快く応じてくださるなんて……。"
10002190-25 = "ありがとうございます！"
10002190-26 = "では、早速始めましょうか？"
10002190-29 = "さて、ネットも設置できましたし……"
10002190-30 = "それでは、ツルギさんのサーブからお願いします！"
10002190-36 = "ちっ、泣く子も黙ると有名なあたしらスケバンが、どうしてこんなことに……。"
10002190-37 = "はぁ……ま、所詮ボール遊びだ。難しいことでもないし、てきとーに付き合って解散ってことにしよう。"
10002190-39 = "あ、そっちにサーブ来――"
10002190-45 = "ぐぼぁぁっっ！？"
10002190-48 = "なっ！？"
10002190-49 = "な、何だ？空襲か！？"
10002190-50 = "い、いや、ただボールが飛んできただけ……の、はず。"
10002190-55 = "つ、ツルギさん。次のサーブをお願いします……できれば、もうちょっと緩めに……。"
10002190-62 = "ぐああぁっっ！"
10002190-67 = "だ、大丈夫か！？衛生兵！衛生兵ーー！！"
10002190-68 = "こ、こんなのビーチバレーじゃない……。"
10002190-69 = "一方的な暴力だ！"
10002190-71 = "暴力反対！どうか平和的な解決を……っ！"
10002190-75 = "（その後、ツルギのサーブはスケバンが全員行動不能になるまで続いた。）"
