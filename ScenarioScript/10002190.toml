[translation]
10002190-1 = "Epílogo 6: Um tipo de esporte radical"
10002190-2 = "Vôlei de praia... ou seja, um tipo de vôlei jogado na areia por equipes de duas pessoas."
10002190-3 = "…Mas, nas aulas de educação física de Trinity, só jogamos vôlei de quadra com seis pessoas, então não entendo muito bem os movimentos e as regras do vôlei de praia..."
10002190-4 = "E, por outro lado, não temos pessoas suficientes para formar um time de seis..."
10002190-5 = "Por isso, decidimos pedir especialmente para as Sukebans serem nossas oponentes!"
10002190-11 = "Vocês estão loucas...? Depois de toda aquela confusão, querem que a gente brinque de bola com vocês?"
10002190-12 = "Mesmo que a gente tenha perdido, ainda temos nosso orgulho!"
10002190-13 = "Não tem como a gente simplesmente aceitar isso assim—"
10002190-20 = "…Nós aceitamos! Queremos jogar! Por favor, deixem a gente participar!"
10002190-21 = "Na verdade, eu já tinha interesse em vôlei de praia faz um tempo~."
10002190-22 = "Estou tão animada para jogar vôlei de praia com todo mundo! Eba!!!"
10002190-24 = "Fico feliz que tenham aceitado tão prontamente..."
10002190-25 = "Muito obrigada!"
10002190-26 = "Então, vamos começar logo?"
10002190-29 = "Bem, a rede já está montada..."
10002190-30 = "Então, Tsurugi-san, por favor, comece com o saque!"
10002190-36 = "Tsc, pensar que nós, as famosas Sukebans que fazem até criança chorar, acabamos nisso..."
10002190-37 = "Haa... bom, é só um jogo de bola. Não é nada difícil, vamos só brincar um pouco e depois ir embora."
10002190-39 = "Ah, o saque está indo na sua dire—"
10002190-45 = "Guh-ahhh!?"
10002190-48 = "O quê!?"
10002190-49 = "Q-que foi isso? Um ataque aéreo!?"
10002190-50 = "N-não, foi só a bola que veio voando... eu acho."
10002190-55 = "T-Tsurugi-san. Por favor, faça o próximo saque... se possível, um pouco mais devagar..."
10002190-62 = "Guaaaahhh!"
10002190-67 = "V-você está bem!? Médico! Chamem um médico!!"
10002190-68 = "I-isso não é vôlei de praia..."
10002190-69 = "Isso é violência unilateral!"
10002190-71 = "Não à violência! Por favor, vamos resolver isso pacificamente...!"
10002190-75 = "(Depois disso, o saque de Tsurugi continuou até que todas as Sukebans ficassem incapacitadas.)"
