[translation]
10049080-1 = "Episódio 8; Qualificada para fazer o bem"
10049080-2 = "Aaaah! N-nós que estávamos erradas, então!!"
10049080-3 = "P-por favor, nos perdoe! Vamos contar todos os pontos fracos da nossa capitã!!"
10049080-4 = "A-a capitã tem uma pegada fraca e... não consegue abrir tampas de garrafa!!"
10049080-5 = "A-ah, e também! Ela tem medo de dormir na parte de cima do beliche!!"
10049080-6 = "Ei!!!"
10049080-14 = "Ohhh!"
10049080-15 = "Ufa..."
10049080-16 = "Que bom que tinha uma bateria de carro."
10049080-17 = "Eu não imaginava que não havia eletricidade aqui."
10049080-18 = "...A propósito, sobre o que vocês estavam falando agora pouco?"
10049080-19 = "[s1] \"Disseram que a Love não consegue abrir tampas de garrafa.\"\n[s2] \"Disseram que a Love tem medo da parte de cima do beliche.\""
10049080-22 = "Sensei!!!"
10049080-23 = "Entendo."
10049080-24 = "Por enquanto, deixe-me organizar as informações."
10049080-25 = "Primeiro, Shimiko-san, que traje é esse...?"
10049080-26 = "Esta é a \"Ela\", uma executiva do mal da Garota Mágica Heavy Caliber."
10049080-27 = "Certamente... parece ser o caso, mas..."
10049080-28 = "Onde você estava até agora?"
10049080-29 = "Bem... eu sou a vilã, não sou?"
10049080-30 = "Sim, é verdade."
10049080-31 = "Se for esse o caso, a história ficaria estranha se eu estivesse junto desde o início, então... eu estava esperando o momento certo."
10049080-33 = "Entendo! Foi uma entrada perfeita!"
10049080-34 = "[ns] \"Pensando bem, foi mesmo!\""
10049080-36 = "..."
10049080-37 = "Sem querer, acabou resultando em um ataque surpresa..."
10049080-38 = "Você apareceu exatamente quando mais precisávamos. Obrigado."
10049080-42 = "A próxima é a Komakaze Love-san."
10049080-43 = "Foi uma longa espera, mas... finalmente posso ouvir o que você tem a dizer."
10049080-44 = "Tenho algumas perguntas para você."
10049080-45 = "O que vocês estavam planejando neste parque de diversões?"
10049080-46 = "Planejando? Do que você está falando?"
10049080-48 = "Três dias atrás... vocês estavam conversando atrás do armazém da Trinity, não estavam?"
10049080-49 = "\"O parque de diversões vai ficar destruído e pessoas vão se ferir\"!"
10049080-50 = "Na verdade, vocês estavam carregando tantas granadas por aí."
10049080-52 = "V-você ouviu a gente!?"
10049080-53 = "Eu disse para falarmos sobre esse tipo de coisa no MomoTalk!"
10049080-55 = "O que isso significa?"
10049080-56 = "Destruir o parque de diversões? Ferir pessoas?"
10049080-57 = "Eu não dei ordens para nada disso!"
10049080-59 = "É um mal-entendido! Não faríamos algo assim!"
10049080-60 = "Se tivéssemos bombas suficientes para destruir tudo, estaríamos trabalhando com demolição!"
10049080-61 = "Mal conseguimos comer direito, não poderíamos fazer algo tão imprudente!"
10049080-63 = "Então, do que aqueles caras estão falando?"
10049080-65 = "Vocês não estão confundindo o \"alvo\"?"
10049080-66 = "Se bem me lembro... acho que falamos algo como: \"se o alvo resistir, vai virar uma luta e o parque de diversões vai ficar destruído\"..."
10049080-68 = "Espere um pouco. Quem é o \"alvo\"?"
10049080-69 = "Quem vocês estão visando e por quê? Explique."
10049080-71 = "Se eu te contar, você vai parar de atrapalhar a gente?"
10049080-72 = "Com certeza. #n... Desde que vocês não estejam fazendo nada de ruim, é claro."
10049080-74 = "[ns] \"Eu também garanto isso.\""
10049080-75 = "Tsc, até o Sensei..."
10049080-76 = "Tá bom, tá bom. Haa..."
10049080-77 = "Nós estamos ajudando com a fiscalização agora."
10049080-78 = "O Grupo do Capacete? #nE com que autoridade, exatamente?"
10049080-79 = "Não tem problema, tem? Precisa de autoridade para fazer algo bom?"
10049080-83 = "Mesmo a gente quer fazer um bom trabalho se for para ganhar dinheiro."
10049080-84 = "Um trabalho que não cause problemas para a Valkyrie, para o Comitê Disciplinar ou para o Comitê de Justiça."
10049080-85 = "E sobre o trabalho... parece que tem umas falsificações estranhas circulando por aí."
10049080-86 = "Dizem que se pegarmos o culpado, recebemos uma recompensa."
10049080-87 = "Por isso, pensamos em ganhar um trocado também."
10049080-89 = "Falsificações...?"
10049080-90 = "Isso. Tipo as granadas que estão carregadas no nosso carrinho."
10049080-91 = "Tinha uns slogans bem estranhos. Tipo 'Granada de Germânio', ou 'Força Triangular' porque o pino de segurança é triangular e faz bem para a saúde..."
10049080-92 = "Além disso, tinha um monte de porcaria barata."
10049080-93 = "Balões que esvaziam sozinhos, baldes de pipoca mal feitos..."
10049080-94 = "Confiscamos as granadas e os baldes de pipoca, mas ainda não pegamos o culpado."
10049080-95 = "O parque de diversões é grande... acho que vamos acabar deixando ele escapar..."
10049080-96 = "Balões que esvaziam... baldes de pipoca mal feitos...?"
10049080-98 = "O balão murchou... e eu acabei de comprar..."
10049080-99 = "Waaah! A tampa do balde de pipoca... quebrou!"
10049080-100 = "Waaah!"
10049080-101 = "Atendente! Isso aqui! Troca por um novo pra mim!"
10049080-109 = "O quê? Vai soltar a gente?"
10049080-110 = "...Pessoal do Grupo do Capacete."
10049080-111 = "Sinto muito por ter causado problemas por causa de um mal-entendido meu."
10049080-113 = "Hã? Depois de atrapalhar a gente até aqui, acha que um pedido de desculpas resolve—"
10049080-118 = "Eu realmente sinto muito."
10049080-122 = "E-eh!? ...Ah, é mesmo?"
10049080-123 = "Qualquer um pode se enganar, né?"
10049080-124 = "Já pediu desculpas, então pronto. Acabou!"
10049080-126 = "Eu também sinto muito pelo mal-entendido."
10049080-127 = "C-como posso me desculpar...!"
10049080-129 = "Já chega disso!!!"
10049080-130 = "...Agora entendi a situação."
10049080-131 = "Se não se importarem, poderiam nos deixar ajudar também?"
10049080-132 = "Hã? Por que a mudança repentina?"
10049080-133 = "Quero compensar o fato de termos atrapalhado o seu trabalho com ações."
10049080-134 = "...Você acha que esse alvo vai contra a justiça, Love?"
10049080-135 = "Pelo menos não é uma boa pessoa, né? Mesmo que eu não seja a melhor pessoa para dizer isso."
10049080-136 = "Então, é um fato que ele causou danos a cidadãos inocentes, certo?"
10049080-137 = "Se me fizessem comprar algo assim, eu também ficaria brava."
10049080-138 = "...Entendido."
10049080-139 = "Já temos uma ideia de onde o culpado está."
10049080-140 = "Daqui em diante, o grupo de vigilantes vai ajudar."
10049080-142 = "...!"
10049080-143 = "Sim!"
10049080-144 = "O Comitê da Biblioteca também vai dar todo o suporte!"
10049080-146 = "[ns3] \"Eu também estou pronta!\"\n[ns4] \"O 'Sensei que corre pelo Schale' também está pronto!\""
10049080-150 = "Se vocês querem ajudar de graça, não tenho motivos para recusar."
10049080-151 = "Não sabemos nem quantos eles são."
10049080-155 = "Vocês eram da Vigilância e do Comitê da Biblioteca!?"
