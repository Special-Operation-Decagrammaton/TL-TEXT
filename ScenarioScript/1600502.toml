[translation]
1600502-1 = "夏の海といえば……"
1600502-2 = "（海辺に着くと、遠くにツルギが見えた）"
1600502-6 = "（周りは静かで……というよりも、人けがほとんど無かった。ツルギは何かを探しているかのようにキョロキョロと周囲を見渡している）"
