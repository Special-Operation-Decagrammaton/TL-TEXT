[translation]
1600502-1 = "Falando em mar de verão..."
1600502-2 = "（Ao chegar à praia, vi Tsurugi ao longe）"
1600502-6 = "（O local estava silencioso... ou melhor, quase não havia ninguém. Tsurugi olhava ao redor, inquieta, como se estivesse procurando por algo）"
1600502-7 = "……。"
1600502-8 = "[s1] \"Tsurugi, desculpe a demora!\"\n[s2] Aceno para Tsurugi."
1600502-9 = "……！！"
1600502-10 = "……！！"
1600502-11 = "O-olá... Sensei...!"
1600502-12 = "O-obrigada por vir. Eu entrei em contato porque, bem..."
1600502-13 = "Parece um pouco difícil fazer isso sozinha, então eu queria pedir a ajuda do Sensei..."
1600502-14 = "……。"
1600502-15 = "[s3] \"O que devo fazer?\"\n[s4] \"Parece que você estava procurando por algo.\""
1600502-16 = "Ah, sim, na verdade, é sobre algo que estou procurando..."
1600502-17 = "Ah, sim, na verdade, é sobre algo que estou procurando..."
1600502-18 = "Bem, explicando desde o início..."
1600502-20 = "（Uma hora atrás）"
1600502-24 = "……Kihi... Kihihihihi!!"
1600502-25 = "Mar...! Praia...!!!!! Sol!!!!"
1600502-26 = "Juventude...! O mar da juventude...!!"
1600502-28 = "Kihihihihihihi!!!!"
1600502-29 = "Kihi...?"
1600502-31 = "Hii...!? O-o que é aquilo?"
1600502-32 = "……Hã?"
1600502-33 = "Tem algo estranho no mar..."
1600502-34 = "U-um monstro...? Não, um fantasma!?"
1600502-35 = "……?"
1600502-36 = "Fantasma...?"
1600502-37 = "Silêncio! Se aquilo vier para cá, estamos perdidos, vamos fugir logo!"
1600502-38 = "C-certo. Olha, as lojas próximas também estão fechando uma a uma..."
1600502-39 = "Vamos fugir devagar, mantendo-o no campo de visão. Se nossos olhos se cruzarem, não desvie o olhar, apenas recue de costas...!"
1600502-40 = "……？？？"
1600502-41 = "（Murmúrios...）"
1600502-44 = "……。"
1600502-47 = "Ah...?"
1600502-49 = "E, por isso, não sobrou mais ninguém aqui além de mim..."
1600502-50 = "Se continuar assim, não vou conseguir ver aquela cena brilhante e animada de verão que li nos livros... e isso seria um problema..."
1600502-51 = "Pensei que precisava encontrar esse \"fantasma\" e eliminá-lo..."
1600502-52 = "[s] \"……。\""
1600502-54 = "[s] \"……！\""
1600502-55 = "Procurei bastante, mas não encontrei... Será que ele escondeu sua presença...?"
1600502-56 = "Pensei que talvez houvesse um jeito melhor, então entrei em contato com o Sensei..."
1600502-57 = "[s] \"Isso, provavelmente...\""
1600502-58 = "……Sensei?"
1600502-59 = "[s] \"……。\""
1600502-61 = "[s5] \"É um problema difícil...\"\n[s6] （Não posso dizer, eu não posso dizer...!）"
1600502-62 = "S-Sensei? Por que está olhando para uma direção estranha? Tem um fantasma ali...?"
1600502-63 = "S-Sensei? Por que está olhando para uma direção estranha? Tem um fantasma ali...?"
1600502-64 = "N-não é nada, é...? Ah, entendo, desculpe..."
1600502-65 = "É que, por um instante, você fez uma expressão como se tivesse notado algo..."
1600502-66 = "Mas o que faremos agora... se continuar assim..."
1600502-67 = "Já que viemos até a praia, como posso dizer... a situação está bem diferente daquelas que li nas histórias..."
1600502-68 = "O, o que eu faço..."
1600502-69 = "Será que é melhor desistir e ir para outra praia?"
1600502-70 = "[s7] (O estrago só vai aumentar...)\n[s8] Fica pensativa."
1600502-71 = "O, o que eu deveria fazer..."
1600502-72 = "O, o que eu deveria fazer..."
1600502-73 = "Uuu..."
1600502-74 = "...E, então."
1600502-75 = "Será que é impossível mesmo... Será que nunca vou conseguir vivenciar esse tipo de clima na minha vida inteira..."
1600502-76 = "...?"
1600502-77 = "Uma praia tranquila também não é ruim, você diz...?"
1600502-78 = "É, verdade que, mesmo assim, o mar continua lindo, mas..."
1600502-79 = "[s9] \"Estar a sós é um som agradável, não é?\"\n[s10] \"Uma praia só para nós dois, não é romântico?\""
1600502-80 = "É, é verdade..."
1600502-81 = "É, é verdade..."
1600502-82 = "U, uma praia só para nós dois..."
1600502-83 = "...Só para nós dois..."
1600502-84 = "...?"
1600502-85 = "...Só, nós dois?"
1600502-86 = "...!!!?!?"
1600502-87 = "[s] \"...Tsurugi?\""
1600502-88 = "...Ki,"
1600502-89 = "[s] \"...Ki?\""
1600502-90 = "...Kieeeeeee!!!"
1600502-93 = "(...?)"
1600502-95 = "(...Acabou virando uma praia solitária)"
