1600502-58 = "……先生？"
1600502-59 = "[s] \"……。\""
1600502-61 = "[s5] \"難しい問題だね……。\"\n[s6] （言えない、私には言えない……！）"
1600502-62 = "せ、先生？変な方向を向いてどうかしましたか？あっちの方に、お化けが……？"
