1600502-50 = "このままだと本で読んだような、夏っぽい、キラキラしてにぎやかな光景が見られないので……それは困るなと思い……。"
1600502-51 = "その「お化け」を私が探し出して、消し去らないとと思ったのですが……。"
1600502-52 = "[s] \"……。\""
1600502-54 = "[s] \"……！\""
1600502-55 = "だいぶ探したのですが、見つからず……気配を絶っているのか……。"
