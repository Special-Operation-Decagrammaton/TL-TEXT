[translation]
10049070-1 = "Episódio 7; A Stunag-chan se esforça"
10049070-3 = "Movendo-se lentamente na direção de 35 graus."
10049070-4 = "A distância relativa estimada é de 70 jardas."
10049070-5 = "A marca do alvo é amarela."
10049070-7 = "[ns1] \"Amarela?\"\n[ns2] \"A roupa da Love era dessa cor?\""
10049070-10 = "Hmm... era branca e vermelha, com um pouco de preto e cinza misturados—"
10049070-11 = "Parecia um daifuku de morango, não é?"
10049070-12 = "Vamos confirmar com nossos próprios olhos. #nAmarelo... é aquela pessoa ali."
10049070-16 = "Capitã! São eles de novo!"
10049070-17 = "Droga, vocês não desistem nunca, hein..."
10049070-19 = "...Por que estão vestidos assim?"
10049070-20 = "Acho que vocês também não têm muita moral para falar!?"
10049070-21 = "Quer dizer, vocês não conhecem isso...?"
10049070-23 = "Que estranho... talvez eu tenha confundido a série..."
10049070-24 = "E-essa é... a mascote de Maho-Reba, a \"Stunag-chan\"!"
10049070-25 = "Ela não é forte, mas é uma garota gentil que ajuda a White e a Pink!"
10049070-26 = "Fufufu. Exatamente!"
10049070-27 = "Eu pesquisei sobre o conteúdo do show que vocês estão fazendo!"
10049070-28 = "Agora vocês não podem mais atrapalhar, certo? #nNão vão atacar uma aliada, vão?"
10049070-32 = "Ah, parece que o show da tarde vai começar!"
10049070-33 = "Não tem gente demais aqui?"
10049070-35 = "Nos encontramos de novo! Thermite White! Pink!"
10049070-36 = "A Stunag-chan também está aqui!"
10049070-38 = "Com isso, vocês não têm como reagir, certo?"
10049070-39 = "É melhor vocês se retirarem se quiserem continuar inteiras!"
10049070-41 = "Ohohoho!"
10049070-42 = "Heavy Calibers e o resto dos fracotes!"
10049070-49 = "Essa voz... parece familiar—"
10049070-50 = "Ou talvez não... não tenho certeza..."
10049070-51 = "[ns] \"O que é isso...?\""
10049070-55 = "Como ousam causar tanta confusão por conta própria."
10049070-56 = "O que é agora!?"
10049070-58 = "Quem é você!?"
10049070-60 = "[ns3] \"Aquela é... a Shimiko do Comitê da Biblioteca!\"\n[ns4] \"Aquela é... a executiva do mal, Ella!\""
10049070-63 = "Shimiko-san... o que significa isso!?"
10049070-64 = "Não conseguíamos contato até agora... e você aparece aqui!?"
10049070-66 = "Thermite White, Thermite Pink. E também... a detestável Stunag."
10049070-67 = "Foi uma sorte encontrar todas no mesmo lugar."
10049070-68 = "Ajoelhem-se diante do meu poder — o poder de Ella!"
10049070-70 = "É a executiva do mal, Ella!"
10049070-71 = "Será que a White e a Pink vão conseguir vencer..."
10049070-73 = "Executiva... do mal?"
10049070-75 = "Será que a Stunag-chan vai ser espancada de novo hoje..."
10049070-76 = "Hã...?"
10049070-77 = "Não pode ser..."
10049070-78 = "Força, Stunag-chan!"
10049070-79 = "Só pode ser brincadeira—"
10049070-80 = "Dancem com a minha magia!"
10049070-81 = "Por que as coisas terminaram assim!!!"
