[translation]
1000003-1 = "A Arte da Persuasão"
1000003-2 = "17ª Biblioteca de Gehenna"
1000003-3 = "Sensei, qual você acha que é a habilidade mais importante para um líder que guia uma organização?"
1000003-4 = "[s] \"Carisma para conquistar o coração dos funcionários?\""
1000003-5 = "Entendo, essa é a resposta padrão de sempre. E também está correta."
1000003-6 = "Mas existe algo ainda mais importante, sabia?"
1000003-7 = "[s1] \"Fofura para ser o mascote da organização?\"\n[s2] \"Sensualidade para ser o mascote da organização?\""
1000003-8 = "Nada a ver! Isso não é nem um pouco necessário!"
1000003-9 = "Nada a ver! Isso não é nem um pouco necessário!"
1000003-10 = "Escute bem, Sensei. A habilidade mais necessária para um líder é..."
1000003-11 = "[s] \"Qual habilidade?\""
1000003-12 = "A \"arte da persuasão\", capaz de trazer qualquer um para o seu lado!"
1000003-13 = "[s] \"Isso é uma resposta padrão.\""
1000003-14 = "E daí que é padrão! É a mais importante de todas!"
1000003-15 = "Enfim, a habilidade de persuadir os outros é algo fundamental nos negócios."
1000003-16 = "Em qualquer empreendimento, se você não conquistar a outra parte primeiro, não conseguirá criar uma situação favorável para si mesmo."
1000003-17 = "Claro, como eu sou uma presidente, já estou acostumada a persuadir as pessoas, sabe?"
1000003-18 = "Por isso, quem vai estudar a arte da persuasão hoje não sou eu, é você, Sensei."
1000003-19 = "[s] \"Eu?\""
1000003-20 = "Como você é meu parceiro de negócios, preciso verificar o quanto você tem de capacidade como presidente, não é?"
1000003-21 = "A situação é a seguinte."
1000003-22 = "O Sensei é um recém-formado que veio aqui porque quer entrar para a nossa Loja de Conveniência."
1000003-23 = "Eu sou a entrevistadora responsável pela sua entrevista."
1000003-26 = "Tome, este livro contém vários métodos de persuasão."
1000003-27 = "Use-o como referência e tente me convencer."
1000003-28 = "Tente me persuadir a querer te contratar para a nossa empresa."
1000003-31 = "(O livro que recebi da Aru continha várias técnicas de persuasão.)"
1000003-32 = "(Técnica de persuasão número um: a técnica de persuasão utilizando a lei da reciprocidade.)"
1000003-33 = "(Dar e receber. Se você quer algo de alguém, ofereça um serviço primeiro para fazê-lo se sentir em dívida.)"
1000003-34 = "[s] \"Aru, eu pago um lámen no jantar de hoje, então me contrate.\""
1000003-35 = "U-um jantar com o Sensei!?"
1000003-36 = "S-sim, tudo bem! Está decidido!"
1000003-37 = "……Não, espera! Você acha mesmo que só porque vai pagar um lámen para a entrevistadora, eu vou te contratar!?"
1000003-38 = "Esquece o que eu disse! Esquece!"
1000003-40 = "Não vou ser enganada por um plano superficial como aquele de novo. Vamos, tente me convencer de novo, Sensei."
1000003-41 = "(Técnica de persuasão número dois: a técnica de persuasão utilizando a importância de ouvir.)"
1000003-42 = "(Para persuadir alguém, é melhor ouvir bem o que a pessoa tem a dizer antes de expor sua própria opinião.)"
1000003-43 = "[s] \"Aru, você deve estar ocupada com o trabalho de presidente, não é?\""
1000003-44 = "Hm? É, pois é. Só de resolver as reclamações dos clientes toda vez já é um trabalho exaustivo."
1000003-45 = "[s] \"Você precisa de alguém para te ajudar, não precisa?\""
1000003-46 = "Bem, isso é verdade, não é?"
1000003-47 = "[s] \"Então, que tal me contratar?\""
1000003-48 = "Certo, vamos fazer isso?"
1000003-49 = "……Não é isso! Ei, você não está tentando entrar na empresa sem fazer esforço nenhum!?"
1000003-50 = "Não subestime a entrevista! Eu sou uma fortaleza! Não sou uma líder que se deixa convencer tão facilmente!"
1000003-51 = "[s] \"Eu acho que serei muito útil para a Aru, com certeza.\""
1000003-52 = "I-isso foi direto demais!?"
1000003-53 = "Argh, mesmo sabendo disso, sinto que vou acabar sendo convencida……!"
1000003-54 = "Sensei…… você é um mestre da persuasão, não é!"
1000003-56 = "（Depois disso, cada vez que eu testava uma das técnicas do livro, Aru me aprovava na entrevista）"
1000003-57 = "（Consegui 24 empregos em apenas meio dia）"
