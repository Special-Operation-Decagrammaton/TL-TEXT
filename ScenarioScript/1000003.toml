[translation]
1000003-1 = "説得の技術"
1000003-2 = "ゲヘナ第17図書館"
1000003-3 = "先生、組織を導くリーダーに一番必要なスキルって何だと思う？"
1000003-4 = "[s] \"職員たちの心をつかむカリスマ性？\""
1000003-5 = "なるほど、よく言われる一般論ね。それもまた正しいわ。"
1000003-6 = "でも、もっと大事なものがあるわよ？"
1000003-7 = "[s1] \"組織のマスコットになれるような可愛さ？\"\n[s2] \"組織のマスコットになれるような色っぽさ？\""
1000003-8 = "全然違うわよ！そんなの絶対必要ないわ！"
1000003-9 = "全然違うわよ！そんなの絶対必要ないわ！"
1000003-10 = "いい、先生？リーダーに何より必要なスキルとは……"
1000003-11 = "[s] \"スキルとは？\""
1000003-12 = "相手を味方に引き入れられる、「説得の技術」よ！"
1000003-13 = "[s] \"一般論だね。\""
1000003-14 = "一般論でいいの！これが一番大事なの！"
1000003-15 = "……とにかく、相手を説得できる技術はビジネスにおいて、とても大事なことよ。"
1000003-16 = "どんな事業でも、まずは相手を攻略しないと自分に有利な状況は作れないからね。"
1000003-17 = "もちろん私は社長だから？人を説得することにはもう慣れてるけど？"
1000003-18 = "だから、今日説得の技術を勉強するのは、私ではなくて先生の方よ。"
1000003-19 = "[s] \"私？\""
1000003-20 = "先生は私の事業パートナーなのだから、#n 社長としてどれぐらいの能力があるのか確認しておかないとね？"
1000003-21 = "状況の設定はこうよ。"
1000003-22 = "先生は、うちの便利屋に入社したくて訪ねてきた新卒の就活生ね。"
1000003-23 = "私は今、先生の面接を担当する面接官。"
1000003-26 = "はい、この本には説得をするための色々な方法が書いてあるから。"
1000003-27 = "これを参考に、ちょっと私を説得してみて。"
1000003-28 = "私に、うちの会社に就職させたいと思わせるように説得するの。"
1000003-31 = "（アルから受け取った本には、説得に関する様々な技術が書いてあった）"
1000003-32 = "（説得技術その一、相互作用の法則を利用した説得の技術）"
1000003-33 = "（Give and take。相手に求めるものがあるなら、こちらから先にサービスを提供して、申し訳ない気にさせよう）"
1000003-34 = "[s] \"アル、今日の夕食にラーメン奢るから、私を雇って。\""
1000003-35 = "せ、先生とディナー！？"
1000003-36 = "ええ、いいわよ！決まりね！"
1000003-37 = "……っじゃなくて！面接官にラーメン奢るからって、入社させてくれると思うわけ！？"
1000003-38 = "今のは無し！無しだから！"
1000003-40 = "さっきみたいな薄っぺらい作戦にはもう騙されないんだから。さあ、もう一度私を説得してみて、先生。"
1000003-41 = "（説得技術その二、傾聴の重要性を活用した説得の技術）"
1000003-42 = "（相手を説得するためには、相手の話をよく聞いてから自分の意見を話すのが良い）"
1000003-43 = "[s] \"アルは社長としての仕事が忙しいでしょ？\""
1000003-44 = "うん？そうね、毎回依頼人のクレームを解決するだけでも大変だもの。"
1000003-45 = "[s] \"手伝ってくれる人手が必要なんだよね？\""
1000003-46 = "まあ、確かにそうね？"
1000003-47 = "[s] \"じゃあ私を雇うのはどう？\""
1000003-48 = "そうね、そうしましょうか？"
1000003-49 = "……じゃなくて！ちょっと、なんだか楽して入社しようとしてない！？"
1000003-50 = "面接を舐めないでちょうだい！私は鉄壁だから！そんな簡単に説得されないリーダーなんだから！"
1000003-51 = "[s] \"私、きっとアルにとってすごく役に立つと思うけど。\""
1000003-52 = "こ、ここに来てストレート！？"
1000003-53 = "くうっ、分かってても説得されちゃいそう……！"
1000003-54 = "先生は……説得の達人だったのね！"
1000003-56 = "（その後も、本に載ってる技術をひとつひとつ試してみるたびに、アルは私を合格にしてくれた）"
1000003-57 = "（半日で24回も就職した）"
