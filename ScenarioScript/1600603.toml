[translation]
1600603-1 = "イズミと秘密の材料"
1600603-3 = "[ns1] \"それでイズミ、どこに行くの？\"\n[ns2] \"海に行かなくていいの？\""
1600603-4 = "ふふふっ……。"
1600603-5 = "ふふふっ……。"
1600603-6 = "まだまだ甘いね、先生！夏の珍味は、何も海にだけあるわけじゃないんだよ！"
1600603-7 = "私の調査によると、この辺りに結構有名なお店が……！"
1600603-8 = "[s] \"美食研究会の誰かから教えてもらったの？\""
1600603-9 = "ううん、海にいた通りすがりのおばあちゃんから！"
1600603-10 = "荷物が重そうだったから手伝ったら、そのおばあちゃんがおせんべいをくれてね。"
1600603-11 = "そのエビのおせんべいがすっごく美味しくて、見た目こそ普通だったんだけど、パリって噛んだ瞬間に濃縮されたエビの香りが――"
1600603-12 = "[s] \"イズミ、全力で脱線してるよ……。\""
1600603-13 = "はっ！じゅるり……"
1600603-14 = "え、えっと、何の話だっけ？"
1600603-15 = "そうそう、そのおばあちゃんから教えてもらったんだけど、この先に「冷やし中華」で有名な屋台があるんだって！"
1600603-16 = "今日はそれを食べに行きたいなって思って！"
1600603-20 = "到着ー！"
1600603-21 = "ここが例の冷やし中華のお店だね！"
1600603-22 = "[s] \"でも、何て言うかその……。\""
1600603-25 = "あれ、地域の名物のはずなのに、全然人がいないね……？"
1600603-26 = "もしかして……もう潰れちゃった！？"
1600603-27 = "えぇっ、せっかく炎天下の中を30分も歩いてきたのに！"
1600603-28 = "無駄足だったの！？やだー！"
1600603-29 = "[s] \"えっと、お店の前でそういうこと言わない方が……。\""
1600603-30 = "ま、まだ潰れてないやい！"
1600603-31 = "くぅっ……これも全部、あの浜辺に新しくできた海の家のせいだ……。"
1600603-32 = "「棒倒しのキヴォトスチャンピオン」とやらが運営するお店に、お客さんを根こそぎかっさらわれちまった……。"
1600603-33 = "あ、潰れてないんだ？"
1600603-34 = "じゃあ冷やし中華二つ！"
1600603-35 = "[s] \"もうちょっと話を聞いてあげよう！？\""
1600603-37 = "ご注文の冷やし中華二つ、お待ち！"
1600603-39 = "わっ、綺麗ー！それに美味しそう！"
1600603-40 = "じゃあ早速、いただきます……！"
1600603-45 = "[ns] \"どう？\""
1600603-46 = "……うーん、美味しいんだけど……何か足りない。"
1600603-47 = "これは、んーと、なんだろ……あ、分かった！"
1600603-49 = "[s] \"イズミ、今何を入れたの？\""
1600603-50 = "これ？私の自家製ピーナッツバターだよ？"
1600603-51 = "こうやって全体的に混ぜてっと……うん、バッチリ！"
1600603-52 = "これでもっと美味しくなったはず！先生もどう？"
1600603-53 = "[s3] \"冷やし中華に、ピーナッツバター……！？\"\n[s4] \"イズミの自家製って言ってたけど、それってどんな……。\""
1600603-60 = "はいっ、先生！あ～ん！"
1600603-61 = "（……）"
1600603-62 = "（覚悟して、イズミに差し出された冷やし中華 with ピーナッツバターを味わった）"
1600603-63 = "（モグモグ……）"
1600603-64 = "（……ごくん）"
1600603-67 = "（これは……冷やし中華のスープと具材、そこにピーナッツバターの濃厚な甘さが合わさって絶妙なアンサンブルを……！）"
1600603-68 = "[s] \"な、なんで！？これ美味しいんだけど！？\""
1600603-69 = "でしょでしょー！？絶対合うと思ったんだ！"
1600603-70 = "私もいただきまーっす！"
1600603-73 = "うん、やっぱり美味しい！"
1600603-74 = "[s] \"ど、どうして……？\""
1600603-77 = "（翌日……）"
1600603-78 = "えええぇぇぇぇ！？ど、どうして今日はこんなに人が多いの！？"
1600603-79 = "[s] \"昨日と同じ場所だとは思えないね。\""
1600603-80 = "今日は冷やし中華じゃない、別のメニューを食べようと思ってたのに！"
1600603-81 = "これじゃ私たち、常夏グルメコンビが座る席がないよ！どうしよう先生！？"
1600603-82 = "[s] \"その名前、気に入ってるんだね……。\""
1600603-83 = "ううーん……仕方ない、他のお店に行こっか。"
1600603-84 = "ちょうどあのおばあちゃんから、冷やし中華以外にも美味しいお店を教えてもらってたから。"
1600603-85 = "残念だけど、今日はそっちに行こう！"
1600603-87 = "[ns] \"ここ？\""
1600603-88 = "うん、「うな重」で有名なお店なんだって。"
1600603-89 = "でも、ここもあんまり人がいないね……"
1600603-90 = "まさか潰れちゃった！？"
1600603-91 = "そんなことないよね！？まだ開店前なだけだよね！？"
1600603-92 = "つ、潰れてないですよお客様……！"
1600603-93 = "ただ、お客さんはほとんど「棒倒しのキヴォトスチャンピオン」のお店と、なぜか今朝から急に混み始めた冷やし中華の屋台に取られてしまい……。"
1600603-95 = "なら良かった！"
1600603-96 = "うな重二つお願いしまーす！"
1600603-98 = "お待たせしました、うな重です！"
1600603-100 = "わーい！じゃあ早速……"
1600603-105 = "……んんんんんん？"
1600603-106 = "んー、むむむむ……？"
1600603-107 = "[s] \"もしかして、これは……。\""
1600603-108 = "うん、確かに美味しいんだけど……美味しいんだけどー……。"
1600603-109 = "何でだろ、うーん……。"
1600603-110 = "[s] \"何かが足りない感じ？\""
1600603-111 = "うん、そう！何かがちょっと足りない！"
1600603-112 = "あと一歩が足りない感じがしてて、うーん……これはやっぱり……。"
1600603-117 = "[ns] \"もしかして、それって……？\""
1600603-118 = "うん、こういう時は私の自家製ピーナッツバターかなって！"
1600603-123 = "じゃああらためて、モグモグモグ……"
1600603-124 = "うん、やっぱり！もっと美味しくなった！！"
1600603-125 = "先生もどう？"
1600603-126 = "[s] \"えっと……。\""
1600603-131 = "さあ、先生。あ～ん……！"
1600603-134 = "（口の中いっぱいに広がる鰻の香ばしい甘さと微かな苦み、そこに上から優しく包み込むようなピーナッツバターの風味が、ハーモニーを奏でて……）"
1600603-135 = "（うな重は進化した！）"
1600603-136 = "ね、美味しいでしょ？"
1600603-137 = "やっぱりピーナッツバターには不思議な力があるんだよ！食パンに塗ると、絶対にそっちの面が落ちるっていう話もあるくらいだし！"
1600603-138 = "ピーナッツバターってすごい！"
1600603-139 = "[s5] \"それはまた何かちょっと違うような……？\"\n[s6] \"でも美味しい……なんでこれ美味しいの……？\""
1600603-140 = "えっへん！これでも私、美食研究会の一員なんだよ？"
1600603-141 = "えっへん！これでも私、美食研究会の一員なんだよ？"
1600603-142 = "食のことなら私たちにお任せあれ、これぐらいのアレンジは基本だよ！"
1600603-143 = "（頭では理解できないのに舌が喜んでおり、ただただ謎は深まるばかりだった……）"
1600603-146 = "（翌日、そのうな重のお店に行くと……）"
1600603-147 = "あれぇ！？またすっごい混んでる！？"
1600603-148 = "昨日までは閑古鳥が鳴いてて、もう潰れる直前みたいな感じだったのに！何で！？"
1600603-149 = "[s] \"イズミ、言い方をもうちょっと優しく……。\""
1600603-150 = "うわああぁぁん！せっかく今日は「鰻巻き」の気分だったのに～！"
1600603-151 = "でも、どうして行く先々でこんなことに……？"
1600603-156 = "あっ、あの子です！あの子の手にかかると、どんな料理もたちまち大人気に……！"
1600603-157 = "びっくりしたんですけど、本当なんですよ！"
1600603-158 = "あの子か！"
1600603-159 = "なるほど、あの女の子が……！"
1600603-160 = "どんなに潰れそうなお店でも、一瞬で生き返らせるという伝説のフードコンサルタント！？"
1600603-161 = "[s] \"……え？\""
1600603-162 = "どうか、どうか我々にも！"
1600603-163 = "何か秘訣を！アドバイスを！"
1600603-164 = "助けてくれお嬢ちゃん！"
1600603-166 = "ふええぇぇぇ！？な、何々！どういうこと！？"
1600603-167 = "[s] \"イズミ、一旦逃げよう。\""
1600603-168 = "わ、私はただ、夏の珍味をいっぱい食べたかっただけなのに～～～！！"
1600603-170 = "（そうやって押し寄せる店主たちを振り切り、イズミと一緒に海辺まで逃げた）"
