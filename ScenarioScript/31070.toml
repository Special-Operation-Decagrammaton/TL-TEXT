[translation]
31070-1 = "Episódio 7;Estudo para a Prova"
31070-2 = "(Horário de estudo livre, depois da aula)"
31070-3 = "Hanako, como é que resolve esta questão?"
31070-4 = "Qual? Ah, sei. Numa hora dessas, é o seguinte: usando o critério de divisibilidade, assim……."
31070-5 = "Sei…… sim, entendi."
31070-6 = "……."
31070-9 = "……?"
31070-10 = "É que, Koharu? Teve alguma questão que você não entendeu?"
31070-11 = "N-não! Que nada!?"
31070-12 = "A propósito, essa página que você tá vendo agora não faz parte da matéria da prova desta vez, viu."
31070-13 = "Hã, mentira!?"
31070-14 = "N-não, não é iss――! E-eu sei disso! A matéria desta vez tá tranquila, então eu só tava adiantando o que vem depois!"
31070-15 = "A-ahaha……."
31070-18 = "Hanako, que frase é esta?"
31070-19 = "É o começo de uma epopeia antiga. Aquela do \"Canta a ira, ó divindade――\"……"
31070-20 = "Ah, aquilo. Entendi."
31070-25 = "……."
31070-28 = "Hanako, isto é……."
31070-29 = "Isto é uma retradução de uma língua antiga. Pra entender o original, sem um dicionário fica difícil…… espera um pouquinho, tá."
31070-30 = "Ah, sei. Então isto é, provavelmente, \"Gaudium et Spes\"…… alegria e esperança, né."
31070-31 = "É que…… sim, parece que é isso. Isto é do Segundo Concílio…… não, mais do que isso, a Azusa sabe ler a língua antiga?"
31070-32 = "Ah, aprendi tempos atrás."
31070-37 = "……."
31070-39 = "[ns] \"Parece que tá indo bem.\""
31070-40 = "Sim! A Hanako é incrível de algum jeito……! E a Azusa também tem uma baita vontade de aprender!"
31070-41 = "E dizem que a Koharu estava escondendo o próprio potencial……."
31070-42 = "Assim, quem sabe, a gente até consiga passar com folga……!"
31070-43 = "Que bom, de verdade…… é que, na real, eu tava superpreocupada……."
31070-44 = "É que o Tea Party me disse: \"se aparecer alguém reprovado no 1º exame, façam um acampamento de estudos\"……."
31070-45 = "[s] \"Acampamento?\""
31070-46 = "Sim, isso mesmo…… e, além disso, se a gente reprovar em todos até o 3º exame…… auu……."
31070-47 = "[s] \"Vai acontecer alguma coisa ruim……?\""
31070-48 = "N-não é nada……! A preocupação parece que vai dar em nada, então vamos parar com assunto sombrio……."
31070-49 = "Enfim, a prova parece que vai ser tranquila!"
31070-53 = "A Hanako parece que manja muito de estudo, mas por que será que ela reprovou……? Será que, como eu, ela não pôde fazer a prova, ou teve alguma circunstância……?"
31070-55 = "1º Exame Especial de Aptidão, dia da prova"
31070-58 = "……Gh."
31070-59 = "Uu……."
31070-63 = "Ufu."
31070-64 = "……."
31070-67 = "[ns] \"Pessoal, com calma e capriche.\""
31070-68 = "V-vou mostrar o poder de uma elite!"
31070-69 = "A-ahaha…… vou me esforçar."
31070-70 = "Ufu, sim."
31070-71 = "Preparação perfeita."
31070-76 = "Próximo Episódio;1º Exame Especial de Aptidão"
