[translation]
31070-1 = "Episódio 7: Vamos Estudar pra Prova"
31070-2 = "（Hora de estudo após as aulas）"
31070-3 = "Hanako, como se resolve esse problema?"
31070-4 = "Qual? Ah, entendi. Nesses casos, a gente usa o método de divisibilidade múltipla assim…"
31070-5 = "Entendi… sim, saquei."
31070-6 = "……。"
31070-9 = "……？"
31070-10 = "Eh, Koharu-chan? Tem alguma questão que você não entendeu?"
31070-11 = "N-nada não！？"
31070-12 = "Aliás, a página que você tá olhando agora não faz parte do conteúdo da prova."
31070-13 = "Eh, mentira！？"
31070-14 = "N-não é…！ Eu já sei tudo isso！ Só tava adiantando os estudos porque o resto tá fácil pra mim！"
31070-15 = "A-ahaha……"
31070-18 = "Hanako, o que significa esse texto?"
31070-19 = "É o começo de um antigo poema épico. «Cante a ira, ó deusa――»…"
31070-20 = "Ah, esse. Saquei."
31070-25 = "……。"
31070-28 = "Hanako, isso aqui…"
31070-29 = "Isso é uma tradução de um texto antigo. Pra entender o original, precisa de um dicionário… espera um pouco."
31070-30 = "Ah, entendi. Então isso provavelmente é «Gaudium et Spes»…… alegria e esperança."
31070-31 = "Eh… sim, parece que sim. Isso é do Segundo Concílio… espera, Azusa-chan sabe ler línguas antigas?"
31070-32 = "Ah, aprendi faz tempo."
31070-37 = "……。"
31070-39 = "[ns] \"Parece que tá indo bem.\""
31070-40 = "Sim！ A Hanako-chan é incrivelmente boa…！ E a Azusa-chan também tá super motivada pra estudar！"
31070-41 = "A Koharu-chan disse que tava escondendo o verdadeiro poder…"
31070-42 = "Com isso, talvez a gente consiga passar de boa na prova……！"
31070-43 = "Que alívio… eu tava super preocupada…"
31070-44 = "Na verdade, o Tea Party avisou que… se alguém reprovar na primeira fase, vamos ter que fazer um acampamento de estudos…"
31070-45 = "[s] \"Acampamento？\""
31070-46 = "Sim… e se a gente reprovar nas três fases… auuu……"
31070-47 = "[s] \"Vai dar ruim em alguma coisa…？\""
31070-48 = "N-nada não……！ Parece que vai ser só preocupação à toa, então vamos deixar os assuntos ruins de lado…"
31070-49 = "De qualquer forma, a prova parece tranquila！"
31070-53 = "A Hanako-chan parece ser muito boa nos estudos, mas por que ela acabou reprovando…? Será que teve algum problema como eu, que não consegui fazer a prova…？"
31070-55 = "Dia da 1ª Prova Especial"
31070-58 = "……っ。"
31070-59 = "Uuu……"
31070-63 = "Fufu."
31070-64 = "……。"
31070-67 = "[ns] \"Todo mundo, fica calma e se esforça, tá？\""
31070-68 = "Vou mostrar o poder de uma elite！"
31070-69 = "A-ahaha…… vou me esforçar."
31070-70 = "Fufu, sim."
31070-71 = "Preparação completa."
31070-76 = "Próximo; 1ª Prova Especial"