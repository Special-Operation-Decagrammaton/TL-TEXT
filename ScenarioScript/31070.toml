[translation]
31070-1 = "Episódio 7: Estudando para a prova"
31070-2 = "（Hora do estudo após a aula）"
31070-3 = "Hanako, como eu resolvo esse problema?"
31070-4 = "Qual deles? Ah, entendo. Nesses casos, você deve usar o critério de divisibilidade e fazer assim..."
31070-5 = "Entendi... hum, compreendi."
31070-6 = "..."
31070-9 = "...?"
31070-10 = "Hum, Koharu-chan? Tem algum problema que você não entendeu?"
31070-11 = "N-não! De jeito nenhum!?"
31070-12 = "Aliás, essa página que você está olhando não faz parte da matéria da prova."
31070-13 = "Hã, mentira!?"
31070-14 = "N-não, espera...! E-eu sabia! A matéria de agora é fácil demais, então eu só estava adiantando a matéria!"
31070-15 = "A-ah, ahaha..."
31070-18 = "Hanako, o que é esse texto?"
31070-19 = "É o início de um épico antigo. 'Cante a ira, ó divindade...'"
31070-20 = "Ah, esse. Entendi."
31070-25 = "..."
31070-28 = "Hanako, isso é..."
31070-29 = "Isso é uma tradução indireta de uma língua antiga. Para entender o original, precisaríamos de um dicionário... espere um pouco, por favor."
31070-30 = "Ah, entendi. Então, isso provavelmente é 'Gaudium et Spes'... Alegria e Esperança, é?"
31070-31 = "Hum... sim, parece que sim. Isso é do segundo concílio... não, mais importante, Azusa-chan, você consegue ler línguas antigas?"
31070-32 = "Ah, aprendi há muito tempo."
31070-37 = "..."
31070-39 = "[ns] \"Parece que está tudo indo bem.\""
31070-40 = "Sim! A Hanako-chan é simplesmente incrível...! E a Azusa-chan também está super motivada para estudar!"
31070-41 = "Parece que a Koharu-chan estava escondendo seu verdadeiro potencial..."
31070-42 = "Desse jeito, talvez a gente consiga passar sem problemas...!"
31070-43 = "Fico muito aliviada... na verdade, eu estava super preocupada..."
31070-44 = "Na verdade, o Tea Party me disse: 'Se alguém for reprovado no primeiro exame, vocês terão que fazer um acampamento de estudos'..."
31070-45 = "[s] \"Acampamento?\""
31070-46 = "Sim, é isso mesmo... e se a gente for reprovada em todos os três exames... aaaa..."
31070-47 = "[s] \"Isso seria um problema...?\""
31070-48 = "N-não é nada...! Parece que minha preocupação foi em vão, então vamos deixar esse assunto triste de lado..."
31070-49 = "De qualquer forma, parece que não teremos problemas com a prova!"
31070-53 = "A Hanako-chan parece ser muito boa nos estudos, então por que será que ela foi reprovada...? Será que ela teve algum problema, como não conseguir fazer a prova que nem eu...?"
31070-55 = "1º Exame Acadêmico Especial, dia da prova"
31070-58 = "...!"
31070-59 = "Uuu..."
31070-63 = "Fufu."
31070-64 = "..."
31070-67 = "[ns] \"Pessoal, mantenham a calma e deem o seu melhor.\""
31070-68 = "Vou mostrar o poder de uma elite!"
31070-69 = "A-ahaha... vou dar o meu melhor."
31070-70 = "Fufu, sim."
31070-71 = "Preparação perfeita."
31070-76 = "Próximo: 1º Exame Acadêmico Especial"
