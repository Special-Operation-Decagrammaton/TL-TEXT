[translation]
1010205-1 = "Memórias inesperadas"
1010205-2 = "(Hiyori entrou em contato comigo e visitou a praia no final da tarde)"
1010205-7 = "Ehehe, encontrei novamente. ......"
1010205-8 = "Qual deles? ...... Esse também é pequeno, mas pode ser útil."
1010205-12 = "[ns] (Parece que estou pegando algo do chão: ......)"
1010205-13 = "Isso é tudo o que há por aqui? ...... Oh, há mais."
1010205-17 = "...... Tenho certeza de que seu sensei ficará satisfeito!"
1010205-18 = "Ah, e aqui: ......!"
1010205-20 = "(Decidiu ficar de olho em Hiyori por um tempo)"
1010205-22 = "[ns] \"Hiyori, aqui vou eu. \""
1010205-23 = "Ah, doutor."
1010205-24 = "Já está na hora da consulta ......? #nSim, quando será ......."
1010205-25 = "Obrigado por ter vindo, doutor."
1010205-26 = "Liguei para você hoje para agradecer por seu sensei. ...... ehehe."
1010205-27 = "O médico está sempre disponível em ......."
1010205-28 = "[s1] \"Você não precisa se preocupar com isso. \"\n[s2] \"É o que eu gosto de fazer. \"\n[s2]\"\"\n1010205-31 = \"Ah, é mesmo? Não estou me sentindo melhor com isso. .......\"\n1010205-32 = \"Sei que é chato, mas, por favor, aceite. ...... ehehe.\"\n1010205-33 = \"....... #Ainda não está totalmente escuro, então temos que esperar um pouco mais.\"\n1010205-34 = \"Por que eu deveria esperar, você pergunta?\"\n1010205-35 = \"Bem, isso é um segredo. #n ehehe .......\"\n1010205-36 = \"...... Vamos esperar um pouco, certo?\"\n1010205-40 = \"Parece que está prestes a ficar bom. ......\"\n1010205-41 = \"Em ......, comece.\"\n1010205-47 = \"O kollel foi coletado em baldes e incendiado. ......\"\n1010205-48 = \"Oh, está ligado! #n sensei, dê uma olhada mais de perto. ......\"\n1010205-49 = \"[s] \"......? \"\"\n1010205-52 = \"Ehehe ...... fogos de artifício.\"\n1010205-53 = \"Na verdade, eu estava recolhendo fogos de artifício descartados na praia mais cedo.\"\n1010205-54 = \"Vi em uma revista que os fogos de artifício são obrigatórios na praia no verão. ......\"\n1010205-55 = \"Eu queria comprar um conjunto de fogos de artifício adequado, mas não tinha esse dinheiro em lugar nenhum. ......\"\n1010205-56 = \"Bem, o que você acha ......? #nEu achei que seria divertido para o sensei. ......\"\n1010205-57 = \"[s3] \"Sim, lindos fogos de artifício. \"\n[s4] \"Foi uma lembrança muito boa, Hiyori. \"\"\n[s4]\""

1010205-60 = "Foi bom. ......"
1010205-61 = "Na verdade, eu sempre me preocupava com a possibilidade de decepcionar meu sensei."
1010205-62 = "Eu gostaria de fazer fogos de artifício de verdade um dia. ...... ehehe."
1010205-63 = "Por favor, traga seu sensei com você nesse momento. ......"
1010205-67 = "Esse ...... som estranho no balde."
1010205-71 = "Hee!"
1010205-72 = "[s]\"Uau! \""
1010205-74 = "Puxa, puxa. ......."
1010205-75 = "Parecia haver algum material estranho misturado em seu interior. O impacto do #n fez com que a caçamba caísse de lado. ......"
1010205-79 = "Todos os fogos de artifício explodiram. ...... #n Ugh, está tudo acabado."
1010205-80 = "Por que isso sempre acontece comigo? Vocês estão tentando me dizer que eu não preciso de fogos de artifício na minha vida?"
1010205-81 = ""
1010205-83 = "(Depois de acalmar Hiyori, ele comprou um conjunto de fogos de artifício e brincou com eles)."
1010205-84 = "(...... Felizmente, as galinhas se animaram.)"
