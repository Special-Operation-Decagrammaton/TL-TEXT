[translation]
1010205-1 = "予想外の思い出"
1010205-2 = "（ヒヨリから連絡をもらい、夕方頃に海辺を訪れた）"
1010205-7 = "えへへ、また見つけました……。"
1010205-8 = "どれどれ……これも小さいけど、使えそうですね。"
1010205-12 = "[ns] （何かを拾い集めているようだけど……）"
1010205-13 = "この辺りは、これで全部ですかね……あ、まだありました。"
1010205-17 = "……きっと、先生も喜んでくれるはず！"
1010205-18 = "あ、こっちにも……！"
1010205-20 = "（しばらくヒヨリの様子を見守ることにした）"
1010205-22 = "[ns] \"ヒヨリ、来たよ。\""
1010205-23 = "あっ、先生。"
1010205-24 = "もう約束の時間ですか……？#nい、いつの間に……。"
1010205-25 = "来てくれてありがとうございます、先生。"
1010205-26 = "今日お呼びしたのは、先生にお礼をするためです……えへへ。"
1010205-27 = "先生には、いつもお世話になっているので……。"
1010205-28 = "[s1] \"気にする必要はないよ。\"\n[s2] \"私が好きでやってることだから。\""
1010205-31 = "そ、そうなんですか？#nでもこのままじゃ、すっきりしなくて……。"
1010205-32 = "つまらないものですが、どうか受け取ってほしいんです……えへへ。"
1010205-33 = "……って。#nまだ完全に暗くなっていないので、もう少し待たないと。"
1010205-34 = "どうして待つ必要があるのか、って？"
1010205-35 = "そ、それは秘密です。#nえへへ……。"
1010205-36 = "……少し、待ちましょうか。"
1010205-40 = "そろそろ良さそうです……！"
1010205-41 = "……では、始めます。"
1010205-47 = "バケツに集めたコレに、火を……"
1010205-48 = "あ、つきました！#n先生、近くで見てみてください……！"
1010205-49 = "[s] \"……？\""
1010205-52 = "えへへ……花火です。"
1010205-53 = "実は、さっき砂浜で捨てられた花火を集めていたんです。"
1010205-54 = "夏のビーチで花火は必須だと、雑誌で見たので……。"
1010205-55 = "ちゃんと花火セットを買いたかったんですが、#nそんなお金はどこにもなくて……。"
1010205-56 = "ど、どうですか……？#nこれなら、先生に楽しんでもらえると思ったんですけど……。"
1010205-57 = "[s3] \"うん、きれいな花火だね。\"\n[s4] \"とても良い思い出になったよ、ヒヨリ。\""
1010205-60 = "よ、良かったです……。"
1010205-61 = "実は、先生をがっかりさせないか、ずっと心配でした。"
1010205-62 = "いつか、本物の花火をやってみたいですね……えへへ。"
1010205-63 = "その時は、ぜひ先生も一緒に……。"
1010205-67 = "あれ……バケツの中で変な音が。"
1010205-71 = "ひえっ！"
1010205-72 = "[s] \"うわっ！！\""
1010205-74 = "げほ、げほっ……。"
1010205-75 = "中に変なものが混ざっていたようです。#n衝撃でバケツが横に倒れちゃいましたし……。"
1010205-79 = "花火が一つ残らず消えて……。#nうぅ、もう終わりです。"
1010205-80 = "どうしていつもこうなるんですか！？#n私の人生には花火なんて不要だって言いたいんですか！？"
1010205-81 = "うわぁぁぁぁぁああん！"
1010205-83 = "（ヒヨリを落ち着かせてから、花火セットを買って一緒に遊んだ）"
1010205-84 = "（……幸い、ヒヨリは元気を取り戻してくれた）"
