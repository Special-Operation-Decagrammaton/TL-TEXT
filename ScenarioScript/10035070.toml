[translation]
10035070-1 = "第7話;メカワニの侵入経路！"
10035070-2 = "うわっ！あいつ、炎まで吹いているよ？"
10035070-3 = "明らかにただのワニじゃないね！"
10035070-4 = "外殻は金属、各種武器を装備。その上、動きもはやい。"
10035070-5 = "ヤツのことは「メタル・ウェポン・スピード・クロコダイル」と呼ぶとしよう。"
10035070-6 = "長いって！メカワニにしようよ！"
10035070-7 = "私たちの行動目標は、明確だ。#n市民の避難が完了するまでメタル・ウェ……"
10035070-8 = "メカワニの目を逸らすこと。"
10035070-9 = "無理に接近したり、攻撃範囲に入ったりする必要はない！"
10035070-11 = "でも、局長！ワニの装甲が硬すぎて、銃弾が通じません！"
10035070-12 = "キリノは、単純に射撃が外れてるだけじゃん？"
10035070-13 = "ええ！？そ、そんなことは……！"
10035070-15 = "お前たち、伏せろ！"
10035070-22 = "あっ！倒しました！手榴弾、効果抜群です！"
10035070-23 = "安心するのははやいよー。気を失っているだけかも。"
10035070-25 = "ご案内いたします！ただいまより屋外施設を閉鎖いたします！#n屋外のお客様は速やかに屋内に避難してください！"
10035070-26 = "繰り返します！ただいまより――"
10035070-28 = "お、屋内は安全なの？追ってきたりしないよね？"
10035070-29 = "おい！押すなって！"
10035070-30 = "大丈夫よ！ワニにあの出入口は通れないはず！"
10035070-33 = "な、なんてことだ！本物のワニじゃないか！"
10035070-34 = "あれは本物のワニではありません！ワニ型のロボットです！"
10035070-35 = "本物だろうと偽物だろうと、どうだっていい！"
10035070-36 = "どうしてあんなものがウォーターパークに！？"
10035070-37 = "さっき検査した時はいなかったはずだ！"
10035070-41 = "くっ！このワニめ！"
10035070-43 = "さっき、局長が言った危険生物は、あれのことですよ！"
10035070-44 = "さっきの暴言、ちゃんと謝ってもらうからねー。"
10035070-48 = "ううう……ご、ご、ご……"
10035070-50 = "ご？"
10035070-52 = "ご、ごめんなさいぃぃ！申し訳ありません。"
10035070-53 = "あの時は、とても信じられなかったんです！"
10035070-54 = "ウォーターパークにワニが現れるなんて、常識的にあり得ないことでしょう！？"
10035070-55 = "しかも、あんなワニが！"
10035070-56 = "今はそんな話をしている場合じゃない。#nあの危険生物を制圧しなければ。"
10035070-57 = "私たちが前線に立ちます。援護をお願いしても？"
10035070-58 = "わ、分かりました！"
10035070-59 = "さ、さすがヴァルキューレ警察学校！頼もしいっ！"
10035070-61 = "（今まで散々バカにしてたくせに……）"
