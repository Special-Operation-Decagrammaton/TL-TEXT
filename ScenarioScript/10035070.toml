[translation]
10035070-1 = "Episódio 7; A rota de invasão do Mecanocrocodilo!"
10035070-2 = "Uau! Aquele ali está até cuspindo fogo, não está?"
10035070-3 = "Claramente não é um crocodilo comum!"
10035070-4 = "Carapaça metálica, equipado com várias armas. Além disso, é rápido."
10035070-5 = "Vamos chamá-lo de 'Crocodilo de Combate Metálico de Alta Velocidade'."
10035070-6 = "É muito longo! Vamos chamar de Mecanocrocodilo!"
10035070-7 = "Nosso objetivo é claro. #nAté que a evacuação dos civis seja concluída, o Crocodilo de Combate Me..."
10035070-8 = "Distrair o Mecanocrocodilo."
10035070-9 = "Não há necessidade de se aproximar ou entrar no alcance de ataque dele!"
10035070-11 = "Mas, Diretor! A blindagem do crocodilo é dura demais, as balas não atravessam!"
10035070-12 = "Kirino, você não está simplesmente errando os tiros?"
10035070-13 = "Hein!? I-isso não é verdade...!"
10035070-15 = "Vocês, abaixem-se!"
10035070-22 = "Ah! Derrubamos! A granada foi super eficaz!"
10035070-23 = "Não se animem tão cedo. Ele pode estar apenas desmaiado."
10035070-25 = "Atenção, por favor! Estamos fechando as instalações externas agora! #nVisitantes na área externa, por favor, evacuem para dentro imediatamente!"
10035070-26 = "Repetindo! A partir de agora――"
10035070-28 = "O-o interior é seguro? Ele não vai nos seguir, vai?"
10035070-29 = "Ei! Não empurra!"
10035070-30 = "Está tudo bem! Aquele crocodilo não deve conseguir passar por aquela entrada!"
10035070-33 = "M-meu Deus! Não é um crocodilo de verdade?!"
10035070-34 = "Aquilo não é um crocodilo de verdade! É um robô em formato de crocodilo!"
10035070-35 = "Se é real ou falso, não importa!"
10035070-36 = "Por que algo assim estaria no parque aquático!?"
10035070-37 = "Não deveria estar aqui quando inspecionamos agora pouco!"
10035070-41 = "Droga! Seu crocodilo maldito!"
10035070-43 = "A criatura perigosa que o Diretor mencionou antes é aquela ali!"
10035070-44 = "Vou fazer você se desculpar direitinho pelas ofensas de antes."
10035070-48 = "Uuuu... De-de-des..."
10035070-50 = "Des?"
10035070-52 = "De-desculpeee! Sinto muito."
10035070-53 = "Naquela hora, eu simplesmente não conseguia acreditar!"
10035070-54 = "Um crocodilo aparecer em um parque aquático é algo impossível pelo senso comum, não é!?"
10035070-55 = "E ainda por cima, um crocodilo daquele jeito!"
10035070-56 = "Agora não é hora para esse tipo de conversa. #nPrecisamos neutralizar aquela criatura perigosa."
10035070-57 = "Nós ficaremos na linha de frente. Podemos contar com o seu apoio?"
10035070-58 = "E-entendido!"
10035070-59 = "C-como esperado da Academia de Polícia Valkyrie! Que confiáveis!"
10035070-61 = "(E pensar que até agora pouco eles estavam nos tratando como idiotas...)"
