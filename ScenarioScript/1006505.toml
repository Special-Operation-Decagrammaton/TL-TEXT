[translation]
1006505-1 = "カホさんの完璧なエスコート"
1006505-2 = "百鬼夜行・第23商店街"
1006505-5 = "あ、先生。こちらです。"
1006505-6 = "[s] \"カホ、また呼んでくれてありがとう。\""
1006505-8 = "[ns1] \"この前は忙しくなって、見て回れなかったけど……\"\n[ns2] \"今日のエスコートは期待してるから、よろしくね。\""
1006505-14 = "……！！"
1006505-15 = "はい、こちらこそよろしくお願いします。"
1006505-16 = "もちろん言われずとも、前回の過ちを糧にして、#nより一層励む所存でおりましたが……"
1006505-17 = "どうやら、私が甘かったようです。"
1006505-18 = "[s] \"気楽にね……？\""
1006505-19 = "先生、私にお任せください。"
1006505-20 = "私、[ruby=くわかみ]桑上[/ruby]カホ、今日は寸分の隙もない……  "
1006505-21 = "完璧なエスコートを先生にお約束いたします。"
1006505-26 = "さぁ、参りましょう！"
1006505-27 = "[s] \"そんなプレッシャーをかけるつもりは……ま、待って！\""
1006505-33 = "（そうして始まったカホのエスコートは……）"
1006505-34 = "（最初に観光名所を巡るようだ）"
1006505-36 = "（カホが真っ先に案内してくれたのは……）"
1006505-37 = "百鬼夜行をご紹介するに当たって、まず何をお見せしたものか悩みましたが……"
1006505-38 = "やはり「観光地としての魅力」でしょう。"
1006505-42 = "特に、ここの展望台から見下ろす景色…… "
1006505-43 = "神木と街並みが一望できるこの眺めは、まさに百鬼夜行の誇りです。"
1006505-44 = "……先生は百鬼夜行の神木についてご存じですか？"
1006505-45 = "[s3] \"知ってるよ、有名だよね。\"\n[s4] \"名前は聞いたことあるかな……。\""
1006505-46 = "ふふっ、流石です！"
1006505-47 = "シャーレの[USERNAME]先生も存じているほど有名だなんて……"
1006505-48 = "百鬼夜行の生徒として、鼻が高いです。"
1006505-49 = "咲き誇る桜の花は、その美しさで知られているように、百鬼夜行連合学院の象徴的な存在になっております。"
1006505-50 = "春、神木の開花に合わせて、かの有名なお祭り「百夜ノ春ノ桜花祭」が始まるくらいですからね。"
1006505-51 = "もし機会があれば、ぜひ先生も私たちと一緒にお祭りを楽しんでくださると……。"
1006505-52 = "あ、もうご存知かもしれませんが……他にも神木にまつわる話にはこんなことも……"
1006505-58 = "なるほど、そうでしたか。"
1006505-62 = "では簡単に、ご説明いたします。"
1006505-63 = "百鬼夜行の神木は、昔々…… "
1006505-64 = "百鬼夜行連合学院が連合の形を成す前に植えられた、歴史ある桜の木だという言い伝えがあります。"
1006505-65 = "伝説によると、あの桜の木には守護神が眠っており――"
1006505-72 = "（観光地の言い伝えや伝説について、目を輝かせながら情熱的に語るカホの言葉に耳を傾けていると……）"
1006505-76 = "あ……お腹が空く頃合いですよね？"
1006505-77 = "[s] \"ごめん、たくさん歩いたから……。\""
1006505-78 = "ちょうど良かったです。"
1006505-82 = "百鬼夜行連合学院自慢の名物「タヌキ印のお好み焼き」をご賞味ください！"
1006505-83 = "百鬼夜行でも一押しのお料理です！"
1006505-86 = "（観光名所の次は、百鬼夜行名物を食べて回った）"
1006505-93 = "（いつにも増してテンションが高いカホのエスコートは続いた）"
1006505-95 = "（その後も時間を忘れるくらい、カホと百鬼夜行ツアーを楽しみ……）"
1006505-98 = "さて、それでは次にご案内する場所は……。"
1006505-104 = "[ns] \"あっちに人が集まってるね。何かあるのかな？\""
1006505-105 = "あれは……。"
1006505-110 = "もうすぐ「キノコタケノコーズ」が、ここで即興歌舞伎をやるんだって！"
1006505-111 = "えっ？あの毎回100万再生を軽く超えるチャンネルだよね！？"
1006505-112 = "どこどこ？見てみたい！"
1006505-116 = "……キノコ……タケノコーズ！！"
1006505-117 = "[s] \"カホ、どうしたの……？\""
1006505-121 = "い、いえ……"
1006505-125 = "さぁ、つ……次に行きましょう……！"
1006505-129 = "（その後、どこか上の空のカホだった）"
1006505-132 = "えっ！柴犬ワン蔵監督の新作任侠映画が公開！？"
1006505-136 = "速報だよ！東地区で勢力争いをしていた魑魅一座同士が、路上俳句バトルを繰り広げてるんだって！"
1006505-137 = "俳句バトル……！"
1006505-139 = "みんな、落ち着いて聞いて！#n百鬼夜行グッズの限定ポップアップストアが……！"
1006505-140 = "限定、ポップアップストア……！"
1006505-141 = "[s] \"……カホ？\""
1006505-145 = "ち……違います！何でもありません！"
1006505-146 = "先生をエスコートしている最中に、うつつを抜かすなど……。"
1006505-147 = "そんな浮ついた気持ちでは……。"
1006505-148 = "しかもさ、お姫様の特別限定グッズが入荷してるらしいよ！？"
1006505-151 = "！！！"
1006505-152 = "この機会を逃がしたら、あと半年はゲット出来ないってホント！？"
1006505-153 = "……！？"
1006505-160 = "[ns] \"カ、カホ！？大丈夫！？\""
1006505-163 = "（急に倒れたカホを少し休ませ……）"
1006505-167 = "[ns] \"大丈夫？具合はどう？\""
1006505-168 = "はぁ……申し訳、ございません、先生。"
1006505-169 = "誘惑に心を乱されて、こんな醜態を晒してしまうとは……。"
1006505-170 = "先生をエスコートすると意気込んだにもかかわらず……。"
1006505-171 = "いくら今でしか見られないイベント……買えないグッズがあったとしても…… 。"
1006505-172 = "たとえ、お姫様のグッズだとしても……お、お姫様……。"
1006505-173 = "うぅ……諦めなきゃ、いけないのに……！"
1006505-174 = "[s] \"そ、そんなに気を張らなくても……。\""
1006505-175 = "陰陽部の副部長だというのに、情けない姿ばかりお見せしてしまい……どうすれば良いのか……。"
1006505-176 = "こうなった以上……私、[ruby=くわかみ]桑上[/ruby]カホが先生に許しを乞う方法は……"
1006505-177 = "やはり……シャーレ専属の当番になるしか……！"
1006505-178 = "[s] \"いやいや落ち着いて！むしろ逆だよ！\""
1006505-179 = "……逆、と言いますと？"
1006505-180 = "[s5] \"さっき反応してたのは、\"\n[s6] \"カホが好きなものだよね？\""
1006505-183 = "それは……はい。"
1006505-184 = "その全てが百鬼夜行の誇らしい文化……と言いますか。"
1006505-185 = "どれも私の大好きなものなんです。#nとはいえ、先生をエスコートしているというのに気を取られては……。"
1006505-186 = "[s] \"それなら、なおさら紹介してほしいな。\""
1006505-190 = "……私が好きなものを知りたいのですか？"
1006505-191 = "百鬼夜行の一般的な観光地や食べ物も良いけど、私個人の、もっと特別な事を……#n知りたい……？"
1006505-192 = "[s7] \"うん、百鬼夜行を大切に思うカホの好きなものなら……\"\n[s8] \"それが百鬼夜行を深く知る近道なんじゃないかなって。\""
1006505-195 = "先生……"
1006505-196 = "……そうかも、しれませんね。"
1006505-197 = "私の愛する百鬼夜行も含めて、深く知ってくださる、と……"
1006505-198 = "そうと決まれば……私、[ruby=くわかみ]桑上[/ruby]カホ……！"
1006505-199 = "全力でご案内します、先生！！"
1006505-201 = "（その後、カホの好きな百鬼夜行を紹介してもらった）"
1006505-202 = "（新作の任侠映画、路上俳句バトル……#nさらにはポップアップストアに立ち寄ったり、一緒にカホの好きなことを楽しみ……）"
1006505-205 = "（気が付けば、いつの間にか夜になっていた）"
1006505-206 = "……して、その子たちのチャンネルは登録者数や再生数こそ伸び悩んでいますが、#n企画のセンスはすごいんですから！"
1006505-207 = "いつも視聴するたび、そのアイデアに驚かされているのです！"
1006505-211 = "それで、次はですね……！"
1006505-215 = "……あっ。"
1006505-216 = "す……すみません。"
1006505-217 = "ついつい浮かれて、訳の分からないことばかり……。"
1006505-218 = "[s9] \"ううん、今日はカホがエスコートしてくれたおかげで、\"\n[s10] \"すごく楽しかったよ。\""
1006505-221 = "そう……でしたか。それなら良かったのですが……。"
1006505-222 = "[s] \"ちなみに、百鬼夜行を好きになった理由って……？\""
1006505-223 = "それは……"
1006505-224 = "[s] \"あっ、話しづらかったら……\""
1006505-225 = "いえ、隠すような話でもありません。"
1006505-226 = "今日、先生にご紹介した百鬼夜行は、そのどれもが私にとって特別で……眩しいほど素敵に映ります。"
1006505-229 = "一つひとつの輝きは小さいかもしれません。"
1006505-230 = "傍から見れば、なぜそこまで熱くなれるのかと思う人も居るでしょう。"
1006505-231 = "理解してくれない人や認めてくれない人も……。"
1006505-232 = "それでも私にとっては、全部がお宝なんです。"
1006505-234 = "人それぞれの「好き」を形にする人たちが、一緒に夢を描き、作り上げて……"
1006505-235 = "自分の夢を表現し、誰かに楽しんでもらいたいという思いが積み重なっていく。"
1006505-236 = "それが今の百鬼夜行を作り上げた大切な文化です。"
1006505-237 = "[s] \"過去があって、今がある……良い文化だね。\""
1006505-238 = "はい。泣いて、笑って、手を取り合って……"
1006505-239 = "気持ちを共有し、かけがえのない友人と過ごす日々。"
1006505-240 = "全てが愛しく、尊いと感じるのです。"
1006505-241 = "これが百鬼夜行を愛する理由になります。"
1006505-242 = "お答えになったでしょうか？"
1006505-243 = "[s] \"うん、ありがとう。\""
1006505-247 = "遅くまでご一緒してくださって、ありがとうございました、先生。"
1006505-248 = "きちんとエスコート出来ていたか不安ではありますが……"
1006505-249 = "[s] \"今日のデート、楽しかったね。\""
1006505-250 = "……っ！？"
1006505-251 = "でえ……と……？"
1006505-255 = "[ns] \"……カホ？\""
1006505-256 = "あ、うぁ、う……"
1006505-262 = "……はうっ。"
1006505-263 = "[ns] \"か、カホ！？\""
1006505-267 = "（顔を真っ赤にして倒れたカホを休ませながら、百鬼夜行の街並みを眺めて過ごした）"
