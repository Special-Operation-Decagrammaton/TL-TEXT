[translation]
1006505-1 = "A escolta perfeita de Kaho"

1006505-2 = "Hyakki Yagyo/23º Distrito Comercial"

1006505-5 = "Ah, professora. Aqui está."

1006505-6 = "[s] \"Kaho, obrigado por me ligar novamente.\""

1006505-8 = "[ns1] \"Eu estava ocupado outro dia e não pude dar uma olhada, mas...\"\n[ns2] \"Estou ansioso para ser seu acompanhante hoje, então, por favor, cuide de mim.\""

1006505-14 = "...! !"

1006505-15 = "Sim, muito obrigado."

1006505-16 = "Claro, mesmo sem ser avisado, eu estava determinado a usar meu último erro como inspiração e trabalhar ainda mais duro do que #n..."

1006505-17 = "Aparentemente eu estava sendo ingênuo."

1006505-18 = "[s] \"Vá com calma...?\""

1006505-19 = "Professor, por favor, deixe comigo."

1006505-20 = "Eu, Kaho, não tenho escrúpulos hoje..."

1006505-21 = "Prometemos-lhe a escolta perfeita."

1006505-26 = "Agora vamos!"

1006505-27 = "[s] \"Eu não queria colocar esse tipo de pressão em você... espere!\""

1006505-33 = "(Foi assim que começou a escolta de Kaho...)"

1006505-34 = "(Parece que visitaremos primeiro as atrações turísticas.)"

1006505-36 = "(Kaho foi o primeiro a me mostrar o local...)"

1006505-37 = "Ao apresentar Hyakki Yako, fiquei me perguntando o que mostrar primeiro..."

1006505-38 = "Afinal, é “atraente como destino turístico”."

1006505-42 = "Principalmente a vista do mirante..."

1006505-43 = "Esta vista panorâmica da árvore sagrada e da paisagem urbana é o orgulho de Hyakki Yako."

1006505-44 = "...Você conhece a árvore sagrada de Hyakki Yagyo?"

1006505-45 = "[s3] \"Eu sei, é famoso.\"\n[s4] \"Você já ouviu o nome...?\""

1006505-46 = "Hehe, como esperado!"

1006505-47 = "É tão famoso que até o professor da placa de Petri [NOME DE USUÁRIO] sabe disso..."

1006505-48 = "Como aluno de Hyakki Yako, tenho faro para isso."

1006505-49 = "As flores de cerejeira em plena floração são conhecidas por sua beleza e se tornaram um símbolo de Hyakki Yako Rengo Gakuin."

1006505-50 = "Na primavera, quando as árvores sagradas florescem, começa o famoso festival “Hyakuya no Haruno Cherry Blossom Festival”."

1006505-51 = "Se você tiver oportunidade, espero que aproveite o festival conosco..."

1006505-52 = "Ah, você já deve saber disso, mas existem outras histórias relacionadas às árvores sagradas..."

1006505-58 = "Entendo, é isso mesmo?"

1006505-62 = "Deixe-me explicar brevemente."

1006505-63 = "A árvore sagrada de Hyakki Yagyo era uma vez..."

1006505-64 = "Diz a lenda que esta é uma cerejeira histórica que foi plantada antes de Hyakki Yagyo Rengo Gakuin se tornar uma federação."

1006505-65 = "Segundo a lenda, uma divindade guardiã dorme naquela cerejeira..."

1006505-72 = "(Enquanto ouvia Kaho falar apaixonadamente sobre o folclore e as lendas dos pontos turísticos, seus olhos brilhavam...)"

1006505-76 = "Ah... já está na hora de ficar com fome, né?"

1006505-77 = "[s] \"Desculpe, andei muito...\""

1006505-78 = "Estava certo."

1006505-82 = "Desfrute da especialidade de Hyakki Yako Rengo Gakuin, \"Raccoon Dog Okonomiyaki\"!"

1006505-83 = "Este é um prato altamente recomendado no Hyakki Yako!"

1006505-86 = "(Perto dos pontos turísticos, demos uma volta experimentando a especialidade do Hyakki Yako)"

1006505-93 = "(A escolta de Kaho, mais animada do que nunca, continuou)"

1006505-95 = "(Mesmo depois disso, gostei tanto do Hyakki Night Tour com Kaho que perdi a noção do tempo...)"

1006505-98 = "Pois bem, o próximo lugar que vou lhe mostrar é..."

1006505-104 = "[ns] \"Há muitas pessoas reunidas ali. Há alguma coisa acontecendo?\""

1006505-105 = "Que..."

1006505-110 = "Kinoko Takenoko em breve fará uma apresentação improvisada de Kabuki aqui!"

1006505-111 = "Huh? É um canal que consegue facilmente mais de 1 milhão de visualizações todas as vezes! ?"

1006505-112 = "Onde onde? Eu quero ver!"

1006505-116 = "...Cogumelos...Takenokozu! !"

1006505-117 = "[s] \"Kaho, o que há de errado...?\""

1006505-121 = "não……"

1006505-125 = "Agora vamos para o próximo...!"

1006505-129 = "(Então era Kaho no céu em algum lugar acima)"

1006505-132 = "Huh! Um novo filme de cavalaria dirigido por Shiba Inu Wanzo é lançado! ?"

1006505-136 = "Últimas notícias! A trupe Chimi, que competia pelo poder na região leste, está travando uma batalha de haicais nas ruas!"

1006505-137 = "Batalha de haicais...!"

1006505-139 = "Todos, acalmem-se e ouçam! Uma loja pop-up limitada de produtos #nHyakki Yako...!"

1006505-140 = "Loja pop-up limitada...!"

1006505-141 = "[s] \"...Kaho?\""

1006505-145 = "I-não é isso! Não é nada!"

1006505-146 = "Enquanto acompanhava o professor, ele desmaiou..."

1006505-147 = "Com uma sensação tão flutuante..."

1006505-148 = "Além disso, parece que chegaram produtos especiais para princesas de edição limitada! ?"

1006505-151 = "! ! !"

1006505-152 = "É verdade que se você perder esta oportunidade, só poderá consegui-la daqui a seis meses! ?"

1006505-153 = "...! ?"

1006505-160 = "[ns] \"Ka-kaho!? Você está bem!?\""

1006505-163 = "(Deixe Kaho, que desmaiou de repente, descansar um pouco...)"

1006505-167 = "[ns] \"Você está bem? Como você está se sentindo?\""

1006505-168 = "Suspiro... sinto muito, senhor."

1006505-169 = "E pensar que ele ficaria tão perturbado pela tentação que exporia tal abominação..."

1006505-170 = "Mesmo que eu estivesse entusiasmado em acompanhar o professor..."

1006505-171 = "Não importa quantos eventos você só possa ver agora... mesmo que haja bens que você não pode comprar..."

1006505-172 = "Mesmo que sejam bens de princesa... ah, princesa..."

1006505-173 = "Ugh...eu tenho que desistir...!"

1006505-174 = "[s] \"Bem, você não precisa ser tão cuidadoso...\""

1006505-175 = "Mesmo sendo vice-presidente do clube Onmyo, ele continua me mostrando seu lado patético... Não sei o que fazer..."

1006505-176 = "Agora que isso aconteceu... como posso eu, Kaho, pedir perdão ao meu professor..."

1006505-177 = "Afinal... não tenho escolha a não ser ficar de plantão exclusivamente para placas de Petri...!"

1006505-178 = "[s] \"Não, não, acalme-se! Na verdade, é o contrário!\""

1006505-179 = "...Você quer dizer o contrário?"

1006505-180 = "[s5] \"A sua reação anterior foi\"\n[s6] \"É disso que Kaho gosta, certo?\""

1006505-183 = "Isso é... sim."

1006505-184 = "Tudo isso é a orgulhosa cultura de Hyakki Yako...ou devo dizer?"

1006505-185 = "Todos eles são meus favoritos. #nPorém, fiquei distraído pelo fato de estar acompanhando a professora..."

1006505-186 = "[s] \"Nesse caso, gostaria que você me apresentasse.\""

1006505-190 = "...Quer saber do que eu gosto?"

1006505-191 = "Os pontos turísticos gerais e a comida de Hyakki Yako são bons, mas quero saber algo mais especial...#n...?"

1006505-192 = "[s7] \"Sim, se Kaho ama Hyakki Yako e adora...\"\n[s8] \"Acho que isso seria um atalho para conhecer Hyakki Yako profundamente.\""

1006505-195 = "professor……"

1006505-196 = "...Talvez sim, talvez não."

1006505-197 = "Ele me conhecia profundamente, inclusive meu amado Hyakki Yako..."

1006505-198 = "Se eu decidir fazer isso... eu sou Kaho...!"

1006505-199 = "Farei o meu melhor para orientá-lo, senhor! !"

1006505-201 = "(Mais tarde, Kaho me apresentou seu Hyakki Yako favorito)"

1006505-202 = "(Um novo filme de cavalaria, uma batalha de haicais na rua... #n Além disso, passem em uma loja pop-up e curtam juntos as coisas favoritas de Kaho...)"

1006505-205 = "(Antes que eu percebesse, já era noite)"

1006505-206 = "...O número de inscritos e visualizações em seu canal é lento, mas seu senso de planejamento #n é incrível!"

1006505-207 = "Cada vez que assisto fico maravilhado com as ideias!"

1006505-211 = "Então, o que vem a seguir...!"

1006505-215 = "...Ah."

1006505-216 = "Eu... sinto muito."

1006505-217 = "Eu simplesmente me empolgo e há tantas coisas que não entendo..."

1006505-218 = "[s9] \"Bem, graças a Kaho me acompanhando hoje\"\n[s10] \"Foi muito divertido.\""

1006505-221 = "É assim mesmo...? Isso teria sido bom, mas...."

1006505-222 = "[s] \"A propósito, por que você gostou de Hyakki Yako...?\""

1006505-223 = "isso é……"

1006505-224 = "[s] \"Ah, se é difícil falar...\""

1006505-225 = "Não, não é algo a esconder."

1006505-226 = "Todos os Hyakki Yako que apresentei a vocês hoje são especiais para mim...eles são tão lindos."

1006505-229 = "Cada brilho pode ser pequeno."

1006505-230 = "Se você olhar de fora, algumas pessoas podem se perguntar por que você é tão apaixonado por isso."

1006505-231 = "Tem gente que não me entende nem me reconhece..."

1006505-232 = "Porém, para mim, são todos tesouros."

1006505-234 = "Pessoas que dão forma aos “gostos” de cada um sonham juntas e criam..."

1006505-235 = "A vontade de expressar os próprios sonhos e de fazer com que alguém os desfrute se acumula."

1006505-236 = "Esta é a importante cultura que fez de Hyakki Yako o que é hoje."

1006505-237 = "[s] \"Existe o passado e existe o presente...É uma boa cultura.\""

1006505-238 = "sim. Chore, ria, dê as mãos..."

1006505-239 = "Dias passados ​​compartilhando sentimentos e passando tempo com amigos insubstituíveis."

1006505-240 = "Tudo parece adorável e precioso."

1006505-241 = "Esta é a razão pela qual adoro Hyakki Yako."

1006505-242 = "Você obteve sua resposta?"

1006505-243 = "[s] \"Sim, obrigado.\""

1006505-247 = "Obrigado por ficar comigo até tão tarde, professor."

1006505-248 = "Não tenho certeza se consegui acompanhá-la adequadamente, mas..."

1006505-249 = "[s] \"O encontro de hoje foi divertido.\""

1006505-250 = "...! ?"

1006505-251 = "Então... e...?"

1006505-255 = "[ns] \"...Kaho?\""

1006505-256 = "Ah, ah, ah..."

1006505-262 = "...Suspirar."

1006505-263 = "[ns] \"Kaho!?\""

1006505-267 = "(Eu descansei Kaho, que havia caído com o rosto vermelho brilhante, e olhei para as ruas de Hyakki Yagyo.)"

