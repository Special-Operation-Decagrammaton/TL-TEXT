[translation]
42235-2 = "Quantas vezes eu vou ter que berrar no rádio que há terroristas armadas marchando dentro do prédio do conselho?!"
42235-3 = "Não me importa se é a Segurança Pública ou a Patrulha Cidadã! Puxem todos os agentes fardados disponíveis e bloqueiem as minhas portas AGORA!!"
42235-7 = "Como assim a Segurança está fechada por insubordinação e a Patrulha Cidadã não atende porque está ocupada com os meus novos decretos…?"
42235-8 = "Então mande qualquer merda que tenha arma!! Arrume milicianos, guardas de trânsito, qualquer um! Só parem elas!!"
42235-9 = "Se vocês não despacharem reforços pra minha porta em um minuto, eu juro que desintegro a Academia Valkyrie da face da ter――"
42235-18 = "SRT na área! Todo mundo com as mãos na cabeça e longe dos teclados!!"
42235-20 = "Aqui é RABBIT1. Alvo primário sob custódia visual.#nIniciando identificação da suspeita Shiranui Kaya."
42235-24 = "Shiranui Kaya. O nosso Esquadrão angariou depoimentos sob juramento de militares envolvidos na tentativa de detonação termobárica na Estação dos Coelhinhos."
42235-25 = "Você encomendou um atentado de destruição em massa em solo civil para alimentar a própria ganância e usurpar o poder do conselho, além de vazar senhas de segurança federais para os terroristas da Kaiser Corporation."
42235-26 = "Como os crimes configuram traição militar, a sua imunidade parlamentar se torna um pedaço de papel inútil."
42235-27 = "A senhora está sob prisão militar por Alta Traição, Subversão do Estado, Prevaricação e Corrupção Passiva."
42235-33 = "Ahahaha… que comédia infantil… Umas cadetinhas reles da falecida SRT acham que têm peso na caneta para decretar a prisão da Presidente de Kivotos e Chefe de Defesa…?"
42235-34 = "[s1] \"A função da SRT é justamente extirpar as ervas daninhas da cidade, independente da patente que elas ostentem, não é?\"\n[s2] \"O seu tabuleiro quebrou, Kaya. Abaixe a cabeça e engula as consequências.\""
42235-39 = "Professor da Schale…"
42235-40 = "E-Espera… Vamos agir como adultos civilizados e negociar…?"
42235-41 = "Eu admito que o escopo do contrato que te ofereci ontem no meu escritório carecia de alguns incentivos morais para o seu lado…"
42235-42 = "Eu esqueci que o senhor é o farol de empatia dessa cidade, um herói que abraça a dor dos alunos. Como ousei pensar que eu, uma mera burocrata, pudesse encoleirar e 'proteger' alguém tão grandioso…"
42235-43 = "Peço perdão pela minha ofensa cega!… Podemos rasgar aquela minuta e recomeçar do zero!!"
42235-53 = "Se o senhor anular essa prisão suja… Eu abro as comportas financeiras de Kivotos só para o senhor!"
42235-54 = "Dinheiro limpo, dinheiro sujo, isenção de impostos, poder militar absoluto… O que a Schale sonhar em ter, os meus cofres vão cuspir sem questionar."
42235-55 = "S-Se for do seu agrado, eu mesma arranco esse terno de Presidente, visto um avental de secretária e bato ponto na Schale pra lamber as suas botas e arquivar seus papéis!"
42235-56 = "Eu serei a sua cadela submissa, Professor! Eu juro!!"
42235-60 = "[ns] \"……Kaya.\""
42235-64 = "S-Sim…?"
42235-65 = "[s3] \"Não é aos meus pés que você tem que chorar e implorar perdão.\"\n[s4] \"Você deve uma ajoelhada sincera e um pedido de desculpas ensanguentado para as alunas inocentes que a sua ambição torturou.\""
42235-68 = "Ó-Óbvio! Com certeza! Se o meu Professor ordena, eu lavo os pés de qualquer um com a língua! Eu não tenho orgulho!"
42235-69 = "D-De quem a gente está falando…? A Oficial Rin…? Da ralé do conselho…?"
42235-70 = "[s] \"……Vejo que a podridão da sua empatia não tem salvação mesmo.\""
42235-77 = "Chefe Kaya!! Chegamos a tempo?!"
42235-82 = "Heine, Diretora de Esportes! Graças a Deus…!"
42235-83 = "Eu sabia que a minha aliança inquebrável com as conselheiras fiéis não me deixaria sangrar sozinha!!"
42235-85 = "……Ué? O figurão da Schale e as pirralhas calouras da SRT estão aqui dentro? Que zona é essa?"
42235-86 = "Ei, Professor! Eu não sei que historinha triste de coelho essas pistoleiras enfiaram na sua orelha, mas é tudo balela!"
42235-87 = "Essas marginais são capangas assassinas pagas pela Rin-senpai pra sujar a moral inabalável da Chefe Kaya!"
42235-88 = "E-EXATO!! É tudo uma conspiração da Rin e seus lacaios…!"
42235-89 = "Aquelas hipócritas do Comitê que puxavam o saco da Rin eram uns monstros de inveja! Passavam o dia inteiro olhando pros próprios peitos com inveja da comissão de frente alheia!"
42235-91 = "Hã? O que diabos os peitos das conselheiras da Rin têm a ver com terrorismo armado…?"
42235-92 = "……Nossa, sério que a sua linha de defesa final é ofender os seios alheios por puro recalque?"
42235-93 = "Aha… Agora a ficha caiu… O nível das alianças podres e sem cérebro que você juntou pra te apoiar compartilha do mesmo QI…"
42235-95 = "Eiii, garota de óculos! Tá me chamando de burra na minha cara, é?!"
42235-96 = "[s] \"……Miyako. Dá o play naquele arquivo de áudio incriminador que a FOX te enviou.\""
42235-97 = "Com prazer."
42235-105 = "«Trabalho cirúrgico, Comandante Yukino. Esse atentado no saguão espalhou o pânico exato que precisávamos na atmosfera do Conselho.»"
42235-106 = "«É natural que os ratos passem a enxergar a SRT com nojo e terror depois disso… mas não sofra por antecedência.»"
42235-107 = "«Quando a coroa for minha e eu cimentar a minha ditadura, ninguém vai ter dentes pra reclamar dos métodos da SRT.»"
42235-111 = "«……Ah, me avisaram que a Diretora de Esportes foi ferida na explosão? Aquela energúmena acéfala…»"
42235-112 = "«Tsc. Por que essa malhada inútil tinha que pular na linha de tiro e estragar o saldo do atentado?»"
42235-113 = "«Mas no fim das contas, foi um abate justificável em nome da Causa. Deixem a idiota chorar de tipoia, ninguém liga.»"
42235-120 = "……? Que voz é essa…? E de que atentado bomba a fita está falando?"
42235-121 = "Ei… Chefe Kaya. Você não jurou de pés juntos pra mim ontem que era inocente e que não sabia nada do atentado armado no Conselho?"
42235-122 = "I-Isso é… ahm… a fita está fora de contexto, eu quis dizer…"
42235-127 = "«Que mané Olimpíada Permanente de Kivotos o quê…? Essa imbecil hiperativa realmente tem os miolos atrofiados pra exigir algo assim na pauta.»"
42235-128 = "«Assim que o sangue do Golpe secar nas paredes, eu vou assinar o decreto extinguindo o Comitê de Esportes e rebaixar todas elas a faxineiras subalternas do Comitê de Cultura.»"
42235-129 = "«……Fala, secretária. O que você quer?»"
42235-130 = "«Os onigiris pra distribuir na reunião dos engravatados acabaram?»"
42235-131 = "«E você ousa gastar a saliva da Presidente pra relatar falta de bolinho de arroz?! Dane-se quem vai passar fome, enfie o resto das caixas no meu cofre pessoal e não me irrite mais com futilidades!»"
42235-133 = "E-ENTÃO… A FITA PROVA QUE ESSA GRAVAÇÃO É…"
42235-134 = "É UMA FARSA!! É UMA EDIÇÃO DIGITAL FEITA COM INTELIGÊNCIA ARTIFICIAL MOLDADA PELA RIN!!"
42235-136 = "Você… você disse que ia banir a Olimpíada e extinguir o nosso Comitê Sagrado… e me chamou de acéfala inútil no gravador…"
42235-137 = "Meu braço está na tipoia até hoje… e eu nem pude jogar o torneio de croquet no sábado por sua causa… sua megera!!"
42235-142 = "Líder política que não valoriza o suor do esporte e esconde comida não tem alma!! Eu não sou cadelinha de ditadora!!"
42235-148 = "IMPEACHMENT!!"
42235-159 = "Próximo Episódio: Epílogo"
