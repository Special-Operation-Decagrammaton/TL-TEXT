[translation]
42235-2 = "Por isso eu estou dizendo repetidamente que terroristas armados estão indo em direção ao prédio do Conselho Estudantil Federal!"
42235-3 = "Não importa se é o Departamento de Segurança Pública ou o Departamento de Polícia, enviem todas as forças disponíveis para cá agora mesmo!"
42235-7 = "A maioria dos alunos do Departamento de Segurança Pública está de castigo... e o Departamento de Polícia está ausente devido a uma nova ordem administrativa...?"
42235-8 = "Então, qualquer um do Departamento de Segurança e Bem-Estar serve! Alguém, por favor, pare esses caras agora!"
42235-9 = "Se não enviarem reforços imediatamente, farei com que a própria Academia de Polícia Valkyrie deixe de existir—"
42235-18 = "É a SRT! Todos larguem as armas e recuem!"
42235-20 = "Aqui é RABBIT 1, suspeito sob custódia. #nConfirmando a identidade de Shizunagi Kaya agora."
42235-24 = "Shizunagi Kaya, obtivemos depoimentos de pessoas envolvidas confirmando que você esteve ligada à tentativa de explosão da Estação Coelhinho."
42235-25 = "Você fomentou o terrorismo para ganho pessoal, utilizou informações essenciais para a operação do Conselho Estudantil Federal e abusou de sua autoridade para fornecer dados a empresas."
42235-26 = "Isso se enquadra nas exceções à imunidade diplomática e privilégios criminais."
42235-27 = "Você está presa em flagrante sob suspeita de insurreição, abuso de autoridade, negligência no dever e suborno."
42235-33 = "Não me faça rir... Uma simples agente da SRT quer prender a mim, a Chefe de Defesa e representante do Presidente do Conselho Estudantil Federal...?"
42235-34 = "[s1] \"A SRT existe justamente para resolver problemas como este.\"\n[s2] \"Kaya, por favor, admita seus erros honestamente.\""
42235-39 = "Sensei [USERNAME]..."
42235-40 = "P-podemos conversar um pouco...?"
42235-41 = "A proposta que lhe fiz outro dia talvez tenha sido um pouco insuficiente, de fato..."
42235-42 = "O sensei resolveu vários problemas de Kivotos com responsabilidade até agora. E pensar que eu tentaria controlar alguém como você..."
42235-43 = "Peço desculpas por isso... Vamos esquecer aquela proposta!"
42235-53 = "Em troca, fornecerei todo o apoio prometido sem exceção..."
42235-54 = "Fornecerei os fundos necessários para a operação do Schale, pessoal... qualquer coisa."
42235-55 = "S-se precisar, posso ir pessoalmente ao Schale para ajudar o sensei!"
42235-56 = "Farei qualquer coisa que o sensei pedir—"
42235-60 = "[ns] \"...Kaya.\""
42235-64 = "S-sim...?"
42235-65 = "[s3] \"A pessoa a quem você deve pedir perdão não sou eu.\"\n[s4] \"Peça desculpas sinceramente aos alunos que você prejudicou.\""
42235-68 = "C-claro. Se o sensei diz, pedirei desculpas a quem quer que seja."
42235-69 = "A-a quem devo pedir desculpas...? À Administradora Rin...?"
42235-70 = "[s] \"Parece que você ainda não entendeu...\""
42235-77 = "Chefe de Defesa! Você está bem?"
42235-82 = "Chefe de Educação Física, que bom que chegou...!"
42235-83 = "Eu sabia que os apoiadores dentro do Conselho Estudantil Federal viriam me ajudar!"
42235-85 = "...Ué? Não são o sensei do Schale e a aluna do primeiro ano da SRT?"
42235-86 = "Sensei, não sei o que você ouviu, mas é melhor não acreditar no que a SRT diz."
42235-87 = "Eles são um bando de gente de má índole que está tentando derrubar a Chefe Kaya a mando da Administradora Rin."
42235-88 = "I-isso mesmo! Tudo foi planejado pela Administradora Rin e seus apoiadores—"
42235-89 = "Eles não gostavam de ninguém... um bando de inúteis que deixaram toda a nutrição ir para apenas uma parte do corpo!"
42235-91 = "Hã? O que isso tem a ver com o assunto...?"
42235-92 = "...Você está sentindo um complexo de inferioridade por causa disso?"
42235-93 = "Ah, entendi... Achei que havia algo estranho na seleção de pessoas daquela facção..."
42235-95 = "Ei, você de óculos. O que isso significa...?"
42235-96 = "[s] \"...Miyako, reproduza o arquivo de áudio que recebemos do Esquadrão FOX.\""
42235-97 = "Sim."
42235-105 = "Bom trabalho, Capitã Yukino. Com este ataque, a atmosfera no Conselho Estudantil Federal deve mudar drasticamente."
42235-106 = "Embora as opiniões negativas sobre a Academia SRT aumentem um pouco... não se preocupe com isso."
42235-107 = "Quando eu me tornar a representante do Presidente do Conselho Estudantil Federal, ninguém mais poderá questionar vocês."
42235-111 = "...A Chefe de Educação Física se feriu? Ah... você fala daquela idiota."
42235-112 = "Tsc, por que ela tem que se meter na frente e causar acidentes?"
42235-113 = "Devemos considerar isso um sacrifício inevitável por uma causa maior, não se preocupe."
42235-120 = "...? O que isso significa?"
42235-121 = "Chefe Kaya, você não disse que não sabia nada sobre aquele ataque anterior?"
42235-122 = "I-Isso é... bem, então..."
42235-127 = "A realização permanente do Grande Festival Esportivo de Kivotos...?#nO que esse idiota está pedindo, afinal?"
42235-128 = "Assim que o golpe terminar, vamos organizar a sala de educação física e jogá-la na subseção da sala cultural."
42235-129 = "……Sim, secretário. O que houve?"
42235-130 = "O número de onigiris para distribuir aos participantes da reunião não é suficiente?"
42235-131 = "Não me importo com onigiris. Não me pergunte sobre coisas tão triviais!"
42235-133 = "P-Por isso, esta comunicação é..."
42235-134 = "Isso mesmo! Tudo foi fabricado!#nTudo é uma conspiração da Administradora Rin——"
42235-136 = "Eu não acredito que você pensava isso de nós..."
42235-137 = "Eu machuquei meu braço naquele ataque e nem pude participar do torneio de gateball..."
42235-142 = "Não precisamos de um substituto que não entende o valor dos esportes!"
42235-148 = "Impeachment!"
42235-159 = "Próximo episódio: Epílogo"
