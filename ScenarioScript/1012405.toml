[translation]
1012405-1 = "海辺にて"
1012405-2 = "（絶好の海日和だ。ハスミとはここで待ち合わせをしているのだが……）"
1012405-3 = "（視線の先……柱の陰から、大きな翼がちらりと見える）"
1012405-4 = "[ns1] \"ハスミ、こっちだよ！\"\n[ns2] \"ハスミ？\""
1012405-9 = "ハスミ、しっかり……！この日のためにやってきたのでしょう……！"
1012405-10 = "せ、先生……。"
1012405-11 = "……変では、ないですか？"
1012405-12 = "[s3] \"そんなことないよ！\"\n[s4] \"水着もバッチリ！\""
1012405-15 = "え、ええ！水着の方は完璧です！きつくもありません！"
1012405-19 = "た、ただ……その……私は他の方よりも少し……だけ……。"
1012405-20 = "大きめなので……可愛いデザインが浮いてしまうのでは……と。"
1012405-21 = "[s] \"すっごく似合ってる！\""
1012405-22 = "ありがとうございます……安心しました。"
1012405-23 = "さて……スケジュールに余裕はあるものの……。"
1012405-24 = "何をして過ごしましょうか？"
1012405-25 = "[s5] \"私も今日は空いてるから……。\"\n[s6] \"よかったら、遊び相手になってほしいなって。\""
1012405-28 = "え、ええ……先生のお願いとあらば……。"
1012405-29 = "[s] \"じゃあ、まずは砂浜でお城を作ろう！\""
1012405-30 = "す、砂のお城ですか……？"
1012405-31 = "しょ、少々可愛らしすぎるのでは……？"
1012405-32 = "ですが、先生がそうおっしゃるならば……。"
1012405-33 = "喜んでお付き合いしましょう。"
1012405-35 = "（ハスミと一緒に砂のお城を作って遊んだ）"
1012405-36 = "（そして……）"
1012405-39 = "[ns] \"ハスミ、次は砂埋めの時間だ！\""
1012405-40 = "先生に……砂を乗せれば良いのですか？"
1012405-41 = "[s] \"埋められるのは……ハスミの方だよ！\""
1012405-42 = "……えっ！？"
1012405-44 = "（ハスミと一緒に砂に埋まって遊んだ後は、海に出て……）"
1012405-47 = "……先生、何か言っていただけませんか？"
1012405-48 = "[s7] \"み、水に浮いたから半分成功だよ！\"\n[s8] \"なんで……前に進まないんだろう……？\""
1012405-51 = "い、いえ！ゆっくりですが……確実に前進しています！"
1012405-52 = "スピードもその内……出るはずです！"
1012405-54 = "（意外にもハスミが泳ぎが苦手なことが判明したり……）"
1012405-57 = "せ、先生。ここには立ち寄らないでおきましょう。"
1012405-58 = "先生が何か召し上がりたいなら、お付き合いしますが……私の分は結構です。"
1012405-59 = "[s9] \"あれ？お腹空いてない？\"\n[s10] \"海の家の料理は苦手？\""
1012405-62 = "い、いえ……むしろ大好き……ですが！だからこそ！今は大丈夫です！"
1012405-64 = "（頑なに拒否するハスミに押され、海の家を通り過ぎることになった……）"
1012405-67 = "ふぅ……ここですね。"
1012405-73 = "みなさん苦労されているようでしたが……スイカ割りは結構簡単ですね。"
1012405-74 = "[s11] \"いや、一発で当てるなんてすごいよ！\"\n[s12] \"狙撃手って、みんなスイカ割りが得意なの……？\""
1012405-77 = "どうも私は、他の方よりバランス感覚に秀でているようでして。"
1012405-78 = "他の方よりも大きなこの翼が、重心を安定させている……のかもしれません。"
1012405-79 = "そう考えると、少々複雑な気持ちですが。"
1012405-80 = "[s] \"どうして？ハスミの翼、綺麗だと思うけど。\""
1012405-81 = "そ、そうでしょうか……？"
1012405-82 = "先生がそうおっしゃるなら――"
1012405-83 = "この翼も、悪いものではありませんね。"
1012405-85 = "（一緒にスイカ割りを楽しんだ後は……）"
1012405-90 = "ビーチバレーは、複数人で行う競技ではないかと……。"
1012405-91 = "[s13] \"そうだね……。\"\n[s14] \"でも、一対一でやってみたら、案外楽しいかもよ？\""
1012405-94 = "そうおっしゃいましても……。"
1012405-98 = "あっ……。"
1012405-99 = "[s] \"大丈夫？\""
1012405-100 = "ご心配おかけしました。少し、目眩が……。"
1012405-101 = "問題ありません。この後も……。"
1012405-108 = "[ns] \"ハスミ……！？\""
1012405-110 = "うぅ……ここは……？"
1012405-114 = "[ns] \"起きられる？\""
1012405-115 = "先生が……日陰へ運んでくださった……のですね……本当に、申し訳ありません。"
1012405-116 = "……えっ？先生が……運んでくださった……？"
1012405-120 = "はっ……！あぁあぁぁぁ……！"
1012405-121 = "お、重くてご迷惑をおかけしていないでしょうか……！？い、いえ、何もおっしゃらないでください！"
1012405-122 = "[s] \"ハスミ、ごめん。\""
1012405-123 = "なぜ先生が謝られるのでしょう？"
1012405-124 = "[s15] \"ハスミも、疲れてたよね……？\"\n[s16] \"無理に付き合わせちゃったかなって……。\""
1012405-127 = "そ、そんなことは……！"
1012405-128 = "これは先生のせいではありません！ええと……その……。"
1012405-132 = "……。"
1012405-133 = "[s] \"ハスミ、気になってたんだけど……。\""
1012405-137 = "[ns] \"何も食べてないの？\""
1012405-139 = "……はい。"
1012405-147 = "あっ、先生！どこへ……！？"
1012405-148 = "ま、まさか、ここは……！？"
1012405-150 = "ご注文の焼きそばと、焼きとうもろこし、それにメロンソーダです！お食事が終わる頃に、デザートのかき氷とバニラアイスもお持ちしますね！"
1012405-151 = "いやー、いい食べっぷりですね！こっちまで嬉しくなりますよ！"
1012405-156 = "とても美味しいのですが……すみません、ご馳走していただいて。#nそもそも、ご迷惑をおかけしてしまった後なのに……。"
1012405-157 = "[s] \"ハスミ。\""
1012405-161 = "[ns17] \"先生としては、無理にダイエットを頑張るよりも……。\"\n[ns18] \"健康的に、楽しく食べてもらったほうが嬉しいかも。\""
1012405-164 = "反省します……ズズッ。"
1012405-165 = "[s] \"硬い話はこの辺にして……もっと食べよう！\""
1012405-167 = "（少し遅めの夕食をとり、ハスミと楽しい時間を過ごした）"
