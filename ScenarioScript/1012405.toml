[translation]
1012405-1 = "À beira-mar"
1012405-2 = "(Está um dia perfeito na praia. Vou me encontrar com Hasumi aqui...)"
1012405-3 = "(À frente da minha linha de visão... posso ver um vislumbre de grandes asas por trás dos pilares)"
1012405-4 = "[ns1] \"Hasumi, por aqui!\"\n[ns2] \"Hasumi?\""
1012405-9 = "Hasumi, fique forte...! Acho que ele veio só por este dia...!"
1012405-10 = "Bem, Senseia..."
1012405-11 = "...Isso não é estranho?"
1012405-12 = "[s3] \"Isso não é verdade!\"\n[s4] \"O maiô está perfeito!\""
1012405-15 = "Oh sim! O maiô é perfeito! Também não é muito apertado!"
1012405-19 = "É só que... bem... eu sou só um pouquinho mais... que os outros."
1012405-20 = "Como é grande...pensei que o design fofo iria se destacar..."
1012405-21 = "[s] \"Você está ótima!\"\"\n1012405-22 = \"Obrigado... me sinto aliviado.\"\n1012405-23 = \"Bem... embora eu tenha alguma margem de manobra na minha agenda...\"\n1012405-24 = \"O que devemos fazer para gastar nosso tempo?\"\n1012405-25 = \"[s5] \"Estou livre hoje também...\"\n[s6] \"Se você quiser, gostaria que você fosse meu companheiro de brincadeiras.\""

1012405-28 = "Eh, sim... se o sensei me pedir..."
1012405-29 = "[s] \"Ok, primeiro vamos construir um castelo na praia!\""
1012405-30 = "É um castelo de areia?"
1012405-31 = "Bem, não é um pouco fofo demais...?"
1012405-32 = "Porém, se o sensei disser isso..."
1012405-33 = "Ficaremos felizes em trabalhar com você."
1012405-35 = "(Eu fiz um castelo de areia e brinquei com Hasumi)"
1012405-36 = "(e……)"
1012405-39 = "[ns] \"Hasumi, é hora de preencher a areia!\""
1012405-40 = "Sensei... Devo colocar areia nele?"
1012405-41 = "[s] \"Aquele que será enterrado é...Hasumi!\""
1012405-42 = "...Eh! ?"
1012405-44 = "(Depois de brincar com Hasumi enterrado na areia, saímos para o mar...)"
1012405-47 = "...Sensei, você poderia dizer alguma coisa?"
1012405-48 = "[s7] \"Bem, eu flutuei na água, então foi meio sucesso!\"\n[s8] \"Por que... acho que não estou avançando...?\""
1012405-51 = "não! Lentamente, mas com segurança... estamos progredindo!"
1012405-52 = "A velocidade também deve sair!"
1012405-54 = "(Surpreendentemente, Hasumi não sabe nadar...)"
1012405-57 = "Bem, sensei. Não vamos parar por aqui."
1012405-58 = "Se você quiser comer alguma coisa, ficarei feliz em atendê-lo... mas por mim tudo bem."
1012405-59 = "[s9] \"Huh? Você não está com fome?\"\n[s10] \"Você não gosta de cozinhar em casas de praia?\""
1012405-62 = "Não, eu realmente adoro isso... mas! É por isso! Está tudo bem agora!"
1012405-64 = "(Como Hasumi recusou teimosamente, acabei passando pela casa de praia...)"
1012405-67 = "Ufa... aqui está."
1012405-73 = "Todo mundo parecia estar passando por momentos difíceis, mas... dividir a melancia é muito fácil."
1012405-74 = "[s11] \"Não, acertar com um tiro é incrível!\"\n[s12] \"Todos os atiradores são bons em partir melancias...?\""
1012405-77 = "Parece que tenho um melhor senso de equilíbrio do que outras pessoas."
1012405-78 = "Esta asa, que é maior que as outras, pode estar estabilizando o centro de gravidade..."
1012405-79 = "Quando penso nisso, tenho sentimentos confusos."
1012405-80 = "[s] \"Por quê? Eu acho que as asas de Hasumi são lindas.\"\"\n1012405-81 = \"E-É mesmo...?\"\n1012405-82 = \"Se o sensei disser isso...\"\n1012405-83 = \"Essas asas também não são ruins.\"\n1012405-85 = \"(Depois de saborear a melancia sendo dividida...)\"\n1012405-90 = \"O vôlei de praia é um esporte praticado por diversas pessoas...\"\n1012405-91 = \"[s13] \"Isso mesmo...\"\n[s14] \"Mas se você tentar um contra um, pode ser mais divertido do que você pensa.\""

1012405-94 = "Mesmo que você diga isso..."
1012405-98 = "Ah..."
1012405-99 = "[s] \"Você está bem?\""
1012405-100 = "Lamentamos sua preocupação. Sinto um pouco de tontura..."
1012405-101 = "Sem problemas. Mesmo depois disso..."
1012405-108 = "[ns] \"Hasumi...!?\""
1012405-110 = "Uh...este lugar...?"
1012405-114 = "[ns] \"Você consegue acordar?\""
1012405-115 = "A Senseia... me levou para a sombra... sinto muito mesmo."
1012405-116 = "...Eh? A Senseia... me carregou...?"
1012405-120 = "Ha...! Aaaaaaa...!"
1012405-121 = "Ah, espero que seja pesado e lhe cause problemas...! ? Não, por favor, não diga nada!"
1012405-122 = "[s] \"Hasumi, me desculpe.\""
1012405-123 = "Por que os Senseies pedem desculpas?"
1012405-124 = "[s15] \"Hasumi também estava cansada...?\"\n[s16] \"Acho que me forcei a sair com ela...\""
1012405-127 = "Ah, isso não é verdade...!"
1012405-128 = "Isso não é culpa do sensei! Hum... isso..."
1012405-132 = "……."
1012405-133 = "[s] \"Hasumi, eu estava pensando...\""
1012405-137 = "[ns] \"Você não comeu nada?\""
1012405-139 = "……sim."
1012405-147 = "Ah, Senseia! Onde...! ?"
1012405-148 = "Bem, de jeito nenhum, aqui...! ?"
1012405-150 = "É o Yakisoba que você pediu, milho grelhado e refrigerante de melão! No final da refeição, também levaremos gelo raspado e sorvete de baunilha como sobremesa!"
1012405-151 = "Nossa, isso é muita comida! Isso vai te deixar feliz!"
1012405-156 = "É muito gostoso...me desculpe, mas sinto muito pelo transtorno. #nDepois de todo o transtorno causado a você em primeiro lugar..."
1012405-157 = "[s]“Hasumi.”"

1012405-161 = "[ns17] \"Como sensei, em vez de tentar se forçar a fazer dieta...\n[ns18] \"Talvez eu fosse mais feliz se meus alunos comessem de forma saudável e agradável.\""
1012405-164 = "Vou refletir sobre isso... Zuzu."
1012405-165 = "[s] \"Vamos deixar a conversa séria aqui...Vamos comer mais!\""
1012405-167 = "(Jantei tarde e me diverti muito com Hasumi.)"
