1013006-27 = "Isso é verdade, mas..."

1013006-28 = "É divertido só olhar em volta, mas..."

1013006-29 = "Mas... "Eu gostaria de ganhar um algum dia", certo?"

1013006-30 = "Acho que algumas pessoas têm vontade de viver por causa desse desejo... #nSinto que tenho que suprimir esse sentimento."

1013006-31 = "Mesmo que um desejo possa ser satisfeito na hora, outro desejo nasce..."

1013006-32 = "No final, não há nada com que ficar satisfeito. Mas é triste."

1013006-33 = "……."

1013006-34 = "professor. Talvez eu esteja apenas procurando a resposta perfeita para tudo."

1013006-35 = "Pode ser tão improvável quanto “desejo sendo realizado”. #nMas talvez haja uma resposta correta em algum lugar..."

1013006-36 = "Eu tenho essas expectativas."

1013006-37 = "Já me deparei com muitos problemas que não podem ser resolvidos ou não têm respostas."

1013006-38 = "[ns1] \"...Sim.\"\n[ns2] \"Acho que Subaru está qualificado para dizer isso.\""

1013006-41 = "……obrigado."

1013006-42 = "Mas mesmo se você pensar sobre isso, é apenas uma perda de tempo, não é? Haha."

1013006-43 = "[ns3] \"Isso não é verdade.\"\n[ns4] \"Mesmo que seja, não há razão para não tentar o seu melhor.\""

1013006-46 = "……."

1013006-47 = "[s5] \"Subaru às vezes toca gaita.\"\n[s6] \"Ele até compra partituras.\"\n[s7] \"Mesmo que tudo desapareça algum dia, ainda tem significado.\""

1013006-51 = "...!"

1013006-52 = "……sim."

1013006-53 = "Os sons podem desaparecer rapidamente, mas permanecem gravados em seu coração."

1013006-54 = "... às vezes fico com vergonha."

1013006-60 = "Você não é tímido com seus hobbies...? Eu-eu sei disso na minha cabeça."

1013006-61 = "É uma coisa reconfortante para mim e todos os meus juniores também estão felizes."

1013006-68 = "Mas antes disso..."

1013006-69 = "Ele não está fazendo isso para parecer legal? Há momentos em que penso isso."

1013006-70 = "Nossa... é constrangedor colocar em palavras...!"

1013006-71 = "[ns8] \"Está tudo bem, está tudo bem.\"\n[ns9] \"Tudo bem.\""

1013006-74 = "É como se fosse problema de outra pessoa..."

1013006-78 = "……."

1013006-79 = "professor."

1013006-80 = "Você gostaria de ir até o rio, se quiser?"

1013006-81 = "Há algo que quero perguntar ao meu professor."

1013006-83 = "(Subaru me levou lentamente em direção ao rio)"

1013006-84 = "(Enquanto isso, já era noite.)"

1013006-86 = "(Subaru parou e começou a tocar gaita)"

