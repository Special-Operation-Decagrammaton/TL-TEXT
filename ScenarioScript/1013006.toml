[translation]
1013006-1 = "gaita ao entardecer"

1013006-4 = "[ns] \"Encontre o que Subaru quer!!!\""

1013006-5 = "Isso é tão alto! ! !"

1013006-6 = "[s] \"Você tem que aproveitar!!\""

1013006-7 = "O professor nessas horas é mesmo...!"

1013006-9 = "Então... o que eu queria?"

1013006-10 = "Bem..."

1013006-11 = "……."

1013006-12 = "São partituras."

1013006-13 = "[s] \"Hmm? Desculpe, não consegui ouvir você claramente.""

1013006-14 = "U-uh... é por isso."

1013006-15 = "……."

1013006-16 = "Partituras, partituras! ! De preferência alguém que saiba tocar gaita!"

1013006-18 = "Ufa..."

1013006-19 = "[s] \"Você está satisfeito?\""

1013006-20 = "satisfação……."

1013006-21 = "Como eu fiz, como eu não fiz."

1013006-22 = "Considerando que foi a primeira vez que fiz compras, sinto que gostei."

1013006-23 = "[s] \"...Vamos voltar.\""

1013006-24 = "Você vai fazer compras?"

1013006-25 = "Isso é impossível. Eu não tenho muito dinheiro."

