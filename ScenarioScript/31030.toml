[translation]
31030-1 = "Episódio 3;Tea Party"
31030-2 = "Aah, então é este o tal Sensei de que tanto falam~? Você não é assim tão diferente da gente, né?"
31030-3 = "Ah, sei, hmm…… é, eu gostei bastante!! E você, Nagi, o que acha?"
31030-4 = "……Mika, falar esse tipo de coisa no primeiro encontro não é muito educado, viu."
31030-5 = "Transbordar de amor é ótimo, mas escolha a hora e o lugar, tá?"
31030-6 = "Uu, bom, nisso você tem razão……."
31030-7 = "Sensei, me desculpa, tá? Bom, por ora, é um prazer daqui pra frente!"
31030-8 = "[s] \"O prazer é meu.\""
31030-9 = "……."
31030-10 = "……Ufu."
31030-11 = "……Que eu me lembre, alguém de fora de Trinity ser convidado a este recinto do Tea Party — o Sensei é o primeiro."
31030-12 = "Normalmente, é um assento a que nem os alunos comuns de Trinity são convidados com facilidade……."
31030-13 = "Ah, que isso, Nagi, que coisa mais dissimulada! Parece que tá querendo cobrar gratidão~!"
31030-14 = "……."
31030-15 = "……Perdão, Sensei. Não era essa a minha intenção…… mas, deixando isso de lado, Mika?"
31030-16 = "Aah…… foi mal, vou ficar quietinha. Na medida do possível."
31030-17 = "……Então, recomeçando."
31030-18 = "Convidei o Sensei assim porque há um pequeno pedido que eu gostaria de fazer."
31030-19 = "[s] \"Um pedido?\""
31030-21 = "Oou, Nagi, assim, direto!?"
31030-22 = "Não precisa de um quebra-gelo antes, não? Uma conversinha fiada elegante?"
31030-23 = "\"Que tempo bom, hein\", \"o que você comeu ontem?\", esse tipo de coisa. Não encaixa nada disso?"
31030-24 = "Ó, o Tea Party, no fundo, é uma roda social, né?"
31030-25 = "……."
31030-26 = "Por mais que você me encare com esses olhos bonitos, isto é uma questão do que deve ser um Tea Party, então não pode! Tem que ser feito direito!"
31030-27 = "Mika, esse tipo de coisa você persegue quando VOCÊ for a host. Agora, em tese, a host sou eu, então siga o meu método, por favor."
31030-28 = "……."
31030-29 = "……."
31030-30 = "Bom, também é certo que estender esse tipo de discussão diante de um convidado não é lá a imagem mais desejável."
31030-31 = "……Pois é. Como a Mika diz, vamos mudar um pouco a direção da conversa."
31030-32 = "[s] \"Vocês são as presidentes do conselho estudantil de Trinity, né?\""
31030-33 = "Ooh, o Sensei mesmo captou o clima! Viu, Nagi, viu!? Isto é oratória de gente adulta! Condução natural da conversa!"
31030-34 = "……Sim. Como disse, somos nós as PRESIDENTES do conselho estudantil da Academia Geral de Trinity."
31030-35 = "\"Presidentes do conselho estudantil\", no plural, pode ser um termo pouco familiar…… explicando desde o início, a presidência do conselho estudantil de Trinity é, de geração em geração, exercida por várias pessoas."
31030-36 = "Ué, Nagi tá me ignorando? Será que tá me ignorando mesmo~? Alôô?"
31030-37 = "Antigamente…… antes de a \"Academia Geral de Trinity\" nascer, os representantes de cada facção, para resolver conflitos, realizaram um \"Tea Party\" — e foi daí que esta história começou."
31030-38 = "Ei, que maldade…… snif, fiquei um pouco magoada……."
31030-39 = "Encabeçado pelos representantes das três academias — Pater, Filius, Sanctus — realizou-se o Tea Party, e assim se criou um fluxo rumo à reconciliação."
31030-40 = "A Nagi me ignorou de verdade…… é implicância…… não é maldade? A gente é amiga de infância há uns dez anos, viu? Uma coisa dessas, até hoje…… bom, até que aconteceu bastante……."
31030-41 = "……Depois disso, o conselho estudantil de Trinity passou a ser chamado pela alcunha de \"Tea Party\", e os representantes de cada facção se revezam como \"host\"――"
31030-42 = "Aah, que coisa mais BARULHENTA, francamente!?"
31030-43 = "Hiih……."
31030-44 = "Sou EU que estou explicando agora, viu!?"
31030-46 = "E, mesmo assim, esse tempo todo!"
31030-47 = "Do lado, murmura que murmura……!"
31030-48 = "Se não consegue mesmo ficar calada, nessa boquinha eu vou……"
31030-49 = "enfiar um rocambole inteiro!?"
31030-51 = "……."
31030-54 = "……."
31030-55 = "[s] \"…….\""
31030-56 = "……Ora."
31030-57 = "……Mas que jeito de falar foi esse meu……."
31030-58 = "……Perdão, Sensei…… e você também, Mika."
31030-59 = "Ié, que medo, que medo……."
31030-60 = "[s] （Custa mesmo a entrar no assunto……）"
31030-63 = "……Vamos, enfim, ao assunto principal. O que queremos pedir ao Sensei é uma coisa simples."
31030-64 = "Simples, mas importante."
31030-65 = "Sim, exatamente."
31030-66 = "……Será que o senhor aceitaria ser o orientador do Clube de Aulas de Reforço?"
31030-67 = "[s] \"Clube de Aulas de Reforço?\""
31030-68 = "Sim. Ou seja, queremos que o senhor salve os alunos que estão à beira da reprovação. É na forma de um \"clube\", mas, desta vez, talvez seja melhor dizer \"professor responsável pela turma\" do que \"orientador\"."
31030-69 = "A Academia Geral de Trinity é, desde antigamente, uma instituição em que pulsam história e tradição, que ergue em Kivotos a bandeira da \"excelência nos estudos e nas artes\"."
31030-70 = "E, no entanto, para o azar, justamente neste período, há nada menos que 4 pessoas com notas fracas……."
31030-71 = "Pra gente, é um momento meio complicado, digamos……."
31030-72 = "Por causa do assunto do \"Tratado do Éden\", a gente tá numa correria agora, sabe."
31030-73 = "O caso daquelas alunas também precisa ser resolvido de algum jeito, mas falta gente e falta tempo……."
31030-74 = "E foi bem nessa hora que eu achei! A atuação brilhante da \"Schale\", que saiu no jornal!"
31030-75 = "Procurar gato, limpar a cidade, até entregar encomenda — uma atuação de mil e uma frentes!"
31030-76 = "Aí eu pensei: pra esta \"Schale\", com certeza dá pra confiar os pepinos!"
31030-77 = "[s] \"…….\""
31030-78 = "……Não se deve dizer \"pepinos\", Mika."
31030-79 = "B-bom, mas, em certo sentido, também é verdade……."
31030-80 = "Além do mais, é \"Sensei\", né?"
31030-81 = "Hoje em dia todo mundo aprende pelo BD, então funcionário de escola ou professor até vá lá, mas o conceito de \"Sensei\" é raro, sabe."
31030-82 = "Escrito como \"aquele que vive o caminho à frente\", \"Sensei\"…… ou seja, é um \"papel de quem guia\", né?"
31030-83 = "Objeto de respeito, ou como norte de vida, estende a mão a todos e os conduz…… como orientador do \"Clube de Aulas de Reforço\", achei que isso cai como uma luva!"
31030-84 = "Pelo que dizem, sobre se a palavra \"respeito\" combina ou não, as opiniões parecem divididas……."
31030-85 = "Ah, é verdade. Dependendo do relatório, muda completamente…… bom, isso eu vou deixar quieto, pela honra do Sensei."
31030-86 = "[s1] （Que boato será esse……）\n[s2] （……Vou fingir que não ouvi!）"
31030-87 = "Enfim! Como agora a gente tá meio ocupada, a gente quer muito que o Sensei assuma essas meninas!"
31030-88 = "Enfim! Como agora a gente tá meio ocupada, a gente quer muito que o Sensei assuma essas meninas!"
31030-89 = "Explicando um pouco mais…… este \"Clube de Aulas de Reforço\" não é algo permanente; é criado conforme uma situação especial, para admitir os alunos que precisam de resgate."
31030-90 = "É uma forma um tanto peculiar, mas, por ser urgente, tomando emprestada a autoridade extralegal da Schale…… é mais ou menos assim."
31030-91 = "É tudo meio complicado, mas a essência está, no fim, em \"resgatar os alunos de notas fracas\". É justamente por isso que se permitiu uma criação tão peculiar……."
31030-92 = "O que acha, Sensei? Aos alunos que precisam de ajuda, o senhor estenderia a mão?"
31030-93 = "[s] \"Se for algo que eu possa fazer, será um prazer.\""
31030-94 = "Boa! Obrigada, Sensei!"
31030-95 = "……."
31030-96 = "Ufu, eu já imaginava que o senhor não recusaria……."
31030-97 = "Muito obrigada. Então, tome."
31030-98 = "[ns] Recebe a lista dos alunos."
31030-100 = "As pessoas aí são os alvos."
31030-102 = "Ou seja, as encrenqueiras da Trini――"
31030-103 = "Essa expressão é falta de amor, Mika. Digamos assim: os \"alunos que precisam de amor\" de Trinity."
31030-104 = "Bom, o nome tanto faz~"
31030-107 = "[ns] （Ué, esta menina é……）"
31030-108 = "Hm? Achou alguma menina que te chamou a atenção, Sensei?"
31030-109 = "[s3] \"……Não, não é nada.\"\n[s4] Assobia."
31030-110 = "Sobre os detalhes, entro em contato de novo mais adiante. Há mais algum ponto que lhe interesse?"
31030-111 = "Sobre os detalhes, entro em contato de novo mais adiante. Há mais algum ponto que lhe interesse?"
31030-113 = "[s] \"O Tratado do Éden…… é o quê, afinal?\""
31030-114 = "……."
31030-115 = "……."
31030-116 = "Hmm…… isso, como é que eu explico……."
31030-117 = "Essa explicação leva um bom tempo, então falo em outro dia, tá? Até porque, em certa medida, é sigilo interno……."
31030-118 = "Além disso, é uma coisa que não tem muita relação com o assunto do Clube de Aulas de Reforço……."
31030-119 = "[s] \"E a outra presidente do conselho estudantil do Tea Party?\""
31030-120 = "……."
31030-121 = "Isso é……."
31030-122 = "A Seia, agora, não está em Trinity. Está internada……."
31030-123 = "Em condições normais, a host de agora seria a Seia, mas…… por essas circunstâncias, na ausência dela, sou eu que estou exercendo a função de host."
31030-124 = "Originalmente, a função de host do Tea Party é feita por revezamento, sabe."
31030-125 = "[s] \"Ah, sei; tomara que ela melhore logo. ……Por ora, é isso que eu queria perguntar.\""
31030-126 = "Entendido; se surgir qualquer coisa, pode perguntar."
31030-127 = "Então, assim que os preparativos estiverem prontos, queríamos que o Sensei viesse à Academia Geral de Trinity na forma de um destacamento."
31030-128 = "Agradeço a colaboração do Sensei; com isso, fico aliviada."
31030-129 = "Bom, até mais, Sensei. Não sei se a gente vai poder se ver de novo, mas."
31030-130 = "Pois é. Ainda mais agora, que é um período corrido, e nem sempre as presidentes do conselho estudantil do Tea Party conseguem se reunir assim tão rápido de novo."
31030-131 = "Ufu, então tá mesmo ocupada? Bom, mas graças ao Sensei eu pude ver o rostinho da Nagi, então que bom, que bom."
31030-132 = "Sim, eu também, Mika."
31030-133 = "Ufu."
31030-134 = "Então, é um prazer daqui pra frente, Sensei. Eu também, como host do Tea Party, hei de escoltá-lo."
31030-135 = "[s] \"Sim, conto com você.\""
31030-141 = "(Primeiro, decide-se ir encontrar a aluna da lista do Clube de Aulas de Reforço cujo nome já lhe era conhecido……)"
31030-145 = "[ns] \"Eu não disse……!\""
31030-146 = "A-ahaha…… olá, Sensei."
31030-147 = "É que, isto é…… tem uma circunstância inevitável……."
31030-148 = "Auu……."
31030-150 = "Próximo Episódio;Os Alunos do Clube de Aulas de Reforço (1)"
