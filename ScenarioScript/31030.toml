[translation]
31030-1 = "Episódio 3; Chá das Cinco"
31030-2 = "Hee, então esse é o famoso Sensei? Você não parece ser muito diferente de nós, né?"
31030-3 = "Entendi, hum... sim, eu acho que você é bem legal!! O que você acha, Nagi-chan?"
31030-4 = "……Mika-san, esse tipo de conversa em um primeiro encontro não é nada educado."
31030-5 = "É bom que você tenha tanto carinho, mas vamos escolher a hora e o lugar certos."
31030-6 = "Ugh, bem, isso é verdade..."
31030-7 = "Sensei, me desculpe, viu? Bem, de qualquer forma, prazer em conhecê-lo!"
31030-8 = "[s] \"O prazer é todo meu.\""
31030-9 = "……."
31030-10 = "……Fufu."
31030-11 = "……Até onde minha memória alcança, você é o primeiro convidado de fora da Trinity a ser chamado para este Chá das Cinco, Sensei."
31030-12 = "Normalmente, este é um lugar onde nem mesmo os alunos comuns da Trinity são convidados facilmente……"
31030-13 = "Ah, que isso, Nagi-chan, que deselegante! Parece que você está querendo se gabar!"
31030-14 = "……."
31030-15 = "……Peço perdão, Sensei. Não tive essa intenção…… mas deixando isso de lado, Mika-san?"
31030-16 = "Ah…… desculpa, vou ficar quieta. O máximo que eu conseguir."
31030-17 = "……Então, recomeçando."
31030-18 = "Nós convidamos o Sensei aqui porque temos um pequeno favor a pedir."
31030-19 = "[s] \"Um favor?\""
31030-21 = "Uau, Nagi-chan, direto ao ponto, hein!?"
31030-22 = "Não precisava de um quebra-gelo ou algo assim? Uma conversa casual e elegante?"
31030-23 = "Tipo, 'o tempo está bom hoje' ou 'o que você comeu ontem?'. Não vamos incluir nada disso?"
31030-24 = "Ora, o Chá das Cinco é, basicamente, um evento social, não é?"
31030-25 = "……."
31030-26 = "Não adianta me olhar com esses olhos brilhantes, isso é uma questão de etiqueta do Chá das Cinco! Temos que fazer as coisas direito!"
31030-27 = "Mika-san, por favor, guarde essas exigências para quando você for a anfitriã. Como eu sou a anfitriã por enquanto, siga o meu método."
31030-28 = "……."
31030-29 = "……."
31030-30 = "Bem, certamente não é uma cena desejável ficar discutindo na frente de um convidado."
31030-31 = "……É verdade. Como a Mika-san disse, vamos mudar um pouco o rumo da conversa."
31030-32 = "[s] \"Vocês são as presidentes do conselho estudantil da Trinity, certo?\""
31030-33 = "Ah, o Sensei leu o clima e ajudou! Viu só, Nagi-chan!? Isso é a lábia de um adulto! Conduzindo a conversa naturalmente!"
31030-34 = "……Sim. Como você disse, nós somos as presidentes do conselho estudantil da Trinity."
31030-35 = "Pode parecer estranho dizer 'presidentes' no plural…… mas, para explicar desde o início, a presidência da Trinity é tradicionalmente ocupada por várias pessoas."
31030-36 = "Ué, Nagi-chan, você está me ignorando? Será que é ignorando mesmo? Ei?"
31030-37 = "Antigamente…… antes da 'Trinity' ser fundada, essa história começou quando os representantes de cada facção realizaram o 'Chá das Cinco' para resolver conflitos."
31030-38 = "Ei, que cruel…… *snif*, fiquei um pouco magoada……"
31030-39 = "Com os representantes das três facções — Pater, Filius e Sanctus — liderando o Chá das Cinco, o caminho para a reconciliação foi criado."
31030-40 = "A Nagi-chan realmente me ignorou…… que maldade…… não é cruel? Somos amigas de infância há dez anos, afinal! Bem, talvez isso tenha acontecido algumas vezes antes, mas……"
31030-41 = "……Desde então, o conselho estudantil da Trinity passou a ser chamado de 'Chá das Cinco', e os representantes de cada facção se revezam como 'anfitriões'——"
31030-42 = "Ah, chega, você está muito barulhenta!?"
31030-43 = "Hii……"
31030-44 = "Eu estou tentando explicar agora, sabia!?"
31030-46 = "E você não para de falar desde agora!"
31030-47 = "Ficando aí resmungando sem parar……!"
31030-48 = "Se você não consegue ficar quieta, então nessa sua boquinha……"
31030-49 = "Eu vou enfiar um rocambole, viu!?"
31030-51 = "……."
31030-54 = "……."
31030-55 = "[s] \"…….\""
31030-56 = "……Ah."
31030-57 = "……Meu Deus, que tipo de linguagem foi essa que eu usei..."
31030-58 = "……Peço perdão, Sensei... e Mika também."
31030-59 = "Nossa, que medo, que medo..."
31030-60 = "[s] (Eles não estão chegando ao ponto principal...)"
31030-63 = "……Vamos direto ao assunto. O que queremos pedir ao Sensei é algo simples."
31030-64 = "É simples, mas é algo muito importante."
31030-65 = "Sim, exatamente."
31030-66 = "……Você poderia se tornar o consultor do Clube de Aulas de Reforço?"
31030-67 = "[s] \"Clube de Aulas de Reforço?\""
31030-68 = "Sim. Em suma, queremos que você salve as alunas que estão em risco de reprovação. Embora tenha o formato de um \"clube\", talvez fosse melhor chamá-lo de \"professor responsável\" em vez de consultor."
31030-69 = "A Escola Trinity sempre foi conhecida em Kivotos por prezar pelo \"equilíbrio entre as artes e as letras\", sendo uma instituição com muita história e tradição."
31030-70 = "No entanto, por um azar do destino, justamente nesta época, temos quatro alunas com um desempenho acadêmico bastante insatisfatório..."
31030-71 = "E para nós, o momento é um pouco complicado, sabe..."
31030-72 = "Estamos muito ocupados por causa do \"Tratado de Eden\"."
31030-73 = "Precisamos resolver a situação daquelas meninas de qualquer jeito, mas nos falta tempo e pessoal..."
31030-74 = "Foi aí que eu vi! O sucesso do \"Schale\" que saiu no jornal!"
31030-75 = "Desde procurar gatos, limpar a cidade, até fazer entregas, vocês estão em todo lugar!"
31030-76 = "Pensei que, se fosse o \"Schale\", com certeza conseguiriam lidar com esse problema!"
31030-77 = "[s] \"…….\""
31030-78 = "……Não deveria chamar isso de \"problema\", Mika."
31030-79 = "B-bem, mas de certa forma é a verdade, não é?..."
31030-80 = "Além disso, você é um \"Sensei\", não é?"
31030-81 = "Hoje em dia, todo mundo estuda por BDs, então, embora existam funcionários escolares ou professores acadêmicos, o conceito de \"Sensei\" é bem raro."
31030-82 = "Aquele que vive o caminho antes dos outros... ou seja, alguém que serve como um \"guia\", certo?"
31030-83 = "Alguém que estende a mão e guia a todos como um objeto de respeito ou um guia de vida... Achei que isso combinaria perfeitamente com o cargo de consultor do \"Clube de Aulas de Reforço\"!"
31030-84 = "Embora, segundo os boatos, as opiniões sejam divididas sobre se a palavra \"respeito\" se aplica a você..."
31030-85 = "Ah, é verdade. Dependendo do relatório, dizem coisas bem diferentes... Bem, vou ficar calada por respeito à sua reputação, Sensei."
31030-86 = "[s1] (Que tipo de boatos são esses...)\n[s2] (...Vou fingir que não ouvi nada!)"
31030-87 = "De qualquer forma! Como estamos um pouco ocupadas agora, queremos muito que você assuma a responsabilidade por essas meninas!"
31030-88 = "De qualquer forma! Como estamos um pouco ocupadas agora, queremos muito que você assuma a responsabilidade por essas meninas!"
31030-89 = "Explicando um pouco melhor... este \"Clube de Aulas de Reforço\" não é algo permanente; ele é criado conforme situações especiais para incluir alunas que precisam de auxílio."
31030-90 = "É um formato um pouco peculiar, mas como é urgente, usaremos a autoridade extrajudicial do Schale para oficializar..."
31030-91 = "É um pouco complicado, mas a essência é apenas \"salvar as alunas com desempenho acadêmico ruim\". É por isso que a criação sob esse formato especial foi permitida..."
31030-92 = "O que me diz, Sensei? Você poderia estender a mão para as alunas que precisam de ajuda?"
31030-93 = "[s] \"Se for algo que eu possa fazer, ficarei feliz em ajudar.\""
31030-94 = "Consegui! Obrigada, Sensei!"
31030-95 = "……."
31030-96 = "Fufu, eu já imaginava que você não recusaria..."
31030-97 = "Muito obrigada. Então, aqui está."
31030-98 = "[ns] Você recebe a lista das alunas."
31030-100 = "Essas são as alunas em questão."
31030-102 = "Ou seja, as encrenqueiras de Trinity—"
31030-103 = "Essa expressão carece de amor, Mika. Vamos dizer assim: as \"alunas que precisam de amor\" em Trinity."
31030-104 = "Bem, tanto faz como você chama."
31030-107 = "[ns] (Ué, essa aluna aqui...)"
31030-108 = "Hm? Alguma aluna chamou sua atenção, Sensei?"
31030-109 = "[s3] \"...Não, nada não.\"\n[s4] Você assobia."
31030-110 = "Entraremos em contato com mais detalhes posteriormente. Existe mais alguma dúvida?"
31030-111 = "Entraremos em contato com mais detalhes posteriormente. Existe mais alguma dúvida?"
31030-113 = "[s] \"Tratado de Eden... o que é isso?\""
31030-114 = "……。"
31030-115 = "……。"
31030-116 = "Hmm... como eu deveria explicar isso?"
31030-117 = "Explicar isso levaria bastante tempo, então falaremos sobre isso em outro dia. Além disso, é uma questão de confidencialidade interna..."
31030-118 = "E, de qualquer forma, não tem muita relação com o caso do Clube de Estudos Suplementares..."
31030-119 = "[s] \"E a outra presidente do Tea Party?\""
31030-120 = "……。"
31030-121 = "Isso é..."
31030-122 = "A Seia-chan não está em Trinity agora. Ela está hospitalizada..."
31030-123 = "Originalmente, a anfitriã atual deveria ser a Seia-san, mas devido a essas circunstâncias, ela está ausente, então estou assumindo o papel de anfitriã."
31030-124 = "Originalmente, o papel de anfitriã do Tea Party é feito em sistema de rodízio, afinal."
31030-125 = "[s] \"Entendi, espero que ela melhore logo. ...Por enquanto, era só isso que eu queria perguntar.\""
31030-126 = "Entendido. Por favor, pergunte se precisar de algo mais."
31030-127 = "Então, assim que os preparativos estiverem prontos, gostaria que o Sensei viesse à Academia Trinity na forma de um enviado."
31030-128 = "Agradeço pela sua cooperação, Sensei. Agora estou mais tranquila."
31030-129 = "Bem, até mais, Sensei. Não sei se poderemos nos encontrar de novo, mas..."
31030-130 = "É verdade. Especialmente agora que é uma época movimentada, não há garantia de que as presidentes do Tea Party possam se reunir assim tão cedo novamente."
31030-131 = "Hehe, então vocês estão mesmo ocupadas? Bem, mas graças ao Sensei, pude ver o rosto da Nagi-chan, então fico feliz."
31030-132 = "Sim, eu também, Mika-san."
31030-133 = "Hehe."
31030-134 = "Então, conto com você a partir de agora, Sensei. Como anfitriã do Tea Party, eu cuidarei de escoltá-lo."
31030-135 = "[s] \"Sim, conto com você.\""
31030-141 = "(Primeiro, vou encontrar a aluna cujo nome vi na lista do Clube de Estudos Suplementares...)"
31030-145 = "[ns] \"Eu sabia...!\""
31030-146 = "Ah, ahaha... Olá, Sensei."
31030-147 = "Bem, isso é, hum, houve circunstâncias inevitáveis..."
31030-148 = "Auu..."
31030-150 = "Próximo episódio: As alunas do Clube de Estudos Suplementares (1)"
