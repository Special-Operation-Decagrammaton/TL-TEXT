[translation]
31030-1 = "Episódio 3: Tea Party"
31030-2 = "Hee~ então esse é o famoso Sensei? Olha, você parece bem normal, hein?"
31030-3 = "Entendi~ humm… é, eu gostei bastante dele!! E você, Nagi-chan?"
31030-4 = "……Mika-san, não é muito educado falar esse tipo de coisa logo na primeira reunião."
31030-5 = "Tudo bem transbordar de amor, mas escolha a hora e o lugar, tá?"
31030-6 = "Uuu… bom, isso é verdade…"
31030-7 = "Desculpa, Sensei? Enfim, vamos nos dar bem a partir de agora, tá bom?"
31030-8 = "[s] \"Igualmente, prazer.\""
31030-9 = "……。"
31030-10 = "……Fufu."
31030-11 = "……Pelo que eu me lembro, o Sensei é a primeira pessoa de fora de Trinity a ser convidada para este Tea Party."
31030-12 = "Normalmente, nem os alunos comuns de Trinity conseguem vir pra cá com facilidade…"
31030-13 = "Uau, que isso Nagi-chan, tá sendo bem safadinha! Tá querendo se gabar né~!"
31030-14 = "……。"
31030-15 = "……Perdão, Sensei. Não foi minha intenção soar assim… mas enfim, Mika-san?"
31030-16 = "Ah~… desculpa, vou ficar quietinha. Vou tentar."
31030-17 = "……Então, vamos ao que interessa."
31030-18 = "Nós te convidamos hoje porque temos um pedido pra te fazer."
31030-19 = "[s] \"Um pedido？\""
31030-21 = "Ooh, Nagi-chan já foi direto ao ponto!? Não vai ter um aquecimento antes? Uma conversinha leve, charmosa?"
31030-22 = "Tipo «o tempo tá bom né», «o que você comeu ontem?», essas coisas. Não vai ter?"
31030-23 = "Ora, Tea Party é basicamente um evento social, né?"
31030-25 = "……。"
31030-26 = "Não adianta me olhar com esses olhos bonitos, isso é uma questão de como o Tea Party deve ser conduzido! Tem que ser feito direito!"
31030-27 = "Mika-san, quando você for a anfitriã pode fazer do seu jeito. No momento eu sou a anfitriã, então vamos seguir meu estilo."
31030-28 = "……。"
31030-29 = "……。"
31030-30 = "Bem, discutir desse jeito na frente do convidado também não é o ideal."
31030-31 = "……Realmente. Como Mika-san disse, vamos mudar um pouco o rumo da conversa."
31030-32 = "[s] \"Vocês duas são as presidentes do Conselho Estudantil de Trinity, certo？\""
31030-33 = "Ooh, o Sensei leu o clima e ajudou! Viu só, Nagi-chan!? Isso que é conversa de adulto! Transição natural!"
31030-34 = "……Sim. Como você disse, nós somos as presidentes [ruby=・・]do[/ruby] Conselho Estudantil de Trinity."
31030-35 = "「Presidentes» pode soar estranho… pra explicar desde o começo, em Trinity o cargo de presidente do Conselho sempre foi exercido por mais de uma pessoa."
31030-36 = "Ei, Nagi-chan tá me ignorando? Tá me ignorando né~? Ooi?"
31030-37 = "Antigamente… antes mesmo de «Trinity General Academy» existir, os representantes das facções se reuniam no «Tea Party» pra resolver conflitos. Foi assim que tudo começou."
31030-38 = "Ah, que cruel… sniff, fiquei um pouco magoada…"
31030-39 = "Pater, Filius, Sanctus… os representantes dessas três escolas iniciaram o Tea Party e criaram o caminho para a reconciliação."
31030-40 = "Nagi-chan realmente me ignorou… isso é bullying… não é? Somos amigas de infância há dez anos, né? Embora isso já tenha acontecido várias vezes…"
31030-41 = "……Depois disso, o Conselho Estudantil de Trinity passou a ser chamado de «Tea Party», e os representantes das facções se revezam como «anfitriãs»——"
31030-42 = "Ah, que barulho!!!？"
31030-43 = "Hiee……"
31030-44 = "Eu tô explicando agora, sabia!？"
31030-46 = "E você fica aí o tempo todo！"
31030-47 = "Falando sozinha sem parar……！"
31030-48 = "Se não consegue ficar quieta, então essa sua boquinha pequena…"
31030-49 = "Vou enfiar um rolinho de bolo nela, tá！？"
31030-51 = "……。"
31030-54 = "……。"
31030-55 = "[s] \"……。\""
31030-56 = "……Nossa."
31030-57 = "……Que tipo de linguagem foi essa que eu usei…"
31030-58 = "……Desculpe, Sensei… e você também, Mika-san."
31030-59 = "Nossa, que medo, que medo…"
31030-60 = "[s] （Tá demorando pra entrar no assunto hein……）"
31030-63 = "……Vamos ao que interessa. O que queremos pedir pro Sensei é bem simples."
31030-64 = "Simples, mas importante."
31030-65 = "Isso mesmo."
31030-66 = "……Você poderia se tornar o supervisor do Clube de Reforço?"
31030-67 = "[s] \"Clube de Reforço？\""
31030-68 = "Sim. Ou seja, queremos que você ajude a salvar alunas que estão em risco de reprovação. Embora seja chamado de «clube», na prática seria mais como um «professor tutor»."
31030-69 = "Trinity General Academy é uma escola famosa em Kivotos por valorizar tanto estudos quanto combate, com longa história e tradição."
31030-70 = "E mesmo assim, justo agora, temos nada menos que quatro alunas com desempenho ruim…"
31030-71 = "Pra nós, é um momento bem complicado…"
31030-72 = "Com o Tratado de Eden acontecendo, estamos bem ocupadas."
31030-73 = "Precisamos resolver o problema dessas meninas, mas não temos nem tempo nem pessoal…"
31030-74 = "Foi aí que vimos nos jornais as façanhas da «Schale»! Procurar gato, limpar rua, entregar encomendas… um verdadeiro multitarefa!"
31030-75 = "Achamos que a Schale seria perfeita pra cuidar de problemas chatos!"
31030-76 = "[s] \"……。\""
31030-77 = "……Não é educado chamar de «problemas chatos», Mika-san."
31030-78 = "B-bom, no fundo é verdade…"
31030-79 = "Além disso, você é «Sensei», né?"
31030-80 = "Hoje em dia todo mundo estuda com BD, então professor de verdade é raro."
31030-81 = "«Sensei» significa aquele que guia os outros… ou seja, alguém que estende a mão e mostra o caminho, certo?"
31030-82 = "Alguém que todos respeitam e seguem como referência… achei que seria perfeito como supervisor do Clube de Reforço!"
31030-83 = "Embora pelos relatórios pareça que a palavra «respeito» seja um pouco controversa em relação ao Sensei…"
31030-84 = "Ah, é verdade. Dependendo do relatório a imagem muda bastante… bem, por respeito à honra do Sensei, não vou comentar nada."
31030-85 = "[s1] （Que tipo de boato será que…）\n[s2] （……Melhor nem perguntar！）"
31030-86 = "Enfim! Como estamos bem ocupadas no momento, gostaríamos que o Sensei cuidasse dessas meninas!"
31030-87 = "Enfim! Como estamos bem ocupadas no momento, gostaríamos que o Sensei cuidasse dessas meninas!"
31030-88 = "Pra explicar melhor… o «Clube de Reforço» não é um clube permanente. Ele é criado em situações especiais pra ajudar alunas que precisam de salvamento."
31030-89 = "É uma forma um pouco especial, mas como é urgente, vamos usar a autoridade extralegal da Schale…"
31030-90 = "É um pouco complicado, mas o objetivo principal é salvar alunas com notas baixas. Por isso permitimos essa criação especial."
31030-91 = "O que acha, Sensei? Poderia estender a mão pra essas alunas que precisam de ajuda?"
31030-92 = "[s] \"Se eu puder ajudar, será um prazer.\""
31030-93 = "Eba! Obrigada, Sensei!"
31030-94 = "……。"
31030-95 = "Fufu, eu imaginava que não recusaria, mas…"
31030-96 = "Obrigada. Então, aqui está."
31030-97 = "[ns] Recebe a lista de alunas."
31030-98 = "Essas são as alunas em questão."
31030-100 = "Ou seja, as problemáticas de Trinity——"
31030-101 = "Essa forma de falar não tem muito amor, Mika-san. Vamos dizer «alunas que precisam de amor»."
31030-102 = "Bom, o nome não importa mesmo~"
31030-107 = "[ns] （Espera… essa aqui é…）"
31030-108 = "Hm? Alguma aluna te chamou atenção, Sensei?"
31030-109 = "[s3] \"……Não, nada não.\"\n[s4] Assobia."
31030-110 = "Vou te passar os detalhes depois. Tem mais alguma dúvida?"
31030-111 = "Vou te passar os detalhes depois. Tem mais alguma dúvida?"
31030-113 = "[s] \"O que é o Tratado de Eden……？\""
31030-114 = "……。"
31030-115 = "……。"
31030-116 = "Humm… como explicar isso…"
31030-117 = "Essa explicação vai demorar um pouco, então te conto outro dia. Afinal, é um assunto um tanto confidencial…"
31030-118 = "Além disso, não tem tanta relação com o Clube de Reforço…"
31030-119 = "[s] \"E a outra presidente do Tea Party？\""
31030-120 = "……。"
31030-121 = "Isso é…"
31030-122 = "Seia-chan não está em Trinity agora. Ela tá internada…"
31030-123 = "Originalmente ela seria a anfitriã dessa vez… mas como está ausente por esse motivo, eu assumi o cargo."
31030-124 = "O host do Tea Party sempre se reveza mesmo."
31030-125 = "[s] \"Entendi. Espero que ela melhore logo. …Acho que era isso que eu queria saber por enquanto.\""
31030-126 = "Entendido. Se tiver mais alguma coisa, pode perguntar."
31030-127 = "Então, assim que estiver tudo pronto, vamos te enviar pra Trinity como professor designado."
31030-128 = "Agradecemos pela cooperação. Agora podemos respirar um pouco."
31030-129 = "Então, até mais, Sensei! Não sei quando vamos nos ver de novo, mas…"
31030-130 = "Realmente. Estamos numa fase bem corrida, e não é sempre que as presidentes do Tea Party conseguem se reunir."
31030-131 = "Fufu, então você tá ocupada mesmo? Bem, pelo menos consegui ver o rosto da Nagi-chan graças ao Sensei. Que bom, que bom."
31030-132 = "Eu também. Mika-san."
31030-133 = "Fufu."
31030-134 = "Então, conto com você a partir de agora, Sensei. Como anfitriã do Tea Party, vou te acompanhar da melhor forma possível."
31030-135 = "[s] \"Sim, conto com você também.\""
31030-141 = "（Primeiro, vou me encontrar com a aluna da lista que eu já conheço……）"
31030-145 = "[ns] \"Era você mesmo……！\""
31030-146 = "A-ahaha…… olá, Sensei."
31030-147 = "É que… tem uma circunstância inevitável…"
31030-148 = "Auuu……"
31030-150 = "Próximo; As Alunas do Clube de Reforço (1)"