[translation]
10041050-1 = "Episódio 5: Hesitação"
10041050-4 = "――1 hora atrás."
10041050-7 = "Após a partida de Seia, no esconderijo de Rio."
10041050-12 = "……Neru."
10041050-17 = "Hã?"
10041050-18 = "Tenho uma coisa para te perguntar."
10041050-19 = "Embora não seja uma pergunta relacionada ao trabalho……"
10041050-23 = "O que foi?"
10041050-24 = "Ao fazer essa pergunta, posso prever até certo ponto como você reagirá, com base nas informações que tenho até agora. Mas, ainda não tenho certeza."
10041050-25 = "E daí?"
10041050-26 = "Se eu perguntar isso, você vai――"
10041050-35 = "Que droga!"
10041050-36 = "Dá para parar com isso?!"
10041050-37 = "Se tem algo a dizer, diga logo!"
10041050-43 = "……Desculpe."
10041050-44 = "……É sobre o caso de Seia Yurizono."
10041050-45 = "É porque acha que ela pode causar algum problema? Ou porque ela parece instável emocionalmente?"
10041050-46 = "Não, a capacidade dela é impecável. Ela é digna de confiança."
10041050-47 = "É só que…… a nossa conversa de agora pouco."
10041050-48 = "……Ela disse alguma coisa?"
10041050-52 = "……Ah. Pensando bem, vocês discutiram um pouco, né."
10041050-53 = "Sim. Ela aceitou rapidamente e pediu desculpas."
10041050-54 = "Mas, a imagem que mostramos aos outros é diferente dos nossos sentimentos reais. Eu também comecei a entender isso recentemente."
10041050-55 = "Por isso…… se, por acaso, ela……"
10041050-59 = "Se eu a ofendi com o que eu disse……"
10041050-63 = "……Hã?"
10041050-64 = "O receio de que ela possa estar guardando sentimentos negativos."
10041050-65 = "Se não entendeu, vou explicar de outra forma. Sobre o interior dela e questões emocionais――"
10041050-66 = "Não, não é que eu não entenda."
10041050-67 = "Em outras palavras, você está preocupada se ela te odeia, é isso?"
10041050-68 = "……Eu não cheguei a dizer isso."
10041050-69 = "Não, é exatamente isso."
10041050-70 = "Mas…… naquela hora, eu não tinha outra escolha a não ser dizer aquilo."
10041050-71 = "Isso é um problema que envolve a academia. É muito mais importante do que meus próprios sentimentos."
10041050-72 = "Eu precisava convencê-la. Para convencê-la, eu não tive escolha a não ser apresentar todos os motivos."
10041050-73 = "No entanto, deixando isso de lado. Pensar que ela pode estar me olhando com desaprovação……"
10041050-74 = "Eu……"
10041050-79 = "Que droga!"
10041050-80 = "É isso que te preocupa?!"
10041050-81 = "Se ela fosse te odiar por causa disso, nem teríamos uma relação de cooperação, não é?!"
10041050-82 = "Dá para ver claramente que não é esse o caso."
10041050-83 = "Além disso, era um limite que você não podia ceder, certo? Então, não tem o que fazer, não é?"
10041050-88 = "E outra, não fique aí remoendo depois de ter dito tudo o que queria."
10041050-89 = "Não tem como voltar atrás nas palavras que você disse."
10041050-90 = "E quanto a mim?"
10041050-91 = "Por que você não me pergunta nada?"
10041050-96 = "……Neru Mikamo."
10041050-97 = "Você sempre rebate na hora. Os dados que tenho até agora provam isso."
10041050-98 = "Não importa como eu te trate, você prioriza seus próprios sentimentos e julgamentos. Estou errada?"
10041050-99 = "Isso é um jeito de me chamar de cabeça-oca?"
10041050-100 = "Não era bem nesse sentido que eu queria dizer..."
10041050-104 = "Se você acha que essa expressão é mais fácil de entender para chegar a um consenso... então, sim. Pode-se dizer que é isso mesmo."
10041050-109 = "Eu admito que sou uma cabeça-oca, mas tem coisas que não se dizem!#nEu estava aguentando até agora, mas já chega!"
10041050-115 = "E-espera...! Estou pesquisando os dados agora...!"
10041050-122 = "...!! Algo apareceu na rede de monitoramento!"
10041050-123 = "No, no centro de fitness! Vá para lá, Neru!"
10041050-124 = "Ah, quer saber!!! Que se dane!!!"
