[translation]
1600505-1 = "夏の海 憧憬 感慨"
1600505-4 = "（海辺に向かうと、ツルギが海辺に座っていた）"
1600505-5 = "（以前とは違って、今日は静かに海を見つめている……）"
1600505-6 = "[s1] \"ツルギ？\"\n[s2] \"海、綺麗だね。\""
1600505-7 = "……。"
1600505-8 = "……。"
1600505-9 = "……はっ！？"
1600505-10 = "せ、先生！？どうしてここに……？"
1600505-11 = "モモトーク……？し、心配して来てくださったんですか……！？"
1600505-12 = "す、すみません、本当に特に何があったわけではないのですが……。"
1600505-13 = "気を使わせてしまいましたね……申し訳ありません……。"
1600505-14 = "あ、ありがとうございます。そう言っていただけるとありがたいです……。"
1600505-15 = "ここで、何を……ですか？"
1600505-16 = "えっと……。"
1600505-17 = "……その。"
1600505-18 = "じ、実は自分でも良く分からないと言いますか、何をしていたわけでもなく……。"
1600505-19 = "ただ……。"
1600505-20 = "ただこうして座って、ずっと海を見ていました……。"
1600505-21 = "何と言いますか……。"
1600505-22 = "もともと小説で読んだ「海」とは違っていて……。"
1600505-23 = "他の観光客もほとんどいなくて、静かで、私だけがポツンと……。"
1600505-24 = "それが少し寂しいような、でもこれも不思議と悪くないような……？"
1600505-25 = "……？"
1600505-26 = "楽しそう、ですか？"
1600505-27 = "そ、そうですか？すみません、自分で自分のことがよく分からなくて……。"
1600505-28 = "きひ……。"
1600505-29 = "[s3] \"必ずしも誰かの考えと一致してなくても、良いと思うよ。\"\n[s4] \"ツルギの感じてることが全てだと思う。\""
1600505-30 = "そ、そうなんですか？なるほど……？"
1600505-31 = "そ、そうなんですか？なるほど……？"
1600505-32 = "……ここに来てから、トリニティにいる時には知らなかったことがたくさんで。"
1600505-33 = "それはどれも、体験してみると何だか不思議な感じで……。"
1600505-34 = "これで合ってるんだろうか、間違ってないかって、ずっと考えてしまって……。"
1600505-35 = "[s5] \"知らないことって、最初は不安だよね。\"\n[s6] \"でも、今のツルギは結構良い表情をしてると思うよ。\""
1600505-36 = "あ、は、はい……。"
1600505-37 = "あ、は、はい……。"
1600505-38 = "そうなのかも、しれません……。"
1600505-39 = "何だか、最初は混乱してばかりでしたが……。"
1600505-40 = "ただ確かに、今思えばどれも……最後には楽しくなっていましたね……？"
1600505-41 = "……。"
1600505-42 = "きひ……。"
1600505-43 = "きひひ……そうですね。やはり、楽しかったのかもしれません。それに、今もこうして……。"
1600505-44 = "……先生はすごいですね。"
1600505-45 = "スッキリしました。そうですね、思えばどれも、すごく楽しかったです。"
1600505-46 = "ここでしかできないことが、たくさんありましたし……。"
1600505-47 = "[s7] \"うん。それに、私もツルギと一緒で楽しかったよ。\"\n[s8] （結構特殊な遊び方が多かったけどね……）"
1600505-48 = "……くくっ、きききっ。"
1600505-49 = "……くくっ、きききっ。"
1600505-50 = "……せ、先生。"
1600505-51 = "その……。"
1600505-54 = "ありがとうございます。"
1600505-56 = "……こうして、"
1600505-57 = "一緒に海に来られて、私、すごく嬉しかったです。"
