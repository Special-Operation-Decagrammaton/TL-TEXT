[translation]
1600505-1 = "Mar de Verão, Anseio, Emoção"
1600505-4 = "（Ao caminhar em direção à praia, vejo Tsurugi sentada na areia）"
1600505-5 = "（Diferente de antes, hoje ela observa o mar silenciosamente...）"
1600505-6 = "[s1] \"Tsurugi?\"\n[s2] \"O mar está lindo, não está?\""
1600505-7 = "……."
1600505-8 = "……."
1600505-9 = "……Ah!?"
1600505-10 = "P-Sensei!? Por que você está aqui...?"
1600505-11 = "O MomoTalk...? V-você veio até aqui porque estava preocupado comigo...!?"
1600505-12 = "D-desculpe, não aconteceu nada de especial, na verdade..."
1600505-13 = "Acabei fazendo você se preocupar... sinto muito..."
1600505-14 = "O-obrigada. Fico grata por você dizer isso..."
1600505-15 = "O que você está fazendo... aqui?"
1600505-16 = "Bem..."
1600505-17 = "……É que."
1600505-18 = "N-na verdade, nem eu mesma sei explicar bem, não estava fazendo nada em particular..."
1600505-19 = "Apenas..."
1600505-20 = "Apenas sentei aqui e fiquei olhando para o mar por um bom tempo..."
1600505-21 = "Como posso dizer..."
1600505-22 = "É diferente do \"mar\" que eu lia nos romances..."
1600505-23 = "Quase não há outros turistas, é silencioso, e estou aqui sozinha..."
1600505-24 = "É um pouco solitário, mas, estranhamente, não é algo ruim...?"
1600505-25 = "……?"
1600505-26 = "Parece que estou me divertindo?"
1600505-27 = "S-sério? Desculpe, nem eu mesma entendo muito bem o que sinto..."
1600505-28 = "Kihi..."
1600505-29 = "[s3] \"Acho que não precisa estar de acordo com o que os outros pensam.\"\n[s4] \"Acho que o que você sente é o que importa, Tsurugi.\""
1600505-30 = "É-é mesmo? Entendo...?"
1600505-31 = "É-é mesmo? Entendo...?"
1600505-32 = "……Desde que cheguei aqui, descobri muitas coisas que eu não sabia quando estava em Trinity."
1600505-33 = "E todas elas, quando as experimento, trazem uma sensação estranha..."
1600505-34 = "Fico pensando o tempo todo se estou fazendo certo, se estou errada..."
1600505-35 = "[s5] \"Não saber das coisas causa insegurança no começo, né?\"\n[s6] \"Mas acho que a Tsurugi está com uma expressão muito boa agora.\""
1600505-36 = "A-ah, sim..."
1600505-37 = "A-ah, sim..."
1600505-38 = "Talvez seja verdade..."
1600505-39 = "De alguma forma, no começo eu só ficava confusa..."
1600505-40 = "Mas, pensando bem agora, todas elas... acabaram sendo divertidas, não foram...?"
1600505-41 = "……."
1600505-42 = "Kihi..."
1600505-43 = "Kihihi... é verdade. No fim das contas, talvez tenha sido divertido. Além disso, até agora..."
1600505-44 = "……Sensei, você é incrível."
1600505-45 = "Sinto-me mais leve. É verdade, pensando bem, tudo foi muito divertido."
1600505-46 = "Houve muitas coisas que só pude fazer aqui..."
1600505-47 = "[s7] \"Sim. E eu também me diverti muito com você, Tsurugi.\"\n[s8] （Embora a maioria das formas de brincar tenha sido bem peculiar...）"
1600505-48 = "……Kuku, kikiki."
1600505-49 = "……Kuku, kikiki."
1600505-50 = "……P-sensei."
1600505-51 = "Sobre isso..."
1600505-54 = "Obrigada."
1600505-56 = "……Dessa forma,"
1600505-57 = "Eu fiquei muito feliz por poder vir à praia com você."
