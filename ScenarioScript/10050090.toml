[translation]
10050090-1 = "Episódio 9; O Rio Corre Através Disso"
10050090-2 = "……Então, Presidente Cherino. Esta é a nossa proposta, os detalhes do acordo de intercâmbio cultural entre Trinity e Red Winter."
10050090-3 = "Este acordo terá o Sensei do Schale como fiador e prosseguirá após a avaliação do Comitê de Biblioteca. E nós, do Tea Party, não temos objeções quanto a isso."
10050090-4 = "No entanto, gostaríamos que evitassem distribuir meios como livros sem que as negociações tenham avançado, como aconteceu desta vez."
10050090-5 = "Sem problemas, certo? Como a Yakumo-san disse, a cultura deve circular."
10050090-6 = "U-ummm……."
10050090-7 = "Que incômodo…… ou melhor, foi o Departamento de Publicação que fez isso por conta própria."
10050090-8 = "Espere, você disse que o camarada está aqui? Isso mesmo…… é isso!"
10050090-9 = "Entendido. E, apenas para este caso, o Schale falará em nome da Red Winter."
10050090-10 = "[s] \"Hm? Eu?\""
10050090-11 = "Eh……? Isso significa que, o Sensei do Schale……?"
10050090-12 = "Exatamente. Em outras palavras, o Schale é o representante da Red Winter, apenas desta vez! A Red Winter delega todas as decisões ao Schale!"
10050090-13 = "Acima de tudo, eu tenho um compromisso importante para resolver agora!"
10050090-14 = "U-um compromisso importante……."
10050090-16 = "É…… um cochilo!"
10050090-17 = "Um cochilo……? Seria algum tipo de código!?"
10050090-18 = "[s] (Acho que não……)"
10050090-19 = "E-e além disso, tornar o Schale o representante do acordo cultural……."
10050090-23 = "(É isso que significa!? Caso o acordo fracasse, o Schale, como representante da Red Winter, terá que assumir uma certa responsabilidade……)"
10050090-24 = "(E Trinity, que aceitou o acordo, também terá uma parte da responsabilidade……)"
10050090-25 = "(Nesse caso, o Sensei pode…… nutrir ressentimento contra Trinity, tanto no aspecto profissional quanto no emocional……)"
10050090-26 = "(Em outras palavras — isso é um aviso para Trinity)"
10050090-27 = "(Ao mesmo tempo, a Red Winter se livra de qualquer responsabilidade — entendo, seria essa a diplomacia da Red Winter!?)"
10050090-28 = "P-Presidente Cherino, espere!"
10050090-33 = "[ns] \"Nagisa, aconteceu alguma coisa?\""
10050090-34 = "N-não! Não é nada, Sensei! Nós só precisamos fazer isso funcionar, sim!"
10050090-35 = "Acabou? Nagi-chan. Eu estava entediada, sabe."
10050090-36 = "Mika. O Sensei está aqui, comporte-se."
10050090-37 = "A-ah, é verdade…… desculpe, Sensei."
10050090-38 = "Hm? \"Você gosta da Mika do jeito que ela é\"……? Obrigada, Sensei, eu te amo!"
10050090-39 = "Saudações a todos do Tea Party. #nE agradeço profundamente pela sua abordagem tolerante."
10050090-40 = "Olá, pessoal do Departamento de Publicação. Estou feliz por podermos nos encontrar assim."
10050090-41 = "Nós de Trinity esperamos que, a partir deste caso, possamos construir um relacionamento ainda melhor com a Red Winter daqui para frente."
10050090-42 = "E se tiverem outros bons livros, por favor, não deixem de nos recomendar."
10050090-43 = "Sim, faremos isso. É uma honra que tenham organizado este encontro."
10050090-45 = "Ei, ei, é Yakumo-chan, certo? Prazer em conhecê-la! Eu sou a Mika, do Tea Party!"
10050090-46 = "Então…… se não se importar, será que poderíamos conversar a sós por um momento?"
10050090-47 = "P-prazer…… sou Aramaki Yakumo."
10050090-48 = "(Essa pessoa é um dos membros do Tea Party……)"
10050090-49 = "(Ou seja, estou diante da Presidente Cherino, e agora isso……)"
10050090-50 = "(Se fosse apenas a Presidente Cherino, eu teria uns 100 métodos para lidar com ela……)"
10050090-51 = "Eu li o livro que você trouxe, Yakumo-chan!"
10050090-52 = "Ah, sim……."
10050090-53 = "Bem, é que…… isso é apenas uma opinião minha, sabe."
10050090-54 = "O protagonista tem partes que lembram um pouco o Sensei. Por isso, achei bom."
10050090-55 = "E então…… isso é um pedido pessoal meu? Ou talvez um desejo? Algo assim……."
10050090-56 = "Não acha que seria ainda melhor se mudasse a personalidade ou a aparência da heroína!?"
10050090-57 = "……?"
10050090-58 = "Ho…… ho ho, entendo……? Mufufufufu."
10050090-59 = "Agradeço pela sua excelente sugestão, Mika-sama."
10050090-60 = "Sobre esse assunto, eu gostaria de ouvir com um pouco mais de detalhes... que tipo de mudanças você deseja?"
10050090-61 = "Sim, sim! Por exemplo... acho que ficaria mais fofa se a cor do cabelo fosse um pouco mais rosada e tivesse umas ondas!"
10050090-62 = "Que tal uma garota que, embora não seja muito centrada, seja brincalhona e, quando precisa, ela faz acontecer?"
10050090-63 = "Alguém que geralmente anima o ambiente, e o cabelo poderia ser preso em um coque de um lado, mas, bem, isso tanto faz..."
10050090-64 = "O que ela mais gosta é de um super parfait! E em segundo lugar, o The Beyond da Samuel!"
10050090-65 = "Ah, rocambole já deu, né..."
10050090-66 = "Enfim! O que acha de algo assim?"
10050090-67 = "Sim, sim. Compreendi perfeitamente."
10050090-68 = "No entanto, resumindo os pedidos da Mika-sama... praticamente teríamos que refazer tudo do zero."
10050090-69 = "S-sério...?"
10050090-70 = "E, provavelmente, seria um exemplar único, feito exclusivamente para a Mika-sama."
10050090-71 = "Hã...? S-só para mim?"
10050090-72 = "Eu topo! Adoro esse tipo de coisa!"
10050090-73 = "Entendo, acho que isso combina mais com a Mika-sama. #nSó que... tem um problema."
10050090-74 = "O-o quê...?"
10050090-75 = "O ramo editorial é, fundamentalmente, um setor que depende de escala."
10050090-76 = "Obras voltadas para um público pequeno não geram muito lucro."
10050090-77 = "Especialmente neste caso, fazer um livro para uma única pessoa torna o cálculo do preço difícil devido à sua raridade."
10050090-78 = "Concluindo... o custo será bem elevado."
10050090-79 = "Hmm...? Quanto mais ou menos?"
10050090-83 = "Que tal este valor?"
10050090-84 = "！？！？"
10050090-85 = "N-não, metade disso já seria o suficiente, mas...！？"
10050090-86 = "Nossa, você me deixou tensa dizendo que era caro~ #nEntão..."
10050090-87 = "Mika-san?"
10050090-92 = "Q-que foi? Nagi-chan."
10050090-93 = "Você não entende... se eu não disser até o fim?"
10050090-94 = "U-ugh... já entendi, tá bom! Nagi-chan, sua pão-dura!"
10050090-96 = "Pessoal do Clube de Publicação, muito obrigada pelo trabalho duro."
10050090-97 = "Não, na verdade, causamos problemas ao Comitê da Biblioteca e ao Comitê de Justiça. Peço desculpas."
10050090-99 = "Não foi bem assim. Graças ao Clube de Publicação, o nosso Comitê de Justiça passou a frequentar mais a biblioteca."
10050090-100 = "Parece que todas ficaram interessadas nos livros em si."
10050090-101 = "Eu mesma passei a me interessar por outras coisas além da justiça."
10050090-102 = "Fico feliz em ouvir isso. Mas, por favor, lembrem-se de devolver os livros no prazo, certo?"
10050090-103 = "S-sim, tomaremos cuidado... E sobre isso, Takane-san."
10050090-104 = "Sim?"
10050090-105 = "A história desse livro... ainda não terminou, certo?"
10050090-106 = "Sim, é verdade..."
10050090-107 = "Então... se sair uma continuação, será que poderia me avisar...?"
10050090-108 = "Fufu... parece que você gostou bastante."
10050090-109 = "Sim, muito."
10050090-110 = "Entendido. Quem gosta de histórias é sempre bem-vindo."
10050090-111 = "Ah, e... isso é um pedido das alunas de Trinity... embora seja um assunto que eu não entendo muito bem."
10050090-112 = "Disseram: 'Queremos que lancem um livro de críticas sobre a Princesa da Neve algum dia'."
10050090-113 = "……."
10050090-114 = "V-vou... considerar com carinho."
10050090-115 = "Obrigada, Takane-san. Conto com você daqui para frente."
10050090-121 = "Chefe~~~!!!"
10050090-122 = "Ora, o que houve, Takane?"
10050090-123 = "Você ouviu, não ouviu!? #nO que pretende fazer com isso!"
10050090-124 = "Ah... bem..."
10050090-126 = "Isso tudo também é marketing!"
10050090-127 = "Isso não é desculpa, sabia!?"
10050090-139 = "[ns] \"Satisfeita? Yakumo.\""
10050090-140 = "Sim, suponho que sim. Bastante."
10050090-141 = "[s1] \"Se é assim, então tudo bem...\"\n[s2] \"Vou continuar de olho em você, Yakumo, está bem?\""
10050090-144 = "Oh? E por que isso...?"
10050090-145 = "É porque eu sei muitas coisas... é isso?"
10050090-146 = "Uma aluna que entende o peso de um contrato e que consegue ser humilde em prol do trabalho...?"
10050090-147 = "[s3] \"Exato. É uma habilidade incrível e, se usada corretamente, é bem legal.\"\n[s4] \"Mas se você for longe demais, talvez eu não consiga assumir a responsabilidade.\""
10050090-150 = "..."
10050090-151 = "Sim, eu entendo."
10050090-152 = "Não gosto muito de admitir, mas parece que sou um pouco distorcida."
10050090-153 = "Além disso, dizer que vai continuar de olho em mim significa que..."
10050090-154 = "Significa que você continuará demonstrando interesse em mim, não é? #nNão é necessariamente algo ruim, certo?"
10050090-155 = "[s] \"Lá vem você de novo...\""
10050090-156 = "É isso mesmo, Chefe! Acho que não foi nesse sentido. #nQuanto ao que aconteceu desta vez, sério...! Ah..."
10050090-157 = "Sensei, muito obrigada pelo seu trabalho duro. Agradeço de coração."
10050090-158 = "[s] \"Foi graças à presença da Takane...\""
10050090-159 = "E-eu fico feliz que pense assim, mas..."
10050090-160 = "Ah... se eu soubesse que terminaria assim, teria pedido ajuda ao Sensei desde o início..."
10050090-161 = "Falando nisso, Chefe. Por que não fez isso?"
10050090-162 = "Ah, bem... isso também era uma opção, mas..."
10050090-163 = "\"Mas\"?"
10050090-168 = "...achei que levaria uma bronca?"
10050090-169 = "Chefeee!!?"
10050090-170 = "[s] \"Yakumooo!!\""
10050090-178 = "[ns] \"Ufa...\""
10050090-180 = "[ns] \"Trabalhei muito bem hoje!\""
10050090-182 = "Renascimento Literário sob o Céu de Inverno ~Sobre o intercâmbio cultural saudável~"
