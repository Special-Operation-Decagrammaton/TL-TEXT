[translation]
83303400200-6 = "Foi uma demonstração de habilidade impressionante, Presidente."
83303400200-7 = "Graças a isso, muitos mortos... digo, muitos feridos puderam ser acomodados na enfermaria."
83303400200-8 = "Talvez eu tenha exagerado um pouco."
83303400200-9 = "Mas, graças ao atendimento imediato da Sena, eles foram salvos."
83303400200-10 = "Eu apenas fiz o que precisava ser feito."
83303400200-11 = "Mas, mudando de assunto, Presidente, você tem um corte na bochecha..."
83303400200-12 = "Ah... parece que me arranhei um pouco na batalha de agora há pouco."
83303400200-13 = "Se deixar assim, pode acabar ficando uma cicatriz. Tem uma pomada naquela prateleira, por favor, pegue-a."
83303400200-14 = "Certo... obrigada."
