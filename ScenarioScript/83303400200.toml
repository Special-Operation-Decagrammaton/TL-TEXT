[translation]
83303400200-6 = "素晴らしい実力でした、委員長。"
83303400200-7 = "おかげで多くの死……ではなく、負傷者を病室で寝かせることができました。"
83303400200-8 = "ちょっとやり過ぎたかも。"
83303400200-9 = "けど、セナがすぐに手当てしてくれたおかげで助かったわ。"
83303400200-10 = "私はやるべきことをやっただけですから。"
83303400200-11 = "それより委員長、頬に傷が……"
83303400200-12 = "あ……今の戦いで少し引っかかれたみたい。"
83303400200-13 = "放っておくと傷が残るかもしれません。そこの収納棚に軟膏があるので、持って行ってください。"
83303400200-14 = "うん……ありがとう。"
