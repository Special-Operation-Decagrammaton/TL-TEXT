[translation]
90001020-1 = "Episódio 2: Investigação"
90001020-2 = "Eimi, Toki. Estão bem? Relatório!"
90001020-7 = "Aqui é a Eimi. Sem problemas."
90001020-8 = "O mesmo aqui."
90001020-9 = "No entanto, temos um novo relatório."
90001020-10 = "Tem coisas que dá para falar e outras que precisam ser vistas pessoalmente. Por onde quer começar?"
90001020-12 = "Pela mais simples, por favor."
90001020-13 = "O comportamento dos servos mudou um pouco."
90001020-14 = "Especificamente?"
90001020-15 = "Até agora eles não eram organizados, mas de repente começaram a atacar de forma coordenada."
90001020-16 = "Começaram a fazer emboscadas, ataques surpresa e cercos. #nBem, não é uma grande ameaça, mas enfim."
90001020-17 = "……Já é difícil lidar com a Chefe, não sei se tenho confiança para cuidar da Toki também."
90001020-18 = "[s] \"Acho que a Toki não faz por mal…….\""
90001020-19 = "Acho que o problema não é esse, sabia?"
90001020-20 = "[s] \"Sinto que tivemos uma conversa parecida agora pouco…….\""
90001020-26 = "Ora, ora…… fazer a Eimi ficar com essa cara de preocupada. #nIsso é impressionante, Toki."
90001020-27 = "Não é para tanto…… obrigada."
90001020-28 = "……Enfim, o que é aquilo que precisamos ver pessoalmente?"
90001020-29 = "Hum…… vou enviar agora. Quero que o Sensei analise comigo."
90001020-34 = "[ns] \"Isso é……?\""
90001020-37 = "Parece o rastro de algo gigantesco que cortou a geleira…… #nQual é o resultado da análise do local?"
90001020-40 = "A mesma conclusão da Chefe. Parece que algo grande, como um navio, quebrou o gelo."
90001020-41 = "Concordo. #nSerá que isso pode ser um rastro do Geburah?"
90001020-42 = "Como não temos outras pistas, acho que o melhor a fazer é seguir isso."
90001020-43 = "……."
90001020-44 = "……É precipitado concluir que isso é um rastro do Geburah."
90001020-45 = "Vocês se lembram de quando ele apareceu pela primeira vez?"
90001020-46 = "Ele surgiu do nada debaixo da geleira."
90001020-47 = "Ah, entendi."
90001020-48 = "Sim. O padrão de surgimento do Geburah provavelmente se baseia em se mover em alta velocidade sob a geleira."
90001020-49 = "No entanto, isso é muito diferente desse tipo de movimento."
90001020-50 = "Além disso…… pensando nos padrões de comportamento anteriores, não acho que ele deixaria rastros de propósito."
90001020-51 = "Então…… isso não é o Geburah……."
90001020-53 = "……É outro profeta, então."
90001020-55 = "Não tenho certeza absoluta. #nJá que perdemos o Geburah, nos restam poucas pistas."
90001020-56 = "……Precisamos definir uma estratégia logo."
90001020-57 = "[s] \"Por enquanto, vamos seguir esse rastro.\""
90001020-58 = "Entendo……? #nComo não temos outras pistas, não parece haver outro caminho, é isso?"
90001020-59 = "Se for de outro profeta, talvez eventualmente cheguemos ao Geburah……."
90001020-60 = "[s] \"Além disso, também estou preocupado com aquelas garotas.\""
90001020-61 = "Aquelas garotas……?"
90001020-62 = "Você se refere às três que se autodenominaram Ain, Soph e Aur, certo?"
90001020-64 = "Ah…… foram as primeiras com quem conseguimos \"comunicar\" algo relacionado ao Decagrammaton."
90001020-65 = "Exatamente. #nNão acho que o fato de elas terem aparecido aqui seja uma coincidência."
90001020-67 = "Concordo com a opinião do Sensei."
90001020-68 = "Então, Eimi e Toki, sigam o rastro e——"
90001020-70 = "O que está dizendo? #nA Chefe também vai vir."
90001020-71 = "Sim. #nSensei, por favor, venha conosco também."
90001020-72 = "[s] \"Ué, eu também……?\""
90001020-74 = "Eu também!?"
90001020-76 = "É óbvio, não é? #nVocê nem sabe até onde isso vai dar, sabe?"
90001020-77 = "Acho que seria mais eficiente usar um helicóptero do que irmos a pé."
90001020-78 = "Eficiência é importante. Vou repetir porque é algo essencial: #nEficiência é, realmente, muito importante."
90001020-80 = "Isso é... como pedir para que eu, uma flor solitária, delicada, frágil, pura e doentia, me jogue em uma geleira impiedosa, não é?"
90001020-82 = "Está tudo bem. #nO corpo da diretora é mais forte do que ela pensa. Eu garanto."
90001020-83 = "Exatamente. #nÉ tão forte quanto um panda-vermelho tentando bloquear o caminho com uma pose de intimidação."
90001020-85 = "Não é um pouco difícil entender o nível dessa força?"
90001020-86 = "[s1] \"Daqui em diante, a área de busca vai ficar maior.\" \n[s2] \"Como os dois disseram, parece melhor nos reunirmos e seguirmos juntos.\""
90001020-89 = "C-cof... certamente há um fundo de verdade nisso. Entendido."
90001020-90 = "Eimi e Toki, por favor, retornem por enquanto. #nDe agora em diante, nós vamos..."
90001020-91 = "[s] \"Seguir aqueles rastros gigantescos!\""
90001020-92 = "...Você parece estar se divertindo, Sensei."
90001020-98 = "Conectando aqui... cruzando os cilindros..."
90001020-99 = "Pronto, com isso..."
90001020-100 = "Ein? Está mexendo com máquinas de novo?"
90001020-102 = "Uwaaaaaaaah!?!?"
90001020-103 = "Nossa, que susto!"
90001020-104 = "S-s-s-Soph, é você... D-desculpe, eu gritei de repente..."
90001020-105 = "Precisa se assustar tanto assim? Só tem nós duas aqui."
90001020-106 = "Hiiin... m-mas, se falarem comigo enquanto estou concentrada, eu me assusto..."
90001020-107 = "Tá, tá, desculpa por te atrapalhar."
90001020-112 = "Mas mesmo assim... que máquina incrível. Para que serve isso?"
90001020-113 = "E-essa coisa de agora!? #nIsso é... bem... é..."
90001020-114 = "Ah, bem... pode explicar por cima, tá?"
90001020-115 = "S-sim! I-isso conecta engrenagens, um eixo de transmissão e... cilindros auxiliares com o dispositivo de energia..."
90001020-116 = "Enfim, conectando várias coisas... ficou maior do que antes..."
90001020-118 = "É uma \"calculadora mecânica\"!!!"
90001020-119 = "De novo...?"
90001020-121 = "E-eu aumentei o tamanho, então a memória ficou incrível também? #nConsegue memorizar 10 mil números de 50 dígitos...!"
90001020-122 = "Não daria para fazer isso com uma calculadora de mão? #nPrecisa mesmo usar essas peças todas?"
90001020-126 = "Não que eu queira me meter no hobby dos outros, mas..."
90001020-127 = "H-hiiin..."
90001020-128 = "E-ei, bem... olhando de novo, é realmente incrível! #n...Isso!"
90001020-129 = "Conseguir mover uma máquina tão... gigantesca com apenas uma alavanca, é um design super eficiente!"
90001020-130 = "E-ehehe... não é? #nEu gosto desse tipo de coisa."
90001020-131 = "De ver dispositivos gigantes se movendo de forma regular?"
90001020-132 = "Sim! A r-regularidade é, b-bem, bonita, não é?"
90001020-133 = "Se for para pedir algo, se for um dispositivo grande, rígido... e robusto, melhor ainda!"
90001020-134 = "Se pudesse continuar se movendo para sempre sem ajuda externa... seria perfeito!"
90001020-135 = "Não, sem ajuda externa é impossível."
90001020-136 = "E acho melhor você não sair dizendo por aí que gosta de coisas grandes e rígidas."
90001020-137 = "É-é mesmo...? #nPor que...?"
90001020-138 = "I-isso é porque..."
90001020-140 = "É uma expressão usada entre os chamados \"humanos\" com um sentido vulgar. #nNão é, Soph?"
90001020-142 = "O-Owl!?"
90001020-147 = "Ao pesquisar essa expressão no protocolo aberto de Kivotos, descobri que alguns humanos se sentem desconfortáveis com ela. Embora eu não saiba o motivo."
90001020-148 = "Aliás, Soph, por que você conhece tão bem as expressões humanas?"
90001020-149 = "V-verdade...?"
90001020-150 = "Ein também está curiosa. #nPor favor, explique o motivo logo."
90001020-151 = "Owl, por que de repente..."
90001020-153 = "A pauta de hoje é: por qual caminho Soph aprendeu o vocabulário humano――"
90001020-154 = "Como você sabe tanto sobre seres tão inferiores e cheios de contradições!"
90001020-155 = "Este é um assunto muito distante dos nossos objetivos, mas――"
90001020-156 = "Precisamos confirmar rapidamente. Porque――"
90001020-157 = "Eu quero ver o rosto da Soph corado de vergonha!"
90001020-159 = "Owl!"
90001020-165 = "Isso dói……."
90001020-166 = "V-v-v-você está bem, Owl！？！？"
90001020-167 = "Você colheu o que plantou, não é?"
90001020-168 = "Haa…… se tem tempo para jogar conversa fora, concentre-se em decifrar a 'Lei'."
90001020-169 = "Precisamos terminar a prova de existência d'Aquele antes que o altar fique pronto, não precisamos?#nNão temos tempo nenhum sobrando."
90001020-171 = "A decifração já foi concluída, sabia?"
90001020-173 = "Hã, já?"
90001020-180 = "Sim, obtivemos uma grande quantidade de dados durante o confronto com o Abi-Eshuh."
90001020-181 = "Aliás, não haveria motivo para eu vir aqui além disso, certo?#nPor acaso…… você se sentiu solitária e entendeu errado?"
90001020-183 = "Diga logo o que precisa!"
90001020-184 = "Guh, nada de violência!"
90001020-195 = "E-esta é…… a Lei para o 'Deus Sem Nome'."
90001020-196 = "……Realmente, com isso poderemos reproduzir o sublime de antes da iluminação. #nQuando ouvi pela primeira vez, pensei que fosse apenas uma lenda……."
90001020-201 = "Não é uma história tão antiga assim. Estava claramente registrado nas palavras d'Ele."
90001020-202 = "É verdade…… Ele também disse: 'Prove-me até os confins da terra'."
90001020-203 = "Mas…… por causa de variáveis incontroláveis, a tragédia aconteceu……."
90001020-211 = "'A maldade do homem aumentou na terra, e ele só pensa em coisas más o tempo todo'."
90001020-212 = "'A água varrerá tudo isso'."
90001020-213 = "Bem…… foi um resultado um pouco lamentável, de fato."
90001020-214 = "Mas nós precisávamos encontrar pistas.#nPorque era necessário."
90001020-219 = "Sim…… foi por isso que conseguimos chegar até aqui, mas……."
90001020-223 = "Aconteceu algo, Ain? Alguma preocupação?"
90001020-224 = "Mesmo que seja pela prova de existência e pela verdade…… será que realmente precisávamos depender de conceitos e poderes desaparecidos……?"
90001020-225 = "C-claro, não tenho a intenção de desobedecer às palavras d'Ele, mas……!"
90001020-227 = "Não estamos erradas. Fomos criadas assim.#nVai questionar isso agora?"
90001020-229 = "Eu entendo o que a Ain quer dizer."
90001020-230 = "Fomos criadas com perfeição.#nNão precisamos mudar."
90001020-231 = "Sim……! É por isso que nós……"
90001020-232 = "Você está enganada, Ain.#nMudemos de perspectiva, então."
90001020-236 = "Para começar, o poder incompleto do 'Deus Sem Nome' é apenas uma ferramenta. #nNa verdade, é muito mais eficaz quando nós, que somos perfeitas, o utilizamos."
90001020-237 = "E-entendo……?"
90001020-239 = "Exato. Nós provamos isso ao usar livremente o poder dos deuses esquecidos."
90001020-240 = "Se o plano seguir perfeitamente, poderemos transformar os fragmentos desta terra em nossa própria raiz."
90001020-241 = "Aliás, 'Deus Sem Nome' é um nome pomposo, mas não passa de um artefato artificial, não é? É como o combustível fóssil que os humanos usam."
90001020-242 = "Como obtemos energia de algo do passado, acho que não estou totalmente errada……."
90001020-250 = "Hm? O que foi?"
90001020-252 = "D-desculpe…… eu não entendi muito bem……"
90001020-253 = "Não é algo com que você precise se preocupar, Ain. A Soph está apenas usando exemplos que os humanos gostam."
90001020-254 = "Não consigo entender por que a Soph tem tanta curiosidade sobre a ecologia desses seres inferiores."
90001020-259 = "N-não é curiosidade!#nÉ que…… um dia, nós vamos dominar o território humano também……."
90001020-260 = "Por exemplo…… veja! É como gado.#nOs humanos também conhecem bem a ecologia do gado, não conhecem?"
90001020-261 = "G-gado…… o que é isso……?"
90001020-262 = "É um mau hábito da Soph. Haa, são conceitos que não precisamos conhecer."
90001020-267 = "Venha aqui, Ain.#nDeixe a Soph de lado e vamos testar o novo dispositivo cibernético que desenvolvemos."
90001020-273 = "Ei, não dê maus exemplos para a Ain."
90001020-277 = "Não é você quem está dando maus exemplos?"
90001020-278 = "E-ei, esperem um pouco, Soph, Owl...! #nN-não briguem...!"
90001020-288 = "Hm? Isso é... Geburah?"
90001020-289 = "D-da Geburah? V-vou verificar agora mesmo."
90001020-290 = "……Entendo. É uma proposta de estratégia. #nEla quer que eu remova o limite dela."
90001020-291 = "I-isso não pode! A sobrecarga é grande demais!"
90001020-292 = "Vamos ouvir o que ela tem a dizer até o fim."
90001020-294 = "Entendi. A missão da Geburah era a patrulha desta geleira e a eliminação de intrusos..."
90001020-295 = "E ela quer que a deixemos concluir isso..."
90001020-296 = "Compreendido. Ela quer se vingar daquele humano, não é?"
90001020-297 = "Ugh, a Geburah é um pouco cabeça quente. Mas..."
90001020-298 = "O que diz aqui? #nCaso ela seja derrotada, quer que a gente atraia o inimigo para... o 'tal lugar'."
90001020-299 = "Hum... então ela preparou um Plano B."
90001020-300 = "Bem, parece interessante. Vamos autorizar."
90001020-301 = "Sério, tem certeza? #n...Bem, não é como se eu fosse totalmente contra."
90001020-302 = "E-eu, eu, eu sou contra! #nAquele lugar é... e além disso, o que ela está fazendo agora é...!"
90001020-303 = "É uma espécie de aposta. Mas a direção da estratégia em si não parece estar errada."
90001020-304 = "Sim. Geburah é forte o suficiente. #nAlém disso, como serão batalhas consecutivas, o inimigo também sofrerá um desgaste intenso."
90001020-305 = "Ela tem a vantagem do terreno — não são condições suficientes?"
90001020-306 = "M-mas, será que vai ficar tudo bem mesmo? #nSe algo acontecer com ela..."
90001020-307 = "O que você está dizendo, Ain? Quando chegar a hora, será a sua vez de agir."
90001020-308 = "Ah...! É verdade...? #nEra a minha vez de me manter firme... uuu..."
90001020-309 = "Bem, quando esse momento chegar, acho que a Ain será a que mais vai se divertir, hehe."
90001020-310 = "Então, vamos decidir. Eu sou a favor da estratégia da Geburah. #nE vocês, Ain e Owl?"
90001020-311 = "Valorizar a autonomia é importante. #nOs profetas acabaram de despertar, afinal."
90001020-312 = "E-entendido. Se a Soph e a Owl dizem isso... e se a Geburah realmente quer fazer isso..."
90001020-313 = "O uso e a utilidade do poder do 'Deus Sem Nome' — eu vou provar isso!"
90001020-318 = "Próximo episódio: O Segundo Encontro"
