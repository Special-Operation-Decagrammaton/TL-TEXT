[translation]
90001020-1 = "第2話;調査"
90001020-2 = "エイミ、トキ。無事ですか？報告を！"
90001020-7 = "こちらエイミ。問題ないよ。"
90001020-8 = "同じく。"
90001020-9 = "ですが、新たな報告があります。"
90001020-10 = "口頭で終わるものと、直接見ないといけないものがあるけど、どっちから聞く？"
90001020-12 = "簡単な方からお願いします。"
90001020-13 = "眷属の動きが少し変わってきてる。"
90001020-14 = "具体的には？"
90001020-15 = "今までは統率が取れていなかったのに、急に連携して攻撃するようになりました。"
90001020-16 = "待ち伏せや奇襲、包囲などを行うようになったのです。#nまあ、さしたる脅威ではないのですが。ピース、ピース。"
90001020-17 = "……部長だけでも手一杯なのに、トキの面倒まで見る自信ないかも。"
90001020-18 = "[s] \"トキに悪気はないと思うよ……。\""
90001020-19 = "そういう問題じゃないと思うよ？"
90001020-20 = "[s] \"さっきも似たような会話をした気が……。\""
90001020-26 = "あらあら……エイミに困った顔をさせるなんて。#nすごいですね、トキ。"
90001020-27 = "それほどでも……ありがとうございます。"
90001020-28 = "……ところで、直接見ないといけないものとは？"
90001020-29 = "うーん……とりあえず送信するね。先生も一緒に判断してほしい。"
90001020-34 = "[ns] \"これは……？\""
90001020-37 = "巨大な何かが氷河を切り裂いて移動した跡……に見えますね。#n現場の分析結果はどうですか？"
90001020-40 = "部長の見解と同じ。船のような大きいものが氷を割った感じじゃないかな。"
90001020-41 = "同意見です。#nこれは、もしかしたらゲブラの痕跡なのでは？"
90001020-42 = "他に手がかりがない以上、今後はこれを追うのが得策かと。"
90001020-43 = "……。"
90001020-44 = "……これをゲブラの痕跡だと断定するのは早計です。"
90001020-45 = "あれが初めて出現した時のことを覚えていますか？"
90001020-46 = "氷河の下からいきなり出てきたね。"
90001020-47 = "あ、そういうことか。"
90001020-48 = "ええ。ゲブラの出現パターンは、おそらく氷河の下を高速で移動することによって成立しているもの。"
90001020-49 = "ですが、これはそういった動きとはかけ離れています。"
90001020-50 = "それに……今までの行動パターンから考えて、わざわざ痕跡を残すとも思えません。"
90001020-51 = "そう……これはゲブラではなく……。"
90001020-53 = "……別の預言者、ですか。"
90001020-55 = "確信があるわけではありません。#nゲブラを逃した以上、私たちに残された手がかりは少ないですから。"
90001020-56 = "……そろそろ方針を固めなければなりませんね。"
90001020-57 = "[s] \"ひとまず、この痕跡を辿ってみようか。\""
90001020-58 = "なるほど……？#n手がかりがない以上、他に良い方針はなさそうだから、ということですね？"
90001020-59 = "別の預言者のものであるのなら、いつかゲブラに行き着くでしょうし……。"
90001020-60 = "[s] \"それに、あの子たちのことも気になるからね。\""
90001020-61 = "あの子たち……？"
90001020-62 = "アイン、ソフ、オウルと名乗っていた3人のことですね。"
90001020-64 = "ああ……デカグラマトン関連で初めて「コミュニケーション」がとれた相手だね。"
90001020-65 = "そうですね。#n彼女たちがここに現れたこと自体、偶然とは思えません。"
90001020-67 = "私も先生の意見に賛同です。"
90001020-68 = "それでは、エイミとトキは痕跡を辿って――"
90001020-70 = "何言ってるの？#n部長も来るんだよ。"
90001020-71 = "そうですね。#n先生もご一緒にお願いします。"
90001020-72 = "[s] \"えっ、私も……？\""
90001020-74 = "私もですか！？"
90001020-76 = "当たり前でしょ。#nこれがどこまで繋がってるのかも分からないんだよ？"
90001020-77 = "私たちが徒歩で移動するより、ヘリを使ったほうが効率的かと。"
90001020-78 = "効率は大事だよ。大切なことだからもう一度言うね。#n効率は、本当に、大事だよ。"
90001020-80 = "それは……可憐で弱々しく、清楚で病弱な一輪の花であるこの私に、過酷な氷河へ飛び込めと言っているようなものですよ？"
90001020-82 = "大丈夫だよ。#n部長が思ってる以上に部長の身体は強い。私が保証する。"
90001020-83 = "その通りです。#n威嚇のポーズで道を防ごうとするレッサーパンダくらい強いです。"
90001020-85 = "絶妙に強さが分かりづらくないですか？"
90001020-86 = "[s1] \"ここから先は、捜索範囲が広くなるだろうから。\"\n[s2] \"二人の言う通り、合流して動いた方が良さそうだね。\""
90001020-89 = "こ、こほん……たしかに一理ありますね。わかりました。"
90001020-90 = "エイミとトキは一旦戻ってください。#nこれから私たちは――"
90001020-91 = "[s] \"あの巨大な痕跡を辿っていくよ！\""
90001020-92 = "……なんだか楽しそうですね、先生。"
90001020-98 = "ここを繋げて……シリンダーを交差させて……。"
90001020-99 = "よし、これで……。"
90001020-100 = "アイン？また機械いじってるの？"
90001020-102 = "うひゃああああああっ！？！？"
90001020-103 = "うわっ、びっくりした！"
90001020-104 = "そ、そ、そ、ソフ、ですか……ご、ごめんなさい、急に叫んでしまって……。"
90001020-105 = "そんな驚くことある？ここには私たちしかいないのに。"
90001020-106 = "ひ、ひぃん……で、でも、集中してる時に話しかけられたら、びっくりします……。"
90001020-107 = "はいはい、邪魔してごめんって。"
90001020-112 = "にしても……すごい機械だね。これ、何に使うの？"
90001020-113 = "こ、今回の子ですか！？#nこれは……その……えっと……。"
90001020-114 = "あー、えっと……ざっくりでいいよ？"
90001020-115 = "は、はい！こ、これは歯車と、駆動軸と……補助のためのシリンダーと動力装置を繋いでて……。"
90001020-116 = "とにかく、色々繋げて……以前より大きくなった――"
90001020-118 = "「機械式電卓」です！！！"
90001020-119 = "また……？"
90001020-121 = "お、大きくしたのでメモリもすごくなったんですよ？#n50桁の数字を1万個も覚えられるんです……！"
90001020-122 = "別に手のひらサイズの電卓でもできるんじゃない？#nそんな部品使う必要ある？"
90001020-126 = "いや……他人の趣味に口出しするのはナンセンスだけどさ。"
90001020-127 = "ひ、ひぃん……。"
90001020-128 = "え、えっと……改めて見るとやっぱすごいな～！#n……うん！"
90001020-129 = "こんな……巨大な機械をレバーひとつで動かせるなんて、すっご～く効率的な設計だね！"
90001020-130 = "え、えへへ……でしょう？#n私はこういうのが好きで。"
90001020-131 = "巨大な装置が規則正しく動くのが？"
90001020-132 = "はい！き、規則性というのは、う、美しいですからね！"
90001020-133 = "欲を言うなら、おっきくて固くて……頑丈な装置だとなおよし！です！"
90001020-134 = "外部の力を借りずに、永久に動き続けられるなら……言う事無し、です！"
90001020-135 = "いや、外部の力なしは無理でしょ。"
90001020-136 = "あと、おっきくて固いとかは人前で言わないほうがいいと思うよ。"
90001020-137 = "そ、そうなんですか……？#nどうして、ですか……？"
90001020-138 = "そ、それは……。"
90001020-140 = "所謂――「人間」の間で、低俗な意味として使われる表現だからです。#nそうでしょう、ソフ？"
90001020-142 = "お、オウル！？"
90001020-147 = "キヴォトスのオープンプロトコルでその表現を検索したところ、一部の人間が困惑を覚えるとのことです。理由までは分かりませんでしたが。"
90001020-148 = "ところで、ソフはどうして人間の表現に詳しいのですか？"
90001020-149 = "た、たしかに……？"
90001020-150 = "アインも不思議がっていますよ。#n早く理由を述べてください。"
90001020-151 = "オウル、急に何を……。"
90001020-153 = "本日の議題です！ソフはどのような経路で人間の語彙を学習したのか――"
90001020-154 = "どうして下等で矛盾に満ちた存在にそこまで詳しいのか！"
90001020-155 = "これは、私たちの目的とはかけ離れた議題ですが――"
90001020-156 = "迅速に確認しなければなりません。なぜなら――"
90001020-157 = "ソフが羞恥に頬を染める姿が見たいから、です！"
90001020-159 = "オウル！"
90001020-165 = "痛いです……。"
90001020-166 = "だ、だだだだ、大丈夫ですか。オウル！？！？"
90001020-167 = "自業自得でしょ。"
90001020-168 = "はぁ……そんな無駄口叩いてる暇があるなら、「掟」の解読に集中しなよ。"
90001020-169 = "祭壇完成前に、あの方の存在証明を終わらせないとなんだよ？#n時間がぜーんぜん足りないんだから。"
90001020-171 = "解読なら終わっていますよ？"
90001020-173 = "え、もう？"
90001020-180 = "ええ、アビ・エシュフとの交戦でデータを大量に手に入れましたので。"
90001020-181 = "というか、その件以外で私が来る理由なんてありませんよね？#nもしかして……寂しくて勘違いしてしまったんですか？"
90001020-183 = "先に要件から話してよね！"
90001020-184 = "ぐはっ、暴力反対！"
90001020-195 = "こ、これが……「名もなき神」のための掟。"
90001020-196 = "……本当にこれで啓蒙以前の崇高を再現できるのですね。#n最初に聞いたときは、昔話かと思っていました……。"
90001020-201 = "別にそんなに遠い昔の話でもないよ。あの方の言葉ではっきりと記録されてたし。"
90001020-202 = "そうですね……あの方も仰ってました。「私を地の果てまで立証せよ」と。"
90001020-203 = "ですが……制御不能な変数のせいで悲劇が起こって……。"
90001020-211 = "「地上に人の悪が増し、常に悪いことばかりを心に思いはかっている」"
90001020-212 = "「水がそのすべてを一掃してくれる」"
90001020-213 = "まあ……少し、残念な結果とはなりましたが。"
90001020-214 = "でも、私たちは手がかりを探さないといけなかった。#n必要だったから。"
90001020-219 = "はい……だからこそ、ここにたどり着けましたが……。"
90001020-223 = "どうかしましたか、アイン。何か気になることでも？"
90001020-224 = "存在証明と真理のためとはいえ……果たして、消えた概念[ruby=名もなき神の力]や権能に[/ruby]頼る必要があったのでしょうか……？"
90001020-225 = "も、もちろん、あの方のお言葉に逆らうつもりはありませんが……！"
90001020-227 = "私たちに間違いはないよ。そう作られてるもん。#n今更それを疑うの？"
90001020-229 = "アインが言いたいことも理解できます。"
90001020-230 = "私たちは完全性を有して創造されました。#n変化する必要はありません。"
90001020-231 = "はい……！だからこそ、私たちは……"
90001020-232 = "違いますよ、アイン。#nそうですね……視点を変えましょうか。"
90001020-236 = "そもそも、不完全な「名もなき神」の力は道具にすぎないのです。#nむしろ、完全な私たちが使う方が有効活用できるというもの。"
90001020-237 = "な、なるほど……？"
90001020-239 = "そう。私たちは忘れられた神々の力を自在に使うことで、それを証明した。"
90001020-240 = "計画が完璧に進めば、この地の破片を私たちの根源に変えられる。"
90001020-241 = "というか「名もなき神」って仰々しい名前だけど、ただの人工遺物じゃん？人間が使っている化石燃料と同じだよ。"
90001020-242 = "過去のものから動力を得てるわけだから、あながち間違ってないと思うんだけど……。"
90001020-250 = "ん？どうしたの？"
90001020-252 = "す、すみません……ちょっと理解できなくて……"
90001020-253 = "アインが気にすることではありません。またソフが人間が好む例えを使っているだけです。"
90001020-254 = "なぜソフはあのような下等存在の生態に好奇心を抱くのか、理解ができません。"
90001020-259 = "こ、好奇心じゃないよ？#nその……いつか、人間の領域だって支配するわけだし……。"
90001020-260 = "例えば……ほら！家畜みたいなものだよ。#n人間だって、家畜の生態には詳しいでしょ？"
90001020-261 = "か、家畜って……何ですか……？"
90001020-262 = "ソフの悪癖ですね。はぁ、私たちが知る必要のない概念のことです。"
90001020-267 = "さあ、こっちに来てください、アイン。#nソフなんて放っておいて、一緒に新しく開発した電脳装置を試しましょう。"
90001020-273 = "ちょっと、アインに悪い影響を与えないでよ。"
90001020-277 = "悪い影響を与えているのはそっちではありませんか？"
90001020-278 = "ちょ、ちょっと待ってくださいソフ、オウル……！#nけ、喧嘩しないでください……！"
90001020-288 = "ん？これは……ゲブラ？"
90001020-289 = "げ、ゲブラちゃんからですか？す、すぐ確認します。"
90001020-290 = "……なるほど。作戦の提案ですね。#n自分のリミットを解除してほしい、と。"
90001020-291 = "そ、それはダメです！負担が大きすぎます！"
90001020-292 = "一旦、最後まで話を聞いてあげようよ。"
90001020-294 = "なるほどね。ゲブラの任務はこの氷河[ruby=しょうかい]の哨戒と[/ruby]邪魔者の排除だったから……。"
90001020-295 = "それを最後までやらせてほしい、と……。"
90001020-296 = "理解しました。あの人間に復讐をしたいのですね。"
90001020-297 = "うぅ、ゲブラちゃんはちょっと短気ですからね。でも……。"
90001020-298 = "なになに？#n万が一自分が突破されたら、敵を……「例の場所」に誘導してほしいってさ。"
90001020-299 = "ふむ……プランBを用意しているのですね。"
90001020-300 = "まあ、面白そうですし、許可しましょう。"
90001020-301 = "え、本当にいいの？#n……いや、まあ。私も強く反対してるわけじゃないけど。"
90001020-302 = "わ、わわわわ、私は反対です！#n例の場所は……それに、今あの子がやってることは……！"
90001020-303 = "一種の賭けだよね。でも、作戦の方向性自体はそんなに間違ってないんじゃないかな。"
90001020-304 = "ええ。ゲブラは十分強いです。#nそれに、連戦となるでしょうから、敵の消耗も激しくなる。"
90001020-305 = "地の利もあの子にある――条件としては十分なのでは？"
90001020-306 = "で、でも、本当に……大丈夫なんでしょうか？#nもしあの子に何かあったら……。"
90001020-307 = "何を言ってんの、アイン。そうなった時は、あんたの出番でしょ。"
90001020-308 = "あ……！た、たしかに……？#n私が気を引き締める番でした……ううぅ……。"
90001020-309 = "まあ、実際その時が来たら――アインが一番楽しんでそうですが、ふふ。"
90001020-310 = "んじゃ、決めよっか。私はゲブラの作戦に賛成。#nアインとオウルは？"
90001020-311 = "自主性を重んじるのは大切です。#n預言者たちは目覚めたばかりですから。"
90001020-312 = "わ、わかりました。ソフとオウルがそう言うのなら……それに、ゲブラちゃんがそうしたいなら……。"
90001020-313 = "「名も無き神」の力の使い方と有用性――私が証明してみます！"
90001020-318 = "次回;二度目の邂逅"
