[translation]
1003603-1 = "O excesso é tão ruim quanto a falta."
1003603-2 = "Interior da Catedral da Trindade"
1003603-3 = "（Ao entrar na catedral, vi algumas alunas da irmandade conversando com expressões preocupadas）"
1003603-4 = "Irmã Hinata, ela simplesmente não quer nos ouvir..."
1003603-5 = "Pois é, desse jeito..."
1003603-6 = "[s1] （\"Não quer nos ouvir\"...?）\n[s2] （\"Desse jeito\"...?）"
1003603-7 = "......Ah, Professor?"
1003603-8 = "......Ah, Professor?"
1003603-9 = "O-olá. Professor, por que veio aqui hoje?"
1003603-10 = "S-será que é por causa da mensagem que eu enviei...?"
1003603-11 = "Ugh..."
1003603-12 = "[s3] \"Hinata, você está bem? Parece que não está se sentindo bem...\"\n[s4] \"Esse suor não parece bom... Será que você não está resfriada?\""
1003603-13 = "Bem, é que..."
1003603-14 = "Bem, é que..."
1003603-15 = "N-não é nada demais, eu garanto...!"
1003603-16 = "Isso acontece de vez em quando, e não é como se eu não conseguisse me mover..."
1003603-17 = "E-estou realmente bem, por favor, não se preocupe..."
1003603-18 = "[s5] \"...Vamos mudar de lugar, Hinata.\"\n[s6] \"...Consegue andar um pouco?\""
1003603-19 = "......?"
1003603-20 = "......?"
1003603-21 = "Isso, é que..."
1003603-22 = "S-sim..."
1003603-28 = "Com licença, Professor?"
1003603-29 = "A-aonde vamos...?"
1003603-30 = "Não tem mais ninguém por aqui, sabe...?"
1003603-31 = "Ah, um lugar sem ninguém...?"
1003603-32 = "M-mas..."
1003603-33 = "É-é melhor eu descansar? Você também acha isso, Professor...?"
1003603-34 = "Mas é que ainda tenho coisas para fazer hoje..."
1003603-35 = "Se eu não fizer, vou acabar incomodando todas ainda mais..."
1003603-36 = "[s7] \"Não é incômodo, é preocupação.\"\n[s8] \"Eu vou te ajudar com o resto.\""
1003603-37 = "N-não, eu não posso simplesmente jogar meu trabalho em cima de você...!"
1003603-38 = "N-não, eu não posso simplesmente jogar meu trabalho em cima de você...!"
1003603-39 = "E-eu não consigo fazer o trabalho das outras pessoas... e sempre acabo sendo ajudada por todos..."
1003603-40 = "Desse jeito, eu..."
1003603-41 = "[s] \"É o contrário.\""
1003603-42 = "......?"
1003603-43 = "O contrário, você diz...?"
1003603-44 = "[s] \"Todos confiam em você, Hinata, por isso querem que você descanse.\""
1003603-45 = "......"
1003603-46 = "Ah..."
1003603-47 = "S-será mesmo...?"
1003603-48 = "É que, eu não consigo sentir isso de verdade..."
1003603-49 = "Se o que você diz for verdade, eu ficaria muito feliz..."
1003603-50 = "Mas eu mesma não me vejo dessa forma..."
1003603-51 = "......Não."
1003603-52 = "......Me desculpe. Não é verdade."
1003603-53 = "Até você dizer isso... não consigo mais duvidar das palavras de todos..."
1003603-54 = "Hehe..."
1003603-55 = "Sinto que, de repente, relaxei completamente..."
1003603-58 = "[wa:5550]― Bem... [wa:1450]me desculpe, [wa:1350]Sensei."
1003603-60 = "[wa:50]― De alguma forma, [wa:1600]acabei causando problemas a você..."
1003603-63 = "[wa:1250]― Eu pensei que [wa:1550]não fosse nada demais, mas..."
1003603-65 = "― Eu me orgulhava de ter um corpo resistente, mas [wa:3150]que vergonha..."
1003603-68 = "[wa:1650]― Como você disse, [wa:2200]acho que vou [wa:1300]descansar um pouco."
1003603-71 = "― E então, [wa:1200]bem... [wa:2050]durante esse tempo,"
1003603-73 = "― Você poderia ficar comigo?"
1003603-76 = "[wa:8600]― Assim, [wa:1800]eu me sentiria muito melhor..."
1003603-79 = "[wa:1600]― Sim, [wa:1600]obrigada."
1003603-81 = "― ...Sensei, você é gentil."
1003603-84 = "Graças a você, me sinto muito melhor."
1003603-85 = "Vou voltar para casa agora... e descansar."
1003603-86 = "Neste estado, eu só causaria problemas... e preocupações a você."
1003603-87 = "Preciso descansar logo e recuperar minha saúde..."
1003603-88 = "E depois disso, preciso ser alguém em quem todos possam confiar."
1003603-90 = "(Depois disso, deixei a catedral junto com Hinata)"
1003603-91 = "(...Embora tenhamos sido olhados de forma estranha pelas pessoas ao redor, não tive escolha a não ser ignorar)"
