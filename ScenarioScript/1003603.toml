[translation]
1003603-1 = "過ぎたるは猶及ばざるが如し"
1003603-2 = "トリニティ聖堂内部"
1003603-3 = "（聖堂に入ると、何だか心配そうな顔で相談をしているシスターの生徒たちが目に入った）"
1003603-4 = "シスターヒナタ、中々お話を聞いてくれませんね……。"
1003603-5 = "そうですね、このままでは……。"
1003603-6 = "[s1] （「話を聞いてくれない」……？）\n[s2] （「このままでは」……？）"
1003603-7 = "……あら、先生？"
1003603-8 = "……あら、先生？"
1003603-9 = "こ、こんにちは。先生、今日はどうしてこちらに？"
1003603-10 = "も、もしかして、私が送ったメッセージのせいで……？"
1003603-11 = "うっ……。"
1003603-12 = "[s3] \"ヒナタ、大丈夫？具合悪そうだけど……。\"\n[s4] \"良くない汗のかき方……もしかして風邪じゃない？\""
1003603-13 = "えっと、その……。"
1003603-14 = "えっと、その……。"
1003603-15 = "た、大したことではありませんので……！"
1003603-16 = "これくらいは時々あることですし、全然動けないほどではありませんし……。"
1003603-17 = "ほ、本当に大丈夫ですので、お気になさらず……。"
1003603-18 = "[s5] \"……場所を変えよう、ヒナタ。\"\n[s6] \"……少しだけ動ける？\""
1003603-19 = "……？"
1003603-20 = "……？"
1003603-21 = "その、それは……。"
1003603-22 = "は、はい……。"
1003603-28 = "あの、先生？"
1003603-29 = "ど、どちらまで……？"
1003603-30 = "この辺りはもう、誰もいらっしゃいませんが……？"
1003603-31 = "え、誰もいないところに……？"
1003603-32 = "で、ですが……。"
1003603-33 = "や、休んだ方が良い、ですか？先生も、そう思うのですね……。"
1003603-34 = "ですがその、まだ今日やるべきことが……。"
1003603-35 = "やらないと、今以上にみなさんのご迷惑に……。"
1003603-36 = "[s7] \"迷惑じゃなくて、心配してるんだよ。\"\n[s8] \"あとは私も手伝うから。\""
1003603-37 = "そ、そんな、自分の仕事を押しつけるわけには……！"
1003603-38 = "そ、そんな、自分の仕事を押しつけるわけには……！"
1003603-39 = "わ、私は、他の方々の仕事を代わってあげられませんし……いつも、助けてもらってばかりで……。"
1003603-40 = "そんなことでは、私は……。"
1003603-41 = "[s] \"逆だよ。\""
1003603-42 = "……？"
1003603-43 = "逆、というのは……？"
1003603-44 = "[s] \"みんながヒナタを頼りにしてるから、休んでほしいんだよ。\""
1003603-45 = "……。"
1003603-46 = "え……。"
1003603-47 = "そ、そうなん、でしょうか……？"
1003603-48 = "その、どうしても実感が無くて……。"
1003603-49 = "そのお言葉が本当なら、すごく嬉しいのですが……。"
1003603-50 = "自分では、そのようには……。"
1003603-51 = "……いえ。"
1003603-52 = "……ごめんなさい。そんなことはありません。"
1003603-53 = "先生までそう言ってくださって……みなさんのその言葉を疑うなんて気持ちはもう、出てきませんね……。"
1003603-54 = "ふふっ……。"
1003603-55 = "なんだか、一気に気が緩んでしまいました……。"
1003603-58 = "[wa:5550]― その……[wa:1450]すみませんでした、[wa:1350]先生。"
1003603-60 = "[wa:50]― 何だか、[wa:1600]ご迷惑をおかけしてしまって……。"
1003603-63 = "[wa:1250]― 大したことないのではと、[wa:1550]思っていたのですが……。"
1003603-65 = "― 丈夫な身体が自慢でしたのに、[wa:3150]面目ないです……。"
1003603-68 = "[wa:1650]― 仰る通り、[wa:2200]少し[wa:1300]休もうと思います。"
1003603-71 = "― それで、[wa:1200]あの……[wa:2050]その間、"
1003603-73 = "― 一緒にいていただけませんか？"
1003603-76 = "[wa:8600]― その方が、[wa:1800]気持ちもずっと楽で……"
1003603-79 = "[wa:1600]― はい、[wa:1600]ありがとうございます。"
1003603-81 = "― ……先生は、[wa:1750]優しいですね。"
1003603-84 = "……おかげさまで、すごく楽になりました"
1003603-85 = "今日はもう帰って……休むことにします。"
1003603-86 = "今のこの状態では、それこそご迷惑を……心配させてしまいそう、ですし。"
1003603-87 = "早く休んで、体調を戻して……。"
1003603-88 = "その上で、みなさんに頼っていただかないと。"
1003603-90 = "（その後、ヒナタと一緒に聖堂を後にした）"
1003603-91 = "（……また周囲から奇異な目で見られたものの、気にしないようにするしかなかった）"
