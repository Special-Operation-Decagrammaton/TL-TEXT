[translation]
2005906-1 = "小悪魔とのデート"
2005906-3 = "ムツキと待ち合わせのオペラハウス"
2005906-6 = "あ、先生！こっちこっち！"
2005906-7 = "[s1] \"急にオペラハウスって……。\"\n[s2] \"何か依頼でもあった？\""
2005906-10 = "ううん。普通にオペラが見たくなっただけ。"
2005906-11 = "前は仕事で何も見られなかったでしょ？"
2005906-12 = "だから今日はゆっくり観賞したかったんだ～"
2005906-13 = "まあ、私には少し退屈かもしれないけど……。"
2005906-14 = "先生と一緒なら絶対楽しいでしょ！"
2005906-15 = "[s] \"楽しみだね！\""
2005906-16 = "くふふっ。じゃあ行こっか。"
2005906-18 = "わあ、すごい静か～。"
2005906-19 = "こういう場所でイタズラしたら、超面白そう！"
2005906-20 = "爆弾とかレインボー煙幕弾なんて投げたら、どうなっちゃうんだろ？"
2005906-21 = "[s] \"ほ、本当にするの？\""
2005906-22 = "くふふっ、冗談だよ～"
2005906-23 = "先生を困らせるのは面白くないからね。"
2005906-24 = "それに、今日はオペラを見に来たんだから。"
2005906-28 = "あ、始まるみたい。"
2005906-29 = "それじゃ、初めてのオペラ鑑賞スタート♪"
2005906-31 = "（壮大な音楽とともに舞台の幕が上がった）"
2005906-32 = "（音楽を愛する少女が手厳しい師匠のもとで、苦難を乗り越え夢を成就する、という内容の現代オペラだった）"
2005906-34 = "（もしかしたら退屈しているのでは、という心配をよそに）"
2005906-35 = "（ムツキは終始楽しそうにオペラに集中していた）"
2005906-43 = "（オペラの幕が下り……）"
2005906-45 = "[ns] \"すっかり夜だね。\""
2005906-46 = "うん！あっという間だったね～！"
2005906-47 = "あー楽しかった！"
2005906-48 = "芸術ってすごいんだね！　音楽だけでもすっごくワクワクした！"
2005906-49 = "[s] \"シンプルな内容だから余計良かったかも。\""
2005906-50 = "くふふっ。それなりに厳選したからね、これ。"
2005906-51 = "というかあのオペラって、弟子と師匠の話だったでしょ？"
2005906-52 = "見ててずっと気になってたんだけど……。"
2005906-56 = "先生は、私のことどう思う？"
2005906-57 = "[s3] \"う、うん！？\"\n[s4] \"きゅ、急に！？\""
2005906-60 = "ん？どしたの慌てて？なんか困る質問だった？"
2005906-61 = "先生にとって私は……。"
2005906-62 = "いい生徒？"
2005906-63 = "[s] \"あ……ああ！そっち！！\""
2005906-64 = "あれぇ～？もしかして違うこと考えてた～？"
2005906-65 = "なに？なに考えてたの？分かりやすく説明してほしいな～。"
2005906-66 = "[s] \"む、ムツキはいい生徒だな、って……！\""
2005906-67 = "あははっ！いいよ、この辺にしてあげるね。"
2005906-68 = "私は先生にとっていい生徒、ね……。"
2005906-69 = "くふふっ……。"
2005906-74 = "はい！オペラも楽しんだし、ご飯食べに行こー！"
2005906-75 = "近くの商店街に、いいお店を見つけたんだ！"
2005906-77 = "（ムツキに誘われたのはリーズナブルな焼き鳥屋で）"
2005906-78 = "（気兼ねなく夜ご飯を楽しんだ）"
2005906-83 = "（それからお洒落な今風のカフェに訪れ……）"
2005906-84 = "（最近あったことや流行りなど、他愛もない話に花を咲かせた）"
2005906-89 = "（気がつけば夜になり）"
2005906-90 = "（私たちは示し合わせていたかのように、近くの公園でふと立ち止まった）"
2005906-93 = "あーあ、もうバイバイの時間だね。"
2005906-94 = "今日はやけに時間が過ぎるの早いなぁ～。"
2005906-95 = "ありがとう、先生！今日は楽しかったよ！"
2005906-96 = "[s] \"うん、私も。\""
2005906-97 = "くふふ……また次も、デートしたいな。"
2005906-98 = "[s] \"そうだね、また次……。\""
2005906-103 = "[ns5] \"でっ、デート！？\"\n[ns6] \"い、言われてみれば、今日したことって……。\""
2005906-106 = "そっ！デート！"
2005906-107 = "やっと気が付いた？くふふ。先生って思ったより鈍感なんだね。"
2005906-108 = "私たち、デートらしいデートって今日が初めてだよね？"
2005906-109 = "デートだ、って思うと、いつもとなんか違う感じだった。"
2005906-110 = "うまく言えないけど、胸の奥がなんかこう、くすぐったい？みたいな。"
2005906-111 = "とにかく、ありがとね！私の初デートに付き合ってくれて♪"
2005906-112 = "[s] \"こ、こちらこそ光栄です！\""
2005906-113 = "あははっ！これで「自然な流れでデート」はクリアかな。"
2005906-114 = "最初は、先生をからかいたかったんだけど……今はもうどっちでもいいや。"
2005906-115 = "先生が私を「いい生徒」って言ってくれたように……。"
2005906-116 = "私も先生のこと、いい先生だと思ってる。"
2005906-121 = "だからこれからも、ずっとよろしくね！"
2005906-122 = "先生の言うことを聞くかは……私が決めるけどね♪くふふ。"
2005906-124 = "（その後も楽しくおしゃべりをして別れた）"
2005906-125 = "（……また会う日を約束して）"
