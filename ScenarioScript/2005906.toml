[translation]#[Não revisado] - Filipe 09/06/26
2005906-1 = "Encontro com a diabinha"
2005906-3 = "Casa de ópera onde combinou de se encontrar com Mutsumi"
2005906-6 = "Ah, professor! Aqui, aqui!"
2005906-7 = "[s1] \"De repente uma casa de ópera...\"\n[s2] \"É alguma missão?\""
2005906-10 = "Não. Só deu vontade de assistir a uma ópera."
2005906-11 = "Naquela vez, a gente não conseguiu ver nada por causa do trabalho, né?"
2005906-12 = "Então hoje quero apreciar com calma."
2005906-13 = "Bem, para mim pode ser um pouco chato..."
2005906-14 = "Mas se for com você, com certeza vai ser divertido!"
2005906-15 = "[s] \"Estou ansioso!\""
2005906-16 = "Kufufu. Então, vamos."
2005906-18 = "Nossa, que silêncio~"
2005906-19 = "Que lugar. Dá vontade de fazer uma travessura."
2005906-20 = "E se a gente jogasse uma bomba ou uma granada de fumaça colorida? O que será que aconteceria?"
2005906-21 = "[s] \"V-vai mesmo fazer?\""
2005906-22 = "Kufufu, é brincadeira~"
2005906-23 = "Não vou te atrapalhar, não."
2005906-24 = "Além disso, viemos para ver a ópera."
2005906-28 = "Ah, parece que vai começar."
2005906-29 = "Então, minha primeira ópera, start♪"
2005906-31 = "(As cortinas do palco se abriram com uma música grandiosa)"
2005906-32 = "(Era uma ópera moderna sobre uma garota que ama música e supera dificuldades sob a tutela de um professor rigoroso para realizar seu sonho)"
2005906-34 = "(Ao contrário da preocupação de que ela pudesse estar entediada...)"
2005906-35 = "(Mutsumi ficou absorta na ópera do começo ao fim, parecendo se divertir)"
2005906-43 = "(A ópera terminou...)"
2005906-45 = "[ns] \"Já é noite, hein.\""
2005906-46 = "É! Passou num piscar de olhos!"
2005906-47 = "Ah, foi divertido!"
2005906-48 = "A arte é incrível, hein! Só a música já me deixou toda animada!"
2005906-49 = "[s] \"A história simples ajudou a tornar mais legal.\""
2005906-50 = "Kufufu. Eu escolhi a dedo, viu."
2005906-51 = "Aliás, aquela ópera era sobre uma aluna e sua professora, né?"
2005906-52 = "Fiquei pensando nisso enquanto assistia..."
2005906-56 = "Professor, o que você acha de mim?"
2005906-57 = "[s3] \"O-o que?\"\n[s4] \"D-de repente!?\""
2005906-60 = "Hã? Por que o susto? Foi uma pergunta difícil?"
2005906-61 = "Para você, eu sou..."
2005906-62 = "Uma boa aluna?"
2005906-63 = "[s] \"Ah... sim! Isso!\""
2005906-64 = "Ooooh, estava pensando em outra coisa?"
2005906-65 = "O quê? O que estava pensando? Quero ouvir a explicação detalhada."
2005906-66 = "[s] \"M-mutsumi é uma boa aluna, sim...!\""
2005906-67 = "Ahaha! Tá bem, vou parar por aqui."
2005906-68 = "Então, sou uma boa aluna para você, né..."
2005906-69 = "Kufufu..."
2005906-74 = "Pronto! Já que a ópera acabou, vamos comer!"
2005906-75 = "Encontrei um lugar bom perto da rua comercial!"
2005906-77 = "(Mutsumi a levou a uma loja de yakitori com preço justo)"
2005906-78 = "(Aproveitaram o jantar sem preocupações)"
2005906-83 = "(Depois, foram a um café descolado...)"
2005906-84 = "(Conversaram sobre amenidades, como coisas que aconteceram ultimamente e as novidades)"
2005906-89 = "(Sem perceber, já era noite)"
2005906-90 = "(Pararam em um parque próximo, como se tivessem combinado)"
2005906-93 = "Ah... já é hora de dizer adeus."
2005906-94 = "Hoje o tempo passou tão rápido~"
2005906-95 = "Obrigada, professor! Foi divertido!"
2005906-96 = "[s] \"Eu também.\""
2005906-97 = "Kufufu... quero sair de novo com você."
2005906-98 = "[s] \"É, da próxima vez...\""
2005906-103 = "[ns5] \"E-encontro!?\"\n[ns6] \"Agora que você falou... o que fizemos hoje foi...?\""
2005906-106 = "Isso! Encontro!"
2005906-107 = "Finalmente percebeu? Kufu, você é mais lerdo do que eu pensava."
2005906-108 = "Foi a primeira vez que tivemos um encontro de verdade, né?"
2005906-109 = "Quando penso que foi um encontro, parece diferente do normal."
2005906-110 = "Não sei explicar, mas é como se o peito ficasse... meio cócegas?"
2005906-111 = "Enfim, obrigada! Por ter aceitado sair comigo no meu primeiro encontro♪"
2005906-112 = "[s] \"O-eu é que agradeço!\""
2005906-113 = "Ahaha! Pronto, 'encontro natural' concluído."
2005906-114 = "No começo, eu queria mais te provocar... mas agora tanto faz."
2005906-115 = "Assim como você me chamou de 'boa aluna'..."
2005906-116 = "Eu também acho que você é um bom professor."
2005906-121 = "Então, daqui para frente, pode contar comigo."
2005906-122 = "Se vou ouvir o que você diz... isso quem decide sou eu♪ Kufufu."
2005906-124 = "(Depois, conversaram alegremente e se despediram)"
2005906-125 = "(... Prometendo se encontrar outra vez)"