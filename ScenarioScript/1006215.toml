[translation]
1006215-1 = "Comprovante de conexão"
1006215-3 = "Escritório de Shirley."
1006215-5 = "(As chamadas eram recebidas de um número desconhecido)."
1006215-6 = "(Se fosse uma solicitação de seguro ou empréstimo, eu teria recusado educadamente. ......)"
1006215-7 = "Alô, é o médico?"
1006215-8 = "[s] \"Toki! \""
1006215-9 = "A conexão da linha foi bem-sucedida."
1006215-10 = "Foi a decisão certa tentar. Sou de fato uma pessoa excelente."
1006215-11 = "Isso confirma que meu sensei e eu estamos conectados #n24 horas por dia, o tempo todo."
1006215-12 = "[s]\"Esse texto é enganoso porque é enganoso. ......\""
1006215-13 = "Mas isso também é verdade."
1006215-14 = "Na verdade, neste momento, provavelmente estou me comunicando com meu sensei por um canal de comunicação diferente do que normalmente faço, certo?"
1006215-15 = "Não acho que você possa ser um educador e negar os fatos óbvios."
1006215-16 = "Não é a maneira de ser um educador #n orientar corretamente os alunos com base em fatos?"
1006215-17 = "[s]\"Isso, é claro, é verdade, mas ......\""
1006215-18 = "Você é realmente um sensei, entende muito rapidamente."
1006215-19 = "Agora vamos ao que interessa. ......#n Doutor, podemos nos encontrar agora? Tenho algo para lhe dar."
1006215-20 = "[s]\"Toki ga me? \""
1006215-21 = "Sim, eu fiz isso. Eu, uma empregada espirituosa e perfeita, preparei uma espécie de grilhões para o sensei. ......"
1006215-22 = "Queremos lhe dar uma \"prova de conexão\", não ......."

1006215-23 = "[\"Acabei de ouvir uma palavra muito perturbadora! \""
1006215-24 = "Deve ser minha imaginação."
1006215-25 = "Ou você ouviu errado."
1006215-26 = "Eu sou a única outra pessoa que diz isso."
1006215-27 = "...... A propósito, doutor, #n pessoas engolem uma média de oito aranhas por ano sem saber."
1006215-28 = "Então, você não acha que não é surpreendente que as pessoas ouçam mal o #n, em média, 100 vezes mais vezes por ano?"
1006215-29 = "...... A lógica está bagunçada?"
1006215-30 = "......."
1006215-31 = "De fato, pode muito bem ser. #De qualquer forma, isso foi absolutamente um erro de percepção do sensei."
1006215-32 = "[s]\"Então é isso que vou fazer. ......\""
1006215-33 = "Obrigado."
1006215-34 = "Portanto, agora vamos visitar o médico."
1006215-35 = "Para lhe dar a \"prova de conexão\" de que falei anteriormente. Posso?"

1006215-36 = "[s]\"Ok, ...... onde você está agora? \""
1006215-37 = "...... Parecia que ele havia desistido de tudo."
1006215-38 = "Bem, tenho certeza de que você ficará bem. Porque eu estou bem. #nE é aqui que estou. ...... Em frente ao escritório da Sherle."
1006215-39 = "[s1] \"O quê? Então você está falando ao telefone na frente da porta ......\"\n[s2] \"Quer dizer que você está falando o tempo todo! \""
1006215-42 = "Sim."
1006215-50 = "Mais uma vez - olá, doutor."
1006215-51 = "[s3] \"Uh, yeah......Hello. \"\n[s4] \"Você deveria ter entrado. ......\""
1006215-54 = "Não, não. Porque tudo isso faz parte da estratégia para atrair a simpatia do sensei."
1006215-55 = "E ainda mais para os transeuntes: ......"
1006215-56 = "\"É terrível deixar uma empregada tão perfeita e incrível do lado de fora! Ela ainda vem com um efeito colateral agradável que faz você pensar #n.\"\n1006215-57 = \"...... mas houve grandes problemas e, no final, não deu certo.\"\n1006215-58 = \"Havia menos transeuntes em frente ao escritório da Sherle do que o esperado.\"\n1006215-59 = \"Que erro ...... Na próxima vez, planejarei com mais cuidado e convidarei perfeitamente a simpatia dos Senseies e o constrangimento das pessoas ao meu redor.\"\n1006215-60 = \"[s] \"Que confusão é essa! \"\"\n1006215-61 = \"Não é nada. Você ouviu errado.\"\n1006215-62 = \"[s]\"......Vocês vão levar isso adiante hoje ......\"\"\n1006215-63 = \"...... De qualquer forma, o que queremos fazer hoje é o seguinte.\"\n1006215-69 = \"Este é o fone de ouvido perfeito para empregadas e agentes.\"\n1006215-70 = \"São produtos excelentes com alto desempenho de isolamento acústico e um tratamento acústico especial para garantir que sejam do tipo canal e não prejudiquem a audição.\"\n1006215-71 = \"As medidas básicas de interferência e invasão de canais estão obviamente em vigor, mas, no caso improvável de um canal ser acessado: ......\"\n1006215-72 = \"Ele tem a capacidade de redirecionar automaticamente a linha e gerar uma nova.\"\n1006215-73 = \"Uma grande variedade de outras funções úteis também está disponível, mas será omitida devido a restrições de tempo.\"\n1006215-74 = \"De qualquer forma, só posso concluir que ......#n com isso, por meio de um canal de comunicação seguro fornecido separadamente...\"\n1006215-75 = \"Eles podem ser contatados diretamente a qualquer momento.\"\n1006215-76 = \"A propósito, esse fone de ouvido está emparelhado com o meu.\"\n1006215-77 = \"[\"Posso conseguir algo tão bom? \"\"\n1006215-78 = \"Sim. Eu preferiria que você recebesse.\"\n1006215-79 = \"Isso se deve ao fato de ser um \"costume ibis\" preparado para mim por uma pessoa a quem eu costumava servir.\"\n1006215-80 = \"...... que devemos mantê-lo até que essa pessoa volte?\"\n1006215-81 = \"Não há necessidade de fazer isso. É irracional não usar o que está disponível. #n......Sim, essa pessoa lhe dirá.\"\n1006215-82 = \"Portanto, esperamos que os Senseies possam usá-lo agora.\"\n1006215-83 = \"Além disso, acho que alguém também ficaria feliz em usar esse fone de ouvido.\"\n1006215-84 = \"As ferramentas são inúteis se não forem usadas.\"\n1006215-85 = \"Portanto, sensei. Por favor, coloque seu fone de ouvido imediatamente. #E fique conectado a mim por 24 horas.\"\n1006215-86 = \"[s]\"Ummm, umm ...... é um pouco ......\"\"\n1006215-87 = \"Por que está hesitando? Você acha que o médico tem outra pessoa em mente além de mim?\"\n1006215-88 = \"Comigo...\"\n1006215-90 = \"-Foi uma peça!\"\n1006215-91 = \"[s]\frz24.89}Toki-san? O que está fazendo de repente? \"\"\n1006215-92 = \"...... Desculpe, estava brincando.\"\n1006215-93 = \"Achei que isso poderia amenizar o clima, então citei uma frase-chave de um drama que vi outro dia.\"\n1006215-94 = \"Drama e filme também, à medida que continuamos a treinar. Não sou tão detalhista como sempre.\"\n1006215-95 = \"Essa é uma linha de diálogo particularmente memorável. Mas Buuuuut.\"\n1006215-96 = \"De qualquer forma, quero dizer ao sensei...\"\n1006215-97 = \"Quero que você receba esse fone de ouvido. #E quero que você esteja sempre comigo, e quero que você esteja sempre comigo.\"\n1006215-98 = \"É apenas isso.\"\n1006215-102 = \"[ns] \"...... Fico feliz que você se sinta assim. Então vou aceitar uma vez. \"\"\n1006215-105 = \"Obrigado, senhor.\"\n1006215-106 = \"[s]\"Mas não vou usar o ...... o tempo todo. \"\"\n1006215-107 = \"...... Por quê? Estou desapontado.\"\n1006215-108 = \"Olhe para mim, doutor. Estou completamente despreocupado. #Exijo que dê uma explicação e assuma a responsabilidade o mais rápido possível.\"\n1006215-109 = \"[s5] \"\"\"\"\n[s6] Porque isso é importante para ......Toki, não é? \"\n[s6] \"Porque eu também quero cuidar bem dele. ......\"\n[s7] \"Quando chegar o momento em que eu realmente precisar dele, eu o usarei. \"\n[s6] \"Eu cuidarei dele.\""

1006215-113 = "...... Entendo. Se esse for o motivo, então ......"
1006215-114 = "Convincente."
1006215-115 = "Mesmo que você não o tenha instalado: ......"
1006215-116 = "Porque isso não muda o fato de que temos um \"par de fones de ouvido\"."

1006215-117 = "[\"Onde você aprendeu essa palavra? \""
1006215-118 = "Essa é uma citação do filme."
1006215-119 = "[s]\"É enganoso, portanto, tenha cuidado ao usar suas palavras. ......\""
1006215-120 = "Isso não será necessário. Estou dizendo isso porque quero ser mal interpretado."
1006215-121 = "[s]\"......Toki, please, give me a break......\""
1006215-124 = "(Os íbis brincaram com a placa de Petri por um tempo e depois saíram com uma expressão de satisfação no rosto)."
1006215-125 = "(Os fones de ouvido do ...... ibis-de-crista deveriam ser mantidos em uma gaveta para segurança)."
