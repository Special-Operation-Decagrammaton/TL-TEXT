[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 10/06.
41070-1 = "Episódio 7: Operação Cenoura (1)"
41070-2 = "（Alguns dias depois, colei no parque de novo pra checar se as meninas ainda tavam vivas.）"
41070-5 = "Entrada do Parque dos Coelhinhos"
41070-8 = "Aí Moe, que palhaçada é essa?! Por que tu tá passando a mão na marmita de churrasco?!"
41070-9 = "Palhaçada nada! Fui eu que carreguei essa xepa até aqui, a de carne é minha e ponto!"
41070-10 = "Tu já encheu a barriga de carne de porco ontem, sua esfomeada! Hoje tu vai baixar a bola e comer a marmita de broto de feijão igual todo mundo!"
41070-11 = "Nem ferrando! Pega a de feijão pra tu se quiser, Saki!"
41070-15 = "Bom, então... eu vou ficar com a marmita de salsicha..."
41070-18 = "NÃO VAI NÃO!!"
41070-23 = "Esquadrão, baixem a guarda e respirem. A elite da SRT caindo no soco por resto de comida? Que papelão."
41070-24 = "Numa situação crítica sem rede de suprimentos, ficar escolhendo o que comer é amadorismo. Se enche a barriga, é lucro."
41070-25 = "Ah, é? E qual marmita tu vai pegar então, Líder Miyako?"
41070-26 = "Eu..."
41070-27 = "Vou ficar com a de frango frito no capricho."
41070-28 = "MAS ESSA AÍ É A MAIS CARA DO LOTE, SUA HIPÓCRITA!!!"
41070-29 = "[s] \"E aí, tá rolando um motim no esquadrão?\""
41070-33 = "……"
41070-35 = "Tinha que ser o inconveniente pra brotar bem agora..."
41070-36 = "N-Não se iluda com o que viu. Nós não estávamos disputando por comida...!"
41070-37 = "É, a gente só tava... debatendo o menu do almoço com muita paixão."
41070-38 = "[s1] \"Com muita paixão, é...?\"\n[s2] \"Bom, se não é uma briga até a morte pela marmita, menos mal...\""
41070-39 = "Se isso pareceu uma briga pra você, vai num oftalmologista."
41070-40 = "Se isso pareceu uma briga pra você, vai num oftalmologista."
41070-41 = "A gente só tava aplicando táticas de negociação pra distribuir os suprimentos."
41070-42 = "Seja lá qual for a nossa decisão, nós sangramos juntas no treinamento, então..."
41070-43 = "Vou só catar a de churrasco de fininho, e...!"
41070-44 = "A gente ainda tá 'negociando', tira a pata da carne!!"
41070-50 = "……Peço que o senhor apague esse showzinho vergonhoso da memória."
41070-51 = "Mas, sim. Estamos estabilizadas e sem baixas."
41070-52 = "Até a crise de fome deu uma aliviada, querendo ou não..."
41070-54 = "Com aquela sua 'oferta' de lixo da conveniência, a gente forrou o estômago por hora."
41070-55 = "Hehe, você deve ter achado que a gente ia rastejar e pedir água depois dessa humilhação, né? Que peninha. A gente nem ligou pra isso."
41070-57 = "Pela nossa missão, a gente engole até pedra se precisar."
41070-58 = "Pode tirar o seu cavalinho da chuva! A gente se garante sozinhas agora...!"
41070-59 = "[s] \"Certeza? Cês tão brancas que nem papel...\""
41070-61 = "[s] \"Tá tudo bem mesmo? Ninguém pegou uma doença?\""
41070-67 = "P-Pera aí! Nem vem!"
41070-71 = "Dá mais um passo que eu te quebro no meio!!"
41070-72 = "[s] \"Q-Que agressividade é essa do nada...?\""
41070-74 = "É que... bem..."
41070-81 = "Se chegar perto, eu sento o dedo no seu joelho. Tô avisando."
41070-82 = "[s] \"C-Calma lá...\""
41070-84 = "É por causa do... cheiro."
41070-85 = "[s3] \"……Cheiro?\"\n[s4] \"Pô, eu acabei de sair do banho lá na Schale antes de vir... Tô fedendo?\""
41070-88 = "Caramba, você é burro ou se faz?! Não é de você que eu tô falando...!"
41070-89 = "[s5] \"Será que meu sabonete tem cheiro de azedo...?\"\n[s6] \"Se for isso, tá explicado por que vocês tão correndo de mim...\""
41070-92 = "SEU LERDO! O problema é a gente!"
41070-94 = "Aaah, pronto, explanou tudo..."
41070-95 = "F-Fazer o quê?! A gente tá dormindo na rua faz quatro dias sem ver a cor da água de um chuveiro!"
41070-96 = "[s] \"M-Malz aí... e se vocês fossem num banho público ou algo assim...?\""
41070-98 = "Se a gente não tem dinheiro nem pra comprar pão, com que grana cê acha que a gente vai pagar entrada num banho público?"
41070-99 = "Até dá pra lavar o rosto na torneira do parque, mas..."
41070-100 = "Se fosse uma missão de três dias, dane-se o suor. Mas acampando a longo prazo, a higiene vira um risco de vida..."
41070-101 = "[s] \"Cês tão ligadas que as portas do chuveiro da Schale tão abertas pra vocês, né?\""
41070-105 = "……Que nojo."
41070-106 = "……Repugnante."
41070-107 = "A-Achar que a gente vai baixar a guarda e ir pro chuveiro debaixo do seu teto...? Pra você dar o bote na gente?!"
41070-109 = "Chamar colegiais suadas pro banho e preparar a câmera escondida no banheiro? Cê prefere nós limpinhas ou cê tem uma fixação bizarra no nosso suor? Que nojeira!!"
41070-110 = "[s] \"Pelo amor de Deus, que imagem que vocês têm de mim...?\""
41070-112 = "Adulto manipulador e aproveitador."
41070-113 = "Maluco aproveitador de calouras."
41070-114 = "Lixo radioativo que não serve nem pra reciclar..."
41070-115 = "Melhor eu nem dizer."
41070-116 = "[s] \"Pô, pesado...\""
41070-118 = "Mas enfim. Esse BO a gente resolve sozinhas. Enquanto isso, faça o favor de ficar longe do nosso parque."
41070-119 = "Boca falou grande, mas como é que a gente resolve isso...?"
41070-120 = "Se a gente tomar banho de balde no frio, é pneumonia na certa..."
41070-122 = "……E se a gente estourar a caixa d'água do banheiro público com um míssil e tomar banho na cachoeira que cair?"
41070-123 = "A gente ia ficar com cheiro de mijo e escombros, gênia."
41070-124 = "[s] \"Já que é um acampamento... que tal improvisar um banho de tambor de aço?\""
41070-126 = "……Tambor de aço?"
41070-127 = "Saquei, meter água dentro e acender a fogueira embaixo do tambor, né?"
41070-128 = "Acho que já vi o pessoal de Hyakkiyako fazendo uns milagres parecidos com isso."
41070-130 = "Como é que a gente entra nessa panela pra lavar o corpo?"
41070-131 = "Sem falar que é cafona pra caramba."
41070-132 = "Assino embaixo. Mas é o Sensei que tá dando a ideia, a gente esperava o quê?"
41070-134 = "……Apesar do estilo,"
41070-135 = "É a única saída viável que a gente tem."
41070-136 = "Já que não dá pra alugar um spa, vamos de tambor fervendo..."
41070-141 = "Moe, puxa o rastreamento no sistema da rede de suprimentos da cidade. Acha qualquer canteiro de obras ou lugar que tenha tambor de aço estocado."
41070-142 = "Assim que pingar o alvo, nós batemos as botas pra lá."
41070-143 = "Bater as botas pra lá? Ou seja..."
41070-144 = "A higiene é vital pra moral da tropa e pra não pegarmos sarna. Vamos resolver isso o mais rápido possível, não importa o método."
41070-145 = "Atenção, esquadrão. Preparar para a apropriação do alvo cilíndrico de metal..."
41070-147 = "Iniciando a 'Operação Cenoura'!"
41070-149 = "Próximo Episódio: Operação Cenoura (2)"