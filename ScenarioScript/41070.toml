[translation]
41070-1 = "Episódio 7; Operação Cenoura (1)"
41070-2 = "（Alguns dias depois, visitei o parque novamente para verificar se todos estavam bem）"
41070-5 = "Em frente ao Parque dos Coelhinhos"
41070-8 = "Moe, por que você está levando a marmita de churrasco!?"
41070-9 = "Como assim por quê? Eu que trouxe, então não tem do que reclamar!"
41070-10 = "Você comeu a marmita de carne de porco com gengibre ontem! Hoje, fique quieta e coma a marmita de broto de feijão!"
41070-11 = "E eu lá sei? Se a Saki quiser, que ela coma o broto de feijão!"
41070-15 = "Então, eu vou ficar com essa marmita de salsicha..."
41070-18 = "NEM PENSE NISSO!!"
41070-23 = "Pessoal, por favor, acalmem-se. É vergonhoso ver a SRT brigando por causa de comida."
41070-24 = "Nesta situação, onde não temos garantias de nada, discutir qualidade é um contrassenso. Vamos nos contentar apenas em encher a barriga por enquanto."
41070-25 = "Então, qual a Miyako vai escolher?"
41070-26 = "Eu vou..."
41070-27 = "Ficar com essa marmita de frango frito."
41070-28 = "Essa é a mais cara de todas!!!"
41070-29 = "[s] \"E aí, está tudo bem por aqui?\""
41070-33 = "……"
41070-35 = "Logo agora, nesse momento..."
41070-36 = "Não, é que... isso não é uma briga por causa das marmitas..."
41070-37 = "É, a gente só estava conversando amigavelmente sobre o almoço."
41070-38 = "[s1] \"Amigavelmente...?\"\n[s2] \"Fico feliz que não estejam brigando...\""
41070-39 = "Se pareceu uma briga, é melhor você ir lavar os olhos."
41070-40 = "Se pareceu uma briga, é melhor você ir lavar os olhos."
41070-41 = "Nós estávamos apenas tendo uma discussão legítima."
41070-42 = "Independentemente do resultado, como alguém que passou pelo mesmo treinamento, naquele momento..."
41070-43 = "Então, vou ficar com a marmita de churrasco."
41070-44 = "Ainda estamos discutindo! Larga isso agora!!"
41070-50 = "……Desculpe por mostrar uma cena tão vergonhosa."
41070-51 = "Mas, sim. Não há nenhum problema em particular."
41070-52 = "Quanto à comida, bem..."
41070-54 = "Conseguimos resolver a situação imediata com aquelas marmitas descartadas."
41070-55 = "Hehe, talvez o Sensei tenha tentado nos humilhar e quebrar nosso espírito com isso, mas não vai funcionar. Nós não nos importamos nem um pouco."
41070-57 = "Pela missão, faremos qualquer coisa."
41070-58 = "Mesmo sem o Sensei, nós vamos continuar assim...!"
41070-59 = "[s] \"Mas, parece que vocês não estão com uma cara muito boa...\""
41070-61 = "[s] \"Tudo bem? Estão se sentindo mal?\""
41070-67 = "E-espere! Não chegue perto!"
41070-71 = "Se chegar mais perto, eu vou te bater de verdade, hein!?"
41070-72 = "[s] \"E-eh...?\""
41070-74 = "Isso é, bem..."
41070-81 = "Não se aproxime casualmente. Vou mirar nos seus pés."
41070-82 = "[s] \"I-isso não pode ser...\""
41070-84 = "É que, o cheiro..."
41070-85 = "[s3] \"...Cheiro?\"\n[s4] \"Eu tomei banho antes de vir para cá, mas...?\""
41070-88 = "Não, não é isso, não é nada disso...!"
41070-89 = "[s5] \"Será que é porque não entro em uma banheira faz tempo...\"\n[s6] \"Não é de se estranhar que os alunos me evitem...\""
41070-92 = "Não é isso! O problema somos nós!"
41070-94 = "Ah, pronto, ela falou..."
41070-95 = "N-não tinha como evitar! Já faz 4 dias que não tomamos banho!"
41070-96 = "[s] \"D-desculpe... então, que tal irmos a um banho público...?\""
41070-98 = "Você acha que temos dinheiro para ir a um banho público quando não temos nem para comprar comida?"
41070-99 = "Para lavar o rosto, a água do parque serve, mas..."
41070-100 = "Não me importo de suar durante uma missão, mas em batalhas de longa duração, a higiene se torna um problema..."
41070-101 = "[s] \"Você pode usar o chuveiro do Schale, sabia?\""
41070-105 = "……Que nojo."
41070-106 = "……Incorrigível."
41070-107 = "V-você, o que está pensando em fazer no momento em que nos desarmamos...!?"
41070-109 = "O que você pretende fazer enquanto tomamos banho? Por acaso prefere os resquícios do que a coisa real? Uau!!"
41070-110 = "[s] \"O que exatamente você acha que eu...\""
41070-112 = "Um adulto em quem não se pode confiar."
41070-113 = "Um pervertido."
41070-114 = "Algo como lixo não reciclável..."
41070-115 = "Nada, não é nada..."
41070-116 = "[s] \"Entendi...\""
41070-118 = "De qualquer forma, pensaremos em uma solução, mas por favor, Sensei, não se aproxime deste parque por um tempo."
41070-119 = "Embora, sobre uma solução..."
41070-120 = "Se nos molharmos com água lá fora, com certeza vamos pegar um resfriado..."
41070-122 = "……Deveríamos disparar um míssil no tanque de água do banheiro?"
41070-123 = "Acho que isso só vai sujar mais..."
41070-124 = "[s] \"Se é para tomar banho acampando, que tal um barril de metal...?\""
41070-126 = "……Um barril de metal?"
41070-127 = "Ah, você quer dizer acender um fogo embaixo dele."
41070-128 = "Acho que vi algo parecido na Academia Hyakkiyako anteriormente."
41070-130 = "Como será que se toma banho naquilo?"
41070-131 = "E, aliás, que ideia antiquada."
41070-132 = "Concordo, mas bem, sendo o Sensei, o que esperar?"
41070-134 = "……Mas,"
41070-135 = "talvez seja a única forma."
41070-136 = "Não temos como preparar instalações adequadas..."
41070-141 = "Moe. Pode se conectar ao sistema de gerenciamento de recursos e procurar por locais que estejam usando barris de metal?"
41070-142 = "Assim que encontrar, vamos entrar em ação imediatamente."
41070-143 = "Entrar em ação, ou seja..."
41070-144 = "A higiene é uma questão crucial diretamente ligada à sobrevivência da unidade. Devemos resolver isso o mais rápido possível, não importa o meio."
41070-145 = "Então, a partir de agora, a busca pela banheira..."
41070-147 = "Iniciaremos a \"Operação Cenoura\"!"
41070-149 = "Próximo episódio: Operação Cenoura (2)"
