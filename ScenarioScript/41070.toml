[translation]
41070-1 = "Episódio 7: Operação Cenoura (1)"
41070-2 = "(Dias depois, fui ao parque novamente para ver como estavam.)"
41070-5 = "Em frente ao Parque dos Coelhinhos"
41070-8 = "Moe, por que você está com o bentô de churrasco?!"
41070-9 = "Ué, eu que trouxe, não tenho direito?"
41070-10 = "Você comeu um bentô de gengibre ontem! Hoje fica com o de broto de feijão!"
41070-11 = "Sei lá, a Saki que coma broto de feijão!"
41070-15 = "Então eu vou ficar com o de salsicha…"
41070-18 = "Não pode!!"
41070-23 = "Parem com isso. Uma briga da SRT por comida é ridícula."
41070-24 = "Nesta situação, sem garantias, discutir qualidade não faz sentido. O que importa é encher o estômago."
41070-25 = "Então qual você quer, Miyako?"
41070-26 = "Eu…"
41070-27 = "Vou ficar com este de frango frito."
41070-28 = "O mais caro!"
41070-29 = "[s] \"A-acham que vai dar certo?\""
41070-33 = "……"
41070-35 = "Justo agora…"
41070-36 = "Não, não estávamos brigando, só…"
41070-37 = "Ah, estávamos conversando sobre o almoço."
41070-38 = "[s1] \"Conversando…?\"\n[s2] \"Ainda bem que não era briga…\""
41070-39 = "Se achou que era briga, melhor lavar os olhos."
41070-40 = "Se achou que era briga, melhor lavar os olhos."
41070-41 = "Estávamos apenas deliberando."
41070-42 = "Seja qual for o resultado, como companheiras de treinamento, nessa hora…"
41070-43 = "Então, fico com o de churrasco."
41070-44 = "A deliberação ainda não acabou! Deixa aí!!"
41070-50 = "……Desculpe pela cena vergonhosa."
41070-51 = "Mas, sim. Não há problemas."
41070-52 = "Quanto à comida… bem…"
41070-54 = "Com os bentôs descartados, resolvemos o problema por enquanto."
41070-55 = "Hehe, o senhor achou que nos humilharia, mas não foi dessa vez. A gente nem liga."
41070-57 = "Se for para a operação, fazemos o que for preciso."
41070-58 = "Mesmo sem o senhor, nós…!"
41070-59 = "[s] \"Mas seu rosto está pálido…\""
41070-61 = "[s] \"Tudo bem? Não está passando mal?\""
41070-67 = "E-espera, não se aproxime!"
41070-71 = "Se chegar mais perto, vou te bater de verdade!"
41070-72 = "[s] \"Hã?\""
41070-74 = "Isso é… bem…"
41070-81 = "Não se aproxime assim. Vou mirar nos seus pés."
41070-82 = "[s] \"Isso…\""
41070-84 = "É que o cheiro…"
41070-85 = "[s3] \"…Cheiro?\"\n[s4] \"Tomei banho antes de vir, viu…?\""
41070-88 = "Não é isso, porra!"
41070-89 = "[s5] \"Deve ser porque não tomo banho há uns dias…\"\n[s6] \"É normal vocês quererem evitar…\""
41070-92 = "Não é isso! O problema somos nós!"
41070-94 = "Ah, falou…"
41070-95 = "É, não tinha jeito… já faz 4 dias sem banho!"
41070-96 = "[s] \"Ah… desculpa. Não podem ir a uma casa de banho?\""
41070-98 = "Sem dinheiro para comida, como ter para casa de banho?"
41070-99 = "Para lavar o rosto, dá para usar a água do parque…"
41070-100 = "Em operações, suar é normal. Mas a longo prazo, a higiene…"
41070-101 = "[s] \"Podem usar o chuveiro da Schale, se quiserem.\""
41070-105 = "…O cúmulo."
41070-106 = "…Inacreditável."
41070-107 = "A gente baixa a guarda, e você…!"
41070-109 = "Oferece banho para aproveitar a brecha e fazer o quê? Gosta de cheiro de suor? Uhul!"
41070-110 = "[s] \"O que vocês pensam que eu sou…\""
41070-112 = "Um adulto em quem não se pode confiar."
41070-113 = "Um pervertido."
41070-114 = "Tipo um lixo não inflamável…"
41070-115 = "Ah, não é nada…"
41070-116 = "[s] \"É mesmo…\""
41070-118 = "De qualquer forma, vamos pensar numa solução. Mas por enquanto, fique longe do parque."
41070-119 = "Dito isso, solução…"
41070-120 = "Se nos molharmos lá fora, vamos pegar um resfriado…"
41070-122 = "…Que tal atirar um míssil no reservatório do vaso sanitário?"
41070-123 = "Isso só vai sujar mais…"
41070-124 = "[s] \"Para acampar, que tal usar um tambor?\""
41070-126 = "…Tambor?"
41070-127 = "Ah, ferver água por baixo."
41070-128 = "Acho que já vi algo assim na Academia Hyakkiyako."
41070-130 = "Mas como lava o corpo?"
41070-131 = "E o estilo é ultrapassado."
41070-132 = "Concordo, mas vindo do Professor, fazer o quê?"
41070-134 = "…No entanto,"
41070-135 = "Pode não haver outra opção."
41070-136 = "Não temos condições de preparar uma estrutura adequada…"
41070-141 = "Moe. Conecte-se ao sistema de gestão de recursos e procure por locais com tambores."
41070-142 = "Assim que encontrar, partimos."
41070-143 = "Partir… quer dizer…"
41070-144 = "Higiene é vital para a sobrevivência da tropa. Precisamos resolver isso o mais rápido possível, custe o que custar."
41070-145 = "Então agora, para garantir um recipiente de banho…"
41070-147 = "Iniciamos a 'Operação Cenoura'!"
41070-149 = "Próximo Episódio: Operação Cenoura (2)"