[translation]
83306080500-6 = "Ufa... felizmente, consegui recuperar tudo."
83306080500-7 = "M-muito obrigada! Hina-san!"
83306080500-8 = "Eu fiquei tão preocupada que tivesse causado problemas para todos por minha causa... eu não sabia o que fazer!"
83306080500-9 = "Isso é algo comum em Gehenna. Ninguém vai culpar você, Juri."
83306080500-10 = "Eu sei que tanto você quanto a Fuuka se esforçam muito por todos."
83306080500-11 = "É-é mesmo...?"
83306080500-12 = "Fico muito feliz em ouvir isso da Hina-san! Muito obrigada!"
