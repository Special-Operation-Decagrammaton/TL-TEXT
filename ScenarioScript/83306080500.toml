[translation]
83306080500-6 = "ふぅ……幸い、全て回収できたわ。"
83306080500-7 = "あ、ありがとうございます！ヒナさん～！"
83306080500-8 = "私のせいで皆さんに迷惑をかけるんじゃないかと思ったら、もうどうしようかと……！"
83306080500-9 = "これくらい、ゲヘナではよくあることだわ。誰もジュリのせいにはしない。"
83306080500-10 = "ジュリもフウカも、みんなのために頑張っているのを知ってるから。"
83306080500-11 = "そ、そうなんですか……？"
83306080500-12 = "ヒナさんにそう言ってもらえて嬉しいです！ありがとうございます！"
