[translation]
10017085-1 = "Episódio 8: Sonho de uma noite de inverno"
10017085-2 = "Entrada do café 'White&Mason'"
10017085-4 = "Guaaaah!?"
10017085-5 = "E-eu perdi...!"
10017085-6 = "P-por que..."
10017085-7 = "Deixando a presidente de lado, essas pessoas tinham acabado de lutar tanto..."
10017085-8 = "O que isso significa!?"
10017085-10 = "Kya-hahahahaha!"
10017085-11 = "...Vocês são ingênuos."
10017085-13 = "Não importa o quanto estejamos debilitadas, isso não significa que vocês ficaram mais fortes."
10017085-18 = "Isso é verdade, mas mesmo assim!"
10017085-19 = "Que tipo de comandante da Sociedade de Socorro é você!?#nVocê só destrói tudo!"
10017085-21 = "...O Natal é um dia alegre. Atualmente, é celebrado como tal."
10017085-22 = "Mas sua essência é um dia de gratidão, reflexão... e de oferecer algo aos outros."
10017085-23 = "É também um dia para olhar para si mesmo e recuperar um sentimento de generosidade."
10017085-24 = "Em um dia como este, vocês que se aproveitaram dos sentimentos alheios..."
10017085-25 = "Não pensem que terão o tempo que desejam!"
10017085-30 = "C-cala a boca! Não entendo nada do que você está dizendo!"
10017085-31 = "Além disso, a culpa é de quem foi enganado, não é!? Droga, estávamos tão perto...!"
10017085-44 = "...Elas conseguiram fugir."
10017085-45 = "Que frustrante. Não consigo deixar de pensar em como teria sido se estivéssemos em perfeitas condições."
10017085-46 = "E de quem será a culpa por isso ter acontecido..."
10017085-48 = "Pessoal, vocês estão bem!?"
10017085-49 = "Vou começar o tratamento!"
10017085-51 = "Ah, obrigado. Bem, se for para tratar, por favor, priorize os outros..."
10017085-53 = "O tratamento de todos os outros já terminou, então não se preocupe."
10017085-54 = "Nós nos preparamos justamente para momentos como este!"
10017085-56 = "E-entendo."
10017085-57 = "Muito obrigada, como sempre."
10017085-62 = "Essa frase deveria ser nossa.#nAlém disso, hoje, por nossa causa..."
10017085-63 = "Hasumi-san, me desculpe!#nSei que pedir desculpas não resolve nada, mas...!"
10017085-70 = "(Mine destrói e a Sociedade de Socorro conserta...)"
10017085-71 = "(Eu tinha esquecido, mas... elas são esse tipo de pessoa, né)"
10017085-73 = "...Então, Comandante Mine. Tem algo a dizer sobre o que aconteceu?"
10017085-74 = "Não tenho nenhuma defesa a apresentar."
10017085-79 = "P-por que você está apontando a arma para mim...?"
10017085-80 = "Só posso me desculpar por este pecado com a minha própria vida!"
10017085-81 = "Deixo todo o julgamento nas mãos da vice-presidente Hasumi!"
10017085-82 = "Sim...? O quê?"
10017085-87 = "C-comandante..."
10017085-91 = "Waaah! Comandante~!"
10017085-93 = "Serina, Hanae, por favor, não chorem.#nAssumir a responsabilidade também é parte do nosso 'socorro'."
10017085-94 = "Se ninguém estiver disposto a assumir a responsabilidade, mais tristeza será gerada."
10017085-95 = "Vamos, desarmei todo o meu equipamento... pode me punir como quiser!"
10017085-96 = "Haa..."
10017085-97 = "Já que o mal-entendido foi esclarecido, para mim está tudo bem."
10017085-98 = "Além disso, eu e os outros... recebemos o tratamento da Sociedade de Socorro e nos recuperamos."
10017085-99 = "Tsurugi, você concorda, certo?"
10017085-100 = "Kieeee..."
10017085-101 = "...Pelo visto, sim. Sendo assim, este assunto está encerrado."
10017085-102 = "Muito obrigado, Serina, Hanae."
10017085-107 = "N-não é nada, nós apenas fizemos o que deveríamos fazer como membros do Esquadrão de Primeiros Socorros..."
10017085-108 = "Na verdade, somos nós que deveríamos agradecer!#nJá que você perdoou os erros do Esquadrão de Primeiros Socorros!"
10017085-110 = "Isso é..."
10017085-111 = "...Não.#nEntão, vamos deixar assim."
10017085-112 = "Por favor, levante-se, Comandante Mine.#nSe continuar assim, eu é que vou ficar em uma situação difícil."
10017085-113 = "[s] \"...Viu só?\""
10017085-114 = "Mas, Sensei..."
10017085-115 = "[s1] \"Mesmo que elas tenham tentado te enganar no final...\"\n[s2] \"Eu acho que a sua postura de ouvir o que os outros têm a dizer não está errada.\""
10017085-118 = "..."
10017085-119 = "É verdade, não é..."
10017085-124 = "Bem, então nós já vamos..."
10017085-125 = "Desculpe por interromper a festa!"
10017085-127 = "É verdade, agora que você mencionou..."
10017085-128 = "Já que estamos aqui, por que vocês não se juntam a nós?"
10017085-130 = "I-isso é...?"
10017085-131 = "Quer dizer que podemos participar da festa!?"
10017085-133 = "Sim, a confusão já acabou.#nE como é uma festa, quanto mais gente, mais divertido será."
10017085-134 = "O que acha, Tsurugi?"
10017085-135 = "Ugh, ah, uee..."
10017085-140 = "Ela está um pouco envergonhada, mas disse que são muito bem-vindos."
10017085-141 = "E você, Sensei?"
10017085-142 = "[s3] \"Com prazer!\"\n[s4] \"Já que insiste, aceito com gratidão!\""
