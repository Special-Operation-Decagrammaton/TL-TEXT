[translation]
10017085-1 = "第８話;真冬の夜の夢"
10017085-2 = "カフェ「White&Mason」入口"
10017085-4 = "ぐあぁぁっ！？"
10017085-5 = "ま、負けた……！"
10017085-6 = "ど、どうして……。"
10017085-7 = "委員長はさておき、こいつらはさっきあんだけ戦ってたのに……。"
10017085-8 = "どういうことだよ！？"
10017085-10 = "きゃははははははははっ！"
10017085-11 = "……甘いですね。"
10017085-13 = "いくら私たちが弱っていても、あなたたちが強くなったわけではないでしょう。"
10017085-18 = "そりゃそうだけどさあ！"
10017085-19 = "何が救護騎士団長だ！#n何もかも壊してばっかりで！"
10017085-21 = "……クリスマスは、楽しい日です。今はそういった日として迎えられています。"
10017085-22 = "ですがその本質は、感謝をし、振り返り……何かを施す日です。"
10017085-23 = "わが身を振り返り、寛大な気持ちを持ち直す日でもあります。"
10017085-24 = "そんな日に、他人の気持ちを利用したあなたたちが……。"
10017085-25 = "望んだ時間を迎えられると、思わないでください！"
10017085-30 = "う、うるせぇ！何言ってんのか分かんねぇんだよ！"
10017085-31 = "そもそも騙された方が悪いんだろうが！くそっ、あと少しだったのに……！"
10017085-44 = "……逃げられてしまいましたね。"
10017085-45 = "悔しいですね、体調が万全だったらと思わずにはいられません。"
10017085-46 = "誰のせいでこうなったと……。"
10017085-48 = "みなさん、大丈夫ですか！？"
10017085-49 = "治療を始めます！"
10017085-51 = "あ、ありがとうございます。その、治療でしたら他の方を優先して頂ければと……"
10017085-53 = "他の皆さんの治療は、終わってますのでご安心を。"
10017085-54 = "こういう時のために、準備していますから！"
10017085-56 = "そ、そうでしたか。"
10017085-57 = "本当に、いつもありがとうございます。"
10017085-62 = "それは、こちらの台詞です。#nそれに今日は、私たちのせいで……"
10017085-63 = "ハスミさん、ごめんなさい！#n謝ってどうにかなることではありませんが……！"
10017085-70 = "（ミネが壊して騎士団が治す……）"
10017085-71 = "（そういえば忘れていましたが……こういう方々でしたね）"
10017085-73 = "……それで、ミネ団長。今回のことについて、何か言うことは？"
10017085-74 = "何の弁明もございません。"
10017085-79 = "な、なぜ銃を、私に……？"
10017085-80 = "この罪、命を以て謝罪するしかありません！"
10017085-81 = "すべての処分を、ハスミ副委員長に託します！"
10017085-82 = "はい……？"
10017085-87 = "だ、団長……。"
10017085-91 = "うわぁん！団長～！"
10017085-93 = "セリナ、ハナエ、泣かないでください。#n責任を負うこともまた、私たちの「救護」。"
10017085-94 = "誰も責任を負おうとしなければ、もっと悲しみが生まれてしまいます。"
10017085-95 = "さあ、全ての武装を解除しました……どうとでも処分を！"
10017085-96 = "はぁ……。"
10017085-97 = "誤解が解けただけで、私は構いません。"
10017085-98 = "それに私も、他の者たちも……救護騎士団の治療を受けて、回復しました。"
10017085-99 = "ツルギも、これで良いですよね？"
10017085-100 = "きええぇぇ……。"
10017085-101 = "……だそうです。ということで、この件は一段落ですね。"
10017085-102 = "ありがとうございました、セリナさん、ハナエさん。"
10017085-107 = "そ、そんな、私たちはただ救護騎士団としてなすべきことを……"
10017085-108 = "むしろ感謝するべきなのは、私たちの方です！#n救護騎士団の過ちを、許してくれたんですから！"
10017085-110 = "それは……"
10017085-111 = "……いえ。#nそれでは、そういうことにさせていただきましょう。"
10017085-112 = "起きてください、ミネ団長。#nずっとそのままでいられては、私の方が困ってしまいます。"
10017085-113 = "[s] \"……だってさ？\""
10017085-114 = "しかし、先生……"
10017085-115 = "[s1] \"あの子たちは、結果的に騙そうとしてたとはいえ……\"\n[s2] \"相手の話をちゃんと聞いてあげる姿勢は、何も間違ってないと思うから。\""
10017085-118 = "……。"
10017085-119 = "そう、ですね……。"
10017085-124 = "あの、それでは私たちはこれで……"
10017085-125 = "パーティーの最中だったのにすみません！"
10017085-127 = "そういえばそうでしたね……。"
10017085-128 = "ではせっかくですし、皆さんも一緒にいかがですか？"
10017085-130 = "そ、それは……？"
10017085-131 = "パーティーに参加して良いってことですか！？"
10017085-133 = "はい、騒ぎも終わりましたし。#nパーティーなんですから、参加者は多い方が楽しいでしょう。"
10017085-134 = "いかがですか、ツルギ？"
10017085-135 = "うっ、あ、うぇぇ……。"
10017085-140 = "ちょっと恥ずかしいけど、大歓迎だそうです。"
10017085-141 = "先生はいかがでしょうか？"
10017085-142 = "[s3] \"喜んで！\"\n[s4] \"せっかくだし、ありがたく！\""
