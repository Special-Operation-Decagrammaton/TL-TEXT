[translation]
11234030-1 = "チームワーク;最高のプログラム（１）"
11234030-2 = "うーん……。"
11234030-3 = "なんでだろ……。"
11234030-4 = "……カズサちゃん、どうかしたの？"
11234030-5 = "あ、いや……ちょっと気になったんだけど。"
11234030-6 = "微妙に音、ズレてない？"
11234030-7 = "そうね、最初よりは良くなってきたけど。"
11234030-8 = "みんなすごく上達したはずなのに……。"
11234030-9 = "個々が上達しようと、協調性が無くして完成することはない。"
11234030-10 = "……ってことで、みんなで練習をしよう。"
11234030-11 = "いや、もうやってるじゃん。"
11234030-12 = "どういうこと？"
11234030-13 = "甘いっっっっ！！！！"
11234030-14 = "そんな心構えでは、入選するものもしない！"
11234030-15 = "まあ、それはそうかもだけど……。"
11234030-16 = "全身を音に委ねるのだ！"
11234030-17 = "……皆の心を、一つの音に！"
11234030-19 = "一つの音に……？"
11234030-20 = "全身を、委ねる……？"
11234030-22 = "そのために、これから私たちは……"
11234030-23 = "……「組体操」をする！！"
11234030-24 = "……なにそれ。"
11234030-25 = "いつも通りの突拍子の無さだね……。"
11234030-26 = "……ふっふっふ、ここは私に任せてもらおう。"
11234030-27 = "最高のパフォーマンスを見せてやろうじゃあないか！"
