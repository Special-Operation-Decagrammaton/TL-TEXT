[translation]
11234030-1 = "Trabalho em equipe; melhor programa (1)"
11234030-2 = "Hum..."
11234030-3 = "Eu me pergunto por que..."
11234030-4 = "...Kazusa-chan, o que há de errado?"
11234030-5 = "Ah, não... eu só estava curioso."
11234030-6 = "O som não está um pouco desligado?"
11234030-7 = "Bem, ficou melhor do que era no início."
11234030-8 = "Todos devem ter melhorado muito..."
11234030-9 = "Não importa o quanto um indivíduo melhore, nunca será concluído sem cooperação."
11234030-10 = "Então, vamos todos praticar juntos."
11234030-11 = "Não, você já está fazendo isso."
11234030-12 = "O que você quer dizer?"
11234030-13 = "Tão doce! ! ! !"
11234030-14 = "Com esse tipo de mentalidade, você nem será selecionado!"
11234030-15 = "Bem, isso pode ser verdade..."
11234030-16 = "Entregue todo o seu corpo ao som!"
11234030-17 = "... Os corações de todos tornam-se um só som!"
11234030-19 = "Um som...?"
11234030-20 = "Confie todo o seu corpo...?"
11234030-22 = "Para isso, a partir de agora..."
11234030-23 = "...Faça \"ginástica em grupo\"! !"

11234030-24 = "...O que é aquilo?"
11234030-25 = "É tão escandaloso como sempre..."
11234030-26 = "...Fufufufu, deixe isso comigo."
11234030-27 = "Vamos mostrar nosso melhor desempenho!"
