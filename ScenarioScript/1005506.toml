[translation]
1005506-1 = "素直に"
1005506-2 = "（シャーレの調理場で待っていると、約束の時間ちょうどにシグレが来た）"
1005506-8 = "へぇ、ここが……思ったより色々揃ってるね。"
1005506-13 = "何度かシャーレには来てたけど、ここに入ったのは初めてかも。"
1005506-14 = "[s1] \"あ、いらっしゃい。\"\n[s2] \"その背中の包みは……？\""
1005506-19 = "……ああ、これ？"
1005506-20 = "まあ気になるよね。"
1005506-21 = "この前言った通り、料理をふるまおうと思って。"
1005506-22 = "それで、料理に必要な食材を持ってきた。"
1005506-23 = "心配しなくても、変な食材じゃないよ。"
1005506-24 = "先生はそこで座って待ってて。私が全部やるから。"
1005506-25 = "さて、じゃあ227号特別クラスの特製ジビエ料理を――"
1005506-32 = "[ns3] \"！？\"\n[ns4] \"生肉だ！？\""
1005506-35 = "新鮮で良い感じでしょ？"
1005506-36 = "こういう生肉、あんまり見たことない感じだった？"
1005506-37 = "あ、まずジビエの話からした方が良いかな？"
1005506-38 = "熊とか鹿とか、兎とか……狩りで捕まえた野生の鳥獣を使わせてもらう料理のこと。"
1005506-39 = "ジビエは鮮度が命だから、普段は捕まえてすぐに下ごしらえをするんだけどね。"
1005506-43 = "今日はそのまま持ってきて、シャーレで直接手入れを……"
1005506-44 = "……ん、どうしたの？"
1005506-45 = "うん。227号だと、しょっちゅう食べてるよ？"
1005506-46 = "……って言いたいところだけど、まあ半分以上は冗談。事務局からパンとかお米は配給されるから、ジビエはそれなりに特別かな。"
1005506-47 = "でも、この前は先生がすごい料理をごちそうしてくれたし、私としても227号の特別な料理をってね。"
1005506-48 = "……まあ実はこの肉、今日は使わないんだけどね。捕まえたばっかりだと、固すぎて食べるのに向かなくてさ。"
1005506-49 = "でも先生のビックリした顔が見れたから、頑張ってこの肉の塊を持ってきた甲斐があったなー。"
1005506-50 = "[s5] \"つまり、一発からかうためにそこまで……\"\n[s6] \"シグレは色々とすごいね……。\""
1005506-53 = "まあ、日々楽しく生きないとね。イタズラ心を忘れたら、人生の楽しみが半減しちゃうから。"
1005506-54 = "さ、そろそろ本格的に料理を始めよっか。"
1005506-57 = "肉は塩と香辛料で下味をつけて……"
1005506-63 = "よく熱したフライパンの上にバターを溶かして、表面がカリッとなるまで焼いたら……"
1005506-67 = "最後にウォッカを――"
1005506-72 = "[ns7] \"お酒！？\"\n[ns8] \"ちょっ……！？\""
1005506-75 = "……もしかして先生、料理にお酒を使うのを見るのは初めて？"
1005506-76 = "料理にお酒を使うと肉の臭みが取れて、独特の風味が生まれるらしいよ。"
1005506-77 = "前行ったレストランでも、最後にお酒を注いで火をつけてたでしょ。あの「フランベ」ってやつ。"
1005506-78 = "[s9] \"あれお酒を入れて加熱してるから今回とは違うよ。\"\n[s10] \"普通のお酒をそのまま入れたら、お酒の味にならない……？\""
1005506-81 = "うーん、それもそうかも。"
1005506-82 = "となると、どうしたものかな……"
1005506-83 = "とりあえずこれは私が食べるとして——"
1005506-87 = "[ns] \"ちょっと借りて良い？\""
1005506-91 = "……？"
1005506-92 = "良いけど、先生に今日やってもらうのは……"
1005506-93 = "[s] \"大丈夫、任せて。\""
1005506-103 = "（シグレが持ってきてくれた食材を調理した――）"
1005506-109 = "……何だか結局、先生に作ってもらったみたいになっちゃったね。"
1005506-110 = "ごめんね、せっかく時間を貰ったのに。"
1005506-111 = "[s11] \"ううん、大したことはしてないし。\"\n[s12] \"何ならシグレが来てくれて、こうして食事できるだけで嬉しいから。\""
1005506-116 = "……。"
1005506-117 = "まあ、そう言ってくれるとありがたいけど……"
1005506-118 = "そういう言い方は、いくら私でもちょっとなぁ……。"
1005506-119 = "これが大人の余裕かー……。"
1005506-120 = "でも、気を付けた方が良いと思うよ？"
1005506-121 = "そういう風にされたら、私も調子に乗っちゃうかもしれないよ？"
1005506-122 = "先生だって、私がシャーレに通い始めたりしたら疲れるでしょ？"
1005506-123 = "え、問題無い……？"
1005506-124 = "私のイタズラぐらい、いくらでも受け止める……？"
1005506-125 = "ふふっ、そういう事いうんだ？"
1005506-126 = "じゃあ、これからも来させてもらおうかな。"
1005506-127 = "先生も、227号特別クラスにもっと遊びに来てね。"
1005506-128 = "もちろん来る前の連絡は忘れないように！"
