[translation]
1004805-1 = "Remorso"
1004805-4 = "（Embora pensasse que talvez não fosse nada, a preocupação bateu e vim ao Mercado Negro procurar pela Saori）"
1004805-12 = "[ns] \"Tiros!?\""
1004805-13 = "Ei, você aí! Não sei o que veio fazer aqui, mas tome cuidado!"
1004805-14 = "[s] \"O que está acontecendo aqui!?\""
1004805-15 = "Dizem que a facção Wan-Wan e a facção Nyan-Nyan, famosas até aqui no Mercado Negro, entraram em confronto direto!"
1004805-16 = "Mas parece que a facção Wan-Wan contratou alguém muito habilidoso!"
1004805-17 = "Por causa disso, a facção Nyan-Nyan sofreu danos imensos..."
1004805-18 = "Não, mas também tem o boato de que essa pessoa caiu em uma armadilha da facção Nyan-Nyan...!"
1004805-19 = "[s] \"Alguém habilidoso... será que é a Saori...?\""
1004805-23 = "Ah, espere um pouco!"
1004805-24 = "O distrito oeste agora é território total da facção Nyan-Nyan! A disputa está ficando bem violenta, você vai acabar sendo pego no meio disso!!"
1004805-29 = "（Em meio a uma atmosfera claramente perigosa, comecei a correr por todo o Mercado Negro procurando por Saori）"
1004805-39 = "[ns] \"Saori...!\""
1004805-41 = "[ns] \"Saori, onde você está...?\""
1004805-47 = "（Enquanto ouvia tiros e explosões, continuei procurando por Saori por um tempo...）"
1004805-50 = "Haa... haa..."
1004805-51 = "[ns] \"Essa voz... Saori!?\""
1004805-62 = "[wa:950]— Sensei, [wa:1800]por que você está aqui...?"
1004805-65 = "[ns] \"Saori, seus ferimentos...!\""
1004805-66 = "[wa:150]— Guh... [wa:750]haa..."
1004805-69 = "[wa:50]— ...Não se preocupe, [wa:1600]é algo comum."
1004805-72 = "[wa:650]— É só que eu fui, [wa:1950]descuidada..."
1004805-74 = "[wa:50]— Mesmo que nada [wa:350]tenha mudado..."
1004805-77 = "— Eu acabei [wa:300]me enganando."
1004805-80 = "[wa:50]— Cof, [wa:700]cof...!"
1004805-82 = "— Não faça essa cara, [wa:2250]estou acostumada com a dor."
1004805-85 = "[wa:50]— Nada mudou em relação ao que era antes."
1004805-87 = "[wa:250]— Já é tarde demais para isso."
1004805-90 = "[wa:500]— Por enquanto, [wa:400]está tudo bem assim..."
1004805-92 = "[wa:100]— Só mais um pouco, [wa:3250]fique assim..."
1004805-96 = "[ns] \"...Vamos sair daqui primeiro.\""
1004805-98 = "Não, eu... kuh..."
1004805-105 = "[ns] \"Acho que aqui estamos seguros...\""
1004805-106 = "...Mais uma vez, causei problemas."
1004805-107 = "[s] \"O que aconteceu exatamente? Ouvi dizer que era um trabalho...\""
1004805-108 = "Aceitei o trabalho e fui ao local para encerrar o conflito."
1004805-109 = "Mas parece que era uma armadilha..."
1004805-110 = "[s] \"...Saori, onde está o contrato desta vez?\""
1004805-114 = "Está aqui, mas..."
1004805-120 = "[ns] \"Este conteúdo...\""
1004805-122 = "[ns] \"Saori, isso significa que você teria que enfrentar a facção Nyan-Nyan sozinha...!?\""
1004805-123 = "..."
1004805-124 = "[s] \"Não me diga que, com essa cara, você nem leu o que estava escrito...?\""
1004805-125 = "...O contrato em si, eu assinei corretamente, não assinei?"
1004805-126 = "[s] \"Não, não, não! Você não pode assinar sem ler o conteúdo!\""
1004805-127 = "É mesmo...?"
1004805-128 = "[ns] \"Bem, mas a forma como este contrato foi escrito é bem astuta...\""
1004805-132 = "（Lá estava escrito, de forma indireta, que no final, Saori teria que resolver a situação no distrito oeste sozinha...）"
1004805-133 = "[s] \"Falando nisso...\""
1004805-135 = "Ah, espere um pouco!"
1004805-136 = "O Distrito Oeste agora é território da facção Nyan-Nyan! O conflito lá está bem intenso, você vai acabar sendo arrastada para isso!"
1004805-140 = "(No caminho para cá, lembro de terem dito que o Distrito Oeste era perigoso por ser território da facção Nyan-Nyan...)"
1004805-141 = "(Estamos na periferia do Distrito Oeste, mas... se a Saori tivesse ido para o centro como dizia o contrato...)"
1004805-142 = "[s3] \"Se ela tivesse lido o contrato e seguido à risca, teria sido muito pior...?\"\n[s4] \"O fato de não ter lido acabou sendo uma sorte inesperada...?\""
1004805-143 = "(Julgando pela situação da Saori e pelo cenário atual,)"
1004805-144 = "(Julgando pela situação da Saori e pelo cenário atual,)"
1004805-145 = "(Parece que, desde o início, a Saori foi contratada pela facção Wan-Wan apenas como uma peça descartável.)"
1004805-149 = "(Isso significa que...)"
1004805-150 = "[s] \"Foi por um triz, mas você realmente precisa ler os contratos.\""
1004805-151 = "Entendo. Fui enganada de novo."
1004805-152 = "Bem, não é como se fosse novidade. Acontece o tempo todo."
1004805-153 = "[s] \"…….\""
1004805-154 = "Não é nada especial, nem motivo para alarde. Por isso..."
1004805-155 = "[ns] \"...Por enquanto, que tal irmos comer algo gostoso?\""
1004805-159 = "Do nada, por que isso...?"
1004805-160 = "[s5] \"Você está cansada, não está?\"\n[s6] \"O que passou, passou. Vamos focar em repor as energias.\""
1004805-161 = "……Por que as coisas terminaram assim?"
1004805-162 = "……Por que as coisas terminaram assim?"
1004805-169 = "Ei, espere um pouco...!"
1004805-178 = "[ns] \"O lámen daqui é muito bom.\""
1004805-179 = "……."
1004805-180 = "[s] \"Quando terminarmos de comer, vamos estudar sobre contratos.\""
1004805-181 = "Eu não sou do tipo que..."
1004805-182 = "[s] \"Nada disso, é uma promessa.\""
1004805-186 = "……."
1004805-187 = "……Entendido."
1004805-188 = "É verdade... "
1004805-189 = "Eu ainda..."
1004805-190 = "……Ainda tenho muito o que aprender."
1004805-192 = "(Assim, comi lámen com a Saori)"
1004805-193 = "(e, lentamente, deixamos o local)"
