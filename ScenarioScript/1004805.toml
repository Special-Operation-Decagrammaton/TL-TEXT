[translation]
1004805-1 = "自責の念"
1004805-4 = "（まさかとも思いつつ心配になり、ブラックマーケットにいるサオリを探しに来た）"
1004805-12 = "[ns] \"銃声！？\""
1004805-13 = "そこの！何の用かは分からないけど気を付けな！"
1004805-14 = "[s] \"これは何の騒ぎですか！？\""
1004805-15 = "ここブラックマーケットでも有名なワンワン派とニャンニャン派が正面衝突をしてるらしい！"
1004805-16 = "だがどうやら、ワンワン派の方にはすごい実力者が雇われたんだってよ！"
1004805-17 = "それでニャンニャン派には甚大な被害が出たとか……。"
1004805-18 = "いや、だがニャンニャン派の罠に引っ掛かってそいつはやられたという噂も……！"
1004805-19 = "[s] \"実力者……まさかサオリ……！？\""
1004805-23 = "あっ、ちょっと待った！"
1004805-24 = "今そっちの西区は、完全にニャンニャン派のエリアだぞ！抗争も相当過激になってる、巻き込まれるぞ！！"
1004805-29 = "（明らかに危険な空気の中で、ブラックマーケットのあちこちを走り回りながらサオリの姿を探し始めた）"
1004805-39 = "[ns] \"サオリ……！\""
1004805-41 = "[ns] \"サオリ、一体どこに……！\""
1004805-47 = "（銃声や爆音を耳にしながら、サオリのことを探し続けてしばらく……）"
1004805-50 = "はぁ……はぁ……。"
1004805-51 = "[ns] \"この声……サオリ！？\""
1004805-62 = "[wa:950]― 先生、[wa:1800]どうしてここに……？"
1004805-65 = "[ns] \"サオリ、傷が……！\""
1004805-66 = "[wa:150]― ぐっ……[wa:750]はぁ……"
1004805-69 = "[wa:50]― ……気にするな、[wa:1600]よくあることだ。"
1004805-72 = "[wa:650]― ただ私の詰めが、[wa:1950]甘かっただけで……"
1004805-74 = "[wa:50]― 何も[wa:350]変わってないというのに……"
1004805-77 = "― 勘違いを[wa:300]してしまった。"
1004805-80 = "[wa:50]― げほっ、[wa:700]げほっ……！"
1004805-82 = "― そんな顔をするな、[wa:2250]痛みには慣れている。"
1004805-85 = "[wa:50]― 今までと何も変わらない。"
1004805-87 = "[wa:250]― 今さらの話だ。"
1004805-90 = "[wa:500]― 今は[wa:400]これで良い……"
1004805-92 = "[wa:100]― もう少し、[wa:3250]このままで……"
1004805-96 = "[ns] \"……とりあえず場所を変えよう。\""
1004805-98 = "いや、私は……くっ……。"
1004805-105 = "[ns] \"ここまで来れば大丈夫かな……。\""
1004805-106 = "……また、迷惑をかけてしまった。"
1004805-107 = "[s] \"一体何があったの？依頼とは聞いたけど……。\""
1004805-108 = "依頼を受けて、抗争を終わらせに現場へと向かった。"
1004805-109 = "しかしそれが、罠だったようだ……。"
1004805-110 = "[s] \"……サオリ、今回の契約書は？\""
1004805-114 = "ここにあるが……。"
1004805-120 = "[ns] \"この内容……。\""
1004805-122 = "[ns] \"サオリひとりで、ニャンニャン派を相手にするってことじゃ……！？\""
1004805-123 = "……。"
1004805-124 = "[s] \"もしかしてだけどその顔、中身を読んでない……？\""
1004805-125 = "……契約書自体は、きちんと交わしたが？"
1004805-126 = "[s] \"いやいやいや、中身も読まずにサインしちゃダメ！\""
1004805-127 = "そうなのか……？"
1004805-128 = "[ns] \"まあでもこの契約書、書き方が巧妙っていうか……。\""
1004805-132 = "（そこには遠回しな言い方で、最終的にはサオリがひとりで西地区を片付けなければならない……というように書かれていた）"
1004805-133 = "[s] \"そういえば……。\""
1004805-135 = "あっ、ちょっと待った！"
1004805-136 = "今そっちの西区は、完全にニャンニャン派のエリアだぞ！抗争も相当過激になってる、巻き込まれるぞ！！"
1004805-140 = "（ここにくる途中、確かに西区はニャンニャン派のエリアだから危険だと聞いたような……）"
1004805-141 = "（ここは西区でも少し外れの方だけど……もし、サオリが契約書通り西区の中心に行っていたら……）"
1004805-142 = "[s3] \"契約書を読んでその通りにしてたら、もっと大変なことになってた……？\"\n[s4] \"読んでないことが偶然、功を奏した……？\""
1004805-143 = "（サオリの状況とこの現状から判断するに、）"
1004805-144 = "（サオリの状況とこの現状から判断するに、）"
1004805-145 = "（そもそもサオリは、最初からワンワン派の捨て駒として雇われていたようだ）"
1004805-149 = "（それは、つまり……）"
1004805-150 = "[s] \"間一髪だったけど、ちゃんと契約書は読まないとダメだよ。\""
1004805-151 = "……そうか。また、騙されたか。"
1004805-152 = "……まあ、今さらだな。よくあることだ。"
1004805-153 = "[s] \"……。\""
1004805-154 = "特別なことでも、騒ぐことでもない。だから……。"
1004805-155 = "[ns] \"……とりあえず、何か美味しいものでも食べにでも行こうか。\""
1004805-159 = "いきなり、何を……？"
1004805-160 = "[s5] \"疲れたでしょ？\"\n[s6] \"終わったことはしょうがないし、とりあえず栄養補給をね。\""
1004805-161 = "……どうしてそうなる？ "
1004805-162 = "……どうしてそうなる？ "
1004805-169 = "ちょ、ちょっと待て……！"
1004805-178 = "[ns] \"ここのラーメン、美味しいんだよね。\""
1004805-179 = "……。"
1004805-180 = "[s] \"食べ終わったら、契約書のことでも勉強しようか。\""
1004805-181 = "私は、そんな……。"
1004805-182 = "[s] \"ダメ、約束。\""
1004805-186 = "……。"
1004805-187 = "……分かった。"
1004805-188 = "そうだな……。 "
1004805-189 = "私は、まだ……。"
1004805-190 = "……まだ。学ばないといけないことが、たくさんある。"
1004805-192 = "（そうしてサオリとラーメンを食べて）"
1004805-193 = "（ゆっくりと、その場を後にした）"
