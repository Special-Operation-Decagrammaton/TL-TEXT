[translation]
1009306-1 = "キララ on the street"
1009306-2 = "（キララから嬉しい報告を受け、約束の場所に向かった）"
1009306-9 = "あっ、先生！こっちこっちー！"
1009306-10 = "超早いね！ビックリした！"
1009306-11 = "[s1] \"お待たせ、待った？\"\n[s2] \"キララも早いね！\""
1009306-14 = "あはっ！楽しみすぎてちょーっと早く着いちゃった♪"
1009306-15 = "追試も終わったし、今日はめいっぱい遊んじゃお♪"
1009306-16 = "先生は、行きつけのお店とかってある？"
1009306-17 = "あ、そっか。この辺りは詳しくないか。"
1009306-18 = "んじゃ決めた♪"
1009306-19 = "あたしがよく行くお店に連れてったげる！"
1009306-20 = "こっちこっち！"
1009306-23 = "特大クレープ、イチゴスペシャルとバナナスペシャル1つずつお願いしまーす！"
1009306-24 = "はい、少々お待ち下さい！"
1009306-29 = "ここ、めっちゃ美味しいの！オススメなんだ♪"
1009306-30 = "ここのスペシャルさ、ブルーベリーと生クリームがたっぷり入ってんの♪#n多幸感MAXみたいな？"
1009306-31 = "お待たせいたしました！"
1009306-37 = "はい！こっちは先生の！"
1009306-38 = "[ns] \"ありがとう、いただきます。\""
1009306-41 = "どうどう？"
1009306-42 = "[s] \"うん、すごく美味しいよ。\""
1009306-43 = "へへ、気に入ってくれると思った♪"
1009306-44 = "あたしのも一口どう？イチゴのヤツ！"
1009306-45 = "両方食べたら、2倍楽しめるでしょ？"
1009306-46 = "はい、あ～ん。"
1009306-47 = "どしたの？イチゴ嫌いだった？"
1009306-48 = "[ns] キララが差し出したクレープを一口味わう。"
1009306-52 = "どうどう？美味しいよね？"
1009306-56 = "あははっ！先生、口元に生クリームついてんじゃん！#nそんなに美味しかった？"
1009306-57 = "ほら、こっち向いて！"
1009306-58 = "[s] \"あ、自分で拭け――\""
1009306-59 = "ダメダメ！自分だとうまく拭けないでしょ。"
1009306-60 = "あっ、ハンカチがないや。"
1009306-61 = "ま、手で良いか♪"
1009306-65 = "（ぺろっ）"
1009306-66 = "[ns] \"！？！？\""
1009306-68 = "んじゃ、次いくよ♪"
1009306-73 = "見てみて！この服、めっちゃ可愛くない？"
1009306-74 = "Tシャツ2枚買ったら、おまけでもう1枚ついてくるんだって。"
1009306-76 = "ねえねえ先生、2枚買ってお揃いにしない？"
1009306-105 = "ふぅ！楽しかったー♪"
1009306-106 = "先生、大丈夫？疲れてない？"
1009306-107 = "[s] \"実はちょっと前から、体力の限界が……。\""
1009306-108 = "ごめん、休憩入れればよかったね！"
1009306-109 = "楽しくてついはしゃぎすぎちゃった……。"
1009306-110 = "ん？でも楽しかった？"
1009306-111 = "あはは、なら良かった！"
1009306-112 = "どしよっかなぁ……このまま帰るのもなんだか……。"
1009306-113 = "よし！じゃあ最後に公園に寄ってこ！"
1009306-116 = "足がくたくたー！"
1009306-117 = "こんなに歩き回ったの、久々かも。"
1009306-118 = "[s] \"キララって、結構あちこち行くイメージだったけど……？\""
1009306-119 = "うん、よく遊びに行くよ～！#n賑やかな方が好きだし。"
1009306-120 = "でも、なんだか今日は、いつもよりめっちゃ歩いた気がする……。"
1009306-121 = "楽しくて、はしゃいじゃったからかなぁ？"
1009306-122 = "[s] \"追試に合格して、心が軽くなったからとか？\""
1009306-123 = "それもあると思うけど……。"
1009306-127 = "視界の違い、というか……初めての感覚っていうか……？"
1009306-128 = "あ、あはは！気のせいかも！#nんじゃ、行こっか！"
1009306-130 = "（その後キララと少し話してから、シャーレに戻った）"
