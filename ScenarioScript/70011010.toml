[translation]
70011010-1 = "A Melancolia de Misuzu Kambara (1)"
70011010-3 = "Obrigada, Suzu-chan!"
70011010-4 = "Graças a você, sinto que consigo me esforçar! Com certeza entrarei em contato de novo!"
70011010-5 = "Bem, isso é mérito do seu próprio esforço."
70011010-12 = "Três meses seguidos sendo premiada!? Incrível, Suzu-chan!"
70011010-13 = "Isso nem acontece com frequência em toda a Valkyrie, né!?"
70011010-14 = "Bem, isso só foi possível graças à cooperação de todos vocês."
70011010-21 = "Bom, só pode ser a Suzu-chan mesmo."
70011010-22 = "Suzu-chan? Ah, a Misuzu Kambara?#nSerá que ela dá conta com esse jeito dela...?"
70011010-23 = "Mas veja bem, ela tem resultados..."
70011010-24 = "(...Hm?)"
70011010-25 = "Ah, ali! Olá! Você é a Misuzu Kambara, certo?"
70011010-32 = "Poderia nos contar como se sente por ter sido escolhida como a próxima diretora do Departamento Correcional!"
70011010-33 = "(Por que será que as coisas chegaram a esse ponto...)"
70011010-34 = "(Eu não deveria estar passando por isso...)"
70011010-48 = "...zu-chan."
70011010-50 = "Suzu-chan."
70011010-51 = "Hiaaa!?"
70011010-52 = "Uau, que susto... Você está bem?"
70011010-53 = "Sinto muito... Eu estava um pouco distraída pensando em algumas coisas..."
70011010-54 = "Poxa, você já vive com a cabeça nas nuvens normalmente. Tente se concentrar, tá?"
70011010-55 = "Ehehe... É verdade, preciso tomar cuidado. Obrigada pela preocupação."
70011010-56 = "...Então, sobre aquilo que eu pedi."
70011010-57 = "Ah... É isto aqui, certo?"
70011010-62 = "Isso mesmo! Sem isso, é muito difícil começar o dia."
70011010-63 = "Obrigada! Peço de novo depois!"
70011010-64 = "Ah, bem... tecnicamente, trazer coisas de fora repetidamente vai contra as regras..."
70011010-65 = "Por isso, talvez seja um pouco difícil da próxima vez... talvez..."
70011010-66 = "Ué? Não é a primeira vez que você traz para mim, né?"
70011010-67 = "Bem... até agora, foi como se fosse uma exceção, por assim dizer..."
70011010-68 = "Então faz uma exceção da próxima vez também!"
70011010-69 = "Sim..."
70011010-70 = "Mas... que tal tentar reduzir aos poucos?#nNão é algo muito saudável para o seu corpo."
70011010-71 = "Hum... bem, é verdade, mas..."
70011010-72 = "...Ué? Espere um pouco."
70011010-77 = "Droga, a carcereira!"
70011010-78 = "Quantas vezes vou ter que dizer que não sou carcereira... Ah, esquece."
70011010-79 = "E então, o que você aprontou dessa vez?"
70011010-80 = "Por que você já assume que eu fiz algo!?"
70011010-81 = "Dê uma olhada no seu histórico. E então...#"
70011010-84 = "..."
70011010-88 = "Vamos lá. Entregue por conta própria antes que eu faça uma revista corporal."
70011010-89 = "Tsc."
70011010-94 = "...O que é isso?"
70011010-95 = "Dá pra ver, não dá? É um sachê de matcha latte. Tem cafeína."
70011010-96 = "Cafeína? Mas vocês já não recebem café instantâneo?"
70011010-97 = "Aquele é amargo e ruim."
70011010-98 = "Haa... Vocês não estão aqui para brincar..."
70011010-99 = "E aliás, isso não é um produto bem caro? De onde você tirou dinheiro?"
70011010-100 = "Ah? É mesmo?"
70011010-101 = "Hã? Você não sabe? Isso significa que, por acaso..."
70011010-102 = "E-ehehe... Fui eu quem escolheu isso."
70011010-103 = "Já que você está passando por uma situação tão restrita... pensei que, pelo menos, a comida deveria ser algo saboroso... ehehe..."
70011010-104 = "Ah, e também... cuidar da saúde das alunas encarceradas é o nosso trabalho..."
70011010-105 = "Diretora."
70011010-106 = "Ah, não, bem... ehehe..."
70011010-107 = "Haa... É problemático que isso aconteça sempre. Isso aumenta o nosso trabalho, sabe?"
70011010-108 = "Me desculpe..."
70011010-109 = "Ei, ei, não culpe tanto a Suzu-chan. Fui eu quem pediu algo impossível."
70011010-110 = "Se for para culpar alguém, culpe a mim!"
70011010-114 = "Não, isso é óbvio, né..."
70011010-115 = "Por que eu virei a vilã da história..."
70011010-116 = "Ei, o que está acontecendo aqui?"
70011010-120 = "Ah, veterana..."
70011010-121 = "Ah... entendi mais ou menos."
70011010-122 = "Você, volte para o seu quarto. E não esqueça de levar isso com você."
70011010-123 = "Não era essa a minha intenção..."
70011010-124 = "Acho que vou reduzir a cafeína... Suzu-chan, me desculpe."
70011010-128 = "Ehehe... tome cuidado."
70011010-129 = "Bem, nós também vamos indo. Voltaremos aos nossos postos."
70011010-135 = "Sim... continuem contando comigo..."
70011010-137 = "Isso está bom mesmo?"
70011010-138 = "Você conhece a personalidade da diretora... não temos escolha a não ser nos adaptar."
70011010-139 = "Haa... Misuzu-san, você é gentil demais."
70011010-140 = "Não, eu sei que ela é uma boa pessoa e eu também gosto dela, mas..."
70011010-141 = "Bem, eu entendo o que você quer dizer. Todo mundo tem seus pontos fortes e fracos. Mas..."
70011010-143 = "Como comportamento de uma diretora da agência correcional, é um pouco..."
70011010-150 = "Consegui terminar por hoje..."
70011010-154 = "A sala da diretora... é grande demais para mim."
70011010-155 = "Embora, na época em que eu era funcionária, a mesa fosse pequena e desconfortável... queria poder dividir esse espaço com todas..."
70011010-160 = "Será que as diretoras anteriores sentiam o mesmo...? Ou será que... eu que sou simples demais..."
70011010-165 = "Bem, não adianta ficar pensando muito nisso. Chega, chega. Vamos parar por aqui."
70011010-166 = "Preciso pensar em coisas melhores. Já que o trabalho terminou cedo hoje."
70011010-167 = "Isso aqui também. Tive que me esforçar um pouco, mas... fico feliz que tenha dado tempo."
70011010-171 = "Fufu."
70011010-172 = "Tricotar é bom... acalma o coração..."
70011010-173 = "Queria que o tempo parasse assim para sempre..."
70011010-177 = "Diretora!"
70011010-178 = "Hii!?"
70011010-183 = "Desculpe incomodar a uma hora dessas! Achei que deveria relatar isso com urgência...!"
70011010-184 = "S-sim, não tem problema. Se é urgente, é natural."
70011010-185 = "Então, o que houve?"
70011010-186 = "É que... uma prisioneira escapou..."
70011010-187 = "O quê!? Fuga!?"
70011010-188 = "Quando!? Quem!? Foi a Wakamo!? Sozinha!?"
70011010-189 = "Ah... não é isso."
70011010-190 = "Não foi sozinha!?"
70011010-191 = "Então, quantas Wakamos escaparam!?"
70011010-192 = "Não, na verdade, só existe uma Wakamo..."
70011010-193 = "E, aliás, a Wakamo já tinha escapado faz tempo, não tinha?"
70011010-194 = "Ah... é verdade. Peço desculpas, perdi a compostura..."
70011010-195 = "Fique tranquilo. A fuga foi impedida."
70011010-196 = "Dito isso, como a situação é grave, gostaria de uma decisão sobre as medidas disciplinares."
70011010-197 = "Aqui está a identidade da aluna que tentou escapar."
70011010-202 = "Ah, quanto a isso."
70011010-209 = "Poderia me dar um momento? Gostaria de conversar diretamente com ela."
70011010-210 = "Ou seja, um interrogatório, certo?"
70011010-211 = "Não é uma expressão que eu goste muito, mas... é isso mesmo."
70011010-212 = "Mas não há necessidade de o Diretor se expor a uma pessoa perigosa..."
70011010-213 = "Afinal, o Departamento Correcional já está com falta de pessoal."
70011010-214 = "Deixe que eu cuide disso."
70011010-215 = "...Entendido. Vou começar os preparativos."
70011010-223 = "...Antigamente, esse tipo de coisa não acontecia."
