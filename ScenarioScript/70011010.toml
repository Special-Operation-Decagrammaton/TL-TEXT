[translation]#[Texto Final. - Filipe 08/07.]
70011010-1 = "A Melancolia de Misuzu Kanbara (1)"
70011010-3 = "Obrigado, Suz-chan!"
70011010-4 = "Agora sinto que posso continuar! Vou te procurar de novo!"
70011010-5 = "Mas foi mérito seu."
70011010-12 = "Prêmio 3 meses seguidos!? Incrível, Suz-chan!"
70011010-13 = "Não é comum nem na Valkyrie!"
70011010-14 = "Mas foi graças à ajuda de todos."
70011010-21 = "Bem, só a Suz-chan mesmo."
70011010-22 = "Suz-chan? Ah, Misuzu Kanbara?#n……Será que ela vai dar conta com esse jeito?"
70011010-23 = "Mas ela tem resultados……"
70011010-24 = "(……Hmm?)"
70011010-25 = "Ah, ali! Olá! Você é Misuzu Kanbara, certo?"
70011010-32 = "Como se sente sendo escolhida como a nova diretora da Agência Correcional?"
70011010-33 = "(Por que isso aconteceu……?)"
70011010-34 = "(Eu não era pra……)"
70011010-48 = "……Suz-chan."
70011010-50 = "Suz-chan."
70011010-51 = "Hyaaa!?"
70011010-52 = "Uau, que susto…… você está bem?"
70011010-53 = "Desculpa…… eu estava distraída……"
70011010-54 = "Já é meio desligada normalmente. Se liga, ok?"
70011010-55 = "Hehe…… é verdade, preciso tomar cuidado. Obrigada pela preocupação."
70011010-56 = "……Então, sobre o que pedi."
70011010-57 = "Ah…… isto, certo?"
70011010-62 = "Isso! Sem isso, a manhã é foda."
70011010-63 = "Obrigada! Depois te peço de novo!"
70011010-64 = "Ah, é que…… pelas regras, não é permitido trazer coisas de fora repetidamente……"
70011010-65 = "Então da próxima pode ser difícil……"
70011010-66 = "Hã? Não é a primeira vez que você traz, né?"
70011010-67 = "Bem…… as vezes anteriores foram exceções……"
70011010-68 = "Então da próxima também é exceção."
70011010-69 = "Sim……"
70011010-70 = "Mas…… que tal ir reduzindo aos poucos?#nIsso não faz bem à saúde."
70011010-71 = "Hmm…… é verdade……"
70011010-72 = "……Ué? Espera."
70011010-77 = "Droga, a carcereira!"
70011010-78 = "Já falei que não sou carcereira…… ah, deixa pra lá."
70011010-79 = "Então, o que você fez?"
70011010-80 = "Por que já acha que fui eu?"
70011010-81 = "Olha seu histórico.#nEntão……"
70011010-84 = "……"
70011010-88 = "Viu? Tira isso antes da revista."
70011010-89 = "Tsc."
70011010-94 = "……O que é isso?"
70011010-95 = "Você não vê? É um stick de matcha latte. Com cafeína."
70011010-96 = "Cafeína? Mas já temos café instantâneo."
70011010-97 = "Aquilo é amargo e ruim."
70011010-98 = "Haa…… você não veio aqui pra passear……"
70011010-99 = "Aliás, isso não é caro? Como conseguiu dinheiro?"
70011010-100 = "Hã? É?"
70011010-101 = "Hã? Você não sabe? Então……"
70011010-102 = "Hehe…… fui eu que escolhi."
70011010-103 = "Como vocês já estão em situação difícil……#n……pensei que ao menos a comida podia ser gostosa…… hehe……"
70011010-104 = "Ah, e também…… cuidar da saúde das internas é nosso trabalho……"
70011010-105 = "Diretora."
70011010-106 = "Ah, é…… hehe……"
70011010-107 = "Haa…… isso toda vez é um problema. Isso aumenta nosso trabalho."
70011010-108 = "Desculpa……"
70011010-109 = "Ei, não culpa a Suz-chan. Quem pediu fui eu."
70011010-110 = "Se quer culpar alguém, culpe a mim!"
70011010-114 = "Não, isso é óbvio……"
70011010-115 = "Por que eu sou a vilã?"
70011010-116 = "Ei, o que foi?"
70011010-120 = "Ah, senpai……"
70011010-121 = "Ah…… já entendi."
70011010-122 = "Volte pro seu quarto. E não esquece de levar isso."
70011010-123 = "Não era minha intenção……"
70011010-124 = "Vou diminuir a cafeína… Suz-chan, desculpa."
70011010-128 = "Hehe…… cuidado."
70011010-129 = "Então, nós vamos. De volta ao posto."
70011010-135 = "Sim…… continuem contando conosco."
70011010-137 = "Tudo bem isso?"
70011010-138 = "Você conhece o jeito da diretora… temos que nos adaptar."
70011010-139 = "Haa…… a Misuzu é boa demais."
70011010-140 = "Não, sei que ela é boa, eu gosto dela……"
70011010-141 = "Mas entendo o que quer dizer. Cada um tem seu perfil. Mas――"
70011010-143 = "como diretora da Agência Correcional, é questionável……"
70011010-150 = "Hoje terminei mais um dia……"
70011010-154 = "Sala da diretora…… é grande demais pra mim."
70011010-155 = "Mas quando eu era agente, a mesa era pequena e desconfortável……#n……gostaria de poder dividir o espaço com todos……"
70011010-160 = "Será que os diretores anteriores também pensaram assim?#n……ou só sou muito 'povo'?"
70011010-165 = "Mas ficar pensando não adianta.#nVamos parar por aqui."
70011010-166 = "Preciso pensar em coisas boas. Hoje saí mais cedo do trabalho."
70011010-167 = "Isso também. Foi um pouco corrido, mas…… deu tempo."
70011010-171 = "Fufu."
70011010-172 = "Tricô é bom…… acalma a mente……"
70011010-173 = "Se o tempo pudesse parar――"
70011010-177 = "Diretora!"
70011010-178 = "Hya!?"
70011010-183 = "Desculpe a hora! Achei que precisava relatar com urgência!"
70011010-184 = "Sim, tudo bem. Em caso de urgência, é natural."
70011010-185 = "O que aconteceu?"
70011010-186 = "Uma interna tentou fugir――"
70011010-187 = "Hã!? Fuga?"
70011010-188 = "Quando!? Quem!? Wakamo!? Sozinha!?"
70011010-189 = "Ah…… não."
70011010-190 = "Não foi sozinha?"
70011010-191 = "Então quantas Wakamo fugiram?"
70011010-192 = "Não, a Wakamo é só uma……"
70011010-193 = "Aliás, a Wakamo já fugiu há muito tempo."
70011010-194 = "Ah…… é verdade. Me descontrolei……"
70011010-195 = "Fique tranquila. A fuga foi contida."
70011010-196 = "Mas como é grave, precisamos decidir a punição."
70011010-197 = "A interna que tentou fugir é esta."
70011010-202 = "Ah, com essa."
70011010-209 = "Posso ter um tempo? Quero falar com ela."
70011010-210 = "Ou seja, um interrogatório?"
70011010-211 = "Não gosto desse termo, mas…… sim."
70011010-212 = "Mas a diretora não precisa se encontrar com uma perigosa……"
70011010-213 = "A Agência Correcional está com falta de pessoal."
70011010-214 = "Deixe comigo."
70011010-215 = "……Entendido. Vou preparar."
70011010-223 = "……Antigamente, essas coisas não aconteciam."