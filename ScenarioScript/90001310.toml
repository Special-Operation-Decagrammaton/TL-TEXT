[translation]
90001310-1 = "Episódio 31; O caminho que cada um segue"
90001310-2 = "Sensei!!!!"
90001310-3 = "Finalmente consegui contato! Eu estava te procurando esse tempo todo!?"
90001310-4 = "Essas coordenadas são... a zona de tundra?#nPor que você está em um lugar desses...?"
90001310-11 = "Não tem meios de transporte decentes... e o sinal de rádio também está#$%$@&...!"
90001310-12 = "[s] \"Você consegue ver minha localização...?\""
90001310-13 = "Eu @$%^&$ mobilizei todos os ^%&#$ do Millennium para... mas esquece isso!"
90001310-14 = "Você está se metendo em perigo de novo?#nO Sensei sempre, sempre faz isso...!"
90001310-15 = "Se algo acontecer com você, eu..."
90001310-19 = "...O que eu deveria fazer?"
90001310-20 = "[s] \"Desculpe, Yuuka... mas eu vou dar um jeito.\""
90001310-21 = "Dar um jeito... você sempre diz isso..."
90001310-22 = "...Não, eu acredito no Sensei."
90001310-23 = "De qualquer forma, não há nada que eu possa fazer aí."
90001310-24 = "Por isso, tenho um relatório para te passar."
90001310-25 = "Um fenômeno anormal está ocorrendo no mar agora."
90001310-26 = "Mesmo enviando drones de reconhecimento, a comunicação é cortada, então#nnão sei os detalhes, mas..."
90001310-27 = "O metal está corroendo o solo a uma velocidade incrível.#nSe continuar assim, logo chegará nas coordenadas onde você está...!"
90001310-28 = "[s1] \"...Entendo.\"\n[s2] \"Yuuka, posso te pedir um favor?\""
90001310-31 = "Quer que eu impeça que qualquer um se aproxime o máximo possível...?"
90001310-38 = "O motivo de você estar aí, $%^@! não se preocupe?"
90001310-39 = "..."
90001310-40 = "...Depois, você vai me explicar tudo detalhadamente, entendeu?"
90001310-41 = "[s] \"Com certeza.\""
90001310-42 = "É uma promessa, viu?"
90001310-43 = "Se $%^#*"
90001310-44 = "...%$^@~&#!!!"
90001310-49 = "...Será que acabou?"
90001310-50 = "Parece que sim..."
90001310-51 = "Que susto, meu coração quase parou..."
90001310-52 = "Rio... não está na hora de ir?"
90001310-53 = "Não, eu..."
90001310-54 = "(Acho que já estou preparada mentalmente...)"
90001310-56 = "[ns] \"Vamos partir logo.\""
90001310-58 = "Sim!#nA heroína Aris vai salvar o mundo!"
90001310-59 = "Heroína, estou contando com você."
90001310-60 = "Ainda sou uma aprendiz, mas!"
90001310-61 = "Espero que, com esta missão, você deixe de ser uma aprendiz."
90001310-63 = "Presidente, os preparativos para a partida da nave de transporte terminaram."
90001310-64 = "Cabine de comando, saguão, quartos individuais, instalações de manutenção, laboratório, sala de máquinas, enfermaria, tudo está normal."
90001310-69 = "[ns] \"Capitã Rio, deixo com você.\""
90001310-70 = "Capitã...? Eu?"
90001310-71 = "[s3] \"Esta nave de transporte foi preparada por você, Rio.\"\n[s4] \"Acho que você é a pessoa certa para ser a capitã.\""
90001310-74 = "Será que eu tenho qualificação para isso..."
90001310-75 = "Rio, já que vai fazer isso, mantenha a cabeça erguida.#nVocê está levando todos com você. Ninguém além de você."
90001310-76 = "...Sim."
90001310-77 = "..."
90001310-78 = "Todos, por favor, embarquem."
90001310-79 = "Entendido. Iniciando o embarque agora."
90001310-81 = "Partiiiu!"
90001310-85 = "Você entende que não estamos indo passear, certo?"
90001310-89 = "U-uuh... estou com medo, mas não tem mais como fugir, né..."
90001310-96 = "Vamos nós também, Kei!"
90001310-100 = "Ah, Alice!#nÉ perigoso correr!"
90001310-105 = "[ns] \"Capitã Rio, dê a ordem de partida!\""
90001310-106 = "……"
90001310-107 = "Entendido."
90001310-108 = "A partir de agora, partiremos para lidar com o profeta de Decagrammaton e—"
90001310-109 = "Os engenheiros chamados Ain, Soph e Aur."
90001310-110 = "E com o continente de aço que continua a se expandir—"
90001310-111 = "—partiremos para lidar com esse \"fenômeno singular\"."
90001310-112 = "Bem, é que..."
90001310-113 = "(Parece que ela ainda não está acostumada.)"
90001310-114 = "(A presidente nunca fazia esse tipo de coisa. Não tem jeito...)"
90001310-119 = "Bem... o que vocês vão fazer quando voltarem?#nEu pretendo melhorar ainda mais o Avant-Garde-kun."
90001310-124 = "Hã?"
90001310-126 = "Ri-Rio...?"
90001310-127 = "Você está com uma cara de surpresa... eu disse algo estranho?"
90001310-128 = "Poderia evitar falar coisas agourentas?#nFalar sobre o que faremos depois, antes de uma grande batalha..."
90001310-129 = "Acho que manter o foco no objetivo é uma coisa boa, mas..."
90001310-131 = "[ns5] \"Coisas agourentas, é...\"\n[ns6] \"Então, vamos falar de coisas ainda mais agourentas!\""
90001310-135 = "Quando essa operação terminar, pretendo publicar um doujinshi com as estatísticas de ocultismo."
90001310-136 = "Já que estamos aqui, que tal tirarmos uma foto comemorativa?#nTorcendo para que ninguém falte."
90001310-137 = "Não, espere!"
90001310-138 = "Hmm, o que eu deveria dizer?#nFico feliz por ter chegado até aqui com todo mundo."
90001310-139 = "……Tudo bem, não pretendo perder."
90001310-140 = "—Afinal, preciso voltar e fazer o Sensei me pagar um sorvete."
90001310-141 = "Até você!?"
90001310-143 = "Entendo, então eu também..."
90001310-144 = "Ao Departamento de Investigação de Fenômenos Singulares, ao Departamento de Desenvolvimento de Jogos e ao Sensei."
90001310-145 = "Nesta situação, só há uma coisa a dizer."
90001310-146 = "—Quando chegarmos, vou encontrar um lugar suspeito e dizer a frase de efeito:#n\"Está tudo bem, aqui é seguro\"."
90001310-147 = "\"Mas, por precaução, vou dar uma olhada. Voltarei logo, então quando eu retornar, faça carinho em mim, Sensei\"... seria algo assim."
90001310-148 = "Então eu também!#n\"Fufufu, o mistério foi solucionado—\"."
90001310-150 = "Por favor, pare! Não diga coisas desnecessárias!"
90001310-151 = "Midori! Yuzu! Alice!#nVocês três estão bem, né...?"
90001310-155 = "……"
90001310-156 = "Como posso ficar em um lugar tão perigoso!"
90001310-157 = "E-eu vou voltar para o meu armário...!"
90001310-158 = "N-nós conseguimos...?"
90001310-163 = "Parem com isso!#nNós vamos voltar vivas, com certeza!"
90001310-164 = "Sim, exatamente."
90001310-165 = "……Sim?"
90001310-166 = "Ah!"
90001310-167 = "[ns7] \"Então a Kei também queria dizer isso.\"\n[ns8] \"Se sente melhor?\""
90001310-170 = "Fu, fufu, fufufufu..."
90001310-171 = "Temos todo esse poder de fogo. Já é como se tivéssemos vencido! A batalha está decidida!#nEu vou tomar um banho relaxante!"
90001310-172 = "[ns] \"A Kei-chan quebrou...\""
90001310-173 = "De quem você acha que é a culpa!!!"
90001310-175 = "……Está na hora de partir."
90001310-176 = "Vamos acelerar com potência máxima logo na decolagem, então todos, por favor, coloquem os cintos."
90001310-177 = "Não saiam de seus assentos de jeito nenhum até que eu dê o aviso. #nE, além disso, estejam sempre preparados para qualquer situação."
90001310-178 = "……Toki."
90001310-179 = "Sim, Rio-sama. #n――Esta nave decolará em breve."
90001310-181 = "Alvo――Continente de Aço. Decolar……!"
90001310-185 = "……A nave de transporte decolou."
90001310-186 = "Deve levar algumas horas até chegarmos."
90001310-187 = "Tiphereth também retornou à sua posição correta. #nO Continente de Aço pode ser considerado em perfeitas condições."
90001310-188 = "E, e a irmã mais velha……?"
90001310-189 = "Eu pedi a ela que descansasse no \"Recipiente de Zohar\"."
90001310-190 = "Uma boa escolha. #nSe o pior cenário…… se tivermos que ativar o protocolo final――"
90001310-191 = "Owl."
90001310-192 = "Sim, eu sei. #nÉ para evitar que isso aconteça que nós existimos."
90001310-193 = "……."
90001310-196 = "Eu odeio este mundo."
90001310-197 = "Não há nada que possamos fazer――"
90001310-198 = "――E nós nem sequer podemos escolher."
90001310-199 = "Mas o mundo é feito dessa forma."
90001310-200 = "Aqueles que nasceram com tudo agem sem consideração――e ainda assim, não temos escolha a não ser obedecer sem resistência."
90001310-202 = "Existem pessoas que possuem, como se fosse natural, aquilo que nós não temos."
90001310-203 = "Mesmo que nós desaparecêssemos, não haveria uma única pessoa para lamentar."
90001310-204 = "Não importa o quanto nos esforcemos, não conseguimos causar nem o menor impacto no resultado."
90001310-205 = "――Para nós, que não fomos agraciadas com o Mistério, as possibilidades são limitadas desde o início."
90001310-207 = "Mesmo assim, acho que está tudo bem assim por enquanto."
90001310-208 = "Nós construímos o Continente de Aço e reunimos os profetas."
90001310-209 = "……Mas não precisávamos ter ido tão longe. #nO plano daquela pessoa era algo completamente diferente, afinal."
90001310-210 = "Por isso, esta é a nossa escolha."
90001310-211 = "――Não foi ninguém além de nós, foi por nossa própria vontade que buscamos e alcançamos isso."
90001310-212 = "A irmã mais velha também disse, não disse? #nMesmo que seja uma ilusão――"
90001310-213 = "Sem livre-arbítrio, nós não conseguimos viver."
90001310-215 = "Sabe, às vezes eu penso."
90001310-216 = "Mesmo que tudo se torne um caos e acabemos tropeçando em condições impossíveis――"
90001310-217 = "――Se a irmã mais velha estiver aqui, não há problema."
90001310-218 = "É assim…… que eu penso."
90001310-219 = "I-isso mesmo!"
90001310-220 = "Mesmo que algo aconteça conosco……."
90001310-221 = "Se a irmã mais velha sobreviver…… e-eu ficarei satisfeita com isso."
90001310-222 = "Ma-mas…… agora, eu não quero pensar em um futuro assim."
90001310-223 = "Até o fim…… eu não quero pensar nisso."
90001310-224 = "……Mesmo que tudo fosse uma mentira, eu só quero que o fato de que a irmã mais velha esteve aqui permaneça."
90001310-225 = "Apenas as memórias do tempo que passei com a irmã mais velha……."
90001310-226 = "E também……."
90001310-227 = "Se um dia alguém nos compreendesse……."
90001310-228 = "E nos dissesse \"vocês se esforçaram muito\"――"
90001310-229 = "Eu, eu certamente ficaria muito feliz…… eu acho."
90001310-230 = "……Sim, é verdade. #nPor que eu tinha esquecido disso? Desculpe, Ein."
90001310-231 = "N-n-n-não! #nPor favor, não se preocupe com isso……!"
90001310-232 = "Além disso…… neste exato momento, temos algo importante a fazer, não temos?"
90001310-233 = "Sim. Mais um dia, um novo dia está chegando."
90001310-234 = "P-preciso me preparar……."
90001310-235 = "E vamos rezar para que o dia de amanhã continue em paz."
90001310-236 = "O momento chegou. #nA ação é a nossa salvação."
90001310-237 = "Talvez a vida e a morte não tenham significado algum para nós."
90001310-242 = "――Ainda assim, para continuarmos sendo quem somos, não há outro caminho."
90001310-244 = "Arco Decagrammaton; Continua no Capítulo 3"
