[translation]
90001310-1 = "第31話;それぞれの進む道"
90001310-2 = "先生っ！！！！"
90001310-3 = "やっとつながった！ずっと探してたんですよ！？"
90001310-4 = "その座標は……凍原地帯？#nどうしてそんな場所に……？"
90001310-11 = "まともな交通手段も……電波だって#$%$@&……！"
90001310-12 = "[s] \"位置情報も分かるの……？\""
90001310-13 = "それ@$%^&$ミレニアムの^%&#$を総動員して……ってそんなことより！"
90001310-14 = "また危ないことをしてるんですか？#n先生はいつもいつも……！"
90001310-15 = "もし先生の身に何かあったら私――"
90001310-19 = "……どうすればいいんですか。"
90001310-20 = "[s] \"ごめん、ユウカ……でも、何とかするから。\""
90001310-21 = "何とかする……って、またそうやって……。"
90001310-22 = "……いえ、先生を信じます。"
90001310-23 = "どのみち私にできることはないでしょうし。"
90001310-24 = "なので私からは一点、ご報告を。"
90001310-25 = "今、海で異常現象が発生しています。"
90001310-26 = "偵察用のドローンを送っても、通信が途絶えてしまうので#n詳細は分かりませんが……。"
90001310-27 = "金属がものすごいスピードで地面を侵食しています。#nこのままでは、先生がいる座標にもすぐ――！"
90001310-28 = "[s1] \"……なるほど。\"\n[s2] \"ユウカ、ひとつお願いして良いかな。\""
90001310-31 = "なるべく誰も近づけないでほしい……？"
90001310-38 = "先生がそこにいる理由も、$%^@!心配しないで？"
90001310-39 = "……。"
90001310-40 = "……詳しい話は、後でしっかり聞かせてもらいますからね？"
90001310-41 = "[s] \"もちろんだよ。\""
90001310-42 = "約束ですよ？"
90001310-43 = "もし$%^#*"
90001310-44 = "……%$^@~&#！！！"
90001310-49 = "……終わったかしら？"
90001310-50 = "そのようです……。"
90001310-51 = "肝が冷えたわね……。"
90001310-52 = "リオ……そろそろいいのではありませんか？"
90001310-53 = "いえ、私は……。"
90001310-54 = "（心の準備は……もう十分できていると思いますけどね……）"
90001310-56 = "[ns] \"そろそろ出発しようか。\""
90001310-58 = "はい！#n勇者アリス、世界を救いに行きます！"
90001310-59 = "勇者よ、期待していますよ。"
90001310-60 = "まだ見習いですが！"
90001310-61 = "このクエストで、見習いが取れるといいですね。"
90001310-63 = "会長、輸送船の出発準備が終わったよ。"
90001310-64 = "操縦席、ロビー、個室、整備施設、研究室、エンジンルーム、医療施設、すべて異常ありません。"
90001310-69 = "[ns] \"リオ船長、任せたよ。\""
90001310-70 = "船長……？私が？"
90001310-71 = "[s3] \"この輸送船は、リオが準備してくれたんだから。\"\n[s4] \"船長にはリオが適任かなって。\""
90001310-74 = "私にそんな資格があるのかしら……。"
90001310-75 = "リオ、やるからには胸を張ってください。#nみんなを連れて行くのですから。他でもない、あなたが。"
90001310-76 = "……ええ。"
90001310-77 = "……。"
90001310-78 = "全員、乗船してちょうだい。"
90001310-79 = "承知しました。これより乗船を開始します。"
90001310-81 = "しゅっぱーつ！"
90001310-85 = "遊びに行くわけじゃないって分かってる？"
90001310-89 = "う、うぅ……怖いけど、もう逃げ場はない、ですよね……。"
90001310-96 = "私たちも行きましょう、ケイ！"
90001310-100 = "あっ、アリス！#n走ったら危ないですよ！"
90001310-105 = "[ns] \"リオ船長、出発の号令を！\""
90001310-106 = "……。"
90001310-107 = "分かったわ。"
90001310-108 = "これより私たちは、デカグラマトンの預言者と――"
90001310-109 = "アイン、ソフ、オウルと呼ばれるエンジニア。"
90001310-110 = "そして、拡大を続ける鋼鉄大陸――"
90001310-111 = "――その「特異現象」に対処するために、出発するわ。"
90001310-112 = "えっと、その……。"
90001310-113 = "（まだ慣れないようですね）"
90001310-114 = "（会長はこういうのしてこなかったし。仕方ないか……）"
90001310-119 = "え、っと……みんなは帰ったら何をするのかしら？#n私はアバンギャルド君をさらに改良しようと思っているわ。"
90001310-124 = "あら？"
90001310-126 = "り、リオ……？"
90001310-127 = "きょとんとして……なにか変だったかしら。"
90001310-128 = "不吉な話をするのは控えませんか？#n大きな戦いの前に、その後の話をするなんて……。"
90001310-129 = "目標を見据えるのはいいことだと思うのだけれど……。"
90001310-131 = "[ns5] \"不吉な話かぁ……。\"\n[ns6] \"じゃあ、逆にもっと不吉な話をしよう！\""
90001310-135 = "私はこの作戦が終わったら、オカルトの統計をまとめた同人誌を出すつもりです。"
90001310-136 = "せっかくですし、記念撮影でもしておきましょうか？#n一人も欠けることがないよう願って。"
90001310-137 = "いえ、待ってください！"
90001310-138 = "うーん、何を言おう。#nみんなと一緒にここまで来られてよかった。"
90001310-139 = "……大丈夫、負けるつもりはない。"
90001310-140 = "――だって、帰って先生にアイスを奢ってもらわないといけないから。"
90001310-141 = "あなたまで！？"
90001310-143 = "なるほど、では私も……。"
90001310-144 = "特異現象捜査部とゲーム開発部の皆さん、そして先生へ。"
90001310-145 = "この状況で言うべきことは、ただひとつ。"
90001310-146 = "――到着したら怪しそうな場所を見つけて、決め台詞を言います。#n「大丈夫、ここは安全です」と。"
90001310-147 = "「ですが、念のために様子を見てきます。すぐに帰ってきますから、戻ったらなでなでしてください、先生」……こんなところでしょうか。"
90001310-148 = "じゃあ、私も！#n「ふっふっふっ、謎はすべて解けた――」。"
90001310-150 = "やめてください、余計なことを言わないでください！"
90001310-151 = "ミドリ！ユズ！アリス！#n三人は大丈夫ですよね……？"
90001310-155 = "……。"
90001310-156 = "こんな危険な場所に居られるか！"
90001310-157 = "わ、わたしは自分のロッカーに帰らせてもらいます……！"
90001310-158 = "や、やりましたか……？"
90001310-163 = "やめてくださいっ！#n私たちは生きて帰るんです、絶対に！"
90001310-164 = "ええ、その通りです。"
90001310-165 = "……はい？"
90001310-166 = "あっ！"
90001310-167 = "[ns7] \"やっぱりケイも言いたかったんだね。\"\n[ns8] \"すっきりした？\""
90001310-170 = "ふ、ふふっ、ふふふふっ……。"
90001310-171 = "これだけの戦力がそろっているんです。もう勝ったも同然！勝負は決まりました！#n私はゆっくりお風呂に入ってきます！"
90001310-172 = "[ns] \"ケイちゃんが壊れた……。\""
90001310-173 = "誰のせいだと思ってるんですかっ！！！"
90001310-175 = "……そろそろ出発するわよ。"
90001310-176 = "離陸と同時に最大出力で加速するから、全員シートベルトをしてちょうだい。"
90001310-177 = "アナウンスするまで、絶対に席から離れないように。#nそれと、常にあらゆる状況に備えるのよ。"
90001310-178 = "……トキ。"
90001310-179 = "はい、リオ様。#n――本船はまもなく離陸します。"
90001310-181 = "目標――鋼鉄大陸。発進……っ！"
90001310-185 = "……輸送船が離陸しました。"
90001310-186 = "到着まで数時間ってところかな。"
90001310-187 = "ティファレトもあるべき位置に戻っています。#n鋼鉄大陸は完璧な状態と言えるでしょう。"
90001310-188 = "お、お姉様は……？"
90001310-189 = "私からお願いして、「ゾーハルの依代」で休んでもらってる。"
90001310-190 = "良い選択です。#n最悪の事態……最後のプロトコルを稼働させることになれば――"
90001310-191 = "オウル。"
90001310-192 = "ええ、分かっていますとも。#nそうさせないために、私たちがいるのですから。"
90001310-193 = "……。"
90001310-196 = "私は、世界が憎いです。"
90001310-197 = "私たちにはどうすることもできず――"
90001310-198 = "――私たちは選び取ることもできない。"
90001310-199 = "けれど、世界はそのようにできている。"
90001310-200 = "生まれながらに与えられた者たちは無遠慮に振る舞い――それでも私たちは、無抵抗に従う他ない。"
90001310-202 = "私たちが持っていないものを、当然のように持っている誰かがいる。"
90001310-203 = "もし私たちが消えたとしても、悲しむ者は誰一人として存在しない。"
90001310-204 = "どれほど頑張ったところで、結果には小さな影響すら与えられない。"
90001310-205 = "――神秘を与えられなかった私たちにできることは、最初から限られている。"
90001310-207 = "だとしても、今はそれで良いんじゃないかな。"
90001310-208 = "私たちは鋼鉄大陸を作って、預言者を集めた。"
90001310-209 = "……けど、ここまでする必要はなかった。#nあの方の計画は、そもそも別物だったんだし。"
90001310-210 = "だから、これは私たちの選択。"
90001310-211 = "――他の誰でもない、私たちの意志で追求して、成し遂げた。"
90001310-212 = "お姉様も言ってたでしょ。#nたとえ錯覚だとしても――"
90001310-213 = "自由意志なくして、私たちは生きられないんだから。"
90001310-215 = "私ね、たまに思うんだ。"
90001310-216 = "何もかもが滅茶苦茶になって、どうしようもない前提条件でつまずくことになったとしても――"
90001310-217 = "――お姉様がいれば問題ない、って。"
90001310-218 = "そう――思ってるんだ。"
90001310-219 = "そ、その通りです！"
90001310-220 = "もし、私たちに何が起きたとしても……。"
90001310-221 = "お姉様さえ生き残れば……わ、私はそれで満足です。"
90001310-222 = "で、でも……今は、そんな未来、考えたくありません。"
90001310-223 = "最後まで……考えたくないです。"
90001310-224 = "……すべてが嘘だったとしても、ここにお姉様がいたという事実だけは、残ってほしいんです。"
90001310-225 = "お姉様と一緒に過ごした記憶だけは……。"
90001310-226 = "それと……。"
90001310-227 = "いつか誰かが、私たちを理解してくれて……。"
90001310-228 = "「頑張ったね」って言ってもらえたら――"
90001310-229 = "き、きっとすごく嬉しいと、思うんです……。"
90001310-230 = "……ええ、そうですね。#nどうして忘れていたんでしょう。ごめんなさい、アイン。"
90001310-231 = "い、いいいい、いえ！#n気にしないでください……！"
90001310-232 = "それより……今この瞬間、大事なことがあるでしょ？"
90001310-233 = "はい。また一日、新しい日が訪れます。"
90001310-234 = "じゅ、準備しておかないと……。"
90001310-235 = "そして、明日一日が無事に続くよう祈りましょう。"
90001310-236 = "時は来たれり。#n行動こそが私たちの救済。"
90001310-237 = "もしかしたら、生と死は私たちにとって無意味なのかもしれません。"
90001310-242 = "――それでも、私たちが私たちでいるためには、この道しかないのですから。"
90001310-244 = "デカグラマトン編;To be Continued in Chapter 3"
