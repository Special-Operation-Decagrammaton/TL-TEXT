[translation]
31080-1 = "Episódio 8; 1º Exame Acadêmico Especial"
31080-3 = "（Ah, isso aqui é o que vimos nas aulas de reforço...!）"
31080-4 = "（O conteúdo que o Sensei explicou e os problemas que estudamos juntas... estão quase todos aqui!）"
31080-5 = "（Além disso, a dificuldade é de nível iniciante... não, nível básico!）"
31080-6 = "（Disseram tantas coisas assustadoras até agora, mas será que isso é uma medida de auxílio para nós...!?）"
31080-10 = "I-isso é... é, bem..."
31080-14 = "Fufu..."
31080-18 = "…Hum."
31080-22 = "（Mas não podemos baixar a guarda...! Pessoal, não percam o foco até o fim, vamos nos formar no Clube de Aulas de Reforço com um sorriso!）"
31080-29 = "[ns] Os resultados do exame chegaram."
31080-30 = "P-pessoal, bom trabalho a todas...!"
31080-31 = "Bem, disseram que para passar precisa tirar 60 de 100 pontos! Mesmo que não tiremos uma nota alta, se passarmos dessa linha, já está tudo bem."
31080-32 = "Além disso, o conteúdo estava bem fácil... então, vamos aos resultados!"
31080-33 = "Sensei, por favor!"
31080-34 = "[s] Anunciar os resultados."
31080-35 = "Hifumi: 72 pontos"
31080-36 = "Resultado — Aprovada"
31080-37 = "M-muito obrigada! É uma nota um pouco comum, mas fico feliz! Bem, agora, a próxima..."
31080-39 = "Azusa: 32 pontos"
31080-40 = "Resultado — Reprovada"
31080-41 = "…Hã!?"
31080-42 = "Tsc, foi por pouco."
31080-43 = "…E-espere! Não foi \"por pouco\" não!? Faltou bastante, na verdade!?"
31080-45 = "Koharu: 11 pontos"
31080-46 = "Resultado — Reprovada"
31080-47 = "！？"
31080-48 = "Koharu-channnn!? V-você não estava escondendo seu potencial!? Desta vez você fez o exame do 1º ano, certo!? N-não me diga que você fez o do 2º ano de novo... ou pior, fez o exame do 3º ano!?"
31080-49 = "E-eu, é que...! F-foi bem difícil..."
31080-50 = "Estava super fácil, gente!? Parecia um teste rápido!"
31080-51 = "Ora, ora..."
31080-52 = "Uuu... então quer dizer que só eu e a Hanako-chan passamos...? Isso significa que teremos que fazer o próximo, o segundo exame..."
31080-53 = "Hanako: 2 pontos"
31080-54 = "Resultado — Reprovada"
31080-56 = "2 pontos！！？！？！？！？"
31080-57 = "2 pontos, 2 pontos mesmo!? Não 20!? Não que 20 fosse o suficiente, mas...! O que você acertou, afinal!? E espere, Hanako-chan, você não parecia ser muito inteligente nos estudos!?"
31080-58 = "Certamente eu passo essa impressão. Mas as notas são outra história."
31080-59 = "Impressão!? Era só impressão!? Como assim as notas são outra história!?"
31080-60 = "U..."
31080-61 = "Auu..."
31080-65 = "[ns] \"Hifumi! Mantenha a calma...!\""
31080-70 = "1º Exame Acadêmico Especial, resultado —"
31080-72 = "Hanako — [FF6666]Reprovada[-]"
31080-74 = "Azusa — [FF6666]Reprovada[-]"
31080-76 = "Koharu — [FF6666]Reprovada[-]"
31080-78 = "Hifumi — [007eff]Aprovada[-]"
31080-80 = "O acampamento do Clube de Aulas de Reforço foi decidido!"
31080-84 = "Próximo episódio; Sombras que oscilam sob a superfície"
