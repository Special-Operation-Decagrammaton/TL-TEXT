31080-56 = "2 PONTOS！！！？！？！？！？"
31080-57 = "2 pontos, 2 pontos mesmo！？ Não 20！？ Não, 20 também seria péssimo……！ Aliás, o que você acertou！？ E espera, Hanako-chan parecia ser super boa nos estudos, né！？"
31080-58 = "Realmente eu passo essa vibe. Mas as notas são outra história."
31080-59 = "Vibe！？ Só a vibe era boa！？ Como assim as notas são outra história！？"
31080-60 = "U……"
