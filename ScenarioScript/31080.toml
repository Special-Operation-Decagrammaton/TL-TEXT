31080-10 = "I-isso aqui…… e-eh……"
31080-14 = "Fufu……"
31080-18 = "……Humm."
31080-22 = "（Mas não pode vacilar……！ Vamos todas manter o foco até o final e sair sorrindo desse Clube de Reforço！）"
31080-29 = "[ns] O resultado da prova chegou."
31080-30 = "T-todo mundo, bom trabalho……！"
31080-31 = "Eh, a nota mínima pra passar é 60 de 100！ Mesmo que não tirem uma nota alta, só precisa passar dessa linha."
31080-32 = "E o conteúdo também foi bem fácil…… então vamos à divulgação dos resultados！"
31080-33 = "Sensei, por favor！"
31080-34 = "[s] Anuncia os resultados."
