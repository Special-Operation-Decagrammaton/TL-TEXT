[translation]
31080-1 = "Episódio 8;1º Exame Especial de Aptidão"
31080-3 = "(Ah, isto aqui a gente fez no reforço……!)"
31080-4 = "(O conteúdo que o Sensei explicou e as questões que a gente estudou junto, quase tudo igualzinho……!)"
31080-5 = "(E, em dificuldade, é nível iniciante…… não, nível básico!)"
31080-6 = "(Até agora falaram um monte de coisa assustadora, mas será que isto é, na verdade, uma medida de resgate pra gente……!?)"
31080-10 = "I-isto é…… é-é que……."
31080-14 = "Ufu……."
31080-18 = "……Hum."
31080-22 = "(Mas nada de baixar a guarda……! Pessoal, sem relaxar até o fim, vamos nos formar do Clube de Aulas de Reforço com um sorriso no rosto!)"
31080-29 = "[ns] O resultado da prova chegou."
31080-30 = "P-pessoal, bom trabalho……!"
31080-31 = "É que, de 100 pontos, dizem que 60 ou mais é aprovação! Mesmo sem tirar nota alta, se ao menos passar dessa linha, já tá tudo bem."
31080-32 = "E o conteúdo também foi bem fácil…… então, vamos ao anúncio dos resultados!"
31080-33 = "Sensei, por favor!"
31080-34 = "[s] Anuncia os resultados."
31080-35 = "Hifumi: 72 pontos"
31080-36 = "Resultado――Aprovada"
31080-37 = "A-ah, muito obrigada! É uma nota meio sem graça, mas que bom! Então, a seguir……"
31080-39 = "Azusa: 32 pontos"
31080-40 = "Resultado――Reprovada"
31080-41 = "……Sim, siiim!?"
31080-42 = "Tch, faltou um fio de cabelo."
31080-43 = "……E-espera! Não é uma nota de \"um fio de cabelo\", não!? Faltou bastante, viu!?"
31080-45 = "Koharu: 11 pontos"
31080-46 = "Resultado――Reprovada"
31080-47 = "!?"
31080-48 = "Koharuuuuu!? V-você não tava escondendo o seu poder!? Desta vez você fez direitinho a prova do 1º ano, né!? N-não me diga que de novo a do 2º ano…… não, com essa nota, você fez a prova do 3º ano!?"
31080-49 = "N-não, é que……! T-tava bem difícil……."
31080-50 = "Foi superfácil!? Era nível de testezinho!?"
31080-51 = "Ora, ora……."
31080-52 = "Uu…… então quem passou fomos só eu e a Hanako……? Sendo assim, a gente vai ter que fazer o próximo, o 2º exame……."
31080-53 = "Hanako: 2 pontos"
31080-54 = "Resultado――Reprovada"
31080-56 = "2 pontos!!?!?!?!?"
31080-57 = "2 pontos, 2 pontos!? Não 20!? Não, 20 também não passaria, mas……! Aliás, o que é que você acertou!? Quer dizer, peraí, a Hanako tinha toda uma pinta de quem manja de estudo, né!?"
31080-58 = "De fato, parece que eu tenho esse ar, né. Bom, mas nota é outra coisa."
31080-59 = "Ar!? Era só o ar!? Como assim, nota é outra coisa!?"
31080-60 = "U……."
31080-61 = "Auu……."
31080-65 = "[ns] \"Hifumi! Firme……!\""
31080-70 = "1º Exame Especial de Aptidão, resultado――"
31080-72 = "Hanako――[FF6666]Reprovada[-]"
31080-74 = "Azusa――[FF6666]Reprovada[-]"
31080-76 = "Koharu――[FF6666]Reprovada[-]"
31080-78 = "Hifumi―――[007eff]Aprovada[-]"
31080-80 = "O acampamento do Clube de Aulas de Reforço foi decidido!"
31080-84 = "Próximo Episódio;Sombras que Tremeluzem sob a Superfície"
