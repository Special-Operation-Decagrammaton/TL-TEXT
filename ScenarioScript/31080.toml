[translation]
31080-1 = "Episódio 8: 1ª Prova Especial"
31080-3 = "（Ah, isso aqui eu fiz na aula de reforço……！）"
31080-4 = "（Quase tudo que o Sensei explicou e que a gente estudou junto tá aqui……！）"
31080-5 = "（E o nível é bem básico…… na real, é nível iniciante！）"
