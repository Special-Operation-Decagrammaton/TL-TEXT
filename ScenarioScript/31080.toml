31080-36 = "Resultado―― Aprovada"
31080-37 = "O-obrigada！ Foi uma nota bem segura, que alívio！ Então, o próximo…"
31080-39 = "Azusa：32 pontos"
31080-40 = "Resultado―― Reprovada"
31080-41 = "……HÃ！？"
31080-42 = "Tch, quase passou."
31080-43 = "……Espera aí！ Não foi «quase» coisa nenhuma！？ Tá bem abaixo da média！？"
31080-45 = "Koharu：11 pontos"
31080-46 = "Resultado―― Reprovada"
31080-47 = "！？"
31080-48 = "Koharu-channnn！？ V-você não disse que tava escondendo seu poder！？ Dessa vez você fez a prova do 1º ano direito, né！？ N-não me diz que fez a do 2º ano de novo…… ou pior, do 3º ano com essa nota！？"
31080-49 = "É que……！ Foi bem difícil e……"
31080-50 = "Foi super fácil！？ Parecia uma provazinha de controle！？"
31080-51 = "Ara ara……"
31080-52 = "Uuu…… só a Hifumi-chan e a Hanako-chan passaram…… quer dizer que vamos ter que fazer a segunda fase…"
31080-53 = "Hanako：2 pontos"
