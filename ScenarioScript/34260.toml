[translation]
34260-1 = "Episódio 26; O Nosso Futuro"
34260-6 = "Certo, pessoal! Sigam pelo caminho das catacumbas exatamente como a Seia-sama nos instruiu!"
34260-7 = "S-Sim...!!"
34260-8 = "Ichika, como estão as coisas por aí? Encontraram o Sensei?"
34260-9 = "Ah, sim! A gente o encontrou. #nMas... a Tsurugi-senpai tá..."
34260-10 = "...Ué? O que houve com ela?"
34260-17 = "Por favor, se acalme, Tsurugi-senpai. #nIsso não é uma porta, é uma parede..."
34260-21 = "Ah, já era."
34260-26 = "...Kekekekekeke."
34260-30 = "KYAAAAAAAHHHH!!"
34260-35 = "[ns] \"Tsurugi...\""
34260-36 = "...Força-Tarefa de Justiça? #nO-O que vocês estão fazendo aqui..."
34260-37 = "Ah, oie, Sensei. #nSou a Ichika, da Força-Tarefa de Justiça."
34260-38 = "A gente se encontrou rapidamente daquela vez que o Clube de Pesquisa Gastronômica foi preso, mas... talvez você não lembre de mim... Como pode ver, a gente veio ajudar."
34260-39 = "[s] \"Sim, é muito bom te ver, Ichika.\""
34260-40 = "Ehehe... Fico feliz de poder cumprimentar você também, Sensei."
34260-44 = "Hasumi-senpai, encontramos o Sensei e a Mika-sama."
34260-45 = "Então recuem o mais rápido possível para a zona segura... eu guiaremos o Sensei pela rota que garantimos nas catacumbas!"
34260-46 = "Entendido. Beleza, vamos lá! #nTem pessoas querendo ver vocês."
34260-55 = "Sensei...!! Mika-san...!! Graças a deus vocês estão bem!"
34260-57 = "N-Nagi-chan...? #nUé, por que você tá aqui...?"
34260-59 = "Este é o QG da Operação de Restauração de Arius..."
34260-60 = "C-Como você chegou aqui...?"
34260-62 = "Fui eu que contei para ela."
34260-63 = "[ns] \"Seia...!!?\""
34260-69 = "Se..."
34260-70 = "Seia... chan..."
34260-71 = "Você é realmente muito tola, Mika."
34260-72 = "Como sempre, agindo por impulso e cometendo erros. Esse é o seu pior hábito."
34260-73 = "...Seia-chan. #nC-Como...?"
34260-74 = "...Talvez eu não tenha muito tempo para explicar os detalhes."
34260-79 = "No meio de um devaneio, eu acabei me deparando com uma certa pessoa..."
34260-80 = "A história é longa, então serei breve... digamos apenas que fizemos um pequeno acordo."
34260-83 = "S-Seia-sama...!?"
34260-84 = "*Cof*, *cof*..."
34260-85 = "C-Capitã! A Seia-sama...!!"
34260-86 = "Por favor. Tragam a Nagisa... a Sisterhood e a Força-Tarefa de Justiça para cá, agora...!"
34260-87 = "Quê!? #nE-Entendido!!"
34260-88 = "Não temos tempo... precisamos ir até o Sensei e a Mika imediatamente...!!"
34260-90 = "E assim... eu convoquei a Sisterhood, as Cavaleiras Hospitalárias e a Força-Tarefa de Justiça para esta missão."
34260-91 = "Uma coisa é certa—a Nagisa chegou a declarar que estaria disposta a abrir mão de todo o seu poder político só para salvar você, Mika, e mobilizou todos ao redor para essa causa."
34260-93 = "...Eu lhes peço encarecidamente, a todas vocês... #nPor favor, salvem a Mika-san..."
34260-94 = "Eu também peço."
34260-99 = "……"
34260-101 = "Inacreditável..."
34260-102 = "Levantem a cabeça, Nagisa-sama, Seia-sama. #nNão precisa de reverências para nós."
34260-103 = "Nós cuidaremos da situação da Mika-sama. #nE... fico feliz que esteja bem, Seia-sama. O que exatamente aconteceu?"
34260-105 = "Isso... daria uma longa história..."
34260-106 = "...Entendido."
34260-107 = "Então vamos deixar essa conversa para outra hora."
34260-108 = "Nossa maior prioridade agora é o Sensei. #n...Eu também darei o meu melhor."
34260-109 = "Na Trinity, há muitas alunas que admiram o Sensei, não só eu. #nElas certamente nos ajudarão."
34260-110 = "Sim... conto com vocês."
34260-115 = "...Esse é o padrão de alteração das catacumbas que eu conheço."
34260-116 = "Foi de grande ajuda. Obrigada, Azusa."
34260-117 = "Ah, sabe... não tem problema se eu não for junto?"
34260-118 = "Não. Quero que você espere pelo Sensei aqui."
34260-119 = "Se dependermos do Clube de Aulas Suplementares para esta missão... especialmente da sua ajuda, #nnossa honra e reputação seriam arruinadas."
34260-120 = "E também não queremos dar ainda mais trabalho para a Hanako-san."
34260-121 = "Por favor, deixe-nos resolver isso."
34260-122 = "Certo..."
34260-123 = "Ah, er..."
34260-124 = "...Algo mais?"
34260-128 = "A... Atsuko, ajudem ela."
34260-129 = "Azusa... Acredito que o Sensei já deve ter ajudado aquela garota. #nNós estamos indo resgatar o Sensei."
34260-130 = "...Eu sei. #nMas... já que vão, seria bom se... pudessem salvar as outras também..."
34260-131 = "...Mesmo? #nMesmo elas tendo apontado as armas para você...?"
34260-132 = "...É. Elas fizeram inúmeras coisas horríveis e irreparáveis."
34260-137 = "Mas... elas também foram a minha família..."
34260-140 = "U-Ugh... Você tem noção de que horas são...?"
34260-141 = "Ufufu, esta é a hora em que todos estão dormindo, Ui-san. #nPoderia procurar por aquela página para nós?"
34260-142 = "N-Não... E por que você está vestida assim...?"
34260-143 = "Eu recebi o chamado de repente durante a minha caminhada... ou melhor, o meu nado..."
34260-144 = "Hmmm, seria essa aqui? Vamos procurar a próxima página."
34260-145 = "Nado...? A esta hora...? #nNão, mas antes disso você não disse 'caminhada'!?"
34260-149 = "Espere! É esse, esse aqui! #nEncontramos! O mapa das catacumbas deixado pela antiga Santa Sé!"
34260-150 = "E-Essa página? #nEla tá bem danificada e a descoloração tá muito forte..."
34260-151 = "Exatamente por isso viemos até você. #nA Maga da Antiga Biblioteca, Ui Kozeki..."
34260-152 = "Uh, ah, uuh..."
34260-153 = "Você consegue restaurar esse mapa, não consegue? #nNão temos muito tempo."
34260-158 = "Você poderia nos ajudar com a restauração agora, Ko-ze-ki-sen-pai? #nEu vou ajudar o máximo que eu puder."
34260-159 = "U-Uuh... #nPor que essas coisas só acontecem comigo..."
34260-163 = "Vamos lá, pessoal! As ruínas mais próximas ficam bem ali!"
34260-166 = "S-Sim!"
34260-171 = "C-Com licença...!"
34260-172 = "Ué? Você é... a Koharu...?"
34260-173 = "Ah, ugh... e-eu também sou da Força-Tarefa de Justiça, mas... #nA-Agora eu tô no Clube de Aulas Suplementares, então não posso ajudar na missão... por isso, er, senpai..."
34260-174 = "Por favor, entregue isso... para aquela pessoa do Tea Party."
34260-180 = "...O que é isso? #nFitas e acessórios...?"
34260-181 = "São... os itens pessoais daquela pessoa que tinham ficado no depósito de confisco da Força-Tarefa de Justiça."
34260-182 = "Ah... faz sentido. #nSão os acessórios que a Mika-sama colecionava, né."
34260-183 = "Espera aí... mas disseram que tudo tinha sido queimado durante os motins... Tava no depósito?"
34260-184 = "Ah, bem... e-eu juntei secretamente as coisas que sobreviveram ao incêndio... #nE-Eu sei que normalmente a gente não deveria fazer isso, mas..."
34260-185 = "...Entendi. #nDeixa comigo, Koharu."
34260-186 = "Eu vou entregar para a Mika-sama."
34260-187 = "Ufa... muito... obrigada."
34260-197 = "Meninas..."
34260-198 = "Nós também não podemos ficar dependendo do Sensei para sempre. #nSó podemos ter um relacionamento ideal se formos capazes de iluminar o caminho dele também."
34260-199 = "É por isso que... viemos te salvar, Mika."
34260-200 = "...Seia-chan, eu continuo não entendendo metade do que você fala. #nVocê age de um jeito tão esnobe que chega a me dar raiva, de verdade."
34260-204 = "Quantas vezes eu já não pensei em dar um jeito em você..."
34260-205 = "—Ainda assim, eu amo você, Seia-chan."
34260-206 = "...Hã?"
34260-207 = "E você, Nagi-chan, é tão histérica! #nSem falar que, segurar essa xícara de chá até num lugar desses... francamente, é meio ridículo, não acha?"
34260-213 = "Isso é vício em cafeína? Ou transtorno obsessivo-compulsivo?"
34260-214 = "—Mas eu também amo a Nagi-chan assim."
34260-216 = "N-Não, isso é só... o nervosismo..."
34260-217 = "...Hã?"
34260-222 = "É... eu amo muito vocês duas."
34260-223 = "Obrigada... e, me perdoem..."
34260-228 = "Mika-san..."
34260-229 = "...Não, quem deveria pedir desculpas sou eu. #n...Me perdoe, Mika."
34260-230 = "Eu sempre quis me desculpar com você."
34260-231 = "Mas o meu orgulho bobo falou mais alto e não me deixou..."
34260-232 = "Mika... quando você sugeriu reconciliação com Arius, eu..."
34260-233 = "Não, não precisa dizer nada... tá tudo bem."
34260-234 = "Me perdoa... a culpa foi minha..."
34260-235 = "Mika-san..."
34260-236 = "Mika..."
34260-243 = "Ah, er... desculpa cortar o clima fofo de vocês, mas... #nTem uma coisa que eu preciso entregar pra você, Mika-sama."
34260-244 = "Pra mim...?"
34260-245 = "Toma isso..."
34260-249 = "...Isso é."
34260-253 = "Os meus... acessórios...? #nUé, como assim? Não tinha queimado tudo...!?"
34260-254 = "Ah, er... acontece que a encarregada do depósito de confiscos..."
34260-255 = "Hmm, é meio difícil de explicar, sabe..."
34260-256 = "Ela meio que pegou e guardou os acessórios da Mika-sama que não tinham sido queimados."
34260-257 = "A Koharu-chan...?"
34260-258 = "É, a Koharu... Espera."
34260-259 = "Hein!? #nVocê sabia que era a Koharu?"
34260-260 = "...É. Eu sabia."
34260-261 = "Obrigada, Koharu-chan... #nMesmo depois de tudo de ruim que eu te fiz..."
34260-266 = "……"
34260-271 = "……"
34260-272 = "[ns] \"Acho que a gente deveria reservar um tempinho para conversar.\""
34260-273 = "...É, acho que você tem razão."
34260-274 = "Bem, então, vamos indo? #nNão temos muito tempo até a audiência da Mika-san."
34260-275 = "Sim."
34260-276 = "Ehhh... eu tenho mesmo que ir assim?"
34260-277 = "Queria pelo menos me trocar... e tratar essas feridas. #nE preciso arrumar o cabelo também, afinal vou estar na frente de um monte de gente."
34260-281 = "……"
34260-282 = "……"
34260-283 = "Haa... faça como quiser."
34260-284 = "É verdade. Além disso, nós três viramos a noite acordadas, não podemos nos apresentar nesse estado..."
34260-286 = "[ns] \"Eu vou com vocês.\""
34260-288 = "...Mas é claro, Sensei. #nAfinal, nós prometemos que todas nós compareceríamos juntas à audiência."
34260-290 = "Próximo Episódio; Epílogo"