[translation]
34260-1 = "Episódio 26;O Nosso Daqui pra Frente"
34260-6 = "Vamos, pessoal! O caminho das catacumbas, exatamente como a senhorita Seia ensinou!"
34260-7 = "S-sim……!!"
34260-8 = "Ichika, como está aí? Encontraram o Sensei?"
34260-9 = "Ah, sim! Encontramos.#nSó que…… a veterana Tsurugi……."
34260-10 = "……Hã? A Tsurugi?"
34260-17 = "Se acalme, veterana Tsurugi.#nAí não é porta, é parede……."
34260-21 = "Ah, já era."
34260-26 = "……Kekekekekeke."
34260-30 = "Kiaaaaaah――!!"
34260-35 = "[ns] \"Tsurugi…….\""
34260-36 = "……Do Comitê de Realização da Justiça?#nP-por que vocês aqui……."
34260-37 = "A-ah…… oi, Sensei.#nSou a Ichika, do Comitê de Realização da Justiça."
34260-38 = "A gente até se viu outro dia, na prisão do Clube de Pesquisa Gastronômica…… mas talvez o senhor nem lembre………como dá pra ver, viemos ajudar."
34260-39 = "[s] \"Sim, que alegria te ver, Ichika.\""
34260-40 = "Ehehe…… que bom poder cumprimentar o Sensei."
34260-44 = "Veterana Hasumi, asseguramos o Sensei e a senhorita Mika."
34260-45 = "Então recuem pra zona segura imediatamente…… vou guiar o Sensei pela rota assegurada das catacumbas!"
34260-46 = "Sim, siim. Vamos, então!#nTem gente esperando por vocês, viu."
34260-55 = "Sensei……!! Mika……!! Vocês estão bem!"
34260-57 = "N-Nagi……?#nUé, por que você aqui……."
34260-59 = "Aqui é o quartel-general da operação de resgate de Arius……."
34260-60 = "C-como vocês chegaram aqui……?"
34260-62 = "Fui eu que ensinei."
34260-63 = "[ns] \"Seia……!!?\""
34260-69 = "Se……"
34260-70 = "Seia……."
34260-71 = "Tola de verdade, né, Mika."
34260-72 = "Como sempre, agindo por impulso e errando o passo. Esse é o seu vício."
34260-73 = "……Seia.#nC-como……?"
34260-74 = "……Pra tecer as palavras, talvez falte um tanto de tempo."
34260-79 = "Dentro do devaneio, por acaso, eu pude me encontrar com uma certa pessoa……."
34260-80 = "Contar ia ficar longo, então vou pular…… digamos que fizemos um pequeno acordo."
34260-83 = "S-senhorita Seia……!?"
34260-84 = "Cof, cof……"
34260-85 = "C-comandante! A senhorita Seia……!!"
34260-86 = "Por favor. Agora mesmo, a Nagisa…… a Sisterhood e o Comitê de Realização da Justiça, aqui……!"
34260-87 = "Sim!?#nE-entendido!!"
34260-88 = "Não há tempo…… preciso ir agora mesmo até o Sensei e a Mika……!!"
34260-90 = "E, assim, eu…… convoquei a Sisterhood, a Ordem dos Cavaleiros de Socorro e o Comitê de Realização da Justiça, e os mobilizei pra cá."
34260-91 = "Uma coisa é certa――a Nagisa chegou a declarar que, pra salvar a Mika, abriria mão de todo o próprio poder, e pôs todo mundo em movimento."
34260-93 = "……Eu imploro a vocês……#nsalvem a Mika……."
34260-94 = "Eu também peço."
34260-99 = "……."
34260-101 = "Isso não……."
34260-102 = "Levantem a cabeça, senhorita Nagisa, senhorita Seia.#nVocês não devem se curvar diante de nós."
34260-103 = "O problema da senhorita Mika, compreendido.#nE…… que alegria ver a senhorita Seia bem. O que, afinal, aconteceu?"
34260-105 = "Isso…… contar ia ficar longo, mas……"
34260-106 = "……Entendido."
34260-107 = "Então, por ora, deixemos de lado."
34260-108 = "O que deve vir antes de tudo é o Sensei.#n……Eu também farei o meu melhor."
34260-109 = "Em Trinity, não sou só eu; há muitos alunos que estimam o Sensei.#nElas, com certeza, vão colaborar."
34260-110 = "Sim…… conto com vocês."
34260-115 = "……Este é todo o padrão de mudança das catacumbas que eu conheço."
34260-116 = "Ajudou muitíssimo. Obrigada, Azusa."
34260-117 = "É que…… tem certeza de que não precisa que eu vá?"
34260-118 = "Sim. Você espere o Sensei aqui."
34260-119 = "Se, nesta missão, a gente pedisse a ajuda do Clube de Aulas de Reforço…… principalmente a sua,#no nosso orgulho e a nossa compostura iriam por água abaixo."
34260-120 = "Estamos evitando incomodar até a Hanako."
34260-121 = "Isto, deixem que nós resolvemos."
34260-122 = "Sei……."
34260-123 = "É-é que……."
34260-124 = "……Tem mais alguma coisa?"
34260-128 = "É que…… salvem a Atsuko."
34260-129 = "Azusa…… essa menina o Sensei já deve ter salvado, viu.#nNós vamos é salvar o Sensei."
34260-130 = "……Eu sei.#nMas…… já que é assim, queria que as outras também…… saíssem bem……."
34260-131 = "……Ah, é?#nSendo que elas apontaram armas pra você……."
34260-132 = "……Sim. Fizeram coisas irreversíveis, mais do que dá pra contar."
34260-137 = "Mas…… elas também eram a minha família……."
34260-140 = "U-uu…… que horas você acha que são……."
34260-141 = "Ufufu, é a hora em que todos dormem, né, Ui.#nSerá que você pode procurar naquela página ali?"
34260-142 = "N-não…… aliás, por que você tá vestida assim……."
34260-143 = "Eu também recebi o aviso no meio de um passeio…… quer dizer, de uma natação………"
34260-144 = "Hmm, será esta? Vamos procurar na próxima página."
34260-145 = "Natação……? A esta hora……?#nAliás, antes disso, você disse \"passeio\", não disse!?"
34260-149 = "Espera! Aí, é essa!#nAchamos! O mapa das catacumbas deixado pelo antigo Conselho dos Santos!"
34260-150 = "E-esta página?#nTá bem estragada, a descoloração tá feia, mas……."
34260-151 = "Sim, foi por isso que eu vim até aqui.#nA chamada maga da Biblioteca Antiga, Ui Kozeki……."
34260-152 = "U, ah, uu……."
34260-153 = "Você consegue restaurar este mapa, né?#nNão há tempo."
34260-158 = "Posso te pedir a restauração agora, ve-te-ra-na Ko-ze-ki?#nEu ajudo com todas as forças."
34260-159 = "U, uu…….#nPor que isso comigo……."
34260-163 = "Vamos, é pra já! A ruína mais próxima é aquela!"
34260-166 = "S-sim!"
34260-171 = "É-é que……!"
34260-172 = "Ué? Você é…… a Koharu……?"
34260-173 = "Ah, uu…… e-eu também sou do Comitê de Realização da Justiça, mas……#na-agora tô no Clube de Aulas de Reforço, então não posso sair em missão junto…… é que, veterana……."
34260-174 = "Isto…… entreguem àquela pessoa do Tea Party."
34260-180 = "……Que é isto?#nFitas e acessórios……?"
34260-181 = "É que…… são os pertences daquela pessoa que sobraram no depósito de itens apreendidos…… do Comitê de Realização da Justiça."
34260-182 = "Ah…… é verdade.#nEstes são os acessórios que a senhorita Mika colecionava."
34260-183 = "Ué, mas…… eu tinha ouvido que foram queimados no tumulto…… tavam no depósito?"
34260-184 = "Ah, é que…… do que sobrou do fogo, eu fui juntando escondido o que tava inteiro……#né-é que…… na regra, não pode…… mas……."
34260-185 = "……Sei.#nEntendido, Koharu."
34260-186 = "Vou avisar a senhorita Mika."
34260-187 = "Auu…… obrigada……."
34260-197 = "Gente……."
34260-198 = "Nós também não podemos seguir tomando emprestada a força do Sensei pra sempre.#nÉ acendendo uma luz no caminho dele que a relação se torna, de fato, ideal."
34260-199 = "Por isso…… eu vim te salvar, Mika."
34260-200 = "……Seia, continuo sem entender nada do que você fala.#nE toda pomposa; me irrita do fundo da alma."
34260-204 = "Quantas vezes eu não quis te dar uma lição."
34260-205 = "――E, mesmo assim, eu te adoro, Seia."
34260-206 = "……Hã?"
34260-207 = "A Nagi é histérica demais!#nAliás, não conseguir largar o chá nem num lugar destes; não acha meio demais?"
34260-213 = "Vício em cafeína? Ou transtorno obsessivo?"
34260-214 = "――Mas é essa Nagi que eu adoro."
34260-216 = "N-não, isto é…… é o nervosismo……."
34260-217 = "……Hã?"
34260-222 = "Sim…… eu adoro as duas."
34260-223 = "Obrigada, vocês duas…… e me desculpem……."
34260-228 = "Mika……."
34260-229 = "……Não; quem deve se desculpar sou eu.#n……Perdão, Mika."
34260-230 = "Eu sempre quis me desculpar com você."
34260-231 = "Mas uma teimosia infantil atrapalhava, e eu nunca consegui……."
34260-232 = "Mika…… quando você falou em se reconciliar com a Arius, eu……."
34260-233 = "Não, não diz mais nada…… tá tudo bem."
34260-234 = "Me desculpa…… a errada fui eu……."
34260-235 = "Mika……."
34260-236 = "Mika……."
34260-243 = "A-ah, é que…… desculpa cortar o clima bonito……#nmas tem uma coisa que a gente quer entregar à senhorita Mika."
34260-244 = "Pra mim……?"
34260-245 = "Isto……."
34260-249 = "……Isto é."
34260-253 = "Os meus…… acessórios……?#nHã, como? Era pra ter queimado tudo……!?"
34260-254 = "Ah, é que…… a encarregada da sala de itens apreendidos……"
34260-255 = "Hmm, é difícil de explicar, mas……"
34260-256 = "essa menina parece que guardou os acessórios da senhorita Mika que sobraram do fogo."
34260-257 = "A Koharu……?"
34260-258 = "Sim, a Koharu…… peraí,"
34260-259 = "hãã!?#nA senhorita conhecia a Koharu?"
34260-260 = "……Sim. Conheço."
34260-261 = "Obrigada, Koharu……#nsendo que eu fiz uma maldade com você……."
34260-266 = "……."
34260-271 = "……."
34260-272 = "[ns] \"É melhor vocês tirarem um tempo pra conversar bastante entre si, né.\""
34260-273 = "……Sim, parece que sim."
34260-274 = "Então, vamos indo?#nJá não há tempo até a audiência da Mika."
34260-275 = "Sim."
34260-276 = "Ié…… eu tenho mesmo que ir com esta roupa?"
34260-277 = "Eu queria trocar de roupa…… e tratar os machucados também.#nVou ficar diante de todo mundo, então preciso arrumar o cabelo de novo."
34260-281 = "……."
34260-282 = "……."
34260-283 = "Haa…… faz como quiser."
34260-284 = "Sim. Além disso, nós três viramos a noite; com esta aparência……."
34260-286 = "[ns] \"Eu vou junto.\""
34260-288 = "……Claro, Sensei.#nComparecer todos juntos à audiência é a nossa promessa, né."
34260-290 = "Próximo Episódio;Epílogo"
