[translation]
10010020-1 = "Episódio 2; Para a torre do mágico"
10010020-5 = "Com licença, você está aqui?"
10010020-6 = "……."
10010020-7 = "...Talvez ele esteja fora? Falando em Simiko-san, você sempre disse aqui..."
10010020-11 = "Tem alguém aqui...?"
10010020-15 = "...Huh?"
10010020-16 = "Está aberto, certo...?"
10010020-21 = "Com licença... posso entrar...?"
10010020-22 = "[s1] \"Consegui um ingresso, então acho que está tudo bem.\"\n[s2] \"Shimiko disse que está tudo bem.\""
10010020-23 = "Bem, então..."
10010020-24 = "Bem, então..."
10010020-25 = "Pensando bem, Simiko-san estava um pouco irritado. “A antiga biblioteca não é propriedade do presidente!” ele disse."
10010020-26 = "A Simiko deseja disponibilizá-lo para o maior número de pessoas possível?"
10010020-27 = "Hum, você está do outro lado...?"
10010020-33 = "...Ei! ?"
10010020-34 = "[s] \"...?\""
10010020-35 = "O que é essa voz...?"
10010020-36 = "Quem é, quem é? ? ladrão! ?"
10010020-37 = "Não, não, isso não é verdade! Não é um ladrão! !"
10010020-38 = "Definitivamente não sou uma pessoa suspeita! Eu até tenho um passe de entrada para esse lugar...!"
10010020-39 = "Ouvimos dizer que o presidente do comitê da biblioteca estava aqui...!"
10010020-41 = "...?"
10010020-42 = "P-por que...?"
10010020-43 = "[s3] \"Gostaria de solicitar a restauração de um determinado livro.\"\n[s4] \"Gostaria de pedir ajuda a um especialista em livros antigos.\""
10010020-44 = "Sim, entendo... A propósito, qual você acha...?"
10010020-45 = "Sim, entendo... A propósito, qual você acha...?"
10010020-46 = "Uma é como uma irmandade, mas a outra..."
10010020-48 = "Ah, desculpe pela introdução tardia."
10010020-49 = "Como você disse, sou Hinata da Irmandade. Esse é meu sensei..."
10010020-52 = "……sim?"
10010020-53 = "……\"sensei\"? O sensei está naquela placa de Petri...?"
10010020-54 = "Sensei... Sensei..."
10010020-55 = "Uh, hmm... entendo, senhor..."
10010020-67 = "[ns5] \"Ah, você saiu.\"\n[ns6] \"Prazer em conhecê-lo. Olá.\""
10010020-68 = "Olá..."
10010020-69 = "Olá..."
10010020-74 = "Bem, meu nome é Ui... sou o presidente do comitê da biblioteca que administra esta biblioteca de livros antigos..."
10010020-78 = "Então... por que a Senseia...?"
10010020-79 = "[s7] \"Desculpe por ter vindo tão de repente.\"\n[s8] \"Você é o \"Mágico da Biblioteca de Livros Antigos\", certo? \""
10010020-80 = "Não, isso é só, uh..."
10010020-81 = "Uh, uh... quem diria isso de novo...?"
10010020-82 = "Aquele ingresso para a Grande Biblioteca..."
10010020-83 = "Simiko... algo estranho de novo..."
10010020-84 = "De jeito nenhum... se eu tivesse algo para fazer, eu deveria ter vindo pessoalmente ou mandado outra criança..."
10010020-85 = "Se eu não disser algo severamente da próxima vez... bem, não acho que ele vai ouvir..."
10010020-86 = "... Me desculpe, não perguntei sobre isso. Não é que eu particularmente não goste de ter contato com Senseies..."
10010020-87 = "Quanto à irmã da porta ao lado..."
10010020-93 = "Bem, isso é verdade..."
10010020-94 = "\"Que\"! ? Talvez eu já tenha odiado na primeira vez que vi! ?"
10010020-95 = "Bem... não é porque fazemos parte de uma irmandade, mas eu diria que a maioria das pessoas lá fora são iguais..."
10010020-96 = "Além disso, abaixe um pouco o volume. Ressoa aqui..."
10010020-97 = "Eu-me desculpe...."
10010020-98 = "... Ufa. Enfim, vamos voltar ao assunto principal..."
10010020-99 = "Foi a restauração de um livro... talvez algum livro valioso...?"
10010020-103 = "……sim?"
10010020-104 = "O que, o que é isso? Parece que você tem algo preso nos dentes de trás..."
10010020-105 = "...A escritura “o que era”? O que é aquilo..."
10010020-106 = "[s] Mostre as escrituras quebradas."
10010020-112 = "...?"
10010020-113 = "……foto."
10010020-117 = "Ah... ah...! ?"
10010020-119 = "S-Sensei...? U-san, algo está errado com Ui-san...! ?"
10010020-120 = "Todo o meu corpo está tremendo, mas está tudo bem?...! ?"
10010020-125 = "[ns9] \"...Isso parece ruim.\"\n[ns10] Cubro meus ouvidos silenciosamente."
10010020-126 = "Sensei ――"
10010020-127 = "Sensei ――"
10010020-128 = "Naaaaaaaaaaaaaaaaa! ! ? ! ?"
10010020-129 = "Ei! ?"
10010020-131 = "Não, não, não, não, que diabos! ?"
10010020-132 = "O que, o que é isso! ? O que posso fazer para que isso aconteça? ? Por que essa criança ficou assim? ?"
10010020-133 = "U-san, por favor, acalme-se por um momento..."
10010020-134 = "Ah, acalme-se! ? acalmar! ? ! ? Você está olhando para isso e me dizendo para me acalmar? ?"
10010020-135 = "Por favor, não force! Como posso me acalmar quando vejo um estado tão abalado? ? Se puder, faça e me mostre. Você está calmo! ?"
10010020-136 = "Ah, e este é um livro antigo valioso que você pode perceber só de olhar para ele! É uma escritura antiga! ?"
10010020-137 = "É algo parecido com o usado nos antigos concílios! ?"
10010020-138 = "Mesmo que eu subestime isso, é um tesouro a nível escolar! ! ?"
10010020-139 = "Como uma criança assim poderia ser assim...? !"
10010020-140 = "[s11] \"Você pode dizer isso só de olhar...\"\n[s12] \"Como esperado de um especialista.\""
10010020-141 = "Eu-me desculpe…! No entanto, também tentamos consertá-lo de alguma forma..."
10010020-142 = "Eu-me desculpe…! No entanto, também tentamos consertá-lo de alguma forma..."
10010020-143 = "Eu sei o que significa \"consertar\"! ? Talvez você seja o tipo de pessoa que coloca um curativo em uma pessoa gravemente ferida? ? Não entendo o significado da palavra! ?"
10010020-144 = "Como uma coisa tão terrível pôde acontecer...! ! !"
10010020-145 = "O valor precioso dos registros contidos em cada página desta criança...!"
10010020-146 = "[s13] \"Hum, antes de tudo, respire fundo...\"\n[s14] \"Sinto muito. É por isso que queria perguntar ao mágico da antiga livraria.\""
10010020-147 = "...!"
10010020-148 = "...!"
10010020-152 = "Uh, hein..."
10010020-153 = "Ufa, então..."
10010020-154 = "Desculpe, eu só..."
10010020-155 = "Bem, em primeiro lugar... sim. Temos que reanimar esta criança. Não importa o que aconteça..."
10010020-156 = "Você poderia me contar a história novamente?"
10010020-157 = "Eu-eu me pergunto que tipo de criança é essa criança, onde ela foi descoberta e como ela ficou assim..."
10010020-158 = "Por favor, me dê todos os detalhes..."
10010020-159 = "[ns] Explique toda a história."
10010020-161 = "...É assim mesmo?"
10010020-169 = "não,"
10010020-170 = "Eu diria que ainda é difícil de acreditar, mas foi uma história tão chocante que eu não queria acreditar..."
10010020-171 = "Eu realmente sinto muito...."
10010020-172 = "...Bem, eu entendo que não é mentira. É o que a Senseia também diz."
10010020-173 = "Ou melhor... até amanhã de manhã..."
10010020-174 = "Como sempre, eu realmente não entendo o que as pessoas de fora pensam... sobre uma criança que só foi escavada há dois dias..."
10010020-175 = "Eles não tinham ideia do estado da criança, do estado de preservação ou das medidas de primeiros socorros que deveriam ser tomadas após a escavação."
10010020-179 = "As escrituras da Trinity foram tratadas com certo grau de durabilidade, mesmo que sejam antigas."
10010020-180 = "No entanto, sempre há exceções e elas não são óbvias à primeira vista. Não importa sua aparência externa, existem crianças com doenças graves no fundo."
10010020-181 = "Portanto, assim que você encontrar um livro antigo como este, será necessário verificá-lo de várias maneiras."
10010020-182 = "...Parece que eles não fizeram isso. Bem, acho que parecia normal."
10010020-183 = "A julgar por este estado... esta criança provavelmente não foi tratada para durar."
10010020-184 = "Por ter sido feito de materiais especiais e num ambiente especial, sobreviveu muitos anos quando deveria estar deteriorado. Bem, de repente foi retirado..."
10010020-187 = "Então, a corrosão progrediu rapidamente..."
10010020-188 = "...Se eu tivesse que dizer isso, mesmo que você não tivesse quebrado... provavelmente teria quebrado em algumas semanas."
10010020-190 = "Ah, é isso..."
10010020-191 = "Talvez o responsável tenha tido a ideia de que “desde que seja seguro até ser liberado, não me importa o que aconteça depois disso”."
10010020-192 = "Você provavelmente nem pensou nisso. O princípio usual de não fazer nada e não interferir."
10010020-193 = "...De qualquer forma. Se as coisas chegaram a este ponto, falando francamente, quase não há esperança para esta criança."
10010020-194 = "Normalmente, o reparo seria impossível."
10010020-195 = "[s15] \"Entendo...\"\n[s16] \"...Sinto muito, de repente eu disse algo irracional.\""
10010020-201 = "...Se for normal."
10010020-202 = "...?"
10010020-203 = "[s] \"Isso significa...\""
10010020-205 = "Bem, bem... não posso simplesmente deixar isso pra lá..."
10010020-206 = "O valor do conteúdo dessa criança não pode ser jogado fora..."
10010020-207 = "Bem, isso é certamente uma escritura..."
10010020-208 = "...Isso não é tudo. Por favor, pense nisso, ok?"
10010020-214 = "A cerimônia patrocinada pela Irmandade não foi numa catedral, mas numa “antiga igreja suburbana”..."
10010020-215 = "Não vamos dizer de jeito nenhum: “É uma relíquia antiga, então vamos fazer isso em uma ruína antiga”, certo? Além disso, por que você está se esforçando para convidar as pessoas dos escalões superiores da Trinity?"
10010020-216 = "...Como sempre, sinto que há outra história estranha por trás disso."
10010020-219 = "E quem transporta as escrituras é uma irmã que não sabe ler as escrituras..."
10010020-220 = "Está tudo igual de sempre, ainda não entendi. Não tenho certeza, mas sinto que há algo por trás disso."
10010020-222 = "Você não saberá os detalhes a menos que olhe, mas tenho certeza de que contém informações importantes. Eu entendo isso. e……"
10010020-223 = "[s] \"Você realmente não quer que alguém leia o conteúdo?\""
10010020-224 = "...Eu acho que sim. Bem, não sei até que ponto isso é segredo."
10010020-225 = "Talvez possamos aprender algo sobre a história não contada de Trinity..."
10010020-231 = "\"...\"\".\""
10010020-232 = "……sim?"
10010020-233 = "[s] \"cola de água...?\""
10010020-235 = "sim. Você precisará de “cola de musgo esfagno” e “remédio sagrado”. Para restaurar este livro."
10010020-236 = "Você provavelmente pode conseguir “remédio sagrado” no hospital."
10010020-237 = "\"Cola de musgo Sphagnum\" não é algo que possa ser obtido recentemente nos dias de hoje. No entanto, é provavelmente usado para caixilhos de janelas em edifícios antigos."
10010020-238 = "Bem, este prédio também é assim... mas não quero derrubá-lo."
10010020-239 = "De qualquer forma, se você puder trazê-lo para mim... vou derreter o material e restaurá-lo de alguma forma."
10010020-240 = "Ui-san...! !"
10010020-241 = "...ou não me interpretem mal. Não sei nada sobre as circunstâncias da Irmandade ou as histórias da alta administração."
10010020-242 = "É que... não posso deixar esta criança preciosa desaparecer assim. Além disso, também é um pedido da Senseia..."
10010020-248 = "Por favor, fique tranquilo. Normalmente seria impossível, mas... meus braços não são normais."
10010020-249 = "[s17] \"Obrigado, Ui.\"\n[s18] \"Vou encontrá-lo em breve.\""
10010020-250 = "Ha, sim... então é assim."
10010020-251 = "Ha, sim... então é assim."
10010020-253 = "……um. Bem, mais uma coisa."
10010020-255 = "...?"
10010020-256 = "O bolo de edição limitada ``Miracle 5000''...Acho que é vendido ao longo do Rio Solut. De qualquer forma, compre primeiro."
10010020-257 = "...É um bolo?"
10010020-258 = "Bem, o açúcar é necessário para o trabalho..."
10010020-259 = "Eu vejo……?"
10010020-260 = "Bem, de certa forma, é também um material necessário para restaurar o livro... você quer dizer?"
10010020-261 = "……."
10010020-262 = "...Por favor, se apresse."
10010020-264 = "Ah, sim...!"
10010020-266 = "Eu irei rápido...!"