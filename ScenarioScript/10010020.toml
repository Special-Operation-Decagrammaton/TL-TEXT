[translation]
10010020-1 = "第2話;魔術師の塔へ"
10010020-5 = "すみません、いらっしゃいますかー……？"
10010020-6 = "……。"
10010020-7 = "……留守、なのでしょうか？シミコさんのお話ですと、いつもここにと仰ってましたが……。"
10010020-11 = "どなたか、いらっしゃいますか……？"
10010020-15 = "……あれ？"
10010020-16 = "開いてます、ね……？"
10010020-21 = "失礼しまーす……これ、入っても大丈夫なのでしょうか……？"
10010020-22 = "[s1] \"入館証は貰ったんだし、大丈夫じゃないかな。\"\n[s2] \"シミコが大丈夫って言ってたし。\""
10010020-23 = "そ、そうですね、では……。"
10010020-24 = "そ、そうですね、では……。"
10010020-25 = "そういえばシミコさん、ちょっとだけ怒ってましたね。「古書館は委員長の所有物じゃないので！」と……。"
10010020-26 = "シミコさんとしては、多くの方が利用できるようにしたい……という感じなのでしょうか？"
10010020-27 = "えっと、向こうの方にいらっしゃるんですかね……。"
10010020-33 = "……ひいぃっ！？"
10010020-34 = "[s] \"……？\""
10010020-35 = "こ、この声は……？"
10010020-36 = "なっ、だっ、だだだ誰ですか！？泥棒！？"
10010020-37 = "い、いえ違います！泥棒ではありません！！"
10010020-38 = "決して怪しい者ではないです！ちゃんとここの入館証も持ってますし……！"
10010020-39 = "私たちはその、こちらに図書委員会の委員長がいらっしゃると聞いて……！"
10010020-41 = "……？"
10010020-42 = "ど、どうしてです……？"
10010020-43 = "[s3] \"とある本について、復元をお願いしたくって。\"\n[s4] \"古書の専門家の手を借りたくって。\""
10010020-44 = "そう、ですか……ところで今さらですが、どちら様で……？"
10010020-45 = "そう、ですか……ところで今さらですが、どちら様で……？"
10010020-46 = "片方はシスターフッドのようですが、もうひとりは……。"
10010020-48 = "あ、紹介が遅れてごめんなさい。"
10010020-49 = "仰る通り、私はシスターフッド所属のヒナタです。こちらは先生で……"
10010020-52 = "……はい？"
10010020-53 = "……「先生」？先生ってあの、シャーレの……？"
10010020-54 = "先生……先生……。"
10010020-55 = "う、うーん……なるほど、先生……。"
10010020-67 = "[ns5] \"あっ、出てきてくれた。\"\n[ns6] \"初めまして、こんにちは。\""
10010020-68 = "こ、こんにちは……。"
10010020-69 = "こ、こんにちは……。"
10010020-74 = "えっと、私は[ruby=こぜき]古関[/ruby]ウイ……この古書館の管理をしている、図書委員会の委員長、です……。"
10010020-78 = "それで、その……先生がどうして……。"
10010020-79 = "[s7] \"急に来ちゃってごめんね。\"\n[s8] \"「古書館の魔術師」さん、だよね？\""
10010020-80 = "いえ、それはまあ、えっと……。"
10010020-81 = "う、うぅ……また誰がそういう……。"
10010020-82 = "その入館証、大図書館の……。"
10010020-83 = "シミコか……また変なことを……。"
10010020-84 = "全く……用事があるなら自分が来るか、他の子でも送れば良いのに……。"
10010020-85 = "今度厳しく言っておかないと……まあ聞かないだろうけど……。"
10010020-86 = "……すみません、今のは聞かなかったことに。その、特に先生と接点を持つのが嫌とかでは、ないので……。"
10010020-87 = "隣のシスターの方は……"
10010020-93 = "まあ、アレですが……。"
10010020-94 = "「アレ」！？私もしかして、初見ですでに嫌われてます！？"
10010020-95 = "それは、まあ……別にシスターフッドだからというわけではないですが、外の方々は大体一緒と言いますか……。"
10010020-96 = "あと、もう少し声量を抑えてください。ここ、響くので……。"
10010020-97 = "す、すみません……。"
10010020-98 = "……ふぅ。と、とりあえず本題に戻りますか……。"
10010020-99 = "本の復元、でしたっけ……何か貴重な本でも……？"
10010020-103 = "……はい？"
10010020-104 = "な、何ですかその、奥歯にものが挟まったような物言いは……。"
10010020-105 = "……経典「だったもの」？それは一体……"
10010020-106 = "[s] 粉々になった経典を見せる。"
10010020-112 = "……？"
10010020-113 = "……え。"
10010020-117 = "あ……あぁ……！？"
10010020-119 = "せ、先生……？う、ウイさんが何だか大変なことに……！？"
10010020-120 = "全身が震えてますけど、大丈夫でしょうか……！？"
10010020-125 = "[ns9] \"……マズそう。\"\n[ns10] 静かに耳を塞ぐ。"
10010020-126 = "せんせ――"
10010020-127 = "せんせ――"
10010020-128 = "なああああぁぁぁぁぁぁぁぁぁぁっ！！？！？"
10010020-129 = "ひいぃっ！？"
10010020-131 = "い、いいいいい一体何てことを！？"
10010020-132 = "な、何ですかこれは！？何をどうしたらこうなるんですか！？どうしてこの子こんな状態になったんですか！？"
10010020-133 = "う、ウイさん、一旦落ち着いていただいて……"
10010020-134 = "お、落ち着く！？落ち着く！？！？これを見て「落ち着け」と言ってるんですか！？"
10010020-135 = "無理言わないでください！こんな粉々状態を見せられてどうやって落ち着けと！？できるならやって見せてくださいよいえそっちは冷静ですね！？"
10010020-136 = "そ、それにこの子、パッと見ただけで分かるくらいの貴重な古書じゃないですか！古代の経典ですよね！？"
10010020-137 = "太古の公会議で使われてたような代物ですよ！？"
10010020-138 = "こんなの少なく見積もっても、学園レベルでの宝物じゃないですか！！？"
10010020-139 = "そんな子を、どうしてこんな姿に……！！"
10010020-140 = "[s11] \"一目見ただけでそこまで分かるんだね……。\"\n[s12] \"流石は専門家。\""
10010020-141 = "ご、ごめんなさい……！ですがその、私たちも何とか修復しようと……"
10010020-142 = "ご、ごめんなさい……！ですがその、私たちも何とか修復しようと……"
10010020-143 = "「修復」の意味知ってます！？もしかしたらあなた、重傷者に絆創膏を張るタイプですか！？言葉の意味分かってないんです！？"
10010020-144 = "ど、どうしてこんな酷いことが……！！！"
10010020-145 = "この子が持つ、ページ一枚一枚に込められていた記録の、貴重な価値が……！"
10010020-146 = "[s13] \"あの、まず深呼吸を……。\"\n[s14] \"本当にごめん。だからこそ、古書館の魔術師にお願いしたくって。\""
10010020-147 = "……っ！"
10010020-148 = "……っ！"
10010020-152 = "ふう、ふぅ……。"
10010020-153 = "ふぅ、すーっ……。"
10010020-154 = "し、失礼しました、つい……。"
10010020-155 = "そ、そうですね、まずは……はい。この子を蘇生させないとですね。何としてでも……。"
10010020-156 = "あらためて、その……け、経緯を聞かせてもらえますか？"
10010020-157 = "こ、この子がどんな子なのか、どこで発掘されてどうしてこうなったのか……。"
10010020-158 = "ひとつ残らず、しょ、詳細にお願いします……。"
10010020-159 = "[ns] 一部始終を説明する。"
10010020-161 = "……そうでしたか。"
10010020-169 = "い、いえ、"
10010020-170 = "未だに信じがたいと言いますか、信じたくないほど呆れた話ではありましたが……。"
10010020-171 = "本当にすみません……。"
10010020-172 = "……ま、まあ、嘘ではないのは理解しました。先生もこう言ってることですし。"
10010020-173 = "それより……明日の朝まで、ですか……。"
10010020-174 = "相変わらず、外の方々の考えはよく分かりません……発掘してから2日しか経っていない子を……。"
10010020-175 = "この子のコンディションや保存状態、発掘してから施すべき応急処置など眼中に無い、と……。"
10010020-179 = "トリニティの経典たちは、古い子でもある程度しっかりした耐久処理が為されています。"
10010020-180 = "ですが例外というのはいつも存在しますし、それは一目見て分かることではありません。見た目がどうであれ、心の中では深刻な病を患った子だって存在します。"
10010020-181 = "ですのでこういった古書は、見つけ次第すぐに様々な確認が必要……なはず、だというのに。"
10010020-182 = "……そうしなかったようですね。まあ見た目が普通だったのでしょう。"
10010020-183 = "こ、この状態から考えると……この子は実のところ、耐久処理が為されてなかったのでしょう。"
10010020-184 = "特殊な素材且つ特殊な環境にあったことで、本来は朽ちても仕方ない年月を経ても無事だった。そ、それが急に外に出されて……。"
10010020-187 = "そして、急激に腐食化が進み……。"
10010020-188 = "……強いて言うのであれば、そこのあなたが壊さなかったとしても……おそらく、数週間も経たずに壊れていたでしょう。"
10010020-190 = "そ、そんな……。"
10010020-191 = "もしかしたら担当者は、「公開するまで無事なら、その後のことはどうでも良い」……という発想だったのかもしれませんが。"
10010020-192 = "おそらく、そこまでは考えもしなかったでしょう。いつもの事なかれ主義、そして不干渉。"
10010020-193 = "……それはともかく。ここまでの状態になってしまうと、単刀直入に言ってこの子にはもうほとんど望みがありません。"
10010020-194 = "普通なら修復は、まず不可能でしょう。"
10010020-195 = "[s15] \"そっか……。\"\n[s16] \"……ごめんね、急に無茶なことを言って。\""
10010020-201 = "……普通なら、です。"
10010020-202 = "……？"
10010020-203 = "[s] \"つまり……。\""
10010020-205 = "ま、まあ……放っておくというわけにもいきませんし……。"
10010020-206 = "この子が持っている内容の価値は、おいそれと捨てられるものではありません……。"
10010020-207 = "そ、それは確かに、経典ですし……。"
10010020-208 = "……それだけではありません。考えてもみてくださいよ？"
10010020-214 = "シスターフッド主催の式典、それが大聖堂ではなく「郊外の古い聖堂」で……"
10010020-215 = "「古代の遺物だから古代の遺跡でやりましょう」なんてお話なわけがないでしょう？それに、トリニティ上層部の方々をわざわざ呼ぶんですよね？"
10010020-216 = "……いつものことですが、また裏のある変な話が絡んでいそうな気がします。"
10010020-219 = "それに経典を移送するのが、経典を読めないシスター……"
10010020-220 = "何から何までいつも通りです、相変わらずよく分かりません。よく分からないですが裏がありそうな感じです。"
10010020-222 = "詳しい内容は見てみないと分かりませんが、まあきっと重要な内容が書かれているのでしょう。それは分かります。そして……"
10010020-223 = "[s] \"あんまりその中身を、誰にも読ませたくない？\""
10010020-224 = "……でしょうね。まあ、どの程度の秘密なのかは分かりかねますが。"
10010020-225 = "トリニティの明かされていない歴史、それについて何かが分かる……かもしれませんね。"
10010020-231 = "……「[ruby=みずごけにかわ]水苔膠[/ruby]」。"
10010020-232 = "……はい？"
10010020-233 = "[s] \"「みずごけにかわ」……？\""
10010020-235 = "はい。「水苔膠」、そして「精聖薬」が必要です。この本を復元するために。"
10010020-236 = "「精聖薬」はおそらく、病院で手に入るでしょう。"
10010020-237 = "「水苔膠」は……今の時代に、新たに手に入るものではありません。ただ、古い建物の窓枠などには使われているはずです。"
10010020-238 = "こ、この建物もまあ、そうなのですが……ここを壊すのは嫌なので。"
10010020-239 = "と、とにかくそれを、持ってきていただけたら……その材料を溶かして、何とか復元させます。"
10010020-240 = "ウイさん……！！"
10010020-241 = "……か、勘違いしないでください。シスターフッドの事情や、上層部の方々の話など知ったことではありません。"
10010020-242 = "た、ただ……こんなにも貴重な子が、このまま消えてしまうの見過ごせないだけです。それに、先生の頼みでもありますし……。"
10010020-248 = "ご安心ください。普通なら無理ですが……私の腕は普通では、ないので。"
10010020-249 = "[s17] \"ありがとう、ウイ。\"\n[s18] \"すぐに見つけてくるね。\""
10010020-250 = "は、はい……では、そんな感じで。"
10010020-251 = "は、はい……では、そんな感じで。"
10010020-253 = "……あ。も、もう一つ。"
10010020-255 = "……？"
10010020-256 = "限定ケーキの「ミラクル5000」……ソルート川沿いに売ってるはずですので。とにかく真っ先に買ってきてください。"
10010020-257 = "……け、ケーキですか？"
10010020-258 = "さ、作業には、糖分が必要なので……。"
10010020-259 = "なるほど……？"
10010020-260 = "えっと、つまりはそれもある意味、本の復元のために必要な材料……ということですか？"
10010020-261 = "……。"
10010020-262 = "……急いでください。"
10010020-264 = "は、はい……！"
10010020-266 = "急いで行ってきます……！"
