[translation]
10045010-1 = "Episódio 1; Começa! O Festival Aquático de Hyakkiya!"
10045010-3 = "Olá a todos! Finalmente este dia chegou!"
10045010-4 = "O grande evento de verão organizado pelo Comitê Executivo do Festival...!"
10045010-5 = "O Festival Aquático de Hyakkiya... está oficialmente aberto!"
10045010-9 = "Obrigada pelos aplausos calorosos, nyan-nyan!"
10045010-10 = "O Festival Aquático de Hyakkiya é uma batalha de sobrevivência onde 100 competidores devem completar várias missões até que reste apenas um!"
10045010-11 = "O vencedor receberá um prêmio em dinheiro e um vale-presente da Hyakkiyadou!#nAlém disso! Um menu especial e limitado da Hyakkiyadou será oferecido!"
10045010-12 = "Ora, ora? Estou ouvindo vozes...#nO que foi? Estão perguntando se não tem problema em ser tão generosa?"
10045010-13 = "Não se preocupem! Se todos se divertirem até o fim, esse é o maior lucro que poderíamos ter...!"
10045010-18 = "Agora... vamos apresentar o convidado especial que chamei para ser o comentarista!"
10045010-19 = "Ele é... a luz de Kivotos que continua apoiando as alunas, dia e noite!"
10045010-20 = "Às vezes rigoroso, às vezes gentil... sua reputação ecoa pelos céus!#nHoje em dia, é difícil encontrar alguém que não o conheça—"
10045010-21 = "É o Sensei do Schale! Todos, recebam-no com uma salva de palmas!"
10045010-26 = "[ns] \"Bem, olá a todos. Eu sou o [USERNAME].\""
10045010-27 = "Sensei! Por favor, anime-se mais!#nEu não pedi para você terminar a frase com \"nyan-nyan\"?!"
10045010-28 = "[ns1] \"Eu sou o Sensei, wan-wan!\"\n[ns2] \"Eu sou o Sensei, kon-kon!\""
10045010-31 = "Não é \"nyan-nyan\"...!?#nO Sensei de hoje está em um modo totalmente imprevisível!"
10045010-32 = "Bem, com o Sensei nos observando!#nQuem será que vai conquistar a coroa da vitória?!"
10045010-33 = "[s] \"Com tantos competidores talentosos, é impossível prever!\""
10045010-34 = "Recebemos a informação de que os competidores que estão se preparando estão com a energia lá no alto!#nA demora na preparação pode ser um sinal do entusiasmo deles~"
10045010-35 = "Então, por um breve momento, confiram os comerciais dos nossos patrocinadores!"
10045010-36 = "Não mudem de canal, nyan-nyan!"
10045010-37 = "……."
10045010-38 = "Estou exausta... Ser mestre de cerimônias de um evento realmente exige muita energia..."
10045010-39 = "[s] \"Shizuko! O microfone, o microfone!\""
10045010-40 = "Hã...?#nAh, droga! Ops, que descuido!"
10045010-41 = "A Shizuko é meio desastrada, então... foi sem querer!#nMe desculpem...!"
10045010-42 = "Pessoal! Por favor, continuem torcendo para que a Shizuko consiga dar o seu melhor até o fim!"
10045010-43 = "Então, voltando aos comerciais! Nyan-nyan!"
10045010-45 = "……Bom trabalho."
10045010-46 = "Você acha? Eu achei que tinha cometido um erro..."
10045010-47 = "Não tem como ter sido um erro."
10045010-48 = "Aquilo foi uma encenação para promover a sua \"personagem desastrada\"."
10045010-49 = "Animar o ambiente e promover a si mesma ao mesmo tempo..."
10045010-50 = "Além disso, se ela cometer um erro depois, ela criou uma atmosfera onde as pessoas vão relevar por ela ser desastrada."
10045010-51 = "Como esperado da garota-propaganda da Hyakkiyadou."
10045010-52 = "Entendo... Como esperado da Kikyou, você é inteligente."
10045010-53 = "Mas não pretendo perder, viu?"
10045010-54 = "Não é hora de brigar entre nós, certo?#nExistem muitos outros oponentes com quem se preocupar."
10045010-62 = "De fato, há muitos especialistas aqui... Estou tremendo de empolgação!"
10045010-63 = "Sim, não podemos baixar a guarda."
10045010-65 = "E então, qual será a competição?"
10045010-66 = "Parece que as modalidades serão anunciadas pouco antes da competição começar.#nAcho que a capacidade de adaptação também está sendo testada."
10045010-67 = "(Contanto que não seja uma prova de natação...)"
10045010-69 = "Algum tempo depois..."
10045010-71 = "Pessoal, obrigado por esperarem!"
10045010-72 = "Finalmente, a primeira rodada do \"Festival Aquático de Hyakkiya\" vai começar!"
10045010-73 = "Qual será a modalidade que todos estão curiosos para saber~!?#nSensei! Por favor!"
10045010-74 = "[ns] \"A primeira modalidade do Festival Aquático de Hyakkiya é...!\""
10045010-76 = "[log]Batalha de Sobrevivência com Armas de Água![/log]"
10045010-79 = "[ns3] \"As regras são simples! Se molhar, está fora!\"\n[ns4] \"Sair da área delimitada também é desclassificação!\""
10045010-82 = "Uma batalha feroz se desenrola em uma praia sem lugar para onde fugir!#nDe repente, vejam só! Apenas 30 pessoas poderão sobreviver!"
10045010-83 = "Quem será que conseguirá ficar de pé até o fim!?"
10045010-84 = "[ns] \"Competidores, por favor, dirijam-se à praia, nyan-nyan!\""
10045010-86 = " A mestre também está bem animada, hein..."
10045010-87 = "Primeiro, vou verificar a situação do campo."
10045010-88 = "(Ainda bem que não é uma competição de entrar no mar...)"
10045010-91 = "Oh... quase não tem onde se esconder."
10045010-92 = "É uma batalha na praia onde protegemos as costas umas das outras!?#nParece um filme!"
10045010-93 = "A realidade não é tão fácil quanto nos filmes, mas..."
10045010-94 = "Estou ansiosa para ver a Nagusa-senpai dando tudo de si!"
10045010-98 = "Meu braço direito ainda não está 100%, mas..."
10045010-99 = "Vou fazer o que estiver ao meu alcance."
10045010-100 = "Afinal, o selo foi quebrado."
10045010-102 = "Essa frase... é vergonhosa, então não diga isso na frente dos outros."
10045010-106 = "[ns] \"Oh, parece que vocês estão bem motivadas.\""
10045010-107 = " Sensei! Quanto tempo!"
10045010-108 = "Por que o Sensei está aqui?"
10045010-109 = "[s] \"Porque é mais interessante ver de perto.\""
10045010-111 = "......Você quer dizer que quer ver as alunas de roupa de banho de perto?"
10045010-112 = "Você é realmente..."
10045010-113 = "[s5] \"É, é um mal-entendido...!\"\n[s6] \"N-não é nada disso, sabe?\""
10045010-116 = "Conversar é bom, mas parece que vai começar agora."
10045010-124 = "Pessoal! Estão prontas?#n...Entendo, entendo~ parece que a animação está no máximo!"
10045010-125 = "Então, a primeira rodada do Festival Aquático de Hyakkiyakou!#nO jogo de sobrevivência com arminhas d'água—"
10045010-126 = "[ns] \"Comecem!!\""
10045010-130 = "O Festival Aquático de Hyakkiyakou finalmente começou!#nQuem será que vai passar pela primeira rodada...!?"
