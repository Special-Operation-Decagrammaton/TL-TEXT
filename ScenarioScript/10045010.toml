[translation]
10045010-1 = "第1話;開幕！百夜水上祭！"
10045010-3 = "皆さん、こんにちは～！ついにこの日がやってきました！"
10045010-4 = "お祭り運営委員会が主催する夏の一大イベント……！"
10045010-5 = "百夜水上祭……ここに開幕ですっ！"
10045010-9 = "熱い声援、ありがとうございます、にゃんにゃん！"
10045010-10 = "百夜水上祭は、100人の選手たちがさまざまなミッションをクリアしながら、最後の一人を目指すサバイバルバトルっ！"
10045010-11 = "優勝者には賞金と百夜堂のタダ券！#nさらに！百夜堂の特別限定メニューが贈呈されます！"
10045010-12 = "おやおやぁ？声が聞こえてきますねぇ……。#nなになに……そんなに大盤振る舞いしちゃって大丈夫かって？"
10045010-13 = "心配ご無用っ！皆さんが最後まで楽しんでくれれば、それが何よりの利益ですから……！"
10045010-18 = "ここで……解説にお呼びしたスペシャルゲストをご紹介しましょう！"
10045010-19 = "その方こそ……昼夜を問わず、生徒たちを支え続けるキヴォトスの光！"
10045010-20 = "時に厳しく、時に優しく……天に轟くその評判！#nいまや知らぬ者を探す方が難しい――"
10045010-21 = "シャーレの先生です！皆さん、盛大な拍手でお迎えください！"
10045010-26 = "[ns] \"えー、皆さん、こんにちは。[USERNAME]です。\""
10045010-27 = "先生！もっとテンションを上げてください！#n語尾に「にゃんにゃん」をつけて欲しいってお願いしたじゃないですか！"
10045010-28 = "[ns1] \"先生です、ワンワン！\"\n[ns2] \"先生です、コンコン！\""
10045010-31 = "「にゃんにゃん」じゃない……！？#n今日の先生、まさかの予測不能モードです！"
10045010-32 = "さぁ、そんな先生も見守るなか！#n勝利の栄冠を手にするのは、一体誰なのか！"
10045010-33 = "[s] \"実力者ぞろいで、まったく予想がつきませんね！\""
10045010-34 = "準備中の選手たちは、ボルテージが最高潮との情報が入っています！#n準備が少し遅れているのは、熱意の表れかもしれませんね～"
10045010-35 = "なので、ここからは少しの間、スポンサーからのCMをご覧ください！"
10045010-36 = "チャンネルはそのままで、にゃんにゃん！"
10045010-37 = "……。"
10045010-38 = "疲れたぁ……。やっぱりイベントの司会って体力使うわぁ……。"
10045010-39 = "[s] \"シズコ！マイク、マイク！\""
10045010-40 = "え……？#nわ、あわわっ！てへぺろ～！"
10045010-41 = "シズコ、おっちょこちょいだから……うっかりうっかり！#nごめんなさぁい……！"
10045010-42 = "皆さん！最後までシズコが頑張れるように、応援お願いしますね！"
10045010-43 = "では改めてCMです！にゃんにゃん！"
10045010-45 = "……良い手際だね。"
10045010-46 = "そうか？アタシはミスだと思ったけど……。"
10045010-47 = "そんなわけないでしょう。"
10045010-48 = "あれは、自分の「ドジっ子キャラ」をアピールするための演出。"
10045010-49 = "場を盛り上げることと、自分のアピールを同時に達成する……。"
10045010-50 = "しかも、もしこの後ミスをしたとしても、それはドジっ子だから、と大目に見てもらえる空気を作った。"
10045010-51 = "さすがは百夜堂の看板娘。"
10045010-52 = "なるほど……さすがキキョウ、頭いいなぁ。"
10045010-53 = "でも、負けるつもりはないからな？"
10045010-54 = "身内で争ってる場合じゃないでしょ？#n気にすべき相手は他にも大勢いるんだから。"
10045010-62 = "たしかに猛者ぞろいですの……身共、武者震いして参りましたわ！"
10045010-63 = "うん、油断は禁物だね。"
10045010-65 = "それで、競技って何をやるんだ？"
10045010-66 = "種目は競技の直前に発表されるみたい。#n対応力も試されてるんだろうね。"
10045010-67 = "（泳ぐ種目さえこなければ……）"
10045010-69 = "しばらくして……。"
10045010-71 = "皆さん、お待たせしました！"
10045010-72 = "いよいよ、「百夜水上祭」の第一回戦が始まります！"
10045010-73 = "気になるその種目は～！？#n先生！どうぞ！"
10045010-74 = "[ns] \"百夜水上祭、最初の種目は……！\""
10045010-76 = "[log]水鉄砲サバイバルゲーム！[/log]"
10045010-79 = "[ns3] \"ルールは簡単！濡れたら即脱落！\"\n[ns4] \"フィールドの外へ出ても失格だよ！\""
10045010-82 = "逃げ場のないビーチで繰り広げられる、熾烈なバトル！#nいきなりですが、なんと！生き残れるのは30人まで！"
10045010-83 = "最後まで立っていられるのは一体誰になるのか！？"
10045010-84 = "[ns] \"選手の皆さんはビーチへ移動してください、にゃんにゃん！\""
10045010-86 = " 師匠もテンション上がってんなぁ……。"
10045010-87 = "まずはフィールドの状況を把握しに行くよ。"
10045010-88 = "（海に入る競技じゃなくて良かった……）"
10045010-91 = "おぉ……隠れられるものがほとんどないな。"
10045010-92 = "び～ちで背中を預けあいながら戦うぱた～んですの！？#n映画みたいですの！"
10045010-93 = "現実は映画ほど甘くはないけどね……。"
10045010-94 = "ふるぱわ～なナグサ先輩のご活躍も楽しみですわ！"
10045010-98 = "右腕はまだ本調子じゃないけど――"
10045010-99 = "できるだけのことはやってみるよ。"
10045010-100 = "封印は解かれたからね。"
10045010-102 = "その台詞……恥ずかしいから、あんまり人前では言わないで。"
10045010-106 = "[ns] \"おっ、気合十分みたいだね。\""
10045010-107 = " 先生！お久しぶりですの！"
10045010-108 = "どうして先生がこちらにいらっしゃるんですの？"
10045010-109 = "[s] \"近くで見た方が面白いからね。\""
10045010-111 = "……水着姿の生徒を近くで見たい、ってこと？"
10045010-112 = "あんたって、本当に……。"
10045010-113 = "[s5] \"ご、誤解だよ……！\"\n[s6] \"そ、そんなわけないよ？\""
10045010-116 = "おしゃべりもいいけど、そろそろ始まるみたいだよ。"
10045010-124 = "皆さ～ん！準備はいいですか～？#n……なるほどなるほど～テンションマックスみたいですね！"
10045010-125 = "それでは、百夜水上祭の第一回戦！#n水鉄砲サバイバルゲーム――"
10045010-126 = "[ns] \"始めっ――！！\""
10045010-130 = "ついに開幕した百夜水上祭！#n果たして第一回戦を突破するのは……！？"
