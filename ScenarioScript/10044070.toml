[translation]
10044070-1 = "Episódio 7; O trem, o Sensei e a garota de cabelos prateados"
10044070-2 = "Ei, você aí, trem!"
10044070-3 = "[ns] \"Essa voz é...\""
10044070-7 = "Este é o distrito de Gehenna! Não vou permitir mais nenhuma confusão aqui!"
10044070-8 = "[ns] \"IORI!!!\""
10044070-9 = "……？"
10044070-10 = "Hã?"
10044070-11 = "Se, Sensei!? Por que você está aqui!?"
10044070-12 = "[s1] \"É uma longa história...!\"\n[s2] \"Eu explico depois, mas pode me ajudar?\""
10044070-18 = "O Sensei e um trem!? #nDe novo!?"
10044070-19 = "Haa... Em que tipo de encrenca você se meteu desta vez?"
10044070-20 = "[s3] \"Como esperado da Iori! É uma ajuda e tanto você entender rápido!\"\n[s4] \"Se você me ajudar, eu lambo seus pés ou qualquer coisa!!\""
10044070-23 = "Se, seu idiota! Seu pervertido! Morra!!"
10044070-24 = "Bom, de qualquer forma, vou querer ouvir a explicação depois..."
10044070-25 = "……。"
10044070-26 = "…………。"
10044070-27 = "Haa... Eu sei que isso só vai trazer problemas...!"
10044070-29 = "Se, Sensei... Você também conhece as alunas de Gehenna..."
10044070-30 = "Sensei, você já lambeu os pés de alguém?"
10044070-31 = "Será que você queria lamber os nossos também? Pahyá!"
10044070-34 = "Quebrem o teto!"
10044070-35 = "Tomem a cabine do maquinista!"
10044070-43 = "Ah...! Já chegaram até aqui...!"
10044070-44 = "Cheguei primeiro."
10044070-49 = "Pahyahyá! Acho que vocês deveriam levar isso um pouco mais a sério, não?"
10044070-50 = "O, o que eu faço...!!"
10044070-57 = "Gah! O, o que foi isso!?"
10044070-58 = "Droga! É o Comitê de Disciplina de Gehenna...!!"
10044070-64 = "Haa... Francamente..."
10044070-65 = "Você vai me explicar tudo depois!"
10044070-66 = "[ns5] \"Obrigado!!!\"\n[ns6] \"Como esperado da Iori!!\""
10044070-70 = "Pahyahyá! Você tem uma boa mira!"
10044070-71 = "Super legal, o salvador."
10044070-73 = "O, o que são esses caras..."
10044070-74 = "Vamos nos exercitar também!"
10044070-75 = "I, isso está fora do meu escopo de trabalho...!"
10044070-77 = "Sensei, por favor, assuma o comando!!"
