[translation]
10044070-1 = "第7話;列車と先生と銀髪の少女"
10044070-2 = "おい、そこの列車！"
10044070-3 = "[ns] \"この声は……。\""
10044070-7 = "ここはゲヘナ自治区だ！これ以上、ゲヘナでの騒ぎは許さないぞ！"
10044070-8 = "[ns] \"イオリ！！！\""
10044070-9 = "……？"
10044070-10 = "え？"
10044070-11 = "せ、先生！？なんでここに！？"
10044070-12 = "[s1] \"かくかくしかじかで……！\"\n[s2] \"あとで説明するから、助けてくれない？\""
10044070-18 = "先生と列車！？#nまた！？"
10044070-19 = "はぁ……今度は何に巻き込まれたんだ？"
10044070-20 = "[s3] \"さすがイオリ！話が早くて助かるよ！\"\n[s4] \"助けてくれたら、足でもなんでも舐めるから！！\""
10044070-23 = "ばっ、バカ！このヘンタイ！死ねっ！！"
10044070-24 = "いや、どっちみち事情は聞かせてもらうけどさ……。"
10044070-25 = "……。"
10044070-26 = "…………。"
10044070-27 = "はぁ……面倒事に決まってるのに……！"
10044070-29 = "せ、先生……ゲヘナの生徒とも面識があるんですね……。"
10044070-30 = "先生ー、足舐めたことあるのー？"
10044070-31 = "もしかして私らのも舐めたかったり？パヒャッ！"
10044070-34 = "屋根を破るぞ！"
10044070-35 = "乗務員室を占拠しろ！"
10044070-43 = "あわっ……！もうここまで……！"
10044070-44 = "一番乗りー。"
10044070-49 = "パヒャヒャッ！ちょっとは真面目にやらないとかな？"
10044070-50 = "ど、どうすれば……！！"
10044070-57 = "がはっ！なっ、なんだ！？"
10044070-58 = "くそっ！ゲヘナの風紀委員会か……！！"
10044070-64 = "はぁ……まったく……。"
10044070-65 = "あとで全部説明してもらうからな！"
10044070-66 = "[ns5] \"ありがとう！！！\"\n[ns6] \"さすがイオリ！！\""
10044070-70 = "パヒャヒャッ！いい腕してるじゃん！"
10044070-71 = "ちょーカッコいいー、きゅーせいしゅー。"
10044070-73 = "な、なんだ、こいつら……。"
10044070-74 = "私らも運動しよっか！"
10044070-75 = "ぎ、業務範囲外なんですけど……！"
10044070-77 = "先生、指揮をお願い！！"
