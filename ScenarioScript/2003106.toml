[translation]
2003106-1 = "De repente"
2003106-2 = "（Depois de chegar ao prédio antigo, a caminho de ver a fonte termal que Shigure reformou...）"
2003106-6 = "Falando nisso, Sensei..."
2003106-7 = "Você prefere tomar banho sozinho ou com outras pessoas?"
2003106-8 = "[s] \"Por que essa pergunta de repente...?\""
2003106-9 = "Ah, não tem um motivo especial...#nÉ que acabei de lembrar de algo que aconteceu antes."
2003106-10 = "Eu, pelo menos, gosto de tomar banho acompanhada."
2003106-11 = "Sabe, é divertido conversar com alguém enquanto estamos na água, não é?"
2003106-12 = "Mas aqui no prédio antigo, tem muita gente que prefere tomar banho sozinha."
2003106-13 = "Outro dia, quando a Nodoka estava tomando banho, tentei entrar escondida e ela disse:#n\"Não atrapalhe meu momento a sós\"."
2003106-14 = "[s1] \"Ambos têm seus prós e contras, mas...\"\n[s2] \"É que eu me assusto se alguém entrar de repente.\""
2003106-17 = "Entendi... É uma forma de pensar válida."
2003106-18 = "[s3] \"...Só para deixar claro.\"\n[s4] \"Mesmo que seja comigo, não pode entrar, entendeu?\""
2003106-21 = "...Eh? Não pode?"
2003106-22 = "Eu achei que seria uma chance de conhecer melhor o Sensei."
2003106-23 = "Além disso, quando estamos no banho,#nconseguimos conversar com mais sinceridade..."
2003106-24 = "[s5] \"Se for para conversar, eu te escuto a qualquer hora...\"\n[s6] \"Mas deixe-me aproveitar o banho sozinho.\""
2003106-27 = "............Que pena."
2003106-32 = "Ah, falando nisso. Eu ia beber um pouco de compota no banho, mas#nesqueci a garrafa."
2003106-33 = "Vou voltar ao prédio antigo rapidinho. Sensei, pode ir entrando?"
2003106-34 = "Já volto, então aproveite para relaxar."
2003106-35 = "[s] \"Sério, não entre, viu...?\""
2003106-37 = "（Depois de ver Shigure voltando para o prédio antigo, entrei na fonte termal）"
2003106-40 = "（A fonte termal estava bem cuidada e tinha um leve aroma de ervas）"
2003106-41 = "（Enquanto relaxava na água, em meio ao vapor branco...）"
2003106-49 = "[ns7] \"...Shigure? Voltou rápido.\"\n[ns8] \"E além disso, eu disse para não entrar.\""
2003106-52 = "............"
2003106-53 = "[ns] （Por causa do vapor, não consigo ver direito...）"
2003106-55 = "[ns] \"...De qualquer forma, fique quieto aí dentro.\""
2003106-56 = "（...Shigure me observava em silêncio do outro lado do vapor）"
2003106-57 = "（A silhueta parecia estar usando um casaco bem grosso...）"
2003106-61 = "[ns9] \"...Shigure, por acaso você entrou de roupa?\"\n[ns10] \"E seu corpo parece maior que o normal...\""
2003106-64 = "..."
2003106-69 = "[ns11] \"V-você acabou de beber a água da fonte!?\"\n[ns12] \"Não pode beber a água da banheira, não é higiênico!\""
2003106-72 = "Fuu, fuu..."
2003106-73 = "[ns] （...Por algum motivo, a voz parece mais grave）"
2003106-75 = "[ns] \"E-eu já vou saindo! Pode ficar aí relaxando!\""
2003106-78 = "（Saí da fonte termal apressadamente...）"
2003106-81 = "Ué, Sensei. Já saiu?"
2003106-82 = "...Que pena. Por pouco eu não cheguei a tempo."
2003106-83 = "[s13] \"Ué, Shigure? Você ainda não tinha entrado?\"\n[s14] \"Então, quem estava na fonte termal até agora...?\""
2003106-86 = "Hm? Tinha outra pessoa na fonte?"
2003106-87 = "...Ah, provavelmente era"
2003106-88 = "o urso que vive por aqui."
2003106-92 = "[ns] \"――Um urso!?\""
2003106-93 = "Sim. Desde a época em que operávamos o Resort Termal 227,#neu via um urso entrando na fonte ao ar livre de vez em quando."
2003106-94 = "Acho que ele gostou, porque continuou vindo mesmo depois que o resort fechou."
2003106-95 = "Mas, pensar que ele entrou com o Sensei... É a primeira vez que sinto inveja de um urso."
2003106-96 = "[s] \"E-então, até agora eu estava com um urso selvagem――!?\""
2003106-97 = "Basicamente isso.#nAliás, Sensei, você não vai mais entrar na fonte, né?"
2003106-98 = "Então, agora é a minha vez de entrar na fonte termal. Fique de olho nas minhas coisas, tá?"
2003106-103 = "（Depois disso, passei o tempo contendo o meu medo até que Shigure terminasse o banho）"
