[translation]
2003106-1 = "急に"
2003106-2 = "（旧校舎に着いてから、シグレが整備し直した温泉を見に行く途中で……）"
2003106-6 = "そういえば先生は……"
2003106-7 = "お風呂には一人で入るのと他の人と入るの、どっちが好き？"
2003106-8 = "[s] \"急にどうしてそんな質問を……？\""
2003106-9 = "あ、大した理由はないんだけど……#nちょっとこの前のことを思い出して。"
2003106-10 = "私、お風呂だけは他の人と一緒に入るのが好きなんだ。"
2003106-11 = "ほら、お湯に浸かりながら誰かと話すのって楽しいでしょ？"
2003106-12 = "でも旧校舎には、一人で入るのが好きな子が多くてさ。"
2003106-13 = "この前もノドカがお風呂に入ってる時に、こっそり一緒に入ろうとしたら#n「一人の時間を邪魔しないで」って言われちゃった。"
2003106-14 = "[s1] \"どちらも長所と短所があるけど……。\"\n[s2] \"でも、急に他の人が入ってくると驚いちゃうから。\""
2003106-17 = "……そっか。そういう考え方もあるね。"
2003106-18 = "[s3] \"……念のため言っておくけど。\"\n[s4] \"私が相手でも、入ってくるのはダメだよ？\""
2003106-21 = "……え？ダメなの？"
2003106-22 = "もっと先生を知るチャンスだと思ったのになぁ。"
2003106-23 = "それにお風呂に入ってる時の方が、#nいつもより本音で話せるし……。"
2003106-24 = "[s5] \"そういう話なら普段でも全然聞くから……。\"\n[s6] \"お風呂は一人で楽しませて。\""
2003106-27 = "…………残念。"
2003106-32 = "あ、そういえば。お風呂でカンポットを飲もうと思ってたのに、#nボトルを忘れてきちゃった。"
2003106-33 = "私は一度旧校舎に戻ってるよ。先生は、先に入ってて？"
2003106-34 = "すぐ帰ってくるから、ゆっくり浸かっててね。"
2003106-35 = "[s] \"本当に、入ってこないでね……？\""
2003106-37 = "（旧校舎に戻るシグレを見送った後、温泉に入った）"
2003106-40 = "（温泉はきれいに整備されていて、ほのかなハーブの香りがした）"
2003106-41 = "（白い湯気の中、ゆっくり温泉を楽しんでいたら……）"
2003106-49 = "[ns7] \"……シグレ？戻るのが早かったね。\"\n[ns8] \"それより、入ってきちゃダメって言ったのに。\""
2003106-52 = "…………。"
2003106-53 = "[ns] （湯気のせいで姿がよく見えないけど……）"
2003106-55 = "[ns] \"……とにかく、お風呂の中ではじっとしててね。\""
2003106-56 = "（……シグレは湯気の向こうから無言で私を見ていた）"
2003106-57 = "（その姿は、なんだか分厚いコートを羽織っているように見えた……）"
2003106-61 = "[ns9] \"……シグレ、もしかして服を着たまま入ってる？\"\n[ns10] \"それに、いつもより身体が大きいような……？\""
2003106-64 = "………。"
2003106-69 = "[ns11] \"い、今お湯を飲まなかった！？\"\n[ns12] \"衛生上よくないから、湯船のお湯は飲んじゃダメだよ！？\""
2003106-72 = "フーッ、フーッ……。"
2003106-73 = "[ns] （……なんとなく、聞こえる声が低い気がする）"
2003106-75 = "[ns] \"わ、私は先に上がるね！ゆっくり入ってきて！\""
2003106-78 = "（そのまま急いで温泉を出た……）"
2003106-81 = "あれ、先生。もう上がったの？"
2003106-82 = "……残念。あと少しで間に合ったのに。"
2003106-83 = "[s13] \"えっ、シグレ？まだ入ってなかったの？\"\n[s14] \"じゃあ、さっきまで温泉にいたのは……？\""
2003106-86 = "ん？温泉に他の人が入ってたの？"
2003106-87 = "……ああ、それは多分、"
2003106-88 = "この辺に住んでる熊じゃないかな。"
2003106-92 = "[ns] \"――熊！？\""
2003106-93 = "うん。227号温泉郷を運営していた頃から、#n熊が露天風呂に入っているのを何度か見かけてね。"
2003106-94 = "気に入ったのか、温泉郷がなくなってからもたまに入りにきてたよ。"
2003106-95 = "でも、先生と一緒に入ったなんて……熊に羨ましいなんて思ったのは初めて。"
2003106-96 = "[s] \"じ、じゃあ、さっきまで私は野生の熊と――！？\""
2003106-97 = "そういうことになるかな。#nところで先生、もう温泉には入らないよね？"
2003106-98 = "じゃあ、今度は私が温泉に入るから。荷物、見ててね。"
2003106-103 = "（その後、シグレが入浴を終えるまで恐怖をかみしめながら時間を過ごした）"
