[translation]
31160-1 = "Episódio 16; Uma Pequena Fresta"
31160-2 = "Ufa, que alívio!"
31160-3 = "Já tomou banho? Que rápida, Hifumi."
31160-4 = "Ufufu, pois é. Afinal, a Hifumi-chan não conseguiu tomar banho de manhã e passou o dia inteiro com seu aroma natural..."
31160-5 = "Wawa! E-esse jeito de falar é constrangedor...! Uuu, se eu não tivesse perdido a hora..."
31160-6 = "...Mas isso foi porque você estava preparando os simulados para nós."
31160-7 = "Desculpe, Hifumi. Se for difícil acordar amanhã de manhã também, me avise. Da próxima vez, eu lavo você."
31160-8 = "N-não, acho que vou ter que recusar isso...!?"
31160-9 = "Lave-se sozinha! Você não é mais criança!"
31160-10 = "É uma questão de eficiência. As vantagens de tomarmos banho juntas não são poucas. Sem mencionar a economia de água."
31160-11 = "Como não temos um banho público, esse evento de todas se lavarem freneticamente parece um pouco difícil, mas..."
31160-12 = "Ah, tive uma ideia. Que tal da próxima vez, em vez de banho, todas nós pularmos na piscina peladas?"
31160-13 = "O que você está dizendo com tanta naturalidade!? Nem pensar! Esse tipo de coisa é estritamente proibido!!"
31160-14 = "Não acho que seja uma má ideia, mas qual seria o benefício de fazer isso na piscina?"
31160-15 = "Não acham que traz uma sensação de liberdade? Só de imaginar todas nós sob o céu azul, expondo tudo e nos lavando... ufufu♡"
31160-16 = "Entendo, eu realmente não tinha pensado nisso. Sensação de liberdade, é..."
31160-21 = "Idiota, idiota, idiota, idiota!! Não pense nisso, não imagine, esse tipo de coisa não pode!"
31160-26 = "Não corrompa a Azusa com essas coisas estranhas! Já basta você como a pervertida da Trinity!!"
31160-27 = "Falando nisso, a Koharu-chan também é do tipo que gosta de nadar pelada, né?"
31160-28 = "Ignorou todo o contexto!? Você é invencível!? E-eu nunca disse isso! Na piscina, usamos trajes de banho normalmente! Isso é justiça! Até você estava usando um ontem!"
31160-29 = "Ora...?"
31160-34 = "Tente se lembrar bem, Koharu-chan. O que eu estava usando na piscina ontem..."
31160-35 = "Eh, a-aquele traje de banho, o que tem ele...?"
31160-41 = "Você acha mesmo que aquilo era um [wa:1500] traje [wa:1000] de banho [wa:1000]...?"
31160-42 = "!?!!?"
31160-43 = "S-se não era um traje de banho, então o que era...!?"
31160-45 = "As roupas íntimas de hoje em dia têm designs muito elaborados, não acha difícil distinguir à primeira vista? Além disso, existe a possibilidade de ser pintura corporal...♡"
31160-46 = "...!?!?"
31160-47 = "Eh, mentira!? Isso significa que...!?"
31160-48 = "Ora, o que houve?"
31160-49 = "Se aquilo não fosse um traje de banho, algo mudaria? Hein, Koharu-chan?"
31160-50 = "Eh, m-mas..."
31160-51 = "Por exemplo, a diferença entre um traje de banho e uma roupa íntima... o que seria? Função à prova d'água? Proteção para a pele? Design? A área de exposição?"
31160-52 = "A Koharu-chan não conseguiu distinguir pela aparência, certo? Naquele lugar, naquela hora, todos acreditaram que era um \"traje de banho\", não foi?"
31160-53 = "...???"
31160-54 = "E se, na verdade, aquilo fosse roupa íntima... como você provaria essa possível \"verdade\"?"
31160-55 = "Não há nada mais impotente do que uma verdade que não pode ser provada... não acha?"
31160-56 = "N-não entendo o que você está dizendo... a-afinal, o que isso significa!?"
31160-57 = "Significa apenas que aquele traje de banho era adorável, só isso♡"
31160-58 = "...Hã!? Era tudo brincadeira!?"
31160-59 = "...Entendo, o quinto daquela lista."
31160-60 = "...!"
31160-61 = "O quinto...? Eh, Azusa-chan, do que você está falando...?"
31160-62 = "..."
31160-66 = "É só algo que ouvi falar... um dos sete antigos preceitos que existem em Kivotos desde muito tempo. Se não me engano, era o quinto."
31160-67 = "\"É possível provar a verdade daqueles que alcançaram o paraíso?\"... Acho que era algo assim. Não sei os outros."
31160-68 = "Ou seja, se um paraíso que ninguém pode provar pode existir... lembro que era algo como um enigma zen."
31160-69 = "Azusa-chan, por que você sabe disso..."
31160-70 = "Quem conhece essa história..."
31160-71 = "Será que a Azusa-chan já encontrou a Seia-chan...!?"
31160-72 = "……。"
31160-74 = "……Seia?"
31160-75 = "Você está falando da Seia-sama do Tea Party……?"
31160-76 = "……。"
31160-77 = "……Eu não sei. Só tenho a lembrança de ter ouvido isso em algum lugar……."
31160-78 = "……。"
31160-79 = "Entendo…… Pensando bem, a Azusa-chan é uma aluna transferida, não é……."
31160-80 = "vanitas vanitatum…… isso significa que……"
31160-84 = "……Não, não é nada. Já está tarde, é melhor irmos dormir."
31160-88 = "Bem, por hoje é só, bom trabalho!"
31160-91 = "Sala do Sensei"
31160-93 = "Naquela noite……"
31160-94 = "……Sensei."
31160-95 = "É sobre a Hanako-chan……."
31160-96 = "[s] \"………。\""
31160-97 = "……Enquanto eu estava reunindo os gabaritos, encontrei um pacote deles guardado por algum motivo. Não sei por que estavam guardados, já que é algo incomum, mas……."
31160-98 = "As folhas de resposta de todos os exames do ano passado, do primeiro ao terceiro ano, estavam juntas. Por alguma razão, parece que alguém respondeu a todas elas……"
31160-99 = "[s] \"Foi ela…….\""
31160-102 = "……Sim, foi a Hanako-chan."
31160-104 = "Depois de ver as notas dela do primeiro ano ontem, acabei dando uma olhada escondida de novo……."
31160-105 = "A Hanako-chan, ainda no primeiro ano, tirou nota máxima em \"todos os exames\", incluindo aqueles considerados difíceis até mesmo para a classe de elite do terceiro ano…… Ela está em um nível que pode ser chamada de gênio absoluto……."
31160-106 = "Ao ver os resultados do primeiro ano, pensei que a Hanako-chan tinha \"tido uma queda brusca nas notas este ano\". Mas, vendo esses resultados, não parece ser o caso……."
31160-107 = "[s] \"Ela deveria ser capaz de resolver qualquer problema desde o ano passado. Ou seja……\""
31160-108 = "……Sim. Só consigo pensar que a Hanako-chan está…… reprovando nos exames de propósito agora……."
31160-109 = "Hanako-chan…… por quê……."
31160-111 = "Lobby do Alojamento"
31160-116 = "……。"
31160-123 = "……。"
31160-124 = "Azusa-chan, fazendo guarda de novo……?"
31160-125 = "……。"
31160-129 = "Ah……."
31160-130 = "……Bom dia."
31160-133 = "……Certo."
31160-134 = "……。"
31160-135 = "Hmm……?"
31160-136 = "(……Ué? Pensando bem, não vejo o Sensei desde esta manhã……)"
31160-137 = "(Onde será que ele foi……?)"
31160-139 = "Piscina do Alojamento"
31160-140 = "Uau, tem água aqui!"
31160-141 = "Ah, faz tempo que não vejo água aqui. Será que vamos nadar? Ou vai ter uma festa na piscina com todo mundo?"
31160-142 = "[s] \"Esperei por você. Pode me dizer o que deseja?\""
31160-143 = "……Hehe."
31160-149 = "Eu só queria saber se o Sensei estava se saindo bem."
31160-151 = "Próximo episódio: O Traidor de Trinity"
