[translation]
10035050-1 = "第5話;ワニ、反応消失！"
10035050-3 = "え～ですから、波のプールを利用中のお客さんは避難を～"
10035050-4 = "慌てなくていいから、転ばないようにね。"
10035050-5 = "なんでかって言うと、うーん……。"
10035050-6 = "ぶっちゃけ、私もよく分かんないけどさ……"
10035050-7 = "ま、とりあえずちゃっちゃと避難しよ～！"
10035050-13 = "いたっ！"
10035050-14 = "ま、周りの人を押さないように！ゆっくり移動してください！"
10035050-15 = "安全第一ですよっ……"
10035050-19 = "いたっ！"
10035050-24 = "はやくプールから離れろ！"
10035050-25 = "急いで、避難するんだ！"
10035050-27 = "どういうことだ？#nどうして客を避難させてるんだ？"
10035050-28 = "わかんないけど、緊急事態みたい！"
10035050-29 = "はあ……避難誘導を急ぐぞ！"
10035050-33 = "ちょっと！何をしているんです！"
10035050-34 = "一体これは、どういう状況ですか？"
10035050-35 = "何の連絡もなくお客様を避難させるなんて。"
10035050-36 = "まさか、何か事故でも！？"
10035050-38 = "あっ！オーナーさん！"
10035050-39 = "いえ！まだ事故は起きておりません！しかし、その危険がありまして……！"
10035050-40 = "あなたはヴァルキューレ警察学校の……って、危険ですって？"
10035050-41 = "まさか、波を生成する装置に何か問題でも……？"
10035050-42 = "それとも、水質汚染警報器の不具合ですか？"
10035050-43 = "そういうんじゃないんだけどさ～#nえっと……。"
10035050-44 = "フブキ、私から言おう。"
10035050-45 = "ヴァルキューレ警察学校から出向し、ライフセーバーとして#n警備にあたっている[ruby=おがた]尾刃[/ruby]カンナです。"
10035050-46 = "本日11時20分頃――#n波のプールで正体不明の怪物を目撃しました。"
10035050-47 = "よって、利用客の安全を確保するため、避難させています。"
10035050-48 = "怪物？"
10035050-49 = "それは一体どんな？"
10035050-50 = "水の中だったため、視界は不明瞭でしたが……。"
10035050-51 = "大きな口に、太い四つ脚で……"
10035050-52 = "おそらく――"
10035050-53 = "ワニだと思われます。"
10035050-55 = "ワニ……？"
10035050-59 = "ウォーターパークにワニなんか、いるわけないだろ！"
10035050-61 = "ひぃっ！"
10035050-62 = "わ……ビックリした。"
10035050-64 = "ここは海でも川でもない！人工のパークだ！"
10035050-65 = "ワニどころか、魚の一匹すらいない！"
10035050-66 = "ヴァルキューレ警察学校！#nこれは、立派な営業妨害だぞ！"
10035050-67 = "私は、この目で見たものを報告しただけです。"
10035050-68 = "私が嘘をついていると？"
10035050-69 = "ひ、ひぃっ！その顔で凄むのはやめろっ！"
10035050-70 = "お、お前が、幻覚を見たに決まってるだろう！？"
10035050-71 = "ワケの分からん理由で、客を避難させるなんて！"
10035050-72 = "下水道にワニがいるなんて都市伝説を信じているのか？"
10035050-73 = "いいか。この件は正式に損害賠償を――"
10035050-74 = "[s1] \"ちょっと待ってください。\"\n[s2] \"すこし落ち着いて話を。\""
10035050-77 = "は？"
10035050-78 = "なんですか？あなたは。"
10035050-79 = "えっ？シャーレの先生？"
10035050-80 = "今日は客として訪れている……ですと？"
10035050-81 = "ふむ、これはこれは……。大変失礼いたしました。"
10035050-82 = "先生がご利用になられると知っていれば……。#nもっと行き届いたサービスを提供できたのですが……ははは……。"
10035050-83 = "[s] \"カンナの報告をもう一度検討してください。\""
10035050-85 = "[ns] \"生徒達が言うのなら、きっと何かがいるはずです。\""
10035050-86 = "……！"
10035050-87 = "あまりにも荒唐無稽な話ですよ。"
10035050-88 = "[s3] \"もう避難も終わっていることですし……。\"\n[s4] \"万が一に備えて、プールを調査してみては？\""
10035050-91 = "ふむ、そうですね。#nお客様にプールの安全を保証する必要はありますし……。"
10035050-92 = "……いいでしょう。"
10035050-93 = "警備員を動員して、プールを調査してみましょう。#nワニがいないことを証明するために！"
10035050-94 = "[s] \"ありがとうございます。\""
10035050-95 = "しかし、もし何もいなかった場合は……"
10035050-96 = "この損害の埋め合わせをしてもらう！"
10035050-97 = "次は屋外フードコートで、タコ焼き屋台の当番だ！"
10035050-103 = "与えた損害の分は、働いて返してもらわないと。"
10035050-104 = "お、屋外～？そ、それだけは……！"
10035050-105 = "おい！警備員とライフセーバーを集めてくれ！#nプールに危険生物がいないか捜索するんだ！"
10035050-106 = "気をつけるんだぞ！#nぷぷっ。わ、ワニが、いるかもしれないからな！"
10035050-111 = "……ありがとうございます、先生。"
10035050-112 = "また先生に助けられてしまうとは。"
10035050-113 = "[s5] \"気にしなくていいよ。\"\n[s6] \"生徒を助けるのが、私の仕事だからね。\""
10035050-116 = "でも、良かったですね。#nあの人数で探せば、きっとワニもすぐ見つかります！"
10035050-117 = "本当にいれば、の話だけどねー……。"
10035050-118 = "嘘はついていない。"
10035050-119 = "この目ではっきり見たんだ。黒くて大きな影が、水中を泳いでいる姿を。"
10035050-120 = "本官は、もちろん局長のこと信じています！"
10035050-121 = "きっとすぐに見つかるはずです！"
10035050-127 = "タコ焼き……いかがですか……タコ焼き……。"
10035050-129 = "うあぁぁぁ……タコを焼く前に私たちが焼けちゃうってぇぇぇ！！"
