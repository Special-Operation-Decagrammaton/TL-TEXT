[translation]
10035050-1 = "Episódio 5; Jacaré, sinal perdido!"
10035050-3 = "Ei, por favor, clientes que estão usando a piscina de ondas, evacuem..."
10035050-4 = "Não precisam entrar em pânico, só tomem cuidado para não cair."
10035050-5 = "Por que, você pergunta? Bem, hum..."
10035050-6 = "Para ser sincera, nem eu entendo muito bem, mas..."
10035050-7 = "Bem, por enquanto, vamos evacuar logo!"
10035050-13 = "Ai!"
10035050-14 = "Ei, não empurrem as pessoas ao redor! Por favor, movam-se devagar!"
10035050-15 = "Segurança em primeiro lugar..."
10035050-19 = "Ai!"
10035050-24 = "Saiam logo da piscina!"
10035050-25 = "Depressa, evacuem!"
10035050-27 = "O que está acontecendo?#nPor que estão evacuando os clientes?"
10035050-28 = "Não sei, mas parece uma emergência!"
10035050-29 = "Ah... vamos acelerar a evacuação!"
10035050-33 = "Ei! O que vocês estão fazendo!"
10035050-34 = "Que situação é essa, afinal?"
10035050-35 = "Evacuar os clientes sem nenhum aviso prévio."
10035050-36 = "Será que aconteceu algum acidente!?"
10035050-38 = "Ah! Dono!"
10035050-39 = "Não! Nenhum acidente ocorreu ainda! Mas existe o risco de que..."
10035050-40 = "Você é da Academia de Polícia Valkyrie... espere, risco?"
10035050-41 = "Será que há algum problema com o dispositivo que gera as ondas...?"
10035050-42 = "Ou é uma falha no alarme de poluição da água?"
10035050-43 = "Não é nada disso... bem..."
10035050-44 = "Fubuki, deixe que eu explique."
10035050-45 = "Sou Kanna Ogata, destacada da Academia de Polícia Valkyrie e estou trabalhando na segurança como salva-vidas."
10035050-46 = "Hoje, por volta das 11h20――#navistamos um monstro não identificado na piscina de ondas."
10035050-47 = "Portanto, para garantir a segurança dos clientes, estamos evacuando o local."
10035050-48 = "Um monstro?"
10035050-49 = "Que tipo de monstro?"
10035050-50 = "Como estava dentro da água, a visibilidade estava ruim, mas..."
10035050-51 = "Com uma boca grande e quatro patas grossas..."
10035050-52 = "Provavelmente..."
10035050-53 = "Acredito que seja um jacaré."
10035050-55 = "Um jacaré...?"
10035050-59 = "Não tem como ter um jacaré em um parque aquático!"
10035050-61 = "Hii!"
10035050-62 = "Ah... que susto."
10035050-64 = "Isso aqui não é o mar nem um rio! É um parque artificial!"
10035050-65 = "Além de jacaré, não tem nem um peixe sequer aqui!"
10035050-66 = "Academia de Polícia Valkyrie!#nIsso é uma clara obstrução comercial!"
10035050-67 = "Eu apenas relatei o que vi com meus próprios olhos."
10035050-68 = "Está dizendo que estou mentindo?"
10035050-69 = "H-hii! Pare de me intimidar com essa cara!"
10035050-70 = "V-você deve ter tido uma alucinação, não é!?"
10035050-71 = "Evacuar os clientes por um motivo sem sentido como esse!"
10035050-72 = "Você acredita naquela lenda urbana de que existem jacarés nos esgotos?"
10035050-73 = "Escute. Vou entrar com um pedido formal de indenização por danos――"
10035050-74 = "[s1] \"Por favor, espere um pouco.\"\n[s2] \"Vamos nos acalmar e conversar.\""
10035050-77 = "Hã?"
10035050-78 = "Quem é você?"
10035050-79 = "Ah? O Sensei do Schale?"
10035050-80 = "Você veio como cliente hoje... é isso?"
10035050-81 = "Hum, ora, ora... Peço mil desculpas."
10035050-82 = "Se eu soubesse que o Sensei viria... #nEu poderia ter oferecido um serviço muito melhor... ha ha ha..."
10035050-83 = "[s] \"Por favor, reconsidere o relatório da Kanna.\""
10035050-85 = "[ns] \"Se as alunas estão dizendo, é porque deve ter algo lá.\""
10035050-86 = "……!"
10035050-87 = "Essa é uma história absurda demais."
10035050-88 = "[s3] \"A evacuação já terminou, de qualquer forma...\"\n[s4] \"Por que não investiga a piscina, só por precaução?\""
10035050-91 = "Hum, é verdade. #nPrecisamos garantir a segurança da piscina para os clientes..."
10035050-92 = "……Tudo bem."
10035050-93 = "Vou mobilizar os seguranças e investigar a piscina. #nPara provar que não há nenhum crocodilo lá!"
10035050-94 = "[s] \"Muito obrigado.\""
10035050-95 = "Mas, se não houver nada lá..."
10035050-96 = "Você vai ter que compensar esse prejuízo!"
10035050-97 = "O próximo turno será na praça de alimentação ao ar livre, na barraca de takoyaki!"
10035050-103 = "Você terá que trabalhar para pagar pelo prejuízo que causou."
10035050-104 = "A-ao ar livre~? I-isso não...!"
10035050-105 = "Ei! Reúnam os seguranças e os salva-vidas! #nVamos procurar por criaturas perigosas na piscina!"
10035050-106 = "Tomem cuidado! #nPfft. Pode ser que tenha um, um crocodilo lá!"
10035050-111 = "……Muito obrigada, Sensei."
10035050-112 = "Acabei sendo salva pelo Sensei mais uma vez."
10035050-113 = "[s5] \"Não precisa se preocupar com isso.\"\n[s6] \"Ajudar as alunas é o meu trabalho, afinal.\""
10035050-116 = "Mas que bom, não é? #nCom aquele tanto de gente procurando, com certeza vão encontrar o crocodilo rapidinho!"
10035050-117 = "Isso se ele realmente estiver lá..."
10035050-118 = "Eu não estou mentindo."
10035050-119 = "Eu vi claramente com meus próprios olhos. Uma sombra grande e escura nadando debaixo d'água."
10035050-120 = "Eu, é claro, acredito na chefe!"
10035050-121 = "Com certeza vamos encontrar logo!"
10035050-127 = "Takoyaki... gostaria de um... takoyaki..."
10035050-129 = "Aaaaaah... nós vamos ser grelhados antes mesmo de grelhar os polvos!!"
