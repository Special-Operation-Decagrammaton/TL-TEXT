[translation]
10040020-1 = "Episódio 2: Fim de ano de cada uma"
10040020-3 = "Entendo..."
10040020-4 = "Então foi por isso que você pediu para eu vir de pijama?"
10040020-5 = "Ei, Noa, não fique olhando tanto!#nEu ainda estou me arrumando!"
10040020-6 = "Fufu, desculpe.#nÉ que pareceu divertido, então não resisti."
10040020-11 = "Mas, ainda assim, tem muita coisa aqui. Kit de viagem, doces..."
10040020-12 = "E esse pijama de coelho fofo...#nPelo tamanho, é para a Koyuki-chan?"
10040020-13 = "I-isso é..."
10040020-14 = "É curioso.#nNos últimos dias, a Yuuka-chan esteve na sala do clube o tempo todo."
10040020-15 = "Quando foi que você arranjou isso?"
10040020-16 = "Bem, é que... eu vi por acaso quando saí na semana passada..."
10040020-17 = "Achei que não serviria em mim, mas talvez ficasse bom na Koyuki..."
10040020-21 = "Ahhh!? Eu não pretendia contar isso!"
10040020-23 = "Fufu.#nA Yuuka-chan é gentil."
10040020-27 = "É... é exatamente por isso, com certeza. Mesmo que ela dê uma bronca ou outra,#né fácil lidar com uma veterana que cuida tão bem da gente.#n...Diferente de certa veterana que é impossível de entender."
10040020-28 = "Por acaso você está ligando para o que disseram antes?"
10040020-32 = "...Não, nada disso."
10040020-33 = "Está ligando sim..."
10040020-34 = "...A Koyuki diz coisas que irritam, mas#nela não julga as pessoas por preconceito."
10040020-35 = "Se conversarmos com calma, os mal-entendidos devem se resolver."
10040020-36 = "Veja bem, aconteceram vários incidentes ultimamente, não é?#nPor causa disso, não tivemos tempo de conversar sobre assuntos pessoais."
10040020-37 = "Então, já que é uma boa oportunidade, que tal fazermos uma festa do pijama?"
10040020-39 = "...Realmente, a Yuuka-chan é gentil."
10040020-40 = "Acho uma ótima ideia.#nEstou ansiosa para ver como será nossa festa do pijama.#nTambém quero melhorar minha relação com a minha querida kouhai."
10040020-41 = "E parece que vou poder conhecer um novo lado da Yuuka-chan, fufu."
10040020-42 = "(Será que isso é o que a Koyuki chamava de 'pressão'...?)"
10040020-43 = "Falando nisso, faz tempo que não venho ao quarto da Yuuka-chan."
10040020-44 = "Tem muito mais coisas do que da última vez.#nAté cartazes e fotos que nunca vi..."
10040020-48 = "Ora, será que isso é do Sensei..."
10040020-49 = "Ei, ei! Não toque nisso...!"
10040020-50 = "Fufu, não tem problema.#nEsse tipo de coisa é de praxe em festas do pijama, não é?"
10040020-51 = "Li isso em um romance juvenil que peguei antes."
10040020-52 = "Que tipo de livro é esse!#nE a festa do pijama nem começou ainda!"
10040020-53 = "Ai, pare de dizer coisas estranhas e me ajude a arrumar."
10040020-54 = "Tá bom."
10040020-56 = "Além dos pijamas...#nseria bom ter algum jogo de tabuleiro para jogarmos juntas."
10040020-57 = "Na sala do Seminário só tem baralho, né?#nNoa, você não tem nada?"
10040020-58 = "Não, infelizmente..."
10040020-59 = "Acho que a Maki-chan tem vários.#nQue tal pedirmos emprestado para ela?"
10040020-60 = "Hum."
10040020-61 = "Não sei não."
10040020-62 = "A Veritas não é muito cooperativa com o Seminário..."
10040020-63 = "Ora. Você não disse agora pouco que os mal-entendidos se resolvem conversando?"
10040020-64 = "Por que não aproveita a chance para melhorar a relação com elas?"
10040020-65 = "T-tá bom, eu entendi.#nEntão vou pedir para a Maki emprestar."
10040020-66 = "Mas é só um empréstimo para uma festa do pijama particular.#nNão deixe registrado nos documentos oficiais para não usarem isso contra mim, entendeu?"
10040020-67 = "Fufu, pode deixar."
10040020-77 = "Hum... ainda não está bom. Talvez esteja simples demais?"
10040020-78 = "Vou diminuir a saturação do centro e aumentar o contraste..."
10040020-86 = "Então você estava aqui."
10040020-87 = "Como você não estava no dormitório, eu vim te procurar."
10040020-89 = "Opa, Yuuka-senpai? #nE a Noa-senpai também..."
10040020-90 = "Ué, vocês estão de pijama... Já vão dormir? #nMesmo sendo fim de ano, não está um pouco cedo?"
10040020-92 = "Não, é que..."
10040020-93 = "Pensamos em fazer uma festa do pijama de virada de ano para fortalecer nossos laços."
10040020-94 = "Bem, na verdade, a Yuuka-chan fez isso por causa da Koyuki-chan, que está sozinha na sala de detenção..."
10040020-95 = "Ah, Noa!"
10040020-97 = "Nossa, que legal... Acho que a gente também queria fazer isso."
10040020-98 = "Ah, mas a gente sempre fica jogando a noite toda enquanto come besteira, #nentão não deve mudar muita coisa..."
10040020-99 = "Mas me diga, Maki-chan, o que você está fazendo sozinha?"
10040020-100 = "Eu estava desenhando o pôster para a 'Millennium EXPO'."
10040020-101 = "Como anteciparam a data, o evento vai ser logo, né? #nPor isso o prazo de inscrição também ficou mais curto."
10040020-102 = "Falando nisso, o cronograma foi alterado por falta de pessoal, não foi?"
10040020-103 = "Sinto muito pelo transtorno."
10040020-104 = "Relaxa, eu não tinha planos para o fim de ano mesmo. Tá tudo bem."
10040020-105 = "Além disso, tem inspirações que só surgem nessa época do ano."
10040020-107 = "Mesmo assim, é incrível. Será que isso é talento..."
10040020-108 = "Você desenha tão bem, por que não foi para a Wildhunt?"
10040020-109 = "Ah, essa história é longa, deixa para outra hora..."
10040020-110 = "Melhor ainda, vocês não vieram aqui por algum motivo?"
10040020-111 = "Ah, é verdade."
10040020-112 = "Será que você poderia nos emprestar um jogo de tabuleiro? #nQueremos usar na festa do pijama."
10040020-113 = "Ah, eu não tenho usado ultimamente, então por mim tudo bem, mas..."
10040020-114 = "Eu emprestei para a Kotama-senpai e para a Hare-senpai, e elas ainda não me devolveram."
10040020-115 = "Desculpa, mas você poderia perguntar para elas? #nEu preciso dar um jeito nesse desenho."
10040020-117 = "Entendido. #nDepois que eu pegar emprestado, eu devolvo para você, Maki."
10040020-118 = "Combinado. Então, nos vemos ano que vem."
10040020-119 = "Até mais, Yuuka-senpai! Feliz ano novo!"
10040020-120 = "Sim. Feliz ano novo para você também, Maki."
10040020-123 = "Quem diria que nem a Kotama-senpai nem a Hare estariam no dormitório..."
10040020-124 = "Será que elas não estão tramando alguma coisa?"
10040020-125 = "Acho que você está pensando demais, não acha?"
10040020-126 = "É fim de ano, talvez elas estejam fazendo algo para o ano que vem, assim como a Maki-chan."
10040020-127 = "Não, cautela nunca é demais."
10040020-128 = "Considerando tudo o que o Veritas já aprontou..."
10040020-129 = "Minhas alunas fizeram algo de novo?"
10040020-133 = "Ora, ora, vejam só..."
10040020-134 = "Ah, Chihiro-senpai. Você viu a Kotama-senpai e a Hare—"
10040020-137 = "Espera, você está com uma cara péssima!? Está tudo bem!?"
10040020-138 = "Não se preocupe. Só não durmo há dois dias."
10040020-139 = "Isso é um problema sério!"
10040020-140 = "Houve algum problema com a segurança?"
10040020-141 = "Não chega a tanto, mas... descobrimos um código malicioso no servidor compartilhado da Millennium que nem o antivírus mais recente consegue detectar."
10040020-142 = "O papel de parede da área de trabalho muda para uma imagem de terror do nada, e e-mails de spam são enviados em massa... À primeira vista parece um programa de brincadeira, mas... mesmo após dois dias inteiros de manutenção, não encontramos nenhum rastro."
10040020-143 = "...Não encontrar rastros, isso significa?"
10040020-144 = "Ou o relatório está errado, ou é obra de um hacker melhor do que eu."
10040020-145 = "Bem, de qualquer forma, não há nada que eu possa fazer agora, então eu já ia dormir."
10040020-146 = "Mesmo sendo fim de ano, você se esforça muito..."
10040020-147 = "É o meu trabalho com segurança. É algo comum."
10040020-148 = "Mas enfim, você não queria falar com alguém do meu clube?"
10040020-150 = "Então... nós vamos fazer uma festa do pijama agora, e eu queria pegar emprestado alguns jogos de tabuleiro com a Kotama-senpai e a Hare."
10040020-151 = "Festa do pijama, hein... parece divertido. Embora não seja algo que faça parte da minha realidade."
10040020-152 = "Vi os celulares das duas conectados no servidor compartilhado agora há pouco, então provavelmente elas estão na sala de descanso da Veritas."
10040020-153 = "Você consegue saber até isso!?"
10040020-154 = "É mais fácil do que procurar códigos desconhecidos em uma sala escura."
10040020-155 = "Ah... espero que não aconteça nada esta noite."
10040020-157 = "Não se preocupe. A vice-presidente da Veritas fez a manutenção por dois dias. Deve estar perfeito."
10040020-158 = "Agora, por favor, descanse um pouco."
10040020-159 = "É verdade, boa noite, senpai."
10040020-161 = "Obrigada. Para as duas também, um feliz ano novo."
10040020-163 = "Pronto, Kotama-senpai. Como você pediu, programei a função de gravação automática que ativa quando alguém perde na roleta."
10040020-164 = "Mas por que colocar uma função dessas em um jogo de tabuleiro...?"
10040020-165 = "Pergunta boba, Hare. Só existe um motivo para colocar uma função de gravação em um jogo como o 'Pirata no Barril'."
10040020-167 = "É para gravar os gritos."
10040020-169 = "Não, eu entendo isso, mas... para que você pretende usar essas gravações?"
10040020-170 = "Os ASMRs que a senpai costuma ouvir são quase todos com vozes mais suaves que gritos, não são?"
10040020-171 = "De fato, gritos humanos não são muito populares. Mas, por causa disso, a amostra é pequena."
10040020-172 = "Dizem até que é por isso que filmes clássicos reutilizam os mesmos gritos degradados várias vezes."
10040020-173 = "Se eu gravar uma grande quantidade de gritos naturais, poderei trocá-los por fontes de áudio mais valiosas."
10040020-175 = "...Trocar? Existem outras pessoas com hobbies como o seu, Kotama-senpai?"
10040020-176 = "Além disso, se adicionarmos essa função, existe a possibilidade de gravarmos a voz do Sensei quando ele se assustar em alguma ocasião."
10040020-177 = "Isso talvez seja interessante..."
10040020-178 = "Fufu. Também instalei um gravador de voz ultrapequeno, e com isso está completo."
10040020-179 = "Agora é só colocar a roleta de volta no lugar e esperar alguém usar..."
10040020-184 = "...Vocês acham mesmo que eu deixaria isso passar?"
10040020-188 = "D-desde quando você está aí...!?"
10040020-189 = "Não me diga que o Seminar também estava de olho nesse jogo de tabuleiro com função de gravação?"
10040020-190 = "Na verdade, eu estava procurando por um normal..."
10040020-191 = "De qualquer forma, para proteger a privacidade, vou confiscar o gravador de voz."
10040020-192 = "Não pode ser..."
10040020-194 = "Francamente, vocês insistem em causar problemas até no fim do ano..."
10040020-195 = "É por isso que dizem que o Millennium tem clubes estranhos. Vocês deveriam aprender um pouco com a vice-presidente."
10040020-197 = "Hmm..."
10040020-198 = "Não que eu tenha moral para falar isso, mas..."
10040020-200 = "Essa cara de quem não está convencida... Tudo bem, pode falar."
10040020-201 = "Troublemakers também existem no Seminar, né?"
10040020-202 = "Dizem por aí que, em número de sistemas de segurança desativados, 'alguém do Seminar' supera muito a Veritas..."
10040020-203 = "A-a Koyuki está refletindo de verdade, viu!?"
10040020-204 = "No último mês... não, na última semana, eu não causei nada!"
10040020-206 = "Yuuka-chan, calma."
10040020-207 = "...Mas é verdade que ela tem ficado quieta ultimamente."
10040020-208 = "Ela não fugiu da sala de reflexão e nem mexeu em equipamentos eletrônicos não autorizados..."
10040020-210 = "Será que ela está tentando se comportar por causa do ano novo?"
10040020-211 = "Entendo. Então, a festa do pijama que você mencionou antes é um presente para a Koyuki por estar se comportando?"
10040020-213 = "Não é bem um presente... É só preocupação, já que se eu tirar os olhos dela, ela pode causar algum tumulto."
10040020-214 = "Por isso, pensei em oferecer um pouco de entretenimento para que ela não tenha ideias erradas."
10040020-216 = "(Parece que ela está tratando a Koyuki como um animal de estimação...)"
10040020-217 = "Se for esse o caso, não seria melhor ela voltar para a sala de reflexão o quanto antes?"
10040020-219 = "Está tudo bem. Eu a vi comportada na sala de reflexão. Foi há algumas horas, mas..."
10040020-220 = "Mesmo sendo a Koyuki, em poucas horas ela não deve..."
10040020-221 = "Hehe, não acredito que isso..."
