[translation]
10040020-1 = "第2話;それぞれの年末年始"
10040020-3 = "なるほど……。"
10040020-4 = "パジャマで来るよう言ってたのは、このためだったんですね？"
10040020-5 = "ちょっとノア、あんまり見ないでよ！#nまだ準備中なんだから！"
10040020-6 = "ふふっ、ごめんなさい。#n面白そうだったので、つい。"
10040020-11 = "それにしてもいろいろありますね。トラベルセットに、お菓子……。"
10040020-12 = "この可愛いウサギのパジャマは……#nサイズを見るに、コユキちゃん用でしょうか？"
10040020-13 = "そ、それは……！"
10040020-14 = "不思議ですねぇ。#nここ数日、ユウカちゃんはずっと部室にいたのに。"
10040020-15 = "一体いつ用意したんですか？"
10040020-16 = "それは、その……先週、出かけた時に偶然見つけて……。"
10040020-17 = "私が着るにはアレだけど、コユキにならちょうど良いかもって――"
10040020-21 = "ああっ！？ここまで話すつもりじゃなかったのに！"
10040020-23 = "ふふっ。#nユウカちゃんは優しいですね。"
10040020-27 = "……そういうところですよね、きっと。多少叱られたとしても、#n面倒見の良い先輩はやっぱり接しやすいですから。#n……どこかの掴みどころのない先輩と違って。"
10040020-28 = "もしかしてさっき言われたの、気にしてる？"
10040020-32 = "……いえ、そんなことは。"
10040020-33 = "気にしているじゃない……。"
10040020-34 = "……コユキは気に障ることも言うけど、#n先入観で人を決めつけたりしないわ。"
10040020-35 = "時間をかけて話し合えば、誤解も解けるはずよ。"
10040020-36 = "ほら、最近あれこれ事件が続いたでしょ。#nそれでプライベートな話をする時間もなかったじゃない。"
10040020-37 = "だから、良い機会だし、パジャマパーティーを開くのはどうかしら！"
10040020-39 = "……やっぱり、ユウカちゃんは優しいですね。"
10040020-40 = "いいと思います。#n私たちでパジャマパーティーなんて、どうなるか楽しみです。#n可愛い後輩との関係も良くしたいですし。"
10040020-41 = "ユウカちゃんの新たな一面を知ることもできそうですし、ふふっ。"
10040020-42 = "（これがコユキの言ってた「[ruby=あつ]圧[/ruby]」ってやつかしら……）"
10040020-43 = "そういえば、久しぶりですね。ユウカちゃんの部屋に来るの。"
10040020-44 = "前に来た時より随分と物が増えましたね。#n見慣れないポスターや写真も……。"
10040020-48 = "あら、これはもしかして先生の――"
10040020-49 = "ちょ、ちょっと！あんまり触っちゃダメ……！"
10040020-50 = "ふふっ、いいじゃないですか。#nこういうの、パジャマパーティーのお約束なんですよね？"
10040020-51 = "以前読んだ少女小説に、そう書かれてました。"
10040020-52 = "どんな本よ、それ！#nしかもパジャマパーティーはまだ始まってないでしょ！"
10040020-53 = "もう、変なこと言ってないで片付けを手伝って。"
10040020-54 = "はーい。"
10040020-56 = "パジャマ以外だと……#nみんなで遊べるテーブルゲームなんかもほしいわね。"
10040020-57 = "セミナーの部室には、トランプくらいしかないわよね。#nノアは何か持ってない？"
10040020-58 = "いえ、残念ながら……。"
10040020-59 = "たしか、マキちゃんがたくさん持っていたはずです。#n貸してくれないか頼んでみるのはどうでしょう？"
10040020-60 = "うーん。"
10040020-61 = "どうしようかしら。"
10040020-62 = "ヴェリタスはセミナーに非協力的だから……。"
10040020-63 = "あら。話し合えば誤解は解ける、とさっきは言ってませんでしたっけ？"
10040020-64 = "この機に、彼女たちとの関係も改善を図ってみては？"
10040020-65 = "わ、分かったわよ。#nじゃあ、マキに貸してもらえないか頼んでみるわ。"
10040020-66 = "でもあくまでプライベートなパジャマパーティーで借りるだけだから。#n変な言いがかりをつけられないように、公式記録には残さないでよね？"
10040020-67 = "ふふっ、大丈夫ですよ。"
10040020-77 = "うーん……やっぱりこれじゃ物足りないなあ。シンプルすぎるかも？"
10040020-78 = "真ん中の彩度を低くして、もっとコントラストを――"
10040020-86 = "ここにいたのね。"
10040020-87 = "寮にいないから、探したのよ。"
10040020-89 = "およ、ユウカ先輩？#nそれにノア先輩まで……。"
10040020-90 = "あれ、パジャマ着てる……もう寝ちゃうの？#n年末とはいえ、ちょっと早すぎない？"
10040020-92 = "いや、これは……。"
10040020-93 = "親睦を深めるため、年越しパジャマパーティーを開こうと思って。"
10040020-94 = "まあ、本当は反省部屋で一人ぼっちのコユキちゃんのために、ユウカちゃんが……。"
10040020-95 = "もう、ノア！"
10040020-97 = "へぇ、良いなぁ……あたしたちもやってみたいかも。"
10040020-98 = "あーでも、いつもお菓子食べながら徹夜でゲームしてるし、#nあんまり変わんないか……。"
10040020-99 = "ところでマキちゃんは、ひとりで何を？"
10040020-100 = "「ミレニアムEXPO」のポスターを描いてたんだ。"
10040020-101 = "前倒しになったからもうすぐ開催でしょ。#nそれで応募期間も短くなっちゃったから。"
10040020-102 = "そういえば、人手不足でスケジュールが変更になってましたね。"
10040020-103 = "ご迷惑をおかけして、申し訳ないです。"
10040020-104 = "いいよ、ちょうど年末は予定もなかったし。だいじょーぶ。"
10040020-105 = "それに、この時期でしか湧かないインスピレーションもあるからさ。"
10040020-107 = "それにしても本当、すごいわね。これが才能かしら……。"
10040020-108 = "こんなに絵が上手いのに、どうしてワイルドハントに進学しなかったの？"
10040020-109 = "あー、その話は長くなっちゃうから、また今度……。"
10040020-110 = "それより、なにか用があるんじゃないの？"
10040020-111 = "ああ、そうそう。"
10040020-112 = "テーブルゲームを貸してもらえないかしら。#nパジャマパーティーで使いたくて。"
10040020-113 = "あー、最近使ってないし全然良いんだけど……。"
10040020-114 = "いま、コタマ先輩とハレ先輩に貸してて、返してもらってないんだよね。"
10040020-115 = "悪いけど、二人に聞いてもらえるかな？#nあたしは絵の方をなんとかしたいからさ。"
10040020-117 = "分かったわ。#n借りたらあとはマキに返せばいいのよね。"
10040020-118 = "だね。じゃ、次に会うのは来年かな。"
10040020-119 = "またね、ユウカ先輩！良いお年を！"
10040020-120 = "ええ。マキも良いお年を。"
10040020-123 = "まさか、コタマ先輩もハレもどっちも寮にいないなんて……。"
10040020-124 = "何か企んでたりするんじゃないかしら。"
10040020-125 = "考えすぎだと思いますよ？"
10040020-126 = "年末ですし、マキちゃんみたく来年に向けて何かしているのかもしれませんし。"
10040020-127 = "ううん、油断は禁物よ。"
10040020-128 = "今までヴェリタスがしでかしてきたことを考えると――"
10040020-129 = "うちの子が、また何かやったの？"
10040020-133 = "あら、これはこれは……。"
10040020-134 = "あ、チヒロ先輩。コタマ先輩とハレを見なか――"
10040020-137 = "って、すごい顔色ですけど！？大丈夫なんですか！？"
10040020-138 = "気にしないで。二日寝てないだけだから。"
10040020-139 = "[ruby=おおごと]大事[/ruby]じゃないですか！"
10040020-140 = "セキュリティに問題でもあったんですか？"
10040020-141 = "というほどじゃないけど……最新のアンチウイルスソフトでも検出できない悪性コードが、ミレニアムの共用サーバーで発見されてね。"
10040020-142 = "デスクトップ背景がいきなりホラー画像に変わったり、迷惑メールが大量に送られたり……一見、ジョークプログラムみたいなんだけど……丸々二日メンテナンスしても何の痕跡も見つからなくて。"
10040020-143 = "……痕跡が見つからない、というとつまり？"
10040020-144 = "報告が間違ってるか、あるいは私より腕のいいハッカーの仕業だってこと。"
10040020-145 = "まあ、いずれにせよ今は何もできないし、そろそろ寝ようと思ってたんだ。"
10040020-146 = "年末だというのに、ご苦労さまです……。"
10040020-147 = "セキュリティの仕事だからね。よくあることだよ。"
10040020-148 = "それより、うちの部員に用があったんじゃない？"
10040020-150 = "その……これからパジャマパーティーをするんですけど、#nコタマ先輩とハレからテーブルゲームを借りたくて。"
10040020-151 = "パジャマパーティーか……楽しそうだね。#n私とは縁のない話だけど。"
10040020-152 = "さっき共用サーバーで二人のスマホが接続されてたのを見たから、#nたぶんヴェリタスの休憩室にいると思うよ。"
10040020-153 = "そこまで分かるんですね！？"
10040020-154 = "真っ暗な部屋で得体の知れないコードを探すよりは簡単だよ。"
10040020-155 = "ふぁ……今夜は何もないと良いんだけど。"
10040020-157 = "大丈夫です。ヴェリタスの副部長が二日もメンテナンスしたんですよ。#n完璧なはずです。"
10040020-158 = "いまはゆっくり休んでください。"
10040020-159 = "ですね、おやすみなさい先輩。"
10040020-161 = "ありがとう。二人とも、良いお年を。"
10040020-163 = "はい、コタマ先輩。頼まれた通り、#n「ルーレットのハズレで自動録音する機能」をプログラミングしてきたよ。"
10040020-164 = "でも、なんでテーブルゲームにそんな機能を……？"
10040020-165 = "愚問ですね、ハレ。#n「海賊危機一髪」のようなゲームに#n録音機能をつける理由なんてひとつしかないでしょう。"
10040020-167 = "悲鳴を録るためです。"
10040020-169 = "いや、それは分かるけど……そんな声を録って、何に使うつもり？"
10040020-170 = "先輩がよく聞くASMRも、悲鳴より柔らかい音声がほとんどでしょ。"
10040020-171 = "たしかに人の叫び声に人気はありません。#nが、そのせいでサンプル数が少ないんです。"
10040020-172 = "古典映画が劣化した悲鳴を何度も再利用しているのだって、#nそれが原因だと言われているくらいですから。"
10040020-173 = "ナチュラルな悲鳴の録音を大量に録っておけば、#nより価値のある音源と交換できますし。"
10040020-175 = "……交換？#nコタマ先輩みたいな趣味の人が他にいるの？"
10040020-176 = "加えてこの機能を追加しておけば、#n何かの機会に先生の驚く声を録音できる可能性もあります。"
10040020-177 = "それは興味あるかも……。"
10040020-178 = "ふふっ。#n超小型ボイスレコーダーも取り付けましたし、これで完成です。"
10040020-179 = "後はルーレットを元に戻して、誰かが使うのを――"
10040020-184 = "……そんなの、放っておくわけないでしょう。"
10040020-188 = "い、いつの間に……！？"
10040020-189 = "まさか、この録音機能付きのテーブルゲームをセミナーも狙ってたんですか？"
10040020-190 = "どちらかというと、普通のものを探していたのですが……。"
10040020-191 = "とりあえずプライバシー保護のため、ボイスレコーダーは没収しますね。"
10040020-192 = "そんな……。"
10040020-194 = "まったく、年末までトラブルを起こそうとしてくれちゃって……。"
10040020-195 = "こんなんだからミレニアムには変な部活が多いって言われるのよ。#n少しは副部長を見習ってほしいものね。"
10040020-197 = "うーん……。"
10040020-198 = "こんなこと言えた立場じゃないけど……。"
10040020-200 = "納得できてないって顔ね……。いいわ、言ってみなさい。"
10040020-201 = "トラブルメイカーは、セミナーにもいるよね？"
10040020-202 = "無効化したセキュリティの数で言えば、#nヴェリタスよりも「セミナーの誰か」の方が#nずっと多いって話もあるみたいだけど……。"
10040020-203 = "こ、コユキはちゃんと反省してるわよ！？"
10040020-204 = "ここ一ヶ月……ううん、一週間は何も起こしてないもの！"
10040020-206 = "ユウカちゃん、落ち着いて。"
10040020-207 = "……でも、ここ最近大人しくしていたのはその通りですね。"
10040020-208 = "反省部屋からの脱走もしてませんし、#n認可外の電子機器にも手を出してないようですし……。"
10040020-210 = "新年も近いし、少し大人しくしてるのかな？"
10040020-211 = "なるほど。つまり先程おっしゃっていたパジャマパーティーは、#n大人しくしているコユキさんへのプレゼントというわけですか。"
10040020-213 = "プレゼントとは違うわね……#n目を離したら何か騒ぎを起こすんじゃないかって心配なだけ。"
10040020-214 = "だから悪い気を起こさないように、たまには娯楽を提供しなきゃって思って。"
10040020-216 = "（なんか、ペット扱いしているような……）"
10040020-217 = "だとしたら、一刻も早く反省部屋に戻った方がいいのでは？"
10040020-219 = "大丈夫よ。#n反省部屋でちゃんと大人しくしてる姿を見たんだから。数時間前だけど。"
10040020-220 = "いくらコユキでも、それくらいなら……。"
10040020-221 = "ふふっ、まさかそんな――"
