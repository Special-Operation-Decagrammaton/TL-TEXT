[translation]
1005702-1 = "O ano termina em paz"
1005702-4 = "(Quando cheguei ao ponto de encontro, Haruna já estava lá)."
1005702-5 = "Ah, doutor."
1005702-6 = "Obrigado por sua presença."
1005702-7 = "[Desculpe-me pelo atraso. O quimono fica bem em você. \""
1005702-8 = "Ufa."
1005702-9 = "Achei que seria mais apropriado ir a um jantar com esse tipo de roupa na época certa do ano."
1005702-10 = "E cada uma dessas preparações faz parte do ......"
1005702-11 = "Acreditamos que estamos nos aproximando da verdadeira gastronomia."
1005702-12 = "[\"Estou vendo, é época de festas, não é? \""
1005702-13 = "É isso que quero dizer."
1005702-14 = "E parece que não sou a única pessoa que pensa da mesma forma, certo?"
1005702-19 = "[ns] \"De fato, ...... e, mesmo assim, há realmente muitas pessoas aqui hoje. \""
1005702-20 = "Sim, o final do ano ainda é muito animado."
1005702-21 = "Reflita sobre o ano que passou e se anime com o Ano Novo que está chegando. ......"
1005702-22 = "Essa exuberância cria uma experiência extraordinária, e é por isso que todos vêm à cidade."
1005702-23 = "O próximo ano será melhor. ...... com essas expectativas."
1005702-24 = "E uma variedade de pratos para recebê-los. ......"
1005702-26 = "Hmmm."
1005702-27 = "Certamente, é justamente em ocasiões como essa."
1005702-28 = "Há um sabor especial esperando por você."
1005702-29 = "[s]\"então, talvez ......? \""
1005702-30 = "Sim, tenho certeza de que sim."
1005702-31 = "Convidamos o sensei para nos visitar. ......"
1005702-32 = "Vamos lá, então?"
1005702-38 = "[ns] \"\"}Haruna ......! \""
1005702-39 = "Como posso ajudá-lo? Estamos em boas condições, e é natural cruzar os braços."
1005702-40 = "É um bom momento para se divertir."
1005702-41 = "Vamos, sim, doutor?"
1005702-46 = "Aqui está, todos eles estão frescos!"
1005702-47 = "Que tal uma banana com chocolate? Se você for atingido, coma outra!"
1005702-48 = "Que tal yakisoba e macarrão frito! É quente e feito na hora!"
1005702-50 = "Ok, macarrão frito. ......"
1005702-51 = "É um clássico, mas é por isso que é uma peça indispensável do kit."
1005702-55 = "Com licença, posso pegar um?"
1005702-56 = "Ah, por favor, use dois conjuntos de pauzinhos."
1005702-58 = "Ramen. Como eles são servidos nessas barracas?"
1005702-59 = "Estou vendo. Despeje a sopa em uma xícara simples que você possa usar. ......"
1005702-60 = "Você gostaria de provar este também?"
1005702-65 = "Hummm. Você também pode compartilhar uma porção entre duas pessoas em ......."
1005702-66 = "Não é legal?"
1005702-68 = "Oh, pão de ló de bebê."
1005702-69 = "Você tem uma maneira um tanto incomum de fazê-los."
1005702-70 = "Era hora de começar a sentir falta das coisas doces e ......."
1005702-71 = "De qualquer forma, vamos lá."
1005702-75 = "Daifuku de morango."
1005702-76 = "Pasta de feijão vermelho e morangos grandes envoltos em um bolo de arroz. ......"
1005702-77 = "Doçura da pasta de feijão vermelho e acidez dos morangos."
1005702-78 = "O contraste entre a textura em borracha e o sabor suculento é fascinante."
1005702-82 = "Com licença, posso comer dois daifuku de morango?"
1005702-84 = "(Depois, ele e Haruna foram a muitas outras barracas)"
1005702-89 = "[ns] \"So, I think I might be full of it soon. ...... \""
1005702-90 = "Ufa, você comeu muita comida para seu sensei."
1005702-91 = "[\"Como você se sente como Haruna? \""
1005702-92 = "Sim, é isso mesmo. ...... A caminhada gastronômica de hoje foi para explorar novas delícias gastronômicas no final do ano."
1005702-93 = "Em conclusão: ......"
1005702-94 = "A comida servida em ocasiões especiais, em lugares especiais e em ambientes especiais pode ser encontrada em ......"
1005702-98 = "...... ficou um pouco decepcionado."
1005702-99 = "[s]\"Qual é o ......? \""
1005702-100 = "Yakisoba é um prato em que o macarrão e o molho estão em harmonia."
1005702-101 = "O mesmo se aplica ao ramen. #Por mais que seja uma barraca de rua, as coberturas não devem ser bagunçadas."
1005702-102 = "Os bolos de esponja para bebês estavam cozidos de forma desigual e alguns estavam queimados. ......"
1005702-103 = "A pasta de feijão daifuku de morango carecia de um pouco de suavidade."
1005702-104 = "É claro que, mesmo sendo um negócio que visa ao lucro, não é aceitável confiar em ingredientes baratos e negligenciar o sabor."
1005702-105 = "[s1] \"Isso, isso pode ser ......\"\n[s2] (Seu corpo se tornou tão forte que ele...)"
1005702-108 = "...... O que posso fazer pelo senhor, doutor?"
1005702-109 = "...... sim? Você acha que eu vou explodir todas as barracas ......?"
1005702-110 = "Não se preocupe, não pretendo fazer isso hoje."
1005702-111 = "E ......."
1005702-112 = "[s]\"E? \""
1005702-113 = "É hora de passar um tempo com seus entes queridos."
1005702-114 = "E mesmo que não tenha sido gastronômico, foi um bom momento."
1005702-115 = "Portanto, se você se importa com o ......, poderia ficar conosco um pouco mais?"
1005702-116 = "Ainda há muitas barracas para todos. Ufa."
1005702-123 = "(E assim passou um tempo com Haruna, aproveitando a atmosfera do fim do ano)"
1005702-124 = "(Caminhamos um pouco, ficamos com fome e comemos algumas comidas de rua)."
