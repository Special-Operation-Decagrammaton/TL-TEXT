[translation]
1005702-1 = "年の瀬は穏やかに"
1005702-4 = "（待ち合わせ場所に着くと、すでにハルナの姿があった）"
1005702-5 = "あ、先生。"
1005702-6 = "お越しくださってありがとうございます。"
1005702-7 = "[s] \"遅くなってごめん。着物、よく似合ってるね。\""
1005702-8 = "ふふっ。"
1005702-9 = "時期的にも、このような装いでお食事に向かう方が適しているかと思いまして。"
1005702-10 = "そして、こうした準備を一つひとつ重ねることで……"
1005702-11 = "真の美食に近づけるのだと、そう信じておりますので。"
1005702-12 = "[s] \"なるほど、せっかくの年末年始だもんね。\""
1005702-13 = "そういうことです。"
1005702-14 = "それに、同じような考えの方は私だけではないようですよ？"
1005702-19 = "[ns] \"確かに……それにしても今日は本当に人が多いね。\""
1005702-20 = "ええ、年の瀬はやはり活気に満ちていますわ。"
1005702-21 = "今年一年を振り返り、来たる新年に胸を踊らせて……。"
1005702-22 = "そんな高揚感が非日常を生むことで、皆さん街に繰り出してくるのでしょう。"
1005702-23 = "来年はきっと良いことがある……そんな期待を胸に。"
1005702-24 = "そして、そんな人たちを迎える料理の数々……！"
1005702-26 = "うふふっ。"
1005702-27 = "きっとこのような場にこそ。"
1005702-28 = "特別な味わいが待ち受けているはずですわ。"
1005702-29 = "[s] \"そう、かも……？\""
1005702-30 = "ええ、きっとそうです。"
1005702-31 = "せっかく先生もお呼びしたことですし……。"
1005702-32 = "それでは、参りましょうか？"
1005702-38 = "[ns] \"は、ハルナ……！？\""
1005702-39 = "どうなさいました？私たちの仲ですし、腕組みくらい自然なことでしょう。"
1005702-40 = "せっかくの楽しいひと時なのですから。"
1005702-41 = "さあ行きましょう、先生？"
1005702-46 = "さあどうぞ、どれも新鮮だよ！"
1005702-47 = "チョコバナナはどうだい！？当たりが出たらもう一本！"
1005702-48 = "焼きそば、焼きそばはいかがですかー！熱々の出来立てですよー！"
1005702-50 = "なるほど、焼きそば……。"
1005702-51 = "定番ではありますが、だからこそ欠かせない一品ですわね。"
1005702-55 = "失礼、お一つ頂けますか？"
1005702-56 = "あ、お箸は二膳でお願いいたします。"
1005702-58 = "ラーメンですか。こういった屋台では、どのように提供されるのでしょう？"
1005702-59 = "なるほど。使い切りの簡易カップにスープを注いで……。"
1005702-60 = "こちらも味わってみましょうか？"
1005702-65 = "うふふっ。一人前を二人で分け合って食べるというのも……。"
1005702-66 = "なんだか素敵だと思いませんか？"
1005702-68 = "あら、ベビーカステラ。"
1005702-69 = "少々珍しい作り方をされていますね。"
1005702-70 = "そろそろ甘いものが恋しくなってきたところでしたし……。"
1005702-71 = "ぜひ、頂くとしましょう。"
1005702-75 = "いちご大福ですね。"
1005702-76 = "餅に包まれた、餡と大きなイチゴ……。"
1005702-77 = "餡子の甘みとイチゴの酸味。"
1005702-78 = "モチモチとした食感とジューシーな味わい、このコントラストが魅力的ですわね。"
1005702-82 = "失礼、いちご大福を二つくださる？"
1005702-84 = "（その後もハルナと一緒に多くの屋台を回った）"
1005702-89 = "[ns] \"そ、そろそろお腹いっぱいかも……。\""
1005702-90 = "ふふっ、先生には沢山食べていただきましたものね。"
1005702-91 = "[s] \"ハルナとしての感想は？\""
1005702-92 = "そうですわね……今日の食べ歩きは、年の瀬に新しい美食を探究するためのものでした。"
1005702-93 = "結論として……"
1005702-94 = "特別な日、特別な場所、特別な雰囲気の中で食べる料理は……"
1005702-98 = "……少々ガッカリでした。"
1005702-99 = "[s] \"ど、どの辺りが……？\""
1005702-100 = "焼きそばとは、麺とソースが調和してこその一品。"
1005702-101 = "それはラーメンも同様です。#nいくら屋台だからといって、トッピングを雑にしてはなりません。"
1005702-102 = "ベビーカステラは火加減が不均一で、焦げも見られましたし……。"
1005702-103 = "いちご大福の餡は少々滑らかさに欠けました。"
1005702-104 = "もちろん利益を求める商売とは言え、安い食材に頼って味をおろそかにするのは頂けません。"
1005702-105 = "[s1] \"こ、これはもしかして……\"\n[s2] （身体がつい強張ってしまい――）"
1005702-108 = "……どうかされましたか、先生？"
1005702-109 = "……はい？私が屋台を全部爆発させるんじゃないかと思って……？"
1005702-110 = "ご心配なく、今日はそんなつもりはありませんわ。"
1005702-111 = "それに……。"
1005702-112 = "[s] \"それに？\""
1005702-113 = "せっかくの、大切な方と一緒に過ごす時間ですから。"
1005702-114 = "美食ではなくとも、楽しい時間にはなりましたし。"
1005702-115 = "ですから……気にしてくださるのでしたら、もう少しお付き合いいただけますか？"
1005702-116 = "まだ屋台はたくさんありますから。ふふっ。"
1005702-123 = "（そうしてハルナと年の瀬の雰囲気を楽しんで過ごした）"
1005702-124 = "（少し歩いては小腹を空かせて、屋台料理を食べて回った)"
