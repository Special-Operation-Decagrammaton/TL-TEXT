[translation]
13270-1 = "第27話;紙一重の勝負"
13270-3 = "……強くなったね、シロコちゃん。"
13270-9 = "はぁ……はぁ……。"
13270-10 = "先生が一緒だから。"
13270-11 = "……それでも、本当に強くなったよ。"
13270-12 = "まさか、こんなに早く「いつか」が訪れるとは思わなかったけどね。"
13270-13 = "……。"
13270-18 = "ホシノ先輩……。"
13270-19 = "……。"
13270-20 = "先輩……。"
13270-25 = "[ns] \"もう充分じゃないかな、ホシノ。\""
13270-29 = "……そうかな。"
13270-32 = "カイザーは列車砲の所有権を主張していますが、こじつけに過ぎません。#nほかに方法はあるはずです。"
13270-33 = "……そうだね、先生も一緒にいるわけだし。"
13270-34 = "……あの時みたいに、でしょ？"
13270-39 = "[ns] \"うん、方法ならみんなで探そう。\""
13270-40 = "……。"
13270-41 = "ホシノ先輩……。"
13270-42 = "ノノミちゃんの意見は？"
13270-43 = "私は……。"
13270-44 = "ホシノ先輩に対して……勝手に、自分の姿を重ねていました。"
13270-45 = "でも亡くなった人は帰ってこなくて、#n時間を巻き戻すこともできなくて……。"
13270-46 = "ホシノ先輩に解放されてほしいって、願うと同時に。"
13270-53 = "私自身も……。"
13270-54 = "罪悪感から、解放されたかったのかもしれません。"
13270-55 = "……。"
13270-59 = "私はユメ会長のことを知らないし、"
13270-60 = "なんて声をかけたら良いのか……ごめん。"
13270-61 = "シロコちゃん……。"
13270-62 = "でも……聞かせて、先輩の話。"
13270-63 = "そうよ。"
13270-64 = "一人で責任を負う必要はないわ！"
13270-65 = "セリカちゃん……。"
13270-67 = "これは先輩だけの問題じゃありません！"
13270-68 = "対策委員会の……いえ、アビドスの問題です！"
13270-69 = "話してくれていれば、一緒に考えられたのに……。"
13270-70 = "アヤネちゃ……ううん、アヤネ会長。"
13270-71 = "アヤネちゃん、で良いです……。"
13270-72 = "アヤネ、ちゃん……。"
13270-73 = "先生、みんな……｡"
13270-75 = "……ユメ先輩を殺したのは私なんだ。"
13270-76 = "……先輩。"
13270-77 = "それは……！"
13270-79 = "……分かってる。#nあれは事故で、私のせいじゃない。"
13270-80 = "ずっと、そう思おうとしてた。"
13270-81 = "ユメ先輩は、どんな時も生徒会長として頑張ってくれてたんだ。"
13270-84 = "優しくて、心配性で、何があっても私を抱きしめてくれてた。"
13270-85 = "でも、そんなユメ先輩が残したものを、私は何も守れなかった。#nいつも不満を漏らして、怒ってばかり。"
13270-86 = "あれだけ思い出を受け取ったのに、#nお礼を言う機会すらないなんて。"
13270-89 = "……先輩は、もう死んじゃったから。"
13270-90 = "もう、二度と会えないから……。"
13270-93 = "[ns] \"ホシノのせいじゃないよ。\""
13270-94 = "……うん、頭では分かってるんだ。"
13270-95 = "それでも、私は……。"
13270-96 = "私は……っ。"
13270-97 = "[ns] \"帰ろう、ホシノ。\""
13270-98 = "……先生。"
13270-99 = "[s] \"もう充分苦しんだよ。\""
13270-100 = "帰りましょう、対策委員会に。"
13270-101 = "そうよ、先輩。"
13270-103 = "私たちが一緒にいます。"
13270-109 = "ん。"
13270-113 = "……うん。"
13270-114 = "ありがとう、みん――"
13270-121 = "おやおや……誰がそのような選択を許しましたか？"
13270-126 = "この音は！？"
13270-127 = "か、雷……？"
13270-131 = "あ、あちらを見てください！"
13270-145 = "っ！？"
13270-146 = "ど、どうして……！？"
13270-147 = "あっ、私のカード……！？"
13270-152 = "[ruby=たかなし]小鳥遊[/ruby]ホシノ！"
13270-153 = "……！"
13270-159 = "まずはあんたらの学校を吹き飛ばしてやる！"
13270-160 = "列車砲を止めたいのならば、来ると良い！"
13270-161 = "！？"
13270-162 = "……！"
13270-163 = "「大オアシス駅」で待っている。"
13270-164 = "もし来なければ……。"
13270-173 = "待って、ホシノ先輩……！"
13270-180 = "くっ……！"
13270-181 = "ほ、ホシノ先輩……！"
13270-182 = "[s] \"ホシノ……！\""
13270-186 = "……ありがとね、みんな。"
13270-187 = "でも、この苦しみは私の物だから。"
13270-188 = "列車砲は、私が壊す。"
13270-189 = "ユメ先輩も、きっと同じ選択をしたはず。"
13270-190 = "本当は、二年前に解決しなくちゃいけなかったんだ。"
13270-194 = "[ns] \"待って、ホシノ！\""
13270-195 = "追いかけないと！"
13270-196 = "ホシノ、先輩……。"
13270-201 = "確認できました、先生！"
13270-204 = "列車砲シェマタには、#n現在のキヴォトスに存在しない技術が使われています！"
13270-205 = "どうやら、太陽と同じ温度のプラズマを発射する構造になっているようです！"
13270-206 = "ただし、完全には再現できていないようで……。"
13270-207 = "無理に壊そうとすれば、#nエネルギーが拡散して広範囲に被害が及ぶかもしれません！"
13270-208 = "ホシノさんやスオウさんだけでなく、#n皆さんまで巻き込まれてしまいます！"
13270-210 = "ヒッ、ヒヒッ！"
13270-211 = "ヒヒ、ヒヒヒヒヒッ……！！"
13270-212 = "いやはや、1秒でも遅れていれば小生の負けでした。"
13270-213 = "これこそ、紙一重の勝負。"
13270-214 = "[USERNAME]先生、あなたは今まで戦っていたどの相手よりも手強いです。"
13270-215 = "しかし、もう奇跡は起きません。#nあなたの力は無効化されました。"
13270-217 = "そろそろクライマックスと行きましょうか。"
13270-218 = "さあ、"
13270-219 = "咎人よ。"
13270-220 = "実態なき虚を追う求道者よ。"
13270-221 = "この世に存在せずとも[ruby=ことわり]、理を[/ruby]支配する真実よ。"
13270-222 = "ああ、それこそ――死なのです。"
13270-223 = "死。"
13270-224 = "死。"
13270-225 = "死。"
13270-226 = "死。死。死。死。死。死。死。死。死。死。死。死。"
13270-227 = "決して逃れられぬ真実を。"
13270-228 = "小生の前に掲示したまえ。"
13270-229 = "六つ目の古則、「[ruby=ひう]非有[/ruby]の真実は真実であるか」。#nその答えを、導きたまえ――！"
13270-234 = "索敵完了。"
13270-238 = "なっ……！？"
13270-245 = "ターゲット、分析開始。"
13270-246 = "何者だ、貴様ァ！#nなぜ小生の領域に……！？"
13270-250 = "……所属ゲマトリア、個体名「地下生活者」。#n検索を継続します。"
13270-251 = "ここは実在と非実在が確定していない領域。#nなのに、何故……！"
13270-252 = "……検索失敗。#nこの世には存在しない異質な存在です。"
13270-253 = "ヒッ、ヒヒッ、神聖の器ですか。#nしかし、何かに汚染されていますね。"
13270-254 = "いずれにせよ、[ruby=なんびと]何人[/ruby]にも小生の邪魔を許すつもりはありません。#n――消えてもらいましょう。"
13270-258 = "この場所に勘付くとは……"
13270-259 = "……まあ、構いません。#nここからは時間の勝負。"
13270-262 = "……発見しました。"
13270-263 = "プラナちゃん！？"
13270-264 = "[s] \"プラナ！\""
13270-265 = "今まで感じていた視線の正体が分かりました。"
13270-266 = "あの者は「混沌の領域」に身を潜めています。"
13270-267 = "混沌の領域……。"
13270-268 = "実在と非実在が確定していない空間、#n「ナラム・シンの玉座」に適応していたおかげで、あの者の存在を感知できました。"
13270-269 = "正体はゲマトリア所属の「地下生活者」です。"
13270-270 = "[s] \"地下生活者……！\""
13270-271 = "知っているのですか、プラナちゃん？"
13270-272 = "否定。あの者の目的も、計画も分かりません。"
13270-273 = "……しかし、能力はある程度把握できました。"
13270-274 = "混沌の領域から、こちらの世界に介入できるようです。"
13270-275 = "じゃあ、シャーレを爆破したのも……？"
13270-276 = "はい。ですが、おそらく私たちの存在はイレギュラーなのでしょう。"
13270-277 = "[s] \"アロナとプラナがいたから……。\""
13270-278 = "……はい。"
13270-279 = "先生、地下生活者は先生に勝負を挑んでいるようです。"
13270-280 = "[s] \"勝負……。\""
13270-281 = "油断してはいけません。"
13270-282 = "地下生活者は……。"
13270-284 = "[ruby=キヴォトス最高の神秘]小鳥遊ホシノさん[/ruby]を利用して、何か企んでいるのだと思います。"
13270-285 = "[s] \"黒服と同じ目的だね。\""
13270-286 = "……あの能力が及ぶ対象は、アビドスだけに限りません。"
13270-287 = "アレは……。"
13270-292 = "……キヴォトス全域にまで問題が発展する可能性もあります。"
13270-293 = "先生、ホシノさんを止めてください。"
13270-294 = "[s] \"任せて。\""
13270-297 = "[ns] \"ホシノを止めないと……。\""
13270-298 = "ですが、これ以上は……。"
13270-299 = "先輩は、"
13270-300 = "もう列車に乗って峡谷を離れたから……。"
13270-302 = "私たちには……。"
13270-303 = "どうやって止められるのよ……。"
13270-304 = "[s] \"ちょっと頼めそうな子に連絡してみるね。\""
13270-306 = "……？"
13270-307 = "でも、この問題は……。"
13270-308 = "[s1] \"無関係な子じゃないから、大丈夫。\"\n[s2] \"あの子なら、きっとホシノを止められる。\""
13270-315 = "[ns] \"助けてほしいんだ。\""
13270-317 = "分かったわ。"
13270-318 = "[s] \"ありがとう、状況なんだけど……。\""
13270-319 = "大丈夫よ、全部知っているから。"
13270-327 = "ホシノ先輩は今、列車で「セクター35-9」の分岐駅に戻っているはずです。"
13270-328 = "そこで乗り換えをするのが、#n「大オアシス駅」に向かう唯一のルートですからね。"
13270-329 = "ただ……あそこにはカイザーPMCが待ち受けている可能性が高いです。"
13270-330 = "こんなにずっと戦ってたら、いくら先輩でも……。"
13270-331 = "……大丈夫だと思う。"
13270-332 = "さっきの先輩は、全力を出してない。"
13270-333 = "……なのに、止められなかったなんて。"
13270-334 = "[s3] \"ホシノを追いかけよう。\"\n[s4] \"ホシノもスオウも止めるよ。\""
13270-337 = "はい、先生。"
13270-338 = "……日が暮れ始めたわね。"
13270-339 = "もう限界かもしれませんが……頑張りましょう。"
13270-340 = "……ん。"
13270-371 = "カイザーはどこにいるんだろ？"
13270-372 = "……静かすぎるね。"
13270-376 = "そうだ。#nまずは管制室のレバーを操作して、列車を動かさないと。"
13270-383 = "……。"
13270-384 = "……誰？"
13270-399 = "待ってたわ、小鳥遊ホシノ。"
13270-402 = "あれ？"
13270-403 = "えっと……たしかゲヘナの風紀委員長ちゃん、だよね？"
13270-404 = "迷子なら、帰り道を教えてあげようか？"
13270-405 = "あの列車砲を一人で破壊するのは無理よ。#nほかの方法を探して。"
13270-406 = "へぇ……でも、おじさんはいつもこうやって解決してきたからさ。"
13270-407 = "早く[ruby=ど]退[/ruby]いてもらっても良いかな？#n迷子の相手をしてる余裕はないんだよね。"
13270-411 = "……そう。"
13270-415 = "力尽くで止めるしかないようね。"
13270-418 = "そっか。"
13270-419 = "じゃあ、仕方ないね。"
13270-438 = "……私の名前は[ruby=そらさき]、空崎ヒ[/ruby]ナよ。"
13270-444 = "次回;激戦（１）"
