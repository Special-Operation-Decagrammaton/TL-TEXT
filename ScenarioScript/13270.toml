[translation]
13270-1 = "Episódio 27; Uma disputa por um fio"
13270-3 = "……Você ficou forte, Shiroko-chan."
13270-9 = "Haa…… haa……."
13270-10 = "É porque o Sensei está comigo."
13270-11 = "……Mesmo assim, você ficou realmente forte."
13270-12 = "Eu não esperava que esse \"algum dia\" chegasse tão rápido, no entanto."
13270-13 = "……."
13270-18 = "Hoshino-senpai……."
13270-19 = "……."
13270-20 = "Senpai……."
13270-25 = "[ns] \"Acho que já chega, Hoshino.\""
13270-29 = "……Será?"
13270-32 = "A Kaiser reivindica a posse do trem blindado, mas isso não passa de uma desculpa esfarrapada.#nDeve haver outro jeito."
13270-33 = "……É verdade, o Sensei também está aqui conosco."
13270-34 = "……Como daquela vez, não é?"
13270-39 = "[ns] \"Sim, vamos procurar uma solução juntos.\""
13270-40 = "……."
13270-41 = "Hoshino-senpai……."
13270-42 = "Qual é a sua opinião, Nonomi-chan?"
13270-43 = "Eu……."
13270-44 = "Eu estava…… projetando minha própria imagem na Hoshino-senpai sem permissão."
13270-45 = "Mas quem se foi não volta, e não dá para voltar o tempo……."
13270-46 = "Ao mesmo tempo em que desejo que a Hoshino-senpai seja libertada desse peso."
13270-53 = "Eu mesma……."
13270-54 = "Talvez eu só quisesse me libertar da minha própria culpa."
13270-55 = "……."
13270-59 = "Eu não conheci a presidente Yume, e"
13270-60 = "não sei o que dizer…… me desculpe."
13270-61 = "Shiroko-chan……."
13270-62 = "Mas…… deixe-nos ouvir, conte-nos sobre a senpai."
13270-63 = "É isso mesmo."
13270-64 = "Você não precisa carregar esse peso sozinha!"
13270-65 = "Serika-chan……."
13270-67 = "Isso não é um problema só da senpai!"
13270-68 = "É um problema do Comitê de Contramedidas…… não, de Abydos!"
13270-69 = "Se você tivesse nos contado, poderíamos ter pensado juntas……."
13270-70 = "Ayane-cha…… não, presidente Ayane."
13270-71 = "Pode me chamar de Ayane-chan……."
13270-72 = "Ayane, chan……."
13270-73 = "Sensei, pessoal……."
13270-75 = "……Fui eu quem matou a Yume-senpai."
13270-76 = "……Senpai."
13270-77 = "Isso é……!"
13270-79 = "……Eu sei.#nFoi um acidente, não foi minha culpa."
13270-80 = "Eu tentei pensar assim por todo esse tempo."
13270-81 = "A Yume-senpai sempre se esforçou como presidente do conselho estudantil, não importa a situação."
13270-84 = "Ela era gentil, preocupada, e sempre me abraçava, não importava o que acontecesse."
13270-85 = "Mas eu não consegui proteger nada do que a Yume-senpai deixou para trás.#nEu só vivia reclamando e ficando brava."
13270-86 = "Mesmo tendo recebido tantas lembranças dela,#neu nem tive a chance de agradecer."
13270-89 = "……Porque a senpai já morreu."
13270-90 = "Porque, eu nunca mais vou poder vê-la..."
13270-93 = "[ns] \"Não é sua culpa, Hoshino.\""
13270-94 = "……Sim, eu sei disso racionalmente."
13270-95 = "Mesmo assim, eu……"
13270-96 = "Eu……!"
13270-97 = "[ns] \"Vamos voltar, Hoshino.\""
13270-98 = "……Sensei."
13270-99 = "[s] \"Você já sofreu o suficiente.\""
13270-100 = "Vamos voltar para o Comitê de Contramedidas."
13270-101 = "É isso mesmo, Senpai."
13270-103 = "Nós estamos aqui com você."
13270-109 = "Hum."
13270-113 = "……Sim."
13270-114 = "Obrigada, pessoal――"
13270-121 = "Ora, ora…… quem permitiu que vocês fizessem tal escolha?"
13270-126 = "Esse som é!?"
13270-127 = "T-trovão……?"
13270-131 = "A-ali, olhem ali!"
13270-145 = "¡?"
13270-146 = "P-por que……!?"
13270-147 = "Ah, meu cartão……!?"
13270-152 = "Takanashi Hoshino!"
13270-153 = "……!"
13270-159 = "Primeiro, vou explodir a escola de vocês!"
13270-160 = "Se quiserem parar o canhão ferroviário, venham até mim!"
13270-161 = "¡?"
13270-162 = "……!"
13270-163 = "Estarei esperando na \"Estação Grande Oásis\"."
13270-164 = "Se não vierem……."
13270-173 = "Espere, Hoshino-senpai……!"
13270-180 = "Droga……!"
13270-181 = "H-Hoshino-senpai……!"
13270-182 = "[s] \"Hoshino……!\""
13270-186 = "……Obrigada, pessoal."
13270-187 = "Mas esse sofrimento é algo que só me pertence."
13270-188 = "Eu vou destruir o canhão ferroviário."
13270-189 = "A Yume-senpai, com certeza, teria feito a mesma escolha."
13270-190 = "Na verdade, eu deveria ter resolvido isso há dois anos."
13270-194 = "[ns] \"Espere, Hoshino!\""
13270-195 = "Temos que ir atrás dela!"
13270-196 = "Hoshino-senpai……."
13270-201 = "Consegui confirmar, Sensei!"
13270-204 = "O canhão ferroviário Shem-ha usa uma tecnologia que não existe no Kivotos atual!"
13270-205 = "Parece que ele foi construído para disparar plasma com a mesma temperatura do sol!"
13270-206 = "No entanto, parece que não foi totalmente replicado……."
13270-207 = "Se tentarem destruí-lo à força, a energia pode se dispersar e causar danos em uma área ampla!"
13270-208 = "Não apenas a Hoshino e a Suou, mas todos vocês serão pegos na explosão!"
13270-210 = "Hi, hihi!"
13270-211 = "Hihi, hihihihihi……!!"
13270-212 = "Ora, ora, se tivesse atrasado nem que fosse um segundo, eu teria perdido."
13270-213 = "Isso sim é uma disputa por um fio."
13270-214 = "Sensei [USERNAME], você é mais difícil de lidar do que qualquer oponente que enfrentei até hoje."
13270-215 = "No entanto, milagres não acontecerão mais.#nSeu poder foi neutralizado."
13270-217 = "Que tal partirmos para o clímax?"
13270-218 = "Vamos lá,"
13270-219 = "pecador."
13270-220 = "buscador que persegue o vazio sem substância."
13270-221 = "A verdade que governa a lógica, mesmo sem existir neste mundo."
13270-222 = "Ah, isso é, de fato — a morte."
13270-223 = "Morte."
13270-224 = "Morte."
13270-225 = "Morte."
13270-226 = "Morte. Morte. Morte. Morte. Morte. Morte. Morte. Morte. Morte. Morte. Morte. Morte."
13270-227 = "A verdade da qual jamais poderá escapar."
13270-228 = "Mostre-a diante de mim."
13270-229 = "O sexto princípio antigo: 'A verdade do não-ser é uma verdade?'.#nConduza-me a essa resposta —!"
13270-234 = "Busca concluída."
13270-238 = "O quê...!?"
13270-245 = "Alvo, iniciando análise."
13270-246 = "Quem é você, seu maldito!#nPor que está no meu domínio...!?"
13270-250 = "...Afiliação: Gematria, indivíduo: 'Habitante Subterrâneo'.#nContinuando a busca."
13270-251 = "Este é um domínio onde a existência e a não-existência não estão definidas.#nMesmo assim, por que...!"
13270-252 = "...Busca falhou.#nÉ uma existência heterogênea que não deveria existir neste mundo."
13270-253 = "Heh, hehe, um receptáculo sagrado, é?#nMas, está contaminado por algo."
13270-254 = "De qualquer forma, não pretendo permitir que ninguém atrapalhe o meu caminho.#n— Desapareça."
13270-258 = "Como você descobriu este lugar..."
13270-259 = "...Bem, não importa.#nDaqui em diante, é uma corrida contra o tempo."
13270-262 = "...Encontrei."
13270-263 = "Plana-chan!?"
13270-264 = "[s] \"Plana!\""
13270-265 = "Entendi a identidade daquele olhar que sentíamos até agora."
13270-266 = "Aquele indivíduo está escondido no 'Domínio do Caos'."
13270-267 = "Domínio do Caos..."
13270-268 = "Graças à minha adaptação ao 'Trono de Naram-Sin', um espaço onde a existência e a não-existência não estão definidas, consegui detectar a presença dele."
13270-269 = "A identidade dele é o 'Habitante Subterrâneo', da Gematria."
13270-270 = "[s] \"Habitante Subterrâneo...!\""
13270-271 = "Você o conhece, Plana-chan?"
13270-272 = "Negativo. Não conheço o objetivo nem os planos dele."
13270-273 = "...Porém, consegui compreender suas habilidades até certo ponto."
13270-274 = "Parece que ele consegue intervir neste mundo a partir do Domínio do Caos."
13270-275 = "Então, foi ele quem explodiu o Schale...?"
13270-276 = "Sim. Mas, provavelmente, nossa existência é uma irregularidade para ele."
13270-277 = "[s] \"Foi porque a Arona e a Plana estavam lá...\""
13270-278 = "...Sim."
13270-279 = "Sensei, parece que o Habitante Subterrâneo está desafiando você para uma disputa."
13270-280 = "[s] \"Uma disputa...\""
13270-281 = "Não baixe a guarda."
13270-282 = "O Habitante Subterrâneo..."
13270-284 = "Acredito que ele esteja planejando algo usando a Takanashi Hoshino."
13270-285 = "[s] \"O mesmo objetivo do Kuro-fuku, então.\""
13270-286 = "……O alcance daquela habilidade não se limita apenas a Abydos."
13270-287 = "Aquilo é……."
13270-292 = "……Existe a possibilidade de o problema se espalhar por todo o Kivotos."
13270-293 = "Sensei, por favor, pare a Hoshino."
13270-294 = "[s] \"Deixe comigo.\""
13270-297 = "[ns] \"Se eu não parar a Hoshino...\""
13270-298 = "Mas, daqui em diante……."
13270-299 = "A veterana,"
13270-300 = "já pegou o trem e deixou o cânion……."
13270-302 = "Para nós……."
13270-303 = "Como vamos conseguir pará-la……."
13270-304 = "[s] \"Vou entrar em contato com alguém que pode me ajudar.\""
13270-306 = "……?"
13270-307 = "Mas, esse problema……."
13270-308 = "[s1] \"Não é alguém estranha ao assunto, então está tudo bem.\"\n[s2] \"Se for ela, com certeza conseguirá parar a Hoshino.\""
13270-315 = "[ns] \"Preciso da sua ajuda.\""
13270-317 = "Entendido."
13270-318 = "[s] \"Obrigado. A situação é a seguinte…….\""
13270-319 = "Está tudo bem, eu já sei de tudo."
13270-327 = "A veterana Hoshino deve estar voltando agora de trem para a estação de ramal do \"Setor 35-9\"."
13270-328 = "Porque fazer a baldeação lá é a única rota para seguir em direção à #n\"Estação do Grande Oásis\"."
13270-329 = "No entanto…… há uma grande chance de a Kaiser PMC estar esperando por ela lá."
13270-330 = "Lutando por tanto tempo assim, mesmo para a veterana……."
13270-331 = "……Eu acho que ela ficará bem."
13270-332 = "A veterana de agora a pouco não estava usando força total."
13270-333 = "……Mesmo assim, não conseguimos pará-la."
13270-334 = "[s3] \"Vamos atrás da Hoshino.\"\n[s4] \"Vou parar tanto a Hoshino quanto a Suou.\""
13270-337 = "Sim, Sensei."
13270-338 = "……O sol começou a se pôr, não é?"
13270-339 = "Talvez já estejamos no nosso limite…… mas vamos dar o nosso melhor."
13270-340 = "……Hum."
13270-371 = "Onde será que a Kaiser está?"
13270-372 = "……Está silencioso demais."
13270-376 = "Isso mesmo. #nPrimeiro, preciso operar a alavanca da sala de controle para mover o trem."
13270-383 = "……."
13270-384 = "……Quem está aí?"
13270-399 = "Eu estava te esperando, Takanashi Hoshino."
13270-402 = "Ué?"
13270-403 = "Hum... se não me engano, você é a presidente do Comitê Disciplinar de Gehenna, né?"
13270-404 = "Se estiver perdida, quer que eu te ensine o caminho de volta?"
13270-405 = "É impossível destruir aquele trem blindado sozinha. #nProcure outra maneira."
13270-406 = "Heh... mas, o tiozinho aqui sempre resolveu as coisas desse jeito."
13270-407 = "Poderia sair da frente logo? #nNão tenho tempo para lidar com alguém perdida."
13270-411 = "……Entendo."
13270-415 = "Parece que não tenho escolha a não ser te parar à força."
13270-418 = "Entendi."
13270-419 = "Então, não tem jeito."
13270-438 = "……Meu nome é Sorasaki Hina."
13270-444 = "Próximo episódio: Batalha Feroz (1)"
