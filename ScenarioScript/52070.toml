[translation]
52070-1 = "Episódio 7; Terra da Neve"
52070-7 = "Pequena estação perto da Filial Ebisu"
52070-10 = "Ugh... que frio! Não estamos tão longe, por que está tão gelado aqui!?"
52070-15 = "......Por isso eu disse para se agasalhar."
52070-16 = "O ar frio do norte bate nas montanhas desta região e traz neve. #n Dizem até que, neste Distrito Norte, 'as estações mudam ao cruzar as montanhas'."
52070-17 = "Em certo livro, diz que ao atravessar o longo túnel da fronteira――"
52070-22 = "É terra de neve!"
52070-23 = "Nunca vi uma paisagem tão bela antes!"
52070-28 = "Sensei, Sensei! Olha, ali! #n Uma doninha adorável correndo cheia de energia pela neve...!"
52070-29 = "......Você está com o nariz escorrendo. Aqui, um lenço."
52070-33 = "Q, que vexame! Obrigada!"
52070-38 = "......É uma cidade linda. #n Nunca imaginei que houvesse um lugar assim perto do Grande Campo de Neve."
52070-39 = "[s] \"Vocês não passaram por aqui na última vez que vieram?\""
52070-40 = "Daquela vez, eu estava desesperada procurando pela Ayame e segui direto para o norte."
52070-41 = "......Será que teríamos chegado mais rápido se tivéssemos passado pela estação?"
52070-42 = "[s1] \"Atravessar montanhas nevadas a pé... incrível.\"\n[s2] \"Mas é perigoso, não vamos mais fazer isso, ok?\""
52070-45 = "Sim, vou tomar cuidado."
52070-46 = "E então, onde está a Genryou Hyakumonogatari? Vamos esperar até o anoitecer?"
52070-47 = "Se não me engano, a presidente Niya disse que alguém da Filial Ebisu viria nos buscar, né?"
52070-48 = "Chegamos no horário combinado, então deve estar quase na hora..."
52070-53 = "Vocês seriam o pessoal do Comitê de Mediação de Conflitos Hyakkaryouran?"
52070-63 = "Muito prazer, eu estava esperando por vocês."
52070-64 = "Você é da... Filial Ebisu?"
52070-65 = "Sim. #n Sou Azami Habu, presidente do Comitê de Autonomia da Filial Ebisu."
52070-66 = "Digo presidente, mas todos os outros alunos já foram embora."
52070-68 = "Parece ser um trabalho difícil..."
52070-69 = "Proteger a escola completamente sozinha... #n isso é incrível!"
52070-70 = "Fufu, estou lisonjeada."
52070-71 = "Embora, neste lugar remoto, não haja muito o que chamar de trabalho. #n Na verdade, estou sobrando tempo."
52070-75 = "Ah, você deve ser o Sensei [USERNAME] da Schale, correto?"
52070-76 = "A presidente Niya me falou sobre você. #n Que você é alguém com inúmeros feitos notáveis."
52070-77 = "[s] \"Não fiz nada de tão especial.\""
52070-78 = "Sério? #n Ouvi dizer que você possui uma coragem inimaginável..."
52070-79 = "Disseram que você correu por um campo sem vestir um fio de roupa――"
52070-80 = "[s3] \"De onde tiraram isso!?\"\n[s4] \"I, isso tem um motivo...\""
52070-83 = "Fufu, não seja tão modesto."
52070-84 = "Você conteve um grande incêndio, uniu a Hyakkaryouran e derrotou a Hyakumonogatari. #n Esses rumores cruzaram as montanhas e chegaram até aqui."
52070-85 = "Com o Sensei [USERNAME] e o pessoal da Hyakkaryouran, #n acho que podemos exterminar até as histórias de fantasmas daqui."
52070-86 = "Essa assombração... a Genryou Hyakumonogatari, que muda de forma para atacar as pessoas――"
52070-87 = "Onde podemos encontrá-la?"
52070-88 = "Bem... temos relatos de avistamentos por todos os lados..."
52070-89 = "De qualquer forma, acho que não aparecerão até o anoitecer. #n Até lá, que tal visitarmos os locais onde foram vistas?"
52070-90 = "Eu servirei de guia e apresentarei o Distrito Autônomo."
52070-92 = "É, acho que... nós não conhecemos a área mesmo. Conto com você."
52070-95 = "Parece uma nova aventura, estou muito animada!"
52070-96 = "Bem... isso também é uma missão, eu acho."
52070-102 = "[ns] \"Conto com você, Azami.\""
52070-103 = "Sim. Por favor, sigam-me――"
52070-109 = "Rua comercial perto da Filial Ebisu"
52070-112 = "Esta é a rua comercial que os moradores do Distrito Norte usam."
52070-113 = "Não se compara à rua comercial de Hyakkiyako, mas temos associações comerciais e hospedagens também."
52070-119 = "Ara? Esta escultura de flor é de vidro? #n Brilha tanto, parece uma joia...!"
52070-120 = "Essas peças de vidro são uma de nossas especialidades."
52070-121 = "Artesãos que trabalham com vidro há anos fazem cada uma delas à mão."
52070-122 = "Na verdade... quem encontrou a Hyakumonogatari pela primeira vez foi um desses artesãos de vidro. #n Parece que foi quando ele ia para a oficina de madrugada."
52070-123 = "E que forma a Hyakumonogatari tinha naquela hora?"
52070-124 = "Pelo que ouvi, dizem que tinha a aparência de uma doninha branca..."
52070-125 = "......Uma doninha? Não parece nada assustador, parece?"
52070-126 = "Isso é porque......"
52070-132 = "Ah, falando nele, ele chegou."
52070-139 = "Bom dia."
52070-143 = "......Hum? Quem são vocês?"
52070-144 = "Sou Azami Habu, presidente do Comitê de Autonomia da Filial Ebisu. #n Já esqueceu de mim?"
52070-145 = "Ainda tinha alunos lá? #n Ultimamente minha memória anda meio ruim."
52070-146 = "Mas, eu te vi ontem mesmo."
52070-147 = "Queria perguntar sobre aquela assombração que você disse ter visto perto da oficina há duas semanas..."
52070-151 = "Assombração...? Ah! Aquela doninha branca?"
52070-152 = "Claro que lembro! Aquela coisa era muito feroz."
52070-153 = "Lembrei de quando fui mordido por uma doninha na montanha quando era criança... #n aquela coisa é realmente assustadora."
52070-168 = "De madrugada, quando eu ia entrar na oficina... 'Aquilo' entrou na minha visão. #n Levei um susto e derrubei o frasco."
52070-179 = "O vidro se espalhou pelo chão... #n mas ela continuou andando sobre os cacos como se não fosse nada."
52070-180 = "Foi aí que percebi. Aquilo não era uma doninha de verdade."
52070-181 = "......A doninha que ele temia quando era criança."
52070-182 = "Entendi......"
52070-183 = "Ah... que desperdício, quebrar um frasco de vidro tão importante."
52070-184 = "Só de olhar os produtos aqui, dá para ver o cuidado que tiveram..."
52070-188 = "Ah, não se preocupe com isso! #n Aquilo era apenas um frasco de leite comum."
52070-189 = "......Mas você tem um ótimo olhar para reconhecer o valor destas peças, senhorita!"
52070-190 = "Tenho outras aqui dentro. Quer dar uma olhada?"
52070-194 = "Sim, com prazer!"
52070-201 = "Campos de cultivo perto da Filial Ebisu"
52070-202 = "Estes são os campos de cultivo do Distrito Ebisu."
52070-203 = "Milho, batatas, cenouras, etc., usados nos festivais de Hyakkiyako, são todos colhidos nestes campos daqui."
52070-204 = "Acho que os vegetais de Ebisu que comemos em Hyakkiyako também são saborosos... #n mas os vegetais perdem o teor de açúcar logo após a colheita. #n O melhor é sempre o recém-colhido."
52070-208 = "Sendo assim... #n aqui está o milho que acabei de colher agora mesmo. #n Como gostaria de provar?"
52070-209 = "Então, aproveitando a oportunidade......"
52070-216 = "......Ah, é doce! Parece até que tem açúcar!"
52070-217 = "O sabor do milho está super intenso, é muito delicioso!"
52070-218 = "Fufu, fico feliz em poder levar esse sabor a todos vocês."
52070-219 = "......A Hyakumonogatari também apareceu aqui?"
52070-220 = "Sim. #n Parece que este senhor encontrou uma que tinha a forma de um grande urso..."
52070-223 = "Ah, eu vi com meus próprios olhos!"
52070-224 = "Foi no fim de semana passado... senti uma presença enquanto trabalhava no campo, quando me virei, #n tinha um urso me encarando fixamente..."
52070-242 = "Pensei que tivesse vindo destruir o campo de novo, então disparei minha espingarda, #n mas aquela coisa nem se moveu!"
52070-243 = "......Foi aí que percebi que não era um urso de verdade."
52070-245 = "Não existem ursos selvagens que não podem ser derrubados por uma espingarda?"
52070-246 = "Isso não é comum por aqui?"
52070-248 = "Com tanta seca este ano, há poucas castanhas. #n Aqueles que não conseguiram hibernar descem da montanha procurando comida."
52070-249 = "Afinal... #n nossas batatas são mais doces do que batata-doce!"
52070-250 = "Se fizer batata assada na fogueira, #n ursos e assombrações vêm correndo pelo cheiro!"
52070-254 = "Aproveitando, trouxe algumas como lanche. Aceitam também, senhoritas?"
52070-258 = "Sim, aceitamos!"
52070-261 = "Uooooh... cada mordida traz uma doçura intensa... #n isso é realmente batata!?"
52070-262 = "Com essa textura macia... é um doce natural!"
52070-263 = "Hahaha. Fico feliz em vê-las tão felizes!"
52070-264 = "Esperem um pouco, ainda tem mais!"
52070-271 = "Aqui é......"
52070-272 = "O píer. daqui embarcamos os frutos do mar para todos os pontos de Kivotos."
52070-273 = "Os diversos frutos do mar pescados na costa também são um dos produtos especiais do Distrito Ebisu."
52070-274 = "A lula grelhada é o item mais popular nas barracas de festival. #n Com certeza usam a lula daqui."
52070-275 = "......A Hyakumonogatari também foi vista aqui?"
52070-276 = "Sim. Um pescador que terminou o trabalho matinal encontrou um caranguejo-aranha gigante..."
52070-277 = "......Caranguejo-aranha?"
52070-278 = "Pescador com medo de caranguejo?"
52070-279 = "Eu também pensei o mesmo, mas ele disse que parecia uma aranha..."
52070-280 = "Para quem não gosta de insetos, pode ser difícil."
52070-281 = "Não podemos encontrar a testemunha desta vez?"
52070-282 = "Infelizmente, como é hora da pescaria, ele está no mar..."
52070-283 = "Então não tem jeito. #n Não podemos perder muito tempo, vamos para o próximo local――"
52070-284 = "Mas...... #n na verdade, perto daqui, tem uma loja que serve um peixe grelhado muito bom."
52070-285 = "Já está quase na hora do almoço, que tal fazermos uma refeição por aqui?"
52070-287 = "......Peixe grelhado?"
52070-288 = "Sim. Existe um método de cozimento tradicional de Ebisu――"
52070-289 = "Assamos até a pele ficar crocante, depois cobrimos com missô dissolvido e cozinhamos no papel alumínio!"
52070-290 = "A cavala-japonesa, que está na época agora, fica com o missô grudado na pele grossa... #n é realmente um prato requintado!"
52070-291 = "......"
52070-292 = "Mas se não têm tempo, não há o que fazer. #n Na filial, poderíamos preparar alguns onigiris..."
52070-293 = "Estamos andando há muito tempo, acho que seria bom fazer uma pausa por aqui."
52070-297 = "O abastecimento é a base da estratégia militar. Tá na hora do almoço――"
52070-302 = "Hm? Não andamos tanto assim, andamos?"
52070-303 = "Eu estou cansada."
52070-304 = "......De qualquer forma, acho que seria bom descansar um pouco."
52070-305 = "Eu apoio!"
52070-306 = "Acho um pouco questionável, mas... tanto faz. #n Então, vamos encher a barriga!"
52070-314 = "(Depois disso, continuamos a investigação perto da Filial Ebisu, #n mas não conseguimos nenhuma informação conclusiva...)"
52070-315 = "(......Quando percebemos, já tinha anoitecido)"
52070-320 = "......Escureceu."
52070-321 = "Disseram que a Hyakumonogatari aparece depois que escurece, né. #n A investigação de verdade começa agora――"
52070-325 = "Não, não. Não podemos permitir que nossos convidados passem por isso."
52070-326 = "Vocês vieram de tão longe, devem estar cansadas. #n Se quiserem, fiquem à vontade para usar os quartos do dormitório. #n Não há outros alunos, então acho que temos camas suficientes."
52070-327 = "Não, ainda não chegamos a tanto..."
52070-328 = "Ah, é verdade, o dormitório também tem águas termais!"
52070-329 = "São águas termais elegantes e magníficas... #n se quiserem, por favor..."
52070-334 = "Águas termais!?"
52070-335 = "Tem águas termais no dormitório!?"
52070-337 = "Sim. Antigamente, parecia que era usada como um grande banho público por todos os alunos... #n mas agora acabou ficando só para o meu uso."
52070-338 = "Por favor, descansem da viagem. #n Enquanto isso, prepararei algo para o jantar."
52070-339 = "Uuuh! Banho quente com todo o pessoal do Comitê! #n Isso é como um episódio de anime de juventude! Vai rolar guerra de travesseiros à noite!?"
52070-340 = "Pessoal, vamos rápido!"
52070-346 = "Haa...... #n Desculpe ser a estraga-prazeres, mas isso é, antes de tudo, uma missão."
52070-347 = "Eu vou ficar no quarto, então se forem entrar, vão só vocês."
52070-351 = "Hã? Que desanimada."
52070-352 = "Venha com a gente, Kikyou-senpai! #n Meu sonho era tomar um banho com vocês, senpais!"
52070-353 = "Mesmo pedindo assim..."
52070-354 = "De agora em diante, não vou esquecer de escovar os dentes e só vou tomar um sorvete por dia!"
52070-355 = "Você já tinha prometido isso, não tinha?"
52070-360 = "Ki~kyo~u~se~n~pa~i~!"
52070-365 = "......Só uma hora, viu."
52070-366 = "Beleza, resolvido? #n Então, rumo às águas termais!"
52070-367 = "Eu quero beber leite de frutas depois do banho!"
52070-373 = "Querem que eu prepare uma troca de roupa?"
52070-377 = "Ah... sim, por favor."
52070-378 = "Sensei, você não vai descansar ainda?"
52070-379 = "[s5] \"Sim, eu tenho algumas coisas para pensar.\"\n[s6] \"Não se preocupe comigo.\""
52070-382 = "Entendi. Então vamos na frente."
52070-392 = "Haaa... que paraíso, que paraíso."
52070-393 = "Meu corpo está quentinho, e a brisa fria é tão gostosa~..."
52070-394 = "Que vista linda de neve! É romântico~!"
52070-395 = "Além disso, é a primeira vez que entro em um banho tão grande... #n que bom que viemos!"
52070-402 = "......"
52070-403 = "Kikyou, por que você está enrolando?"
52070-404 = "Será que... você tem medo de entrar?"
52070-405 = "O quê!? Uma estrategista da Hyakkaryouran com medo de água――!"
52070-409 = "......N, não se engane. Estou apenas seguindo a etiqueta correta do banho."
52070-410 = "Preciso acostumar o corpo jogando água aos poucos, começando pelos pés. #n Tenho medo de choque térmico."
52070-411 = "Mas pular na água gelada também é divertido!"
52070-412 = "Você não acha, Nagusa-senpai?"
52070-413 = "......Sim. #n O banho está quente e gostoso."
52070-414 = "Sinto como se o cansaço do dia estivesse indo embora."
52070-415 = "......Acho que hoje só fizemos turismo."
52070-416 = "É verdade. #n ......De uma forma ou de outra, alguém aí se divertiu mais do que ninguém."
52070-417 = "Disse alguma coisa?"
52070-418 = "Eu também me diverti muito hoje!"
52070-419 = "A bela paisagem, o momento de conversar com os moradores... #n além disso, tanto o milho quanto a batata e o peixe grelhado, #n estavam deliciosos!"
52070-420 = "Só que......"
52070-421 = "O rosto da Nagusa-senpai parecia meio sombrio..."
52070-422 = "......É?"
52070-423 = "Sim. Desde que chegamos à Filial Ebisu, você estava com uma expressão tensa."
52070-424 = "Estava se lembrando do dia em que foi ao Grande Campo de Neve?"
52070-425 = "Ou sentiu a presença da Hyakumonogatari――"
52070-426 = "Não é nada disso. Não senti presença nenhuma da Hyakumonogatari."
52070-427 = "É que......"
52070-428 = "A assombração que dá forma ao medo de alguém... #n eu me perguntei que forma ela mostraria na minha frente."
52070-429 = "Não importa o que fosse, ou 'quem' fosse... #n eu me perguntei se conseguiria apontar minha arma e puxar o gatilho."
52070-430 = "A existência mais temida... né."
52070-431 = "Supondo que aquela Hyakumonogatari aparecesse... #n Renge, o que você acha que ela mostraria para você?"
52070-432 = "Para mim? O que eu temo...?"
52070-433 = "Hmm... talvez uma marmita com o conteúdo vazando?"
52070-434 = "Hã?"
52070-435 = "Todo mundo já passou por isso pelo menos uma vez, né? #n Você pega sua marmita achando que é o almoço, e... #n o caldo vazou na toalha...! "
52070-436 = "No dia em que a marmita é sopa de missô com carne ou curry... ugh!"
52070-437 = "Eu, um pouco menos sobre a luta contra a caixa de marmita gigante do terror."
52070-438 = "Eu estou falando de algo mais fundamental... não tem outra coisa?"
52070-439 = "Já que estamos falando disso, o que a Kikyou teme?"
52070-440 = "Bem, eu..."
52070-441 = "Eu ouvi dizer!"
52070-442 = "Que se ouvir um show de heavy metal, #n as orelhas e a cauda da Kikyou-senpai ficam em pé...!"
52070-443 = "A Hyakumonogatari com certeza apareceria na forma de uma roqueira escandalosa!"
52070-444 = "Eu não tenho medo de barulhos altos. Eu só não gosto."
52070-445 = "Para começar, uma estrategista da Hyakkaryouran não se assusta com barulhos..."
52070-447 = "......Uau!"
52070-451 = "!!?!?"
52070-452 = "Uau, talvez seja a primeira vez que vejo a Kikyou tão assustada."
52070-457 = "RENGE!!!"
52070-461 = "......Fufu, é verdade."
52070-462 = "Se fosse algo simples de entender assim..."
52070-468 = "Próximo Episódio; Pesadelo"

