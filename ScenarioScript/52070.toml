[translation]
52070-1 = "第7話;雪国"
52070-7 = "エビス分校付近の小さな駅"
52070-10 = "うう……さぶっ！大して離れてないのに、こんな冷えるのか！？"
52070-15 = "……だから着込めって言ったでしょ。"
52070-16 = "北側からの寒気が、この地域の山脈にぶつかって雪を降らせてるの。#nこの北部自治区は「山を境に季節が変わる」って言われてるくらいだよ。"
52070-17 = "とある本では、国境の長いトンネルを抜けると――"
52070-22 = "雪国ですわーっ！"
52070-23 = "こんな美しい景色、初めて見ましたの！"
52070-28 = "先生先生！ほら、あそこですの！#n愛らしいイタチが元気に雪の中を走り回って……！"
52070-29 = "……鼻水出てる。ほら、ハンカチ。"
52070-33 = "ふ、不覚でひゅの！ありがとうございますの！"
52070-38 = "……綺麗な町だね。#n大雪原の近くに、こんなところがあったなんて。"
52070-39 = "[s] \"前来た時は、ここを通らなかったの？\""
52070-40 = "あの時はアヤメを探すことに必死で、ひたすら北を目指してたから。"
52070-41 = "……駅を経由した方が、早く着いてたかな。"
52070-42 = "[s1] \"雪山を徒歩で越えるなんて……すごい。\"\n[s2] \"でも、危ないからもうやめようね。\""
52070-45 = "うん、気をつける。"
52070-46 = "で、幻魎百物語はどこにいるんだよ？日暮れまで待つのか？"
52070-47 = "たしか、ニヤ部長はエビス分校から迎えが来るって言ってたよね。"
52070-48 = "こっちは時間通りに着いたし、そろそろ……。"
52070-53 = "百花繚乱紛争調停委員会の皆さん、ですか？"
52070-63 = "初めまして、お待ちしていました。"
52070-64 = "あなたがエビス分校の……？"
52070-65 = "ええ。#nエビス分校の自治委員会会長――[ruby=はぶ]土生[/ruby]アザミと申します。"
52070-66 = "会長といっても、他の生徒は皆、出ていってしまったのですが。"
52070-68 = "大変そうだな……。"
52070-69 = "たったひとりで学園を守り続けていらっしゃるだなんて、#nすごいですわ！"
52070-70 = "ふふっ、恐縮です。"
52070-71 = "とはいえ、こんな僻地に仕事と呼べるほどのこともありませんから。#n時間を持て余しているくらいですよ。"
52070-75 = "おや、あなたがシャーレの[USERNAME]先生ですね？"
52070-76 = "ニヤ部長から伺っております。#n数えきれないほどの功績をお持ちの方だと。"
52070-77 = "[s] \"大したことはしてないよ。\""
52070-78 = "そうなのですか？#n想像を絶するような胆力をお持ちだと伺っておりますが……。"
52070-79 = "たしか、一糸まとわぬ姿で野原を疾走したとか――"
52070-80 = "[s3] \"すごいってそっち！？\"\n[s4] \"そ、それには理由が……。\""
52070-83 = "ふふ、ご謙遜なさらずに。"
52070-84 = "大火災を収束させ、百花繚乱をまとめ――百物語を討伐した。#nその噂は、山を越えてこちらにも伝わっています。"
52070-85 = "[USERNAME]先生と百花繚乱の皆さんの手にかかれば、#nこの辺りの怪談も一掃できそうですね。"
52070-86 = "その怪異……姿を変えて人を襲う幻魎百物語は――"
52070-87 = "どこに行けば会えるの？"
52070-88 = "そうですね……あちこちで目撃されているのですが……。"
52070-89 = "いずれにしても、日が暮れるまでは出てこないかと。#nそれまでは、目撃情報があった場所を見て回るのはいかがでしょう？"
52070-90 = "自治区の紹介も兼ねて、私がご案内いたします。"
52070-92 = "そうだな……アタシたちは土地勘もないし。頼んだよ。"
52070-95 = "新しい冒険みたいで、身共、うきうきしてきましたの！"
52070-96 = "まぁ……これも、任務か。"
52070-102 = "[ns] \"よろしくね、アザミ。\""
52070-103 = "はい。ではこちらへ――"
52070-109 = "エビス分校近くの商店街"
52070-112 = "ここは北部自治区の住民が利用する商店街です。"
52070-113 = "百鬼夜行の商店街には及びませんが、商会や宿泊施設もありますよ。"
52070-119 = "あら？こちらのお花の彫刻はガラス製ですの？#nきらきらして、まるで宝石みたい……！"
52070-120 = "こちらのガラス細工は、特産品の一つでして。"
52070-121 = "長年ガラス細工に携わってきた職人たちが、一つ一つ手掛けております。"
52070-122 = "実は……最初に百物語と遭遇したのが、そのガラス職人の方でして。#n明け方に工房へ出向いた時にかち合ったとか。"
52070-123 = "そのとき、百物語はどんな姿をしていたの？"
52070-124 = "聞くところによれば、白いイタチのような姿だったとかで……。"
52070-125 = "……イタチ？全然怖くなくないか？"
52070-126 = "それは……。"
52070-132 = "ああ、ちょうどいらっしゃいました。"
52070-139 = "おはようございます。"
52070-143 = "……んん？どちらさんかな？"
52070-144 = "エビス分校の自治委員会会長、土生アザミです。#nもう、お忘れですか？"
52070-145 = "あそこにまだ生徒さんがいたのかい？#nここんとこ、物覚えが悪くなってねぇ。"
52070-146 = "もう、昨日もお会いしましたのに。"
52070-147 = "2週間ほど前、#n工房付近で目撃したという怪異についてお聞きしたいのですが……。"
52070-151 = "怪異……？ああ！あの白いイタチかい？"
52070-152 = "もちろん覚えてるとも！そりゃあ凶暴なやつだった。"
52070-153 = "小さい頃、山でイタチに噛まれたのを思い出したよ……#n本当に、あいつは恐ろしいんだ。"
52070-168 = "明け方頃、工房に入ろうとしたら……「アイツ」が目に入ってな。#nビックリして瓶を落としちまったよ。"
52070-179 = "床にガラスが飛び散ったんだが……#nそれでもアイツは、平気な顔で破片の上を歩いてた。"
52070-180 = "そこで気付いたんだ。こいつは、本物のイタチじゃないってな。"
52070-181 = "……子どもの頃に怖がっていたイタチ。"
52070-182 = "そういうことか……。"
52070-183 = "そんな……大事なガラス瓶が割れてしまうなんて。"
52070-184 = "ここに並ぶ品々を見ただけで、こだわりが伝わってきますのに……。"
52070-188 = "ああ、それなら気にしないでくれ！#nあの時に割れたのはただの牛乳瓶さ。"
52070-189 = "……にしてもこいつの価値に気づくとは、お嬢さん見る目あるね！"
52070-190 = "中に他のもあるぞ。見てみるかい？"
52070-194 = "ええ、喜んで！"
52070-201 = "エビス分校付近の農地"
52070-202 = "ここはエビス自治区の農地になります。"
52070-203 = "百鬼夜行のお祭りに使われるトウモロコシやジャガイモ、#nニンジンなどは、ここら一帯の畑で採れたものなんですよ。"
52070-204 = "百鬼夜行で食べるエビス産の野菜も美味しいとは思いますが……#n作物は収穫したそばから糖度が落ちていくもの。#nやはり一番は採れたてです。"
52070-208 = "と、いうことで……#nこちらに今しがた収穫したトウモロコシがございます。#nいかがですか？"
52070-209 = "じゃあ、せっかくだし……。"
52070-216 = "……あ、甘い！砂糖でもかかってるみたいだ！"
52070-217 = "トウモロコシの風味が全開で、とっても美味しいですの！"
52070-218 = "ふふっ、この味を皆さんにお届けできて、私も嬉しいです。"
52070-219 = "……ここにも百物語が出没したの？"
52070-220 = "ええ。#nこちらのお方が大きなクマの姿をしたものと遭遇したそうで……。"
52070-223 = "ああ、俺はこの目で見た！"
52070-224 = "先週末のことだ……畑仕事中に気配を感じて振り向いたら、#nクマがじっとこっちを見てて……。"
52070-242 = "また畑を荒らしに来たのかと思って猟銃をぶっぱなしたんだが、#nそいつはびくともしねえ！"
52070-243 = "……おかげで、本物のクマじゃないって気づいたんだけどな。"
52070-245 = "野生のクマでも、猟銃で仕留めきれないヤツはいるんじゃない？"
52070-246 = "このあたりじゃ、珍しくないのか？"
52070-248 = "今年は日照り続きでどんぐりや栗が少ないからな。#n冬眠し損ねたやつが、作物を狙って下りてくるんだ。"
52070-249 = "なんたって……#nうちのジャガイモは、サツマイモ顔負けの甘さだからな！"
52070-250 = "焚き火で焼き芋をしたら、#n熊も怪異も匂いに釣られて出てくるってもんよ！"
52070-254 = "せっかくだ。おやつに持ってきたんだが、お嬢ちゃん達もどうだい？"
52070-258 = "ええ、いただきますわ！"
52070-261 = "うおお……一口食べるたびに濃厚な甘さが広がる……#nこれ、ほんとにジャガイモなのか！？"
52070-262 = "もっちりした食感も相まって……これはもう天然のすいーつですの！"
52070-263 = "はっはっは。そんなに喜んでくれると気持ちがいいな！"
52070-264 = "ちょっと待ってろ、まだあるからな！"
52070-271 = "ここは……。"
52070-272 = "船着場です。ここから海産物をキヴォトス各地に出荷しております。"
52070-273 = "近海で獲れるさまざまな海産物も、#nエビス自治区の特産品の一つですからね。"
52070-274 = "お祭りの屋台で一番人気のイカ焼き。#nきっと、ここのイカを使っているはずですよ。"
52070-275 = "……ここでも百物語が目撃されたの？"
52070-276 = "はい。朝の仕事を終えた漁師の方が、巨大なタカアシガニを……。"
52070-277 = "……タカアシガニ？"
52070-278 = "漁師なのに、カニを怖がるの？"
52070-279 = "私もそう思ったのですが、クモに似ていると言われまして……。"
52070-280 = "虫が嫌いな方は、だめかもしれませんね。"
52070-281 = "今回は目撃者の方とお会いできないのですか？"
52070-282 = "残念ながら、今は漁に出ている時間なので……。"
52070-283 = "じゃあしょうがないな。#nあんまりゆっくりもできないし、次の場所に――"
52070-284 = "ですが……#n実はこの近くに、すごく美味しい焼き魚を出すお店があるんです。"
52070-285 = "もうすぐお昼時ですし、この辺りでお食事でもいかがでしょう？"
52070-287 = "……焼き魚？"
52070-288 = "ええ。エビスの伝統的な調理法がありまして――"
52070-289 = "皮がパリッとなるまで焼いた後、溶いた味噌をかけてホイル蒸しにするんです！"
52070-290 = "今が旬のホッケなんかは、肉厚の皮に味噌が絡みついて……#n本当に絶品なんですよ！"
52070-291 = "……。"
52070-292 = "ですが、時間がないのでしたら致し方ありません。#n分校の方で軽くおにぎりなど――"
52070-293 = "ずっと歩きづめだったし、この辺で休憩したほうが良いんじゃないかな。"
52070-297 = "補給は兵法の基本だよ。そろそろお昼に――"
52070-302 = "ん？そんな歩いてないだろ？"
52070-303 = "私は疲れたの。"
52070-304 = "……とにかく。少し休憩するのはどうかな。"
52070-305 = "身共は賛成ですわ！"
52070-306 = "なーんか釈然としないけど……まぁいいや。#nんじゃ、腹ごしらえしよっか！"
52070-314 = "（その後もエビス分校の近くで聞き込みを続けたけれど、#nこれといった情報はつかめず……）"
52070-315 = "（……気づけば日が暮れていた）"
52070-320 = "……暗くなってきたね。"
52070-321 = "百物語は、日が暮れてから出るっていってたよね。#n本格的な調査はこれから――"
52070-325 = "いえいえ。お客様に、そんなご無理はさせられません。"
52070-326 = "遠路はるばるいらっしゃって、お疲れでしょう。#nよろしければ、寮の部屋を好きに使ってください。#n他に生徒はいないので、数は足りると思います。"
52070-327 = "いや、まだそんなには……。"
52070-328 = "そうだ、寮には温泉もありますよ？"
52070-329 = "それはそれは風流で立派な温泉なのですが……#nもし、よろしければ……。"
52070-334 = "温泉！？"
52070-335 = "寮に温泉があるんですの！？"
52070-337 = "ええ。昔は大浴場として全校生徒で使っていたようですが……#n今は私専用になってしまっていたので。"
52070-338 = "どうぞ旅の疲れを癒やしていってください。#nその間に、お食事の用意をしてまいりますので。"
52070-339 = "くぅ～！委員会のみんなで温泉！#nこれって青春の1ページじゃん！夜は枕投げか！？"
52070-340 = "みんな、早く行くよっ！"
52070-346 = "はぁ……。#n水を差すようで悪いけど、あくまでこれは任務。"
52070-347 = "私は部屋にいるから、入るならあんた達だけで行ってきて。"
52070-351 = "え～？ノリ悪いなぁ。"
52070-352 = "ぜひキキョウ先輩も一緒に参りましょう！#n身共は、先輩方と湯浴みをするのが夢だったのです！"
52070-353 = "そんなこと言われても……。"
52070-354 = "これからは歯磨きも忘れませんし、アイスも一日一個にしますから！"
52070-355 = "それは元々約束してたでしょ？"
52070-360 = "キ～キョ～ウ～せ～ん～ぱ～い～！"
52070-365 = "……1時間だけね。"
52070-366 = "よし、話はまとまったな？#nんじゃ、いざ温泉へ！"
52070-367 = "身共、お風呂上がりにふる～つ牛乳が飲みたいですの！"
52070-373 = "お着替えをご用意しましょうか？"
52070-377 = "あ……うん、お願い。"
52070-378 = "先生はまだ休まないの？"
52070-379 = "[s5] \"うん、ちょっと考え事があってね。\"\n[s6] \"私のことは気にしないで。\""
52070-382 = "そっか。じゃあお先に。"
52070-392 = "はぁぁぁ……極楽極楽ぅ。"
52070-393 = "体はポカポカなのに、風が冷たくて気持ちいい～……。"
52070-394 = "なんて美しい雪景色！ろまんちっくですの～！"
52070-395 = "それに、こんな大きなお風呂に入るのも初めてですし……#n来られてよかったですの！"
52070-402 = "……。"
52070-403 = "キキョウ、なにモタモタしてんだ？"
52070-404 = "もしかして……入るのが怖いのか？"
52070-405 = "なっ！？百花繚乱の参謀が水を怖がるわけ――！"
52070-409 = "……か、勘違いしないで。私はお風呂の入り方を守っているだけ。"
52070-410 = "足先から少しずつお湯をかけて慣らしていかないと。#nヒートショックが怖いからね。"
52070-411 = "寒い中飛び込むのも楽しいぞ？"
52070-412 = "ナグサ先輩もそう思わないか？"
52070-413 = "……うん。#nお風呂、温かくて気持ちいいね。"
52070-414 = "なんだか、一日の疲れが流れていくみたい。"
52070-415 = "……今日は観光してただけな気がするけど。"
52070-416 = "だなぁー。#n……なんだかんだで、どっかの誰かさんが一番楽しんでたけど。"
52070-417 = "何か言った？"
52070-418 = "身共も、今日は本当に楽しかったですわ！"
52070-419 = "美しい景色に、住民の皆さまとお話するひととき……#nそれに、トウモロコシもジャガイモも焼き魚も、#nとーってもおいしゅうございました！"
52070-420 = "ただ……。"
52070-421 = "ナグサ先輩のお顔が、なんだか暗いように見えて……。"
52070-422 = "……そう？"
52070-423 = "うん。エビス分校に着いてから、ずっと険しい顔してたよ。"
52070-424 = "大雪原に行った日のことでも思い出してた？"
52070-425 = "それか、百物語の気配を感じたり――"
52070-426 = "そんなんじゃないよ。百物語の気配はしなかった。"
52070-427 = "ただ……。"
52070-428 = "相手の恐怖を形にする怪異は、#n私の前でどんな姿を見せるんだろうって思ったの。"
52070-429 = "それが何であっても、「誰」であっても……#n私は銃口を向けて、引き金を引けるのかなって。"
52070-430 = "最も恐れる存在……ね。"
52070-431 = "仮にその百物語が現れたとして……#nレンゲ、あんたならどんな姿になる思う？"
52070-432 = "アタシか？アタシが怖いもの……。"
52070-433 = "うーん……中身が漏れてる弁当かなあ？"
52070-434 = "はあ？"
52070-435 = "みんなも一回くらいやっただろ？#n昼ご飯だ！って弁当を取り出したら……#n風呂敷きに汁が染みてるやつ……！"
52070-436 = "その日の弁当が豚汁とかカレーだった日には……ううっ！"
52070-437 = "身共、恐怖の巨大弁当箱との戦いは少し……。"
52070-438 = "もっと根源的な怖いものっていうか……他にないの？"
52070-439 = "そう言うキキョウは何が怖いんだよ。"
52070-440 = "そうね、私は……。"
52070-441 = "身共、聞いたことがありますわ！"
52070-442 = "へびぃめたるばんどの演奏を聞くと、#nキキョウ先輩は耳と尻尾がぴーん！となるとか……！"
52070-443 = "百物語も、きっとド派手なろっかぁの姿になりますの！"
52070-444 = "私は大きな音が怖いんじゃないの。嫌いなだけ。"
52070-445 = "第一、百花繚乱の参謀が大きな音なんかで――"
52070-447 = "……わっ！"
52070-451 = "！！？！？"
52070-452 = "おお、こんなビックリしたキキョウ初めてかも。"
52070-457 = "レンゲ！！！"
52070-461 = "……ふふっ、そうだね。"
52070-462 = "そんな風に、分かりやすいものだったのなら……。"
52070-468 = "次回;悪夢"
