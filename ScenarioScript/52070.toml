[translation]
52070-1 = "Episódio 7; País da Neve"
52070-7 = "Pequena estação perto da filial de Ebisu"
52070-10 = "Ugh... que frio! Não estamos tão longe assim, por que está tão gelado aqui!?"
52070-15 = "...Por isso eu disse para você se agasalhar."
52070-16 = "O ar frio do norte bate nas montanhas desta região e causa neve. Dizem que neste distrito do norte, as estações mudam assim que você atravessa as montanhas."
52070-17 = "Em um certo livro, dizia que ao atravessar o longo túnel da fronteira—"
52070-22 = "É um país de neve!"
52070-23 = "É a primeira vez que vejo uma paisagem tão linda!"
52070-28 = "Sensei, Sensei! Olha, ali! Uma doninha adorável correndo alegremente pela neve...!"
52070-29 = "...Seu nariz está escorrendo. Toma, um lenço."
52070-33 = "Q-que descuido o meu! Muito obrigada!"
52070-38 = "...É uma cidade bonita. Eu não sabia que existia um lugar assim perto da grande planície nevada."
52070-39 = "[s] \"Você não passou por aqui quando veio da última vez?\""
52070-40 = "Naquela época, eu estava desesperada procurando pela Ayame, então só foquei em ir para o norte."
52070-41 = "...Será que teria chegado mais rápido se tivesse passado pela estação?"
52070-42 = "[s1] \"Atravessar a montanha nevada a pé... que incrível.\"\n[s2] \"Mas é perigoso, vamos parar com isso.\""
52070-45 = "Sim, vou tomar cuidado."
52070-46 = "E então, onde está o Hyakkiyakou das Cem Histórias? Vamos esperar até o anoitecer?"
52070-47 = "Se não me engano, a Chefe Niya disse que alguém da filial de Ebisu viria nos buscar, certo?"
52070-48 = "Nós chegamos no horário, então já deve estar na hora..."
52070-53 = "Vocês são do Comitê de Mediação de Conflitos Hyakka Ryoran?"
52070-63 = "Muito prazer, eu estava esperando por vocês."
52070-64 = "Você é da filial de Ebisu...?"
52070-65 = "Sim. Meu nome é Habu Azami, presidente do comitê autônomo da filial de Ebisu."
52070-66 = "Embora, sendo presidente ou não, todos os outros alunos já tenham ido embora."
52070-68 = "Deve ser difícil..."
52070-69 = "Proteger a escola sozinha desse jeito... é incrível!"
52070-70 = "Fufu, fico lisonjeada."
52070-71 = "Dito isso, em um lugar tão remoto assim, não há muito o que se chamar de trabalho. Estou até com tempo de sobra."
52070-75 = "Ah, você é o Sensei do Schale, [USERNAME], certo?"
52070-76 = "A Chefe Niya me contou sobre você. Alguém com incontáveis feitos realizados."
52070-77 = "[s] \"Não fiz nada demais.\""
52070-78 = "É mesmo? Ouvi dizer que você possui uma coragem inimaginável..."
52070-79 = "Disseram que você correu pelos campos sem vestir absolutamente nada—"
52070-80 = "[s3] \"É isso que você acha incrível!?\"\n[s4] \"I-isso tem um motivo...\""
52070-83 = "Fufu, não seja tão modesto."
52070-84 = "Conter um grande incêndio, unir o Hyakka Ryoran e derrotar as Cem Histórias. Esses rumores atravessaram as montanhas e chegaram até aqui."
52070-85 = "Com o Sensei [USERNAME] e o pessoal do Hyakka Ryoran, parece que poderemos eliminar os contos de terror desta área também."
52070-86 = "Essas aparições... o Hyakkiyakou das Cem Histórias que muda de forma para atacar as pessoas..."
52070-87 = "Onde podemos encontrá-lo?"
52070-88 = "Bem... eles foram vistos em vários lugares, mas..."
52070-89 = "De qualquer forma, acho que não aparecerão até o anoitecer. Até lá, que tal darmos uma volta pelos locais onde foram vistos?"
52070-90 = "Eu servirei de guia e aproveito para apresentar o distrito."
52070-92 = "É verdade... nós não conhecemos nada por aqui. Contamos com você."
52070-95 = "Parece uma nova aventura, estou muito animada!"
52070-96 = "Bem... isso também faz parte da missão."
52070-102 = "[ns] \"Conto com você, Azami.\""
52070-103 = "Sim. Então, por aqui—"
52070-109 = "Rua comercial perto da filial de Ebisu"
52070-112 = "Esta é a rua comercial usada pelos moradores do distrito do norte."
52070-113 = "Não se compara ao distrito comercial de Hyakkiyako, mas também temos associações comerciais e instalações de hospedagem."
52070-119 = "Ora? Esta escultura de flor é feita de vidro? #nEla brilha tanto, parece até uma joia...!"
52070-120 = "Este trabalho em vidro é um dos nossos produtos especiais."
52070-121 = "Artesãos que trabalham com vidro há muitos anos fazem cada uma delas à mão."
52070-122 = "Na verdade... quem encontrou a Hyakki Monogatari pela primeira vez foi um desses artesãos de vidro. #nDizem que eles se cruzaram quando ele ia para a oficina de madrugada."
52070-123 = "Naquela hora, que aparência a Hyakki Monogatari tinha?"
52070-124 = "Pelo que ouvi dizer, ela tinha a aparência de uma doninha branca..."
52070-125 = "...Uma doninha? Não soa nada assustador, não é?"
52070-126 = "Isso é..."
52070-132 = "Ah, que bom que você chegou."
52070-139 = "Bom dia."
52070-143 = "...Hmm? Quem seria você?"
52070-144 = "Sou Azami Habu, presidente do comitê autônomo da filial de Ebisu. #nJá se esqueceu de mim?"
52070-145 = "Ainda tinha alunos por ali? #nUltimamente, minha memória não anda muito boa."
52070-146 = "Ora, nós nos vimos ontem mesmo."
52070-147 = "Gostaria de perguntar sobre a assombração que você testemunhou perto da oficina há cerca de duas semanas..."
52070-151 = "Assombração...? Ah! Aquela doninha branca?"
52070-152 = "Claro que me lembro! Aquilo era uma criatura feroz."
52070-153 = "Lembrei de quando fui mordido por uma doninha na montanha quando era pequeno... #nSério, aquilo é aterrorizante."
52070-168 = "De madrugada, quando eu ia entrar na oficina... eu vi 'aquilo'. #nLevei um susto e deixei cair uma garrafa."
52070-179 = "O vidro se espalhou pelo chão, mas... #nmesmo assim, ela caminhou sobre os cacos com a maior naturalidade."
52070-180 = "Foi aí que percebi. Aquilo não era uma doninha de verdade."
52070-181 = "...A doninha que você temia quando criança."
52070-182 = "Então é isso..."
52070-183 = "Não acredito... que uma garrafa de vidro tão importante tenha se quebrado."
52070-184 = "Só de olhar para os produtos aqui expostos, dá para sentir o cuidado que vocês têm..."
52070-188 = "Ah, não se preocupe com isso! #nO que quebrou naquela hora foi apenas uma garrafa de leite."
52070-189 = "...Mas você tem um bom olho para notar o valor das peças, senhorita!"
52070-190 = "Tenho outras ali dentro. Quer dar uma olhada?"
52070-194 = "Sim, com prazer!"
52070-201 = "Terras agrícolas perto da filial de Ebisu"
52070-202 = "Estas são as terras agrícolas do distrito de Ebisu."
52070-203 = "O milho, as batatas e as cenouras usadas nos festivais de Hyakkiyako são colhidos nos campos desta região."
52070-204 = "Acho que os vegetais de Ebisu que comemos em Hyakkiyako são deliciosos, mas... #nos produtos agrícolas perdem o teor de açúcar logo após a colheita. #nO melhor mesmo é quando estão fresquinhos."
52070-208 = "Sendo assim... #naqui está um milho que acabei de colher. #nO que acha?"
52070-209 = "Bom, já que insiste..."
52070-216 = "...Ah, é doce! Parece até que jogaram açúcar nele!"
52070-217 = "O sabor do milho está intenso, é delicioso!"
52070-218 = "Fufu, fico feliz em poder compartilhar esse sabor com vocês."
52070-219 = "...A Hyakki Monogatari também apareceu por aqui?"
52070-220 = "Sim. #nDizem que esta pessoa encontrou uma criatura com a forma de um urso enorme..."
52070-223 = "Ah, eu vi com meus próprios olhos!"
52070-224 = "Foi no fim de semana passado... senti uma presença enquanto trabalhava no campo e, quando me virei, #num urso estava parado me encarando..."
52070-242 = "Pensei que ele tinha vindo destruir a plantação de novo e disparei minha espingarda, mas #nele nem se mexeu!"
52070-243 = "...Graças a isso, percebi que não era um urso de verdade."
52070-245 = "Não existem ursos selvagens que não caem com um tiro de espingarda?"
52070-246 = "Isso não é comum por aqui?"
52070-248 = "Este ano houve muita seca e há poucas nozes e castanhas. #nAqueles que não conseguiram hibernar acabam descendo para buscar comida."
52070-249 = "Afinal... #nnossas batatas são tão doces que fazem até a batata-doce passar vergonha!"
52070-250 = "Se a gente assar batatas na fogueira, #naté ursos e assombrações aparecem atraídos pelo cheiro!"
52070-254 = "Já que estamos aqui. Eu trouxe isso de lanche, as senhoritas gostariam de um pouco?"
52070-258 = "Sim, aceitamos com prazer!"
52070-261 = "Uau... a cada mordida, uma doçura intensa se espalha...#nIsso é mesmo batata!?"
52070-262 = "Com essa textura macia e elástica... isso já é um doce natural!"
52070-263 = "Hahaha. É muito bom ver vocês tão felizes!"
52070-264 = "Esperem um pouco, ainda tem mais!"
52070-271 = "Aqui é..."
52070-272 = "É o cais. É daqui que enviamos frutos do mar para várias partes de Kivotos."
52070-273 = "Os diversos frutos do mar pescados nas águas próximas também são um dos produtos especiais do Distrito de Ebisu."
52070-274 = "A lula grelhada, que é a mais popular nas barracas dos festivais.#nCom certeza, eles usam as lulas daqui."
52070-275 = "...A Centésima História também foi vista por aqui?"
52070-276 = "Sim. Um pescador, depois de terminar o trabalho matinal, viu um caranguejo-aranha gigante..."
52070-277 = "...Um caranguejo-aranha?"
52070-278 = "Sendo um pescador, ele tem medo de caranguejos?"
52070-279 = "Eu também pensei o mesmo, mas ele disse que parecia uma aranha..."
52070-280 = "Para quem não gosta de insetos, talvez seja um problema."
52070-281 = "Não podemos encontrar a testemunha desta vez?"
52070-282 = "Infelizmente, agora é o horário em que ele está pescando..."
52070-283 = "Então não tem jeito.#nNão podemos ficar parados por muito tempo, vamos para o próximo lugar—"
52070-284 = "Mas...#nNa verdade, perto daqui, tem um restaurante que serve um peixe grelhado delicioso."
52070-285 = "Já está quase na hora do almoço, que tal fazermos uma refeição por aqui?"
52070-287 = "...Peixe grelhado?"
52070-288 = "Sim. Existe um método de preparo tradicional de Ebisu—"
52070-289 = "Depois de grelhar até a pele ficar crocante, cobrimos com missô dissolvido e cozinhamos no papel alumínio!"
52070-290 = "O peixe-gelo, que está na época agora, fica com o missô impregnado na pele grossa...#nÉ realmente uma iguaria!"
52070-291 = "..."
52070-292 = "Mas, se não tiverem tempo, não há o que fazer.#nPodemos comer apenas um onigiri na filial—"
52070-293 = "Andamos o dia todo, acho que seria bom descansar um pouco por aqui."
52070-297 = "O reabastecimento é a base da estratégia militar. Já está na hora do almoço—"
52070-302 = "Hm? A gente nem andou tanto assim, né?"
52070-303 = "Eu estou cansada."
52070-304 = "...De qualquer forma. Que tal descansarmos um pouco?"
52070-305 = "Eu concordo!"
52070-306 = "Ainda não estou convencida, mas... tudo bem.#nEntão, vamos encher a barriga!"
52070-314 = "(Depois disso, continuamos perguntando por perto da filial de Ebisu, mas não conseguimos nenhuma informação relevante...)"
52070-315 = "(...Quando percebi, o sol já tinha se posto.)"
52070-320 = "...Está ficando escuro."
52070-321 = "Disseram que a Centésima História aparece depois que o sol se põe, né?#nA investigação de verdade começa agora—"
52070-325 = "Não, não. Não posso deixar que os clientes façam tal esforço."
52070-326 = "Vocês vieram de tão longe, devem estar cansados.#nSe quiserem, fiquem à vontade para usar os quartos do dormitório.#nComo não há outros alunos, acho que há espaço suficiente."
52070-327 = "Não, ainda não estamos tão..."
52070-328 = "Ah, verdade, o dormitório também tem uma fonte termal, sabia?"
52070-329 = "É uma fonte termal muito elegante e maravilhosa, mas...#nSe vocês quiserem..."
52070-334 = "Fonte termal!?"
52070-335 = "Tem uma fonte termal no dormitório!?"
52070-337 = "Sim. Antigamente, era usada como um grande banho público por todos os alunos...#nMas agora acabou ficando só para meu uso."
52070-338 = "Por favor, aproveitem para curar o cansaço da viagem.#nEnquanto isso, vou preparar a refeição."
52070-339 = "Uau~! Todas nós do comitê na fonte termal!#nIsso é uma página da juventude! Será que vai ter guerra de travesseiros à noite!?"
52070-340 = "Pessoal, vamos logo!"
52070-346 = "Ah...#nDesculpe estragar o clima, mas isso é uma missão, acima de tudo."
52070-347 = "Eu vou ficar no quarto, então se quiserem ir, vão vocês."
52070-351 = "Hã~? Que desânimo, hein."
52070-352 = "Por favor, Kikyou-senpai, venha conosco!#nÉ o meu sonho tomar um banho com as veteranas!"
52070-353 = "Mesmo que você diga isso..."
52070-354 = "De agora em diante, não vou esquecer de escovar os dentes e só vou tomar um sorvete por dia!"
52070-355 = "Isso já era algo que tínhamos combinado, não era?"
52070-360 = "Ki~kyou~-sen~pai~!"
52070-365 = "……Só por uma hora, está bem?"
52070-366 = "Beleza, assunto encerrado?#nEntão, vamos para a fonte termal!"
52070-367 = "Eu quero beber leite de frutas depois do banho!"
52070-373 = "Quer que eu prepare uma muda de roupa para você?"
52070-377 = "Ah... sim, por favor."
52070-378 = "Sensei, você não vai descansar ainda?"
52070-379 = "[s5] \"Sim, estou pensando em algumas coisas.\"\n[s6] \"Não se preocupe comigo.\""
52070-382 = "Entendi. Então, vou indo na frente."
52070-392 = "Ahhh... que paraíso, que paraíso."
52070-393 = "Meu corpo está quentinho, mas o vento frio é tão gostoso..."
52070-394 = "Que paisagem nevada linda! É tão romântico!"
52070-395 = "Além disso, é a primeira vez que entro em um banho tão grande...#nQue bom que pude vir!"
52070-402 = "……."
52070-403 = "Kikyou, por que está enrolando tanto?"
52070-404 = "Será que... você está com medo de entrar?"
52070-405 = "O quê!? A estrategista da Hyakkiyako ter medo de água, jamais――!"
52070-409 = "……N-não entenda errado. Eu só estou seguindo as regras de como entrar no banho."
52070-410 = "Preciso molhar o corpo aos poucos, começando pelos pés, para me acostumar.#nO choque térmico é perigoso, sabe."
52070-411 = "Mas pular no meio do frio também é divertido, não é?"
52070-412 = "Nagusa-senpai, você não acha?"
52070-413 = "……Sim.#nO banho está quente e é muito bom."
52070-414 = "Sinto como se o cansaço do dia estivesse indo embora."
52070-415 = "……Embora eu sinta que hoje só fizemos turismo."
52070-416 = "Pois é.#n...Mas, no fim das contas, alguém aí foi quem mais se divertiu."
52070-417 = "Disse alguma coisa?"
52070-418 = "Eu também me diverti muito hoje!"
52070-419 = "A paisagem linda, o momento de conversar com os moradores...#ne além disso, o milho, a batata e o peixe assado...#nestavam todos deliciosos!"
52070-420 = "Só que..."
52070-421 = "O rosto da Nagusa-senpai parecia um pouco sombrio..."
52070-422 = "……Sério?"
52070-423 = "Sim. Desde que chegamos à filial de Ebisu, você estava com uma expressão tensa."
52070-424 = "Estava lembrando do dia em que fomos à grande planície nevada?"
52070-425 = "Ou talvez sentindo a presença dos Cem Contos――"
52070-426 = "Não é nada disso. Não senti a presença dos Cem Contos."
52070-427 = "É só que..."
52070-428 = "Fiquei pensando em que forma aquela assombração, que materializa o medo do oponente,#nassumiria na minha frente."
52070-429 = "Não importa o que seja, ou \"quem\" seja...#nEu me pergunto se conseguiria apontar minha arma e puxar o gatilho."
52070-430 = "A existência que mais tememos... é."
52070-431 = "Supondo que esses Cem Contos aparecessem...#nRenge, que forma você acha que eles tomariam?"
52070-432 = "Eu? O que eu temo..."
52070-433 = "Hum... talvez uma marmita vazando?"
52070-434 = "Hã?"
52070-435 = "Todo mundo já passou por isso pelo menos uma vez, né?#nQuando você vai pegar a marmita pensando \"hora do almoço!\"...#ne o caldo está todo encharcado no pano de embrulho...!"
52070-436 = "Nos dias em que a marmita era sopa de missô com carne ou curry... ugh!"
52070-437 = "Para mim, a batalha contra a terrível marmita gigante é um pouco..."
52070-438 = "Não tem algo mais... fundamentalmente assustador?"
52070-439 = "E você, Kikyou, o que te dá medo?"
52070-440 = "Bem, eu..."
52070-441 = "Eu já ouvi falar sobre isso!"
52070-442 = "Dizem que quando a Kikyou-senpai ouve uma banda de heavy metal, as orelhas e a cauda dela ficam em pé!"
52070-443 = "Com certeza, na Hyakki Yakou, ela deve se transformar em uma roqueira super chamativa!"
52070-444 = "Eu não tenho medo de barulhos altos. Eu só não gosto deles."
52070-445 = "Além disso, a estrategista da Hyakka Ryoran não se assustaria com algo como um barulho alto—"
52070-447 = "……Ah!"
52070-451 = "！！？！？"
52070-452 = "Nossa, acho que é a primeira vez que vejo a Kikyou levar um susto desses."
52070-457 = "RENGE!!!"
52070-461 = "……Hehe, é verdade."
52070-462 = "Se fosse algo tão simples de entender assim..."
52070-468 = "Próximo episódio: Pesadelo"
