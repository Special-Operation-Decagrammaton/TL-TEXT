[translation]
10008045-2 = "Haa, haa, haa..."
10008045-3 = "Uff..."
10008045-4 = "Não, não, não, não!! Que situação é essa? Isso não está nada certo, não acha!?"
10008045-5 = "De onde é que esse povo todo está brotando? Parece até aquela coisa na cozinha...!!"
10008045-6 = "O que deu neles? Passaram mel na caixa de oferendas ou algo assim...?"
10008045-7 = "Não é como se fossem besouros..."
10008045-8 = "[s] \"Pessoal, parece que eles estão atrás da caixa de oferendas...\""
10008045-9 = "Sim. O que me intriga é como todo mundo ficou sabendo que a \"caixa de oferendas foi roubada\"..."
10008045-10 = "A informação se espalhou rápido demais, como se tivesse sido noticiada em rede nacional..."
10008045-12 = "...Ah, não pode ser!?"
10008045-13 = "Hm? O que foi, garota do bico?"
10008045-14 = "Espere um pouco... Se não me engano, alguém do Departamento de Notícias de Chronos passou por aqui hoje..."
10008045-15 = "Talvez, só talvez, tenha vindo de lá..."
10008045-20 = "...Eu sabia!"
10008045-21 = "A informação está nas redes sociais!"
10008045-25 = "Então, adios!"
10008045-30 = "Vocês viram isso!? As imagens que acabaram de ver mostram o roubo da caixa de oferendas que aconteceu agora pouco no santuário \"Daikichi-den\"!"
10008045-31 = "O perigoso criminoso procurado, \"Kaitenger\", continua foragido com a caixa de oferendas!"
10008045-32 = "E sobre essa caixa de oferendas, confiram mais uma vez a entrevista com o administrador do \"Daikichi-den\"!"
10008045-34 = "É imperdoável,"
10008045-35 = "Nossa caixa de oferendas..."
10008045-36 = "Não é só pelo dinheiro, mas acima de tudo, aquela caixa está cheia dos desejos de todos vocês!"
10008045-37 = "Não podemos deixar isso assim...!"
10008045-38 = "O mais importante é a própria caixa, que está repleta de desejos!"
10008045-39 = "Sendo assim, para quem capturar o Kaitenger..."
10008045-40 = "Nós daremos todo o dinheiro que estiver dentro da caixa de oferendas!"
10008045-45 = "Viram só? Pode parecer um pouco imprudente, mas será que é aquele caso de \"o desespero faz o homem agir\"!? Assim começou essa perseguição logo no primeiro dia do ano, uma competição acirrada e frenética por uma caixa de oferendas que estima-se conter 8 dígitos!"
10008045-46 = "Não há requisitos para participar, é uma chance igual para todos!"
10008045-47 = "Sinto que um castigo divino terrível pode cair sobre vocês, mas... bem, isso fica por conta e risco de cada um!"
10008045-48 = "Nós, do Departamento de Notícias de Chronos, estamos aqui apenas para relatar os fatos!"
10008045-52 = "Logo no início do ano, que grande furo de reportagem!"
10008045-53 = "Então, vocês que não temem o castigo divino e assumem os riscos, participem desta corrida pela ganância!!"
10008045-54 = "E agora, qual será o destino da caixa de oferendas!?"
10008045-55 = "Se quiserem saber os próximos capítulos, não deixem de se inscrever no canal do Departamento de Notícias de Chronos,"
10008045-56 = "curtir o vídeo e ativar as notificações! A verdade e os fatos estão sempre ao seu lado!"
10008045-59 = "O QUE VOCÊS ESTÃO FAZENDO, SEUS IDIOTASSSS!?!"
10008045-60 = "Então é isso... Por isso tem tanta gente aparecendo."
10008045-61 = "Ah, "
10008045-62 = "então parece que isso está longe de acabar, né?"
10008045-64 = "As coisas estão tomando um rumo estranho..."
10008045-68 = "Nesse caso, vamos pedir reforços...!"
10008045-72 = "ESPERA AÍ!!"
10008045-73 = "...Hã?"
10008045-74 = "O que foi, Aru-chan? Não é bom ter mais gente ajudando? Ou será que é porque a parte do dinheiro vai diminuir?"
10008045-78 = "Nós vamos recuperar a caixa de oferendas e devolvê-la exatamente onde estava."
10008045-79 = "E o dinheiro dentro dela também, vamos deixar como está!!"
10008045-81 = "...!?"
10008045-82 = "..."
10008045-83 = "Mas por que isso? Sendo que o próprio administrador disse que podíamos ficar com ele."
10008045-85 = "...Fufu, escute bem, Chefe Mutsuki."
10008045-86 = "Se nós agíssemos por motivos tão triviais assim, o que você acha que aconteceria com a imagem da 'Problem Solver 68'?"
10008045-87 = "Sem estilo, sem classe e sem orgulho, seríamos iguais a amadores de terceira categoria. Eu não posso permitir isso."
10008045-88 = "Além disso, se não conseguirmos resolver algo desse nível por conta própria e tivermos que pedir ajuda..."
10008045-89 = "Isso mancharia o nome da nossa agência! Nós vamos resolver isso com as nossas próprias mãos!"
10008045-90 = "Esta é uma ordem da presidente, e não vou voltar atrás, não importa o que digam."
10008045-95 = "……Bem, se é uma ordem da presidente, não tem jeito."
10008045-96 = "I-Isso é o que significa ser 'hard-boiled'……?"
10008045-97 = "Bem,"
10008045-98 = "se a Aru-chan acha que está tudo bem, então acho que faremos assim."
10008045-100 = "……Mandou bem com esse argumento lógico. Sua presidente é boa nisso."
10008045-101 = "Além disso, bem, não é legal e estiloso?"
10008045-102 = "……Certo, eu topo."
10008045-103 = "Bem, eu também não poderia aceitar as oferendas que todos fizeram com desejos de Ano Novo... contanto que eu receba meu pagamento pelo trabalho, por mim tudo bem."
10008045-104 = "De qualquer forma, as veteranas devem estar dormindo por causa do Ano Novo e não vão acordar com apenas uma mensagem... Certo, então vamos resolver isso logo!"
10008045-105 = "[s] \"Sim. Então, vamos recomeçar a perseguição.\""
10008045-109 = "E se algo for 'contaminado'……?"
10008045-111 = "E se algo for 'contaminado'……?"
10008045-113 = "E se algo for 'contaminado'……?"
10008045-114 = "(D-de qualquer forma, antes que essa confusão toda acabe causando uma contaminação……!)"
10008045-115 = "R-rápido! Vamos persegui-los imediatamente!!"
