[translation]
10008045-2 = "はあ、はあ、はぁ……。"
10008045-3 = "ふぅ……。"
10008045-4 = "っていやいやいや！！何よこの状況、流石に何かおかしいんじゃない！？"
10008045-5 = "一体全体どこから湧いてくるのよ、まるでキッチンのあれみたいに……！！"
10008045-6 = "何なのよもう、賽銭箱に蜂蜜でも塗られてるわけ……？"
10008045-7 = "カブトムシじゃないんだから……。"
10008045-8 = "[s] \"みんな、賽銭箱を狙ってるみたいだけど……。\""
10008045-9 = "うん。気になるのは、どうして「賽銭箱が盗まれてること」をみんな知ってるのかっていう……。"
10008045-10 = "情報が流れるのが早すぎる、まるで大々的に報道でもされたみたいに……。"
10008045-12 = "……あっ、まさか！？"
10008045-13 = "ん？どしたのバイトちゃん？"
10008045-14 = "ちょっと待って……確か今日、クロノス報道部の誰かが来てたような……。"
10008045-15 = "もしかしたらだけど、そこから……。"
10008045-20 = "……やっぱり！"
10008045-21 = "SNSに情報が出てる！"
10008045-25 = "では、アディオス！"
10008045-30 = "ご覧いただけましたでしょうか！？今の映像はつい先ほど「大吉殿」の会場で起きた、賽銭箱強奪事件の様子です！"
10008045-31 = "凶悪な指名手配犯「カイテンジャー」は、現在も賽銭箱を持って逃走しています！"
10008045-32 = "そしてこの賽銭箱に関しまして、続けてもう一度「大吉殿」の管理人さんのインタビューをご覧ください！"
10008045-34 = "許せません、"
10008045-35 = "私共の賽銭箱が……！"
10008045-36 = "中身もそうですが、何よりもあの賽銭箱には、みなさんの願いごとが詰まっているのです！"
10008045-37 = "このまま放っておくわけにはいきません……！"
10008045-38 = "何より大事なのは、願いが詰まったあの賽銭箱そのもの！"
10008045-39 = "ということで、あのカイテンジャーを捕まえた方には……"
10008045-40 = "その賽銭箱の中のお金を、全て差し上げましょう！"
10008045-45 = "ご覧いただけましたか？やや不謹慎な気もしてしまいますが、「背に腹は代えられない」とはこのことでしょうか！？そうして元日から始まったこの追撃戦、推定約8桁の賽銭箱を求めて争う新年早々白熱の大競争！"
10008045-46 = "参加者の資格などはありません、誰にとってもある意味平等なチャンス！"
10008045-47 = "何だか、とんでもない天罰が下る気もしますが……まあ、その辺りは自己責任でお願いします！"
10008045-48 = "私たちクロノス報道部は、あくまで事実をお伝えするまでです！"
10008045-52 = "新年早々、中々の特ダネですね！"
10008045-53 = "ではでは、自己責任で罰当たりな皆さんはどうぞこの欲望のレースにご参加ください！！"
10008045-54 = "さあ、賽銭箱の行方や如何に！？"
10008045-55 = "この続報が気になる方は、ぜひクロノス報道部のチャンネル登録、"
10008045-56 = "高評価、通知のONをお願いいたします！真実と事実は、いつもみなさんのすぐそばに！"
10008045-59 = "何やっちゃってくれてるのよおおぉぉぉ！？！？"
10008045-60 = "そういうことか……それでこんなにわらわらと。"
10008045-61 = "あはっ、"
10008045-62 = "じゃあまだまだこんなもんじゃなさそうだね？"
10008045-64 = "何か変な流れになってきたわね……。"
10008045-68 = "こうなったら、協力を要請して……！"
10008045-72 = "ちょっと待ったぁぁっ！！"
10008045-73 = "……え？"
10008045-74 = "どしたのアルちゃん？協力してくれる数が多いのは良いことじゃない？もしかして、お金の分け前が減るから？"
10008045-78 = "賽銭箱は取り返す、それで元の場所にそのまま戻すわ。"
10008045-79 = "賽銭箱のお金も、そのままにね！！"
10008045-81 = "……！？"
10008045-82 = "……。"
10008045-83 = "それまたどうして？わざわざあの管理人が良いよって言ってたのに。"
10008045-85 = "……ふふっ、聞きなさいムツキ室長。"
10008045-86 = "私たちがそんなくだらない理由のために動いていたら、「便利屋68」のイメージはどうなると思う？"
10008045-87 = "風格も無ければ品格も無い、プライドも無いとなっては三流も同然よ。そんなの、私は許せない。"
10008045-88 = "それに、これしきのことが私たちの手で解決できず、助けを求めるだなんて……"
10008045-89 = "そんなの、私たち便利屋の名が廃るわ！これくらい私たちの手で解決してみせる！"
10008045-90 = "これは社長命令よ、何を言われても覆さないわ。"
10008045-95 = "……まあ、社長命令なら仕方ない。"
10008045-96 = "そ、それがハードボイルドなんでしょうか……？"
10008045-97 = "まっ、"
10008045-98 = "アルちゃんがそれで良いならそうしよっかな。"
10008045-100 = "……ここで正論とか、やるじゃん。あんたたちの社長。"
10008045-101 = "それに、まあカッコよくて良いんじゃない？"
10008045-102 = "……うん、乗った。"
10008045-103 = "まあ、私もみんなが新年の願いを込めたお賽銭を貰うわけにはいかないし……とりあえず、バイト代だけちゃんと貰えれば。"
10008045-104 = "どうせ先輩たちは年明けで寝てるだろうし、さっきのメッセージ一個じゃ起きないだろうし……よし、じゃあ私たちでさっさと解決しよう！"
10008045-105 = "[s] \"うん。じゃああらためて、追いかけよっか。\""
10008045-109 = "「穢れ」が付いたりしたら……？"
10008045-111 = "「穢れ」が付いたりしたら……？"
10008045-113 = "「穢れ」が付いたりしたら……？"
10008045-114 = "（と、とにかく、このごたごたに乗じて穢れが付いちゃう前に……！）"
10008045-115 = "は、早く！急いで追撃するわよ！！"
