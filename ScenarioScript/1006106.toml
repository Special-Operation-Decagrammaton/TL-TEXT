[translation]
1006106-1 = "意外な趣味"
1006106-2 = "（相談に乗るため、サクラコのいる聖堂の執務室へと向かった）"
1006106-6 = "いらっしゃいましたか、先生。"
1006106-12 = "個人的な事情だったにもかかわらず、ここまでお越しいただいて、ありがとうございます。"
1006106-13 = "本来なら私が訪ねるべきでしたが、今どうしても席を外せなくて……"
1006106-14 = "[s1] \"いいよ、仕事があるからだよね？\"\n[s2] \"大丈夫だよ、分かってるから。\""
1006106-17 = "……ありがとうございます、先生。"
1006106-21 = "では、これ以上先生の時間を奪うのは避けたいので、すぐ本論に入りましょう。"
1006106-22 = "つまりこれは……「趣味」に関したお話です。"
1006106-23 = "[s] \"趣味？\""
1006106-24 = "ええ。少し前、そのような質問を頂いたんです。"
1006106-25 = "あるシスターの方のお話を聞いていたところ、趣味の時間が減ったことが悩みと仰っていまして……"
1006106-26 = "そのシスターの方から「趣味は何ですか」と聞かれたのです。"
1006106-27 = "そして私は、答えられませんでした。"
1006106-28 = "そうするしか、なかったのです。実際、趣味と呼べるものは無く……"
1006106-29 = "趣味というものがどういうものなのかも、よく分かりません。"
1006106-30 = "他の方々に趣味があるからといって、私も合わせる必要はないことは頭で分かっています。"
1006106-31 = "それでもやはり……"
1006106-32 = "[s3] \"他の人を理解するためにも、\"\n[s4] \"その感情について知りたいんだね。\""
1006106-35 = "はい――ですので、これは私の話ではありません。"
1006106-36 = "私の一日は決まっていて、時間が余ることはないので。"
1006106-37 = "たとえ時間ができたとしても、聖堂の行事やシスターの皆様の日程を振り返ったりします。"
1006106-38 = "時間に追われながらやるものではありませんし、これを負担に思うこともありません。"
1006106-39 = "……その、先生。"
1006106-45 = "時間ができた時のことや、趣味について教えていただきたいです。"
1006106-46 = "先生は、私よりも忙しい日程をこなしつつ、熱中できる趣味もお持ちだと聞きました。"
1006106-47 = "なので、どのようにして趣味を持つのか、なぜ趣味を求めるのかを――"
1006106-48 = "――はい？"
1006106-49 = "目的や意味のある行為ではなく、習慣……ですか？"
1006106-53 = "……なるほど、そうですか。"
1006106-54 = "趣味とは……意識的に自分を癒したり、新たな自我を得るために行なうものだと思っていました。"
1006106-55 = "想像よりも、無意識的なものなのですね。少し分かりそうな気がします。"
1006106-56 = "私の趣味も……もしかすると、"
1006106-57 = "[s] \"最近の行動を思い出してみて。\""
1006106-61 = "[ns5] \"無意識にやっていたこととか、\"\n[ns6] \"目的や意味を持たずに行なったこと。\""
1006106-66 = "なるほど……"
1006106-67 = "無意識に取っていた行動や、意味もなくやってきたこと……"
1006106-68 = "業務中の合間にできた待ち時間や、移動中の時間ということでしょうか。"
1006106-69 = "そういう時間でしたら……"
1006106-70 = "主に先生にモモトークを送ったり、"
1006106-71 = "思い浮かんだ話題を、先生に伝えてみたり……"
1006106-72 = "悩みがある時、相談を申し入れたり……"
1006106-73 = "していたと、思いま――"
1006106-74 = "……"
1006106-84 = "[ns7] \"……サクラコ？\"\n[ns8] \"どうしたの？\""
1006106-89 = "あ……えっと、"
1006106-90 = "も、申し訳ありません……"
1006106-94 = "……その、先生。"
1006106-95 = "本当に申し訳ありませんが、このお話はここまでにしてもよろしいでしょうか？"
1006106-96 = "その……答えは出せたと思います。ただ、少し一人の時間が欲しくて……"
1006106-97 = "前置きも無しに、無礼な行動ということも重々承知ですが、"
1006106-98 = "どうかご理解をいただきたく……"
1006106-99 = "きょ、今日は……"
1006106-100 = "ここまでで、お願いします……"
1006106-105 = "[ns] \"…………。\""
1006106-107 = "[ns] \"……？？？\""
1006106-109 = "（なぜかバツの悪そうな顔をしたサクラコに見送られながら、大聖堂を後にした）"
