[translation]
10035040-1 = "Episódio 4; A piscina de ondas é cheia de perigos!"
10035040-3 = "Muito bem. Já dei uma olhada geral nas instalações. Esse aquecimento já é o suficiente."
10035040-4 = "Hehe, então vamos começar pela piscina de ondas?"
10035040-5 = "Ah, vou me divertir pra valer...!"
10035040-8 = "Aos visitantes do parque aquático de maior escala de Kivotos, #n\"Aegir\", agradecemos a paciência."
10035040-9 = "Daremos início agora à nossa orgulhosa \"Piscina de Ondas\"."
10035040-10 = "Por favor, aproveitem o tempo nesta piscina que reproduz as ondas da beira-mar!"
10035040-11 = "...A seguir, um aviso operacional. Três salva-vidas da piscina infantil, #nmudança de posto. Dirijam-se imediatamente para a piscina de ondas."
10035040-13 = "...É o que dizem."
10035040-14 = "De novo para a área externa... ah, que canseira."
10035040-15 = "A culpa é minha... Sinto muito mesmo."
10035040-16 = "Não, eu não estava falando com o chefe."
10035040-17 = "Estava falando daquele dono que explora a gente!"
10035040-18 = "Está tudo bem! Chefe! É só um pequeno erro."
10035040-19 = "Eu também já deixei um fugitivo escapar uma vez, mas... #nno fim, tudo se resolveu! Quem ri por último, ri melhor!"
10035040-20 = "[s1] (Com certeza, acho que algo assim aconteceu mesmo...)\n[s2] (Deixar um fugitivo escapar é um pouco demais...)"
10035040-23 = "Bem, é um saco, mas... #nhoje somos salva-vidas aqui, então temos que fazer o que mandam."
10035040-24 = "Então, vamos nessa."
10035040-27 = "Uau! É muito grande!"
10035040-28 = "Parece até que reproduziram uma praia de verdade!"
10035040-29 = "Tem muita gente também, hein."
10035040-30 = "Por isso, o número de salva-vidas vigiando também é alto."
10035040-31 = "Parece que precisaremos cooperar com o resto do pessoal."
10035040-35 = "Vocês são os que vieram dar apoio, né? #nComo aqui é grande, mantenham o maior espaço possível entre vocês e os outros salva-vidas!"
10035040-36 = "Vamos, assumam seus postos logo! Os clientes não param de chegar!"
10035040-37 = "Aqui é cada um por si, então!"
10035040-38 = "Chefe, Fubuki, vamos dar o nosso melhor!"
10035040-39 = "Sensei também! Nos vemos na hora do intervalo!"
10035040-43 = "Não corram muito, hein~ #nPrecisamos economizar energia."
10035040-44 = "Bom, acho que vou indo também."
10035040-49 = "Cada um por si, é."
10035040-50 = "Espero que algo como o que aconteceu antes não se repita..."
10035040-51 = "[s3] \"A criança de antes só deve ter se assustado.\"\n[s4] \"A criança de antes só deve ter ficado com vergonha.\""
10035040-54 = "Obrigada, Sensei."
10035040-55 = "Mas, o fato de aquela criança ter chorado provavelmente foi minha culpa."
10035040-56 = "Fui eu quem a assustou..."
10035040-57 = "Ei, vocês! Movam-se logo!"
10035040-58 = "Por enquanto, devemos nos concentrar na missão."
10035040-59 = "Para não incomodar os usuários o máximo possível... #nvou ficar responsável pela parte mais funda da piscina."
10035040-63 = "[ns] \"...\""
10035040-65 = "Glup! Glup!"
10035040-66 = "A-ajuda!"
10035040-67 = "Sim, sim, calma."
10035040-68 = "Segure nesta boia~"
10035040-69 = "Cof! P-peguei!"
10035040-70 = "Então, vamos lá~"
10035040-73 = "Prontinho, chegamos."
10035040-74 = "S-salvo... Muito obrigado...!"
10035040-75 = "Não vá para lugares muito fundos, viu."
10035040-77 = "Hum-hum-hum~♪"
10035040-78 = "Ah! Você aí, cliente!"
10035040-79 = "É proibido o uso de aparelhos eletrônicos na piscina!"
10035040-80 = "Hã? Quer saber que música estou ouvindo?"
10035040-81 = "É 'Rock the City', do Death Angels."
10035040-82 = "N-não é sobre o nome da música...!"
10035040-83 = "Por favor, tire os fones de ouvido dentro da piscina!"
10035040-84 = "Existe o risco de choque elétrico e é fácil deixá-los cair!"
10035040-85 = "Ah, você tem razão."
10035040-86 = "Obrigado pela colaboração!"
10035040-88 = "(Uma missão para impedir que os clientes entrem na parte funda da piscina, hein...)"
10035040-89 = "(Talvez isso seja perfeito para mim.)"
10035040-93 = "Daremos início à piscina de ondas agora."
10035040-97 = "Hm? Não tem ninguém por perto aqui..."
10035040-98 = "Será que alguém já foi para o fundo —?"
10035040-102 = "Uau!"
10035040-104 = "(Fui engolida pelas ondas!)"
10035040-105 = "(Não entre em pânico! Preciso evitar me afogar...!)"
10035040-106 = "(...Hm?)"
10035040-110 = "(A-aquilo é!?)"
10035040-113 = "S-Sensei! A Chefe parece ter sido engolida pelas ondas!"
10035040-114 = "Fique calma, Kirino. Não precisa se preocupar com a Chefe."
10035040-115 = "A Chefe Kanna tem reflexos excelentes, sabe."
10035040-119 = "Gah! Kirino, Fubuki...!"
10035040-120 = "?"
10035040-121 = "Evacuem todos os clientes e funcionários agora mesmo!"
10035040-122 = "Evacuar? Aconteceu alguma coisa?"
10035040-124 = "Tem algo na água! É muito provável que seja uma criatura perigosa!"
10035040-125 = "[s] \"Uma criatura perigosa!?\""
10035040-129 = "I-isso é impossível! Chefe, você não estaria vendo coisas, estaria!?"
10035040-130 = "Chefe Kanna, não acha que deveria descansar um pouco? #nO estresse acumulado pode estar causando alucinações—"
10035040-132 = "Não são alucinações!"
10035040-133 = "Soem o alarme! Evacuem todos o mais rápido possível."
10035040-134 = "Será tarde demais se ela aparecer!"
10035040-135 = "S-se a Chefe diz com tanta convicção...!"
10035040-136 = "Entendido! Vou dar a ordem de evacuação!"
10035040-140 = "Ehh? O que está acontecendo, sério?"
10035040-141 = "Não tem jeito. Vou fazer o anúncio."
10035040-145 = "Sensei, evacue também."
10035040-146 = "Talvez você não possa acreditar em mim, mas...!"
10035040-147 = "[s5] \"Eu acredito em você, Kanna.\"\n[s6] \"Vamos evacuar juntos, Kanna!\""
10035040-150 = "Eu só sairei depois de garantir que a última pessoa tenha sido evacuada."
10035040-151 = "Esse é o dever de um salva-vidas."
10035040-152 = "Até mais!"
10035040-156 = "[ns] Ir ajudar Kirino e Fubuki."
10035040-160 = "Ahahaha! Todos fugiram com o rabo entre as pernas!"
10035040-161 = "Isso está ficando interessante!"
10035040-162 = "Muito bem, agora..."
10035040-167 = "Vou causar um caos por aqui!"
