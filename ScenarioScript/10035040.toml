[translation]
10035040-1 = "第4話;波のプールは、危険がいっぱい！"
10035040-3 = "よし。施設は一通り見て回ったな。準備運動はこのくらいで十分だ。"
10035040-4 = "へへっ、それじゃあ波の出るプールから始めましょうか。"
10035040-5 = "ああ、思いっきり暴れてやろう……！"
10035040-8 = "キヴォトス最大規模を誇るウォーターパーク――#n「エーギル」にご来園の皆様、大変お待たせいたしました。"
10035040-9 = "ただいまより、当園自慢の「波のプール」が開始いたします。"
10035040-10 = "海辺の波を再現したプールで、楽しい時間をお過ごしください！"
10035040-11 = "……続いて、業務連絡。子供用プールのライフセーバー3名、#n配置変更です。すみやかに、波のプールに移動してください。"
10035040-13 = "……だってさー。"
10035040-14 = "また屋外行きかぁ……やれやれ。"
10035040-15 = "私のせいだな……。本当に面目ない。"
10035040-16 = "いや、局長に言ったんじゃないよ。"
10035040-17 = "あの人使いの荒い、オーナーに言ったの！"
10035040-18 = "大丈夫ですよ！局長！すこしのミスくらい。"
10035040-19 = "本官も以前、脱獄犯を捕え損ねたことがありますが……、#n最後は丸く収まりました！終わりよければすべてよし！です。"
10035040-20 = "[s1] （たしかに、そういう事もあったような……。）\n[s2] （脱獄犯を捕え損ねるのはさすがに……。）"
10035040-23 = "まっ、面倒だけどさ～。#n今日はここのライフセーバーだし、言われた通りにしないとね。"
10035040-24 = "んじゃ、行こっか。"
10035040-27 = "わぁ！とても広いですね！"
10035040-28 = "まるで本物の海辺を再現したかのようです！"
10035040-29 = "人もやたら多いね～"
10035040-30 = "その分、監視しているライフセーバーの人数も多い。"
10035040-31 = "他の連中との協力が必要なようだ。"
10035040-35 = "支援に来た人たちね？#nここは広いから、隣のライフセーバーとはできるだけ広く間隔をあけてね！"
10035040-36 = "ほら、はやく配置について！お客さんどんどん来るよ！"
10035040-37 = "ここでは個人戦ですね！"
10035040-38 = "局長、フブキ、頑張りましょう！"
10035040-39 = "先生も！休憩時間にまたお会いしましょうね！"
10035040-43 = "あんま走んないようにね～#n体力は温存しないと。"
10035040-44 = "んじゃ、私も行こうかな。"
10035040-49 = "個人戦か。"
10035040-50 = "先程のようなことが、また起きなければ良いのだが……。"
10035040-51 = "[s3] \"さっきの子はきっと驚いただけ。\"\n[s4] \"さっきの子はきっと恥ずかしかっただけ。\""
10035040-54 = "ありがとうございます、先生。"
10035040-55 = "しかし、あの子供が泣いたのは、おそらく私のせいでしょう。"
10035040-56 = "私が、あの子供を怯えさせたんです……。"
10035040-57 = "そこ！はやく移動して！"
10035040-58 = "ひとまず、任務に集中すべきですね。"
10035040-59 = "できるだけ利用客に迷惑をかけないように……。#nプールの奥のほうを担当することにします。"
10035040-63 = "[ns] \"……。\""
10035040-65 = "あっぷ！あっぷ！"
10035040-66 = "た、助けて！"
10035040-67 = "はいはい、落ち着いて。"
10035040-68 = "この浮き輪につかまって～"
10035040-69 = "げほっ！つ、掴んだ！"
10035040-70 = "んじゃ、いくよ～"
10035040-73 = "は～い、到着。"
10035040-74 = "た、助かった……。ありがとうございます……！"
10035040-75 = "あんま深いとこに行かないようにね。"
10035040-77 = "ふんふふ～♪"
10035040-78 = "あっ！そちらのお客様！"
10035040-79 = "プールでの、電子機器の使用は禁止されています！"
10035040-80 = "え～？なんの曲を聞いているかって？"
10035040-81 = "デス・エンジェルズの「ロック・ザ・シティ」さ。"
10035040-82 = "きょ、曲名ではなくてですね……！"
10035040-83 = "プール内では、イヤホンはお外しください！"
10035040-84 = "感電の危険もありますし、落とし物にもなりやすいので！"
10035040-85 = "ああ、たしかにそうだね。"
10035040-86 = "ご協力ありがとうございます！"
10035040-88 = "（プールの奥のほうに、客が立ち入らないようにする任務か……）"
10035040-89 = "（私にぴったりかもしれないな。）"
10035040-93 = "これより、波のプールを開始します。"
10035040-97 = "ん？このあたり、周りに誰もいないな……。"
10035040-98 = "まさか、誰かもう奥に行ってしまったか――？"
10035040-102 = "うわっ！"
10035040-104 = "（波にのまれてしまった！）"
10035040-105 = "（動揺するな！溺れないように……！）"
10035040-106 = "（……ん？）"
10035040-110 = "（あ、あれは！？）"
10035040-113 = "せ、先生！#n局長が波にのまれてしまったようです！"
10035040-114 = "落ち着きなよキリノ。局長なら心配いらないって。"
10035040-115 = "カンナ局長、運動神経抜群なんだからさ。"
10035040-119 = "げほっ！キリノ、フブキ……！"
10035040-120 = "？"
10035040-121 = "今すぐ、客とスタッフを全員避難させろ！"
10035040-122 = "避難？なんかあったの？"
10035040-124 = "水の中に何かいる！危険生物の可能性が高い！"
10035040-125 = "[s] \"危険生物！？\""
10035040-129 = "そ、そんなものがいるはずがありません！#n局長、幻を見たのではありませんか！？"
10035040-130 = "カンナ局長、そろそろ休んだ方がいいんじゃないの？#nストレスが溜まって幻覚でも見たんじゃ――"
10035040-132 = "幻覚などではない！"
10035040-133 = "警報を鳴らせ！一刻もはやく避難させるんだ。"
10035040-134 = "奴が現れてからでは遅い！"
10035040-135 = "きょ、局長がそこまで言うのでしたら……！"
10035040-136 = "分かりました！避難指示を出します！"
10035040-140 = "えぇー？何が起きてるのさ、マジで？"
10035040-141 = "仕方ないかぁ。アナウンスするね。"
10035040-145 = "先生もはやく避難を。"
10035040-146 = "私のことは、信じられないかもしれません。ですが……！"
10035040-147 = "[s5] \"カンナのこと、信じてるよ。\"\n[s6] \"カンナも一緒に避難しよう！\""
10035040-150 = "私は最後の一人が避難するのを見届けてから行きます。"
10035040-151 = "それが、ライフセーバーの義務ですから。"
10035040-152 = "それでは！"
10035040-156 = "[ns] キリノとフブキを手伝いに行く。"
10035040-160 = "あははっ！みんな尻尾を巻いて逃げて行ったわ！"
10035040-161 = "面白くなってきたじゃない！"
10035040-162 = "よーし、このまま……"
10035040-167 = "ここで、暴れてやるわっ！"
