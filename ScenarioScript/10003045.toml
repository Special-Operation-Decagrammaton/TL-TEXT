[translation]
10003045-1 = "第4話;海で稀によくあること"
10003045-2 = "（それからも風紀委員たちと先生は一丸となって、委員長のために奮闘を続けた）"
10003045-4 = "ふう……やっぱり部屋は少し退屈ね。"
10003045-5 = "そうね……先生、もし良かったら一緒に、このボードゲームでも……"
10003045-8 = "先生、海岸が今大混乱でマズい！助けに来て！委員長にはバレないように！"
10003045-11 = "[ns] \"ご、ごめんヒナ！ちょっと急用で、戻ってきたらやろう！\""
10003045-12 = "あ、う、うん。待ってる。"
10003045-15 = "（やっと海辺のスケバンを片付けて帰ってきた後……）"
10003045-16 = "おかえり、先生。お疲れ様。"
10003045-17 = "それにしても、今度は外から爆発音も聞こえてきたけど……これ本当に、戦術訓練？"
10003045-18 = "まあ何にせよ、頑張ってるのなら良いけど……なんだか私だけこうしているのが、申し訳なくなってくる。"
10003045-19 = "……そうだ、先生。なんだか暑いし、もしよかったら下に行って一緒にアイスクリームでも――"
10003045-22 = "先生、チナツです。現在スラム街近郊で、ヘルメット団と熾烈な戦闘中なのですが……！"
10003045-23 = "重戦車の数が思ったよりも多く、このままではジリ貧でして……。"
10003045-24 = "突破口が見つからないので、助けに来ていただけませんか……！？"
10003045-27 = "[ns1] \"ヒナごめん、またちょっと急用が……！\"\n[ns2] \"ユーレカ！\""
10003045-28 = "せ、先生……！？"
10003045-29 = "せ、先生……！？"
10003045-31 = "先生！イオリの方もチナツの方も戦線の状態が怪しいので、指揮をお願いできますか！あっ、委員長にはご内密に！"
10003045-32 = "先生……？"
10003045-34 = "なんであいつら海から飛び出てくるんだ！？お化けかっ！？先生、どうにかして！"
10003045-35 = "先生……。"
10003045-37 = "ヘルメット団、戦車に引き続きオートマタ軍団とヘリを出してきました！一体どうすれば……！"
10003045-38 = "せ――"
10003045-40 = "えっと、先生……。"
10003045-41 = "……大丈夫？なんだか顔色があまり良くないけど……。"
10003045-42 = "[s] \"だ、大丈夫……それよりごめん、ヒナ、その……。\""
10003045-43 = "別に、私は……シャーレとしてのお仕事なんでしょう？"
10003045-44 = "いってらっしゃい、気を付けて。私は、大人しく待ってるから……。"
10003045-45 = "[s] \"うん、頑張って早めに戻ってくる……！\""
10003045-49 = "（そうして、約2時間にわたる死闘が繰り広げられた）"
10003045-51 = "夏季合宿用オペレーションルーム"
10003045-52 = "ふぅ、ふぅ……。"
10003045-53 = "はぁ……。"
10003045-54 = "皆さん、生きてますか……？"
10003045-55 = "[s] \"ギリギリ……。\""
10003045-56 = "もう身体も水着もボロボロだけど……まあ、何とか……。"
10003045-57 = "……ここまでの勢いとは、予想外でしたね。"
10003045-58 = "ですが、これで――"
10003045-59 = "うん。"
10003045-60 = "……そうですね。"
10003045-61 = "スケバン集団「破茶滅茶」並びに「びしょびしょヘルメット団」、どちらも完全な退却を確認しました。インターネット上でも、全面戦争は中断という話が広まっているようです。"
10003045-62 = "無事に作戦終了です、お疲れ様でした。"
10003045-63 = "あぁもう、ようやく終わったー！"
10003045-64 = "本当に……せっかくビーチまで来たのに大変でしたね。"
10003045-68 = "風紀委員会の皆様！ありがとうございます、本当にありがとうございます……！"
10003045-69 = "これで当ホテルはもちろん、周辺のお店の方々も戻ってこられるはずです！"
10003045-70 = "お礼と言っては何ですが、今度当ホテルの管轄区でのオープンを予定している温泉チケットをプレゼントしますので、どうか後日お使いください……！"
10003045-71 = "いえいえ、私たちはやるべきことをやっただけですから。一応そちらは頂くとして……あらためまして、風紀委員会一同、お疲れ様でした。"
10003045-72 = "次の予定である歩行訓練まで残り約1時間、ゆっくり休息を取っておいてください。"
10003045-73 = "[s] \"ようやくヒナと一緒に、海辺のお散歩ができそうかな。\""
10003045-74 = "そうですね。先生もお疲れのところ申し訳ないのですが、委員長の元へ行っていただいて……"
10003045-78 = "こんにちは、アコ行政[ruby=パンデモニウム・ソサエティー]官。万魔殿です[/ruby]。"
10003045-79 = "海の方にいる皆さんは、しっかり訓練を行っておりますでしょうか？まさかとは思いますが、全然別のことをされたりなどはしていませんよね？"
10003045-80 = "な、なぜ今……！えっとですね、今私たちは正にその訓練で忙しいので――"
10003045-81 = "おや……？後ろにいらっしゃるイオリさん、どうして水着を――"
10003045-82 = "指が滑りましたっ！"
10003045-86 = "こんな時に万魔殿とは……全く、危なかったですねイオリ。"
10003045-87 = "何その私のせいみたいな言い方！？"
10003045-88 = "まあそれにしても、相変わらず邪魔ばかりしてきますね……。"
10003045-89 = "いつものことだし、アコちゃんなら大丈夫でしょ。"
10003045-90 = "[s] \"じゃあ、私はとりあえずヒナの部屋に戻るね。\""
10003045-91 = "はい。よろしくお願いしますね、先生。"
10003045-92 = "でももうあいつらは退散したんだし、そんなに気にすること無いんじゃないか？"
10003045-93 = "さっきは無理やり中断させちゃったし、委員長をまた海まで連れて行ってあげたら？もう流石に何も起きないでしょ……。"
10003045-94 = "イオリ、「フラグ」って知ってますか……？"
10003045-97 = "[ns] \"あー……。\""
10003045-98 = "……。"
10003045-99 = "今さら口をつぐんでも遅いですよ、イオリ……。"
10003045-103 = "はぁ……それで、今度は何ですか！？"
10003045-108 = "しゅ、襲撃です……！相手は――"
10003045-110 = "ねえどうして誰もいないわけ！？ここでお祭りが始まるって言ってたじゃん！"
10003045-111 = "お祭りと言いますか、全面戦争ですけどね。まあ似たようなものですけど★"
10003045-112 = "どっちでも良いわよ！とにかく、この状況どういうこと！？"
10003045-113 = "確かにこれでは、今回の目標である「夏の海岸やお祭り騒ぎの中で食べる焼きトウモロコシは、どうしてこんなにも美味しいのか？」が研究できませんわね……。"
10003045-114 = "ねえねえ～いつになったら焼きトウモロコシ食べられるのー！？"
10003045-115 = "食べに来たんじゃなくて、売りに来たの！！"
10003045-116 = "わざわざこんなに重たい荷物を抱えてここまで来たのに！"
10003045-117 = "スケバン集団もヘルメット団もどこに行ったわけ！？どうなってるのよぉ！！"
10003045-118 = "[s] \"どうして、美食研究会がここに……！？\""
