[translation]
10003045-1 = "Episódio 4; Coisas que raramente acontecem na praia"
10003045-2 = "（Desde então, os membros do Comitê Disciplinar e o Sensei trabalharam juntos, continuando a lutar pela presidente.）"
10003045-4 = "Ufa... o quarto é um pouco entediante, afinal."
10003045-5 = "É verdade... Sensei, se não se importar, gostaria de jogar este jogo de tabuleiro comigo..."
10003045-8 = "Sensei, a costa está um caos total, é um desastre! Venha nos ajudar! Não deixe a presidente saber!"
10003045-11 = "[ns] \"D-desculpe, Hina! Surgiu uma emergência, vamos jogar quando eu voltar!\""
10003045-12 = "Ah, o-ok. Estarei esperando."
10003045-15 = "（Depois de finalmente terminar de lidar com as delinquentes na praia e voltar...）"
10003045-16 = "Bem-vindo de volta, Sensei. Bom trabalho."
10003045-17 = "Mas, ainda assim, ouvi sons de explosões vindo de fora agora há pouco... isso é realmente um treinamento tático?"
10003045-18 = "Bem, de qualquer forma, fico feliz que esteja se esforçando... mas sinto um pouco de culpa por ser a única aqui parada."
10003045-19 = "……Ah, Sensei. Está meio quente, se quiser, podemos descer e tomar um sorvete――"
10003045-22 = "Sensei, aqui é a Chinatsu. Estamos em uma batalha feroz contra o Grupo do Capacete perto da favela agora mesmo...!"
10003045-23 = "O número de tanques pesados é maior do que pensávamos, e se continuar assim, ficaremos sem recursos..."
10003045-24 = "Não conseguimos encontrar uma brecha, poderia vir nos ajudar...!?"
10003045-27 = "[ns1] \"Hina, desculpe, surgiu outra emergência...!\"\n[ns2] \"Eureka!\""
10003045-28 = "S-Sensei...!?"
10003045-29 = "S-Sensei...!?"
10003045-31 = "Sensei! A situação na linha de frente da Iori e da Chinatsu está estranha, pode assumir o comando? Ah, não conte para a presidente!"
10003045-32 = "Sensei...?"
10003045-34 = "Por que eles estão saindo do mar!? São fantasmas!? Sensei, dê um jeito nisso!"
10003045-35 = "Sensei..."
10003045-37 = "O Grupo do Capacete trouxe tanques, seguidos por um exército de autômatos e helicópteros! O que devemos fazer...!"
10003045-38 = "Se――"
10003045-40 = "Hum, Sensei..."
10003045-41 = "……Está tudo bem? Você não parece muito bem..."
10003045-42 = "[s] \"E-estou bem... mas desculpe, Hina, é que...\""
10003045-43 = "Não se preocupe, eu... é trabalho do Schale, não é?"
10003045-44 = "Vá lá, tome cuidado. Eu ficarei aqui esperando calmamente..."
10003045-45 = "[s] \"Sim, vou me esforçar para voltar logo...!\""
10003045-49 = "（E assim, uma luta mortal de cerca de duas horas se desenrolou）"
10003045-51 = "Sala de Operações para o Acampamento de Verão"
10003045-52 = "Ufa, ufa..."
10003045-53 = "Ah..."
10003045-54 = "Pessoal, vocês estão vivas...?"
10003045-55 = "[s] \"Por um triz...\""
10003045-56 = "Meu corpo e meu traje de banho estão destruídos, mas... bem, de alguma forma..."
10003045-57 = "……Não esperava que fosse tão intenso assim."
10003045-58 = "Mas, com isso――"
10003045-59 = "Sim."
10003045-60 = "……É verdade."
10003045-61 = "Confirmamos a retirada total tanto do grupo de delinquentes \"Hachamecha\" quanto do \"Grupo do Capacete Encharcado\". Parece que a notícia de que a guerra total foi interrompida já se espalhou pela internet."
10003045-62 = "Operação concluída com sucesso, bom trabalho a todos."
10003045-63 = "Ah, finalmente acabou!"
10003045-64 = "Realmente... foi muito difícil, sendo que viemos até a praia para descansar."
10003045-68 = "Membros do Comitê Disciplinar! Muito obrigado, muito obrigado mesmo...!"
10003045-69 = "Com isso, nosso hotel e os comércios vizinhos poderão voltar a funcionar!"
10003045-70 = "Como forma de agradecimento, gostaria de presenteá-los com ingressos para a fonte termal que planejamos abrir em nossa jurisdição, por favor, usem quando puderem...!"
10003045-71 = "Não há de quê, apenas fizemos o que precisava ser feito. Aceitaremos os ingressos... e, mais uma vez, bom trabalho a todo o Comitê Disciplinar."
10003045-72 = "Temos cerca de 1 hora até o próximo compromisso, que é o treinamento de caminhada, então descansem bem."
10003045-73 = "[s] \"Finalmente parece que vou conseguir passear pela praia com a Hina.\""
10003045-74 = "Pois é. Sinto muito incomodar o Sensei, que já está cansado, mas poderia ir até a presidente..."
10003045-78 = "Olá, oficial administrativa da Pandemonium Society. Aqui é a Pandemonium."
10003045-79 = "O pessoal que está na praia está treinando como deveria? Não me diga que vocês estão fazendo algo completamente diferente, estão?"
10003045-80 = "Po-por que agora...!? Bem, é que estamos ocupados justamente com esse treinamento agora, então—"
10003045-81 = "Ora...? Iori, que está aí atrás, por que você está de roupa de banho—"
10003045-82 = "Meu dedo escorregou!"
10003045-86 = "A Pandemonium aparecer logo agora... Francamente, foi por pouco, Iori."
10003045-87 = "Por que você está falando como se a culpa fosse minha!?"
10003045-88 = "Bem, de qualquer forma, eles continuam nos atrapalhando como sempre..."
10003045-89 = "É sempre assim, e a Ako-chan dá conta, não é?"
10003045-90 = "[s] \"Bem, então eu vou voltar para o quarto da Hina por enquanto.\""
10003045-91 = "Sim. Conto com você, Sensei."
10003045-92 = "Mas eles já foram embora, então não tem por que se preocupar tanto, não é?"
10003045-93 = "Você interrompeu a gente à força agora há pouco, por que não leva a presidente de volta para a praia? Acho que não vai acontecer mais nada agora..."
10003045-94 = "Iori, você sabe o que é um \"clichê de azar\"...?"
10003045-97 = "[ns] \"Ah...\""
10003045-98 = "..."
10003045-99 = "Não adianta ficar calada agora, Iori..."
10003045-103 = "Haa... E agora, o que foi dessa vez!?"
10003045-108 = "A-ataque...! O inimigo é—"
10003045-110 = "Ei, por que não tem ninguém aqui!? Disseram que o festival ia começar aqui, não disseram!?"
10003045-111 = "Festival, você diz? É uma guerra total, na verdade. Bem, é quase a mesma coisa★"
10003045-112 = "Tanto faz! De qualquer jeito, o que significa essa situação!?"
10003045-113 = "Realmente, desse jeito, não dá para pesquisar o objetivo desta vez: \"Por que o milho assado é tão gostoso quando comido na praia ou durante um festival de verão?\"..."
10003045-114 = "Ei, ei~ quando é que a gente vai poder comer milho assado~!?"
10003045-115 = "A gente não veio para comer, a gente veio para vender!!"
10003045-116 = "A gente se deu ao trabalho de carregar essa bagagem pesada até aqui!"
10003045-117 = "Para onde foram o grupo das Sukeban e o grupo dos Capacetes!? O que está acontecendo aqui!!"
10003045-118 = "[s] \"Por que o Clube de Pesquisa Gourmet está aqui...!?\""
