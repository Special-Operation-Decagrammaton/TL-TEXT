[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
1014303-1 = "Verão. Um Lado Diferente."
1014303-2 = "Olá! Sensei!!!"
1014303-3 = "[ns] \"......\""
1014303-4 = "Aconteceu alguma coisa?"
1014303-5 = "[s] \"Então era esse o seu \"lado diferente\"...\""
1014303-6 = "Ehehe. Isso mesmo. E não estou errada, né?"
1014303-7 = "[s] \"Tecnicamente, você não está errada, mas...\""
1014303-8 = "Vamos, vamos brincar logo!"
1014303-9 = "Não podemos desperdiçar o tempo!"
1014303-11 = "(A Shunzinha puxou minha mão e me arrastou em direção ao teleférico...)"
1014303-15 = "Olha lá embaixo! As casas parecem de brinquedo daqui!"
1014303-16 = "Aquelas montanhas têm formas tão misteriosas...!"
1014303-17 = "Essa área parece estar cheia de árvores de Kounoki!"
1014303-18 = "[s] \"A propósito... O seu corpo está bem?\""
1014303-19 = "Ah... você está falando da \"Poção do Rejuvenescimento\", não é?"
1014303-20 = "A presidente do Clube de Alquimia me disse que ela está muito mais segura do que antes."
1014303-21 = "Ela também mencionou que pode haver algumas instabilidades, mas nada que traga problemas pro meu corpinho."
1014303-22 = "[ns] (Instabilidades...?)"
1014303-23 = "Ahn, o que foi? Por acaso...#nvocê não gosta de brincar com a \"Shunzinha\"?"
1014303-24 = "[ns] \"De jeito nenhum! É claro que eu adoro brincar com a Shunzinha!\""
1014303-25 = "Que alívio... Eu tava com medo de você não gostar mais de mim."
1014303-26 = "Eh? Que isso é impossível...?"
1014303-27 = "......"
1014303-28 = "Ehehe, muito obrigada!"
1014303-29 = "Ah, chegamos no topo!"
1014303-30 = "A coisa que eu mais queria fazer com você hoje, Sensei, era..."
1014303-31 = "Rafting!"
1014303-36 = "Sejam muito bem-vindos!"
1014303-37 = "O rafting é muito divertido, mas também tem os seus perigos."
1014303-38 = "Mas não se preocupem. Eu estarei no barco com vocês."
1014303-39 = "Primeiro a segurança, segundo a segurança. Terceiro e quarto não importam, e quinto a segurança."
1014303-41 = "Se, por acaso, vocês caírem do barco――"
1014303-43 = "Todo mundo com os remos nas mãos? Então, vamos nessa!"
1014303-44 = "Yaaay!!!"
1014303-45 = "[s] \"A água está bem fria!\""
1014303-46 = "Sim! E quando a gente rema o corpo esquenta bastante, a sensação é maravilhosa!"
1014303-47 = "Isso, no três, vai! Um, dois! Um, dois!"
1014303-48 = "――Um, dois!"
1014303-49 = "[s] \"Um, dois!!\""
1014303-51 = "(Começamos a remar seguindo o ritmo da nossa guia!)"
1014303-62 = "Ah, Sensei! Olha lá!"
1014303-63 = "A gente vai descer por aquela corredeira!"
1014303-64 = "É a nossa primeira corredeira gigante! Cuidado para não baterem nas rochas!"
1014303-69 = "Kyaaa!!!"
1014303-72 = "(O barco subiu mais alto do que eu imaginava!)"
1014303-73 = "(A água invadiu e cobriu a gente, molhando os nossos corpos por inteiro!)"
1014303-75 = "Vocês estão vendo aquela pedra grande com um buraco no meio do lado direito?"
1014303-76 = "O formato lembra muito um búfalo aquático, por isso nós a chamamos de \"A Rocha do Búfalo\"."
1014303-77 = "Ah, verdade, tem cara de búfalo mesmo!"
1014303-78 = "A lenda diz que esse buraco gigante no meio foi feito por um tiro de canhão disparado por um antigo general da região."
1014303-79 = "Deveria ser uma bola de canhão colossal..."
1014303-82 = "Já se passaram 30 minutos! Vamos fazer uma paradinha para descansar por aqui!"
1014303-83 = "Ahn, o que a gente pode fazer durante o descanso?"
1014303-84 = "Vocês podem nadar, flutuar na água, ou apenas descansar deitados no barco...#nSintam-se à vontade para fazerem o que quiserem."
1014303-89 = "Você ouviu, Sensei? Vamos nadar, vamos!"
1014303-90 = "[s1] \"Desculpe... Mas eu prefiro sentar e descansar um pouquinho...\"\n[s2] \"Mas pode ir lá, eu fico tirando fotos da Shunzinha nadando.\""
1014303-93 = "Você vai tirar fotos minhas...?"
1014303-97 = "Yay, entendido! Conto com você, hein!"
1014303-102 = "Guarde todas elas com muito, muito carinho pra sempre, tá bom?"
1014303-103 = "[s3] \"...?\"\n[s4] \"S-Sim, claro...\""
1014303-106 = "Ehehe!"
1014303-109 = "(A Shunzinha pulou na água e começou a brincar e a nadar cheia de energia)"
1014303-111 = "Sensei! Agora!"
1014303-118 = "Diga xis!"
1014303-126 = "O que você achou dessa...?"
1014303-127 = "[ns] \"!?!?\""
1014303-129 = "A partir daqui entramos na área das corredeiras intensas! Segurem-se firme!"
1014303-130 = "O barco vai subir bastante e depois... descer de uma vez só! PUM!"
1014303-135 = "U-Uau... O meu coração tá batendo super rápido...!"
1014303-136 = "[s] \"Vamos nos segurar bem pra não cair...!\""
1014303-137 = "Sim!"
1014303-138 = "......Aí vamos nós!"
1014303-142 = "Ahahaha!"
1014303-143 = "Isso é incrível!"
1014303-148 = "Uwaah!?"
1014303-152 = "[ns] \"Cuidado!\""
1014303-164 = "Continuem agarrados do jeito que estão!"
1014303-165 = "A-A moça mandou a gente ficar bem agarradinho!"
1014303-166 = "Ehehe... não ouse me soltar de jeito nenhum, viu?"
1014303-167 = "......"
1014303-168 = "O seu peito é tão quentinho, Sensei... e é tão grande..."
1014303-169 = "Me sinto tão segura nos seus braços."
1014303-170 = "[s] \"U-Uhum...\""
1014303-173 = "E com isso o nosso passeio termina por aqui!"
1014303-174 = "Muito obrigada!"
1014303-175 = "[s] \"Nós agradecemos muito!\""
1014303-176 = "Aproveitem o resto do passeio e divirtam-se bastante!"
1014303-181 = "Sensei, Sensei! O que a gente faz agora?"
1014303-182 = "Er, bem... como eu fiquei com bastante frio lá na água..."
1014303-183 = "Eu quero muito comer uma coisa quentinha!"
1014303-187 = "Ah, Sensei! Aquilo parece uma delícia!"
1014303-188 = "Espetinhos de carne e legumes... O cheiro gostoso dos temperos tá chegando até aqui...!"
1014303-190 = "E aquilo ali... é macarrão de arroz!#nO macarrão dessa região é super famoso por colocar um monte de amendoim por cima."
1014303-191 = "O que acha de pedirmos um e dividirmos?"
1014303-193 = "Sensei! Agora eu quero uma coisa docinha e super gelada!"
1014303-194 = "Me disseram que a raspadinha de frutas daqui é a melhor do mundo!#nEles colocam feijão vermelho, feijão verde, e até gelatina por cima de tudo!"
1014303-196 = "(Assim, eu e a Shunzinha andamos pela rua de comércio explorando tudinho e \"limpando\" cada barraca)"
1014303-197 = "(Nós dois acabamos com a barriga super cheia e redondinha, e começamos a rir um do outro)"
1014303-199 = "Ufa... Acho que comemos demais. O meu corpo tá até mais pesado."
1014303-200 = "Mas eu não tenho energia nem pra mergulhar de novo no rio..."
1014303-201 = "......"
1014303-202 = "Sabe, Sensei."
1014303-203 = "[s] \"O que houve?\""
1014303-204 = "Muito obrigada por ter feito todos os meus caprichos hoje."
1014303-205 = "[s5] \"Isso não foi nada de mais, sabe.\"\n[s6] \"Você pode me pedir essas coisas quando quiser.\""
1014303-208 = "......"
1014303-209 = "É, não tem jeito... Eu adoro o Sensei mais que tudo no mundo!"
1014303-212 = "(A Shunzinha sentou na beirada de uma pocinha d'água super cristalina perto do rio e começou a balançar as pernas feliz da vida)"
1014303-213 = "(E enquanto eu observava aquela cena pacificamente com a mente vazia...)"
1014303-217 = "W-Waaaah!?"
1014303-218 = "[ns] \"Hm...? Q-O que aconteceu!?!?\""
1014303-222 = "[wa:2020]― [log=슌 수영복]E-Eh,[wa:600] hyaaaah!?[/log]"
1014303-225 = "― [log=슌 수영복]S-S-[wa:278]Sensei!?[/log]"
1014303-227 = "― [log=슌 수영복]Isso é,[wa:630] ahn...![/log]"
1014303-230 = "[wa:1210]― [log=슌 수영복]A-A-[wa:350]Agora que lembrei...[/log]"
1014303-232 = "― [log=슌 수영복]A Saya-san tinha me alertado[wa:1070] que a poção poderia sofrer com uma instabilidade inesperada, mas...[wa:3000] não me diga que...?[/log]"
1014303-235 = "[ns] \"M-Me desculpa!\""
1014303-236 = "[wa:880]― [log=슌 수영복]S-[wa:440]Sensei, você não precisa se desculpar...![/log]"
1014303-238 = "― [log=슌 수영복]O-[wa:380]Ou melhor...[wa:970] ahn...[wa:1280] er.[/log]"
1014303-241 = "― [log=슌 수영복]O-[wa:570]O que eu devo fazer...![/log]"
1014303-244 = "[ns] \"P-Por enquanto... eu vou pra lá e virar de costas!\""
1014303-245 = "[wa:660]― [log=슌 수영복]Não, espere![/log]"
1014303-248 = "― [log=슌 수영복]I-[wa:260]Isso é...![/log]"
1014303-251 = "― [log=슌 수영복]Você poderia apenas ficar de pé onde está agora?[/log]"
1014303-253 = "― [log=슌 수영복]Eu vou me esconder na sua sombra...[/log]"
1014303-256 = "[wa:2260]― [log=슌 수영복]Eu...[wa:1550] já me sinto muito mais segura, [wa:880]assim.[/log]"
1014303-259 = "― [log=슌 수영복]Sensei,[wa:750] sendo assim...[/log]"
1014303-261 = "― [log=슌 수영복]Só por mais um pouquinho[wa:1120] vamos continuar desse jeito, [wa:1000]está bem...[/log]"
1014303-264 = "(Enquanto me mantinha atento a qualquer um que pudesse passar por ali, de alguma forma consegui recuperar o maiô adulto da Shun para que ela pudesse se cobrir...)"
1014303-266 = "......"
1014303-267 = "[s] \"......\""
1014303-268 = "P-Por favor... Diga alguma coisa..."
1014303-269 = "[s] \"E-Eu não faço a menor ideia do que dizer numa hora dessas...!?\""
1014303-270 = "......"
1014303-271 = "M-Muito menos eu... O que eu faço...?"
1014303-273 = "(Acho que de fato foi vergonhoso demais para ela lidar com isso)"
1014303-274 = "(Pois a partir de então, a Shun ficou terrivelmente quieta e evitou os meus olhos pelo resto do dia...)"