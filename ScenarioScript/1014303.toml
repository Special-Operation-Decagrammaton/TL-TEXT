[translation]
1014303-1 = "夏。いつもとは違う一面。"
1014303-2 = "こんにちは！先生！！！"
1014303-3 = "[ns] \"……。\""
1014303-4 = "どうかしましたか？"
1014303-5 = "[s] \"いつもとは違った一面って……。\""
1014303-6 = "えへへ。そうです。間違っていませんよね？"
1014303-7 = "[s] \"たしかにそうだけど……。\""
1014303-8 = "ほら、遊びに行きましょう！"
1014303-9 = "時間は有限ですよ！"
1014303-11 = "（シュエリンの手に引かれ、ロープウェイ乗り場に向かった……）"
1014303-15 = "見てください！建物がおもちゃみたいですよ！"
1014303-16 = "あの山、本当に不思議な形です……！"
1014303-17 = "この辺りはコウノキがたくさん生えているんですね！"
1014303-18 = "[s] \"ところで……体は大丈夫なの？\""
1014303-19 = "あ……「若返りの秘薬」のこと、ですよね？"
1014303-20 = "錬丹術研究会によると、以前よりも安全になったらしいです。"
1014303-21 = "不安定なときがあるとのことですが、体には問題ないそうです。"
1014303-22 = "[ns] （不安定なときがある……？）"
1014303-23 = "あの、どうかしましたか？#nもしかして……「シュエリン」とは……遊びたくないのですか？"
1014303-24 = "[ns] \"まさか！そんなことないよ！\""
1014303-25 = "良かったです。……私を嫌いになっちゃったのかなって心配しました。"
1014303-26 = "え？そんなことは絶対にありえないって……。"
1014303-27 = "……。"
1014303-28 = "えへへ、ありがとうございます！"
1014303-29 = "あ、到着したみたいですね！"
1014303-30 = "今日、先生と一緒にしたかったことは……。"
1014303-31 = "ラフティングです！"
1014303-36 = "本日はようこそお越しくださいました！"
1014303-37 = "楽しいラフティングですが、危険も伴います。"
1014303-38 = "ご安心ください。ボートには私も乗りますので。"
1014303-39 = "一に安全、二に安全、三四がなくて、五に安全です。"
1014303-41 = "もしもボートから落ちてしまった場合は――"
1014303-43 = "みなさん、パドルを持ちましたか？では出発しましょう！"
1014303-44 = "わあー！！！"
1014303-45 = "[s] \"水が冷たいですね！\""
1014303-46 = "はい！漕いでいると体が熱くなってくるので、とても気持ち良いですよ！"
1014303-47 = "はいっ、いっち、にっ、いっち、にっ！"
1014303-48 = "――いっち、にっ！"
1014303-49 = "[s] \"いっち、にっ！！\""
1014303-51 = "（ガイドに従って漕ぎ始めた！）"
1014303-62 = "あ、先生！見てください！"
1014303-63 = "私たち、あの急流を下るんですね！"
1014303-64 = "最初の大きなポイントですよ！岩に気をつけてください！"
1014303-69 = "きゃー！！！"
1014303-72 = "（ボートが適度な高さまで上がった！）"
1014303-73 = "（川の水が波立ち、すっかり濡れてしまった！）"
1014303-75 = "右側に、大きな穴の開いた岩がありますよね？"
1014303-76 = "あれは水牛のような形に見えるので「水牛岩」と呼ばれています。"
1014303-77 = "あ、確かに水牛に見えますね！"
1014303-78 = "大きな穴は、昔ある将軍が大砲を撃ってできたと言われているんです。"
1014303-79 = "ずいぶん大きな砲弾ですね……。"
1014303-82 = "30分経過しました！この辺りで少し休憩しましょう！"
1014303-83 = "あの、休憩中は何をしたらいいですか？"
1014303-84 = "泳いでも、水に浮いていても、このままボートで休んでも……。#n何をしても構いませんよ。"
1014303-89 = "だそうです、先生！一緒に泳ぎましょう！"
1014303-90 = "[s1] \"ごめん……私はちょっと休憩……。\"\n[s2] \"その代わり、シュエリンが泳いでいるところを撮ってあげるね。\""
1014303-93 = "写真を撮ってくれるんですか……？"
1014303-97 = "分かりました！よろしくお願いします！"
1014303-102 = "写真、ずっとずっと大事にしてくださいね？"
1014303-103 = "[s3] \"……？\"\n[s4] \"う、うん……？\""
1014303-106 = "えへへ！"
1014303-109 = "（シュエリンは水の中に入り、楽しそうに泳ぎ始めた）"
1014303-111 = "先生！今です！"
1014303-118 = "はい！チーズ！"
1014303-126 = "これとか、どうでしょう……？"
1014303-127 = "[ns] \"！？！？\""
1014303-129 = "ここから激しい急流ポイントです！気を引き締めて行きますよ！"
1014303-130 = "高く上がってから……ドーンッと落ちますからね！"
1014303-135 = "わ、わぁ……ドキドキします……！"
1014303-136 = "[s] \"気を抜かないようにしよう……！\""
1014303-137 = "はい！"
1014303-138 = "……いよいよですね！"
1014303-142 = "あははっ！"
1014303-143 = "すごいですね！"
1014303-148 = "わあっ！？"
1014303-152 = "[ns] \"危ない！\""
1014303-164 = "そのまましっかり、つかまっていてください！"
1014303-165 = " つ、つかまって、だそうです。"
1014303-166 = "えへへ……手を離したらダメですからね？"
1014303-167 = "……。"
1014303-168 = "先生の胸、温かくて……大きくて……。"
1014303-169 = "すごく安心します。"
1014303-170 = "[s] \"う、うん……。\""
1014303-173 = "これで本日のラフティングは終了です！"
1014303-174 = "ありがとうございます！"
1014303-175 = "[s] \"ありがとうございました！\""
1014303-176 = "では引き続き、観光を楽しんでくださいね！"
1014303-181 = "先生、先生！次は何をしましょう？"
1014303-182 = "えっとでも、そうですね……なんだか寒くなってきたので……。"
1014303-183 = "温かいものが食べたいです！"
1014303-187 = "あ、先生！あれ、おいしそうです！"
1014303-188 = "肉と野菜の串焼き……スパイスの香りがここまで漂ってきてます……！"
1014303-190 = "あれは……米麺ですね！#nこの地域の米麺はピーナッツがたっぷり入っていることで有名なんですよ。"
1014303-191 = "1つ注文して、分けて食べましょうか？"
1014303-193 = "先生！次は冷たくて甘いものが食べたいです！"
1014303-194 = "ここのフルーツかき氷がおいしいらしいですよ！#n小豆や緑豆、ゼリーまでトッピングできるんですって！"
1014303-196 = "（こうしてシュエリンと一緒に商店街を、「完全攻略」していった）"
1014303-197 = "（お互いに膨らんだお腹を見て思わず笑い合った）"
1014303-199 = "ふう……。ちょっと食べ過ぎたみたいです。体が熱くなってきました。"
1014303-200 = "だけどもう、泳ぐほどの元気はないですし……。"
1014303-201 = "……。"
1014303-202 = "あの、先生。"
1014303-203 = "[s] \"どうしたの？\""
1014303-204 = "今日は甘えさせてくれて、ありがとうございます。"
1014303-205 = "[s5] \"これくらい、構わないよ。\"\n[s6] \"いつでも甘えてね。\""
1014303-208 = "……。"
1014303-209 = "やっぱり私、先生が大好きです！"
1014303-212 = "（シュエリンは水辺のきれいな水たまりに座り込み、楽しそうに遊び始めた）"
1014303-213 = "（少しぼーっとしながら、その様子を見つめていると……）"
1014303-217 = "わ、わあ！？"
1014303-218 = "[ns] \"ん……？ど、どうしたの！？！？\""
1014303-222 = "[wa:2020]― [log=슌 수영복]えっ、[wa:600]ひゃああ！？[/log]"
1014303-225 = "― [log=슌 수영복]せ、[wa:278]先生！？[/log]"
1014303-227 = "― [log=슌 수영복]これは、[wa:630]その……！[/log]"
1014303-230 = "[wa:1210]― [log=슌 수영복]そ、[wa:350]そういえば……。[/log]"
1014303-232 = "― [log=슌 수영복]サヤさんが、[wa:1070]少し不安定になるかもと仰っていましたが……っ[wa:3000]まさか……？[/log]"
1014303-235 = "[ns] \"ご、ごめん！\""
1014303-236 = "[wa:880]― [log=슌 수영복]せ、[wa:440]先生が謝る必要はありません……！[/log]"
1014303-238 = "― [log=슌 수영복]と、[wa:380]というか……[wa:970]あの……[wa:1280]えっと。[/log]"
1014303-241 = "― [log=슌 수영복]わ、[wa:570]私はどうしたら……！[/log]"
1014303-244 = "[ns] \"と、とりあえず……私はあっちに行くね！\""
1014303-245 = "[wa:660]― [log=슌 수영복]ダメです！[/log]"
1014303-248 = "― [log=슌 수영복]そ、[wa:260]その……！[/log]"
1014303-251 = "― [log=슌 수영복]そこに立っていただいてもいいですか？[/log]"
1014303-253 = "― [log=슌 수영복]隠れるので……。[/log]"
1014303-256 = "[wa:2260]― [log=슌 수영복]私……[wa:1550]大丈夫、[wa:880]ですから。[/log]"
1014303-259 = "― [log=슌 수영복]先生、[wa:750]でしたら……[/log]"
1014303-261 = "― [log=슌 수영복]もう少し[wa:1120]このまま、[wa:1000]でも……。[/log]"
1014303-264 = "（周囲の様子を伺いながら、どうにかシュンの水着を持ってきた……）"
1014303-266 = "……。"
1014303-267 = "[s] \"……。\""
1014303-268 = "な、何か……おっしゃってください……。"
1014303-269 = "[s] \"な、なんて言えばいいんだろう……？\""
1014303-270 = "……。"
1014303-271 = "わ、私だって分からないですよ……。"
1014303-273 = "（恥ずかしかったせいだろうか）"
1014303-274 = "（その後、シュンはいつもより口数が少なくなっていた……）"
