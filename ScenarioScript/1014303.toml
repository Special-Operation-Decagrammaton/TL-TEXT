[translation]
1014303-1 = "Summer. A side of me you don't usually see."
1014303-2 = "Hello there, Sensei!!!"
1014303-3 = "[ns] \"…….\""
1014303-4 = "Is something the matter?"
1014303-5 = "[s] \"A side I don't usually see, huh...\""
1014303-6 = "Hehe. That's right. I'm not wrong, am I?"
1014303-7 = "[s] \"I suppose that's true, but...\""
1014303-8 = "Come on, let's go have some fun!"
1014303-9 = "Time is limited, you know!"
1014303-11 = "(Led by Shun's hand, we headed toward the ropeway station...)"
1014303-15 = "Look! The buildings look just like toys!"
1014303-16 = "That mountain has such a mysterious shape...!"
1014303-17 = "There are so many camphor trees growing around here!"
1014303-18 = "[s] \"By the way... is your body alright?\""
1014303-19 = "Oh... you mean the 'rejuvenation elixir,' right?"
1014303-20 = "According to the Alchemy Research Society, it's become safer than it was before."
1014303-21 = "They said there might be times when it's unstable, but my body is fine."
1014303-22 = "[ns] (Times when it's unstable...?) "
1014303-23 = "Um, is something wrong? #nCould it be... that you don't want to... play with 'Shun'?"
1014303-24 = "[ns] \"Not at all! That's not it!\""
1014303-25 = "I'm glad. ...I was worried that you might have started to dislike me."
1014303-26 = "Huh? That's absolutely impossible..."
1014303-27 = "……."
1014303-28 = "Hehe, thank you!"
1014303-29 = "Oh, it looks like we've arrived!"
1014303-30 = "The thing I wanted to do with you today, Sensei, is..."
1014303-31 = "Rafting!"
1014303-36 = "Welcome, everyone!"
1014303-37 = "Rafting is fun, but it does come with risks."
1014303-38 = "Rest assured, I will be on the boat with you."
1014303-39 = "Safety first, safety second, there is no third or fourth, and safety fifth."
1014303-41 = "In the event that you fall out of the boat—"
1014303-43 = "Everyone, do you have your paddles? Then let's set off!"
1014303-44 = "Wooo!!!"
1014303-45 = "[s] \"The water is cold!\""
1014303-46 = "Yes! Your body heats up as you paddle, so it feels very refreshing!"
1014303-47 = "Ready, one, two, one, two!"
1014303-48 = "—one, two!"
1014303-49 = "[s] \"One, two!!\""
1014303-51 = "(We started paddling according to the guide!)"
1014303-62 = "Oh, Sensei! Look!"
1014303-63 = "We're going down those rapids!"
1014303-64 = "This is the first big spot! Watch out for the rocks!"
1014303-69 = "Kyaaa!!!"
1014303-72 = "(The boat rose to a decent height!)"
1014303-73 = "(The river water splashed up, and we're completely soaked!)"
1014303-75 = "Do you see the rock with the large hole on the right?"
1014303-76 = "It's called 'Water Buffalo Rock' because it looks like a water buffalo."
1014303-77 = "Oh, it really does look like a water buffalo!"
1014303-78 = "They say the large hole was made by a general firing a cannon long ago."
1014303-79 = "That's quite a large cannonball..."
1014303-82 = "30 minutes have passed! Let's take a short break here!"
1014303-83 = "Um, what should we do during the break?"
1014303-84 = "You can swim, float in the water, or just rest on the boat... #nDo whatever you like."
1014303-89 = "That's what they said, Sensei! Let's go swimming together!"
1014303-90 = "[s1] \"Sorry... I'll take a little break...\"\n[s2] \"Instead, I'll take pictures of you while you swim.\""
1014303-93 = "You'll take pictures of me...?"
1014303-97 = "Understood! I'm counting on you!"
1014303-102 = "Please treasure these photos forever, okay?"
1014303-103 = "[s3] \"...?\"\n[s4] \"U-uh... sure...?\""
1014303-106 = "Hehe!"
1014303-109 = "(Shun entered the water and started swimming happily)"
1014303-111 = "Sensei! Now!"
1014303-118 = "Say cheese!"
1014303-126 = "How about this one...?"
1014303-127 = "[ns] \"!?!?!\""
1014303-129 = "This is where the intense rapids begin! Stay sharp!"
1014303-130 = "We'll go up high and then... drop down with a splash!"
1014303-135 = "W-wow... my heart is racing...!"
1014303-136 = "[s] \"I need to stay focused...!\""
1014303-137 = "Yes!"
1014303-138 = "...Here we go!"
1014303-142 = "Ahaha!"
1014303-143 = "That was amazing!"
1014303-148 = "Whoa!?"
1014303-152 = "[ns] \"Look out!\""
1014303-164 = "Please hold on tight!"
1014303-165 = "H-hold on tight, they said."
1014303-166 = "Hehe... you can't let go, okay?"
1014303-167 = "……."
1014303-168 = "Sensei's chest is so warm... and broad..."
1014303-169 = "It's very comforting."
1014303-170 = "[s] \"Y-yeah...\""
1014303-173 = "That concludes today's rafting!"
1014303-174 = "Thank you!"
1014303-175 = "[s] \"Thank you very much!\""
1014303-176 = "Please continue to enjoy your sightseeing!"
1014303-181 = "Sensei, Sensei! What should we do next?"
1014303-182 = "Well, let's see... it's getting a bit cold, so..."
1014303-183 = "I want to eat something warm!"
1014303-187 = "Oh, Sensei! That looks delicious!"
1014303-188 = "Meat and vegetable skewers... the scent of the spices is drifting all the way here...!"
1014303-190 = "That's... rice noodles! #nThe rice noodles in this region are famous for being packed with peanuts."
1014303-191 = "Shall we order one and share it?"
1014303-193 = "Sensei! Next, I want something cold and sweet!"
1014303-194 = "I heard the shaved ice here is delicious! #nThey say you can even add red beans, mung beans, and jelly as toppings!"
1014303-196 = "(And so, I 'completely conquered' the shopping street with Shun)"
1014303-197 = "(We looked at each other's full bellies and couldn't help but laugh)"
1014303-199 = "Phew... I think I ate a bit too much. My body is starting to feel hot."
1014303-200 = "But I don't have the energy to swim anymore..."
1014303-201 = "……."
1014303-202 = "Um, Sensei."
1014303-203 = "[s] \"What's wrong?\""
1014303-204 = "Thank you for letting me be spoiled today."
1014303-205 = "[s5] \"It's no trouble at all.\"\n[s6] \"You can lean on me anytime.\""
1014303-208 = "……."
1014303-209 = "I really do love you, Sensei!"
1014303-212 = "(Shun sat down in a clear puddle by the water and started playing happily)"
1014303-213 = "(As I watched her, feeling a bit dazed...)"
1014303-217 = "W-whoa!?"
1014303-218 = "[ns] \"Hm...? W-what's wrong!?!?!?\""
1014303-222 = "[wa:2020]― [log=슌 수영복]Eh, [wa:600]hyaaa!?[/log]"
1014303-225 = "― [log=슌 수영복]S- [wa:278]Sensei!?[/log]"
1014303-227 = "― [log=슌 수영복]This is, [wa:630]um...![/log]"
1014303-230 = "[wa:1210]― [log=슌 수영복]C- [wa:350]come to think of it...[/log]"
1014303-232 = "― [log=슌 수영복]Saya-san said it might [wa:1070]become a bit unstable, but... [wa:3000]could it be...?[/log]"
1014303-235 = "[ns] \"S-sorry!\""
1014303-236 = "[wa:880]― [log=슌 수영복]Y- [wa:440]you don't need to apologize, Sensei...![/log]"
1014303-238 = "― [log=슌 수영복]I- [wa:380]mean... [wa:970]um... [wa:1280]well.[/log]"
1014303-241 = "― [log=슌 수영복]W- [wa:570]what should I do...![/log]"
1014303-244 = "[ns] \"I-I'll just go over there for now!\""
1014303-245 = "[wa:660]― [log=슌 수영복]No![/log]"
1014303-248 = "― [log=슌 수영복]I- [wa:260]um...![/log]"
1014303-251 = "― [log=슌 수영복]Could you stand right there?[/log]"
1014303-253 = "― [log=슌 수영복]I need to hide...[/log]"
1014303-256 = "[wa:2260]― [log=슌 수영복]I'm... [wa:1550]alright, [wa:880]really.[/log]"
1014303-259 = "― [log=슌 수영복]Sensei, [wa:750]if that's the case...[/log]"
1014303-261 = "― [log=슌 수영복]A little longer [wa:1120]like this, [wa:1000]but...[/log]"
1014303-264 = "(While keeping an eye on the surroundings, I managed to bring Shun's swimsuit...)"
1014303-266 = "……."
1014303-267 = "[s] \"…….\""
1014303-268 = "S-say something, please..."
1014303-269 = "[s] \"W-what am I supposed to say...?\""
1014303-270 = "……."
1014303-271 = "I-I don't know either..."
1014303-273 = "(Perhaps because she was embarrassed)"
1014303-274 = "(After that, Shun was quieter than usual...)"