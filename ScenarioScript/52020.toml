[translation]
52020-1 = "第2話;新たな怪談"
52020-8 = "……茶柱。"
52020-9 = "それで……今日はどんな風の吹き回しだい？"
52020-14 = "ご無沙汰しております、コクリコ様。"
52020-18 = "その顔を見るのもいつぶりやろか。"
52020-19 = "ふふ……つい、筆が乗ってしまいまして。"
52020-20 = "……誰しもが心奪われる、そんな物語を書けたのかえ？"
52020-21 = "百聞は一見に如かず。#n私の口から語るのは、野暮というものでしょう。"
52020-22 = "そうかい。#nおまえさんの「怪芸家」としての才はよおくわかってるつもりさね。"
52020-23 = "けど……真の風流とは、#n春を告げる桜のように自然と人の心に芽吹くもの。#n……心得ておきや。"
52020-27 = "……はい。"
52020-28 = "先日頂戴しました「種」は無事根を下ろしました。#n蕾を膨らませる日もそう遠くはないでしょう。"
52020-29 = "ほう、もうそんな時期かえ。"
52020-30 = "[ruby=とうていぶっかいろく]「稲亭物怪録」[/ruby]に添えれば、さぞ雅な光景が広がることでしょう。#nそして、この世を燃やし尽くす礎に……。"
52020-31 = "ご苦労さん。#nかくして百物語は紡がれ、彼岸へと至る……#n結構なことじゃあないか。"
52020-35 = "黄昏の寺院で盛大な宴をやる日には、#n側近の座でも用意しておこうかね。"
52020-36 = "光栄に存じます。"
52020-39 = "……ところで、シュロはどこにいるのか、知らんかえ？"
52020-40 = "あの一件から姿を見せなくてねぇ……#nどこかでいじけてるんやないかって、心配で。"
52020-41 = "ご安心を。シュロは無事です。"
52020-42 = "いまもコクリコ様の悲願達成のため、力を尽くしておりますゆえ。"
52020-43 = "――まもなく、風流は完成するでしょう。"
52020-44 = "それは重畳。"
52020-45 = "あの子に会ったら、声をかけておいてくりゃれ。"
52020-46 = "仰せのままに。"
52020-55 = "ナグ……サ……！"
52020-56 = "ナグサナグサナグサナグサちゃぁぁん！！"
52020-63 = "せぇ～っかくの物語がぁ……あのバカ女のせいで台無しですぅ！"
52020-64 = "[ruby=ひゃくれん]「百蓮」[/ruby]の継承者がいない百花繚乱なんて、#n怯えて逃げ惑うだけのはずだったのに！"
52020-65 = "己の無力さを嘆くだけの！#n滑稽な悲劇が見られるはずだったのにぃ……！"
52020-66 = "一体なにがダメだったのでしょう……？"
52020-67 = "シャーレの先生が小賢しい戯言を並べた時？#n[ruby=むぼうのかたしろ]無貌の形代[/ruby]にヒビが入った時？"
52020-68 = "いぃぃぃ……っ！全部ナグサちゃんのせいです！#n風流を解さない奴らのせいでぜ～んぶ、全部全部滅茶苦茶になって！"
52020-69 = "コ、コクリコ様から頂いた、#n大事な大事な「[ruby=かいしょ]稲生物怪録[/ruby]」も……無くなってしまって……。"
52020-70 = "うぅぅぅぅ……！許さない……！ナグサちゃぁあん！！！"
52020-75 = "あらあら、こんなとこで八つ当たりしてたのかい？#nシュロちゃん。"
52020-76 = "暴れるのは勝手だけど……ほどほどにしないと。"
52020-80 = "[ruby=てめえ]手前[/ruby]も手前をバカにしに来たんですかぁ……？"
52020-81 = "まさか。心配してるのに……ひどいなぁ。"
52020-82 = "ああ、そうそう。#nコクリコ様からの伝言、聞きたい？"
52020-86 = "……コクリコ様？コクリコ様が手前のこと探してたんですかぁ！？"
52020-87 = "やっぱり手前のこと、必要なんですよね？"
52020-88 = "失敗したのに、ずいぶんと態度が大きいじゃないか。"
52020-89 = "あれだけやらかしておいて、#nコクリコ様がまだ優しくしてくれるとでも？"
52020-90 = "うっ……！"
52020-91 = "あの時、キミはコクリコ様の期待を裏切った。"
52020-92 = "早く次の怪談を作りなよ。#n次に黄昏に放り込まれるのはキミになるかもしれないよ？"
52020-97 = "う、嘘だ！#nコクリコ様は、いつも手前のことを信じてくださっていますし……。"
52020-98 = "この間のことだって、気にしなくていいって――"
52020-99 = "大切な[ruby=しょ]怪書[/ruby]は台無し。#nなのにこんなところで呑気に暴れてる。#n……それで、キミの価値は今どこにあるのかな？"
52020-100 = "……あ、違うか。#nもう、価値がないから放って置かれてるんだもんね。"
52020-105 = "そんな……それだけはイヤです！"
52020-106 = "ど、どうしましょう……！#nどうやってコクリコ様に応えればいいのですか……？"
52020-107 = "ふふ、安心して。私は、そんなキミを助けに来たんだ。"
52020-111 = "シュロ――キミに、チャンスをあげるよ。"
52020-118 = "これは……「稲亭物怪録」？"
52020-119 = "そう、花鳥風月部に残った最後の一冊だ。"
52020-120 = "――花鳥風月部には、3冊の怪書があった。"
52020-123 = "20年前、大雪原でコクリコ様が失った一冊。"
52020-124 = "キミが百鬼夜行でダメにした一冊。"
52020-125 = "そして、最後の一冊が――私が保管していた「稲亭物怪録」。"
52020-126 = "キミの「[ruby=いのうもののけろく]稲生物怪録[/ruby]」が人の[ruby=・]欲[/ruby][ruby=・]望[/ruby]を現世に映すものだとすれば、#nこの「稲亭物怪録」は[ruby=・]恐[/ruby][ruby=・]怖[/ruby]を形にする。"
52020-127 = "どうかな？"
52020-128 = "今回だけ、キミにこの[ruby=しょ]稲亭物怪録[/ruby]を貸してあげよう。"
52020-136 = "皆の恐怖を形と成し[ruby=げんりょうひゃくものがたり]、幻魎百物語で[/ruby]追い詰めていく……簡単だろう？"
52020-137 = "百花繚乱への復讐だって果たせるだろうね。"
52020-142 = "そうですね……できます。"
52020-143 = "……これがあれば、手前も再び怪談を綴れるでしょう。"
52020-147 = "あいつらに、今度こそ[ruby=あくむ]百物語[/ruby]を見せてやりますよぅ！！"
52020-148 = "その意気だよ、シュロちゃん。"
52020-152 = "きっと、これで完成するはずだ。"
52020-154 = "――キミの、そして私の百物語が、ね。"
52020-156 = "次回;新たなお祭り"
