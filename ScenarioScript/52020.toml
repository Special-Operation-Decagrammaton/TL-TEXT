[translation]
52020-1 = "Episódio 2; Novas Histórias de Fantasmas"
52020-8 = "......Um talo de chá em pé."
52020-9 = "E então... o que traz você aqui hoje?"
52020-14 = "Faz tempo que não nos vemos, Kokuriko-sama."
52020-18 = "Faz tempo que não vejo esse seu rosto."
52020-19 = "Fufu... é que a inspiração acabou fluindo."
52020-20 = "......Conseguiu escrever uma história que cativa o coração de todos?"
52020-21 = "Uma imagem vale mais que mil palavras. #n Seria falta de elegância eu mesma contar."
52020-22 = "Entendo. #n Acredito conhecer bem o seu talento como 'Contadora de Histórias Sobrenaturais'."
52020-23 = "Mas... a verdadeira elegância, assim como as flores de cerejeira que anunciam a primavera, brota naturalmente no coração das pessoas. #n ......Lembre-se disso."
52020-27 = "......Sim."
52020-28 = "A 'semente' que recebi outro dia criou raízes com sucesso. #n O dia em que os botões florescerem não deve estar longe."
52020-29 = "Ho, já é essa época?"
52020-30 = "Se for adicionado ao 'Inotei Mononokeroku', uma cena verdadeiramente elegante se espalhará. #n E então, servirá como base para queimar este mundo até o fim......"
52020-31 = "Bom trabalho. #n Assim, a Hyakumonogatari é tecida e chega ao outro lado... #n Não é algo maravilhoso?"
52020-35 = "No dia em que realizarmos o grande banquete no templo do crepúsculo, #n reservarei um assento para você."
52020-36 = "Sinto-me honrada."
52020-39 = "......A propósito, sabe onde Shuro está?"
52020-40 = "Ela não dá as caras desde aquele incidente... #n Estou preocupada pensando se ela não está por aí se remoendo em algum canto."
52020-41 = "Fique tranquila. Shuro está bem."
52020-42 = "Ela continua se esforçando para realizar o desejo de Kokuriko-sama."
52020-43 = "――Em breve, a elegância estará completa."
52020-44 = "Isso é excelente."
52020-45 = "Quando a encontrar, dê um recado para ela."
52020-46 = "Como desejar."
52020-55 = "Nagu... sa...!!"
52020-56 = "Nagusa Nagusa Nagusa Nagusa-chaaaaan!!!!!"
52020-63 = "A história que eu preparei com tanto esforço... foi arruinada por causa daquela mulher estúpida!"
52020-64 = "Sem a sucessora de 'Hyakuren', a Hyakkaryouran deveria apenas ter fugido cheia de medo!"
52020-65 = "Uma tragédia cômica, onde elas lamentam a própria fraqueza... era para ser isso que eu veria...!"
52020-66 = "O que foi que deu errado...?"
52020-67 = "Quando o Sensei da Schale falou aquelas besteiras? #n Quando rachaduras surgiram no 'Katashiro Sem Rosto'?"
52020-68 = "Iiiiii...! É tudo culpa da Nagusa-chan! Por causa de pessoas que não entendem a elegância, tudo, tudo, tudo foi arruinado!"
52020-69 = "O importante, o importantíssimo 'Inou Mononokeroku' que recebi da Kokuriko-sama... também... sumiu..."
52020-70 = "Uuuuuuu...! Eu não vou perdoar...! Nagusa-chaaaaan!!!"
52020-75 = "Ora, ora, descarregando sua raiva por aqui?"
52020-76 = "Pode se enfurecer o quanto quiser, mas... tente não exagerar."
52020-80 = "Você também veio aqui para zombar de mim...?"
52020-81 = "De jeito nenhum. Estou preocupada... que grosseria a sua."
52020-82 = "Ah, é verdade. #n Quer ouvir o recado de Kokuriko-sama?"
52020-86 = "......Kokuriko-sama? Kokuriko-sama estava me procurando!?"
52020-87 = "Então eu ainda sou necessária, não sou?"
52020-88 = "Você falhou e ainda acha que tem moral para falar assim?"
52020-89 = "Depois de estragar tudo desse jeito, #n acha mesmo que Kokuriko-sama ainda vai ser gentil com você?"
52020-90 = "Ugh...!"
52020-91 = "Naquela época, você traiu as expectativas de Kokuriko-sama."
52020-92 = "Vá criar a próxima história de fantasmas logo. #n Pode ser que a próxima pessoa a ser jogada no crepúsculo seja você?"
52020-97 = "M-Mentira! #n Kokuriko-sama sempre confiou em mim e..."
52020-98 = "Mesmo sobre o que aconteceu da outra vez, ela disse para eu não me preocupar――"
52020-99 = "Seu 'Livro Misterioso' importante foi arruinado. #n E mesmo assim você está aqui perdendo tempo fazendo birra. #n ......Qual é o seu valor agora?"
52020-100 = "......Ah, entendi. #n Você já não tem valor nenhum, por isso foi deixada de lado."
52020-105 = "Isso... isso eu não aceito!"
52020-106 = "O, o que eu faço...! #n Como posso retribuir a Kokuriko-sama...?"
52020-107 = "Fufu, não se preocupe. Eu vim para te salvar."
52020-111 = "Shuro―― vou te dar uma chance."
52020-118 = "Isso é... 'Inotei Mononokeroku'?"
52020-119 = "Sim, o último exemplar que restou no Clube das Flores, Pássaros, Vento e Lua."
52020-120 = "――Existiam três livros misteriosos no Clube das Flores, Pássaros, Vento e Lua."
52020-123 = "Um exemplar que Kokuriko-sama perdeu no campo de neve há 20 anos."
52020-124 = "Um exemplar que você estragou na Hyakkiyako."
52020-125 = "E o último exemplar―― o 'Inotei Mononokeroku' que eu guardava."
52020-126 = "Se o seu 'Inou Mononokeroku' reflete os desejos humanos no mundo real, #n este 'Inotei Mononokeroku' dá forma ao medo."
52020-127 = "O que acha?"
52020-128 = "Desta vez, vou te emprestar este 'Inotei Mononokeroku'."
52020-136 = "Dê forma ao medo de todos e encurrale-os com a 'Genryou Hyakumonogatari'... fácil, não?"
52020-137 = "Assim você poderá se vingar da Hyakkaryouran."
52020-142 = "Entendo... posso fazer isso."
52020-143 = "......Com isso, poderei tecer mais histórias de fantasmas."
52020-147 = "Desta vez eu mostrarei a elas a 'Hyakumonogatari' de verdade!!"
52020-148 = "Esse é o espírito, Shuro-chan."
52020-152 = "Tenho certeza que, com isso, estará completo."
52020-154 = "――A Hyakumonogatari sua e minha."
52020-156 = "Próximo Episódio; Um Novo Festival"

