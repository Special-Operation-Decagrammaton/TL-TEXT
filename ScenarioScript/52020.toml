[translation]
52020-1 = "Episódio 2; Um Novo Conto de Fantasmas"
52020-8 = "……Folha de chá em pé."
52020-9 = "Então…… que ventos te trazem aqui hoje?"
52020-14 = "Faz tempo que não nos vemos, Kokuriko-sama."
52020-18 = "Faz tempo que não vejo esse seu rosto."
52020-19 = "Fufu…… é que, de repente, a inspiração veio."
52020-20 = "……Conseguiu escrever uma história capaz de roubar o coração de qualquer um?"
52020-21 = "Ver para crer. #nSeria indelicado da minha parte tentar descrevê-la com palavras."
52020-22 = "Entendo. #nSei muito bem do seu talento como 'Contador de Histórias Sobrenaturais'."
52020-23 = "Mas…… a verdadeira elegância, #nassim como as cerejeiras que anunciam a primavera, brota naturalmente no coração das pessoas. #n……Lembre-se disso."
52020-27 = "……Sim."
52020-28 = "A 'semente' que recebi outro dia criou raízes com sucesso. #nO dia em que os botões desabrocharem não deve estar longe."
52020-29 = "Ho, já chegamos nessa época?"
52020-30 = "Se for adicionada ao 'Registro de Monstros de Inou', uma cena verdadeiramente elegante se espalhará. #nE então, servirá como base para queimar este mundo até as cinzas……"
52020-31 = "Bom trabalho. #nAssim, os cem contos serão tecidos e alcançarão o outro lado…… #nNão é algo maravilhoso?"
52020-35 = "No dia em que realizarmos o grande banquete no templo do crepúsculo, #nreservarei um lugar para você como meu braço direito."
52020-36 = "Sinto-me honrado."
52020-39 = "……A propósito, você sabe onde Shuro está?"
52020-40 = "Ela não dá as caras desde aquele incidente…… #nEstou preocupada, pensando se ela não está se escondendo em algum lugar."
52020-41 = "Fique tranquila. Shuro está bem."
52020-42 = "Ela continua se esforçando ao máximo para realizar o desejo de Kokuriko-sama."
52020-43 = "――Em breve, a elegância estará completa."
52020-44 = "Isso é excelente."
52020-45 = "Quando a encontrar, dê um recado a ela."
52020-46 = "Como desejar."
52020-55 = "Nagusa……!"
52020-56 = "Nagusa, Nagusa, Nagusa, Nagusa-chaaaan!!"
52020-63 = "A história que eu preparei com tanto carinho…… foi arruinada por causa daquela mulher idiota!"
52020-64 = "A Hyakka Ryoran, sem a sucessora de 'Hyakuren', #ndeveria ter apenas fugido de medo!"
52020-65 = "Deveria ter sido uma tragédia cômica, #nonde eles apenas lamentariam sua própria impotência……!"
52020-66 = "O que exatamente deu errado……?"
52020-67 = "Foi quando o Sensei do Schale disse aquelas baboseiras inteligentes? #nOu quando o 'Substituto Sem Rosto' rachou?"
52020-68 = "Iiii……! É tudo culpa da Nagusa-chan! Por causa dessas pessoas que não entendem a elegância, tudo, absolutamente tudo foi arruinado!"
52020-69 = "O 'Registro de Monstros de Inou', tão importante e precioso, #nque recebi de Kokuriko-sama…… também desapareceu……"
52020-70 = "Uuuuu……! Eu não vou perdoar……! Nagusa-chaaaan!!!"
52020-75 = "Ora, ora, descontando sua raiva aqui? #nShuro-chan."
52020-76 = "Fazer bagunça é problema seu, mas…… é bom não exagerar."
52020-80 = "Você também veio aqui para zombar de mim……?"
52020-81 = "De jeito nenhum. Estou preocupada com você…… que coisa horrível de se dizer."
52020-82 = "Ah, é verdade. #nQuer ouvir o recado de Kokuriko-sama?"
52020-86 = "……Kokuriko-sama? Kokuriko-sama estava me procurando!?"
52020-87 = "Então você ainda precisa de mim, não é?"
52020-88 = "Você falhou e ainda está com essa atitude arrogante?"
52020-89 = "Depois de fazer tanta besteira, #nvocê acha mesmo que Kokuriko-sama ainda será gentil com você?"
52020-90 = "Ugh……!"
52020-91 = "Naquela época, você traiu as expectativas de Kokuriko-sama."
52020-92 = "Trate de criar o próximo conto de fantasmas logo. #nQuem sabe se a próxima a ser jogada no crepúsculo não será você?"
52020-97 = "M-mentira! #nKokuriko-sama sempre confiou em mim……"
52020-98 = "Até sobre o que aconteceu outro dia, ela disse que não precisava me preocupar――"
52020-99 = "O precioso livro de contos foi arruinado. #nE mesmo assim, você está aqui fazendo birra tranquilamente. #n……Diga-me, qual é o seu valor agora?"
52020-100 = "……Ah, não, espere. #nJá que não tem mais valor, fui deixada de lado, não é?"
52020-105 = "Isso não... só isso, eu não quero!"
52020-106 = "O-o que eu devo fazer...? #nComo devo responder à Kokuriko-sama...?"
52020-107 = "Fufu, fique tranquila. Eu vim aqui para salvar você."
52020-111 = "Shuro — eu vou te dar uma chance."
52020-118 = "Isto é... o 'Inatei Monokairoku'?"
52020-119 = "Exatamente, o último volume que restou do Clube Kacho Fugetsu."
52020-120 = "— O Clube Kacho Fugetsu possuía três livros de mistérios."
52020-123 = "Um que a Kokuriko-sama perdeu na Grande Planície Nevada há 20 anos."
52020-124 = "Um que você arruinou em Hyakkiyako."
52020-125 = "E o último... o 'Inatei Monokairoku' que eu estava guardando."
52020-126 = "Se o seu 'Ino Mononoke Roku' reflete os desejos das pessoas no mundo real, #neste 'Inatei Monokairoku' dá forma ao medo."
52020-127 = "O que acha?"
52020-128 = "Desta vez, vou emprestar este Inatei Monokairoku para você."
52020-136 = "Transforme o medo de todos em forma e encurrale-os com o Genryo Hyakumonogatari... é simples, não é?"
52020-137 = "Você também poderá se vingar do Hyakka Ryoran, não é mesmo?"
52020-142 = "É verdade... eu consigo."
52020-143 = "……Com isto, eu poderei escrever contos de terror novamente."
52020-147 = "Desta vez, vou mostrar a eles o verdadeiro pesadelo!!"
52020-148 = "Esse é o espírito, Shuro-chan."
52020-152 = "Com certeza, isso será o toque final."
52020-154 = "— O seu, e o meu Hyakumonogatari."
52020-156 = "Próximo episódio: Um novo festival"
