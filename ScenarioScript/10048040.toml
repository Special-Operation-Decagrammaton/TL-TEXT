[translation]
10048040-1 = "第4話;純白の変数"
10048040-2 = "特殊交易部の寮"
10048040-3 = "朝だー！"
10048040-4 = "朝だよ、ミヨちゃん。"
10048040-5 = "学院に行く時間っ！"
10048040-9 = "うぅ……あと5分……。"
10048040-13 = "あれっ？リッちゃん……？"
10048040-14 = "はーい、リッちゃんで～す。"
10048040-15 = "ふふっ……。"
10048040-16 = "リッちゃん、気になってるんだけど……。"
10048040-17 = "うん？"
10048040-18 = "……なんで、ハンマーを持ってるの？"
10048040-19 = "あ、これはね……。"
10048040-24 = "ミヨを叩き起こすために決まってるじゃん！"
10048040-25 = "あんたは黙っててください。"
10048040-26 = "それでリッちゃん、ハンマーは……。"
10048040-27 = "すぐアトリエ行こうと思ってさ。準備してたんだ！"
10048040-28 = "ハンマーとノミと、穴あけとー。"
10048040-29 = "ああ、なるほど。"
10048040-30 = "ふふっ、リッちゃんは真面目ですね。"
10048040-31 = "ふふ、どこかのねぼすけさんとは違うねぇ。"
10048040-32 = "これは全部あんたのせいでしょ……！"
10048040-33 = "夜通し、搬出作戦の筋書きを考えてたんですよ！？"
10048040-34 = "なんと！もう桜井先生の完成稿が読めるのですかっ！"
10048040-35 = "はぁ……調子いいんですから。"
10048040-36 = "……こんなものを書くために入学したわけじゃないのに。"
10048040-38 = "ミヨちゃんは、自分の作品……嫌いなの？"
10048040-39 = "あっ、そ、そういうわけじゃ……。"
10048040-40 = "方向性が、私の求めていたものとは違う……といいますか。"
10048040-41 = "ボクは、ミヨちゃんの文章好きだよ？"
10048040-42 = "ボクが一番好きな作家さん、ミヨちゃんだもん！"
10048040-43 = "リッちゃん……。"
10048040-45 = "あ、扱いの差がすごくないですか……。"
10048040-46 = "もうちょっと、私のことも可愛がってくれると嬉しいんだけど……。"
10048040-47 = "……。"
10048040-48 = "はぁ。"
10048040-49 = "それで、作戦ですが。"
10048040-50 = "スルーはひどくないですか！？"
10048040-51 = "だいたい完成しましたよ。"
10048040-52 = "まず、向かう先は展示場ではなく――"
10048040-54 = "ん？展示場の絵を運ぶんだよね？"
10048040-55 = "ううん、「展示される予定の絵」を運ぶの。"
10048040-56 = "今『誰が紫、青を愛でるのか』は展示場にはないですよね。"
10048040-57 = "ではどこにあるのか――学院内の収蔵庫に保管されているはず。"
10048040-58 = "ほとんどの作品は展示が始まる前に一旦収蔵庫に運び込まれます。"
10048040-59 = "あっ……！"
10048040-60 = "はい。実際に展示が始まるまではそこで保管していて、会場の設営時に運び出されます。"
10048040-61 = "収蔵庫って倉庫のことだよね？"
10048040-62 = "じゃあ、そこの壁を壊せばいいってこと？"
10048040-63 = "ダメです、リッちゃん。 "
10048040-64 = "依頼人から倉庫の修理代は貰ってないんです。"
10048040-66 = "んー、つまり想定よりも難しくなったってことか……。"
10048040-67 = "それで、どうやって収蔵庫に入るの？"
10048040-68 = "だいたいのプロット……いえ、計画はできています。#n詳しい内容は後ほど。"
10048040-69 = "まずは授業に行かないと。"
10048040-70 = "リッちゃん、彫刻がんばってきてね。"
10048040-71 = "うんっ！"
10048040-76 = "私には？"
10048040-77 = "それじゃ。"
10048040-81 = "うう……。"
10048040-85 = "ワイルドハントの教室"
10048040-87 = "んん……。"
10048040-88 = "もう……授業終わりですか……？"
10048040-90 = "ミヨちゃん、大丈夫か？"
10048040-94 = "あっ、ヒロミちゃん。"
10048040-99 = "珍しいな、居眠りなんて。"
10048040-100 = "ちゃんと寝ているのか？"
10048040-101 = "……あはは、昨日あまり眠れなかったんです。"
10048040-102 = "でも、ヒロミちゃんも目の下にクマがあるような……。"
10048040-103 = "ああ……このところ、仕事が一気に増えてね。"
10048040-104 = "ヒロミちゃんは寮監隊の副隊長ですからね……。"
10048040-105 = "なにかあったんですか？"
10048040-106 = "もうじき開かれるベロニカ特別展の件が立て込んでいてな。"
10048040-107 = "（ギクッ）"
10048040-108 = "あっ、ああ……そ、そうなんですね……。"
10048040-109 = "展示作品はすでに収蔵庫に届いてるんだが……。"
10048040-110 = "警備を私たちが担当することになってね。"
10048040-111 = "収蔵庫の、警備……。"
10048040-112 = "た、大変そうですね……。"
10048040-113 = "（ごめんなさい、ヒロミちゃん……！）"
10048040-114 = "まあ、元々私たちの仕事でもあるからな。#n大したことではない。"
10048040-115 = "気がかりといえば、この件の対応に追われてるせいで密輸関連の摘発がまともにできていないことくらいだろうか。"
10048040-116 = "ここのところ、禁制品の摘発件数が増えているし……。"
10048040-117 = "（ギクッ）"
10048040-118 = "そ、そうなんですね……。"
10048040-119 = "ミヨちゃんは[ruby=・]こ[/ruby][ruby=・]の[/ruby][ruby=・]手[/ruby][ruby=・]の[/ruby][ruby=・]こ[/ruby][ruby=・]と[/ruby]とは無縁だからな。"
10048040-120 = "だからだろうか……こうやって話していると、落ち着くんだ。"
10048040-121 = "この仕事をしていると、いつも相手のことを疑ってしまって……。"
10048040-122 = "でもミヨちゃんと話す時だけは、そんなことなくて……肩の力を抜けるんだ。"
10048040-123 = "（うわああーんごめんなさーーーい！！）"
10048040-124 = "ふぅ……。"
10048040-125 = "まあ、私の近況はそんなところだ。"
10048040-126 = "その……ヒロミちゃん。"
10048040-127 = "ん？"
10048040-128 = "まだ、何か言いたいことがあるんじゃないですか？"
10048040-129 = "……。"
10048040-130 = "……ミヨちゃんには、内緒にできないな。"
10048040-131 = "なんだか、いつもより声に元気がないと思いまして……。"
10048040-132 = "ふふ……。"
10048040-133 = "よく見てるね。"
10048040-134 = "実は今、かなり面倒なことに巻き込まれてしまっていてね。"
10048040-135 = "これを見てくれ。"
10048040-136 = "これは……手紙？"
10048040-137 = "ああ。一昨日、ベロニカ特別展の運営委員会宛てに届いたものだ。"
10048040-138 = "読んでみてくれ。"
10048040-139 = "は、はい。"
10048040-144 = "[log][ruby=カタツムリ]蝸牛[/ruby]は哭き[/log]"
10048040-145 = "[log]硬き空がゆがみ[/log]"
10048040-146 = "[log]王のみぞ微笑む[/log]"
10048040-147 = "[log]戸が閉まり、虹に染まる――[/log]"
10048040-149 = "[log]魔法の刹那にお会いしましょう[/log]"
10048040-153 = "まさか、これ……！"
10048040-154 = "ああ。"
10048040-156 = "……「慈愛の怪盗」の予告状だ。"
