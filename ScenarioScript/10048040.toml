[translation]
10048040-1 = "Episódio 4: Variável de Branco Puro"
10048040-2 = "Dormitório do Departamento de Comércio Especial"
10048040-3 = "Bom dia!"
10048040-4 = "Bom dia, Miyo-chan."
10048040-5 = "Hora de ir para a academia!"
10048040-9 = "Ugh... só mais 5 minutos..."
10048040-13 = "Ué? Ricchan...?"
10048040-14 = "Sim, é a Ricchan aqui."
10048040-15 = "Fufu..."
10048040-16 = "Ricchan, estou curiosa sobre uma coisa..."
10048040-17 = "Hm?"
10048040-18 = "...Por que você está segurando um martelo?"
10048040-19 = "Ah, isso é porque..."
10048040-24 = "É claro que é para acordar a Miyo na marra!"
10048040-25 = "Você, fique quieta."
10048040-26 = "Mas Ricchan, o martelo..."
10048040-27 = "Pensei em ir direto para o ateliê. Já estava me preparando!"
10048040-28 = "Martelo, cinzel, furadeira e..."
10048040-29 = "Ah, entendi."
10048040-30 = "Fufu, a Ricchan é muito dedicada."
10048040-31 = "Fufu, bem diferente de certa dorminhoca por aí, né?"
10048040-32 = "Isso é tudo culpa sua...!"
10048040-33 = "Eu passei a noite inteira pensando no plano para a operação de remoção, sabia!?"
10048040-34 = "Nossa! Então já posso ler o rascunho final da Professora Sakurai!?"
10048040-35 = "Haa... você é muito cara de pau."
10048040-36 = "...Não foi para escrever esse tipo de coisa que eu entrei na academia."
10048040-38 = "Miyo-chan, você... não gosta do seu próprio trabalho?"
10048040-39 = "Ah, n-não é isso..."
10048040-40 = "É que a direção que ele tomou é diferente do que eu buscava... por assim dizer."
10048040-41 = "Eu gosto dos textos da Miyo-chan, sabia?"
10048040-42 = "A minha escritora favorita é a Miyo-chan!"
10048040-43 = "Ricchan..."
10048040-45 = "A-a diferença no tratamento não é um pouco grande demais...?"
10048040-46 = "Eu ficaria feliz se você me desse um pouco mais de carinho também..."
10048040-47 = "..."
10048040-48 = "Haa."
10048040-49 = "Enfim, sobre a operação."
10048040-50 = "Ignorar a gente não é um pouco cruel!?"
10048040-51 = "Já está praticamente pronta."
10048040-52 = "Primeiro, o nosso destino não é a galeria, mas sim—"
10048040-54 = "Hm? A gente não vai buscar o quadro na galeria?"
10048040-55 = "Não, vamos buscar o 'quadro que está planejado para ser exibido'."
10048040-56 = "O quadro 'Quem ama o roxo e o azul' não está na galeria agora, está?"
10048040-57 = "Então, onde ele está? Deve estar guardado no depósito da academia."
10048040-58 = "A maioria das obras é levada para o depósito antes do início da exposição."
10048040-59 = "Ah...!"
10048040-60 = "Exato. Elas ficam guardadas lá até a exposição começar, e só são levadas para o local na hora da montagem."
10048040-61 = "Depósito é tipo um armazém, né?"
10048040-62 = "Então é só quebrar a parede de lá?"
10048040-63 = "Não pode, Ricchan."
10048040-64 = "Eu não recebi o dinheiro do conserto do depósito do cliente."
10048040-66 = "Hmm, então quer dizer que ficou mais difícil do que o esperado..."
10048040-67 = "E então, como vamos entrar no depósito?"
10048040-68 = "O esboço geral... não, o plano já está pronto. #nOs detalhes virão mais tarde."
10048040-69 = "Primeiro, preciso ir para a aula."
10048040-70 = "Ricchan, boa sorte com a escultura."
10048040-71 = "Sim!"
10048040-76 = "E quanto a mim?"
10048040-77 = "Até mais."
10048040-81 = "Ugh..."
10048040-85 = "Sala de aula de Wildhunt"
10048040-87 = "Hmm..."
10048040-88 = "Já... a aula acabou...?"
10048040-90 = "Miyo-chan, você está bem?"
10048040-94 = "Ah, Hiromi-chan."
10048040-99 = "Que raro, você cochilando."
10048040-100 = "Você está dormindo direito?"
10048040-101 = "...Ahaha, eu não consegui dormir muito bem ontem."
10048040-102 = "Mas, Hiromi-chan, você também parece estar com olheiras..."
10048040-103 = "Ah... é que ultimamente o trabalho aumentou de uma vez só."
10048040-104 = "Afinal, a Hiromi-chan é a vice-capitã da equipe de supervisão do dormitório..."
10048040-105 = "Aconteceu alguma coisa?"
10048040-106 = "É que as coisas estão acumuladas por causa da Exposição Especial da Veronica que vai abrir em breve."
10048040-107 = "(Gulp)"
10048040-108 = "Ah, entendo... é, faz sentido..."
10048040-109 = "As obras da exposição já chegaram ao depósito, mas..."
10048040-110 = "Ficou decidido que nós seremos responsáveis pela segurança."
10048040-111 = "A segurança... do depósito."
10048040-112 = "P-parece ser bem difícil..."
10048040-113 = "(Me desculpe, Hiromi-chan...!)"
10048040-114 = "Bem, originalmente esse é o nosso trabalho mesmo. #nNão é nada demais."
10048040-115 = "Se tem algo que me preocupa, é que por estarmos ocupadas com isso, não estamos conseguindo investigar o contrabando direito."
10048040-116 = "Ultimamente, o número de apreensões de itens proibidos tem aumentado, e..."
10048040-117 = "(Gulp)"
10048040-118 = "E-entendo..."
10048040-119 = "A Miyo-chan não tem nada a ver com esse tipo de assunto, afinal."
10048040-120 = "Talvez seja por isso... conversar com você assim me acalma."
10048040-121 = "Quando estou fazendo esse trabalho, acabo sempre suspeitando das pessoas..."
10048040-122 = "Mas só quando converso com a Miyo-chan é que isso não acontece... eu consigo relaxar."
10048040-123 = "(Uwaaaan, me desculpeeee!!)"
10048040-124 = "Ufa..."
10048040-125 = "Bem, é isso sobre como as coisas estão por aqui."
10048040-126 = "Sobre isso... Hiromi-chan."
10048040-127 = "Hm?"
10048040-128 = "Você não tem mais nada para me dizer?"
10048040-129 = "..."
10048040-130 = "...Não consigo esconder nada de você, Miyo-chan."
10048040-131 = "É que achei que sua voz estava menos animada que o normal..."
10048040-132 = "Fufu..."
10048040-133 = "Você é bem observadora."
10048040-134 = "Na verdade, estou envolvido em algo bastante problemático agora."
10048040-135 = "Dê uma olhada nisto."
10048040-136 = "Isto é... uma carta?"
10048040-137 = "Sim. Chegou anteontem para o comitê organizador da exposição especial da Veronica."
10048040-138 = "Leia, por favor."
10048040-139 = "S-sim."
10048040-144 = "[log]O caracol chora[/log]"
10048040-145 = "[log]O céu rígido se distorce[/log]"
10048040-146 = "[log]Apenas o rei sorri[/log]"
10048040-147 = "[log]A porta se fecha, tingida pelo arco-íris—[/log]"
10048040-149 = "[log]Nos encontraremos no instante mágico[/log]"
10048040-153 = "Não pode ser, isto é...!"
10048040-154 = "Sim."
10048040-156 = "...É uma carta de aviso do 'Ladrão da Benevolência'."
