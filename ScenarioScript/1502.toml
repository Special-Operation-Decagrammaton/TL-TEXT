[translation]
1502-1 = "Trouble & Trackers（２）"
1502-2 = "Sala de reuniões do Seminário de Millennium"
1502-4 = "Yuuka, trouxe a balança que usamos para o exame físico. É a última."
1502-5 = "Bom trabalho, Eimi."
1502-6 = "Ufa... eu estava preocupada que as alunas insatisfeitas com os resultados do exame físico pudessem causar confusão, mas, felizmente, nada aconteceu desta vez."
1502-7 = "Desta vez?"
1502-8 = "As alunas de Millennium são figuras complicadas, então, toda vez que tem exame físico, tem várias que trazem suas próprias invenções para causar alvoroço."
1502-9 = "Tem aluna que pede para pesar usando sapatos com propulsores a jato, ou aluna que vem de traje energizado e quer que meça a força muscular na hora..."
1502-10 = "Por que será que elas não entendem que o exame físico é um teste para verificar o 'estado atual do seu próprio desenvolvimento'?"
1502-11 = "É verdade, que estranho."
1502-12 = "Claro, não é como se eu não entendesse o sentimento. #nEu também queria ter mexido no ponteiro da balança neste exame físico."
1502-13 = "Ai... comi doces demais enquanto acompanhava aquelas garotas do Clube de Desenvolvimento de Jogos..."
1502-14 = "Com a sua autoridade, Yuuka, não seria fácil corrigir o registro dos dados escolares?"
1502-15 = "Isso não pode! Se uma oficial do Seminário abusasse da autoridade, a disciplina da escola viraria uma bagunça, não acha?"
1502-16 = "A contabilidade do Seminário tem que ser mais justa do que qualquer outra coisa!"
1502-17 = "Entendi..."
1502-22 = "Yuuka. Quero inserir um novo registro nos dados escolares, qual é a senha?"
1502-23 = "A senha dos dados escolares? Não me lembro de ter definido nada, então deve estar na configuração inicial, não?"
1502-24 = "Tente digitar ＜1q2w3e4r＞."
1502-29 = "…Ah, funcionou. Obrigada."
1502-31 = "Sala de descanso dos hackers da Veritas"
1502-32 = "…Interceptação concluída."
1502-33 = "Como esperado da veterana Kotama!"
1502-34 = "E então, descobriu a senha para conectar ao servidor de dados escolares?"
1502-35 = "Sim, a Yuuka estava usando a senha padrão de fábrica."
1502-36 = "Hã? A contadora de Millennium usa a senha sem mudar nada? #n...A consciência de segurança dela não é baixa demais?"
1502-37 = "Graças a isso, hackers como nós conseguem invadir tão facilmente."
1502-38 = "Agora é a vez do meu drone. Espere só um pouco. #nVou mandar o drone até o servidor físico que se conecta à rede local."
1502-44 = "…Invasão concluída, conectei o terminal de conexão."
1502-45 = "Daqui em diante é com você, Maki, consegue?"
1502-46 = "Com certeza, deixa comigo!"
1502-50 = "Vou escanear os dispositivos conectados a partir do nó que o drone da veterana Hare conectou..."
1502-54 = "Depois de sobrecarregar o servidor proxy e neutralizá-lo..."
1502-58 = "Se eu usar a senha interceptada para assumir a autoridade de administrador..."
1502-64 = "Isso! Consegui a autoridade para modificar os registros do exame físico!"
1502-65 = "Certo, por onde vamos começar a corrigir?"
1502-66 = "Primeiro, vou reduzir o peso em 10kg, aumentar a altura em uns 10cm e colocar o busto em 90cm..."
1502-67 = "Esse peso para esse tipo físico, não está surreal demais?"
1502-68 = "Maki, faça o mesmo comigo também."
1502-69 = "Fufu, pode pedir mais. Vou corrigir tudo o que quiserem!"
1502-74 = "Hm? O que é isso? #nContabilidade do Seminário... ah, é o registro do exame físico da veterana Yuuka."
1502-75 = "Ultimamente ela só vive me atrapalhando... será que aproveito a oportunidade para fazer uma pegadinha?"
1502-76 = "Uma pegadinha?"
1502-77 = "Estava pensando em manipular os dados e mudar o peso da veterana Yuuka para 100kg!"
1502-78 = "Aí, quando ela for conferir o próprio peso depois, vai levar um susto, não acha? Fufufu..."
1502-79 = "Para quem falou com tanta confiança, é uma vingança bem insignificante..."
1502-88 = "A-ah? De repente as teclas pararam de funcionar! O que está acontecendo!?"
1502-89 = "Parece que alguém do outro lado do servidor está fazendo um contra-ataque de hacking. Mais 10 segundos...!"
1502-90 = "Maki, apague o log e corte a conexão agora mesmo!"
1502-91 = "M-mas! #nDesistir dos dados que finalmente consegui é um desperdício...!"
1502-92 = "Hum, tem outro nó por perto... Ah, quer saber, não entendo nada! Vou copiar qualquer coisa mesmo!"
1502-98 = "＜SYSTEM＞ Copiando arquivos da pasta 「student_data」 para a pasta 「social_network」..."
1502-99 = "Ei! Maki, o que você está fazendo agora!?"
1502-100 = "Hã? Eu só estava tentando fazer backup dos dados antes que perdessem a autorização..."
1502-101 = "Você acabou de fazer upload dos dados escolares para o servidor de rede social público!"
1502-102 = "......Ops."
1502-104 = "Sala de reuniões do Seminário de Millennium"
1502-105 = "......Ué?"
1502-106 = "O que foi, Eimi? É raro ver você com essa cara de surpresa."
1502-107 = "Yuuka. Não quero nem acreditar, mas as informações de altura e peso das alunas são públicas?"
1502-108 = "Hã? Claro que não. As informações das alunas que medimos hoje estão sob um sistema de segurança de nível máximo. Mesmo que fossem os hackers da Veritas, eles não deveriam conseguir acessar esses dados!"
1502-109 = "Mas os registros de medição física de todo mundo acabaram de ser postados na rede social da escola."
1502-110 = "O-o que você disse!?"
1502-115 = "É, é verdade. Quem faria uma coisa dessas? #n... E como?"
1502-119 = "Yuuka."
1502-120 = "O-o que foi?"
1502-121 = "Você realmente engordou. Parece que vai precisar de um controle alimentar adequado."
1502-122 = "Hã?? Que tipo de insulto gratuito é esse, do nada!?"
1502-123 = "É-é claro que meu peso aumentou um pouquinho comparado ao ano passado, mas... ainda estou dentro da média!"
1502-124 = "Mas o registro da Yuuka que subiu na rede social diz que você pesa 100kg..."
1502-129 = "Não tem como isso ser verdade, seu idiotaaaaaa!!"
