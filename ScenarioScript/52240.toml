[translation]
52240-1 = "Episódio 24; O lamento do demônio é o uivo distante do leão"
52240-2 = "Nyahaha~ Por um triz! #nOu melhor, por meio triz, eu diria."
52240-3 = "Eu agi de propósito com calma para fazer o oponente baixar a guarda, mas... por dentro, eu estava morrendo de medo."
52240-4 = "Não tem como eu deixar passar aquele sinal que é passado de geração em geração na Hyakkaryouran."
52240-5 = "O fogo de artifício branco que sobe na torre do castelo é o sinal de que \"há um problema no Departamento Yin-Yang\"."
52240-6 = "Foi o timing perfeito! #nQue bom que chegamos a tempo!"
52240-7 = "Tsc... todo mundo aqui é rápido para fugir. #nEu pensei que desta vez tinha pegado eles no flagra..."
52240-8 = "I-impossível, me levar à força... #nSe eu tivesse o livro estranho, vocês..."
52240-9 = "Ora? Você está acompanhada de alguém inesperado."
52240-10 = "Essa combinação curiosa... parece que muita coisa aconteceu, não é?"
52240-11 = "[s1] \"Niya, você está bem?\"\n[s2] \"Não se feriu?\""
52240-14 = "Sim. Meu corpo é resistente, então♪"
52240-15 = "Além disso, tive a ajuda de escoltas muito confiáveis. Graças a vocês, o Festival Waraku pôde ser realizado em segurança. #nProfessor [USERNAME], obrigada."
52240-16 = "[s] \"Fico feliz em ouvir isso.\""
52240-17 = "Sim, foi de grande ajuda."
52240-18 = "Mas, o que eu pude fazer foi apenas isso... #nJá é o máximo que consigo fazer para manter o status quo."
52240-19 = "Diante do absurdo avassalador que é o Hyakkiyakou, eu fui impotente demais."
52240-20 = "O dia em que deixarei o cargo de chefe do Departamento Yin-Yang está próximo..."
52240-26 = "……Nyaa!?"
52240-27 = "Fique parada! Vou desinfetar esse ferimento!"
52240-28 = "M-mas é só um arranhão..."
52240-29 = "Se ficar uma cicatriz, vai ser tarde demais."
52240-30 = "Mesmo que seja algo pequeno... precisamos fazer o que deve ser feito na hora certa."
52240-31 = "……Nagusa-san."
52240-32 = "[s3] \"Você diz que é impotente.\"\n[s4] \"Mas ninguém consegue fazer tudo sozinho.\""
52240-37 = "[ns] \"Eu também, se não fossem os alunos, não seria ninguém.\""
52240-38 = "……Se o professor diz isso."
52240-43 = "De fato, agora não é hora de ficar desanimada."
52240-44 = "Primeiro de tudo, fico feliz que tenham retornado em segurança. #nProfessor [USERNAME] e todos da Hyakkaryouran."
52240-45 = "E também... a pequena contadora de histórias do Departamento de Flores, Pássaros, Vento e Lua."
52240-49 = "Pode parar de me chamar de pequena!?"
52240-50 = "— Primeiro, vamos organizar a situação. #nVou transmitir as informações que o Departamento Yin-Yang obteve."
52240-51 = "Para entender o estado atual e criar contramedidas, a primeira coisa é separar os registros dos boatos."
52240-52 = "Sim. Informações não verificadas são o nosso maior inimigo."
52240-54 = "Entendo, é assim mesmo. Ayame-san..."
52240-55 = "Ela era alguém que parecia estar em perigo, mas... não imaginava que fosse tanto."
52240-56 = "Não ter percebido que a presidente da Hyakkaryouran estava sendo levada a esse ponto... foi uma falha nossa."
52240-57 = "Não, a culpa de não ter percebido o sofrimento da Ayame é minha. #nSe eu tivesse ficado mais ao lado dela..."
52240-58 = "A culpa é de todos nós, não é?"
52240-59 = "Você disse que carregar tudo sozinha é um defeito seu, não disse, senpai?"
52240-60 = "É isso mesmo! Nós também temos culpa por termos deixado a Ayame-senpai se esforçar tanto!"
52240-61 = "Desta vez, vamos carregar isso juntos!"
52240-65 = "……É verdade. Proteger a Ayame era o objetivo de todos nós."
52240-69 = "……Eu queria perguntar uma coisa, Chefe Niya."
52240-70 = "É verdade que apenas continuar com o festival é o suficiente para suprimir o poder da Ayame... o poder do Hitotsume?"
52240-71 = "Não? Como o artista de histórias estranhas disse, é apenas uma solução temporária."
52240-72 = "É verdade que o medo diminui nos corações das pessoas que estão entusiasmadas com o festival, e isso enfraquece o poder, mas..."
52240-73 = "As emoções são instáveis."
52240-74 = "Assim que o entusiasmo do festival passar, #no Hitotsume provavelmente aparecerá novamente por todo o Hyakkiyakou."
52240-75 = "O maior problema é... a presidente Ayame."
52240-76 = "A Ayame-senpai é realmente muito forte, mas..."
52240-77 = "Sim, é exatamente esse o problema."
52240-78 = "Até onde eu sei, não há ninguém que possa vencer a presidente Ayame."
52240-79 = "Isso é... verdade."
52240-80 = "Eu também, nunca consegui vencer a Ayame nem uma vez..."
52240-81 = "Não importa quantos Hitotsume a gente derrote, enquanto a presidente Ayame, a fonte de tudo, estiver bem, ela continuará usando o medo como combustível para agir novamente."
52240-82 = "Droga... Ela era tão confiável, mas agora que virou nossa inimiga, é assustadora."
52240-83 = "Mas não significa que não tenhamos uma carta na manga, sabe?"
52240-84 = "Afinal, temos a lendária arma 'Hyakuren', capaz de perfurar livros de mistério, e todas vocês da Hyakki Yakou reunidas."
52240-85 = "Se conseguirmos derrotar as lendas urbanas pela cidade e chegar até a presidente Ayame, teremos uma chance de destruir o livro de mistério..."
52240-86 = "Mas só existe uma Hyakuren, não é? Contra essa quantidade de monstros..."
52240-87 = "Por isso... nós também usaremos um livro de mistério."
52240-88 = "Sabe o que dizem, não é? 'Combater fogo com fogo'."
52240-89 = "Deixaremos que as próprias criaturas sobrenaturais lidem com as outras."
52240-90 = "Mas, se não temos o livro de mistério principal..."
52240-91 = "Sobre isso—"
52240-96 = "Hã? O que você está dizendo...?"
52240-97 = "Combater um livro de mistério com outro? #nSe fosse tão fácil de conseguir, eu não estaria fazendo tudo isso!"
52240-98 = "Além disso, você tem ideia de quanto tempo levou para eu, uma contadora de histórias, conseguir manipular o 'Inou Mononoke Roku'? #nMesmo que vocês tentem por anos—"
52240-99 = "Nós temos o 'Inou Mononoke Roku'."
52240-100 = "...Hã?"
52240-104 = "Sim, aqui está."
52240-106 = "I-Isso é... real!?"
52240-107 = "N-Não pode ser... O 'Inou Mononoke Roku' deveria ter sido queimado e destruído..."
52240-108 = "Pois é. Quando o encontramos, só restavam a capa esfarrapada e alguns pedaços de páginas."
52240-109 = "Restaurar um livro inteiro a partir de cinzas é normalmente impossível. #nE sendo um livro de mistério, é ainda mais difícil..."
52240-110 = "No entanto, entre as escolas com as quais mantemos contato, existe alguém como uma 'maga' que torna o impossível possível..."
52240-119 = "Está dizendo que uma simples aluna consertou o Inou Mononoke Roku...?"
52240-120 = "Como isso seria possível...!"
52240-126 = "...Mas este livro, não tem nada escrito nele!"
52240-127 = "Mesmo sendo uma maga talentosa, ela disse que não conseguiu recuperar o conteúdo que foi queimado."
52240-132 = "E-Então isso não tem sentido nenhum! #nA força de um livro de mistério nasce das histórias contadas dentro dele!"
52240-133 = "De que adianta consertar só a aparência—"
52240-136 = "Que sentido teria algo assim?"
52240-139 = "Não tem sentido nenhum... é o que você pensa."
52240-143 = "Sim, um livro de mistério sem nada escrito é apenas um livro comum."
52240-144 = "Sendo assim... por que não escrevemos uma nova história nele?"
52240-145 = "Pelo popular romancista 'Kuchiki Shura'."
52240-146 = "...Kuchiki Shura?"
52240-147 = "Kuchiki Shura é..."
52240-148 = "[s] \"É o pseudônimo do Shuro, né?\""
52240-149 = "V-V-Você! Como você sabe disso!"
52240-150 = "Claro que eu sei. Você publicava semanalmente no site 'Vamos Escrever Novels!', não é?"
52240-151 = "Eu sou fã da série que você escreveu antes, 'O Caso em que Fui para Outro Mundo e me Tornei um Contador de Histórias Super Nivelado'~"
52240-153 = "A-Aaaaaah! O estilo daquela época é diferente do de agora...!"
52240-154 = "Aquele poder apelão que podia fazer qualquer coisa e as reviravoltas absurdas que pareciam ter sido inventadas na hora... #nEra uma obra-prima, e a seção de comentários pegava fogo a cada novo capítulo postado..."
52240-155 = "I-Isso é, por causa que...!"
52240-156 = "Não, eu entendo perfeitamente. #nA essência daquela obra são os temas profundos escondidos em cada capítulo."
52240-157 = "Deve ter sido frustrante lidar com leitores que não conseguiam nem ler nas entrelinhas."
52240-161 = "...Você leu a minha novel?"
52240-162 = "Sim. Por isso eu disse que sou sua fã, não disse?"
52240-163 = "Srta. Shuro, pense bem."
52240-164 = "Quando a sua história se tornar realidade através do poder do livro bizarro, que cara será que farão aquelas pessoas que comentaram que 'não tinha realismo'..."
52240-165 = "Aquele sentimento de ser ridicularizada sem que ninguém lesse de verdade, de se sentir frustrada e miserável..."
52240-166 = "Não gostaria de devolver tudo isso exatamente na mesma moeda?"
52240-170 = "……Hã."
52240-171 = "Isso não vai acontecer!"
52240-172 = "Para mim, além das Cem Histórias que a Srta. Kokuriko apreciará――"
52240-173 = "Não tem problema, sabe?#nMesmo que eu crie novas Cem Histórias em Hyakkiyako."
52240-174 = "……Você está falando sério!?"
52240-175 = "Sim... fico curiosa para saber qual história os leitores vão preferir, a dela ou a sua."
52240-176 = "E-espere, Chefe Niya. Se você deixar ela fazer isso...!"
52240-177 = "Shiu..."
52240-178 = "Parece que ela tem um plano."
52240-182 = "A-as minhas Cem Histórias... aqui..."
52240-185 = "Quando você entender isso, certamente... será capaz de obter o livro que pertence apenas a você."
52240-188 = "Um livro bizarro... só meu."
52240-192 = "Qual será a resposta...?"
52240-200 = "……Posso realmente escrever qualquer coisa?"
52240-202 = "Então... a próxima música será..."
52240-206 = "Chise-chan, força...!"
52240-224 = "Srta. Phina, mais inimigos por trás!"
52240-225 = "E-e pela frente também! I-isso já é demais para mim...!"
52240-226 = "Uuu... achei que tinham diminuído, mas aumentaram de novo..."
52240-227 = "Desse jeito..."
52240-232 = "Ué? Esse miado..."
52240-233 = "Um gato?"
52240-234 = "Não me diga que até aquele gato monstro da última vez――!?"
52240-246 = "Miau-aaaaaon!"
52240-250 = "……Ué, o que é aquilo?"
52240-251 = "Parece um pouco diferente daquele gato monstro de antes... ou melhor, bem diferente..."
52240-252 = "Parece um desenho de criança...?"
52240-259 = "[log=슈로]『O Myouki Kurokage, renascido pelas mãos do maior contador de histórias, é...[/log]"
52240-261 = "[log=슈로]Transbordando um poder que faz qualquer um tremer só de olhar...[/log]"
52240-263 = "[log=슈로]Err... [wa:1000]enfim, todos ficaram aterrorizados!』[/log]"
52240-266 = "[log=슈로]『……Grande [wa:1000]……seus bigodes e [wa:1000]o chifre na testa ferem tudo o que tocam...[/log]"
52240-268 = "[log=슈로]Uma aparência super maligna e incrível...!』[/log]"
52240-271 = "[log=슈로]『Sua forma rugindo ferozmente, [wa:1000]já não é mais um gato,[/log]"
52240-273 = "[log=슈로]Parecia um leão nobre, gigante e o mais forte de todos...』[/log]"
52240-277 = "Ahaha, o que é aquilo!"
52240-278 = "Isso também faz parte da apresentação do Festival Waraku?"
52240-279 = "Que fofo~!"
52240-280 = "Chefe, Srta. Tsukuyo! Os monstros estão confusos!"
52240-281 = "Agora é a hora!"
52240-282 = "M-mas nossas armas e bombas não funcionam naquele monstro...?"
52240-283 = "E já acabaram nossas ideias de armadilhas ou de atraí-los para outros lugares..."
52240-286 = "Ah...! Quando foi que...!"
52240-289 = "Srta. Tsukuyo, é perigoso!"
52240-297 = "As balas... acertaram?"
52240-298 = "P-por que...?"
52240-302 = "Ei, o que é esse desenrolar...?"
52240-303 = "Se é para ter uma virada emocionante contra um inimigo forte, precisava de um pouco mais de planejamento, não acha...?"
52240-304 = "É por isso que leitores amadores são um problema! Quando se trata de clichês nessas horas...!"
52240-309 = "[log=슈로]『Naquele momento... ao lado do leão, [wa:1000] bem... havia aqueles que lutavam ao seu lado!』[/log]"
52240-318 = "Uau!? De, de repente, um poder incrível começou a surgir!"
52240-319 = "Chefe, eu não sabia que existia uma técnica dessas!"
52240-320 = "Hã, o que é isso? Eu não conheço... que medo!"
52240-321 = "De, de qualquer forma, com isso parece que conseguiremos conter o monstro! Vamos proteger o palco!"
52240-326 = "Clube de Pesquisa de Ninjutsu, avançar!"
