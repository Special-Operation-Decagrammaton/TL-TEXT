[translation]
52240-1 = "Episódio 17; O Lamento do Oni é o Uivo do Leão"
52240-2 = "Nyahaha~ Por um triz! #n Hm, talvez por 'meio' triz, eu diria."
52240-3 = "Eu agi de forma lenta de propósito para baixar a guarda de vocês...... mas, no fundo, eu estava suando frio."
52240-4 = "Não há como deixar passar aquele sinal transmitido por gerações na Hyakkaryouran."
52240-5 = "Os fogos de artifício brancos subindo na torre do castelo são o sinal de 'problemas no Clube Yin-Yang'."
52240-6 = "Foi o timing perfeito! #n Que bom que conseguiram chegar a tempo!"
52240-7 = "Tsc...... eles são muito rápidos para fugir. #n E pensar que eu tinha certeza de que tínhamos pego o rastro deles desta vez......"
52240-8 = "P, por que vocês me trouxeram à força...... #n Se eu tivesse o livro misterioso, vocês estariam acabados......!"
52240-9 = "Ora? Vocês estão acompanhados por alguém inesperado."
52240-10 = "Que combinação misteriosa...... parece que muita coisa aconteceu aqui, não é?"
52240-11 = "[s1] \"Niya, você está bem?\"\n[s2] \"Não se feriu?\""
52240-14 = "Sim. Meu corpo é resistente, afinal♪"
52240-15 = "Além disso, tive a presença de escoltas confiáveis. Graças a isso, o Festival Waraku pôde ser realizado em segurança. #n Sensei [USERNAME], obrigada."
52240-16 = "[s] \"Que bom.\""
52240-17 = "Sim, você foi de grande ajuda."
52240-18 = "Mas, o que eu pude fazer acaba aqui...... #n Estou no meu limite apenas tentando manter a situação sob controle."
52240-19 = "Diante do absurdo esmagador que é a Hyakumonogatari, eu me senti muito impotente."
52240-20 = "O dia em que eu deixarei o posto de chefe do Clube Yin-Yang deve estar próximo――"
52240-26 = "......Nyaaa!?"
52240-27 = "Por favor, fique parada! Vou desinfetar esse ferimento!"
52240-28 = "M, mas é só um arranhão......"
52240-29 = "Se ficar uma cicatriz, será tarde demais."
52240-30 = "Mesmo que seja uma coisa pequena...... devemos fazer o que deve ser feito na hora certa."
52240-31 = "......Nagusa-san."
52240-32 = "[s3] \"Você diz que é impotente, mas...\"\n[s4] \"Ninguém consegue fazer tudo sozinho.\""
52240-37 = "[ns] \"Eu também, sem meus alunos, não seria ninguém.\""
52240-38 = "......Se o Sensei diz isso."
52240-43 = "De fato, não é hora de ficar desanimando."
52240-44 = "Primeiramente, estou feliz que tenham retornado em segurança. #n Sensei [USERNAME], e todos da Hyakkaryouran."
52240-45 = "E também...... a pequena contadora de histórias do Clube das Flores, Pássaros, Vento e Lua."
52240-49 = "Pode parar de me chamar de pequena!?"
52240-50 = "――Primeiro, vamos organizar a situação. #n Vou repassar as informações que o Clube Yin-Yang conseguiu."
52240-51 = "Para compreender a situação atual e traçar contramedidas, o primeiro passo é separar os registros dos boatos."
52240-52 = "Sim. Informações não verificadas são nosso maior inimigo, afinal."
52240-54 = "Entendo, é verdade. Ayame-san......"
52240-55 = "Ela parecia uma pessoa frágil...... mas não imaginava que fosse a esse ponto."
52240-56 = "Não ter detectado que a presidente da Hyakkaryouran estava sendo levada ao seu limite...... foi uma falha nossa."
52240-57 = "Não, a culpa é minha por não ter percebido o sofrimento da Ayame. #n Se eu tivesse estado mais perto dela――"
52240-58 = "Todos nós temos culpa nisso, não é?"
52240-59 = "Você não disse que carregar tudo sozinha é um defeito da senpai?"
52240-60 = "Exatamente! Foi culpa de todas nós termos deixado a Ayame-senpai fazer algo tão imprudente!"
52240-61 = "Desta vez, vamos carregar tudo juntas!"
52240-65 = "......É verdade. Proteger a Ayame sempre foi o objetivo de todas nós."
52240-69 = "......Quero perguntar uma coisa, Diretor Niya."
52240-70 = "É verdade que apenas realizar o festival suprime o poder da Hyakumonogatari...... o Hitotsume?"
52240-71 = "Não? Como a artista disse, é apenas um paliativo."
52240-72 = "É verdade que o medo diminui no coração das pessoas empolgadas com o festival, o que enfraquece o poder, mas......"
52240-73 = "As emoções oscilam."
52240-74 = "Assim que a empolgação do festival passar, #n o Hitotsume provavelmente aparecerá em toda Hyakkiyako novamente."
52240-75 = "O maior problema...... é a presidente Ayame."
52240-76 = "A Ayame-senpai é certamente muito forte, mas......"
52240-77 = "Sim, exatamente esse é o problema."
52240-78 = "Até onde eu sei, não há ninguém que possa vencer a presidente Ayame."
52240-79 = "Isso é...... verdade."
52240-80 = "Eu também, nunca venci a Ayame nenhuma vez......"
52240-81 = "Não importa quantas vezes derrotemos o Hitotsume, enquanto a Ayame, a origem de tudo, estiver ativa, o medo continuará servindo de isca e eles voltarão a agir."
52240-82 = "Droga...... era tão reconfortante ter ela ao lado, mas agora que virou inimiga, ela é aterrorizante."
52240-83 = "Mas isso não significa que não haja o que fazer."
52240-84 = "Afinal, vocês têm a Hyakuren, a arma lendária que perfura livros misteriosos, e todos da Hyakkaryouran reunidos."
52240-85 = "Se conseguirem derrotar as histórias de fantasmas pela cidade e chegar até a presidente Ayame, podem ter uma chance de destruir o livro misterioso......"
52240-86 = "Mas a Hyakuren só tem uma unidade, não é? Contra essa quantidade de monstros......"
52240-87 = "Por isso...... vamos usar um livro misterioso também."
52240-88 = "Bem, como dizem, 'combata o veneno com veneno', certo?"
52240-89 = "Usaremos monstros para lidar com monstros."
52240-90 = "Mas, se não temos o livro misterioso principal......"
52240-91 = "Sobre isso――"
52240-96 = "Hã? O que você está dizendo......?"
52240-97 = "Combater um livro misterioso com outro? #n Se fosse tão fácil de conseguir, eu não teria passado por tudo isso!"
52240-98 = "E também, você tem ideia de quanto tempo levou para que eu conseguisse usar o 'Inotei Mononokeroku' sendo uma contadora de histórias? #n Mesmo que vocês tentassem, não conseguiriam nem em anos――"
52240-99 = "Nós temos o 'Inotei Mononokeroku'."
52240-100 = "......Hã?"
52240-104 = "Sim, aqui está."
52240-106 = "I, isso é...... verdadeiro!?"
52240-107 = "N, não pode ser...... o 'Inotei Mononokeroku' deveria ter sido queimado e desaparecido......"
52240-108 = "De fato. Quando o encontramos, restavam apenas a capa esfarrapada e alguns fragmentos de páginas."
52240-109 = "Normalmente, é impossível restaurar um livro a partir de cinzas. #n Ainda mais um livro misterioso......"
52240-110 = "No entanto, entre as academias com as quais temos contato, existe alguém como um 'mágico' que pode tornar o impossível em possível......"
52240-119 = "Você está me dizendo que uma aluna comum consertou o Inotei Mononokeroku......?"
52240-120 = "Isso não é possível......!"
52240-126 = "......Mas este livro não tem nada escrito!"
52240-127 = "Mesmo sendo um mágico, dizem que não é possível saber o conteúdo que foi perdido pelo fogo."
52240-132 = "E, então não tem significado nenhum! #n O poder de um livro misterioso nasce das histórias de fantasmas dentro dele!"
52240-133 = "Apenas consertar a aparência――"
52240-136 = "Que significado tem algo desse tipo?"
52240-139 = "Dizem que não tem significado nenhum......"
52240-143 = "Sim, um livro misterioso sem nada escrito é apenas um livro."
52240-144 = "Nesse caso...... por que não escrevemos uma nova história aqui?"
52240-145 = "Pela romancista popular 'Kutsuki Shura'."
52240-146 = "......Kutsuki Shura?"
52240-147 = "Kutsuki Shura é......"
52240-148 = "[s] \"É o pseudônimo da Shuro, né?\""
52240-149 = "V, você! Como sabe disso!"
52240-150 = "Claro que sei. Você publicava semanalmente no site de envios 'Vamos Escrever Novels!', não era?"
52240-151 = "Eu sou fã da série 'O Caso em que Fui para Outro Mundo, Virei um Contador de Histórias e Aumentei Muito o Meu Nível' que você escreveu antigamente~"
52240-153 = "N, não, aquela época e agora têm estilos diferentes......!"
52240-154 = "Aquela habilidade de trapaça que podia fazer tudo, e as viradas super repentinas que pareciam ideias de momento...... #n A seção de comentários que pegava fogo a cada novo capítulo postado era uma obra-prima imperdível, mas......"
52240-155 = "I, isso é, porque......!"
52240-156 = "Não, eu entendo. #n A essência daquela obra são os temas profundos escondidos em cada capítulo, certo?"
52240-157 = "Deve ter sido frustrante lidar com leitores que nem conseguiam ler as entrelinhas."
52240-161 = "......Você leu meu romance?"
52240-162 = "Sim. Por isso disse que sou fã."
52240-163 = "Shuro-san, pense comigo."
52240-164 = "Quando sua história se tornar realidade através do poder do livro misterioso, que cara farão aqueles que comentaram que 'não tinha realismo'......"
52240-165 = "Aquele sentimento frustrante e miserável de não ser lido corretamente e ser motivo de risada――"
52240-166 = "Você não gostaria de devolver esse sentimento exatamente na mesma medida?"
52240-170 = "......Ah."
52240-171 = "Não vou cair nessa!"
52240-172 = "Eu não faço nada além da Hyakumonogatari que a Kokuriko-sama vai gostar――"
52240-173 = "Não tem problema, eu entendo. #n Mesmo que você crie uma nova Hyakumonogatari em Hyakkiyako."
52240-174 = "......Você está falando sério!?"
52240-175 = "Sim...... estou curiosa para saber qual história os leitores vão preferir, a dela ou a sua."
52240-176 = "E, espere, Chefe Niya. Se você deixar ela fazer isso......!"
52240-177 = "Psiu......"
52240-178 = "Ela parece ter um plano."
52240-182 = "A, a minha Hyakumonogatari...... está aqui......"
52240-185 = "No dia em que entender isso, com certeza poderá adquirir o seu próprio livro."
52240-188 = "Meu próprio livro misterioso......"
52240-192 = "Qual será a resposta......?"
52240-200 = "......Sério, eu posso escrever qualquer coisa?"
52240-202 = "Então...... a próxima música é......"
52240-206 = "Chise-chan, força......!"
52240-224 = "Feena-dono, inimigos de novo por trás!"
52240-225 = "P, pela frente também......! I, isso é demais, Niya-!"
52240-226 = "Uu...... pensei que tinham diminuído, mas aumentaram de novo......"
52240-227 = "Deste jeito......"
52240-232 = "Hã? Esse som......"
52240-233 = "Um gato?"
52240-234 = "Não me diga que aquele gato monstro da última vez também――!?"
52240-246 = "Gunyauooooooon!"
52240-250 = "......Eh, o que é aquilo?"
52240-251 = "Parece um pouco com aquele gato monstro de antes...... não, é bem diferente, eu diria......"
52240-252 = "P, parece um desenho de criança......?"
52240-259 = "[log=슈로]『Renascido pelas mãos da Contadora de Histórias Mais Forte, o Myouki Kurokage...[/log]"
52240-261 = "[log=슈로] transborda uma força que faz qualquer um tremer apenas de olhar...[/log]"
52240-263 = "[log=슈로] eh... [wa:1000] de qualquer forma, todos ficaram apavorados!』[/log]"
52240-266 = "[log=슈로]『......Grandes [wa:1000] ......bigodes, e os chifres na testa ferem tudo o que tocam...[/log]"
52240-268 = "[log=슈로] aparência super maligna e incrível......!』[/log]"
52240-271 = "[log=슈로]『Seu rugido feroz, [wa:1000] não é mais de um gato, mas[/log]"
52240-273 = "[log=슈로] parecia um nobre, forte e gigantesco leão...』[/log]"
52240-277 = "Ahaha, o que é aquilo!"
52240-278 = "Isso também é uma atração do Festival Waraku?"
52240-279 = "É tão fofo~!"
52240-280 = "Chefe, Tsukuyo-dono! Os monstros estão perturbados!"
52240-281 = "Agora é a hora!"
52240-282 = "M, mas nossas balas e bombas não funcionam naqueles monstros......?"
52240-283 = "E usar armadilhas ou atraí-los para outros lugares também já não adianta......"
52240-286 = "Ah......! Quando foi que......!"
52240-289 = "Tsukuyo-dono, perigo!"
52240-297 = "A bala...... acertou?"
52240-298 = "P, por que......?"
52240-302 = "Ei, que tipo de desenvolvimento é esse......?"
52240-303 = "Se vai haver uma virada emocionante contra um inimigo forte, precisava de um pouco mais de preparação, sabe......?"
52240-304 = "É por isso que leitores amadores são um problema! Em momentos como este, a regra de ouro é......!"
52240-309 = "[log=슈로]『Naquele momento...... ao lado do leão, [wa:1000] eh... [ultimateninja] aqueles que lutam juntos[/log]"
52240-318 = "Uau!? U, uma força incrível começou a surgir de repente!"
52240-319 = "Chefe, eu não sabia que existia essa técnica!"
52240-320 = "Eh, o que é isso, não conheço...... que medo!"
52240-321 = "D, de qualquer forma, parece que conseguimos parar os monstros! Vamos proteger o palco!"
52240-326 = "Pesquisa Ninjutsu, avançar!"

