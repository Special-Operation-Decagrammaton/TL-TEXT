[translation]
52240-1 = "第24話;鬼哭は獅子の遠吠えに"
52240-2 = "にゃはは～間一髪！#nんや、間半髪ですかねぇ。"
52240-3 = "相手を油断させようと、わざとのんびりしていたのですが……内心ひやひやでしたよ。"
52240-4 = "百花繚乱に代々伝わるあの信号を、見落とすはずないでしょ。"
52240-5 = "天守閣に上がる白い花火は、「陰陽部に問題発生」の合図。"
52240-6 = "完璧なたいみんぐでしたわ！#n間に合ってよかったですの！"
52240-7 = "チッ……どいつもこいつも逃げ足だけは速いな。#n今度こそ尻尾を掴んだと思ったのに……。"
52240-8 = "む、無理矢理連れてきてぇ……。#n怪書があれば[ruby=てめえ]手前[/ruby]らなんて……！"
52240-9 = "あら？意外な方とご一緒ですね。"
52240-10 = "この不思議な組み合わせ……なにやら色々とあったようですねぇ。"
52240-11 = "[s1] \"ニヤ、大丈夫？\"\n[s2] \"怪我はしてない？\""
52240-14 = "ええ。身体は丈夫ですので♪"
52240-15 = "それに、頼もしい護衛のみなさんもいらっしゃいましたし。おかげさまで、和楽まつりも無事開催と相成りました。#n[USERNAME]先生、ありがとうございます。"
52240-16 = "[s] \"それはよかったよ。\""
52240-17 = "ええ、とても助かりましたとも。"
52240-18 = "ですが、私にできたのはここまで……。#n現状維持に務めるので精一杯です。"
52240-19 = "百物語という圧倒的な不条理を前に、私はあまりに無力でした。"
52240-20 = "これは陰陽部の部長の座を退く日も近――"
52240-26 = "……にﾞゃﾞっﾞ！？"
52240-27 = "じっとしてくださいまし！傷口を消毒しますわ！"
52240-28 = "か、かすり傷みたいなものですって……。"
52240-29 = "痕になってからじゃ、遅いからね。"
52240-30 = "ほんの小さなことでも‥…やるべきときにやらないと。"
52240-31 = "……ナグサさん。"
52240-32 = "[s3] \"無力と言うけど。\"\n[s4] \"全部をひとりでできる人はいないよ。\""
52240-37 = "[ns] \"私も、[ruby=みんな]生徒[/ruby]がいなければ、何者でもないから。\""
52240-38 = "……先生がそうおっしゃるのなら。"
52240-43 = "たしかに、今は弱音を吐いている場合ではありませんね。"
52240-44 = "まず、無事に帰還されて何よりです。#n[USERNAME]先生、そして百花繚乱の皆さん。"
52240-45 = "あと……花鳥風月部のちっちゃな怪談家さんも。"
52240-49 = "ちっちゃいって言わないでくれますっ！？"
52240-50 = "――まず、状況を整理しましょうか。#n陰陽部の把握している情報をお伝えしますね。"
52240-51 = "現状を把握し、対策を立てるには記録と噂をより分けることが第一です。"
52240-52 = "うん。精査されていない情報が、一番の敵だからね。"
52240-54 = "なるほど、そうですか。アヤメさんは……。"
52240-55 = "どこか危うさを感じる方ではありましたが……それほどとは。"
52240-56 = "百花繚乱の委員長が、そこまで追い込まれていたことを感知できなかったのは……こちらの落ち度です。"
52240-57 = "違う、アヤメの苦しみに気がつけなかったのは、私のせいだよ。#n私がもっと寄り添っていたら――"
52240-58 = "非があるのは、私たち全員でしょ。"
52240-59 = "何もかも一人で背負うの、先輩の悪い癖って言ったよね？"
52240-60 = "そうですわ！アヤメ先輩に無茶をさせてしまったのは身共たちだって同じですもの！"
52240-61 = "今度こそ、アタシらみんなで背負おう！"
52240-65 = "……そうだね。アヤメを守るのは、私たち全員の目標だった。"
52240-69 = "……一つ聞きたいのだけど、ニヤ部長。"
52240-70 = "お祭りを続けるだけで、アヤメの百物語‥‥…ヒトツメの力を抑えられるのは事実なの？"
52240-71 = "いえ？怪芸家の言っていた通り、その場しのぎですよ。"
52240-72 = "お祭りに熱狂する人々の心から恐怖が薄まり、それによって弱まるのは確かです、が……。"
52240-73 = "感情は、揺れ動くものです。"
52240-74 = "お祭りの熱気が収まれば、#n再度ヒトツメが百鬼夜行全域に現れることでしょう。"
52240-75 = "一番の問題は……アヤメ委員長です。"
52240-76 = "アヤメ先輩はたしかにお強いですが……。"
52240-77 = "そう、まさにそれが問題でして。"
52240-78 = "アヤメ委員長に敵う者は、私の知る限りいません。"
52240-79 = "それは……そうですの。"
52240-80 = "私も、一度だってアヤメに勝てなかった……。"
52240-81 = "いくらヒトツメを倒しても、大元のアヤメ委員長が健在な限り、恐怖を餌としてまた活動を始めるでしょう。"
52240-82 = "くそっ……頼りになっただけに、いざ敵に回ると恐ろしいな。"
52240-83 = "ですが、打つ手なしというわけでもないんですよ？"
52240-84 = "怪書を貫く伝説の銃「百蓮」と、百花繚乱の皆さんがお揃いなんですから。"
52240-85 = "市中の怪談を倒しながらアヤメ委員長の元へと辿り着ければ、怪書を破壊するチャンスだって……。"
52240-86 = "でも、百蓮は一丁しかないぞ？この数の化け物が相手じゃ……。"
52240-87 = "ですので……こちらも怪書を使うんですよ。"
52240-88 = "ほら、「毒を以て毒を制す」と言いますでしょう？"
52240-89 = "怪異の相手は、怪異にしてもらいます。"
52240-90 = "でも、肝心の怪書がないなら……。"
52240-91 = "それはですね――"
52240-96 = "はぁ？何を言っているんですかぁ……？"
52240-97 = "怪書に怪書で対抗？#nそんな簡単に手に入るなら、手前がこんなことしてないですよぉ！"
52240-98 = "それに、怪談家の手前が「稲生物怪録」を扱えるようになるまで、#nどれだけかかったと思ってるんですぅ？#n手前らじゃ何年かかってもぉ――"
52240-99 = "ありますよ、「稲生物怪録」。"
52240-100 = "……は？"
52240-104 = "はい、どうぞ。"
52240-106 = "こ、これは……本物！？"
52240-107 = "あ、ありえない……「稲生物怪録」は燃えてなくなったはず……。"
52240-108 = "そうですねぇ。我々が発見した時には、ボロボロになった表紙と、ページの切れ端くらいしか残っていませんでした。"
52240-109 = "燃えかすから一冊の本を復元するなんて、普通は不可能。#n怪書ともなればなおさらです……。"
52240-110 = "しかし、我々が交流している学園の中には、そんな不可能を可能にする「魔術師」のような方がおりまして……。"
52240-119 = "ただの生徒が、稲生物怪録を直したっていうんですかぁ……？"
52240-120 = "そんなことできるわけ……！"
52240-126 = "……ってこの本、何も書かれてないじゃないですか！"
52240-127 = "流石の魔術師といえど、焼失した内容までは分からないとのことでして。"
52240-132 = "そ、それでは意味がないじゃないですかぁ！#n怪書の力は、本の中の怪談から生まれるのですから！"
52240-133 = "見かけだけ直したって――"
52240-136 = "あのようなものに何の意味があるんじゃ？"
52240-139 = "何の意味もない……って。"
52240-143 = "ええ、何も書かれていない怪書など、ただの本です。"
52240-144 = "それならば……ここに新しい物語を書いてしまえばいいじゃないですか。"
52240-145 = "人気小説家「朽木修羅」が。"
52240-146 = "……朽木修羅？"
52240-147 = "朽木修羅って……。"
52240-148 = "[s] \"シュロのペンネーム、だよね？\""
52240-149 = "て、てて[ruby=てめえ]手前[/ruby]ぇ！なんでそれを！"
52240-150 = "もちろん知っていますとも。投稿サイトの「小説、書こうよ！」で毎週連載していましたよね？"
52240-151 = "私、以前書かれていた「異世界に行ったら怪談家になって超レベルアップした件」シリーズのファンでして～"
52240-153 = "う、うわあぁぁぁぁぁぁっ！あ、あの頃と今では作風が違ぁ……っ！"
52240-154 = "なんでもできるチート能力や、思いつきをそのまま入れたような超展開……。#n最新話がアップされるたびに燃え上がるコメント欄が必見の名作だったのですが……。"
52240-155 = "そっ、それは、だからぁっ……！"
52240-156 = "いえ、分かっておりますとも。#nあの作品の真髄は、各章に込められた深いテーマたちですよね。"
52240-157 = "行間も読めない読者を相手して、悔しくてたまらなかったことでしょう。"
52240-161 = "……手前の小説、読んだんですかぁ？"
52240-162 = "ええ。だからファンだとお伝えしたじゃないですか。"
52240-163 = "シュロさん、考えてもみてくださいよ。"
52240-164 = "あなたの物語が怪書の力で現実となったとき、「リアリティがない」とコメントしていた方々が、どんな顔をするか……。"
52240-165 = "ちゃんと読んでもらえず笑い物にされて、悔しく惨めだった、あの気持ち――"
52240-166 = "そのままそっくり返してやりたい……そうは思いませんか？"
52240-170 = "……はっ。"
52240-171 = "そうはいきませんからぁ！"
52240-172 = "手前は、コクリコ様が喜んでくれる百物語以外は――"
52240-173 = "別にいいですよ？#n百鬼夜行に新しい百物語を作り出しても。"
52240-174 = "……本気なんですかぁ！？"
52240-175 = "ええ……はたして、読者は彼女とあなたの物語、どちらに惹かれるのでしょう。気になりますねぇ。"
52240-176 = "ま、待てよニヤ部長。そんなことやらせたら……！"
52240-177 = "しっ……。"
52240-178 = "考えがあるみたい。"
52240-182 = "て、手前の百物語が……ここに……。"
52240-185 = "これがわかった時には、きっと……其方だけの書を手に入れられるはずじゃ。"
52240-188 = "手前だけの、怪書……。"
52240-192 = "返答はいかに……？"
52240-200 = "……本当に、何を書いてもいいんですねぇ？"
52240-202 = "それじゃ……次の曲は……。"
52240-206 = "チセちゃん、ファイトです……！"
52240-224 = "フィーナ殿、後ろからまた敵が！"
52240-225 = "ま、前からもデス……！こ、これ以上は流石ニ……！"
52240-226 = "うう……減ったと思ったのに、また増えてる……。"
52240-227 = "このままじゃ……。"
52240-232 = "あれ？この鳴き声……。"
52240-233 = "猫？"
52240-234 = "まさか、前回のあの化け猫まで――！？"
52240-246 = "ぐにゃおぉぉぉぉんっ！"
52240-250 = "……えっ、なにあれ。"
52240-251 = "なんか、あの時の化け猫とはちょっと……いや、大分違うっていうか……。"
52240-252 = "こ、子供の落書きみたいな……？"
52240-259 = "[log=슈로]『最強[ruby=すとおりいてらあ]の怪談家の[/ruby]手によって生まれ変わったみょうきクロカゲは……[/log]"
52240-261 = "[log=슈로]一目見るだけで誰もが震え上がる強さがほとばしり……[/log]"
52240-263 = "[log=슈로]えーっと……[wa:1000]とにかく全員おそれおののいた！』[/log]"
52240-266 = "[log=슈로]『……大きい[wa:1000]……ヒゲと、[wa:1000]額の角は触れるもの全てを傷つけ……[/log]"
52240-268 = "[log=슈로]超、[ruby=だあく]邪悪[/ruby]なすごい見た目……！』[/log]"
52240-271 = "[log=슈로]『猛々しく吠える姿は、[wa:1000]最早猫ではなく、[/log]"
52240-273 = "[log=슈로]まるで気高く最強でデカい[ruby=らいおん]獅子[/ruby]のようだった……』[/log]"
52240-277 = "あははっ、何あれ！"
52240-278 = "あれも和楽まつりの演出？"
52240-279 = "なんか可愛い～！"
52240-280 = "部長、ツクヨ殿！怪物たちが動揺しています！"
52240-281 = "今です！"
52240-282 = "で、でもあの怪物には、私たちの銃や爆弾は効かないよ……？"
52240-283 = "罠を仕掛けたり他の場所に誘導するのも、もうネタ切れだし……。"
52240-286 = "あっ……！いつの間に……！"
52240-289 = "ツクヨ殿、危険です！"
52240-297 = "銃弾が……当たった？"
52240-298 = "な、なんで……？"
52240-302 = "おい、この展開どうなんだよ……？"
52240-303 = "強い敵に熱く逆転するんなら、もうちょっと段取りって言うか……なぁ？"
52240-304 = "これだから素人の読者は困るんですよぉ！こういう時のお約束といえばぁ……！"
52240-309 = "[log=슈로]『その時……[ruby=らいおん]獅子[/ruby]の傍には、[wa:1000]えっと…[ruby=あるてぃめっと・にんじゃ]…共に戦う者た[/ruby]ちがいた！』[/log]"
52240-318 = "わあっ！？きゅ、急にすごい力が湧き出てきましたよ！"
52240-319 = "部長、こんな術があったとは！"
52240-320 = "えっ、何それ知らない……怖っ！"
52240-321 = "と、とにかく、これなら怪物を食い止められそうです！舞台を守りましょう！"
52240-326 = "忍術研究部、突入します！"
