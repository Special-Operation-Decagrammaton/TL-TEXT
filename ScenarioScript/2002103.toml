[translation]
2002103-1 = "Treino especial! O caminho para ser um Papai Noel!"
2002103-2 = "Sendo assim!"
2002103-3 = "Depois de pensar e pensar sobre o que é necessário para se tornar um verdadeiro Papai Noel...!"
2002103-4 = "[s1] \"Estou começando a ficar preocupado...\"\n[s2] (Espero que seja algo que eu consiga lidar...)"
2002103-5 = "Ah, não precisa ficar com tanto medo assim."
2002103-6 = "Ah, não precisa ficar com tanto medo assim."
2002103-7 = "Está tudo bem. É algo que podemos fazer aqui mesmo, agora!"
2002103-8 = "[s] \"Se é assim, tudo bem... mas, depois de pensar sobre isso...?\""
2002103-9 = "Parkour!!!"
2002103-10 = "Sabe, aquilo de superar obstáculos e paredes usando apenas o próprio corpo!"
2002103-11 = "Para entregar os presentes... para escalar paredes livremente e subir e descer chaminés..."
2002103-12 = "Com certeza, tem que ser parkour!"
2002103-13 = "Então, Sensei, #nque tal praticarmos parkour juntos?"
2002103-14 = "[s] Fugir."
2002103-15 = "Ei, Sensei! #nNão fuja, você é um adulto!"
2002103-16 = "[s] \"Só porque sou adulto não significa que consigo fazer parkour! E o local também...\""
2002103-17 = "Não se preocupe com o local!"
2002103-18 = "Mesmo aqui na área residencial do Schale, está tudo bem."
2002103-19 = "As paredes não são tão altas e #nparecem bem resistentes!"
2002103-20 = "O Papai Noel não desiste em nenhuma situação... #nse é assim, eu também não posso desistir!"
2002103-21 = "Vamos lá, Sensei. Eu vou subir primeiro, então me siga!"
2002103-27 = "(Dizendo isso, Hanae começou a escalar a parede imediatamente)"
2002103-32 = "(Mas, talvez por falta de costume, parecia um pouco perigoso...)"
2002103-33 = "Hmm, é assim que se faz..."
2002103-34 = "Kyaa!?"
2002103-39 = "(Segurei Hanae com os dois braços no último segundo enquanto ela caía)"
2002103-41 = "[ns] \"Isso foi perigoso...\""
2002103-42 = "Como esperado do Sensei, eu sabia que você me seguraria!"
2002103-43 = "Se o Sensei está aqui, não tenho medo de nada!"
2002103-44 = "Vamos lá, Sensei, vamos para o próximo lugar!"
2002103-49 = "(Fui arrastado por Hanae para outro lugar)"
2002103-51 = "Hmm, este aqui parece difícil... #nquase não tem onde segurar..."
2002103-52 = "Mas se eu desistir por causa disso, não posso me chamar de Papai Noel!"
2002103-53 = "[s] \"Não seria melhor nem tentar...?\""
2002103-54 = "Vou colocar estas luvas para não escorregar... #ne colocar os pés aqui..."
2002103-55 = "Um passo de cada vez, com cuidado...!"
2002103-57 = "Os prédios de Trinity têm muitos enfeites, #nparece até mais fácil de subir!"
2002103-58 = "Mas se eu quebrar essas decorações, vou levar uma bronca, então..."
2002103-59 = "Vamos fazer com cuidado!"
2002103-60 = "[s] \"E a opção de não fazer nada!?\""
2002103-62 = "Então, vamos começar, sem perder o equilíbrio..."
2002103-63 = "Sem depender apenas das mãos e pés, usando o corpo todo...!"
2002103-64 = "Olhe só, Sensei! #nO que achou!?"
2002103-65 = "[s] \"É incrível, mas olha onde você pisa!\""
2002103-67 = "Área residencial antiga"
2002103-68 = "Esta área parece ser a mais próxima de uma situação real."
2002103-69 = "Tem lugares onde, se você não tomar cuidado, o chão pode ceder, o que é perigoso..."
2002103-70 = "Mas é superando isso que se torna um verdadeiro Papai Noel!"
2002103-71 = "[s] \"Será mesmo!?\""
2002103-73 = "(Depois disso, Hanae continuou indo para vários outros lugares...)"
2002103-74 = "（De alguma forma, consegui terminar o dia sem me machucar）"
2002103-76 = "Muito obrigada pela ajuda, Sensei!"
2002103-77 = "[s] \"Que bom que você está bem...\""
2002103-78 = "Sinto que, finalmente, consegui me tornar alguém digna desta roupa de Papai Noel!"
2002103-79 = "Agora, o próximo passo..."
2002103-80 = "...? Aconteceu alguma coisa?"
2002103-81 = "Sim, ainda tem muito mais!#nPara me tornar uma verdadeira Papai Noel, ainda faltam muitas coisas!"
2002103-82 = "Afinal, na próxima, eu preciso voar a Mach 2!"
2002103-83 = "O que será que eu devo fazer?#nPor enquanto, que tal perguntarmos ao pessoal do Millennium?"
2002103-84 = "Pelo que ouvi anteriormente, o pessoal do Clube de Engenharia de lá..."
2002103-85 = "[s] \"Isso é perigoso, é melhor não!\""
