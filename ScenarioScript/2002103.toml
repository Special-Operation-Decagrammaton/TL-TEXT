[translation]
2002103-1 = "特訓！サンタへの道！"
2002103-2 = "というわけで！"
2002103-3 = "真のサンタになるために何が必要か、#n考えに考えてみた結果……！"
2002103-4 = "[s1] \"ちょっと不安になってきた……。\"\n[s2] （私に対処できる範囲だと良いな……）"
2002103-5 = "もう、そんなに怯えないでくださいよー。"
2002103-6 = "もう、そんなに怯えないでくださいよー。"
2002103-7 = "大丈夫です。今すぐ、ここでできることなので！"
2002103-8 = "[s] \"それなら良いんだけど……ところで、考えてみた結果……？\""
2002103-9 = "パルクールです！！！"
2002103-10 = "身体一つで障害物も壁も乗り越える、あれです！"
2002103-11 = "プレゼントを届けるため……壁を自由自在によじ登り、煙突を上り下りするには……"
2002103-12 = "やはりパルクールだなと！"
2002103-13 = "ということで先生、#n一緒にパルクールの練習をしませんか？"
2002103-14 = "[s] 逃げる。"
2002103-15 = "ちょっ、先生！#n逃げないでください、大人なんですから！"
2002103-16 = "[s] \"大人だからといってパルクールはできない！それに場所も……\""
2002103-17 = "場所についてはご心配なく！"
2002103-18 = "このシャーレの居住区でも、全然大丈夫です。"
2002103-19 = "壁もそう高くないですし、#n丈夫そうですし！"
2002103-20 = "サンタさんはどんな状況でも諦めません……#nであれば、私も諦めるわけにはいかないんです！"
2002103-21 = "さぁ、先生。私が先に登りますから、ついてきてください！"
2002103-27 = "（そう言ってすぐに、ハナエは壁をよじ登りはじめた）"
2002103-32 = "（しかしやはり慣れないからか、微妙に危なっかしい気がして……)"
2002103-33 = "むむ、これはこうやって……"
2002103-34 = "きゃあ！？"
2002103-39 = "（落下してきたハナエを、ギリギリのところで両腕で受け止めた）"
2002103-41 = "[ns] \"危なかった……。\""
2002103-42 = "さすが先生です、受け止めてくれると思っていました！"
2002103-43 = "先生がいるなら、何も怖いことはありません！"
2002103-44 = "さあ先生、次の場所へ行ってみましょう！"
2002103-49 = "（ハナエに引きずられるようにして、別の場所へ向かうことになった）"
2002103-51 = "うーん、ここは難しそうですね……#n手をひっかけるところがほとんど無さそうですし……。"
2002103-52 = "ですがこの程度で屈しては、サンタさんは名乗れません！"
2002103-53 = "[s] \"名乗らなくても、良いんじゃないかな……？\""
2002103-54 = "滑らないようにこの手袋を付けて……#n足をここに……"
2002103-55 = "一つずつ、慎重に……！"
2002103-57 = "トリニティの建物は飾りが多いですし、#n何だか登りやすそうです！"
2002103-58 = "ですが、こういった装飾品を壊すと怒られますので……"
2002103-59 = "慎重にやりましょう！"
2002103-60 = "[s] \"やらないという選択肢は！？\""
2002103-62 = "では早速、バランスを崩さないように……"
2002103-63 = "手足に頼らず、全身で……！"
2002103-64 = "見てください、先生！#nどうですか！？"
2002103-65 = "[s] \"すごいけど、ちゃんと足元見て！？\""
2002103-67 = "古びた居住区"
2002103-68 = "この辺りが、一番実戦に近そうですね。"
2002103-69 = "下手したら、足元が崩れて危なそうな場所もありますが……。"
2002103-70 = "しかしそれを乗り越えてこそ、真のサンタさんです！"
2002103-71 = "[s] \"本当にそうかな！？\""
2002103-73 = "（その後も、ハナエは次々と色々な場所へ向かい……）"
2002103-74 = "（どうにか怪我をすることなく、一日を終えた）"
2002103-76 = "お手伝いいただきありがとうございました、先生！"
2002103-77 = "[s] \"無事で良かった……。\""
2002103-78 = "これでようやく、このサンタ服に恥じない自分になれた気がします！"
2002103-79 = "では次に……。"
2002103-80 = "……？どうかしましたか？"
2002103-81 = "はい、まだまだ続きますよ！#n真のサンタさんになるためには、まだ足りない部分も多いので！"
2002103-82 = "やはり次は、マッハ2で飛ばないと！"
2002103-83 = "どうすれば良いんでしょう？#nとりあえず、ミレニアムの方々に聞いてみますか？"
2002103-84 = "以前聞いたお話ですと、あそこのエンジニア部のみなさんは――"
2002103-85 = "[s] \"それは危ないからやめておこう！\""
