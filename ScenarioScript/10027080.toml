[translation]
10027080-1 = "Episódio 8: Encontro"
10027080-2 = "（Após muitas reviravoltas, acabei indo para o local marcado com a Momiji, mas...）"
10027080-7 = "Frente de Libertação do Conhecimento - Biblioteca"
10027080-10 = "Eu não consigo, não dá! Como eu vou encarar a Momiji depois de tudo isso!#nEu não consigo! Não vou hoje! Vou deixar para outra hora!"
10027080-11 = "[s] \"Ei, não pode ser assim. Promessas devem ser cumpridas.\""
10027080-12 = "Isso é porque você me convenceu a vir, não é, Sensei!?#nEu disse que precisava de um pouco mais de preparação mental!"
10027080-13 = "[s] \"Sim, sim, a Mer é uma boa menina, então vamos lá.\""
10027080-14 = "Eu já disse que não sou uma boa menina! Eu não vou, de jeito nenhum!"
10027080-19 = "[ns] \"Sim, sim. A Mer é uma menina má, então.\""
10027080-24 = "Aaaah! Me solta! Onde você está me levando!#nSocorro! O Sensei está sequestrando uma aluna!"
10027080-34 = "Academia Red Winter - Centro da Cidade"
10027080-36 = "……"
10027080-37 = "……"
10027080-38 = "[s] \"Bem... que tal a gente dizer alguma coisa...?\""
10027080-39 = "Bem..."
10027080-44 = "Desculpe, Momiji."
10027080-46 = "！？"
10027080-47 = "Sobre aquilo... eu exagerei naquele dia.#n'Luna' foi interessante."
10027080-48 = "Ah, não... eu também... eu sei melhor do que ninguém o quanto a Mer-senpai se dedica às suas obras..."
10027080-49 = "Eu também exagerei... sinto muito."
10027080-50 = "Sobre aquilo... vou pedir aquele tempurá de panqueca de novo."
10027080-51 = "Sinto muito pelo pedido duplicado.#nVou cumprir meu dever como bibliotecária e focar em solicitar novos livros..."
10027080-52 = "…………"
10027080-53 = "…………"
10027080-54 = "Momiji... não importa o que eu diga agora, considere apenas um monólogo."
10027080-55 = "Pode pensar que é só um desabafo. Coisas que você não precisa ouvir."
10027080-56 = "Não, bem, é mais fácil para mim se você pensar assim."
10027080-57 = "Ah, sim..."
10027080-58 = "Quando fui à feira de doujinshis de 'Luna' outro dia, vi muitos... fãs de 'Luna'."
10027080-59 = "Cada um deles estava fazendo suas próprias atividades criativas, tentando criar o volume final da obra que tanto amam com as próprias mãos."
10027080-60 = "Algumas pessoas podem achar isso estúpido. Perguntar por que fazem isso. Qual o sentido de criar o final de uma obra que nem foi concluída?"
10027080-61 = "Mas o que importa é que eles fazem isso porque amam a obra."
10027080-62 = "Sim. É isso... foi isso que eu esqueci."
10027080-63 = "……"
10027080-64 = "Eu não sabia."
10027080-65 = "O fato de existirem tantos fãs de 'Luna' e#nque elas continuam com suas atividades de doujin."
10027080-66 = "Dito de outra forma... isso significa que existem muitas 'Momijis' por aí."
10027080-67 = "Não, isso também soa estranho. Parece que obras sem fãs não merecem respeito..."
10027080-68 = "Todas as histórias... merecem ser respeitadas igualmente."
10027080-69 = "Por que... eu esqueci disso?"
10027080-70 = "Eu, que desenho mangás, mais do que qualquer outra pessoa..."
10027080-71 = "Momiji, vou pedir desculpas mais uma vez.#nSinto muito, de verdade."
10027080-73 = "……"
10027080-74 = "Eu... estou arrepiada agora. É um pouco constrangedor.#nO que deu em você, Mer-senpai? Você não costuma dizer essas coisas!"
10027080-75 = "Argh! Eu tomei coragem para falar e você reage assim! Qual é a sua!!"
10027080-77 = "（A reconciliação desajeitada das duas foi avançando pouco a pouco dessa forma）"
10027080-85 = "[ns1] \"Aliás, vocês já se reconciliaram, mas...\"\n[ns2] \"O que vai fazer com 'Luna'?\""
10027080-88 = "Sobre isso..."
10027080-89 = "Pois é..."
10027080-90 = "...Talvez não seja mais necessário terminar aquele doujinshi."
10027080-91 = "Senpai……."
10027080-92 = "[s] \"Com certeza é isso mesmo…….\""
10027080-93 = "……Mas, eu vou desenhar mesmo assim. Até o fim."
10027080-94 = "Senpai?"
10027080-95 = "Atividades criativas não são algo que fazemos por um motivo grandioso, não é?"
10027080-96 = "[s] \"O desejo é…….\""
10027080-97 = "Porque é a força motriz da criação?"
10027080-98 = "Isso. Eu só quero criar."
10027080-99 = "O volume final de 'Luna', que não me envergonharei de mostrar a ninguém."
10027080-100 = "Para presentear ninguém menos que... minha melhor amiga. #nEntão Momiji, você me ajuda?"
10027080-101 = "……Normalmente, não se pede ajuda para a pessoa que vai receber o presente."
10027080-102 = "Bem, eu vou ajudar, mas..."
10027080-103 = "[s] \"Eu também vou ajudar.\""
10027080-105 = "Beleza! Então, vamos continuar!"
10027080-112 = "(Era um dia de céu limpo, de abrir os olhos)"
10027080-113 = "(Percebendo mais uma vez que, não importa o momento, o primeiro passo é sempre o mais difícil――)"
10027080-114 = "(Rezei para que a relação das duas continue se aprofundando assim……)"
10027080-117 = "Academia Federal Red Winter - Centro da Cidade"
10027080-119 = "Não…… o que você pretende com esse desenrolar!? #nVocê não está pensando na Luna daqui, está!?"
10027080-120 = "Eu estou desenhando com tudo planejado! Se eu mudar o rumo aqui, o final vai ficar muito mais emocionante!"
10027080-121 = "Você sabe que faltam poucas páginas para esse final? #nMel-senpai, você não falhou no ajuste do número de páginas de novo, né!?"
10027080-122 = "Droga……! Certo, se é assim, vou aumentar o número de páginas! #nNão tem problema se o doujinshi ficar grosso!"
10027080-123 = "Você diz para aumentar as páginas facilmente, mas e o tempo, o tempo!? #nO manuscrito não cai do céu já finalizado, sabia!? Precisamos distribuir o tempo e os recursos restantes e encontrar a solução ideal!"
10027080-129 = "[ns] \"Estão brigando de novo!?\""
10027080-131 = "Ah, está tudo bem, Sensei. Isso é normal. Não é exatamente uma briga."
10027080-132 = "Sim. É o que chamamos de debate para criar uma obra melhor, ou melhor, uma troca de opiniões…… então, por favor, não se preocupe muito."
10027080-133 = "[s] \"Dá para acreditar nessas palavras……?\""
10027080-134 = "Bem, não tem outro jeito agora! Wahahaha!"
10027080-135 = "Não, não tem como rir nessa situação……."
10027080-136 = "……De qualquer forma, eu não posso desistir desse desenrolar! #nMesmo que eu tenha que sacrificar minha vida, vou terminar!"
10027080-137 = "Você sabe que se colocar tudo isso, o número de páginas vai dobrar, né? #nOuvi dizer que só terminou metade, se aumentar as páginas agora, não vai terminar nunca!"
10027080-139 = "Técnica de clonagem, precisamos da técnica de clonagem! Ahaha!"
10027080-140 = "Não existe nada disso!"
10027080-144 = "[ns] \"…….\""
10027080-146 = "[ns] \"Dá para confiar, né!?\""
10027080-150 = "Academia Federal Red Winter - Biblioteca"
10027080-153 = "De alguma forma…… sinto que faz tempo que não venho à biblioteca."
10027080-154 = "Bem…… em certo sentido, não faz tempo?"
10027080-155 = "No fim das contas, aqui é o lugar mais confortável. #nAhhh…… que paz."
10027080-156 = "O que você está fazendo, Momiji! Não temos tempo para relaxar!? #nPrecisamos trabalhar no manuscrito!"
10027080-157 = "……Não posso nem me deixar levar um pouco pelo sentimentalismo? #nNossa, como você é apressada……."
10027080-161 = "D-1"
10027080-164 = "Os materiais estão bem aqui?"
10027080-165 = "Sim. Deixe empilhado ali. #nFufufufu…… eu já analisei e estudei toda a obra original de 'Luna'."
10027080-166 = "Não parece que a Mel-senpai está mais motivada que o normal?"
10027080-167 = "Claro, é um gênero antigo. É bom saber quais são as interpretações dominantes entre os fãs…… e como a base de fãs é grande, preciso ficar de olho nas tendências de estilo de arte."
10027080-168 = "Então você não quer ser subestimada."
10027080-169 = "Obviamente! Avaliações mornas do tipo \"você se esforçou para ser a primeira vez\" são dispensáveis!"
10027080-170 = "É bom estar motivada, mas…… por favor, cuidado com o prazo."
10027080-171 = "Uau…… o demônio do prazo……."
10027080-172 = "Quem é a ogra aqui?! Quanto mais tarde você entrega o manuscrito, senpai, mais eu sofro na hora de imprimir!"
10027080-173 = "Eu preciso deixar uma coisa clara. #nEu não atraso porque quero, sabia!"
10027080-174 = "Então, quer dizer que a culpa é de outra pessoa?"
10027080-175 = "Escuta, Momiji... Eu desenho o manuscrito, mas não sou eu. #nÉ alguém que é eu, mas ao mesmo tempo não é... Se fosse para comparar, é como se o próprio vazio estivesse desenhando... Tudo o que posso fazer é observar e vigiar o manuscrito sendo criado..."
10027080-176 = "Se você tem tempo para dizer essas coisas, então mexa as mãos!"
10027080-200 = "D-0"
10027080-204 = "……."
10027080-205 = "……."
10027080-209 = "[ns] \"……。\""
10027080-210 = "Isto é..."
10027080-211 = "Bom trabalho, senpai..."
10027080-212 = "[s] \"Quem diria que você conseguiria...\""
10027080-213 = "Isso é real, né? Não é tipo, eu acordar e descobrir que ainda estou brigada com a Momiji e o manuscrito voltou a estar pela metade, né?"
10027080-214 = "Tente beliscar sua bochecha... Se doer, é real...!"
10027080-215 = "Ainda não! O manuscrito ainda não acabou! Precisamos imprimir!"
10027080-216 = "Temos que ir ao departamento de publicação, né... Ugh, estou com um pressentimento ruim..."
10027080-218 = "Não importa se é um pressentimento ruim ou se o fim do mundo nos aguarda, nós temos que imprimir! Mesmo que o fim de Kivotos chegue amanhã, eu vou imprimir este doujinshi!"
10027080-220 = "P-Professor! Quanto tempo ainda nos resta?"
10027080-221 = "[s] \"Ainda temos umas 3 horas... Vamos rápido!\""
10027080-223 = "S-sim!"
