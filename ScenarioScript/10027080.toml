[translation]
10027080-1 = "第8話;対面"
10027080-2 = "（紆余曲折を経て、モミジとの約束の場所に向かうことになったものの……）"
10027080-7 = "知識解放戦線・図書館"
10027080-10 = "やっぱりできないよ！今更どんな顔でモミジに会えっていうの！#n私にはできない！今日はもう行かない！今度にする！"
10027080-11 = "[s] \"こら、ダメだよ。約束は守らないと。\""
10027080-12 = "これって結局先生の誘導に乗っちゃったからでしょ！？#nもうちょっと心の準備が必要って私は言いましたぁ！"
10027080-13 = "[s] \"はいはい、うちのメルはいい子だから行きましょうね。\""
10027080-14 = "だからいい子じゃないってば！ぜーったい行かない！"
10027080-19 = "[ns] \"はいはい。うちのメルは悪い子だね。\""
10027080-24 = "うぎゃああっ！放せ！私をどこに連れて行く気なの！#nわーーーん！先生が生徒を誘拐する～！"
10027080-34 = "レッドウィンター連邦学園・街中"
10027080-36 = "……。"
10027080-37 = "……。"
10027080-38 = "[s] \"えっと……そろそろなんか喋ろう……？\""
10027080-39 = "えっと……。"
10027080-44 = "ごめん、モミジ。"
10027080-46 = "！？"
10027080-47 = "その……あの時は言いすぎた。#n『ルナ』、面白かったよ。"
10027080-48 = "あ、いえ……私も……メル先輩が作品に対して真摯に向き合ってるのは、誰よりも私が知っているのに……。"
10027080-49 = "私も言い過ぎました……すみません。"
10027080-50 = "その……パンケーキの天ぷら、また注文しておくから。"
10027080-51 = "重複発注、すみませんでした。#nちゃんと司書の本分を守って、新しい図書を中心に申請するようにします……"
10027080-52 = "…………"
10027080-53 = "…………"
10027080-54 = "モミジ……今から私が何を言っても、それは独り言だからね。"
10027080-55 = "ただの愚痴だと思ってもらって構わない。聞かなくてもいい事。"
10027080-56 = "いや、まぁ、そう思ってもらったほうが、私にとっては気楽だし。"
10027080-57 = "あっ、はい……"
10027080-58 = "この前『ルナ』の同人誌即売会に行った時、たくさんの……『ルナ』のファンを見たよ。"
10027080-59 = "みんなそれぞれ好きな作品の最終巻を自分の手で作ろうと、色んな創作活動をしてた。"
10027080-60 = "それってさ、人によってはバカみたいって言われるかもしれない。なんでそんなことをするのって。完結してもいない作品の最後を自分の手で作ることに、何の意味があるのかって。"
10027080-61 = "でも大切なのは、好きだからそれを作ってるってことなんだよね。"
10027080-62 = "うん。そう……私が忘れていたのは、それだった。"
10027080-63 = "……。"
10027080-64 = "知らなかったんだ。"
10027080-65 = "あんなにたくさんの『ルナ』のファンがいて、#n彼女たちが同人活動を続けているという事実をさ。"
10027080-66 = "それってさ、別の言い方をしたら……あんなにたくさんの「モミジ」がいるって事なんだよね。"
10027080-67 = "いや、これもおかしいな。これじゃ、まるでファンのいない作品は尊重される意味がないみたいになっちゃった……"
10027080-68 = "すべての物語は……等しく尊重される価値があるのに。"
10027080-69 = "なんで……忘れてたんだろ。"
10027080-70 = "他の誰でもない……漫画を描いている私自身が……"
10027080-71 = "モミジ、もう一度謝るね。#n本当に、ごめん。"
10027080-73 = "……。"
10027080-74 = "私……今、鳥肌が立ちました。ちょっと照れくさいんですけど。#n一体どうしたんですか、メル先輩。普段はそういう事いわないじゃないですか！"
10027080-75 = "キーッ！人が意を決して話したのに！なにさ！！"
10027080-77 = "（二人の不器用な和解は、そうやって少しずつ進んでいった）"
10027080-85 = "[ns1] \"ところで、もう仲直りはできたけど……。\"\n[ns2] \"『ルナ』はどうするの？\""
10027080-88 = "それは……。"
10027080-89 = "そうですね……。"
10027080-90 = "……あの同人誌は、いまさら完成させる必要はないかもしれない。"
10027080-91 = "先輩……。"
10027080-92 = "[s] \"たしかにそうだね……。\""
10027080-93 = "……でも、やっぱり描くよ。最後まで。"
10027080-94 = "先輩？"
10027080-95 = "創作活動ってさ……本質的に、大きな理由があってする事じゃないでしょう？"
10027080-96 = "[s] \"欲望は……。\""
10027080-97 = "創作の原動力だから？"
10027080-98 = "そう。私はただ作りたいだけ。"
10027080-99 = "誰に見せても恥ずかしくない、『ルナ』の最終巻を。"
10027080-100 = "他の誰でもない……私の親友にプレゼントするためにね。#nだからモミジ、手伝ってくれる？"
10027080-101 = "……普通、プレゼントする人に手伝ってって言いませんけど。"
10027080-102 = "まぁ、手伝いますけど。"
10027080-103 = "[s] \"私も手伝うよ。\""
10027080-105 = "よし！じゃ、続けよっか！"
10027080-112 = "（目が覚めるような晴天だった）"
10027080-113 = "（どんな時だって、最初のスタートが一番難しいということを改めて実感しながら――）"
10027080-114 = "（二人の仲が、そうやってこれからも深まっていくよう祈った……）"
10027080-117 = "レッドウィンター連邦学園・街中"
10027080-119 = "いや……この展開、一体どういうつもりなんですか！？#nこっちのルナの事考えてませんよね！"
10027080-120 = "全部考えがあって描いてるの！ここで一回、展開を動かしたらエンディングが盛り上がるんだから！"
10027080-121 = "そのエンディングまであと数ページしかないの分かってます？#nメル先輩、またページ数の調節失敗してませんか！？"
10027080-122 = "くっ……！よし、こうなったらページを増やすよ！#n同人誌はどれだけ厚くても良いからね！"
10027080-123 = "簡単にページ数増やしますけど、時間はどうするんですか、時間は！#n原稿は、空から勝手に完成稿が落ちてくるもんじゃないんですよ！？残った時間とリソースを配分して、最適解を探さないと！"
10027080-129 = "[ns] \"またケンカしてる！？\""
10027080-131 = "あ、大丈夫だよ先生。コレはいつもの事だから。別にケンカとかじゃないし。"
10027080-132 = "はい。より良い作品を生み出すための討論といいますか、意見交換といいますか……なので、あまり心配しないでください。"
10027080-133 = "[s] \"その言葉、信じて大丈夫なの……？\""
10027080-134 = "まあ、今さら他に方法がないからね！わははは！"
10027080-135 = "いや、この状況で笑われても……。"
10027080-136 = "……とにかく私、この展開を諦める事はできないよ！#n命を削ってでも完成させるからね！？"
10027080-137 = "全て詰め込んだら、ページ数が今までの2倍以上になるのは分かってますよね？#nまだ半分しか終わってないって聞いてますけど、ここでページ数を増やしたら終わるわけないですよ！？"
10027080-139 = "分身の術、分身の術が必要だね！あはは！"
10027080-140 = "そんなものはありません！"
10027080-144 = "[ns] \"……。\""
10027080-146 = "[ns] \"信じて、いいんだよね！？\""
10027080-150 = "レッドウィンター連邦学園・図書館"
10027080-153 = "なんだか……図書館も久しぶりに来た感じがします。"
10027080-154 = "まぁ……ある意味では久しぶりなんじゃない？"
10027080-155 = "やっぱり、ここが一番気楽です。#nはあああ……落ち着きます。"
10027080-156 = "何やってんの、モミジ！落ち着いてる暇なんてないよ！？#n私たちは原稿しないと！"
10027080-157 = "……ちょっとくらい感傷に浸ってもいいじゃないですかぁ。#nもう、せっかちなんだから……。"
10027080-161 = "D-1"
10027080-164 = "資料はここで大丈夫ですか？"
10027080-165 = "うん。その辺に積んでおいて。#nふふふふ……既に『ルナ』原作は全部分析して掘り下げてあるのさ。"
10027080-166 = "なんかいつものメル先輩より気合い入ってませんか？"
10027080-167 = "そりゃあ、古いジャンルだからね。ファンの間で主流の解釈は知っておいた方がいいし……ファン層も厚いから、絵柄の傾向も見ておかないと。"
10027080-168 = "見下されたくないということですね。"
10027080-169 = "当たり前でしょう。「はじめてにしては頑張りましたね」みたいなぬるい評価は、こっちから願い下げだよ！"
10027080-170 = "やる気満々なのは良いですけど……締め切りには注意してくださいね。"
10027080-171 = "うわあ……締め切りの鬼だ……。"
10027080-172 = "誰が鬼ですか！先輩が原稿を遅く出せば出すほど、印刷する時に苦しむのは私なんですよ！？"
10027080-173 = "これだけは言っておかないと。#n私だって、いつも好きで遅れてるわけじゃないんだよ！"
10027080-174 = "じゃあ、誰かのせいってことですか？"
10027080-175 = "いい？モミジ……原稿を描くのは私だけど、私じゃないんだ。#n私でありながら私ではない誰か……例えるなら、虚空が描いているんだよ……。私にできることは、描かれていく原稿を観察し、見守ることだけ……"
10027080-176 = "そんな事言ってる暇があるなら手を動かしてください！"
10027080-200 = "D-0"
10027080-204 = "……。"
10027080-205 = "……。"
10027080-209 = "[ns] \"……。\""
10027080-210 = "これを……。"
10027080-211 = "お疲れ様です、先輩……"
10027080-212 = "[s] \"やればできるもんなんだね……。\""
10027080-213 = "これ、現実だよね？目が覚めたらモミジと喧嘩したままで原稿は半分に戻ってるとかじゃないよね？"
10027080-214 = "ほっぺたをつねってみてください……痛かったら現実です……！"
10027080-215 = "まだだよ！まだ原稿は終わったわけじゃない！印刷しないと！"
10027080-216 = "出版部に行かなきゃいけないんですよね……うう、なんかちょっと不吉な予感が……"
10027080-218 = "不吉な予感だろうが終焉が待っていようが、私たちは印刷しなければならない！たとえ明日キヴォトスに終焉が訪れても、私は一冊の同人誌を印刷してみせる！"
10027080-220 = "せ、先生！残りの時間は……どのくらいですか？"
10027080-221 = "[s] \"あと3時間くらい……急ごう！\""
10027080-223 = "は、はい！"
