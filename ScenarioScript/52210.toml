[translation]
52210-1 = "Episódio 21; O Olhar"
52210-2 = "Na época em que eu estava no Hyakkaryouran, eu sempre atraía os olhares de todos."
52210-6 = "Ei, ei, Ayame."
52210-7 = "Aquele... Senpai Ayame..."
52210-8 = "É a Presidente Ayame!"
52210-12 = "Olhares cheios de admiração e inveja foram me prendendo."
52210-13 = "Não era apenas que eu não conseguia mais tirar a máscara de \"Presidente do Hyakkaryouran\".#nNinguém podia saber que essa máscara era pesada e que estava começando a me ferir."
52210-16 = "Aquela postura digna que até as flores invejam... É realmente maravilhosa, Presidente Ayame."
52210-17 = "Tão bela e de conduta impecável..."
52210-18 = "Como líder do Hyakkaryouran, ela precisa ser alguém com tanto talento e beleza..."
52210-19 = "E-esse tipo de pedido..."
52210-20 = "......Você não vai ficar chateada, vai?"
52210-21 = "Claro que não! Afinal, você é a Presidente Ayame!"
52210-22 = "Sim, está tudo bem! Pode pedir qualquer coisa!"
52210-23 = "――Isso é mentira."
52210-24 = "A máscara de sorriso colada no meu rosto continuava a me atormentar.#nQuanto mais eu correspondia às vozes de todos, mais os olhares de expectativa e admiração aumentavam... e, repetidamente, moldavam meu rosto."
52210-25 = "Sempre sorrindo, sem nunca franzir a testa.#nFicar de mau humor estava fora de cogitação."
52210-26 = "Sempre correndo para ajudar quando alguém estava em apuros.#nEncarando tudo, até as coisas que todos queriam ignorar."
52210-27 = "Ainda assim, havia dias em que eu me sentia cansada e parava.#nNesses momentos――"
52210-30 = "Hoje você não parece a presidente de sempre."
52210-31 = "Aconteceu alguma coisa?"
52210-32 = "Se descansar um pouco, poderá voltar a ser a presidente de sempre!"
52210-36 = "......Sem que eu percebesse, todos começaram a achar que a máscara era a verdadeira eu."
52210-37 = "Por que será que eu coloquei essa máscara?"
52210-38 = "Por que será que todos acharam que essa máscara era eu?"
52210-39 = "Por que será que eu não consigo resolver isso sozinha...?"
52210-42 = "Eu não consigo fazer as coisas tão bem quanto a Presidente Ayame..."
52210-43 = "A Presidente Ayame é incrível, consegue fazer de tudo!"
52210-44 = "Só a presidente consegue fazer isso!"
52210-48 = "Se isso era uma máscara ou meu rosto verdadeiro... aos poucos, fui perdendo a noção."
52210-63 = "Mas, quando encarei minha sombra na escuridão――percebi que não conseguia usar o poder de Hyakuren.#n......Eu percebi."
52210-64 = "Eu não sou nada perfeita."
52210-65 = "Isso não é algo permitido para uma presidente――mas, ainda assim, havia uma \"eu\" que suspirava de alívio."
52210-67 = "[log=아야메 황혼 1]É natural.[/log]"
52210-70 = "[log=아야메 황혼 1]Uma máscara é, no fim das contas, apenas uma máscara.[/log]"
52210-71 = "[log=아야메 황혼 1]Porque não sou eu.[/log]"
52210-74 = "[log=아야메 황혼 1]Essa responsabilidade――[/log]"
52210-75 = "[log=아야메 황혼 1]não é minha.[/log]"
52210-79 = "Mas, se fosse a Lady Kuzunoha... ela com certeza resolveria tudo."
52210-80 = "Pedidos irritantes, os olhares de todos――a Lady Kuzunoha assumiria tudo no meu lugar."
52210-83 = "Vamos voltar logo."
52210-84 = "A Lady Kuzunoha não existe. É apenas uma lenda――"
52210-85 = "Aquela criança disse isso sem hesitar."
52210-86 = "Mesmo sendo uma chorona."
52210-87 = "Mesmo nunca tendo conseguido me vencer uma única vez."
52210-88 = "Mesmo não conseguindo escapar dos olhares que a prendiam, nem tirar a própria máscara."
52210-90 = "…………."
52210-94 = "......Mulher tola."
52210-95 = "É por isso que você nunca vai conseguir sair daí."
52210-100 = "Alguma preocupação?"
52210-106 = "Eu estava apenas... lembrando do passado."
52210-107 = "De todos que dependiam de mim."
52210-108 = "Hmm?"
52210-109 = "Os olhares de todos... buscando por mim."
52210-110 = "O pessoal de Hyakkiyako continua o mesmo, não é?"
52210-111 = "Todos temem o fracasso e o arrependimento, então tentam fazer com que outra pessoa resolva por eles."
52210-112 = "Mas eu não posso... ficar vigiando todos para sempre."
52210-113 = "No fim, eu não consegui corresponder aos olhares de todos..."
52210-114 = "Não seria capaz de fazer isso agora?"
52210-115 = "Para você, que agora floresce magnificamente com o arrependimento e o ódio escondidos no coração, não há nada que não possa ser feito."
52210-116 = "……É verdade."
52210-121 = "Chega de corresponder às expectativas."
52210-122 = "Agora é a vez de todos serem observados por mim."
52210-147 = "Ahhh...! Que lindo..."
52210-148 = "Sim, esta é a cena que eu tanto buscava...!"
52210-149 = "Como eu pensei, eu não estava errada."
52210-150 = "Não importa o quão grotesca seja a forma, se você não a enfrentar, não passa de um problema alheio. #nAté mesmo o medo que se impõe tem seus limites."
52210-151 = "Mas... estas cem histórias nascidas do 'Totei Bukkiroku' têm uma natureza diferente. Elas injetam nas pessoas um medo tão fresco quanto uma pintura horripilante."
52210-152 = "Não importa para onde fujam, não conseguirão escapar desse olhar que se agarra a elas."
52210-153 = "Ah... como deveríamos chamar estas belas cem histórias?"
52210-154 = "――Em meio a tantos olhos que florescem, o destino final é o medo absoluto."
52210-159 = "Sim... que tal chamarmos de 'Hitotsume'?"
52210-161 = "Ayame... não, Hitotsume."
52210-162 = "Chegou o dia de fazer com que aqueles que só sabiam se agarrar aos outros e te prendiam, sintam o peso desse sentimento."
52210-163 = "Ensine àqueles que temem o olhar alheio que, para eles, nem mesmo piscar será permitido."
52210-167 = "…………"
52210-169 = "Próximo episódio: O festival continua"
