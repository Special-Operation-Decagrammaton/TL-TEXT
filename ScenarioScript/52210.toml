[translation]
52210-1 = "第21話;視線"
52210-2 = "百花繚乱にいた頃の私は、いつも皆の視線を集めていた。"
52210-6 = "ねえねえ、アヤメ。"
52210-7 = "あの……アヤメ先輩……。"
52210-8 = "アヤメ委員長だ！"
52210-12 = "憧れと羨望に満ちた視線が、私を縛りつけていった。"
52210-13 = "「百花繚乱の委員長」の仮面を外せなくなっただけじゃない。#nその仮面が重いことも、私を傷つけ始めていることも、誰にも知られてはならなかった。"
52210-16 = "花々も羨むあの凛としたお姿……本当に素敵ですよね、アヤメ委員長。"
52210-17 = "容姿端麗で品行方正……。"
52210-18 = "百花繚乱のリーダーたるもの、あれくらい才色兼備な方でないと……。"
52210-19 = "こ、これくらいのお願いで……。"
52210-20 = "……気を悪くなんて、しないよね？"
52210-21 = "平気平気！だって、アヤメ委員長だよ？"
52210-22 = "うん、大丈夫！なんでも言ってね！"
52210-23 = "――そんなの嘘。"
52210-24 = "張りついた笑顔の仮面は、私を苦しめ続けていた。#nみんなの声に応えれば応えるほど、期待と憧れの視線は増えていって……何度も、私の顔を作り変える。"
52210-25 = "いつも笑っていて、眉根を寄せることなんてない。#n不機嫌になるなんてもってのほか。"
52210-26 = "困った時にはいつでも駆けつける。#n誰もが目を背けたくなるようなことだって、全部向き合って。"
52210-27 = "それでも、疲れて立ち止まってしまう日はあった。#nそんな時は――"
52210-30 = "今日は委員長らしくないですね。"
52210-31 = "何かあったのですか？"
52210-32 = "少し休めば、[ruby=・]い[/ruby][ruby=・]つ[/ruby][ruby=・]も[/ruby][ruby=・]の[/ruby][ruby=・]委[/ruby][ruby=・]員[/ruby][ruby=・]長[/ruby]に戻れますって！"
52210-36 = "……いつの間にか、みんなは[ruby=・]仮[/ruby][ruby=・]面[/ruby]を本当の私だと思うようになった。"
52210-37 = "私はどうしてこの仮面を着けたんだろう。"
52210-38 = "みんな、どうしてこの仮面が私だと思ったんだろう。"
52210-39 = "どうして、自分で解決できないんだろう……？"
52210-42 = "私、アヤメ委員長みたいに上手くできなくて……。"
52210-43 = "アヤメ委員長は、何でもできてすごいですっ！"
52210-44 = "それができるのは、委員長だけですよ！"
52210-48 = "これが仮面なのか、本当の顔なのか……次第に分からなくなっていった。"
52210-63 = "でも、闇の中で影と向き合った時に――百蓮の力を使えないことに気づいた。#n……気づいてしまった。"
52210-64 = "自分は、完璧なんかじゃない。"
52210-65 = "それは委員長として許されることじゃない――なのに、胸をなで下ろす「私」もいた。"
52210-67 = "[log=아야메 황혼 1]当然だよ。[/log]"
52210-70 = "[log=아야메 황혼 1]仮面は、所詮仮面。[/log]"
52210-71 = "[log=아야메 황혼 1]私じゃないんだから。[/log]"
52210-74 = "[log=아야메 황혼 1]この責任は――[/log]"
52210-75 = "[log=아야메 황혼 1]私のものじゃないんだから。[/log]"
52210-79 = "でも、クズノハ様なら……全部解決してくれるはず。"
52210-80 = "うんざりするような頼み事も、みんなの視線も――クズノハ様なら、代わりに引き受けてくれるんだ。"
52210-83 = "もう帰ろうよ。"
52210-84 = "クズノハ様なんて、いない。ただの言い伝えで――"
52210-85 = "あの子は、迷わずそう言った。"
52210-86 = "泣き虫のくせに。"
52210-87 = "一度も私に勝てなかったくせに。"
52210-88 = "へばりつく視線から逃げられず、仮面も外せなかったくせに。"
52210-90 = "…………。"
52210-94 = "……バカな女。"
52210-95 = "だからいつまでも、[ruby=・]そ[/ruby][ruby=・]こ[/ruby]から出られないんだよ。"
52210-100 = "何か心配事でも？"
52210-106 = "少し、昔を思い出してたの。"
52210-107 = "私を頼った、みんなのこと。"
52210-108 = "ふむ？"
52210-109 = "私を求める……みんなの視線。"
52210-110 = "[ruby=ここ]百鬼夜行[/ruby]の連中は相変わらずだね。"
52210-111 = "みんな失敗や後悔を恐れて、誰かにやってもらおうとする。"
52210-112 = "でも、いつまでも見守ることなんて……できない。"
52210-113 = "結局、みんなの視線に応えられなかったんだ……私は。"
52210-114 = "今のあなたならできるのでは？"
52210-115 = "心に秘めし後悔と憎悪が、華やかに咲き誇る今の[ruby=あなた]怪談[/ruby]に、できないことなど。"
52210-116 = "……そうだね。"
52210-121 = "応えるのは、もうおしまい。"
52210-122 = "今度は、みんなが私に見られる番。"
52210-147 = "ああぁ……っ！美しい……。"
52210-148 = "そう、これこそ私の求めていた光景……！"
52210-149 = "やはり私は、間違っていなかった。"
52210-150 = "いかにおぞましい異形といえど、対峙しなければ所詮は[ruby=ひとごと]他人事[/ruby]。#n恐怖を与える相手にも、限りがあります。"
52210-151 = "ですが……この「[ruby=とうていぶっかいろく]稲亭物怪録[/ruby]」から生まれし百物語は、性質が違う。悍ましい絵画のように新鮮な恐怖を人々へと注いでくれるのですよ。"
52210-152 = "どこへ逃げようと、へばりつく視線からは逃れられない。"
52210-153 = "嗚呼……この美しき百物語を何と呼びましょう。"
52210-154 = "――数多の目が咲き乱れる中、たどり着く先は唯一の恐怖。"
52210-159 = "そう……「ヒトツメ」とでも呼びましょうか。"
52210-161 = "アヤメ……いいえ、ヒトツメよ。"
52210-162 = "誰かに縋りつくことしかできず、あなたを縛りつけていた者たちに――その想いを味わわせる日がきた。"
52210-163 = "他人の視線に怯える者には、瞬きすら許されないということを教えてあげなさい。"
52210-167 = "…………。"
52210-169 = "次回;祭りは続く"
