[translation]
52210-1 = "Episódio 21; O Olhar"
52210-2 = "Quando eu estava na Hyakkaryouran, sempre reunia os olhares de todos."
52210-6 = "Ei, ei, Ayame."
52210-7 = "Aquele...... Ayame-senpai......"
52210-8 = "É a presidente Ayame!"
52210-12 = "Olhares cheios de admiração e inveja foram me prendendo."
52210-13 = "Não foi apenas que eu não conseguia mais tirar a máscara de 'presidente da Hyakkaryouran'. #n Eu não podia deixar ninguém saber que essa máscara era pesada, ou que ela estava começando a me machucar."
52210-16 = "Aquela figura digna, que até as flores invejam...... é realmente maravilhosa, presidente Ayame."
52210-17 = "Linda e de conduta impecável......"
52210-18 = "Uma líder da Hyakkaryouran precisa ser alguém talentosa e bela como ela......"
52210-19 = "C, com um pedido tão simples quanto este......"
52210-20 = "......Você não vai ficar brava, vai?"
52210-21 = "Sem problemas, sem problemas! Afinal, você é a presidente Ayame!"
52210-22 = "Sim, claro! Pode pedir qualquer coisa!"
52210-23 = "――Tudo isso é mentira."
52210-24 = "A máscara de sorriso colada ao meu rosto continuava a me atormentar. #n Quanto mais eu correspondia às vozes de todos, mais cresciam os olhares de expectativa e admiração...... e, repetidas vezes, eles remodelavam meu rosto."
52210-25 = "Sempre sorrindo, nunca franzindo a testa. #n Ficar de mau humor estava fora de cogitação."
52210-26 = "Sempre pronta para correr quando alguém está em apuros. #n Enfrentando tudo, até as coisas de que todos querem desviar o olhar."
52210-27 = "Ainda assim, havia dias em que eu ficava cansada e parava. #n Naqueles momentos――"
52210-30 = "Hoje você não parece a presidente."
52210-31 = "Aconteceu alguma coisa?"
52210-32 = "Se descansar um pouco, você voltará a ser a presidente de sempre!"
52210-36 = "......Antes que eu percebesse, todos começaram a achar que a máscara era o meu verdadeiro 'eu'."
52210-37 = "Por que será que eu coloquei essa máscara?"
52210-38 = "Por que será que todos pensaram que essa máscara era eu?"
52210-39 = "Por que será que não consigo resolver isso sozinha......?"
52210-42 = "Eu não consigo fazer as coisas tão bem quanto a presidente Ayame......"
52210-43 = "A presidente Ayame é incrível, consegue fazer qualquer coisa!"
52210-44 = "Só a presidente consegue fazer isso!"
52210-48 = "Se isso era uma máscara ou meu rosto verdadeiro...... gradualmente, fui perdendo a capacidade de distinguir."
52210-63 = "Mas, quando encarei a sombra na escuridão―― percebi que não conseguia usar o poder da Hyakuren. #n ......Eu percebi."
52210-64 = "Eu não sou nada perfeita."
52210-65 = "Isso não é permitido para uma presidente―― e, mesmo assim, havia uma 'eu' que soltou um suspiro de alívio."
52210-67 = "[log=아야메 황혼 1]É natural.[/log]"
52210-70 = "[log=아야메 황혼 1]Uma máscara é apenas uma máscara.[/log]"
52210-71 = "[log=아야메 황혼 1]Porque não sou eu.[/log]"
52210-74 = "[log=아야메 황혼 1]Esta responsabilidade――[/log]"
52210-75 = "[log=아야메 황혼 1]não pertence a mim.[/log]"
52210-79 = "Mas, se fosse Kuzunoha-sama...... ela resolveria tudo."
52210-80 = "Os pedidos cansativos, os olhares de todos―― se fosse Kuzunoha-sama, ela assumiria tudo no meu lugar."
52210-83 = "Vamos voltar agora."
52210-84 = "Kuzunoha-sama não existe. É apenas uma lenda――"
52210-85 = "Aquela garota disse isso sem hesitar."
52210-86 = "Mesmo sendo uma chorona."
52210-87 = "Mesmo nunca tendo conseguido me vencer uma única vez."
52210-88 = "Mesmo não conseguindo escapar dos olhares que a perseguiam, nem remover sua própria máscara."
52210-90 = "............"
52210-94 = "......Que mulher estúpida."
52210-95 = "Por isso você nunca conseguirá sair desse lugar."
52210-100 = "Preocupada com alguma coisa?"
52210-106 = "Eu estava lembrando do passado por um momento."
52210-107 = "Sobre todos que dependiam de mim."
52210-108 = "Hum?"
52210-109 = "Os olhares de todos...... que me buscavam."
52210-110 = "O pessoal de Hyakkiyako continua o mesmo, não é?"
52210-111 = "Todos temem falhas e arrependimentos e tentam fazer com que outra pessoa resolva."
52210-112 = "Mas, eu não posso...... protegê-los para sempre."
52210-113 = "No fim, eu não consegui...... corresponder aos olhares de todos."
52210-114 = "Você não conseguiria com a sua versão atual?"
52210-115 = "O arrependimento e o ódio que você esconde no coração, nas histórias de fantasmas que florescem de forma magnífica agora, não há nada que você não possa fazer."
52210-116 = "......É verdade."
52210-121 = "Não vou mais tentar corresponder."
52210-122 = "Desta vez, é a vez de todos serem observados por mim."
52210-147 = "Ahhh......! Lindo......"
52210-148 = "Sim, é exatamente esse o espetáculo que eu buscava......!"
52210-149 = "De fato, eu não estava errada."
52210-150 = "Não importa o quão horrível seja uma forma estranha, se você não a encara, ela continua sendo um problema alheio. #n Há limites para o medo que você pode incutir nos outros."
52210-151 = "Mas...... esta Hyakumonogatari, nascida do 'Inotei Mononokeroku', tem uma natureza diferente. Ela despeja um terror fresco nas pessoas, como uma pintura horripilante."
52210-152 = "Não importa para onde fujam, não conseguirão escapar do olhar que os persegue."
52210-153 = "Ah...... como devemos chamar esta bela Hyakumonogatari?"
52210-154 = "――Enquanto inúmeros olhos florescem, o destino final é um medo singular."
52210-159 = "Sim...... que tal 'Hitotsume' (O De Um Olho)?"
52210-161 = "Ayame...... não, Hitotsume."
52210-162 = "Chegou o dia de fazer aqueles que só sabiam se agarrar aos outros e te prendiam―― sentirem o peso desse desejo."
52210-163 = "Ensine-os que, para aqueles que temem os olhares alheios, nem mesmo piscar é permitido."
52210-167 = "............"
52210-169 = "Próximo Episódio; O Festival Continua"

