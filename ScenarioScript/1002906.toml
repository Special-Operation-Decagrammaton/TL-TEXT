[translation]
1002906-1 = "Intervalo do almoço: \"Cantina\""
1002906-3 = "（Como Natsu disse, o céu estava limpo hoje e o tempo estava maravilhoso）"
1002906-4 = "（A luz do sol era quente, mas não fazia calor, e a brisa soprava de forma agradável）"
1002906-5 = "Ah, Sensei. Por aqui, por aqui!"
1002906-6 = "Em um dia tão bom assim, muita gente acaba vindo sentar aqui, né."
1002906-7 = "Temos que garantir o lugar antes."
1002906-12 = "Então, vamos lá, não precisa se fazer de rogado! Tcharam, leite e torta de mirtilo!"
1002906-13 = "[s1] \"É uma ótima combinação.\"\n[s2] \"Parece delicioso.\""
1002906-14 = "Como esperado do Sensei, você entende das coisas."
1002906-15 = "Como esperado do Sensei, você entende das coisas."
1002906-19 = "……Hmm."
1002906-20 = "[s3] \"……Natsu?\"\n[s4] \"？？？\""
1002906-21 = "……Não, nada."
1002906-22 = "……Não, nada."
1002906-23 = "É que desta vez você não perguntou se \"tinha acontecido alguma coisa\"."
1002906-24 = "Entendi, pensei que o Sensei realmente conseguia notar se \"algo aconteceu\" só pela expressão ou detalhes assim. Nossa, isso é incrível."
1002906-25 = "Bem, como eu disse, hoje não aconteceu nada mesmo, só achei que o tempo estava bom……."
1002906-26 = "E então, eu pensei comigo mesma."
1002906-27 = "Se eu chamasse o Sensei, que está sempre ocupado com as consultas dos alunos, do nada, sem motivo nenhum…… será que você pensaria que algo aconteceu? Será que você perguntaria \"o que houve?\"?"
1002906-28 = "Mas não foi assim."
1002906-29 = "Eu não escrevi isso no MomoTalk, mas no fundo eu fiquei bem surpresa."
1002906-30 = "Nossa,"
1002906-31 = "que incrível…… será que você está me vigiando?"
1002906-32 = "Ou será telepatia!? De qualquer forma, é algo bem romântico."
1002906-33 = "……Haha."
1002906-34 = "Bem, na verdade, isso não é um assunto importante. O que importa é estar aqui agora, podendo passar esse tempo com você, Sensei."
1002906-35 = "O tempo está bom, a torta de mirtilo e o leite estão deliciosos, e o Sensei está aqui. Estou satisfeita."
1002906-36 = "Essa situação atual é simplesmente perfeita."
1002906-37 = "……E você, Sensei?"
1002906-38 = "Eu sei que fui eu quem te chamei, mas, sabe…… se eu estiver te atrapalhando em um momento ocupado,"
1002906-39 = "eu ficaria triste."
1002906-40 = "[s5] \"De jeito nenhum.\"\n[s6] \"Eu também estou me sentindo ótimo.\""
1002906-41 = "Ahaha, fico feliz que diga isso."
1002906-42 = "Ahaha, fico feliz que diga isso."
1002906-43 = "Pessoas que eu posso chamar assim, sem motivo nenhum, para passar o tempo juntas…… bem, existem algumas, mas é algo bem precioso, sabe."
1002906-44 = "……."
1002906-48 = "……Certo, chega de falar disso! Não quero ter conversas sérias agora!"
1002906-49 = "Isso faria esse tempo precioso perder a graça. Desculpe, desculpe, it's my mistake."
1002906-50 = "Bem, sendo assim……"
1002906-51 = "Não tem nada em especial, mas que tal passarmos um tempo relaxando?"
1002906-57 = "Ah, tem bastante torta e leite. Vamos, sirva-se à vontade~."
1002906-59 = "（Natsu disse isso e, com um sorriso, levou um pedaço da torta à boca）"
1002906-60 = "（Depois de aproveitar várias coisas com a Natsu, voltei para o Schale）"
