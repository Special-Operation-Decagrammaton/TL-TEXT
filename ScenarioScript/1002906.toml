[translation]
1002906-1 = "お昼休み「売店」"
1002906-3 = "（ナツの言う通り今日は空が澄んでいて、すごく天気の良い日だった）"
1002906-4 = "（日差しは暖かいけれど暑くはなく、風もちょうど良い感じに吹いていた）"
1002906-5 = "あっ、先生。こっちこっちー。"
1002906-6 = "こんな良い日だと、座る人も多くなるからね。"
1002906-7 = "先手を打たないと。"
1002906-12 = "というわけでさあさあ、遠慮しなくて良いんだよ～。どんっ、牛乳とブルーベリーパイ！"
1002906-13 = "[s1] \"良い組み合わせだね。\"\n[s2] \"美味しそう。\""
1002906-14 = "さすがは先生、分かってるね。"
1002906-15 = "さすがは先生、分かってるね。"
1002906-19 = "……ふむ。"
1002906-20 = "[s3] \"……ナツ？\"\n[s4] \"？？？\""
1002906-21 = "……ううん、"
1002906-22 = "……ううん、"
1002906-23 = "今回は「何かあった？」みたいなことを聞かれないんだなって。"
1002906-24 = "なるほど、本当に先生って表情とかそういう細かいところから「何かあったのかどうか」が分かるんだな～って思って。いやはや、すごいねぇ。"
1002906-25 = "まあその通り今日は本当に何も無くて、ただ天気が良いなってだけで……。"
1002906-26 = "でね、ふと思ったの。"
1002906-27 = "いつも生徒たちの相談とかで忙しい先生に対して、本当に何も無い時に突然連絡したら……その時、先生は何かあったと思うのかな？「どうしたの？」って聞いてくるのかなって。"
1002906-28 = "でも、そうじゃなかった。"
1002906-29 = "モモトークではそう書かなかったけど、内心結構びっくりしてたんだよ。"
1002906-30 = "いやぁ、"
1002906-31 = "すごいねー……実は私のこと監視してたり？"
1002906-32 = "それとも読心術とか！？いずれにせよロマンだなぁ。"
1002906-33 = "……あは。"
1002906-34 = "まあ実のところ、それは大した要件じゃないんだけどね。大事なのは今ここで、先生とこうしていられることであって。"
1002906-35 = "天気も良いし、ブルーベリーパイと牛乳も美味しいし、先生もいる。満足満足。"
1002906-36 = "今のこの状況が、ただただ最高だねー。"
1002906-37 = "……先生は、どう？"
1002906-38 = "呼び出しておいてなんだけど、その……忙しいところ迷惑かけちゃってたら、"
1002906-39 = "それは悲しいなーって。"
1002906-40 = "[s5] \"全然そんなこと無いよ。\"\n[s6] \"私も最高の気分。\""
1002906-41 = "あははっ、そこまで言ってくれると嬉しいなぁ。"
1002906-42 = "あははっ、そこまで言ってくれると嬉しいなぁ。"
1002906-43 = "こうやって何の理由もなく呼び出して一緒に時間を過ごしてくれる相手も……まあ何人かはいてくれるんだけど、なかなか貴重だからね。"
1002906-44 = "……。"
1002906-48 = "……うん、こういう話はもう終わり！真面目な話は今したくない！"
1002906-49 = "せっかくの時間が色褪せちゃうからねぇ。ごめんごめん、イッツ・マイ・ミステイク。"
1002906-50 = "まあ、そういうことで……。"
1002906-51 = "特に何もないけど、ゆっくりした時間でも過ごそっか？"
1002906-57 = "あ、パイと牛乳はたくさんあるから。さぁ、どうぞどうぞ～。"
1002906-59 = "（ナツはそう言って嬉しそうに、パイを口に運んだ）"
1002906-60 = "（その後ナツと一緒に色々と楽しんだ後、シャーレへと戻った）"
