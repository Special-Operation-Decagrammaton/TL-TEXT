[translation]
84310100100-6 = "おや、今日は私が最後か。何の話をしていたんだい？"
84310100100-11 = "ちょうど、貴女のことをね。少し、話があるのだけど……。"
84310100100-13 = "また唐突だね……いや、今に始まったことではないか。"
84310100100-14 = "それで、何かあったのかい？"
84310100100-15 = "手伝いはもう十分だ、って話をしにきたんだ。そろそろ休んでいいと思うんだよな。"
84310100100-16 = "……それはどういう？"
84310100100-17 = "あたしらは、お前に頼りすぎちまってるんだよ、今。"
84310100100-21 = "「トリニティの代表」としてミレニアムEXPOに参加してんだってこと、忘れてねぇか？"
84310100100-22 = "それは……"
84310100100-26 = "……否定はできないな。"
84310100100-27 = "だろ？"
84310100100-29 = "でも、これはセイア個人との取引の対価であって……。"
84310100100-30 = "昨日がそうだからって、今日も同じとは限らねぇだろ？"
84310100100-35 = "なんだかんだ毎日手伝わせちまってるし。"
84310100100-36 = "もし、私を案じてのことであれば、心配は無用だ。"
84310100100-37 = "まぁ、あと……"
84310100100-38 = "先生からも言われてんだ。"
84310100100-40 = "なっ……！"
84310100100-42 = "先生から？"
84310100100-43 = "怒られたとかそういうんじゃねぇけどさ。"
84310100100-44 = "ちょっとくらい、EXPOを楽しめる日があってもいいよね、って。"
84310100100-45 = "遠回しだけど多分そういうことだろ？"
84310100100-50 = "……そうね、配慮に欠けていたわ。"
84310100100-52 = "全ては私が言い出したことだ。断る権利があって、断らなかったのも私だからね。"
84310100100-53 = "だが、先生の言うことも理解できる。"
84310100100-54 = "当初の目的[ruby=まっと]を全う[/ruby]しに行こうか。"
84310100100-55 = "貴女が守ったEXPOを楽しんで来てちょうだい。"
84310100100-56 = "なんかあっても、あたしらでなんとかすっからよ。"
84310100100-57 = "チッ……こういうことは直接言えばいいのにな、あのお節介は。"
84310100100-59 = "（先生に対する信頼が伺える……二人にはそんな風に接しているのか）"
84310100100-60 = "（きっと彼女の行動あってのものだろう。羨ましい……と思っているのか、私は）"
84310100100-61 = "承知した。任務のことは忘れ、見学に行ってくる。"
84310100100-63 = "気ぃつけてな。"
84310100100-64 = "いってらっしゃい。何かあれば遠慮なく言ってちょうだい。"
84310100100-66 = "そうさせてもらうよ。"
