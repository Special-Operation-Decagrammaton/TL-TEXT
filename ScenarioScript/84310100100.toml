[translation]
84310100100-6 = "Ora, sou a última hoje? Sobre o que vocês estavam falando?"
84310100100-11 = "Estávamos justamente falando de você. Precisamos conversar um pouco..."
84310100100-13 = "Que repentino... Bem, não é como se fosse a primeira vez."
84310100100-14 = "Então, aconteceu alguma coisa?"
84310100100-15 = "Viemos dizer que você já ajudou o suficiente. Acho que está na hora de você descansar um pouco."
84310100100-16 = "……O que quer dizer com isso?"
84310100100-17 = "Estamos dependendo demais de você agora."
84310100100-21 = "Você esqueceu que está participando da Millennium EXPO como a 'representante da Trinity'?"
84310100100-22 = "Isso é..."
84310100100-26 = "……Não posso negar."
84310100100-27 = "Viu só?"
84310100100-29 = "Mas isso é uma compensação pelo acordo pessoal com a Seia..."
84310100100-30 = "Só porque foi assim ontem, não significa que tem que ser igual hoje, né?"
84310100100-35 = "Acabamos te fazendo ajudar todos os dias, de um jeito ou de outro."
84310100100-36 = "Se é por preocupação comigo, não há necessidade."
84310100100-37 = "Bem, além disso..."
84310100100-38 = "O Sensei também comentou sobre isso."
84310100100-40 = "O quê……!"
84310100100-42 = "O Sensei?"
84310100100-43 = "Não é como se ele tivesse dado uma bronca nem nada do tipo."
84310100100-44 = "Ele só disse que seria bom se você pudesse aproveitar a EXPO pelo menos um pouco."
84310100100-45 = "Foi um jeito indireto de dizer isso, não acha?"
84310100100-50 = "……Entendo, eu não fui atenciosa o suficiente."
84310100100-52 = "Tudo isso foi ideia minha. Eu tinha o direito de recusar, e não o fiz."
84310100100-53 = "Mas entendo o que o Sensei quer dizer."
84310100100-54 = "Vou cumprir o meu objetivo original."
84310100100-55 = "Vá aproveitar a EXPO que você mesma protegeu."
84310100100-56 = "Se acontecer qualquer coisa, nós damos um jeito."
84310100100-57 = "Tsc... Aquele intrometido deveria ter me dito isso diretamente."
84310100100-59 = "(Dá para notar a confiança que ela tem no Sensei... Será que ela trata as duas desse jeito?)"
84310100100-60 = "(Com certeza é fruto das ações dela. Será que estou... com inveja?)"
84310100100-61 = "Entendido. Vou esquecer a missão e ir dar uma volta."
84310100100-63 = "Tome cuidado."
84310100100-64 = "Divirta-se. Se precisar de qualquer coisa, não hesite em nos chamar."
84310100100-66 = "Assim farei."
