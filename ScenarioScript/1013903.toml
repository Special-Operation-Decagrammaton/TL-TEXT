[translation]
1013903-1 = "Niko's Shopping Trip"
1013903-2 = "(That evening. I headed to the meeting place to help with the operation.)\r\n"
1013903-3 = "(Since I heard it was an SRT special operation, I braced myself for a dangerous location, but...)\r\n"
1013903-8 = "(...The designated location was just a large supermarket.)"
1013903-9 = "[ns1] \"Um, Niko...?\"\n[ns2] \"...What exactly is this place?\""
1013903-13 = "Yes. This is the site for the FOX Platoon's special supply operation—the Market Point."
1013903-14 = "It looks like an ordinary, unremarkable place, though..."
1013903-15 = "Don't let your guard down. This place is already—it wouldn't be an exaggeration to call it a battlefield."
1013903-16 = "[s3] \"A battlefield...?\"\r\n[s4] \"Don't tell me... is there a terrorist threat?\""
1013903-19 = "No. It has nothing to do with terrorism, but..."
1013903-20 = "It's faster to show you than to explain it in words.\r\n"
1013903-21 = "Now, Sensei, please follow me."
1013903-27 = "(The interior of the large supermarket I entered after Niko was much noisier than the one I remembered.)"
1013903-28 = "(A while later...)"
1013903-31 = "It is now 6:00 PM, so we will now—"
1013903-32 = "begin our pre-closing time sale!"
1013903-33 = "Waaaaaah!\r\n\r\n"
1013903-38 = "[ns] \"Whoa, what a roar of excitement...\""
1013903-39 = "Sensei, this is no time to be surprised.\r\n"
1013903-40 = "Head to Delta Sector 3—the 'Vegetable Corner'—immediately. #nFirst, we need to secure the carrots!\r\n\r\n"
1013903-41 = "[s] \"O-okay!\""
1013903-44 = "They say vegetables are on sale for 99 yen now!"
1013903-45 = "Ugh, there are too many people, I can't take my time to choose at all...\r\n\r\n\r\n\r\n\r\n"
1013903-46 = "Which ones are big and tasty?"
1013903-47 = "Ah, anything will do, I just have to get them in the basket—\r\n\r\n\r\n\r\n\r\n"
1013903-53 = "What was that just now...!? That movement...!"
1013903-54 = "That girl... she navigated the crowd perfectly and grabbed the big carrots!?"
1013903-55 = "It's hard to tell the shape of carrots with dirt on them unless you look closely... how did she have such reflexes...!?"
1013903-60 = "It's well known that carrots with dirt on them are fresher, but... that makes it harder to judge by color."
1013903-61 = "In such cases, you check the stems—that way, you can tell the freshness instantly.\n"
1013903-62 = "[s5] \"A-amazing...\"\n[s6] \"I was struggling just to push through that crowd...\""
1013903-65 = "Hehe. Compared to our usual operations, this isn't that difficult.\r\n"
1013903-66 = "Now, next is Delta 5—the 'Potato Corner'."
1013903-67 = "Sensei... please guard the shopping basket!"
1013903-68 = "[ns] \"Leave it to me!\""
1013903-72 = "The big potatoes I had my eye on... they disappeared in an instant?"
1013903-73 = "That girl... she's no amateur!"
1013903-74 = "Hurry! If you space out, they'll all be taken!!"
1013903-77 = "Phew... with this, we have all the vegetables needed for the cooking.\r\n\r\n"
1013903-78 = "Next is Charlie Sector 1—the 'Meat Corner', but..."
1013903-79 = "[s] \"Should I just keep holding the shopping basket for the next one too?\""
1013903-80 = "No, the meat corner alternates between pork and beef sales every 10 minutes starting at 6:10 PM, so if you go to one shelf after the other, you won't make it in time.\r\n"
1013903-81 = "I will handle the Beef Point—Sensei, please handle the Pork Point! Let's do this simultaneously."
1013903-82 = "The target is... a 200g pack of sliced pork belly..."
1013903-83 = "Please wait until the clerk finishes putting on the half-price stickers!\r\n"
1013903-84 = "[s] \"O-okay...!\""
1013903-86 = "(However, the sale corner, which I tackled alone without Niko's support, was more intense than I expected.)"
1013903-91 = "Move, move! I've been eyeing that shoulder roast for a while!\r\n\r\n\r\n"
1013903-92 = "Pork ribs are 30% off? I'm buying them!"
1013903-97 = "Sorry, but I'm going through here first.\r\n\r\n\r\n\r\n"
1013903-101 = "Then, I'll go first too..."
1013903-106 = "[ns] \"Ugh...\""
1013903-107 = "(Pushed by the people, I couldn't even get close to the display...)"
1013903-111 = "The meat corner sale has begun!"
1013903-112 = "[ns] (Now's my chance...!)"
1013903-117 = "[ns7] \"Huh? A 30% off sticker...?\"\n[ns8] \"I definitely saw them putting on half-price stickers just a moment ago!\""
1013903-122 = "Hehe... are you new here, youngster?"
1013903-123 = "The 30% off stickers here look a lot like the 50% off ones. If you don't look closely, it's easy to get them mixed up!"
1013903-124 = "Where are you looking? That's the frozen food section."
1013903-126 = "(Pressed by the intensity of the veterans, I often ended up grabbing the wrong items...)"
1013903-128 = "FOX 2, returning."
1013903-129 = "Sensei, were you able to secure the target?"
1013903-130 = "[s9] \"Sorry... I got pushed around by the other customers...\"\n[s10] \"I could only get the 30% off ones.\""
1013903-133 = "It's alright. #nInstead, I managed to get the beef at 70% off, so there's still plenty of room in the budget!"
1013903-134 = "[s11] \"70% off?\"\r\n[s12] \"How did you get something like that?\""
1013903-137 = "Hehe, shall we call it... negotiation skills?"
1013903-138 = "Creating an advantageous situation through conversation is also an important role for special forces."
1013903-139 = "[ns] \"I'm reminded once again of the power of SRT...\""
1013903-141 = "[ns13] \"But is it really necessary to be this thorough with saving?\"\n[ns14] \"If you're short on food money, I can cover it?\""
1013903-144 = "No, meals are an extension of our missions. #nI cannot rely on your help, Sensei."
1013903-145 = "Besides, it's not like we can always get all the ingredients we need."
1013903-146 = "That's why in SRT, we've learned various survival techniques to efficiently secure food, even in remote mountains or heavily guarded enemy territory."
1013903-147 = "After all, you can't execute any operation smoothly if you skip meals."
1013903-148 = "After being paroled from the Correction Bureau, we were given a special budget from the General Student Council, but even then, after putting it toward operations, it's always tight..."
1013903-149 = "I just wanted to make sure everyone in the platoon could eat something nutritious... #nso shopping during time sales just became a habit."
1013903-150 = "...Does it look a bit stingy from your perspective, Sensei?"
1013903-151 = "[ns15] \"Not at all!\"\n[ns16] \"Doing this much for your platoon members is actually amazing!\""
1013903-155 = "[ns] \"I finally understand why you're called the 'Platoon Mom', Niko.\""
1013903-156 = "Hehe... 'Platoon Mom', huh."
1013903-157 = "The others in the platoon say that often, but hearing it from you makes me feel a bit shy..."
1013903-158 = "...I'm still lacking in many ways, though."
1013903-159 = "[s] \"From my perspective... I think you're already doing a wonderful job, Niko.\""
1013903-160 = "Ahaha..."
1013903-161 = "It feels a bit exaggerated... but thank you."
1013903-162 = "The time sale is almost over."
1013903-163 = "The remaining ingredients are... just onions and curry powder, I suppose."
1013903-164 = "[s] \"The seasoning aisle looks empty, I'll go grab them right away.\""
1013903-165 = "Ah, Sensei. Please wait a moment."
1013903-166 = "[s] \"Could it be... is there something I need to be careful about when buying the roux too?\""
1013903-167 = "No, it's not that... this is top-secret information, though."
1013903-172 = "The curry roux is cheaper at a different supermarket."
1013903-177 = "So, let's meet up outside once we've finished paying!"
1013903-182 = "(After that, I stopped by another supermarket with Niko to buy the curry roux, then returned to Schale.)"
1013903-183 = "(The curry Niko made for me was very refined and had a deep flavor...)"