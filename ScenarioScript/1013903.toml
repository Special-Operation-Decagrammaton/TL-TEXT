[translation]
1013903-1 = "ニコのお買い物"
1013903-2 = "（その日の夕方。作戦を手伝うために、約束の場所へ向かった）\r\n"
1013903-3 = "（SRTの特殊作戦と聞いていたので危険な場所だろうと身構えていたのだが……）\r\n"
1013903-8 = "（……指定されたのはただの大型スーパーだった）"
1013903-9 = "[ns1] \"あの、ニコ……。\"\n[ns2] \"……ここって、いったい？\""
1013903-13 = "はい。ここが、FOX小隊の特殊補給作戦を実施する場所――[ruby=マーケット]マイクポイント[/ruby]です。"
1013903-14 = "何の変哲もない日常にしか見えませんが……。"
1013903-15 = "気を抜いてはいけません。ここはすでに――戦場と言っても過言ではないのですから。"
1013903-16 = "[s3] \"戦場って……。\"\r\n[s4] \"まさか……テロの予告でも？\""
1013903-19 = "いいえ。テロとは関係ありませんが……。"
1013903-20 = "言葉で説明するよりも、直接見ていただいた方が早いですね。\r\n"
1013903-21 = "それでは先生、こちらへどうぞ。"
1013903-27 = "（ニコの後について入った大型スーパーの内部は、記憶にある普段のスーパーよりずっと騒がしかった）"
1013903-28 = "（しばらくして……）"
1013903-31 = "午後6時になりましたので、ただいまより――"
1013903-32 = "閉店前タイムセールを開始いたします！"
1013903-33 = "うわぁぁああぁぁあ！\r\n\r\n"
1013903-38 = "[ns] \"うわっ、凄い歓声だ……。\""
1013903-39 = "先生、驚いている場合じゃありませんよ。\r\n"
1013903-40 = "今すぐデルタ3区画――「野菜コーナー」へ。#nまずはニンジンの確保です！\r\n\r\n"
1013903-41 = "[s] \"わ、わかった！\""
1013903-44 = "今から野菜が99円セールですって！"
1013903-45 = "うっ、人が多すぎてとてもゆっくりなんて選んでいられないわ……。\r\n\r\n\r\n\r\n\r\n"
1013903-46 = "大きくて味が良いのはどれかしら？"
1013903-47 = "ああ、なんでもいいからカゴに入れなきゃ――\r\n\r\n\r\n\r\n\r\n"
1013903-53 = "今の……何！？あの動き……！"
1013903-54 = "あの子……人混みを綺麗によけて、大きなニンジンを持っていった！？"
1013903-55 = "土がついてるニンジンって、よく見ないと形がわからないのに……どうしてあんな瞬発力が……！？"
1013903-60 = "土がついているニンジンの方が新鮮なのは有名ですが……その分、色での判断が難しくなる。"
1013903-61 = "そういう時は、茎を確認するんです――そうすれば、鮮度は一発で分かります。\n"
1013903-62 = "[s5] \"す、すごい……。\"\n[s6] \"私なんて、あの人混みをかき分けるだけでも精一杯だったのに……。\""
1013903-65 = "ふふっ。普段の作戦に比べたら、そこまで大変ではありません。\r\n"
1013903-66 = "では続いて、デルタ5――「じゃがいもコーナー」です。"
1013903-67 = "先生は……買い物かごの護衛をお願いします！"
1013903-68 = "[ns] \"任せて！\""
1013903-72 = "目をつけていた大きなじゃがいもが、一瞬で消えた……？"
1013903-73 = "あの子……ただ者じゃないわ！"
1013903-74 = "急いで！ぼーっとしてると、全部持っていかれる！！"
1013903-77 = "ふぅ……これで、お料理に必要なお野菜は一通り揃いましたね。\r\n\r\n"
1013903-78 = "次は、チャーリー1区画――「精肉コーナー」ですが……。"
1013903-79 = "[s] \"次も買い物かごを持ってればいいのかな？\""
1013903-80 = "いいえ、精肉コーナーは18時10分から10分刻みで豚肉と牛肉のセールを交互に行うので、片方をとってからもう片方の棚に向かっていては間に合わないんです。\r\n"
1013903-81 = "私は[ruby=Beef]ブラボー[/ruby]ポイントを攻略しますので―― 先生は[ruby=Pork]パパポ[/ruby]イントの対応をお願いします！同時進行でいきましょう。"
1013903-82 = "目標は……パック詰めの豚バラの切り落とし200g……。"
1013903-83 = "店員さんが半額シールを貼り終えるまで待ってくださいね！\r\n"
1013903-84 = "[s] \"わ、分かった……！\""
1013903-86 = "（だが、ニコのサポート無しで単身で挑んだ特売コーナーは、予想以上に苛烈だった）"
1013903-91 = "どいたどいた！その肩ロースは、さっきから狙ってたの！\r\n\r\n\r\n"
1013903-92 = "豚カルビが30％オフ？買いよ！"
1013903-97 = "悪いけどこっち先に通らせてもらうわよ。\r\n\r\n\r\n\r\n"
1013903-101 = "じゃあ、私も先に……。"
1013903-106 = "[ns] \"うっ……。\""
1013903-107 = "（人に押され、売り場に近づくことすらままならなかった……）"
1013903-111 = "精肉コーナーのセール開始です！"
1013903-112 = "[ns] （今だ……！）"
1013903-117 = "[ns7] \"あれ？30％オフのシール……？\"\n[ns8] \"さっき、確かに半額シールを貼るの見たはずなのに！\""
1013903-122 = "ふふ……若いの、ここは初めてかい？"
1013903-123 = "ここの30％オフシールは50％オフシールとよく似ててね。よく見ないと、勘違いしやすいんだよ！"
1013903-124 = "どこを見ているんですか？そっちは冷凍コーナーですよ。"
1013903-126 = "（歴戦の猛者の気迫に押され、商品を取り違えることも多く……）"
1013903-128 = "FOX2、復帰しました。"
1013903-129 = "先生、目標は確保できましたか？"
1013903-130 = "[s9] \"ごめん……他のお客さんの勢いに押されちゃって……。\"\n[s10] \"30％オフのしか取れなかった。\""
1013903-133 = "大丈夫ですよ。#nその代わり、私は牛肉を70％オフで手に入れてきましたから、予算にはまだまだ余裕があります！"
1013903-134 = "[s11] \"70%オフ？\"\r\n[s12] \"そんな商品……どうやって？\""
1013903-137 = "ふふっ、交渉術……といったところでしょうか？"
1013903-138 = "会話を重ねて有利な状況を作り出すのも、特殊部隊の大切な役割ですから。"
1013903-139 = "[ns] \"改めてSRTの力を思い知るよ……。\""
1013903-141 = "[ns13] \"でも、ここまで徹底して節約する必要ってあるの？\"\n[ns14] \"食費が足りないなら、私が負担するよ？\""
1013903-144 = "いえ、食事も任務の延長ですから。#n先生のお力を借りるわけにはいきません。"
1013903-145 = "それに、いつでも食材が十全に手に入るとは限りません。"
1013903-146 = "だからこそSRTでは、人里離れた山の中や警戒の厳しい敵地でも――効率よく食材を確保するためのさまざまなサバイバル技術を学んできたんです。"
1013903-147 = "食事を抜いては、どんな作戦も円滑に実行できませんからね。"
1013903-148 = "矯正局から仮釈放された後、連邦生徒会から特別予算が支給されましたが、それでも作戦に回すと、いつもギリギリで……。"
1013903-149 = "少しでも小隊のみんなに精のつくものを食べてもらいたくて頑張っていたら……#nタイムセールの時に買い出しをするのが習慣になってしまっただけなんです。"
1013903-150 = "……先生から見たら、ちょっと貧乏くさく見えちゃいますか？"
1013903-151 = "[ns15] \"全然そんなことないよ！\"\n[ns16] \"小隊のみんなのために、ここまでやるなんてむしろすごいよ！\""
1013903-155 = "[ns] \"ニコが「小隊のお母さん」って呼ばれる理由がよく分かったよ。\""
1013903-156 = "ふふ……「小隊のお母さん」、ですか。"
1013903-157 = "小隊のみんなにはよく言われますけれど、先生に言われるとなんだか照れますね……。"
1013903-158 = "……色々、至らないところだらけですけど。"
1013903-159 = "[s] \"私から見たら……ニコはもう立派に頑張ってると思うけど。\""
1013903-160 = "あはは………。"
1013903-161 = "大げさな気もしますけど……ありがとうございます。"
1013903-162 = "そろそろタイムセールも終わりですね。"
1013903-163 = "残っている食材は……玉ねぎと、カレー粉くらいでしょうか。"
1013903-164 = "[s] \"調味料コーナーは空いてそうだし、私がすぐ取ってくるよ。\""
1013903-165 = "あ、先生。ちょっと待ってください。"
1013903-166 = "[s] \"もしかして……ルーを買う時にも気をつけないといけないことが？\""
1013903-167 = "いえ、そういうことではなくて……これは、極秘情報なんですが。"
1013903-172 = "カレールーは、別のスーパーの方が安いんです。"
1013903-177 = "ですから、お会計を済ませたら外で合流しましょう！"
1013903-182 = "（その後、ニコと一緒に別のスーパーに寄ってカレールーを買い足し、シャーレへ戻った）"
1013903-183 = "（ニコが作ってくれたカレーはとても上品で、深い味わいだった……）"
