[translation]
1013903-1 = "Niko's Shopping"
1013903-2 = "(That evening. I headed to the designated meeting place to help with the operation.)"
1013903-3 = "(Since I was told it was an SRT special operation, I braced myself for a dangerous location, but...)"
1013903-8 = "(...The designated spot was just a regular large supermarket.)"
1013903-9 = "[ns1] \"Umm, Niko...\"\n[ns2] \"...Where exactly are we?\""
1013903-13 = "Yes. This is where FOX Platoon conducts its special supply operations—[ruby=Market]Point Mike[/ruby]."
1013903-14 = "It may look like nothing more than an ordinary, everyday scene..."
1013903-15 = "But you mustn't let your guard down. It is no exaggeration to say that this place is already—a battlefield."
1013903-16 = "[s3] \"A battlefield...?\"\n[s4] \"Don't tell me... was there a terrorist threat?\""
1013903-19 = "No. It has nothing to do with terrorism, but..."
1013903-20 = "It will be faster for you to see it for yourself than for me to explain it with words."
1013903-21 = "Right this way then, Sensei."
1013903-27 = "(The inside of the large supermarket I entered following Niko was much noisier than the regular supermarkets I remembered.)"
1013903-28 = "(A little while later...)"
1013903-31 = "It is now 6:00 PM, so starting right now—"
1013903-32 = "We are beginning our pre-closing time sale!"
1013903-33 = "RAAAAAAAAAAAAA!"
1013903-38 = "[ns] \"Whoa, what an intense cheer...\""
1013903-39 = "This is no time to be surprised, Sensei."
1013903-40 = "We need to move to Sector Delta 3—the \"Vegetable Section\" immediately.#nFirst, we secure the carrots!"
1013903-41 = "[s] \"G-Got it!\""
1013903-44 = "They said vegetables are on sale for 99 yen starting now!"
1013903-45 = "Ugh, there are way too many people here, I can't take my time choosing at all..."
1013903-46 = "I wonder which ones are big and taste good?"
1013903-47 = "Ah, I just need to put anything in my basket—"
1013903-53 = "What was that... just now!? Those movements...!"
1013903-54 = "That girl... she weaved through the crowd flawlessly and snatched up a huge carrot!?"
1013903-55 = "It's hard to tell the shape of carrots with dirt on them unless you look closely... how does she have such reflexes...!?"
1013903-60 = "It is a well-known fact that carrots with dirt on them are fresher... but that makes it difficult to judge them by color."
1013903-61 = "At times like that, you check the stem—do that, and you can tell how fresh it is at a glance."
1013903-62 = "[s5] \"A-Amazing...\"\n[s6] \"And here I was struggling just to push my way through that crowd...\""
1013903-65 = "Hehe. Compared to our usual operations, it is not that difficult."
1013903-66 = "Now then, moving on to Delta 5—the \"Potato Section\"."
1013903-67 = "Sensei... I ask that you guard the shopping basket!"
1013903-68 = "[ns] \"Leave it to me!\""
1013903-72 = "The big potato I had my eye on vanished in an instant...?"
1013903-73 = "That girl... she's no ordinary shopper!"
1013903-74 = "Hurry! If we just stand around, she's going to take everything!!"
1013903-77 = "Phew... with this, we have all the vegetables we need for cooking."
1013903-78 = "Next is Sector Charlie 1—the \"Meat Section\", but..."
1013903-79 = "[s] \"Should I just keep holding the shopping basket for this next one too?\""
1013903-80 = "No, the meat section alternates sales on pork and beef in 10-minute intervals starting from 18:10, so if we grab one and then head to the other shelf, we won't make it in time."
1013903-81 = "I will capture [ruby=Beef]Bravo[/ruby] point—so Sensei, I need you to handle [ruby=Pork]Papa[/ruby] point! Let's proceed simultaneously."
1013903-82 = "Your objective is... a 200g pack of sliced pork belly..."
1013903-83 = "Make sure you wait until the clerk finishes putting the half-price sticker on it!"
1013903-84 = "[s] \"U-Understood...!\""
1013903-86 = "(However, tackling the bargain section alone without Niko's support was far more brutal than I expected.)"
1013903-91 = "Out of the way, out of the way! That shoulder loin was what I've been aiming for!"
1013903-92 = "Pork ribs are 30% off? I'm buying!"
1013903-97 = "Sorry, but I'm coming through here first."
1013903-101 = "Then, me too…"
1013903-106 = "[ns] \"Ugh...\""
1013903-107 = "(I was pushed around by the crowd, unable to even get close to the display...)"
1013903-111 = "The meat section sale has now begun!"
1013903-112 = "[ns] (Now...!)"
1013903-117 = "[ns7] \"Huh? A 30% off sticker...?\"\n[ns8] \"I could have sworn I just saw them put a half-price sticker on this!\""
1013903-122 = "Hehe... Is this your first time here, youngster?"
1013903-123 = "The 30% off stickers here look a lot like the 50% off ones. If you don't look closely, it's easy to make a mistake!"
1013903-124 = "Where are you looking? That's the frozen foods section over there."
1013903-126 = "(Overwhelmed by the intensity of these seasoned veterans, I ended up grabbing the wrong items numerous times...)"
1013903-128 = "FOX2, I have returned."
1013903-129 = "Sensei, were you able to secure the objective?"
1013903-130 = "[s9] \"I'm sorry... I got overwhelmed by the sheer force of the other customers...\"\n[s10] \"I was only able to grab a 30% off one.\""
1013903-133 = "It is perfectly fine.#nTo make up for it, I managed to acquire the beef at 70% off, so we still have plenty of room in our budget!"
1013903-134 = "[s11] \"70% off?\"\n[s12] \"How did you manage to get an item like that...?\""
1013903-137 = "Hehe, I suppose you could call it... negotiation tactics?"
1013903-138 = "Building a conversation to create an advantageous situation is also an important role of the Special Forces."
1013903-139 = "[ns] \"I'm reminded once again of SRT's true capabilities...\""
1013903-141 = "[ns13] \"But, is it really necessary to go to such extreme lengths to save money?\"\n[ns14] \"If you don't have enough for food, I can cover the cost, you know?\""
1013903-144 = "No, meals are an extension of our missions.#nWe cannot rely on your assistance for this."
1013903-145 = "Furthermore, we won't always be able to get our hands on a fair amount of ingredients."
1013903-146 = "That is precisely why at SRT, we have learned various survival skills to efficiently secure food—even deep in the mountains away from civilization, or in heavily guarded enemy territory."
1013903-147 = "After all, no operation can be executed smoothly on an empty stomach."
1013903-148 = "We were granted a special budget from the General Student Council after being paroled from the Correctional Bureau, but once we allocate funds for our operations, we are always just barely scraping by..."
1013903-149 = "I was just trying my best to make sure everyone in the platoon could eat something nutritious, and before I knew it...#ndoing our grocery shopping during time sales just became a habit."
1013903-150 = "...Does it seem a bit cheap from your perspective, Sensei?"
1013903-151 = "[ns15] \"Not at all!\"\n[ns16] \"The fact that you go this far for everyone in your platoon is actually amazing!\""
1013903-155 = "[ns] \"I completely understand why they call you the 'Platoon’s Mother' now.\""
1013903-156 = "Hehe... the \"Platoon’s Mother,\" you say."
1013903-157 = "I am told that often by everyone in the platoon, but having you say it makes me feel a little embarrassed somehow..."
1013903-158 = "...Even though I still have many shortcomings."
1013903-159 = "[s] \"From my perspective... I think you're already doing an outstanding job, Niko.\""
1013903-160 = "Ahaha..."
1013903-161 = "I feel like you're being a little dramatic... but thank you."
1013903-162 = "It looks like the time sale is coming to an end soon."
1013903-163 = "The ingredients we have left to get are... probably just onions and curry powder."
1013903-164 = "[s] \"The seasoning aisle looks pretty empty, so I'll go grab them real quick.\""
1013903-165 = "Ah, Sensei. Please wait a moment."
1013903-166 = "[s] \"Don't tell me... is there something else we need to be careful about when buying curry roux too?\""
1013903-167 = "No, it is nothing like that... However, this is top-secret information."
1013903-172 = "The curry roux is actually cheaper at a different supermarket."
1013903-177 = "So, let's just rendezvous outside after checking out!"
1013903-182 = "(After that, I stopped by another supermarket with Niko to pick up the curry roux, and then we returned to Schale.)"
1013903-183 = "(The curry Niko made for me had a very elegant and deeply rich flavor...)"