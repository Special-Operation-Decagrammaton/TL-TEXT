[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013903-1 = "As Compras da Niko" 
1013903-2 = "（Naquela tarde, fui ao local combinado\npara ajudar em uma operação.）\r\n" 
1013903-3 = "（Como ouvi que seria uma operação especial da SRT,\nfui preparado para enfrentar um lugar perigoso, mas……）\r\n" 
1013903-8 = "（……O ponto de encontro era apenas um supermercado gigante.）" 
1013903-9 = "[ns1] \"Com licença, Niko……\"\n[ns2] \"……Onde exatamente nós estamos?\"" 
1013903-13 = "Sim. Este é o local onde a operação especial de\nsuprimentos do Esquadrão FOX será executada―― O Market Point." 
1013903-14 = "Pode parecer um local cotidiano completamente normal, mas……" 
1013903-15 = "Não baixe a guarda.\nNão seria exagero dizer que isto aqui já é um campo de batalha." 
1013903-16 = "[s3] \"Campo de batalha……\"\r\n[s4] \"Por acaso…… tivemos algum aviso de terrorismo?\"" 
1013903-19 = "Não.\nNão tem nada a ver com terroristas, mas……" 
1013903-20 = "Em vez de explicar com palavras,\nsrá mais rápido se você vir com os próprios olhos.\r\n" 
1013903-21 = "Então, por favor,\nvenha por aqui, Sensei." 
1013903-27 = "（Segui a Niko para dentro do grande supermercado.\nO interior estava muito mais agitado do que qualquer mercado comum.）" 
1013903-28 = "（Pouco tempo depois……）" 
1013903-31 = "Atenção, o relógio acaba de marcar 18 horas!\nA partir deste momento――" 
1013903-32 = "Daremos início à liquidação relâmpago\nantes do fechamento!" 
1013903-33 = "Uwaaaaaaaaaaahh!\r\n\r\n" 
1013903-38 = "[ns] \"Nossa, que gritaria toda é essa……\"" 
1013903-39 = "Não há tempo para surpresas, Sensei.\r\n" 
1013903-40 = "Siga imediatamente para o Setor Delta 3―― \"Seção de Legumes\".\nNosso primeiro objetivo é garantir as cenouras!\r\n\r\n" 
1013903-41 = "[s] \"E-Entendido!\"" 
1013903-44 = "Legumes por apenas 99 ienes a partir de agora!" 
1013903-45 = "Ugh, tem gente demais.\nNão dá para escolher com calma……\r\n\r\n\r\n\r\n\r\n" 
1013903-46 = "Qual delas será a maior e mais saborosa?" 
1013903-47 = "Ah, eu preciso colocar qualquer coisa\nna cesta antes que acabe――\r\n\r\n\r\n\r\n\r\n" 
1013903-53 = "O que foi aquilo agora?!\nQue movimento absurdo……!" 
1013903-54 = "Aquela garota…… Ela desviou da multidão com maestria\ne pegou as maiores cenouras?!" 
1013903-55 = "Cenouras com terra são difíceis de avaliar sem olhar de perto……\nComo ela conseguiu fazer isso tão rápido……?!" 
1013903-60 = "É de conhecimento comum que cenouras com terra são mais frescas……\nMas, em contrapartida, é difícil julgá-las pela cor." 
1013903-61 = "Nesses casos, devemos checar os caules――\nAssim, o frescor é revelado instantaneamente.\n" 
1013903-62 = "[s5] \"Que in-incrível……\"\n[s6] \"Enquanto eu sofria só para conseguir abrir caminho pela multidão……\"" 
1013903-65 = "Fufu. Comparado às nossas operações regulares,\nisso não é tão difícil.\r\n" 
1013903-66 = "Nosso próximo alvo é o Delta 5―― \"Seção de Batatas\"." 
1013903-67 = "Sensei……\nConto com você para escoltar a cesta de compras!" 
1013903-68 = "[ns] \"Pode deixar!\"" 
1013903-72 = "A batata gigante que eu estava de olho……\nSumiu em um piscar de olhos?!" 
1013903-73 = "Aquela garota……\nNão é uma cliente comum!" 
1013903-74 = "Rápido! Se ficarmos parados aqui,\nela vai levar tudo!" 
1013903-77 = "Ufa…… Com isso, já conseguimos todos os vegetais\nnecessários para cozinhar.\r\n\r\n" 
1013903-78 = "A seguir, Setor Charlie 1―― \"Seção de Carnes\", mas……" 
1013903-79 = "[s] \"Devo continuar segurando\na cesta?\"" 
1013903-80 = "Não. A seção de carnes alterna liquidações de carne de porco e de boi\na cada 10 minutos a partir das 18h10, então não conseguiremos pegar ambas se formos juntos.\r\n" 
1013903-81 = "Eu vou avançar e dominar o Ponto Bravo (Beef)――\nSensei, cuide do Ponto Papa (Pork)! Vamos avançar simultaneamente." 
1013903-82 = "Seu alvo é……\nUm pacote de 200g de cortes mistos de panceta de porco……" 
1013903-83 = "Certifique-se de esperar o funcionário terminar de colar\nos selos de 50% de desconto antes de agir!\r\n" 
1013903-84 = "[s] \"E-Entendido……!\"" 
1013903-86 = "（No entanto, o campo de batalha das promoções\nfoi muito mais brutal do que eu imaginava sem o apoio da Niko.）" 
1013903-91 = "Saiam da frente!\nEssa copa lombo já é minha!\r\n\r\n\r\n" 
1013903-92 = "Costela de porco com 30% de desconto?!\nVou levar!" 
1013903-97 = "Foi mal, mas eu vou passar\nna frente.\r\n\r\n\r\n\r\n" 
1013903-101 = "A-Ah, com licença……" 
1013903-106 = "[ns] \"Ugh……\"" 
1013903-107 = "（Fui empurrado por todos os lados\ne mal conseguia me aproximar das prateleiras……）" 
1013903-111 = "A liquidação da seção de carnes começou!" 
1013903-112 = "[ns] （É agora……!）" 
1013903-117 = "[ns7] \"Ué? Um selo de 30% de desconto……?\"\n[ns8] \"Eu tenho certeza de que o vi colar o de 50% de desconto!\"" 
1013903-122 = "Fufu…… Novato, é a sua primeira vez aqui?" 
1013903-123 = "Os selos de 30% são quase idênticos aos de 50% neste mercado.\nSe não prestar atenção, é fácil se confundir!" 
1013903-124 = "Para onde você está olhando?\nAí é a seção de congelados." 
1013903-126 = "（Pressionado pela aura dos veteranos de guerra da liquidação,\nacabei pegando o produto errado diversas vezes……）" 
1013903-128 = "FOX 2, de volta à base." 
1013903-129 = "E então, Sensei,\nconseguiu garantir o alvo?" 
1013903-130 = "[s9] \"Desculpe…… A pressão e o ímpeto dos outros clientes me esmagaram……\"\n[s10] \"Só consegui pegar o de 30% de desconto.\"" 
1013903-133 = "Não tem problema.\nEm compensação, consegui carne bovina com 70% de desconto,\nentão ainda temos bastante sobra no orçamento!" 
1013903-134 = "[s11] \"70% de desconto?\"\r\n[s12] \"Como você conseguiu um produto desses……?\"" 
1013903-137 = "Fufu. Foi através das minhas brilhantes táticas de negociação……\nPor assim dizer." 
1013903-138 = "Criar situações vantajosas através do diálogo\ntambém é uma habilidade vital para as forças especiais." 
1013903-139 = "[ns] \"Isso me faz perceber novamente\no quão assustadora a SRT é……\"" 
1013903-141 = "[ns13] \"Mas tem mesmo a necessidade de economizar tão rigidamente assim?\"\n[ns14] \"Se o dinheiro para a alimentação estiver curto, eu posso ajudar.\"" 
1013903-144 = "Não precisa. A alimentação também é uma extensão da nossa missão.\nNão podemos depender dos recursos do Sensei para isso." 
1013903-145 = "Além disso, não há garantia de que sempre teremos\nacesso farto a ingredientes de qualidade." 
1013903-146 = "É por isso que na SRT nós treinamos arduamente diversas técnicas de sobrevivência――\npara garantir alimentos de forma eficiente,\nseja no meio das montanhas ou em territórios hostis super vigiados." 
1013903-147 = "Qualquer operação está fadada ao fracasso\nse a alimentação for negligenciada, afinal." 
1013903-148 = "Após a condicional do Centro Correcional,\nrecebemos um orçamento especial do Conselho Estudantil Geral, mas……\nQuando direcionamos isso para as operações, sempre ficamos no limite." 
1013903-149 = "Eu só queria que as meninas do esquadrão pudessem\ncomer coisas nutritivas e saudáveis para se fortalecerem……\nE acabei criando o hábito de fazer as compras durante as liquidações relâmpago." 
1013903-150 = "……Isso faz eu parecer uma coitada sofredora\naos seus olhos, Sensei?" 
1013903-151 = "[ns15] \"De jeito nenhum!\"\n[ns16] \"Fazer tudo isso pelo bem do seu esquadrão é algo admirável!\"" 
1013903-155 = "[ns] \"Agora eu entendo perfeitamente o porquê de chamarem\na Niko de 'A Mãe do Esquadrão'.\"" 
1013903-156 = "Fufu…… 'A Mãe do Esquadrão', é?" 
1013903-157 = "As garotas vivem me chamando assim, mas……\nOuvir isso do Sensei me deixa um pouco envergonhada." 
1013903-158 = "……Mesmo que eu ainda tenha minhas falhas e limitações." 
1013903-159 = "[s] \"Do meu ponto de vista…… Acredito que a Niko\njá está fazendo um trabalho esplêndido.\"" 
1013903-160 = "Ahaha……" 
1013903-161 = "Acho que isso é um exagero, mas……\nMuito obrigada." 
1013903-162 = "As liquidações relâmpago já estão quase acabando." 
1013903-163 = "Os ingredientes restantes que precisamos……\nAcho que são apenas cebolas e curry em pó." 
1013903-164 = "[s] \"A seção de temperos parece vazia,\neu posso ir pegar rapidinho.\"" 
1013903-165 = "Ah, Sensei. Espere um momento." 
1013903-166 = "[s] \"Por acaso…… Tem algum truque especial\nna hora de comprar o curry em pó também?\"" 
1013903-167 = "Não, não é nada disso……\nMas isso é uma informação estritamente confidencial." 
1013903-172 = "O curry em pó é mais barato\nno outro supermercado." 
1013903-177 = "Sendo assim, vamos passar no caixa\ne nos encontramos lá fora!" 
1013903-182 = "（Depois disso, fomos juntos ao outro mercado comprar o curry\ne voltamos para a Schale.）" 
1013903-183 = "（O curry que a Niko preparou foi incrivelmente requintado\ne com um sabor bem profundo e refinado……）" 