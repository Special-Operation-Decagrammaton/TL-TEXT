[translation]
102010-1 = "第1話;色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]"
102010-4 = "……。"
102010-8 = "委員長、これは……"
102010-9 = "……。"
102010-11 = "ノア、リオ会長の行方はまだ分からないのよね……？"
102010-12 = "はい……"
102010-13 = "……そう。"
102010-14 = "……ここは私に任せて、ユウカちゃんは先に行っててください。"
102010-15 = "……ありがとう。頼んだわ！"
102010-17 = "急ぎの用件とお伺いしたのですが……なるほど、皆様お集まりのようで。"
102010-21 = "ハナコさん……。"
102010-22 = "……。"
102010-23 = "お久しぶりです、ハナコさん。"
102010-24 = "セイアちゃんからお話は伝わっているかとは思いますが……#nこれからは、私たちも動かなくてはなりません。"
102010-25 = "それぞれの所属する派閥は違えど、同じトリニティの生徒同士#n手を取り合えると、私は信じております。"
102010-27 = "こ、こっちの掃除は全部終わりました！"
102010-28 = "あははっ！にしても変な空～"
102010-33 = "あれ……#nせ、先生からです……！"
102010-34 = "え？どうしたんだろ？"
102010-35 = "……はぁ。"
102010-39 = "……そう。#nまた、私たちの出番のようね。"
102010-41 = "緊急速報です！！現在、D.U.で怪奇現象が発生しております！#nこれは――"
102010-42 = "突如として出現した巨大な塔が落下――#nサンクトゥムタワーに激突しました！！"
102010-43 = "未曾有の大災害に、D.U.の行政は現在麻痺しております！#n先ほど発令された戒厳令との関係は明らかになっていないものの――"
102010-55 = "シャーレの屋上"
102010-57 = "……クックックッ。"
102010-58 = "[s] \"……黒服。\""
102010-59 = "お見苦しい姿で失礼します、[USERNAME]先生。"
102010-60 = "――ゲマトリアは壊滅しました。"
102010-61 = "「色彩」が、遂に到来してしまったのです。"
102010-62 = "――この表現は少し適切ではないですね。#n正しくは「侵略してきた」とでも申しましょうか。"
102010-63 = "[s] \"一体、何が起きている？\""
102010-64 = "「色彩」が到来し――狼の神がソレと接触したのです。"
102010-65 = "[ruby=terror]恐怖[/ruby]の領域へと反転した彼女は、命ある全てのものを、あの世へと導く死の神「アヌビス」となり――"
102010-66 = "自身の本質が赴くままに――この世界に終焉をもたらすことでしょう。"
102010-67 = "「色彩」はそれを理解していた。#n故に、この地にたどり着いて、まず最初に彼女の「崇高」を確保したのです。"
102010-76 = "「色彩」は意志も欲望も目的も無い不可解な観念であると――#nそう解釈していたのですが。"
102010-77 = "この行動においては、明確な「意志」と「計画性」を感じます。"
102010-78 = "まさか自ら行動に出るとは……"
102010-79 = "「色彩」は、キヴォトスのありとあらゆる神秘と恐怖、そして崇高の概念を吸収し、自らのものにしようとしています――"
102010-81 = "そして……キヴォトスに出現した6つの塔は――#n「サンクトゥムタワー」の一種といえるでしょう。それも、反転した。"
102010-82 = "アレは太古の昔、まだこの世界に記録が残されるよりも前――当時存在していた原始的な神秘――「名もなき神」が築き上げた技術の一つ。"
102010-83 = "アレが「色彩」の光を世界中に伝播させ、キヴォトスに存在する全ての神秘を恐怖へと反転させることでしょう。 "
102010-84 = "――あの、狼の神のように。"
102010-85 = "[s] \"なら、私たちはそれを食い止めるだけだよ。\""
102010-86 = "……。 "
102010-87 = "「終焉をもたらす神」を使って「色彩」がゲマトリアを襲撃した理由――#nそれは、ゲマトリアが所持している「秘儀」と「検証結果」を奪うためだったのでしょう。"
102010-88 = "デカグラマトンのパス、[ruby=ミメシス]複製[/ruby]の秘儀、「[ruby=Communio Sanctorum]聖徒の交わり[/ruby]」、ライブラリー・オブ・ロア……名もなき神の力に、無名の守護者の能力――"
102010-89 = "これら全てを手にした「色彩の[ruby=きょうどうしゃ]嚮導者[/ruby]」は……"
102010-90 = "[s] \"「色彩の嚮導者」？\""
102010-91 = "ええ。「色彩」の意志を代弁する存在であり、計画を遂行する実行者――"
102010-93 = "――その名を「プレナパテス」。#nこれから、ヤツと対面する事となるでしょう。"
102010-108 = "現在、キヴォトス全域で通信障害が発生しています！"
102010-109 = "各学園から避難指示が出てもおかしくない状況ですが……タワーの正体が明らかになっていない現状では――"
102010-110 = "あっ！今速報が入りました！#n連邦生徒会が緊急声明を発表するとのことです――"
102010-111 = "え？誤報？"
102010-112 = "それでは一体誰が……"
102010-114 = "ああっと！緊急速報です！！#nD.U.各地で正体不明の兵が現れました。"
102010-115 = "こ、これは一体！？"
102010-116 = "都市一帯を無差別に攻撃しているとのことで――"
102010-117 = "こ、この襲撃は何を意味しているのでしょうか！？#n一体、D.U.で何が起こっているというのでしょう！"
102010-118 = "ああっ、は、はい……！今しがた連邦生徒会からの緊急声明が――#nいえ、訂正いたします。「シャーレ」からの声明です！"
102010-119 = "シャーレからの緊急声明が到着しました！！"
102010-120 = "い、今、読み上げます……！"
102010-122 = "「……各自治区の生徒は、黒い塔の付近に近寄らず、すぐに避難してください」"
102010-124 = "[ns] \"ここからは[ruby=シャーレ]大人[/ruby]に任せて。\""
102010-126 = "[ns] 大人のカードを取り出す。"
102010-128 = "……一つ、忠告をしましょう。"
102010-132 = "そのカードを乱用すれば――#nあなたは私たちと同じ結末を迎える事になりますよ、先生。"
102010-133 = "クックックッ……。"
