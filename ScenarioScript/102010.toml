[translation]
102010-1 = "Episódio 1; Colorido Líder de Kyoto"
102010-4 = "……."
102010-8 = "Presidente, isso é..."
102010-9 = "……."
102010-11 = "Noah, ainda não sabemos onde está o presidente Rio, certo...?"
102010-12 = "sim……"
102010-13 = "……sim."
102010-14 = "...Deixe isso comigo, Yuka-chan, por favor, vá primeiro."
102010-15 = "……obrigado. Eu pedi isso!"
102010-17 = "Perguntei sobre algo urgente, mas... entendo, parece que todo mundo está aqui."
102010-21 = "Hanako-san...."
102010-22 = "……."
102010-23 = "Já faz um tempo, Hanako-san."
102010-24 = "Acho que Seia-chan contou a história, mas...#nDe agora em diante, nós também temos que nos mover."
102010-25 = "Embora cada um de nós pertença a uma facção diferente, acredito que os alunos do Trinity podem dar as mãos uns aos outros."
102010-27 = "Ei, toda a limpeza aqui acabou!"
102010-28 = "Ahaha! Mesmo assim, é um céu estranho~"
102010-33 = "Isso...#n, é da professora...!"
102010-34 = "foto? O que aconteceu?"
102010-35 = "... Haa."
102010-39 = "……sim. #nParece que é a nossa vez novamente."
102010-41 = "Esta é uma notícia de emergência! ! Um estranho fenômeno está ocorrendo atualmente em D.U.! #nIsso é――"
102010-42 = "Uma enorme torre que apareceu de repente caiu e colidiu com a #n Sanctum Tower! !"
102010-43 = "Devido ao desastre sem precedentes, o D.U. a administração está atualmente paralisada! #nEmbora a relação com a lei marcial anunciada recentemente não seja clara..."
102010-55 = "Telhado da placa de Petri"
102010-57 = "...Cuco."
102010-58 = "[s] \"...Roupas pretas.\""
102010-59 = "Peço desculpas pela aparência desagradável, Sr. [NOME DE USUÁRIO]."
102010-60 = "--Gematria foi destruída."
102010-61 = "“Cor” finalmente chegou."
102010-62 = "--Esta expressão é um pouco inadequada. #nSeria mais correto dizer que eles nos \"invadiram\"."

102010-63 = "[s] \"O que diabos está acontecendo?\""
102010-64 = "A \"cor\" chegou - o deus lobo entrou em contato com Sore."

102010-65 = "Ela se transformou no reino do medo e se tornou Anúbis, o deus da morte que conduz todos os seres vivos para a vida após a morte..."
102010-66 = "Deixe a sua verdadeira natureza seguir seu curso – ela trará o fim deste mundo."
102010-67 = "``Cor'' entendeu isso. #nÉ por isso que quando cheguei a este lugar, primeiro garanti sua “exaltação”."
102010-76 = "Foi assim que interpretei “cor” como um conceito incompreensível, sem vontade, desejo ou propósito."
102010-77 = "Nesta ação, sinto uma clara “vontade” e “planejamento”."
102010-78 = "Nunca pensei que ele agiria sozinho..."
102010-79 = "\"Cor\" absorve todos os tipos de mistério, medo e conceitos do sublime de Kivotos e tenta torná-los seus."

102010-81 = "E... as seis torres que apareceram em Kivotos podem ser consideradas uma espécie de “Torre do Santuário”. Isso também foi revertido."
102010-82 = "É uma das tecnologias criadas por um “deus sem nome” nos tempos antigos, antes mesmo de haver registros neste mundo – um mistério primitivo que existia naquela época."
102010-83 = "Ele espalhará a luz colorida por todo o mundo, transformando todos os mistérios de Kivotos em medo."
102010-84 = "--Como o deus lobo."
102010-85 = "[s] \"Então só temos que parar com isso.\""
102010-86 = "……."
102010-87 = "A razão pela qual \"Color\" atacou Gematria usando o \"Deus que traz o fim\" foi provavelmente para roubar os \"mistérios\" e \"resultados de verificação\" que Gematria possuía."

102010-88 = "O Caminho do Decagrammaton, o Mistério da Replicação, \"Comunidade dos Santos\", Biblioteca do Conhecimento...O poder de um deus sem nome, a habilidade de um guardião sem nome――"

102010-89 = "O ``Colorido Kyotosha'' que obteve todas essas coisas..."
102010-90 = "[s] \"\"O líder das cores\"? \""

102010-91 = "Sim. Uma entidade que representa a vontade das “cores” e um executor que executa planos――"
102010-93 = "--Seu nome é \"Plenapates\". #nDe agora em diante, você terá que conhecê-lo cara a cara."

102010-108 = "Atualmente há uma falha de comunicação em Kivotos!"
102010-109 = "Não seria estranho se cada escola emitisse uma ordem de evacuação, mas com a situação atual em que a verdadeira natureza da torre não foi revelada..."
102010-110 = "Ah! Temos novidades agora! #nO Conselho Estudantil da Federação emitirá uma declaração de emergência――"
102010-111 = "foto? Alarme falso?"
102010-112 = "Então quem é..."
102010-114 = "Ah! Esta é uma notícia de emergência! ! #nD.U. Soldados não identificados apareceram em vários lugares."
102010-115 = "Ei, o que diabos é isso! ?"
102010-116 = "Dizem que eles estão atacando a cidade inteira indiscriminadamente..."
102010-117 = "O que esse ataque significa? ? #nO que diabos está acontecendo em D.U.?"
102010-118 = "Ah, sim...! Uma declaração urgente do Conselho Estudantil da Federação acaba de ser emitida –#nNão, gostaria de fazer uma correção. Uma declaração da “Placa de Petri”!"
102010-119 = "Chegou um comunicado urgente de Petri! !"
102010-120 = "E-eu vou ler em voz alta agora…!"
102010-122 = "\"...Estudantes de cada região autônoma, por favor, não cheguem perto da Torre Negra e evacuem imediatamente.\""

102010-124 = "[ns] \"De agora em diante, deixe isso para os adultos.\""
102010-126 = "[ns] Retire o cartão de adulto."
102010-128 = "...Deixe-me dar um conselho."
102010-132 = "Se você abusar desse cartão, você terá o mesmo fim que nós, senhor."
102010-133 = "kkkkkkkkkkkkkkk."
