[translation]
102010-1 = "Episódio 1; O Guia do Chroma"
102010-4 = "……。"
102010-8 = "Presidente, isso é..."
102010-9 = "……。"
102010-11 = "Noah, ainda não temos notícias do paradeiro da Presidente Rio, não é...?"
102010-12 = "Sim..."
102010-13 = "……Entendo."
102010-14 = "……Deixe as coisas aqui comigo, Yuuka-chan, pode ir na frente."
102010-15 = "……Obrigada. Conto com você!"
102010-17 = "Fui informada de que era um assunto urgente... Entendo, parece que todas estão reunidas."
102010-21 = "Hanako-san..."
102010-22 = "……。"
102010-23 = "Quanto tempo, Hanako-san."
102010-24 = "Acredito que a Seia-chan já lhes tenha passado a mensagem, mas...#nA partir de agora, nós também precisaremos agir."
102010-25 = "Apesar de pertencermos a facções diferentes, somos todas alunas de Trinity...#nEu acredito que podemos nos dar as mãos e cooperar."
102010-27 = "A-A limpeza por aqui já terminou!"
102010-28 = "Ahaha! Mas que céu esquisito~"
102010-33 = "Ué...#nÉ-É do Sensei...!"
102010-34 = "Hã? O que será que aconteceu?"
102010-35 = "……Haa."
102010-39 = "……É.#nParece que chegou a nossa vez de novo."
102010-41 = "Notícia urgente!! Um fenômeno bizarro está ocorrendo em D.U. neste exato momento!#nIsto é――"
102010-42 = "Uma torre gigante surgiu do nada e caiu――#ncolidindo com a Torre Sanctum!!"
102010-43 = "Devido a esse desastre sem precedentes, o sistema administrativo de D.U. encontra-se paralisado!#nEmbora a relação com a lei marcial declarada mais cedo ainda não esteja clara――"
102010-55 = "Terraço da Schale"
102010-57 = "……Kukuku."
102010-58 = "[s] \"……Black Suit.\""
102010-59 = "Peço perdão pela aparência lamentável, Sensei [USERNAME]."
102010-60 = "――A Gematria foi aniquilada."
102010-61 = "O \"Chroma\" finalmente chegou."
102010-62 = "――Essa expressão talvez não seja a mais adequada.#nO mais correto seria dizer que \"fomos invadidos\"."
102010-63 = "[s] \"O que diabos está acontecendo?\""
102010-64 = "O \"Chroma\" chegou――e o Deus Lobo entrou em contato com ele."
102010-65 = "Invertida para o domínio do Terror, ela se tornou o Deus da Morte, \"Anubis\", que guia todos os seres vivos para o outro mundo――"
102010-66 = "Seguindo a sua própria essência――ela trará o fim a este mundo."
102010-67 = "O \"Chroma\" compreendia isso.#nPor isso, assim que chegou a este lugar, a primeira coisa que fez foi assegurar o \"Sublime\" dela."
102010-76 = "Eu interpretava o \"Chroma\" como um conceito inexplicável, desprovido de vontade, desejo ou objetivo――#nMas..."
102010-77 = "Sinto uma clara \"vontade\" e \"planejamento\" em suas ações."
102010-78 = "Quem diria que ele agiria por conta própria..."
102010-79 = "O \"Chroma\" está tentando absorver todos os conceitos de Mistério, Terror e Sublime que existem em Kivotos e torná-los seus――"
102010-81 = "E... as 6 torres que surgiram em Kivotos――#nPodem ser consideradas um tipo de \"Torre Sanctum\". Mas em sua forma invertida."
102010-82 = "Aquilo é uma tecnologia construída pelos \"Deuses Sem Nome\"――um Mistério primordial que existia em tempos remotos, antes mesmo de haverem registros neste mundo."
102010-83 = "Elas irão propagar a luz do \"Chroma\" por todo o mundo, invertendo todos os Mistérios de Kivotos em Terror."
102010-84 = "――Assim como aconteceu com o Deus Lobo."
102010-85 = "[s] \"Sendo assim, nós só precisamos impedi-lo.\""
102010-86 = "……。"
102010-87 = "O motivo pelo qual o \"Chroma\" usou o \"Deus que traz o fim\" para atacar a Gematria――#nProvavelmente foi para roubar os \"Ritos\" e os \"Resultados de Pesquisa\" que possuíamos."
102010-88 = "O Caminho de Decagrammaton, o rito de Mimesis, a \"Comunhão dos Santos\", a Library of Lore... O poder dos Deuses Sem Nome e as habilidades dos Guardiões Sem Nome――"
102010-89 = "O \"Guia do Chroma\", que botou as mãos em tudo isso, é..."
102010-90 = "[s] \"'Guia do Chroma'?\""
102010-91 = "Sim. Aquele que fala pela vontade do \"Chroma\" e o executor que leva o plano adiante――"
102010-93 = "――Seu nome é \"Phrenapates\".#nÉ com ele que você terá que lidar daqui para frente."
102010-108 = "No momento, há uma falha de comunicação ocorrendo em toda Kivotos!"
102010-109 = "É uma situação onde seria normal que cada academia emitisse ordens de evacuação, mas... na situação atual, onde a verdadeira natureza das torres ainda não foi esclarecida――"
102010-110 = "Ah! Acabou de chegar uma notícia de última hora!#nO Conselho Estudantil Geral fará um pronunciamento de emergência――"
102010-111 = "Hã? Foi alarme falso?"
102010-112 = "Então quem diabos..."
102010-114 = "Aaah! Outra notícia urgente!!#nSoldados não identificados surgiram em vários pontos de D.U.."
102010-115 = "O-O que significa isso!?"
102010-116 = "Dizem que estão atacando a cidade indiscriminadamente――"
102010-117 = "O-O que esse ataque significa!?#nO que diabos está acontecendo em D.U.!?"
102010-118 = "Ah, s-sim...! Acabou de chegar o pronunciamento de emergência do Conselho Estudantil Geral――#nNão, correção. É um pronunciamento da \"Schale\"!"
102010-119 = "Chegou um pronunciamento de emergência da Schale!!"
102010-120 = "V-Vou ler ele agora...!"
102010-122 = "「...Peço a todas as alunas de todos os distritos autônomos que não se aproximem das torres negras e que evacuem imediatamente.」"
102010-124 = "[ns] \"Daqui pra frente, deixem com os adultos.\""
102010-126 = "[ns] Pego o Cartão de Adulto."
102010-128 = "……Vou lhe dar um conselho."
102010-132 = "Se abusar do poder desse cartão――#nVocê terá o mesmo fim que nós tivemos, Sensei."
102010-133 = "Kukuku..."