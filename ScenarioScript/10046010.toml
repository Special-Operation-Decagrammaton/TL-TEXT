[translation]
10046010-1 = "Episódio 1; Vamos tirar férias!"
10046010-5 = "NÃO!!!!!!!!!!!"
10046010-6 = "De jeito nenhum!!!!"
10046010-9 = "O que é isso! Não pode ser! Eu não vou fazer isso de jeito nenhum, tá ouvindo!?"
10046010-10 = "Não se trata de ser possível ou não, Mika. Isso não é algo que você decide."
10046010-11 = "Além disso... como já mencionei repetidamente, você também é um membro do Chá das Cinco."
10046010-12 = "Para começo de conversa, já está no terceiro ano e ainda faz birra como uma criança...#nPor favor, cresça um pouco."
10046010-13 = "Não quero saber, não quero saber!#nNagi-chan, se quer agir como adulta, então cumpra suas promessas!"
10046010-14 = "O que é mais importante, o trabalho ou eu!?#nEu me esforcei tanto para preparar tudo!!"
10046010-16 = "Sua boba! Idiota! Nagi-chan!!"
10046010-24 = "Francamente... só porque coincidiu com as férias de verão..."
10046010-25 = "Entendido.#nNesse caso, Mika, você pode tirar uma folga sozinha—"
10046010-29 = "Não pode!!"
10046010-33 = "……Sim?"
10046010-34 = "Não pode! Não faz sentido eu ir sozinha!!"
10046010-35 = "Vamos juntas? Hein?"
10046010-36 = "Mika..."
10046010-41 = "Ah..."
10046010-42 = "Não fique só olhando, Seia-san, diga alguma coisa também."
10046010-43 = "Ora?"
10046010-44 = "Está querendo me envolver só porque não consegue lidar com isso sozinha?"
10046010-45 = "É verdade..."
10046010-49 = "Embora você raramente me dê qualquer autoridade, se pretende me usar apenas quando é conveniente... então não tenho nada a dizer."
10046010-50 = "Ou, se este for o primeiro passo para a divisão de tarefas, eu não me oponho."
10046010-52 = "Até você, Seia-san...!!"
10046010-53 = "……"
10046010-54 = "Vocês duas... não sabem o quanto eu tenho me segurado todos os dias!#nVocês não sabem disso?!"
10046010-55 = "E ainda assim, você diz essas coisas...?"
10046010-56 = "É justamente por isso, suponho."
10046010-57 = "Nagisa, você caiu na própria armadilha.#nNo momento em que extraí essas palavras de você, este assunto está encerrado."
10046010-58 = "Fu, fu, fu...!"
10046010-60 = "Grrr...!"
10046010-67 = "Ah, chega! Entendido! Eu vou! É isso que você quer que eu faça, não é!?"
10046010-68 = "Depois não diga que eu não avisei o que pode acontecer!!"
10046010-75 = "Conseguiu, não foi? Agora tudo sairá como planejado."
10046010-76 = "Sinceramente, estou impressionada.#nVocê é a única que consegue dobrar a teimosia da Nagisa."
10046010-77 = "……Está satisfeita com isso?"
10046010-83 = "……Sim, obrigada, Seia-chan!"
10046010-84 = "Sabe, é que eu não tenho muitas oportunidades como esta."
10046010-85 = "No fundo... eu queria que todas fôssemos juntas."
10046010-86 = "Uma praia particular! Estou ansiosa☆"
10046010-87 = "……Não há mais ninguém por perto. Não precisa de formalidades."
10046010-88 = "Tudo isso é pela Nagisa, não é?"
10046010-89 = "Eu entendo que você não estava fazendo birra sem motivo."
10046010-94 = "……"
10046010-95 = "……Isso é segredo da Nagi-chan, viu."
10046010-96 = "Claro. Diferente de certas pessoas, eu sei guardar segredo."
10046010-97 = "Seia-chan...?"
10046010-98 = "Acho que foi o momento perfeito.#nSe a deixássemos sozinha, aquela criança teria desistido das férias para continuar trabalhando."
10046010-99 = "Carregando tudo nas costas o tempo todo... eu gostaria que ela pensasse um pouco em nós, que só podemos ficar ao lado preocupadas."
10046010-100 = "Para começar, o Tea Party não é algo para ser gerido por uma única pessoa. #nConsiderando a carga de trabalho, também não é algo que seja possível fazer."
10046010-101 = "Por isso, mesmo que tenha sido um pouco forçado, eu deveria ter feito com que ela descansasse."
10046010-102 = "……Embora a resolução dos problemas fundamentais seja outra história."
10046010-103 = "De qualquer forma. Foi uma tentativa na qual falhei inúmeras vezes, mas…… você a conduziu brilhantemente. #nSou grata."
10046010-108 = "Uau~ Não esperava receber um agradecimento da Seia-chan. Que raro."
10046010-109 = "Mas, não é mentira que eu quero descansar. #nAgora, sabe como é, só podemos nos dar ao luxo de fazer isso em momentos como este."
10046010-110 = "Por isso, mesmo que me elogiem tanto, talvez eu fique sem graça."
10046010-111 = "Fique tranquila. #nNão me lembro de ter dito que era mentira que você \"fez birra porque queria brincar\"."
10046010-112 = "Conheço essa garota travessa há muitos anos. #nSei pelo menos disso."
10046010-113 = "Por que você sempre tem que dizer uma palavra a mais? #nSua gênia em irritar as pessoas?"
10046010-114 = "Fufu, assim como você é travessa, essa é a minha natureza."
10046010-115 = "Além disso, o sentimento de querer brincar calmamente com nós três, sem pensar em nada, é o mesmo que o meu."
10046010-116 = "……Apenas."
10046010-120 = "Hum?"
10046010-121 = "Não……."
10046010-122 = "Eu também não sou imutável. Só fiquei um pouco preocupada."
10046010-123 = "Ei, o que é isso!"
10046010-124 = "Não precisa se preocupar, não é?"
10046010-129 = "Vai dar tudo certo☆"
10046010-145 = "――Foi isso que aconteceu."
10046010-146 = "Preciso da ajuda de vocês duas e do Sensei!"
10046010-147 = "Mesmo que todos estejam ocupados…… desculpem."
10046010-148 = "Por favor, não peça desculpas. #nAuxiliar o Tea Party também é uma função do comitê."
10046010-149 = "Além disso, nós também estávamos preocupadas com a Nagisa-sama. #nAgradeço pela consideração da Mika-sama."
10046010-150 = "……Desculpe o incômodo, Sensei. #nRepresentando o Comitê de Justiça, eu também gostaria de pedir o mesmo."
10046010-151 = "[s1] \"Fico feliz que tenha contado comigo.\"\n[s2] \"Acho muito bonito o seu sentimento de cuidar dos amigos.\""
10046010-154 = "Sensei……."
10046010-155 = "Eu imaginava que você diria isso, mas……."
10046010-156 = "……O Sensei também disse isso, e como desta vez a operação é só com a gente. #nQue tal relaxar um pouco mais?"
10046010-157 = "De fato…… as responsáveis por esta missão somos apenas eu e a Ichika."
10046010-158 = "No começo, pensei que fosse algum erro…… #nMas foi a Tsurugi quem escolheu a Ichika, não foi?"
10046010-159 = "Acho que foi porque houve um pedido para \"manter o poder de fogo no mínimo e evitar grandes movimentações\"."
10046010-161 = "Ah, fui eu quem pediu isso. #nSe tiver muita gente, a Nagi-chan volta para o modo de trabalho de novo."
10046010-162 = "Sério, quando tem outras pessoas olhando, ela logo fica na defensiva."
10046010-163 = "Por isso, eu ia dizer que não precisava de escolta, mas……."
10046010-165 = "Mesmo sendo o mínimo, foi bom terem nos chamado. #nA segurança de vocês é a missão mais importante."
10046010-166 = "Mas, este é um resort privado que pertence ao Tea Party."
10046010-167 = "……Acho que não vai acontecer nada demais."
10046010-171 = "……Sim?"
10046010-172 = "A Seia-sama e a Nagisa-sama?"
10046010-174 = "Elas estão planejadas para vir depois."
10046010-175 = "Nós somos, por assim dizer, a \"equipe de vanguarda\"?"
10046010-176 = "……Eh? Não. É todo mundo."
10046010-177 = "4 pessoas contando com o Sensei. #nQuando a Seia-chan e a Nagi-chan chegarem, seremos 6!"
10046010-178 = "Eu vim primeiro porque――"
10046010-182 = "Para inspecionar esta praia! #nEu sou a responsável por estas férias☆"
10046010-183 = "[s3] \"……A Mika?\"\n[s4] \"Responsável pelas férias?\""
10046010-186 = "Isso, surpreso? #nDesta vez, decidi assumir a responsabilidade pelo andamento."
10046010-187 = "Sabe, quando você fica responsável por organizar uma viagem, parece até \"trabalho\", né?"
10046010-188 = "Por isso, para fazer a Nagi-chan descansar, eu tive que fazer assim."
10046010-190 = "De fato, o "descanso" só é verdadeiro quando nos afastamos completamente do trabalho, não é?"
10046010-191 = "Então, quem ficará responsável pelas tarefas de hoje do Chá das Cinco...?"
10046010-192 = "A Seia-chan vai cuidar disso para mim. #nSe parecer que vai ficar sobrecarregada, eu gostaria que o Sensei a ajudasse."
10046010-193 = "[s5] \"Sim. Eu já ouvi falar sobre isso.\"\n[s6] \"Então era por esse motivo.\""
10046010-196 = "Você poderia ter deixado essas tarefas triviais conosco."
10046010-197 = "Isso não pode. #nEu pedi para vocês virem por minha causa, seria ruim deixar trabalho para vocês, não seria?"
10046010-198 = "Por isso, vocês duas também!"
10046010-199 = "Ficaria feliz se pensassem que vieram aqui para se divertir, e não para trabalhar."
10046010-200 = "Se acontecer qualquer coisa, não hesitem em me procurar!"
10046010-206 = "Mika-sama..."
10046010-207 = "Agradeço pela sua consideração."
10046010-208 = "Como membros do Comitê de Justiça, deveríamos estar minimamente preparados, mas... #nAceitarei sua gentileza e vou relaxar um pouco."
10046010-210 = "Sim! É isso que eu quero que façam!"
10046010-211 = "É difícil dizer abertamente que "viemos nos divertir", mas... #nGraças a essa missão, acabamos vindo para a praia, afinal."
10046010-212 = "Vou aproveitar o clima de férias como se deve!"
10046010-213 = "Isso mesmo, conto com vocês assim, hein☆"
10046010-214 = "Então, sendo assim... por onde vamos começar?"
10046010-216 = "Que tal uma inspeção na praia?"
10046010-217 = "Parece ser um lugar calmo, mas é sempre bom prevenir. #nVamos verificar se há alguma irregularidade nas instalações ou no terreno."
10046010-219 = "Incrível! #nVocê já tem tudo na ponta da língua, né?"
10046010-220 = "Isso faz parte do meu trabalho."
10046010-221 = "A praia é grande, então vamos nos dividir. #nEu vou verificar a partir da ponta da costa."
10046010-222 = "Já vou indo!"
10046010-226 = "Então eu vou pelo lado oposto!"
10046010-231 = "...Sensei. #nPor acaso você percebeu?"
10046010-232 = "[s7] \"Ah, sobre a Ichika?\"\n[s8] \"Que ela parece um pouco tensa?\""
10046010-235 = "Sim, você é muito observador. #nA Ichika é... um dos membros mais competentes do Comitê de Justiça."
10046010-236 = "Por isso, ela faz muitos trabalhos externos... e esta é a primeira vez que ela auxilia o Chá das Cinco."
10046010-237 = "Ela finge que está tudo bem, mas parece estar mais tensa do que o normal."
10046010-238 = "Ela acha que ninguém percebeu, mas..."
10046010-239 = "Por favor, cuide bem da Ichika também."
10046010-240 = "[s] \"Sim, pode deixar.\""
10046010-241 = "Fufu, obrigada. #nBem, eu vou fazer a inspeção das instalações. #nSensei, por favor, aproveite para descansar."
10046010-245 = "Ah, quer que eu vá junto?"
10046010-246 = "...Não, obrigada."
10046010-250 = "As instalações não são muitas. Não deve levar muito tempo. #nEntão, por aqui..."
10046010-257 = "Aqui é o chuveiro."
10046010-258 = "Sobre a inspeção... como a equipe de manutenção cuida disso todo mês, #nbasta verificar se a água está saindo normalmente."
10046010-259 = "Além disso, não deveria haver nenhum suspeito em um lugar como este..."
10046010-266 = "Eh...?"
10046010-281 = "...??"
10046010-282 = "[s9] \"...Tem alguém ali?\"\n[s10] \"Aquela silhueta é...!\""
10046010-287 = "...???????????"
