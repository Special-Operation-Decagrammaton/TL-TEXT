[translation]
10046010-1 = "第1話;バカンスに行こう！"
10046010-5 = "イヤ！！！！！！！"
10046010-6 = "絶対イヤ！！！！"
10046010-9 = "なにそれ！あり得ない！絶対やんないからね！？"
10046010-10 = "あり得ないも何も、ミカさんが決めることではありません。"
10046010-11 = "それと……再三お伝えしておりますが、あなたもティーパーティーの一員なのです。"
10046010-12 = "そもそも3年生にもなって、子供じみた駄々をこねるなんて……。#n少しは成長してください。"
10046010-13 = "知らない知らない！#nナギちゃんだって、大人ぶるならちゃんと約束守ってよ！"
10046010-14 = "仕事と私どっちが大事なの！？#nすっごい頑張って準備したのに！！"
10046010-16 = "バカ！アホ！ナギちゃん！！"
10046010-24 = "まったく……夏のバカンスに重なった程度で……。"
10046010-25 = "分かりました。#nそれではミカさんだけでもお休みを――"
10046010-29 = "ダメ！！"
10046010-33 = "……はい？"
10046010-34 = "ダメだよ！私一人で行っても意味ないの！！"
10046010-35 = "一緒に行こ？ね？"
10046010-36 = "ミカさん……。"
10046010-41 = "はあ……。"
10046010-42 = "見てないで、セイアさんも何か言ってください。"
10046010-43 = "ほう？"
10046010-44 = "一人では手に負えないからと、私まで巻き込むつもりかい？"
10046010-45 = "そうだな……。"
10046010-49 = "普段は大した権限も与えていないというのに、都合のいい時だけ利用するつもりなら……私から告げる言の葉はないよ。"
10046010-50 = "あるいはこれが業務分担の第一歩であるならば[ruby=やぶさ]、吝か[/ruby]ではないがね。"
10046010-52 = "セイアさんまで……！！"
10046010-53 = "……。"
10046010-54 = "お二人は……私が毎日毎日[ruby=・]我[/ruby][ruby=・]慢[/ruby][ruby=・]し[/ruby][ruby=・]て[/ruby][ruby=・]い[/ruby][ruby=・]る[/ruby]ことくらい、#nご存知ではありませんか！！"
10046010-55 = "だというのに、そんなことを仰るのですね……？"
10046010-56 = "なればこそ、だろうさ。"
10046010-57 = "ナギサ、語るに落ちたね。#n君からその言葉を引き出した時点で、この話は決着だ。"
10046010-58 = "ふっ、ふっ、ふっ……！"
10046010-60 = "くぅぅ……！"
10046010-67 = "ああもう！分かりました！行きますよ！行けば良いのでしょう！？"
10046010-68 = "どうなっても知りませんからねっ！！"
10046010-75 = "やったじゃないか。これで予定通りだ。"
10046010-76 = "正直感心したよ。#nナギサの意固地を曲げられるのは、君くらいだろうね。"
10046010-77 = "……これで満足かい？"
10046010-83 = "……うん、ありがとうセイアちゃん！"
10046010-84 = "私ってほら。あんまりこういう機会がないからさ。"
10046010-85 = "やっぱり……みんなで一緒に行きたかったんだ。"
10046010-86 = "プライベートビーチ！楽しみだね☆"
10046010-87 = "……他に目があるわけでもない。建前など不要だよ。"
10046010-88 = "全て、ナギサの為なのだろう？"
10046010-89 = "理由もなく駄々をこねていたわけではないことくらい、理解しているとも。"
10046010-94 = "……。"
10046010-95 = "……ナギちゃんには内緒だからね。"
10046010-96 = "もちろん。私の口は誰かさんと違って堅いからね。"
10046010-97 = "セイアちゃん……？"
10046010-98 = "ちょうど良いタイミングだったとは思っているんだ。#nあのまま放っておけば、あの子は休みを返上してでも仕事を進めていただろう。"
10046010-99 = "いつまでも一人で抱え込んで……横で心配しかさせてもらえない側のことも、少しは考えて欲しいね。"
10046010-100 = "そも、ティーパーティーは一人で管理するものではない。#n業務量からして、できるものでもないのだがね。"
10046010-101 = "だから、多少強引でも休ませてあげるべきだったのだよ。"
10046010-102 = "……根本的な問題の解決は、また別の話ではあるが。"
10046010-103 = "とにかく。私は幾度も失敗してきた試みだったが……君は見事に導いてくれた。#n感謝するよ。"
10046010-108 = "へえ～セイアちゃんにお礼を言われるとは思わなかったな。珍しいねっ。"
10046010-109 = "でも、休みたいっていうのもウソじゃないよ。#n今はほら、こういう時しか贅沢できないし。"
10046010-110 = "だから、あんまり持ち上げられても照れちゃうかも。"
10046010-111 = "安心してくれ。#n「遊びたいから駄々をこねた」ことを嘘だと言った覚えはないよ。"
10046010-112 = "[ruby=・]お[/ruby][ruby=・]て[/ruby][ruby=・]ん[/ruby][ruby=・]ば[/ruby][ruby=・]娘[/ruby]とは長年の付き合いだ。#nそれくらい分かっているとも。"
10046010-113 = "どうしていつも一言多いのかな？#n[ruby=・]人[/ruby][ruby=・]を[/ruby][ruby=・]怒[/ruby][ruby=・]ら[/ruby][ruby=・]せ[/ruby][ruby=・]る[/ruby][ruby=・]天[/ruby][ruby=・]才[/ruby]さん？"
10046010-114 = "ふふ、君がおてんばであるように、これが私の[ruby=さが]性[/ruby]だからね。"
10046010-115 = "それに、久々に三人で何も考えず、ゆっくり遊びたい気持ちは私も同じさ。"
10046010-116 = "……ただ。"
10046010-120 = "うん？"
10046010-121 = "いや……。"
10046010-122 = "私も不変ではないからね。少し、心配になっただけだ。"
10046010-123 = "えー、何それ！"
10046010-124 = "気にしなくても大丈夫じゃない？"
10046010-129 = "なんとかなるなる☆"
10046010-145 = "――ってことがあってね。"
10046010-146 = "二人と先生の力が必要なの！"
10046010-147 = "みんなも忙しいのに……ごめんね。"
10046010-148 = "謝らないでください。#nティーパーティーの補佐も、委員会の役割ですから。"
10046010-149 = "それに、ナギサ様に関しては私たちも心配していましたので。#nミカ様のご配慮に感謝しています。"
10046010-150 = "……お手数ですが、先生。#n正義実現委員会を代表して、私からもお願いいたします。"
10046010-151 = "[s1] \"頼ってくれて私も嬉しいよ。\"\n[s2] \"友達を想う気持ち、すっごく良いと思うよ。\""
10046010-154 = "先生……。"
10046010-155 = "そう言ってくださるとは思っていましたが……。"
10046010-156 = "……先生もこう言ってくれてますし、今回は私たちだけでの作戦っすから。#nもう少し肩の力を抜くのはどうっすか？"
10046010-157 = "たしかに……この任務の担当は、イチカと私の二人だけ。"
10046010-158 = "最初は、何かの手違いかと思いましたが……。#nイチカを選んだのはツルギでしたね。"
10046010-159 = "「兵力は最小限に、大掛かりな移動は避けてほしい」って#n要請があったからだと思うっすよ。"
10046010-161 = "あ、それお願いしたの私なんだ。#n人数が多いとナギちゃんまた仕事モードに戻っちゃうからね。"
10046010-162 = "ほんと、他人の目がある場所だとすぐ身構えちゃってさ。"
10046010-163 = "だから、護衛なしでもいいんじゃない？って言おうとしたんだけど……。"
10046010-165 = "そこは最低限とはいえ、声をかけてくださってよかったです。#n皆さんの警護は最重要任務ですから。"
10046010-166 = "でも、ここはティーパーティー所有のプライベートビーチ。"
10046010-167 = "……たいしたことは起きないと思うっすよ。"
10046010-171 = "……はい？"
10046010-172 = "セイア様とナギサ様っすか？"
10046010-174 = "二人なら、後からくる予定だよ。"
10046010-175 = "私たちは、いわゆる「先遣隊」って感じかな？"
10046010-176 = "……え？ううん。これで全員だよ。"
10046010-177 = "先生をいれて4人。#nセイアちゃんとナギちゃんが来たら6人！"
10046010-178 = "私が先に来たのはね――"
10046010-182 = "このビーチを点検するため！#n私がこのバカンスの責任者なんだ☆"
10046010-183 = "[s3] \"……ミカが？\"\n[s4] \"バカンスの責任者？\""
10046010-186 = "そっ、驚いた？#n今回は、私が責任をもって進行することになったんだ。"
10046010-187 = "旅行もさ、幹事をすることになったら「仕事」みたいでしょ？"
10046010-188 = "だからナギちゃんを休ませるためには、こうしなきゃいけなかったの。"
10046010-190 = "たしかに「休息」とは、仕事から完全に離れてこそ成り立つものですからね。"
10046010-191 = "では、ティーパーティーの本日の業務はどなたが……？"
10046010-192 = "そっちはセイアちゃんがやってくれる予定だよ。#nもし溢れそうだったら、先生が手伝ってあげて欲しいんだ。"
10046010-193 = "[s5] \"うん。その話はだいたい聞いてるよ。\"\n[s6] \"こういう理由だったんだね。\""
10046010-196 = "そのような雑務は、私たちに任せてくださればよかったのに。"
10046010-197 = "それはダメ。#n私の都合で来てもらってるのに、仕事まで任せちゃ悪いじゃん？"
10046010-198 = "だから二人も！"
10046010-199 = "今回は仕事じゃなくて、遊びに来たって思ってくれたら嬉しいな。"
10046010-200 = "何かあったら遠慮なく相談してね！"
10046010-206 = "ミカ様……。"
10046010-207 = "お気遣い、感謝します。"
10046010-208 = "正義実現委員会として、最低限の備えはすべきですが……。#nお言葉に甘えて、少し、羽を伸ばすことにいたします。"
10046010-210 = "うん！そうしてほしいな！"
10046010-211 = "表立って「遊びに来た」とまでは難しいっすけど……#nこの任務のおかげで、海に来れたわけっすからね。"
10046010-212 = "適当にお休み気分で楽しませてもらうっす！"
10046010-213 = "うんうん、そんな感じでよろしくね☆"
10046010-214 = "じゃあそういうことで……何から始めよっか。"
10046010-216 = "ビーチの調査はいかがですか？"
10046010-217 = "穏やかそうに見えますが、何事も備えあれば患いなしです。#n施設や地形に異常がないか、調べてみましょう。"
10046010-219 = "すごーい！#nぱっと出てくるんだね？"
10046010-220 = "これが仕事っすからね。"
10046010-221 = "ビーチも広いですし、手分けしてやるっすよ。#n私は海岸の端から見てくるっす。"
10046010-222 = "先行くっすよ～！"
10046010-226 = "じゃあ、私は反対側からだね～！"
10046010-231 = "……先生。#nもしかしてお気づきですか？"
10046010-232 = "[s7] \"あ、イチカのこと？\"\n[s8] \"少し緊張してる、みたいな？\""
10046010-235 = "ええ、よく見ていらっしゃいますね。#nイチカは……正義実現委員会でも有能なメンバーの一人です。"
10046010-236 = "そのため、外回りの仕事が多く……ティーパーティーの補助に回ったのは今回が初めてです。"
10046010-237 = "平気なふりをしていますが、普段より肩に力が入っているように見えます。"
10046010-238 = "本人はバレてないつもりのようですが。"
10046010-239 = "イチカのことも、どうかよろしくお願いいたします。"
10046010-240 = "[s] \"うん、任せて。\""
10046010-241 = "ふふっ、ありがとうございます。#nでは、私は施設の点検をしてきますので。#n先生は一休みなさっていてください。"
10046010-245 = "え、一緒に？"
10046010-246 = "……いえ、ありがとうございます。"
10046010-250 = "施設もそう多くはありません。さほど時間はかからないでしょう。#nではこちらへ……。"
10046010-257 = "ここはシャワー室ですね。"
10046010-258 = "点検……といっても、毎月管理の方が手入れしてくださっているので、#n水がちゃんと出るかどうかだけ確認できればと。"
10046010-259 = "それに、こんなにところに不審者がいるはずもな――"
10046010-266 = "え……？"
10046010-281 = "……？？"
10046010-282 = "[s9] \"……あそこに誰かいるような？\"\n[s10] \"あのシルエットは……！\""
10046010-287 = "……？？？？？？？？？"
