[translation]
90002210-1 = "Episódio 21; Luta"
90002210-2 = "Seu falso deus de araque...!!!"
90002210-7 = "Foi você quem matou!"
90002210-8 = "Você que matou!"
90002210-9 = "Não ouse se autoproclamar um deus com essa sua insignificância!!"
90002210-13 = "Eu nunca pedi por nenhuma poda!!"
90002210-14 = "Eu jamais aceitarei essa contradição que você quer cortar fora!!!"
90002210-30 = "Eu serei feliz."
90002210-31 = "Não importa o que aconteça! Eu serei!"
90002210-32 = "Mesmo que eu tenha que vagar em meio a contradições, mesmo que haja qualquer obstáculo!"
90002210-33 = "Tola."
90002210-34 = "O preço do pecado é a morte. Esse desfecho já está decidido."
90002210-35 = "Se esse é o desfecho que você planejou para mim—"
90002210-40 = "[log]Se nós escolhermos nosso próprio caminho e acabarmos nos destruindo por causa disso...[/log]"
90002210-43 = "[log]É muito melhor do que deixar que alguém escolha por nós e nos proteja.[/log]"
90002210-46 = "Não importa o que aconteça, eu continuarei buscando o meu próprio desfecho!!"
90002210-47 = "¡?"
90002210-48 = "Por que... você consegue se mover? Impossível."
90002210-49 = "Ugh, ahhh...!"
90002210-56 = "Sen... sei...?"
90002210-57 = "[ns1] \"...Devemos lamentar por aqueles que se foram.\"\n[ns2] \"É triste, mas esse é o nosso limite.\""
90002210-60 = "Isso é perigoso... por favor, afaste-se..."
90002210-61 = "[s] \"Não pode abrir uma exceção só desta vez?\""
90002210-62 = "...Hah, você não é o tipo de pessoa que escuta, não é?"
90002210-63 = "Por que insiste em testar seus próprios limites?"
90002210-64 = "Sensei...!"
90002210-65 = "A luta é dolorosa. E, eventualmente, ela leva ao pecado."
90002210-66 = "[s3] \"Eu sei. Mas não quero que tire isso de nós.\"\n[s4] \"Não tente apagar as nossas possibilidades.\""
90002210-69 = "...!"
90002210-70 = "[s5] \"Enquanto estivermos vivas, talvez não haja como escapar da dor.\"\n[s6] \"Mas eu não quero que ninguém carregue esse fardo por mim.\""
90002210-73 = "Mesmo que isso signifique se debater como um inseto e rastejar pelo chão?"
90002210-77 = "[log]Exatamente.[/log]"
90002210-80 = "[log]Ainda assim, eu escolho este caminho.[/log]"
90002210-83 = "[log]Mesmo que eu só consiga cair, me debater e rastejar pelo chão.[/log]"
90002210-86 = "[log]No final, nós sempre nos levantaremos.[/log]"
90002210-89 = "[ns] \"Não é, Alice?\""
90002210-90 = "..."
90002210-91 = "Sim. É isso mesmo, Sensei."
90002210-92 = "Kei, você se lembra? #nAlice disse que um herói é uma \"profissão que avança junto com todos\"."
90002210-93 = "Claro que me lembro."
90002210-95 = "Ao fazer isso, o herói—"
90002210-96 = "Pode chegar a lugares que não alcançaria sozinho, se estiver junto com todos."
90002210-102 = "...Que falta de respeito."
