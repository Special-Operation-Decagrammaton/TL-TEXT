[translation]
103160-1 = "第16話;逆襲"
103160-2 = "はやく……早く戻って来て。"
103160-3 = "急いでください！"
103160-4 = "……。"
103160-8 = "……。"
103160-9 = "みんな、はやく……。"
103160-10 = "……。"
103160-12 = "「自爆シーケンス」の構成、完了。あとは実行ボタンを押すだけ。"
103160-13 = "シミュレーション結果も問題ありません。#nこれであれば、「アトラ・ハシースの箱舟」は確実に破壊できます。"
103160-14 = "すっごい爆発が起きるんじゃない？#n箱舟の破片が、キヴォトスのあちこちに降ってきちゃうかも。"
103160-16 = "……こっちの準備は完了してるよ。#n脱出の用意ができたら教えて。"
103160-17 = "ちょっと待ってちょうだい！！"
103160-18 = "……リオ？"
103160-19 = "何かがおかしいわ――今、私たちは箱舟を掌握しているはずなのに……"
103160-20 = "……ヒマリ！#n今すぐ「ウトナピシュティム」の中枢システムを見てちょうだい。 "
103160-21 = "……中枢システム、ですか？"
103160-25 = "……。"
103160-26 = "……こ、これは一体？"
103160-27 = "……[ruby=・   ・   ・   ・   ・]ハッキング[/ruby]されたのよ。"
103160-31 = "こんな数値では……一体、誰が……いつの間に……"
103160-32 = "「ウトナピシュティムの本船」が――ハッキングされているわ！！"
103160-34 = "こ、れは……どういう……！？"
103160-35 = "な、何かがおかしいです……！#nどうして今「自爆シーケンス」が起動するんですか……！？"
103160-36 = "な、なんで……？もうボタン押したの？#nまだ脱出準備、終わってないんじゃないの！？"
103160-37 = "いや、これは……！ "
103160-39 = "「自爆シーケンス」を実行します。"
103160-53 = "――――！？！？"
103160-55 = "え……？「自爆シーケンス」が起動？"
103160-56 = "はい……？今なんと……？"
103160-57 = "これは……一体？"
103160-58 = "みんな、伏せて！！ "
103160-68 = "……。"
103160-69 = "いったい、どうして……。"
103160-70 = "何が起きてるの……？"
103160-71 = "これは……船の、自爆……？#nな、何故……？"
103160-75 = "一体、何が……どうなってるの……。"
103160-77 = "げほっ、げほっ……みなさん、ご無事ですか……？ "
103160-78 = "ちょっと、何事！？"
103160-79 = "ぐっ……！！"
103160-80 = "幸い、爆発はそれほど大きくなかったけど……"
103160-81 = "この状態……大丈夫なのよ、ね……？"
103160-84 = "ヒマリ部長。現状の説明をお願いしてもいいかしら？"
103160-85 = "……やられました。"
103160-86 = "えっ、やられたって……何によ？"
103160-87 = "……私たちが、「アトラ・ハシースの箱舟」の占領を進めている間、敵は……"
103160-88 = "――バックドアから「ウトナピシュティム」の掌握を進めていたのです。"
103160-89 = "……なっ！？"
103160-92 = "……現在、「ウトナピシュティムの本船」の所有権は、敵に渡っています。"
103160-93 = "い、いつの間に……！というか、それを実行するには、内部からの物理的な接触が必要でしょ！？"
103160-94 = "内部に誰も入れた覚えは――"
103160-105 = "ま……まさか、あの時……"
103160-106 = "箱舟の自爆どころか……「アトラ・ハシース箱舟」の多次元解釈を、「ウトナピシュティムの本船」が助けた形になりました。"
103160-107 = "このままでは、また「虚妄のサンクトゥム」が……"
103160-113 = "……これは。"
103160-114 = "そ、空が……！？ "
103160-115 = "また……虚妄のサンクトゥムが……！？"
103160-127 = "な、何……！？"
103160-128 = "ま、また空が……"
103160-131 = "……。"
103160-133 = "……。"
103160-134 = "……非常事態を確認。 "
103160-141 = "……。"
103160-142 = "先生……"
103160-144 = "そ、空が……！せ、先輩どうしましょ！？"
103160-145 = "ユウカちゃん……先生……"
103160-147 = "空が……"
103160-148 = "せ、先生に何かあったんじゃ……"
103160-149 = "これって……"
103160-153 = "……。"
103160-160 = "せ、セイアさん、ミカさん！"
103160-161 = "遅かったね、ナギちゃん。#nセイアちゃんは、さっきどこかに行っちゃった。　"
103160-162 = "……ええっと？　"
103160-163 = "なんだか不吉な「気配」を感じるからそれに備えたいって言ってたよ？"
103160-164 = "――「自分が居ない間、何か起きた時は後を頼む」ってさ。"
103160-165 = "そうですか……では、私たちもすぐに取り掛かりましょう。 "
103160-166 = "うん。了解☆"
103160-167 = "先生が帰ってきた時、うまく対処できてなかったら、きっとガッカリしちゃうよね！"
103160-168 = "――だから、先生の心配は後回し。"
103160-170 = "そ、空が――！？"
103160-171 = "ヒヨリ、あれは言わなくていいからね。"
103160-172 = "な、何のことですかミサキさん……そんなに私は「もう人生終わりだ」とか、「この世は苦痛だらけです」とか、ネガティブ発言ばかりの印象なんですか……？うぅ……いえ、事実ではありますが……！"
103160-174 = "……行くぞ。"
103160-175 = "うん――どんなことがあっても、努力を止めるべきじゃない、からね。"
103160-177 = "はい……い、行きましょう！ "
103160-178 = "……うん。私たちにできることをやろう。"
103160-180 = "今の「ウトナピシュティム」の制御権は、相手に渡っている状態……。"
103160-181 = "現在ハッキング位置を追跡中です……"
103160-182 = "……確認完了。「アトラ・ハシースの箱舟」第4エリアの中央部です。 "
103160-183 = "……え？これがその場所の名前？"
103160-184 = "多次元解釈エンジン管制室、「ナラム・シンの玉座」――"
103160-185 = "ここから「ウトナピシュティム」をハッキングしてる……止めないと！！"
103160-187 = "みなさん、大丈夫ですか？ "
103160-188 = "うん……大丈夫。特に怪我はないけど……"
103160-189 = "これって要は、そういうことなのよね……？"
103160-190 = "……。 "
103160-191 = "……あの「シロコ」が、何度も私たちを邪魔していたのは――"
103160-192 = "……時間稼ぎがしたかっただけ、ということでしょうか。"
103160-193 = "そ、そんな……じゃあ、私たちは今まで……"
103160-195 = "作戦は失敗……。今までの努力は全部、水の泡――"
103160-196 = "ううん。まだだよ。"
103160-197 = "し、シロコ先輩……？"
103160-199 = "[ns] \"まだ諦めるには早いよ。\""
103160-200 = "せ、先生まで……シロコ先輩とご一緒なのですか？#n今はどちらに……！？ "
103160-209 = "ん。第4エリア中央の「ウトナピシュティム」をハッキングしてる場所に先生と向かってるよ。"
103160-211 = "……えぇっ！？"
103160-212 = "[s] \"私とシロコがハッキングを止めてみる。後のことは、お願い。\""
103160-213 = "……！！"
103160-214 = "なっ、えっ！？"
103160-215 = "……！！"
103160-216 = "……先生。"
103160-224 = "管制室が見えてきた。"
103160-225 = "突入したら、敵の制圧に回るね。 "
103160-226 = "[s] \"……よし、行こう！\""
103160-242 = "[ns] （ここは……）"
103160-244 = "敵、発見。"
103160-247 = "私を拉致した、あいつ……！"
103160-250 = "止まれ――！！"
103160-251 = "少しでも動いたら……撃つ！！"
103160-253 = "下手な抵抗はやめた方がいい。"
103160-254 = "ここには……「シャーレの先生」がいる。#nだからもう、全部終わり。 "
103160-255 = "大人しく降参して、すぐに……"
103160-257 = "\"…………。\""
103160-258 = "う、動くな……！手を上げろ！！"
103160-260 = "さもないと……撃つ。"
103160-261 = "……と、止まれ！"
103160-275 = "\"……我々は望む、ジェリコの[ruby=なげ]嘆[/ruby]きを。\"#n\"……我々は覚えている、七つの[ruby=こそく]古則[/ruby]を。\""
103160-280 = "くっ――――――！？"
103160-292 = "銃弾が……全部、外れた……？"
103160-293 = "この距離で、何故……？"
103160-296 = "[ns1] （あれは……）\n[ns2] （聞き間違いでなければ――）"
103160-297 = "せ、先生……？"
103160-298 = "せ、先生……？"
103160-299 = "先生……ダメ、何か……何かが、おかしい。"
103160-300 = "[s] \"……シロコ、下がった方がいい。\""
103160-301 = "え……？"
103160-303 = "[USERNAME]先生の生体認証、完了。"
103160-304 = "[s3] \"私の……名前？\"\n[s4] \"私を、呼んだ……？\""
103160-308 = "この「シッテムの箱」に常駐しているシステム管理者であり、メインOS――"
103160-315 = "――A.R.O.N.A、命令待機中。"
103160-316 = "[s5] \"……………………\"\n[s6] \"……………ア……ロナ？\""
103160-320 = "「アトラ・ハシースの箱舟」、復旧システムを起動。 "
103160-321 = "「シッテムの箱」の権限により、破壊された「アトラ・ハシースの箱舟」を多次元の同一存在と交代・修復します。 "
103160-322 = "約30分後、100%修復を想定。"
103160-323 = "箱舟に侵入した「ウトナピシュティムの本船」は800秒後、最終自爆シーケンスに移行。"
103160-325 = "……だから言ったでしょう。 "
103160-330 = "定められた運命を変えることはできない、と。"
103160-334 = "キヴォトスは予定通り、終焉を迎える。"
103160-337 = "私の――[USERNAME]先生。"
103160-339 = "Final.;To be Continued in Chapter 4"
