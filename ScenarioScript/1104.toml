[translation]
1104-1 = "給食部襲撃事件"
1104-2 = "今日の給食もまずいんだけど！っていうか目玉焼きって聞いてたのに、目玉焼きはどこ！？"
1104-3 = "これではないでしょうか、ゆで卵ですけれど。献立表にはたしかに「目玉焼き」と書かれていた気がしますが……。"
1104-4 = "うるさい！良いから食べなさい！ゆで卵だって美味しいでしょ！"
1104-5 = "そうですよ、食べないなら私にくれませんか？私、ゆで卵好きなので。"
1104-7 = "ゆで卵に罪はありませんが、これはまた別の問題ですね。"
1104-8 = "献立表には間違いなく目玉焼きと書いてありますのに、出てきたのはゆで卵。"
1104-9 = "食べ物に対する礼儀がなっていません。"
1104-10 = "さあ、給食部のところに行くとしましょう！"
1104-12 = "（給食部・調理室）"
1104-13 = "……分かってる、分かってるから。でも、目玉焼き4000枚を私一人で2時間以内に作るのは無理。ジュリも今日お休みだし……。"
1104-14 = "そもそも油も無いし、フライパンも1個しか無いし……。"
1104-15 = "はい、きっとそういうご事情だとは思っておりました。"
1104-17 = "仕方ありませんので、私たちが手伝わせていただきます。今からでも目玉焼きを作りましょう。"
1104-18 = "油も持参いたしました。"
1104-19 = "……え？"
1104-20 = "優しい美食研究会が、困っている給食部を助ける美しい光景……。"
1104-21 = "これぞ友情ですね☆"
1104-22 = "はあ、仕方ないなあもう。こういう展開になると思ってたけど。"
1104-23 = "じゃ、久しぶりに腕を振るっちゃおうかな。"
1104-24 = "え、ま、待って！？勝手に触ると……！"
1104-27 = "わー！この卵、全部食べてもいいの？"
1104-28 = "イズミ待った！まず作らないと！食べるのはその後！"
1104-29 = "大丈夫、卵かけごはん大好きだから！"
1104-30 = "ここからちょっとだけ貰ってー……"
1104-31 = "あ、あれ？"
1104-33 = "（ガシャーン！！）"
1104-34 = "うわああ！卵もったいない！！"
1104-35 = "ジュンコさん足元！そこに油が……！！"
1104-36 = "えっ？うわぁっ！？足元がツルツルして……っ！？"
1104-38 = "た、助けてっ！？"
1104-41 = "え、ええ？きゃ、キャッチ！"
1104-42 = "あれっ？止まりませんね？"
1104-45 = "ハルナさん、危ないです！避けてください！！"
1104-46 = "………っ！！！"
1104-49 = "（グシャッ！）"
1104-50 = "ああ、卵で全身ベタベタに……！"
1104-51 = "ちょっ、食器棚傾いてない！？避けて！なんか大きな袋が…！！"
1104-52 = "（バサバサッ！モクモクモク……）"
1104-54 = "（けほっ、けほっ！）"
1104-55 = "うわっ！何これ、卵に小麦粉？私たち下ごしらえ状態？"
1104-56 = "けほっ、けほっ！動かないでイズミ！ジタバタするとさらに絡まる！"
1104-57 = "このままですと美食研究会が丸ごと、大きなたこ焼きになってしまいますわね……。"
1104-58 = "たこ焼きの材料ですか……まあ、それはそれで……。"
1104-59 = "たこ焼きは嫌！たこ焼きそのものは好きだけど、なるのは嫌ー！"
1104-61 = "（ガシャーン！！）"
1104-62 = "（ガタゴトガシャン！ドサッ！）"
1104-63 = "（ドーーーーンッッ！）"
1104-66 = "………………。"
1104-68 = "給食部襲撃事件"
