[translation]
1104-1 = "Incidente de ataque ao departamento de merenda escolar"

1104-2 = "A merenda escolar de hoje também foi ruim! Quer dizer, ouvi falar de ovos fritos, mas onde posso encontrar ovos fritos? ?"

1104-3 = "Acho que é isso, mas é um ovo cozido. Acho que o cardápio dizia "ovo frito"..."

1104-4 = "barulhento! Coma porque é bom! Até os ovos cozidos são deliciosos!"

1104-5 = "Isso mesmo, se você não quiser comer, pode me dar? Porque gosto de ovos cozidos."

1104-7 = "Não há nada de errado com ovos cozidos, mas isso é outro problema."

1104-8 = "O cardápio definitivamente dizia ovos fritos, mas o que saiu foram ovos cozidos."

1104-9 = "Não tenho respeito pela comida."

1104-10 = "Agora vamos para a merenda escolar!"

1104-12 = "(Departamento de almoço/galera)"

1104-13 = "...Eu sei, porque eu sei. Mas é impossível para mim fazer 4.000 ovos fritos sozinho em duas horas. Julie também está de férias hoje..."

1104-14 = "Em primeiro lugar, não havia óleo e apenas uma frigideira..."

1104-15 = "Sim, pensei que fosse esse o caso."

1104-17 = "Não temos escolha a não ser ajudá-lo. Vamos começar a fazer ovos fritos agora."

1104-18 = "Eu também trouxe óleo."

1104-19 = "……foto?"

1104-20 = "Uma cena linda do tipo Grupo de Pesquisa Gourmet ajudando a merenda escolar necessitada..."

1104-21 = "Isso é amizade☆"

1104-22 = "Ha, acho que não posso evitar. Eu pensei que seria assim."

1104-23 = "Pois bem, acho que vou mostrar minhas habilidades pela primeira vez em algum tempo."

1104-24 = "Ah, espere! ? Se você tocar sem permissão...!"

1104-27 = "Uau! Posso comer todos esses ovos?"

1104-28 = "Izumi esperou! Eu tenho que fazer isso primeiro! Coma depois!"

1104-29 = "Tudo bem, adoro arroz cozido com ovo!"

1104-30 = "Tire um pouquinho daqui..."

1104-31 = "Ah, o que?"

1104-33 = "(Gashaan!!)"

1104-34 = "Uau! É um desperdício de ovos! !"

1104-35 = "Pés de Junko! Tem petróleo aí…! !"

1104-36 = "Huh? Uau! ? Meus pés são tão macios...! ?"

1104-38 = "Ei, me ajude! ?"

1104-41 = "Hã, sim? Pegue!"

1104-42 = "Huh? Isso não vai parar, vai?"

1104-45 = "Haruna-san, é perigoso! Evitar! !"

1104-46 = "......! ! !"

1104-49 = "(Gush!)"

1104-50 = "Ah, todo o meu corpo está pegajoso de ovos...!"

1104-51 = "Ei, o armário não está inclinado! ? Evitar! Tem um saco grande...! !"

1104-52 = "(É crocante! É crocante…)"

1104-54 = "(Keho, Keho!)"

1104-55 = "Uau! O que é isso, ovos e farinha? Estamos prontos?"

1104-56 = "Keho, Keho! Não se mova, Izumi! Quanto mais você treme, mais ele fica emaranhado!"

1104-57 = "Se as coisas continuarem assim, todo o Grupo de Pesquisa Gourmet se transformará em um takoyaki gigante..."

1104-58 = "É um ingrediente para takoyaki... bem, é isso..."

1104-59 = "Eu odeio takoyaki! Eu gosto do takoyaki em si, mas não gosto dele!"

1104-61 = "(Gashaan!!)"

1104-62 = "(Baque! Baque!)"

1104-63 = "(Doooooooo!)"

1104-66 = "………………."

1104-68 = "Incidente de ataque ao departamento de merenda escolar"

