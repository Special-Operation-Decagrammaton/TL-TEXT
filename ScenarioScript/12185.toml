[translation]
12185-2 = "Chegamos às coordenadas do alvo!"
12185-3 = "A Hoshino-senpai deve estar presa por aqui! Com certeza, em algum lugar nos arredores...!"
12185-4 = "……."
12185-5 = "Isto é..."
12185-6 = "...Uma escola?"
12185-7 = "Esses vestígios... provavelmente é uma escola, né?"
12185-8 = "Uma escola no meio do deserto... será que..."
12185-9 = "Sim. Este é o prédio principal da escola original de Abydos."
12185-10 = "!!"
12185-17 = "……."
12185-18 = "Você é...!!"
12185-20 = "Que bom que chegaram até aqui, Comitê de Contramedidas de Abydos."
12185-26 = "Muitos reforços inimigos...!"
12185-27 = "Esses números... provavelmente é todo o poder de fogo que o inimigo tem disponível..."
12185-28 = "A Kaiser PMC pretende travar uma guerra total aqui...!"
12185-30 = "As ruínas de Abydos, abandonadas após a desertificação... este lugar era, originalmente, o centro de Abydos."
12185-31 = "...Os restos da que já foi a maior e mais poderosa escola de Kivotos estão enterrados sob esta areia."
12185-32 = "A Gematria exigiu que construíssemos um laboratório aqui."
12185-33 = "Um laboratório...!?"
12185-34 = "Esqueça isso, onde está a Hoshino-senpai?!"
12185-35 = "Aquela vice-presidente do conselho estudantil está no prédio ali adiante."
12185-36 = "Embora seja possível que o experimento já tenha começado..."
12185-37 = "...!"
12185-38 = "Se quiserem chegar até ela, terão que passar por cima de nós. Isso, é claro, se vocês forem capazes."
12185-39 = "Com esse poder de fogo, não parece que será fácil passar..."
12185-43 = "...Hum, então deixem isso comigo—"
12185-44 = "(BOOOOM!!)"
12185-45 = "Outra explosão!? O, o que foi agora?"
12185-48 = "Tcharam! Olá~☆"
12185-49 = "……."
12185-50 = "D, desculpem a intromissão!"
12185-51 = "O, o pessoal da Problem Solver...!?"
12185-52 = "Finalmente alcançamos vocês! Mas, nossa, está todo mundo aqui... será que interrompemos uma cena importante?"
12185-53 = "...Humph, eu queria ajudar secretamente, mas não saiu como planejado."
12185-54 = "V, vocês...!"
12185-55 = "Aparecerem exatamente neste momento, isso significa que...!"
12185-56 = "...Entendo, é isso mesmo."
12185-57 = "...Hum? Por que esses olhares cheios de expectativa?"
12185-58 = "Presidente, estou com um pressentimento ruim, talvez devêssemos organizar a situação primeiro..."
12185-59 = "……."
12185-60 = "Fufu, parece que seus instintos continuam afiados, Comitê de Contramedidas. O motivo de estarmos aqui é óbvio, não é?"
12185-63 = "Deixem isso conosco e sigam em frente!!!"
12185-65 = "!"
12185-66 = "!!"
12185-67 = "!!!"
12185-68 = "...Ah."
12185-74 = "(Ela realmente disse issooooo!!!!)"
12185-76 = "Nossa... assim eu acabo me apaixonando, Aru-chan..."
12185-77 = "I, incrível! Eu a seguirei para sempre! Aru-sama!!"
12185-79 = "...Ah, parem com isso."
12185-80 = "N-não pense que estou te agradecendo nem nada disso!!"
12185-81 = "Mas, quando tudo isso acabar... aí sim, nós vamos comer um lámen juntos, pessoal da Problem Solver!!"
12185-82 = "Sim, eu certamente retribuirei esse favor!"
12185-83 = "Hmm, obrigada."
12185-86 = "Haa... não tem jeito, né."
12185-87 = "E-eu me deixei levar pelo momento, mas o que eu faço agora...!? Atacar!? Não, fugir...!?"
12185-88 = "Ahahahaha! Ficou interessante, Aru-chan! Depois de dizer uma frase tão legal dessas, não tem como voltar atrás, né!"
12185-90 = "Então, vamos começar!!!"
12185-92 = "Próximo episódio: Aquilo que ainda assim não foi deixado para trás (2)"
