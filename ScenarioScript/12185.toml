[translation]
12185-2 = "目標の座標地点に到着！"
12185-3 = "この辺りに、ホシノ先輩が閉じ込められているはずです！この周囲のどこかに、きっと……！"
12185-4 = "……。"
12185-5 = "ここは……。"
12185-6 = "……ここ、学校？"
12185-7 = "この痕跡……多分学校、だよね？"
12185-8 = "砂漠の真ん中に学校……もしかして。"
12185-9 = "ああ。ここは、本来のアビドス高等学校本館だ。"
12185-10 = "！！"
12185-17 = "……。"
12185-18 = "あんたは……！！"
12185-20 = "よくぞここまで来たものだ、アビドス対策委員会。"
12185-26 = "敵の増援多数……！"
12185-27 = "この数字……おそらく敵側の動ける全兵力が……。"
12185-28 = "カイザーPMCはきっと、ここで総力戦に持ち込むつもりです……！"
12185-30 = "砂漠化が進行し、捨て去られたアビドスの廃墟……ここが、元々はアビドスの中心だった。"
12185-31 = "……かつてキヴォトスで一番大きく、そして強大だった学校の残骸が、この砂の下に埋もれている。"
12185-32 = "ゲマトリアは、ここに実験室を立てることを要求した。"
12185-33 = "実験室……！？"
12185-34 = "そんなことよりも、ホシノ先輩はどこですか！"
12185-35 = "あの副生徒会長なら、向こうの建物にいる。"
12185-36 = "もしかしたら、すでに実験が始まっているかもしれないが……。"
12185-37 = "……っ！"
12185-38 = "彼女の元に行きたいのであれば、私たちのことを振り切って行けば良い。君たちにそれができるなら、の話だが。"
12185-39 = "この兵力、容易に通してくれそうにはありませんね……。"
12185-43 = "……ん、じゃあここは私に――"
12185-44 = "（ドカアアァァァァン！！）"
12185-45 = "また爆発！？こ、今度は何ですか？"
12185-48 = "じゃーん！やっほ～☆"
12185-49 = "……。"
12185-50 = "お、お邪魔します！"
12185-51 = "べ、便利屋の皆さん……！？"
12185-52 = "やーっと追いついた！けどなんかこれみんな集まってるし、もしかして大事なシーンに割り込んじゃった感じ？"
12185-53 = "……ふん、こっそり助太刀しようと思ったのに、そう上手くはいかなかったわね。"
12185-54 = "あ、あんたたち……！"
12185-55 = "このタイミングに登場、ということは……！"
12185-56 = "……なるほど、そういうことだね。"
12185-57 = "……ん？何、この期待に満ちた目線は？"
12185-58 = "社長、なんか嫌な予感がするから、まずは状況を整理してから……。"
12185-59 = "……。"
12185-60 = "ふふっ、勘だけは鈍ってないようね、対策委員会。私たちがここに来た理由なんて、決まってるでしょう？"
12185-63 = "ここは私たちに任せて、先に行きなさい！！！"
12185-65 = "！"
12185-66 = "！！"
12185-67 = "！！！"
12185-68 = "……はあ。"
12185-74 = "（言っちゃったああぁぁぁーー！！！！）"
12185-76 = "うっわー……それは惚れちゃうよ、アルちゃん……。"
12185-77 = "さ、流石です！い、一生ついていきます！アル様！！"
12185-79 = "……もうっ。"
12185-80 = "べ、別に、お礼は言わないからねっ！！"
12185-81 = "でも、全部終わったら……その時は一緒に、ラーメンでも食べに行くわよ、便利屋！！"
12185-82 = "はい、このご恩は必ず！"
12185-83 = "ん、ありがと。"
12185-86 = "はあ……こうなったら仕方ないか。"
12185-87 = "い、勢いに任せちゃったけど、この後はどうしたら……！？攻撃！？いや、逃げ……！？"
12185-88 = "あはははは！面白くなってきたね、アルちゃん！あんなにかっこいい台詞言っちゃったら、もうやるしかないでしょ！"
12185-90 = "じゃっ、始めようかっっ！！！"
12185-92 = "次回;それでも手放さなかったもの（２）"
