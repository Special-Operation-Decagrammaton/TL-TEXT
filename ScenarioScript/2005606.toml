[translation]
2005606-1 = "Figura querida"
2005606-2 = "（Logo após receber o contato, Koyuki entra no Schale parecendo bastante apressada）"
2005606-5 = "Sensei!! Por favor, me ajude!!"
2005606-6 = "Ah~ finalmente pude respirar um pouco... foi muito difícil até agora!"
2005606-7 = "Poxa, escute só."
2005606-8 = "Elas tentaram me amarrar... sério! Ah, meu Deus!"
2005606-9 = "Elas iam me prender fisicamente na cama!? #nLiteralmente!"
2005606-10 = "[s1] \"Te prender na cama...?\"\n[s2] \"O que você fez exatamente...?\""
2005606-13 = "Eu não fiz nada, eu juro! Não é mentira!"
2005606-14 = "Ninguém fica do meu lado. Por que só comigo...!"
2005606-15 = "Passar por uma coisa dessas――!"
2005606-20 = "……Atchim!!"
2005606-22 = "[ns3] \"Atchim...?\"\n[ns4] \"...Você pegou um resfriado?\""
2005606-25 = "Hã? Ah? Será?"
2005606-26 = "Não importa, esquece isso. #nElas tentaram me isolar como se eu estivesse doente...!?"
2005606-27 = "……? Ué?"
2005606-28 = "……Sensei, por que está com essa cara?"
2005606-29 = "Talvez eu esteja resfriada... mas não é nada demais."
2005606-30 = "Eu me conheço melhor do que ninguém! Não tem problema eu sair, tem?"
2005606-34 = "……Hã?"
2005606-35 = "As veteranas confiscaram meu uniforme do Seminar."
2005606-36 = "Hoje nem me deram trabalho para fazer."
2005606-37 = "Na verdade, elas tentaram me trancar no quarto para eu não fazer nada! #nIsso é uma cela, uma cela!"
2005606-38 = "[s5] \"...Entendi, então é isso.\"\n[s6] \"Ah, entendi tudo agora.\""
2005606-41 = "……? Por que essa reação? Estou começando a ficar preocupada."
2005606-42 = "Ei... espera..."
2005606-43 = "V-você não vai me entregar para o Seminar, vai...!?"
2005606-47 = "Ah, é verdade, você não faria isso. #nNi-haha!! Ainda bem! Perdi meu tempo me preocupando!"
2005606-48 = "……Hã? O que foi?"
2005606-49 = "Posso ficar na sala de descanso do Schale?"
2005606-50 = "Posso jogar e comer uns doces... posso?"
2005606-54 = "Hã... você está falando sério?"
2005606-55 = "[s7] \"Se alguém aparecer, eu dou um jeito.\"\n[s8] \"Não é mais seguro ficar escondida aqui?\""
2005606-61 = "Ni-haha!! Se o Sensei diz... então eu vou aceitar!"
2005606-62 = "Então, sem cerimônias..."
2005606-63 = "……Vou ficar brincando ali por um tempo!! #nUhuuu!"
2005606-69 = "（...Depois disso, entrei em contato com o Seminar e expliquei a situação da Koyuki）"
2005606-70 = "（Passado um tempo, achei que era hora e fui até a sala de descanso）"
2005606-76 = "Ni... nihi... nihihi..."
2005606-77 = "Adeus, pessoal do Seminar... com esse prêmio da loteria, de agora em diante... ni... ni-hahaha..."
2005606-81 = "……Atchim!!"
2005606-82 = "Fumya... suu... kuu...!!"
2005606-83 = "Nihi... nihihihi..."
2005606-86 = "[ns9] Ligar o aquecedor e cobri-la com um cobertor.\n[ns10] Colocar uma compressa fria na testa dela."
2005606-93 = "（Continuei cuidando da Koyuki enquanto ela dormia, observando-a até o resfriado passar）"
2005606-94 = "（...Pela manhã, recebi uma mensagem de agradecimento do Seminar）"
