[translation]
2005606-1 = "愛されキャラ"
2005606-2 = "（連絡があった直後、コユキがかなり慌てた様子でシャーレに飛び込んできた）"
2005606-5 = "先生ー！！助けてください！！"
2005606-6 = "はぁ～やっと一息つけた……さっきまでほんと大変だったんですから！"
2005606-7 = "もー、聞いて下さいよ。"
2005606-8 = "先輩たちに縛られそうになって……ほんと！もう！"
2005606-9 = "物理的にベッドにくくりつけられるところだったんですよ！？#n文字通り！"
2005606-10 = "[s1] \"ベッドにくくりつけられる……？\"\n[s2] \"一体何したの……。\""
2005606-13 = "何もしてないんですって！嘘じゃないですよ！？"
2005606-14 = "誰も私の味方をしてくれないなんて。なんで私だけ……！"
2005606-15 = "こんなひどい目に――！"
2005606-20 = "……へくちっ！！"
2005606-22 = "[ns3] \"へくち……？\"\n[ns4] \"……風邪ひいたの？\""
2005606-25 = "え？あー？そうなんですかね？"
2005606-26 = "そんなことどうでもいいじゃないですか。#n病人扱いで隔離されそうになったんですよ……！？"
2005606-27 = "……？あれ？"
2005606-28 = "……先生、どうしたんですかそんな顔して。"
2005606-29 = "風邪ひいてる……のかもしれませんけど。別にたいしたことないですし。"
2005606-30 = "自分のことは自分が一番わかってますから！外出したっていいじゃないですか！"
2005606-34 = "……え？"
2005606-35 = "セミナーの制服は先輩たちに取り上げられちゃいました。"
2005606-36 = "今日は仕事も渡されませんでした。"
2005606-37 = "むしろ何もできないようにして、部屋に閉じ込められかけたんですよ！#nこんなの独房です独房！"
2005606-38 = "[s5] \"……なるほど、そういうことか。\"\n[s6] \"はぁ、全部理解したよ。\""
2005606-41 = "……？何ですかその反応？不安になってくるんですけど。"
2005606-42 = "えっ……ちょっと……。"
2005606-43 = "ま、まさか私をセミナーに引き渡すつもりですか……！？"
2005606-47 = "あ、それは流石にしませんか。#nにははは！！それなら良かった！心配して損しました！"
2005606-48 = "……え？なんですか？"
2005606-49 = "シャーレの休憩室で過ごしていいんですか？"
2005606-50 = "ゲームしたりお菓子食べたりしてて……いいですか？"
2005606-54 = "え……本気で言ってるんですか？"
2005606-55 = "[s7] \"誰か来たら私がうまく言っとくから。\"\n[s8] \"ここに隠れてるのが一番安全でしょ？\""
2005606-61 = "にははっ！！先生がそういうのなら……甘えちゃいますよ！"
2005606-62 = "それでは遠慮なく……。"
2005606-63 = "……しばらくそこで遊んでます！！#nはっちゃ～！"
2005606-69 = "（……その後セミナーに連絡し、コユキの状況を説明した）"
2005606-70 = "（少し時間が経って、そろそろかなと思い休憩室へ向かった）"
2005606-76 = "に……にひ……にひひ……。"
2005606-77 = "さらばだ、セミナーのみんな……この宝くじ当選金でこれから……には……にははは……。"
2005606-81 = "……へくちっ！！"
2005606-82 = "ふみゃ……すぅ……くぅー！！"
2005606-83 = "にひ……にひひひ……。"
2005606-86 = "[ns9] ヒーターをつけて毛布をかけてあげる。\n[ns10] おでこに冷却ジェルシートを貼ってあげる。"
2005606-93 = "（その後も風邪が治るまで様子を見ながら、眠るコユキの看病を続けた）"
2005606-94 = "（……朝にセミナーから感謝の連絡が届いた）"
