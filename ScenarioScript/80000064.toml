[translation]
80000064-1 = "Um Dia dos Namorados divertido"
80000064-2 = "（Recebi uma mensagem da Asuna e fui até a sala de aula que elas usam ocasionalmente como sala do clube da C&C）"
80000064-9 = "（As luzes estavam acesas, mas não havia ninguém por perto）"
80000064-10 = "[s1] \"……Asuna?\"\n[s2] \"……Ué?\""
80000064-11 = "Iuuuuuuupi!!"
80000064-12 = "Iuuuuuuupi!!"
80000064-13 = "Tcharam! A Asuna chegou!! Esperei por você, Mestre!"
80000064-14 = "[s3] \"Que susto……!?\"\n[s4] \"Asuna!?\""
80000064-15 = "Ahaha! Mestre, levou um susto? A surpresa foi um sucesso!"
80000064-16 = "Ahaha! Mestre, levou um susto? A surpresa foi um sucesso!"
80000064-17 = "Hm, eu? Sim, eu estava aqui embaixo o tempo todo. Queria te dar um susto e me divertir um pouco!"
80000064-18 = "Ah, aliás, você sabe que dia é hoje, né, Mestre?"
80000064-19 = "[s5] \"É o Dia dos Namorados, né?\"\n[s6] \"O dia de trocar chocolates?\""
80000064-20 = "Isso, exatamente! Então você já sabe o que vem a seguir, né?"
80000064-21 = "Isso, exatamente! Então você já sabe o que vem a seguir, né?"
80000064-22 = "Sendo assim……"
80000064-30 = "[ns7] \"A-Asuna……!?\"\n[ns8] \"……Espere. De onde você tirou isso……?\""
80000064-31 = "……Mestre? O que foi?"
80000064-32 = "……Mestre? O que foi?"
80000064-33 = "É chocolate! Chocolate de Dia dos Namorados da Asuna!"
80000064-34 = "Ah, já que estamos aqui, quer que eu mesma te dê na boca, Mestre?"
80000064-35 = "Vamos lá, Mestre, diga 'ah'!"
80000064-36 = "……Hm?"
80000064-37 = "O que foi, Mestre? Por que está com essa cara?"
80000064-38 = "O que foi, está envergonhado? Não se preocupe, você é tão fofo."
80000064-39 = "Vamos, vamos, hoje é Dia dos Namorados. Você precisa provar o chocolate que a Asuna preparou."
80000064-40 = "……Mestre?"
80000064-41 = "[s] Dou alguns passos para trás."
80000064-44 = "……Ué, será que vai começar um pega-pega de repente?"
80000064-45 = "Ahaha, então eu sou a pegadora! Se eu te alcançar, você vai ter que comer, viu?"
80000064-46 = "Preparar, apontar, já!!"
80000064-58 = "（……No fim, fui pego e, entre a vergonha e outros sentimentos, acabei aceitando o chocolate que a Asuna tirou de dentro do uniforme）"
