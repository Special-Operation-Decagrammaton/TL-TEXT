[translation]
80000064-1 = "バレンタインも楽しく"
80000064-2 = "（アスナから連絡を貰って、時折C&Cの部室としても使っているという講義室を訪れた）"
80000064-9 = "（電気は点いていたが、誰の姿も見当たらない）"
80000064-10 = "[s1] \"……アスナ？\"\n[s2] \"……あれ？\""
80000064-11 = "やっほーーーーーっ！！"
80000064-12 = "やっほーーーーーっ！！"
80000064-13 = "じゃじゃーん、アスナ登場！！お待たせご主人様！"
80000064-14 = "[s3] \"びっくりした……！？\"\n[s4] “アスナ！？”"
80000064-15 = "あははっ。ご主人様、びっくりした？サプライズ大成功ー！"
80000064-16 = "あははっ。ご主人様、びっくりした？サプライズ大成功ー！"
80000064-17 = "ん、私？うん、ずっとここの下に。ご主人様をびっくりさせて楽しませたいなって思って！"
80000064-18 = "あ、ところでご主人様は今日が何の日か知ってるよね？"
80000064-19 = "[s5] \"バレンタインデーだよね？\"\n[s6] \"チョコを送り合う日？\""
80000064-20 = "うん、そうそう！ってことは、この後の展開は分かってるよね？"
80000064-21 = "うん、そうそう！ってことは、この後の展開は分かってるよね？"
80000064-22 = "っていうわけで～……"
80000064-30 = "[ns7] \"あ、アスナ……！？\"\n[ns8] \"……待って。今どこから取り出した……？\""
80000064-31 = "……ご主人様？どうしたの？"
80000064-32 = "……ご主人様？どうしたの？"
80000064-33 = "チョコレートだよ！アスナからの、バレンタインチョコ！"
80000064-34 = "あっ、せっかくだし、アスナが直接ご主人様に食べさせてあげよっか？"
80000064-35 = "はいご主人様、あ～ん！"
80000064-36 = "……んー？"
80000064-37 = "どうしたの、ご主人様？何でそんな顔してるの？"
80000064-38 = "なーに、照れてるの？大丈夫だって、可愛いなあ。"
80000064-39 = "ほらほら、今日はバレンタインデーだから。ご主人様はアスナからのバレンタインチョコを味わってもらわないと。"
80000064-40 = "……ご主人様？"
80000064-41 = "[s] 何歩か後ろに下がる。"
80000064-44 = "……あれ、もしかして急に鬼ごっこ始まる感じ？"
80000064-45 = "あはっ、じゃあアスナが鬼ね！捕まったらちゃーんと食べてよ？"
80000064-46 = "よーい、スタート！！"
80000064-58 = "（……結局捕まってしまい、恥ずかしいやら何やらの感情を抱えながらも、アスナが胸から取り出したチョコを頂くことになった）"
