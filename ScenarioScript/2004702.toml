[translation]
2004702-1 = "Como convidar uma estrategista"
2004702-3 = "[ns] \"Kikyou! Cheguei!\""
2004702-4 = "O quê, já chegou?"
2004702-5 = "Sensei, aqui. #nMe ajude um pouco."
2004702-8 = "[ns] \"Olá――\""
2004702-10 = "[ns1] \"――Ah!\"\n[ns2] \"I-isso é……!?\""
2004702-14 = "É algo tão surpreendente assim?"
2004702-15 = "É verão. Não é um traje tão incomum, é?"
2004702-16 = "[s] \"Por que você está de roupa de banho……?\""
2004702-17 = "……Isso. Eu estava prestes a inflar agora."
2004702-18 = "Já que está olhando, eu gostaria que me ajudasse."
2004702-19 = "[s] \"Bem, uma piscina dentro das instalações do clube?\""
2004702-20 = "Sim. Não acha que é uma boa ideia?"
2004702-21 = "É perto, não preciso me preocupar com olhares alheios e posso me refrescar facilmente."
2004702-22 = "……O quê?"
2004702-23 = "Você está com uma cara de quem quer dizer algo."
2004702-24 = "Tudo bem. Pode falar."
2004702-28 = "Diga-me sua opinião sincera, Sensei."
2004702-29 = "Eu me preparei do meu jeito, mas……."
2004702-30 = "……Não está estranho?"
2004702-31 = "[s3] \"Não tem como estar estranho!\"\n[s4] \"A roupa de banho combina com você!\""
2004702-34 = "……Roupa de banho?"
2004702-38 = "……!"
2004702-39 = "Não perguntei sobre isso! Estou falando da piscina!"
2004702-40 = "[s] \"Mas combina com você…….\""
2004702-41 = "É óbvio, não é? #nNão precisa perguntar algo que já está na cara――"
2004702-45 = "……Se tem algo que quer dizer, pode falar."
2004702-46 = "Ah, aliás."
2004702-47 = "Não haverá uma segunda chance."
2004702-48 = "Pense bem no que vai dizer, está bem?"
2004702-49 = "[s5] \"P-por favor, me dê uma chance!\"\n[s6] \"Vou expressar minha opinião sincera!\""
2004702-53 = "Então, voltando ao assunto――"
2004702-54 = "O que você acha do plano de colocar uma piscina aqui, Sensei?"
2004702-55 = "É perfeito para aproveitar o verão sem esforço, não é?"
2004702-56 = "……Eh? #nVocê acha que isso é o mesmo que ficar no ar-condicionado do escritório?"
2004702-57 = "……."
2004702-58 = "Você fala o que pensa, hein. #nMas entendi o que quis dizer."
2004702-59 = "Praia, rio, parque aquático…… #nTalvez seja divertido ir a esses lugares."
2004702-60 = "Mas não é um incômodo ter que ir até lá?"
2004702-61 = "Por isso fiz isso aqui, para ser prático."
2004702-62 = "[s] \"Você não gosta de sair, não é?\""
2004702-63 = "Não é isso. Depende de com quem eu vou."
2004702-64 = "Se fosse com você…… bem, talvez eu considerasse."
2004702-65 = "[s] \"Então, vamos à praia!\""
2004702-66 = "Isso significa…… que seremos só nós dois?"
2004702-67 = "[s] \"Essa é a intenção…… o que acha?\""
2004702-68 = "……Hum."
2004702-69 = "Nesse caso, preciso planejar. #nNão é hora de ficar preparando uma piscina dessas."
2004702-70 = "Então, quando você está livre na sua agenda?"
2004702-71 = "……Está perguntando se eu planejei que isso acontecesse desde o início?"
2004702-72 = "Quem sabe? Pense como quiser."
2004702-73 = "De qualquer forma, ir à praia já está decidido.#nNão aceitarei desistências."
2004702-74 = "……Hehe."
2004702-76 = "(Enquanto planejava a ida à praia, Kikyou parecia estar de melhor humor do que o habitual.)"
