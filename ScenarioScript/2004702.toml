[translation]
2004702-1 = "作戦参謀の誘い方"
2004702-3 = "[ns] \"キキョウ！来たよ！\""
2004702-4 = "なに、もう来たの？"
2004702-5 = "先生、こっち。#nちょっと手伝って。"
2004702-8 = "[ns] \"こんにち――\""
2004702-10 = "[ns1] \"――はっ！\"\n[ns2] \"こ、これは……！？\""
2004702-14 = "そんなに驚くこと？"
2004702-15 = "夏だし。珍しい格好でもないでしょ。"
2004702-16 = "[s] \"どうして水着姿に……？\""
2004702-17 = "……これ。今から膨らませようと思って。"
2004702-18 = "見てるなら、手伝ってほしいんだけど。"
2004702-19 = "[s] \"えっと、部の敷地内でプールを？\""
2004702-20 = "そう。いい案だと思わない？"
2004702-21 = "近場で、人目を気にせず、手軽に水浴びができる。"
2004702-22 = "……なに？"
2004702-23 = "何か言いたげな顔ね。"
2004702-24 = "いいよ。聞いてあげる。"
2004702-28 = "先生の率直な意見を聞かせて。"
2004702-29 = "私なりに準備したんだけど……。"
2004702-30 = "……変じゃない？"
2004702-31 = "[s3] \"変なわけないよ！\"\n[s4] \"水着、似合ってるよ！\""
2004702-34 = "……水着？"
2004702-38 = "……！"
2004702-39 = "そんなことは聞いてない！プールの話！"
2004702-40 = "[s] \"似合ってるのに……。\""
2004702-41 = "当然でしょ？#n分かりきってることをわざわざ聞く必要なんて――"
2004702-45 = "……言いたいことがあるなら、どうぞ。"
2004702-46 = "あ、ちなみに。"
2004702-47 = "二度目は無いから。"
2004702-48 = "内容は、よく考えてね？"
2004702-49 = "[s5] \"ど、どうかチャンスを！\"\n[s6] \"率直な意見を言わせていただきます！\""
2004702-53 = "じゃあ、話を戻して――"
2004702-54 = "ここにプールを置く計画、先生はどう思う？"
2004702-55 = "手軽に夏を楽しむには最適でしょ？"
2004702-56 = "……え？#nこれだと、オフィスでクーラーにあたるのと同じ？"
2004702-57 = "……。"
2004702-58 = "言ってくれるね。#nでも、言いたいことは分かった。"
2004702-59 = "海とか、川とか、ウォーターパークとか……。#n行けば楽しいのかもしれないけど。"
2004702-60 = "行くまでが面倒じゃない？"
2004702-61 = "だからこうやって、手軽さを実現したのに。"
2004702-62 = "[s] \"外に出るの好きじゃないんだっけ？\""
2004702-63 = "別に。誰と行くかによるね。"
2004702-64 = "あんたとだったら……まぁ、考えなくはないかも。"
2004702-65 = "[s] \"じゃあ、海に行こう！\""
2004702-66 = "それって……二人でってこと？"
2004702-67 = "[s] \"そのつもりだけど……どうかな？\""
2004702-68 = "……ふーん。"
2004702-69 = "なら、予定を組まないと。#nこんなプールを準備している場合じゃないね。"
2004702-70 = "で、あんたのスケジュール、いつが空いてるの？"
2004702-71 = "……最初からこうなることを狙っていたのかって？"
2004702-72 = "さあ？好きに考えたら。"
2004702-73 = "とにかく、海に行くことは決まり。#n撤回は許さないから。"
2004702-74 = "……ふふっ。"
2004702-76 = "（海の計画を立てている間、キキョウはいつもより上機嫌にみえた）"
