[translation]
2000606-1 = "O que flui"
2000606-2 = "Shanhaijing - Casa de Chá \"Taoyuan\""
2000606-4 = "(Após terminar o trabalho na Escola Secundária Shanhaijing...)"
2000606-5 = "[s] \"Ei, Saya?\""
2000606-6 = "Oh, não é o Sensei?"
2000606-7 = "Quem diria que nos encontraríamos em um lugar como este, que coincidência."
2000606-8 = "Veja, tem um lugar vago aqui, sente-se, sente-se."
2000606-9 = "[s1] \"Saya também está descansando?\"\n[s2] \"...Saya, este é um estabelecimento comercial, sabia?\""
2000606-10 = "É verdade. A atmosfera aqui é boa, e o sabor do chá também não é nada mal."
2000606-11 = "Sempre que venho à Associação Xuanwu nos feriados, costumo passar aqui depois de comer."
2000606-12 = "V-você está suspeitando que eu coloco algo estranho na comida, é isso!?"
2000606-13 = "Eu não fico o tempo todo bebendo ou fazendo os outros beberem remédios estranhos, sabe? De vez em quando, eu também gosto de aproveitar um chá normalmente."
2000606-14 = "Além disso, ultimamente a quantidade de \"pratos apimentados\" na Associação Xuanwu aumentou drasticamente, então algo para limpar o paladar é essencial."
2000606-15 = "Bem, isso também é tudo por causa da minha genialidade... ou seja, por causa do meu molho super apimentado especial."
2000606-16 = "[s] \"Agora que você mencionou, é tão popular assim?\""
2000606-17 = "Popular? É mais do que popular, é um sucesso absoluto!"
2000606-18 = "Não é exagero dizer que quase toda a comida da Associação Xuanwu leva esse molho agora!"
2000606-19 = "Mapo tofu, dan dan mian, coisas que já eram apimentadas por natureza, claro, mas ultimamente até o arroz frito e os guiozas estão sendo banhados nisso...!"
2000606-20 = "Por mais que seja uma criação minha, a genial Saya, isso virou moda demais... não é como se tudo precisasse levar esse molho."
2000606-21 = "Se fosse assim, preferiria que a moda fosse algo como \"colocar queijo em tudo\"..."
2000606-22 = "[s] \"Eu não fazia ideia...\""
2000606-23 = "Mesmo assim, esta \"Taoyuan\" é um dos poucos lugares preciosos que não usa meu molho super apimentado."
2000606-24 = "Bem, este lugar é focado em chás e doces, afinal. É natural que seja assim. Hahahaha!"
2000606-25 = "Aqui, posso esquecer aquela ardência e relaxar tranquilamente."
2000606-28 = "Oh, Saya-chan. Você tem vindo bastante ultimamente, hein."
2000606-29 = "Que bom que te encontrei, queria te perguntar uma coisa."
2000606-30 = "Algo para perguntar a mim? O que seria?"
2000606-31 = "Ouvi dizer por aí que, da última vez, quando você deu um toque especial no novo menu da loja de lámen, formou-se uma fila enorme, é verdade?"
2000606-32 = "Estamos planejando lançar um novo menu aqui também, será que você poderia provar e me dar sua opinião?"
2000606-33 = "Se é só isso, é moleza!"
2000606-34 = "Que bom. Então, experimente este bolinho lunar..."
2000606-36 = "Hmm, esse recheio vermelho é de morango? A cor está ótima, parece delicioso."
2000606-37 = "Então, vou comer..."
2000606-44 = "Que ardência é essa!?!?"
2000606-45 = "Por que está tão apimentado!? Isso é realmente um bolinho lunar!?"
2000606-46 = "Ué, não está gostoso?"
2000606-47 = "Que estranho... eu usei aquele molho super apimentado que está super famoso na Associação Xuanwu, aquele que dizem que \"deixa tudo mais gostoso\"..."
2000606-48 = "Quem iria querer um bolinho lunar apimentado!? Não entendo quem come esse tipo de aberração!"
2000606-49 = "Não, não, na verdade os outros clientes estão adorando. Coloquei alguns para testar e, ao ouvirem o boato, vários clientes começaram a perguntar \"quando vai ser lançado!?\"."
2000606-50 = "E não para por aí, muitos clientes até tiram o molho do bolso e colocam mais por cima enquanto provam..."
2000606-51 = "Ah. Também temos chá verde com esse molho super apimentado, quer beber?"
2000606-52 = "Eu não quero beber isso de jeito nenhum!!"
2000606-53 = "E-estava afetando até este lugar...!"
2000606-54 = "Por mais que minha invenção seja excelente, não posso permitir que toda a culinária de Shanhaijing fique apimentada desse jeito!"
2000606-55 = "Não vou produzir nem mais um milímetro desse molho! Produção encerrada!!"
2000606-57 = "Assim, o molho super apimentado especial da Saya, após um sucesso explosivo, desapareceu rapidamente do mercado."
2000606-58 = "...No entanto, dizem que as porções que sobraram e não foram usadas acabaram sendo negociadas por preços altíssimos entre os gourmets e fanáticos por pimenta de Kivotos."
