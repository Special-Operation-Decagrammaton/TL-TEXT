[translation]
10003020-1 = "Episódio 2: Planos costumam dar errado"
10003020-3 = "Sim, pode entrar."
10003020-5 = "Quarto da Hina"
10003020-7 = "Ué, Sensei?"
10003020-8 = "[s] \"Desde quando a Hina está de roupa de banho!!?\""
10003020-9 = "N-não precisa exagerar... Na verdade, eu que levei um susto."
10003020-10 = "É que, embora seja um treinamento, viemos à praia, então... pensei em me trocar."
10003020-11 = "Enquanto eu me trocava agora há pouco, a Ako me deu um biquíni novo dizendo que 'já que estamos na praia, temos que aproveitar', e eu até pensei em usar... mas acabei devolvendo."
10003020-12 = "[s] \"E por que isso?\""
10003020-13 = "Por que... bem, eu já tinha este aqui."
10003020-14 = "Ainda serve, então não há necessidade de usar algo novo sem motivo."
10003020-15 = "É mais eficiente reutilizar o que já tenho."
10003020-16 = "[s1] \"Olhando bem, tem uma etiqueta com o seu nome em hiragana...\"\n[s2] \"Será que é de quando você estava no primário...?\""
10003020-17 = "...É sim, mas tem algum problema? Ainda serve, então..."
10003020-18 = "...É sim, mas tem algum problema? Ainda serve, então..."
10003020-19 = "...Tem algo de estranho?"
10003020-20 = "[s3] \"Isso significa que a Hina...\"\n[s4] \"Ainda tem chances de estar no primário...?\""
10003020-21 = "Ei, o-o que você está dizendo...!? Chega, se for para falar essas coisas estranhas, nossa conversa acaba aqui!"
10003020-22 = "Ei, o-o que você está dizendo...!? Chega, se for para falar essas coisas estranhas, nossa conversa acaba aqui!"
10003020-25 = "Mas mudando de assunto... será que está acontecendo algo lá fora? Sinto que está um pouco barulhento desde agora há pouco..."
10003020-26 = "[s] \"Está tudo bem, parece que estão apenas se apressando com os preparativos do treinamento.\""
10003020-27 = "...Entendo, então tudo bem."
10003020-28 = "[s] \"Aliás, o que a Hina estava fazendo agora?\""
10003020-29 = "Bem, nada em especial... No cronograma, fui instruída a 'aguardar até o treinamento de caminhada da tarde'."
10003020-30 = "Ainda faltam quase 4 horas, e parece que preciso conservar energia. Mas, sinceramente, achei que era tempo demais, então tentei entrar em contato com a Ako agora pouco, mas..."
10003020-31 = "[s] (É, realmente é muito tempo...)"
10003020-32 = "Mas, se a Ako diz que não há erro, então não me importo. Decidi deixar este treinamento inteiramente nas mãos dela."
10003020-33 = "Já que disse que confiaria nela, vou apenas observar, a menos que algo muito grave aconteça."
10003020-34 = "Até agora, eu sempre acabava decidindo tudo sozinha..."
10003020-35 = "[s] \"Você confia nela, não é?\""
10003020-36 = "Sim, suponho... Ela já gerencia todas as tarefas do Comitê Disciplinar, então imagino que já seja difícil o suficiente para ela."
10003020-37 = "Já que a Ako se ofereceu para fazer isso, quero deixar com ela. É estranho dizer isso em voz alta, mas... sim. Eu confio nela."
10003020-38 = "Só que... como estive ocupada ultimamente, quando me dizem de repente para 'aguardar', eu fico sem ter o que fazer... e não consigo relaxar."
10003020-39 = "Nunca fiquei parada sem fazer nada antes..."
10003020-40 = "Por isso, bem... se não for um incômodo para você, Sensei..."
10003020-41 = "...Poderia conversar comigo?"
10003020-42 = "Sinto que não vou conseguir ficar parada por mais 4 horas desse jeito."
10003020-43 = "Ah, claro, imagino que você também esteja ocupado com várias coisas..."
10003020-44 = "Você já está nos acompanhando neste acampamento do Comitê Disciplinar, então me sinto mal em tomar mais do seu tempo..."
10003020-45 = "[s] \"De jeito nenhum, com prazer!!\""
10003020-46 = "...Obrigada."
10003020-49 = "...Hm? O celular do Sensei?"
10003020-53 = "[ns] \"Alô, sim?\""
10003020-60 = "Ah, Sensei!!"
10003020-61 = "Droga...! Sensei, você está livre agora!?"
10003020-62 = "O pessoal da praia é mais problemático do que pensávamos, você pode vir para cá agora!?"
10003020-63 = "Por favor, assuma o comando sem que a Presidente saiba!"
10003020-66 = "Sensei, quem era no telefone...?"
10003020-67 = "[s5] \"Desculpe, Hina, me deu uma dor de barriga repentina...!\"\n[s6] \"Vou ali ao banheiro rapidinho...!\""
10003020-68 = "...Ah, sim. Pode ir...?"
10003020-69 = "……S-sim. Vá com cuidado……?"
