[translation]
10003020-1 = "第2話;計画は往々にして崩れるもの"
10003020-3 = "うん、入って。"
10003020-5 = "ヒナの部屋"
10003020-7 = "あれ、先生？"
10003020-8 = "[s] \"ヒナがいつの間に水着に！！？\""
10003020-9 = "そ、そんな大げさな……逆に、私の方がビックリした。"
10003020-10 = "その、訓練とはいえ、一応海に来たわけだし……着替えておこうかなって。"
10003020-11 = "さっき着替え中に、何故かアコが「せっかくの海なので」って新しい水着をくれたから、そっちを着るって手もあったのだけど……結局突き返した。"
10003020-12 = "[s] \"それはまたどうして？\""
10003020-13 = "どうしてって……この水着が元々あったし。"
10003020-14 = "まだ着られるのに、何もわざわざ新しいものを使う必要は無い。"
10003020-15 = "持っているものを再活用した方が効率的。"
10003020-16 = "[s1] \"よく見るとそれ、平仮名の名札ってことは……。\"\n[s2] \"もしかして、小学生の時の……？\""
10003020-17 = "……そうだけど、何か問題でもある？別に、まだ着られるし……。"
10003020-18 = "……そうだけど、何か問題でもある？別に、まだ着られるし……。"
10003020-19 = "……何か、変？"
10003020-20 = "[s3] \"ということは、ヒナは……\"\n[s4] \"まだ小学生の可能性が……？\""
10003020-21 = "え、な、何を言ってるの……！？もう、変なこと言うならこのお話は終わり！"
10003020-22 = "え、な、何を言ってるの……！？もう、変なこと言うならこのお話は終わり！"
10003020-25 = "それより……もしかして、外で何か起きてる？さっきから少し騒がしい気が……。"
10003020-26 = "[s] \"大丈夫、ちょっと訓練の準備でバタバタしてるみたい。\""
10003020-27 = "……そう、ならいいか。"
10003020-28 = "[s] \"ところでヒナは今何をしてたの？\""
10003020-29 = "えっと、特に何も……スケジュール上「午後の歩行訓練まで待機」って言われたから。"
10003020-30 = "あと4時間弱もあるけど、とりあえず体力を温存しておかなきゃいけないみたい。ただちょっと流石に長すぎる気がして、さっきアコに連絡してみたのだけれど……"
10003020-31 = "[s] （まあ長いよね……）"
10003020-32 = "でも、アコが間違ってないと言うのなら別に構わない。今回の訓練は、アコに全部任せることにしたのだし。"
10003020-33 = "任せると言った以上は、何かよっぽどのことが無い限りは見守る。"
10003020-34 = "今までは結構その、私が自分一人で全部決めてきちゃったから……。"
10003020-35 = "[s] \"信頼してるんだね。\""
10003020-36 = "うん、そうね……普段から風紀委員会の業務全般を管理してくれるんだから、ただでさえ大変だと思うのだけれど。"
10003020-37 = "そのアコがやると言ってくれたんだから、任せたい。口に出そうとすると、何だか変な感じがするけれど……そうね。信頼、してるから。"
10003020-38 = "ただ……ここしばらく忙しかったこともあって、急に「待機」って言われるとその、手持無沙汰と言うか……なんだか落ち着かない。"
10003020-39 = "何もしないでじっとしてるなんてこと、今まであんまり無かったし……。"
10003020-40 = "だからえっと……もし先生が良ければ、その。"
10003020-41 = "……話し相手に、なってくれる？"
10003020-42 = "もう今の時点で、このままあと4時間もじっとしていられる気がしなくて。"
10003020-43 = "あ、もちろん先生も色々と忙しいと思うし……。"
10003020-44 = "ただでさえこうして風紀委員の合宿に付き合ってもらってるのに、これ以上時間を拘束するのは申し訳ないのだけど……。"
10003020-45 = "[s] \"そんなこと無いよ、喜んで！！\""
10003020-46 = "……ありがとう。"
10003020-49 = "……ん？先生のスマートフォン？"
10003020-53 = "[ns] \"はい、もしもし？\""
10003020-60 = "あ、先生！！"
10003020-61 = "くっ……！先生、今大丈夫でしょうか！？"
10003020-62 = "海辺のやつらが思ったより厄介で、先生今からこっちに来られる！？"
10003020-63 = "どうか委員長にはご内密にしつつ、指揮をお願いします！"
10003020-66 = "先生、今の連絡は誰から……？"
10003020-67 = "[s5] \"ごめんヒナっ、急にお腹が……！\"\n[s6] \"ちょっとお手洗いに……！\""
10003020-68 = "……う、うん。いってらっしゃい……？"
10003020-69 = "……う、うん。いってらっしゃい……？"
