[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42150-1 = "Episódio 15: A Justiça da SRT"
42150-11 = "Aaaah~ Eu renasci das cinzas~#nHá quanto tempo o nosso corpo não sentia um jato de água quente sob pressão...?"
42150-12 = "O sabonete espumando... a água relaxando os nós dos músculos dormentes... eu nunca me senti tão limpa na vida..."
42150-13 = "Um banho longo e fervendo depois de apanhar numa pista de obstáculos tática é o céu na terra..."
42150-14 = "Haaah..."
42150-15 = "……Hoje o dia testou todos os nossos limites de estresse e exaustão física, não foi?"
42150-16 = "É. O tempo voou e o dia desapareceu tão rápido que fez nossos dias mofando no parque parecerem uma eternidade inútil."
42150-17 = "No fim das contas, a disciplina e a rigidez de um quartel botam a mente no lugar. Ter uma rotina imposta foca a cabeça."
42150-18 = "Qual a diferença, Saki? Quando a gente acampava no mato, você já acordava gritando horário militar pra todo mundo e forçava uma rotina. Você nunca parou de viver num quartel mental."
42150-19 = "……Mas enfim. Eu confesso que fui deitar realizada hoje.#nLiberaram o acesso aos fuzis pesados de anti-matéria e eu pude torrar pentes inteiros de balas que a gente não conseguia comprar nem a pau."
42150-20 = "E pra mim... poder me enfiar debaixo das cobertas numa câmara blindada e vigiada 24 horas... acalmou a minha paranoia. Finalmente o meu coração parou de palpitar de medo..."
42150-21 = "Dormir no parque era um inferno... a qualquer momento eu achava que ia ser pisada por um bêbado perdido ou devorada por guaxinins... as noites lá eram muito frias..."
42150-22 = "Mas..."
42150-23 = "O que foi? Tem algum pelo solto que tá te incomodando?"
42150-31 = "……Essa vida cheia de privilégios... nós realmente somos dignas de receber tudo isso?"
42150-32 = "Eu sei que parece arrogância chamar de 'privilégio' o básico que é ter uma bandeja de ensopado e um chuveiro limpo, mas..."
42150-33 = "……Sujando no barro do parque, eu percebi o quão torturante a nossa teimosia estava sendo pro corpo de vocês. Eu falhei como líder de proteger a integridade da minha tropa. Peço desculpas."
42150-34 = "N-Não foi isso que eu quis dizer! Eu tô falando que... bem..."
42150-35 = "Aqui nesse buraco... a gente desistiu de pensar. Nossos cérebros estão desligados e em repouso."
42150-36 = "Ninguém tem que caçar comida, não precisamos planejar a segurança, não pensamos mais nas escolhas morais...#nA gente não precisa mais chorar de medo por estar tomando a decisão errada..."
42150-37 = "O manual de comando está pronto. A gente só obedece às veteranas..."
42150-38 = "Mas, enquanto o sol nasce e a cidade lá fora se contorce em pânico e opressão pelo Novo Governo... é certo fecharmos os olhos nesse conforto anestesiante...?"
42150-39 = "Isso me dá um vazio no peito. É como se eu estivesse vestindo o casaco de uma heroína de mentira. É sufocante..."
42150-40 = "……Nós não ganhamos nada medindo nosso conforto com a dor alheia."
42150-41 = "A transição de ideais que nós sofremos hoje foi esmagadora. É natural que o choque cause essa dor no coração e essa confusão de identidade."
42150-42 = "Os seus nervos ainda estão no limite tático. Tente esvaziar a mente.#n……Com uma noite de sono fundo e cama quente, amanhã a perspectiva clareia e as dúvidas somem."
42150-43 = "Acho que sim..."
42150-46 = "……Sabe de uma coisa, se você esfregar a nostalgia... aquele banho improvisado debaixo da chuva dentro do barril de lata sujo não era de todo mau."
42150-47 = "Cê tá louca?! O ritual de acender fogueira pra não morrer de hipotermia era uma provação medieval...#ne o balde era tão pequeno que mal cabia um braço pra esfregar sabão..."
42150-48 = "Verdade... Mas o esforço de montar aquele acampamento do lixo e a água fria nos ossos eram o batismo de que nós... nós ainda estávamos respirando. Nos mantínhamos vivas pelos nossos próprios punhos. Aquele sacrifício provava a nossa resistência como operadoras da SRT."
42150-50 = "A vida aqui é cem vezes mais macia, mas...#nSendo brutalmente honesta, deitar nessa cama me faz sentir menos uma justiceira de elite e muito mais uma mercenária genérica que aluga o fuzil e aceita qualquer ordem por um prato de comida e dinheiro."
42150-51 = "Faço das suas palavras as minhas. Quando a gente lutava com as unhas no parque, até jogar um sinalizador cego me enchia o peito de orgulho tático..."
42150-52 = "Mas hoje... quando a Kurumi liberou as granadas e disse 'Pode mandar fogo, destrói os alvos', foi tudo tão... sem graça. Uma burocracia insípida.#nNão me entenda mal, a detonação foi violenta e eu aplaquei meus fetiches militares, mas..."
42150-53 = "Apesar da explosão grande, eu senti como se houvesse uma coleira muito curta apertando a minha garganta e cortando o ar..."
42150-57 = "……E você, Miyako? Onde você se encontra no meio disso tudo?"
42150-58 = "P-Perdão? Como assim... eu?"
42150-59 = "Eu... eu acho que..."
42150-63 = "A minha mente está em paz. Esta vida preenche os meus parâmetros operacionais perfeitamente."
42150-64 = "Nós recuperamos uma infraestrutura blindada, o treinamento focado, o arsenal ilimitado... e o nosso sacrifício cego garante o pilar diplomático que forçará a restauração da Academia SRT.#nComo responsável por guiar a RABBIT a um porto seguro, esse cenário é a vitória matemática inquestionável."
42150-65 = "……Ou melhor, Capitã da Destacamento RABBIT."
42150-66 = "……Dane-se os cálculos, a logística e a farda da equipe."
42150-67 = "Eu tô perguntando... você, Miyako. O buraco no SEU peito parou de sangrar?"
42150-68 = "O ideal de Justiça Eterna e Incorruptível que você abraçou e tatuou na alma quando entramos nessa academia... O conforto desse porão suprimiu o grito que você tinha lá fora?"
42150-73 = "……A conversa foi longe demais e eu preciso render a vigília no portão norte.#nDeixem a filosofia para outro dia e fechem os olhos."
42150-81 = "……"
42150-84 = "Haaah..."
42150-85 = "（Faz tanto tempo que o meu turno de vigília tática não era feito logo após um banho de chuveiro térmico invés do gelo de uma chuva suja de rua.）"
42150-89 = "（A brisa da montanha batendo no meu rosto quente... E as pontas do meu cabelo secaram por completo com um secador de verdade... minha cabeça nem parece carregar os mesmos fios suados.）"
42150-90 = "（Os carregadores no meu coldre e a ergonomia desse colete kevlar novo... Por que sinto que ele pesa cem quilos a menos do que a minha farda anterior...?）"
42150-91 = "……Com o passar dos dias, as outras meninas vão criar casca e vão se acalmar. Nós só precisamos aceitar a gaiola de ouro."
42150-95 = "……Hm? O sensor de perímetro na ala dos chuveiros estourou no infravermelho...?"
42150-96 = "O quadrante três não tem conexão rodoviária ou escotilhas subterrâneas... o muro de ferro é liso e eletrificado."
42150-97 = "……Será que um urso perdeu o caminho na floresta e ativou a armadilha de cerca?"
42150-101 = "[ns1] \"Uhh.. Eai!! Miyako.\"\n[ns2] \"Boa noite. O clima tá meio frio pra vigiar, não tá?\""
42150-104 = "……S-Sensei?!"
42150-105 = "Como diabos a sua estrutura orgânica atravessou o fosso invisível da montanha e as barreiras sônicas...?!#nE o pior de tudo: como, pela lei divina, você desvendou as coordenadas topográficas de um Site Black Classe 2...?!"
42150-106 = "[ns] \"O método de infiltração na bolha invisível é segredo militar confidencial da Schale.\""
42150-108 = "[ns] \"……Mas no momento decisivo... O aroma inconfundível dos meus Coelhinhos Rebeldes encheu o vento do desfiladeiro e eu só tive que seguir o faro.\""
42150-113 = "……Ordem de Prisão de Invasor Civil Executada."
42150-115 = "Próximo Episódio: As Razões do Sensei"