[translation]
42150-1 = "Episódio 15; A Justiça da SRT"
42150-11 = "Ahhh, estou revivendo...#nFaz quanto tempo desde o último banho quente...?"
42150-12 = "Isso penetra no meu corpo cansado..."
42150-13 = "Um banho depois do exercício é o melhor..."
42150-14 = "Ufa..."
42150-15 = "...Foi um dia com muitas coisas acontecendo, de fato."
42150-16 = "É verdade. Sinto que o dia passou mais rápido do que quando estávamos no parque."
42150-17 = "No fim das contas, ter uma rotina disciplinada ajuda a manter o ritmo."
42150-18 = "Mas a Saki já fazia um cronograma para viver mesmo quando estávamos no parque, né?#nNão tem tanta diferença assim."
42150-19 = "...Bem, mas eu também fiquei muito satisfeita hoje.#nPude disparar munições especiais que normalmente não consigo usar, o quanto eu quis."
42150-20 = "Eu também... faz tempo que não fico em uma instalação com tanta segurança, então... sinto que posso ficar um pouco tranquila."
42150-21 = "No parque, eu sempre me assustava com pessoas perdidas ou animais selvagens..."
42150-22 = "Mas..."
42150-23 = "O que houve? Tem algo te incomodando?"
42150-31 = "...Será que está tudo bem... viver de forma tão confortável assim?"
42150-32 = "Pode ser um exagero chamar isso de vida confortável só por ter refeições balanceadas e um banho quente, mas..."
42150-33 = "...Refleti novamente sobre como a vida no parque impunha um fardo maior do que eu imaginava a todas vocês. Peço desculpas."
42150-34 = "N-não é nesse sentido... é que..."
42150-35 = "É que aqui, eu não preciso tomar decisões por conta própria..."
42150-36 = "Sobre o que comer, ou o que fazer...#nOu se estou tomando a decisão errada..."
42150-37 = "O Senpai pensa em tudo por nós..."
42150-38 = "Mas, com as outras pessoas sentindo insegurança sobre o novo sistema... será que está tudo bem estarmos assim...?"
42150-39 = "Sinto como se estivesse vestindo uma roupa que não serve em mim, e isso me deixa inquieta..."
42150-40 = "...Não é algo para se comparar com os outros."
42150-41 = "Hoje aconteceu muita coisa, então entendo que seus sentimentos estejam agitados."
42150-42 = "Você está um pouco tensa agora.#n...Depois que descansar bem, logo vai se acalmar."
42150-43 = "Será..."
42150-46 = "...O banho de tambor também não era tão ruim assim."
42150-47 = "Claro... era trabalhoso esquentar a água e, como era apertado, era difícil se lavar..."
42150-48 = "Mas ainda assim... aquele esforço era uma prova de que estávamos atuando como membros da SRT."
42150-50 = "Agora, embora seja mais confortável do que naquela época...#nPara ser sincera, me sinto como uma mercenária que trabalha por dinheiro."
42150-51 = "Eu também penso o mesmo. Antes, eu me divertia só de disparar um pequeno míssil, mas..."
42150-52 = "Quando me dizem que posso disparar o quanto eu quiser, eu me sinto hesitante. Não é tão divertido assim... não, eu fiquei satisfeita, mas..."
42150-53 = "Ainda assim, sinto um aperto no peito em algum lugar..."
42150-57 = "...Miyako, você está bem?"
42150-58 = "H-hein? Eu...?"
42150-59 = "Eu..."
42150-63 = "Estou bem. Estou satisfeita com esta vida."
42150-64 = "É um ambiente onde todas podem se concentrar no treinamento, e contribui para o renascimento da Academia Especial SRT...#nComo capitã do RABBIT Squad, acredito que não há tratamento melhor que este."
42150-65 = "...Não, agora sou comandante de destacamento."
42150-66 = "...Nós não temos nada a ver com isso."
42150-67 = "Miyako, você está realmente bem assim?"
42150-68 = "A justiça imutável... é realmente isso que você quer?"
42150-73 = "...Com licença, vou indo na frente.#nTodas, descansem bem."
42150-81 = "..."
42150-84 = "Ufa..."
42150-85 = "(Faz tempo que não entro na segurança logo após tomar banho)"
42150-89 = "(A sensação da brisa noturna acariciando meu rosto... meu cabelo não está pesado porque consegui secar bem com o secador)"
42150-90 = "(Talvez seja porque troquei o equipamento por um novo, mas sinto-o mais leve...)"
42150-91 = "...Todas vocês certamente vão se acostumar com essa vida."
42150-95 = "……？ Alarme de intrusão? Perto do prédio onde fica o chuveiro……?"
42150-96 = "Não há estradas ou entradas que conectem com o exterior por ali, mas……"
42150-97 = "……Será que algum animal selvagem acabou disparando?"
42150-101 = "[ns1] \"Olá, Miyako.\"\n[ns2] \"Boa noite. Como você tem passado?\""
42150-104 = "……Sensei?"
42150-105 = "Por que você está aqui……#nE como você descobriu onde estamos……"
42150-106 = "[ns] \"Como eu descobri é segredo, mas……\""
42150-108 = "[ns] \"……Eu senti o cheiro do RABBIT Squad por aqui.\""
42150-113 = "……Vou te prender."
42150-115 = "Próximo episódio: As circunstâncias do Sensei"
