[translation]
2002-1 = "いつもの彼女たちの放課後"
2002-2 = "（学校からの帰り道、放課後スイーツ部の部員たちが並んで川沿いを歩いていた）"
2002-7 = "そういえばもうすぐ連休じゃん、4日間だっけ？それぞれ何か予定とかあるの？"
2002-8 = "特に何も。せっかく連休なんだから、何もしないのが一番良い。"
2002-9 = "ま、どうせあんたはそう言うと思ったわよ。"
2002-10 = "何それ、どういう意味？"
2002-11 = "べっつにー？言ったとおりの意味～。"
2002-12 = "え、えっと！よ、ヨシミちゃんは、何か予定とかあるの？"
2002-13 = "私は最近の授業で分からなかったところの勉強でもしようかな、って思ってるけど……。"
2002-14 = "んー、別にまだ何も考えてないわね……連休であちこちイベントとかやってるだろうし、どこかスイーツ巡りにでも行こうかなってくらいで。"
2002-20 = "……っ！"
2002-22 = "……な、何？"
2002-24 = "……っっっ！！"
2002-25 = "……？"
2002-26 = "な、ナツちゃん？急にどうしたの……？"
2002-30 = "……甘いもの食べたい。"
2002-32 = "そんなに溜めてから言うようなこと！？"
2002-34 = "な、ナツちゃん、ついさっきスイーツ食べてきたばっかりなのに……？"
2002-35 = "ノンノン、それとこれとは話が別だよ。何せ私たちは成長期、および思春期真っ盛りの女子高生。糖分はいくら摂っても摂り過ぎなんてことはない。"
2002-36 = "また変な口調になってる……。"
2002-37 = "気のせい気のせい～。"
2002-38 = "はぁ……。"
2002-40 = "で、とにかくあんたが言ってるのは、もう一軒行きたいってこと？そういうことなら私も付き合うけど？"
2002-41 = "なんか「もう一軒」って言葉、女子高生っぽくないね……。"
2002-42 = "えっ、そ、そう……！？"
2002-43 = "むーん、それも悪くないけど……。"
2002-44 = "こう、"
2002-45 = "刺激が足りない気がする。"
2002-46 = "刺激……？スイーツに刺激って、どういうの……？あ、辛いのとか？"
2002-47 = "ううん、"
2002-48 = "例えばそう……"
2002-50 = "「伝説のスイーツを探す冒険」、みたいな！！！！"
2002-56 = "はいじゃあ今日はこれで解散。またね。"
2002-57 = "えーっと……なんか私も、もう少し甘いもの食べたくなってきちゃった。ヨシミちゃん、一緒にもう一軒、行く？"
2002-58 = "うん、そうしよっか……って、あんたも「もう一軒」って言ってるじゃん！？"
2002-60 = "……ちーん。"
2002-61 = "悲しい……せっかくワクワクするような意見を出したのに、みんなが協力してくれない……。"
2002-62 = "協力も何も、さっきの話で「行こう行こう！」ってなるとでも思った！？"
2002-63 = "だってこの私が事前に、調査も準備も済ませておいたんだよ？せめて話だけでも聞いてみたくない？"
2002-64 = "いや、別に……。"
2002-65 = "実はトリニティの自治区から結構離れたところに、とある洞窟があって……！"
2002-66 = "始まっちゃった……。"
2002-67 = "その洞窟では夏でも氷点下の気温が保たれてて、一年中「つらら」ができる環境になってるらしいんだ。"
2002-68 = "それで、その「つらら」っていうのが普通の「つらら」じゃなくて……"
2002-69 = "「天然のメープルシロップでできたつらら」なんだって！"
2002-70 = "洞窟にサトウカエデが生えてて、その樹液が凍って生まれるらしくって……どう、気になってきたでしょ？"
2002-71 = "何それ……情報源はどこ？"
2002-72 = "「月刊スイーツと機関銃」のミステリーコーナー。はいこれ、見る？"
2002-73 = "「ミステリーコーナー」って言っちゃってるじゃん！？見なくても分かるわよ、それミステリーなんでしょ！？ほぼ間違いなく噓じゃん！？"
2002-74 = "それはミステリーに失礼～。とにかく行ってみようよ、天然のメープルアイスがあるかもしれないんだよ？気になるでしょ？"
2002-75 = "行かないわよ！わざわざ連休を消費してまで、そんな嘘っぽい話を確かめに行くとでも思った！？"
2002-76 = "え、噓でしょ……？本当に？本当に行かないの……？"
2002-77 = "だから行かないって言ってるでしょ？私はスイーツ巡りだし、アイリはアイリで勉強するんだから。"
2002-78 = "……（ちらっ）。"
2002-82 = "さりげなくこっちを見てもダメ。"
2002-83 = "私にだって、「何もしない」っていうれっきとした予定がある。"
2002-84 = "そういうこと、"
2002-85 = "じゃあこの話はおしまい。"
2002-86 = "ただのつららじゃなくて、メープルシロップのつららなんだよ……？見たくないの？"
2002-87 = "こんなロマンに満ちたスイーツを、この目で見ずに終われるの……！？"
2002-88 = "いや別に何も終わらないし。メープルシロップならあそこのコンビニにもあるでしょ。買ってきたら？"
2002-89 = "そんな……"
2002-90 = "これで、"
2002-91 = "本当にこれでいいの……？"
2002-92 = "青春真っ盛りの女子高生たちが、イベントやら試験やらに夢中になってて、本当に良いと思ってるの……！？"
2002-93 = "いや、いたって健全な青春だと思うけど。"
2002-94 = "……なんかもう、ツッコまれるのを楽しんでない？"
2002-95 = "……そっか。みんなは本当に興味ないんだ……ごめんね、何か、私ひとりだけで……。"
2002-96 = "でも……ぐすっ……くすん……。"
2002-97 = "……。"
2002-103 = "あ、あの……な、ナツちゃん。私、その……"
2002-104 = "……待って！！情に流されちゃダメ！！"
2002-105 = "この展開もう何回目！？分かってるでしょ、毎回似たような流れなんだから！"
2002-106 = "ナツ、私たちだってそうやって毎回騙されると思ったら大間違いよ！"
2002-108 = "ぐすっ……。"
2002-109 = "……。"
2002-113 = "……ダメかぁ、残念。"
2002-115 = "あ、あははは……。"
2002-116 = "ほらそうだと思った！"
2002-117 = "とにかく今日はもう解散！じゃあね！"
2002-118 = "う、うん。じゃあ、またね。"
2002-119 = "……私も今日は帰る、バイバイ。"
2002-127 = "ふむ……。"
2002-128 = "……。"
2002-130 = "（その日の夜）"
2002-134 = "こんな夜中に呼び出して、何の用……？"
2002-135 = "私も知らない。"
2002-136 = "寝る直前に、アイリからすごい慌てた様子の連絡が来て……。"
2002-140 = "ヨシミちゃん、カズサちゃん！"
2002-141 = "ナツちゃんが、ナツちゃんがっ……！！！"
2002-147 = "ぐすっ……みんなぁ……。"
2002-149 = "え、何？どうして泣いてるの？"
2002-150 = "っていうかナツ、今どこにいるの！？"
2002-152 = "お昼に話したメープルシロップの洞窟……"
2002-153 = "やっぱり見に行って写真でも撮ろうと思って、一人で来たんだけど……。"
2002-154 = "洞窟の中で、迷っちゃった……。"
2002-156 = "……はぁ？"
2002-157 = "……。"
2002-158 = "……。"
2002-160 = "助けて～……"
2002-161 = "暗いよう怖いよう、何も見えないよ～……。"
2002-165 = "ね、ねぇ……まさか友達を見捨てたりしないよね……？"
2002-166 = "ね……？"
2002-171 = "……。"
2002-172 = "……ふぅ。"
2002-173 = "さ、流石に行く、よね……？"
2002-174 = "……はぁ、全くもう……！"
2002-176 = "（その後ナツを助けるために、ヨシミとカズサとアイリは洞窟へと向かった）"
2002-177 = "（洞窟にたどり着くと、そこには本当にメープルシロップのつららがあり……）"
2002-178 = "（ナツのことは何とか救出できたものの、そのつららを食べた放課後スイーツ部一同はみんなしてお腹を下し、せっかくの連休が台無しになってしまったのだった）"
2002-179 = "いつもの彼女たちの放課後"
