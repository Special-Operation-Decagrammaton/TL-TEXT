[translation]
2002-1 = "O pós-aula de sempre delas"
2002-2 = "（No caminho de volta da escola, as integrantes do Clube de Doces caminhavam lado a lado ao longo do rio）"
2002-7 = "Falando nisso, o feriado prolongado está chegando, né? São quatro dias? Vocês têm algum plano?"
2002-8 = "Nada em especial. Já que é um feriado, o melhor é não fazer nada."
2002-9 = "Bem, eu já imaginava que você diria isso."
2002-10 = "O que foi isso? O que você quer dizer com isso?"
2002-11 = "Nada não~? Exatamente o que eu disse."
2002-12 = "E-ei, Yoshimi-chan! Você tem algum plano?"
2002-13 = "Eu estava pensando em estudar as partes que não entendi nas aulas recentes, mas..."
2002-14 = "Hmm, eu ainda não pensei em nada... Como vai ter vários eventos acontecendo durante o feriado, talvez eu vá fazer um tour pelos doces em algum lugar."
2002-20 = "……!"
2002-22 = "……Q-que foi?"
2002-24 = "……!!!"
2002-25 = "……?"
2002-26 = "Natsu-chan? O que aconteceu de repente...?"
2002-30 = "……Quero comer algo doce."
2002-32 = "Precisava fazer todo esse suspense pra dizer isso!?"
2002-34 = "N-Natsu-chan, a gente acabou de comer doces agora pouco, não foi...?"
2002-35 = "Non non, uma coisa é uma coisa, outra coisa é outra coisa. Afinal, somos estudantes do ensino médio no auge da fase de crescimento e da puberdade. Nunca é demais consumir açúcar."
2002-36 = "Você começou a falar de um jeito estranho de novo..."
2002-37 = "É impressão sua, impressão sua~."
2002-38 = "Ah..."
2002-40 = "Bom, de qualquer forma, o que você está dizendo é que quer ir em mais um lugar? Se for isso, eu te acompanho, quer?"
2002-41 = "Essa expressão \"mais um lugar\" não soa muito como uma estudante do ensino médio..."
2002-42 = "Eh, sério...!?"
2002-43 = "Hmm, isso não é ruim, mas..."
2002-44 = "Tipo assim,"
2002-45 = "sinto que falta um pouco de emoção."
2002-46 = "Emoção...? O que seria emoção para um doce...? Ah, algo apimentado?"
2002-47 = "Não,"
2002-48 = "por exemplo..."
2002-50 = "Uma \"aventura em busca do doce lendário\", tipo isso!!!!"
2002-56 = "Certo, então por hoje é só. Até mais."
2002-57 = "Ei... eu também fiquei com vontade de comer mais um docinho. Yoshimi-chan, vamos em mais um lugar?"
2002-58 = "Sim, vamos fazer isso... espera, você também disse \"mais um lugar\"!?"
2002-60 = "……Tsc."
2002-61 = "Que triste... Dei uma ideia tão empolgante e ninguém quer colaborar..."
2002-62 = "Colaborar? Você achou mesmo que alguém ia dizer \"vamos sim!\" depois do que você falou!?"
2002-63 = "Mas eu mesma fiz toda a pesquisa e preparação antes! Pelo menos não queriam ouvir a história?"
2002-64 = "Não, nem um pouco..."
2002-65 = "Na verdade, existe uma caverna bem longe da zona autônoma de Trinity...!"
2002-66 = "Lá vem ela..."
2002-67 = "Dizem que nessa caverna a temperatura fica abaixo de zero até no verão, criando um ambiente onde se formam estalactites o ano todo."
2002-68 = "E essas \"estalactites\" não são estalactites comuns..."
2002-69 = "Dizem que são \"estalactites feitas de xarope de bordo natural\"!"
2002-70 = "Parece que crescem bordos de açúcar na caverna e a seiva congela... E aí, não ficaram curiosas?"
2002-71 = "O que é isso... qual é a sua fonte?"
2002-72 = "A seção de mistérios da revista \"Doces e Metralhadoras Mensal\". Toma, quer ver?"
2002-73 = "Você mesma disse que é a \"seção de mistérios\"!? Nem preciso ver pra saber, é um mistério, né!? Quase certamente é mentira, não é!?"
2002-74 = "Isso é um desrespeito com o mistério~. De qualquer forma, vamos lá, pode ter sorvete de bordo natural, sabe? Não estão curiosas?"
2002-75 = "Eu não vou! Você acha mesmo que eu desperdiçaria meu feriado prolongado para ir verificar uma história tão mentirosa quanto essa!?"
2002-76 = "Ei, é mentira, né...? Sério? Você realmente não vai...?"
2002-77 = "Eu já disse que não vou, não disse? Eu vou fazer um tour de doces, e a Airi tem que estudar."
2002-78 = "……(olhadinha)."
2002-82 = "Não adianta ficar me olhando de soslaio."
2002-83 = "Eu também tenho um compromisso legítimo de 'não fazer nada'."
2002-84 = "É isso."
2002-85 = "Então, assunto encerrado."
2002-86 = "Não é um pingente de gelo qualquer, é um pingente de xarope de bordo, sabe...? Você não quer ver?"
2002-87 = "Você vai mesmo deixar passar a chance de ver com seus próprios olhos um doce tão cheio de romance...!?"
2002-88 = "Não, não vai passar nada. Se quer xarope de bordo, tem na loja de conveniência ali, não tem? Por que não vai comprar?"
2002-89 = "Não pode ser..."
2002-90 = "É isso mesmo,"
2002-91 = "Você tem certeza de que é isso mesmo...?"
2002-92 = "Você acha mesmo que está tudo bem as estudantes no auge da juventude ficarem obcecadas apenas com eventos e provas...!?"
2002-93 = "Bom, eu acho que é uma juventude bem saudável."
2002-94 = "……Você não está gostando de ser contrariada, não é?"
2002-95 = "……Entendi. Ninguém está interessado mesmo... Desculpem, é que eu, sozinha..."
2002-96 = "Mas... *sniff*... *soluço*..."
2002-97 = "……."
2002-103 = "A-ah... N-Natsu-chan. Eu, tipo..."
2002-104 = "……Espere!! Não se deixe levar pela emoção!!"
2002-105 = "Quantas vezes já aconteceu isso!? Você sabe muito bem que o roteiro é sempre parecido!"
2002-106 = "Natsu, seria um grande erro achar que nós vamos cair nessa toda vez!"
2002-108 = "*sniff*..."
2002-109 = "……."
2002-113 = "……Não vai rolar, né? Que pena."
2002-115 = "A-ahahaha..."
2002-116 = "Eu sabia que seria assim!"
2002-117 = "De qualquer forma, por hoje é só! Até mais!"
2002-118 = "S-sim. Então, até mais."
2002-119 = "……Eu também vou para casa hoje, tchau."
2002-127 = "Hum..."
2002-128 = "……."
2002-130 = "(Naquela noite)"
2002-134 = "Nos chamar a essa hora da noite, o que houve...?"
2002-135 = "Eu também não sei."
2002-136 = "Logo antes de dormir, recebi uma mensagem da Airi parecendo muito desesperada..."
2002-140 = "Yoshimi-chan, Kazusa-chan!"
2002-141 = "A Natsu-chan, a Natsu-chan está...!!!"
2002-147 = "*sniff*... pessoal..."
2002-149 = "Ei, o que foi? Por que você está chorando?"
2002-150 = "E outra, Natsu, onde você está agora!?"
2002-152 = "Na caverna de xarope de bordo que mencionei hoje cedo..."
2002-153 = "Eu pensei em ir ver e tirar umas fotos, então vim sozinha, mas..."
2002-154 = "Eu me perdi dentro da caverna..."
2002-156 = "……Hã?"
2002-157 = "……."
2002-158 = "……."
2002-160 = "Socorro..."
2002-161 = "Está tão escuro, estou com medo, não consigo ver nada..."
2002-165 = "Ei, ei... você não vai abandonar uma amiga, vai...?"
2002-166 = "Ei...?"
2002-171 = "……."
2002-172 = "……Ufa."
2002-173 = "V-você vai mesmo, né...?"
2002-174 = "……Ah, francamente...!"
2002-176 = "（Depois disso, para salvar a Natsu, Yoshimi, Kazusa e Airi seguiram em direção à caverna）"
2002-177 = "（Ao chegarem na caverna, lá realmente havia estalactites de xarope de bordo...）"
2002-178 = "（Embora tenham conseguido resgatar a Natsu, todo o Clube de Doces do Depois da Aula acabou com dor de barriga por comer as estalactites, e o feriado que tanto esperavam acabou sendo arruinado）"
2002-179 = "O depois da aula habitual delas"
