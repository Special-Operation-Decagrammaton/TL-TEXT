[translation]
201100-1 = "Episódio 10; Baile de Máscaras"
201100-2 = "Bar de Bebidas 'Triad'"
201100-5 = "[ns] \"Orwell...?\""
201100-6 = "Não se preocupe com o nome. O que importa é o 'símbolo'."
201100-7 = "Se esta aparência está causando mal-entendidos, permita-me acrescentar: #nO 'telescreen' não serve apenas para despejar informações unilateralmente."
201100-8 = "Pelo contrário, ele serve para observar o outro e coletar informações, tornando o diálogo possível."
201100-9 = "Nesse sentido, desta vez, farei uma pergunta a você."
201100-10 = "O mistério que o Sensei possui... parece um pouco diferente do anterior."
201100-11 = "Como se contivesse uma nova possibilidade que não existia antes—"
201100-12 = "[s] \"Você conhece o 'Cajado de Shakade'?\""
201100-13 = "O Cajado de Shakade...!?"
201100-14 = "Oh, não pode ser. É realmente aquele 'galho'?"
201100-15 = "Eu sabia que o Sensei possuía um poder misterioso, mas... #nIsso é, até onde eu sei, o 'símbolo' mais impressionante!"
201100-16 = "O 'galho' que deveria estar nas mãos da Presidente do Conselho Estudantil Federal está agora dentro da Arca. #nIsso significa que..."
201100-20 = "...Entendo, uma relíquia replicada."
201100-21 = "Dito isso, neste mundo onde a imagem substitui a realidade, pode-se dizer que essa réplica possui um valor real como relíquia."
201100-22 = "...Assim como a 'atual Presidente do Conselho Estudantil Federal'."
201100-28 = "O texto que o Sensei nos mostra sempre supera as expectativas. Ele transcende o clichê."
201100-29 = "Você sabe o paradeiro da Presidente do Conselho Estudantil Federal?"
201100-30 = "...Sim? O que quer dizer com isso?"
201100-31 = "Não foi você quem disse? #nQue a atual Presidente do Conselho Estudantil Federal parece uma réplica que substitui a realidade."
201100-32 = "Se a atual Presidente é uma réplica, onde está a verdadeira?"
201100-33 = "...Ora."
201100-34 = "Algo que pertence ao mundo negando a simulação do mundo...? #nÉ um fenômeno incompreensível."
201100-35 = "Quem é você? Por que vê o irreal com olhos de realidade?"
201100-36 = "De quem vem a sua autoridade? Do Sensei? Ou da Presidente do Conselho Estudantil Federal?"
201100-37 = "Ou talvez, algo em você tenha se quebrado a ponto de não conseguir pensar racionalmente—"
201100-38 = "...!"
201100-43 = "[ns1] \"Pare.\"\n[ns2] \"Não serei tolerante se tocar nos meus alunos.\""
201100-46 = "...Perdão. Não tive a intenção de causar dano."
201100-47 = "Devido à minha natureza como observador, explorador e pesquisador da Gematria... #nSempre que encontro uma 'variante', sinto-me intrigado."
201100-48 = "Deixando de lado a interpretação sobre ela por um momento, responderei à sua pergunta..."
201100-49 = "A réplica não é uma existência que esconde a verdade. #nA réplica é a própria verdade."
201100-50 = "Isso significa que a atual Presidente do Conselho Estudantil Federal é a verdadeira?"
201100-51 = "A realidade apenas existe. Se é mentira ou verdade, não é importante."
201100-52 = "Como prova disso... não restou mais nenhuma base ou razão no mundo para negar a atual Presidente do Conselho Estudantil Federal, restou?"
201100-53 = "Isso não pode ser..."
201100-58 = "[ns] \"Não tente mudar de assunto.\""
201100-62 = "[ns3] \"Para salvar um aluno, não preciso de justificativas ou palavras bonitas.\"\n[ns4] \"Se pretende continuar me confundindo com 'falácias'...\n[ns5] \"A conversa acaba aqui.\""
201100-66 = "[ns] \"Onde está a Presidente do Conselho Estudantil Federal agora?\""
201100-67 = "Descobrir o paradeiro dela não é o seu verdadeiro objetivo, não é? ...Entendo. #nVocê está procurando uma maneira de destruir esta simulação."
201100-68 = "Se for esse o caso, o Sensei já possui os meios."
201100-69 = "O mistério contido na Arca — o 'Galho de Shakade' que pode observar a verdade."
201100-70 = "Se observar a Ideia através desse galho, a réplica desaparecerá naturalmente, como uma sombra diante da luz."
201100-74 = "[ns6] \"Não quero ter que repetir duas vezes.\"\n[ns7] \"Onde está a Presidente do Conselho Estudantil Federal agora?\""
201100-77 = "...Entendido."
201100-78 = "Não gosto de julgar símbolos por conveniência, mas se é isso que deseja, não tenho escolha."
201100-79 = "É apenas um exemplo."
201100-80 = "Quando todos no mundo concordam com a premissa de que 'cisnes são brancos', qual você acha que é a melhor maneira de provar a existência de um 'cisne negro'?"
201100-81 = "...Seria mostrar o cisne negro diretamente?"
201100-82 = "Exatamente. A melhor maneira de negar a realidade é apresentar um contraexemplo."
201100-83 = "Dito isso, não será fácil trazer a \"verdadeira Presidente do Conselho Estudantil Federal\".#nEntão... se não mostrarmos pelo menos uma pena negra, não haverá poder de persuasão."
201100-84 = "Este mundo mudou abruptamente na noite passada. As contradições ainda estão espalhadas por várias partes do mundo."
201100-85 = "Se deixadas de lado, podem ser engolidas pelo fluxo de informações e desaparecer. #nMas, se forem registradas e fixadas, servirão como um indicador para encontrar a Ideia."
201100-86 = "[s] \"...Como podemos encontrar essas contradições?\""
201100-87 = "Basta mergulhar o ramo sagrado que observa a verdade no mar de informações.#nAssim, as penas negras revelarão sua forma por conta própria."
201100-88 = "O mar de informações... a internet, não é?"
201100-89 = "Sim.#nEspecialmente as redes sociais, que são a ágora moderna onde se reúnem todos os desejos e rumores do mundo."
201100-90 = "O cotidiano dos cidadãos, os eventos presenciados e as impressões de cada um são registrados em primeira pessoa.#nNão é exagero dizer que esta comunidade fictícia é a existência que simboliza a sociedade moderna."
201100-91 = "Não deve ser coincidência que o mistério que o Sensei possui tenha a forma de um dispositivo de mídia."
201100-92 = "Investigue, colete e registre."
201100-93 = "Se a cor da pena é branca ou preta, não deve ser pelo seu julgamento subjetivo, mas sim o que o ramo sagrado de Schaledia lhe dirá."
201100-94 = "E quando esses registros se acumularem e um \"Cisne Negro\" for completado...#nos cidadãos de Kivotos também perceberão a \"anomalia\"."
201100-98 = "[ns] \"Arona, o que você acha?\""
201100-101 = "...É um pouco suspeito, mas não há problema em instalar o aplicativo de rede social no Shittim Chest."
201100-102 = "O MomoTalk também é um tipo de rede social, afinal."
201100-103 = "Mas, para coletar e organizar informações de um número indeterminado de pessoas obtidas da internet,#nmesmo para a super IA Arona, parece que levará um pouco de tempo."
201100-104 = "Ugh... sinto como se tivessem me pedido para fazer o diário de observação da glória-da-manhã no dia anterior ao fim das férias de verão..."
201100-105 = "Essa preocupação é desnecessária."
201100-106 = "As funções do \"Shittim Chest\" foram reforçadas em relação ao que eram antes.#nPor isso, se eu assumir o trabalho que a veterana fazia, acho que não haverá grandes problemas."
201100-107 = "Eu pensava nisso desde antes, que queria reduzir a carga da veterana.#nAcho que posso substituir na gestão de turnos e nos relatórios diários de trabalho, mas..."
201100-108 = "Não me diga que você já está de olho no lugar da veterana!?"
201100-109 = "Por mais que a Plana-chan seja uma operadora de IA excelente,#neu não vou ceder o papel de secretária do Sensei!"
201100-110 = "..."
201100-111 = "M-mas! Eu sou uma veterana de coração aberto."
201100-112 = "Se for revezando... posso dividir o trabalho com você."
201100-113 = "Obrigada, veterana."
201100-114 = "Então, não há problemas com a adição da nova função de rede social."
201100-115 = "Sensei, por favor, tome sua decisão."
201100-118 = "[ns] \"...Entendido. Vou aceitar sua proposta.\""
201100-119 = "Uma boa escolha."
201100-126 = "Explorar o mistério deste mundo. Fico feliz em poder fazer essa jornada junto com o Sensei—"
201100-130 = "[ns8] \"Não pretendo me aliar a você.\"\n[ns9] \"Eu só farei o que puder para ajudar os alunos.\""
201100-138 = "Sim, é claro que entendo."
201100-139 = "Originalmente, um adulto sensato não mistura assuntos pessoais com o trabalho."
201100-145 = "...É isso aí!"
201100-146 = "Desta vez, fico feliz que o Sensei tenha tomado uma decisão \"racional\"."
201100-147 = "Ah, falando nisso.#nPara coletar informações de forma imparcial e aleatória, é preferível ser anônimo."
201100-148 = "Vou lhe entregar as permissões de acesso da conta que possuo. Por favor, faça bom uso dela.#nÉ um pequeno agradecimento por ter ouvido o que eu tinha a dizer."
201100-150 = "Então, aproveite a mídia."
