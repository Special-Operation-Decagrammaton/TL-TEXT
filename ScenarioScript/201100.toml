[translation]#[Texto Final. - Filipe 13/07.]
201100-1 = "Episódio 10; Baile de Máscaras"
201100-2 = "Drink Bar \"Triad\""
201100-5 = "[ns] \"Orwell……?\""
201100-6 = "Não se prenda ao nome. O que importa é o \"signo\"."
201100-7 = "Se a minha aparência o induz ao equívoco, permita-me acrescentar:#na \"teletela\" não é algo que apenas cospe informações unilateralmente."
201100-8 = "Pelo contrário: ao observar o outro e coletar informações,#nela torna o diálogo possível."
201100-9 = "Nesse sentido, desta vez a pergunta parte de mim."
201100-10 = "O mistério que você carrega, Sensei……#nparece um tanto diferente do anterior."
201100-11 = "Como se contivesse uma possibilidade nova, inexistente até então――"
201100-12 = "[s] \"Conhece o \"Cajado de Shaked\"?\""
201100-13 = "O Cajado de Shaked……?!"
201100-14 = "Oh, não me diga. É realmente aquele \"Ramo\"?"
201100-15 = "Eu sabia que você possuía poderes inexplicáveis, Sensei……#nMas esse é o \"símbolo\" mais impressionante de que tenho conhecimento!"
201100-16 = "O \"Ramo\" que deveria estar com a Presidente do Conselho jaz agora na arca sagrada.#nIsso significa……"
201100-20 = "……Entendo. Uma relíquia sagrada replicada."
201100-21 = "Ainda assim, neste mundo em que a imagem substitui o real,#né a réplica que se torna a relíquia de valor concreto."
201100-22 = "……Tal como a \"atual Presidente do Conselho Estudantil Geral\"."
201100-28 = "O texto que você me mostra, Sensei, sempre supera as expectativas.#nVai além do clichê."
201100-29 = "Você sabe o paradeiro da Presidente do Conselho Estudantil Geral?"
201100-30 = "……Como? O que quer dizer?"
201100-31 = "Não foi você mesmo quem disse?#nQue a atual Presidente é como uma réplica que substitui o real."
201100-32 = "Se a Presidente atual é uma réplica, onde está a verdadeira?"
201100-33 = "……Oh."
201100-34 = "Algo que pertence ao mundo negando a simulação do mundo……?#nUm fenômeno incompreensível."
201100-35 = "O que é você? Por que enxerga o irreal com olhos do real?"
201100-36 = "De quem vem a sua autoridade? Do Sensei?#nOu da Presidente do Conselho?"
201100-37 = "Ou será que algo em você se quebrou a ponto de comprometer o raciocínio――"
201100-38 = "……!"
201100-43 = "[ns1] \"Pare.\"\n[ns2] \"Encoste na minha aluna e perderei a razão.\""
201100-46 = "……Perdão. Não pretendia causar dano algum."
201100-47 = "Sou observador e explorador.#nE, por minha natureza de pesquisador……#nquando encontro uma \"variante\", o interesse me toma."
201100-48 = "Deixando de lado, por hora, a interpretação sobre ela, respondo à pergunta……"
201100-49 = "A réplica não é aquilo que esconde a verdade.#nA réplica é, ela própria, a verdade."
201100-50 = "Está dizendo que a atual Presidente é a verdadeira?"
201100-51 = "Existe apenas a realidade. Ser mentira ou verdade não tem importância."
201100-52 = "E a prova é esta……#nfundamentos ou razões capazes de negar a Presidente atual#njá não restam neste mundo, não é?"
201100-53 = "Não pode ser……"
201100-58 = "[ns] \"Não mude de assunto, por favor.\""
201100-62 = "[ns3] \"Pra salvar minhas alunas, não preciso de causas nobres nem de discurso bonito.\"\n[ns4] \"Se pretende seguir confundindo com \"baboseiras\"……\"\n[ns5] \"a conversa acaba aqui.\""
201100-66 = "[ns] \"Onde está a Presidente do Conselho agora?\""
201100-67 = "Localizar o paradeiro não deve ser seu verdadeiro objetivo…… entendo.#nVocê procura um meio de quebrar esta simulação."
201100-68 = "Nesse caso, você já possui esse meio, Sensei."
201100-69 = "O mistério guardado na arca sagrada―― o \"Ramo de Shakedia\", que observa a verdade."
201100-70 = "Se observar a Ideia através desse ramo,#na réplica se desfará por si só, como sombra diante da luz."
201100-74 = "[ns6] \"Não me faça repetir.\"\n[ns7] \"Onde está a Presidente do Conselho agora?\""
201100-77 = "……Está bem."
201100-78 = "Recortar signos por conveniência não me agrada, mas, se é o que deseja,#nque assim seja."
201100-79 = "Falemos por hipótese."
201100-80 = "Quando todos aceitam como verdadeira a proposição \"os cisnes são brancos\",#nqual é o melhor meio de provar que existe um \"cisne negro\"?"
201100-81 = "……Mostrar diretamente um cisne negro, suponho."
201100-82 = "Precisamente. O melhor meio de negar a realidade é exibir um contraexemplo."
201100-83 = "Ainda assim, trazer \"a verdadeira Presidente do Conselho\" não será tarefa fácil.#nEntão…… sem exibir ao menos penas negras, não nascerá convencimento."
201100-84 = "Este mundo se transformou subitamente na noite passada.#nAs contradições ainda estão espalhadas pelos quatro cantos dele."
201100-85 = "Se deixadas de lado, talvez sejam engolidas pelo fluxo de informação e se percam.#nMas, se registradas e fixadas, servirão de guia na busca pela Ideia."
201100-86 = "[s] \"……E como se encontram essas contradições?\""
201100-87 = "Basta mergulhar o ramo sagrado que observa a verdade no mar de informações.#nAssim, as penas negras se revelarão por conta própria."
201100-88 = "Mar de informações…… a internet."
201100-89 = "Sim.#nEm especial as redes sociais: a ágora moderna onde se reúnem todos os desejos e boatos do mundo."
201100-90 = "O cotidiano dos cidadãos, o que veem, a impressão de cada um―― tudo registrado em primeira pessoa.#nNão é exagero dizer que essa comunidade fictícia é o símbolo da sociedade moderna."
201100-91 = "Não deve ser coincidência que o mistério em suas mãos, Sensei, tenha a forma de um aparelho de mídia."
201100-92 = "Investigue, colete e registre."
201100-93 = "Se a pena é branca ou negra, quem dirá não será a sua subjetividade,#nmas o ramo sagrado de Shakedia."
201100-94 = "E, acumulando esses registros, no dia em que um \"cisne negro\" estiver completo……#nos cidadãos de Kivotos também notarão a \"anomalia\"."
201100-98 = "[ns] \"Arona, o que você acha?\""
201100-101 = "……É um pouco suspeito, mas instalar um aplicativo de rede social na Baú de Shittim não é problema."
201100-102 = "O MomoTalk também é um tipo de rede social, afinal."
201100-103 = "Mas coletar e organizar informações de tantas fontes indefinidas da internet……#naté pra super IA Arona vai levar um tempinho."
201100-104 = "Uhh…… me sinto como quem lembrou, na véspera da volta às aulas,#nque tinha que fazer o [ruby=Trabalho]diário[/ruby] de observação do feijão……"
201100-105 = "Preocupação desnecessária."
201100-106 = "As funções do \"Baú de Shittim\" estão mais reforçadas que antes.#nPortanto, se eu assumir o trabalho que a veterana fazia,#nnão haverá grandes problemas."
201100-107 = "Já fazia tempo que eu queria reduzir a carga da veterana.#nA gestão de turnos e os relatórios diários, creio que posso assumir……"
201100-108 = "Não acredito! Já tá de olho no posto de veterana?!"
201100-109 = "Você pode até ser uma operadora de IA supercompetente, Planinha,#nmas o posto de secretária do Sensei eu não entrego!"
201100-110 = "……"
201100-111 = "M-Mas! Eu sou uma veterana de coração enorme."
201100-112 = "Se for revezando…… posso até dividir o trabalho com você."
201100-113 = "Obrigada, veterana."
201100-114 = "Então a adição da nova função de rede social está aprovada."
201100-115 = "Sensei, a decisão é sua."
201100-118 = "[ns] \"……Certo. Vou aceitar a sua proposta.\""
201100-119 = "Boa escolha."
201100-126 = "Explorar os mistérios deste mundo.#nQue alegria trilhar essa jornada com o Sen――"
201100-130 = "[ns8] \"Não pretendo me aliar a você.\"\n[ns9] \"Só farei o que estiver ao meu alcance pra ajudar minhas alunas.\""
201100-138 = "Sim, compreendo perfeitamente."
201100-139 = "Afinal, um adulto decente não mistura sentimentos pessoais com trabalho."
201100-145 = "……É ISSO AÍ!!"
201100-146 = "Desta vez, fico feliz que o Sensei tenha tomado uma decisão \"racional\"."
201100-147 = "Ah, antes que eu esqueça.#nPara coletar informações de forma aleatória e sem vieses, o ideal é o anonimato."
201100-148 = "Concedo a você o acesso a uma conta que possuo. Faça bom uso dela.#nUm agradecimento modesto por ter dado ouvidos à minha história."
201100-150 = "Então, divirta-se com a mídia."