[translation]
201100-1 = "Эпизод 10;Маскарад"
201100-2 = "Питейный бар «Триада»"
201100-5 = "[ns] «Оруэлл...?»"
201100-6 = "Не забивайте себе голову именем. Важен сам «символ»."
201100-7 = "Если мой облик привёл к какому-то недопониманию, позвольте прояснить: #n«Телеэкран» не просто изрыгает информацию в одностороннем порядке."
201100-8 = "Скорее, он наблюдает за собеседником и собирает сведения, тем самым делая диалог возможным."
201100-9 = "В связи с этим, на сей раз вопрос задам я."
201100-10 = "Тайна, которой вы обладаете, Сенсей... она кажется несколько отличной от прежней."
201100-11 = "Она словно таит в себе новую возможность, которой раньше не существовало —"
201100-12 = "[s] «Ты знаешь об \"Ветви Шале\"?»"
201100-13 = "Ветвь Шале...?!"
201100-14 = "О, неужели? Неужели это та самая «ветвь»?"
201100-15 = "Я знал, что вы носитель таинственной силы, Сенсей, но... #nЭто самый впечатляющий «символ», какой я только знал!"
201100-16 = "«Ветвь», которая изначально должна быть в руках Президента Главного студенческого совета, теперь находится внутри Ковчега. #nЭто значит..."
201100-20 = "...Понимаю. Стало быть, воссозданная реликвия."
201100-21 = "Однако в этом мире, где образы заменяют реальность, эту копию можно назвать реликвией, обладающей подлинной ценностью."
201100-22 = "...Совсем как «нынешний Президент Главного студенческого совета»."
201100-28 = "Текст, который вы представляете, всегда превосходит мои ожидания. Он перешагивает через клише."
201100-29 = "Вы знаете, где находится Президент Главного студенческого совета?"
201100-30 = "...Прошу прощения? Что вы под этим подразумеваете?"
201100-31 = "Разве вы не сами это только что сказали? #nЧто нынешний Президент Главного студенческого совета подобна копии, подменяющей собой реальность."
201100-32 = "Если нынешний Президент Главного студенческого совета — копия, то где же настоящая?"
201100-33 = "...О боже, боже."
201100-34 = "Что-то, что принадлежит миру, но при этом отрицает симуляцию этого мира...? #nФеномен, который я не в силах постичь."
201100-35 = "Кто вы такой? Почему вы смотрите на нереальное глазами реальности?"
201100-36 = "От кого вы получили свои полномочия? От Сенсея? Или от Президента Главного студенческого совета?"
201100-37 = "Или, быть может, внутри вас что-то сломалось до такой степени, что вы больше не способны мыслить рационально —"
201100-38 = "...!"
201100-43 = "[ns1] «Прекрати это».\n[ns2] «Я не проявлю милосердия, если ты посмеешь тронуть моих студентов»."
201100-46 = "...Прошу прощения. У меня не было намерения причинить вред."
201100-47 = "В силу моей природы как наблюдателя, искателя и исследователя Гематрии... #nЯ неизменно нахожусь в заинтригованном состоянии всякий раз, когда сталкиваюсь с «девиацией»."
201100-48 = "Оставив на время мою интерпретацию её личности, позвольте мне ответить на ваш вопрос..."
201100-49 = "Симулякр — это не сущность, которая скрывает истину. #nСимулякр сам по себе и есть истина."
201100-50 = "Ты хочешь сказать, что нынешняя Президент Главного студенческого совета и есть настоящая?"
201100-51 = "Реальность просто существует. А ложь это или правда — не имеет значения."
201100-52 = "И в качестве доказательства... в этом мире ведь больше не осталось ни единого основания или причины, чтобы отрицать нынешнюю Президента Главного студенческого совета, верно?"
201100-53 = "Не может быть..."
201100-58 = "[ns] «Не пытайся сменить тему»."
201100-62 = "[ns3] «Мне не нужны великие цели или красивые слова, чтобы спасать своих студентов».\n[ns4] «Если ты намерен и дальше путать меня своим \"абсурдом\"...»\n[ns5] «Этот разговор окончен»."
201100-66 = "[ns] «Где сейчас находится Президент Главного студенческого совета?»"
201100-67 = "Поиск её местонахождения ведь не является вашей истинной целью, верно? ...Понимаю. #nВы ищете способ разрушить эту симуляцию."
201100-68 = "Если так, Сенсей, то вы уже обладаете необходимыми средствами."
201100-69 = "Тайна, сокрытая внутри Ковчега — та самая «Ветвь Шале», способная созерцать истину."
201100-70 = "Если вы взглянете на Идею через эту ветвь, симулякр естественным образом рассеется, словно тень перед лицом света."
201100-74 = "[ns6] «Я не стану повторять дважды».\n[ns7] «Где сейчас находится Президент Главного студенческого совета?»"
201100-77 = "...Понял вас."
201100-78 = "Я не любитель судить о символах из соображений выгоды, но если таково ваше желание, у меня нет выбора."
201100-79 = "Давайте поговорим на языке гипотез."
201100-80 = "Когда абсолютно каждый в мире принимает утверждение о том, что «лебеди белые», за истину, какой, по-вашему, лучший способ доказать существование «чёрного лебедя»?"
201100-81 = "...Показать им чёрного лебедя напрямую, возможно?"
201100-82 = "Именно. Лучший способ опровергнуть реальность — предъявить контрпример."
201100-83 = "Однако привести «настоящую Президента Главного студенческого совета» — задача не из лёгких. #nТогда... как минимум, вы должны показать чёрное перо, иначе вашим словам будет не хватать убедительности."
201100-84 = "Этот мир резко изменился прошлым вечером. «Противоречия» всё ещё рассеяны по всему свету."
201100-85 = "Если оставить их без внимания, они могут быть поглощены потоком информации и со временем выветриться. #nНо если вы запишете и зафиксируете их, они станут ориентирами для поиска Идеи."
201100-86 = "[s] «...Как мне найти эти противоречия?»"
201100-87 = "Просто забросьте священную ветвь, созерцающую истину, в море информации. #nИ тогда чёрные перья сами явят себя."
201100-88 = "Море информации... ты имеешь в виду интернет."
201100-89 = "Да. #nВ особенности соцсети и медиаресурсы; они представляют собой современную агору, где собираются все земные желания и слухи."
201100-90 = "Повседневная жизнь граждан, события, свидетелями которых они становятся, и мысли каждого отдельного человека записываются от первого лица. #nНе будет преувеличением сказать, что это вымышленное сообщество является символом современного социума."
201100-91 = "И вовсе не случайно тайна, которой вы обладаете, принимает форму медийного устройства."
201100-92 = "Исследуйте, собирайте и записывайте."
201100-93 = "Цвет пера, белый он или чёрный, должен определяться не вашей субъективностью, а священной Ветвью Шале."
201100-94 = "И в тот день, когда эти записи накопятся и сложится образ хотя бы одного «чёрного лебедя»... #nграждане Кивотоса тоже заметят «аномалию»."
201100-98 = "[ns] «Арона, что думаешь?»"
201100-101 = "...Это выглядит несколько подозрительно, но нет никаких проблем с тем, чтобы установить приложение социальной сети Frulink."
201100-102 = "В конце концов, МомоТолк — это тоже разновидность соцсети."
201100-103 = "Однако, чтобы собирать и упорядочивать информацию от неограниченного круга людей в интернете, #nможет потребоваться немного времени даже для такого супер-ИИ, как Арона."
201100-104 = "Уф... Ощущение, будто мне велели завести дневник наблюдений за цветами за день до окончания летних каникул..."
201100-105 = "Это беспокойство излишне."
201100-106 = "Функции «Frulink» были расширены сильнее, чем прежде. #nПоэтому, если я возьму на себя ту работу, которую выполняла старшая..."
201100-107 = "Я давно хотела уменьшить нагрузку на старшую. Думаю, я смогу справиться с такими вещами, как ведение расписания дежурств и ежедневные отчеты..."
201100-108 = "Только не говори мне, что ты уже метишь на место старшей?!"
201100-109 = "Пусть даже Плана-тян — талантливый ИИ-оператор, #nя ни за что не уступлю роль секретаря Сенсея!"
201100-110 = "..."
201100-111 = "Н-но! Я великодушная старшая."
201100-112 = "Если мы будем делать это по очереди... я не против разделить работу с тобой."
201100-113 = "Спасибо, старшая."
201100-114 = "Тогда мы можем приступить к добавлению новой функции соцсети."
201100-115 = "Сенсей, пожалуйста, примите решение."
201100-118 = "[ns] «...Понимаю. Я соглашусь на твой план»."
201100-119 = "Хороший выбор."
201100-126 = "Исследование тайн этого мира. Я счастлив иметь возможность пройти этот путь вместе с вами, Сенсей —"
201100-130 = "[ns8] «Я не намерен объединяться с тобой».\n[ns9] «Я просто делаю всё, что в моих силах, чтобы помочь своим студентам»."
201100-138 = "Да, разумеется, я прекрасно это понимаю."
201100-139 = "В конце концов, порядочный взрослый человек не смешивает личные чувства с работой."
201100-145 = "...Вот это настрой!"
201100-146 = "Я рад, что на этот раз Сенсей принял «рациональное» решение."
201100-147 = "А, кстати говоря. #nЧтобы собирать информацию случайным образом и без предвзятости, лучше всего оставаться анонимным."
201100-148 = "Я предоставлю вам доступ к аккаунту, которым владею. Пожалуйста, распорядитесь им с умом. #nСкромный знак благодарности за то, что вы выслушали меня."
201100-150 = "А теперь, пожалуйста, наслаждайтесь медиа."