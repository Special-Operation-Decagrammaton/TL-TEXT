[translation]
201100-1 = "Episode 10;Masquerade"
201100-2 = "Drink Bar 'Triad'"
201100-5 = "[ns] \"Orwell...?\""
201100-6 = "Do not concern yourself with the name. What matters is the 'symbol'."
201100-7 = "If my appearance has led to any misunderstandings, let me clarify: #nA 'telescreen' does not merely spew out information unilaterally."
201100-8 = "Rather, it observes the other party and gathers information, thereby making dialogue possible."
201100-9 = "In that sense, I shall ask you a question this time."
201100-10 = "The mystery you possess, Sensei... it seems somewhat different from the previous one."
201100-11 = "It is as if it contains a new possibility that did not exist before—"
201100-12 = "[s] \"Do you know about the 'Shale Branch'?\""
201100-13 = "The Shale Branch...!?"
201100-14 = "Oh, could it be? Is it truly that 'branch'?"
201100-15 = "I knew you were the bearer of mysterious power, Sensei, but... #nThat is the most impressive 'symbol' I have ever known!"
201100-16 = "The 'branch' that should originally be in the hands of the General Student Council President is now inside the Ark. #nThat means..."
201100-20 = "...I see. A replicated relic, then."
201100-21 = "However, in this world where images replace reality, that replica can be said to be a relic with genuine value."
201100-22 = "...Much like the 'current General Student Council President'."
201100-28 = "The text you present always exceeds my expectations. It transcends clichés."
201100-29 = "Do you know the whereabouts of the General Student Council President?"
201100-30 = "...Excuse me? What do you mean by that?"
201100-31 = "Did you not say it yourself? #nThat the current General Student Council President is like a replica replacing reality."
201100-32 = "If the current General Student Council President is a replica, then where is the real one?"
201100-33 = "...My, my."
201100-34 = "Something that belongs to the world, yet denies the world's simulation...? #nA phenomenon I cannot comprehend."
201100-35 = "What are you? Why do you look at the unreal with eyes of reality?"
201100-36 = "From whom did you receive your authority? Sensei? Or the General Student Council President?"
201100-37 = "Or perhaps, have you broken somewhere to the point where you can no longer think rationally—"
201100-38 = "...!"
201100-43 = "[ns1] \"Stop it.\"\n[ns2] \"I won't show mercy if you lay a hand on my students.\""
201100-46 = "...My apologies. I had no intention of causing harm."
201100-47 = "Due to my nature as an observer, a seeker, and a Gematria researcher... #nI find myself intrigued whenever I encounter a 'variant'."
201100-48 = "Setting aside my interpretation of her for a moment, let me answer your question..."
201100-49 = "A simulacrum is not an entity that hides the truth. #nThe simulacrum itself is the truth."
201100-50 = "Are you saying the current General Student Council President is the real one?"
201100-51 = "Reality simply exists. Whether it is a lie or the truth is irrelevant."
201100-52 = "As proof... there is no longer any basis or reason left in this world to deny the current General Student Council President, is there?"
201100-53 = "That can't be..."
201100-58 = "[ns] \"Don't try to change the subject.\""
201100-62 = "[ns3] \"I don't need grand causes or pretty words to save my students.\"\n[ns4] \"If you intend to confuse me with more 'nonsense'...\"\n[ns5] \"This conversation is over.\""
201100-66 = "[ns] \"Where is the General Student Council President right now?\""
201100-67 = "Finding her location is not your true goal, is it? ...I see. #nYou are looking for a way to break this simulation."
201100-68 = "If so, Sensei, you already possess the means."
201100-69 = "The mystery housed within the Ark—the 'Shale Branch' that can observe the truth."
201100-70 = "If you observe the Idea through that branch, the simulacrum will naturally vanish like a shadow before the light."
201100-74 = "[ns6] \"I won't say it twice.\"\n[ns7] \"Where is the General Student Council President right now?\""
201100-77 = "...Understood."
201100-78 = "I am not fond of judging symbols based on expediency, but if that is what you desire, I have no choice."
201100-79 = "Let us speak in hypotheticals."
201100-80 = "When everyone in the world accepts the proposition that 'swans are white' as true, what do you think is the best way to prove the existence of a 'black swan'?"
201100-81 = "...By showing them a black swan directly, perhaps?"
201100-82 = "Precisely. The best way to deny reality is to show a counterexample."
201100-83 = "However, bringing the 'real General Student Council President' is not an easy task. #nThen... at the very least, you must show a black feather, or it will lack persuasiveness."
201100-84 = "This world changed abruptly last night. The 'contradictions' are still scattered throughout the world."
201100-85 = "If left alone, they may be swallowed by the flow of information and weather away. #nBut if you record and fix them, they will become indicators to find the Idea."
201100-86 = "[s] \"...How can I find those contradictions?\""
201100-87 = "Simply cast the holy branch that observes the truth into the sea of information. #nThen, the black feathers will reveal themselves."
201100-88 = "The sea of information... you mean the internet."
201100-89 = "Yes. #nEspecially SNS and social media; they are the modern agora where all the world's desires and rumors gather."
201100-90 = "The daily lives of citizens, the events they witness, and each individual's thoughts are recorded in the first person. #nIt is no exaggeration to say that this fictional community is the symbol of modern society."
201100-91 = "It is no coincidence that the mystery you possess takes the form of a media device."
201100-92 = "Investigate, collect, and record."
201100-93 = "Whether the color of the feather is white or black should not be determined by your subjectivity, but by the holy Shale Branch."
201100-94 = "And on the day those records accumulate and a single 'black swan' is completed... #nthe citizens of Kivotos will also notice the 'anomaly'."
201100-98 = "[ns] \"Arona, what do you think?\""
201100-101 = "...It is somewhat suspicious, but there is no problem with installing a social media app on the Shittim Chest."
201100-102 = "MomoTalk is a type of SNS, after all."
201100-103 = "However, to collect and organize information from an unspecified number of people on the internet, #nit might take a little time even for a super AI like Arona."
201100-104 = "Ugh... I feel like I've been told to start a morning glory observation diary the day before summer vacation ends..."
201100-105 = "That concern is unnecessary."
201100-106 = "The functions of the 'Shittim Chest' have been enhanced more than before. #nTherefore, if I take over the work that the senior was doing, #nI don't think there will be any major problems."
201100-107 = "I have wanted to reduce the senior's burden for a while now. #nI believe I can handle things like duty management and daily reports..."
201100-108 = "Don't tell me, are you already aiming for the senior's seat!?"
201100-109 = "Even if Plana-chan is a talented AI operator, #nI won't give up the role of Sensei's secretary!"
201100-110 = "..."
201100-111 = "B-but! I am a broad-minded senior."
201100-112 = "If we take turns... I don't mind sharing the work with you."
201100-113 = "Thank you, senior."
201100-114 = "Then, we can proceed with adding the new social media function."
201100-115 = "Sensei, please make your decision."
201100-118 = "[ns] \"...Understood. I'll go along with your plan.\""
201100-119 = "A good choice."
201100-126 = "Exploring the mysteries of this world. I am happy to be able to walk this path with you, Sensei—"
201100-130 = "[ns8] \"I have no intention of teaming up with you.\"\n[ns9] \"I'm just doing what I can to help my students.\""
201100-138 = "Yes, I understand that perfectly, of course."
201100-139 = "After all, a proper adult does not mix personal feelings with work."
201100-145 = "...That's the spirit!"
201100-146 = "I am glad that Sensei has made a 'rational' decision this time."
201100-147 = "Ah, by the way. #nTo collect information randomly without bias, it would be best to remain anonymous."
201100-148 = "I will grant you access to the account I possess. Please make good use of it. #nA small token of gratitude for listening to what I had to say."
201100-150 = "Now, please enjoy the media."