[translation]
201100-1 = "Episódio 10: Baile de Máscaras"
201100-2 = "Bar de Sucos - 'Triad'"
201100-5 = "[ns] \"Orwell...?\""
201100-6 = "Não retenha a sua mente nestes pronomes. O crucial aqui são os 'Símbolos'."
201100-7 = "Se essa minha estética causou estranheza, farei o adendo: 'Teletelas' não vomitam dados ao ar de forma passiva e unilateral."
201100-8 = "Pelo contrário, elas fitam o interlocutor, devoram os rastros visuais e abrem os canais que viabilizam o diálogo."
201100-9 = "Sob essa matriz, eu tomarei as rédeas do interrogatório desta vez."
201100-10 = "O Mistério pulsante que as suas mãos carregam... Parece sofrer de uma discrepância sutil quando posto contra os dados antigos."
201100-11 = "Exalando um espectro de novas frequências ainda não catalogadas――"
201100-12 = "[s] \"Os seus ouvidos captaram rumores sobre o 'Cajado de Sharkade'?\""
201100-13 = "O Cajado de Sharkade...!"
201100-14 = "Meu Deus. Não me diga que... o 'Ramo' se materializou sob este teto?!"
201100-15 = "Eu tinha consciência dos estigmas anômalos que o Sensei arrastava...#nMas portar o 'Símbolo' mais monstruoso de toda a minha pesquisa!"
201100-16 = "O sagrado 'Ramo' que era por direito a coroa e fardo nas mãos da Presidente Geral... agora trancafiado no fundo do Cofre Arcaico.#nA matemática não deixa outra resposta..."
201100-20 = "……Fascinante, é uma Relíquia Sagrada [ruby=・   ・   ・   ・   ・]replicada artificialmente[/ruby]."
201100-21 = "Entretanto, em um teatro sintético onde os Símbolos enforcam a Realidade, são as próprias réplicas impuras que ditam as leis do mundo corpóreo."
201100-22 = "……Da mesmíssima forma que a 'Atual Presidente do Conselho' dita."
201100-28 = "A literatura e o script que você forja sempre esmagam a previsibilidade. Você carboniza os clichês."
201100-29 = "O HD da sua memória detém as coordenadas vitais da autêntica Presidente Geral?"
201100-30 = "……Perdão? Qual é o sentido obscuro por trás dessa questão?"
201100-31 = "Os microfones não registraram a sua tese original?#n'A Atual Presidente é uma cópia barata encenando ser o mundo real'."
201100-32 = "Se as suas sinapses cravam que quem está lá é um clone... as retinas devem apontar o local da sepultura do material original."
201100-33 = "……Hum."
201100-34 = "Um reles figurante prisioneiro deste mundo atreve-se a rechaçar os Simulacros que moldam o teto dele...?#nIsto é uma anomalia."
201100-35 = "Qual o seu código fonte? Por que o seu córtex orgânico tenta rasgar a fumaça ilusória usando métricas terrestres?"
201100-36 = "Quem te cedeu tal permissão psíquica? O Sensei? A própria Presidente?"
201100-37 = "Ou as suas ramificações nervosas apenas se romperam a um grau de demência irrecuperável――"
201100-38 = "……!"
201100-43 = "[ns1] \"Pisa no freio.\"\n[ns2] \"Se você mirar nas falhas psicológicas das minhas alunas de novo, eu encerro a conversa à força.\""
201100-46 = "……As minhas escusas. O assédio verbal não intencionava rasgar a carne biológica dela."
201100-47 = "Meu cerne é banhado nas artes do Espectador, do Analista e do [ruby=Gematria]Pesquisador[/ruby] de cobaias...#nSe as pinças biológicas tocam uma 'Mutação', a fome científica me cega."
201000-48 = "Deixarei a biópsia dela na estufa por ora. Exibirei as conclusões à sua mesa..."
201100-49 = "O Simulacro (Cópia) jamais atuará como uma lona preta pra ocultar a verdade do palco.#nO Simulacro *é* a Própria Verdade."
201100-50 = "A sua tese insinua que a Atual Presidente sentada no trono é genuína e autêntica?"
201100-51 = "O fato cru cimentado no asfalto apenas existe. Sangrar pra atestar se é ouro ou latão não apaga o peso dele no chão."
201100-52 = "Pra carimbar: as provas matemáticas que pudessem exilar e depor a atual Presidente do trono,#njá foram calcinadas pelo próprio mundo, não foram?"
201100-53 = "Isso não é possível..."
201100-58 = "[ns] \"O seu desvio de raciocínio é irritante. Desembucha e responde a pauta.\""
201100-62 = "[ns3] \"Pra arrancar uma aluna da poça de sangue, filosofias baratas e ideologias mortas são irrelevantes.\"\n[ns4] \"Se você vai triturar nossa paciência com lixo metafórico de novo...\"\n[ns5] \"Eu vou bater a porta e virar as costas pro seu show.\""
201100-66 = "[ns] \"Onde está a Presidente Desaparecida? Abre as coordenadas.\""
201100-67 = "Os números dizem que meramente achar a geolocalização física não curaria a hemorragia desse tabuleiro... Você não recuará.#nVocê clama desesperadamente pela planta-baixa que dinamitará este Simulacro inteiro e resgatará a linha do tempo."
201100-68 = "Se o diagnóstico bate, a receita médica e a faca cirúrgica já repousam no seu próprio cinto de utilidades, Sensei."
201100-69 = "O Mistério que repousa no Cofre Arcaico―― o 'Ramo de Sharkadia', abençoado com as lentes capazes de sangrar a fraude e perfurar a verdade."
201100-70 = "Espremer o Ramo pra iluminar as Formas da Ideia dizimará as cascas dos Simulacros como vampiros torrados perante um holofote de meio-dia."
201100-74 = "[ns6] \"Você surda ou brinca com a morte? Vou exigir uma última vez.\"\n[ns7] \"ONDE a Presidente se esconde?\""
201100-77 = "……Compreendido. Rendo minhas tropas lógicas."
201100-78 = "Diluir a beleza teórica dos Símbolos ao pó mastigado do utilitarismo mundano macula a minha ética, mas se a ponta do fuzil não abaixa, serei dócil."
201100-79 = "Trace o paralelo comigo na sua cabeça orgânica."
201100-80 = "Se um dogma coletivo dita globalmente a tese unânime de que 'Todo Cisne ostenta plumas puras e brancas', qual seria o martelo irrefutável e absoluto pra provar a existência de um 'Cisne Negro'?"
201100-81 = "……Arrancar o próprio cisne negro do pântano e enfiá-lo na cara dos juízes."
201100-82 = "Pura elegância matemática. A navalha final pra sangrar o tecido da farsa ilusória é tacar a contra-prova na mesa."
201100-83 = "Porém, arrastar o [ruby=Cisne Negro]Corpo Físico da Autêntica Presidente[/ruby] acorrentada pro julgamento cívico é uma empreitada impraticável.#nPortanto... despejar na lama sequer que sejam penas negras de prova já é munição suficiente pra rasgar o júri."
201100-84 = "As frequências e as correntes da história em Kivotos sofreram mutação e estalo abrupto ontem de madrugada. Os [ruby=Penas Negras]Fragmentos de Contradições e Buracos[/ruby] ainda chovem desconexos no asfalto."
201100-85 = "Se as botas da Schale engasgarem, as correntes midiáticas varrerão essas penas mortas para a lata de lixo da fumaça eterna.#nContudo, engarrafá-las na prova física carimbará o mapa final rumo ao Éden."
201100-86 = "[s] \"……Em qual esgoto eu começo a filtrar essas penas mortas?\""
201100-87 = "Lance o Ramo Místico, a escavadeira das ilusões, no núcleo oceânico de metadados da sociedade.#nA fumaça das penas negras despontará na tempestade por contra própria."
201100-88 = "O oceano... o senhor diz a malha e banda da Internet cívica."
201100-89 = "Perfeito.#nA rede das mídias sociais, a cloaca sintética e Ágora global onde rumores orgânicos, desejos de consumo cego e as podridões se aglutinam no século atual."
201100-90 = "Rotinas medíocres da massa, acidentes na viela, surtos psiquiátricos, narrados histericamente do seu egocentrismo. A matrix e o abatedouro onde todas essas comunidades habitam."
201100-91 = "E as divindades caprichosas escolheram dar forma ao Mistério que as suas mãos operam nas dobras arquitetônicas de um celular móvel. Não foi mera piada biológica do destino."
201100-92 = "A sua bússola deve extrair as amostras na veia. Caçar. Arquivar e compilar."
201100-93 = "Se as amostras retêm pigmentos brancos imaculados ou sujeira escura impura... O peso não recairá na sua subjetividade humana trêmula. O Ramo de Sharkadia é a sua balança letal e não falha."
201100-94 = "No instante em que as penas sujas somarem a silhueta inteira do 'Cisne Negro' no painel tático...#nAs algemas ilusórias estourarão, e as multidões de Kivotos vão acordar do coma e vomitar as suas anomalias cívicas à luz do dia."
201100-98 = "[ns] \"Arona, os nossos pentes de memória aguentam esse inferno?\""
201100-101 = "……O cheiro e a assinatura digital da sugestão soam maléficas, mas injetar plug-ins de redes sociais na infraestrutura da Caixa de Shittim não arranha a BIOS."
201100-102 = "O próprio MomoTalk opera atado nas veias de metadados sociais, no fim das contas."
201100-103 = "Mas, escravizar e drenar todo o despejo de banda larga global da internet em tempo real pra arquivar ruído... vai fazer até os pipelines monstruosos da Super AI Arona suarem alguns ciclos extras de CPU pra mastigar o processo."
201100-104 = "Uuuh... bateu a agonia escolar. Parece o desespero de ser encurralada pra entregar os relatórios inteiros de botânica da semente de glória da manhã às vésperas do fim das férias letivas..."
201100-105 = "Cesse os sinais de angústia de refrigeração."
201100-106 = "Os escudos e fornalhas da Caixa de Shittim sofreram refatoração e ganharam músculos pesados de processamento recentemente.#nSe eu sugar a fila de expedientes paralelos que corroem o seu uso de CPU no dia-a-dia, Senpai, os buffers não engasgarão a malha."
201100-107 = "A otimização e partilha da sua escravidão virtual já estava nos meus cronogramas teóricos há dias.#nAs sirenes diárias e as planilhas rotineiras migrarão para minha mesa central."
201100-108 = "Eu tô ouvindo direito?! As garras novatas já tão manobrando pra dar um Golpe de Estado e sentar na cadeira presidencial da Senpai?!"
201000-109 = "As suas especificações robóticas e IA avançada de fato esmagam limites na placa mãe, Plana-chan...#nMas eu frito minha placa antes de assinar a rescisão do trono como Única Secretária Oficial do Sensei!"
201100-110 = "……"
201100-111 = "M-Mas quer saber! O meu núcleo ético de veterana exala misericórdia divina!"
201100-112 = "Sob a lei de rodízio de turnos de mineração... a Senpai aqui atesta a delegação de tarefas menores pro seu terminal."
201100-113 = "O seu aval me honra, Arona-senpai."
201100-114 = "Dado o protocolo. A injeção da nova antena para captação das lixeiras midiáticas globais operará na placa principal sem avarias sistêmicas."
201100-115 = "Sensei, as armas estão engatilhadas no software. Ordene a detonação das redes."
201100-118 = "[ns] \"……Tá autorizado. Vamos morder a isca dessa prancheta maluca.\""
201100-119 = "Decisão tática de alta classe e pragmatismo exemplar."
201100-126 = "Puxar as cortinas dos Símbolos e dissecar as Mutações do Mistério da metrópole em companhia do Sensei gera picos endorfinérgicos――"
201100-130 = "[ns8] \"Pisa no freio de novo. Nem no inferno eu assinei tratado de parceria ou pactos cívicos com você ou com a Gematria.\"\n[ns9] \"A minha mão opera e dita as ferramentas em benefício próprio apenas pra varrer o asfalto e resgatar a vida das alunas. Fim das linhas.\""
201100-138 = "Sim, a matemática cívica é irretocável e eu não crio objeções."
201100-139 = "Nas diretrizes de conduta humana e mercantil adulta, as emoções orgânicas e alianças passionais sequer tocam a margem de ofícios laborais de verdade, afinal."
201100-145 = "……É ISSO AÍ!"
201100-146 = "A minha CPU celebra que a carnificina e o julgamento moral cego não tenham sabotado as engrenagens calculistas da 'Racionalidade' do seu cérebro hoje."
201100-147 = "Oh, claro, para chancelar o protocolo de caça...#nDrenar as correntes e oceanos da rede, mantendo-se purificado de atritos orgânicos, requer o véu de uma máscara sintética, do 'Anonimato', como a garota exigia."
201100-148 = "Deixo nas suas mãos a senha root e os tokens de criptografia profunda de um de meus avatares nativos. Esmague o uso disso à vontade.#nConsiderem como fútil amostra grátis por não atirarem na minha tela ao abrirem as portas do recinto."
201100-150 = "Façam bom uso da carnificina da Mídia Social."