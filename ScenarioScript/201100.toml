[translation]#[Texto Final. mas eventualmente pode haver alterações na formatação de texto. - Filipe 03/07.]
201100-1 = "Episódio 10: Baile de Máscaras"
201100-2 = "Drink Bar \"Triad\""
201100-5 = "[ns] \"Orwell……?\""
201100-6 = "Não se prenda ao nome. O que importa\né o \"signo\"."
201100-7 = "Se a minha aparência o induz ao equívoco,\npermita-me acrescentar:#na \"teletela\" não é algo que apenas cospe\ninformações unilateralmente."
201100-8 = "Pelo contrário: ao observar o outro e\ncoletar informações, ela torna\no diálogo possível."
201100-9 = "Nesse sentido, desta vez a pergunta\nparte de mim."
201100-10 = "O mistério que você carrega, Sensei……\nparece um tanto diferente do anterior."
201100-11 = "Como se contivesse uma possibilidade nova,\ninexistente até então――"
201100-12 = "[s] \"Conhece o 'Cajado de Shaked'?\""
201100-13 = "O Cajado de Shaked……?!"
201100-14 = "Oh, não me diga. É realmente\naquele \"Ramo\"?"
201100-15 = "Eu sabia que você possuía poderes\ninexplicáveis, Sensei……#nMas esse é o \"símbolo\" mais impressionante\nde que tenho conhecimento!"
201100-16 = "O \"Ramo\" que deveria estar com a Presidente\ndo Conselho jaz agora na arca sagrada.#nIsso significa……"
201100-20 = "……Entendo. Uma relíquia sagrada replicada."
201100-21 = "Ainda assim, neste mundo em que a imagem\nsubstitui o real, é a réplica que se torna\na relíquia de valor concreto."
201100-22 = "……Tal como a \"atual Presidente\ndo Conselho Estudantil Geral\"."
201100-28 = "O texto que você me mostra, Sensei, sempre\nsupera as expectativas. Vai além do clichê."
201100-29 = "Você sabe o paradeiro da Presidente\ndo Conselho Estudantil Geral?"
201100-30 = "……Como? O que quer dizer?"
201100-31 = "Não foi você mesmo quem disse?#nQue a atual Presidente é como uma réplica\nque substitui o real."
201100-32 = "Se a Presidente atual é uma réplica,\nonde está a verdadeira?"
201100-33 = "……Oh."
201100-34 = "Algo que pertence ao mundo negando\na simulação do mundo……?#nUm fenômeno incompreensível."
201100-35 = "O que é você? Por que enxerga o irreal\ncom olhos do real?"
201100-36 = "De quem vem a sua autoridade? Do Sensei?\nOu da Presidente do Conselho?"
201100-37 = "Ou será que algo em você se quebrou\na ponto de comprometer o raciocínio――"
201100-38 = "……!"
201100-43 = "[ns1] \"Pare.\"\n[ns2] \"Encoste na minha aluna e não terei piedade.\""
201100-46 = "……Perdão. Não pretendia causar dano algum."
201100-47 = "Sou observador e explorador. E, por minha\nnatureza de pesquisador……#nquando encontro uma \"variante\",\no interesse me toma."
201100-48 = "Deixando de lado, por ora, a interpretação\nsobre ela, respondo à pergunta……"
201100-49 = "A réplica não é aquilo que esconde\na verdade.#nA réplica é, ela própria, a verdade."
201100-50 = "Está dizendo que a atual Presidente\né a verdadeira?"
201100-51 = "Existe apenas a realidade. Ser mentira\nou verdade não tem importância."
201100-52 = "E a prova é esta…… fundamentos ou razões\ncapazes de negar a Presidente atual#njá não restam neste mundo, não é?"
201100-53 = "Não pode ser……"
201100-58 = "[ns] \"Não mude de assunto, por favor.\""
201100-62 = "[ns3] \"Pra salvar meus alunos, não preciso de causas nobres nem de discurso bonito.\"\n[ns4] \"Se pretende seguir confundindo com 'baboseiras'……\"\n[ns5] \"a conversa acaba aqui.\""
201100-66 = "[ns] \"Onde está a Presidente do Conselho agora?\""
201100-67 = "Localizar o paradeiro não deve ser seu\nverdadeiro objetivo…… entendo.#nVocê procura um meio de quebrar\nesta simulação."
201100-68 = "Nesse caso, você já possui esse meio, Sensei."
201100-69 = "O mistério guardado na arca sagrada――\no \"Ramo de Shakedia\", que observa a verdade."
201100-70 = "Se observar a Ideia através desse ramo,\na réplica se desfará por si só, como\nsombra diante da luz."
201100-74 = "[ns6] \"Não me faça repetir.\"\n[ns7] \"Onde está a Presidente do Conselho agora?\""
201100-77 = "……Está bem."
201100-78 = "Recortar signos por conveniência não me\nagrada, mas, se é o que deseja,\nque assim seja."
201100-79 = "Falemos por hipótese."
201100-80 = "Quando todos aceitam como verdadeira a\nproposição \"os cisnes são brancos\", qual é\no melhor meio de provar que existe\num \"cisne negro\"?"
201100-81 = "……Mostrar diretamente um cisne negro,\nsuponho."
201100-82 = "Precisamente. O melhor meio de negar\na realidade é exibir um contraexemplo."
201100-83 = "Ainda assim, trazer \"a verdadeira Presidente\ndo Conselho\" não será tarefa fácil.#nEntão…… sem exibir ao menos penas negras,\nnão nascerá convencimento."
201100-84 = "Este mundo se transformou subitamente na\nnoite passada. As contradições ainda estão\nespalhadas pelos quatro cantos dele."
201100-85 = "Se deixadas de lado, talvez sejam engolidas\npelo fluxo de informação e se percam.#nMas, se registradas e fixadas, servirão\nde guia na busca pela Ideia."
201100-86 = "[s] \"……E como se encontram essas contradições?\""
201100-87 = "Basta mergulhar o ramo sagrado que observa\na verdade no mar de informações.#nAssim, as penas negras se revelarão\npor conta própria."
201100-88 = "Mar de informações…… a internet."
201100-89 = "Sim.#nEm especial as redes sociais: a ágora moderna\nonde se reúnem todos os desejos e boatos\ndo mundo."
201100-90 = "O cotidiano dos cidadãos, o que veem, a\nimpressão de cada um―― tudo registrado em\nprimeira pessoa.#nNão é exagero dizer que essa comunidade\nfictícia é o símbolo da sociedade moderna."
201100-91 = "Não deve ser coincidência que o mistério em\nsuas mãos, Sensei, tenha a forma\nde um aparelho de mídia."
201100-92 = "Investigue, colete e registre."
201100-93 = "Se a pena é branca ou negra, quem dirá não\nserá a sua subjetividade, mas o ramo\nsagrado de Shakedia."
201100-94 = "E, acumulando esses registros, no dia em que\num \"cisne negro\" estiver completo……#nos cidadãos de Kivotos também notarão\na \"anomalia\"."
201100-98 = "[ns] \"Arona, o que você acha?\""
201100-101 = "……É um pouco suspeito, mas instalar um\naplicativo de rede social na Caixa de\nShittim não é problema."
201100-102 = "O MomoTalk também é um tipo\nde rede social, afinal."
201100-103 = "Mas coletar e organizar informações de\ntantas fontes indefinidas da internet……#naté pra super IA Arona vai levar\num tempinho."
201100-104 = "Uhh…… me sinto como quem lembrou, na véspera\nda volta às aulas, que tinha que fazer\no diário de observação do feijão……"
201100-105 = "Preocupação desnecessária."
201100-106 = "As funções da \"Caixa de Shittim\" estão mais\nreforçadas que antes.#nPortanto, se eu assumir o trabalho que\na veterana fazia,#nnão haverá grandes problemas."
201100-107 = "Já fazia tempo que eu queria reduzir a carga\nda veterana.#nA gestão de turnos e os relatórios diários,\ncreio que posso assumir……"
201100-108 = "Não acredito! Já tá de olho no posto\nde veterana?!"
201100-109 = "Você pode até ser uma operadora de IA\nsupercompetente, Planinha,#nmas o posto de secretária do Sensei\neu não entrego!"
201100-110 = "……"
201100-111 = "M-Mas! Eu sou uma veterana de\ncoração enorme."
201100-112 = "Se for revezando…… posso até dividir\no trabalho com você."
201100-113 = "Obrigada, veterana."
201100-114 = "Então a adição da nova função de rede social\nestá aprovada."
201100-115 = "Sensei, a decisão é sua."
201100-118 = "[ns] \"……Certo. Vou aceitar a sua proposta.\""
201100-119 = "Boa escolha."
201100-126 = "Explorar os mistérios deste mundo. Que\nalegria trilhar essa jornada com o Sen――"
201100-130 = "[ns8] \"Não pretendo me aliar a você.\"\n[ns9] \"Só farei o que estiver ao meu alcance pra ajudar meus alunos.\""
201100-138 = "Sim, compreendo perfeitamente."
201100-139 = "Afinal, um adulto decente não mistura\nsentimentos pessoais com trabalho."
201100-145 = "……É assim que a coisa é!"
201100-146 = "Desta vez, fico feliz que o Sensei tenha\ntomado uma decisão \"racional\"."
201100-147 = "Ah, antes que eu esqueça.#nPara coletar informações de forma aleatória\ne sem vieses, o ideal é o anonimato."
201100-148 = "Concedo a você o acesso a uma conta que\npossuo. Faça bom uso dela.#nUm agradecimento modesto por ter dado\nouvidos à minha história."
201100-150 = "Então, divirta-se com a mídia."