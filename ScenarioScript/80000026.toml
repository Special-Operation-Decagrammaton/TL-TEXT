[translation]
80000026-1 = "Produto especial da Academia Federal Red Winter"
80000026-2 = "Academia Federal Red Winter - Portão Principal"
80000026-4 = "(Após receber uma mensagem de Tomoe, visitei a Academia Federal Red Winter)"
80000026-5 = "Seja bem-vindo, Sensei. Estávamos à sua espera."
80000026-6 = "Pelo que ouvi dizer, em Kivotos, hoje é chamado de Dia dos Namorados e é um dia de celebração, não é?"
80000026-7 = "Transmitir sentimentos para alguém a quem é difícil se declarar, através de chocolates... que dia maravilhoso."
80000026-8 = "Por isso, com toda a humildade, preparei algo para o senhor, Sensei."
80000026-13 = "Sensei, por favor, aceite isto."
80000026-14 = "[s] \"Isto é...?\""
80000026-15 = "Este chocolate foi feito especialmente para hoje..."
80000026-16 = "É o novo produto especial da Academia Federal Red Winter!"
80000026-17 = "Até agora, a Academia Federal Red Winter produzia um chocolate ao leite chamado 'Cheryonka'. Mas, como foi feito para agradar ao paladar da Presidente Cherino, era muito doce e difícil de tornar lucrativo..."
80000026-18 = "E, acima de tudo... o desenho da Cherino na embalagem não era nada fofo!"
80000026-19 = "Eu entendo que ela queira manter a dignidade. Mas, já que estamos nisso, eu queria que a Cherino parecesse fofa, então redesenhei a embalagem. A própria Cherino não gostou, mas..."
80000026-20 = "Pensei que se ela visse a reação de todos, talvez mudasse de ideia, então pedi aos membros do Departamento de Merenda Escolar que criassem um novo sabor e um novo design para o 'Cheryonka'."
80000026-21 = "Dessa forma, tenho certeza de que... o nome da Academia Federal Red Winter, e acima de tudo, a fofura da Cherino, se espalharão por todo o Kivotos!"
80000026-22 = "Sendo assim, foi isso que eu fiz. Gostaria que o senhor provasse este protótipo e me desse sua opinião."
80000026-23 = "[s] \"Então, isso é um chocolate de Dia dos Namorados...?\""
80000026-24 = "Sim, exatamente! Como é Dia dos Namorados, eu fiz especialmente para a ocasião."
80000026-25 = "Algum problema? Parece que o senhor ficou um pouco desapontado...?"
80000026-26 = "[s] \"Não, não, agradeço muito pelo presente.\""
80000026-27 = "Fufu, entendo."
80000026-28 = "Por favor, saboreie com calma o meu 'chocolate feito com toda a sinceridade', está bem?"
