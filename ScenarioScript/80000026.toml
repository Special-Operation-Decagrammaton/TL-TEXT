[translation]
80000026-1 = "レッドウィンター連邦学園の特産品"
80000026-2 = "レッドウィンター連邦学園・正門"
80000026-4 = "（トモエから連絡を貰って、レッドウィンター連邦学園を訪れた）"
80000026-5 = "いらっしゃいませ、先生。お待ちしておりました。"
80000026-6 = "聞いた話によりますと、キヴォトスでは本日をバレンタインデーと呼び、お祝いをするそうですね？"
80000026-7 = "想いを中々伝えられない相手に、チョコレートを介して気持ちを伝える……なんとも素晴らしい日ですね。"
80000026-8 = "そこで私も僭越ながら、先生にご用意させていただきました。"
80000026-13 = "先生、どうかこちらをお受け取りください。"
80000026-14 = "[s] \"これは……？\""
80000026-15 = "このチョコレートは今日のため、特別に作った……"
80000026-16 = "レッドウィンター連邦学園の新しい特産品です！"
80000026-17 = "これまでレッドウィンター連邦学園では「チェリョンカ」という名前のミルクチョコレートを作っていました。しかしチェリノ会長の好みに合わせたためにかなり甘く、採算を取るのが難しくって……。"
80000026-18 = "それに、何よりも…… 表紙に描かれたチェリノちゃんの絵が、可愛くないのです！"
80000026-19 = "威厳があるのは分かります。しかしせっかくなのですから、チェリノちゃんを可愛く見せたいなと思い、こうして描き直してみました。チェリノちゃん自身は気に入ってくれませんでしたが……。"
80000026-20 = "各位の反応を見てくれればそれも変わるのではと、給食部の部員たちに頼んで、新しい味とデザインの「チェリョンカ」を作ってもらったんです。"
80000026-21 = "こうすればきっと……レッドウィンター連邦学園の名前、そして何よりチェリノちゃんの可愛さが、キヴォトス全域に広まるでしょう！"
80000026-22 = "そういうことで、作ったのがこちらです。この試作品を先生に味わっていただき、感想を聞かせていただければと。"
80000026-23 = "[s] \"これは、バレンタインデーのチョコってことで……？\""
80000026-24 = "はい、そうですよ？バレンタインということで、特別に作ったものですから。"
80000026-25 = "何か問題でもありましたか？何だかガッカリされてるような……？"
80000026-26 = "[s] \"ううん、ありがたくいただくね。\""
80000026-27 = "ふふっ、はい。"
80000026-28 = "私の「真心がこもったチョコレート」、どうかゆっくり味わってくださいね？"
