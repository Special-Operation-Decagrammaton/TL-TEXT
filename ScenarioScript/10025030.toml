[translation]
10025030-1 = "Episódio 3: Tabu"
10025030-4 = "……Terminei de compilar o relatório preliminar."
10025030-8 = "Ao perguntar aos pescadores da Vila Yatoura, disseram que não houve nenhum incidente nos últimos meses que pudesse afetar a pesca de camarão."
10025030-9 = "Segundo os depoimentos, embora a quantidade pescada tenha diminuído, não parece ser uma mudança drástica a ponto de fazer o camarão desaparecer de toda a D.U."
10025030-10 = "Eu também verifiquei a fábrica de processamento da \"Red Hook Express\", mas não encontrei nenhum acidente ou ponto suspeito."
10025030-11 = "É uma vila pacífica... ou melhor, uma vila assustadoramente silenciosa."
10025030-16 = "Verifiquei as câmeras de segurança na entrada da vila, mas não houve entrada ou saída de veículos além do ônibus que circula duas vezes ao dia."
10025030-17 = "Os métodos para transportar uma grande quantidade de camarão congelado são limitados, mas..."
10025030-18 = "Não há sinais de que qualquer embarcação além dos navios regulares da \"Red Hook Express\" tenha visitado a vila."
10025030-19 = "Será que não há contato com o exterior...?#nParece que somos os únicos turistas também..."
10025030-20 = "Ah, uma coisa me chamou a atenção... encontrei uma pessoa com equipamento de pesca na beira do mar..."
10025030-21 = "Aquela pessoa, mais do que interessada em pescar...#nparecia estar procurando por algo diferente..."
10025030-27 = "[ns] \"Isso é...\""
10025030-28 = "……É suspeito."
10025030-29 = "Somando todas as informações coletadas, não deveria haver nenhum problema nesta vila.#nNo entanto, o fato de o camarão não estar chegando à D.U. significa que..."
10025030-31 = "Não sei se é certo suspeitar dos moradores, mas..."
10025030-32 = "Alguém está mentindo, com certeza."
10025030-33 = "[s] \"Qual foi a sensação ao interagir com os moradores?\""
10025030-34 = "Hum, vejamos."
10025030-35 = "Não consegui ter uma conversa decente, talvez porque todos estejam alertas contra estranhos."
10025030-36 = "Até mesmo as alunas da Academia de Polícia Valkyrie, que costumam ser gentis, estavam tensas.#nTentei detê-las, mas acabei hesitando."
10025030-38 = "Será que... existe algo que eles não querem que pessoas de fora saibam...?"
10025030-39 = "Kuhihi... é claro que sim, Miyu."
10025030-40 = "Se não houvesse um motivo, não precisariam ficar tão tensos.#nTem algo por trás disso."
10025030-42 = "Por exemplo~ outro dia a Saki estava falando dormindo..."
10025030-43 = "Esse assunto não tem nada a ver agora!"
10025030-49 = "Além disso... os moradores me disseram para tomar cuidado com os \"Profundos\"."
10025030-50 = "Ah, eu também ouvi isso."
10025030-51 = "Disseram para tomar cuidado para não ser julgado pelos \"Profundos\" se for nadar por aqui."
10025030-52 = "Sim... eu ouvi o pescador dizendo que, se os \"Profundos\" nos emprestassem seu poder..."
10025030-54 = "O que é isso? Tem a ver com a pesca?"
10025030-55 = "……Tem golfinhos ou algo assim nesta vila?"
10025030-60 = "……Os \"Profundos\" são uma lenda urbana passada de geração em geração na Vila Yatoura.#nRefere-se a uma existência sobrenatural que habita o mar――"
10025030-70 = "Quem é você...?"
10025030-71 = "Oh, peço desculpas por interromper a conversa de vocês."
10025030-72 = "Faz tempo que não vejo visitantes nesta vila, então acabei me aproximando."
10025030-73 = "……Ah, peço desculpas pela falta de apresentação.#nEu sou alguém que administra o negócio de processamento e transporte de camarões de Yatoura."
10025030-75 = "……Isso é."
10025030-76 = "Você seria o representante da \"Red Hook Express\"?"
10025030-77 = "Haha. Fico um pouco sem jeito quando me chamam assim."
10025030-78 = "Antigamente eu também pescava como marinheiro, mas não conseguia competir com os veteranos... acabei desistindo no meio do caminho."
10025030-83 = "Nós também estamos felizes em conhecê-lo."
10025030-84 = "Como sempre trazem camarões deliciosos para a D.U., eu queria muito conhecer o representante da \"Red Hook Express\"."
10025030-85 = "Hahaha, fico muito feliz em ouvir isso."
10025030-86 = "Mas... ultimamente, sinto que não temos visto muitos camarões na D.U."
10025030-87 = "Parece que eles desapareceram não só dos restaurantes, mas também das lojas de conveniência..."
10025030-88 = "…………."
10025030-89 = "Como representante, você não saberia dizer o motivo?"
10025030-90 = "Isso é... porque fomos atingidos por uma má temporada de pesca."
10025030-91 = "Ainda não sabemos a causa, mas provavelmente é devido ao aumento da temperatura da água.#nUltimamente, é raro ver um barco retornar ao porto trazendo camarões."
10025030-92 = "Se não conseguirmos pescar camarões, é óbvio que não conseguiremos entregá-los ao D.U., não é?"
10025030-93 = "Não há como lutar contra a natureza, e só nos resta esperar que o tempo resolva isso. Como a subsistência de todos depende disso, gostaríamos de fazer algo a respeito, mas..."
10025030-94 = "Mas ouvi dos moradores que, embora a quantidade de pesca tenha diminuído, não há nenhum problema em particular..."
10025030-95 = "...É que o orgulho dos pescadores está em jogo. #nCom certeza eles não queriam responder honestamente."
10025030-96 = "Além disso, não é algo que acontece apenas este ano."
10025030-97 = "É natural que a quantidade de camarões pescados oscile devido a vários fatores. #nChamar isso de problema me parece um exagero."
10025030-98 = "Isso é verdade, mas..."
10025030-100 = "...Peço desculpas por ter sido um pouco rude. #nPara a empresa, esta situação também é dolorosa."
10025030-101 = "Só neste mês, quanto prejuízo não tivemos..."
10025030-102 = "Se fosse possível, eu até me apegaria aos \"Profundos\". #nPara que tragam os camarões de volta."
10025030-103 = "A-ah... O que são os \"Profundos\"...?"
10025030-104 = "Como mencionei antes, os \"Profundos\" são seres lendários que habitam o mar. #nNa vila de Yado-ura, a história ainda é passada adiante."
10025030-105 = "Segundo dizem, perto de uma área de recifes chamada \"Recife do Demônio\" a leste da vila, existe uma cidade submarina onde eles vivem."
10025030-106 = "Seus corpos são cobertos por escamas e possuem uma constituição física resistente que lhes permite mover-se livremente até nas profundezas do oceano."
10025030-107 = "Como não morrem a menos que seus corpos sejam gravemente danificados, dizem que muitos que sonhavam com a imortalidade visitaram esta vila no passado."
10025030-108 = "...Mas o paradeiro desses sonhadores permanece desconhecido até hoje."
10025030-109 = "I-iiih..."
10025030-110 = "Além disso, dizem que os \"Profundos\" concedem todo tipo de bênçãos àqueles de quem gostam."
10025030-111 = "Em suma, pode-se dizer que os \"Profundos\" são como deuses que governam o mar."
10025030-112 = "[s1] \"Como o deus Watatsumi...?\"\n[s2] \"Tipo um tritão...?\""
10025030-113 = "Sim, provavelmente algo próximo disso."
10025030-114 = "Err, o que seria isso...?"
10025030-115 = "...De qualquer forma, talvez por estarem ansiosos com a queda na pesca, #nrecentemente voltaram a mencionar o nome dos \"Profundos\"."
10025030-116 = "Dizem que \"deveríamos oferecer sacrifícios\" para acalmar a ira deles, ou que \"deveríamos expulsar os estranhos\" que perturbam a ordem."
10025030-118 = "Sacrifícios... que tipo de coisa seria, especificamente?"
10025030-120 = "Claro que... seres humanos vivos."
10025030-122 = "...!"
10025030-124 = "...Fufu, é brincadeira. Não fique tão assustada."
10025030-125 = "A história de que sacrificavam seres humanos vivos não passa de uma lenda. #nHoje em dia, a veracidade disso é incerta, mas..."
10025030-126 = "Nos dias de hoje, se alguém desaparecesse, a sociedade não ficaria calada, certo?"
10025030-127 = "...Nós só queremos continuar nossos negócios aqui o mais silenciosamente possível."
10025030-128 = "(O jeito que ele fala dá a entender que, se não causasse alvoroço, ele não se importaria em oferecer sacrifícios...)"
10025030-129 = "Se você ainda tiver interesse nos \"Profundos\", #npor que não visita o \"Recife do Demônio\"?"
10025030-130 = "No entanto, nunca se aproxime durante a maré alta, quando a diferença entre a maré baixa e a alta é grande."
10025030-131 = "...Por que?"
10025030-132 = "Segundo a lenda, #nnos dias de maré alta, os \"Profundos\" aparecem em terra para recolher as oferendas."
10025030-133 = "Se, sem que saibamos, os moradores estiverem realmente oferecendo sacrifícios..."
10025030-134 = "Não acho que eles receberiam bem um forasteiro que fica bisbilhotando os assuntos da vila."
10025030-136 = "...!!"
10025030-138 = "Bem... a conversa se estendeu um pouco. #nTalvez eu tenha falado demais."
10025030-139 = "Não, consegui entender bem a situação da vila. Obrigado."
10025030-140 = "...Há coisas neste mundo que é melhor não saber."
10025030-142 = "Então, aproveitem a estadia."
10025030-150 = "E-eu sabia, esta vila é amaldiçoada... #nEu deveria ter ido embora quando ouvi o nome \"Profundos\"..."
10025030-151 = "Com certeza seremos sacrificados para que a pesca prospere... #nNeste momento, as saídas da vila já devem estar bloqueadas...!"
10025030-152 = "Miyu, o que você está dizendo? #nSe formos nós, conseguimos escapar mesmo que as saídas estejam bloqueadas, não conseguimos?"
10025030-153 = "M-mas... todos os filmes de terror começam assim!"
10025030-154 = "No começo era apenas curiosidade, mas depois, mesmo que a gente queira fugir, não dá mais..."
10025030-155 = "Com certeza logo fenômenos estranhos vão acontecer, ou monstros aterrorizantes vão aparecer na nossa frente..."
10025030-156 = "E então, seremos possuídos por ilusões e passaremos o resto de nossas vidas dominados pelo medo...!"
10025030-157 = "……Exagerado. Não existe monstro nenhum desse tipo."
10025030-158 = "Monstros, maldições... no fim das contas, são apenas histórias inventadas por humanos para amedrontar outros humanos."
10025030-159 = "Eu também penso o mesmo."
10025030-160 = "Se uma existência com tanto poder estivesse no mar, o Conselho Estudantil Geral de Kivotos já teria entrado em ação."
10025030-161 = "……Ei, Miyu, sabia dessa?"
10025030-162 = "Dizem que a existência mais assustadora e terrível deste mundo... vive na sala de finanças do Conselho Estudantil Geral."
10025030-164 = "Não sei o quão incrível é esse 'ser das profundezas', mas se as atividades pesqueiras afetarem a economia de Kivotos... os auditores fiscais da sala de finanças não vão ficar calados, viu?"
10025030-165 = "……Você tem algum motivo para dizer isso?"
10025030-167 = "Eu achei que tinha escondido bem os mísseis que consegui da Escola de Oceanografia Odyssey, mas..."
10025030-168 = "Francamente, o que vocês andam fazendo pelas nossas costas?"
10025030-169 = "De qualquer forma, escutem. Nós somos agentes da Academia SRT, que faz até criança chorar de medo, não podemos nos deixar levar por boatos como esse."
10025030-171 = "Vou fazer quem quer que esteja mentindo... confessar tudo!"
10025030-173 = "……Bem, eu gostaria de continuar a investigação, mas acabamos chamando atenção demais."
10025030-174 = "Já que os moradores estão em alerta, acho difícil retomar as perguntas agora."
10025030-175 = "Vamos todos voltar para a pousada e descansar um pouco."
10025030-176 = "Quando os moradores estiverem dormindo e o silêncio reinar —"
10025030-177 = "Retomaremos a investigação!"
