[translation]
10025030-1 = "第3話;禁忌"
10025030-4 = "……中間報告をまとめました。"
10025030-8 = "[ruby=やとうら]夜戸浦村[/ruby]の漁師の方々に聞き込みをしたところ、ここ数ヶ月エビ漁に影響を及ぼすような出来事はなかったとのこと。"
10025030-9 = "証言によると、たしかに水揚げ量は減っているものの、D.U.全域でエビが出回らなくなるほどの変化ではないようです。"
10025030-10 = "こっちも「レッド・フック・エクスプレス」の加工場を調べてみたけど、特に事故や不審な点は見つからなかった。"
10025030-11 = "平和な村だな――悪く言えば、気味が悪いくらい静かな村だが。"
10025030-16 = "村の入口にある防犯カメラを確認したけど、1日に2回運行してるバス以外に出入りはなかったよ。"
10025030-17 = "大量の冷凍エビを輸送できるような方法は限られてるけど……"
10025030-18 = "「レッド・フック・エクスプレス」の定期船以外が村を訪れた形跡はないかな。"
10025030-19 = "外部との交流がないのかな……？#n観光客も、私たちだけみたいだし……"
10025030-20 = "あ、ひとつ気になったことが……海辺で釣具を持ってる人に出会ったんだけど……"
10025030-21 = "その人、釣りに興味があるというよりは……#n何か別のものを探しているように、見えたかな……"
10025030-27 = "[ns] \"それって……\""
10025030-28 = "……怪しいですね。"
10025030-29 = "集めた情報を総合すると、この村には何も問題がないはずです。#nにもかかわらず、D.U.にエビが出回っていないということは……"
10025030-31 = "住民を疑うのはどうかと思うが……"
10025030-32 = "誰かが、ウソをついてるね、これは。"
10025030-33 = "[s] \"住民と接してみた感触は？\""
10025030-34 = "うーん、そうだな。"
10025030-35 = "みんな部外者を警戒してるのか、まともな会話ができなかった。"
10025030-36 = "普段は親切なヴァルキューレ警察学校の生徒でさえ、ピリピリしてたからな。#n引き留めようとしたんだが、さすがに躊躇ってしまった。"
10025030-38 = "なにか……外部の人に知られちゃまずいことでも、あるのかな……？"
10025030-39 = "くひひ……そりゃそうでしょ、ミユ。"
10025030-40 = "理由がなかったら、そこまで気を張る必要はないからね。#nこりゃあ何か裏があるよ。"
10025030-42 = "たとえば～こないだサキが寝ぼけて……"
10025030-43 = "その話は今関係ないだろ！"
10025030-49 = "それと……住民の方から「深きもの」には気をつけろ、と言われました。"
10025030-50 = "あ、それなら私も聞いたな。"
10025030-51 = "この辺りで泳ぐなら、「深きもの」に裁きを下されないように気をつけろって。"
10025030-52 = "うん……私は、釣り人さんが「深きもの」が力を貸してくれれば、#nって言ってるのを聞いた……"
10025030-54 = "なにそれ、釣りに関係してるってこと？"
10025030-55 = "……この村には、イルカでもいるわけ？"
10025030-60 = "……「深きもの」は、古くから[ruby=ここ]夜戸浦村[/ruby]に伝わる都市伝説です。#n海に棲んでいる超常的な存在を指しまして――"
10025030-70 = "あなたは……？"
10025030-71 = "おっと、皆さんのお話を遮ってしまい、申し訳ありませんでした。"
10025030-72 = "この村にやってきた客を見るのは久しぶりでして、つい声をかけてしまった次第です。"
10025030-73 = "……ああ、申し遅れました。#n私は夜戸浦産のエビを、加工・輸送する事業を営んでいる者です。"
10025030-75 = "……それって。"
10025030-76 = "あなたが「レッド・フック・エクスプレス」の代表の方でしょうか？"
10025030-77 = "はは。そう言われると、少し照れくさいものがありますね。"
10025030-78 = "以前は私も船乗りの1人として水揚げを行っておりましたが、やはり熟練の方々には到底及ばず……道半ばで挫折したに過ぎませんので。"
10025030-83 = "私たちも、お会いできて嬉しいです。"
10025030-84 = "いつも大変おいしいエビをD.U.まで運んでくださる「レッド・フック・エクスプレス」の代表の方には、ぜひ一度お会いしたいと思っていたので。"
10025030-85 = "ははは、そう言っていただけて何よりです。"
10025030-86 = "ですが……近頃、D.U.でエビをあまり見かけなくなったような気がしまして。"
10025030-87 = "飲食店はもちろん、コンビニからも姿を消してしまったようで……"
10025030-88 = "…………。"
10025030-89 = "代表の方なら、何かご存知ではないでしょうか？"
10025030-90 = "それは――不漁に見舞われてしまったからです。"
10025030-91 = "まだ原因は分かっておりませんが、おそらく水温上昇などの影響でしょうね。#nここしばらくは、港に戻ってきた船がエビを持って帰ってくる日の方が珍しいくらいで。"
10025030-92 = "エビが捕れなければ、当然D.U.に納品できるはずもないでしょう？"
10025030-93 = "自然には太刀打ちできないもので、こればかりは時間が解決してくれるのを願うしかなく。私どもとしても、皆さんの生活が懸かっているので、どうにかしたいのですが……"
10025030-94 = "水揚げ量が減ってるものの、特に問題はないって住民から聞いたんだが……"
10025030-95 = "……船乗りのプライドが懸かってますからね。#nきっと正直に答えたくなかったのでしょう。"
10025030-96 = "それに、何も今年に限った話ではありません。"
10025030-97 = "様々な要因によって、エビの水揚げ量が上下するのは当然です。#nこれを[ruby=・   ・]問題[/ruby]と呼ぶのは、語弊があるかと。"
10025030-98 = "それは、そうだが……"
10025030-100 = "……少し厳しい言い方をしてしまい申し訳ありません。#n会社としても、この状況は苦しいのです。"
10025030-101 = "今月だけでも、どれほどの損失が出たものか……"
10025030-102 = "できることなら「深きもの」に[ruby=すが]縋[/ruby]りつきたいくらいです。#nエビを呼び戻してくれ、と。"
10025030-103 = "あ、あの……「深きもの」って、何ですか……？"
10025030-104 = "先ほども申し上げたように「深きもの」というのは、海に棲む伝説の存在です。#n夜戸浦村では、今も語り継がれています。"
10025030-105 = "聞くところによると、村の東にある「鬼の[ruby=がんしょう]岩礁[/ruby]」という岩礁地帯の近くには海底都市があり、そこに棲んでいるようです。"
10025030-106 = "身体はウロコで覆われ、深海でも自由に動き回れる強靭な肉体を持っています。"
10025030-107 = "肉体が著しく損傷しない限り死ぬことはないため、かつては不老不死を夢見た多くの者がこの村を訪れたとか。"
10025030-108 = "……ですが、その夢追い人の行方は依然として知れないようです。"
10025030-109 = "ひ、ひぃぃっ……"
10025030-110 = "また、「深きもの」は気に入った相手にあらゆる加護を授けるのだとか。"
10025030-111 = "つまるところ、「深きもの」は――海をつかさどる神のような存在、#nと言えるでしょう。"
10025030-112 = "[s1] \"ワタツミさま、みたいな……？\"\n[s2] \"マーマンとか……？\""
10025030-113 = "そうですね、おそらくそれに近いものかと。"
10025030-114 = "ええっと、それは何でしょうか……？"
10025030-115 = "……ともかく、漁獲量が減ったせいで皆さん不安になったのか、#n最近また「深きもの」の名を口にするようになりました。"
10025030-116 = "彼らの怒りを鎮めるには「供物を捧げるべき」だとか、#n規律を乱す「外部の人間を追い出すべき」など。  "
10025030-118 = "供物、というのは……具体的にどんなものでしょうか？  "
10025030-120 = "もちろん……生身の人間です。  "
10025030-122 = "……！  "
10025030-124 = "……ふふ、冗談です。そう怯えないでください。  "
10025030-125 = "生身の人間を捧げていた、というのは言い伝えに過ぎません。#n今となっては、その真偽は不明ですが……"
10025030-126 = "このご時世、人が消えたりなんかしたら、世間は黙っていないでしょう？"
10025030-127 = "……私たちはなるべく静かに、ここで商売を続けたいのです。  "
10025030-128 = "（まるで、騒ぎにならなければ供物も[ruby=やぶさ]吝か[/ruby]ではない――かのような口ぶりだ）  "
10025030-129 = "もし、まだ「深きもの」にご興味があるようでしたら、#n「鬼の[ruby=がんしょう]岩礁[/ruby]」を訪ねてみてはいかがでしょうか。  "
10025030-130 = "ただし、潮の干満差が大きくなる大潮の日には、絶対に近寄らないでください。"
10025030-131 = "……どうしてですか？  "
10025030-132 = "言い伝えによると、#n大潮の日はお供えを回収するために「深きもの」が陸に姿を表します。"
10025030-133 = "私たちの知らないところで、住民が本当は供物を捧げているとしたら……"
10025030-134 = "村の事情を嗅ぎまわる[ruby=よそもの]余所者[/ruby]を、歓迎するとは思えませんから。  "
10025030-136 = "……！！  "
10025030-138 = "っと……少し話が長くなってしまいましたね。#n余計なことまで喋ってしまったかもしれません。  "
10025030-139 = "いえ、村の事情をよく理解できました。ありがとうございます。"
10025030-140 = "……世の中には、知らない方が良いこともありますがね。"
10025030-142 = "では、楽しんでいってください。"
10025030-150 = "や、やっぱりこの村は呪われてるんだ……#n「深きもの」って名前を聞いたとき、帰るべきだった……"
10025030-151 = "きっと私たちは、漁の繁盛のために捧げられるんだよ……#nもう今頃、村の出入り口は塞がれていて……！"
10025030-152 = "ミユ、なに言ってんだ。#n私たちなら、たとえ出入り口が塞がれていても脱出できるだろ？"
10025030-153 = "で、でも……ホラー映画の始まりはみんなこうだよ！  "
10025030-154 = "最初は単なる好奇心だったけど、途中から逃げたくても逃げられなくなって……"
10025030-155 = "きっともうすぐ怪奇現象が起きたり、恐ろしいモンスターが私たちの前に現れるよ……"
10025030-156 = "それで、私たちは幻影に取り憑かれて、#n残りの人生を恐怖に支配されて過ごすんだ……！"
10025030-157 = "……大げさだな。そんなモンスター、いるわけないだろ。"
10025030-158 = "モンスターだの呪いだの、結局は人間が人間を恐怖に追いやるための作り話だ。  "
10025030-159 = "私も、そう思います。  "
10025030-160 = "それほどの力を持つ存在が海にいるのなら、#nキヴォトスの連邦生徒会が動いているはずです。"
10025030-161 = "……ねえミユ、知ってた？  "
10025030-162 = "この世でいっちばん怖くて恐ろしい存在は……#n連邦生徒会の財務室に棲んでるんだって。"
10025030-164 = "「深きもの」がどれくらいスゴい存在なのかは知らないけど、もし漁業活動でキヴォトスの経済に影響を与えたら……財務室の税務調査担当が黙っちゃいないよ？"
10025030-165 = "……なんか心当たりでもあるのか？"
10025030-167 = "オデュッセイア海洋高等学校から仕入れたミサイル、うまく隠したつもりだったんだけどな～"
10025030-168 = "まったく、私たちの知らないところで何やってんだよ。"
10025030-169 = "ともかく、いいか。泣く子も黙るSRT特殊学園の隊員が、#nこんな噂話なんかに惑わされている場合じゃない。"
10025030-171 = "いったい誰が嘘をついているのか……洗いざらい吐かせてやる！"
10025030-173 = "……しかし、調査を進めたいところですが、注目を集めすぎてしまいましたね。"
10025030-174 = "住民に警戒されている以上、今すぐ聞き込みを再開するのは難しいと思います。"
10025030-175 = "一度全員、宿に戻って早めに身体を休めましょう。"
10025030-176 = "住民たちが眠りについて、静寂が訪れたそのとき――"
10025030-177 = "調査を再開します！"
