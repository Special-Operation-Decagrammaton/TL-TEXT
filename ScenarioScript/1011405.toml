[translation]
1011405-1 = "ウェイトレスのサービス"
1011405-2 = "（ジュリを待っていると、慌ただしいノック音が聞こえてきた！）"
1011405-9 = "せんせぇ～！"
1011405-10 = "[s] \"ジュリ、ひとまず落ち着いて！\""
1011405-11 = "は、はい……ぐすん。"
1011405-12 = "……？"
1011405-13 = "い、いえ……ストーカーとかではありません。"
1011405-14 = "先に話してから来るべきでしたね。"
1011405-15 = "その、「今月のウェイトレス」に選ばれたおかげか……。"
1011405-18 = "[ns1] \"カフェを訪れるお客さんが……\"\n[ns2] \"10倍も増えちゃったの！？\""
1011405-21 = "最初は何とか対応していました。"
1011405-22 = "売上が伸びてマネージャーさんは喜んでくれましたし、#n新しい常連客もできたんですが……。"
1011405-23 = "その、ツーショット写真なんかも頼まれるようになってしまいまして……。"
1011405-26 = "めっちゃ可愛いです、ジュリさん！#nこういうポーズをお願いして良いですか？"
1011405-27 = "その、えっと……はい。"
1011405-28 = "おぉ、最高です！#nもう少し照れた表情ください！"
1011405-29 = "うぅ……。"
1011405-31 = "チャンネルをご覧の皆さん、こんにちは！#nクロノス報道部です！"
1011405-32 = "今日は最近話題の[ruby=うしまき]牛牧[/ruby]ジュリさんにインタビューを行っていきます！#nではまず、自己紹介からお願いします！"
1011405-33 = "は、はじめまして、ジュリと言います……。"
1011405-34 = "噂によりますと、ジュリさんは有名なウェイトレス選抜大会で……。"
1011405-35 = "大きなグラスを振り回し、ライバルを一撃で倒したと聞きましたが、それは本当でしょうか！？"
1011405-36 = "はい！？そ、そんなことしてませんよ！#nたしかに重たいグラスを運ぶ種目はありましたが……。"
1011405-37 = "なんとっ！#nチャンネルをご覧の皆さん、どうやら噂は本当でした！"
1011405-38 = "いやはや、さすがは大会優勝者です。"
1011405-39 = "ち、違います！#nですから、私は……！"
1011405-40 = "それでは次の質問へ！#nこれも噂によると、ジュリさんはミレニアム製のロボットと対決して……。"
1011405-41 = "「いつか終焉は訪れ、私のようなウェイトレスは消え去る」。"
1011405-42 = "「しかし、まだその時ではない。人類が敗北するには、まだ早い」――というハードボイルドなセリフを残し……。"
1011405-43 = "生意気なミレニアム製のロボットに打ち勝ち、自爆を命じたのは本当ですか！？"
1011405-44 = "はい！？そ、それも違います！#n私はただ……！"
1011405-45 = "あのロボットが急に自爆しようとしたので、止めようと……。"
1011405-46 = "なるほど、やはり噂は本当のようですね！！"
1011405-47 = "皆さんご存知の通り、私たちクロノススクールはキヴォトスで最も迅速に真実のみを報道しております！"
1011405-48 = "今回も無事、ジャーナリスト精神に則り取材できたことを心より嬉しく思います！"
1011405-49 = "インタビューに快く応じてくださり、ありがとうございました！"
1011405-50 = "ですから、話を聞いてくださいっ！"
1011405-52 = "ぐすん……。"
1011405-53 = "[ns3] \"……。\"\n[ns4] \"大変だったね……。\""
1011405-56 = "いつの間にかネットにも噂が広まっていたらしくて……。"
1011405-57 = "あのクロノスの方は、一応ポジティブな記事を書いてくださったようで、マネージャーさんからもお祝いしてもらいましたけど……。"
1011405-58 = "でも急に名前が広まったせいで、町を歩いているとサインを求められたり……。"
1011405-59 = "[s] \"みんなに注目されて嫌だった……？\""
1011405-60 = "……。"
1011405-61 = "いえ、そういうわけではありません。"
1011405-62 = "親切な方ばかりですし、皆さん好意的ですから……。"
1011405-63 = "決して嫌では……。"
1011405-64 = "ただ、ウェイトレスの仕事に縛られているような気がして……。"
1011405-65 = "こちらが忙しくなった分、給食部の仕事に出られなくなってしまい……。"
1011405-66 = "先輩にも、申し訳ない気持ちが……。"
1011405-67 = "そろそろウェイトレスを辞めて、給食部に戻るべきではないかと思ったんです。"
1011405-68 = "私のせいで、カフェにも少なからず迷惑はかかっているはずですし……。"
1011405-69 = "[s] \"ジュリ、よければ場所を変えようか？\""
1011405-70 = "……場所、ですか？"
1011405-72 = "ここは先生の休憩室では……？"
1011405-73 = "[s5] \"そうだよ。\"\n[s6] \"ここなら落ち着けると思って。\""
1011405-76 = "はい……？"
1011405-77 = "[s] \"それに騒ぎなら、いずれ収まるからね。\""
1011405-78 = "私がその気になれば、給食部にはいつでも戻れる、と……？"
1011405-79 = "……たしかに、そうですね。"
1011405-80 = "私に寄せられている関心は、いずれ収まるはずですし。"
1011405-81 = "クロノス報道部の方が訪れた時は、驚いてしまいましたが……。"
1011405-82 = "あの方たちは、常に面白そうなものを探しているだけですからね……えへへ。"
1011405-83 = "それで先生？#nどうして私をここに連れてきたんですか？"
1011405-84 = "[s] \"今ジュリに必要なのは、一人の時間だと思ってね。\""
1011405-85 = "一人の時間……。"
1011405-86 = "そういえば、最近ずっと忙しくて休む暇もありませんでしたね。"
1011405-87 = "もちろん給食部の時も、お昼休みの前後はバタバタしていましたけど。"
1011405-88 = "今に比べると、たしかに……。"
1011405-89 = "ありがとうございます、先生。#n少し気持ちが楽になりました。"
1011405-91 = "（その後も、しばらく他愛もない話が続いた）"
1011405-98 = "（必ずしも、すべての物事に意味を見出す必要はないのだから）"
1011405-106 = "あれ……もうこんな時間ですか！？"
1011405-107 = "[s7] \"あっという間だね。\"\n[s8] \"仕事の時も、こんな感じだと良いのになぁ……。\""
1011405-110 = "……そういえば、つい先生のお時間を奪ってしまいましたね。"
1011405-111 = "気にしなくても大丈夫、と先生は仰いますが……。"
1011405-112 = "……。"
1011405-113 = "あの、先生？"
1011405-114 = "もしよろしければ、パフェはいかがですか？"
1011405-115 = "カフェで色々と教わったので……。"
1011405-116 = "[s] \"……ジュリのパフェ？\""
1011405-117 = "はい！#nあっ、その……無理に、食べる必要は……ありませんよ？"
1011405-118 = "[s9] \"ここは「カフェ・シャーレ」ということで……。\"\n[s10] \"店員さん、ジュリのスペシャルパフェを一つください。\""
1011405-121 = "！！！"
1011405-122 = "は、はい！"
1011405-123 = "少々お待ちください、[ruby=・   ・   ・]お客様[/ruby]！"
1011405-124 = "食材は……あっ、すぐに買ってきます！"
1011405-128 = "（休憩室でジュリのスペシャルパフェを待っていると……）"
1011405-131 = "[wa:950]― [log=주리 아르바이트]「カフェ・シャーレ」にご来店くださり[/log]"
1011405-132 = "[wa:1690]― [log=주리 아르바이트]ありがとうございます！[/log]"
1011405-135 = "― [log=주리 아르바이트]はい、[wa:720]ご注文のスペシャルパフェです！[/log]"
1011405-138 = "[wa:800]― [log=주리 아르바이트]ふふっ……[wa:1550]不思議な気分です。[/log]"
1011405-141 = "[wa:1610]― [log=주리 아르바이트]ここは先生のためのカフェで――[/log]"
1011405-143 = "― [log=주리 아르바이트]私はそのカフェの……[wa:1930]たった一人のウェイトレス……。[/log]"
1011405-146 = "[wa:960]― [log=주리 아르바이트]先生、[wa:1210]ご存知ですか？[/log]"
1011405-148 = "― [log=주리 아르바이트]パフェって……[wa:1640]「完璧」という意味なんだそうです。[/log]"
1011405-151 = "[wa:1430]― [log=주리 아르바이트]お料理の腕は[wa:930]まだ完璧どころか……[/log]"
1011405-152 = "[wa:2150]― [log=주리 아르바이트]まだまだですけど……[/log]"
1011405-155 = "― [log=주리 아르바이트]いつかは……[wa:1570]私も作れたらなと思います。[/log]"
1011405-157 = "― [log=주리 아르바이트]「パフェ」……[wa:1970]完璧なお料理を。[/log]"
1011405-161 = "[ns] \"それじゃあ、いただきます！\""
1011405-162 = "ど、どうぞ……！"
1011405-163 = "（一瞬、食べるのを躊躇してしまったが、勇気を振り絞ってみると……）"
1011405-164 = "[ns11] \"あれ……意外といけるかも？\"\n[ns12] \"甘いのに塩気もあって……美味しい！\""
1011405-167 = "本当ですか！？"
1011405-168 = "ど、どうして塩気も感じるのか、よく分かりませんが……。"
1011405-169 = "でも先生が美味しく食べてくださって……私、幸せです！"
1011405-174 = "[ns] \"わっ、ジュリ！？\""
1011405-176 = "（抱きついてきたジュリを何とか落ち着かせて……）"
1011405-177 = "（その後もパフェを食べながら、楽しい時間を過ごした）"
