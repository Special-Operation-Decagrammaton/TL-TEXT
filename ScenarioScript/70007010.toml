[translation]#[Texto Final. - Filipe 08/07.]
70007010-1 = "Encontros Inesperados (1)"
70007010-3 = "Deveria ser por aqui……"
70007010-4 = "São 6 da manhã…… nunca imaginei que seria tão difícil encontrar uma academia aberta cedo."
70007010-5 = "Os membros arrancam as portas do banheiro com explosivos plásticos――"
70007010-6 = "e tem até quem quebre a janela com tiros para fugir―― pedimos que ativem os dispositivos de segurança dentro da academia, mas……"
70007010-7 = "Por causa disso, enquanto a academia está em reforma, tive que vir aqui……"
70007010-8 = "Mas com isso, pudemos instalar vidros à prova de balas e portas anti-explosão, e também placas maiores para o banheiro. Devemos ver isso como uma melhoria."
70007010-16 = "Bom."
70007010-17 = "É uma academia pequena, mas os equipamentos são bons."
70007010-18 = "Tem aparelhos ótimos para aeróbicos, o que ajuda."
70007010-27 = "?"
70007010-29 = "!?"
70007010-30 = "(O-que é isso!)"
70007010-31 = "(Quase soltei um grito……!)"
70007010-32 = "(Encontrar alguém assim aqui……)"
70007010-33 = "(Que corpo magnífico……)"
70007010-34 = "(Ainda estou longe do treino ideal……)"
70007010-36 = "Ora, precisa de ajuda……?"
70007010-37 = "Desculpe, me perdi…… onde fica o vestiário?"
70007010-38 = "Ufufu. É ali."
70007010-39 = "Obrigada. É minha primeira vez aqui."
70007010-40 = "De nada. Fiz apenas o óbvio."
70007010-41 = "Se precisar de mais alguma coisa, é só falar."
70007010-45 = "(Que pessoa elegante……)"
70007010-48 = "Então, como a hora do chá de proteína já passou, vou começar o treino de verdade!"
70007010-53 = "(Tomar proteína com tanta elegância……)"
70007010-54 = "(Entendo, peito de frango, batata doce, banana…… alimentação ideal para treino……)"
70007010-55 = "(Normalmente, observar o treino alheio é falta de educação……)"
70007010-56 = "(Mas este é um treino que nunca vi em Millennium……)"
70007010-57 = "(Para fins de aprendizado, vou observar, mesmo sendo indelicado)"
70007010-58 = "(Hoje ia fazer aeróbicos, mas vou tentar acompanhar um pouco o treino dela)"
70007010-65 = "Primeiro, um exercício leve…… agachamento com barra――"
70007010-66 = "……Posso pedir ajuda?"
70007010-67 = "Ah, sim! O que precisa?"
70007010-68 = "Colocar os pesos na barra sozinha é um pouco difícil."
70007010-69 = "Quero colocar uns 100 kg, pode me ajudar?"
70007010-70 = "(100 kg…… 'uns'?)"
70007010-71 = "C-claro! Se posso ajudar no treino, fico feliz."
70007010-72 = "Ora! Que pessoa gentil! Muito obrigada."
70007010-80 = "Assim está bom?"
70007010-84 = "Por que dois de 20 kg……? Eu pedi 100 kg――"
70007010-85 = "……Hã?"
70007010-86 = "40 kg de cada lado, 80 kg no total, mais os 20 kg da barra…… dá 100 kg, não?"
70007010-87 = "Ufufu. Que ideia original."
70007010-88 = "100 kg significa 50 kg de cada lado."
70007010-89 = "Mas o peso da barra……!?"
70007010-90 = "A barra é só um suporte. Incluir o peso dela é fofo."
70007010-91 = "Se o peso da barra contasse, não estaria escrito '20 kg' nela?"
70007010-97 = "(Como eu suspeitava…… ela é fora do comum!)"
70007010-98 = "(Enquanto todos se esforçam para aumentar 1 kg, ela simplesmente ignora os 20 kg!)"
70007010-99 = "(Mas estranhamente, faz sentido……)"
70007010-100 = "(Isso é…… a 'verdadeira força')"
70007010-105 = "O corpo já está aquecido. Vamos para a puxada?"
70007010-106 = "……"
70007010-107 = "(Fiquei olhando demais……)"
70007010-108 = "(Fazia tempo que não via alguém fazer agachamento de 120 kg com tanta facilidade……)"
70007010-109 = "(Isso é falta de educação. Vou só fazer o mesmo treino ao lado)"
70007010-110 = "Hoje vou treinar leve, então não preciso de ninguém como peso……"
70007010-111 = "Então, vou começar!"
70007010-112 = "Um! Dois! Três! Quatro!"
70007010-113 = "(Com tanto peso, a postura e a respiração são perfeitas…… lindo)"
70007010-114 = "Cinco! Seis!"