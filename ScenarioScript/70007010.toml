[translation]
70007010-1 = "Um encontro repentino (1)"
70007010-3 = "Deveria ser por aqui, mas..."
70007010-4 = "Já são 6 da manhã... Quem diria que seria tão difícil encontrar uma academia aberta tão cedo..."
70007010-5 = "Alguns membros, ao quererem ir ao banheiro, explodem a porta com explosivos plásticos..."
70007010-6 = "E tem gente que até tenta escapar quebrando a janela com uma arma... Pedimos para que usem as travas de segurança dentro da academia, mas..."
70007010-7 = "Graças a isso, enquanto a academia estava em reforma, tive que usar outros lugares..."
70007010-8 = "Mas, aproveitando a oportunidade, instalamos vidros à prova de balas e portas blindadas, além de sinalizar melhor os banheiros. Devo considerar que isso resultou em um ambiente melhor."
70007010-16 = "Bem."
70007010-17 = "É uma academia pequena, mas as instalações são bem completas."
70007010-18 = "É muito útil ter equipamentos perfeitos para exercícios aeróbicos."
70007010-27 = "？"
70007010-29 = "！？ "
70007010-30 = "(N-nossa!)"
70007010-31 = "(Por pouco não soltei um grito...!)"
70007010-32 = "(Encontrar alguém assim em um lugar desses.)"
70007010-33 = "(Que beleza física magnífica...)"
70007010-34 = "(Eu ainda preciso treinar muito mais...)"
70007010-36 = "Ora, precisa de algo...?"
70007010-37 = "Desculpe, acabei me perdendo... Onde fica o vestiário?"
70007010-38 = "Fufufu. É por aqui."
70007010-39 = "Muito obrigado. É a minha primeira vez nesta academia."
70007010-40 = "De nada. Apenas fiz o que era natural."
70007010-41 = "Se precisar de mais alguma coisa, não hesite em pedir."
70007010-45 = "(Que pessoa tão elegante...)"
70007010-48 = "Bem, como o meu chá de proteína matinal terminou, vou começar o treino de verdade!"
70007010-53 = "(Ela toma proteína como se fosse um chá elegante...)"
70007010-54 = "(Entendo, peito de frango, batata-doce, banana... ela tem até a dieta perfeita para o treino...)"
70007010-55 = "(Normalmente, observar o treino dos outros é falta de educação...)"
70007010-56 = "(Mas esse é um menu que nunca vi nem ouvi falar no Millennium...)"
70007010-57 = "(Para aprender, vou pedir licença e observar um pouco.)"
70007010-58 = "(Eu planejava fazer exercícios aeróbicos hoje, mas será que tento seguir o treino dela um pouco?)"
70007010-65 = "Primeiro, um exercício leve... vejamos, agachamento com barra..."
70007010-66 = "...Poderia me ajudar?"
70007010-67 = "Ah, sim! O que deseja?"
70007010-68 = "Neste suporte de barra, é um pouco difícil colocar as anilhas sozinha."
70007010-69 = "Pretendo colocar uns 100kg, poderia me ajudar?"
70007010-70 = "(100kg... leve?)"
70007010-71 = "C-claro. Se eu puder ajudar no seu treino, ficarei feliz."
70007010-72 = "Ora! Que pessoa gentil! Agradeço muito."
70007010-80 = "Está bom assim?"
70007010-84 = "Por que duas anilhas de 20kg...? Eu pedi 100kg..."
70007010-85 = "...Eh?"
70007010-86 = "40kg de cada lado, totalizando 80kg. Somando com os 20kg da barra... não dá 100kg no total...?"
70007010-87 = "Fufufu. Você tem um pensamento inovador."
70007010-88 = "Quando se fala em 100kg, coloca-se 50kg de cada lado."
70007010-89 = "Mas e o peso da barra...!?"
70007010-90 = "A barra é apenas um suporte. Incluí-la no peso total é um pensamento tão adorável."
70007010-91 = "Se fosse necessário contar o peso da barra, não estaria escrito '20kg' bem grande nela?"
70007010-97 = "(Como esperado, essa pessoa é fora dos padrões, de corpo e alma...!)"
70007010-98 = "(Enquanto todos tentam aumentar 1kg que seja para sentir uma conquista... ela simplesmente 'anula' 20kg!)"
70007010-99 = "(Mas, por que será que eu me sinto convencida por isso...)"
70007010-100 = "(Isso sim é... a 'verdadeira força', não é?)"
70007010-105 = "Meu corpo já está bem aquecido. Vamos seguir para o puxador costas!"
70007010-106 = "……"
70007010-107 = "(Será que eu fiquei olhando demais...?)"
70007010-108 = "(Faz tempo que não vejo alguém fazer agachamentos com 120kg com tanta facilidade, então acabei perdendo o foco...)"
70007010-109 = "(Isso é falta de educação. Vou apenas fazer o mesmo exercício ao lado, discretamente.)"
70007010-110 = "Hoje vou pegar leve, então não preciso que ninguém sirva de peso para mim..."
70007010-111 = "Muito bem, vamos começar!"
70007010-112 = "Um! Dois! Três! Quatro!"
70007010-113 = "(Mesmo lidando com tanto peso, a postura e a respiração estão perfeitas. ...Que lindo.)"
70007010-114 = "Cinco! Seis!"
