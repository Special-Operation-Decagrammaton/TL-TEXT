[translation]
51240-1 = "Episódio 24; Algo Normal"
51240-3 = "Eu queria ser alguém de quem a Ayame não se envergonhasse."
51240-4 = "Eu tinha medo de que descobrissem como eu realmente sou, então... eu interpretava alguém digna da Ayame."
51240-15 = "Quando me dei conta, todos estavam olhando para mim."
51240-16 = "Eu tinha medo disso."
51240-19 = "Eu não sou uma pessoa assim, mas todos me superestimavam, me compreendiam mal..."
51240-20 = "Diziam que eu não perdia em nada para a Ayame. Que eu era talentosa e incrível."
51240-22 = "Eu só queria ser alguém de quem a Ayame não se envergonhasse."
51240-23 = "Só queria... me esforçar para parecer alguém assim."
51240-25 = "[ns] \"Acho que isso já é o bastante.\""
51240-26 = "…………！?"
51240-33 = "………………O que você disse?"
51240-34 = "[ns1] \"Interpretar um falso eu...\"\n[ns2] \"O que há de errado em ser aceita por esse falso eu?\""
51240-39 = "[ns3] \"Mesmo que seja falso, se você continuar interpretando,\"\n[ns4] \"uma hora isso se torna real.\""
51240-42 = "[ns5] \"Todo mundo...\"\n[ns6] \"Tenta manter as aparências.\""
51240-46 = "[ns] \"É algo normal, que todos fazem.\""
51240-47 = "…‥!?"
51240-48 = "Hah...! Você acha mesmo que esse sofisma vai colar?"
51240-49 = "Mentira continua sendo mentira. É por isso que tantas pessoas se machucam e acabam em tragédias."
51240-50 = "[s] \"Mesmo que seja uma mentira para a própria pessoa, pode ser diferente do ponto de vista de outra.\""
51240-56 = "(Por exemplo, como quando a Yukari e a Nagusa se conheceram)"
51240-59 = "Você se machucou?"
51240-60 = "Sua postura, de não recuar mesmo diante da injustiça."
51240-65 = "Foi muito legal."
51240-66 = "......!"
51240-67 = "Deixe o resto com a gente. Até mais."
51240-69 = "(Por exemplo, como quando passou tempo com todas)"
51240-72 = "A Renge é uma garota excepcional. Muito mais do que alguém inexperiente como eu."
51240-73 = "Eu sinto orgulho dessa Renge. #n Né, Yukari, você também acha, não é?"
51240-74 = "Sim! "
51240-75 = "Yukari, eu acabei de dizer que a Renge é melhor do que a Nagusa-senpai, ouviu."
51240-76 = "Hah...!?"
51240-77 = "Ei! Dá pra parar com isso, me dá vergonha de ouvir!"
51240-78 = "Mesmo vindo da Nagusa-senpai, que é mais forte do que eu, não consigo ficar feliz com isso!"
51240-83 = "......Fufu."
51240-85 = "(Por exemplo, como quando decidiu deixar a Hyakkaryouran)"
51240-87 = "Kikyou, você é excepcional. #n Como estrategista da Hyakkaryouran, todos confiam em você."
51240-88 = "Não apenas as outras garotas... mas eu também."
51240-91 = "[ns] \"Talvez tenha começado como uma 'atuação'. Mas, graças a isso, a Nagusa――\""
51240-93 = "[ns1] \"Se tornou alguém que...\"\n[ns2] \"Conhece as três melhor do que ninguém.\""
51240-96 = "[ns] \"Sim... como alguém que a Nagusa admirava.\""
51240-97 = "…………!!!"
51240-98 = "[s] \"Mesmo que fosse uma atuação, mesmo que fosse apenas para manter as aparências, e daí?\""
51240-99 = "Mesmo que, como resultado, acabem se odiando e atacando umas às outras!?"
51240-100 = "Sabendo que vão se machucar, cair no desespero e se odiar, você diz tais besteiras――"
51240-101 = "[s1] \"É verdade, talvez elas briguem...\"\n[s2] \"Talvez acabem lutando.\""
51240-104 = "[ns] \"Mas acho que, inclusive com isso, é algo que acontece com qualquer pessoa.\""
51240-107 = "[ns] \"E essas coisas fazem parte da vida.\""
51240-109 = "[ns1] \"Se brigarem, basta se esforçarem para fazer as pazes.\"\n[ns2] \"Eu também vou dar tudo de mim para ajudá-las nisso.\""
51240-114 = "………………Hã?"
51240-115 = "Que baboseira... ah! Ah! Esse seu idealismo me dá nojo..."
51240-116 = "Isso não tem elegância nenhuma! É uma história horrível!!"
51240-117 = "Um sofisma tão patético que insulta a 'Hyakumonogatari'... #n Eu vou destruir tudo, tudo mesmo..."
51240-118 = "Primeiro você, Sensei――"
51240-123 = "Não vou deixar!"
5120-132 = "[ns] \"Yukari...!\""
51240-137 = "Hã? ...Você recuperou a consciência? #n Mesmo tendo sido engolida pelo 'Katashiro Sem Rosto'?"
51240-139 = "Na escuridão―― eu ouvi uma voz."
51240-140 = "A voz do Sensei..."
51240-141 = "E a voz da Nagusa-senpai―― claramente."
51240-145 = "Sim! Eu, Kadenokouji Yukari, renasci aqui! Sim!!"
51240-150 = "Hã? O que você está dizendo?"
51240-151 = "Você esqueceu? Que as pessoas que estão aí te rejeitaram, e no fim, desprezaram os seus sentimentos."
51240-152 = "Foi por causa disso que o 'Katashiro Sem Rosto' nasceu, não foi...?"
51240-153 = "Então por que você está dizendo essas coisas agora!?"
51240-154 = "Dizer que não me machuquei seria mentira!"
51240-155 = "[s] \"Yukari...\""
51240-156 = "É verdade que meu coração dói a ponto de querer se despedaçar!"
51240-157 = "Mas, graças à voz do Sensei que ouvi em meio à minha consciência nublada――"
51240-158 = "Graças a isso...! Pude perceber, ainda que um pouco tarde."
51240-160 = "Perceber...? O quê?"
51240-165 = "Que essas coisas―― são 'normais'."
51240-171 = "Não foi apenas a Nagusa-senpai que mentiu."
51240-172 = "Eu também sou igual."
51240-173 = "E a Renge-senpai também... a Kikyou-senpai também é assim."
51240-179 = "A face pública e a face oculta... talvez para esconder o medo, pelas pessoas―― #n ou talvez para enganar a si mesma."
51240-180 = "Pessoas que se machucam com isso, pessoas que insultam chamando de hipocrisia, podem acabar lutando por causa disso."
51240-184 = "Mas, isso não é―― só comigo. #n Todos são iguais."
51240-185 = "[s] \"......Sim.\""
51240-187 = "Haaah...?"
51240-188 = "Se você diz que, se brigarmos, podemos fazer as pazes―― então eu aceito essas palavras!"
51240-195 = "Eu escolho aceitar essas palavras!"
51240-196 = "Talvez tenhamos nos machucado profundamente... #n mas eu quero fazer as pazes!"
51240-197 = "Quero fazer as pazes com todas―― e voltar à Hyakkaryouran daquela época!"
51240-199 = "Como você pode dizer algo tão infantil...!"
51240-200 = "Yabuki Shuro―― era esse o seu nome?"
51240-201 = "Eu, Yukari! Para proteger todos da Hyakkaryouran, eu desafio você para uma Batalha de Sucessão!"
51240-202 = "Esta é a minha determinação, como elite da Hyakkaryouran!"
51240-203 = "Haha... entendo... por que não faz como quiser?"
51240-204 = "O 'Katashiro Sem Rosto' que nasceu de [ruby=você]você[/ruby] ainda está aqui, afinal...!"
51240-215 = "Com isso, a hipócrita Nagusa, o Sensei tolo, e a garotinha atrevida――"
51240-216 = "――Tooodos vocês!"
51240-224 = "......Eh?"
51240-229 = "Doryaaaaaah!! Chegamos!!!"
51240-230 = "......Yukari, você está bem!?"
51240-235 = "............Ah."
51240-236 = "Aaaaaah!! Renge-senpai, Kikyou-senpai!!!"
51240-238 = "Phew... que bom que chegamos a tempo..."
51240-239 = "[s] \"Como vocês duas chegaram aqui!?\""
51240-240 = "Outras pessoas nos ajudaram. #n Só nós conseguimos vir na frente."
51240-241 = "Então, estamos no meio de uma batalha intensa, é isso?"
51240-247 = "......Yabuki Shuro, do Clube das Flores, Pássaros, Vento e Lua."
51240-248 = "Como estrategista da Hyakkaryouran, te dou um conselho... renda-se quietinha."
51240-252 = "Hah..."
51240-253 = "Haha――"
51240-254 = "Ahahahahahah!"
51240-258 = "Não acredito que, a essa altura, vocês vão transformar tudo nessa historinha barata!"
51240-259 = "......Tudo bem. Vamos ver até onde vocês conseguem chegar!"
51240-260 = "Se vocês vão transformar a minha 'Hyakumonogatari'―― em algo tão sem nexo quanto isso..."
51240-261 = "Eu vou resetar tudo agora mesmo! E começar tudo de novo!"
51240-272 = "Destruam tudo!"
51240-273 = "Transformem a Hyakkaryouran em caos――!!"
51240-275 = "Kikyou... Yukari, Sensei!"
51240-276 = "[s] \"Certo, vamos nessa!\""
51240-277 = "Já que chegamos até aqui, não podemos recuar."
51240-278 = "Com toda a nossa força! Vamos nessa!"
