[translation]
51240-1 = "第24話;普通のこと"
51240-3 = "アヤメにとって、恥ずかしくない人でありたかった。"
51240-4 = "本当の姿を知られるのが怖くて、アヤメに相応しい人を……演じてた。"
51240-15 = "気がついたら、みんなが私を見ていた。"
51240-16 = "それが怖かったの。"
51240-19 = "自分はそんな人間じゃないのに、みんなが自分のことを買い被って、誤解して…… "
51240-20 = "アヤメに引けを取らないって。優秀ですごい人だって。"
51240-22 = "私は、アヤメに恥じない人になりたかっただけなのに。 "
51240-23 = "そのために必死に取り繕っていた……だけなのに。"
51240-25 = "[ns] \"それで十分なんじゃないかな。\""
51240-26 = "…………！？"
51240-33 = "………………何ですって？"
51240-34 = "[ns1] \"偽りの自分を演じて……\"\n[ns2] \"偽りの自分が受け入れられることの、何が悪いのかな。\""
51240-39 = "[ns3] \"偽りだとしても、それを演じ続けていけば、\"\n[ns4] \"いつしかそれは本当になる。\""
51240-42 = "[ns5] \"誰だって……\"\n[ns6] \"自分[ruby=つくろ]を繕う[/ruby]ものだよ。\""
51240-46 = "[ns] \"誰もがやる、普通のこと。\""
51240-47 = "…‥！？"
51240-48 = "ハッ……！そんな屁理屈がまかり通るとでもぉ？"
51240-49 = "嘘はどこまでいっても嘘。#nだからこそ多くの人間が傷つき、悲劇を招くのです。"
51240-50 = "[s] \"本人にとっては嘘だったとしても、他人の視点では違うかもしれないよ。\""
51240-56 = "（例えば、ユカリとナグサが出会った時のように）"
51240-59 = "ケガは？"
51240-60 = "悪事を目の当たりにしても[ruby=ひる]怯[/ruby]まないその姿勢。"
51240-65 = "すごく、格好良かったよ。"
51240-66 = "……！"
51240-67 = "あとは私たちに任せて。それじゃ。"
51240-69 = "（例えば、みんなと過ごした時のように）"
51240-72 = "レンゲは優秀な子。私みたいな半人前なんかよりも、ずっと。"
51240-73 = "そんなレンゲを誇らしく思ってる。#nね、ユカリもそう思うでしょ？"
51240-74 = "ええ！ "
51240-75 = "ユカリ、今のはナグサ先輩よりもレンゲが優秀だって言ってるんだけど。"
51240-76 = "ハッ……！？"
51240-77 = "ちょっ！聞いてるこっちが恥ずかしくなるからやめてくれないか！？"
51240-78 = "アタシより強いナグサ先輩にそんな事言われても素直に喜べないって！"
51240-83 = "……ふふっ。"
51240-85 = "（例えば、百花繚乱を離れると決心した時のように）"
51240-87 = "キキョウ、あなたは優秀。#n百花繚乱の作戦参謀として、みんながあなたを頼りにしてる。"
51240-88 = "他のメンバーだけじゃなく……私もそう。"
51240-91 = "[ns] \"最初は「演技」だったのかもしれない。でも、ナグサはそのおかげで――\""
51240-93 = "[ns7] \"誰よりも3人のことを……\"\n[ns8] \"よく知っている人になれた。\""
51240-96 = "[ns] \"そう……ナグサが憧れていた誰かのように、ね。\""
51240-97 = "…………！！！"
51240-98 = "[s] \"演技だとしても、取り繕っていただけだとしても、いいじゃん。\""
51240-99 = "結果、互いを憎み合い攻撃することになっても！？"
51240-100 = "傷つき、絶望に暮れ、憎み合うと分かっているのに、そんな[ruby=ざれごと]戯言[/ruby]を――"
51240-101 = "[s9] \"たしかに、それでいがみ合ったり……\"\n[s10] \"ケンカするかもしれない。\""
51240-104 = "[ns] \"後ろ指差されたり、傷つくこともあると思う。\""
51240-107 = "[ns] \"そういうのも含めて、誰にだってあることだよ。\""
51240-109 = "[ns11] \"ケンカをしたのなら、仲直りできるよう努力すればいい。\"\n[ns12] \"私も、そのために全力でみんなの力になるよ。\""
51240-114 = "………………なぁにそれ。"
51240-115 = "くっだらない……ああ！ああ！反吐が出そうな理想論……"
51240-116 = "そんなの風流でも何でもない！最悪な物語ですぅ！！"
51240-117 = "「百物語」を侮辱する最低最悪の屁理屈なんてぇ……#n全部、ぜ～んぶめちゃくちゃにして差し上げますよぉ……"
51240-118 = "まずは先生、[ruby=てめぇ]手前[/ruby]から――"
51240-123 = "そうはさせませんの！"
51240-132 = "[ns] \"ユカリ……！\""
51240-137 = "ハァ？……気がついたんですかぁ？[ruby=カタシロ]無貌の形代[/ruby]に呑まれていたのにぃ？#n……どうやって？"
51240-139 = "暗闇の中で――声が聞こえてきましたの。"
51240-140 = "先生と…… "
51240-141 = "ナグサ先輩の声が――ハッキリと。"
51240-145 = "ええ！身共、[ruby=かでのこうじ]勘解由小路[/ruby]ユカリ、ここに復活！ですの！！"
51240-150 = "ハ？なに言ってんの？"
51240-151 = "忘れたんですぅ？そこにいるヤツらが[ruby=てめぇ]手前[/ruby]を拒絶して、果ては[ruby=てめぇ]手前[/ruby]の気持ちを[ruby=むげ]無碍[/ruby]にしたってこと。"
51240-152 = "それゆえに「[ruby=カタシロ]無貌の形代[/ruby]」は生まれたんですよぉ……？"
51240-153 = "なのに今更なんなんですぅ！？"
51240-154 = "何も傷ついていないといえば、嘘になりますわ！"
51240-155 = "[s] \"ユカリ……。\""
51240-156 = "胸が痛くて張り裂けそうなのも、事実ですの！"
51240-157 = "でも、ぼんやりとした意識の中で聞こえてきた先生の声――"
51240-158 = "そのおかげで……！今更ながら、気づくことができたのです。"
51240-160 = "気づく……？何を？"
51240-165 = "それらが――「普通」であることに。"
51240-171 = "嘘をついたのはナグサ先輩だけではありません。"
51240-172 = "身共だって同じなのです。"
51240-173 = "そしてレンゲ先輩も……キキョウ先輩だってそう。"
51240-179 = "表と裏の姿……恐怖をごまかすため、人のため――#nもしくは自分を騙すためかもしれません。"
51240-180 = "それで傷つく人も、それを偽善だと罵る人も、火種となってケンカすることだってあるでしょう。"
51240-184 = "ですが、それは――身共だけじゃない。#n皆様、同じなのだと。"
51240-185 = "[s] \"……うん。\""
51240-187 = "はぁあ……？"
51240-188 = "喧嘩したのなら仲直りすればいい――そうおっしゃっていただけるのなら！"
51240-195 = "身共はその言葉を受け入れようと思いますの！"
51240-196 = "お互いを深く傷つけてしまったかもしれません……#nですが、身共は仲直りしたいのです！"
51240-197 = "皆様と仲直りして――あの時の百花繚乱に戻りたいのです！"
51240-199 = "そんな子供じみた台詞を、よくもまぁ……！"
51240-200 = "[ruby=やぶき]箭吹[/ruby]シュロ――でしたね？"
51240-201 = "このユカリ！百花繚乱の皆を守るため、あなたに決闘を申し込みますわ！"
51240-202 = "百花繚乱のえり～ととしての、身共の決意ですの！"
51240-203 = "はは……そう……お好きになさればいいんじゃないですぅ？"
51240-204 = "[ruby=てめぇ]手前[/ruby]から生まれた[ruby=カタシロ]無貌の形代[/ruby]は、まだここに残っていますから……！ "
51240-215 = "これがあれば、嘘つきナグサも、愚かな先生も、身の程知らずの小娘も――"
51240-216 = "――み～んな！"
51240-224 = "……へ？"
51240-229 = "どりゃぁぁぁあっ！！来たぞ！！！"
51240-230 = "……ユカリ、大丈夫！？"
51240-235 = "…………あ。"
51240-236 = "あああっ！！レンゲ先輩、キキョウ先輩！！！"
51240-238 = "ふぅ……間に合ってよかった……。"
51240-239 = "[s] \"2人ともどうやってここに！？\""
51240-240 = "他のヤツらが助けてくれてさ。#nアタシたちだけ先に来れたんだ。"
51240-241 = "で、今は激戦真っ最中って感じ？"
51240-247 = "……花鳥風月部の、[ruby=やぶき]箭吹[/ruby]シュロ。"
51240-248 = "百花繚乱の作戦参謀として忠告するよ……大人しく降参して。"
51240-252 = "はっ……"
51240-253 = "はは――"
51240-254 = "アッハハハハッ！"
51240-258 = "まさかここに来て、こ～んな薄っぺらい物語にしてしまうだなんて！"
51240-259 = "……いいでしょう。やれるところまでやってみましょうか！"
51240-260 = "手前の「百物語」を――こんな支離滅裂なものにしてしまうくらいなら……"
51240-261 = "今からでもぜぇんぶリセットして！最初からやり直しますよぉ！"
51240-272 = "全て終わりにしてしまえ！"
51240-273 = "百花繚乱を滅茶苦茶に――！！"
51240-275 = "キキョウ……ユカリ、先生！"
51240-276 = "[s] \"うん、いくよ！\""
51240-277 = "ここまで来たからには、引き下がれない。"
51240-278 = "全力で！参りますの！"
