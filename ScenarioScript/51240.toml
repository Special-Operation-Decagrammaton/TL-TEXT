[translation]
51240-1 = "Episódio 24; Algo comum"
51240-3 = "Eu queria ser alguém de quem Ayame pudesse se orgulhar."
51240-4 = "Eu tinha medo de que descobrissem quem eu realmente era, então... eu interpretei o papel de alguém digno da Ayame."
51240-15 = "Quando me dei conta, todos estavam olhando para mim."
51240-16 = "E isso me assustava."
51240-19 = "Eu não sou esse tipo de pessoa, mas todos me superestimaram e me entenderam mal..."
51240-20 = "Dizendo que eu não ficava atrás da Ayame. Que eu era alguém excelente e incrível."
51240-22 = "Eu só queria ser alguém que não envergonhasse a Ayame."
51240-23 = "Só queria... manter as aparências desesperadamente para isso."
51240-25 = "[ns] \"Acho que isso já é o suficiente.\""
51240-26 = "…………！？"
51240-33 = "………………O que você disse?"
51240-34 = "[ns1] \"Interpretar um eu falso...\"\n[ns2] \"O que há de errado em aceitar esse eu falso?\""
51240-39 = "[ns3] \"Mesmo que seja uma mentira, se você continuar a interpretando,\"\n[ns4] \"um dia ela se tornará verdade.\""
51240-42 = "[ns5] \"Todo mundo...\"\n[ns6] \"tenta manter as aparências, sabe?\""
51240-46 = "[ns] \"É algo comum que todos fazem.\""
51240-47 = "…‥！？"
51240-48 = "Hah...! Você acha mesmo que esse tipo de sofisma cola?"
51240-49 = "Uma mentira sempre será uma mentira. #nÉ por isso que tantas pessoas se machucam e tragédias acontecem."
51240-50 = "[s] \"Mesmo que seja uma mentira para a própria pessoa, pode ser diferente do ponto de vista dos outros.\""
51240-56 = "(Por exemplo, como quando Yukari e Nagusa se conheceram)"
51240-59 = "E os ferimentos?"
51240-60 = "Essa sua postura de não hesitar mesmo diante de atos malignos."
51240-65 = "Foi muito legal da sua parte."
51240-66 = "……！"
51240-67 = "Deixe o resto com a gente. Até mais."
51240-69 = "(Por exemplo, como quando passamos tempo com todos)"
51240-72 = "Renge é uma garota excelente. Muito mais do que uma iniciante como eu."
51240-73 = "Tenho muito orgulho da Renge. #nEi, Yukari, você não acha o mesmo?"
51240-74 = "Sim!"
51240-75 = "Yukari, agora você está dizendo que a Renge é mais excelente que a veterana Nagusa."
51240-76 = "Hah...!?"
51240-77 = "Ei! Pare com isso, eu fico com vergonha só de ouvir!"
51240-78 = "Não consigo ficar feliz com um elogio desses vindo da veterana Nagusa, que é mais forte que eu!"
51240-83 = "……Fufu."
51240-85 = "(Por exemplo, como quando decidi deixar o Hyakka Ryoran)"
51240-87 = "Kikyou, você é excelente. #nComo estrategista do Hyakka Ryoran, todos dependem de você."
51240-88 = "Não só os outros membros... eu também."
51240-91 = "[ns] \"Talvez tenha começado como uma 'atuação'. Mas, graças a isso, Nagusa...\""
51240-93 = "[ns7] \"conseguiu se tornar alguém que...\"\n[ns8] \"conhece os três melhor do que ninguém.\""
51240-96 = "[ns] \"Isso mesmo... como alguém que a Nagusa admirava.\""
51240-97 = "…………！！！"
51240-98 = "[s] \"Mesmo que seja uma atuação, mesmo que você só estivesse mantendo as aparências, qual é o problema?\""
51240-99 = "Mesmo que o resultado seja o ódio mútuo e ataques entre si!?"
51240-100 = "Sabendo que isso levará a ferimentos, desespero e ódio, você ainda diz essas bobagens—"
51240-101 = "[s9] \"É verdade, talvez vocês acabem se desentendendo...\"\n[s10] \"ou brigando por causa disso.\""
51240-104 = "[ns] \"Acho que vocês podem ser criticadas ou se machucar também.\""
51240-107 = "[ns] \"Mas isso é algo que acontece com todo mundo, inclusive com essas coisas.\""
51240-109 = "[ns11] \"Se vocês brigarem, basta se esforçarem para fazer as pazes.\"\n[ns12] \"Eu também farei o possível para ajudar a todos com isso.\""
51240-114 = "………………O que é isso?"
51240-115 = "Que bobagem... Ah! Ah! Esse idealismo que me dá ânsia de vômito..."
51240-116 = "Isso não tem nada de elegante! É a pior história de todas!!"
51240-117 = "Esses sofismas desprezíveis que insultam as \"Cem Histórias\"...#nVou destruir tudo, tudinho, até não sobrar nada..."
51240-118 = "Começando por você, Sensei—"
51240-123 = "Eu não vou deixar você fazer isso!"
51240-132 = "[ns] \"Yukari...!\""
51240-137 = "Hã? ...Você acordou? Mesmo tendo sido engolida pelo Simulacro Sem Rosto?#n...Como?"
51240-139 = "Na escuridão... eu ouvi uma voz."
51240-140 = "A voz do Sensei e..."
51240-141 = "A voz da Nagusa-senpai — claramente."
51240-145 = "Sim! Eu, Kadenokouji Yukari, estou de volta! É isso mesmo!!"
51240-150 = "Hã? Do que você está falando?"
51240-151 = "Já esqueceu? Aquelas pessoas ali rejeitaram você e, no fim, desprezaram os seus sentimentos."
51240-152 = "Foi por isso que o \"Simulacro Sem Rosto\" nasceu, não foi...?"
51240-153 = "Então por que está agindo assim agora!?"
51240-154 = "Seria mentira dizer que não estou ferida!"
51240-155 = "[s] \"Yukari...\""
51240-156 = "É verdade que meu peito dói e parece que vai se despedaçar!"
51240-157 = "Mas, na minha consciência nublada, ouvi a voz do Sensei—"
51240-158 = "Graças a isso...! Só agora, eu consegui perceber."
51240-160 = "Perceber...? O quê?"
51240-165 = "Que tudo isso... é \"normal\"."
51240-171 = "Não foi só a Nagusa-senpai que mentiu."
51240-172 = "Eu também fiz o mesmo."
51240-173 = "E a Renge-senpai também... a Kikyou-senpai também."
51240-179 = "A face pública e a oculta... talvez para esconder o medo, pelos outros...#nou talvez para enganar a si mesma."
51240-180 = "Pessoas se machucam por causa disso, outras xingam isso de hipocrisia, e isso acaba virando faísca para brigas."
51240-184 = "Mas isso... não acontece só comigo. #nTodos são iguais."
51240-185 = "[s] \"...Sim.\""
51240-187 = "Hã...?"
51240-188 = "Se brigamos, basta fazer as pazes — se você diz isso!"
51240-195 = "Eu pretendo aceitar essas palavras!"
51240-196 = "Talvez tenhamos nos ferido profundamente...#nmas eu quero fazer as pazes!"
51240-197 = "Quero me reconciliar com todas — e voltar para o Hyakka Ryoran daquela época!"
51240-199 = "Como você tem coragem de dizer algo tão infantil...!"
51240-200 = "Yabuki Shuro... era esse o seu nome, certo?"
51240-201 = "Eu, Yukari! Para proteger todas do Hyakka Ryoran, eu a desafio para um duelo!"
51240-202 = "Essa é a minha determinação como uma elite do Hyakka Ryoran!"
51240-203 = "Haha... é mesmo... por que não faz como quiser?"
51240-204 = "O Simulacro Sem Rosto que nasceu de você ainda está aqui, afinal...!"
51240-215 = "Com isso, a mentirosa da Nagusa, o Sensei tolo e a garotinha sem noção—"
51240-216 = "—todinhos!"
51240-224 = "...Hã?"
51240-229 = "Doryaaaaa!! Chegamos!!!"
51240-230 = "...Yukari, você está bem!?"
51240-235 = "............Ah."
51240-236 = "Ahhh!! Renge-senpai, Kikyou-senpai!!!"
51240-238 = "Ufa... que bom que chegamos a tempo..."
51240-239 = "[s] \"Como vocês duas chegaram aqui!?\""
51240-240 = "Os outros nos ajudaram. #nNós conseguimos vir na frente."
51240-241 = "Então, estamos no meio de uma batalha intensa agora?"
51240-247 = "……Shuro Yabuki, do Clube Kacho Fugetsu."
51240-248 = "Como estrategista da Hyakkiyako, eu te aconselho... renda-se pacificamente."
51240-252 = "Ha..."
51240-253 = "Haha—"
51240-254 = "Ahahahahaha!"
51240-258 = "Quem diria que, chegando aqui, você transformaria isso em uma história tão superficial!"
51240-259 = "……Muito bem. Vamos ver até onde você consegue ir!"
51240-260 = "Se é para transformar o seu \"Hyakki Monogatari\" em algo tão incoerente assim..."
51240-261 = "Eu vou resetar tudo agora mesmo! Vamos começar do zero!"
51240-272 = "Acabe com tudo!"
51240-273 = "Destrua a Hyakkiyako completamente——!!"
51240-275 = "Kikyou... Yukari, Sensei!"
51240-276 = "[s] \"Sim, vamos nessa!\""
51240-277 = "Já que chegamos até aqui, não podemos recuar."
51240-278 = "Com força total! Vamos lá!"
