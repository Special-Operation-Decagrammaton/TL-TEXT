[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003915-1 = "RABBIT 4, Relembrando" 
1003915-2 = "Arredores da Cidade dos Coelhinhos - Telhado de Prédio" 
1003915-3 = "（Vim ao telhado de um prédio próximo à cidade para ajudar a Miyu com uma 'missão'.）" 
1003915-7 = "（Pelo fato de ser o raiar do dia, o vento estava muito mais gélido que o normal.）" 
1003915-8 = "Horário atual, 08:30. Temperatura, 7 graus Celsius.\nVento a de oeste-sudoeste a 20 nós..." 
1003915-9 = "Os movimentos do alvo Tango Charlie ainda não foram confirmados..." 
1003915-10 = "[s1] \"E-Etto, desculpe atrapalhar a sua concentração...\"\n[s2] \"O que você estava mirando mesmo?\"" 
1003915-13 = "A-Ah..." 
1003915-14 = "Bom..." 
1003915-15 = "Eu vim para lidar com uns corvos que estão bagunçando o lixão..." 
1003915-16 = "[s] \"Corvos?\"" 
1003915-17 = "Sim. Os corvos desta área rasgam os sacos de lixo e adoram roubar coisas brilhantes..." 
1003915-18 = "No entanto, como eles são animais inteligentes, a captura é bem difícil..." 
1003915-19 = "Sempre que veem alguma aluna carregando armas, eles fogem e procuram agir apenas nos horários que a rua está sem movimento..." 
1003915-20 = "E é por isso que estou os esperando do telhado para usar dardos tranquilizantes..." 
1003915-21 = "Ahn... você não está entediado, Sensei?" 
1003915-22 = "Como é uma missão de franco-atirador... terei que ficar esperando sem nem saber quando o meu alvo vai aparecer..." 
1003915-23 = "[s3] \"Não se preocupe, eu estou bem.\"\n[s4] \"Já estou mais que acostumado a esperar.\"" 
1003915-26 = "Fico mais aliviada assim..." 
1003915-27 = "Então, retornarei as minhas observações." 
1003915-33 = "（......Mas, conforme o tempo passava, o frio ficava gradualmente insuportável.）" 
1003915-36 = "[ns] \"Uuuu...\"" 
1003915-37 = "S-Sensei. Você está com frio?" 
1003915-38 = "Eu notei que você está tremendo há um tempinho..." 
1003915-39 = "[s5] \"E-Eu tô de boas...\"\n[s6] \"Miyu, você está bem?\"" 
1003915-42 = "S-Sim. E eu já não consigo aturar dias quentes, de qualquer forma..." 
1003915-43 = "Além de que, o Ghillie Suit que estou usando é muito grosso, então não me sinto nem um pingo de frio." 
1003915-44 = "[s7] \"Ficar parado só me dá mais calafrios...\"\n[s8] \"Vou dar um pulinho na loja de conveniência para comprar uma bebida quente.\"" 
1003915-47 = "Ah, se é uma bebida quente que você quer..." 
1003915-48 = "Aqui, Sensei..." 
1003915-54 = "Sirva-se, é chocolate quente." 
1003915-55 = "E, por ser uma garrafa térmica, creio que ainda deva estar bem quentinho, mesmo que faça muito tempo desde que eu preparei." 
1003915-59 = "[ns9] \"Incrível, ainda está quentinho...\"\n[ns10] \"Você me salvou dessa, muito obrigado.\"" 
1003915-63 = "Ehehe... fico contente por ser útil." 
1003915-64 = "[s11] \"Falando nisso, você anda sempre com esta garrafa com você.”\n[s12] \"É por causa da hidratação nas missões?\"" 
1003915-67 = "N-Não... na verdade, os atiradores de elite quase nunca ingerem líquidos durante as missões." 
1003915-68 = "Seria um grande problema se o nosso corpo exigisse funções fisiológicas no exato momento que o alvo aparecesse, sabe..." 
1003915-69 = "Mesmo quando estamos com a garganta seca, seguramos a vontade de beber até a missão acabar." 
1003915-70 = "[s] \"Então por que sempre carrega a garrafa?\"" 
1003915-71 = "Isso é... algo que todas as meninas do meu esquadrão me deram." 
1003915-72 = "Elas enchem de chocolate ou chá quentes sempre que eu viajo longas distâncias em um dia frio..." 
1003915-73 = "Quando eu seguro durante as minhas missões, o calor por si só preenche o meu corpo." 
1003915-74 = "Me sinto conectada a elas dessa forma, mesmo que eu esteja em um lugar distante..." 
1003915-75 = "[s] \"Então essa garrafa é o seu elo de ligação com elas, entendi.\"" 
1003915-76 = "......Sim." 
1003915-77 = "Afinal de contas, somos todas do Esquadrão RABBIT...!" 
1003915-79 = "（E então continuei a apoiar a Miyu ao seu lado com o calor contagiante do chocolate quente.）" 