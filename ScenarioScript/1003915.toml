[translation]
1003915-1 = "RABBIT4、思い出します"
1003915-2 = "子ウサギタウン近郊・ビル屋上"
1003915-3 = "（ミユの「任務」を手伝うべく、子ウサギタウン近くのビルの屋上に来た）"
1003915-7 = "（早朝なことも相まって、風が普段より冷たく感じる）"
1003915-8 = "現在時刻は0830。気温は摂氏7度。#n風は西南西から20ノット……"
1003915-9 = "目標、タンゴチャーリーの動向は確認できていません……"
1003915-10 = "[s1] \"えっと、集中してる時にごめん……。\"\n[s2] \"……何を狙ってるんだっけ？\""
1003915-13 = "あ、えっと……。"
1003915-14 = "その……。"
1003915-15 = "ゴミ捨て場を荒らすカラスの退治を……。"
1003915-16 = "[s] \"カラス？\""
1003915-17 = "はい。この周辺に現れるカラスがゴミ袋を破ったり、#nキラキラしたものを盗んでいくらしく……"
1003915-18 = "ですがカラスは賢い動物なので、捕獲が難しくって……。"
1003915-19 = "銃を持った生徒がいると隠れたり、人が行き来する時間帯を避けて活動したり……。"
1003915-20 = "なので、今日はこうして屋上で待機しつつ、#nカラスが現れたら麻酔弾で捕えようかと。"
1003915-21 = "その……先生は、退屈ではありませんか？"
1003915-22 = "狙撃任務なので……。#nいつ現れるか分からない目標を、ずっと待たないとですし……。"
1003915-23 = "[s3] \"私は大丈夫だから気にしないで。\"\n[s4] \"待つのは慣れてるから。\""
1003915-26 = "それなら良いのですが……。"
1003915-27 = "では、観測に戻りますね。"
1003915-33 = "（……しかし時間が経つにつれて、徐々に寒さに耐えられなくなってきた）"
1003915-36 = "[ns] \"うぅ……。\""
1003915-37 = "せ、先生。もしかして寒いんですか？"
1003915-38 = "さっきからずっと震えているような……。"
1003915-39 = "[s5] \"わ、私は大丈夫……。\"\n[s6] \"ミユの方こそ平気？\""
1003915-42 = "は、はい。私は元々、暑さに弱い方なので……。"
1003915-43 = "それに今は厚手のギリースーツを羽織っていますし、大丈夫です。"
1003915-44 = "[s7] \"動いてないから、余計に寒気が……。\"\n[s8] \"ちょっと温かい飲み物でも買いに、コンビニに行ってくるね。\""
1003915-47 = "あ、温かい飲み物でしたら……。"
1003915-48 = "先生、こちらを……。"
1003915-54 = "どうぞ、ココアです。"
1003915-55 = "任務を始めてから、結構経っていますが……。#n断熱ポットなので、まだ温かいはずです。"
1003915-59 = "[ns9] \"本当だ、すごく温かい……。\"\n[ns10] \"おかげさまで助かったよ、ありがとう。\""
1003915-63 = "えへへ……先生のお役に立てて嬉しいです。"
1003915-64 = "[s11] \"そういえばこのポット、よく持ち歩いているよね。”\n[s12] \"やっぱり作戦中の水分補給用？\""
1003915-67 = "い、いえ……狙撃手は作戦中、ほとんど水を飲みません。"
1003915-68 = "目標が現れた時に、その……生理現象で動けなくなったら、困りますから……。"
1003915-69 = "喉が渇いても、作戦終了まで我慢することがほとんどです。"
1003915-70 = "[s] \"じゃあ、どうしてこのポットを？\""
1003915-71 = "これは……みんなが、くれたもので。"
1003915-72 = "寒い日に遠方まで行く時は、温かいココアやお茶をたっぷり入れてくれて……。"
1003915-73 = "作戦中に触ってると、それだけで熱が伝わってくるんです。"
1003915-74 = "離れていても、みんなと一緒にいる感じがして……。"
1003915-75 = "[s] \"みんなとの繋がりの一つなんだね。\""
1003915-76 = "……はい。"
1003915-77 = "私たちは、RABBIT小隊ですから……！"
1003915-79 = "（その後ミユと一緒に、みんなの温かい気持ちが込められたココアと共に任務を続けた）"
