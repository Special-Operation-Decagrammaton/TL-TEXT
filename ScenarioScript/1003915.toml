[translation]
1003915-1 = "RABBIT4、 lembro-me."
1003915-2 = "Arredores da Cidade dos Coelhinhos - Telhado do prédio"
1003915-3 = "（Vim ao telhado de um prédio perto da Cidade dos Coelhinhos para ajudar na \"missão\" da Miyu）"
1003915-7 = "（Como é de manhã cedo, o vento parece mais frio que o normal）"
1003915-8 = "Hora atual: 08:30. Temperatura: 7 graus Celsius. #nO vento sopra a 20 nós vindo de sudoeste..."
1003915-9 = "Alvo, Tango Charlie, ainda não foi avistado..."
1003915-10 = "[s1] \"Desculpe te interromper enquanto está concentrada...\"\n[s2] \"...O que exatamente você está mirando?\""
1003915-13 = "Ah, bem..."
1003915-14 = "É que..."
1003915-15 = "Estou tentando exterminar os corvos que reviram o lixo..."
1003915-16 = "[s] \"Corvos?\""
1003915-17 = "Sim. Parece que os corvos que aparecem por aqui rasgam os sacos de lixo e roubam coisas brilhantes..."
1003915-18 = "Mas corvos são animais inteligentes, então é difícil capturá-los..."
1003915-19 = "Eles se escondem quando veem estudantes armadas e evitam os horários de maior movimento das pessoas..."
1003915-20 = "Por isso, hoje estamos esperando aqui no telhado, #ne se um corvo aparecer, pretendo capturá-lo com um dardo anestésico."
1003915-21 = "Diga-me... Sensei, você não está entediado?"
1003915-22 = "Como é uma missão de sniper... #nprecisamos esperar o tempo todo por um alvo que não sabemos quando aparecerá..."
1003915-23 = "[s3] \"Eu estou bem, não se preocupe.\"\n[s4] \"Já estou acostumado a esperar.\""
1003915-26 = "Se você diz, fico mais tranquila..."
1003915-27 = "Então, vou voltar a observar."
1003915-33 = "（...No entanto, com o passar do tempo, comecei a não aguentar mais o frio）"
1003915-36 = "[ns] \"Ugh...\""
1003915-37 = "Se-Sensei. Por acaso você está com frio?"
1003915-38 = "Parece que você está tremendo faz um tempo..."
1003915-39 = "[s5] \"E-Eu estou bem...\"\n[s6] \"E você, Miyu, está bem?\""
1003915-42 = "S-Sim. Eu, originalmente, não me dou muito bem com o calor..."
1003915-43 = "Além disso, estou usando um traje ghillie grosso agora, então estou bem."
1003915-44 = "[s7] \"Como não estou me movendo, o frio está batendo mais forte...\"\n[s8] \"Vou ali na loja de conveniência comprar algo quente para beber.\""
1003915-47 = "Ah, se for algo quente para beber..."
1003915-48 = "Sensei, pegue isto..."
1003915-54 = "Aqui, é chocolate quente."
1003915-55 = "Já faz um bom tempo desde que começamos a missão... #nComo é uma garrafa térmica, ainda deve estar quente."
1003915-59 = "[ns9] \"É verdade, está bem quente...\"\n[ns10] \"Obrigado, isso me salvou.\""
1003915-63 = "Hehehe... Fico feliz em poder ser útil ao Sensei."
1003915-64 = "[s11] \"Aliás, você sempre carrega essa garrafa, né?\"\n[s12] \"É para se hidratar durante as operações?\""
1003915-67 = "N-Não... Snipers quase não bebem água durante as operações."
1003915-68 = "Se o alvo aparecer e eu... bem, precisar me mover por necessidades fisiológicas, seria um problema..."
1003915-69 = "Mesmo com sede, na maioria das vezes eu aguento até o fim da missão."
1003915-70 = "[s] \"Então, por que você carrega essa garrafa?\""
1003915-71 = "Isso foi... algo que as outras me deram."
1003915-72 = "Sempre que vou para longe em dias frios, elas enchem com bastante chocolate quente ou chá..."
1003915-73 = "Só de tocar nela durante a missão, o calor já passa para mim."
1003915-74 = "Mesmo estando longe, sinto como se estivesse com todas elas..."
1003915-75 = "[s] \"Então é um símbolo da conexão entre vocês.\""
1003915-76 = "...Sim."
1003915-77 = "Porque nós somos o Esquadrão RABBIT...!"
1003915-79 = "（Depois disso, continuei a missão junto com a Miyu, aquecido pelo chocolate quente que continha o carinho de todas）"
