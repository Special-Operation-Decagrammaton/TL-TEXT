[translation]
2901-1 = "そうして一堂に会して（１）"
2901-7 = "百鬼夜行・第38旧校舎のとある教室"
2901-8 = "いんやぁー、やーっと撮影終わったよ～。"
2901-9 = "部長、お疲れ、様でした……！お水、どうぞ……！"
2901-10 = "おっ、ありがとー！"
2901-11 = "あと、汗を拭くためのタオルと、昨日作ったレモンのはちみつ漬けも、ありますので……。"
2901-12 = "あ、美味しそー。"
2901-13 = "ありがとね、いっただっきまーす！"
2901-14 = "……っていうかこれ、完全に「運動部のマネージャーさんが持ってくるセット」じゃん！目指せ全国大会！？"
2901-15 = "にしてもツクヨは本当に気が利くねぇ。"
2901-17 = "私には、その、これくらいしかできませんので……。"
2901-18 = "そんなことないよー。今日の撮影だって、ツクヨが手伝ってくれたから上手く撮れたんだよ？"
2901-19 = "ツクヨがいなかったら、例えばさっきのあの……"
2901-20 = "印を結んだ瞬間のピカッ！！ってきらめくシーンとか、あれはツクヨ無しじゃ絶対に撮れなかったよ！"
2901-21 = "レフ版の角度完璧だった！"
2901-22 = "そう、ですか……？私としては、それ以外にも、できればもっと、お役に立てればなと思ってて……。"
2901-23 = "あくまでも、撮影補助とかしか、できませんし……。"
2901-24 = "それに、あの時は……"
2901-25 = "「あの時」って、あぁー……"
2901-27 = "OK！ツクヨ、そこにいて！めっちゃ良い感じ！"
2901-28 = "はいっ、了解です……！レフ版の角度も、こんな感じで……？"
2901-32 = "えっ？あ、えっと……？"
2901-36 = "猫さんたちが、たくさん……？あの、そんなに集まられると、困ってしまうのですが……！"
2901-37 = "私、今はやらなくてはいけないことが、あぁ……！"
2901-43 = "そんなに集まられると、私、動けなく……！"
2901-44 = "私、待ち合わせの目印じゃ、ないんですよぉ……！？"
2901-46 = "ねえねえあれ見て！猫ちゃんがいっぱい！"
2901-47 = "すごい、猫の集会みたいだね？"
2901-48 = "写真撮っとこー！"
2901-55 = "わわっ、えっと、撮らないで、ください……！？"
2901-56 = "撮影中とは、言いましたが、そうではなく……！"
2901-58 = "あはー、確かにあれはあれは災難だったねー。"
2901-59 = "結局、撮影がちゃんと始まるまで、30分もかかってしまい……。"
2901-60 = "うぅ……部長、あらためて、すみませんでした……。"
2901-61 = "私の、私のせいで～……。"
2901-62 = "いやいや、別にツクヨのせいじゃないって。"
2901-63 = "優しそうだし、もしかしたら猫たちも「この人はエサをくれるかも」って勘違いしたんじゃない？"
2901-64 = "でしたら、えっと……これからは、餌を用意した方が……？"
2901-65 = "いや、別にそこまでしなくて良いと思うけどね！？まあそういう真面目なところ、ツクヨっぽくて良いと思うけど！"
2901-69 = "まあとにかく、撮影も無事に終わったことだし。"
2901-70 = "今日はこれにておさらばするとしようではないか、ツクヨ殿！"
2901-72 = "え、え……？ツクヨ、「殿」……？"
2901-73 = "あ、なるほど、忍者っぽい感じですね……！"
2901-74 = "承知、しました……！"
2901-75 = "まあ過ぎたことは忘れて、私たちの明るい未来へと向かうとしよう！"
2901-76 = "取り急ぎは……さっき撮った動画の編集でもしよっか！"
2901-77 = "はいっ……！"
2901-84 = "（約1時間後……）"
2901-86 = "ん～……"
2901-87 = "うーーーん……"
2901-88 = "うにゃああぁっ！"
2901-89 = "えっと、部長……？どうか、されましたか……？"
2901-90 = "今さら言うのもアレなんだけど……。"
2901-91 = "……やっぱり何か足りない。"
2901-93 = "えっと、足りない……というのは……？"
2901-94 = "撮影の直前までは、すっごい構図とカメラワーク、その先の仕上げまで見えてたんだけど……"
2901-95 = "それにツクヨの補助もあったし、完璧な感じになりそうだったんだけど……"
2901-96 = "もう少しこう、バババッ……みたいな。"
2901-97 = "こう、シュシュシュッ！みたいなカッコ良い絵になるはずだったんだけど……"
2901-98 = "なーんか上手く仕上がらない……足りない気がするなぁ……これはすぐアップロードしない方が良いかも。"
2901-99 = "あ……。"
2901-100 = "ま、たまにはこういうことあるよね。気にしない気にしない。"
2901-101 = "すみません……！私の、せいで……！"
2901-102 = "……え？"
2901-103 = "私が、至らないばかりに……！部長が、あんなに頑張ったのに、私は何も、できなくて……！"
2901-104 = "私が、忍者について、何も知らないせいで……。"
2901-106 = "いやいやいや！そうじゃないって！"
2901-107 = "ツクヨはまだ忍者初心者なんだし、そのせいじゃないって！それにツクヨは普段から、頑張って勉強もしてるでしょ？"
2901-108 = "ツクヨのせいじゃないし、そもそもツクヨはまだ成長期だよ。気にしないの、ね！"
2901-109 = "そう、ですか……？"
2901-110 = "そうそう。とはいえ、何というかこう……。"
2901-111 = "私たち二人だと、アイデアに限界があるのも確かかなあ。"
2901-115 = "そろそろ考えないといけないかも。"
2901-116 = "考えないと、というのは……？"
2901-117 = "新しい部員の勧誘。"
2901-121 = "新しい、部員……！？"
2901-123 = "そうそう、でも色々と難しいんだよねー。そもそも私たち、今は正式な部活じゃないし……。"
2901-124 = "そのせいで、部費も無ければ部室も無いし……。"
2901-125 = "その結果人目を避けて、こうして百鬼夜行の隅にある旧校舎でひっそり活動するしかないし……。"
2901-126 = "ですが……！"
2901-127 = "そう！だからといって、それが我々の道を妨げる理由にはならない！"
2901-128 = "もっと多くの人に、キヴォトス中のみんなに忍者のことを、そのカッコよさを理解してもらわないと！忍者がどれだけカッコよくて、最高の存在なのかを！"
2901-129 = "……っていう野望を抱いて、今まで「少女忍法帖ミチルっち」のチャンネルを数ヶ月運営してきたわけだけど。"
2901-130 = "視聴者数の伸びも頭打ちだし……。"
2901-131 = "最近アップした映像は悪質なコメントどころか、一つもコメント付かないし……。"
2901-132 = "……あ、"
2901-133 = "でも一個だけあったか。"
2901-134 = "「面白かったです、最高です……！」ってのは嬉しいけど、"
2901-135 = "この名前の「O・C」ってツクヨだよね！？"
2901-136 = "えっと、本当に、面白かったので……。"
2901-137 = "内容は、きちんと理解できてないかもですが……すごいと、思います！"
2901-138 = "その……すみません……。"
2901-139 = "いや、すっごく嬉しいんだけどね！？嬉しいんだけど、でもやっぱこのままじゃ……。"
2901-140 = "これを乗り越えるには、やっぱり新たな突破口……"
2901-141 = "すなわち、新入部員が必要なんだよ！"
2901-142 = "なるほど……！"
2901-143 = "でしたら、新しい方は……それこそ、本物の忍者さん……みたいな方が、来てくれると良いですね。えへへっ……。"
2901-144 = "いや、まあ本物の忍者なんて来ないだろうけど……っていうか実際には、いないとは思うけど……。"
2901-146 = "え、そうなん、ですか……！？すみません、あまり詳しくなくって……。"
2901-147 = "詳しいかどうかっていうか、うん……。"
2901-148 = "あ、でも忍者が偽物とか、そういう話じゃないよ！"
2901-149 = "この世に実在しないとしても、「忍者の精神」は本物！"
2901-150 = "その心意気を胸に、忍者としての生きざまを見習ってこそ、真の「忍者メイト」になれるものだから！"
2901-155 = "ただ、そういう「忍者メイト」と出会えるかどうかが問題なんだけど……。"
2901-156 = "忍者をバカにしてなくて、私たちの話にも共感してくれて……ゆくゆくは忍術研究部を一緒に盛り上げてくれそうな――"
2901-157 = "息がぴったり合って、お互いに色んな前向きな話ができる……何よりも、「可愛い子」！"
2901-158 = "そんな子、どこかにいないかな～？"
2901-164 = "ごめんなさい、"
2901-165 = "私、友達がいなくて……あと可愛くなくて……。"
2901-166 = "いやいやいや！？気にしなくて良いよ！あとツクヨは可愛いよ！"
2901-167 = "ありがとう、ございます……ですが確かに、正式な部活でも無いですし……。"
2901-168 = "どんな理由がある方なら、ここに来るんでしょうか……。"
2901-169 = "うっ、現実が痛い！辛い！事実だけど！"
2901-170 = "あ、すみません……！"
2901-171 = "大丈夫、ツクヨの言う通りだから……にしても問題だねぇ……。"
2901-175 = "……ま、こうしてダラダラしてても、誰かが来てくれるわけじゃないし。"
2901-176 = "……私たちは忍者について探究し、研究し、そしてその存在を広く知らしめんとする忍者メイト！"
2901-177 = "そろそろ単なるファンを超えて、忍者そのものになりつつあると言っても過言ではない！そんな私たちは、人呼んで……！"
2901-182 = "そう、「忍術研究部」！"
2901-183 = "私たち「忍術研究部」は、どんな逆境でも諦めない！"
2901-184 = "さあ、視聴者数を増やそう！あと部員も増やそう！ついでに正式な部活にもなっちゃおう！"
2901-185 = "『忍者ニンペロさん』でも、こう言ってた。"
2901-186 = "「忍者とはどんな窮地でも、決して諦めないもの」……って！"
2901-188 = "なるほど、了解です……！"
2901-189 = "よーし、じゃあ叫んで気合が入ったところで、明日の撮影のことでも考えようかな。えーっとツクヨは……"
2901-193 = "……いっ！？"
2901-194 = "……？"
2901-195 = "お客様、でしょうか……？"
2901-196 = "こ、こんなところにお客様ぁ……！？"
2901-197 = "ですが、それ以外には無いような……？"
2901-198 = "も、もしかして……百花繚乱調停委員会！？それとも、あの狡猾な陰陽部！？"
2901-199 = "私たちが勝手に旧校舎を使ってることがバレた！？"
2901-200 = "えぇっ……！？"
2901-201 = "ぐっ、いつかこんな日が来るとは思ってたけど……！"
2901-202 = "部長、どうしましょう……！？"
2901-203 = "大丈夫、慌てないで。心頭滅却すれば……"
2901-204 = "えーっと……何とかなる！！"
2901-205 = "それ、大丈夫ですか……！？"
2901-211 = "失礼します……！"
2901-218 = "部長……っ！"
2901-219 = "わ、私たちは出ていかないからね！？たとえ追い出しても、忍者の精神は永遠に……！"
2901-223 = "……？"
2901-224 = "……あれ？陰陽部でも、百花繚乱でもない……？"
2901-225 = "えっと、どちら様でしょうか……？"
2901-226 = "あ、申し遅れました！イズナはイズナと申します！"
2901-227 = "忍術研究部、入部希望です！"
2901-228 = "……。"
2901-232 = "……え？"
