[translation]
2901-1 = "E assim, todos reunidos (1)"
2901-7 = "Hyakkiyako, uma certa sala de aula no 38º prédio antigo"
2901-8 = "Ah, finalmente terminamos as filmagens~."
2901-9 = "Chefe, bom trabalho...! Aqui, água...!"
2901-10 = "Opa, obrigada!"
2901-11 = "E também, tem uma toalha para secar o suor e limão em conserva no mel que fiz ontem..."
2901-12 = "Ah, parece delicioso."
2901-13 = "Obrigada, vou aproveitar!"
2901-14 = "...Digo, isso é totalmente um 'kit que a gerente do clube esportivo traz'! Rumo ao campeonato nacional!?"
2901-15 = "Ainda assim, Tsukuyo, você é muito atenciosa."
2901-17 = "Para mim, bem, é só isso que eu consigo fazer..."
2901-18 = "Não diga isso. A filmagem de hoje só deu certo porque você ajudou, sabia?"
2901-19 = "Se você não estivesse lá, por exemplo, aquela cena de agora há pouco..."
2901-20 = "Aquela cena em que brilhou intensamente no momento em que fiz o selo de mão!! Aquilo nunca teria sido filmado sem você!"
2901-21 = "O ângulo do refletor estava perfeito!"
2901-22 = "É, mesmo...? Da minha parte, além disso, se possível, eu gostaria de ser mais útil..."
2901-23 = "No fim das contas, só consigo ajudar na filmagem..."
2901-24 = "Além disso, naquela hora..."
2901-25 = "Sobre 'aquela hora', ah..."
2901-27 = "OK! Tsukuyo, fique aí! Está ótimo!"
2901-28 = "Sim, entendido...! O ângulo do refletor, assim...?"
2901-32 = "Hã? Ah, bem...?"
2901-36 = "Muitos gatinhos...? Ei, se vocês se reunirem assim, eu vou ficar em apuros...!"
2901-37 = "Eu tenho coisas que preciso fazer agora, ah...!"
2901-43 = "Se vocês se reunirem tanto assim, eu não vou conseguir me mover...!"
2901-44 = "Eu não sou um ponto de encontro, sabia...!?"
2901-46 = "Ei, ei, olha aquilo! Cheio de gatinhos!"
2901-47 = "Incrível, parece uma reunião de gatos, né?"
2901-48 = "Vou tirar uma foto!"
2901-55 = "Uwa, bem, por favor, não tirem fotos...!?"
2901-56 = "Eu disse que estávamos filmando, mas não é isso...!"
2901-58 = "Ahaha, realmente, aquilo foi um desastre."
2901-59 = "No fim, levamos 30 minutos até a filmagem começar de verdade..."
2901-60 = "Uuu... Chefe, mais uma vez, me desculpe..."
2901-61 = "Por minha causa, por minha causa~..."
2901-62 = "Não, não, não é culpa sua, Tsukuyo."
2901-63 = "Você parece ser gentil, talvez os gatos tenham pensado 'essa pessoa pode me dar comida'?"
2901-64 = "Se for esse o caso, bem... de agora em diante, devo preparar ração...?"
2901-65 = "Não, acho que não precisa chegar a tanto!? Mas esse seu lado sério é bem a sua cara, e eu gosto disso!"
2901-69 = "Bom, de qualquer forma, a filmagem terminou em segurança."
2901-70 = "Por hoje é só, vamos nos despedir, senhorita Tsukuyo!"
2901-72 = "Hã, hã...? Tsukuyo, 'senhorita'...?"
2901-73 = "Ah, entendi, é um estilo ninja...!"
2901-74 = "Entendido...!"
2901-75 = "Bem, vamos esquecer o que passou e seguir em direção ao nosso futuro brilhante!"
2901-76 = "Para começar... vamos editar o vídeo que gravamos agora há pouco!"
2901-77 = "Sim...!"
2901-84 = "(Cerca de 1 hora depois...)"
2901-86 = "Hmm..."
2901-87 = "Uuuuuum..."
2901-88 = "Nyaaaaah!"
2901-89 = "Hum, Chefe...? Aconteceu alguma coisa...?"
2901-90 = "É meio estranho dizer isso agora, mas..."
2901-91 = "……Ainda falta alguma coisa."
2901-93 = "Hum, falta... o quê exatamente...?"
2901-94 = "Logo antes de gravar, eu conseguia visualizar a composição perfeita, o trabalho de câmera e até a edição final..."
2901-95 = "E com a ajuda da Tsukuyo, parecia que ia ficar perfeito..."
2901-96 = "Mas falta aquele toque de... *vapt-vupt*."
2901-97 = "Deveria ter ficado com um visual incrível, tipo um *shushushu*!"
2901-98 = "Não sei, não ficou bom... sinto que falta algo... talvez seja melhor não postar agora."
2901-99 = "Ah..."
2901-100 = "Bem, essas coisas acontecem de vez em quando. Não se preocupe, não se preocupe."
2901-101 = "Desculpe...! É tudo culpa minha...!"
2901-102 = "……Hã?"
2901-103 = "É porque eu sou incapaz...! A Chefe se esforçou tanto, e eu não consegui fazer nada...!"
2901-104 = "Tudo porque eu não sei nada sobre ninjas..."
2901-106 = "Não, não, não! Não é nada disso!"
2901-107 = "A Tsukuyo ainda é uma ninja iniciante, não é sua culpa! E você tem se esforçado bastante nos estudos, não tem?"
2901-108 = "Não é culpa sua, e além disso, você ainda está em fase de crescimento. Não se preocupe, tá?"
2901-109 = "É, você acha...?"
2901-110 = "Com certeza. Dito isso, é que..."
2901-111 = "É verdade que, com apenas nós duas, nossas ideias têm um limite."
2901-115 = "Talvez esteja na hora de pensar nisso."
2901-116 = "Pensar em quê...?"
2901-117 = "Recrutar novos membros para o clube."
2901-121 = "Novos... membros...!?"
2901-123 = "Pois é, mas é complicado. Para começar, nós nem somos um clube oficial ainda..."
2901-124 = "Por causa disso, não temos verba nem sala de clube..."
2901-125 = "E como resultado, temos que nos esconder e operar secretamente neste prédio antigo no canto de Hyakkiyako..."
2901-126 = "Mas...!"
2901-127 = "Isso! Mas só porque estamos nessa situação, não significa que vamos desistir do nosso caminho!"
2901-128 = "Precisamos fazer com que mais pessoas, que todos em Kivotos entendam sobre os ninjas e o quão legais eles são! O quão incríveis e supremos os ninjas são!"
2901-129 = "……Com essa ambição, eu venho mantendo o canal 'Diário Ninja da Michiru' há alguns meses."
2901-130 = "Mas o número de visualizações estagnou..."
2901-131 = "E os vídeos que postei recentemente não têm nem comentários, muito menos comentários maldosos..."
2901-132 = "……Ah,"
2901-133 = "Na verdade, teve um."
2901-134 = "Fico feliz que alguém tenha dito 'Foi divertido, é incrível...!', mas..."
2901-135 = "Esse 'O.C.' no nome é a Tsukuyo, né!?"
2901-136 = "Hum, é que foi realmente divertido..."
2901-137 = "Talvez eu não tenha entendido o conteúdo direito, mas... acho que é incrível!"
2901-138 = "Por isso... me desculpe..."
2901-139 = "Não, eu fico muito feliz, de verdade! Mas, mesmo assim, desse jeito..."
2901-140 = "Para superar isso, precisamos de um novo avanço..."
2901-141 = "Ou seja, precisamos de novos membros!"
2901-142 = "Entendo...!"
2901-143 = "Nesse caso, seria ótimo se alguém novo... tipo, uma ninja de verdade... viesse se juntar a nós. Ehehe..."
2901-144 = "Não, bem, acho que ninjas de verdade não existem... ou melhor, acho que não existem de verdade..."
2901-146 = "Ah, é mesmo...? Desculpe, eu não entendo muito bem disso..."
2901-147 = "Não é questão de entender ou não, é que..."
2901-148 = "Ah, mas não é sobre os ninjas serem falsos ou algo do tipo!"
2901-149 = "Mesmo que não existam neste mundo, o \"espírito ninja\" é real!"
2901-150 = "Ao carregar esse sentimento no peito e seguir o modo de vida de um ninja, é que você se torna um verdadeiro \"Ninja Mate\"!"
2901-155 = "O problema é saber se conseguiremos encontrar esses \"Ninja Mates\"..."
2901-156 = "Alguém que não zombe dos ninjas, que se identifique com nossas histórias... e que, com o tempo, possa nos ajudar a tornar o Clube de Pesquisa de Ninjutsu mais popular —"
2901-157 = "Alguém com quem tenhamos sintonia, que possamos conversar sobre várias coisas positivas... e, acima de tudo, que seja uma \"pessoa fofa\"!"
2901-158 = "Será que existe alguém assim por aí?"
2901-164 = "Desculpe,"
2901-165 = "Eu não tenho amigos... e não sou fofa..."
2901-166 = "Não, não, não!? Não precisa se preocupar com isso! E a Tsukuyo é fofa, sim!"
2901-167 = "Obrigada... mas é verdade que não somos nem um clube oficial..."
2901-168 = "Que tipo de pessoa viria até aqui, afinal?"
2901-169 = "Ugh, a realidade dói! É cruel! Mas é um fato!"
2901-170 = "Ah, desculpe...!"
2901-171 = "Tudo bem, o que a Tsukuyo disse é verdade... mas ainda assim, é um problema..."
2901-175 = "...Bem, ficar aqui de bobeira não vai fazer ninguém aparecer."
2901-176 = "...Nós somos os Ninja Mates, que exploram, pesquisam e buscam espalhar a existência dos ninjas para todos!"
2901-177 = "Não é exagero dizer que já superamos o nível de simples fãs e estamos nos tornando ninjas de verdade! Nós somos, como dizem por aí...!"
2901-182 = "Isso mesmo, o \"Clube de Pesquisa de Ninjutsu\"!"
2901-183 = "Nós, do \"Clube de Pesquisa de Ninjutsu\", não desistimos diante de nenhuma adversidade!"
2901-184 = "Vamos lá, vamos aumentar o número de espectadores! E de membros também! E, de quebra, nos tornarmos um clube oficial!"
2901-185 = "Até a \"Ninja Ninpero-san\" dizia isso."
2901-186 = "\"Um ninja nunca desiste, não importa a situação\"... é isso!"
2901-188 = "Entendido, compreendido...!"
2901-189 = "Muito bem, agora que já gritamos e nos animamos, vamos pensar na gravação de amanhã. Hum, Tsukuyo, você..."
2901-193 = "...Hã!?"
2901-194 = "...?"
2901-195 = "Será que é um visitante...?"
2901-196 = "U-um visitante em um lugar como este...!?"
2901-197 = "Mas, quem mais poderia ser...?"
2901-198 = "S-será que é o Comitê de Mediação Hyakkiyako!? Ou aquele astuto Departamento Yin-Yang!?"
2901-199 = "Descobriram que estamos usando o prédio antigo sem permissão!?"
2901-200 = "Eeeh...!?"
2901-201 = "Droga, eu sabia que esse dia chegaria..."
2901-202 = "Presidente, o que faremos...!?"
2901-203 = "Tudo bem, não entrem em pânico. Se esvaziarmos a mente..."
2901-204 = "Hum... vai dar tudo certo!!"
2901-205 = "Isso é seguro...!?"
2901-211 = "Com licença...!"
2901-218 = "Presidente...!"
2901-219 = "N-nós não vamos sair daqui, viu!? Mesmo que nos expulsem, o espírito ninja é eterno...!"
2901-223 = "...?"
2901-224 = "...Ué? Não é o Departamento Yin-Yang, nem o Hyakkiyako...?"
2901-225 = "Hum, quem seria você...?"
2901-226 = "Ah, peço desculpas pela demora! Meu nome é Izuna!"
2901-227 = "Gostaria de entrar para o Clube de Pesquisa de Ninjutsu!"
2901-228 = "..."
2901-232 = "...Hã?"
