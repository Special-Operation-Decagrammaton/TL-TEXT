[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22130-1 = "Episódio 13: Irmã Mais Velha."
22130-2 = "Interior de Eridu · Instalação Central de Isolamento"
22130-5 = "Rio…… o que você está fazendo é uma coisa de fato abominável.#nNão consigo encarar de frente."
22130-6 = "……Himari."
22130-7 = "Você sempre me xinga das piores maneiras.#nDe sombria, de água podre boiando numa fossa séptica……"
22130-8 = "……"
22130-9 = "……Bom, tanto faz.#nQuem é capaz de me criticar desse jeito, nesta Millennium——"
22130-10 = "——não, em toda esta Kivotos, é só você, Himari……"
22130-11 = "Justamente por você ser assim, eu tinha a esperança de que compreendesse o que estou prestes a fazer."
22130-12 = "O ato de \"destruir o Halo da Aris\", é isso?"
22130-13 = "……"
22130-14 = "Você acredita que o que faz é uma ação para proteger a Millennium—— e, por extensão, Kivotos……#né nesse tipo de ato que você acredita, não é?"
22130-15 = "——Mas, no fim, não passa de sequestrar uma garota, mantê-la presa numa cidade#ne tentar destruir o Halo dela, não é?"
22130-16 = "Essas palavras não estão erradas—— mas,"
22130-17 = "não, é isso…… é por você pensar assim que não consegue me compreender………#ne nem tolerar."
22130-18 = "Sim. Eu não concordo com você.#nE—— o Sensei da Schale também não vai ficar calado."
22130-19 = "É verdade.#nA probabilidade de o Sensei vir recolher a Aris é de 99,9999% ou mais……"
22130-20 = "Além disso, o C&C, a mais alta força de combate da Millennium, também já está nas mãos do outro lado."
22130-21 = "——Francamente, ninguém me compreende.#n……Nem uma só pessoa sequer."
22130-22 = "Rio…… mesmo entendendo isso, você ainda faz uma coisa dessas……"
22130-23 = "——Mesmo assim, tudo bem."
22130-24 = "Himari, você disse outro dia, não disse?#nQue eu talvez estivesse construindo uma \"casa segura\"."
22130-25 = "……Pra ser mais precisa,#nesta Eridu é uma \"fortaleza\" erguida para prevenir e interceptar as ameaças que virão em todos os futuros……"
22130-26 = "Rio, você continua a mesma……"
22130-31 = "Mesmo sem ser compreendida, mesmo que este mundo me defina como o mal——"
22130-32 = "eu apenas sigo o caminho que acredito ser o certo."
22130-34 = "Considerando e calculando todas as variáveis possíveis……#na probabilidade de eu atingir o objetivo é de 99% ou mais."
22130-35 = "A preparação está completa. Resta apenas executar……"
22130-39 = "Senhorita Rio, há um relatório da vigilância de Eridu."
22130-40 = "……Entendi.#nNo fim, é como os dados indicavam."
22130-41 = "Então…… o resto fica com você."
22130-42 = "Sim, senhora."
22130-46 = "Quando tudo acabar……#nHimari, você também……"
22130-47 = "e você também, Sensei da Schale……"
22130-48 = "com certeza……"
22130-50 = "…………"
22130-59 = "Aqui é………"
22130-60 = "Eridu……"
22130-61 = "Aqui, a Aris……"
22130-68 = "Boa, conforme o planejado, deu pra chegar ao local pelo \"trem autônomo de transporte de cargas\", né."
22130-69 = "Sim. Graças à ajuda da Veritas."
22130-70 = "Não é à toa que é a Veritas!#nQuem diria que iam hackear até o sistema inteiro do trem!"
22130-74 = "……Tive a impressão de uma certa farpa nessas palavras. É coisa minha?"
22130-75 = "Bom, tanto faz…… cuidado, viu.#nNo fim daquela passagem, quando saírem à superfície, já é \"Eridu\"."
22130-76 = "Por garantia, a gente tá monitorando direitinho, então fiquem tranquilos ♪"
22130-77 = "Mas, como pode surgir de repente algo que a gente não conseguiu detectar daqui,#npor favor, redobrem a atenção."
22130-78 = "[s] \"Sim, obrigado. A gente toma cuidado.\""
22130-79 = "Então, primeiro, vamos deixar o C&C fazer o auê……#na gente fica por estas bandas……"
22130-84 = "Uaaah! Q-que é isso!?"
22130-85 = "Ora, que garota e tanto.#nSerá que é uma perdida?"
22130-86 = "[s1] \"Não, não, não, claro que não tô perdido!\"\n[s2] \"Isto…… é um drone da Rio……!\""
22130-87 = "Não pode……! Já fomos descobertos!?"
22130-88 = "Não pode……! Já fomos descobertos!?"
22130-89 = "Não, fica tranquilo."
22130-91 = "Antes de ser descoberto, ele já foi neutralizado!#nDe quebra, a gente tá hackeando a rede da redondeza, então tá tudo certo!"
22130-93 = "Nossa, vocês conseguem fazer até isso……? Que demais!"
22130-94 = "Foi coisa que só a Veritas conseguiria fazer. Até aqui, não foi uma má largada."
22130-95 = "[ns] \"Boa, então, pessoal, preparar pra combate!\""