[translation]
22130-1 = "第13話;ビッグシスター"
22130-2 = "エリドゥ内部・中央隔離施設"
22130-5 = "リオ……あなたがやっていることは本当に忌むべき事です。#n直視に耐えられません。"
22130-6 = "……ヒマリ。"
22130-7 = "貴女はいつも悪し様に私のことを罵るわね。#n陰気だとか浄化槽に浮かぶ腐った水だとか……。"
22130-8 = "……。"
22130-9 = "……まあ、いいわ。#nそんな風に私を非難する事ができるのは、このミレニアムで――"
22130-10 = "――いえ、このキヴォトス上で、ヒマリ……貴女くらいでしょうね。"
22130-11 = "そんな貴女だからこそ、私が今からしようとしていることを理解してくれるのではないかと、期待していたわ。"
22130-12 = "「アリスのヘイローを破壊する」行為を、ですか？"
22130-13 = "……。"
22130-14 = "あなたは自分のする行いを、ミレニアム――ひいてはキヴォトスを守るための……#nそういった類の行為だと信じているのでしょうけれど。"
22130-15 = "――結局のところ、少女を誘拐して都市に監禁し、#nヘイローを破壊しようとしているだけじゃないですか。"
22130-16 = "その言葉は間違っていないわ――でも、"
22130-17 = "いえ、そうね……貴女はそう考えているから、私のことが理解できず………#n許容もできないのでしょうね。"
22130-18 = "ええ。私はあなたに賛同しません。#nそして――シャーレの先生も黙ってはいないでしょう。"
22130-19 = "そうね。#n先生がアリスを回収しに来る確率は99.9999%以上……"
22130-20 = "それに、C&Cというミレニアム最高峰の戦力も向こうの手に渡っている。"
22130-21 = "――まったく、誰一人私のことを理解してくれないのね。#n……ただの一人でさえも。"
22130-22 = "リオ……あなたはそれを理解しているというのに、こんな……。"
22130-23 = "――それでも構わないわ。"
22130-24 = "ヒマリ、貴女はこの前言っていたわね。#n私が「セーフハウス」を作っているんじゃないかって。"
22130-25 = "……より[ruby=せいこく]正鵠[/ruby]を得るのであれば、#nこのエリドゥは至る未来に起こる脅威を防ぎ、迎撃するために建てた「要塞」……。"
22130-26 = "リオ、あなたは相変わらず……。"
22130-31 = "理解されなくても、この世が私を悪と規定しても構わない――"
22130-32 = "私は、私が正しいと信じる道を進むだけよ。"
22130-34 = "起こりうる全ての変数を考慮し、計算しても……#n私が目標を達成する確率は99%以上。"
22130-35 = "備えは十全。後は実行するだけ……。"
22130-39 = "リオ様、エリドゥの監視から報告が。"
22130-40 = "……分かったわ。#n結局、データが示した通りになるのね。"
22130-41 = "では……後はよろしく。"
22130-42 = "イエス、マム。"
22130-46 = "すべてが終わったら……#nヒマリ、貴女も……"
22130-47 = "そしてシャーレの先生、貴方も……"
22130-48 = "きっと……。"
22130-50 = "…………"
22130-59 = "ここが………"
22130-60 = "エリドゥ……"
22130-61 = "ここに、アリスちゃんが……"
22130-68 = "よし、想定通り「物流輸送用無人列車」で現場に来れたね。"
22130-69 = "うん。ヴェリタスが手伝ってくれたおかげ。"
22130-70 = "さすがヴェリタスです！#nまさか列車システムごとハッキングしてくださるとは！"
22130-74 = "……ちょっと言葉にトゲない？気のせい？"
22130-75 = "まぁいいや……気をつけてね。#nその通路の先、地上に出たらもう「エリドゥ」だよ。"
22130-76 = "一応、ちゃんとモニタリングしてるから安心してね♪"
22130-77 = "ですが、こちらで拾えなかった何かが突然現れるかもしれませんので、#nくれぐれもご注意を。"
22130-78 = "[s] \"うん、ありがとう。気をつけるね\""
22130-79 = "それじゃあまずは、C&Cに暴れてもらおうか……#n私たちはこの辺りで……"
22130-84 = "うわああっ！な、なにこれ！？"
22130-85 = "おや、なかなか素敵な子だね。#n迷子かな？"
22130-86 = "[s1] \"いやいやいや、迷子なわけないでしょ！\"\n[s2] \"これ……リオのドローンだ……！\""
22130-87 = "そんな……！もうバレたんですか！？"
22130-88 = "そんな……！もうバレたんですか！？"
22130-89 = "いや、大丈夫。"
22130-91 = "バレる前に制圧終わってるよ！#nついでに周辺のネットワークは私たちがハッキングしてるから大丈夫！"
22130-93 = "わ、そんな事もできるんだ……すごいね！"
22130-94 = "ヴェリタスだからできた事だね。ここまでは悪くない走り出しだ。"
22130-95 = "[ns] \"よし、それじゃあ皆、戦闘準備！\""
