[translation]
22130-1 = "Episódio 13; Big Sister"
22130-2 = "Interior de Eridu - Instalação de Isolamento Central"
22130-5 = "Rio... o que você está fazendo é algo verdadeiramente detestável. #n Eu não consigo nem olhar."
22130-6 = "......Himari."
22130-7 = "Você sempre me insulta da pior forma, não é? #n Dizendo que sou sombria ou que sou água podre boiando em uma fossa..."
22130-8 = "......"
22130-9 = "......Bem, não importa. #n A única pessoa nesta Millennium que consegue me criticar desse jeito――"
22130-10 = "――não, na verdade, em todo esse Kivotos... provavelmente é só você, Himari."
22130-11 = "E é justamente por ser você que eu tinha a expectativa de que entenderia o que pretendo fazer agora."
22130-12 = "O ato de 'destruir o Halo da Aris', você diz?"
22130-13 = "......"
22130-14 = "Você deve acreditar que o que está fazendo é um ato de... proteção à Millennium, #n e por extensão, a Kivotos."
22130-15 = "――Mas, no fim das contas, você só sequestrou uma garota, a confinou em uma cidade #n e está tentando destruir o Halo dela."
22130-16 = "Você está certa―― mas,"
22130-17 = "Não, é verdade... Como você pensa assim, não consegue me entender... #n nem tolerar o que faço."
22130-18 = "Sim. Eu não concordo com você. #n E―― o Sensei da Schale também não vai ficar calado."
22130-19 = "Pois é. #n A chance do Sensei vir buscar a Aris é superior a 99.9999%..."
22130-20 = "Além disso, a C&C, a maior força de combate da Millennium, passou para o lado deles."
22130-21 = "――Francamente, ninguém me entende. #n ......Nem mesmo uma única pessoa."
22130-22 = "Rio... embora você saiba disso, você ainda assim..."
22130-23 = "――Mesmo assim, não me importa."
22130-24 = "Himari, você disse algo outro dia, não foi? #n Que eu estava construindo um 'esconderijo'."
22130-25 = "......Se formos ser precisos, #n Eridu é uma 'fortaleza' construída para interceptar e prevenir ameaças que surgirão no futuro..."
22130-26 = "Rio, você continua a mesma de sempre..."
22130-31 = "Mesmo que ninguém entenda, e que este mundo me rotule como uma vilã―― #n não me importa."
22130-32 = "Eu apenas seguirei o caminho que acredito ser o correto."
22130-34 = "Mesmo considerando e calculando todas as variáveis possíveis... #n a probabilidade de eu atingir o meu objetivo é superior a 99%."
22130-35 = "Os preparativos estão perfeitos. Agora é só executar..."
22130-39 = "Senhora Rio, um relatório do monitoramento de Eridu."
22130-40 = "......Entendido. #n No fim das contas, as coisas estão acontecendo como os dados previram."
22130-41 = "Muito bem... Deixo o resto com você."
22130-42 = "Sim, senhora."
22130-46 = "Quando tudo terminar... #n Himari, você também..."
22130-47 = "E o Sensei da Schale, você também..."
22130-48 = "Com certeza..."
22130-50 = "............"
22130-59 = "Aqui é..."
22130-60 = "Eridu..."
22130-61 = "É aqui que a Aris..."
22130-68 = "Muito bem, como previsto, conseguimos chegar aqui usando o 'trem de carga não tripulado'."
22130-69 = "Sim. Graças à ajuda da Veritas."
22130-70 = "Como esperado da Veritas! #n Quem diria que vocês hackeariam todo o sistema ferroviário!"
22130-74 = "......Você não foi um pouco irônica agora? Foi impressão minha?"
22130-75 = "Bom, deixa pra lá... Cuidado. #n Depois de passar por esse corredor e sair na superfície, já estaremos em 'Eridu'."
22130-76 = "Vou ficar monitorando tudo daqui, então fiquem tranquilos♪"
22130-77 = "No entanto, algo que não conseguimos detectar pode aparecer de repente, #n então, por favor, tenham extremo cuidado."
22130-78 = "[s] \"Sim, obrigado. Vamos tomar cuidado.\""
22130-79 = "Então, primeiramente, vamos deixar a C&C causar um estrago... #n Nós vamos ficar por aqui..."
22130-84 = "Uwaaah! O-O que é isso!?"
22130-85 = "Oh, que criaturinha adorável. #n Será que está perdida?"
22130-86 = "[s1] \"Não, não, não, é claro que ela não está perdida!\"\n[s2] \"Isso... é um drone da Rio...!\""
22130-87 = "Não pode ser...! Já fomos descobertos!?"
22130-88 = "Não pode ser...! Já fomos descobertos!?"
22130-89 = "Não, está tudo bem."
22130-91 = "Já terminamos a supressão antes que eles pudessem nos detectar! #n E de quebra, já hackeamos a rede da região, então está tudo bem!"
22130-93 = "Uau, vocês conseguem fazer coisas assim... Que incrível!"
22130-94 = "Isso é algo que só a Veritas conseguiria fazer. Por enquanto, o começo não foi ruim."
22130-95 = "[ns] \"Muito bem, então, todos, preparem-se para o combate!\""