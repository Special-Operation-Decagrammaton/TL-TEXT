[translation]
22130-1 = "Episódio 13; Irmã Mais Velha"
22130-2 = "Interior de Eridu - Instalação de Isolamento Central"
22130-5 = "Rio... o que você está fazendo é algo verdadeiramente abominável.#nÉ insuportável de se ver."
22130-6 = "……Himari."
22130-7 = "Você sempre me insulta de forma maldosa, não é?#nDizendo que sou sombria ou que sou como água podre flutuando em uma fossa séptica..."
22130-8 = "……."
22130-9 = "……Bem, tudo bem.#nA única pessoa nesta Millennium —"
22130-10 = "— não, neste Kivotos, capaz de me criticar dessa maneira, é você, Himari."
22130-11 = "É justamente por ser você que eu esperava que pudesse entender o que estou prestes a fazer."
22130-12 = "O ato de \"destruir o halo de Alice\", você diz?"
22130-13 = "……."
22130-14 = "Você deve acreditar que suas ações são do tipo que servem para proteger Millennium... e, por extensão, Kivotos."
22130-15 = "— No fim das contas, você só está sequestrando uma garota, mantendo-a presa na cidade e tentando destruir o halo dela, não é?"
22130-16 = "Essas palavras não estão erradas — mas,"
22130-17 = "Não, é verdade... Como você pensa assim, não consegue me entender e...#nnem pode aceitar, não é?"
22130-18 = "Sim. Eu não concordo com você.#nE... o Sensei do Schale também não ficará em silêncio."
22130-19 = "É verdade.#nA probabilidade de o Sensei vir recuperar a Alice é de mais de 99,9999%..."
22130-20 = "Além disso, a C&C, a força de combate de elite de Millennium, também está do lado deles."
22130-21 = "— Francamente, ninguém me entende.#n...Nem mesmo uma única pessoa."
22130-22 = "Rio... você entende isso e, ainda assim, faz algo assim..."
22130-23 = "— Mesmo assim, não me importa."
22130-24 = "Himari, você disse da última vez, não foi?#nQue eu estava construindo uma \"casa segura\"."
22130-25 = "...Para ser mais preciso, este Eridu é uma \"fortaleza\" construída para prevenir e interceptar ameaças que surgirão em futuros distantes..."
22130-26 = "Rio, você continua a mesma de sempre..."
22130-31 = "Mesmo que eu não seja compreendida, e mesmo que este mundo me defina como o mal, não me importa —"
22130-32 = "Eu apenas seguirei o caminho que acredito ser o correto."
22130-34 = "Mesmo considerando e calculando todas as variáveis possíveis...#na probabilidade de eu alcançar meu objetivo é de mais de 99%."
22130-35 = "Os preparativos estão completos. Agora, só resta executar..."
22130-39 = "Senhorita Rio, um relatório da vigilância de Eridu."
22130-40 = "……Entendido.#nNo fim, as coisas acontecerão exatamente como os dados mostraram."
22130-41 = "Então... deixo o resto com você."
22130-42 = "Sim, senhora."
22130-46 = "Quando tudo terminar...#nHimari, você também..."
22130-47 = "E o Sensei do Schale, você também..."
22130-48 = "Com certeza..."
22130-50 = "…………"
22130-59 = "Este é..."
22130-60 = "Eridu..."
22130-61 = "É aqui que a Alice-chan está..."
22130-68 = "Certo, conseguimos chegar ao local usando o \"trem não tripulado de transporte de carga\", conforme planejado."
22130-69 = "Sim. Graças à ajuda da Veritas."
22130-70 = "Como esperado da Veritas!#nQuem diria que vocês hackeariam todo o sistema ferroviário!"
22130-74 = "...Não tem um pouco de sarcasmo nessas palavras? Ou é impressão minha?"
22130-75 = "Bem, não importa... tomem cuidado.#nDepois daquele corredor, ao sair para a superfície, já será \"Eridu\"."
22130-76 = "De qualquer forma, estarei monitorando tudo, então fiquem tranquilos♪"
22130-77 = "No entanto, algo que não conseguimos detectar pode aparecer de repente, então, por favor, tenham muito cuidado."
22130-78 = "[s] \"Sim, obrigado. Vamos tomar cuidado\""
22130-79 = "Então, primeiro, vamos deixar a C&C causar um pouco de confusão...#nnós ficaremos por aqui..."
22130-84 = "Uaaah! O-o que é isso!?"
22130-85 = "Ora, que criança adorável.#nEstá perdida?"
22130-86 = "[s1] \"Não, não, não, eu não estou perdida!\"\n[s2] \"Isso é... um drone da Rio...!\""
22130-87 = "Não pode ser...! Já fomos descobertos!?"
22130-88 = "Não pode ser...! Já fomos descobertos!?"
22130-89 = "Não, está tudo bem."
22130-91 = "Já terminamos a supressão antes que nos descobrissem!#nAlém disso, nós hackeamos a rede da área, então está tudo sob controle!"
22130-93 = "Uau, vocês conseguem fazer coisas assim... que incrível!"
22130-94 = "Isso só foi possível porque somos a Veritas. Até agora, o começo não está nada mal."
22130-95 = "[ns] \"Muito bem, pessoal, preparem-se para o combate!\""
