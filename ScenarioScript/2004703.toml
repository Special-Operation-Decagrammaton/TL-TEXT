[translation]
2004703-1 = "Não me solte"
2004703-2 = "（Chegamos à beira-mar. O dia está ensolarado）"
2004703-7 = "[ns] \"Ei, Kikyou?\""
2004703-9 = "[ns] \"Você está brava...?\""
2004703-10 = "Hã...?"
2004703-11 = "Eu? Por que estaria?"
2004703-12 = "A brisa do mar que faz cócegas no nariz, o som agradável das ondas, o oceano brilhante—"
2004703-13 = "O Sensei flutuando no mar."
2004703-14 = "Nessa situação, por que eu estaria brava?"
2004703-15 = "[s] \"Se é assim, não fique só olhando, venha aqui.\""
2004703-16 = "Is-isso é..."
2004703-17 = "Eu só queria fazer um aquecimento adequado."
2004703-18 = "......Só isso."
2004703-19 = "[s] \"Ler um livro debaixo do guarda-sol é um aquecimento...?\""
2004703-20 = "Adquirir conhecimento também é uma forma válida de aquecimento."
2004703-21 = "Este é um manual que contém todas as técnicas, do básico ao avançado da natação."
2004703-22 = "Foi até escolhido como um dos 100 livros para se ler nas férias de verão."
2004703-23 = "Com isso, não há situação em que eu vá me afogar."
2004703-24 = "[s] \"Dizem que é melhor fazer do que ficar preocupado, não é?\""
2004703-25 = "Também dizem que é melhor testar a ponte antes de atravessar, não dizem?"
2004703-26 = "Eu sou a estrategista da Hyakkiyako. #nSe há um risco que pode ser previsto, devemos nos preparar, não é?"
2004703-27 = "[s] \"A previsão disse que o mar estaria calmo hoje.\""
2004703-28 = "......E se uma lula gigante aparecer de repente no mar?"
2004703-29 = "Dizem que elas têm aparecido bastante ultimamente."
2004703-30 = "Mesmo hoje, essa possibilidade..."
2004703-31 = "[s] \"Vai ficar tudo bem! Com certeza!\""
2004703-32 = "Tudo bem? Com base em quê..."
2004703-36 = "Haa... Você quer tanto assim nadar comigo?"
2004703-37 = "......Não precisa balançar a cabeça desse jeito, eu já entendi."
2004703-38 = "（Tudo bem... O manual está na minha cabeça...）"
2004703-39 = "Mas, só vou entrar até a altura da cintura."
2004703-40 = "Vou manter uma distância que me permita voltar rapidamente se algo acontecer. Entendido?"
2004703-41 = "......"
2004703-42 = "......Ei, você não estava pensando em nada estranho, estava?"
2004703-43 = "Não é como se eu não gostasse de água, sabe?"
2004703-44 = "[s3] \"O que seria 'algo estranho'...?\"\n[s4] \"Você é fofa como um gato!\""
2004703-47 = "......!!"
2004703-48 = "O-o que você está dizendo de repente!?"
2004703-49 = "Francamente, você não tem jeito mesmo."
2004703-50 = "Então—"
2004703-54 = "—me escolte."
2004703-55 = "Gatos não lidam bem com ambientes desconhecidos."
2004703-56 = "Você tem que me guiar direito. Entendeu?"
2004703-57 = "[s5] \"Então, posso colocar uma coleira de gato em você?\"\n[s6] \"Para não nos separarmos!\""
2004703-60 = "Você não preparou algo assim, preparou...?"
2004703-61 = "[s] \"Será que um barbante de cama de gato serviria?\""
2004703-62 = "......Fufu, é divertido brincar comigo, mas é melhor imaginar direito."
2004703-63 = "Você acha mesmo que conseguiria?"
2004703-64 = "Eu não vou ficar parada olhando enquanto você tenta me enrolar com um barbante."
2004703-65 = "[s] \"Então, vamos fazer um acordo e dar as mãos!\""
2004703-66 = "……Entendo."
2004703-67 = "Fazer um pedido grande primeiro, para depois conseguir o pequeno pedido 'real'…#nBem, como negociação, acho que está na média."
2004703-71 = "……Tudo bem.#nMas, em troca, não me solte de jeito nenhum."
2004703-76 = "Está frio e é agradável……#nEmbora as ondas sejam um pouco assustadoras……"
2004703-77 = "Se eu estivesse sozinha, não teria conseguido vir até aqui――"
2004703-78 = "……Ei, até onde você pretende ir?"
2004703-79 = "Eu disse que era até a altura da cintura, não disse?"
2004703-80 = "……Uma tartaruga?#nEla está por perto?"
2004703-81 = "Isso é…… não que eu não esteja interessada――"
2004703-82 = "Não, é que…… haa.#nSe está tão curioso, por que não vai ver sozinho?"
2004703-83 = "……Eh."
2004703-84 = "Espere, prometemos não soltar as mãos, não foi?"
2004703-85 = "Segure firme."
2004703-90 = "Eh? Ei, o que você está……"
2004703-91 = "Kya……!"
2004703-99 = "(Peguei Kikyou no colo estilo noiva e fomos ver a tartaruga juntos)"
2004703-100 = "(Depois disso, aproveitei o mar com Kikyou até o sol se pôr)"
