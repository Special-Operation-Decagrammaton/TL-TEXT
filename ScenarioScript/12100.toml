[translation]
12100-1 = "第10話;カイザーPMC（２）"
12100-7 = "はぁ、はぁ……。"
12100-8 = "……ふぅ。"
12100-9 = "キリが無いなあ、これは……。"
12100-11 = "……せい、聞こえますか？包囲網を抜け……また……"
12100-12 = "……が不安定……早く……退却……"
12100-13 = "……が……接近……"
12100-23 = "……絶体絶命？"
12100-24 = "包囲されちゃったかー……。"
12100-25 = "……。"
12100-32 = "侵入者とは聞いていたが……アビドスだったとは。"
12100-33 = "な、何よこいつ……。"
12100-34 = "……。"
12100-35 = "（あいつは……）"
12100-36 = "まさかここに来るとは思っていなかったが……まあ良い。"
12100-38 = "生徒会長がいない今、副会長であるあなたが借金を返していく、ということでよろしいでしょうか？[ruby=たかなし]小鳥遊[/ruby]ホシノさん？"
12100-39 = "それとも……私の提案を受け入れますか？"
12100-41 = "（あの時の……）"
12100-42 = "勝手に人の私有地に入り、暴れたことによるこれらの被害額。"
12100-43 = "君たちの学校の借金に加えても良いのだが、まあ、大して額は変わらないな……。"
12100-44 = "あんたは、あの時の……。"
12100-45 = "……確か、例のゲマトリアが狙っていた生徒会長……いや、副会長だったか？"
12100-46 = "……ふむ、面白いアイディアが浮かんだ。便利屋やヘルメット団を雇うよりも良さそうだ。"
12100-47 = "便利屋……？な、何を言ってるの？"
12100-48 = "……あなたたちは、誰ですか？"
12100-49 = "……まさか私のことを知らないとは。アビドス、君たちならよく知っている相手だと思うがね。"
12100-50 = "私は、カイザーコーポレーションの理事を務めている者だ。"
12100-53 = "そして君たち、アビドス高等学校が借金をしている相手でもある。"
12100-54 = "！！"
12100-55 = "……嘘っ！？"
12100-61 = "では、古くから続くこの借金について、話し合いでもするとしようか。"
12100-63 = "次回;負け戦"
