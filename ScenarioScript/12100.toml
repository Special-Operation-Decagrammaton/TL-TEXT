[translation]
12100-1 = "Episódio 10; Kaiser PMC (2)"
12100-7 = "Haa, haa..."
12100-8 = "...Ufa."
12100-9 = "Isso não tem fim, hein..."
12100-11 = "...Sei, você está me ouvindo? Saia do cerco... de novo..."
12100-12 = "...está instável... rápido... recue..."
12100-13 = "...está... se aproximando..."
12100-23 = "...Sem saída?"
12100-24 = "Acabamos cercadas, hein..."
12100-25 = "..."
12100-32 = "Sabíamos que havia intrusos, mas... que fossem de Abydos."
12100-33 = "Q-quem é esse cara..."
12100-34 = "..."
12100-35 = "(Aquele é...)"
12100-36 = "Não esperava que vocês viessem até aqui, mas... tudo bem."
12100-38 = "Agora que a presidente do conselho estudantil não está, podemos considerar que você, como vice-presidente, assumirá o pagamento da dívida? Hoshino?"
12100-39 = "Ou será que... você aceitará a minha proposta?"
12100-41 = "(Aquele de lá...)"
12100-42 = "O valor desses danos causados por invadir propriedade privada e causar confusão."
12100-43 = "Eu poderia adicionar à dívida da sua escola, mas, bem, o valor não mudaria muito..."
12100-44 = "Você é aquele de lá..."
12100-45 = "...Se não me engano, a presidente do conselho estudantil que aquele tal de Gematria estava visando... não, era a vice-presidente?"
12100-46 = "...Hum, tive uma ideia interessante. Parece melhor do que contratar a Equipe de Serviços ou a Gangue dos Capacetes."
12100-47 = "Equipe de Serviços...? D-do que você está falando?"
12100-48 = "...Quem são vocês?"
12100-49 = "...Não acredito que não me conhecem. Sendo de Abydos, acho que vocês conhecem muito bem o meu lado."
12100-50 = "Eu sou um dos diretores da Kaiser Corporation."
12100-53 = "E também sou a parte para quem vocês, da Escola de Ensino Médio Abydos, devem dinheiro."
12100-54 = "!!"
12100-55 = "...Mentira!?"
12100-61 = "Então, vamos conversar sobre essa dívida que já dura tanto tempo."
12100-63 = "Próximo episódio; Batalha Perdida"
