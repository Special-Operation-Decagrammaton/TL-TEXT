[translation]
10032055-7 = "……一度止まってくれ。"
10032055-9 = "ひとまず安全は確保できたようだ。"
10032055-10 = "だが、今のスピードじゃ奴らに追いつかれてしまう。"
10032055-11 = "……はぁ、何だと？それは私の足が遅いとでも言いたいのか？"
10032055-12 = "それを何とかするために、お前を雇ってるんだろうが！！"
10032055-13 = "……ふむ。"
10032055-14 = "たしかに、その通りだ。#nあなたは私を信頼して雇ってくれたのだろう。"
10032055-15 = "なのに、失礼なことを言って申し訳なかった。すまない、謝罪する。"
10032055-16 = "今後は言葉に気をつけよう。"
10032055-17 = "ふぅ……"
10032055-18 = "とにかく、地下の駐車場まで案内しろ。#nすでに私の部下たちが、こっちに向かっているはずだ。"
10032055-19 = "うまくいけば、車でここを抜け出せるかもしれん。"
10032055-20 = "なるほど、良い知らせだ。それなら、このまま進むとしよう。"
10032055-21 = "だが……いずれにせよ、逃げ切るには速度を上げる必要がある。"
10032055-22 = "今の速度では、駐車場にたどり着く前に捕まってしまう。"
10032055-23 = "何か良い策はないだろうか……"
10032055-28 = "チッ、予想より早いな。"
10032055-29 = "……仕方ない。こうなった以上、効率を最優先しよう。"
10032055-30 = "もっと効率的な方法があるだと？なぜ今まで言わなかった！？"
10032055-31 = "すまない。これには、あなたの協力も必要だから躊躇っていた。"
10032055-32 = "私の協力……？まあ、それくらい構わないが……"
10032055-33 = "……本当に確実に逃げられるんだろうな？"
10032055-34 = "ああ、もちろんだ。信じてくれ。"
10032055-35 = "安全性と機動性を両立できる。あなたは何もしなくていい。"
10032055-40 = "……？"
10032055-41 = "なっ……！"
10032055-42 = "何をするつもりだ……！？"
10032055-43 = "…………。"
10032055-49 = "ぐっ……！！"
10032055-61 = "ふむ……"
10032055-67 = "ふぅ……"
10032055-68 = "……よし。"
10032055-72 = "……完璧だ。"
