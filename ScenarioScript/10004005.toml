[translation]
10004005-1 = "プロローグ;天使たちと共に"
10004005-2 = "山海経・とある陶磁器工房"
10004005-3 = "みなさん、ここが[ruby=せんがいきょう]山海経[/ruby]一番の陶磁器職人である、猫田さんの工房ですよ～。"
10004005-4 = "まずは猫田さんにあらためてご挨拶をして、今日は陶磁器についてたくさん学びましょうね！"
10004005-5 = "「「「よろしくおねがいしまーーす！」」」"
10004005-6 = "猫田さん。今日はこうして見学させてくださって、本当にありがとうございます。"
10004005-7 = "ま、構わないさ。"
10004005-8 = "子どもたちは学園都市の未来。こうして儂の仕事を見ることで、梅花園の中に何か新しい夢を持つ子が生まれたのなら……それは、どの作品にも負けないくらい価値がある。"
10004005-9 = "ふふ、そう言っていただけますとありがたいです。"
10004005-10 = "では、さっそく見学を……"
10004005-13 = "猫田さーん、この粘土はなぁにー？"
10004005-14 = "ふむ、それは今度の展示会に出す予定の新しい陶磁器で――"
10004005-15 = "あは、もちもちして柔らかそ～！"
10004005-16 = "ぶにっ！えへへっ！"
10004005-18 = "儂が10時間かけて作った、陶磁器の原型がーーー！？"
10004005-19 = "み、みなさん！勝手に作品に触っちゃだめですよ！"
10004005-20 = "す、すみません、私の目が届かず……！"
10004005-21 = "いや、大丈夫だ……こんなこともあろうかと、予備の原型があるからな。"
10004005-23 = "それより、私も見間違いでなければ……あの窯の上に登っているのはまさか……。"
10004005-24 = "すごーい！たかーい！！あははっ！"
10004005-25 = "み、みなさん！窯の上は危ないから、登ってはいけません……！"
10004005-26 = "シュンおねーちゃーん、泥団子投げられた～！！"
10004005-27 = "そっちが先に手榴弾投げてきたんじゃ～ん！"
10004005-28 = "お、お友達には泥団子も手榴弾も投げてはいけません！"
10004005-32 = "この「かま」で、とーじきを焼くのかな？"
10004005-33 = "たぶん。でもなんか火が弱いね？"
10004005-34 = "よし、じゃあ手伝ってあげよー！"
10004005-38 = "か、窯に白リン弾を投げてはいけません！"
10004005-39 = "も、燃えている……窯が、私の工房が……っ！？"
10004005-40 = "シュンおねえちゃん、トイレ～！"
10004005-41 = "つかれた～！"
10004005-44 = "み、みなさん、お願いですからちょっと待ってください……！！！"
10004005-47 = "#video;10004"
