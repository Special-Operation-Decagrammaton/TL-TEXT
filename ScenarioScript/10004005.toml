[translation]
10004005-1 = "Prólogo; Junto aos anjos"
10004005-2 = "Shanhaijing - Uma certa oficina de cerâmica"
10004005-3 = "Pessoal, este é o ateliê da Nekota-san, a melhor artesã de cerâmica de Shanhaijing!"
10004005-4 = "Primeiro, vamos cumprimentar a Nekota-san e aprender bastante sobre cerâmica hoje!"
10004005-5 = "「「「Muito prazer!」」」"
10004005-6 = "Nekota-san. Muito obrigada por nos deixar visitar hoje."
10004005-7 = "Ora, não há de quê."
10004005-8 = "As crianças são o futuro da cidade acadêmica. Se ao verem meu trabalho, alguma criança do Jardim das Ameixeiras encontrar um novo sonho... isso terá mais valor do que qualquer uma das minhas obras."
10004005-9 = "Hehe, fico muito grata por ouvir isso."
10004005-10 = "Bem, vamos começar a visita..."
10004005-13 = "Nekota-san, o que é essa argila?"
10004005-14 = "Hum, essa é para uma nova cerâmica que pretendo expor na próxima exibição..."
10004005-15 = "Ah, parece tão macia e elástica!"
10004005-16 = "Ploc! Ehehe!"
10004005-18 = "O protótipo da cerâmica que levei 10 horas para fazer...!"
10004005-19 = "P-pessoal! Não podem tocar nas obras sem permissão!"
10004005-20 = "D-desculpe, eu não estava prestando atenção...!"
10004005-21 = "Não, está tudo bem... eu tinha um protótipo reserva para casos como este."
10004005-23 = "Mas, se não me engano... aquilo em cima do forno é, por acaso..."
10004005-24 = "Incrível! É tão alto!! Ahahaha!"
10004005-25 = "P-pessoal! É perigoso subir no forno, não façam isso...!"
10004005-26 = "Irmã Shun, jogaram uma bola de lama em mim~!!"
10004005-27 = "Foi você quem jogou uma granada primeiro!"
10004005-28 = "N-não se deve jogar bolas de lama nem granadas nos amigos!"
10004005-32 = "É neste 'forno' que assam a cerâmica?"
10004005-33 = "Acho que sim. Mas o fogo está meio fraco, não?"
10004005-34 = "Beleza, então vamos ajudar!"
10004005-38 = "N-não joguem fósforo branco no forno!"
10004005-39 = "E-está queimando... o forno, minha oficina...!"
10004005-40 = "Irmã Shun, preciso ir ao banheiro~!"
10004005-41 = "Estou cansada~!"
10004005-44 = "P-pessoal, por favor, esperem um pouco...!!!"
10004005-47 = "#video;10004"
