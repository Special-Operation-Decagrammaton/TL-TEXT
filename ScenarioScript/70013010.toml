[translation]#[Texto Final. - Filipe 08/07.]
70013010-1 = "Erva Daninha Que Não Floresce Sozinha (1)"
70013010-2 = "Salão do Restaurante de Luxo do Hotel"
70013010-6 = "……"
70013010-7 = "……Finalmente."
70013010-8 = "Chegamos!"
70013010-9 = "O restaurante de um hotel de luxo!"
70013010-14 = "P-poder comer aqui com a Al-sama…… não tenho mais arrependimentos!"
70013010-15 = "Al-chan, tem certeza?#nIsso parece caro, viu?"
70013010-17 = "Relaxa, hoje é por minha conta.#nE minha renda está estável."
70013010-18 = "……Mas não force demais."
70013010-19 = "Isso é de boa!"
70013010-20 = "Tenho até conseguido guardar dinheiro."
70013010-21 = "Como presidente, tenho que fazer isso."
70013010-22 = "Então, aproveitem."
70013010-24 = "Kufufu, se você diz, então vou aproveitar~"
70013010-25 = "Só uma pergunta, fez reserva?"
70013010-27 = "Claro!"
70013010-28 = "Hmm, com licença."
70013010-29 = "Bem-vindo."
70013010-30 = "Sou Rikuhachi……"
70013010-34 = "Estávamos esperando. Por aqui."
70013010-46 = "Mesa perto da janela."
70013010-56 = "Vou explicar o menu do dia."
70013010-57 = "O prato principal é um filé de boi estufado no estilo Wild Hunt."
70013010-58 = "Usamos um vinho de acidez suave e um molho deglaceado."
70013010-59 = "Para realçar o sabor profundo……"
70013010-66 = "O garçom continuou a explicação, mas――"
70013010-73 = "Infusão, al dente, brunoise…… palavras que Al e as outras não estavam acostumadas a ouvir."
70013010-74 = "Entendo! Tudo parece delicioso!"
70013010-75 = "Então, vamos trazer a amuse-bouche."
70013010-81 = "Al-chan, você entendeu mesmo?"
70013010-82 = "É-é comida de alto nível, né?"
70013010-83 = "Não adianta se preocupar com detalhes.#nÉ caro, então deve ser gostoso."
70013010-88 = "Aliás, a água…… também é diferente."
70013010-89 = "……É água mineral."
70013010-90 = "Q-que tipo de pessoa frequenta lugares assim……?"
70013010-100 = "Uau! Todos parecem ricos!"
70013010-101 = "Estamos aqui como clientes, não precisamos nos comparar."
70013010-102 = "E o dress code está perfeito――"
70013010-103 = "Não exagerou?"
70013010-104 = "N-nada disso!"
70013010-105 = "Não combina com uma refeição elegante?"
70013010-106 = "Kufufu. Então Al-chan é perfeita em etiqueta?"
70013010-107 = "Vamos testar.#nSabe a ordem de usar faca e garfo?"
70013010-108 = "E-eu também queria saber. Por que tantos?"
70013010-109 = "Hã…… isso é……"
70013010-111 = "Cada prato tem seu talher."
70013010-112 = "……mas não sei qual usar primeiro."
70013010-113 = "Qualquer um serve, né?#nO importante é comer."
70013010-120 = "Que barulheira."
70013010-121 = "Parece que tem uns deslocados."
70013010-123 = "Hmm? Está falando da gente?"
70013010-124 = "Você insultou a Al-sama?"
70013010-126 = "Al?"
70013010-130 = "……"
70013010-131 = "V-vocês são!"
70013010-132 = "A Oficina 68!"
70013010-137 = "Hmm…… quem?"
70013010-142 = "Vocês…… me esqueceram!?"
70013010-143 = "Todo bandido parece igual~"
70013010-144 = "Não dá pra lembrar de todos."
70013010-145 = "Bruno Rigatoni, da Família Rigatoni!"
70013010-146 = "Não vou deixar vocês esquecerem!"
70013010-151 = "Rigatoni…… Família……?"
70013010-152 = "……Não pode ser."
70013010-153 = "Agora que lembro……"
70013010-155 = "F-fufu……"
70013010-156 = "Fuahahahaha!"
70013010-157 = "Finalmente lembrou!"
70013010-158 = "Hora da vingança! Vão!"
70013010-167 = "Lutar aqui? Tá louca?"
70013010-168 = "Gastei muito dinheiro aqui!#nVão fechar os olhos para o que eu fizer!"
70013010-169 = "Nos encontrarmos aqui é o fim da linha――"
70013010-170 = "Vou cobrar a dívida de antes!"
70013010-171 = "Matem!"
70013010-183 = "Kyahaha.#nQue recepção animada."
70013010-184 = "Presidente, o que fazemos?"
70013010-185 = "Se quebrarmos as coisas, conseguimos pagar?"
70013010-186 = "Ah…… mas――"
70013010-187 = "――fugir não é hard-boiled!"
70013010-188 = "Todos, contra-ataquem!"
70013010-189 = "É isso, Al-chan!"
70013010-190 = "D-deixe comigo, Al-sama. Vou acabar com todos……!"
70013010-203 = "Um tiroteio estourou de repente no restaurante."
70013010-204 = "O que houve entre a Oficina 68 e a Família Rigatoni?――"