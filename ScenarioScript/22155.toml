22155-18 = "[ns1] \"Eu achei que o maior obstáculo seria a Toki, então pedi ajuda à C&C, mas...\"\n[ns2] \"Quem diria que uma emboscada estaria escondida em um lugar como este...\""
22155-19 = "Então, trazer a Toki desde o início era para confundir o nosso julgamento..."
22155-20 = "Então, trazer a Toki desde o início era para confundir o nosso julgamento..."
22155-21 = "Agora que a C&C não está aqui..."
22155-23 = "Para a Presidente... é a chance de subjugar o \"Sensei\"..."
