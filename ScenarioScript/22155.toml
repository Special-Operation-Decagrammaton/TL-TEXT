[translation]
22155-12 = "O poder de fogo é inimaginável pela aparência......"
22155-13 = "O visual é super brega, mas é forte pra caramba!? O que a gente faz!?"
22155-18 = "[ns1] \"Eu achava que o maior obstáculo seria a Toki, por isso pedi ajuda à C&C......\"\n[ns2] \"Quem imaginaria que uma emboscada estaria escondida bem aqui......\""
22155-19 = "Trazer a Toki desde o início foi para confundir o nosso julgamento, não é......"
22155-20 = "Trazer a Toki desde o início foi para confundir o nosso julgamento, não é......"
22155-21 = "Agora que a C&C não está aqui......"
22155-23 = "Para a Presidente...... é a chance de subjugar o 'Sensei'......"
22155-28 = "Eh...... então quer dizer que tudo isso foi manipulado pela Presidente!?"
22155-29 = "Era uma armadilha armada desde o começo......"
22155-33 = "Separar a C&C do Sensei――"
22155-34 = "E não por minhas mãos, mas pela decisão deles mesmos."
22155-35 = "Fazendo isso, não há nem uma chance em dez mil de que meu plano seja descoberto."
22155-36 = "Entendo...... Parece que a Presidente nos superou."
22155-37 = "Muito bem, vamos acabar com isso―― Avant-Garde-kun."
22155-51 = "Próximo Episódio; Xeque-Mate"