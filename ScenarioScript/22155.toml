[translation]
22155-12 = "外見からは想像つかない火力してるね……。"
22155-13 = "見た目はすっごいダサいのに、めっちゃ強いよ！？どうしよう！？"
22155-18 = "[ns1] \"一番大きな障害はトキになると思って、C&Cにお願いしたけど……。\"\n[ns2] \"まさかこんなところに伏兵が潜んでいたなんて……。\""
22155-19 = "最初にトキを連れていたのは、判断を鈍らせるためだったんだね……。"
22155-20 = "最初にトキを連れていたのは、判断を鈍らせるためだったんだね……。"
22155-21 = "C&Cがいない今こそ……。"
22155-23 = "会長にとって……「先生」を制圧できるチャンス……。"
22155-28 = "えっ……じゃあ全部、会長の手のひらの上だったってこと！？"
22155-29 = "最初から仕組まれていた罠だったんだ……。"
22155-33 = "C&Cと先生を分断する――"
22155-34 = "それも私の手ではなく、自らの決断によって。"
22155-35 = "そうすれば、こちらの計画が伝わる可能性なんて万に一つもないですから。"
22155-36 = "なるほど……どうやら、会長の方が一枚上手だったようだね。"
22155-37 = "さあ、終わりにしましょう――アバンギャルド君。"
22155-51 = "次回;チェックメイト"
