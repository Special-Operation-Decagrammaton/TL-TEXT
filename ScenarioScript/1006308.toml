[translation]
1006308-1 = "幸運の証"
1006308-2 = "（気になって訪ねてみると、コユキは草むらにしゃがんで何かをしていた）"
1006308-4 = "（横から見えた表情は真剣だった）"
1006308-5 = "…………うーん。"
1006308-6 = "そろそろ見つかってくれてもいいと思うんだけど……。"
1006308-8 = "[ns1] \"コユキ？\"\n[ns2] \"どうしたの？\""
1006308-11 = "……えっ、先生？"
1006308-15 = "あ、連絡したから来てくれたんですか？#nにはは……本当に何でもないですよ。"
1006308-16 = "うぅ、最近ちょっと連絡しすぎな気がしたので……。"
1006308-17 = "大したことでもないのにいちいち連絡してると、いつか相手にされなくなっちゃうんじゃないかと思って……。"
1006308-18 = "そんなことはない……って？#nに、にはは……照れますね。"
1006308-19 = "ん？"
1006308-20 = "何をしていたのか、って？んー、それが……その。"
1006308-24 = "急にこんなことをしてるなんて、変に思われるかもしれないんですけど……。"
1006308-25 = "四つ葉のクローバーを探していたといいますか……。"
1006308-26 = "にはは……今どき流行らないですよね……。"
1006308-27 = "[s3] \"四つ葉のクローバーを？\"\n[s4] \"予想外ではあったけど……。\""
1006308-30 = "で、ですよね？#nやっぱりそういう反応されると思っていました！"
1006308-31 = "ちゃんと説明するので……わ、笑わないでくださいよ！"
1006308-35 = "私って、ゲーム運があまり良くないじゃないですか？#nいや、まあゲームに限った話ではないですけど……。"
1006308-36 = "それで運を上げるにはどうすればいいのかな～って……#nそうだ四つ葉のクローバーを探そうって！"
1006308-37 = "四つ葉のクローバーといえば、幸運の証じゃないですか！#n見つけたら私にも幸運が訪れるかなって。"
1006308-38 = "でも、問題があって……。"
1006308-39 = "そもそも四つ葉のクローバー自体、運のいい人の前にしか現れないんじゃ……という。"
1006308-44 = "それに四つ葉のクローバーなんかで運が良くなるなら、この世から困ってる人がいなくなりますもんね。"
1006308-45 = "というか幸運の証は運のいい人の前に現れるものであって……。"
1006308-46 = "私みたいな運の悪い人には見つけられませんよね……。#nにはは……。"
1006308-47 = "[s5] \"コユキは迷信を信じる方？\"\n[s6] \"運の良し悪しってあると思う？\""
1006308-50 = "うーん……。"
1006308-51 = "先生はどう思います？"
1006308-52 = "私は……自分でもよく分かりません！#n真剣に考えたこともありませんし！"
1006308-53 = "でも、ほとんどの出来事は原因と結果が結びついてるので……。#nそれがそれとして起きるのは、自然のような気もするんですよね。"
1006308-54 = "問題には正解が用意されているのと同じようなことだったり？"
1006308-55 = "……でも。"
1006308-56 = "もし運や迷信なんてものがまったくないって決めつけるのも……。"
1006308-57 = "それはそれで面白くないですし……。"
1006308-58 = "……だから私は、信じてみようと思います！#nにはっ！"
1006308-59 = "[s] \"……。\""
1006308-60 = "にはは……。#nうぅ、何だか小難しいことを考えてしまいました。"
1006308-61 = "[ns] \"……コユキ。\""
1006308-63 = "[ns7] \"ちょっと後ろ向いて。\"\n[ns8] 向かい合うコユキの少し後ろを指差す。"
1006308-65 = "……ん？後ろですか？"
1006308-66 = "……ん？後ろですか？"
1006308-72 = "……あれ？"
1006308-73 = "えっ？"
1006308-74 = "ええええええええええっ！！！！！"
1006308-79 = "[wa:500]― 先生！[wa:750]見てください！！[wa:850]四葉のクローバーですよ！！"
1006308-82 = "― どういうこと！？[wa:1000]さっきまでなかったのに！"
1006308-84 = "― もしかして……[wa:1200]いきなり生えたとか？"
1006308-87 = "[wa:500]― や、[wa:1000]そんなのありえないか……。"
1006308-89 = "[wa:50]― 見落としてたのかな……？[wa:2350]先生はいつ気づいたんですか？"
1006308-92 = "[wa:300]― それに、[wa:1600]どうやって、[wa:550]こんな……"
1006308-94 = "― タイミングよく……[wa:1000]見つかる、[wa:350]なんて……？"
1006308-97 = "[ns9] \"幸運を信じてるからかな？\"\n[ns10] \"そのほうが楽しいよ。\""
1006308-98 = "[wa:450]― ……！！！"
1006308-99 = "[wa:450]― ……！！！"
1006308-101 = "― ……なるほど……！[wa:1400]そうですね……！！"
1006308-104 = "[wa:1100]― ……はい！[wa:1300]そう考えたほうが、[wa:1300]きっと……。"
1006308-106 = "― ……楽しいですもんね！！"
1006308-111 = "（その後、コユキと他愛もない話で盛り上がってから、シャーレに戻った）"
