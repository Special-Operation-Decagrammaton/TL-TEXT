[translation]
1010705-1 = "書記の趣味生活"
1010705-2 = "（いつものように仕事をしていると……）"
1010705-8 = "おはようございます、先生～！"
1010705-9 = "あっ、お仕事中でしたね。お邪魔でした……？"
1010705-10 = "[s] \"大丈夫。ちょうど休憩に入ろうとしてたとこだよ。\""
1010705-11 = "そうですか。私もちょうど今週は休みを取ってまして！"
1010705-12 = "ん？特になにかあったわけではないですよ！"
1010705-13 = "定期休刊です！"
1010705-14 = "[s] \"定期、休刊？\""
1010705-15 = "はい！"
1010705-16 = "「週刊万魔殿」は週刊誌ですから、普段は休む時間がないので、定期的に休刊する週を設けているんです！"
1010705-17 = "長く走るためには、リフレッシュが必要不可欠！"
1010705-18 = "好きだからこそ、長続きさせたい！って感じですかね～"
1010705-19 = "なので、2ヶ月に1回くらいは休刊しています！"
1010705-20 = "といっても他の仕事もあるので、休めるのは今日だけですけどね。"
1010705-24 = "あ、あれ？なんだかすごく羨ましそうな眼差しが……。"
1010705-25 = "はい？最近は休日すら休んでない？"
1010705-26 = "そ、そうでしたか……。"
1010705-27 = "じゃあ、今日は先生も休むことにしましょう！"
1010705-28 = "[s] \"で、でもまだ仕事が……！\""
1010705-29 = "さっきも言った通り、リフレッシュは大事ですよ！"
1010705-30 = "一度ぐっすり休んだほうが、仕事のパフォーマンス的にも良いんですから！"
1010705-31 = "[s] \"たしかに……一理あるかも……？\""
1010705-32 = "でしょでしょ？"
1010705-33 = "では、お休みスタート～！"
1010705-34 = "まず、机から離れて、ストレッチから～"
1010705-35 = "次は思いっきり昼寝をしたり、本を読んだり、ゲームをしたり～"
1010705-36 = "普段できなかった運動をするのもいいですね！趣味に全振り～！"
1010705-37 = "……え？休むのが久々すぎて何をすればいいか分からない……？"
1010705-38 = "[s] \"チアキは普段、休みの日に何をするの？\""
1010705-39 = "私ですか？"
1010705-40 = "うーん……普通に好きなことをやってますね。"
1010705-41 = "[s1] \"じゃあ、今日はチアキに合わせるね。\"\n[s2] \"チアキの趣味を教えてほしいな。\""
1010705-44 = "あ、いいですね、それ！"
1010705-45 = "先生と一緒だなんて、もうワクワクしてきます！"
1010705-46 = "もしかすると、次号の「週刊万魔殿」のネタになるかも！"
1010705-47 = "では、出発～！"
1010705-48 = "[s] \"どこに行くの？\""
1010705-49 = "今から、私が趣味を楽しむ姿をお見せしますね！"
1010705-50 = "何をするのかは……ふふっ！"
1010705-51 = "行ってみれば分かります！"
1010705-54 = "歴史研究部の部室"
1010705-57 = "やっほ～歴史研究部の皆さん、お久しぶりです～！"
1010705-58 = "あっ！チアキちゃん！"
1010705-59 = "久しぶり！元気してた？"
1010705-60 = "もちろん！超元気してましたよ～！"
1010705-62 = "[ns] （チアキの趣味って……歴史研究？）"
1010705-63 = "部活はどうですか？"
1010705-64 = "まぁまぁかな？あ、そうだ！この前、チアキちゃんが探してくれた古書なんだけどさ。"
1010705-65 = "あれ、ニセモノらしいよ？"
1010705-66 = "えっ、本当ですか？お宝発見って感じだったのに！"
1010705-67 = "ははっ！いいのいいの！"
1010705-68 = "せっかくだし、なか入って。今お茶だすからね。"
1010705-69 = "ありがとうございます～！先生の分もお願いできますか？"
1010705-70 = "いいよ～！先生も入ってください！"
1010705-77 = "[ns] \"チアキって、歴史研究部の所属でもあるの？\""
1010705-78 = "うーん。正確に言うと、客員メンバーですかね。"
1010705-79 = "正式な部員じゃないんですけど、たまに来てくれるんですよ。"
1010705-80 = "ですです！一[ruby=パンデモニウム・ソサエティー]応、万魔殿所属[/ruby]なんで！"
1010705-81 = "片足突っ込んでるって感じですかね？"
1010705-82 = "[s] \"へぇ、そうなんだ。\""
1010705-83 = "あっ、もうこんな時間！"
1010705-84 = "そろそろ行かなきゃ！ではまた！"
1010705-85 = "うん！また来てね～！"
1010705-86 = "は～いっ！"
1010705-89 = "[ns3] \"もっとゆっくりしても良かったのに。\"\n[ns4] \"せっかくの休日なのに。\""
1010705-92 = "うーん、そうしたい気持ちは山々ですが……。"
1010705-93 = "でも、歴史は趣味じゃないんで！"
1010705-94 = "[s] \"違うの……？\""
1010705-95 = "さて、次行きましょうか！"
1010705-98 = "キャッチボール同好会の練習会場"
1010705-99 = "あ！チアキちゃん！"
1010705-103 = "おはようございます～今日も頑張ってますね！"
1010705-104 = "久しぶり！チアキちゃん居ないと寂しいんだもん。"
1010705-105 = "今日はちょっとだけプレイしてかない？"
1010705-106 = "はい！喜んで～！"
1010705-107 = "[s] \"実は運動が趣味だったり？\""
1010705-108 = "あははっ、まあ、ここでも客員メンバーですね！#n正式な部員になるほどの腕はないので！"
1010705-109 = "でも、チアキちゃん居ると部も盛り上がるからさ！"
1010705-110 = "そうそう！なんなら毎日来てほしいくらい。"
1010705-111 = "あはっ！善処します！"
1010705-112 = "それじゃ！プレイボール！"
1010705-115 = "ボードゲーム研究部の部室"
1010705-116 = "ぐぬぬ……ここでは、このカードが……。"
1010705-117 = "ふふふっ、チアキちゃんってリアクションは一流だよね。#nゲームは下手なんだけど。"
1010705-118 = "ひっど～い！一世一代の悩みだったのにぃ！"
1010705-121 = "グルメ巡り同好会の定例会"
1010705-127 = "火力研究部の実験場"
1010705-135 = "いやぁ～これで一周しましたね！"
1010705-136 = "ふぅ、スッキリした！これぞまさに最高の休日！"
1010705-137 = "って、あれ。先生、疲れてるような……ちょっと、やりすぎましたか？"
1010705-138 = "[s] \"ううん、大丈夫。それより……。\""
1010705-140 = "[ns] \"結局、チアキの趣味って一体……？\""
1010705-141 = "お見せした通りですよ？"
1010705-142 = "色んな部活を掛け持ちして、何が本当の趣味なのか分からなくなった……？"
1010705-146 = "あはっ！そう思われたんですね！"
1010705-147 = "私の趣味は――人と会うことです！"
1010705-148 = "色んな人と会って、色んなことを喋る――"
1010705-149 = "そのために、様々な部活を掛け持ちしているんですよ～"
1010705-150 = "[s5] \"そういえばチアキって、どの部活でも……。\"\n[s6] \"本格的に活動しているようには見えなかったね……。\""
1010705-153 = "ええっ、ひどいです！ま、事実ですけど。"
1010705-154 = "それではここで、本日のご感想をお聞きしましょう～！今日は先生のお休みでもありましたし。"
1010705-155 = "どうでしたか、私との休日は？"
1010705-156 = "[s] \"うん、とても新鮮だったよ。\""
1010705-157 = "えへへ、さすがです！色んな人と会うの、やっぱり楽しいですよね？"
1010705-158 = "さて、そろそろお別れとしますか。"
1010705-159 = "執務室に戻って、次号の「週刊万魔殿」の編集をしなくちゃ！"
1010705-160 = "[s7] \"い、今から仕事しに行くの？\"\n[s8] \"休みじゃなかったの？\""
1010705-163 = "ん？もう十分休みましたよ？"
1010705-164 = "友達とお喋りして、身体を動かす！#n私にとっては、これがリフレッシュですからね～！"
1010705-165 = "[s] \"す、すごい……。\""
1010705-166 = "そうですかね？"
1010705-167 = "では！お先に失礼します～！"
