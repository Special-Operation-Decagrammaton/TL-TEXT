[translation]
10036040-1 = "Episódio 4; Yakisoba de gente grande"
10036040-3 = "Droga!#nQuem são aqueles caras, atrapalhando a gente!"
10036040-4 = "Era a nossa chance de sequestrar o DJ!"
10036040-5 = "Não esquenta.#nDe qualquer forma, aquele plano nunca daria certo."
10036040-6 = "É mesmo?"
10036040-7 = "Claro.#nO festival não ia virar uma bagunça só porque ele sumiu."
10036040-8 = "……Aquele Professor, mandou um plano todo mal feito!"
10036040-9 = "Ele não disse que era um plano perfeito?"
10036040-10 = "C-cala a boca!#nVai logo falar com o Professor!"
10036040-11 = "Entendido."
10036040-17 = "Pessoal das delinquentes, o plano está correndo bem?"
10036040-18 = "Claro que não!#nFomos atrapalhadas!"
10036040-19 = "Não tem um plano melhor!?"
10036040-20 = "Dizer isso não ajuda muito, estou em apuros."
10036040-21 = "Eu elaborei o plano levando em conta o poder de fogo de vocês, mas……."
10036040-22 = "Se falharam, só existe um motivo."
10036040-24 = "Novas peças entraram no jogo."
10036040-25 = "……Usem essa informação para elaborar a próxima estratégia."
10036040-26 = "É muito provável que o DJ agora esteja com uma \"escolta fora dos padrões\"."
10036040-27 = "Além disso, eles estarão em alerta contra ataques surpresa, então a guarda estará reforçada."
10036040-28 = "Fufu.#nSituações como essa são a minha especialidade."
10036040-30 = "J-jogo……?"
10036040-32 = "É uma metáfora, apenas uma metáfora."
10036040-34 = "Não entendi direito, mas entendi!"
10036040-35 = "Dessa vez vai dar certo, né?"
10036040-37 = "Fiquem tranquilos."
10036040-38 = "Se precisam de um consultor de crimes, deixem com este \"Professor Sorridente\"."
10036040-42 = "Deixem-me ajudá-las a realizar os seus desejos."
10036040-43 = "Deixem-me ajudá-las a realizar os seus desejos."
10036040-46 = "Ufa, a montagem do palco está concluída."
10036040-47 = "Obrigado pela ajuda, Sensei."
10036040-48 = "[s1] \"Foi uma experiência nova, vi muitos equipamentos que não conhecia.\"\n[s2] \"Foi divertido, tem muita coisa curiosa aqui.\""
10036040-51 = "De fato, não é sempre que se tem a chance de tocar em equipamentos de DJ."
10036040-52 = "Dizem que só essa mesa de som custa uma fortuna."
10036040-53 = "E parece que precisa de técnica para dominar tudo."
10036040-54 = "[s] \"Saori, você entende bastante de DJ, hein.\""
10036040-55 = "Eu só pesquisei algumas coisas antes de aceitar o trabalho."
10036040-56 = "Não diria que entendo tanto assim."
10036040-57 = "[s3] \"Parece interessante.\"\n[s4] \"Eu também fiquei interessado.\""
10036040-60 = "Posso ensinar o que eu sei…… mas agora estou trabalhando.#nO DJ pode me chamar a qualquer momento."
10036040-61 = "[s] \"Acho que por enquanto estamos bem, não?\""
10036040-62 = "Se o Sensei diz……."
10036040-63 = "Vou explicar brevemente."
10036040-64 = "DJ é a abreviação de Disc Jockey, e o papel dele é tocar músicas adequadas ao ambiente para animar o público."
10036040-65 = "Ao misturar ou processar dois ou mais sons, ele cria uma sonoridade nova."
10036040-66 = "E o mais importante para um DJ é esta mesa de som."
10036040-67 = "Enquanto reproduz discos ou CDs, ele ajusta o BPM. Além disso, existe uma técnica chamada scratch……."
10036040-68 = "Tipo, quando você esfrega a mão assim……"
10036040-72 = "……É mais ou menos assim."
10036040-73 = "[s5] \"Incrível! Que legal!\"\n[s6] \"Parece um profissional!\""
10036040-76 = "……A-ah, obrigado."
10036040-77 = "Na verdade, desde que consegui o trabalho, #n tenho praticado um pouco usando uma mesa de som que estava descartada."
10036040-78 = "Mas, pensar que a diferença é tão grande quando o equipamento é bom... encaixa perfeitamente nas minhas mãos."
10036040-79 = "Se eu baixar o BPM e aumentar o pitch..."
10036040-83 = "Oh, então é assim que fica."
10036040-84 = "E agora, adicionando um scratch aqui..."
10036040-88 = "……Hã!?"
10036040-89 = "D-desculpe. #n Acabei me empolgando."
10036040-90 = "Chega de conversa fiada, vamos voltar ao trabalho."
10036040-91 = "O próximo é a área de espectadores em pé..."
10036040-95 = "……."
10036040-96 = "[s] \"Saori, vamos almoçar?\""
10036040-97 = "Eu gostaria, mas ainda tenho trabalho a fazer..."
10036040-98 = "[s] \"A Atsuko e as outras não devem estar na área das barracas?\""
10036040-99 = "Será que elas estão conseguindo comer algo gostoso..."
10036040-100 = "[s] \"Se está preocupada, quer ir dar uma olhada?\""
10036040-101 = "……É verdade. #n Vou perguntar se posso tirar uma pequena pausa."
10036040-105 = "[ns] \"…….\""
10036040-108 = "Voltei."
10036040-109 = "O DJ B.o.B disse: \"Sinta-se à vontade para comer o que quiser!\", mas..."
10036040-110 = "Não consigo acreditar que é a mesma pessoa de antes."
10036040-111 = "Bem, já que recebi a permissão, deve estar tudo bem."
10036040-112 = "Vamos, Sensei."
10036040-115 = "A área das barracas também está bem agitada."
10036040-116 = "……Sinto um cheiro delicioso."
10036040-117 = "Falando nisso, uma vez a Hiyori me perguntou qual era o gosto de yakisoba."
10036040-118 = "Naquela época, eu só pude responder imaginando..."
10036040-124 = "……Sensei, por aqui!"
10036040-131 = "Ehehe... tantas barracas... mas o que faremos? #n Existe a chance de sermos expulsas logo de cara...!"
10036040-132 = "Está tudo bem, eu guardei dinheiro especialmente para hoje."
10036040-133 = "O que vocês duas querem comer?"
10036040-134 = "Eu, particularmente, não estou com muita fome com essa multidão."
10036040-135 = "Eu, eu quero comer yakisoba!"
10036040-136 = "Antigamente, eu perguntei para a irmã Saori qual era o gosto do yakisoba! #n Pelo visto, é um sabor sublime... ehehe."
10036040-137 = "Se não me engano... ela disse que é três vezes mais gostoso que o açúcar da ração!"
10036040-138 = "Se a irmã Saori disse isso, tenho certeza de que o sabor é incrível!"
10036040-139 = "……."
10036040-141 = "Já que estamos aqui, vamos querer dois."
10036040-147 = "Que tal aquela barraca? #n Está mais vazia que as outras."
10036040-148 = "Então vamos comprar lá."
10036040-153 = "Bem-vindos!"
10036040-154 = "E-ehehe. Finalmente, nós também vamos provar o sabor sublime...!"
10036040-162 = "Aqui está o cardápio!"
10036040-167 = "Isso é..."
10036040-169 = "Espere. Um picolé por 3000 ienes, yakisoba por 7000 ienes...?"
10036040-174 = "Será que..."
10036040-176 = "Era um restaurante de luxo!"
10036040-178 = "Não, não, esse preço em uma barraca de rua não faz sentido."
10036040-179 = "Isso é um roubo na cara dura."
10036040-181 = "Isso é algo que não posso deixar passar."
10036040-182 = "Você não conhece a "lei da oferta e da procura"?"
10036040-183 = "Pense bem. #nMuita gente quer aproveitar a comida no clima do festival, não quer?"
10036040-184 = "Mas olha, para trazer ingredientes até um lugar desses e #nreunir funcionários, gasta-se muito mais tempo e dinheiro."
10036040-185 = "Então, não é nada estranho que o preço fique um pouquiiiiinho mais alto, né?"
10036040-186 = "……Mas isso é caro demais."
10036040-187 = "Hah, se não gosta, pode ir embora, não me importo."
10036040-188 = "Aliás, o meu preço ainda é um dos mais baratos por aqui. #nSe for em outras barracas, vai entender."
10036040-190 = "Não pode ser……."
10036040-191 = "A-acabou para mim…… desse jeito, a única opção vai ser fazer trabalhos suspeitos para pagar a conta……!"
10036040-192 = "Tipo, atrair clientes usando trajes de banho com pouquíssimo tecido…… #nou tirar fotos indecentes……!"
10036040-193 = "Calma, Hiyori. #nEu tenho dinheiro."
10036040-194 = "É um gasto doloroso, mas…… já que viemos à praia, vamos comer."
10036040-195 = "Mas o orçamento……."
10036040-196 = "Se o dinheiro acabar, é só ganhar mais. #nMais importante que isso são as memórias com vocês."
10036040-197 = "……Com isso, quero um yakisoba, por favor."
10036040-198 = "Hehe, são 7000 ienes exatos!"
10036040-203 = "Que absurdo……!"
10036040-204 = "Nem no mercado negro se vê um valor desses!"
10036040-205 = "Isso é demais……."
10036040-206 = "[s] \"Calma, Saori.\""
10036040-207 = "Não dá para ficar calma."
10036040-208 = "Aquela barraca está cometendo um ato ilegal."
10036040-209 = "……Venha comigo, Sensei."
10036040-214 = "Cozinha/Bastidores da barraca"
10036040-216 = "Quem diria que ia dar certo!"
10036040-217 = "Pois é!"
10036040-218 = "Bom, de qualquer jeito, eles devem ter dinheiro sobrando, não?"
10036040-219 = "Mas a carteira deles parecia bem surrada, não pareciam ter muito, não?"
10036040-220 = "Bem, quem se deixa enganar é que tem culpa."
10036040-221 = "Disseram que, em outra barraca, #num grupo de quatro pessoas estava dividindo um único lámen."
10036040-222 = "Quanta falta de dinheiro, hein!"
10036040-223 = "Nossa, que gente coitada!"
10036040-227 = "Ouvi toda a conversa."
10036040-235 = "Quem é você!?"
10036040-237 = "Quanto custa esse yakisoba?"
10036040-239 = "São 7000 ienes, tem alguma reclamação?"
10036040-241 = "Que estranho."
10036040-243 = "Hã?"
10036040-244 = "Vocês solicitaram previamente a permissão para vender a 700 ienes."
10036040-245 = "No entanto, o preço real está definido 10 vezes mais alto."
10036040-246 = "Isso é ilegal."
10036040-247 = "Bah! Quem se deixa enganar é que tem culpa!"
10036040-248 = "Não, os culpados são vocês."
10036040-249 = "Vão pedir desculpas como se deve."
10036040-250 = "Para de encher o saco! #nEi, vocês!"
10036040-259 = "Se não quiserem se machucar, é melhor irem embora quietinhos!"
10036040-261 = "……."
10036040-262 = "Eu queria resolver isso pacificamente, mas não tenho escolha."
10036040-263 = "Para não assustar os outros, vamos acabar com isso rapidamente."
