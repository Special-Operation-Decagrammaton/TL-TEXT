[translation]
10036040-1 = "第4話;一人前の焼きそば"
10036040-3 = "くそっ！#n何なんだあいつら、邪魔しやがって！"
10036040-4 = "DJを拉致するチャンスだったのによ！"
10036040-5 = "気にすんな。#nそもそもあんな作戦で、うまくいくワケがなかったんだ。"
10036040-6 = "そうなのか？"
10036040-7 = "当たり前だろ。#nあいつがいなくなったくらいで、祭りがめちゃくちゃにはならねぇだろ。"
10036040-8 = "……教授め、いい加減な計画を寄越しやがって！"
10036040-9 = "完璧な計画とか言ってなかったか？"
10036040-10 = "う、うるせぇ！#nいいから教授に連絡しろ！"
10036040-11 = "分かったよ。"
10036040-17 = "スケバンの皆さん、計画は順調ですか？"
10036040-18 = "んなわけあるか！#n邪魔されちまったぞ！"
10036040-19 = "もっと良い計画はないのか！？"
10036040-20 = "そう言われましても、困りましたね。"
10036040-21 = "あなた方の戦力を充分に考慮して、練ったのですが……。"
10036040-22 = "失敗したのなら、その理由は一つ。"
10036040-24 = "新たなコマがゲームに参戦したのでしょう。"
10036040-25 = "……この情報を活かして、次の作戦を立てれば良いのです。"
10036040-26 = "今のDJには、「規格外の護衛」が付いている可能性が高い。"
10036040-27 = "さらに奇襲を警戒して、ガードが厚くなるはず。"
10036040-28 = "ふふっ。#nこういった状況こそ、私の得意分野です。"
10036040-30 = "げ、ゲーム……？"
10036040-32 = "例えですよ、例え。"
10036040-34 = "よく分かんねぇけど、分かった！"
10036040-35 = "今度こそ大丈夫なんだろうな？"
10036040-37 = "ご安心ください。"
10036040-38 = "犯罪のコンサルタントなら、この「ニヤニヤ教授」にお任せを。"
10036040-42 = "あなた方の望みが叶うよう、手伝って差し上げましょう。"
10036040-43 = "あなた方の望みが叶うよう、手伝って差し上げましょう。"
10036040-46 = "ふぅ、これでステージのセッティングは完了した。"
10036040-47 = "手伝ってくれて助かった、先生。"
10036040-48 = "[s1] \"初めて見る機材が多くて新鮮だったよ。\"\n[s2] \"不思議なものが多くて楽しかったよ。\""
10036040-51 = "たしかに、DJの機材に触れる機会はそうないからな。"
10036040-52 = "このターンテーブルだけでも、結構な金額するらしい。"
10036040-53 = "使いこなすには、技術もいるそうだ。"
10036040-54 = "[s] \"サオリはDJに詳しいんだね。\""
10036040-55 = "仕事を受ける前に、色々と調べたまでだ。"
10036040-56 = "詳しいというほどではない。"
10036040-57 = "[s3] \"面白そうだね。\"\n[s4] \"私も興味が出てきたよ。\""
10036040-60 = "私が知ってる範囲であれば教えられるが……今は仕事中だ。#nまたDJに呼び出しを受けるかもしれない。"
10036040-61 = "[s] \"しばらくは大丈夫じゃないかな？\""
10036040-62 = "先生がそう言うのなら……。"
10036040-63 = "軽く説明をしよう。"
10036040-64 = "DJは[ruby=Disc Jockey]ディスクジョッキー[/ruby]の略語で、#n場に合わせた音楽をかけて盛り上げる役割を担う。"
10036040-65 = "2つ以上の音をミックスしたり、加工することによって、#n新しい音を作り出していくんだ。"
10036040-66 = "そしてDJをする上で最も重要なのが、このターンテーブルだ。"
10036040-67 = "レコード盤やCDなどを再生しながら、BPMを調整する。#nほかにもスクラッチという技術があって……。"
10036040-68 = "こう、手で擦ると……"
10036040-72 = "……こんな感じだ。"
10036040-73 = "[s5] \"すごい！かっこいいね！\"\n[s6] \"プロみたいだよ！\""
10036040-76 = "……あ、ありがとう。"
10036040-77 = "実は仕事が決まってから、#n廃棄されていたターンテーブルを使って少し練習したんだ。"
10036040-78 = "しかし、機材が良いとここまで違うとは……すごく手に馴染む。"
10036040-79 = "BPMを下げて、ピッチを上げれば……。"
10036040-83 = "おぉ、こうなるんだな。"
10036040-84 = "さらにここで、スクラッチを……。"
10036040-88 = "……はっ！？"
10036040-89 = "す、すまない。#nつい夢中になってしまった。"
10036040-90 = "雑談はここまでにして、仕事に戻ろう。"
10036040-91 = "次は立ち見エリアを……。"
10036040-95 = "……。"
10036040-96 = "[s] \"サオリ、お昼ご飯にしようか？\""
10036040-97 = "そうしたいところだが、まだ仕事が……。"
10036040-98 = "[s] \"アツコたちも屋台エリアにいるんじゃないかな？\""
10036040-99 = "みんな、美味しい物を食べられているのだろうか……。"
10036040-100 = "[s] \"心配なら、見に行ってみる？\""
10036040-101 = "……そうだな。#n少し休憩をもらえないか、聞いてこよう。"
10036040-105 = "[ns] \"……。\""
10036040-108 = "ただいま戻った。"
10036040-109 = "DJ B.o.Bから「好きに食べてくると良い！」と言われたんだが……。"
10036040-110 = "先ほどまでと同じ人物だとは思えないな。"
10036040-111 = "まぁ、許可も降りたことだし大丈夫だろう。"
10036040-112 = "行こう、先生。"
10036040-115 = "屋台エリアも盛り上がっているな。"
10036040-116 = "……美味しそうな匂いがする。"
10036040-117 = "そういえば以前、ヒヨリに焼きそばの味を聞かれたことがあったんだ。"
10036040-118 = "あの時は想像で答えるしかなかったが……。"
10036040-124 = "……先生、こっちだ！"
10036040-131 = "えへへ……屋台がいっぱい……でもどうしましょう。#nもしかしたら、門前払いされる可能性も……！"
10036040-132 = "大丈夫、今日のためにお金を貯めてきたから。"
10036040-133 = "二人は何が食べたい？"
10036040-134 = "私は特に、この人混みだと食欲もないかな。"
10036040-135 = "や、焼きそばが食べたいです！"
10036040-136 = "昔、サオリ姉さんに焼きそばの味を聞いたことがあるんです！#nなんと、極上の味らしくて……えへへ。"
10036040-137 = "たしか……配給された砂糖の3倍は美味しいって言ってました！"
10036040-138 = "サオリ姉さんがあそこまで言うなら、味は間違いないと思います！"
10036040-139 = "……。"
10036040-141 = "せっかくだから、2つで。"
10036040-147 = "あのお店はどうでしょう。#nほかのところよりも空いています。"
10036040-148 = "じゃあ、そこで買おう。"
10036040-153 = "いらっしゃい！"
10036040-154 = "え、えへへ。ついに、私たちも極上の味を……！"
10036040-162 = "こちらがメニューです！"
10036040-167 = "これは……。"
10036040-169 = "待って。アイスバー1個3000円、焼きそば7000円……？"
10036040-174 = "もしかして……。"
10036040-176 = "高級レストランだったんですね！"
10036040-178 = "いやいや、屋台でこの値段はおかしいよ。"
10036040-179 = "普通にボッタクリ。"
10036040-181 = "それは聞き捨てならないな。"
10036040-182 = "「需要と供給」を知らないのか？"
10036040-183 = "考えてみな。#nお祭りの雰囲気でご飯を楽しみたい人は多いだろう？"
10036040-184 = "でもよ、こんな場所まで食材を運んで、#nスタッフを集めるためには、時間もお金も余計にかかってくるわけだ。"
10036040-185 = "だったら、値段がちょ～っとばかし高くなってもおかしくないよな？"
10036040-186 = "……でも、これは高すぎる。"
10036040-187 = "はぁ、嫌なら帰ってくれても構わないぞ。"
10036040-188 = "ちなみに、ウチはこれでも安いほうだ。#nほかの屋台に行けば分かるはずさ。"
10036040-190 = "そんな……。"
10036040-191 = "か、完全に終わりです……このままじゃ、代金を支払うために怪しい仕事をするしかないんですよね……！"
10036040-192 = "ぬ、布の面積が少ない水着で客引きをしたり……#nい、いかがわしい写真を撮ったり……！"
10036040-193 = "落ち着いて、ヒヨリ。#nお金ならあるから。"
10036040-194 = "痛い出費だけど……せっかくの海だし食べていこう。"
10036040-195 = "でも予算が……。"
10036040-196 = "お金なら、また稼げば良いよ。#nそれよりも、みんなとの思い出のほうが大事。"
10036040-197 = "……これで焼きそばを1つお願い。"
10036040-198 = "ひひっ、7000円ちょうどだな！"
10036040-203 = "バカな……！"
10036040-204 = "ブラックマーケットでもありえない金額だ！"
10036040-205 = "あんまりだ……。"
10036040-206 = "[s] \"落ち着いて、サオリ。\""
10036040-207 = "落ち着いてなどいられない。"
10036040-208 = "あの屋台は違法行為をしている。"
10036040-209 = "……ついてきてくれ、先生。"
10036040-214 = "屋台の厨房・裏側"
10036040-216 = "まさか成功するとはな！"
10036040-217 = "ホントだよ！"
10036040-218 = "ま、どうせ金に余裕あんじゃねーの？"
10036040-219 = "それにしてはボロい財布だったし、あんま持ってなさそうだったぞ？"
10036040-220 = "ま、騙されるほうが悪い。"
10036040-221 = "ほかの屋台では、#n四人組が一杯のラーメンを分け合ってたってよ。"
10036040-222 = "どんだけ金がないんだろうな！"
10036040-223 = "まったく、かわいそうな奴らだ！"
10036040-227 = "話は聞かせてもらった。"
10036040-235 = "誰だ、お前！？"
10036040-237 = "その焼きそば、いくらだ？"
10036040-239 = "7000円だが、文句でもあるのか？"
10036040-241 = "おかしいな。"
10036040-243 = "はぁ？"
10036040-244 = "お前たちは、700円で出店すると事前に申請していたはずだ。"
10036040-245 = "なのに、実際の料金は10倍で設定している。"
10036040-246 = "これは違法だ。"
10036040-247 = "けっ！騙されたほうが悪いんだよ！"
10036040-248 = "いいや、悪いのはお前たちだ。"
10036040-249 = "きちんと謝罪してもらおう。"
10036040-250 = "ゴチャゴチャうるせーな！#nおい、お前たち！"
10036040-259 = "痛い目に遭いたくなかったら、大人しく帰るんだな！"
10036040-261 = "……。"
10036040-262 = "穏便に済ませたかったが、仕方ない。"
10036040-263 = "みんなにはバレないよう、速やかに始末しよう。"
