[translation]
10018040-1 = "第4話;愚民どもには分からないだろう！"
10018040-2 = "工場内部"
10018040-5 = "味なんかどうでもいい！マージンで儲けるのだ！"
10018040-6 = "衛生管理だって訴えられない程度でいい！味なんて調味料で誤魔化せ！"
10018040-7 = "美食だのなんだの言ったって、結局は個人の好みに過ぎない！"
10018040-8 = "そう、味覚という主観的で曖昧な基準のもので我々はお金を稼いでいるのだ！"
10018040-12 = "最初は良質な食材で客の気を引き、徐々に安い食材の量を増やし――"
10018040-13 = "ニャオフード特製の化学調味料を混ぜて味を誤魔化せば、薄利多売の流れが出来上がるのだ！"
10018040-14 = "クレームなんて見えない聞こえない！どうせ愚民どもには分からないだろう！"
10018040-18 = "ムッフフフ。そうして得た利益を、今度は――"
10018040-19 = "フランチャイズ型のチェーン店「ニャオ食堂」の店舗拡大に投資すれば……"
10018040-20 = "更に利益の循環ができていく……いよいよ事業も軌道に乗って、さあ商売商売！"
10018040-22 = "ボス、報告があります。"
10018040-23 = "ムッフフフ。急に何だね？それに、ここでは会長と呼べと言ったはずだが？"
10018040-24 = "失礼しました、会長。至急報告したいことがありまして……。"
10018040-25 = "急ぎの用だなんて珍しいじゃないか。"
10018040-26 = "まさか事業の収益が落ちているとでも？"
10018040-27 = "この私を納得させるだけの理由がなければ、それ相応の代価を払ってもらうことになるぞ。#nムッフフフフ。"
10018040-28 = "それが、現場からこのような連絡がありまして……。"
10018040-30 = "ムフフウウ……。"
10018040-31 = "どういたしましょう？"
10018040-32 = "あの食堂の女将にはほとほと手を焼かされていたが……フゥム。"
10018040-33 = "それに、美食研究会？そんな部活など、どうでもいい。"
10018040-34 = "注意を払わねばならんのは、ゲヘナ学園のほうだ。"
10018040-36 = "そのことですが、美食研究会はゲヘナ内部でも相当目をつけられている部活だそうです。"
10018040-37 = "その情報は確かな筋からか？"
10018040-38 = "ええ、団のメンバーも口を揃えて言っていました。"
10018040-39 = "うむ、よかろう。その言葉を信じるとする。なんだ、簡単な話ではないか。"
10018040-43 = "つまり、美食研究会をどうにかすれば良いのだろう？"
10018040-46 = "スズメ亭・内部"
10018040-47 = "もう一度考え直してください。スズメ亭にはそれだけの価値がありますわ。"
10018040-48 = "そうです。まだ始めたばかりですよ。ここで折れてしまっては……。"
10018040-50 = "ありがとうございます。ですが、その気持ちだけで十分なんです。"
10018040-51 = "何より皆さんにご迷惑をかけてしまっているのが、申し訳ない気持ちでいっぱいなんです。"
10018040-52 = "[s] \"ハルナとフウカの意見が一致するなんて珍しいね……。\""
10018040-53 = "先生？何か仰いましたか？"
10018040-54 = "……まあ、たまには。ここで諦めるよりはいいですから。"
10018040-55 = "ですが、これ以上抵抗を続けるのは厳しいと思います。"
10018040-56 = "ニャオフードのような大企業と戦うだなんて、個人には太刀打ちできません。"
10018040-57 = "最初は私の足りていない部分を皆さんに補っていただければと安易に考えていましたが……。"
10018040-58 = "段々と手に負えないことになってきましたし……。"
10018040-60 = "代々続いてきたお店はどうするつもりでしょうか？"
10018040-61 = "そうですよ。どうしても守りたいと仰っていたじゃないですか。"
10018040-66 = "致し方ありませんが、ニャオフードのフランチャイズ化を受け入れようと思います。"
10018040-67 = "そうすれば少なくとも建物自体は守れますから。"
10018040-68 = "いいえ、それは違いますわ。"
10018040-69 = "そもそも美食とは料理そのものだけでなく、お店の場所や雰囲気、受け継がれてきた歴史など……。"
10018040-70 = "様々な要素が合わさって、ようやく美食と呼べる存在になるものです。"
10018040-71 = "私はスズメ亭からいかなる要素も失わせるつもりはありません。"
10018040-78 = "……諦めてはいけません。"
10018040-79 = "はい……？"
10018040-83 = "私は料理が下手で、いつも失敗ばかりしています。"
10018040-84 = "手伝おうとしても余計な被害を生んでしまうし、結果は散々です。"
10018040-85 = "ちょっと間違えたと思ったら食材が生き返って、暴れて人を襲うこともあります。"
10018040-87 = "……それ、間違ったって言えるレベルなの？怪現象でも起きてるんじゃない？"
10018040-88 = "でも、私は諦めていません！"
10018040-89 = "フウカ先輩が付き添ってくれて、先生が励ましてくれて、何より私は料理が好きなんです。"
10018040-90 = "まだまだ上手にできませんが、それでも料理をするのって楽しいんです！"
10018040-92 = "自分が作った料理を食べてくれる瞬間を想像するだけで、とってもうれしい気持ちになるじゃないですか。"
10018040-93 = "ここで諦めたら……何も残りません。"
10018040-94 = "いつか私も本当においしい料理を作ってみせます！"
10018040-96 = "だから女将さんも諦めないでほしいです！"
10018040-97 = "私がこんな話をするなんて、出過ぎた真似かもしれませんが……。"
10018040-98 = "皆さん……。"
10018040-99 = "ですが、私にはどうすれば良いのか思いつかなくて……。"
10018040-102 = "[s] \"せっかく作った料理ですし、食べてもらうのはどうですか？\""
10018040-104 = "[ns] \"そこでお客さんの反応を見て、次の方針を考えましょう。\""
10018040-107 = "なるほど。試食による販売促進を狙うのですか。"
10018040-108 = "女将さん、練習した新しい味を披露するチャンスですよ！"
10018040-109 = "生まれ変わったスズメ亭……それを証明する新たな料理……うふふ。"
10018040-110 = "食堂再開のためにも、まずはお客さんに料理を味わってもらうんです。#n女将さん、一緒にやってみましょう！"
10018040-112 = "皆さん……！"
10018040-117 = "一度は諦めかけていましたが、もう一度頑張ります！"
10018040-120 = "その言葉を待っていましたわ。"
10018040-121 = "はい！なんでも手伝いますよ！"
10018040-123 = "まだこれからなんだから。"
10018040-124 = "頑張りましょう！"
10018040-128 = "[ns] \"試食会の準備をしないといけないね。\""
