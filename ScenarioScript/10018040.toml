[translation]
10018040-1 = "Episódio 4; O povo ignorante não entenderia!"
10018040-2 = "Interior da fábrica"
10018040-5 = "O sabor não importa! O que importa é lucrar com a margem!"
10018040-6 = "O controle sanitário só precisa ser bom o suficiente para não sermos processados! Disfarce o sabor com temperos!"
10018040-7 = "Falar de gastronomia ou o que quer que seja, no fim das contas, é apenas uma questão de preferência pessoal!"
10018040-8 = "Sim, nós ganhamos dinheiro com algo tão subjetivo e vago quanto o paladar!"
10018040-12 = "Primeiro, atraímos os clientes com ingredientes de qualidade e, aos poucos, aumentamos a quantidade de ingredientes baratos—"
10018040-13 = "Se misturarmos os temperos químicos especiais da Nyao Food para disfarçar o sabor, criamos um fluxo de lucro rápido e em grande escala!"
10018040-14 = "Reclamações? Não vejo, não ouço! De qualquer forma, o povo ignorante não entenderia!"
10018040-18 = "Mufufufu. E o lucro obtido dessa forma, agora—"
10018040-19 = "Se eu investir na expansão da rede de franquias 'Restaurante Nyao'..."
10018040-20 = "O ciclo de lucro continuará girando... O negócio finalmente está decolando, vamos aos negócios!"
10018040-22 = "Chefe, tenho um relatório."
10018040-23 = "Mufufufu. O que foi de repente? E eu não disse para me chamar de Presidente aqui?"
10018040-24 = "Peço perdão, Presidente. É que tenho algo urgente para relatar..."
10018040-25 = "Não é comum você ter assuntos urgentes."
10018040-26 = "Não me diga que o lucro do negócio caiu?"
10018040-27 = "Se não tiver um motivo que me convença, você pagará o preço correspondente. Mufufufufu."
10018040-28 = "É que recebemos este contato do local..."
10018040-30 = "Mufufuuu..."
10018040-31 = "O que devemos fazer?"
10018040-32 = "A dona daquele restaurante tem nos dado muito trabalho, mas... hum."
10018040-33 = "Além disso, o Clube de Pesquisa Gastronômica? Não me importo com um clube desses."
10018040-34 = "Quem devemos observar é o Colégio Gehenna."
10018040-36 = "Sobre isso, dizem que o Clube de Pesquisa Gastronômica é um clube que já está sendo muito vigiado dentro de Gehenna."
10018040-37 = "Essa informação vem de uma fonte confiável?"
10018040-38 = "Sim, os membros do grupo disseram o mesmo em uníssono."
10018040-39 = "Hum, muito bem. Vou acreditar na sua palavra. Ora, não é uma história simples?"
10018040-43 = "Em outras palavras, basta darmos um jeito no Clube de Pesquisa Gastronômica, certo?"
10018040-46 = "Interior do Suzume-tei"
10018040-47 = "Por favor, repense. O Suzume-tei vale muito a pena."
10018040-48 = "É verdade. Vocês acabaram de começar. Se desistirem agora..."
10018040-50 = "Obrigada. Mas só o sentimento de vocês já é o suficiente."
10018040-51 = "Acima de tudo, sinto muito por estar causando problemas a todos vocês."
10018040-52 = "[s] \"É raro a Haruna e a Fuuka concordarem em algo...\""
10018040-53 = "Sensei? O senhor disse algo?"
10018040-54 = "……Bem, de vez em quando. É melhor do que desistir aqui."
10018040-55 = "Mas acho difícil continuar resistindo mais do que isso."
10018040-56 = "Lutar contra uma grande empresa como a Nyao Food é impossível para um indivíduo."
10018040-57 = "No começo, pensei ingenuamente que vocês poderiam compensar as partes em que eu falhava, mas..."
10018040-58 = "A situação foi saindo do meu controle aos poucos..."
10018040-60 = "O que pretende fazer com o restaurante que passou de geração em geração?"
10018040-61 = "Exatamente. Você não disse que queria protegê-lo a todo custo?"
10018040-66 = "Não tenho escolha, vou aceitar a franquia da Nyao Food."
10018040-67 = "Assim, pelo menos, o prédio em si poderá ser preservado."
10018040-68 = "Não, isso está errado."
10018040-69 = "A gastronomia, em primeiro lugar, não é apenas a comida em si, mas também a localização do restaurante, a atmosfera, a história herdada..."
10018040-70 = "É a combinação de vários elementos que finalmente torna algo digno de ser chamado de gastronomia."
10018040-71 = "Não pretendo deixar que o Suzume-tei perca nenhum desses elementos."
10018040-78 = "……Não desista."
10018040-79 = "Sim……?"
10018040-83 = "Eu sou péssima na cozinha e sempre acabo falhando."
10018040-84 = "Tento ajudar, mas só causo mais problemas, e o resultado é sempre um desastre."
10018040-85 = "Às vezes, quando acho que cometi um pequeno erro, os ingredientes ganham vida, começam a se debater e até atacam as pessoas."
10018040-87 = "……Isso pode ser chamado de erro? Não seria algum tipo de fenômeno sobrenatural?"
10018040-88 = "Mas eu não desisti!"
10018040-89 = "A veterana Fuuka me acompanha, o Sensei me encoraja e, acima de tudo, eu amo cozinhar."
10018040-90 = "Ainda não consigo fazer nada direito, mas mesmo assim, cozinhar é divertido!"
10018040-92 = "Só de imaginar o momento em que alguém come a comida que eu preparei, já me sinto muito feliz."
10018040-93 = "Se eu desistir agora…… não sobrará nada."
10018040-94 = "Um dia, eu vou conseguir preparar uma comida realmente deliciosa!"
10018040-96 = "Por isso, eu quero que a dona do restaurante também não desista!"
10018040-97 = "Talvez seja intromissão da minha parte dizer algo assim……."
10018040-98 = "Pessoal……."
10018040-99 = "Mas eu não consigo pensar no que fazer……."
10018040-102 = "[s] \"Já que você preparou a comida, por que não deixa que experimentem?\""
10018040-104 = "[ns] \"Vamos ver a reação dos clientes e pensar nos próximos passos.\""
10018040-107 = "Entendo. Você quer promover as vendas através de degustação."
10018040-108 = "Dona, esta é a chance de mostrar o novo sabor que você praticou!"
10018040-109 = "O Suzume-tei renascido…… um novo prato para provar isso…… ufufu."
10018040-110 = "Para reabrir o refeitório, primeiro precisamos que os clientes provem a comida. #nVamos fazer isso juntas, dona!"
10018040-112 = "Pessoal……!"
10018040-117 = "Eu quase desisti uma vez, mas vou me esforçar mais uma vez!"
10018040-120 = "Eu estava esperando por essas palavras."
10018040-121 = "Sim! Eu ajudo com o que for preciso!"
10018040-123 = "Ainda estamos só começando."
10018040-124 = "Vamos dar o nosso melhor!"
10018040-128 = "[ns] \"Precisamos preparar a sessão de degustação.\""
