[translation]
10020020-5 = "第2エリアの「次元エンジン」前に到着しました。"
10020020-7 = "ん～……このパターンならそろそろ――"
10020020-8 = "「そろそろ」……？ "
10020020-18 = "や、やっぱり出た……！！"
10020020-19 = "し、シロコさんが、また姿を現しました！"
10020020-21 = "待ってたよ～！！"
10020020-22 = "び、ビックリしたあ！？"
10020020-23 = "位置を確認しました！第2エリア「次元エンジン」前です！！"
10020020-24 = "すぐ、そっちへ向かうわよ！#n先生、私たちが到着するまで、足止めをお願い！！"
10020020-25 = "はい！シロコちゃんに会いに行きます！！"
10020020-33 = "戦闘態勢に入ります！#n先生、指揮をお願いします！"
