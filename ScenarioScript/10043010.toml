[translation]
10043010-1 = "第1話;「絶対」なんて言わないで"
10043010-6 = "まさか、ブレーブスの控え室に招待されるなんて……。"
10043010-7 = "……ここは関係者以外、立ち入り禁止のはずでは？"
10043010-8 = "[s] \"なんで呼ばれたんだろう……。\""
10043010-13 = "お越しいただきありがとうございます。"
10043010-17 = "[ns] \"どちら様ですか？\""
10043010-23 = "申し遅れました。私はコーギー・ブレーブスで監督を務めております。"
10043010-28 = "か、監督！？"
10043010-29 = "この方が……。"
10043010-31 = "仰る通り、ここは本来、関係者以外立ち入り禁止です。"
10043010-32 = "ですが、なにぶん緊急事態でして……。"
10043010-36 = "……どうか、我々を助けてはくださりませんか！"
10043010-41 = "い、一体何が……？"
10043010-42 = "それは、トレーニングで解決できることでしょうか？"
10043010-43 = "せ、先輩！"
10043010-45 = "実は――"
10043010-54 = "監督……「アレ」の準備は？"
10043010-57 = "！！！"
10043010-59 = "あ、ああ……。だが一つ聞きたい、目的は金か……？"
10043010-60 = "金など必要ない。重要なのは試合だ。"
10043010-61 = "いいか、もう一度作戦を説明する。 "
10043010-62 = "次の攻撃時……出塁したらバントだ。絶対だぞ。"
10043010-64 = "もし従わなければ、「予告」通り犯行に移る。"
10043010-65 = "……っ！"
10043010-66 = "ヴァルキューレに通報でもしてみろ……後はわかるな？"
10043010-67 = "攻守交代の時にまた連絡する。では。"
10043010-72 = "切れちゃった……。"
10043010-73 = "ボイスチェンジャーを使っていましたね……。"
10043010-75 = "ううぅ……何が目的で……！"
10043010-76 = "[s] \"犯行予告の内容は？\""
10043010-80 = "ヤツから脅迫を受けたのは……少し前のことです。"
10043010-82 = "球団の監督に脅迫……なんででしょう……？"
10043010-83 = "さきほどの通話の内容も不可解でした……。"
10043010-85 = "言う通りに試合をしなかった場合……。"
10043010-86 = "ヤツは――"
10043010-94 = "ブレーブスと専属契約中の犬用ガム工場を、爆破すると言っているんです！"
10043010-95 = "これは未曾有のテロですよ……！"
10043010-99 = "[ns] \"……今なんと？\""
10043010-101 = "犬用、ガム……？"
10043010-102 = "ちょ、ちょっとピンとこないのですが……。"
10043010-104 = "……我々にとっては深刻な問題なんです。"
10043010-105 = "あそこのガムは、ほど良い歯ごたえで、食感も抜群――"
10043010-106 = "さらに、噛めば噛むほど旨味が広がっていく傑作で……！"
10043010-107 = "うちの選手はみんな、あのガムで集中力を高めて試合に臨んでいるんです！"
10043010-108 = "もはや、あのガムもチームの一員と言って良いくらいに大切なガムなんです！"
10043010-109 = "あれなしでは打率が驚くほど下がってしまいます！"
10043010-110 = "防御率だって、信じられないほど悪くなるに違いない！"
10043010-112 = "そ、そうなんですか……？"
10043010-113 = "（そんなに深刻なんだ……）"
10043010-119 = "私はレイさんほど野球に詳しくはありませんが……。"
10043010-120 = "脅迫行為は、スポーツマンシップに反するものです。"
10043010-124 = "たしかにそうですが……先輩がトレーニング以外に目を向けるなんて。"
10043010-125 = "野球がきっかけで、先輩も他のスポーツに目覚めたり……？"
10043010-126 = "健康な精神は、健康な身体に宿ります。"
10043010-127 = "トレーニングさえしていれば、犯人も凶行に走ることはなかったでしょうに。"
10043010-128 = "……って、結局トレーニングなんですか！？"
10043010-130 = "[ns] \"事情は分かりました。\""
10043010-134 = "で、では……力を貸してくださるのでしょうか？"
10043010-135 = "神聖な球場で、犯行予告をするだなんて……。"
10043010-136 = "野球ファンとして許せません！"
10043010-137 = "その上テロ予告まで……！"
10043010-138 = "私としても、このような暴挙は見過ごせません。"
10043010-139 = "こんなことがまかり通っては、スポーツ界全体に悪影響が及びます。"
10043010-140 = "[s1] \"私も同意見です。\"\n[s2] \"ぜひ協力させていただきます。\""
10043010-146 = "あ、ありがとうございます……！"
10043010-148 = "でも先生、どうすればいいんでしょう……？"
10043010-152 = "観客席を巡回して犯人を捜そう、ですか。"
10043010-153 = "たしかに、シラトリシリーズは中継が行われていないから……。"
10043010-154 = "犯人はスタジアムのどこかで試合を見ているはずです。"
10043010-155 = "ですが、捜している間にも、また連絡が来る……。"
10043010-156 = "次の攻守交代の時までに――"
10043010-157 = "犯人に対応する必要がありますね。"
10043010-161 = "監督と通話を繋いでおいて、犯人との会話を聞きつつ動こう……ですか？"
10043010-162 = "なるほど。"
10043010-163 = "では、交渉はトレーナーとレイさんにお任せします。"
10043010-164 = "私の得意分野ではありませんので。"
10043010-165 = "筋力と体力を要することなら、自信はあるのですが。"
10043010-166 = "[s3] \"じゃあ、役割を分担しよう。\"\n[s4] \"まず、交渉班と、捜索班に分かれて……。\""
10043010-169 = "では、私は交渉を担当しつつ、捜索も手伝いますね。"
10043010-170 = "私は観客席を見て回ります。"
10043010-171 = "通話回線を繋いでおきますので、先生、よろしくお願いします。"
10043010-175 = "ああ、それと……スミレさん、だったかな？"
10043010-180 = "ええ。"
10043010-181 = "レイさんは問題ないと思うけど……。"
10043010-182 = "あなたの格好は、観客席だと少々目立つかもしれない。"
10043010-183 = "そんなに変でしょうか……？"
10043010-184 = "[s] \"変というわけじゃなくて……\""
10043010-185 = "なるほど……球場では珍しい、と。"
10043010-186 = "ですが、着替えもないですし……。"
10043010-191 = "……あっ、いいこと思いつきました！"
10043010-192 = "球場でおなじみの「アレ」！"
10043010-193 = "[s] \"「アレ」？\""
10043010-194 = "監督、ちょっと……（こそこそ）"
10043010-199 = "……ああ！なるほど！"
10043010-216 = "……お待たせしました！先輩、どうぞ！"
10043010-224 = "これは……着慣れないですね……。"
10043010-225 = "その、トレーナー……。"
10043010-226 = "どう、ですか……？"
10043010-227 = "[s] \"……！\""
10043010-229 = "[ns5] \"すごく似合ってるよ！\"\n[ns6] \"いつもとは違う魅力があるね！\""
10043010-232 = "そ、そうですか？"
10043010-233 = "でしたら……この格好も悪くないですね。ふふっ。"
10043010-234 = "それでは、売り子さんとしてプロテインシェイクを提供していきましょう。"
10043010-235 = "そ、それはいいですから！"
10043010-236 = "もう時間がありません！行きましょう！"
10043010-237 = "既に攻守交代してる可能性も……！"
10043010-238 = "まだ1アウトですし、大丈夫だと思いますよ。"
10043010-239 = "え！？レイダースはまだ1アウトしか取られていないんですか！？"
10043010-240 = "つまり……ブレーブスは得点を取られ続けて……？"
10043010-246 = "……。"
10043010-247 = "……。"
10043010-248 = "[s] \"……。\""
10043010-253 = "しょ、勝負は最後までわかりません……から！"
