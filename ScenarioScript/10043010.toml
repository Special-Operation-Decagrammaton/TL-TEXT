[translation]
10043010-1 = "Episódio 1; Não diga \"absolutamente\""

10043010-6 = "Quem diria que eu seria convidado para o vestiário dos Braves..."
10043010-7 = "...Não deveria ser proibida a entrada de pessoas não autorizadas aqui?"
10043010-8 = "[s] \"Por que será que me chamaram...?\""
10043010-13 = "Obrigado por vir."
10043010-17 = "[ns] \"Quem é você?\""
10043010-23 = "Perdoe a falta de apresentação. Eu sou o técnico dos Corgi Braves."
10043010-28 = "O-o técnico!?"
10043010-29 = "Então é ele..."
10043010-31 = "Como você disse, este lugar é, originalmente, restrito a pessoas autorizadas."
10043010-32 = "Mas, devido a uma emergência..."
10043010-36 = "...Por favor, você não poderia nos ajudar?!"
10043010-41 = "O-o que aconteceu...?"
10043010-42 = "Isso é algo que pode ser resolvido com treinamento?"
10043010-43 = "Se-senpai!"
10043010-45 = "Na verdade..."
10043010-54 = "Técnico... e a preparação para \"aquilo\"?"
10043010-57 = "!!!"
10043010-59 = "Ah, sim... Mas quero perguntar uma coisa, o objetivo é dinheiro...?"
10043010-60 = "Não preciso de dinheiro. O que importa é o jogo."
10043010-61 = "Escute, vou explicar o plano mais uma vez."
10043010-62 = "No próximo ataque... quando chegar à base, faça um bunt. É uma ordem."
10043010-64 = "Se não obedecer, seguirei com o \"aviso\" e cometerei o crime."
10043010-65 = "...!"
10043010-66 = "Tente denunciar para a Valkyrie... você sabe o que acontece depois, não sabe?"
10043010-67 = "Entrarei em contato novamente na troca de turno. Até mais."
10043010-72 = "A ligação caiu..."
10043010-73 = "Ele estava usando um modificador de voz..."
10043010-75 = "Uuu... qual será o objetivo dele...!"
10043010-76 = "[s] \"Qual é o conteúdo do aviso de crime?\""
10043010-80 = "Recebi a ameaça dele... faz pouco tempo."
10043010-82 = "Uma ameaça ao técnico do time... por que será...?"
10043010-83 = "O conteúdo da ligação de agora também foi incompreensível..."
10043010-85 = "Se não jogarmos conforme o que ele disse..."
10043010-86 = "Ele vai..."
10043010-94 = "Ele disse que vai explodir a fábrica de chicletes para cães que tem contrato exclusivo com os Braves!"
10043010-95 = "Isso é um terrorismo sem precedentes...!"
10043010-99 = "[ns] \"...O que você disse agora?\""
10043010-101 = "Chiclete... para cães...?"
10043010-102 = "D-desculpe, mas não estou entendendo muito bem..."
10043010-104 = "...Para nós, é um problema sério."
10043010-105 = "O chiclete de lá tem uma textura perfeita e um sabor incrível..."
10043010-106 = "Além disso, quanto mais você mastiga, mais o sabor se espalha, é uma obra-prima...!"
10043010-107 = "Todos os nossos jogadores usam aquele chiclete para aumentar a concentração antes dos jogos!"
10043010-108 = "Já podemos dizer que aquele chiclete é um membro tão importante quanto qualquer um do time!"
10043010-109 = "Sem ele, nossa média de rebatidas cai drasticamente!"
10043010-110 = "E a nossa defesa com certeza vai piorar de um jeito inacreditável!"
10043010-112 = "É-é mesmo...?"
10043010-113 = "(É tão sério assim...)"
10043010-119 = "Eu não entendo tanto de beisebol quanto a Rei, mas..."
10043010-120 = "Atos de intimidação são contrários ao espírito esportivo."
10043010-124 = "Certamente, mas... é raro ver o veterano interessado em algo além de treinamento."
10043010-125 = "Será que o beisebol despertou o interesse do veterano por outros esportes...?"
10043010-126 = "Mente sã, corpo são."
10043010-127 = "Se o criminoso estivesse treinando, ele não teria recorrido a atos violentos."
10043010-128 = "...Espera, no fim das contas é tudo sobre treinamento!?"
10043010-130 = "[ns] \"Entendi a situação.\""
10043010-134 = "E-então... você vai nos emprestar sua força?"
10043010-135 = "Fazer um aviso de crime em um estádio sagrado..."
10043010-136 = "Como fã de beisebol, eu não posso perdoar isso!"
10043010-137 = "E ainda por cima, uma ameaça terrorista...!"
10043010-138 = "Eu também não posso ignorar um ato tão ultrajante."
10043010-139 = "Se deixarmos isso passar, todo o mundo dos esportes será afetado negativamente."
10043010-140 = "[s1] \"Eu concordo.\"\n[s2] \"Com certeza, contem com a minha ajuda.\""
10043010-146 = "M-muito obrigada...!"
10043010-148 = "Mas Sensei, o que devemos fazer...?"
10043010-152 = "Patrulhar as arquibancadas para procurar o criminoso, é isso?"
10043010-153 = "De fato, como a série Shiratori não está sendo transmitida..."
10043010-154 = "O criminoso deve estar assistindo ao jogo em algum lugar do estádio."
10043010-155 = "Mas, enquanto procuramos, outra mensagem pode chegar..."
10043010-156 = "Antes da próxima troca de turno..."
10043010-157 = "Precisamos lidar com o criminoso."
10043010-161 = "Manter a chamada com o técnico aberta e agir enquanto ouvimos a conversa com o criminoso... é isso?"
10043010-162 = "Entendo."
10043010-163 = "Então, deixarei a negociação com o treinador e a Rei."
10043010-164 = "Não é minha especialidade."
10043010-165 = "Se for algo que exija força física e resistência, aí sim eu tenho confiança."
10043010-166 = "[s3] \"Então, vamos dividir as tarefas.\"\n[s4] \"Primeiro, vamos nos dividir em uma equipe de negociação e uma de busca...\""
10043010-169 = "Então, eu ficarei responsável pela negociação e também ajudarei na busca."
10043010-170 = "Eu vou dar uma volta pelas arquibancadas."
10043010-171 = "Vou deixar a linha de comunicação aberta, então conto com você, Sensei."
10043010-175 = "Ah, e... Sumire, era esse o seu nome?"
10043010-180 = "Sim."
10043010-181 = "Acho que a Rei não terá problemas..."
10043010-182 = "Mas o seu traje pode chamar um pouco de atenção nas arquibancadas."
10043010-183 = "Está tão estranho assim...?"
10043010-184 = "[s] \"Não é que esteja estranho...\""
10043010-185 = "Entendo... é incomum no estádio, é isso."
10043010-186 = "Mas eu não tenho outras roupas para trocar..."
10043010-191 = "...Ah, tive uma ideia!"
10043010-192 = "Aquele item clássico do estádio!"
10043010-193 = "[s] \"Aquele item?\""
10043010-194 = "Técnico, um momento... (sussurros)"
10043010-199 = "...Ah! Entendi!"
10043010-216 = "...Desculpe a espera! Veterano, aqui está!"
10043010-224 = "Isso é... não estou acostumada a usar algo assim..."
10043010-225 = "Diga, treinador..."
10043010-226 = "Como estou...?"
10043010-227 = "[s] \"...!\""
10043010-229 = "[ns5] \"Combina muito com você!\"\n[ns6] \"Você tem um charme diferente do habitual!\""
10043010-232 = "É, é mesmo?"
10043010-233 = "Sendo assim... esse visual não é nada mal. Fufu."
10043010-234 = "Então, vamos começar a servir os shakes de proteína como vendedores."
10043010-235 = "I-isso não é necessário!"
10043010-236 = "Não temos mais tempo! Vamos!"
10043010-237 = "Existe a possibilidade de que os papéis já tenham se invertido...!"
10043010-238 = "Ainda temos apenas um eliminado, então acho que estamos bem."
10043010-239 = "Hã!? Os Raiders só sofreram um eliminado até agora!?"
10043010-240 = "Isso significa que... os Braves continuam sofrendo pontos...?"
10043010-246 = "……."
10043010-247 = "……."
10043010-248 = "[s] \"……。\""
10043010-253 = "A-a partida não acaba até o último momento... então!"
