[translation]
10035120-1 = "Epílogo parte 1; O erro do Clube de Engenharia (1)"
10035120-5 = "Que calor..."
10035120-7 = "Pois é..."
10035120-8 = "Vou acabar cozinhando aqui..."
10035120-9 = "Bem, é verão, então é natural, mas..."
10035120-14 = "Hã? Não estamos na época em que as cerejeiras ainda estão florescendo?"
10035120-15 = "É verdade."
10035120-16 = "Não faz tanto tempo assim que modificamos esse robô de arranjo floral."
10035120-18 = "Não! Já estamos no auge do verão!?"
10035120-20 = "I-Isso é verdade mesmo!?"
10035120-21 = "Não acredito que nem percebemos que a estação mudou..."
10035120-22 = "É que, quando começamos a trabalhar, acabamos esquecendo do tempo..."
10035120-23 = "Droga, meus planos para as férias de verão foram todos por água abaixo. #nBem, como o desenvolvimento deste robô está indo bem, não importa."
10035120-29 = "Hm?"
10035120-37 = "Pessoal, temos um novo pedido."
10035120-41 = "Um pedido?"
10035120-42 = "De quem?"
10035120-44 = "Do Clube de Pesquisa de Biologia Marinha. #nEles querem que desenvolvamos um robô de lazer para usar nas férias de verão."
10035120-48 = "O prazo é... hum, semana que vem?"
10035120-51 = "Não parece algo que dê para fazer em tão pouco tempo..."
10035120-52 = "E ainda tem a programação para implementar."
10035120-54 = "Mas, como mestres, não podemos recusar um pedido."
10035120-60 = "Então, que tal isso?"
10035120-61 = "Podemos reaproveitar este robô de arranjo floral."
10035120-62 = "Entendi!"
10035120-63 = "Um hiper-robô que combina funções de arranjo floral e lazer marítimo! #nÉ isso, não é!?"
10035120-65 = "Nada mal! Vamos começar o desenvolvimento imediatamente!"
10035120-70 = "Pesquisei sobre lazer marítimo na internet e... #nparece que existem vários tipos!"
10035120-71 = "Mergulho, pesca, banana boat..."
10035120-72 = "Como exemplo, se eu explicar o mergulho... #neste lazer, você usa um equipamento de mergulho, ou seja, um scuba, e entra no mar—"
10035120-78 = "Ah... Kotori. Agradeço a explicação, mas vamos deixar os detalhes para depois."
10035120-79 = "As condições no formulário de pedido são... #nque um único robô suporte vários tipos de lazer marítimo—"
10035120-80 = "E que tenha uma aparência que se misture ao ambiente natural, é... #nHum. Esse é um pedido bem típico do Clube de Pesquisa de Biologia Marinha."
10035120-82 = "Busca de pontos de mergulho, suporte para pesca e força para rebocar um barco. #nPrecisamos de um robô que combine tudo isso."
10035120-83 = "Talvez o nível de dificuldade esteja um pouco alto?"
10035120-85 = "Para começar, alguém aqui tem experiência com lazer marítimo?"
10035120-91 = "...Eu também não tenho experiência."
10035120-93 = "Mas detalhes insignificantes assim não importam, né? Se estiver nas nossas mãos..."
10035120-98 = "Se começarmos a construir, daremos um jeito!"
10035120-106 = "(Alguns dias se passaram...)"
10035120-110 = "Com isso..."
10035120-111 = "Finalmente...!"
10035120-113 = "Está completo!!"
10035120-119 = "A obra ambiciosa do nosso Clube de Engenharia, o Mecanocrocodilo para lazer marítimo!"
10035120-121 = "Membros de ferro para explorar pontos de mergulho. Função de lança-chamas para servir de sinalização em caso de emergência. #nE até força para rebocar barcos! É digno do nome de arma definitiva!"
10035120-122 = "A aparência é idêntica a um crocodilo real, e internamente instalamos um algoritmo que imita os instintos de um crocodilo..."
10035120-123 = "Valerá a pena todo o esforço. Ver o produto final na nossa frente é empolgante."
10035120-125 = "O corpo está perfeito! Embora o programa interno ainda precise de ajustes..."
10035120-126 = "Já está tarde. Vamos deixar o teste de funcionamento para amanhã."
10035120-127 = "Bom trabalho a todos! Descansem bem hoje!"
10035120-130 = "Bom trabalho!"
