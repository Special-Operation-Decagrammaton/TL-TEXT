[translation]
10035120-1 = "後日談その1;エンジニア部の過ち（１）"
10035120-5 = "暑いな……。"
10035120-7 = "そうだね……。"
10035120-8 = "茹だってしまいます……。"
10035120-9 = "夏だから、当然ではありますが……。"
10035120-14 = "うん？今はまだ桜が咲いている時期だろう？"
10035120-15 = "そうだよ。"
10035120-16 = "この華道用ロボットを改造してから、そんなに日も経ってないし。"
10035120-18 = "いいえ！もう真夏ですよ！？"
10035120-20 = "そ、それは確かなのかい！？"
10035120-21 = "まさか季節が変わったことにすら、気がついていなかったなんて……"
10035120-22 = "一度作業を始めると、時間を忘れちゃうんだよね……。"
10035120-23 = "しまった、夏休みの計画が全て無意味になってしまった。#nまあ、このロボットの開発が順調だから構わないが。"
10035120-29 = "ん？"
10035120-37 = "みんな、新しい依頼だ。"
10035120-41 = "依頼、ですか？"
10035120-42 = "誰から？"
10035120-44 = "海洋生物研究部からだ。#n夏休みに使うレジャー用ロボットを開発してほしいらしい。"
10035120-48 = "締切は……ふむ、来週か。"
10035120-51 = "そんな短時間で作れるものじゃないような……。"
10035120-52 = "プログラムの組み込みもありますからね。"
10035120-54 = "だが、マイスターとして、依頼を断ることはできない。"
10035120-60 = "じゃあ、こういうのは？"
10035120-61 = "この華道用ロボットを流用するの。"
10035120-62 = "なるほど！"
10035120-63 = "華道と海洋レジャー機能を兼ね備えたハイパーロボ！#nというわけですね！？"
10035120-65 = "いいじゃないか！さっそく開発を始めよう！"
10035120-70 = "インターネットで海洋レジャーについて調べたところ……#n色々な種類があるみたいですね！"
10035120-71 = "スキューバダイビング、釣り、バナナボート……"
10035120-72 = "一例として、スキューバダイビングを説明しますと……#nこのレジャーは潜水用の装備すなわち、スキューバを着けたまま海の中へ――"
10035120-78 = "ああ……コトリ。補足はありがたいけれど、詳細はあとで聞くとしよう。"
10035120-79 = "発注書にある条件は……、#n様々な海洋レジャーのサポートをひとつのロボットで完結させること――"
10035120-80 = "それに、自然の環境に溶け込む見た目にすること、か……。#nふむ。このあたりは、海洋生物研究部らしい注文だね。"
10035120-82 = "ダイビングポイントのサーチ、釣りのサポート、そしてボートを牽引するパワー。#nこれらを兼ね備えたロボットが必要というわけですね。"
10035120-83 = "ちょっと難易度高いかも？"
10035120-85 = "そもそも、だ。私たちのなかに海洋レジャーの経験者はいるかい？"
10035120-91 = "……私も経験はない。"
10035120-93 = "だが、そんな些細なことは重要じゃない、か。私たちの手にかかれば……"
10035120-98 = "作り始めれば、なんとかなる！"
10035120-106 = "（数日が経過し……）"
10035120-110 = "これで……。"
10035120-111 = "ついに……！"
10035120-113 = "完成です！！"
10035120-119 = "我々エンジニア部の野心作、海洋レジャー用メカワニだ！"
10035120-121 = "ダイビングポイントを開拓する鉄製の手足。遭難時に目印となる火炎放射機能。#nそして、ボートを牽引するパワーまで！まさに最終兵器の名に相応しいです！"
10035120-122 = "見た目は本物のワニにそっくりで、内部にはワニの本能を模倣したアルゴリズムも搭載してる……"
10035120-123 = "頑張った甲斐があったね。完成品を目の前にすると、テンションが上がる。"
10035120-125 = "本体はこれで完璧だ！内部のプログラムはまだ調整が必要だが……。"
10035120-126 = "今日はもう遅い。試運転は明日にしよう。"
10035120-127 = "みんなお疲れ様！今日はゆっくり休んでくれ！"
10035120-130 = "お疲れ様でした！"
