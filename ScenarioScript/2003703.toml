[translation]
2003703-1 = "História Policial: Edição Piscina de Correnteza"
2003703-3 = "Oh, Sensei, você veio ajudar também?"
2003703-4 = "Isso vai facilitar... #nNão, digo, vai permitir uma vigilância completa."
2003703-5 = "Vou deixar você me acompanhar, como um favor especial."
2003703-6 = "[s1] \"...Por que você está com uma boia?\"\n[s2] \"Você não deveria estar trabalhando?\""
2003703-9 = "O que você está dizendo, Sensei? #nIsso também é equipamento de salva-vidas."
2003703-10 = "Para patrulhar o parque inteiro..."
2003703-11 = "É claro que preciso me mover com eficiência, não é?"
2003703-12 = "[s] \"...Você quer dizer que vai patrulhar em cima de uma boia?\""
2003703-13 = "Exatamente!"
2003703-14 = "Este parque aquático tem uma piscina de correnteza #nsuper longa, não tem?"
2003703-15 = "Se eu colocar a boia e me deixar levar pela correnteza, #nposso vigiar o parque todo."
2003703-16 = "Este é o meu tão sonhado \"Sistema de Patrulha Automática\"!"
2003703-17 = "[s3] \"...Você só quer brincar, né?\"\n[s4] \"Você não está só brincando na piscina de correnteza?\""
2003703-20 = "Não, não! #nÉ uma patrulha legítima pelo parque!"
2003703-21 = "Fufu. #nClaro, acho que vai ser uma missão bem divertida."
2003703-22 = "Bom, então vou começar o trabalho. #nVou colocar a boia e..."
2003703-27 = "Hup!"
2003703-33 = "...Ué?"
2003703-36 = "[wa:700]― [log=후부키 수영복]Ah, [wa:1090]ué...?[/log]"
2003703-39 = "[wa:1170]― [log=후부키 수영복]Nghhh![/log]"
2003703-40 = "[wa:3020]― [log=후부키 수영복]...[wa:770]Ugh.[/log]"
2003703-43 = "[wa:1430]― [log=후부키 수영복]Não, [wa:1040]não sai...[/log]"
2003703-44 = "[wa:2390]― [log=후부키 수영복]Não me diga que [wa:1480]vou ficar presa aqui para sempre...?[/log]"
2003703-47 = "[wa:1430]― [log=후부키 수영복]Ei, [wa:580]Sensei.[/log]"
2003703-48 = "[wa:1300]― [log=후부키 수영복]Me ajuda aqui![/log]"
2003703-51 = "― [log=후부키 수영복]De agora em diante vou faltar menos ao trabalho,[/log]"
2003703-52 = "[wa:2730]― [log=후부키 수영복]e vou levar o serviço a sério...[/log]"
2003703-55 = "[wa:900]― [log=후부키 수영복]Além disso, [wa:1200]vou te dar meu estoque secreto de donuts![/log]"
2003703-58 = "― [log=후부키 수영복]Hya!?[/log]"
2003703-59 = "[wa:920]― [log=후부키 수영복]Ei, [wa:620]me tocar por trás é [wa:1540]meio...!?[/log]"
2003703-62 = "(Você ajudou Fubuki a sair da boia...)"
2003703-64 = "Haa, haa..."
2003703-65 = "...Pensei que não ia conseguir."
2003703-66 = "Não quero nem ver uma boia por um bom tempo..."
2003703-67 = "[s] \"Você precisa patrulhar andando como uma pessoa normal.\""
2003703-68 = "Haa... que preguiça."
2003703-73 = "Já sei! Se não for uma boia, mas sim um colete salva-vidas!"
2003703-75 = "(Depois disso, você levou Fubuki para patrulhar, mesmo ela tentando fugir do trabalho)"
