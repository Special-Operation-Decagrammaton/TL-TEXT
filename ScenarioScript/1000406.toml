[translation]
1000406-1 = "Luz do sol calorosa"
1000406-2 = "Arredores de Gehenna - Estrada à beira do rio"
1000406-4 = "……Ah, Sensei."
1000406-5 = "[s1] \"……Está tudo bem? Não está se sentindo bem?\"\n[s2] \"Por que essa atmosfera……?\""
1000406-6 = "……Hm?"
1000406-7 = "……Hm?"
1000406-8 = "……Ah, bem."
1000406-11 = "……Desculpe. Fiquei trabalhando a noite toda desde ontem, então não consegui dormir……."
1000406-12 = "Provavelmente estou com olheiras…… nem tomei banho, e meu cabelo está todo bagunçado……."
1000406-14 = "É que o Sensei me chamou de repente……."
1000406-15 = "[s3] Sugerir que Hina, que parece estar murcha, descanse.\n[s4] Sugerir que façam fotossíntese juntos."
1000406-16 = "Um banco……? Ah, sim."
1000406-17 = "Fotossíntese……? Sensei, nós não somos plantas……"
1000406-18 = "Bem, já que o tempo está tão bom……."
1000406-19 = "(Desliza)"
1000406-21 = "(Sentei-me no banco ao lado de Hina)"
1000406-22 = "……."
1000406-23 = "……Bem."
1000406-24 = "……………."
1000406-25 = "………………………."
1000406-26 = "……Sinto que tem algo errado aqui."
1000406-27 = "[s5] \"Hm? É mesmo?\"\n[s6] \"Então…….\""
1000406-28 = "……."
1000406-29 = "……."
1000406-30 = "……………."
1000406-31 = "……………………."
1000406-33 = "(Desliza)"
1000406-36 = "(Hina sentou-se entre as minhas pernas)"
1000406-37 = "……."
1000406-38 = "[s] Sinto o corpo de Hina contra o meu."
1000406-39 = "……Bem, não acho que eu seja pesada…… mas mesmo que fosse, você é um adulto, então aguente."
1000406-40 = "……A posição não está muito confortável…… mas não é ruim."
1000406-41 = "[s7] Sinto um cheiro bom vindo da cabeça de Hina.\n[s8] Sinto um cheiro bom vindo do cabelo de Hina."
1000406-42 = "……Sensei?"
1000406-43 = "……Sensei?"
1000406-44 = "……!?"
1000406-47 = "(Vupt!)"
1000406-49 = "Ei, ah, agora pouco……!?"
1000406-50 = "Ah……! Eu disse que não tinha tomado banho, ei, ah, uaa……!?"
1000406-51 = "[s9] \"Era cheiro de sol.\"\n[s10] \"O cheiro da Hina…….\""
1000406-57 = "………Sensei."
1000406-58 = "[s] \"Ah, finalmente as olheiras chegaram até a testa da Hina…….\""
1000406-59 = "……Isso não são olheiras."
1000406-60 = "POW!!!!!!!!!!"
1000406-62 = "(Depois disso, levei uma bronca enorme)"
