[translation]
1000406-1 = "暖かい陽射し"
1000406-2 = "ゲヘナ近郊・川沿いの道"
1000406-4 = "……あ、先生。"
1000406-5 = "[s1] \"……大丈夫？体調悪い？\"\n[s2] \"なんか、雰囲気が……？\""
