1000406-19 = "（スッ）"
1000406-21 = "（ヒナとベンチに並んで座った）"
1000406-22 = "……。"
1000406-23 = "……えっと。"
1000406-24 = "……………。"
1000406-25 = "………………………。"
1000406-26 = "……これ、何か違う気がする。"
1000406-27 = "[s5] \"ん？そう？\"\n[s6] \"じゃあ……。\""
1000406-28 = "……。"
1000406-29 = "……。"
1000406-30 = "……………。"
1000406-31 = "……………………。"
1000406-33 = "（スッ）"
1000406-36 = "（ヒナが膝の間に座った）"
1000406-37 = "……。"
1000406-38 = "[s] 身体の前面でヒナを感じる。"
1000406-39 = "……えっと、重くはないと思うけど……たとえ重くても、大人なんだから我慢して。"
1000406-40 = "……ちょっと座り心地が悪い……けど、嫌いじゃない。"
1000406-41 = "[s7] ヒナの頭から良い香りがする。\n[s8] ヒナの髪の毛から良い香りがする。"
1000406-42 = "……先生？"
1000406-43 = "……先生？"
1000406-44 = "……っ！？"
1000406-47 = "（バッ！）"
1000406-49 = "え、あ、今……っ！？"
1000406-50 = "バっ……！さっきシャワー浴びてないって私、え、あ、ぅあ……！？"
1000406-51 = "[s9] \"お日様の香りだった。\"\n[s10] \"ヒナの匂い……。\""
1000406-57 = "………先生。"
1000406-58 = "[s] \"あっ、ついにヒナの額の方にまで隈が……。\""
1000406-59 = "……これは隈じゃない。"
1000406-60 = "ゴスッ！！！！！！"
1000406-62 = "（その後めちゃくちゃ怒られた）"
