1000406-12 = "多分、目にクマが……シャワーも浴びてないし、髪もボサボサだし……。"
1000406-14 = "先生が、急に呼び出すから……。"
1000406-15 = "[s3] 枯れてしまったようなヒナに休憩を勧める。\n[s4] 一緒に光合成しようと勧める。"
1000406-16 = "ベンチ……？ああ、うん。"
1000406-17 = "光合成……？先生、私たちは植物と違って……"
