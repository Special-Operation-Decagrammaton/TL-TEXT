[translation]
101130-1 = "第13話;[ruby=S.C.H.]シャーレ[/ruby]奪還作戦（１）"
101130-3 = "（PMCの基地を無事抜け出して、子ウサギ公園に身を隠した)"
101130-4 = "……そうだったのですね。#n先生も巻き込まれて、拉致されていた、と。"
101130-5 = "カンナ局長がいなかったら、本当に危ないところでしたね。"
101130-6 = "あの狂犬が、先生を助けるために自分を犠牲にするなんて……#nにわかには信じられないな。"
101130-7 = "すごい怪我です……"
101130-8 = "とりあえずテントで寝かせてるけど、休んだら勝手に起きるんじゃない？#nヴァルキューレの公安局長だし。きっと大丈夫だよ。"
101130-9 = "今はお互いの情報を共有して、状況を把握した方がよさそうですね。"
101130-10 = "何が起きているのか、何をすべきか……現状の整理が必要です。"
101130-12 = "現在、D.U.は戒厳令が発動されたため、すべての通信・物流・移動が禁じられました。行政関連もシャットダウンされた状態です。"
101130-13 = "D.U.外部に通じる全ての通信が遮断されているため、#n他学園の自治区からの支援も難しく、室長たちの行方も分かりません……"
101130-14 = "カイザーが公布した戒厳令を取り消すには、彼らから行政制御権を取り戻さなくてはなりません。しかし、連邦生徒会の行政官は現在、不信任決議案が議決され、行政権限を喪失しています！"
101130-15 = "これを解消するには、不信任決議案に同意した6人の室長が意見を撤回するか、#n投票を行なって、再信任可決をしなくてはならず……"
101130-16 = "ですがこれも、戒厳令のせいで不可能……問題が堂々巡りしている状態です！"
101130-18 = "つまり、今の連邦生徒会は何の役にも立たないってことね。"
101130-19 = "あいつらが役に立ったことなんてあったか？ "
101130-20 = "ですが、一企業に行政権限を奪われるなんて……#nSRT特殊学園が維持されていれば、最悪の事態は避けられたはず……"
101130-21 = "そ、それじゃ……今もサンクトゥムタワーはカイザーに掌握されてるんだよね……一体どうすれば……"
101130-22 = "[s] \"残された方法は……\""
101130-24 = "あとはもう、サンクトゥムタワーの行政制御権を掌握してる場所に突撃し、#n物理的に阻止するしかありません！"
101130-25 = "[s] \"行政制御権を掌握している場所……？\""
101130-26 = "――シャーレです！ "
101130-27 = "[s] \"シャーレ……？\""
101130-28 = "はい。正確にはシャーレの地下、「クラフトチェンバー」です！"
101130-29 = "「クラフトチェンバー」は、連邦生徒会長が残した、物質生成器。#n本来、シッテムの箱の管理者だけが接続できるのですが…… "
101130-30 = "とある方法で、カイザーコーポレーションは認証を回避し、クラフトチェンバーを起動しました。それによってサンクトゥムタワーを掌握したみたいで…‥！"
101130-31 = "それと関連しているのかは分かりませんが、カイザーはリン行政官を拉致し、シャーレに幽閉しているようです。"
101130-32 = "[s] \"リンがシャーレに……\" "
101130-33 = "はい、リンさんは今シャーレ内に閉じ込められています！#n幸い、怪我は無いようですが……。"
101130-37 = "……理解しました。つまり、PMCに掌握されているシャーレを奪還するのですね。"
101130-38 = "ここにいる私たちだけで、やるの……？"
101130-39 = "まぁ、他の自治区と連絡が取れないから、私たちがやるしかないわね。"
101130-40 = "ちょうどいい。いつかシャーレをぶっ飛ばしたいと思ってたところだったんだ。"
101130-41 = "分かりました！本官も、頑張ります！"
101130-42 = "はぁ……というか、そう簡単にいかないんじゃない～？#n相手はキヴォトス屈指の大企業、カイザーだよ？ "
101130-43 = "バカじゃないんだから、私たちが来ることだって想定してるだろうし……"
101130-45 = "……カイザーSOFをお呼びしろ。"
101130-46 = "と、[ruby=Special Operation Forces]特殊部隊員[/ruby]を、ですか？"
101130-47 = "ああ。先生がこっちに向かっている。"
101130-48 = "あの者なら、今どこを攻撃すべきかを誰よりも熟知しているだろう。#nだから備えなくては。"
101130-49 = "本来はあの「狐」用だったが……仕方ない。#nカイザーPMCの決戦部隊という最高の切り札を、今ここで使おうじゃないか。"
101130-50 = "急げ！"
101130-51 = "は、はい！"
101130-54 = "私は、油断して失敗するようなバカとは違うからな。"
101130-56 = "うう……幽閉された行政官を助け出して、カイザーの陰謀も阻止……#nわ、私に、できるのかな……。"
101130-57 = "ミユ、できるかできないかの問題ではありません、やらなくては。"
101130-58 = "そうです！キヴォトスの平和が、私たちの手にかかっているんです！"
101130-59 = "う、うん……がんばるね……。"
101130-63 = "うう……これが終わったら、29泊30日くらいの休暇を貰ってやるんだから～！#n覚悟してよね！"
101130-64 = "……PMCごときが。うちはキヴォトスのトップエリートが集まったSRT特殊学園だぞ。"
101130-65 = "まぁ、私たちは実戦経験も無い、新入生ですが……。"
101130-66 = "学園も無くなっちゃったし……"
101130-67 = "野宿中だし……"
101130-68 = "教科書も持ってなくて、ヴァルキューレ学園のを借りてるけど。"
101130-69 = "で、でも！本官はヴァルキューレのBD好きですよ！#n何の問題もなく、学習できてます！"
101130-70 = "そうじゃなくて、在庫もあるし、いくらでもあげられるっていう話。"
101130-74 = "[ns] \"よし。RABBIT小隊、生活安全局のみんな……始めようか。\""
101130-75 = "ミヤコ、作戦名を決めてくれ。"
101130-76 = "そ、そうですね……ではこれより、シャーレ奪還の「パセリ作戦」を――"
101130-77 = "待って、なんでパセリなの。どういうこと？#nもっとカッコいいやつ無いの？"
101130-78 = "えっ、その……ウサギが好きな食べ物なので……"
101130-79 = "なるほど、それならニンジンの方が可愛くありませんか？#nニンジン作戦！"
101130-80 = "それは前使っちゃって……"
101130-81 = "じゃあ、ドーナッツ作戦は？グレーズド・ドーナッツ作戦！"
101130-82 = "なんか、クリスマスに放映されそうな映画の名前だな。"
101130-83 = "最初の意図を汲み取って、クローバー作戦はどうでしょう？"
101130-84 = "……「[ruby=S.C.H.]シャーレ[/ruby]奪還作戦」にします。"
101130-85 = "なんだ、つまんないの。"
101130-86 = "[ns] \"よし、行こう！\""
101130-89 = "先生……どうか気をつけてください……#n今回は、なんだかいつもと違う気配を感じます……。"
101130-90 = "私が目撃した、不吉な流星……あれは一体何だったのでしょう……"
101130-99 = "敵の巡航戦車、中隊規模を確認！#n攻撃用ヘリからバリケードまで、徹底的に準備してるよ……"
101130-100 = "ちっ、抜かりないな……。"
101130-101 = "正面突破は難しそう……ミヤコちゃん、どうしよう？"
101130-102 = "……もうちょっと、支援があれば……"
101130-109 = "ん？この信号は……？"
101130-114 = "見つけたぞ！こっちだ！"
101130-115 = "連絡を受けて参りました、先生！私たちも力になります！ "
101130-117 = "公安局のみなさん……！"
101130-118 = "あれ～？いつもなら、自分から絶対に動かない公安局の生徒が……"
101130-119 = "[s] \"ヴァルキューレが来てくれたんだ！\""
101130-121 = "いくら待っても命令が与えられず、ソワソワしながら待機していたのですが、#n偶然子ウサギタウン付近で局長と先生の姿を目撃しまして！"
101130-122 = "私たちも、可能な限りお手伝いします、先生！"
101130-126 = "ミヤコ、これなら……"
101130-127 = "……はい、いけそうですね。"
101130-128 = "では先生、指示をお願いします。"
101130-129 = "[s] \"指示はミヤコがお願い、私はそれを補助するね。\""
101130-130 = "……はい、ありがとうございます。"
101130-131 = "では、皆さん。今からD.U.の戒厳令を解除し、カイザーグループの陰謀を阻止するための……「[ruby=S.C.H.]シャーレ[/ruby]奪還作戦」を開始します！"
101130-132 = "「「はい！」」"
