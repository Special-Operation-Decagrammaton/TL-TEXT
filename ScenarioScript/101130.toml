[translation]
101130-1 = "Episódio 13; Operação de recaptura (1)"

101130-3 = "(Ele escapou com segurança da base da PMC e se escondeu em um parque de coelhos bebês)"

101130-4 = "...Isso mesmo. O professor #n também esteve envolvido e foi sequestrado."

101130-5 = "Se a Diretora Kanna não estivesse lá, as coisas teriam sido muito perigosas."

101130-6 = "Não acredito que aquele cachorro louco se sacrificaria para salvar o professor...#n."

101130-7 = "É uma lesão terrível..."

101130-8 = "Por enquanto, estou deixando-o dormir em uma barraca, mas estou preocupado que ele acorde sozinho se eu descansar. #nEle é o chefe de segurança pública da Valquíria. Tenho certeza que vai ficar tudo bem."

101130-9 = "Parece melhor agora compartilhar informações uns com os outros e compreender a situação."

101130-10 = "O que está acontecendo e o que deveria ser feito... precisamos resolver a situação atual."

101130-12 = "Atualmente, a lei marcial foi imposta no DU e todas as comunicações, logística e movimentos são proibidos. Assuntos relacionados ao governo também são encerrados."

101130-13 = "Uma vez que todas as comunicações para o exterior da D.U. foram cortadas, é difícil receber apoio dos distritos autónomos de outras escolas e o paradeiro dos chefes de departamento é desconhecido..."

101130-14 = "Para cancelar a lei marcial que o Kaiser promulgou, devemos retirar-lhes o controlo administrativo. No entanto, os administradores do Conselho Estudantil da Federação perderam agora a sua autoridade administrativa, uma vez que uma moção de censura foi aprovada!"

101130-15 = "Para resolver isto, os seis chefes de gabinete que concordaram com a moção de censura devem retirar as suas opiniões ou votar #n para aprovar novamente a moção de censura..."

101130-16 = "No entanto, isso também é impossível devido à lei marcial... o problema está dando voltas e mais voltas!"

101130-18 = "Em outras palavras, o atual Conselho Estudantil da Federação não serve para nada."

101130-19 = "Eles já foram úteis para você?"

101130-20 = "Porém, ter a autoridade administrativa retirada de uma única empresa... #nSe a Academia Especial SRT tivesse sido mantida, a pior situação poderia ter sido evitada..."

101130-21 = "Bem, então... A Torre do Santuário ainda está sob o controle do Kaiser... então o que devemos fazer..."

101130-22 = "[s] \"O único caminho que resta é...\""

101130-24 = "Tudo o que resta agora é atacar o local que detém o controle administrativo da Torre Sanctum e detê-lo fisicamente!"

101130-25 = "[s] \"Onde você tem controle administrativo...?\""

101130-26 = "-É uma placa de Petri!"

101130-27 = "[s] \"Placa de Petri...?\""

101130-28 = "sim. Para ser exato, é o porão da placa de Petri, a ``Câmara de Artesanato''!"

101130-29 = "A \"Câmara de Artesanato\" é um gerador de substâncias deixado pelo Presidente do Conselho Estudantil da Federação. #nOriginalmente, apenas o administrador da caixa Shittemu pode se conectar..."

101130-30 = "De alguma forma, a Kaiser Corporation contornou a autenticação e ativou a Câmara de Artesanato. Parece que ele assumiu o controle da Torre Sanctum...!"

101130-31 = "Não sei se isso está relacionado, mas parece que Kaiser sequestrou o Administrador Lin e o está aprisionando em uma placa de Petri."

101130-32 = "[s] \"Rin está em uma placa de Petri...\""

101130-33 = "Sim, Rin-san agora está preso dentro da placa de Petri! #nFelizmente, parece não haver feridos..."

101130-37 = "……entendido. Ou seja, estão tentando recuperar a placa de Petri que está nas mãos da PMC."

101130-38 = "Vamos fazer isso sozinhos aqui...?"

101130-39 = "Bem, como não podemos contactar outras regiões autónomas, não temos outra escolha senão fazê-lo nós próprios."

101130-40 = "Certo. Eu estava pensando em explodir uma placa de Petri em algum momento."

101130-41 = "Entendido! Farei o meu melhor também, chefe!"

101130-42 = "Suspiro... quer dizer, não será tão fácil, certo? #nO adversário é a Kaiser, uma das maiores empresas de Kivotos, certo?"

101130-43 = "Eles não são estúpidos, então provavelmente esperavam que viéssemos..."

101130-45 = "...Ligue para Kaiser SOF."

101130-46 = "É isso que você quer dizer?"

101130-47 = "ah. A professora está indo nessa direção."

101130-48 = "Essa pessoa saberia melhor do que ninguém onde atacar agora. #nEntão você tem que estar preparado."

101130-49 = "Foi originalmente planejado para aquela \"raposa\", mas... não pode ser evitado. #nVamos usar nosso melhor trunfo, a força de batalha decisiva do Kaiser PMC, aqui e agora."

101130-50 = "Pressa!"

101130-51 = "Ah, sim!"

101130-54 = "Não sou como os idiotas que baixam a guarda e falham."

101130-56 = "Ugh...Eu resgatei o funcionário do governo preso e frustrei a conspiração do Kaiser...#nEu me pergunto se posso fazer isso..."

101130-57 = "Miyu, não é uma questão de você conseguir ou não, você tem que fazer."

101130-58 = "isso mesmo! A paz de Kivotos está em nossas mãos!"

101130-59 = "Uh, sim... farei o meu melhor..."

101130-63 = "Ugh... Quando isso acabar, vou te dar cerca de 29 noites e 30 dias de férias! #nEsteja preparado!"

101130-64 = "...É como um PMC. Somos uma escola especial SRT onde se reúne a elite dos Kivotos."

101130-65 = "Bem, somos novos estudantes sem nenhuma experiência real de combate..."

101130-66 = "A escola também desapareceu..."

101130-67 = "Estou acampando no campo..."

101130-68 = "Eu também não tenho um livro, então peguei um emprestado da Valkyrie Academy."

101130-69 = "Mas, mas! Eu gosto do BD da Valquíria! #nPosso aprender sem problemas!"

101130-70 = "Não é o caso, eles têm em estoque e podem doar o quanto quiserem."

101130-74 = "[ns] \"Ok. Pelotão RABBIT, todos do Departamento de Segurança Comunitária... vamos começar.\""

101130-75 = "Miyako, decida um nome para a operação."

101130-76 = "Bem, isso mesmo... De agora em diante, vamos falar sobre a \"Operação Salsa\" para recuperar a placa de Petri..."

101130-77 = "Espere, por que salsa? O que você quer dizer? #nNão tem algo mais legal?"

101130-78 = "Bem... é a comida favorita do coelho..."

101130-79 = "Entendo, as cenouras não seriam mais fofas então? #n Operação Cenoura!"

101130-80 = "Eu usei isso antes..."

101130-81 = "E quanto à Operação Donut? Operação Donut Glaceado!"

101130-82 = "Parece o nome de um filme que provavelmente iria ao ar no Natal."

101130-83 = "Considerando a intenção original, que tal a Operação Clover?"

101130-84 = "...Vou chamar isso de \"operação de recaptura\"."

101130-85 = "O que, isso é chato?"

101130-86 = "[ns] \"Ok, vamos!\""

101130-89 = "Professor... por favor tenha cuidado... #nDesta vez, sinto algo diferente do normal..."

101130-90 = "O meteoro ameaçador que testemunhei... O que foi isso?"

101130-99 = "Verifique o tanque cruzador inimigo e o tamanho da empresa! #nEstamos fazendo preparativos minuciosos, desde helicópteros de ataque até barricadas..."

101130-100 = "Tch, não posso deixar passar..."

101130-101 = "Atravessar pela frente parece difícil... Miyako-chan, o que devemos fazer?"

101130-102 = "...Se eu pudesse conseguir um pouco mais de apoio..."

101130-109 = "sim? Este sinal é...?"

101130-114 = "Eu encontrei! É por aqui!"

101130-115 = "Fui contatado, senhor! Nós também podemos ajudar!"

101130-117 = "Todos da Secretaria de Segurança Pública...!"

101130-118 = "Huh? Um estudante do Departamento de Segurança Pública que normalmente nunca toma medidas..."

101130-119 = "[s] \"Valquíria chegou!\""

101130-121 = "Não importa quanto tempo eu esperei, nenhuma ordem foi dada, então esperei nervosamente, até que por acaso vi o diretor e a professora perto da Cidade do Bebê Coelho!"

101130-122 = "Nós o ajudaremos no que pudermos, senhor!"

101130-126 = "Miyako, se é isso..."

101130-127 = "...Sim, acho que vai funcionar."

101130-128 = "Agora, senhor, por favor, me dê algumas instruções."

101130-129 = "[s] \"Miyako lhe dará instruções e eu irei ajudá-lo.\""

101130-130 = "...Sim, muito obrigado."

101130-131 = "Pois bem, pessoal. Começaremos agora a “operação de recaptura” para suspender a lei marcial do DU e impedir a conspiração do Grupo Kaiser!"

101130-132 = "\"\"sim!\"\""

