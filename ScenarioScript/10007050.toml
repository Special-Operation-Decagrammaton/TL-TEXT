[translation]
10007050-1 = "Episódio 5; Trabalho para o Departamento de Obras!"
10007050-4 = "No nosso \"Termas 227\", não temos apenas fontes termais magníficas, mas também preparamos um jardim maravilhoso para que nossos clientes possam desfrutar de um passeio!"
10007050-5 = "Claro, devido à característica de Red Winter, onde neva o ano todo, é difícil manter um jardim cheio de flores e árvores, mas..."
10007050-6 = "Em vez disso, usamos pedras e areia para criar um jardim de pedras, o Karesansui."
10007050-7 = "[s] \"Karesansui?\""
10007050-8 = "Sim. Talvez você já tenha ouvido falar, é um jardim que expressa a natureza usando pedras e areia."
10007050-9 = "Esse estilo de jardim, que expressa a natureza sem usar água, parece pregar a importância da moderação, e eu acho isso maravilhoso."
10007050-10 = "Além disso, quando olho para este jardim, sinto uma sensação de calma e tranquilidade, a ponto de esquecer as coisas triviais――"
10007050-14 = "Isso é inadmissível! Vamos protestar!"
10007050-15 = "Uma sensação de tranquilidade, e..."
10007050-16 = "Isso mesmo, não podemos permitir! Protesto!"
10007050-17 = "Ah, mas o que é isso! Eu estava tendo uma conversa tão boa a sós com o Sensei!"
10007050-18 = "Fazer um escândalo em um lugar como este, mesmo sendo clientes, é inaceitável!"
10007050-23 = "Entrada do Termas 227"
10007050-25 = "Protestamos firmemente contra o \"Termas 227\"!"
10007050-26 = "Isso mesmo!"
10007050-27 = "O \"Termas 227\" deve compensar o Departamento de Obras pelos danos causados!"
10007050-28 = "Compensem a gente!"
10007050-30 = "Mas, isso é um mal-entendido, ou melhor..."
10007050-34 = "O-o que é essa situação! Por que o Departamento de Obras está aqui!?"
10007050-35 = "Ah, Nodoka. É que, bem..."
10007050-37 = "Humph, finalmente apareceu."
10007050-38 = "Nodoka, a gerente burguesa corrupta que vive na luxúria!"
10007050-39 = "Q-quem você está chamando de \"gerente burguesa corrupta que vive na luxúria\"!?"
10007050-40 = "A vida luxuosa foi só no começo, ultimamente a administração está tão ocupada que não tenho tempo nem para descansar!"
10007050-44 = "……C-cof, cof."
10007050-48 = "Bem, qual seria o motivo da visita ao \"Termas 227\", pessoal do Departamento de Obras?"
10007050-49 = "Ah, olhem para aquela expressão!"
10007050-50 = "Aquele sorriso de burguesia maligna, manchado pelo capitalismo!"
10007050-51 = "Não sabíamos disso quando compartilhávamos as alegrias e tristezas..."
10007050-52 = "Então, depois de conseguir riqueza, você finalmente revelou sua verdadeira face. Sua traidora!"
10007050-53 = "Você está dizendo coisas terríveis desde agora, sabia!?"
10007050-57 = "Cof, cof... Minori-san, primeiro acalme-se e depois me diga por que vocês estavam fazendo uma manifestação aqui. Outros clientes estão incomodados, então..."
10007050-58 = "Humph, você ainda não percebeu o problema deste lugar?"
10007050-59 = "Bem... sim, se puder me contar."
10007050-60 = "Nossa insatisfação é..."
10007050-62 = "Este próprio lugar!"
10007050-64 = "O-o que isso significa...?"
10007050-65 = "O fato de operarmos o Termas causou algum prejuízo ao Departamento de Obras?"
10007050-66 = "Ainda quer fingir que não sabe! Nós vimos tudo!"
10007050-67 = "Os membros malignos do Departamento de Desenvolvimento de Termas de Gehenna construindo este lugar e indo embora triunfantes...!"
10007050-68 = "……E isso é algum problema?"
10007050-69 = "Claro que é!"
10007050-70 = "O pessoal do Departamento de Desenvolvimento de Termas não são alunas da nossa Academia Federal Red Winter..."
10007050-72 = "Ou seja, é uma terceirização!"
10007050-73 = "[s] \"……Terceirização?\""
10007050-74 = "Até agora, sempre que a Academia Federal Red Winter precisava de uma grande obra, nós do Departamento de Obras trabalhávamos com sinceridade, não importava o quão difícil fosse o trabalho."
10007050-75 = "Embora o ambiente de trabalho fosse rigoroso, sempre trabalhamos com o orgulho de que \"todos os edifícios da academia são construídos por nossas mãos\"!"
10007050-76 = "No entanto, este novo Termas, que agora é a maior atração turística de Red Winter... foi construído por terceirizados e não por nós do Departamento de Obras...!"
10007050-77 = "Isso é um problema que afeta profundamente o orgulho do nosso Departamento de Obras!"
10007050-78 = "Isso mesmo! Nós fomos feridos!"
10007050-79 = "Nós, do Departamento de Obras, protestamos firmemente contra essa tirania da \"Estância Termal 227\"!"
10007050-80 = "Protestamos!!"
10007050-82 = "E-espere um pouco. Como eu disse, esta estância termal não foi construída porque nós queríamos, foi o Departamento de Desenvolvimento Termal que a fez por conta própria..."
10007050-83 = "P-Professor, por favor, diga algo para me ajudar...!"
10007050-84 = "[s1] \"A Nodoka também é, de certa forma, uma vítima do Departamento de Desenvolvimento Termal, sabe?\"\n[s2] \"Essa situação não é algo que a Nodoka desejava que acontecesse.\""
10007050-85 = "...O quê, vítima?"
10007050-86 = "Entendo. Eu realmente não tinha pensado nisso..."
10007050-87 = "I-isso mesmo! Se for colocar dessa forma, nós também somos vítimas que \"perderam o antigo prédio escolar\" pelas mãos do Departamento de Desenvolvimento Termal!"
10007050-88 = "Entendo, então foi algo forçado que vocês não desejavam..."
10007050-89 = "Sendo assim, camarada Nodoka... junte-se a nós agora para demolir esta estância termal!"
10007050-90 = "I-isso mesmo. Nós também não construímos esta estância termal porque queríamos desde o início!"
10007050-91 = "Entendo...? Então, não haveria problema em demolir esta \"construção ilegal\" que foi feita sem consulta prévia ao Departamento de Obras?"
10007050-92 = "Hã!?"
10007050-93 = "I-isso é outra história... D-depois de tanto esforço para conseguir uma chance de ganhar dinheiro fácil, não tem como a gente simplesmente desistir dela!"
10007050-94 = "O quê...! Como eu suspeitava, sua verdadeira natureza é maligna, sua pequena burguesa!"
10007050-95 = "P-pequena...!? O que você pensa que está fazendo!?"
10007050-96 = "Não aguento mais ouvir isso! Vamos forçar vocês a irem embora!"
10007050-97 = "Hmph, se é assim, tudo bem. Não importa o quão rápido vocês ficaram ricas, não tenho medo nenhum de alunas de classe especial!"
10007050-98 = "Vamos lá! Pelo orgulho e pelos direitos trabalhistas do nosso Departamento de Obras, e também...!"
10007050-99 = "Bem, hum... por várias outras coisas importantes!"
10007050-100 = "Vamos nos levantar!"
