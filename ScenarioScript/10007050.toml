[translation]
10007050-1 = "第5話;工務部に仕事を！"
10007050-4 = "私たちの「227号温泉郷」では立派な温泉だけではなく、お客様にお散歩を楽しんでいただけるように、素敵なお庭も整えているんです！"
10007050-5 = "もちろん年中雪が降るこのレッドウィンターの特性上、お花や木が生い茂ったお庭を整えるのは難しいのですが……。"
10007050-6 = "その代わりに石や砂を用いて、枯山水の庭園を造ったんです。"
10007050-7 = "[s] \"枯山水？\""
10007050-8 = "はい。聞いたことはあるかもしれませんが、石や砂などで自然などを表現した庭ですね。"
10007050-9 = "水を使わずに自然を表現するこの庭園様式は、どことなく節制の大切さをも説いているようにも思えて、素敵だなって思うんです。"
10007050-10 = "それにこの庭を見ていると、些細なことはどうでも良いと思えるくらい、静かで落ち着いた気――"
10007050-14 = "こんなことは許されない！糾弾しよう！"
10007050-15 = "落ち着いた気持ち、に……"
10007050-16 = "そうだ、許されてたまるものか！糾弾だ！"
10007050-17 = "ああもう何ですか！せっかく先生とふたりっきりで良い話をしていたのに！"
10007050-18 = "こういった場所で騒ぎを起こすなんて、お客様だとしても許されません！"
10007050-23 = "227号温泉郷・入口"
10007050-25 = "「227号温泉郷」に、断固として抗議する！"
10007050-26 = "そうだそうだ！"
10007050-27 = "「227号温泉郷」は、工務部に及ぼした被害を補償しろ！"
10007050-28 = "補償しろーー！"
10007050-30 = "だから、それは誤解っていうか……"
10007050-34 = "な、何ですかこの状況は！工務部がどうしてここに！？"
10007050-35 = "ああ、ノドカ。それが、えっと……。"
10007050-37 = "ふん、ようやく現れたか。"
10007050-38 = "豪遊三昧のブルジョワ悪徳支配人、ノドカめ！"
10007050-39 = "だ、誰が「豪遊三昧のブルジョワ悪徳支配人」ですか！？"
10007050-40 = "贅沢な生活は最初だけで、このところは運営が忙しすぎて休む暇も無いんですよ！"
10007050-44 = "……こ、こほん。"
10007050-48 = "えっと、この「227号温泉郷」にどういった御用でしょうか、工務部の皆様？"
10007050-49 = "あ、あの表情を見ろ！"
10007050-50 = "あの資本主義に染まった、邪悪なブルジョワジーの笑みを！"
10007050-51 = "かつて苦楽を共にした時は知らなかったが……"
10007050-52 = "富を手に入れて、いよいよ本性を現したということか。この裏切り者め！"
10007050-53 = "さっきから散々な物言いですね！？"
10007050-57 = "こほんっ……ミノリさん、まずは落ち着いて、それからどうしてこんなところでデモをしていたのか教えてください。他のお客様も困っていますので……。"
10007050-58 = "ふん、この温泉郷の問題にまだ気づいてないのか。"
10007050-59 = "えっと……はい、教えていただければと。"
10007050-60 = "あたしたちの不満は……"
10007050-62 = "この温泉郷そのものだ！"
10007050-64 = "そ、それはどういう意味で……？"
10007050-65 = "私たちが温泉郷を運営することで、工務部に何か不利益でもあったのですか？"
10007050-66 = "この期に及んで白を切る気か！あたしたちは全部見てたんだぞ！"
10007050-67 = "邪悪なゲヘナの温泉開発部員たちが、ここに温泉郷を建てて颯爽と帰る姿を……！"
10007050-68 = "……それが、何か問題でも？"
10007050-69 = "当然だ！"
10007050-70 = "温泉開発部のやつらは、あたしたちレッドウィンター連邦学園の生徒ではない……"
10007050-72 = "つまり、外部委託じゃないか！"
10007050-73 = "[s] \"……外部委託？\""
10007050-74 = "今まであたしたち工務部は、レッドウィンター連邦学園で何か大規模な土木工事が必要なたびに、どんなにきつい仕事でも率先して誠実に働いてきた。"
10007050-75 = "厳しい労働環境だったが、「学園のすべての建物はあたしたちの手で建てる」というプライドを持って、ここまでずっとやってきたんだ！"
10007050-76 = "ところが新しくできたこの温泉郷が、今やレッドウィンター連邦学園で一番の観光名所が……あたしたち工務部ではなく、外部委託によって建設されたなんて……！"
10007050-77 = "これは、あたしたち工務部のプライドに大きく関わる問題だ！"
10007050-78 = "そうだ！傷ついたんだ！"
10007050-79 = "あたしたち工務部は、「227号温泉郷」のこの横暴さに対して断固抗議する！"
10007050-80 = "抗議する！！"
10007050-82 = "ま、待ってください。ですから、この温泉郷は私たちが望んで建てたというより、その温泉開発部が勝手に作ったもので……。"
10007050-83 = "せ、先生からも何かフォローをお願いします……！"
10007050-84 = "[s1] \"ノドカもある意味、温泉開発部の被害者だと思うよ？\"\n[s2] \"この状況は、全部ノドカが望んだことってわけじゃないよ。\""
10007050-85 = "……何、被害者？"
10007050-86 = "なるほど。それは確かに考えてなかった……。"
10007050-87 = "そ、そうです！言ってみれば私たちも、温泉開発部の手によって「旧校舎を失った」という被害者でもあります！"
10007050-88 = "なるほど、望んでいない形で無理やりにされてしまったと……。"
10007050-89 = "ならば同士ノドカ……今からあたしたちと一緒に、この温泉郷を撤去するとしよう！"
10007050-90 = "そ、そうです。私たちも最初からこんな温泉郷を建てようと思って建てたんじゃないんです！"
10007050-91 = "なるほど……？なら工務部との事前相談も無しで建設されたこの「違法建築物」は、撤去しても問題無いということか？"
10007050-92 = "はいっ！？"
10007050-93 = "そ、それはそれで話が別と言いますか……せ、せっかく手に入れた一攫千金のチャンスを、自ら逃すわけがないじゃないですか！"
10007050-94 = "なっ……！やはり本性は邪悪だったな、このちびブルジョアジーめ！"
10007050-95 = "ち、ちび……！？もう何なんですか一体！"
10007050-96 = "これ以上聞いていられません！強制的にお帰りいただくことにします！"
10007050-97 = "ふんっ、それならそれで構わない。いくら急にお金持ちになったところで、特別クラスの生徒なんかちっとも怖くないからな！"
10007050-98 = "さあ！あたしたち工務部のプライドと労働の権利、そして……！"
10007050-99 = "えっと、うーん……その他色々な、大事なことのために！"
10007050-100 = "立ち上がろう！"
