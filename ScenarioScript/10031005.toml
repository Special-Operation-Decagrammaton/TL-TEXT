[translation]
10031005-1 = "プロローグ;顔合わせ"
10031005-2 = "……ククッ、クククッ。"
10031005-4 = "万魔殿・執務室"
10031005-6 = "ククッ、キキキッ……"
10031005-10 = "キキキキッ！歓迎する！シャーレの先生よ！よくぞ来てくれた！"
10031005-11 = "[s] \"あ、うん。大事な用があるって言われたから……\""
10031005-15 = "[ns] \"でも、どうして呼ばれたのか知りたいんだけど……\""
10031005-16 = "キシシッ。ああ、そうだろうとも。"
10031005-17 = "この私から連絡をもらった先生は、ずっと悩んでいたに違いない。"
10031005-18 = "ついに、この日がやって来てしまった……#nもしかして隠された真意があるのではないか？"
10031005-19 = "もっと準備をしておくべきだったのではないか、と思っただろう。"
10031005-20 = "[s] \"いや、別に……\""
10031005-21 = "ああ、言わずとも良い！#nこのマコト様は全て分かっている！"
10031005-22 = "組織のトップとは、慎重に慎重を期さねばならないもの。"
10031005-23 = "キキキッ！恥ずかしがることは無い！"
10031005-24 = "それだけ今日の話し合いがもたらす影響は、衝撃的かつ劇的だからな！"
10031005-25 = "[s3] \"そうだね……？\"\n[s4] \"えっと、何を言ってるのかよく分からないんだけど……\""
10031005-28 = "ああ！何を隠そう！"
10031005-29 = "今日この場に先生を呼んだのは、この間の提案に対する返事を聞くため！"
10031005-30 = "キキキッ！果たして先生は、どう返事をす――"
10031005-31 = "マコト先輩～！#nイブキ、おんぶしてほしい～"
10031005-32 = "ああ、分かった。イブキ、ちょっと待ってくれ。"
10031005-39 = "[ns] \"…………。\""
10031005-40 = "……ふむ、どこまで話してたか？"
10031005-41 = "はいは～い！#n先輩の提案に対する返事を聞こうとしてるとこでしたよ～！"
10031005-42 = "あ、ああ……そうだったな。助かったぞ、チアキ。"
10031005-43 = "は～い。"
10031005-44 = "こほん、では本題に戻って……"
10031005-45 = "そこで先生よ！#nぜひ直接、その口から返事を聞かせてもらおうじゃないか！"
10031005-46 = "……んしょ、よいしょ。"
10031005-51 = "[ns5] \"マコトの提案……？\"\n[ns6] （あまりにも大量に届いてたから、何の話か分からない……）"
10031005-54 = "ああ、私としたことが気が利かなかったようだな。"
10031005-55 = "いくら返事を聞くためとはいえ、顔を合わせた途端いきなり迫っては礼儀に反そう。"
10031005-56 = "物事には順序が大切だと言いたいのだな。"
10031005-57 = "[s] \"ん……？\""
10031005-58 = "いえ、マコト先輩。"
10031005-59 = "マコト先輩が好き勝手にしゃべっているせいで、先生が困惑しているように見えますが。"
10031005-60 = "やれやれ、イロハ。何も分かってないな。"
10031005-61 = "キキキッ、先生の目を見ろ。あれはリーダーの目だ。#n誰かの上に立つ者しか持たない。"
10031005-62 = "あの鋭い眼光の持ち主が、ただ困惑しているとでも？"
10031005-63 = "この万魔殿のリーダー[ruby=はぬま]羽沼[/ruby]マコト様は見抜いている！#nあの目に隠された意志を！"
10031005-64 = "……だそうです、先生。"
10031005-65 = "[s] \"イロハ、ありがとね……\""
10031005-66 = "はぁ……まったく。"
10031005-68 = "キキキッ！"
10031005-69 = "先生の気持ちくらい、この私も理解しているとも！"
10031005-70 = "だからここは、私も礼儀や慣習を尊重し……"
10031005-71 = "改めて、先生に提案させてもらおう！"
10031005-72 = "さあ、[USERNAME]先生よ……！"
10031005-76 = "我々万魔殿と……いや、このマコト様と手を組まないか！"
10031005-77 = "よいしょ……んっしょ……"
10031005-83 = "[ns] \"……何かと思ったら、その話だったんだね。\""
10031005-84 = "まあ、私は何の話か伝わってないだろうと思っていましたが。"
10031005-85 = "わぁ、シャーレとの連携！先生とタッグを組む！いいですね！それ！最高です！"
10031005-86 = "ククッ！今さら万魔殿の強大な力は説明するまでもないな！"
10031005-87 = "そんな我々と先生が手を組めば、まさに鬼に金棒と言っていいだろう！"
10031005-88 = "誰も成し遂げられなかった――キヴォトス全土を手中に収めるという偉業も夢ではない！"
10031005-89 = "キキキッ！そこで先生に約束をしよう……"
10031005-90 = "我々が共にキヴォトスを手に入れた暁には……！"
10031005-91 = "このマコト様は、キヴォトスの半分を……"
10031005-92 = "半分、を……"
10031005-93 = "…………。"
10031005-94 = "……うーん。"
10031005-95 = "いや、勢いで半分と言ってしまったが、それはちょっと多すぎるような……#n口約束にしても、じっくり検討する必要が……"
10031005-96 = "そ、そうだ……！は、半分とまではいかないが、四捨五入で限りなく半分に近い面積をシャーレに譲ろうじゃないか！"
10031005-97 = "どうだ、先生よ！この偉大なマコト様の提案は！"
10031005-101 = "[ns] \"……えっ？\""
10031005-103 = "…………。"
10031005-105 = "よいしょ～っと！"
10031005-107 = "あはははっ！最初は勢いで半分譲ろうとしたのに、考え直しちゃうあたり……"
10031005-108 = "すっご～く、マコト先輩らしいね！イロハちゃん？"
10031005-109 = "……指摘するのも恥ずかしいので、あえてツッコまなかったんですよ。"
10031005-111 = "ええい！そこ、うるさいぞ！#n無駄なおしゃべりはやめるのだ！"
10031005-112 = "それでは先生、返事を……"
10031005-113 = "よいっ、しょ！えへへっ、マコト先輩～！#nイブキ、背中登りきったよ～！"
10031005-114 = "お～、よしよし！えらいぞ、イブキ！"
10031005-115 = "わあ～！話の最中にマコト先輩の背中を登りきったイブキちゃん！#n今日も可愛さ100万ボルトだね！"
10031005-116 = "[ruby=もとみや]元宮[/ruby]チアキ、万魔殿の書紀として、絶対に記録しておかなきゃ！"
10031005-117 = "はいは～い！イブキ～ついでにマコト先輩も～はいチーズ！"
10031005-118 = "チ～ズ～"
10031005-119 = "ククッ、チーズだ……！"
10031005-125 = "チアキ。その写真、後で私にもください。"
10031005-126 = "もちろんだよ～！"
10031005-127 = "キキキキッ。#nそれで[USERNAME]先生よ、返事を聞かせてもらいたいのだが。"
10031005-128 = "[s7] \"せっかく提案してくれたのに申し訳ないんだけど……\"\n[s8] \"ごめんね、断らせてもらうよ。\""
10031005-134 = "なん、だと……！？"
10031005-135 = "ど、どうしてだ……先生！#nこのマコト様の提案ほど魅力的なものは存在しないはずだが！"
10031005-136 = "何かやむを得ない事情でもあるのか？#nそれとも条件が気に入らな――"
10031005-137 = "あははっ！#nやっぱり、半分譲ろうって言いかけて変えたからじゃないですか？"
10031005-138 = "や、やはりそうか………！"
10031005-139 = "いや、それは違うと思いますが。"
10031005-140 = "しかし、イロハ！#nでなければ、一体なぜ……"
10031005-141 = "[s] \"シャーレの大掃除をするから忙しいんだ、ごめんね。\""
10031005-143 = "わあ～マコト先輩～！たか～い！"
10031005-144 = "……。"
10031005-145 = "…………。"
10031005-146 = "………………。"
10031005-147 = "では、仕方あるまい。"
10031005-148 = "予定があるのなら、無理にこちらの要求を押し付けるわけにはいかないな。#n今日のところは、大人しく引き下がるとしよう。"
10031005-149 = "え！？マコト先輩はあれで納得したんですか！？"
10031005-150 = "ん？何を言ってるんだ、イロハ。"
10031005-151 = "要求を一方的に押し付けるなど、ただの暴君ではないか。"
10031005-152 = "真のリーダーとは、相手の意志を尊重し、柔軟に対応するもの。"
10031005-153 = "……ただし、風紀委員会は除くがな！"
10031005-154 = "覚えておくといい、イロハ……キキッ。"
10031005-155 = "あ、はい……"
10031005-156 = "あははっ！マコト先輩らしいね～！#nみんなで記念に写真撮ろっか！"
10031005-166 = "はぁ……回りくどい言い方をしても意味が無いんじゃない？"
10031005-170 = "忘れているようだけど、シャーレの先生を味方にしたいのなら確実な方法があると思うのだけど？"
10031005-171 = "なっ、サツキ……まさか、お前……！"
10031005-172 = "ええ、そうよマコトちゃん。私のNKウルトラ計画の力を使えば……"
10031005-173 = "説得なんてしなくても、味方に引き入れられるわ！"
10031005-174 = "うふふっ！先生！これを見て頂戴！"
10031005-179 = "さあ……あなたは段々、万魔殿に忠誠を誓いたくなぁ～る。"
10031005-180 = "ついでに、近くに新しくできたスイーツ店でプリンを買ってきたくなぁ～る。"
10031005-184 = "[ns] \"え、うーん、そんな気持ちになってきたような……？\""
10031005-188 = "うふふ。ほら、効いてきたでしょう？"
10031005-189 = "サツキ先輩～イブキもやってみた～い！"
10031005-190 = "コインを持って～ふりふり～#n先生は毎日、たーくさんイブキと遊びたくな～る！"
10031005-191 = "あら。よくできたわね、イブキちゃん。"
10031005-192 = "将来はNKウルトラ計画を担うこと間違いなしだわ！"
10031005-193 = "ボーッとしてる場合じゃないわよ、チアキ！"
10031005-195 = "は～いっ！#n万魔殿の書記として、シャッターチャンスは逃しませんよ！"
10031005-209 = "……見ての通り、これが万魔殿の日常です。"
10031005-210 = "なんか……先生に見られると、恥ずかしくなってきますね。"
10031005-211 = "[s] \"そう？私は平和でいいと思ったよ。\""
10031005-212 = "平和、ですか。"
10031005-213 = "まあ、たしかに平和ではありますね……"
10031005-215 = "#video;10031"
