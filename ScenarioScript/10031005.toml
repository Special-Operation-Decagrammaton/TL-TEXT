10031005-58 = "Não, Makoto-senpai."
10031005-59 = "O sensei parece confuso justamente porque a senpai está falando o que quer."
10031005-60 = "Ora, Iroha. Você não entende nada."
10031005-61 = "Hihihi, olhe nos olhos do sensei. Aqueles são olhos de um líder.#nSó quem está acima dos outros possui esse olhar."
10031005-62 = "Você acha mesmo que alguém com esse olhar penetrante está apenas confuso?"
10031005-63 = "Eu, a líder do Pandemonium, Makoto-sama, consigo ver!#nA vontade escondida nesses olhos!"
10031005-64 = "……É o que ela diz, sensei."
