10031005-45 = "Então, sensei!#nVamos, diga a resposta diretamente da sua boca!"
10031005-46 = "……Ufa, pronto."
10031005-51 = "[ns5] \"A proposta da Makoto...?\"\n[ns6] (Recebi tantas mensagens que não faço ideia de qual assunto se trata...)"
10031005-54 = "Ah, parece que eu não fui muito atencioso."
10031005-55 = "Por mais que eu queira ouvir a resposta, pressionar logo de cara assim que nos encontramos seria falta de educação."
10031005-56 = "Você quer dizer que as coisas devem seguir uma ordem, não é?"
