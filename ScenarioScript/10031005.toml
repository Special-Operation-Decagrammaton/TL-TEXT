[translation]
10031005-1 = "Prólogo; O Encontro"
10031005-2 = "……Hehe, hehehe."
10031005-4 = "Pandemonium - Escritório"
10031005-6 = "Hehe, hihihi……"
10031005-10 = "Hihihihi! Seja bem-vindo! Sensei do Schale! Que bom que você veio!"
10031005-11 = "[s] \"Ah, sim. Me disseram que era um assunto importante, então...\""
10031005-15 = "[ns] \"Mas eu gostaria de saber por que fui chamado...\""
10031005-16 = "Hishishi. Ah, imagino que sim."
10031005-17 = "O sensei que recebeu um contato meu deve ter ficado preocupado esse tempo todo."
