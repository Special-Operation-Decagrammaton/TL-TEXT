10031005-24 = "É que o impacto da conversa de hoje será chocante e dramático!"
10031005-25 = "[s3] \"É mesmo...?\"\n[s4] \"Bem, eu não entendi muito bem o que você quer dizer...\""
10031005-28 = "Ah! Não há por que esconder!"
