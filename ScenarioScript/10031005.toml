10031005-69 = "Eu também entendo os sentimentos do sensei!"
10031005-70 = "Por isso, vou respeitar a etiqueta e os costumes..."
10031005-71 = "Vou fazer a proposta ao sensei novamente!"
10031005-72 = "Vamos lá, Sensei [USERNAME]……!"
10031005-76 = "Por que não se une a nós do Pandemonium... ou melhor, a mim, Makoto-sama!"
10031005-77 = "Heave... ho..."
10031005-83 = "[ns] \"...Se pensava que era sobre outra coisa, então era sobre isso.\""
10031005-84 = "Bem, eu imaginei que você não saberia do que se tratava."
10031005-85 = "Uau, uma parceria com o Schale! Formar uma dupla com o Sensei! Isso é ótimo! É perfeito!"
10031005-86 = "Hehe! Não preciso nem explicar o poder esmagador do Pandemonium agora!"
10031005-87 = "Se nós e o Sensei unirmos forças, seremos como um ogro com um bastão de ferro!"
10031005-88 = "O feito que ninguém conseguiu realizar — dominar todo o Kivotos — não é apenas um sonho!"
10031005-89 = "Kiki! Então, vamos fazer uma promessa ao Sensei..."
10031005-90 = "No dia em que conquistarmos Kivotos juntos...!"
10031005-91 = "Eu, a grande Makoto, darei metade de Kivotos..."
10031005-92 = "Metade, eu..."
10031005-93 = "............"
10031005-94 = "...Hmm."
10031005-95 = "Não, eu disse metade por impulso, mas isso parece um pouco demais... Mesmo sendo uma promessa verbal, preciso considerar com cuidado..."
10031005-96 = "I-isso mesmo...! Não chega a ser metade, mas que tal ceder ao Schale uma área que, arredondando, chega bem perto da metade?!"
10031005-97 = "O que me diz, Sensei! O que acha da proposta desta grande Makoto!"
10031005-101 = "[ns] \"...Hã?\""
10031005-103 = "............"
10031005-105 = "Heave-ho!"
10031005-107 = "Ahahaha! Ela começou querendo dar metade por impulso, mas agora está repensando..."
10031005-108 = "Isso é tããão a cara da veterana Makoto, né? Iroha-chan?"
10031005-109 = "...Eu nem comentei nada porque até eu fiquei com vergonha de apontar."
10031005-111 = "Ei! Vocês aí, silêncio! #nParem com essa conversa inútil!"
10031005-112 = "Então, Sensei, sua resposta..."
10031005-113 = "Heave... ho! Ehehe, veterana Makoto~! #nIbuki conseguiu subir nas suas costas!"
10031005-114 = "Oh, muito bem! Bom trabalho, Ibuki!"
10031005-115 = "Uau~! A Ibuki-chan conseguiu subir nas costas da veterana Makoto no meio da conversa! #nHoje ela está com 1 milhão de volts de fofura!"
10031005-116 = "Motomiya Chiaki, como secretária do Pandemonium, preciso registrar isso agora mesmo!"
10031005-117 = "Sim, sim! Ibuki~ e a veterana Makoto também~ digam X!"
10031005-118 = "X~"
10031005-119 = "Hehe, X...!"
10031005-125 = "Chiaki. Depois me mande essa foto."
10031005-126 = "Com certeza!"
10031005-127 = "Kikiki. #nEntão, Sensei [USERNAME], quero ouvir sua resposta."
10031005-128 = "[s7] \"Sinto muito, já que você se deu ao trabalho de propor...\"\n[s8] \"Desculpe, mas vou ter que recusar.\""
10031005-134 = "O que você disse...!?"
10031005-135 = "P-por que... Sensei! #nNão deveria existir nada mais atraente do que a proposta desta Makoto!"
10031005-136 = "Existe algum motivo inevitável? #nOu talvez você não tenha gostado das condições—"
10031005-137 = "Ahaha! #nNão é porque você começou dizendo que daria metade e depois mudou de ideia?"
10031005-138 = "S-será que é isso mesmo...!?"
10031005-139 = "Não, eu acho que não é por isso."
10031005-140 = "Mas, Iroha! #nSe não for isso, então por que..."
10031005-141 = "[s] \"Estou ocupado fazendo uma faxina geral no Schale, sinto muito.\""
10031005-143 = "Uau~ veterana Makoto~! Que alto~!"
10031005-144 = "..."
10031005-145 = "............"
10031005-146 = ".............."
10031005-147 = "Bem, não há o que fazer."
10031005-148 = "Se você tem planos, não posso forçar minhas exigências. #nPor hoje, vamos recuar pacificamente."
10031005-149 = "Hã!? A veterana Makoto se convenceu com isso!?"
10031005-150 = "Hm? Do que você está falando, Iroha."
10031005-151 = "Impor exigências unilateralmente não é coisa de um tirano?"
10031005-152 = "Um verdadeiro líder respeita a vontade dos outros e sabe ser flexível."
10031005-153 = "……Embora, o Comitê de Disciplina seja uma exceção!"
10031005-154 = "É bom que se lembre disso, Iroha…… Kiki."
10031005-155 = "Ah, sim……"
10031005-156 = "Ahaha! É bem a cara da Makoto-senpai! #nVamos tirar uma foto para comemorar!"
10031005-166 = "Haa…… Não acha que não adianta nada ficar dando voltas no assunto?"
10031005-170 = "Parece que você esqueceu, mas se quer ter o Sensei do Schale do seu lado, acho que existe um método infalível, não acha?"
10031005-171 = "O quê, Satsuki…… não me diga que você……!"
10031005-172 = "Isso mesmo, Makoto-chan. Se usarmos o poder do meu Plano NK Ultra……"
10031005-173 = "Não precisaremos nem convencer ele, ele virá para o nosso lado!"
10031005-174 = "Ufufu! Sensei! Dê uma olhada nisto!"
10031005-179 = "Vamos lá…… Você está começando a sentir vontade de jurar lealdade ao Pandemonium."
10031005-180 = "E, aproveitando, você está começando a sentir vontade de comprar pudim na doceria nova que abriu ali perto."
10031005-184 = "[ns] \"Eh, hum, acho que estou começando a me sentir assim mesmo……?\""
10031005-188 = "Ufufu. Viu só? Está fazendo efeito, não está?"
10031005-189 = "Satsuki-senpai~ A Ibuki também quer tentar!"
10031005-190 = "Segura a moeda e balança~ balança~ #nO Sensei vai querer brincar muito com a Ibuki todos os dias!"
10031005-191 = "Ora. Você fez muito bem, Ibuki-chan."
10031005-192 = "Com certeza você será a responsável pelo Plano NK Ultra no futuro!"
10031005-193 = "Não é hora de ficar aí parada, Chiaki!"
10031005-195 = "Sim, senhora! #nComo secretária do Pandemonium, não vou perder a chance de tirar essa foto!"
10031005-209 = "……Como pode ver, este é o dia a dia do Pandemonium."
