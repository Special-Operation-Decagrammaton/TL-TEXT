[translation]
1301203-1 = "Tiros e Zircônia"
1301203-2 = "Em frente à grande joalheria de Shiba Town"
1301203-3 = "BOOOOOM!!!"
1301203-5 = "Não se aproxime! Eu estou falando sério!!"
1301203-6 = "Você viu a explosão de agora, não viu? Se fizer qualquer movimento suspeito, vou explodir este prédio inteiro!"
1301203-7 = "Po-por favor, me ajude...!"
1301203-9 = "Entendo. Embora pareça desorganizado à primeira vista, você é muito cauteloso. Há bombas instaladas por toda parte. Provavelmente são do tipo que podem ser detonadas via rádio."
1301203-10 = "Se pensarmos apenas em salvar os reféns, poderíamos tentar uma invasão forçada, mas... se errarmos um passo, toda esta área pode ser reduzida a cinzas."
1301203-11 = "[s] \"Então, devemos esperar a chegada do negociador...?\""
1301203-12 = "...Não, o criminoso está com os nervos à flor da pele. Nesta situação, não sabemos quando a paciência dele vai acabar."
1301203-13 = "Deixe comigo. Pode não parecer, mas nunca perdi uma negociação por causa de donuts dentro do Departamento de Segurança Pública!"
1301203-18 = "[ns] \"Será que dá para comparar isso com um lanche...?\""
1301203-23 = "Ei, você aí! Pare com essa resistência inútil! Se se render pacificamente, garanto sua segurança!"
1301203-24 = "Hm, o negociador já chegou...? Isso foi rápido demais, não foi...?"
1301203-25 = "Identifique-se! É você o negociador!?"
1301203-26 = "Eu sou Kirino, do Departamento de Segurança Pública da Academia de Polícia Valkyrie!"
1301203-27 = "Vim aqui para negociar com você."
1301203-28 = "Departamento de Segurança Pública...? Não é o Departamento de Segurança ou o Departamento de Segurança Pública, mas sim o de Segurança da Vida, e você diz que é a negociadora...!?"
1301203-29 = "Não me faça rir, está tentando me fazer de idiota!? Traga alguém decente logo!"
1301203-30 = "Que, que falta de educação!? Pode não parecer, mas sou um membro legítimo da Academia de Polícia Valkyrie, sabia? Por favor, escute o que tenho a dizer!"
1301203-31 = "Droga, por que uma insignificante do Departamento de Segurança Pública..."
1301203-32 = "Não tem jeito... não tenho tempo, você serve. Mas se tentar qualquer gracinha, vou ativar o detonador imediatamente e explodir tudo aqui!"
1301203-33 = "Sim, conto com sua cooperação! ...Muito bem, agora é só seguir o manual de negociação..."
1301203-34 = "Bem... primeiramente, por que você cometeu esse crime?"
1301203-35 = "Isso é óbvio, é pelo dinheiro!"
1301203-36 = "Gastei demais no café de gatos na semana passada...!"
1301203-37 = "Dei tanta erva-de-gato e catnip para a gatinha tricolor nova que acabou até o dinheiro da minha comida desta semana..."
1301203-38 = "Se eu tivesse dinheiro, não estaria fazendo isso!"
1301203-39 = "Bem... mas isso não é culpa sua...?"
1301203-41 = "Hã!?"
1301203-42 = "V-você é idiota!? Por que está provocando o criminoso!?"
1301203-43 = "Mas ninguém te forçou a gastar o dinheiro, nem roubaram você, certo?"
1301203-44 = "Se você tivesse planejado seus gastos e controlado as despesas, talvez não tivesse chegado a esse ponto, não acha?"
1301203-45 = "I-isso é verdade, mas..."
1301203-46 = "Não é disso que estamos falando agora!? Mesmo que seja um argumento lógico, não se deve provocar o criminoso em uma situação dessas!! É o básico da negociação!!"
1301203-47 = "Pare com esse soco de lógica! É por isso que gente como você..."
1301203-49 = "Entendo... aprendi muito, obrigada!"
1301203-50 = "[s] \"Ela está aprendendo técnicas de negociação com um criminoso...\""
1301203-51 = "Bem, então o próximo passo... entendi, \"confirmar as exigências do criminoso\", é isso."
1301203-52 = "Minha próxima pergunta é: quais são suas exigências? Por que você tomou reféns e se barricou aqui?"
1301203-53 = "Que bom que perguntou! Minhas exigências são: o dinheiro equivalente aos diamantes que estão aqui, um carro esportivo para fugir, e..."
1301203-54 = "Uma montanha de \"erva-de-gato\"! Exijo tudo isso!"
1301203-55 = "Acho que isso não é uma boa ideia."
1301203-56 = "O quê, por que não!? Você quer que todos os diamantes aqui sejam queimados!?"
1301203-57 = "Não, não é isso, é que o trânsito está congestionado agora. Além disso, a estrutura desta área dificulta a passagem de carros esportivos, então acho difícil fugir com um."
1301203-58 = "E também, o que você tem nas mãos não são diamantes, mas sim zircônia bem barata... entendo que queira trocar por joias, mas seria melhor especificar um valor mais claro."
1301203-59 = "Provavelmente, o carro esportivo custa muito mais caro, sabia?"
1301203-61 = "O quê, hã...!? Droga, droga! Por que nada dá certo nessa porcaria!?"
1301203-66 = "MIAAAAAAAU!!!"
1301203-67 = "Aaaah!?"
1301203-69 = "Droga, estou em pânico! Preciso resolver isso logo...!"
1301203-70 = "[s] \"Acho que é quase tudo culpa da Kirino, mas...\""
1301203-71 = "I-Isso não é verdade! Mesmo que eu tenha feito algo errado, aquele criminoso ali é muito, muito pior!"
1301203-72 = "Se chegamos a esse ponto... não tenho escolha a não ser tomar o detonador antes que ele ative a bomba!"
1301203-73 = "Vou mirar na mão do criminoso... e atirar! Hah!"
1301203-84 = "Argh!?"
1301203-85 = "O quê...!? Em vez de mim, ele atirou no refém!?"
1301203-87 = "Ugh... errei de novo..."
1301203-88 = "Desta vez eu consigo...!"
1301203-98 = "Guaaah!?"
1301203-99 = "P-Por que...!? E-Eu sou o refém, sabia!?"
1301203-100 = "Q-Que tipo de situação é essa...!?"
1301203-101 = "(O que é esse cara!? Primeiro ele me provoca, e agora atira no refém!?)"
1301203-102 = "(Normalmente, nessa situação, a pessoa nem conseguiria atirar por medo de ferir o refém...!)"
1301203-103 = "(Será que isso é... uma demonstração de que ele não pretende ceder nas negociações, não importa o que aconteça com o refém!?)"
1301203-106 = "(Agora que penso nisso, já ouvi falar... que existe um \"cão raivoso\" na Academia de Polícia Valkyrie que persegue criminosos incansavelmente, sem se importar nem um pouco com a segurança dos reféns...)"
1301203-107 = "(Não pode ser... será que ele é esse \"cão raivoso\"!?)"
1301203-108 = "(Se for esse o caso, não dá...! Até agora ele estava só brincando e pegando leve. Se ele começar a levar a sério, vou acabar em uma situação muito pior!)"
1301203-110 = "E-Eu entendi...!"
1301203-111 = "Eu desisto do refém e das joias, de tudo... só poupe a minha vida!"
1301203-113 = "...? De repente, ele soltou o refém..."
1301203-114 = "Ele até jogou o detonador fora... será que houve alguma mudança de coração?"
1301203-116 = "Isso é... entendo, parece que meus sentimentos alcançaram o criminoso e ele abriu o coração!"
1301203-117 = "[s1] \"Talvez... seja isso?\"\n[s2] \"Bem, o importante é que tudo terminou bem...\""
1301203-118 = "Não importa o tipo de criminoso, se você conversar com sinceridade, eles acabam entendendo..."
1301203-119 = "Não importa o tipo de criminoso, se você conversar com sinceridade, eles acabam entendendo..."
1301203-120 = "Em suma, é a vitória da justiça!"
1301203-122 = "Depois disso, os negociadores profissionais e os alunos do Departamento de Segurança chegaram atrasados e prenderam o criminoso, resolvendo o caso de vez."
1301203-123 = "...Parece que a Kirino teve que escrever um relatório de desculpas por ter ferido o refém."
