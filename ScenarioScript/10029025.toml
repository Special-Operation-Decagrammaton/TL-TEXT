[translation]
10029025-2 = "……Entendi."
10029025-3 = "É bem a cara da Misaka, ou melhor, ela é estranhamente honesta em momentos inoportunos..."
10029025-4 = "Mas eu ainda não fiz nada, sabia?"
10029025-5 = "……A Misaka parece não gostar de mim. #nEla está sempre na defensiva comigo."
10029025-9 = "[ns1] \"……Misaka, essa garota é a Shokuhou?\"\n[ns2] \"Parece um pouco diferente do que me contaram…….\""
10029025-12 = "……Hã?"
10029025-13 = "Quer dizer, não, não! Espera um pouco! #nDesse jeito parece que eu estou mentindo!"
10029025-14 = "Por que você está se fazendo de santa, Shokuhou?!"
10029025-16 = "Ora, ora? #nÉ por isso que você sempre acaba se metendo em problemas, por perder a calma tão rápido☆"
10029025-17 = "Dizer coisas que nem aconteceram quando a pessoa não está por perto..."
10029025-18 = "E além disso, revelar suas habilidades antes mesmo de saber se alguém é inimigo ou não..."
10029025-19 = "Ah, será que foi um erro ter ficado em alerta com você? #nEu nunca imaginei que você fosse tão simples assim."
10029025-20 = "Eu estou ouvindo tudo, sabia?!"
10029025-21 = "……Ué?"
10029025-22 = "Por que a minha habilidade..."
10029025-23 = "[s3] \"Você está bem?\"\n[s4] \"Parece que você não está se sentindo bem…….\""
10029025-26 = "Sim, estou bem... é só uma leve tontura."
10029025-27 = "É que, como posso dizer... desde que cheguei aqui, não consigo me concentrar direito. #nSe eu não tentar usar minhas habilidades, não sinto nada."
10029025-28 = "Bem, se eu quiser, até consigo usar, é só uma indisposição passageira."
10029025-29 = "……Ah."
10029025-30 = "Isso significa que... Shokuhou, será que você também...!"
10029025-31 = "E-eu já disse, por que você tem que falar informações tão importantes na frente dos outros?"
10029025-32 = "Não me envolva nisso, quer? #nEu estava tentando ficar quieta sobre isso."
10029025-33 = "De qualquer jeito, somos estranhas aqui, não somos? #nVocê deveria ser um pouco mais cautelosa. Não acha, Misaka?"
10029025-34 = "[s5] \"Vocês duas são amigas?\"\n[s6] \"Vocês se dão bem, né?\""
10029025-38 = "「Não somos!」 #n「Claro que não!」"
10029025-39 = "[s] \"……D-desculpe.\""
10029025-41 = "……Ah."
10029025-42 = "Então? #nO motivo de todos terem vindo até mim é para me entregar esse tal de \"senso comum\", não é?"
10029025-43 = "Devo te chamar de... Sensei?"
10029025-44 = "[s7] Entregar a arma recebida do Clube de Engenharia.\n[s8] \"Sim, vim te entregar isso.\""
10029025-47 = "Hmm..."
10029025-52 = "……É leve. #nMas a construção parece bem feita."
10029025-53 = "Diferente da Misaka, eu não sou do tipo que carrega essas coisas por aí, mas... #naqui, seria estranho não ter uma, né?"
10029025-54 = "Acho que devo agradecer. #nDesculpe, eu não sou muito de ser simpática."
10029025-55 = "Mas, quando for necessário, eu vou colaborar direitinho, então pode ficar tranquilo quanto a isso."
10029025-56 = "……Você está sendo estranhamente honesta para o seu padrão."
10029025-57 = "Por culpa de quem será que as coisas ficaram assim...?"
10029025-58 = "……Chegou a um ponto em que começo a achar que você está fazendo isso de propósito."
10029025-59 = "Você está querendo dizer que a culpa é minha?!"
10029025-61 = "De qualquer forma, é mais eficiente cooperar agora. #nDeixem a briga para depois."
10029025-62 = "Agora vamos atrás da outra pessoa..."
10029025-66 = "……Ué."
10029025-71 = "[ns9] \"……Eimi?\"\n[ns10] \"Mensagem da Himari?\""
10029025-74 = "Sim, ela disse que a análise da \"instalação\" terminou."
10029025-75 = "Então, vamos voltar."
10029025-76 = "……E parece que a última pessoa está com a presidente."
