[translation]
10029025-2 = "……そうだったのねぇ。"
10029025-3 = "御坂さんらしいというか、妙なところで素直よね……"
10029025-4 = "でも私、[ruby=・   ・]まだ[/ruby]何もしてないんですけどぉ？"
10029025-5 = "……[ruby=みさか]御坂[/ruby]さん、私のこと嫌いみたいでぇ。#nいっつもピリピリしてるんですよぉ。"
10029025-9 = "[ns1] \"……御坂、この子[ruby=しょくほう]が食蜂？[/ruby]\"\n[ns2] \"聞いてた話とちょっと違うような……。\""
10029025-12 = "……えっ？"
10029025-13 = "って、いやいや！ちょっと待って！#nこれじゃ私が嘘ついてるみたいじゃない！"
10029025-14 = "なに猫被ってんのよ、食蜂！"
10029025-16 = "あらあら？#nそうやってすぐ声を荒らげるから、トラブルに巻き込まれてるんだゾ☆"
10029025-17 = "本人がいないところで、ありもしないことを言うなんてねぇ。"
10029025-18 = "しかもぉ、敵かどうか見極める前に能力を教えるなんて……"
10029025-19 = "はぁ、あなたを警戒してたのが間違いだったかしら？#nここまで単純だったなんて、思いもしなかったわぁ。"
10029025-20 = "全部、聞こえてるわよっ！"
10029025-21 = "……あれ？"
10029025-22 = "どうして、能力が……"
10029025-23 = "[s3] \"大丈夫？\"\n[s4] \"具合が悪そうだけど……。\""
10029025-26 = "ええ、大丈夫よ……ちょっと、めまいがね。"
10029025-27 = "ただ、なんて言うか……こっちに来てから、うまく集中できなくて。#n能力を使おうとしなければ、何ともないんだけど。"
10029025-28 = "まあ、やろうと思えばできなくもないし、ちょっと調子が悪い程度よ。"
10029025-29 = "……あ。"
10029025-30 = "ということは……食蜂、もしかしてアンタも……！"
10029025-31 = "だ～か～らぁ～、どうしてそういう重要な情報を他人の前で話しちゃうのかしらぁ？"
10029025-32 = "私まで巻き込まないでくれる？#nせっかく人が黙ってたっていうのに。"
10029025-33 = "どう見ても、私たちは[ruby=よそ]他所[/ruby]の人でしょう。#n少しは警戒したらどうかしら。ねぇ、御坂さん？"
10029025-34 = "[s5] \"2人は友達なの？\"\n[s6] \"仲良しなんだね。\""
10029025-38 = "「違うから！」#n「違うわよぉ！？」"
10029025-39 = "[s] \"……ご、ごめん。\""
10029025-41 = "……はぁ。"
10029025-42 = "それでぇ？#nみんなして私のところに来た理由は、その「常識」とやらを渡すためなのよねぇ。"
10029025-43 = "あなたのことは……先生、と呼べば良いのかしらぁ？"
10029025-44 = "[s7] エンジニア部からもらった銃を渡す。\n[s8] \"うん、これを渡しに来たんだ。\""
10029025-47 = "ふぅ～ん……"
10029025-52 = "……軽いわねぇ。#nでも、作りはちゃんとしてる。"
10029025-53 = "御坂さんと違って、私はこういうの持ち歩くタイプじゃないけどぉ……#nここでは持ってない方が不自然なのよねぇ？"
10029025-54 = "一応、お礼は言っておこうかしら。#nごめんなさいねぇ。私、そんなに愛想力が高くないのよ。"
10029025-55 = "けどぉ、必要な時はちゃ～んと協力するから、そこは安心してもらって構わないわぁ。"
10029025-56 = "……アンタにしては、やけに素直じゃないの。"
10029025-57 = "誰のせいで、こうなったのかしらぁ……？"
10029025-58 = "……ここまで来ると、わざとやってるんじゃないかって思えてきたわねぇ。"
10029025-59 = "私のせいだって言いたいの！？"
10029025-61 = "どちらにせよ、今は協力した方が効率がいい。#nケンカは後で。"
10029025-62 = "次は、もう1人のところに……"
10029025-66 = "……あれ。"
10029025-71 = "[ns9] \"……エイミ？\"\n[ns10] \"ヒマリから連絡？\""
10029025-74 = "うん、「施設」の解析が終わったって。"
10029025-75 = "じゃあ、戻ろっか。"
10029025-76 = "……それと最後の1人は、部長と一緒にいるみたい。"
