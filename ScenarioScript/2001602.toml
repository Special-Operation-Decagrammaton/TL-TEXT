[translation]
2001602-1 = "A Fräulein se aproxima"
2001602-2 = "(Uma tarde calma e ensolarada)"
2001602-3 = "(O trabalho manual terminou e, pela primeira vez em muito tempo, um momento de tranquilidade surgiu)"
2001602-4 = "[ns] \"É raro ter um tempo tão livre assim...\""
2001602-10 = "Com licença."
2001602-11 = "[s1] \"Eu sabia.\"\n[s2] \"Iroha, o que houve de repente...?\""
2001602-12 = "Não, não é nada importante."
2001602-13 = "Não, não é nada importante."
2001602-14 = "Ouvi dizer que você estava no Schale, então só vim visitar."
2001602-15 = "É uma missão do Pandemonium, ou melhor... me disseram para atrair o Schale, ou seja, você, Sensei."
2001602-16 = "Disseram que não importa se for por ameaça, persuasão, reféns ou até mesmo sedução,"
2001602-17 = "que eu deveria dar um jeito de trazer você para o nosso lado."
2001602-18 = "Foi por isso que vim aqui, mas tem mais alguma pergunta além disso?"
2001602-19 = "[s] \"...Você pode simplesmente contar tudo isso para a outra pessoa?\""
2001602-20 = "............"
2001602-21 = "Você é uma pessoa problemática, sabia..."
2001602-22 = "[s] \"Eu que sou o problema aqui!?\""
2001602-23 = "Não, é que esse tipo de coisa é muito trabalhoso..."
2001602-24 = "Bem, eu poderia explicar o motivo, se quiser..."
2001602-25 = "Para ser sincera, achei que não faria sentido tentar cercar por fora ou criar estratégias para sondar a situação."
2001602-26 = "Com base nas informações que o Pandemonium possui, eu já sabia que o Sensei não é o tipo de pessoa que se deixa enganar facilmente por esses métodos."
2001602-27 = "Então, em vez de fazer algo assim, achei que seria melhor ser direta desde o início..."
2001602-28 = "Assim não ganho sua \"hostilidade\" e, bem, acho que não há prejuízo nisso."
2001602-29 = "Além disso, é trabalhoso demais."
2001602-30 = "[s] \"Então esse é o seu verdadeiro motivo...\""
2001602-31 = "E também, você não gostaria que alguém que esconde suas verdadeiras intenções se aproximasse de você, certo?"
2001602-32 = "É uma questão de calcular esses riscos, ou melhor, é sempre melhor ser honesta..."
2001602-33 = "[s] \"Bom, sobre isso, mesmo que a Iroha escondesse algo, eu provavelmente não me importaria...\""
2001602-34 = "...?"
2001602-35 = "...O que você quer dizer com isso?"
2001602-36 = "Se alguém se aproximasse de você apenas sorrindo superficialmente, você não acharia estranho? Não pensaria que está sendo usado?"
2001602-37 = "Esse tipo de método estilo Trinity não é assustador?"
2001602-38 = "[s3] \"Pelo menos tente ser mais sutil!\"\n[s4] \"Bem, nesses casos, deve haver algum motivo por trás...\""
2001602-39 = "...Eu já sabia disso pela investigação, mas você é realmente esse tipo de pessoa."
2001602-40 = "...Eu já sabia disso pela investigação, mas você é realmente esse tipo de pessoa."
2001602-41 = "Bem, se o Sensei diz isso, então não importa muito..."
2001602-42 = "Então, vamos tentar pedir de forma direta mais uma vez?"
2001602-43 = "Sensei, por favor, empreste o poder do Schale para nós, do Pandemonium."
2001602-44 = "Não precisa ser algo total, pode ser apenas uma colaboração ou suporte."
2001602-45 = "Claro, prometo uma recompensa adequada."
2001602-46 = "Eles até disseram algo como: \"Quando conquistarmos Kivotos, te daremos metade dela!\"..."
2001602-47 = "Bem, não confie muito nisso. Esse tipo de coisa costuma ser bem exagerado."
2001602-48 = "Pense como: \"Não chega a ser metade, mas subjetivamente parece metade\". É como dividir um sorvete."
2001602-49 = "Sendo assim, o que me diz?"
2001602-50 = "[s] \"Eu recuso...\""
2001602-51 = "Entendo, compreendido."
2001602-52 = "[s] \"...?\""
2001602-57 = "[ns] \"Iroha, por que você de repente foi para o sofá...\""
2001602-58 = "Espere um pouco, estou procurando a melhor posição."
2001602-62 = "...Pronto, assim está bom."
2001602-67 = "[ns5] \"Começou a ler!\"\n[ns6] \"Não estou acompanhando o desenrolar!\""
2001602-68 = "Ah, falando nisso..."
2001602-69 = "Ah, falando nisso..."
2001602-73 = "[ns] \"Falando nisso...?\""
2001602-74 = "Schale também deve ter café, certo? Um expresso quente, por favor."
2001602-75 = "Bem, vou voltar para a minha leitura."
2001602-79 = "[ns] \"...Hã?\""
2001602-83 = "(E assim, com Iroha tendo invadido o Schale de repente e começado a relaxar ao meu lado, acabei passando o resto do tempo com uma estranha sensação de tensão)"
