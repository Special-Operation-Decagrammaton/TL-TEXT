[translation]
2001602-1 = "襲来するフロイライン "
2001602-2 = "（日差しの暖かい、穏やかな昼下がり）"
2001602-3 = "（手元の仕事もひと段落し、久しぶりにのんびりとした時間が訪れていた）"
2001602-4 = "[ns] \"こんなに何も無い時間なんて珍し――\""
2001602-10 = "失礼します。"
2001602-11 = "[s1] \"ですよね。\"\n[s2] \"イロハ、急にどうしたの……？\""
2001602-12 = "いえ、大したことではありません。"
2001602-13 = "いえ、大したことではありません。"
2001602-14 = "シャーレにいると聞いたので、それで伺っただけです。"
2001602-15 = "万魔殿から任務と言いますか、シャーレ……すなわち先生をおびき寄せろ、とのことでして。"
2001602-16 = "脅迫でも懐柔でも人質でも、或いは誘惑でも何でも良いから、"
2001602-17 = "どうにかして味方に付けろと言われました。"
2001602-18 = "それでここに来たわけですが、これ以外に何か質問は？"
2001602-19 = "[s] \"……そういうのって、相手に全部言っちゃって良いの？\""
2001602-20 = "…………。"
2001602-21 = "めんどくさい人ですね……。"
2001602-22 = "[s] \"私が悪いのかなこれ！？\""
2001602-23 = "いや、だってめんどくさいじゃないですかこういうの……。"
2001602-24 = "まあ別に、それについて説明しても良いのですが……。"
2001602-25 = "言ってしまえば単に、外堀から埋めようとしたり、策略を練って様子を伺ったりしても意味が無さそうだなと思っただけです。"
2001602-26 = "万魔殿で把握している情報からすると、そもそも先生がそういった手段に騙されにくいことは分かっていましたし。"
2001602-27 = "なのでそんなことをするくらいだったら、最初から全部堂々と言ってしまえば……"
2001602-28 = "「敵意」を買うことにはなりませんし、まあその方が損は無いでしょうと思ったんです。"
2001602-29 = "あとめんどくさいですし。"
2001602-30 = "[s] \"それが本音なんだね……。\""
2001602-31 = "それに、自分の本心を隠している人に近づかれたくはないでしょう？"
2001602-32 = "そういうリスクも計算してと言いますか、できるだけ本音を言うに越したことは――"
2001602-33 = "[s] \"その辺はまあ、もしイロハが何か隠してても多分気にしないけど……。\""
2001602-34 = "……？"
2001602-35 = "……どういうことですか？"
2001602-36 = "もし表面上だけニコニコして近づく存在がいたら、普通嫌じゃないですか？自分が利用されそうだなと思いませんか？"
2001602-37 = "そんなトリニティみたいなやり方、気味悪くありません？"
2001602-38 = "[s3] \"せめてもう少しオブラートに！\"\n[s4] \"まあそういう時は、それなりの事情があるんだろうから……。\""
2001602-39 = "……調査で予め知ってはいましたが、こういう方でしたか。"
2001602-40 = "……調査で予め知ってはいましたが、こういう方でしたか。"
2001602-41 = "まあ先生がそう仰るのであれば、その辺については何でも良いのですが……。"
2001602-42 = "ではあらためて、一度真正面からお願いしてみましょうか？"
2001602-43 = "先生、シャーレのお力を私たち万魔殿にお貸しください。"
2001602-44 = "全面的にという形でなくても、協業やサポートという形でも構いません。"
2001602-45 = "もちろん、十分な報酬はお約束いたしましょう。"
2001602-46 = "「キヴォトスを制圧した暁には、このキヴォトスの半分をくれてやろう！」……みたいなことも言ってましたので。"
2001602-47 = "まあ、この辺はあんまり信頼しないでください。こういうのは凡そにして強調されまくってるものなので。"
2001602-48 = "「半分には及ばないもののまあ主観的には半分くらい」だと思っててください。アイスの配分のようなものです。"
2001602-49 = "というわけで、いかがでしょうか？"
2001602-50 = "[s] \"お断りします……。\""
2001602-51 = "そうでしたか、了解です。"
2001602-52 = "[s] \"……？\""
2001602-57 = "[ns] \"イロハ、どうして急にソファに……。\""
2001602-58 = "少々お待ちを、ベストポジションを探してますので。"
2001602-62 = "……はい、こんな感じですね。"
2001602-67 = "[ns5] \"読書始めちゃった！\"\n[ns6] \"展開についていけない！\""
2001602-68 = "あ、そういえば……。"
2001602-69 = "あ、そういえば……。"
2001602-73 = "[ns] \"そういえば……？\""
2001602-74 = "シャーレにもコーヒーぐらいはありますよね？温かいエスプレッソでお願いします。"
2001602-75 = "では、私は読書に戻るので。"
2001602-79 = "[ns] \"……えぇ？\""
2001602-83 = "（そうして突如としてシャーレに襲来して寛ぎ始めたイロハを横に、変な緊張感を持ったまま過ごすことになった）"
