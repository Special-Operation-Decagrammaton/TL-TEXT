[translation]
2004608-1 = "天と地と、世の調和"
2004608-3 = "先生。"
2004608-4 = "必ず来てくださると思っていました。"
2004608-5 = " [ruby=私たち]百鬼夜行[/ruby]のもとへ。"
2004608-6 = "[s] \"今度は何を企んでいるの？\""
2004608-7 = "企む？いえ、もう一歩先です。#n力を持ち、機会が訪れたなら、それを使うのは当然でしょう？"
2004608-8 = "あまり風情の無い言い回しですが――"
2004608-9 = "――天下取りに参ります。"
2004608-13 = "ああ、またその顔。信じていない時の――いつもの顔です。とはいえ……こと[ruby=このとき]此時[/ruby]だけは、実に望ましい反応ともいえます。"
2004608-14 = "「陰陽部には百鬼夜行を動かす力などない」とか。"
2004608-15 = "「そもそも実権すらない」とか。"
2004608-16 = "あのゲヘナの風紀委員会ですら、そう信じきっていますから。"
2004608-17 = "でもこの噂、どこから始まったんでしょうね？#n誰が最初に流したか……気になりません？"
2004608-18 = "答えは――私ですよ。"
2004608-23 = "もし相手が得物を隠していたら……まぁ当然警戒しますよね。"
2004608-24 = "裏を返せば、一の得物を見せておくことで、二の得物を懐深くに隠せるというわけです。"
2004608-25 = "おかげで誰一人――あのシャーレの先生ですら気づかない間に、力を蓄えることができました。"
2004608-26 = "今や真なる意味で「百鬼夜行連合学院」となった私たち。もはや誰が立ちふさがろうとも、[ruby=百鬼夜行]鬼の行進[/ruby]を阻むことなどできないのです。"
2004608-39 = "お互いの足を引っ張り合うゲヘナとトリニティ？#n個人主義のミレニアム？"
2004608-46 = "黒き龍は波風を恐れ扉を閉ざし、赤き熊は烏合の衆。"
2004608-47 = "ヴァルキューレなんぞ、語る価値すらありませんね。"
2004608-52 = "私たちに比肩しうるのは、もはや連邦生徒会……より厳密に言えば――"
2004608-56 = "シャーレの[USERNAME]先生だけ。"
2004608-57 = "[ns] \"ニヤ……。\""
2004608-58 = "先生の怖い顔は色々見てきたつもりですが……まだその奥があったとは。"
2004608-59 = "どうかご安心ください。先生と刃を交えるつもりは毛頭ありません。#n戦って勝つのは下策、戦わずして勝つのが上策ですから。"
2004608-60 = "それに、先生の力はもう十分に存じております。わざわざ対立するなんて、勿体ない話です。"
2004608-61 = "月並みですが……どうです？我々と手を組むというのは。"
2004608-62 = "[ns1] \"ニヤ、本気なの？\"\n[ns2] \"冗談は、ここまでだよ？\""
2004608-65 = "……お説教ですか？この期に及んでまだそんなことを？"
2004608-66 = "どうやらまだ、状況を呑み込めていないようですね？"
2004608-70 = "もはや生徒と先生という枠には収まりません。"
2004608-71 = "対等なパートナーになるか……敵になるか。"
2004608-72 = "そして、先生の返答次第では――"
2004608-73 = "私は迷わずこの引き金を引きます。#n……これで少しは状況を理解していただけましたか？"
2004608-74 = "[s3] \"ニヤは私の生徒で、\"\n[s4] \"私はニヤの先生だよ。\""
2004608-80 = "[ns5] \"そして生徒が道を踏み外したなら、\"\n[ns6] \"正すのが先生の役目だ。\""
2004608-83 = "[ruby=・   ・]先生[/ruby]はブレませんねぇ……。"
2004608-89 = "はぁ～……なんだか拍子抜けしてしまいますね～"
2004608-94 = "……サプラーイズ！"
2004608-95 = "ちょ～っとシリアスモードのニヤさん、楽しんでいただけましたか～？#nにゃはっ♪"
2004608-99 = "……なんて、まぁこんなんで誤魔化すものでもないですね。"
2004608-100 = "これ以上ややこしくなる前に……今までのは全部ウソ、フェイクです。"
2004608-101 = "そもそも戦争なんてしても、得るものがありませんからね。"
2004608-102 = "百鬼夜行の主な収益源は観光業。平和が一番です。"
2004608-103 = "ではなぜこんなことをしたのか……。"
2004608-104 = "簡単なことですよ。百鬼夜行の本質を、先生に知ってもらうためです。"
2004608-105 = "なんだかんだと、先生は律儀で、お優しい方ですから。"
2004608-106 = "幸い、これまでの私はじゃれついていただけですけど。"
2004608-107 = "でも、もし私が先生を利用しようとしていたら？#n話がまったく違っていたかも知れませんよね？"
2004608-108 = "[s] \"そんなことをする気はないでしょ？\""
2004608-109 = "でも、これは「仮定の話」ですし……。"
2004608-110 = "明日ありと思う心[ruby=あだざくら]の仇桜―[/ruby]―"
2004608-111 = "百鬼夜行連合学院が、明日も同じであるとは限らないでしょう？"
2004608-112 = "[s7] \"ニヤがいればそうはならない。\"\n[s8] \"ニヤはその道を進まない。\""
2004608-115 = "ですから、これは仮定の話で……。"
2004608-116 = "はぁ……実際その気になれば、陰陽部には見た目以上の力があります。"
2004608-117 = "キヴォトス全体に影響を与えられるかはともかく、百鬼夜行連合学院の掌握くらいなら、あるいは。"
2004608-118 = "可能か不可能かで言えば、可能である。それが一番の問題なんですよ。"
2004608-119 = "[s9] \"ニヤがいればそうはならない。\"\n[s10] \"だって、ニヤは百鬼夜行が好きだからね。\""
2004608-122 = "にゃは……？"
2004608-123 = " [ruby=・   ・   ・   ・   ・]好きだから[/ruby]、百鬼夜行を守る……と？"
2004608-124 = "そもそも仮定そのものが間違ってる……？"
2004608-125 = "……。"
2004608-126 = "にゃはははっ！"
2004608-127 = "は～まったくですねぇ。"
2004608-128 = "いえ、いえ、もうよく分かりました。"
2004608-129 = "これからは、もう少し自分を信じてみようと思います。そして先生のことも。"
2004608-130 = "はぁ……なんともお恥ずかしい。#nこんな夜遅くに、自分を――先生を試すようなことをして。"
2004608-131 = "陰陽の調和だの、バランスだのと難しいことを言いながら……#nご覧の通り私は大きく「陰」に偏った存在ですから。"
2004608-132 = "「にゃはは～」なんて普段は笑ってますけど、「陽」の力を持つ後輩や友達が周りにいるおかげで、どうにかバランスを保っているだけなんです。"
2004608-133 = "先生がいてくだされば、より盤石になるのかな～なんて。"
2004608-134 = "陰陽部は――百鬼夜行連合学院は、いつでも先生を歓迎しますよ♪"
2004608-135 = "[s11] \"先生はいつだって生徒の味方だから。\"\n[s12] \"調和とかバランスとか、難しいのは苦手で……。\""
2004608-138 = "にゃははっ！叶いませんねぇ……私は百鬼夜行の調和を取るだけでも大変だというのに。"
2004608-139 = "どうか先生はそのままでいてください。#n――キヴォトスの先生♪"
