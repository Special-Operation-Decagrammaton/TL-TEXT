[translation]
2004608-1 = "O céu, a terra e a harmonia do mundo."
2004608-3 = "Sensei."
2004608-4 = "Eu sabia que você viria."
2004608-5 = "Até nós, de Hyakkiyako."
2004608-6 = "[s] \"O que você está planejando desta vez?\""
2004608-7 = "Planejando? Não, é um passo além disso. Se você tem poder e a oportunidade surge, é natural usá-la, não é?"
2004608-8 = "É uma forma de dizer um tanto desprovida de elegância, mas..."
2004608-9 = "— Estou aqui para conquistar o mundo."
2004608-13 = "Ah, essa cara de novo. A cara que você faz quando não acredita em mim... a de sempre. Dito isso... apenas neste momento, pode-se dizer que é uma reação muito desejável."
2004608-14 = "Coisas como \"O Comitê Yin-Yang não tem poder para mover Hyakkiyako\"."
2004608-15 = "Ou \"Eles nem sequer têm autoridade real para começar\"."
2004608-16 = "Até mesmo o Comitê Disciplinar de Gehenna acredita piamente nisso."
2004608-17 = "Mas de onde será que esse boato começou? Não sente curiosidade sobre quem o espalhou primeiro?"
2004608-18 = "A resposta é... fui eu."
2004608-23 = "Se o seu oponente estiver escondendo uma arma... bem, é natural ficar em alerta, não é?"
2004608-24 = "Por outro lado, ao mostrar uma arma, você pode esconder a verdadeira nas profundezas do seu manto."
2004608-25 = "Graças a isso, consegui acumular poder sem que ninguém — nem mesmo o Sensei do Schale — percebesse."
2004608-26 = "Agora, nós nos tornamos a verdadeira \"Academia Hyakkiyako\". Não importa quem tente nos impedir, ninguém será capaz de deter a marcha dos demônios."
2004608-39 = "Gehenna e Trinity, que vivem puxando o tapete uma da outra? Ou Millennium, com seu individualismo?"
2004608-46 = "O dragão negro teme as ondas e fecha suas portas, e o urso vermelho é apenas uma multidão desorganizada."
2004608-47 = "Valkyrie nem merece ser mencionada."
2004608-52 = "Os únicos que podem se comparar a nós agora são o Conselho Estudantil Geral... ou, para ser mais precisa —"
2004608-56 = "Apenas o Sensei [USERNAME] do Schale."
2004608-57 = "[ns] \"Hehe...\""
2004608-58 = "Acho que já vi muitas expressões assustadoras suas, Sensei... mas não imaginava que havia algo ainda mais profundo."
2004608-59 = "Por favor, fique tranquilo. Não tenho a menor intenção de cruzar lâminas com você. Lutar e vencer é uma estratégia inferior; vencer sem lutar é a estratégia suprema."
2004608-60 = "Além disso, já conheço bem o seu poder. Seria um desperdício nos tornarmos inimigos."
2004608-61 = "Pode parecer clichê, mas... que tal? Que tal unir forças conosco?"
2004608-62 = "[ns1] \"Hehe, você está falando sério?\"\n[ns2] \"Chega de brincadeiras, certo?\""
2004608-65 = "...Isso é um sermão? Mesmo nesta situação, você ainda vai me dizer isso?"
2004608-66 = "Parece que você ainda não entendeu a situação, não é?"
2004608-70 = "Já não estamos mais limitados ao papel de aluno e sensei."
2004608-71 = "Ou nos tornamos parceiros iguais... ou inimigos."
2004608-72 = "E, dependendo da sua resposta, Sensei —"
2004608-73 = "Eu puxarei este gatilho sem hesitar. ...Agora você entendeu um pouco melhor a situação?"
2004608-74 = "[s3] \"Niya é minha aluna,\"\n[s4] \"e eu sou o sensei da Niya.\""
2004608-80 = "[ns5] \"E se uma aluna se desviar do caminho,\"\n[ns6] \"é dever do sensei corrigi-la.\""
2004608-83 = "Você não vacila nem um pouco, não é, Sensei..."
2004608-89 = "Ah... sinto que perdi o fôlego..."
2004608-94 = "...Surpresa!"
2004608-95 = "Você gostou da Niya no modo sério por um instante? Nyaha♪"
2004608-99 = "...Embora, bem, não seja algo que se possa esconder com esse tipo de coisa."
2004608-100 = "Antes que as coisas fiquem mais complicadas... tudo o que eu disse até agora foi mentira, um teatro."
2004608-101 = "Para começar, não há nada a ganhar com uma guerra."
2004608-102 = "A principal fonte de renda de Hyakkiyako é o turismo. A paz é o que há de melhor."
2004608-103 = "Então, por que eu fiz isso...?"
2004608-104 = "É simples. Foi para que você, Sensei, conhecesse a verdadeira essência de Hyakkiyako."
2004608-105 = "Afinal, você é uma pessoa íntegra e gentil."
2004608-106 = "Felizmente, até agora, eu estava apenas brincando com você."
2004608-107 = "Mas, e se eu estivesse realmente tentando te usar? A história poderia ter sido completamente diferente, não é?"
2004608-108 = "[s] \"Você não tem intenção de fazer algo assim, tem?\""
2004608-109 = "Mas, isso é apenas uma \"hipótese\"..."
2004608-110 = "A flor de cerejeira que acredita no amanhã..."
2004608-111 = "Não há garantia de que a Academia Hyakkiyako será a mesma amanhã, não é?"
2004608-112 = "[s7] \"Se a Niya estiver lá, isso não acontecerá.\"\n[s8] \"A Niya não seguirá esse caminho.\""
2004608-115 = "Por isso, isso é apenas uma hipótese..."
2004608-116 = "Haa... na verdade, se eu quisesse, o Departamento Yin-Yang tem mais poder do que aparenta."
2004608-117 = "Não sei se conseguiria afetar todo o Kivotos, mas talvez, quem sabe, pudesse assumir o controle da Academia Hyakkiyako."
2004608-118 = "Se estamos falando de ser possível ou não, é possível. Esse é o maior problema."
2004608-119 = "[s9] \"Se a Niya estiver lá, isso não acontecerá.\"\n[s10] \"Porque a Niya ama Hyakkiyako, afinal.\""
2004608-122 = "Nyaha...?"
2004608-123 = "Porque você ama, você protege Hyakkiyako... é isso?"
2004608-124 = "Será que a própria hipótese está errada...?"
2004608-125 = "..."
2004608-126 = "Nyahahahaha!"
2004608-127 = "Ah~ realmente, né."
2004608-128 = "Não, não, eu já entendi perfeitamente."
2004608-129 = "De agora em diante, vou tentar acreditar um pouco mais em mim mesma. E no Sensei também."
2004608-130 = "Haa... que vergonha. #nA essa hora da noite, fazer algo para testar a mim mesma... e ao Sensei."
2004608-131 = "Falando coisas complicadas sobre harmonia Yin-Yang e equilíbrio... #ncomo pode ver, eu sou uma existência fortemente inclinada ao \"Yin\"."
2004608-132 = "Eu costumo rir dizendo \"nyahaha~\", mas é graças às minhas colegas e amigas que possuem o poder do \"Yang\" ao meu redor que eu consigo manter o equilíbrio."
2004608-133 = "Fico pensando se, com o Sensei aqui, isso se tornaria ainda mais sólido."
2004608-134 = "O Departamento Yin-Yang... e a Academia Hyakkiyako, sempre darão as boas-vindas ao Sensei♪"
2004608-135 = "[s11] \"O Sensei está sempre do lado dos alunos.\"\n[s12] \"Harmonia, equilíbrio... não sou muito bom com coisas complicadas...\""
2004608-138 = "Nyaha! Você me venceu... e olha que eu já tenho trabalho suficiente só tentando manter a harmonia em Hyakkiyako."
2004608-139 = "Por favor, continue sendo exatamente como você é. #n— O Sensei de Kivotos♪"
