[translation]
2600003-1 = "Um dia qualquer"
2600003-2 = "……Você veio, Sensei."
2600003-3 = "……Ficou surpreso por me ver no fliperama?"
2600003-4 = "Considerando como nos conhecemos, é natural que pense assim."
2600003-5 = "Eu mesma sinto que não combina muito comigo, mas……"
2600003-6 = "Claro, como você disse, eu gosto de lugares silenciosos como a biblioteca ou a enfermaria."
2600003-7 = "Mas, às vezes, eu também sinto vontade de sair um pouco da rotina."
2600003-8 = "Às vezes vou fazer compras com outras pessoas ou venho ao fliperama."
2600003-9 = "……Especialmente hoje,"
2600003-10 = "em um dia em que estou livre do trabalho do Comitê de Disciplina."
2600003-11 = "[s1] \"É um dia de folga, afinal.\"\n[s2] \"Matando aula!? Eu também gosto disso!\""
2600003-12 = "Sim, é verdade."
2600003-13 = "Não é que o Comitê de Disciplina esteja de folga, é apenas o meu dia de folga pessoal."
2600003-14 = "Não, é que……"
2600003-15 = "Eu só tirei uma folga oficial como qualquer outra pessoa."
2600003-16 = "B-bem, de qualquer forma."
2600003-17 = "Como é minha primeira folga comum em muito tempo……"
2600003-18 = "Se não for um incômodo para você, Sensei."
2600003-19 = "Eu queria retribuir o que você fez por mim da última vez, e também……"
2600003-20 = "Se possível, gostaria que você passasse o dia comigo……"
2600003-21 = "Não é fácil encontrar tempo livre, a menos que seja em um dia como hoje……"
2600003-22 = "É estranho perguntar isso agora, mas não estou te atrapalhando, estou?"
2600003-23 = "Você poderia me acompanhar……?"
2600003-24 = "[s3] \"Claro, ficarei feliz se for comigo.\"\n[s4] \"……Por acaso tem alguém no comitê que você não gosta?\""
2600003-25 = "Ah, obrigada. Não, claro que não é que eu não goste de estar com o pessoal do comitê. Eles são pessoas boas, no geral."
2600003-26 = "Ah, obrigada. Não, claro que não é que eu não goste de estar com o pessoal do comitê. Eles são pessoas boas, no geral."
2600003-27 = "Mas, é que eu também preciso dos meus dias de folga."
2600003-28 = "Eles não são pessoas ruins, mas são todos do tipo que saem correndo sem ouvir ninguém……"
2600003-29 = "Ficar de olho para que ninguém ao meu lado se esforce demais é algo que cansa bastante."
2600003-30 = "……Desculpe, acabei reclamando."
2600003-31 = "Claro, Sensei, você deve saber disso melhor do que eu, já que tem muito mais experiência."
2600003-32 = "Então, bem…… desculpe, me alonguei de novo, mas…… o que eu queria dizer é……"
2600003-33 = "[s5] \"Então, hoje eu vou te escoltar.\"\n[s6] \"Passarei o dia com você, senhorita.\""
2600003-34 = "……!?"
2600003-35 = "……!?"
2600003-36 = "……Eh, bem……"
2600003-37 = "……Ufa."
2600003-38 = "Sim, entendi. Conto com você."
2600003-39 = "Não sei se você está brincando ou falando sério, mas……"
2600003-40 = "……"
2600003-41 = "Mas, se é você quem diz, Sensei."
2600003-42 = "Então, mais uma vez, conto com você. E, obrigada."
2600003-43 = "……De verdade, obrigada."
2600003-45 = "（Dizendo isso, Chinatsu de repente segura minha mão e começa a caminhar alegremente）"
2600003-57 = "（Brincamos no fliperama, tomamos um chá em um café, paramos na rua para ver uma performance de hip-hop……）"
2600003-58 = "（Por fim, fizemos compras, acumulando momentos típicos de um dia de folga）"
2600003-59 = "（Assim, o tempo passou sem grandes acontecimentos）"
2600003-61 = "（……Foi realmente um dia sem nada de especial）"
2600003-62 = "（Um dia absolutamente comum）"
2600003-65 = "（Ao entardecer, Chinatsu, que caminhava à frente, parou de repente）"
2600003-66 = "Com isso terminamos, conseguimos ir a todos os lugares que planejamos."
2600003-67 = "E-e o que achou...? Eu me diverti muito, mas..."
2600003-68 = "Sensei, sobre isso..."
2600003-69 = "[s7] \"Foi divertido, passei um dia de folga como deve ser.\"\n[s8] \"Foi um dia especial, porque estive com a Chinatsu.\""
2600003-70 = "……"
2600003-71 = "……"
2600003-72 = "Sensei, você sempre faz isso..."
2600003-73 = "Mas... sim, fico feliz que tenha gostado."
2600003-74 = "Eu estava preocupada, já que nunca tinha passado um tempo a sós com alguém assim antes..."
2600003-75 = "S-se não se importar, bem..."
2600003-76 = "De agora em diante, mesmo que seja de vez em quando..."
2600003-77 = "...Bem."
2600003-78 = "C-claro, se for do seu agrado, Sensei! Não quero forçar nada...!"
2600003-79 = "……"
2600003-80 = "...Hehe."
2600003-81 = "Você é uma pessoa misteriosa, Sensei."
2600003-82 = "Tem certeza mesmo? De podermos fazer isso de novo..."
2600003-83 = "[s] \"Com certeza.\""
2600003-84 = "……"
2600003-85 = "...Sim, muito obrigada."
2600003-86 = "Então Sensei, conto com você daqui para frente."
2600003-87 = "Claro que não parece que será com tanta frequência... já que as folgas do Comitê Disciplinar não são tantas assim."
2600003-88 = "……"
2600003-89 = "Por enquanto, só consigo expressar dessa forma."
2600003-90 = "Será que o Sensei sabe como estou me sentindo agora...?"
2600003-91 = "……"
2600003-92 = "...Não, esqueça, não é nada."
2600003-93 = "...Está tudo bem."
2600003-94 = "...Agora, quero aproveitar o tempo para nos conhecermos melhor aos poucos."
2600003-96 = "(Despedi-me da Chinatsu, que me mostrou o seu melhor sorriso do dia, e voltei para o Schale)"
