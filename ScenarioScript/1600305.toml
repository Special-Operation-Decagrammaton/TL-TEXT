[translation]
1600305-1 = "Teoria da bala flash universal"
1600305-2 = "Aqui está, senhor."
1600305-3 = "Está tudo bem, acabei de chegar também."
1600305-4 = "Estava tudo bem ligar de repente...? O que isso significa...?"
1600305-5 = "Oh, não se preocupe com o grupo de vigilantes."
1600305-6 = "Não é como se eu fizesse isso como hobby o ano todo."
1600305-7 = "Ah, não, não estou sendo forçado a fazer isso por ninguém, é minha própria vontade."
1600305-8 = "Significa apenas... que não estou fazendo isso porque gosto ou porque gosto."
1600305-9 = "Na verdade, seria melhor se algum dia pudéssemos nos tornar uma cidade onde não tivéssemos que fazer esse tipo de coisa..."
1600305-10 = "……tipo? Meu?"
1600305-11 = "Brincadeirinha, quando as pessoas me veem, ou dizem “assustador” e me evitam, ou ficam cautelosas."
1600305-12 = "Eu costumo fazer coisas assim, então não tem jeito."
1600305-13 = "...mas muito obrigado. Mesmo assim, fico feliz em ouvir você dizer isso."
1600305-14 = "Vamos, senhor. Estou na frente... não."
1600305-17 = "...Estou ao seu lado, vamos juntos."
1600305-18 = "[s] (Começa a andar com Suzumi)"
1600305-22 = "...Este é o meu café favorito. Você gostaria de descansar um pouco?"
1600305-23 = "Apesar de ser o meu preferido, sempre peço apenas o café com leite. Mas é tão delicioso..."
1600305-24 = "Gashan!"
1600305-25 = "Kyaah! O que há com vocês?"
1600305-26 = "...! ?"
1600305-27 = "Haha! Como você pode ver, ele é um estudante delinquente cujo hobby é roubar!"
1600305-28 = "Desta vez fiz uma pesquisa completa! O grupo de vigilantes não tem atividade hoje!"
1600305-29 = "Sem dizer uma palavra, retire rapidamente todo o dinheiro aqui! Agora! !"
1600305-30 = "...Suspirar."
1600305-31 = "Os bandidos desta cidade não se arrependem... seria melhor se eles canalizassem seu entusiasmo para os estudos ou atividades do clube..."
1600305-32 = "(Porém, hoje não estou com um grupo de vigilantes, mas sim com um sensei...)"
1600305-35 = "……."
1600305-36 = "Não, por favor, pare! As promoções dessa semana estão aí...!"
1600305-37 = "Haha, obrigado por isso! Vamos gastar generosamente com você!"
1600305-38 = "Não resista em vão, você não quer que suas vendas sejam negativas por conta de contas hospitalares! ? Hahahahaha!"
1600305-39 = "……."
1600305-40 = "... Ufa."
1600305-41 = "Sensei... isso..."
1600305-42 = "……lar. Desculpe, nada..."
1600305-43 = "[s1] \"Ok, vá em frente.\"\n[s2] \"Você não pode ficar em silêncio, pode?\""
1600305-44 = "...!"
1600305-45 = "...!"
1600305-46 = "...Sim, muito obrigado."
1600305-47 = "Aguarde um momento, esclarecerei isso o mais rápido possível."
1600305-48 = "...Clique!"
1600305-49 = "sim? Existe algum tipo de som agora...?"
1600305-50 = "Sim, que som é esse? É como se fosse um déjà vu..."
1600305-51 = "Jogue uma granada flashbang! !"
1600305-53 = "Bang! ! Kiiiiiiiiiiin---"
1600305-58 = "(...Depois disso, a cena foi a mesma de antes. Os bandidos foram atordoados por granadas de flashbang e subjugados.)"
1600305-59 = "(Depois de ser amarrado a um pilar com uma corda, ele foi forçado a ouvir um alto “Baby” em seus ouvidos.)"
1600305-61 = "...Estou de volta, sensei. desculpe. Demorou mais do que eu esperava."
1600305-62 = "Desculpe, tenho planos para mais tarde..."
1600305-63 = "...Sim, muito obrigado."
1600305-64 = "...Além disso, por que é sempre uma granada flashbang?"
1600305-65 = "……isso é,"
1600305-66 = "Porque é assim que ninguém se machuca."
1600305-67 = "Granadas flash podem ser usadas para parar e suprimir com segurança as ações do inimigo."
1600305-68 = "Mesmo que a outra pessoa muitas vezes seja alguém que fez algo errado... não quero que ela se machuque."
1600305-69 = "Seria melhor se pudéssemos controlá-lo sem nos machucar. Sou apenas um vigilante."
1600305-70 = "[s] \"Afinal, os pardais são gentis.\""
1600305-71 = "Como isso se conecta com isso...!"
1600305-72 = "De qualquer forma, vamos!"
1600305-73 = "Vamos, sensei, venha aqui."
1600305-76 = "(No entanto, problemas ocorreram um após o outro nos locais onde paramos, e cada vez Suzumi jogava granadas de flashbang.)"
1600305-77 = "(No final, o número de granadas flashbang lançadas naquele dia estava na casa dos dois dígitos.)"
1600305-79 = "……."
1600305-80 = "...Sinto muito, Sensei."
1600305-81 = "No final, hoje não foi muito diferente de uma atividade normal de um grupo de vigilantes..."
1600305-82 = "Me desculpe por ter feito a professora sair comigo..."
1600305-83 = "Huh, foi divertido...?"
1600305-84 = "Então, por favor, volte desta vez...?"
1600305-85 = "……."
1600305-86 = "Sim, claro, sou sempre bem-vindo."
1600305-87 = "Se você concordar comigo sendo assim, eu ficaria feliz."
1600305-88 = "Muito obrigado."
1600305-91 = "... Foi muito divertido."
1600305-93 = "(Então, o pardal voltou lentamente na direção oposta.)"
1600305-94 = "(A maneira como ele andava era mais tranquila e calma do que antes, eu acho.)"
