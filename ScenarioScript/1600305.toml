[translation]
1600305-1 = "閃光弾万能説"
1600305-2 = "ここです、先生。"
1600305-3 = "大丈夫です、私も今来たところですので。"
1600305-4 = "急に呼び出して大丈夫だったか……？それはどういう……？"
1600305-5 = "あ、自警団のことならお気になさらず。"
1600305-6 = "年がら年中、趣味のようにやっているわけでもありませんから。"
1600305-7 = "ああいえ、決して誰かに無理やりやらされているわけではありません、れっきとした自分の意志です。"
1600305-8 = "ただ……楽しくて、好きでああいったことをしてるわけではない、という意味です。"
1600305-9 = "むしろ、いつかこんなことをしなくて良い街になってくれれば、それが一番ですし……。"
1600305-10 = "……優しい？私が、ですか？"
1600305-11 = "ご冗談を、私のことを見ると多くの人は「怖い」と言って避けるか、警戒してしまいます。"
1600305-12 = "普段はああいったことをしているので、仕方ないことなのですが。"
1600305-13 = "……でも、ありがとうございます。それでも、そう言っていただけるのは嬉しいです。"
1600305-14 = "行きましょう、先生。私が前を……いえ。"
1600305-17 = "……隣にいます、一緒に行きましょう。"
1600305-18 = "[s] （スズミと一緒に歩き出す）"
1600305-22 = "……ここ、私のお気に入りのカフェなんです。少し休んでいきませんか？"
1600305-23 = "お気に入りといっても、いつもカフェラテしか頼まないのですが。でもすごく美味しくて……"
1600305-24 = "ガシャーン！"
1600305-25 = "キャアッ！な、何なんですかあなたたちは！"
1600305-26 = "……！？"
1600305-27 = "ははっ！見て分かるだろう、強盗が趣味の不良生徒だよ！"
1600305-28 = "今回こそ徹底的に事前調査をしたんだ！今日は自警団も活動が無い！"
1600305-29 = "つべこべ言わず、さっさとここにある現金を全部出しな！今すぐに！！"
1600305-30 = "……はあ。"
1600305-31 = "懲りないですね、この街のチンピラは……その熱意を勉強なり部活なりに向ければ良いものを……。"
1600305-32 = "（ですが、今日の私は自警団ではなく、先生と……）"
1600305-35 = "……。"
1600305-36 = "や、やめてください！そこには今週の売上が……！"
1600305-37 = "ははっ、それはありがたいねえ！あたしらが豪勢に使ってあげるよ！"
1600305-38 = "無駄な抵抗はするなよ、病院代がかかって売り上げがマイナスになるのは嫌だろう！？ははははははっ！"
1600305-39 = "……。"
1600305-40 = "……ふう。"
1600305-41 = "先生……その……。"
1600305-42 = "……いえ。すみません、何でもありません……。"
1600305-43 = "[s1] \"大丈夫、行ってきて。\"\n[s2] \"黙っていられないでしょ？\""
1600305-44 = "……！"
1600305-45 = "……！"
1600305-46 = "……はい、ありがとうございます。"
1600305-47 = "ちょっとだけ待っていてください、できるだけ手早く片付けますので。"
1600305-48 = "……カチッ！"
1600305-49 = "ん？今、何かの音が……？"
1600305-50 = "そうだね、何の音だい？何となくデジャヴのような……。"
1600305-51 = "閃光弾、投擲！！"
1600305-53 = "バンッッ！！キイイイイィィィィィン――"
1600305-58 = "（……その後は前と同じ光景になった。チンピラたちは閃光弾で気絶し、制圧され、）"
1600305-59 = "（柱に縄で縛られたあと、爆音の『ベイビー』を耳元で聞かされていた）"
1600305-61 = "……戻りました、先生。すみません。思ったより時間がかかってしまいました。"
1600305-62 = "すみません、この後の予定に……。"
1600305-63 = "……はい、ありがとうございます。"
1600305-64 = "……それよりも、どうして毎回閃光弾なのか？"
1600305-65 = "……それは、"
1600305-66 = "誰も怪我をしない方法だからです。"
1600305-67 = "閃光弾は安全に相手の行動を封じ、制圧することができます。"
1600305-68 = "相手は往々にして悪いことをした人だとはいえ……だからといって怪我をさせることは望んでいません。"
1600305-69 = "怪我無く制圧が出来れば、それに越したことはありません。私はあくまで、自警団ですから。"
1600305-70 = "[s] \"やっぱりスズミは優しいね。\""
1600305-71 = "ど、どうしてそれがそこに繋がるんですか……！"
1600305-72 = "と、とにかくもう行きましょう！"
1600305-73 = "さあ先生、こちらへ。"
1600305-76 = "（しかしその後に立ち寄った場所でも次々に問題が起こり、その度にスズミは閃光弾を投擲した）"
1600305-77 = "（最終的にその日投げた閃光弾の数は、二桁にも上る）"
1600305-79 = "……。"
1600305-80 = "……申し訳ありません、先生。"
1600305-81 = "結局今日一日、普通の自警団活動の様相とあまり変わりませんでした……。"
1600305-82 = "先生を私に付き合わせる形になってしまいました、申し訳ないです……。"
1600305-83 = "え、楽しかった……ですか？"
1600305-84 = "だから、また今度もぜひ……？"
1600305-85 = "……。"
1600305-86 = "はい、もちろん、私はいつでも大歓迎です。"
1600305-87 = "こんな私でよろしければ、喜んで。"
1600305-88 = "本当に、ありがとうございます。"
1600305-91 = "……すごく、楽しかったです。"
1600305-93 = "（その後、スズミはゆっくりと反対方向へと帰っていった）"
1600305-94 = "（その歩き方は以前と違って悠然としていて、どこか落ち着いていたように思う）"
