[translation]
90001080-1 = "Episódio 8; Chokmah"
90001080-11 = "Dá para ver a saída!#nSensei, Diretora Himari, apressem-se!"
90001080-12 = "A porta está trancada... vou forçar a abertura!"
90001080-20 = "[ns] \"Eh...?\""
90001080-22 = "Isso é..."
90001080-23 = "O que vimos na tundra..."
90001080-24 = "O interior de um vulcão...?"
90001080-25 = "[s] \"Estava conectado ao vulcão...?\""
90001080-26 = "Espere, Rio.#nTem certeza de que é por aqui?"
90001080-27 = "...Isso era o melhor a se fazer.#nHá menos soldados inimigos no topo da montanha."
90001080-33 = "Vulcão... zona de calor intenso... escalada..."
90001080-34 = "Está ficando cada vez mais quente... Sensei, assuma a responsabilidade."
90001080-35 = "[s] \"Não é mais fresco do que suas roupas habituais...?\""
90001080-36 = "É, mas..."
90001080-37 = "Mesmo assim, aqui está quente demais..."
90001080-44 = "Ufa... finalmente a temperatura ideal."
90001080-45 = "Quero voltar para o helicóptero... ou entrar no mar de gelo..."
90001080-46 = "Você pretende transformar o helicóptero em uma geladeira!?"
90001080-50 = "...O número de perfuratrizes aumentou."
90001080-51 = "Verdade. Será que esta montanha era um local de mineração de verdade?"
90001080-52 = "(Glaciar, tundra e agora uma zona vulcânica... Para que exatamente eles usam tantos recursos...?)"
90001080-53 = "(Para o 'Chesed', que cuida da 'fábrica de munições'? Não, não acho que seja isso...)"
90001080-54 = "Eimi... você está bem? Está com uma aparência pálida."
90001080-55 = "Já chega..."
90001080-60 = "...Limite."
90001080-61 = "Se... se eu... cair aqui mesmo..."
90001080-62 = "Deixe um sorvete no meu túmulo... não, uma caixa inteira..."
90001080-63 = "Isso não soa como uma piada nesta situação.#nPor favor, não diga coisas assim."
90001080-64 = "A perseguição parou por um momento, vamos descansar ali."
90001080-65 = "...Como disse?"
90001080-66 = "Estou monitorando os arredores com drones e AMAS, e não há nenhum seguidor de Decagrammaton atrás de vocês por enquanto."
90001080-67 = "Isso é bom, mas... é um pouco inquietante."
90001080-68 = "Especificamente?"
90001080-69 = "Será que há algo nesta área—"
90001080-70 = "Ou talvez— não precisem mais nos perseguir, é isso?"
90001080-72 = "Resposta correta, certíssima! Nada mal."
90001080-76 = "[ns] \"Essa voz...!\""
90001080-78 = "V-vocês conseguiram chegar até aqui... não, v-vocês chegaram...!"
90001080-79 = "É como se fosse um esforço inútil, parabéns!"
90001080-80 = "Ainda assim, é digno de elogios. Deveríamos elogiá-los."
90001080-81 = "M-m-mas, isso também... acaba aqui!"
90001080-82 = "Hehehe. Consegui falar direito...!"
90001080-83 = "[s] \"Vocês estavam nos observando o tempo todo?\""
90001080-84 = "S-sim... desde que chegaram na zona da tundra..."
90001080-85 = "Vocês entraram em combate com os meus subordinados, não tinha como a gente não saber."
90001080-86 = "Francamente. Temos que ensinar até isso do zero?#nNo fim das contas, são apenas humanos."
90001080-87 = "D-de qualquer forma! I-isso é o fim...!"
90001080-88 = "Isso mesmo— como Ein disse, acaba aqui."
90001080-89 = "Se quiserem se render, a hora é agora.#nPosso abrir uma exceção e perdoá-los se fizerem isso agora."
90001080-90 = "[s1] \"Hum, não sei de nada, então não tem como eu me render.\"\n[s2] \"O que vocês estão tentando fazer?\""
90001080-93 = "E-eu posso... falar sobre isso?"
90001080-94 = "Desde que seja dentro do que podemos revelar, não tem problema, certo? O que acha, Soph?"
90001080-95 = "É verdade... Nós pretendemos reconstruir tudo do zero e criar uma nova base. Isso é..."
90001080-96 = "—Pode-se dizer que é para o bem de vocês."
90001080-97 = "B-bem... nós... pretendemos apresentar uma resposta exemplar e completa."
90001080-98 = "Esta é a parte importante."
90001080-99 = "Por exemplo, quando você está em dúvida sobre uma decisão — sabe quando não sabe qual é a escolha certa ou o que é o melhor a se fazer?"
90001080-100 = "De agora em diante, nós vamos fazer com que esse problema..."
90001080-101 = "—Simplesmente não aconteça desde o início!"
90001080-102 = "A explicação da Owl foi bem resumida, mas... isso também era a razão de existir d'Ele."
90001080-107 = "Ora, vocês soam como vilões de filmes de ficção científica."
90001080-108 = "Se nem conseguem dizer isso com confiança, acho que não vale a pena ouvir."
90001080-109 = "Concordo. 'Pelo bem de todos' ou 'reconstruir tudo'... geralmente são coisas terríveis."
90001080-110 = "I-isso é horrível!"
90001080-111 = "...Sinceramente, isso me irrita."
90001080-112 = "Bem... isso também está dentro do esperado."
90001080-117 = "Vocês são... os engenheiros do Decagrammaton."
90001080-118 = "...Tsukatsuki Rio."
90001080-119 = "Então é isso..."
90001080-120 = "Você apareceu, nossa nova variável."
90001080-121 = "...Por que veio agora? Embora seja uma pergunta inútil."
90001080-122 = "Afinal, foi você quem reconheceu a existência d'Ele pela primeira vez e começou a persegui-lo, não foi?"
90001080-123 = "A última vez que apareceu foi naquele dia em que o céu de Kivotos estava desmoronando..."
90001080-124 = "Deveria ter continuado escondida em algum lugar."
90001080-125 = "...Admito que fiz coisas que justificam esse julgamento."
90001080-126 = "Mas... você me conhece muito bem, não é?"
90001080-127 = "E-estar preparada para todas as possibilidades é o nosso trabalho, por isso...!"
90001080-128 = "P-por isso! Agora a Chokhma vai... consertar tudo!"
90001080-133 = "[ns3] \"Está tremendo...?\"\n[ns4] \"O estado do vulcão está estranho...!?\""
90001080-137 = "O vulcão começou a ficar ativo de repente."
90001080-138 = "Isso é...!"
90001080-148 = "[ns] \"O que aconteceu!?\""
90001080-149 = "É um sinal de um novo profeta!"
90001080-150 = "Eu também detectei. Esse sinal, será que é... 'Chokhma'?"
90001080-151 = "[s] \"'Chokhma'... ?\""
90001080-156 = "Chokhma! A segunda Sephira da Árvore da Vida!"
90001080-157 = "O guardião ancestral que protege o reino!"
90001080-158 = "A inteligência iluminada pela luz! — A sabedoria oculta!"
90001080-159 = "Variáveis são elementos problemáticos. Com Chokhma, faremos este vulcão entrar em erupção total e..."
90001080-164 = "Eliminaremos com certeza a maior variável, o Sensei do Schale!"
90001080-165 = "E depois... Tsukatsuki Rio, será você."
90001080-166 = "...Tudo bem, Ein?"
90001080-167 = "..."
90001080-168 = "Sim... se for pela 'Irmã mais velha'."
90001080-169 = "Além disso, foram eles que recusaram a nossa proposta."
90001080-170 = "É... é verdade, sim!"
90001080-177 = "[ns] \"O que... o que é aquilo!?\""
90001080-179 = "Sobre a lava... o que diabos... isso é impossível!"
90001080-180 = "Oh, um fenômeno digno do nome do Departamento de Investigação de Fenômenos Estranhos."
90001080-181 = "Acho que uma coisa não tem nada a ver com a outra!?"
90001080-183 = "(Este sinal é do... \"Deus Sem Nome\"?)"
90001080-188 = "Geburah é confiável. Ela é impaciente, mas ao mesmo tempo meticulosa. É perfeita para a patrulha da região glacial."
90001080-189 = "Afinal, foi a estratégia da Geburah que atraiu todos vocês até aqui, sabia?"
90001080-190 = "A-a Kokuma-chan está posicionada dentro da lava, então, mesmo que seja o Sensei... ou a Rio Tsukatsuki, não há nada que possam fazer, certo!?"
90001080-191 = "A-a Eimi Izumimoto é sensível ao calor, e o Abi-Eshuh da Toki Asuma precisa de manutenção, então...!"
90001080-192 = "Vocês continuaram lutando por tanto tempo, não é?#nQue tal descansar um pouco por aqui?"
90001080-193 = "Sim, nós vamos ajudar vocês.#nBem, talvez seja um descanso eterno, mas ainda assim?"
90001080-199 = "……Não é necessariamente preciso elaborar estratégias detalhadas contra aquele tipo de inimigo."
90001080-200 = "[s] \"Você tem algum plano?\""
90001080-211 = "Vou mobilizar todos os AMAS e usar os destroços das instalações para criar coberturas."
90001080-212 = "Não temos tempo suficiente para preparar algo decente...#nMas não precisamos de tanta precisão assim, certo?"
90001080-213 = "Aquilo é..."
90001080-214 = "Entendo, nesse caso, com certeza..."
90001080-219 = "[ns] \"Obrigado, Rio!\""
90001080-224 = "(Mas, há pouco... elas disseram que eliminariam com certeza o Sensei, que é a maior variável.)"
90001080-225 = "(Elas presumem que a existência do Sensei é uma ameaça tão grande assim...?)"
90001080-230 = "Sensei?"
90001080-231 = "[s] \"Não sei o que elas estão pensando ou o que estão preparando.\""
90001080-235 = "[ns] \"Por enquanto, vamos resolver as coisas à nossa frente, uma por uma!\""
90001080-236 = "Então, está calor, posso ligar o ar-condicionado do helicóptero?"
90001080-237 = "[s] \"...Pode deixar ligado por quantas horas quiser!\""
90001080-238 = "Obrigada, Sensei.#nEu gosto desse seu jeito."
90001080-239 = "……Por favor, pensem também no combustível, certo?"
90001080-246 = "Vamos revidar."
90001080-248 = "Então, pessoal. É hora de se prepararem, certo?"
90001080-249 = "Afinal, foi muito difícil atrair vocês até aqui!"
90001080-250 = "P-por favor, Kokuma-chan!"
90001080-251 = "N-não importa o que a Rio Tsukatsuki tenha preparado, não tem nada a ver com a Kokuma-chan...!"
90001080-256 = "[ns] \"Pessoal, cuidado!\""
