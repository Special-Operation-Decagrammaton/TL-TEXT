[translation]
90001080-1 = "第8話;コクマー"
90001080-11 = "出口が見えます！#n先生、ヒマリ部長、急いでください！"
90001080-12 = "ドアが閉まってる……こじ開けるよ！"
90001080-20 = "[ns] \"え……？\""
90001080-22 = "これは……。"
90001080-23 = "私たちが凍原で見た……。"
90001080-24 = "火山の、内部……？"
90001080-25 = "[s] \"火山と繋がっていた……？\""
90001080-26 = "待ってください、リオ。#n本当にここであっていますか？"
90001080-27 = "……これが最善だったわ。#n山の上は敵兵が少ないもの。"
90001080-33 = "火山……高熱地帯……登山……。"
90001080-34 = "どんどん暑くなってくんだけど……先生、責任取って。"
90001080-35 = "[s] \"普段の格好よりは涼しいんじゃ……？\""
90001080-36 = "そうだけど……。"
90001080-37 = "流石にここは暑すぎるよ……。"
90001080-44 = "ふぅ……やっと最適な温度になりましたね。"
90001080-45 = "ヘリに戻りたい……それか氷海に入りたい……。"
90001080-46 = "ヘリを冷蔵庫にするつもりですか！？"
90001080-50 = "……試錐機の数が増えてきましたね。"
90001080-51 = "そうね。この山が本格的な採掘場だったのかしら。"
90001080-52 = "（氷河、凍原、そして火山地帯……これだけの資源を一体何に……？）"
90001080-53 = "（「軍需工場」を担当する「ケセド」に？いえ、そうとは思えません……）"
90001080-54 = "エイミ……貴女、大丈夫？顔色が悪いわよ。"
90001080-55 = "もう……。"
90001080-60 = "……限界。"
90001080-61 = "もし……私が……このまま倒れたら……。"
90001080-62 = "お墓にアイスクリームを一つ……いや、一箱置いてね……。"
90001080-63 = "この状況では冗談に聞こえませんよ？#n滅多なことを言わないでください。"
90001080-64 = "ちょうど追撃も止まったし、そこで休みましょう。"
90001080-65 = "……今なんと？"
90001080-66 = "ドローンとAMASで周囲を偵察中だけど、貴方たちを追うデカグラマトンの眷属は今のところいないわ。"
90001080-67 = "それは良いことですが……少し不穏ですね。"
90001080-68 = "具体的には？"
90001080-69 = "この周辺に何かがあるのでは――"
90001080-70 = "もしくは――追わせる必要がなくなった、とか？"
90001080-72 = "正解正解、大正解です！やりますねぇ。"
90001080-76 = "[ns] \"この声は……！\""
90001080-78 = "よ、よくここまで来られましたね……いや、き、来ましたね……！"
90001080-79 = "ま、無駄な努力ご苦労さまって感じ！"
90001080-80 = "それでも称賛に値しますよ。褒めてあげるべきです。"
90001080-81 = "で、で、でも、それも……ここで終わりです！"
90001080-82 = "えへへ。ちゃんと言えました……！"
90001080-83 = "[s] \"ずっと見ていたの？\""
90001080-84 = "は、はい……凍原地帯に着いたときから……。"
90001080-85 = "うちの子と交戦したんだし、私たちが知らないわけないよね。"
90001080-86 = "やれやれ。そんなことも一から教えないといけないんですか？#n所詮は人間ですね。"
90001080-87 = "と、とにかく！こ、これで最後です……！"
90001080-88 = "そう――アインの言う通り、ここで終わり。"
90001080-89 = "降参するなら今のうちですよ？#n今なら特別に許してあげましょう。"
90001080-90 = "[s1] \"うーん、何も知らないから降参のしようがないんだよね。\"\n[s2] \"何をしようとしてるの？\""
90001080-93 = "は、話しても……大丈夫、でしょうか？"
90001080-94 = "話せる範囲なら良いのでは？いかがでしょう、ソフ？"
90001080-95 = "そうだね……私たちはすべてを一から作り直して、新しい土台を作るつもりなの。#nそれは――"
90001080-96 = "――あんた達のため、とも言える。"
90001080-97 = "え、えっと……私たちは……模範的で完全な答えを、提示しようと思っているんです。"
90001080-98 = "ここ、大事なところですよ。"
90001080-99 = "例えば、判断に迷った時――どのような決断が正しいのか、何がベストなのかわからない時ってありますよね？"
90001080-100 = "これからは私たちがその悩みを――"
90001080-101 = "最初から発生しないようにしてあげるということです！"
90001080-102 = "オウルの説明はだいぶ端折っちゃってるけど……それがあの方の存在意義でもあったからね。"
90001080-107 = "あら、SF映画に出てくる悪役みたいなことを言うのですね。"
90001080-108 = "堂々と言えない時点で、聞く価値ないんじゃないかな。"
90001080-109 = "そうですね。皆のために、とか全てを作り直すとか――そういうのは大抵ろくでもない事です。"
90001080-110 = "ひ、ひどいです！"
90001080-111 = "……正直腹立つんだけど。"
90001080-112 = "まあ……これも想定の範囲内ではあります。"
90001080-117 = "貴方たちが――デカグラマトンのエンジニアね。"
90001080-118 = "……[ruby=つかつき]調月[/ruby]リオ。"
90001080-119 = "これが……。"
90001080-120 = "現れましたね、私たちの新たな変数。"
90001080-121 = "……なんで今更きたの？#n無意味な質問だけどさ。"
90001080-122 = "そもそも、あの方の存在を初めて認識し、追跡を始めたのはあなたでしたものね。"
90001080-123 = "最後に現れたのはキヴォトスの空が崩れかけたあの日――"
90001080-124 = "そのままどこかに閉じこもっていればよかったものを。"
90001080-125 = "……そう評価されても仕方のないことをしたのは認めるわ。"
90001080-126 = "でも……私のことをよく知っているのね？"
90001080-127 = "あ、あらゆる可能性に備えるのが私たちの仕事、ですから……！"
90001080-128 = "だ、だから！今からコクマーちゃんが……全部元に戻します！"
90001080-133 = "[ns3] \"揺れてる……？\"\n[ns4] \"火山の様子が、おかしい……！？\""
90001080-137 = "火山が急に活性化しだしたわ。"
90001080-138 = "これは……！"
90001080-148 = "[ns] \"どうしたの！？\""
90001080-149 = "新しい預言者の信号です！"
90001080-150 = "私も探知したわ。#nこの信号は、まさか……「コクマー」？"
90001080-151 = "[s] \"「コクマー」……？\""
90001080-156 = "コクマー！生命の樹2番目のセフィラ！"
90001080-157 = "王国を守る古代の守護者！"
90001080-158 = "ひ、光が照らす知性！――隠されし知恵！"
90001080-159 = "変数は厄介な要素ですから。コクマーでここの火山を完全に噴火させ――"
90001080-164 = "最大の変数であるシャーレの先生を確実に仕留めるよ！"
90001080-165 = "その次は――調月リオ、あなたです。"
90001080-166 = "……いいよね、アイン？"
90001080-167 = "……。"
90001080-168 = "はい……「お姉様」のためなら。"
90001080-169 = "それに、私たちの提案を断ったのは、あちらですから。"
90001080-170 = "そ……そうでしたね、はい！"
90001080-177 = "[ns] \"な……何、あれ！？\""
90001080-179 = "溶岩の上に……一体、なにが……こんな事、ありえません！"
90001080-180 = "おー、特異現象捜査部の名にふさわしい現象だね。"
90001080-181 = "それとこれとは違う気がしますよ！？"
90001080-183 = "（この信号は、「名もなき神」の……？）"
90001080-188 = "ゲブラは頼もしいんだよね。短気だけど、同時に几帳面だからね。#n氷河地域[ruby=しょうかい]の哨戒に[/ruby]最適。"
90001080-189 = "皆さんをここに誘導したのもゲブラの作戦ですからね？"
90001080-190 = "こ、コクマーちゃんが陣取ってる、よ、溶岩の中なら、いくら先生でも……#n調月リオでも、どうしようもない、でしょう！？"
90001080-191 = "い、[ruby=いずみもと]和泉元[/ruby]エイミは暑さに弱いし、[ruby=あすま]飛鳥馬[/ruby]トキのアビ・エシュフは、せ、整備が必要でしょうから……！"
90001080-192 = "ず～っと戦い続けてきたでしょ？#nそろそろここらで休んじゃおうよ。"
90001080-193 = "ええ、私たちが手伝ってあげます。#nまあ、永遠の休息になるかもしれませんが？"
90001080-199 = "……あの手の敵に対して、必ずしも緻密な作戦を立てる必要はないわ。"
90001080-200 = "[s] \"何か案があるの？\""
90001080-211 = "AMASを総動員して、施設の残骸で遮蔽物を作るわ。"
90001080-212 = "まともなものを用意するのには少し時間が足りないけれど……。#nそこまで精度を上げる必要はないでしょう？"
90001080-213 = "あれは……。"
90001080-214 = "なるほど、それならきっと……"
90001080-219 = "[ns] \"ありがとう、リオ！\""
90001080-224 = "（ですが先程……最大の変数である先生を確実に仕留める、と彼女たちは言っていました）"
90001080-225 = "（先生の存在は、それだけ脅威になると想定している……？）"
90001080-230 = "先生？"
90001080-231 = "[s] \"あの子たちが何を考えていて、何を準備してるのかは分からないけど。\""
90001080-235 = "[ns] \"とりあえず、目の前のことを一つずつ解決しよう！\""
90001080-236 = "じゃあ、暑いからヘリの冷房つけていい？"
90001080-237 = "[s] \"……何十時間でもつけてていいよ！\""
90001080-238 = "ありがとう先生。#nそういうとこ、好きだよ。"
90001080-239 = "……燃料のことも考えてくださいね？"
90001080-246 = "応戦します。"
90001080-248 = "それでは、皆さん。そろそろ覚悟を決めてくださいね？"
90001080-249 = "ここまで誘導するのも大変だったんだから！"
90001080-250 = "お、お願いします、コクマーちゃん！"
90001080-251 = "つ、調月リオが、何を用意したとしても、コクマーちゃんには関係ありません……！"
90001080-256 = "[ns] \"みんな、気をつけて！\""
