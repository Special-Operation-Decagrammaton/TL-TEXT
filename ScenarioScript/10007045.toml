[translation]
10007045-1 = "Episódio 4: Negociação Suspeita"
10007045-2 = "Ugh, fui pega..."
10007045-3 = "Já que este é um resort de águas termais, não permitirei atos de sabotagem de ninguém!"
10007045-4 = "Sendo assim, todos os esboços cheios das ilusões da Meru-chan serão confiscados!"
10007045-5 = "M-mas eu ainda não terminei..."
10007045-10 = "Ufa, vejamos... 'Coleção de bigodes de um certo chefe de secretaria'..."
10007045-11 = "'O encontro secreto entre a vice-presidente e o oficial administrativo', 'O hobby secreto daquele contador'...?"
10007045-12 = "O-o que é isso, Meru-chan!?"
10007045-13 = "Não me diga que você sempre olha para todo mundo com esses olhos...!"
10007045-14 = "...E além disso, tem até alunas de outras escolas aqui, não tem!?"
10007045-15 = "Se um livro com ilusões tão perigosas quanto essas vazar, com certeza vai causar um conflito entre escolas!"
10007045-16 = "Eu preciso esconder isso em um lugar onde ninguém nunca veja...! Em algum lugar de onde nunca mais possa ser tirado...!"
10007045-17 = "E-espera! Você tem ideia de quanto esforço eu fiz pesquisando materiais para desenhar esse mangá!?"
10007045-18 = "...N-Nodoka-chan, não seja tão cruel. Só desta vez, não pode fechar os olhos para isso?"
10007045-19 = "Em troca, eu te dou isso!"
10007045-24 = "Isso é... uma ilustração do [USERNAME] Sensei!?"
10007045-25 = "A-a figura do Sensei, que eu sempre observava através do telescópio, tão nítida, bem na minha frente...! Ahh, ahh...!"
10007045-26 = "Hã!?"
10007045-27 = "Fufu, parece que você gostou."
10007045-28 = "Se você quiser, posso desenhar mais coisas assim, sabe?"
10007045-29 = "O quanto a Nodoka-chan quiser, no ângulo que a Nodoka-chan preferir..."
10007045-30 = "U-um desenho maravilhoso do Sensei, no meu ângulo favorito...!?"
10007045-35 = "...N-não tem jeito! Afinal, a Frente de Libertação do Conhecimento também são aliados com quem lutamos juntos pela liberdade antes, e depois de ver tanta sinceridade... só desta vez, vou deixar passar."
10007045-36 = "...Mas, em troca, certifique-se de que ninguém saiba que esses mangás foram produzidos na Academia Federal Red Winter! Se algo der errado, este lugar vai virar um campo de batalha!"
10007045-37 = "Não se preocupe. Quando eu publicar o doujinshi, vou usar um pseudônimo para não ser descoberta."
10007045-38 = "Fufu. Agora, vamos voltar ao manuscrito para o 'Comi-Sen'...!"
10007045-39 = "Ótimo, agora todos tiveram um final feliz!"
10007045-40 = "[s] \"E eu, estou incluído nesse 'todos'?\""
10007045-41 = "Ah, o Sensei ainda sente que não foi o suficiente?"
10007045-42 = "Se for esse o caso..."
10007045-48 = "Que tal um passeio pelo jardim em seguida? Os serviços do nosso 'Resort de Águas Termais 227' não param por aqui!"
10007045-49 = "[s] \"Por favor, eu só queria aproveitar as águas termais com calma...\""
10007045-51 = "No entanto, sendo empurrado por uma Nodoka empolgada, acabei deixando as águas termais para trás..."
