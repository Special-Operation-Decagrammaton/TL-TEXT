[translation]
10007045-1 = "第4話;怪しい取引"
10007045-2 = "うぐっ、やられた……。"
10007045-3 = "せっかくの温泉郷なんですから、妨害行為は誰であろうと許しません！"
10007045-4 = "ということで、メルちゃんの妄想が詰まったスケッチはすべて没収です！"
10007045-5 = "ま、まだ途中なのに……。"
10007045-10 = "ふぅ、えっと……「とある秘書室長のお髭コレクション」……"
10007045-11 = "「副委員長と行政官の密かな逢瀬」「あの会計の密かな趣味」……？"
10007045-12 = "こ、これは何ですかメルちゃん！？"
10007045-13 = "まさか、いつもこんな目でみんなを……！？"
10007045-14 = "……と言いますか、他校の生徒まで含まれてるじゃないですか！？"
10007045-15 = "こんな危険な妄想を描いた本が流出でもしたら、きっと学校間の紛争レベルですよ！？"
10007045-16 = "これは、絶対に見られないところに隠しておかないと……！どこか、二度と取り出せないような……！"
10007045-17 = "ま、待てっ！その漫画を描くために、どれだけ苦労して資料調査をしたと思ってるんだ！？"
10007045-18 = "……の、ノドカちゃんさあ。そんな酷いこと言わずに、今回だけだから目をつぶってくれない？"
10007045-19 = "その代わりにこれ、あげるから！"
10007045-24 = "これは……[USERNAME]先生のイラスト！？"
10007045-25 = "いっ、いつも望遠鏡越しで見つめていた先生の姿が、こんなにもくっきり、目の前で……！はぁっ、はぁっ……！"
10007045-26 = "はっ！？"
10007045-27 = "ふふっ、どうやら気に入ってもらえたようだね。"
10007045-28 = "もしお望みであれば、またそういうのを描いてあげるけど？"
10007045-29 = "ノドカちゃんの好きなだけ、ノドカちゃんが好きな角度で……。"
10007045-30 = "せ、先生の素敵な絵を、私の好きな角度で……！？"
10007045-35 = "……し、仕方ないですね！もともと知識解放戦線は、以前自由のために一緒に戦った仲でもありますし、ここまで誠意を見せられては……今回だけは、許してあげましょう。"
10007045-36 = "……その代わり、この漫画たちがレッドウィンター連邦学園で制作されたということは、絶対に知られないようにしてくださいね！一歩間違えたら、ここが戦場になるんですよ！"
10007045-37 = "心配しないで。同人誌を出す時は、ちゃんとペンネームでバレないようにするからさ。"
10007045-38 = "ふふっ。さあ、あらためて「コミセン」用の原稿を……！"
10007045-39 = "良し、これでみんなハッピーエンドですね！"
10007045-40 = "[s] \"その「みんな」の中に、私は……？\""
10007045-41 = "あ、先生はまだ物足りないという感じでしょうか？"
10007045-42 = "でしたら……"
10007045-48 = "次はお庭のお散歩などいかがでしょう？私たち「227号温泉郷」のサービスは、まだまだこんなものではありませんよ！"
10007045-49 = "[s] \"お願いだから、まずゆっくり温泉を楽しませてほしい……。\""
10007045-51 = "しかしテンションの上がったノドカに背中を押されて、温泉を後にすることになった……。"
