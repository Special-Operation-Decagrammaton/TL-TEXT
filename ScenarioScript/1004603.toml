[translation]
1004603-1 = "イズナと一緒に砂遊び！"
1004603-2 = "ふんふん～♪"
1004603-3 = "イズナこんこん、こんここ～ん♪"
1004603-4 = "（イズナと再び、海辺へと訪れた）"
1004603-13 = "あっ！主殿、主殿！今の見ましたか！？"
1004603-14 = "波が打ち寄せた後、戻っていく様子を見ていると……何だかこう、不思議な気分になります！"
1004603-15 = "[s] \"確かに、何となく分かるかも。\""
1004603-16 = "一緒でしたか！えへへっ！"
1004603-17 = "夏の海って、こんなにも目が回ることでいっぱいなんですね！"
1004603-18 = "さて、では今日は何をしましょうか！？"
1004603-19 = "[s] \"うーん、じゃあ前できなかった水泳でも――\""
1004603-20 = "っ！！"
1004603-21 = "あの、えっとですね、主殿……。"
1004603-22 = "その……。"
1004603-28 = "はっ！！"
1004603-29 = "あ、主殿！"
1004603-30 = "イズナ、やりたいことを思い出しました！"
1004603-31 = "[s] \"一体どんな修行？\""
1004603-32 = "夏、海、そしてせっかくの砂浜……。"
1004603-33 = "となれば忍びとしては、やはりあの修行！"
1004603-34 = "すなわち、「砂のお城」作りです！"
1004603-35 = "[s1] \"……なるほど？\"\n[s2]（忍びと関係あるのかな……？）"
1004603-38 = "これはイズナが偶然聞いたお話なのですが。"
1004603-39 = "昔どこかの海辺で、巨大な砂のお城を築き上げ……#n悪党たちと、[ruby=しれつ]熾烈[/ruby]な戦いを繰り広げた方々がいたらしいです！"
1004603-40 = "[s] （微妙に覚えがある、気がする……）"
1004603-41 = "何と、まる3日間も攻防を繰り広げたのだとか！"
1004603-42 = "その過程で負傷者も出てしまったとのことですが、それでも全員諦めずに戦い続けたとのことです！"
1004603-43 = "ちなみにどうやら、機転になったのは海から出てきた河童だそうで……！"
1004603-44 = "[s3] \"……聞いたことない話に飛躍した！\"\n[s4]（河童が、海に……？）"
1004603-47 = "そうと聞けばイズナも、忍びとして負けるわけにはいきません！"
1004603-48 = "何人たりとも侵入を許さない……"
1004603-49 = "そんなすごいお城を作って、主殿を守りきってみせます！"
1004603-50 = "というわけで主殿、"
1004603-56 = "砂のお城作り……手伝っていただけますか？"
1004603-57 = "[s] \"よし、やろう！\""
1004603-58 = "はい！"
1004603-60 = "（そうしてやる気満々のイズナと共に、砂のお城を作り始めた）"
1004603-62 = "完璧なお城を作るためには、基盤が大事だとイズナは思います！"
1004603-63 = "ですのでまず、この辺りの砂をならして……。"
1004603-69 = "えへへっ！これくらいで良いでしょうか？"
1004603-75 = "ああっ！せっかく作ったのに！？"
1004603-76 = "うぅ……波にさらわれるようにして、全部崩れてしまいました……。"
1004603-77 = "[s] \"うーん、もうちょっと海から遠い場所に作った方が良さそうだね。”"
1004603-78 = "くっ、これしきのことでイズナは負けません！"
1004603-79 = "たとえ初めは、上手く行かないとしても……！"
1004603-80 = "イズナは、失敗から学べる忍びですので！"
1004603-81 = "[s] \"うん、その意気！\""
1004603-82 = "はい、イズナ頑張ります！"
1004603-86 = "では次は、もっと外側からこう……！"
1004603-91 = "主殿、そちらの方をよろしくお願いします！"
1004603-95 = "きゃんっ！？ま、また崩れてしまいました……！？"
1004603-96 = "[s] \"今度は重さに耐えきれなかったのかな……？\""
1004603-97 = "う、うぅ……！イズナは諦めません！"
1004603-98 = "主殿！もう一度です！"
1004603-100 = "うわーーん！？また上の方が崩れてしまいました！？"
1004603-101 = "バランスが難しすぎます！"
1004603-103 = "くあっ！？今度は城壁を崩すかのように、ワタリガニの襲撃が！？"
1004603-104 = "ああ、いけません！そこに登られては……！"
1004603-105 = "うわあぁん！？"
1004603-107 = "（何度も試したものの、いま一つ上手く行かず……）"
1004603-109 = "[ns] \"うーん、やっぱり難しいね……。\""
1004603-110 = "そう、ですね……。"
1004603-111 = "うぅ……イズナが、最初から欲張ったのがいけなかったのでしょうか……。"
1004603-112 = "主殿を守るため、"
1004603-113 = "壮大なお城を作りたかったのですが……。"
1004603-114 = "……ですがよく考えると、最終的にお城が完成しなければ意味はありません。"
1004603-115 = "主殿のお言葉のおかげでイズナ、理解しました！"
1004603-116 = "[s] （ほとんど何も言ってないような……？）"
1004603-117 = "まずは、小さく作ることから始めることにしましょう。"
1004603-118 = "小さくても、頑丈なお城を目指して！"
1004603-119 = "[s] \"うん、良いかも。よし、頑張ろっか！\""
1004603-120 = "はい！イズナ、あらためて参ります！"
1004603-128 = "（そうして何度も、）"
1004603-140 = "（イズナとお城を作っては崩れを繰り返し……）"
1004603-153 = "主殿……これまで、幾つもの逆境がありましたね。"
1004603-154 = "[s] \"そうだね……。\""
1004603-155 = "突然の波にさらわれて、お城が崩れたり……。"
1004603-156 = "いきなり飛んできたビーチボールによって、派手に城壁が壊れたり……。"
1004603-157 = "[s] \"あの子、ものすごい勢いで謝ってたね。\""
1004603-158 = "ですが、それでも諦めることなく……"
1004603-159 = "計画を修正し、時には主殿のアドバイスに基づいて方針を変え……"
1004603-160 = "そうしてようやく、ようやくです……！"
1004603-161 = "[s] \"うん、ようやくだね。\""
1004603-162 = "これが、"
1004603-163 = "主殿とイズナで作った……イズナたちだけの、お城です！"
1004603-168 = "どう思いますか！？主殿！"
1004603-169 = "[s5] \"すごくカッコいいと思う！\"\n[s6] \"まあ、当初の予定とはちょっと違うかもだけど……！\""
1004603-172 = "数々の困難がありましたが……！"
1004603-173 = "それでもこうして完成させる事ができて、イズナは嬉しいです！"
1004603-174 = "こういうのは一人でやるより、誰かと一緒の方がずっと楽しいのだということ……"
1004603-175 = "イズナ、初めて知りました！主殿からは、色んなことを学んでばかりです！"
1004603-176 = "[s] \"……それは良かった。\""
1004603-181 = "おや、もうこんな時間ですね……。"
1004603-182 = "夢中になっていたら、あっという間でした。えへへっ。"
1004603-183 = "そろそろ、戻らないといけなさそうです。"
1004603-187 = "残念ですが"
1004603-188 = "今日はこれまでにして……"
1004603-189 = "[s] \"……イズナ、まだ終わりじゃないよ！\""
1004603-190 = "……はい？"
1004603-191 = "[s7] \"このお城みたいに一つ一つが小さいとしても、物量で勝負はできる！\"\n[s8] \"それは忍びにも関係が深い、伝統的な戦術の一つ！\""
1004603-194 = "[ns] \"と、思うんだけど……手伝ってくれる？\""
1004603-195 = "……もう少し主殿と一緒に、"
1004603-196 = "遊んでいても良いということですか？"
1004603-200 = "それが、主殿の命令なら……"
1004603-201 = "……はい、もちろんです！"
1004603-202 = "えへへっ！"
1004603-204 = "（そうして日が暮れて……夕日が水平線の向こうに隠れるまで、）"
1004603-205 = "（イズナと一緒に砂遊びをしたのだった）"
