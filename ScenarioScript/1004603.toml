[translation]
1004603-1 = "Brincando na areia com a Izuna!"
1004603-2 = "Hum hum~♪"
1004603-3 = "Izuna kon-kon, kon-koko-n♪"
1004603-4 = "(Visitei a praia novamente com a Izuna)"
1004603-13 = "Ah! Mestre, Mestre! Viu isso agora pouco!?"
1004603-14 = "Observar as ondas chegando e depois recuando... me deixa com um sentimento tão misterioso!"
1004603-15 = "[s] \"Com certeza, acho que entendo o que você quer dizer.\""
1004603-16 = "Você também sente isso! Ehehe!"
1004603-17 = "O mar de verão é cheio de coisas que fazem a cabeça girar, não é!"
1004603-18 = "Bem, então, o que vamos fazer hoje!?"
1004603-19 = "[s] \"Hmm, então que tal nadar, já que não conseguimos antes――\""
1004603-20 = "!!"
1004603-21 = "Aquilo, bem, sabe, Mestre..."
1004603-22 = "Sobre isso..."
1004603-28 = "Ah!!"
1004603-29 = "Ah, Mestre!"
1004603-30 = "Izuna, lembrei do que queria fazer!"
1004603-31 = "[s] \"Que tipo de treinamento seria?\""
1004603-32 = "Verão, mar e, já que estamos na areia..."
1004603-33 = "Sendo uma ninja, não pode faltar aquele treinamento!"
1004603-34 = "Ou seja, construir um \"castelo de areia\"!"
1004603-35 = "[s1] \"...Entendo?\"\n[s2](Será que isso tem relação com ser ninja...?)"
1004603-38 = "Isso é uma história que a Izuna ouviu por acaso."
1004603-39 = "Dizem que antigamente, em alguma praia, algumas pessoas construíram um castelo de areia gigante... e travaram uma batalha feroz contra vilões!"
1004603-40 = "[s] (Sinto que tenho uma vaga lembrança disso...)"
1004603-41 = "Dizem que eles lutaram por três dias inteiros!"
1004603-42 = "Parece que houve feridos no processo, mas mesmo assim, ninguém desistiu e continuaram lutando!"
1004603-43 = "Aliás, parece que o estopim de tudo foi um Kappa que saiu do mar...!"
1004603-44 = "[s3] \"...Essa história tomou um rumo inesperado!\"\n[s4](Um Kappa, no mar...?)"
1004603-47 = "Sabendo disso, a Izuna, como ninja, não pode perder!"
1004603-48 = "Não permitirei que ninguém invada..."
1004603-49 = "Vou construir um castelo incrível e proteger o Mestre até o fim!"
1004603-50 = "Sendo assim, Mestre,"
1004603-56 = "Poderia me ajudar a construir o castelo de areia?"
1004603-57 = "[s] \"Certo, vamos nessa!\""
1004603-58 = "Sim!"
1004603-60 = "(Assim, comecei a construir o castelo de areia junto com a Izuna, que estava cheia de energia)"
1004603-62 = "Para construir um castelo perfeito, a Izuna acha que a base é o mais importante!"
1004603-63 = "Por isso, primeiro, vamos nivelar a areia por aqui..."
1004603-69 = "Ehehe! Está bom assim?"
1004603-75 = "Ahhh! Logo agora que tínhamos terminado!?"
1004603-76 = "Uuu... As ondas levaram tudo e desmoronou..."
1004603-77 = "[s] \"Hmm, acho melhor construirmos em um lugar mais longe do mar.\""
1004603-78 = "Droga, a Izuna não vai perder por causa disso!"
1004603-79 = "Mesmo que não dê certo de primeira...!"
1004603-80 = "A Izuna é uma ninja que aprende com os erros!"
1004603-81 = "[s] \"Isso aí, esse é o espírito!\""
1004603-82 = "Sim, a Izuna vai se esforçar!"
1004603-86 = "Então, da próxima vez, vamos fazer assim, mais para fora...!"
1004603-91 = "Mestre, por favor, cuide daquela parte!"
1004603-95 = "Kyaa!? D-deu tudo errado de novo...!?"
1004603-96 = "[s] \"Será que não aguentou o peso desta vez...?\""
1004603-97 = "U-uuh...! Izuna não vai desistir!"
1004603-98 = "Mestre! Vamos tentar mais uma vez!"
1004603-100 = "Uwaaah!? A parte de cima desmoronou de novo!?"
1004603-101 = "O equilíbrio é difícil demais!"
1004603-103 = "Kyaa!? Agora um caranguejo atacou como se estivesse destruindo as muralhas do castelo!?"
1004603-104 = "Ah, não pode! Se subir aí..."
1004603-105 = "Uwaaah!?"
1004603-107 = "(Tentei várias vezes, mas não está dando muito certo...)"
1004603-109 = "[ns] \"Hmm, é realmente difícil, né...\""
1004603-110 = "É, verdade..."
1004603-111 = "Uuh... será que foi erro da Izuna ter sido gananciosa desde o começo...?"
1004603-112 = "Para proteger o Mestre,"
1004603-113 = "eu queria construir um castelo grandioso..."
1004603-114 = "...Mas, pensando bem, não faz sentido se o castelo não ficar pronto no final."
1004603-115 = "Graças às palavras do Mestre, a Izuna entendeu!"
1004603-116 = "[s] (Eu praticamente não disse nada...)"
1004603-117 = "Vamos começar fazendo algo pequeno primeiro."
1004603-118 = "Com o objetivo de fazer um castelo pequeno, mas resistente!"
1004603-119 = "[s] \"Hum, pode ser uma boa. Certo, vamos nos esforçar!\""
1004603-120 = "Sim! A Izuna vai tentar de novo!"
1004603-128 = "(E assim, várias vezes,)"
1004603-140 = "(Eu e a Izuna construímos e vimos o castelo desmoronar repetidamente...)"
1004603-153 = "Mestre... passamos por muitas adversidades até aqui, não é?"
1004603-154 = "[s] \"É verdade...\""
1004603-155 = "O castelo foi levado por ondas repentinas..."
1004603-156 = "Ou as muralhas foram destruídas por uma bola de praia que voou do nada..."
1004603-157 = "[s] \"Aquela criança pediu desculpas com tanta intensidade...\""
1004603-158 = "Mas, mesmo assim, sem desistir..."
1004603-159 = "Corrigimos o plano, às vezes mudamos a estratégia baseada nos conselhos do Mestre..."
1004603-160 = "E assim, finalmente, finalmente...!"
1004603-161 = "[s] \"Sim, finalmente.\""
1004603-162 = "Este é,"
1004603-163 = "o castelo que o Mestre e a Izuna fizeram... o castelo só nosso!"
1004603-168 = "O que acha!? Mestre!"
1004603-169 = "[s5] \"Acho que ficou muito legal!\"\n[s6] \"Bem, talvez esteja um pouco diferente do plano original, mas...!\""
1004603-172 = "Passamos por muitas dificuldades...!"
1004603-173 = "Mas estou feliz por termos conseguido terminar assim!"
1004603-174 = "Que esse tipo de coisa é muito mais divertido quando se faz com alguém do que sozinho..."
1004603-175 = "A Izuna aprendeu isso pela primeira vez! Estou sempre aprendendo várias coisas com o Mestre!"
1004603-176 = "[s] \"...Fico feliz em ouvir isso.\""
1004603-181 = "Ah, já está nesse horário..."
1004603-182 = "Passou num piscar de olhos enquanto estávamos concentrados. Ehehe."
1004603-183 = "Parece que já está na hora de voltar."
1004603-187 = "É uma pena, mas"
1004603-188 = "vamos parar por hoje..."
1004603-189 = "[s] \"...Izuna, ainda não acabou!\""
1004603-190 = "...Sim?"
1004603-191 = "[s7] \"Mesmo que cada um seja pequeno como este castelo, podemos vencer pela quantidade!\"\n[s8] \"Essa é uma das táticas tradicionais que tem tudo a ver com os ninjas!\""
1004603-194 = "[ns] \"É o que eu penso... você pode me ajudar?\""
1004603-195 = "……Isso significa que posso continuar"
1004603-196 = "brincando com o Mestre por mais um pouco?"
1004603-200 = "Se essa é a ordem do Mestre……"
1004603-201 = "……Sim, com certeza!"
1004603-202 = "Hehehe!"
1004603-204 = "（E assim, até o dia escurecer... até o sol se esconder atrás do horizonte,）"
1004603-205 = "（eu brinquei na areia com a Izuna）"
