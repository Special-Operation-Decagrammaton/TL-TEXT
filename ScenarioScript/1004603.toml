[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1004603-1 = "Brincando na Areia com a Izuna!"
1004603-2 = "Hum-hum~♪"
1004603-3 = "Izuna kon-kon, kon-koko~n♪"
1004603-4 = "(Fui novamente com a Izuna até a praia)"
1004603-13 = "Ah! Meu Mestre, Meu Mestre! Você viu isso!?"
1004603-14 = "Ficar observando a forma como a onda bate na areia e recua... me dá uma sensação muito mágica!"
1004603-15 = "[s] \"É verdade, acho que entendo o que você quer dizer.\""
1004603-16 = "Achou a mesma coisa! Ehehe!"
1004603-17 = "O mar no verão está cheio de coisas incríveis e surpreendentes, não é!"
1004603-18 = "E então, o que vamos fazer hoje!?"
1004603-19 = "[s] \"Hmmm, que tal a gente ir nadar já que não fomos da última vez――\""
1004603-20 = "!!"
1004603-21 = "Ahn, e-então, veja bem, Meu Mestre..."
1004603-22 = "O negócio é que..."
1004603-28 = "Hah!!"
1004603-29 = "Ah, Meu Mestre!"
1004603-30 = "A Izuna acabou de lembrar de algo que queria muito fazer!"
1004603-31 = "[s] \"Que tipo de treinamento é?\""
1004603-32 = "Verão, praia, e essa areia toda à disposição..."
1004603-33 = "Para uma ninja, só existe um treinamento perfeito para a ocasião!"
1004603-34 = "Isso mesmo, nós vamos construir um 'Castelo de Areia'!"
1004603-35 = "[s1] \"...Ah, entendi.\"\n[s2] (Será que isso tem a ver com os ninjas...?)"
1004603-38 = "Esta é uma história que a Izuna ouviu por acaso."
1004603-39 = "Dizem que, no passado, alguns ninjas construíram um castelo de areia gigante em uma praia e...#ntravaram uma batalha intensa e feroz contra vilões!"
1004603-40 = "[s] (Sinto que essa história me parece um pouco familiar...)"
1004603-41 = "Aparentemente, eles lutaram por três dias seguidos sem parar!"
1004603-42 = "Muitos se machucaram no processo, mas dizem que nenhum deles desistiu e continuou lutando!"
1004603-43 = "A propósito, parece que quem mudou o rumo da batalha foi um Kappa que saiu do mar...!"
1004603-44 = "[s3] \"...A história acabou de dar uma guinada que eu não conhecia!\"\n[s4] (Um Kappa... no mar...?)"
1004603-47 = "Ouvindo uma história assim, a Izuna, como ninja, também não pode ficar para trás!"
1004603-48 = "Vou construir um castelo onde nenhum intruso poderá entrar..."
1004603-49 = "E vou criar um castelo incrível para proteger o Meu Mestre!"
1004603-50 = "E é por isso, Meu Mestre..."
1004603-56 = "Você me ajudaria a construir esse castelo de areia...?"
1004603-57 = "[s] \"Claro, vamos lá!\""
1004603-58 = "Sim!"
1004603-60 = "(Assim, a Izuna e eu começamos a construir o castelo de areia super empolgados)"
1004603-62 = "Para montar o castelo perfeito, a fundação é o mais importante, na opinião da Izuna!"
1004603-63 = "Então, primeiro vamos nivelar essa areia por aqui..."
1004603-69 = "Ehehe! Isso já está bom, será?"
1004603-75 = "Aaaaaah!? A gente tinha acabado de fazer!?"
1004603-76 = "Uugh... Uma onda levou tudo e o nosso castelo desmoronou..."
1004603-77 = "[s] \"Hmm, acho que precisamos construir num lugar que fique um pouco mais longe do mar.\""
1004603-78 = "Kuh, a Izuna não vai desistir por causa de uma coisinha dessas!"
1004603-79 = "Mesmo que no começo não dê muito certo...!"
1004603-80 = "A Izuna é uma ninja que aprende com as falhas!"
1004603-81 = "[s] \"Sim, é assim que se fala!\""
1004603-82 = "Sim, a Izuna vai dar o seu melhor!"
1004603-86 = "E então agora, a gente vai empurrando mais de fora pra dentro...!"
1004603-91 = "Meu Mestre, por favor, me ajude com essa parte!"
1004603-95 = "Kyaaan!? C-Caiu tudo de novo...!?"
1004603-96 = "[s] \"Acho que a base de areia não aguentou o peso dessa vez...\""
1004603-97 = "Ugh... A Izuna não vai desistir!"
1004603-98 = "Meu Mestre! Vamos tentar mais uma vez!"
1004603-100 = "Waaah!? A parte de cima desmoronou de novo!?"
1004603-101 = "Achar o equilíbrio certo é muito difícil!"
1004603-103 = "Kuaah!? Agora um caranguejo invadiu e tá quebrando as nossas muralhas!?"
1004603-104 = "Ah, não pode ir por aí...! Não suba aí...!"
1004603-105 = "Uwaaah!?"
1004603-107 = "(Tentamos de novo várias vezes, mas sempre caía ou quebrava alguma coisa...)"
1004603-109 = "[ns] \"Nossa, isso é bem complicado mesmo...\""
1004603-110 = "É sim..."
1004603-111 = "Uugh... Será que foi um erro a Izuna tentar fazer um castelo tão grande desde o começo...?"
1004603-112 = "Eu queria construir um castelo majestoso,"
1004603-113 = "Para poder proteger o Meu Mestre de verdade..."
1004603-114 = "...Mas, pensando bem, de nada adianta se o castelo não ficar em pé no final."
1004603-115 = "A Izuna compreendeu perfeitamente graças às palavras do Meu Mestre!"
1004603-116 = "[s] (Eu acho que quase não falei nada...?)"
1004603-117 = "Então, vamos começar tentando construir um castelo menor."
1004603-118 = "Pode ser pequeno, mas será um castelo muito firme e resistente!"
1004603-119 = "[s] \"Hmm, acho uma ótima ideia. Vamos lá!\""
1004603-120 = "Sim! A Izuna vai tentar mais uma vez!"
1004603-128 = "(E assim, depois de várias tentativas...)"
1004603-140 = "(A Izuna e eu construímos e vimos o castelo cair repetidas vezes...)"
1004603-153 = "Meu Mestre... nós enfrentamos muitos obstáculos e dificuldades até aqui."
1004603-154 = "[s] \"É verdade...\""
1004603-155 = "As ondas que vieram de repente e destruíram tudo..."
1004603-156 = "E aquela bola de praia que voou na nossa direção e esmagou a nossa muralha... "
1004603-157 = "[s] \"A dona da bola veio pedir desculpas desesperadamente depois, né.\""
1004603-158 = "Mas sabe... mesmo assim, nós não desistimos...!"
1004603-159 = "Nós mudamos os planos, escutamos os conselhos do Meu Mestre e tentamos de novo..."
1004603-160 = "E graças a isso, finalmente... finalmente...!"
1004603-161 = "[s] \"Sim, finalmente nós conseguimos.\""
1004603-162 = "Olhe para ele, Meu Mestre."
1004603-163 = "O castelo... que a Izuna e o Meu Mestre construíram juntos! É o nosso castelo!"
1004603-168 = "O que você acha!? Meu Mestre!"
1004603-169 = "[s5] \"Ficou lindo e super legal!\"\n[s6] \"Bem, é verdade que está bem menor e diferente da ideia inicial, mas...\""
1004603-172 = "Sofremos um monte pra terminar...!"
1004603-173 = "Mas ver o nosso esforço tomando forma assim, a Izuna fica tão emocionada e feliz!"
1004603-174 = "Fazer essas coisas junto com alguém é muito mais divertido do que tentar fazer sozinha..."
1004603-175 = "A Izuna acabou de descobrir isso! Eu aprendo muitas coisas incríveis com o Meu Mestre!"
1004603-176 = "[s] \"...Fico muito feliz que você tenha gostado.\""
1004603-181 = "Oh, nossa, já estamos aqui há tanto tempo...?"
1004603-182 = "Quando a gente se diverte... o tempo passa sem eu nem perceber. Ehehe."
1004603-183 = "Acho que já está quase na hora de voltarmos."
1004603-187 = "É uma pena, mas"
1004603-188 = "Vamos encerrar as brincadeiras por hoj――"
1004603-189 = "[s] \"...Izuna, ainda não terminamos!\""
1004603-190 = "...Hã?"
1004603-191 = "[s7] \"Se o que construímos é pequeno, podemos usar a quantidade a nosso favor! Construiremos uma barreira forte com dezenas de montinhos como esse!\"\n[s8] \"Isso também é uma tática muito tradicional dos ninjas!\""
1004603-194 = "[ns] \"O que você acha... quer continuar construindo comigo?\""
1004603-195 = "...Isso significa que... eu posso continuar"
1004603-196 = "brincando na areia com o Meu Mestre mais um pouquinho...?"
1004603-200 = "Se essa for a ordem do Meu Mestre..."
1004603-201 = "...Sim, é claro que sim!"
1004603-202 = "Ehehe!"
1004603-204 = "(O sol começou a baixar e o crepúsculo coloriu a praia...)"
1004603-205 = "(E assim, continuei brincando e construindo castelos de areia com a Izuna até o fim do dia)"