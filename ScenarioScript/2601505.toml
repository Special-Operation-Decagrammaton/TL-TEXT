[translation]
2601505-1 = "Garota Travessa"
2601505-5 = "Ah, Sensei."
2601505-8 = "Desculpe te chamar a essa hora."
2601505-9 = "Sobre aquele passeio de antes... não, espera."
2601505-10 = "É sobre a nossa conversa, sabe~"
2601505-11 = "[s1] \"Ah! Sobre isso!\"\n[s2] \"Não precisa se preocupar!\""
2601505-14 = "Como esperado! Fico feliz que você entenda rápido~"
2601505-15 = "Acho que fui levada pelo clima da praia à noite... talvez?"
2601505-16 = "Não é do meu feitio, acabei falando demais."
2601505-17 = "De qualquer forma, por favor, esqueça o que aconteceu naquele dia..."
2601505-18 = "[s3] \"Eu aceito qualquer lado da Ichika!\"\n[s4] \"Vou aceitar tudo!\""
2601505-24 = "Hã?"
2601505-25 = "Não, não é bem assim..."
2601505-26 = "..."
2601505-27 = "Ufa..."
2601505-28 = "Pelo visto, falar normalmente não funciona com você."
2601505-29 = "...Sensei."
2601505-30 = "Dizer que aceita qualquer lado meu..."
2601505-35 = "...Não é mentira, né?"
2601505-36 = "[s] \"I-Ichika...?\""
2601505-39 = "[wa:770]― [log=이치카 수영복]Por acaso você não está [wa:2260]me entendendo mal?[/log]"
2601505-42 = "― [log=이치카 수영복]Achando que, por eu ser da Trinity, [wa:1590]sou uma garota gentil[/log]"
2601505-44 = "― [log=이치카 수영복]criada em uma estufa?[wa:1610][/log]"
2601505-47 = "[wa:1460]― [log=이치카 수영복]O Comitê de Justiça é um grupo [wa:2470]que lida com todo o trabalho sujo[/log]"
2601505-49 = "― [log=이치카 수영복]da Trinity, [wa:870]sabe?[/log]"
2601505-52 = "― [log=이치카 수영복]Essa gargantilha que [wa:1250]eu sempre uso.[/log]"
2601505-54 = "― [log=이치카 수영복]Se eu dissesse que, [wa:1400]na verdade, é uma \"coleira\", [wa:940]o que você...[wa:710][/log]"
2601505-57 = "― [log=이치카 수영복]faria?[/log]"
2601505-60 = "― [log=이치카 수영복]Só existe um motivo para colocar uma \"coleira\" [wa:1290]em alguém.[/log]"
2601505-63 = "[wa:1140]― [log=이치카 수영복]Se você for um Sensei perspicaz,[/log] "
2601505-65 = "― [log=이치카 수영복]acho que já deve saber.[/log] "
2601505-68 = "― [log=이치카 수영복]E quando essa \"coleira\" é removida,[/log]"
2601505-70 = "― [log=이치카 수영복]o que acontece...[wa:40] [/log]"
2601505-73 = "― [log=이치카 수영복]Você consegue [wa:2000]imaginar, não consegue?[/log]"
2601505-76 = "[wa:610]― [log=이치카 수영복]...Brincadeira, [wa:810]desculpe.[/log]"
2601505-78 = "― [log=이치카 수영복]Acho que fui longe demais.[/log]"
2601505-81 = "― [log=이치카 수영복]Que isso sirva de lição:[/log]"
2601505-83 = "― [log=이치카 수영복]Não saia dizendo qualquer coisa por aí, viu?[wa:240] [/log]"
2601505-86 = "― [log=이치카 수영복]Se eu fosse [wa:580]realmente perigosa,[/log]"
2601505-88 = "― [log=이치카 수영복]o que você [wa:750]pretendia fazer?[/log]"
2601505-91 = "[ns5] \"Que susto...\"\n[ns6] \"Então a Ichika também sabe pregar peças.\""
2601505-94 = "[wa:2260]― [log=이치카 수영복]Haha... [wa:860]bem,[/log] "
2601505-96 = "― [log=이치카 수영복]eu só faço isso [wa:500]na frente do Sensei.[wa:2520] E também...[/log] "
2601505-99 = "― [log=이치카 수영복]O que aconteceu hoje, [wa:1400]vamos levar para o túmulo.[/log]"
2601505-101 = "― [log=이치카 수영복]Nós dois.[/log]"
2601505-107 = "..."
2601505-108 = "[s7] \"...\"\n[s8] (Q-que clima estranho)"
2601505-111 = "Eu não queria que as coisas tomassem esse rumo..."
2601505-112 = "Eu estraguei tudo..."
2601505-113 = "B-bem..."
2601505-114 = "Hoje vamos voltar para nossos quartos, e conversamos mais na próxima."
2601505-116 = "(Sendo empurrado com um pouco de força pelas costas por Ichika, voltei para o quarto da pousada...)"
