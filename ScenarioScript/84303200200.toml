[translation]
84303200200-6 = "ぱんぱかぱーん！アリスは村人と遭遇しました！"
84303200200-10 = "ぱんぱかぱーん……？"
84303200200-11 = "村人では無いのだが……#n私は[ruby=ゆりぞの]百合園[/ruby]セイア。君はゲーム開発部の部員かい？"
84303200200-12 = "はい！今日のアリスはゲーム開発部のガイドとして、村人のみなさんを案内しています！"
84303200200-13 = "そうなのだね。"
84303200200-14 = "困っている人を助けるのが今日のアリスの任務です！何でも聞いてください！"
84303200200-15 = "それなら――"
84303200200-21 = "（特に不審な点はなさそうだ）"
84303200200-22 = "（やはり会場の方に……？）"
84303200200-26 = "……っ！？"
84303200200-27 = "（誰かに見られている……？）"
84303200200-32 = "（気のせい……ではないな。警戒や監視の類の視線）"
84303200200-33 = "（アリス以外の生徒がここに……？）"
84303200200-37 = "……アリス、この部屋には君の他にも誰か居るのか？"
84303200200-38 = "他の誰か、ですか？"
84303200200-39 = "視線を感じるんだ。"
84303200200-40 = "……少し、気になるな。"
84303200200-41 = "勘は鋭い方でね。"
84303200200-42 = "おそらく――"
84303200200-43 = "はい！もう一人いますよ！"
84303200200-44 = "やはりそうか。"
84303200200-48 = "しかし、どこだ……？"
84303200200-49 = "ユズの気配に気づくなんてすごいです！"
84303200200-50 = "まるでシーフですね！！"
84303200200-51 = "シーフ……？"
84303200200-55 = "ち、違います……言葉通りの意味じゃないんです……ごめんなさい！"
84303200200-56 = "今のは、わ、悪い意味じゃなくて、ゲームの職業を言っているだけで……！"
84303200200-65 = "ロッカーの中に隠れていたのか……。"
84303200200-66 = "あ……こんにちは……[ruby=はなおか]花岡[/ruby]ユズと言います。"
84303200200-67 = "君もゲーム開発部の部員なのかい？"
84303200200-69 = "ユズは私たちゲーム開発部の部長であり、最高のゲームマスター！そしてパーティーリーダーでもあります！"
84303200200-70 = "ロッカーの中はユズの特等席です！"
84303200200-71 = "……個性的な部員が多いのだね。"
84303200200-72 = "（ロッカーの中にいる理由はともかく……）"
84303200200-73 = "ところで、どうしてこの部室を訪ねてきたんですか？"
84303200200-74 = "EXPOに出したというゲームについて知りたいんだ。"
84303200200-75 = "それなら会場に行くべきです！"
84303200200-76 = "アリスについてきてください！"
84303200200-77 = "ああ、助かる。君はどうする？"
84303200200-79 = "ひっ……わ、私？私は……大丈夫です……。"
84303200200-80 = "ユズは指揮官なので前線には出ません。"
84303200200-81 = "前線に立つのはアリスと、モモイとミドリです！そしてセイアも！"
84303200200-82 = "そうか。前線への案内、よろしく頼むよ。"
84303200200-83 = "……邪魔したね。"
84303200200-84 = "い、いえ……ゲーム、面白いと思ってもらえたら……嬉しいです……。"
84303200200-85 = "新しいクエストが発生しました！出発です！！"
