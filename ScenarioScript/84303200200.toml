[translation]
84303200200-6 = "Tan-tan-taran! Alice encontrou um aldeão!"
84303200200-10 = "Tan-tan-taran...?"
84303200200-11 = "Eu não sou uma aldeã, mas... Eu sou Seia Yurizono. Você é um membro do Departamento de Desenvolvimento de Jogos?"
84303200200-12 = "Sim! Hoje, Alice está atuando como guia do Departamento de Desenvolvimento de Jogos para mostrar o local aos aldeões!"
84303200200-13 = "Entendo."
84303200200-14 = "A missão da Alice hoje é ajudar quem estiver precisando! Pode perguntar qualquer coisa!"
84303200200-15 = "Nesse caso..."
84303200200-21 = "(Não parece haver nada suspeito, pelo menos)"
84303200200-22 = "(Será que é mesmo em direção ao local do evento...?)"
84303200200-26 = "...!?"
84303200200-27 = "(Estou sendo observada por alguém...?)"
84303200200-32 = "(Não é impressão minha... é um olhar de vigilância ou cautela.)"
84303200200-33 = "(Tem outra aluna aqui além da Alice...?)"
84303200200-37 = "...Alice, tem mais alguém nesta sala além de você?"
84303200200-38 = "Mais alguém, você diz?"
84303200200-39 = "Sinto que estou sendo observada."
84303200200-40 = "...Isso é um pouco preocupante."
84303200200-41 = "Eu tenho um bom instinto para essas coisas."
84303200200-42 = "Provavelmente..."
84303200200-43 = "Sim! Tem mais uma pessoa aqui!"
84303200200-44 = "Eu sabia."
84303200200-48 = "Mas onde ela está...?"
84303200200-49 = "É incrível que você tenha notado a presença da Yuzu!"
84303200200-50 = "Você parece uma ladra!!"
84303200200-51 = "Ladra...?"
84303200200-55 = "N-não, desculpe! Não foi nesse sentido... me desculpe!"
84303200200-56 = "O que eu disse não foi por mal, eu só estava falando de uma classe de jogo...!"
84303200200-65 = "Então você estava escondida dentro do armário..."
84303200200-66 = "Ah... olá... meu nome é Yuzu Hanaoka."
84303200200-67 = "Você também é do Departamento de Desenvolvimento de Jogos?"
84303200200-69 = "A Yuzu é a nossa presidente do Departamento de Desenvolvimento de Jogos, a melhor mestre de jogos! E também a líder do nosso grupo!"
84303200200-70 = "O interior do armário é o lugar favorito da Yuzu!"
84303200200-71 = "...Vocês têm membros bem peculiares, não é?"
84303200200-72 = "(Deixando de lado o motivo de ela estar dentro do armário...)"
84303200200-73 = "A propósito, por que você veio visitar nossa sala?"
84303200200-74 = "Eu quero saber mais sobre o jogo que vocês apresentaram na EXPO."
84303200200-75 = "Nesse caso, você deve ir ao local do evento!"
84303200200-76 = "Siga a Alice!"
84303200200-77 = "Ah, agradeço. E você, o que vai fazer?"
84303200200-79 = "Hii... e-eu? Eu... estou bem aqui..."
84303200200-80 = "A Yuzu é a comandante, então ela não vai para a linha de frente."
84303200200-81 = "Quem vai para a linha de frente são a Alice, a Momoi e a Midori! E a Seia também!"
84303200200-82 = "Entendo. Conto com vocês para me guiarem até lá."
84303200200-83 = "...Desculpe o incômodo."
84303200200-84 = "N-não... se você achar o jogo divertido... eu ficaria feliz..."
84303200200-85 = "Uma nova missão foi gerada! Vamos partir!!"
