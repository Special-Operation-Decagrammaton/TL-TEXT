[translation]
10026020-1 = "Episódio 2; É roupa de banho, sim♡"
10026020-2 = "Muito bem, pessoal."
10026020-3 = "Esta é uma investigação importante para que a Sakurako-san e a Ui-san façam as pazes."
10026020-4 = "Sendo assim... já que estamos aqui, trouxe o Sensei também."
10026020-5 = "……Sensei, aconteceu alguma coisa?"
10026020-6 = "[s] \"…………。\""
10026020-8 = "[ns1] \"Bem... todos estão muito bem vestidos.\"\n[ns2] \"Como fui chamado de repente, estou um pouco...\""
10026020-11 = "Fufu... parece que uma explicação detalhada é necessária, de fato."
10026020-12 = "Nesta ilha deserta, restam ruínas descobertas pela Sisterhood."
10026020-13 = "Para que essas ruínas foram construídas, de qual época são...#nTentamos investigar várias vezes até agora, mas..."
10026020-15 = "Devido aos documentos antigos que nem a Sisterhood conseguiu decifrar e às estruturas complexas das ruínas, a investigação estagnou e tudo ficou abandonado por muito tempo."
10026020-17 = "Por isso, usando a excelente habilidade de decifração de documentos antigos e o conhecimento de arqueologia da Ui-san..."
10026020-18 = "Por favor, desvendem o mistério destas ruínas!#nSe fizerem isso, teremos um final feliz♡"
10026020-19 = "……Sensei, tem alguma pergunta?"
10026020-20 = "[s3] \"Tudo bem... entendi, é esse o acordo.\"\n[s4] \"Acho que consegui entender mais ou menos...\""
10026020-23 = "H-Hanako-san... por que todos estão de roupa de banho...?#nSe vamos investigar a ilha, não haveria trajes mais adequados...?"
10026020-24 = "E-E além disso... o que a Hanako-san está vestindo é, tipo, uma roupa de banho...?#nParece um pouco diferente..."
10026020-26 = "Ufufu. Se você pensar que é uma roupa de banho, então é uma roupa de banho♡"
10026020-27 = "Não tem como ser isso!!"
10026020-28 = "Koharu-chan, obrigada por vir também♡"
10026020-29 = "Explica direito!#nMe chamaram dizendo que era uma missão urgente e me trouxeram para um lugar desses..."
10026020-30 = "Onde é que a gente está!? Não estou entendendo nada!"
10026020-31 = "……Como eu não consegui ir à praia com a Koharu-chan...#nIsso estava me preocupando há muito tempo..."
10026020-32 = "Então, já que estamos aqui, pensei que seria bom aproveitar para brincar com a Koharu-chan..."
10026020-33 = "Você veio aqui para brincar, afinal!"
10026020-34 = "Ora, ora.…… Se isso te incomoda, que tal usarmos o pretexto de que você está aqui para monitorar a todos como uma elite do Comitê de Justiça?"
10026020-35 = "B-Bom, é claro que, como o Sensei e a Hanako estão aqui, eu não posso deixar de monitorar como uma elite, mas...! Você acabou de dizer que é um pretexto!?"
10026020-36 = "Uuu... mas passar vários dias nesta ilha deserta usando roupa de banho..."
10026020-37 = "……."
10026020-38 = "Será que... coisas desse tipo e daquele tipo vão acontecer... n-não pode ser...!?"
10026020-40 = "Sim?"
10026020-41 = "Eu só li sobre isso em livros, mas...#nEspere, será que a Hanako fez isso por causa disso...!?"
10026020-42 = "P-Pena de morte! Coisas indecentes são proibidas! Proibido!! Pena de morte!!!"
10026020-43 = "Fufu. Eu não entendo muito bem... você poderia me ensinar o que a Koharu-chan está pensando? Com calma♡"
10026020-44 = "N-Não! O que você está tentando me fazer dizer!?"
10026020-45 = "O que exatamente você quer dizer com coisas indecentes?#nJá sei... você poderia me ensinar na prática?"
10026020-46 = "I-Isso é assustador! Por que você está tão animada hoje!?"
10026020-47 = "Porque é verão♪"
10026020-48 = "N-Não estou entendendo nada... não chegue perto!#nNão se aproxime mais do que isso!!"
10026020-49 = "Ufufu, a Koharu-chan é tão carente. Toma essa♡"
10026020-53 = "Nãããão! S-Socorro, Sensei!#nUuu, me perdoa..."
10026020-54 = "[ns] \"Todos parecem estar se divertindo.\""
10026020-55 = "P-Por que... por que as coisas chegaram a esse ponto..."
10026020-56 = "Eu só queria revelar a verdade...#nPor que estou sob este sol escaldante..."
10026020-57 = "Por ter dito para escolherem qualquer roupa de banho... acabei tendo que usar esse traje tão vergonhoso..."
10026020-61 = "Não... talvez, isso possa ser uma oportunidade...?"
10026020-62 = "Se eu revelar os segredos do Conselho Estudantil, o predecessor da Sisterhood, talvez eu consiga alguma fraqueza..."
10026020-63 = "……Você disse alguma coisa agora? Ui-san, ou melhor..."
10026020-64 = "Ko-ze-ki-senpai?"
10026020-65 = "Hyaaa! N-Não é nada... só estava falando sozinha!!"
10026020-66 = "E-ei, não chegue tão perto de repente! Você me deu um susto, sabia!?"
10026020-68 = "M-mas, desse jeito, parece que vai dar certo! #nTenho certeza de que a Srta. Sakurako também vai perdoar você..."
10026020-69 = "Vamos nos esforçar juntas na investigação! Você consegue, Ui!"
10026020-70 = "Hinata..."
10026020-71 = "Sim! Eu acredito que você é capaz de concluir isso, Ui!"
10026020-72 = "Eu também vou te ajudar com tudo o que eu puder!!"
10026020-73 = "Gyaaaaaaah!"
10026020-75 = "...U-Ui!? O que houve de repente, Ui...!?"
10026020-76 = "Você me olha com essa expressão tão pura, sem suspeitar de nada...!"
10026020-77 = "Mesmo que eu ainda esteja tentando descobrir se há segundas intenções por trás disso..."
10026020-79 = "Ugh, é tão brilhante que... meus olhos...!"
10026020-80 = "V-você está bem...?"
10026020-81 = "Ah, não... não é que a culpa seja sua, Hinata... é só que, bem..."
10026020-82 = "...É um problema meu, então não se preocupe..."
10026020-83 = "Haa... fuuu..."
10026020-84 = "...Me desculpe, Hinata, e você também, Sensei..."
10026020-85 = "No fim das contas, a culpa é minha... Se eu não tivesse feito aquilo..."
10026020-86 = "Eu acabei envolvendo todos vocês..."
10026020-87 = "[s5] \"Tudo bem, da próxima vez vamos conversar direito.\"\n[s6] \"Afinal, a Ui sempre cuida muito bem da gente.\""
10026020-90 = "É isso mesmo, Ui. A Srta. Sakurako não estava tentando expulsar você nem nada do tipo..."
10026020-91 = "Como o Sensei disse, da próxima vez é só conversarmos direito!"
10026020-92 = "Além disso, fico muito feliz em poder ajudar você, Ui."
10026020-93 = "Afinal, você sempre me ajudou tanto...!"
10026020-94 = "Ugh! Guhaaa...!"
10026020-95 = "Ui...!?"
10026020-96 = "[s7] \"A Ui e a Hinata se dão bem, mas...\"\n[s8] \"As personalidades delas são opostas, né.\""
10026020-99 = "Ufufu, parece que sim."
10026020-100 = "Fuu... haa."
10026020-101 = "Sim... bem, não tem jeito. Já que chegamos a esse ponto..."
10026020-102 = "Já que vou contar com a ajuda de vocês... acho que vou me esforçar um pouco também."
10026020-103 = "...Sim! Vamos nos esforçar, Ui!!"
10026020-104 = "N-não olhe para mim com esses olhos...!"
10026020-105 = "P-por enquanto, você poderia carregar esta bagagem...?"
10026020-106 = "...Esta bagagem?"
10026020-107 = "Bem... é o meu \"Kit de Investigação de Ruínas\"."
10026020-108 = "Para a investigação, preciso de várias ferramentas."
10026020-109 = "Dicionários de línguas antigas, conjuntos de decalque — tinta, papel Gashi, almofadas de impressão feitas à mão. #nAlém de reagentes e várias outras coisas..."
10026020-110 = "Bem... cada item individualmente não deveria ser tão pesado, mas quando coloquei tudo na bolsa, ficou difícil até de levantar..."
10026020-111 = "Ugh..."
10026020-112 = "Entendo. #nEntão, deixe comigo!!"
10026020-113 = "Heave-ho."
10026020-115 = "...?"
10026020-116 = "Eh...!? H-Hinata... você carregou isso... com uma mão só...?"
10026020-117 = "Ah, desculpe...! #nEu deveria ter tratado com mais cuidado, não é...!"
10026020-118 = "Ah, não. Não precisa se preocupar tanto com o manuseio... #nÉ que eu vim arrastando isso até aqui..."
10026020-119 = "Entendo. Mas, por via das dúvidas, vou carregar com as duas mãos. #nPode não parecer, mas sou responsável pelo gerenciamento dos suprimentos da catedral!"
10026020-120 = "S-sinto que não fui compreendida... #nBem, se ela não vê problema nisso, tudo bem..."
10026020-124 = "...Ei, Hinata."
10026020-125 = "...O que foi, Ui!"
10026020-126 = "Sinto muito por dizer isso, mesmo você tendo se oferecido para ajudar, mas..."
10026020-127 = "……Bem, eu precisava te avisar isso antes de continuarmos a investigação. #n……Por isso, por favor, não leve para o lado negativo."
10026020-128 = "……Tudo bem?"
10026020-129 = "E-entendido."
10026020-130 = "……Muito obrigada, Hinata-san. #nEntão, sobre isso……"
10026020-134 = "Você poderia, por favor…… caminhar a uma certa distância de mim por um tempo? #nDigamos, uns 2 metros……"
10026020-138 = "……Hã?"
10026020-139 = "Eeeh!?"
10026020-141 = "Eu realmente não quis dizer nada de ruim…… #nIsso é um problema inteiramente meu…… sim."
10026020-142 = "Bem, vamos indo então…… não podemos ficar aqui para sempre, vamos montar uma base em algum lugar apropriado."
10026020-143 = "Pessoal, vamos nos mover."
10026020-149 = "……2 metros."
10026020-154 = "U-Ui-san……? #nUi-san, por que…… por que isso……!"
10026020-158 = "[ns] \"Acho que você vai se acostumar com o tempo……\""
10026020-161 = "[ns9] \"Koharu, você está bem?\"\n[ns10] \"Desculpe por te chamar tão de repente.\""
10026020-164 = "E-eu estou bem, não se preocupe. #nPelo que ouvi, não parece que viemos apenas para brincar……"
10026020-165 = "Vamos investigar as ruínas, certo? #nE-eu não entendo muito bem…… mas parece ser importante."
10026020-166 = "Eu sou uma elite do Comitê de Justiça, afinal. É claro que vou ajudar!"
10026020-167 = "……Mas, em uma ilha deserta como esta…… #nTodo mundo de roupa de banho…… e não só o Sensei, mas até a Hanako está aqui……"
10026020-168 = "……."
10026020-169 = "Pena de morte!!!"
10026020-170 = "[s] \"Hã!?\""
10026020-171 = "Eu vou vigiar o Sensei de perto para garantir que ele não faça nada estranho."
10026020-172 = "Como uma elite do Comitê de Justiça, não vou deixar que encostem um dedo em ninguém!"
10026020-173 = "[s] \"P-peguem leve comigo……\""
10026020-175 = "（Assim, a investigação das ruínas na ilha deserta começou）"
