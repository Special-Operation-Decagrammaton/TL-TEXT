[translation]
10026020-1 = "第2話;水着ですよ♡"
10026020-2 = "さあ、みなさん。"
10026020-3 = "これはサクラコさんとウイさんが和解するための、大切な調査です。"
10026020-4 = "ということで……せっかくなので先生もお連れしました。"
10026020-5 = "……先生、どうかされましたか？"
10026020-6 = "[s] \"…………。\""
10026020-8 = "[ns1] \"えっと……みんな、よく似合ってるね。\"\n[ns2] \"急に呼び出されたから、ちょっと……。\""
10026020-11 = "ふふ……やはり、詳しい説明が必要そうですね。"
10026020-12 = "この無人島には、シスターフッドが発見した遺跡が残されています。"
10026020-13 = "何のために作られた遺跡なのか、その時代など……#nこれまで何度も調査を試みたのですが……"
10026020-15 = "シスターフッドでさえ解読する事ができなかった古文書や、#n複雑な構造の遺跡ばかりで調査が難航し、長らく放置されていたのです。"
10026020-17 = "そこで、ウイさんの優れた古文書の解読力と考古学の知識を活かして……"
10026020-18 = "この遺跡の謎を解き明かしてください！#nそうすれば、ハッピーエンドというわけです♡"
10026020-19 = "……先生、何か質問はありますか？"
10026020-20 = "[s3] \"大丈夫……なるほど、そういう約束なんだね。\"\n[s4] \"何となく理解できたような……。\""
10026020-23 = "は、ハナコさん……どうしてみんな水着なんですか……？#n島を調査するのなら、もっと適した格好があるのでは……"
10026020-24 = "そ、それに……ハナコさんが着ているのは、水着……なのでしょうか？#nなんだかちょっと違うような……"
10026020-26 = "うふふっ。水着だと思えば、水着ですよ♡"
10026020-27 = "そんなわけないでしょ！！"
10026020-28 = "コハルちゃんも来てくださってありがとうございます♡"
10026020-29 = "ちゃんと説明してよね！#n急に出動って言われて来たら、こんな所に連れてこられて……"
10026020-30 = "ここどこなの！？意味分かんない！"
10026020-31 = "……コハルちゃんと海に行けなかったから……#nそれが、ずっと気がかりで……"
10026020-32 = "だから、せっかくなのでコハルちゃんとも遊びたいな、と思って……。"
10026020-33 = "やっぱり遊びに来てるんじゃない！"
10026020-34 = "まぁまぁ。……気になるようでしたら、正義実現委員会のエリートとして、みんなを監視する……という名目でどうでしょう？"
10026020-35 = "そ、そりゃもちろん、先生もハナコもいるんだから、エリートとして監視しないわけにはいかないけど……！っていま名目って言った！？"
10026020-36 = "うぅ……でも、こんな無人島で何日も水着のまま過ごすなんて……"
10026020-37 = "……。"
10026020-38 = "もしかして、あんなことやこんなことを……ま、まさか……！？"
10026020-40 = "はい？"
10026020-41 = "私も本でしか読んだことないけど……#n待って、まさかこのためにハナコは……！？"
10026020-42 = "し、死刑！エッチなのはダメ！禁止！！死刑！！！"
10026020-43 = "ふふっ。私、よく分からなくて……コハルちゃんが何を考えているのか教えていただけますか？じっくりと♡"
10026020-44 = "なっ！な、何を言わせようとしてるの！？"
10026020-45 = "エッチなことって、具体的にどういうものを指すんですか？#nそうだ……実演しながら教えていただけますか？"
10026020-46 = "こ、怖いんだけど！なんで今日は一段とテンションが高いの！？"
10026020-47 = "夏、ですから♪"
10026020-48 = "わ、訳が分からないんだけど……こっち来ないで！#nそれ以上近寄っちゃダメ！！"
10026020-49 = "うふふっ、コハルちゃんは欲しがりなんですから。えいっ♡"
10026020-53 = "いやぁああぁぁぁー！た、助けて先生！#nううぅ、許してぇ……。"
10026020-54 = "[ns] \"みんな楽しそうだね。\""
10026020-55 = "い、一体どうして……どうしてこんなことに……"
10026020-56 = "私は、ただ真実を明らかにしようとしただけなのに……#n何故、こんな炎天下に……"
10026020-57 = "水着も適当に選んでって言ってしまったせいで……こ、こんな恥ずかしい格好をする羽目に……"
10026020-61 = "いや……もしかしたら、これはチャンスかもしれない……？"
10026020-62 = "シスターフッドの前身である、聖徒会の秘密を明らかにすれば、何か弱みが掴めるかも……"
10026020-63 = "……いま何か言いました？ウイさん、いや……"
10026020-64 = "コ・ゼ・キ・先・輩？"
10026020-65 = "ひゃっっ！な、何でもない……ただの独り言！！"
10026020-66 = "そ、それと、急に近寄らないでください！驚いたじゃないですか！？"
10026020-68 = "で、でもこれなら、うまくいきそうですね！#nきっと、サクラコ様もお許しになるでしょうし……"
10026020-69 = "一緒に頑張って調査しましょう！ウイさんならできますよ！"
10026020-70 = "ヒナタさん……"
10026020-71 = "はい！ウイさんならやり遂げられると信じています！"
10026020-72 = "私も精一杯、ウイさんのお手伝いをしますから！！"
10026020-73 = "ぎええええっ！"
10026020-75 = "……う、ウイさん！？急にどうしたんですか、ウイさん……！？"
10026020-76 = "そうやって、何も疑わない無垢な表情を向けられて……！"
10026020-77 = "私は未だに、裏がないか探ろうとしてしまっているというのに……"
10026020-79 = "うぅ、眩しすぎて……目が……！"
10026020-80 = "だ、大丈夫ですか……？"
10026020-81 = "あ、いえ……ヒナタさんが悪いとかではなくて……これは、その……"
10026020-82 = "……私自身の問題ですので、気にしないでください……。"
10026020-83 = "はぁ……ふぅ……。"
10026020-84 = "……ごめんなさい、ヒナタさん、それに先生も……"
10026020-85 = "元はと言えば、私のせいなので……私があんな事をしなければ……"
10026020-86 = "皆さんまで、巻き込んでしまって……"
10026020-87 = "[s5] \"大丈夫、次からはちゃんと相談しようね。\"\n[s6] \"ウイには、いつもお世話になってるからね。\""
10026020-90 = "そうですよ、ウイさん。サクラコ様も追い出そうとしていたわけではありませんし……"
10026020-91 = "先生の仰る通り、次からはちゃんと話し合えばいいんです！"
10026020-92 = "それに、私もウイさんのお手伝いができるのはとても嬉しいです。"
10026020-93 = "ウイさんには助けてもらってばかりでしたから……！"
10026020-94 = "うっ！ぐはぁっ……！"
10026020-95 = "ウイさん……！？"
10026020-96 = "[s7] \"ウイとヒナタって仲はいいけど……\"\n[s8] \"性格は正反対だよね。\""
10026020-99 = "うふふっ、そのようですね。"
10026020-100 = "ふぅ……はぁ。"
10026020-101 = "はい……まあ、仕方ありませんね。こうなった以上……"
10026020-102 = "皆さんのお力も、借りるわけですし……私も少し、頑張ってみようと思います。"
10026020-103 = "……はい！頑張りましょう、ウイさん！！"
10026020-104 = "そっ、その目でこっちを見ないでください……！"
10026020-105 = "と、とりあえずこの荷物を運んでもらえますか……？"
10026020-106 = "……この荷物、ですか？"
10026020-107 = "えっと……「遺跡調査キット」です。"
10026020-108 = "調査には、色々と道具が入り用でして。"
10026020-109 = "古代語辞典や拓本セット――墨や画仙紙、手作りのタンポ。#n他にも試薬など、色々と……"
10026020-110 = "その……一つひとつはそこまで重くなかったはずなのですが、いざカバンに詰めてみたら、持ち上げるのも大変になってしまって……"
10026020-111 = "うっ……"
10026020-112 = "そうなのですね。#nでは、私にお任せください！！"
10026020-113 = "よいしょっ。"
10026020-115 = "……？"
10026020-116 = "えっ……！？ひ、ヒナタさん……それを、片手で……？"
10026020-117 = "ああっ、すみません……！#nもっと丁寧に扱わないといけませんよね……！"
10026020-118 = "あ、いえ。取り扱いは、そこまで気にしなくて良いのですが……#nわ、私は引きずって運んできたので……"
10026020-119 = "なるほど。ですが一応、両手で運びますね。#nこう見えても、聖堂の備品管理を担当していますから！"
10026020-120 = "な、何だか伝わっていないような……#nまあ、本人が問題なさそうなら構いませんが……"
10026020-124 = "……あの、ヒナタさん。"
10026020-125 = "……何でしょう、ウイさん！"
10026020-126 = "手伝っていただくというのに、こんなことを言うのは申し訳なく思うのですが……"
10026020-127 = "……その、調査を続けるうえで、あらかじめ言っておかなければ、と。#n……なので、あまりマイナスには捉えないでください。"
10026020-128 = "……良いですね？"
10026020-129 = "わ、分かりました。"
10026020-130 = "……ありがとう、ございます、ヒナタさん。#nでは、その……"
10026020-134 = "しばらくの間、離れて歩いてもらっても……良いでしょうか？#nそうですね、2mくらい……"
10026020-138 = "……へ？"
10026020-139 = "ええっ！？"
10026020-141 = "本当に、マイナスの意味はありません……#nこれは完全に、私の問題です……はい。"
10026020-142 = "では、そろそろ行きますか……いつまでも、ここに居るわけにはいきませんし、適当なところに拠点を作りましょう。"
10026020-143 = "皆さん、移動しますよ。"
10026020-149 = "……2m。"
10026020-154 = "う、ウイさん……？#nウイさん、どうして……どうしてですか……！"
10026020-158 = "[ns] \"そのうち慣れると思うんだけどね……。\""
10026020-161 = "[ns9] \"コハルは大丈夫？\"\n[ns10] \"急に来てもらっちゃって、ごめんね。\""
10026020-164 = "べ、別に大丈夫よ。#n聞いてた感じ、ただ遊びにきたわけでもなさそうだし……"
10026020-165 = "遺跡を調査するんでしょ？#nよ、よく分かんないけど……重要みたいだから。"
10026020-166 = "私も正義実現委員会のエリートだもの。当然手伝うわ！"
10026020-167 = "……でも、こんな無人島で……#nみんな水着だし……先生だけじゃなくて、ハナコまで居るなんて……"
10026020-168 = "……。"
10026020-169 = "死刑っ！！！"
10026020-170 = "[s] \"えっ！？\""
10026020-171 = "先生が変なことしないように、私がちゃんと監視するから。"
10026020-172 = "正義実現委員会のエリートとして、みんなには指一本触れさせないんだからね！"
10026020-173 = "[s] \"お、お手柔らかに……。\""
10026020-175 = "（こうして、無人島の遺跡調査が始まった）"
