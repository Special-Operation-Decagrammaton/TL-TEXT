[translation]
10017050-1 = "Episódio 5: Guerra de Arrepiar"
10017050-2 = "Café \"White&Mason\""
10017050-3 = "Bem... é que, esse tipo de coisa é algo raro, ou melhor, é praticamente a minha primeira vez..."
10017050-4 = "C-como eu deveria me comportar..."
10017050-6 = "Não precisa ficar tensa."
10017050-7 = "Scones e bolos deliciosos, e um chá com um aroma maravilhoso..."
10017050-8 = "Pelo menos, aproveite-os como bem entender."
10017050-13 = "M-mas é que... nós não sabemos beber com a elegância da vice-presidente Hasumi..."
10017050-14 = "Provavelmente, com o meu paladar, eu nem vou conseguir sentir a qualidade do chá..."
10017050-16 = "Não precisa se preocupar com isso."
10017050-17 = "Embora o conhecimento possa acrescentar ao modo de apreciar, não significa que você não possa saborear sem ele."
10017050-18 = "Acima de tudo, este lugar é para recompensar o esforço de todas vocês durante este ano."
10017050-23 = "Vocês devem aproveitar da maneira que quiserem, para que possam se divertir. #nVamos, por favor, sirvam-se."
10017050-24 = "M-muito obrigada..."
10017050-25 = "A propósito... ao preparar chá com leite, o correto é colocar o chá no leite, ou o leite no chá?"
10017050-26 = "Não seria correto colocar o leite frio dentro do chá quente? #nAssim, o leite resfria o chá quente, tornando-o mais fácil de beber."
10017050-27 = "……Mas, pensando bem, não seria mais correto colocar o chá no leite aquecido? #nDessa forma, o sabor tostado do leite harmoniza com o chá, criando um sabor mais profundo, não?"
10017050-28 = "Mas, no processo de aquecer o leite, forma-se uma película fina na superfície, sabia?"
10017050-29 = "No fim das contas, coisas estranhas acabam se misturando ao chá, é um desperdício de sabor!"
10017050-30 = "Você diz isso porque não sabe de nada! #nQuando se coloca leite no chá, as proteínas se desnaturam e criam um aroma estranho,"
10017050-31 = "e ao se misturar com os componentes do chá, até a gordura do leite, que afeta a adstringência, se altera. Como resultado, não dá para ajustar o sabor!"
10017050-32 = "Pelo contrário, ao colocar o chá no leite, o chá não ultrapassa uma certa temperatura, então a desnaturação não ocorre. Você pode aproveitar o sabor do chá com leite perfeitamente!"
10017050-33 = "Mesmo assim, leite no chá!"
10017050-34 = "Chá no leite!"
10017050-36 = "P-por favor, acalmem-se."
10017050-38 = "Ah! D-desculpe, vice-presidente Hasumi...!"
10017050-39 = "Acabei me empolgando e passando vergonha...!"
10017050-41 = "Não, tudo bem. Mas essa é uma pergunta perigosa."
10017050-42 = "Uma pergunta perigosa...?"
10017050-43 = "Sim. Afinal, essa é uma discussão que já dura mais de 100 anos."
10017050-44 = "Até hoje, não se chegou a uma conclusão definitiva."
10017050-45 = "Dizem que colocar o chá no leite pode reduzir um pouco a adstringência, mas..."
10017050-46 = "Como vocês disseram antes, há quem goste de ajustar essa adstringência. Além disso, há quem diga que o sabor que surge ao aquecer o leite é melhor..."
10017050-47 = "As pessoas se dividem entre o \"time do chá no leite\" e o \"time do leite no chá\", e as disputas nunca terminam."
10017050-49 = "E-era assim, então...!"
10017050-50 = "Então... vou seguir a política de apreciar sem preocupações!"
10017050-52 = "Fico feliz que todas estejam se divertindo mais do que eu esperava."
10017050-53 = "……Tsurugi, você está bem?"
10017050-61 = "Kieee..."
10017050-62 = "Tsurugi, relaxe um pouco os ombros..."
10017050-63 = "Vamos. Você gosta deste chá e desses doces, não gosta?"
10017050-64 = "……Não desgosto."
10017050-65 = "Mas..."
10017050-66 = "……Só de eu estar sentada aqui, alguém fica tenso."
10017050-67 = "Mesmo assim, somos todas do Comitê de Justiça. #nAlém disso, você é a presidente, então não precisa se preocupar tanto..."
10017050-68 = "Vou... me esforçar."
10017050-69 = "Se for assim, fico aliviada..."
10017050-71 = "Entrada do Café \"White&Mason\""
10017050-75 = "Ei, Mashiro? O que você está fazendo...?"
10017050-76 = "Como pode ver, estou fazendo a segurança."
10017050-77 = "Ma-mas, é uma festa de Natal, afinal..."
10017050-78 = "Com certeza. #nMas, não, é justamente por isso que quero que todos possam aproveitar...!"
10017050-79 = "Isso também é uma forma de justiça!"
10017050-81 = "Eu entendo, mas... Mashiro, você não poderia aproveitar um pouquinho também...?"
10017050-82 = "Está tudo bem. Proteger a justiça é, #npara mim, o mesmo que uma 'festa'!"
10017050-83 = "É...? #nMas, sabe..."
10017050-89 = "...Troca."
10017050-94 = "Pre-Presidente!?"
10017050-95 = "Senpai Tsurugi? Aconteceu alguma coisa?"
10017050-97 = "...Vim fazer a troca."
10017050-102 = "Mas senpai, você..."
10017050-103 = "E-eu vou me retirar então...!"
10017050-109 = "...Você está bem?"
10017050-110 = "...É mais fácil assim."
10017050-111 = "...Entendido. #nEntão voltarei mais tarde, vou aceitar sua oferta por enquanto..."
10017050-113 = "――A Brigada de Socorro tem algo a perguntar ao Comitê de Justiça!"
10017050-118 = "O-o que foi? Por que essa conexão repentina e estranha..."
10017050-119 = "Espera, não é a Comandante Mine da Brigada de Socorro?"
10017050-120 = "Aconteceu algo? Precisa de alguma coisa?"
10017050-122 = "Deixe-me confirmar. Vocês, do Comitê de Justiça, #nconfiscaram frango de Natal de delinquentes hoje?"
10017050-127 = "...?"
10017050-128 = "(Nós confiscamos... sim)"
10017050-129 = "(Transmitir os fatos claramente leva à justiça, não é?)"
10017050-130 = "Sim, é verdade."
10017050-132 = "Foi assim mesmo..."
10017050-133 = "Estou triste!!"
10017050-134 = "Em pleno Natal, o Comitê de Justiça perder a noção da justiça!"
10017050-135 = "O-o que você quer dizer com isso...?"
10017050-136 = "Já que admitiram, não me venham dizer que não sabem... #nOu será que realmente perderam a noção?"
10017050-137 = "Voltem a si, Comitê de Justiça! #nAté agora, sempre realizamos o socorro juntas, não foi?!"
10017050-138 = "(...Como sempre, não faz o menor sentido)"
10017050-139 = "Bem, Comandante. #nHoje é Natal, então estamos realizando uma pequena festa..."
10017050-140 = "Acho que também era um dia importante para a Brigada de Socorro. Em um dia desses, por que..."
10017050-142 = "É justamente por isso!"
10017050-143 = "...!?"
10017050-144 = "Não estou reclamando de vocês tirarem uma folga."
10017050-145 = "Mas, justamente neste dia de Natal, o Comitê de Justiça esquecer da justiça!"
10017050-146 = "Se for assim, não tenho escolha a não ser erguer meu escudo e ficar no caminho!"
10017050-147 = "Esse é o meu maior respeito por vocês, o Comitê de Justiça!"
10017050-148 = "A-ah... se possível, poderia começar a história desde o início...?"
10017050-149 = "Está tentando fingir que não sabe!? #nVocês confiscaram o frango dos delinquentes, não foi!?"
10017050-150 = "Seja o oponente um delinquente ou quem quer que seja, #nse o fato de que o Comitê de Justiça roubou algo permanece..."
10017050-151 = "Eu entregarei o 'socorro' de forma imparcial! Porque essa é a Brigada de Socorro!"
10017050-152 = "N-nós realmente confiscamos, mas aquele frango..."
10017050-153 = "Mesmo dizendo isso, vocês não entendem... #nOu será que decidiram que não querem entender?"
10017050-154 = "Seja qual for o caso, estou profundamente triste!"
10017050-160 = "...Saia da frente, Mashiro."
10017050-161 = "T-senpai Tsurugi?"
10017050-167 = "(Não entendo a situação nem o motivo, mas...)"
10017050-168 = "(Depois de tanto tempo, eles finalmente estão conseguindo descansar... não posso deixar que atrapalhem isso)"
10017050-171 = "Se as coisas chegaram a esse ponto, não há mais o que conversar. Entre."
10017050-172 = "Não, eu não posso fazer isso."
10017050-173 = "Não seria justiça da minha parte recuar enquanto a senpai está de pé!"
10017050-174 = "……Então me ajude."
10017050-175 = "Sim!"
10017050-177 = "Estou indo! 'Onde houver necessidade de socorro, lá estaremos'!"
