[translation]
10017050-1 = "第５話;シビレル・ウォー"
10017050-2 = "カフェ「White&Mason」"
10017050-3 = "あの……えっと、こういうのは久しぶりと言うか、ほとんど初めてでして……"
10017050-4 = "ど、どう振舞えば良いものか……。"
10017050-6 = "固くなることはありません。"
10017050-7 = "美味しいスコーンとケーキ、そして香りの良い紅茶……。"
10017050-8 = "せめてそれらを、好きに味わっていただければ。"
10017050-13 = "で、ですがその……私たち、ハスミ副委員長みたいに品のある飲み方も知らなくて……。"
10017050-14 = "多分私の舌だと、紅茶の良さも分からず……。"
10017050-16 = "気にする必要は無いですよ。"
10017050-17 = "それらが楽しみ方を添えてくれることがあるとはいえ、知識が無いと味わえないということではありません。"
10017050-18 = "何よりこの場は、皆さんの一年間の頑張りを労う場所。"
10017050-23 = "あなたたちが楽しめるように、好きに楽しめば良いのです。#nさあ、どうぞ召し上がってください。"
10017050-24 = "あ、ありがとうございます……。"
10017050-25 = "ところで……ミルクティーを淹れる時は、牛乳に紅茶を注ぐのが正しいでしょうか、それとも紅茶に牛乳を注ぐのが良いのでしょうか？"
10017050-26 = "紅茶の中に、冷たい牛乳を注ぐのが正しいのでは？#nそうすると熱い紅茶を牛乳が冷ましてくれて、飲みやすいですし。"
10017050-27 = "……でもよく考えると、温めた牛乳に紅茶を注ぐ方が正しくないでしょうか？#nその方が牛乳の香ばしい味と紅茶が調和し、より深い味を出してくれるのでは？"
10017050-28 = "ですが、牛乳を温める過程で表面に薄い膜ができちゃいますよ？"
10017050-29 = "結果的に紅茶に変なものが混ざり、せっかくの味が勿体ないです！"
10017050-30 = "それは何も知らないからそう思うんです！#n紅茶に牛乳を注ぐとタンパク質が変異して変わった香りが生まれてしまい、"
10017050-31 = "紅茶の成分と混ざって、紅茶の渋みに影響する乳脂肪まで変異します。結果として、味の調節ができません！"
10017050-32 = "逆に牛乳の中へと紅茶を注ぐと、一定温度以上にお茶が熱くならないので変異が起きません。ミルクティーの味を完全に楽しめます！"
10017050-33 = "それでも紅茶に牛乳！"
10017050-34 = "牛乳に紅茶！"
10017050-36 = "お、落ち着いてください。"
10017050-38 = "はっ！ご、ごめんなさいハスミ副委員長……！"
10017050-39 = "つい夢中になってしまい、醜態を……!"
10017050-41 = "いえ、構いません。ですがそれは、危険な質問ですよ。"
10017050-42 = "危険な質問……？"
10017050-43 = "はい。なにせあの質問は、100年以上も論争が終わらないものなのですから。"
10017050-44 = "未だに、明確な結論は出ていません。"
10017050-45 = "牛乳に紅茶を注いだ方が、少し渋みを減らせるとも言われていますが……"
10017050-46 = "先ほど仰っていたように、その渋みを調節して楽しむ方もいます。それに、牛乳を加熱する時に出る風味が良いという方も……"
10017050-47 = "「牛乳に紅茶を注ぐ派」と「紅茶に牛乳を注ぐ派」に分かれてしまい、争いが絶えないのです。"
10017050-49 = "そ、そうだったんですね……！"
10017050-50 = "では……気楽に嗜む方針で、頂くことにします！"
10017050-52 = "思っていたよりはみなさん楽しめているようで、何よりです。"
10017050-53 = "……ツルギ、大丈夫ですか？"
10017050-61 = "きえぇ……"
10017050-62 = "ツルギ、もう少し肩の力を……"
10017050-63 = "さあ。この紅茶とお茶菓子、好きでしょう？"
10017050-64 = "……嫌いじゃない。"
10017050-65 = "だけど……"
10017050-66 = "……私が席にいるだけで、誰かしらが緊張する。"
10017050-67 = "そうは言っても、同じ正義実現委員会ですよ。#nそれに委員長なんですから、そこまで気にしなくても……"
10017050-68 = "努力、する……。"
10017050-69 = "それなら良いのですが……。"
10017050-71 = "カフェ「White&Mason」入口"
10017050-75 = "あの、マシロ？一体何を……？"
10017050-76 = "ご覧の通り、警備中です。"
10017050-77 = "で、でも、せっかくのクリスマスパーティーなのに"
10017050-78 = "確かにそうです。#nですが、いえだからこそ、みなさんがそれを楽しめるように……！"
10017050-79 = "それもまた、一つの正義なので！"
10017050-81 = "分かるけど……マシロも、少しくらいは楽しんだら……？"
10017050-82 = "大丈夫です。正義を守ることは、#n私にとって「パーティー」と同様なので！"
10017050-83 = "えぇ……？#nでも、その……。"
10017050-89 = "……交代だ。"
10017050-94 = "い、委員長！？"
10017050-95 = "ツルギ先輩？どうかしましたか？"
10017050-97 = "……交代に来た。"
10017050-102 = "ですが先輩は……"
10017050-103 = "わ、私はこれで失礼します……！"
10017050-109 = "……大丈夫ですか？"
10017050-110 = "……こっちの方が楽だ。"
10017050-111 = "……分かりました。#nそれではまた後で来ますので、一旦お言葉に甘えて……"
10017050-113 = "――救護騎士団が正義実現委員会に、聞きたいことがあります！"
10017050-118 = "な、何ですか、急に変な形で繋げて……。"
10017050-119 = "って、救護騎士団のミネ団長じゃないですか。"
10017050-120 = "どうかしましたか？何かご用事が？"
10017050-122 = "確認させてください。あなた方正義実現委員会は今日、#n不良たちからクリスマスチキンを回収したのですか？"
10017050-127 = "……？ "
10017050-128 = "（回収……したな)"
10017050-129 = "（事実は明確に伝えるのが、正義に繋がりますよね)"
10017050-130 = "はい、そうですね。"
10017050-132 = "左様でしたか……"
10017050-133 = "私は悲しいです！！"
10017050-134 = "せっかくのクリスマスに、正義実現委員会が正義を見失うだなんて！"
10017050-135 = "ど、どういうことですか……？"
10017050-136 = "先ほど認めた以上、知らないとは言わせません……#nそれとも、本当に見失ってしまったと？"
10017050-137 = "戻ってきてください、正義実現委員会！#nこれまでずっと、一緒に救護を実現してきたではありませんか！"
10017050-138 = "（……いつものことながら、わけが分からない)"
10017050-139 = "えっと、団長。#n今日はクリスマスということで、ささやかなパーティーを開催しているのですが……。"
10017050-140 = "救護騎士団にとっても大事な日だったかと思います。そんな日に、何を……？"
10017050-142 = "だからこそです！"
10017050-143 = "……！？"
10017050-144 = "休息を取ることに、文句を言っているのではありません。"
10017050-145 = "ですが他でもないこのクリスマスの日に、正義実現委員会が正義を失念するなんて！"
10017050-146 = "それならば私は、盾を持って立ちはだかるしかありません！"
10017050-147 = "それがあなた達、正義実現委員会への最大限の敬意です！"
10017050-148 = "あ、あの……できれば最初の方からお話を……。"
10017050-149 = "しらを切るつもりですか！？#n不良たちのチキンを回収したのでしょう！？"
10017050-150 = "相手が不良であれ何であれ、#n正義実現委員会が物を奪ったという事実が変わらないのであれば……！"
10017050-151 = "私は公平に、「救護」を届けます！それが救護騎士団ですから！"
10017050-152 = "た、確かに回収しましたが、あのチキンは……!"
10017050-153 = "ここまで申し上げても分からないとは……#nそれとも、分からなくて良いと決意してしまったのですか？"
10017050-154 = "どちらだとしても、私は悲しい限りです！"
10017050-160 = "……どけ、マシロ。"
10017050-161 = "つ、ツルギ先輩？"
10017050-167 = "（事情もわけも分からないが……)"
10017050-168 = "（久しぶりに、あいつらが休息を取れてるこの状況……邪魔させるわけにはいかない)"
10017050-171 = "こうなったら話は通じない、中に入れ。"
10017050-172 = "いえ、それはできません。"
10017050-173 = "先輩が立っているのに私だけが引くなんて、正義ではありませんから！"
10017050-174 = "……じゃあ手伝え。"
10017050-175 = "はい！"
10017050-177 = "参ります！『救護が必要な場に救護を』！"
