[translation]
1007806-1 = "Pedido de resgate nas profundezas das montanhas"

1007806-2 = "(Ele correu para o lugar que Kasumi o enviou.)"

1007806-6 = "Hahahahaha! #nÉ um lugar tranquilo então você não ouvirá passos!"

1007806-7 = "Eu disse que não havia necessidade de tanta pressa... bem, eu esperava que algo assim acontecesse."

1007806-8 = "Uau! Sensei!"

1007806-9 = "Por aqui, por aqui!"

1007806-11 = "Ugh... isso é constrangedor. #nMas não posso deixar de pedir ajuda..."

1007806-12 = "Obrigado, senhor. Como devo me desculpar quando já estou ocupado?"

1007806-13 = "……sim? Mais importante ainda, você está bem com seus ferimentos?"

1007806-14 = "Oh, não é uma lesão grave! #nHahaha, está tudo bem!"

1007806-15 = "Sinto muito por você se você me deixa tão preocupado..."

1007806-16 = "Quando eu estava andando por uma trilha na montanha para encontrar um lugar nesta área, minha sandália quebrou e tropecei."

1007806-17 = "Só torci um pouco a perna, mas não era como se eu estivesse sangrando! #nEntão não entre em pânico."

1007806-18 = "É verdade! Se você não acredita muito nisso, por que não dá uma olhada?"

1007806-19 = "...Olha, aqui está! É aqui que estão meus pés!"

1007806-20 = "Não está inchado, está? Bem, estava um pouco arranhado, mas não foi um grande arranhão. #nA reação da Senseia é demais."

1007806-21 = "...Por que você veio para um lugar como esse sozinho?"

1007806-22 = "Isso se deve à “investigação preliminar”. Depois de decidir os pontos, você deve ir e verificá-los."

1007806-23 = "Não há problema aqui, mas os pontos de fontes termais geralmente estão localizados em áreas urbanas."

1007806-24 = "Se várias pessoas estiverem agindo juntas, isso chamará a atenção das pessoas."

1007806-25 = "Portanto, estou basicamente conduzindo a investigação sozinho. Isso é mais eficiente."

1007806-26 = "Ha ha ha. Você achou que ele estava apenas olhando para o mapa?"

1007806-27 = "……sim?"

1007806-28 = "……lei? E então, você está curioso para saber os resultados desta pesquisa?"

1007806-29 = "Hmm, infelizmente aqui..."

1007806-30 = "...Você perdeu!"

1007806-31 = "Hahahahaha! ! Foi um fracasso total! ! #nAbsolutamente não vale a pena explodir!"

1007806-32 = "Não há sinal de uma fonte termal particularmente boa e, mesmo depois da explosão, o cenário é bastante simples."

1007806-33 = "Não acho que nada de interessante acontecerá no processo. Tudo não é suficiente."

1007806-34 = "Nunca esperei que cometeria tal erro. #nHahahahaha!"

1007806-35 = "Além disso, não é legal que até as sandálias estejam quebradas...suspiro."

1007806-36 = "Sim, senhor."

1007806-37 = "...Você trouxe o que eu pedi?"

1007806-38 = "[s1] \"Você está bem com isso?\"\n[s2] Tire as sandálias que você trouxe."

1007806-41 = "Hahahaha! Como esperado, Sensei! Eu acreditei!"

1007806-42 = "Pois bem, vamos resolver isso imediatamente. #nNão há mais necessidade de ficar aqui, então irei até o próximo ponto de águas termais..."

1007806-43 = "...?"

1007806-44 = "O que há de errado, senhor? Eu gostaria que você me desse isso logo..."

1007806-45 = "……foto?"

1007806-46 = "Ah, nas costas...? #n Sensei? Meu?"

1007806-47 = "Hum...?"

1007806-48 = "Hummm...! ?"

1007806-49 = "...Mmmmmmmmmmm! ?"

1007806-53 = "...Bem, é isso."

1007806-54 = "...Isso é absolutamente verdade?"

1007806-55 = "Eu me sinto um pouco... estranhamente envergonhado..."

1007806-56 = "Bem, eu torci o tornozelo, então é um pouco difícil andar..."

1007806-57 = "Posso descer devagar... bem, se você me emprestar seu ombro, é isso..."

1007806-58 = "... Nas costas... Nas costas, hein..."

1007806-59 = "Hummm..."

1007806-60 = "...Absolutamente?"

1007806-61 = "[s3] \"Sim, com certeza.\"\n[s4] \"Ele está ferido.\""

1007806-64 = "Hmmmmmm... sim."

1007806-65 = "Bem, então... e-eu não posso evitar...?"

1007806-66 = "Ha, ha ha, ha ha ha ha… ha ha ha…! !"

1007806-70 = "Ha, eu não esperava que o Sensei fosse tão agressivo. #nEsta é a primeira vez que me sinto tão envergonhado."

1007806-71 = "Se alguém me visse, não suspeitaria que tínhamos um relacionamento especial? #nOu o Sensei não se importa se você for mal compreendido?"

1007806-72 = "...E de qualquer forma, eu entendi. Quando você chegar lá embaixo, você vai me dar sandálias, certo? #nVocê me promete isso?"

1007806-73 = "...Eu vejo. Se for esse o caso, por favor me ajude, Sensei."

1007806-80 = "[ns5] \"...Kasumi?\"\n[ns6] \"O que há de errado?\""

1007806-83 = "Não, não... bem, só estou pensando em uma coisa."

1007806-84 = "…………Haha."

1007806-85 = "De alguma forma, relembrando a pesquisa de hoje..."

1007806-87 = "...Talvez não tenha sido tudo em vão, pensei."

