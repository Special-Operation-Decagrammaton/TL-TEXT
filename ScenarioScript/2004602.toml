[translation]
2004602-1 = "No céu, as nuvens da liberdade flutuam."
2004602-3 = "Ora, ora, que chegada rápida."
2004602-4 = "Não esperava que viesse com tanta pressa..."
2004602-5 = "Nya-ha~, estou tão feliz que quase vou chorar."
2004602-6 = "[ns] \"E os perseguidores? Você se machucou?\""
2004602-7 = "De alguma forma, por enquanto, estou bem."
2004602-8 = "Consegui despistá-los por ora, mas não sei quando vão me encontrar de novo..."
2004602-9 = "Você tem alguma ideia de quem são os perseguidores?"
2004602-10 = "...Hmm, vejamos."
2004602-11 = "Eu não faço a menor ideia, na verdade~"
2004602-12 = "Bem, na verdade, há tantos suspeitos que... ser popular é difícil."
2004602-13 = "O Departamento de Yin-Yang tem muitos inimigos, sabe. Eu também tenho incontáveis rivais políticos. #nPor isso, tenho um pedido a lhe fazer—"
2004602-14 = "Poderia ficar ao meu lado até que eu esteja em segurança?"
2004602-15 = "Se eu estiver com o Sensei do Schale, eles não conseguirão chegar perto tão facilmente~"
2004602-16 = "[s] \"É um pedido simples.\""
2004602-17 = "Nya-ha! Tem certeza? Aceitou tão rápido assim~"
2004602-18 = "Já que decidimos... que tal aproveitarmos para fugir juntos?♪"
2004602-20 = "（Depois disso, fugi com Niya pela Região Autônoma de Hyakkiyako...）"
2004602-22 = "Praça Central - Palco ao Ar Livre"
2004602-23 = "Que vista magnífica~ Que vista magnífica~!"
2004602-24 = "Seus... covardes!!!"
2004602-32 = "Nya-ha~♪ Ouvi dizer que a Associação de Comerciantes se esforçou bastante, mas—"
2004602-33 = "Puxa, eles tinham motivos para se gabar."
2004602-34 = "Como encerramento do festival, não há nada do que reclamar~♪"
2004602-38 = "Oh? Sensei, você está com uma expressão complicada... #nNão gostou do que viu?"
2004602-39 = "Para mim, pareceu uma ótima apresentação..."
2004602-40 = "Nya-ha~, será que... é a primeira vez que você assiste a um Kabuki?"
2004602-41 = "Ah, ah, ah~, então isso explica tudo~!"
2004602-42 = "Pode ser difícil de entender de primeira, mas depois que você pega o jeito, vicia, sabe?"
2004602-43 = "[ns1] \"Não, não é isso...\"\n[ns2] \"Os perseguidores estão bem?\""
2004602-46 = "Sensei."
2004602-47 = "Já ouviu aquele ditado? #n\"Para esconder uma árvore, esconda-a na floresta.\""
2004602-48 = "Exatamente... \"Para esconder uma pessoa, esconda-a no festival\"♪"
2004602-49 = "Recebemos informações de que ela foi vista por aqui!"
2004602-53 = "Desta vez não vamos deixar escapar!"
2004602-54 = "Ora, ora. Acho que ficamos tempo demais por aqui."
2004602-55 = "Vamos, vamos nos mover antes que sejamos descobertos~♪"
2004602-60 = "Rua de Exposição de Dramas de Época"
2004602-61 = "Vamos, vamos! Quem é o próximo desafiante?"
2004602-62 = "Ufa~ Assistir é uma coisa, mas fazer é completamente diferente!"
2004602-63 = "Sim. Valeu a pena ter vindo até aqui."
2004602-65 = "Uma atração interativa, hein? #nJá que estamos aqui~ por que não mostra sua bravura, Sensei?"
2004602-66 = "[s3] \"Não gosto de chamar atenção...\"\n[s4] \"Não gosto de sair da multidão...\""
2004602-69 = "O prêmio por vencer o desafio é... um card de Mushiqueen...?"
2004602-70 = "Se não me engano, é aquele jogo de cartas que está na moda."
2004602-71 = "Dizem que tem fãs fervorosos de todas as idades."
2004602-72 = "Hmm, isso não parece ser o suficiente para atrair a atenção do Sensei—"
2004602-73 = "[ns5] \"Aquilo é...?\"\n[ns6] \"A carta lendária que só existem 4 em todo o Kivotos!?\""
2004602-76 = "Nya-ha!?"
2004602-77 = "O modo sério do Sensei... nunca imaginei que veria isso dessa forma."
2004602-78 = "O desenrolar das coisas foi um pouco diferente do que eu esperava~"
2004602-79 = "Bem, se foi divertido, então está tudo bem. Nyahaha!"
2004602-80 = "Achei! Eles estão ali!"
2004602-84 = "Professor, por aqui. Cuidado para não bater a cabeça, viu?"
2004602-86 = "(Enquanto despistávamos os perseguidores, corri por vários lugares de Hyakkiyako junto com Niya)"
2004602-87 = "(Quando me dei conta, a noite já tinha caído completamente)"
2004602-90 = "O vento está tão agradável~♪"
2004602-91 = "O aroma deste vento muda a cada estação~ Na primavera é cerejeira, no verão é..."
2004602-92 = "...Bem, seria um desperdício contar tudo agora... Você deveria vir aqui e experimentar por si mesmo."
2004602-93 = "Nyahaha, essa é a fala clássica dos guias turísticos~"
2004602-94 = "Todos os alunos de Hyakkiyako dizem exatamente a mesma coisa."
2004602-95 = "Eu também sou uma aluna de Hyakkiyako, afinal~"
2004602-96 = "...Eh? Professor, você disse que "eu amo muito Hyakkiyako"?"
2004602-97 = "Isso é óbvio, não é?"
2004602-98 = "[ns] \"Deixando isso de lado...\""
2004602-100 = "[ns] \"Não estamos chamando atenção demais aqui?\""
2004602-103 = "Encontramos vocês!"
2004602-104 = "Rendam-se!"
2004602-106 = "[ns9] \"Fomos descobertos!?\"\n[ns10] \"Eu vou segurá-los, fuja rápido!\""
2004602-109 = "Kyaa, o Professor é tão confiável!"
2004602-110 = "...Mas não se preocupe. Não precisa nem se mover, Professor~"
2004602-111 = "Ehem, bem, bem, pessoal do Departamento Yin-Yang~?"
2004602-112 = "Como podem ver, eu estava apenas guiando o Professor por Hyakkiyako~"
2004602-113 = "Isso também é um trabalho importante, não é?"
2004602-115 = "Ah, Professor. Boa noite..."
2004602-116 = "Eu achei que você estivesse matando aula como sempre..."
2004602-118 = "Snif... Não acredito que não confiam em mim desse jeito..."
2004602-119 = "Eu jamais mataria o trabalho, sabe~"
2004602-120 = "Que falta de educação, não acha, Professor?"
2004602-121 = "[ns] \"Niya...\""
2004602-123 = "[ns] \"Não deixe seus veteranos tão preocupados assim.\""
2004602-124 = "Nyaha~! É mesmo~? Bem, acho que sim."
2004602-125 = "A festa está no auge, mas vamos encerrar por aqui. #nAté a próxima!"
2004602-127 = "(Embora Niya tenha se despedido com sua atitude despreocupada--)"
2004602-128 = "(Foi marcante ver que ela estava sendo segurada firmemente pelos braços pelos seus veteranos...)"
