[translation]
2004602-1 = "天には自由の雲が流るる"
2004602-3 = "あれま、お早いご到着で。"
2004602-4 = "こんなに急いで来てくださるなんて……。"
2004602-5 = "にゃは～嬉しくて泣いてしまいそうです。"
2004602-6 = "[ns] \"追っ手は？怪我はない？\""
2004602-7 = "どうにか今のところは。"
2004602-8 = "ひとまずは撒きましたが、いつまた見つかってしまうか……。"
2004602-9 = "追っ手の心当たりですか？"
2004602-10 = "……うーん、そうですねぇ。"
2004602-11 = "これが皆目見当もつかないんですよ～"
2004602-12 = "いやはや思い当たる節が多すぎて……人気者は大変です。"
2004602-13 = "陰陽部は敵が多いですからねぇ。私も数え切れないほどの政敵がいるのですよ。#nそこで一つ、お願いがありまして――"
2004602-14 = "安全になるまで傍にいていただけませんか？"
2004602-15 = "シャーレの先生と一緒なら、そうそう手出しできないでしょうし～"
2004602-16 = "[s] \"お安い御用だよ。\""
2004602-17 = "にゃははっ！よろしいんですか？二つ返事なんてしちゃって～"
2004602-18 = "そうと決まれば……逃避行としゃれこみましょか♪"
2004602-20 = "（その後、ニヤと一緒に百鬼夜行の自治区を逃げ回り……）"
2004602-22 = "中央広場 野外ステージ"
2004602-23 = "絶景かな～絶景かな～！"
2004602-24 = "よ～わ～む～し～め～ら～！！！"
2004602-32 = "にゃは〜♪商人会がかなり力を入れたとは聞いていましたけど――"
2004602-33 = "いやはや、自慢するだけのことはあります。"
2004602-34 = "お祭りの締めくくりとして、文句のつけようもないですねぇ～♪"
2004602-38 = "おやぁ？先生、なんとも言えない複雑な表情ですが……#nお気に召さなかったですか？"
2004602-39 = "私には良い公演に見えましたが……。"
2004602-40 = "にゃは～、もしかして……初めて歌舞伎を観たとか？"
2004602-41 = "あらあらあら～、それなら納得です～！"
2004602-42 = "初見じゃ難しくとも、ハマるとクセになるんですよねぇ、これが。"
2004602-43 = "[ns1] \"いや、そうじゃなくて……。\"\n[ns2] \"追っ手は大丈夫なの？\""
2004602-46 = "先生。"
2004602-47 = "聞いたことありません？#n「木を隠すなら森の中」って。"
2004602-48 = "まさに……「人を隠すならお祭りの中」というわけです♪"
2004602-49 = "この辺で見かけたって情報が入ったよ！"
2004602-53 = "今度こそ逃がさないで！"
2004602-54 = "あれま。さすがに長居しすぎましたかねぇ。"
2004602-55 = "さ、バレないうちに移動しましょか〜♪"
2004602-60 = "時代劇展示通り"
2004602-61 = "さぁさぁ！次の挑戦者は誰だ～？"
2004602-62 = "ふぅ〜観るとやるとじゃ全然違いますね！"
2004602-63 = "ええ。わざわざ来た甲斐がありましたよ。"
2004602-65 = "参加型のアトラクションですか。#nせっかくですし～先生も華麗な勇姿を披露してみては？"
2004602-66 = "[s3] \"目立つのはちょっと……。\"\n[s4] \"人ごみから出るのはちょっと……。\""
2004602-69 = "挑戦成功の景品は――ムシクイーンカード……？"
2004602-70 = "たしか巷で流行っているカードゲームでしたっけ。"
2004602-71 = "子供から大人まで熱狂的なファンがいるとかいないとか。"
2004602-72 = "う～ん、先生の気を引くには弱――"
2004602-73 = "[ns5] \"あれは……！？\"\n[ns6] \"キヴォトスに4枚しかない伝説のカード！？\""
2004602-76 = "にゃはっ！？"
2004602-77 = "先生の本気モード……まさかこんな形で見ることになるなんて。"
2004602-78 = "想定していた流れとはちょっと違いますけど〜"
2004602-79 = "ま、楽しければそれで良しってことで。にゃははっ！"
2004602-80 = "見つけた！あそこにいるよ！"
2004602-84 = "先生、こっちです。頭、ぶつけないでくださいよぉ？"
2004602-86 = "（追っ手をかわしつつ、ニヤと一緒に百鬼夜行のあちこちを駆け回った）"
2004602-87 = "（気づけば、すっかり夜が更けていた）"
2004602-90 = "風が気持ちいいですね～♪"
2004602-91 = "この風、季節ごとに香りが変わるんですよ～春は桜、夏は――"
2004602-92 = "――すべて言ってしまうのは野暮ですし……ぜひ足を運んで、体験してみてください。"
2004602-93 = "にゃはは、このセリフ、観光ガイドの鉄板トークでして～"
2004602-94 = "百鬼夜行の生徒は、口をそろえてこの説明になるんです。"
2004602-95 = "私だって、百鬼夜行の生徒ですし～？"
2004602-96 = "……え？先生、「百鬼夜行が大好きなんだね」なんて。"
2004602-97 = "そんなの当り前じゃあないですかぁ。"
2004602-98 = "[ns] \"それはそれとして……。\""
2004602-100 = "[ns] \"ここ、目立ちすぎじゃない？\""
2004602-103 = "見つけましたよ！"
2004602-104 = "観念してください！"
2004602-106 = "[ns9] \"バレたっ！？\"\n[ns10] \"私が食い止めるから早く逃げて！\""
2004602-109 = "きゃー、先生頼りになるー！"
2004602-110 = "……でも大丈夫ですよ。先生が動くまでもありませんから～"
2004602-111 = "おっほん、さてさて、陰陽部の皆さん～？"
2004602-112 = "ご覧の通り、先生に百鬼夜行をご案内していたところでして～"
2004602-113 = "これも立派なお仕事ですよねぇ？"
2004602-115 = "あ、先生。こんばんは……。"
2004602-116 = "いつものサボりだと思ってたのに……。"
2004602-118 = "ぐすん……こんなにも信用がないなんて……。"
2004602-119 = "この私が仕事をサボるわけないじゃないですか～"
2004602-120 = "失礼しちゃいますよねぇ、先生？"
2004602-121 = "[ns] \"ニヤ……。\""
2004602-123 = "[ns] \"あんまり後輩たちを困らせないであげてね。\""
2004602-124 = "にゃは～！やっぱり～？まぁ、そうですねぇ。"
2004602-125 = "宴もたけなわではございますが、ここらでお開きにいたしましょ。#nまたいつか～！"
2004602-127 = "（ニヤは飄々とした態度で挨拶をして立ち去ったものの――）"
2004602-128 = "（後輩たちに両腕をしっかり掴まれていたのが印象的だった……）"
