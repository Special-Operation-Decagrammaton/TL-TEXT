[translation]
10011050-1 = "第5話;第二関門：眠り姫"
10011050-7 = "はぁ、はぁ……何とか追っ手は振り切ったが……。"
10011050-8 = "相変わらずお姫様を誘拐した悪党は全力で逃走中！果たして誰が最初に、彼女たちを捕まえられるのか～！？"
10011050-9 = "ぜ、全部放送されてるっすよ！？"
10011050-10 = "これは一体、どういう状況なんだ……？"
10011050-11 = "ねぇねぇ、イブキは何もしなくて良いの？"
10011050-12 = "と、とにかく静かに！今は逃げるので精一杯だから！"
10011050-13 = "くそっ、次はどうすれば……！"
10011050-14 = "こっちこっち～。"
10011050-15 = "……！？"
10011050-21 = "聞いた話だと、こっちに逃げたはず……！"
10011050-27 = "さぁさぁ、誘拐されたお姫様を探して駆け回る各位……"
10011050-28 = "ゲヘナも百鬼夜行も混ざり合って、個性的な面々がたくさんですねぇ♪"
10011050-29 = "その中でも、特に目立っているのはこちら～。"
10011050-38 = "「忍術研究部」の、百鬼夜行の生徒ですねぇ～。"
10011050-39 = "まあ正式な部活ではないので、同好会みたいなものですが♪"
10011050-40 = "今回もしかしたら、同好会らしからぬ活躍を見せてくれるかもしれませんねぇ？"
10011050-41 = "にゃははっ♪では各位頑張ってくださいな、アデュ～♪"
10011050-43 = "あれ、大丈夫なのかな……？万魔殿の人が見たら怒るんじゃ……。"
10011050-44 = "[s] \"開き直り過ぎて、実際の状況はバレてない……みたいな感じかな？\""
10011050-45 = "元々、全体の構成としては、そういうイベントでしたし……中継をしない方が、もっと怪しいかも、です。"
10011050-46 = "うーん、まあそれはそうなんだけど……！"
10011050-47 = "[s] （……）"
10011050-49 = "部長！あそこです！"
10011050-50 = "あ、うん！"
10011050-51 = "（とにかく今は、あれこれ考えてる場合じゃない……みんなのためにも、立ち止まってなんていられない！）"
10011050-60 = "つ、強い……！"
10011050-61 = "何だあれ、全く隙が見えない……！"
10011050-62 = "……！？"
10011050-68 = "簡単には通さないよ～。"
10011050-69 = "[s] \"あ、ツバキ。\""
10011050-70 = "やあ、先生～。"
10011050-71 = "ここは第二関門「眠り姫」だよ……ふぁぁ……。"
10011050-72 = "ちょっと油断すると……すぐに……。"
10011050-73 = "やられる、危険な……"
10011050-74 = "……"
10011050-75 = "くぅ……。"
10011050-76 = "寝ちゃった！？"
10011050-77 = "んん……？あ、そういえばお姫様を誘拐した悪党は、この先へ逃げたよ……。"
10011050-78 = "ここを通過するための方法――ルールは簡単。"
10011050-79 = "アトラクションの説明を、してくれるのですね……！"
10011050-80 = "私が寝てる間に、このラインを通れればOK……"
10011050-81 = "つまり……Zzz……"
10011050-82 = "つまりどういうことでしょうか！？"
10011050-83 = "何ですかあれ、起きてるのか寝てるのか……百鬼夜行の生徒って、ああいうのばっかりなんですか？"
10011050-84 = "[s] \"「そんなことないよ！」とは言い切れない……\""
10011050-86 = "くっ！まさか、眠り姫のアトラクションだなんて……！"
10011050-87 = "寝てるのか起きてるのか分からない！どうしたら……！"
10011050-88 = "くぅー……。"
10011050-89 = "今だ！今は流石に寝落ちてるはず！"
10011050-90 = "ふぁ……。"
10011050-95 = "えぇぇ！？"
10011050-96 = "えっと……"
10011050-97 = "「寝てる隙にこのラインを通過したら合格、ラインを超える瞬間を気づかれたら失格」"
10011050-98 = "だから、そこのみんなは失格かな～……？"
10011050-120 = "う、うわあああっ！？"
10011050-122 = "みなさん、連れ去られてしまい、ましたね……強制退場、でしょうか……。"
10011050-123 = "[s] \"凝ってるなぁ……。\""
10011050-124 = "次の挑戦者は、誰……？"
10011050-125 = "これ、さっきの関門とは全然レベルが違うじゃん……！"
10011050-126 = "急いでるのに、こんなのどうすれば……！"
10011050-127 = "部長、そして主殿！ここはイズナにお任せを！"
10011050-128 = "イズナ、ちゃん？"
10011050-129 = "イズナ、何か方法でもあるの？"
10011050-130 = "はい！こんなこともあろうかと、備えておいたのです！"
10011050-131 = "[s] \"こんなこと、普通あるのかな……。\""
10011050-132 = "この忍具、「聞き筒」を使って……！"
10011050-133 = "ツバキ殿が寝ているのかどうか……あの「タヌキ寝入りの術」を、看破してみせます！"
10011050-136 = "イズナちゃん、頑張って……！"
10011050-137 = "よ、良し！やっちゃえイズナ！"
10011050-138 = "では……！"
10011050-141 = "……。"
10011050-142 = "くぅ……"
10011050-143 = "……。"
10011050-144 = "すやぁ……。"
10011050-145 = "……。"
10011050-146 = "…………。"
10011050-152 = "今です！！！"
10011050-157 = "シュバババババッ！！！"
10011050-159 = "イズナ、やりました！"
10011050-160 = "んん……？"
10011050-164 = "あ、おめでとう～。"
10011050-166 = "す、すごい！何だあの技は……！"
10011050-167 = "あの眠り姫の試練を突破した！？"
10011050-168 = "誰だあいつ！？"
10011050-169 = "イズナ、すごい！"
10011050-170 = "さすが、イズナちゃんです……！"
10011050-175 = "[ns1] \"いつの間にかイズナが、忍者として成長している……！\"\n[ns2] \"先生は胸がいっぱいだよ……。\""
10011050-178 = "……よく分かりませんが、手放しで褒めた方が良い流れですか？"
10011050-179 = "よし、じゃあ私たちも……"
10011050-186 = "のわぁっ！？び、びっくりした！？"
10011050-187 = "ど、どうして急に撃ってくるのさ！？"
10011050-189 = "んー……。"
10011050-190 = "全員が突破できたわけじゃ、ないよね……？"
10011050-191 = "……え？"
10011050-193 = "[ns] \"なるほど。っていうことは、この場合……？\""
10011050-194 = "とはいえ、ひとりは突破できたわけだし……"
10011050-195 = "じゃあ、特別ルール。"
10011050-196 = "他のみんなは、私に勝てたらOKってことにしよっか。"
10011050-197 = "さて、第二関門眠り姫……「ツバキ」、いくよ～。"
