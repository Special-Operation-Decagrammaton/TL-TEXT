[translation]
10011050-1 = "Episódio 5; Segundo Obstáculo: A Bela Adormecida"
10011050-7 = "Haa, haa... consegui despistar os perseguidores, mas..."
10011050-8 = "Como sempre, os vilões que sequestraram a princesa estão fugindo a todo vapor! Quem será que vai capturá-los primeiro~?!"
10011050-9 = "E-está sendo tudo transmitido!?"
10011050-10 = "Que tipo de situação é essa, afinal...?"
10011050-11 = "Ei, ei, a Ibuki não precisa fazer nada?"
10011050-12 = "D-de qualquer forma, silêncio! Estamos fazendo o máximo para fugir agora!"
10011050-13 = "Droga, o que eu faço agora...!"
10011050-14 = "Por aqui, por aqui~."
10011050-15 = "...!?"
10011050-21 = "Pelo que ouvi, elas deveriam ter fugido por aqui...!"
10011050-27 = "Muito bem, muito bem, todos correndo atrás da princesa sequestrada..."
10011050-28 = "Temos gente de Gehenna e de Hyakkiyako misturada, um pessoal bem peculiar, não é?♪"
10011050-29 = "Dentre eles, quem mais se destaca é este grupo aqui~."
10011050-38 = "São as alunas do \"Clube de Pesquisa de Ninjutsu\" de Hyakkiyako."
10011050-39 = "Bem, não é um clube oficial, então é mais como um grupo de interesse, mas♪"
10011050-40 = "Será que desta vez elas vão mostrar um desempenho que não condiz com um simples grupo de interesse?"
10011050-41 = "Nyahaha♪ Então, boa sorte a todos, adeus~♪"
10011050-43 = "Ei, será que isso é seguro...? Se o pessoal do Pandemonium vir, não vão ficar bravos...?"
10011050-44 = "[s] \"Acho que, como eles estão agindo com tanta naturalidade, ninguém percebeu a situação real...\""
10011050-45 = "Originalmente, a estrutura do evento era essa... talvez fosse mais suspeito se não estivéssemos transmitindo."
10011050-46 = "Hmm, bem, isso é verdade, mas...!"
10011050-47 = "[s] (...)"
10011050-49 = "Chefe! É ali!"
10011050-50 = "Ah, sim!"
10011050-51 = "(De qualquer forma, agora não é hora de pensar nessas coisas... pelo bem de todos, não posso parar aqui!)"
10011050-60 = "F-forte...!"
10011050-61 = "O que é aquilo? Não vejo brecha nenhuma...!"
10011050-62 = "...!?"
10011050-68 = "Não vou deixar vocês passarem tão fácil~."
10011050-69 = "[s] \"Ah, Tsubaki.\""
10011050-70 = "Olá, Sensei~."
10011050-71 = "Este é o segundo obstáculo, a \"Bela Adormecida\"... yaaawn..."
10011050-72 = "Se você baixar a guarda um pouco... logo..."
10011050-73 = "Você será derrotado, é perigoso..."
10011050-74 = "..."
10011050-75 = "Zzz..."
10011050-76 = "Ela dormiu!?"
10011050-77 = "Hmm...? Ah, falando nisso, os vilões que sequestraram a princesa fugiram por ali..."
10011050-78 = "O método para passar por aqui — a regra é simples."
10011050-79 = "Ela vai explicar a atração para nós...!"
10011050-80 = "Se você conseguir passar por esta linha enquanto eu estiver dormindo, está tudo bem..."
10011050-81 = "Ou seja... Zzz..."
10011050-82 = "Ou seja, o que isso significa!?"
10011050-83 = "O que é isso? Ela está acordada ou dormindo? As alunas de Hyakkiyako são todas assim?"
10011050-84 = "[s] \"Não dá para dizer que 'não são todas assim!'...\""
10011050-86 = "Droga! Quem diria que seria uma atração da Bela Adormecida...!"
10011050-87 = "Não dá para saber se ela está dormindo ou acordada! O que eu faço...!"
10011050-88 = "Zzz..."
10011050-89 = "Agora é a hora! Ela deve estar dormindo profundamente agora!"
10011050-90 = "Ah... hum."
10011050-95 = "Ehhh!?"
10011050-96 = "Bem..."
10011050-97 = "“Se passar por esta linha enquanto eu estiver dormindo, você passa. Se eu perceber o momento em que cruzar a linha, você está desclassificado.”"
10011050-98 = "Então, acho que todos vocês aí estão desclassificados, né...?"
10011050-120 = "U-uwaaaaah!?"
10011050-122 = "Pessoal, vocês foram levados embora... será que isso é uma expulsão forçada...?"
10011050-123 = "[s] \"Que dedicação...\""
10011050-124 = "Quem é o próximo desafiante...?"
10011050-125 = "Isso não tem nada a ver com o nível do desafio anterior...!"
10011050-126 = "Estamos com pressa, o que vamos fazer...!"
10011050-127 = "Chefe, e Mestre! Deixem isso com a Izuna!"
10011050-128 = "Izuna?"
10011050-129 = "Izuna, você tem algum plano?"
10011050-130 = "Sim! Eu estava preparada justamente para uma situação como esta!"
10011050-131 = "[s] \"Será que situações assim acontecem com frequência...?\""
10011050-132 = "Usando esta ferramenta ninja, o \"tubo de escuta\"...!"
10011050-133 = "Vou descobrir se a Tsubaki está realmente dormindo... vou desmascarar essa \"técnica de fingir sono\"!"
10011050-136 = "Izuna, boa sorte...!"
10011050-137 = "I-isso! Vai lá, Izuna!"
10011050-138 = "Então...!"
10011050-141 = "..."
10011050-142 = "Kuu..."
10011050-143 = "..."
10011050-144 = "Zzz..."
10011050-145 = "..."
10011050-146 = "............"
10011050-152 = "Agora!!!"
10011050-157 = "Shubabababa!!!"
10011050-159 = "Izuna, consegui!"
10011050-160 = "Hmm...?"
10011050-164 = "Ah, parabéns~."
10011050-166 = "I-incrível! Que técnica foi aquela...!"
10011050-167 = "Ela superou o teste da Bela Adormecida!?"
10011050-168 = "Quem é aquela!?"
10011050-169 = "Izuna, incrível!"
10011050-170 = "Como esperado da Izuna...!"
10011050-175 = "[ns1] \"A Izuna cresceu tanto como ninja sem que eu percebesse...!\"\n[ns2] \"O coração do Sensei está transbordando de orgulho...\""
10011050-178 = "...Não entendi muito bem, mas parece que é o momento de elogiar sem reservas, né?"
10011050-179 = "Certo, então nós também..."
10011050-186 = "Nowaa!? Q-que susto!?"
10011050-187 = "P-por que você começou a atirar de repente!?"
10011050-189 = "Hmm..."
10011050-190 = "Não é como se todos tivessem conseguido passar, né...?"
10011050-191 = "...Hã?"
10011050-193 = "[ns] \"Entendi. Então, nesse caso...?\""
10011050-194 = "Dito isso, uma pessoa conseguiu passar..."
10011050-195 = "Então, regra especial."
10011050-196 = "Para os outros, se conseguirem me vencer, está tudo bem."
10011050-197 = "Muito bem, segunda barreira, a Bela Adormecida... \"Tsubaki\", lá vou eu~."
