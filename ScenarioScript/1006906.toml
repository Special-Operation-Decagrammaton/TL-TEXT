[translation]
1006906-1 = "Eu não me importo, ok?"
1006906-2 = "(Passos leves em direção à Câmara de Comércio de Genbutu)."
1006906-6 = "O Genbutsu Shokai"
1006906-8 = "Fico feliz que tenha chegado a tempo, doutor."
1006906-9 = "Estamos prestes a cozinhar os bolinhos no vapor."
1006906-10 = "Eu realmente queria mostrar a você a parte de cima da embalagem, mas #n esse acabou na fase da manhã."
1006906-11 = "Então, vamos começar em ......."
1006906-12 = "Todos! Acendam o fogo!"
1006906-18 = "(Ao mesmo tempo em que a Lumi chamou, todos os vapores começaram a soltar vapor de uma só vez)."
1006906-20 = "Não é incrível? Este vapor."
1006906-21 = "Enquanto os bolinhos estão fumegando, a cozinha se torna uma sauna."
1006906-22 = "[s1] \"De fato, ...... está muito quente. \"\n[s2] \"Você poderia esperar lá fora. \""
1006906-25 = "Hmmm, essa é uma pergunta difícil."
1006906-26 = "Tive que ajustar a posição do vaporizador."
1006906-27 = "Caso contrário, a intensidade do vapor seria desigual."
1006906-28 = "Está quente, então o sensei deve ficar na entrada. #nEu tenho que cuidar dos bolinhos."
1006906-32 = "(Como Lumi me disse, esperei perto da entrada ......)"
1006906-37 = "[ns] \"erm......ru, Rumi? \""
1006906-38 = "...... Hmm? O que há de errado, doutor?"
1006906-41 = "[wa:1100]- [log=루미]Oh ......[wa:600] Estou vendo. [wa:1200]É um pouco [wa:300]transparente, não é? [/log]"
1006906-44 = "[wa:500]- [log=루미]Bem, [wa:800]não importa. [wa:1100]Não é como se isso fosse diminuir. [/log]"
1006906-47 = "[wa:950]- [log=루미]......Se eu soubesse que isso aconteceria,[/log]"
1006906-49 = "[wa:100]- [log=루미]Eu teria feito roupas íntimas mais bonitas. [/log]"
1006906-52 = "[wa:600]- [log=루미]Talvez tenha sido um pouco [wa:1200]perdulário? [/log]"
1006906-55 = "[wa:100]- [log=루미]haha, [wa:1600]eu desviei o olhar. [/log]"
1006906-57 = "[wa:600]- [log=루미]Eu [wa:400]não [wa:300]me importo nem um pouco? [/log]"
1006906-60 = "[wa:550]- [log=루미]Os professores são [wa:1800]surpreendentemente assim. ......[/log]"
1006906-62 = "[wa:100]- [log=루미]Ufa, [wa:1300]Gostei. [/log]"
1006906-65 = "[wa:800]- [log=루미]Já que estamos aqui,[/log]."
1006906-67 = "[wa:100]- [log=루미]Vamos [wa:600]irritá-lo mais um pouco ......? [/log]"
1006906-70 = "Muito bem, está muito bem feito."
1006906-71 = "Fiz um \"especial\" para o sensei."

1006906-78 = "[ns3] \"\"}Lu, Lumi! \"\n[ns4] \"Este é o ......! "
1006906-81 = "O que está acontecendo? O que há de errado?"
1006906-82 = "Outro dia, comi algo chamado torta de sardinha no Trinity. #Estava muito gostosa!"
1006906-83 = "Fiz \"bolinhos de sardinha\" para ver se poderíamos fazer algo semelhante em casa."

1006906-84 = "A torta de sardinha parece ser uma receita secreta na Trinity. #Eu posso garantir o sabor."
1006906-85 = "Os bolinhos \"especiais\" que fiz para o sensei. ...... São gostosos, não são?"

1006906-90 = "[ns5] \"guha......! \"\n[ns6] \"Estou feliz, mas isso é um pouco ......! \""
1006906-94 = "O que há de errado com ele? É um prato cheio de tradição e história da Trinity, sabe? #Mas ele tem nosso próprio toque."
1006906-95 = "Agora, coma rapidamente. #nFoi particularmente difícil manter a forma dessa sardinha ......."
1006906-98 = "[ns] \"Goho! \""
1006906-100 = "(instada, ela pega os bolinhos com medo e os joga na boca, sim, sim)"
1006906-101 = "(Justamente quando você pensou que estava prestes a encontrar o sabor mais inimaginável ......)"
1006906-106 = "(Uma vez que o provei, estava inesquecivelmente delicioso)"
