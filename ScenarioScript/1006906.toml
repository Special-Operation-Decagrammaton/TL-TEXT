[translation]
1006906-1 = "気にしてないよ？"
1006906-2 = "（軽い足取りで玄武商会へ向かった）"
1006906-6 = "玄武商会"
1006906-8 = "間に合って良かった、先生。"
1006906-9 = "これから、ちょうど餃子を蒸すところだよ。"
1006906-10 = "本当は包むところから見せてあげたかったんだけど、#nそっちは朝の段階で終わっちゃってさ。"
1006906-11 = "それじゃ……はじめよっか。"
1006906-12 = "みんな！火をつけて！"
1006906-18 = "（ルミの掛け声と同時に、蒸し器が一斉に蒸気を噴き出した)"
1006906-20 = "すごいでしょ？この蒸気。"
1006906-21 = "餃子を蒸してる間は、厨房がサウナみたいになるんだ。"
1006906-22 = "[s1] \"たしかに……結構な暑さだね。\"\n[s2] \"外で待ってても良いんじゃない？\""
1006906-25 = "んー、それは難しくてね。"
1006906-26 = "蒸し器の位置を調整しないといけなくってさ。"
1006906-27 = "でないと、蒸し加減がバラバラになっちゃうんだ。"
1006906-28 = "暑いから、先生は入り口にいてね。#nあたしは餃子を見てなくちゃいけないから。"
1006906-32 = "（ルミに言われた通り、入口の近くで待っていると……）"
1006906-37 = "[ns] \"えっと……る、ルミ？\""
1006906-38 = "……ん？先生、どうかした？"
1006906-41 = "[wa:1100]― [log=루미]あ……[wa:600]そっか。[wa:1200]ちょっと[wa:300]透けちゃってるのか。[/log]"
1006906-44 = "[wa:500]― [log=루미]ま、[wa:800]気にしないでよ。[wa:1100]減るもんじゃないしさ。[/log]"
1006906-47 = "[wa:950]― [log=루미]……こうなると分かってたら、[/log]"
1006906-49 = "[wa:100]― [log=루미]もっと可愛い下着にしたのに。[/log]"
1006906-52 = "[wa:600]― [log=루미]ちょっと、[wa:1200]もったいなかったかも？[/log]"
1006906-55 = "[wa:100]― [log=루미]ははっ、[wa:1600]目そらしちゃって。[/log]"
1006906-57 = "[wa:600]― [log=루미]あたしは[wa:400]全然[wa:300]気にしてないよ？[/log]"
1006906-60 = "[wa:550]― [log=루미]先生って[wa:1800]意外とそういうところあるんだね……[/log]"
1006906-62 = "[wa:100]― [log=루미]ふふっ、[wa:1300]気に入った。[/log]"
1006906-65 = "[wa:800]― [log=루미]せっかくだし、[/log]"
1006906-67 = "[wa:100]― [log=루미]もーっと[wa:600]困らせちゃおっかな……？[/log]"
1006906-70 = "よし、キレイに出来上がってる。"
1006906-71 = "先生の分は、「特別」なやつを作ってあるよ。"
1006906-78 = "[ns3] \"ル、ルミ！？\"\n[ns4] \"こ、これは……！？\""
1006906-81 = "ん～？どうかしたの？"
1006906-82 = "この間トリニティでイワシパイっていうのを食べてね。#nこれが結構美味しくて！"
1006906-83 = "うちでも似たようなものが作れないかなって『イワシ餃子』を作ってみたんだよ。"
1006906-84 = "イワシパイはトリニティでも秘伝のレシピらしくてさ。#n味はあたしが保証するよ。"
1006906-85 = "先生のために作った「特別」な餃子……美味しく食べてくれるよね？"
1006906-90 = "[ns5] \"ぐはっ……！\"\n[ns6] \"嬉しいけど、これは、ちょっと……！\""
1006906-94 = "どうしたの？トリニティの伝統と歴史が詰まった料理だよ？#nうち風のアレンジは入ってるけどね。"
1006906-95 = "さ、早く召し上がれ。#n特にこの……イワシの形を維持するのが難しかったんだよね。"
1006906-98 = "[ns] \"ごほっ！？\""
1006906-100 = "（促されて、恐る恐る餃子に箸を伸ばし、えいやと口に放り込む)"
1006906-101 = "（想像を絶する味と出会うかと思ったのも束の間……）"
1006906-106 = "（一度食べたら、忘れられない美味しさだった）"
