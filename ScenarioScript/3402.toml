[translation]
3402-1 = "Uma manhã um tanto especial em Shanhaijing (2)"
3402-2 = "Hum, um momento realmente oportuno."
3402-3 = "Acabei de terminar o trabalho de hoje, exatamente antes de você chegar."
3402-4 = "[s1] \"Pensando bem...\"\n[s2] \"Kisaki, você é realmente muito rápida no trabalho.\""
3402-7 = "Fufu, eu apenas quero fazer bom uso do tempo limitado que tenho."
3402-8 = "Além disso, as pessoas não vivem apenas para trabalhar."
3402-9 = "[s] \"Kisaki, você também tem vontade de matar o trabalho, na verdade?\""
3402-10 = "Ora, ora... não penso em termos de gostar ou desgostar."
3402-11 = "Apenas cumpro com o meu dever silenciosamente — de qualquer forma, é algo que alguém precisa fazer."
3402-12 = "Sendo assim, é melhor terminar de forma eficiente, não acha?"
3402-13 = "Pois é... pode-se dizer que \"se você não gosta do trabalho, é melhor terminá-lo logo\"."
3402-17 = "Existem pessoas no mundo chamadas de \"workaholics\"...?"
3402-18 = "Hum. E o que seria um \"workaholic\"? Ah... entendo, um viciado em trabalho."
3402-19 = "Claro, pode ser um talento útil para uma organização, mas..."
3402-20 = "Você também sabe, não sabe, Sensei?"
3402-21 = "Que um superior trabalhador, porém incompetente... é uma existência que, no mínimo, esgota as pessoas."
3402-22 = "Fufu... talvez o fato de eu descansar em meu aposento privado seja um descanso para todo o Genryumon."
3402-23 = "Não acha? — Sensei."
3402-24 = "[s3] \"Sim. Com certeza, isso faz sentido!\"\n[s4] \"Então, acho que vou descansar junto com a Kisaki!\""
3402-27 = "Você, eu acho que já descansou o suficiente..."
3402-33 = "I-Instrutora Kokona!? Aquele é o aposento privado da Mestra do Portão, então..."
3402-37 = "Mestra do Portão! Aquela história é verdade!?"
3402-39 = "Ora, Instrutora Kokona. O que houve?"
3402-44 = "Ah, me desculpe. Tal falta de modos não é permitida diante de uma dama exemplar."
3402-45 = "Ehem... Olá, Mestra do Portão! Sou Sunohara Kokona, aluna do primeiro ano do Departamento de Apoio Educacional \"Baikaen\"!"
3402-46 = "Ué, Sensei? Você tem algum assunto com a Mestra do Portão?"
3402-47 = "[s] \"Bem... eu estava apenas tomando um chá.\""
3402-49 = "Não pode, Sensei! Não deve roubar o tempo precioso da Mestra do Portão!"
3402-50 = "Está tudo bem, Instrutora Kokona. Dito isso, qual é o motivo da sua visita?"
3402-51 = "Ah, é verdade! Bem..."
3402-52 = "Mestra do Portão, é verdade que a senhora começou a fazer a \"Ginástica Banzai\" de novo!?"
3402-56 = "Gi-Ginástica... Banzai...?"
3402-57 = "Hu, hum..."
3402-58 = "Mestra do Portão?"
3402-59 = "Não se preocupe com isso. Ehem... Instrutora Kokona, de onde você ouviu essa história...?"
3402-60 = "Ah, é que! Agora, em Shanhaijing, o boato de que a Mestra do Portão está fazendo a ginástica banzai está em todo lugar!"
3402-64 = "...O quê?"
3402-65 = "Mas parece que outros boatos estranhos também estão se espalhando..."
3402-66 = "Poderia me contar em detalhes?"
3402-67 = "Sim! Bem... \"Como esperado, a Mestra do Portão não parou com a ginástica banzai!\" e coisas assim..."
3402-68 = "\"Até agora, o Genryumon tem tentado secretamente todos os meios para fazer a Mestra do Portão crescer\" e..."
3402-69 = "\"Saya, da Sociedade de Pesquisa de Alquimia, tem recebido 'vários pedidos' do Genryumon\" e..."
3402-74 = "Não, isso é..."
3402-76 = "Tem muito mais! ...\"O Genryumon poderia destruir a Associação Genbu em um instante se quisesse, mas o motivo de não fazerem isso é...\""
3402-77 = "\"Porque a Associação Genbu tem um prato secreto que faz crescer\" e coisas assim..."
3402-78 = "Além disso, \"No dia em que a Mestra do Portão crescer, algo selado no subsolo do Rokukakaku será libertado, tornando Shanhaijing a escola mais forte de Kivotos\"... e por aí vai."
3402-82 = "A propósito, esse último boato é verdade...?"
3402-86 = "...Ko-Instrutora Kokona? Boatos são apenas boatos."
3402-87 = "É, eu imaginei! Eu até avisei as crianças do Baikaen sobre isso!"
3402-88 = "Mas, ver a Mestra do Portão transformando Shanhaijing na escola mais forte de Kivotos... talvez eu até quisesse ver isso..."
3402-89 = "Na medida em que minhas forças permitirem, farei o esforço..."
3402-90 = "Sim!"
3402-91 = "Haa... a minha ginástica tem outros motivos, na verdade..."
3402-92 = "Dizem que é para crescer, ou que é algum tipo de plano... Realmente, o cargo de líder atrai muitos olhares e ouvidos."
3402-93 = "[s5] \"...É mesmo verdade?\"\n[s6] \"Você realmente não tem nada a ver com esses rumores?\""
3402-96 = "Oh?"
3402-97 = "Em outras palavras — você também acha que minha estatura não vai aumentar, Sensei?"
3402-98 = "[s] \"U-uh, bem...!?\""
3402-99 = "Será que — você acha que minha fase de crescimento já acabou?"
3402-100 = "Ainda não é hora de desistir, Sensei."
3402-101 = "Se eu continuar com esforços incansáveis, talvez um dia eu colha os frutos."
3402-102 = "[s] \"É verdade! Talvez eu queira ver a Kisaki mais alta!\""
3402-103 = "Fufu... sendo assim, perguntarei mais uma vez."
3402-104 = "Você também acha que eu fazia essa ginástica... para ficar mais alta, Sensei?"
3402-105 = "— Você acha que eu teria o pensamento irracional de que \"fazer ginástica faz crescer\"?"
3402-106 = "Diga-me, Sensei — para você, que tipo de aluna é a Ryuge Kisaki?"
3402-107 = "[s] \"Ah, bem...\""
3402-109 = "[ns] \"Desculpe! Por favor, me perdoe!\""
3402-110 = "Fufu, é brincadeira. Parece que acabei provocando demais. Peço desculpas por isso."
3402-111 = "Hum... eu ainda estou aqui, sabe..."
3402-112 = "— Ah, perdão. Então, instrutora Kokona, que outros rumores existem?"
3402-113 = "Bem... daqui em diante são rumores bem vagos, mas..."
3402-114 = "Dizem que a Reijo, da Associação Genbu, e o pessoal do Clube de Pesquisa de Artes Marciais formaram a \"Facção Kung Fu da Líder\"..."
3402-115 = "E que as veteranas do Clube de Ópera de Pequim formaram a \"Facção Ópera da Líder\"... e que elas estão disputando nos bastidores..."
3402-116 = "...!?"
3402-117 = "[ns] \"O-o que significa isso...?\""
3402-118 = "Eu também não entendo muito bem..."
3402-119 = "(Facção Kung Fu e Facção Ópera... é mesmo? Era algo que eu deveria ter notado logo.)"
3402-120 = "(Por algum motivo... tenho um pressentimento ruim...)"
3402-121 = "Se... se a Líder realmente faz ginástica de manhã..."
3402-122 = "Eu e as crianças do Jardim de Ameixa gostaríamos de participar!"
3402-123 = "Ouvi dizer que não ajuda a crescer, então paramos com a ginástica de levantar os braços..."
3402-124 = "Mas se a Líder estiver conosco, sinto que todas conseguirão acordar cedo!"
3402-125 = "[s] \"É verdade! Ginástica faz bem para a saúde das crianças!\""
3402-126 = "Se-Sensei...?"
3402-127 = "..."
3402-128 = "Fufu, entendo. Você tem um ponto."
3402-129 = "As crianças do Jardim de Ameixa são o futuro de Shanhaijing."
3402-130 = "Se for pelas crianças, aceitarei com prazer."
3402-131 = "Sé-sério? #nMuito obrigada! Líder!"
3402-132 = "O que acha, Sensei? Não quer vir conosco?"
3402-133 = "[s] \"Eh? Eu também...?\""
3402-134 = "Claro. Ginástica faz bem para a saúde, sabe."
3402-135 = "Além disso, respirar o ar fresco da manhã purifica o corpo e a mente."
3402-142 = "Ora, Sensei. Preparando-se para sair tão de repente... não me diga que pretende fugir? #nOu tem algum compromisso urgente?"
3402-143 = "[s] \"Sinto que as coisas vão ficar ocupadas em breve, sabe?\""
3402-144 = "Não deixarei você escapar."
3402-148 = "...Não fique com essa cara triste... Você é um adulto, não é?"
3402-150 = "(E assim, acabei participando da ginástica de levantar os braços com todos...)"
