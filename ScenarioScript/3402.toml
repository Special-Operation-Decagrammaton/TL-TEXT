[translation]
3402-1 = "山海経のちょっと特別な朝（2）"
3402-2 = "うむ、実に良いタイミングじゃ。"
3402-3 = "先生が着く前に、ちょうど今日の仕事が終わったところでな。"
3402-4 = "[s1] \"改めて思うけど……。\"\n[s2] \"キサキって、本当に仕事が早いんだね。\""
3402-7 = "ふふ[ruby=わらわ]、妾は[/ruby]ただ、限られた時間を有効活用したいだけじゃ。"
3402-8 = "それに、人は仕事をするために生きているわけではないからの。"
3402-9 = "[s] \"キサキも、実は仕事をサボったりしたいとか？\""
3402-10 = "はてさて……[ruby=こうお]好悪[/ruby]など考えておらぬよ。"
3402-11 = "ただ粛々とこなすのみじゃ――いずれにせよ、誰かがやらねばならぬことじゃからの。"
3402-12 = "なれば、効率的に終わらせる方が良いじゃろうて。"
3402-13 = "そうさな……「仕事が嫌ならば、早く片付ければ良い」だけとも言える。"
3402-17 = "世の中には「ワーカホリック」と呼ばれる人もいる……？"
3402-18 = "ふむ。して、「ワーカホリック」とは？#nああ……なるほど、仕事中毒者か。"
3402-19 = "無論、それは組織にとって有用な人材かもしれぬが――"
3402-20 = "先生も知っては居るじゃろう？"
3402-21 = "無能な働き者の上司というのは……少なからず人を疲弊させる存在である、と。"
3402-22 = "ふふ……妾が[ruby=ししつ]私室[/ruby]で息抜きをするのは、玄龍門全体の息抜きになるのやもしれぬな。"
3402-23 = "そう思わぬか？――先生。"
3402-24 = "[s3] \"うん。たしかにそれも一理あるね！\"\n[s4] \"じゃあ、私もキサキと一緒にお休みしようかな！\""
3402-27 = "[ruby=そなた]其方[/ruby]、もう充分休んでおると思うのじゃが……。"
3402-33 = "こ、ココナ教官！？#nそこは門主様の私室ですので――"
3402-37 = "門主様！あのお話は本当なんですか！？"
3402-39 = "おや、ココナ教官。どうかしたのかえ？"
3402-44 = "あっ、すみません。立派なレディーに、このような無作法は許されませんよね。"
3402-45 = "こほん……こんにちは、門主様！#n訓育支援部「梅花園」の1年、[ruby=すのはら]春原[/ruby]ココナです！"
3402-46 = "あれ、先生？門主様になにかご用なんですか？"
3402-47 = "[s] \"えっと……少し、お茶をいただいててね。\""
3402-49 = "ダメですよ先生！門主様の貴重なお時間を奪っては！"
3402-50 = "良いのじゃ、ココナ教官。#nそれはそうと、何用かの？"
3402-51 = "あ、そうでした！#nその――"
3402-52 = "門主様、また「ばんざい体操」を始めたって、本当なんですか！？"
3402-56 = "ば、ばんざい……体操……？"
3402-57 = "う、うむ……。"
3402-58 = "門主様？"
3402-59 = "気にするな。#nこほん……ココナ教官、その話はどこから……？"
3402-60 = "あ、それがですね！#n今、山海経では門主様がばんざい体操をしているって噂でもちきりで！"
3402-64 = "……なっ？"
3402-65 = "ただ、他にも変な噂まで広まっているみたいで……。"
3402-66 = "詳しく教えてくれるかえ？"
3402-67 = "はい！えっと……「やっぱり門主様は、ばんざい体操をやめなかった！」とか……。"
3402-68 = "「今まで玄龍門は門主様の身長を伸ばすために、あらゆる手段を秘密裏に試してきた」とか……。"
3402-69 = "「錬丹術研究会のサヤは、玄龍門から『色々な要請』を受けてきた」とか……。"
3402-74 = "いや、それは……。"
3402-76 = "まだまだあるんですよ！#n……「玄龍門はその気になれば玄武商会なんてあっという間に取り潰せるけど、そうしない理由は――」"
3402-77 = "「玄武商会には背を伸ばせる秘伝の料理があるからだ」とか……。"
3402-78 = "しかも、「門主様の身長が伸びたあかつきには、六和閣の地下に封印された「何か」が解き放たれ、山海経をキヴォトス最強の学園にするんだ」……とか。"
3402-82 = "ところで、最後の噂って本当なんですか……？"
3402-86 = "……こ、ココナ教官？噂はあくまで噂じゃ。"
3402-87 = "やっぱりそうですよね？梅花園の子たちにも、言い聞かせたのですが！"
3402-88 = "でも、門主様が山海経をキヴォトス最強の学園にする姿は、ちょっと見てみたいかもです……。"
3402-89 = "妾の力が及ぶ限り、努力はしてみよう……。"
3402-90 = "はい！"
3402-91 = "はぁ……妾の体操には他の理由があるのじゃが……。"
3402-92 = "背を高くするためじゃとか、何かの企みじゃとか……まこと、門主の座は耳目を集めるのう。"
3402-93 = "[s5] \"……本当にそうなの？\"\n[s6] \"本当に噂とは無関係なの？\""
3402-96 = "ほぉ？"
3402-97 = "つまり――先生も妾の身長が伸びないと？"
3402-98 = "[s] \"う、うん……！？\""
3402-99 = "まさか――妾の成長期はもう終わっていると？"
3402-100 = "まだ諦める時ではないのじゃよ、先生。"
3402-101 = "たゆまぬ努力を重ねれば、いつか実を結ぶものもあろう。"
3402-102 = "[s] \"そうだね！背の高いキサキ、見てみたいかも！\""
3402-103 = "ふふ……であれば、もう一度問おう。"
3402-104 = "先生も、妾が背を高くするために――かような体操をしていたと？"
3402-105 = "――妾が、「体操をすれば背が高くなる」という非合理的な思考をすると？"
3402-106 = "のう？先生――其方にとって、[ruby=りゅうげ]竜華[/ruby]キサキとは、どのような生徒なのじゃ？"
3402-107 = "[s] \"あ、えっと……。\""
3402-109 = "[ns] \"ごめんなさい！許してください！\""
3402-110 = "ふふ、冗談じゃ。つい[ruby=からか]揶揄[/ruby]いすぎたようじゃの。謝罪をここに。"
3402-111 = "あの……私、まだここにいますけど……"
3402-112 = "――あぁ、すまぬ。それでココナ教官、他にどんな噂が？"
3402-113 = "えっと……ここから先は本当にあいまいな噂なんですけど……。"
3402-114 = "玄武商会のレイジョ姉さんと、武術研究部をはじめとする「門主様はカンフー派」と……"
3402-115 = "京劇部のお姉さんたちをはじめとする、「門主様は京劇派」が……水面下で争いをしているとか……。"
3402-116 = "……！？"
3402-117 = "[ns] \"ど、どういう事……？\""
3402-118 = "私にもよく分かりません……。"
3402-119 = "（カンフー派と、京劇派……じゃと？すぐに気づきそうなものじゃが）"
3402-120 = "（何故か……不吉な予感がする……）"
3402-121 = "その……門主様が本当に朝、体操をしているのでしたら……"
3402-122 = "私と、梅花園の子たちも参加したいです！"
3402-123 = "背を高くする効果はないという話を聞いて……ばんざい体操はやめたんですけど……。"
3402-124 = "門主様がご一緒してくださるのなら、みんなも早起きできる気がします！"
3402-125 = "[s] \"そうだね！体操は子供の健康にいいからさ！\""
3402-126 = "せ、先生……？"
3402-127 = "……。"
3402-128 = "ふふ、そうさな。一理ある。"
3402-129 = "梅花園の園児は、山海経の未来じゃからな。"
3402-130 = "子供たちのためであれば、喜んで引き受けるとしよう。"
3402-131 = "ほ、本当ですか？#nありがとうございます！門主様！"
3402-132 = "どうじゃ？先生も一緒に行かぬか？"
3402-133 = "[s] \"え？私も……？\""
3402-134 = "もちろんじゃ。体操は健康に良いのじゃぞ。"
3402-135 = "それに、朝の新鮮な空気を吸えば、身も心も整うというもの。"
3402-142 = "おや、先生。急に出かける準備をして……よもや、逃げるつもりではなかろうな？#nそれとも急用でも？"
3402-143 = "[s] \"もうすぐ忙しくなりそうな気配が、ね？\""
3402-144 = "逃がさぬぞ。"
3402-148 = "……そう暗い顔をするでない……其方は大人じゃろう。"
3402-150 = "（そうして、皆と一緒にばんざい体操をすることになったのだった……）"
