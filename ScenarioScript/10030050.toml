[translation]
10030050-1 = "第5話;夕食の準備"
10030050-6 = "……遅かったね、どこまで行ってたの？"
10030050-7 = "ずっと一人で待ってたから、暇で――"
10030050-18 = "みんな、どうしたの……？鬼ごっこでもしてたの？"
10030050-21 = "たしかに、鬼ごっこかも……"
10030050-22 = "……詳しく話すと、ちょっと長くなるかな。"
10030050-23 = "森の中で、特訓中のスミレ部長と会いました。"
10030050-28 = "なるほど……"
10030050-29 = "[s] \"……納得するんだ！？\""
10030050-30 = "あ、うん。なんとなく想像がついたから……"
10030050-31 = "一応言っておくけど、別にスミレ部長と鬼ごっこしてたわけじゃないよ。"
10030050-32 = "私たちが、トレーニング部の新入部員と話していたら……"
10030050-34 = "いきなりでっかいクマが出てきたの！"
10030050-39 = "く、クマ！？"
10030050-40 = "だ、大丈夫なの……？#nここにやって来たりとか……"
10030050-41 = "心配しないで、もうどこかにいったから。"
10030050-46 = "トレーニング部が誘導してくれたおかげで、なんとかなりましたが……"
10030050-47 = "森の奥には行かない方がいいと思う……"
10030050-48 = "というか、トレーニング部はまだ山で訓練を続けるんだ？"
10030050-49 = "場所を変えて続けるみたいだね。"
10030050-50 = "来シーズンまでに体力をつけるためには、1分1秒も無駄にはできないんだって。"
10030050-51 = "レイは想像以上に本気のようですね。"
10030050-52 = "来年はミレニアム野球部の活躍を期待していいのかな？"
10030050-56 = "[ns] \"なんだか私の記憶と違うような……\""
10030050-60 = "もう無理です！"
10030050-61 = "ホームランを打てる秘訣を教えてもらえると思ったら、野球とは関係ない訓練ばっかり……しかもクマに追いかけられるなんて！"
10030050-62 = "私、もう辞めます！"
10030050-68 = "レイさんが退部を希望しているのなら、引き留めませんが……"
10030050-69 = "一度訓練を始めた以上、このメニューが終わるまでレイさんを解放することはできません。"
10030050-70 = "クールダウンなしに中断すれば、筋肉痛の原因になる可能性がありますから！"
10030050-71 = "フィットネスセンターの安全責任者として、会員を放っておくわけにはいきません！"
10030050-72 = "それで私を引き留められると思ってるんですか！"
10030050-73 = "止める気なら、意地でも先輩を倒して行きますから！"
10030050-74 = "レイさん、その意気です。"
10030050-75 = "え？"
10030050-76 = "先ほどはクマによる「スピードトレーニング」を行いましたので……"
10030050-81 = "これより、私と「パワートレーニング」に移りたいと思います！"
10030050-82 = "弱音を吐いたとしても訓練は終わりませんよ！"
10030050-88 = "う……うううっ……！"
10030050-89 = "トレーニングなんて嫌いだーっ！！"
10030050-92 = "……んー、これから何する？まだ16時だよ。"
10030050-93 = "えっ！？まだこんな時間？"
10030050-94 = "……やっぱり外に居ると、いつもより時間の流れが遅い気がします。"
10030050-95 = "そうだよね。部室だとちょっとゲームしてるだけで1日が終わっちゃうのに。"
10030050-96 = "……これが特殊相対性理論ってやつ？"
10030050-97 = "いや、こういうのじゃないでしょ。"
10030050-103 = "そうだね……そろそろ夕飯の準備をしようか。"
10030050-108 = "もう！？"
10030050-109 = "お昼を食べてから、まだ3時間しか経ってないよ……？"
10030050-110 = "副部長、満腹中枢がおかしくなったのでは――"
10030050-112 = "お腹すいたから急いでるわけじゃないから！？"
10030050-113 = "家での調理と違って、火起こしも必要だし、食材の下ごしらえ1つとっても手間がかかるの。"
10030050-114 = "日が暮れる前に完成させたいなら、そろそろ始めないと……"
10030050-115 = "むしろ、今から始めても遅いような気もするけど……"
10030050-116 = "え？下ごしらえっていっても野菜洗って切るだけじゃん？"
10030050-117 = "そんなのすぐ終わるでしょ。"
10030050-120 = "持ってきた野菜も、一般的なものばかりですし……"
10030050-121 = "みんなでやれば、すぐじゃないかな。"
10030050-123 = "そうだね……みんなでやれば早いと思う。ちゃんと協力してね。"
10030050-124 = "それじゃ、3人で野菜を洗って皮を剥いたら、一口サイズに切っておいて。"
10030050-125 = "私はそこで火を起こしておくから。#n洗うのはあっちの水場でね。"
10030050-126 = "任せて！"
10030050-132 = "（約1時間後……）"
10030050-135 = "うううっ……！"
10030050-136 = "うわっ！？"
10030050-139 = "うわっ！？"
10030050-144 = "マキ、大丈夫？怪我してない？"
10030050-148 = "うん、怪我はしてないけど……"
10030050-149 = "何このニンジン！あんなに力を入れたのに全然切れない！"
10030050-150 = "どんだけ硬いの！"
10030050-151 = "[s1] \"キャンプナイフは小さくて扱いにくいから……\"\n[s2] \"いつもの感じだと難しいかも。\""
10030050-158 = "[ns3] \"切るのは私に任せて。\"\n[ns4] \"その代わり、マキは皮を剥いてくれる？\""
10030050-163 = "うん……それじゃお願い、先生。"
10030050-164 = "コタマ先輩はどう？#nジャガイモの皮剥きおわった？"
10030050-170 = "いえ……ようやく3個目です……"
10030050-171 = "表面がでこぼこしてるので、思ったより難しくて……"
10030050-172 = "疲れてきたからか、あまり力が入りません……"
10030050-173 = "川が遠いから野菜を洗うのも一苦労……水、冷たいし。"
10030050-174 = "このままじゃ、手が凍りそう……"
10030050-175 = "チヒロ先輩の言う通り、たしかに時間がかかるね……"
10030050-176 = "……というか、本当にここまでして作らなきゃダメ？"
10030050-184 = "野菜の下ごしらえ終わった？"
10030050-189 = "ま、まだ……"
10030050-190 = "も、もう少し、時間と予算をもらえれば……"
10030050-192 = "予算……？"
10030050-193 = "ねえ、チヒロ先輩。"
10030050-194 = "持ってきた荷物に、カップ麺とかレトルトカレーは無いの？"
10030050-195 = "非常用に持ってきてるけど……なんで？"
10030050-199 = "じゃあ、それを食べようよ！"
10030050-200 = "ここ、ネットも繋がらないしコンビニも遠いし不便じゃん？#nだから、ご飯くらい楽しよう？"
10030050-201 = "ダメ。"
10030050-202 = "いつもインスタントばっかでしょ……それに、ここまで準備したんだからちゃんと作るよ。"
10030050-203 = "う、うっ……"
10030050-204 = "来る前にも言ったけど、このキャンプの意義は日常から離れて健康的な1日を過ごすことにあるからね？"
10030050-205 = "多少手間がかかってもちゃんとした食事を摂ろう。食材の手入れ、私も手伝うから。"
10030050-206 = "ちゃんとした料理って言ったって、屋外で作れるものなんて限られてるじゃん……"
10030050-207 = "カレーとか、スープとかさぁ……"
10030050-208 = "そうね……まぁ、何ができるのかは楽しみにしてて。"
10030050-214 = "今日のために色々準備してきたから。"
10030050-221 = "色々……？"
