[translation]
10030050-1 = "Episódio 5; Preparando o jantar"
10030050-6 = "……Você demorou, onde você foi?"
10030050-7 = "Fiquei esperando sozinha esse tempo todo, estava entediada――"
10030050-18 = "Pessoal, o que aconteceu……? Estavam brincando de pega-pega?"
10030050-21 = "Na verdade, talvez tenha sido pega-pega mesmo……"
10030050-22 = "……Explicar em detalhes vai levar um tempo."
10030050-23 = "Encontramos a Chefe Sumire no meio da floresta, ela estava em treinamento especial."
10030050-28 = "Entendo……"
10030050-29 = "[s] \"……Você aceita isso assim tão fácil!?\""
10030050-30 = "Ah, sim. É que eu meio que já imaginava……"
10030050-31 = "Só para constar, não estávamos brincando de pega-pega com a Chefe Sumire."
10030050-32 = "Estávamos conversando com os novos membros do Clube de Treinamento quando……"
10030050-34 = "De repente, um urso enorme apareceu!"
10030050-39 = "U-um urso!?"
10030050-40 = "V-vocês estão bem……? #nEle não veio para cá, veio……?"
10030050-41 = "Não se preocupe, ele já foi embora para algum lugar."
10030050-46 = "Graças ao pessoal do Clube de Treinamento que nos guiou, conseguimos nos safar, mas……"
10030050-47 = "Acho melhor não ir muito fundo na floresta……"
10030050-48 = "Dito isso, o Clube de Treinamento ainda vai continuar treinando na montanha?"
10030050-49 = "Parece que eles vão mudar de lugar e continuar."
10030050-50 = "Disseram que não podem desperdiçar nem um segundo se quiserem ganhar resistência para a próxima temporada."
10030050-51 = "A Rei parece estar levando isso mais a sério do que eu imaginava."
10030050-52 = "Será que podemos esperar grandes feitos do Clube de Beisebol da Millennium no ano que vem?"
10030050-56 = "[ns] \"Sinto que minhas memórias são diferentes disso……\""
10030050-60 = "Já chega, não aguento mais!"
10030050-61 = "Pensei que aprenderia o segredo para rebater um home run, mas só tivemos treinos que não têm nada a ver com beisebol…… e ainda por cima ser perseguida por um urso!"
10030050-62 = "Eu desisto, estou fora!"
10030050-68 = "Se a Rei deseja sair do clube, não vou impedi-la, mas……"
10030050-69 = "Uma vez que o treinamento começou, não posso liberar a Rei até que este menu seja concluído."
10030050-70 = "Se parar sem fazer o resfriamento, pode acabar causando dores musculares!"
10030050-71 = "Como responsável pela segurança do centro de fitness, não posso deixar um membro à própria sorte!"
10030050-72 = "Você acha mesmo que isso vai me segurar?!"
10030050-73 = "Se pretende me parar, vou te derrotar, senpai, nem que seja a última coisa que eu faça!"
10030050-74 = "Rei, esse é o espírito."
10030050-75 = "Hã?"
10030050-76 = "Como acabamos de realizar o \"treinamento de velocidade\" com o urso……"
10030050-81 = "A partir de agora, vamos passar para o \"treinamento de força\" comigo!"
10030050-82 = "Mesmo que você reclame, o treinamento não vai acabar!"
10030050-88 = "Ugh…… uuuuu……!"
10030050-89 = "Eu odeio treinar!!"
10030050-92 = "……Hmm, o que vamos fazer agora? Ainda são 16h."
10030050-93 = "Sério!? Ainda é esse horário?"
10030050-94 = "……Sinto que, quando estamos lá fora, o tempo passa mais devagar do que o normal."
10030050-95 = "Verdade. Na sala do clube, basta jogar um pouco que o dia já acaba."
10030050-96 = "……Isso seria a tal da teoria da relatividade especial?"
10030050-97 = "Não, acho que não é bem isso."
10030050-103 = "É verdade…… acho que está na hora de preparar o jantar."
10030050-108 = "Já!?"
10030050-109 = "Ainda não se passaram nem 3 horas desde o almoço……?"
10030050-110 = "Vice-presidente, será que o seu centro de saciedade está com defeito――"
10030050-112 = "Não é porque estou com fome que estou com pressa, tá?!"
10030050-113 = "Diferente de cozinhar em casa, aqui precisamos acender o fogo e até o preparo dos ingredientes dá um trabalhão."
10030050-114 = "Se quisermos terminar antes de escurecer, precisamos começar logo..."
10030050-115 = "Na verdade, tenho a impressão de que já estamos atrasados..."
10030050-116 = "Ué? Preparar não é só lavar e cortar os vegetais?"
10030050-117 = "Isso termina rapidinho, né?"
10030050-120 = "Os vegetais que trouxemos também são bem comuns..."
10030050-121 = "Se todo mundo ajudar, não vai ser rápido?"
10030050-123 = "É verdade... acho que se todos ajudarem, será rápido. Colaborem direitinho, hein."
10030050-124 = "Então, vocês três lavem os vegetais, descasquem e cortem em pedaços pequenos."
10030050-125 = "Eu vou acender o fogo ali. #nLavem na água ali perto."
10030050-126 = "Pode deixar!"
10030050-132 = "(Cerca de 1 hora depois...)"
10030050-135 = "Ughhh...!"
10030050-136 = "Eita!?"
10030050-139 = "Eita!?"
10030050-144 = "Maki, tudo bem? Não se machucou?"
10030050-148 = "Sim, não me machuquei, mas..."
10030050-149 = "Que cenoura é essa! Fiz tanta força e não corta de jeito nenhum!"
10030050-150 = "Como pode ser tão dura!"
10030050-151 = "[s1] \"A faca de acampamento é pequena e difícil de manusear...\"\n[s2] \"Pode ser difícil do jeito que estamos fazendo.\""
10030050-158 = "[ns3] \"Deixe que eu corto.\"\n[ns4] \"Em troca, Maki, você pode descascar?\""
10030050-163 = "Sim... então por favor, Sensei."
10030050-164 = "E você, Kotama? #nTerminou de descascar as batatas?"
10030050-170 = "Não... finalmente estou na terceira..."
10030050-171 = "A superfície é irregular, então é mais difícil do que pensei..."
10030050-172 = "Acho que estou cansada, não estou conseguindo fazer muita força..."
10030050-173 = "O rio é longe, então lavar os vegetais também é um sacrifício... e a água está gelada."
10030050-174 = "Desse jeito, minhas mãos vão congelar..."
10030050-175 = "Como a Chihiro disse, realmente leva tempo..."
10030050-176 = "...Aliás, precisamos mesmo fazer tudo isso?"
10030050-184 = "Terminaram de preparar os vegetais?"
10030050-189 = "A-ainda não..."
10030050-190 = "S-se puderem me dar mais tempo e orçamento..."
10030050-192 = "Orçamento...?"
10030050-193 = "Ei, Chihiro."
10030050-194 = "Nas coisas que trouxemos, não tem macarrão instantâneo ou curry de saquinho?"
10030050-195 = "Trouxe para emergências, mas... por quê?"
10030050-199 = "Então vamos comer isso!"
10030050-200 = "Aqui não tem internet, a loja é longe, é tudo tão inconveniente, né? #nEntão, pelo menos na hora de comer, vamos facilitar?"
10030050-201 = "Nem pensar."
10030050-202 = "Vocês só comem instantâneo... além disso, já preparamos tudo, então vamos cozinhar direito."
10030050-203 = "Ugh..."
10030050-204 = "Como eu disse antes de virmos, o objetivo deste acampamento é se afastar da rotina e passar um dia saudável, lembra?"
10030050-205 = "Mesmo que dê trabalho, vamos fazer uma refeição decente. Eu ajudo com os ingredientes."
10030050-206 = "Dizer que é uma refeição decente, mas o que dá pra fazer ao ar livre é limitado..."
10030050-207 = "Tipo curry ou sopa..."
10030050-208 = "É... bem, fiquem ansiosos para ver o que vai sair."
10030050-214 = "Preparei várias coisas para hoje."
10030050-221 = "Várias...?"
