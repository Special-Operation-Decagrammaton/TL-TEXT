[translation]
1004703-1 = "Algo que quero te mostrar"
1004703-2 = "Professor, por aqui, por aqui~."
1004703-3 = "[s] \"Desculpe a demora. Mas o que a Chise quer me mostrar...?\""
1004703-4 = "Sim, é incrível."
1004703-5 = "Tem muitos brilhos, é realmente incrível."
1004703-6 = "Eu queria que você visse também."
1004703-7 = "Sendo assim."
1004703-8 = "Vamos, professor."
1004703-12 = "Venha por aqui."
1004703-27 = "[ns] \"Nós caminhamos bastante. O que tem aqui...?\""
1004703-28 = "Professor, chegamos."
1004703-32 = "……."
1004703-33 = "[s] \"Isso é... um monte de tartarugas...?\""
1004703-34 = "(O que estava lá eram várias tartarugas.)"
1004703-35 = "(Talvez elas vivam por aqui, onde não há muitas pessoas.)"
1004703-37 = "E então, não é incrível?"
1004703-38 = "[s] \"É, com certeza.\""
1004703-39 = "Enquanto eu procurava por brilhos pela costa,"
1004703-40 = "foi por acaso, sabe."
1004703-44 = "Será que essas tartarugas..."
1004703-45 = "vieram do Palácio do Dragão?"
1004703-46 = "[s] \"O que você quer dizer...?\""
1004703-47 = "As tartarugas não vêm todas do Palácio do Dragão?"
1004703-48 = "Enquanto nadam balançando para lá e para cá,"
1004703-49 = "elas chegam até a areia da praia"
1004703-50 = "e levam a pessoa que as ajudou para o Palácio do Dragão, foi o que eu ouvi."
1004703-51 = "[s] \"Ah, certamente existe um conto de fadas assim...\""
1004703-52 = "E então, elas forçam a venda de tesouros. A chefe Niya que disse."
1004703-53 = "[s] \"O clima ficou estranho de repente...\""
1004703-54 = "Ou seja, todas as tartarugas que estão aqui..."
1004703-55 = "talvez estejam procurando por alguém ingênuo para comprar seus tesouros."
1004703-56 = "[s] \"Pensando por esse lado, é uma cena impressionante...\""
1004703-58 = "Ah. A tartaruga está se movendo animada."
1004703-59 = "Professor, olhe. Todas estão brilhando sob a luz do sol."
1004703-60 = "As tartarugas estão brilhando intensamente."
1004703-61 = "[s] \"É uma vista incrível.\""
1004703-62 = "Sim. Eu queria mostrar essa paisagem para você, professor."
1004703-63 = "É a minha favorita."
1004703-64 = "Fiquei pensando no que você acharia ao ver isso."
1004703-65 = "[s] \"Entendi, obrigado.\""
1004703-70 = "Ah!"
1004703-71 = "[s] \"Chise? Você está bem--\""
1004703-74 = "[ns] \"Ei, Chise!? Seu traje de banho...!\""
1004703-75 = "[wa:1000]— Professor, [wa:1700] o que houve?"
1004703-77 = "— Seu rosto [wa:800] está vermelho?"
1004703-80 = "[ns] \"Não, eu estou bem, mas você, Chise...\""
1004703-81 = "[wa:750]— Se você está bem, [wa:1600] então tudo bem."
1004703-83 = "— Mas, professor, [wa:2750] olhe aqui, [wa:1550] aqui."
1004703-86 = "[wa:850]— O casco da [wa:800] tartaruga,"
1004703-88 = "— é muito duro~"
1004703-91 = "― Na verdade, [wa:500] a parte da cauda,"
1004703-93 = "― É bem fofinha. [wa:2900] Tão fofinha~ [wa:1650]"
1004703-96 = "[wa:1150]― E então? [wa:1650] Professor, não quer tocar também?"
1004703-98 = "― É bem fofinha."
1004703-101 = "― Professor? [wa:2050] É por aqui, [wa:1700] por aqui?"
1004703-104 = "[ns] \"B-bem, eu até gostaria de ver, mas agora é um pouco complicado, por assim dizer...!\""
1004703-105 = "[wa:950]― Agora é um pouco complicado...?"
1004703-107 = "― ...Por quê? [wa:1550] Por que não? [wa:1550] Professor~?"
1004703-110 = "(Depois disso, consegui de alguma forma consertar o traje de banho da Chise com sucesso)"
1004703-112 = "[ns1] \"Ufa...\"\n[ns2] \"Consegui evitar o problema...\""
1004703-115 = "Eu não tinha notado nada."
1004703-116 = "Obrigada, Professor."
1004703-117 = "A expressão que você fez agora há pouco."
1004703-118 = "Foi tão fofa e engraçada~"
1004703-119 = "[s] \"B-bem, fico feliz que tenha gostado...?\""
1004703-120 = "De alguma forma, hoje está sendo um dia cheio de coisas divertidas~"
1004703-121 = "[s] \"Aquele 'brilho que você estava procurando' que mencionou antes, Chise, seria essa paisagem?\""
1004703-122 = "Quem sabe~"
1004703-123 = "...É verdade que essa vista também é brilhante."
1004703-124 = "Mas talvez seja um pouco diferente do que eu estava procurando."
1004703-125 = "Ainda assim, foi divertido."
1004703-126 = "[s] \"Fico feliz em ouvir isso.\""
1004703-127 = "Sim!"
1004703-129 = "(Depois disso, passei um tempo tranquilo com a Chise no local de descanso das tartarugas)"
