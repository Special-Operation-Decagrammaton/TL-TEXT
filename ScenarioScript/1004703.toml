[translation]
1004703-1 = "見せたいもの"
1004703-2 = "先生、こっちこっち～。"
1004703-3 = "[s] \"お待たせ。ところでチセが見せたいものって……？\""
1004703-4 = "うん、すごいんだよ。"
1004703-5 = "きらきらがたくさんで、本当にすごいの。"
1004703-6 = "先生にも見て欲しいな、って。"
1004703-7 = "というわけで。"
1004703-8 = "さあ、先生。"
1004703-12 = "こっち来て。"
1004703-27 = "[ns] \"結構歩いたね。ここに何が……？\""
1004703-28 = "先生、着いたよ。"
1004703-32 = "……。"
1004703-33 = "[s] \"これは、亀がたくさん……？\""
1004703-34 = "（そこにいるのは、大量の亀たちだった）"
1004703-35 = "（あまり人けの無いこの辺に棲んでいるのかもしれない）"
1004703-37 = "どう、すごいでしょ～？"
1004703-38 = "[s] \"た、たしかに。\""
1004703-39 = "海岸のあちこちできらきらを探してたら、"
1004703-40 = "偶然、ね。"
1004703-44 = "このカメさんたち、もしかして……"
1004703-45 = "竜宮城から、来たのかな？"
1004703-46 = "[s] \"どういうこと……？\""
1004703-47 = "カメさんって、みんな竜宮城から来るんでしょ？"
1004703-48 = "みんなでゆらゆら～って泳ぎながら"
1004703-49 = "砂浜までやってきて"
1004703-50 = "自分を助けてくれた人を、竜宮城に連れてってくれるって聞いたの。"
1004703-51 = "[s] \"あー、確かにそういう童話が……。\""
1004703-52 = "それで、宝物を無理やり売りつけるんだって。ニヤ部長が言ってた。"
1004703-53 = "[s] \"何か雲行きが……。\""
1004703-54 = "つまり、ここにいるカメさんたちはみんな……。"
1004703-55 = "宝物を買ってくれそうな、ウブな人を探しているのかもー。"
1004703-56 = "[s] \"そう考えるとすごい光景だ……。\""
1004703-58 = "あ。カメさん、元気に動いてるー。"
1004703-59 = "先生、見て。みんな日差しできらきらって。"
1004703-60 = "カメさんたちが、きらきらに輝いてる。"
1004703-61 = "[s] \"すごい景色だね。\""
1004703-62 = "うん。この風景を、先生に見せたかったの。"
1004703-63 = "私のお気に入り。"
1004703-64 = "先生はこれを見たら、どう思うかなって。"
1004703-65 = "[s] \"そっか、ありがとね。\""
1004703-70 = "あっ！"
1004703-71 = "[s] \"チセ？大丈――\""
1004703-74 = "[ns] \"ちょっ、チセ！？水着が……！\""
1004703-75 = "[wa:1000]― 先生、[wa:1700]どうしたの？"
1004703-77 = "― 顔が[wa:800]赤いよ？"
1004703-80 = "[ns] \"いや、私は大丈夫だけど、チセの方が……。\""
1004703-81 = "[wa:750]― 大丈夫なら、[wa:1600]良いけど"
1004703-83 = "― それより先生、[wa:2750]こっち見て、[wa:1550]こっち。"
1004703-86 = "[wa:850]― 亀さんの[wa:800]甲羅はね、"
1004703-88 = "― すごく硬いんだけど～"
1004703-91 = "― 実は[wa:500]尻尾のところは、"
1004703-93 = "― ふわふわしてるの。[wa:2900]ふわふわ～[wa:1650]って"
1004703-96 = "[wa:1150]― どう？[wa:1650]先生も触ってみない？"
1004703-98 = "― ふわふわだよ"
1004703-101 = "― 先生？[wa:2050]こっちだよ、[wa:1700]こっち？"
1004703-104 = "[ns] \"や、見たいは見たいんだけど、今はちょっと困るって言うか……！\""
1004703-105 = "[wa:950]― 今はちょっと困る……？"
1004703-107 = "― ……なんで？[wa:1550]どうして？[wa:1550]先生～？"
1004703-110 = "（その後、何とか無事にチセの水着を直すことに成功した）"
1004703-112 = "[ns1] \"セーフ……。\"\n[ns2] \"無事に回避した……。\""
1004703-115 = "全然気が付かなかったよ。"
1004703-116 = "ありがとう、先生。"
1004703-117 = "さっきの、先生の表情。"
1004703-118 = "可愛くて、面白かったな～。"
1004703-119 = "[s] \"そ、それは良かった……？\""
1004703-120 = "何だか今日は、楽しいことがいっぱいだね～。"
1004703-121 = "[s] \"チセが前に言ってた「ずっと探してたきらきら」って、この景色のこと？\""
1004703-122 = "どうだろ～"
1004703-123 = "……確かにこの光景も、きらきらしてるけど。"
1004703-124 = "私が探していたのとは、ちょっと違うかも。"
1004703-125 = "でも、楽しかった。"
1004703-126 = "[s] \"それは良かった。\""
1004703-127 = "うん！"
1004703-129 = "（その後もカメたちの休憩所で、チセとゆっくり時間を過ごした）"
