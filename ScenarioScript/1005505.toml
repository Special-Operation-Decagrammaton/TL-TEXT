[translation]
1005505-1 = "まったりと"
1005505-2 = "（約束した日、市内のレストラン付近でシグレのことを待っていた）"
1005505-6 = "（遠くからゆっくり歩いてくるシグレが見えた）"
1005505-7 = "[ns1] シグレに向かって手を振る。\n[ns2] \"こっちこっち。\""
1005505-10 = "分かった、分かったから……"
1005505-15 = "そんなに手を振るから、他の人からの視線がすごかったよ。"
1005505-16 = "もしかして、わざと見せつけたかったり？"
1005505-20 = "冗談冗談、慌てないでよ。"
1005505-21 = "それにしても……"
1005505-22 = "レッドウィンターからそれなりに距離があったけど……#nこんなところまで呼び出しての「お礼」って何かな？"
1005505-23 = "ご飯でも奢ってくれるの？"
1005505-24 = "[s3] \"うん、他にも何か行きたいところがあればぜひ。\"\n[s4] \"せっかくの繁華街だし。\""
1005505-27 = "うーん、まずはご飯だけでもうれしいかな。"
1005505-28 = "レッドウィンターの旧校舎付近だと、こんな繁華街や高級レストラン自体珍しいし。"
1005505-29 = "普段は食べられないものが食べられそうだし？"
1005505-30 = "あ、もしかして、予約とかしてくれてる？"
1005505-31 = "……やっぱり。じゃあ今日は、先生のエスコートについて行こうかな。"
1005505-37 = "よろしくね、先生。"
1005505-46 = "（シグレと一緒にレストランで食事を楽しみながら、まったりとした時間を過ごした）"
1005505-47 = "（……食事中さりげなくお酒を注文しようとするシグレには困らされたけれど）"
1005505-54 = "ごちそうさまでした。ありがとう、先生。"
1005505-55 = "何というか……"
1005505-56 = "うん、楽しくて、新鮮な経験だった。"
1005505-57 = "先生とこうして出かけたり、繁華街のレストランでビックリするほどの高級料理を食べたり……"
1005505-58 = "……こうして、都会の夜景を眺めたり。"
1005505-61 = "[wa:400]― 綺麗な夜景だね……。"
1005505-64 = "― こんな素敵な景色を"
1005505-66 = "― 見せてくれてありがとう、[wa:1500]先生。"
1005505-69 = "[ns5] \"シグレが望むなら、またいつでも。\"\n[ns6] \"来たくなったら、連絡してもらえれば……。\""
1005505-70 = "[wa:400]― ……そう言ってくれるのは[wa:1500]嬉しいけど。"
1005505-71 = "[wa:400]― ……そう言ってくれるのは[wa:1500]嬉しいけど。"
1005505-73 = "― 私、[wa:1200]やっぱり今の場所が好きなんだ。"
1005505-76 = "[wa:750]― ……こういう都会だと、"
1005505-78 = "― あまり星が見えないでしょ。"
1005505-81 = "[wa:400]― 明るすぎる光の中だと、"
1005505-83 = "― 星って[wa:1300]うまく見つけられなくなっちゃうから……"
1005505-86 = "― だから、"
1005505-88 = "― 私は暗闇から眺めるだけで[wa:1600]十分。"
1005505-91 = "[wa:750]― 大切な人と、"
1005505-93 = "― 美味しい飲み物さえあれば……"
1005505-96 = "― 場所は[wa:300]どこだって構わないからね。"
1005505-99 = "それに美味しかったし嬉しかったけど……つい旧校舎のことを思い出しちゃってね。"
1005505-100 = "先生の厚意を、私だけが受けているなんて……"
1005505-101 = "……ノドカに嫌われちゃうかな？なんて。"
1005505-102 = "[s7] \"そしたら、次はみんなで一緒にとか？\"\n[s8] \"じゃあ、今度は227号のみんなと一緒に来よっか。\""
1005505-108 = "うーん…………。"
1005505-109 = "それは減点だよ、先生。"
1005505-110 = "ま、先生らしいと思うけどね。"
1005505-111 = "[s] \"な、何か間違えちゃった気配……。\""
1005505-112 = "ふふっ冗談だよ。#n……半分くらいはね。"
1005505-113 = "先生が良いなら、悪くない提案じゃないかな。"
1005505-114 = "旧校舎は、ああいう環境だし……こういうところに来られたら、喜ぶと思う。"
1005505-115 = "行きたいお店とか、場所？"
1005505-119 = "うーん……どこでも良いんじゃないかな。"
1005505-125 = "227号組が一緒に居られて、そこに先生もいれば。"
1005505-126 = "場所がどこであっても、私にとっては世界で一番幸せな場所だから。"
