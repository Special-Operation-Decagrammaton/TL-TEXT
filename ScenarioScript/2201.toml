[translation]
2201-1 = "不健全な事業計画"
2201-2 = "トリニティ・商店街"
2201-4 = "あらっ、そうなのですか？"
2201-5 = "はい、あちらの商店街の先にあるカフェで……"
2201-8 = "ふ～ん……あっちもこっちも平和ボケしてそうな子ばっかりだね。"
2201-9 = "言葉遣いからして、ザ・お嬢様って感じ？"
2201-10 = "な、なんか、キラキラしてますね。"
2201-11 = "ほ、本当に私みたいなのがここにいて、良いのでしょうか……。"
2201-12 = "あ、良いこと思いついた。この往来のど真ん中で爆発起こさない？"
2201-13 = "……いやいやいや。"
2201-14 = "よしなさい、ムツキ。トリニティの商店街を爆発させてって依頼で来たのであれば別だけど。"
2201-15 = "今日は別件よ、ここで騒ぎを起こすのは得策じゃないわ。"
2201-16 = "そもそもアルちゃん、急にトリニティに来るなんて、今回は何の用事なの？"
2201-17 = "ふふふ、聞いて驚かないでちょうだい？"
2201-18 = "それは大丈夫～、どうせ今さらアルちゃんの言うことに驚いたりしないし。"
2201-19 = "それは確かに。"
2201-20 = "わ、私は驚くかもしれませんので！こ、心の準備をしてます……！"
2201-21 = "あ……でも驚くなと仰いましたし……ど、どうしましょう！？"
2201-22 = "ああもう、うるさいわよ！？"
2201-23 = "こほん、とにかく今日私たちがこうしてトリニティを訪れているのは……"
2201-25 = "ここで、新規事業説明会があるからよ！"
2201-26 = "事業説明会？"
2201-27 = "……こんなお嬢様学園のふもとで？"
2201-28 = "ええ、そうよ。知り合いのコネで聞いた話なのだけど……。"
2201-29 = "アルちゃんのコネぇ？"
2201-30 = "……はぁ、多分もうダメだこれ。"
2201-31 = "ど、どうして、話を聞く前からそんな反応するのよ！？"
2201-32 = "ちゃんと確かな情報なんだから！この前の依頼主から、"
2201-33 = "「良い話があるんだけど、これはアル社長にだけ教えるからね？内緒だよ、分かった？」って紹介してくれて……。"
2201-35 = "キヴォトスの裏世界でも一部にしか知られていない、トップシークレットな情報なのよ！"
2201-36 = "アウトローたちだけが共有している秘密の事業……！"
2201-37 = "すごいと思わない！？"
2201-38 = "ふ～ん……まあアルちゃんがそれで良いなら良いけど。"
2201-39 = "さ、さすがアル様です！すごいです！"
2201-40 = "あはっ、もっと褒めてもいいのよ！"
2201-41 = "こんな貴重な機会を得られたのも、すべてこの私の経営手腕のおかげ！"
2201-42 = "……せめて面倒なことにならないと良いけど。"
2201-43 = "さあっ、遅れるわけにはいかないわ。説明会に向かうわよ！"
2201-46 = "わ～お、すっごい人の数。"
2201-47 = "この人たちみんなその、新規事業説明会……？に参加する人なんだ。"
2201-48 = "すごいのは数だけじゃないわよ。"
2201-49 = "ここに集まった事業家は、裏世界でも指折りの……各分野で成功を収めた事業家の人たちばかりなんだから！"
2201-50 = "ここで顔を覚えてもらって私たちの名前が広がれば、それだけで大きな成果になるわ。"
2201-51 = "それに、この説明会の事業に投資して利益も得られれば……私たち便利屋の未来はますます明るくなるってものでしょう？"
2201-52 = "あっ、壇上に誰かが……。"
2201-56 = "まずは御礼を、本日はこうして当社の事業説明会に参加してくださり、誠にありがとうございます。"
2201-57 = "先に申し上げましょう、今回のような機会は滅多にあることではございません。"
2201-58 = "ここに立ち会えたことそのものが、まず幸運と言っても過言ではないでしょう。"
2201-59 = "そう、ここにいる皆様は、既に選ばれたも同然！"
2201-60 = "ふ～ん……？"
2201-61 = "……？"
2201-62 = "や、やっぱり！私たちは事業のチャンスを掴んだのよ！"
2201-64 = "それでは我が社の細かい話などはさておき、発表いたしましょう。"
2201-65 = "当社から皆様へ、自信を持ってお届けするアイテム。"
2201-66 = "それは……！"
2201-67 = "（ジャジャーン！）"
2201-68 = "「カシミヤ仕立てのエコ・モバイルバッテリー」です！"
2201-70 = "カシミヤ……？"
2201-71 = "エコ……？"
2201-72 = "……バッテリー？"
2201-73 = "……？？？"
2201-75 = "こちらはただのモバイルバッテリーではございません！"
2201-76 = "AIを使ったディープラーニングにより、最も効率的な素材を選び出し、それをふんだんに使って構成……"
2201-77 = "最高級の素材で、どんなバッテリーよりも優れた効率性を実現！"
2201-78 = "アルちゃん、これさあ……。"
2201-80 = "……はぁ。"
2201-81 = "ま、まだ分からないじゃない！もうちょっと聞くわよ……！"
2201-83 = "あの事業家の人が言ってたんだから……！"
2201-84 = "しかも当社が提供するのはこの製品だけではありません！"
2201-85 = "当社では独自のマーケティングシステムを用いて、利益を最大化するため……"
2201-86 = "リスクヘッジを十分考慮した事業戦略で……"
2201-87 = "し、システム……リスクヘッジ……（めもめも）"
2201-88 = "……。"
2201-89 = "変動幅の大きいキヴォトスにおける経済指標を注意深く観察しながら、いかなる状況にも柔軟に対応できるよう……。"
2201-90 = "け、経済指標……？"
2201-91 = "（プルプル……）"
2201-92 = "……ふぅ。"
2201-93 = "（えぇ……）"
2201-95 = "では、ご説明はここまでにしましょう。"
2201-96 = "それではお待ちかねの、実際に私共への事業投資の方法ですが……。"
2201-97 = "難しいことは要求致しません。皆様は私共のサービスシステムに加入するため、この会員カードを購入するだけで大丈夫です！"
2201-98 = "会員カードを購入するだけで、自動的にこのシステムを利用できるようになります！"
2201-100 = "さらに今ならなんと！この500万円の会員カードを購入されると、天使としての階級が「セラフィム」まですぐに上昇！"
2201-101 = "お客様はすぐに、100人の天使を従えることができるのです！"
2201-102 = "盛りすぎでしょ！？マルチ商法まがいの怪しいビジネスに、オカルトまで混ぜるんじゃないわよっ！！！"
2201-103 = "あはははっ！ついに言っちゃったねアルちゃん！"
2201-104 = "マルチ商法まがいって認めちゃってるじゃん、あははっ！"
2201-105 = "はあ……社長、ここのことを教えてきたその知人って……。"
2201-106 = "分かってるから！もう何も言わないで！！"
2201-107 = "あの、私がその知人の方、消しちゃいましょうか？"
2201-108 = "うぅ……。"
2201-109 = "まあ、トリニティで開かれる事業説明会って聞いた時から、もしかしてって思ったけど。"
2201-110 = "世間知らずのお嬢様たちを狙ったものみたいだね。"
2201-111 = "ぷははははっ！！それ自体はともかく、お嬢様たち狙いで引っ掛かったのがアルちゃんって……！ぷふっ！"
2201-112 = "信じてたのに……私だけに教えるって言うから、信じてたのに……！"
2201-113 = "よくも、恩を仇で！！！"
2201-115 = "そ、そこのお客様！？何の騒ぎですか！？"
2201-116 = "私共はあくまでも健全な事業計画に基づいた機会を皆様に……"
2201-117 = "もういいわ。"
2201-118 = "よくも私たちの貴重な時間を、無駄にしてくれたわね。"
2201-119 = "お、お客様、何を……？これは二度とないチャンスで……！"
2201-120 = "夢と希望のチャンスをここで共に……！"
2201-123 = "（ガッ）"
2201-124 = "え、いや、私の肩ではなく、チャンスを掴……"
2201-125 = "ハルカ。"
2201-128 = "は、はいっ！"
2201-129 = "やりなさい。"
2201-131 = "はいっ！"
2201-132 = "アル様のご命令なら！"
2201-134 = "うわあああっ！？な、何を！？"
2201-135 = "あ、アル様の貴重な時間を……！全部、全部消します！！"
2201-136 = "……よくも私たち便利屋を騙そうとしてくれたわね。"
2201-137 = "一歩間違えたら、その巧妙な手口のせいで便利屋の資金が全部なくなるところだったじゃない！"
2201-138 = "素直だねえアルちゃん。"
2201-139 = "ああもう！ムツキ！カヨコ！"
2201-141 = "ま、十分楽しめたし、始めよっか！"
2201-142 = "はあ……仕方ない。"
2201-144 = "やってしまいなさい！！"
2201-153 = "正義実現委員会です！"
2201-154 = "こちらで違法な事業説明会が開かれてると通報を受けて来ました！"
2201-155 = "来ました！"
2201-156 = "……？"
2201-157 = "……誰もいませんね？"
2201-161 = "あっぶな～、よりにもよってトリニティの正義実現委員会！"
2201-162 = "風紀委員会と同レベルに面倒な相手だね……そもそも接触しないのが吉。"
2201-163 = "ま、あそこと絡むとうちの風紀委員長がすっごい顔するだろうから、それはそれで面白そうだけどね～。"
2201-164 = "い、行ってきましょうか？ご命令いただければ、私が全部……！"
2201-167 = "ああもう！話をややこしくしないで！"
2201-168 = "はぁ……。"
2201-169 = "よし、今日のことはもう終わったこと！"
2201-170 = "これからは知人がむやみに勧めてくる事業とか……もう絶対に信じないんだから！"
2201-171 = "他人に頼る必要なんてないわ、私たちの事業は私たちの手で成功させる！！"
2201-172 = "あはっ、アルちゃんらし～！"
2201-173 = "はあ……まあ、こうなると思ってたけど。"
2201-174 = "ほら、早く離れるわよ！"
2201-178 = "は、はいっ！"
2201-180 = "（そして正義実現委員会から逃げるようにして、便利屋68はトリニティ地区の夜道を駆けていった）"
2201-181 = "不健全な事業計画"
