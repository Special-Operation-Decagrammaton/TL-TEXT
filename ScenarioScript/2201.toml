[translation]
2201-1 = "Plano de negócios insalubre"
2201-2 = "Distrito comercial de Trinity"
2201-4 = "Ah, é mesmo?"
2201-5 = "Sim, em um café que fica depois daquele distrito comercial..."
2201-8 = "Hmm... parece que todo mundo por aqui vive no mundo da lua, alheio a qualquer perigo."
2201-9 = "Pelo jeito de falar, parece que são todas 'madames', né?"
2201-10 = "N-nossa, elas parecem tão radiantes."
2201-11 = "S-será que alguém como eu deveria mesmo estar aqui...?"
2201-12 = "Ah, tive uma ideia. Que tal explodirmos tudo bem no meio dessa rua?"
2201-13 = "…Não, não, não."
2201-14 = "Pare com isso, Mutsuki. A menos que tenhamos sido contratadas especificamente para explodir o distrito comercial de Trinity."
2201-15 = "Hoje é outro assunto, não é uma boa ideia causar confusão aqui."
2201-16 = "Aliás, Aru-chan, por que você veio para Trinity de repente? Qual é o plano desta vez?"
2201-17 = "Fufufu, não se surpreenda quando eu contar, está bem?"
2201-18 = "Ah, isso é tranquilo~, de qualquer forma, não vou me surpreender com nada que a Aru-chan disser a essa altura."
2201-19 = "Isso é verdade."
2201-20 = "E-eu talvez me surpreenda! E-estou me preparando mentalmente...!"
2201-21 = "Ah... mas você disse para não me surpreender... o-o que eu faço!?"
2201-22 = "Ai, chega, vocês são muito barulhentas!"
2201-23 = "Ehem, de qualquer forma, o motivo de estarmos visitando Trinity hoje é..."
2201-25 = "É porque vai ter uma apresentação de um novo negócio aqui!"
2201-26 = "Apresentação de negócio?"
2201-27 = "…Bem aos pés de uma escola de madame como esta?"
2201-28 = "Sim, exatamente. Ouvi falar disso através de um contato meu..."
2201-29 = "Um contato da Aru-chan?"
2201-30 = "…Ai, ai, acho que isso não vai prestar."
2201-31 = "P-por que você está reagindo assim antes mesmo de ouvir a história!?"
2201-32 = "É uma informação confiável! O cliente da última vez me disse:"
2201-33 = "'Tenho uma ótima oportunidade, mas só vou contar para a presidente Aru, viu? É segredo, entendeu?' e me apresentou isso..."
2201-35 = "É uma informação ultrassecreta que pouquíssimas pessoas no submundo de Kivotos conhecem!"
2201-36 = "Um negócio secreto compartilhado apenas entre fora da lei...!"
2201-37 = "Não acha incrível!?"
2201-38 = "Hmm... bem, se a Aru-chan acha que está tudo bem, então tudo bem."
2201-39 = "C-como esperado da Aru-sama! É incrível!"
2201-40 = "Ah, pode continuar me elogiando, viu!"
2201-41 = "Conseguir uma oportunidade tão valiosa como esta é graças à minha habilidade de gestão!"
2201-42 = "…Espero que isso não acabe em problemas, pelo menos."
2201-43 = "Vamos, não podemos nos atrasar. Vamos para a apresentação!"
2201-46 = "Uau, quanta gente."
2201-47 = "Todas essas pessoas vieram para... aquela apresentação de novo negócio?"
2201-48 = "Não é só a quantidade que impressiona."
2201-49 = "Os empresários reunidos aqui são alguns dos melhores do submundo... todos eles tiveram sucesso em suas respectivas áreas!"
2201-50 = "Se eles lembrarem do nosso rosto e nosso nome se espalhar, isso já será um grande resultado."
2201-51 = "Além disso, se investirmos nesse negócio e obtivermos lucro... o futuro da nossa Loja de Conveniência só vai brilhar ainda mais, não é?"
2201-52 = "Ah, tem alguém no palco..."
2201-56 = "Primeiramente, gostaria de agradecer a todos por participarem da nossa apresentação de negócios hoje."
2201-57 = "Já adianto que oportunidades como esta são extremamente raras."
2201-58 = "Não é exagero dizer que o simples fato de estarem aqui já é uma sorte imensa."
2201-59 = "Sim, todos vocês aqui presentes já são, por assim dizer, os escolhidos!"
2201-60 = "Hmm...?"
2201-61 = "……？"
2201-62 = "É, é isso mesmo! Nós agarramos uma oportunidade de negócio!"
2201-64 = "Então, deixando de lado os detalhes da nossa empresa, vamos ao anúncio."
2201-65 = "Um item que nossa empresa traz a vocês com total confiança."
2201-66 = "É este...!"
2201-67 = "（Tcharam!）"
2201-68 = "O \"Carregador Portátil Ecológico feito de Caxemira\"!"
2201-70 = "Caxemira...?"
2201-71 = "Ecológico...?"
2201-72 = "……Bateria?"
2201-73 = "……？？？"
2201-75 = "Este não é um carregador portátil comum!"
2201-76 = "Através de aprendizado profundo com IA, selecionamos o material mais eficiente e o utilizamos em abundância para compor..."
2201-77 = "Com materiais de altíssima qualidade, alcançamos uma eficiência superior a qualquer outra bateria!"
2201-78 = "Aru-chan, isso é..."
2201-80 = "……Haa."
2201-81 = "A-ainda não dá para saber! Vamos ouvir um pouco mais...!"
2201-83 = "Já que aquele empresário disse isso...!"
2201-84 = "E não é só este produto que nossa empresa oferece!"
2201-85 = "Nossa empresa utiliza um sistema de marketing exclusivo para maximizar os lucros..."
2201-86 = "Com uma estratégia de negócios que considera cuidadosamente a mitigação de riscos..."
2201-87 = "Si-sistema... mitigação de riscos... (anotando, anotando)"
2201-88 = "……."
2201-89 = "Observando atentamente os indicadores econômicos em Kivotos, onde a volatilidade é alta, para que possamos responder com flexibilidade a qualquer situação..."
2201-90 = "In-indicadores econômicos...?"
2201-91 = "（Treme, treme...）"
2201-92 = "……Ufa."
2201-93 = "（É sério...）"
2201-95 = "Bem, vamos encerrar as explicações por aqui."
2201-96 = "Agora, sobre o tão aguardado método de investimento no nosso negócio..."
2201-97 = "Não exigimos nada difícil. Para aderir ao nosso sistema de serviços, basta comprar este cartão de membro!"
2201-98 = "Apenas comprando o cartão de membro, você poderá utilizar este sistema automaticamente!"
2201-100 = "E tem mais! Se você comprar este cartão de membro de 5 milhões de ienes agora, sua classe como anjo subirá imediatamente para \"Serafim\"!"
2201-101 = "Você poderá comandar 100 anjos imediatamente!"
2201-102 = "Isso é exagero demais, não é?! Não misture ocultismo com esse negócio suspeito que parece pirâmide financeira!!!"
2201-103 = "Ahahaha! Finalmente você disse, Aru-chan!"
2201-104 = "Você mesma admitiu que parece pirâmide financeira, ahaha!"
2201-105 = "Haa... Presidente, aquele conhecido que te contou sobre isso..."
2201-106 = "Eu já sei! Não diga mais nada!!"
2201-107 = "Ei, quer que eu dê um fim nesse conhecido?"
2201-108 = "Uuu..."
2201-109 = "Bem, desde que ouvi que era uma apresentação de negócios em Trinity, eu já desconfiava."
2201-110 = "Parece que o alvo são as garotas ingênuas."
2201-111 = "Puhahaha!! Deixando isso de lado, o fato de a Aru-chan ter sido a ingênua que caiu nessa...! Puf!"
2201-112 = "Eu confiava nele... Ele disse que contaria só para mim, eu confiava nele...!"
2201-113 = "Como ousa retribuir minha confiança com traição!!!"
2201-115 = "Ei, você aí!? Que confusão é essa!?"
2201-116 = "Nós estamos apenas oferecendo oportunidades baseadas em um plano de negócios sólido para todos..."
2201-117 = "Já chega."
2201-118 = "Como ousa desperdiçar nosso tempo precioso."
2201-119 = "C-cliente, o que está fazendo...? Essa é uma oportunidade única na vida...!"
2201-120 = "Vamos agarrar essa chance de sonhos e esperanças juntos aqui...!"
2201-123 = "（Gah）"
2201-124 = "Ei, não, não é no meu ombro, é para agarrar a chance..."
2201-125 = "Haruka."
2201-128 = "S-sim!"
2201-129 = "Faça isso."
2201-131 = "Sim!"
2201-132 = "Se é uma ordem da Aru-sama!"
2201-134 = "Uwaaaaah!? O-o que você está fazendo!?"
2201-135 = "A-o tempo precioso da Aru-sama...! Vou apagar tudo, tudo mesmo!!"
2201-136 = "……Como ousa tentar enganar a nós, da Problem Solver."
2201-137 = "Se tivéssemos cometido um erro, por causa desse seu truque astuto, todo o capital da Problem Solver teria desaparecido, sabia!"
2201-138 = "Você é tão ingênua, Aru-chan."
2201-139 = "Ah, chega! Mutsuki! Kayoko!"
2201-141 = "Bem, já nos divertimos o suficiente, vamos começar?"
2201-142 = "Haa... não tem jeito."
2201-144 = "Acabe com isso!!"
2201-153 = "Aqui é o Comitê de Justiça!"
2201-154 = "Recebemos uma denúncia de que uma reunião de negócios ilegal estava sendo realizada aqui!"
2201-155 = "Chegamos!"
2201-156 = "……?"
2201-157 = "……Não tem ninguém aqui?"
2201-161 = "Ufa, que perigo... logo o Comitê de Justiça de Trinity!"
2201-162 = "São tão problemáticas quanto o Comitê Disciplinar... o melhor é nem entrar em contato."
2201-163 = "Bem, se nos envolvermos com elas, nossa presidente do Comitê Disciplinar provavelmente faria uma cara terrível, o que seria até engraçado, mas..."
2201-164 = "D-devo ir lá? Se me der a ordem, eu cuido de tudo..."
2201-167 = "Ah, chega! Não complique as coisas!"
2201-168 = "Haa..."
2201-169 = "Muito bem, o que aconteceu hoje, aconteceu!"
2201-170 = "De agora em diante, negócios recomendados por conhecidos... eu nunca mais vou acreditar neles!"
2201-171 = "Não precisamos depender de ninguém, vamos fazer nossos próprios negócios prosperarem com nossas próprias mãos!!"
2201-172 = "Ahaha, bem a sua cara, Aru-chan!"
2201-173 = "Haa... bem, eu já esperava que terminasse assim."
2201-174 = "Vamos, vamos sair daqui logo!"
2201-178 = "S-sim!"
2201-180 = "（E assim, fugindo do Comitê de Justiça, a Problem Solver 68 correu pelas ruas noturnas do distrito de Trinity）"
2201-181 = "Plano de negócios insalubre"
