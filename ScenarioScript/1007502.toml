[translation]
1007502-1 = "物資調達"
1007502-5 = "（どれを買えば良いのか分からず、店員に勧められたものを購入したら……）"
1007502-17 = "（たくさんの試供品をもらってしまった）"
1007502-20 = "いらっしゃい、先生！待ちくたびれたよ～"
1007502-21 = "危うく浮かんでたネタがどこかにいっちゃうとこだった！"
1007502-22 = "それで、頼んだペンは買ってきてくれた？"
1007502-23 = "[s] \"持ってきたよ、メルリー先生。\""
1007502-24 = "よし！じゃあこれで……ん？"
1007502-29 = "せ、先生……？"
1007502-30 = "[s1] \"どうしたの？\"\n[s2] \"もしかして間違ってた……？\""
1007502-33 = "や、その……これ、めっちゃ高いヤツじゃない……？"
1007502-34 = "こんな高級ペン……レッドウィンターじゃ見たことない。"
1007502-35 = "えっと、今ちょっと持ち合わせがないんだけど……"
1007502-36 = "[s] \"いつも頑張ってるからね、プレゼントだよ。\""
1007502-37 = "そ、そう……？#nそんな風に言われたら断るのも失礼か……"
1007502-41 = "こっちは何だろ……って、替え芯、こんなにいいの！？#nすごい……フェルト芯にプラスチックに……気になってた極細芯まである！"
1007502-42 = "[s3] \"そこまで驚くこと……？\"\n[s4] \"キャンペーン中だったみたい。新作の試供品なんだって。\""
1007502-45 = "そりゃ驚くよ！！レッドウィンター連邦学園を舐めないでよね！#nあ、いやむしろ舐めてほしいかもだけど！"
1007502-46 = "榴弾や油圧装置、ショベルなんかは簡単に手に入るんだけど……"
1007502-47 = "柔らかいトイレットペーパーや書きやすいボールペン、石鹸、濃い味のプリンなんかは本当にお目にかかれないんだから！"
1007502-48 = "[s] \"レッドウィンターならそうだよね……納得。\""
1007502-49 = "あぁ……本当にありがとう、先生。すっごく嬉しい。"
1007502-53 = "こんな素敵なものを頂いたわけだし、お返しをしたいんだけど……"
1007502-54 = "先生、何か欲しいものとかある？"
1007502-55 = "[s] \"大丈夫、先生が生徒を助けるのは当然だからね。\""
1007502-56 = "そんなこと言わないでさぁ～それを言うなら、いつもお世話になっている生徒が先生にお返しをするのだって当然だと思わない？"
1007502-57 = "[s5] \"いやいや、本当に大丈夫だよ。\"\n[s6] \"メルの笑顔が見られただけで十分だからね。\""
1007502-60 = "もう！そうやって子供扱いするなら……"
1007502-61 = "先生にもらったもので、お返ししちゃおうかな。"
1007502-62 = "ふっふっふ……何をするのかって？"
1007502-66 = "先生の絵を描くんだよ！"
1007502-67 = "[s] \"え、遠慮しておくよ。\""
1007502-68 = "まぁまぁ、そう言わずにさ！#n路上で似顔絵を描いてたりするヤツ、見たことあるでしょ？"
1007502-69 = "それと似たようなもんだから！#nもちろん、先生のことをよく知ってる分、丁寧に描くけどね！"
1007502-70 = "[s] \"いや、手間かけるのは悪いし……\""
1007502-71 = "うん？別に手間なんかじゃないよ？"
1007502-72 = "むしろ普段はじっくり描けないモデルだから、こっちとしては好都合……"
1007502-73 = "自分で言っといて何だけど、こんな機会滅多にないじゃん！#n黙ってスケッチされろ～！"
1007502-79 = "ええい……！まだ抵抗する気かっ！#n私の燃え上がる芸術魂は止められないぞ……！"
1007502-80 = "もう恩返しなんて関係ない！先生を！！描くっ！！"
1007502-83 = "[ns] \"誰か助けて！スケッチ星人に襲われているんです！\""
1007502-87 = "ふふふ……いくら声を上げても無駄だよ、先生。#n誰も助けになど来ない……"
1007502-88 = "私たち知識解放戦線の図書館は……#nどれだけ大声を出したって、誰にも届かない……そう、[ruby=へんぴ]辺鄙[/ruby]な場所にあるからね！"
1007502-89 = "[s7] \"くっ……！こうなったら、大人の交渉術を使うしか！\"\n[s8] \"ペンを受け取るか私をスケッチするか選んでもらおう！\""
1007502-95 = "えっ……？"
1007502-96 = "何それ……ペンをもらうか、先生をスケッチするかの2択……？"
1007502-97 = "そもそもコレがないと、スケッチできないのに！？"
1007502-98 = "くう！これが大人の交渉術……！#nズルい！卑怯だっ！"
1007502-99 = "[s] \"ふっ……大人はズルいくらいでちょうど良いんだよ。\""
1007502-100 = "ここまでかっ……！#n私の芸術魂は、ここで散ってしまうのかっ……！"
1007502-101 = "くっ、今回は諦めるしかない。#n機を伺っていれば、いつかまたチャンスは訪れるはず……！"
1007502-102 = "その時まで、首を洗って待ってるんだな！いつか必ず、先生をスケッチしてみせるんだから！"
1007502-108 = "いつか来る日のために……今日は間近でじっくり先生を観察しておこっと♪"
1007502-110 = "（メルの視線から逃れようとあたふたしていたら、1日が終わってしまった……）"
