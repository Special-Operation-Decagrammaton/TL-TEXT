[translation]
52230-1 = "Episódio 23; Canção de Harmonia em Quatro Lados"
52230-2 = "Vamos mesmo realizar o Festival Waraku nesta situação!?"
52230-3 = "Sim. Os equipamentos necessários para o festival já estão preparados, não estão?"
52230-4 = "Isso é verdade, mas..."
52230-5 = "Será que conseguiremos realizar o festival em segurança no meio de todo esse caos?"
52230-6 = "Monstros estão aparecendo por toda parte e os cidadãos estão apavorados. Mesmo que a gente realize o evento..."
52230-7 = "Dói no meu coração dizer isso para vocês, do Comitê Organizador do Festival, que se dedicaram tanto até hoje..."
52230-8 = "Mas, neste momento, é mais importante divulgar o fato de que o festival está acontecendo do que o sucesso dele em si."
52230-9 = "Se o local, que deveria estar transbordando de sorrisos e vivas, for tomado pelo medo e pelos gritos, não poderemos dizer que as coisas estão 'como sempre'."
52230-10 = "Porém..."
52230-11 = "Estou ciente dos perigos."
52230-12 = "Eu também não quero que a Chise-chan suba em um palco perigoso..."
52230-13 = "Mas... é a única coisa que podemos fazer agora."
52230-17 = "Vocês não precisam ficar no local até o fim."
52230-18 = "Se apenas nos ensinarem a usar os equipamentos, o resto nós, do Yin-Yang, cuidaremos..."
52230-22 = "E-Eu...! Eu quero ajudar até o fim!"
52230-23 = "...Umika?"
52230-24 = "No último Festival das Lanternas, eu desmaiei e não consegui fazer nada... Ter que ficar só olhando desta vez também, isso é..."
52230-28 = "Como membro do Comitê Organizador do Festival, eu não aceito isso!"
52230-33 = "Eu também não, presidente!"
52230-34 = "O festival existe para que todos possam se divertir!"
52230-35 = "Se cedermos à interferência externa, não conseguiremos realizar nenhum festival daqui para frente!"
52230-36 = "Da última vez não fui forte o suficiente, mas..."
52230-37 = "Eu, Fina, estou determinada a repelir esses malfeitores com força total desta vez!"
52230-38 = "...Serei sincera."
52230-39 = "Eu também estou furiosa."
52230-40 = "Quantos alunos estavam ansiosos por este festival..."
52230-41 = "Não apenas o comitê, mas muitas pessoas de Hyakkiyako suaram a camisa por causa deste festival."
52230-42 = "Não sei se isso é elegância ou uma história de fantasmas, mas não vou perdoar quem tentar atrapalhar com essas bobagens!"
52230-43 = "Oh~"
52230-44 = "Kaho-san, se realizarmos o Festival Waraku... poderemos parar esse pessoal chamado Clube Kacho Fugetsu, certo?"
52230-45 = "Não sei os detalhes, mas é certo que elas não querem que o festival aconteça."
52230-46 = "Então, vamos dar a elas o nosso 'festival'!"
52230-47 = "N-Nós também vamos ajudar!"
52230-48 = "Sim! Izuna, Tsukuyo-dono e a presidente também! #nEstamos prontas para dar o nosso melhor e acompanhar vocês! Nin-nin!"
52230-49 = "Ah, não, não precisa de tanto esforço assim..."
52230-53 = "Mas... é um pedido do Sensei, e cumprirei meu dever como ninja!"
52230-54 = "Vou aproveitar o Festival Waraku com tudo!"
52230-55 = "Como esperado...! Vamos nessa!"
52230-60 = "Chise-chan, sinto muito que o palco tenha se tornado um lugar perigoso... Você se lembra da música?"
52230-61 = "Sim, estou bem."
52230-62 = "Não deixarei que nenhum Tsukumogami se aproxime do palco... Por favor, conto com você."
52230-67 = "Ufa..."
52230-68 = "Então, pessoal..."
52230-69 = "Ouçam... a minha canção!"
