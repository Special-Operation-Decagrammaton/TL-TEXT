[translation]
52230-1 = "第23話;四面和楽歌"
52230-2 = "この状況で和楽まつりを開催するんですか！？"
52230-3 = "ええ。お祭りに必要な機材は準備できていますね？"
52230-4 = "それはそうですが……。"
52230-5 = "この混乱の中、無事お祭りを進行できるのでしょうか？"
52230-6 = "あちこちに怪物が現れて、市民の皆さんは怯えています。仮に開催したとしても……。"
52230-7 = "今日まで尽力されていたお祭り運営委員会の皆さんにこんなことを言うのは、心苦しいのですが……。"
52230-8 = "今はお祭りの成功よりも、お祭りが行われている事実を周知する必要があるのです。"
52230-9 = "笑顔や歓声で溢れるはずの会場が、恐怖と悲鳴に覆われているのでは、「これまで通り」と言えません。"
52230-10 = "しかし……。"
52230-11 = "危険は承知の上です。"
52230-12 = "私も、チセちゃんを危険な舞台に立たせたくありません……。"
52230-13 = "でも……今の私たちにできるのは、これくらいしかないんです。"
52230-17 = "皆さんは、最後まで会場にいる必要はありません。"
52230-18 = "機材の使い方さえご教示いただければ、あとは私たち陰陽部が――"
52230-22 = "わ、私はっ……！最後までお手伝いしたいです！"
52230-23 = "……ウミカ？"
52230-24 = "前回の燈籠祭の時、私は気を失って何もできませんでした……今回も見ているだけだなんて、そんなの……。"
52230-28 = "お祭り運営委員会の一員として、納得できません！"
52230-33 = "私もデース、委員長！"
52230-34 = "お祭りはみんなで楽しむために行うモノ！"
52230-35 = "外部からの妨害に屈しては、今後どんなお祭りも開催できなくなってしまいマス！"
52230-36 = "前回は力及ばずでしたガ……。"
52230-37 = "不肖フィーナ、今度こそゼンリョクでならず者を退ける覚悟デス！"
52230-38 = "……正直に言いますと。"
52230-39 = "私も腹が立っています。"
52230-40 = "このお祭りを、どれだけの生徒たちが楽しみにしていたか……。"
52230-41 = "お祭りのために、[ruby=われわれ]委員会[/ruby]だけでなく、百鬼夜行の沢山の方達が汗を流してきたんです。"
52230-42 = "風流だか怪談だか知りませんが、そんなデタラメでまた邪魔しようとするなんて、絶対に許せません！"
52230-43 = "おお～"
52230-44 = "カホさん、和楽まつりを開催すれば……花鳥風月部とかいう連中を止められるんですよね？"
52230-45 = "詳しいことは分かりませんが、彼女たちがお祭りの開催を望んでいないことは確かです。"
52230-46 = "なら、私たちの「[ruby=とくいわざ]お祭り[/ruby]」を――食らわせてやります！"
52230-47 = "わ、私たちも協力します！"
52230-48 = "はい！イズナも、ツクヨ殿も部長も！#n身を粉にする覚悟で、みなさんにお供します！ニンニン！"
52230-49 = "あっ、いやっ、そ、そこまでの覚悟は……。"
52230-53 = "でも……先生殿からのお願いだし、忍者としての義務は果たす！"
52230-54 = "和楽まつり、全力で楽しむよーっ！"
52230-55 = "流石です……！行きましょう！"
52230-60 = "チセちゃん、危険な舞台になってしまい申し訳ありません……歌は覚えていますか？"
52230-61 = "うん、大丈夫だよ。"
52230-62 = "付喪神は一匹たりとも舞台には近づけませんので……どうかよろしくお願いします。"
52230-67 = "ふぅ……。"
52230-68 = "それじゃ、みんな～"
52230-69 = "私の歌を……きいて～！"
