[translation]
52230-1 = "Episódio 23; Canção da Harmonia em Quatro Lados"
52230-2 = "Você vai realizar o Festival Waraku nesta situação!?"
52230-3 = "Sim. Os equipamentos necessários para o festival já estão preparados, certo?"
52230-4 = "Sim, mas......"
52230-5 = "Será que podemos conduzir o festival com segurança no meio desse caos?"
52230-6 = "Monstros estão aparecendo por toda parte e os cidadãos estão aterrorizados. Mesmo que o realizemos......"
52230-7 = "Dói o meu coração dizer isso para todos vocês do Comitê Organizador que se esforçaram até hoje......"
52230-8 = "Mas agora, mais do que o sucesso do festival, precisamos que as pessoas saibam que ele está acontecendo."
52230-9 = "Se o local, que deveria estar transbordando de sorrisos e vivas, for coberto por medo e gritos, não poderemos dizer que 'está tudo como sempre'."
52230-10 = "Mas......"
52230-11 = "Estou ciente do perigo."
52230-12 = "Eu também não quero colocar a Chise-chan em um palco perigoso......"
52230-13 = "Mas...... é a única coisa que podemos fazer agora."
52230-17 = "Vocês não precisam ficar no local até o fim."
52230-18 = "Se apenas nos ensinarem a usar os equipamentos, o resto nós do Clube Yin-Yang――"
52230-22 = "E, eu......! Quero ajudar até o fim!"
52230-23 = "......Umika?"
52230-24 = "No último Festival das Lanternas, eu desmaiei e não consegui fazer nada...... ter que ficar apenas olhando desta vez também, isso......"
52230-28 = "Como membro do Comitê Organizador do Festival, eu não aceito isso!"
52230-33 = "Eu também, presidente!"
52230-34 = "O festival serve para que todos possam se divertir!"
52230-35 = "Se nos rendermos a interferências externas, não seremos capazes de realizar nenhum festival no futuro!"
52230-36 = "Na última vez faltou força, mas......"
52230-37 = "Eu, Feena, estou decidida a repelir esses malfeitores com força total desta vez!"
52230-38 = "......Para ser honesta."
52230-39 = "Eu também estou furiosa."
52230-40 = "Quanto quantas alunas esperavam ansiosamente por este festival......"
52230-41 = "Não só o comitê, mas muitas pessoas de Hyakkiyako suaram a camisa para este festival."
52230-42 = "Não sei se é 'elegância' ou 'história de fantasma', mas não posso perdoar que tentem atrapalhar com tanta bobagem!"
52230-43 = "Oooo~"
52230-44 = "Kaho-san, se realizarmos o Festival Waraku...... conseguiremos parar esse pessoal do Clube das Flores, Pássaros, Vento e Lua, né?"
52230-45 = "Não sei os detalhes, mas é certo que elas não querem que o festival aconteça."
52230-46 = "Então, vamos mostrar para elas a nossa 'especialidade'―― o festival!"
52230-47 = "N, nós também vamos ajudar!"
52230-48 = "Sim! Izuna, Tsukuyo-dono e eu também! #n Estamos dispostas a trabalhar até à exaustão para acompanhar vocês! Nin-nin!"
52230-49 = "Ah, não, e, esse nível de determinação......"
52230-53 = "Mas...... é um pedido do Sensei, e é nosso dever como ninjas!"
52230-54 = "Vou aproveitar o Festival Waraku com força total!"
52230-55 = "Como esperado......! Vamos lá!"
52230-60 = "Chise-chan, peço desculpas por ser um palco perigoso...... você lembra da música?"
52230-61 = "Sim, estou bem."
52230-62 = "Não deixaremos nem uma única Tsukumogami chegar perto do palco...... contamos com você."
52230-67 = "Fuu......"
52230-68 = "Então, pessoal~"
52230-69 = "Ouçam...... minha canção!"

