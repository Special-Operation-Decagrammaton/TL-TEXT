[translation]
1000002-1 = "Como aumentar a motivação para o trabalho"
1000002-2 = "Fufufu, é por isso que estou aqui, Sensei."
1000002-3 = "Tem algo que você queira como recompensa?"
1000002-4 = "[s1] \"Com certeza, um bônus em dinheiro.\"\n[s2] \"Quero que a Aru faça carinho em mim.\""
1000002-5 = "A-adulto...!"
1000002-6 = "Quer dizer, n-não é isso, não tem algo mais, sabe, romântico para você, Sensei...!?"
1000002-7 = "Ca-carinho!?"
1000002-8 = "Dizer que essa é a recompensa que você quer..."
1000002-9 = "S-sério que isso basta...? Se for assim, eu posso fazer o quanto você quiser..."
1000002-11 = "[s] \"Se não for isso, que tal um beijo na bochecha?\""
1000002-12 = "Hã!? U-um beijo, beijo na bochecha...!"
1000002-13 = "I-isso não pode. Mesmo que sejamos presidente e funcionário exemplar, esse tipo de coisa precisa ser feito com mais calma, levando tempo...!"
1000002-14 = "Afinal, para começar, algo como um restaurante com vista para a cidade seria..."
1000002-15 = "[s] \"Mas pensando bem, acho que um bônus em dinheiro seria melhor mesmo.\""
1000002-16 = "(Será que o Sensei está me provocando!?)"
1000002-19 = "Ah, me sinto exausta à toa."
1000002-20 = "Sensei, por favor, leve isso mais a sério. Quero dar uma recompensa adequada que faça jus a um resultado excelente."
1000002-21 = "Isso é necessário para aumentar a motivação dos funcionários, sabia?"
1000002-22 = "[s] \"A Aru é bem responsável com essas coisas, hein.\""
1000002-23 = "Fufufu, para lidar com funcionários excelentes, é preciso ser uma presidente igualmente excelente."
1000002-24 = "Uma líder que toma a iniciativa antes que seus subordinados precisem dizer algo..."
1000002-25 = "Tenho certeza de que meus subordinados ficarão impressionados com a minha liderança magnífica. Hehehe!"
1000002-26 = "[s] \"Se é assim, Aru, tem uma recompensa que eu gostaria de ganhar de você.\""
1000002-27 = "Hm?"
1000002-29 = "Cubo Doce"
1000002-30 = "Querer comer um parfait no café comigo, a presidente..."
1000002-31 = "Sensei, tem certeza de que quer uma recompensa como essa?"
1000002-32 = "[s] \"Porque o importante é comer junto com a Aru.\""
1000002-33 = "C-comigo... é importante..."
1000002-34 = "H-hum... bem, se você insiste tanto, não tenho escolha."
1000002-35 = "Sim, foi você quem pediu, Sensei. Não venha reclamar depois, hein?"
1000002-36 = "Então, qual parfait você pediu?"
1000002-42 = "Aqui está o menu desafio exclusivo para casais que vocês pediram: \"Não pare de comer, aceite o desafio, rumo à montanha infinita de creme ~Devore o Parfait Jumbo de Três Andares~\"!"
1000002-43 = "De-desafio? Jumbo? O-o que isso significa?"
1000002-44 = "[s] \"Disseram que se a gente terminar de comer em 20 minutos, sai de graça.\""
1000002-45 = "Se comer dentro do tempo, sai de graça...?"
1000002-46 = "Hehehe. Entendi, como esperado do Sensei."
1000002-47 = "Essa é uma ótima escolha, talvez eu dê isso como recompensa para os outros funcionários também."
1000002-48 = "Como esperado do meu consultor de gestão da Problem Solver 68!"
1000002-49 = "[s] \"Consultor de gestão?\""
1000002-50 = "Chega de conversa, eu aceito o seu desafio!"
1000002-51 = "Muito bem, vamos comer, Sensei!"
1000002-52 = "Nhac."
1000002-55 = "(Espera, isso é...)"
1000002-56 = "(Eu comecei a comer sem pensar muito, mas isso é um menu para casais...!?)"
1000002-57 = "(O Sensei pediu isso com tanta naturalidade, como se não fosse nada demais...!)"
1000002-58 = "(...H-humph!)"
1000002-59 = "(Bem, eu consigo lidar com isso tranquilamente, mas...)"
1000002-60 = "(...Será que meu rosto está entregando? O Sensei percebeu alguma coisa?)"
