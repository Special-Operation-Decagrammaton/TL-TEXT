[translation]
1000002-1 = "勤労意欲を高める方法"
1000002-2 = "ふふふ、そういうわけなんだけど、先生。"
1000002-3 = "何かご褒美として欲しいものとかある？"
1000002-4 = "[s1] \"やっぱり金一封。\"\n[s2] \"アルになでなでしてほしい。\""
1000002-5 = "お、大人……！"
1000002-6 = "って、そ、そうじゃなくて、先生にとってもっとこう、ロマンのあるものはないの……！？"
1000002-7 = "なっ、なでなで！？"
1000002-8 = "それが、先生がもらいたいご褒美だなんて……。"
1000002-9 = "ほ、本当にそんなことでいいの……？それなら、いくらでも……。"
1000002-11 = "[s] \"そうじゃなかったら、ほっぺにチューとか？\""
1000002-12 = "ほっ！？ほ、ほっぺにちゅ、ちゅ、チューだなんて……！"
1000002-13 = "そ、それはダメっ。いくら社長と優秀な職員っていう間柄だとしても、そういうことはもう少しゆっくり時間をかけて進めないと……！"
1000002-14 = "やっぱり最初は、夜景の見えるレストランみたいなところが……。"
1000002-15 = "[s] \"でもよく考えてみたら、やっぱり金一封の方がいいかも。\""
1000002-16 = "（もしかして先生、私のことからかってない！？）"
1000002-19 = "はあ、なんだか無駄に疲れたわ。"
1000002-20 = "先生、もう少し真剣に考えてちょうだい。立派な成果にふさわしい適切なご褒美を与えたいの。"
1000002-21 = "職員たちの勤労意欲を高めるためにも必要なことなのよ？"
1000002-22 = "[s] \"アルは、そういうところちゃんとしてるね。\""
1000002-23 = "ふふふ、優秀な職員たちを扱う為には、同じように優秀な社長でなくてはいけないってこと。"
1000002-24 = "部下たちが言い出す前に、率先して動くリーダー……。"
1000002-25 = "きっと私の素晴らしいリーダーシップに、部下たちも感激せざるを得ないでしょう。ふふふっ！"
1000002-26 = "[s] \"そういうことなら私、アルから貰いたいご褒美がある。\""
1000002-27 = "うん？"
1000002-29 = "スイートキューブ"
1000002-30 = "社長である私と一緒に、カフェでパフェが食べたいだなんて……。"
1000002-31 = "先生は本当に、こんなご褒美でいいの？"
1000002-32 = "[s] \"アルと一緒に食べるってことが大事だから。\""
1000002-33 = "わ、私と一緒が、大事……。"
1000002-34 = "ふ、ふーん……まあ、そこまで言うなら仕方ないわね。"
1000002-35 = "ええ、先生がそう言ったんだから。後で文句言わないでよね？"
1000002-36 = "それで、何のパフェを頼んだの？"
1000002-42 = "こちら、ご注文いただいたカップル専用挑戦メニュー、「食べる手を止めるな、挑戦しろ、果てしないクリームの山へ～喰らえジャンボパフェ三段突き～」です！"
1000002-43 = "ちょ、挑戦？ジャンボ？ど、どういう意味？"
1000002-44 = "[s] \"これ20分で食べ終わったらタダなんだって。\""
1000002-45 = "時間内に食べたらタダ……？"
1000002-46 = "ふふふ。なるほど、さすが先生ね。"
1000002-47 = "これは良い選択だわ、他の社員にもご褒美としてこれをあげようかしら。"
1000002-48 = "さすがは、我が便利屋の経営顧問ね！"
1000002-49 = "[s] \"経営顧問って？\""
1000002-50 = "余計なことはいいから、その挑戦、受けて立つわ！"
1000002-51 = "さあ、食べるわよ、先生！"
1000002-52 = "パクッ。"
1000002-55 = "（って、これ……）"
1000002-56 = "（あんまり意識しないで食べ始めちゃったけど、カップル専用メニュー……！？）"
1000002-57 = "（先生ったら、まるで何とも思ってないみたいにさりげなくこんなのを頼むなんて……！）"
1000002-58 = "（……ふ、ふん！）"
1000002-59 = "（まあ、こ、これぐらい私にだって余裕だけど……？）"
1000002-60 = "（……顔に出てたり、先生にバレたりしてないわよね？）"
