[translation]
10042060-1 = "第6話;やるべきこと"
10042060-2 = "……。"
10042060-3 = "こ、これは……。"
10042060-4 = "[s] \"だから言ったでしょ……？\""
10042060-5 = "こ、こんなの信じられるわけないでしょう！"
10042060-6 = "やっぱりドッキリですか？それとも悪い夢？#nは、早く目を覚まさないと……！"
10042060-10 = "痛っ！"
10042060-11 = "では、現実……？"
10042060-12 = "（あれ……）"
10042060-13 = "（私もやった覚えが……）"
10042060-14 = "人は理解不能な事態に遭遇すると不可解な行動をとる、とはよく言いますが……#nまさにそれですね。"
10042060-15 = "だまらっしゃい！"
10042060-16 = "巨大なパンケーキと聞いてはいましたが、まさかここまでとは……。"
10042060-17 = "うぅ。余剰火力で先生を困らせる計画が……。"
10042060-18 = "[s] \"そんなことを考えてたんだ……。\""
10042060-19 = "……っ！"
10042060-20 = "結果的には大正解でしたし、むしろ感謝するところじゃないですか！？"
10042060-21 = "早く「そうだね」と言ってください！#nなんですか、その顔は……！"
10042060-22 = "[s] \"そうだね……ごめん、泣かないでアコ。\""
10042060-23 = "な、泣いてませんけど！？"
10042060-24 = "……。"
10042060-25 = "はぁ、良いでしょう。#n総員、発砲準備！"
10042060-26 = "はい！88ミリFlaK36対空砲、発砲準備！"
10042060-27 = "お、お待ちください。行政官……！"
10042060-28 = "何ですか……？"
10042060-29 = "それが……。"
10042060-30 = "……！#nターゲットが……。"
10042060-31 = "「パンケーキ」の移動速度があまりにも早く、照準が合いません！"
10042060-32 = "建物を盾にしているせいで……。"
10042060-33 = "このまま発砲すれば、市街地に甚大な被害が！"
10042060-34 = "……はい？"
10042060-35 = "……その通りです。"
10042060-36 = "ちょっと、待ってください……。"
10042060-37 = "パンケーキが、建物間を高速移動。#n照準が合わず、このままでは市街地に被害が……。"
10042060-38 = "い、いったいどういう状況ですか？"
10042060-39 = "[s1] \"……アコ、大丈夫？\"\n[s2] \"「構わず撃て！」とは言わないんだね。\""
10042060-42 = "私を何だと思ってるんですか……。"
10042060-43 = "うっ……。"
10042060-48 = "（今は、あれを倒さなければなりません……）"
10042060-49 = "（ですが、砲撃で市街地が巻き添えになっては本末転倒）"
10042060-50 = "（それに、[ruby=パンデモニウム・ソサエティー]あの万魔殿のタ[/ruby]ヌキたちは必ず難癖をつけてくるはず……！）"
10042060-51 = "……行政官。"
10042060-52 = "……今度は何ですか！？"
10042060-53 = "後ろ。"
10042060-54 = "……？"
10042060-55 = "どういう――"
10042060-60 = "きゃああぁぁぁぁあああっ！？！？"
10042060-67 = "パンちゃんの触手が、アコ行政官に！"
10042060-68 = "あ、足首を掴んで逆さまに……！？"
10042060-69 = "行政官、大丈夫ですか！？"
10042060-73 = "あ、あああっ！！は、早く！早く何とかしてくださいっ！"
10042060-77 = "何ですか、これはっ！き、気持ち悪い！#nぬるぬるして……もう、最悪！！！"
10042060-80 = "……んうっっ！？！？"
10042060-82 = "[ns] \"アコの口に、パンちゃんの触手が……！\""
10042060-83 = "なるほど。これまでの人たちも全員……。"
10042060-84 = "へいえいいふんへひひてるばあいえすか！？#n（冷静に分析してる場合ですか！？）"
10042060-85 = "はやふ！なんおあひてくあはい！！#n（早く！何とかしてください！！）"
10042060-86 = "え、えっと、どうすればいいの！？"
10042060-87 = "分かりません。私にあのような趣味はありませんので。"
10042060-88 = "そもそも、行政官は何を言っているのでしょう……？"
10042060-89 = "……。"
10042060-90 = "早く止めなきゃ……！！"
10042060-91 = "ジュリ……？"
10042060-92 = "何をするつもりですか……？"
10042060-93 = "まだ解決策はありませんが……。"
10042060-94 = "それでも、何とかしないと！"
10042060-98 = "……私が、やります。"
10042060-99 = "[s3] \"……ジュリ！？\"\n[s4] \"何をするつもりなの……？\""
10042060-102 = "私……料理が上手くなりたかったんです。#nでも、ずっと変わりませんでした。"
10042060-103 = "なのに今日はなぜか上手くいって……。#n料理が出来上がった時は、本当に嬉しくて……。"
10042060-104 = "また次も……。"
10042060-105 = "自分の手で、作りたい……と、思ったんです。"
10042060-106 = "ジュリ……い、いきなりどうしたの！？"
10042060-107 = "……なるほど、フラグですか。"
10042060-108 = "先輩！？！？"
10042060-109 = "大丈夫です、先輩。#n心配しないでください。"
10042060-110 = "ここは――"
10042060-111 = "私に任せてください。"
10042060-113 = "――これは、私が「やるべきこと」ですから。"
10042060-115 = "[ns5] \"ジュリ……！\"\n[ns6] \"そのセリフはいけない！！！\""
10042060-118 = "先生……。"
10042060-119 = "……。"
10042060-120 = "私のこと、忘れないでくださいね。"
10042060-121 = "ここは……私が何とかします。"
10042060-122 = "後はお願いしますね。"
10042060-126 = "……では、行ってきます。"
10042060-132 = "それ、死亡フラグだから！！！"
