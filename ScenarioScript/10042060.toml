[translation]
10042060-1 = "Episódio 6; O que deve ser feito"
10042060-2 = "……。"
10042060-3 = "I-Isso é……."
10042060-4 = "[s] \"Eu não te avisei...?\""
10042060-5 = "I-Isso é impossível de acreditar!"
10042060-6 = "É uma pegadinha? Ou um pesadelo? #nPreciso acordar logo...!"
10042060-10 = "Ai!"
10042060-11 = "Então, é a realidade...?"
10042060-12 = "(Ué...)"
10042060-13 = "(Eu também me lembro de ter feito isso...)"
10042060-14 = "Dizem que as pessoas agem de forma incompreensível quando se deparam com situações inexplicáveis... #nÉ exatamente o caso."
10042060-15 = "Cale a boca!"
10042060-16 = "Eu ouvi falar de uma panqueca gigante, mas não imaginei que fosse a esse ponto..."
10042060-17 = "Ugh. O plano de incomodar o Sensei com poder de fogo excessivo..."
10042060-18 = "[s] \"Então era isso que você estava pensando...\""
10042060-19 = "……!"
10042060-20 = "No fim das contas, foi um sucesso total, não deveria estar me agradecendo!?"
10042060-21 = "Diga logo \"é verdade\"! #nO que é essa cara...!"
10042060-22 = "[s] \"É verdade... Desculpe, não chore, Ako.\""
10042060-23 = "E-Eu não estou chorando!?"
10042060-24 = "……。"
10042060-25 = "Hah, tudo bem. #nTodos, preparem-se para disparar!"
10042060-26 = "Sim! Canhão antiaéreo 88mm FlaK36, pronto para disparar!"
10042060-27 = "E-Espere um pouco. Administradora...!"
10042060-28 = "O que foi...?"
10042060-29 = "É que..."
10042060-30 = "……! #nO alvo..."
10042060-31 = "A velocidade de movimento da \"panqueca\" é rápida demais, não consigo mirar!"
10042060-32 = "Por causa dos prédios que ela usa como escudo..."
10042060-33 = "Se dispararmos agora, causaremos danos imensos à área urbana!"
10042060-34 = "……Sim?"
10042060-35 = "……É exatamente isso."
10042060-36 = "Espere um pouco..."
10042060-37 = "A panqueca está se movendo em alta velocidade entre os prédios. #nNão consigo mirar e, se continuarmos assim, a cidade será atingida..."
10042060-38 = "Q-Que tipo de situação é essa?"
10042060-39 = "[s1] \"...Ako, você está bem?\"\n[s2] \"Você não vai dizer 'Atirem sem hesitar!', né?\""
10042060-42 = "O que você acha que eu sou..."
10042060-43 = "Ugh..."
10042060-48 = "(Agora, preciso derrotar aquilo...)"
10042060-49 = "(Mas, se a cidade for atingida pelo bombardeio, o tiro sairá pela culatra)"
10042060-50 = "(Além disso, aqueles guaxinins da Pandemonium Society certamente vão reclamar de tudo...!)"
10042060-51 = "……Administradora."
10042060-52 = "……O que é agora!?"
10042060-53 = "Atrás de você."
10042060-54 = "……?"
10042060-55 = "O que você quer di—"
10042060-60 = "AAAAAAHHHHHHH!?!?"
10042060-67 = "Os tentáculos da Pan-chan pegaram a Administradora Ako!"
10042060-68 = "E-Ela agarrou o tornozelo dela e a deixou de cabeça para baixo...!?"
10042060-69 = "Administradora, você está bem!?"
10042060-73 = "Ah, aaaah!! R-rápido! Rápido, faça alguma coisa!"
10042060-77 = "O que é isso!? Q-que nojo!#nEstá tudo viscoso... é o pior, simplesmente o pior!!!"
10042060-80 = "……Nghhh!?!?"
10042060-82 = "[ns] \"O tentáculo do Pan-chan está na boca da Ako...!\""
10042060-83 = "Entendo. Então todas as outras pessoas também..."
10042060-84 = "Eheiei funhe hihi teru baai esu ka!?#n(É hora de ficar analisando calmamente!?)"
10042060-85 = "Hayafu! Nan o ahiteku ahai!!#n(Rápido! Faça alguma coisa!!)"
10042060-86 = "E-ei, o que eu deveria fazer!?"
10042060-87 = "Não sei. Eu não tenho esse tipo de hobby."
10042060-88 = "Além disso, o que a oficial administrativa está dizendo...?"
10042060-89 = "……."
10042060-90 = "Tenho que parar isso logo...!!"
10042060-91 = "Juri...?"
10042060-92 = "O que você pretende fazer...?"
10042060-93 = "Ainda não tenho uma solução, mas..."
10042060-94 = "Mesmo assim, precisamos fazer alguma coisa!"
10042060-98 = "……Eu farei isso."
10042060-99 = "[s3] \"……Juri!?\"\n[s4] \"O que você pretende fazer...?\""
10042060-102 = "Eu... eu queria melhorar na culinária.#nMas nunca mudava."
10042060-103 = "E ainda assim, hoje, por algum motivo, deu certo...#nQuando a comida ficou pronta, eu fiquei tão feliz..."
10042060-104 = "E na próxima vez também..."
10042060-105 = "Eu pensei... que queria fazer com as minhas próprias mãos."
10042060-106 = "Juri... o-o que deu em você de repente!?"
10042060-107 = "……Entendo, é um sinal de perigo."
10042060-108 = "Senpai!?!?"
10042060-109 = "Está tudo bem, Senpai.#nNão se preocupe."
10042060-110 = "Aqui é..."
10042060-111 = "Deixe comigo."
10042060-113 = "――Isso é algo que eu «preciso fazer»."
10042060-115 = "[ns5] \"Juri...!\"\n[ns6] \"Essa frase é proibida!!!\""
10042060-118 = "Sensei..."
10042060-119 = "……."
10042060-120 = "Por favor, não se esqueça de mim."
10042060-121 = "Aqui... eu vou dar um jeito."
10042060-122 = "O resto fica com você."
10042060-126 = "……Então, estou indo."
10042060-132 = "Isso é um sinal de morte, pare com isso!!!"
