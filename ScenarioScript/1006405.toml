[translation]
1006405-1 = "猫とカヨコと甘酒と"
1006405-2 = "（翌朝、混むと予想して早めに着いたところ……）"
1006405-3 = "あれ、先生。もう来てたの？"
1006405-4 = "寒いんだし、先に着いたなら連絡して近くのお店に入ってても……。"
1006405-5 = "[s] \"大丈夫、いま来たところだよ。\""
1006405-10 = "先生の手、こんなに冷たいじゃん……。"
1006405-11 = "早く温めないと……"
1006405-12 = "何か温かい飲み物でも売ってないかな。"
1006405-13 = "甘酒、いかがですか～？"
1006405-14 = "今日は一段と冷えますから、皆さんどうぞ～。"
1006405-15 = "先生、お正月の甘酒を配ってるみたいだね。"
1006405-16 = "お守りを買いに行く前に、貰ってから行こう？"
1006405-17 = "[s] \"うん、ちょうど良かったね。\""
1006405-18 = "甘酒を2杯、お願い。"
1006405-22 = "[ns1] \"はああ、温かいね……。\"\n[ns2] \"身体の芯まで温まるよ……。\""
1006405-23 = "ふふ、懐かしい味だ。"
1006405-24 = "ふふ、懐かしい味だ。"
1006405-25 = "初めてかも……こうやって周りを気にせず甘酒を飲めたのは。"
1006405-26 = "[s] \"前に何かあったの？\""
1006405-27 = "甘酒ってアルコール成分が入ってるのもあるでしょ？"
1006405-28 = "大量の甘酒を飲んだ生徒が、大騒ぎを起こしたことがあって。"
1006405-29 = "だから毎年、甘酒を飲む時は周りが気になって、ちゃんと味わえなかったけど……。"
1006405-30 = "今日は先生と一緒だからね。"
1006405-31 = "[s] \"カヨコは甘酒で酔わないの？\""
1006405-32 = "あるわけないじゃん。こんなジュースみたいなもので。"
1006405-33 = "まあ、何杯も飲み続けたら分からないけど……。"
1006405-34 = "ふぅ……美味しかった。でも、私は一杯で十分かな。"
1006405-35 = "さて、身体も温まったところだし、そろそろ……。"
1006405-39 = "あ……"
1006405-40 = "先生、悪いけど、ちょっと待っててくれる？"
1006405-41 = "ちょっと気になるものが……。"
1006405-42 = "[s] \"うん、いってらっしゃい。\""
1006405-43 = "じゃあ、すぐに戻るから。"
1006405-48 = "（しかし、10分以上経ってもカヨコは戻らず……)"
1006405-50 = "[ns] カヨコが向かった方に行ってみる。"
1006405-53 = "よしよし、そう、いい子だね。ふふ……。"
1006405-54 = "ここの境内で暮らしてるの？人慣れしてるんだね。"
1006405-58 = "にゃ～、可愛いね。"
1006405-62 = "にゃんにゃん～にゃんにゃん～。ふふっ、にゃんにゃん～♪"
1006405-63 = "[s3] \"なんだか、楽しそうだね。\"\n[s4] \"可愛い猫たちだね。\""
1006405-64 = "せ、先生……！？いつからそこに……？"
1006405-65 = "せ、先生……！？いつからそこに……？"
1006405-66 = "あっ、ごめん。遅かったから心配してくれたんだよね……。"
1006405-67 = "それより……。"
1006405-68 = "…………見た？"
1006405-69 = "[s] \"……うん。\""
1006405-70 = "だから、その……いつも猫語で話しかけてるわけじゃ……。"
1006405-71 = "……なくはないけど。#nはぁ、探しに来ると思ってなくて油断してた……。"
1006405-75 = "……甘酒のせい。"
1006405-76 = "さっき甘酒を飲んだから……そう、甘酒のせいだから……。"
1006405-77 = "もう二度と甘酒は飲まない……！"
1006405-79 = "(……その後、恥ずかしがるカヨコを宥めて、お守りを買いに行った)"
