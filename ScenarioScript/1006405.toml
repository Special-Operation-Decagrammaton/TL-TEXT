[translation]
1006405-1 = "Gatos, Kayoko e Amazake"

1006405-2 = "(Cheguei cedo na manhã seguinte, esperando que estivesse lotado...)"

1006405-3 = "Pronto, senhor. Você já veio?"

1006405-4 = "Está frio, então se você chegar primeiro pode ligar e ir até uma loja próxima..."

1006405-5 = "[s] \"Está tudo bem, acabei de chegar.\""

1006405-10 = "As mãos da Senseia estão tão frias..."

1006405-11 = "Se você não aquecer rapidamente..."

1006405-12 = "Será que eles vendem alguma bebida quente?"

1006405-13 = "Que tal um saquê doce?"

1006405-14 = "Vai ficar ainda mais frio hoje, então, por favor, venha."

1006405-15 = "Sensei, parece que você está distribuindo um amazake de Ano Novo."

1006405-16 = "Antes de comprar o amuleto, devo pegá-lo antes de ir?"

1006405-17 = "[s] \"Sim, estava certo.\""

1006405-18 = "Dois copos de Amazake, por favor."

1006405-22 = "[ns1] \"Ah, está quente...\"\n[ns2] \"Vai te aquecer até a medula...\""

1006405-23 = "Hehe, tem um gosto nostálgico."

1006405-24 = "Hehe, tem um gosto nostálgico."

1006405-25 = "Esta pode ser a primeira vez...consegui beber um amazake assim sem me preocupar com as pessoas ao meu redor."

1006405-26 = "[s] \"Aconteceu alguma coisa antes?\""

1006405-27 = "Amazake também contém álcool, certo?"

1006405-28 = "Certa vez, um estudante bebeu uma grande quantidade de amazake e causou comoção."

1006405-29 = "Então, todos os anos, quando bebia amazake, ficava tão preocupado com as pessoas ao meu redor que não conseguia realmente aproveitar..."

1006405-30 = "Estou com meu Sensei hoje."

1006405-31 = "[s] \"Kayoko não fica bêbada com amazake?\""

1006405-32 = "Não há como ser esse o caso. É como esse tipo de suco."

1006405-33 = "Bem, não sei se continuo bebendo muito..."

1006405-34 = "Ufa... estava delicioso. Mas acho que uma bebida é suficiente para mim."

1006405-35 = "Agora que meu corpo está aquecido, já é hora..."

1006405-39 = "um……"

1006405-40 = "Sensei, me desculpe, mas você poderia esperar um momento?"

1006405-41 = "Há algo que estou um pouco curioso...."

1006405-42 = "[s] \"Sim, por favor, venha.\""

1006405-43 = "Bem, já volto."

1006405-48 = "(No entanto, mesmo depois de mais de 10 minutos, Kayoko não retornou...)"

1006405-50 = "[ns] Vamos na direção que Kayoko foi."

1006405-53 = "Ok, ok, sim, essa é uma boa garota. n / D……."

1006405-54 = "Você mora neste bairro? Você está acostumado com as pessoas."

1006405-58 = "Miau, isso é fofo."

1006405-62 = "Miau miau ~ Miau miau ~. Hehe, miau miau ~♪"

1006405-63 = "[s3] \"Parece que eles estão se divertindo.\"\n[s4] \"Eles são gatos fofos.\""

1006405-64 = "Bem, Senseia...! ? Desde quando...?"

1006405-65 = "Bem, Senseia...! ? Desde quando...?"

1006405-66 = "Ah, desculpe. Você estava preocupado porque eu estava atrasado..."

1006405-67 = "Mais do que isso..."

1006405-68 = "...Você viu?"

1006405-69 = "[s] \"...Sim.\""

1006405-70 = "É por isso... que eu sempre falo com ela na linguagem dos gatos..."

1006405-71 = "...mas não sem ele. #nHa, eu não esperava que ele viesse me procurar então baixei a guarda..."

1006405-75 = "...É por causa do amor doce."

1006405-76 = "Porque eu bebi amazake mais cedo... Sim, é por causa do amazake..."

1006405-77 = "Nunca mais vou beber amazake...!"

1006405-79 = "(...Depois acalmei Kayoko, que era tímida, e fui comprar um amuleto.)"

