[translation]
10011020-1 = "Episódio 2; A Grande Donzela"
10011020-2 = "Palco de Preparação da Apresentação de Hyakkiyako"
10011020-4 = "Pessoal da equipe de produção, por favor, reúnam-se aqui!"
10011020-5 = "[s] \"Certo, vamos nessa.\""
10011020-6 = "Vamos lá!"
10011020-11 = "Sim...!"
10011020-19 = "Nossa, eu me pergunto o que vão pedir para a gente fazer."
10011020-20 = "Bem, antes de começarmos o trabalho pesado, vamos definir a divisão de tarefas."
10011020-21 = "……Divisão de tarefas?"
10011020-22 = "Você aí, por favor, venha para cá."
10011020-23 = "Ah, certo."
10011020-27 = "Você aí, vá para lá."
10011020-28 = "Ninnin!"
10011020-32 = "Você, que é mais alto, vá para aquela direção."
10011020-33 = "Sim...!"
10011020-38 = "Então, por favor, sigam as instruções de cada membro da equipe."
10011020-40 = "Hmm, acabamos nos separando, mas não tem jeito."
10011020-42 = "Izuna vai dar o seu melhor!"
10011020-43 = "Eu também vou... dar o meu melhor."
10011020-44 = "[s] \"Então, nos vemos mais tarde, pessoal.\""
10011020-48 = "(E assim, uma hora depois...)"
10011020-52 = "[ns] \"……Acho que eles ainda não vêm?\""
10011020-53 = "(Mais algum tempo se passa...)"
10011020-58 = "[ns] \"……? Algum tipo de confusão...?\""
10011020-64 = "[ns] \"Aquilo é...\""
10011020-65 = "Com licença, vocês poderiam sair da frente...?"
10011020-66 = "Hmm? Ora, ora, fique aí mais um pouco."
10011020-67 = "É isso aí, se você não ficar aí, não teremos um ponto de referência."
10011020-68 = "A gente combinou que avisaria que tem uma pessoa grandalhona aqui, lembra?"
10011020-69 = "Eu não sou um ponto de referência..."
10011020-70 = "Além disso, eu tenho que preparar a apresentação..."
10011020-71 = "[s] \"Tsukuyo?\""
10011020-72 = "……!!"
10011020-76 = "Quem é você?"
10011020-77 = "O que foi, está querendo atrapalhar a gente?"
10011020-78 = "Não vamos deixar ninguém atrapalhar um dia em que podemos nos divertir tanto!"
10011020-79 = "Só vai entender se levar uma surra, né? Então lá vai, toma essa!"
10011020-80 = "[s] \"Hmm... desculpe, Tsukuyo. Você pode me ajudar a lidar com eles?\""
10011020-82 = "E-eh...!?"
10011020-83 = "[Início da Batalha - Sukeban]"
