[translation]
10011020-1 = "第2話;大きな乙女"
10011020-2 = "百鬼夜行 公演 準備 ステージ"
10011020-4 = "公演スタッフの方々は、こちらにお集まりください！"
10011020-5 = "[s] \"よし、行こっか。\""
10011020-6 = "いざ！"
10011020-11 = "はいっ……！"
10011020-19 = "いやー、何させられるんだろうねー。"
10011020-20 = "では本格的な作業の前に、役割分担を決めようと思います。"
10011020-21 = "……役割分担？"
10011020-22 = "そこのあなた、こちらにお願いします。"
10011020-23 = "あ、うん。"
10011020-27 = "そこのあなたはあちらへ。"
10011020-28 = "ニンニン！"
10011020-32 = "そこの背の高い方は、そちらの方へ。"
10011020-33 = "はいっ……！"
10011020-38 = "それでは、各スタッフに従って動いてください。"
10011020-40 = "うーん、ばらけちゃったけど仕方ないか。"
10011020-42 = "イズナ、頑張ってきます！"
10011020-43 = "私も、頑張る……。"
10011020-44 = "[s] \"じゃあ、みんなまた後でね。\""
10011020-48 = "（そうして、一時間後……）"
10011020-52 = "[ns] \"……まだ来なさそうかな？\""
10011020-53 = "（また少し時間が経ち……）"
10011020-58 = "[ns] \"……？何かの騒ぎ……？\""
10011020-64 = "[ns] \"あれって……。\""
10011020-65 = "あの、どいていただけ、ないでしょうか……。"
10011020-66 = "んー？まあまあ、もうちょっとそこにいてよ。"
10011020-67 = "そうだよ、あんたがそこにいてくれないと目印が無いじゃん。"
10011020-68 = "でっかいやつがいるからって伝えて約束してるんだからさ。"
10011020-69 = "私、目印じゃないですよぉ……。"
10011020-70 = "それに私、公演の準備が……。"
10011020-71 = "[s] \"ツクヨ？\""
10011020-72 = "……！！"
10011020-76 = "誰だお前？"
10011020-77 = "何だ、私たちの邪魔をする気か？"
10011020-78 = "こうして楽しく遊べそうな日に、邪魔させるわけにはいかねぇなぁ！"
10011020-79 = "痛い目見ないと分からねぇか？じゃあいくぞおらっ！"
10011020-80 = "[s] \"うーん……ごめん、ツクヨ。一緒に対応してくれる？\""
10011020-82 = "え、えぇっ……！？"
10011020-83 = "[戦闘突入 - スケバン]"
