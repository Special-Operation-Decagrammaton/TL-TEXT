[translation]
10007030-1 = "Episódio 3: Olhares Suspeitos"
10007030-2 = "Vila Termal No. 227 - Banho Privado ao Ar Livre"
10007030-4 = "(Tomando banho)"
10007030-5 = "[s] \"Como esperado, fontes termais são muito boas...\""
10007030-6 = "Hehe, fufufu..."
10007030-12 = "[ns1] \"Q-Quem...!?\"\n[ns2] \"...Nodoka?\""
10007030-15 = "Nossa, fui notada."
10007030-16 = "Acho que não tem jeito."
10007030-22 = "[ns] \"...Hum, prazer em conhecê-la?\""
10007030-23 = "Olá, olá. Já ouvi os rumores, mas é a nossa primeira vez nos conhecendo pessoalmente, Sensei!"
10007030-24 = "Eu sou Meru Himeki da Frente de Libertação do Conhecimento! Você pode me chamar pelo meu pseudônimo 'Meruli'★"
10007030-25 = "[s3] \"'Frente de Libertação do Conhecimento' é...\"\n[s4] \"Ah, aquele... clube que coleciona livros estranhos?\""
10007030-26 = "Sim, acho que você já conheceu Momiji. Ouvi um pouco sobre isso recentemente."
10007030-27 = "Nossos gostos são uuum pouco diferentes. Aqui na Red Winter, censura e repressão são terríveis, então somos essencialmente camaradas."
10007030-28 = "O que quer dizer com isso? Você está falando com meias palavras!"
10007030-29 = "Bem, suponho que você não possa nos chamar de dominantes, mas..."
10007030-30 = "Chegará o dia em que o BL e o GL serão reconhecidos como as principais formas de arte!"
10007030-31 = "Deixando isso de lado..."
10007030-32 = "Hum, então você é o famoso Sensei que é adorado pelas várias alunas de Kivotos..."
10007030-37 = "Hehe... entendo, assim como eu pensei."
10007030-38 = "Eu preciso registrar esse corpo e essas curvas para divulgar os ensinamentos... hehehe, isso vai enviar tremores de choque por toda Kivotos."
10007030-42 = "Ah, por favor, não preste atenção em mim."
10007030-43 = "Estou apenas desenhando aqui."
10007030-44 = "[s] \"Acho que não se importar é um pouco impossível...\""
10007030-45 = "É mesmo? Não é nem uma fotografia. A arte é basicamente arte que depende de sua própria visão subjetiva. Estaria mentindo se dissesse que a fotografia não é assim, mas... bem, é menos constrangedor que uma fotografia, não é?"
10007030-46 = "Uau, essa pele. Esses músculos flexíveis. Entendi...!"
10007030-47 = "[s] \"Hum, o que você veio fazer aqui, Meru...?\""
10007030-48 = "Vim procurar material para um doujin, é claro."
10007030-49 = "Como você provavelmente já sabe, o Sensei, o evento doujin supergrande, o Comic Center... também conhecido como ComiCen, está chegando logo."
10007030-50 = "Para te situar, é um grande evento que reúne todos os tipos de obras doujinshi de toda Kivotos, e um lugar onde camaradas de vários lugares se reúnem! Em outras palavras, é um evento muito importante do ano para nós da Frente de Libertação do Conhecimento...!"
10007030-51 = "Sempre conheci muitos trabalhos novos por lá, os li com carinho repetidas vezes, compartilhei meus pensamentos, expus na biblioteca, me escondi da Presidente Cherino, e divulguei os ensinamentos... e assim vivi meus dias."
10007030-52 = "Mas eu não consigo ficar satisfeita só com isso! Momiji disse que isso era o bastante, mas minha alma está gritando que isso não é o suficiente! Não posso simplesmente me sentar aqui como a burguesia!"
10007030-53 = "Claro, uma posição não é melhor que a outra; elas são igualmente nobres. Mas eu quero dar forma a esse sentimento apaixonado em meu peito! Para ser mais exata, eu quero desenhar garotas se emaranhando e namorando! Porque eu mesma posso dar o primeiro passo por ser uma verdadeira aluna da Academia Federal Red Winter!"
10007030-54 = "Por coincidência, ouvi dizer que foi construída uma bela vila termal na área. Se eu recebo esse tipo de informação, não posso deixar de ir, certo?"
10007030-55 = "Especialmente em obras que se passam em áreas frias, um evento em fontes termais é um clássico clássico!"
10007030-56 = "Vim para cá pensando que me inspiraria para fazer o ComiCen."
10007030-57 = "Então, eu queria perguntar ao Sensei também... você viu algum material de dar água na boca nessa vila termal?"
10007030-58 = "Por exemplo, uma cena na qual uma oficial de Gehenna e a vice-presidente do Comitê de Justiça de Trinity mostram hostilidade em público, mas sussurram amor nos bastidores, e silenciosamente se abraçam...!"
10007030-59 = "[s] \"Acho que essas duas não fariam esse tipo de coisa...\""
10007030-60 = "Ah, eu sei! Pode ser que seja impossível na realidade! E devemos ser cuidadosos ao máximo no manuseio de coisas cruas! Mas, ao mesmo tempo, não existe 'absoluto' no mundo!"
10007030-61 = "O mundo criativo é profundo, então só precisa de uma pequena desculpa. Por exemplo, o fato de terem passado por ali de relance."
10007030-62 = "Duas pessoas se conheceram em um lugar inesperado. As chamas do ódio queimam nos olhos das duas... "
10007030-63 = "Mas isso é apenas na superfície! O que acontece na verdade é que elas estão namorando em segredo...!#nHehehe... só com isso, eu poderia comer três tigelas de arroz!"
10007030-64 = "[s5] \"...Hum, você está bem?\"\n[s6] \"Pode ser que seja tarde demais...\""
10007030-71 = "H-Hey! O que você está fazendo aí!?"
10007030-72 = "Ah, Nodoka-chan?"
10007030-73 = "O que eu estou fazendo...? Eu só estava desenhando o Sensei, que está tomando banho nas fontes termais. Além do mais, que tipo de gerente entra quando um cliente está tomando banho?"
10007030-74 = "Q-... Estou com in-inveja de você estar tão direta... N-Não, como a gerente desta vila termal, não posso ignorar um ato tão audacioso!"
10007030-75 = "E há reclamações tanto dos banhos públicos como dos banhos ao ar livre! Os clientes sentiram um olhar suspeito enquanto tomavam banho! Você não acha que deve ser ela...!"
10007030-76 = "Hmm? Posso não saber sobre o banho público, mas ainda não fui ao banho ao ar livre."
10007030-77 = "Não era eu, era você, não era Nodoka-chan?"
10007030-78 = "N-Não, isso não...!"
10007030-79 = "D-Dando o benefício da dúvida, mesmo que fosse, Meru-chan é muito mais perversa por desenhar o corpo das outras pessoas!"
10007030-80 = "Eu tenho um motivo, já que esse é o meu trabalho como gerente!"
10007030-81 = "Se é assim, eu também tenho um motivo chamado de atividades artísticas."
10007030-82 = "Se você me perguntasse, eu diria que abusar do seu poder é muito mais perverso da sua parte, Nodoka-chan, não acha?"
10007030-83 = "Ugh... de, de qualquer forma! Seria um grande prejuízo se os clientes que vieram se divertir nas fontes termais saíssem por causa dessa 'atividade artística' sua, Meru-chan!"
10007030-84 = "Sinto muito, mas vou ter que pedir para você sair!"
10007030-85 = "Sinto muito, mas estou arriscando a minha vida pelo desenho."
10007030-86 = "É uma ótima oportunidade para conseguir um bom material e eu não posso simplesmente recuar!"
10007030-87 = "Acho que não tem outro jeito..."
10007030-88 = "Em nome da gerente da vila termal, estou forçando você a sair daqui! Agora prepare-se!"
10007030-89 = "[s] “Antes disso, acho melhor vocês duas saírem...”"
