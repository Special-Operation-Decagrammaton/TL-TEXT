[translation]
10007030-1 = "第3話;怪しい視線"
10007030-2 = "227号温泉郷・専用露天風呂"
10007030-4 = "（入浴中）"
10007030-5 = "[s] \"やっぱり温泉は良い……。\""
10007030-6 = "ふふ、ふひひひ……。"
10007030-12 = "[ns1] \"だ、誰……！？\"\n[ns2] \"……ノドカ？\""
10007030-15 = "やれやれ、気づかれちゃったかー。"
10007030-16 = "こうなっては仕方ない。"
10007030-22 = "[ns] \"……えっと、初めまして？\""
10007030-23 = "やあやあ。噂には聞いてたけどこうして会うのは初めてだね、先生！"
10007030-24 = "私は「知識解放戦線」の[ruby=ひめき]姫木[/ruby]メル！ペンネームの「メルリー」って呼んでも良いよ★"
10007030-25 = "[s3] \"「知識解放戦線」って……。\"\n[s4] \"ああ、あの……変わった本を集めてる部活？\""
10007030-26 = "うん、モミジとは前に会ったみたいだね？この間ちょこっと聞いたよ。"
10007030-27 = "趣味の方向性はちょーっと違うんだけど。このレッドウィンターでは検閲やら取り締まりやらがとにかく酷いこともあって、まあいわゆる同志ってところだね。"
10007030-28 = "何だその、奥歯にものが挟まったような言い方は！"
10007030-29 = "まあ、確かに主流とは言えないかもしれないけど……。"
10007030-30 = "いつかはBLやGLだって、メジャーな芸術として認められる日が来るはず！"
10007030-31 = "まあそれはさておき……"
10007030-32 = "ふむふむ、君がキヴォトスの様々な生徒たちに慕われているという、噂の先生か……。"
10007030-37 = "ふふ……なるほど、思った通り。"
10007030-38 = "この肉体とボディーライン、ぜひ記録として残して布教しないと……ふふふ、これはキヴォトス中に激震が走るぞ。"
10007030-42 = "あ、私のことは気にしないでくれ。"
10007030-43 = "私はここでただ絵を描いてるだけだから。"
10007030-44 = "[s] \"気にしないのはちょっと無理かな……。\""
10007030-45 = "そうか？別に写真でもないのに。絵とは基本、主観に依存する芸術だ。写真はそうではない、と言ったら嘘だが……まあ、写真より恥ずかしくはないだろう？"
10007030-46 = "いやあ、この肌。しなやかな筋肉。なるほど……！"
10007030-47 = "[s] \"えっと、メルはここに何をしに……？\""
10007030-48 = "それはもちろん、同人の素材を探しにだよ。"
10007030-49 = "先生も知ってると思うけど、超大型同人イベント「コミックセンター」……通称「コミセン」がもうすぐでさ。"
10007030-50 = "一応説明すると、このキヴォトス中からありとあらゆる同人作品たちが集まる一大イベント、そして各地の同志たちが集う場所！つまり私たち「知識解放戦線」にとって、一年の中でもかなり大事なイベント……！"
10007030-51 = "今までも、そこでたくさんの新しい作品たちと出会い、大事に大事に何度も読んで、感想を述べ、チェリノ会長に隠れて図書館に展示して、布教して……そんな日々を送ってきた。"
10007030-52 = "ただ、私はこれだけじゃ満足できない！モミジはこれでも十分と言っていたけど、私の魂がこれでは足りないと叫んでる！私はもう、ブルジョワジーのようにただ座っているなんてことはできない！"
10007030-53 = "勿論どちらの立場が優れているなんてことは無いさ、平等に尊い。しかし私は、この胸に宿る熱い気持ちを形にしたい！具体的には、女の子が組んず解れついちゃいちゃしているとこを描きたい！自ら動いてこそ、真のレッドウィンター連邦学園の生徒だから！"
10007030-54 = "そんなときに偶然、この辺に素敵な温泉郷ができたって聞いてね。そんな情報を知ったら、やっぱ来るしかないでしょ？"
10007030-55 = "特に寒冷地が舞台の作品において、温泉イベントは定番中の定番！"
10007030-56 = "ここなら「コミセン」で出すためのインスピレーションが貰えると思って、駆けつけたわけさ。"
10007030-57 = "だから、先生にも聞きたいんだけど……この温泉郷で何か、美味しそうな素材とか見かけなかった？"
10007030-58 = "例えばゲヘナの行政官と、トリニティ正義実現員会の副委員長とが、表では敵対する素振りを見せておきながら裏では愛を囁きつつ、静かに抱き合っている場面とか……！"
10007030-59 = "[s] \"あのふたりは、そういうことしないと思うけど……。\""
10007030-60 = "ああ知っているさ！実際にはあり得ないかもしれない！あと生モノの扱いは全力で気を付けなければならない！しかし同時に、世の中に「絶対」は無い！"
10007030-61 = "創作の世界は奥が深いからね、ちょっとした口実さえあればそれで構わないのさ。例えばすぐそばを横切ったというだけでも。"
10007030-62 = "「意外な場所で出くわした二人。彼女たちの目には憎悪の炎が宿るが……」"
10007030-63 = "「それはあくまで表の話！実は裏で隠れて付き合っており……！」#nふふふ……これだけで、ご飯３杯はいける！"
10007030-64 = "[s5] \"……えっと、大丈夫？\"\n[s6] \"もしかしたら手遅れかもしれない……。\""
10007030-71 = "ちょっ、ちょっと！そこでいったい何をしているんですか！？"
10007030-72 = "あれ、ノドカちゃん？"
10007030-73 = "何って……ただ温泉に入ってる先生のスケッチをしてるだけだけど？それよりお客様の入浴中に、支配人が入ってくるのはどうなの？"
10007030-74 = "なっ……直接だなんて羨まし……い、いえ、そんな不埒なこと、この温泉郷の支配人として見逃すことはできません！"
10007030-75 = "それに、大浴場や露天風呂からもクレームが入ってるんですよ！入浴中に何だか怪しい視線を感じるって！あれもメルちゃんなんじゃ……！"
10007030-76 = "ん？大浴場はともかく、私は露天風呂の方にはまだ行ってないけど。"
10007030-77 = "それって私じゃなくて、ノドカちゃんのことじゃなくて？"
10007030-78 = "い、いえ、そんなことは……！？"
10007030-79 = "ひゃ、百歩譲ってそうだとしても、他人の身体をスケッチしているメルちゃんの方が遥かに悪質です！"
10007030-80 = " 私は支配人としての仕事という体裁があります！"
10007030-81 = "じゃあ私だって芸術活動っていう体裁があるよ。"
10007030-82 = "どっちって言うなら、権力を悪用してるノドカちゃんの方が悪質なんじゃない？"
10007030-83 = "うぅ……と、とにかく！メルちゃんのその「芸術活動」のせいで、温泉を楽しみに来たお客様たちが帰られてしまったら大損です！"
10007030-84 = "悪いですが、出ていってもらいます！"
10007030-85 = "残念だけど、私も命懸けて描いてんだよね。"
10007030-86 = "せっかく良い素材を手に入れるチャンスなのに、簡単に引き下がるなんてできない！"
10007030-87 = "仕方ありませんね……"
10007030-88 = "こうなったら温泉郷の支配人の名のもとに、強制的に退去させます！さあ、覚悟してください！"
10007030-89 = "[s] “その前に、ふたりとも出て行ってもらえると……。\""
