[translation]
102080-1 = "第8話;「レッドウィンター」自治区防衛"
102080-4 = "今度は私たちの番、ですか。#n皆さん、どうぞよろしくお願いいたします。"
102080-11 = "よし……突撃ー！#n突撃開始だ！！"
102080-18 = "同志よ、行くぞ！労働者の権利のために！"
102080-20 = "プリンのために！"
102080-25 = "……チェリノ会長は「用事がある」と席を外されたのですが、少々心配ですね。"
102080-26 = "先に避難所に向かわれたのでしょうか……"
102080-28 = "はい、みなさん！避難所はこちらの旧校舎になります！ "
102080-29 = "あれ……ここ、廃墟ですよね？#n温泉は一体どこに……？"
102080-30 = "そ、それはちょっと事情がありまして……#n温泉は……その、廃業といいますか、あの……"
102080-31 = "ええっ、そうなんですか？楽しみにしてたのに……！"
102080-32 = "でもでも、密室にいたら新刊のアイデアがたくさん浮かぶかもよ？"
102080-33 = "ここでゆっくり過ごして、次の「コミセン」の新刊構想を練るんだよ。ふふっ。"
102080-34 = "なるほど……これがカンヅメってやつですね！分かりました！"
102080-39 = "ノドカ、チェリノ会長見なかった？"
102080-40 = "いや、こっちには来てないと思う。"
102080-41 = "私も、特別クラスの待遇について話そうと思ってたんだけど……"
102080-42 = "そっか……"
102080-43 = "どこ行ったんだろ……？"
