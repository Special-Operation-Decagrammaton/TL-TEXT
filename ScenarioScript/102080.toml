[translation]
102080-1 = "Episódio 8; Defesa da região autônoma "Inverno Vermelho""

102080-4 = "Agora é a nossa vez, certo? #nObrigado a todos pelo apoio."

102080-11 = "Tudo bem... ataque! #nO assalto começa! !"

102080-18 = "Camaradas, vamos! Pelos direitos dos trabalhadores!"

102080-20 = "Para o pudim!"

102080-25 = "...O presidente Cerino saiu da cadeira dizendo que tinha algo para fazer, mas estou um pouco preocupado."

102080-26 = "Você foi primeiro para o centro de evacuação?"

102080-28 = "Sim, todos! O centro de evacuação ficará neste antigo prédio escolar!"

102080-29 = "Huh... esse lugar é uma ruína, certo? #nOnde diabos fica a fonte termal...?"

102080-30 = "Bem, há uma razão para isso... #nAs fontes termais... você está dizendo que elas estão fechando, hum..."

102080-31 = "Hã, é isso mesmo? Eu estava ansioso por isso...!"

102080-32 = "Mas, se você ficar a portas fechadas, poderá ter muitas ideias para um novo livro."

102080-33 = "Vou passar algum tempo aqui e planejar a próxima edição da Comisen. Hehe."

102080-34 = "Entendo... este é Kandume! Entendido!"

102080-39 = "Nodoka, você não viu o presidente Cerino?"

102080-40 = "Não, não acho que venha para cá."

102080-41 = "Também estava pensando em falar sobre o tratamento das classes especiais, mas..."

102080-42 = "Eu vejo..."

102080-43 = "Aonde você foi...?"

