[translation]
102080-1 = "Episódio 8;Defesa do Distrito de Red Winter"
102080-4 = "Agora é a nossa vez, hein.#nContamos com vocês, pessoal."
102080-11 = "Beleza… avançar!#nIniciem a ofensiva!!"
102080-18 = "Camaradas, vamos! Pelos direitos dos trabalhadores!"
102080-20 = "Pelos pudins!"
102080-25 = "…A presidente Cherino saiu dizendo que tinha “algo pra resolver”, mas isso me preocupa um pouco."
102080-26 = "Talvez ela tenha ido antes para o abrigo…"
102080-28 = "Isso mesmo, pessoal! O abrigo será neste antigo prédio escolar!"
102080-29 = "Hã…? Isso aqui não é uma ruína?#nE onde exatamente ficam as fontes termais…?"
102080-30 = "É-é que tivemos alguns probleminhas…#nAs fontes termais… bem… digamos que encerraram as atividades…"
102080-31 = "Eeeh!? Sério? Eu tava tão animada…!"
102080-32 = "Mas olha pelo lado bom! Ficar presa num lugar fechado pode render várias ideias pra mangá novo!"
102080-33 = "Vamos relaxar aqui e bolar o próximo lançamento pra Comicen. Fufu♪"
102080-34 = "Entendi… então isso é o famoso “ficar enjaulada pra trabalhar”! Já saquei!"
102080-39 = "Nodoka, você viu a presidente Cherino?"
102080-40 = "Não, acho que ela não passou por aqui."
102080-41 = "Eu também queria conversar sobre o tratamento dado à Classe Especial…"
102080-42 = "Entendi…"
102080-43 = "Pra onde será que ela foi…?"