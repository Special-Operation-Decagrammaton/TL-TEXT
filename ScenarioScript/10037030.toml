[translation]
10037030-1 = "第3話;覇王は女人と別れし"
10037030-3 = "先ほどから、楽器のような音が鳴っているが……あれは一体なんなんだ？"
10037030-4 = "ふふ、其方には珍しい音かもしれぬのう。#nこれは我が山海経の伝統芸能じゃよ、チェリノ書記長。"
10037030-5 = "わっ！？キサキ門主……！？#nふむ、伝統芸能なら仕方ないな！"
10037030-6 = "それはともかく、変わった旋律だ。"
10037030-7 = "少し耳が痛くなるような……。"
10037030-8 = "あの不思議な格好はなんだ？"
10037030-10 = "役者じゃ。この劇は物語を曲に起こし、皆の前で披露するものでな。"
10037030-11 = "山海経では、このような劇を「京劇」と呼ぶのじゃ。"
10037030-12 = "キョウ、ゲキ……？"
10037030-13 = "ほれ、劇が始まるぞ。#n心ゆくまで楽しんでいってくれ。"
10037030-24 = "ひとたび微笑めば永久の春が訪れ、涙すれば無限の憂いが胸中を襲う。"
10037030-26 = "人の一生は儚く――春の微睡みのよう。"
10037030-28 = "青山[ruby=ホトトギス]に杜鵑が[/ruby]鳴き――百合の木に煙が立ち上る。"
10037030-33 = "如何にして、あの雲は空を去るのか！"
10037030-38 = "す、すごく高い声だな……！"
10037030-39 = "限られた空間で遠くまで声を響かせるために、あのよう[ruby=しょうほう]な唱法に[/ruby]なっておるのじゃ。"
10037030-40 = "手をグルグル回しているのは、一体なんなんだ？"
10037030-41 = "京劇において、全ての動きにはそれぞれの意味を孕んでおる。#nその受け取り方も千差万別。説明してしまっては、面白みに欠けるじゃろう。"
10037030-42 = "とはいえ――何も知らぬままでは退屈に感じるのも道理。そうさな……例えば、鞭を振り上げる動きは、その人物が馬に乗っていることを意味する。"
10037030-43 = "また、舞台の中央で円を描くように回るのは、長い旅に出ることを意味するんじゃ。"
10037030-44 = "そして、鎧にいくつかの旗を差した場合は……幾千の大軍が現れたことを意味する。"
10037030-46 = "ふぅん……映画みたいにしたら、もっと派手に映るのにな。"
10037030-47 = "ふふ、昔はそのような装置や物を用意するのも一苦労じゃったからのう。"
10037030-52 = "田舎から起こり、勢力を得て――"
10037030-53 = "三年にして、五人の[ruby=しょこう]諸侯[/ruby]を率いて古国を滅ぼさん。"
10037030-54 = "遂に、天下を分割したのだ！"
10037030-55 = "如何にして、天は我を塞ぐのか！"
10037030-61 = "あのお面を被って出てきた人！カッコイイな！"
10037030-62 = "この劇の主人公とも呼べる中心人物じゃ。"
10037030-63 = "此度の劇は、あの人物を中心に物語が展開されておる。#nあの者に注目するのも良いじゃろう。"
10037030-69 = "長い棒を取り出したぞ……あれは……槍？"
10037030-71 = "戦の勝敗は、兵を率いる者とて予測できぬもの。"
10037030-72 = "恥辱に堪えるのもまた、人の為すべき事。"
10037030-73 = "この世には才を持つ者が多く、"
10037030-74 = "[ruby=いず]何[/ruby]れは、巻き返せるやもしれぬ。"
10037030-76 = "幾度の戦で、兵は疲れ果て、"
10037030-77 = "中原で敗北し、挽回[ruby=あた]能[/ruby]わず。"
10037030-78 = "いかに優秀な者が居たとして、"
10037030-79 = "この期に及んで巻き返すことなど、出来ませぬ。"
10037030-81 = "むむ……あいつらはなんだ！調子の良いことばっかり言って！"
10037030-82 = "おいらだったら全員粛清しているぞ！"
10037030-84 = "ふ、ふむ……諫言は忠義の一つ、とも言うじゃろう……？"
10037030-85 = "そんなの知るか！全員二週間トイレ掃除の刑にしてやるっ！"
10037030-86 = "（粛清と申す割には、かなり温情をかけておるのう。これが独裁者としての器、じゃろうか）"
10037030-91 = "力は山を引き抜き、気力は天下を覆い尽くす。"
10037030-92 = "時勢は不利で、馬は進まず。"
10037030-93 = "馬が進まない故、[ruby=われ]我[/ruby]はどうしようもない。"
10037030-98 = "[ruby=なんじ]汝よ[/ruby]、汝よ、汝を如何すれば！"
10037030-99 = "敵の兵は、既に天下を取り、"
10037030-100 = "四方から、敵の歌が聞こえてくる。"
10037030-101 = "大王様が困っておられるというのに、"
10037030-102 = "身分賤しい私が、どうして生き延びていられるのでしょうか。"
10037030-108 = "え、ええ？な、何をしているんだ！今、主人公の刀を抜いて……！"
10037030-109 = "そ、それを自分の首に……！？だ、ダメだ！生き残った人たちは何になる！"
10037030-111 = "うぅぅ……結局、兵とも全員別れて……ひとりに……。"
10037030-112 = "それなのに、数千の敵兵に追われて……"
10037030-114 = "我は知っている！我の首に千金と一万戸が掛かっていると！"
10037030-118 = "ならば、汝に恩恵を施してやろう！"
10037030-125 = "うわぁっ！？"
10037030-126 = "うぅ……そ、そんな……あんなに勇猛だったのに……。"
10037030-127 = "天下は威厳だけで取れるものではなく、人の心は勇猛だけで得られるものでない。"
10037030-128 = "天命とは、まさに此れじゃ。人はただ、精進するのみ……。"
10037030-129 = "おいらだって、それくらい分かってる！#nでも、でも……。"
10037030-130 = "うぅ、まさかおいらの心をここまで揺さぶるなんて……これは認めざるを得ないな！#nうむ、いい劇だった！"
10037030-131 = "気に入ってもらえて何よりじゃ。"
10037030-134 = "では、チェリノ書記長。次に――"
10037030-135 = "その前に！レッドウィンター連邦学園の書記長の名前で、一つ要請したいことがある！"
10037030-139 = "（ここで書記長の名を……？一体何をするつもりじゃ？よもや、最初の非礼に対する申し立てを？）"
10037030-140 = "（とりあえず、内容を聞いてみるしかないかの）"
10037030-141 = "（上手く事が運べば、レッドウィンターの流儀を垣間見ることができるやもしれぬ）"
10037030-142 = "よい。玄龍門の門主として、可能な限りの要請は聞き入れるとしよう。"
10037030-143 = "さっきの公演だが……！"
10037030-144 = "京劇のことか？"
10037030-145 = "それだ！京劇！"
10037030-146 = "その主人公役の生徒をここに呼んでくれ！"
10037030-147 = "カグヤを……？"
10037030-148 = "ああ。カグヤと言ったか？少し話してみたくてな！"
10037030-149 = "（……掴み所のない要求じゃのう。しかし、これもまた何かの心理戦かもしれぬ）"
10037030-151 = "書記長は京劇をいたく気に入ったご様子。#n差し支えなければ、お願いしても良いでしょうか。"
10037030-156 = "ああ、構わぬよ。#nミナ、頼んだ。"
10037030-157 = "はい、門主様。"
10037030-165 = "お呼びでしょうか門主様[ruby=うるしばら]。漆原カ[/ruby]グヤ、ただいまここに！"
10037030-167 = "よく来てくれた、カグヤ。#nさて……紹介しよう、チェリノ書記長。京劇部の部長、カグヤじゃ。"
10037030-168 = "カグヤ、こちらはレッドウィンター連邦学園のチェリノ書記長じゃ。"
10037030-170 = "お初にお目にかかります、チェリノ書記長。#n[ruby=わたくし]私ど[/ruby]もの劇をご覧くださり、誠にありがとうございます！"
10037030-171 = "おお……！舞台にいた時とはまるで別人のようだな！"
10037030-172 = "ふふっ、お褒めに預かり光栄です！私どもは、様々な役を演じているため――"
10037030-173 = "たまに、己の本当の姿が分からなくなる時もあるのですよ。"
10037030-174 = "そうなんだな！それはなんだか便利なようで……ちょっと面倒くさそうだな！"
10037030-175 = "ふふ、鋭いご指摘ですね。一目でそれを見抜くとは……！"
10037030-182 = "では門主様。そろそろ本題に移りたいのですが。"
10037030-187 = "（……ふむ、秘書が交渉を取りまとめるのじゃな[ruby=わらわ]。妾が[/ruby]知っておるレッドウィンターと[ruby=そご]齟齬[/ruby]があるようじゃが……）"
10037030-188 = "（それとも……これが動かずとも天下を治めるという「無為の治」……？）"
10037030-189 = "（……ひとまず、様子を伺うかの）"
10037030-193 = "ああ、そうしようかの、トモエ秘書室長。"
10037030-196 = "[ruby=へんめん]変面[/ruby]、ってなんだ？"
10037030-197 = "京劇とは少し異なる、[ruby=せんげき]川劇[/ruby]で見られる技巧のことです。#n簡単に説明しますと、劇の状況に合わせて瞬時にお面を変えていくのです！"
10037030-198 = "おぉ、なんだかカッコ良さそうだな！"
10037030-199 = "はい！山海経の三大演劇といえば、京劇、川劇、[ruby=こんげき]崑劇[/ruby]で――#nこの三つは武術の鍛錬が必要なのです。"
10037030-200 = "ぶ、武術……？演劇をするのにか？"
10037030-201 = "ふふっ、変に聞こえるかもしれませんが、そうなんですよ。#n既にご覧になったかと思いますが、さきほど舞台で槍術をお見せしましたよね？"
10037030-202 = "[ruby=こんにち]今日[/ruby]では、武術というよりは技芸に近いのですが……。"
10037030-203 = "い、言われてみれば、たしかに……！"
10037030-208 = "山海経高級中学校は外部との交流を避けていると伺っております。#nにもかかわらず、私たちレッドウィンター連邦学園に交流会を申し入れて下さり、誠にありがとうございます。"
10037030-209 = "このように門戸を開くということは、何か意図があるのだと存じますが……如何でしょう。"
10037030-210 = "二つ、訂正を。まず、山海経の門戸は其方が思うほど閉ざされてはおらぬ。#nすでに、玄武商会が外部と交流をしておるじゃろう？"
10037030-211 = "そして二つ、玄龍門において外部の出入りは行われておる。#n[ruby=そなた]其方[/ruby]も知っての通り、シャーレの先生じゃ。"
10037030-212 = "[s1] \"あ、どうも。シャーレの先生です。\"\n[s2] \"私もいるの、忘れてないよね？\""
10037030-215 = "ふふふ、そうでしたね。#nこういう場でなければ、もっと先生とお時間を過ごせたのに、残念です。"
10037030-216 = "ふふ、同感じゃ。あまり寂しく思わないでおくれ、先生。"
10037030-217 = "[s3] \"あはは、大丈夫だから。\"\n[s4] \"私のことは気にしないでね。\""
10037030-220 = "あら、私は門主様のおかげで、これ以上ないくらい寛いでおりますよ？"
10037030-221 = "それならば安心じゃの。とはいえ、其方らの学園と同じような居心地ではなかろうて。#nそれだけは勘弁してくれぬかの。"
10037030-222 = "ですが私は――今回の交流会で門主様から私たちの学園に何か要求してくるのではないかと推察しております。"
10037030-223 = "……無礼な発言であることは重々承知しております。"
10037030-224 = "構わぬ。むしろ本題に移る手間が省けた。礼を言う。"
10037030-225 = "其方の推察……答えるとすれば「特に何も無い」のじゃ。"
10037030-229 = "え……？"
10037030-230 = "その……このような事を申し上げるのは非常に心苦しいのですが、私は門主様と腹の探り合いをするつもりは毛頭ありません。"
10037030-231 = "そのために、マリナ委員長を留めて、門主様と直接お話させていただいたのです。"
10037030-233 = "ああ、妾も執行部長のミナを留めて、この場に居る。#n即ち、ここでは何かを隠すことも、その理由も無いということじゃ。"
10037030-234 = "[s5] \"あの……割り込むようで悪いけど、\"\n[s6] \"キサキは……本当に生徒会長として本心を言っているんだと思うよ。\""
10037030-237 = "うむ。その通りじゃ。ありがとう、先生。"
10037030-238 = "もう一度言おう。其方らに対して、特別な要求など存在せぬ。#n其方らにして欲しい事も、利用するつもりも無いのじゃ。"
10037030-240 = "では、どうしてこのような交流会を……？"
10037030-245 = "其方らに我が山海経を見せたかった――それだけでは足りぬか？"
10037030-246 = "不足はございませんが、十分ではないかと。"
10037030-247 = "ふむ。それは妾の不徳の致すところじゃな。"
10037030-248 = "……本心なのですね？"
10037030-249 = "ああ。強いて其方らに要求するのであれば……#n山海経を見て回り、[ruby=あいたい]相対[/ruby]してほしいのじゃ。"
10037030-250 = "「相対してほしい」とは……？"
10037030-251 = "ふふ。それこそ、妾の[ruby=・   ・]真意[/ruby]と言えるやもしれぬな。"
10037030-252 = "あら。そういう事ですか。"
10037030-253 = "驚くようなことでもあるまいて。#n我ら山海経に受け継がれてきた伝統、「[ruby=ほうおん]報恩[/ruby]」の一つじゃ。"
10037030-254 = "ふふ、左様でしたか。"
10037030-255 = "くふふ。そうじゃ。"
10037030-260 = "それは本当なのか？口から火を吐けるのか！？"
10037030-261 = "はい！[ruby=トゥファ]吐火[/ruby]という技芸でして……舞台を真っ暗にして披露するものです！#nあ、舞台を暗くする方法も色々秘伝がありまして――！"
10037030-262 = "おぉ、山海経には色んな秘密があるのだな！"
10037030-263 = "そう、でしょうか？たしかに、歴史と秘密は比例するとも言いますが！"
10037030-265 = "手厚い歓迎、改めて感謝いたします、門主様。"
10037030-266 = "うむ、おいらも満足だった！本当に楽しかったぞ。クーデターの心配もなかったしな！"
10037030-268 = "ふふ。引き続き、山海経を心ゆくまで楽しむと良い。"
10037030-269 = "さて……ここからは、先生の手を借りたいのじゃが。"
10037030-270 = "[s] \"うん？私？\""
10037030-271 = "ああ、先生なら信用できるからの。#nどうやらレッドウィンターの訪問客と面識があるようじゃし……"
10037030-272 = "護衛にミナをつけよう。では、妾の代わりに案内を頼んだぞ。"
10037030-273 = "[s] \"キサキはどこかに行くの？\""
10037030-274 = "……うむ。用ができての。"
10037030-275 = "差し支えなければ、理由をお聞きしても？"
10037030-276 = "野暮用、としか言えぬのじゃ。すまぬな。"
10037030-277 = "……なるほど、分かりました。#nそれでは、ミナ執行部長と先生の案内で行きましょうか。"
10037030-279 = "お、カムラッドも一緒なんだな？#nカムラッドも山海経は初めてか？"
10037030-280 = "[s] \"正確に言えば……初めてではないかな。\""
10037030-281 = "む……でも山海経に詳しくないのは、おいらと同じだろ？"
10037030-282 = "一緒に散策しようじゃないか！"
10037030-286 = "[ns] \"わ、走ると危ないよ！\""
10037030-291 = "それでは[ruby=わたくし]、私も[/ruby]これにて失礼いたします、門主様、書記長。"
10037030-292 = "ああ。ご苦労じゃった、カグヤ。"
10037030-294 = "あれ……？カグヤも一緒じゃないのか？"
10037030-295 = "はい、私はまだ公演がありまして……#nでも、いつでも部室にいらっしゃって大丈夫ですよ！歓迎いたします！"
10037030-297 = "そうか……公演で忙しいなら仕方ないな！許す！"
10037030-298 = "ありがとうございます、書記長！"
10037030-307 = "……。"
10037030-309 = "門主様は[ruby=りくわかく]六和閣[/ruby]に残り、レッドウィンターは山海経へ……。"
10037030-310 = "「山海経を見て回り、相対してほしいのじゃ。」か……。"
10037030-315 = "出会いとは会う対象が居てこそのもの。そして相手にとっても。#n出会いは相互的なもの……。"
10037030-316 = "山海経とレッドウィンターの出会い――即ち、両学園が混ざり合うということ。"
10037030-317 = "――その道を歩むのですね、門主様。"
10037030-320 = "……。"
10037030-321 = "「忠義」とは何たるものか。「忠義」は何を為すものなのか……。"
10037030-322 = "「劇」もまた、「生」と変わらず、容易いものではない。"
10037030-326 = "しかし、諫言を恐れていては、それこそ忠義に反すること。"
10037030-331 = "[log=카구야]……此の景色が人を酔わせ、[/log]"
10037030-333 = "[log=카구야]気づかぬま[ruby=ふもと]ま麓に[/ruby]辿り着いたのか。[/log]"
