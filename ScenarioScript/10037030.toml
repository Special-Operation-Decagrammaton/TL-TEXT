[translation]
10037030-1 = "Episódio 3; O Rei se despede de sua amada"
10037030-3 = "Faz um tempo que estou ouvindo um som parecido com um instrumento musical, mas... o que exatamente é aquilo?"
10037030-4 = "Fufu, talvez seja um som incomum para você. #nEsta é uma arte tradicional da nossa Shanhaijing, Secretária-Geral Cherino."
10037030-5 = "Wah!? Kisaki-monshu...!? #nHum, se é uma arte tradicional, então não tem jeito!"
10037030-6 = "Deixando isso de lado, é uma melodia peculiar."
10037030-7 = "Chega a ser um pouco irritante aos ouvidos..."
10037030-8 = "O que é aquele traje estranho?"
10037030-10 = "São atores. Nesta peça, a história é transformada em música e apresentada diante de todos."
10037030-11 = "Em Shanhaijing, chamamos esse tipo de peça de 'Ópera de Pequim'."
10037030-12 = "Ópera... de Pequim...?"
10037030-13 = "Veja, a peça vai começar. #nDivirta-se o quanto quiser."
10037030-24 = "Ao sorrir uma vez, a primavera eterna floresce; ao derramar uma lágrima, uma tristeza infinita invade o peito."
10037030-26 = "A vida humana é efêmera — como um cochilo de primavera."
10037030-28 = "O cuco canta nas montanhas verdes — e a fumaça sobe das árvores de lírio."
10037030-33 = "Como pode aquela nuvem abandonar o céu!"
10037030-38 = "Q-que voz aguda..."
10037030-39 = "Para que a voz ressoe longe em um espaço limitado, utiliza-se esse tipo de técnica vocal."
10037030-40 = "O que significa aquele movimento de girar as mãos?"
10037030-41 = "Na Ópera de Pequim, cada movimento carrega seu próprio significado. #nA forma como cada um interpreta varia muito. Se eu explicar tudo, perderá a graça."
10037030-42 = "Dito isso — é natural sentir tédio sem saber de nada. Vejamos... por exemplo, o movimento de levantar um chicote significa que o personagem está montado a cavalo."
10037030-43 = "Além disso, girar em círculos no centro do palco significa que ele está partindo para uma longa jornada."
10037030-44 = "E, quando várias bandeiras são inseridas na armadura... significa que um exército de milhares de soldados apareceu."
10037030-46 = "Hmm... se fizessem como um filme, pareceria muito mais grandioso."
10037030-47 = "Fufu, antigamente, preparar tais cenários e objetos era um grande esforço, afinal."
10037030-52 = "Surgindo do campo, ganhando poder —"
10037030-53 = "Em três anos, liderando cinco senhores feudais, destruiremos o antigo reino."
10037030-54 = "Finalmente, o mundo foi dividido!"
10037030-55 = "Como pode o céu me bloquear!"
10037030-61 = "A pessoa que apareceu usando aquela máscara! Que legal!"
10037030-62 = "Ele é a figura central, que podemos chamar de protagonista desta peça."
10037030-63 = "A história desta peça se desenrola focada nesse personagem. #nSeria bom prestar atenção nele."
10037030-69 = "Ele tirou um bastão longo... aquilo é... uma lança?"
10037030-71 = "O resultado de uma guerra é algo que nem mesmo quem lidera os soldados pode prever."
10037030-72 = "Suportar a humilhação também é algo que um homem deve fazer."
10037030-73 = "Neste mundo, há muitos que possuem talento,"
10037030-74 = "e, eventualmente, talvez consigam dar a volta por cima."
10037030-76 = "Após inúmeras batalhas, os soldados estão exaustos,"
10037030-77 = "derrotados nas planícies centrais, incapazes de se recuperar."
10037030-78 = "Não importa quão talentosas sejam as pessoas,"
10037030-79 = "chegando a este ponto, não há como reverter a situação."
10037030-81 = "Hum... o que eles pensam que estão fazendo! Só dizendo coisas bonitas!"
10037030-82 = "Se fosse eu, já teria purgado todos eles!"
10037030-84 = "H-hum... dizem que a admoestação é uma forma de lealdade, não é...?"
10037030-85 = "Eu não quero saber disso! Vou condenar todos a duas semanas limpando o banheiro!"
10037030-86 = "(Para alguém que fala tanto em expurgo, ela está sendo bem benevolente. Será que essa é a capacidade dela como ditadora?)"
10037030-91 = "Minha força pode arrancar montanhas, meu espírito cobre o mundo inteiro."
10037030-92 = "A situação é desfavorável, e o cavalo não avança."
10037030-93 = "Como o cavalo não avança, eu não tenho o que fazer."
10037030-98 = "Minha amada, minha amada, o que farei com você!"
10037030-99 = "O exército inimigo já conquistou o mundo,"
10037030-100 = "De todos os lados, ouço a canção do inimigo."
10037030-101 = "Mesmo com o Grande Rei em apuros,"
10037030-102 = "como posso eu, de origem humilde, continuar a viver?"
10037030-108 = "E-ei? O-o que você está fazendo! Agora mesmo, você sacou a espada do protagonista...!"
10037030-109 = "E-e a apontou para o próprio pescoço...!? N-não pode ser! O que acontecerá com aqueles que sobreviveram!"
10037030-111 = "Uuu... No fim, me separei de todos os soldados... e fiquei sozinha..."
10037030-112 = "E mesmo assim, sendo perseguida por milhares de soldados inimigos..."
10037030-114 = "Eu sei! Sei que há uma recompensa de mil peças de ouro e dez mil lares pela minha cabeça!"
10037030-118 = "Sendo assim, concederei um favor a você!"
10037030-125 = "Uaaah!?"
10037030-126 = "Uuu... N-não pode ser... Ele era tão valente..."
10037030-127 = "O mundo não se conquista apenas com dignidade, e o coração das pessoas não se ganha apenas com valentia."
10037030-128 = "O destino é exatamente isso. Às pessoas, resta apenas se dedicar..."
10037030-129 = "Até eu entendo isso! #nMas, mas..."
10037030-130 = "Uuu, pensar que ele mexeria tanto com o meu coração... Não tenho escolha a não ser admitir! #nHum, foi uma ótima peça!"
10037030-131 = "Fico feliz que tenha gostado."
10037030-134 = "Então, Secretária-Geral Cherino. Em seguida—"
10037030-135 = "Antes disso! Em nome da Secretária-Geral da Academia Federal de Red Winter, tenho um pedido a fazer!"
10037030-139 = "(Pedindo em nome da Secretária-Geral aqui...? O que ela pretende fazer? Será que é uma reclamação pela falta de cortesia inicial?)"
10037030-140 = "(Por ora, não tenho escolha a não ser ouvir o que ela tem a dizer.)"
10037030-141 = "(Se as coisas correrem bem, talvez eu consiga vislumbrar o estilo de Red Winter.)"
10037030-142 = "Muito bem. Como líder da Genryumon, ouvirei seu pedido dentro do possível."
10037030-143 = "Sobre a apresentação de agora a pouco...!"
10037030-144 = "Sobre a Ópera de Pequim?"
10037030-145 = "Isso mesmo! A Ópera de Pequim!"
10037030-146 = "Chame a aluna que fez o papel de protagonista aqui!"
10037030-147 = "A Kaguya...?"
10037030-148 = "Isso. Kaguya, não é? Quero conversar um pouco com ela!"
10037030-149 = "(...Um pedido difícil de entender. Mas isso também pode ser algum tipo de guerra psicológica.)"
10037030-151 = "A Secretária-Geral parece ter gostado muito da Ópera de Pequim. #nSe não for incômodo, poderia atender ao pedido dela?"
10037030-156 = "Ah, não me importo. #nMina, conto com você."
10037030-157 = "Sim, Líder."
10037030-165 = "Chamou, Líder? Urushibara Kaguya, apresentando-se!"
10037030-167 = "Que bom que veio, Kaguya. #nBem... deixe-me apresentar, esta é a Secretária-Geral Cherino. Kaguya, a chefe do Clube de Ópera de Pequim."
10037030-168 = "Kaguya, esta é a Secretária-Geral Cherino, da Academia Federal de Red Winter."
10037030-170 = "É um prazer conhecê-la, Secretária-Geral Cherino. #nMuito obrigada por assistir à nossa peça!"
10037030-171 = "Oh...! Você parece outra pessoa comparada a quando estava no palco!"
10037030-172 = "Fufu, fico honrada com o elogio! Como interpretamos vários papéis—"
10037030-173 = "Às vezes, até eu mesma perco a noção de quem sou de verdade."
10037030-174 = "É mesmo! Isso parece conveniente, mas... também parece um pouco trabalhoso!"
10037030-175 = "Fufu, que observação perspicaz. Perceber isso de relance...!"
10037030-182 = "Então, Líder. Gostaria de passar ao assunto principal agora."
10037030-187 = "(...Hum, então a secretária é quem organiza as negociações. Parece haver uma discrepância com a Red Winter que eu conheço...)"
10037030-188 = "(Ou será que... isso é o "governo pela não ação", onde se governa o mundo sem se mover...?)"
10037030-189 = "(...Por enquanto, vou observar a situação.)"
10037030-193 = "Ah, vamos fazer isso, Chefe de Gabinete Tomoe."
10037030-196 = "O que é a "mudança de face"?"
10037030-197 = "É uma técnica vista na Ópera de Sichuan, um pouco diferente da Ópera de Pequim. #nExplicando de forma simples, é quando mudamos de máscara instantaneamente de acordo com a situação da peça!"
10037030-198 = "Oh, isso parece ser bem legal!"
10037030-199 = "Sim! As três grandes artes cênicas de Shanhaijing são a Ópera de Pequim, a Ópera de Sichuan e a Ópera Kunqu— #ne todas as três exigem treinamento em artes marciais."
10037030-200 = "A-Artes marciais...? Para fazer uma peça de teatro?"
10037030-201 = "Fufu, pode soar estranho, mas é exatamente isso. Como você já deve ter visto, eu demonstrei a arte da lança no palco agora pouco, não foi?"
10037030-202 = "Hoje em dia, está mais próximo de uma técnica artística do que de uma arte marcial, mas..."
10037030-203 = "A-Agora que você mencionou, é verdade...!"
10037030-208 = "Ouvi dizer que a Escola Superior Shanhaijing evita interações com o exterior. Apesar disso, agradeço sinceramente por terem proposto este encontro de intercâmbio à nossa Academia Federal Red Winter."
10037030-209 = "Abrir as portas desta maneira sugere que há alguma intenção por trás disso, imagino... Como seria?"
10037030-210 = "Duas correções. Primeiro, as portas de Shanhaijing não estão tão fechadas quanto você pensa. A Associação Comercial Genbu já não interage com o exterior?"
10037030-211 = "E segundo, a entrada e saída de pessoas de fora é permitida no Genryumon. Como você mesma sabe, o Sensei do Schale está aqui."
10037030-212 = "[s1] \"Ah, olá. Sou o Sensei do Schale.\"\n[s2] \"Não se esqueça que eu também estou aqui, né?\""
10037030-215 = "Fufufu, é verdade. Se não fosse por esta ocasião, eu poderia ter passado mais tempo com o Sensei, é uma pena."
10037030-216 = "Fufu, sinto o mesmo. Não fique tão triste, Sensei."
10037030-217 = "[s3] \"Ahaha, está tudo bem.\"\n[s4] \"Não se preocupe comigo.\""
10037030-220 = "Ora, graças à Mestra do Portão, estou me sentindo mais confortável do que nunca."
10037030-221 = "Sendo assim, fico aliviada. Embora não seja o mesmo conforto que na sua própria academia. Espero que possa me perdoar por isso."
10037030-222 = "Mas eu... suspeito que, com este encontro de intercâmbio, a Mestra do Portão queira nos pedir algo."
10037030-223 = "...Estou plenamente ciente de que este é um comentário indelicado."
10037030-224 = "Não se preocupe. Na verdade, você me poupou o trabalho de ir direto ao ponto. Agradeço."
10037030-225 = "Sobre a sua suspeita... se eu tivesse que responder, diria que 'não há nada em especial'."
10037030-229 = "Eh...?"
10037030-230 = "Bem... é muito difícil dizer isso, mas não tenho a menor intenção de ficar medindo forças com a Mestra do Portão."
10037030-231 = "Por isso, pedi para a Presidente Marina ficar e vim falar diretamente com a Mestra do Portão."
10037030-233 = "Ah, eu também pedi para a Chefe da Executiva, Mina, ficar e estou aqui. Ou seja, não há nada a esconder aqui, nem motivos para tal."
10037030-234 = "[s5] \"Ei... desculpe interromper, mas...\"\n[s6] \"Acho que a Kisaki... está realmente falando de coração como presidente estudantil.\""
10037030-237 = "Hum. Exatamente. Obrigada, Sensei."
10037030-238 = "Direi mais uma vez. Não existe nenhum pedido especial para vocês. Não quero nada de vocês, nem pretendo usá-los."
10037030-240 = "Então, por que este encontro de intercâmbio...?"
10037030-245 = "Eu queria mostrar a vocês a nossa Shanhaijing — isso não é o suficiente?"
10037030-246 = "Não é insuficiente, mas talvez não seja o bastante."
10037030-247 = "Hum. Isso deve ser por conta da minha falta de virtude."
10037030-248 = "...É a sua verdadeira intenção?"
10037030-249 = "Sim. Se eu tivesse que exigir algo de vocês... seria que conhecessem Shanhaijing e se relacionassem conosco."
10037030-250 = "\"Se relacionassem conosco\" significa...?"
10037030-251 = "Fufu. Talvez essa seja a minha verdadeira intenção."
10037030-252 = "Ora. Então é isso."
10037030-253 = "Não há nada de surpreendente nisso. É uma das tradições herdadas em nossa Shanhaijing, a \"retribuição\"."
10037030-254 = "Fufu, era isso?"
10037030-255 = "Kufufu. Exatamente."
10037030-260 = "Isso é verdade? Você consegue cuspir fogo pela boca!?"
10037030-261 = "Sim! É uma técnica artística chamada cuspir fogo... nós apagamos as luzes do palco para apresentar! Ah, também existem vários segredos sobre como escurecer o palco...!"
10037030-262 = "Oh, então Shanhaijing tem muitos segredos!"
10037030-263 = "Será? Dizem que a história e os segredos são proporcionais, de fato!"
10037030-265 = "Agradeço novamente pela calorosa recepção, Mestra do Portão."
10037030-266 = "Hum, eu também fiquei satisfeita! Foi realmente divertido. E não precisei me preocupar com nenhum golpe de estado!"
10037030-268 = "Fufu. Continuem aproveitando Shanhaijing o quanto quiserem."
10037030-269 = "Bem... a partir de agora, preciso da ajuda do Sensei."
10037030-270 = "[s] \"Hum? Eu?\""
10037030-271 = "Sim, pois posso confiar no Sensei. Parece que você já conhece os visitantes de Red Winter..."
10037030-272 = "Vou pedir para a Mina escoltá-los. Então, peço que guie os convidados em meu lugar."
10037030-273 = "[s] \"A Kisaki vai a algum lugar?\""
10037030-274 = "...Sim. Surgiu um compromisso."
10037030-275 = "Se não for incômodo, poderia me dizer o motivo?"
10037030-276 = "Só posso dizer que são assuntos particulares. Peço desculpas."
10037030-277 = "……Entendo, compreendido. #nEntão, vamos seguir com a orientação da Diretora Executiva Mina e do Sensei."
10037030-279 = "Oh, o Camarada também vai junto? #nÉ a primeira vez do Camarada em Shanhaijing também?"
10037030-280 = "[s] \"Para ser preciso…… não é a minha primeira vez.\""
10037030-281 = "Hum…… mas você não conhece bem Shanhaijing, assim como eu, certo?"
10037030-282 = "Vamos passear juntos!"
10037030-286 = "[ns] \"Ei, é perigoso correr!\""
10037030-291 = "Sendo assim, eu me retiro por aqui, Monshu-sama, Secretária-Geral."
10037030-292 = "Sim. Bom trabalho, Kaguya."
10037030-294 = "Ué……? A Kaguya não vai junto?"
10037030-295 = "Sim, eu ainda tenho uma apresentação…… #nMas, sinta-se à vontade para vir à nossa sala do clube quando quiser! Será bem-vindo!"
10037030-297 = "Entendo…… se está ocupada com a apresentação, não tem jeito! Eu te perdoo!"
10037030-298 = "Muito obrigada, Secretária-Geral!"
10037030-307 = "……."
10037030-309 = "A Monshu-sama ficará no Rikuwakaku, e a Red Winter irá para Shanhaijing……."
10037030-310 = "\"Quero que conheçam Shanhaijing e interajam com eles.\", é……."
10037030-315 = "Um encontro só existe se houver alguém para encontrar. E o mesmo vale para a outra parte. #nEncontros são algo mútuo……."
10037030-316 = "O encontro entre Shanhaijing e Red Winter — ou seja, a mistura de ambas as escolas."
10037030-317 = "――Você seguirá esse caminho, Monshu-sama."
10037030-320 = "……."
10037030-321 = "O que é a \"lealdade\"? O que a \"lealdade\" deve realizar……."
10037030-322 = "O \"teatro\" também, assim como a \"vida\", não é algo simples."
10037030-326 = "No entanto, temer dar um conselho seria, de fato, ir contra a lealdade."
10037030-331 = "[log=카구야]……Esta paisagem embriaga as pessoas,[/log]"
10037030-333 = "[log=카구야]e sem perceber, cheguei ao sopé da montanha.[/log]"
