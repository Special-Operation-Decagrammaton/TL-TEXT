[translation]
10025110-1 = "Epílogo; É uma entrega!"
10025110-4 = "Olá a todos que assistem ao Canal Chronos! Eu sou Kazamaki Mai, do Departamento de Notícias da Chronos!"
10025110-5 = "No 'Bom dia! Kivotos' de hoje, viemos visitar a vila de Yatoura, localizada nos arredores do Porto Kanesaki."
10025110-6 = "Originalmente, era uma vila pacata conhecida por ser um local de produção de camarão, mas parece que ultimamente está bombando nas redes sociais!"
10025110-7 = "Se você está se perguntando por que esta vila está atraindo tanta atenção, é por causa do 'Shirokuma Channel', um canal de pesca que está em ascensão. Acreditem ou não, um vídeo enviado por este canal atingiu a marca de 10 milhões de visualizações!"
10025110-8 = "Graças à reputação de 'natureza bela' e 'muitos pontos de pesca para iniciantes' que se espalhou pelo vídeo, a vila de Yatoura tornou-se subitamente um novo ponto turístico famoso."
10025110-9 = "Além disso, o kusaya, um produto local, ganhou a aprovação de alguns gourmets, e dizem que há pessoas que visitam a vila só para ver o kusaya de perto."
10025110-10 = "Ainda assim, 10 milhões de visualizações... que inveja. Nós também postamos com frequência, mas... #nquem sabe quando chegaremos lá."
10025110-11 = "…Se não tivéssemos levado restrições por causa de fake news, acho que já teríamos alcançado isso há muito tempo."
10025110-12 = "Ei!"
10025110-13 = "Cof, cof... Acho que todo mundo já passou pela experiência de encontrar alguém indelicado durante uma viagem de descanso e ter o clima divertido arruinado."
10025110-14 = "Mas aqui na vila de Yatoura, você pode ficar tranquilo! Só tem gente gentil e alegre, e todos se divertiram muito... #nEsse tipo de conteúdo parece estar sendo postado nas redes sociais, um após o outro."
10025110-19 = "...Oh. Ali, podemos ver um pescador."
10025110-20 = "Vou falar com ele agora mesmo para fazer uma entrevista!"
10025110-34 = "Olá, aqui é o 'Bom dia! Kivotos'."
10025110-35 = "...O que você quer?"
10025110-36 = "(Ué? Parece diferente do que me disseram...)"
10025110-37 = "Bem, é que, eu gostaria de fazer uma entrevista..."
10025110-38 = "Estou trabalhando. Se alguém se machucar, a responsabilidade é nossa—"
10025110-44 = "Kumagai, não seja tão rude."
10025110-45 = "Ah... me desculpe."
10025110-51 = "...Perdoe-me, não leve a mal. É que agora não posso parar. #nComo não podemos deixar que nada aconteça com os turistas, ele acaba ficando um pouco nervoso."
10025110-53 = "N-não, tudo bem...! Eu que peço desculpas por atrapalhar o seu trabalho."
10025110-54 = "Bem, se não for incômodo... poderia nos dizer uma palavra sobre o charme desta vila?"
10025110-56 = "Hum... Para mim, é só uma pequena vila de pescadores onde o camarão é gostoso."
10025110-58 = "S-sério...?"
10025110-60 = "É justamente por isso que, se alguém se dá ao trabalho de vir a uma vila como esta, #nespero que seja uma boa lembrança."
10025110-61 = "E também, quem sabe. Se um dia você vir camarão na cidade e se lembrar do tempo que passou nesta vila, ficarei feliz... Hahaha."
10025110-63 = "Entendo... Acho que comecei a entender por que as pessoas visitam esta vila."
10025110-64 = "...A propósito, gostaria de perguntar sobre um boato."
10025110-65 = "...Você conhece algo sobre os 'Profundos'?"
10025110-71 = "Dizem na internet que, se você fizer uma oferenda no 'Recife do Demônio' e recitar certas palavras, uma existência misteriosa lhe emprestará seu poder..."
10025110-72 = "Não há ninguém que tenha testemunhado essa cena ou que saiba os detalhes?"
10025110-74 = "Pois é. Essas lendas existem, mas... #nno fim das contas, não passam de lendas."
10025110-75 = "Se houvesse alguém que ajudasse a vila... ou a pesca, eu certamente saberia."
10025110-77 = "De fato, é verdade..."
10025110-78 = "Além disso, parece que isso se tornou um assunto recente... #nVocê sabe algo sobre a história de fantasma chamada 'O Grito do Depósito de Kusaya'?"
10025110-79 = "'O Grito do Depósito de Kusaya'?"
10025110-80 = "Sim. É uma mensagem enviada anonimamente, dizendo que, às vezes, uma voz masculina pode ser ouvida vindo do depósito de kusaya da vila de Yatoura, dizendo 'Eu odeio camarão...' e 'Eu odeio ainda mais o kusaya...'."
10025110-85 = "...Não sei de nada."
10025110-86 = "Não deve ter sido apenas o som do vento soprando pelas frestas?"
10025110-87 = "Dizem que quando o vento bate em árvores velhas, pode soar como uma voz humana."
10025110-89 = "S-sério..."
10025110-94 = "...Aquele cara, parece que está tentando fugir de novo."
10025110-95 = "Tsc... Que incômodo."
10025110-96 = "Avise os outros e procurem por ele. Usem as câmeras de segurança também."
10025110-97 = "...De qualquer forma, só existe uma entrada e saída nesta vila."
10025110-99 = "Com licença... sobre o que vocês estão falando agora...?"
10025110-101 = "Não se preocupe, é um assunto nosso."
10025110-102 = "Bem, divirtam-se. Estamos ocupados com o trabalho, então com licença."
10025110-109 = "……Este vilarejo, será que é realmente seguro?"
10025110-113 = "Parque dos Coelhinhos"
10025110-116 = "Que calor……"
10025110-117 = "Está calor, não é……"
10025110-118 = "Que calor……"
10025110-119 = "……Daria tudo por um mergulho em uma água bem gelada."
10025110-120 = "Sinto como se a ida à praia tivesse sido há muito tempo……"
10025110-121 = "……Sim. Embora tenha sido há poucos dias, parece que faz muito tempo."
10025110-125 = "……Foi divertido."
10025110-126 = "No começo eu estava com medo e tensa, mas…… todos eram boas pessoas."
10025110-127 = "Pescamos no mar à noite e comemos muitos frutos do mar deliciosos……"
10025110-128 = "……Faz tempo que não me divertia tanto."
10025110-129 = "É verdade. Desde que a Academia SRT foi fechada, aconteceu tanta coisa que não conseguimos descansar."
10025110-130 = "Desta vez também foi tratado como uma operação formal, mas…… no fim das contas, acabou parecendo que passamos as férias."
10025110-131 = "……Pois é. No final, aconteceu exatamente como o Sensei disse no início."
10025110-132 = "Focar apenas no objetivo aumenta a chance de julgamentos errados. #nAssim como o medo foi causado pela ignorância."
10025110-133 = "Como capitã do Esquadrão RABBIT, reavaliei o quanto um descanso adequado é importante."
10025110-134 = "Mas prometemos ficar no Parque dos Coelhinhos até que a Academia SRT seja reaberta."
10025110-135 = "Então vamos nos recompor e nos esforçar mais um pouco!"
10025110-139 = "……Bem, já está quase na hora do almoço, a Moe ainda não voltou da busca pelas marmitas?"
10025110-145 = "Ei, olhem só isso!"
10025110-146 = "Moe…… você tem noção de quanto tempo passou desde que saiu――"
10025110-147 = "Hehe…… Saki, mesmo sendo você, #nnão vai conseguir reclamar depois de ver isso, né?"
10025110-148 = "Tcharam! A "Marmita Premium Matsu de Edição Limitada" da Angel 24!! #nConsegui pegar uma de cada um dos 4 tipos!"
10025110-149 = "Não é a Take nem a Ume, é a marmita Matsu……? #nIsso não é muito caro……"
10025110-150 = "Exato. É uma marmita de luxo feita com produtos locais, super rara e com produção limitada!"
10025110-151 = "Mas, ao verificar a rede logística da loja de conveniência, #nvi que as marmitas Matsu estavam sendo descartadas, então corri para lá!"
10025110-153 = "Então foi por isso que você foi mais longe que o habitual hoje."
10025110-154 = "Poder comer uma marmita tão luxuosa no almoço…… muito bem, Moe!"
10025110-155 = "Então…… vamos ver o que tem dentro!"
10025110-160 = "Salmão, carne bovina, frango frito…… tem até camarão empanado!"
10025110-161 = "Parece que os camarões das marmitas de conveniência voltaram ao normal também."
10025110-162 = "É verdade. Ver marmitas com camarão de novo em D.U., #né um pouco emocionante."
10025110-164 = "Bem, como forma de agradecimento aos pescadores, eu vou ficar com esta marmita de camarão――"
10025110-165 = "Espere, Saki."
10025110-166 = "……Por que você está escolhendo a marmita primeiro?"
10025110-168 = "Hm? Mas você não disse que prefere carne a peixe?"
10025110-169 = "E, além disso…… não é por nada, mas acho que fui bem útil na operação de demolição subaquática, não fui? #nComo recompensa, ganhar o camarão empanado――"
10025110-170 = "Hoje eu também estou com vontade de camarão!"
10025110-171 = "E, para começar, fui eu que encontrei essas marmitas descartadas!"
10025110-172 = "E-eu também queria o camarão hoje……"
10025110-174 = "……Eu também quero comer."
10025110-175 = "……A concorrência está alta hoje."
10025110-177 = "Não tem jeito, vamos decidir no pedra, papel e tesoura de forma justa……"
10025110-187 = "Olá. A senhorita Miyako Tsukiyuki está neste parque?"
10025110-188 = "Sim, sou eu, Miyako Tsukiyuki……"
10025110-189 = "Ah, que bom. Uma entrega para você!"
10025110-190 = "Pronto…… por favor, assine aqui."
10025110-196 = "Com licença…… é realmente uma encomenda para mim? #nNeste parque……?"
10025110-197 = "Sim. Sem dúvida, o endereço deste parque está registrado aqui."
10025110-198 = "「D.U.子ウサギタウン近隣公園、手洗い場前。A型1号テント、月雪ミヤコ様」#n……ですよね？"
10025110-200 = "テントの位置まで、無駄に具体的だな……"
10025110-202 = "たしかに間違いありませんが、どなたからの荷物ですか……？"
10025110-203 = "発送元は、夜戸浦村の漁業組合ですね！！"
10025110-204 = "冷凍保管が必要な物なので、常温だと中身が傷む恐れがあります。"
10025110-205 = "開封したら早めに召し上っていただくか、冷凍保存するようお願いします。"
10025110-206 = "ありがとうございました。では、失礼します！"
10025110-213 = "どうして、夜戸浦村から……？"
10025110-214 = "しかも冷凍便って、何が送られてきたんだろうねぇ。"
10025110-215 = "生モノの気配がするような……"
10025110-217 = "……私が開けてみる。"
10025110-225 = "これは……"
10025110-226 = "……エビじゃん！！しかもこんなに高級なやつ！！！"
10025110-227 = "すごい……高そうなエビが、箱にいっぱい……"
10025110-228 = "……あ、箱の中にメッセージが入ってますね。"
10025110-234 = "「通りすがりの心優しい観光客の皆様へ。夜戸浦村・漁業組合一同より、心からの感謝を込めて。」"
10025110-235 = "……やはり、私たち宛てで間違いないようですね。"
10025110-237 = "「通りすがりの心優しい観光客」ねぇ……私たちにピッタリじゃない？"
10025110-238 = "……心優しい、って文字にされると恥ずかしいな。"
10025110-239 = "それにSRTとして当然の仕事をしただけなのに、こんなお礼を頂いてしまうなんて、ちょっと申し訳ないな……"
10025110-240 = "ですが、ご厚意で送っていただいた物を断るわけにはいけません。#nこのエビは、ありがたいと頂くとしましょう。"
10025110-241 = "あ、そうだサキ。さっきのエビフライ弁当、食べちゃって良いよ。#n私はこれがあれば十分だから。"
10025110-242 = "なっ、ズルいぞ！"
10025110-244 = "この量……10人前はありそうだけど、私たちだけで食べれるのかな……？"
10025110-245 = "冷凍庫はないし……このままじゃ大切なエビがダメになっちゃうかも……"
10025110-247 = "……それは、皆さんに失礼ですね。"
10025110-248 = "……では、今回も力を貸してくださった[USERNAME]先生を呼ぶのはどうでしょう？"
10025110-249 = "賛成！！！"
10025110-258 = "こんにちは、先生。今お時間、大丈夫でしょうか？"
10025110-259 = "その、先日のシュリンプ・トラップ作戦に関するお話なのですが……"
10025110-260 = "あ、あのときは、大変お世話になりました……それで、えっと……"
10025110-261 = "……何をそんなにモジモジしてるんだ？"
10025110-262 = "恥ずかしいなら、みんなで言っちゃう？"
10025110-263 = "じゃ、じゃあみんなで――"
10025110-265 = "――今度は、私たちが先生をおもてなしします！"
10025110-270 = "（子ウサギ公園で、RABBIT小隊のみんなと盛大にバーベキューを楽しんだ）"
10025110-274 = "（後日シャーレに10人前のくさやが届いた事で、ちょっとした騒ぎになったのはまた別のお話）"
10025110-275 = "夏の特殊作戦！RABBIT小隊と消えたエビの謎"
