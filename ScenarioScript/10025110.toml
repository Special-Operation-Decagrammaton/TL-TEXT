[translation]
10025110-1 = "エピローグ;お届け物です！"
10025110-4 = "クロノスチャンネルをご覧の皆さん、こんにちは！クロノス報道部の[ruby=かざまき]風巻[/ruby]マイです！"
10025110-5 = "本日の「おはよう！キヴォトス」では、#n[ruby=かねさきこう]鐘崎港[/ruby]の外れにある[ruby=やとうら]夜戸浦[/ruby]村を訪ねてきました。"
10025110-6 = "元々は、エビの特産地として知られているひっそりした村でしたが、ここ最近SNS上で話題沸騰中のようです！"
10025110-7 = "なぜこの村が注目を集めているのかと言いますと、現在急上昇中の釣りチャンネル「シロクマちゃんねる」の影響なんだとか。なんと、このチャンネルにアップロードされた動画が、1000万回の再生を達成したとのことです！"
10025110-8 = "動画から「美しい自然」と「初心者向けの釣りスポットが多い」という評判が広まり、夜戸浦村は新しい観光名所として一躍有名になりました。"
10025110-9 = "また、特産品のくさやが一部の美食家たちに好評を博し、くさやを一目見るべくこの村を訪れる人たちもいるんだとか。"
10025110-10 = "それにしても、1000万回再生って……羨ましいです。私たちも投稿頻度は高いんだけどなぁ……#nいつになることやら。"
10025110-11 = "……フェイクニュースで規制さえ食らわなければ、とっくに達成してたと思いますけど。"
10025110-12 = "ちょっと！"
10025110-13 = "コホン……息抜きに訪れた旅先で不親切な人に遭遇してしまい、楽しい気持ちが台無し……なんて経験、誰しも一度はあるかと思います。"
10025110-14 = "ですが、ここ夜戸浦村なら安心！親切な明るい人たちばかりで楽しく過ごせた……#nそんな内容が次々とSNSに投稿されているようです。"
10025110-19 = "……おや。あちらに、漁師さんの姿が見えますね。"
10025110-20 = "さっそく声をかけて、インタビューをしていこうと思います！"
10025110-34 = "こんにちは、「おはよう！キヴォトス」です。"
10025110-35 = "……何の用だ？"
10025110-36 = "（あれ？聞いてた話と違うような……）"
10025110-37 = "ええっと、その、インタビューをさせていただきたいのですが……"
10025110-38 = "仕事中なんだ。怪我でもされたら、こっちが――"
10025110-44 = "[ruby=くまがい]熊谷[/ruby]、もうちょっと優しくせんか。"
10025110-45 = "うっ……すみません。"
10025110-51 = "……すまんの、気を悪くしないでくれ。ちょっと今は手が離せなくてな。#n観光客に何かあってはならんから、コイツも少し神経質になってしまってるんだ。"
10025110-53 = "い、いえ……！こちらこそ、お仕事の邪魔をしてしまい申し訳ありません。"
10025110-54 = "その、差し支えなければ……この村の魅力について一言頂けませんか？"
10025110-56 = "ふむ……ワシにしてみりゃ、エビがウマいだけの小さな漁村じゃな。"
10025110-58 = "そ、そうなんですか……？"
10025110-60 = "だからこそ、こんな村にわざわざ来てくれる者がおるなら、#nいい思い出になることを願っとるよ。"
10025110-61 = "あとは、そうじゃな。いつか街でエビを見かけたとき、この村で過ごした時間を思い出してくれたら嬉しいの……はっはっは。"
10025110-63 = "なるほど……なぜ人々がこの村を訪ねるのか、分かってきた気がしました。"
10025110-64 = "……ちなみに、噂に関してお尋ねしたいことがあるのですが。"
10025110-65 = "……「深きもの」について、ご存知でしょうか？"
10025110-71 = "ネットでは「鬼の[ruby=がんしょう]岩礁[/ruby]」でお供えをして、ある言葉を唱えると神秘的な存在が力を貸してくれる……と言われています。"
10025110-72 = "実際にその光景を目撃したり、詳細を知っている方はいないのでしょうか？"
10025110-74 = "そうじゃな。そんな言い伝えも存在しておるが……#nあくまで言い伝えに過ぎんからなぁ。"
10025110-75 = "村を……漁を助けてくれるような者がいるなら、このワシが知らないはずないからの。"
10025110-77 = "たしかに、そうですね……"
10025110-78 = "あと、こちらは最近話題になったばかりのようですが……#n「くさや庫の叫び」という怪談について、何かご存じでしょうか？"
10025110-79 = "「くさや庫の叫び」じゃと……？"
10025110-80 = "はい。匿名で寄せられたお便りですが、夜戸浦村のくさや庫から時々「エビはイヤ～」「くさやはもっとイヤ～～」という男性の声が聞こえる、という話です。"
10025110-85 = "……知らんのう。"
10025110-86 = "隙間風かなんかの音と聞き間違えたんじゃないかね。"
10025110-87 = "古木に風が当たると、人の声のようにも聞こえるというからの。"
10025110-89 = "そ、そうですか……"
10025110-94 = "……アイツ、また脱走を図ってるようです。"
10025110-95 = "チッ……面倒じゃな。"
10025110-96 = "他のヤツらにも声をかけて探し出せ。防犯カメラも利用するんじゃ。"
10025110-97 = "……どちらにせよ、この村の出入口は1つしかない。"
10025110-99 = "あの……今は何の話を……？"
10025110-101 = "気にするな、こっちの話だ。"
10025110-102 = "それじゃ、楽しんでおくれ。ワシらは仕事が忙しくてな、これで失礼する。"
10025110-109 = "……この村、本当に大丈夫なんですか？"
10025110-113 = "子ウサギ公園"
10025110-116 = "暑い……"
10025110-117 = "暑いですね……"
10025110-118 = "暑いね……"
10025110-119 = "……冷たい水の中で、ひと泳ぎしたいな。"
10025110-120 = "海に行ってきたのが、すごく昔のように感じる……"
10025110-121 = "……ええ。つい先日のことなのに、遠い昔のように感じます。"
10025110-125 = "……楽しかったな。"
10025110-126 = "最初は怖くて緊張したけど……みんな良い人たちだった。"
10025110-127 = "夜の海で釣りもして、美味しい海鮮もたくさん食べて……"
10025110-128 = "……こんなに楽しかったの、久しぶりかも。"
10025110-129 = "そうだな。SRT特殊学園が閉鎖してからは、色々あって休めなかったし。"
10025110-130 = "今回も形式上は作戦扱いだったけど……結果的にはバカンスを過ごしてきた感じになってしまったな。"
10025110-131 = "……そうですね。結局、先生が最初に仰っていた通りになりました。"
10025110-132 = "ただ目的に集中するだけでは、判断を見誤る可能性が高まります。#n無知によって、恐怖が引き起こされたように。"
10025110-133 = "RABBIT小隊の隊長として、適切な休息がいかに重要か再認識しました。"
10025110-134 = "でも、SRT特殊学園が復活するまでは子ウサギ公園にいるって約束したからな。"
10025110-135 = "ここは気を引き締めて、もうひと踏ん張りするぞ！"
10025110-139 = "……で、そろそろ昼時だが、弁当を探しに行ったモエはまだ帰ってこないのか？"
10025110-145 = "ちょっと、見てよコレ！"
10025110-146 = "モエ……お前、出発してからどんだけ経ったと思って――"
10025110-147 = "ふっふっふ……サキ、いくらあんたとはいえ、#nこれを見たら文句は言えないんじゃないかなぁ～？"
10025110-148 = "じゃーん！エンジェル24の「期間限定・プレミアム松弁当」！！#nなんと、4種類とも1個ずつもらってこられたんだよ！"
10025110-149 = "竹でも梅でもなくて、松のお弁当……？#nそれ、すごく高いんじゃ……"
10025110-150 = "そう。各地の特産品を使用した高級弁当で、発注数が限られる超レアなやつ！"
10025110-151 = "でもそれが、コンビニの物流ネットワークを見たところ、#n松弁当が廃棄されてるもんだから、ひとっ走りしてきたわけ！"
10025110-153 = "それで今日は、いつもより遠くに行ってきたのですね。"
10025110-154 = "昼からこんなに豪華な弁当を食べられるなんて……よくやった、モエ！"
10025110-155 = "それじゃ……さっそく中を見るとするか！"
10025110-160 = "鮭に牛肉、鶏のから揚げ……エビフライまであるじゃないか！"
10025110-161 = "コンビニ弁当のエビも、すっかり元通りになったようですね。"
10025110-162 = "そうだな。D.U.でまたエビの入った弁当を見られるとは、#nなんかちょっと感慨深いな。"
10025110-164 = "じゃ、漁師さんたちに感謝の意を込めて、このエビフライ弁当は私が――"
10025110-165 = "待った、サキ。"
10025110-166 = "……なんで、あんたが真っ先に弁当を選ぶのさ。"
10025110-168 = "ん？でもお前、魚よりも肉の方が好きだって言ってただろ？"
10025110-169 = "そ、それに……自分で言うのもアレだが、水中爆破作戦では結構活躍したと思うぞ？#n見返りに、エビフライをもらうくらい――"
10025110-170 = "今日は私もエビの気分だから！"
10025110-171 = "そもそも、この廃棄弁当を見つけたのは私でしょ！"
10025110-172 = "わ、私も今日はエビが……"
10025110-174 = "……私も、食べたい。"
10025110-175 = "……今日は競争率が高いな。"
10025110-177 = "仕方ない、ここは公平にジャンケンで……"
10025110-187 = "こんにちは。こちらの公園に[ruby=つきゆき]月雪[/ruby]ミヤコさんはいらっしゃいますか？"
10025110-188 = "はい、私が月雪ミヤコですが……"
10025110-189 = "あぁ、良かった。お届け物です！ "
10025110-190 = "よいしょっと……こちらにサインをお願いします。"
10025110-196 = "あの……本当に私宛ての荷物でしょうか？#nこちらの公園に……？"
10025110-197 = "はい。間違いなく、こちらの公園の住所が記載されてます。"
10025110-198 = "「D.U.子ウサギタウン近隣公園、手洗い場前。A型1号テント、月雪ミヤコ様」#n……ですよね？"
10025110-200 = "テントの位置まで、無駄に具体的だな……"
10025110-202 = "たしかに間違いありませんが、どなたからの荷物ですか……？"
10025110-203 = "発送元は、夜戸浦村の漁業組合ですね！！"
10025110-204 = "冷凍保管が必要な物なので、常温だと中身が傷む恐れがあります。"
10025110-205 = "開封したら早めに召し上っていただくか、冷凍保存するようお願いします。"
10025110-206 = "ありがとうございました。では、失礼します！"
10025110-213 = "どうして、夜戸浦村から……？"
10025110-214 = "しかも冷凍便って、何が送られてきたんだろうねぇ。"
10025110-215 = "生モノの気配がするような……"
10025110-217 = "……私が開けてみる。"
10025110-225 = "これは……"
10025110-226 = "……エビじゃん！！しかもこんなに高級なやつ！！！"
10025110-227 = "すごい……高そうなエビが、箱にいっぱい……"
10025110-228 = "……あ、箱の中にメッセージが入ってますね。"
10025110-234 = "「通りすがりの心優しい観光客の皆様へ。夜戸浦村・漁業組合一同より、心からの感謝を込めて。」"
10025110-235 = "……やはり、私たち宛てで間違いないようですね。"
10025110-237 = "「通りすがりの心優しい観光客」ねぇ……私たちにピッタリじゃない？"
10025110-238 = "……心優しい、って文字にされると恥ずかしいな。"
10025110-239 = "それにSRTとして当然の仕事をしただけなのに、こんなお礼を頂いてしまうなんて、ちょっと申し訳ないな……"
10025110-240 = "ですが、ご厚意で送っていただいた物を断るわけにはいけません。#nこのエビは、ありがたく頂くとしましょう。"
10025110-241 = "あ、そうだサキ。さっきのエビフライ弁当、食べちゃって良いよ。#n私はこれがあれば十分だから。"
10025110-242 = "なっ、ズルいぞ！"
10025110-244 = "この量……10人前はありそうだけど、私たちだけで食べれるのかな……？"
10025110-245 = "冷凍庫はないし……このままじゃ大切なエビがダメになっちゃうかも……"
10025110-247 = "……それは、皆さんに失礼ですね。"
10025110-248 = "……では、今回も力を貸してくださった[USERNAME]先生を呼ぶのはどうでしょう？"
10025110-249 = "賛成！！！"
10025110-258 = "こんにちは、先生。今お時間、大丈夫でしょうか？"
10025110-259 = "その、先日のシュリンプ・トラップ作戦に関するお話なのですが……"
10025110-260 = "あ、あのときは、大変お世話になりました……それで、えっと……"
10025110-261 = "……何をそんなにモジモジしてるんだ？"
10025110-262 = "恥ずかしいなら、みんなで言っちゃう？"
10025110-263 = "じゃ、じゃあみんなで――"
10025110-265 = "――今度は、私たちが先生をおもてなしします！"
10025110-270 = "（子ウサギ公園で、RABBIT小隊のみんなと盛大にバーベキューを楽しんだ）"
10025110-274 = "（後日シャーレに10人前のくさやが届いた事で、ちょっとした騒ぎになったのはまた別のお話）"
10025110-275 = "夏の特殊作戦！RABBIT小隊と消えたエビの謎"
