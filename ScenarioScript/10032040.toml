[translation]
10032040-1 = "Episódio 4; Situação Inesperada"
10032040-21 = "Todos, afastem-se! Abram caminho!"
10032040-22 = "Hum... é um lugar melhor do que eu pensava, não é ruim."
10032040-23 = "Guie-me até o meu assento. Não quero passar a vergonha de entrar atrasado."
10032040-24 = "……O senhor tem certeza de que quer ir?"
10032040-25 = "Já recebemos várias informações de que estão atrás do chefe."
10032040-26 = "Provavelmente, até mesmo nesta casa de ópera... e ainda assim, o senhor insiste em assistir à peça..."
10032040-27 = "……Cale-se."
10032040-28 = "…………."
10032040-29 = "Tolo. Se eu me acovardasse com algo assim, estaria fazendo exatamente o que eles querem."
10032040-30 = "Sigam o cronograma conforme planejado. #nSe há ameaças atrás de nós, vamos enfrentá-las de frente."
10032040-31 = "Afinal, preparei um \"trunfo\" para hoje."
10032040-32 = "……Um trunfo, senhor?"
10032040-33 = "……Hmph. Bem, não se preocupe com isso. Apenas mantenha-se alerta."
10032040-34 = "Se entendeu, guie-me logo. Pretende me deixar em pé até quando?"
10032040-35 = "……Sim! Por aqui, então..."
10032040-44 = "……Não é contraproducente andar com tanta gente assim? Acaba chamando atenção."
10032040-45 = "Acho que ele pensou que seria mais sensato agir com naturalidade do que tentar se esconder."
10032040-46 = "……Na verdade, isso é um problema para nós. #nAfinal, teremos que passar por todos esses seguranças para sequestrá-lo."
10032040-47 = "Agora entendo por que os outros queriam explodir a casa de ópera inteira."
10032040-48 = "E-eu posso fazer isso? Posso usar as bombas agora mesmo...!"
10032040-49 = "[s1] \"C-calma, Haruka...!\"\n[s2] \"Se fizer isso, tudo vai por água abaixo...!\""
10032040-55 = "Não precisamos ter pressa. #nA presença dos seguranças já era esperada, e oportunidades não vão faltar."
10032040-56 = "O que me preocupa, na verdade, é... essa história de \"trunfo\" e o clima ao redor."
10032040-57 = "É verdade... está estranho, não está?"
10032040-61 = "……Eh?"
10032040-62 = "O clima ao redor...?"
10032040-63 = "……Observe bem ao redor, Presidente."
10032040-70 = "Hmm, sinto que eles estão meio agitados..."
10032040-71 = "I-isso é porque uma figura importante apareceu de repente, é normal ficar tenso..."
10032040-72 = "……Não. Não é esse tipo de atmosfera."
10032040-73 = "Todos estão desviando o olhar, mas observando cada movimento do chefe. #nE não apenas o chefe, mas o salão inteiro..."
10032040-74 = "Será que isso significa..."
10032040-75 = "[s3] \"Pessoas suspeitas que não estavam na lista...?\"\n[s4] \"Então ainda restavam algumas...\""
10032040-78 = "……?"
10032040-79 = "……Eh?"
10032040-80 = "E-espera. Isso não está estranho?"
10032040-81 = "Deveríamos ter eliminado todos os suspeitos! #nAs pessoas que restaram na lista eram todas civis comuns, não eram!?"
10032040-82 = "Civis comuns querendo atacar o chefe..."
10032040-83 = "……!!"
10032040-87 = "Quer dizer que, desde o início, todos eles eram \"suspeitos\"?"
10032040-94 = "Bem..."
10032040-95 = "……É, parece que sim."
10032040-96 = "……Infelizmente."
10032040-100 = "O quê..."
10032040-101 = "Como assim, o quê!?!?"
10032040-102 = "Ahahahaha!!"
10032040-103 = "A gente estava procurando pelos suspeitos para proteger os espectadores comuns, mas na verdade todo mundo era suspeito?"
10032040-104 = "Que piada, isso é hilário!"
10032040-105 = "N-não é hora de rir, Aru!"
10032040-106 = "Porque, não é incrível? Eu não conseguia prever nada disso."
10032040-107 = "E você, Aru-chan? O que você acha, Sensei? Você conseguiu prever isso?"
10032040-108 = "[s5] \"Com certeza, foi uma surpresa.\"\n[s6] \"Eu também não esperava por isso.\""
10032040-111 = "I-isso não faz sentido! Então, como foi feita a verificação de identidade!? E os convites!? #nO que está acontecendo? A história não era nada disso!"
10032040-116 = "Bem, listas podem ser falsificadas facilmente. #nPara começo de conversa, foi ingenuidade nossa não suspeitar da lista de nomes..."
10032040-117 = "Aru-chan~ Nós só conseguimos entrar aqui porque alguém falsificou a lista para nós, lembra?"
10032040-118 = "Por isso mesmo, como você consegue ficar tão calma!?"
10032040-119 = "Uuu... meu estômago dói."
10032040-120 = "Mantenha a calma, Rikuhachima Aru. #nO que devemos fazer agora? Pense."
10032040-121 = "Não acho que algo vá acontecer agora mesmo. #nCom certeza, todos ainda estão apenas observando a situação..."
10032040-122 = "I-isso mesmo! Não precisamos nos apressar! A-além disso, temos escoltas por perto."
10032040-123 = "…Então, devemos tomar a iniciativa? Ou esperar para ver se alguém mais faz um movimento? #nNão, se alguém levar o alvo antes de nós..."
10032040-124 = "Uoooooooh!! Prepare-se! Don Arancino!!"
10032040-128 = "[ns7] \"...Que ímpeto impressionante.\"\n[ns8] \"...Alguém está atacando.\""
10032040-131 = "Por que!?!?"
10032040-132 = "Eles são idiotas!? Com tantos guardas por perto!?!?"
10032040-138 = "Bem, mas com aquele número, parece difícil enfrentar todos que estão na casa de ópera."
10032040-139 = "O que faremos, Presidente? Nós vamos também? Ou vamos observar?"
10032040-144 = "Ah... bem, vamos nos acalmar por enquanto. Primeiro, vamos observar..."
10032040-145 = "Ei, vocês, lixos aí! Não fiquem no caminho!"
10032040-146 = "Hã, lixos...?"
10032040-147 = "...Está falando da gente?"
10032040-148 = "...Ah."
10032040-149 = "Presidente, não reaja a isso..."
10032040-151 = "Chamando a Aru-sama de lixo? Como ousam, como ousam, como ousam dizer uma barbaridade dessas—!!!"
10032040-152 = "Não vou perdoar, não vou perdoar, não vou perdoar! Não vou perdoaaaaaaar!!!"
10032040-178 = "...Haa."
10032040-179 = "Ahahahaha!! A Haruka-chan é realmente interessante!!"
10032040-182 = "...Ah."
10032040-183 = "Ah, eh... ugh..."
10032040-184 = "[s9] \"...Aru?\"\n[s10] \"O que vamos fazer agora?\""
10032040-187 = "...Ah!"
10032040-188 = "Não tem o que fazer, já que chegamos a esse ponto... pessoal, não precisam se segurar!"
10032040-189 = "Vamos atrás deles! Pessoal, vamos capturar o chefe!"
