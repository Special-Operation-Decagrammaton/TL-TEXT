[translation]
10032040-1 = "第4話;想定外の事態"
10032040-21 = "全員下がれ！道を開けろ！"
10032040-22 = "ふうむ……思った以上に良いところだ、悪くない。"
10032040-23 = "席まで案内しろ、遅れて入場するなんて恥晒しは御免だからな。"
10032040-24 = "……本当に行かれるんですか？"
10032040-25 = "ボスを狙っているとの情報は、すでにいくつも入ってきています。"
10032040-26 = "おそらく、このオペラハウスでも……なのに、あえて劇をご覧になるだなんて……"
10032040-27 = "……黙ってろ。"
10032040-28 = "…………。"
10032040-29 = "愚かな奴め。そんなことに怯えていたら、奴らの思うツボだ。"
10032040-30 = "スケジュールは予定通り進めよ。#n我々を狙う脅威が居るのなら、正面から立ち向かってやろうじゃないか。"
10032040-31 = "なにせ、今日は「切り札」を用意してあるのだ。"
10032040-32 = "……切り札、ですか？"
10032040-33 = "……フッ。まあ、気にするな。お前は警戒を怠るな。"
10032040-34 = "分かったのなら、さっさと道を案内しろ。いつまで立たせておくつもりだ？"
10032040-35 = "……はいっ！では、こちらへ……"
10032040-44 = "……あんな大勢の人を従えてたら、逆に目立つんじゃない？"
10032040-45 = "いっそのこと、身を隠すよりも堂々と表に立つ方が賢明だと考えたんでしょうね。"
10032040-46 = "……実際、私たちとしては不都合だわ。#nなにせ、あの数の護衛をくぐり抜けてさらわなければいけないもの。"
10032040-47 = "他の連中が、なぜオペラハウスごと吹き飛ばそうとしてたのか理解できたわ。"
10032040-48 = "わ、私がやりましょうか？今からでも爆弾を……！"
10032040-49 = "[s1] \"お、落ち着いて、ハルカ……！\"\n[s2] \"そんなことしたら、全部水の泡だよ……！\""
10032040-55 = "急がなくて大丈夫。#n護衛の存在は想定内だし、機会はいくらでもあるから。"
10032040-56 = "むしろ気になるのは……「切り札」という言葉と、周囲の空気かな。"
10032040-57 = "たしかに……怪しいわね。"
10032040-61 = "……え？"
10032040-62 = "周囲の空気って……？"
10032040-63 = "……周りをよく見て、社長。"
10032040-70 = "うーん、なんか動揺してるような気が……"
10032040-71 = "そ、それは、いきなり大物が現れたんだから、緊張するのも……"
10032040-72 = "……違う。これは、そういう雰囲気じゃない。"
10032040-73 = "全員、視線は逸らしつつ、ボスの動きを注視している。#nそれにボスだけじゃなくて、フロア全体を……"
10032040-74 = "これって、もしかして……"
10032040-75 = "[s3] \"リストに載っていない「怪しい人」……？\"\n[s4] \"まだ残ってたんだね……\""
10032040-78 = "……？"
10032040-79 = "……えっ？"
10032040-80 = "ま、待って。おかしくないかしら？"
10032040-81 = "怪しい連中は全て処理したはず！#nリストの残りの人は、みんな一般人だったわよ！？"
10032040-82 = "一般人がボスを狙うだなんて……"
10032040-83 = "……！！"
10032040-87 = "最初から、全員「怪しい奴ら」だったってこと……？"
10032040-94 = "まぁ……"
10032040-95 = "……そうなるね。"
10032040-96 = "……残念だけど。"
10032040-100 = "なっ……"
10032040-101 = "何ですってーーー！？！？！？"
10032040-102 = "あははははっ！！"
10032040-103 = "一般の観客を守るために怪しい奴を探していたのに、実は全員怪しかったってこと？"
10032040-104 = "何それ、超ウケる～！！"
10032040-105 = "わ、笑ってる場合じゃないわよ！？"
10032040-106 = "だって、すごくない？こんなの全く予想できなかったもん。"
10032040-107 = "アルちゃんは？先生はどう思う？こんなの予想できた？"
10032040-108 = "[s5] \"たしかに、驚いたね。\"\n[s6] \"私も予想外だったよ。\""
10032040-111 = "こ、こんなのおかしいわよ！じゃあ、身元確認はどうしたっていうの！？招待状は！？#n何なのよ、全然話が違うじゃない！"
10032040-116 = "まあ、リストなんて簡単に偽造できるし。#nそもそも、名簿を疑わなかったのが甘かったね……"
10032040-117 = "アルちゃん～私たちだって誰かがリストを偽造してくれたおかげで、ここに入れたんだよ～？"
10032040-118 = "だから、どうしてそんな冷静なのよ！"
10032040-119 = "ううぅ……胃が痛いわ。"
10032040-120 = "落ち着きなさい、[ruby=りくはちま]陸八魔[/ruby]アル。#nこれからどうすればいい？考えるのよ。"
10032040-121 = "今すぐ何かが起こるとは思えない。#nきっと、まだみんな様子を伺っているはず……"
10032040-122 = "そ、そうよ！焦る必要は無いわ！ご、護衛だって居るんだもの。"
10032040-123 = "……じゃあ、あえて先手を打つ？それとも誰かが手出しするのを見守る？#nいや、それで先にターゲットの身柄を奪われたら……"
10032040-124 = "うおおおおぉっ！！覚悟しろ！ドン・アランチーノ！！"
10032040-128 = "[ns7] \"……すごい勢いだね。\"\n[ns8] \"……誰かが突撃してるけど。\""
10032040-131 = "どうして！？！？"
10032040-132 = "バカなの！？あんだけ護衛がたくさん居るのに！？！？"
10032040-138 = "まぁでも、あの数じゃオペラハウスに居る全員を相手にするのは難しそうだね。"
10032040-139 = "どうする、社長？私たちも行く？それとも様子を見ようか？"
10032040-144 = "あっ……えっと、とりあえず落ち着きましょう。まずは様子を……"
10032040-145 = "おい、そこのクズども！邪魔すんじゃない！"
10032040-146 = "えっ、クズ……？"
10032040-147 = "……私たちのこと？"
10032040-148 = "……あ。"
10032040-149 = "社長、それに反応しちゃ……"
10032040-151 = "アル様に向かってクズ？よくもよくもよくもそんな暴言を――！！！"
10032040-152 = "許さない許さない許さない許さない！許さなあああぁぁあああああい！！！"
10032040-178 = "……はぁ。"
10032040-179 = "あははははっ！！やっぱりハルカちゃん、面白い！！"
10032040-182 = "……あぁ。"
10032040-183 = "あっ、えぅ……うっ……"
10032040-184 = "[s9] \"……アル？\"\n[s10] \"これからどうする？\""
10032040-187 = "……はっ！"
10032040-188 = "どうするも何も、こうなった以上仕方ないわね……みんな、手加減しなくていいわ！"
10032040-189 = "追いましょう！みんな、ボスを捕まえるのよ！"
