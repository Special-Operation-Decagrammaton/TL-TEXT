[translation]
10001105-1 = "第10話;返り咲く革命のイワン・クパーラ"
10001105-2 = "レッドウィンター連邦学園・事務局"
10001105-3 = "来た、見た、勝ったぁ！"
10001105-4 = "トモエ、カムラッド！見たか？おいらの完璧な作戦で敵を粉砕するところを！"
10001105-5 = "はい。本当に完璧な指揮でした、チェリノ会長！"
10001105-6 = "それぞれ異なる所属の生徒たちを統一し、敵陣に向かって突き進むチェリノ会長……あのお姿はきっと生徒たちの心に深く刻み込まれ、レッドウィンター連邦学園の歴史の1ページとして永遠に語り継がれることでしょう。"
10001105-7 = "せっかくですし、後世の生徒たちもそのお姿が見られるように、画家を呼んで戦争画を描かせましょうか？"
10001105-8 = "ふむ。良い考えだな、トモエ秘書室長！すぐに進めるように！"
10001105-9 = "[s] \"あれって、適当に叫んでるわけじゃなかったんだ……？\""
10001105-10 = "何を言ってるんだ、カムラッド！#nあれは士気を高めるための、勇敢なる戦場の叫び！「ウォークライ」というやつだ！"
10001105-11 = "もしあの声が愚図る子供の泣き声のようにでも聞こえたというのなら、お前の耳に問題があるに違いない！手配してやるから、すぐに病院に行って耳の治療を受けてこい！"
10001105-12 = "ふう……とにかく、また事務局に戻れて良かった。"
10001105-13 = "棚はおやつでいっぱいだし、玉座はフカフカだし、家に帰ってきたみたいにホッとする……。やはり我が執務室は、こうでないと！"
10001105-14 = "こうなったら今日は、この玉座に座ってポテトチップスを食べて、もう一歩も動かないぞ！"
10001105-16 = "だがその前に……クーデターについて、言い訳でも聞こうか？マリナ委員長？"
10001105-19 = "ううっ……。"
10001105-21 = "マリナ、おいらが今までお前をどれだけ大切にし、信頼していたか……それなのに、よくもおいらの昼寝の時間を狙ってクーデターを起こしたな！"
10001105-22 = "許さないぞ！"
10001105-23 = "面目次第もございません、チェリノ会長……。"
10001105-24 = "うむ、うむ！"
10001105-25 = "それで、おいらに反旗を翻した本当の理由はなんだ？"
10001105-26 = "……やっぱりおいらがあの時、マリナのプリンをこっそり盗み食いしたことで、腹を立てたのか？"
10001105-27 = "それとも、マリナが大事にしている熊のぬいぐるみを、こっそり枕に使ったからか……？"
10001105-28 = "……プリン？熊のぬいぐるみ？何のことでしょうか……？"
10001105-29 = "お、思い出せないならそれでいいのだ！"
10001105-30 = "（あ、危ないところだった。危うくマリナが覚えてもいないことを、自分の口から白状するところだった！）"
10001105-31 = "……おっほん！"
10001105-32 = "それではプリンでも熊のぬいぐるみでもないなら、どんな理由でクーデターを起こしたのだ？"
10001105-33 = "あの、それは……実はチェリノ会長の石像を不注意で割ってしまって……。"
10001105-34 = "石像？何の石像だ？"
10001105-35 = "新館の廊下にある、会長の石像です。先月、新館の増築を記念して、チェリノ会長の謹厳なお姿を石像にしてあそこに設置しました。"
10001105-36 = "（そ、そんな石像あったか……？確かにあったような気も、する……？）"
10001105-37 = "しかし、不注意でその石像にぶつかって、お顔の髭の部分が割れてしまい……会長の権威をこの手で失墜させてしまいました。"
10001105-38 = "故意ではなかったとはいえ、きっと会長にはお許しいただけないだろうと思い、それで……。"
10001105-39 = "なんだ、そんな理由でクーデターを起こしたのか。"
10001105-40 = "え？そんな理由、とは……。"
10001105-41 = "マリナ、お前はレッドウィンター連邦学園における事務局の保安委員長であり、我が忠実な右腕として、今までたくさんの仕事をこなしてきた。"
10001105-42 = "いくらおいらが有能だとしても、お前がいなかったら今のこの座までは登れなかっただろう。お前を失うことに比べたら、石像の髭が割れるぐらい些細な問題だ。"
10001105-43 = "おいらは寛容だからな――そんな些細なことで粛清は下さないのだ。はははははっ！"
10001105-44 = "会長……！"
10001105-46 = "……とでも言うと思ったか！！"
10001105-48 = "えっ、うわっ！？"
10001105-49 = "お前のせいでおいらがここしばらく、どれだけ苦労をしたと思う？昼寝もできないし、おやつも食べられない！生徒たちにはチビと言われるわ無視されるわ！"
10001105-50 = "石像のことはどうでもいいが、クーデターを起こしたことについては許さない！"
10001105-51 = "チェ、チェリノ会長！どうかお許しを！"
10001105-52 = "ダメだ！絶対に許してたまるものか！"
10001105-53 = "トモエ、今すぐマリナと親衛隊の連中を連れていき、一か月間トイレ掃除の刑に処するように！"
10001105-57 = "さあ、それでは粛清のパレードを始めるとしよう！"
10001105-59 = "事件から一週間後、「イワン・クパーラ」当日"
10001105-61 = "レッドウィンター連邦学園・正門"
10001105-63 = "おかえりなさいませ、先生。"
10001105-64 = "チェリノ会長が中でお待ちです。"
10001105-65 = "こちらへ……。"
10001105-68 = "レッドウィンター連邦学園・会長執務室"
10001105-69 = "ふっふっふ。ようこそ、カムラッド。#n絶好のお祭り日和だな。"
10001105-70 = "[s] \"うん、良かったね。\""
10001105-71 = "レッドウィンター連邦学園のめでたいお祭りを、こうやってカムラッドと過ごせることは、私としても大変喜ばしい。"
10001105-72 = "本来レッドウィンター連邦学園の「イワン・クパーラ」には、外部の者は入れない原則だったのだが……。"
10001105-73 = "カムラッドには、この前の事件で多大な迷惑をかけたこともあるからな。生徒会長の権限で特別に招待したのだ。誇りに思うといい！ははは！"
10001105-74 = "ところで別件なのだが、カムラッド。#n一週間前と比べて、何か変わったようには見えないか？"
10001105-75 = "[s] \"何だか学園全体が綺麗になった気がするね。\""
10001105-76 = "ふむ、それはマリナと保安委員たちが毎日頑張って学校を掃除してるからだろう。"
10001105-77 = "最初はトイレ掃除だけを任せようと思っていたのだが、想像以上に素晴らしい掃除の才能を見せてな。"
10001105-78 = "このままだと清掃部部長の職位を奪われてしまわないか、怖いぐらいだ。"
10001105-79 = "……って、学校の見た目の話ではない！#nおいらに何か変わったことはないかと聞いてるのだ！"
10001105-80 = "[s] \"身長がちょっと伸びた気がする。\""
10001105-81 = "そ、そ、それは本当か！？カムラッド！"
10001105-82 = "メジャーを持ってこい！今すぐに身長を測ろう！"
10001105-86 = "……なんだ、ちっとも伸びていないじゃないか。#nおいらをからかってるのか、カムラッド！"
10001105-87 = "いくらシャーレの先生とはいえ、この偉大なチェリノ様をからかうなんて本来は許されないことなんだぞ！"
10001105-88 = "もちろん身長も重要だが……。"
10001105-89 = "おいらが最初に言おうとしたのは、主に内面の変化のことだ。"
10001105-90 = "この前の騒動の後、おいらは今まであまり気にかけてこなかった、レッドウィンター連邦学園の生徒たちの苦情に、耳を傾けるようになった。"
10001105-91 = "トモエ秘書室長の話によれば、生徒たちの苦情に耳を傾け、共感し、解決策を約束するおいらの姿は「まるで先生がお仕事されている時の姿のようだった」、とのことで……。"
10001105-92 = "先生の仕事とは、すなわち大人の仕事！凡百の生徒にはなかなかできない難しいことだ！"
10001105-93 = "つまり、おいらはあの騒動を通じて、今までにないくらい大人の階段を上ったということだな！"
10001105-94 = "どうだ、カムラッド。以前と違って、おいらの内面から湧き出るような、大人の魅力が感じられないか？ふふふ……！"
10001105-95 = "[s] \"ちなみに、他の生徒たちに言った約束は、全部守ったの？\""
10001105-96 = "ん、ん……？や、約束？"
10001105-97 = "それは、えっと……今すぐゲヘナ学園やトリニティ総合学園を攻撃するのは、やっぱり難しいし……。"
10001105-98 = "それに227号特別クラスのやつは、あの後またおいらのことをチビと呼んだのだ！#n不敬罪に当たるから、やっぱり今すぐに復帰は認められない！"
10001105-99 = "約束は保留！しばらくはこのまま現状維持だ！"
10001105-100 = "とにかく、カムラッド。今日は時間も十分にあるし、その、おいらと一緒に――"
10001105-103 = "チェリノ会長、大変です！"
10001105-104 = "……なんだ、トモエ秘書室長。#nカムラッドと二人っきりで話している時は邪魔をするなと言っただろう！"
10001105-105 = "それが、緊急事態でして……旧校舎の「227号特別クラス」の生徒たちが、前回の約束を守れと事務局に押し寄せてきています！"
10001105-106 = "その上、「知識解放戦線」と「工務部」の生徒たちも一緒になって……。"
10001105-107 = "なに？忍耐力の無いやつらめ！#n騒ぎが収まったばかりというのに、お祭りが終わる前からまた次のクーデターか！"
10001105-108 = "マリナ保安委員長と親衛隊を送れ、クーデターを鎮圧させろ！"
10001105-110 = "その、マリナ委員長は一晩中トイレ掃除をしていたせいでお疲れでして……戦える状態ではありません。"
10001105-111 = "親衛隊のメンバーもほとんど、前回の粛清で追い出されているか、謹慎中の身でして……。"
10001105-113 = "なんだ、となると……また逃げないといけないのか！？せっかくゆっくりできると思ったのに、今度はどこに逃げろと言うんだ！？"
10001105-114 = "もう失脚はこりごりだあぁぁぁーーーーー！"
10001105-115 = "革命のイワン・クパーラ"
