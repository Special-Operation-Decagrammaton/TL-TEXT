[translation]
10001105-1 = "Episódio 10: Ivan Kupala, a Revolução que Floresce Novamente"
10001105-2 = "Academia Red Winter - Secretaria"
10001105-3 = "Vim, vi e venci!"
10001105-4 = "Tomoe, camarada! Viu só? Viu como eu esmaguei os inimigos com meu plano perfeito?"
10001105-5 = "Sim. Foi uma liderança realmente perfeita, Presidente Cherino!"
10001105-6 = "Unir alunas de diferentes departamentos e avançar contra as linhas inimigas... Essa sua imagem certamente ficará gravada no coração das alunas e será contada para sempre como uma página na história da Academia Red Winter."
10001105-7 = "Já que estamos nisso, que tal chamarmos um pintor para registrar essa cena em um quadro de guerra, para que as futuras gerações também possam contemplar sua figura?"
10001105-8 = "Hum. Boa ideia, Chefe de Secretaria Tomoe! Prossiga com isso imediatamente!"
10001105-9 = "[s] \"Então aquilo não era só ela gritando aleatoriamente...?\""
10001105-10 = "O que está dizendo, camarada! Aquilo foi um grito de guerra corajoso para elevar o moral! É o que chamam de \"Grito de Guerra\"!"
10001105-11 = "Se aquele som soou como o choro de uma criança mimada para você, então deve haver algo errado com seus ouvidos! Vou providenciar uma consulta, vá ao hospital tratar seus ouvidos agora mesmo!"
10001105-12 = "Ufa... De qualquer forma, é bom estar de volta à secretaria."
10001105-13 = "As prateleiras estão cheias de lanches, o trono é fofinho... é um alívio, como se eu tivesse voltado para casa. Afinal, meu escritório tem que ser assim!"
10001105-14 = "Já que é assim, hoje vou sentar neste trono, comer batatas fritas e não vou me mover nem um centímetro!"
10001105-16 = "Mas antes disso... que tal me dar uma explicação sobre o golpe de estado? Presidente Marina?"
10001105-19 = "Ugh..."
10001105-21 = "Marina, você sabe o quanto eu te valorizava e confiava em você... e mesmo assim, você teve a audácia de planejar um golpe durante a minha hora da soneca!"
10001105-22 = "Eu não vou te perdoar!"
10001105-23 = "Não tenho como me desculpar, Presidente Cherino..."
10001105-24 = "Hum, hum!"
10001105-25 = "Então, qual foi o verdadeiro motivo para você se rebelar contra mim?"
10001105-26 = "...Será que foi porque eu roubei o seu pudim naquela época e você ficou brava?"
10001105-27 = "Ou será porque eu usei seu urso de pelúcia favorito como travesseiro escondida...?"
10001105-28 = "...Pudim? Urso de pelúcia? Do que está falando...?"
10001105-29 = "O-se você não lembra, então está tudo bem!"
10001105-30 = "(Ufa, essa foi por pouco. Quase confessei algo que a Marina nem lembrava!)"
10001105-31 = "...Ahem!"
10001105-32 = "Então, se não foi pelo pudim nem pelo urso, por qual motivo você deu esse golpe?"
10001105-33 = "Bem, é que... na verdade, eu quebrei a estátua da Presidente Cherino por descuido..."
10001105-34 = "Estátua? Que estátua?"
10001105-35 = "A estátua da Presidente no corredor do prédio novo. No mês passado, para comemorar a expansão do prédio, instalamos uma estátua com a sua figura imponente lá."
10001105-36 = "(E-eu tinha uma estátua dessas...? Na verdade, acho que lembro de algo assim...)"
10001105-37 = "Mas, por descuido, esbarrei na estátua e a parte do bigode quebrou... acabei manchando a autoridade da Presidente com minhas próprias mãos."
10001105-38 = "Mesmo não sendo intencional, achei que a Presidente não me perdoaria, então..."
10001105-39 = "Ora, então foi por esse motivo que você deu um golpe?"
10001105-40 = "Hã? \"Por esse motivo\", você diz..."
10001105-41 = "Marina, você é a Presidente do Comitê de Segurança da secretaria na Academia Red Winter e, como meu braço direito fiel, realizou muitos trabalhos até hoje."
10001105-42 = "Por mais capaz que eu seja, não teria chegado a este cargo sem você. Comparado a perder você, o bigode de uma estátua é um problema insignificante."
10001105-43 = "Eu sou magnânima, afinal — não vou aplicar uma purga por algo tão trivial. Hahahaha!"
10001105-44 = "Presidente...!"
10001105-46 = "...Ou foi o que você pensou que eu diria!!"
10001105-48 = "Hã, o quê!?"
10001105-49 = "Você tem ideia do quanto eu sofri por sua causa ultimamente? Não pude tirar minha soneca, nem comer meus lanches! As alunas me chamaram de baixinha e me ignoraram!"
10001105-50 = "Não me importo com a estátua, mas não vou perdoar o fato de você ter dado um golpe!"
10001105-51 = "P-Presidente Cherino! Por favor, me perdoe!"
10001105-52 = "Não! De jeito nenhum que eu vou perdoar!"
10001105-53 = "Tomoe, leve a Marina e o pessoal da guarda pessoal agora mesmo e condene-os a um mês limpando os banheiros!"
10001105-57 = "Muito bem, vamos começar o desfile da purga!"
10001105-59 = "Uma semana após o incidente, no dia do \"Ivan Kupala\""
10001105-61 = "Academia Red Winter - Portão Principal"
10001105-63 = "Bem-vindo de volta, Sensei."
10001105-64 = "A Presidente Cherino está esperando lá dentro."
10001105-65 = "Por aqui..."
10001105-68 = "Academia Red Winter - Gabinete da Presidente"
10001105-69 = "Hahaha. Seja bem-vindo, camarada. #nUm dia perfeito para um festival, não acha?"
10001105-70 = "[s] \"Sim, que bom.\""
10001105-71 = "Para mim, é uma grande alegria poder passar o auspicioso festival da Academia Red Winter com você, camarada."
10001105-72 = "Originalmente, o \"Ivan Kupala\" da Academia Red Winter não permitia a entrada de pessoas de fora, mas..."
10001105-73 = "Como causei muitos problemas a você no incidente anterior, convidei-o especialmente usando minha autoridade como presidente do conselho estudantil. Sinta-se honrado! Hahaha!"
10001105-74 = "Aliás, mudando de assunto, camarada. #nNão acha que algo mudou em comparação com uma semana atrás?"
10001105-75 = "[s] \"Sinto que a escola toda ficou mais limpa.\""
10001105-76 = "Hum, isso deve ser porque Marina e o Comitê de Segurança têm se esforçado para limpar a escola todos os dias."
10001105-77 = "No início, eu pretendia delegar apenas a limpeza dos banheiros, mas eles mostraram um talento incrível para a limpeza, além do que eu imaginava."
10001105-78 = "Estou até com medo de que eles acabem roubando o cargo do chefe do Departamento de Limpeza."
10001105-79 = "…Quer dizer, não estou falando da aparência da escola! #nEstou perguntando se algo mudou em mim!"
10001105-80 = "[s] \"Sinto que você cresceu um pouco.\""
10001105-81 = "I-i-isso é verdade!? Camarada!"
10001105-82 = "Tragam uma fita métrica! Vamos medir minha altura agora mesmo!"
10001105-86 = "…Ora, não cresci nada. #nVocê está zombando de mim, camarada?"
10001105-87 = "Mesmo sendo o Sensei do Schale, zombar desta grande Cherino é algo que não deveria ser permitido!"
10001105-88 = "Claro, a altura também é importante, mas..."
10001105-89 = "O que eu queria dizer primeiro era sobre as mudanças no meu interior."
10001105-90 = "Depois daquele tumulto, comecei a ouvir as reclamações das alunas da Academia Red Winter, algo a que eu não dava muita atenção antes."
10001105-91 = "Segundo a secretária Tomoe, minha postura de ouvir, ter empatia e prometer soluções para as reclamações das alunas \"parecia muito com a forma como o Sensei trabalha\", e então..."
10001105-92 = "O trabalho do Sensei é, em suma, o trabalho de um adulto! É algo difícil que alunas comuns dificilmente conseguem fazer!"
10001105-93 = "Ou seja, através daquele tumulto, eu subi um degrau na escada da maturidade como nunca antes!"
10001105-94 = "O que me diz, camarada? Diferente de antes, não consegue sentir o charme adulto que emana de mim? Fufufu...!"
10001105-95 = "[s] \"A propósito, você cumpriu todas as promessas que fez às outras alunas?\""
10001105-96 = "Hm, hm...? P-promessas?"
10001105-97 = "Isso é, bem... atacar a Academia Gehenna ou a Academia Trinity agora é realmente difícil..."
10001105-98 = "Além disso, aquele pessoal da Classe Especial 227 me chamou de baixinha de novo depois daquilo! #nComo é um crime de lesa-majestade, não posso permitir o retorno deles agora!"
10001105-99 = "Promessas suspensas! Por enquanto, vamos manter o status quo!"
10001105-100 = "De qualquer forma, camarada. Hoje temos tempo de sobra, então, que tal você... comigo—"
10001105-103 = "Presidente Cherino, é uma emergência!"
10001105-104 = "…O que foi, secretária Tomoe? #nEu não disse para não nos interromper quando estou conversando a sós com o camarada?"
10001105-105 = "É que é uma situação de emergência... As alunas da \"Classe Especial 227\" do antigo prédio escolar estão invadindo a secretaria exigindo que as promessas anteriores sejam cumpridas!"
10001105-106 = "Além disso, as alunas da \"Frente de Libertação do Conhecimento\" e do \"Departamento de Obras\" também se juntaram a elas..."
10001105-107 = "O quê? Pessoas sem paciência! #nMesmo depois de a confusão ter acabado, outro golpe de estado antes mesmo do festival terminar!"
10001105-108 = "Enviem a Comissária Marina e a Guarda de Elite, reprimam esse golpe de estado!"
10001105-110 = "Bem, a Comissária Marina está exausta por ter passado a noite inteira limpando banheiros... ela não está em condições de lutar."
10001105-111 = "A maioria dos membros da Guarda de Elite também foi expulsa no expurgo anterior ou está sob suspensão..."
10001105-113 = "O quê, então... terei que fugir de novo!? Pensei que finalmente poderia relaxar, para onde quer que eu fuja agora!?"
10001105-114 = "Eu não aguento mais ser deposta aaaaaaaah!"
10001105-115 = "O Ivan Kupala da Revolução"
