[translation]
2300802-1 = "Uma irmã exemplar"
2300802-2 = "Atrás da Catedral da Trindade"
2300802-3 = "（Segui as instruções da Mari e fui até a parte de trás da Catedral da Trindade）"
2300802-4 = "……Ah. É por aqui, Sensei."
2300802-9 = "Eu estava esperando por você."
2300802-10 = "Foi algo repentino, mas agradeço por ter vindo."
2300802-11 = "……Eh?"
2300802-12 = "Este horário? Não, não é que tenha algo em especial acontecendo……"
2300802-13 = "Desculpe, é que este foi o único horário em que eu estava livre……"
2300802-14 = "[s1] \"Entendo, desculpe por vir quando você está ocupada.\"\n[s2] \"Deveria ter vindo quando você tivesse mais tempo.\""
2300802-15 = "Ah, não, está tudo bem. Fico feliz que tenha vindo."
2300802-16 = "Ah, não, está tudo bem. Fico feliz que tenha vindo."
2300802-17 = "Além disso, eu estava apenas fazendo meu trabalho na catedral como sempre."
2300802-18 = "……O conteúdo do meu trabalho?"
2300802-19 = "Bem, vejamos,"
2300802-20 = "Claro que, como irmã, as coisas que devo fazer são variadas, mas……"
2300802-24 = "O que eu posso fazer principalmente é ouvir confissões e compartilhar a dor que as pessoas carregam em seus corações."
2300802-25 = "Não é nada grandioso, mas ainda assim, através desses momentos, há pessoas que conseguem encontrar forças para se reerguerem por conta própria."
2300802-26 = "……Uma conselheira?"
2300802-27 = "É, certamente, pode haver um lado disso também……"
2300802-28 = "Mas eu não sou capaz de dar conselhos tão importantes assim…… Tudo o que posso fazer é realmente apenas ouvir."
2300802-29 = "É só isso que consigo fazer, mas…… se ao me ouvir, a pessoa puder seguir em frente, mesmo que um pouco,"
2300802-30 = "eu fico sinceramente feliz com isso."
2300802-31 = "Sendo assim……"
2300802-37 = "Ehem. Sensei, se não se importar, poderia me contar quais preocupações você tem?"
2300802-38 = "……?"
2300802-39 = "Ah, então você não veio por causa de alguma preocupação específica……? Apenas para me cumprimentar……?"
2300802-40 = "Ah, peço perdão……"
2300802-41 = "Acabei me empolgando e entendendo errado…… Que vergonha……"
2300802-42 = "Eh, você percebe que eu me esforço sempre, então mesmo que eu tivesse preocupações, elas já teriam desaparecido……?"
2300802-46 = "……Fufu."
2300802-47 = "Obrigada, Sensei."
2300802-48 = "Fico muito feliz em ouvir palavras como essas."
2300802-49 = "[s3] \"Você está bem, Mari? Não está se esforçando demais?\"\n[s4] \"Descanse bem para não ficar sobrecarregada, Mari.\""
2300802-50 = "……Não."
2300802-51 = "……Não."
2300802-52 = "Fico feliz que diga isso, mas não posso me dar ao luxo de relaxar. Ainda tenho muito o que fazer e um longo caminho a percorrer."
2300802-53 = "Agora estou assim, dando o meu máximo……"
2300802-54 = "Mas um dia, quero me tornar uma \"irmã\" exemplar."
2300802-55 = "[s5] \"'Tornar-se' uma irmã?\"\n[s6] \"Você ainda não é uma irmã?\""
2300802-56 = "Hmm…… Como devo dizer……"
2300802-57 = "Hmm…… Como devo dizer……"
2300802-58 = "Por exemplo, só porque visto as roupas de irmã, não significa que qualquer um se torne uma irmã imediatamente…… É algo assim, sabe?"
2300802-59 = "Ainda há muito o que aprender e muito o que conhecer……"
2300802-60 = "Além disso, até hoje fico um pouco envergonhada quando me chamam de \"irmã\"."
2300802-61 = "Um dia, quando alguém me chamar de \"Irmã Mari\", quero poder responder sem sentir vergonha…… Esse é o meu sonho atual."
2300802-62 = "Por isso, agora preciso fazer tudo o que posso, uma coisa de cada vez, com todo o meu esforço."
2300802-63 = "……?"
2300802-64 = "Muito exemplar…… você diz?"
2300802-65 = "Que minha determinação já é a de uma irmã……?"
2300802-66 = "N-não zombe de mim...! E-eu sei melhor do que ninguém que ainda sou inexperiente...!"
2300802-67 = "É-é claro que fico feliz, mas... vou fingir que não ouvi isso. Puxa, Sensei..."
2300802-68 = "[s7] \"Mas eu realmente penso assim.\"\n[s8] \"Irmã Mari! Irmã Mari!\""
2300802-69 = "Ah, chega...!"
2300802-70 = "Ah, chega...!"
2300802-71 = "[s] \"Irmã Mari!!\""
2300802-72 = "P-pare com iss—"
2300802-78 = "……!?"
2300802-84 = "S-Sensei!?"
2300802-89 = "V-você está bem!? Sensei!?"
2300802-91 = "(Felizmente, não houve ferimentos graves; após algum tempo, ele recuperou a consciência e retornou ao Schale em segurança.)"
