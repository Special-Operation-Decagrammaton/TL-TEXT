[translation]
2300802-1 = "立派なシスター"
2300802-2 = "トリニティ大聖堂の裏側"
2300802-3 = "（マリーに案内してもらった通り、トリニティ大聖堂の裏手へと向かった）"
2300802-4 = "……あ。こちらです、先生。"
2300802-9 = "お待ちしておりました。"
2300802-10 = "突然のことでしたが、来ていただいてありがとうございます。"
2300802-11 = "……え？"
2300802-12 = "この時間帯、ですか？いえ、特に何かがあるわけではないのですが……。"
2300802-13 = "すみません、私が空いていたのがこの時間しかなく……。"
2300802-14 = "[s1] \"そっか、忙しいところに来ちゃってごめんね。\"\n[s2] \"もっと時間のある時に来れば良かったね。\""
2300802-15 = "ああいえ、そんな、大丈夫です。お越しいただけて嬉しいですから。"
2300802-16 = "ああいえ、そんな、大丈夫です。お越しいただけて嬉しいですから。"
2300802-17 = "それに、いつも通り大聖堂でのお仕事をしていただけですし。"
2300802-18 = "……お仕事の内容、ですか？"
2300802-19 = "そうですね、"
2300802-20 = "もちろんシスターとしてやるべきことは多岐にわたるのですが……。"
2300802-24 = "主に私にできることと言えば、懺悔などお話をお聞きし、心の中の痛みを共有させていただくことくらいです。"
2300802-25 = "大したことはできないのですが、それでもそういった時間を通じて、何とかご自分で立ち直ることができるという方もいらっしゃいまして。"
2300802-26 = "……アドバイザー、ですか？"
2300802-27 = "た、確かに、そういった面も一部あるかもしれませんね……。"
2300802-28 = "ですが、私にはそんな、アドバイスなんて大それたことはできなくって……私にできることは、本当にただお聞きすることだけです。"
2300802-29 = "私にはそれくらいしかできませんが……お話を聞くことで、その方が少しでも前に進めるのであれば。"
2300802-30 = "私はそれを、心から嬉しく思うのです。"
2300802-31 = "というわけで……"
2300802-37 = "こほん。先生はどんなお悩みをお持ちなのか、よろしければお聞かせいただけますか？"
2300802-38 = "……？"
2300802-39 = "あ、本日は特にお悩みがあって、というわけではないのですが……？ただ、ご挨拶を……？"
2300802-40 = "そ、それは失礼しました……。"
2300802-41 = "何だか調子に乗って勘違いしてしまいましたね……？お恥ずかしい限りです……。"
2300802-42 = "え、普段から頑張ってるのがよく伝わってきて、もし悩みがあったとしてもすでに無くなってそう……？"
2300802-46 = "……ふふっ。"
2300802-47 = "ありがとうございます、先生。"
2300802-48 = "そのようなお言葉を頂けて、何だかとっても嬉しくなりました。"
2300802-49 = "[s3] \"マリー自身は大丈夫？無理してない？\"\n[s4] \"マリーも辛くならないように、しっかり休んでね。\""
2300802-50 = "……いえ。"
2300802-51 = "……いえ。"
2300802-52 = "そう言っていただけるのは嬉しいのですが、甘えるわけにはいきません。私にはまだまだやるべきことが多く、往くべき場所も遠いので。"
2300802-53 = "今はこうして、いっぱいいっぱいの私ですが……。"
2300802-54 = "いつかは立派な「シスター」になりたいのです。"
2300802-55 = "[s5] \"シスターに「なる」？\"\n[s6] \"今はまだシスターではないの？\""
2300802-56 = "うーん……何と言えば良いのでしょう……。"
2300802-57 = "うーん……何と言えば良いのでしょう……。"
2300802-58 = "例えばシスターの服を着たからと言って、それだけで誰もがすぐにシスターになれるわけではない……そういった感じでしょうか？"
2300802-59 = "まだまだ学ばねばならないことも、知らなければならないことも多いですし……。"
2300802-60 = "それに私は、今でも「シスター」と呼ばれることに少々照れてしまいます。"
2300802-61 = "いつか誰かが「シスターマリー」と呼んでくださっても、その時恥ずかしがることなく応えられるように……それが今の、私の夢なんです。"
2300802-62 = "ですから今はまずこうして、できることを一つ一つ全力でやらないと。"
2300802-63 = "……？"
2300802-64 = "すごく立派……ですか？"
2300802-65 = "心意気はすでに、シスターそのもの……？"
2300802-66 = "か、からかわないでください……！わ、私がまだまだ未熟者なのは、私自身が誰よりも分かっております……！"
2300802-67 = "も、もちろん嬉しくはありますが……今のは聞かなかったことにします。もう、先生ったら……。"
2300802-68 = "[s7] \"でも、本当にそう思うよ。\"\n[s8] \"シスターマリー！シスターマリー！\""
2300802-69 = "も、もう……！"
2300802-70 = "も、もう……！"
2300802-71 = "[s] \"シスターマリー！！\""
2300802-72 = "や、やめてくださ――"
2300802-78 = "……！？"
2300802-84 = "せ、先生！？"
2300802-89 = "だ、大丈夫ですか！？先生！？"
2300802-91 = "（幸いにも大きな怪我にはならず、少し経ってから意識を取り戻し、無事シャーレへと戻った）"
