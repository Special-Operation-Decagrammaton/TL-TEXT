[translation]
32150-1 = "Episódio 15;A Batalha Tem Início"
32150-6 = "……Equipe IV, na posição."
32150-7 = "Nada de anormal; a vigilância também é conforme o previsto."
32150-11 = "Equipe V, Equipe VI, Equipe VIII, todas reportam prontas."
32150-12 = "A posição do alvo já foi confirmada. Iniciamos a operação conforme o plano."
32150-13 = "Todos, avançar."
32150-20 = "……Ufa."
32150-24 = "……De chá eu já não quero mais, obrigada."
32150-29 = "……?"
32150-30 = "……Coitada, não consegue dormir, né."
32150-31 = "Gh!?"
32150-37 = "É natural, né; com o Comitê de Realização da Justiça quase todo ausente…… dá insegurança mesmo, não é, Nagisa?"
32150-38 = "H-Hanako Urawa……!? Por que você está aqui……!?"
32150-39 = "Isso é no sentido de \"como você descobriu esta casa segura\"? Ora, é claro, porque eu sei de tudo. As 87 casas seguras, ao todo, e até o rodízio delas…… ufu♡"
32150-40 = "……!?"
32150-41 = "Até o uso fora do padrão eu conheço mais ou menos. Por exemplo…… como agora, quando você está sinceramente insegura, se esconder no sótão secreto daqui♡"
32150-42 = "Q-quê……!"
32150-46 = "Não se mexa."
32150-47 = "……!"
32150-48 = "Ah, claro, todo o pessoal da escolta, até aqui, a gente já cuidou. É justamente por isso que a gente veio assim, de cara limpa."
32150-49 = "Azusa Shirasu, Hanako Urawa…… não me diga……!"
32150-50 = "O \"traidor\" não é um só, são dois……!?"
32150-51 = "……Ufu, que raciocínio simples♡ Tanto eu quanto a Azusa não passamos de peças. Quem comanda é outra pessoa."
32150-52 = "……!!"
32150-53 = "E quem é……!"
32150-54 = "Antes dessa história, Nagisa…… era preciso ir a esse ponto?"
32150-55 = "……."
32150-56 = "É sobre o Clube de Aulas de Reforço. A sua aflição, Nagisa, eu entendo bem. Mas, mobilizando até a \"Schale\", não era preciso ir a esse ponto, era?"
32150-57 = "Isso é……."
32150-58 = "Eu e a Azusa, que já éramos suspeitas desde o começo, tudo bem. Mas…… com a Hifumi e a Koharu, você não acha que foi demais?"
32150-59 = "……."
32150-60 = "Principalmente a Hifumi…… você era próxima da Hifumi, não era, Nagisa?"
32150-61 = "Por que você fez uma coisa dessas? Você não pensou o quanto a Hifumi ia se magoar?"
32150-62 = "……."
32150-63 = "……Pois é. Talvez eu tenha feito uma coisa ruim com a Hifumi……."
32150-64 = "Mas não me arrependo. Tudo pela grande causa. De fato, ao menos a minha relação com ela, eu gostaria de ter conseguido preservar, mas…… eu……."
32150-65 = "……Ufu♡"
32150-66 = "Então, reforçando, vou transmitir a você, Nagisa, uma mensagem do nosso comandante."
32150-68 = "\"Ahaha…… é que, até que foi bem divertido. A brincadeira de amiguinha com a senhorita Nagisa\"…… é o que ela diz♡"
32150-69 = "……!? N-não me diga, então, quer dizer……!?"
32150-74 = "Alvo assegurado."
32150-75 = "Acertei um carregador inteiro de 5.56mm a curta distância, então ela deve ficar desmaiada assim por umas 1 hora."
32150-76 = "Ufu♡ Então, Azusa, daqui pra frente, será que dá pra você cuidar de atrair o inimigo?"
32150-77 = "Entendido. Com isto, uma informação falsa deve chegar ao \"verdadeiro traidor de Trinity\", que ainda está em algum lugar……?"
32150-78 = "Se a sua hipótese, Hanako, estiver certa, de fato a Arius também vai, com certeza, apressar o ataque."
32150-79 = "Sim. Se a minha suposição estiver certa, ainda há algumas coisas que a gente não sabe, mas……."
32150-80 = "Ainda não há prova concreta…… mas, sobre o \"verdadeiro traidor\", pessoalmente eu já tenho quase certeza."
32150-81 = "……Aliás, aquela última fala de agora, era necessária?"
32150-82 = "Ah, aquilo foi, pela dedicação da Hifumi, uma vingançazinha por conta própria, digamos…… achei que ela merecia ao menos um pouquinho de choque."
32150-83 = "Bom, quando tudo terminar, o mal-entendido logo se desfaz."
32150-84 = "……."
32150-85 = "Aliás, Azusa, você sabe qual é o efetivo da Arius? Sendo mais exata, eu queria saber por quanto tempo dá pra segurar sozinha."
32150-86 = "Os detalhes eu não sei. Mas eu venho me preparando faz um bom tempo, então, seja qual for o adversário, dá pra ganhar bastante tempo."
32150-87 = "Foi pra isso que, toda noite, eu montei armadilhas e trincheiras nos arredores da academia. Vou atraí-los pra lá e ganhar tempo com guerrilha."
32150-88 = "Então, por ora, ficamos por aqui. Depois, a gente se encontra no ponto de reunião."
32150-89 = "Sim, até já!"
32150-95 = "Casa segura localizada! O alvo não está à vista!"
32150-96 = "……Alguém chegou antes. Então AQUELA INFORMAÇÃO era verdadeira mesmo."
32150-97 = "Revistem os arredores! O mais silenciosamente possível!"
32150-98 = "Cadê a \"espiã\" que deveria se juntar a nós?! Achem ela logo!"
32150-99 = "Aqui é a Equipe IV, sob emboscada!"
32150-100 = "O quê!?"
32150-103 = "É a \"espiã\"! A \"espiã\" traiu!"
32150-104 = "(Sssh, sssh……)"
32150-106 = "Uwaaah!?"
32150-107 = "A \"espiã\" traiu!? O-o que tá acontecendo!!"
32150-112 = "Traição, nada mais, nada menos que isso."
32150-113 = "!?"
32150-114 = "O alvo, eu peguei primeiro."
32150-115 = "P-por quê! Por que você faria uma coisa dessas……!"
32150-116 = "Porque eu tenho que terminar logo e ir fazer a prova."
32150-117 = "……Hã?"
32150-118 = "Aliás, o relato já chegou ao Comitê de Realização da Justiça; se é pra fugir, é agora."
32150-119 = "(bip)"
32150-120 = "……."
32150-121 = "……Vamos recuar?"
32150-122 = "Não, é blefe. Se a INFORMAÇÃO estiver certa, o Comitê de Realização da Justiça, com certeza, não vai se mexer."
32150-123 = "Não precisa se preocupar, avancem!"
32150-124 = "Entendido!"
