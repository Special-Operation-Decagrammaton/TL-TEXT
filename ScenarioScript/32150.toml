[translation]
32150-1 = "Episódio 15; Faísca"
32150-6 = "...Equipe IV, no local."
32150-7 = "Sem nenhuma movimentação estranha. Segurança exatamente como o previsto."
32150-11 = "Equipes V, VI e VIII prontas e aguardando."
32150-12 = "Posição do alvo confirmada. Iniciar a operação conforme o plano."
32150-13 = "Todas as unidades, avançar."
32150-20 = "...Haa."
32150-24 = "...Acho que já tomei chá o suficiente por hoje."
32150-29 = "...?"
32150-30 = "...Coitadinha, não consegue dormir, não é?"
32150-31 = "!?"
32150-37 = "Também, faz sentido. Com quase ninguém do Comitê de Realização da Justiça por perto... qualquer um ficaria inseguro, não é mesmo, Nagisa-san?"
32150-38 = "U-Urawa Hanako-san...!? Como você veio parar aqui...!?"
32150-39 = "Se a pergunta é 'como descobriu esse esconderijo?', a resposta é simples: eu sei de tudo que acontece por aqui. Os 87 esconderijos e o padrão de rotação entre eles... fufu♡"
32150-40 = "...!?"
32150-41 = "E eu também entendo o padrão das suas fugas de rotina. Por exemplo... eu sabia que se você sentisse medo de verdade, acabaria fugindo para o sótão secreto deste lugarzinho aqui♡"
32150-42 = "O que...!"
32150-46 = "Não se mova."
32150-47 = "...!"
32150-48 = "Ah, claro, não precisa se preocupar. Eu já cuidei de todos os guardas no caminho para cá. Por isso consegui entrar pela porta da frente sem problemas."
32150-49 = "Shirasu Azusa-san e Urawa Hanako-san... não acredito...!"
32150-50 = "Então não havia apenas um 'traidor', mas dois...!?"
32150-51 = "...Fufu, que lógica simples a sua, não?♡ Tanto eu quanto a Azusa-chan não passamos de peões. O nosso líder é outra pessoa."
32150-52 = "...!!"
32150-53 = "E quem seria... essa pessoa!?"
32150-54 = "Mas antes disso, Nagisa-san... havia mesmo necessidade de ir tão longe?"
32150-55 = "......"
32150-56 = "Falo sobre o Clube de Reposição. Eu entendo toda essa sua preocupação constante. Mas usar até o 'Sensei da Schale' desse jeito, não acha que cruzou uma linha que não devia?"
32150-57 = "Isso é..."
32150-58 = "Tudo bem se o alvo fosse eu ou a Azusa-chan, já que sempre fomos suspeitas desde o início. Mas... você não acha que foi cruel demais com a Hifumi-chan e a Koharu-chan?"
32150-59 = "......"
32150-60 = "Especialmente com a Hifumi-chan... vocês eram tão próximas."
32150-61 = "Por que foi fazer uma coisa dessas? Você nunca parou para pensar no quanto a Hifumi-chan poderia se machucar com isso tudo?"
32150-62 = "......"
32150-63 = "...Tem razão. Eu confesso que me sinto mal pelo que fiz com a Hifumi-san..."
32150-64 = "Mas não me arrependo de nada. Foi tudo por um bem maior. É verdade que eu queria, ao menos, proteger a nossa relação... mas eu..."
32150-65 = "...Fufu♡"
32150-66 = "Sendo assim, deixe-me entregar a mensagem do nosso líder para a Nagisa-san agora."
32150-68 = "'Ahaha... sabe, até que foi meio divertido brincar de amizade com você, Nagisa-sama'... Fim da mensagem♡"
32150-69 = "...!? N-Não me diga que... você quer dizer...!?"
32150-74 = "Alvo imobilizado."
32150-75 = "Ela levou um pente inteiro de balas 5.56mm à queima-roupa. Deve ficar desmaiada por uma hora, no mínimo."
32150-76 = "Fufu♡ Então, Azusa-chan, posso deixar a distração dos inimigos nas suas mãos a partir de agora?"
32150-77 = "Entendido. Acha que com isso, a gente vai conseguir espalhar as informações falsas pro 'verdadeiro traidor da Trinity' que ainda deve estar escondido por aí...?"
32150-78 = "Se a sua hipótese estiver correta, Hanako, Arius com certeza vai tentar apressar o ataque agora."
32150-79 = "Sim. Apesar de que ainda têm algumas lacunas se as minhas suposições estiverem certas..."
32150-80 = "Mas mesmo sem provas concretas... eu pessoalmente tenho quase 100% de certeza sobre quem é o 'verdadeiro traidor'."
32150-81 = "...Aliás, aquela última frase, precisava mesmo daquilo?"
32150-82 = "Ah, aquilo foi apenas uma pequena vingancinha em nome de todo o esforço que a Hifumi-chan fez... Pensei que seria bom dar um pequeno choque nela."
32150-83 = "De qualquer forma, quando isso tudo acabar, o mal-entendido será resolvido."
32150-84 = "......"
32150-85 = "Mudando de assunto, Azusa-chan, você faz alguma ideia do tamanho do batalhão de Arius que está vindo? Ou, de maneira mais simples, quanto tempo você consegue segurá-las sozinha?"
32150-86 = "Não sei exatamente quantos são. Mas eu passei muito tempo me preparando pra isso, então não importa quantos sejam, eu posso atrasar o avanço deles por um bom tempo."
32150-87 = "Trabalhei quase todas as noites pra montar armadilhas, explosivos e trincheiras em volta da escola. A ideia é atrair todo mundo pra lá e usar as táticas de guerrilha."
32150-88 = "Então a gente se separa aqui. Nos encontramos no ponto de encontro mais tarde."
32150-89 = "Isso mesmo, até mais!"
32150-95 = "Esconderijo encontrado! O alvo não está aqui!"
32150-96 = "...Parece que já tivemos visitas por aqui. Aquela [ruby=informação]informação[/ruby] era verdade, afinal."
32150-97 = "Revistem a área! O mais silenciosamente possível!"
32150-98 = "Cadê a 'espiã' que a gente tinha que encontrar!? Procurem por ela!"
32150-99 = "Aqui é a Equipe IV, estamos sob ataque surpresa!"
32150-100 = "O quê!?"
32150-103 = "É a 'espiã'! A 'espiã' traiu a gente!"
32150-104 = "(Sssss, Sssss...)"
32150-106 = "Uwaaaaaaah!?"
32150-107 = "A 'espiã' é uma traidora!? O-O que diabos tá acontecendo aqui!!"
32150-112 = "Uma traição, nem mais nem menos que isso."
32150-113 = "!?"
32150-114 = "O alvo já está nas minhas mãos."
32150-115 = "P-Por quê! Por que você faria isso...!"
32150-116 = "Porque eu tenho que terminar com isso rápido, eu tenho um exame pra fazer."
32150-117 = "...Hã?"
32150-118 = "Aliás, o Comitê de Realização da Justiça já foi avisado sobre vocês. É melhor darem o fora enquanto ainda podem."
32150-119 = "(Bip)"
32150-120 = "......"
32150-121 = "...Vamos recuar?"
32150-122 = "Não, é um blefe. Se a nossa [ruby=informação]informação[/ruby] estiver certa, o Comitê não vai mexer um dedo."
32150-123 = "Não liguem para ela, ataquem!"
32150-124 = "Entendido!"
32150-126 = "Próximo Episódio; Batalha Feroz"