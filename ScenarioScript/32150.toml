[translation]
32150-1 = "Episódio 15; O gatilho foi puxado"
32150-6 = "……Equipe IV, chegada."
32150-7 = "Nada de incomum, a vigilância está como esperado."
32150-11 = "Equipes V, VI e VIII, todas relatam estar prontas."
32150-12 = "Localização do alvo confirmada. Iniciaremos a operação conforme planejado."
32150-13 = "Todos, avancem."
32150-20 = "……Ufa."
32150-24 = "……Eu dispenso o chá, obrigada."
32150-29 = "……?"
32150-30 = "……Coitada, você não consegue dormir, não é?"
32150-31 = "¡?"
32150-37 = "Faz sentido, afinal, o Comitê de Justiça quase não está por perto... Isso a deixa ansiosa, não é, Nagisa-san?"
32150-38 = "U-Urawa Hanako-san...!? Por que você está aqui...!?"
32150-39 = "Isso é uma pergunta sobre como eu descobri este esconderijo? Ora, é claro que é porque eu sei de tudo. Todos os 87 esconderijos, e até mesmo o cronograma de rotação deles... Fufu♡"
32150-40 = "……!?"
32150-41 = "Eu também sei sobre as operações irregulares. Por exemplo... quando você está genuinamente ansiosa como agora, você se esconde neste sótão secreto, não é?♡"
32150-42 = "O que...!"
32150-46 = "Não se mova."
32150-47 = "……!"
32150-48 = "Ah, claro, cuidamos de todos os guardas no caminho até aqui. É por isso que viemos tão abertamente."
32150-49 = "Shirasu Azusa-san, Urawa Hanako-san... não pode ser...!"
32150-50 = "Os 'traidores' não são um, mas dois...!?"
32150-51 = "……Fufu, que linha de raciocínio simples♡ Nem eu nem a Azusa-chan passamos de meras peças. O comandante é outra pessoa."
32150-52 = "……!!"
32150-53 = "Quem é essa pessoa...!"
32150-54 = "Antes de falarmos disso, Nagisa-san... havia necessidade de ir tão longe?"
32150-55 = "……."
32150-56 = "Sobre o Clube de Estudos Suplementares. Eu entendo o seu estresse, Nagisa-san. Mas mobilizar até o 'Schale'... não havia necessidade de chegar a esse ponto, não é?"
32150-57 = "Isso é..."
32150-58 = "Eu e a Azusa-chan, que éramos suspeitas desde o início, tudo bem. Mas... você não acha que foi longe demais com a Hifumi-chan e a Koharu-chan?"
32150-59 = "……."
32150-60 = "Especialmente a Hifumi-chan... vocês eram tão próximas, não eram?"
32150-61 = "Por que você fez algo assim? Você não pensou em quanto a Hifumi-chan ficaria magoada?"
32150-62 = "……."
32150-63 = "……Sim, é verdade. Talvez eu tenha sido injusta com a Hifumi-san……."
32150-64 = "Mas não me arrependo. Tudo é pela causa maior. Eu realmente esperava que, pelo menos, a relação entre nós pudesse ser preservada, mas eu……."
32150-65 = "……Fufu♡"
32150-66 = "Bem, então, transmitirei a mensagem do nosso comandante para você, Nagisa-san."
32150-68 = "'Ahaha... bem, foi divertido até certo ponto. A brincadeira de amiguinha com a Nagisa-sama'... foi o que disseram♡"
32150-69 = "……¡? N-não pode ser, isso significa que...!?"
32150-74 = "Alvo neutralizado."
32150-75 = "Disparei um pente inteiro de 5.56mm à queima-roupa, então ela deve ficar inconsciente por pelo menos uma hora."
32150-76 = "Fufu♡ Então, Azusa-chan, pode cuidar de atrair o inimigo a partir daqui?"
32150-77 = "Entendido. Com isso, a informação falsa deve chegar ao 'verdadeiro traidor de Trinity' que ainda está por aí...?"
32150-78 = "Se a hipótese da Hanako estiver correta, Arius certamente apressará o ataque."
32150-79 = "Sim. Se minha dedução estiver certa, embora ainda existam algumas coisas que não sabemos..."
32150-80 = "Ainda não temos provas concretas, mas... pessoalmente, tenho quase certeza sobre quem é o 'verdadeiro traidor'."
32150-81 = "……A propósito, aquela última frase de agora há pouco era necessária?"
32150-82 = "Ah, aquilo foi uma pequena vingança pelo esforço da Hifumi-chan... pensei que seria bom ela levar um susto."
32150-83 = "Bem, quando tudo terminar, o mal-entendido será resolvido rapidamente."
32150-84 = "……。"
32150-85 = "A propósito, Azusa-chan, você sabe qual é o tamanho das forças de Arius? Para ser mais exata, eu gostaria de saber quanto tempo você conseguiria aguentar sozinha."
32150-86 = "Não sei os detalhes. Mas como venho me preparando há muito tempo, devo conseguir ganhar bastante tempo, não importa o tamanho do oponente."
32150-87 = "Por causa disso, tenho montado armadilhas e trincheiras ao redor da escola todas as noites. Vou atraí-los para lá e ganhar tempo com táticas de guerrilha."
32150-88 = "Certo, então vamos nos separar por aqui. Nos vemos mais tarde no ponto de encontro."
32150-89 = "Sim, até logo!"
32150-95 = "Encontramos o esconderijo! O alvo não está aqui!"
32150-96 = "……Chegamos tarde. Então aquela informação era verdadeira."
32150-97 = "Revistem a área! O mais silenciosamente possível!"
32150-98 = "Onde está o 'espião' com quem deveríamos nos encontrar?! Encontrem-no logo!"
32150-99 = "Aqui é a Equipe IV, fomos emboscados!"
32150-100 = "O quê!?"
32150-103 = "É o 'espião'! O 'espião' nos traiu!"
32150-104 = "（Shhh, shhh……）"
32150-106 = "Aaaahhh!?"
32150-107 = "O 'espião' nos traiu!? O-o que está acontecendo!!"
32150-112 = "Traição, nada mais, nada menos."
32150-113 = "！?"
32150-114 = "Eu peguei o alvo primeiro."
32150-115 = "P-por que! Por que você faria algo assim……!"
32150-116 = "Porque preciso terminar isso logo para fazer o meu exame."
32150-117 = "……Eh?"
32150-118 = "Aliás, o relatório já foi enviado para o Comitê de Justiça, é melhor fugirem enquanto podem."
32150-119 = "（Bip）"
32150-120 = "……。"
32150-121 = "……Vamos recuar?"
32150-122 = "Não, é um blefe. Se a informação estiver correta, o Comitê de Justiça não vai se mover de jeito nenhum."
32150-123 = "Não se preocupem com isso, avancem!"
32150-124 = "Entendido!"
32150-126 = "Próximo episódio: Batalha Intensa"
