[translation]
13080-1 = "第8話;アビドス生徒会（１）"
13080-5 = "[ns1] 集めた資料を整理する。\n[ns2] \"……これで準備は完了かな。\""
13080-11 = "待機中。#n先生、必要なものはありませんか？"
13080-12 = "[s] \"ありがとう、プラナ。アロナは？\""
13080-13 = "アロナ先輩なら、寝ています。寝坊助です。#n何か仕事があれば、私に命令をしてください。"
13080-14 = "[s3] \"それじゃあ……。\"\n[s4] プラナにいくつか頼み事をする。"
13080-19 = "理解。#nすぐに処理します。"
13080-20 = "それより、先生は少しでも寝るべきです。#n徹夜は健康に良くありません。"
13080-21 = "[s] \"でも、そろそろ出発しないといけないんだ。\""
13080-22 = "分かりました。#nでは、また何かあったら連絡をします。"
13080-28 = "異常発生。"
13080-33 = "[ns] \"プラナ、どうしたの？\""
13080-46 = "……。"
13080-47 = "なぜだ？"
13080-48 = "小生の計算が間違っていたのか……？"
13080-51 = "[ns] \"な、何が起きたの！？\""
13080-53 = "[ns] \"この衝撃は！？\" "
13080-56 = "先生、先生！"
13080-57 = "[s] \"アロナ、状況を教えてくれる？\""
13080-60 = "シャーレが爆発しました！"
13080-61 = "ですが、それよりもプラナちゃんが……！"
13080-67 = "先生の保護は、"
13080-68 = "間に合いました……。"
13080-73 = "ぷ、プラナちゃん！？"
13080-75 = "先生が傷付く姿は、もう二度と……。"
13080-76 = "[s] \"プラナ、大丈夫！？\""
13080-77 = "気を失っているだけみたいです！"
13080-88 = "[ns] \"……！\""
13080-96 = "[ns] （意識が……） "
13080-103 = "……なるほど。 "
13080-104 = "私の計算以上ですね。"
13080-105 = "あの不可解な奇跡を起こす[ruby=ARK]聖櫃[/ruby]は、#nジェリコの城壁でさえ崩した兵器だというのに、過小評価していました。"
13080-106 = "……ですが、構いません。#n攻略法を修正すれば良いだけのこと。"
13080-110 = "攻略法、その2……「肉体には物理的限界がある」。#nこの前提条件は、崩れていないのですから。"
13080-111 = "最も重要な物語は、先生が関与できない場所で進行されています。#n目を覚ました頃には、すでに手遅れ。"
13080-113 = "では、ゲームを続けましょう。"
13080-121 = "……先生に連絡がつきません。"
13080-125 = "うーん。"
13080-126 = "何かあったのでしょうか？"
13080-127 = "寝てるんじゃないの？"
13080-129 = "今日に限って、それはないと思うけど……。"
13080-130 = "ホシノ先輩は？"
13080-134 = "それが、先輩も音沙汰がありません。"
13080-136 = "まったく、何してるのよ。"
13080-137 = "……。"
13080-141 = "……もう朝か。 "
13080-142 = "そろそろ戻らないと。#n先生もシロコちゃんも……みんな、待ってるはずだし。"
13080-143 = "最近のシロコちゃんは、どんどん強くなってきて大変だよ。#nあっという間に、勝てなくなっちゃうのかな。"
13080-144 = "はぁ、おじさんも歳には勝てないねぇ。"
13080-149 = "ここは変わらないなぁ。"
13080-150 = "まあ、もう捨てられた街だし、それもそっか。"
13080-154 = "お願いします！どうか署名を！"
13080-168 = "アビドスの環境を改善するために、署名を集めています！"
13080-169 = "皆さんの協力が必要なんです！"
13080-171 = "……チッ。"
13080-175 = "今さら何かしたところで……。"
13080-179 = "あ、あの、すみません。#nよければ、こちらに署名を……。"
13080-180 = "いよいよネフティスまで自治区を去るっていうのに、#n署名が何の役に立つんだよ！"
13080-192 = "あっ！ちょ、ちょっと待って！"
13080-198 = "えへへ……最近入学してくれた子だよね？#nえっと、たしか名前は……。"
13080-204 = "……ホシノちゃん、だよね！#nあれ、違った？"
13080-205 = "ま、待って、ホシノちゃん！"
13080-214 = "はあ……。 "
13080-219 = "アビドス治安維持強化方針の説明会を開催します！#n皆さん、どうかご参加ください！"
13080-220 = "説明会のプリントです！#n目を通していただくだけでも……。"
13080-227 = "……あっ、ホシノちゃん！"
13080-233 = "待って！"
13080-237 = "……ひんっ！？"
13080-245 = "……はぁ。"
13080-251 = "あ、ありがとう。"
13080-252 = "わっ、握手しちゃった……。"
13080-253 = "どうして私を知ってるんですか？"
13080-254 = "もちろん！すっごく強い新入生がいるって、噂になってるよ？#n……あと、ちょっぴりイジワルだとか何とか。"
13080-255 = "って、私が一人で言ってるだけなんだけど……。"
13080-256 = "この前、暴力集団の喧嘩を止めたのって、ホシノちゃんだよね？"
13080-257 = "アビドスのために、ありがとう。#n生徒会長として、お礼がしたかったの。"
13080-261 = "……さっさと帰ったほうが良いですよ[ruby=くちなし]、梔子ユ[/ruby]メ会長。#n暗くなったら、ここは危険なので。"
13080-262 = "でも、まだやることが……。"
13080-269 = "……あれ？ "
13080-270 = "私、ホシノちゃんに名前教えたっけ……？"
13080-282 = "もうこんな時間になっちゃった。"
13080-283 = "署名は全然集まってないし、プリントはこんなに余ってるし……。"
13080-284 = "今週中に署名を集めないといけないのに。"
13080-288 = "……そうだ、早く帰るようホシノちゃんに言われたんだった。"
13080-298 = "なんだコイツ？"
13080-300 = "ひゃうっ。"
13080-305 = "説明会、だぁ？#nお前、もしかしてアビドスの生徒だな？"
13080-306 = "おい、分かってんのか？#nお前たちが金を払わないせいで、上からとばっちりを受けたんだぞ！"
13080-311 = "わ、私は、その……。"
13080-314 = "どうやって責任取るつもりだよ！#nあぁん！？"
13080-320 = "しょ、署名用紙が……。"
13080-322 = "んだよ、この邪魔なゴミは。"
13080-326 = "や、やめてくださいっ！"
13080-329 = "知るかよ！"
13080-330 = "あーあ、気分わりーな。#nちょっとツラ貸せや。"
13080-362 = "ほ、ホシノちゃん……？"
13080-364 = "だから言ったじゃないですか！#n早く帰ってください、って！"
13080-365 = "なんで帰らなかったんですか？#nバカなんですか！？"
13080-370 = "ご、ごめんなさい……。"
13080-371 = "今のアビドスは無法地帯なんですよ！？"
13080-372 = "……。"
13080-381 = "お、ウチらに逆らうつもりか？"
13080-382 = "その顔、覚えたからな！"
13080-387 = "はあ……。"
13080-388 = "……怪我してませんか、梔子ユメ会長。"
13080-389 = "う、うん……ありがとう、ホシノちゃん。"
13080-390 = "どうして戦わなかったんですか？"
13080-391 = "戦って問題を解決しても、それは次の争いの火種になるだけ……。"
13080-392 = "それに、何でも武力で解決するようになったら、#nいつか自分を見失っちゃうと思うの……。"
13080-393 = "……何を言ってるのか分かりません。"
13080-394 = "じゃあ、どうやって解決するんですか？"
13080-395 = "……。"
13080-399 = "……早く帰ってください。#nあいつらが仲間を連れてくるかもしれないですから。"
13080-404 = "ま、待って、ホシノちゃん！"
13080-415 = "住民の皆さん、"
13080-416 = "署名をお願いします！"
13080-417 = "……。"
13080-421 = "み、皆さんの力が必要なんです……！"
13080-422 = "……あれ。#nホシノちゃん、今日はどうしたの？"
13080-423 = "昨日の奴らが、仕返しに来るかもしれないと思ったので。"
13080-424 = "私を守るために来てくれたの？"
13080-425 = "いえ、会長に釣られたところをまとめて倒したほうが楽かなと。"
13080-426 = "餌ってこと！？"
13080-427 = "……アビドス生徒会を狙う人たちは多いですから。"
13080-431 = "そっかそっか～。"
13080-435 = "ホシノちゃんは素直じゃないんだね！#n実は、心配してくれてるんでしょう？"
13080-436 = "だ、誰が心配なんか……！"
13080-437 = "ホシノちゃん、いつも顔をしかめてるけど……。"
13080-441 = "こんなに可愛いんだから、もったいないよ？"
13080-442 = "な、なに言ってるんですか！#n余計なこと言うなら、もう知りませんよ！"
13080-443 = "ふふっ……ありがとう。ホシノちゃん。 "
13080-444 = "こんなに頼もしい後輩が力になってくれるなんて、心強いよ……！"
13080-445 = "良いから集中してください。"
13080-446 = "それと、生徒会の仕事を手伝うのは、これが最初で最後です。"
13080-447 = "ふふっ、ありがとう。#nでも、梔子ユメ会長じゃなくてユメ先輩って呼んでくれたら、#nも～っと嬉しいかも、みたいな……。"
13080-451 = "……私の話、聞いてましたか？"
13080-455 = "次回;アビドス生徒会（２）"
