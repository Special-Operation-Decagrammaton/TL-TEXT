[translation]
13080-1 = "Episódio 8; Conselho Estudantil de Abydos (1)"
13080-5 = "[ns1] Organizando os materiais coletados.\n[ns2] \"……Pronto, os preparativos estão concluídos.\""
13080-11 = "Em espera. #nProfessor, precisa de algo?"
13080-12 = "[s] \"Obrigado, Plana. E a Arona?\""
13080-13 = "Arona-senpai está dormindo. Ela é uma dorminhoca. #nSe tiver algum trabalho, pode me dar as ordens."
13080-14 = "[s3] \"Sendo assim……\"\n[s4] Peço algumas coisas para a Plana."
13080-19 = "Entendido. #nProcessarei imediatamente."
13080-20 = "Mais importante, o professor deveria dormir um pouco. #nPassar a noite em claro não faz bem para a saúde."
13080-21 = "[s] \"Mas eu preciso sair em breve.\""
13080-22 = "Entendido. #nEntão, entrarei em contato caso algo aconteça."
13080-28 = "Anomalia detectada."
13080-33 = "[ns] \"Plana, o que houve?\""
13080-46 = "……."
13080-47 = "Por que?"
13080-48 = "Será que meus cálculos estavam errados……?"
13080-51 = "[ns] \"O-o que aconteceu!?\""
13080-53 = "[ns] \"Que impacto foi esse!?\" "
13080-56 = "Professor, professor!"
13080-57 = "[s] \"Arona, pode me dizer a situação?\""
13080-60 = "O Schale explodiu!"
13080-61 = "Mas, mais importante que isso, a Plana-chan……!"
13080-67 = "A proteção do professor,"
13080-68 = "foi feita a tempo……."
13080-73 = "P-Plana-chan!?"
13080-75 = "Ver o professor se machucar, nunca mais……."
13080-76 = "[s] \"Plana, você está bem!?\""
13080-77 = "Parece que ela apenas desmaiou!"
13080-88 = "[ns] \"……!\""
13080-96 = "[ns] (A consciência está……) "
13080-103 = "……Entendo. "
13080-104 = "Superou meus cálculos."
13080-105 = "Aquele que causa milagres inexplicáveis, #nmesmo sendo uma arma capaz de derrubar as muralhas de Jericó, eu o subestimei."
13080-106 = "……Mas não importa. #nBasta corrigir o método de攻略 (estratégia)."
13080-110 = "Estratégia, parte 2…… \"O corpo físico tem limites\". #nEssa premissa ainda não foi quebrada."
13080-111 = "A história mais importante está progredindo em um lugar onde o professor não pode interferir. #nQuando ele acordar, já será tarde demais."
13080-113 = "Então, vamos continuar o jogo."
13080-121 = "……Não consigo contato com o professor."
13080-125 = "Hmm."
13080-126 = "Será que aconteceu alguma coisa?"
13080-127 = "Ele não está dormindo?"
13080-129 = "Justo hoje, acho difícil……."
13080-130 = "E a Hoshino-senpai?"
13080-134 = "Pois é, a senpai também não dá notícias."
13080-136 = "Nossa, o que será que eles estão fazendo?"
13080-137 = "……."
13080-141 = "……Já é de manhã. "
13080-142 = "Está na hora de voltar. #nO professor e a Shiroko-chan…… todos devem estar esperando."
13080-143 = "A Shiroko-chan tem ficado cada vez mais forte ultimamente, é complicado. #nSerá que logo, logo eu não vou mais conseguir vencer dela?"
13080-144 = "Ah, o 'ojisan' aqui não consegue vencer o tempo, né."
13080-149 = "Este lugar não muda nada."
13080-150 = "Bem, é uma cidade abandonada, então faz sentido."
13080-154 = "Por favor! Eu imploro, assinem aqui!"
13080-168 = "Estamos coletando assinaturas para melhorar o ambiente de Abydos!"
13080-169 = "Precisamos da colaboração de todos!"
13080-171 = "……Tsc."
13080-175 = "Como se fazer algo agora fosse mudar alguma coisa……."
13080-179 = "A-ah, com licença. #nSe puder, por favor, assine aqui……."
13080-180 = "Até a Nefthys está deixando o distrito, #nque diferença uma assinatura vai fazer?!"
13080-192 = "Ah! E-espera um pouco!"
13080-198 = "Hehe…… Você é a aluna que entrou recentemente, né? #nHum, se não me engano, o nome é……."
13080-204 = "……Hoshino-chan, certo? #nUé, errei?"
13080-205 = "E-espera, Hoshino-chan!"
13080-214 = "Haa……."
13080-219 = "Estamos realizando uma reunião informativa sobre a política de reforço da segurança em Abydos! #nPor favor, todos, compareçam!"
13080-220 = "Aqui está o panfleto da reunião! #nSó de dar uma olhada já ajuda……."
13080-227 = "……Ah, Hoshino-chan!"
13080-233 = "Espera!"
13080-237 = "……Hii!?"
13080-245 = "……Haa."
13080-251 = "Ah, obrigada."
13080-252 = "Uau, nós apertamos as mãos……."
13080-253 = "Como você sabe quem eu sou?"
13080-254 = "Claro! É o que dizem por aí, que tem uma aluna nova super forte! #n……E que ela é um pouquinho travessa, ou algo assim."
13080-255 = "Quer dizer, isso é só o que eu ando dizendo por aí……."
13080-256 = "Foi você quem parou a briga daquele grupo de delinquentes outro dia, né, Hoshino-chan?"
13080-257 = "Obrigada por tudo que faz por Abydos. #nComo presidente do conselho estudantil, eu queria te agradecer."
13080-261 = "……É melhor a senhora ir embora logo, presidente. #nFica perigoso por aqui quando escurece."
13080-262 = "Mas eu ainda tenho coisas para fazer……."
13080-269 = "……Ué?"
13080-270 = "Será que eu cheguei a dizer meu nome para a Hoshino-chan……?"
13080-282 = "Já está tarde assim."
13080-283 = "Não consegui quase nenhuma assinatura e ainda sobraram tantos panfletos……."
13080-284 = "E eu preciso coletar essas assinaturas até o fim da semana."
13080-288 = "……É verdade, a Hoshino-chan me disse para ir embora logo."
13080-298 = "Quem é essa?"
13080-300 = "Hyaah!"
13080-305 = "Reunião informativa, é? #nEi, você é aluna de Abydos, não é?"
13080-306 = "Ei, você tem noção? #nPor causa de vocês que não pagam as dívidas, nós é que estamos levando a culpa lá de cima!"
13080-311 = "E-eu, bem, isso……."
13080-314 = "Como vocês pretendem assumir a responsabilidade?! #nAh!?"
13080-320 = "M-meus papéis de assinatura……."
13080-322 = "Que lixo irritante é esse?"
13080-326 = "P-por favor, pare com isso!"
13080-329 = "Tô nem aí!"
13080-330 = "Ah, que droga, perdi o humor. #nVem aqui, vamos conversar um pouco."
13080-362 = "Ho-Hoshino-chan……?"
13080-364 = "Eu não disse para você ir embora logo?! #nEu avisei!"
13080-365 = "Por que você não foi embora? #nVocê é idiota ou o quê?!"
13080-370 = "D-desculpe……."
13080-371 = "Abydos é uma terra sem lei agora, sabia?!"
13080-372 = "……。"
13080-381 = "Oh, pretende ir contra a gente?"
13080-382 = "Já decorei a sua cara!"
13080-387 = "Haa..."
13080-388 = "……Você não se machucou, Presidente Kuchinashi Yume?"
13080-389 = "Ah, sim... obrigada, Hoshino-chan."
13080-390 = "Por que você não lutou?"
13080-391 = "Mesmo que a gente resolva os problemas lutando, isso só vai servir de estopim para o próximo conflito..."
13080-392 = "Além disso, se começarmos a resolver tudo pela força, #nacho que um dia acabaremos perdendo a nós mesmos..."
13080-393 = "……Não entendo o que você quer dizer."
13080-394 = "Então, como pretende resolver as coisas?"
13080-395 = "……。"
13080-399 = "……Vá embora logo. #nEles podem voltar trazendo reforços."
13080-404 = "Es-espera, Hoshino-chan!"
13080-415 = "Moradores, por favor,"
13080-416 = "assinem a petição!"
13080-417 = "……。"
13080-421 = "Pre-preciso da ajuda de vocês...!"
13080-422 = "……Ué. #nHoshino-chan, o que faz aqui hoje?"
13080-423 = "Pensei que aqueles caras de ontem pudessem voltar para se vingar."
13080-424 = "Veio aqui para me proteger?"
13080-425 = "Não, achei que seria mais fácil derrotar todos de uma vez enquanto eles tentam te pegar."
13080-426 = "Então eu sou a isca!?"
13080-427 = "……Tem muita gente de olho no Conselho Estudantil de Abydos."
13080-431 = "Entendi, entendi~."
13080-435 = "A Hoshino-chan não é nada sincera, né! #nNa verdade, você está preocupada comigo, não está?"
13080-436 = "Que-quem está preocupada com você...!"
13080-437 = "Hoshino-chan, você está sempre de cara fechada, mas..."
13080-441 = "Você é tão fofa, é um desperdício ficar assim, sabe?"
13080-442 = "O-o que você está dizendo! #nSe for falar besteira, não conte mais comigo!"
13080-443 = "Fufu... obrigada, Hoshino-chan."
13080-444 = "É muito reconfortante ter uma kouhai tão confiável me ajudando...!"
13080-445 = "Esquece isso e se concentre."
13080-446 = "E outra, esta é a primeira e última vez que ajudo com o trabalho do Conselho Estudantil."
13080-447 = "Fufu, obrigada. #nMas, se você me chamasse de Yume-senpai em vez de Presidente Kuchinashi Yume, #neu ficaria ainda mais feliz, quem sabe..."
13080-451 = "……Você estava ouvindo o que eu disse?"
13080-455 = "Próximo episódio: Conselho Estudantil de Abydos (2)"
