[translation]
80000121-1 = "Chocolate Palma de Ferro"
80000121-2 = "Obrigada por vir."
80000121-3 = "……Percebo que o Sensei está sempre muito ocupado…… está tudo bem?"
80000121-4 = "[s] \"Não se preocupe com isso!\""
80000121-5 = "Obrigada."
80000121-6 = "……"
80000121-7 = "……Como devo dizer."
80000121-8 = "O Sensei já sabe, não é?"
80000121-9 = "……Afinal, você deve estar acostumado com esse tipo de evento."
80000121-10 = "Sim, eu preparei chocolates de Dia dos Namorados. Pode ser que você já tenha recebido de outras pessoas, mas……"
80000121-11 = "[s1] \"É o primeiro chocolate da Reijo que recebo!\"\n[s2] \"Sim, é isso mesmo.\""
80000121-12 = "S-sério? Talvez eu devesse ter preparado algo mais especial……"
80000121-13 = "Você disse que ficaria feliz com qualquer chocolate que viesse de mim?"
80000121-14 = "Obrigada."
80000121-15 = "Embora minhas forças sejam limitadas, eu preparei isso esperando que fosse algo memorável……"
80000121-16 = "Então, Sensei……"
80000121-17 = "――Por favor, aceite!"
80000121-21 = "[ns] \"……Um punho?\""
80000121-22 = "Sim, este formato……"
80000121-23 = "Tem uma relação estreita com o método de fabricação deste chocolate!"
80000121-27 = "……D-desculpe. Acabei me empolgando…… vou explicar."
80000121-28 = "……"
80000121-29 = "Sensei, você conhece o \"Tessasho\"?"
80000121-30 = "É um método de treinamento onde se enche um recipiente com areia e se golpeia o interior."
80000121-31 = "Primeiro areia. Depois feijões torrados, pedregulhos e, por fim, até esferas de ferro…… você coloca materiais de dureza crescente de acordo com o seu nível de treino e golpeia……"
80000121-32 = "Transformando seus dedos e punhos em aço."
80000121-33 = "Desta vez, pensando em um chocolate que fosse a minha cara……"
80000121-34 = "Eu incorporei o Tessasho na fabricação do chocolate!"
80000121-35 = "Golpeando um recipiente cheio de grãos de cacau――"
80000121-36 = "E dando forma a ele como chocolate. Achei que esse seria um chocolate bem a minha cara!"
80000121-37 = "[s] \"……Ou seja, você treinou pesado com os grãos de cacau?\""
80000121-38 = "B-bem, é basicamente isso."
80000121-39 = "Como devo dizer……"
80000121-40 = "Eu fazia isso esperando que desse certo, mas――"
80000121-41 = "Eu não imaginava que realmente conseguiria pulverizar os grãos de cacau com o punho……"
80000121-42 = "Já que cheguei até aqui, pensei: \"Vou transformar isso em chocolate logo!\""
80000121-43 = "E gravei a marca do meu próprio punho nele――"
80000121-44 = "O que achou……?"
80000121-45 = "Eu, e o chocolate, estamos…… diferentes?"
80000121-46 = "[s] \"…….\""
80000121-50 = "[ns] \"Literalmente, um chocolate feito à mão pela Reijo!\""
80000121-51 = "S-sim……"
80000121-52 = "……"
80000121-53 = "É, de fato……"
80000121-54 = "Como o Sensei disse……"
80000121-55 = "Quando é dito assim, é…… um pouco embaraçoso."
80000121-59 = "(O Sensei come o chocolate da Reijo…… rapidamente!)"
80000121-60 = "S-Sensei!?!"
80000121-61 = "[s] \"Este é o punho treinado da Reijo……!\""
80000121-62 = "S-sim!?"
80000121-63 = "B-bem, é verdade, mas ao mesmo tempo não é...!"
80000121-64 = "E-então, o que achou...!"
80000121-65 = "Sensei...?"
80000121-66 = "O resultado do meu treinamento foi...?"
80000121-67 = "[s3] \"Está incrível!\" \n[s4] \"Quero comer mais!\""
80000121-70 = "S-sério mesmo!?"
80000121-71 = "...Não parece ser mentira."
80000121-72 = "Entendido."
80000121-73 = "Na verdade, eu fiz uma porção extra."
80000121-74 = "...A reação que eu esperava era... um pouco diferente, mas..."
80000121-75 = "..."
80000121-76 = "Muito obrigada, Sensei."
80000121-77 = "Por favor, coma o restante à vontade."
80000121-78 = "Vou preparar um chá para você."
80000121-80 = "(Conversamos animadamente sobre a associação comercial, chocolates e artes marciais com Reijo, passando um momento tranquilo.)"
