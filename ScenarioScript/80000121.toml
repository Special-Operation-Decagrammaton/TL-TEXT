[translation]
80000121-1 = "鉄砂掌チョコレート"
80000121-2 = "来てくださりありがとうございます。"
80000121-3 = "……先生はいつも多忙とお見受けしますが……大丈夫だったのでしょうか？"
80000121-4 = "[s] \"気にしないで！\""
80000121-5 = "ありがとうございます。"
80000121-6 = "……"
80000121-7 = "……なんと、言いますか。"
80000121-8 = "先生はもうご存じですよね？"
80000121-9 = "……こういった行事には、慣れているでしょうから。"
80000121-10 = "はい、バレンタインのチョコレートを用意したんです。もう他の方からいただいているかもしれませんが……。"
80000121-11 = "[s1] \"レイジョのチョコが初めてだよ！\"\n[s2] \"うん、そうだよ。\""
80000121-12 = "そ、そうですか。もっと特別なものをご用意すればよかったかもしれません……"
80000121-13 = "私からのチョコレートは何でも嬉しいよ、ですか？ "
80000121-14 = "ありがとうございます。"
80000121-15 = "微力ながら、少しでも記憶に残るものを、と……用意していました。"
80000121-16 = "それでは、先生……"
80000121-17 = "――受け取ってください！"
80000121-21 = "[ns] \"……拳？\""
80000121-22 = "はい、この形状は……"
80000121-23 = "このチョコレートの製法と密接な関わりがあるのです！"
80000121-27 = "……す、すみません。つい熱く……ご説明しますね。"
80000121-28 = "……"
80000121-29 = "先生は「鉄砂掌」についてご存じでしょうか？"
80000121-30 = "器を砂で満たし、そこに手を突き入れる修練法です。"
80000121-31 = "最初は砂。次に炒り豆や小石、果ては鉄球まで……練度に応じた硬さのものを器に入れて、突き……"
80000121-32 = "指と拳を、鋼鉄へ変えていくのです。"
80000121-33 = "今回は、私らしいチョコレートを考えた結果……"
80000121-34 = "鉄砂掌を、チョコレート作りに取り入れてみたんです！"
80000121-35 = "カカオ豆で満たした器に拳を打ち込み――"
80000121-36 = "チョコレートとして形にする。それが私らしいチョコだな、と！"
80000121-37 = "[s] \"……つまり、カカオ豆で特訓したってこと？\""
80000121-38 = "そ、そういうことになりますね。"
80000121-39 = "どう申し上げればよいのでしょう……。"
80000121-40 = "そうなったらいいなと思ってやっていたことではあるのですが――"
80000121-41 = "本当に拳でカカオ豆を粉砕できるとは、思っていませんでした……。"
80000121-42 = "せっかくなので、そのままチョコレートにしてしまおう！と、"
80000121-43 = "自分の拳を刻み込んでみたのですが――"
80000121-44 = "いかがでしょうか……？"
80000121-45 = "私も、チョコレートも、変わって……いますか？"
80000121-46 = "[s] \"……。\""
80000121-50 = "[ns] \"文字通り、レイジョの手作りチョコだね！\""
80000121-51 = "え、ええ……"
80000121-52 = "……"
80000121-53 = "た、確かに……"
80000121-54 = "先生のおっしゃる通りではありますが……"
80000121-55 = "改めて言われると……恥ずかしいものですね。"
80000121-59 = "（レイジョのチョコを……パクパク食べる！）"
80000121-60 = "せ、先生！？！"
80000121-61 = "[s] \"これがレイジョの鍛え抜かれた拳……！\""
80000121-62 = "は、はい！？"
80000121-63 = "そ、そうだけど、そうではないと言いますか……！"
80000121-64 = "い、いかがでしたか……！"
80000121-65 = "先生……？"
80000121-66 = "私の修練の成果は……？"
80000121-67 = "[s3] \"最高だよ！\"　\n[s4] \"もっと食べたい！\"　"
80000121-70 = "ほ、本当ですか！？"
80000121-71 = "……嘘ではなさそうですね。"
80000121-72 = "分かりました。"
80000121-73 = "実は、余分に作っていたんです。"
80000121-74 = "……私が期待していた反応とは……ちょっと違いましたが……"
80000121-75 = "……"
80000121-76 = "ありがとうございます、先生。"
80000121-77 = "残った分も、思う存分召し上がってください。"
80000121-78 = "お茶をご用意しますね。"
80000121-80 = "（レイジョと商会やチョコレート、武術の話で盛り上がり、穏やかな時を過ごした）"
