[translation]
10017010-1 = "Episódio 1; Segredos e o Jardim Secreto"
10017010-7 = "Jingle bells~ Jingle bells~"
10017010-9 = "Hanae-chan, você já parece estar se divertindo muito."
10017010-13 = "Aliás, Sensei... isso não está pesado?"
10017010-14 = "[s1] \"Está tudo bem, pode deixar comigo.\"\n[s2] \"Afinal, são presentes que a Hanae e a Serina fizeram com tanto carinho!\""
10017010-17 = "Ah, ahaha... quando as coisas se acalmarem mais tarde, por favor, deixe-me lhe entregar um também."
10017010-25 = "Droga, preciso me apressar...!"
10017010-27 = "Ora, da Comissão de Justiça...#nO que houve para estarem com tanta pressa a esta hora?"
10017010-28 = "Olá! Feliz Natal!"
10017010-29 = "Ah, da Equipe de Primeiros Socorros.#nSempre nos ajudando, feliz Natal para vocês também."
10017010-30 = "Ué, e aquele ali é... Sensei!? Oh, peço mil desculpas!!!"
10017010-31 = "[s3] \"Não, não precisa se desculpar por nada...\"\n[s4] \"Parecem ocupadas, aconteceu alguma coisa?\""
10017010-34 = "B-bem, é que, sabe..."
10017010-35 = "Bom, como são a Equipe de Primeiros Socorros e o Sensei, acho que não tem problema contar."
10017010-36 = "Na verdade, decidimos fazer uma festa de Natal da Comissão de Justiça hoje à noite!"
10017010-37 = "Ah, tecnicamente não seremos todas...#nA Koharu-san parece ter um compromisso com o pessoal do Clube de Estudos Suplementares."
10017010-38 = "E a Ichika-senpai teve um compromisso e viajou na semana passada para o evento de fim de ano da União Hyakkiyako..."
10017010-39 = "Ora...#nIsso é, como posso dizer, uma pena..."
10017010-40 = "Pois é... Mas ouvi dizer que o evento de fim de ano de Hyakkiyako é bem grandioso. Espero que lá também seja uma celebração divertida."
10017010-41 = "De qualquer forma, reservamos o café \"White&Mason\" aqui perto#npara que possamos relaxar um pouco, já que \"é essa época do ano\"."
10017010-42 = "O \"White&Mason\"...! Aquele lugar que é quase impossível de reservar... que incrível!"
10017010-44 = "O pessoal da Comissão de Justiça sempre trabalha muito duro... acho que vocês merecem isso."
10017010-45 = "Não, não chegamos aos pés da Equipe de Primeiros Socorros."
10017010-46 = "Além disso, precisamos preparar várias coisas para essa confraternização..."
10017010-47 = "Então vocês estavam a caminho para preparar tudo. Desculpe por tê-las interrompido."
10017010-48 = "Imagina.#nSe vocês tiverem tempo, por favor, passem lá também."
10017010-49 = "A presidente e a vice-presidente certamente ficarão felizes em recebê-los."
10017010-51 = "Obrigado, se o horário permitir, com certeza!"
10017010-56 = "[ns] \"Uma festa de Natal da Comissão de Justiça, hein...\""
10017010-57 = "Vocês sempre se esforçam tanto, fico feliz por vocês!"
10017010-58 = "Verdade, afinal é Natal."
10017010-59 = "[s] \"Acho que a Serina e a Hanae também se esforçam bastante, não acham?\""
10017010-60 = "Hmm, será?"
10017010-61 = "Eu só estou fazendo o que deve ser feito... além disso, poder prestar socorro é algo que me deixa feliz!"
10017010-62 = "Dito isso, é verdade que temos nos esforçado bastante..."
10017010-63 = "Este ano, eu certamente vou ganhar um presente do Papai Noel, não vou!?"
10017010-64 = "Fufu... sim, com certeza."
10017010-69 = "(Falando nisso, o que eu faço com o presente da Hanae-chan...)"
10017010-70 = "(...Acho que vou pedir um conselho ao Sensei mais tarde.)"
