[translation]
10017010-1 = "第１話;秘密と花園"
10017010-7 = "ジングルベル～ジングルベル～"
10017010-9 = "ハナエちゃん、もう既にとっても楽しそうですね。"
10017010-13 = "ところで、先生……それ、重くないですか？"
10017010-14 = "[s1] \"全然大丈夫、任せて。\"\n[s2] \"せっかくハナエとセリナが作ったプレゼントなんだし！\""
10017010-17 = "あ、あはは……あとで落ち着いたら、先生にもお渡しさせてくださいね。"
10017010-25 = "まずい、急がないと……！"
10017010-27 = "あら、正義実現委員会の……#nこんな時間に急いで、どうされたんでしょうか？"
10017010-28 = "こんにちは！メリークリスマスです！"
10017010-29 = "あっ、救護騎士団の。#nいつもお世話になっています、メリークリスマスです。"
10017010-30 = "あれ、そちらは……って先生！？こ、これは失礼しました！！？"
10017010-31 = "[s3] \"いや、特に失礼なことは何も……。\"\n[s4] \"忙しそうだね、どうかしたの？\""
10017010-34 = "そ、それは、えーっと……。"
10017010-35 = "まあ、救護騎士団と先生ですし、お話しても大丈夫な気がしますね。"
10017010-36 = "実は今夜、正義実現委員会でクリスマス会を開くことにしたんです！"
10017010-37 = "あ、厳密には全員ではないのですが……#nコハルさんは補習授業部の方と先約があるみたいで。"
10017010-38 = "それと、イチカ先輩は所用で、先週から百鬼夜行連合学院の年末行事に行ってしまってるんですが……。"
10017010-39 = "あら……#nそれは何と言いますか、残念ですね……。"
10017010-40 = "そうですね……ただ、百鬼夜行の年末行事も華やかだと聞きました。#n向こうは向こうで、楽しい行事であることを願うばかりです。"
10017010-41 = "とにかく、近所のカフェ「White&Mason」を貸し切って#n「この時期くらい」はと、みんなでリラックスできる場を設けてくれるらしくって。"
10017010-42 = "「White&Mason」……！あの予約する事すら難しいというお店を……すごいですね！"
10017010-44 = "正義実現委員会の方々、いつも大変ですからね……それくらいはあっても良いかもしれません。"
10017010-45 = "いえ、救護騎士団の方々には及びませんよ。"
10017010-46 = "それに、その忘年会のために色々と準備も必要でして……。"
10017010-47 = "それで、今その準備に向かわれるところだったんですね。#n引き止めてしまってごめんなさい。"
10017010-48 = "いえいえ。#nみなさんももしお時間がありましたら、お立ち寄りください。"
10017010-49 = "委員長も副委員長も、きっと歓迎しますので。"
10017010-51 = "ありがとうございます、タイミングが合えば是非！"
10017010-56 = "[ns] \"正義実現委員会のクリスマス会か……\""
10017010-57 = "いつもみなさん大変ですもんね、良かったです！"
10017010-58 = "ですね、せっかくのクリスマスですし。"
10017010-59 = "[s] \"大変なのは、セリナもハナエもだと思うよ？\""
10017010-60 = "うーん、そうでしょうか？"
10017010-61 = "私はやるべきことをやっているだけなので……それに救護ができることは、私にとっては嬉しいことですし！"
10017010-62 = "とはいえ、頑張っているのは確かなので……"
10017010-63 = "今年も私、サンタさんからきっとプレゼント貰えますよね！？"
10017010-64 = "ふふっ……はい、きっと。"
10017010-69 = "（そういえば、ハナエちゃんのプレゼントどうしよう……）"
10017010-70 = "（……あとで先生に相談してみようかな）"
