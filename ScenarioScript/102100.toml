[translation]
102100-1 = "第10話;「百鬼夜行」自治区防衛"
102100-4 = "いよいよ、私たちの番ですね。 "
102100-5 = "百鬼夜行自治区の防衛戦を、始めます！"
102100-6 = "うん～行こっか。"
102100-7 = "しゅっぱ～つ。"
102100-11 = "任侠への第一歩！スタート、デス！"
102100-17 = "あたしらも行くよ！突撃ー！"
102100-19 = "うおおお――！"
102100-23 = "避難所は準備万端です！各種補給も、私たちお祭り運営委員会で支援しますよ～！"
102100-24 = "はい、社長！#nお祭りみたいに賑やかになってきて、なんだかワクワクしちゃいます！"
