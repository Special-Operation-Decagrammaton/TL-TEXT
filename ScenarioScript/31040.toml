31040-95 = "Do 2º ano do Clube de Aulas de Reforço, Hanako Urawa."
31040-96 = "Vagava pela escola de maiô e foi flagrada em flagrante pelo Comitê de Realização da Justiça."
31040-97 = "No momento, mantida presa sob a custódia do Comitê de Realização da Justiça (ao menos, deveria estar)."
31040-101 = "……? Algum problema, senhorita Shimoe?"
31040-102 = "Claro que tem!? Por que você fica vagando dentro da escola de maiô!?"
31040-103 = "Mas, na piscina, que fica dentro do terreno da escola, todo mundo veste maiô normalmente, não é? Aqui também é terreno da escola, então…… ah, será que a senhorita Shimoe é do tipo que não veste maiô na piscina?"
31040-104 = "Hã, quê? Isso como assim……"
31040-105 = "Ah, sei, a senhorita Shimoe gosta de nadar totalmente nua. Como esperado do Comitê de Realização da Justiça, cobrir até esse tipo de área."
31040-106 = "S-sua boba!? É claro que se veste! E-eu jamais faria uma coisa dessas……!"
31040-107 = "Mesmo assim, dizer que a nudez é que é a justiça…… bem vanguardista. Eu nunca tinha pensado nisso, mas, sei. Experimentar também pode ser interessante……"
31040-108 = "E-enfim, volta logo pra lá, anda! As veteranas já vão chegar!"
31040-109 = "Ora, mas estas pessoas vieram me ver――"
31040-110 = "Cala a boca, cala a boca, sua criminosa do atentado ao pudor público!! Volta já!!"
31040-111 = "Desculpem; pelo visto a situação está meio confusa, então vamos nos ver de novo mais tarde, tá?"
31040-116 = "……."
31040-117 = "[s] \"…….\""
31040-120 = "Haa, haa……."
31040-121 = "É-é que……."
31040-122 = "Que situação é essa, afinal…… o que vai acontecer com a Hanako depois disso?"
31040-123 = "Isso é claro que é pena de morte! Coisa safada não pode! Pena capital!"
31040-124 = "N-não deve ser bem assim, eu acho……."
31040-125 = "Ela ficou andando pela escola de maiô!? Em plena luz do dia! No meio da praça, cheia de alunos!!"
31040-126 = "……."
31040-127 = "Mas, dentro da escola, a gente veste a roupa determinada pelo regulamento, né? Então ela vestiu direitinho o maiô oficial da escola……."
31040-128 = "Por que logo o maiô!? Bastava vestir o uniforme, né!? Aliás, não entra na conversa!"
31040-129 = "Auu, e-en-enfim……."
31040-130 = "A-agora parece meio difícil encontrar a Hanako, então……."
31040-131 = "Por ora, vamos encontrar o próximo membro……."
31040-132 = "É que……."
31040-133 = "A outra é…… a Azusa Shirasu."
31040-136 = "Voltei."
31040-137 = "Missão cumprida! Prendi a Azusa Shirasu em flagrante!"
31040-139 = "Sim…… siim!?"
31040-140 = "Ah, veterana Hasumi, Mashiro."
31040-141 = "Koharu, bom trabalho. Ué……?"
31040-142 = "Sensei [USERNAME]?"
31040-147 = "(Sssh, sssh……)"
31040-148 = "……."
31040-149 = "[s] \"…….\""
31040-150 = "……Faltou pouco. Se eu tivesse munição suficiente, teria levado mais umas junto comigo."
31040-151 = "Chega, faz o que quiser. Só que eu fui treinada pra resistir a tortura, então fazer eu abrir a boca não vai ser tão fácil."
31040-152 = "(Sssh, sssh……)"
