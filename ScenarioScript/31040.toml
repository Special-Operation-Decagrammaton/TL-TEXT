31040-95 = "Aluna do 2º ano do Clube de Reforço, [ruby=うらわ]Urawa[/ruby] Hanako."
31040-96 = "Foi flagrada andando pela escola de biquíni e capturada pelo Comitê de Execução da Justiça."
31040-97 = "Atualmente, está em confinamento no Comitê (supostamente)."
31040-101 = "……？ Aconteceu algum problema, Shimoe-san?"
31040-102 = "Claro que aconteceu！？ Por que você fica andando pela escola de biquíni！？"
31040-103 = "Mas na piscina da escola todo mundo usa biquíni normalmente, né？ Aqui também é parte da escola… ah, será que a Shimoe-san é do tipo que nada pelada?"
31040-104 = "Eh, hã? O que você quer dizer com…"
31040-105 = "Entendi, então a Shimoe-san gosta de nadar nua. Como esperado do Comitê de Execução da Justiça, cobrem até esse tipo de campo."
31040-106 = "Q-que idiota！？ Claro que eu uso biquíni！？ Não vou fazer uma coisa dessas……！"
31040-107 = "Ainda assim, dizer que a nudez é justiça… é bem vanguardista. Nunca tinha pensado nisso, mas faz sentido. Talvez eu devesse experimentar…"
31040-108 = "E-enfim, volta logo pra cela！？ Os senpais vão chegar daqui a pouco！"
31040-109 = "Ara, mas essas pessoas vieram me ver——"
31040-110 = "Cala a boca, sua pervertida pública！！ Volta já！！"
31040-111 = "Desculpe, parece que a situação tá um pouco confusa, então vamos nos falar depois, tá bom?"
31040-116 = "……。"
31040-117 = "[s] \"……。\""
31040-120 = "Haa, haa……"
31040-121 = "E-eh…"
31040-122 = "Que situação é essa… Hanako-san, o que vai acontecer com ela agora?"
31040-123 = "É óbvio que vai ser pena de morte！ Safadeza é proibida！ Execução！"
31040-124 = "N-não pode ser isso…"
31040-125 = "Ela tava andando pela escola de biquíni！？ Em plena luz do dia！ No meio da praça lotada de alunos！！"
31040-126 = "……。"
31040-127 = "Mas dentro da escola a gente deve usar o uniforme da escola, né？ Então usar o biquíni da escola seria…"
31040-128 = "Por que tem que ser biquíni！？ Usa o uniforme normal！？ E para de entrar na conversa！"
31040-129 = "Auuu… p-por enquanto…"
31040-130 = "A-agora parece difícil falar com a Hanako-san…"
31040-131 = "Vamos encontrar a próxima membro…"
31040-132 = "E-eh…"
31040-133 = "A outra é… Azusa Shirasu."
31040-136 = "Acabei de voltar."
31040-137 = "Missão cumprida！ Capturei Azusa Shirasu em flagrante！"
31040-139 = "Hã…… hã！？"
31040-140 = "Ah, Hasumi-senpai, Mashiro."
31040-141 = "Koharu-san, bom trabalho. Hm……？"
31040-142 = "Sensei [USERNAME]?"
31040-147 = "（Shhh, shhh……）"
31040-148 = "……。"
31040-149 = "[s] \"……。\""
31040-150 = "……Quase. Se tivesse mais munição, teria levado mais gente comigo."
31040-151 = "Faz o que quiser. Só que eu passei por treinamento de resistência a tortura, então não vai ser fácil me fazer falar."
31040-152 = "（Shhh, shhh……）"
