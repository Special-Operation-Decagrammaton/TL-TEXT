31040-169 = "Aluna do segundo ano do Clube de Estudos Suplementares, Shirasu Azusa."
31040-170 = "Após ser perseguida pelo Comitê de Justiça por suspeita de atos violentos dentro da escola, ela ocupou o depósito de munições de granadas de gás lacrimogêneo para fins didáticos."
31040-171 = "Explodiu cerca de 1 tonelada de gás lacrimogêneo e foi presa após resistir por 3 horas."
31040-172 = "Até o momento da prisão, ela resistiu ferozmente usando várias armadilhas e IEDs. Danos extensos."
31040-174 = "Próximo episódio: As alunas do Clube de Estudos Suplementares (2)"
