31040-170 = "Aluna do 2º ano do Clube de Reforço, [ruby=しらす]Shirasu[/ruby] Azusa."
31040-171 = "Suspeita de violência dentro da escola, perseguida pelo Comitê de Execução da Justiça, ocupou o depósito de granadas de gás lacrimogêneo usadas em treinamento."
31040-172 = "Resistiu por 3 horas usando cerca de 1 tonelada de granadas lacrimogêneas e armadilhas improvisadas. Múltiplas vítimas."
