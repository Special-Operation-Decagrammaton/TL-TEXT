[translation]
31040-1 = "Episódio 4; As alunas do Clube de Reforço (1)"
31040-3 = "E-e-então, é que..."
31040-4 = "As circunstâncias inevitáveis que levaram a isso, bem..."
31040-5 = "Eu acabei matando aula para participar da apresentação de guerrilha do Peroro-sama... e então..."
31040-6 = "[s] \"……。\""
31040-7 = "Uuu..."
31040-8 = "P-por favor, não me olhe com esses olhos tão frios...! Eu tinha certeza de que tinha verificado o cronograma das provas. Foi um erro, ou talvez um equívoco..."
31040-9 = "……。"
31040-10 = "Auu... d-desculpe..."
31040-11 = "[s] \"Não, você não precisa se desculpar comigo, mas...\""
31040-12 = "S-sim. Bem, então..."
31040-13 = "É que... a Nagisa-sama me pediu para dar suporte ao Sensei..."
31040-15 = "……Sendo assim, Hifumi-san. Você poderia ajudar o Sensei e, ao mesmo tempo, liderar o Clube de Reforço?"
31040-16 = "Sim!? E-eu!?"
31040-17 = "Sim. Afinal, é algo que só uma aluna exemplar como você poderia fazer."
31040-18 = "E-eu não sou tão exemplar assim... e, para começar, minhas notas são apenas medianas... e agora estou em risco de reprovação..."
31040-19 = "Fufu. Eu valorizo muito o seu \"amor\", Hifumi-san. Além disso, agora é a sua vez de retribuir esse \"amor\" para mim... não é?"
31040-20 = "A-auuu..."
31040-21 = "Fufu. Sendo assim, conto com você. Presidente do Clube de Reforço."
31040-24 = "[ns] \"Você era a presidente...!?\""
31040-25 = "B-bem, é apenas temporário... O Clube de Reforço foi criado de forma limitada e especial..."
31040-26 = "S-se todas evitarem a reprovação, o clube deve ser dissolvido naturalmente."
31040-27 = "P-por isso, bem... até lá, conto com você, Sensei."
31040-28 = "[s] \"Certo. Conto com você, Hifumi.\""
31040-29 = "Embora a situação seja essa... fico feliz que o responsável seja o Sensei."
31040-30 = "Ah, você ainda não conheceu as outras integrantes do Clube de Reforço, certo?"
31040-31 = "Ao verificar a lista, parece que somos quatro integrantes, incluindo eu."
31040-32 = "Vamos lá conhecê-las, Sensei. Primeiro, precisamos planejar como evitar a reprovação de todas..."
31040-35 = "[ns] Seguir a Hifumi."
31040-38 = "Comitê de Justiça - Sala de Aula"
31040-39 = "[ns] \"Aqui é...\""
31040-40 = "A-au... eu não queria muito vir aqui..."
31040-41 = "Bem, com licença... tem alguém aí?"
31040-45 = "……。"
31040-46 = "Ah, o-olá."
31040-47 = "……。"
31040-48 = "E-e-então..."
31040-49 = "……O que foi?"
31040-50 = "A-au... b-bem..."
31040-51 = "……。"
31040-52 = "Auu... e-eu fiz alguma coisa de errado...?"
31040-53 = "[s] \"Acho que ela só é um pouco tímida.\""
31040-54 = "……Q-quem é tímida!?"
31040-55 = "E-eu só estou em alerta porque você é um estranho, só isso!"
31040-56 = "[s] \"Acho que isso é exatamente o que chamam de 'ser tímida'...?\""
31040-57 = "Ugh..."
31040-58 = "……E-então, o que você quer com o Comitê de Justiça?"
31040-59 = "E-e-então... estamos procurando por alguém..."
31040-60 = "Hã!? Você quer pedir para o Comitê de Justiça procurar alguém?"
31040-61 = "Você acha que somos uma organização voluntária ou algo do tipo? Acha que temos tempo livre para isso?"
31040-62 = "Não, bem, é que eu ouvi dizer que alguém estava trancado aqui..."
31040-63 = "……Hã?"
31040-64 = "Por isso, bem, sabe, a pessoa que fez algo inapropriado está aqui..."
31040-65 = "Ei, será que isso significa...?"
31040-70 = "Olá. Por acaso vocês estavam me procurando?"
31040-71 = "！？！？"
31040-72 = "！？"
31040-73 = "[s] \"！？\""
31040-74 = "Ei, hã, por que!? A-a gente, como você saiu da cela!? Eu tranquei a porta direitinho!"
31040-76 = "Não, estava aberta, sabe? Ouvi vozes que pareciam falar sobre mim, então vim até aqui. Precisavam de algo?"
31040-77 = "Ora. Uma pessoa adulta, isso significa que... você é o Sensei, não é? Prazer em conhecê-lo. Entendo, será que você é do Esquadrão de Reforço?"
31040-78 = "E-espera!! Não saia andando por aí vestida assim!? Ei, você!!"
31040-83 = "Ura"
31040-85 = "wa"
31040-89 = "Ha"
31040-91 = "na"
31040-93 = "ko"
31040-95 = "Aluna do segundo ano do Esquadrão de Reforço, Hanako Urawa."
31040-96 = "Vagava pela escola de roupa de banho e foi pega em flagrante pelo Comitê de Justiça."
31040-97 = "Atualmente, está sob custódia (ou deveria estar) do Comitê de Justiça."
31040-101 = "……? Houve algum problema, Shimoe-san?"
31040-102 = "Claro que houve, né!? Por que você está vagando pela escola de roupa de banho!?"
31040-103 = "Mas, na piscina, que fica dentro do terreno da escola, todos usam roupa de banho normalmente, não é? Aqui também é terreno da escola... ah, será que você é do tipo que não usa roupa de banho na piscina, Shimoe-san?"
31040-104 = "Ei, hã? O que você quer dizer com..."
31040-105 = "Entendo, então você gosta de nadar pelada, Shimoe-san. Como esperado do Comitê de Justiça, cobrindo até esse tipo de área."
31040-106 = "S-sua idiota, não é isso!? É óbvio que eu uso! E-eu nunca faria uma coisa dessas...!"
31040-107 = "Ainda assim, dizer que a nudez é a justiça... é bem vanguardista. Nunca tinha pensado nisso, mas entendo. Tentar isso também seria interessante..."
31040-108 = "D-de qualquer forma, volte logo, rápido! As veteranas vão chegar a qualquer momento!"
31040-109 = "Ora, mas essas pessoas vieram me ver..."
31040-110 = "Cala a boca, sua indecente pública!! Volte logo para lá!!"
31040-111 = "Sinto muito, parece que a situação está um pouco confusa, então nos vemos mais tarde, está bem?"
31040-116 = "……."
31040-117 = "[s] \"……。\""
31040-120 = "Haa, haa..."
31040-121 = "E-então..."
31040-122 = "O que é essa situação... O que vai acontecer com a Hanako-san agora?"
31040-123 = "Isso é obviamente caso de pena de morte! Coisas indecentes não são permitidas! Pena capital!"
31040-124 = "A-acho que não é para tanto..."
31040-125 = "Ela andou pela escola de roupa de banho!? Em plena luz do dia! Bem no meio da praça, onde tem um monte de alunas!!"
31040-126 = "……."
31040-127 = "Mas, na escola, devemos usar as roupas determinadas pelo regulamento, certo? Por isso, usei a roupa de banho designada pela escola..."
31040-128 = "Por que você está de roupa de banho aí!? Era só usar o uniforme, né!? E aliás, pare de se meter na conversa!"
31040-129 = "Auu, b-bem..."
31040-130 = "A-agora parece difícil conversar com a Hanako-san, então..."
31040-131 = "Vamos encontrar a próxima integrante por enquanto..."
31040-132 = "Bem..."
31040-133 = "A outra é... Azusa Shirasu."
31040-136 = "Acabei de voltar."
31040-137 = "Missão cumprida! Capturei Azusa Shirasu em flagrante!"
31040-139 = "Sim... S-sim!?"
31040-140 = "Ah, Hasumi-senpai, Mashiro."
31040-141 = "Koharu-san, bom trabalho. Espere...?"
31040-142 = "Professor [USERNAME]?"
31040-147 = "(Shhh, shhh...)"
31040-148 = "……."
31040-149 = "[s] \"……。\""
31040-150 = "……Foi por pouco. Se eu tivesse munição suficiente, teria conseguido levar mais alguns comigo."
31040-151 = "Já chega, faça o que quiser. Mas saiba que recebi treinamento para resistir a interrogatórios, então não será tão fácil me fazer falar."
31040-152 = "(Shhh, shhh...)"
31040-157 = "Shirasu"
31040-159 = "Shirasu"
