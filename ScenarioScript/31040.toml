[translation]
31040-1 = "Episódio 4;Os Alunos do Clube de Aulas de Reforço (1)"
31040-3 = "É-é que, sabe……."
31040-4 = "A circunstância inevitável que me trouxe a isto é……."
31040-5 = "Pra participar de um show-relâmpago do senhor Peroro, eu acabei matando a prova…… e aí……."
31040-6 = "[s] \"…….\""
31040-7 = "Uu……."
31040-8 = "N-não me olhe com esses olhos tão frios……! Eu tinha conferido a data da prova direitinho, juro. Foi algum engano, digamos, uma confusão……."
31040-9 = "……."
31040-10 = "Auu…… m-me desculpe……."
31040-11 = "[s] \"Não, não precisa se desculpar comigo…….\""
31040-12 = "S-sim. É que, então……."
31040-13 = "É que…… a Nagisa me pediu pra dar apoio ao Sensei……."
31040-15 = "……E é por isso, Hifumi. Junto com ajudar o Sensei, será que você poderia conduzir o Clube de Aulas de Reforço?"
31040-16 = "Sim!? E-eu!?"
31040-17 = "Sim. Afinal, é uma coisa que só uma aluna exemplar como você, Hifumi, consegue fazer."
31040-18 = "E-eu não sou lá tão exemplar assim…… minhas notas são mais ou menos na média…… e agora até corro risco de reprovar……."
31040-19 = "Ufu. É que eu dou muito valor ao \"amor\" da Hifumi. Além disso, agora é a vez de você me devolver o \"amor\"…… não é?"
31040-20 = "A-auu……."
31040-21 = "Ufu. Sendo assim, conto com você, tá? Senhorita presidente do Clube de Aulas de Reforço."
31040-24 = "[ns] \"Eu era a presidente……!?\""
31040-25 = "É-é só temporária, viu…… o Clube de Aulas de Reforço é um clube criado de forma especial e limitada……."
31040-26 = "S-se todo mundo escapar da reprovação, o clube naturalmente deixa de existir."
31040-27 = "E-então, é que…… até lá, conto com você. Sensei."
31040-28 = "[s] \"Sim. Conto com você, Hifumi.\""
31040-29 = "A situação é essa, mas…… ainda bem que quem ficou responsável foi o Sensei."
31040-30 = "Ah, os outros membros do Clube de Aulas de Reforço, o senhor ainda não conheceu, né?"
31040-31 = "Pelo que confirmei na lista, os membros somos 4, me incluindo."
31040-32 = "Por ora, vamos encontrá-los, Sensei. Primeiro, a gente tem que traçar, todo mundo junto, um plano pra não reprovar……."
31040-35 = "[ns] Segue a Hifumi."
31040-38 = "Comitê de Realização da Justiça - Sala de aula"
31040-39 = "[ns] \"Aqui é…….\""
31040-40 = "A-au…… eu não queria muito vir aqui, mas……."
31040-41 = "É que, com licença…… tem alguém aí?"
31040-45 = "……."
31040-46 = "Ah, o-olá."
31040-47 = "……."
31040-48 = "É-é que……."
31040-49 = "……Quê?"
31040-50 = "A-au…… é-é que……."
31040-51 = "……."
31040-52 = "Auu…… s-será que eu fiz alguma coisa……."
31040-53 = "[s] \"Acho que ela só é meio tímida com estranhos.\""
31040-54 = "……Q-quem é tímida!?"
31040-55 = "É-é só que era uma pessoa desconhecida, então eu tô de guarda alta, só isso!?"
31040-56 = "[s] \"Acho que é isso mesmo que se chama de 'tímida com estranhos', não é……?\""
31040-57 = "Uh……."
31040-58 = "……E-então, o que você quer com o Comitê de Realização da Justiça?"
31040-59 = "É-é que…… tem uma pessoa que a gente tá procurando……."
31040-60 = "Hã!? Você quer pedir pro Comitê de Realização da Justiça procurar uma pessoa?"
31040-61 = "Você tá confundindo a gente com alguma ONG de voluntariado? A gente não tá com tempo sobrando, não, viu?"
31040-62 = "Não, é que…… a gente ouviu que ela tá presa aqui……."
31040-63 = "……Hã?"
31040-64 = "É que, então, é…… uma pessoa que fez uma coisa errada tá aqui……."
31040-65 = "Ué, isso não seria por acaso……?"
31040-70 = "Olá. Por acaso, era a mim que estavam procurando?"
31040-71 = "!?!?"
31040-72 = "!?"
31040-73 = "[s] \"!?\""
31040-74 = "H-hã, como!? V-você, como é que saiu da cela!? Eu tranquei a chave direitinho!?"
31040-76 = "Não, tava aberta, viu? Ouvi umas vozes que pareciam falar de mim, então vim até aqui. Precisavam de algo?"
31040-77 = "Ora. Uma pessoa adulta, ou seja…… o Sensei, né. Reapresentando-me, olá. Ah, sei, por acaso é do Clube de Aulas de Reforço?"
31040-78 = "P-peraí!! Não sai por aí com essa roupa!? Ei!!"
