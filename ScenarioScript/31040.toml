[translation]
31040-1 = "Episódio 4: As Alunas do Clube de Reforço (1)"
31040-3 = "E-eh, é que… bem…"
31040-4 = "O motivo inevitável pra isso ter acontecido é…"
31040-5 = "Eu acabei matando aula pra ir no show guerrilheiro da Peroro-sama… e aí…"
31040-6 = "[s] \"……。\""
31040-7 = "Uuu……"
31040-8 = "N-não me olha com essa cara fria assim, por favor…！ Eu juro que tinha confirmado a data da prova! Deve ter sido algum engano, ou erro de cálculo…"
31040-9 = "……。"
31040-10 = "Auuu… d-desculpa…"
31040-11 = "[s] \"Não precisa pedir desculpa pra mim não…\""
31040-12 = "S-sim. Então…"
31040-13 = "A Nagisa-sama me pediu pra ajudar o Sensei…"
31040-15 = "……Por isso, Hifumi-san. Você poderia ajudar o Sensei e ao mesmo tempo guiar o Clube de Reforço?"
31040-16 = "Hã!? E-eu!?"
31040-17 = "Sim. Afinal, só alguém como você, que é uma ótima aluna, conseguiria fazer isso."
31040-18 = "E-eu não sou tão boa assim… minhas notas são só medianas… e agora tô correndo risco de reprovação…"
31040-19 = "Fufu. Eu avalio muito o «amor» da Hifumi-san. Além disso, agora é a sua vez de retribuir esse «amor» pra mim… não é?"
31040-20 = "A-auuu…"
31040-21 = "Fufu. Então é isso. Conte comigo, presidente do Clube de Reforço."
31040-24 = "[ns] \"Você era a presidente!?\""
31040-25 = "B-bom, só temporariamente… o Clube de Reforço é um clube criado de forma especial e limitada…"
31040-26 = "Quando todas forem salvas da reprovação, o clube deve ser dissolvido naturalmente."
31040-27 = "E-então… por favor, cuide de nós até lá, Sensei."
31040-28 = "[s] \"Tá bom. Vamos nessa, Hifumi.\""
31040-29 = "Mesmo estando nessa situação… fico feliz que o Sensei seja o responsável."
31040-30 = "Ah, você ainda não conheceu as outras membros do Clube de Reforço, né?"
31040-31 = "Pela lista, somos quatro no total, me incluindo."
31040-32 = "Vamos encontrá-las então, Sensei. Primeiro precisamos fazer um plano pra ninguém ser reprovada…"
31040-35 = "[ns] Segue Hifumi."
31040-38 = "Sala do Comitê de Execução da Justiça"
31040-39 = "[ns] \"Aqui é…\""
31040-40 = "A-ah… eu não queria vir aqui de novo…"
31040-41 = "Com licença… tem alguém aí?"
31040-45 = "……。"
31040-46 = "Ah, o-oi."
31040-47 = "……。"
31040-48 = "E-eh…"
31040-49 = "……O que é?"
31040-50 = "A-au… é que…"
31040-51 = "……。"
31040-52 = "Auuu… será que eu fiz alguma coisa errada…?"
31040-53 = "[s] \"Acho que ela só é um pouco tímida com estranhos.\""
31040-54 = "……Q-quem é tímida!？"
31040-55 = "É só que eu não conheço vocês, então tô só em modo de alerta!？"
31040-56 = "[s] \"Acho que isso se chama «timidez», né…？\""
31040-57 = "Ugh……"
31040-58 = "……E então, o que o Comitê de Execução da Justiça quer?"
31040-59 = "E-eh… a gente tá procurando alguém…"
31040-60 = "Hã!? Tá querendo pedir pro Comitê de Execução da Justiça pra procurar gente? Acha que somos algum serviço de voluntariado? Não temos tempo pra isso!"
31040-61 = "Não, é que… ouvi dizer que tem alguém preso aqui…"
31040-62 = "……Hã?"
31040-63 = "Então, é que… alguém que fez coisa errada tá preso aqui…"
31040-64 = "Eh, será que é…？"
31040-70 = "Olá. Estavam me procurando?"
31040-71 = "！？！？"
31040-72 = "！？"
31040-73 = "[s] \"！？\""
31040-74 = "E-eh, como assim!? Como você saiu da cela!? Eu tranquei direito!？"
31040-76 = "Não, a porta tava aberta? Ouvi vozes falando de mim, então vim ver o que era. Precisam de algo?"
31040-77 = "Ara. Um adulto… então você é o Sensei. Prazer em conhecê-lo. Entendi, então você é o do Clube de Reforço?"
31040-78 = "E-espera！！ Não fica andando assim vestida desse jeito！？ Ei！！"
31040-83 = "Ura"
