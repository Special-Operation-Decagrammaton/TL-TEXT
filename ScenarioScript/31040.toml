31040-169 = "Do 2º ano do Clube de Aulas de Reforço, Azusa Shirasu."
31040-170 = "Perseguida pelo Comitê de Realização da Justiça sob suspeita de agressão dentro da escola, ocupou o paiol das bombas de gás lacrimogêneo de uso didático."
31040-171 = "Detonou cerca de 1 tonelada de bombas de gás lacrimogêneo e, após 3 horas de resistência, foi presa."
31040-172 = "Até o instante da prisão, resistiu ferozmente usando todo tipo de armadilha booby-trap e IED. Muitas baixas."
