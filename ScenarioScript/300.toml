[translation]
300-1 = "Torneio de Tática Conjunta"
300-2 = "Estádio Principal de Kivotos"
300-3 = "Finalmente, o famoso Torneio de Tática Conjunta de Kivotos começou com todo o esplendor!"
300-4 = "O local já está super agitado com o entusiasmo das alunas!"
300-5 = "Desta vez, queremos ouvir as impressões de alguém que é o centro das atenções: o Sensei da Schale, que está liderando as alunas diretamente na competição."
300-6 = "Com que tipo de determinação você pretende enfrentar este torneio?"
300-8 = "……Eh? Você não sabe o que é o Torneio de Tática Conjunta?"
300-9 = "Isso é…… um grande furo de reportagem!"
300-10 = "＜Impactante! O famoso Sensei da Schale não tem interesse no Torneio de Tática Conjunta!!!...＞"
300-11 = "Eh, uma forma maliciosa de escrever? De jeito nenhum, nós da 'Kivotos Mensal' sempre reportamos apenas os fatos!"
300-12 = "Bem…… às vezes o foco pode desviar um pouco."
300-13 = "De qualquer forma, é um grande problema. O Sensei não saber sobre o Torneio de Tática Conjunta..."
300-14 = "Mas não saber algo é apenas uma oportunidade para aprender com calma. Eu vou te ensinar!"
300-15 = "O Torneio de Tática Conjunta é uma competição organizada pelo Conselho Estudantil Geral para testar as táticas das alunas."
300-16 = "Utilizando vários espaços dentro de Kivotos, realizamos avaliações de combate e prêmios são concedidos de acordo com a classificação!"
300-17 = "Como os prêmios incluem equipamentos raros que não podem ser comprados nem com dinheiro, a competição entre os clubes é intensa."
300-18 = "Até onde as alunas lideradas pelo Sensei conseguirão chegar neste torneio!?"
300-19 = "Desejo-lhe boa sorte! Ah, e ficaria feliz se você trouxesse pautas interessantes para as minhas matérias!"
