[translation]
300-1 = "合同戦術対抗戦"
300-2 = "キヴォトス・メインスタジアム"
300-3 = "いよいよキヴォトスの名物、合同戦術対抗戦が華麗に幕を上げました！"
300-4 = "すでに生徒たちの熱気で、現場は非常に盛り上がっていますね！"
300-5 = "今回は特別に、話題の中心人物！生徒たちを直接率いて大会に参加する、シャーレの先生に感想を聞いてみたいと思います。"
300-6 = "今回の対抗戦には、どのような覚悟で挑むおつもりでしょうか？"
300-8 = "……え？合同戦術対抗戦が何なのか知らない？"
300-9 = "これは……大スクープですね！"
300-10 = "＜衝撃！今話題の人物であるシャーレの先生、合同戦術対抗戦に興味なし……＞"
300-11 = "え、悪意のある書き方、ですか？そんなことありません、私たち『月刊キヴォトス』は、常に事実を元にした事件だけを報道しています！"
300-12 = "まあ……焦点が多少ずれることもありますが。"
300-13 = "とにかく一大事です。先生が合同戦術対抗戦について知らないだなんて……。"
300-14 = "ですが知らないことは、今からゆっくりと学んでいけばいいんです。私が教えてあげましょう！"
300-15 = "合同戦術対抗戦は、連邦生徒会の主催で開催される、生徒たちの戦術を競う大会です。"
300-16 = "キヴォトス内のさまざまなスペースを借りて、戦闘評価を行い、その順位に応じて賞が与えられます！"
300-17 = "特に賞品には、お金を出しても買えないぐらいのレアな装備も含まれているので、部活同士の競争が激しいのです。"
300-18 = "先生が率いる生徒たちは、果たしてこの大会でどこまで上がれるでしょうか！？"
300-19 = "ではご武運をお祈りします！あ、それと、面白い記事のネタも持って来てくださると嬉しいです！"
