[translation]
10000090-1 = "第9話;[ruby=忍者]少女[/ruby]の夢"
10000090-2 = "（百鬼夜行の商店街の会長、ニャン天丸の計画は何とか阻止することに成功）"
10000090-3 = "（魑魅一座は、ニャン天丸の敗北が分かった途端、蜘蛛の子を散らすように逃げてしまった）"
10000090-4 = "（そして……）"
10000090-6 = "くっ、しつこいやつらめ……！"
10000090-8 = "ひと段落かなって思ってたけど、なかなか終わらなさそうだね～。"
10000090-9 = "とにかく片っ端からやらないと、ツバキ先輩！ミモリ先輩！"
10000090-10 = "はい。桜花祭のフィナーレを邪魔させるわけにはいきません、頑張りましょう！"
