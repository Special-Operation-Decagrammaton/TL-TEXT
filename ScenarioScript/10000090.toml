[translation]
10000090-1 = "Episódio 9; O Sonho da Garota Ninja"
10000090-2 = "（Conseguimos de alguma forma impedir os planos do presidente do distrito comercial de Hyakkiyako, Nyantemaru.）"
10000090-3 = "（Assim que a Trupe Chimi percebeu a derrota de Nyantemaru, eles fugiram se espalhando para todos os lados.）"
10000090-4 = "（E então...）"
10000090-6 = "Urgh, que gente insistente...!"
10000090-8 = "Achei que as coisas tivessem se acalmado, mas parece que isso não vai acabar tão cedo~."
10000090-9 = "De qualquer forma, temos que acabar com eles um por um, Tsubaki-senpai! Mimori-senpai!"
10000090-10 = "Sim. Não podemos deixar que atrapalhem o encerramento do Festival das Cerejeiras em Flor. Vamos dar o nosso melhor!"