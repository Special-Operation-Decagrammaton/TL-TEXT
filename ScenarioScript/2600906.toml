[translation]
2600906-1 = "A limpeza do Clube de Desenvolvimento de Jogos"
2600906-2 = "（Visitou a sala do clube para ajudar na limpeza do Clube de Desenvolvimento de Jogos）"
2600906-7 = "Sala do Clube de Desenvolvimento de Jogos da Millennium"
2600906-14 = "[ns] \"……Yuzu?\""
2600906-16 = "P-p-p-sensei!? D-desde quando você está aí……?"
2600906-17 = "Eu não percebi nada…… Por que você está aqui……?"
2600906-18 = "[s] \"Vim ajudar você com a limpeza, Yuzu.\""
2600906-19 = "Ah, entendo…… Muito obrigada."
2600906-20 = "Mas não precisa se preocupar. Eu já quase terminei."
2600906-21 = "[s1] \"Quase terminou……?\"\n[s2] \"Mas ainda tem sacos de salgadinho e latas vazias em cima da mesa…….\""
2600906-24 = "Em cima da mesa……?"
2600906-31 = "……Ah. Talvez eu tenha causado um mal-entendido."
2600906-32 = "Quando eu disse que ia limpar, eu não estava falando da sala do clube, mas sim do armazenamento do computador."
2600906-33 = "O armazenamento do computador é como o espaço de trabalho real; se você não organizar os arquivos temporários acumulados, a velocidade de processamento cai."
2600906-34 = "Especialmente ultimamente, como tenho trabalhado nele por muito tempo, sinto que a velocidade ficou bem lenta……"
2600906-35 = "Por isso, eu estava fazendo uma \"limpeza\" para excluir arquivos desnecessários e organizar o registro."
2600906-36 = "[ns] \"Então era por isso que você disse que faria sozinha…….\""
2600906-38 = "[ns] \"E quanto à limpeza da sala do clube……?\""
2600906-39 = "A-a sala do clube……?"
2600906-40 = "Bem, a limpeza da sala…… eu tenho outras tarefas para fazer, e as outras integrantes do clube não parecem se importar muito…… então pensei que poderia deixar para depois……."
2600906-41 = "[s3] \"Não pode. Se deixar para depois, vai ficar ainda mais difícil.\"\n[s4] \"Eu vou ajudar, vamos arrumar agora.\""
2600906-44 = "Uuu…… m-mas se eu começar a limpar agora, minhas roupas vão ficar sujas…… e eu não tenho outra muda de roupa……."
2600906-45 = "[s5] \"Eu estava preparado para isso…….\"\n[s6] \"Peguei um uniforme de empregada emprestado com o 'Maidramatic'!\""
2600906-48 = "――Por que você fez isso?!"
2600906-49 = "……Mas, como o sensei disse, se eu não limpar logo, vai ficar ainda pior, e como não tenho outra roupa de trabalho……."
2600906-58 = "Só um pouco…… só enquanto estiver limpando……."
2600906-59 = "……Vou me trocar no vestiário."
2600906-68 = "（Depois disso, limpei a sala com a Yuzu vestida de empregada）"
2600906-70 = "……Pronto, terminamos tudo. Bom trabalho……."
2600906-71 = "[s] \"Bom trabalho, Yuzu.\""
2600906-72 = "……Como você disse, sensei, foi bom ter limpado."
2600906-73 = "Ver a sala limpa me deu uma nova motivação."
2600906-74 = "Mas, ainda assim, é muito vergonhoso usar um uniforme de empregada na sala do clube…… Tenho que me trocar antes que alguém chegue――"
2600906-80 = "Yuzu-bucho, tem um minuto?"
2600906-81 = "É sobre aquele chefe do jogo que peguei emprestado, o padrão de ataque dele é difícil de ler e――"
2600906-86 = "Ah…… auuu……."
2600906-87 = "……."
2600906-88 = "Bem…… dessa vez também, é que……."
2600906-89 = "……Então era isso mesmo. Desculpa, atrapalhei de novo……."
2600906-90 = "E-espera…… é um mal-entendido――!"
2600906-92 = "Bom, eu volto depois!"
2600906-94 = "U-uaaaaaaa……!"
2600906-96 = "（Depois disso, tive muito trabalho para acalmar a Yuzu, que se trancou no vestiário）"
