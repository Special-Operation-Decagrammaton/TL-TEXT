[translation]
2600906-1 = "ゲーム開発部の掃除"
2600906-2 = "（ゲーム開発部の掃除を手伝うために部室を訪れた）"
2600906-7 = "ミレニアム・ゲーム開発部の部室"
2600906-14 = "[ns] \"……ユズ？\""
2600906-16 = "せ、せせ、先生！？い、いつから……？"
2600906-17 = "全然気づきませんでした……どうしてここに……？"
2600906-18 = "[s] \"ユズの掃除を手伝いに来たよ。\""
2600906-19 = "あ、そうでしたか……ありがとうございます。"
2600906-20 = "でも大丈夫です。もうほとんど終わってますから。"
2600906-21 = "[s1] \"ほとんど終わってる……？\"\n[s2] \"机の上にお菓子の袋や空き缶が残ってるけど……。\""
2600906-24 = "机の上……？"
2600906-31 = "……あ。もしかして、誤解させてしまったかもしれません。"
2600906-32 = "わたしが掃除すると言っていたのは、#n部室ではなくパソコンのストレージのことです。"
2600906-33 = "パソコンのストレージも現実の作業スペースと同じで、#n溜まった一時ファイルを整理してあげないと#n作業速度が遅くなるんです。"
2600906-34 = "特に最近は長い間作業していたからか、#n速度がかなり遅くなった気がして……"
2600906-35 = "ですので、不要なファイルを削除し#nレジストリを整理する「掃除」をしていたわけです。"
2600906-36 = "[ns] \"だから一人でするものって言ってたんだ……。\""
2600906-38 = "[ns] \"じゃあ、部室の掃除の方は……？\""
2600906-39 = "ぶ、部室ですか……？"
2600906-40 = "ええと、部室の掃除は……他にやらないといけない作業もあるし、部員のみんなも特に気にしてないみたいだし……後で、いいかな、と……。"
2600906-41 = "[s3] \"ダメだよ。後回しにすると余計に大変になるから。\"\n[s4] \"手伝うから、今から片付けよう。\""
2600906-44 = "うう……で、でもこのまま掃除を始めたら#n服が汚れちゃいそうで……着替えもないですし……。"
2600906-45 = "[s5] \"こんなこともあろうかと……。\"\n[s6] \"「メイドラマチック」からメイド服を借りてきたよ！\""
2600906-48 = "――何でですか！"
2600906-49 = "……でも先生の仰る通り、#n早く掃除をしないともっと大変になるでしょうし、#n他の作業着もないので……。"
2600906-58 = "少しだけ……掃除をしている間だけなら……。"
2600906-59 = "……ロッカーで着替えてきます。"
2600906-68 = "（その後、メイド服を着たユズと部屋の掃除をした）"
2600906-70 = "……これで一通り終わりましたね。お疲れ様でした……。"
2600906-71 = "[s] \"お疲れ様、ユズ。\""
2600906-72 = "……先生の仰る通り、掃除をしてよかったです。"
2600906-73 = "綺麗になった部室を見ていると、なんだかやる気が湧いてきましたから。"
2600906-74 = "ですが、やっぱり部室でメイド服を着ているのは恥ずかしいです……。#n人が来る前に早く着替えないと――"
2600906-80 = "ユズ部長ー、ちょっといいー？"
2600906-81 = "この前借りたゲームのボスなんだけどさー、#n行動パターンが読みにくくて――"
2600906-86 = "あ……あうぅ……。"
2600906-87 = "………。"
2600906-88 = "ええと……今回も、その……。"
2600906-89 = "……やっぱりそういうことだったんだ。#nごめん、また邪魔しちゃったね……。"
2600906-90 = "ま、待っ……だから誤解――！"
2600906-92 = "じゃ、また出直してくるね！"
2600906-94 = "う、うあああああ……！"
2600906-96 = "（その後、ロッカーに引きこもったユズをなだめるのに苦労した）"
