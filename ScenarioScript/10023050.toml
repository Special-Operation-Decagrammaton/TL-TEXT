[translation]
10023050-1 = "第5話;晴れのち曇り、怪盗注意報"
10023050-2 = "慈愛の……？"
10023050-3 = "……怪盗？"
10023050-4 = "あの人が……"
10023050-5 = "緊急クエスト発生です！"
10023050-9 = "……！"
10023050-18 = "え……？#nトキさん、一体何を！？"
10023050-20 = "……"
10023050-22 = "……"
10023050-24 = "その並外れた身のこなし――美しい。"
10023050-25 = "私の身体能力を見定めて、どうするつもりですか？"
10023050-26 = "ふふっ……純粋な褒め言葉ですよ。"
10023050-27 = "お礼でも述べるべきでしたか？"
10023050-31 = "嗚呼、この美学が通じないだなんて――私はとても悲しいです。"
10023050-33 = "……？#n意図を図りかねますが……"
10023050-34 = "――私は「王冠」と呼ばれる盗品を探しています。#nあなた、何かご存知なのでは？"
10023050-35 = "何故、それを[ruby=わたくし] 私 [/ruby]に？"
10023050-36 = "あなた、泥棒なのでしょう？"
10023050-37 = "……"
10023050-38 = "失礼、それとも「泥棒様」とお呼びしたほうが良かったですか？"
10023050-39 = "ふふっ……嗚呼、そうですね。"
10023050-40 = "一つ、訂正をさせてくださいませ。"
