[translation]
1009802-1 = "ヒーロー、誕生"
1009802-8 = "（ホシノに連絡をもらい、アビドスへ向かった）"
1009802-13 = "うぅ……ここは予測値で、こっちは目標値？"
1009802-14 = "数字ばっかりで頭が痛いよ～。"
1009802-15 = "[s1] \"……もしかして、書類仕事？\"\n[s2] \"書類に囲まれてるなんて珍しいね。\""
1009802-20 = "あっ、先生！"
1009802-21 = "もう来てくれたの？"
1009802-22 = "助かったよ～。"
1009802-23 = "[s] \"困ってそうだったからね。\""
1009802-24 = "うへ～、心配させちゃったかな。"
1009802-25 = "ごめんごめん。"
1009802-26 = "[s] \"その書類仕事を手伝えば良いんだよね？\""
1009802-30 = "あれ、どうして分かったの？"
1009802-31 = "……おじさん、そこまでつらそうな顔してたかな？"
1009802-32 = "まぁ、その通りなんだけど。"
1009802-33 = "先生も知ってるようにさ、#nここ最近アビドスでいろんなことがあったでしょ？"
1009802-34 = "そのせいで、書類が溜まっててね。"
1009802-35 = "……べ、別におじさんが面倒で放置してたわけじゃないよ。"
1009802-36 = "[s] \"……どうしてホシノ一人でやってるの？\""
1009802-37 = "あ～。"
1009802-38 = "実は、自分でやるって言い出しちゃったんだよね。"
1009802-39 = "書類がこんなに溜まってるのは、おじさんの責任でもあるし。"
1009802-40 = "みんなには、いつもお世話になってるからさ。"
1009802-42 = "それで、書類ならおじさんがやるよ～って言っちゃって。"
1009802-43 = "昔みたいに、なんとかなると思ってたんだけど……。"
1009802-44 = "この量は、さすがに厳しくてね。"
1009802-45 = "[s] \"それで私に連絡をくれたんだ。\""
1009802-46 = "うへ～。"
1009802-47 = "自分でやるって言っておいて、#n今さら助けて～なんて言いづらいじゃん？"
1009802-48 = "でも、一人で抱えて期限内に終わらなかったら、#nみんなに迷惑かけちゃうし。"
1009802-49 = "そこで先生なら、助けてくれるかな～って。"
1009802-50 = "あとでちゃんとお礼はするから、おじさんのこと助けてくれない……？"
1009802-51 = "[s] \"もちろんだよ、書類仕事なら慣れてるから。\""
1009802-52 = "ほんと！？"
1009802-53 = "ありがと～先生！"
1009802-55 = "[ns] \"けど……。\""
1009802-59 = "[ns] \"ちゃんとお礼はしてもらおうかな？\""
1009802-60 = "ちょ、ちょっと目が怖いよ、先生。"
1009802-61 = "おじさんにどんな命令をするつもりなの……？"
1009802-62 = "う～ん。"
1009802-66 = "まぁ、そもそも先生の手を借りないと終わらないし、しょうがないか。"
1009802-67 = "[s] \"それで、まずは何をすれば良い？\""
1009802-71 = "収支報告書からお願い！"
1009802-72 = "いや、在庫管理表も手を付けてなかったっけ……。"
1009802-79 = "（こうして、ホシノの書類仕事を手伝い始めた）"
1009802-85 = "[ns] \"これで終わりかな？\""
1009802-86 = "……。"
1009802-87 = "すごいよ、先生！"
1009802-88 = "おじさんだけだったら、絶対に3日はかかってたのに！"
1009802-89 = "やっぱり先生に頼って良かった～！"
1009802-90 = "[s] \"書類仕事なら、いつもやってるから。\""
1009802-91 = "そっか、さすがは大人だね。"
1009802-92 = "いや～本当に助かったよ。"
1009802-93 = "ありがとう、先生。"
1009802-94 = "[s] \"どういたしまして。\""
1009802-98 = "[ns] \"それで、お礼なんだけど……。\""
1009802-102 = "う、うへ～。#nやっぱりそうなるよね……。"
1009802-103 = "まぁ、先生に助けてもらったのは事実だし。"
1009802-104 = "おじさんにできることなら、何でも言ってよ。"
1009802-105 = "……でも、あんまり恥ずかしくないやつでお願いしたいかな。"
1009802-110 = "[ns3] \"体操服を着てほしいんだ！\"\n[ns4] \"スクール水着を着てほしいんだ！\""
1009802-113 = "うへっ！？"
1009802-114 = "せ、先生……？"
1009802-115 = "おじさんのそんな格好が見たいって……本気で言ってるの？"
1009802-116 = "[s] \"本気だよ！絶対可愛いと思う！\""
1009802-117 = "か、可愛いって……#n先生はす～ぐ平気でそういうこと言うんだから。"
1009802-118 = "でも、褒めたところで無理なものは無理だよ。"
1009802-119 = "恥ずかしいのもそうだけど……。"
1009802-120 = "そんな姿をみんなに見られたら……。"
1009802-121 = "「ん、人の好みはそれぞれ……」とか、"
1009802-122 = "「わぁ☆ホシノ先輩、可愛いです☆」とか絶対言われるじゃん！"
1009802-123 = "……後輩たちから質問攻めに遭うのは勘弁だよ。"
1009802-124 = "[s] \"けど、さっきは何でもしてくれるって……。\""
1009802-128 = "何でも「言って」とは言ったけど、#n何でも「する」とは言ってないでしょ！"
1009802-129 = "せ、せめてもう少し恥ずかしくないお願いで……。"
1009802-130 = "[s] \"じゃあ、前に着てた戦闘服は？\""
1009802-131 = "戦闘服って……。"
1009802-132 = "たぶん、あれのことだよね。"
1009802-133 = "一応、あるにはあるけど……。"
1009802-138 = "[ns] \"じゃあ、それでお願いします！\""
1009802-139 = "急に元気になったね……。"
1009802-140 = "あれも恥ずかしいんだけどなぁ……。"
1009802-141 = "[s] \"お願いします！この通り！！\""
1009802-146 = "……はぁ。"
1009802-147 = "ま、体操服とかスクール水着よりはマシかな。"
1009802-161 = "うへぇ。"
1009802-162 = "まさか、またこの格好をするとはね。"
1009802-163 = "先生って、こういうのが好きなの……？"
1009802-164 = "[ns] \"うん、かっこいいよ！\""
1009802-165 = "そ、そう？"
1009802-166 = "うへへ、ちょっと恥ずかしいけど……。"
1009802-167 = "先生が喜んでくれたなら、まぁいっか。"
1009802-168 = "[s] \"一週間、この格好で過ごしてね！\""
1009802-172 = "い、一週間も！？"
1009802-173 = "さすがに、それは……。"
1009802-174 = "[s] \"だって、すごく似合ってるよ！\""
1009802-175 = "に、似合ってるって……。"
1009802-176 = "[s] \"ホシノ最高！\""
1009802-177 = "そ、そんなお世辞で落ちるくらい、おじさんはそんなにチョロくないよ。"
1009802-178 = "[s] \"お世辞じゃないよ、本当にかっこいいから！\""
1009802-179 = "うぅ……。"
1009802-184 = "分かったよ。"
1009802-185 = "それじゃ、一週間だけだからね？"
1009802-186 = "うへぇ、そんな嬉しそうな顔しちゃって……。#nそこまで喜ばれると、おじさん恥ずかしいなぁ。"
1009802-187 = "ほんと、先生って……。"
1009802-194 = "[ns] \"何の音？\""
1009802-195 = "……警報だね。"
1009802-196 = "不審者が現れたり、非常事態があった時にアラートが鳴る仕組み。"
1009802-201 = "……ヘルメット団だ。"
1009802-202 = "学校の掲示板で何をしてるんだろ……。"
1009802-203 = "とにかく、こうしちゃいられないね。"
1009802-207 = "行こう、先生。"
1009802-216 = "本当にやっちゃって良いのか？"
1009802-217 = "良いんだよ！#n潰れかけてる学校の掲示板なんて、必要ないだろ。"
1009802-218 = "だったら、ウチらが有効活用してやろうぜ！"
1009802-219 = "たしかに、使われてる形跡もないし……。"
1009802-220 = "おい、お前ら！#n早く運び出すぞ！"
1009802-223 = "はいっ！"
1009802-234 = "君たち、何してるのかな。"
1009802-238 = "そりゃ、これを奪って換金――"
1009802-246 = "っ！？"
1009802-252 = "抵抗せずに、大人しくした方が良いと思うけどな～。"
1009802-254 = "なんか文句でもあるのか？"
1009802-255 = "待て。#nあんな武装をしてるってことは、只者じゃ……。"
1009802-257 = "えっと、これには事情があって……。"
1009802-258 = "まあ、それは置いといて。#nその掲示板、うちの設備だから持って行かないでほしいんだよね。"
1009802-259 = "錆びたまま放置されてるじゃねぇか。"
1009802-260 = "どうせ使われてないんだったら、ウチらがもらっていっても良いだろ？"
1009802-264 = "……。"
1009802-265 = "うーん。"
1009802-266 = "あんまり問題にはしたくないんだけどなぁ。"
1009802-267 = "いくら使ってないとはいえ、学校の財産なんだよね。\n"
1009802-268 = "そっちが引き下がらないなら、戦うしかないか……。"
1009802-272 = "……やんのか？"
1009802-273 = "いくら武装したところで、この数に勝てるとでも？"
1009802-275 = "お前ら、囲め！"
1009802-283 = "痛い目に遭いたくなかったら、今のうち――"
1009802-296 = "おい、大丈夫か！？"
1009802-297 = "くそっ。やるぞ、お前ら！"
1009802-303 = "……へぇ。"
1009802-308 = "意外と根性あるね。"
1009802-320 = "うへぇ。"
1009802-321 = "……ぐっ。"
1009802-329 = "ひ、一人で、これだけの人数を……！"
1009802-330 = "チッ、覚えとけよ！"
1009802-336 = "今どき「覚えとけよ」なんていかにもな捨て台詞、#nそうそう聞かないよねぇ。"
1009802-337 = "って、先生は大丈夫だった？#n怪我してない？"
1009802-338 = "[s] \"ホシノ……。\""
1009802-339 = "ん？"
1009802-340 = "どうしたの、せんせ――"
1009802-345 = "[ns] \"格好良かったよ！\""
1009802-349 = "大げさだなぁ、先生は。"
1009802-350 = "いつもと変わらないでしょ。"
1009802-351 = "……うん？#nこの装備で戦ってる姿が新鮮だったの？"
1009802-352 = "[s] \"まるで……\""
1009802-354 = "[ns] \"ヒーローみたいだった！\""
1009802-355 = "うへ～。"
1009802-356 = "アニメとか映画に出てくるアレだよね？"
1009802-357 = "おじさんとヒーローって、正反対な気がするけど……。"
1009802-358 = "[s] \"大切な学校を守るために戦う姿は、まさにヒーローだよ！\""
1009802-359 = "うへぇ、そんなに褒められると恥ずかしいよ。"
1009802-360 = "……えっ。"
1009802-361 = "タカナシ・ナイトって？"
1009802-366 = "せ、先生の考えたヒーロー名！？"
1009802-367 = "[ns] \"アビドスのヒーロー頑張れ～！\""
1009802-368 = "……うぅ。"
1009802-369 = "これならスクール水着のほうがマシだったかも……。"
