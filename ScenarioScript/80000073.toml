[translation]
80000073-1 = "A sós"
80000073-4 = "[ns1] \"Desculpe a espera, Ui.\"\n[ns2] \"O americano está do seu agrado?\""
80000073-5 = "Ah... Olá, Sensei. #nAcabei de terminar os preparativos."
80000073-6 = "Ah... Olá, Sensei. #nAcabei de terminar os preparativos."
80000073-10 = "Por favor, sente-se aqui... #nEu, eu preparei a mesa e as cadeiras com antecedência, então..."
80000073-11 = "E-então, por favor, aceite isto..."
80000073-17 = "[ns3] \"Uau, parece delicioso.\"\n[ns4] \"É o seu favorito, Ui?\""
80000073-18 = "E-eh, bem... não é exatamente uma questão de preferência... #nÉ só que pensei que biscoitos seriam melhores, já que não fazem tanta sujeira..."
80000073-19 = "E-eh, bem... não é exatamente uma questão de preferência... #nÉ só que pensei que biscoitos seriam melhores, já que não fazem tanta sujeira..."
80000073-20 = "...Aqueles ali? #nSim, deixei-os em um lugar afastado, por precaução."
80000073-21 = "Embora sejam biscoitos de chocolate um pouco mais macios, ainda assim podem soltar farelos..."
80000073-22 = "Sempre que há risco de sujar as mãos ou cair farelos, eu basicamente os evacuo..."
80000073-23 = "Ainda assim... mesmo sendo o Dia dos Namorados, ter um momento como este..."
80000073-24 = "...? Bem, para começar, eu não sou do tipo que se interessa por essas coisas..."
80000073-25 = "Para início de conversa, não se trata de chocolate ou algo do tipo... a maioria das garotas só está aproveitando o clima, não é?"
80000073-26 = "Bem, eu também... afastei aquelas minhas preciosas companheiras só para ficar de frente para você, Sensei..."
80000073-27 = "Bem, acho que é assim que as coisas são. #nFicar a sós com alguém assim..."
80000073-31 = "......??????"
80000073-32 = "[s5] \"...Ui?\"\n[s6] \"O-o que houve?\""
80000073-33 = "Ah... n-não... é que..."
80000073-34 = "Ah... n-não... é que..."
80000073-35 = "...D-desculpe, não é nada. #nEu, eu preciso me acalmar um pouco..."
80000073-36 = "N-não deveria ter ficado pensando naquelas coisas agora..."
80000073-37 = "Normalmente, mesmo quando você vem, elas ficam ao meu alcance... então, digamos que eu não estou acostumada com essa situação..."
80000073-38 = "M-mas, mesmo dizendo isso, não há nada que eu possa fazer agora..."
80000073-39 = "...O Sensei,"
80000073-40 = "parece não estar pensando em nada."
80000073-41 = "De alguma forma, parece que só eu..."
80000073-42 = "[s7] \"Bem...\"\n[s8] \"U-Ui? Você está bem?\""
80000073-43 = "Parece que só eu... e-estou agindo de forma estranha..."
80000073-44 = "Parece que só eu... e-estou agindo de forma estranha..."
80000073-45 = "..."
80000073-46 = "Haa..."
80000073-51 = "[ns9] \"P-por que você veio para o meu lado de repente!?\"\n[ns10] \"U-Ui-san!? Não está perto demais...?\""
80000073-52 = "...Ufa."
80000073-53 = "...Ufa."
80000073-54 = "...É bom. Consegui ver uma expressão rara. #nAgora estamos quites."
80000073-55 = "...Não, não se preocupe. Fui eu quem ficou inquieta."
80000073-59 = "B-bem, vamos mudar de assunto... quer comer?"
80000073-60 = "Então, Sensei... pegue um primeiro... p-por favor."
80000073-61 = "[s] \"...\""
80000073-63 = "[ns] Pega um biscoito."
80000073-65 = "(Depois disso, comi o café e os biscoitos que a Ui trouxe.)"
80000073-66 = "(O clima estava estranho no começo, mas aos poucos a Ui voltou ao seu estado normal, desabafando sobre as pessoas lá fora.)"
