[translation]
80000073-1 = "二人きり"
80000073-4 = "[ns1] \"お待たせ、ウイ。\"\n[ns2] \"飲み物は、アメリカーノで良かった？\""
80000073-5 = "あ……お疲れ様です、先生。#nちょうど準備が終わったところで。"
80000073-6 = "あ……お疲れ様です、先生。#nちょうど準備が終わったところで。"
80000073-10 = "こちらへどうぞ……。#nじ、事前にきちんと、テーブルとイスも用意しておきましたので……。"
80000073-11 = "で、では、こちらを……"
80000073-17 = "[ns3] \"すごい、美味しそうだね。\"\n[ns4] \"ウイが普段から好きなやつだったり？\""
80000073-18 = "え、えっと……好みとかではないですね……。#nただ単に、クッキーの方が、汚れにくくて良いかなと思い……。"
80000073-19 = "え、えっと……好みとかではないですね……。#nただ単に、クッキーの方が、汚れにくくて良いかなと思い……。"
80000073-20 = "……あの子たち、ですか？#nはい、念のため離れたところに。"
80000073-21 = "一応しっとりめのチョコクッキーではありますが、粉は出てしまいそうですし……。"
80000073-22 = "手が汚れたり、粉が落ちる可能性がある時は、基本的に避難を……。"
80000073-23 = "それにしても……バレンタイデーとはいえ、こんな場を……"
80000073-24 = "……？まあ元もと、興味は……ある方では、ありませんね……。"
80000073-25 = "そもそも、チョコがどうこうと言いますか……ほとんどの女の子は、雰囲気を楽しんでるだけと言いますか……。"
80000073-26 = "まあ私も、その……大切なあの子たちを端に寄せてまで、先生と向かい合っているわけですが……"
80000073-27 = "まあ、そういうものなのでしょう。#nこうやって……誰かと二人きりになって……"
80000073-31 = "……？？？？？？"
80000073-32 = "[s5] \"……ウイ？\"\n[s6] \"ど、どうしたの？\""
80000073-33 = "えぁっ……い、いえ……その……。"
80000073-34 = "えぁっ……い、いえ……その……。"
80000073-35 = "……す、すみません、何でもありません。#nす、少し落ち着かなくては……。"
80000073-36 = "い、今は……あの子たちのことを意識しないほうが、良かったですね……。"
80000073-37 = "普段は先生がいらした時でも、手の届くところにいたので……その、あまりこういった状況にならなかった、と言いますか……。"
80000073-38 = "だ、だからと言って、今さらどうこうするのも……。"
80000073-39 = "……先生は、"
80000073-40 = "何とも思ってなさそうですね。"
80000073-41 = "何だか、私だけ……。"
80000073-42 = "[s7] \"えっと……。\"\n[s8] \"う、ウイ？大丈夫？\""
80000073-43 = "私だけ……う、浮ついてる、みたいじゃないですか……。"
80000073-44 = "私だけ……う、浮ついてる、みたいじゃないですか……。"
80000073-45 = "……。"
80000073-46 = "はぁ……。"
80000073-51 = "[ns9] \"ど、どうして急に、隣に！？\"\n[ns10] \"う、ウイさん！？ちょっと近すぎなのでは……？\""
80000073-52 = "……ふう。"
80000073-53 = "……ふう。"
80000073-54 = "……良いですね。珍しい表情が見られました。#nこれでお互い対等、ということで。"
80000073-55 = "……いえ、お気になさらず。私が落ち着かなかっただけですので。"
80000073-59 = "さ、さあ、気を取り直して……食べると、しますか……？"
80000073-60 = "では、先生……お先にひとつ……ど、どうぞ。"
80000073-61 = "[s] \"……。\""
80000073-63 = "[ns] クッキーを手に取る。"
80000073-65 = "（その後、ウイと一緒に持ち寄ったコーヒーとクッキーを食べた）"
80000073-66 = "（最初はぎこちない空気だったが、次第に外の人に対する不満を吐き出すいつものウイに戻った）"
