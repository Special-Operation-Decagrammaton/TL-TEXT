[translation]
10035005-1 = "プロローグ"
10035005-4 = "失礼します！"
10035005-5 = "生活安全局の[ruby=なかつかさ]中務[/ruby]キリノ、[ruby=ねむがき]合歓垣[/ruby]フブキ、公安局長に用事があって参りました！"
10035005-6 = "入室してもよろしいでしょうか！"
10035005-7 = "そんな固くなる必要ないでしょ。"
10035005-8 = "普通に入ればいいじゃん。"
10035005-9 = "で、ですが、他の事務局に立ち入る際は、申告する規則ではありませんか！"
10035005-10 = "お前たち、何をしている。"
10035005-11 = "立ち話なら、中に入るか端に避けるかしろ。"
10035005-12 = "あっ！カンナ公安局長！"
10035005-13 = "お、噂をすればだねぇ。"
10035005-14 = "探す手間が省けたよ～"
10035005-15 = "ん？"
10035005-16 = "私に何か用が？"
10035005-17 = "はい！局長にお話がありまして！"
10035005-18 = "そうそう。約束してたマスタードーナッツの限定ボックス、#nいつ買ってくれるのかな～って。"
10035005-19 = "ええ！いつ買ってくださるのか――"
10035005-20 = "――ではなく！"
10035005-21 = "私はそれが気になったから、ついて来たんだけど？"
10035005-22 = "ドーナッツなら、さっき食べたばかりではありませんか！"
10035005-23 = "……公務に関係ない話なら、後でいいか？"
10035005-24 = "ドーナッツは、来週あたりにな。"
10035005-25 = "あっ！待ってください！#nちゃんとした用件があるのです！"
10035005-26 = "支援要請が届きまして！"
10035005-27 = "――公安局に？"
10035005-28 = "銃撃戦か？まだ報告は入っていないが。"
10035005-29 = "いえ、保安任務です！"
10035005-30 = "もうすぐ、「エーギル」ってウォーターパークがオープンするでしょ？"
10035005-31 = "で、どうもそこのライフセーバーが足りないらしくて。"
10035005-32 = "「フリーパスをあげるから、手伝ってほしい」って要請があったわけ。"
10035005-34 = "ライフセーバーか……。"
10035005-35 = "しかし、何故ヴァルキューレ警察学校が民間企業の支援に？"
10035005-36 = "人員が足りないなら、雇うかオープンを遅らせればいいだろうに……。"
10035005-37 = "まぁ、そこを気にしてもね。#nどうせ、上の話し合いで何かあったんでしょ。"
10035005-38 = "私たちからしても、悪いことはなさそうだし？"
10035005-39 = "炎天下でパトロールしたり、山積みになってる書類を片付けたり、#n窓口でクレームを聞いたり……。"
10035005-40 = "そんな事するより、ウォーターパークの方が絶対楽なんだからさ。"
10035005-41 = "プールで浮き輪に体を預けて波を楽しむ～みたいな？"
10035005-42 = "たまには、そういうのも大事だよね。"
10035005-43 = "……休暇ではないだろうに。"
10035005-44 = "まあ、正式な命令が下りているのなら、構わないが。"
10035005-45 = "何故、私のところに？"
10035005-46 = "所属も違うだろう？"
10035005-47 = "出向届けなら、生活安全局の局長にした方がいいぞ。"
10035005-48 = "その、実はですね……。"
10035005-49 = "出向届の提出はもう終わっておりまして……。"
10035005-50 = "ならば、なおさら私を訪ねる必要はないはずだが……"
10035005-51 = "違うんです。#nその……"
10035005-52 = "カンナ局長も、出向者のリストに入っているのです！"
10035005-56 = "……は？"
10035005-57 = "#video;10035"
