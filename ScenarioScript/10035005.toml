[translation]
10035005-1 = "Prólogo"
10035005-4 = "Com licença!"
10035005-5 = "Kirino Nakatsukasa e Fubuki Nemugaki, do Departamento de Segurança Pública, viemos falar com a Chefe do Departamento de Segurança Pública!"
10035005-6 = "Podemos entrar?!"
10035005-7 = "Não precisa ser tão formal assim."
10035005-8 = "É só entrar normalmente."
10035005-9 = "M-mas, não é uma regra declarar a entrada ao visitar outros departamentos administrativos?!"
10035005-10 = "Vocês duas, o que estão fazendo?"
10035005-11 = "Se vão ficar conversando, entrem ou saiam do caminho."
10035005-12 = "Ah! Chefe Kanna!"
10035005-13 = "Ora, falando nela."
10035005-14 = "Isso nos poupou o trabalho de procurar~"
10035005-15 = "Hm?"
10035005-16 = "Algum assunto comigo?"
10035005-17 = "Sim! Temos algo para tratar com a Chefe!"
10035005-18 = "Isso mesmo. Sobre aquela caixa limitada de Master Donuts que você prometeu, #nquando é que você vai comprar para a gente?"
10035005-19 = "É! Quando é que a senhora vai comprar—"
10035005-20 = "—Não é isso!"
10035005-21 = "Eu vim junto porque fiquei curiosa sobre isso, sabe?"
10035005-22 = "Mas a gente não acabou de comer donuts agora pouco?!"
10035005-23 = "……Se não for algo relacionado ao serviço, podemos deixar para depois?"
10035005-24 = "Os donuts ficam para a semana que vem."
10035005-25 = "Ah! Espere! #nNós temos um assunto sério para tratar!"
10035005-26 = "Recebemos um pedido de apoio!"
10035005-27 = "—O Departamento de Segurança Pública?"
10035005-28 = "Houve um tiroteio? Ainda não recebi nenhum relatório."
10035005-29 = "Não, é uma missão de segurança!"
10035005-30 = "O parque aquático chamado \"Aegir\" vai abrir em breve, não vai?"
10035005-31 = "Pois é, parece que eles estão precisando de salva-vidas."
10035005-32 = "Eles fizeram um pedido dizendo: \"Nós damos passes livres se vocês nos ajudarem\"."
10035005-34 = "Salva-vidas, é……"
10035005-35 = "Mas por que a Academia de Polícia Valkyrie estaria apoiando uma empresa privada?"
10035005-36 = "Se eles não têm pessoal, deveriam contratar mais ou adiar a abertura……"
10035005-37 = "Ah, não precisa se preocupar com isso. #nDe qualquer forma, deve ter rolado alguma conversa entre os superiores."
10035005-38 = "E para nós, não parece ser algo ruim, né?"
10035005-39 = "Ficar patrulhando sob o sol escaldante, organizar pilhas de documentos, #nou ouvir reclamações no balcão……"
10035005-40 = "Comparado a isso, trabalhar num parque aquático é muito mais tranquilo."
10035005-41 = "Tipo, ficar boiando na piscina curtindo as ondas~ sabe?"
10035005-42 = "De vez em quando, isso é importante também."
10035005-43 = "……Não é como se isso fosse um período de férias."
10035005-44 = "Bem, se uma ordem oficial foi emitida, não me oponho."
10035005-45 = "Mas por que vieram até mim?"
10035005-46 = "Vocês não são de outro departamento?"
10035005-47 = "Se é um pedido de transferência temporária, deveriam falar com o chefe do Departamento de Segurança Pública."
10035005-48 = "Sobre isso, na verdade……"
10035005-49 = "O pedido de transferência já foi entregue……"
10035005-50 = "Então, menos ainda deveriam estar me procurando……"
10035005-51 = "Não é isso. #nÉ que……"
10035005-52 = "A Chefe Kanna também está na lista de transferidos!"
10035005-56 = "……Hã?"
10035005-57 = "#video;10035"
