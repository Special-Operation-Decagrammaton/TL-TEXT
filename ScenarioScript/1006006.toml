[translation]
1006006-1 = "温泉とラーメンのつながり"
1006006-2 = "（約束の時間に合わせて、待ち合わせ場所に着いた)"
1006006-3 = "（そこは繁華街から距離のある静かなところだった)"
1006006-7 = "やっほ～！先生～！！ここだよ、ここ！"
1006006-8 = "[s1] \"メグ～！\"\n[s2] \"こんなところで何してるの？\""
1006006-11 = "え？何してたのかって？"
1006006-12 = "えっとね～ラーメン作る準備！"
1006006-13 = "わざわざここで作る理由……？"
1006006-14 = "うーん、"
1006006-15 = "なんでだろう……。"
1006006-16 = "ラーメン作る時は、こうやって静かなところに来るんだよね。"
1006006-17 = "邪魔する人もいないし～ガヤガヤ騒がしい人もいないし！"
1006006-18 = "あ、でも……"
1006006-19 = "強いて言うなら……。"
1006006-21 = "ラーメンがぐつぐつしてる所をじっくり見られるから……かなぁ？"
1006006-22 = "……ぐつぐつしてるとこ見てて楽しいのかって？"
1006006-26 = "う～ん……。"
1006006-27 = "……なんて説明したらいいんだろう……？"
1006006-28 = "[s3] \"麺が茹で上がっていく様子が好きなの？\"\n[s4] \"料理に集中したいってこと？\""
1006006-31 = "う～ん、そういうわけではないかも。"
1006006-32 = "別に料理上手でもないからね……。だから袋麺なわけだし。"
1006006-33 = "なんて言うか……ぼーっと見てるとね……。"
1006006-34 = "そのうち、温泉みたいに見えてきて……。"
1006006-35 = "そんな感じなんだけど……先生もそう思わない？"
1006006-39 = "[ns5] \"モクモクとした湯気とか？\"\n[ns6] \"お湯が沸いてるところが？\""
1006006-42 = "ん～、よく分かんない！#nけど、大体そんな感じ、かな？"
1006006-43 = "考えてみてよ、先生。"
1006006-44 = "あっ、私が先生に考えてって言うのはなんか変かな……。"
1006006-45 = "……ま、それは置いといてさ！"
1006006-46 = "ラーメンが茹で上がっていく様子を思い返してみて！"
1006006-47 = "ぐつぐつ湧いてるお湯に材料を入れると、段々ふにゃふにゃ～ってなるでしょ？"
1006006-48 = "それで、ゆらゆらと水蒸気が上ってくとこを見てると……。"
1006006-49 = "ラーメンにとっての温泉みたいだな～って！"
1006006-50 = "そういうの見てると、嬉しくなってくるんだ～。#n温泉にゆったり浸かってると、身体がほぐれてくのと一緒でしょ？"
1006006-51 = "温泉に浸かってる時って、一番幸せな時間だと思うんだよね！"
1006006-52 = "……うん？"
1006006-53 = "それじゃあラーメン以外の汁物はどうなのって？"
1006006-54 = "もちろん好きだよ！#nでも、自分で作れるのはラーメンだけだから！"
1006006-55 = "あとは、ラーメンだとその光景を見たいな～って思ったらすぐ作れちゃうし！"
1006006-56 = "……だからラーメンが好きなのかな。#nううん、だからラーメンが好きなんだ！"
1006006-57 = "[s7] \"面白い考え方だね。\"\n[s8] \"食べるのも楽しくなるよね。\""
1006006-60 = "あはは。先生なら分かってくれると思った～！"
1006006-61 = "そんな先生のためにも、早くラーメン作らないとね。"
1006006-62 = "ね、先生！#n一緒にラーメン茹でてるとこ見よ！！"
1006006-67 = "こっち座って！私が作ってあげる！"
1006006-73 = "（その後、メグが作ってくれたラーメンを2人で食べた）"
1006006-78 = "（よくある市販の袋麺だったけど、空の下で一緒に食べるラーメンは特別おいしかった）"
1006006-81 = "ぷは～！ごちそうさま！！"
1006006-82 = "先生は？まだ食べられそうなら、もう一つ茹でよっか？"
1006006-83 = "あ、もう大丈夫？"
1006006-84 = "あははっ。"
1006006-85 = "私もお腹いっぱいだよ！"
1006006-89 = "ふあぁ……風が気持ちいいね……。"
1006006-93 = "……あ。"
1006006-96 = "ハムが残って浮かんでる。#nふわふわだね～ふわふわ！！"
1006006-97 = "[ns9] \"温泉に浸かってるみたいだね。\"\n[ns10] \"のんびり浮かんでるね。\""
1006006-101 = "あははははっ！先生まで私みたいなこと言ってる～！"
1006006-102 = "でも、たしかに……こうやって見てると温泉に浸かりたくなってくるね。"
1006006-103 = "もし先生が、このハムだとしたら……。"
1006006-104 = "おいしく頂いちゃおっかな！！"
1006006-108 = "ぱくっ、てね！あはは！！"
1006006-109 = "ふぅ……ひひっ。"
1006006-110 = "笑い過ぎて、またお腹が空いちゃいそうだよ。"
1006006-111 = "それじゃあ、お腹いっぱいのうちに……。"
1006006-116 = "よいしょ！"
1006006-117 = "……温泉を作りに行かないとね！"
1006006-118 = "[ns11] \"え？こんな時間に……！？\"\n[ns12] \"今から始めるの！？\""
1006006-121 = "あははっ。もちろん！"
1006006-122 = "夜ご飯にラーメンが食べたくなったから抜けてきたけど、実は作業の途中だったんだ。#nあともうちょっとなんだけどね。"
1006006-123 = "ご飯を食べたら温泉を掘って！みんなにお湯に浸かってもらって！#nのんびりしてもらうんだ～！"
1006006-124 = "それが温泉開発部だからね！！"
1006006-125 = "じゃあ先生、今日は来てくれてありがとう～！#nまた一緒に食べようね！！"
1006006-126 = "ばいば～い♪"
1006006-135 = "[ns13] \"スープまでおいしかったなぁ。\"\n[ns14] \"ごちそうさまでした。\""
1006006-141 = "（その後、後片付けをしてからシャーレに戻って横になると、お腹いっぱいですぐに気持ちよく眠りに落ちた)"
