[translation]
10049090-1 = "Episódio 9: A primeira e última chance"
10049090-2 = "Mashiro, houve algum movimento?"
10049090-3 = "Estou procurando o alvo, mas não há resultados significativos. #nA visibilidade está ficando ruim, então..."
10049090-4 = "Por favor, procurem pela equipe de vendas. Eles devem estar vendendo balões e pipoca!"
10049090-5 = "Foquem na área próxima ao palco, por favor."
10049090-6 = "Como você sabe disso?"
10049090-7 = "De manhã, antes de subir ao palco, vi uma criança que parecia deprimida."
10049090-8 = "Ela também estava pedindo para trocar um produto com defeito."
10049090-9 = "Eles não teriam se mudado já?"
10049090-10 = "Não, provavelmente eles ainda estão por perto."
10049090-11 = "Aquele lugar é perto da fronteira entre Gehenna e Trinity."
10049090-12 = "Ou seja, é um lugar conveniente para fugir."
10049090-13 = "Além disso, por ser perto do palco, é um local com muito movimento de pessoas."
10049090-14 = "Se o objetivo é fazer negócio, é o lugar ideal."
10049090-15 = "[s] \"Suzumi, você é perspicaz!\""
10049090-16 = "É intuição de patrulheira. Mais importante, o tempo está..."
10049090-17 = "Se atrasarmos mais, o desfile vai acabar e o alvo vai embora."
10049090-18 = "Não vou deixar isso acontecer! Tive muito trabalho para conseguir entrar no parque!"
10049090-19 = "Eu quase fui mordida por um crocodilo!"
10049090-21 = "Um crocodilo...?"
10049090-22 = "Encontrei! Olhando da arquibancada, eles montaram a loja no lado esquerdo do palco!"
10049090-26 = "Estou indo!"
10049090-30 = "Vamos lá, pessoal! Esses balões não estão murchos porque perderam o ar, viu?"
10049090-31 = "A energia nociva dentro dos seus corpos se combinou com os hiper íons negativos dentro dos balões!"
10049090-32 = "Ou seja, o balão murchar é um sinal de sorte! Significa que vocês ficaram saudáveis!"
10049090-34 = "Essa moça só fala coisas difíceis."
10049090-35 = "Fiquei saudável? Então, não preciso mais tomar injeção no hospital?"
10049090-37 = "Ah, bem, mas quando você não está se sentindo bem, é melhor tomar a injeção, sabe?"
10049090-38 = "Vá ao hospital direitinho e, como o médico disse, #ntome seus remédios corretamente, está bem?"
10049090-39 = "Chega de conversa!"
10049090-40 = "Hã?"
10049090-41 = "Tenho algumas perguntas para você."
10049090-42 = "Poderia cooperar?"
10049090-43 = "Ah, entendo...! Sim, sim, claro que sim~"
10049090-44 = "Então, espere só um pouquinho~ Não, não, não tem nada de suspeito, imagina. #nVou só soltar o calço da carroça aqui..."
10049090-49 = "--Soltei! Hoje estamos fechados! Tchauzinho~!!!!"
10049090-50 = "Pink, atire!"
10049090-51 = "Hehehe! Obrigada por me chamar assim!"
10049090-60 = "Ai, ai!"
10049090-61 = "Recompensa... garantida!"
10049090-62 = "O quê!?"
10049090-63 = "Pessoal! É uma operação de fiscalização! Guardem as lojas e reúnam-se todos!!"
10049090-65 = "Eles estão chamando reforços!!"
10049090-70 = "A chefe está ali! Vou dar cobertura!"
10049090-71 = "Atirem! Protejam a chefe!!"
10049090-79 = "O quê? É o show final?"
10049090-80 = "Parece que sim, né? Estão todos reunidos!"
10049090-82 = "Grupo Capacete Jab-Jab, estão prontos? #nSe deixarmos aquela recompensa escapar... obviamente, o churrasco de hoje está cancelado."
10049090-86 = "Se não quiserem que isso aconteça..."
10049090-91 = "Capturem eles a qualquer custo!!!"
