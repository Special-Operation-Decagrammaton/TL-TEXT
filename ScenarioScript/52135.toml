[translation]
52135-2 = "(Enquanto isso, ao mesmo tempo, em frente à 'Mansão Higantei'......)"
52135-11 = "[ns1] \"Sabia que apareceriam......\"\n[ns2] \"Vieram para cá primeiro, hein......\""
52135-14 = "......Tsukumogami!?"
52135-15 = "Sensei, atrás de mim!"
52135-20 = "Ihihi......"
52135-23 = "Aha...... Ahahahaha......"
52135-24 = "Ahahahahahahaha!!"
52135-25 = "Bem feito! A Kokuriko-sama já sabia de tudinho, sabe!?"
52135-26 = "Que vocês viriam à 'Mansão Higantei' seguindo a marca estranha, e que a Hyakumonogatari só pode ser derrotada pela Hyakuren!"
52135-27 = "E que, ao me ver fingindo estar com medo, vocês se dispersariam e deixariam o Sensei sozinho!"
52135-28 = "Disseram que encurralaram o Clube das Flores, Pássaros, Vento e Lua?"
52135-29 = "Sem saber que estavam enfiando a mão na boca da serpente! Ihihihi!"
52135-30 = "[s] \"......Shuro.\""
52135-34 = "O que foi, Sensei da Schale? Agora quer implorar pela vida?"
52135-35 = "Ninguém mais vai te salvar."
52135-36 = "Aceite ser devorado pelo Crepúsculo. Vá dar conselhos para suas alunas lá do outro lado."
52135-37 = "[s] \"......Aquilo foi mesmo uma atuação?\""
52135-38 = "......!"
52135-39 = "Eu já disse que foi atuação! Você acha mesmo que eu estava com medo!?"
52135-40 = "Fingir que sabe de tudo me dá náuseas! Virem logo ração para a Hyakumonogatari!"
52135-44 = "Vamos, atire logo!"
52135-55 = "Eh......?"
52135-56 = "A Hyakumonogatari das histórias de fantasmas...... me atacou......?"
52135-57 = "N, não pode ser...... como... Kokuriko-sama......"
52135-67 = "Snif...... não é possível......"
52135-73 = "[ns3] \"O que está acontecendo......?\"\n[ns4] \"Por que a Hyakumonogatari atirou na Shuro?\""
52135-76 = "......Será que houve algum problema dentro do próprio Clube das Flores, Pássaros, Vento e Lua?"
52135-77 = "Mais importante, parece que a Shuro-san não consegue mais controlar a Hyakumonogatari."
52135-78 = "Se ela for atacada agora......"
52135-79 = "Ela será engolida pelo Crepúsculo......"
52135-80 = "Embora, talvez, seja merecido......"
52135-81 = "[s] \"......Vou lá.\""
52135-85 = "S, está falando sério?"
52135-86 = "A Hyakumonogatari desapareceu, mas ainda é perigoso."
52135-87 = "A 'Mansão Higantei' ainda é território inimigo......"
52135-88 = "Aquela garota tentou te matar, sabia?"
52135-89 = "Isso é imprudente demais――"
52135-91 = "[ns5] \"Se tem uma aluna em perigo, preciso salvá-la.\"\n[ns6] \"Decido o resto depois.\""
52135-100 = "Haha......"
52135-104 = "Eu meio que imaginei que você diria isso."
52135-109 = "Haa...... haa...... haa......"
52135-112 = "(Não é verdade, não é verdade, não é verdade......!)"
52135-113 = "(Sério mesmo...... eu fui descartada?)"
52135-114 = "(Por ter falhado duas vezes, a Kokuriko-sama ficou brava......?)"
52135-115 = "(Foi por isso que a Hyakumonogatari me......)"
52135-116 = "(Eu não quero isso! Se a Kokuriko-sama não estiver aqui, eu vou......)"
52135-129 = "Não quero...... pare......"
52135-130 = "Não quero ser descartada de novo...... não quero voltar para aquele lugar......"
52135-137 = "......P, pare!!"
52135-146 = "......Eh?"
52135-147 = "[s] \"Que bom que...... cheguei a tempo.\""
52135-148 = "......Sensei da Schale?"
52135-149 = "Por que você veio correndo......?"
52135-150 = "[s] \"Vim te salvar.\""
52135-151 = "Mas......"
52135-152 = "Eu...... tentei te matar......"
52135-153 = "O, o que você está pensando, sua idiota!?"
52135-154 = "Você acha mesmo que isso faria de você uma 'boa menina'!?"
52135-155 = "[s7] \"Não preciso de motivos para salvar uma aluna em perigo.\"\n[s8] \"É o que se espera de um ser humano.\""
52135-160 = "Que estupidez......!"
52135-161 = "Eu sei muito bem que você morre com um único tiro, ao contrário de nós!"
52135-162 = "E ainda assim...... ainda assim, você salva o inimigo que tentou alimentar o Crepúsculo não só com você, mas com as alunas!?"
52135-163 = "......Você é idiota ou o quê!?"
52135-164 = "[s] \"Está tudo bem, Shuro-chan. Eu sou surpreendentemente resistente.\""
52135-168 = "Quem é Shuro-chan――"
52135-169 = "[s] \"Mas, tenho que admitir, dói bastante......\""
52135-173 = "......Hã?"
52135-181 = "Mestre~!"
52135-186 = "Ah, vocês também estão bem!"
52135-187 = "A, a Hyakumonogatari apareceu agora pouco......"
52135-188 = "Eu sei."
52135-189 = "......O Sensei [USERNAME] está bem?"
52135-190 = "Bem...... o Sensei――"
52135-191 = "Foi atrás da Shuro-san, que foi atacada pela Hyakumonogatari......"
52135-195 = "Eu tentei impedi-lo, mas......"
52135-197 = "Então você deixou o Mestre ir sozinho?"
52135-198 = "Eu deveria ter usado a força se necessário――"
52135-204 = "Kikyou!?"
52135-205 = "N, não precisa chegar a esse ponto......"
52135-206 = "Estávamos preocupadas demais com a presidente Ayame."
52135-207 = "Eu imaginava que o Clube das Flores, Pássaros, Vento e Lua estivesse escondido por perto, mas......"
52135-211 = "Quem diria que estavam tão perto assim."
52135-217 = "......Ah."
52135-221 = "......Como você sabia disso?"
52135-223 = "Próximo Episódio; A Artista de Histórias Misteriosas do Clube das Flores, Pássaros, Vento e Lua"

