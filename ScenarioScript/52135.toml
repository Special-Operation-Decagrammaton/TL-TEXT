[translation]
52135-2 = "（Enquanto isso, no mesmo instante, em frente à "Mansão Higan"……）"
52135-11 = "[ns1] \"Então eles apareceram mesmo……。\"\n[ns2] \"Quem diria que viriam para cá primeiro……。\""
52135-14 = "……Tsukumogami!?"
52135-15 = "Sensei, atrás de mim!"
52135-20 = "Ihihi……."
52135-23 = "Ah…… Ahahahaha……."
52135-24 = "AHHAHAHAHAHAHAHA!!"
52135-25 = "Que patético! A Srta. Kokuriko já sabia de tudo, sabia!?"
52135-26 = "Que vocês viriam à "Mansão Higan" seguindo aquele padrão estranho, e que as Cem Histórias só podem ser derrotadas em Hyakuren!"
52135-27 = "Bastou eu fingir um pouquinho de medo para vocês abandonarem o Sensei e se dispersarem!"
52135-28 = "Disseram que armaram uma armadilha para o Clube Kachou Fuugetsu?"
52135-29 = "Sem nem saber que estavam enfiando a mão na boca da serpente! Ihihihi!"
52135-30 = "[s] \"……Shuro.\""
52135-34 = "O que foi, Sensei do Schale? Agora você começou a dar valor à sua vida?"
52135-35 = "Ninguém mais vai te salvar."
52135-36 = "Aceite ser devorado pelo crepúsculo. Vá dar conselhos para as alunas lá do outro lado."
52135-37 = "[s] \"……Aquilo foi mesmo uma atuação?\""
52135-38 = "……!"
52135-39 = "Eu já disse que foi atuação! Você acha mesmo que eu estava com medo!?"
52135-40 = "Me dá náuseas ver você agindo como se soubesse de tudo! Vá logo virar comida das Cem Histórias!"
52135-44 = "Vamos, atire logo!"
52135-55 = "Eh……?"
52135-56 = "As Cem Histórias dos contos de terror…… atacaram…… você……?"
52135-57 = "N-não pode ser…… isso…… Srta. Kokuriko……."
52135-67 = "Snif…… não pode ser verdade……."
52135-73 = "[ns3] \"O que significa isso……?\"\n[ns4] \"Por que as Cem Histórias atacaram a Shuro?\""
52135-76 = "……Será que houve algum desentendimento dentro do Clube Kachou Fuugetsu?"
52135-77 = "De qualquer forma, parece que a Shuro não consegue mais controlar as Cem Histórias."
52135-78 = "Se ela for atacada agora……."
52135-79 = "Ela será levada pelo crepúsculo……."
52135-80 = "Pode ser que seja merecido…… mas."
52135-81 = "[s] \"……Eu vou lá.\""
52135-85 = "V-você está falando sério?"
52135-86 = "As Cem Histórias desapareceram, mas ainda é perigoso."
52135-87 = "A "Mansão Higan" continua sendo território inimigo……."
52135-88 = "Aquela garota estava tentando te matar, sabia?"
52135-89 = "Isso é imprudente demais——"
52135-91 = "[ns5] \"Se tem alguém em perigo, eu preciso ajudar.\"\n[ns6] \"Eu decido o resto depois.\""
52135-100 = "Haha……."
52135-104 = "De certa forma, eu já imaginava que você diria isso."
52135-109 = "Ha…… ha…… ha……."
52135-112 = "（Não é verdade, não é verdade, não é verdade……!）"
52135-113 = "（Sério…… eu fui descartada?）"
52135-114 = "（Falhei duas vezes, e a Srta. Kokuriko ficou brava……?）"
52135-115 = "（Então foi por isso que as Cem Histórias……）"
52135-116 = "（Eu não quero isso! Se a Srta. Kokuriko não estiver aqui, eu vou……）"
52135-129 = "Não…… pare……."
52135-130 = "Eu não quero ser descartada de novo…… não quero voltar para aquele lugar……."
52135-137 = "……P-parem!!"
52135-146 = "……Eh?"
52135-147 = "[s] \"Ainda bem que... cheguei a tempo.\""
52135-148 = "……Professor do Schale?"
52135-149 = "Por que você se jogou na frente...?"
52135-150 = "[s] \"Vim te salvar.\""
52135-151 = "Mas……."
52135-152 = "Você... você tentou me matar..."
52135-153 = "Q-que tipo de mal-entendido é esse!?"
52135-154 = "Acha mesmo que, por causa disso, eu vou virar uma pessoa boazinha!?"
52135-155 = "[s7] \"Não preciso de motivos para salvar alguém em perigo.\"\n[s8] \"Como ser humano, é o que se deve fazer.\""
52135-160 = "Que palhaçada é essa……!"
52135-161 = "Eu sei muito bem que, ao contrário de vocês, você cai com um único tiro!"
52135-162 = "E mesmo assim... mesmo assim, você arrisca a vida para salvar um inimigo que tentou devorar não só a si mesmo, mas também as alunas no crepúsculo!?"
52135-163 = "……Você é idiota ou o quê!?"
52135-164 = "[s] \"Está tudo bem, Shuro-chan. Eu sou surpreendentemente resistente.\""
52135-168 = "Quem é que você está chamando de Shuro-chan—"
52135-169 = "[s] \"Mas, admito que dói um pouco...\""
52135-173 = "……Hã?"
52135-181 = "Mestre!"
52135-186 = "Ah, vocês também estão bem!"
52135-187 = "A-acabamos de ver as Cem Histórias aparecerem……."
52135-188 = "Eu sei."
52135-189 = "……O professor [USERNAME] está bem?"
52135-190 = "Bem…… o professor……"
52135-191 = "Ele foi atrás da Shuro, que foi atacada pelas Cem Histórias……."
52135-195 = "Eu tentei impedi-lo, mas……."
52135-197 = "E é por isso que você deixou o mestre ir sozinho?"
52135-198 = "Mesmo que fosse à força—"
52135-204 = "Kikyou!?"
52135-205 = "N-não precisava chegar a esse ponto……."
52135-206 = "Você só se preocupava com a presidente Ayame."
52135-207 = "Eu imaginava que o Clube Kacho Fugetsu estivesse escondido em algum lugar……."
52135-211 = "Mas não achei que estivessem tão perto."
52135-217 = "……Ahaha."
52135-221 = "……Como você descobriu?"
52135-223 = "Próximo episódio: O Artista Misterioso do Clube Kacho Fugetsu"
