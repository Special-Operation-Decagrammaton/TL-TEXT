[translation]
1011305-1 = "Circulação de correntes superficiais"

1011305-2 = "[ns] \"Vamos para o mar juntos!\""

1011305-3 = "Você parece estar indo muito bem."

1011305-4 = "Fiquei aliviado quando vi a professora."

1011305-5 = "[s1] \"Então por que de repente você quis ir à praia?\"\n[s2] \"Está fora de temporada e pode estar um pouco frio.\""

1011305-8 = "O maior motivo é que se estiver no mar é um cadáver afogado..."

1011305-9 = "Com licença, pensei que poderia ver de perto um paciente que precisa de primeiros socorros."

1011305-10 = "E mesmo que algo assim aconteça, eu posso lidar com isso se estiver lá."

1011305-11 = "[s] \"Eh, uh, sim...\""

1011305-12 = "Todos os tipos de explosões e tiroteios ocorrem diariamente na Geena."

1011305-13 = "Cadáveres de granadas, fósforo branco, minas, obuses, IEDs, RDX...#nNão, há muitas pessoas feridas, mas não vemos frequentemente pacientes afogados."

1011305-14 = "Fontes termais com altas temperaturas são comuns devido à influência do vulcão Hinomu, mas é raro que as pessoas se afoguem em fontes termais."

1011305-15 = "Além disso, para ser sincero... eu queria ver a vista do mar."

1011305-16 = "Claro, existem alguns estudantes da Gehenna que vão ver o mar..."

1011305-17 = "Nunca fui à praia porque minha agenda costuma estar lotada com meu trabalho em medicina de emergência."

1011305-18 = "[s3] \"...!\"\n[s4] \"Vamos definitivamente!\""

1011305-21 = "……sim."

1011305-22 = "Você parece mais enérgico do que o normal, Sensei."

1011305-26 = "Isto é... o mar."

1011305-27 = "[s] \"O que você acha?\""

1011305-28 = "Honestamente, é difícil saber o que dizer."

1011305-29 = "É raro eu estar numa situação como esta."

1011305-30 = "Se eu tivesse que escolher uma palavra..."

1011305-32 = "...É espaçoso."

1011305-33 = "Da forma como as ondas se movem constantemente, não há realmente nenhum fim à vista."

1011305-34 = "Esta é a primeira vez que vejo o horizonte."

1011305-36 = "A propósito, senhor."

1011305-37 = "Morte por afogamento... não, não há pacientes de emergência?"

1011305-38 = "[s5] \"Hum... não é a temporada agora.\"\n[s6] \"Não acho que haja muitas pessoas vindo para jogar.\""

1011305-41 = "Na verdade, nadar no mar pode ser difícil nesta temperatura da água."

1011305-42 = "Isso significa que você não consegue encontrar pacientes de emergência?"

1011305-43 = "……Entendido."

1011305-44 = "De certa forma, tenho sorte. Um cadáver... não, como não há pacientes de emergência, pode-se dizer que este local é seguro."

1011305-45 = "No entanto, surgiu outro problema."

1011305-46 = "O que deveríamos fazer num mar com tão poucas pessoas?"

1011305-47 = "[s] \"Deixe isso para o professor!\""

1011305-48 = "Isso é muita confiança."

1011305-49 = "Entendido então...."

1011305-54 = "Vou seguir o professor."

1011305-56 = "Este é um café à beira-mar..."

1011305-57 = "Talvez seja apenas minha imaginação, mas parece um pouco mais caro que um café normal."

1011305-58 = "……Eu vejo. #nEsta localização e ambiente também estão incluídos no preço."

1011305-59 = "Não entendo bem, mas se o professor diz, deve ser assim."

1011305-60 = "É a minha primeira vez no oceano, então ainda estou me acostumando."

1011305-62 = "Isso é... takoyaki e café? #nEsta é a primeira combinação que vejo."

1011305-63 = "Se você considerar que o café vai tirar o sabor forte do takoyaki, pode não ser tão ruim quanto você imagina."

1011305-64 = "Vou seguir as recomendações do professor aqui."

1011305-71 = "O takoyaki está um pouco frio e o café muito quente."

1011305-72 = "...Pelo preço foi um pouco diferente do que eu esperava."

1011305-73 = "[s] \"Hum...desculpe, certo?\""

1011305-74 = "……."

1011305-75 = "Não, sinto que estou começando a entender o valor da localização e da atmosfera."

1011305-77 = "Esta é uma visão surpreendente. #nHá uma floresta ao longo da costa."

1011305-78 = "Entendo... um quebra-vento, certo?"

1011305-79 = "Esta floresta foi criada para proteger de tempestades, ondas e areia."

1011305-80 = "Você pode ouvir os sons das ondas e das gaivotas ao longe, e o chilrear dos pássaros na floresta."

1011305-81 = "O vento está misturado com umidade e sal, mas sinto que a floresta os suaviza."

1011305-82 = "É definitivamente uma experiência nova para mim."

1011305-84 = "Você disse que andar de bicicleta ao longo da costa é uma das coisas que você espera..."

1011305-85 = "[ns] \"Haa...haa...\""

1011305-86 = "Você está bem, senhor? #nVamos desacelerar um pouco?"

1011305-87 = "[s] \"Não... isso é tudo que não posso fazer!\""

1011305-88 = "……Entendido. Se for assim, não direi mais nada."

1011305-89 = "No entanto, se você hiperventilar ou desmaiar por falta de oxigênio devido a exercícios repentinos, não se preocupe."

1011305-90 = "Em caso de emergência, ajudarei você no que puder."

1011305-91 = "Se necessário, estamos preparados para administrar respiração artificial."

1011305-98 = "... Antes que eu percebesse, já era noite."

1011305-99 = "[s] \"Como foi sua primeira vez no mar?\""

1011305-100 = "Tudo o que vi era novo."

1011305-101 = "Já faz muito tempo que não tenho essa sensação de esquecer a passagem do tempo."

1011305-102 = "Obrigado, senhor."

1011305-103 = "Hoje será um dia verdadeiramente inesquecível."

1011305-104 = "Afinal, a melhor forma de expressar gratidão é expressá-la diretamente."

1011305-107 = "[wa:2260]― [log=세나 사복]……たしかに、[wa:1810]少し水が冷たいですね。[/log]"
1011305-109 = "― [log=세나 사복]Isso pode causar [wa:1010] hipotermia. [/registro]"

1011305-112 = "― [log=세나 사복]Para algumas pessoas,[/log]"

1011305-113 = "[wa:830]― [log=세나 사복]意識が朦朧とする場合もありますので。[/log]"
1011305-116 = "[wa:670]― [log=세나 사복]ああ、[wa:1490]これが……[/log]"
1011305-118 = "- [log=세나 사복]Isso arruína a \"atmosfera\", [wa:3390]. [/registro]"

1011305-121 = "[ns] \"É revigorante ouvir Senna dizer algo assim.\""

1011305-122 = "[wa:730]― [log=세나 사복]……[wa:2210]自分自身でも、[wa:1680]少し驚いています。[/log]"
1011305-125 = "[wa:470]― [log=세나 사복]ですが、[wa:1250]こうして新しい出来事が[/log]"
1011305-126 = "[wa:1190]― [log=세나 사복]たくさんあった一日を過ごしたのなら、[/log]"
1011305-129 = "― [log=세나 사복]Só que desta vez, [wa:1360]Novas palavras,[/log]"

1011305-130 = "[wa:790]― [log=세나 사복]使ってみるのも[wa:1390]いいかもしれません。[/log]"
1011305-133 = "[wa:2700]― [log=세나 사복]……この水は[wa:1460]本当に、冷たいです。[/log]"
1011305-135 = "― [log=세나 사복]Mas...[wa:1000]Não está um frio desagradável [wa:1630]. [/registro]"

1011305-138 = "……."

1011305-139 = "Doutor, acho que estou me desviando do meu sentido normal de alguma forma."

1011305-140 = "Para ser sincero, eu mesmo não entendo, mas é o que ouço muito..."

1011305-141 = "Tenho certeza que é esse o caso."

1011305-142 = "Pode ser uma expressão vaga, mas..."

1011305-143 = "Eu apreciaria se você pudesse pensar na “Sena” aqui agora como um ser imperfeito."

1011305-144 = "Eu particularmente não gosto nem desgosto do trabalho do departamento de medicina de emergência..."

1011305-145 = "De certa forma, fazemos isso porque outra pessoa precisa fazer isso."

1011305-146 = "É claro que um pouco de interesse e auto-satisfação podem estar misturados a isso."

1011305-147 = "Esta é apenas minha perspectiva pessoal, mas acho que #n pessoas são criaturas que perseguem seus interesses."

1011305-148 = "Sinto que me falta alguma coisa e continuo procurando algo para preenchê-la."

1011305-149 = "[s] \"Está enchendo aos poucos?\""

1011305-150 = "Bem, o que você acha?"

1011305-154 = "Mas... quando estou com você, me sinto assim."

1011305-155 = "Por exemplo, mesmo que a água esteja tão fria, meu coração fica estranhamente quente..."

1011305-157 = "(Passei a noite na praia com Senna)"

