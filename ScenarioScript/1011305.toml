[translation]
1011305-1 = "表層海流の循環"
1011305-2 = "[ns] \"一緒に海へ行こう！\""
1011305-3 = "とても元気そうですね。"
1011305-4 = "先生を見て安心しました。"
1011305-5 = "[s1] \"それで、どうして急に海に行きたくなったの？\"\n[s2] \"今は季節外れだし、少し寒いかもしれないのに。\""
1011305-8 = "一番の理由は、海なら溺れた死体……。"
1011305-9 = "失礼、応急処置が必要な患者を間近で見られるかもしれないと思いまして。"
1011305-10 = "それに万が一そんな事態が起きても、私がいれば対処できますから。"
1011305-11 = "[s] \"え、う、うん……。\""
1011305-12 = "ゲヘナではありとあらゆる爆発や銃撃戦が日常的に起こっています。"
1011305-13 = "手榴弾、白リン弾、地雷、榴弾砲、IED、RDXによる死体……#nいえ、負傷者は多いですが、溺れた患者はあまり見る機会がありません。"
1011305-14 = "ヒノム火山の影響で高温の温泉はよくありますが、#n温泉で溺れる人は滅多にないので。"
1011305-15 = "それと、率直に言うと……海の景色を見てみたかったのです。"
1011305-16 = "もちろん、海を見に行くゲヘナの生徒もいるようですが……。"
1011305-17 = "私は普段、救急医学部の仕事でスケジュールが詰まっているので、海に行ったことはありませんから。"
1011305-18 = "[s3] \"……！\"\n[s4] \"絶対行こう！\""
1011305-21 = "……はい。"
1011305-22 = "いつも以上に元気そうですね、先生。"
1011305-26 = "これが……海、なんですね。"
1011305-27 = "[s] \"どう？\""
1011305-28 = "何と言えば良いのか、正直難しいです。"
1011305-29 = "こんな状況に置かれるのが、私としては珍しいです。"
1011305-30 = "言葉を選ぶなら……。"
1011305-32 = "……広いですね。"
1011305-33 = "波が絶え間なく動いている様子は、本当に終わりが見えません。"
1011305-34 = "水平線を目の当たりにするのは、これが初めてです。"
1011305-36 = "ところで、先生。"
1011305-37 = "溺れている死……いえ、救急患者は、いないんでしょうか？"
1011305-38 = "[s5] \"えっと……今はシーズンじゃないからね。\"\n[s6] \"遊びに来てる人も少ないと思うよ。\""
1011305-41 = "確かに、この水温で海水浴は厳しいかもしれませんね。"
1011305-42 = "だから救急患者は見つからない、ということですか。"
1011305-43 = "……分かりました。"
1011305-44 = "ある意味、幸運ですね。死体……いえ、救急患者がいないということは、ここは安全と言えるでしょうから。"
1011305-45 = "ですが、また別の問題が浮かびました。"
1011305-46 = "こんなに人の少ない海で、私たちは何をしたら良いのでしょうか？"
1011305-47 = "[s] \"そこは先生に任せて！\""
1011305-48 = "すごい自信ですね。"
1011305-49 = "分かりました、それでは……。"
1011305-54 = "先生に、付いていきますね。"
1011305-56 = "これが海辺のカフェ……。"
1011305-57 = "気のせいか、普段のカフェと比べて少し高いような。"
1011305-58 = "……なるほど。#nこのロケーションや雰囲気も料金に含まれている、と。"
1011305-59 = "完全に理解した訳ではありませんが、先生が言うならそうなのでしょう。"
1011305-60 = "初めての海なので、まだ慣れませんね。"
1011305-62 = "これは……たこ焼きとコーヒーですか。#n初めて見る組み合わせです。"
1011305-63 = "タコ焼きの濃い味をコーヒーがさっぱりと流してくれると考えれば、#n意外と悪くないかもしれませんね。"
1011305-64 = "ここは先生のおすすめに従ってみます。"
1011305-71 = "たこ焼きは少し冷めていますし、逆にコーヒーは熱すぎますね。"
1011305-72 = "……値段にしては、想像と少し違いました。"
1011305-73 = "[s] \"えっと……ごめん、ね？\""
1011305-74 = " ……。"
1011305-75 = "いえ、ロケーションや雰囲気の価値が、少し分かってきた気がします。"
1011305-77 = "これは、意外な光景ですね。#n海岸沿いに森があるなんて。"
1011305-78 = "なるほど……防風林、ですか。"
1011305-79 = "嵐や波、砂から守るために作られた森なんですね。"
1011305-80 = "遠くからは波やカモメの音が、森の中からは鳥のさえずりが聞こえます。"
1011305-81 = "風には湿気と塩分が混じっていますが、森がそれらを和らげているように感じます。"
1011305-82 = "確かに、私にとっては新鮮な体験です。"
1011305-84 = "海岸沿いでサイクリングをするのも、楽しみの一つと仰っていましたが……。"
1011305-85 = "[ns] \"はぁ……はぁ……。\""
1011305-86 = "大丈夫ですか、先生？#n少しペースを落としましょうか？"
1011305-87 = "[s] \"ダメだ……それだけはできない！\""
1011305-88 = "……分かりました。でしたら、これ以上は何も言いません。"
1011305-89 = "ですが、急な運動で過呼吸になったり酸素不足で倒れたりしても、ご心配なく。"
1011305-90 = "いざという時は、私があらゆる手段で先生を助けますから。"
1011305-91 = "もし必要なら、人工呼吸の覚悟もできています。"
1011305-98 = "……気づけば、もう夕方ですね。"
1011305-99 = "[s] \"初めての海はどうだった？\""
1011305-100 = "目に映るすべてが、新鮮でした。"
1011305-101 = "時間の経過を忘れるようなこの感覚は、随分と久しぶりです。"
1011305-102 = "ありがとうございました、先生。"
1011305-103 = "今日は本当に忘れられない日になりそうです。"
1011305-104 = "やはり感謝の気持ちは、ストレートな表現が一番ですね。"
1011305-107 = "[wa:2260]― [log=세나 사복]……たしかに、[wa:1810]少し水が冷たいですね。[/log]"
1011305-109 = "― [log=세나 사복]これでは[wa:1010]低体温症になってしまうかもしれません。[/log]"
1011305-112 = "― [log=세나 사복]人によっては、[/log]"
1011305-113 = "[wa:830]― [log=세나 사복]意識が朦朧とする場合もありますので。[/log]"
1011305-116 = "[wa:670]― [log=세나 사복]ああ、[wa:1490]これが……[/log]"
1011305-118 = "― [log=세나 사복]「雰囲気」を台無しにしてしまう、[wa:3390]ですね。[/log]"
1011305-121 = "[ns] \"セナがそんなことを言うなんて、新鮮だね。\""
1011305-122 = "[wa:730]― [log=세나 사복]……[wa:2210]自分自身でも、[wa:1680]少し驚いています。[/log]"
1011305-125 = "[wa:470]― [log=세나 사복]ですが、[wa:1250]こうして新しい出来事が[/log]"
1011305-126 = "[wa:1190]― [log=세나 사복]たくさんあった一日を過ごしたのなら、[/log]"
1011305-129 = "― [log=세나 사복]今回だけは、[wa:1360]新しい言葉を、[/log]"
1011305-130 = "[wa:790]― [log=세나 사복]使ってみるのも[wa:1390]いいかもしれません。[/log]"
1011305-133 = "[wa:2700]― [log=세나 사복]……この水は[wa:1460]本当に、冷たいです。[/log]"
1011305-135 = "― [log=세나 사복]でも……[wa:1000]不快な冷たさでは、[wa:1630]ありません。[/log]"
1011305-138 = "……。"
1011305-139 = "先生、私は普通の感覚からどこかズレているのだと思います。"
1011305-140 = "正直、自分でもよく分からないのですが、そう言われることが多いですし……。"
1011305-141 = "きっと、そうなのでしょう。"
1011305-142 = "曖昧な表現かもしれませんが……。"
1011305-143 = "今ここにいる「[ruby=ひむろ]氷室[/ruby]セナ」は、不完全な存在だと思っていただければ幸いです。"
1011305-144 = "救急医学部の仕事も、特に好きとか嫌いとかではなく……。"
1011305-145 = "誰かがやるべきだからこそ、やっている側面もあります。"
1011305-146 = "もちろん、その中にちょっとした興味や自己満足は混ざってるかもしれません。"
1011305-147 = "あくまで私の個人的な視点ですが、#n人は結局、興味を追い求める生き物だと思っています。"
1011305-148 = "自分に欠けている部分を感じ、それを埋めてくれる何かを探し続けるのです。"
1011305-149 = "[s] \"少しずつ埋まってきてる？\""
1011305-150 = "さあ、どうでしょう。"
1011305-154 = "ですが……先生と一緒にいると、そんな気がします。"
1011305-155 = "例えば、水はこんなにも冷たいのに、不思議と心は暖かいように……。"
1011305-157 = "（夜遅くまでセナと海辺で過ごした）"
