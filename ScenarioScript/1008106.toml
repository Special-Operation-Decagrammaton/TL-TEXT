[translation]
1008106-1 = "待ちわびて、楽しみて"
1008106-2 = "（いつもと同じ待ち合わせ場所に向かった）"
1008106-11 = "[ns] \"あれ、まだ来てないのかな……？\""
1008106-12 = "あ、先生！こちらですの～！"
1008106-15 = "[wa:200]― [log=유카리]うふふっ、[wa:1300]ここです、[wa:1070] [/log]"
1008106-16 = "― [log=유카리]身共はここにおりますわ、[wa:1420]先生。[/log]"
1008106-19 = "[ns] \"ごめん、ユカリ。待ったよね。\""
1008106-22 = "[wa:200]― [log=유카리]大丈夫です、[wa:1330] [/log]"
1008106-23 = "― [log=유카리]それほど[wa:360]待っておりませんの。[/log]"
1008106-26 = "― [log=유카리]約束の時刻より、[wa:1760]ほんの1時間ほど早く[wa:1320] [/log]"
1008106-27 = "― [log=유카리]足を運んでしまった[wa:1090]だけですから。[/log]"
1008106-30 = "[ns1] \"かなり待ってたよね！？\"\n[ns2] \"その、良かったら理由を聞いてもいい……？\""
1008106-33 = "[wa:200]― [log=유카리]いえ、[wa:1140]何か特別な理由が[wa:1320]あるわけではなく、[wa:1960] [/log]"
1008106-34 = "― [log=유카리]ただ……。[/log]"
1008106-37 = "― [log=유카리]本日はどこへ[wa:990]足を運ぼうか、[wa:1450]何をしようか、[wa:1660] [/log]"
1008106-38 = "― [log=유카리]また新しい事を[wa:1120]ご教示いただけるだろうか……[/log]"
1008106-41 = "[wa:450]― [log=유카리]そんなふうに[wa:700]考え始めたら、[wa:1200] [/log]"
1008106-42 = "― [log=유카리]いても立っても[wa:730]いられなくなってしまって……。[/log]"
1008106-45 = "[wa:200]― [log=유카리]あ、[wa:620]申し上げて[wa:490]おきますが、[wa:1180] [/log]"
1008106-46 = "― [log=유카리]身共はこうして[wa:620]待っている時間というのも[wa:1370]好きなのですよ？[/log]"
1008106-49 = "[wa:150]― [log=유카리]先生と共に[wa:780]在れるのであれば、[wa:1290] [/log]"
1008106-50 = "― [log=유카리]待ち時間さえも[wa:1380]鼓動高鳴る[wa:630]すてきなひと時となりますから。[/log]"
1008106-53 = "[ns] \"……ありがとう、ユカリ。\""
1008106-56 = "[wa:200]― [log=유카리]さ、[wa:1200]こうしている場合じゃ[wa:600]ありませんの！[/log]"
1008106-59 = "― [log=유카리]ふふっ！[wa:1050]本日も身共に、[wa:1300] [/log]"
1008106-60 = "― [log=유카리]眩く美しい世界を[wa:1360]教えてくださいまし！[wa:1290]先生！[/log]"
1008106-63 = "（そうしてユカリと一緒に、この日も新鮮な一日を過ごした）"
