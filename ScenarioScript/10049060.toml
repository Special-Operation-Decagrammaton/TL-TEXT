[translation]
10049060-1 = "Episódio 6; Suzumi Morizuki"
10049060-2 = "……。"
10049060-3 = "Ai! ……Ahaha."
10049060-4 = "Desculpe, deve estar ardendo, não é……."
10049060-5 = "Enfrentar tudo isso mesmo estando ferida…… Você é forte, Reisa-san."
10049060-6 = "Ehehe! Já estou acostumada com isso!"
10049060-7 = "Para a superestrela do Esquadrão de Vigilância, Reisa Uzawa, isso não é nada!"
10049060-8 = "Além disso, agora eu sou a garota mágica da justiça, Termite Pink!"
10049060-9 = "……Tenho muito o que aprender com você, Reisa-san."
10049060-10 = "……。"
10049060-11 = "De alguma forma, tudo pareceu uma bagunça."
10049060-12 = "Agir de forma inadequada em um lugar inadequado."
10049060-13 = "[s1] \"É difícil atuar e lutar ao mesmo tempo, né?\"\n[s2] \"Dias como hoje acontecem.\""
10049060-16 = "Não…… não estou falando sobre o que aconteceu hoje."
10049060-17 = "……Desde que comecei minhas atividades no Esquadrão de Vigilância――"
10049060-18 = "Não, talvez até antes disso…… Suzumi Morizuki já fosse uma bagunça."
10049060-20 = "Suzumi-san……?"
10049060-21 = "……Posso contar uma história do passado?"
10049060-22 = "O passado de alguém só serve para deixar os outros tristes, mas……."
10049060-23 = "Ainda assim…… se não se importar……."
10049060-24 = "[s3] \"Não é verdade.\"\n[s4] \"Pode me contar? Sobre você, Suzumi.\""
10049060-27 = "O Esquadrão de Vigilância não é \"alguém de fora\"!"
10049060-28 = "Eu, Reisa Uzawa, vou aliviar o coração da Suzumi-san!"
10049060-29 = "Obrigada……."
10049060-33 = "Muitas vezes, ouço boatos por aí."
10049060-34 = "Por que Suzumi Morizuki atua no Esquadrão de Vigilância em vez do Comitê de Implementação da Justiça?#nSerá que ela odeia o Comitê de Implementação da Justiça? E coisas do tipo……."
10049060-35 = "Houve…… muitos boatos assim."
10049060-36 = "……。"
10049060-40 = "Será que……#nVocê não conseguiu entrar no Comitê de Implementação da Justiça, mesmo querendo?"
10049060-45 = "……。"
10049060-46 = "Eu…… quando estava no primeiro ano, pertencia ao Comitê de Implementação da Justiça."
10049060-50 = "A Suzumi-san…… pertencia?"
10049060-51 = "……Mas saí pouco tempo depois de entrar."
10049060-52 = "Seria mentira dizer que não tentei esconder isso."
10049060-53 = "Achei que tinha superado isso à minha maneira, mas…… as coisas não são tão simples."
10049060-54 = "Mashiro-san…… você já sabia, não é?"
10049060-55 = "……Sim. Apenas como um boato."
10049060-56 = "Que você já pertenceu ao Comitê de Implementação da Justiça."
10049060-57 = "……Como eu imaginei."
10049060-58 = "Não se pode colocar uma porta na boca do povo. Não é de se estranhar que boatos sobre mim circulem."
10049060-59 = "Dito isso, boatos de que eu estava insatisfeita com o comitê ou que saí por ter brigado com alguém…… não são verdadeiros."
10049060-60 = "Eu saí apenas porque――"
10049060-61 = "――Eu não conseguia me enturmar com ninguém e tinha medo de ficar sozinha…… então eu fugi."
10049060-62 = "[ns] \"Você não conseguiu se enturmar no Comitê de Implementação da Justiça……?\""
10049060-63 = "Sim."
10049060-64 = "O Comitê de Implementação da Justiça é uma organização grande.#nPor isso, as hierarquias são rígidas e a vida em grupo é valorizada."
10049060-65 = "É natural que alunas do mesmo ano e na mesma posição vivam juntas."
10049060-66 = "Comer juntas, conversar sobre coisas triviais, aprofundar os laços……."
10049060-67 = "Eu…… não era boa nisso."
10049060-68 = "No momento em que o assunto acabava, aquele silêncio me dava muito medo……."
10049060-69 = "……Eu ficava pensando se a conversa não tinha morrido por minha causa."
10049060-70 = "Por isso, muitas vezes eu tentava forçar a continuação do assunto."
10049060-71 = "Eu não fazia ideia de que isso acontecia……."
10049060-72 = "Desde que saí do comitê, eu me sentia mais leve."
10049060-73 = "Mas, enquanto estive no comitê, aquilo era doloroso. Ser alvo de interesse de alguém, ou não ser…… em ambos os casos, meu coração não encontrava paz……."
10049060-74 = "Eu tinha medo de ser notada ou de que esperassem algo de mim…… #nMas, por outro lado, ser criticada ou decepcionar os outros era ainda mais assustador."
10049060-75 = "Mais do que lutar contra as delinquentes da cidade……"
10049060-76 = "Eu tinha pavor de como eu era vista pelos olhos dos outros……."
10049060-77 = "Por isso…… eu pedi demissão do Comitê de Justiça."
10049060-78 = "……Esta é a história de uma covarde chamada Suzumi Morizuki."
10049060-79 = "[ns5] \"……Eu não acho que a Suzumi seja uma covarde.\"\n[ns6] \"Desde o dia em que cheguei a Kivotos, você sempre foi corajosa.\""
10049060-82 = "[ns7] \"Eu me lembro muito bem. De quando eu assumi o comando pela primeira vez.\"\n[ns8] \"A Suzumi lutou com coragem, sem hesitar.\""
10049060-85 = "Sensei……."
10049060-86 = "O Sensei tem toda razão!"
10049060-87 = "De todas as pessoas que conheço…… a Suzumi-san é a mais corajosa e a mais incrível!"
10049060-88 = "Porque a Suzumi-san cumpre silenciosamente até as missões mais difíceis, não é?"
10049060-89 = "Eu acho isso algo extremamente maravilhoso!"
10049060-90 = "……Eu pensava que proteger a segurança da cidade era algo que \"alguém deveria fazer\". Eu pretendia assumir esse papel."
10049060-91 = "Apesar disso, fugi do Comitê de Justiça, que é esse \"alguém\" definido……."
10049060-92 = "E continuo com medo de que a \"Suzumi Morizuki\" se torne esse \"alguém\"."
10049060-93 = "Você já me disse uma vez para parar de me chamar de \"Flashbang de Trinity\"……"
10049060-94 = "Mas……"
10049060-95 = "No fundo, eu até gosto desse apelido."
10049060-96 = "Embora me deixe um pouco envergonhada…… ele serve para esconder o nome \"Suzumi Morizuki\"."
10049060-97 = "Pelo mesmo motivo…… o codinome \"Thermite White\" também não era ruim."
10049060-98 = "[s9] \"Flashbang…… Eu acho um ótimo apelido!\"\n[s10] \"E eu acho o nome Suzumi Morizuki muito bonito!\""
10049060-101 = "……."
10049060-102 = "O Sensei é sempre tão gentil."
10049060-103 = "Mas…… acho que vou parar com o grupo de vigilância."
10049060-104 = "……Mesmo chamando de atividades de vigilância, no fim das contas, é algo feito por civis."
10049060-105 = "Não é uma organização oficial como o Comitê de Justiça……"
10049060-106 = "Não passa de civis comuns usando violência por conta própria."
10049060-107 = "Sem ter qualificação alguma, apenas levantando a bandeira da manutenção da ordem."
10049060-108 = "Isso é…… apenas uma satisfação pessoal. Não passa de algo que eu faço por capricho."
10049060-109 = "Nesse sentido, acho que não sou diferente das delinquentes."
10049060-110 = "Isso não é verdade!!"
10049060-114 = "Isso não é verdade de jeito nenhum!!"
10049060-115 = "Reisa-san!?"
10049060-116 = "Mesmo que seja a Suzumi-san, eu não vou permitir que fale mal de si mesma!"
10049060-117 = "Desde a primeira vez que você me salvou…… a Suzumi-san é a minha heroína!"
10049060-118 = "A Suzumi-san nunca faria patrulhas por pura satisfação pessoal!"
10049060-119 = "Mesmo com chuva, com vento forte, ou com o pé machucado…… a Suzumi-san nunca deixou de fazer as patrulhas! Isso não é algo que se faz por satisfação pessoal!"
10049060-120 = "Não importa se você pertence ao Comitê de Justiça ou não!"
10049060-121 = "A Suzumi-san é completamente diferente das delinquentes! #nPor favor, não pense que você não tem qualificação!"
10049060-122 = "Eu…… eu me divirto muito fazendo patrulha com a Suzumi-san……!"
10049060-123 = "Dividir os fones de ouvido para ouvir música, conversar sobre várias coisas――!"
10049060-125 = "…………."
10049060-126 = "Se a Reisa-san pensa dessa forma, então fico feliz."
10049060-132 = "E não é só isso! Quando chove, até a barraca de algodão-doce fecha, e #nas delinquentes não aparecem no parque."
10049060-133 = "Mas a Suzumi-san é diferente, não é?"
10049060-134 = "Não importa se está chovendo. Eu patrulho a qualquer momento para proteger a segurança pública.#nÉ essa a diferença entre a Suzumi-san e os delinquentes!"
10049060-135 = "A Suzumi-san é sempre uma aliada da justiça!#n――Como uma garota mágica!"
10049060-136 = "Sempre... uma aliada da justiça."
10049060-137 = "Obrigada por dizer isso."
10049060-138 = "Fico muito feliz, mas――"
10049060-143 = "――também me sinto... arrependida."
10049060-144 = "Suzumi-san..."
10049060-145 = "Você não vai... sair do grupo de vigilância, vai...?"
10049060-146 = "............"
10049060-148 = "[ns] \"Reisa.\""
10049060-149 = "Sensei?"
10049060-150 = "[s] \"Venha aqui um pouco...\""
10049060-155 = "O que houve?"
10049060-156 = "[s] \"Vamos dar um tempo para a Suzumi pensar.\""
10049060-157 = "Mas... se eu pensar que a Suzumi-san pode sair do grupo de vigilância――"
10049060-158 = "Meu peito... dói um pouco."
10049060-159 = "Mesmo que a Suzumi-san tenha me ajudado..."
10049060-160 = "Eu ainda não consegui ser de nenhuma utilidade..."
10049060-161 = "Desse jeito, não vou conseguir retribuir o favor..."
10049060-162 = "[ns] \"A Suzumi provavelmente não vê isso como um favor.\""
10049060-164 = "[ns] \"Por enquanto, vamos confiar na Suzumi.\""
10049060-170 = "............"
10049060-178 = "[ns] \"Suzumi.\""
10049060-179 = "...Sensei."
10049060-181 = "Snif... snif...#nÉ a Mashiro. Todos, estão me ouvindo?"
10049060-185 = "...Sim, estamos ouvindo."
10049060-186 = "...Por acaso está frio no topo da torre? Acabei de ouvir um som de fungada."
10049060-187 = "Estou bem. ...Snif."
10049060-188 = "Mais importante, encontrei um alvo nas proximidades."
10049060-189 = "Capturei algo que parece ser a Komakaze Love."
10049060-190 = "[s11] \"Love――\"\n[s12] \"――algo que parece ser?\""
10049060-193 = "Não tenho detalhes. Por favor, verifiquem no local."
10049060-198 = "Suzumi-san..."
10049060-199 = "..."
10049060-200 = "...Sim.#nEstou... pronta."
10049060-201 = "[ns] \"Suzumi.\""
10049060-203 = "[ns13] \"O Comitê de Justiça e o grupo de vigilância não importam agora.\"\n[ns14] \"Eu acredito na Suzumi e na Reisa.\""
10049060-206 = "..."
10049060-207 = "...Sim."
10049060-208 = "Por enquanto, precisamos cumprir a missão que aceitamos."
10049060-209 = "Vou verificar o alvo."
