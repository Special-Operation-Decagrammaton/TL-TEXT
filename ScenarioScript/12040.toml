[translation]
12040-1 = "第4話;それぞれの物語（１）"
12040-2 = "アビドス・校門前"
12040-5 = "あれ、先生？"
12040-6 = "思ったより早かったですね☆"
12040-7 = "[s] \"ノノミの方こそ。\""
12040-8 = "はい、ちょっと掃除を。私もなんだか、じっとしていられなくて……。"
12040-9 = "大将は、大丈夫でしたか……？"
12040-10 = "[s] \"……身体の方は何とか、大丈夫みたい。\""
12040-11 = "……そうでしたか、それは良かったです☆"
12040-12 = "この目でご無事を確認したい気持ちもありましたが、大勢で押し掛けるわけにもいきませんからね……。"
12040-13 = "落ち着いたら、シロコちゃんとホシノ先輩と一緒に伺うとしましょう。"
12040-14 = "ですが、「身体の方[ruby=・]は[/ruby]」ということは……"
12040-15 = "それ以外のところで、問題があった……ということでしょうか？"
12040-16 = "[s] \"……ノノミには敵わないね。\""
12040-17 = "あはは……何となく、そう思っただけです。"
12040-18 = "セリカちゃんとアヤネちゃんと一緒だったはずなのに、戻ってきたのが先生だけでしたので……そこには何か、理由があるのかな、と。"
12040-19 = "……気になりますが、今はその時ではありませんね。また後ほど、みんなで集まった時にでも教えていただけると嬉しいです。"
12040-20 = "[s] \"そうだね、その時にまた。\""
12040-21 = "……。"
12040-22 = "まだそんなに経ってないのに……思えば、先生がいらっしゃった頃から、急激に色々なことが変わった気がします。"
12040-23 = "もちろん、たくさんの良いことが、嬉しいことがありました。初めて顧問の先生ができて、ヘルメット団も追い払うことができて……"
12040-24 = "補給も確保できて、色々な問題を乗り越えることができました。なのに……"
12040-25 = "次々に色んなことが、私たちの前に立ちはだかって……。"
12040-26 = "ヘルメット団、便利屋、風紀委員会……それに、カイザーコーポレーション……。"
12040-27 = "次は、何が来るのでしょうか……。"
12040-28 = "……。"
12040-29 = "すみません、暗いお話をしてしまいました。それでも私たちはアビドスのために進むしかありませんし……先生も、一緒にいてくださいますよね？"
12040-30 = "[s1] \"もちろん。\"\n[s2] \"当たり前だよ。\""
12040-31 = "ありがとうございます！先生にそう仰っていただけると、心強いです。"
12040-32 = "ありがとうございます！先生にそう仰っていただけると、心強いです。"
12040-35 = "ノノミ、先生。"
12040-36 = "あ、シロコちゃんも早かったですね？"
12040-37 = "うん……ホシノ先輩は？"
12040-38 = "ホシノ先輩は多分、また学校のどこかでお昼寝の最中かと……。"
12040-39 = "……そっか。"
12040-40 = "……。"
12040-41 = "……先生、大将の容体は？"
12040-42 = "[s] \"大将は……\""
12040-43 = "大将は、身体の方は無事だったそうです☆"
12040-44 = "……ただ、それとは別に色々とあるそうでして。みんなが集まったら、あらためてその辺りのお話を聞いてみましょう。"
12040-45 = "……うん、分かった。"
12040-47 = "じゃあ、先に入ってるね。"
12040-49 = "……？シロコちゃん、なんだかちょっと……"
12040-50 = "[s] \"……ちょっと変、かも？\""
12040-51 = "やっぱり、先生もそう思います？"
12040-52 = "何でしょう、ちょっと不安そうと言いますか、焦っていると言いますか……。"
12040-53 = "気のせいだと良いのですが……。"
12040-54 = "[s] \"……私たちも、中に入ろう。\""
12040-55 = "は、はい！"
12040-57 = "（ドンッ！）"
12040-58 = "（バタンッ！）"
12040-59 = "いたた……痛いじゃ～ん、どしたのシロコちゃん。"
12040-60 = "……いつまでしらを切るつもり？"
12040-61 = "！！？"
12040-62 = "今の音は……！？"
12040-65 = "[ns] 音がした教室の中へ入る。"
12040-68 = "うへ～、何のことを言ってるのか、おじさんにはよく分からないな～……？"
12040-69 = "……。"
12040-70 = "……嘘つかないで。"
12040-71 = "嘘じゃないって～……ん？"
12040-73 = "ホシノ先輩！シロコちゃん！？どうしたんですか！？"
12040-74 = "[s] \"……どうしたの？\""
12040-75 = "ん、その……。"
12040-76 = "いったい、何があったんですか……？"
12040-77 = "……ホシノ先輩に、用事があるの。"
12040-78 = "……。"
12040-79 = "……悪いけど、二人きりにして。"
12040-80 = "うーん、それはダメです☆"
12040-81 = "……。"
12040-82 = "対策委員会に、「二人だけの秘密♡」みたいなものは許されません。何といっても、運命共同体ですから。"
12040-83 = "……でも、"
12040-84 = "ですので、きちんと状況の説明もしてくれない悪い子には……"
12040-87 = "お仕置き☆しちゃいますよ？"
12040-89 = "う、うーん……。"
12040-90 = "……えっとねえ、"
12040-91 = "……実は、おじさんがこっそりお昼寝してたのがバレちゃったんだよね～。"
12040-92 = "私の怠け癖なんて、今に始まったことじゃないとは思うけど、おじさんもここ最近ちょ～っと寝すぎだったかも。まあ、それで少しばかり叱られちゃったのさ～。"
12040-93 = "あ、う、うん……。"
12040-94 = "にしたって、そんなに怒らなくてもいいのに～。シロコちゃんは真面目だなあ。"
12040-95 = "ま、人にはそういう時もあるよね～。そろそろ集まる時間だし、行こっかー。"
12040-97 = "……。"
12040-98 = "ん……。"
12040-101 = "……。"
12040-102 = "[s] \"ノノミ、大丈夫？\""
12040-103 = "はい、私は大丈夫です。……何か、言いたくないことがあるみたいですね。"
12040-104 = "……ふぅ。"
12040-105 = "仕方ありませんね。誰しも言いたくない秘密の一つや二つくらい、持っているものでしょうし……。"
12040-106 = "私たちも行きましょうか、先生。そろそろみんな帰ってきてるかもしれません。"
12040-109 = "対策委員会・教室"
12040-110 = "うへ～……。"
12040-111 = "……。"
12040-112 = "……。"
12040-113 = "[s] （気まずい……）"
12040-118 = "先輩たち、大変！！これ見て！"
12040-119 = "アビドス自治区の関係書類を持ってきました！これを……"
12040-120 = "……？"
12040-121 = "……あれ？"
12040-122 = "……。"
12040-123 = "……。"
12040-124 = "……な、何、この雰囲気？"
12040-125 = "何かあったんですか……？"
12040-126 = "[s] \"とりあえず今は大丈夫。おかえり、二人とも。\""
12040-127 = "……うん、ただいま？い、いやそれよりも！"
12040-128 = "とんでもないことが分かったの！"
12040-129 = "はい、衝撃の事実です……！皆さん、まずはこれを見てください！"
12040-131 = "（ペラッ）"
12040-134 = "ん～、これって……地図？"
12040-135 = "直近までの取引が記録されてる、アビドス自治区の土地の台帳……「地籍図」と呼ばれるものです。"
12040-136 = "土地の所有者を確認できる書類、ということですか……？"
12040-137 = "でも書類なんて見なくても、アビドスの土地は当然アビドス高校の所有で……"
12040-138 = "私もさっきまでそう思ってた！でもそうじゃなかったの！"
12040-139 = "午前中にお見舞いへ行った時に、大将から話を聞いたんです。"
12040-140 = "柴関ラーメンが入っている建物はもちろんのこと、このアビドス自治区のほとんどが……"
12040-141 = "……私たちの学校が所有していることに、なっていませんでした。"
12040-142 = "えっ……！？"
12040-143 = "……どういうこと？アビドス自治区がアビドスの所有じゃないって、そんなわけ……"
12040-145 = "（ペラッ）"
12040-146 = "……これって、"
12040-147 = "現在の所有者は……"
12040-148 = "カイザーコンストラクション……そう書かれています。"
12040-149 = "……！！"
12040-150 = "そんな……！？"
12040-151 = "……っ！？"
12040-153 = "次回;それぞれの物語（２）"
