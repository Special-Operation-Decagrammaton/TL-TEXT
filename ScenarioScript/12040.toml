[translation]
12040-1 = "Episódio 4; Cada história (1)"
12040-2 = "Abydos, em frente ao portão da escola"
12040-5 = "Hein, professora?"
12040-6 = "Foi mais rápido do que eu esperava☆"
12040-7 = "[s] \"Nonoomi é o escolhido.\""
12040-8 = "Sim, faça uma limpeza. Eu também não consigo ficar parado por algum motivo..."
12040-9 = "O general estava bem...?"
12040-10 = "[s] \"...Meu corpo parece estar bem de alguma forma.\""
12040-11 = "...Entendo, isso foi bom☆"
12040-12 = "Eu queria ver com meus próprios olhos que eles estavam seguros, mas não podia me dar ao luxo de entrar correndo com tantas pessoas..."
12040-13 = "Depois que você se acalmar, vamos visitar Shiroko-chan e Hoshino-senpai."
12040-14 = "Porém, \"o corpo  é \"..."

12040-15 = "Isso significa que houve um problema em outro lugar?"
12040-16 = "[s] \"...Não sou páreo para Nonomi.\""
12040-17 = "Haha... foi exatamente o que pensei."
12040-18 = "Eu deveria estar com Celica-chan e Ayane-chan, mas a professora foi a única que voltou... então me pergunto se há uma razão para isso."
12040-19 = "...Estou curioso, mas agora não é o momento. Eu ficaria feliz se você pudesse me contar sobre isso mais tarde, quando todos estivermos juntos."
12040-20 = "[s] \"Sim, até lá.\"\"\n12040-21 = \"…….\"\n12040-22 = \"Mesmo que ainda não tenha passado tanto tempo... Quando penso nisso, sinto que muitas coisas mudaram drasticamente desde que você chegou.\"\n12040-23 = \"Claro, houve muitas coisas boas que me deixaram feliz. Pela primeira vez tive um sensei como orientador e consegui me livrar da Equipe Capacete...\"\n12040-24 = \"Conseguimos garantir suprimentos e superar vários problemas. Mas...\"\n12040-25 = \"Muitas coisas estão diante de nós, uma após a outra...\"\n12040-26 = \"Brigada de capacetes, faz-tudo, comitê de disciplina... e Kaiser Corporation...\"\n12040-27 = \"O que virá a seguir...?\"\n12040-28 = \"…….\"\n12040-29 = \"Desculpe, falei sobre algo obscuro. Mesmo assim, não temos escolha a não ser seguir em frente para Abydos... Sensei, você estará conosco, certo?\"\n12040-30 = \"[s1] \"Claro.\"\n[s2] \"Claro.\"\"\n12040-31 = \"obrigado! É reconfortante ouvir seu sensei dizer isso.\"\n12040-32 = \"obrigado! É reconfortante ouvir seu sensei dizer isso.\"\n12040-35 = \"Nonomi, professora.\"\n12040-36 = \"Ah, Shiroko-chan também foi rápida, não foi?\"\n12040-37 = \"Sim... e Hoshino-senpai?\"\n12040-38 = \"Hoshino-senpai provavelmente está tirando uma soneca em algum lugar da escola novamente...\"\n12040-39 = \"...Eu vejo.\"\n12040-40 = \"…….\"\n12040-41 = \"...Senhor, qual é a condição do general?\"\n12040-42 = \"[s] \"O general...\"\"\n12040-43 = \"Parece que o general estava fisicamente seguro☆\"\n12040-44 = \"...No entanto, parece que há muitas outras coisas além disso. Depois que todos estiverem reunidos, vamos ouvir a história novamente.\"\n12040-45 = \"...Sim, eu entendo.\"\n12040-47 = \"Pois bem, você está em primeiro.\"\n12040-49 = \"...? Shiroko-chan, é um pouco...\"\n12040-50 = \"[s] \"...Talvez seja um pouco estranho?\"\"\n12040-51 = \"Afinal, você também pensa assim?\"\n12040-52 = \"O que você quer dizer? Você diz que parece um pouco ansioso ou ansioso?\"\n12040-53 = \"Espero que seja apenas minha imaginação...\"\n12040-54 = \"[s] \"...Vamos entrar também.\"\"\n12040-55 = \"Ah, sim!\"\n12040-57 = \"(Vestir!)\"\n12040-58 = \"(Bang!)\"\n12040-59 = \"Isso... isso dói, o que há de errado, Shiroko-chan?\"\n12040-60 = \"...Há quanto tempo você planeja cortar o cabelo?\"\n12040-61 = \"! ! ?\"\n12040-62 = \"O som agora é...! ?\"\n12040-65 = \"[ns] Entre na sala de aula de onde veio o som.\"\n12040-68 = \"Uau, eu realmente não entendo do que você está falando...?\"\n12040-69 = \"…….\"\n12040-70 = \"...Não minta.\"\n12040-71 = \"Não é mentira... hein?\"\n12040-73 = \"Hoshino-senpai! Shiroko-chan! ? O que aconteceu! ?\"\n12040-74 = \"[s] \"...O que há de errado?\"\"\n12040-75 = \"Hum, isso...\"\n12040-76 = \"O que diabos aconteceu...?\"\n12040-77 = \"...Hoshino-senpai tem algo para fazer.\"\n12040-78 = \"…….\"\n12040-79 = \"...Sinto muito, mas por favor nos deixe em paz.\"\n12040-80 = \"Hmm, isso não é bom☆\"\n12040-81 = \"…….\"\n12040-82 = \"Não podemos permitir coisas como “um segredo apenas entre nós dois♡” para a força-tarefa. Afinal, partilhamos um destino comum.\"\n12040-83 = \"……mas,\"\n12040-84 = \"Então, para as crianças más que não explicam adequadamente a situação...\"\n12040-87 = \"Eu vou punir você☆\"\n12040-89 = \"Uh, hum...\"\n12040-90 = \"...Bem, ei.\"\n12040-91 = \"...Na verdade, descobri que o velho estava tirando uma soneca secretamente.\"\n12040-92 = \"Não acho que minha preguiça seja nova, mas acho que meu tio tem dormido demais ultimamente. Bem, fui repreendido um pouco por isso.\"\n12040-93 = \"Ah, ah, sim...\"\n12040-94 = \"Você não precisa ficar tão bravo, no entanto. Shiroko-chan está falando sério.\"\n12040-95 = \"Bem, às vezes as pessoas são assim. Está quase na hora de nos reunirmos, então vamos lá.\"\n12040-97 = \"…….\"\n12040-98 = \"sim…….\"\n12040-101 = \"…….\"\n12040-102 = \"[s] \"Nonomi, você está bem?\"\"\n12040-103 = \"Sim, estou bem. ...Parece que há algo que você não quer dizer.\"\n12040-104 = \"... Ufa.\"\n12040-105 = \"Não pode ser ajudado. Todo mundo provavelmente tem um ou dois segredos que não quer contar...\"\n12040-106 = \"Vamos também, senhor? Talvez todos voltem em breve.\"\n12040-109 = \"Força Tarefa/Sala de Aula\"\n12040-110 = \"Uau...\"\n12040-111 = \"…….\"\n12040-112 = \"…….\"\n12040-113 = \"[s] (Estranho...)\"\n12040-118 = \"Idosos, é difícil! ! Veja isso!\"\n12040-119 = \"Trouxe documentos relacionados com a Região Autónoma de Abydos! Esse...\"\n12040-120 = \"...?\"\n12040-121 = \"...Huh?\"\n12040-122 = \"…….\"\n12040-123 = \"…….\"\n12040-124 = \"...O que, o que é essa atmosfera?\"\n12040-125 = \"Aconteceu alguma coisa...?\"\n12040-126 = \"[s] \"Está tudo bem por enquanto. Bem-vindos de volta, vocês dois.\""

12040-127 = "...Sim, você está em casa agora? Não, não, mais do que isso!"
12040-128 = "Eu descobri algo incrível!"
12040-129 = "Sim, este é um fato chocante...! Pessoal, por favor, dêem uma olhada nisso primeiro!"
12040-131 = "(Perak)"
12040-134 = "Hmm, isso é... um mapa?"
12040-135 = "Um registo de terras na Região Autónoma de Abydos que regista as transacções até ao período mais recente...é chamado de \"mapa cadastral\"."

12040-136 = "Você quer dizer um documento que possa confirmar a propriedade do terreno?"
12040-137 = "Mas mesmo sem olhar os documentos, o terreno em Abydos é obviamente propriedade da Abydos High School..."
12040-138 = "Eu também pensei assim até agora! Mas não foi!"
12040-139 = "Quando fui visitá-lo pela manhã, ouvi a história do general."
12040-140 = "Não apenas o edifício onde está localizado o Shibaseki Ramen, mas a maior parte desta região autônoma de Abydos..."
12040-141 = "...Nossa escola não era dona dela."
12040-142 = "Eh...! ?"
12040-143 = "...O que você quer dizer? É por isso que a Região Autónoma de Abydos não é propriedade de Abydos..."
12040-145 = "(Perak)"
12040-146 = "...Isso é..."
12040-147 = "O atual proprietário é..."
12040-148 = "Kaiser Construção... é o que diz."
12040-149 = "...! !"
12040-150 = "É isso…! ?"
12040-151 = "...! ?"
12040-153 = "Da próxima vez: cada história (2)"
