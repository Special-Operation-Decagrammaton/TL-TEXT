[translation]
10051050-1 = "Episódio 5: Quando as Flores Desabrocham"
10051050-2 = "Bosque nos fundos do local do desfile de moda"
10051050-3 = "O desfile de hoje... acabou!"
10051050-4 = "Mas nós recuperamos as roupas, não foi...?"
10051050-5 = "Sim, mas..."
10051050-7 = "Eu não estou nem um pouco agradecida por isso!!"
10051050-8 = "I-iih!?"
10051050-9 = "E agora!?#nDe que adianta ter as roupas se a modelo que deveria usá-las está desmaiada!?"
10051050-10 = "A culpa é toda de vocês e dessa luta!!"
10051050-15 = "Ei, ei, não pode colocar a culpa na gente por isso..."
10051050-16 = "S-será que... essa pessoa que desmaiou é..."
10051050-17 = "A modelo que deveria participar do desfile de hoje!?"
10051050-18 = "E antes de tudo! Por que ela estava desmaiada num lugar desses!?"
10051050-19 = "[s] \"Será que ela não foi pega no meio do combate...?\""
10051050-20 = "Nós só lutamos contra o Grupo Capacete, não foi?#nDe onde essa pessoa surgiu...?"
10051050-21 = "Chefe! Ela está desmaiada com a mão estendida para a bolsa onde estão as roupas!"
10051050-22 = "Ou seja, ela estava tentando alcançar a bolsa antes de desmaiar...!"
10051050-23 = "Ela deve ter entrado no meio da luta para recuperar a bolsa e acabou sendo atingida por uma bala perdida!"
10051050-24 = "Entendo, isso explica tudo...!"
10051050-25 = "Q-que dedução lógica incrível...!"
10051050-26 = "Isso sim é o que chamo de dedução ninja!"
10051050-27 = "Não é hora para brincar de detetive! E o que seria \"dedução ninja\"!?"
10051050-28 = "De qualquer forma... ei! Acorde! Você é a estrela deste desfile!#nAcorde! Por favor, acorde logo!!"
10051050-29 = "Com licença... por favor, afaste-se. #nNesse estado, não importa o quanto você a balance, ela não vai acordar."
10051050-30 = "O quê!?"
10051050-31 = "É uma concussão. #nVeja. Há marcas de impacto direto no queixo e na parte de trás da cabeça."
10051050-32 = "Mesmo que ela recupere a consciência à força, não conseguirá mover o corpo direito por algumas horas."
10051050-33 = "N-não pode ser...!"
10051050-37 = "Então, mesmo que ela acorde naturalmente... significa que ela não pode desfilar?"
10051050-38 = "Você pretende colocar alguém nesse estado na passarela...?"
10051050-39 = "Esqueça isso, ela consegue ou não?"
10051050-40 = "…Acho que ela ficaria muito instável."
10051050-41 = "Acima de tudo, ela precisa de repouso agora."
10051050-42 = "Ah, entendo..."
10051050-43 = "Entendido. Se uma especialista diz isso, deve ser a verdade..."
10051050-44 = "Sendo assim, vou providenciar o transporte dela."
10051050-48 = "Mas... o que eu vou fazer com o meu desfile... ah..."
10051050-49 = "…Não tem jeito, não há outra opção."
10051050-50 = "…Vocês."
10051050-51 = "Sim!?"
10051050-52 = "…Bem, vou reconhecer o esforço de vocês."
10051050-53 = "…Se a pontaria de vocês fosse um pouco melhor, seria perfeito."
10051050-54 = "Vou voltar na frente."
10051050-59 = "Camarim do desfile de moda"
10051050-60 = "Ah..."
10051050-61 = "Aaaaaah..."
10051050-62 = "O que eu faço...? Como vou resolver esse desfile que está prestes a começar..."
10051050-63 = "Com licença, Shine Cat... que tal tentarmos arranjar uma modelo substituta às pressas?"
10051050-64 = "O ponto de vista não é ruim."
10051050-65 = "Mas... veja, você entende este traje? O que você sente ao olhar para ele?"
10051050-66 = "E-er... é muito, muito bonito...?"
10051050-67 = "Não, olhe para o tamanho, o tamanho! Olhe bem para esse tamanho grande e lindo!"
10051050-68 = "Eu desenhei esta roupa pensando em uma modelo de 1,80m de altura."
10051050-69 = "E então? Tem alguma modelo assim na sala de espera?"
10051050-70 = "N-não tem!"
10051050-71 = "Exato. Não é fácil encontrar alguém com mais de 1,80m! Não é tão conveniente assim..."
10051050-75 = "...Espere. Tinha uma... pessoa."
10051050-76 = "Hã, de quem você está falando?"
10051050-77 = "Tsukuyo Oono."
10051050-78 = "Quem é essa?"
10051050-79 = "O quê!? É a segurança que estava na entrada principal! Além disso, ela estava no local agora pouco, não estava!?"
10051050-80 = "Você é da equipe do desfile e nem se lembra do nome da segurança!?"
10051050-81 = "Normalmente a gente não decora o nome de cada um...!"
10051050-82 = "Esquece isso! Traga aquela garota. Agora mesmo!!"
10051050-83 = "Hã, sério...? Vamos usar uma segurança como modelo!?"
10051050-84 = "Desde que a vi pela primeira vez, eu percebi. Aquela garota tem talento. #nNão é só a altura. Aquele porte, o equilíbrio do corpo... era perfeito."
10051050-85 = "Ela é a única que faz jus a esta roupa."
10051050-86 = "V-você não está brincando, né!?"
10051050-91 = "Eu pareço estar brincando!?"
10051050-92 = "N-não! Vou trazê-la imediatamente!!"
10051050-97 = "Bosque nos fundos do local do desfile de moda"
10051050-98 = "E-ehhh!? E-eu, modelo...!?"
10051050-99 = "Sim, não temos tempo!"
10051050-100 = "M-mas... eu nunca estudei para ser modelo...! #nAlguém como eu... não tem como subir no palco..."
10051050-101 = "Eu também acho isso!? #nMas a Shine Cat disse: 'Traga ela de qualquer jeito!'...!"
10051050-102 = "I-iiih..."
10051050-103 = "Por favor, considere isso como uma boa ação...! #nA Shine Cat vai te dar uma recompensa, então...!"
10051050-105 = "U-uu... m-mas...!"
10051050-106 = "Você sabe onde fica a sala de espera, né? #nEu vou me juntar a vocês depois, pode ir na frente!"
10051050-111 = "B-bucho... o que eu devo fazer...!"
10051050-112 = "Em um desfile tão grande, eu ser a modelo..."
10051050-113 = "Todo mundo com certeza não gosta de garotas que só são altas como eu..."
10051050-114 = "Com certeza, muita gente vai vaiar..."
10051050-115 = "E então eu vou ficar desesperada, me trancar no quarto... #ne enquanto assisto aos filmes do diretor 'Shibainu Wanzou'... vou murchar lentamente..."
10051050-116 = "Não, nada disso vai acontecer."
10051050-120 = "Tsukuyo. Você lembra o que eu disse quando nos conhecemos?"
10051050-121 = "...Que meu corpo era muito grande."
10051050-122 = "B-bem, eu disse isso também, mas!"
10051050-123 = "Foi justamente por isso que eu disse que você era a ninja mais forte!"
10051050-124 = "...!"
10051050-125 = "Para a ninja mais forte, uma dificuldade dessas não é nada!"
10051050-126 = "Bucho...!"
10051050-127 = "Além disso, você foi escolhida a dedo por uma das melhores estilistas do mercado, não foi?"
10051050-128 = "Vamos de cabeça erguida!"
10051050-129 = "E se algo der errado..."
10051050-130 = "A culpa é toda dos organizadores! Isso está escrito até na coletânea de frases célebres do Sensei!"
10051050-131 = "[s1] \"Eu disse isso mesmo!?\"\n[s2] \"Minha coletânea de frases célebres existe!?\""
10051050-134 = "Ufa..."
10051050-138 = "...Entendido. Eu vou tentar!"
10051050-140 = "Sala de espera do desfile de moda"
10051050-142 = "Entre."
10051050-148 = "Você veio. Está preparada?"
10051050-149 = "……Sim!"
10051050-150 = "Você tem um talento inegável. #nMas este caminho não é fácil o suficiente para se viver apenas disso."
10051050-151 = "É justamente por isso que, se você conseguir trilhar este caminho até o fim, a glória será sua. #nEu garanto isso."
10051050-152 = "I-isso é algo que eu…… não desejo……."
10051050-153 = "Além disso, esse seu visual…… você disse que era uma ninja, não foi?"
10051050-154 = "Não sei bem o que é isso, mas já é hora de se despedir dele."
10051050-155 = "Porque o traje que você deve fazer brilhar hoje é uma criação minha."
10051050-156 = "Vamos, vá se trocar logo. O vestiário é por ali."
10051050-157 = "Com licença……."
10051050-158 = "O que foi? Não temos tempo, seja breve."
10051050-159 = "É…… que, ser modelo é…… apenas por hoje……."
10051050-160 = "Assim que essa missão terminar, eu voltarei para o Clube de Pesquisa de Ninjutsu……!"
10051050-161 = "……Vou me trocar."
10051050-166 = "Fufu……."
10051050-168 = "……Será que o mundo vai permitir isso?"
10051050-170 = "Palco Principal do Desfile de Moda"
10051050-172 = "Tsukuyo…… será que ela está se saindo bem……?"
10051050-173 = "Como será que ela vai aparecer no palco?"
10051050-174 = "Izuna, estou tão empolgada!"
10051050-175 = "Ah, parece que vai começar!"
10051050-191 = "……Chefe."
10051050-192 = "……Sim?"
10051050-193 = "Nós…… o que acabamos de ver……?"
10051050-194 = "Hmm……."
10051050-196 = "……Arte?"
