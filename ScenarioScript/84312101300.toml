[translation]
84312101300-6 = "もう行っちまったのか？"
84312101300-7 = "本当に何の痕跡を残さずに……。"
84312101300-8 = "メッセージの一つくらいは残していくものと思ったが……。"
84312101300-9 = "なんだ寂しいのか？"
84312101300-10 = "正直……否定はできない。"
84312101300-11 = "フッ……ったく。"
84312101300-12 = "あいつのこと、まだ分かってねえな。そういう気遣いができる奴じゃねぇだろ。"
84312101300-13 = "まあ……最近は理解者もでき始めたみてぇだし。"
84312101300-14 = "それに、これだけ長い時間をあいつと過ごしたんだ。もう……そう簡単に切れる縁じゃねぇだろうさ。"
84312101300-15 = "まぁ、あたしだって多少はな？"
84312101300-16 = "ぶっちゃけ、トリニティのお嬢様がここまでついてこれるとは思わなかったっつうか。どうせどっかで音を上げる気がしてたんだが……。"
84312101300-18 = "ネル……。"
84312101300-19 = "「ティーパーティー」という枠組みに籠っていたならともかく……ネル。今、君の前にいる私は「百合園セイア」だからね。"
84312101300-20 = "お前、堅物そうに見えんのに、意外と柔軟だよな。聞いてたティーパーティーのイメージと全然違う。"
84312101300-21 = "「ティーパーティー」の話をするなら、少々態度を改めねばならないが……。"
84312101300-22 = "おぉ怖い怖い。今のは無しってことで。わりぃな。"
84312101300-23 = "……それで、もうトリニティに帰るのか？"
84312101300-24 = "最後、先生に挨拶をして行く予定だ。良ければ君も一緒に来るかい？"
84312101300-25 = "先生？んー、そうすっか。"
84312101300-26 = "ああ。話したいことが沢山だ。"
84312101300-30 = "……あ、そうだ。ちょっとこっち来い。"
84312101300-34 = "うん？何を……。"
84312101300-47 = "よし、いい感じじゃねぇか？"
84312101300-48 = "……ネル？"
84312101300-52 = "ここに置いときゃ、後からでも見るだろ。"
84312101300-53 = "あいつに優しさを求めるなんて、求める側が疲れるだけだ。 "
84312101300-54 = "でも、こっちがやっておく分には確認するんだ、あいつは。#n喜ぶと思うぞ、言葉にはしなくてもな。"
84312101300-55 = "……そうか。"
84312101300-56 = "長い付き合いから生じる、言語を超越した相互理解なのだろうね。私も、よく知る感覚だ。私の場合……いささか危なっかしくはあるがね。"
84312101300-57 = "んじゃそろそろ戻るか。あんま長居してっとまた心配されるからよ。"
84312101300-58 = "ああ、そうしよう。"
84312101300-64 = "リオ……それじゃあ、また。"
84312101300-69 = "独り言か？"
84312101300-70 = "カメラだ。後で確認するのだろう？"
84312101300-71 = "ああ……下手すりゃ、リアルタイムで見てるぜ。あいつはそういう奴なんだよ。"
84312101300-72 = "そんじゃ、あたしも行くぞ、またな！"
84312101300-80 = "……。"
84312101300-86 = "……また。"
