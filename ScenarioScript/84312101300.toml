[translation]
84312101300-6 = "Já foi embora?"
84312101300-7 = "Sem deixar rastro algum..."
84312101300-8 = "Pensei que deixaria pelo menos uma mensagem..."
84312101300-9 = "O quê, está se sentindo solitária?"
84312101300-10 = "Sinceramente... não posso negar."
84312101300-11 = "Hmph... francamente."
84312101300-12 = "Você ainda não entende como ela é. Ela não é do tipo que tem esse tipo de consideração."
84312101300-13 = "Bem... parece que ultimamente ela começou a encontrar pessoas que a compreendem."
84312101300-14 = "Além disso, passamos tanto tempo juntas. Esse laço não é algo que se rompe tão facilmente."
84312101300-15 = "Bem, eu também, até certo ponto, não é?"
84312101300-16 = "Para ser sincera, eu não esperava que uma madame da Trinity conseguisse me acompanhar até aqui. Achei que você desistiria em algum momento..."
84312101300-18 = "Neru..."
84312101300-19 = "Se eu estivesse confinada à estrutura do 'Tea Party', talvez... mas Neru, a pessoa diante de você agora é 'Misono Mika'."
84312101300-20 = "Você não parece ser tão rígida, é surpreendentemente flexível. É bem diferente da imagem que eu tinha do Tea Party."
84312101300-21 = "Se formos falar do 'Tea Party', eu teria que mudar um pouco a minha postura, mas..."
84312101300-22 = "Opa, que medo. Esquece o que eu disse. Foi mal."
84312101300-23 = "...Então, você já vai voltar para a Trinity?"
84312101300-24 = "Planejo me despedir do Sensei antes de ir. Se não se importar, gostaria que viesse comigo."
84312101300-25 = "Sensei? Humm, pode ser."
84312101300-26 = "Sim. Tenho muitas coisas para conversar."
84312101300-30 = "...Ah, é verdade. Venha aqui um pouco."
84312101300-34 = "Hm? O que foi..."
84312101300-47 = "Pronto, não ficou bom?"
84312101300-48 = "...Neru?"
84312101300-52 = "Se deixar aqui, ela vai ver depois."
84312101300-53 = "Esperar gentileza dela só vai cansar quem espera."
84312101300-54 = "Mas, se nós fizermos a nossa parte, ela vai conferir. #nAcho que ela vai ficar feliz, mesmo que não diga nada."
84312101300-55 = "...Entendo."
84312101300-56 = "Deve ser uma compreensão mútua que transcende as palavras, nascida de um longo convívio. É uma sensação que conheço bem. No meu caso... embora seja um pouco perigoso."
84312101300-57 = "Bom, vamos voltar. Se demorarmos muito, vão começar a se preocupar de novo."
84312101300-58 = "Sim, vamos fazer isso."
84312101300-64 = "Rio... então, até mais."
84312101300-69 = "Está falando sozinha?"
84312101300-70 = "É uma câmera. Ela vai conferir depois, não vai?"
84312101300-71 = "É... se bobear, ela está assistindo em tempo real. Ela é desse tipo."
84312101300-72 = "Então, eu também já vou, até mais!"
84312101300-80 = "..."
84312101300-86 = "...Até mais."
