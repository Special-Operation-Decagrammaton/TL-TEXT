[translation]
11120-2 = "第12話;ブラックマーケットへ（２）"
11120-3 = "歓楽街"
11120-4 = "……ここまで来れば大丈夫でしょう。"
11120-5 = "ふむ……#nここをかなり危険な場所だって認識してるんだね。"
11120-6 = "えっ？と、当然です。連邦生徒会の手が及ばない場所のひとつですから……。"
11120-7 = "ブラックマーケットだけでも、学園数個分の規模に匹敵しますし、決して無視はできないかと……。"
11120-8 = "それに様々な「企業」が、この場所で違法な事柄を巡って利権争いをしていると聞きました。"
11120-9 = "それだけじゃありません。ここ専用の金融機関や治安機関があるほどですから……。"
11120-10 = "銀行や警察があるってこと……！？#nそ、それってもちろん、認可されていない違法な団体だよね！？"
11120-11 = "はい……そうです。"
11120-12 = "スケールがケタ違いですね……。"
11120-13 = "中でも特に治安機関は、とにかく避けるのが一番です……。#n騒ぎを起こしたら、まずは身を潜めるべきです……。"
11120-14 = "ふ～ん、ヒフミちゃん、ここのことに意外と詳しいんだねー。"
11120-15 = "えっ？そうですか？危険な場所なので、事前調査をしっかりしたせいでしょうか……。"
11120-16 = "よし、決めたー。"
11120-17 = "……？"
11120-18 = "助けてあげたお礼に、私たちの探し物が手に入るまで一緒に行動してもらうねー♪"
11120-19 = "え？ええっ？"
11120-20 = "わあ☆いいアイデアですね！"
11120-21 = "なるほど、誘拐だね。"
11120-22 = "はいっ！？"
11120-23 = "誘拐じゃなくて、案内をお願いしたいだけでしょ？#nもちろん、ヒフミさんが良ければ、だけど。"
11120-24 = "あ、あうう……私なんかでお役に立てるかわかりませんが……#nアビドスのみなさんにはお世話になりましたし、喜んで引き受けます。"
11120-25 = "よーし。それじゃあ、ちょっとだけ同行頼むねー。"
11120-27 = "（プルルルル……）"
11120-29 = "（プルルルルルルルル……）"
11120-31 = "アルちゃん、何してんの？電話出ないの？"
11120-32 = "……。"
11120-33 = "表情が暗い……もしかしてクライアント……？"
11120-34 = "うわ、そりゃそんな顔にもなるわ。失敗したって報告しないとじゃん？"
11120-35 = "アル様……。"
11120-36 = "……くっ。"
11120-38 = "（ガチャ）"
11120-39 = "はい……便利屋68です。"
11120-42 = "……。"
11120-43 = "ふむ、興味深い報告だ。"
11120-44 = "ここまでの練習は拝見したよ。#nで、実戦はいつだ？"
11120-47 = "……うえ？あれが実戦だったんです……が……。"
11120-48 = "あ、いえ、何でもありません。も、もちろん実戦はすぐにでも……という感じで……#nあ、えっと、1週間以内には……はい。"
11120-49 = "！？"
11120-50 = "！！"
11120-51 = "ふふっ。はい、そうです。#n……お任せください。"
11120-53 = "（ガチャ）"
11120-54 = "やつらのデータ自体は正確な物だったはず。"
11120-55 = "計算ミスか？いや、しかしあの力は明らかに……。"
11120-56 = "……お困りのようですね。"
11120-57 = "……。"
11120-58 = "いや、困ってはない。ただ、計算に少しエラーが生じただけだ。#nアビドスの連中が、データより遥かに強かっただけのこと。"
11120-59 = "……。"
11120-60 = "……データに不備はありません。"
11120-61 = "……？"
11120-62 = "これは単に、アビドスの生徒がさらに強くなった、と解釈すべきかと。"
11120-63 = "それは一体……。"
11120-64 = "アビドスにどのような変化要因があったのか、確認してみましょう。"
11120-65 = "では。"
11120-68 = "……。"
11120-70 = "（ガチャ）"
11120-71 = "……はあ。"
11120-72 = "やつれたねえ、アルちゃん。"
11120-73 = "社長、一体どういうこと……？まさか、また戦うの？"
11120-74 = "……あのクライアントは、私も詳しくは知らないけど、超大物なのよ。#n……この依頼、失敗するわけにはいかないわ。"
11120-75 = "……。"
11120-76 = "だけどアビドスの連中、思ったより強かったじゃん。#nそれに、あの「シャーレ」の先生が一緒にいるから、私たちだけじゃ無理だよ。"
11120-77 = "お金も全部使い果たしちゃったしね。どう戦うのさ？"
11120-78 = "わっ、私がバイトでもしてきましょうか？"
11120-79 = "その稼ぎで傭兵を雇うには、全員あと1年は働かないと……。"
11120-80 = "こんな高いオフィスなんか借りてるから、無駄にお金ばかりかかってるじゃ……。"
11120-81 = "う、うるさいっ！ちゃんとした会社なら、事務所は基本でしょ！#nそのほうが仕事の依頼も増えるんだから！"
11120-82 = "別に、私は前みたいに公園にテントでも構わないけどー？"
11120-83 = "黙りなさいよ！みんなうるさい！静かに！！"
11120-84 = "……。"
11120-85 = "……融資を受けるわ。"
11120-86 = "は？アルちゃんはブラックリスト入りしてるでしょ。"
11120-87 = "違うわよ！私は指名手配されて口座が凍結されただけ！"
11120-88 = "そうだっけ？#n……あ、そうだった。風紀委員会にやられたんだよね。"
11120-89 = "くっ、風紀委員会め……ここまで痛めつけられるとは思わなかったわ。 "
11120-90 = "中央銀行も、行ったところで門前払いだろーね。"
11120-91 = "うるさいってば！他にも方法はあるんだから！"
11120-92 = "……。"
11120-93 = "見てなさいよ、アビドス。このままじゃ終わらせないんだから。"
11120-94 = "便利屋のミッションはこれからなのよ！"
11120-96 = "……。"
11120-97 = "へー、一体どうするつもりなんだろ。"
11120-99 = "次回;出動！覆面水着団（１）"
