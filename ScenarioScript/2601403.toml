[translation]
2601403-1 = "休むなら二人一緒に"
2601403-4 = "失礼します。"
2601403-5 = "……急にすまない、先生。"
2601403-6 = "こんなに朝早くからお邪魔してしまって……。"
2601403-7 = "[s] \"気にしないで大丈夫だよ\""
2601403-8 = "さっきモモトークでも言ったけど、#n時間を持て余してしまっていて……。"
2601403-9 = "「休日」とは本当に難しいな。"
2601403-10 = "[s1] \"何もしないことも大事。\"\n[s2] \"家だと思ってくつろいでいいからね。\""
2601403-13 = "ああ、そうか。"
2601403-14 = "たしか……ちゃんと休むことも任務のうち、だったか。"
2601403-15 = "理解した。先生のアドバイスに従おう。"
2601403-16 = "[s] \"こっちのソファにどうぞ。\""
2601403-17 = "……？"
2601403-18 = "先生も一緒に休まないのか？"
2601403-19 = "[s] \"仕事が溜まっててね……\""
2601403-23 = "[ns] \"でも、カリンは気にせずゆっくりしててね！\""
2601403-24 = "ああ。"
2601403-25 = "早く片付いて、先生も休めるといいな。"
2601403-28 = "……。"
2601403-33 = "[ns] \"はい、連邦捜査部S.C.H.A.L.Eです。\""
2601403-35 = "[ns] \"あっ！大変失礼いたしました！今日中にお送りします！\""
2601403-36 = "……。"
2601403-37 = "えっと……何か私にも手伝えることがあったら……。"
2601403-38 = "[s] \"大丈夫大丈夫！カリンは休んでて！\""
2601403-39 = "そ、そうか……。"
2601403-40 = "分かった。"
2601403-42 = "フィルターが詰まっています。お手入れをお願いします。"
2601403-43 = "[ns] \"ああっ！掃除！忘れてた！\""
2601403-44 = "掃除なら、私が……！"
2601403-45 = "[s] \"カリンはお休みの日だから。気持ちだけもらっておくね\""
2601403-49 = "うっ……。"
2601403-51 = "[ns] \"あの資料、どこにしまったっけ……\""
2601403-52 = "……。"
2601403-53 = "[s] \"あっ！手伝わなくて大丈夫だよ！\""
2601403-55 = "[ns] \"カリンは休んでて！\""
2601403-56 = "……。"
2601403-57 = "[s] \"か、カリン？\""
2601403-58 = "……先生。"
2601403-59 = "その……私が手出しするのが迷惑なら、そう言ってくれ。"
2601403-60 = "正直に言ってもらったほうが、助かる……。"
2601403-61 = "[s3] \"そ、そんなことないよ！\"\n[s4] \"今日はカリンがお休みの日だから、少しでもゆっくりしてもらおうと思って……\""
2601403-64 = "私に気を使ってくれているだけなら、手伝わせてほしい。"
2601403-65 = "先生一人を働かせてるのは、気が休まらないんだ……。"
2601403-66 = "[s] \"そ、そうだったんだ……ごめん。\""
2601403-67 = "……休息をとるなら、先生と一緒がいい。"
2601403-68 = "だから……心置きなく休むために、先生の仕事を手伝わせてほしい。"
2601403-72 = "[ns] \"わかった。じゃあ……ここをキレイにしてもらえると嬉しいな\""
2601403-73 = "任せてくれ。"
2601403-75 = "（カリンにも手伝ってもらいながら、残っていた仕事をすべて片づけた）"
2601403-76 = "（そのおかげで気兼ねなく、#nゆったりとした時間を二人で過ごすことができた）"
