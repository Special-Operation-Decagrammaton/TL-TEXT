[translation]
2601403-1 = "Se for para descansar, que seja nós dois juntos"
2601403-4 = "Com licença."
2601403-5 = "……Desculpe aparecer de repente, Sensei."
2601403-6 = "Peço perdão por incomodar tão cedo pela manhã……."
2601403-7 = "[s] \"Não se preocupe, está tudo bem\""
2601403-8 = "Como eu disse no Momotalk agora pouco, #n eu acabei ficando sem nada para fazer……."
2601403-9 = "O conceito de \"dia de folga\" é realmente difícil, não é?"
2601403-10 = "[s1] \"Não fazer nada também é importante.\"\n[s2] \"Sinta-se em casa e fique à vontade.\""
2601403-13 = "Ah, entendo."
2601403-14 = "Se bem me lembro…… descansar adequadamente também faz parte da missão, não é?"
2601403-15 = "Entendido. Vou seguir o conselho do Sensei."
2601403-16 = "[s] \"Por favor, sente-se neste sofá.\""
2601403-17 = "……?"
2601403-18 = "O Sensei não vai descansar também?"
2601403-19 = "[s] \"É que tenho muito trabalho acumulado……\""
2601403-23 = "[ns] \"Mas, Karin, não se preocupe e relaxe!\""
2601403-24 = "Ah."
2601403-25 = "Espero que termine logo para que o Sensei também possa descansar."
2601403-28 = "……."
2601403-33 = "[ns] \"Sim, aqui é o Departamento de Investigação Federal S.C.H.A.L.E.\""
2601403-35 = "[ns] \"Ah! Peço mil desculpas! Enviarei ainda hoje!\""
2601403-36 = "……."
2601403-37 = "Bem…… se houver algo em que eu possa ajudar……."
2601403-38 = "[s] \"Está tudo bem! Karin, pode descansar!\""
2601403-39 = "E-entendo……."
2601403-40 = "Compreendido."
2601403-42 = "O filtro está entupido. Por favor, faça a manutenção."
2601403-43 = "[ns] \"Ah! A limpeza! Eu tinha esquecido!\""
2601403-44 = "Se for limpeza, eu posso……!"
2601403-45 = "[s] \"Hoje é o seu dia de folga, Karin. Agradeço a intenção, mas deixe comigo.\""
2601403-49 = "Ugh……."
2601403-51 = "[ns] \"Onde foi que eu guardei aquele documento……\""
2601403-52 = "……."
2601403-53 = "[s] \"Ah! Não precisa ajudar, está tudo bem!\""
2601403-55 = "[ns] \"Karin, fique descansando!\""
2601403-56 = "……."
2601403-57 = "[s] \"Ka-Karin?\""
2601403-58 = "……Sensei."
2601403-59 = "Diga-me…… se a minha ajuda for um incômodo, por favor, seja direto."
2601403-60 = "Seria mais fácil se você fosse honesto comigo……."
2601403-61 = "[s3] \"N-não é nada disso!\"\n[s4] \"É que hoje é seu dia de folga, então eu queria que você descansasse o máximo possível……\""
2601403-64 = "Se você está apenas sendo gentil comigo, eu gostaria que me deixasse ajudar."
2601403-65 = "Não consigo relaxar sabendo que o Sensei está trabalhando sozinho……."
2601403-66 = "[s] \"E-era isso…… me desculpe.\""
2601403-67 = "……Se for para descansar, prefiro que seja com o Sensei."
2601403-68 = "Por isso…… para que eu possa descansar sem preocupações, deixe-me ajudar com o seu trabalho."
2601403-72 = "[ns] \"Entendido. Então…… eu ficaria muito grato se pudesse limpar aqui.\""
2601403-73 = "Deixe comigo."
2601403-75 = "(Com a ajuda da Karin, consegui terminar todo o trabalho que estava pendente)"
2601403-76 = "(Graças a isso, pudemos passar um tempo #n tranquilo juntos, sem preocupações)"
