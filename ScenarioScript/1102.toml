[translation]
1102-1 = "Cotidiano do Grupo de Pesquisa Gourmet (2)"
1102-2 = "(Todos os membros do Grupo de Pesquisa Gourmet presos no centro de detenção do Comitê de Disciplina Pública)"
1102-3 = "Sim! ? Brigadeiro? ? Que bom porque eu também queria comer!"
1102-4 = "Infelizmente foi confiscado..."
1102-5 = "O que, já! ! Todo mundo pelo menos sentiu o cheiro! ? É tão raro! ?"
1102-6 = "sim. Aquele perfume rico e único... Nunca esquecerei dele pelo resto da minha vida."
1102-7 = "Queria muito experimentar... trufas."
1102-8 = "(Don Don Don Don!!!) Demônio! diabo! Coma algo delicioso só para você! #nRessentimentos alimentares são assustadores! ! #nDê para mim também! Aaaaaan! !"
1102-10 = "Ei! ! Fique quieto! !"
1102-11 = "Os itens confiscados serão devolvidos a você depois de investigarmos se estão relacionados ao crime. #nAcho que estará concluído em cerca de 1 mês."
1102-13 = "Por um mês...! !"
1102-14 = "Izumi-san, você consegue sentir o cheiro?"
1102-15 = "Aquela fala enquanto entregava a cueca...!"
1102-16 = "O que é isso? Mas não estou interessado nas calças da Akari..."
1102-17 = "Ah, que desperdício. Essa é...a cueca que embrulhou a trufa, certo?"
1102-19 = "O cheiro daquele cogumelo chamado diamante negro está impregnado nesta roupa íntima."
1102-23 = "Dê para mim! cheiro!"
1102-25 = "(Suha, suha, suha)"
1102-26 = "Este é o cheiro de trufas frescas...Tenho que enfiar isso no meu cérebro para não esquecer."
1102-28 = "(Suha, suha)"
1102-29 = "Não há pessoas decentes aqui...?"
1102-30 = "Como esperado. Sua atitude insaciável em relação ao sabor é admirável, Izumi-san."
1102-31 = "Não... não importa como você olhe, ele é um grande pervertido, mas..."
1102-32 = "[s] \"Ei, pessoal.\"\"\n1102-33 = \"Uau! Fiquei tão surpreso! #nHá quanto tempo você está aí, senhor?\"\n1102-34 = \"Ah, por que o sensei está aqui?\"\n1102-35 = \"Ele provavelmente fez algo estranho novamente e foi preso. Ele é uma pessoa completamente implacável.\"\n1102-36 = \"[s1] \"Não! Falsa acusação! Falsa acusação!\"\n[s2] \"É muito longo para dizer...\"\"\n1102-37 = \"Mesmo que o sensei diga isso, não há credibilidade alguma☆\"\n1102-38 = \"Eu sinto que posso entender mesmo que não pergunte... embora não diga.\"\n1102-41 = \"Sensei! ! Isto cheira a trufas. Vamos sentir o cheiro juntos?\"\n1102-42 = \"[s3] \"Definitivamente!\"\n[s4] \"Como esperado, isso foi rejeitado.\"\"\n1102-43 = \"(Suha, suha, suha)\"\n1102-44 = \"Huh? É realmente bom? Isso é muito caro. #nParece que você não consegue nem sentir o cheiro do salário de um funcionário de escritório!\"\n1102-45 = \"[s5]\"Bem, então vamos lá!\""

1102-46 = "(Suha, suha, suha)"
1102-47 = "(aplausos)"
1102-48 = "Ah... desculpe, sensei. Aparentemente houve um mal-entendido."
1102-49 = "O sensei foi preso só porque foi denunciado nadando nu na piscina da escola...#nNa verdade, parece que foi minha culpa, mas..."
1102-50 = "Esse tipo de coisa pode acontecer, então tenha mais cuidado com suas atividades diárias."
1102-51 = "[s] \"Suha, suha, suha...!?\""
1102-52 = "...! ! ?"
1102-54 = "Sensei, como você está? Essa cueca cheira bem, certo?"
1102-55 = "……."
1102-56 = "……."
1102-58 = "……."
1102-59 = "[s] \"Não, hum, isso também é um mal-entendido!\""
1102-60 = "Você ouvirá desculpas no inferno."
1102-61 = "(Gashaan!)"
1102-62 = "Cotidiano do Grupo de Pesquisa Gourmet"
