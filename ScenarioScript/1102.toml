[translation]
1102-1 = "美食研究会の日常（２）"
1102-2 = "（風紀委員会の留置場に囚われた、美食研究会一同）"
1102-3 = "えええっ！？トリュフ？？私も食べたかったのにいいい！"
1102-4 = "残念ながら没収されてしまいましたの……。"
1102-5 = "何よ、もうっ！！みんな匂いぐらいは嗅いだんでしょ！？すっごいレアなんでしょ！？ "
1102-6 = "はい。あの濃厚で独特な香り……生涯忘れることはないでしょう。"
1102-7 = "実食したかったですわね……トリュフ。 "
1102-8 = "（ドンドンドンドン！！！）鬼！悪魔！あなたたちだけ美味しいの食べて！#n食べ物の恨みは恐ろしいんだぞ！！#n私にもちょうだいよおおお！うああああん！！"
1102-10 = "おい！！静かにしろ！！"
1102-11 = "没収した物に関しては、犯罪との関連性がないかを調べた後にお返しします。#n1ヶ月くらいで終わるかと。"
1102-13 = "1ヶ月も……！！"
1102-14 = "イズミさん、香りだけでも嗅ぎます？"
1102-15 = "下着を手渡しながらそのセリフっ……！"
1102-16 = "何これ？アカリのパンツに興味はないけど……。"
1102-17 = "あら、もったいない。これはですね……あのトリュフを包んでいた下着ですよ？"
1102-19 = "黒いダイヤと呼ばれるあのキノコの香りが、この下着に染み込んでいるんです☆"
1102-23 = "ちょうだい！嗅ぐ！"
1102-25 = "（スーハー、スーハー、スーハー）"
1102-26 = "これが新鮮なトリュフの香り……忘れないように脳に叩き込まないと。"
1102-28 = "（スーハー、スーハー）"
1102-29 = "ここにまともな人はいないの……？"
1102-30 = "さすがですわね。味に対する飽くなきその姿勢、お見事ですわ、イズミさん。"
1102-31 = "いや……どこからどう見ても立派な変態だけど……。"
1102-32 = "[s] \"や、みんな。\""
1102-33 = "うわっ！ビックリしたあ！#nいつからそこにいたの、先生？"
1102-34 = "あら、なぜ先生がこちらに？"
1102-35 = "大方また変なことでもして捕まったのでしょう。まったく、懲りないお方ですわ。"
1102-36 = "[s1] \"違う！濡れ衣！冤罪！\"\n[s2] \"話すと長くて……。\""
1102-37 = "先生がそのように仰っても、全っ然信憑性ありませんね☆"
1102-38 = "聞かなくても、なんとなくわかる気がする……敢えて言わないけど。"
1102-41 = "せんせー！！これトリュフの香りなんだって。一緒に嗅ぐ？"
1102-42 = "[s3] \"ぜひ！\"\n[s4] \"それは流石に却下で。\""
1102-43 = "（スーハー、スーハー、スーハー）"
1102-44 = "えっ？ホントにいいのっ？これ、すっごく高いんだって。#nサラリーマンのお給料じゃ、匂いも嗅げないくらいらしいよ！"
1102-45 = "[s5]\"じゃあ、せっかくだし！\""
1102-46 = "（スーハー、スーハー、スーハー）"
1102-47 = "（ガチャンッ）"
1102-48 = "はあ……ごめん、先生。どうやら誤解があったみたい。"
1102-49 = "学校のプールで裸で泳いでいるっていう通報を受けただけで先生を拘束したのは……#n実際私の早とちりだったみたい、だけど……。"
1102-50 = "こういうことが起こりうるから、もっと普段から日頃の行いをちゃんと……。"
1102-51 = "[s] \"スーハー、スーハー、スーハー……！？\""
1102-52 = "……！！？"
1102-54 = "せんせー、どう？この下着、良い香りがするでしょ？"
1102-55 = "……。"
1102-56 = "……。"
1102-58 = "……。"
1102-59 = "[s] \"いや、あの、これも誤解で！\""
1102-60 = "言い訳は地獄で聞くから。"
1102-61 = "（ガッシャーン！）"
1102-62 = "美食研究会の日常"
