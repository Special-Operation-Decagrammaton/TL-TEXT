[translation]
80000040-1 = "少女の気持ちは色褪せない"
80000040-3 = "（バレンタインデーの日の夜、ジュリから一通の連絡が届いた）"
80000040-4 = "先生、今から少しお会いできますでしょうか……？"
80000040-5 = "あの、もしかしたらご迷惑かもしれないのですが、その……先生にチョコをお渡ししたくって……。"
80000040-6 = "い、いえすみませんやはり忘れてください！私からのチョコレートなんて……"
80000040-7 = "[s] \"ジュリのチョコレート！？すぐ行く！\""
80000040-8 = "え、えっ！？"
80000040-9 = "で、ではすみません、お待ちしております……！？"
80000040-13 = "ゲヘナ学園・第3校舎教室"
80000040-14 = "（ジュリのいる教室まで急いで向かう）"
80000040-15 = "あ、先生……！"
80000040-16 = "えっと、その……は、早かったですね……。"
80000040-17 = "[s] \"ジュリから連絡もらって、走ってきたから。\""
80000040-18 = "そ、そうでしたか……"
80000040-19 = "ですが、その、大したものではないと言いますか……。"
80000040-20 = "そこまで期待されてしまいますと、その……。"
80000040-21 = "私が作ったのは、普通のチョコレートですよ……？"
80000040-22 = "[s] \"ジュリがくれるんだから、嬉しいよ。\""
80000040-23 = "あっ……はい。そこまで言ってくださるのでしたら……"
80000040-24 = "どうぞ！"
80000040-29 = "[ns] \"いただきます！\""
80000040-33 = "い、いかがですか……？"
80000040-34 = "[s] \"うん、美味しい。\""
80000040-35 = "そ、そうですか。良かった……。"
80000040-39 = "ではチョコレートもお渡しできましたし、本日はこれで……"
80000040-40 = "[s] \"……実はまだ、渡したいものとかあったりしない？\""
80000040-41 = "えっ！？そ、それはその……。"
80000040-42 = "も、もしかしてバレてしまいましたが……？確かにそれは、先ほどスーパーで買ってきたものですが……。"
80000040-43 = "それでも、私の手作りをお渡しするわけには……！"
80000040-44 = "[s] \"どうして？\""
80000040-45 = "……渡したいなとは思っていたんです。ですが、作ったチョコレートを他の方々に味見してもらったところ……。"
80000040-46 = "みなさん、その場で倒れてしまって……。"
80000040-47 = "[s] \"流石のジュリインパクト……。\""
80000040-48 = "ジュリインパクト……！？"
80000040-49 = "と、とにかくそれを、先生にお渡しするわけには……。"
80000040-50 = "私のせいで、体調を崩させてしまうわけにもいきませんし……。"
80000040-51 = "[s] \"それは気にしないで。\""
80000040-52 = "え……？"
80000040-53 = "[s1] \"ジュリが今日呼んでくれて嬉しかった。\"\n[s2] \"ジュリの手作りのチョコレートを貰えるっていうのもすごく嬉しい。\""
80000040-54 = "先生……私の手作り、お渡ししても大丈夫ですか……？"
80000040-55 = "先生……私の手作り、お渡ししても大丈夫ですか……？"
80000040-56 = "[s] \"それはもう喜んで。\""
80000040-57 = "そう、ですか……ふふっ。"
80000040-58 = "私がひとりで躊躇ってしまう時に、先生はいつもそうやって……。"
80000040-59 = "はい、分かりました。"
80000040-64 = "どうぞ、先生。"
80000040-65 = "私が作った、先生のためのチョコレートです。"
80000040-66 = "受け取って、いただけますか……？"
80000040-67 = "[s] \"もちろん。\""
80000040-68 = "ありがとうございます……！"
80000040-76 = "せ、先生！？大丈夫ですか！？"
80000040-80 = "（ジュリのチョコレートを味わえて良かったという気持ちを抱きつつ、意識はいっそ気持ちよく遠のいていった）"
