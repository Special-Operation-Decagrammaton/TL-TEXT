[translation]
80000040-1 = "O sentimento de uma garota não desbota"
80000040-3 = "（Na noite do Dia dos Namorados, recebi uma mensagem de Juri）"
80000040-4 = "Sensei, você poderia me encontrar agora...?"
80000040-5 = "Bem, talvez seja um incômodo, mas é que... eu queria te dar um chocolate, Sensei..."
80000040-6 = "N-não, desculpe, esqueça o que eu disse! Um chocolate vindo de mim..."
80000040-7 = "[s] \"Chocolate da Juri!? Já estou indo!\""
80000040-8 = "E-eh!?"
80000040-9 = "E-então, me desculpe, estarei te esperando...!?"
80000040-13 = "Gehenna Academy - Sala de aula do 3º prédio"
80000040-14 = "（Corro até a sala de aula onde Juri está）"
80000040-15 = "Ah, Sensei...!"
80000040-16 = "Bem, é que... v-você foi rápido..."
80000040-17 = "[s] \"Recebi sua mensagem e vim correndo.\""
80000040-18 = "E-entendo..."
80000040-19 = "Mas, sabe, não é nada demais..."
80000040-20 = "Se você criar tanta expectativa assim, eu fico..."
80000040-21 = "O que eu fiz é um chocolate comum, sabe...?"
80000040-22 = "[s] \"Fico feliz só por vir de você, Juri.\""
80000040-23 = "Ah... sim. Se você diz assim..."
80000040-24 = "Aqui está!"
80000040-29 = "[ns] \"Vou aceitar!\""
80000040-33 = "E-então, o que achou...?"
80000040-34 = "[s] \"Hum, está gostoso.\""
80000040-35 = "S-sério? Que bom..."
80000040-39 = "Bem, já que te entreguei o chocolate, por hoje é só..."
80000040-40 = "[s] \"...Na verdade, você não tem mais nada que queria me dar?\""
80000040-41 = "Eh!? I-isso é..."
80000040-42 = "V-você descobriu...? É verdade que comprei esse no supermercado agora pouco, mas..."
80000040-43 = "Mesmo assim, eu não poderia te dar o que eu mesma fiz...!"
80000040-44 = "[s] \"Por que não?\""
80000040-45 = "...Eu queria ter dado. Mas, quando pedi para outras pessoas provarem o chocolate que fiz..."
80000040-46 = "Todas elas desmaiaram na hora..."
80000040-47 = "[s] \"O lendário Juri Impact...\""
80000040-48 = "Juri Impact...!?"
80000040-49 = "E-enfim, eu não poderia te dar aquilo, Sensei..."
80000040-50 = "Não posso deixar que você passe mal por minha causa..."
80000040-51 = "[s] \"Não se preocupe com isso.\""
80000040-52 = "Eh...?"
80000040-53 = "[s1] \"Fiquei feliz que você me chamou hoje.\"\n[s2] \"E também fico muito feliz em receber um chocolate feito por você.\""
80000040-54 = "Sensei... tudo bem se eu te der o que eu fiz...?"
80000040-55 = "Sensei... tudo bem se eu te der o que eu fiz...?"
80000040-56 = "[s] \"Com todo o prazer.\""
80000040-57 = "É mesmo...? Fufu."
80000040-58 = "Sempre que eu hesito sozinha, você sempre faz isso..."
80000040-59 = "Sim, entendi."
80000040-64 = "Aqui está, Sensei."
80000040-65 = "É o chocolate que fiz especialmente para você."
80000040-66 = "Você poderia aceitar...?"
80000040-67 = "[s] \"Com certeza.\""
80000040-68 = "Muito obrigada...!"
80000040-76 = "P-Sensei!? Você está bem!?"
80000040-80 = "(Enquanto sentia a satisfação de ter provado o chocolate da Juri, minha consciência se esvaiu de forma bastante agradável)"
