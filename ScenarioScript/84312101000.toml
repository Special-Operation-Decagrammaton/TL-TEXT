[translation]
84312101000-6 = "リオ……ワニが出た。"
84312101000-7 = "状況は把握しているわ。すぐに対処しましょう。"
84312101000-8 = "というか……もうトラブルは起きないんじゃなかったのか……？"
84312101000-9 = "お前が気にしてたのって、これのことだったのか。"
84312101000-10 = "ああ。"
84312101000-11 = "昨日の夕方までは確認されていなかった。少なくとも、会場やキャンパス周辺では。つまりもっと遠くにいたということ。"
84312101000-12 = "……あの体躯が移動できるルートは一つ。"
84312101000-13 = "……地下道か。"
84312101000-14 = "思えば、私たちが最初に出会った場所だね。"
84312101000-16 = "こんな偶然望んじゃいねぇんだけどな。"
84312101000-17 = "ここで逃がせば、次にいつ帰ってくるか分からない。あるいは、他の自治区にまで移動してしまう可能性もある。"
84312101000-18 = "今度こそ捕獲しましょう。"
84312101000-19 = "ミレニアムEXPOから私たちへの……一種の餞別、といったところか。"
84312101000-20 = "餞別か……？これ。"
84312101000-21 = "ハッ……まあいい。綺麗さっぱり片付けて締めてやろうじゃねぇか。"
84312101000-22 = "相応な戦力が必要となるわ。今回は私も遠隔支援しましょう。"
84312101000-27 = "さぁて、行くぞ――[ruby=フィナーレ]最終決戦[/ruby]だ！"
84312101000-28 = "ああ！"
