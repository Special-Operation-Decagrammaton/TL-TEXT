[translation]
84312101000-6 = "Rio... um crocodilo apareceu."
84312101000-7 = "Eu já estou ciente da situação. Vamos lidar com isso imediatamente."
84312101000-8 = "Digo... não era para não termos mais problemas...?"
84312101000-9 = "Então era disso que você estava preocupada."
84312101000-10 = "Sim."
84312101000-11 = "Até ontem à tarde, não havia registros. Pelo menos não no local do evento ou nos arredores do campus. O que significa que ele estava bem mais longe."
84312101000-12 = "…Só existe uma rota pela qual aquele corpo enorme pode se mover."
84312101000-13 = "…O túnel subterrâneo, é isso?"
84312101000-14 = "Pensando bem, foi onde nos encontramos pela primeira vez, não foi?"
84312101000-16 = "Eu não estava desejando uma coincidência dessas."
84312101000-17 = "Se deixarmos escapar agora, não sabemos quando voltará. Ou pior, existe a possibilidade de se mover para outros distritos autônomos."
84312101000-18 = "Vamos capturá-lo desta vez."
84312101000-19 = "Uma espécie de presente de despedida da Millennium EXPO para nós, é isso?"
84312101000-20 = "Um presente de despedida...? Isso?"
84312101000-21 = "Ha... tanto faz. Vamos acabar com isso de uma vez por todas e encerrar o assunto."
84312101000-22 = "Será necessário um poder de fogo adequado. Desta vez, eu também darei suporte remoto."
84312101000-27 = "Muito bem, vamos lá — é o confronto final!"
84312101000-28 = "Sim!"
