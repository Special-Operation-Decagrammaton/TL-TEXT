[translation]
10035160-1 = "後日談その5;局長がいない公安局の一日"
10035160-4 = "副局長、カンナ局長が本日不在ですから。#n代わりに書類の確認をお願いできますか。"
10035160-5 = "はぁぁ……。"
10035160-9 = "はぁぁ……。"
10035160-10 = "姉御をウォーターパークに送ったのはいいものの……。"
10035160-14 = "まずは、この書類に捺印をお願いします。"
10035160-15 = "はいはい。"
10035160-16 = "姉御のぉぉ～～ハンコぉぉぉ～～どこぉぉぉぉ～～。"
10035160-22 = "あった。"
10035160-27 = "……んあぁ、なんっすか、この書類の山は。"
10035160-28 = "あー、だるっ。"
10035160-29 = "えっとー。公安局の食堂リフォーム計画、はい承認。"
10035160-30 = "地下の取調室に窓を設置する提案？"
10035160-31 = "なんだぁ、これ？却下ぁ。"
10035160-32 = "カツ丼の注文先変更の申請。承認。"
10035160-37 = "（意外に仕事が早い……）"
10035160-38 = "（これなら今日中に終わるかも。）"
10035160-43 = "もー！やりたくない。"
10035160-45 = "ええ？もうですか！？"
10035160-46 = "ってさぁ、書類仕事なんてあたしには合わないっつーの。#nだるすぎるって。"
10035160-47 = "ですが、副局長、これは今日中に終わらせる必要が……。"
10035160-48 = "まぁ、わかってるけどさ……。"
10035160-52 = "ぶっちゃけさぁ。あんたもだるいんじゃない？"
10035160-53 = "は、はい！？"
10035160-54 = "遠慮しなくていいって。#n事務所んなかで書類と睨めっこすんのが、好きなヤツなんていないっしょ。"
10035160-55 = "し、しかし！"
10035160-56 = "こ、これも公安局の大事な仕事で――"
10035160-57 = "んな建前はいいって。"
10035160-58 = "本音で行こう。#nねえ、あんたもさ、プール行きたいっしょ？"
10035160-59 = "……はい？"
10035160-60 = "だよねぇ。あぁ～あ。しゃあねえなぁ！"
10035160-61 = "部下のお願いを聞くのも、副局長の仕事だ！"
10035160-65 = "あ、あ――……。待機中の公安局員の諸君、よく聞け。"
10035160-67 = "ずっと後回しにしていた公安局の必須実習項目、#n「戦闘水泳」――本日午後から実施するぞ！"
10035160-68 = "い、いきなりですか！？"
10035160-80 = "来たぞ！"
10035160-81 = "ヴァルキューレ警察学校が誇る屋外水泳訓練所！"
10035160-82 = "カンナの姉御も今頃夏を満喫してるだろうし、あたしらだって負けちゃいけねえ！"
10035160-83 = "んじゃ、手始めに200往復からスタートだ！"
10035160-84 = "お前らぁ！準備はいいか！"
10035160-86 = "え？い、いきなり200往復？冗談ですよね？"
10035160-87 = "副局長はできるかもしれませんが……、私たちには無理ですよ？"
10035160-89 = "あぁ？無理？"
10035160-90 = "公安局の辞書に「無理」なんて単語はねえだろ？"
10035160-91 = "あんなもん、手足をちょこっとパタパタすりゃあ終わりだ！"
10035160-97 = "あ、はい……。"
10035160-99 = "声が小さいっっ！"
10035160-102 = "はいっ！副局長！"
10035160-104 = "うっす！それでこそだ！"
10035160-105 = "パパッと終わらせて、豚骨ラーメンでも食いに行くぞ！#nニンニクマシマシでな！あたしが奢ってやる！"
10035160-106 = "私はケーキか、マカロンがいいのに……。"
10035160-107 = "副局長の好みなんだから、仕方ないよ。"
10035160-109 = "そこ、私語は禁止だぞ！"
10035160-110 = "んじゃ、あたしがお手本を見せてやるから――"
10035160-116 = "はぇ？あ、あれは――"
10035160-118 = "あ、可愛い黒猫だ！……うーん、行っちゃったかあ。"
10035160-119 = "副局長？どうしたんですか。はやくお手本をお願いします。"
10035160-121 = "あ……えっと、その……。"
10035160-127 = "（黒猫……不吉の象徴……）"
10035160-128 = "（そういえば、朝食に出たおかずの豆も、4粒だった……）"
10035160-129 = "（それに、先週見つけた四つ葉のクローバーを持ってこなかったような……）"
10035160-130 = "（不吉だ……）"
10035160-131 = "（不吉だ不吉だ不吉だ不吉だ不吉だ！）"
10035160-134 = "あ、あたしは……やっぱ行かねえ。"
10035160-139 = "え？どうかしたんですか？"
10035160-140 = "私たちだけで訓練しろってことですか！？"
10035160-141 = "そもそも、副局長が言い出した訓練なのに！"
10035160-143 = "と、とにかく、行かねえったら行かねえ！"
10035160-144 = "やるなら、お前らだけでやりな！"
10035160-149 = "あー、またジンクスかあ……。"
10035160-150 = "はあ？また？"
10035160-155 = "ジンクスは覆してあげなきゃ。えいっ！"
10035160-166 = "ちょ、何すんだよ！お前ら！担ぎ上げるな！"
10035160-168 = "こら！放せっ！おい、下ろせってばぁ！"
10035160-180 = "うっ、お前ら！こうなったら容赦しねえからなっ！"
10035160-181 = "うわ！副局長が怒った！みんな逃げて～。"
10035160-187 = "副局長ったら！もう、泣かないでくださいよ～！"
10035160-197 = "（こうして騒がしく、公安局の夏は過ぎていった……）"
