[translation]
10035160-1 = "Epílogo 5: Um dia na Delegacia de Segurança Pública sem a Chefe"
10035160-4 = "Subchefe, como a Chefe Kanna está ausente hoje, #npoderia verificar estes documentos para mim?"
10035160-5 = "Ahhh..."
10035160-9 = "Ahhh..."
10035160-10 = "Tudo bem que eu mandei a chefe para o parque aquático, mas..."
10035160-14 = "Primeiro, por favor, carimbe estes documentos."
10035160-15 = "Tá, tá."
10035160-16 = "Onde... onde está o carimbo... da chefe..."
10035160-22 = "Achei."
10035160-27 = "...Ah, o que é essa pilha de documentos?"
10035160-28 = "Ai, que preguiça."
10035160-29 = "Vejamos... Plano de reforma do refeitório da Delegacia de Segurança Pública, aprovado."
10035160-30 = "Proposta para instalar janelas na sala de interrogatório do subsolo?"
10035160-31 = "O que é isso? Rejeitado."
10035160-32 = "Pedido para mudar o fornecedor de katsudon. Aprovado."
10035160-37 = "(Ela é surpreendentemente rápida no trabalho...)"
10035160-38 = "(Desse jeito, talvez termine hoje mesmo.)"
10035160-43 = "Ai, chega! Não quero mais fazer isso."
10035160-45 = "Hã? Já!?"
10035160-46 = "É que, sabe, trabalho de papelada não combina comigo. #nÉ cansativo demais."
10035160-47 = "Mas, Subchefe, precisamos terminar isso hoje..."
10035160-48 = "Eu sei, eu sei, mas..."
10035160-52 = "Sendo sincera, você também não está com preguiça?"
10035160-53 = "H-hein!?"
10035160-54 = "Não precisa ser formal. #nNão tem ninguém que goste de ficar encarando papéis dentro de um escritório, né?"
10035160-55 = "M-mas!"
10035160-56 = "E-esse também é um trabalho importante da Delegacia de Segurança Pública..."
10035160-57 = "Esquece essas formalidades."
10035160-58 = "Vamos ser sinceros. #nEi, você também quer ir para a piscina, não quer?"
10035160-59 = "...Como é?"
10035160-60 = "Pois é. Ah, que seja! Não tenho escolha!"
10035160-61 = "Atender aos pedidos dos subordinados também é trabalho de um subchefe!"
10035160-65 = "A-atenção... Todos os oficiais da Delegacia de Segurança Pública de plantão, escutem."
10035160-67 = "O item de treinamento obrigatório que vínhamos adiando, #n'Natação de Combate', será realizado hoje à tarde!"
10035160-68 = "D-de repente!?"
10035160-80 = "Chegamos!"
10035160-81 = "O orgulho da Academia de Polícia Valkyrie: o centro de treinamento de natação ao ar livre!"
10035160-82 = "A chefe Kanna deve estar aproveitando o verão agora, e nós não podemos ficar para trás!"
10035160-83 = "Então, para começar, vamos fazer 200 voltas!"
10035160-84 = "Pessoal! Estão prontos!?"
10035160-86 = "Hã? 200 voltas de repente? É brincadeira, né?"
10035160-87 = "A Subchefe pode até conseguir, mas... para nós é impossível, não é?"
10035160-89 = "Hã? Impossível?"
10035160-90 = "Não existe a palavra 'impossível' no dicionário da Delegacia de Segurança Pública, né?"
10035160-91 = "É só bater as mãos e os pés um pouquinho que acaba!"
10035160-97 = "A-ah, sim..."
10035160-99 = "Estão falando muito baixo!"
10035160-102 = "Sim! Subchefe!"
10035160-104 = "Isso! É assim que se fala!"
10035160-105 = "Vamos terminar isso logo e ir comer um lámen de tonkotsu! #nCom alho extra! É por minha conta!"
10035160-106 = "Eu queria bolo ou macarons..."
10035160-107 = "É o gosto do subchefe, então não tem jeito."
10035160-109 = "Ei, conversas paralelas são proibidas!"
10035160-110 = "Bem, então eu vou mostrar como se faz, então..."
10035160-116 = "Hã? A-aquilo é..."
10035160-118 = "Ah, um gato preto fofo! ...Hmm, ele foi embora."
10035160-119 = "Subchefe? O que houve? Por favor, nos mostre o exemplo logo."
10035160-121 = "Ah... bem, é que..."
10035160-127 = "(Gato preto... símbolo de má sorte...)"
10035160-128 = "(Pensando bem, os grãos de feijão que serviram no café da manhã também eram quatro...)"
10035160-129 = "(E eu acho que não trouxe o trevo de quatro folhas que encontrei semana passada...)"
10035160-130 = "(Que azar...)"
10035160-131 = "(Que azar, que azar, que azar, que azar, que azar!)"
10035160-134 = "Ah, eu... eu não vou mais."
10035160-139 = "Hã? O que aconteceu?"
10035160-140 = "Está dizendo para treinarmos sozinhas!?"
10035160-141 = "Sendo que foi o subchefe quem propôs esse treino!"
10035160-143 = "De, de qualquer forma, eu disse que não vou, então não vou!"
10035160-144 = "Se quiserem fazer, façam vocês mesmas!"
10035160-149 = "Ah, de novo com as superstições..."
10035160-150 = "Hã? De novo?"
10035160-155 = "Temos que quebrar essa superstição. Ei!"
10035160-166 = "Ei, o que vocês estão fazendo! Parem de me carregar!"
10035160-168 = "Ei! Me soltem! Ei, eu disse para me colocarem no chão!"
10035160-180 = "Ugh, vocês! Se é assim, não vou ter piedade!"
10035160-181 = "Uau! O subchefe ficou bravo! Corram, pessoal!"
10035160-187 = "Subchefe! Poxa, não chore!"
10035160-197 = "(E assim, de forma barulhenta, o verão da Agência de Segurança passou...)"
