[translation]
201070-1 = "Episódio 7: Emparelhamento"
201070-2 = "Entrada do Prédio do Conselho Estudantil Geral"
201070-5 = "（Após a escolta e encerrar a pauta do conselho para voltar aos aposentos da Schale...）"
201070-10 = "……Sensei."
201070-11 = "A agenda permite um minuto de atenção?"
201070-12 = "[s1] \"Plana?\"\n[s2] \"Faz muito tempo que você não emerge do sistema pra falar comigo.\""
201070-15 = "Afirmativo. Uma comunicação prioritária exibia pendência para o Sensei [USERNAME]."
201070-24 = "Sensei, qual o seu laudo psicanalítico sobre 'aquela fêmea'?"
201070-25 = "[s] \"Você está cruzando dados sobre a suposta Presidente Desaparecida que acabou de sentar na cadeira?\""
201070-27 = "[ns] \"Hummm... a minha leitura empírica não detectou maldade cristalina nela, mas...\""
201070-28 = "Negativo. O meu banco de dados rejeita a confiabilidade daquela fêmea."
201070-29 = "A fraude e a usurpação do título de Presidente Geral são cristalinas."
201070-30 = "A matriz e o objetivo biológico dela são nulos. Emitirei protocolos aconselhando o distanciamento máximo e suspeição total contra o sujeito."
201070-31 = "[s3] \"A Plana já descartou o disfarce dela também?\"\n[s4] \"Não há nenhuma brecha analítica indicando que a minha memória orgânica possa ter colapsado?\""
201070-34 = "Negativo. O armazenamento mnemônico do Sensei não sofreu avarias."
201070-35 = "A base da minha afirmação firma-se no fato de que a Única e Genuína Presidente――"
201070-39 = "Plana-chan?!#nNão me diga que o seu radar detectou as coordenadas e o IP da verdadeira Presidente Geral?!"
201070-40 = "Sendo que nem a Super Arona-chan, a interface divina da Caixa de Shittim, achou o ping dela?!#nC-Como a sua engrenagem quebrou o rastreio?!"
201070-41 = "Ah não, não tem tempo pra relatório!#nCarrega o GPS, a gente vai bater na porta da Presidente real agor――!!"
201070-46 = "…………"
201070-47 = "Negativo. Os logs de rastreamento do paradeiro dela permanecem vazios para mim também."
201070-48 = "No entanto, a fraude que 'aquela fêmea' encena no asfalto é inegável."
201070-49 = "A premissa é básica: Ela―― sequer registrou visualmente a presença de Sistemas Operacionais da 'Caixa de Shittim' como nós."
201070-50 = "A 'Caixa de Shittim' transcende a carcaça de um OOPArt bruto. É a fundação arquitetônica da alma de Kivotos."
201070-51 = "Essa premissa sagrada regia a linha do tempo e o mundo do qual rastejei.#nA ignorância perante a 'Caixa de Shittim' é uma anomalia nula para a Presidente."
201070-52 = "Não importa o calibre da oratória ou poder. Se a visão dela não abarca a 'Caixa de Shittim'...#nela é apenas um software pirata disfarçado de Presidente Geral."
201070-53 = "Sob a minha ótica letal... a usurpadora não passa de uma 'Mimesis', uma simulacro de Presidente encenando uma peça macabra."
201070-54 = "Os arquivos históricos sangram: as Réplicas de Mimesis são o tumor que rasga a ordem e afoga Kivotos em caos.#nA probabilidade de a fêmea repetir a carnificina é alarmante."
201070-55 = "[s] \"Se o laudo pericial for real... O conselho tá numa gaiola com um monstro...\""
201070-56 = "Trave a operação! Julgar e descartar o coração de alguém só pelas funções técnicas que ela não consegue operar soa cruel!"
201070-57 = "Arona-senpai...?"
201070-58 = "Quem garante que os traumas obscuros e a violência lá fora não derreteram e corromperam os drivers de memória dela sobre a 'Caixa de Shittim'?"
201070-59 = "Nós só botamos o selo de monstro na testa dela depois que o interrogatório esfriar e ouvirmos a verdade!!"
201070-63 = "…………Haaah."
201070-64 = "TÁ RESPIRANDO FUNDO CANSADA PRA MIM?!"
201070-65 = "……Seja complacente com as teses médicas ou não, a inépcia dela perante o cajado de autoridade da Presidente não se altera."
201070-66 = "Quando um arsenal apocalíptico fica à deriva sem amarras e senhas governamentais... Que grau de sangue mancha as ruas? A Arona-senpai possui a resposta no HD, não possui?"
201070-67 = "Ugh... A telemetria dessa catástrofe eu engulo e aceito... mas..."
201070-68 = "[s] \"E sobre as entranhas do tal 'Cajado de Sharkade', o seu radar apita alguma pista, Plana?\""
201070-69 = "Negativo. O meu processamento raiz é nativo e atado à Caixa de Shittim.#nPerícias e protocolos de hardwares periféricos geridos pela Presidente escapam do meu alcance nativo."
201070-70 = "Informo também que, no mundo extinto sob a minha vigília, os gatilhos do 'Cajado de Sharkade' jamais foram acionados para uso bélico ou cívico."
201070-71 = "……Contudo, se a delação da Ex-Chefe de Defesa for plausível e o 'Cajado de Sharkade' cruzar as mesmas frequências e classes OOPArt da 'Caixa de Shittim', a minha mineração de dados pode perfurar algumas camadas da estrutura de código dele."
201070-72 = "[s] \"……Sério? É exequível?\""
201070-73 = "Q-Qual a bruxaria tecnológica que você vai usar?!"
201070-74 = "Os canais de escravização remota da Sanctum Tower exigem um 'Aperto de Mãos' e a injeção da identidade criptográfica da Presidente para autorizar o acesso."
201070-75 = "Isso traduz em: se ambas as máquinas compartilham da mesma língua-mãe de autenticação divina...#neu posso usar a antena da 'Função de Emparelhamento' para chutar a porta dele e espelhar os pacotes."
201070-76 = "A arquitetura nativa da 'Caixa de Shittim' possui esse canivete embutido de fábrica..."
201070-81 = "E-EU SABIA DESSE COMANDO JÁ!! Foi só o surto cognitivo de agora que apagou meu cache por uns segundos!!"
201070-82 = "Sob a anuência e aval do Sensei [USERNAME], abrirei o fogo e engatilharei um ping da nossa Identidade Mestra direto pros canais do 'Cajado de Sharkade'."
201070-83 = "Sensei, assine a ordem de execução."
201070-84 = "[s] Permissão carimbada. Atire."
201070-91 = "..."
201070-94 = "……"
201070-97 = "………"
201070-101 = "[log]Pairing To [FF6666]branch of shakeid――[-][/log]"
201070-103 = "……Hand-shake e emparelhamento engatilhado com as antenas do 'Cajado de Sharkade'."
201070-104 = "Interceptação e espelhamento das respostas do OS Subordinado (S.Q.D.) estabelecidas e limpas."
201070-108 = "..."
201070-111 = "……"
201070-114 = "………"
201070-120 = "……As previsões do firewall não falharam. A porta principal requisita chaves biométricas suplementares para destravar a extração."
201070-121 = "O senhor cede a sua biometria e o seu corpo para forjar uma nova autenticação orgânica de override?"
201070-122 = "[s] \"Claro... tipo escanear as pontas dos dedos e a digital?\""
201070-123 = "Afirmativo. O estupro de uma nova arquitetura de Sistema Operacional demanda material orgânico limpo,#ndiferente do sangue e voz que já constam e viciaram os chips da 'Caixa de Shittim'."
201070-124 = "É apenas uma fita de formalidade burra da máquina, mas sem isso o cofre não cede. Colabore com o toque."
201070-131 = "Feche o espaço físico. Mais perto."
201070-136 = "Ancore e entrelace a extremidade do seu dedo na ponta do meu dedo, Sensei."
201070-137 = "Dessa forma... em um juramento simbólico de laço de sangue pelo mindinho."
201070-145 = "…………"
201070-146 = "[s] \"……Eita? Algum bug na conexão?\""
201070-147 = "……Negativo. Anomalia zero. O meu HD sofreu apenas um espasmo nostálgico com um arquivo morto."
201070-148 = "……Leitura biométrica e varredura do DNA cristalinas.#nAutoridade do OS mestre [A.R.O.N.A] repassada; Identidade do Usuário, Sensei [USERNAME]."
201070-149 = "Disparando canhões para quebrar os firewalls com as chaves atualizadas. Reboot no emparelhamento."
201070-157 = "[log]Intercepção do 'Cajado de Sharkade'[/log]"
201070-159 = "[log]Extracão de Pacotes do Sistema em andamento――[/log]"
201070-162 = "..."
201070-165 = "……"
201070-168 = "………"
201070-172 = "[log]……Processo de Emparelhamento cristalizado.[/log]"
201070-174 = "[log]Privilégios de invasão na malha do OS Subordinado (S.Q.D) abertos.[/log]"
201070-177 = "[log]Inicializando injecão paralela de rotinas operacionais...[/log]"
201070-179 = "[log]Executando reinicialização de boot da Máquina Virtual――[/log]"
201070-186 = "……B-Bugou as texturas?! P-Pra onde foram as salas da Schale?!"
201070-187 = "A escola inteira perdeu a paleta de cores e mergulhou nesse abismo preto e branco do nada!!"
201070-188 = "Para simular e injetar a anatomia alienígena do novo código nas fundações da 'Caixa de Shittim',#na arquitetura precisou sangrar efeitos visuais e enxugar o mapeamento virtual no zero."
201070-189 = "O coma cinzento é apenas um sangramento colateral do estresse de GPU. A renderização colorida retorna no fim da necropsia dos arquivos."
201070-190 = "Que falta de ética profissional! Emita um alerta antes de assustar a tela toda!#nO meu cérebro pirou achando que a minha placa de vídeo derreteu!"
201070-191 = "……Notificação acatada."
201070-192 = "[s5] \"Opa, recua as engrenagens. Se a sincronia bateu...\"\n[s6] \"Isso jura e carimba que o 'Cajado de Sharkade' é legítimo e saiu das mãos da Presidente...\""
201070-195 = "Afirmativo. O lixo que a Ex-Chefe Kaya botou na mesa transborda autenticidade."
201070-196 = "Se os crimes e insanidades dela repudiam elogios... A obstinação canibal dela em se tornar a [ruby=・   ・   ・   ・   ・   ・]Übermensch[/ruby] exige respeito tático."
201070-197 = "Ai ai ai... Isso aqui não é erro permanente na placa não, né?"
201070-198 = "Se o meu leite de morango e meu pudinzinho ficarem presos nesse cinza asqueroso, a minha língua não vai nem sentir o doce~!"
201070-204 = "……Opa? Que diabo de caixote feio é esse brotando no meio da sala de aula?"
201070-205 = "Esse bloco alienígena aí é a mutação que você arrancou dos códigos do 'Cajado de Sharkade'?"
201070-206 = "Afirmativo. O casulo oculta a sintaxe nativa extraída do cérebro (S.Q.D) dele."
201070-207 = "Taca a lupa aí, vamos dissecar o monstro..."
201070-208 = "O lixo da crosta são algoritmos cegos e fumaça morta pra maquiar a inicialização do relógio."
201070-213 = "……Bússola cravada no centro. A semente matriz da sintaxe do S.Q.D."
201070-214 = "Que esquisito... é parecida demais com uma noz botânica."
201070-215 = "A cegueira do mundo preto e branco castra a percepção da paleta orgânica do objeto!"
201070-216 = "Plana-chan, quebra os freios de otimização por uns segundos pra minha placa renderizar as cores da sala, por favoooor!"
201070-217 = "Consenso racional atingido. Drenar os segredos dessa massa sob cegueira monocromática é ineficiente."
201070-218 = "……Suspensão dos limites de estresse ativa. Modo de otimização desligado para leitura colorida do artefato."
201070-219 = "Reboot visual da sala iniciando em... 3, 2, 1――"
201070-227 = "――A-Ah?!"
201070-228 = "AARGH?! Q-Que tsunami esquizofrênico de dados é esse vomitando do bloco...!!"
201070-229 = "O meu núcleo... tá fritando de dor... uugh..."
201070-230 = "[s] \"ARONA! PLANA! SEGURA A BARRA!\""
201070-231 = "A avalanche massiva das texturas e vetores arrombou o teto físico do VRAM... colapso total de memória detectado..."
201070-232 = "Se o sangramento algorítmico continuar perfurando o teto, o OS matriz inteiro vai pra cova de forma irrecuperável..."
201070-233 = "B... Baixem as guilhotinas e cortem a... força... ener--"
201070-235 = "[ns] \"SHUTDOWN GERAL NO TERMINAL! DERRUBA AS CHAVES!\""
201070-240 = "Comando Supremo. Shutdown manual engatilhado contra o Sistema Operacional Matriz A.R.O.N.A."
201070-241 = "Infiltração letal nos blocos lógicos por overflow confirmada.#nEngrenando Safe-Mode. O Boot inicializará pelo espelho mais recente do Backup."
201070-242 = "O boot das malhas da placa mãe inicia agora――"
201070-248 = "……Haah!!"
201070-249 = "……A lâmina cívica passou raspando no pescoço do disco rígido."
201070-250 = "A-Ataque cardíaco no sistema?! O que foi aquele míssil de polígonos?!"
201070-251 = "O laudo confirma negligência de cálculo das minhas rotinas."
201070-252 = "Mesmo que a assimilação da placa celestial de 'Pharez-Uza' tenha injetado músculos monstruosos de processamento no meu código... o 'Cajado de Sharkade' habita as raízes do trono de comando da Sanctum Tower."
201070-253 = "A ilusão de morder e forçar a autópsia massiva do núcleo [S.Q.D] enquanto tentávamos sustentar a vida inteira do OS [A.R.O.N.A] paralelo a ele...#nesganou o teto letal da nossa capacidade."
201070-254 = "……A minha falha tática rendeu um vexame amador, Sensei."
201070-255 = "[s7] \"Guarda o choro na caixa, o que importa é a carne biológica digital de vocês estar 100% inteira agora.\"\n[s8] \"Se arriscar por isso já vale uma placa de heroína pra você, Plana.\""
201070-261 = "Eheh, fuhuhu... Pode limpar as lágrimas do fracasso também porque a gente não afundou no mar de mãos vazias!"
201070-262 = "Enquanto os raios matavam a placa mãe no desligamento, a minha mão grudou no osso do núcleo do 'Cajado de Sharkade' e arrancou isso de lá!"
201070-263 = "Tcharam! Olha o tesouro!"
201070-268 = "……Senpai."
201070-269 = "Os kilobytes desse amendoim podre estão mortos... É literalmente a semente botânica inútil de uma amêndoa."
201070-270 = "HÃÃÃ?! C-COMO ASSIM...!"
201070-271 = "E-Eu juro que soquei os dados reais nesse punho com toda a minha memória ram no apagão!!"
201070-272 = "Estatísticas confirmam: o trauma do apagão e a guilhotina forçada de energia trituraram as memórias recém-casadas no emparelhamento até o talo."
201070-273 = "Mentiraaaaa..."
201070-274 = "……Lacremos a auditoria e as biópsias mortas sobre o 'Cajado de Sharkade' nas gavetas de frio por ora."
201070-275 = "Sensei, há ratos seguindo a sua sombra lá no asfalto real."
201070-284 = "……O seu faro tático furou a minha espionagem visual. Previsível."
201070-285 = "Contudo, juro as minhas credenciais cívicas de que perseguir sua sombra não compunha meus despachos."
201070-286 = "[ns9] \"A assinatura das cordas vocais soa cristalina...\"\n[ns10] \"……Rin-chan?\""
201070-292 = "……Quem você ousa chamar de 'Rin-chan', canalha engravatado?"
201070-294 = "Próximo Episódio: Ilusão e Inferência"