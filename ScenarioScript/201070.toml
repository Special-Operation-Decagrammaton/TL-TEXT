[translation]#[Texto Final. - Filipe 13/07.]
201070-1 = "Episódio 7; Pareamento"
201070-2 = "Entrada do prédio do Conselho Estudantil Geral"
201070-5 = "(Quando encerrei o expediente no Conselho e me preparava#npra voltar à Schale……)"
201070-10 = "……Sensei."
201070-11 = "Tem um instante?"
201070-12 = "[s1] \"Plana?\"\n[s2] \"Faz tempo que você não puxa assunto comigo.\""
201070-15 = "Sim. Tenho algo a comunicar ao Sensei [USERNAME]."
201070-24 = "O que o Sensei acha \"daquela mulher\"?"
201070-25 = "[s] \"A Presidente do Conselho que voltou?\""
201070-27 = "[ns] \"Hmm…… ela não parece má pessoa……\""
201070-28 = "Negativo. Aquela mulher não é confiável."
201070-29 = "Ela é uma impostora que se passa pela#nPresidente do Conselho Estudantil Geral."
201070-30 = "Sua identidade e intenções são desconhecidas.#nRecomendo suspeitar o máximo possível e manter distância."
201070-31 = "[s3] \"Você também acha que ela é falsa, Plana.\"\n[s4] \"Não existe a chance de a minha memória estar errada?\""
201070-34 = "Negativo. A memória do Sensei não está errada."
201070-35 = "Porque a verdadeira Presidente do Conselho――"
201070-39 = "Planinha?!#nSerá que você descobriu onde está a verdadeira Presidente do Conselho?!"
201070-40 = "Nem eu, a super Arona, o OS da Baú de Shittim, consegui encontrar!#nC-Como você fez isso?!"
201070-41 = "Não, não é hora de ficar parada!#nRápido, temos que ir aonde está a verdadeira Presidente――!"
201070-46 = "…………"
201070-47 = "Negativo. Eu também não sei o paradeiro dela."
201070-48 = "Mas uma coisa é certa: \"aquela mulher\" é uma impostora."
201070-49 = "Afinal, ela―― não consegue nos reconhecer,\nnós, os OS do \"Baú de Shittim\"."
201070-50 = "O \"Baú de Shittim\" não é um mero artefato anômalo:#nela está ligada à essência de Kivotos."
201070-51 = "Isso também valia no mundo de onde vim.#nÉ impossível uma Presidente do Conselho não conhecer o \"Baú de Shittim\"."
201070-52 = "Por mais competente que seja, se não reconhece o \"Baú de Shittim\"#nnão é a verdadeira Presidente do Conselho Estudantil Geral."
201070-53 = "Não passa de alguém que interpreta#no papel de Presidente do Conselho Estudantil Geral."
201070-54 = "As réplicas que surgiram até hoje perturbaram a ordem de Kivotos#n cada uma à sua maneira. Ela não será diferente."
201070-55 = "[s] \"Se for verdade, é grave, mas……\""
201070-56 = "Espera aí! Julgar as pessoas só pela capacidade não é certo!"
201070-57 = "Veterana Arona……?"
201070-58 = "Vai que aconteceu alguma coisa no tempo em que ela sumiu e ela só perdeu#nas memórias do \"Baú de Shittim\"!"
201070-59 = "Temos que ouvir direito o lado dela antes de julgar!"
201070-63 = "…………Haa."
201070-64 = "Suspirou?!"
201070-65 = "……Mesmo que seja isso, não muda o fato de que ela não exerce#nos poderes da Presidente."
201070-66 = "Quando um poder sem controle é deixado à própria sorte……#na veterana Arona sabe muito bem o que acontece, não sabe?"
201070-67 = "Ugh, isso…… é verdade, mas……"
201070-68 = "[s] \"Plana, você sabe algo sobre o \"Cajado de Shaked\"?\""
201070-69 = "Negativo. Sou o OS residente do Baú de Shittim.#nNão tenho dados sobre outros dispositivos administrados pela Presidente do Conselho."
201070-70 = "Além disso, no mundo de onde vim, o \"Cajado de Shaked\" nunca chegou a ser usado."
201070-71 = "……Porém, se, como diz a ex-Chefe de Defesa, o \"Cajado de Shaked\" é um artefato anômalo equivalente#nao \"Baú de Shittim\", é possível visualizar parte da sua estrutura."
201070-72 = "[s] \"……Sério?\""
201070-73 = "C-Como se faz isso?"
201070-74 = "Operar a Torre Sanctum remotamente exige um processo de autenticação:#nenviar credenciais especiais definidas em nome da Presidente."
201070-75 = "Ou seja, se os dois dispositivos usam o mesmo sistema de autenticação,#npodemos usar o \"pareamento\": um chama o outro e os dados são sincronizados."
201070-76 = "É uma função básica embarcada no \"Baú de Shittim\", mas……"
201070-81 = "E-Eu sabia disso, tá?! Só me assustei e deu um branco!"
201070-82 = "Se o Sensei [USERNAME] permitir#nvou requisitar que o \"Cajado de Shaked\" transmita suas credenciais únicas."
201070-83 = "Sensei, sua permissão."
201070-84 = "[s] Permissão concedida."
201070-91 = "…"
201070-94 = "……"
201070-97 = "………"
201070-101 = "[log]Pareando com [FF6666]Cajado de Shaked――[-][/log]"
201070-103 = "……Iniciando pareamento com o \"Cajado de Shaked\"."
201070-104 = "Resposta do sistema operacional auxiliar, S.Q.D., confirmada."
201070-108 = "…"
201070-111 = "……"
201070-114 = "………"
201070-120 = "……Como suspeitei. Está sendo exigida uma autenticação biométrica adicional."
201070-121 = "Posso solicitar a atualização dos seus dados biométricos, Sensei?"
201070-122 = "[s] \"Hã…… tipo impressão digital?\""
201070-123 = "Afirmativo. Para liberar a segurança do novo sistema operacional,#nsão necessários dados biométricos diferentes dos registrados no \"Baú de Shittim\"."
201070-124 = "É uma formalidade, mas é um procedimento importante. Peço sua colaboração."
201070-131 = "Mais perto."
201070-136 = "Agora encoste o seu dedo no meu, Sensei. Bem assim."
201070-137 = "Isso. Como se fôssemos fazer uma promessa de dedinho."
201070-145 = "…………"
201070-146 = "[s] \"……Aconteceu algo?\""
201070-147 = "……Não é nada. Eu só…… me lembrei de uma memória antiga."
201070-148 = "……Verificação concluída.#nUsuário do sistema operacional A.R.O.N.A: Sensei [USERNAME]."
201070-149 = "Repetindo o pareamento com as credenciais atualizadas."
201070-157 = "[log]A partir do \"Cajado de Shaked\",[/log]"
201070-159 = "[log]Baixando dados de sistema――[/log]"
201070-162 = "…"
201070-165 = "……"
201070-168 = "………"
201070-172 = "[log]……Pareamento concluído.[/log]"
201070-174 = "[log]Visualização do sistema operacional auxiliar, S.Q.D, liberada.[/log]"
201070-177 = "[log]Para executar o novo sistema,[/log]"
201070-179 = "[log]Reiniciando o OS――[/log]"
201070-186 = "……Ué? Que lugar é esse?!"
201070-187 = "A sala de aula ficou preto e branco do nada!"
201070-188 = "Para implantar o novo sistema dentro do \"Baú de Shittim\",#nrealizei uma otimização do ambiente ao redor."
201070-189 = "É um efeito temporário da carga no sistema.#nRestaurarei assim que o trabalho terminar."
201070-190 = "Aff! Avisa antes de fazer essas coisas!#nAchei que meus olhos tinham pifado!"
201070-191 = "……Entendido."
201070-192 = "[s5] \"Espera. Se o pareamento deu certo……\"\n[s6] \"Então o \"Cajado de Shaked\" é mesmo da Presidente……\""
201070-195 = "Afirmativo. Pelo visto, o relógio que a ex-Chefe de Defesa trouxe#né verdadeiro."
201070-196 = "Digam o que quiserem dela, mas essa obsessão#npela Presidente do Conselho Estudantil Geral não é de se subestimar."
201070-197 = "Nhaaa…… isso volta ao normal depois, né? Né?!"
201070-198 = "Desse jeito, nem leite de morango nem pudim ficam gostosos~"
201070-204 = "……Ué? Essa caixa sempre esteve aqui na sala?"
201070-205 = "São os dados que instalamos do \"Cajado de Shaked\"?"
201070-206 = "Afirmativo. Aqui dentro estão os novos dados do S.Q.D."
201070-207 = "Deixa eu ver……"
201070-208 = "A maior parte parece dummy data usada pelo sistema de execução."
201070-213 = "……Identificado. Este é o arquivo-núcleo do sistema S.Q.D."
201070-214 = "Parece uma semente, uma castanha……"
201070-215 = "Tá tudo preto e branco, não dá pra saber a cor!"
201070-216 = "Planinha, não dá pra desativar o modo de otimização só um pouquinho?"
201070-217 = "Concordo. De fato, a análise é difícil no estado atual."
201070-218 = "……Para a análise dos dados, desativando temporariamente o modo de otimização."
201070-219 = "Desativando em…… 3, 2, 1――"
201070-227 = "――?!"
201070-228 = "Uwaah?! U-Uma enxurrada de informações, do nada……!"
201070-229 = "Minha cabeça…… tá girando……"
201070-230 = "[s] \"Arona! Plana!\""
201070-231 = "O volume de dados temporários ultrapassou o limite de processamento da memória……"
201070-232 = "Desse jeito, os dados vão transbordar para o sistema operacional……"
201070-233 = "P-Parada de emergência, do sistema――"
201070-235 = "[ns] \"Parada de emergência!\""
201070-240 = "Executando parada de emergência do sistema operacional principal A.R.O.N.A."
201070-241 = "Erro de circuito lógico por overflow detectado.#nExecutando modo de segurança. Reiniciando a partir do último backup."
201070-242 = "Reiniciando o OS――"
201070-248 = "……Hah!"
201070-249 = "……Consegui bem a tempo."
201070-250 = "O-O que foi que aconteceu?"
201070-251 = "Eu me descuidei."
201070-252 = "Mesmo com o poder de cálculo ampliado pelo \"Peretz Uzzah\", o \"Cajado de Shaked\"#ntambém é um OS de apoio à gestão da Torre Sanctum."
201070-253 = "Analisar o arquivo-núcleo do S.Q.D com o A.R.O.N.A em operação#né impossível com a capacidade de cálculo atual."
201070-254 = "……Perdão por não ter sido útil, Sensei."
201070-255 = "[s7] \"Não. O que importa é que vocês estão bem.\"\n[s8] \"Obrigado por investigar, Plana.\""
201070-261 = "Nhehehe…… mas não saímos de mãos vazias, viu?"
201070-262 = "Durante a reinicialização, eu não soltei o núcleo do \"Cajado de Shaked\" nem por um segundo!"
201070-263 = "Tcharam! Olha só!"
201070-268 = "……Veterana."
201070-269 = "Isso não contém dado nenhum……#né só uma semente de amêndoa."
201070-270 = "Quêêê?! P-Por quê……!"
201070-271 = "Eu tava segurando firme……!"
201070-272 = "Ao que tudo indica, os dados pareados foram apagados durante a reinicialização do OS."
201070-273 = "Não acredito……"
201070-274 = "……Vamos deixar a investigação do \"Cajado de Shaked\" pra depois."
201070-275 = "Sensei, tem alguém nos seguindo."
201070-284 = "……Fui notada, então."
201070-285 = "Não, eu não tinha a intenção de segui-los."
201070-286 = "[ns9] \"Essa voz é……\"\n[ns10] \"……Rinzinha?\""
201070-292 = "……Quem aqui é \"Rinzinha\"?"
