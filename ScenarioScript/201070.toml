[translation]
201070-1 = "Episode 7;Pairing"
201070-2 = "Entrance to the General Student Council building"
201070-5 = "(After finishing work at the General Student Council and heading back to Schale...)"
201070-10 = "...Sensei."
201070-11 = "Do you have a moment?"
201070-12 = "[s1] \"Plana?\"\n[s2] \"It's been a while since you reached out to me first, Plana.\""
201070-15 = "Yes, there is something I would like to tell you, [USERNAME] Sensei."
201070-24 = "What do you think of 'that woman'?"
201070-25 = "[s] \"You mean the General Student Council President who returned?\""
201070-27 = "[ns] \"Hmm... She doesn't seem like a bad person, though...\""
201070-28 = "Negative. That woman cannot be trusted."
201070-29 = "She is an impostor masquerading as the General Student Council President."
201070-30 = "Her true identity and intentions are unknown. I recommend you remain suspicious and keep your distance."
201070-31 = "[s3] \"So you think she's an impostor too, Plana.\"\n[s4] \"Is there no chance that my memory is wrong?\""
201070-34 = "Negative. Your memory is not wrong, Sensei."
201070-35 = "Because the real General Student Council President—"
201070-39 = "Plana-chan!?#nDid you somehow find out where the real General Student Council President is!?"
201070-40 = "Even Super Arona-chan, the OS of the Shittim Chest, couldn't find her!#nHo-how did you do it!?"
201070-41 = "No, this is no time for that!#nWe have to get to the real General Student Council President right away—!"
201070-46 = "......."
201070-47 = "Negative. I do not know her whereabouts either."
201070-48 = "However, it is certain that 'that woman' is an impostor."
201070-49 = "Because she is unable to recognize us—the OS of the 'Shittim Chest'."
201070-50 = "The 'Shittim Chest' is not just an OOPArt; it is something deeply connected to the essence of Kivotos."
201070-51 = "This was the same in the world I came from.#nIf she were the General Student Council President, she would have to know about the 'Shittim Chest'."
201070-52 = "No matter how capable she may be, as long as she cannot recognize the 'Shittim Chest',#nshe is not the real General Student Council President."
201070-53 = "She is nothing more than someone playing the role of the General Student Council President."
201070-54 = "The copies that have appeared so far have each disrupted the order of Kivotos in their own way and invited chaos. Without a doubt, she will be the same."
201070-55 = "[s] \"If that's true, that's a big problem, but...\""
201070-56 = "Wait a minute. I don't think it's right to judge someone solely on their abilities!"
201070-57 = "Arona-senpai...?"
201070-58 = "Maybe something happened while she was missing, and she just lost her memories of the 'Shittim Chest'."
201070-59 = "You should listen to what she has to say before making a judgment!"
201070-63 = "......Haa."
201070-64 = "A sigh!?"
201070-65 = "...Even if that were the case, it doesn't change the fact that she is unable to exercise the power of the General Student Council President."
201070-66 = "When uncontrollable power is left unchecked... you know full well what happens, don't you, Arona-senpai?"
201070-67 = "Ugh, that's... true, but..."
201070-68 = "[s] \"Plana, do you know anything about the 'Shakeid Staff'?\""
201070-69 = "Negative. I am an OS resident in the Shittim Chest.#nTherefore, I do not know about other devices managed by the General Student Council President."
201070-70 = "Also, in the world I came from, the 'Shakeid Staff' was never used until the end."
201070-71 = "...However, if the 'Shakeid Staff' is an OOPArt equivalent to the 'Shittim Chest' as the former Chief of Defense said, I can view a portion of its structure."
201070-72 = "[s] \"...Really?\""
201070-73 = "Ho-how do you do that?"
201070-74 = "To remotely operate the Sanctum Tower, a process is required to send special identification information defined in the name of the General Student Council President to obtain authentication."
201070-75 = "In other words, if the two devices use the same authentication system,#nyou can use the 'pairing function' to call each other and synchronize information."
201070-76 = "This is a basic function installed in the 'Shittim Chest', but..."
201070-81 = "I, I know that! I was just so surprised I had a temporary lapse in memory!"
201070-82 = "If it's alright with you, [USERNAME] Sensei, I will request the 'Shakeid Staff' to send its unique identification information."
201070-83 = "Sensei, please grant permission."
201070-84 = "[s] Grant permission."
201070-91 = "..."
201070-94 = "..."
201070-97 = "......"
201070-101 = "[log]Pairing To [FF6666]branch of shakeid――[-][/log]"
201070-103 = "...Initiating pairing with the 'Shakeid Staff'."
201070-104 = "Auxiliary operating system, S.Q.D. response confirmed."
201070-108 = "..."
201070-111 = "..."
201070-114 = "......"
201070-120 = "...As I thought. It is requesting additional biometric authentication."
201070-121 = "May I ask you to update your biometric information, Sensei?"
201070-122 = "[s] \"Uh... like fingerprints?\""
201070-123 = "Affirmative. To unlock the security of the new operating system,#nit requires biometric information different from what is currently registered in the 'Shittim Chest'."
201070-124 = "It is a formality, but please cooperate as it is an important procedure."
201070-131 = "Closer."
201070-136 = "Please place your finger on mine, just like that."
201070-137 = "Yes, please do it as if we are making a pinky promise."
201070-145 = "......."
201070-146 = "[s] \"...Is something wrong?\""
201070-147 = "...It is nothing. I just... remembered a memory from a long time ago."
201070-148 = "...Confirmed.#nUser of operating system A.R.O.N.A, [USERNAME] Sensei."
201070-149 = "Retrying pairing with the updated authentication information."
201070-157 = "[log]From 'Shakeid Staff'[/log]"
201070-159 = "[log]Downloading system data――[/log]"
201070-162 = "…"
201070-165 = "..."
201070-168 = "...…"
201070-172 = "[log]...Pairing complete.[/log]"
201070-174 = "[log]Access to auxiliary operating system, S.Q.D, granted.[/log]"
201070-177 = "[log]To execute the new system,[/log]"
201070-179 = "[log]Rebooting OS――[/log]"
201070-186 = "...Huh? Where am I!?"
201070-187 = "The classroom suddenly turned monochrome!"
201070-188 = "I have optimized the surrounding environment#nto deploy the new system within the 'Shittim Chest'."
201070-189 = "This is temporary due to system load, and I will restore it as soon as the work is finished."
201070-190 = "Geez! You should tell me about things like that beforehand!#nI thought something was wrong with my eyes!"
201070-191 = "...Understood."
201070-192 = "[s5] \"Wait. If synchronization is complete, that means...\"\n[s6] \"The 'Shakeid Staff' really is the General Student Council President's...\""
201070-195 = "Affirmative. The watch brought by the former Chief of Defense appears to be genuine."
201070-196 = "Regardless of anything else, her obsession with the General Student Council President is not to be underestimated."
201070-197 = "Nunu... you can really change this back, right?"
201070-198 = "My strawberry milk and pudding won't taste good in this state~"
201070-204 = "...Huh? Was this box always in our classroom?"
201070-205 = "Is this the data installed from the 'Shakeid Staff'?"
201070-206 = "Affirmative. This contains the new S.Q.D data."
201070-207 = "Let's see..."
201070-208 = "Most of it seems to be dummy data used for the drive system."
201070-213 = "...Identified. This is the core file of the S.Q.D system."
201070-214 = "It looks kind of like a nut."
201070-215 = "Everything is monochrome, so I can't tell what color it is!"
201070-216 = "Plana-chan, can you disable optimization mode for a second?"
201070-217 = "Agreed. Indeed, analysis in the current state is difficult."
201070-218 = "...I will temporarily disable optimization mode for data analysis."
201070-219 = "Time until deactivation... 3, 2, 1――"
201070-227 = "――!?"
201070-228 = "Whoa!? A-a massive amount of information all of a sudden...!"
201070-229 = "My head... is spinning..."
201070-230 = "[s] \"Arona! Plana!\""
201070-231 = "The amount of temporary deployment data is exceeding the memory processing limit..."
201070-232 = "If this continues, the data will overflow into the operating system..."
201070-233 = "E-emergency, stop, the system――"
201070-235 = "[ns] \"Emergency stop!\""
201070-240 = "Emergency stopping main operating system A.R.O.N.A."
201070-241 = "Logic circuit error detected due to overflow.#nExecuting safe mode. Restarting from the previous backup file."
201070-242 = "Rebooting OS――"
201070-248 = "...Hah!"
201070-249 = "...We barely made it."
201070-250 = "W-what happened?"
201070-251 = "I let my guard down."
201070-252 = "Even though our processing power increased thanks to 'Peret-Uza', the 'Shakeid Staff' is also an operating system designed to assist in managing the Sanctum Tower."
201070-253 = "I believe it is impossible with our current processing power to analyze the S.Q.D core file while running A.R.O.N.A."
201070-254 = "...I am sorry I could not be of help, Sensei."
201070-255 = "[s7] \"No, I'm just glad Arona and Plana are safe.\"\n[s8] \"Thank you for looking into it, Plana.\""
201070-261 = "Hehe... but it's not like we didn't gain anything."
201070-262 = "I kept holding onto the core of the 'Shakeid Staff' even while the system was rebooting!"
201070-263 = "Ta-da! Look!"
201070-268 = "...Senpai."
201070-269 = "That contains no data... it is just an almond seed."
201070-270 = "Ehh!? B-but why...!"
201070-271 = "I was sure I was holding it tight...!"
201070-272 = "It seems the paired data was erased while the OS was rebooting."
201070-273 = "No way..."
201070-274 = "...Let's put the investigation of the 'Shakeid Staff' on hold for now."
201070-275 = "Sensei, someone is following us."
201070-284 = "...So you noticed."
201070-285 = "No, I didn't intend to tail you."
201070-286 = "[ns9] \"This voice is...\"\n[ns10] \"...Rin-chan?\""
201070-292 = "...Who are you calling 'Rin-chan'?"
201070-294 = "Next Episode;Virtual Image and Inference"