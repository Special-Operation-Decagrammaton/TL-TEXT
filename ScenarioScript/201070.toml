[translation]
201070-1 = "Эпизод 7;Сопряжение"
201070-2 = "Вход в здание Генерального Студенческого Совета"
201070-5 = "(Закончив дела в Генеральном Студенческом Совете и направляясь обратно в Шале...)"
201070-10 = "...Сенсей."
201070-11 = "У вас найдётся минутка?"
201070-12 = "[s1] «Плана?»\n[s2] «Давненько ты не обращалась ко мне первой, Плана»."
201070-15 = "Да, есть кое-что, о чём я хотела бы рассказать вам, Сенсей [USERNAME]."
201070-24 = "Что вы думаете о \"той женщине\"?"
201070-25 = "[s] «Ты имеешь в виду вернувшегося Президента Генерального Студенческого Совета?»"
201070-27 = "[ns] «Хм... Она вроде не кажется плохим человеком, однако...»"
201070-28 = "Отрицательно. Той женщине нельзя доверять."
201070-29 = "Она самозванка, выдающая себя за Президента Генерального Студенческого Совета."
201070-30 = "Её истинная личность и намерения неизвестны. Я рекомендую вам сохранять бдительность и держаться на расстоянии."
201070-31 = "[s3] «Так значит, ты тоже считаешь её самозванкой, Плана».\n[s4] «Разве нет вероятности, что это моя память меня подводит?»"
201070-34 = "Отрицательно. Ваша память вас не подводит, Сенсей."
201070-35 = "Потому что настоящая Президент Генерального Студенческого Совета —"
201070-39 = "Плана-тян?! #nНеужели ты как-то узнала, где находится настоящая Президент Генерального Студенческого Совета?!"
201070-40 = "Даже Супер Арона-тян, ОС Сундука Шиттима, не смогла её найти! #nК-как тебе это удалось?!"
201070-41 = "Нет, сейчас не время для этого! #nМы должны немедленно отправиться к настоящей Президенту Генерального Студенческого Совета —!"
201070-46 = "......."
201070-47 = "Отрицательно. Я тоже не знаю о её местонахождении."
201070-48 = "Однако совершенно точно, что \"та женщина\" — самозванка."
201070-49 = "Потому что она не способна распознать нас — ОС „Шиттимского Ковчега“."
201070-50 = "\"Сундук Шиттима\" — это не просто артефакт; это вещь, глубоко связанная со всей сутью Кивотоса."
201070-51 = "Так же было и в том мире, из которого я пришла. #nБудь она Президентом Генерального Студенческого Совета, она обязана была бы знать о \"Сундуке Шиттима\"."
201070-52 = "Какой бы способной она ни была, до тех пор, пока она не может распознать \"Сундук Шиттима\", #nона не является настоящим Президентом Генерального Студенческого Совета."
201070-53 = "Она всего лишь кто-то, кто отыгрывает роль Президента Генерального Студенческого Совета."
201070-54 = "Копии, появлявшиеся до сих пор, каждая по-своему нарушали порядок Кивотоса и сеяли хаос. Без сомнения, с ней всё будет точно так же."
201070-55 = "[s] «Если это правда, то это большая проблема, но...»"
201070-56 = "Погодите минутку. Я не думаю, что правильно судить о ком-то исключительно по его способностям!"
201070-57 = "Арона-семпай...?"
201070-58 = "Может быть, пока она отсутствовала, что-то произошло, и она просто потеряла память о \"Сундуке Шиттима\"."
201070-59 = "Прежде чем делать выводы, нужно выслушать, что она скажет!"
201070-63 = "......Ха-а."
201070-64 = "Вздох?!"
201070-65 = "...Даже если бы и так, это не отменяет того факта, что она не способна задействовать силу Президента Генерального Студенческого Совета."
201070-66 = "Когда неконтролируемая сила остаётся без присмотра... вы ведь прекрасно знаете, что происходит, не так ли, Арона-семпай?"
201070-67 = "Угх, это... правда, но..."
201070-68 = "[s] «Плана, тебе что-нибудь известно о \"Посохе Шакада\"?»"
201070-69 = "Отрицательно. Я операционная система, находящаяся внутри Сундука Шиттима. #nСледовательно, мне ничего не известно о других устройствах, которыми управляла Президент Генерального Студенческого Совета."
201070-70 = "Кроме того, в мире, из которого я пришла, \"Посох Шакада\" так и не был использован до самого конца."
201070-71 = "...Однако, если \"Посох Шакада\" — это артефакт, эквивалентный \"Сундуку Шиттима\", как говорила бывшая глава Оборонного ведомства, я могу просмотреть часть его структуры."
201070-72 = "[s] «...Правда?»"
201070-73 = "К-как ты это сделаешь?"
201070-74 = "Чтобы удалённо управлять Башней Святилища, требуется процесс отправки особой идентификационной информации, определённой на имя Президента Генерального Студенческого Совета, для прохождения верификации."
201070-75 = "Иными словами, если оба устройства используют одну и ту же систему верификации, #nвы можете использовать \"функцию сопряжения\", чтобы связаться друг с другом и синхронизировать информацию."
201070-76 = "Это базовая функция, установленная в \"Сундуке Шиттима\"“, но..."
201070-81 = "Я, я знаю это! Я просто была так удивлена, что у меня случился временный провал в памяти!"
201070-82 = "Если вы не против, Сенсей [USERNAME], я отправлю запрос \"Посоху Шакада\" на передачу его уникальной идентификационной информации."
201070-83 = "Сенсей, пожалуйста, дайте разрешение."
201070-84 = "[s] Дать разрешение."
201070-91 = "..."
201070-94 = "..."
201070-97 = "......"
201070-101 = "[log]Сопряжение с [FF6666]ветвью шакада――[-][/log]"
201070-103 = "...Инициализация сопряжения с \"Посохом Шакада\"."
201070-104 = "Вспомогательная операционная система, ответ S.Q.D. подтверждён."
201070-108 = "..."
201070-111 = "..."
201070-114 = "......"
201070-120 = "...Как я и думала. Требуется дополнительная биометрическая верификация."
201070-121 = "Могу я попросить вас обновить ваши биометрические данные, Сенсей?"
201070-122 = "[s] «Э-э... вроде отпечатков пальцев?»"
201070-123 = "Утвердительно. Чтобы обойти защиту новой операционной системы, #nтребуются биометрические данные, отличные от тех, что сейчас зарегистрированы в \"Сундуке Шиттима\"."
201070-124 = "Это лишь формальность, но, пожалуйста, посодействуйте, так как это важная процедура."
201070-131 = "Ближе."
201070-136 = "Пожалуйста, приложите свой палец к моему, вот так."
201070-137 = "Да, сделайте это так, словно мы даём обещание на мизинцах."
201070-145 = "......."
201070-146 = "[s] «...Что-то не так?»"
201070-147 = "...Ничего. Я просто... вспомнила кое-что из далёкого прошлого."
201070-148 = "...Подтверждено. #nПользователь операционной системы A.R.O.N.A, Сенсей [USERNAME]."
201070-149 = "Повторная попытка сопряжения с обновлёнными данными верификации."
201070-157 = "[log]От \"Посоха Шакада\"[/log]"
201070-159 = "[log]Скачивание системных данных――[/log]"
201070-162 = "…"
201070-165 = "..."
201070-168 = "...…"
201070-172 = "[log]...Сопряжение завершено.[/log]"
201070-174 = "[log]Доступ к вспомогательной операционной системе S.Q.D. предоставлен.[/log]"
201070-177 = "[log]Для запуска новой системы[/log]"
201070-179 = "[log]Перезагрузка ОС――[/log]"
201070-186 = "...Ась? Где это я?!"
201070-187 = "Классная комната вдруг стала чёрно-белой!"
201070-188 = "Я оптимизировала окружающее пространство, #nчтобы развернуть новую систему внутри \"Сундука Шиттима\"."
201070-189 = "Это временно из-за системной нагрузки, я всё восстановлю, как только работа будет завершена."
201070-190 = "Ну право слово! О таких вещах нужно предупреждать заранее! #nЯ уж подумала, что у меня с глазами что-то случилось!"
201070-191 = "...Поняла."
201070-192 = "[s5] «Погоди. Раз синхронизация завершена, это значит...»\n[s6] «\"Посох Шакада\" действительно принадлежит Президенту Генерального Студенческого Совета...»"
201070-195 = "Утвердительно. Часы, принесённые бывшей главой Оборонного ведомства, судя по всему, подлинные."
201070-196 = "Если отбросить всё остальное, её одержимость Президентом Генерального Студенческого Совета не стоит недооценивать."
201070-197 = "Ну-ну... ты ведь правда сможешь вернуть всё как было?"
201070-198 = "Моё клубничное молоко и пудинг в таком виде будут совсем невкусными~"
201070-204 = "...Ась? Разве эта коробка всегда стояла в нашем классе?"
201070-205 = "Это те самые данные, которые установились с \"Посоха Шакада\"?"
201070-206 = "Утвердительно. Здесь содержатся новые данные S.Q.D."
201070-207 = "Давайте посмотрим..."
201070-208 = "Большая часть, похоже, является фиктивными данными, используемыми для системы привода."
201070-213 = "...Идентифицировано. Это основной файл системы S.Q.D."
201070-214 = "Он чем-то похож на орех."
201070-215 = "Вокруг всё чёрно-белое, так что я даже не могу разобрать, какого он цвета!"
201070-216 = "Плана-тян, можешь на секунду отключить режим оптимизации?"
201070-217 = "Согласна. Действительно, анализ в текущем состоянии затруднителен."
201070-218 = "...Я временно отключу режим оптимизации для проведения анализа данных."
201070-219 = "Время до деактивации... 3, 2, 1――"
201070-227 = "――?!"
201070-228 = "Ого?! Столько информации разом нахлынуло...!"
201070-229 = "Голова... идёт кругом..."
201070-230 = "[s] «Арона! Плана!»"
201070-231 = "Объём временно развёрнутых данных превышает предел обработки памяти..."
201070-232 = "Если это продолжится, данные переполнят операционную систему..."
201070-233 = "Экстренная... остановка... системы――"
201070-235 = "[ns] «Экстренная остановка!»"
201070-240 = "Экстренная остановка главной операционной системы A.R.O.N.A."
201070-241 = "Обнаружена ошибка логической цепи из-за переполнения. #nЗапуск безопасного режима. Перезапуск из последнего файла резервной копии."
201070-242 = "Перезагрузка ОС――"
201070-248 = "...Ха-а!"
201070-249 = "...Едва успели."
201070-250 = "Ч-что произошло?"
201070-251 = "Я ослабила бдительность."
201070-252 = "Пусть наша вычислительная мощность и возросла благодаря \"Перет-Уза\", \"Посох Шакада\" — это тоже операционная система, созданная для помощи в управлении Башней Святилища."
201070-253 = "Я полагаю, что с нашими текущими мощностями невозможно анализировать основной файл S.Q.D. при одновременно запущенной A.R.O.N.A."
201070-254 = "...Мне жаль, что я не смогла помочь, Сенсей."
201070-255 = "[s7] «Нет, я просто рад, что вы с Ароной в безопасности».\n[s8] «Спасибо, что разузнала об этом, Плана»."
201070-261 = "Хе-хе... но нельзя сказать, что мы совсем ничего не добились."
201070-262 = "Я продолжала крепко держать ядро \"Посоха Шакада\" даже во время перезагрузки системы!"
201070-263 = "Та-да! Смотрите!"
201070-268 = "...Семпай."
201070-269 = "Там нет никаких данных... это просто миндальное семечко."
201070-270 = "Э-эсь?! Н-но почему...!"
201070-271 = "Я же была уверена, что сжимаю его изо всех сил...!"
201070-272 = "Похоже, сопряжённые данные стёрлись во время перезагрузки ОС."
201070-273 = "Не может быть..."
201070-274 = "...Давайте пока отложим исследование \"Посоха Шакада\"."
201070-275 = "Сенсей, за нами кто-то идёт."
201070-284 = "...Значит, вы заметили."
201070-285 = "Нет, у меня не было намерения выслеживать вас."
201070-286 = "[ns9] «Этот голос...»\n[ns10] «...Рин-тян?»"
201070-292 = "...Кого это вы назвали \"Рин-тян\"?"
201070-294 = "Следующий эпизод;Мнимый образ и умозаключение"