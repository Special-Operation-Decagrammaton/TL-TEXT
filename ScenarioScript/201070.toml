[translation]
201070-1 = "Episódio 7; Pareamento"
201070-2 = "Entrada do prédio do Conselho Estudantil Federal"
201070-5 = "（Ao terminar o trabalho no Conselho Estudantil Federal e tentar voltar para o Schale……）"
201070-10 = "……Sensei."
201070-11 = "Poderia me dar um momento?"
201070-12 = "[s1] \"Plana?\"\n[s2] \"Faz tempo que você não puxa assunto comigo.\""
201070-15 = "Sim, eu tenho algo que gostaria de dizer ao Sensei [USERNAME]."
201070-24 = "O que você acha daquela mulher?"
201070-25 = "[s] \"Você está falando da Presidente do Conselho Estudantil que retornou?\""
201070-27 = "[ns] \"Hmm... ela não me parece ser uma pessoa má...\""
201070-28 = "Negação. Aquela mulher não é confiável."
201070-29 = "Ela é uma impostora que está se passando pela Presidente do Conselho Estudantil Federal."
201070-30 = "Sua verdadeira identidade e intenções são desconhecidas. Recomendo que você a trate com suspeita e mantenha distância."
201070-31 = "[s3] \"Então a Plana também acha que ela é uma farsa.\"\n[s4] \"Não existe a possibilidade de minhas memórias estarem erradas?\""
201070-34 = "Negação. As memórias do Sensei não estão erradas."
201070-35 = "Porque a verdadeira Presidente do Conselho Estudantil Federal..."
201070-39 = "Plana-chan!?#nPor acaso você descobriu onde a verdadeira Presidente do Conselho Estudantil Federal está!?"
201070-40 = "Nem a Super Arona-chan, que é o SO do Shittim Chest, conseguiu encontrá-la!#nCo-como você conseguiu!?"
201070-41 = "Não, não é hora para isso!#nPrecisamos ir logo até a verdadeira Presidente do Conselho Estudantil Federal――!"
201070-46 = "…………."
201070-47 = "Negação. Eu também não sei o paradeiro dela."
201070-48 = "Mas, uma coisa é certa: aquela mulher é uma farsa."
201070-49 = "Pois ela não consegue reconhecer a nós, que somos o SO do Shittim Chest."
201070-50 = "O Shittim Chest não é apenas um OOPArt, é algo ligado à essência de Kivotos."
201070-51 = "Isso era o mesmo no mundo de onde eu vim.#nSe ela fosse a Presidente do Conselho Estudantil Federal, ela não teria como não conhecer o Shittim Chest."
201070-52 = "Não importa o quão capaz ela seja, se ela não consegue reconhecer o Shittim Chest,#nnão é a verdadeira Presidente do Conselho Estudantil Federal."
201070-53 = "No fim das contas, ela não passa de alguém que está interpretando a Presidente do Conselho Estudantil Federal."
201070-54 = "As cópias que surgiram até agora, cada uma à sua maneira, perturbaram a ordem de Kivotos e causaram caos. Sem dúvida, ela fará o mesmo."
201070-55 = "[s] \"Se isso for verdade, é um problema grave...\""
201070-56 = "Espere um pouco. Acho que não é bom julgar as pessoas apenas pela capacidade delas!"
201070-57 = "Arona-senpai...?"
201070-58 = "Talvez tenha acontecido algo enquanto ela estava desaparecida e ela só tenha perdido as memórias sobre o Shittim Chest."
201070-59 = "Deveríamos ouvir o que ela tem a dizer antes de julgar!"
201070-63 = "…………Haa."
201070-64 = "Um suspiro!?"
201070-65 = "……Mesmo que esse seja o caso, o fato de ela não conseguir exercer o poder da Presidente do Conselho Estudantil Federal não muda."
201070-66 = "Quando um poder que não pode ser controlado é deixado à própria sorte... a Arona-senpai sabe muito bem o que acontece, não sabe?"
201070-67 = "Ugh, isso é... verdade, mas..."
201070-68 = "[s] \"Plana, você sabe algo sobre o Cajado de Sharcade?\""
201070-69 = "Negação. Eu sou um SO residente no Shittim Chest.#nPor isso, não sei sobre outros dispositivos gerenciados pela Presidente do Conselho Estudantil Federal."
201070-70 = "Além disso, no mundo de onde eu vim, o Cajado de Sharcade nunca foi utilizado até o fim."
201070-71 = "……Mas, se o Cajado de Sharcade for um OOPArt equivalente ao Shittim Chest, como disse a ex-chefe do Departamento de Defesa, então posso visualizar parte de sua estrutura."
201070-72 = "[s] \"……Sério?\""
201070-73 = "Co-como você vai fazer isso?"
201070-74 = "Para operar a Sanctum Tower remotamente, é necessário um processo de autenticação enviando informações de identificação especiais definidas em nome da Presidente do Conselho Estudantil Federal."
201070-75 = "Ou seja, se os dois dispositivos usarem o mesmo sistema de autenticação,#npodemos usar a \"função de pareamento\" para chamar um ao outro e sincronizar as informações."
201070-76 = "Essa é uma função básica instalada no Shittim Chest, mas..."
201070-81 = "Eu, eu sei disso! É que eu fiquei surpresa e esqueci por um momento!"
201070-82 = "Se o Sensei [USERNAME] permitir, solicitarei ao Cajado de Sharcade que envie suas informações de identificação únicas."
201070-83 = "Sensei, dê-me a permissão."
201070-84 = "[s] Autorizo."
201070-91 = "…"
201070-94 = "……"
201070-97 = "………"
201070-101 = "[log]Pairing To [FF6666]branch of shakeid――[-][/log]"
201070-103 = "……Realizando o pareamento com o \"Cajado de Shakeid\"."
201070-104 = "Confirmando a resposta do sistema operacional auxiliar, S.Q.D."
201070-108 = "…"
201070-111 = "……"
201070-114 = "………"
201070-120 = "……Como eu suspeitava. Uma autenticação biométrica adicional é necessária."
201070-121 = "Poderia atualizar suas informações biométricas, Sensei?"
201070-122 = "[s] \"Hã... tipo, impressão digital?\""
201070-123 = "Afirmativo. Para desbloquear a segurança do novo sistema operacional, é necessária uma informação biométrica diferente da que está registrada no \"Shittim Chest\" atualmente."
201070-124 = "É apenas uma formalidade, mas é um procedimento importante, então, por favor, colabore."
201070-131 = "Mais perto."
201070-136 = "Por favor, coloque seu dedo sobre o meu, exatamente assim."
201070-137 = "Isso, como se estivéssemos fazendo uma promessa de dedinho."
201070-145 = "…………."
201070-146 = "[s] \"……Aconteceu alguma coisa?\""
201070-147 = "……Não é nada. Só... lembrei de algo do passado por um momento."
201070-148 = "……Verificação concluída. #nUsuário do sistema operacional A.R.O.N.A, Sensei [USERNAME]."
201070-149 = "Tentando o pareamento novamente com as informações de autenticação atualizadas."
201070-157 = "[log]Do \"Cajado de Shakeid\"[/log]"
201070-159 = "[log]Baixando dados do sistema――[/log]"
201070-162 = "…"
201070-165 = "……"
201070-168 = "………"
201070-172 = "[log]……Pareamento concluído.[/log]"
201070-174 = "[log]Acesso ao sistema operacional auxiliar, S.Q.D, permitido.[/log]"
201070-177 = "[log]Para a execução do novo sistema,[/log]"
201070-179 = "[log]reiniciando o SO――[/log]"
201070-186 = "……Ué? Onde eu estou!?"
201070-187 = "De repente, a sala de aula ficou em preto e branco!"
201070-188 = "Para instalar o novo sistema dentro do \"Shittim Chest\", #notimizei o ambiente ao redor."
201070-189 = "É algo temporário devido à carga do sistema, então voltará ao normal assim que o processo terminar."
201070-190 = "Ah, não! Você deveria ter avisado antes! #nEu achei que meus olhos tinham estragado!"
201070-191 = "……Entendido."
201070-192 = "[s5] \"Espere. Se a sincronização foi concluída, então...\"\n[s6] \"O 'Cajado de Shakeid' é realmente da Presidente do Conselho Estudantil Federal...\""
201070-195 = "Afirmativo. O relógio que a ex-chefe do Gabinete de Defesa trouxe parece ser autêntico."
201070-196 = "Deixando o resto de lado, a obsessão dela pela Presidente do Conselho Estudantil Federal é algo que não se pode subestimar."
201070-197 = "Nunu... isso realmente vai voltar ao normal, né?"
201070-198 = "Desse jeito, nem o leite de morango nem o pudim vão ter gosto de nada~"
201070-204 = "……Ué? Essa caixa estava na nossa sala de aula?"
201070-205 = "Esses são os dados instalados a partir do \"Cajado de Shakeid\"?"
201070-206 = "Afirmativo. Dentro dela estão os novos dados do S.Q.D."
201070-207 = "Deixa eu ver..."
201070-208 = "Parece que a maior parte são dados fictícios usados para o sistema de acionamento."
201070-213 = "……Identificado. Este é o arquivo principal do sistema S.Q.D."
201070-214 = "Parece um pouco com uma semente."
201070-215 = "Está tudo em preto e branco, então não consigo saber qual é a cor!"
201070-216 = "Plana, você não poderia desativar o modo de otimização por um instante?"
201070-217 = "Concordo. De fato, é difícil realizar uma análise no estado atual."
201070-218 = "……Para a análise de dados, desativarei o modo de otimização temporariamente."
201070-219 = "Tempo para desativação…… 3, 2, 1――"
201070-227 = "――!?"
201070-228 = "Uwaaa!? U-uma quantidade massiva de informações, de repente……!"
201070-229 = "Minha cabeça…… está girando……."
201070-230 = "[s] \"Arona! Plana!\""
201070-231 = "A quantidade de dados expandidos temporariamente excedeu o limite de processamento da memória……."
201070-232 = "Se continuar assim, os dados vão transbordar para o sistema operacional……."
201070-233 = "P-precisamos de uma, parada de emergência, do sistema――"
201070-235 = "[ns] \"Parada de emergência!\""
201070-240 = "Realizando parada de emergência do sistema operacional principal A.R.O.N.A."
201070-241 = "Erro no circuito lógico detectado devido a estouro de memória. #nExecutando modo de segurança. Iniciando reinicialização a partir do último arquivo de backup."
201070-242 = "Reiniciando o SO――"
201070-248 = "……Ah!"
201070-249 = "……De alguma forma, conseguimos a tempo."
201070-250 = "O-o que aconteceu?"
201070-251 = "Eu baixei a guarda."
201070-252 = "Embora o poder de processamento tenha aumentado graças ao \"Peretz Uza\", o \"Cajado de Schale\" também é um sistema operacional para auxiliar na gestão da Torre Sanctum."
201070-253 = "Analisar os arquivos principais do S.Q.D enquanto o A.R.O.N.A está em operação é, #nprovavelmente, impossível com a capacidade de processamento atual."
201070-254 = "……Sinto muito por não poder ser útil, Sensei."
201070-255 = "[s7] \"Não se preocupe, fico feliz que Arona e Plana estejam bem.\"\n[s8] \"Obrigado por investigar, Plana.\""
201070-261 = "Hehe... mas não é como se não tivéssemos conseguido nada."
201070-262 = "Mesmo durante a reinicialização do sistema, eu continuei segurando o núcleo do \"Cajado de Schale\"!"
201070-263 = "Tcharam! Olhem só!"
201070-268 = "……Sênior."
201070-269 = "Isso não contém nenhum dado…… é apenas uma semente de amêndoa."
201070-270 = "Eeeh!? P-por que……!"
201070-271 = "Eu tinha certeza de que estava segurando firme……!"
201070-272 = "Ao que parece, durante a reinicialização do SO, os dados pareados foram apagados."
201070-273 = "Não pode ser……."
201070-274 = "……Vamos deixar a investigação do \"Cajado de Schale\" para depois."
201070-275 = "Sensei, alguém está nos seguindo."
201070-284 = "……Então você percebeu."
201070-285 = "Bem, eu não tinha a intenção de seguir vocês."
201070-286 = "[ns9] \"Essa voz…….\"\n[ns10] \"……Rin-chan?\""
201070-292 = "……Quem você está chamando de \"Rin-chan\"?"
201070-294 = "Próximo episódio: Imagem Falsa e Inferência"
