[translation]
70013020-1 = "Uma erva daninha não floresce sozinha (2)"
70013020-2 = "[log]Na época, antes de Haruka se tornar membro da Empresa de Conveniência 68 –[/log]"
70013020-5 = "Fufu, a missão de hoje foi um grande sucesso, hein."
70013020-6 = "Hmm, mas Aru-chan."
70013020-7 = "Você acha que 'procurar gato' e 'hard-boiled' combinam?"
70013020-8 = "Hã..."
70013020-9 = "I-Imagine! Tem tudo a ver!"
70013020-10 = "Um gato que fugiu de casa em busca da liberdade, e eu o trouxe de volta para o dono, não foi?"
70013020-11 = "Tirei a liberdade do gato, então sou uma baita de uma vilã, né?"
70013020-16 = "Kufufu, será mesmo~?"
70013020-17 = "Ah... se a presidente diz, então deve ser."
70013020-18 = "Ei, Kayoko-chan. Por que será que aquele gato foi parar num lugar que ele mesmo não conseguia descer?"
70013020-19 = "Ele devia saber que era perigoso."
70013020-20 = "... Por que está perguntando para mim?"
70013020-21 = "Hmm, porque você parece que vai saber a resposta, Kayoko-chan?"
70013020-22 = "..."
70013020-23 = "Sei lá, deve ter sido perseguido por outro gato ou cachorro e, sem perceber, acabou subindo."
70013020-24 = "Ficou tão desesperado que não conseguiu pensar direito."
70013020-25 = "Acontece com a gente também, né?"
70013020-26 = "Às vezes, a gente foge com tanta vontade que acaba indo para onde não devia..."
70013020-27 = "Quando vê, não consegue mais voltar atrás."
70013020-28 = "Já vi muita gente assim."
70013020-29 = "Uau~, esperta como sempre, Kayoko-chan, respondeu na moral~"
70013020-30 = "... É mesmo. Vai saber."
70013020-32 = "Fufufu. De qualquer forma, a gente ganhou uma grana. Vamos comer um lámen."
70013020-33 = "Hoje pode ser com tudo!"
70013020-34 = "Oba! A Aru-chan paga? Então posso pedir mais chashu?"
70013020-35 = "Cl-claro! O que eu busco é uma empresa com ótimos benefícios!"
70013020-36 = "... Isso não foge muito do 'hard-boiled'?"
70013020-37 = "Para de frescura! Quando eu digo que pago, é só comer e calar a boca!"
70013020-48 = "Ora? Não é a 'plantinha'?"
70013020-49 = "Plantinha?"
70013020-50 = "É. Ela tá sempre cuidando das plantas, então é 'plantinha'."
70013020-51 = "Qual é o nome de verdade?"
70013020-52 = "Sei lá. Quando a gente tenta conversar, ela não responde."
70013020-53 = "Hmm... que garota esquisita."
70013020-58 = "... Ehe, ehehe."
70013020-59 = "... Ehe, ehehe."
70013020-60 = "Cresceu um pouquinho desde ontem, hein. As folhas também estão cheias de vida..."
70013020-61 = "Vim dar água hoje. Achei que já devia estar com sede..."
70013020-65 = "... Ehe... ehehehe."
70013020-73 = "Sumiu o dia inteiro, e você estava escondida aqui?"
70013020-75 = "N-não foi! Não estava escondida..."
70013020-76 = "Então por que estava nesse lugar escuro?"
70013020-77 = "É que... por causa dessa plantinha..."
70013020-78 = "Hã? Agora você chamou a planta de 'essa plantinha'?"
70013020-80 = "Que engraçado! 'Essa plantinha'?"
70013020-81 = "Pare de palhaçada e traga logo o dinheiro!"
70013020-82 = "Ah, essa planta está suja, limpe aí."
70013020-83 = "A-aah...!"
70013020-84 = "C-com licença! Por favor..."
70013020-95 = "P-parem! Me pisem... se quiserem...!"
70013020-96 = "Já que pede, vou atender ao seu desejo!"
70013020-97 = "Kyaha! Hahahaha...!"
70013020-103 = "Agora você entendeu? Não adianta resistir."
70013020-104 = "Se entendeu, traga o dinheiro logo."
70013020-105 = "Da próxima vez, vai ser nesse seu rosto –"
70013020-113 = "O-o que foi! Quem é você...!"
70013020-117 = "..."
70013020-119 = "Você...! Sabe em quem atirou agora!?"
70013020-121 = "Quem será?"
70013020-122 = "Bem, não deve ser ninguém importante."
70013020-123 = "Afinal, está aí intimidando os mais fracos, né."
70013020-125 = "S-sua..."
70013020-130 = "Hmm, tá cheia de vontade, hein? Mesmo estando em menor número."
70013020-135 = "..."
70013020-137 = "(O-olhares daquele cara... é...!)"
70013020-138 = "V-vamos embora!"
70013020-139 = "V-vocês vão pagar por isso..."
70013020-146 = "Ei, está bem?"
70013020-147 = "..."
70013020-153 = "A planta importante dessa garota... virou uma bagunça..."
70013020-155 = "..."
70013020-156 = "J-já está tudo bem! A gente espantou aquela gente para você."
70013020-157 = "Não está... tudo bem."
70013020-158 = "Eles vão... voltar com certeza..."
70013020-159 = "... Desculpa. Me desculpa mesmo..."
70013020-163 = "Não consegui... proteger, né..."
70013020-165 = "..."
70013020-166 = "Eles estão te seguindo, não estão?"
70013020-167 = "A gente resolve isso para você. Qual é o seu nome?"
70013020-171 = "... Desculpa. Não posso dizer."
70013020-172 = "Por favor, não queira saber de nada."
70013020-173 = "Se se envolverem comigo... vocês também não vão ficar em paz."
70013020-175 = "Por que você diz isso..."
70013020-176 = "... Vamos voltar."
70013020-177 = "Ela não está em condições de conversar agora."
70013020-178 = "Se a gente for muito insistente... ela só vai fugir."
70013020-179 = "..."
70013020-180 = "Certo. Vamos recuar por enquanto."
70013020-182 = "..."
70013020-183 = "Então, até logo, plantinha!"
70013020-184 = "Plantinha...?"
70013020-185 = "Ah... foi mal! Saiu sem querer..."
70013020-186 = "A planta que você cuidava ficou desse jeito... foi mal mesmo!"
70013020-187 = "..."
70013020-188 = "Não... não se preocupe."
70013020-189 = "De qualquer forma, eu sou igual a uma erva daninha... Ehehe..."
70013020-190 = "É um apelido perfeito para mim..."
70013020-191 = "Ehehehe..."
70013020-195 = "Uh... que droga."
70013020-197 = "... Não dá para ignorar."
70013020-198 = "Vai trabalhar de graça?"
70013020-199 = "N-não é de graça!"
70013020-200 = "É que não gosto de ver delinquentes se aproveitando no meu território. Isso nem se enquadra como trabalho."
70013020-201 = "Tá, tá. Vamos dizer que é isso."
70013020-202 = "Mas, Aru-chan, como vamos ajudar uma garota que nem nome sabemos?"
70013020-206 = "I-isso é..."
70013020-207 = "... Tenho uma ideia. Vem comigo."
70013020-214 = "Kayoko passou um tempo coletando informações."
70013020-215 = "E então –"
70013020-217 = "Vocês duas, aqui. Já entendi quase tudo."
70013020-221 = "Uau~, esperta como sempre, Kayoko-chan. O que foi? Conta logo!"
70013020-222 = "Aqueles caras que estavam intimidando ela... não são delinquentes comuns."
70013020-223 = "Estão ligados à máfia."
70013020-224 = "Delinquentes... com a máfia?"
70013020-225 = "É. Parece que a máfia usa delinquentes para extorquir dinheiro das alunas."
70013020-226 = "Aqueles caras são só peixes pequenos. Não adianta derrubá-los."
70013020-227 = "Tem que ir na máfia."
70013020-228 = "Hmm~, é mais sério do que eu pensava, hein?"
70013020-229 = "E então, que organização é?"
70013020-230 = "O nome da organização é –"
70013020-232 = "Família Rigatoni."