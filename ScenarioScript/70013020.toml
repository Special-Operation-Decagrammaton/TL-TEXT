[translation]#[Texto Final. - Filipe 08/07.]
70013020-1 = "Erva Daninha Que Não Floresce Sozinha (2)"
70013020-2 = "[log]Na época em que Haruka ainda não era da Oficina 68――[/log]"
70013020-5 = "Fufu, outra missão bem-sucedida."
70013020-6 = "Hmm, mas Al-chan."
70013020-7 = "'Procurar gato' e 'hard-boiled' são coisas bem diferentes."
70013020-8 = "Hã……"
70013020-9 = "N-não! Tem uma ligação profunda!"
70013020-10 = "Devolvemos um gato que fugiu em busca de liberdade ao dono!"
70013020-11 = "Tiramos a liberdade do gato, isso é bem bandido, né?"
70013020-16 = "Kufufu, será?"
70013020-17 = "Haa…… se a presidente diz, então é."
70013020-18 = "Ei, Kayoko-chan. Por que aquele gato foi para onde não podia descer?"
70013020-19 = "Ele devia saber do perigo."
70013020-20 = "……Por que pergunta pra mim?"
70013020-21 = "Hmm, achei que você saberia."
70013020-22 = "……"
70013020-23 = "Provavelmente foi perseguido por outro gato ou cachorro e subiu sem perceber."
70013020-24 = "Ficou tão desesperado que perdeu o julgamento."
70013020-25 = "Acontece com a gente também, né?"
70013020-26 = "Fugir com tanta vontade que vai para onde não devia."
70013020-27 = "Quando percebe, não tem volta."
70013020-28 = "Eu já vi muita gente assim."
70013020-29 = "Oh, como sempre, Kayoko-chan, resposta séria~"
70013020-30 = "……É, foi o que pensei."
70013020-32 = "Fufufu. Já que ganhamos dinheiro, vamos comer um lámen."
70013020-33 = "Hoje, pode ser com o extra!"
70013020-34 = "Uau! É por conta da Al-chan? Então posso adicionar carne?"
70013020-35 = "Claro! Minha empresa valoriza benefícios!"
70013020-36 = "……Isso não é bem hard-boiled, né?"
70013020-37 = "Quando eu pago, come quieta!"
70013020-48 = "Ué? É a 'Erva-chan'."
70013020-49 = "Erva-chan?"
70013020-50 = "É. Ela sempre cuida de uma erva, então chamo assim."
70013020-51 = "Qual é o nome dela?"
70013020-52 = "Não sei.#nEla não responde quando falo."
70013020-53 = "Hmm…… que garota estranha."
70013020-58 = "……Hehe, hehe."
70013020-59 = "……Hehe, hehe."
70013020-60 = "Cresceu um pouco mais que ontem. As folhas estão viçosas……"
70013020-61 = "Vim regar. Achei que podia estar com sede."
70013020-65 = "……Hehe…… hehehe."
70013020-73 = "Passou o dia sumida e estava escondida aqui?"
70013020-75 = "N-não! Não estou escondida……"
70013020-76 = "Então por que está nesse lugar escuro?"
70013020-77 = "É-é para cuidar dela……"
70013020-78 = "Hã? Você chamou a erva de 'ela'?"
70013020-80 = "Ri muito! 'Ela'?"
70013020-81 = "Pare de bobeira e traga o dinheiro."
70013020-82 = "Ah, e limpe essa erva suja."
70013020-83 = "Ah, sim……!"
70013020-84 = "D-desculpa! Por favor……!!"
70013020-95 = "P-pare! Me pise……!"
70013020-96 = "Já que pediu, vou fazer!"
70013020-97 = "Kyahahahaha……!"
70013020-103 = "Agora entendeu?#nNão adianta desafiar."
70013020-104 = "Então, traga o dinheiro."
70013020-105 = "Se não, sua cara――"
70013020-113 = "O-quê! Quem é……!"
70013020-117 = "……"
70013020-119 = "Você! Sabe em quem atirou!?"
70013020-121 = "Sei lá."
70013020-122 = "Mas deve ser alguém insignificante."
70013020-123 = "Afinal, está intimidando os fracos."
70013020-125 = "Vo-você!!"
70013020-130 = "Ah, está animado? Somos mais em número."
70013020-135 = "……"
70013020-137 = "(O-olhar daquele…… perigoso!)"
70013020-138 = "V-vamos!"
70013020-139 = "Le-embrem-se disso……!"
70013020-146 = "Ei, você está bem?"
70013020-147 = "……"
70013020-153 = "A erva que ela cuidava…… foi destruída……"
70013020-155 = "……"
70013020-156 = "Já está tudo bem! Nós afugentamos eles."
70013020-157 = "Não está…… bem."
70013020-158 = "Eles…… vão voltar……"
70013020-159 = "……Desculpa. Desculpa mesmo……"
70013020-163 = "Não consegui…… proteger……"
70013020-165 = "……"
70013020-166 = "Eles estão te perseguindo?"
70013020-167 = "Vamos resolver isso. Qual é seu nome?"
70013020-171 = "……Desculpa, não posso falar."
70013020-172 = "Não tente saber nada."
70013020-173 = "Se se envolverem comigo…… vão se machucar."
70013020-175 = "Por que……"
70013020-176 = "……Vamos voltar."
70013020-177 = "Ela não está em condições de conversar."
70013020-178 = "Se insistirmos, ela só vai fugir."
70013020-179 = "……"
70013020-180 = "Entendido. Vamos recuar."
70013020-182 = "……"
70013020-183 = "Então, até logo, Erva-chan!"
70013020-184 = "Erva……-chan?"
70013020-185 = "Ah…… desculpa! Foi sem querer!"
70013020-186 = "A erva que você cuidava foi destruída…… desculpa mesmo!"
70013020-187 = "……"
70013020-188 = "……Não se preocupe."
70013020-189 = "Eu sou como uma erva daninha…… hehe……"
70013020-190 = "É o apelido perfeito……"
70013020-191 = "Hehehe……"
70013020-195 = "Ah…… fiz besteira."
70013020-197 = "……Não dá pra ignorar."
70013020-198 = "Vai trabalhar de graça?"
70013020-199 = "N-não é de graça!"
70013020-200 = "Só não gosto de delinquentes no meu território.#nIsso não é trabalho."
70013020-201 = "Tá, tá. Vamos fingir isso."
70013020-202 = "Mas, Al-chan, como ajudar uma garota sem nome?"
70013020-206 = "Bem……"
70013020-207 = "……Tenho uma ideia. Vem comigo."
70013020-214 = "Kayoko fez uma investigação."
70013020-215 = "E――"
70013020-217 = "Vocês duas, aqui. Já sei a maior parte."
70013020-221 = "Oh, Kayoko-chan! O quê? Conta logo!"
70013020-222 = "Os que a intimidavam não são delinquentes comuns."
70013020-223 = "Eles têm ligação com a máfia."
70013020-224 = "Delinquentes…… com máfia?"
70013020-225 = "Sim. A máfia os usava para extorquir alunos."
70013020-226 = "Eles são soldados rasos, derrubá-los não adianta."
70013020-227 = "Precisamos lidar com a máfia."
70013020-228 = "Hmm, mais grave do que eu pensei."
70013020-229 = "E que organização é essa?"
70013020-230 = "O nome é――"
70013020-232 = "Família Rigatoni."