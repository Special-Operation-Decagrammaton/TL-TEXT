[translation]
70013020-1 = "The Weed That Doesn't Bloom Alone (2)"
70013020-2 = "[log]This was back before Haruka became a member of Problem Solver 68—[/log]"
70013020-5 = "Hehe, that job was a huge success, wasn't it?"
70013020-6 = "Hmm~, but Aru-chan."
70013020-7 = "Don't you think 'finding a cat' and being 'hard-boiled' are completely different things?"
70013020-8 = "Eh..."
70013020-9 = "W-what are you talking about! They're closely related!"
70013020-10 = "We brought a cat that ran away in search of freedom back to its owner, didn't we?"
70013020-11 = "Since we took away the cat's freedom, that makes us pretty big villains, right?"
70013020-16 = "Kufufu, you think so?"
70013020-17 = "Sigh... If the President says so, then I guess it is."
70013020-18 = "Hey, Kayoko-chan. Why do you think that cat went somewhere it couldn't get down from on its own?"
70013020-19 = "It should have known it was dangerous."
70013020-20 = "...Why are you asking me?"
70013020-21 = "Hmm, maybe because I thought you'd know?"
70013020-22 = "..."
70013020-23 = "It was probably being chased by another cat or dog and climbed up without realizing it, right?"
70013020-24 = "It was so desperate that it couldn't make a rational decision."
70013020-25 = "That happens to us too, doesn't it?"
70013020-26 = "Being so focused on running away that you head somewhere you shouldn't..."
70013020-27 = "And then realizing you can't go back."
70013020-28 = "I've seen plenty of people like that."
70013020-29 = "Ooh~, as expected of Kayoko-chan. Answering so seriously~"
70013020-30 = "...Yeah, I guess so. I wonder why."
70013020-32 = "Fufufu. Anyway, we made some money, so let's go eat some ramen."
70013020-33 = "Today, I'll even let you order a large bowl!"
70013020-34 = "Wow! Is it Aru-chan's treat? Then, can I add extra chashu too?"
70013020-35 = "O-of course! I'm aiming to run a company with excellent benefits, after all!"
70013020-36 = "...Isn't that the complete opposite of being hard-boiled?"
70013020-37 = "Never mind that! When I say it's my treat, just shut up and eat!"
70013020-48 = "Huh? Isn't that 'Weed-chan'?"
70013020-49 = "Weed-chan?"
70013020-50 = "Yeah. She's always taking care of weeds, so Weed-chan."
70013020-51 = "What's her real name?"
70013020-52 = "No idea. #nShe doesn't answer even when you talk to her."
70013020-53 = "Hmm... what a strange girl."
70013020-58 = "...Hehe, hehehe."
70013020-59 = "...Hehe, hehehe."
70013020-60 = "You've grown a little since yesterday. Your leaves look so healthy..."
70013020-61 = "I came to give you some water today. I thought you might be getting thirsty..."
70013020-65 = "...Hehe... hehehehe."
70013020-73 = "I wondered where you'd been all day, and here you are hiding in a place like this?"
70013020-75 = "N-no! I'm not hiding...!"
70013020-76 = "Then why are you in such a dark place?"
70013020-77 = "I-it's for this little one..."
70013020-78 = "Hm? Did you just call a weed 'this little one'?"
70013020-80 = "Hilarious~ 'This little one,' what is that!"
70013020-81 = "Stop messing around and bring us the money already!"
70013020-82 = "Oh, and this weed is dirty, so clean it up."
70013020-83 = "Y-yes...!"
70013020-84 = "I-I'm sorry! Please...!!"
70013020-95 = "P-please stop! I-if you must, then just...! Please, trample me instead...!"
70013020-96 = "If you're going to beg for it, I'll give you exactly what you want!"
70013020-97 = "Kya-hahahaha...!!"
70013020-103 = "You understand now, don't you? #nIt's useless to resist."
70013020-104 = "Now hurry up and bring the money."
70013020-105 = "Next time, that face—"
70013020-113 = "W-what! Who the hell is that...!"
70013020-117 = "..."
70013020-119 = "You...! Do you have any idea who you just shot at!?"
70013020-121 = "Who knows."
70013020-122 = "Though I doubt you're anyone of any real importance."
70013020-123 = "After all, you're just picking on the weak in a place like this."
70013020-125 = "Y-you...!!"
70013020-130 = "Heh, feeling feisty, are we? Even though we outnumber you?"
70013020-135 = "..."
70013020-137 = "(H-her eyes... they're dangerous...!)"
70013020-138 = "L-let's go!"
70013020-139 = "J-just you wait...!"
70013020-146 = "Hey, are you okay?"
70013020-147 = "..."
70013020-153 = "This little one's precious grass... it's all ruined..."
70013020-155 = "..."
70013020-156 = "I-it's okay now! We chased those guys off for you."
70013020-157 = "It's... not okay."
70013020-158 = "Because they'll surely... come back again..."
70013020-159 = "...I'm sorry. I'm so, so sorry..."
70013020-163 = "I couldn't... protect it..."
70013020-165 = "..."
70013020-166 = "Those guys have been harassing you, haven't they?"
70013020-167 = "We'll solve this for you. What's your name?"
70013020-171 = "...I'm sorry. I can't tell you."
70013020-172 = "Please, don't try to find out anything."
70013020-173 = "If you get involved with someone like me... you won't be safe either."
70013020-175 = "Why would you say that..."
70013020-176 = "...Let's head back for now."
70013020-177 = "She's not in a state to be persuaded right now."
70013020-178 = "If we chase her clumsily... she'll just run away."
70013020-179 = "..."
70013020-180 = "I understand. Let's back off for now."
70013020-182 = "..."
70013020-183 = "See you later, then~ Weed-chan!"
70013020-184 = "Weed... chan?"
70013020-185 = "Ah... s-sorry! It just slipped out..."
70013020-186 = "Even though the grass you were taking care of ended up like this... I'm really sorry!"
70013020-187 = "..."
70013020-188 = "...No, please don't worry about it."
70013020-189 = "I'm basically a weed myself, anyway... Hehe..."
70013020-190 = "It's the perfect nickname for me..."
70013020-191 = "Hehehe..."
70013020-195 = "Ugh... I really messed that up."
70013020-197 = "...I can't just leave her alone."
70013020-198 = "Are you going to work for free?"
70013020-199 = "I-it's not working for free!"
70013020-200 = "I just don't like delinquents causing trouble in our territory. #nThis doesn't even count as a job."
70013020-201 = "Sure, sure. Let's go with that."
70013020-202 = "But Aru-chan, how are we going to help a girl whose name we don't even know?"
70013020-206 = "T-that is..."
70013020-207 = "...I have an idea. Follow me."
70013020-214 = "For a while, Kayoko continued gathering information."
70013020-215 = "And then—"
70013020-217 = "Both of you, come here. I've figured out most of it."
70013020-221 = "Ooh~ as expected of Kayoko-chan. What is it? Tell us quickly!"
70013020-222 = "The delinquents who were bullying that girl aren't just ordinary delinquents."
70013020-223 = "They're connected to the mafia."
70013020-224 = "Delinquents... connected to the mafia?"
70013020-225 = "Yeah. It seems the mafia is using them to extort money from students."
70013020-226 = "Those guys are just the lowest of the low, so defeating them won't change anything."
70013020-227 = "We have to deal with the mafia itself."
70013020-228 = "Hmm, this is more serious than I thought, isn't it?"
70013020-229 = "So, which organization is it?"
70013020-230 = "The name of the organization is—"
70013020-232 = "The Rigatoni Family."