[translation]
1004902-1 = "補習授業とスイーツ"
1004902-3 = "ここだよ、先生。思ったよりすぐだったね。"
1004902-4 = "……ふぅん、聞いていたよりはそんな忙しくないみたいじゃん？"
1004902-5 = "[s1] \"今日はね。\"\n[s2] \"カズサのために全部投げ捨ててきたよ。\""
1004902-6 = "そっか……私がいい日を選んだのかな？それならよかった。"
1004902-7 = "ちょっと気持ち悪いよ、先生……もしかして、ソレ他の子にも言ってたりするの？"
1004902-8 = "呼び出した理由は大したことじゃないんだけど……先生に頼みたい事があって。"
1004902-9 = "これなんだけど……。"
1004902-13 = "[ns3] \"……再試の予想問題？\"\n[ns4] \"分量が思ったより多いね……？\""
1004902-14 = "さすがに再試が目前だからね。"
1004902-15 = "さすがに再試が目前だからね。"
1004902-16 = "再試験だから難易度はそんなに高くないんだけど……ちょっと詰まるとこがあって。それで……。"
1004902-17 = "……えっ、何？"
1004902-18 = "勉強、苦手な方なのかって？"
1004902-19 = "うっわー……すごいストレートに聞くね。#n人によっては傷つくよその言い方。"
1004902-20 = "でもまあ……そうだね、先生だし、正確に把握する必要あるもんね。"
1004902-21 = "私、勉強全然ダメだよ。最下位ってほどじゃないけど……#n下位圏？大体70～80%くらい……？"
1004902-22 = "だからこうして助けを求めてるんだし。"
1004902-23 = "……え？"
1004902-24 = "そんなには見えない？普通以上はできると思ってた？"
1004902-25 = "……はぁ。"
1004902-26 = "残念ながらハズレ。中学の時から勉強とは縁がなかったから。"
1004902-27 = "まぁでも、ありがと。#n本気かどうかは分かんないけど、一応バカには見えないってことだし……"
1004902-28 = "言い訳に聞こえるかもしれないけど、これでも一応成績上がってるんだよ。#nそれなりに予習復習もしてるし。"
1004902-29 = "でも……まぁ、今さら急に追いつこうとしても、ちょっと厳しいというか……。"
1004902-33 = "……何よ、その顔。"
1004902-34 = "可哀想なものを見る目でこっち見ないで。ちょっとムカつく。"
1004902-35 = "[s5] \"いや、偉いと思ってるよ。\"\n[s6] \"上がってるなら大丈夫なんじゃない？\""
1004902-36 = "……そう。"
1004902-37 = "……そう。"
1004902-38 = "本当？一応、ありがたくその言葉受け取るけど……"
1004902-39 = "……まぁいいや。こんな事を言ってたら時間なくなっちゃう。"
1004902-40 = "とりあえず、補習授業から始めよう。#n授業中の飲み物は私がおごるね。私が呼び出したんだし。"
1004902-41 = "え？先生が買うって？……先生だから？"
1004902-42 = "うーん……"
1004902-43 = "……ううん。やっぱダメ、私がおごるよ。後ろめたくて集中できなくなっちゃう。"
1004902-44 = "まさか先生が生徒の集中力を落とすようなことしないよね？"
1004902-45 = "……ふふっ。#nよし、じゃあ決まり。私がおごるということで。"
1004902-46 = "それじゃ、私が注文しておくから。#nとりあえずこの問題から……。"
1004902-50 = "次はこの範囲を……。"
1004902-52 = "（その後、カズサと一緒に再試験範囲をゆっくりと復習した）"
1004902-53 = "（カズサは真剣に授業に臨み、内容も再試験なので大きな問題もなく。#n　早く進めることができた）"
1004902-55 = "……ふう。"
1004902-56 = "終わった。"
1004902-57 = "何か……不思議だね。#nこれが先生の力なのかな……？"
1004902-58 = "一人でやってる時は、ちょっと躓く部分もあったんだけど……こうやって振り返ると、全問すごく簡単そうに感じてくる。"
1004902-59 = "私、本当にこれを間違えてたの……？#n今更だけど我ながらちょっと呆れちゃった。"
1004902-60 = "……え？"
1004902-61 = "本来、問題っていうのは理解できたら簡単なもの？#nそ、それはそうだろうけど……。"
1004902-62 = "……とにかく、先生のおかげで、ざっと目を通せたし。#nこれなら試験自体は全然問題なさそう。"
1004902-63 = "全部、先生のおかげだよ。"
1004902-64 = "……手伝ってくださり、ありがとうございます。"
1004902-65 = "それで、先生はもう帰るの？毎回誰かの手助けしたらすぐ帰ってるの？"
1004902-66 = "……ん？"
1004902-67 = "最後にスイーツをもう一つ頼むの？今度は先生が買うから……？"
1004902-68 = "え……何で……"
1004902-69 = "[s7] \"今日は私も暇だから。\"\n[s8] \"私も後ろめたいのは嫌だから。\""
1004902-74 = "……先生。"
1004902-75 = "またそんな事、気軽に言って……#nいつか、勘違いする子が出て大変な事になるよ？"
1004902-76 = "……まあ、いいよ。そう言われたら、私も反論しにくいし。"
1004902-77 = "じゃあ、さっきは私が選んだから、今度は先生が好きに注文してね。#nそれでいい？"
1004902-78 = "私は特に食べ物の好き嫌いはないから、好きなもの選んでね。"
1004902-79 = "だから……何に決まっても……"
1004902-83 = "……いただきます、先生。"
1004902-85 = "（その後、カズサと一緒にスイーツと飲み物をシェアして食べ、#n　シャーレに戻った）"
