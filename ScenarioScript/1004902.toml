[translation]
1004902-1 = "Aulas de reforço e doces"
1004902-3 = "É aqui, Sensei. Foi mais rápido do que eu pensava, né?"
1004902-4 = "……Hmm, não parece estar tão ocupado quanto eu ouvi dizer, não é?"
1004902-5 = "[s1] \"Hoje sim.\"\n[s2] \"Joguei tudo para o alto por sua causa, Kazusa.\""
1004902-6 = "Entendi…… Será que eu escolhi um bom dia? Se for assim, fico feliz."
1004902-7 = "Isso é um pouco estranho, Sensei…… Por acaso você diz isso para as outras também?"
1004902-8 = "O motivo de eu ter te chamado não é nada demais, mas…… tem uma coisa que eu queria te pedir."
1004902-9 = "É isto aqui……."
1004902-13 = "[ns3] \"……Questões simuladas para a prova de recuperação?\"\n[ns4] \"A quantidade é maior do que eu pensava……?\""
1004902-14 = "Bem, é que a prova de recuperação já está chegando."
1004902-15 = "Bem, é que a prova de recuperação já está chegando."
1004902-16 = "Como é uma prova de recuperação, a dificuldade não é tão alta, mas…… tem partes em que eu travo. Por isso……."
1004902-17 = "……Eh, o quê?"
1004902-18 = "Se eu sou ruim nos estudos?"
1004902-19 = "Uau…… Você pergunta de um jeito bem direto, hein. #nDependendo da pessoa, esse jeito de falar pode magoar."
1004902-20 = "Mas bem…… é verdade, você é o Sensei, então precisa entender a situação com precisão, né."
1004902-21 = "Eu não sou nada boa nos estudos. Não chega a ser o último lugar, mas…… #nna parte de baixo? Mais ou menos uns 70 a 80%……?"
1004902-22 = "É por isso que estou pedindo ajuda assim."
1004902-23 = "……Eh?"
1004902-24 = "Não parece tanto assim? Achava que eu conseguia fazer mais do que a média?"
1004902-25 = "……Haa."
1004902-26 = "Infelizmente, errou. Desde o ensino fundamental, nunca tive afinidade com os estudos."
1004902-27 = "Mas, de qualquer forma, obrigada. #nNão sei se você está falando sério, mas pelo menos significa que não pareço uma idiota……"
1004902-28 = "Pode soar como desculpa, mas minhas notas estão subindo, viu. #nEu até que faço as revisões e preparações."
1004902-29 = "Mas…… bem, tentar recuperar o atraso de repente agora é um pouco difícil, digamos……."
1004902-33 = "……O que foi, essa cara?"
1004902-34 = "Não me olhe com esse olhar de quem vê algo digno de pena. Isso me irrita um pouco."
1004902-35 = "[s5] \"Não, eu acho que você é esforçada.\"\n[s6] \"Se as notas estão subindo, não está tudo bem?\""
1004902-36 = "……É mesmo."
1004902-37 = "……É mesmo."
1004902-38 = "Sério? Vou aceitar essas palavras com gratidão, mas……"
1004902-39 = "……Bem, deixa pra lá. Se ficarmos falando disso, vamos perder tempo."
1004902-40 = "Por enquanto, vamos começar com a aula de reforço. #nEu pago as bebidas durante a aula. Afinal, fui eu quem te chamei."
1004902-41 = "Eh? O Sensei vai pagar?…… Só porque você é o Sensei?"
1004902-42 = "Hmm……"
1004902-43 = "……Não. De jeito nenhum, eu vou pagar. Vou me sentir culpada e não vou conseguir me concentrar."
1004902-44 = "Você não vai fazer algo que tire a concentração de uma aluna, vai, Sensei?"
1004902-45 = "……Fufu. #nCerto, então está decidido. Eu pago."
1004902-46 = "Então, vou fazer o pedido. #nPor enquanto, vamos começar por esta questão……."
1004902-50 = "A próxima é esta parte……."
1004902-52 = "(Depois disso, revisei calmamente a matéria da prova de recuperação junto com a Kazusa)"
1004902-53 = "(Kazusa levou a aula a sério e, como era uma prova de recuperação, não houve grandes problemas. #n　Conseguimos avançar rapidamente)"
1004902-55 = "……Ufa."
1004902-56 = "Terminamos."
1004902-57 = "É algo…… estranho, né. #nSerá que isso é o poder do Sensei……?"
1004902-58 = "Quando eu fazia sozinha, tinha partes em que eu travava, mas…… olhando agora, todas as questões parecem muito fáceis."
1004902-59 = "Eu realmente errei isso……? #nÉ tarde demais para dizer, mas até eu mesma fiquei surpresa."
1004902-60 = "……Eh?"
1004902-61 = "Originalmente, questões são fáceis quando você entende? #nB-bem, deve ser isso, mas……."
1004902-62 = "……De qualquer forma, graças ao Sensei, consegui dar uma olhada em tudo. #nDesse jeito, a prova em si não deve ser problema nenhum."
1004902-63 = "Tudo isso é graças a você, Sensei."
1004902-64 = "……Obrigada por me ajudar."
1004902-65 = "Então, o Sensei já vai embora? Você sempre vai embora logo depois de ajudar alguém?"
1004902-66 = "……Hm?"
1004902-67 = "Quer pedir mais um doce para encerrar? Já que é o Sensei quem vai pagar desta vez...?"
1004902-68 = "Eh... Por que..."
1004902-69 = "[s7] \"Porque eu também estou livre hoje.\"\n[s8] \"Porque eu não gosto de ficar me sentindo em dívida.\""
1004902-74 = "……Sensei."
1004902-75 = "Você diz essas coisas tão casualmente...#nAlgum dia, uma aluna vai acabar entendendo errado e vai dar um problemão, sabia?"
1004902-76 = "……Bem, tudo bem. Se você diz assim, fica difícil para mim rebater."
1004902-77 = "Então, como eu escolhi da última vez, agora é a sua vez de pedir o que quiser.#nTudo bem por você?"
1004902-78 = "Eu não tenho preferências específicas com comida, então pode escolher o que quiser."
1004902-79 = "Por isso... não importa o que você decida..."
1004902-83 = "……Vou comer, Sensei."
1004902-85 = "(Depois disso, compartilhei doces e bebidas com a Kazusa e#n　voltei para o Schale)"
