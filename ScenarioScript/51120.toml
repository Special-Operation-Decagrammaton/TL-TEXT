[translation]
51120-1 = "Episódio 12; Kiryuu Kikyou e a Batalha de Sucessão (1)"
51120-3 = "(No dia seguinte)"
51120-8 = "Senseeeei! "
51120-9 = "Bom dia! Fufu!"
51120-10 = "[s] \"Bom dia, Yukari. Como você está?\""
51120-11 = "Como eu estou... diz em relação à minha saúde? Ou ao meu humor! "
51120-12 = "De qualquer forma..."
51120-13 = "Estou em perfeita forma!"
51120-14 = "Vamos! Não temos tempo a perder. Hoje é um dia muuuito importante!"
51120-15 = "Porque hoje vamos encontrar a Kikyou-senpai e pedir que seja nossa testemunha na Batalha de Sucessão...!"
51120-17 = "Sim! E quando fizermos isso, mission complete!"
51120-18 = "Será o começo da lenda de Kadenokouji Yukari~!"
51120-19 = "[s] \"Como a Kikyou é?\""
51120-20 = "Ufufu, como esperado do Sensei! #n Não deixa brechas na pesquisa prévia!"
51120-21 = "Se eu fosse descrever a Kikyou-senpai em poucas palavras... ela é uma pessoa muito racional e lógica... e, além disso, pragmática!"
51120-22 = "Se você quer saber como ela é――"
51120-26 = "Yukari. Eu já te disse antes."
51120-27 = "*G-Gulp*...!"
51120-31 = "Que é no máximo um sorvete por dia. Não me diga que esqueceu?"
51120-32 = "C-Claro que não...! Mas, Kikyou-senpai...!"
51120-33 = "Sem desculpas. #n Além do mais, comer logo antes de dormir não faz bem para a saúde."
51120-37 = "Você escovou os dentes direito?"
51120-38 = "C-C-Claro que sim!!"
51120-39 = "Eu não pensei nem por um segundo: 'Hoje estou cansada, então acho que só um enxágue basta...'――"
51120-44 = "Entendi. A partir de hoje, vou verificar se você escovou os dentes todos os dias."
51120-45 = "Eh!?!?"
51120-47 = "――Isso já aconteceu antes."
51120-48 = "Com a Kikyou-senpai sendo assim, tenho certeza que ela vai nos ajudar!"
51120-51 = "[ns] \"Ficou bem claro que você confia nela.\""
51120-52 = "Fufu."
51120-53 = "Sim!"
51120-57 = "Então! Vamos indo!!"
51120-64 = "Kikyou-senpai! Eu cheguei!"
51120-69 = "Com licença!"
51120-75 = "Sala de Mediação da Hyakkaryouran"
51120-81 = "A-Ah...? S-Sensei!?"
51120-83 = "............?"
51120-84 = "[s] \"Shizuko? O que você está fazendo aqui...?\""
51120-85 = "Yukari?"
51120-86 = "Kikyou-senpai! Quanto tempo!"
51120-87 = "Ah... sim. É, quanto tempo. Fico feliz em ver que você continua cheia de energia como sempre."
51120-88 = "O momento não é dos melhores, mas..."
51120-89 = "Será que isso é alguma brincadeira do destino?"
51120-90 = "......?"
51120-91 = "Temos uma visita antes de vocês."
51120-92 = "Visita..."
51120-94 = "[ns] \"Sobre o que vocês duas estavam conversando?\""
51120-95 = "*Ahem*, sobre isso..."
51120-96 = "Acontece que, desta vez, decidimos unir forças com todos para reviver o 'Festival das Lanternas da Hyakkiyako'...!"
51120-97 = "Ah, você já sabia...? #n Deve estar sendo difícil, mas você está torcendo por nós...?"
51120-98 = "Ehehe~."
51120-99 = "Só de ouvir o Sensei dizer isso, a Shizuko...!"
51120-103 = "......Ei, não é isso! #n Fico feliz com isso também, mas não é hora para comemorar!"
51120-104 = "De qualquer forma! No clímax do festival, #n gostaríamos de contar com a ajuda da 'Miko da família Kadenokouji'."
51120-105 = "[s] \"A Miko da família Kadenokouji...?\""
51120-107 = "......Ah."
51120-109 = "Família Kadenokouji―― Uma linhagem que por gerações tem assumido papéis importantes nos rituais e eventos realizados na Academia Combinada Hyakkiyako."
51120-110 = "Não preciso nem explicar a posição deles, não é? #n É uma família tão prestigiosa que todos na Hyakkiyako conhecem o nome."
51120-111 = "Exatamente!"
51120-112 = "De fato, no festival de 20 anos atrás, quem ficou responsável pela dança foi a família Kadenokouji."
51120-113 = "Segundo os registros, parece que a cerimônia não chegou a ser realizada há 20 anos..."
51120-114 = "Justamente neste festival, nós queríamos pedir à Miko-sama, então entramos em contato, mas..."
51120-115 = "Ainda não recebemos uma resposta... e mesmo visitando a casa dela, ela não estava..."
51120-116 = "[s] \"Ou seja, o motivo da Shizuko vir à Hyakkaryouran foi...\""
51120-117 = "Sim, porque não adiantava continuar esperando! "
51120-118 = "Ouvi dizer que a Miko-sama da família Kadenokouji estava na Hyakkaryouran, então vim até aqui!"
51120-120 = "Parece que é isso mesmo, Kadenokouji Yukari-san."
51120-121 = "Ah! Será que a pessoa ao lado do Sensei é a Kadenokouji-san!?"
51120-122 = "Que sorte! Junto com a gente do Comitê de Operações do Festival――"
51120-128 = "E-Eu..."
51120-132 = "......*Gulp*."
51120-137 = "Peço desculpas, Presidente do Comitê de Operações do Festival. #n Eu não poderei ajudá-la."
51120-138 = "......Eh!?"
51120-139 = "P-Por que não?"
51120-143 = "Eu..."
51120-144 = "Quero continuar na Hyakkaryouran."
51120-145 = "Para isso, gostaria de pedir a ajuda da Kikyou-senpai."
51120-147 = "......Como assim?"
51120-148 = "Kikyou-senpai, planejo desafiar a Nagusa-senpai para uma 'Batalha de Sucessão'."
51120-159 = "Há alguns dias―― ouvi dizer que foi emitido o 'Decreto de Dissolução'."
51120-160 = "............"
51120-161 = "Isso é verdade? #n Todos estão confusos sem saber o que fazer."
51120-165 = "......Yukari."
51120-166 = "Por isso, antes que esse boato se espalhe ainda mais!"
51120-168 = "Eu, Kadenokouji Yukari... derrotarei a Nagusa-senpai na 'Batalha de Sucessão' e resolverei esta situação!"
51120-170 = "......E foi por isso que você veio ao Clube Yin-Yang e a mim."
51120-171 = "Sim! Portanto, Kikyou-senpai, você não poderia ser a minha testemunha na Batalha de Sucessão?"
51120-172 = "Eu trarei o Comitê de Conciliação de Conflitos Hyakkaryouran de volta ao que era!"
51120-178 = "Entendo. Eu sabia que você viria correndo assim que ouvisse sobre o 'Decreto de Dissolução', mas..."
51120-179 = "......Nunca imaginei que seria sobre uma 'Batalha de Sucessão'."
51120-180 = "Até que combina com você, mas... eu realmente não esperava por isso."
51120-181 = "......Entendi o que você quer dizer."
51120-182 = "......!"
51120-183 = "Então, Kikyou-senpai...!"
51120-185 = "É, talvez eu nem precise dizer, mas――"
51120-186 = "――Eu recuso."
51120-191 = "Ah, eh? P-Por que...!?"
51120-192 = "[s] \"......Eh.\""
51120-194 = "P-Por que, Kikyou-senpai!?"
51120-195 = "A senpai, já que ainda está aqui na sala de mediação, #n com certeza... com certeza, vai concordar com a minha ideia...!"
51120-196 = "Achou que eu concordaria?"
51120-197 = "Nesse caso, eu vou falar..."
51120-202 = "Você não está sendo presunçosa demais?"
51120-203 = "......!!"
51120-205 = "Eu também ouvi sobre a Nagusa-senpai. Onde ela apareceu e como ela entrou em contato com o Clube Yin-Yang."
51120-206 = "Mas a minha resposta não muda."
51120-207 = "Aquela pessoa―― não vai voltar para a Hyakkaryouran."
51120-208 = "Não... talvez seja verdade que ela voltou uma vez."
51120-209 = "Para devolver o 'Emblema' que recebeu da Presidente Ayame."
51120-223 = "[ns] (Então era disso que a Renge estava falando)"
51120-224 = "A Nagusa-senpai... devolver... o 'Emblema'...? #n I... isso não pode ser verdade..."
51120-225 = "Porque, a Nagusa-senpai..."
51120-226 = "......A Renge provavelmente não te contou isso pensando em você."
51120-227 = "Mas eu sou diferente. Nós não devemos virar as costas para os fatos."
51120-228 = "É melhor você parar de considerar como parte da Hyakkaryouran aquela pessoa que nos abandonou."
51120-229 = "Mas..."
51120-230 = "Mesmo assim...!"
51120-231 = "Então, supondo que você realize a 'Batalha de Sucessão' como deseja――"
51120-232 = "Derrotar a Nagusa-senpai e assumir a posição de presidente. #n A ideia em si é admirável."
51120-233 = "Mas, você não está esquecendo de algo?"
51120-234 = "......!"
51120-238 = "Você acha que――"
51120-239 = "Pode vencer a Nagusa-senpai?"
51120-245 = "Aquela pessoa é forte."
51120-246 = "Muito mais do que você. "
51120-248 = "Não...!"
51120-249 = "Eu... eu... posso vencer!"
51120-250 = "Eu sou..."
51120-251 = "A elite da Hyakkaryouran... afinal...!"
51120-253 = "Sendo que você não consegue vencer nem de mim?"
51120-254 = "S-Só vamos saber se tentarmos!"
51120-258 = "Entendi... se você insiste tanto, vou provar a minha habilidade aqui e agora!"
51120-259 = "Kikyou-senpai, eu a desafio para uma batalha simulada!"
51120-261 = "――Entendido."
51120-267 = "Se você diz tanto, vou te acordar desse sonho."
51120-271 = "Pode desafiar a mim para a 'Batalha de Sucessão'."
51120-276 = "............Hã?"
51120-277 = "Não me diga que você se esqueceu."
51120-278 = "A justiça na Hyakkaryouran é decidida pela superioridade da força."
51120-279 = "Se você quer tanto que eu te reconheça, tente me subjugar."
51120-280 = "......!!"
51120-281 = "[s] \"Espera. Vocês duas, primeiro se acalmem...\""
51120-283 = "A, ah... S, Sensei..."
51120-284 = "P, por acaso eu... cheguei em uma péssima hora!?"
51120-289 = "En... entendido."
51120-294 = "Se for assim, eu, Kadenokouji Yukari... #n desafio a Kikyou-senpai para a 'Batalha de Sucessão'!"
51120-309 = "Aceito a batalha de sucessão da desafiante Kadenokouji e a declaro aqui."
51120-310 = "Nesta batalha de sucessão, que aposta não a posição de presidente, mas a de 'Estrategista', o Sensei [USERNAME] da Schale será a testemunha―― e, embora outra testemunha fosse necessária normalmente... "
51120-311 = "Considerando que é uma batalha realizada por acordo mútuo, faremos uma exceção apenas desta vez."
51120-312 = "Portanto, a membro da Hyakkaryouran Kadenokouji Yukari e Kiryuu Kikyou se considerarão testemunhas mútuas e realizarão a batalha."
51120-313 = "Alguma objeção?"
51120-320 = "Nenhuma."
51120-328 = "――Então, vamos começar."
