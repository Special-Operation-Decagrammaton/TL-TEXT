[translation]
51120-1 = "Episódio 12; Kiryu Kikyou e a Batalha de Sucessão (1)"
51120-3 = "（No dia seguinte）"
51120-8 = "Sensei!"
51120-9 = "Como vai? Fufu!"
51120-10 = "[s] \"Bom dia, Yukari. Como você está?\""
51120-11 = "Como estou, você diz... quer dizer minha saúde? Ou meu humor?!"
51120-12 = "De qualquer forma..."
51120-13 = "Estou me sentindo ótima!"
51120-14 = "Vamos lá! Não temos tempo a perder. Hoje é um dia muuuito importante!"
51120-15 = "Hoje vou encontrar a veterana Kikyou e pedir para ela ser a testemunha da Batalha de Sucessão...!"
51120-17 = "Sim! Se eu fizer isso, missão cumprida!"
51120-18 = "O início da lenda de Kadenokouji Yukari!"
51120-19 = "[s] \"Como é a Kikyou?\""
51120-20 = "Ufufu, como esperado do Sensei! Sempre tão atento e preparado com suas pesquisas!"
51120-21 = "Se eu pudesse descrever a veterana Kikyou em uma palavra... ela é uma pessoa muito racional, lógica... e, ainda assim, sensata!"
51120-22 = "Para você ter uma ideia de como ela é—"
51120-26 = "Yukari. Eu já te disse antes."
51120-27 = "G-gulp...!"
51120-31 = "Apenas um sorvete por dia. Você por acaso esqueceu?"
51120-32 = "C-claro que não...! Mas, veterana Kikyou...!"
51120-33 = "Desculpas não são necessárias. Além disso, comer logo antes de dormir não faz bem para a saúde."
51120-37 = "Você escovou os dentes direito?"
51120-38 = "C-c-claro que sim!!"
51120-39 = "Eu nem pensei em coisas como 'estou cansada hoje, acho que só enxaguar a boca basta'..."
51120-44 = "Entendi. A partir de hoje, vou verificar se você escovou os dentes todos os dias."
51120-45 = "Hã!?!?"
51120-47 = "—foi o que aconteceu."
51120-48 = "Com uma veterana como a Kikyou, tenho certeza de que ela nos emprestará sua força!"
51120-51 = "[ns] \"Dá para ver claramente que você confia muito na Kikyou, Yukari.\""
51120-52 = "Fufu."
51120-53 = "É isso mesmo!"
51120-57 = "Então! Vamos logo!!"
51120-64 = "Veterana Kikyou! Cheguei!"
51120-69 = "Com licença!"
51120-75 = "Sala de Mediação da Hyakkiyako"
51120-81 = "A-ah... Sensei!?"
51120-83 = "…………？"
51120-84 = "[s] \"Shizuko? Por que você está aqui...?\""
51120-85 = "Yukari?"
51120-86 = "Veterana Kikyou! Faz tempo que não nos vemos!"
51120-87 = "Ah... sim. É verdade, faz tempo. Fico feliz em ver que você continua cheia de energia."
51120-88 = "Embora o momento não seja dos melhores..."
51120-89 = "Será que isso é uma peça do destino?"
51120-90 = "……？"
51120-91 = "Eu tenho uma visita agora."
51120-92 = "Uma visita..."
51120-94 = "[ns] \"Sobre o que vocês estavam conversando?\""
51120-95 = "E-ehem, bem, é que..."
51120-96 = "Acontece que, desta vez, decidimos unir forças com todos para reviver o 'Festival das Lanternas de Hyakkiyako'!"
51120-97 = "Ah, você já sabia...? Parece ser um trabalho árduo, mas estou torcendo por vocês...?"
51120-98 = "Ehehe~."
51120-99 = "Só de ouvir o Sensei dizer isso, a Shizuko...!"
51120-103 = "……Quer dizer, não é isso!#nFico feliz com isso, mas agora não é hora de ficar feliz!"
51120-104 = "De qualquer forma! No clímax do festival, #nquero pedir a ajuda da \"donzela do santuário da família Kadenokouji\"."
51120-105 = "[s] \"A donzela do santuário da família Kadenokouji...?\""
51120-107 = "……Ah."
51120-109 = "A família Kadenokouji — é um clã que, por gerações, assumiu papéis importantes em rituais e eventos realizados na Academia Hyakkiyako."
51120-110 = "Não preciso nem explicar a posição deles agora.#nÉ uma família tão renomada que todos em Hyakkiyako conhecem o nome."
51120-111 = "Exatamente!"
51120-112 = "Na verdade, até no festival de vinte anos atrás, foi a família Kadenokouji que ficou responsável pela dança."
51120-113 = "Segundo os registros, parece que o ritual não foi realizado há vinte anos..."
51120-114 = "Pensei que, para o festival desta vez, eu poderia pedir à donzela do santuário, então entrei em contato, mas..."
51120-115 = "Ainda não recebi uma resposta... e quando fui à casa dela, não estava..."
51120-116 = "[s] \"Então, o motivo da Shizuko ter vindo à Hyakka Ryoran é...\""
51120-117 = "Sim, não adianta ficar esperando aqui!"
51120-118 = "Ouvi dizer que a donzela do santuário Kadenokouji estava na Hyakka Ryoran, então vim até aqui!"
51120-120 = "Parece que é isso, Yukari Kadenokouji."
51120-121 = "Ah! Por acaso a pessoa ao lado do Sensei é a Kadenokouji-san!?"
51120-122 = "Que sorte! Junto com o nosso Comitê Executivo do Festival——"
51120-128 = "E-Eu..."
51120-132 = "……Gulp."
51120-137 = "Peço perdão, presidente do Comitê Executivo do Festival.#nEu não posso oferecer minha ajuda."
51120-138 = "……Eh!?"
51120-139 = "P-Por que?"
51120-143 = "Eu..."
51120-144 = "Quero continuar sendo da Hyakka Ryoran."
51120-145 = "Para isso, preciso da ajuda da Kikyou-senpai."
51120-147 = "……O que você quer dizer?"
51120-148 = "Kikyou-senpai, pretendo desafiar a Nagusa-senpai para uma \"Batalha de Sucessão\"."
51120-159 = "Ouvi dizer que, recentemente, foi emitida uma \"Ordem de Dissolução\"."
51120-160 = "…………."
51120-161 = "Isso é verdade?#nTodos estão confusos sobre o que fazer."
51120-165 = "……Yukari."
51120-166 = "Por isso, antes que esse boato se espalhe ainda mais!"
51120-168 = "Eu, Yukari Kadenokouji... vencerei a Nagusa-senpai na \"Batalha de Sucessão\" e resolverei essa situação!"
51120-170 = "……Então foi por isso que você veio até o Yin-Yang Club e até mim, hein."
51120-171 = "Sim! Por isso, Kikyou-senpai, você poderia ser a testemunha da Batalha de Sucessão?"
51120-172 = "Eu farei com que o Comitê de Mediação de Conflitos da Hyakka Ryoran volte a ser o que era!"
51120-178 = "Entendo. Eu achei que você viria correndo assim que ouvisse sobre a \"Ordem de Dissolução\", mas..."
51120-179 = "……Quem diria que seria uma \"Batalha de Sucessão\"."
51120-180 = "É bem a sua cara, eu diria... mas, sinceramente, eu não poderia ter imaginado isso."
51120-181 = "……Entendi o que você quer dizer."
51120-182 = "……!"
51120-183 = "Então, Kikyou-senpai...!"
51120-185 = "Sim, talvez nem precise ser dito, mas——"
51120-186 = "——Eu recuso."
51120-191 = "Ah, eh? P-Por que...!?"
51120-192 = "[s] \"……Eh.\""
51120-194 = "P-Por que, Kikyou-senpai!?"
51120-195 = "Como a senpai ainda está aqui na sala de mediação, #nnaturalmente... naturalmente, eu pensei que a senpai também..."
51120-196 = "Achou mesmo que eu concordaria?"
51120-197 = "Se é assim, então deixe-me dizer uma coisa..."
51120-202 = "Você não está sendo convencida demais?"
51120-203 = "……！！"
51120-205 = "Eu também ouvi sobre o caso da Nagusa-senpai. Sei onde ela apareceu e como entrou em contato com o Yin-Yang Club."
51120-206 = "Mas a resposta continua a mesma."
51120-207 = "Ela não vai voltar para a Hyakkiyako."
51120-208 = "Não... na verdade, pode-se dizer que ela voltou uma vez."
51120-209 = "Para devolver a 'Prova' que recebeu da Presidente Ayame."
51120-223 = "[ns] (Era disso que a Renge estava falando...)"
51120-224 = "A Nagusa-senpai... devolveu a 'Prova'...?#nIsso... isso não pode ser..."
51120-225 = "Porque a Nagusa-senpai é..."
51120-226 = "...A Renge provavelmente não te contou por pensar em você."
51120-227 = "Mas eu sou diferente. Não devemos desviar o olhar da realidade."
51120-228 = "É melhor não considerar mais como parte da Hyakkiyako aquela pessoa que nos abandonou."
51120-229 = "Mas..."
51120-230 = "Mesmo assim...!"
51120-231 = "Então, supondo que você realize a 'Guerra de Sucessão' como deseja..."
51120-232 = "Derrotar a Nagusa-senpai e assumir o cargo de presidente. #nEu acho esse pensamento admirável."
51120-233 = "Mas não está esquecendo de algo?"
51120-234 = "……！"
51120-238 = "Você acha mesmo que..."
51120-239 = "Pode vencer a Nagusa-senpai?"
51120-245 = "Ela é forte."
51120-246 = "Muito mais do que você."
51120-248 = "Não...!"
51120-249 = "Eu... eu... posso vencer!"
51120-250 = "Eu sou..."
51120-251 = "Uma elite da Hyakkiyako... afinal...!"
51120-253 = "Mesmo não conseguindo vencer a mim?"
51120-254 = "Eu não saberei se não tentar!"
51120-258 = "Entendido... já que insiste tanto, provarei minha força aqui mesmo!"
51120-259 = "Kikyou-senpai, eu a desafio para uma batalha simulada!"
51120-261 = "――Entendido."
51120-267 = "Se quer tanto assim, vou te acordar desse sonho."
51120-271 = "Pode me desafiar para a 'Guerra de Sucessão'."
51120-276 = "…………Hã?"
51120-277 = "Não ouse dizer que esqueceu."
51120-278 = "A justiça da Hyakkiyako é decidida pela superioridade da força."
51120-279 = "Se quer tanto que eu reconheça, então me subjugue."
51120-280 = "……！！"
51120-281 = "[s] \"Esperem. Vocês duas, acalmem-se primeiro...\""
51120-283 = "Ah, ah... Se-Sensei..."
51120-284 = "Se-será que eu... cheguei em um momento terrível!?"
51120-289 = "En... entendido."
51120-294 = "Sendo assim, eu, Kageyama Yukari...#nDesafio a Kikyou-senpai para a 'Guerra de Sucessão'!"
51120-309 = "Eu aceito o desafio da Kageyama para a Guerra de Sucessão e declaro aqui."
51120-310 = "Esta Guerra de Sucessão, que não é pelo cargo de presidente, mas sim pelo cargo de 'Estrategista', terá o Sensei do Schale, [USERNAME], como testemunha — e, embora normalmente fosse necessária uma segunda testemunha..."
51120-311 = "Considerando que é uma luta realizada por consentimento mútuo, abriremos uma exceção desta vez."
51120-312 = "Portanto, Kageyama Yukari e Kiryu Kikyou, membros da Hyakkiyako, considerem-se testemunhas uma da outra e prossigam."
51120-313 = "Alguma objeção?"
51120-320 = "Nenhuma."
51120-328 = "— Então, vamos começar."
