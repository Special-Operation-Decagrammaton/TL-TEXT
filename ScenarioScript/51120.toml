[translation]
51120-1 = "第12話;桐生キキョウと継承戦（１）"
51120-3 = "（次の日）"
51120-8 = "せんっせーっ！ "
51120-9 = "ごきげんよう！ふふっ！"
51120-10 = "[s] \"おはよう、ユカリ。調子はどう？\""
51120-11 = "調子と言いますと……身共の健康ですか？それとも気分でしょうか！ "
51120-12 = "いずれにせよ……"
51120-13 = "身共は絶好調ですの！"
51120-14 = "さあ！こうしている場合ではありませぬ。今日はと～っても重要な日なのです！"
51120-15 = "今日はキキョウ先輩とお会いし、継承戦の証人をお願いするのですから……！"
51120-17 = "ええ！そうすれば、みっしょんこんぷりーとっ！"
51120-18 = "[ruby=かでのこうじ]勘解由小路[/ruby]ユカリ伝説の始まりですの～！"
51120-19 = "[s] \"キキョウってどんな子なの？\""
51120-20 = "うふふっ、流石は先生！#n事前にりさーちする[ruby=すき]隙[/ruby]の無さ！"
51120-21 = "キキョウ先輩を一言で表すのなら……とっても理性的で、論理的……それでいて合理的なお方ですの！"
51120-22 = "どんな感じか、と言いますと――"
51120-26 = "ユカリ。前にも言ったよね。"
51120-27 = "ご、ごくり……！"
51120-31 = "アイスは1日に1つまでって。まさか忘れたの？"
51120-32 = "もっ、もちろんです……！しかしキキョウ先輩……！"
51120-33 = "言い訳はいらない。#nそもそも、寝る直前に食べるのは身体に良くないでしょ。"
51120-37 = "ちゃんと、歯磨きしてる？"
51120-38 = "ももも、もちろんですの！！"
51120-39 = "今日は疲れてるから、うがいだけでもいいかしら……なんて全然思って――"
51120-44 = "そっか。今日から毎日、歯磨きチェックするから。"
51120-45 = "へぇっ！？！？"
51120-47 = "――ということがありましたの。"
51120-48 = "そんなキキョウ先輩なら、きっとお力を貸してくださるはず！"
51120-51 = "[ns] \"ユカリがキキョウを信頼しているのはよく伝わったよ。\""
51120-52 = "ふふっ。"
51120-53 = "そうなのです！"
51120-57 = "では！さっそく参りましょう！！"
51120-64 = "キキョウ先輩！身共、参りましたわ！"
51120-69 = "お邪魔いたします！"
51120-75 = "百花繚乱調停室"
51120-81 = "あ、あれっ……？せ、先生！？"
51120-83 = "…………？"
51120-84 = "[s] \"シズコ？どうしてここに……？\""
51120-85 = "ユカリ？"
51120-86 = "キキョウ先輩！ご無沙汰しておりますの！"
51120-87 = "ああ……うん。そうだね、久しぶり。相変わらず元気そうでなにより。"
51120-88 = "タイミングはあんまり良くないけど……"
51120-89 = "ひょっとして、運命のイタズラなのかな。"
51120-90 = "……？"
51120-91 = "今日は先客が居てね。"
51120-92 = "先客……"
51120-94 = "[ns] \"二人は何の話をしてたの？\""
51120-95 = "こほんっ、それはですね……"
51120-96 = "なんとこの度、皆さんと力を合わせて「百鬼夜行燈籠祭」を復活させることになりまして……！"
51120-97 = "あっ、すでにご存じでしたか……？#n大変そうだけど、応援してる……？"
51120-98 = "えへへ～っ。"
51120-99 = "先生がそう言ってくださるだけで、シズコは……！"
51120-103 = "……って、そうじゃなくて！#nそれはそれで嬉しいですが、今は喜んでいる場合じゃ！"
51120-104 = "ともかく！お祭りのクライマックスで、#n「[ruby=かでのこうじ]勘解由小路[/ruby]家の巫女様」のお力を借りたいと思ってるんです。"
51120-105 = "[s] \"勘解由小路家の巫女様……？\""
51120-107 = "……あ。"
51120-109 = "勘解由小路家――それは代々、百鬼夜行連合学院で行われる祭儀や行事など重要な役目を担ってきた一族。"
51120-110 = "その立場は、いまさら説明するまでもないかな。#n百鬼夜行の誰もが、その名を知っているほどの名家だよ。"
51120-111 = "その通り！"
51120-112 = "実際に二十年前のお祭りでも、舞を担当したのが勘解由小路家だったのです。"
51120-113 = "記録によれば、二十年前は祭儀が行なわれずじまいだったようで……"
51120-114 = "今回のお祭りこそ、巫女さまにお願いできればと思い、連絡したのですが……"
51120-115 = "まだお返事をいただけてなくて……ご自宅に伺ってもご不在で……。"
51120-116 = "[s] \"つまり、シズコが百花繚乱にきた理由は……\""
51120-117 = "はい、このまま待っていても仕方ないので！ "
51120-118 = "百花繚乱に勘解由小路の巫女様が居ると聞いて、こちらに伺ったんです！"
51120-120 = "そういうことみたいだよ、[ruby=・   ・   ・   ・   ・]勘解由小路[/ruby]ユカリさん。"
51120-121 = "あっ！もしや先生の隣の方が勘解由小路さんなんですか！？"
51120-122 = "ちょうど良かった！私たちお祭り運営委員会と一緒に――"
51120-128 = "み、身共は……"
51120-132 = "……ごくっ。"
51120-137 = "申し訳ございません、お祭り運営委員会の委員長殿。#n身共はお力添えできませぬ。"
51120-138 = "……ええっ！？"
51120-139 = "ど、どうしてですか？"
51120-143 = "身共は……"
51120-144 = "百花繚乱でありたいのです。"
51120-145 = "そのために、キキョウ先輩にお力添えいただきたいのです。"
51120-147 = "……どういうこと？"
51120-148 = "キキョウ先輩、身共はナグサ先輩に「継承戦」を申し込む予定ですの。"
51120-159 = "つい先日――「解散令」を出されたと耳にしました。"
51120-160 = "…………。"
51120-161 = "あれは本当なのでしょうか？#n皆様、どうすれば良いのかと混乱しております。"
51120-165 = "……ユカリ。"
51120-166 = "ですので、これ以上その噂が広がる前に！"
51120-168 = "この勘解由小路ユカリが……「継承戦」でナグサ先輩に勝利し、この事態を収めてみせますの！"
51120-170 = "……それで陰陽部や私の元に、か。"
51120-171 = "ええ！ですのでキキョウ先輩、継承戦の証人になっていただけないでしょうか？"
51120-172 = "身共が、百花繚乱紛争調停委員会を元に戻してみせますの！"
51120-178 = "なるほどね。「解散令」を耳にしたら、すぐに飛んでくると思ってたけど……"
51120-179 = "……まさか「継承戦」とは。"
51120-180 = "あんたらしいと言えばあんたらしいけど……流石にそれは想像できなかったな。"
51120-181 = "……言いたいことは分かったよ。"
51120-182 = "……！"
51120-183 = "それでは、キキョウ先輩……！"
51120-185 = "うん、言葉にするまでもないかもしれないけど――"
51120-186 = "――断る。"
51120-191 = "あっ、えっ？ど、どうして……！？"
51120-192 = "[s] \"……えっ。\""
51120-194 = "な、何故ですかキキョウ先輩！？"
51120-195 = "先輩は、今もこうして調停室に居るくらいですから、#n当然……当然、身共の考えにも……！"
51120-196 = "同意すると思ったの？"
51120-197 = "それなら言わせてもらうけど……"
51120-202 = "あんた、[ruby=うぬぼ]自惚[/ruby]れすぎじゃない？"
51120-203 = "……！！"
51120-205 = "私もナグサ先輩の件は聞いてる。あの人がどこで姿を現したか、どういう経緯で陰陽部と接触したのかも。"
51120-206 = "でも、答えは変わらないよ。"
51120-207 = "あの人は――百花繚乱に帰ってこない。"
51120-208 = "いや……たしかに一度、帰ってきたといえばそうかもしれないね。"
51120-209 = "アヤメ委員長から受け取った「証」を――返却するために。"
51120-223 = "[ns] （レンゲが言ってたのは、この事だったんだ）"
51120-224 = "ナグサ先輩が……「証」を、返却……？#nそ……そんなはずは……"
51120-225 = "だって、ナグサ先輩は……"
51120-226 = "……レンゲは、あんたのことを思って話さなかったんだろうね。"
51120-227 = "けど私は違う。事実から目を背けるべきではないもの。"
51120-228 = "私たちを見捨てたあの人を、もう百花繚乱だと思わない方がいい。"
51120-229 = "ですが……"
51120-230 = "それでも……！"
51120-231 = "なら、仮にあんたが望む通り「継承戦」を行うとして――"
51120-232 = "ナグサ先輩を倒して、委員長の座を引き継ぐ。#nその考え自体は立派だと思うよ。"
51120-233 = "ただ、何か忘れてるんじゃないの？"
51120-234 = "……！"
51120-238 = "あんたが――"
51120-239 = "ナグサ先輩に勝てるとでも？"
51120-245 = "あの人は強いよ。"
51120-246 = "あんたよりも、ずっと。 "
51120-248 = "いいえ……！"
51120-249 = "身共は……身共は……勝てますわ！"
51120-250 = "身共は……"
51120-251 = "百花繚乱の、えりーと……ですから……！"
51120-253 = "私にも勝てないのに？"
51120-254 = "や、やってみなければ分かりませんの！"
51120-258 = "分かりました……そこまで仰るのであれば、ここで身共の実力を証明してみせましょう！"
51120-259 = "キキョウ先輩、あなたに模擬戦を申し込みます！"
51120-261 = "――分かった。"
51120-267 = "そんなに言うなら、あんたを夢から覚まさせてあげる。"
51120-271 = "私に「継承戦」を申し込めばいい。"
51120-276 = "…………え？"
51120-277 = "忘れたなんて言わせないよ。"
51120-278 = "百花繚乱の正義は、力の優劣で決まる。"
51120-279 = "どうしても認めさせたいのなら、私をねじ伏せるといい。"
51120-280 = "……！！"
51120-281 = "[s] \"待って。二人とも、まずは落ち着いて……\""
51120-283 = "あ、あうっ……せ、先生……"
51120-284 = "も、もしかして私……とんでもないタイミングで来ちゃったんでしょうか！？"
51120-289 = "わ……分かり、ましたわ。"
51120-294 = "であれば、この勘解由小路ユカリ……#nキキョウ先輩に「継承戦」を申し込みます！"
51120-309 = "挑戦者、勘解由小路の継承戦を受諾し、ここに宣言する。"
51120-310 = "委員長の座ではなく「作戦参謀」の座を賭けたこの継承戦は、シャーレの[USERNAME]先生を立会い人とし――また、本来であればもう一人証人が必要であるが…… "
51120-311 = "お互いの合意のもと行なわれる戦いであることを考慮し、今回のみ特例とする。"
51120-312 = "よって、百花繚乱のメンバーである勘解由小路ユカリ、そして桐生キキョウ。互いを証人とみなし実施する。"
51120-313 = "異論は？"
51120-320 = "ございませんわ。"
51120-328 = "――じゃあ、始めよう。"
