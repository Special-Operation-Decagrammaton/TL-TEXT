[translation]
1006502-1 = "百鬼夜行の広報担当、カホさん"
1006502-2 = "（カホの連絡から、およそ30分後……）"
1006502-6 = "先生、失礼します。"
1006502-7 = "[s] \"どうぞ、開いてるよ。\""
1006502-14 = "お忙しいところありがとうございます、[USERNAME]先生。"
1006502-15 = "[s] \"大丈夫だよ、それにしても早かったね。\""
1006502-16 = "当日のご連絡になってしまい、申し訳ありません。"
1006502-17 = "事前に予定をお伺いするべきでしたが……"
1006502-18 = "「例の件」に関しましては、早めに進めさせていただければと思いまして。"
1006502-19 = "[s] \"ごめん、その話なんだけど……。\""
1006502-23 = "[ns] \"「例の件」というのが、よく分からなくて……。\""
1006502-24 = "なるほど。"
1006502-25 = "書面でご理解いただくのは無理があると、十分に承知しております。"
1006502-26 = "突然の話でしたし、戸惑うのも無理はありません。"
1006502-27 = "[s] \"そ、そうだよね……？\""
1006502-28 = "それ故、こうしてお時間を……"
1006502-29 = "……いえ、チャンスを頂けないでしょうか？"
1006502-30 = "私が全力でご説明させていただきます。"
1006502-31 = "元々、今日はそのために来たのですから。"
1006502-32 = "[s1] \"う、うん。お願いしようかな？\"\n[s2] \"むしろ、詳しく聞きたかったところだよ。\""
1006502-35 = "ありがとうございます。"
1006502-36 = "それでは、先生のお許しを得たところで……"
1006502-40 = "私、[ruby=くわかみ]桑上[/ruby]カホが百鬼夜行観光文化産業広報支援部の戦略リーダーとして――"
1006502-41 = "ただいまより、シャーレと百鬼夜行連合学院による合同の観光産業推進計画に関して、プレゼンを始めさせていただきます！"
1006502-42 = "[s] \"……？\""
1006502-46 = "まずは、こちらの資料をご覧ください。"
1006502-50 = "このグラフは、百鬼夜行連合学院の観光売上高を四半期毎にまとめたものです。"
1006502-54 = "我々、百鬼夜行連合学院の年間売上高は3年連続で上昇し、#nおよそ150%の成長率を見せております。"
1006502-55 = "この綺麗な右肩上がりの成長率は、キヴォトス全域でも中々お目にかかれない非常に素晴らしい成果と言えましょう。"
1006502-56 = "[s] \"……？\""
1006502-57 = "ですが、いつまでこの成長率を維持できるのか……"
1006502-58 = "疑問に思って当然です。"
1006502-59 = "どれほど素晴らしいものであれ、いつまでも勢いを保つのは難しいでしょう。"
1006502-60 = "成熟したところで、そのまま衰退の一途を辿ってきた事例がいくつもあることは、我々百鬼夜行も重々承知しております。"
1006502-61 = "[s] \"う、うん？\""
1006502-62 = "しかし、我々百鬼夜行連合学院の観光産業は差別化が進んでおり――"
1006502-63 = "市場分析を重ねたところ、すでにブランドイメージの確立に成功したと言っても過言ではありません……！"
1006502-78 = "（急に始まったカホの熱いプレゼンは……）"
1006502-79 = "（難しい言葉が多くて、よく理解できなかった）"
1006502-80 = "（状況が飲み込めないまま、終わりに近づき……）"
1006502-85 = "……つきましては、我々百鬼夜行を信じてお力添えいただきたく思いまして。"
1006502-86 = "シャーレと業務提携を結びますと、さらなる成長が見込めるのは間違いなく……"
1006502-87 = "キヴォトスの文化をリードすることさえ可能だと、[ruby=くわかみ]桑上[/ruby]カホは断言します！"
1006502-88 = "以上です、ご清聴ありがとうございました。"
1006502-97 = "ふう……。"
1006502-98 = "それでは先生、何かご質問はありますか？"
1006502-102 = "[ns] \"えっと、ごめんね……？\""
1006502-104 = "[ns] \"何の話をしてるのか、よく分からなくて……。\""
1006502-105 = "…………。"
1006502-106 = "くっ……！"
1006502-107 = "[s] \"ごっ、ごめん！言葉が足りなかったよね！？\""
1006502-108 = "いいえ、そんなことは。#nただ、噂通りシャーレの先生は手強い方だなと……"
1006502-109 = "改めて思い知りました。"
1006502-110 = "十分なデータを揃えてプレゼンに臨みましたが、それでもなお一歩引いた視点から物事を冷静に見極める判断力。"
1006502-111 = "……見かけの数字では足りませんでしたか。"
1006502-112 = "大切なのは、気持ちだと……"
1006502-113 = "心からの「信頼」を証明せよ、ということですね。"
1006502-114 = "[s] \"……？\""
1006502-115 = "……分かりました。"
1006502-116 = "「信頼」の証明とは、そう簡単に出来ることではないでしょう。"
1006502-117 = "しかし、この[ruby=くわかみ]桑上[/ruby]カホ。#n決して簡単に諦めはしません。"
1006502-121 = "[USERNAME]先生さえ、よろしければ……！"
1006502-122 = "……ふ、不束者ですが……私は[USERNAME]先生の……"
1006502-123 = "せ、専属当番として……シャーレと百鬼夜行連合学院の行く末を願い……"
1006502-124 = "私の命がある限り……"
1006502-125 = "この身を捧げることを……"
1006502-126 = "ち、ち、ちか……誓い――"
1006502-128 = "[ns] \"勘違いしてるみたいだけど誤解だから！\""
1006502-130 = "……は、はいっ？"
1006502-131 = "私の勘違いですか……？"
1006502-132 = "でしたら……"
1006502-133 = "[s] \"そもそも「例の件」って何！？\""
1006502-134 = "…………え？"
1006502-136 = "（お互いの認識をすり合わせた結果……）"
1006502-140 = "もももももももも…………"
1006502-141 = "申し訳ございませんでした！！"
1006502-142 = "ま、まさか、先週お送りしたはずだった、業務提携の相談に関するメールが……"
1006502-143 = "下書きのまま残っていたなんて……！"
1006502-144 = "[s] \"途中からそんな気がしてたよ……。\""
1006502-145 = "お忙しいところ、訳の分からない話を一方的に……。"
1006502-146 = "あ、改めて申し訳ございません！全て私の落ち度です！"
1006502-147 = "事前にお伝え出来てさえいれば、今頃……"
1006502-148 = "[s] \"いや、それに関しては……\""
1006502-152 = "[ns] \"申し訳ないけど、シャーレの立場的に難しいかな。\""
1006502-153 = "シャーレは今回のような業務提携には応じられないのですか……？"
1006502-154 = "……シャーレはあくまでも生徒たちの悩みを聞いて、サポートするための連邦捜査部であって……"
1006502-155 = "……経済活動を目的にしているわけではない、と。"
1006502-156 = "……ま、まさか私は…… "
1006502-157 = "……最初から勘違いしていたのですか……？"
1006502-158 = "[s] \"うん、ごめんね……。\""
1006502-159 = "あ……あぅ……。"
1006502-160 = "なる、ほど……。"
1006502-161 = "私は百鬼夜行の文化を広めたい一心で……#nこれまで私たち百鬼夜行の生徒たちを助けていただいたシャーレの先生となら……"
1006502-162 = "きっと良い結果を導き出せるのではないか、と思っておりましたが……"
1006502-163 = "何もかも、私の勘違い……だったのですね……。"
1006502-164 = "一人で暴走した挙げ句、先生を困らせてしまい……"
1006502-165 = "失望しましたよね……申し訳ございません。"
1006502-166 = "[s] \"いや、失望だなんて全然。\""
1006502-167 = "……はい？"
1006502-168 = "[s] \"それだけ百鬼夜行の文化を広めたかったんだよね？\""
1006502-174 = "（直接シャーレに訪れて、データを用いながらプレゼンを行うほど、カホには百鬼夜行を広めたいという思いがあった）"
1006502-175 = "（それは単に、広報担当だからではなく……）"
1006502-176 = "（自分の大好きな文化を愛する純粋な気持ちがあってのこと）"
1006502-181 = "[ns] （最後は半ば暴走するほど……）"
1006502-185 = "[ns] \"カホが頑張ってるのに、ガッカリするわけないよ。\""
1006502-189 = "……そう、ですか……。"
1006502-190 = "先生は……こんな私の気持ちにまで寄り添ってくださると。"
1006502-191 = "……はい。"
1006502-192 = "ありがとうございます、先生。"
1006502-193 = "シャーレがどんな組織なのか、私が何を勘違いしていたのか、おかげ様でよく分かりました。"
1006502-194 = "業務提携のお話は、ここまでにしておきましょう。"
1006502-195 = "[s] \"ありがとう、他に相談があれば聞かせてね。\""
1006502-196 = "代わりにですが……"
1006502-197 = "[s] \"代わりに……？\""
1006502-201 = "シャーレと百鬼夜行連合学院の友好関係を築くために……"
1006502-202 = "お仕事とは関係なく、楽しめる催しを思いついたのですが……"
1006502-203 = "少しお時間を頂けないでしょうか？"
1006502-204 = "[s] \"そういう話なら喜んで！\""
1006502-205 = "ふふっ、ありがとうございます。"
1006502-207 = "では、次のプレゼンを始めさせていただきます。"
1006502-209 = "（その後、カホとイベントの内容について熱く話し合った）"
