[translation]
10001085-1 = "Episódio 8: A Terceira Vitória"
10001085-2 = "Academia Red Winter - Rua Central"
10001085-3 = "Eu... eu realmente achei que meu braço ia quebrar..."
10001085-4 = "Presidente Cherino! Você está bem?"
10001085-5 = "Tomoe, camarada! Foi assustador...! Uaaaaa!"
10001085-7 = "Droga, era uma ótima chance de eliminar a presidente..."
10001085-8 = "Não interfira, Sensei! Por mais que você seja o Sensei, se atrapalhar nossa revolução, não teremos piedade!"
10001085-9 = "Por favor, esperem, pessoal do Departamento de Obras. Nós não temos a intenção de lutar contra vocês."
10001085-10 = "Para conquistarmos nossos direitos como trabalhadoras, agora não é hora de lutarmos entre nós, mas sim de unir forças!"
10001085-11 = "Além disso, afinal de contas, o que exatamente na Presidente Cherino atrapalha a revolução de vocês?"
10001085-12 = "É claro que a Presidente Cherino não trabalha, só come pudim e tira sonecas, sendo uma presidente inútil, mas..."
10001085-13 = "Mesmo sendo uma presidente ditadora que sai expurgando todo mundo só porque as coisas não saem como ela quer!"
10001085-14 = "Espere, Chefe de Gabinete Tomoe. Você me via desse jeito esse tempo todo?"
10001085-16 = "Hum, os erros dos subordinados são responsabilidade dos superiores! #nPortanto, toda a responsabilidade pelo que acontece na Academia Red Winter recai sobre a representante, a Presidente Cherino!"
10001085-17 = "O atraso na restauração do prédio antigo, a falta de distribuição adequada de pudim, o fato de estar tão frio hoje — tudo é culpa da Presidente Cherino!"
10001085-18 = "E enquanto ela for a presidente do conselho estudantil, a Presidente Cherino receberá todas as críticas possíveis e nunca será perdoada!"
10001085-19 = "Que absurdo! Com essa lógica, não importa quem seja o presidente, ninguém escaparia das críticas!"
10001085-20 = "Com certeza! Criticar quem está no poder é a base da luta!"
10001085-21 = "Até o dia em que, após a luta, a existência de um presidente do conselho estudantil desapareça e a verdadeira igualdade se concretize... nossa luta não vai parar!"
10001085-22 = "Nossa, que revolucionárias agressivas..."
10001085-23 = "[s] \"Mas, afinal, a Cherino não é a presidente do conselho estudantil agora?\""
10001085-24 = "...O quê? Se a Presidente Cherino não é a presidente, então quem é agora?"
10001085-25 = "É humilhante, mas... quem detém o poder como presidente na secretaria da Red Winter agora não sou eu, é a Comissária Marina."
10001085-26 = "Por causa do golpe de estado da Comissária Marina, eu fui destituída do cargo de presidente... e agora estou fugindo!"
10001085-27 = "Cherino-chan, não é algo para se falar com tanto orgulho."
10001085-28 = "Ora. Então quem detém o poder agora é a Comissária Marina, e a Presidente Cherino não passa de uma tampinha..."
10001085-29 = "O quê, tampinha!? Você me chamou de tampinha agora!?"
10001085-30 = "Certo, pessoal. Mudança de alvo!"
10001085-31 = "Nosso novo inimigo não é uma tampinha insignificante como a Presidente Cherino, mas sim a nova detentora do poder na secretaria, a Comissária Marina!"
10001085-32 = "Você me chamou de tampinha de novo! E ainda disse \"tampinha insignificante\"!"
10001085-33 = "Vocês não ouvem a voz da grande Cherino?! Pessoal, expurgo, expurgo!"
10001085-34 = "Certo, pelos nossos direitos e liberdade como trabalhadoras, e também... bem... por várias outras coisas importantes,"
10001085-35 = "vamos atacar a secretaria!"
10001085-38 = "Uoooooh!"
10001085-40 = "F-fomos completamente ignoradas..."
10001085-41 = "Como dizem os rumores, as alunas do Departamento de Obras são problemáticas como inimigas, mas são aliadas muito confiáveis!"
10001085-42 = "Vamos, Presidente Cherino. Vamos segui-las até a secretaria!"
10001085-44 = "E-esperem! Esperem por mim, pessoal! A líder sou eu! #nNão me deixem para trás e vão na frente!"
