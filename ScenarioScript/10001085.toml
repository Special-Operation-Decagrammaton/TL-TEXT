[translation]
10001085-1 = "第8話;三回目の勝利"
10001085-2 = "レッドウィンター連邦学園・中央通り"
10001085-3 = "ほ、本当に、腕が折れるかと思った……。"
10001085-4 = "チェリノ会長！大丈夫ですか？"
10001085-5 = "トモエ、カムラッド！怖かった……！うわああん！"
10001085-7 = "くっ、会長を排除できるいいチャンスだったのに……。"
10001085-8 = "邪魔をするな、先生！いくら先生とはいえ、あたしたちの革命を邪魔するならば容赦はしない！"
10001085-9 = "待ってください、工務部のみなさん。私たちはみなさんと戦うつもりはありません。"
10001085-10 = "労働者としての権利を得るためにも、今は同じ仲間同士で戦うのではなく、力を合わせるべきです！"
10001085-11 = "そもそも一体全体、チェリノ会長のどういったところが、みなさんの革命に邪魔になるというのですか？"
10001085-12 = "もちろんチェリノ会長は労働もしないですし、おやつばかり食べながら、お昼寝だけをする使えない会長ではありますが……。"
10001085-13 = "ことが自分の思う通りに進まないからと言って、むやみやたらに粛清を乱発する、独裁的な会長ではありますが！"
10001085-14 = "待て、トモエ秘書室長。お前、今までおいらをそんな目で見ていたのか？"
10001085-16 = "ふん、下のミスは上が責任を負うもの！#nよって、このレッドウィンター連邦学園で起きる全ての責任は、代表であるチェリノ会長にあるのだ！"
10001085-17 = "旧校舎の復旧が遅れているのも、プリンがきちんと配給されないのも、今日がこんなに寒いのも――すべてチェリノ会長のせいだ！"
10001085-18 = "そして生徒会長である限り、チェリノ会長はありとあらゆる全ての非難を受け、永久に許されることはない！"
10001085-19 = "そんな無茶な！その論理だと、誰が会長であっても非難を免れないではないか！"
10001085-20 = "もちろんだ！権力者への非難は闘争の基本！"
10001085-21 = "闘争の末に、生徒会長という存在が無くなり、真の平等が結実するその日まで……あたしたちの闘争は止まらない！"
10001085-22 = "ぐっ、なんという乱暴な革命家だ……。"
10001085-23 = "[s] \"でも、そもそもチェリノは今、生徒会長じゃないよ？\""
10001085-24 = "……なに？チェリノ会長が会長じゃなかったら、今は一体誰が？"
10001085-25 = "悔しいが……今レッドウィンター事務局で会長としての権力を持っているのは、おいらではなく、マリナ委員長だ。"
10001085-26 = "マリナ委員長がクーデターを起こしたせいで、おいらは会長の座から失脚し……今は逃げている最中だからな！"
10001085-27 = "チェリノちゃん、そんなに自慢げに話すことではありませんよ。"
10001085-28 = "なんと。では、今権力を握ってるのはマリナ委員長で、チェリノ会長は単なるチビにすぎないということか……。"
10001085-29 = "なっ、チビ！？今チビって言ったな！？"
10001085-30 = "よし、みんな。目標を変更だ！"
10001085-31 = "あたしたちの新たな敵は、チェリノ会長のような大したことないチビではなく、事務局の新たな権力者であるマリナ委員長だ！"
10001085-32 = "またチビって言ったな！しかも今度は「大したことないチビ」って！"
10001085-33 = "この偉大なチェリノ様の声が聞こえないのか！みんな粛清だ、粛清！"
10001085-34 = "よし、あたしたち労働者の権利と自由、そして……えっと……他にも色々と大事なことのため、"
10001085-35 = "事務局に突撃だっ！"
10001085-38 = "うおおお！"
10001085-40 = "か、完全に無視された……。"
10001085-41 = "やはり噂通り、工務部の生徒たちは敵に回すと厄介ですが、味方になると心強いですね！"
10001085-42 = "さあ、チェリノ会長。私たちも続いて事務局に向かいましょう！"
10001085-44 = "ま、待て！みんな待つのだ！トップはおいらなのだ！#nおいらを置いて先に行くな！"
