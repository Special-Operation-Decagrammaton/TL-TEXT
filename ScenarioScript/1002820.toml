[translation]
1002820-1 = "しっぽ大騒動"
1002820-2 = "（どこで待っているのかも連絡が来ないまま、#n　とりあえずアスナを探してミレニアムへと来ていた）"
1002820-3 = "あ、ご主人様ー！こっちこっち！！"
1002820-4 = "（到着するや否やアスナを発見したものの、#n　彼女はその服装のせいか、周囲から視線を一身に集めていた）"
1002820-5 = "もー、待ちくたびれちゃったよー！"
1002820-6 = "でもご主人様が会いに来てくれて、アスナすっごく嬉しい！！"
1002820-7 = "……ん？"
1002820-8 = "理由？"
1002820-9 = "えーっとねー……"
1002820-10 = "……忘れちゃった！何で呼んだんだっけ？別に大事なことじゃなかったかも。"
1002820-11 = "[s1] \"まあ、何かマズい状態とかじゃなくて良かったけど……。\"\n[s2] \"いつものアスナだ。\""
1002820-12 = "あははっ、そうかなー？"
1002820-13 = "あははっ、そうかなー？"
1002820-14 = "……え、この格好？"
1002820-15 = "特に理由があったわけじゃないけど、何となく着たいなーって思って着てみたの。"
1002820-16 = "着ちゃダメなもの、ってわけじゃないでしょ？だから着てみた！"
1002820-17 = "……しっぽ？あ、これ？手榴弾……？"
1002820-18 = "あ、確かにそういうこともあったなー。#nこれが手榴弾だったら、みんなビックリしちゃうね？"
1002820-19 = "……今？"
1002820-23 = "……ご主人様は、どっちだと思う？"
1002820-24 = "手榴弾か、そうじゃないか……何なら今ここで、確かめてみる？"
1002820-29 = "……なんて！"
1002820-30 = "あははは、ご主人様すごい顔してる！可愛い！#nどっちかなー、どっちだと思う～？"
1002820-31 = "あ、鬼ごっこでご主人様が勝ったら教えてあげよっか？"
1002820-32 = "じゃあ、アスナが逃げる方ね！スタート！！"
1002820-37 = "（その勝負、勝って何かメリットがあるだろうかと思いつつ……#n　さっきまでアスナがいたところに、ピンが落ちていることに気が付いた）"
1002820-41 = "[ns] \"……。\""
1002820-43 = "[ns3] \"マズい！？！？\"\n[ns4] \"アスナ！ストップ！！\""
1002820-47 = "あははは！ご主人様遅いよ～？"
1002820-52 = "（必死にアスナを追いかけたものの……）"
1002820-54 = "（途中で思いっきり転んでしまい、#n　それを見かねたのかアスナが戻ってきてくれた）"
1002820-55 = "ご主人様何してるの？もう疲れちゃった？鬼ごっこ終わり？"
1002820-56 = "……？どうしたの、ご主人様？"
1002820-57 = "……え？"
1002820-58 = "手榴弾……？"
1002820-59 = "手榴弾なんて、今は持ってないよ？"
1002820-60 = "……ご主人様、何だかすごい顔してるね？"
1002820-61 = "このしっぽ、ただのしっぽだけど？"
1002820-62 = "[s5] \"手榴弾じゃ、ない……？\"\n[s6] \"でも確かにさっき、手榴弾のピンが……。\""
1002820-63 = "ピン……？"
1002820-64 = "ピン……？"
1002820-65 = "……あ、それ私のキーホルダーのだ。"
1002820-66 = "ご主人様もしかして、これを手榴弾のだと思って……？"
1002820-70 = "……あはっ。"
1002820-71 = "あはははっ！それが原因ですっごい顔してたの？"
1002820-72 = "うん、大丈夫だよー、本当に手榴弾じゃないから。#nそもそも手榴弾だったら普通すぐ爆発するでしょ？"
1002820-73 = "それにほら、アスナはご主人様に嘘ついたことないし！"
1002820-74 = "そんなに心配？ちゃんと確認しておかないと気になる？"
1002820-75 = "あはっ、どうしよっかなー。"
1002820-76 = "うーん、でもなー、ウサギさんのしっぽだしな～？"
1002820-77 = "……うん、決めた！"
1002820-78 = "やっぱりアスナのご主人様だし、触らせてあげる！"
1002820-85 = "ほらご主人様、どうぞ！アスナのしっぽだよ？ご主人様だけが触って良いんだよ？"
1002820-86 = "あはは、どうしてそんなに照れるの～？"
1002820-87 = "[s7] \"わ、分かったから、もう大丈夫……。\"\n[s8] 安堵の息と共に、倒れる。"
1002820-93 = "……あれ、ご主人様？"
1002820-94 = "寝ちゃったの？"
1002820-95 = "もう疲れちゃった？"
1002820-99 = "……よし！"
1002820-100 = "じゃあ私もここで寝よーっと！！"
1002820-105 = "（目を覚ますとなぜか、#n　ミレニアムの敷地のど真ん中でアスナと並んで寝ていることに気が付いた）"
1002820-109 = "（周囲の尋常ではない視線を感じ、#n　アスナを連れてその場を離脱したのだった……）"
