[translation]
1002820-1 = "A confusão da cauda"
1002820-2 = "（Sem receber nenhuma mensagem sobre onde ela estava esperando, #n　vim até o Millennium para procurar a Asuna por enquanto）"
1002820-3 = "Ah, Mestre! Por aqui, por aqui!!"
1002820-4 = "（Assim que cheguei, encontrei a Asuna, mas #n　talvez por causa daquela roupa, ela estava atraindo todos os olhares ao redor）"
1002820-5 = "Poxa, eu já estava cansada de esperar!"
1002820-6 = "Mas a Asuna está muito feliz que o Mestre veio me ver!!"
1002820-7 = "……Hm?"
1002820-8 = "O motivo?"
1002820-9 = "Bem, é que……"
1002820-10 = "……Eu esqueci! Por que foi mesmo que eu te chamei? Acho que não era nada importante."
1002820-11 = "[s1] \"Bem, pelo menos não é uma situação ruim...\"\n[s2] \"É a Asuna de sempre.\""
1002820-12 = "Ahaha, será?"
1002820-13 = "Ahaha, será?"
1002820-14 = "……Eh, esse visual?"
1002820-15 = "Não teve um motivo especial, só senti vontade de usar e vesti."
1002820-16 = "Não é como se fosse proibido usar, né? Então eu vesti!"
1002820-17 = "……A cauda? Ah, isso aqui? Uma granada……?"
1002820-18 = "Ah, é verdade, já aconteceu algo assim antes. #nSe isso fosse uma granada, todo mundo ia levar um susto, né?"
1002820-19 = "……Agora?"
1002820-23 = "……O que você acha, Mestre?"
1002820-24 = "Se é uma granada ou não…… quer verificar aqui mesmo agora?"
1002820-29 = "……Brincadeira!"
1002820-30 = "Ahahaha, Mestre, que cara engraçada você fez! Que fofo! #nQual será, o que você acha~?"
1002820-31 = "Ah, se você ganhar de mim no pega-pega, eu te conto, quer?"
1002820-32 = "Então, eu vou fugir! Começando agora!!"
1002820-37 = "（Enquanto pensava se haveria alguma vantagem em ganhar essa disputa…… #n　notei que um pino tinha caído exatamente onde a Asuna estava antes）"
1002820-41 = "[ns] \"…….\""
1002820-43 = "[ns3] \"Ferrou!?!?!\"\n[ns4] \"Asuna! Para!!\""
1002820-47 = "Ahahaha! Mestre, você é muito lento~!"
1002820-52 = "（Embora eu tenha corrido desesperadamente atrás da Asuna……）"
1002820-54 = "（Acabei tropeçando feio no caminho, #n　e talvez por ter visto isso, a Asuna voltou para me buscar）"
1002820-55 = "Mestre, o que está fazendo? Já cansou? O pega-pega acabou?"
1002820-56 = "……? O que houve, Mestre?"
1002820-57 = "……Eh?"
1002820-58 = "Granada……?"
1002820-59 = "Eu não estou carregando nenhuma granada agora, sabia?"
1002820-60 = "……Mestre, você está com uma cara muito estranha, sabia?"
1002820-61 = "Essa cauda é só uma cauda, sabe?"
1002820-62 = "[s5] \"Não é... uma granada...?\"\n[s6] \"Mas eu vi claramente o pino de uma granada agora pouco...\""
1002820-63 = "Pino……?"
1002820-64 = "Pino……?"
1002820-65 = "……Ah, isso é do meu chaveiro."
1002820-66 = "Mestre, por acaso você achou que isso era de uma granada……?"
1002820-70 = "……Ah."
1002820-71 = "Ahahaha! Foi por isso que você fez essa cara de pânico?"
1002820-72 = "Sim, está tudo bem, não é uma granada de verdade. #nAlém disso, se fosse uma granada, ela explodiria logo, né?"
1002820-73 = "E olha, a Asuna nunca mentiu para o Mestre!"
1002820-74 = "Está tão preocupado assim? Precisa conferir para ficar tranquilo?"
1002820-75 = "Ah, o que eu faço, hein?"
1002820-76 = "Hmm, mas é só uma cauda de coelhinho, né~?"
1002820-77 = "……Sim, decidi!"
1002820-78 = "Afinal, você é o mestre da Asuna, então vou deixar você tocar!"
1002820-85 = "Aqui, mestre, pode tocar! É a cauda da Asuna, viu? Só você pode tocar nela, tá bom?"
1002820-86 = "Ahaha, por que você está tão envergonhado~?"
1002820-87 = "[s7] \"E-eu entendi, já chega...\"\n[s8] Com um suspiro de alívio, eu desabo."
1002820-93 = "……Ué, mestre?"
1002820-94 = "Você dormiu?"
1002820-95 = "Já está cansado?"
1002820-99 = "……Beleza!"
1002820-100 = "Então eu vou dormir aqui também!!"
1002820-105 = "(Ao acordar, percebi que, por algum motivo, #n estava dormindo lado a lado com a Asuna bem no meio do campus do Millennium)"
1002820-109 = "(Sentindo os olhares estranhos ao redor, #n levei a Asuna comigo e saí dali às pressas...)"
