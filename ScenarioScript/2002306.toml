[translation]
2002306-1 = "Outro caminho"
2002306-2 = "Schale - Escritório"
2002306-3 = "（Uma tarde qualquer, como de costume...)"
2002306-9 = "[ns] \"Kanna...?\""
2002306-10 = "Ei, Sensei. Sinto muito incomodá-lo enquanto está ocupado."
2002306-11 = "Eu gostaria de pedir um pouco da sua ajuda..."
2002306-12 = "[s1] \"Claro.\"\n[s2] \"É raro receber uma ligação sua, Kanna.\""
2002306-15 = "É um problema que, por mais que eu tente, não consigo resolver sozinha..."
2002306-16 = "Buá... buááá..."
2002306-20 = "[ns] \"Parece que ouvi uma criança chorando...\""
2002306-21 = "Sim. É exatamente sobre isso que eu queria conversar..."
2002306-24 = "Encontrei uma criança perdida enquanto voltava para a escola após uma missão, mas..."
2002306-25 = "BUÁÁÁÁÁÁ!"
2002306-28 = "[ns3] \"Então, você tentou ajudar a criança perdida, mas...\"\n[ns4] \"Ela começou a chorar assim que viu o seu rosto?\""
2002306-31 = "Sim, é isso mesmo..."
2002306-32 = "No trabalho do Departamento de Segurança Pública, quase não temos oportunidades de lidar com crianças..."
2002306-33 = "Tentei falar com ela gentilmente, mas parece que acabei a assustando."
2002306-34 = "Buá... soluço..."
2002306-35 = "Mesmo tentando perguntar o nome ou o endereço dos responsáveis, ela não para de chorar, #ne a situação é que não consegui negociar nada."
2002306-36 = "Tentei transferir o caso para o Departamento de Segurança Comunitária, mas talvez por ser horário de almoço, não consegui contato..."
2002306-37 = "O que eu deveria fazer para ela parar de chorar...?"
2002306-38 = "[s] \"Que tal tentar falar com um sorriso?\""
2002306-39 = "Um sorriso, é...?"
2002306-40 = "Sorriso, sorriso... Certo, um sorriso."
2002306-44 = "Pode me dar um minuto?"
2002306-45 = "（Sorri）"
2002306-46 = "BUÁÁÁÁÁÁÁÁÁ!"
2002306-50 = "......Falhei."
2002306-51 = "[ns] \"Que situação...\""
2002306-53 = "[ns] \"De qualquer forma, estou indo para aí. Pode me dizer onde você está?\""
2002306-54 = "Não precisa se dar ao trabalho de vir até aqui..."
2002306-55 = "Está tudo bem, Sensei. #nProteger os cidadãos também é dever da Academia de Polícia Valkyrie."
2002306-56 = "Não posso depender tanto de um Sensei ocupado como você..."
2002306-57 = "BUÁÁÁÁÁÁÁÁÁ!"
2002306-61 = "......Estarei esperando perto da entrada do 5º quarteirão de Shiba Town, no Distrito Norte de D.U. #nDesculpe, mas aceito sua ajuda."
2002306-63 = "（Cheguei ao local, acalmei a criança e perguntei o endereço de casa e o contato dos pais)"
2002306-64 = "（Depois disso, passei o caso via rádio para uma aluna do Departamento de Segurança Comunitária que estava por perto, e a criança foi levada em segurança para a família)"
2002306-67 = "......Ufa, obrigada pela ajuda hoje."
2002306-68 = "Se não fosse pelo Sensei, eu teria continuado ali, sem saber o que fazer."
2002306-69 = "Sendo a diretora da Academia de Polícia Valkyrie, não conseguir ajudar nem uma criança perdida, #ne ainda ter que pedir a ajuda do Sensei..."
2002306-70 = "No fim, seguir o conselho dos meus veteranos e não ir para o Departamento de Segurança Comunitária foi a decisão certa."
2002306-71 = "Se uma 'cão raivoso' sem carisma como eu estivesse no Departamento de Segurança Comunitária, só causaria mais ansiedade nos cidadãos."
2002306-72 = "......Para mim, só existe o Departamento de Segurança Pública."
2002306-73 = "[s] \"Eu acho que a Kanna se sairia muito bem no Departamento de Segurança Comunitária.\""
2002306-74 = "......Você está falando sério?"
2002306-75 = "Alguém como eu, que nem conseguiu proteger uma criança, não tem como se aproximar do coração dos cidadãos."
2002306-76 = "Embora não seja algo muito valorizado na Academia de Polícia, #nter a capacidade de tratar as pessoas com um sorriso e transmitir segurança também é um talento admirável."
2002306-77 = "Eu não tenho... esse tipo de talento."
2002306-78 = "[ns] \"Mas a Kanna se dedicou de verdade a tentar entender a criança que chorava.\""
2002306-80 = "[ns5] \"É natural falhar no começo.\"\n[ns6] \"Se você se esforçar, com certeza vai conseguir.\""
2002306-86 = "……Quem sabe."
2002306-87 = "Não faz sentido imaginar o caminho que não escolhi agora."
2002306-88 = "……Mas, uma versão de mim que nunca foi chamada de 'Cão Louco', é..."
2002306-89 = "……Seria mentira dizer que não tenho curiosidade, mas#nacho que o nome de Cão Louco combina comigo, afinal."
2002306-90 = "……Obrigada por me ajudar hoje."
2002306-91 = "Espero que possamos nos encontrar novamente em uma situação que não envolva incidentes.#nAté mais."
