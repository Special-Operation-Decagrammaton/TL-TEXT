[translation]
2002306-1 = "もう一つの道"
2002306-2 = "シャーレ・執務室"
2002306-3 = "（いつもと変わらない、ある日の午後……)"
2002306-9 = "[ns] \"カンナ……？\""
2002306-10 = "あの、先生。お忙しいところ申し訳ありません。"
2002306-11 = "少し、お力をお借りしたいのですが……。"
2002306-12 = "[s1] \"もちろん。\"\n[s2] \"カンナから電話なんて珍しいね。\""
2002306-15 = "私の力ではどうしても解決できない問題でして……。"
2002306-16 = "うう……うあああん……。"
2002306-20 = "[ns] \"子供の泣いている声が聞こえたような……。\""
2002306-21 = "はい。まさにそのことでご相談がありまして……。"
2002306-24 = "任務を終えて学校に戻る途中で、迷子を見つけたのですが……。"
2002306-25 = "うあああああん！"
2002306-28 = "[ns3] \"つまり、迷子を助けようとしたけど……。\"\n[ns4] \"カンナの顔を見た途端、泣き出しちゃったの？\""
2002306-31 = "はい、そうです……。"
2002306-32 = "公安局の業務では、子供と接する機会なんてほとんどありませんので……。"
2002306-33 = "優しく声をかけたつもりでしたが、怖がらせてしまったようです。"
2002306-34 = "ううぅ……ぐすん……。"
2002306-35 = "保護者の名前や住所を質問しようとしても、なかなか泣き止んでもらえず、#n何も交渉できていないのが現状です。"
2002306-36 = "生活安全局に引き継ごうとしましたが、昼休憩の時間だからか連絡がつながらなくて……。"
2002306-37 = "どうすれば泣き止んでもらえるのでしょう……？"
2002306-38 = "[s] \"笑顔で話しかけるといいんじゃないかな？\""
2002306-39 = "笑顔、ですか……。"
2002306-40 = "笑顔、笑顔……よし、笑顔。"
2002306-44 = "ちょっといいかな？"
2002306-45 = "（にこっ）"
2002306-46 = "うわ゛あ゛あ゛あ゛あ゛ん゛ん゛ん゛！"
2002306-50 = "……失敗しました。"
2002306-51 = "[ns] \"困ったね……。\""
2002306-53 = "[ns] \"とりあえずそっちに向かうから、場所を教えてもらえる？\""
2002306-54 = "そんなご足労いただくほどの事では……"
2002306-55 = "大丈夫です、先生。#n市民の保護もヴァルキューレ警察学校の仕事ですので。"
2002306-56 = "多忙なシャーレの先生に、そこまで頼るわけには――"
2002306-57 = "うわ゛あ゛あ゛あ゛あ゛ん゛ん゛ん゛！"
2002306-61 = "……D.U.北区芝タウン5丁目の入口付近でお待ちしています。#nすみませんが、お力をお借りします。"
2002306-63 = "（現場に到着して、子供を落ち着かせ、家の住所と連絡先を聞いた)"
2002306-64 = "（その後、無線で近くの生活安全局の生徒に引き継いで、無事に家族の元まで送り届けてもらった)"
2002306-67 = "……ふぅ、今日はお世話になりました。"
2002306-68 = "先生がいなければ、私はあのまま狼狽えていたでしょう。"
2002306-69 = "ヴァルキューレ警察学校の局長ともあろう者が、迷子の一人すら助けられず、#n先生の手を借りることになってしまうとは……。"
2002306-70 = "やはり先輩たちの助言に従って、生活安全局へ進まなくて正解でした。"
2002306-71 = "私のような愛想のない狂犬が生活安全局にいては、市民の不安を煽るだけですから。"
2002306-72 = "……私には、公安局しかありません。"
2002306-73 = "[s] \"カンナは生活安全局でもうまくやっていけると思うよ。\""
2002306-74 = "……本気で仰っていますか？"
2002306-75 = "ろくに子供一人保護できなかった私が、市民の心に寄り添えるわけありません。"
2002306-76 = "警察学校では評価されにくいことですが、#n人と笑顔で接し安心感を与えられるのも、立派な才能だと思っています。"
2002306-77 = "私には……そんな才能、ありません。"
2002306-78 = "[ns] \"でもカンナは、泣く子供にちゃんと向き合ってたよね。\""
2002306-80 = "[ns5] \"最初は失敗して当然だよ。\"\n[ns6] \"努力すれば、きっとできるようになる。\""
2002306-86 = "……それはどうでしょう。"
2002306-87 = "今になって選ばなかった道を想像しても、そこに意味はありません。"
2002306-88 = "……しかし、「狂犬」と呼ばれることのなかった私、ですか……。"
2002306-89 = "……気にならないと言えば嘘になりますが、#nやはり私には狂犬の名が似合っていると思います。"
2002306-90 = "……今日は助けていただいて、ありがとうございました。"
2002306-91 = "次は事件と関係のないところで、またお会いできますよう。#nそれでは。"
