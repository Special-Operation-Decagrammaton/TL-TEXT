[translation]
2600515-1 = "Caçadora de Doces"
2600515-2 = "（Fui até o local combinado com a Yoshimi）"
2600515-7 = "[ns1] \"……Yoshimi?\"\n[ns2] \"Ué, por que você está do lado de fora da loja?\""
2600515-10 = "……Eu já terminei de comer."
2600515-11 = "Ficar lá sentada para sempre seria um incômodo, não seria?"
2600515-12 = "Além disso, eu não queria que pensassem que eu ainda estava comendo……."
2600515-13 = "……Hã?"
2600515-14 = "Pelo menos reflita sobre o que você diz!"
2600515-15 = "……?"
2600515-16 = "……Bem, estava delicioso. É uma loja famosa aqui na região, afinal."
2600515-17 = "Tive que enfrentar uma fila enorme, mas…… sim, estou muito satisfeita."
2600515-18 = "Bom, não consegui provar o menu inteiro, mas comi quase tudo――"
2600515-22 = "N-não é como se eu fosse engordar só por causa disso!!!"
2600515-23 = "[s3] \"É, verdade……?\"\n[s4] \"Eu não disse nada……!?\""
2600515-26 = "Enfim, toma, aqui!"
2600515-27 = "É para você."
2600515-28 = "[s5] \"Isso é…… o lançamento novo daqui?\"\n[s6] \"Você comprou para viagem para mim?\""
2600515-31 = "……Bem, você sempre me ajuda com tudo, né."
2600515-32 = "Então, pensei em expressar minha gratidão de vez em quando."
2600515-36 = "……Q-que foi?"
2600515-37 = "Nossa, que expressão nojenta!"
2600515-38 = "Ei, para com isso!"
2600515-39 = "N-não ria!! É mais nojento ainda!!"
2600515-40 = "[s7] \"Parece delicioso, isso aqui.\"\n[s8] Abre o doce na frente da Yoshimi."
2600515-43 = "……!?"
2600515-44 = "P-por que você abriu!?#nVocê pretende comer aqui mesmo agora!?"
2600515-45 = "Coma depois!!#nAqui não pode!"
2600515-46 = "Não, não tem essa de 'não tem nada'! "
2600515-47 = "Se alguém vir a gente num lugar desses……."
2600515-51 = "……Ah, chega!!#nPor que você não escuta o que eu digo!?"
2600515-52 = "Se você tirar da embalagem, eu vou comer primeiro, viu!?"
2600515-53 = "……O quê?"
2600515-54 = "Só tem um garfo, então não tem problema?"
2600515-55 = "Ha!"
2600515-56 = "Você baixou a guarda, Sensei!"
2600515-57 = "Quem você acha que eu sou?"
2600515-58 = "Eu sou um membro do Clube de Doces Depois da Aula!"
2600515-64 = "[ns9] \"O que, você disse……?\"\n[ns10] \"Isso é……!?\""
2600515-67 = "Já que o Sensei abriu……"
2600515-68 = "Não tem mais jeito."
2600515-69 = "Como membro do \"Clube de Doces Depois da Aula\",#nranqueada do Desafio de Doces de Trinity e imperatriz das edições limitadas!!"
2600515-70 = "A técnica secreta de \"Ibaragi Yoshimi\"!!#nProve o \"Caçadora de Doces\"!!"
2600515-74 = "……Te peguei!"
2600515-75 = "Avance! \"Caçadora de Doces\"!!!"
2600515-76 = "[s] \"O quê……!!\""
2600515-80 = "Ei, espera aí!!"
2600515-81 = "Onde você vai! Eu disse para esperar!!!"
2600515-88 = "（Ao tentar desviar da Yoshimi que vinha correndo, acabamos caindo juntos）"
2600515-89 = "（Por sorte o doce ficou intacto, mas no fim, a Yoshimi acabou roubando mais da metade……）"
