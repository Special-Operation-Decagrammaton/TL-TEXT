[translation]
2600515-1 = "スイーツ・ハンター"
2600515-2 = "（ヨシミとの約束の場所へ向かった）"
2600515-7 = "[ns1] \"……ヨシミ？\"\n[ns2] \"あれ、どうしてお店の外に。\""
2600515-10 = "……もう食べ終わったの。"
2600515-11 = "それでいつまでも居座ってたら、迷惑でしょ？"
2600515-12 = "それに、「まだ食べてたんだ」とか言われそうだし……。"
2600515-13 = "……はぁ？"
2600515-14 = "ちょっとは自分の言動を顧みなさいよ！"
2600515-15 = "……？"
2600515-16 = "……まぁ、美味しかったわよ。この辺でも有名なお店だし。"
2600515-17 = "結構並んだし……うん、大満足。"
2600515-18 = "まぁ全メニューとは行かなかったけど、ほとんどは食べられたし――"
2600515-22 = "べ、別にこの程度じゃ太らないから！！！"
2600515-23 = "[s3] \"そ、そうだね……？\"\n[s4] \"何も言ってないけど……！？\""
2600515-26 = "とにかく、はいこれ！"
2600515-27 = "あげる。"
2600515-28 = "[s5] \"これって……ここの新作？\"\n[s6] \"テイクアウトしてくれたの？\""
2600515-31 = "……まあ、何だかんだいつもお世話になってるし。"
2600515-32 = "だから、たまには感謝の気持ちを伝えようかな、なんて。"
2600515-36 = "……な、何よ。"
2600515-37 = "うわっ、その表情気持ち悪っ！"
2600515-38 = "ちょっ、やめてったら！"
2600515-39 = "わ、笑わないで！！余計気持ち悪いから！！"
2600515-40 = "[s7] \"美味しそうだね、これ。\"\n[s8] ヨシミが見てる前でスイーツを開封する。"
2600515-43 = "……！？"
2600515-44 = "な、何で開けるの！？#n今ここでそのまま食べるつもり！？"
2600515-45 = "後で食べてよ！！#nここじゃダメ！"
2600515-46 = "いや、何でもなにも無いでしょ！"
2600515-47 = "こんなとこ、人に見られたら……。"
2600515-51 = "……ああ、もう！！#n何で人の話を聞かないわけ！？"
2600515-52 = "取り出したら先に私が食べるわよ！？"
2600515-53 = "……なに？"
2600515-54 = "フォークが1つだから大丈夫？"
2600515-55 = "はっ！"
2600515-56 = "油断したわね、先生！"
2600515-57 = "この私を誰だと思ってるの？"
2600515-58 = "これでも放課後スイーツ部の一員なのよ！"
2600515-64 = "[ns9] \"なん、だと……？\"\n[ns10] \"それは……！？\""
2600515-67 = "先生が開けちゃったんだから……"
2600515-68 = "もう仕方ないわ。"
2600515-69 = "「放課後スイーツ部」の部員であり、#nトリニティスイーツチャレンジのランカーにして、限定版の女帝！！"
2600515-70 = "「[ruby=いばらぎ]伊原木[/ruby]ヨシミ」の秘技！！#n「スイーツ・ハンター」を喰らいなさい！！"
2600515-74 = "……捕らえた！"
2600515-75 = "駆け抜けろ！「スイーツ・ハンター」！！！"
2600515-76 = "[s] \"なっ……！！\""
2600515-80 = "ちょっ、待ちなさいよ！！"
2600515-81 = "どこ行くの！もう待ってってば！！！"
2600515-88 = "（追いかけてくるヨシミを避けようとしたら、そのまま一緒に転んでしまった）"
2600515-89 = "（幸いスイーツは無事だったが、結局半分以上ヨシミに奪われてしまった……）"
