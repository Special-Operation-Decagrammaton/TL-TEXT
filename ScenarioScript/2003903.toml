[translation]
2003903-1 = "O Sonho da Borboleta"
2003903-2 = "Schale - Escritório"
2003903-4 = "……E então, todos ficaram em um alvoroço total."
2003903-5 = "Dizendo que o líder da facção não deveria colaborar levianamente com o exterior, ou que isso prejudicaria a dignidade do cargo……"
2003903-6 = "Eu só queria ter um momento de \"folga\", veja só."
2003903-7 = "[s] \"Ei, era isso mesmo!?\""
2003903-8 = "Fufu, é brincadeira."
2003903-9 = "[s] \"Ce-certo, né……?\""
2003903-10 = "Mas, dependendo da situação, isso também pode ser um desejo sincero."
2003903-11 = "[s] \"Qual dos dois!?\""
2003903-12 = "Fufu, tentar adivinhar também tem o seu charme."
2003903-13 = "Bem, vamos começar o trabalho."
2003903-14 = "É a minha primeira vez trabalhando No Schale, mas――"
2003903-15 = "Hum, antes disso……"
2003903-21 = "[ns] \"O que é isso?\""
2003903-22 = "É um incenso medicinal para curar o cansaço do corpo e da mente."
2003903-23 = "Quando contei que viria ao plantão da Schale, o Clube de Pesquisa de Alquimia preparou para mim."
2003903-24 = "Vamos começar. #nTempo é dinheiro, não é?"
2003903-26 = "(Assim, ao começar o trabalho No Schale junto com Kisaki……)"
2003903-28 = "Hum…… \"Streamers individuais estão invadindo um prédio abandonado no centro antigo\""
2003903-29 = "\"Moradores locais estão reclamando, e há preocupações com a deterioração da segurança na região.\""
2003903-30 = "\"Em relação a isso, solicitamos a opinião e cooperação do Departamento Federal de Investigação, Schale.\"……Entendo."
2003903-31 = "[s] \"O que você faria, Kisaki?\""
2003903-32 = "Vejamos…… se fosse pelo método da minha Genryumon……"
2003903-34 = "\"Transformar toda a área que causa o problema em um terreno baldio\"…… que tal?"
2003903-35 = "[s] \"Isso não seria um pouco exagerado……?\""
2003903-37 = "……É mesmo?"
2003903-38 = "Deveria considerar mais a situação ao redor?…… Hum."
2003903-39 = "Para uma solução fundamental, esse é o melhor caminho, mas…… o que você diz também tem seu sentido, Sensei."
2003903-41 = "O próximo é…… #n\"Estudantes estão reclamando que as armas e munições mais recentes não estão sendo fornecidas\"……?"
2003903-42 = "De fato, em Kivotos, armas de fogo são tão importantes quanto comida, vestuário e moradia."
2003903-43 = "[s] (São tão importantes assim……)"
2003903-44 = "É natural que as estudantes expressem suas opiniões sobre isso. #nParece que precisamos encontrar o responsável por causar o problema……"
2003903-45 = "Entendo…… pelo que vejo nos documentos, o lado do fornecimento parece estar agindo de forma ilícita."
2003903-46 = "Na Genryumon, nesses casos, aplicamos sanções físicas aos culpados, mas――"
2003903-47 = "[s] \"Vi-violência não, né……?\""
2003903-48 = "……Claro, eu também não pretendo usar a força sem necessidade."
2003903-49 = "……Mas, Sensei, você não sabe?"
2003903-50 = "Que neste mundo, existem coisas que não podem ser resolvidas apenas com a lei."
2003903-52 = "Por isso――após uma investigação minuciosa, se a culpa for evidente…… #nserá necessário decretar a pena de morte o mais rápido possível!"
2003903-53 = "[s] \"Pena de morte também não pode, né!?\""
2003903-54 = "Ah, a pena de morte aqui é apenas em sentido figurado, mas……"
2003903-55 = "[s] \"Mesmo assim, nada de pena de morte! Proibido!!\""
2003903-56 = "Ce-certo……"
2003903-58 = "Com isso, o trabalho de hoje termina."
2003903-59 = "Terminamos muito mais rápido que o habitual? #nFufu, fico feliz em ter sido útil."
2003903-60 = "Hum? Você ficou surpreso com a rapidez e precisão do julgamento, mas acha o método de resolução um pouco extremo……?"
2003903-61 = "……Hum. Parece que ainda levará tempo para que o método da Genryumon seja compreendido pelo mundo."
2003903-62 = "Bem, vamos passar para o próximo compromisso."
2003903-63 = "Hum? Como terminamos o trabalho mais rápido do que o esperado, você não pensou em nada? #nHum……"
2003903-68 = "（De algum lugar, um aroma relaxante começou a surgir）"
2003903-69 = "（Parece vir do incensário que Kisaki trouxe...）"
2003903-70 = "Sensei? Você parece estar com uma aparência pálida..."
2003903-71 = "Ora... então você não dorme há três dias."
2003903-72 = "Quem diria que o trabalho no Schale seria tão extenuante... isso é uma situação grave. #nMuito bem... primeiro, vamos mudar de lugar."
2003903-74 = "Vamos, deite-se. #nEu lhe emprestarei meu colo."
2003903-80 = "Fufu, parece que você estava se segurando o tempo todo, não é? #nÉ melhor deixar tudo comigo."
2003903-81 = "Feche os olhos... isso. #nInspire lentamente e expire... hum, isso mesmo..."
2003903-89 = "（Ao fechar os olhos... torna-se vago se isso é um sonho ou a realidade）"
2003903-90 = "（Uma palma da mão pequena e macia toca suavemente o meu cabelo...）"
2003903-92 = "Você está com uma expressão serena... deve estar tendo um bom sonho."
2003903-93 = "No entanto, o fato de estar sonhando... em outras palavras, é a prova de que você não está conseguindo ter um sono profundo."
2003903-94 = "（...Uma mão quente é colocada sobre a minha testa）"
2003903-96 = "É uma lenda antiga..."
2003903-97 = "Diz-se que alguém se tornou uma borboleta em um sonho e voava por aí."
2003903-98 = "（...As pontas dos dedos que estavam na minha testa deslizam lentamente para a minha bochecha）"
2003903-100 = "A borboleta ficou tão satisfeita com aquela sensação que nem sabia mais se era um humano ou uma borboleta."
2003903-101 = "Ao despertar subitamente do sonho, percebeu que, na verdade, era um humano."
2003903-102 = "（...Para suavemente na altura do meu pescoço）"
2003903-104 = "Essa pessoa pensou: #nSerá que a borboleta sou eu, ou eu sou a borboleta?"
2003903-105 = "Ou talvez... será que aquilo que não se pode distinguir não é importante desde o início?..."
2003903-116 = "（Quando acordei... Kisaki e o incensário que ela trouxe já haviam desaparecido）"
2003903-117 = "（Fiquei envolto em uma sensação tão estranha que cheguei a duvidar se Kisaki realmente havia visitado o Schale...）"
