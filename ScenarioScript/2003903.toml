[translation]
2003903-1 = "胡蝶の夢"
2003903-2 = "シャーレ・執務室"
2003903-4 = "……して、みな上を下への大騒ぎじゃったよ。"
2003903-5 = "門主が軽々しく外部へ協力してはならぬとか、それでは門主としての威厳を損ねるだとか……。"
2003903-6 = "―[ruby=わらわ]―妾は[/ruby]ただ、「おさぼり」したかっただけじゃというのに。"
2003903-7 = "[s] \"えっ、そうだったの！？\""
2003903-8 = "ふふ、冗談じゃ。"
2003903-9 = "[s] \"そ、そうだよね……？\""
2003903-10 = "じゃが、事と次第によっては――それも本音になり得るというもの。"
2003903-11 = "[s] \"どっち！？\""
2003903-12 = "ふふ、それを推測するのも、また一興。"
2003903-13 = "さて、そろそろ業務に移ろうかの。"
2003903-14 = "シャーレの仕事は初めてではあるが――"
2003903-15 = "うむ、その前に……。"
2003903-21 = "[ns] \"これは何？\""
2003903-22 = "心身の疲れを癒やす[ruby=こうやく]香薬[/ruby]じゃ。"
2003903-23 = "シャーレ当番に行くと伝えたら、錬丹術研究会が用意してくれてな。"
2003903-24 = "さあ、始めようかの。#n時は金なり――じゃぞ？"
2003903-26 = "（そうやって、キサキと共にシャーレの仕事を始めると……）"
2003903-28 = "ふむ……「旧市街地の廃ビルに、個人配信者が殺到し」"
2003903-29 = "「近隣住民から苦情が入っており、当該地域の治安悪化が懸念されている。」"
2003903-30 = "「これに関して、連邦捜査部シャーレに意見書および協力を要請する。」……か。"
2003903-31 = "[s] \"キサキならどうする？\""
2003903-32 = "そうさな……我が玄龍門のやり方じゃと……"
2003903-34 = "「問題の原因となる一帯を更地にする」……とかはどうじゃ？"
2003903-35 = "[s] \"それはちょっとやりすぎじゃないかな……。\""
2003903-37 = "……そうかの？"
2003903-38 = "もっと周囲の状況を考慮すべき？……ふむ。"
2003903-39 = "根本的な解決はそれが一番じゃが……先生の言うことにも一理あるじゃろう。"
2003903-41 = "次は……#n「最新の銃器や弾薬が補給されないことで、生徒から不満の声が上がっている」……？"
2003903-42 = "たしかに、キヴォトスにおいて銃火器は、衣食住と同じくらい重要なものじゃ。"
2003903-43 = "[s] （そんなに重要なんだ……）"
2003903-44 = "これに対し、生徒が意見を述べるのは当然のこと。#n問題を引き起こした当事者を探す必要があるようじゃな……"
2003903-45 = "なるほど……書類を見る限り、供給側が不正を働いているようじゃの。"
2003903-46 = "玄龍門ではこういう場合、罪人に物理的な制裁を加えるのじゃが――"
2003903-47 = "[s] \"ぼ、暴力はダメだよ……？\""
2003903-48 = "……無論、妾とて無暗に力を振るうつもりはない。"
2003903-49 = "……じゃが、先生も知っておるのではないか？"
2003903-50 = "この世には、法だけで解決できぬ事柄もあるということを。"
2003903-52 = "じゃから――くまなく調査したうえで、罪状が明白であれば……#n可及的速やかに死刑を言い渡す必要があろう！"
2003903-53 = "[s] \"死刑もダメだからね！？\""
2003903-54 = "ああ、ここで言う死刑はあくまで比喩的な意味ではあるが……。"
2003903-55 = "[s] \"それでも死刑はダメ！禁止！！\""
2003903-56 = "そ、そうか……。"
2003903-58 = "これで今日の仕事は終わりじゃな。"
2003903-59 = "普段より大幅に時間短縮できた？#nふふ、役に立てたようで嬉しいのう。"
2003903-60 = "うん？迅速かつ正確な判断に驚いたけど、解決法がやや極端……？"
2003903-61 = "……ふむ。玄龍門のやり方が世に理解されるには、まだ時間が必要なようじゃな。"
2003903-62 = "さて、次の予定に移ろうではないか。"
2003903-63 = "うん？想定以上に早く仕事が片付いてしまったから、何も考えていない？#nふむ……。"
2003903-68 = "（どこかから、落ち着くような香りがしてきた）"
2003903-69 = "（キサキが持ってきた香炉からのようだ……）"
2003903-70 = "先生？顔色が悪いようじゃが……。"
2003903-71 = "おや……3日も眠っておらなんだか。"
2003903-72 = "よもやシャーレの仕事がここまで激務であったとは……これは由々しき事態じゃ。#nそうさな……まずは場所を移そう。"
2003903-74 = "ほれ、横になるといい。#n妾の膝を貸してやろう。"
2003903-80 = "ふふ、どうやらずうっと我慢をしていたようじゃのう。#n妾にすべて委ねると良い。"
2003903-81 = "目を閉じて……そう。#n息をゆっくりと吸って、吐くのじゃ……うむ、そうじゃ……。"
2003903-89 = "（目を閉じていると……ここが夢なのか現実なのか、曖昧になってくる）"
2003903-90 = "（小さくて柔らかい手のひらが、そっと髪に触れてくる……）"
2003903-92 = "穏やかな顔をしておる……良い夢を見れているのじゃろう。"
2003903-93 = "じゃが、夢を見ているということは……言い換えれば、深い眠りにはつけていないという証左。"
2003903-94 = "（……額に温かな手が添えられる）"
2003903-96 = "昔からの言い伝えでの……"
2003903-97 = "ある者が夢の中で蝶となり、飛び回っておった。"
2003903-98 = "（……額にあった指先が頬にゆっくりと滑っていき）"
2003903-100 = "蝶はその感覚に満足しすぎたあまり、自分が人間であったか蝶であったかすら定かでなくなってしまった。"
2003903-101 = "ふと夢から目を覚ますと、やはり自分は人間であることに気が付いたのじゃ。"
2003903-102 = "（……首元でそっと止まる）"
2003903-104 = "その者は考えておった。#n蝶が自分なのか、自分が蝶なのか。"
2003903-105 = "あるいは――区別がつかないものは、最初から重要ではないのか、と……。"
2003903-116 = "（目が覚めた頃には……キサキも、彼女が持ってきた香炉も姿を消していた）"
2003903-117 = "（本当にキサキがシャーレを訪ねていたかすら分からなくなるくらい、不思議な気分に包まれていた……）"
