[translation]
10034040-1 = "Episódio 4: Uma versão diferente de mim"
10034040-2 = "(Alguns dias depois)"
10034040-3 = "(O trabalho deu uma trégua e, enquanto eu descansava...)"
10034040-9 = "Ah, Sensei?#nTem um tempinho?"
10034040-10 = "Não é nada demais, mas eu queria te avisar de uma coisa."
10034040-11 = "O estúdio que você conseguiu pra gente é super espaçoso e dá pra praticar direitinho..."
10034040-12 = "……Então, é, obrigada!"
10034040-13 = "……Hã?"
10034040-14 = "Você está vindo pra cá agora!?"
10034040-15 = "[s1] \"Senti vontade de ver o rosto da Yoshimi.\"\n[s2] \"Quero ouvir a performance da Yoshimi.\""
10034040-18 = "……!?#nQuer dizer, ah, qual é! De novo com essas coisas estranhas do nada!"
10034040-19 = "Esquece isso, você não tem seu próprio trabalho pra fazer!?"
10034040-20 = "……Vou desligar, mas não ouse vir aqui, entendeu!? E não é um convite ao contrário!"
10034040-25 = "[ns3] \"Entendido, estou indo rápido! ...Ué, desligou.\"\n[ns4] Preparo-me para sair imediatamente."
10034040-31 = "(Cheguei ao estúdio de ensaio do bairro)"
10034040-32 = "(Ao encostar o ouvido perto da entrada, consigo ouvir um pouco do som dos instrumentos)"
10034040-33 = "[ns5] \"Parece que todas estão se esforçando.\"\n[ns6] Desço as escadas em direção ao estúdio no subsolo."
10034040-41 = "Mais rápido! Mais rápido ainda!!"
10034040-45 = "E-estou no meu limite... Isso não é nada rock..."
10034040-46 = "Mais rápido!!!!"
10034040-47 = "Uoooooh!"
10034040-52 = "Mais rápido!!!!"
10034040-53 = "Uoooooh! Roooock!!"
10034040-59 = "Isso, essa é a velocidade! Mantenham o ritmo!!"
10034040-60 = "Nuuuuooh..."
10034040-66 = "Mais rápido!!!!"
10034040-67 = "Roooock!!"
10034040-74 = "Yo-Yoshimi-chan.#nA Natsu-chan também está se esforçando, então..."
10034040-75 = "Mas não tem jeito.#nA Natsu está mantendo o ritmo lento demais."
10034040-76 = "Se ela quer tocar bateria, precisa manter um tempo constante."
10034040-77 = "É por causa daquele Semla que a gente quer comer, né?"
10034040-78 = "Ah, sim... é verdade, né."
10034040-82 = "……Foi por isso que eu disse que queria montar uma banda."
10034040-83 = "……Hm? Disse alguma coisa?"
10034040-84 = "Ah, não, nada!?#nNão é nada!"
10034040-88 = "……É mesmo?"
10034040-89 = "Espera, Sensei!?"
10034040-94 = "Por acaso você veio ver o nosso ensaio?"
10034040-95 = "[s7] \"Vocês estão com cara de banda de verdade agora.\"\n[s8] \"O figurino e os instrumentos estão perfeitos.\""
10034040-98 = "Ah, ahaha... muito obrigada!"
10034040-99 = "Diga, Sensei... só por garantia, eu queria perguntar uma coisa."
10034040-100 = "……D-desde quando você está aí?#nPor acaso, você ouviu a música de agora também...?"
10034040-101 = "Chegou agora...? Sério?#nBom, então tudo bem."
10034040-102 = "Ainda não estou acertando o tom direito..."
10034040-103 = "A voz da Kazusa-chan é muito bonita!"
10034040-104 = "Ah, Airi..."
10034040-109 = "……Ah, estou exausta."
10034040-110 = "Do que vocês duas estão falando?"
10034040-111 = "……Hã?"
10034040-116 = "Espera, por que o Sensei está aqui!?"
10034040-117 = "Eu não disse para não vir porque ainda estamos praticando!?"
10034040-118 = "Eu falei que não consigo me concentrar com você aqui!!"
10034040-119 = "[s9] \"Então, na verdade, você me odeia...\"\n[s10] \"Eu era a única que achava que éramos amigas...?\""
10034040-122 = "Eu disse para não vir justamente porque sabia que você ia me provocar assim, sabia!?!?"
10034040-123 = "Entendido?#nDa próxima vez, não apareça sem que a gente chame!"
10034040-124 = "E não precisamos mais de ajuda com nada!!"
10034040-125 = "Pronto, já pode ir embora!"
10034040-126 = "Saia logo daqui!"
10034040-127 = "Qual é, para de rir e vai logo!"
10034040-135 = "(Fui expulso do estúdio pela Yoshimi, mas...)"
10034040-136 = "(...Fiquei aliviado ao ver que, por enquanto, parece estar tudo bem.)"
10034040-138 = "(À noite, fui dar uma espiada escondido para ver como estava o treino.)"
10034040-142 = "[ns11] \"...Ué?\"\n[ns12] Entro no estúdio."
10034040-149 = "[ns13] \"Airi...?\"\n[ns14] \"Você ficou aqui sozinha?\""
10034040-152 = "...Ah, Sensei."
10034040-156 = "O que faz aqui a essa hora?"
10034040-157 = "...Eu?"
10034040-158 = "Bem...#nComo estou dando o meu máximo só para acompanhar as outras, pensei em praticar um pouco mais."
10034040-159 = "[s15] \"Você está se esforçando muito, Airi.\"\n[s16] \"Não se force demais, viu?\""
10034040-162 = "...Ahaha.#nBem, eu não melhorei nada, na verdade..."
10034040-163 = "Mas já que tenho essa oportunidade, vou me esforçar!"
10034040-164 = "...Eh?"
10034040-165 = "Se eu estou me divertindo, você pergunta..."
10034040-166 = "Hum, como posso dizer..."
10034040-167 = "Eu ainda não sei bem."
10034040-168 = "Se estou me divertindo ou não..."
10034040-169 = "Por enquanto, estou apenas repetindo os exercícios do livro didático..."
10034040-170 = "Mesmo assim, as outras melhoram tão rápido..."
10034040-171 = "O que eu preciso fazer para conseguir ser como elas..."
10034040-172 = "..."
10034040-174 = "\"Você tem certeza de que quer continuar assim?\""
10034040-179 = "[ns] \"...Airi?\""
10034040-180 = "...N-não é hora de pensar em diversão agora!"
10034040-181 = "Porque, veja bem, eu ainda nem dominei o básico!"
10034040-182 = "De qualquer forma, vou me esforçar mais nos treinos!"
10034040-183 = "Ter a tranquilidade para curtir a música..."
10034040-184 = "...Tenho certeza de que virá com o tempo."
10034040-185 = "Por isso, agora é só praticar, não é?"
10034040-186 = "............"
10034040-187 = "Ah, bem..."
10034040-188 = "Isso não respondeu à sua pergunta, né...?"
10034040-189 = "[s17] \"Está tudo bem.\"\n[s18] \"Não precisa se apressar para encontrar uma resposta.\""
10034040-192 = "...Sim."
10034040-196 = "Bem, na verdade..."
10034040-197 = "Talvez o Sensei já tenha percebido."
10034040-198 = "Sabe, para as outras..."
10034040-199 = "Eu disse que queria entrar na banda para comer semla, mas..."
10034040-200 = "Na verdade, a história do semla foi só uma desculpa."
10034040-201 = "...Eu só queria aprender a tocar um instrumento."
10034040-202 = "Não, nem precisava ser um instrumento, qualquer coisa servia."
10034040-203 = "Eu queria ter algo que eu pudesse chamar de talento, com confiança..."
10034040-204 = "Talvez todos pensem que basta fazer o básico, mas... eu sou diferente."
10034040-205 = "Eu sou uma pessoa indecisa, sem nenhum talento, #numa covarde que não consegue expressar sua própria opinião."
10034040-206 = "Eu quero mudar esse meu jeito."
10034040-207 = "Para ser sincera, ainda não entendo a diversão de tocar. #nAlém disso, todos estão progredindo mais rápido do que eu, que fui quem sugeriu isso... #nSó de tentar acompanhá-los, já estou dando o meu máximo."
10034040-208 = "[s19] \"...Entendo.\"\n[s20] \"Obrigado por me contar, Airi.\""
10034040-211 = "Através da música... não, não precisa ser necessariamente a música... #nEu quero me tornar alguém."
10034040-212 = "Mas tenho medo de tentar fazer isso sozinha."
10034040-216 = "Talvez eu seja uma pessoa ruim."
10034040-217 = "Usar meus amigos para benefício próprio..."
10034040-218 = "...?"
10034040-219 = "M-mas, é verdade que estou usando eles..."
10034040-220 = "[s21] \"Acho que isso não é bem 'usar'.\"\n[s22] \"Eles fazem isso porque gostam.\""
10034040-223 = "Você acha...?"
10034040-224 = "Mesmo assim, eu preciso mudar. #nDe quem eu sou agora para uma nova versão de mim... este teclado é o primeiro passo..."
10034040-225 = "Se eu melhorar, acredito que lá na frente haverá uma versão de mim que poderá caminhar de cabeça erguida."
10034040-226 = "...Ei, Sensei."
10034040-227 = "Por favor, não conte isso para ninguém."
10034040-228 = "...Fique de olho em mim. #nEu vou me esforçar."
10034040-229 = "Vou melhorar com certeza..."
10034040-230 = "...e vou me tornar alguém diferente do que sou agora!"
10034040-231 = "..."
10034040-232 = "Sensei?"
10034040-233 = "...Aconteceu alguma coisa?"
10034040-237 = "[ns23] \"...Não, não é nada.\"\n[ns24] \"...Primeiro de tudo, tente não exagerar, está bem?\""
10034040-240 = "Muito obrigada, Sensei."
10034040-241 = "Ah, quanto a cuidar da minha saúde, pode deixar comigo! Eu sou bem resistente, afinal!"
10034040-242 = "...Sensei!"
10034040-243 = "Eu vou dar o meu melhor!"
10034040-245 = "(...Alguns dias depois)"
10034040-251 = "Sensei... você está livre agora?"
10034040-252 = "[s25] \"Por acaso você quer que eu vá ver o ensaio?\"\n[s26] \"Ué, você não tinha dito para não ir porque estavam ensaiando?\""
10034040-255 = "Não é hora para esse tipo de brincadeira!"
10034040-256 = "É que..."
10034040-257 = "Você não ouviu nada?"
10034040-258 = "...Da Airi."
10034040-263 = "[ns27] \"...Airi?\"\n[ns28] \"...Aconteceu alguma coisa?\""
10034040-266 = "Bem, é que..."
10034040-267 = "...A Airi, sabe."
10034040-269 = "...Faz dois dias que não consigo falar com ela."
