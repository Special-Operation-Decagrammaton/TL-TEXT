[translation]
10034040-1 = "第4話;今までとは違う私"
10034040-2 = "（数日後）"
10034040-3 = "（仕事が一段落し、休憩をしていると……）"
10034040-9 = "あ、先生？#nちょっと時間ある？"
10034040-10 = "大した用じゃないんだけど、伝えておこうと思って。"
10034040-11 = "先生が手配してくれたスタジオ、めっちゃ広いしちゃんと練習できてるから……"
10034040-12 = "……だからその、ありがと！"
10034040-13 = "……えっ？"
10034040-14 = "今からこっちに来る！？"
10034040-15 = "[s1] \"ヨシミの顔が見たくなって。\"\n[s2] \"ヨシミの演奏が聞きたいから。\""
10034040-18 = "……！？#nって、ああもう！また急に変なこと言って！"
10034040-19 = "良いから、先生には先生の仕事があるでしょ！？"
10034040-20 = "……電話切るけど、絶対に来ちゃダメなんだからね！フリじゃないから！"
10034040-25 = "[ns3] \"分かった、急いで行くね！……あれ、切れてる。\"\n[ns4] すぐに出かける準備をする。"
10034040-31 = "（近所の練習スタジオに到着した）"
10034040-32 = "（入口付近で耳を澄ますと、少しだけ楽器の音が聞こえてくる）"
10034040-33 = "[ns5] \"みんな頑張ってるみたいだね。\"\n[ns6] 階段を降りて地下のスタジオに向かう。"
10034040-41 = "速く！もっと速く！！"
10034040-45 = "げ、限界……こんなの、何もロックじゃない……。"
10034040-46 = "もっと速く！！！！"
10034040-47 = "うおぉぉー！"
10034040-52 = "もっとぉ！！！！"
10034040-53 = "うおぉぉぉー！ろおぉぉぉっく！！"
10034040-59 = "そう、その速度よ！キープして！！"
10034040-60 = "ぬうぉぉぉぉ……"
10034040-66 = "もっと速くっ！！！！"
10034040-67 = "ろおぉぉぉっく！！"
10034040-74 = "よ、ヨシミちゃん。#nナツちゃんも頑張ってるから……。"
10034040-75 = "でも、仕方ないよ。#nナツだけリズムが遅すぎるんだし。"
10034040-76 = "ドラムをやるんだったら、ちゃんと一定のテンポをキープしてもらわないとね。"
10034040-77 = "これもセムラを食べるため、でしょ。"
10034040-78 = "う、うん……そう、だね。"
10034040-82 = "……そのために、バンドをやりたいって言ったんだった。"
10034040-83 = "……ん？何か言った？"
10034040-84 = "え、あ、ううん！？#n何でもないよ！"
10034040-88 = "……そう？"
10034040-89 = "って、先生！？"
10034040-94 = "もしかして、私たちの練習を見に来てくれたんですか？"
10034040-95 = "[s7] \"一気にバンドらしくなったね。\"\n[s8] \"衣装も楽器もバッチリだね。\""
10034040-98 = "あ、あはは……ありがとうございます！"
10034040-99 = "あのさ、先生……念のため聞いておきたいんだけど。"
10034040-100 = "……い、いつから居たの？#nもしかして、さっきの歌も聞いてた……？"
10034040-101 = "着いたばっかり……？本当？#nなら別にいいんだけど。"
10034040-102 = "まだ音程ちゃんと取れてないし……。"
10034040-103 = "とっても上手なんですよ、カズサちゃんの歌！"
10034040-104 = "あ、アイリ……。"
10034040-109 = "……はぁ、疲れたわ。"
10034040-110 = "なに話してるのよ、二人とも。"
10034040-111 = "……えっ？"
10034040-116 = "って、なんでここに先生が！？"
10034040-117 = "まだ練習中だから来ないでって伝えたでしょ！？"
10034040-118 = "先生がいると集中できないって言ったのに！！"
10034040-119 = "[s9] \"私のこと、実は嫌いだったんだ……。\"\n[s10] \"仲良しだと思ってたのは私だけだったの……？\""
10034040-122 = "そうやってからかわれると思ったから、来ないでって言ったんだけど！？！？"
10034040-123 = "良い？#n今度は私たちが呼ぶまで勝手に来ないでよ！"
10034040-124 = "もう手伝いとかも要らないから！！"
10034040-125 = "はい、帰った帰った！"
10034040-126 = "早く出てって！"
10034040-127 = "もう、笑ってないで早く！"
10034040-135 = "（ヨシミにスタジオから追い出されてしまったが……）"
10034040-136 = "（……今のところ大丈夫そうで安心した）"
10034040-138 = "（夕方、今度はこっそりと練習の様子を見に行った）"
10034040-142 = "[ns11] \"……あれ？\"\n[ns12] スタジオの中に入る。"
10034040-149 = "[ns13] \"アイリ……？\"\n[ns14] \"一人だけ残ってたの？\""
10034040-152 = "……あっ、先生。"
10034040-156 = "こんな時間にどうしたんですか？"
10034040-157 = "……私ですか？"
10034040-158 = "えっと……。#nみんなに付いていくだけでも精一杯なので、もう少し練習しようと思って。"
10034040-159 = "[s15] \"頑張ってるね、アイリ。\"\n[s16] \"無理しないようにね。\""
10034040-162 = "……あはは。#nまぁ、全然上達はできてないのですが……。"
10034040-163 = "せっかくの機会ですし、頑張ります！"
10034040-164 = "……え？"
10034040-165 = "楽しいかと、言われますと……。"
10034040-166 = "うーん、どうでしょう……。"
10034040-167 = "まだ、よく分かりません。"
10034040-168 = "楽しいか、どうか……。"
10034040-169 = "今はただ教本通り、繰り返し練習しているだけで……。"
10034040-170 = "それでもみんなのほうが、すぐに上達していって……。"
10034040-171 = "どうすれば私も、あんな風に……。"
10034040-172 = "……。"
10034040-174 = "\"本当にそのままで良いの？\""
10034040-179 = "[ns] \"……アイリ？\""
10034040-180 = "……い、今は、楽しんでる場合じゃないですから！"
10034040-181 = "だってほら、私はまだ基礎すらできてませんし！"
10034040-182 = "とにかく、もっと頑張って練習します！"
10034040-183 = "演奏を楽しむ余裕、は……。"
10034040-184 = "……きっと、そのうち出てくると思います。"
10034040-185 = "だから今は、練習あるのみですよね！"
10034040-186 = "…………。"
10034040-187 = "あ、えっと……。"
10034040-188 = "これでは答えになってない、でしょうか……？"
10034040-189 = "[s17] \"大丈夫だよ。\"\n[s18] \"無理に急いで答えを出す必要はないから。\""
10034040-192 = "……はい。"
10034040-196 = "えっと、実は……。"
10034040-197 = "もしかしたら、先生は気づいているかもしれません。"
10034040-198 = "その、みんなには……。"
10034040-199 = "セムラを食べるためにバンドをやりたいって言いましたが……。"
10034040-200 = "実は、セムラの話は後付けなんです。"
10034040-201 = "……ただ、楽器を演奏できるようになりたかっただけで。"
10034040-202 = "いえ、楽器じゃなくても、何だって良かったんです。"
10034040-203 = "自信を持って、特技だと言える何かが欲しくて……。"
10034040-204 = "みんなは程々にやれば良いと思っているかもしれませんが……私は違うんです。"
10034040-205 = "……優柔不断で、何の特技も無くて、#n自分の意見をはっきり言えない小心者の私。"
10034040-206 = "……そんな自分を、変えたいんです。"
10034040-207 = "正直に言うと、演奏の楽しさはまだ分かりません。#nそれに、言い出した私より、みんなの方が上達も早くて……#nどうにか追いつくだけでも、精一杯。"
10034040-208 = "[s19] \"……うん。\"\n[s20] \"話してくれてありがとう、アイリ。\""
10034040-211 = "音楽を通じて……いえ、音楽じゃなくてもいいんですが……。#n私は何者かになりたいんです。"
10034040-212 = "なのに、一人で挑戦するのが怖くって。"
10034040-216 = "……私、悪い子なのかもしれません。"
10034040-217 = "自分の都合で、友達を利用するだなんて……。"
10034040-218 = "……？"
10034040-219 = "で、でも、利用してるのは確かで……。"
10034040-220 = "[s21] \"それは利用とは違うんじゃないかな。\"\n[s22] \"みんな、好きでやってるんだよ。\""
10034040-223 = "そう、でしょうか……。"
10034040-224 = "だとしても、私は変わらないとダメなんです。#n今までの私から、新しい私に……このキーボードはその一歩……。"
10034040-225 = "上手になったら、その先にはきっと、胸を張って歩ける私がいると思うんです。"
10034040-226 = "……その、先生。"
10034040-227 = "みんなには、内緒にしてくださいね。"
10034040-228 = "……見ていてください。#n私、頑張りますから。"
10034040-229 = "必ず上手くなって……"
10034040-230 = "……今までとは違う私になってみせます！"
10034040-231 = "……。"
10034040-232 = "先生？"
10034040-233 = "……どうかしましたか？"
10034040-237 = "[ns23] \"……ううん、何でもないよ。\"\n[ns24] \"……まずは一旦、無茶しすぎないようにね。\""
10034040-240 = "ありがとうございます、先生。"
10034040-241 = "あ、体調管理なら任せてください！これでも丈夫な方なので！"
10034040-242 = "……先生！"
10034040-243 = "私、頑張りますね！"
10034040-245 = "（……数日後）"
10034040-251 = "先生……今、大丈夫？"
10034040-252 = "[s25] \"もしかして、練習を見に行ってもいいの？\"\n[s26] \"あれ、練習中だから来ないでって言ってなかった？\""
10034040-255 = "今はそういう冗談を言ってる場合じゃないの！"
10034040-256 = "その……。"
10034040-257 = "何か聞いてない？"
10034040-258 = "……アイリから。"
10034040-263 = "[ns27] \"……アイリ？\"\n[ns28] \"……何かあったの？\""
10034040-266 = "えっと、それが……"
10034040-267 = "……その、アイリがね。"
10034040-269 = "……2日前から、連絡が取れなくて。"
