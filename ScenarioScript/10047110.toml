[translation]
10047110-1 = "エピローグ;日常は続いていく"
10047110-3 = "[ns] \"素晴らしい作品ができたのはよかったけど。\""
10047110-6 = "[ns] \"また反省室かぁ……。\""
10047110-7 = "自業自得でしょ。#nむしろ、これだけで済んでびっくりというか……。"
10047110-12 = "そういえば……レナちゃんもいるんだねぇ……？"
10047110-13 = "自首したの。立ち入り禁止の場所に入って鐘を鳴らしたんだし。"
10047110-14 = "私は先輩どもと違って、真面目な生徒だからね。"
10047110-15 = "やっぱり、レナちゃんだったのですね。"
10047110-16 = "イヒッ、滅亡の鐘を鳴らすとは……大胆だねぇ……。"
10047110-17 = "滅亡ってどこが？あんなの全部でたらめだから！"
10047110-18 = "でも、願いが叶う魔法は発動しましたよ？"
10047110-19 = "願いが叶ったのはエリ先輩だけでしょ。"
10047110-20 = "いいえ、私も叶いました。"
10047110-21 = "今度、対バンがあるのですが、#nどんな曲で相手を圧倒しようかと悩んでいて……。"
10047110-22 = "でも、今回の追走劇の中で、自然と歌詞やメロディーが浮かんできたんです。"
10047110-23 = "ふふっ、おかげさまで一件落着です。"
10047110-24 = "既に頭の中にメロディーはできていて……聞きますか？"
10047110-25 = "だ、大丈夫！私は穏やかなツムギ先輩が好きなの！"
10047110-26 = "私はいつも穏やかですよ？"
10047110-27 = "つまり……いつも私のことが好き、ということでしょうか？"
10047110-34 = "シャーッ！！"
10047110-35 = "実は私も……気づいたことがあるの……。"
10047110-36 = "今度は何よ？"
10047110-40 = "前世の大切な存在を……思い出したんだぁ……イヒッ。"
10047110-44 = "最初は……そんな気がしてただけ……#nでも、どんどん確信に変わっていって……。"
10047110-45 = "相手が誰か、知りたくなぁい……？"
10047110-46 = "いや別に……どうせまた意味わかんないこと言うつもりでしょ？"
10047110-47 = "レナちゃんは……前世を信じないんだ。"
10047110-48 = "あの触れ合いの日々を忘れたなんて……悲しいよぉ……。"
10047110-49 = "な、何言ってんの？"
10047110-50 = "まさか、前世で私が先輩と……？"
10047110-51 = "私たちは……互いをとても大切にしていたのに……。"
10047110-52 = "私は飼い主で……。"
10047110-57 = "レナちゃんは、愛らしい猫……。"
10047110-63 = "シャーッ！やめろーっ！"
10047110-64 = "ですが、レナちゃんが愛らしいのは事実ですよ？"
10047110-65 = "シャーッ！もう！！"
10047110-67 = "ふふっ、でも……本当に、ありがとうございました。#nレナちゃんの力があったからこそ、みんなで一歩進めたんです。"
10047110-68 = "私は何も得られなかったけど……？"
10047110-69 = "にゅふふ、レナちゃんの願いも叶っています。"
10047110-70 = "え？どんな？"
10047110-71 = "みんなと楽しく過ごしたい、という願いです。"
10047110-72 = "だだ、誰がそんなお願いなんか！"
10047110-74 = "お、覚えてなさい！オカルトは迷信だって証明してやるんだから！"
10047110-75 = "ふふ、はい。分かっています。"
10047110-76 = "最近、寝る前に星占いの本を読んでいる……#nなんて知らないですし。"
10047110-77 = "……！"
10047110-78 = "私が錬金釜を使っている時、こっそり覗いてたのも……#n気づいてないよぉ。"
10047110-79 = "……！！"
10047110-80 = "にゅふふ。#nタロットがなぜ当たるのか熱心に聞いてくれたのは……#n忘れたくないですけど。"
10047110-81 = "……！！！"
10047110-82 = "[s] \"レナも……実はオカルトに興味が？\""
10047110-83 = "んもーっ！ほんっとうるさい連中ね！"
10047110-88 = "にゅふふ、では次の作品を考えますか。"
10047110-89 = "今度はどんな風にみなさんをビックリさせましょう？"
10047110-90 = "……びっくりさせないとダメなの？"
10047110-91 = "みんなを驚かせてこそ、革新的な芸術といえます！"
10047110-92 = "革新的……。"
10047110-93 = "それでしたら、評議会長が所有する博物館へ行きませんか？"
10047110-94 = "あそこは、ワイルドハントでも伝説的な芸術品たちが眠る場所。"
10047110-95 = "非公開にしている理由さえ秘密の、禁断の地……。"
10047110-96 = "そこならば、「創世の影像」に隠された学院の秘密を、#n見つけられるかもしれません。"
10047110-97 = "個人の博物館……私も、気になる。"
10047110-98 = "どんなオカルトがあるかなぁ……イヒッ……。"
10047110-99 = "カノエ先輩も行ったことがないのですか？"
10047110-100 = "そう……評議会長を除いて……#n入ったことのある者は、いない――"
10047110-105 = "あの「慈愛の怪盗」でさえ。"
10047110-109 = "そ、そんな場所に忍び込もうって、本気！？"
10047110-110 = "にゅふふ、みなさんとなら不可能などありません！#nそうですよね？"
10047110-115 = "あぁ……この顔……本気だ……。"
10047110-116 = "先生、なんとかしてよ！また何かやらかすよ！？"
10047110-117 = "[ns] \"話を聞いた感じ、実は私も気になるんだよね……。\""
10047110-121 = "[ns1] \"でも、まずは普通のやり方から試してみよう。\"\n[ns2] \"一般生徒も入れてもらえるように、頑張ってみるよ。\""
10047110-124 = "普通じゃないやり方は、任せてねぇ……。"
10047110-125 = "イヒッ……イヒヒヒッ……！"
10047110-126 = "こうなったカノエ先輩は、もう誰にも止められません。#n私も胸が高鳴ります。"
10047110-127 = "にゅふふ、これで次の活動は決まりましたね！"
10047110-131 = "オカルト研究会の会長として、宣言いたします！"
10047110-132 = "次の目標は……「評議会長の博物館」！#nそこに秘められしオカルトを、一つ残らず暴きましょう！"
10047110-133 = "はぁ……もうやだぁ……。"
10047110-135 = "（果たして次のオカ研の計画は成功するのか……）"
10047110-141 = "……ふふ、興味深い……次回も楽しみにしておりますよ。"
10047110-142 = "「寮監隊の幹部」として。そして――"
10047110-143 = "「慈愛の怪盗」としても。"
10047110-144 = "また会える日が、楽しみです。"
10047110-153 = "どのような演目になるか……私にもまだ、分かりませんが。#nふふふっ……。"
10047110-154 = "我らオカルト研究会！～学院の不思議と古の呪文～"
