[translation]
10047110-1 = "Epílogo; A vida cotidiana continua"
10047110-3 = "[ns] \"É bom que tenhamos criado uma obra maravilhosa, mas...\""
10047110-6 = "[ns] \"De novo na sala de detenção...\""
10047110-7 = "Você colheu o que plantou, não foi?#nNa verdade, estou até surpresa que tenha terminado só nisso..."
10047110-12 = "Falando nisso... a Rena-chan também está aqui, né...?"
10047110-13 = "Eu me entreguei. Afinal, entrei em uma área proibida e toquei o sino."
10047110-14 = "Diferente das minhas veteranas, eu sou uma aluna séria, sabe."
10047110-15 = "Então era você mesma, Rena-chan."
10047110-16 = "Ihi, tocar o sino da destruição... que audacioso, né..."
10047110-17 = "Destruição? Onde? Aquilo tudo é uma bobagem!"
10047110-18 = "Mas a magia de realizar desejos foi ativada, não foi?"
10047110-19 = "O desejo que se realizou foi só o da veterana Eri, né."
10047110-20 = "Não, o meu também se realizou."
10047110-21 = "Temos uma batalha de bandas em breve, e#nestou preocupada sobre qual música usar para superar o oponente..."
10047110-22 = "Mas, durante a perseguição de hoje, a letra e a melodia surgiram naturalmente."
10047110-23 = "Fufu, graças a isso, o caso está encerrado."
10047110-24 = "A melodia já está na minha cabeça... quer ouvir?"
10047110-25 = "N-não, tudo bem! Eu gosto da veterana Tsumugi calma!"
10047110-26 = "Eu sou sempre calma, não sou?"
10047110-27 = "Ou seja... você sempre gosta de mim, é isso?"
10047110-34 = "Shhh!!"
10047110-35 = "Na verdade, eu também... percebi uma coisa..."
10047110-36 = "O que é agora?"
10047110-40 = "Lembrei-me de alguém importante da minha vida passada... ihi."
10047110-44 = "No começo... era só um palpite...#nmas, aos poucos, foi se tornando uma certeza..."
10047110-45 = "Você não quer saber quem é...?"
10047110-46 = "Não, nem um pouco... você vai dizer algo sem sentido de novo, né?"
10047110-47 = "A Rena-chan... não acredita em vidas passadas."
10047110-48 = "É triste que você tenha esquecido daqueles dias de convivência..."
10047110-49 = "Q-que você está dizendo?"
10047110-50 = "Não me diga que, na vida passada, eu e a veterana...?"
10047110-51 = "Nós... éramos muito importantes uma para a outra..."
10047110-52 = "Eu era a dona..."
10047110-57 = "E a Rena-chan era uma gata adorável..."
10047110-63 = "Shhh! Pare com isso!"
10047110-64 = "Mas é um fato que a Rena-chan é adorável, não é?"
10047110-65 = "Shhh! Chega!!"
10047110-67 = "Fufu, mas... muito obrigada, de verdade.#nFoi graças ao esforço da Rena-chan que todas nós conseguimos avançar um passo."
10047110-68 = "Mas eu não ganhei nada..."
10047110-69 = "Nyufufu, o desejo da Rena-chan também se realizou."
10047110-70 = "Hã? Qual?"
10047110-71 = "O desejo de querer se divertir com todo mundo."
10047110-72 = "Q-quem pediu uma coisa dessas?!"
10047110-74 = "E-espere só! Eu vou provar que o ocultismo é pura superstição!"
10047110-75 = "Fufu, sim. Eu sei."
10047110-76 = "Eu não sei de nada sobre você ler livros de astrologia antes de dormir..."
10047110-77 = "...!"
10047110-78 = "E eu também não percebi que você me espionava secretamente enquanto eu usava o caldeirão alquímico..."
10047110-79 = "...!!"
10047110-80 = "Nyufufu.#nEu não quero esquecer de como você me perguntou com tanto entusiasmo por que o tarô funciona..."
10047110-81 = "……！！！"
10047110-82 = "[s] \"Rena também…… na verdade, tem interesse em ocultismo?\""
10047110-83 = "Ah, chega! Vocês são um bando muito barulhento!"
10047110-88 = "Nyufufu, então vamos pensar na próxima obra."
10047110-89 = "Como vamos surpreender a todos desta vez?"
10047110-90 = "……É realmente necessário surpreender eles?"
10047110-91 = "Só é possível chamar de arte inovadora se surpreendermos a todos!"
10047110-92 = "Inovadora……."
10047110-93 = "Se é assim, por que não vamos ao museu que pertence à Presidente do Conselho?"
10047110-94 = "Aquele é o lugar onde repousam obras de arte lendárias, até mesmo para Wild Hunt."
10047110-95 = "Um lugar proibido, onde até o motivo de ser fechado ao público é um segredo……."
10047110-96 = "Se for lá, talvez possamos encontrar os segredos da academia escondidos na \"Imagem da Criação\"."
10047110-97 = "Um museu particular…… Eu também estou curiosa."
10047110-98 = "Que tipo de ocultismo será que tem lá…… Ihi……."
10047110-99 = "A veterana Kanoe também nunca foi lá?"
10047110-100 = "Exato…… Tirando a Presidente do Conselho…… #nninguém jamais entrou lá――"
10047110-105 = "Nem mesmo aquela \"Ladra da Benevolência\"."
10047110-109 = "V-vocês estão falando sério sobre invadir um lugar desses!?"
10047110-110 = "Nyufufu, com vocês, não existe nada impossível! #nNão é verdade?"
10047110-115 = "Ah…… essa cara…… ela está falando sério……."
10047110-116 = "Sensei, faça alguma coisa! Ela vai aprontar de novo!?"
10047110-117 = "[ns] \"Pelo que ouvi, na verdade, eu também estou curioso…….\""
10047110-121 = "[ns1] \"Mas, primeiro, vamos tentar do jeito normal.\"\n[ns2] \"Vou me esforçar para que alunos comuns também possam entrar.\""
10047110-124 = "Pode deixar os jeitos não convencionais comigo……."
10047110-125 = "Ihi…… Ihihihi……!"
10047110-126 = "Quando a veterana Kanoe fica assim, ninguém mais a segura. #nMeu coração também está acelerado."
10047110-127 = "Nyufufu, com isso, a próxima atividade está decidida!"
10047110-131 = "Como presidente do Clube de Pesquisa de Ocultismo, eu declaro!"
10047110-132 = "O próximo objetivo é…… o \"Museu da Presidente do Conselho\"! #nVamos desvendar todo o ocultismo escondido lá, sem deixar nada para trás!"
10047110-133 = "Ah…… não aguento mais……."
10047110-135 = "(Será que o próximo plano do Clube de Ocultismo vai dar certo……)"
10047110-141 = "……Fufu, interessante…… Estou ansiosa pela próxima vez também."
10047110-142 = "Como uma \"Executiva do Comitê Disciplinar\". E também――"
10047110-143 = "Como a \"Ladra da Benevolência\"."
10047110-144 = "Estou ansiosa pelo dia em que nos encontraremos novamente."
10047110-153 = "Que tipo de espetáculo será…… nem eu sei ainda. #nFufufu……."
10047110-154 = "Nós, o Clube de Pesquisa de Ocultismo! ~Os Mistérios da Academia e os Feitiços Antigos~"
