[translation]
83302300300-6 = "Ah! Hina-senpai!"
83302300300-7 = "Que surpresa encontrar você aqui, Ibuki."
83302300300-8 = "Escuta só, Hina-senpai! Lá no parque perto daqui!"
83302300300-9 = "Disseram que dá para comer uma panqueca enorme!"
83302300300-10 = "Eu adoro panquecas, então fiquei curiosa e vim ver!"
83302300300-11 = "Uma panqueca enorme... isso significa que, será que..."
83302300300-12 = "Como será que ela é, hein?"
83302300300-13 = "Eu adoraria passear junto com uma panqueca gigante!"
