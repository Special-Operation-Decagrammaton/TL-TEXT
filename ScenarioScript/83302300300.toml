[translation]
83302300300-6 = "あっ！ヒナ先輩！"
83302300300-7 = "こんなところで会うなんて意外ね、イブキ。"
83302300300-8 = "聞いてヒナ先輩！近くの公園でね～！"
83302300300-9 = "すっごく大きいパンケーキが食べられるんだって！"
83302300300-10 = "イブキ、パンケーキ大好きだから気になって来たの！"
83302300300-11 = "すごく大きいパンケーキ……ということは、やっぱり……"
83302300300-12 = "どんなんだろうね～？"
83302300300-13 = "おっきいパンケーキと一緒に散歩してみたいな～！"
