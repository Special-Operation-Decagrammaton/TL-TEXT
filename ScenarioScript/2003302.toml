[translation]
2003302-1 = "万魔殿の偉大な議長！"
2003302-2 = "（約束の時間に合わせ[ruby=パンデモニウム・ソサエティー]、万魔殿の[/ruby]前にやって来たところ……）"
2003302-7 = "[ns] \"……何かあったのかな？\""
2003302-10 = "さあ！もっと急げ！議長の像はまだか！？"
2003302-11 = "運搬中の車両から、もうすぐ到着するとの連絡がありました！"
2003302-13 = "よし、貴賓を迎え入れる儀礼の準備はどうなっている？"
2003302-15 = "最後のリハーサルを終え次第、議事堂の裏側で控える流れになっています！"
2003302-17 = "ふむ……順調だが、こういうときこそ最善の注意を払うべきだ。"
2003302-18 = "忘れてはならない！マコト議長は、この会合を最重要視していた。"
2003302-19 = "これからお迎えするお客様は、とても立場のあるお方だ。#nひとつのミスも許されはしない。"
2003302-20 = "万全を期してマコト議長の権威を証明するのが、我々に与えられた任務である！"
2003302-21 = "今日が万魔殿の底力を発揮する時だ！"
2003302-24 = "はいっ！！！"
2003302-30 = "[ns] \"こんにちは、取り込み中だったかな？\""
2003302-31 = "あ、[USERNAME]先生でしたか。ご無沙汰しております。"
2003302-32 = "せっかくお越しいただいたのに、お見苦しいところをお見せしました。"
2003302-33 = "[s] \"何かあったの？\""
2003302-34 = "あ、それが……マコト議長から13時にVVIP客が訪問されると言われまして。"
2003302-35 = "その方が誰なのか、ですか？"
2003302-36 = "ええっと、極秘事項だそうで私も知らされておらず――"
2003302-37 = "ただ、飛ぶ鳥を落とす勢いでキヴォトス全土を掌握せんとする方とは聞いております。"
2003302-38 = "[s] \"そ、そうなんだ……えっと、頑張ってね？\""
2003302-41 = "万魔殿・執務室前"
2003302-42 = "（その後も手際よく動く万魔殿の部員と挨拶を交わしながら数分、目的地に到着した）"
2003302-47 = "[ns] \"失礼しま――\""
2003302-48 = "いや！これも違うっ！"
2003302-52 = "[ns] \"……うん？\""
2003302-54 = "むむむ……これでもなければ……あれでもない……"
2003302-55 = "もう時間がないというのに……！"
2003302-56 = "まったくアイデアが浮かばないとは……！"
2003302-60 = "うおっ！？気づけばこんな時間に……！？"
2003302-61 = "ぐぐぐ……！一体どうすれば……何かいい方法は……"
2003302-62 = "[s] （マコト……あそこまで真剣に何を悩んでいるんだろう）"
2003302-67 = "シャーレの先生が部屋に入ってきたとき……どんな顔とポーズで迎えればいいのだ！？#nこの[ruby=はぬま]羽沼[/ruby]マコト様の威厳を知らしめるには……！"
2003302-68 = "[s] \"そんなことで悩んでたの！？\""
2003302-69 = "ぬおわあぁぁぁぁぁっ！？"
2003302-73 = "ゲホゲホゲホゲホッ……！！！"
2003302-74 = "[s] \"マコト！大丈夫！？\""
2003302-75 = "ゲホッゲホッ、はぁ……はぁ……"
2003302-76 = "……はぁぁ。"
2003302-77 = "……ふぅ。"
2003302-78 = "あぁ、先生か。"
2003302-79 = "うむ、待ちくたびれていたぞ。"
2003302-80 = "[s] （さっきまで、ものすごく慌てていたような……）"
2003302-81 = "ん？ところで、なぜ先生がもうここに……"
2003302-82 = "今は儀礼の時間のはずだが……"
2003302-83 = "[s1] （まさかとは思っていたけど、さっきの準備は……）\n[s2] （勘違いだったら恥ずかしいし、知らないふりしてたけど……）"
2003302-86 = "キキキッ。そうか……そういうことか。"
2003302-87 = "形式的な儀礼なんぞ、何も意味を持たぬ……"
2003302-88 = "そんなもので時間を無駄にするくらいなら、さっさと本題に入るべきだと！"
2003302-89 = "[s] \"いや、無駄とは思ってな……\""
2003302-90 = "キキキキッ！ さすが、このマコト様の心を鷲掴みにしただけはある！"
2003302-91 = "ああ！それでこそ、この羽沼マコト様に[ruby=ふさわ]相応[/ruby]しい！"
2003302-92 = "やはり、私の目に狂いは無いっ！"
2003302-93 = "[s] \"そこまで褒められると逆に恥ずかしいんだけど！？\""
2003302-94 = "よし、決めた！"
2003302-95 = "部員たちには、全ての行事を中止するよう伝えておく。"
2003302-96 = "今日は私と先生の二人で、内密な会話をしようじゃないか。"
2003302-97 = "では、しばらく外で待っていてくれ。"
2003302-98 = "準備を終えたら、すぐに声をかけよう。"
2003302-99 = "[s] \"う、うん。\""
2003302-101 = "（そうして、外で待っていると……）"
2003302-102 = "これはここに置いて……あぁ、これはあそこに……"
2003302-108 = "むむ！どこに隠れている！「エンペラー・ライオンマル・ジュニア3世」！お前の出番だ！"
2003302-118 = "くっ！すばしっこい奴め！！"
2003302-119 = "大人しく、するのだっ……！"
2003302-120 = "よし！"
2003302-121 = "[ns] \"………………。\""
2003302-122 = "（……ようやく物音が鳴り止んだ）"
2003302-123 = "はぁ……はぁ…………うむ、入りたまえ。"
2003302-124 = "[s] \"えっと、失礼します……\""
2003302-130 = "[wa:500]― [log=마코토]キシシッ、[wa:1100]先生よ、[wa:1300]活躍はみていたぞ。[/log]"
2003302-133 = "[wa:200]― [log=마코토]お前は他人を助け、[wa:1350]事件を解決し……[/log]"
2003302-134 = "[wa:1350]― [log=마코토]シャーレの名声を上げてきた！[/log]"
2003302-137 = "[wa:500]― [log=마코토]キキキッ、[wa:1400]ここまできたら、[/log]"
2003302-138 = "[wa:1400]― [log=마코토]もはや[wa:550]認めざるをえないだろう――[/log]"
2003302-141 = "― [log=마코토]そう、[wa:1300]お前がこのマコト様と[wa:1300]肩を並べるほどの、[/log]"
2003302-142 = "[wa:900]― [log=마코토]実力者であるということを！[/log]"
2003302-145 = "[ns] \"じ、実力者……？\""
2003302-146 = "[wa:1000]― [log=마코토]その能力を高く評価し……[/log]"
2003302-147 = "[wa:2100]― [log=마코토]断れない重大な提案を[wa:1300]しようじゃあないか。[/log]"
2003302-150 = "― [log=마코토]シャーレの先生よ、[wa:2700]我が万魔殿と……[/log]"
2003302-151 = "[wa:2900]― [log=마코토]いや、[wa:1400]この羽沼マコト様と[wa:1100]手を組め！[/log]"
2003302-154 = "[ns] \"え、えっと……\""
2003302-155 = "[wa:1600]― [log=마코토]我々が力を合わせれば、[/log]"
2003302-156 = "[wa:1800]― [log=마코토]キヴォトスの征服など[wa:700]容易い！[/log]"
2003302-159 = "[wa:200]― [log=마코토]もしもそうなったら、[/log]"
2003302-160 = "[wa:1400]― [log=마코토]キヴォトスの半分をシャーレに渡すとしよう。[/log]"
2003302-163 = "― [log=마코토]どうだ、[wa:900]悪くない取引だろう？[/log]"
2003302-166 = "[wa:500]― [log=마코토]さあ！[wa:300]先生！[wa:1000]この私と！[wa:1200]遠大な夢を[wa:1100]叶えようじゃないか！[/log]"
2003302-167 = "[wa:2100]― [log=마코토]キキキッ、[wa:1200]キシシシシシシッ！[/log]"
2003302-170 = "キキキッ。どうだ、私の提案は？"
2003302-171 = "[USERNAME]先生、お前も断ろうとは思わない魅力的な――"
2003302-175 = "うおっ！？ライオンマル！こ、こいつ！？噛むのはやめるのだ！！"
2003302-176 = "……は、は、はくしょんっ！！！"
2003302-181 = "[ns3] \"あ、うん……提案はありがたいけど、ごめんね。\"\n[ns4] \"シャーレの仕事だけでも忙しいから。\""
2003302-184 = "なん、だと……！？"
2003302-185 = "こ、この羽沼マコト様の魅力的な提案を……こうもあっさりと断るだと……！？"
2003302-186 = "たしか先生は、富や名声には興味が無いのだとか……"
2003302-187 = "だから、このマコト様の提案にも乗ってこないはずだとチアキから聞いてはいたが……#nまさか、本当に断られるとは！"
2003302-188 = "[s5] （……富？）\n[s6] （……名声？）"
2003302-191 = "キキッ……キキキッ……"
2003302-192 = "キャハハハハッ！"
2003302-193 = "[s] \"だ、大丈夫……？\""
2003302-194 = "だが！私は失望などしてないぞ！先生よ！"
2003302-195 = "この羽沼マコトは、真のリーダーとして引き際[ruby=わきま]を弁え[/ruby]ている！"
2003302-196 = "シャーレの仕事で忙しいのなら仕方ない。#nマコト様は相手に合わせて柔軟な対応ができるのだ！"
2003302-197 = "うむ。ひとまず今日のところは、顔合わせで満足するとしよう。"
2003302-198 = "先生が万魔殿に協力するのも時間の問題だしな！"
2003302-199 = "キキキキキッ！！"
2003302-200 = "では、今後もよろしく頼んだぞ！シャーレの[USERNAME]先生！"
2003302-201 = "[s] \"う、うん……こちらこそよろしくね、マコト。\""
2003302-203 = "（……こうしてマコトとの記念すべき顔合わせは、平穏？に終わった）"
