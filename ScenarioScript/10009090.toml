[translation]
10009090-1 = "Epílogo parte 2; Medidas de segurança"
10009090-3 = "Afinal, quando falamos do núcleo da segurança, estamos falando de controle de acesso."
10009090-8 = "Para isso, é preciso cumprir três elementos:#nConfidencialidade, integridade e disponibilidade."
10009090-9 = "Impedir a passagem de quem não tem autorização.#nBem, em resumo, é ignorar códigos incorretos e permitir apenas os corretos."
10009090-10 = "Dizem que conceitos semelhantes já existiam desde a antiguidade."
10009090-11 = "E, como meio para garantir uma alta \"integridade\",#npodemos citar a \"criptografia\"—"
10009090-12 = "Os tamanhos de bloco de criptografia mais adotados são três: 128 bits, 192 bits e 256 bits."
10009090-13 = "Pretendo usar 256 bits como padrão daqui para frente para melhorar nossas políticas de segurança."
10009090-14 = "Este algoritmo de criptografia#nconsiste em quatro processos—"
10009090-21 = "Primeiro, a partir da chave de criptografia principal de 256 bits,#ngeramos várias chaves de rodada de 128 bits usadas em cada rodada—"
10009090-22 = "Depois, passamos para a rodada 0.#nUsamos a primeira chave de rodada e executamos o algoritmo de criptografia uma vez."
10009090-23 = "Em seguida, executamos sequencialmente um protocolo de segurança de 4 etapas baseado em uma matriz 4x4, repetindo isso um total de 13 vezes, da rodada 1 à 13."
10009090-24 = "Na 14ª e última rodada, executamos as chaves de segurança anteriores novamente em ordem para finalizar a criptografia."
10009090-26 = "Bem, ainda assim... dizem que, na batalha entre atacante e defensor, a maioria termina com a vitória do atacante."
10009090-27 = "O desenvolvimento da ciência e da tecnologia afetou até mesmo o campo da segurança,#ne, no final, colocou ambos em uma relação de igualdade."
10009090-28 = "(Chihiro começou a se perder em seu próprio mundo—)"
10009090-29 = "Hum... eu não entendo essas coisas complicadas, mas...#nexiste algum jeito de... desativar isso?"
10009090-30 = "Hmm, a menos que você destrua a entrada fisicamente, acho que é impossível, não é?"
10009090-35 = "……."
10009090-36 = "Como sempre, estas instalações são antigas..."
10009090-41 = "Ah, mas o sistema de segurança foi melhorado, não é?#nA fechadura da porta mudou... mas as dobradiças, que são o ponto principal, estão caindo aos pedaços."
10009090-42 = "……Cheio de brechas.#nUfufu, acha que isso é o suficiente para me parar?"
10009090-49 = "Bem... já que a porta está aberta, vamos indo?"
10009090-55 = "Ufufu♡"
10009090-56 = "Você não pode escapar de mim...!"
