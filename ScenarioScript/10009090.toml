[translation]
10009090-1 = "後日談その2;セキュリティ対策"
10009090-3 = "やっぱりセキュリティの核心といえば、アクセス制限だよね。"
10009090-8 = "それには、3つの要素を満たさなくちゃいけない。#n機密性と完全性、そして可用性。"
10009090-9 = "資格がない者を通さないようにする事。#nまぁ要するに、誤ったコードはスルーして、正しいものだけを許可するんだけど。"
10009090-10 = "似たような概念は、古代から存在したとも言われているね。"
10009090-11 = "それと、高い「完全性」を確保するための手段として、#n「暗号化」が挙げられるんだけど――"
10009090-12 = "最も多く採用されている暗号化のブロック長は、128ビット、192ビット、256ビットの3つ。"
10009090-13 = "今後は256ビットを基準にして、セキュリティ政策を改善しようと思ってるの。"
10009090-14 = "この暗号のアルゴリズムは、#n4つの処理で成り立っているんだけど――"
10009090-21 = "まず、256ビットのメイン暗号キーから、#n各ラウンドで使う複数の128ビットのラウンドキーを生成して――"
10009090-22 = "そうしたら次は0ラウンド。#nラウンドキーの1番目を使用して、暗号アルゴリズムを1回実行する。"
10009090-23 = "そうしたら、4次行列を基盤とした4段階のセキュリティプロトコルを順番に実行して、1から13ラウンドまで計13回繰り返す。"
10009090-24 = "最後の14ラウンド目に、今までのセキュリティキーを再度順番に実行することで、暗号化を終えるの。"
10009090-26 = "まぁ、それでも……攻撃側と防御側の戦いは、その多くが攻撃側の勝利で終わると言われているけどね。"
10009090-27 = "科学と技術の発展はセキュリティの領域にまで影響を及ぼし、#n最終的には両者を対等な関係として成り立たせたんだ。"
10009090-28 = "（チヒロがどんどん自分の世界に入っていった――）"
10009090-29 = "あの……難しいことは分からないんですが、#nその……それを解除する方法は……？"
10009090-30 = "うーん、入り口を物理的に破壊でもしない限り、不可能じゃないかな？"
10009090-35 = "……。"
10009090-36 = "相変わらず古い施設ですね……。"
10009090-41 = "ああでも、セキュリティシステムは改善したのですね。#nドアロックも変わって――ですが、肝心の蝶番はボロボロ。"
10009090-42 = "……隙だらけです。#nうふふ、この程度で私を止められると？"
10009090-49 = "さてと……ドアも開いたことですし、参りましょうか？"
10009090-55 = "うふふっ♡"
10009090-56 = "私からは逃げられませんよ……！"
