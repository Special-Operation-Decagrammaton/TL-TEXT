[translation]
1300708-1 = "Gourmet não tão solitário"
1300708-2 = "Perto da Academia Shanhaijing - Chinatown"
1300708-3 = "Ah~, estava realmente delicioso!"
1300708-4 = "Como dizem os rumores, qualquer prato nesta Chinatown é uma delícia!"
1300708-5 = "O arroz frito, o porco assado, os pães recheados... tudo estava incrível!"
1300708-6 = "Valer a pena ter vindo de tão longe, hehe."
1300708-7 = "Hm? Você está cheio e quer descansar um pouco antes de continuar?"
1300708-8 = "Nem pensar! A gente nem percorreu metade do caminho ainda!"
1300708-9 = "Se não nos esforçarmos, não vamos conseguir provar toda a comida hoje!"
1300708-10 = "Hmm... mas é verdade, comemos muita coisa gordurosa..."
1300708-14 = "Ah, então que tal descansarmos um pouco naquele café ali?"
1300708-17 = "[wa:2000]— É, [wa:1000] o, [wa:800] o quê? [wa:1200] Por que está me olhando assim?"
1300708-19 = "— (...Ai, [wa:1000] sério...)"
1300708-22 = "— Vamos descansar um pouco e [wa:1500] depois comer mais, né? [wa:2500] O que vamos comer agora?"
1300708-25 = "[wa:3000]— Que delícia♪"
1300708-28 = "— O quê? [wa:1200] Quer beber junto!?"
1300708-30 = "— Não diga coisas estranhas! [wa:1500] Eu te mato, sabia!?"
1300708-33 = "— (...Você está me provocando, [wa:1500] né? [wa:1000] É isso, né? [wa:1500] Mesmo só tendo um canudo...)"
1300708-35 = "[wa:200]— (...Mas se for o Sensei... [wa:1800] Tudo be...)"
1300708-38 = "— ...Não!! [wa:500] Definitivamente não pode!!"
1300708-41 = "Ah~, comi tanto."
1300708-42 = "O dia de hoje foi realmente satisfatório! Comi muita comida gostosa!"
1300708-43 = "E além disso, pude comer a sós com o Sensei..."
1300708-44 = "N-não entenda errado! Comida gostosa é boa mesmo que você esteja sozinho!"
1300708-45 = "Mas, no fim das contas... comer acompanhada é muito mais... divertido, e..."
1300708-46 = "Da próxima vez, você vai sair para comer comigo de novo?"
1300708-47 = "[s] \"Com certeza.\""
1300708-51 = "Sério? É uma promessa, hein! Prometido, prometido!"
1300708-53 = "Depois disso, voltei para a academia junto com uma Junko muito feliz."
