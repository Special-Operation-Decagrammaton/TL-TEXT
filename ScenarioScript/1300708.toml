[translation]
1300708-1 = "孤独じゃないグルメ"
1300708-2 = "山海経高級中学校付近・中華街"
1300708-3 = "はあ～、ほんっとーに美味しかった！"
1300708-4 = "噂通り、この中華街の料理は何でも美味しい！"
1300708-5 = "チャーハンも、チャーシューも、肉まんも……全部すごかった！"
1300708-6 = "わざわざ遠くから来た甲斐があったわね、ふふっ。"
1300708-7 = "ん？お腹がいっぱいだから少し休んでから行きたい、って？"
1300708-8 = "ダメ！まだ半分も巡れてないんだから！"
1300708-9 = "頑張って回らないと、今日中にすべての料理が味わえないじゃん！"
1300708-10 = "うーん……でもたしかに、脂っこいものばかり食べたし……。"
1300708-14 = "あ、じゃあそこのカフェでちょっと休んでからにする？"
1300708-17 = "[wa:2000]― え、[wa:1000]な、[wa:800]なに。[wa:1200]なんでそんな目で見るの？"
1300708-19 = "― （……もう、[wa:1000]本当に……）"
1300708-22 = "― ちょっと休んで、[wa:1500]また食べに行くんでしょ？[wa:2500]次は何食べる？"
1300708-25 = "[wa:3000]― おいしー♪"
1300708-28 = "― なに？[wa:1200]一緒に飲もうって！？"
1300708-30 = "― 変なこと言わないで！[wa:1500]殺すよ！？"
1300708-33 = "― （からかってるよね、[wa:1500]これ？[wa:1000]そうだよね？[wa:1500]ストロー、一本しかないのに……）"
1300708-35 = "[wa:200]― （……でも先生なら……。[wa:1800]大丈……）"
1300708-38 = "― ……やっ！！[wa:500]やっぱだめ！！"
1300708-41 = "ああ～いっぱい食べた～。"
1300708-42 = "今日一日、本当に大満足！美味しい料理もたくさん食べたし！"
1300708-43 = "それに、先生と二人っきりで食事できたし……。"
1300708-44 = "か、勘違いしないで！美味しい料理は一人でも十分美味しいから！"
1300708-45 = "でもやっぱり……一人で食べるより二人で食べた方がもっと……楽しい、し……。"
1300708-46 = "次もまた、一緒に、ご飯食べに行ってくれる？"
1300708-47 = "[s] \"もちろん。\""
1300708-51 = "本当？約束だからね！絶対よ、絶対！"
1300708-53 = "その後、嬉しそうなジュンコと一緒に学園に戻った。"
