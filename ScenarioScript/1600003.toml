[translation]
1600003-1 = "Falha de comunicação"
1600003-2 = "P-Professor! V-você realmente veio...!"
1600003-3 = "B-bem... primeiro de tudo, obrigada... por atender a um pedido de alguém como eu..."
1600003-4 = "Bem... na verdade... como aconteceu aquilo outro dia, eu queria retribuir de alguma forma..."
1600003-5 = "D-desculpe, o Professor está tão ocupado, eu não deveria tomar seu tempo com explicações..."
1600003-8 = "...Bem, aqui está... é uma oferenda..."
1600003-9 = "[s] \"...Um vaso de plantas?\""
1600003-10 = "S-sim... é uma erva daninha, mas fui eu quem cultivei... ficaria feliz se pudesse aceitar..."
1600003-11 = "..."
1600003-12 = "D-desculpe...! Pensando bem, não tem utilidade nenhuma e não vale nada...!"
1600003-13 = "Q-que falta de educação dar algo assim de presente...!!"
1600003-14 = "Desculpe, desculpe, desculpe, desculpe, desculpe, desculpe, desculpe...!"
1600003-15 = "...Eh?"
1600003-16 = "Fico feliz que ache bem cuidado...? V-você está falando sério...?"
1600003-17 = "...Mas, por que ervas daninhas em vez de flores, você pergunta?"
1600003-18 = "I-isso é, bem..."
1600003-19 = "E-hehe... é que... meu hobby é cultivar ervas daninhas..."
1600003-20 = "Ervas daninhas são... como posso dizer... somos parecidas, de certa forma... elas me lembram um pouco de mim..."
1600003-21 = "Não têm utilidade nenhuma... e estão sempre por aí, só atrapalhando ou causando problemas..."
1600003-22 = "Não valem nada, mas aparecem em todo lugar... esse tipo de coisa..."
1600003-23 = "Sinto que elas se parecem comigo... como dizem, os semelhantes se atraem..."
1600003-24 = "[s1] \"Entendo. Mas elas são muito bonitas.\"\n[s2] \"Ervas daninhas são legais, né?\""
1600003-25 = "...Eh?"
1600003-26 = "...Eh?"
1600003-27 = "P-Professor... o que você quer dizer com..."
1600003-28 = "[s3] \"Gosto dessa postura inabalável e constante.\"\n[s4] \"É como se estivessem sempre por perto.\""
1600003-29 = "..."
1600003-30 = "..."
1600003-31 = "Professor...?"
1600003-34 = "(O-o que isso significa...? Será que, não, impossível! Mas, eh, será que ele está falando de mim...?)"
1600003-35 = "(O-o Professor... está me elogiando agora...!?)"
1600003-36 = "(N-não... não pode ser...! Idiota, lá vai você se iludir de novo sozinha...!)"
1600003-37 = "(...M-mas)"
1600003-38 = "(Estamos sozinhos, será que...)"
1600003-39 = "(Será que...!?)"
1600003-40 = "...Rustl"
1600003-41 = "...?"
1600003-42 = "Wiggle"
1600003-43 = "...U-um... inseto...?"
1600003-44 = "Saindo do vaso... um inseto..."
1600003-45 = "..."
1600003-46 = "............não perdoo."
1600003-47 = "Não vou perdoar... quem deu permissão...? Quem disse que você podia entrar aí...?"
1600003-48 = "Algo que eu ia dar para o Professor, e você se atreve a entrar assim..."
1600003-49 = "Eu não vou perdoar...!"
1600003-50 = "[s] \"...Haruka?\""
1600003-51 = "Não vou perdoar, não vou perdoar, não vou perdoar, não vou perdoar, não vou perdoar...!"
1600003-52 = "[s] \"Haruka, espere...!\""
1600003-53 = "Vou acabar com você!! AAAAAAAAAAAAAAA!!!"
1600003-55 = "CRASH, BAMMMMMMM!!!!!"
1600003-56 = "Pá!!"
1600003-57 = "Splaft!"
1600003-58 = "……"
1600003-59 = "……？"
1600003-60 = "……～～!!"
1600003-62 = "（……）"
1600003-63 = "（Terra e folhas se espalharam do vaso quebrado pelo tiro, e eu recebi tudo no rosto）"
1600003-64 = "（Minha visão está completamente bloqueada, não consigo ver nada à frente）"
1600003-65 = "[s] （Limpando lentamente a terra do rosto）"
1600003-67 = "（……？）"
1600003-68 = "（……Quando consegui abrir os olhos novamente, Haruka não estava mais em lugar nenhum）"
1600003-69 = "（Só restaram o vaso quebrado, terra, folhas e alguns insetos）"
