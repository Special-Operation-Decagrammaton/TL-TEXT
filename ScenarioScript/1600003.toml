[translation]
1600003-1 = "コミュニケーション上の間違い"
1600003-2 = "せ、先生！ほ、本当に来てくださったんですね……！"
1600003-3 = "え、えっと……まずはありがとうございます……私なんかのお願いを、聞いてくださるなんて……。"
1600003-4 = "えっと……実は……先日のこともあったので、私なりのお返しをと……。"
1600003-5 = "す、すみません、先生はお忙しいのに、こうして説明で時間を頂くわけにも……。"
1600003-8 = "……えっと、こちらを……上納品です……。"
1600003-9 = "[s] \"……植木鉢？\""
1600003-10 = "は、はい……雑草ですが、私が育てました……受け取ってもらえると嬉しいです……。"
1600003-11 = "……。"
1600003-12 = "す、すみません……！よく考えたら使い道も無いですし、何の価値も無いのに……！"
1600003-13 = "こ、こんなものをプレゼントだなんて失礼なことを……！！"
1600003-14 = "すみませんすみませんすみませんすみませんすみませんすみませんすみません……！"
1600003-15 = "……え？"
1600003-16 = "綺麗にお手入れされてて嬉しい……？ほ、本当ですか……？"
1600003-17 = "……それよりもどうしてお花じゃなくて雑草なのか、ですか？"
1600003-18 = "そ、それは、えっと……。"
1600003-19 = "え、えへへ……その……私の趣味が、雑草を育てることで……。"
1600003-20 = "雑草は……なんていうか、その……似た者同士と言いますか……なんだか、私みたいで……。"
1600003-21 = "これといった使い道もないし……いつもその辺にいるのに邪魔ばかりというか、迷惑をかけてばかりで……。"
1600003-22 = "価値もないくせにあちこちに顔を出すところか……そういうところとが……。"
1600003-23 = "わ、私に似てる気がして……類は友を呼ぶと言いますか……。"
1600003-24 = "[s1] \"そっか。でも、こんなにキレイだよ。\"\n[s2] \"雑草って良いよね。\""
1600003-25 = "……え？"
1600003-26 = "……え？"
1600003-27 = "せ、先生……それはどういう……。"
1600003-28 = "[s3] \"いつも変わらない、折れない姿勢が良いよね。\"\n[s4] \"いつも近くにいてくれるっていうか。\""
1600003-29 = "……。"
1600003-30 = "……。"
1600003-31 = "先生……？"
1600003-34 = "（そ、それって……？も、もしかして、いやまさか！でも、え、私の話……？）"
1600003-35 = "（せ、先生……今、私のことを褒めてくれてる……！？）"
1600003-36 = "（い、いや……そんなはずは……！バカ、また一人でそうやって勘違いして……！）"
1600003-37 = "（……で、でも）"
1600003-38 = "（二人っきりだし、もしかして……）"
1600003-39 = "（もしかして……！？）"
1600003-40 = "……カサッ"
1600003-41 = "……？"
1600003-42 = "ニュッ"
1600003-43 = "……む……虫……？"
1600003-44 = "植木鉢から……虫……。"
1600003-45 = "……。"
1600003-46 = "…………さない。"
1600003-47 = "許さない……誰が許可しましたか……？誰がそこに入っても良いと……？"
1600003-48 = "せっかく先生にお渡しするものに、勝手に入り込むなんて……。"
1600003-49 = "許さない……！"
1600003-50 = "[s] \"……ハルカ？\""
1600003-51 = "許さない許さない許さない許さない許さない許さない……！"
1600003-52 = "[s] \"ハルカ、待っ……！\""
1600003-53 = "消しますっ！！ああああああああああっ！！！"
1600003-55 = "ガシャッ、ダーンッッッ！！！！！"
1600003-56 = "パァンッ！！"
1600003-57 = "べちゃっ！"
1600003-58 = "……"
1600003-59 = "……？"
1600003-60 = "……～～っ！"
1600003-62 = "（……）"
1600003-63 = "（銃弾で割れた植木鉢から泥と葉っぱが飛び散り、それを顔で受け止めた）"
1600003-64 = "（視界が完全に隠れて前が見えない）"
1600003-65 = "[s] （顔に付いた土をゆっくりと払う）"
1600003-67 = "（……？）"
1600003-68 = "（……もう一度目を開けられた時には、ハルカの姿はどこにもなかった）"
1600003-69 = "（残されたのは割れた植木鉢、泥に葉っぱ、それから虫たちだけだった）"
