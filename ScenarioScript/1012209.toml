[translation]
1012209-1 = "Está tudo bem agora"

1012209-4 = "...Ah, professora."

1012209-5 = "[s] \"Bom dia.\""

1012209-9 = "Estou começando a me sentir um pouco envergonhado..."

1012209-10 = "Ah, sente aí! ?"

1012209-15 = "(Sentado na praia, Mika se inquieta e tira sua lancheira)"

1012209-19 = "Tentei fazer um sanduíche..."

1012209-20 = "Quanto ao sabor... bem... sim, acho que está tudo bem!"

1012209-21 = "Ah, você pode abri-lo...?"

1012209-22 = "[s] \"Agora, o sanduíche da Mika...!\""

1012209-23 = "Sim! !"

1012209-28 = "O que importa é o sabor, certo? ...Você diz isso, certo?"

1012209-29 = "Tenho certeza que é delicioso..."

1012209-30 = "……."

1012209-31 = "Bem, tentei seguir a receita...?"

1012209-32 = "[ns] \"Posso sentir o trabalho duro de Mika.""

1012209-33 = "Ehehe... experimente!"

1012209-37 = "(peguei um sanduíche)"

1012209-40 = "[ns] \"Itadakimasu!\""

1012209-42 = "Bom, eu também..."

1012209-46 = "[ns] \"Talvez seja um sabor único...\""

1012209-47 = "……."

1012209-48 = "Huh?"

1012209-49 = "P-por que...? Você seguiu a receita exatamente?"

1012209-50 = "Como não tenho maionese, coloco molho de ostra..."

1012209-51 = "Eu não gosto de picles, então só como um pouquinho..."

1012209-52 = "Ouvi dizer que no verão as pessoas costumam ter falta de sal, então coloquei muito sal e também muito açúcar..."

1012209-53 = "[s] \"Esta é... a receita original de Mika!\""

1012209-54 = "Ah, porque! Achei que com certeza seria uma delícia!"

1012209-59 = "Ei, professor! ? Se não estiver delicioso, não se force a comê-lo...!"

1012209-60 = "foto?"

1012209-61 = "Dá para sentir a sinceridade e é uma delícia...?"

1012209-62 = "Uuuuu..."

1012209-63 = "Desculpe... era para ser um sanduíche delicioso..."

1012209-64 = "[s] \"Isso me deixa feliz. Obrigado, Mika.""

1012209-65 = "...Ehehe."

1012209-66 = "Obrigado, senhor."

1012209-70 = "Esse sou eu..."

1012209-71 = "Talvez tenha mudado um pouco?"

1012209-72 = "Antes, se eu falhasse, me sentiria frustrado e deprimido o tempo todo..."

1012209-73 = "Agora...talvez não seja assim...?"

1012209-74 = "Vamos fazer algo delicioso da próxima vez! Isso é o que eu acho..."

1012209-75 = "[s] \"Você se tornou um pouco mais positivo.\""

1012209-76 = "É assim mesmo?"

1012209-77 = "Talvez seja porque meu professor está sempre comigo."

1012209-78 = "O sanduíche também estava delicioso, hehe."

1012209-79 = "……."

1012209-80 = "Eu apenas pensei sobre isso. Me pergunto se ela não precisa ser uma garota maravilhosa, perfeita, boa..."

1012209-81 = "Sou sempre desajeitado, cometo erros, e desta vez minhas mãos estão cobertas de hematomas..."

1012209-82 = "Ainda está tudo bem... certo?"

1012209-85 = "[ns1] \"Claro.\"\n[ns2] \"Tenho certeza que vai ficar tudo bem.\""

1012209-91 = "...Sim! !"

1012209-92 = "De agora em diante, para todo o sempre..."

1012209-93 = "Prazer em conhecê-lo, professor."

