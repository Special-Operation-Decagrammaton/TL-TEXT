[translation]
1012209-1 = "もう、大丈夫"
1012209-4 = "……あ、先生。"
1012209-5 = "[s] \"おはよう。\""
1012209-9 = "なんだか恥ずかしくなってきちゃったな……。"
1012209-10 = "あ、あそこ座ろ！？"
1012209-15 = "（浜辺に座ると、ミカはごそごそと弁当を取り出した）"
1012209-19 = "サンドイッチを作ってみたんだけど……。"
1012209-20 = "味も……いや……うん、大丈夫だと思うよ！"
1012209-21 = "あ、開けるね……？"
1012209-22 = "[s] \"さて、ミカのサンドイッチは……！\""
1012209-23 = "えいっ！！"
1012209-28 = "大切なのは味って言うでしょ？……言うよね？"
1012209-29 = "きっと美味しいから――"
1012209-30 = "……。"
1012209-31 = "れ、レシピ通りにやってみたんだよ……？"
1012209-32 = "[ns] \"ミカの頑張りが伝わってくるよ。\""
1012209-33 = "えへへ……食べてみて！"
1012209-37 = "（サンドイッチを一つ取った）"
1012209-40 = "[ns] \"いただきます！\""
1012209-42 = "じゃ、私も……。"
1012209-46 = "[ns] \"ちょっと、個性的な味かも……。\""
1012209-47 = "……。"
1012209-48 = "あれっ？"
1012209-49 = "な、なんで……？ちゃんとレシピ通りにやったんだよ……？"
1012209-50 = "マヨネーズがないから、オイスターソースを入れたり――"
1012209-51 = "ピクルスは苦手だから、ちょっとだけにして――"
1012209-52 = "夏は塩分が不足しがちって聞いたから、お塩をたくさん入れて、あとお砂糖も多めに……。"
1012209-53 = "[s] \"これは……ミカのオリジナルレシピだね！\""
1012209-54 = "だ、だって～！絶対美味しくなるって思ったんだも～ん！"
1012209-59 = "せ、先生！？美味しくないなら無理に食べなくても……！"
1012209-60 = "え？"
1012209-61 = "真心が感じられて、美味しい……？"
1012209-62 = "うぅぅ……。"
1012209-63 = "ごめんね……美味しいサンドイッチになるはずだったんだけど……。"
1012209-64 = "[s] \"その気持ちが嬉しいんだよ。ありがとう、ミカ。\""
1012209-65 = "……えへへ。"
1012209-66 = "ありがと、先生。"
1012209-70 = "あれ、私……。"
1012209-71 = "ちょっとだけ……変わったかも？"
1012209-72 = "前は失敗しちゃったら、悔しくてずっと落ち込んでたのに――"
1012209-73 = "今は……そんなじゃないかも……？"
1012209-74 = "次は美味しく作ろう！って……思ってる。"
1012209-75 = "[s] \"ちょっとだけ前向きになったね。\""
1012209-76 = "そ、そうかな？"
1012209-77 = "いつも先生が一緒にいてくれるから、かもね。"
1012209-78 = "サンドイッチも美味しく食べてくれたし、えへへ。"
1012209-79 = "……。"
1012209-80 = "ちょっと思ったんだ。すっごく素敵で完璧な、良い子じゃなくてもいいのかなって……。"
1012209-81 = "いつも不器用で、失敗して、今回も手が傷だらけになっちゃったけど……。"
1012209-82 = "それでもいい……んだよね？"
1012209-85 = "[ns1] \"もちろん。\"\n[ns2] \"大丈夫に決まってるよ。\""
1012209-91 = "……うんっ！！"
1012209-92 = "これからもずっと、ずっと――"
1012209-93 = "よろしくね、先生。"
