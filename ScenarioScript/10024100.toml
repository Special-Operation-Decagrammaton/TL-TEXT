[translation]
10024100-1 = "エピローグ;[ruby=まんかんぜんせき]満漢全席[/ruby]"
10024100-2 = "（こうして、「萬年参」密輸騒動は幕を閉じた）"
10024100-10 = "こっ、この料理は一体……！？"
10024100-11 = "まずは食べてみて！レッドウィンター風のスープに、#nワイルドハント風の蒸し肉とぶどうを加えた特製料理だよ！"
10024100-12 = "スープがピンク色なんだが、本当に食べられるのか……？"
10024100-13 = "色は強烈だけど、香ばしくて甘酸っぱい味わいが絶品なんだ！#n蒸し肉は口の中でホロホロ崩れるくらい柔らかくてさ！"
10024100-18 = "本当に、いいのか……#n山海経の伝統が……我々の文化が……"
10024100-19 = "細かいこと気にしても仕方ないって！#n食べ終わったらトリニティ風のお茶菓子も出すよ！"
10024100-20 = "バターと砂糖にこだわった焼き菓子に、牛乳茶の組み合わせが意外といけるんだ！"
10024100-22 = "お、お茶に牛乳を混ぜるなんて、そんなもの飲めるわけないだろう！"
10024100-24 = "いいから、まずは一口飲んでみて！#nこれまたクセになる味なんだよ。"
10024100-33 = "はい、みなさん。#nこれは玄龍門と玄武商会の方々が開いてくれた宴会ですよ～"
10024100-34 = "いっぱい楽しんでください。#nですが周りに迷惑をかけないよう、気をつけてくださいね？"
10024100-35 = "は～い！"
10024100-36 = "食べ終わったら、ちゃんとごちそうさまを言うんですよ！"
10024100-37 = "それと、家に帰ったら歯磨きも忘れないことっ！"
10024100-38 = "ココナちゃんも歯磨きしなきゃダメだよ！"
10024100-39 = "ココナちゃんじゃなくて、ココナ教官ですっ！"
10024100-40 = "では、ココナちゃん。しばらく子ども達をお願いできますか？"
10024100-41 = "え？シュン姉さん、どこに行くの！？"
10024100-42 = "うふふ。#nお姉さんは……これから先生と「用事」があるんです。"
10024100-46 = "え？姉さんだけずるい！#n私も……！うぅ、でも子ども達が……"
10024100-47 = "もう、シュン姉さん！#nまた冷凍庫の「バーゲンダッツ」食べちゃうんだからね！"
10024100-52 = "……こんなに人が多いと落ち着かないのだ～#n早く研究室に帰りたいのに……"
10024100-53 = "でも、どの料理も美味しそう……どうすれば。"
10024100-54 = "そうだ、思いついた！流石はぼく様！"
10024100-55 = "自分の分身を作る薬があればいいのだ！"
10024100-56 = "そうすれば1人は料理を味わって、もう1人は研究に集中できるのだ！"
10024100-57 = "でも、そのためには一度戻って研究しなくちゃいけないから……"
10024100-58 = "この料理を食べられなくなっちゃうのだ！"
10024100-59 = "……んむ、もぐもぐ……#nどの料理も本当に美味しいのだ。"
10024100-69 = "みんな楽しそうだね、キサキ。"
10024100-70 = "この光景が見たかったの？"
10024100-71 = "さて、どうじゃろうな。#n妾は山海経が平穏であってくれたら、それで構わぬよ。"
10024100-72 = "ふふっ。こんなに嬉しそうなキサキの顔、久しぶりに見たよ。"
10024100-73 = "[s] \"本当だね。\""
10024100-77 = "[ruby=そなた]其方[/ruby]からも、そう見えるのかえ？"
10024100-78 = "……こんな時くらい、妾とて気を抜いても良いじゃろう。"
10024100-79 = "それにしては、不思議な組み合わせの料理じゃ。#n牛乳氷に練乳をかけて、葡萄と飴を添えるとは……"
10024100-81 = "もっとお持ちしましょうか、門主様？"
10024100-82 = "ふふ、せっかくじゃ、他の料理も味わってみるとするかの。"
10024100-83 = "ふふ。少食のキサキが、あたしの料理をこんなに食べてくれて嬉しいよ。#nあたしにとって――妹みたいなものだからね。"
10024100-84 = "……其方の妹になったつもりはないと、何度言えば分かるのじゃ。"
10024100-85 = "別にいいじゃない！何年一緒にいると思ってるの！#nほら、これも食べて。イチゴに生クリームを乗せて、お餅で包んだんだ！"
10024100-87 = "それともチーズボール揚げの方が良かった？#n甘いのばっかりだったから、しょっぱいので口直ししたいよね。"
10024100-88 = "ふむ、どちらも頂くとしようか。"
10024100-90 = "（組織同士の問題は、すぐに解決とはいかないかもしれない）"
10024100-91 = "（それでも、この2人がいれば、きっと……）"
10024100-92 = "龍武同舟 ～思い描くは、ひとつの未来～"
