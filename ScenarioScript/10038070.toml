[translation]
10038070-1 = "第7話;そこに行けば麒麟に会えるだろうか。"
10038070-7 = "さあ、着いたよ先生。ここが……秘密の場所だ。"
10038070-8 = "よくここまで無事に来れたね、先生……"
10038070-9 = "[s] \"ミナとレイジョのおかげだよ。\""
10038070-10 = "いえ、先生が適切な指示を出してくださったので、私たちも迷いなく行動できたのです。"
10038070-11 = "ミナ執行部長の事はご心配なく。今はぐっすりと眠っています。"
10038070-12 = "それより……門主様は大丈夫でしょうか？"
10038070-14 = "ああ……世話になっておる。面目ないのう。"
10038070-15 = "いいの、いいの！気にしないで。#nこのままずっとここに居続けてくれても構わないよ！"
10038070-16 = "……感謝する。"
10038070-20 = "……"
10038070-21 = "キサキも、大変な目に遭うところだったんだし……"
10038070-23 = "[ruby=しんたに]申谷[/ruby]カイが帰ってきたという事実が、既に大変なことではありますが……"
10038070-28 = "……"
10038070-30 = "まあ、それは一旦置いとこうか。#nそれじゃあ先生も来たことだし、あたし達は商会に戻ろっか。"
10038070-35 = "え？ですが、門主様は……？"
10038070-36 = "だからだよ。"
10038070-37 = "仰る意味が、よく……。"
10038070-38 = "いいから、早く行くよ。"
10038070-39 = "か、会長？ちょっと、押さないでください！#n強引すぎませんか？？会長！？"
10038070-45 = "[ns] \"行っちゃったね……。\""
10038070-46 = "……ああ。"
10038070-47 = "[s] \"大丈夫？\""
10038070-51 = "……問題ない。"
10038070-52 = "[s] \"うーん……。\""
10038070-55 = "（なんとも気まずい沈黙が続く中――）"
10038070-59 = "（キサキは、俯いて床を眺めていた……）"
10038070-63 = "[ns] \"カイとのこと、教えてほしい。\""
10038070-67 = "[ruby=しんたに]申谷[/ruby]カイの……ことか？"
10038070-68 = "無意味なことを聞くんじゃの、先生。#nとうに過ぎた出来事じゃ……。"
10038070-72 = "……。"
10038070-73 = "以前話したことを覚えておるか？"
10038070-74 = "1年前……門主の座に就いた妾が一番最初に下した決定に関する話じゃ。"
10038070-75 = "[s] \"ある3年生を退学させたという話？\""
10038070-76 = "そうじゃ。#nすでに気づいているとは思うが、その3年生が……"
10038070-77 = "[s] \"カイなんだね。\""
10038070-78 = "ああ……"
10038070-81 = "その時も話したが、当時は決定に対しての反発が絶えなかった。"
10038070-82 = "手続きや公正性、妥当性に問題があろうとも――守るべき最優先を履き違えてはならぬ。だからこそ妾は敢行したのじゃが……"
10038070-83 = "それはあくまで妾の判断でしかなかったのやもしれぬな。"
10038070-88 = "何を言っても詮無きことではある。#n覆水盆に返らず、じゃからのう。"
10038070-91 = "……[ruby=しんたに]申谷[/ruby]カイは、神仙になろうとした。"
10038070-92 = "より高度な悟りの境地に至るべく、彼女は仙丹を作ろうとし――不老不死の霊薬を作ると喧伝し、多くの生徒を集めたのじゃ。"
10038070-93 = "そして――集めた生徒に怪しげな薬を飲ませた。"
10038070-102 = "彼女に魅了されていた生徒の中には、カイに頼んで特殊な効能の薬を調合してもらう者もいた。"
10038070-104 = "その薬は、一時的に卓越した効果を見せたが――"
10038070-105 = "最終的には、服用した生徒の身体に、多くの不調と痕跡を残したのじゃ。"
10038070-118 = "例えば、体育で良い成績を残したかった生徒は、一時的に身体能力を向上させたものの……その後、代謝異常を引き起こし、まともな生活を送れなくなってしまった。"
10038070-119 = "誰も知らない未知の味を体験したいという生徒は、味覚そのものを変化させてしまった結果、他人の味覚に共感できなくなってしまった。"
10038070-122 = "もちろん……薬が原因で騒動を引き起こすという点だけを見れば、サヤもトラブルメーカーであることに変わりはないのじゃが……"
10038070-123 = "サヤが追求していることは、本質的に人を幸せにするためのものじゃ。"
10038070-124 = "その証拠に、サヤは副作用に苦しむ本人が希望する場合、解毒薬を無償で提供しておる。"
10038070-125 = "不老不死とは、世の摂理に反する行為。#n故に、必然的に副作用はつきものではあるが……"
10038070-126 = "もしかしたら、サヤは見返りのない幸せなどないという事に気づいているのやもしれぬのう。"
10038070-130 = "じゃが、カイは違う。カイにとって重要なのは結果のみじゃ。#n神仙になれるのであれば、外道に落ちようとも構わぬほどだ。"
10038070-131 = "そして、解毒薬を欲しがる生徒に対し、自分の命令に従うよう断れない提案をしておった。"
10038070-132 = "そうしてカイに薬の製造を頼んだ生徒はみな、奴隷のように、カイの言うこと全てに何でも従わなければならない立場となったのじゃ。"
10038070-133 = "……玄龍門にとっても、それは良いことではない。"
10038070-134 = "というのも、山海経の中で玄龍門の権威に従わない、もう一つの勢力が生まれたようなものじゃからのう。"
10038070-135 = "[s] \"それは……結構危険な状態じゃないの！？\""
10038070-140 = "「猿の手」にまつわる話を――知っておるか？"
10038070-141 = "願い事をすればなんでも叶うものの、望んだ形で叶うわけではないという呪具の伝承じゃ。"
10038070-142 = "目的こそ達成できたものの、その過程や代償が過酷な時に使う比喩でもある。"
10038070-144 = "そして……[ruby=しんたに]申谷[/ruby]カイの異名でもあった。"
10038070-145 = "これも妾の判断が浅かったに過ぎぬ話やもしれぬが。"
10038070-146 = "当時の妾は、カイを放っておけば、山海経の根幹が――学園全体が危機に陥ると考えた。"
10038070-147 = "しかし、生徒を退学させるのは容易ではない。"
10038070-148 = "変化を恐れ、伝統を守ることへの執着が強い山海経であれば……なおのこと。"
10038070-149 = "ふふ。校則に則った手続きを踏んでいたら、カイは退学の決定が下る前に卒業していたかもしれぬ。"
10038070-152 = "だから妾は、即追放という前例のない裁決を下した。"
10038070-153 = "そしてカイに関しての記録を全て抹消し――模倣犯が起きぬよう対処したのじゃ。"
10038070-155 = "……思い返してみれば、それが誤りだったのかもしれぬな。"
10038070-162 = "――カイには妾を恨む権利がある。ああ。そうじゃろうとも。"
10038070-163 = "奴が復讐に胸を燃やすのも――怨みを抱くのも。#nすべて――妾が招いたことじゃ。"
10038070-168 = "妾は大事の前の小事として彼女を切り捨てた。じゃから、その報いを受けているのやもしれぬ。"
10038070-171 = "言い訳はせぬ――したとて見苦しいだけじゃからの。"
10038070-172 = "妾の行動と裁決が、七囚人の[ruby=しんたに]申谷[/ruby]カイを生み出し――それが山海経に大きな損害を与えているであれば……"
10038070-176 = "ふふ、本当に言われた通りじゃのう。#n花が散り洪水となっても――雷が落ちたとしても。"
10038070-177 = "天変地異でさえ、妾の責任となる。#nそれが――山海経の門主という座である。"
10038070-181 = "[ns] \"私は違うと思うな。\""
10038070-185 = "……どういう意味じゃ、先生？"
10038070-186 = "[s1] \"キサキは門主としての選択をしただけだよ。\"\n[s2] \"カイは責任転嫁をしているだけだよ。自分の責任は自分で負わなければ。\""
10038070-189 = "カイ自身が責任を……？"
10038070-190 = "じゃが……"
10038070-191 = "[s3] \"単純に割り切れるような話ではないけれどね。\"\n[s4] \"山海経の過去がそうであるように。\""
10038070-194 = "……"
10038070-195 = "[s5] \"それでも、私たちは皆、私たちの現在を。\"\n[s6] \"自分の選択の責任を、背負う必要がある。\""
10038070-198 = "じゃが……"
10038070-199 = "[s7] \"この瞬間だっていつかは過去になる。\"\n[s8] \"だからこそ、最善を尽くして生きていくしかないんだ。\""
10038070-202 = "それは、何故じゃ……？"
10038070-207 = "[ns9] \"いつか訪れる[ruby=未来]現在[/ruby]に。\"\n[ns10] \"自信を持って恥ずかしくない答えを返すためだよ。\""
10038070-211 = "それが……山海経が伝統を重んじる理由、か……。"
10038070-212 = "そうか……そうとも考えられるのじゃな。"
10038070-213 = "……。"
10038070-217 = "一部の生徒は、妾に対する嫌疑を晴らさなかった。"
10038070-218 = "[ruby=りゅうげ]竜華[/ruby]キサキという名の門主は、その成り立ちから山海経の伝統と相反しておったからのう。"
10038070-219 = "……。"
10038070-223 = "先生、山海経高級中学校という学園が、外部からどのような目を向けられているか、知っておるか？"
10038070-224 = "学園がどこに存在するのか知らぬ者がほとんどじゃ。三大学園と比べるべくもない。"
10038070-225 = "玄武商会の料理が有名である以外、ほとんど知られておらぬよ。"
10038070-226 = "かろうじて足を運んだ他校生からの印象とて、#n伝統を重んじて生きている変わり者といった見解が関の山じゃ。"
10038070-227 = "妾は……それが嫌じゃった。#n山海経の生徒が、他所でそのような扱いを受けていることが。"
10038070-228 = "ふふ……先生と話していると、自分自身の感情の再発見をすることが多いのう。"
10038070-229 = "謙遜せずとも良い。先生も、自身の性質に対してもう少し自覚した方が良いと思うぞ？"
10038070-233 = "……"
10038070-234 = "何をすればいいのか……少しだけ見えてきた気がするのう。"
10038070-235 = "感謝する、先生。#nそして……一つだけ頼まれてはくれぬか？"
10038070-239 = "月影祭は、必ず開催する。"
10038070-240 = "じゃから……祭りが開かれるまで、もう少しだけ妾を手伝ってはくれぬか？"
10038070-241 = "[s] \"仰せのままに。\""
10038070-242 = "ふふ……感謝する。"
10038070-250 = "[ns] \"も、門主様！？\""
10038070-252 = "どうしたのじゃ。おんぶ程度で慌てるなど……。"
10038070-253 = "最初の命令じゃ。#nこのまま……もう少しだけこのままでいてくりゃれ。"
10038070-263 = "キサキ、先生！今、大丈夫？#n玄武商会のメンバーがちょっと話があるみたい……で……？"
10038070-268 = "……！？"
10038070-269 = "[s] \"！？\""
10038070-274 = "な、何してるのさ！？"
10038070-276 = "こ、これは……その……！"
10038070-277 = "[s] \"なんでもないよ！何もしてないよね！ね、キサキ？\""
10038070-282 = "あたしだって先生におんぶされたい！！！"
10038070-283 = "そっちかえ！？"
10038070-291 = "こ、こほん。えっと、続けるね。#n玄武商会のみんなが、話したいことがあるらしくて……連れてきたんだ。"
10038070-292 = "ほう……？珍しいのう。"
10038070-293 = "わざわざ妾に言いたいことが……？"
10038070-294 = "ま、まあ。会ったら分かると思うよ。#nみんな、入ってきて！"
10038070-306 = "……して、何用じゃ？"
10038070-314 = "玄龍門、再び門主様に会いにきました。"
10038070-319 = "……！#nこれは、どういうことじゃ……？"
10038070-320 = "あはは！驚いた？#n玄龍門の子がキサキに会いたいって言ってきてね。"
10038070-321 = "でも、彼女たちが玄武商会を好き勝手歩き回ってたら変じゃない？#n色々疑われるかもしれないし。"
10038070-322 = "だから、みんなうちの子に変装してもらったの。"
10038070-327 = "玄龍門には……山海経には、やはり門主様が必要です。#nそれが私たちの結論でした。"
10038070-328 = "現在の強硬派が主導する玄龍門は、伝統を守るという初心も、守るべき山海経の指針も……全てが定まっておらず……"
10038070-329 = "錬丹術研究会に主導権を握らせ、生徒会としての機能が麻痺し……ただの傀儡に成り下がってしまっているのです。"
10038070-330 = "私たちは門主様に従います。#n門主様の裁決を支持し、すべてを尽くして補佐いたします。"
10038070-335 = "玄龍門一同――再び門主様を迎え入れる準備は整ってございます！"
10038070-340 = "……そうか。"
10038070-341 = "……"
10038070-347 = "今までの山海経は――すべてを過去に縛りつけようとしておった。"
10038070-348 = "過去の教訓から何かを見出すのではなく、過去の規則を遵守し――判断よりも服従を優先していた。"
10038070-349 = "じゃが、千里の外を見渡すためには――楼閣をもう一層登らねばならぬ。#n足で直接大地を踏みしめ、その眼で直接空を見上げねばならぬ。"
10038070-352 = "我らは須らく――己の現在に責任を持つ必要がある。#nゆえに――人事を尽くして天命を待つだけじゃ。"
10038070-353 = "恐れるだけでは何も得られぬ。彷徨う者すべてが道に迷っているわけではないからの。"
10038070-354 = "うむ――では、これから。"
10038070-359 = "我らの山海経を、取り戻しに行こうかの。"
