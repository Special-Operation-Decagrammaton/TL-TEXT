[translation]
10038070-1 = "Episódio 7; Será que se eu for até lá, conseguirei encontrar o Qilin?"
10038070-7 = "Pronto, chegamos, Sensei. Este é... o lugar secreto."
10038070-8 = "Você conseguiu chegar até aqui em segurança, Sensei..."
10038070-9 = "[s] \"Foi graças à Mina e à Reijo.\""
10038070-10 = "Não, foi porque o Sensei nos deu as instruções adequadas que conseguimos agir sem hesitação."
10038070-11 = "Não se preocupe com a Chefe Executiva Mina. Ela está dormindo profundamente agora."
10038070-12 = "Mas, antes disso... a Mestra da Seita está bem?"
10038070-14 = "Ah... agradeço pelo cuidado. Que vergonha..."
10038070-15 = "Está tudo bem, tudo bem! Não se preocupe. #nNão me importo se você quiser ficar aqui para sempre!"
10038070-16 = "...Agradeço."
10038070-20 = "..."
10038070-21 = "A Kisaki também quase passou por uma situação terrível..."
10038070-23 = "O fato de Shintani Kai ter retornado já é algo terrível, mas..."
10038070-28 = "..."
10038070-30 = "Bem, vamos deixar isso de lado por enquanto. #nJá que o Sensei chegou, vamos voltar para a associação."
10038070-35 = "Hã? Mas, Mestra da Seita...?"
10038070-36 = "É justamente por isso."
10038070-37 = "Não entendo bem o que quer dizer..."
10038070-38 = "Esquece, vamos logo."
10038070-39 = "P-Presidente? Espere, não me empurre! #nNão está sendo agressiva demais?? Presidente!?"
10038070-45 = "[ns] \"Elas foram embora...\""
10038070-46 = "...É."
10038070-47 = "[s] \"Você está bem?\""
10038070-51 = "...Sem problemas."
10038070-52 = "[s] \"Hmm...\""
10038070-55 = "(Enquanto um silêncio constrangedor paira no ar――)"
10038070-59 = "(Kisaki olhava para baixo, encarando o chão...)"
10038070-63 = "[ns] \"Quero que me conte sobre a Kai.\""
10038070-67 = "Sobre... Shintani Kai?"
10038070-68 = "Você pergunta sobre coisas sem sentido, Sensei. #nIsso já é um acontecimento do passado..."
10038070-72 = "..."
10038070-73 = "Lembra-se do que eu disse antes?"
10038070-74 = "Há um ano... sobre a primeira decisão que tomei quando assumi o cargo de Mestra da Seita."
10038070-75 = "[s] \"A história sobre expulsar uma aluna do terceiro ano?\""
10038070-76 = "Exatamente. #nImagino que já tenha percebido, mas aquela aluna do terceiro ano era..."
10038070-77 = "[s] \"A Kai, não é?\""
10038070-78 = "Sim..."
10038070-81 = "Como eu disse na época, houve muitas reações contrárias à decisão."
10038070-82 = "Mesmo que houvesse problemas com os procedimentos, a justiça ou a validade — não se pode confundir o que deve ser protegido como prioridade máxima. Foi por isso que eu tomei aquela atitude, mas..."
10038070-83 = "Talvez tenha sido apenas o meu julgamento, afinal."
10038070-88 = "Não adianta falar sobre isso agora. #nÁguas passadas não movem moinhos, como dizem."
10038070-91 = "...Shintani Kai tentou se tornar uma imortal."
10038070-92 = "Para alcançar um estado de iluminação superior, ela tentou criar um elixir de imortalidade — ela espalhou que criaria uma poção da vida eterna e reuniu muitas alunas."
10038070-93 = "E então... ela fez as alunas que reuniu beberem uma poção suspeita."
10038070-102 = "Entre as alunas que estavam fascinadas por ela, algumas pediram para a Kai preparar poções com efeitos especiais."
10038070-104 = "Aquela poção mostrou efeitos extraordinários temporariamente, mas..."
10038070-105 = "No final, deixou muitos problemas de saúde e sequelas no corpo das alunas que a consumiram."
10038070-118 = "Por exemplo, uma aluna que queria tirar notas boas na educação física teve suas capacidades físicas aumentadas temporariamente, mas... depois, sofreu distúrbios metabólicos e não conseguiu mais levar uma vida normal."
10038070-119 = "Uma aluna que queria experimentar um sabor desconhecido que ninguém conhecia acabou alterando seu próprio paladar, resultando na incapacidade de sentir empatia pelo paladar dos outros."
10038070-122 = "Claro... se olharmos apenas para o fato de causar confusão por causa de poções, a Saya também não deixa de ser uma criadora de problemas, mas..."
10038070-123 = "O que Saya busca, em sua essência, é algo para trazer felicidade às pessoas."
10038070-124 = "Como prova disso, Saya fornece o antídoto gratuitamente sempre que a própria pessoa que sofre com os efeitos colaterais o deseja."
10038070-125 = "A imortalidade é um ato que vai contra as leis do mundo. #nPor isso, efeitos colaterais são inevitáveis, mas..."
10038070-126 = "Talvez Saya tenha percebido que não existe felicidade sem um preço a pagar."
10038070-130 = "Mas Kai é diferente. Para Kai, o que importa é apenas o resultado. #nSe ela puder se tornar uma divindade, não se importa em cair no caminho do mal."
10038070-131 = "E, para os alunos que desejavam o antídoto, ela fazia propostas irrecusáveis para que seguissem suas ordens."
10038070-132 = "Assim, todos os alunos que pediram a fabricação do remédio a Kai acabaram em uma posição onde, como escravos, tinham que obedecer a tudo o que ela dizia."
10038070-133 = "...Para a Genryumon, isso também não é algo bom."
10038070-134 = "Digo isso porque é como se uma segunda facção tivesse surgido dentro de Shanhaijing, uma que não segue a autoridade da Genryumon."
10038070-135 = "[s] \"Isso não é... uma situação bem perigosa!?\""
10038070-140 = "Você conhece a história sobre a \"Pata de Macaco\"?"
10038070-141 = "É uma lenda sobre um objeto amaldiçoado que realiza qualquer desejo, mas não da forma que você esperava."
10038070-142 = "É também uma metáfora usada quando, embora o objetivo tenha sido alcançado, o processo ou o preço pago foram cruéis."
10038070-144 = "E era também o apelido de Shintani Kai."
10038070-145 = "Talvez isso seja apenas um sinal de que meu julgamento na época foi superficial."
10038070-146 = "Naquela época, eu pensei que, se deixasse Kai à solta, a base de Shanhaijing — a escola inteira — cairia em crise."
10038070-147 = "No entanto, não é fácil expulsar um aluno."
10038070-148 = "Especialmente em Shanhaijing, onde há um forte apego em preservar a tradição e um medo profundo de mudanças."
10038070-149 = "Fufu. Se eu tivesse seguido os procedimentos conforme o regulamento escolar, Kai poderia ter se formado antes que a decisão de expulsão fosse tomada."
10038070-152 = "Por isso, tomei a decisão sem precedentes de expulsá-la imediatamente."
10038070-153 = "E apaguei todos os registros sobre Kai, para evitar que surgissem imitadores."
10038070-155 = "...Pensando bem, talvez isso tenha sido um erro."
10038070-162 = "— Kai tem o direito de me odiar. Sim, com certeza."
10038070-163 = "Que ela queime de desejo por vingança... que guarde rancor. #nTudo isso... foi algo que eu mesma provoquei."
10038070-168 = "Eu a descartei como um mal menor diante de um problema maior. Talvez, por isso, eu esteja colhendo o que plantei."
10038070-171 = "Não darei desculpas... pois, mesmo que desse, seria apenas algo deplorável."
10038070-172 = "Se minhas ações e decisões criaram Shintani Kai, uma das Sete Prisioneiras, e isso está causando grandes danos a Shanhaijing..."
10038070-176 = "Fufu, é exatamente como dizem. #nMesmo que as flores caiam e se tornem uma enchente... mesmo que um raio caia."
10038070-177 = "Até mesmo desastres naturais tornam-se minha responsabilidade. #nEsse é o peso... de ocupar o cargo de Monshu de Shanhaijing."
10038070-181 = "[ns] \"Eu não acho que seja assim.\""
10038070-185 = "...O que quer dizer com isso, Sensei?"
10038070-186 = "[s1] \"Kisaki apenas fez uma escolha como Monshu.\"\n[s2] \"Kai é quem está transferindo a responsabilidade. Cada um deve arcar com as suas próprias.\""
10038070-189 = "Kai arcar com a responsabilidade...?"
10038070-190 = "Mas..."
10038070-191 = "[s3] \"Não é uma questão tão simples de se resolver, no entanto.\"\n[s4] \"Assim como o passado de Shanhaijing.\""
10038070-194 = "..."
10038070-195 = "[s5] \"Ainda assim, todos nós precisamos carregar o nosso presente.\"\n[s6] \"E assumir a responsabilidade pelas nossas próprias escolhas.\""
10038070-198 = "Mas..."
10038070-199 = "[s7] \"Até este momento, um dia, se tornará passado.\"\n[s8] \"É por isso que só nos resta viver dando o nosso melhor.\""
10038070-202 = "Por que isso...?"
10038070-207 = "[ns9] \"Para que, no futuro que um dia chegará.\"\n[ns10] \"Possamos dar uma resposta da qual não nos envergonhamos.\""
10038070-211 = "Então é por isso... que Shanhaijing valoriza tanto a tradição...?"
10038070-212 = "Entendo... é uma forma de pensar, de fato."
10038070-213 = "..."
10038070-217 = "Alguns alunos não limparam as suspeitas que tinham sobre mim."
10038070-218 = "A Monshu chamada Ryuge Kisaki, desde a sua ascensão, sempre esteve em conflito com a tradição de Shanhaijing, afinal."
10038070-219 = "..."
10038070-223 = "Sensei, você sabe como a escola Shanhaijing é vista por quem está de fora?"
10038070-224 = "A maioria das pessoas nem sabe onde a escola fica. Não há como comparar com as três grandes escolas."
10038070-225 = "Além da culinária da Genbu Shokai ser famosa, quase nada é conhecido sobre nós."
10038070-226 = "Mesmo a impressão que os estudantes de outras escolas têm ao nos visitar, não passa de nos verem como excêntricos que vivem presos às tradições."
10038070-227 = "Eu... não gostava disso. Que os alunos de Shanhaijing fossem tratados dessa forma em outros lugares."
10038070-228 = "Fufu... Conversar com o Sensei me faz redescobrir meus próprios sentimentos com frequência."
10038070-229 = "Não precisa ser modesta. Acho que o Sensei também deveria ser um pouco mais consciente sobre sua própria natureza, não acha?"
10038070-233 = "……"
10038070-234 = "Sinto que... comecei a enxergar um pouco do que preciso fazer."
10038070-235 = "Agradeço, Sensei. E... poderia me fazer um único favor?"
10038070-239 = "O Festival do Luar, nós vamos realizá-lo."
10038070-240 = "Por isso... até que o festival comece, você poderia me ajudar um pouco mais?"
10038070-241 = "[s] \"Como desejar.\""
10038070-242 = "Fufu... Agradeço."
10038070-250 = "[ns] \"M-Monshu-sama!?\""
10038070-252 = "O que houve? Ficar agitada só por causa de uma carona nas costas..."
10038070-253 = "Esta é minha primeira ordem. Fique assim... apenas mais um pouco."
10038070-263 = "Kisaki, Sensei! Estão ocupados agora? Os membros da Associação Genbu parecem querer falar com vocês... ou será que...?"
10038070-268 = "……！？"
10038070-269 = "[s] \"！？\""
10038070-274 = "O-o que vocês estão fazendo!?"
10038070-276 = "I-isso é... bem...!"
10038070-277 = "[s] \"Não é nada! Não estamos fazendo nada, né? Né, Kisaki?\""
10038070-282 = "Eu também quero que o Sensei me carregue nas costas!!!"
10038070-283 = "Era isso que você queria!?"
10038070-291 = "C-cof, cof. Bem, vou continuar. O pessoal da Associação Genbu disse que queria conversar... então eu os trouxe."
10038070-292 = "Ora...? Que incomum."
10038070-293 = "Eles têm algo que querem me dizer...?"
10038070-294 = "B-bem, acho que você vai entender quando os vir. Pessoal, podem entrar!"
10038070-306 = "……E então, qual o motivo da visita?"
10038070-314 = "Genryumon, viemos ver a Monshu-sama novamente."
10038070-319 = "……! O que significa isso...?"
10038070-320 = "Ahaha! Surpresa? O pessoal da Genryumon disse que queria ver a Kisaki."
10038070-321 = "Mas não seria estranho se elas ficassem andando pela Associação Genbu como bem entendessem? Podiam acabar levantando suspeitas."
10038070-322 = "Por isso, pedi para que todas se disfarçassem como o nosso pessoal."
10038070-327 = "A Genryumon... Shanhaijing, na verdade, precisa da Monshu-sama. Essa foi a nossa conclusão."
10038070-328 = "A Genryumon, atualmente liderada pela facção radical, perdeu o propósito original de proteger as tradições e as diretrizes que Shanhaijing deveria seguir... tudo está incerto..."
10038070-329 = "Deixaram a Sociedade de Pesquisa de Alquimia tomar o controle, a função do conselho estudantil está paralisada... tornaram-se meras marionetes."
10038070-330 = "Nós seguiremos a Monshu-sama. Apoiaremos suas decisões e faremos tudo ao nosso alcance para auxiliá-la."
10038070-335 = "Todos da Genryumon — estamos prontos para receber a Monshu-sama de volta!"
10038070-340 = "……Entendo."
10038070-341 = "……"
10038070-347 = "A Shanhaijing de até agora... estava tentando prender tudo ao passado."
10038070-348 = "Em vez de extrair lições do passado, eles apenas cumpriam regras antigas — priorizando a obediência em vez do julgamento."
10038070-349 = "Mas, para enxergar além de mil milhas, precisamos subir mais um andar na torre. Precisamos pisar na terra com nossos próprios pés e olhar para o céu com nossos próprios olhos."
10038070-352 = "Todos nós precisamos assumir a responsabilidade pelo nosso presente. Portanto... faremos o nosso melhor e deixaremos o destino seguir seu curso."
10038070-353 = "Não se ganha nada apenas com medo. Afinal, nem todos que vagam estão perdidos."
10038070-354 = "Muito bem... então, a partir de agora."
10038070-359 = "Vamos recuperar a nossa Shanhaijing."
