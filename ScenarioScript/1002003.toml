1002003-7 = "……Ah, p-por que você está aqui!?"
1002003-8 = "P-Professor……? P-por que você veio até aqui……?"
1002003-9 = "[s1] \"Você parecia um pouco estranha no MomoTalk.\"\n[s2] \"Fiquei preocupado se algo tinha acontecido.\""
1002003-10 = "Ah, bem, é que……."
1002003-11 = "Ah, bem, é que……."
1002003-12 = "Não é nada demais, só……."
1002003-13 = "É só que……."
1002003-14 = "[s] \"Por que está sendo tão formal……?\""
1002003-15 = "N-não é nada, é que…… só sobre o que aconteceu antes……."
1002003-16 = "Pensando bem, acho que exagerei um pouco…… então, queria pedir desculpas……."
1002003-17 = "Só isso……."
1002003-18 = "……."
1002003-19 = "[s] \"……?\""
1002003-20 = "……."
1002003-22 = "（Enquanto várias outras alunas iam embora, ficamos ali parados, um de frente para o outro, em silêncio por um tempo.）"
