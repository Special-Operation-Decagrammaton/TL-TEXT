[translation]
1002003-1 = "何言ってるの？"
1002003-2 = "（何だかモモトークでのやり取りが気になって、コハルを探しにトリニティへ向かった）"
1002003-3 = "（ちょうど下校時間だったからか、思ったよりもすぐに校門のところでコハルを見つけた）"
1002003-4 = "……。"
1002003-5 = "（他の生徒たちはみんなでおしゃべりしながら帰っていたが、コハルはひとり静かに歩いていた）"
1002003-6 = "[s] \"……コハル？\""
1002003-7 = "……えっ、な、何で！？"
1002003-8 = "せ、先生……？ど、どうしてここに……？"
1002003-9 = "[s1] \"モモトークで、何となく変な様子だったから。\"\n[s2] \"もしかしたら、何かあったのかなって。\""
1002003-10 = "えっ、あっ、それはその……。"
1002003-11 = "えっ、あっ、それはその……。"
1002003-12 = "大したことじゃなくて、ただ……。"
1002003-13 = "何となく……です。"
1002003-14 = "[s] \"なんで敬語……？\""
1002003-15 = "な、何でもない、です……ただ、この前のことで……。"
1002003-16 = "考えてみたら、言い過ぎたかなって思って……それで、謝ろうと……。"
1002003-17 = "ただ、それだけで……。"
1002003-18 = "……。"
1002003-19 = "[s] \"……？\""
1002003-20 = "……。"
1002003-22 = "（他の生徒たちが何人も帰っていく中で、そうやってしばらく無言のまま二人で向かい合っていた）"
1002003-23 = "（しばらくして、校門の前にいるのはコハルと二人だけになった）"
1002003-25 = "……。"
1002003-26 = "……っ。"
1002003-27 = "ううっ……。"
1002003-28 = "[s] \"……だ、大丈夫！？\""
1002003-29 = "ど、どうして……。"
1002003-30 = "どうして、わざわざここまで来たの……？"
1002003-31 = "あんなメッセージで、心配になって……？"
1002003-32 = "そんな……"
1002003-33 = "そんなはず無い！"
1002003-34 = "……何か他の「目的」があるんでしょ！？"
1002003-35 = "[s] \"いつものコハルに戻った！？\""
1002003-36 = "だって、メッセージでは何も言ってないのに……。"
1002003-37 = "心配してくれたとか、本当に……？本当にそんなことある？"
1002003-38 = "……ううん。"
1002003-39 = "そんなはずがない……きっと、何か他の意味があるはず……。"
1002003-40 = "そう、だって見たことあるもん。こういう時、こういう展開の後には必ず……。"
1002003-41 = "こうやって暖かい雰囲気にしてから、薄暗い所に行って……。"
1002003-42 = "例えば、あそこの誰もいない体育倉庫みたいなところに連れて行って……。"
1002003-43 = "……うぁぁっ！！？！？"
1002003-44 = "[s] \"……コハル、大丈夫？\""
1002003-45 = "こ、こういう流れで"
1002003-46 = "油断させておいて……"
1002003-47 = "やっぱりそういう展開に……！？"
1002003-48 = "さ、最初からそれを狙って……！？"
1002003-49 = "[s3] \"何言ってるか分からないけど、確実に誤解だと思う……。\"\n[s4] \"それも本で読んだ話……？\""
1002003-50 = "ほ、ほんっとうに油断できない……！！"
1002003-51 = "ほ、ほんっとうに油断できない……！！"
1002003-52 = "これで相手が、ちゃんと先生の裏を読める私じゃなかったら……。"
1002003-53 = "い、いや、だからこそあえて私に……！？"
1002003-54 = "分かってても無理やり言いくるめて、みたいな、そういう流れもあるといえばある……。"
1002003-55 = "[s] \"あの、コハルさん……？\""
1002003-56 = "全部理解できたわ……"
1002003-57 = "これは、「正義実現委員会」として私に下された使命……。"
1002003-58 = "先生の魔の手から、私がみんなを守らなきゃいけないんだ……！"
1002003-59 = "うん、そう……！そうに決まってる！"
1002003-60 = "それがどんな難しい使命であっても、私は、私は……！"
1002003-61 = "[s5] \"コハル？コハル～？\"\n[s6] コハルの肩をとんとんと叩く。"
1002003-62 = "……っ！？"
1002003-63 = "……っ！？"
1002003-64 = "ひゃっ、やっ、やっぱ……いやぁああぁぁああぁぁぁぁっ！？！！？"
1002003-66 = "（……）"
1002003-67 = "[s] \"……。\""
1002003-69 = "（そうやって、叫び声を上げながらコハルはまたどこかに消えてしまった）"
