1002003-35 = "[s] \"A Koharu de sempre voltou!?\""
1002003-36 = "Porque, nas mensagens, eu não disse nada demais……."
1002003-37 = "Você realmente ficou preocupado? Sério mesmo……? Isso é possível?"
1002003-38 = "……Não."
1002003-39 = "Não pode ser…… com certeza tem algum outro significado por trás disso……."
1002003-40 = "Isso, eu já vi isso antes. Nessas horas, depois desse tipo de situação, sempre acontece……."
1002003-41 = "Eles criam esse clima amigável e depois te levam para um lugar escuro……."
1002003-42 = "Por exemplo, te levam para aquele depósito de esportes onde não tem ninguém……."
1002003-43 = "……Aaaahhh!!?！？"
1002003-44 = "[s] \"……Koharu, você está bem?\""
1002003-45 = "E-esse tipo de desenrolar"
1002003-46 = "para me deixar desprevenida……"
1002003-47 = "Então era esse o plano……!?"
1002003-48 = "V-você estava planejando isso desde o começo……!?"
1002003-49 = "[s3] \"Não sei do que você está falando, mas tenho certeza de que é um mal-entendido…….\"\n[s4] \"Isso também é algo que você leu em um livro……?\""
1002003-50 = "N-não dá para baixar a guarda nem um pouco……!!"
1002003-51 = "N-não dá para baixar a guarda nem um pouco……!!"
1002003-52 = "Se a outra pessoa não fosse alguém como eu, que consegue ler as segundas intenções do Professor……."
1002003-53 = "N-não, é justamente por isso que você insiste em mim...!?"
1002003-54 = "Mesmo sabendo disso, tentar me convencer à força... esse tipo de situação até que acontece..."
1002003-55 = "[s] \"Ei, Koharu...?\""
1002003-56 = "Eu entendi tudo agora..."
