[translation]
1005903-1 = "ボランティア活動"
1005903-3 = "結局来ちゃったの……？"
1005903-4 = "[s] \"来ちゃった。それでどうしたの、ミカ？\""
1005903-8 = "えっと、別に特に用事があったんじゃないんだけど……"
1005903-9 = "その……見ての通り、今ボランティア中なの。"
1005903-10 = "[s] \"ボランティア？\""
1005903-11 = "そう。私が受けた処分の1つでね。#nボランティアを300時間やらなきゃいけないの。"
1005903-12 = "だから休日にこうしてグラウンドの雑草抜きなんてしてるわけ。"
1005903-13 = "[s] \"一人で？\""
1005903-14 = "そう！！"
1005903-15 = "こーんな広い場所の雑草を一日で全部抜けなんて、#nいくらなんでもひど過ぎない？#nこれ、ボランティアっていうか強制労働だよね！？"
1005903-16 = "あっついし、誰もいないし、つまんないし疲れるし……#n服は汚れるし……"
1005903-17 = "腰も痛むし、手はガッサガサ……#n日焼け止めも、ハンドクリームもないのに……。"
1005903-18 = "[s] \"それは……大変だね。\""
1005903-19 = "あっ、うん……大変、というか……"
1005903-20 = "[s] \"私も手伝うよ。\""
1005903-24 = "いやいや！大丈夫だってば先生！#n私がこういうの慣れてないってだけで……"
1005903-25 = "[s] \"まず着替えよっか。体操服に着替えておいで。\""
1005903-26 = "え？体操着……？"
1005903-27 = "[s] \"あとタオルと飲み物、スコップもお願い。\""
1005903-28 = "で、でも……#n体操服は先生が買ってくれた物だから、開けたくなくて……"
1005903-29 = "[s] \"ちゃんと使ってくれないと困るよ。\""
1005903-33 = "そうだよね……"
1005903-34 = "分かった。"
1005903-39 = "（そうしてミカを待っていると……）"
1005903-45 = "着替えてきたよ……その、言ってた物も持ってきた。"
1005903-46 = "体操服姿……あんまり可愛くないから見せたくなかったんだけど……"
1005903-47 = "その……えっと……。"
1005903-51 = "[ns] \"それじゃ、始めよっか。\""
1005903-53 = "……うん。"
1005903-58 = "（二人で作業したものの、雑草抜きは午後までかかってしまった）"
1005903-61 = "づーがーれ゛ーだー……#n腰いたーい……服どろどろ……。"
1005903-62 = "[s] \"これで大体終わったかな？\""
1005903-63 = "あー、うん……そうだね。"
1005903-64 = "あっ……これ、先生が手伝ったのがバレたら問題になっちゃうかも？#nまあ、私は別にいいんだけどさ☆"
1005903-65 = "えへへ……。"
1005903-66 = "あの、先生……"
1005903-67 = "[s] \"もうこんな時間だ。それじゃ私は先に帰るね、ミカ。\""
1005903-68 = "えっ？#n……あ、うん……。"
1005903-73 = "（ミカと別れてシャーレに帰った。）"
