[translation]
1005402-1 = "慣れない装い"
1005402-2 = "トリニティ大聖堂・準備室"
1005402-3 = "（約束通り、マリーの相談に乗るべくトリニティ大聖堂を訪れた）"
1005402-4 = "（まだ早い時間だからか、人気はない）"
1005402-11 = "せ、先生、ですか……？"
1005402-12 = "あっ、ごめんなさい。怪しい者ではありません。#n私です、[ruby=いおち]伊落[/ruby]マリーです。その……少々理由がありまして……。"
1005402-14 = "[ns1] \"……マリー？\"\n[ns2] \"どこにいるの？\""
1005402-17 = "その声……。"
1005402-18 = "良かった、先生ですね。"
1005402-19 = "少々お待ちください……。"
1005402-28 = "こ、こちらです……！#n……おはようございます、先生。"
1005402-29 = "急なお願いでしたのに、こんな朝早くからありがとうございます。"
1005402-30 = "[s3] \"マリー……？\"\n[s4] \"今日はシスター服じゃないんだね。\""
1005402-33 = "は、はい。そのことでご相談がありまして……。"
1005402-34 = "近いうちに[ruby=こうりんたいさい]晄輪大祭[/ruby]がありますよね。#nそれで、私たちシスターフッドからも何人か参加するのですが……。"
1005402-35 = "成り行きで私も参加することになりまして……。"
1005402-36 = "その……少々困っているんです。#n私、運動には自信がありませんし……その……"
1005402-37 = "[s5] \"何か心配事が……？\"\n[s6] \"もしかして、体操着になるのを気にしてたり？\""
1005402-40 = "その、えっと……"
1005402-41 = "はい、少し……"
1005402-42 = "すみません……運動用の格好だと分かっていても、どうしても慣れなくて。"
1005402-43 = "こんなに肌が見えてしまうなんて……#n先生の前に立っているだけでも恥ずかしいです……。"
1005402-44 = "ベールがないのも相まって、更に落ち着かなくて……。"
1005402-45 = "あっ、体操着が悪いとかではないんです！#nただ、どうしても慣れそうになくて……。"
1005402-46 = "そもそも私にはこのような格好、似合わないですし……運動ができるわけでもないのに、大運動会に参加するのは間違っているような気もしてしまい……"
1005402-47 = "こんな状態の私が参加しては、他の方々の迷惑になってしまいます……。"
1005402-48 = "ですから……その……"
1005402-52 = "私は晄輪大祭に参加せず、いつものようにシスターの格好で……。"
1005402-53 = "助けを必要とする方々の力になったほうが……。"
1005402-54 = "と、そんなことを考えていました。#n……ですが、私一人で決める事ではないと思い、先生にご相談したかったのです。"
1005402-55 = "……え？"
1005402-56 = "よく似合って……ますか？"
1005402-57 = "そ、そうでしょうか……。#nありがとうございます……ふふっ。"
1005402-58 = "……どうして参加に対して気が引けているのか？ですか……。"
1005402-59 = "気が引けているというわけではないのですが……。"
1005402-60 = "その……こういった大きなイベントに参加したことがなく……。"
1005402-61 = "運動といえば、たまに他のシスターと卓球をするくらいで。"
1005402-62 = "そんな時でも、皆さんとてもお上手で、私はいつもあと一歩及ばずに負けてしまうんです……。"
1005402-63 = "もちろん皆さんお優しいですし、不慣れな私にも親切に教えてくださって、楽しい時間を過ごしています。"
1005402-64 = "ですが、それはあくまで大聖堂の中のお話で……#n他の学園も交えた対抗戦ともなると、怖気づいてしまうんです。"
1005402-65 = "……えっ？"
1005402-66 = "……シスターと卓球をする時、ですか？"
1005402-67 = "体操着はどうも気恥ずかしくて……#n私はいつもシスターの格好で皆さんに混ざっていました。"
1005402-68 = "実は……体操着に袖を通したのは今日が初めてなんです。#nこの姿をお見せしたのも……先生だけです。"
1005402-69 = "[s7] \"シスターの格好で卓球を……？\"\n[s8] \"もしかして、実は運動神経がいいのかも……。\""
1005402-72 = "ど、どうでしょう……？"
1005402-73 = "……えっ？"
1005402-74 = "少しでも興味があるなら、挑戦してみても良い、のですか……？#n本当に、私でも……？"
1005402-75 = "で、ですが……この格好は流石に……。"
1005402-76 = "……なるほど。#nむしろシスター姿のほうが変に目立つのですか……？"
1005402-80 = "一人だけシスターの格好をしている自分を思い浮かべてみましたが……。"
1005402-81 = "……たしかに、おっしゃる通りですね。"
1005402-82 = "ありがとうございます、先生。#n危うく好奇の目で見られてしまうところでした。"
1005402-83 = "今さらですが、学園の体操着は統一されていますし、周囲に溶け込んだほうが目立たずに過ごせそうです。"
1005402-84 = "どうしても露出は気になってしまいますが……。"
1005402-85 = "……先生に相談したおかげで、気持ちが楽になりました。"
1005402-86 = "辞退しようか迷っていましたが、改めて参加する旨をお伝えしてきます。"
1005402-91 = "あ……そうだ。"
1005402-95 = "先生も……晄輪大祭に参加されますか？"
1005402-96 = "……あ、選手として参加するわけではありませんよね。#nうっかりしていました。ふふっ、先生なのですから、当然でしたね。"
1005402-97 = "でも、当日は会場にいらっしゃいますよね……？"
1005402-101 = "ありがとうございます、先生。#n相談したおかげで、決心がつきました。"
1005402-102 = "晄輪大祭……辞退したら後悔するところでした。"
1005402-103 = "……ふふっ。#n先生とお話できて良かったです。"
1005402-104 = "それでは、また後ほど。#nよろしくお願いいたしますね、先生。"
1005402-106 = "（その後、なぜかうれしそうなマリーに見送られて、シャーレに戻った）"
