[translation]
1600620-1 = "O melhor (?) refúgio de verão"
1600620-3 = "Com o Sensei... na praia... comer algo delicioso..."
1600620-4 = "[s] \"Com a Izumi... na praia... esquecendo o calor...\""
1600620-5 = "Não dá... #nSe continuar assim, vou desperdiçar meu tempo..."
1600620-6 = "Waaaaaah..."
1600620-11 = "[ns1] \"Ah... a Izumi está derretendo...\"\n[ns2] \"Bem, então eu também não vou me segurar...\""
1600620-14 = "Waaa... #nO Sensei também acabou derretendo..."
1600620-15 = "[s] \"Não tem como evitar...\""
1600620-16 = "É verdade... não tem como evitar, né..."
1600620-17 = "Isso é... demais..."
1600620-18 = "Está quente demaissssss!"
1600620-20 = "Ufa... consegui chegar até a sombra... #nFinalmente vou voltar à vida~"
1600620-21 = "Mas, talvez por causa do calor, disseram que a loja vai ficar fechada por um tempo!"
1600620-22 = "Se continuar assim, meu plano de conquistar as iguarias da praia com o Sensei vai por água abaixo!"
1600620-23 = "[s] \"Qualquer coisa serve... algo gelado...\""
1600620-24 = "Ugh... é verdade... #nAlgo gelado, algo gelado..."
1600620-25 = "Ah, eu tenho isso!"
1600620-26 = "Tcharam!"
1600620-31 = "É uma caixa térmica! #nEu trouxe cheia de frutas, sucos e outras coisas!"
1600620-32 = "Vou fazer um ponche de frutas para você!"
1600620-33 = "[s] \"U-um ponche de frutas feito pela Izumi...?\""
1600620-34 = "Bem, primeiro melancia e abacaxi, né? #nE também vou colocar mirtilo e cereja..."
1600620-35 = "Ah, também preciso colocar suco, né? #nSuco de laranja e refrigerante, e depois, e depois..."
1600620-36 = "(Talvez por termos nos refugiado na sombra, uma brisa fresca começou a soprar)"
1600620-37 = "Calamondin, maracujá, marmelo, abacate..."
1600620-40 = "(Junto com o som das ondas, as gaivotas voam em direção ao céu)"
1600620-42 = "Durião, marmelo, pepino doce, kiwano em conserva, noni..."
1600620-43 = "E também, suco concentrado de cereja ácida, #nsuco de agulhas de pinheiro e root beer...!"
1600620-44 = "[ns3] \"E-espera um pouco! Izumi!\"\n[ns4] \"Tinha ingredientes ali que não parecem nada com um ponche de frutas!?\""
1600620-47 = "Hã? Eu só coloquei frutas e sucos... #nÉ um ponche de frutas, então não tem problema colocar qualquer fruta, né?"
1600620-48 = "Ah! Será que você achou que um ponche de frutas não seria refrescante? #nNão se preocupe, eu coloquei bastante gelo também!"
1600620-49 = "Agora, para finalizar, vou colocar meu tempero secreto especial...!"
1600620-50 = "E se misturar bem assim...!"
1600620-51 = "Prontinho! Vamos, pode servir!"
1600620-52 = "Ué, o que houve, Sensei?"
1600620-53 = "...Ah, entendi. #nComo fui eu que fiz, você está me deixando ir primeiro, né?"
1600620-54 = "Obrigada, Sensei! Então, não vou me segurar...!"
1600620-56 = "(Izumi colocou o ponche de frutas na boca sem hesitar...)"
1600620-57 = "Nham nham... hummm! #nSensei! Isso está realmente delicioso!"
1600620-58 = "O sabor de cada fruta se destaca, é simplesmente incrível!"
1600620-59 = "[s] \"Era de se esperar, já que são ingredientes que a Izumi gosta...\""
1600620-60 = "Hehehe, será por isso? #nEu adorei esse ponche de frutas!"
1600620-61 = "Eu mesma digo isso, mas #né o sabor mais memorável que já provei até hoje!"
1600620-62 = "Vamos, vamos, Sensei, experimente logo!"
1600620-63 = "...O que foi? #nSerá que você não quer comer algo que eu fiz...?"
1600620-64 = "[s] \"Ugh, um ataque inesperado da Izumi...!\""
1600620-65 = "Hã, como assim? Eu não fiz nada?"
1600620-66 = "Mais importante, aqui! #nSe não é que você não quer comer, então pegue! #nO seu eu coloquei em um prato grande, especialmente para você!"
1600620-67 = "(Não consegui resistir aos olhos cheios de expectativa da Izumi...!)"
1600620-80 = "...S-Sensei...!"
1600620-81 = "Acorde, Sensei! Uwaaaaaan!"
1600620-82 = "[s] \"Izumi...?\""
1600620-83 = "Sensei, você acordou!? Está tudo bem!?"
1600620-84 = "Eu fiquei preocupada, sabia!#nVocê tinha acabado de desmaiar, sabia?"
1600620-85 = "[s] \"Tudo não passou de um sonho de uma noite de verão... ou melhor, de um dia de verão...\""
1600620-86 = "Hã? O que você quer dizer?#nO Sensei às vezes diz coisas que eu não entendo..."
1600620-87 = "Mas... o que a gente faz, Sensei? Já está ficando de tarde.#nNo fim das contas, não conseguimos fazer nada o dia todo..."
1600620-88 = "[s5] \"Mas, no fim das contas, esquecemos do calor.\"\n[s6] \"Acho que o objetivo foi alcançado, não foi?\""
1600620-94 = "Hmm, será...?"
1600620-95 = "Eu não entendo muito bem, mas...#nse o Sensei diz isso, então deve ser verdade! É!"
