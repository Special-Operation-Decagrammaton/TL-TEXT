[translation]
1600620-1 = "最高の（？）避暑"
1600620-3 = "先生と……海で……美味しいものを……。"
1600620-4 = "[s] \"イズミと……海で……暑さを忘れて……。\""
1600620-5 = "ダメだ～……。#nこのままじゃ時間がもったいないのに……。"
1600620-6 = "ふええええん……。"
1600620-11 = "[ns1] \"あ……イズミがふにゃふにゃに……。\"\n[ns2] \"じゃあ、私も遠慮なく……。\""
1600620-14 = "ふええ……。#n先生もふにゃふにゃになっちゃった～……。"
1600620-15 = "[s] \"だって仕方ないよ……。\""
1600620-16 = "そうだね……仕方ないよね……。"
1600620-17 = "これは……あまりにも……。"
1600620-18 = "暑すぎるううううぅぅぅ～～～！"
1600620-20 = "はぁ……なんとか日陰まで来れた……。#nやっと生き返るよ～"
1600620-21 = "でも暑すぎるからか、お店はしばらく休業だっていうし！"
1600620-22 = "このままじゃ先生と一緒に#n海の珍味を制覇する計画がめちゃくちゃだよぉ～！"
1600620-23 = "[s] \"なんでもいいから……冷たいものを……。\""
1600620-24 = "ううっ……そうだね……#n冷たいもの、冷たいもの……。"
1600620-25 = "そうだ、これがあった！"
1600620-26 = "じゃじゃ～ん！"
1600620-31 = "クーラーボックスで～す！#nフルーツとかジュースとかをたくさん入れて持ってきたんだ～！"
1600620-32 = "これで私がフルーツポンチを作ってあげる！"
1600620-33 = "[s] \"イ、イズミが作るフルーツポンチ……？\""
1600620-34 = "えーっと、まずはスイカにパイナップルでしょ？#nブルーベリーとチェリーもいれて～……"
1600620-35 = "あっ、ジュースも入れなきゃだよね？#nオレンジジュースとソーダ、それからそれから～……"
1600620-36 = "（日陰に避難したからか、涼しい風が吹いてきた）"
1600620-37 = "カラマンシー、パッションフルーツ、カリン、アボカド……"
1600620-40 = "（波の音とともに、カモメが空へ飛んでいく）"
1600620-42 = "ドリアン、マルメロ、ペピーノ、キワーノの塩漬け、ノニ……"
1600620-43 = "あとあと、濃縮タルトチェリー果汁と#n松葉ジュース、ルートビアも……！"
1600620-44 = "[ns3] \"ちょ、ちょっと待って！イズミ！\"\n[ns4] \"フルーツポンチらしくない材料が紛れてたけど！？\""
1600620-47 = "え？フルーツとジュースしか入れてないけど……#nフルーツポンチだし、どんなフルーツを入れても問題ないよね？"
1600620-48 = "あ！もしかしてフルーツポンチじゃ涼めないと思ったとか？#n大丈夫だよ、氷もいっぱい入れておいたから！"
1600620-49 = "それじゃ仕上げに、私特製・秘伝スパイスをかけて……！"
1600620-50 = "ぐるぐる～っと混ぜれば……！"
1600620-51 = "かんせ～い！さあさあどうぞ召し上がれ！"
1600620-52 = "あれ、どうしたの先生？"
1600620-53 = "……あっ、わかった。#n私が作ったから、先を譲ってくれてるんだね？"
1600620-54 = "ありがとう先生！それじゃ遠慮なく……！"
1600620-56 = "（イズミは何のためらいもなくフルーツポンチを口に入れた……）"
1600620-57 = "もぐもぐ……んんっ！#n先生！これほんとに美味しいよ！"
1600620-58 = "それぞれのフルーツの味が引き立っててもう最高！"
1600620-59 = "[s] \"イズミが好きそうな材料だったからね……。\""
1600620-60 = "えへへっ、だからかな？#nこのフルーツポンチ、結構気に入っちゃった！"
1600620-61 = "自分で言うのもなんだけど、#n今までに食べた中で一番記憶に残る味だよ！"
1600620-62 = "ほらほら、先生も早く食べてみて！"
1600620-63 = "……どうしたの？#nもしかして、私が作ったものは食べたくないとか……？"
1600620-64 = "[s] \"うっ、予期せぬイズミの攻撃が……！\""
1600620-65 = "え、どういうこと？私、何もしてないよ？"
1600620-66 = "それより、はい！#n食べたくない訳じゃないなら、受け取って！#n先生のは特別に、大きな皿に入れておいたから！"
1600620-67 = "（イズミの期待に満ちた目に勝つことができなかった……！）"
1600620-80 = "……い、先生……！"
1600620-81 = "しっかりして、先生！うわああぁぁん！"
1600620-82 = "[s] \"イズミ……？\""
1600620-83 = "先生、起きたの！？大丈夫！？"
1600620-84 = "心配するってば～！#nついさっきまで気を失ってたんだよ？"
1600620-85 = "[s] \"すべては真夏の夜の夢……いや昼か……。\""
1600620-86 = "ふぇ？どういうこと？#n先生は時々よくわからないことを言うよね……。"
1600620-87 = "でも……どうしよう、先生。もう夕方になっちゃったよ？#n結局一日中何もできなかったし……。"
1600620-88 = "[s5] \"でも結果的に暑さは忘れられたから。\"\n[s6] \"目的は達成したんじゃないかな？\""
1600620-94 = "う～ん、そうかな……？"
1600620-95 = "よくわからないけど……#n先生がそう言うんだし、そういうことにする！うん！"
