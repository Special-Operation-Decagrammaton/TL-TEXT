[translation]
1014203-1 = "The Girl on the Beach"
1014203-2 = "(A few days later. I visited the streets of Hyakkiyako for work...)"
1014203-5 = "Hey, have you heard that rumor?"
1014203-6 = "A rumor? About what?"
1014203-7 = "They say a Yuki-onna appears at Torii Beach!"
1014203-8 = "Ehh? A Yuki-onna?\r\n\r\n"
1014203-10 = "(In other places too...)"
1014203-12 = "No way, if a Yuki-onna was at the beach, wouldn't she melt from the sunlight?"
1014203-13 = "Is that how it works? Anyway, it's become a rumor."
1014203-14 = "That a Yuki-onna is wandering around the beach by herself!"
1014203-16 = "[ns1] (A strange rumor is spreading...)\r\n[ns2](Could it be...)"
1014203-20 = "(I rushed to the Hyakkarayouran club room.)"
1014203-22 = "Sensei? What's going on all of a sudden?"
1014203-24 = "(I told her about the rumor spreading in town.)\r\n"
1014203-26 = "……。\r\n"
1014203-27 = "That... might be about me."
1014203-28 = "I've been going to Torii Beach a lot lately."
1014203-29 = "I was swimming alone so as not to attract attention, but it seems to have had the#nopposite effect.\r\n"
1014203-30 = "...As I thought, no matter what I do, I end up drawing attention.\r\n"
1014203-31 = "[ns3] \"Th-This is my fault...!\"\n[ns4] \"I was the one who encouraged you to go to the beach more...\""
1014203-34 = "[ns] \"Alright, I've thought of a solution!\""
1014203-35 = "Hmm? What are you going to do?"
1014203-37 = "Let's go to the sea together!"
1014203-40 = "……。\r\n"
1014203-41 = "Since the rumor is that a Yuki-onna is wandering around alone..."
1014203-42 = "Are you saying that if you're by my side, the rumor will naturally die down?\r\n"
1014203-43 = "……。\r\n"
1014203-44 = "You're trying to use that as an excuse to play at the sea with me."
1014203-45 = "Sensei, you really are sly."
1014203-46 = "Well... it sounds fun."
1014203-47 = "Fine. Let's go, Sensei.\r\n"
1014203-48 = "[s] \"Yes...!\""
1014203-50 = "(And at the beach where I went with Nagusa...)\r\n"
1014203-58 = "(Many students were enjoying themselves.)"
1014203-63 = "There are more people today than usual."
1014203-65 = "Ah! Nagusa-san!"
1014203-66 = "Did you come to see the Yuki-onna too, Nagusa-san?"
1014203-68 = "...Hm?\r\n"
1014203-69 = "[s] \"Is that... the reason why there are so many people?\""
1014203-70 = "……。"
1014203-71 = "The rumored Yuki-onna is probably me."
1014203-73 = "Eh!?"
1014203-75 = "It seems my attempts to stay out of sight were misunderstood."
1014203-77 = "W-We didn't know that at all...!"
1014203-79 = "It's fine. Don't worry about it."
1014203-86 = "Well then, Sensei... shall we enjoy the sea together?"
1014203-87 = "So that everyone's misunderstanding can be cleared up."
1014203-88 = "[s] \"Of course!\""
1014203-110 = "(A truly fun time continued...)\r\n"
1014203-117 = "Is it... already this late?\r\n"
1014203-118 = "Thanks to you, Sensei, I had a really great time."
1014203-119 = "I even forgot why I came to the beach in the first place.\r\n"
1014203-120 = "I came here to clear up a misunderstanding, but I got so caught up in playing..."
1014203-121 = "[ns] \"The reason doesn't matter.\""
1014203-123 = "[ns] \"If you enjoyed the time we spent together, that's enough.\""
1014203-125 = "……。\r\n"
1014203-126 = "...Yeah. That's true."
1014203-127 = "If that’s the case, is it okay to ask you again?"
1014203-128 = "[s] \"Of course it is!\""
1014203-129 = "Thank you, Sensei."
1014203-134 = "It's gotten late... we should head back soon.\r\n"
1014203-136 = "(After that, I walked Nagusa back to the Hyakkarayouran club room.)"
1014203-137 = "(I'm already looking forward to the next time we go to the sea.)"