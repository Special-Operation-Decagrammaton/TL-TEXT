[translation]
1014203-1 = "浜辺の少女"
1014203-2 = "（数日後。仕事で百鬼夜行の街を訪れた……）"
1014203-5 = "ねえ、あの噂知ってる？"
1014203-6 = "噂？何の？"
1014203-7 = "鳥居海岸に雪女が出るんだって！"
1014203-8 = "ええっ？雪女？\r\n\r\n"
1014203-10 = "（他の場所でも……）"
1014203-12 = "いや、雪女が海なんかにいたら、日差しで溶けちゃいませんか？"
1014203-13 = "そういうもんかな？とにかく噂になっているんだよ。"
1014203-14 = "雪女が一人でビーチをうろついてるって！"
1014203-16 = "[ns1] （おかしな噂が広まっている……）\r\n[ns2] （まさか……）"
1014203-20 = "（急いで百花繚乱の部室を訪れた）"
1014203-22 = "先生？突然どうしたの？"
1014203-24 = "（街に広まっている噂について話す）\r\n"
1014203-26 = "……。\r\n"
1014203-27 = "それ、私のことかも。"
1014203-28 = "最近よく鳥居海岸に行ってるから。"
1014203-29 = "人目につかないように一人で泳いでたんだけど、逆効果だったみたい。\r\n"
1014203-30 = "……やっぱり、私は何をしても視線を集めてしまうのかな。\r\n"
1014203-31 = "[ns3] \"こ、これは私のせいだ……！\"\n[ns4] \"もっと海に行くように勧めたから……。\""
1014203-34 = "[ns] \"よし、解決策を考えた！\""
1014203-35 = "ん？どうするの？"
1014203-37 = "私と一緒に海へ行こう！"
1014203-40 = "……。\r\n"
1014203-41 = "雪女が一人でうろついてるって噂だから……。"
1014203-42 = "先生がそばにいれば自然と噂は収まる、ってこと？\r\n"
1014203-43 = "……。\r\n"
1014203-44 = "それを口実に私と海で遊ぼうとしてるんだ。"
1014203-45 = "やっぱり先生は、したたかだね。"
1014203-46 = "まあ……楽しそうだし。"
1014203-47 = "分かった。行こっか、先生。\r\n"
1014203-48 = "[s] \"やった……！\""
1014203-50 = "（そしてナグサと一緒に行った海では……）\r\n"
1014203-58 = "（多くの生徒たちが楽しんでいた）"
1014203-63 = "今日はいつもより人が多いね。"
1014203-65 = "あ！ナグサさん！"
1014203-66 = "ナグサさんも雪女を見に来たんですか？"
1014203-68 = "……ん？\r\n"
1014203-69 = "[s] \"やけに人が多いのは……そのせいかな？\""
1014203-70 = "……。"
1014203-71 = "噂の雪女は、たぶん私のことだよ。"
1014203-73 = "えっ！？"
1014203-75 = "目立たないようにって行動してたのが誤解されちゃったみたい。"
1014203-77 = "わ、私たち、そうとも知らずに……！"
1014203-79 = "大丈夫。気にしないで。"
1014203-86 = "それじゃ、先生……一緒に海を楽しもっか。"
1014203-87 = "みんなの誤解が解けるように。"
1014203-88 = "[s] \"もちろん！\""
1014203-110 = "（本当に楽しい時間が続いた……）\r\n"
1014203-117 = "もう……こんな時間か。\r\n"
1014203-118 = "先生のおかげで本当に楽しかった。"
1014203-119 = "海に来た目的を忘れるくらい。\r\n"
1014203-120 = "誤解を解きたくて来たのに、遊ぶのに夢中になって……。"
1014203-121 = "[ns] \"目的なんて関係ないよ。\""
1014203-123 = "[ns] \"一緒にいる時間が楽しかったなら、それで十分。\""
1014203-125 = "……。\r\n"
1014203-126 = "……うん。そうだね。"
1014203-127 = "それなら、またお願いしてもいいの？"
1014203-128 = "[s] \"当然だよ！\""
1014203-129 = "ありがとう、先生。"
1014203-134 = "遅くなったし……そろそろ帰ろう。\r\n"
1014203-136 = "（その後、ナグサを百花繚乱の部室まで送っていった）"
1014203-137 = "（次海に行く日が今から待ち遠しい）"
