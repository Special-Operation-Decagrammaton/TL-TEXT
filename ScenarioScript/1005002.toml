[translation]
1005002-1 = "ココナちゃんじゃないです。教官なんです！"
1005002-2 = "山海経訓育支援部・梅花園"
1005002-5 = "ココナちゃん～！私これほしい～"
1005002-6 = "ココナちゃん、今日のおやつは何？"
1005002-7 = "「ココナちゃん」じゃなくて「ココナ教官」！"
1005002-8 = "ココナちゃん～これわかんない。教えて！"
1005002-9 = "ねぇねぇ、ココナちゃん。#n本当にリーマンゼータ関数の零点が素数計数関数の振動を決定するの？"
1005002-10 = "「ココナちゃん」って呼ばないでって何回言ったら分かるの？"
1005002-11 = "そして最後の質問は一体なに……。"
1005002-12 = "[s1] \"お疲れ様。\"\n[s2] \"梅花園の教官ってすごいんだね……。\""
1005002-13 = "あっ、先生！"
1005002-14 = "あっ、先生！"
1005002-15 = "みんな先生に挨拶は？"
1005002-16 = "こんにちは、先生～"
1005002-17 = "もう……先生のことは、迷わず先生と呼ぶのに。"
1005002-18 = "何で私だけ「ココナちゃん」って呼ばれるのでしょう？"
1005002-19 = "あっ、いけない。"
1005002-20 = "立派なレディーであり、一人の教官として。"
1005002-21 = "頼もしい姿をお見せするために先生を招待したというのに……！"
1005002-22 = "[s] \"少し頼りない所もあるけど、十分頼もしいよ。\""
1005002-23 = "少し頼りない所ってなんですか！"
1005002-24 = "いや、こんなことですぐ怒ったらダメですね。"
1005002-25 = "レディーは些細なことで揺れる姿を見せてはいけませんから。"
1005002-26 = "レディーが偏食するのは大丈夫なの？ココナちゃん？"
1005002-27 = "れ、レディーでも、一つや二つくらい嫌いなものがあるの！だから大丈夫！"
1005002-28 = "じゃあ、私たちも嫌いなもの食べなくてもいい？"
1005002-29 = "それはダメ！まんべんなく食べないと！"
1005002-30 = "なんでココナちゃんはよくて、私たちはダメなの？変なの～"
1005002-31 = "それは私が教官だからだよ！"
1005002-32 = "教官ならお手本を見せなきゃいけないんじゃないの、ココナちゃん？"
1005002-33 = "そ、それはそうだけど……！"
1005002-34 = "先生も見てないで、何か一言いってください！"
1005002-38 = "[ns3] \"みんな、ココナ教官様の言うことをよく聞かないと。\"\n[ns4] \"ココナ教官様も、もう偏食しないと思うよ。\""
1005002-39 = "先生がココナちゃんのこと「教官様」って呼んでる～"
1005002-40 = "先生がココナちゃんのこと「教官様」って呼んでる～"
1005002-41 = "えー……でもココナちゃんはココナちゃんなのに……。"
1005002-42 = "先生がそう呼んでるなら、それで合ってるんじゃない？"
1005002-43 = "じゃあ……ココナ教官なのかな？#nいくらなんでも「教官様」は変だし……"
1005002-44 = "そうだよ！私はココナ教官。#n何回も言ってるでしょう？"
1005002-45 = "ココナ教官……？"
1005002-46 = "ココナ教官！"
1005002-47 = "[s] \"嬉しそうだね、ココナ教官様。\""
1005002-48 = "そ、そこまでじゃないですよ？"
1005002-49 = "でも……えへん。#nこれで十分、分かったでしょう？"
1005002-50 = "私が立派な梅花園の教官だという事を。"
1005002-51 = "ココナ教官～私、トイレ行きたい～"
1005002-52 = "ココナ教官～私、家族に会いたい～#nいつ来るの？"
1005002-53 = "ちょ、ちょっと待って！"
1005002-54 = "まったく子供たちは……一度勝手に動き出すと言うことを聞かないんだから……。"
1005002-55 = "[s] （ココナもまだまだ子供だけどなぁ……）"
1005002-56 = "……なんですかその顔は？"
1005002-57 = "……そう、ですか。なんでもないならいいんですけど。#nお疲れ様、ですか？"
1005002-58 = "いえ、子どもたちを一人前の園児に育てることは、山海経教官の責務ですから。"
1005002-59 = "これくらいのことで文句は言えません。"
1005002-60 = "ココナ教官～！#n早くおやつ食べたい。"
1005002-61 = "あーでもーココナ教官が作ったおやつは嫌いー#nまずいから！"
1005002-62 = "みんな、おやつの時間は全然まだだよ？"
1005002-63 = "あと、いつかシュン姉さんよりおいしい料理を作ってみせるから見てて。"
1005002-64 = "その時に、みんなを後悔させてあげるんだからね！"
1005002-65 = "わぁ～ココナちゃんが怒った～！"
1005002-66 = "なんでまたココナちゃんに戻ってるのよ！"
