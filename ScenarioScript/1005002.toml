[translation]
1005002-1 = "Não sou a Kokona-chan. Eu sou a instrutora!"
1005002-2 = "Departamento de Apoio ao Treinamento de Shanhaijing - Jardim das Ameixeiras"
1005002-5 = "Kokona-chan~! Eu quero isso~"
1005002-6 = "Kokona-chan, qual é o lanche de hoje?"
1005002-7 = "Não é 'Kokona-chan', é 'Instrutora Kokona'!"
1005002-8 = "Kokona-chan~ Eu não entendi isso. Me ensina!"
1005002-9 = "Ei, ei, Kokona-chan. #nOs zeros da função zeta de Riemann realmente determinam a oscilação da função de contagem de números primos?"
1005002-10 = "Quantas vezes eu tenho que dizer para não me chamarem de 'Kokona-chan'?"
1005002-11 = "E o que foi aquela última pergunta, afinal..."
1005002-12 = "[s1] \"Bom trabalho.\"\n[s2] \"A instrutora do Jardim das Ameixeiras é incrível, hein...\""
1005002-13 = "Ah, Sensei!"
1005002-14 = "Ah, Sensei!"
1005002-15 = "Pessoal, cadê o cumprimento para o Sensei?"
1005002-16 = "Olá, Sensei~"
1005002-17 = "Poxa... vocês chamam o Sensei de Sensei sem hesitar."
1005002-18 = "Por que só eu sou chamada de 'Kokona-chan'?"
1005002-19 = "Ah, não pode."
1005002-20 = "Como uma dama exemplar e como uma instrutora."
1005002-21 = "Eu convidei o Sensei para mostrar uma postura confiável, mas...!"
1005002-22 = "[s] \"Você tem seus momentos de insegurança, mas é bem confiável, sim.\""
1005002-23 = "Como assim, momentos de insegurança?!"
1005002-24 = "Não, não posso ficar brava por causa disso."
1005002-25 = "Uma dama não deve demonstrar que se abala com coisas triviais."
1005002-26 = "Tudo bem uma dama ser seletiva com a comida? Kokona-chan?"
1005002-27 = "M-mesmo sendo uma dama, a gente pode ter uma ou duas coisas que não gosta! Então está tudo bem!"
1005002-28 = "Então, a gente também não precisa comer o que não gosta?"
1005002-29 = "Isso não pode! Vocês têm que comer de tudo!"
1005002-30 = "Por que a Kokona-chan pode e a gente não? Que estranho~"
1005002-31 = "É porque eu sou a instrutora!"
1005002-32 = "Se é instrutora, não deveria dar o exemplo, Kokona-chan?"
1005002-33 = "I-isso é verdade, mas...!"
1005002-34 = "Sensei, não fique só olhando, diga alguma coisa!"
1005002-38 = "[ns3] \"Pessoal, vocês precisam ouvir o que a Instrutora Kokona diz.\"\n[ns4] \"Acho que a Instrutora Kokona também não vai mais ser seletiva com a comida.\""
1005002-39 = "O Sensei chamou a Kokona-chan de 'Instrutora'~"
1005002-40 = "O Sensei chamou a Kokona-chan de 'Instrutora'~"
1005002-41 = "É... mas a Kokona-chan é a Kokona-chan..."
1005002-42 = "Se o Sensei a chama assim, então deve estar certo, não?"
1005002-43 = "Então... seria Instrutora Kokona? #nMas 'Instrutora' soa estranho..."
1005002-44 = "Isso mesmo! Eu sou a Instrutora Kokona. #nEu já disse várias vezes, não disse?"
1005002-45 = "Instrutora Kokona...?"
1005002-46 = "Instrutora Kokona!"
1005002-47 = "[s] \"Parece feliz, Instrutora Kokona.\""
1005002-48 = "N-não é para tanto, sabe?"
1005002-49 = "Mas... *cof*. #nCom isso, vocês entenderam bem, não entenderam?"
1005002-50 = "Que eu sou uma instrutora exemplar do Jardim das Ameixeiras."
1005002-51 = "Instrutora Kokona~ Eu quero ir ao banheiro~"
1005002-52 = "Instrutora Kokona~ Eu quero ver minha família~ #nQuando eles vêm?"
1005002-53 = "E-esperem um pouco!"
1005002-54 = "Essas crianças... quando começam a agir por conta própria, não ouvem nada..."
1005002-55 = "[s] (A Kokona também ainda é uma criança, afinal...)"
1005002-56 = "……que cara é essa?"
1005002-57 = "……Entendo. Se não é nada, então tudo bem. #nBom trabalho, é isso?"
1005002-58 = "Não, educar as crianças para se tornarem alunas exemplares é o dever de uma instrutora de Shanhaijing."
1005002-59 = "Não posso reclamar por causa de algo assim."
1005002-60 = "Instrutora Kokona~! #nQuero comer o lanche logo."
1005002-61 = "Ah, mas eu não gosto do lanche que a instrutora Kokona faz! #nÉ ruim!"
1005002-62 = "Pessoal, ainda está muito longe da hora do lanche, entenderam?"
1005002-63 = "E outra, um dia eu vou fazer uma comida mais gostosa que a da Shun, só esperem para ver."
1005002-64 = "Quando esse dia chegar, vou fazer todos vocês se arrependerem!"
1005002-65 = "Uau~ a Kokona-chan ficou brava~!"
1005002-66 = "Por que você voltou a me chamar de Kokona-chan de novo!"
