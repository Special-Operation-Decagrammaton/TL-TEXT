[translation]
2005803-1 = "エリカと夜のお散歩"
2005803-3 = "せんせー、やっほ♪"
2005803-4 = "なんかこんな時間に先生と会うの、ちょっと不思議な感じ。"
2005803-5 = "[s1] \"たしかに。ちょっと遅い時間だもんね。\"\n[s2] \"エリカはお腹空いてる？\""
2005803-8 = "ん～、ちょっと？"
2005803-12 = "……結構すいたかも？"
2005803-13 = "動いてる時は全然感じなかったのに……なんでだろ。#n意識すると急にお腹空いてきちゃった。"
2005803-14 = "[s3] \"私もペコペコだよ～\"\n[s4] \"何か食べたいものとかある？\""
2005803-17 = "うーん……。"
2005803-20 = "あれとか……どうかな？"
2005803-23 = "なんか見てたらハンバーガーの気分になってきちゃって。"
2005803-24 = "先生はハンバーガー好き？よく食べる方？"
2005803-25 = "[s5] \"めっちゃ好き！\"\n[s6] \"今日はなんかいつもより美味しく食べられそう！\""
2005803-28 = "本当？私に合わせてたりしない？"
2005803-29 = "まぁ、それならいいんだけどさ。"
2005803-30 = "こんな時間なのに結構混んでるね。みんなテンション高いし。"
2005803-31 = "なんとなくだけど、夜のファストフード店ってテンション上がるのも分かるかも。"
2005803-32 = "明日の準備をしてる時間だけど、外で高カロリーなものを食べるのって……なんかほら、背徳感？開放感？みたいなのがあるっていうか。"
2005803-33 = "[s7] \"今を楽しんでるって感じがするよね。\"\n[s8] \"なんか分かるかも。\""
2005803-36 = "そうそう。#nちょっと良くないことをしてる、みたいな。あははっ。"
2005803-40 = "お、結構早いね。"
2005803-47 = "[ns] \"お待たせしました～\""
2005803-48 = "取りに行ってもらっちゃってごめん。#n奢ってもらっちゃったし……ありがと、先生。"
2005803-49 = "先生は何頼んだの？"
2005803-50 = "[s9] \"トリプルチーズバーガーセット！\"\n[s10] \"シュリンプバーガーセット！\""
2005803-53 = "じゃあこっちだね。私のはこっち。"
2005803-57 = "ベーコントマトチーズバーガーセット♪"
2005803-58 = "[s11] \"あれ？トマトがないけど。\"\n[s12] \"店員さん間違えちゃった？\""
2005803-61 = "あ、いや……トマト抜きにしてもらってるんだ。"
2005803-62 = "ほら……バーガーのトマトってちょっと食べづらくない？"
2005803-63 = "うまく噛み切れないと全部ついてきちゃうし。"
2005803-64 = "なんか食べ方汚くなるの、あんま見られたくないっていうか……。"
2005803-65 = "先生と一緒だし……特にみたいな。"
2005803-66 = "「それなら私にくれればいい」……？"
2005803-67 = "……。"
2005803-68 = "えっ、ちょっとそれは……流石に。"
2005803-69 = "また今度ね！"
2005803-73 = "よし、改めて……。"
2005803-74 = "いただきます！ありがとね先生！"
2005803-76 = "（そうしてエリカと遅めの夕飯を楽しんだ）"
