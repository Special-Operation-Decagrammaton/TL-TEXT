[translation]
2005803-1 = "Erika and a Night Walk"
2005803-3 = "Sensei, yahoo♪"
2005803-4 = "Meeting you at this hour feels a little strange, Sensei."
2005803-5 = "[s1] \"It does. It's a little late after all.\"\n[s2] \"Are you hungry, Erika?\""
2005803-8 = "Hmm, a little?"
2005803-12 = "...Maybe I'm pretty hungry?"
2005803-13 = "I didn't feel it at all while I was moving around... I wonder why. #nNow thinking of it, I'm suddenly getting hungry."
2005803-14 = "[s3] \"I'm starving too~\"\n[s4] \"Is there anything you want to eat?\""
2005803-17 = "Hmm..."
2005803-20 = "How about... that?"
2005803-23 = "Looking at it kinda put me in the mood for a hamburger."
2005803-24 = "Do you like hamburgers, Sensei? Do you eat them often?"
2005803-25 = "[s5] \"I love them!\"\n[s6] \"I feel like they'll taste even better than usual today!\""
2005803-28 = "Really? Are you just going along with me?"
2005803-29 = "Well, that's fine if so."
2005803-30 = "It's pretty crowded even though it's this late. Everyone's really fired up."
2005803-31 = "I kinda get why people get hyped up at a fast food place at night."
2005803-32 = "It's the time you'd usually be preparing for tomorrow, but eating high-calorie food#noutside... it's like, you know, a sense of guilt? Or a sense of freedom? Something #nlike that."
2005803-33 = "[s7] \"It feels like enjoying the moment.\"\n[s8] \"I think I kinda get it.\""
2005803-36 = "Yeah, exactly. #nLike we're doing something a bit bad. Ahaha."
2005803-40 = "Oh, that was pretty fast."
2005803-47 = "[ns] \"Thank you for waiting~\""
2005803-48 = "Sorry for making you go get it. #nAnd you even treated me... Thanks, Sensei."
2005803-49 = "What did you order, Sensei?"
2005803-50 = "[s9] \"Triple cheese burger set!\"\n[s10] \"Shrimp burger set!\""
2005803-53 = "Then this one is yours. This one is mine."
2005803-57 = "Bacon tomato cheese burger set♪"
2005803-58 = "[s11] \"Huh? There's no tomato.\"\n[s12] \"Did the staff make a mistake?\""
2005803-61 = "Ah, no... I asked them to take the tomatoes out."
2005803-62 = "You know... aren't the tomatoes in burgers a little hard to eat?"
2005803-63 = "If you don't bite through it properly, the whole thing comes out."
2005803-64 = "It makes the way you eat messy, and I kinda don't want to be seen like that..."
2005803-65 = "Especially since I'm with you, Sensei... something like that."
2005803-66 = "\"Then you could just give them to me\"...?"
2005803-67 = "..."
2005803-68 = "Eh, wait, that's... a bit much."
2005803-69 = "Maybe next time!"
2005803-73 = "Alright, once again..."
2005803-74 = "Let's eat! Thanks, Sensei!"
2005803-76 = "(And so, I enjoyed a late dinner with Erika.)"