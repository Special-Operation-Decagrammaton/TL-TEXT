[translation]#[Não revisado] - Filipe 09/06/26
2005803-1 = "Erika e o passeio noturno"
2005803-3 = "Professor~ oi~"
2005803-4 = "Te encontrar a essa hora é meio estranho, não?"
2005803-5 = "[s1] \"É mesmo. Está meio tarde.\"\n[s2] \"Erika, você está com fome?\""
2005803-8 = "Hmm, um pouco?"
2005803-12 = "Até que estou com fome, sim."
2005803-13 = "Quando eu estava andando, nem sentia... Sabe quando você pensa, aí bate a fome?"
2005803-14 = "[s3] \"Estou morto de fome também.\"\n[s4] \"Tem alguma coisa que você quer comer?\""
2005803-17 = "Hmm..."
2005803-20 = "Aquele ali... que tal?"
2005803-23 = "De repente, fiquei com vontade de hambúrguer."
2005803-24 = "Professor, você gosta de hambúrguer? Come bastante?"
2005803-25 = "[s5] \"Adoro!\"\n[s6] \"Hoje parece que vai ser ainda mais gostoso do que de costume!\""
2005803-28 = "Sério? Não tá falando só para me agradar?"
2005803-29 = "Bom, se for isso, tudo bem."
2005803-30 = "Está bem cheio para essa hora. Todo mundo está animado, né."
2005803-31 = "De certa forma, eu entendo a vibe de ficar animado numa lanchonete fast food à noite."
2005803-32 = "É a hora de se preparar para o dia seguinte, mas comer algo calórico fora de casa... meio que dá uma sensação de pecado? De libertação?"
2005803-33 = "[s7] \"É como se estivesse vivendo o momento.\"\n[s8] \"Acho que entendo.\""
2005803-36 = "Isso. Meio que fazer algo errado, sabe? Ahaha."
2005803-40 = "Opa, foi rápido."
2005803-47 = "[ns] \"Desculpem a demora~\""
2005803-48 = "Desculpa, você que foi buscar. E ainda pagou... obrigada, professor."
2005803-49 = "O que você pediu?"
2005803-50 = "[s9] \"Combo do hambúrguer triplo queijo!\"\n[s10] \"Combo do hambúrguer de camarão!\""
2005803-53 = "Então aqui é o seu. Esse é o meu."
2005803-57 = "Combo do hambúrguer bacon tomate queijo♪"
2005803-58 = "[s11] \"Ora? Cadê o tomate?\"\n[s12] \"O funcionário errou?\""
2005803-61 = "Ah, não... eu pedi sem tomate."
2005803-62 = "Sabe... o tomate do hambúrguer não é meio difícil de comer?"
2005803-63 = "Se não morder direito, ele sai todo."
2005803-64 = "Não gosto que me vejam comendo de um jeito desajeitado... especialmente perto de você."
2005803-65 = "'Então me dá que eu como' ...?"
2005803-66 = "..."
2005803-67 = "Hã, isso não dá... por mais que..."
2005803-68 = "Fica para a próxima!"
2005803-73 = "Certo, vamos lá."
2005803-74 = "Vou comer! Obrigada pela refeição, professor!"
2005803-76 = "(E assim, aproveitou o jantar tardio com Erika)"