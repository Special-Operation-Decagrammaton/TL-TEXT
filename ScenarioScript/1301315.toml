[translation]
1301315-1 = "Sobre coisas que costumamos esquecer"
1301315-2 = "（Fomos até a biblioteca de Red Winter）"
1301315-4 = "V-você realmente veio!"
1301315-5 = "Sinto muito, por algo tão trivial..."
1301315-6 = "Não estou te incomodando, estou...?"
1301315-7 = "[s] De qualquer forma, vamos procurar!"
1301315-8 = "E-entendido..."
1301315-9 = "O que estamos procurando? ...é isso que quer saber."
1301315-10 = "……"
1301315-11 = "Bem...!"
1301315-12 = "Err...!"
1301315-13 = "É a coleção limitada da reedição da obra de estreia da professora Ruriel..."
1301315-14 = "[s] \"Isso não é algo muito importante!?\""
1301315-15 = "C-claro, é algo especial para os fãs, mas..."
1301315-16 = "Para a maioria das pessoas, é apenas um conjunto completo de mangás..."
1301315-17 = "Hã? Para mim, é um tesouro...?"
1301315-18 = "……!"
1301315-19 = "……Muito obrigada!"
1301315-20 = "Sinto-me melhor agora. Vamos procurar!"
1301315-22 = "（Começamos a revirar a biblioteca de cima a baixo para encontrar o \"tesouro\" da Momiji...）"
1301315-27 = "（Depois de procurar por um tempo...）"
1301315-29 = "[ns] \"Ué?\""
1301315-31 = "[ns] \"Será que é isso?\""
1301315-32 = "……？"
1301315-33 = "E-em um lugar desses...!"
1301315-34 = "Que bom que encontramos...!"
1301315-35 = "Perder algo na biblioteca... que bibliotecária desastrada eu sou..."
1301315-36 = "Sim. O plástico ainda está nele, nunca foi aberto."
1301315-37 = "Hehe...! Eu guardo com muito carinho, sabe?"
1301315-38 = "……Porque é a minha coleção favorita!"
1301315-40 = "（Curioso, pesquisei o título do mangá）"
1301315-41 = "（Então...！）"
1301315-43 = "[ns1] \"……！？\"\n[ns2] \"Momiji, olha isso!\""
1301315-46 = "O que houve?"
1301315-47 = "Essa coleção está com um preço de colecionador...?"
1301315-48 = "……"
1301315-49 = "O quê!?"
1301315-50 = "T-tanto assim...? #nSerá que é um hack ou erro no site...?"
1301315-51 = "[s] \"Eu verifiquei várias vezes, acho que está correto...\""
1301315-52 = "E-é comum que edições limitadas de lançamento ganhem valor, mas..."
1301315-53 = "N-nunca vi chegar a esse valor... Com isso, eu poderia..."
1301315-58 = "（Poderia comprar novos livros sem precisar pedir autorização...）"
1301315-59 = "（Poderia até comprar aquecedores novos...！）"
1301315-60 = "（Poderia pedir ao Departamento de Engenharia para construir o anexo dos meus sonhos...! E além disso...）"
1301315-61 = "（E além disso... pudim à vontade...!）"
1301315-62 = "（E ainda sobraria troco...）"
1301315-63 = "[ns] \"Momiji, você está bem?\""
1301315-64 = "S-sim!"
1301315-65 = "……E-eu estava viajando, não estava!?"
1301315-66 = "Uuuu..."
1301315-67 = "……。"
1301315-68 = "Uuuun……！"
1301315-69 = "N-não, não dá mesmo!"
1301315-71 = "[ns] \"É uma coleção importante, né.\""
1301315-72 = "Sim……."
1301315-73 = "Porque esta é a minha \"primeira coleção\"."
1301315-74 = "Eu me esforcei para comprar antes que saísse de catálogo……."
1301315-75 = "Mesmo que tenha um preço de colecionador, não consigo me desfazer dela."
1301315-76 = "Para mim, é algo importante e especial――"
1301315-77 = "――é a minha coleção."
1301315-78 = "Assim como existem pessoas que pagariam qualquer valor para ter esta coleção――"
1301315-79 = "Não tem problema existir um entusiasta que insiste em não se desfazer dela, não importa quanto ofereçam, certo?"
1301315-80 = "[s3] \"Sim, eu também penso assim.\"\n[s4] \"Esse jeito de pensar também é importante.\""
1301315-83 = "……Muito obrigada."
1301315-84 = "……。"
1301315-85 = "…………。"
1301315-86 = "S-sim!? Eu estava distraída de novo!?"
1301315-87 = "……Ugh……！"
1301315-88 = "N-não tem jeito, eu não sirvo para ser colecionadora……"
1301315-89 = "……Eu estava pensando que daria para comprar dezenas de caixas de pudim……."
1301315-90 = "Acabou passando pela minha cabeça……."
1301315-91 = "[s5] \"Se for pudim, pode deixar comigo!\"\n[s6] \"Vou deixar você comer o quanto quiser!\""
1301315-94 = "S-sério mesmo!?"
1301315-95 = "Ehehe…… estou muito feliz, Sensei!"
1301315-97 = "（Assim, passei um momento divertido comendo lanches com a Momiji）"
