[translation]
1301315-1 = " 忘れがちなものについて"
1301315-2 = "（レッドウィンターの図書館に向かった）"
1301315-4 = "ほ、本当に来てくださるなんて！"
1301315-5 = "ごめんなさい、こんなことで…… 。"
1301315-6 = "ご迷惑じゃ……。"
1301315-7 = "[s] とりあえず、探してみる！"
1301315-8 = "わ、わかりました……"
1301315-9 = "何を探すの？……ですか。"
1301315-10 = "……"
1301315-11 = "その……！"
1301315-12 = "えっと……！"
1301315-13 = "ルリエル先生のデビュー作の、復刻版限定コレクション……です……。"
1301315-14 = "[s] \"とっても大事なものじゃない！？\""
1301315-15 = "も、もちろん、ファンには特別なものですが……。"
1301315-16 = "大半の人にとっては、ただの漫画全巻セットです……。"
1301315-17 = "え？私にとっては宝物……？"
1301315-18 = "……！"
1301315-19 = "……ありがとうございます！"
1301315-20 = "元気が出てきました。探していきましょう！"
1301315-22 = "（モミジの「宝物」を探すため、図書館を隅々まで調べ始めた……）"
1301315-27 = "（しばらく探していると……）"
1301315-29 = "[ns] \"あれ？\""
1301315-31 = "[ns] \"もしかして、これ？\""
1301315-32 = "……？"
1301315-33 = "そ、そんなところに……！"
1301315-34 = "見つかってよかった……！"
1301315-35 = "図書館でなくすなんて、司書失格ですね……"
1301315-36 = "ええ。ビニールは掛けたままで、開封していないんです。"
1301315-37 = "えへへ……！大事に保管しているんですよ？"
1301315-38 = "……私の一番のコレクションですから！"
1301315-40 = "（興味が湧き、漫画のタイトルを検索した）"
1301315-41 = "（すると……！）"
1301315-43 = "[ns1] \"……！？\"\n[ns2] \"モミジ、これ見て！\""
1301315-46 = "どうしたんですか？"
1301315-47 = "このコレクションがプレミア価格に……？"
1301315-48 = "……。"
1301315-49 = "ええっ！？"
1301315-50 = "こ、こんなに……？#nハッキングとか、サイトのエラーじゃ……？"
1301315-51 = "[s] \"何回も確認したから、多分合ってる……。\""
1301315-52 = "しょ、初回限定版にプレミアが付くのは、それほど珍しいことではありませんが……"
1301315-53 = "こ、こんな額になっているのは初めて見ました……これだけあれば……。"
1301315-58 = "（新しい蔵書を、申請せずに直接購入できますし……）"
1301315-59 = "（新品の暖房器具だって買えます……！）"
1301315-60 = "（工務部の皆さんに依頼して、夢の別館建設も……！あとは………）"
1301315-61 = "（あとは……プリンも食べ放題……！）"
1301315-62 = "（それでもまだお釣りが来る……）"
1301315-63 = "[ns] \"モミジ、大丈夫？\""
1301315-64 = "は、はい！"
1301315-65 = "……ぼ、ぼーっとしてましたか！？"
1301315-66 = "うぅぅ……。"
1301315-67 = "……。"
1301315-68 = "うぅぅうん……！"
1301315-69 = "や、やっぱりダメです！"
1301315-71 = "[ns] \"大事なコレクションだもんね。\""
1301315-72 = "はい……。"
1301315-73 = "これは、私の「初めてのコレクション」ですから。 "
1301315-74 = "絶版になる前に無理をして買ったもので……。"
1301315-75 = "プレミア価格がついたとしても、手放せません"
1301315-76 = "私にとって大切な、特別な―― "
1301315-77 = "――コレクションなんです。"
1301315-78 = "それだけ払ってでもこのコレクションをほしいと思う人がいるように――"
1301315-79 = "いくら払われたとしても手放したくない――そう言い張るマニアが、いてもいいですよね？"
1301315-80 = "[s3] \"うん、私もそう思う。\"\n[s4] \"そういう考え方も大事だよ。\""
1301315-83 = "……ありがとうございます。"
1301315-84 = "……。"
1301315-85 = "…………。"
1301315-86 = "は、はい！？またぼーっとしてましたか！？"
1301315-87 = "……ううっ……！"
1301315-88 = "や、やっぱりコレクター失格です……"
1301315-89 = "……プリンを何十箱も買えるんだよなぁと……。"
1301315-90 = "つい頭をよぎってしまって……。"
1301315-91 = "[s5] \"プリンなら任せて！\"\n[s6] \"好きなだけ食べさせてあげる！\""
1301315-94 = "ほ、本当ですか！？"
1301315-95 = "えへへ……嬉しいです、先生！"
1301315-97 = "（こうして、モミジと楽しいおやつの時間を過ごした）"
