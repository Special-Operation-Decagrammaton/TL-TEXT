[translation]
1005205-1 = "A rotina diária normal do secretário do seminário Noah"
1005205-2 = "Café perto Millennium"
1005205-3 = "(Passei num café que encontrei a caminho de casa depois de terminar o trabalho no Millennium)"
1005205-7 = "(...Noah está trabalhando em algo entre as pilhas de documentos empilhados.)"
1005205-8 = "[ns] \"...Noah?\""
1005205-9 = "Ah, senhor."
1005205-10 = "Eu estava tão absorto em meu trabalho que nem percebi. #nPeço desculpas."
1005205-11 = "[s] \"Que trabalho?\""
1005205-12 = "Como secretário do seminário, estou atualmente analisando patentes que foram solicitadas para exame."
1005205-13 = "Nesta altura do ano, com o Preço Milénio no horizonte, todos os alunos da nossa escola estão a trabalhar arduamente na investigação, por isso recebemos um grande número de pedidos de patentes de novas invenções."
1005205-14 = "Uma das funções importantes de um escriturário é classificar e compilar pedidos de patentes..."
1005205-15 = "Normalmente, esse trabalho seria feito na sala do clube, mas...#nO tempo está muito bom hoje, então decidi ir para cá."
1005205-16 = "Hehe... Às vezes é bom trabalhar sob a luz quente do sol."
1005205-17 = "[s] \"Posso ajudar você?\""
1005205-18 = "Não, está tudo bem."
1005205-19 = "Meu trabalho é analisar pedidos de patentes, mas também é minha parte favorita do dia."
1005205-20 = "Nem pensar... um sensei de placa de Petri não privaria seus alunos de um pouco de diversão sob o pretexto de ajudar no trabalho, certo?"
1005205-21 = "[s1] \"Nesse caso, tudo bem...\"\n[s2] \"Posso sentar ao seu lado e olhar para você enquanto você toma café?\""
1005205-22 = "Claro. #nPor favor, não se preocupe comigo e gaste seu tempo livremente."
1005205-23 = "Claro. #nPor favor, não se preocupe comigo e gaste seu tempo livremente."
1005205-24 = "Ou você vai me observar como parte de suas atividades de escrita...?"
1005205-25 = "[s] \"Acho que terminei meu trabalho de observação...\""
1005205-26 = "Hehe, estou brincando. #nAgora não é hora de trabalhar em placas de Petri."
1005205-27 = "Pois bem, vou me concentrar um pouco no trabalho... se me der licença."
1005205-29 = "(...mais e mais documentos revisados ​​estão empilhados no lado esquerdo de Noah)"
1005205-30 = "Esta é a esquerda... esta também é a esquerda..."
1005205-32 = "[ns] \"Existe um padrão para classificação?\""
1005205-33 = "Sim. Eles são organizados de acordo com a patenteabilidade ou não."
1005205-34 = "Como você verá mais adiante, os documentos que atendem às condições de certificação de patentes são colocados à direita e os documentos que não atendem aos requisitos são colocados à esquerda."
1005205-35 = "[s] \"Ok, então todas as coisas à esquerda...\""
1005205-36 = "sim. Esta proposta deverá ser descartada porque não atende às condições básicas."
1005205-37 = "Infelizmente, nem todas as ideias podem ser patenteadas."
1005205-38 = "No entanto, o sucesso nasce do fracasso. Se continuarmos a enfrentar desafios, poderemos um dia criar uma nova mudança de jogo que mude o paradigma dos tempos."
1005205-39 = "[ns] Examine o documento à esquerda."
1005205-40 = "Você está interessado no \"motor de caldeira definitivo com eficiência de transferência de calor de 99,99%\"?"

1005205-41 = "Embora fosse uma proposta interessante, a patente não pôde ser emitida porque se tratava de uma “invenção inacabada”."
1005205-42 = "Embora a ideia de revestir o interior da chaminé com um bloqueador de calor fosse boa, não foi possível indicar com precisão os ingredientes do bloqueador de calor."
1005205-43 = "[ns] \"...O que é isso?\""
1005205-44 = "Este é um relatório de pesquisa do Departamento de Desenvolvimento de Novos Materiais, que sintetizou uma nova substância explosiva que nunca havia sido relatada antes, ao mesmo tempo que melhorava adesivos."
1005205-45 = "A pesquisa em si, onde você descobre uma substância química com novas propriedades, é muito interessante, mas o fato da “descoberta” por si só não o qualifica para obter uma patente de invenção."
1005205-46 = "Uma patente de invenção só pode ser obtida quando existe uma finalidade viável e um motivo claro."
1005205-47 = "[ns] \"Ok, aqui estamos...\""
1005205-48 = "No caso de “um aparelho clareador tipo máscara que clareia a pele e clareia os dentes ao mesmo tempo”..."
1005205-49 = "Embora o princípio e o propósito estejam claramente definidos, infelizmente, no mês passado, o departamento de engenharia registrou pela primeira vez uma patente para a mesma ideia."
1005205-50 = "Mesmo que seja uma ótima ideia, será difícil reivindicar a propriedade se a publicação atrasar."
1005205-51 = "[s] \"O mundo das patentes é profundo...\""
1005205-52 = "As patentes são uma espécie de recompensa para os inventores que trabalham duro dia e noite para desenvolver produtos."
1005205-53 = "Se a revisão não for conduzida de forma justa, pode haver pessoas que tirarão vantagem dela...#nSe você cometer um único erro, existe o risco de que a motivação do inventor seja prejudicada."
1005205-57 = "Ah, isso é..."
1005205-58 = "Não há problemas com esta invenção, então acho que não há problema em conceder #n patente."
1005205-59 = "[s] \"Essa proposta está correta?\""
1005205-60 = "sim. Atende a todas as condições de patente."
1005205-61 = "Se fosse esse o caso, seria tão bom quanto uma nova invenção do milénio."
1005205-62 = "Você gostaria de ver o sensei também?"
1005205-69 = "[ns3] \"Um dispositivo que coleta e analisa os padrões de comportamento do sensei da placa de Petri...\"\n[ns4] \"Um dispositivo que prevê a localização atual do sensei com base nisso...?\""
1005205-70 = "Hehe, é uma ideia interessante, não é?"
1005205-71 = "Hehe, é uma ideia interessante, não é?"
1005205-72 = "Vários estudos já foram realizados para converter padrões de comportamento humano em dados e predizê-los."
1005205-73 = "Esta é a primeira vez que a investigação se centra num indivíduo específico, especialmente um “sensei”. #nNão entra em conflito com patentes existentes e é diferenciado."
1005205-74 = "Além disso, não é minha jurisdição julgar a comercialidade de patentes..."
1005205-75 = "Um dispositivo que prevê a localização do sensei provavelmente será procurado na Kivotos."
1005205-77 = "[ns5] \"Invasão de privacidade!\"\n[ns6] \"Esta patente é inválida!\""
1005205-78 = "Ah, você está apresentando uma objeção?"
1005205-79 = "Ah, você está apresentando uma objeção?"
1005205-80 = "Sempre aceitamos pedidos de invalidação de patentes..."
1005205-81 = "Não poderemos responder verbalmente, por isso certifique-se de ter todos os documentos necessários em mãos."
1005205-83 = "...Depois disso, houve uma discussão acalorada por um tempo sobre se a patente concedida por Noah era apropriada ou não."
