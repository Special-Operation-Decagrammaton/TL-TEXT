[translation]
10031020-1 = "Episódio 2; Preparativos Iniciados"
10031020-2 = "（No dia seguinte, após concordar em ajudar com os preparativos da festa de Gehenna, recebi um contato de Makoto）"
10031020-7 = "Kukuku. Como eu disse ontem, para comemorar a realização desta festa, nós do Pandemonium construímos um novo edifício do conselho."
10031020-8 = "Por isso, quero que você, Sensei, compareça à cerimônia de inauguração do novo edifício."
10031020-9 = "[s] \"Entendido, estou indo para aí.\""
10031020-10 = "Kikiki. Então, estarei esperando."
10031020-17 = "Kukuku..."
10031020-18 = "Kikikikikikikiki!!!"
10031020-19 = "Com isso, obtive a cooperação do Sensei do SCHALE."
10031020-20 = "Não é apenas para que ele venha... Vou criar uma situação em que precise da ajuda do Sensei e gravar um vídeo ostentando a relação entre o Pandemonium e o SCHALE."
10031020-21 = "Kukuku. Se eu transmitir esse vídeo por todo Kivotos, poderei mostrar a todos a relação de cooperação entre o Pandemonium e o SCHALE!"
10031020-22 = "Assim, a influência do Pandemonium certamente ficará ainda mais forte...!"
10031020-27 = "[ns] \"Ei, Makoto... a chamada ainda está ativa.\""
10031020-28 = "O quê............"
10031020-29 = "I-isso é... não, não é nada disso, Sensei, veja bem..."
10031020-30 = "[s] \"Vou ter que recusar a gravação.\""
10031020-31 = "M-meu grande plano............!"
10031020-32 = "Guhhh...! N-n-não tem jeito..."
10031020-33 = "Por enquanto, estarei esperando por você em Gehenna."
10031020-54 = "[ns] \"Pessoal, vocês parecem muito ocupados.\""
10031020-57 = "Kikiki. É que esta festa tem um significado muito importante."
10031020-58 = "[s] \"Ah, Makoto.\""
10031020-59 = "Seja bem-vindo, Sensei."
10031020-60 = "Embora tenhamos um acordo, não esperava que você cooperasse tão prontamente com o Pandemonium...#nAgradeço novamente, kiki."
10031020-61 = "[s1] \"Sim, prometi que ajudaria.\"\n[s2] \"Claro, vou recusar a parte da gravação.\""
10031020-64 = "Guh...! I-isso é...!"
10031020-65 = "............E-enfim, o que importa não é o passado, mas o futuro!"
10031020-66 = "Em vez de olhar para o que já passou, seria mais construtivo falarmos sobre o futuro grandioso que nos aguarda. Você não concorda, Sensei?!"
10031020-67 = "[s] （Parece que ele mudou de assunto completamente...）"
10031020-71 = "[ns] \"Cerimônia de inauguração do edifício... Então vocês construíram um novo prédio do conselho?\""
10031020-72 = "Ah, exatamente."
10031020-73 = "Já que íamos dar uma festa, pensei em aproveitar para expandir as instalações."
10031020-74 = "Aliás, o local da festa também fica dentro do edifício... Kukuku..."
10031020-75 = "[s] \"Então é por isso que fizeram uma cerimônia tão formal...\""
10031020-76 = "Por exemplo, lojas de conveniência, fliperamas, livrarias, cibercafés, lavanderias e muito mais..."
10031020-77 = "Já que estamos nisso, pretendo criar instalações que vão dar uma dor de cabeça enorme para o pessoal do Comitê Disciplinar!"
10031020-78 = "De agora em diante, o novo edifício do Pandemonium será conhecido como o novo ícone cultural de Gehenna!"
10031020-79 = "[s] \"Mais do que um edifício do conselho, parece um grande shopping center...?\""
10031020-80 = "Kikiki! O lugar que eu, pessoalmente, mais recomendo é...#nA instalação especial onde investi a maior parte do orçamento..."
10031020-81 = "Sim, a \"Fonte Termal Especial\"!#nOrdenei que a construíssem atrás do edifício para que todos em Gehenna possam usar!"
10031020-82 = "[s] \"Vocês construíram uma instalação tão grande assim.\""
10031020-83 = "Kishishishi! Exatamente!! É por isso que eu, Makoto-sama, me esforcei tanto na construção deste novo edifício, preparando tudo junto com Iroha, Satsuki, Chiaki e Ibuki!"
10031020-84 = "Mal posso esperar para ver a cara que o pessoal do Comitê Disciplinar vai fazer quando virem isso...#nKikikikikiki!!!"
10031020-85 = "[s] \"A propósito, com quem vocês encomendaram a fonte termal...?\""
10031020-86 = "Hm? Ora, é claro que foi com..."
10031020-87 = "O Departamento de Desenvolvimento de Fontes Termais de Gehenna, por quê?"
10031020-91 = "[ns] \"............Ah.\""
10031020-94 = "Q-que houve de repente!?"
10031020-98 = "P-presidente...! É uma emergência!"
10031020-99 = "Sobre aquele assunto da fonte termal que planejamos...!"
10031020-100 = "Mais algum problema...?"
10031020-107 = "O quê...!?"
10031020-119 = "V-vocês são...!"
10031020-121 = "Iupii! É o Departamento de Desenvolvimento de Fontes Termais!"
10031020-122 = "Hm? Achei que o rosto me era familiar, não é o Sensei?"
10031020-123 = "Que combinação inusitada, estar aqui com a presidente do Pandemonium."
10031020-124 = "[s] \"Olá. Meg, e Kasumi também.\""
10031020-125 = "Iupii, Sensei!"
10031020-126 = "Hum. Um encontro inesperado, Sensei."
10031020-127 = "Mas, mudando de assunto... você é a Presidente Makoto, a cliente deste pedido, correto?"
10031020-129 = "S-sim... sou eu, mas? #nEu pedi o desenvolvimento de uma fonte termal, então por que estão causando esse alvoroço aqui?"
10031020-130 = "Não me lembro de ter pedido para desenvolverem nada neste lugar! #nO que vocês pretendem, Departamento de Desenvolvimento de Fontes Termais?"
10031020-131 = "Ora, é só isso?"
10031020-132 = "De fato, o pedido era para construir uma nova instalação de fontes termais atrás do novo edifício da assembleia, mas..."
10031020-133 = "Incrível...! Em vez da parte de trás, no estacionamento!"
10031020-134 = "Senti a presença de uma fonte de água muito mais maravilhosa aqui!"
10031020-135 = "[s] \"Bem... a propósito, qual é a base para isso?\""
10031020-136 = "Sensei, você ainda faz esse tipo de pergunta?"
10031020-137 = "É óbvio que é pelo meu instinto!"
10031020-139 = "Eu não cheguei a conversar com a chefe ou com as outras, mas...! #nSenti um estalo aqui!"
10031020-140 = "Se apenas seguíssemos o pedido, não poderíamos nos chamar de especialistas!"
10031020-141 = "O-o que você está dizendo! Estamos prestes a começar a cerimônia de inauguração aqui!?"
10031020-142 = "É mesmo?"
10031020-143 = "Isso não tem nada a ver com a gente. #nO que nos pediram foi o desenvolvimento da melhor instalação de fontes termais."
10031020-144 = "Sendo assim, nosso papel no Departamento de Desenvolvimento de Fontes Termais é atender a esse desejo ao máximo."
10031020-145 = "Bem, não se preocupe com o local."
10031020-146 = "Hahahaha! Assim que a fonte termal estiver pronta, a Presidente Makoto certamente ficará feliz! #nDeixe isso com os especialistas em fontes termais!"
10031020-147 = "[s] \"...Eu já imaginava que isso aconteceria.\""
10031020-148 = "Vamos! Todo mundo! Cavem, cavem e cavem sem parar! #nÉ hora de desenvolver fontes termais!"
10031020-154 = "Pessoal, vamos cavar!"
10031020-160 = "Grrr! V-vocês acham que eu vou deixar!? #nTer a audácia de atrapalhar a cerimônia de inauguração da grande Makoto, que coragem!"
10031020-161 = "V-vocês! Parem agora!"
10031020-179 = "[ns] \"Ei, ei... pessoal, se acalmem...\""
10031020-185 = "Se a fonte termal ficar pronta, todos vão se acalmar!"
10031020-186 = "Isso mesmo! Fontes termais trazem paz de espírito, né~!"
10031020-191 = "G-grrr!! P-por que isso está acontecendo...! #nComo alguém como eu, onde foi que eu errei～～!?"
10031020-192 = "[s] \"...Não foi no momento em que você fez o pedido ao Departamento de Desenvolvimento de Fontes Termais?\""
10031020-198 = "Hahahaha!!! Desenvolvimento de fontes termais! Explosões! Vamos limpar tudo e dar uma fonte termal para cada aluno de Gehenna...!"
10031020-203 = "...................................."
10031020-211 = "[ns] \"I-isso agora foi...!\""
10031020-217 = "Recebemos um relatório de que um problema estava ocorrendo aqui, então viemos..."
10031020-218 = "...Que situação é essa?"
10031020-219 = "[s] \"Hina, Ako...!\""
10031020-220 = "...Sensei?"
10031020-221 = "Hã!? Por que o Sensei está em um lugar como este...?"
10031020-223 = "Droga! Hina...! #nHoje é a cerimônia de inauguração do novo edifício da assembleia que nós do Pandemonium construímos...!"
10031020-224 = "Não me diga que você... veio aqui para atrapalhar a grande Makoto...!"
10031020-225 = "[s] \"Na verdade, parece que elas vieram ajudar...?\""
10031020-226 = "Droga! Não preciso da ajuda da presidente do Comitê Disciplinar!"
10031020-227 = "Se for para ser ajudada por ela, prefiro que construam uma fonte termal no estacionamento do edifício...!"
10031020-228 = "E-eu consigo... acei... tar... ugh..."
10031020-229 = "Não... de jeito nenhum, não posso ceder...!"
10031020-230 = "[s] \"Você não abre mão disso, né...\""
10031020-235 = "Nós também não viemos aqui porque queríamos ajudar o Pandemonium, sabia!?"
10031020-236 = "Só viemos porque recebemos um relatório de que o Departamento de Desenvolvimento de Fontes Termais estava causando confusão."
10031020-242 = "Embora seja apenas lidar com problemas como sempre...#né irritante ter que ajudar o Pandemonium..."
10031020-243 = "Primeiro, vamos acabar com essa bagunça.#nSensei, tem algo a dizer?"
10031020-244 = "[s] \"...Não tenho.\""
10031020-245 = "Entendido."
10031020-249 = "Todas, preparem-se!"
10031020-252 = "Sim...!"
10031020-257 = "...O Comitê Disciplinar entrou em posição de combate!"
10031020-259 = "Aaaah~! O-o que a gente faz, Chefe Kasumi!"
10031020-263 = "I-i-iiieeeeh!!!"
10031020-268 = "Ah! A Chefe Kasumi entrou em pânico!"
10031020-269 = "A chefe sempre fica assim quando a Presidente do Comitê Disciplinar aparece..."
10031020-270 = "É uma emergência! Pessoal, revidem por enquanto!!"
10031020-276 = "!!!!!"
