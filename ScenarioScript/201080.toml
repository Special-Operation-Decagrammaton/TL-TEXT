[translation]
201080-1 = "Episódio 8: Ilusão e Inferência"
201080-4 = "[ns1] \"...Pra quê esses óculos de sol no escuro?\"\n[ns2] \"Bem... o visual de estrela de cinema até que caiu bem em você!\""
201080-5 = "Isso não é um acessório estético. É um disfarce tático para camuflar minha identidade."
201080-6 = "A minha vaidade não é a pauta aqui. Repito, é camuflagem de espionagem."
201080-7 = "[s] \"Espionagem...?\""
201080-8 = "Afirmativo."
201080-9 = "Iniciaremos interrogatórios e varreduras de campo nas ruas.#nMinha meta é rastrear qualquer amostra orgânica que retenha memórias da verdadeira Presidente Geral."
201080-10 = "Passei as últimas 24 horas aferindo e catalogando o comportamento do conselho... e a conclusão é macabra: nenhum diretor detectou a menor dissonância com a presença daquela anomalia na cadeira."
201080-11 = "Para piorar o cenário, testei a reação das chefias estrangeiras e o radar também ficou mudo.#nOs dados só podem vomitar uma hipótese――"
201080-12 = "O vírus ou protocolo de reescrita de memórias infectou a biologia de Kivotos em escala global."
201080-13 = "[s] \"A mente de uma metrópole inteira foi formatada e reescrita...?\""
201080-14 = "Eu assumo que esse laudo beira a esquizofrenia e a fantasia barata."
201080-15 = "Contudo, se os nossos cérebros sobreviveram intactos, a matemática diz que pode haver outros civis imunes por aí... Pessoas que ainda preservem a verdade gravada na retina."
201080-16 = "E essa testemunha cega pode ser a única chave-mestra para obtermos as coordenadas reais da 'Autêntica Presidente Geral'."
201080-17 = "[s3] \"Ficar sentado no escritório chorando não vai arrancar respostas da rua, né...?\"\n[s4] \"Vou espremer as alunas que baterem ponto na Schale e puxar a língua delas também.\""
201080-20 = "Os meus agradecimentos cívicos pela sua assistência orgânica. O seu poder de ação civil é o único escudo no qual confio agora."
201080-24 = "……Evidentemente, o meu lado lógico também questionou se não seria apenas um surto esquizofrênico da minha própria cabeça cansada."
201080-25 = "Quando eu bato o olho e vejo as engrenagens burocráticas aceitarem aquela usurpadora com sorrisos, e a economia de Kivotos prosperando sob a bota dela... a minha culpa moral de que estou sabotando a paz pesa... e me faz duvidar do meu próprio cérebro."
201080-26 = "Mas, eu recuso essa paz sintética. Porque aquela fêmea――"
201080-28 = "Rin-chan."
201080-30 = "Rin-chan~"
201080-32 = "Rin-chan!"
201080-34 = "――Ela é uma falsificação letal. Uma fraude genética que jamais usurpará o trono da Presidente Geral que os meus olhos honraram."
201080-38 = "O meu emocional cruzou os limites do ofício. Perdoe o meu monólogo longo e patético."
201080-42 = "[ns] \"Sem crise. Mas me responde: você vai forçar essa estética de 'óculos na madruga' o tempo todo?\""
201080-43 = "A discrição é inegociável. Se uma câmera ou rato do conselho cruzar com a minha identidade no submundo, a espionagem e os relatórios explodem em horas."
201080-44 = "Se o boato de que a 'Chefe de Administração conspira e investiga traição contra a própria Presidente' espirrar na rua... a bolsa de valores de Kivotos vai engolir a cidade em pânico."
201080-45 = "A máscara cega nos protege dos holofotes e mantém nossa auditoria limpa e sigilosa."
201080-46 = "[s] （Estatísticas de rua apontam que pessoas de óculos escuros à noite e de terno gritam 'suspeito' em neon luminoso...）"
201080-47 = "O que essa testa franzida e olhar analítico estão processando agora?"
201080-48 = "Por acaso a sua percepção estética avalia as lentes de camuflagem como 'aberrações da moda'?"
201080-49 = "[s5] \"J-Jamais ousaria julgar sua moda...\"\n[s6] \"Ficaram perfeitas, de verdade... caíram super bem.\""
201080-52 = "…………"
201080-53 = "O relógio apita, Sensei. Arquive o papo fútil e engrenemos a perseguição caminhando."
201080-54 = "Nosso funil estatístico primário será os focos hiper-habitados e aglomerados mercantis."
201080-56 = "Distrito de Shiratori - Centro Comercial Corgi Town"
201080-59 = "（Nós mergulhamos nas veias consumistas de D.U. e comecei a arrancar informações das testemunhas disfarçadas.）"
201080-60 = "……A Presidente Geral? Oh, os meus aplausos fervosoros pelo reaparecimento da Deusa."
201080-61 = "O vácuo na cadeira dela travou a logística do asfalto inteiro, e nós, camelôs, chorávamos sangue pra fechar os caixas mensais..."
201080-62 = "A majestade retomou as rédeas, o que significa que o risco da nossa loja amanhecer metralhada em fogo cruzado diminuiu, graças a Deus!"
201080-64 = "Hum? Como assim, 'anomalia facial na Presidente'? Sei lá, irmão, não notei defeito estético na dondoca."
201080-65 = "Pra ser franco, os meus neurônios falham em decorar rostos de gente grande..."
201080-66 = "O cabeleireiro dela deve ter exagerado no tom do loiro platinado da tinta, talvez...?"
201080-68 = "Eeeei! Eu não sou cega de moda! As engrenagens do meu radar fashion nunca falham com celebridades!"
201080-69 = "Se botar o olho de perto, dá pra ver a fraude nítida pós-sumiço... A Presidente tosou o cumprimento capilar em ridículos CINCO CENTÍMETROS! Ela não ostenta mais a mesma crina de antes!"
201080-70 = "Aquela simetria capilar é impossível de sustentar na tesoura caseira. Ela tem que injetar dinheiro em salão de luxo pra polir os fios toda semana..."
201080-71 = "O boato que eu quero fofocar é: pra qual spa ou porão de esteticista chique ela se enfiou no sigilo durante as férias de sumiço dela?!"
201080-73 = "（……As métricas de investigação estão num abismo. Ninguém na praça tem um único vestígio orgânico da Velha Presidente na memória.）"
201080-75 = "O rostinho da Presidente de dar inveja na tela? Sei não, moço, tá a mesma coisa na minha visão."
201080-76 = "Erika-chan, o seu scanner viu ruga ou cirurgia mal feita nela?"
201080-77 = "Hã?……Nada que faça os alarmes soarem, o visual tá zerado."
201080-78 = "A 'estética de Presidente' tá cravada no subconsciente de todo mundo desde sempre: Sorriso plastificado e puro, íris com aquele pigmento violeta, e o cabelão loiro platinado clássico intocável――"
201080-79 = "Duh, é claro! Lembra daquele modismo asqueroso onde as patricinhas estouraram as mechas com água oxigenada pra copiar o 'Loiro Supremo Presidencial'?!"
201080-80 = "Nossa, real! O modismo foi uma praga no verão~"
201080-81 = "Até eu quase fui escrava da tendência e ponderei queimar a carteira pra tascar platinado nas pontas!"
201080-82 = "A imagem intocável dela reina como capa de revista o ano todo, o povo decorou o rosto na veia, oras."
201080-84 = "[ns7] \"……Entendo.\"\n[ns8] \"Até os delinquentes das vielas de Gehenna rendem palco e reverência pra Presidente, hein.\""
201080-87 = "Mas é lógico. Até a escória e cachorro de rua de Kivotos sabe que o pescoço e a segurança da vida deles tá assinado e protegido pelas asas da Presidente."
201080-91 = "……Makoto? Quem caralhos é essa Zé Ninguém? Nunca pisou no meu radar de fofocas.#nHummm... a não ser que eu já tenha cruzado com ela no balcão de promoção..."
201080-93 = "（E, inevitavelmente, o nosso 'Disfarce de Espionagem' começou a gerar frutos envenenados nas rondas de campo.）"
201080-98 = "Parada na ordem federal! Alto aí!!"
201080-99 = "Os radares táticos da ronda apontaram que a dupla de pombinhos mascarada tá vomitando panfletos criminosos e teorias de conspiração falsas sobre a Presidente Geral nesta praça comercial, estou certa?!"
201080-100 = "Que ultraje cívico... Quais os miolos doentios que vocês usam pra assassinar a honra do Estado?!"
201080-101 = "O telefone da patrulha tá afundando de queixas de lojistas por conta das suas difamações de rua, colaborem e aceitem a algemação!"
201080-102 = "[s] \"Calma aí, policial! A minha investigação orgânica tem zero inclinação rebelde ou int――\""
201080-103 = "Opa, mas as suas feições são familiares... o senhor é o――"
201080-104 = "O SENSEI DA SCHALE?!"
201080-105 = "O-O meu fuzil treme de vergonha. Retiro as correntes da ofensa. As despachantes do rádio interpretaram o log de investigação como delação anarquista."
201080-106 = "Se os laudos e testemunhos provêm das bocas sacrossantas da Schale, os indícios de rebeldia perdem validade instantaneamente."
201080-107 = "Todavia, imploro por prudência investigativa. A aurora que se ergueu com o regresso da Presidente ainda sangra e a segurança urbana não tá pacificada."
201080-108 = "Focos rebeldes civis já forjam protestos gritando por quebra de sigilo nos cofres, exigindo saber as coordenadas reais onde a Liderança ficou hibernando na crise..."
201080-109 = "A poeira burocrática em D.U. vai subir quente pelos próximos trimestres."
201080-114 = "[ns] \"A auditoria de rua rendeu poeira. Não cruzamos com um único DNA orgânico que se recorde da face da Velha Presidente.\""
201080-115 = "……A constatação da falha é verídica e humilhante."
201080-116 = "[s9] \"……Que tal hastear a bandeira branca por hoje?\"\n[s10] \"A madrugada já enterrou o sol e o vento tá cortando os ossos.\""
201080-119 = "O meu ego suplica uma extensão de prazo... Mais algumas quadras, por favor."
201080-120 = "A estatística jura que garimpar mais uma dúzia de almas elevará a chance percentual de cruzar com o laudo de um imune."
201080-121 = "Só conceda mais trinta escassos minutos à minha louc――"
201080-123 = "E o faro dos deuses não falha! Quando eu já tava prestes a chorar e dar a pauta como defunta... A lente flagra o Mítico Sensei da Schale em carne e osso vagando no breu!"
201080-128 = "E, para implodir o meu ibope: o herói perambulando no escuro, fugindo das câmeras na surdina com uma aluna desconhecida a tiracolo...!"
201080-129 = "Essa combinação de fatos tem um só nome criminal――"
201080-133 = "A GRANDE EXCLUSIVA ESCANDALOSA DE HOJE!!"
201080-134 = "[s] \"A repórter sanguessuga da Mai?!\""
201080-135 = "Afirmativo! A âncora imaculada da Kronos Channel e abutre que devora farsas e arranca a pele das mentiras alheias!#nKazamaki Mai ao vivo!"
201080-136 = "Haaah~ Eu juro que tava afogada no fundo do poço editorial, afinal, minhas entrevistas engarrafaram todas na pauta...#nMas bater de frente com o magnata da Schale no beco! Isso é ouro caído do céu! O cofre do meu jornalismo tá salvo e eu vou comer picanha no lucro!"
201080-142 = "Mas corta a enrolação! A lupa mira a parceira noturna! Desembucha, quem é a donzela sigilosa?!"
201080-143 = "Fugir das rotas com camuflagem de óculos escuros na calada da noite e silêncio de rádio... Essa menina por acaso é VIP ou testa de ferro de algum cartel governamental?!"
201080-144 = "Ou... O instinto podre e sensacionalista do jornal diz que rola uma obscenidade romântica velada e pervertida entre os dois nas sombras...?!"
201080-145 = "[s11] （Minha telemetria de má sorte apitou. Ser farejado por uma repórter urubu justo na espionagem...）\n[s12] （O cerco tá fechando pro nosso pescoço...）"
201080-148 = "……Opa, dá um zoom nesse rosto."
201080-149 = "……Espera aí, pisa no freio. Onde as minhas retinas fotografaram as arestas dessa testa engravatada?"
201080-150 = "Essas orelhas alongadas e élficas, a textura e tom de nanquim negro esverdeado na paleta de cores capilar..."
201080-151 = "Os microfilmes mentais da Kronos acusam que o meu microfone já cruzou com você no set de palco, mas o IP faliu na pesquisa... Quem caralhos...!"
201080-156 = "……ACHEEEEI!!"
201080-158 = "（A identidade do Estado ruiu, os alarmes colapsam...）"
201080-159 = "BINGO!! Os óculos escuros caíram! A senhorita é a estrela reclusa e Vocalista Lendária da 'K.G.S.C', a seita Idol super secreta de Rock! A deusa 'Rina'!!"
201080-160 = "……PERDÃO, O QUÊ?!"
201080-165 = "Poupa saliva tentando pagar de amnésica e afogar a fama!#nVocê é o furacão musical que atropelou a competição das Bandas de Rua, sugou o topo das paradas e implodiu de cena evaporando nas sombras da fama!!#nA lendária Idol Anônima que os fãs juram não ter certidão de matrícula!! BINGO!!"
201080-166 = "Eu sacrifiquei coturnos de repórter fuçando lixeiras e arquivos sujos pra caçar as suas credenciais no submundo, mas os dados eram blindados... Zero vazamentos..."
201080-167 = "E os deuses me premiam e jogam você no meu colo na esquina fria! Abra a garganta pro microfone de ouro e mande recado pras hordas fanáticas, ESTRELA!!"
201080-168 = "E já embalando a delação, declama pro HD da câmera a certidão e o nome oficial da escola em que estuda!!"
201080-169 = "[s] \"Mai, abaixa a lente, amarra o gravador e controla os freios do seu jornalismo.\""
201080-170 = "Q-Que aura macabra de assassino é essa do nada, Sensei?! O que o seu cérebro de chumbo engatilhou?"
201080-171 = "[s13] \"……A Rina-chan abandonou as baquetas porque os relatórios confidenciais da Schale a requisitaram.\"\n[s14] \"O trampo velado dela segura as colunas da paz de Kivotos. Se você publicar um pixel dessa operação tática nas manchetes, as ruas vão afundar em sangue.\""
201080-172 = "……Quem você autorizou a registrar a farsa sob o nome nojento de 'Rina-chan', senhor?!"
201080-174 = "Os arquivos blindados da alta espionagem... Puta merda."
201080-175 = "O meu juramento perante a pauta tá mortificado. Se o Comandante da Schale decreta silêncio, a pena do jornalista cala e afunda o caso."
201080-176 = "Ameaçar vazar logística extrajudicial na manchete de amanhã jura uma retaliação e explosão direta com dinamite dentro do departamento de edição e da minha cara... Recuo total."
201080-177 = "M-Mas, numa barganha capitalista... O senhor enxerga a humilhação monetária de voltar pra base jornalística com um cartão de SD zerado...#nA sua ética e benevolência ikke concederia nenhuma isca quente pros tabloides não chorarem seco?!"
201080-178 = "Abre as portas do baú negro da Schale e vomita algum podre criminal pra mim...!!"
201080-180 = "Nem que seja um caso extraconjugal e passional vergonhoso dos confins do seu armário, eu topo!!"
201080-181 = "[s] （O ego corrompido de um jornalista sempre cava o fundo... É o gancho perfeito pra usar ela no caso.）"
201080-185 = "[ns] \"O seu faro sanguinário já abocanhou a teoria ou as métricas de que a Presidente Geral da nossa cidade foi sequestrada e substituída por uma fraude plástica?\""
201080-186 = "Que porra de manchete apocalíptica é essa?! O trono cívico foi tomado por clonagem de Mimesis no breu e ninguém atirou nada na rua?!"
201080-192 = "Haah... Que delírio ridículo e insano de se ouvir da boca de um funcionário público de peso."
201080-193 = "A audiência não consome esse vômito anárquico e terraplanista nem se eu temperar a matéria de ouro."
201080-194 = "Maaas a jogada gira... A manchete 'O CÉREBRO DA SCHALE DERRETEU COM OVNIS E CHIFRES E ESPALHA DELÍRIOS DOENTIOS DE QUE O CONSELHO ESTÁ COM CLONES'... isso sim tritura recordes de capa! Que prato cheio de fofoca!"
201080-195 = "[s] \"Pelo amor de deus, enterra essa manchete de fofoca que vai arrancar o meu diploma...\""
201080-196 = "Limpeza logística da teoria: o boato nunca cruzou as pautas sérias dos meus redatores na bancada."
201080-197 = "As probabilidades matemáticas de forjar e usurpar uma celebridade massiva do panteão da Presidente sem as câmeras farejarem um fio de cabelo errado é nula.#nA engenharia social não comete esses engolimentos quietinha, as ruas iriam berrar a mudança."
201080-198 = "……Hum, mas desenterrando os entulhos de fofoca, uma anomalia murmurou no meu ouvido exatamente essa teoria um tempo atrás."
201080-199 = "O civil alardeou: 'A rainha de cabelos azul-piscina e lentes cor d'água afundou no nada, e o clone lixo que voltou tá usando peruca amarela errada' e blablabla――"
201080-201 = "AS COORDENADAS DESSE CIDADÃO E O NOME. JÁ!!"
201080-203 = "EITA CACETA! Por que esse volume ensurdecedor engasgou minhas orelhas na porrada?!"
201080-204 = "Abaixe as travas das coordenadas e o cruzamento dos logs. A minha caçada exige confrontar essa testemunha orgânica no asfalto. Mande os dados da localização sem atraso!"
201080-205 = "O-O meu banco de endereços aponta o boteco sujo... Aquele Bar de Sucos velho engolido na zona periférica da Zona Oeste de Aoba. Aquele fofoqueiro mofa na cadeira daquele bar todos os dias..."
201080-206 = "Ele acenou pro correio do meu departamento oferecendo 'Bombas Inéditas' do mundo urbano um dia desses.#nEu queimei solas pra ouvir o verme e só consumi delírio terraplanista puro e alienígenas nas teorias dele..."
201080-207 = "Nesta hora, a embriaguez alcoólica deve manter a carcaça dele soldada na bancada do bar.#nO lixo se enfeita com amuletos lixo e tranqueiras cósmicas em toda a roupa... É só caçar o esquisito no meio do salão, vocês acham num piscar."
201080-208 = "As minhas obrigações logísticas registram a gratidão e a valia tática desse despejo, Mai."
201080-209 = "[s] \"Eu devo uma pauta à sua lente depois, prometo e assino embaixo!\""
201080-210 = "A-A gratidão não precisa vir em moeda... Só me jogue ossos vivos depois!"
201080-216 = "Um Sensei paramilitar, uma Idol mascarada reclusa em pânico de fuga e a Presidente Geral fantasma que virou alienígena nas teses... que porra de script conspiratório radioativo e surreal meu jornal se enfiou no escuro...?"
201080-218 = "Próximo Episódio: Boa Noite, Sr. Orwell"