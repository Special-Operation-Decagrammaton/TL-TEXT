[translation]
201080-1 = "Episódio 8: Imagens Falsas e Inferência"
201080-4 = "[ns1] \"……Por que esses óculos escuros?\"\n[ns2] \"Esses óculos escuros combinam muito com você!\""
201080-5 = "É um disfarce. Não posso deixar que descubram minha identidade."
201080-6 = "Não é por moda. É um disfarce."
201080-7 = "[s] \"Disfarce……?\""
201080-8 = "Sim."
201080-9 = "De agora em diante, farei uma investigação. Para encontrar alguém que se lembre da Presidente do Conselho Estudantil que eu conheço."
201080-10 = "Passei o dia observando o pessoal do Comitê Administrativo, mas ninguém demonstrou qualquer estranheza em relação à Presidente do Conselho Estudantil."
201080-11 = "Além disso, os representantes de cada distrito autônomo também não tiveram nenhuma reação especial. Com base nessas situações, presumo que――"
201080-12 = "Acredito que a alteração de memória tenha atingido todo o Kivotos."
201080-13 = "[s] \"A memória de todo o Kivotos foi alterada…….\""
201080-14 = "Sei que soa absurdo."
201080-15 = "Mas, se houver alguém que se lembre da Presidente original, assim como eu e o Sensei……."
201080-16 = "Talvez possamos encontrar o paradeiro da \"verdadeira Presidente do Conselho Estudantil\"."
201080-17 = "[s3] \"Por enquanto, é a única forma…….\"\n[s4] \"Eu também vou perguntar aos alunos que vêm ao Schale.\""
201080-20 = "Obrigada. Você é de grande ajuda."
201080-24 = "……Naturalmente, também duvidei da minha própria memória."
201080-25 = "Ao ver como ela rapidamente ganhou a confiança de todos ao redor e como o Conselho Estudantil recuperou sua vitalidade, passei a pensar ainda mais nisso, mas……."
201080-26 = "Mesmo assim, aquela pessoa――"
201080-28 = "Rin-chan."
201080-30 = "Rin-chan~"
201080-32 = "Rin-chan!"
201080-34 = "――definitivamente não é a Presidente do Conselho Estudantil de quem me lembro."
201080-38 = "Desculpe, acabei me alongando demais."
201080-42 = "[ns] \"Mais importante, pretende ficar de óculos escuros o tempo todo?\""
201080-43 = "Com certeza. Se minha identidade for revelada, isso afetará a investigação."
201080-44 = "Acima de tudo, se a notícia de que uma oficial administrativa suspeita da Presidente do Conselho Estudantil se espalhar, pode causar outro tipo de confusão."
201080-45 = "Para não levantar suspeitas, o disfarce é a prioridade."
201080-46 = "[s] (Sinto que isso está levantando ainda mais suspeitas……)"
201080-47 = "O que é essa cara?"
201080-48 = "Por acaso…… esses óculos escuros estão estranhos?"
201080-49 = "[s5] \"N-não, nada disso!\"\n[s6] \"É que, como combinou tanto, eu acabei…….\""
201080-52 = "…………."
201080-53 = "Não temos tempo. Vamos continuar conversando enquanto caminhamos."
201080-54 = "Primeiro, vamos às instalações comerciais onde muitos alunos se reúnem."
201080-56 = "Distrito Shiratori - Corgi Town"
201080-59 = "(Começamos a investigar sobre a Presidente do Conselho Estudantil no centro comercial da cidade)"
201080-60 = "……A Presidente do Conselho Estudantil? Fico muito feliz que ela tenha retornado."
201080-61 = "Durante a ausência dela, tivemos muitos inconvenientes……."
201080-62 = "Já que ela voltou, espero que as preocupações com tiroteios na cidade diminuam."
201080-64 = "Impressão sobre a Presidente? Humm~? Será que mudou?"
201080-65 = "Eu não sou muito bom em lembrar rostos……."
201080-66 = "A cor do cabelo mudou um pouco……?"
201080-68 = "É claramente diferente! Sou sensível a esse tipo de coisa."
201080-69 = "Comparado a antes de ela desaparecer…… o cabelo dela está uns 5cm mais curto!"
201080-70 = "É difícil cuidar sozinha e ela deveria ir ao salão de beleza regularmente……."
201080-71 = "Qual cabeleireiro será que cuidou dela enquanto ela estava desaparecida?"
201080-73 = "(Ninguém se lembrava da Presidente do Conselho Estudantil anterior……)"
201080-75 = "A impressão sobre a Presidente mudou? Bem, quem sabe."
201080-76 = "Erika-chan, você tem alguma ideia?"
201080-77 = "Hmm... Eu também não tenho nada em especial."
201080-78 = "A Presidente do Conselho Estudantil sempre teve essa imagem, não é?#nUm sorriso elegante, olhos violetas, um lindo cabelo loiro platinado—"
201080-79 = "Ah, é que o \"Loiro da Presidente\", imitando aquela cor, chegou a virar moda, sabe?"
201080-80 = "É verdade! Era super popular, né~"
201080-81 = "Eu até fiquei na dúvida se pintava só as pontas do meu cabelo."
201080-82 = "Como ela está sempre no centro das atenções, é impossível não lembrar."
201080-84 = "[ns7] \"...Entendi.\"\n[ns8] \"Então as alunas de Gehenna também prestam atenção nisso.\""
201080-87 = "Claro. Não tem como não conhecer a Presidente do Conselho Estudantil que protege a segurança de Kivotos, né?"
201080-91 = "...Makoto? Quem? Essa aí.#nHmm, parece que já ouvi esse nome em algum lugar..."
201080-93 = "(E acabar virando suspeita)"
201080-98 = "Vocês aí, parem!"
201080-99 = "São vocês que estão espalhando boatos sobre a Presidente do Conselho Estudantil aqui, não são?"
201080-100 = "Francamente... por que espalhar esse tipo de boato?"
201080-101 = "Estamos recebendo reclamações por causa disso e estamos com problemas."
201080-102 = "[s] \"Não, não era essa a intenção...\""
201080-103 = "Ué, você é..."
201080-104 = "Professor [USERNAME]!?"
201080-105 = "Ah, peço perdão. Nós viemos por causa de uma denúncia."
201080-106 = "Se o professor diz, então deve ter havido algum mal-entendido."
201080-107 = "Mas tomem cuidado.#nEmbora a Presidente do Conselho Estudantil tenha retornado, nem todos estão vivendo com tranquilidade."
201080-108 = "Embora seja apenas uma parte, há vozes exigindo a apuração da verdade sobre as causas e os detalhes do desaparecimento dela..."
201080-109 = "Parece que o D.U. vai ficar agitado por um tempo."
201080-114 = "[ns] \"No fim, não encontramos ninguém que se lembre da Presidente do Conselho Estudantil.\""
201080-115 = "...É."
201080-116 = "[s9] \"...Já está na hora de voltarmos?\"\n[s10] \"Já está tarde e começou a esfriar.\""
201080-119 = "Só mais um pouco... por favor."
201080-120 = "Se procurarmos mais, talvez a gente encontre."
201080-121 = "Só mais 30 minutos, por favor—"
201080-123 = "Pensei que hoje não seria meu dia de sorte... mas encontrar o professor do Schale aqui."
201080-128 = "E ainda por cima escondido, em um lugar escuro, a sós com uma aluna..."
201080-129 = "Isso é—"
201080-133 = "Um furo de reportagem!"
201080-134 = "[s] \"Mai!?\""
201080-135 = "Sim! A principal apresentadora do Canal Chronos e jornalista obstinada que não deixa a verdade escapar!#nKazamaki Mai!"
201080-136 = "Nossa~ eu estava desanimada porque muitas entrevistas foram canceladas hoje...#nMas encontrar o professor [USERNAME]!#nGraças a isso, não vou voltar de mãos vazias!"
201080-142 = "Mas mudando de assunto, quem é esta aluna?"
201080-143 = "Se estavam se encontrando às escondidas, será que é alguma figurão...?"
201080-144 = "Ou talvez, uma relação íntima que não pode ser dita a ninguém...?"
201080-145 = "[s11] (Ser encontrada pela Mai bem agora...)\n[s12] (Que problema...)"
201080-148 = "...Ué?"
201080-149 = "...Ué, ué? Parece que já vi esse rosto em algum lugar...?"
201080-150 = "Essas orelhas pontudas e esse cabelo preto azulado..."
201080-151 = "Sinto que já entrevistei você no Canal Chronos, mas quem era mesmo..."
201080-156 = "...Ah!"
201080-158 = "(Será que fui descoberta...)"
201080-159 = "Você é a \"Rina\", vocalista do grupo idol secreto \"K.G.S.C\", não é!?"
201080-160 = "...Sim?"
201080-165 = "Não adianta fingir que não sabe!#nO grupo idol secreto que surgiu como um cometa no torneio de bandas, fez um sucesso enorme e depois desapareceu—#nSem nome e sem escola conhecida, certo?"
201080-166 = "Tentei de tudo para conseguir uma entrevista, mas não consegui nenhuma informação..."
201080-167 = "Aproveitando a oportunidade, por favor, diga algumas palavras...!"
201080-168 = "Não, esqueça isso, primeiro poderia me dizer seu nome e de qual escola você veio!?"
201080-169 = "[s] \"Mai, acalme-se um pouco.\""
201080-170 = "Po-por que essa cara séria de repente... o que aconteceu?"
201080-171 = "[s13] \"...A Rina-chan está me ajudando com o trabalho do Schale.\"\n[s14] \"Como envolve a segurança de Kivotos, preciso que mantenha segredo.\""
201080-172 = "...Quem é \"Rina-chan\"?"
201080-174 = "Logo de todas as coisas, informações confidenciais..."
201080-175 = "Entendido. Se é um pedido do Sensei, não tenho escolha."
201080-176 = "Se eu ignorar isso, existe a possibilidade de uma bomba voar para o Departamento de Imprensa..."
201080-177 = "Dito isso, espero que entenda que não posso voltar de mãos vazias...#nPoderia me contar algo que sirva como um furo de reportagem em troca?"
201080-178 = "Algum escândalo que só o Sensei do Schale conhece..."
201080-180 = "Ou algum segredo do Sensei que ninguém mais saiba...!"
201080-181 = "[s] (Já que estamos nisso, vou perguntar para a Mai também)"
201080-185 = "[ns] \"Então, você sabe sobre a história de que a Presidente do Conselho Estudantil foi substituída?\""
201080-186 = "Sim? Quer dizer que ela foi trocada enquanto estava desaparecida?"
201080-192 = "Haa... do que você está falando?"
201080-193 = "Ninguém vai acreditar em uma história dessas."
201080-194 = "Na verdade, o fato de o Sensei do Schale acreditar em teorias da conspiração não seria um furo de reportagem melhor...?"
201080-195 = "[s] \"Eu preferiria evitar isso...\""
201080-196 = "De qualquer forma, nunca ouvi falar de nada parecido."
201080-197 = "Substituir alguém tão notável quanto a Presidente do Conselho Estudantil sem que ninguém perceba, #nvocê não tem ideia de quão difícil isso seria, não é?"
201080-198 = "...Ah, agora que você mencionou, alguém disse algo parecido."
201080-199 = "Disseram que a Presidente do Conselho Estudantil tinha olhos azuis e cabelo azul-claro, mas que quando ela voltou, estava diferente—"
201080-201 = "Quem foi que disse isso!?"
201080-203 = "Que susto! O que deu em você de repente?"
201080-204 = "Onde e de quem você ouviu isso!? Eu preciso encontrar essa pessoa!"
201080-205 = "Bem... ah, é um cliente frequente de uma lanchonete antiga no Distrito Oeste de Aoba..."
201080-206 = "Fui lá fazer uma entrevista porque disseram que ele tinha histórias interessantes.#nMas ele só me contou lendas urbanas sem sentido."
201080-207 = "Acho que você consegue encontrá-lo neste horário.#nEle usa um monte de tralhas estranhas, então deve ser fácil de achar."
201080-208 = "Obrigado. Isso foi de grande ajuda."
201080-209 = "[s] \"Obrigado! Depois eu te compenso!\""
201080-210 = "De-de nada..."
201080-216 = "Sensei, uma idol e a Presidente do Conselho Estudantil... que tipo de combinação é essa?"
201080-218 = "Próximo episódio: Boa noite, Sr. Orwell"
