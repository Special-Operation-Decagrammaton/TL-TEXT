[translation]#[Texto Final. - Filipe 13/07.]
201080-1 = "Episódio 8; Ilusão e Dedução"
201080-4 = "[ns1] \"……Por que os óculos escuros?\"\n[ns2] \"Esses óculos combinaram com você!\""
201080-5 = "É um disfarce. Minha identidade não pode ser descoberta."
201080-6 = "Não é moda. É um disfarce."
201080-7 = "[s] \"Disfarce……?\""
201080-8 = "Sim."
201080-9 = "A partir de agora, farei uma investigação de campo.#nPara achar quem se lembre da Presidente do Conselho que EU conheço."
201080-10 = "Passei o dia inteiro observando o pessoal do comitê administrativo,#nmas ninguém estranhou absolutamente nada na Presidente do Conselho."
201080-11 = "Os representantes dos distritos autônomos também não tiveram reação especial.#nDeduzindo a partir desse cenário――"
201080-12 = "A adulteração das memórias parece abranger Kivotos inteira."
201080-13 = "[s] \"As memórias de Kivotos inteira, adulteradas……\""
201080-14 = "Eu sei que soa completamente absurdo."
201080-15 = "Mas, se houver mais gente que se lembra da Presidente original#ncomo eu e você, Sensei……"
201080-16 = "Talvez consigamos rastrear o paradeiro da#n\"verdadeira Presidente do Conselho\"."
201080-17 = "[s3] \"Por ora, é o único caminho mesmo……\"\n[s4] \"Também vou perguntar aas alunas que visitam a Schale.\""
201080-20 = "Obrigada. Você é de grande ajuda."
201080-24 = "……É claro que também suspeitei da minha própria memória."
201080-25 = "Vendo ela ganhar a confiança de todos tão rápido e o Conselho recuperar o ânimo,#nessa suspeita só aumentou, mas……"
201080-26 = "Ainda assim, aquela pessoa――"
201080-28 = "Rinzinha."
201080-30 = "Rinzinha~"
201080-32 = "Rinzinha!"
201080-34 = "――definitivamente não é a Presidente do Conselho das minhas memórias."
201080-38 = "Desculpe, acabei me alongando."
201080-42 = "[ns] \"Mais importante: vai ficar com esses óculos o tempo todo?\""
201080-43 = "É claro. Se minha identidade vazar, a investigação será comprometida."
201080-44 = "Acima de tudo, se espalharem que a Administradora desconfia da Presidente,#nisso pode gerar uma confusão completamente nova."
201080-45 = "Um disfarce pra não levantar suspeitas é a prioridade."
201080-46 = "[s] (Tenho a impressão de que chama mais atenção……)"
201080-47 = "Que cara é essa?"
201080-48 = "Não me diga que…… estes óculos estão esquisitos?"
201080-49 = "[s5] \"C-Claro que não!\"\n[s6] \"C-Combinou tanto que eu, é……\""
201080-52 = "…………"
201080-53 = "Não temos tempo. Continuamos a conversa andando?"
201080-54 = "Começando pelos centros comerciais, onde as alunas se concentram."
201080-56 = "Distrito de Shiratori - Corgi Town"
201080-59 = "(Na zona movimentada da cidade, começamos a sondagem sobre a Presidente do Conselho)"
201080-60 = "……A Presidente do Conselho? Foi muito bom ela ter voltado."
201080-61 = "Na ausência dela, tivemos vários transtornos, sabe……"
201080-62 = "Agora que ela voltou, tomara que diminua até o risco de acabar no meio de um tiroteio."
201080-64 = "A impressão que a Presidente passa?#nSei lá~ Será que mudou?"
201080-65 = "Eu sou péssimo pra memorizar rostos……"
201080-66 = "A cor do cabelo mudou um pouco…… talvez?"
201080-68 = "Mudou claramente! Pra essas coisas eu tenho radar."
201080-69 = "Comparado a antes do desaparecimento…… o cabelo dela encurtou uns 5cm!"
201080-70 = "Manter o corte sozinha é difícil, teria que frequentar o salão regularmente……"
201080-71 = "Enquanto ela esteve sumida, que cabeleireiro será que cuidou dela?"
201080-73 = "(Ninguém se lembrava da antiga Presidente do Conselho……)"
201080-75 = "Se a impressão da Presidente mudou? Hmm~ sei não."
201080-76 = "Erika, você reparou em algo?"
201080-77 = "Hmmm…… eu também não."
201080-78 = "A Presidente do Conselho sempre foi daquele jeito, né?#nSorriso elegante, olhos violeta, aquele lindo cabelo loiro-platinado――"
201080-79 = "Ah, tanto que o \"Loiro da Presidente\", imitando a cor, virou moda!"
201080-80 = "Simmm! Fez o maior sucesso~"
201080-81 = "Eu mesma fiquei tentada a pintar só as pontas."
201080-82 = "Ela vive no centro das atenções, impossível não lembrar."
201080-84 = "[ns7] \"……Entendi.\"\n[ns8] \"Até as alunas de Gehenna prestam atenção nela.\""
201080-87 = "Óbvio. Como não conhecer a Presidente que protege a segurança de Kivotos?"
201080-91 = "……Makoto? Quem? Hein?#nHmm, acho que já ouvi esse nome em algum lugar……"
201080-93 = "(E também acabamos virando suspeitos)"
201080-98 = "Vocês aí, parados!"
201080-99 = "São vocês que estão espalhando boatos falsos sobre a Presidente do Conselho por aqui, né?"
201080-100 = "Francamente…… por que inventar uma mentira dessas?"
201080-101 = "Estão chegando reclamações, e quem se complica somos nós."
201080-102 = "[s] \"Não, não era nossa intenção……\""
201080-103 = "Opa, você é――"
201080-104 = "Sensei [USERNAME]?!"
201080-105 = "P-Perdão, foi indelicadeza nossa. Viemos por causa de uma denúncia."
201080-106 = "Se o Sensei está dizendo, deve ter havido algum mal-entendido."
201080-107 = "Mas tomem cuidado.#nMesmo com a Presidente de volta, nem todo mundo está vivendo em paz."
201080-108 = "Uma parte da população já exige explicações sobre a causa e os detalhes do desaparecimento……"
201080-109 = "D.U. deve ficar agitada por um tempo."
201080-114 = "[ns] \"No fim, ninguém se lembrava da Presidente do Conselho.\""
201080-115 = "……Pois é."
201080-116 = "[s9] \"……Vamos voltar?\"\n[s10] \"Já é tarde, e tá esfriando.\""
201080-119 = "Só mais um pouco…… por favor."
201080-120 = "Se procurarmos mais, talvez encontremos alguém."
201080-121 = "Nem que seja só mais 30 minutos――"
201080-123 = "E eu achando que hoje era meu dia de azar…… quem diria, encontrar o Sensei da Schale."
201080-128 = "E ainda por cima escondido dos olhares, num canto escuro, a sós com uma aluna……"
201080-129 = "Isso é――"
201080-133 = "um furo de reportagem!"
201080-134 = "[s] \"Mai?!\""
201080-135 = "Sim! A apresentadora principal do Canal Kronos e jornalista implacável que não deixa a verdade escapar!#nKazamaki Mai!"
201080-136 = "Poxa~ hoje cancelaram um monte de entrevistas em cima da hora, eu tava na fossa……#nMas encontrar o Sensei [USERNAME]!#nAgora não corro mais o risco de voltar de mãos vazias!"
201080-142 = "Mais importante: quem é essa aluna?"
201080-143 = "Um encontro às escondidas…… seria alguém importante, de alguma organização……?"
201080-144 = "Ou uma relação íntima que não pode ser revelada……?"
201080-145 = "[s11] (A Mai me achar logo agora……)\n[s12] (E agora……)"
201080-148 = "……Ué?"
201080-149 = "……Ué, ué? Eu já vi você em algum lugar……?"
201080-150 = "Essas orelhas pontudas, esse cabelo preto-azulado……"
201080-151 = "Acho que até já entrevistei no Canal Kronos, mas quem era mesmo……?"
201080-156 = "……Ah!"
201080-158 = "(Fui descoberta……)"
201080-159 = "Você é a \"Rina\", vocalista do grupo idol secreto \"K.G.S.C\", não é?!"
201080-160 = "……Como é?"
201080-165 = "Não adianta se fazer de desentendida!#nO grupo que surgiu como um cometa no festival de bandas, fez o maior sucesso e sumiu――#no grupo idol secreto sem nome nem escola de origem conhecidos! Não é?"
201080-166 = "Tentei de tudo pra conseguir uma matéria, mas não achei informação nenhuma……"
201080-167 = "Aproveitando a chance, me dê uma palavrinha……!"
201080-168 = "Aliás, antes disso: pode me dizer seu nome e sua escola de origem?!"
201080-169 = "[s] \"Mai, respira um pouco.\""
201080-170 = "E-Essa cara séria…… o que deu em você do nada?"
201080-171 = "[s13] \"……A Rinzinha está ajudando num trabalho da Schale.\"\n[s14] \"Envolve a segurança de Kivotos, então preciso que guarde segredo.\""
201080-172 = "……Quem aqui é \"Rinzinha\"?"
201080-174 = "Logo informação confidencial……"
201080-175 = "Entendi. Se é um pedido do Sensei, não tem jeito."
201080-176 = "Se eu ignorar, ainda corre o risco de jogarem uma bomba no clube de jornalismo……"
201080-177 = "Mesmo assim, entenda que eu não posso voltar de mãos abanando……#nEm troca, não tem nenhuma outra história com cara de furo pra me contar?"
201080-178 = "Um escândalo que só o Sensei da Schale conheça……"
201080-180 = "Ou um segredo seu que você nunca contou a ninguém……!"
201080-181 = "[s] (Boa oportunidade. Vou perguntar pra Mai também)"
201080-185 = "[ns] \"Então, já ouviu falar que a Presidente do Conselho foi trocada?\""
201080-186 = "Hã? Tipo, substituída enquanto esteve desaparecida?"
201080-192 = "Haa…… o que é que você tá falando?"
201080-193 = "Uma história dessas, ninguém vai querer ouvir."
201080-194 = "Pensando bem, o Sensei da Schale acreditando em teoria da conspiração…… isso sim daria um furo……?"
201080-195 = "[s] \"Me poupa dessa, por favor……\""
201080-196 = "Enfim, nunca ouvi nada parecido."
201080-197 = "Trocar uma celebridade como a Presidente do Conselho sem ninguém perceber……#nvocê tem noção de como isso seria difícil, né?"
201080-198 = "……Ah, agora que falou, acho que alguém me disse algo parecido."
201080-199 = "Que a Presidente tinha olhos azuis e cabelo azul-claro, mas voltou diferente――"
201080-201 = "Quem disse isso?!"
201080-203 = "Que susto! O que deu em você?!"
201080-204 = "Onde e de quem você ouviu isso? Eu preciso encontrar essa pessoa!"
201080-205 = "Er…… d-de um frequentador de um drink bar antigo no distrito oeste de Aoba……"
201080-206 = "Fui entrevistá-lo uma vez, diziam que ele tinha histórias interessantes.#nSó que só ouvi lenda urbana sem pé nem cabeça."
201080-207 = "A essa hora, vocês devem encontrá-lo lá.#nEle vive coberto de badulaques estranhos, vão achar de cara."
201080-208 = "Muito obrigada. Você ajudou imensamente."
201080-209 = "[s] \"Valeu! Depois eu retribuo!\""
201080-210 = "D-De nada……"
201080-216 = "O Sensei, uma idol e a Presidente do Conselho…… que combinação é essa?"
201080-218 = "Próximo Episódio;Boa Noite, Sr. Orwell"