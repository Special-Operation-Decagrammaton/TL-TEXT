[translation]
201080-1 = "Эпизод 8;Мнимый образ и умозаключение"
201080-4 = "[ns1] «...Почему вы в солнцезащитных очках?»\n[ns2] «Солнцезащитные очки вам очень идут!»"
201080-5 = "Это маскировка. Моя личность не должна быть раскрыта."
201080-6 = "Это не ради моды. Это маскировка."
201080-7 = "[s] «Маскировка...?»"
201080-8 = "Да."
201080-9 = "Сейчас я собираюсь провести опрос. #nЧтобы найти кого-то, кто помнит Президента ГСС такой, какой её знала я."
201080-10 = "Я провела день, наблюдая за членами Административного комитета, #nно ни один человек не почувствовал, что с Президентом ГСС что-то не так."
201080-11 = "Более того, представители каждого автономного округа не выказали никакой особой реакции. #nСудя по этим обстоятельствам —"
201080-12 = "Я полагаю, что искажение памяти распространилось на весь Кивотос."
201080-13 = "[s] «Память во всём Кивотосе была изменена...?»"
201080-14 = "Я знаю, что это звучит абсурдно."
201080-15 = "Но если найдутся другие, кто помнит настоящую Президента ГСС, как вы и я..."
201080-16 = "Мы, возможно, сможем выследить местонахождение \"настоящей Президента ГСС\"."
201080-17 = "[s3] «Пока что это единственный способ, верно...?»\n[s4] «Я также расспрошу студентов, которые приходят в Шале»."
201080-20 = "Спасибо. Я рассчитываю на вас."
201080-24 = "...Разумеется, я и сама сомневалась в собственной памяти."
201080-25 = "Видя, как быстро она завоевала доверие окружающих и вернула ГСС к жизни, #nя начала думать об этом ещё сильнее, но..."
201080-26 = "И всё же этот человек —"
201080-28 = "Рин-тян."
201080-30 = "Рин-тян~"
201080-32 = "Рин-тян!"
201080-34 = "— определённо не та Президент ГСС, которую я помню."
201080-38 = "Прошу прощения, я слишком затянула разговор."
201080-42 = "[ns] «И всё-таки, вы намерены продолжать ходить в этих очках?»"
201080-43 = "Конечно. Если моя личность раскроется, это повлияет на расследование."
201080-44 = "Прежде всего, если поползут слухи, что административный сотрудник подозревает Президента ГСС, #nэто может привести к ещё большему хаосу."
201080-45 = "Чтобы не вызывать подозрений, маскировка — первоочередная задача."
201080-46 = "[s] (Мне кажется, от этого вы выглядите только подозрительнее...)"
201080-47 = "Что это за взгляд?"
201080-48 = "Неужели... эти очки странные?"
201080-49 = "[s5] «Н-нет, вовсе нет!»\n[s6] «Просто... они вам так идут, что я не удержался...»"
201080-52 = "......."
201080-53 = "У нас мало времени. Поговорим на ходу?"
201080-54 = "Для начала мы начнём с коммерческого района, где собирается много студентов."
201080-56 = "Район Ширатори — Город Корги"
201080-59 = "(Мы начали наш опрос о Президенте ГСС в центральной части города.)"
201080-60 = "...Президент ГСС? Я так рада, что вы вернулись."
201080-61 = "Пока вас не было, всё было довольно неудобно..."
201080-62 = "Теперь, когда вы вернулись, надеюсь, будет меньше поводов беспокоиться о том, что можно попасть в перестрелку в городе."
201080-64 = "Моё впечатление о Президенте ГСС? Хм-м~? Разве оно изменилось?"
201080-65 = "Я не очень хорошо запоминаю лица людей..."
201080-66 = "Может, у неё немного изменился цвет волос...?"
201080-68 = "Оно явно другое! Я чутка к таким вещам."
201080-69 = "По сравнению с тем, что было до её исчезновения... её волосы стали короче примерно на 5 сантиметров!"
201080-70 = "За этим трудно ухаживать самостоятельно, и приходится регулярно ходить в салон..."
201080-71 = "Интересно, какой стилист заботился о ней, пока она отсутствовала?"
201080-73 = "(Никто не помнил прежнюю Президента ГСС...)"
201080-75 = "Изменилось ли впечатление от Президента ГСС? Ну, я не знаю."
201080-76 = "Эрика, у тебя есть идеи?"
201080-77 = "Хм... Не особо."
201080-78 = "У Президента ГСС всегда было такое описание, разве нет? #nДостопочтенная улыбка, фиолетовые глаза, красивые платиновые светлые волосы —"
201080-79 = "О, и \"Блонд Президента\" был настолько популярен, что люди копировали этот цвет, верно?"
201080-80 = "Точно! Это было так популярно~"
201080-81 = "Я даже подумывала покрасить только кончики волос."
201080-82 = "Она всегда в центре внимания, так что я никак не могла её не запомнить."
201080-84 = "[ns7] «...Понимаю».\n[ns8] «Значит, даже студенты Геенны обращают на это внимание»."
201080-87 = "Конечно. Я никак не могла не знать Президента ГСС, которая защищает безопасность Кивотоса."
201080-91 = "...Макото? Кто это? Та самая. #nХм, мне кажется, я где-то слышала это имя..."
201080-93 = "(И в итоге нас тоже начали подозревать)"
201080-98 = "Вы двое, стоять!"
201080-99 = "Это ведь вы тут распускаете слухи о Президенте ГСС, верно?"
201080-100 = "Честное слово... зачем вам разносить такие сплетни?"
201080-101 = "Из-за этого нам поступают жалобы, и это доставляет нам тоже кучу неприятностей."
201080-102 = "[s] «Нет, у нас не было такого умысла...»"
201080-103 = "Погодите, вы же —"
201080-104 = "Сенсей?!"
201080-105 = "О-оу, прошу прощения. Мы пришли сюда по сообщению."
201080-106 = "Если Сенсей так говорит, значит, произошло какое-то недоразумение."
201080-107 = "Но, пожалуйста, будьте осторожны. #nДаже несмотря на возвращение Президента ГСС, далеко не все живут спокойно."
201080-108 = "Раздаются голоса, призывающие расследовать причины и обстоятельства её исчезновения..."
201080-109 = "Похоже, в Д.У. ещё какое-то время будет шумно."
201080-114 = "[ns] «В конце концов, мы так и не смогли найти никого, кто помнит Президента ГСС»."
201080-115 = "...Да."
201080-116 = "[s9] «...Может, вернёмся поскорее?»\n[s10] «Уже поздно, да и холодает»."
201080-119 = "Ещё совсем немного... пожалуйста."
201080-120 = "Если мы поищем ещё чуть-чуть, возможно, нам удастся кого-нибудь найти."
201080-121 = "Хотя бы ещё 30 минут —"
201080-123 = "Я думала, что сегодняшний день будет неудачным... но подумать только, что я наткнусь на Сенсея из Шале."
201080-128 = "Да ещё и здесь, скрываясь от чужих глаз, наедине со студенткой в таком тёмном месте..."
201080-129 = "Это же —"
201080-133 = "Сенсация!"
201080-134 = "[s] «Маи!?»"
201080-135 = "Да! Главная ведущая канала Кронос и настойчивый журналист, от которого не скроется ни одна правда! #nКадзамаки Маи!"
201080-136 = "Эх~ Я была так расстроена, потому что сегодня отменилось столько интервью... #nНо подумать только, что я встречу Сенсея! #nБлагодаря вам мне не придётся возвращаться домой с пустыми руками!"
201080-142 = "Но что более важно, кто эта студентка?"
201080-143 = "Крадучись вот так... она какая-то важная шишка...?"
201080-144 = "Или, возможно, у вас близкие отношения, о которых нельзя рассказывать другим...?"
201080-145 = "[s11] (Подумать только, что Маи найдёт меня именно в этот момент...)\n[s12] (Это проблематично...)"
201080-148 = "...Ась?"
201080-149 = "...Хм, хм-м? Я ведь где-то её видела...?"
201080-150 = "Эти заострённые уши и эти синевато-чёрные волосы..."
201080-151 = "Мне кажется, я уже брала у неё интервью на канале Кронос, но кто же это был..."
201080-156 = "...А!"
201080-158 = "(Неужели нас раскрыли...)"
201080-159 = "Вы ведь \"Рина\", вокалистка скрытной идол-группы \"K.G.S.C\", не так ли?!"
201080-160 = "...Прошу прощения?"
201080-165 = "Бесполезно притворяться дурочкой! #nСкрытная идол-группа, которая на днях ворвалась как комета на соревнование групп, завоевала огромную популярность, а затем испарилась — #nпричём никто не знает ни их названия, ни школы! Я права?"
201080-166 = "Я пыталась и так, и эдак, чтобы получить интервью, но не смогла разузнать ни крупицы информации..."
201080-167 = "Пользуясь случаем, пожалуйста, буквально пару слов...!"
201080-168 = "Нет, перед этим, не могли бы вы назвать своё имя и школу?!"
201080-169 = "[s] «Маи, успокойся на секунду»."
201080-170 = "П-почему вы вдруг так серьёзны...?"
201080-171 = "[s13] «...Рина-тян помогает мне с работой в Шале».\n[s14] «Это касается безопасности Кивотоса, так что, пожалуйста, сохрани это в тайне»."
201080-172 = "...Кто такая \"Рина-тян\"?"
201080-174 = "Надо же, засекреченная информация..."
201080-175 = "Я понимаю. Если это просьба Сенсея, у меня нет выбора."
201080-176 = "Если я проигнорирую это, есть вероятность, что в новостной отдел подкинут бомбу..."
201080-177 = "Однако, надеюсь, вы понимаете, что я не могу уйти с пустыми руками... #nНе могли бы вы рассказать мне взамен что-нибудь другое, что потянуло бы на сенсацию?"
201080-178 = "Например, какой-нибудь скандал, о котором знает только Сенсей из Шале..."
201080-180 = "Или секрет Сенсея, о котором ещё никто не знает...!"
201080-181 = "[s] (Это хорошая возможность, я спрошу и у Маи тоже)"
201080-185 = "[ns] «Тогда, знаешь ли ты что-нибудь о слухах, что Президента ГСС подменили?»"
201080-186 = "Прошу прощения? Вы имеете в виду, что её заменили, пока она отсутствовала?"
201080-192 = "Эх... о чём вы вообще говорите?"
201080-193 = "Никто не станет слушать подобные истории."
201080-194 = "Нет, скорее, не будет ли большей сенсацией то, что Сенсей из Шале верит в теории заговора...?"
201080-195 = "[s] «Я бы хотел этого избежать...»"
201080-196 = "В любом случае, я никогда не слышала ничего подобного."
201080-197 = "Подменить такую заметную фигуру, как Президент ГСС, так, чтобы никто не заметил — #nвы ведь понимаете, насколько это сложно, верно?"
201080-198 = "...А, кстати, кто-то говорил нечто подобное."
201080-199 = "Что у Президента ГСС были голубые глаза и светло-голубые волосы, но всё изменилось, когда она вернулась —"
201080-201 = "Кто это был?!"
201080-203 = "Вы напугали меня! К чему такая внезапная реакция?"
201080-204 = "Где и от кого ты это слышала! Мне нужно встретиться с этим человеком!"
201080-205 = "Э-э... а, это был завсегдатай старого питейного автомата в западном районе Аоба..."
201080-206 = "Я ходила брать у них интервью раньше, потому что они сказали, что у них есть интересная история. #nНо они просто наговорили мне кучу бредней из городских легенд."
201080-207 = "Вы должны застать их в это время суток. #nОни носят на себе кучу странного хлама, так что, думаю, вы сразу их найдёте."
201080-208 = "Спасибо. Это очень помогло."
201080-209 = "[s] «Спасибо! Я отблагодарю тебя позже!»"
201080-210 = "П-пожалуйста..."
201080-216 = "Сенсей, идол и Президент ГСС... что это вообще за сочетание?"
201080-218 = "Следующий эпизод;Доброй ночи, мистер Оруэлл"