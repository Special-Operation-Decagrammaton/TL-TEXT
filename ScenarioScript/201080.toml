[translation]
201080-1 = "Episode 8;Virtual Images and Inference"
201080-4 = "[ns1] \"...Why are you wearing sunglasses?\"\n[ns2] \"The sunglasses look great on you!\""
201080-5 = "It is a disguise. I cannot have my identity revealed."
201080-6 = "This is not for fashion. It is a disguise."
201080-7 = "[s] \"A disguise...?\""
201080-8 = "Yes."
201080-9 = "I am going to conduct an inquiry now. #nTo find someone who remembers the GSC President as I knew her."
201080-10 = "I spent the day observing the members of the Administrative Committee, #nbut not a single person felt anything was amiss with the GSC President."
201080-11 = "Furthermore, the representatives of each autonomous district showed no special reaction. #nJudging from these circumstances—"
201080-12 = "I believe the tampering with memories has extended throughout all of Kivotos."
201080-13 = "[s] \"Memories across all of Kivotos have been tampered with...?\""
201080-14 = "I know it sounds absurd."
201080-15 = "But if there are others who remember the original GSC President, like you and me..."
201080-16 = "We might be able to track down the whereabouts of the \"real GSC President.\""
201080-17 = "[s3] \"For now, that's the only way, isn't it...?\"\n[s4] \"I'll ask the students who come to Schale, too.\""
201080-20 = "Thank you. I am counting on you."
201080-24 = "...Naturally, I also doubted my own memory."
201080-25 = "Seeing how she immediately gained the trust of those around her and brought vitality back to the GSC, #nI began to think so even more, but..."
201080-26 = "Even so, that person is—"
201080-28 = "Rin-chan."
201080-30 = "Rin-chan~"
201080-32 = "Rin-chan!"
201080-34 = "—is definitely not the GSC President I remember."
201080-38 = "I apologize, I have gone on for too long."
201080-42 = "[ns] \"More importantly, do you intend to keep wearing those sunglasses?\""
201080-43 = "Of course. If my identity is revealed, it will affect the investigation."
201080-44 = "Above all, if word spreads that an administrative officer is suspicious of the GSC President, #nit could lead to further confusion."
201080-45 = "To avoid suspicion, a disguise is the first priority."
201080-46 = "[s] (I feel like that's only making you more suspicious...)"
201080-47 = "What is with that look?"
201080-48 = "Could it be... are these sunglasses strange?"
201080-49 = "[s5] \"N-no, not at all!\"\n[s6] \"It's just... they suit you so well, I couldn't help but...\""
201080-52 = "......."
201080-53 = "We have no time. Shall we talk while we walk?"
201080-54 = "First, we will start at the commercial district where many students gather."
201080-56 = "Shiratori District - Corgi Town"
201080-59 = "(We began our inquiry about the GSC President in the city's downtown area.)"
201080-60 = "...The GSC President? I'm so glad you've returned."
201080-61 = "Things were quite inconvenient while you were away..."
201080-62 = "Now that you're back, hopefully there will be less worry about getting caught in shootouts in the city."
201080-64 = "My impression of the GSC President? Hmm~? Did it change?"
201080-65 = "I'm not very good at remembering people's faces..."
201080-66 = "Maybe her hair color changed a little...?"
201080-68 = "It's clearly different! I'm sensitive to these things."
201080-69 = "Compared to before she went missing... her hair is about 5cm shorter!"
201080-70 = "It's hard to maintain on your own, and you have to go to the salon regularly..."
201080-71 = "I wonder which stylist was taking care of her while she was gone?"
201080-73 = "(No one remembered the previous GSC President...)"
201080-75 = "Did the GSC President's impression change? Well, I don't know."
201080-76 = "Erika, do you have any idea?"
201080-77 = "Hmm... I don't really."
201080-78 = "The GSC President always had that impression, didn't she? #nA dignified smile, purple eyes, beautiful platinum blonde hair—"
201080-79 = "Oh, and \"President Blonde\" was so popular that people were copying that color, right?"
201080-80 = "That's right! It was so popular~"
201080-81 = "I was even thinking about dyeing just the tips of my hair."
201080-82 = "She's always the center of attention, so there's no way I wouldn't remember."
201080-84 = "[ns7] \"...I see.\"\n[ns8] \"So even Gehenna students are paying attention.\""
201080-87 = "Of course. There's no way I wouldn't know the GSC President who protects the safety of Kivotos."
201080-91 = "...Makoto? Who? That. #nHmm, I feel like I've heard that name somewhere..."
201080-93 = "(And, ending up being suspected as well)"
201080-98 = "You there, stop!"
201080-99 = "You're the ones spreading rumors about the GSC President here, aren't you?"
201080-100 = "Honestly... why would you spread such rumors?"
201080-101 = "We've been getting complaints because of it, and it's causing us trouble too."
201080-102 = "[s] \"No, that wasn't our intention...\""
201080-103 = "Wait, are you—"
201080-104 = "Sensei!?"
201080-105 = "O-oh, my apologies. We came here because of a report."
201080-106 = "If Sensei says so, then there must have been some misunderstanding."
201080-107 = "But please be careful. #nEven though the GSC President has returned, not everyone is living in peace."
201080-108 = "There are some voices calling for an investigation into the cause and circumstances of her disappearance..."
201080-109 = "It seems D.U. will be noisy for a while."
201080-114 = "[ns] \"In the end, we couldn't find anyone who remembers the GSC President.\""
201080-115 = "...Yes."
201080-116 = "[s9] \"...Should we head back soon?\"\n[s10] \"It's late, and it's getting cold.\""
201080-119 = "Just a little longer... please."
201080-120 = "If we look a bit more, we might be able to find someone."
201080-121 = "Even just 30 more minutes—"
201080-123 = "I thought today was going to be unlucky... but to think I'd run into Sensei from Schale."
201080-128 = "And here, avoiding people's eyes, alone with a student in a dark place..."
201080-129 = "This is—"
201080-133 = "A scoop!"
201080-134 = "[s] \"Mai!?\""
201080-135 = "Yes! The main MC of Chronos Channel and the persistent journalist who never lets the truth escape! #nKazamaki Mai!"
201080-136 = "Man~ I was feeling down because so many interviews were canceled today... #nBut to think I'd meet Sensei! #nThanks to you, I don't have to worry about going home empty-handed!"
201080-142 = "More importantly, who is this student?"
201080-143 = "Sneaking around like this... is she some kind of big shot...?"
201080-144 = "Or perhaps, a close relationship that can't be told to others...?"
201080-145 = "[s11] (To think I'd be found by Mai at this timing...)\n[s12] (This is troublesome...)"
201080-148 = "...Huh?"
201080-149 = "...Huh, huh? Do I recognize her from somewhere...?"
201080-150 = "Those pointed ears, and that bluish-black hair..."
201080-151 = "I feel like I've interviewed her on Chronos Channel before, but who was it..."
201080-156 = "...Ah!"
201080-158 = "(Have we been found out...)"
201080-159 = "You're \"Rina,\" the vocalist of the secretive idol group \"K.G.S.C,\" aren't you!?"
201080-160 = "...Excuse me?"
201080-165 = "It's no use playing dumb! #nThe secretive idol group that appeared like a comet at the band competition the other day, gained huge popularity, and then vanished— #nwithout even a name or school known! Right?"
201080-166 = "I tried this and that to get an interview, but I couldn't get a single piece of information..."
201080-167 = "On this occasion, please, a word...!"
201080-168 = "No, before that, could you please tell me your name and school!?"
201080-169 = "[s] \"Mai, calm down for a second.\""
201080-170 = "W-why are you suddenly so serious...?"
201080-171 = "[s13] \"...Rina-chan is helping me with work at Schale.\"\n[s14] \"It involves the safety of Kivotos, so please keep it a secret.\""
201080-172 = "...Who is \"Rina-chan\"?"
201080-174 = "Of all things, classified information..."
201080-175 = "I understand. If it's Sensei's request, I have no choice."
201080-176 = "If I ignore this, there's a possibility a bomb might be thrown at the news department..."
201080-177 = "However, I hope you understand that I can't go home empty-handed... #nCould you tell me something else that could be a scoop in return?"
201080-178 = "Like a scandal that only Sensei from Schale knows..."
201080-180 = "Or a secret of Sensei's that no one else knows yet...!"
201080-181 = "[s] (This is a good opportunity, I'll ask Mai too)"
201080-185 = "[ns] \"Then, do you know about the rumor that the GSC President has been replaced?\""
201080-186 = "Excuse me? You mean she was swapped while she was missing?"
201080-192 = "Sigh... what are you talking about?"
201080-193 = "No one is going to listen to that kind of story."
201080-194 = "No, rather, wouldn't it be a bigger scoop that Sensei from Schale believes in conspiracy theories...?"
201080-195 = "[s] \"I'd like to avoid that...\""
201080-196 = "Anyway, I've never heard of such a thing."
201080-197 = "Replacing a prominent figure like the GSC President without anyone noticing, #nyou know how difficult that is, don't you?"
201080-198 = "...Ah, come to think of it, someone was saying something similar."
201080-199 = "That the GSC President had blue eyes and light blue hair, but it changed when she returned—"
201080-201 = "Who was that!?"
201080-203 = "You startled me! What's with the sudden reaction?"
201080-204 = "Where, and who did you hear that from! I have to meet that person!"
201080-205 = "Uh... ah, it was a regular at an old drink bar in Aoba West District..."
201080-206 = "I went to interview them before because they said they had an interesting story. #nBut they just told me a bunch of nonsense urban legends."
201080-207 = "You should be able to meet them at this time of day. #nThey wear a lot of weird junk, so I think you'll find them right away."
201080-208 = "Thank you. That was a great help."
201080-209 = "[s] \"Thanks! I'll thank you later!\""
201080-210 = "Y-you're welcome..."
201080-216 = "Sensei, an idol, and the GSC President... what kind of combination is this?"
201080-218 = "Next Episode;Good Evening, Mr. Orwell"