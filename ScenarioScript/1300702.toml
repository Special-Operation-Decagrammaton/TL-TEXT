[translation]
1300702-1 = "Recompensa pela honestidade"
1300702-2 = "Um momento em uma tarde preguiçosa. Parei em uma doceria da cidade para comprar um lanche."
1300702-5 = "Confeitaria \"L'Oiseau Brûlé\""
1300702-6 = "Bem-vindo à \"L'Oiseau Brûlé\"!"
1300702-7 = "[s] \"...Junko?\""
1300702-8 = "Ué, Sensei? O que faz aqui?"
1300702-9 = "Veio comprar um lanche? Hum, os doces daqui são bem caros, sabia..."
1300702-10 = "Ah, é verdade... Sensei tem o cartão de adulto, né..."
1300702-11 = "Adultos são tão sortudos~ Podem comer quantos doces quiserem~"
1300702-12 = "Eu? O que estou fazendo aqui?"
1300702-13 = "Como pode ver, estou trabalhando de meio período nesta loja."
1300702-14 = "Com os gastos com café da manhã, almoço, jantar e os doces depois das refeições... minhas despesas ficaram bem altas."
1300702-15 = "Por que ingredientes de alta qualidade são todos tão caros?#nIsso não é algo que se compra com a mesada de uma estudante!"
1300702-16 = "Eu também não queria ter o trabalho de fazer bicos, mas... por causa de coisas gostosas, não tem outro jeito."
1300702-17 = "[s] \"O trabalho não é cansativo?\""
1300702-18 = "Hum? Estou bem. Não é como se eu tivesse que assar os pães diretamente."
1300702-19 = "Além disso, na \"L'Oiseau Brûlé\", os funcionários podem levar para casa os doces que sobram no dia."
1300702-20 = "Poder comer de graça os doces desta loja, que normalmente são caros demais para mim, já é motivo suficiente para trabalhar aqui!"
1300702-21 = "[s] \"Tem alguma recomendação no cardápio?\""
1300702-22 = "Recomendação? Deixa eu ver..."
1300702-23 = "Qualquer doce daqui é delicioso, mas minha recomendação pessoal seria aquele Mont Blanc ali."
1300702-24 = "Como é caro, não vende tanto, mas a combinação do sabor intenso da pasta de castanhas macia e úmida com o merengue crocante é o verdadeiro sabor de primeira classe!"
1300702-25 = "Uma vez, por acaso, comi um que sobrou e... o sabor era simplesmente encantador!"
1300702-26 = "[s] Comprar o doce recomendado pela Junko."
1300702-27 = "Boa escolha, você não vai se arrepender!"
1300702-28 = "Hã? Se o doce favorito for vendido, eu não vou poder levar o que sobrou para casa, então não é um prejuízo?"
1300702-29 = "É... verdade? Será que eu deveria enrolar de propósito para sobrar bastante estoque..."
1300702-30 = "Não, espera! Se não vender, eu não recebo meu salário, e aí não vou conseguir comprar coisas gostosas...!"
1300702-31 = "Ué, hã... o que eu deveria fazer...?"
1300702-32 = "[s] Entregar o doce comprado para a Junko."
1300702-33 = "Hã...? Isso não era para você comer como lanche, Sensei?"
1300702-34 = "Um presente para uma aluna que trabalha duro...?#n...O-obrigada..."
1300702-35 = "É verdade, não é certo ficar enrolando no trabalho contando com a bondade dos outros."
1300702-36 = "Vou dar o meu melhor hoje também!"
1300702-38 = "Depois disso, comprei mais alguns doces para o lanche e voltei para o Schale."
