[translation]
1300702-1 = "誠実さのご褒美"
1300702-2 = "気だるい午後のひと時。おやつを買うために、市内のスイーツ店に寄った。"
1300702-5 = "洋菓子店「ルワゾー・ブッレ」"
1300702-6 = "いらっしゃいませ、「ルワゾー・ブッレ」ですっ！"
1300702-7 = "[s] \"……ジュンコ？\""
1300702-8 = "あれ、先生？どうしてここに？"
1300702-9 = "おやつを買いに来たの？ふーん、ここのお店のスイーツ、結構高いのに……。"
1300702-10 = "あ、そっか……先生には大人のカードがあるのか……。"
1300702-11 = "大人はいいな～、食べたいスイーツを好きなだけ食べられて～。"
1300702-12 = "私？ここで何をしてるかって？"
1300702-13 = "見ての通り、このお店でアルバイト中。"
1300702-14 = "朝、昼、夜の食事代に、食後のスイーツ代……かなり出費が嵩んできちゃったから。"
1300702-15 = "高級食材って、何でどれもあんなに高いの？#nあんなの学生のおこづかいで買えるレベルじゃないじゃん！"
1300702-16 = "私もバイトなんてめんどくさいことはやりたくないけど……美味しい物のためなら仕方ないもん。"
1300702-17 = "[s] \"仕事は大変じゃない？\""
1300702-18 = "ん？平気だよ。私が直接パンを焼いたりするわけじゃないし。"
1300702-19 = "それに「ルワゾー・ブッレ」では、その日に残ったスイーツを従業員が持って帰れるの。"
1300702-20 = "普段は高くて食べられないこのお店のスイーツがタダで食べられるなんて、それだけで、ここで働く理由には十分よ！"
1300702-21 = "[s] \"おすすめのメニューはある？\""
1300702-22 = "おすすめのメニュー？えっとねー……。"
1300702-23 = "ここのスイーツなら何でも美味しいけど、個人的なおすすめはそこのモンブランかな。"
1300702-24 = "値段も高いからたくさん売れてるってわけじゃないけど、柔らかくてしっとりとした栗ペーストの濃い味と、サクッとしたメレンゲの組み合わせはこれこそ一流の味って感じ！"
1300702-25 = "前にたまたま売れ残ったのを一度食べてみたけど……うっとりするような味だったの！"
1300702-26 = "[s] ジュンコのおすすめスイーツを買う。"
1300702-27 = "良い判断ね、きっと後悔しないから！"
1300702-28 = "え？好きなスイーツが売れちゃったら、売れ残りを持って帰れないから損じゃないか、って？"
1300702-29 = "た……確かに？もしかして、わざとサボって在庫をたくさん残した方が……。"
1300702-30 = "いや、でも！売れないと給料も貰えないし、そうなったら美味しいものも買えないし……！"
1300702-31 = "あれ、えっと……どうすればいいんだろ……？"
1300702-32 = "[s] 買ったスイーツをジュンコに渡す。"
1300702-33 = "え……？これは、先生がおやつとして食べるために買ったんじゃないの？"
1300702-34 = "一生懸命働く生徒にプレゼント……？#n……あ、ありがと……。"
1300702-35 = "そうよね、人の好意に頼ってわざとサボるのは良くないことだもの。"
1300702-36 = "今日も一日頑張るね！"
1300702-38 = "その後、おやつ用のスイーツをまたいくつか買って、シャーレに戻った。"
