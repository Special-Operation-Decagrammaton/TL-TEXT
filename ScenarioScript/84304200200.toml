[translation]
84304200200-5 = "Bom, as informações já estão mais ou menos organizadas..."
84304200200-7 = "Guh...!"
84304200200-8 = "Quem é você...?"
84304200200-9 = "Quem diabos é você—"
84304200200-17 = "Eek!"
84304200200-19 = "Sério, esse tipo de gente sempre diz as mesmas coisas."
84304200200-20 = "E outra, vocês não têm o direito de fazer perguntas. Quem pergunta aqui sou eu. Não se enganem."
84304200200-21 = "Então, qual é o objetivo de vocês? Por que se deram ao trabalho de vir destruir o evento de outra escola?"
84304200200-27 = "Dependendo da resposta—"
84304200200-32 = "N-não temos más intenções! Não temos nenhum rancor contra esta escola nem nada disso...!"
84304200200-33 = "É só um bico! É só um trabalho temporário!!"
84304200200-35 = "...Um bico?"
84304200200-36 = "Quem é o contratante e qual é o conteúdo do serviço?"
84304200200-38 = "Ah... não tem como eu te contar isso. Afinal, existe uma coisa chamada acordo de confidencialidade—"
84304200200-46 = "Próximo, você."
84304200200-47 = "Aaaah!!"
84304200200-48 = "Eu não sei! Eu não sei de nada! Nem nós sabemos!"
84304200200-49 = "Nós só recebemos o contato e fizemos o que nos mandaram...!"
84304200200-55 = "Ah, o telefone..."
84304200200-56 = "...Posso atender?"
84304200200-57 = "No viva-voz."
84304200200-64 = "Alô, bom trabalho."
84304200200-65 = "Como está? Está tudo correndo bem?"
84304200200-66 = "Ah, sim. O centro de fitness já foi resolvido. I-isso significa que vamos receber o pagamento, certo?"
84304200200-67 = "Sim. Deve ter sido difícil, não é? Bom trabalho! Vou fazer o depósito imediatamente..."
84304200200-68 = "...Ah, é mesmo!"
84304200200-69 = "Tenho mais um serviço. Poderiam cuidar deste também?"
84304200200-70 = "Claro que a recompensa será generosa!"
84304200200-71 = "O quê, mais um...? P-por quê? Isso não era tudo?"
84304200200-72 = "Sabe como é, sempre surgem vários problemas antes de concluir um grande objetivo."
84304200200-73 = "Não... nós vamos parar por aqui! Então deposite o que já fizemos! Agora!"
84304200200-74 = "Ora...?"
84304200200-75 = "Ora, ora? Que estranho... eu pensei que vocês ficariam felizes... que inesperado."
84304200200-76 = "O trabalho foi mais difícil do que o esperado... ou será que há algum outro fator?"
84304200200-77 = "Ou talvez..."
84304200200-79 = "...Vocês não querem cometer mais pecados na frente do inimigo... é isso?"
84304200200-80 = "Ah...!!"
84304200200-81 = "É mesmo?"
84304200200-82 = "Eu adoraria dizer que era só uma brincadeira... mas acertei em cheio, não é?"
84304200200-83 = "Sendo assim... vocês se lembram do conteúdo do contrato? É uma pena, mas se forem pegos no meio do caminho..."
84304200200-84 = "O contrato é rescindido por violação da cláusula de confidencialidade. Naturalmente, a recompensa não pode ser paga."
84304200200-85 = "O quê!? Ei! Você tem ideia do quanto a gente sofreu até agora...!!"
84304200200-86 = "É verdade, é muito lamentável, não é? Vocês não gostariam que isso acontecesse, certo?"
84304200200-87 = "Mas não se preocupem. Eu não sou um monstro, então vou dar a vocês mais uma chance!"
84304200200-88 = "Considerem isso como uma pequena retribuição pelo esforço que fizeram até agora."
84304200200-89 = "O que você quer que a gente faça agora...?"
84304200200-90 = "Mas... este pedido pode ser difícil."
84304200200-91 = "Porque, se a minha previsão estiver correta... quem está na frente de vocês é a Neru Mikamo da C&C, não é?"
84304200200-93 = "...!"
84304200200-94 = "Como você sabia?"
84304200200-95 = "Ahaha. Fazendo esse tipo de trabalho, é impossível não ouvir falar do seu nome, querendo ou não."
84304200200-96 = "Bem... ainda me surpreende que você tenha sido o braço direito da presidente Rio."
84304200200-97 = "……Hã?"
84304200200-98 = "Eu não me lembro de ter me tornado o braço direito daquela ali."
84304200200-99 = "Ah, é mesmo? Ah... então era apenas uma relação de cooperação, entendi."
84304200200-100 = "Ai, me desculpe. É que eu achei que vocês dois fossem próximos."
84304200200-101 = "Hmm... mas é verdade, né?"
84304200200-102 = "Ficar do lado da presidente... não existe ninguém tão excêntrico a ponto de fazer isso, né?"
84304200200-103 = "Eu não disse isso, sabia?"
84304200200-104 = "Bem, de qualquer forma. Na verdade, não estamos em condições de jogar conversa fora... aquelas pessoas ali são, tecnicamente, minhas parceiras de negócios."
84304200200-105 = "Somos aliados que uniram forças, afinal."
84304200200-106 = "Abandoná-los só porque foram capturados iria contra os meus princípios. Diferente de certas pessoas."
84304200200-110 = "Esse som..."
84304200200-111 = "Ué, esse bipe... o que é isso?"
84304200200-116 = "Droga... uma bomba!!"
84304200200-122 = "Cof, cof...!! Quando foi que...!!"
84304200200-123 = "Agora, corram!"
84304200200-128 = "Ei!! Acorda! Vamos fugir!"
84304200200-132 = "Hã!? U-uma explosão!?"
84304200200-133 = "Que susto...! Espera, eu desmaiei?"
84304200200-134 = "Não é hora para isso! Corra!!"
84304200200-139 = "Esses malditos... tão ágeis...!!"
84304200200-140 = "Ei, espere—"
