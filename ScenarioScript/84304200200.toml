[translation]
84304200200-5 = "んじゃ、ある程度情報はまとまったし……。"
84304200200-7 = "くっ……！"
84304200200-8 = "あんた、誰……？"
84304200200-9 = "何者――"
84304200200-17 = "ひぃっ！"
84304200200-19 = "ほんっとこういう奴らって似たようなことばっか言うよな。"
84304200200-20 = "それと、お前らに質問権は無い。質問するのは、あたしだ。勘違いすんなよ？"
84304200200-21 = "で、お前らの目的は？何でわざわざ他所の学園行事をぶち壊しに来た？"
84304200200-27 = "答えによっては――"
84304200200-32 = "わ、悪気はないんです！この学園に恨みがあるとかでもなくて……！"
84304200200-33 = "ただのバイト！バイトですから！！"
84304200200-35 = "……バイト？ "
84304200200-36 = "依頼主と、その内容は？"
84304200200-38 = "えっ……言えるわけないじゃないですか。さすがに秘密保持契約ってものが――"
84304200200-46 = "次、お前。"
84304200200-47 = "ひぃいっ！！"
84304200200-48 = "知りません！知らないんです！私たちにも分からないんです！"
84304200200-49 = "連絡をもらって、言われたことをやってただけで……！"
84304200200-55 = "あ、電話……。"
84304200200-56 = "……出ていいですか？"
84304200200-57 = "スピーカーでな。"
84304200200-64 = "もしもし、お疲れ様です。"
84304200200-65 = "どうです？上手くいってますか？"
84304200200-66 = "あっ、ああ。フィットネスセンターの方は片付いた。こっ、これで報酬を貰えるんだよな？"
84304200200-67 = "ええ。大変だったでしょう？お疲れ様でした！すぐに入金を……。"
84304200200-68 = "……そうだ！"
84304200200-69 = "もう一つ案件があるんです。こちらもお願いしても？"
84304200200-70 = "もちろん報酬は弾みますよ！"
84304200200-71 = "え、もう一つ……？なっ、何で？これで全部じゃなかったのか？"
84304200200-72 = "大事を成すまでには色んなトラブルがあるんですよねぇ。"
84304200200-73 = "いや……私たちはここまでにする！だから今までの分を入金してくれ！すぐ！"
84304200200-74 = "おや……？"
84304200200-75 = "おやおや？おかしいですねぇ……喜んでくださると思ったのですが……意外です。"
84304200200-76 = "思ったよりも仕事が大変だったか……それとも、何か他の要因が？"
84304200200-77 = "もしくは……"
84304200200-79 = "……敵の前で、これ以上罪は増やせない……とか？"
84304200200-80 = "えっ……！！"
84304200200-81 = "へえ？"
84304200200-82 = "な～んちゃって。とかって言えたら良かったのですが……図星なんですね？"
84304200200-83 = "であれば……契約の内容は覚えてますか？残念ですが、もし途中で捕まった場合には……。"
84304200200-84 = "秘密保持の条項に反するため契約は破棄。当然、報酬は支給できません。"
84304200200-85 = "なっ！？おい！私たちがこれまでどんだけ苦労したと思って……！！"
84304200200-86 = "そうなんです、とても残念ですよね……そんなの嫌ですよね？"
84304200200-87 = "でもご心配には及びません。私も鬼ではありませんので、もう一度だけ、チャンスを差し上げちゃいます！"
84304200200-88 = "皆さんが頑張ってくださった分への、僅かばかりのお返しとでも思っていただければ。"
84304200200-89 = "今度は何をさせようっての……？"
84304200200-90 = "でも……この依頼は難しいかもしれませんね。"
84304200200-91 = "だって、私の予想通りなら……皆さんの前にいるのはC&Cの[ruby=みかも]美甘[/ruby]ネルさん、ですよね？"
84304200200-93 = "……！"
84304200200-94 = "何故分かった？"
84304200200-95 = "あははっ。この仕事をしていると、あなたの名前は嫌でも耳に入って来ますから。"
84304200200-96 = "まあ……まだリオ会長の右腕をやっていたのは驚きでしたが。"
84304200200-97 = "……あ？"
84304200200-98 = "あたしはあいつの右腕になった覚えなんてねぇぞ。"
84304200200-99 = "あれ、そうなんですか？あー……じゃあただの協力関係だったんですね。"
84304200200-100 = "私ってば、ごめんなさい。お二人は仲良しだと思っていたので。"
84304200200-101 = "ん～……でも、そうですよね。"
84304200200-102 = "会長の味方をする……そんな奇特な方、いるわけないですもんね？"
84304200200-103 = "そうは言ってねぇけど？"
84304200200-104 = "まぁ、とはいえ。実はこんな雑談をしている場合ではなく……そこの人たち、一応私のビジネスパートナーなんですよね。"
84304200200-105 = "手を組んだ仲間ですし？"
84304200200-106 = "一度捕まったからと見捨ててしまうのは、私の信条に反しますから。誰かさんとは違って。"
84304200200-110 = "この音……。"
84304200200-111 = "あれ、ピッピッって……何だこれ？"
84304200200-116 = "チッ……爆弾か！！"
84304200200-122 = "げほっ、げほっ……！！いつの間に……！！"
84304200200-123 = "今です、逃げて下さい！"
84304200200-128 = "おい！！起きろ！逃げるぞ！"
84304200200-132 = "ふえっ！？ばっ、爆発！？"
84304200200-133 = "ビックリしたぁ……！って、あれ、私気絶してた？"
84304200200-134 = "そんなこと言ってる場合じゃないから！走れ！！"
84304200200-139 = "こいつら……ちょこまかと……！！"
84304200200-140 = "おい、待て――"
