[translation]
1301302-1 = "本を探す旅路"
1301302-2 = "図書館内部"
1301302-4 = "伝説の同人誌を探したいんです！"
1301302-5 = "[s1] \"すごいやる気だね……！\"\n[s2] \"ま、まずは話を聞かせてもらえる？\""
1301302-8 = "あっ、す、すみません！気持ちが先走ってしまって、つい……"
1301302-9 = "……以前、レッドウィンター連邦学園のどこかに、知識解放戦線の卒業生が作った伝説の同人誌が眠っているという情報を耳にしたんです。"
1301302-10 = "伝説の同人誌……なんだかその響きだけでワクワクしませんか！？"
1301302-11 = "きっとその本には知識解放戦線の歴史と伝統すべてが……"
1301302-12 = "それさえあれば、知識解放戦線が直面している問題を解決できるに違いありません！"
1301302-13 = "[s] \"そ、そんなにすごい物なの……？\""
1301302-19 = "さあ、先生！早く伝説の同人誌を探しに行きましょう！"
1301302-20 = "本はとても繊細なんです！こうしている間にも、湿気に[ruby=さら]晒[/ruby]されていたり、何かの下敷きになってダメージを受けているかもしれません！"
1301302-21 = "どうやって探すのか、ですか？#nそれはお任せください！ちゃんと方法がありますから！"
1301302-36 = "[ns] \"えっと……モミジ、ここは？\""
1301302-41 = "どうかしました？"
1301302-42 = "同人誌を探すんじゃなかったのかって……？#nはい、今まさに探しているところです！"
1301302-43 = "何か問題でもありましたか？"
1301302-44 = "[s] \"ここじゃ見つからないような……\""
1301302-45 = "ですが、ロッドはこちらを指しています。"
1301302-46 = "「ダウジング」は古代から行われている伝統的な手法なんですよ？"
1301302-47 = "もとは水脈を発見するために使われていたものですけど……"
1301302-48 = "同じ原理で、落とし物の発見にも応用されるようになりました！"
1301302-49 = "しっー、見てください。今ロッドが強い反応を……"
1301302-53 = "このまま進んでみましょう……"
1301302-57 = "ふむ……ふむふむ……"
1301302-61 = "わっ！先生！ここから強い反応が！"
1301302-62 = "あとはもう、私のRPGで爆破させれば……！"
1301302-63 = "[ns] \"同人誌までバラバラになっちゃうよ！\""
1301302-68 = "た、たしかにそうですね……じゃあ、一体どうすれば……？"
1301302-69 = "まずは地面を掘ってみて……？#nレッドウィンターの雪原は硬いので、スコップで掘るのは少し……"
1301302-70 = "……分かりました。先生がそう仰るなら。"
1301302-77 = "うぅ……もう1メートル以上掘ってるのに、何も見つかりません……"
1301302-78 = "私の実力不足でしょうか……？"
1301302-79 = "[s] \"実力はあんまり関係ないと思うよ……\""
1301302-80 = "うう……次は別の方法を試してみても良いですか？"
1301302-84 = "……んっと……今度はペンデュラムです！"
1301302-85 = "今は小さく揺れてるこの振り子が……"
1301302-86 = "探し物に近づくほど、大きな円を描いて揺れるはずです！"
1301302-88 = "次は磁気センサーで探してみましょう！"
1301302-89 = "アプリをダウンロードして、スマホの内蔵センサーを使えば……！"
1301302-91 = "地脈探知機！"
1301302-93 = "タロットカード……！"
1301302-95 = "占星術……"
1301302-97 = "うわああぁぁん……"
1301302-98 = "[s] \"モ、モミジ……泣かないで……\""
1301302-99 = "……うう……伝説の同人誌が見つかりません……"
1301302-100 = "[s] \"そんなに重要な情報が書いてあるの？\""
1301302-101 = "……。"
1301302-102 = "本当は……大したものではないのかもしれません。"
1301302-103 = "こうして先生に手伝っていただいているというのに、申し訳ないのですが……"
1301302-104 = "それでも私は、知識解放戦線の歴史が知りたいんです。"
1301302-105 = "今まで、見たことのないような絵や漫画、資料がそこに眠っているかもしれない……"
1301302-109 = "そう考えると……ここで諦めたくないんです。"
1301302-110 = "ただ……私のワガママで時間を奪ってしまい申し訳なくて……"
1301302-111 = "……私は大丈夫ですから、もう今日はお帰りになってください。"
1301302-112 = "たくさん迷惑をかけてしまって……ごめんなさい。"
1301302-113 = "今日は、ありがとうございました。"
1301302-114 = "[s] \"ん～、次はどこを探そっか？\""
1301302-115 = "えっ、えっ？#nそもそも先生は付き合ってくれてただけなのに……"
1301302-116 = "……まだ一緒に、探してくださるんですか？"
1301302-117 = "……。"
1301302-118 = "あ、ありがとうございます……先生！心よりお礼申し上げます！#nそれから……ごめんなさい……"
1301302-122 = "感動的なシーンの後は、目標を達成できるのがお約束のはずなのに……"
1301302-123 = "これが、漫画だったら今頃は……"
1301302-124 = "うぅ……現実は甘くないですね……"
1301302-125 = "[s3] \"もしかしたら、知識解放戦線の同人誌は……\"\n[s4] \"私たちの心の中にあるのかもしれないね。\""
1301302-128 = "打ち切り漫画の最終回にありそうなセリフですね……"
1301302-132 = "……待ってください、先生。#n心の中……心の中……"
1301302-136 = "もしかして……！"
1301302-137 = "[s] \"どうしたの？\""
1301302-138 = "ついてきてください、先生！"
1301302-140 = "図書館の一番奥……物置として使われている部屋……"
1301302-141 = "誰も探そうとすらしなかった……ここなら……！？"
1301302-142 = "……！"
1301302-146 = "見つけました、先生！知識解放戦線の同人誌です！"
1301302-147 = "[s5] \"こんなところにあったなんて……！\"\n[s6] \"良かったね、モミジ！\""
1301302-150 = "えへへ……本当に……嬉しいです……！全部、先生のおかげです。"
1301302-151 = "はい？先生は、ちょっとした冗談のつもりで……？"
1301302-152 = "いえ、そんな……先生の言葉があったから、この場所を思いつけましたし……"
1301302-153 = "それに……今日一日中、私と一緒にいてくださったじゃないですか。"
1301302-154 = "え、えっと……あ！同人誌の内容！#n先生も気になりますよね？"
1301302-160 = "……。"
1301302-161 = "ふふ……なんか、拍子抜けしますね。"
1301302-162 = "線が荒いですし、本としては中途半端で……"
1301302-163 = "……でも、「描きたい」という想いだけは、真っ直ぐに伝わってくる……"
1301302-164 = "初めてコミセンに参加した頃を思い出す、そんな同人誌ですね。"
1301302-165 = "いいえ、がっかりなんてしていません。"
1301302-166 = "これも知識解放戦線の大切な歴史ですから。"
1301302-167 = "もちろん、これが私たちの抱える問題を解決してくれるわけではないですが……"
1301302-168 = "……勇気をもらいました。#n昔の先輩方も、同じ想いで作品を作っていたんだなぁって実感が湧きましたから。"
1301302-173 = "えへへ、先生！"
1301302-179 = "今日は本当に、ありがとうございました！"
