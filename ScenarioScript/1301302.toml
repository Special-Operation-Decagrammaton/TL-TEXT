[translation]
1301302-1 = "A jornada em busca do livro"
1301302-2 = "Interior da biblioteca"
1301302-4 = "Eu quero encontrar o doujinshi lendário!"
1301302-5 = "[s1] \"Que entusiasmo incrível...!\"\n[s2] \"B-bem, primeiro pode me contar a história?\""
1301302-8 = "Ah, d-desculpe! Eu me empolguei e acabei..."
1301302-9 = "…Ouvi dizer que em algum lugar da Academia Federal Red Winter, existe um doujinshi lendário feito por um graduado da Frente de Libertação do Conhecimento."
1301302-10 = "Um doujinshi lendário... Só de ouvir esse nome, você não fica empolgado!?"
1301302-11 = "Tenho certeza de que esse livro contém toda a história e tradição da Frente de Libertação do Conhecimento..."
1301302-12 = "Com ele, com certeza seremos capazes de resolver os problemas que a Frente de Libertação do Conhecimento está enfrentando!"
1301302-13 = "[s] \"É, é algo tão incrível assim...?\""
1301302-19 = "Vamos, Sensei! Vamos logo procurar o doujinshi lendário!"
1301302-20 = "Livros são muito delicados! Enquanto estamos aqui parados, ele pode estar exposto à umidade ou sendo esmagado por alguma coisa e sofrendo danos!"
1301302-21 = "Como vamos procurar, você pergunta?#nDeixe isso comigo! Eu tenho um método!"
1301302-36 = "[ns] \"Ei... Momiji, o que estamos fazendo aqui?\""
1301302-41 = "Aconteceu alguma coisa?"
1301302-42 = "Você está perguntando se não era para estarmos procurando o doujinshi...?#nSim, é exatamente isso que estamos fazendo agora!"
1301302-43 = "Houve algum problema?"
1301302-44 = "[s] \"Não acho que vamos encontrar aqui...\""
1301302-45 = "Mas a vara está apontando para cá."
1301302-46 = "A \"radiestesia\" é um método tradicional usado desde a antiguidade, sabia?"
1301302-47 = "Originalmente era usada para encontrar veios de água, mas..."
1301302-48 = "Pelo mesmo princípio, passou a ser aplicada para encontrar objetos perdidos!"
1301302-49 = "Psiu, olhe só. A vara está tendo uma reação forte agora..."
1301302-53 = "Vamos continuar seguindo por aqui..."
1301302-57 = "Hmm... hum, hum..."
1301302-61 = "Uau! Sensei! Uma reação forte vindo daqui!"
1301302-62 = "Agora é só explodir com o meu RPG e...!"
1301302-63 = "[ns] \"O doujinshi vai acabar sendo destruído também!\""
1301302-68 = "É, v-você tem razão... Então, o que devemos fazer...?"
1301302-69 = "Primeiro tentar cavar o chão...?#nO campo de neve de Red Winter é duro, então cavar com uma pá é um pouco..."
1301302-70 = "…Entendido. Se o Sensei diz, então farei isso."
1301302-77 = "Ugh... já cavamos mais de um metro e não encontramos nada..."
1301302-78 = "Será que não sou boa o suficiente...?"
1301302-79 = "[s] \"Acho que não tem muito a ver com habilidade...\""
1301302-80 = "Uuu... posso tentar outro método agora?"
1301302-84 = "…Hmm... agora é a vez do pêndulo!"
1301302-85 = "Este pêndulo que está balançando pouco agora..."
1301302-86 = "Deveria começar a balançar em círculos maiores conforme nos aproximamos do objeto!"
1301302-88 = "Vamos tentar procurar com um sensor magnético!"
1301302-89 = "Se baixarmos um aplicativo e usarmos o sensor embutido do celular...!"
1301302-91 = "Detector de veios terrestres!"
1301302-93 = "Cartas de tarô...!"
1301302-95 = "Astrologia..."
1301302-97 = "Waaaaaah..."
1301302-98 = "[s] \"M-Momiji... não chore...\""
1301302-99 = "…Uuu... não consigo encontrar o doujinshi lendário..."
1301302-100 = "[s] \"Será que tem informações tão importantes assim escritas nele?\""
1301302-101 = "…."
1301302-102 = "Na verdade... talvez não seja nada demais."
1301302-103 = "Sinto muito por pedir sua ajuda, Sensei, mesmo sendo algo assim..."
1301302-104 = "Ainda assim, eu quero conhecer a história da Frente de Libertação do Conhecimento."
1301302-105 = "Talvez desenhos, mangás e documentos que ninguém nunca viu estejam adormecidos ali..."
1301302-109 = "Pensando nisso... eu não quero desistir aqui."
1301302-110 = "Só que... sinto muito por tomar o seu tempo com o meu egoísmo..."
1301302-111 = "...Eu ficarei bem, então, por favor, pode ir para casa hoje."
1301302-112 = "Sinto muito por ter causado tantos problemas..."
1301302-113 = "Muito obrigada por hoje."
1301302-114 = "[s] \"Hmm, onde devemos procurar agora?\""
1301302-115 = "Hã, o quê?#nO Sensei só estava me acompanhando, afinal..."
1301302-116 = "...Você ainda vai continuar procurando comigo?"
1301302-117 = "..."
1301302-118 = "M-muito obrigada... Sensei! Agradeço do fundo do meu coração!#nE também... me desculpe..."
1301302-122 = "Depois de uma cena emocionante, o esperado seria alcançar o objetivo..."
1301302-123 = "Se isso fosse um mangá, agora eu estaria..."
1301302-124 = "Uuu... a realidade não é tão gentil, não é..."
1301302-125 = "[s3] \"Talvez o fanzine da Frente de Libertação do Conhecimento...\"\n[s4] \"esteja dentro dos nossos corações.\""
1301302-128 = "Essa é uma fala que apareceria no último capítulo de um mangá cancelado..."
1301302-132 = "...Espere, Sensei.#nDentro do coração... dentro do coração..."
1301302-136 = "Será que...!"
1301302-137 = "[s] \"O que foi?\""
1301302-138 = "Venha comigo, Sensei!"
1301302-140 = "No fundo da biblioteca... na sala usada como depósito..."
1301302-141 = "Ninguém nem tentou procurar lá... se for aqui...!?"
1301302-142 = "...!"
1301302-146 = "Eu encontrei, Sensei! É o fanzine da Frente de Libertação do Conhecimento!"
1301302-147 = "[s5] \"Quem diria que estava em um lugar desses...!\"\n[s6] \"Que bom, Momiji!\""
1301302-150 = "Hehehe... estou realmente... muito feliz...! Tudo graças ao Sensei."
1301302-151 = "Sim? O Sensei disse isso apenas como uma pequena brincadeira...?"
1301302-152 = "Não, que isso... foi por causa das suas palavras que eu consegui pensar neste lugar..."
1301302-153 = "Além disso... você ficou comigo o dia inteiro hoje, não ficou?"
1301302-154 = "Ah, bem... ah! O conteúdo do fanzine!#nO Sensei também está curioso, não está?"
1301302-160 = "..."
1301302-161 = "Fufu... é um pouco decepcionante, não é?"
1301302-162 = "O traço é bruto e, como livro, é incompleto..."
1301302-163 = "...Mas o desejo de \"querer desenhar\" é transmitido de forma direta..."
1301302-164 = "É um fanzine que me faz lembrar de quando participei do ComiSen pela primeira vez."
1301302-165 = "Não, eu não estou desapontada."
1301302-166 = "Esta também é uma parte importante da história da Frente de Libertação do Conhecimento."
1301302-167 = "Claro, isso não resolve os problemas que estamos enfrentando, mas..."
1301302-168 = "...Eu ganhei coragem.#nSenti de verdade que os veteranos de antigamente criavam suas obras com o mesmo sentimento."
1301302-173 = "Hehehe, Sensei!"
1301302-179 = "Muito obrigada por hoje!"
