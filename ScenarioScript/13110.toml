[translation]
13110-1 = "Episódio 11; O Segredo Revelado"
13110-8 = "Por favor, sente-se aqui."
13110-9 = "Obrigada... Então esta é a sala do Comitê de Contramedidas. #nNão imaginei que viria aqui desta forma..."
13110-14 = "Como mencionei ontem, o Supervisor Suou aqui presente é um representante da Nefthys. #nEle também serviu como meu guarda-costas hoje."
13110-15 = "……É o que ele diz."
13110-19 = "Faz dois anos desde a última vez que nos vimos pessoalmente. #nComo você tem passado?"
13110-20 = "……Sim, estou bem, obrigada."
13110-21 = "Fico feliz em ouvir isso. ...Como mencionei por telefone, trouxe um novo cartão com um limite maior para você."
13110-22 = "……N-não. Não precisa. #nNão estou passando por nenhuma dificuldade..."
13110-23 = "……Senhorita, você não pretende voltar, nem que seja agora?"
13110-24 = "Voltar, você diz...?"
13110-25 = "Claro, para a Academia Ferroviária Highlander."
13110-26 = "Isso é..."
13110-28 = "A Nonomi-chan está desconfortável, sabe."
13110-29 = "Hum, vá direto ao ponto."
13110-31 = "……Sim, peço desculpas."
13110-32 = "Não vejo problema nisso."
13110-33 = "Originalmente, a Nefthys deveria ter estabelecido uma relação de cooperação com a Highlander. #nNo entanto, por causa da filha deles ter ido para Abydos, o acordo quase fracassou."
13110-35 = "……."
13110-36 = "Você não tem consciência de que está sendo extremamente desrespeitosa com quem atendeu aos seus caprichos?"
13110-42 = "Contenha-se, Senpai Shiroko!"
13110-43 = "Hum... Não pretendo fazer nada, na verdade."
13110-45 = "Se quiser tentar, pode vir. #n――Isso se você acha que pode vencer."
13110-46 = "……Sr. Suou, por favor, não provoque tanto."
13110-47 = "……Hmph."
13110-51 = "……Fique tranquila. #nNão vim aqui para levá-la de volta à força."
13110-53 = "Poderia ir direto ao assunto logo?"
13110-54 = "Bem, é que..."
13110-56 = "……."
13110-57 = "……."
13110-62 = "Para ser direta, por trás da 'Ferrovia Trans-Deserto'..."
13110-63 = "Havia um projeto de 'Arma de Combate Assimétrico' que o Conselho Estudantil de Abydos e a Nefthys estavam desenvolvendo em segredo."
13110-69 = "……O quê!?"
13110-70 = "O Conselho Estudantil...?"
13110-72 = "Arma de combate assimétrico?"
13110-73 = "O que é isso...?"
13110-75 = "O nome dela é..."
13110-76 = "――'Trem Blindado Schemata'."
13110-82 = "O poder destrutivo e o alcance do Schemata não podem ser comparados aos padrões convencionais. #nTrem blindado... não, seria melhor chamá-lo de arma de fortaleza."
13110-83 = "Um canhão de ultra longo alcance capaz de disparar bombas de mais de 1 tonelada a 500 km de distância."
13110-84 = "O plano é que tal coisa circule pelas linhas ferroviárias."
13110-85 = "Até eu, que estou falando sobre isso, mal consigo acreditar que seja possível realizar."
13110-86 = "Mas... se for concluído, #nserá um poder de dissuasão avassalador contra os distritos vizinhos."
13110-89 = "……Uma arma dessas, hein."
13110-94 = "M-mas por que diabos...!?"
13110-95 = "Não é óbvio?"
13110-96 = "Para pagar as dívidas, suponho."
13110-97 = "……?"
13110-98 = "Existem inúmeras formas de usar uma arma poderosa como essa, afinal."
13110-100 = "I-isso não pode ser..."
13110-101 = "“Schemata”... por acaso a origem desse nome é aquela presidente do conselho estudantil?"
13110-103 = "Você conhece bem. #n... Schemata, a do governo de punho de ferro."
13110-105 = "...Schemata?"
13110-106 = "É o apelido da lendária presidente do conselho estudantil que governou durante o período caótico em que 70 presidentes existiam simultaneamente e liderou o auge de Abydos."
13110-107 = "70 pessoas? Não faz o menor sentido..."
13110-109 = "...Até eu, que não sou de Abydos, sei disso."
13110-110 = "Dizem que o auge de Abydos ostentava um poder militar e financeiro avassalador, sendo temido e invejado por todos os distritos autônomos."
13110-111 = "Pensando por esse lado, o nome dado ao canhão ferroviário é interessante."
13110-112 = "Será que pensaram que, se tivessem uma arma poderosa, poderiam pagar as dívidas?"
13110-114 = "...Hoshino-senpai."
13110-115 = "Quer dizer que... a Ferrovia Trans-Deserto foi construída para esconder a Schemata?"
13110-120 = "Senhorita, isso não é verdade. #nO projeto de arma de força assimétrica só surgiu depois que o negócio ferroviário começou a operar."
13110-121 = "Provavelmente, alguém deu essa ideia ao conselho estudantil de Abydos."
13110-122 = "Quem faria uma coisa dessas...!"
13110-123 = "Até aí, eu também não sei... #nAfinal, tudo foi feito em segredo, sem explicações detalhadas..."
13110-125 = "Ouça com calma, senhorita. #nEste projeto já faliu."
13110-126 = "Sim, exatamente."
13110-127 = "Uma arma de cerco tão absurda quanto a Schemata não teria como funcionar normalmente."
13110-128 = "No fim, o motor nunca chegou a funcionar. #nAté hoje, ela permanece inacabada e abandonada em algum lugar do deserto de Abydos."
13110-129 = "E então, o projeto foi cancelado—"
13110-130 = "...Ou era o que se pensava. #nAté pouco tempo atrás."
13110-136 = "Recentemente, ao realizar novas simulações, a viabilidade da Schemata mostrou-se extremamente alta."
13110-137 = "Se o projetista planejou isso prevendo anos à frente, ou se foi apenas uma coincidência, só ele poderia saber..."
13110-139 = "De qualquer forma, a importância da Ferrovia Trans-Deserto aumentou drasticamente."
13110-140 = "Uma existência que, só por ser possuída, serve como dissuasão. Uma tecnologia inovadora que estava à frente de seu tempo."
13110-141 = "Com esses fatos revelados, não há como não agir."
13110-142 = "É exatamente por isso que o “Fundo Privado” está obcecado pelos direitos da Ferrovia Trans-Deserto."
13110-146 = "Porque, se conseguirem os direitos da ferrovia, também poderão obter o canhão ferroviário."
13110-147 = "Claro, o Fundo Privado também não deve ser um bloco unido."
13110-150 = "E como eles não conseguiram arrecadar sozinhos o dinheiro para comprar os títulos da dívida, pediram ajuda à Nephthys..."
13110-151 = "Nós também queríamos preservar a Ferrovia Trans-Deserto, então acabamos nos unindo a eles sem saber da reativação do projeto de arma de força assimétrica."
13110-154 = "..."
13110-155 = "Quando soubemos de toda a extensão do projeto, já não havia como sair do Fundo Privado..."
13110-156 = "Não podemos deixar que eles fiquem com os direitos do canhão ferroviário."
13110-157 = "É verdade. #nSe uma arma dessas cair nas mãos de vilões, certamente será motivo de conflito."
13110-159 = "Vamos encontrá-la primeiro e destruí-la."
13110-160 = "Mordomo, você sabe onde o canhão ferroviário está?"
13110-162 = "Não... peço perdão. #nNós também não fazemos a menor ideia."
13110-163 = "Este projeto em si era ultrassecreto. #nOs documentos da época não foram encontrados..."
13110-168 = "Entendi..."
13110-169 = "Pensando bem agora, o motivo de o Fundo Privado ter se aproximado de nós era provavelmente para descobrir a localização do canhão ferroviário."
13110-170 = "Eles não conseguiram o que queriam, mas, de qualquer forma, é uma questão de tempo."
13110-171 = "O Centro de Controle Central não deve saber da existência do canhão nem deste projeto. #nNo entanto, se as obras forem retomadas, eles acabarão descobrindo em breve."
13110-172 = "...O Fundo Privado está tentando obter os direitos do canhão ferroviário por meio de um contrato formal."
13110-173 = "Um contrato formal, é...?"
13110-174 = "Sim. #nEles perguntaram várias vezes sobre as questões de direitos."
13110-175 = "Na verdade, a situação é complexa, pois não apenas o conselho estudantil de Abydos e a Nephthys, mas também o projetista detém parte dos direitos..."
13110-176 = "Como empresários, eles devem ser competentes. #nSe esclarecerem as questões de direitos, poderão evitar problemas futuros."
13110-177 = "...A Kaiser não sabia da existência do canhão ferroviário?"
13110-178 = "Quem sabe. Mesmo que soubessem, acho que o interesse deles é baixo. Ouvi dizer que o Presidente da Kaiser está mais interessado na Torre Sanctum."
13110-179 = "Se for para ser levada por rumores de veracidade duvidosa, imagino que ela tenha decidido que seria melhor vender os títulos de dívida para arrecadar fundos... #n"
13110-183 = "……No entanto, ocorreu uma situação que ninguém poderia prever."
13110-187 = "Um contrato firmado entre a presidente do conselho estudantil de Abydos e a Nephthys foi descoberto."
13110-189 = "Não sei os detalhes de como isso aconteceu, mas... #ncontanto que isso exista, os direitos do canhão ferroviário não pertencerão ao fundo de investimento privado."
13110-190 = "A Nephthys realmente não sabe de nada sobre esse contrato?"
13110-191 = "E também, sobre o que aconteceu com a veterana Yume...!"
13110-193 = "……Veterana Hoshino."
13110-198 = "……Sinto muito. #nNós também não sabíamos da existência desse contrato..."
13110-199 = "……."
13110-200 = "Considerando a situação da época, #nprovavelmente ela queria dinheiro vivo, mesmo que pouco, para evitar a falência."
13110-201 = "Acho que um dos direitos vendidos nesse processo foi apenas a ferrovia transdesértica."
13110-202 = "……."
13110-203 = "De qualquer forma, o fundo de investimento privado tentará resolver o problema do contrato primeiro."
13110-204 = "Para eles, essa deve ser a prioridade máxima."
13110-209 = "……A assembleia geral será realizada amanhã, às 12 horas, no antigo prédio da estação central de Abydos, certo?"
13110-210 = "Sim, exatamente."
13110-211 = "Se o representante do conselho estudantil rescindir o contrato na assembleia, ou #nse estiver ausente, o contrato será invalidado. #nE então, os direitos passarão para a Nephthys."
13110-215 = "Isso significa que...!?"
13110-216 = "……Não, senhorita. #nA Nephthys não obterá os direitos completamente."
13110-217 = "Como compraram os títulos de dívida em conjunto, cada parte terá sua parcela de participação."
13110-222 = "……Então só resta uma solução."
13110-228 = "Eu participarei da assembleia e declararei a intenção de manter o contrato."
13110-229 = "……Se puder fazer isso, ficarei grata."
13110-230 = "Teremos que pagar o dinheiro aos poucos, mas #npelo menos ficarei tranquila se eles não puderem colocar as mãos nele."
13110-231 = "Enquanto isso, é só procurar por todo o deserto e encontrar o canhão ferroviário, não é?"
13110-233 = "Nossa, é mais fácil do que eu pensava, que alívio."
13110-234 = "Isso é..."
13110-236 = "Será mesmo?"
13110-241 = "O fundo de investimento privado certamente vai impedir a presença de vocês."
13110-242 = "Não pode ser, isso é..."
13110-243 = "Acho que dá para entender se pensar um pouco, não? #nEles devem bloquear o antigo prédio com centenas de soldados para impedir que vocês entrem."
13110-244 = "……Não pode ser!"
13110-249 = "Eles já devem estar agindo. #n……Usando todos os meios possíveis."
13110-251 = "Região leste do antigo prédio da estação central"
13110-256 = "……Deixei aquela área sob responsabilidade de vocês."
13110-258 = "Vamos lá, hora de trabalhar!!"
13110-264 = "Praça oeste do antigo prédio da estação central"
13110-270 = "Muito bem, o helicóptero também chegou."
13110-271 = "Tanques, defendam o ponto designado a todo custo. #nGuardas do mercado, protejam a área bloqueada rigorosamente. #nNão deixem passar nem um rato."
13110-276 = "Praça sul do antigo prédio da estação central"
13110-278 = "……Vocês já estão cientes do plano, não estão?"
13110-280 = "Sim, vamos trabalhar pelo valor que recebemos."
13110-286 = "O canhão ferroviário... é o legado deixado pelo Imperador do Trovão de Gehenna, afinal. #nHehe, com certeza vamos colocá-lo em nossas mãos."
13110-288 = "Praça norte do antigo prédio da estação central"
13110-293 = "Empilhem as barricadas aqui."
13110-297 = "Escavadeiras, tratores, empilhadeiras... #ntraiam tudo o que puderem mobilizar."
13110-307 = "……Se não chegarem até as 12 horas de amanhã, o canhão ferroviário será nosso."
13110-308 = "Fufufu... façam o melhor que puderem."
13110-310 = "Hã!?"
13110-311 = "……Entendi."
13110-312 = "Hum..."
13110-313 = "Diante de uma escala dessas, nós..."
13110-315 = "Se, se o Sensei estiver aqui, não dá para dar um jeito?"
13110-316 = "O Sensei do 'Schale', com que justificativa nobre ele interviria em uma transação privada?"
13110-320 = "A culpa é daqueles que estão nos atrapalhando, então o que há de errado em receber a ajuda do Sensei!"
13110-322 = "...Serika-chan, pense bem."
13110-324 = "O que você quer dizer?"
13110-325 = "O local onde a assembleia geral será realizada é o antigo prédio da estação central. Aquele é o ponto central onde várias linhas da ferrovia transdesértica se cruzam."
13110-326 = "Como os direitos da ferrovia já pertencem ao fundo de investimento privado..."
13110-327 = "Eles estão apenas protegendo o local que possuem."
13110-328 = "U-uma desculpa dessas é aceitável!?"
13110-334 = "A propósito, quem comparecerá à assembleia geral é... o Comitê de Contramedidas de vocês?"
13110-336 = "...?"
13110-337 = "Iremos todas."
13110-342 = "Eu me expressei mal."
13110-343 = "A questão é: vocês comparecerão como o 'Grêmio Estudantil de Abydos' ou como o 'Comitê de Contramedidas'?"
13110-344 = "I-isso é..."
13110-345 = "No contrato assinado por Kuchinashi Yume, o titular é o Grêmio Estudantil de Abydos. No entanto, hoje em dia, só resta o nome, não é?"
13110-346 = "Sendo assim, não seria necessário primeiro esclarecer a posição do Grêmio Estudantil?"
13110-347 = "Embora, se não conseguirem chegar ao local da assembleia, discutir isso seja inútil."
13110-348 = "..."
13110-350 = "...Vamos forçar a passagem."
13110-351 = "Por isso, estamos em apuros justamente porque isso é difícil."
13110-353 = "Precisamos dar um jeito de encontrar outro método..."
13110-355 = "...Se for um método, existe um, senhorita."
13110-363 = "E é um método muito mais simples do que vocês lutarem de frente. Basta que a senhorita se matricule na Highlander e se torne a presidente do grêmio estudantil."
13110-364 = "...Hein!?"
13110-370 = "Se exercer autoridade como executiva da 'Nephthys', poderá cancelar este contrato."
13110-371 = "Nephthys, Highlander, fundo de investimento privado... Se duas das três forças se opuserem, o fundo de investimento privado restante não poderá fazer nada."
13110-372 = "...Ma-mas."
13110-373 = "Se eu fizer isso, terei que sair de Abydos..."
13110-375 = "Rejeitado."
13110-376 = "O que você está dizendo? Não há necessidade da Nonomi-senpai se sacrificar!"
13110-381 = "...Mordomo. Eu recuso esse método."
13110-382 = "Eu não quero deixar Abydos!"
13110-383 = "...Eu imaginava que diria isso."
13110-384 = "Portanto, proponho um terceiro método. Provavelmente, é impossível, mas..."
13110-388 = "...Um terceiro método?"
13110-389 = "É um pouco radical, mas..."
13110-390 = "Não importa, por favor, me conte!"
13110-394 = "Sim, o método é..."
13110-395 = "...Basta tornar nulo o próprio contrato de compra e venda da ferrovia transdesértica."
13110-396 = "...?"
13110-397 = "E se o 'Grêmio Estudantil de Abydos', que assinou o contrato, não tivesse autoridade como grêmio estudantil...?"
13110-398 = "...!?"
13110-404 = "Declarem que o 'Grêmio Estudantil de Abydos', composto por Kuchinashi Yume e Takanashi Hoshino, era uma organização não reconhecida."
13110-405 = "O-o que você está dizendo..."
13110-406 = "A ex-presidente do grêmio estudantil forçou o cargo de presidente em Kuchinashi Yume através de uma votação de braço levantado, não foi? Ou seja, não é impossível negar a legitimidade disso."
13110-407 = "Vocês devem comparecer à assembleia geral e revelar esse fato."
13110-408 = "Assim, o contrato em si deixará de existir..."
13110-409 = "Como os direitos da Ferrovia Trans-Deserto passarão a ser da nossa Nephthys, o fundo de investimento privado não poderá mais interferir."
13110-410 = "Do que você está falando!?#nUm método desses...!"
13110-411 = "...Por isso eu disse que era impossível."
13110-412 = "..."
13110-413 = "...De qualquer forma, eu revelei o segredo da Ferrovia Trans-Deserto, mas parece que não há uma solução clara, não é?"
13110-417 = "――O prazo é amanhã, às 12 horas."
13110-418 = "Da minha parte, entrarei em contato caso surja uma boa solução."
13110-419 = "Espero vê-los na assembleia de amanhã."
13110-420 = "Então, com licença."
13110-429 = "Hmm."
13110-430 = "Hum."
13110-435 = "..."
13110-440 = "Pessoal, não fiquem aí paradas, vamos começar a reunião."
13110-441 = "Hoshino-senpai..."
13110-442 = "A titia aqui está bem, Nonomi-chan."
13110-443 = "Mais importante, precisamos pensar em uma solução."
13110-445 = "Sim, se pensarmos juntas, deve dar certo."
13110-447 = "Sim..."
13110-448 = "Nossa, a Shiroko-chan é sempre tão positiva, isso é bom."
13110-450 = "...Hum."
13110-452 = "Por que está ficando envergonhada, Shiroko-senpai?"
13110-453 = "Ahaha..."
13110-457 = "Vocês devem estar cansadas, vamos descansar um pouco antes de continuar."
13110-459 = "Próximo episódio: O início do Comitê de Contramedidas"
