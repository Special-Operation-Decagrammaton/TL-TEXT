[translation]
51230-1 = "Episódio 23; Palavras Falsas"
51230-7 = "Sensei...! Ali...!"
51230-10 = "[ns] \"Yukari!?\""
51230-20 = "[ns] \"Ugh... tem monstros aqui também!\""
51230-23 = "Finalmente chegaram até aqui, não é? #n Sensei da Schale... Nagusa-chan."
51230-25 = "Shuro..."
51230-26 = "[s] \"Shuro, acabou por aqui.\""
51230-30 = "Devolva a Yukari."
51230-35 = "Hah...!"
51230-36 = "Aha..."
51230-37 = "Ahahahahahahah!!"
51230-41 = "Vocês são tão irritantes!"
51230-47 = "Falando nisso, ouvi um boato sobre vocês."
51230-48 = "Que o Sensei da Schale resolve qualquer coisa――"
51230-49 = "Que se mete em tudo o que acontece em [ruby=Kivotos]Kivotos[/ruby]―― que você é o maior idiota de todos."
51230-50 = "Então foi por causa desse senso de justiça... que você veio até aqui?"
51230-51 = "A minha 'Hyakumonogatari'... já estava quase terminada, sabe?"
51230-52 = "Mas mesmo assim? Você vem aqui e atrapalha...? #n Sério, eu estou realmente, mui~to! De verdade, morrendo de rir!"
51230-53 = "Tudo bem quanto ao Sensei da Schale, mas..."
51230-57 = "Nagusa-chan, [ruby=você]especialmente você[/ruby]."
51230-59 = "......!!"
51230-61 = "Não me diga, não me diga, que dentre todas as pessoas, [ruby=você]você[/ruby] veio dizer 'devolva a Yukari'...?"
51230-62 = "Isso quer dizer que você veio achando que podia salvar a Miko-sama? #n Hein, me diga, Nagusa-chan?"
51230-63 = "Como você tem a coragem de dizer uma coisa dessas..."
51230-64 = "Será que foram os seus amigos que te empurraram? #n Que te incentivaram dizendo que você era a única que podia salvar a Miko-sama?"
51230-66 = "Que estranho... será que eles não sabem?"
51230-67 = "Nagusa-chan, [ruby=você]você[/ruby] nem conseguiu salvar a Ayame, não é?"
51230-72 = "Ah... não me diga, não me diga, você ainda está escondendo isso de todos?"
51230-73 = "A verdade sobre o que aconteceu no campo de neve――"
51230-74 = "[s] \"Nagusa, não precisa dar ouvidos a ela.\""
51230-75 = "Não, não, ela precisa sim? #n O Sensei também deveria ouvir, não deveria?"
51230-76 = "A Nagusa-chan, que veio correndo para cá com uma cara de 'Vou salvar a minha kouhai!', ao seu lado..."
51230-77 = "É uma mentirosa que na verdade não tem nem a força, nem a vontade de salvá-la... não acha melhor saber disso?"
51230-83 = "Eu ainda me lembro, sabia? Nagusa-chan."
51230-85 = "Aquele dia em que você tentou salvar a Ayame e falhou――"
51230-86 = "Você nem sequer conseguiu tocar na Ayame, não foi?"
51230-87 = "Bem, para começar, a Nagusa-chan nem tem coragem para isso, tem?"
51230-89 = "Uma garota que só sabe imitar a Ayame. #n Uma idiota que se confundiu achando que era uma aluna exemplar só por estar ao lado da Ayame."
51230-91 = "Ehm, e como foi que terminou mesmo?"
51230-92 = "Ah, é verdade! Aquele braço direito――"
51230-93 = "......Pare."
51230-94 = "Aquele braço já não se mexe mais, não é? #n Eu sei de tudo. Aquele braço direito coitado que se estendeu para a Ayame e foi rejeitado. #n Já que ele foi engolido pelo crepúsculo."
51230-95 = "Você não tem coragem, tem? Faltava só um pouquinho e você desistiu, não desistiu?"
51230-96 = "Não... eu..."
51230-101 = "Eu ainda me lembro, sabia? #n A Ayame que afundou no 'Crepúsculo' naquele dia――"
51230-102 = "As palavras que ela lançou contra [ruby=você]você[/ruby], depois de se tornar uma 'Hyakumonogatari'."
51230-103 = "Se não me engano――"
51230-104 = "Não...! Pare!"
51230-106 = "'Desde o início, eu nunca te considerei minha amiga'"
51230-112 = "Sim, sim. #n Foram palavras realmente maravilhosas, não foram?"
51230-113 = "O desespero daquela garota ao ver a Nagusa-chan, de quem ela esperava salvação, não fazendo nada!"
51230-114 = "Ah... os sentimentos da Ayame naquela hora... eu entendo, dói muito."
51230-115 = "Para começo de conversa―― se não fosse a Nagusa, [ruby=você]você[/ruby], a ter ido salvar."
51230-116 = "Se fosse alguém melhor, talvez tivesse conseguido evitar a tragédia."
51230-117 = "Ei, não acha isso também?"
51230-119 = "[ns] \"Shuro...!\""
51230-123 = "Poderia parar de me atrapalhar? #n A contadora de histórias de fantasmas, Yabuki Shuro, está falando, sabia?"
51230-135 = "[ns] \"Ugh... hmmph!?\""
51230-136 = "Mesmo sendo o Sensei da Schale... você não consegue falar enquanto estiver preso pela 'Hyakumonogatari', consegue?"
51230-137 = "Fique quieto aí, está bem?"
51230-139 = "Sensei...!"
51230-140 = "Ahaha! Essa tragédia é toda, todinha culpa [ruby=sua]sua[/ruby], Nagusa-chan."
51230-141 = "Transferindo a responsabilidade... diz que a história não faz sentido...?"
51230-142 = "Aha! Nesse caso, vou te mostrar as provas!"
51230-144 = "Com o meu livro misterioso 'Inou Mononokeroku'――"
51230-160 = "(Tirar a nota máxima era óbvio)"
51230-161 = "(Ajudar os outros era natural)"
51230-162 = "(Ser como esperavam era minha obrigação)"
51230-165 = "Meu nome é Kadenokouji Yukari."
51230-166 = "Sou a filha de uma família renomada até mesmo dentro da Hyakkiyako, a família Kadenokouji."
51230-167 = "'Como um membro da família Kadenokouji, mantenha-se íntegra.'"
51230-168 = "Essa é minha missão, meu dever."
51230-169 = "......Eu estou ciente."
51230-170 = "Sei que é o que eu devo fazer."
51230-175 = "Mas..."
51230-176 = "Ao conhecer a Nagusa-senpai――"
51230-177 = "Foi a primeira pessoa... que me mostrou 'o que eu quero fazer' em vez de 'o que eu devo fazer'."
51230-181 = "Eu só preciso entrar para a Hyakkaryouran!"
51230-188 = "Não é isso... Yukari."
51230-189 = "Eu não sou a pessoa digna que você pensa..."
51230-194 = "Eu só... menti... longe da verdade"
51230-195 = "Apenas vesti uma máscara para enganar a todos..."
51230-200 = "Tudo não passava de mentiras..."
51230-211 = "Porque eu estava aqui."
51230-212 = "Interpretando a 'Nagusa' para estar ao lado da Ayame... e continuando a mentir..."
51230-213 = "Então, a Yukari também começou a querer entrar na Hyakkaryouran... e foi aí..."
51230-215 = "Exatamente, Nagusa-chan. Finalmente se deu conta? #n Tudo, tu~do o que você tentou alcançar acaba se quebrando."
51230-216 = "Tudo! Tu~do! Culpa [ruby=sua]sua[/ruby]! #n O fato de a Ayame ter sido engolida pelo crepúsculo, a Yukari ter se tornado uma 'Hyakumonogatari', tudo isso."
51230-221 = "Porque [ruby=você]você[/ruby], que não conhece o seu próprio lugar, tentou ficar ao lado da Ayame."
51230-222 = "Uma tragédia que aconteceu porque você tentou interpretar um papel que não era capaz――"
51230-223 = "Tente guardar isso bem na sua memória, ouviu?"
51230-225 = "Tudo... por minha culpa... porque eu usei uma máscara falsa..."
51230-226 = "Eu quebrei tudo."
51230-227 = "Por minha culpa, tudo..."
51230-229 = "[ns] \"......!......Na, gusa!\""
51230-230 = "Hum, vamos prender a Nagusa também."
51230-239 = "[ns] \"............!!!\""
51230-241 = "Ahaha! Sabe de uma coisa?"
51230-242 = "Coisas que tiveram o coração partido são fáceis de sublimar em 'Histórias de Fantasmas', sabia?"
51230-243 = "Vou cuidar muito bem da Nagusa-chan também, viu?"
51230-244 = "Phew..."
51230-245 = "Com isso, o assunto está encerrado, não é?"
51230-248 = "Fufu... Aha, ahahahah!"
51230-249 = "Isso, isso, perfeito."
51230-250 = "Se você viver de acordo com o que merece e entender isso, tudo fica bem."
51230-251 = "Tudo saiu conforme os meus planos."
51230-254 = "Insultos, rixas e conflitos―― esse é o material."
51230-255 = "Para isso, usei até o Sensei da Schale como uma peça no meu jogo."
51230-259 = "Ah, vejam só―― Kokuriko-sama. Minha 'Hyakumonogatari'."
51230-260 = "Vamos lá, quebrem tudo. #n Insultem e derrubem uns aos outros―― no final, é só cruzar as lâminas e deixar que tudo se despedace."
51230-262 = "Com isso, eu completei a 'Hyakumonogatari' que queimará a Hyakkiyako até as cinzas―― #n uma elegância belíssima, Kokuriko-sama."
51230-266 = "Agora, só falta recuperar a Miko que criou os Katashiro..."
51230-271 = "[ns] \"......!!!\""
51230-273 = "!?"
51230-282 = "Ara ara? Depois de expulsar a Hyakumonogatari, para onde você pensou em ir..."
51230-283 = "Você acha que vai mudar a situação só por salvar a Yukari?"
51230-284 = "――Isso é um mal-entendido grave."
51230-285 = "Sabe, não sabe? Que ao contrário de nós, o Sensei da Schale é uma existência frágil que pode ser derrotada com apenas um dedo."
51230-287 = "[ns] \"......!\""
51230-292 = "Eu já disse que é inútil!"
51230-298 = "Haa~? Que bobagem é essa?"
51230-299 = "Será que...―― você quebrou?"
51230-300 = "O que você vai fazer depois de salvar a Yukari com tanto esforço?"
51230-302 = "[ns] \"......Haaah!!\""
51230-309 = "......Eu não consigo entender."
51230-310 = "Você também sabe, não sabe?"
51230-311 = "Quem criou o 'Katashiro sem rosto' que está destruindo o local do festival foi a Yukari."
51230-312 = "A própria pessoa que odiava a todos vocês, queria queimar tudo―― e queria jogar tudo para o alto. "
51230-313 = "Isso mesmo, aquela aluna do 1º ano da Hyakkaryouran que você tanto elogiou―― não existia desde o início."
51230-314 = "Até a Yukari fingia ser uma aluna gentil para enganar a todos vocês por conta própria."
51230-315 = "Ah... tantos mentirosos, mentiras sobre mentiras!"
51230-316 = "Por que―― você salvaria alguém que não é nem heroína nem nada, a ponto de se rastejar no chão?"
51230-317 = "Por que salvar esses mentirosos que não têm valor nenhum――!"
51230-318 = "[s1] \"......É verdade, talvez ela tenha mentido.\"\n[s2] \"Com medo de revelarem seus verdadeiros sentimentos...\"\n[s3] \"Talvez ela estivesse fingindo ser uma pessoa boa.\""
51230-322 = "Sim, sim! Você sabe muito bem disso, não sabe?"
51230-323 = "Isso mesmo, é tudo mentira! Escondendo seus verdadeiros sentimentos no fundo, destilando apenas mentiras nojentas――"
51230-324 = "[s] \"......Sim.\""
51230-326 = "[ns] \"Mas, mesmo assim, não tem problema, não é?\""
51230-330 = "......Eh?"
51230-331 = "[s4] \"Mentir, fingir estar tudo bem.\"\n[s5] \"Não há nada de errado em interpretar um papel assim.\""
51230-334 = "O que você..."
51230-335 = "[ns] \"Na verdade...\""
51230-339 = "[ns] \"Isso é algo normal que todo mundo faz pelo menos uma vez.\""
51230-341 = "......................Hã?"
51230-348 = "Próximo Episódio; Algo Normal"
