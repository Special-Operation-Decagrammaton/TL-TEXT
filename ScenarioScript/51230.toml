[translation]
51230-1 = "Episódio 23; Palavras Falsas"
51230-7 = "Sensei...! Ali...!"
51230-10 = "[ns] \"Yukari!?\""
51230-20 = "[ns] \"Droga... monstros aqui também!\""
51230-23 = "Finalmente chegaram até aqui, não é?#nSensei do Schale... Nagusa-chan."
51230-25 = "Shuro..."
51230-26 = "[s] \"Shuro, chega disso.\""
51230-30 = "Devolva a Yukari."
51230-35 = "Ah...!"
51230-36 = "Aha..."
51230-37 = "Ahahahahahahaha!!"
51230-41 = "Que irritante!"
51230-47 = "Falando nisso, ouvi um boato por aí."
51230-48 = "Dizem que o Sensei do Schale resolve qualquer problema—"
51230-49 = "Que você se mete em tudo o que acontece em Kivotos— um completo idiota."
51230-50 = "Então, você veio até aqui... ostentando esse seu senso de justiça?"
51230-51 = "O meu \"Cem Contos\" está... quase finalizado, sabe?"
51230-52 = "E mesmo assim? Você vem aqui atrapalhar...?#nSério, sério mesmo! Eu não consigo parar de rir do fundo do coração!"
51230-53 = "Isso vale para o Sensei do Schale, mas..."
51230-57 = "Nagusa-chan, especialmente você."
51230-59 = "......!!"
51230-61 = "Quem diria, de todas as pessoas, você vir aqui e dizer \"devolva a Yukari\"...?"
51230-62 = "Isso significa que você veio achando que poderia salvar a Sacerdotisa?#nEi, me diga, Nagusa-chan?"
51230-63 = "Como você tem a cara de pau de dizer algo assim..."
51230-64 = "Será que seus amiguinhos te empurraram para isso?"
51230-65 = "Eles te incentivaram, dizendo que você é a única que pode salvar a Sacerdotisa?"
51230-66 = "Que estranho... será que eles não sabem?"
51230-67 = "Nagusa-chan, você não conseguiu nem salvar a Ayame, não é?"
51230-72 = "Ah... será que, por acaso, você ainda está escondendo isso de todo mundo?"
51230-73 = "A verdade sobre o que aconteceu na Grande Planície Nevada—"
51230-74 = "[s] \"Nagusa, não precisa dar ouvidos a ela.\""
51230-75 = "Não, não, ela precisa sim!#nSensei, você também deveria ouvir!"
51230-76 = "Nagusa-chan, que correu para cá com essa cara de \"vou salvar minha veterana!\" ao lado do Sensei..."
51230-77 = "Acho bom você saber que, na verdade, ela é uma mentirosa que não tem nem a força nem a coragem para salvar ninguém."
51230-83 = "Eu ainda me lembro muito bem, Nagusa-chan."
51230-85 = "Naquele dia, quando você tentou salvar a Ayame e falhou—"
51230-86 = "Você nem sequer conseguiu tocar na Ayame com essas mãos, não foi?"
51230-87 = "Bem, para começo de conversa, Nagusa-chan não tem capacidade nenhuma."
51230-89 = "Apenas uma garota que tenta imitar a Ayame.#nUma idiota que achou que era uma aluna exemplar só por estar ao lado dela."
51230-91 = "Bem, e o que aconteceu depois disso?"
51230-92 = "Ah, é! Aquele braço direito—"
51230-93 = "............Pare."
51230-94 = "Esse braço não se move mais, não é?#nEu sei de tudo. Aquele braço direito patético que se estendeu para a Ayame, mas foi rejeitado.#nPorque ele foi engolido pelo crepúsculo."
51230-95 = "Faltou coragem, não foi? Estava quase lá, mas você desistiu."
51230-96 = "Não é verdade... eu..."
51230-101 = "Eu ainda me lembro.#nA Ayame, que afundou no \"Crepúsculo\" naquela época—"
51230-102 = "As palavras que ela lançou contra você, depois de se tornar parte do \"Cem Contos\"."
51230-103 = "Se não me engano—"
51230-104 = "Não...! Pare!"
51230-106 = "\"Eu nunca, desde o início, pensei em você como uma amiga.\""
51230-112 = "Sim, sim. #nForam palavras verdadeiramente maravilhosas, não foram?"
51230-113 = "O desespero daquela criança ao ver a Nagusa-chan, de quem ela esperava ajuda, não fazer absolutamente nada!"
51230-114 = "Ah... os sentimentos da Ayame naquele momento... eu entendo perfeitamente, até dói."
51230-115 = "Para começar, se quem tivesse vindo ajudar não fosse você, Nagusa."
51230-116 = "Se fosse alguém um pouco melhor, talvez a tragédia pudesse ter sido evitada, não é?"
51230-117 = "Diga, você não acha?"
51230-119 = "[ns] \"Shuro...!\""
51230-123 = "Poderia não atrapalhar? #nA contadora de histórias Yabuki Shuro está falando, sabe?"
51230-135 = "[ns] \"Guh... mmmph!?\""
51230-136 = "Mesmo sendo o Sensei do Schale, #nnão consegue falar enquanto está sendo contido pelos Cem Contos, consegue?"
51230-137 = "Fique quieto aí, por favor."
51230-139 = "Sensei...!"
51230-140 = "Ahaha! Essa tragédia é toda, todinha culpa sua, Nagusa-chan."
51230-141 = "Transferência de culpa... está dizendo que meu raciocínio deu um salto...?"
51230-142 = "Ah! Nesse caso, vou lhe mostrar as provas, sim?"
51230-144 = "Com o meu livro bizarro, o \"Ino Mononoke Roku\" —"
51230-160 = "(Tirar nota máxima era natural)"
51230-161 = "(Ser útil aos outros era óbvio)"
51230-162 = "(Viver de acordo com as expectativas era um dever)"
51230-165 = "O nome é Kageyu-koji Yukari."
51230-166 = "A filha da família Kageyu-koji, uma linhagem renomada até mesmo dentro de Hyakkiyako."
51230-167 = "\"Viva de forma íntegra como alguém da família Kageyu-koji.\""
51230-168 = "Essa era a minha missão e o meu dever."
51230-169 = "...Eu também sei disso."
51230-170 = "Que isso é o que eu deveria fazer."
51230-175 = "Mas..."
51230-176 = "Ao conhecer a Nagusa-senpai..."
51230-177 = "Pela primeira vez... foi a pessoa que me ensinou não o que eu \"deveria fazer\", mas o que eu \"queria fazer\"."
51230-181 = "Eu deveria entrar para a Hyakka Ryoran!"
51230-188 = "Não é assim... Yukari."
51230-189 = "Eu não sou a pessoa admirável que você pensa que sou..."
51230-194 = "Eu apenas... vivi uma mentira, muito longe da verdade..."
51230-195 = "Apenas usei uma máscara para enganar a todos..."
51230-200 = "Tudo não passava de uma mentira..."
51230-211 = "Porque eu estava aqui."
51230-212 = "Para ficar ao lado da Ayame, eu interpretei a \"Nagusa\"... continuei mentindo..."
51230-213 = "E então, a Yukari também começou a querer entrar para a Hyakka Ryoran... e por isso..."
51230-215 = "Exatamente, Nagusa-chan. Finalmente percebeu? #nTudo, absolutamente tudo o que a Nagusa-chan toca, acaba quebrando."
51230-216 = "Tudo! Absolutamente tudo! É culpa sua! #nO fato de a Ayame ter sido engolida pelo crepúsculo, e a Yukari ter se tornado um dos \"Cem Contos\", tudo."
51230-221 = "Porque você, que não conhece o seu lugar, tentou ficar ao lado da Ayame."
51230-222 = "Uma tragédia que aconteceu porque você tentou atuar sem ter a capacidade necessária para ser uma atriz —"
51230-223 = "Guarde isso bem na sua memória, está bem?"
51230-225 = "Tudo... por minha causa... por eu ter usado uma máscara falsa..."
51230-226 = "Eu que quebrei tudo."
51230-227 = "Por minha causa, tudo..."
51230-229 = "[ns] \"...!... Na, gusa!\""
51230-230 = "Hum, vamos conter a Nagusa também."
51230-239 = "[ns] \"............!!!\""
51230-241 = "Ahaha! Sabe de uma coisa?"
51230-242 = "Aqueles que têm o coração partido são facilmente transformados em \"histórias de fantasmas\"."
51230-243 = "Nagusa-chan, eu vou te mimar muuuito, sabe?"
51230-244 = "Ufa..."
51230-245 = "Com isso, o caso está encerrado, não é?"
51230-248 = "Fufu... Ah, ahahahaha!"
51230-249 = "Sim, sim, isso é o suficiente."
51230-250 = "Se viverem de acordo com o que merecem e entenderem isso, então está tudo ótimo, perfeito."
51230-251 = "Tudo está saindo exatamente como planejei."
51230-254 = "Insultos, desavenças e o nascimento de conflitos — esses são os ingredientes."
51230-255 = "Para isso, até o Sensei do Schale foi usado como uma peça no meu tabuleiro."
51230-259 = "Ah, veja só — Kokuriko-sama. A minha 'Hyakumonogatari'."
51230-260 = "Vamos lá, quebrem-se todos. #nInsultem uns aos outros, derrubem-se — e no final, cruzem suas lâminas e despedacem-se."
51230-262 = "Com isso, eu completei a 'Hyakumonogatari' que queimará Hyakkiyako até as cinzas #ne a minha bela e elegante obra, Kokuriko-sama."
51230-266 = "Agora, só falta recuperar a sacerdotisa que criou os Katashiro..."
51230-271 = "[ns] \"……！！！\""
51230-273 = "¡?"
51230-282 = "Ora, ora? Depois de expulsar a Hyakumonogatari, para onde você pensa que vai..."
51230-283 = "Acha mesmo que pode mudar essa situação só por salvar a Yukari?"
51230-284 = "— Que equívoco monumental."
51230-285 = "Você sabe, não sabe? Diferente de nós, o Sensei do Schale é um ser frágil que pode ser destruído com um simples toque."
51230-287 = "[ns] \"……！\""
51230-292 = "Eu já disse que é inútil!"
51230-298 = "Hã~? Que tolice é essa?"
51230-299 = "Será que... você quebrou?"
51230-300 = "Por que se esforçar tanto para salvar a Yukari? O que você pretende fazer?"
51230-302 = "[ns] \"……Haa!!\""
51230-309 = "...Eu não consigo entender."
51230-310 = "Você também sabe, não sabe?"
51230-311 = "Quem criou o 'Katashiro sem Rosto' que está causando caos no local foi a Yukari."
51230-312 = "A própria pessoa que odiava vocês, queria queimar tudo e desistir de tudo."
51230-313 = "Sim, aquela aluna do primeiro ano da Hyakka Ryoran que você chamou de exemplar... ela nunca existiu desde o início."
51230-314 = "Até a Yukari enganou você para o próprio benefício, fingindo ser uma aluna bondosa."
51230-315 = "Ah... mentira sobre mentira, cheia de mentirosos!"
51230-316 = "Por que você insiste em salvar alguém que não é heroína nem nada disso... chegando ao ponto de se arrastar pelo chão?"
51230-317 = "Por que salvar esses mentirosos que não valem nada —!"
51230-318 = "[s1] \"...É verdade, talvez ela tenha mentido.\"\n[s2] \"Com medo de que descobrissem seus sentimentos reais...\"\n[s3] \"Talvez ela tenha fingido ser uma boa pessoa.\""
51230-322 = "Sim, sim! Você sabe muito bem, não sabe?"
51230-323 = "Isso, é tudo mentira! Escondendo seus verdadeiros sentimentos no fundo, enfileirando mentiras que dão ânsia de vômito —"
51230-324 = "[s] \"...Sim.\""
51230-326 = "[ns] \"Mas, mesmo assim, não tem problema, tem?\""
51230-330 = "...Como é?"
51230-331 = "[s4] \"Mentir e mostrar uma boa face.\"\n[s5] \"Não há nada de errado em atuar dessa forma.\""
51230-334 = "O que você..."
51230-335 = "[ns] \"Para falar a verdade...\""
51230-339 = "[ns] \"Todo mundo faz isso pelo menos uma vez, é algo comum.\""
51230-341 = "…………………………Hã?"
51230-348 = "Próximo episódio: Algo comum"
