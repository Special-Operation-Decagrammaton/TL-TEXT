[translation]
10014010-1 = "第1話;突っかかってくるヤツ"
10014010-2 = "[ns1] \"ストーカー……！？\"\n[ns2] \"それは大変だね……大丈夫？\""
10014010-3 = "あ、先に言っておくけど。#nいま先生が考えてる感じのじゃないよ。"
10014010-4 = "あ、先に言っておくけど。#nいま先生が考えてる感じのじゃないよ。"
10014010-5 = "……いっそ、単純なヤツだったらもっと楽だったんだけど。#n正義実現委員会に連絡すればいいだけだし。"
10014010-9 = "うーん……いや、今のはなしで。"
10014010-10 = "やっぱ、正義実現委員会はちょっとまずいかも……。"
10014010-11 = "[ns3] \"……？\"\n[ns4] （正義実現委員会が、まずい……？）"
10014010-12 = "その……何と言うか……ちょっと普通じゃないというか……。"
10014010-13 = "その……何と言うか……ちょっと普通じゃないというか……。"
10014010-14 = "まず、本人に全くストーカーしてる自覚がないみたいで。"
10014010-15 = "……ん？ストーカーって元々そんなもんじゃないかって？"
10014010-16 = "はは……そうかも。"
10014010-17 = "とにかく……ちょっと理由があって。#n別に相手を懲らしめたいわけではないんだ。"
10014010-18 = "ただ、具体的な方法とかはまだ決まってなくて……。#n先生の力を借りられたら、と。"
10014010-19 = "……ごめん。#n逆に先生を困らせちゃうよね、こんな曖昧なお願い。"
10014010-20 = "[s5] \"カズサの助けになるなら本望だよ。\"\n[s6] \"気にしないで。そういう事を考えるのも私の仕事だよ。\""
10014010-21 = "そんな事、気軽に言っちゃって……先生が大変になるだけなのに。"
10014010-22 = "そんな事、気軽に言っちゃって……先生が大変になるだけなのに。"
10014010-23 = "でもまあ、とても助かる。"
10014010-24 = "ありがとうございます。"
10014010-25 = "……ん？"
10014010-26 = "ああ……結局そのストーカーは誰かって？"
10014010-27 = "……そうだね、ごめん。#nまた説明忘れてた。"
10014010-28 = "個人情報になるからあんまり言いたくはないんだけど……まぁ仕方ないか。"
10014010-29 = "……それに、どうせ放っておいても先生の目に入るだろうし。"
10014010-30 = "あいつは……"
10014010-31 = "[ruby=うざわ]宇沢[/ruby]……。"
10014010-32 = "ついに見つけた！もう逃げられませんよ、[ruby=きょうやま]杏山[/ruby]カズサ！！！"
10014010-33 = "大人しく挑戦状を受けなさい！#nこの私「宇沢レイサ」との決闘を避けられると思わないでください！"
10014010-37 = "[ns7] \"……「挑戦状」？\"\n[ns8] \"「決闘」？\""
10014010-39 = "……はあ。"
10014010-40 = "……はあ。"
10014010-41 = "……そう、こんな風に……。"
10014010-46 = "先手必勝ー！！！"
10014010-59 = "……突っかかってくるヤツなんだ。"
