[translation]
10014010-1 = "Episódio 1; A pessoa que vem para cima"
10014010-2 = "[ns1] \"Um stalker……！？\"\n[ns2] \"Isso é sério…… você está bem?\""
10014010-3 = "Ah, antes que eu me esqueça.#nNão é o tipo de coisa que você está pensando agora, Sensei."
10014010-4 = "Ah, antes que eu me esqueça.#nNão é o tipo de coisa que você está pensando agora, Sensei."
10014010-5 = "……Na verdade, seria mais fácil se fosse alguém simples.#nBastaria entrar em contato com o Comitê de Justiça."
10014010-9 = "Hmm…… não, esquece o que eu disse."
10014010-10 = "Pensando bem, envolver o Comitê de Justiça pode ser um problema……."
10014010-11 = "[ns3] \"……？\"\n[ns4] （O Comitê de Justiça seria um problema……？）"
10014010-12 = "É que…… como posso dizer…… é um pouco fora do comum……."
10014010-13 = "É que…… como posso dizer…… é um pouco fora do comum……."
10014010-14 = "Para começar, parece que a própria pessoa nem percebe que está me perseguindo."
10014010-15 = "……Hm? Você acha que stalkers são sempre assim? "
10014010-16 = "Haha…… talvez você tenha razão."
10014010-17 = "De qualquer forma…… tenho meus motivos.#nNão é que eu queira punir a pessoa."
10014010-18 = "É só que ainda não decidi um método concreto…….#nPor isso queria pedir a ajuda do Sensei."
10014010-19 = "……Desculpe.#nAcabo te incomodando com um pedido tão vago, né?"
10014010-20 = "[s5] \"Se for para ajudar a Kazusa, é um prazer.\"\n[s6] \"Não se preocupe. Pensar nessas coisas também é meu trabalho.\""
10014010-21 = "Você diz isso com tanta facilidade…… só vai acabar se sobrecarregando, Sensei."
10014010-22 = "Você diz isso com tanta facilidade…… só vai acabar se sobrecarregando, Sensei."
10014010-23 = "Mas, de qualquer forma, isso ajuda muito."
10014010-24 = "Obrigada."
10014010-25 = "……Hm?"
10014010-26 = "Ah…… afinal, quem é esse stalker, você pergunta?"
10014010-27 = "……É verdade, desculpe.#nEsqueci de explicar de novo."
10014010-28 = "Como envolve informações pessoais, não queria falar muito…… mas não tem jeito."
10014010-29 = "……Além disso, de qualquer forma, o Sensei acabaria cruzando com ela."
10014010-30 = "Aquela pessoa é……"
10014010-31 = "Uzawa……."
10014010-32 = "Finalmente te encontrei! Você não pode mais fugir, Kyoyama Kazusa!!!"
10014010-33 = "Aceite meu desafio pacificamente!#nNão pense que pode evitar um duelo comigo, Uzawa Reisa!"
10014010-37 = "[ns7] \"……'Desafio'?\"\n[ns8] \"'Duelo'?\""
10014010-39 = "……Haa."
10014010-40 = "……Haa."
10014010-41 = "……É, desse jeito……."
10014010-46 = "Ataque preventivo!!!"
10014010-59 = "……É esse o tipo de pessoa que vem para cima de mim."
