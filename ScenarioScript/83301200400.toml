[translation]
83301200400-6 = "Ei, você aí do Departamento de Desenvolvimento de Fontes Termais, pode vir aqui um instante?"
83301200400-7 = "Hm?"
83301200400-8 = "Aaah! Por que a Presidente do Comitê Disciplinar está aqui!?"
83301200400-9 = "Eu não estava fazendo nada, só estava descansando...!"
83301200400-10 = "......Eu não vim aqui para te prender hoje."
83301200400-11 = "Eu só queria perguntar sobre o caso de vocês tentando construir uma fonte termal em frente ao novo prédio do Pandemonium."
83301200400-12 = "Tentar tirar informações de mim? Eu nunca faria uma traição dessas...!"
83301200400-13 = "Traição... bem, não deixa de ser uma forma de ver as coisas."
83301200400-14 = "Eu também não pretendo forçar você a falar nada."
83301200400-15 = "Ouvi alguns rumores sobre o Departamento de Desenvolvimento de Fontes Termais e só quero confirmar."
83301200400-16 = "Revolução das Fontes Termais... era esse o nome? Ouvi dizer que estavam vendendo ingressos de entrada prioritária."
83301200400-17 = "Não sei quais são seus objetivos suspeitos, mas se vocês causarem problemas de novo, quem vai ter dor de cabeça sou eu."
83301200400-18 = "......O quê?"
83301200400-19 = "......?"
83301200400-20 = "Objetivos suspeitos, é!?"
83301200400-21 = "Hmph! Pessoas cabeça-dura como vocês do Comitê Disciplinar nunca entenderiam!"
83301200400-22 = "Nem o nosso grande objetivo no Departamento de Desenvolvimento de Fontes Termais! Nem o quanto a Kasumi e a Meg-chan estão se esforçando!"
83301200400-23 = "......Grande objetivo."
83301200400-24 = "A fonte termal que estávamos tentando construir no estacionamento do novo prédio é apenas um ponto de passagem...!"
83301200400-25 = "Quando todas as fontes termais que estamos escavando por toda Gehenna estiverem prontas..."
83301200400-26 = "Finalmente teremos a fonte termal perfeita!"
83301200400-27 = "O sucesso da 'Grande Operação Fonte Termal Empolgante' já está logo ali...!"
83301200400-28 = "'Grande Operação Fonte Termal Empolgante'.........?"
83301200400-29 = ".........Ah! Falei demais no calor do momento..."
83301200400-35 = "P-preciso fugir!"
83301200400-39 = "Espere...!"
