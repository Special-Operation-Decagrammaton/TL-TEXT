[translation]
83301200400-6 = "そこの温泉開発部の子、ちょっといい？"
83301200400-7 = "ん？"
83301200400-8 = "うわあっ！風紀委員長がなぜここに！？"
83301200400-9 = "何もせず休んでいただけなんだが……！"
83301200400-10 = "……今日はあなたを捕まえるために来たわけじゃないから。"
83301200400-11 = "ただ、万魔殿の新議事堂前で温泉を開発しようとしていた件について聞きたくて。"
83301200400-12 = "私から情報を聞き出そうとするなんて、そんな裏切るような真似は……！"
83301200400-13 = "裏切り……まあ、そう言えなくもないか。"
83301200400-14 = "私も無理やり聞き出すつもりじゃない。"
83301200400-15 = "温泉開発部の噂を耳に挟んで。その確認がしたい。"
83301200400-16 = "温泉革命……だったかしら？優先入場券を売っていたとか。"
83301200400-17 = "どんな怪しい目的があるのかは知らないけれど、また問題を起こされると困るのはこっちだから。"
83301200400-18 = "……なに？"
83301200400-19 = "……？"
83301200400-20 = "怪しい目的だと！？"
83301200400-21 = "ふん！お前たちみたいな分からず屋の風紀委員会には理解できないだろうな！"
83301200400-22 = "私たち温泉開発部の偉大な目標も！カスミ部長とメグちゃんがどれだけ頑張っているのかも！"
83301200400-23 = "……偉大な目標。"
83301200400-24 = "新議事堂の駐車場に作ろうとしていた温泉は、ただの通過点に過ぎない……！"
83301200400-25 = "ゲヘナ全域で掘削中の温泉が全て完成すれば……"
83301200400-26 = "ついに完璧な温泉が出来上がるというのにっ！"
83301200400-27 = "「わくわく温泉大作戦」の成功は、もう目前……！"
83301200400-28 = "「わくわく温泉大作戦」………？"
83301200400-29 = "………あっ！勢いで全部……"
83301200400-35 = "に、逃げないと！"
83301200400-39 = "待って……！"
