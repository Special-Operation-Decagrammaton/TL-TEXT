[translation]
51110-1 = "第11話;ただの一生徒"
51110-5 = "お前ら！囲め！今度こそ逃さないようにな！"
51110-13 = "さっきはち～っとばかし手違いがあったけどなぁ！"
51110-14 = "今度こそ、ようやく見つけたぞ！"
51110-23 = "……もぐもぐ。"
51110-24 = "この間は逃しちまったが、今回は諦めるんだな！#nこっちは前よりも人手を増やしてきたんだ！"
51110-25 = "……もぐもぐ。"
51110-26 = "リーダー！あいつ何か食ってますよ！"
51110-27 = "ハッ！舐めやがって！"
51110-30 = "もぐもぐ……"
51110-32 = "ごくっ。"
51110-33 = "最後に何か言い残すことはねぇのか？"
51110-34 = "大人しく謝るなら、少しは手加減してやっても――"
51110-38 = "――もぐもぐ。"
51110-43 = "リーダー！あいつ、また何か食べ始めたっすよ！？"
51110-45 = "百花繚乱っ……！どこまであたしらをコケに……！"
51110-46 = "……前にも言ったけど、私は百花繚乱じゃない。"
51110-47 = "たまたまお祭りに来ているだけの……"
51110-49 = "……そう、平凡だけど、どこか神秘的で儚げな……ただの百鬼夜行の一生徒。"
51110-51 = "ただの一生徒があんな事できるわけねぇだろうがよ！？"
51110-52 = "もう許さねえ！"
51110-53 = "全員、とつげ――！"
51110-54 = "[s] \"待って！\""
51110-62 = "リーダー！？"
51110-63 = "い、いきなり撃つなんて……！"
51110-70 = "先輩！？"
51110-71 = "くそっ……"
51110-72 = "ぜ、全員突撃だぁぁあ！！ "
51110-103 = "うぅっ…………"
51110-107 = "ち、ちくしょう！"
51110-108 = "囲め！！数で押していけ！！"
51110-114 = "……！"
51110-121 = "（一体どれほどの時間が経ったのだろう……）"
51110-132 = "捕まえ……！"
51110-133 = "っ！？"
51110-134 = "[ns] \"右！\""
51110-146 = "分かったぞ……"
51110-147 = "右だ！右を狙うんだ！！ "
51110-148 = "あいつ、右側の反応だけ遅い！"
51110-149 = "相手の弱点を見つけたらそこを重点的に狙い続ける……#nそれが魑魅一座ってもんよ！"
51110-150 = "厄介……"
51110-152 = "ロケットランチャーの準備ができたっす！"
51110-156 = "うわっ！な、何も見えねぇじゃねえか！"
51110-157 = "けほっ、けほっ……"
51110-164 = "[ns] \"ここは撤退しよう。\""
51110-165 = "……誰？"
51110-170 = "ま、待って、私は……"
51110-177 = "[ns1] \"はぁ、はぁ……ここまで来れば大丈夫かな。\"\n[ns2] \"大きな怪我は無いみたいで良かった。\""
51110-180 = "……あなたは誰？"
51110-184 = "シャーレの、先生……？"
51110-185 = "シャーレの先生って、たしか……"
51110-186 = "……助けなくてよかったのに。"
51110-187 = "あれくらい、私一人でも――"
51110-192 = "[ns] \"右腕、怪我してるの？\""
51110-193 = "……！"
51110-194 = "右側の動きが鈍かった……？"
51110-195 = "初対面の人が見て分かるくらい……そっか。 "
51110-196 = "……これは。"
51110-200 = "…………。"
51110-201 = "[s3] \"聞かれたくないことだったらごめんね。\"\n[s4] \"無理に聞くつもりは無いから。\""
51110-204 = "それで……シャーレの先生が、私に何か用？"
51110-205 = "私を探していたわけじゃなくて、百鬼夜行に用事が？#nあそこに居たのはたまたま？……そう。"
51110-206 = "[s] \"その格好、もしかして君は……\""
51110-210 = "あ……その……百花、繚乱は……"
51110-211 = "[s] \"やっぱり百花繚乱なんだね。\""
51110-212 = "…………。"
51110-213 = "そっか。そういえば、まだシャーレの先生とは……"
51110-214 = "……うん。"
51110-217 = "あなたの言う通り。"
51110-218 = "私は……百花繚乱だよ。"
51110-219 = "いや……正確には、百花繚乱[ruby=・   ・   ・]だった[/ruby]と言うのが正しいかな。"
51110-220 = "……今は、もう離れてるから。"
51110-221 = "[s] \"うん、話は聞いてるよ。解散令の時に抜けたメンバーが多かったって。\""
51110-222 = "解散令……"
51110-223 = "そっか、もう百花繚乱は……。"
51110-224 = "……うん、そうだよね。"
51110-225 = "私がアレを返そうとしたのだから、当然あの子たちは……"
51110-226 = "…………。"
51110-227 = "そう。私も百花繚乱を抜けて……ちょっと街に出かけてみたの。"
51110-228 = "息抜きに、お祭りの準備をしている姿が見たくて。"
51110-232 = "助けてくれてありがとう。"
51110-233 = "それじゃ私は――"
51110-234 = "[s] \"時間も遅いし、ひとまず今日は帰ろっか。\""
51110-238 = "ん……？何で私が、あなたと……？"
51110-244 = "ちょっと、待って……！"
51110-251 = "（喧騒から離れた二人の間には、沈黙が流れていた）"
51110-252 = "…………。"
51110-253 = "……………………。"
51110-254 = "あなたは……百鬼夜行に用事があって訪れた、と言ってたよね。"
51110-255 = "「解散令」のことも知っていた。"
51110-256 = "それなら、もしかしてだけど……百花繚乱について……"
51110-257 = "[s] \"状況が気になるの？\""
51110-258 = "……ええ。離れてから、だいぶ経ったから。"
51110-259 = "少し、気になって。"
51110-261 = "（特に隠す理由はないので、今日の出来事を話した）"
51110-263 = "……「継承戦」、か。"
51110-264 = "そっか、私が居ない間にそんなことが。"
51110-265 = "……どうして、そこまでして。"
51110-266 = "……いや、私がこんなことを言う資格は無いか。"
51110-267 = "[s] \"このままじゃダメだとユカリは思ったんじゃないかな。\""
51110-268 = "そう、ユカリが……。"
51110-270 = "百鬼夜行の住宅街"
51110-273 = "ここまでで十分。"
51110-274 = "送ってくれてありがとう、シャーレの先生。"
51110-275 = "……それじゃあ。"
51110-276 = "[s] \"百花繚乱に戻る気は無いの？\""
51110-280 = "……なるほど。"
51110-281 = "警戒心が緩んだところで、それを聞くんだ。"
51110-282 = "思ったより、したたかな人なんだね。"
51110-283 = "……悪いけど、私は帰れない。"
51110-284 = "[s] \"もう抜けたから……？\""
51110-285 = "…………そう。"
51110-286 = "あの日、私はアレを返そうとした……だからもう、あの子たちは私を許さない。"
51110-287 = "今さら百花繚乱に帰るだなんて……そんな度胸も無い。"
51110-288 = "私は、そんなに強くないから。"
51110-289 = "今の私には……そもそも資格が無いもの。"
51110-290 = "私は「あの子」じゃないし……"
51110-295 = "残ったみんなに、失望されたくない……"
51110-296 = "私が帰れない理由は、それだけ……だから……"
51110-301 = "[log=???]＜ウソ＞[/log]"
51110-304 = "＜ウソ＞"
51110-307 = "＜ウソ＞"
51110-310 = "＜ウソ＞"
51110-313 = "……それじゃ。"
51110-317 = "[ns] \"初対面でいきなり聞くことじゃなかったかもしれない……。\""
51110-321 = "[ns] \"次に会った時には……せめて、名前を聞けるといいんだけど。\""
51110-323 = "（先ほどの会話を[ruby=はんすう]反芻[/ruby]しながら、陽が沈むさまを眺めていた）"
51110-325 = "次回;桐生キキョウと継承戦（１）"
