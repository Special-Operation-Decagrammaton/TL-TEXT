[translation]
51110-1 = "Episódio 11; Apenas Uma Aluna"
51110-5 = "Pessoas! Cerquem-na! Não a deixem escapar desta vez!"
51110-13 = "Houve um pequeno engano antes, mas!"
51110-14 = "Desta vez te encontramos de verdade!"
51110-23 = "......*Munch*, *munch*."
51110-24 = "Na última vez você escapou, mas desista desta vez! #n Trouxemos mais pessoas do que antes!"
51110-25 = "......*Munch*, *munch*."
51110-26 = "Líder! Ela está comendo alguma coisa!"
51110-27 = "Hah! Tá subestimando a gente!"
51110-30 = "*Munch*, *munch*..."
51110-32 = "*Gulp*."
51110-33 = "Não tem nada a dizer antes do fim?"
51110-34 = "Se você pedir desculpas quietinha, a gente pode até pegar um pouco mais leve――"
51110-38 = "――*Munch*, *munch*."
51110-43 = "Líder! Ela começou a comer de novo!?"
51110-45 = "Sua Hyakkaryouran...! Até que ponto você vai nos humilhar...!"
51110-46 = "......Como eu disse antes, não sou da Hyakkaryouran."
51110-47 = "Eu só vim para o festival por acaso..."
51110-49 = "......Sim, uma aluna qualquer, um pouco comum, mas misteriosa e efêmera... apenas uma aluna da Hyakkiyako."
51110-51 = "Uma aluna qualquer não conseguiria fazer aquilo, né!?"
51110-52 = "Não vou mais te perdoar!"
51110-53 = "Todas, atacaaar――!"
51110-54 = "[s] \"Espera!\""
51110-62 = "Líder!?"
51110-63 = "A-Atirar do nada assim...!"
51110-70 = "Senpai!?"
51110-71 = "Droga..."
51110-72 = "T-Todas, ataquem!!"
51110-103 = "Ugh............"
51110-107 = "M-Maldita!"
51110-108 = "Cerquem-na!! Usem a vantagem numérica!!"
51110-114 = "......!"
51110-121 = "(Quanto tempo já se passou...)"
51110-132 = "Peguei...!"
51110-133 = "!?"
51110-134 = "[ns] \"Direita!\""
51110-146 = "Descobri..."
51110-147 = "É a direita! Atirem na direita dela!! "
51110-148 = "A reação do lado direito dela é a única lenta!"
51110-149 = "Quando encontrar a fraqueza do inimigo, foque nela sem parar... #n É assim que a Trupe Sudama faz as coisas!"
51110-150 = "Que chatice..."
51110-152 = "O lança-foguetes tá pronto!"
51110-156 = "Uwaa! E-Eu não tô vendo nada!"
51110-157 = "*Tosse*, *tosse*..."
51110-164 = "[ns] \"Vamos recuar por enquanto.\""
51110-165 = "......Quem?"
51110-170 = "E, espere, eu sou..."
51110-177 = "[ns1] \"*Haa, haa*... Acho que estamos seguros aqui.\"\n[ns2] \"Ainda bem que você não se machucou muito.\""
51110-180 = "......Quem é você?"
51110-184 = "Sensei... da Schale?"
51110-185 = "O Sensei da Schale é, se bem me lembro..."
51110-186 = "......Não precisava ter me salvado."
51110-187 = "Mesmo sozinha, eu conseguia――"
51110-192 = "[ns] \"Seu braço direito está machucado?\""
51110-193 = "......!"
51110-194 = "Meus movimentos do lado direito estavam lentos...?"
51110-195 = "A ponto de alguém que acabei de conhecer perceber... entendi. "
51110-196 = "......Isso é."
51110-200 = "............"
51110-201 = "[s3] \"Desculpe se for algo que você não quer falar.\"\n[s4] \"Não vou forçar você a responder.\""
51110-204 = "Então... o que o Sensei da Schale quer comigo?"
51110-205 = "Não estava me procurando, mas veio resolver algo na Hyakkiyako? #n Estava lá por acaso? ...Entendo."
51110-206 = "[s] \"Com essas roupas, por acaso você é...\""
51110-210 = "Ah... isso... a Hyakka, ryouran..."
51110-211 = "[s] \"Então você é da Hyakkaryouran.\""
51110-212 = "............"
51110-213 = "É verdade. Pensando bem, eu ainda não tinha me apresentado para o Sensei da Schale..."
51110-214 = "......Sim."
51110-217 = "Você está certo."
51110-218 = "Eu... sou da Hyakkaryouran."
51110-219 = "Não... para ser mais exata, [ruby=·   ·   ·]fui[/ruby] da Hyakkaryouran."
51110-220 = "......Porque agora eu já saí."
51110-221 = "[s] \"Sim, eu fiquei sabendo. Que muitos membros saíram na época do Decreto de Dissolução.\""
51110-222 = "Decreto de dissolução..."
51110-223 = "Entendo, a Hyakkaryouran já..."
51110-224 = "......Sim, é verdade."
51110-225 = "Se eu tentei devolver aquilo, é natural que elas..."
51110-226 = "............"
51110-227 = "Sim. Eu também saí da Hyakkaryouran... e vim dar uma volta na cidade."
51110-228 = "Queria dar uma espairecida e ver os preparativos para o festival."
51110-232 = "Obrigada por me salvar."
51110-233 = "Então eu――"
51110-234 = "[s] \"Já está tarde, que tal voltarmos por hoje?\""
51110-238 = "Hm...? Por que eu voltaria... com você?"
51110-244 = "Espere, um pouco...!"
51110-251 = "(Um silêncio pairou entre os dois, longe do tumulto)"
51110-252 = "............"
51110-253 = "...................."
51110-254 = "Você disse que... veio resolver algo na Hyakkiyako."
51110-255 = "E também sabia sobre o 'Decreto de Dissolução'."
51110-256 = "Então, por acaso... sobre a Hyakkaryouran..."
51110-257 = "[s] \"Quer saber como estão as coisas?\""
51110-258 = "......Sim. Já faz muito tempo que saí."
51110-259 = "Estou um pouco curiosa."
51110-261 = "(Como não havia motivo para esconder, contei o que havia acontecido hoje)"
51110-263 = "......'Batalha de Sucessão', hein."
51110-264 = "Entendo, isso aconteceu enquanto eu não estava."
51110-265 = "......Por que, ir tão longe."
51110-266 = "......Não, eu não tenho o direito de falar isso."
51110-267 = "[s] \"Acho que a Yukari sentiu que não podia deixar as coisas como estavam.\""
51110-268 = "Entendo, a Yukari..."
51110-270 = "Área Residencial de Hyakkiyako"
51110-273 = "Até aqui está bom."
51110-274 = "Obrigada por me acompanhar, Sensei da Schale."
51110-275 = "......Até mais."
51110-276 = "[s] \"Não quer voltar para a Hyakkaryouran?\""
51110-280 = "......Entendo."
51110-281 = "Você esperou eu baixar a guarda para perguntar isso."
51110-282 = "Você é mais calculista do que eu pensava."
51110-283 = "......Sinto muito, mas não posso voltar."
51110-284 = "[s] \"Porque você já saiu...?\""
51110-285 = "............Isso."
51110-286 = "Naquele dia, eu tentei devolver aquilo... por isso, elas não vão me perdoar."
51110-287 = "Voltar para a Hyakkaryouran agora... não tenho coragem para isso."
51110-288 = "Não sou tão forte assim."
51110-289 = "A eu de agora... nem mesmo tem o direito."
51110-290 = "Eu não sou 'aquela garota'..."
51110-295 = "Não quero decepcionar quem ficou..."
51110-296 = "É só esse... o motivo pelo qual eu não posso voltar..."
51110-301 = "[log=???]<Mentira>[/log]"
51110-304 = "<Mentira>"
51110-307 = "<Mentira>"
51110-310 = "<Mentira>"
51110-313 = "......Até mais."
51110-317 = "[ns] \"Talvez não devesse ter perguntado isso no nosso primeiro encontro...\""
51110-321 = "[ns] \"Da próxima vez que nos encontrarmos... seria bom se pelo menos eu descobrisse o seu nome.\""
51110-323 = "(Enquanto refletia sobre a conversa, observei o pôr do sol)"
51110-325 = "Próximo Episódio; Kiryuu Kikyou e a Batalha de Sucessão (1)"
