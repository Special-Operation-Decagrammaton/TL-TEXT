[translation]
51110-1 = "Episódio 11; Apenas uma estudante"
51110-5 = "Vocês! Cerquem ela! Não deixem que ela escape desta vez!"
51110-13 = "Houve um pequeno contratempo da última vez, mas agora é diferente!"
51110-14 = "Desta vez, finalmente te encontramos!"
51110-23 = "……mastiga, mastiga."
51110-24 = "Você escapou da última vez, mas desta vez é melhor desistir!#nTrouxemos muito mais gente do que antes!"
51110-25 = "……mastiga, mastiga."
51110-26 = "Líder! Ela está comendo alguma coisa!"
51110-27 = "Hah! Está nos subestimando?!"
51110-30 = "Mastiga, mastiga……"
51110-32 = "Gulp."
51110-33 = "Não tem nenhuma última palavra?"
51110-34 = "Se pedir desculpas agora, talvez eu pegue leve com você――"
51110-38 = "――mastiga, mastiga."
51110-43 = "Líder! Ela começou a comer de novo!?"
51110-45 = "Hyakka Ryoran……! Até onde vocês vão nos fazer de bobos……!"
51110-46 = "……Já disse antes, eu não sou da Hyakka Ryoran."
51110-47 = "Eu só vim ao festival por acaso……"
51110-49 = "……Isso mesmo, uma estudante comum de Hyakkiyako, um pouco misteriosa e frágil…… apenas uma estudante qualquer."
51110-51 = "Uma estudante qualquer não conseguiria fazer esse tipo de coisa, não é?!"
51110-52 = "Já chega, não vou te perdoar!"
51110-53 = "Todos, atacar――!"
51110-54 = "[s] \"Espere!\""
51110-62 = "Líder!?"
51110-63 = "A-atirar do nada……!"
51110-70 = "Senpai!?"
51110-71 = "Droga……"
51110-72 = "T-todos, ataquem!!"
51110-103 = "Ugh…………"
51110-107 = "D-droga!"
51110-108 = "Cerquem ela!! Ganhem pelo número!!"
51110-114 = "……!"
51110-121 = "(Quanto tempo será que já se passou……)"
51110-132 = "Pegue……!"
51110-133 = "!? "
51110-134 = "[ns] \"Direita!\""
51110-146 = "Entendi……"
51110-147 = "É a direita! Foquem na direita!!"
51110-148 = "Ela demora para reagir do lado direito!"
51110-149 = "Se encontrar o ponto fraco do oponente, continue atacando ali……#nÉ assim que a Trupe Chimi trabalha!"
51110-150 = "Problemático……"
51110-152 = "O lança-foguetes está pronto!"
51110-156 = "Uau! N-não dá para ver nada!"
51110-157 = "Cof, cof……"
51110-164 = "[ns] \"Vamos recuar por aqui.\""
51110-165 = "……Quem é você?"
51110-170 = "E-espere, eu sou……"
51110-177 = "[ns1] \"Hah, hah…… Acho que estamos seguros agora que chegamos aqui.\"\n[ns2] \"Que bom que você não se feriu gravemente.\""
51110-180 = "……Quem é você?"
51110-184 = "Sensei, de Schale……?"
51110-185 = "O sensei do Schale, se não me engano..."
51110-186 = "...Não precisava ter me ajudado."
51110-187 = "Eu teria dado conta daquilo sozinha..."
51110-192 = "[ns] \"Seu braço direito, você está ferida?\""
51110-193 = "……！"
51110-194 = "Meus movimentos do lado direito estavam lentos...?"
51110-195 = "A ponto de alguém que acabei de conhecer notar... Entendo."
51110-196 = "……Isso é."
51110-200 = "…………。"
51110-201 = "[s3] \"Desculpe se é algo que você não quer comentar.\"\n[s4] \"Não pretendo te forçar a falar.\""
51110-204 = "Então... o sensei do Schale precisa de algo de mim?"
51110-205 = "Você não estava me procurando, mas sim resolvendo algo em Hyakkiyako?#nE estar lá foi apenas uma coincidência? ...Entendo."
51110-206 = "[s] \"Esse seu uniforme, será que você é...\""
51110-210 = "Ah... isso... a Hyakka Ryoran é..."
51110-211 = "[s] \"Então você é mesmo da Hyakka Ryoran.\""
51110-212 = "…………。"
51110-213 = "Entendo. Pensando bem, eu ainda não tinha... com o sensei do Schale."
51110-214 = "……Sim."
51110-217 = "Como você disse."
51110-218 = "Eu sou... da Hyakka Ryoran."
51110-219 = "Não... sendo precisa, seria mais correto dizer que eu fui da Hyakka Ryoran."
51110-220 = "……Agora, eu já não faço mais parte."
51110-221 = "[s] \"Sim, eu ouvi falar. Que muitos membros saíram na época da ordem de dissolução.\""
51110-222 = "Ordem de dissolução..."
51110-223 = "Entendo, então a Hyakka Ryoran já..."
51110-224 = "……Sim, é verdade."
51110-225 = "Como fui eu quem tentou devolver aquilo, naturalmente aquelas garotas..."
51110-226 = "…………。"
51110-227 = "Isso. Eu também saí da Hyakka Ryoran... e resolvi dar uma volta pela cidade."
51110-228 = "Para espairecer, queria ver como estavam os preparativos para o festival."
51110-232 = "Obrigada por me ajudar."
51110-233 = "Sendo assim, eu vou..."
51110-234 = "[s] \"Já está tarde, vamos voltar para casa por hoje.\""
51110-238 = "Hm...? Por que eu iria com você...?"
51110-244 = "Ei, espere...!"
51110-251 = "（Um silêncio pairava entre os dois, longe da agitação）"
51110-252 = "…………。"
51110-253 = "……………………。"
51110-254 = "Você disse que... veio a Hyakkiyako por causa de um assunto pendente, não foi?"
51110-255 = "E também sabia sobre a \"ordem de dissolução\"."
51110-256 = "Sendo assim, será que... sobre a Hyakka Ryoran..."
51110-257 = "[s] \"Você está preocupada com a situação?\""
51110-258 = "……Sim. Já faz um bom tempo desde que saí."
51110-259 = "Fiquei um pouco curiosa."
51110-261 = "（Como não havia motivo para esconder, contei o que aconteceu hoje）"
51110-263 = "……\"Batalha de Sucessão\", é?"
51110-264 = "Entendo, coisas assim aconteceram enquanto eu estava fora."
51110-265 = "……Por que chegar a esse ponto?"
51110-266 = "……Não, eu não tenho o direito de dizer algo assim."
51110-267 = "[s] \"Acho que a Yukari sentiu que não dava para continuar daquele jeito.\""
51110-268 = "Sim, a Yukari..."
51110-270 = "Área residencial de Hyakkiyako"
51110-273 = "Já chega por aqui."
51110-274 = "Obrigada por me acompanhar, Sensei do Schale."
51110-275 = "...Até mais."
51110-276 = "[s] \"Você não pretende voltar para a Hyakka Ryoran?\""
51110-280 = "...Entendo."
51110-281 = "Você pergunta isso logo quando minha guarda está baixa."
51110-282 = "Você é uma pessoa mais astuta do que eu pensava."
51110-283 = "...Sinto muito, mas eu não posso voltar."
51110-284 = "[s] \"Porque você já saiu...?\""
51110-285 = "............É."
51110-286 = "Naquele dia, eu tentei devolver aquilo... por isso, elas não vão me perdoar."
51110-287 = "Voltar para a Hyakka Ryoran agora... eu não tenho coragem para isso."
51110-288 = "Porque eu não sou tão forte assim."
51110-289 = "Para começar... eu nem tenho mais o direito."
51110-290 = "Eu não sou \"aquela garota\" e..."
51110-295 = "Não quero decepcionar as que ficaram..."
51110-296 = "O motivo de eu não poder voltar é só esse... por isso..."
51110-301 = "[log=???]＜Mentira＞[/log]"
51110-304 = "＜Mentira＞"
51110-307 = "＜Mentira＞"
51110-310 = "＜Mentira＞"
51110-313 = "...Até mais."
51110-317 = "[ns] \"Talvez não fosse algo para se perguntar logo no primeiro encontro...\""
51110-321 = "[ns] \"Na próxima vez que nos encontrarmos... espero que, pelo menos, eu consiga saber o seu nome.\""
51110-323 = "(Enquanto ruminava a conversa de pouco tempo atrás, eu observava o pôr do sol)"
51110-325 = "Próximo episódio: Kiryu Kikyou e a Batalha de Sucessão (1)"
