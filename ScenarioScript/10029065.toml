[translation]
10029065-6 = "何よ、これ！また増えてる……本当、キリがないわね！"
10029065-7 = "それだけ重要な施設ってこと。#n私たちも全力で迎え撃つよ。"
10029065-12 = "まだバリアも残ってるし……"
10029065-14 = "ドローンもさらに増え続けてるみたいだ。#n一つひとつは大した問題ではないが……"
10029065-15 = "このままじゃ、施設の動きを止められない。"
10029065-16 = "後もう少しだというのに！！#nここまで来て、また最初からやり直しだなんて！？"
10029065-17 = "いや、そうでした！#n入り口に飛ばされるとは限りません……下手するともっと遠くに！？"
10029065-18 = "どうにかしなくては……！！"
10029065-19 = "はあああぁっ――！！！"
10029065-23 = "……んっ！？"
10029065-24 = "いったい何を……"
10029065-25 = "……！#nいつの間にパネルの前に！？"
10029065-26 = "……[ruby=さてん]佐天[/ruby]さん！？"
10029065-28 = "アレを壊せば良いんですよね？"
10029065-29 = "だったら、あたしが……！"
10029065-30 = "うああぁ！？ま、待ってください……！#nそのバリアに銃弾は通らな……！！"
10029065-31 = "銃弾がダメなら……！！"
10029065-32 = "……こうやって、壊せば良いんですよ！！！"
10029065-33 = "はああぁっ――！！"
10029065-47 = "はあっ……はあっ、はあ……はぁ……"
10029065-53 = "……はぁ……ふぅ。"
10029065-54 = "じ、銃身でバリアを……"
10029065-55 = "叩き壊すだなんてね……"
10029065-56 = "さ、先ほどの素晴らしいフォームは……？#nもしかして、向こうの世界では有名な野球の選手なのでしょうか！？"
10029065-57 = "あはは、選手とかじゃないんですけどね。"
10029065-58 = "……静かになったような気がしません？"
10029065-59 = "[s1] \"……本当だ。\"\n[s2] \"ドローンの動きが止まったね。\""
10029065-62 = "……やったのかしら？"
10029065-63 = "なんか……"
10029065-64 = "こうも呆気なく解決しちゃうと、ちょっと拍子抜けね。"
10029065-65 = "……[ruby=みさか]御坂[/ruby]さん。"
10029065-66 = "……あ。"
10029065-67 = "そういう言い方はフラグ……"
10029065-72 = "……ふふっ。"
10029065-74 = "やっぱりこうなると思ってました！！"
10029065-75 = "ああ……もうっ！"
10029065-81 = "……御坂さんったら、本当に期待を裏切らないわねぇ。"
10029065-82 = "機械から光が……！！"
10029065-83 = "……！"
10029065-84 = "うわああぁぁぁぁ――！？！？"
10029065-93 = "……あれ？"
10029065-95 = "……？"
10029065-96 = "……ん？"
10029065-97 = "どういう……こと？"
10029065-101 = "みんな、大丈夫……よね？#n全員、揃ってる？"
10029065-102 = "は、はい……あたしは大丈夫です。"
10029065-103 = "[s3] \"みんな無事で良かった。\"\n[s4] \"何も起こらなかったね。\""
10029065-106 = "……エラーが起きたのかな？"
10029065-107 = "予期せぬ衝撃が加わった事で、ストップしたのでしょうか！？"
10029065-108 = "……これで一件落着ですね！"
10029065-109 = "いや、私たちは施設を直してもらって帰るのが目的だから、何も解決していないのだけどぉ……"
10029065-110 = "……待って。"
10029065-111 = "「施設」は正常に作動したはず。"
10029065-112 = "今のは、私たちを転移させる動きじゃない。"
10029065-113 = "……何かが[ruby=・   ・]来る[/ruby]よ"
10029065-114 = "[s] \"…………。\""
10029065-116 = "[ns] \"…………？？？\""
10029065-132 = "！？！？！？"
