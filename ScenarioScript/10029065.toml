10029065-55 = "Na base da força bruta..."
10029065-56 = "A-aquela forma incrível de agora há pouco...?#nSerá que você é uma jogadora de beisebol famosa no seu mundo!?"
10029065-57 = "Ahaha, não sou jogadora nem nada do tipo."
10029065-58 = "……Não acham que ficou silencioso de repente?"
10029065-59 = "[s1] \"……É verdade.\"\n[s2] \"Os drones pararam de se mover.\""
10029065-62 = "……Será que conseguimos?"
10029065-63 = "É que..."
10029065-64 = "Resolver tudo tão facilmente assim, chega a ser decepcionante."
10029065-65 = "……Misaka-san."
10029065-66 = "……Ah."
10029065-67 = "Falar desse jeito atrai azar..."
10029065-72 = "……Fufu."
10029065-74 = "Eu sabia que ia acabar assim!!"
10029065-75 = "Ah... droga!"
10029065-81 = "……A Misaka-san nunca decepciona nas expectativas, né."
10029065-82 = "A máquina está emitindo luz...!!"
10029065-83 = "……!"
10029065-84 = "Uwaaaaaaaa――!?"
10029065-93 = "……Ué?"
10029065-95 = "……?"
10029065-96 = "……Hm?"
10029065-97 = "O que... significa isso?"
10029065-101 = "Pessoal, estão todas bem...?#nEstão todas aqui?"
10029065-102 = "S-sim... eu estou bem."
10029065-103 = "[s3] \"Que bom que estão todas a salvo.\"\n[s4] \"Não aconteceu nada, né.\""
10029065-106 = "……Será que deu erro?"
10029065-107 = "Será que parou por causa do impacto inesperado!?"
10029065-108 = "……Com isso, o caso está encerrado!"
10029065-109 = "Não, o nosso objetivo era consertar as instalações e ir embora, então nada foi resolvido ainda..."
10029065-110 = "……Espere."
