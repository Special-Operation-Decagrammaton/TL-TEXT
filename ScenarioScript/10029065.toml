[translation]
10029065-6 = "O que é isso! Estão aumentando de novo... Sério, isso não tem fim!"
10029065-7 = "Isso só mostra o quão importante é essa instalação.#nNós também vamos interceptá-los com força total."
10029065-12 = "A barreira ainda está ativa e..."
10029065-14 = "Parece que os drones continuam aumentando.#nIndividualmente não são um grande problema, mas..."
10029065-15 = "Desse jeito, não vamos conseguir parar o funcionamento da instalação."
10029065-16 = "E pensar que estávamos quase lá!!#nChegar até aqui para ter que começar tudo de novo!?"
10029065-17 = "Não, é isso mesmo!#nNão temos garantia de que seremos mandados para a entrada... Se der azar, podemos ir parar ainda mais longe!?"
10029065-18 = "Temos que dar um jeito nisso...!!"
10029065-19 = "Haaaaaaah――!!!"
10029065-23 = "……Hm!?"
10029065-24 = "O que você está fazendo..."
10029065-25 = "……!#nQuando foi que você chegou na frente do painel!?"
10029065-26 = "……Saten-san!?"
10029065-28 = "Se eu destruir aquilo, resolve, né?"
10029065-29 = "Então, eu vou..."
10029065-30 = "Uaaaa!? E-espere...!#nBalas não atravessam essa barreira...!!"
10029065-31 = "Se balas não funcionam, então...!!"
10029065-32 = "……É só destruir assim!!!"
10029065-33 = "Haaaaah――!!"
10029065-47 = "Ha... ha... ha... ha..."
10029065-53 = "……Ha... ufa."
