[translation]
1001606-1 = "大切な思い出です、先生"
1001606-3 = "わあ、すごいです！こんなにも色んなゲームが一か所に集まってるなんて！"
1001606-4 = "[s] \"最近のゲームは派手だし、種類も多いね。\""
1001606-5 = "そうですね、やったことのないゲームがこんなにたくさん……。"
1001606-6 = "ん？"
1001606-7 = "先生、あれ見てください。ゲーム機の中にぬいぐるみが……。"
1001606-8 = "あっ、このぬいぐるみ……"
1001606-9 = "レトロゲーム『フルゼリー』に出てくる、ゼリーズです！"
1001606-10 = "この中にいるということは……まさか、閉じ込められているんですか？"
1001606-11 = "[s] \"その発想はなかなか斬新。\""
1001606-12 = "あっ、待ってください……私、真実に気づいてしまったかもしれません。"
1001606-13 = "ゲーム開発部に代々受け継がれる話の中に、こういうものがありました。"
1001606-14 = "世の中にはUFOの操縦士になって、罪のない人形たちを大量に連れ去るゲームがある、という……。"
1001606-15 = "まさか、これがその……？"
1001606-16 = "[s1] \"なかなかハードな見方だね。\"\n[s2] \"間違ってはいないけど……。\""
1001606-17 = "わあ……すごいです。"
1001606-18 = "わあ……すごいです。"
1001606-19 = "[s] \"見てるだけじゃなくて、ミドリもやってみたら？\""
1001606-20 = "え？私が、ですか？"
1001606-21 = "で、できますかね？"
1001606-22 = "[s] \"大丈夫。それに、挑戦してみたらきっと勉強になるよ。\""
1001606-24 = "そ、それでは一度だけ……。"
1001606-30 = "[wa:1000]― 今まで[wa:1000]ドット絵のゲーム以外には[wa:1800]あまり興味がなかったんですけど……"
1001606-33 = "― ゲームセンターには[wa:1500]こういったゲームもあるんですね。"
1001606-36 = "[wa:500]― 視野が広がった気がします、[wa:2500]勉強になりました。"
1001606-39 = "[wa:1000]― ……ありがとうございます、[wa:1500]先生、"
1001606-41 = "― ここに連れて来てくださって。"
1001606-44 = "― ……そのお陰で[wa:500]私、[wa:1500]今、[wa:800]すごく楽しいです。"
1001606-47 = "[wa:2000]― あ、[wa:500]そうだ……"
1001606-49 = "― 今日のこと、[wa:1000]お姉ちゃん[wa:500]には……[wa:1500]内緒ですよ？"
1001606-52 = "[wa:200]― 絶対、[wa:1000]絶対ですからね！"
1001606-56 = "あっ、せ、先生！取れちゃいました！"
1001606-57 = "こ、これ、どうしましょう？"
1001606-58 = "[s3] \"ミドリが取ったんだから、ミドリのものだよ。\"\n[s4] \"勝者の戦利品だね。\""
1001606-59 = "あ……。"
1001606-60 = "あ……。"
1001606-61 = "ぬいぐるみ……先生との、思い出の……。"
1001606-62 = "……きっと、これからゲームセンターに来るたび、それに、このぬいぐるみを見るたびに。先生のことを思い浮かべると思います。"
1001606-63 = "ありがとうございます。先生。"
1001606-65 = "このぬいぐるみ、大事にしますね。"
