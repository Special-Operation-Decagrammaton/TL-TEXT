[translation]
1001606-1 = "É uma lembrança preciosa, Sensei."
1001606-3 = "Uau, que incrível! Tantos jogos diferentes reunidos em um só lugar!"
1001606-4 = "[s] \"Os jogos de hoje em dia são chamativos e existem muitos tipos, né?\""
1001606-5 = "É verdade, tantos jogos que eu nunca joguei antes..."
1001606-6 = "Hm?"
1001606-7 = "Sensei, olhe aquilo. Tem um bicho de pelúcia dentro da máquina de jogos..."
1001606-8 = "Ah, esse bicho de pelúcia..."
1001606-9 = "É o Jelly, do jogo retrô 'Full Jelly'!"
1001606-10 = "Se ele está aí dentro... será que ele está preso?"
1001606-11 = "[s] \"Essa é uma teoria bem inovadora.\""
1001606-12 = "Ah, espere um pouco... Acho que acabei de descobrir a verdade."
1001606-13 = "Existe uma história que é passada de geração em geração no Departamento de Desenvolvimento de Jogos."
1001606-14 = "Dizem que existe um jogo no mundo onde você pilota um OVNI e sequestra vários bonecos inocentes..."
1001606-15 = "Será que este é um deles...?"
1001606-16 = "[s1] \"Essa é uma visão bem radical, hein.\"\n[s2] \"Não que você esteja errada, mas...\""
1001606-17 = "Uau... incrível."
1001606-18 = "Uau... incrível."
1001606-19 = "[s] \"Em vez de só olhar, por que a Midori não tenta jogar também?\""
1001606-20 = "Eh? Eu?"
1001606-21 = "S-será que eu consigo?"
1001606-22 = "[s] \"Não se preocupe. Além disso, tentar algo novo com certeza será um aprendizado.\""
1001606-24 = "B-bem, então só uma vez..."
1001606-30 = "[wa:1000]― Até agora, [wa:1000] eu não tinha muito interesse em nada [wa:1800] além de jogos de pixel art, mas..."
1001606-33 = "― O fliperama também tem [wa:1500] jogos assim, né."
1001606-36 = "[wa:500]― Sinto que meus horizontes se expandiram, [wa:2500] foi um bom aprendizado."
1001606-39 = "[wa:1000]― ...Muito obrigada, [wa:1500] Sensei,"
1001606-41 = "― por ter me trazido aqui."
1001606-44 = "― ...Graças a isso, [wa:500] eu [wa:1500] estou [wa:800] me divertindo muito agora."
1001606-47 = "[wa:2000]― Ah, [wa:500] é verdade..."
1001606-49 = "― Sobre hoje, [wa:1000] não conte para a [wa:500] minha irmã... [wa:1500] é segredo, viu?"
1001606-52 = "[wa:200]― Prometido, [wa:1000] é um compromisso!"
1001606-56 = "Ah, S-Sensei! Eu consegui pegar!"
1001606-57 = "E-e agora, o que eu faço com isso?"
1001606-58 = "[s3] \"Já que foi a Midori quem pegou, é seu.\"\n[s4] \"É o troféu da vencedora.\""
1001606-59 = "Ah..."
1001606-60 = "Ah..."
1001606-61 = "O bicho de pelúcia... uma lembrança... com o Sensei."
1001606-62 = "...Com certeza, toda vez que eu vier ao fliperama daqui para frente, e toda vez que eu olhar para este bicho de pelúcia, vou me lembrar do Sensei."
1001606-63 = "Muito obrigada, Sensei."
1001606-65 = "Vou cuidar muito bem deste bicho de pelúcia."
