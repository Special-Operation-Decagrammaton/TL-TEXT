[translation]
52060-1 = "Episódio 6; O Festival e os Preparativos"
52060-6 = "Nya-ha~ Sejam bem-vindas, pessoal da Hyakkaryouran."
52060-7 = "Obrigada por se reunirem aqui, apesar do chamado repentino.#n"
52060-8 = "Iupii~"
52060-13 = "É natural que a Hyakkaryouran colabore com a manutenção da ordem em Hyakkiyako."
52060-14 = "Além disso, temos uma dívida com o Departamento Yin-Yang."
52060-15 = "Só que..."
52060-19 = "...Por que o Sensei está aqui?"
52060-20 = "[s1] \"Olá a todos.\"\n[s2] \"Como vocês estão?\""
52060-26 = "M-Mestre!?"
52060-27 = "Ora, Sensei! Fico feliz em ver seu rosto!"
52060-28 = "...Bom dia, Sensei."
52060-30 = "Desta vez, eu gostaria de contar com a ajuda do Sensei do SCHALE também...#nObrigada por vir de tão longe. Nya-ha."
52060-31 = "[s3] \"Não é tão longe assim. Além disso--\"\n[s4] \"Se uma aluna importante precisa de mim, eu irei a qualquer lugar.\""
52060-35 = "Haa...#nEu já imaginava quando fomos chamadas repentinamente pelo Departamento Yin-Yang."
52060-36 = "Chamar a Hyakkaryouran e o SCHALE ao mesmo tempo significa...#nÉ um caso tão problemático assim?"
52060-38 = "De jeito nenhum~♪#nEu não pediria algo tão pesado para convidados tão importantes, não é?"
52060-39 = "Afinal, somos nós que resolvemos a maioria dos problemas que acontecem em Hyakkiyako.#n...Né, Kaho?"
52060-40 = "...Sim. O pessoal do Departamento Yin-Yang, \"exceto a Niya-sama\", corre de um lado para o outro dia e noite."
52060-41 = "Que fria, hein~"
52060-46 = "Bem, o trabalho da Chefe Niya é famoso, afinal."
52060-48 = "Eu também já ouvi falar.#nDizem que quando pedem algo para a Chefe Niya,#npor algum motivo, acabam tendo que resolver sozinhos..."
52060-49 = "Entendi!#nComo uma líder inteligente,#nela guia as pessoas sutilmente para que resolvam os problemas por conta própria!"
52060-51 = "Ora, ora? O clima parece que vai mudar..."
52060-52 = "B-Bem... como o Sensei deve saber,#nHyakkiyako é uma escola conhecida pelo turismo e pelos festivais.#nPor isso, durante o período de festivais, acontecem muitos incidentes e acidentes..."
52060-53 = "Por conta disso,#npensei em pedir a ajuda do Sensei e do pessoal da Hyakkaryouran,#ne foi por isso que os convidei."
52060-54 = "[s] \"Preparativos para um novo festival?\""
52060-55 = "Sim. Em Hyakkiyako, realizamos festivais em todas as estações."
52060-56 = "O \"Festival das Flores de Cerejeira de Hyakkiya\", que celebra a primavera suave,#no \"Festival Aquático de Hyakkiya\", que espanta o calor abafado--"
52060-57 = "O \"Festival da Árvore Sagrada\", que reza pela colheita de outono,#ne o \"Festival da Neve de Hyakkiya\", onde esquecemos o frio e ficamos encantados com as esculturas de gelo...#nClaro, também há vários eventos grandes e pequenos entre os festivais das estações."
52060-58 = "E o que será realizado desta vez é...!"
52060-64 = "O Festival Waraku~!"
52060-66 = "Ieei."
52060-72 = "P-Perdão pelo comportamento..."
52060-73 = "Nya-ha, tudo bem, tudo bem♪"
52060-74 = "Então, Kaho, você pode explicar para o Sensei?"
52060-75 = "O Festival Waraku é, literalmente, um festival para espalhar o charme da Chise-chan,#nrepleto de tudo o que torna a Chise-chan encantadora."
52060-76 = "Os haicais da Chise-chan, exposição de seus itens favoritos e, além disso...#nvenda de acrílicos limitados com ilustrações da Chise-chan!"
52060-77 = "E o destaque principal, que eu recomendo fortemente, é--"
52060-78 = "O show especial da Chise-chan!"
52060-79 = "Normalmente, a Chise-chan não canta muito...#nmas sua voz tem um charme maravilhoso que acalma o coração de quem a ouve."
52060-80 = "Não podemos perder nem um segundo da Chise-chan!#nPor isso, preparei três câmeras equipadas com lentes super teleobjetivas de 800mm e--"
52060-82 = "K-Kaho... já chega disso..."
52060-83 = "Controle-se~"
52060-88 = "M-Mais uma vez... peço perdão."
52060-89 = "[s5] \"B-Bem...\"\n[s6] \"Vejo que estão se esforçando bastante neste festival.\""
52060-92 = "C-Claro!"
52060-93 = "Eu também estou me esforçando~"
52060-94 = "[s] \"Muito bem!\""
52060-95 = "Eu sei que vocês estão se dedicando mais do que o normal para este Festival Waraku."
52060-96 = "Por isso, pretendo colaborar ativamente com a patrulha do local e a denúncia de delinquentes, mas..."
52060-97 = "Claro, agradeço muito pela colaboração diária de todos vocês."
52060-98 = "No entanto, houve um pequeno problema fora do local do evento."
52060-100 = "Um... problema?"
52060-102 = "Pessoal, qual é a coisa mais importante em um festival?"
52060-103 = "Um local que possa acomodar um grande número de pessoas...?"
52060-105 = "Decorações luxuosas também são indispensáveis!"
52060-106 = "Acho que é a variedade das barracas. Falando em festival, o que importa é comer enquanto caminha, né?"
52060-107 = "Concordo, não pode faltar um espetinho de frango."
52060-108 = "Sim, o espetinho também, mas... no fim das contas, o que importa é a comida típica do festival!"
52060-109 = "Precisamos que os turistas gastem dinheiro por aqui, afinal..."
52060-113 = "...Mas, sobre essas comidas de barraca, vocês sabem de onde vêm os ingredientes?"
52060-114 = "[s] \"Não vêm de fora de Hyakkiyako?\""
52060-115 = "Para conseguir grandes quantidades de ingredientes frescos, #né um pouco difícil trazer de lugares muito distantes."
52060-116 = "A maior parte deles é fornecida pela \"Escola Filial Ebisu\", #nno Distrito Norte."
52060-117 = "[s] \"Escola Filial Ebisu...?\""
52060-118 = "Sim. #nEmbora hoje seja chamada de Academia \"União\" de Hyakkiyako, #nna época das guerras antigas, existiam várias escolas filiais."
52060-119 = "Como um vestígio disso, algumas escolas localizadas em áreas remotas #npermanecem como filiais até hoje."
52060-120 = "A \"Escola Filial Ebisu\", no Distrito Norte, é uma delas."
52060-121 = "Eles possuem vastas terras agrícolas #ne nos fornecem os produtos colhidos lá."
52060-125 = "Hm? O Distrito Norte não é um lugar onde neva até no verão? #nDá para cultivar alguma coisa lá?"
52060-126 = "Fufu. Raízes ficam mais doces quanto mais frio estiver, sabia? #nAlém disso, o Distrito Norte inteiro não é um clima de campo de neve constante."
52060-128 = "Peixes, frutas e laticínios, como queijos, também têm uma ótima reputação."
52060-129 = "O caranguejo-peludo também é delicioso~"
52060-130 = "[s7] \"Parece que há uma natureza exuberante por lá...\"\n[s8] \"Se tiver uma oportunidade, adoraria visitar.\""
52060-133 = "...E é dessa Escola Filial Ebisu que recebemos um pedido de ajuda."
52060-140 = "Quando o céu está nublado ou quando o sol começa a se pôr... #nDizem que \"assombrações\" aparecem por lá."
52060-141 = "...O que é isso?"
52060-142 = "É um nome vago, mas..."
52060-143 = "Dizem que \"aquilo\" que ataca as pessoas tem aparências completamente diferentes, #nentão não há outra forma de descrever."
52060-144 = "Às vezes uma forma grotesca, às vezes uma fera, #ne até mesmo a aparência de alguém conhecido pela testemunha..."
52060-148 = "No entanto, há pontos em comum."
52060-149 = "Primeiro, assume a forma de algo que o alvo teme."
52060-150 = "Segundo, armas de fogo comuns não causam nem um arranhão."
52060-159 = "...\"Cem Histórias de Fantasmas\". "
52060-160 = "Sim, penso o mesmo."
52060-161 = "Algo como um espírito maligno que se alimenta do medo e perturba o coração de quem o vê."
52060-162 = "Como o Departamento Yin-Yang, #nsuspeitamos de uma conexão com as Cem Histórias que apareceram no Festival das Lanternas."
52060-167 = "E se for uma assombração nascida de tais histórias de fantasmas, #nsomente a \"Presidente do Hyakka Ryoran\" e a \"Hyakuren\", #nque é a prova de seu cargo, podem derrotá-la."
52060-168 = "……."
52060-170 = "Ainda não há muitas testemunhas das assombrações. #nMas, se a existência delas se tornar conhecida, pode afetar negativamente o festival."
52060-171 = "Por isso, queremos pedir a vocês, que podem derrotar as Cem Histórias, que resolvam isso."
52060-173 = "Claro que somos as mais indicadas, mas..."
52060-174 = "Para ser exata, a única que pode manejar a Hyakuren é a Nagusa-senpai, a presidente interina."
52060-180 = "...Então é só ir para o \"Distrito Norte\", certo?"
52060-181 = "Não devo conseguir fazer tão bem quanto a Ayame, mas... vou tentar."
52060-182 = "...Vamos nessa."
52060-183 = "Certo! Vamos acabar logo com esses monstros e curar o braço da Nagusa-senpai também!"
52060-184 = "Também vamos resgatar a presidente Ayame!"
52060-186 = "...Fufu. Parece que nossos interesses coincidiram."
52060-187 = "Se um único pedido resolver o seu problema também, então é como matar dois coelhos com uma cajadada só..."
52060-188 = "Não... se incluirmos o Sensei, seriam três coelhos com uma cajadada só, não é?"
52060-189 = "[s] \"Por que você me chamou...?\""
52060-190 = "Pensei que o Sensei estivesse preocupado com algo~"
52060-191 = "Sobre aquele assunto da Kuzunoha, você sabe, não sabe?"
52060-192 = "[s9] \"Sim, claro.\"\n[s10] \"...Mas acho que já está tudo bem.\""
52060-197 = "Nya-ha...!?"
52060-198 = "Isso é... surpreendente. Achei que você ainda estivesse correndo contra o tempo para tentar restaurar aqueles que foram tocados pelo Cromatismo..."
52060-199 = "Ter resolvido tudo enquanto não nos víamos! ...Ora, ora, o Sensei [USERNAME] sempre me surpreende."
52060-203 = "Para seu conhecimento, segundo uma passagem de registros antigos, a Grande Profetisa Kuzunoha está no \"Templo do Crepúsculo\"."
52060-204 = "Claro, existem pouquíssimos relatos de quem realmente viu o \"Templo do Crepúsculo\". A localização exata é desconhecida."
52060-205 = "Mas... ouvi dizer que há um caminho para o templo no centro da Grande Planície Nevada."
52060-206 = "Procurar por um templo isolado no meio de uma planície nevada sem fim é imprudente demais. Para ser sincera, eu estava cética, mas..."
52060-207 = "A carta de Kuzunoha que a vice-presidente Nagusa trouxe da Grande Planície Nevada... ela realmente existe..."
52060-208 = "[s] \"Então, vou direto para a Grande Planície Nevada...\""
52060-209 = "...Sensei. Não importa o quanto você se prepare, a Grande Planície Nevada é um lugar perigoso. Acho difícil para alguém cujo corpo não aguenta nem um tiro."
52060-210 = "[s] \"É, é tão perigoso assim...?\""
52060-211 = "Fufu. Mas... há uma área comercial perto da filial de Ebisu."
52060-212 = "Se você se dedicar a ajudar as pessoas de lá junto com o pessoal da Hyakkiyako..."
52060-218 = "Talvez a lendária Grande Profetisa apareça de repente... quem sabe?"
52060-219 = "[s11] \"Obrigado, Niya.\"\n[s12] \"Isso ajuda muito.\""
52060-222 = "Eu que agradeço... digo, não, não, sou eu quem agradece por sua cooperação em resolver este problema."
52060-223 = "Niya-sama..."
52060-224 = "Eu também posso ir~?"
52060-225 = "Isso... não é possível. Chise-chan, vamos continuar com os preparativos para o Festival Waraku aqui."
52060-226 = "Eu queria ver a paisagem nevada..."
52060-230 = "Uuu...! A Chise-chan com essa cara triste! Meu coração está se partindo..."
52060-231 = "M-mas! Para o sucesso do Festival Waraku, não posso deixar a Chise-chan ir agora...!"
52060-232 = "[s] \"Vamos juntos na próxima vez.\""
52060-233 = "Sim, estarei esperando, Sensei."
52060-235 = "Já avisei a filial de Ebisu sobre isso. Em vez da Chise-nyan... por assim dizer, alguém virá para buscá-lo."
52060-236 = "Você estará com o pessoal da Hyakkiyako, então acho que ficará bem, mas... aquele lugar está fora do nosso alcance."
52060-237 = "Sensei, por favor, tome cuidado."
52060-239 = "Próximo episódio: Terra da Neve"
