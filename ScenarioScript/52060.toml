[translation]
52060-1 = "第6話;お祭りと準備"
52060-6 = "にゃは～いらっしゃい、百花繚乱のみなさん。"
52060-7 = "急な呼び出しにもかかわらずお集まりいただき、#nありがとうございます。"
52060-8 = "やっほ～"
52060-13 = "百花繚乱が百鬼夜行の治安維持に協力するのは、当然のことだから。"
52060-14 = "それに[ruby=おんみょうぶ]陰陽部[/ruby]には借りがある。"
52060-15 = "ただ……。"
52060-19 = "……なんで先生がいるの？"
52060-20 = "[s1] \"久しぶり、みんな。\"\n[s2] \"元気してた？\""
52060-26 = "し、師匠！？"
52060-27 = "あら、先生！お顔が見られて嬉しいですわ！"
52060-28 = "……おはよう、先生。"
52060-30 = "この度は[USERNAME]先生の力もお借りしたく……#n遠路はるばるご足労いただきました。にゃはっ。"
52060-31 = "[s3] \"そこまで遠くもないよ。それに――\"\n[s4] \"大事な生徒の頼みなら、どこへだって駆けつけるからね。\""
52060-35 = "はぁ……。#n陰陽部から突然呼び出された時点で、想像はしてたけど。"
52060-36 = "[ruby=わたしたち]百花繚乱[/ruby]とシャーレを同時に呼んだってことは……#nそんなに厄介な案件なの？"
52060-38 = "まっさか～♪#n大切なお客様方に、そんな重たいお願いはしませんよ？"
52060-39 = "百鬼夜行で起こる面倒事は、大体私たちが処理してるんですから。#n……ねっ？カホ。"
52060-40 = "……はい。「ニヤ様以外の」陰陽部の者が、日夜奔走しております。"
52060-41 = "つめたいなぁ、もう～"
52060-46 = "まぁ、ニヤ部長の仕事ぶりは有名だものね。"
52060-48 = "アタシも聞いたことあるぞ。#nニヤ部長に依頼すると、#nなぜか結局自分で解決する羽目になってるとか……。"
52060-49 = "なるほど！#n聡明なりぃだぁたるもの、#n自ら問題を解決できるようさりげなく導くのですね！"
52060-51 = "あらあら？なんだか雲行きが……。"
52060-52 = "と、とにかく……先生もご存じかとは思いますが、#n百鬼夜行連合学院は観光とお祭りで知られる学園です。#nそれだけに、お祭り期間中は事件や事故も多くてですね……。"
52060-53 = "そんなわけで、#n今回は先生と百花繚乱の皆さんの手を借りられないかと思い、#nこの場にお招きした次第です。"
52060-54 = "[s] \"新しいお祭りの準備？\""
52060-55 = "ええ。百鬼夜行では、季節を問わずお祭りが行われてますから。"
52060-56 = "うららかな春を楽しむ「[ruby=ももよのはるのおうかさい]百夜ノ春ノ桜花祭[/ruby]」、#n蒸し暑さも吹き飛ばす「[ruby=ももよすいじょうさい]百夜水上祭[/ruby]」――"
52060-57 = "秋の豊作を祈る「[ruby=かみきさい]神木祭[/ruby]」、#nそして、寒さも忘れて雪像に心奪われる「[ruby=ももよのふゆのせっかさい]百夜ノ冬ノ雪華祭[/ruby]」……#nもちろん、四季のお祭りの間にも大小様々な催しがあります。"
52060-58 = "そして、今回開催されるのは……！"
52060-64 = "[ruby=わらく]和楽[/ruby]まつり～！"
52060-66 = "いえ～い。"
52060-72 = "し、失礼しました……！"
52060-73 = "にゃはは、大丈夫大丈夫♪"
52060-74 = "それじゃ、カホから先生に説明してもらえる？"
52060-75 = "和楽まつりは文字通り、和楽チセちゃんの魅力を広めるための、#nチセちゃんの魅力が詰まったお祭りです。"
52060-76 = "チセちゃんの俳句、愛用品の展示、そして……#nチセちゃんのイラストがデザインされた、限定アクスタの販売！ "
52060-77 = "特にイチオシの目玉企画が――"
52060-78 = "チセちゃんのスペシャルライブ！"
52060-79 = "普段、チセちゃんはあまり歌うことがありませんが……#nその歌声は聴く者の心を潤す、素敵な魅力があるのです。"
52060-80 = "そんなチセちゃんの姿を1コマも撮り逃してはならない！#nと、800mmの超望遠レンズを装着したカメラを3台手配し――"
52060-82 = "か、カホ……そのくらいで……。"
52060-83 = "おさえて～"
52060-88 = "ま、またしても……申し訳ありません。"
52060-89 = "[s5] \"と、とにかく……。\"\n[s6] \"今回のお祭りに力を入れてるんだね。\""
52060-92 = "も、もちろんです！"
52060-93 = "私も頑張ってるよ～"
52060-94 = "[s] \"えらい～！\""
52060-95 = "今回の和楽まつり、普段よりも気合が入っているのは知ってるよ。"
52060-96 = "だから、会場の巡回や不良の摘発にも積極的に協力してるつもりだけど……。"
52060-97 = "もちろん、皆さんの日頃のご協力にはとても感謝しております。"
52060-98 = "ただ、会場の外でちょっとしたトラブルがありまして。"
52060-100 = "とらぶる……ですか？"
52060-102 = "皆さん、お祭りにおいて一番重要なことは何ですか？"
52060-103 = "大人数を収容できる会場……？"
52060-105 = "ごーじゃすな飾りつけも欠かせませんわ！"
52060-106 = "やっぱ出店の種類かな。お祭りといえば、食べ歩きだろ？"
52060-107 = "そうだね、焼き鳥がないと。"
52060-108 = "ええ、焼き鳥もですが……つまるところ重要なのは、#nお祭りならではの食べ物です！"
52060-109 = "観光客のみなさんには、お金を落としてもらわないとですし……。"
52060-113 = "……そんな屋台料理ですが、仕入れ先はご存じですか？"
52060-114 = "[s] \"百鬼夜行の外じゃないの？\""
52060-115 = "新鮮な食材を大量に調達するには、#n遠方ではちょ～っと無理がありましてねぇ。"
52060-116 = "そのほとんどを、#n北部自治区の「エビス分校」から仕入れているんです。"
52060-117 = "[s] \"エビス分校……？\""
52060-118 = "ええ。#nいまでこそ百鬼夜行「連合」学院という名ですが、#nかつての戦乱の時代にはさまざまな分校が存在していました。"
52060-119 = "その名残として、人里離れた土地にある一部の学園は、#n今も分校として残っています。"
52060-120 = "北部自治区にある「エビス分校」もその一つ。"
52060-121 = "広大な農地を保有しており、#nそこで採れた農産物を提供してくれています。"
52060-125 = "ん？北部自治区って、夏でも雪が降るような場所だろ？#n作物が育つのか？"
52060-126 = "ふふっ。根菜は寒ければ寒いほど甘くなるのですよ？#nそれに、北部自治区全域が大雪原のような気候というわけでもありませんし。"
52060-128 = "お魚や果物、あとはチーズなどの乳製品も評判です。"
52060-129 = "毛ガニも美味しい～"
52060-130 = "[s7] \"豊かな自然が広がってそうだね……。\"\n[s8] \"機会があれば是非行ってみたいな。\""
52060-133 = "……と、そんなエビス分校から助けを求められておりまして。"
52060-140 = "曇り空の時や、日が落ち始めた頃……#n「怪異」が姿を見せるのだとか。"
52060-141 = "……なにそれ？"
52060-142 = "曖昧な名ですが……。"
52060-143 = "人々を襲う「ソレ」は皆バラバラの見た目をしているそうで、#nそう形容する他ありません。"
52060-144 = "ときにはおぞましい異形、ときには猛獣、#nそして、目撃者の知人の姿にも……。"
52060-148 = "しかし、一応は共通点がありましてね。"
52060-149 = "一つ、対象が恐れる存在の姿をしている。"
52060-150 = "二つ、一般的な銃火器では、傷一つつかない。"
52060-159 = "…[ruby=げんりょうひゃくものがたり]…「幻魎百物語」。[/ruby]"
52060-160 = "ええ、私も同じ考えです。"
52060-161 = "恐怖を餌とし、見た者の心をかき乱す魑魅魍魎のようなもの。"
52060-162 = "陰陽部としては――#n燈籠祭に現れた、百物語との繋がりを疑っています。"
52060-167 = "そして、そのような怪談から生まれし怪異だとすれば――#nそれを倒せるのは「百花繚乱の委員長」と、#nその証である「百蓮」のみ。"
52060-168 = "……。"
52060-170 = "怪異の目撃者はまだ多くありません。#nですがその存在が知れ渡れば、お祭りへの悪影響が考えられます。"
52060-171 = "そこで、百物語を退治できる皆さんに、解決をお願いしたいのです。"
52060-173 = "もちろんアタシらが適任なんだろうけど……。"
52060-174 = "正確に言うと、百蓮を扱えるのは委員長代理のナグサ先輩だけ。"
52060-180 = "……「北部自治区」に行けばいいんだよね？"
52060-181 = "アヤメほど上手くはできないだろうけど……やってみる。"
52060-182 = "……行こうか。"
52060-183 = "よし！さっさと化け物退治をして、ナグサ先輩の腕も治しちゃおう！"
52060-184 = "アヤメ委員長も助け出してみせますの！"
52060-186 = "……ふふ。どうやら利害が一致したようですね。"
52060-187 = "お願い一つでそちらの問題も解決するのなら一石二鳥……。"
52060-188 = "いえ……先生も入れれば、一石三鳥ですか。"
52060-189 = "[s] \"私を呼んだ理由は……？\""
52060-190 = "先生には気になってることがおありかと思いまして～"
52060-191 = "例のクズノハの件、ご存じですよね？"
52060-192 = "[s9] \"うん、もちろん。\"\n[s10] \"……でも、もう大丈夫だと思う。\""
52060-197 = "にゃはっ……！？"
52060-198 = "それは……驚きですね。#n色彩に触れた者を元に戻そうとして、#nまだ奔走されていると思っていたのですが……。"
52060-199 = "少し会わぬ間に片付けられていたとは！#n……いやはや、いつも[USERNAME]先生には驚かされますねぇ。"
52060-203 = "一応お伝えしておきますと、古い記録の一説によれば、#n大預言者クズノハは「黄昏の寺院」にいるのだとか。"
52060-204 = "もちろん、「黄昏の寺院」を実際に目撃したとされる証言はほんの僅か。#n正確な位置は知られておりません。"
52060-205 = "ですが……大雪原の中央に、寺院への道があると聞いております。"
52060-206 = "果てしない大雪原の中、#nぽつんと存在する寺院を探し求めるなんて、あまりに無謀です。#n正直言って、半信半疑でしたが――"
52060-207 = "ナグサ副委員長が大雪原から持ち帰ったクズノハの手紙――#nそれは確かに存在する……。"
52060-208 = "[s] \"じゃあ、直接大雪原に――\""
52060-209 = "……先生。どれほどの準備があっても、大雪原は危険な場所です。#n銃弾一つ耐えられない体では厳しいかと。"
52060-210 = "[s] \"そ、そんなに……？\""
52060-211 = "ふふっ。ですが……エビス分校付近には繁華街が広がっています。"
52060-212 = "そこで百花繚乱の皆さんと人助けに勤しめば――"
52060-218 = "伝説の大預言者がひょっこり顔を出す……なんてことも？"
52060-219 = "[s11] \"ありがとう、ニヤ。\"\n[s12] \"助かるよ。\""
52060-222 = "こちらこそめんどくさ……#nいやいや、問題解決にご協力いただき、感謝の念が堪えません。"
52060-223 = "ニヤ様……。"
52060-224 = "私も一緒にいく～？"
52060-225 = "それは……いけません。#nチセちゃんは、ここで和楽まつりの準備を続けましょう。"
52060-226 = "雪景色……見たかったな。"
52060-230 = "うううっ……！悲しそうなチセちゃん！#n胸が張り裂けそうです……。"
52060-231 = "で、ですが！#n和楽まつり成功のためにも、今チセちゃんを渡すわけには……！"
52060-232 = "[s] \"また今度一緒に行こうね。\""
52060-233 = "うん、待ってるね先生。"
52060-235 = "既にエビス分校にもこの件は伝えました。#nチセにゃんの代わり……と言ってはなんですが、#nお迎えの方が来るはずです。"
52060-236 = "百花繚乱の皆さんとご一緒ですし、大丈夫だとは思いますが……#nあそこは、私たちの手の届かない場所です。"
52060-237 = "先生、どうかお気をつけて。"
52060-239 = "次回;雪国"
