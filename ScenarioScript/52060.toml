[translation]
52060-1 = "Episódio 3; Um Novo Festival"
52060-6 = "Nyaha~ bem-vindas, pessoal da Hyakkaryouran."
52060-7 = "Obrigada por se reunirem, apesar da convocação repentina."
52060-8 = "Olá~"
52060-13 = "É natural que a Hyakkaryouran colabore com a manutenção da ordem em Hyakkiyako."
52060-14 = "Além disso, temos uma dívida com o Clube Yin-Yang."
52060-15 = "Só que......"
52060-19 = "......Por que o Sensei está aqui?"
52060-20 = "[s1] \"Há quanto tempo, pessoal.\"\n[s2] \"Estão todas bem?\""
52060-26 = "Me, Mestre!?"
52060-27 = "Ah, Sensei! Fico feliz em vê-lo!"
52060-28 = "......Bom dia, Sensei."
52060-30 = "Desta vez, gostaríamos de contar também com a ajuda do Sensei... #n obrigado por ter vindo de tão longe. Nyaha."
52060-31 = "[s3] \"Não é tão longe assim. Além disso――\"\n[s4] \"Se uma aluna importante me pede, eu correria para qualquer lugar.\""
52060-35 = "Haa...... #n Imaginei que fosse isso quando fui chamada repentinamente pelo Clube Yin-Yang."
52060-36 = "Chamar a Hyakkaryouran e a Schale ao mesmo tempo significa... #n que é um caso tão problemático assim?"
52060-38 = "Claro que não~ ♪ #n Eu não pediria algo tão pesado para clientes tão importantes, certo?"
52060-39 = "Afinal, a maioria dos problemas que acontecem em Hyakkiyako somos nós que resolvemos. #n ......Né? Kaho."
52060-40 = "......Sim. O pessoal do Clube Yin-Yang 'que não é a Niya-sama' corre de um lado para o outro dia e noite."
52060-41 = "Que frieza, puxa~"
52060-46 = "Bem, o trabalho da presidente Niya é famoso, afinal."
52060-48 = "Eu também já ouvi falar. #n Que quando pedem algo para a presidente Niya, #n por algum motivo, acabam tendo que resolver sozinhos..."
52060-49 = "Entendi! #n Como uma líder inteligente, #n ela guia discretamente para que possamos resolver os problemas por conta própria!"
52060-51 = "Ara ara? O clima parece que vai mudar..."
52060-52 = "De, de qualquer forma... como o Sensei deve saber, #n a Academia da Aliança Hyakkiyako é conhecida por seu turismo e festivais. #n Por isso, acontecem muitos incidentes e acidentes durante os períodos de festival..."
52060-53 = "Sendo assim, #n pensei em pedir a ajuda do Sensei e de todo o pessoal da Hyakkaryouran, #n e foi por isso que os convidei para cá."
52060-54 = "[s] \"Preparativos para um novo festival?\""
52060-55 = "Sim. Em Hyakkiyako, os festivais acontecem independentemente da estação."
52060-56 = "O 'Festival das Cerejeiras da Primavera de Hyakki', para aproveitar a primavera amena, #n e o 'Festival Aquático de Hyakki', para espantar o calor abafado――"
52060-57 = "O 'Festival da Árvore Sagrada', para rezar por uma boa colheita no outono, #n e o 'Festival da Neve de Inverno de Hyakki', onde nos perdemos nas esculturas de neve esquecendo até o frio... #n Claro, também há vários outros eventos grandes e pequenos entre os festivais das estações."
52060-58 = "E, o que será realizado desta vez é...!"
52060-64 = "O Festival Waraku~!"
52060-66 = "Iêêêi."
52060-72 = "Pe, perdão pelo transtorno...!"
52060-73 = "Nyahaha, tudo bem, tudo bem ♪"
52060-74 = "Então, Kaho, pode explicar ao Sensei?"
52060-75 = "O Festival Waraku é, literalmente, um festival cheio dos encantos da Chise-chan, #n feito para espalhar seus encantos."
52060-76 = "Os haikus da Chise-chan, exibição de seus itens favoritos e... #n a venda de acrílicos exclusivos desenhados com ilustrações da Chise-chan!"
52060-77 = "E o destaque principal, nossa recomendação número um――"
52060-78 = "O show especial da Chise-chan!"
52060-79 = "A Chise-chan raramente canta... #n mas sua voz tem um encanto maravilhoso que acalma o coração de quem ouve."
52060-80 = "Não podemos perder nenhum frame da Chise-chan! #n Foi com esse pensamento que preparei três câmeras equipadas com lentes super telefoto de 800mm――"
52060-82 = "Ka, Kaho... por aí já basta..."
52060-83 = "Controle-se~"
52060-88 = "Mais uma vez... sinto muito."
52060-89 = "[s5] \"De, de qualquer forma...\"\n[s6] \"Vejo que estão se esforçando bastante neste festival.\""
52060-92 = "C, claro!"
52060-93 = "Eu também estou me esforçando~"
52060-94 = "[s] \"Muito bem~!\""
52060-95 = "Sei que vocês estão com mais energia do que o normal para este Festival Waraku."
52060-96 = "Por isso, pretendo colaborar ativamente com a patrulha do local e a denúncia de delinquentes, mas..."
52060-97 = "Claro, somos muito gratas pela colaboração diária de todos vocês."
52060-98 = "Só que tivemos um pequeno problema fora do local do festival."
52060-100 = "Problema......?"
52060-102 = "Pessoal, qual é a coisa mais importante em um festival?"
52060-103 = "Um local que comporte muitas pessoas...?"
52060-105 = "Decorações deslumbrantes também são essenciais!"
52060-106 = "Acho que são os tipos de barracas. Falando em festival, é comer enquanto caminha, né?"
52060-107 = "Isso, não pode faltar um espetinho de frango."
52060-108 = "Sim, espetinhos também, mas... no final das contas, o que importa #n é a comida típica de festival!"
52060-109 = "Precisamos que os turistas gastem seu dinheiro..."
52060-113 = "......Falando em comida de barraca, sabem de onde vêm os ingredientes?"
52060-114 = "[s] \"Não vêm de fora de Hyakkiyako?\""
52060-115 = "Para adquirir grandes quantidades de ingredientes frescos, #n seria um pouco impossível se viessem de longe."
52060-116 = "A maior parte deles, #n compramos da 'Filial Ebisu', no Distrito Norte."
52060-117 = "[s] \"Filial Ebisu...?\""
52060-118 = "Sim. #n Embora hoje sejam chamadas de 'Academia da Aliança Hyakkiyako', #n na época das guerras antigas, existiam várias filiais."
52060-119 = "Como um vestígio disso, algumas academias em terras remotas #n ainda permanecem como filiais."
52060-120 = "A 'Filial Ebisu' no Distrito Norte é uma delas."
52060-121 = "Eles possuem vastas terras agrícolas #n e fornecem os produtos colhidos lá."
52060-125 = "Hm? O Distrito Norte é um lugar onde neva até no verão, não é? #n Dá para cultivar coisas lá?"
52060-126 = "Fufu. Quanto mais frio, mais doces os legumes de raiz ficam, sabe? #n Além disso, não é como se todo o Distrito Norte tivesse um clima de campo de neve."
52060-128 = "Peixes, frutas e laticínios como queijos também são famosos."
52060-129 = "O caranguejo peludo também é delicioso~"
52060-130 = "[s7] \"Parece um lugar com uma natureza rica...\"\n[s8] \"Se tiver oportunidade, adoraria ir visitar.\""
52060-133 = "......E bem, pediram ajuda à Filial Ebisu."
52060-140 = "Quando o céu está nublado ou quando o sol começa a se pôr... #n dizem que 'assombrações' aparecem."
52060-141 = "......O que é isso?"
52060-142 = "É um nome vago, mas......"
52060-143 = "Dizem que 'Aquilo' que ataca as pessoas tem aparências variadas, #n não há outra forma de descrever."
52060-144 = "Às vezes uma figura grotesca e bizarra, às vezes uma fera, #n e, outras vezes, a aparência de um conhecido da testemunha..."
52060-148 = "No entanto, há um ponto em comum."
52060-149 = "Primeiro, assume a forma de algo que o alvo teme."
52060-150 = "Segundo, armas de fogo comuns não causam nem um arranhão."
52060-159 = "......'Genryou Hyakumonogatari'."
52060-160 = "Sim, penso o mesmo."
52060-161 = "Algo como um espírito maligno que se alimenta de medo e perturba a mente de quem o vê."
52060-162 = "Como Clube Yin-Yang―― #n suspeitamos de uma conexão com a Hyakumonogatari que apareceu no Festival das Lanternas."
52060-167 = "E, se for uma assombração nascida de tais histórias de fantasmas―― #n quem pode derrotá-la é a 'Presidente da Hyakkaryouran' e #n a 'Hyakuren', que é sua prova."
52060-168 = "......"
52060-170 = "Não há muitas testemunhas das assombrações. #n Mas se sua existência for espalhada, temo uma influência negativa no festival."
52060-171 = "Por isso, peço que vocês, que podem exterminar a Hyakumonogatari, resolvam o problema."
52060-173 = "Claro, acho que somos as mais qualificadas..."
52060-174 = "Para ser exata, a única que pode manusear a Hyakuren é a Nagusa-senpai, a presidente interina."
52060-180 = "......Então só precisamos ir ao 'Distrito Norte', certo?"
52060-181 = "Não acho que conseguirei fazer tão bem quanto a Ayame... #n mas vou tentar."
52060-182 = "......Vamos nessa."
52060-183 = "Beleza! Vamos exterminar esses monstros logo e curar o braço da Nagusa-senpai também!"
52060-184 = "Também vamos resgatar a Presidente Ayame!"
52060-186 = "......Fufu. Parece que seus interesses coincidem."
52060-187 = "Se um único pedido resolve esses problemas, é matar dois coelhos com uma cajadada só..."
52060-188 = "Não... com o Sensei incluído, talvez matar três coelhos com uma cajadada só?"
52060-189 = "[s] \"Por que você me chamou...?\""
52060-190 = "Pensei que o Sensei estivesse curioso sobre isso~"
52060-191 = "Sabe sobre o caso de Kuzunoha, não sabe?"
52060-192 = "[s9] \"Sim, claro.\"\n[s10] \"......Mas acho que já está tudo bem.\""
52060-197 = "Nyaha...!?"
52060-198 = "Isso é... surpreendente. #n Pensei que você ainda estivesse correndo para tentar reverter quem tocou nas Cores..."
52060-199 = "Você resolveu enquanto eu não via! #n ......Realmente, o Sensei [USERNAME] sempre me surpreende."
52060-203 = "Só para deixar registrado, de acordo com uma teoria em registros antigos, #n a Grande Profeta Kuzunoha está no 'Templo do Crepúsculo'."
52060-204 = "Claro, existem poucos testemunhos de quem realmente viu o 'Templo do Crepúsculo'. #n A localização exata é desconhecida."
52060-205 = "Mas... ouvi dizer que existe um caminho para o templo no centro do Grande Campo de Neve."
52060-206 = "Procurar um templo isolado no meio de um campo de neve infinito é imprudente demais. #n Para ser sincera, eu estava cética――"
52060-207 = "A carta de Kuzunoha que a vice-presidente Nagusa trouxe do campo de neve―― #n ela certamente existe..."
52060-208 = "[s] \"Então, vou direto ao Grande Campo de Neve――\""
52060-209 = "......Sensei. Não importa quanto preparo você tenha, o Grande Campo de Neve é um lugar perigoso. #n Acho difícil sobreviver em um corpo que não aguenta nem uma bala."
52060-210 = "[s] \"É, tão perigoso assim...?\""
52060-211 = "Fufu. Mas... existem áreas comerciais espalhadas perto da Filial Ebisu."
52060-212 = "Se você se dedicar a ajudar as pessoas com o pessoal da Hyakkaryouran lá――"
52060-218 = "Talvez a lendária Grande Profeta apareça do nada...?"
52060-219 = "[s11] \"Obrigada, Niya.\"\n[s12] \"Isso ajuda muito.\""
52060-222 = "De nada, que trabalho... #n não, não, agradeço de todo o coração por cooperar na resolução do problema."
52060-223 = "Niya-sama......"
52060-224 = "Eu também posso ir?"
52060-225 = "Isso... não pode. #n Chise-chan, vamos continuar os preparativos para o Festival Waraku aqui."
52060-226 = "Paisagem de neve... eu queria ver."
52060-230 = "Uuuuu...! Chise-chan parece tão triste! #n Meu coração vai se despedaçar..."
52060-231 = "Mas! #n Para o sucesso do Festival Waraku, não posso deixar a Chise-chan ir agora...!"
52060-232 = "[s] \"Vamos juntas na próxima vez.\""
52060-233 = "Sim, estarei te esperando, Sensei."
52060-235 = "Já informamos a Filial Ebisu sobre o caso. #n Não é bem um substituto para a Chise-nyan, mas #n alguém virá buscá-los."
52060-236 = "Vocês estão com o pessoal da Hyakkaryouran, então acho que ficarão bem, mas... #n aquele lugar é onde não conseguimos chegar."
52060-237 = "Sensei, por favor, tome cuidado."
52060-239 = "Próximo Episódio; Terra da Neve"

