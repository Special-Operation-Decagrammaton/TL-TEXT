[translation]
10040120-1 = "Epílogo parte 4; Verdade ou Desafio"
10040120-3 = "Entendo..."
10040120-4 = "Então foi a Koyuki-chan e a Maki-chan que fizeram esse líquido suspeito... que mal dá para chamar de suco misturado?"
10040120-5 = "É isso mesmo! Enquanto a gente ia à loja de conveniência, elas causaram problemas de novo!"
10040120-6 = "Francamente. Desperdiçar comida e bebida desse jeito é inaceitável..."
10040120-7 = "...Você disse desperdiçar agora há pouco?"
10040120-8 = "Isso é algo que eu não posso deixar passar!"
10040120-9 = "Nós estávamos levando isso a sério! Estávamos pesquisando como criar uma bebida inovadora misturando vários sabores, então não estávamos desperdiçando nada—"
10040120-15 = "Parem de dar desculpas e reflitam!"
10040120-16 = "Sim!"
10040120-18 = "Entendi a situação, mas o que vamos fazer com esse suco?"
10040120-19 = "É um desperdício, mas... acho que só nos resta jogar fora."
10040120-24 = "Nesse caso, eu tenho uma ideia."
10040120-25 = "Este suco, por mais suspeito que pareça a cor... não parece conter nada perigoso. Ou seja, deve ser possível bebê-lo."
10040120-26 = "Então, que tal usarmos isso para jogar um jogo?"
10040120-27 = "Um jogo...?"
10040120-28 = "É um jogo chamado Verdade ou Desafio, onde escolhemos alguém para fazer uma pergunta. Na pergunta, você pode escolher dizer a verdade ou, se não quiser, pagar uma prenda."
10040120-29 = "Que tal usarmos aquele suco como prenda? Assim, acho que não precisaremos desperdiçá-lo."
10040120-30 = "Boa ideia! Eu justamente tenho algo para perguntar à Yuuka-senpai—"
10040120-31 = "Disse alguma coisa, Koyuki?"
10040120-32 = "Não, nada."
10040120-33 = "Hum... jogar é uma coisa, mas esse suco é um pouco..."
10040120-34 = "Isso não vai fazer a Koyuki refletir, e eu ainda corro o risco de ter que beber..."
10040120-36 = "Mas você não gosta de jogar comida e bebida fora à toa, gosta?"
10040120-37 = "Eu vou dar uma bronca daquelas na Koyuki-chan depois para ela refletir. Que tal deixarmos passar por enquanto?"
10040120-38 = "A-ah... você não poderia pedir para a Yuuka-senpai dar a bronca?"
10040120-39 = "Não."
10040120-40 = "Uuu..."
10040120-42 = "Bem, é verdade. Se a Noah insiste tanto..."
10040120-43 = "Eu não desgosto desse tipo de jogo. Não quero que o Sensei ouça perguntas indiscretas, mas... parece que ele saiu, então..."
10040120-44 = "Está decidido. Então, todos, poderiam se reunir?"
10040120-45 = "Vou explicar as regras detalhadas. Vamos escolher alguém para fazer uma pergunta em turnos, e quem for perguntado deve dizer a verdade ou, em vez disso, beber este suco. Quando terminar, quem foi perguntado se torna o perguntador. E assim por diante."
10040120-46 = "Vamos decidir o primeiro perguntador por sorteio. Então—"
10040120-52 = "Ué, parece que eu sou a perguntadora."
10040120-53 = "Então, escolha alguém e faça uma pergunta difícil de responder."
10040120-54 = "Uma pergunta difícil de responder..."
10040120-58 = "Certo... então a Koyuki. Tem uma coisa que me preocupa sobre suas invasões..."
10040120-59 = "S-sim!?"
10040120-60 = "Pode me dizer quantas vezes você invadiu os servidores do Millennium até agora? Tem um registro suspeito recente e estou começando a achar que..."
10040120-61 = "Ah, eu não sei..."
10040120-63 = "Então, vamos pedir para você beber o suco da prenda."
10040120-65 = "E-espere! Eu não menti, né? Eu só não contei quantas vezes foram!"
10040120-66 = "Sempre que preciso de algum material, eu me conecto, então não tem como eu ficar contando—"
10040120-67 = "Isso significa que você invadiu tantas vezes que nem consegue contar...!?"
10040120-68 = "Noah, pode reservar uma sala de reuniões? Amanhã, durante a manhã, vou ter uma conversa com a Koyuki. Preciso instruí-la sobre segurança."
10040120-70 = "Entendido. Vou reservar uma sala com isolamento acústico total."
10040120-71 = "Eeeh!? Mas eu falei a verdade!? Por que eu já estou condenada a sofrer!?"
10040120-72 = "Porque suas ações fora do jogo não foram boas."
10040120-73 = "Bem, é a vez da Koyuki-chan. Decida quem você vai perguntar."
10040120-74 = "E-então... Noah-senpai!"
10040120-76 = "Responda qual a cor da calcinha que você está usando agora!#nSe não responder em três segundos..."
10040120-77 = "É branca.#nÉ uma das minhas favoritas, com renda."
10040120-78 = "Respondeu na hora!?#nPoderia ter ficado um pouco mais envergonhada, não acha?"
10040120-79 = "Não é como se algo assim fosse abalar a Noah..."
10040120-80 = "Bem, agora é a minha vez."
10040120-81 = "Yuuka-chan♪"
10040120-82 = "Q-que? Vai me fazer uma pergunta?"
10040120-83 = "Sim. Na verdade, tem algo que eu sempre quis saber."
10040120-87 = "O que a Yuuka-chan... pensa sobre o Sensei [USERNAME]?"
10040120-94 = "D-do nada isso!?"
10040120-98 = "Mesmo que me pergunte algo assim... eu fico sem jeito..."
10040120-99 = "Mas, vejamos. Não é como se eu não gostasse dele...#nQuer dizer, falar disso na frente de todo mundo, é complicado..."
10040120-100 = "Então, você vai ter que beber o suco."
10040120-101 = "Ugh... não tem jeito, né."
10040120-106 = "Eca... que gosto é esse?#nÉ amargo, azedo e grudento... sinto que minha língua vai ficar dormente..."
10040120-107 = "Ora, Noah! Você já estava planejando me escolher desde o começo, não estava!?"
10040120-108 = "Ora, ora. É só um jogo. Não precisa ficar tão brava. Fufu."
10040120-109 = "Aliás, é a vez da Yuuka-chan. Para quem você vai perguntar?"
10040120-110 = "Então, Maki. Onde foi o último lugar que você fez um grafite?"
10040120-111 = "Hmm... acho que foi há uma semana, aquele raio grande que desenhei ao norte da usina elétrica."
10040120-112 = "Ué, não foi aquele que você desenhou na biblioteca!?"
10040120-113 = "Ah, ferrou..."
10040120-115 = "Haa..."
10040120-120 = "(Depois disso, o jogo continuou até tarde da noite...)"
10040120-121 = "(Por algum motivo...)"
10040120-123 = "Yuuka-senpai!#nDa última vez que você estava de plantão no Schale, você voltou super tarde... o que você estava fazendo?"
10040120-124 = "I-isso é... trabalho do Schale, então é segredo!"
10040120-129 = "No fim de semana passado, você estava conversando com o Sensei [USERNAME] em Corgi Town.#nConte-nos o conteúdo da conversa."
10040120-130 = "P-por que você sabe disso!?#nIsso... eu passo!"
10040120-135 = "Yuuka, ouvi dizer que além dos recibos do Schale, você também organiza os recibos pessoais do Sensei. É verdade?"
10040120-136 = "Espera, de novo eu?"
10040120-141 = "Yuuka-senpai!"
10040120-142 = "Yuuka."
10040120-143 = "Yuuka-chan♪"
10040120-148 = "Por que todo mundo...!"
10040120-149 = "Só fazem perguntas para mim~!"
10040120-151 = "(...No fim, a Yuuka acabou bebendo quase todo aquele suco.)"
