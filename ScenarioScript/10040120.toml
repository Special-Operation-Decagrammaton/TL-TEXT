[translation]
10040120-1 = "後日談その4;Truth or Dare"
10040120-3 = "なるほど……。"
10040120-4 = "ミックスジュース……とは言い難い、この怪しげな液体を、#nコユキちゃんとマキちゃんが作ってたんですね？"
10040120-5 = "そういうことよ！#n私たちがコンビニに行ってる間に、またトラブルを起こしたの！"
10040120-6 = "まったく。飲食物を粗末に扱ってダメにしちゃうなんて……。"
10040120-7 = "……いま、粗末にって言いました？"
10040120-8 = "それは聞き捨てなりませんね！"
10040120-9 = "私たちだって真剣にやってたんですよ！いろんな味を混ぜて、#n斬新な飲み物を生み出す研究をしていたわけであって、粗末になんか――"
10040120-15 = "言い訳しないで反省しなさい！"
10040120-16 = "はいっ！"
10040120-18 = "話はわかりましたけど、このジュースはどうするんです？"
10040120-19 = "もったいないけど……捨てるしかないと思うわ。"
10040120-24 = "それなら、私に考えがあります。"
10040120-25 = "このジュース、色こそ怪しげに見えますが……#n危険なものは入っていないようです。つまり、飲むことはできるはず。"
10040120-26 = "ですので、これを使ってひとつ、ゲームをしませんか？"
10040120-27 = "ゲーム……？"
10040120-28 = "[ruby=Truth or Dare]真実か挑戦か[/ruby]という、順番に相手を選んで質問するゲームです。#n質問には、真実を話すか、話さず罰ゲームに挑戦するか選ぶことができます。"
10040120-29 = "この罰ゲームで……例のジュースを飲んでもらうのはどうでしょう？#nこれならムダにしなくて済むと思うんです。"
10040120-30 = "良いですね、それ！#nちょうどユウカ先輩に聞きたいことが――"
10040120-31 = "何か言った、コユキ？"
10040120-32 = "いえ、何も。"
10040120-33 = "う～ん……ゲームをするのはいいけど、そのジュースは、ちょっと……。"
10040120-34 = "コユキたちの反省にもならないし、#n私も飲まされるかもしれないなんて……。"
10040120-36 = "でも飲食物を無為に捨てるのは、嫌ですよね？"
10040120-37 = "コユキちゃんは、後でじっくりと[ruby=・   ・   ・]お説教[/ruby]して反省させますから。#nいったん見逃してあげませんか？"
10040120-38 = "あ、あの……お説教は、ユウカ先輩にお願いできませんか？"
10040120-39 = "ダメです。"
10040120-40 = "ううっ……。"
10040120-42 = "まあ、そうね。ノアがそこまで言うなら。"
10040120-43 = "そういうゲームは、私だって嫌いじゃないし。#nきわどい質問は先生に聞かれたくないけど……ちょうど席を外してるみたいだし。"
10040120-44 = "決まりですね。では皆さん、お集まりいただけますか。"
10040120-45 = "詳細なルールを説明しますね。順番に相手を選んで質問をしていくのですが、#n質問された方は本当のことを話すか、話さない代わりにこのジュースを飲む。#n終わったら、質問された方が質問者になる。その繰り返しです。"
10040120-46 = "最初の質問者はくじ引きで決めましょうか。では――"
10040120-52 = "あれ、私が質問者みたい。"
10040120-53 = "それじゃあ、誰か一人を選んで、答えにくい質問をしてみてください。"
10040120-54 = "答えにくい質問……。"
10040120-58 = "そうね……じゃあコユキで。#nあなたのハッキングに関して気になることがあるんだけど……。"
10040120-59 = "は、はいっ！？"
10040120-60 = "これまでミレニアムのサーバーをハッキングした回数、答えてもらえる？#n直近で怪しい記録があって、もしかしたらと思ってるんだけど。"
10040120-61 = "えっ、分かりませんけど……。"
10040120-63 = "では、罰ゲームのジュースを飲んでもらいましょう。"
10040120-65 = "ま、待ってください！嘘はついてないじゃないですか？#n回数なんて数えてないってだけですよ！？"
10040120-66 = "ほしい資料があれば、その都度接続してるんですから、#nそんなの数えてなんか――"
10040120-67 = "数えきれないくらい、ハッキングしたってこと……！？"
10040120-68 = "ノア、会議室を抑えてもらえる？明日、午前中のうちにコユキと面談するから。#nセキュリティについて指導しないと。"
10040120-70 = "わかりました。完全防音の会議室を予約しておきますね。"
10040120-71 = "ええっ！？正直に話したのに！？#nどうしてひどい目にあうことが決まるんですか！？"
10040120-72 = "ゲーム外での行いが悪いから、ですね。"
10040120-73 = "さて、コユキちゃんの番ですよ。誰に質問するか、決めてくださいね。"
10040120-74 = "じゃ、じゃあ……ノア先輩！"
10040120-76 = "今はいてるパンツの色を答えてください！#n三秒以内に回答できなかったら――"
10040120-77 = "白です。#nレースの付いたお気に入りの一着、ですね。"
10040120-78 = "即答！？#nもうちょっと恥じらったりしてくださいよ？"
10040120-79 = "その程度でノアが動じるわけないじゃない……。"
10040120-80 = "それじゃあ、私の番ですね。"
10040120-81 = "ユウカちゃん♪"
10040120-82 = "な、なに？私に質問するの？"
10040120-83 = "ええ。実はずっと気になっていたことがあるんです。"
10040120-87 = "ユウカちゃんは……[USERNAME]先生をどう思っているんですか？"
10040120-94 = "い、いきなりそれ！？"
10040120-98 = "そんなこと聞かれても……困るんだけど……。"
10040120-99 = "でも、そうね。嫌いとかじゃ全然なくて……#nって、皆の前でこういうのは、やっぱり……。"
10040120-100 = "では、ジュースを飲んでもらわなきゃですね。"
10040120-101 = "うぅ……仕方ないわね。"
10040120-106 = "うぇ……なに、この味？#n苦くて、酸っぱくて、ベトベトしてて……舌が麻痺しちゃいそう……。"
10040120-107 = "もう、ノア！最初から私を指名するつもりだったでしょ！？"
10040120-108 = "まあまあ。ゲームなんですから。そんなに怒っちゃダメですよ。ふふっ。"
10040120-109 = "ところでユウカちゃんの番ですけど、誰に質問しますか。"
10040120-110 = "じゃあ、マキ。直近でグラフィティを描いた場所は？"
10040120-111 = "う～ん……それなら一週間前に、発電所の北に描いた、大きな雷模様かな。"
10040120-112 = "えっ、図書館に描いたやつじゃなかったの！？"
10040120-113 = "あ、やば……。"
10040120-115 = "はぁ……。"
10040120-120 = "（その後も、ゲームは夜遅くまで続いたのだが……）"
10040120-121 = "（どういうわけだか……）"
10040120-123 = "ユウカ先輩！#nこの前のシャーレ当番の時、帰りがすっごく遅かったけど……何してたの？"
10040120-124 = "そ、それは……シャーレの仕事だから、秘密！"
10040120-129 = "先週末、コーギータウンで[USERNAME]先生と話していましたね。#n内容を教えてください。"
10040120-130 = "な、なんでそれを！？#nそれは……パスするわ！"
10040120-135 = "ユウカって、シャーレの領収書以外にも、#n先生個人の領収書まで整理してるって聞いたけど、本当？"
10040120-136 = "待って、また私なの？"
10040120-141 = "ユウカ先輩！"
10040120-142 = "ユウカ。"
10040120-143 = "ユウカちゃん♪"
10040120-148 = "なんでみんな……！"
10040120-149 = "私にばっかり質問するのよ～！"
10040120-151 = "（……結局、例のジュースはほとんどユウカが飲んだのだった）"
