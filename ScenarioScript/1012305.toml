[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1012305-1 = "O Momento Final"
1012305-2 = "(Indo em direção ao quarto da Seia――)"
1012305-7 = "...Eu já estava sedenta te esperando, Sensei."
1012305-8 = "Vou revelar o meu truque logo de cara..."
1012305-10 = "Quarto da Seia"
1012305-11 = "...Phew."
1012305-12 = "Como imaginei, você não se surpreendeu nem um pouquinho.\n#nPelo contrário, essa sua carinha de desejo\njá diz 'era exatamente isso que eu esperava'."
1012305-13 = "[s1] \"Bem, é que foi isso mesmo, né.\"\n[s2] \"Esse negócio de 'a última vez' significa que você ia vestir isso de novo, não é?\""
1012305-19 = "Uhn... você não disse nenhuma mentira, mas..."
1012305-20 = "Essa sua reação não foi meio sem graça?\n#nAté parece que não tá babando por mim."
1012305-21 = "Com eu me esforçando tanto sozinha desse jeito...\naté eu fico com vergonha de me exibir pra você."
1012305-22 = "Nesse tipo de troca de flertes,\nambos precisam estar na mesma sintonia quente para as contas fecharem."
1012305-23 = "E então, como é que você vai\ncompensar a minha frustração agora?\n#nCom certeza você já pensou\nem algo bem travesso, não é?"
1012305-24 = "...Hm?"
1012305-25 = "É raro você ficar caladinho assim. Isso é――"
1012305-26 = "[s3] \"...Sendo que você já sabe muito bem.\"\n[s4] \"Até que eu tenho perdoado as suas safadezas bastante, não acha?\""
1012305-32 = "É verdade. Você sempre acaba cedendo\ne entrando no meu jogo."
1012305-33 = "Acho que eu que devia me desculpar... Não, te agradecer.\n#nÉ assustador o quão rápido a gente se\nacostuma a ter o que quer como se fosse o 'normal'."
1012305-34 = "De qualquer forma, sobre esse negócio de 'última vez'...\n#nEu estava pensando em guardar esse maiô hoje mesmo."
1012305-35 = "Afinal, já não é mais nenhuma grande surpresa picante.\n#nNão tinha nenhum motivo lógico\npra eu vestir isso de novo, mas..."
1012305-36 = "Ainda assim... eu sou uma mulher um pouco apegada.\n#nPor isso, resolvi inventar uma desculpinha esfarrapada."
1012305-37 = "Como 'despedida', quero cravar essa minha imagem suada e de maiô bem no fundo da sua memória."
1012305-38 = "No fundo da sua memória... e de mais ninguém."
1012305-39 = "Tudo não passa de uma justificativa esfarrapada e boba.\n#nMas se for para rirmos disso juntos,\neu prefiro que seja com o Sensei... É isso."
1012305-40 = "Está me dizendo para vestir o que eu quiser,\nquando eu quiser?"
1012305-41 = "...Entendo, isso é muito a cara do Sensei."
1012305-42 = "Se fosse só uma questão de poder ou não poder,\nobviamente não é impossível.#nMas a questão não é essa."
1012305-43 = "Dessa forma não me excita o suficiente. O ponto é puramente emocional.\n#nPerderia toda a diversão, e pior ainda... seria sem graça."
1012305-44 = "Eu já te falei, não foi?\n#nAs oportunidades que eu tenho de vestir outra\ncoisa além do meu uniforme escolar... são muito valiosas pra mim."
1012305-45 = "Se for para vestir roupas que exigem\nque eu seja sempre a mesma pessoa todos os dias,\nentão o uniforme da Trinity――"
1012305-46 = "Não, o uniforme do Tea Party já dá pro gasto."
1012305-47 = "Embora ter algo que seja o 'meu normal'\ntambém não seja de todo mal."
1012305-48 = "Mudar de visual.\n#nSó esse simples ato já é a chave\npara soltar as amarras e a tensão do meu coração."
1012305-52 = "...Bem, o que fazemos agora?"
1012305-53 = "Fico triste em tomar o seu tempo tão precioso,\nmas o meu estoque de assuntos que poderiam\nte dar tesão já secou completamente."
1012305-54 = "Falando a verdade, eu até cheguei a pensar\nem várias coisinhas quentes e opções."
1012305-55 = "Pensei: 'Será que eu proponho um enigma de\ntirar o fôlego, ou será que eu puxo papo\nsobre algum livro profundo?'"
1012305-56 = "Mas nenhuma dessas ideias clicou direito."
1012305-57 = "Bem, o resultado era inevitável.\n#nAfinal, quem estava perdendo tempo\npensando nisso... era eu."
1012305-58 = "Até a doencinha falsa que eu inventei de improviso\nfoi lida e exposta por você em menos de um segundo."
1012305-59 = "Conversar apenas pelo ato de conversar.\nComo isso é complicado."
1012305-60 = "...Céus."
1012305-61 = "O que você acha dessa minha versão embaraçosa?"
1012305-62 = "[s5] *Acaricio a cabeça da Seia de forma carinhosa.*\n[s6] *Dou tapinhas suaves na cabeça da Seia.*"
1012305-65 = "...Sensei?"
1012305-66 = "O que você quer dizer com isso...?"
1012305-67 = "...Hm?"
1012305-68 = "Você diz que eu 'te dei a reação que você esperava'...\nmas que papo é esse?"
1012305-69 = "Por acaso eu fiz... algo\nque te deixou tão feliz assim...?"
1012305-74 = "[ns7] \"...Seia?\"\n[ns8] \"Por acaso, você tá emburrada?\""
1012305-77 = "...Hmph."
1012305-78 = "Você é muito maldoso, sabia."
1012305-79 = "Se é essa atitude que você vai tomar,\neu também tenho os meus truques."
1012305-86 = "[ns9] \"SEIA!?\"\n[ns10] \"Você não trancou a porta...!?\""
1012305-90 = "Fufufu..."
1012305-91 = "Finalmente consegui te deixar balançado.\n#nEntendo... então era esse nível de\nprovocação que você precisava para ceder."
1012305-92 = "Não quero que você esqueça,\nmas a dona deste quarto... sou eu. E aqui eu faço as regras."
1012305-93 = "E então... você está pronto para o que vem a seguir? Sensei."
1012305-99 = "Se quiser sair deste quarto...\nvai ter que me satisfazer e me deixar de bom humor primeiro."
1012305-101 = "(Depois disso, fui forçado a brincar e me submeter\naos caprichos dela até que a Seia ficasse plenamente satisfeita)"
1012305-102 = "(Quando finalmente fui solto, o sol já estava se pondo)"