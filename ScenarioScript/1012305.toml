[translation]
1012305-1 = "最後の瞬間"
1012305-2 = "（セイアの部屋に向かうと――）"
1012305-7 = "……待ちわびていたよ、先生。"
1012305-8 = "早速のネタばらしだが……。"
1012305-10 = "セイアの部屋"
1012305-11 = "……ふぅ。"
1012305-12 = "案の定、まったく驚かないのだね。#nそれどころか「予想通りだ」とでも言いたげな顔だ。"
1012305-13 = "[s1] \"まあ、実際その通りだしね。\"\n[s2] \"その服を着るのが「最後」って意味でしょ？\""
1012305-19 = "む……何も誤ってはいないのだが……。"
1012305-20 = "それは些か情緒に欠ける反応じゃないかい？#n淡泊に過ぎるとでも言おうか。"
1012305-21 = "こちらの独り相撲では、さしもの私も気恥ずかしさを覚えるよ。"
1012305-22 = "この手のことは、バランスが取れてこそ帳尻が合うのだから。"
1012305-23 = "さて、君はどんな形で埋め合わせてくれるつもりかな？#n何か良い考えはあるのだろうね？"
1012305-24 = "……ん？"
1012305-25 = "君がだんまりとは珍しい。それはまた――"
1012305-26 = "[s3] \"……本当は分かってるくせに。\"\n[s4] \"だいぶ大目に見てあげてる気がするけどね？\""
1012305-32 = "たしかに。君はすでに付き合ってくれていたね。"
1012305-33 = "むしろ私こそ謝罪……いや、感謝すべきか。#n「当たり前」に慣れてしまうのは怖いものだ。"
1012305-34 = "ともあれ「最後」とはすなわち……#n今日限りでこの服を片付けようと思ってね。"
1012305-35 = "もはや特段目新しくもない装いだからな。#n改めて着る理由はなかったのだが……。"
1012305-36 = "それでも……未練がましい性分でね。#nだから、理由をつけることにした。"
1012305-37 = "「最後」に、この姿を先生の記憶に刻み付ける。"
1012305-38 = "他の誰でもなく、君にね。"
1012305-39 = "どうせこじつけなんだ。#n一緒に笑い飛ばすのなら先生がいい……そんなところだよ。"
1012305-40 = "着たいときに着ればいい、と？"
1012305-41 = "……成程、実に君らしい意見だ。"
1012305-42 = "可不可の話であれば、不可能ではない。#nだが、そういう話でもないのだよ。"
1012305-43 = "それではあまり気が進まない。要は感情論なんだ。#n興もそがれるし、何より面白みに欠ける。"
1012305-44 = "前に言っただろう？#n制服以外に身を包める機会は、私にとって貴重なものだ。"
1012305-45 = "日々変わらぬことを求められる衣服ならば、トリニティの――"
1012305-46 = "いや、ティーパーティーの制服だけで十分さ。"
1012305-47 = "とはいえ「いつも」があるのは悪いことじゃない。"
1012305-48 = "装いを変える。#nたったそれだけのことが、心の縛りを解く鍵になるのだから。"
1012305-52 = "……さて、どうしようか。"
1012305-53 = "先生に時間を割かせておいて恐縮だが、君の気を引ける話題はもう底をついてしまった。"
1012305-54 = "実のところ、あれやこれやと考えてはみたんだ。"
1012305-55 = "謎かけを解かせてみようか、本の話題でも振ってみようか、と。"
1012305-56 = "だが、どうもしっくりこなくてね。"
1012305-57 = "まあ、当然の帰結というものさ。#n何しろ、それを考えているのがこの私なのだから。"
1012305-58 = "なんとか拵えた軽口程度の仮病すら、易々と見抜かれてしまう始末。"
1012305-59 = "会話を続けるための会話をする。難儀なものだ。"
1012305-60 = "……まったく。"
1012305-61 = "こんな私を、君はどう思うかね。"
1012305-62 = "[s5] セイアの頭を撫でる。\n[s6] セイアの頭をぽんぽんする。"
1012305-65 = "……先生？"
1012305-66 = "これは、何のつもりで……？"
1012305-67 = "……ふむ？"
1012305-68 = "期待通りの反応だよ……と、言われても。"
1012305-69 = "何か、先生を喜ばせるようなことを私が……？"
1012305-74 = "[ns7] \"……セイア？\"\n[ns8] \"もしかして、拗ねてる？\""
1012305-77 = "……ふん。"
1012305-78 = "意地悪だな、君は。"
1012305-79 = "そんな態度なら、こちらにも考えがある。"
1012305-86 = "[ns9] \"セイア！？\"\n[ns10] \"鍵かけなかった……！？\""
1012305-90 = "ふふふ……。"
1012305-91 = "ようやく動揺を引き出せた。#nなるほど、これくらいの挑発が必要なのか。"
1012305-92 = "忘れてもらっては困るが、この部屋の主は……私だ。"
1012305-93 = "さて……覚悟はいいかい？先生。"
1012305-99 = "ここから出たければ、私の機嫌を取ってみたまえよ。"
1012305-101 = "（その後、セイアが満足するまで、彼女の気まぐれに振り回されることとなった）"
1012305-102 = "（解放されたのは、日が暮れかかった頃だった）"
