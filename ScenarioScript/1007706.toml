[translation]
1007706-1 = "しばらくは"
1007706-3 = "（約束の時間に合わせて、公園に向かった）"
1007706-4 = "あっ……先生だ。"
1007706-5 = "まさか、このタイミングで来ちゃうなんて……"
1007706-6 = "[s1] \"この声は……イチカ？\"\n[s2] \"上から声がするような……？\""
1007706-9 = "はは！先生、上っすよ！上！"
1007706-10 = "待ってくださいね、今ちょっと取り込み中で……"
1007706-11 = "これ取ったら、すぐ降りるんで！"
1007706-13 = "よいっ……しょ。"
1007706-16 = "[wa:200]― [log=이치카]はは！[wa:1000]先生、[wa:700]こっちっす！[wa:900]こっち！[/log]"
1007706-18 = "― [log=이치카]見えるっすか？[/log]"
1007706-21 = "― [log=이치카]あ―[wa:1000]これはただの[wa:800]風船っすけど……。[/log]"
1007706-24 = "[wa:800]― [log=이치카]なんだか、[wa:900]コレ持ってると[/log]"
1007706-26 = "[wa:100]― [log=이치카]遊園地ではしゃぐ[wa:800]子供みたいに見えちゃうっすね……[wa:1800]はは。[/log]"
1007706-29 = "― [log=이치카]あ！[wa:600]私のじゃないっすよ！[/log]"
1007706-31 = "― [log=이치카]……その、[wa:900]成り行きで、[wa:1200]ちょっと。[/log]"
1007706-34 = "[ns3] \"誰かが困ってるんだよね？\"\n[ns4] \"人助け中？\""
1007706-35 = "[wa:100]― [log=이치카]あ、[wa:500]あれっ……[wa:900]そうなんすけど……[/log]"
1007706-36 = "[wa:100]― [log=이치카]あ、[wa:500]あれっ……[wa:900]そうなんすけど……[/log]"
1007706-38 = "[wa:100]― [log=이치카]どうして分かるんすか？[/log]"
1007706-41 = "― [log=이치카]なんでだろ……？[/log]"
1007706-43 = "― [log=이치카]顔に出ちゃってたとか……？[/log]"
1007706-46 = "[wa:800]― [log=이치카]まぁいいや……[/log]"
1007706-48 = "― [log=이치카]この角度から先生を見るのは、[wa:1800]初めてっすね。[/log]"
1007706-51 = "― [log=이치카]視点が違うと、[/log]"
1007706-53 = "― [log=이치카]見え方も違ってくる[wa:1100]気がするというか……[/log]"
1007706-56 = "[wa:1300]― [log=이치카]……なんだか、[wa:400]面白いっす。[/log]"
1007706-58 = "― [log=이치카]この感じ、[wa:1000]気に入ったっす！[wa:1000]……はは！[/log]"
1007706-61 = "（イチカは木から飛び降りると、軽く会釈をしてどこかに走っていった）"
1007706-62 = "（少しして戻ってきたイチカの手からは、風船が消えていた）"
1007706-64 = "はぁ、はぁ……ただいまっす！"
1007706-65 = "にしても、来るの早かったすね。#n待たせちゃって申し訳ないっす。"
1007706-66 = "さっきの風船、子供が手を離して木に引っかかっちゃって。"
1007706-67 = "それでその子が木に登ろうとしてたんすけど、危ないんでベンチで待っててもらって代わりに取ってきたんすよ。"
1007706-68 = "……ん？"
1007706-69 = "すごいって……？"
1007706-70 = "ああ、たしかにあの木、すごい高いっすね。"
1007706-71 = "先生は木まで褒めるなんて、さすがは褒め上手っす！"
1007706-72 = "これくらいサラッと褒められるように私もなりたいっすよ。"
1007706-73 = "でも、そう簡単に言葉が出てこないんすよねぇ。"
1007706-74 = "[s5] \"今の言葉は、木の高さじゃなくて……\"\n[s6] \"イチカを褒めたんだけど……\""
1007706-77 = "私を、ですか……？"
1007706-78 = "……ん？"
1007706-79 = "当然のように人助けをするのがすごいって……？"
1007706-80 = "ま、まあ……褒められて悪い気はしないっすけど！"
1007706-81 = "……いや、やっぱここは素直に受け取っておくっす。#nありがとうございます、先生。"
1007706-82 = "……へへっ。"
1007706-83 = "それで……えっと。"
1007706-84 = "連絡した理由なんですが……"
1007706-85 = "まあその、何度か会ってるので……#nもしかしたら気づいてるのかもしれないんすけど。"
1007706-86 = "その、要は……"
1007706-87 = "んー……これをどう説明したもんっすかね。"
1007706-88 = "[s7] \"何かに本気になりたいんだよね？\"\n[s8] \"夢中になれる何かを見つけたいんだよね？\""
1007706-94 = "……はは。"
1007706-95 = "やっぱ、気付いてたっすよね～……"
1007706-96 = "まあ……私もなんとなくそういう雰囲気を出してたし、当然か。"
1007706-97 = "……そうっすね、おっしゃる通りっす。#nそれで、先生に相談したら何か変わるんじゃないかなって。"
1007706-100 = "先生や正義実現委員会の皆さんは、いつも私のことを褒めてくれるっすけど……"
1007706-104 = "他の人たちが何かに熱中したり、没頭してるところを見ると、羨ましく感じるんすよ。"
1007706-106 = "……できることがたくさんあったところで、やりたいことがなければ意味がないじゃないっすか。"
1007706-107 = "自分の好きなことに夢中になってる人の方が、圧倒的に輝いてるっす。"
1007706-108 = "……でも、こんな話を他の人にしたら嫌味としか思われないんで、先生にしか話せなくて……"
1007706-113 = "……って感じっす。"
1007706-114 = "お気づきだとは思いますが……こんな話をするのも、先生が初めてで。"
1007706-115 = "やっぱ私って、手のかかる生徒っすよね～"
1007706-116 = "先生だから頼ったのは本当っすけど……#n他の人を頼りにしてないとか、そういう訳ではないっすよ。"
1007706-117 = "けどこういう内容は、先生に相談するのがピッタリなのかなーとか思って。"
1007706-118 = "もちろん、って……はは。そう言ってくれると思ったっす。"
1007706-119 = "よし、それじゃ……"
1007706-120 = "アドバイスをお願いします！"
1007706-121 = "今まで私と話してきて、なんとな～くでいいんですが……"
1007706-122 = "……私に合いそうなものって何がありますか？"
1007706-123 = "先生なら、分かると思ったんですけど……"
1007706-124 = "……やっぱ、さすがにいきなりだったっすかね。"
1007706-125 = "……ん？"
1007706-126 = "知ってるけど、まだ今は言えない……？"
1007706-127 = "えっと……"
1007706-128 = "それはどういう意味っすか？"
1007706-129 = "……ん？"
1007706-130 = "先にやるべきことがある……？"
1007706-131 = "[s9] \"まずは[ruby= ・   ・]探す[/ruby]のをやめてみよう。\"\n[s10] \"もっと自分の気持ちに正直になって、好きなようにしよう。\""
1007706-137 = "……へ？"
1007706-138 = "聞き間違い、っすかね……？#n今、なんて……"
1007706-139 = "探すのをやめるって、どういう……？"
1007706-140 = "もしかして、私には難しいから諦めた方が……？"
1007706-141 = "あ、そうではないんすね……良かった。"
1007706-142 = "[s11] \"イチカに問題があるわけじゃないよ。\"\n[s12] \"ただ、急いで探す必要はないと思うんだ。\""
1007706-145 = "ん～……？"
1007706-146 = "なんか、分かりそうな……分からないような。"
1007706-147 = "ふむ……"
1007706-148 = "……へへっ。"
1007706-149 = "……ごめんなさい。#n嘘はつきたくないんで隠さず言うと……まだよく分かってないっす。"
1007706-150 = "自分的には、もう自分の気持ちに正直だと思ってたんで……"
1007706-151 = "ま、でも……"
1007706-152 = "先生がそう言うってことは、きっと理由があるんすよね……"
1007706-153 = "だから、もう少し自分の気持ちに正直になってみるということで……"
1007706-157 = "……先生の言葉を信じてみようと思います。"
1007706-158 = "[s13] \"ん……？\"\n[s14] \"今の感じは……\""
1007706-161 = "よし！思い立ったが吉日って言うっすもんね。"
1007706-162 = "始めてみますか、気持ちに正直な私を！"
1007706-163 = "……というわけで。"
1007706-164 = "今日は一日中、私と遊んでください！"
1007706-166 = "（その後、イチカと遊園地を遊び尽くした）"
1007706-167 = "（帰り道にイチカが見せた表情は、どこか晴れ晴れとしていた）"
