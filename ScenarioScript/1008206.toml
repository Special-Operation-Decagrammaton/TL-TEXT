[translation]
1008206-1 = "Com gratidão pela minha juventude"

1008206-3 = "[ns] \"Vamos terminar o trabalho antes que Renge chegue.\""

1008206-11 = "[ns] \"Bem, o que vem a seguir...\""

1008206-14 = "(Antes que eu percebesse, chegou o momento que prometi com Renge.)"

1008206-18 = "[ns] \"...A propósito, não comi nada hoje.\""

1008206-19 = "(Quando me levantei para fazer cup ramen...)"

1008206-24 = "Sensei...!"

1008206-25 = "Não, mestre! Obrigado por esperar!"

1008206-26 = "Divirta-se com suas “atividades juvenis” hoje também!"

1008206-30 = "...Mestre, o que aconteceu? #nVocê tem olhos de peixe morto..."

1008206-31 = "[s] \"Não, estou bem. Só estou um pouco cansado.\""

1008206-32 = "É assim mesmo?"

1008206-33 = "Se sim, tudo bem..."

1008206-34 = "[s] \"Sim, me senti melhor quando vi o rosto de Renge.\""

1008206-35 = "O que! ?"

1008206-36 = "Afinal, aquele ataque surpresa não foi algo comum..."

1008206-37 = "Se eu não fosse um “jovem experiente” como eu, teria sido nocauteado agora mesmo...!"

1008206-38 = "Como esperado de um mestre!"

1008206-39 = "[s1] \"E-eu não fiz isso de propósito...\"\n[s2] \"Eu estava subindo de nível desde um jovem iniciante...\""

1008206-44 = "Bem... deixando isso de lado, vou começar um novo evento hoje!"

1008206-45 = "Vamos fazer o nosso melhor!"

1008206-46 = "[s] \"Sim, vamos.\""

1008206-52 = "(Assim, hoje também trabalhamos arduamente nas “atividades juvenis”.)"

1008206-62 = "(e……)"

1008206-67 = "Hummm!"

1008206-68 = "Bom, hoje também foi gratificante! Mestre!"

1008206-69 = "Através de diversas “atividades juvenis”, foram acumulados pontos de experiência!"

1008206-70 = "Sinto que estou um passo mais perto de me tornar um mestre da juventude!"

1008206-71 = "[s3] \"Ao lado daqueles que experimentaram a juventude, eles se tornarão mestres de uma só vez?\"\n[s4] \"Você cresceu corretamente!\""

1008206-74 = "Tudo graças aos meus esforços constantes."

1008206-75 = "A propósito, obrigado por sair comigo hoje――"

1008206-84 = "...Mestre? O que aconteceu?"

1008206-85 = "[s] \"Ah, desculpe. Só...\""

1008206-97 = "Shi-shou! ?"

1008206-101 = "Você está bem? ? Mestre...!"

1008206-105 = "……………… peido?"

1008206-108 = "(Graças ao Astragalus, consegui voltar à placa de Petri.)"

1008206-111 = "Bem, quero dizer..."

1008206-112 = "Você esteve tão ocupado que se esqueceu de comer?"

1008206-113 = "Então ele desmaiou de fome...?"

1008206-114 = "[s] \"...Sim.\""

1008206-115 = "…………………."

1008206-116 = "[s] \"Hum, e aquela expressão...?\""

1008206-120 = "Isso não é bom! professor! !"

1008206-122 = "[ns] \"Uau!?\""

1008206-123 = "Não importa o quão ocupado você esteja, você tem que comer corretamente! !"

1008206-124 = "Tudo depende da força física! #n Pular refeições é ultrajante!"

1008206-125 = "Ainda bem que estive lá hoje, mas se não estivesse..."

1008206-126 = "Ah, mas... a professora estava ocupada e não tinha tempo para comer..."

1008206-130 = "Se..."

1008206-131 = "...É minha culpa?"

1008206-132 = "[s] \"Não, não é culpa de Renge.\""

1008206-133 = "...Não, não importa o quão difícil eu seja, eu entendo."

1008206-134 = "Embora eu já esteja ocupado com o trabalho em placas de Petri, é porque me forcei a ingressar no “Professor Jovem e Aprendiz”."

1008206-135 = "A professora gentilmente aceitou, mas..."

1008206-136 = "É verdade que fiquei ainda mais ocupado com as minhas “atividades juvenis”...e é por isso..."

1008206-137 = "[s] \"Está tudo bem, eu também me diverti.\""

1008206-138 = "professor……"

1008206-139 = "……."

1008206-140 = "Exatamente, se você diz assim..."

1008206-141 = "Se eu não fosse um especialista em jovens, teria desmaiado!"

1008206-142 = "[s] \"...Não foi o Mestre o próximo?\""

1008206-143 = "Você tem energia para prestar atenção aos detalhes! ?"

1008206-144 = "(Fiquei assim por causa das minhas atividades juvenis...Há algo que eu possa fazer...)"

1008206-149 = "um."

1008206-150 = "...Ok, vamos terminar hoje!"

1008206-155 = "Vou para casa agora, então, por favor, não tenha pressa e coma sua refeição!"

1008206-156 = "Até lá!"

1008206-160 = "[ns] \"Ah, sim...te vejo mais tarde?\""

1008206-163 = "[ns] \"Talvez eu tenha deixado você preocupado...\""

1008206-165 = "(Depois que Renge voltou para casa, eu estava relembrando os acontecimentos de hoje...)"

1008206-172 = "[ns] \"Sim, se...\""

1008206-174 = "um! professor! Atasiatashi! É astrágalo!"

1008206-175 = "Huh? fraude? Você não será enganado tão facilmente! ?"

1008206-176 = "Não se preocupe, é um verdadeiro astrágalo! #nBem, achei suspeito dizer isso sozinho..."

1008206-177 = "Tem algo mais que eu gostaria de te perguntar..."

1008206-178 = "A comida preferida do professor... comida que ele não gosta..."

1008206-179 = "Sabe, pensei que seria um problema se eu tivesse alergia?"

1008206-180 = "……sim? Ah, só vou perguntar a todo mundo do Hyakka Ryouran!"

1008206-181 = "Então pensei em perguntar ao professor também!"

1008206-185 = "[ns] Responda educadamente."

1008206-189 = "...Eu vejo. Obrigado."

1008206-190 = "Pois bem... lave o pescoço e espere por mim!"

1008206-191 = "[s] \"O quê!?\""

1008206-192 = "Vejo você amanhã!"

1008206-199 = "(Então, fiquei confuso com o telefonema de Renge...)"

1008206-203 = "(O dia seguinte chegou)"

1008206-209 = "(Assim como ontem, eu estava limpando a placa de Petri...)"

1008206-215 = "[ns] \"Ah, Renge. Que horas você vem hoje?\""

1008206-219 = "É isso que você precisa estar mentalmente preparado."

1008206-220 = "Não importa o quanto meu nível de juventude tenha melhorado, os obstáculos ainda são grandes..."

1008206-221 = "...Sensei, você está sozinho agora? #nTem alguém por perto?"

1008206-222 = "Ok, ok... então... eu só quero que você saia um pouco..."

1008206-223 = "Estarei esperando no parque perto da placa de Petri."

1008206-224 = "Pois bem...!"

1008206-232 = "[ns] \"Era para estar aqui...\""

1008206-236 = "um! professor! Ei, é isso..."

1008206-237 = "o……"

1008206-238 = "Ultimamente você tem estado tão ocupado que nem teve tempo de comer, certo? #nEnquanto isso, você estava comigo..."

1008206-239 = "[s] \"Se for esse o caso, estou muito bem...\""

1008206-240 = "O professor pode estar bem, mas eu não estou bem!"

1008206-244 = "Então... olha, isso!"

1008206-249 = "[ns] \"Eh...\""

1008206-254 = "[ns] \"Isso é um bento...?\""

1008206-255 = "[wa:300]― [log=렌게]そ、[wa:650]そう！[/log]"
1008206-257 = "― [log=렌게]Não acredito que percebi [wa:400] à primeira vista! [wa:1150]Como esperado de um mestre! [/registro]"

1008206-260 = "― [log=렌게]Eu preparei [wa:1500] para [wa:850] meu mestre...! [/registro]"

1008206-263 = "[ns] \"嬉しいけど、どうして急に……？\""
1008206-264 = "[wa:750]― [log=렌게]これまで先生には、[wa:1400]ワガママを言ってばかりで、[/log]"
1008206-266 = "― [log=렌게]Não consegui [wa:650] corretamente obrigado... [/log]"

1008206-269 = "― [log=렌게]Porque eu causei problemas [wa:500]...[/log]"

1008206-271 = "― [log=렌게]Bem, [wa:1650]Sinto-me grato... [/log]"

1008206-274 = "[wa:600]― [log=렌게]は、[wa:800]初めて作ったから……[/log]"
1008206-276 = "[wa:100]― [log=렌게]あんまり、[wa:650]味は保証できない、[wa:1800]かも……。[/log]"
1008206-279 = "― [log=렌게]Esse tipo de coisa [wa:1100] parece [wa:600] um pouco cedo para mim, [wa:900] mas... [/log]"

1008206-281 = "- [log=렌게], [wa:600], mas [wa:1250] eu fiz o meu melhor...! [/registro]"

1008206-284 = "[ns] \"...Obrigado, Renge. Espero que esteja delicioso.\""

1008206-285 = "[wa:400]― [log=렌게]あ、[wa:1400]う、[wa:1100]うん……。[/log]"
1008206-288 = "― [log=렌게]Bem, então, [wa:1150]Oh, [wa:1100]É uma delícia...[/log]"

1008206-290 = "- [log=렌게]eu, [wa:1300] por favor [wa:1250]... [/log]"

1008206-293 = "...Eu-eu dei para você corretamente! ?"

1008206-294 = "Com isso, seu nível de juventude deveria ter aumentado!"

1008206-298 = "Bem...eu vou agora...!"

1008206-304 = "(O astrágalo bento que comi na placa de Petri estava muito quente.)"

