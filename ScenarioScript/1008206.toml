[translation]
1008206-1 = "青春に感謝を込めて"
1008206-3 = "[ns] \"レンゲが来る前に仕事を片付けておこう。\""
1008206-11 = "[ns] \"えっと、次の作業は……\" "
1008206-14 = "（気づけばレンゲと約束した時間になっていた）"
1008206-18 = "[ns] \"……そういえば、今日は何も食べてなかった。\""
1008206-19 = "（カップラーメンを作ろうと立ち上がったところで……）"
1008206-24 = "せんせ……！"
1008206-25 = "いや、師匠！お待たせ！"
1008206-26 = "今日も元気に「青春活動」を……！"
1008206-30 = "……師匠、どうしたんだ？#n死んだ魚のような目をしてるけど……"
1008206-31 = "[s] \"ううん、大丈夫だよ。ちょっと疲れただけ。\""
1008206-32 = "そうなのか？"
1008206-33 = "なら、いいけど……"
1008206-34 = "[s] \"うん、レンゲの顔を見て元気が出たから。\""
1008206-35 = "なっ！？"
1008206-36 = "その不意打ち、やっぱ只者じゃないな……"
1008206-37 = "アタシみたいな「青春経験者」じゃなかったら、今のでノックアウトされてたはずだ……！"
1008206-38 = "さすがは師匠！"
1008206-39 = "[s1] \"わ、わざとじゃないから……\"\n[s2] \"青春初心者からレベルアップしてたんだ……\""
1008206-44 = "まぁ……そんなことはさておき、今日も新しいイベントを始めようと思う！"
1008206-45 = "さ、張り切っていこう！"
1008206-46 = "[s] \"うん、行こっか。\""
1008206-52 = "（こうして今日も私たちは「青春活動」に励んだ）"
1008206-62 = "（そして……）"
1008206-67 = "んんっ～～！"
1008206-68 = "いや～今日も充実したな！師匠！"
1008206-69 = "色々な「青春活動」を通して、経験値が溜まった！"
1008206-70 = "これでまた一歩、青春マスターに近づいた気がする！"
1008206-71 = "[s3] \"青春経験者の次は一気にマスターなんだ！？\"\n[s4] \"ちゃんと成長してきたね！\""
1008206-74 = "地道にコツコツやってきたおかげだね。"
1008206-75 = "それはそうと、今日も付き合ってくれてありが――"
1008206-84 = "……師匠？どうしたんだ？"
1008206-85 = "[s] \"あ、ごめん。ちょっと……\""
1008206-97 = "し、師匠！？"
1008206-101 = "大丈夫か！？師匠……！"
1008206-105 = "………………へ？"
1008206-108 = "（レンゲのおかげで、なんとかシャーレに帰ってこられた）"
1008206-111 = "ええと、つまり……"
1008206-112 = "ずっと忙しくて、食事を忘れてたのか？"
1008206-113 = "それで空腹のあまり倒れた、と……？"
1008206-114 = "[s] \"……はい。\""
1008206-115 = "……………………。"
1008206-116 = "[s] \"えっと、その表情は……？\""
1008206-120 = "そんなんじゃダメだ！先生！！"
1008206-122 = "[ns] \"うわっ！？\""
1008206-123 = "どれだけ忙しくても、ちゃんと食べないと！！"
1008206-124 = "何事も体力があってこそだ！#n食事を抜くなんて言語道断！"
1008206-125 = "今日はアタシが居たから良かったけど、もしそうじゃなかったら……"
1008206-126 = "あ、でも……先生が忙しくて食べる余裕が無かったのは……"
1008206-130 = "もし、かして……"
1008206-131 = "……アタシのせい？"
1008206-132 = "[s] \"ううん、レンゲのせいじゃないよ。\""
1008206-133 = "……違う、いくらアタシでも分かる。"
1008206-134 = "ただでさえシャーレの仕事で忙しいのに、アタシが「青春師弟」を無理に頼んだせいだ。"
1008206-135 = "先生は快く受けてくれたけど……"
1008206-136 = "「青春活動」で余計に忙しくなったのは事実だし……そのせいで……"
1008206-137 = "[s] \"本当に大丈夫だよ、私も楽しかったし。\""
1008206-138 = "先生……"
1008206-139 = "……。"
1008206-140 = "まったく、そんな風に言われたら……"
1008206-141 = "アタシが青春エキスパートじゃなかったら倒れてたところだ！"
1008206-142 = "[s] \"……次はマスターじゃなかったっけ？\""
1008206-143 = "細かいこと気にする元気はあるんだな！？"
1008206-144 = "（青春活動のせいでこうなったんだ……何かアタシにできることは……）"
1008206-149 = "あ。"
1008206-150 = "……よし、今日は解散しよう！"
1008206-155 = "アタシはこれで帰るから、先生はゆっくりご飯を食べてくれ！"
1008206-156 = "じゃ、また！"
1008206-160 = "[ns] \"あ、うん……ま、またね？\""
1008206-163 = "[ns] \"気を遣わせちゃったかな……\""
1008206-165 = "（レンゲが帰ってから、今日の出来事を振り返っていると……）"
1008206-172 = "[ns] \"はい、もしも……\""
1008206-174 = "あ！先生！アタシアタシ！レンゲなんだけど！"
1008206-175 = "はぁ？詐欺？そう簡単には騙されないって！？"
1008206-176 = "本物のレンゲだから安心して！#nまぁ、自分で言ってて怪しいなとは思ったけどさ……"
1008206-177 = "それよりさ、聞きたいことがあって……"
1008206-178 = "その、先生の好きな食べ物とか……苦手な食べ物とか……"
1008206-179 = "ほら、アレルギーがあったら大変だと思って？"
1008206-180 = "……ん？ああっ、今ちょっと百花繚乱の全員に聞いて回っててさ！"
1008206-181 = "ついでだから先生にも聞いとこうと思って！"
1008206-185 = "[ns] 丁寧に答える。"
1008206-189 = "……そっか。ありがとね。"
1008206-190 = "それじゃ……首を洗って待っててくれ！"
1008206-191 = "[s] \"えっ！？\""
1008206-192 = "じゃ、また明日！"
1008206-199 = "（そうして、レンゲの電話に戸惑っていたのも束の間……）"
1008206-203 = "（次の日がやってきた）"
1008206-209 = "（昨日と同じように、シャーレの仕事を片付けていると……）"
1008206-215 = "[ns] \"あ、レンゲ。今日は何時に来るの？\""
1008206-219 = "それが、その……心の準備が必要というか。"
1008206-220 = "いくら青春レベルが上がったとはいえ、ハードルが高くてな……"
1008206-221 = "……先生、今は一人か？#n周りに誰か居たりしないか？"
1008206-222 = "よ、よし……そ、そしたら……ちょっとだけ、出てきてほしいんだが……"
1008206-223 = "シャーレの近くにある公園で待ってる。"
1008206-224 = "それじゃ……！"
1008206-232 = "[ns] \"ここのはずだけど……\""
1008206-236 = "あ！先生！こ、こっちだ……"
1008206-237 = "その……"
1008206-238 = "ここ最近、先生は……ご飯を食べる暇もないくらい忙しかったじゃん？#nそんな中アタシに付き合ってくれてさ……"
1008206-239 = "[s] \"その事なら本当に大丈夫だけど……\""
1008206-240 = "先生は大丈夫かもしれないけど、アタシは大丈夫じゃない！"
1008206-244 = "だから、その……ほら、これを！"
1008206-249 = "[ns] \"えっ……\""
1008206-254 = "[ns] \"これは、お弁当……？\""
1008206-255 = "[wa:300]― [log=렌게]そ、[wa:650]そう！[/log]"
1008206-257 = "― [log=렌게]一目で[wa:400]気がつくなんて！[wa:1150]さすが師匠！[/log]"
1008206-260 = "― [log=렌게]し、[wa:850]師匠のために、[wa:1500]用意してきたものなんだ……！[/log]"
1008206-263 = "[ns] \"嬉しいけど、どうして急に……？\""
1008206-264 = "[wa:750]― [log=렌게]これまで先生には、[wa:1400]ワガママを言ってばかりで、[/log]"
1008206-266 = "― [log=렌게]ちゃんとしたお礼は、[wa:650]できてなかったし……。[/log]"
1008206-269 = "― [log=렌게]迷惑を[wa:500]かけちゃったから……[/log]"
1008206-271 = "― [log=렌게]その、[wa:1650]感謝の気持ちというか……。[/log]"
1008206-274 = "[wa:600]― [log=렌게]は、[wa:800]初めて作ったから……[/log]"
1008206-276 = "[wa:100]― [log=렌게]あんまり、[wa:650]味は保証できない、[wa:1800]かも……。[/log]"
1008206-279 = "― [log=렌게]こういうの、[wa:1100]アタシには[wa:600]ちょっと早い気も、[wa:900]するけど……。[/log]"
1008206-281 = "― [log=렌게]で、[wa:600]でも、[wa:1250]頑張ったんだ……！[/log]"
1008206-284 = "[ns] \"……ありがとう、レンゲ。美味しく頂くね。\""
1008206-285 = "[wa:400]― [log=렌게]あ、[wa:1400]う、[wa:1100]うん……。[/log]"
1008206-288 = "― [log=렌게]じゃあ、[wa:1150]お、[wa:1100]おいしく……[/log]"
1008206-290 = "― [log=렌게]め、[wa:1300]召し上がって[wa:1250]ください……。[/log]"
1008206-293 = "……ち、ちゃんと渡したからな！？"
1008206-294 = "これで青春レベルも上がったはず！"
1008206-298 = "じゃ……もう行くから……！"
1008206-304 = "（シャーレに戻って食べたレンゲの弁当は、とても暖かかった）"
