[translation]
101090-1 = "Episódio 9; Colisão (1)"
101090-2 = "……Como estão as coisas por lá……"
101090-3 = "A lei marcial…… Mas o Conselho Estudantil Geral……"
101090-4 = "……A Valkyrie está……"
101090-5 = "Contato do General…… O resto……"
101090-6 = "[ns1] \"…………。\"\n[ns2] Abro os olhos."
101090-9 = "[ns3] (A Caixa de Shittim sumiu……) \n[ns4] (Será que levaram ela?)"
101090-13 = "……Ainda estamos de prontidão.#nOuvi dizer que aquela caixa nem sequer liga, muito menos pode ser hackeada."
101090-14 = "Parece que o data center da matriz tentou se conectar a ela,#ne 8 empresas acabaram saindo do ar."
101090-15 = "Não é à toa que virou essa bagunça toda."
101090-16 = "A única opção que nos resta é aquele Sensei, então."
101090-17 = "……Hã? Vocês não ouviram um tiro agora mesmo?"
101090-18 = "Tiro?"
101090-22 = "Ei, é lá em cima!"
101090-23 = "Vamos lá!"
101090-36 = "Haa…… Haa……"
101090-40 = "Você está bem?#nSensei [USERNAME]."
101090-41 = "[ns] (Essa voz……)"
101090-43 = "Ainda bem que está a salvo.#nDeu um trabalhão achar esse lugar, mas…… que bom que eu não desisti."
101090-44 = "[s] \"Kanna……！？\" "
101090-45 = "――Sim. Então o senhor se lembra de uma vilã de quinta categoria como eu."
101090-46 = "Vou abrir agora, só um momento…… Cof, cof."
101090-47 = "……Tsc."
101090-48 = "[s] \"Kanna, esses machucados……\""
101090-49 = "Isso aqui…… não é nada demais, não se preocupe."
101090-53 = "Haa, ufa…… Venha, pegue minha mão."
101090-54 = "[ns] Saio da cela."
101090-56 = "Sei que deve ter muitas perguntas, mas nossa prioridade agora é dar o fora daqui."
101090-57 = "Siga-me."
101090-61 = "[ns] Eu a sigo."
101090-64 = "O-O que é isso!?"
101090-65 = "Guh!?"
101090-77 = "Eles são soldados da PMC disfarçados de alunas da Valkyrie…… Cof, cof."
101090-78 = "[s] \"Pois é. Eu também acabei de descobrir isso…… Onde estamos?\""
101090-79 = "Esta é a 3ª Filial da Valkyrie, localizada em D.U..#nÉ um prédio que costumava ser usado para o acampamento de novatas por questões de orçamento, mas……"
101090-80 = "Parece que, de alguma forma, acabou caindo nas mãos da Kaiser."
101090-81 = "[s] \"Kaiser……\""
101090-82 = "Provavelmente, há um traidor dentro da Valkyrie."
101090-83 = "Não faço ideia de até onde as garras da Kaiser chegaram dentro da Valkyrie, mas…… "
101090-84 = "Acho que a culpa também é, em parte, de policiais corruptos como eu."
101090-85 = "[s] \"……Kanna.\""
101090-90 = "……Já mandei o sinal, agora só precisamos ir para os portões dos fundos."
101090-91 = "Preparei uma rota de fuga para sairmos dessa D.U. bloqueada."
101090-92 = "[s5] \"Bloqueada…… Fuga……?\"\n[s6] \"O que diabos aconteceu?\""
101090-95 = "……Vamos."
101090-99 = "[ns] Eu a sigo."
101090-108 = "Isso é…… Deveríamos nos encontrar aqui, mas parece que já reforçaram a segurança……"
101090-109 = "Quem está aí!!"
101090-110 = "Estão aqui, atirem!!"
101090-114 = "Tsc……! Sensei, perigo!"
101090-119 = "[ns] \"Kanna!!\""
101090-123 = "Guh!? "
101090-124 = "Achei que…… não tinham mais reforços……"
101090-131 = "Sensei! Tudo bem com você!?"
101090-132 = "Ugh…… Fiz algo que nem é a minha cara, como viemos parar nessa situação……"
101090-133 = "[s7] \"Kirino! Fubuki!!\"\n[s8] \"O Departamento de Segurança Pública veio ajudar!\""
101090-136 = "Haa…… Haa…… Pelo visto, chegamos a tempo."
101090-137 = "V-Viu só!? O tiro absurdamente perfeito desta oficial―― Ué, Diretora de Segurança Kanna!?"
101090-138 = "Nossa, parece que tá doendo à beça…… Você tá bem?"
101090-139 = "Não se preocupe comigo. Não pretendo ser um peso morto pra vocês.#nCuidem de garantir nossa rota de fuga."
101090-140 = "Entendido! Então, Sensei, siga a mim e a Fubuki!"
101090-141 = "Parece que o inimigo ainda não nos notou, Cão Louco―― digo, Diretora Kanna, venha com cuidado também."
101090-146 = "Que segurança pesada…… Ugh."
101090-152 = "Haa…… Haa…… Esperem, um pouco……"
101090-153 = "Kirino, a Diretora não tá parecendo muito bem.#nVamos diminuir o ritmo."
101090-154 = "A-Ah, p-perdão!"
101090-155 = "Vamos fazer uma pausa. Vamos entrar naquele prédio ali."
101090-156 = "Certo, vamos."
101090-158 = "Acho que aqui é seguro. "
101090-159 = "Mas não temos muito tempo. Temos que voltar a nos mover assim que descansarmos."
101090-160 = "Aqui é…… Haa…… Haa……"
101090-161 = "Diretora Kanna…… "
101090-162 = "Por que você foi fazer algo que não é a sua cara?#nDevia ter ficado fazendo interrogatórios, como uma boa Diretora de Segurança…… e não se dar o trabalho de vir até um lugar desses……"
101090-163 = "Eu não podia simplesmente…… empurrar a responsabilidade pra outra pessoa……"
101090-164 = "……。"
101090-165 = "Bom, eu já imaginava que fosse algo assim."
101090-166 = "Com os interesses tão complicados do jeito que estão agora……#nEu não poderia pedir às minhas subordinadas que quebrassem as regras e me seguissem, não é?"
101090-167 = "[s] \"O que diabos aconteceu enquanto eu estive fora?\""
101090-168 = "……。"
101090-169 = "Bem……"
101090-170 = "……Há 6 horas atrás, a Kaiser PMC atacou o Conselho Estudantil Geral."
101090-173 = "O comandante de alta patente da Kaiser PMC…… conhecido como \"General\", dissolveu o Comitê Administrativo e tomou o controle da Torre Sanctum. Declarou lei marcial em toda D.U.."
101090-175 = "Todas as redes de transporte e comunicação de e para a D.U. foram cortadas,#ne outras instituições, incluindo a Valkyrie, perderam sua autoridade administrativa, ficando em estado de espera por ordens……"
101090-177 = "Atualmente, a segurança da D.U. está sob o controle da PMC através da lei marcial."
101090-179 = "O fato de eu estar ajudando você a fugir e me voltando contra a Kaiser PMC,#nsignifica que eu basicamente cometi uma insubordinação contra as ordens da minha organização."
101090-180 = "Como as alunas do Departamento de Segurança Pública não são uma organização de manutenção da ordem,#nse vocês disserem que \"apenas seguiram as ordens de uma superior que encontraram por acaso\", provavelmente não serão responsabilizadas."
101090-181 = "E-Esta oficial não se importa com isso!#nEm nome da justiça, isso não é nada――"
101090-182 = "E se vocês sumirem, quem vai cuidar do trânsito de Kivotos?#nO que vai acontecer com os cidadãos que precisarem de ajuda?"
101090-183 = "Como cada pessoa tem habilidades e posições diferentes, as responsabilidades que devem carregar também são."
101090-184 = "Sobre ter envolvido vocês na minha missão…… vou me desculpar formalmente por isso depois."
101090-185 = "……Bom, por mim, uma caixa de donuts glaceados do Master Donuts já é o bastante."
101090-186 = "Se é de donuts que você precisa, pode pegar quantos quiser. Tem uma montanha deles no escritório da Segurança."
101090-188 = "Voltando ao assunto.#nSobre o que aconteceu depois que o Sensei desapareceu―― "
101090-190 = "A Administradora estabeleceu o \"Comitê de Medidas de Emergência\".#nAcredito que já saiba que ela convocou os representantes de cada distrito autônomo."
101090-191 = "O senhor também deveria participar."
101090-192 = "Mas logo em seguida…… você desapareceu após sair da Schale……"
101090-196 = "E então?"
101090-197 = "Nada. Não o encontro em lugar nenhum."
101090-198 = "……。"
101090-199 = "Rin-senpai……"
101090-200 = "……Entendido. Momoka, continue rastreando o paradeiro do Sensei.#nNão importa como. Você precisa encontrá-lo."
101090-201 = "Saquei~#nVou ver o que posso fazer……"
101090-202 = "Não podemos cancelar a convocação do Comitê de Medidas de Emergência agora, então prosseguiremos conforme planejado."
101090-203 = "Senpai…… também não consigo entrar em contato com a Kaya-san, do Departamento de Defesa……"
101090-204 = "……Abydos informou que vai se ausentar devido a uma emergência.#nE não tivemos nenhuma resposta da Rio-san da Millennium……"
101090-206 = "Temos pessoas aqui que só vieram porque ouviram que o Sensei da Schale estaria presente……#nNeste ritmo……"
101090-207 = "……。"
101090-209 = "O Comitê de Medidas de Emergência foi estabelecido mesmo sem a presença do Sensei, no entanto――"
101090-213 = "……Este é o panorama geral do fenômeno das massas de energia de altíssima concentração que surgiram por toda Kivotos."
101090-214 = "O deserto de Abydos, o parque de diversões abandonado nos arredores de D.U., a área restrita nos subúrbios da Millennium, perto da fronteira entre Trinity e Gehenna, a nova cidade perto da Millennium……#nE a Torre Sanctum em D.U.."
101090-215 = "Para desvendar este fenômeno, a cooperação de cada distrito autônomo é absolutamente essencial.#nConto com a colaboração de todos vocês."
101090-217 = "Antes disso, uma pergunta. Onde o Sensei se encontra?#nOuvi dizer que a \"Schale\" também participaria deste Comitê de Medidas de Emergência."
101090-218 = "I-Isso é……"
101090-219 = "Temos um assunto ainda mais urgente que este caso para discutir com a \"Schale\"."
101090-220 = "Um assunto urgente…… Sakurako-san, do que se trata?"
101090-221 = "Isso é…… algo que é um pouco complicado de se discutir aqui……"
101090-222 = "A Sisterhood ainda tem algo que está escondendo de nós!?"
101090-223 = "Nós também temos algo que queremos contar ao Sensei. Algo que está intimamente ligado a este caso."
101090-224 = "Aquela garota tá dormindo, sério mesmo?#nComo alguém consegue pegar no sono com a Seia-chan falando?"
101090-226 = "Makoto-senpai, acorde por favor…… Tá todo mundo olhando pra você agora……"
101090-227 = "Kikiki…… Eu não estava dormindo. Essa ladainha pior que canção de ninar só estava me irritando."
101090-228 = "Ei~, quando isso vai acabar?#nA Ibuki não tomou café da manhã e tá com fome……"
101090-229 = "Ah é, canção de ninar……?#nEntão, quer que eu te faça dormir um sono bem mais profundo――"
101090-230 = "Mika, sente-se, por favor."
101090-231 = "Ahaha, eu só tava tentando puxar a cadeira☆"
101090-233 = "Esperem, ainda não recebi uma resposta.#nOnde o Sensei se encontra?"
101090-234 = "Não adianta perguntar. O Conselho Estudantil Geral com certeza está escondendo ele!#nOu seja, esta reunião é inútil! "
101090-235 = "Isso é uma conspiração do Conselho Estudantil Geral!#nSe não conseguem ver através de um planinho desses, como podem se dizer as líderes no topo de suas academias? Kikiki."
101090-236 = "Ah, fala sério. Você só abriu a boca pra falar besteira e complicar tudo, Senpai……"
101090-239 = "Pessoal…… Por favor, façam silêncio.#nNós também estamos atualmente procurando pelo paradeiro do Sensei."
101090-240 = "Procurando pelo paradeiro dele……?#nEstá dizendo que o Sensei desapareceu?"
101090-241 = "Não há mais motivo para discutir. Se a Schale estivesse envolvida seria uma coisa, mas não tenho nada para falar com o Conselho Estudantil Geral. Iroha, Ibuki, Satsuki! Vamos embora!"
101090-242 = "Hã? E-Esperem por favor……!"
101090-243 = "……De fato, há muitos pontos suspeitos nesta situação."
101090-244 = "Concordo. Vamos analisar a situação atual do nosso lado também, Seia-san, Mika-san."
101090-245 = "……Parece que a situação não é nada favorável para qualquer tipo de cooperação."
101090-246 = "……。"
101090-248 = "Espera aí! Cadê o pudim?! Não tem nenhum pudim aqui!#nE pensar que eu me dei ao trabalho de vir até aqui para isso!"
101090-249 = "Presidente, um contato de emergência da academia."
101090-250 = "……O quê, um golpe de estado!?#nLogo enquanto eu estava fora! "
101090-251 = "Dessa vez é a \"Liga de Fricção com Toalha Seca no Inverno\"? A gente tinha uma liga dessas……?#nAh, tanto faz! Tomoe, vamos voltar! É hora de esmagar esse golpe!"
101090-253 = "……Haa, parece que as coisas não vão ser tão fáceis assim……"
101090-254 = "Até quando vamos ter que continuar com isso……?"
101090-255 = "……Qual a próxima academia para a reunião?"
101090-256 = "Certo, a próxima é――"
101090-261 = "――Não haverá próxima."
101090-262 = "！！"
101090-263 = "C-Chefe de Finanças……!"
101090-264 = "Aoi……"
101090-269 = "A Chefe de Defesa desapareceu.#nJusto a pessoa que mais teve a sua autoridade infringida por este \"Comitê de Medidas de Emergência\"……#nLogo nesse momento."
101090-270 = "Isso é……"
101090-271 = "E até mesmo o Sensei da Schale sumiu.#nDiz aí…… Não acha que isso é coincidência até demais?"
101090-272 = "……。"
101090-273 = "Também confirmei que você tentou usar a PMC para preencher o vazio deixado após a dissolução da SRT.#nAs transações eram anônimas, mas rastreando os livros contábeis dá para descobrir em um instante."
101090-274 = "Um plano para dividir o poder do Conselho Estudantil Geral com uma empresa privada……#nEsse era o seu objetivo desde o começo?"
101090-275 = "……。"
101090-276 = "Administradora Rin――Era você puxando os cordões por trás dos panos?#nDesde quando tudo isso faz parte do seu plano?#nA dissolução da SRT? A fundação da Schale? Ou talvez――"
101090-278 = "――O desaparecimento da Presidente do Conselho Estudantil Geral?"
101090-279 = "Eu……"
101090-280 = "Me desculpe, Rin-senpai.#n――Vamos parar por aqui."
101090-284 = "I-Isso é…… "
101090-285 = "Esta é uma moção de desconfiança contra você.#nUma maioria de 6 membros do Comitê Administrativo concordou com a moção contra a Administradora Rin."
101090-286 = "……！"
101090-287 = "Este é o mandado oficial em vigor.#nTodas as suas ordens executivas, Senpai, ficarão suspensas até que haja uma nova votação de confiança."
101090-289 = "Próximo episódio; Colisão (2)"