[translation]
101090-1 = "第9話;衝突（１）"
101090-2 = "……あちらとはどのように……"
101090-3 = "戒厳令が……しかし、連邦生徒会は……"
101090-4 = "……ヴァルキューレは……"
101090-5 = "ジェネラルから連絡……あとは……"
101090-6 = "[ns1] \"…………。\"\n[ns2] 目を開ける。"
101090-9 = "[ns3] （シッテムの箱が見当たらない……） \n[ns4] （持って行かれてしまったのだろうか）"
101090-13 = "……まだ待機中だ。#nあの箱、ハッキングどころか電源すら入らないと聞いた。"
101090-14 = "本社のデータセンターが接続を試したところ、#n8社がシャットダウンしたらしい。"
101090-15 = "どうりでこんな騒ぎになってるのか。"
101090-16 = "残された手段は、あの先生だけか。"
101090-17 = "……あ？今、銃声が聞こえなかったか？"
101090-18 = "銃声？"
101090-22 = "おい、上だ！"
101090-23 = "行くぞ！"
101090-36 = "はぁ……はぁ……。"
101090-40 = "ご無事ですか？#n[USERNAME]先生。"
101090-41 = "[ns] （この声は……）"
101090-43 = "ご無事で何よりです。#nここを見つけるのにかなり苦労しましたが……諦めなくてよかった。"
101090-44 = "[s] \"カンナ……！？\" "
101090-45 = "――ああ。私のような三流悪党のことを、覚えていてくださりましたか。"
101090-46 = "今開けますので少々お待ちを……ゴホッ、ゴホッ。"
101090-47 = "……くっ｡"
101090-48 = "[s] \"カンナ､その傷は……\""
101090-49 = "これは……大したものではありません、お気になさらず。"
101090-53 = "はぁ、ふぅ……さあ、お手をどうぞ。"
101090-54 = "[ns] 檻から出る。"
101090-56 = "聞きたいことは色々とあるかと思いますが、まずはここから出るのが最優先です。"
101090-57 = "私の後に続いてください。"
101090-61 = "[ns] ついて行く。"
101090-64 = "なっ、何だ！？"
101090-65 = "ぐはっ！？"
101090-77 = "こいつらは、ヴァルキューレの生徒に変装したPMC兵です……ゴホッ、ゴホッ。"
101090-78 = "[s] \"そうだね。私もさっき知ったところ……ここは……？\""
101090-79 = "D.U.に位置した、ヴァルキューレ第3分校です。#n予算の都合で新入生合宿に使われていた建物ですが……"
101090-80 = "いつの間にか、カイザーの手に渡っていたようです。"
101090-81 = "[s] \"カイザー……\""
101090-82 = "おそらく、ヴァルキューレ内部に協力者がいるのでしょう。"
101090-83 = "カイザーがどこまでヴァルキューレに魔の手を伸ばしているのか、#n私にも分かりかねますが…… "
101090-84 = "原因の一端は、私のような堕落した警察が居たからでもありましょう。"
101090-85 = "[s] \"……カンナ。\""
101090-90 = "……信号を送ったので、あとは裏門に向かうだけです。"
101090-91 = "封鎖されたD.U.から脱出できるルートをご用意しました。"
101090-92 = "[s5] \"封鎖……脱出……？\"\n[s6] \"一体何があったの？\""
101090-95 = "……行きましょう。"
101090-99 = "[ns] ついて行く。"
101090-108 = "これは……ここで落ち合う予定でしたが、もう警備が強化されていますね……"
101090-109 = "誰だ！！"
101090-110 = "こっちだ、撃て！！"
101090-114 = "くっ……！先生、危険です！"
101090-119 = "[ns] \"カンナ！！\""
101090-123 = "ぐはっ！？ "
101090-124 = "援軍が、まだ……いたとは……。"
101090-131 = "先生！大丈夫ですか！？"
101090-132 = "うう……らしくない事しちゃった、どうしてこんなことに……"
101090-133 = "[s7] \"キリノ！フブキ！！\"\n[s8] \"生活安全局、来てくれたんだ！\""
101090-136 = "はぁ……はぁ……なんとか、間に合ったか。"
101090-137 = "み、見ました！？本官の完璧でパーフェクトな射撃――あれ、カンナ公安局長！？"
101090-138 = "あちゃー、だいぶ痛そうだね……大丈夫？"
101090-139 = "気にするな。お前らの荷物になるつもりは無い。#n退路でも確保しておけ。"
101090-140 = "分かりました！では先生、本官とフブキの後に続いてください！"
101090-141 = "敵にはまだバレてないみたいだし、狂犬――いや、カンナ局長も気を付けてついてきてね。"
101090-146 = "すごい警戒態勢です……うぅ。"
101090-152 = "はぁ……はぁ……ちょっと、まて……"
101090-153 = "キリノ、局長がちょっと辛そう。#n少しスピードを落とそう。"
101090-154 = "あっ、し、失礼しました！"
101090-155 = "休憩しよっか。あっちの建物に入ろう。"
101090-156 = "はい、行きましょう。"
101090-158 = "ここなら安全かと。 "
101090-159 = "でも時間が無いね。休んだらすぐに移動しないと。"
101090-160 = "ここは……はぁ……はぁ……。"
101090-161 = "カンナ局長…… "
101090-162 = "何で似合わないことなんかしたのさ。#n公安局長らしく取り調べでもしてればよかったのに……わざわざこんなとこまで来てさぁ……"
101090-163 = "責任を、転嫁するわけにはいかなかった……"
101090-164 = "……。"
101090-165 = "ま、そんな事だろうとは思ったけど。"
101090-166 = "利害関係が複雑に絡み合った、この状況下で……#n部下に、規律を無視してついてこいと……言えるわけがないだろう。"
101090-167 = "[s] \"私がいない間に、一体何があったの？\""
101090-168 = "……。"
101090-169 = "それは……"
101090-170 = "……6時間前、カイザーPMCが連邦生徒会を襲撃しました。"
101090-173 = "カイザーPMCを指揮する高位指揮官……通称「ジェネラル」は、行政委員会を解散させ、サンクトゥムタワーを掌握。D.U.全域に戒厳令を敷きました。"
101090-175 = "D.U.を行き来する交通網・通信網は全て遮断され、#nヴァルキューレを含む他の機関も行政権を失い、命令を待っている状態となり……"
101090-177 = "現在のD.U.の治安は、戒厳令を通じてPMCが掌握しています。"
101090-179 = "私が、こうして先生を連れ出してカイザーPMCに敵対している今の状態は、#n組織の命令に背いているも同然という事です。"
101090-180 = "生活安全局の生徒は治安維持の組織ではないため、#n「偶然鉢合わせた上官の命令に従った」と言えば、責任を問われることはないでしょう。"
101090-181 = "ほ、本官はそんなこと気にしません！#n正義のためには、この程度――"
101090-182 = "お前らが居なくなったら、キヴォトスの交通整理は？#n生活に困った市民はどうなる？"
101090-183 = "各々が持つ能力や立場が異なる以上、負うべき責任もまた、違う。"
101090-184 = "私の任務にお前らを巻き込んだことは……後で改めて詫びさせてくれ。"
101090-185 = "……ま、私はマスタードーナッツのグレーズド・ドーナッツをひと箱で十分かな。"
101090-186 = "ドーナッツなら好きなだけ持っていくといい。公安局のオフィスに山ほどある。"
101090-188 = "本題に戻ります。#n先生が行方不明になってからの事ですが―― "
101090-190 = "行政官が「非常対策委員会」を設立。#n各自治区の代表を招集したことは既にご存じだと思います。"
101090-191 = "そこに先生も出席される予定でした。"
101090-192 = "しかし直後……シャーレから出発したはずの先生の行方が分からなくなり……"
101090-196 = "どうですか？"
101090-197 = "ダメ。どこにも見当たらない。"
101090-198 = "……。"
101090-199 = "リン先輩……"
101090-200 = "……分かりました。モモカは引き続き先生の行方を追ってください。#n手段は問いません。必ず、見つけてください。"
101090-201 = "分かった～#nやってみるね……。"
101090-202 = "非常対策委員会の招集を取りやめる事はできませんので、予定通り進めます。"
101090-203 = "先輩……防衛室のカヤさんとも、連絡が取れません……"
101090-204 = "……アビドスは急用で欠席とのことです。#nミレニアムのリオさんからも返事は無く……"
101090-206 = "シャーレの先生が出席すると聞いて招集に応じた方もいるというのに……#nこのままでは……"
101090-207 = "……。"
101090-209 = "先生不在のまま、非常対策委員会は設立されるも――"
101090-213 = "……以上が、キヴォトス全域に出現した、超高濃度エネルギー体現象の全貌です。"
101090-214 = "アビドス砂漠、D.U.近郊の廃墟化した遊園地、ミレニアム郊外の閉鎖地域、トリニティとゲヘナの境界付近、ミレニアム近郊の新しい都市……#nそしてD.U.のサンクトゥムタワー。"
101090-215 = "この現象を解明するためには、各自治区の協力が必要不可欠です。#n何卒ご協力のほど、よろしくお願いします。"
101090-217 = "その前に一つ。先生はどちらにいらっしゃるのでしょうか？#n「シャーレ」も、この非常対策委員会に参加すると伺ったのですが。"
101090-218 = "そ、それは……"
101090-219 = "本件以上に急を要する案件で、「シャーレ」と話し合わなくてはなりません。"
101090-220 = "急を要する案件……サクラコさん、それはどのような？"
101090-221 = "それは……ここでお話するには、少し……"
101090-222 = "シスターフッドは、まだ何か私たちに隠し立てしている事があるというのですか！"
101090-223 = "私たちも、先生に伝えたいことがある。本件と密接に関係することだ。"
101090-224 = "あの子、寝てるけど大丈夫？#nセイアちゃんが発言してるのに、眠くなるなんてことある？"
101090-226 = "マコト先輩、起きてください……今、みんな先輩に注目してます……。"
101090-227 = "キキキッ……寝ているわけではない。子守歌未満の騒ぎが不愉快だっただけだ。"
101090-228 = "ねえ～、これいつ終わるの？#nイブキ、朝ごはん食べてないし、お腹すいた……"
101090-229 = "へえ、子守歌……？#nじゃあ、私がもっと深い眠りに――"
101090-230 = "ミカ、座ってくれ。"
101090-231 = "あははっ、これは椅子を引こうとしただけ☆"
101090-233 = "お待ちください、まだお返事を聞けておりません。#n先生はどちらにいらっしゃるのですか？"
101090-234 = "聞いても無駄だ。どうせ連邦生徒会が匿ってるんだろう！#nつまり、この会は意味が無いってことだ！ "
101090-235 = "これは連邦生徒会の陰謀だ！#nこの程度の目論見も見抜けず、学園の頂点に君臨する者と言えるのか？キキキッ。"
101090-236 = "ああもう、先輩が余計なこと言うから、事態がややこしく……"
101090-239 = "皆さん……お静かに願います。#n先生の行方は、私たちも現在探している最中です。"
101090-240 = "行方を探している……？#n先生が姿を消したということでしょうか。"
101090-241 = "これ以上の議論は無意味。#n相手がシャーレならばまだしも、連邦生徒会と話すことなんぞ無い。イロハ、イブキ、サツキ！帰るぞ！"
101090-242 = "えっ？ま、待ってください……！"
101090-243 = "……たしかにこの状況、不審な点が少なくなりません。"
101090-244 = "そうですね。私たちの方でも現状を分析しましょうか、セイアさん、ミカさん。"
101090-245 = "……これは、どうにも協力できる状況ではなさそうだね。"
101090-246 = "……。"
101090-248 = "待て！プリンが無いじゃないかプリンが！#nおいらがわざわざこんな所まで出向いたというのに！"
101090-249 = "会長、学園から緊急連絡が。"
101090-250 = "……なにっ、クーデターだと！？#nおいらが席を外している間に！ "
101090-251 = "今度は「真冬の乾布摩擦連盟」？そんな連盟なんてあったか……？#nまぁいい！トモエ、帰るぞ！クーデターの鎮圧だ！"
101090-253 = "……はぁ、なかなかそう簡単にはいきませんね……。"
101090-254 = "これ、いつまでやるの……？"
101090-255 = "……次の会議はどちらの学園でしょう？"
101090-256 = "はい、次は――"
101090-261 = "――次は無いわ。"
101090-262 = "！！"
101090-263 = "ざ、財務室長……！"
101090-264 = "アオイ……。"
101090-269 = "防衛室長が行方不明になったの。#nこの「非常対策委員会」によって、誰よりも権限を侵害される者が……#nよりにもよってこのタイミングで。"
101090-270 = "それは……"
101090-271 = "そして、シャーレの先生まで行方不明に。#nねえ……偶然にしては出来過ぎていると思わない？"
101090-272 = "……。"
101090-273 = "SRTの解体後に生まれた空白を、PMCで埋め合わせようとしたことも確認したわ。#n無記名で取引されていたけれど、帳簿から追跡すればすぐに分かる。"
101090-274 = "私設企業に連邦生徒会の権力を分け与える計画……#nこれがあなたの狙いなのかしら？"
101090-275 = "……。"
101090-276 = "リン行政官――あなたが裏で糸を引いていたの？#nどこから、あなたの計画だったのかしら。#nSRTの解散？シャーレの樹立？それとも――"
101090-278 = "――連邦生徒会長の失踪？"
101090-279 = "私は……"
101090-280 = "ごめんなさい、リン先輩。#n――ここまでにしましょう。"
101090-284 = "そ、それは…… "
101090-285 = "あなたの不信任決議案よ。#n行政委員会の過半数である6人が、リン行政官の不信任に同意したわ。"
101090-286 = "……！"
101090-287 = "こっちは正式に発効された命令書。#n先輩の行政命令は、再信任投票があるまで、すべて停止される事になる。"
101090-289 = "次回;衝突（２）"
