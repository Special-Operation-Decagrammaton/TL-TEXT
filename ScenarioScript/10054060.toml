[translation]
10054060-1 = "第6話;幻の幼稚園児"
10054060-4 = "では、先生……。"
10054060-8 = "こんにちは、シュエリンです！"
10054060-12 = "キキです！"
10054060-13 = "お久しぶりです！"
10054060-14 = "[s] \"う、うん……久しぶり、だね……。\""
10054060-15 = "わ～い！"
10054060-16 = "あれ？先生、顔色が悪いですよ？"
10054060-17 = "ずっと水の中にいたからでしょうか……キキ、心配です……。"
10054060-18 = "[s] \"あはは……心配ないよ……。\""
10054060-19 = "今日はもう遅いですけど……。"
10054060-20 = "先生と一緒に遊びたいです！"
10054060-21 = "キキも～！"
10054060-22 = "[s] \"また明日遊ぼうね……。\""
10054060-23 = "わ～い！"
10054060-25 = "……先生？"
10054060-26 = "！？"
10054060-27 = "！？"
10054060-32 = "今……ちょっといいですか……？"
10054060-36 = "って……あれ？あなたたち……。"
10054060-37 = "どうしてここに！？"
10054060-38 = "えっと……。"
10054060-39 = "そ、それが……。"
10054060-40 = "[s1] \"さ、さっきシュンに頼まれたんだ。\"\n[s2] \"ピクニックの下見のために、って！\""
10054060-43 = "そうなんですか……？#nシュン姉さん、今度みんなをピクニックに連れてくるつもりなのかな……。"
10054060-44 = "怪しいですね……それなら私にも相談していたはず……。"
10054060-45 = "それにあなたたち、普段あんまり見かけないんだよね。#n隣のクラスだからかもだけど……。"
10054060-46 = "そっ、それはっ！？"
10054060-47 = "い、いきなり決まったんです！#n他の教官からも、せっかくだからって言われて……。"
10054060-48 = "ふーん……？"
10054060-49 = "せ、先生……キキ、間違ってないですよね？"
10054060-50 = "[s] \"う、うん！そう言われた！\""
10054060-51 = "そうです！先生がいれば大丈夫って！"
10054060-52 = "ふーーん……？"
10054060-53 = "そ、それに！頼もしいココナ教官も一緒ですし……。"
10054060-54 = "困ったらココナ教官に相談するようにって言われました！"
10054060-55 = "ココナ[ruby=・]教[/ruby][ruby=・]官[/ruby]！？"
10054060-56 = "お姉さんたちが、私のことを……？"
10054060-57 = "こ、こほん。分かりました。ココナ教官に任せてください！#nせっかく来たんだし、いっぱい遊んでいってね！"
10054060-58 = "でも、深いところには行っちゃダメですよ？"
10054060-59 = "は～い！"
10054060-60 = "……シュン姉さん、私に一言くらいあってもいいのに。"
10054060-61 = "これは後でバーゲンダッツ3つですね！"
10054060-62 = "（拗ねちゃいましたね……）"
10054060-64 = "事情は分かったから、他のお姉さんにも伝えておくね。"
10054060-65 = "それと、ここでは教官って呼んじゃダメ。#nココナお姉ちゃんって呼んでね！"
10054060-66 = "はい！ココナお姉ちゃん！"
10054060-67 = "こ、ココナお姉ちゃん……。"
10054060-68 = "えへっ、えへへっ……。"
10054060-72 = "……あ、先生。この子たち、どこで寝るんですか？"
10054060-73 = "それは……。"
10054060-75 = "[ns3] \"シュンとキサキが面倒を見るってさ。\"\n[ns4] \"迷惑はかけられないって言ってたよ。\""
10054060-78 = "はい！そうなりました！"
10054060-79 = "他のお姉ちゃんたちと一緒でも楽しそうでしたけどね！"
10054060-80 = "まあ、それであれば……。"
10054060-81 = "あれ？"
10054060-86 = "ということは、私はこの子たちの面倒をみなくても大丈夫ってこと？"
10054060-87 = "それは……ちょっとラッキーかも？#n思いっきり遊びたかったし。"
10054060-93 = "（声に出てますよ……？）"
10054060-98 = "[ns] \"ところで、何か用事だった？\""
10054060-99 = "え？"
10054060-100 = "あっ！！！"
10054060-101 = "えっと……その……。"
10054060-102 = "……。"
10054060-103 = "教官の姉さんたちも認めるくらい……わ、私は立派なレディーなので！"
10054060-104 = "で、ですから……その……。"
10054060-105 = "レディーのエスコートを……先生にお願いしようかと！#n……思いまして……。"
10054060-106 = "！"
10054060-107 = "うぅぅ……言っちゃった……。"
10054060-108 = "[ns] \"いいよ。ちょっと歩こうか。\""
10054060-109 = "ほんとですか！？"
10054060-113 = "……。"
10054060-114 = "ううん。やっぱり、またの機会にしましょう。今は2人もいますから。"
10054060-115 = "（ほう……）"
10054060-116 = "（ココナちゃん、偉いですね）"
10054060-118 = "[ns] \"ココナちゃんとのお散歩楽しみだなぁ～\""
10054060-119 = "言いましたね！"
10054060-120 = "えへへ……。"
10054060-121 = "約束ですからね？"
10054060-126 = "ぜったい、2人きりですよ？ぜったい！"
10054060-133 = "では、先生！#nシュン姉さんと子供たちのこと、よろしくお願いしますね！"
10054060-137 = "ふぅ……。"
10054060-138 = "[s] \"誤魔化せた……。\""
10054060-139 = "先生、嘘がお上手なんですね！すごいです！"
10054060-140 = "キキなんてまだまだだなって思いました！"
10054060-141 = "[s] \"こらこら、大人をからかわないの。\""
10054060-142 = "きゃぁ～"
10054060-143 = "怒った～！"
10054060-148 = "いい時間ですし、私たちはそろそろ寝ますね！"
10054060-149 = "ふわぁ～……子供の身体だからか、もう眠いです……。"
10054060-150 = "おやすみなさい！"
10054060-155 = "話は聞いたよ。こっちはこっちのやるべきことをしようか。"
10054060-156 = "ああ、商店街の調査だな。"
10054060-157 = "山海経と、梅花園の園児たちのために……しゅっぱーつ！"
10054060-159 = "（3人と一緒に商店街へ向かった）"
10054060-162 = "では、始めようかの。"
10054060-163 = "はい。"
10054060-165 = "アクティビティのオススメ？#nうーん……。"
10054060-166 = "ラフティングは結構スリルがあるよ。"
10054060-167 = "川の上流の方から楽しめるんだ。"
10054060-168 = "でも、雨の日には乗れないのが注意点かな。"
10054060-169 = "川が増水して危ないんだよ。事故には気をつけないとね。"
10054060-170 = "……こんな話をするのも久しぶりだ。#n普通の観光客が来てくれるといいんだけど……。"
10054060-171 = "そ、そうか……。#nところで、上流まではどうやって行くんだ？"
10054060-172 = "景色を堪能したいならロープウェイかな。#n早く行きたい場合はバスがある。"
10054060-173 = "ただ……ロープウェイは、ちょっと……今はな。"
10054060-174 = "……。"
10054060-175 = "……。"
10054060-177 = "これが、例のホテルと繋がっているロープウェイかの。"
10054060-178 = "ふむ……趣きはあるが、些か古めかしい印象じゃな。"
10054060-179 = "ルミさんの投資計画には、施設の補修や交換も盛り込まれていましたが……#n上手くいっていないようですね。"
10054060-180 = "資金をまともに活用できない状況じゃからの。"
10054060-182 = "ここの岩は水に溶けやすいんだ。#n長い時間をかけて、この渓谷はゆっくりと川に削られていった。"
10054060-183 = "そうして残った部分が、今の山の姿になってるってわけだ。すごいだろう？"
10054060-184 = "今でも、地下水には石灰の成分が含まれているんだ。"
10054060-185 = "だからって体に悪いってわけじゃないけどな。"
10054060-186 = "殺菌効果があるから、そこを考えれば普通の水よりいいかもしれないな。"
10054060-187 = "なるほど……味は？"
10054060-188 = "それは……あんまりよくはないかな。"
10054060-189 = "それでも、ここは川と山が大事な観光資源なんだ。#nなんてったって、こんな田舎にお客さんを連れてきてくれるんだからな。"
10054060-190 = "だからおすすめするなら、ボートツアーだね。#n朝、霧がかかっているときの眺めは絶景だよ。"
10054060-191 = "わあ、楽しみです！"
10054060-192 = "逆に霧が濃すぎると船を出せないから、そこは運次第だな。"
10054060-193 = "そうなんですね……。"
10054060-196 = "ホテルに直結されているという話だったと思うが……。"
10054060-197 = "案内板を見る限り、ここから5分くらい歩くみたいです。"
10054060-198 = "ふむ……意外じゃな。"
10054060-199 = "性分を考えれば、この距離すら我慢できぬ連中じゃろうに。"
10054060-200 = "子供は予測ができないですから。"
10054060-201 = "……色々な意味で。"
10054060-203 = "あ……これ、美味しいですね！#n豚肉に、ピーナッツ……漬物も入ってるかな……。#nどうやってこの味を出してるんですか？"
10054060-204 = "ははっ、それは企業秘密ってやつさ。"
10054060-205 = "商売をするなら、自分だけのものを持っておくべきですもんね。"
10054060-206 = "まだ若いのに、よく分かってるじゃないか。#nでも、目先の利益にとらわれちゃダメだぞ？"
10054060-207 = "はい……商売は、利益と人、両方を得るべきものです。"
10054060-211 = "さて。ここかの。"
10054060-212 = "では……。"
10054060-213 = "うむ。"
10054060-214 = "ごめんくださ～い！誰かいませんかー？"
10054060-215 = "すごい人がいるって聞いて来たんですけど～"
10054060-225 = "誰、あんたたち。"
