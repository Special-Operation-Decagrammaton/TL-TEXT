10054060-162 = "Well then, let's begin."
10054060-163 = "Yes."
10054060-165 = "Recommendations for activities?#nHmm..."
10054060-166 = "Rafting is quite thrilling."
10054060-167 = "You can enjoy it starting from the upper reaches of the river."
10054060-168 = "Though, a point to note is that you can't ride it on rainy days."
10054060-169 = "The river rises and it gets dangerous. You have to be careful about accidents."
10054060-170 = "...It's been a while since I've talked about this.#nI hope regular tourists will come visit..."
10054060-171 = "I-I see...#nBy the way, how do you get to the upper reaches?"
10054060-172 = "If you want to enjoy the scenery, the ropeway is the way to go.#nIf you want to get there quickly, there's a bus."
10054060-173 = "However... the ropeway is, well... not right now."
10054060-174 = "..."
10054060-175 = "..."
10054060-177 = "So this is the ropeway that connects to that hotel."
10054060-178 = "Hmm... it has a certain charm, but it does look a bit old-fashioned."
10054060-179 = "Lumi-san's investment plan included repairs and replacements for the facilities, but...#nit seems it hasn't gone well."
10054060-180 = "That's because they're in a situation where they can't properly utilize the funds."
10054060-182 = "The rocks here dissolve easily in water.#nOver a long period of time, this valley was slowly carved out by the river."
10054060-183 = "The parts that remained are what form the mountains as they are today. Isn't that amazing?"
10054060-184 = "Even now, the groundwater contains lime components."
10054060-185 = "That doesn't mean it's bad for your health, though."
10054060-186 = "It has antiseptic properties, so considering that, it might even be better than regular water."
10054060-187 = "I see... and the taste?"
10054060-188 = "That... isn't very good, I'm afraid."
10054060-189 = "Even so, the river and the mountains are important tourist resources here.#nAfter all, they're what bring visitors to such a rural place."
10054060-190 = "So if I were to recommend something, it would be the boat tour.#nThe view in the morning when the fog rolls in is breathtaking."
10054060-191 = "Wow, I'm looking forward to it!"
10054060-192 = "On the flip side, if the fog is too thick, we can't launch the boats, so it depends on your luck."
10054060-193 = "I see..."
10054060-196 = "I thought it was supposed to be directly connected to the hotel..."
10054060-197 = "Looking at the information board, it seems like a five-minute walk from here."
10054060-198 = "Hmm... that's unexpected."
10054060-199 = "Given their temperament, I would have thought they couldn't even tolerate this distance."
10054060-200 = "Children are unpredictable, after all."
10054060-201 = "...In more ways than one."
10054060-203 = "Oh... this is delicious!#nThere's pork, peanuts... and maybe some pickles in here too...#nHow do you get this flavor?"
10054060-204 = "Haha, that's a trade secret."
