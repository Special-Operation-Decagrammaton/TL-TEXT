[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
10054060-1 = "Episódio 6: As Crianças Fantasmas da Educação Infantil"
10054060-4 = "Então, Sensei..."
10054060-8 = "Olá, eu sou a Shunzinha!"
10054060-12 = "Eu sou a Kiki!"
10054060-13 = "Há quanto tempo!"
10054060-14 = "[s] \"U-Uhum... Faz bastante tempo...\""
10054060-15 = "Ebaaa!"
10054060-16 = "Ué? Sensei, você está meio pálido, não está?"
10054060-17 = "Será que é porque você ficou muito tempo\nna água...? A Kiki está preocupada..."
10054060-18 = "[s] \"Ahaha... Não precisa se preocupar...\""
10054060-19 = "Hoje já está tarde, mas..."
10054060-20 = "Eu quero muito brincar com você, Sensei!"
10054060-21 = "A Kiki também~!"
10054060-22 = "[s] \"Vamos brincar amanhã, tá bom...?\""
10054060-23 = "Yaaay!"
10054060-25 = "......Sensei?"
10054060-26 = "!?"
10054060-27 = "!?"
10054060-32 = "Com licença... Vocês têm um minutinho...?"
10054060-36 = "Espera... hã? Vocês..."
10054060-37 = "O que estão fazendo aqui!?"
10054060-38 = "Eh, hmmm..."
10054060-39 = "B-Bem, é que..."
10054060-40 = "[s1] \"A Shun acabou de pedir pra elas virem!\"\n[s2] \"Ela disse que era para fazer o\nreconhecimento para um piquenique!\""
10054060-43 = "É mesmo...?\nSerá que a Irmãzona Shun planeja trazer todo\nmundo para um piquenique aqui da próxima vez..."
10054060-44 = "Isso é suspeito... Se fosse o caso, ela com\ncerteza teria conversado comigo primeiro..."
10054060-45 = "Além do mais, eu não costumo ver vocês duas por aí.\nBem, talvez seja porque vocês são da outra turma..."
10054060-46 = "I-Isso, isso mesmo!?"
10054060-47 = "F-Foi decidido de última hora!\nAs outras instrutoras disseram que seria\numa ótima oportunidade e..."
10054060-48 = "Hmmmm...?"
10054060-49 = "S-Sensei... A Kiki não está mentindo, né?"
10054060-50 = "[s] \"S-Sim! Foi exatamente isso o que disseram!\""
10054060-51 = "Isso! Disseram que contanto que o Sensei\nestivesse aqui, ficaria tudo bem!"
10054060-52 = "Huuuuuummm...?"
10054060-53 = "A-Além disso! Temos a confiável\nInstrutora Kokona com a gente também..."
10054060-54 = "Falaram para a gente pedir conselhos para a\nInstrutora Kokona caso tivéssemos algum problema!"
10054060-55 = "I-Ins-Instrutora Kokona!?"
10054060-56 = "As moças mais velhas... disseram isso de mim...?"
10054060-57 = "C-Cof, cof. Muito bem. Deixem tudo nas\nmãos da Instrutora Kokona!\nJá que vieram até aqui, brinquem o quanto quiserem!"
10054060-58 = "Mas não podem ir para as partes fundas do rio, ouviram?"
10054060-59 = "Entendidooo!"
10054060-60 = "......A Irmãzona Shun poderia ter me dado\npelo menos um aviso prévio, poxa."
10054060-61 = "Vou cobrar três sorvetes Bargen-Dazs dela por isso!"
10054060-62 = "(Ela ficou emburrada...)"
10054060-64 = "Bem, já entendi a situação. Vou avisar\nas outras mais velhas também."
10054060-65 = "Ah, e aqui vocês não podem me chamar de Instrutora.\nMe chamem de Irmãzona Kokona, tá bom!?"
10054060-66 = "Sim! Irmãzona Kokona!"
10054060-67 = "I-Ir-Irmãzona Kokona..."
10054060-68 = "Ehe, ehehe..."
10054060-72 = "......Ah, Sensei. Onde essas crianças vão dormir?"
10054060-73 = "Isso é..."
10054060-75 = "[ns3] \"A Shun e a Kisaki disseram que iam cuidar delas.\"\n[ns4] \"Falaram que não podiam te causar problemas.\""
10054060-78 = "Sim! Foi isso mesmo que decidimos!"
10054060-79 = "Apesar de que dormir com as outras\nmeninas também parecia divertido!"
10054060-80 = "Bom, se é assim..."
10054060-81 = "Ué?"
10054060-86 = "Isso significa que... eu não vou\nprecisar cuidar delas?"
10054060-87 = "Acho que... dei um pouco de sorte?\nEu queria muito brincar até cansar..."
10054060-93 = "(Você pensou em voz alta, sabia...?)"
10054060-98 = "[ns] \"A propósito, você precisava de alguma coisa?\""
10054060-99 = "Hã?"
10054060-100 = "Ah!!!"
10054060-101 = "Er... é que..."
10054060-102 = "......"
10054060-103 = "Até as instrutoras mais velhas já reconhecem...\nq-que eu sou uma verdadeira dama!"
10054060-104 = "E, e por isso... er..."
10054060-105 = "Eu gostaria de pedir... para o Sensei ser a\nminha escolta como dama!\n......Foi o que eu pensei..."
10054060-106 = "!"
10054060-107 = "Uuuuh... Acabei falando..."
10054060-108 = "[ns] \"Tudo bem. Vamos dar uma voltinha.\""
10054060-109 = "É sério!?"
10054060-113 = "......"
10054060-114 = "Não. Pensando bem, vamos deixar para a próxima.\nJá temos as duas aqui agora."
10054060-115 = "(Oho...)"
10054060-116 = "(A Kokona-chan é uma ótima garota.)"
10054060-118 = "[ns] \"Puxa, eu estava tão ansioso para\npassear com a Kokona-chan~\""
10054060-119 = "Você prometeu, viu!"
10054060-120 = "Ehehe..."
10054060-121 = "É uma promessa, hein?"
10054060-126 = "Tem que ser só nós dois, ok? Absolutamente!"
10054060-133 = "Então, até mais, Sensei!\nCuide bem da Irmãzona Shun e das crianças, por favor!"
10054060-137 = "Ufa..."
10054060-138 = "[s] \"Conseguimos disfarçar...\""
10054060-139 = "Você mente super bem, Sensei! É incrível!"
10054060-140 = "Sinto que a Kiki ainda tem muito a aprender!"
10054060-141 = "[s] \"Ei, ei, não tirem sarro dos adultos.\""
10054060-142 = "Kyaaa~"
10054060-143 = "Ficou bravo~!"
10054060-148 = "Já está tarde, acho que já vamos dormir!"
10054060-149 = "Fuaah... Talvez por estar num corpo de criança,\neu já estou caindo de sono..."
10054060-150 = "Boa noite para você!"
10054060-155 = "Já ouvi tudo. Vamos focar no que viemos fazer."
10054060-156 = "Ah, sim. A investigação na rua de comércio."
10054060-157 = "Por Shanhaijing, e pelas crianças do Jardim\nda Flor de Ameixeira... Let's go!"
10054060-159 = "(Parti para a rua de comércio junto com as três)"
10054060-162 = "Pois bem, vamos começar."
10054060-163 = "Certo."
10054060-165 = "Recomendações de atividades?\nHmmm..."
10054060-166 = "O rafting aqui dá um frio na barriga e tanto."
10054060-167 = "Dá pra aproveitar a descida desde a parte alta do rio."
10054060-168 = "Mas o detalhe é que não dá pra ir em dias de chuva."
10054060-169 = "O nível do rio sobe e fica muito perigoso.\nTemos que evitar acidentes a todo custo."
10054060-170 = "......Faz tempo que eu não explico isso para alguém.\nSeria ótimo se aparecessem mais turistas normais por aqui..."
10054060-171 = "E-Entendo...\nA propósito, como a gente chega na parte alta do rio?"
10054060-172 = "Se você quiser apreciar a vista, recomendo o teleférico.\nSe quiser chegar mais rápido, pode pegar o ônibus."
10054060-173 = "Mas... eu não aconselharia o teleférico... agora não."
10054060-174 = "......"
10054060-175 = "......"
10054060-177 = "Então este é o famoso teleférico que se conecta ao hotel."
10054060-178 = "Umu... Ele tem o seu charme, mas confesso\nque passa uma impressão um pouco desgastada."
10054060-179 = "No plano de investimento da Rumi-san, a manutenção\ne substituição dessas instalações estava incluída, mas...\nParece que os planos não estão indo muito bem."
10054060-180 = "Isso porque eles não conseguem usar\nos fundos de forma adequada."
10054060-182 = "As rochas daqui se dissolvem facilmente na água.\nAo longo de muitos anos, este desfiladeiro foi\nsendo escavado lentamente pelo rio."
10054060-183 = "O que sobrou é o que forma a silhueta atual\ndestas montanhas. Incrível, não acha?"
10054060-184 = "Até hoje, a água subterrânea carrega\npartículas de calcário."
10054060-185 = "Mas não pensem que isso faz mal para a saúde."
10054060-186 = "Eles têm propriedades antibacterianas, então,\npensando por esse lado, talvez seja até melhor\nque a água normal."
10054060-187 = "Entendi... E quanto ao sabor?"
10054060-188 = "Bem... eu não diria que é muito gostoso."
10054060-189 = "Mesmo assim, o rio e as montanhas\nsão o nosso maior recurso turístico.\nAfinal de contas, são eles que atraem\nclientes para um lugar tão no meio do nada."
10054060-190 = "Portanto, a minha maior recomendação seria o passeio de barco.\nA paisagem de manhã, coberta pela névoa, é de tirar o fôlego."
10054060-191 = "Uau, mal posso esperar!"
10054060-192 = "Porém, se a névoa estiver muito densa, os barcos\nnão podem sair, então isso depende da sorte."
10054060-193 = "Ah, entendo..."
10054060-196 = "Se bem me lembro, falaram que havia uma conexão\ndireta com o hotel, mas..."
10054060-197 = "Olhando a placa de informações, parece que\nainda teremos que andar uns cinco minutos daqui."
10054060-198 = "Umu... Surpreendente."
10054060-199 = "Considerando o temperamento delas, não imaginei que\ntivessem paciência nem para percorrer essa curta distância."
10054060-200 = "As crianças são sempre imprevisíveis."
10054060-201 = "......Em muitos sentidos."
10054060-203 = "Ah... Isso está maravilhoso!\nTem carne de porco, amendoim... e picles também, eu acho...\nComo vocês conseguem dar esse sabor ao prato?"
10054060-204 = "Haha, isso é o que chamamos de segredo de estado."
10054060-205 = "Se você quer fazer negócios, tem que ter\nalgo que seja exclusivo seu."
10054060-206 = "Você é tão nova, mas já entende bem como as coisas funcionam.\nMas cuidado para não se cegar por lucros de curto prazo, ok?"
10054060-207 = "Sim... No mundo dos negócios, você precisa\nconquistar tanto os lucros quanto o coração das pessoas."
10054060-211 = "Pois bem. Deve ser aqui."
10054060-212 = "Então vamos..."
10054060-213 = "Umu."
10054060-214 = "Com licençaaa! Tem alguém aí!?"
10054060-215 = "A gente ouviu falar que aqui tinha gente muito forte~"
10054060-225 = "Quem são vocês?"