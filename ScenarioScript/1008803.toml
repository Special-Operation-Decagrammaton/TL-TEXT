[translation]
1008803-1 = "ドレスコード"
1008803-4 = "（カヨコとの約束時間に合わせ、便利屋の事務所を訪れた）"
1008803-8 = "……あ、先生。"
1008803-9 = "入っていいよ。"
1008803-10 = "[ns1] \"失礼します～\"\n[ns2] ドアを開けて入室する。"
1008803-17 = "待ってたよ。"
1008803-18 = "それより珍しいね。こんな時間に寄るなんて。"
1008803-22 = "……ああ、他のメンバー？"
1008803-23 = "今は居ないよ。それぞれ仕事があるからね……。"
1008803-24 = "でも、みんな先生に会いたがってたから、また今度寄ってって。"
1008803-25 = "さて……。"
1008803-29 = "探し物があるって言ってたよね？"
1008803-30 = "ちょっと待ってて。今取ってくるから。"
1008803-34 = "あれ、この辺に置いてたのに……"
1008803-38 = "ちょっと、ごちゃごちゃしてて……"
1008803-39 = "えっと……。"
1008803-43 = "[ns3] \"カヨコ。その段ボールは……。\"\n[ns4] \"この間、依頼のときに着てたドレス？\""
1008803-46 = "……うん？"
1008803-47 = "ああ、これ……。"
1008803-48 = "まあ……普段着でもないし、着るとしても依頼のときだけだからね。"
1008803-49 = "だから、事務所の段ボールに入れてるの。"
1008803-50 = "[s5] \"でも、埃がたまっているけど……。\"\n[s6] \"放置するには勿体なくない？\""
1008803-53 = "そうかな……？"
1008803-54 = "別に、普段着るわけでもないし……。"
1008803-58 = "……似合ってたから、たまに着てほしい？"
1008803-62 = "……まあ。"
1008803-63 = "お世辞だと思うけど、褒めてくれたのは……嬉しいかな……。"
1008803-64 = "でも、そんなこと言わなくていいから。"
1008803-65 = "自分のことは自分がよく分かってるし。"
1008803-66 = "……お世辞じゃない？ほ、本心……？"
1008803-69 = "ほんと……もう……。"
1008803-70 = "分かった。この話は終わり。#n先生も用があるんでしょ。"
1008803-74 = "もうちょっと待ってて。すぐ探すから。"
1008803-81 = "（少しして、カヨコは必要な資料を探し出してくれた）"
1008803-85 = "あった。"
1008803-89 = "はい、これ。"
1008803-90 = "お礼ならいいよ。先生には普段から世話になっているし、これくらい……。"
1008803-94 = "……え？"
1008803-95 = "せっかくだから夕飯を奢るって？"
1008803-99 = "……あの。"
1008803-100 = "お礼ならいいって、言ったばっかだけど。"
1008803-101 = "[s7] \"私の顔に免じて、ここは負けてあげて。\"\n[s8] \"大人って、そういうものだからさ。\""
1008803-106 = "……はあ。"
1008803-107 = "そのスキル、あまり使い過ぎないようにしてほしいね。"
1008803-108 = "まあ、でも……いいよ。先生がそこまで言うなら。"
1008803-109 = "うん、ありがたく貰うね。"
1008803-110 = "時間になったら言って。私が店まで向かうから。"
1008803-116 = "……じゃあ、また後で。"
1008803-119 = "（カヨコから資料を受け取ったあと、シャーレで残りの仕事を済ませた）"
1008803-123 = "（片方では店を予約し、時間と場所をカヨコに伝えた）"
1008803-133 = "（予約したレストランに入り、席でカヨコを待っていると……）"
1008803-138 = "お待たせ、先生。まだ時間あるのに早いんだね。#n私も結構早めに出たつもりだったんだけど……"
1008803-145 = "[ns9] \"やあ、カヨコ。\"\n[ns10] \"もう着いたの？早かったね。\""
1008803-150 = "[ns11] \"……か、カヨコ！？\"\n[ns12] \"……どうしてドレス姿に？\""
1008803-153 = "そんなに驚くことないでしょ。"
1008803-154 = "放っておくのは勿体ないって言ってたの先生だし……#nそれに、店の雰囲気にも似合うかなって思って……。"
1008803-155 = "……それに、こういう時じゃなきゃ、ドレスを着る機会もないし。"
1008803-156 = "……それとも似合うってのは、やっぱりお世辞だった？"
1008803-157 = "[s13] \"ううん、違うよ。そんなこと絶対にない。\"\n[s14] \"似合いすぎて、つい言葉を失ったっていうか……。\""
1008803-160 = "……ふふ、冗談。"
1008803-161 = "せっかく先生が奢る食事だし、ちゃんとした服装にしたかったの。"
1008803-168 = "じゃあ……"
1008803-169 = "いただくね、先生。"
