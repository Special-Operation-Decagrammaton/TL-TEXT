[translation]
80000116-1 = "Um presente à altura"
80000116-2 = "（Na manhã do Dia dos Namorados, recebi uma mensagem de Makoto）"
80000116-7 = "Kishishi, hoje é o Dia dos Namorados..."
80000116-8 = "O dia de presentear conhecidos, amigos ou amantes com chocolates... como forma de gratidão."
80000116-9 = "Embora existam aqueles que apontem que tudo não passa de uma conspiração das empresas de doces..."
80000116-10 = "Kikiki! #nSe você não consegue aproveitar o evento, falta-lhe um pouco de graça como pessoa!"
80000116-11 = "É justamente aproveitando essas distrações que se prova ser um líder excelente."
80000116-12 = "Todo ano, quando o Dia dos Namorados se aproxima, o Pandemonium envia chocolates para vários lugares. ...Embora, normalmente, não seja eu quem os prepara."
80000116-13 = "Por isso, Sensei. Você tem tempo depois?"
80000116-14 = "Use o tempo que resta para que eu possa lhe dar o melhor chocolate."
80000116-15 = "[s] \"Sim, eu tenho tempo.\""
80000116-16 = "Kishishi! Entendo, isso é ótimo."
80000116-17 = "Então, entrarei em contato com o local do encontro mais tarde! Estou esperando, Sensei!"
80000116-24 = "[ns] \"Vim até o local que a Makoto me indicou, mas...\""
80000116-29 = "Kishishi, você chegou, Sensei!"
80000116-30 = "[s1] \"Desculpe a demora, Makoto. A propósito... por que você está vestida de gala?\"\n[s2] \"E, além disso, este lugar é... um salão de festas, não é?\""
80000116-33 = "Ah, preparei tudo isso especialmente para você, Sensei."
80000116-34 = "Hum...? Por que, você pergunta?"
80000116-35 = "Kishishi, você deve saber o motivo."
80000116-36 = "Naturalmente, porque é o Dia dos Namorados!"
80000116-37 = "Hoje é o dia de presentear com chocolates em sinal de gratidão, mas... eu pensei o seguinte."
80000116-38 = "Apenas entregar um chocolate..."
80000116-39 = "── Não seria um pouco sem graça?"
80000116-40 = "Preparar um presente comum não teria o fator surpresa. #nE, acima de tudo..."
80000116-41 = "Achei que faria com que a minha grandeza parecesse pequena!"
80000116-42 = "[s] \"...Não seria melhor algo normal?\""
80000116-43 = "Não! De jeito nenhum!"
80000116-44 = "Foi aí que eu pensei! #nQual seria o presente de Dia dos Namorados à altura de mim, Makoto?"
80000116-45 = "O que eu poderia dar que fosse algo especial, incomparável a qualquer coisa que um mortal comum ofereceria!"
80000116-46 = "Depois de pensar e pensar muito sobre isso──"
80000116-47 = "Kishishi! Finalmente tive uma ideia!"
80000116-48 = "Sim, em vez de apenas dar um chocolate, aluguei o salão de festas de Gehenna só para você, Sensei..."
80000116-49 = "E decidi realizar uma festa de Dia dos Namorados!"
80000116-50 = "[s] \"Fico feliz com o gesto, mas sinto que é um exagero...\""
80000116-51 = "Kiki! Não precisa de cerimônia!"
80000116-52 = "Além disso, ainda não apresentei a atração principal... olhe aquilo!"
80000116-57 = "[ns] \"...Uma fonte de chocolate?\""
80000116-58 = "Ah, exatamente."
80000116-59 = "Não poderia ser menos que isso para estar à altura do presente que eu, Makoto, ofereço."
80000116-60 = "Kishishi... E então, Sensei? Pode ficar mais surpreso ou feliz, se quiser!"
80000116-61 = "E mais, usei o cacau da mais alta qualidade de Gehenna... #nÉ a fonte de chocolate mais luxuosa de Gehenna, não... de todo o Kivotos!"
80000116-62 = "[s3] \"Fiquei surpreso por ser algo tão inesperado, mas...\"\n[s4] \"É um presente bem a cara da Makoto.\""
80000116-65 = "[ns] \"Estou muito feliz que tenha feito tudo isso por mim.\""
80000116-66 = "Hummm!?"
80000116-67 = "[s] \"...Aconteceu alguma coisa, Makoto?\""
80000116-68 = "Não... é que, por um instante, ao ouvir suas palavras, senti algo estranho no fundo do peito..."
80000116-69 = "Kishishi. Pelo visto, isso é..."
80000116-70 = "...talvez o cansaço acumulado pelos preparativos do Dia dos Namorados!"
80000116-71 = "Mas, já que preparei tudo com tanto esforço, seria um desperdício não aproveitar."
80000116-72 = "[s] \"...E como... como devo aproveitar isso?\""
80000116-73 = "Hmph. O que foi, não sabe como funciona?"
80000116-74 = "Hehe. Muito bem, eu vou te ensinar como aproveitar uma fonte de chocolate."
80000116-79 = "Primeiro, você escolhe o doce que quer comer... mas recomendo começar com um marshmallow."
80000116-80 = "Então, depois de espetar o marshmallow no garfo, você o coloca na fonte de chocolate..."
80000116-85 = "...Hm?"
80000116-86 = "[s] \"Ah! Makoto, cuidado...!\""
80000116-87 = "ESGUICHOOOOOOO!!!"
80000116-88 = "Aaaaaaah!? O que está acontecendo!?"
80000116-89 = "Ei, espera! Cof, espere um pouco...!"
80000116-93 = "Guaaaaaah!?"
80000116-101 = "...O que foi isso... Por que aconteceu? Será que superaqueceu por causa da bateria...?"
80000116-102 = "Será porque eu a deixei ligada por 5 horas seguidas para testar antes do Sensei chegar...?"
80000116-103 = "Ou será que foi porque eu aumentei a potência em 5 vezes para ficar à altura da minha dignidade...?"
80000116-104 = "[s5] \"É óbvio que ia dar errado, né!?\"\n[s6] \"Mais importante, Makoto, você não se machucou!?\""
80000116-107 = "Hehe... hehehe..."
80000116-108 = "Ah, não aconteceu nada."
80000116-109 = "É só um pouco de chocolate, não precisa exagerar."
80000116-110 = "[s] \"Não acho que seja 'só um pouco'... até a barra do seu vestido está suja.\""
80000116-111 = "Não há problema nenhum! Eu, a grande Makoto, não vou me abalar por causa de um pouco de chocolate!"
80000116-112 = "Na verdade, isso só me deu uma certeza!"
80000116-113 = "[s] \"...Que certeza?\""
80000116-117 = "Como esperado da fonte de chocolate que eu preparei."
80000116-118 = "Graças ao uso do chocolate da mais alta qualidade, está mais delicioso do que nunca!"
80000116-119 = "[s] \"Você é muito positiva, hein!? Mas é bem a sua cara!\""
80000116-120 = "Vamos, não fique parado aí, venha logo, Sensei!"
80000116-121 = "Ou prefere lamber o chocolate do meu dedo primeiro?"
80000116-122 = "Se provar o sabor puro do chocolate antes de comer com o marshmallow, você entenderá minhas palavras com certeza!"
80000116-123 = "Vamos! Lamba meu dedo!"
80000116-124 = "[s] \"Não, não, deixa pra lá! Só me deixa comer normalmente!\""
80000116-125 = "...Hum."
80000116-126 = "...Ser recusado com tanta firmeza... confesso que isso fere um pouco o meu orgulho."
80000116-127 = "De qualquer forma... o Dia dos Namorados ainda não acabou!"
80000116-128 = "Eu não preparei apenas uma fonte de chocolate!#nO verdadeiro Dia dos Namorados começa agora!"
80000116-129 = "Vou trocar de roupa rapidinho! Espere aqui, Sensei!"
80000116-130 = "Hehehe! Já que chegamos a esse ponto, vou fazer você aproveitar o Dia dos Namorados especial preparado pela grande Makoto o dia todo!"
80000116-131 = "O Dia dos Namorados só acaba quando você chega em casa!"
80000116-135 = "[ns] \"É verdade, já que é Dia dos Namorados...\""
80000116-137 = "[ns] \"Estou ansioso para ver o que você vai mostrar a seguir.\""
80000116-142 = "(Fiquei surpreso com a sequência de eventos inesperados, mas todos os chocolates que a Makoto preparou estavam deliciosos e passamos um tempo divertido.)"
