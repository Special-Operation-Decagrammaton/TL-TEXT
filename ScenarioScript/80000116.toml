[translation]
80000116-1 = "器に[ruby=ふさわ]相応[/ruby]しいプレゼント"
80000116-2 = "（バレンタイン当日の朝、マコトから連絡が来た）"
80000116-7 = "キシシッ、今日はバレンタインデー……"
80000116-8 = "知人や友人、恋人なんかに……感謝の気持ちでチョコレートを贈る日だ。"
80000116-9 = "全ては製菓会社の陰謀に過ぎない、という指摘もあるが……"
80000116-10 = "キキキッ！#nイベントを楽しめないようでは、人としての面白さに欠けるだろう！"
80000116-11 = "こういった余興を楽しんでこそ、優秀なリーダー足り得る。"
80000116-12 = "毎年バレンタインデーが近づくと、様々なところに万魔殿としてチョコレートを贈っているからな。……いつもは私が用意してるわけではないが。"
80000116-13 = "そこでだ、先生。この後、時間はあるか？"
80000116-14 = "残りの時間を使って、お前のために最高のチョコレートを贈ろう。"
80000116-15 = "[s] \"うん、時間ならあるよ。\""
80000116-16 = "キシシッ！そうか、それは良かった。"
80000116-17 = "では、後ほど待ち合わせ場所を連絡する！待っているぞ、先生よ！"
80000116-24 = "[ns] \"マコトに言われた場所まで来てはみたけど……\""
80000116-29 = "キシシッ、来たか先生！"
80000116-30 = "[s1] \"お待たせ、マコト。ところで……どうしてドレス姿なの？\"\n[s2] \"それに、ここって……パーティー会場だよね？\""
80000116-33 = "ああ、これらは全て先生のために用意したものだ。"
80000116-34 = "うん……？なぜかって？"
80000116-35 = "キシシッ、それくらい分かっているだろう。"
80000116-36 = "当然、バレンタインデーだからだ！"
80000116-37 = "今日は感謝の気持ちでチョコレートを贈る日だが……私はこう思ったのだ。"
80000116-38 = "ただチョコレートを渡すだけでは……"
80000116-39 = "──面白みに欠けるのではないか、とな。"
80000116-40 = "ありきたりなプレゼントを用意してはサプライズ感も無い。#nそれに何より……"
80000116-41 = "私の器が小さく見えてしまうと思ってな！"
80000116-42 = "[s] \"……普通で良くない？\""
80000116-43 = "否！断じて良くない！"
80000116-44 = "そこで考えたのだ！#nこのマコト様に[ruby=ふさわ]相応[/ruby]しいバレンタインデーのプレゼントは何だろうかと。"
80000116-45 = "何を贈れば、そこらの凡人とは比べようもない特別なものになるのかと！"
80000116-46 = "そうやって悩みに悩んだ末──"
80000116-47 = "キシシッ！ついに私は思いついたのだ！"
80000116-48 = "そう、単にチョコレートを贈るのではなく、ゲヘナのパーティー会場を先生のためだけに貸し切り……"
80000116-49 = "バレンタインパーティーを行えば良いとな！"
80000116-50 = "[s] \"気持ちは嬉しいけど、ちょっと申し訳ないような……\""
80000116-51 = "キキッ！遠慮は無用だ！"
80000116-52 = "それに、まだ主役の紹介はしていない……あれを見てくれ！"
80000116-57 = "[ns] \"……チョコレートファウンテン？\""
80000116-58 = "ああ、その通りだ。"
80000116-59 = "これくらいでなくては、このマコト様が贈るプレゼントに相応しくないだろう。"
80000116-60 = "キシシッ……どうだ、先生？もっと驚いたり嬉しがっても良いぞ？"
80000116-61 = "しかも、なんとゲヘナでも最高級のカカオを使用した……#nゲヘナ、いや……キヴォトスで最も豪華なチョコレートファウンテンだからな！"
80000116-62 = "[s3] \"あまりにも予想外で驚いたけど……\"\n[s4] \"マコトらしいプレゼントだね。\""
80000116-65 = "[ns] \"私のためにこれだけしてくれて、本当に嬉しいよ。\""
80000116-66 = "うむむ！？"
80000116-67 = "[s] \"……どうかしたの、マコト？\""
80000116-68 = "いや……一瞬、先生の言葉を聞いて胸の奥に不思議な感じがしたのだが……"
80000116-69 = "キシシッ。どうやら、これは……"
80000116-70 = "……バレンタインデーの準備で疲れが溜まっているのかもしれないな！"
80000116-71 = "だが、今はせっかく準備したのだから、楽しまなくてはもったいない。"
80000116-72 = "[s] \"……これは……どうやって楽しめばいいの？\""
80000116-73 = "ふっ。なんだ、分からないのか？"
80000116-74 = "キキッ。よし、ここは私がチョコレートファウンテンの楽しみ方を教えてやろう。"
80000116-79 = "まずは食べたいお菓子を選ぶのだが……最初はマシュマロがいいぞ。"
80000116-80 = "それで、マシュマロをフォークに刺したらチョコレートファウンテンに……"
80000116-85 = "……ん？"
80000116-86 = "[s] \"あっ！マコト、気をつけ……！\""
80000116-87 = "プシャアアアアアアッ！！！"
80000116-88 = "あああああああっ！？何が起こってる！？"
80000116-89 = "ちょ、ちょっと！うぷっ、待ってくれ……！"
80000116-93 = "ぐはああああっつ！？"
80000116-101 = "……これは一体……なぜだ？#nバッテリーの熱で暴走したのか……？"
80000116-102 = "先生が来る前に動作を確認しようと思って、5時間連続で動かし続けたからなのか……？"
80000116-103 = "それとも……私の威厳に相応しくなるよう出力を5倍にしたのが原因なのか……？"
80000116-104 = "[s5] \"暴走して当たり前だよね！？\"\n[s6] \"それよりマコト、怪我してない！？\""
80000116-107 = "キキッ……キキキッ……"
80000116-108 = "ああ、何ともない。"
80000116-109 = "チョコレートが少し付いたくらいで大げさな。"
80000116-110 = "[s] \"少しってレベルじゃないような……ドレスの裾まで汚れてるよ。\""
80000116-111 = "どこにも問題は無い！このマコト様が、たかがチョコレートを被ったくらいで！"
80000116-112 = "むしろ、おかげで確信を得た！"
80000116-113 = "[s] \"……確信って？\""
80000116-117 = "やはり、私が用意したチョコレートファウンテンなだけある。"
80000116-118 = "最高級のチョコレートを使ったおかげで、これ以上ないくらい美味しいぞ！"
80000116-119 = "[s] \"ものすごいポジティブだね！？マコトらしいけど！\""
80000116-120 = "さあ、そんなところに突っ立ってないで、早く先生も来るがいい！"
80000116-121 = "それとも、まずは私の指に付いたチョコを舐めてみるか？"
80000116-122 = "マシュマロと一緒に味わう前に、チョコ本来の味を堪能した方が私の言葉を確実に理解できるだろう！"
80000116-123 = "さあ！私の指を舐めるのだ！"
80000116-124 = "[s] \"いやいや、いいから！普通に食べさせて！\""
80000116-125 = "……うむ。"
80000116-126 = "……そこまで強く断られると……さすがに傷つくのだが。"
80000116-127 = "とにかく……バレンタインデーはまだまだ終わっていない！"
80000116-128 = "私が用意したのはチョコレートファウンテンだけではない！#n本当のバレンタインはこれからだ！"
80000116-129 = "いったん着替えてこよう！ここで待っているのだ、先生！"
80000116-130 = "キシシッ！こうなったからには、今日一日、マコト様が用意した特別なバレンタインデーを堪能させてやろう！"
80000116-131 = "家に帰るまでがバレンタインデーだ！"
80000116-135 = "[ns] \"そうだね、せっかくのバレンタインデーだし……\""
80000116-137 = "[ns] \"次は何を見せてくれるのか楽しみにしてるね。\""
80000116-142 = "（予想外の出来事が連続して驚いたが、マコトが用意してくれたチョコレートはどれも美味しく、楽しい時間を過ごせた）"
