[translation]
10053010-1 = "第1話;ツチノコ探し"
10053010-2 = "長い間！！大変！お世話になったっす！！！\r\n\r\n\r\n"
10053010-7 = "……何のつもりだ？\r\n"
10053010-8 = "今日から旅に出るっす。"
10053010-9 = "1週間経っても音沙汰がなかったら、そのままいなくなったものとして――"
10053010-10 = "……って、隣の方はどなたっすか？#nはじめまして～"
10053010-11 = "お前が騒々しく入ってこなければ、今頃は紹介が済んでいたんだがな。\r\n"
10053010-12 = "こちらはシャーレの[USERNAME]先生だ。"
10053010-13 = "そして、こっちのだらしないのが我々公安局の副局長、[ruby=しま]志真[/ruby]コノカです。"
10053010-16 = "先生！おぉ～この方が！#nいやぁ、話は姉御からよく聞いてるっすよ！"
10053010-17 = "てか先生……なんで手錠はめられてるんすか？"
10053010-18 = "[s1] \"その……誤解しないでほしいんだけど……。\"\n[s2] \"ちょっとした行き違いがあったというか。\""
10053010-25 = "ブラックマーケットで、生徒の卒業アルバムを取引していたと連絡がありまして……#n「誤解」について詳しくお話を伺いたく。\r\n"
10053010-26 = "とはいえ先生の事ですので、業務上必要なものだったのかもしれませんし……。"
10053010-27 = "…………。\r\n"
10053010-28 = "お話を伺ったうえで、対応を決めようかと。\r\n"
10053010-29 = "[s3] \"大丈夫、探られて痛い腹はないよ！\"\r\n[s4] \"イオリなら分かってくれる！\""
10053010-32 = "はぁ……まだ詳細を何も伺っていませんのでなんとも。#n発言にはお気をつけください。\r\n"
10053010-33 = "それで、コノカ。"
10053010-34 = "旅とは何のことだ？\r\n"
10053010-35 = "ああ、その話っすか。\r\n\r\n"
10053010-36 = "笑わないで聞いてほしいんすけど――\r\n\r\n"
10053010-40 = "1週間以内にツチノコを捕まえなきゃならないんすよ！！\r\n\r\n"
10053010-45 = "ツチノコ……？\r\n\r\n"
10053010-46 = "それは……都市伝説の？\r\n\r\n"
10053010-47 = "そうっす！そのツチノコっす！\r\n\r\n\r\n\r\n\r\n"
10053010-48 = "伝説の未確認生物……だったか。\r\n"
10053010-49 = "ですです！目撃談はあるものの、未だに捕まっていない……まさに未確認生物界のラスボス的な存在っす！\r\n\r\n\r\n\r\n\r\n"
10053010-50 = "それに、莫大な懸賞金がかけられてて……なんと総額1億円！#n歩く……いや、這う金塊と言っても過言じゃないっす！\r\n\r\n\r\n"
10053010-51 = "……なるほど。\r\n\r\n"
10053010-52 = "少し踏み込んだ質問になるが……。\r\n"
10053010-53 = "もしかして、金銭的な事情を抱えていたりするのか？\r\n"
10053010-54 = "え？まさかぁ。#nあたしが金目当てで動くように見えます？\r\n\r\n\r\n\r\n"
10053010-55 = "……まぁ、違うだろうな。\r\n"
10053010-56 = "はぁ……となると……#nまたジンクス絡みか……。\r\n\r\n\r\n"
10053010-57 = "仕事に穴を開けることになってしまうんすけど……。\r\n\r\n\r\n"
10053010-58 = "あぁ、心配しなくていい。#n端から止めるつもりはない。\r\n"
10053010-59 = "どちらかといえば、お前は働きすぎだ。休息は大切だ。\r\n"
10053010-60 = "ただし――\r\n\r\n"
10053010-61 = "ただし……？\r\n\r\n\r\n"
10053010-62 = "行くなら先生と一緒に、だ。\r\n"
10053010-63 = "はぇ？\r\n\r\n\r\n\r\n"
10053010-64 = "[s] \"……私？\""
10053010-65 = "先生、少しよろしいですか？\r\n"
10053010-69 = "この旅に同行していただけるのであれば、今回の件は不問にいたします。\r\n\r\n"
10053010-70 = "[s5] \"し、司法取引か！？\"\r\n[s6] \"私は無実だよ！イオリに電話させて！\"\r\n"
10053010-73 = "違います。これは私の個人的なお願いです。\r\n\r\n"
10053010-74 = "あれでいて、コノカは問題児というわけではありません。まあ、行動に多少問題はありますが。\r\n\r\n"
10053010-75 = "見かけによらず真面目で、2年生で副局長を務めるほど優秀です。#n私とは違って社交的ですし、部下からの信頼も厚い。\r\n\r\n"
10053010-76 = "ただ、特定の話になると途端に目の色が変わ……過敏になる傾向がありまして。#nそれが――\r\n\r\n"
10053010-79 = "「迷信」の話、です。"
10053010-84 = "いや～、まさか先生が同行してくださるとは。\r\n"
10053010-85 = "念のため、とか言ってたけど姉御もほんと過保護っすよねぇ。"
10053010-86 = "あたしってば愛されてるな～"
10053010-87 = "そう思いません？あははっ！\r\n"
10053010-88 = "[s7] \"そ、そうだね！\"\r\n[s8] （お目付け役だけど……）"
10053010-91 = "あ、そうそう。"
10053010-92 = "今回、一人旅じゃないんすよ。#nまぁ先生がいるから一人旅じゃないんすけど。\r\n"
10053010-93 = "「ぐるみん」と「モー所長」が一緒っす。"
10053010-94 = "[s9] \"ぐるみんとモー所長……？\"\r\n[s10] \"すごく個性的な名前だね……。\""
10053010-97 = "名前じゃなくてIDっすよ、ID。\r\n"
10053010-98 = "[s11] \"ネットの知り合いってこと？\"\r\n[s12] \"危ない人だったらどうするの……？\""
10053010-101 = "はぇ？\r\n"
10053010-102 = "…………。"
10053010-103 = "ぷっ、あははっ！あははははっ！！！\r\n\r\n"
10053010-104 = "はーっ、すみません、笑いすぎたっす。\r\n"
10053010-105 = "先生、あたしを誰だと思ってるんすか？"
10053010-106 = "そういう危ない連中を捕まえるのが、あたしの仕事っすよ。\r\n"
10053010-107 = "まぁ、でも。今回は完全に初対面ってわけでもないんすけどね。"
10053010-108 = "知り合ったのはSNSですけど、何回かオフ会もしてるんで。"
10053010-109 = "先生はこういうの、興味ないっすか？"
10053010-110 = "都市伝説とか不思議体験とか、そういう話題が好きな人向けのSNSがあるんすよ。"
10053010-111 = "最初は事件のモニタリング目的で始めたんすけど、意外と掘り出し物も多くて……。\r\n"
10053010-116 = "お、着いたみたいっすね。#nんじゃ、続きはまた後ほど。"
10053010-125 = "はぁ……。"
10053010-126 = "聞いてはいたけど……ほんとド田舎っすねぇ。\r\n"
10053010-131 = "あ、来た。\r\n\r\n\r\n\r\n\r\n"
10053010-132 = "おや……1人、増えていないかい？\r\n\r\n\r\n\r\n\r\n"
10053010-133 = "あれ、本当だ。\r\n\r\n\r\n\r\n\r\n"
10053010-137 = "ん……？\r\n"
10053010-142 = "えっ！？なんで先生がここにいるの！？\r\n\r\n\r\n"
