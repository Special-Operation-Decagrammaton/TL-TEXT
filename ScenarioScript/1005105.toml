[translation]
1005105-1 = "情熱の応援魂"
1005105-4 = "ラーメン屋の前"
1005105-9 = "あのぉ……。"
1005105-10 = "客引き用の応援ロボットを注文したはずなのですが……。"
1005105-11 = "どうしてエンジニア部のマイスターご本人がいらっしゃったのでしょうか……？"
1005105-12 = "そう、なぜなら……"
1005105-13 = "応援ロボットの開発に失敗したからさ！"
1005105-14 = "えっ……そうですか。#nそれは残念です……。"
1005105-15 = "落ち込まなくても大丈夫だよ、大将。#n今日はロボットの代わりを私が務めよう！"
1005105-16 = "マイスター自らが応援してくださると……？"
1005105-17 = "あの……それでしたら、バイトを雇おうと思うのですが……。"
1005105-18 = "いいや、一度引き受けた依頼は最後までやり遂げる！#nそれこそがマイスターとしての責務だからね。"
1005105-19 = "お金をもらうつもりはないから、費用の心配はいらない。#nここは私に任せてくれ。"
1005105-20 = "そ、それならお願いします……。"
1005105-24 = "よし……ラーメン店の繁盛を祈って、エールを送る！"
1005105-29 = "フレーッ、フレーッ、すずめ亭！"
1005105-30 = "頑張れ、頑張れ、すずめ亭！"
1005105-31 = "行けるぞ、勝てるぞ、すずめ亭！"
1005105-35 = "[ns] \"……何に頑張って勝つの？\""
1005105-36 = "飲食店を経営する以上、様々な困難に立ち向かうわけだろう？"
1005105-37 = "テナントの賃料や人件費もそうだが、厳しい衛生管理も求められる。#nそういったものに打ち勝ってほしいという願いを込めたんだ。"
1005105-38 = "す、すごい気合ですね。声を聞いているだけで力が湧いてきます。"
1005105-39 = "……ところで、どうして厨房の前で応援を……？"
1005105-40 = "それはもちろん、繁盛するためには大将の熱意が必要不可欠だからだ。"
1005105-41 = "客を呼び込んだところで、大将に熱意がなければ、元の木阿弥だからね。"
1005105-42 = "た、確かに……。勉強になりました。"
1005105-43 = "……待ってくれ。まだ生地を練っているのかい？"
1005105-44 = "これでは開店時間を過ぎてしまう。#nなのに製麺が終わっていないなんて……。"
1005105-45 = "問題ありませんよ。#nどうせお客さんは来ませんし、なんならまだゆっくりしていられますから……。"
1005105-50 = "問題大有りだ！"
1005105-51 = "店が準備を怠ってどうする！ラーメン屋はスピード命！#n注文を受けた瞬間に麺を茹で始めなければ、客は愛想を尽かしてしまう！"
1005105-52 = "ああ、じれったい。#nそんな手付きでは[ruby=マイスター]職人を[/ruby]名乗れないぞ！"
1005105-54 = "えぇ、私は職人を目指したいとは――"
1005105-56 = "口を動かす暇があるなら手を動かせ！"
1005105-60 = "こ、こうですか？"
1005105-61 = "まだまだ！もっと速く！#nそうだ、その調子だ！"
1005105-62 = "ひぃ……。"
1005105-63 = "全力で！情熱を！戦うんだ大将！"
1005105-64 = "は、はいっ！"
1005105-69 = "……ほらあれ、ラーメン屋の大将が応援団のかけ声で麺を打ってるよ。"
1005105-70 = "手の動きが見えない……隠れ家的な職人のお店なのかな。"
1005105-71 = "なんだかラーメンの気分になってきちゃった。#nお昼、ここにしよっか。"
1005105-72 = "いいね！二人前お願いしまーす！"
1005105-74 = "……ありがとうございます！少々お待ちを！"
1005105-75 = "開店直後から列ができるだなんて……。"
1005105-76 = "これが応援の効果……？"
1005105-80 = "ふふ、応援大成功だな。"
1005105-81 = "先生、急ごう。#n次の人も待っているはずだ。"
1005105-87 = "……つまり、お願いした応援ロボットは完成しなかったということですね？"
1005105-88 = "ああ、申し訳ない。私の力では期限までに間に合わせることができなかった。"
1005105-89 = "仕方ありませんね。お伝えしていた期限も短かったですし……。"
1005105-90 = "安心してくれ。今日はロボットに代わって、#n私が応援団長として全力でエールを送ろう！"
1005105-91 = "さあ、どんな悩みがあるんだい？"
1005105-92 = "じ、実は……"
1005105-96 = "私はモモフレンズのビッグブラザー様が大好きなんです。#nあの全てを見抜く視線にやられてしまって、神秘的な魅力の虜になってしまいました。"
1005105-97 = "それ以来、ビッグブラザーファンクラブに加入してはいるんですが……。"
1005105-98 = "来週、ファンクラブの会長選挙が開かれるんです。#n本当は私も会長選挙に出て、ビッグブラザー様への思いを伝えたいのですが……勇気が出なくて。"
1005105-99 = "自分の気持ちすら正直に打ち明けられないような私が、全てを見抜くビッグブラザー様のファンクラブの会長になんて、なれっこないですよね……。"
1005105-105 = "君の情熱はその程度なのかい？"
1005105-107 = "そ、そんなことは……。"
1005105-109 = "好きなことを好きだと言う。それのどこに気後れする必要があるんだ！"
1005105-110 = "もっと正直に！#nもっと勇気を！"
1005105-111 = "それとも……もしやビッグブラザー様を恥ずかしく思っているのかい？"
1005105-112 = "違います！心の底からビッグブラザー様が好きです！"
1005105-113 = "だったら叫ぶんだ！自分の本当の気持ちを！"
1005105-114 = "私はビッグブラザー様が好きです！"
1005105-115 = "ほら、もっとだ！"
1005105-120 = "ビッグブラザー様が大好きです！お慕いしています！"
1005105-128 = "……あの、会員さんですよね？#nこんなところでどうしたんですか？"
1005105-130 = "えっと……これはその、ビッグブラザー様に思いを伝えたくて……。"
1005105-132 = "いくらビッグブラザー様が好きとはいえ、#nこんな往来の場所で堂々と愛を叫ぶだなんて……。"
1005105-137 = "……感激です！"
1005105-139 = "……えっ？"
1005105-141 = "私たちも常日頃からビッグブラザー様への愛を叫びたいと思っていましたが、#n人目を気にして胸の内に留めていたんです。"
1005105-142 = "その愛をありのまま伝えることができるなんて、素晴らしいです！"
1005105-143 = "あなたこそ次期会長にふさわしい！"
1005105-145 = "ほ、本当ですか？"
1005105-146 = "私でも本当に……ビッグブラザーファンクラブの会長になれるのでしょうか？"
1005105-147 = "もちろんです！"
1005105-148 = "私たちも一緒にビッグブラザー様の魅力を大声で叫ばせてください！"
1005105-157 = "……今回も大成功だね！"
1005105-158 = "[s] \"すごい情熱だ……。\""
1005105-159 = "ふふ、先生に褒めてもらえて光栄だ。"
1005105-160 = "こうしてはいられない。まだまだ私たちの応援を待っている人がいるのだから！"
1005105-162 = "（その後もウタハと一緒に市内各地を回って、エールを送り続けた）"
1005105-168 = "ふぅ……良い一日だったね。"
1005105-169 = "[s] \"お疲れさま、ウタハ。\""
1005105-170 = "そもそも私が期限を守れていれば良かったのだけど……。#nでも、みんなが満足してくれて良かったよ。"
1005105-171 = "それに普段は機械をいじってばかりだから、たまには身体を動かすのも良いものだね。"
1005105-172 = "おかげで新しいインスピレーションも得られたよ……初心を思い出すこともできた。"
1005105-173 = "早く帰って次の発明品を作りたくなってきたよ。"
1005105-177 = "[ns1] \"ところで、どうしてさっきから…\"\n[ns2] \"ささやくように話してるの？\""
1005105-182 = "それが……"
1005105-183 = "一日中、叫んでいたせいで……"
1005105-189 = "声が……出な……っ。"
1005105-191 = "（その後、喉が枯れてしまったウタハを労りながら、シャーレに戻った）"
