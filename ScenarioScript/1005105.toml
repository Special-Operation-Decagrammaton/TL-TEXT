[translation]
1005105-1 = "Alma de torcida apaixonada"
1005105-4 = "Em frente à loja de lámen"
1005105-9 = "Com licença..."
1005105-10 = "Eu deveria ter encomendado um robô de torcida para atrair clientes, mas..."
1005105-11 = "Por que o próprio mestre do Departamento de Engenharia veio pessoalmente...?"
1005105-12 = "Bem, é porque..."
1005105-13 = "O desenvolvimento do robô de torcida foi um fracasso!"
1005105-14 = "Ah... entendo. #nIsso é uma pena..."
1005105-15 = "Não precisa ficar desanimado, chefe. #nHoje, eu servirei como substituto do robô!"
1005105-16 = "O próprio mestre vai torcer por mim...?"
1005105-17 = "Hum... nesse caso, eu estava pensando em contratar um ajudante..."
1005105-18 = "De jeito nenhum, um pedido aceito deve ser cumprido até o fim! #nEsse é o dever de um mestre."
1005105-19 = "Não pretendo cobrar nada, então não se preocupe com os custos. #nDeixe comigo."
1005105-20 = "B-bem, então eu agradeço..."
1005105-24 = "Muito bem... rezando pelo sucesso da loja de lámen, vou enviar meu apoio!"
1005105-29 = "Vai, vai, Suzume-tei!"
1005105-30 = "Força, força, Suzume-tei!"
1005105-31 = "Você consegue, você vence, Suzume-tei!"
1005105-35 = "[ns] \"...Vencer o quê, exatamente?\""
1005105-36 = "Ao gerenciar um restaurante, você enfrenta várias dificuldades, não é?"
1005105-37 = "O aluguel do local, os custos com funcionários, e também a exigência de um controle sanitário rigoroso. #nColoquei meu desejo de que você supere tudo isso."
1005105-38 = "Q-que energia incrível. Só de ouvir sua voz, sinto minhas forças voltarem."
1005105-39 = "...A propósito, por que está torcendo na frente da cozinha...?"
1005105-40 = "Isso é óbvio, para o sucesso do negócio, o entusiasmo do chefe é indispensável."
1005105-41 = "Mesmo que você atraia clientes, se o chefe não tiver entusiasmo, tudo terá sido em vão."
1005105-42 = "I-isso é verdade... Aprendi muito."
1005105-43 = "...Espere um pouco. Você ainda está sovando a massa?"
1005105-44 = "Desse jeito, o horário de abertura vai passar. #nComo pode o preparo do macarrão não estar pronto...?"
1005105-45 = "Não tem problema. #nDe qualquer forma, os clientes não vêm, então eu ainda posso levar as coisas com calma..."
1005105-50 = "Tem um problema enorme, sim!"
1005105-51 = "Como pode uma loja ser tão desleixada com a preparação! Lámen é uma questão de velocidade! #nSe não começar a cozinhar o macarrão no momento em que recebe o pedido, o cliente vai perder o interesse!"
1005105-52 = "Ah, que agonia. #nCom esse jeito de trabalhar, você não pode se autodenominar um artesão!"
1005105-54 = "Bem, eu não pretendo ser um artesão..."
1005105-56 = "Se tem tempo para mover a boca, mova as mãos!"
1005105-60 = "A-assim está bom?"
1005105-61 = "Ainda não! Mais rápido! #nIsso, esse é o ritmo!"
1005105-62 = "Ai, ai..."
1005105-63 = "Com toda a força! Com paixão! Lute, chefe!"
1005105-64 = "S-sim!"
1005105-69 = "...Olha só, o chefe da loja de lámen está sovando a massa no ritmo da torcida."
1005105-70 = "Não dá nem para ver o movimento das mãos... Será que é uma daquelas lojas de artesãos escondidas?"
1005105-71 = "Deu até vontade de comer lámen. #nVamos almoçar aqui?"
1005105-72 = "Boa ideia! Dois, por favor!"
1005105-74 = "...Muito obrigado! Só um instante!"
1005105-75 = "Formar uma fila logo após abrir..."
1005105-76 = "Será que isso é o efeito da torcida...?"
1005105-80 = "Hehe, a torcida foi um sucesso total."
1005105-81 = "Sensei, vamos nos apressar. #nDeve haver mais pessoas esperando."
1005105-87 = "...Ou seja, o robô de torcida que eu pedi não foi concluído?"
1005105-88 = "Ah, sinto muito. Com as minhas habilidades, não consegui terminar dentro do prazo."
1005105-89 = "Não tem jeito, né. O prazo que eu tinha passado também era curto..."
1005105-90 = "Fique tranquilo. Hoje, substituindo os robôs, #ncomo líder de torcida, vou enviar todo o meu apoio!"
1005105-91 = "Vamos lá, qual é o seu problema?"
1005105-92 = "B-bem, na verdade..."
1005105-96 = "Eu amo o Big Brother dos Momo Friends. #nFui atingida por aquele olhar que vê tudo e me tornei prisioneira do seu charme misterioso."
1005105-97 = "Desde então, entrei para o fã-clube do Big Brother, mas..."
1005105-98 = "Na semana que vem, haverá a eleição para presidente do fã-clube. #nNa verdade, eu também queria me candidatar e expressar meus sentimentos pelo Big Brother, mas... não tenho coragem."
1005105-99 = "Se nem consigo confessar meus próprios sentimentos honestamente, como eu poderia me tornar presidente do fã-clube do Big Brother, que vê tudo? Não tem como..."
1005105-105 = "A sua paixão é só isso?"
1005105-107 = "I-isso não é verdade..."
1005105-109 = "Dizer que gosta do que gosta. Por que você deveria se sentir acanhada com isso!"
1005105-110 = "Seja mais honesta! #nTenha mais coragem!"
1005105-111 = "Ou será que... você tem vergonha do Big Brother?"
1005105-112 = "Não! Eu amo o Big Brother do fundo do meu coração!"
1005105-113 = "Então grite! Seus verdadeiros sentimentos!"
1005105-114 = "Eu amo o Big Brother!"
1005105-115 = "Isso, mais alto!"
1005105-120 = "Eu amo o Big Brother! Eu o admiro muito!"
1005105-128 = "……Ei, você é um membro, não é? #nO que está fazendo em um lugar como este?"
1005105-130 = "Bem... é que, eu queria expressar meus sentimentos ao Big Brother..."
1005105-132 = "Por mais que você ame o Big Brother, #ngritar seu amor tão abertamente em um lugar movimentado como este..."
1005105-137 = "……Estou emocionada!"
1005105-139 = "……Hã?"
1005105-141 = "Nós também sempre quisemos gritar nosso amor pelo Big Brother, #nmas guardávamos no fundo do peito por vergonha dos outros."
1005105-142 = "É maravilhoso poder expressar esse amor exatamente como ele é!"
1005105-143 = "Você é a pessoa certa para ser a próxima presidente!"
1005105-145 = "S-sério mesmo?"
1005105-146 = "Será que eu realmente... posso me tornar presidente do fã-clube do Big Brother?"
1005105-147 = "Com certeza!"
1005105-148 = "Deixe-nos gritar o charme do Big Brother junto com você!"
1005105-157 = "……Mais um grande sucesso!"
1005105-158 = "[s] \"Que paixão incrível...\""
1005105-159 = "Hehe, é uma honra ser elogiada pelo Sensei."
1005105-160 = "Não podemos parar por aqui. Ainda tem muita gente esperando pelo nosso apoio!"
1005105-162 = "(Depois disso, continuei percorrendo a cidade com Utaha, enviando palavras de incentivo)"
1005105-168 = "Ufa... foi um bom dia, não foi?"
1005105-169 = "[s] \"Bom trabalho, Utaha.\""
1005105-170 = "No fundo, teria sido melhor se eu tivesse cumprido o prazo... #nMas fico feliz que todos tenham ficado satisfeitos."
1005105-171 = "Além disso, como passo o tempo todo mexendo em máquinas, é bom movimentar o corpo de vez em quando."
1005105-172 = "Graças a isso, ganhei novas inspirações... e consegui me lembrar do meu propósito inicial."
1005105-173 = "Já estou com vontade de voltar logo para criar minha próxima invenção."
1005105-177 = "[ns1] \"A propósito, por que você está...\"\n[ns2] \"falando sussurrando?\""
1005105-182 = "É que..."
1005105-183 = "De tanto gritar o dia todo..."
1005105-189 = "Minha voz... não sai..."
1005105-191 = "(Depois disso, cuidei de Utaha, que estava com a garganta seca, e voltamos para o Schale)"
