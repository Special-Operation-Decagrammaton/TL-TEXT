[translation]
1002902-1 = "1ª aula: \"Matéria: Romance\""
1002902-6 = "（O local indicado por Natsu era uma sala de aula qualquer na Trinity）"
1002902-7 = "（Talvez por ser fim de semana, não há outros alunos na sala）"
1002902-8 = "Oh~, pontual como um relógio."
1002902-13 = "Como esperado do Sensei. Não só sabe ensinar, como também está pronto para aprender, né? Maravilhoso~."
1002902-14 = "[s1] \"Aprender...?\"\n[s2] \"Falando nisso, você ia me ensinar sobre 'romance', não era?\""
1002902-15 = "Fufu, é isso mesmo. Por mais que eu pareça assim, sou do tipo que cumpre o que promete."
1002902-16 = "Fufu, é isso mesmo. Por mais que eu pareça assim, sou do tipo que cumpre o que promete."
1002902-17 = "Ah, e não precisa se preocupar. Não vou fazer nada que te deixe entediado ou com sono, como numa aula comum."
1002902-18 = "Bem, embora seja estranho dizer isso na frente do Sensei, né?"
1002902-19 = "Nihi."
1002902-20 = "Bem, de qualquer forma, vamos ser sinceros sobre isso."
1002902-21 = "Quando você era aluno, também dormia bastante nas aulas, né? Não? Bem, tanto faz."
1002902-22 = "Não tentar se esconder e mostrar quem você realmente é para o outro... essa postura é o primeiro passo para o romance."
1002902-23 = "Mas enfim,"
1002902-24 = "O tema da aula de hoje é esse tal de \"romance\"."
1002902-25 = "O que é o romance? O que significa ser romântico?"
1002902-26 = "Quer que eu adivinhe o que você está pensando agora? \"Por que ela começou a falar disso do nada?\"."
1002902-27 = "\"Por que ela começou a falar de biscoitos junto com mensagens misteriosas no MomoTalk do nada?\"...!"
1002902-28 = "……Bem, é claro que, por enquanto, isso basta. Então, primeiro, para um Sensei como você, vou apresentar um pequeno material didático."
1002902-29 = "É..."
1002902-30 = "Isto aqui! Tcharam!"
1002902-35 = "[ns3] \"Biscoitos caseiros?\"\n[ns4] \"Parecem deliciosos.\""
1002902-38 = "Fufu, é isso mesmo."
1002902-39 = "Maaaas, o mais importante agora não é se são caseiros ou não, nem o sabor deles."
1002902-40 = "……Hm? O que foi?"
1002902-41 = "Acha estranho eu dizer que \"não é o sabor\", sendo do Clube de Doces?"
1002902-42 = "Aha~."
1002902-43 = "Belo ponto de vista, Sensei. Mas você já deveria saber a resposta. Afinal, nós não somos o \"Clube de Pesquisa Gourmet\", somos o \"Clube de Doces\"."
1002902-44 = "Além disso,"
1002902-45 = "É só que não é a \"coisa mais importante agora\"."
1002902-46 = "Então, o que é mais importante agora? É a \"forma\"."
1002902-51 = "Olhe para estes biscoitos. Biscoitos caseiros têm formas diferentes e decorações diferentes, não é?"
1002902-52 = "Os sentimentos e as preferências de quem os fez foram colocados ali livremente... mesmo que inconscientemente, cada um carrega um coração diferente."
1002902-53 = "Quando estou fazendo estes biscoitos..."
1002902-54 = "A forma do meu coração naquele momento se torna a forma do biscoito, como uma foto capturando um instante."
1002902-55 = "Ou seja, é a forma do coração e a forma dos pensamentos. Algo que talvez nem a própria pessoa que fez tenha notado, mas que criou uma forma consciente ou inconscientemente."
1002902-56 = "……Isso sim é o verdadeiro romance!"
1002902-57 = "É por isso que eu gosto de biscoitos caseiros. Doces sofisticados são ótimos, claro, mas estes têm um \"sabor\" com um significado diferente que só existe aqui."
1002902-58 = "Enquanto eu fazia os biscoitos, isso me veio à mente, e eu queria que o Sensei soubesse disso."
1002902-59 = "……Bem, é mais ou menos isso. De repente, quando me veio à cabeça, não consegui evitar de falar."
1002902-60 = "Desculpe por te fazer vir até aqui. Nihihi."
1002902-61 = "Obrigada por me ouvir. Como forma de agradecimento, vou te dar esse material didático de presente."
1002902-68 = "Eu disse que o sabor não é o mais importante, mas acho que estão bem gostosos. Tenho confiança, v-sign."
1002902-69 = "……Hm? Agora, aqui, juntos?"
1002902-70 = "Muu..."
1002902-71 = "Sensei, sinto muito, mas esse convite doce eu vou ter que recusar. Tente se lembrar do conteúdo da aula."
1002902-72 = "Eu disse, não foi? Que a forma desses biscoitos carrega um coração inconsciente."
1002902-73 = "Então, comer na minha frente não combina com o romance~. Pelo menos, você tem que saborear quando eu não estiver por perto. Seria muito vergonhoso."
1002902-74 = "Muito bem, a aula de hoje termina aqui!"
1002902-75 = "Levantar! Bem, eu já vou indo, Sensei, por favor, saia com um intervalo de tempo."
1002902-76 = "……Ou talvez, seja uma boa ideia ficar para estudar depois da aula, não é?"
1002902-77 = "Hehe, então até mais~."
1002902-82 = "（Depois que a Natsu saiu da sala, observei os biscoitos um por um）"
1002902-83 = "（Se eu entendi ou não o significado por trás de cada formato, é difícil dizer……）"
