[translation]
1002902-1 = "1時間目「科目：ロマン」"
1002902-6 = "（ナツから伝えられた場所は、トリニティのとある教室だった）"
1002902-7 = "（週末だからか、教室に他の生徒たちの姿は無い）"
1002902-8 = "おぉ～、時間ぴったり。"
1002902-13 = "さっすが先生。勉強とかを教えるだけじゃなく、教わる準備もできてるってことかな？素晴らしい～。"
1002902-14 = "[s1] \"教わる……？\"\n[s2] \"そういえば、「ロマン」について教えてくれるんだっけ。\""
1002902-15 = "ふふっ、そうだよー。何せ私はこう見えて、一度言ったことは守るタイプ。"
1002902-16 = "ふふっ、そうだよー。何せ私はこう見えて、一度言ったことは守るタイプ。"
1002902-17 = "ああ、それと心配しないで良いよ。まるで普通の授業みたいに、退屈だーとか眠いーとか思わせるようなことはしないから。"
1002902-18 = "まあ、先生を前にこういうこと言うのもなんだけどねぇ？"
1002902-19 = "にひ。"
1002902-20 = "まあまあとにかく、こういうのは正直に行こうよ。"
1002902-21 = "先生も授業を受けてた時は、よく寝てたでしょ？違うの？まあどっちでも良いや。"
1002902-22 = "自分を着飾ることなく、相手にありのままをさらけ出す……こういう姿勢が、ロマンに通じる第一歩だからね。"
1002902-23 = "まあとにかく、"
1002902-24 = "今日の講義テーマはその「ロマン」だよ。"
1002902-25 = "ロマンとは何か？ロマンティックであるとはどういうことなのか？"
1002902-26 = "今先生が思ってることを当ててあげよっか、「どうして急にこんなこと言い始めたんだろ？」。"
1002902-27 = "「どうして急にモモトークで、謎の言葉と共にクッキーの話をし始めたんだろう」……！"
1002902-28 = "……まあもちろん、今はそれで十分だよ。じゃあ、まずはそんな先生のために、ちょっとした教材を進呈して進ぜよう。"
1002902-29 = "それは……"
1002902-30 = "こちら！ドドン！"
1002902-35 = "[ns3] \"手作りクッキー？\"\n[ns4] \"美味しそう。\""
1002902-38 = "ふふ、そうだね。"
1002902-39 = "しかーし、今一番重要なのは手作りかどうかでもなければ、その味でもないんだよ。"
1002902-40 = "……ん？どしたの？"
1002902-41 = "放課後スイーツ部なのに「味じゃない」って言うのが意外？"
1002902-42 = "あはー。"
1002902-43 = "良い着眼点だね先生。でもその答えはもう知ってるはずだよ。だって私たちは「放課後グルメ探究部」じゃなくて、「放課後スイーツ部」なんだから。"
1002902-44 = "それに、"
1002902-45 = "あくまでも「今一番重要な」ことじゃない、ってだけ。"
1002902-46 = "じゃあ何が今一番重要なのか……それは、「形」。"
1002902-51 = "このクッキーたちを見て。手作りのクッキーは、みんなそれぞれ違う形で、それぞれ違うデコレーションを着てるでしょ。"
1002902-52 = "作った人の気持ち、好み、それが自由に込められた結果……たとえ無意識だとしても、それぞれに異なった心が込められてるの。"
1002902-53 = "このクッキーを作ってる時……。"
1002902-54 = "その瞬間の心の形が、まるで一瞬を切り取る写真のようにこうしてクッキーの形になってる。"
1002902-55 = "つまりは心の形でもあり、思いの形でもある。これを作った本人ですら気づいてないかもしれない何かが意識的に、あるいは無意識的に作り出した形。"
1002902-56 = "……これぞ、まさにロマン！"
1002902-57 = "だからね、私は手作りのクッキーが好きなの。他の高級なスイーツなんかももちろん良いけど、ここにしか無い別の意味での「味」ってのがあるんだよねぇ。"
1002902-58 = "それでクッキーを作ってたらそのことがふと脳裏に浮かんで、それを先生にも知ってほしいなって。"
1002902-59 = "……まあ、そんなところだね。何だか、思い浮かんだら言わずにはいられなくってさ。"
1002902-60 = "ごめんねーわざわざ来てもらって。にひひ。"
1002902-61 = "聞いてくれてありがとー。お返しと言っては何だけど、その教材は先生にプレゼントして差し上げよー。"
1002902-68 = "味は重要じゃないって言っておいて何だけど、結構おいしいと思うよ。自信あり、ぶい。"
1002902-69 = "……ん？今ここで、一緒に？"
1002902-70 = "むー……。"
1002902-71 = "先生、その甘ーいお誘いはごめんだけどパス。授業の内容を思い出してみて。"
1002902-72 = "言ったでしょ、そのクッキーの形には無意識的に心が込められてるって。"
1002902-73 = "だから目の前でっていうのは、ロマン的にいただけないな～。せめて私がいないところで噛みしめてもらわないと。流石に恥ずかしいよ。"
1002902-74 = "さあさあ、今日の授業はここまで！"
1002902-75 = "起立！じゃ私は先に帰るね、先生は時間差で何卒。"
1002902-76 = "……あるいは、それで居残り勉強をするのも良いかもね。"
1002902-77 = "にひ、それじゃあまたね～。"
1002902-82 = "（その後ナツがいなくなった教室で、クッキーを一つ一つ眺めてみた）"
1002902-83 = "（それぞれの形にどんな意味が込められてるのかは、分かったような、分からなかったような……）"
