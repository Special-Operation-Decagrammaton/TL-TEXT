[translation]
10001005-1 = "Prólogo; A Grande Presidente do Conselho Estudantil"
10001005-2 = "Academia Federal Red Winter - Portão Principal"
10001005-6 = "……Seja muito bem-vindo, Sensei. Em nome da Academia Federal Red Winter, recebo sua visita de braços abertos."
10001005-7 = "Venha, a Presidente Cherino está esperando lá dentro."
10001005-8 = "Por aqui, por favor……."
10001005-11 = "Academia Federal Red Winter - Gabinete da Presidente"
10001005-15 = "[ns] Aquilo é……."
10001005-19 = "Está curioso sobre aquele retrato?"
10001005-20 = "Aquela pessoa é a Presidente do Conselho Estudantil da nossa Academia Federal Red Winter, além de ser a Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Representante dos Clubes Esportivos, Chefe do Departamento de Limpeza, Presidente do Comitê Disciplinar e Chefe do Departamento de Merenda: a Presidente Cherino."
10001005-21 = "[s1] \"Parece ocupada.\"\n[s2] \"O bigode é legal.\""
10001005-22 = "Secretária-Geral, trouxe o Sensei."
10001005-26 = "Sim, aquele bigode é o símbolo da autoridade de Red Winter."
10001005-27 = "Fico feliz que tenha gostado."
10001005-28 = "Secretária-Geral, trouxe o Sensei."
10001005-35 = "……Bom trabalho, Chefe de Gabinete Tomoe. Minha fiel mão direita. Como recompensa, lhe concederei uma medalha em breve."
10001005-36 = "É uma honra, Secretária-Geral."
10001005-38 = "E então…… bem-vindo à minha Academia Federal Red Winter, camarada."
10001005-40 = "Eu sou Cherino!"
10001005-41 = "A Presidente do Conselho Estudantil desta Academia Federal Red Winter, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Chefe do Departamento de Limpeza……"
10001005-42 = "Hum……"
10001005-43 = "E depois... o que mais era mesmo..."
10001005-44 = "(Sussurros) Representante do clube de esportes, presidente do comitê disciplinar, chefe do departamento de merenda...!"
10001005-45 = "...É isso! De qualquer forma, sou uma pessoa importante encarregada de tudo o que é incrível! Sinta-se honrado por me encontrar, camarada!"
10001005-46 = "[s] \"Não está um pouco diferente do retrato...?\""
10001005-47 = "Ha! Não se preocupe com detalhes tão triviais! Aquilo é uma representação de como serei no futuro, então não há problema algum!"
10001005-48 = "Ou será que você tem alguma reclamação sobre o meu retrato, camarada?"
10001005-49 = "Se você é um adulto, deveria saber ler a situação..."
10001005-50 = "Uhyah!?"
10001005-54 = "Se-Secretária-geral!?"
10001005-55 = "Ai, ai..."
10001005-56 = "Tomoe!! Eu não disse para você arrumar o tapete direito porque é fácil tropeçar aqui?! Quer ser expurgada!?"
10001005-57 = "Che-Cherino-chan! O bigode! O seu bigode!"
10001005-58 = "...Hm?"
10001005-59 = "Ah, u-uhyaah! O meu bigode!"
10001005-68 = "...Ufa. O dia está lindo hoje, não acha, Tomoe?"
10001005-69 = "Como desejar, Secretária-geral."
10001005-70 = "[s] \"A propósito, por que veio aqui tão de repente?\""
10001005-71 = "Fufufu, prepare-se para se surpreender... É por causa,"
10001005-72 = "dos preparativos para o \"Ivan Kupala\"!"
10001005-73 = "[s] \"Ivan Kupala?\""
10001005-74 = "Camarada, você deve saber, mas a época do "solstício de verão" está chegando. Ou seja, o dia com o período de luz solar mais longo do ano está próximo..."
10001005-75 = "Nesta época, em que a neve começa a derreter e a vegetação brota, a Academia Federal de Red Winter realiza anualmente o festival do solstício de verão, o "Ivan Kupala"!"
10001005-76 = "O "Ivan Kupala" é uma boa e velha tradição da Academia Federal de Red Winter! Por isso, a secretaria está mobilizando todos os alunos para garantir que possamos realizar um evento grandioso e preparar o melhor "Ivan Kupala" de todos!"
10001005-77 = "Não é, Chefe de Gabinete Tomoe?"
10001005-78 = "Sim. Seguindo as instruções da Presidente, implementamos um sistema de dois turnos e, como resultado da premiação aos trabalhadores exemplares, alcançamos 250% da produção da semana anterior."
10001005-79 = "Err... isso significa que as coisas estão indo bem, certo?"
10001005-80 = "...Entendo! Ótimo, ótimo! Então este "Ivan Kupala" será perfeito!"
10001005-81 = "[s3] \"O solstício de verão não é só daqui a um mês?\"\n[s4] \"Tem algo em que eu possa ajudar?\""
10001005-82 = "Está tentando me fazer de boba?! Eu sei disso muito bem!"
10001005-83 = "Haha! Sob a minha orientação perfeita, tudo está progredindo, não há falhas ou deficiências na nossa Academia Federal de Red Winter!"
10001005-84 = "A razão pela qual chamei você, Camarada, neste momento é... porque você é o professor do Schale."
10001005-85 = "Como professor do Schale, você interage frequentemente com alunos de outras escolas, não é?"
10001005-86 = "Usando essas conexões, para espalhar a glória da nossa Academia Federal de Red Winter, o professor do Schale será subornado..."
10001005-87 = "Não, vendido...?"
10001005-88 = "(Sussurro) Cherino-chan, é recrutar. Recrutar!"
10001005-89 = "I-isso mesmo! Pensei que recrutar o professor do Schale seria o melhor meio de elevar a fama da nossa Red Winter!"
10001005-94 = "Vamos, Camarada! Grave bem em seus olhos esta imagem maravilhosa da Academia Federal de Red Winter se preparando para o festival do solstício de verão e espalhe por todo o Kivotos através dos alunos das outras escolas!"
10001005-97 = "#video;10001"
