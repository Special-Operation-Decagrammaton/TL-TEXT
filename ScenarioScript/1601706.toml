[translation]
1601706-1 = "I hate this world (without you) "
1601706-2 = "（アオバから連絡を受けて車両基地に到着した）"
1601706-11 = "あっ、ああっ……せ、先生……！"
1601706-12 = "ま、また来てくれた……。"
1601706-13 = "[s1] \"アオバに頼まれたら、来ないわけにはいかないよ。\"\n[s2] \"お役に立てるよう、頑張るね。\""
1601706-16 = "そ、そんな……滅相もないですけど……！"
1601706-17 = "いらっしゃるだけで……す、救われるというか……！"
1601706-21 = "あ、ありがとうございます……！"
1601706-22 = "せ、先生がいると、心強いです……！"
1601706-23 = "それでは……恐縮ですけど……！"
1601706-24 = "今日は作業が山積みなので……よ、よろしくお願いします！"
1601706-25 = "[s] \"もちろん！\""
1601706-28 = "（用意した作業着に着替え、すぐにアオバの作業を手伝い始めた）"
1601706-47 = "（何が何だか分からないまま、とりあえず言われたことを必死にこなした……）"
1601706-49 = "（時間が経過し……）"
1601706-52 = "あとは……このネジを締めて……っ！"
1601706-57 = "お、終わりましたけど……。"
1601706-58 = "[s] \"すごい……！やったね、アオバ！\""
1601706-59 = "こ、こんなに早く……！"
1601706-60 = "せ、先生のおかげです……！"
1601706-61 = "[s] \"私たち、いいコンビかもね。\""
1601706-62 = "は、はいっ！整備に慣れてないはずなのに……大人はすごいです……！"
1601706-63 = "そ、そうだ……もうこんな時間……！"
1601706-64 = "は、早く着替えて帰りましょう……！"
1601706-73 = "……。"
1601706-74 = "（……油の匂い？）"
1601706-75 = "……。"
1601706-76 = "……あ、あれ？"
1601706-77 = "（ま、まさか……？）"
1601706-85 = "ひ、ひゃゃああぁっ……！！"
1601706-86 = "[ns] \"あ、アオバ！？\""
1601706-92 = "[wa:680]― [log=아오바]こ、[wa:350]来ないでほしいんです……[wa:1380]けど……！[/log]"
1601706-95 = "[ns] \"あっ、ご、ごめん！\""
1601706-96 = "[wa:3450]― [log=아오바]ふ、[wa:870]服に……っ！[/log]"
1601706-99 = "― [log=아오바]油の匂いが[wa:1300]ついちゃうんで……[/log]"
1601706-101 = "― [log=아오바]よ、[wa:610]よくないんで……！[/log]"
1601706-104 = "― [log=아오바]す、[wa:900]すぐ脱ぐので……[/log]"
1601706-106 = "― [log=아오바]そ、[wa:860]そこで待ってて……[wa:1650]くださいっ！[/log]"
1601706-109 = "[ns3] \"いやいやいやっ！\"\n[ns4] \"そ、それは困るよ！いろんな意味で！\""
1601706-110 = "[wa:1210]― [log=아오바]え？[wa:1780]一体……[wa:1310]どういう……？[/log]"
1601706-111 = "[wa:1210]― [log=아오바]え？[wa:1780]一体……[wa:1310]どういう……？[/log]"
1601706-114 = "[wa:2220]― [log=아오바]あっ……[wa:1800]えっと……[/log]"
1601706-117 = "― [log=아오바]あああっ！？[wa:1270]そ、[wa:270]そのっ！[/log]"
1601706-119 = "― [log=아오바]う、[wa:820]うわぁああああっ！[/log]"
1601706-122 = "（慌てて宿直室を飛び出し、アオバを外で待つことにした……）"
1601706-126 = "……。"
1601706-127 = "お、お待たせしました……！"
1601706-128 = "油の匂い、大丈夫ですよね！？こ、これで帰れます……！"
1601706-129 = "[s] \"うん、それじゃ行こうか。\""
1601706-130 = "は、はい……！"
1601706-137 = "退勤後の外の風は気持ちいいです……。"
1601706-138 = "先生……きょ、今日はありがとうございました……。"
1601706-139 = "[s] \"いつもこんなに仕事が多いの？\""
1601706-140 = "はい……。"
1601706-141 = "このあたりで整備を引き受けているのは、うちくらいで……。"
1601706-142 = "しゃ、車両事故も多いし……依頼がどんどん増えています……。"
1601706-143 = "[s] \"本当にお疲れ様、アオバ。\""
1601706-144 = "で、でも……不思議と最近は大変じゃなくて……。"
1601706-145 = "なんででしょう……。"
1601706-146 = "……。"
1601706-150 = "あ……。"
1601706-156 = "あ、あぁ……。"
1601706-157 = "へ、へへっ……。"
1601706-158 = "[s] \"ん？何かいいことでもあったの？\""
1601706-162 = "あ、はひっ……！？な、なんでも……ないです……！"
1601706-163 = "……いいこと、といえばそうかもしれません。"
1601706-164 = "[s] \"それならよかったよ、アオバ！\""
1601706-165 = "へへ……いいこと……。"
1601706-166 = "うん、あれは……いいこと。"
1601706-170 = "む、昔は……こんなこと、思いもしなかったのに……。"
1601706-172 = "毎晩、布団の中で一日を振り返っていたんですけど……。"
1601706-173 = "そのときも、明日が来なければいいのに……って思ってました。"
1601706-174 = "ど、どうせ……がっかりすることしか起きないから……。"
1601706-177 = "[ns] \"……。\""
1601706-178 = "でも……！今は違います。"
1601706-179 = "ね、寝る前に……明日を期待しちゃうんです。"
1601706-180 = "もしかしたら、いい日になるのかも……？って。"
1601706-181 = "同じ日常のはずなのに……不思議ですよね……？"
1601706-182 = "仕事の量も減っていないんですけど……。"
1601706-183 = "幹部たちの無茶振りに頭を抱えているのも、同じです。でも――"
1601706-184 = "その……。"
1601706-185 = "それでも、期待で胸がいっぱいになって……明日が待ち遠しく思えるんです……。"
1601706-186 = "誰かがいるだけで……こ、こんなにも景色が変わるだなんて……。"
1601706-187 = "[s5] \"本当に良かったね！\"\n[s6] \"アオバがそんな日常を送れてるなら、私も嬉しい！\""
1601706-192 = "えへへ……そ、そう、ですね。"
1601706-193 = "こ、これからもずっと……こ、こんな日が……。"
1601706-195 = "続くといいんですけど……。"
