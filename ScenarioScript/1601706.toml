[translation]
1601706-1 = "I hate this world (without you) "
1601706-2 = "（Cheguei ao pátio de manobras após receber o contato de Aoba）"
1601706-11 = "Ah, aah... S-Sensei...!"
1601706-12 = "V-você veio de novo..."
1601706-13 = "[s1] \"Se a Aoba me pediu, não tinha como eu não vir.\"\n[s2] \"Vou dar o meu melhor para ser útil.\""
1601706-16 = "N-não, que isso... não precisa de tanto...!"
1601706-17 = "Só de você estar aqui... eu me sinto... salva!"
1601706-21 = "M-muito obrigada...!"
1601706-22 = "T-ter o Sensei aqui me dá muita segurança...!"
1601706-23 = "Então... desculpe o incômodo, mas...!"
1601706-24 = "Hoje o trabalho está acumulado, então... p-por favor, me ajude!"
1601706-25 = "[s] \"Com certeza!\""
1601706-28 = "（Troquei de roupa para o uniforme de trabalho e comecei a ajudar a Aoba imediatamente）"
1601706-47 = "（Sem entender muito bem o que estava acontecendo, fiz o meu melhor para seguir as instruções...）"
1601706-49 = "（O tempo passou...）"
1601706-52 = "Agora... é só apertar este parafuso...!"
1601706-57 = "T-terminamos, mas..."
1601706-58 = "[s] \"Incrível...! Conseguimos, Aoba!\""
1601706-59 = "T-tão rápido assim...!"
1601706-60 = "T-tudo graças ao Sensei...!"
1601706-61 = "[s] \"Talvez a gente seja uma boa dupla.\""
1601706-62 = "S-sim! Mesmo que você não esteja acostumado com manutenção... os adultos são incríveis...!"
1601706-63 = "A-ah, é verdade... já está tarde...!"
1601706-64 = "V-vamos nos trocar logo para ir embora...!"
1601706-73 = "..."
1601706-74 = "（...Cheiro de óleo?）"
1601706-75 = "..."
1601706-76 = "...A-ah, espera?"
1601706-77 = "（N-não pode ser...?）"
1601706-85 = "I-iiiaaaah...!!"
1601706-86 = "[ns] \"A-Aoba!?\""
1601706-92 = "[wa:680]― [log=아오바]N-não quero que você venha... [wa:1380]mas...! [/log]"
1601706-95 = "[ns] \"Ah, d-desculpa!\""
1601706-96 = "[wa:3450]― [log=아오바]A... [wa:870]minha roupa...! [/log]"
1601706-99 = "― [log=아오바]Vai ficar com [wa:1300]cheiro de óleo... [/log]"
1601706-101 = "― [log=아오바]N-não é [wa:610]bom...! [/log]"
1601706-104 = "― [log=아오바]V-vou [wa:900]tirar logo... [/log]"
1601706-106 = "― [log=아오바]E-espere aí... [wa:1650]por favor! [/log]"
1601706-109 = "[ns3] \"Não, não, não!\"\n[ns4] \"I-isso seria um problema! Em vários sentidos!\""
1601706-110 = "[wa:1210]― [log=아오바]Eh? [wa:1780]O que... [wa:1310]como assim...? [/log]"
1601706-111 = "[wa:1210]― [log=아오바]Eh? [wa:1780]O que... [wa:1310]como assim...? [/log]"
1601706-114 = "[wa:2220]― [log=아오바]Ah... [wa:1800]bem... [/log]"
1601706-117 = "― [log=아오바]Aaaah!? [wa:1270]I-isso... [/log]"
1601706-119 = "― [log=아오바]U- [wa:820]uwaaaaaah! [/log]"
1601706-122 = "（Saí apressado do alojamento e decidi esperar a Aoba do lado de fora...）"
1601706-126 = "..."
1601706-127 = "D-desculpe a demora...!"
1601706-128 = "O cheiro de óleo, está tudo bem, né!? P-podemos ir embora agora...!"
1601706-129 = "[s] \"Sim, então vamos nessa.\""
1601706-130 = "S-sim...!"
1601706-137 = "A brisa lá fora depois do expediente é tão agradável..."
1601706-138 = "Sensei... mu-muito obrigada por hoje..."
1601706-139 = "[s] \"Você sempre tem tanto trabalho assim?\""
1601706-140 = "Sim..."
1601706-141 = "Somos praticamente os únicos que cuidam da manutenção por aqui..."
1601706-142 = "E-e como há muitos acidentes de veículos... os pedidos não param de aumentar..."
1601706-143 = "[s] \"Você realmente se esforçou muito, Aoba.\""
1601706-144 = "Ma-mas... estranhamente, ultimamente não tem sido tão difícil..."
1601706-145 = "Por que será..."
1601706-146 = "..."
1601706-150 = "Ah..."
1601706-156 = "Ah, ah..."
1601706-157 = "He-hehe..."
1601706-158 = "[s] \"Hm? Aconteceu algo de bom?\""
1601706-162 = "Ah, hiih...!? Na-nada... não é nada...!"
1601706-163 = "...Se for para chamar de algo bom, talvez seja isso mesmo."
1601706-164 = "[s] \"Fico feliz por você, Aoba!\""
1601706-165 = "Hehe... algo bom..."
1601706-166 = "Sim, aquilo foi... algo bom."
1601706-170 = "An-antigamente... eu nem imaginava que algo assim pudesse acontecer..."
1601706-172 = "Toda noite, eu ficava relembrando o dia enquanto estava na cama..."
1601706-173 = "E naquela época, eu pensava que seria melhor se o amanhã nunca chegasse..."
1601706-174 = "Po-porque, de qualquer forma... só aconteciam coisas decepcionantes..."
1601706-177 = "[ns] \"...\""
1601706-178 = "Mas...! Agora é diferente."
1601706-179 = "An-antes de dormir... eu começo a criar expectativas para o amanhã."
1601706-180 = "Pensando: 'Talvez seja um dia bom, não é?'"
1601706-181 = "Deveria ser a mesma rotina de sempre... é estranho, não é?"
1601706-182 = "A quantidade de trabalho não diminuiu..."
1601706-183 = "E eu continuo tendo dor de cabeça com as exigências absurdas dos superiores. Mas..."
1601706-184 = "Aquele..."
1601706-185 = "Mesmo assim, meu peito se enche de expectativa... e fico ansiosa pelo amanhã..."
1601706-186 = "Só de ter alguém por perto... a-a paisagem muda tanto assim..."
1601706-187 = "[s5] \"Fico muito feliz por você!\"\n[s6] \"Se a Aoba está vivendo dias assim, eu também fico feliz!\""
1601706-192 = "Ehehe... é-é verdade."
1601706-193 = "Es-espero que, daqui para frente... que dias assim..."
1601706-195 = "Continuem por muito tempo..."
