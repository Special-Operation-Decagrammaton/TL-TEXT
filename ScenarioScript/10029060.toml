[translation]
10029060-1 = "Episódio 6; Reparo?"
10029060-2 = "Subsolo das Ruínas de Minium"
10029060-4 = "Estamos quase chegando. Depois desta porta..."
10029060-5 = "É onde fica essa tal \"instalação\", né?#nAchei que chegaríamos mais rápido."
10029060-6 = "É porque a Chefe analisou a estrutura para nós.#nSe não tivéssemos essas informações, teria sido bem difícil chegar até aqui."
10029060-7 = "Essa instalação tem um tamanho que rivaliza até com um complexo industrial, então..."
10029060-8 = "Uma instalação tão grande assim ficou abandonada sem ninguém saber até hoje!?"
10029060-9 = "Incrível, como esperado de outro mundo!#nO mundo ainda tem tantos mistérios por descobrir...!!"
10029060-10 = "Bem, eu não disse que não existem lugares parecidos por lá também..."
10029060-11 = "......Eh? Você disse alguma coisa?"
10029060-13 = "...Shokuhou."
10029060-14 = "Nãão, não é nada."
10029060-15 = "Vamos, pode abrir logo... senhorita Railgun de Tokiwadai?"
10029060-16 = "Pare de me chamar assim!"
10029060-17 = "Além disso, você também não é chamada de \"Rainha de Tokiwadai\" ou algo do tipo...!"
10029060-18 = "......Haa."
10029060-19 = "Esquece, já estou cansada de lidar com isso."
10029060-20 = "Ora, é mesmo?#nEntão, deixo a linha de frente com você."
10029060-22 = "É mais reconfortante ter a Misaka na frente, e por que não atende às expectativas dessas pessoas aí também?"
10029060-23 = "......O que você quer dizer com isso?"
10029060-29 = "......Ugh."
10029060-30 = "Eu concordo. Considerando a situação até agora, é mais eficiente que eu e a Mikoto lideremos o grupo."
10029060-32 = "Viu só, ela não disse isso?#nE além disso, foi você quem disse que não ia pegar leve, Misaka-san, não foi?"
10029060-33 = "Tá bom, eu já entendi."
10029060-34 = "......Bem, eu não pretendia ficar atrás desde o começo mesmo."
10029060-35 = "Então, por precaução, nós duas vamos entrar primeiro."
10029060-36 = "......Não é \"você\", é Eimi."
10029060-37 = "......Eh?"
10029060-38 = "Se me chamar de \"você\" durante o combate, posso não notar imediatamente.#nMe chame de Eimi."
10029060-42 = "......Entendi, compreendido."
10029060-43 = "Certo, então Eimi."
10029060-44 = "......Vamos lá."
10029060-45 = "Certo."
10029060-49 = "......É aqui?"
10029060-50 = "Realmente, tem uma atmosfera que condiz com isso."
10029060-51 = "Mas não parece ter nada em especial..."
10029060-52 = "......Ah! Não é aquilo ali?#nTem uma máquina enorme com uma cara bem suspeita!"
10029060-54 = "É verdade. Parece que aquilo é a \"instalação\" que estávamos procurando."
10029060-55 = "É bem maior do que eu imaginava.#nIsso vai valer a pena desmontar."
10029060-56 = "......?"
10029060-57 = "Ei, eu ouvi uma palavra meio preocupante agora há pouco?#nSerá que eu ouvi errado?"
10029060-59 = "......!?#nI-Isso é..."
10029060-60 = "P-Para consertar adequadamente, precisamos entender a estrutura!#nNesse processo, desmontar parcialmente é...!"
10029060-61 = "............É como a Kotori disse, não me leve a mal."
10029060-62 = "Pode confiar em mim de olhos fechados!"
10029060-67 = "O retorno de vocês para o mundo original depende disso, então é claro que não acho que seja apenas divertido!"
10029060-68 = "[s1] \"......É, né?\"\n[s2] \"......S-Será que vai dar certo?\""
10029060-75 = "......Que barulho é esse?"
10029060-76 = "A \"instalação\"... a \"instalação\" está se movendo!"
10029060-77 = "É óbvio que a segurança reagiria depois de tanto barulho..."
10029060-78 = "Ah, então quer dizer que..."
10029060-79 = "Mais uma vez..."
10029060-80 = "...a batalha vai começar, não é!?"
10029060-81 = "Por que você está tão animada!?"
10029060-82 = "Não é porque vamos poder ver o poder incrível da Misaka-san?"
10029060-83 = "Qual é... você nem pensa nisso, mas fala como se pensasse."
10029060-85 = "...Espere."
10029060-86 = "Até agora, apenas drones de segurança estavam se reunindo, mas se a 'instalação' começou a se mover, não sabemos o que vai acontecer."
10029060-90 = "Isso, será que..."
10029060-94 = "[ns3] \"Não me diga que isso é a 'teletransporte' que a Himari mencionou...?\"\n[ns4] \"Uma luz misteriosa...!?\""
10029060-101 = "...Cuidado!"
10029060-103 = "E-ei, o que vamos fazer!?#nSe continuar assim, não vamos ser mandados para outro lugar de novo...!"
10029060-104 = "Acho que essa possibilidade é alta."
10029060-105 = "Porque é mais eficiente nos teletransportar do que lutar contra inimigos externos."
10029060-106 = "Entendi agora.#nA grande quantidade de drones serve para ganhar tempo para o teletransporte."
10029060-112 = "...É uma barreira à prova de balas. Tiros não funcionam.#nParece que não temos escolha a não ser chegar perto e destruir fisicamente."
10029060-113 = "Ah, chega! Por que você consegue ficar tão calma assim!!"
10029060-114 = "Sensei!!"
10029060-115 = "[s5] \"Entendido!\"\n[s6] \"Primeiro, vamos parar o movimento da instalação!\""
10029060-118 = "Vou com tudo, por favor, assuma o comando."
10029060-130 = "…………."
10029060-131 = "……Espere um pouco?"
10029060-132 = "Se bem me lembro, viemos aqui para consertar a instalação, não foi?"
10029060-133 = "…………Será que essas pessoas estão bem?"
