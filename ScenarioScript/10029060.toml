[translation]
10029060-1 = "第6話;[ruby=ぶんかい]修理[/ruby]？"
10029060-2 = "ミニウム廃墟下層部"
10029060-4 = "もうすぐ着く。この扉の先に……"
10029060-5 = "その「施設」ってのがあるのね。#n思ってたよりも早かった気がするわ。"
10029060-6 = "部長が構造を解析してくれてたから。#nもしその情報がなかったら、ここまでたどり着くのも大変だったと思うよ。"
10029060-7 = "この施設、工業団地にも匹敵する規模だから……"
10029060-8 = "こんなに大きい施設が、今まで誰にも知られずに放置されてたんですか！？"
10029060-9 = "すごい、さすが異世界ですね！#n世界にはまだ発見されてない謎が……！！"
10029060-10 = "まぁ、[ruby=・   ・   ・]あっち[/ruby]にも似たような場所がないとは言ってないけどぉ……"
10029060-11 = "……え？何か言いました？"
10029060-13 = "…[ruby=しょくほう]…食蜂。[/ruby]"
10029060-14 = "い～え、何でもないわぁ。"
10029060-15 = "さ、早く開けてもらえるかしら……常盤台の[ruby=レールガン]超電磁砲[/ruby]さん？"
10029060-16 = "その呼び方やめなさいよね！"
10029060-17 = "それに、あんただって「常盤台の女王」とか呼ばれてるじゃないの……！"
10029060-18 = "……はぁ。"
10029060-19 = "もういいわ、これ以上相手にすんのも疲れるから。"
10029060-20 = "あらぁ、そう？#nじゃ、先頭は任せたわよぉ。"
10029060-22 = "[ruby=みさか]御坂[/ruby]さんが先頭に立ってくれた方が心強いしぃ、そこの人たちの期待力にも応えてあげたらぁ？"
10029060-23 = "……どういう意味よ？"
10029060-29 = "……うげっ。"
10029060-30 = "私も同意する。これまでの状況を鑑みても、今のメンバーなら私と[ruby=みこと]美琴[/ruby]で先駆けを務めるのが効率的。"
10029060-32 = "ほら、こう言ってるじゃない？#nそれにぃ、手を抜かないって言ったのは御坂さんよねぇ？"
10029060-33 = "もう、分かったわよ。"
10029060-34 = "……まぁ、最初から後ろに居るつもりもなかったけど。"
10029060-35 = "それじゃ、念のために備えて、私とあなたの2人で最初に突入するわよ。"
10029060-36 = "……「あなた」じゃなくて、エイミ。"
10029060-37 = "……え？"
10029060-38 = "戦闘中にあなたと呼ばれても、すぐには気づけない可能性がある。#n私のことはエイミって呼んで。"
10029060-42 = "……そうね、分かったわ。"
10029060-43 = "よし、じゃあエイミ。"
10029060-44 = "……いくわよ。"
10029060-45 = "うん。"
10029060-49 = "……ここかな？"
10029060-50 = "たしかに、それっぽい雰囲気ですね。"
10029060-51 = "でも、特に何かあるようには見え……"
10029060-52 = "……あ！あれじゃないですか？#nいかにも～な感じの大きい機械がありますよ！"
10029060-54 = "本当だ。どうやら、アレが探していた「施設」のようだね。"
10029060-55 = "想像してたのよりずっと大きいね。#nこれなら、分解のしがいがある。"
10029060-56 = "……？"
10029060-57 = "ちょっと、何か不穏な言葉が聞こえたけどぉ？#n私の聞き間違いかしらぁ？"
10029060-59 = "……！？#nそ、それは……"
10029060-60 = "き、きちんと修理するためには、構造を知る必要がありますからね！#nその過程で、部分的に分解を……！"
10029060-61 = "…………コトリの言う通りだよ、誤解しないでほしい。"
10029060-62 = "大船に乗ったつもりで任せてくれ！"
10029060-67 = "君たちが元の世界に帰れるかどうかが懸かっているのに、面白そうだなんて思ってないとも！"
10029060-68 = "[s1] \"……そ、そうだよね？\"\n[s2] \"……だ、大丈夫かな。\""
10029060-75 = "……何の音かな？"
10029060-76 = "「施設」が……「施設」が動いてます！"
10029060-77 = "あれだけ騒いだらセキュリティが反応するのは当然よねぇ……"
10029060-78 = "ああ、つまり……"
10029060-79 = "もう一回……"
10029060-80 = "……戦闘が始まるんですね！？"
10029060-81 = "なんで楽しそうなのよ！？"
10029060-82 = "御坂さんの驚異的な力を見られるからじゃないのぉ？"
10029060-83 = "何よ……思ってもないくせに、よく言うわね。"
10029060-85 = "……待って。"
10029060-86 = "今までは警備ドローンが集まってくるだけだったけど、「施設」が動き出したとなると、どうなるか分からない。"
10029060-90 = "これは、もしかして……"
10029060-94 = "[ns3] \"まさか、これがヒマリの言ってた「転移」……？\"\n[ns4] \"謎の光が……！？\""
10029060-101 = "……気をつけて！"
10029060-103 = "ち、ちょっと、どうするんですか！？#nこのままだと、またどこかに飛ばされるんじゃ……！"
10029060-104 = "その可能性は高いと思う。"
10029060-105 = "外敵と戦うよりも、転移させた方が効率的だから。"
10029060-106 = "今になって分かった。#n大量のドローンがいるのは、転移の時間を稼ぐため。"
10029060-112 = "……防弾バリアだね。銃弾が効かない。#n近づいて物理的に壊すしかなさそう。"
10029060-113 = "ああもう！どうしてそんな平然としてられるのよ！！"
10029060-114 = "先生！！"
10029060-115 = "[s5] \"分かった！\"\n[s6] \"まずは施設の動きを止めよう！\""
10029060-118 = "全力で行く、指揮をお願い。"
10029060-130 = "…………。"
10029060-131 = "……待ちなさい？"
10029060-132 = "たしか、施設の修理に来たはずよねぇ？"
10029060-133 = "…………この人たち、大丈夫かしらぁ？"
