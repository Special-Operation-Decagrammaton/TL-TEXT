[translation]
1003303-1 = "Encontro solo comigo mesmo"
1003303-2 = "（Várias pendências foram resolvidas e, pela primeira vez em muito tempo, é um dia de folga）"
1003303-3 = "[s1] \"Já que é um dia de folga...\"\n[s2] \"Vou visitar algum lugar que normalmente não presto muita atenção...\""
1003303-11 = "（Primeiro, visitei um shopping perto do Schale）"
1003303-12 = "[s] \"Ah, parece que está tendo uma promoção...?\""
1003303-13 = "Atenção a todos os clientes presentes hoje!"
1003303-14 = "Hoje, nossa loja completa 15 anos desde a inauguração! Como comemoração, realizaremos um evento de desconto especial em carne wagyu de classe triplo S!"
1003303-15 = "Limitado a 100 pacotes! É por ordem de chegada, então não percam esta oportunidade!"
1003303-16 = "Vamos começar!"
1003303-21 = "（Como eu estava em uma boa posição por acaso, consegui entrar na fila em um lugar onde provavelmente conseguiria um）"
1003303-22 = "Sim, o próximo, por favor! Obrigado! Sim, o próximo...!"
1003303-26 = "（E assim, chegou a minha vez）"
1003303-27 = "Muito bem, este é o último pacote! Aqui está――"
1003303-33 = "Hum,"
1003303-34 = "Então, vou aceitar com gratidão!"
1003303-35 = "Ahhh! C-cliente!?"
1003303-36 = "[s] \"Fura-fila...!?\""
1003303-37 = "Hah, não é furar fila coisa nenhuma."
1003303-38 = "Você estava se movendo devagar demais, então eu só entrei de lado, não é?"
1003303-39 = "E mesmo que fosse furar fila, o que é que tem?"
1003303-40 = "Disseram que era por ordem de chegada, então não proibiram furar fila, né!"
1003303-41 = "[s] \"Que absurdo...\""
1003303-43 = "Cala a boca, por enquanto isso é meu!"
1003303-44 = "Bem, não se preocupe. Vou grelhar e comer a sua parte com todo o cuidado! Hahaha!"
1003303-45 = "Muito bem, então para o caixa..."
1003303-51 = "Hã!?"
1003303-55 = "C-cliente?"
1003303-59 = "[ns] \"...!?\""
1003303-60 = "C-cliente!?"
1003303-61 = "Você está bem!? Está consciente...!?"
1003303-62 = "C-chamem a equipe médica!! Temos um ferido...!"
1003303-66 = "Ufa... bem, acho que posso deixar o resto com eles."
1003303-67 = "Houve um pequeno problema, mas sim. Aqui está o último pacote, por favor!"
1003303-68 = "[s] \"Ah, obrigado... a propósito, aquela pessoa de antes, ela está realmente bem?\""
1003303-76 = "（Como resultado, consegui o wagyu e fui para um restaurante familiar que está em alta nas redes sociais para almoçar）"
1003303-80 = "[ns] \"O menu que estava famoso nas redes sociais era, se não me engano...\""
1003303-81 = "Hahaha! Com certeza isso aqui é gostoso!"
1003303-82 = "Tragam mais uma porção!"
1003303-83 = "Vamos misturar todas as bebidas do bar de bebidas!"
1003303-87 = "Nossa, está um pouco barulhento..."
1003303-88 = "Psiu! Se as delinquentes ouvirem, elas vão vir para cá...!"
1003303-89 = "Mesmo vindo até aqui, não dá para comer com calma..."
1003303-90 = "Hahahaha!"
1003303-91 = "Fuhihihihi!!"
1003303-92 = "Ahhyahhyahhya!"
1003303-97 = "A-ah, com licença, clientes... está incomodando os outros clientes, então poderiam baixar um pouco o volume da voz...?"
1003303-100 = "Hã? Isso significa que nós estamos barulhentas?"
1003303-101 = "Quer que eu faça você nunca mais conseguir aumentar o volume da sua voz?"
1003303-102 = "Ou quer que eu te mostre como é um barulho de verdade?"
1003303-104 = "Iii...!?"
1003303-105 = "[s] \"……Pode me dar um minuto?\""
1003303-108 = "Hã?"
1003303-109 = "Quem é você... espera,"
1003303-110 = "O sensei do Schale?"
1003303-111 = "Lembrei! É aquele que nos derrotou daquela vez...!"
1003303-112 = "Já que é assim, chegou a hora de nos vingarmos daquela vez—"
1003303-125 = "C-cliente? Ei, você está bem, cliente!?"
1003303-129 = "Esse disparo agora há pouco..."
1003303-130 = "Ei, de onde veio?"
1003303-131 = "[s] \"Isso, será que...\""
1003303-140 = "(Depois de rodar por vários lugares, quando parei na loja de conveniência para comprar itens essenciais...)"
1003303-141 = "[s3] \"Foi um dia cheio de coisas estranhas, mas...\"\n[s4] \"Eu não esperava que algo acontecesse até na loja de conveniência...\""
1003303-146 = "[ns] \"Pois é!\""
1003303-147 = "Q-que confusão é essa!?"
1003303-148 = "Hahaha! Tudo o que tem nesta loja de conveniência agora pertence a nós!"
1003303-149 = "Fiquem quietos e entreguem todo o dinheiro do caixa!"
1003303-156 = "[ns] \"Espere um pouco...!\""
1003303-164 = "Argh!?"
1003303-165 = "O-o que foi isso...!?"
1003303-170 = "[ns] \"………….\""
1003303-173 = "(Apesar de ter passado por várias confusões por onde passei, o feriado terminou)"
1003303-175 = "(E no dia seguinte...)"
1003303-176 = "[s] \"Aquilo de ontem...\""
1003303-180 = "[ns] \"Err, quem é você?\""
1003303-184 = "Ufufu... Sensei, nos vimos ontem, não é? Sinto vergonha de dizer, mas não consegui me segurar e acabei vindo aqui de novo."
1003303-185 = "O tempo que passamos juntos ontem, mesmo que em silêncio, foi um momento extremamente feliz."
1003303-186 = "Fiquei remoendo essas lembranças e, mesmo sabendo que hoje não é feriado, não consegui resistir..."
1003303-187 = "E foi assim que decidi vir te visitar mais uma vez.♡"
1003303-188 = "[s] \"E-entendi... mas, 'nos vimos ontem'?\""
1003303-189 = "Sim, exatamente."
1003303-190 = "Será que você está tão cansado do dia a dia que não se lembra...?"
1003303-191 = "Eu, por outro lado, ainda estou com o coração acelerado só de lembrar de ontem..."
1003303-192 = "[s] \"Err, se puder, explique desde o começo...\""
1003303-193 = "Sim, como desejar."
1003303-194 = "Se é o que o sensei deseja, eu realizarei qualquer coisa, quantas vezes for preciso."
1003303-195 = "Ontem, tivemos vários problemas, não é? Foi bom termos começado o seu feriado com um encontro, mas..."
1003303-196 = "[s] \"Um encontro...\""
1003303-197 = "Será que ficaram com inveja do nosso encontro? Algumas pessoas sem noção apareceram..."
1003303-198 = "Fufu, mas foi uma sorte termos conseguido aquela carne wagyu juntos, não foi?"
1003303-199 = "Como vamos comê-la hoje?"
1003303-200 = "Só de pensar em preparar do jeito que você gosta e conversar sobre isso enquanto jantamos juntos..."
1003303-201 = "Sinto como se tivesse tocado o mais profundo do seu ser, e isso me deixa imensamente feliz."
1003303-202 = "[s] \"？？？\""
1003303-203 = "Mas,"
1003303-204 = "Depois, no restaurante que fomos..."
1003303-205 = "Havia alguns insetos barulhentos que não se importavam com quem estava ao redor..."
1003303-206 = "Sinceramente, eu queria ter acabado com todos eles ali mesmo."
1003303-207 = "Mas me contive, pois não seria correto. Você me ensinou isso outro dia, e eu não poderia deixar que nada estragasse o tempo precioso que passei com você."
1003303-208 = "Por isso, apenas dei um pequeno empurrão e ignorei, mas depois, na loja de conveniência, apareceram aqueles falsos assaltantes que não conhecem o seu lugar..."
1003303-209 = "Até o feriado foi cheio de eventos, será que isso é o destino por estar ao seu lado...? Fufu."
1003303-210 = "Sendo assim, não há o que fazer, não é? ♡"
1003303-214 = "[ns] \"Por acaso, você esteve me seguindo o tempo todo ontem...?\""
1003303-215 = "Seguindo...?"
1003303-216 = "Não, não, eu apenas o acompanhei mantendo alguns passos de distância, para não correr o risco de sequer pisar na sua sombra."
1003303-217 = "De certa forma, já foi como um encontro."
1003303-218 = "Ah,"
1003303-219 = "Não se preocupe."
1003303-220 = "Para que um incidente como aquele não ocorra novamente,"
1003303-221 = "vou eliminar todos os intrusos de antemão...!"
1003303-222 = "[s] \"Não, pare!\""
1003303-223 = "......Sim?"
1003303-224 = "[s] \"É que... da próxima vez, em vez de vir por trás assim... bem...\""
1003303-231 = "Oh...?"
1003303-232 = "[s5] \"Isso, da próxima vez vamos juntos! De mãos dadas!\"\n[s6] (Para evitar que ela cause problemas longe da minha vista!)"
1003303-237 = "Ah, ahhh... meu Deus, para o Sensei ser tão proativo assim...!"
1003303-238 = "S-sim... e-então..."
1003303-239 = "E-e-eu estarei a-aguardando ansiosamente por esse momento...!"
1003303-240 = "Peço perdão, por hoje é só...!"
1003303-245 = "(Observei Wakamo, que ficou estranhamente agitada, sair andando de um jeito esquisito)"
