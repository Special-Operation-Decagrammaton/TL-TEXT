[translation]
1003303-1 = "一緒にひとりデート"
1003303-2 = "（色々な要件がひと段落し、久々に休日となった）"
1003303-3 = "[s1] \"せっかくのお休みだし……。\"\n[s2] \"何か、普段はあんまり気にかけてないところに……。\""
1003303-11 = "（まず、シャーレの近くのショッピングモールへと訪れた）"
1003303-12 = "[s] \"あ、ちょうど何かセールが……？\""
1003303-13 = "本日お越しの皆様へお知らせです！"
1003303-14 = "今日は何と、当店がオープンしてから15周年！その記念として、「トリプルS級の最高級和牛の特別割引イベント」を開催します！"
1003303-15 = "限定100パック！先着順ですので、ぜひこの機会をお見逃しなく！"
1003303-16 = "それではスタートです！"
1003303-21 = "（たまたま良いポジションにいたこともあり、何とか貰えそうな位置で並べた）"
1003303-22 = "はい、次の方どうぞ！ありがとうございます！はい、次の方……！"
1003303-26 = "（そうして順番が回ってきた）"
1003303-27 = "さあ、こちらが最後の1パックです！どうぞ――"
1003303-33 = "ふっ、"
1003303-34 = "じゃあありがたく頂くとするか！"
1003303-35 = "ああっ！お、お客様！？"
1003303-36 = "[s] \"割り込み……！？\""
1003303-37 = "はっ、割り込みじゃねぇよ。"
1003303-38 = "とろい動きしてやがるから、ただ私が横から入っただけだろうが！"
1003303-39 = "百歩譲って割り込みだったところで、それが何だってんだ？"
1003303-40 = "先着順って言ったんだから、割り込みは禁止されてないだろうが！"
1003303-41 = "[s] \"そんな無茶な……。\""
1003303-43 = "るせぇ、とりあえずこれは私の物だ！"
1003303-44 = "ま、心配すんな。あんたの分まで、丁寧に焼いて食ってやるからさ！ははっ！"
1003303-45 = "さーて、じゃあレジに……"
1003303-51 = "えっ！？"
1003303-55 = "お、お客様？"
1003303-59 = "[ns] \"……！？\""
1003303-60 = "お、お客様！？"
1003303-61 = "大丈夫ですか！？意識が……！？"
1003303-62 = "い、医療スタッフを呼んでください！！負傷者です……！"
1003303-66 = "ふぅ……まあ、後は任せても良いでしょう。"
1003303-67 = "少々トラブルがありましたが、はい。こちら最後の1パックをどうぞ！"
1003303-68 = "[s] \"あ、じゃあありがたく……ところでさっきの方、本当に大丈夫です？\""
1003303-76 = "（結果的に和牛を手に入れつつ、昼食を取るために最近SNSで話題のファミレスへ向かった）"
1003303-80 = "[ns] \"SNSで評判だったメニューは確か……。\""
1003303-81 = "ひゃはははっ！確かにこれ、美味いじゃねぇか！"
1003303-82 = "おかわり持って来ーい！"
1003303-83 = "ドリンクバーの飲み物、全部混ぜてみようぜ！"
1003303-87 = "なんか、ちょっとうるさいね……。"
1003303-88 = "しっ！不良たちに聞こえたら、こっちに来ちゃうでしょ……！"
1003303-89 = "せっかく来たのに、落ち着いて食べられないね……。"
1003303-90 = "ひゃはははっ！"
1003303-91 = "ふひひひひっ！！"
1003303-92 = "あっひゃっひゃっひゃ！"
1003303-97 = "あ、あの、お客様……他のお客様にご迷惑になりますので、もう少々声のボリュームを……。"
1003303-100 = "あぁん？それって、うちらがうるさいってこと？"
1003303-101 = "あんたの声のボリューム、金輪際上げられなくしてやろうか？"
1003303-102 = "それか、本当に「うるさい」ってのはどんなのか見せつけてやっても良いぜ？"
1003303-104 = "ひっ……！？"
1003303-105 = "[s] \"……ちょっと良いかな？\""
1003303-108 = "あぁん？"
1003303-109 = "誰だてめぇ……って、"
1003303-110 = "シャーレの先生？"
1003303-111 = "思い出した！この前うちらがやられたあの時の……！"
1003303-112 = "こうなったら、あの時の復讐を今こそ――"
1003303-125 = "お、お客様？あの、大丈夫ですかお客様！？"
1003303-129 = "今の銃声……"
1003303-130 = "え、どこから？"
1003303-131 = "[s] \"これ、もしかして……。\""
1003303-140 = "（あちこち回って、最後に生活必需品を買うためにコンビニへ立ち寄った時……）"
1003303-141 = "[s3] \"何か色々怪しいことが多い一日だったけど……。\"\n[s4] \"さすがにコンビニでまで何か起きるとは……。\""
1003303-146 = "[ns] \"ですよね！\""
1003303-147 = "な、何の騒ぎですか！？"
1003303-148 = "ふはははっ！このコンビニにある物は、全部私たちが頂く！"
1003303-149 = "おとなしく、レジの現金を全部出せ！"
1003303-156 = "[ns] \"ちょっと待った……！\""
1003303-164 = "ぐはぁっ！？"
1003303-165 = "な、何だ……っ！？"
1003303-170 = "[ns] \"…………。\""
1003303-173 = "（行く先々でドタバタがありつつも、休日を終えた）"
1003303-175 = "（そして次の日……）"
1003303-176 = "[s] \"昨日のあれって……。\""
1003303-180 = "[ns] \"えっと、どちら様？\""
1003303-184 = "うふふふっ……先生、昨日ぶりですね。お恥ずかしながら我慢ならず、こうしてまたやってきてしまいました。"
1003303-185 = "昨日は静かながらも一緒に過ごしたお時間、大変に幸せなお時間でした。"
1003303-186 = "その思い出をかみしめていたところ、本日は休日ではないと知りながらも耐えられず……。"
1003303-187 = "こうしてもう一度、お伺いした次第です♡"
1003303-188 = "[s] \"そ、そっか……というか、「昨日ぶり」？\""
1003303-189 = "はい、そうですよ？"
1003303-190 = "もしかして日ごろのお疲れのあまり、覚えてらっしゃらないのでしょうか……。"
1003303-191 = "私の方は未だに昨日の記憶だけで、こんなにも胸がドキドキしておりますのに……。"
1003303-192 = "[s] \"えっと、できれば一から説明を……。\""
1003303-193 = "はい、かしこまりました。"
1003303-194 = "先生のお望みなら何でも、幾らでも叶えて差し上げます。"
1003303-195 = "昨日は、色々と困ってしまいましたね。せっかくの先生の休日、まずデートを始められたのは良かったのですが……。"
1003303-196 = "[s] \"デート……。\""
1003303-197 = "私たちのデートに嫉妬したのでしょうか、何やら気の利かないお方が……。"
1003303-198 = "ふふっ、でも共に和牛を手に入れられたのは僥倖でしたね。"
1003303-199 = "あれは、本日どのように食べましょうか？"
1003303-200 = "先生のお好きな形で調理して差し上げること、それを語らいながら一緒に晩餐を迎えられることを考えているだけで……"
1003303-201 = "私、あなた様の奥深くまで触れられたようで、嬉しくてたまりません。"
1003303-202 = "[s] \"？？？\""
1003303-203 = "ですが、"
1003303-204 = "またその後に伺ったレストランでも……"
1003303-205 = "何やら周囲を気にせず騒ぐ羽虫どもが……"
1003303-206 = "気持ちとしましては、その場で全て吹っ飛ばして差し上げたいところでしたが。"
1003303-207 = "それはなりませんと自制いたしました。先日もそう教えていただいたことですし、せっかくのあなた様との時間を五月蠅くさせるわけにはいきませんから。"
1003303-208 = "ですので少々小突くだけで目を瞑ったのですが、その後のコンビニでも身の丈を知らない強盗もどきが……"
1003303-209 = "休日さえも多事多忙で、これもまたあなた様と一緒だからこその命運のようなものなのでしょうか……ふふっ。"
1003303-210 = "だとすれば、仕方ありませんね♡"
1003303-214 = "[ns] \"もしかして、昨日ずっと尾行してた……？\""
1003303-215 = "尾行……？"
1003303-216 = "いえいえ、私はあくまであなた様の影すら踏まないよう、数歩下がって付き添っていただけです。"
1003303-217 = "ある意味ではもうデートのようなもの。"
1003303-218 = "ああ、"
1003303-219 = "ご心配なさらず。"
1003303-220 = "次はあのような不祥事が起こらないよう、"
1003303-221 = "事前に全ての邪魔者を片付けて……！"
1003303-222 = "[s] \"いや、ストップ！\""
1003303-223 = "……はい？"
1003303-224 = "[s] \"その……次はそうやって、後ろから来るんじゃなくて……えっと……。\""
1003303-231 = "あらっ……？"
1003303-232 = "[s5] \"そう、次は一緒に行こう！ちゃんと手を繋いで！\"\n[s6] （見えないところで問題を起こさないように！）"
1003303-237 = "あっ、あぁっ……そんな、先生の方からそこまで積極的にだなんて……！"
1003303-238 = "は、はいっ……で、では……。"
1003303-239 = "わ、わわわ私、その時を、た、楽しみにしておりますので……！"
1003303-240 = "すみません、本日はこれにて……！"
1003303-245 = "（そうやって珍しい慌て方をしたワカモが、変な歩き方で出ていくのを見送った）"
