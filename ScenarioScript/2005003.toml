[translation]
2005003-1 = "Por aqui é mais rápido!"
2005003-2 = "Escritório do Schale"
2005003-3 = "（Como de costume, em um dia lutando contra o trabalho...）"
2005003-7 = "（Alguém veio...?）"
2005003-8 = "[ns] \"Está aberto~\""
2005003-10 = "[ns1] \"Ué, esse som...\"\n[ns2] \"Não veio da porta...?\""
2005003-13 = "（Ao olhar na direção da janela...）"
2005003-14 = "[ns] \"...Hmm?\""
2005003-15 = "（Ritsu estava pendurada do lado de fora da janela）"
2005003-16 = "[ns] \"Ritsu!?\""
2005003-17 = "Sensei, Sensei!"
2005003-18 = "Está trancado aqui! Posso quebrar para entrar?"
2005003-19 = "[s3] \"Isso é vidro à prova de balas!\"\n[s4] \"Espera! Vou abrir agora!\""
2005003-26 = "（Abri a janela apressadamente e deixei Ritsu entrar）"
2005003-28 = "Tcharam!"
2005003-29 = "[ns] \"Não me diga que... você escalou a parede...?\""
2005003-30 = "Sim! #nO elevador demora muito para chegar!"
2005003-31 = "[s] \"Bem, tecnicamente também tem as escadas...\""
2005003-32 = "Hmm...?"
2005003-33 = "Mas não é mais perto escalar a parede?"
2005003-34 = "[s] \"B-bem, talvez seja, mas...!\""
2005003-38 = "[ns] \"Ei, hoje não é seu dia de serviço, certo? Você conseguiu permissão para sair?\""
2005003-39 = "Isso mesmo! #nEu disse que não tinha mármore para as esculturas... e deixaram!"
2005003-40 = "A Wildhunt é super rigorosa com saídas, mas..."
2005003-41 = "Quando se trata de arte, #né um pouco mais fácil conseguir um 'ok'!"
2005003-42 = "Então, na volta de comprar o mármore, passei no Schale!"
2005003-43 = "[s] \"Dá para carregar mármore assim...?\""
2005003-44 = "Sim! #nDeixei lá no primeiro andar. O Sensei quer ver? Quer que eu traga?"
2005003-45 = "[s] \"Ah, eu vou lá ver depois...!\""
2005003-46 = "Ah! É verdade!"
2005003-47 = "Aqui, Sensei! Isto!"
2005003-51 = "[ns] \"...Uma camisa?\""
2005003-52 = "Da última vez que fizemos esculturas, o Sensei ficou todo coberto de pó, né?"
2005003-53 = "Por causa disso, suas roupas acabaram sujando..."
2005003-54 = "Então pedi para uma amiga do curso de design de figurino fazer uma para você!"
2005003-55 = "[s] \"Ah, então era por isso que você perguntou sobre minhas cores favoritas!\""
2005003-56 = "Isso! No começo eu pensei em usar a cor favorita do Sensei, mas... #n"
2005003-57 = "Achei que seria melhor deixar com um especialista!"
2005003-58 = "[s] \"Ainda bem que não disse transparente...\""
2005003-59 = "Ah, você queria uma transparente?"
2005003-60 = "[s5] \"Não, não!\"\n[s6] \"De qualquer forma, obrigado, Ritsu!\""
2005003-63 = "De nada! Ei, ei, veste aí agora!"
2005003-64 = "[s] \"Entendido! Então vou trocar de roupa na sala ao lado...\""
2005003-73 = "[ns] \"...Bem, o que foi, Ritsu?\""
2005003-74 = "Hmm? O que foi~?"
2005003-75 = "[s] \"Se você ficar me seguindo... eu não vou conseguir me trocar...\""
2005003-76 = "..."
2005003-77 = "Ah, você está com vergonha?"
2005003-78 = "Então, eu também vou trocar para o meu uniforme de trabalho! #nSe a gente tirar junto—"
2005003-79 = "[s] \"Por favor, pare!\""
2005003-81 = "(Depois disso, consegui terminar de me trocar...)"
2005003-83 = "Ooh~"
2005003-84 = "O que achou? Ficou bom? #nVocê gostou?"
2005003-85 = "[s] \"Está perfeito! Como esperado da Wildhunt...!\""
2005003-86 = "Hmm..."
2005003-90 = "Talvez não esteja tão bom assim!"
2005003-91 = "[s] \"N-não pode ser...!\""
2005003-92 = "Ah, combina bem com você, Sensei!"
2005003-93 = "É só que, com a roupa que você está usando agora, o equilíbrio ficou um pouco estranho!"
2005003-94 = "[s] \"A-ah, entendi, é isso...!\""
2005003-95 = "Bem, não tem problema, fica tranquilo!"
2005003-96 = "Da próxima vez, vamos juntos comprar algo que combine!"
