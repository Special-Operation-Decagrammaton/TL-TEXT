[translation]
80000138-1 = "Biscoito de suspiro de chocolate"
80000138-2 = "（Cheguei um pouco antes do horário marcado.）"
80000138-3 = "（Enquanto olhava ao redor sem rumo...）"
80000138-4 = "Olá, Sensei."
80000138-5 = "……Por acaso, eu fiz você esperar?"
80000138-6 = "[s] \"Não, acabei de chegar.\""
80000138-7 = "Não é como se fosse \"agora\"... Você chegou bem antes do horário marcado."
80000138-8 = "[s] \"Pensei que talvez pudesse ver a Subaru mais cedo!\""
80000138-9 = "Lá vem você com essas coisas de novo..."
80000138-10 = "Estou começando a entender a natureza dos boatos sobre você, aos poucos..."
80000138-11 = "Fufu, não adianta fazer essa cara. #nEu não vou ser enganada."
80000138-12 = "Enfim, o motivo de eu ter chamado você hoje é..."
80000138-13 = "Bem..."
80000138-14 = "……"
80000138-15 = "É porque você tem cuidado de mim."
80000138-16 = "Ou seja...!"
80000138-17 = "[ns] \"Este café é muito bom, não é?\""
80000138-18 = "Hã?"
80000138-19 = "Ah, sim. É verdade. #nUltimamente, tenho me acostumado a lugares como este."
80000138-20 = "Será que é porque estou me esforçando no trabalho de meio período...?"
80000138-21 = "……Mesmo que você não diga, eu já sei."
80000138-22 = "Estudar também é importante, não é? #nAfinal, você é o Sensei."
80000138-23 = "……De qualquer forma!"
80000138-24 = "……"
80000138-25 = "Ouvi dizer durante o trabalho. #nQue no \"mundo exterior\", existe algo chamado biscoito de suspiro..."
80000138-26 = "……Ah. De novo, sem querer."
80000138-27 = "Enfim, parece que misturam clara de ovo com açúcar, criam uma espuma tipo creme..."
80000138-28 = "E então aquecem a cerca de 100°C para fazer esse doce."
80000138-29 = "……Eu não posso perdoar isso!!!"
80000138-30 = "[s] \"P-por quê!? O suspiro não tem culpa...!\""
80000138-31 = "Porque dizem que jogam fora a gema que sobra! #nVocê não acha isso um desperdício imperdoável!?"
80000138-32 = "[s] \"Ah... entendi.\""
80000138-33 = "Dizem que existe um método que usa a gema, chamado blanchir, mas comparado ao suspiro, as formas de uso são limitadas."
80000138-34 = "Além disso, estraga mais rápido que a clara... #nEntão, no fim, é fácil não conseguir usar tudo e acabar jogando fora."
80000138-35 = "Que crime a gema cometeu para merecer isso...! #nEsse egoísmo não pode ser tolerado!"
80000138-36 = "Mesmo que o deus da comida perdoe, eu não perdoarei!!"
80000138-37 = "Sendo assim... eu estou pegando as gemas que seriam descartadas."
80000138-38 = "Eu as deixo de molho no açúcar e shoyu, dou para as crianças de Arius comerem... tenho tentado várias coisas."
80000138-39 = "Mas, não acha terrível? #nDesperdiçar comida, o mundo está perdido mesmo...!"
80000138-40 = "[s] \"B-bem...! Com certeza, comida é algo importante!\""
80000138-41 = "Obrigada por entender... #nEspere, sobre o que estávamos falando mesmo?"
80000138-42 = "……Ah, sim, sobre o biscoito de suspiro."
80000138-43 = "……Sensei."
80000138-47 = "O \"mundo exterior\"... não, ouvi dizer que na sociedade existe algo chamado Dia dos Namorados."
80000138-48 = "Nesse dia..."
80000138-49 = "Bem..."
80000138-50 = "Para as pessoas que cuidam de você no dia a dia..."
80000138-51 = "Para as pessoas para quem você quer expressar seus sentimentos..."
80000138-52 = "Dizem que se presenteia com chocolates."
80000138-53 = "Por isso, eu... também tentei preparar um...!"
80000138-58 = "[ns] \"Incrível, um suspiro desses...!?\""
80000138-59 = "Ao fazer o suspiro, a gente mistura um pouco de pó e outras coisas."
80000138-60 = "No fim das contas, eu sou melhor usando o corpo, por assim dizer...#nPara fazer suspiros, só precisa de um pouco de jeito e força física."
80000138-61 = "Eu pensei que talvez conseguisse fazer também..."
80000138-62 = "......Claro, eu peguei o forno emprestado no meu trabalho de meio período."
80000138-63 = "Dito em voz alta, soa como uma história bem patética."
80000138-64 = "......"
80000138-65 = "Pensando bem... eu não posso servir algo assim para o Sensei...!"
80000138-66 = "E-esqueça o que eu disse!#nIsso, na verdade...!"
80000138-73 = "（Impedi apressadamente Subaru de pegar o biscoito）"
80000138-75 = "[ns1] \"Não é 'algo assim'!\"\n[ns2] \"Eu estou muito feliz!\""
80000138-78 = "......É verdade?"
80000138-79 = "[s] \"É de coração.\""
80000138-80 = "Não vá reclamar depois de comer, hein?"
80000138-81 = "[s] \"Não vou, com certeza.\""
80000138-84 = "......Entendi."
80000138-85 = "Vou acreditar."
80000138-86 = "......Hehe."
80000138-88 = "（Assim, enquanto comíamos os suspiros juntos com a Subaru,#npassamos um momento gentil）"
