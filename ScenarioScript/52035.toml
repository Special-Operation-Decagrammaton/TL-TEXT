[translation]
52035-2 = "Ugh... f-forte...!"
52035-3 = "Ma-mas...! Eu sei qual é o seu ponto fraco!"
52035-10 = "Pessoal, mirem no braço direito dele!"
52035-21 = "Ei! Não brinque sujo!"
52035-25 = "Você é ingênua, Renge. #n Em uma batalha, quem não escolhe os meios é que é forte."
52035-27 = "Nagusa-senpai, agora!"
52035-32 = "......Eu sou imatura por deixar que descubram meu ponto fraco tão facilmente."
52035-33 = "Mas... porque tenho todos vocês lutando ao meu lado."
52035-35 = "Ugh...! Líder, não dá para continuar assim!"
52035-36 = "Esqueça o haiku... vamos apostar tudo na próxima competição de senryu!"
52035-38 = "Eu já disse que isso não tem nada a ver com aquilo!?"
52035-42 = "Uuu... me aguardem!"
52035-52 = "Ei, ei, ei!?"
52035-56 = "Quem são os malfeitores atrapalhando o festival!?"
52035-57 = "O quanto será que o Clube Yin-Yang pagou de verba de publicidade――"
52035-62 = "P-Presidente~! Independentemente de qualquer coisa, sair correndo no meio da reunião é...!"
52035-66 = "......Ué? O pessoal da Hyakkaryouran?"
52035-67 = "Hm? Ah, é verdade... pessoal da Hyakkaryouran, por que vocês estão aqui?"
52035-68 = "Ouvimos dizer que 'tinha gente lutando enquanto declamava haikus'... #n então achei que fosse o Clube de Pesquisa de Ninjutsu..."
52035-73 = "Não, não, nós entramos justamente para parar a briga!"
52035-74 = "Falando nisso, o Clube de Pesquisa de Ninjutsu faz coisas assim...?"
52035-75 = "Não sabemos ao certo, mas achamos que é como se fosse uma 'saudação' do jeito que a Pina diz..."
52035-77 = "A Trupe Chimi estava causando problemas, então tentamos entrar para 'mediar'..."
52035-78 = "Pedimos desculpas se causamos transtornos."
52035-79 = "Não, não, imagina!"
52035-80 = "A Trupe Chimi causa problemas em todo festival... #n honestamente, já achávamos que não estava mais ao nosso alcance. #n Somos muito gratos."
52035-81 = "Em nome do Comitê e do distrito comercial, deixem-me agradecer."
52035-82 = "Fizemos apenas o nosso dever! #n Proteger a justiça e repelir os malfeitores... #n Esse é o trabalho de nós, da Hyakkaryouran!"
52035-83 = "Chamem-nos sempre que estiverem em apuros!"
52035-84 = "......A propósito, sobre o caso da Momoyodou, #n eu gostaria de pedir um favor a vocês..."
52035-86 = "Desculpe, não estamos aceitando pedidos individuais agora. #n A menos que seja algo de vida ou morte, claro."
52035-87 = "O trabalho da Hyakkaryouran é estritamente a mediação dentro da escola――"
52035-88 = "Isso é uma pena."
52035-89 = "Eu planejava pedir que provassem os 'bolinhos de castanha' feitos com o creme de castanhas especial de Trinity... #n antes de colocá-los à venda no festival――"
52035-93 = "Se vocês estão ocupadas, não tem problema! #n Vou pedir para outras pessoas provarem..."
52035-94 = "......Eu disse que estávamos ocupadas, mas..."
52035-99 = "Ah, que pena~! #n A estrategista parece ocupada, então acho que nós três vamos sozinhas."
52035-104 = "Ei, Renge!"
52035-105 = "Fufu, estou brincando."
52035-109 = "Então, pessoal, por favor, venham por aqui!"
52035-116 = "Hum, doce...!"
52035-117 = "Sério, é esse mesmo o bolinho que eu conheço? #n Combinado com o creme levemente doce e macio... #n parece outra sobremesa completamente diferente...!"
52035-118 = "Eu tinha certeza de que #n o creme ao estilo de Trinity não combinaria com doces japoneses..."
52035-119 = "Essa fragrância, como a de um bolinho de castanha assado, #n e a maciez única do creme, #n combinam perfeitamente com o bolinho!"
52035-120 = "Yukari, tem creme no seu lábio."
52035-121 = "O bolinho gruda nos dentes, então escove bem depois."
52035-125 = "C-Claro!"
52035-127 = "Acho que combinar o bolinho clássico com o creme de castanhas #n é um ótimo arranjo."
52035-128 = "Mas... como ambos são macios, a textura pode ficar um pouco monótona. #n ......O que acha de colocar almôndega de frango entre os bolinhos?"
52035-129 = "Isso não seria mais uma sobremesa, seria!?"
52035-130 = "Fufu. Fico feliz que tenham gostado."
52035-131 = "Preparei esses bolinhos especialmente para todos vocês que sempre se dedicam tanto ao festival. #n Por favor, comam à vontade!"
52035-132 = "Muito obrigada pela gentileza! #n Mas vocês também estão lutando dia e noite para animar a Hyakkiyako..."
52035-133 = "Além disso, no último 'Festival das Lanternas', nós falhamos e #n causamos transtornos a vocês..."
52035-134 = "Não! Nós nem estávamos conscientes durante o incidente...!"
52035-135 = "Vocês também devem estar com dificuldades desde que a presidente Ayame partiu――"
52035-143 = "Ah... d-desculpa!"
52035-145 = "......Está tudo bem, ela vai voltar."
52035-146 = "Quando ela voltar, contarei a ela o quanto todos estavam preocupados."
52035-147 = "......Muito obrigada. Conto com você!"
52035-154 = "Ei, sobre o muro ao redor do local... #n como choveu ontem à noite, pensei em reforçá-lo com sacos de areia."
52035-155 = "......Poderiam nos dar uma mão?"
52035-159 = "Ah, o pessoal acabou de sair para receber os materiais."
52035-160 = "Assim que alguém voltar, enviarei ajuda imediatamente――"
52035-164 = "Se é assim, por favor, deixe com a Hyakkaryouran!"
52035-166 = "Ah, eu estava justamente querendo me exercitar!"
52035-167 = "......Parece um bom exercício pós-refeição."
52035-172 = "Ah, então... enquanto os outros não voltam, agradeço a ajuda!"
52035-173 = "Sim!"
52035-181 = "Muito bem... vou colocar aqui, então empilhem em ordem."
52035-182 = "Cuidado, é pesado."
52035-184 = "Não se preocupe. Carregamos isso até cansar no treinamento."
52035-189 = "Fufu. Comi muitos bolinhos deliciosos, estou cheia de energia!"
52035-190 = "Nagusa-senpai, pode me passar aquele saco de areia?"
52035-191 = "Sim. Vou passar agora――"
52035-198 = "Ugh......"
52035-202 = "O que foi? Ouvi um som estranho!"
52035-203 = "Se-senpai! Você está bem!?"
52035-209 = "Estou bem. Só torci um pouco o pulso."
52035-210 = "Mas você parece estar com muita dor......"
52035-216 = "Nagusa-senpai... pode tirar a bandagem do braço direito?"
52035-220 = "Não é nada grave......"
52035-225 = "Deixa eu ver."
52035-236 = "I-Isso é..."
52035-237 = "Mentira que não é grave......"
52035-238 = "Nagusa-senpai, desde quando está assim...?"
52035-240 = "É um ferimento da época do campo de neve. Vai sarar logo, não se preocupe."
52035-241 = "Não, não! O que você vai fazer se não puder mais usar o braço!"
52035-242 = "Vamos para o hospital agora... ou melhor, uma ambulância?"
52035-243 = "......Vocês estão fazendo muito barulho."
52035-249 = "Nagusa-senpai, poderia me dar um pouco do seu tempo?"
52035-256 = "Talvez... possamos tratar isso na família Kadenokouji."
52035-258 = "Próximo Episódio; A Nobre da Família Kadenokouji"
