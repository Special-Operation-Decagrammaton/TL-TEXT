[translation]
52035-2 = "Droga... que forte...!"
52035-3 = "Ma-mas...! Eu sei qual é o seu ponto fraco!"
52035-10 = "Pessoal, mirem no braço direito dele!"
52035-21 = "Ei! Não jogue sujo!"
52035-25 = "Você é ingênua, Renge. #nQuem não escolhe os meios em uma batalha é quem vence."
52035-27 = "Nagusa-senpai, agora é a hora!"
52035-32 = "...Eu sou imatura o suficiente para deixar que descubram meu ponto fraco tão facilmente."
52035-33 = "Mas... eu tenho todas vocês lutando ao meu lado."
52035-35 = "Argh...! Líder, não dá para continuar assim!"
52035-36 = "Esqueça o haiku... vamos apostar tudo no próximo torneio de senryu!"
52035-38 = "Eu já disse que isso não tem nada a ver com a situação!?"
52035-42 = "Ugh... você me paga!"
52035-52 = "Ei, ei, ei!?"
52035-56 = "Quem é o insolente que está atrapalhando o festival!?"
52035-57 = "Quanto será que a Seção Yin-Yang pagou de publicidade para você--"
52035-62 = "Pre-presidente~! Por mais que seja, sair correndo assim durante a reunião..."
52035-66 = "...Ué? Pessoal da Hyakkiyako?"
52035-67 = "Hm? Ué, é verdade... O que o pessoal da Hyakkiyako está fazendo aqui?"
52035-68 = "Disseram que 'tinha gente lutando enquanto recitava haikus', então... #nacheguei a pensar que fosse o Clube de Pesquisa Ninjutsu..."
52035-73 = "Não, não, nós somos as que entraram para parar a briga!"
52035-74 = "E aliás, o Clube de Pesquisa Ninjutsu faz esse tipo de coisa...?"
52035-75 = "Nós também não sabemos ao certo, mas deve ser algo como a 'saudação' que a Pina menciona..."
52035-77 = "A Trupe Chimi estava causando problemas, então tentamos intervir para 'mediar'..."
52035-78 = "Se causamos algum transtorno, pedimos desculpas."
52035-79 = "Não, de jeito nenhum!"
52035-80 = "A Trupe Chimi causa problemas em todos os festivais... #nSinceramente, já estávamos achando que não conseguiríamos lidar com eles sozinhos. #nMuito obrigada mesmo."
52035-81 = "Em nome do comitê e do distrito comercial, gostaria de agradecer."
52035-82 = "Fizemos apenas o que era necessário! #nProteger a justiça e repelir os malfeitores... #nEsse é o trabalho de nós, da Hyakkiyako!"
52035-83 = "Sintam-se à vontade para nos chamar sempre que precisarem!"
52035-84 = "...A propósito, sobre a Momoyodou, #ntenho um pedido para fazer a vocês..."
52035-86 = "Desculpe, não estamos aceitando pedidos pessoais agora. #nA menos que seja algo realmente perigoso."
52035-87 = "O trabalho da Hyakkiyako é estritamente a mediação dentro da academia, então--"
52035-88 = "Que pena."
52035-89 = "Eu ia pedir para vocês provarem um 'bolinho de castanha' feito com creme de castanhas especial de Trinity... #nantes de começarmos a vender no festival--"
52035-93 = "Se estão ocupadas, não tem problema! #nVou pedir para outra pessoa provar..."
52035-94 = "...Eu disse que estávamos ocupadas, mas..."
52035-99 = "Ah, que pena~! #nParece que a nossa estrategista está muito ocupada, então acho que só nós três vamos."
52035-104 = "Ei, Renge!"
52035-105 = "Fufu, estou brincando."
52035-109 = "Então, por favor, venham por aqui!"
52035-116 = "Hmm, que doce...!"
52035-117 = "Isso é mesmo um bolinho como eu conheço? #nCombinado com esse creme suave e levemente doce... #nparece até uma sobremesa diferente...!"
52035-118 = "Eu realmente achava que #ncreme ao estilo de Trinity não combinaria com doces japoneses..."
52035-119 = "Esse aroma que lembra um bolinho de castanha, #njunto com a maciez única do creme, #nestá combinando perfeitamente com o bolinho!"
52035-120 = "Yukari, tem creme no canto da sua boca."
52035-121 = "Bolinhos grudam nos dentes, então não esqueça de escovar bem depois."
52035-125 = "C-claro que sim!"
52035-127 = "Acho que combinar o bolinho tradicional com creme de castanha #né um bom arranjo."
52035-128 = "Mas... como ambos são macios, a textura pode ficar um pouco monótona. #n...Que tal colocar um espetinho de frango entre os bolinhos?"
52035-129 = "Aí deixa de ser sobremesa, não é!?"
52035-130 = "Fufu. Fico feliz que todos tenham gostado."
52035-131 = "Preparei estes bolinhos para todos vocês que sempre se esforçam tanto pelo festival.#nPor favor, não sejam tímidos e comam à vontade!"
52035-132 = "Agradecemos a consideração!#nMas, na verdade, são vocês que lutam dia e noite para animar Hyakkiyako..."
52035-133 = "Além disso, no último Festival das Lanternas, nós fomos descuidadas e acabamos causando problemas para vocês..."
52035-134 = "Não! Nós nem vimos nada, já que desmaiamos durante o incidente...!"
52035-135 = "Deve ser difícil para vocês também, agora que a Presidente Ayame não está aqui..."
52035-143 = "Ah... D-desculpe!"
52035-145 = "...Está tudo bem, ela vai voltar."
52035-146 = "Quando isso acontecer, direi a ela o quanto todos estavam preocupados."
52035-147 = "...Muito obrigada. Conto com você!"
52035-154 = "Com licença, sobre o muro ao redor do local do evento...#nComo choveu ontem à noite, pensei em reforçá-lo com sacos de areia."
52035-155 = "...Poderiam me dar uma mãozinha?"
52035-159 = "Ah, o pessoal acabou de sair para buscar os materiais."
52035-160 = "Assim que alguém voltar, pedirei para irem ajudar imediatamente..."
52035-164 = "Se for esse o caso, pode deixar com a Hyakka Ryoran!"
52035-166 = "Ah, eu estava mesmo querendo me exercitar um pouco!"
52035-167 = "...Parece uma boa forma de fazer um exercício pós-refeição."
52035-172 = "Ah, então... até que todos voltem, conto com vocês!"
52035-173 = "Sim!"
52035-181 = "Certo... vou deixar aqui, então empilhem na ordem."
52035-182 = "É pesado, então tomem cuidado."
52035-184 = "Não se preocupe. Carregamos coisas assim até cansar durante o treinamento."
52035-189 = "Fufu. Comi muitos bolinhos deliciosos e estou cheia de energia!"
52035-190 = "Nagusa-senpai, poderia me passar aquele saco de areia?"
52035-191 = "Sim. Vou passar agora..."
52035-198 = "Guh..."
52035-202 = "O que houve? Ouvi um barulho alto!"
52035-203 = "S-senpai! Você está bem!?"
52035-209 = "Estou bem. Só torci o pulso um pouco."
52035-210 = "Mas você parece estar com muita dor..."
52035-216 = "Nagusa-senpai... pode tirar a bandagem do seu braço direito?"
52035-220 = "Não é nada tão sério..."
52035-225 = "Deixa disso."
52035-236 = "I-isso é..."
52035-237 = "Mentira que não é nada sério..."
52035-238 = "Nagusa-senpai, desde quando isso está assim...?"
52035-240 = "É um ferimento da época da Grande Planície Nevada. Vai sarar logo, não se preocupe."
52035-241 = "Não, não! E se você perder o movimento do braço!?"
52035-242 = "Vamos para o hospital agora... ou melhor, chamo uma ambulância?"
52035-243 = "...Vocês estão fazendo barulho demais."
52035-249 = "Nagusa-senpai, poderia nos dar um pouco do seu tempo?"
52035-256 = "Talvez... a família Kadenokoji possa tratar disso."
52035-258 = "Próximo episódio: O Nobre da Família Kadenokoji"
