[translation]
52035-2 = "くっ……つ、強い……！"
52035-3 = "でっ、でも……！弱点を知ってるんだぞ！"
52035-10 = "みんな、あいつの右腕を狙え！"
52035-21 = "おい！セコいことするな！"
52035-25 = "甘いね、レンゲ。#n戦いで手段を選ばないやつは強いよ。"
52035-27 = "ナグサ先輩、今ですの！"
52035-32 = "……私は、簡単に弱点を握られるくらい未熟。"
52035-33 = "でも……一緒に戦ってくれるみんながいるから。"
52035-35 = "ぐっ……！リーダー、これ以上は厳しいです！"
52035-36 = "俳句は諦めて……次の川柳大会に賭けましょう！"
52035-38 = "だからそれは関係ないって言ってるだろ！？"
52035-42 = "ううっ……覚えてろよ！"
52035-52 = "ちょっとちょーっと！？"
52035-56 = "お祭りを邪魔する不届き者は誰！？"
52035-57 = "陰陽部にいくら広告費をもらったと――"
52035-62 = "い、委員長～っ！いくらなんでも、会議中に飛び出すのは……！"
52035-66 = "……あれ？百花繚乱のみなさん？"
52035-67 = "ん？あれ、本当だ……百花繚乱の皆さんが、なんで？"
52035-68 = "「俳句を詠みながら戦ってる連中がいる」って……聞いたから、#nてっきり忍術研究部かと……。"
52035-73 = "いやいや、アタシらはケンカを止めに入った側だって！"
52035-74 = "ってか、忍術研究部って、そんなことするのか……？"
52035-75 = "私たちもよくは知りませんが、フィーナの言う「挨拶」みたいなものかと……。"
52035-77 = "魑魅一座が妨害してたから、「調停」に入ろうとしたんだけれど……。"
52035-78 = "迷惑をかけてしまったのなら、ごめんなさい。"
52035-79 = "いえいえ、とんでもない！"
52035-80 = "お祭りのたびに魑魅一座が問題を起こすから……#n正直、自分たちの手に負えないと思っていたところでした。#n本当に感謝しています。"
52035-81 = "委員会と商店街を代表して、お礼を言わせてください。"
52035-82 = "当然のことをしたまでですの！#n正義を守り、狼藉者を退ける……#nそれが、身共たち百花繚乱のお仕事ですから！"
52035-83 = "困ったときにはいつでもお呼びくださいまし！"
52035-84 = "……ところで、[ruby=ももよどう]百夜堂[/ruby]絡みで、#n皆さんにお願いしたいことがあるんですけど……。"
52035-86 = "ごめん、今は個人の依頼は受けていないの。#nよほど危ない目に遭ってるとかじゃない限りね。"
52035-87 = "百花繚乱はあくまで学園内の調停が仕事だから――"
52035-88 = "それは残念。"
52035-89 = "トリニティ産の特製マロンクリームを使った「マロンだんご」……#nお祭りで販売する前に、試食をお願いしようと思っていたのですが――"
52035-93 = "お忙しいなら仕方ないですね！#n他の方に召し上がっていただくとしましょう……。"
52035-94 = "……忙しいとは、言ったけど。"
52035-99 = "あーあ、残念だな～！#n作戦参謀さまはお忙しいみたいだし、アタシら3人で行くしかないか。"
52035-104 = "ちょっとレンゲ！"
52035-105 = "ふふっ、冗談ですよ。"
52035-109 = "では皆さん、こちらへどうぞ！"
52035-116 = "んんっ、甘い……！"
52035-117 = "これ、本当にアタシの知ってるだんごか？#nほんのり甘くて柔らかいクリームと組み合わさって……#nまるで別のデザートみたいだ……！"
52035-118 = "身共はてっきり、#n和菓子にとりにてぃ風のくりーむは合わないものとばかり……。"
52035-119 = "この栗まんじゅうのような香ばしさと、#nくりーむならではの柔らかさが、#nおだんごとまっちしておりますの！"
52035-120 = "ユカリ、口元にクリームついてる。"
52035-121 = "おだんごは歯にくっつくから、後で歯磨きをしっかりするんだよ。"
52035-125 = "も、もちろんですわ！"
52035-127 = "定番のおだんごとマロンクリームを合わせるのは、#n良いアレンジだと思う。"
52035-128 = "でも……どっちも柔らかいから、食感が少し単調になるかも。#n……おだんごの間に、つくねを挟むのはどう？"
52035-129 = "それじゃデザートにならないだろ！？"
52035-130 = "ふふっ。皆さん気に入ってくださったようで、なによりです。"
52035-131 = "このおだんごは、いつもお祭りのために尽力していただいている皆さんのためにご用意したんです。#nどうぞ遠慮せず、たくさん召し上がってくださいね！"
52035-132 = "お気遣いありがとうございますの！#nですが、皆様こそ百鬼夜行を盛り上げるために日夜奮闘されていますでしょうに……。"
52035-133 = "それに、前回の[ruby=とうろうさい]「燈籠祭」[/ruby]では身共たちが不覚を取り、#nご迷惑をおかけしてしまいました……。"
52035-134 = "いえ！私たちなんて、事件の間気を失っていましたから……！"
52035-135 = "みなさんもアヤメ委員長がいなくなって大変でしょうし――"
52035-143 = "あっ……ご、ごめんなさい！"
52035-145 = "……大丈夫、帰ってくるから。"
52035-146 = "そのときは、皆がどれだけ心配していたか、彼女に伝えておくよ。"
52035-147 = "……ありがとうございます。よろしくお願いしますね！"
52035-154 = "あのー、会場周りの壁なんですけど……#n昨夜雨も降ったし、土のうで補強しようかと思いまして。"
52035-155 = "……少し手を貸していただけませんか？"
52035-159 = "あ、ちょうどみんな、資材の受け取りに行っちゃったところで。"
52035-160 = "誰か戻り次第、すぐに手伝いに向かわせますので――"
52035-164 = "そういうことでしたら、この百花繚乱にお任せくださいまし！"
52035-166 = "ああ、ちょうど体を動かしたくなってたんだ！"
52035-167 = "……食後の運動に良さそうだね。"
52035-172 = "あっ、それじゃあ……みんなが戻るまでの間、よろしくお願いします！"
52035-173 = "ええ！"
52035-181 = "っと……ここに置いておくから、順番に積んで。 "
52035-182 = "重いから気をつけて。"
52035-184 = "心配すんなって。こんなの、訓練で飽きるほど持ったよ。"
52035-189 = "ふふっ。美味しいおだんごをたくさん食べて、元気いっぱいですの！"
52035-190 = "ナグサ先輩、そちらの土のうを頂けますか？"
52035-191 = "うん。今渡す――"
52035-198 = "ぐっ……。"
52035-202 = "どうした、すごい音したぞ！？"
52035-203 = "せ、先輩！大丈夫ですの！？"
52035-209 = "大丈夫。ちょっと手首をひねっただけ。"
52035-210 = "でも、すごく辛そうですわ……。"
52035-216 = "ナグサ先輩……右腕の包帯、ほどいてくれる？"
52035-220 = "そんな大事じゃない……。"
52035-225 = "いいから。"
52035-236 = "こ、これは……。"
52035-237 = "大したことないなんて嘘ですわ……。"
52035-238 = "ナグサ先輩、いつからこんな……？"
52035-240 = "大雪原の時の傷だよ。すぐに治るから、気にしないで。"
52035-241 = "いやいや！腕が使えなくなったらどうするんだよ！"
52035-242 = "今すぐ病院に……いや、救急車か？"
52035-243 = "……騒ぎすぎだよ。"
52035-249 = "ナグサ先輩、少しお時間をいただけませんか？"
52035-256 = "もしかしたら……[ruby=かでのこうじ]勘解由小路[/ruby]家で治療できるかもしれません。"
52035-258 = "次回;勘解由小路家の貴人"
