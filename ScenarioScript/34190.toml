[translation]
34190-1 = "Episódio 19; Possibilidades Infinitas"
34190-3 = "Professor... você não ia ajudar a princesa...?"
34190-4 = "[s] \"Claro que vou. Junto com a Saori.\""
34190-5 = "……！！"
34190-10 = "Desculpe, Líder... eu tentei convencer, mas não consegui impedi-lo."
34190-11 = "Líder... que bom que você está bem... não, espere, você não está bem, né? #nDe qualquer forma, que bom que você está aqui..."
34190-13 = "Misaki... Hiyori..."
34190-14 = "[ns] \"Então você lutou contra a Saori, Mika.\""
34190-17 = "P-Professor... bem..."
34190-18 = "[s] \"Me desculpe, Mika.\""
34190-19 = "P-Professor...!?"
34190-20 = "[s1] \"Eu deveria ter explicado tudo corretamente, mas não o fiz.\"\n[s2] \"Eu deveria ter ficado de frente para você e conversado direito...\""
34190-21 = "P-Por que o Professor está se desculpando comigo...?"
34190-22 = "P-Por que o Professor está se desculpando comigo...?"
34190-23 = "O Professor não tem culpa... A culpada sou eu, não é!? #nMesmo assim, por que..."
34190-24 = "[s] \"A vida de uma aluna estava em jogo, por isso estou ajudando a Saori.\""
34190-25 = "……。"
34190-26 = "[s] \"Por isso — assim que salvarmos a Atsuko, vamos voltar para Trinity juntos.\""
34190-27 = "……！！"
34190-28 = "P-Por que..."
34190-29 = "……Fazer algo assim não vai mudar nada..."
34190-30 = "Eu... já fui expulsa... e a Seia-chan também, por minha causa..."
34190-31 = "[s] \"Eu vou te ajudar.\""
34190-32 = "……！！"
34190-33 = "[s3] \"O que a Mika está enfrentando, a situação, o que você desejava...\"\n[s4] \"Eu sei que tipo de garota você é, Mika.\""
34190-34 = "Ahaha... o que você está dizendo, Professor?"
34190-35 = "Ahaha... o que você está dizendo, Professor?"
34190-36 = "Você sabe que tipo de garota eu sou...? #n— O que exatamente você sabe sobre mim?"
34190-37 = "Eu sou... uma \"bruxa\"."
34190-38 = "Você não está entendendo algo errado? #nProfessor, você está me vendo de verdade? Esta forma — e os pecados que cometi."
34190-39 = "[ns] \"É verdade — a Mika é uma garota má.\""
34190-41 = "[ns5] \"Engana os outros e finge ser quem não é.\"\n[ns6] \"Machuca os outros e se fere a si mesma.\""
34190-44 = "[ns7] \"E mesmo fazendo tudo isso,\"\n[ns8] \"acaba chorando por não conseguir aceitar o resultado — é esse tipo de garota.\""
34190-47 = "[ns9] \"Mas você também tem a bondade de tentar estender a mão para uma reconciliação,\"\n[ns10] \"e é uma criança instável que se automutila por medo de ser odiada.\""
34190-50 = "[ns11] \"Mika, você não é uma bruxa.\"\n[ns12] \"Você é apenas uma aluna problemática que não ouve o que os outros dizem.\""
34190-53 = "[ns] \"Por isso — eu quero que você me escute de verdade.\""
34190-54 = "……。"
34190-55 = "Por que..."
34190-56 = "Teria sido melhor se você tivesse ido embora sem olhar para trás... #nPor que você me faz sofrer tanto...?"
34190-57 = "Assim... até o fim..."
34190-58 = "Você me faz acreditar que ainda tenho uma chance...?"
34190-59 = "[s] \"Não se preocupe, você tem sim.\""
34190-60 = "……？"
34190-61 = "[s] \"Porque, se não houver uma chance, basta criá-la.\""
34190-62 = "……I-Isso é um absurdo."
34190-63 = "[ns] \"Se isso não der certo, basta criar a próxima chance.\""
34190-65 = "[ns] \"Mesmo que falhe, pode tentar quantas vezes for preciso.\""
34190-67 = "[ns] \"Enquanto o caminho continuar, você pode criar chances infinitas.\""
34190-69 = "[ns13] \"Mika, Saori...\"\n[ns14] \"O caminho não se fecha por causa de um ou dois erros.\""
34190-72 = "[ns] \"— No futuro que se estende à frente,\""
34190-74 = "[ns] \"Porque existem possibilidades infinitas.\""
34190-75 = "……。"
34190-76 = "……。"
34190-77 = "[ns15] \"Se dizem que não há chance, eu a criarei quantas vezes forem necessárias.\"\n[ns16] \"――Não se deve permitir que uma aluna desista do futuro.\"\n[ns17] \"Deixe esse tipo de coisa com os adultos.\""
34190-81 = "Chega de dizer disparates!"
34190-85 = "Como ousa dizer tamanha bobagem na minha basílica."
34190-86 = "[s] \"Beatrice……!\""
34190-87 = "Perdi o interesse. Vamos encerrar este espetáculo por aqui."
34190-88 = "――Acha mesmo que eu não sabia onde vocês estavam?#nNão, eu apenas estava observando."
34190-89 = "Vamos acabar com esse entretenimento entediante.#nMuito bem, agora usarei todo o meu poder para lidar com vocês."
34190-90 = "――Vamos começar o ritual."
34190-92 = "A, Atsuko……!!"
34190-93 = "I, isso não pode ser…… ainda há tempo……"
34190-94 = "O, o sol ainda nem nasceu……."
34190-96 = "O que você entendeu errado?"
34190-97 = "Acha mesmo que eu esperaria o sol nascer?#nNão, a brincadeira acabou. O halo do Sangue Real será destruído em breve."
34190-98 = "E então――através dos fragmentos desse mistério, eu me tornarei um ser de ordem superior."
34190-99 = "P, pare!!…… Princesa!! Atsuko!!"
34190-100 = "……。"
34190-104 = "Então, vamos baixar as cortinas."
34190-114 = "Agora, Santa Barbara de Justina."
34190-115 = "Cale a boca desse professor que só diz disparates!!"
