[translation]
34190-1 = "Episódio 19; Possibilidades Infinitas"
34190-3 = "Sensei... Você não ia salvar a Princesa...?"
34190-4 = "[s] \"É claro que vou. Junto com a Saori.\""
34190-5 = "......!!"
34190-10 = "Desculpe, Líder... eu tentei convencê-lo, mas não consegui impedi-lo."
34190-11 = "Líder... Que bom que você está a salvo... Bem, na verdade, você não está bem, né?#nM-Mas, que bom que você está..."
34190-13 = "Misaki... Hiyori..."
34190-14 = "[ns] \"Você lutou contra a Saori, né, Mika.\""
34190-17 = "S-Sensei... bem..."
34190-18 = "[s] \"Me desculpe, Mika.\""
34190-19 = "S-Sensei...!?"
34190-20 = "[s1] \"Eu deveria ter lhe dado uma explicação apropriada, mas não o fiz.\"\n[s2] \"Eu devia ter te encarado e conversado com você direito...\""
34190-21 = "P-Por que o Sensei está pedindo desculpas para mim...?"
34190-22 = "P-Por que o Sensei está pedindo desculpas para mim...?"
34190-23 = "Você não tem culpa nenhuma... A culpa é toda minha, não é!?#nE mesmo assim, por que..."
34190-24 = "[s] \"A vida de uma aluna está em perigo, é por isso que estou ajudando a Saori.\""
34190-25 = "......"
34190-26 = "[s] \"Portanto――Depois de salvarmos a Atsuko, vamos voltar para a Trinity juntos.\""
34190-27 = "......!!"
34190-28 = "P-Por que..."
34190-29 = "......Fazer algo assim não vai mudar nada..."
34190-30 = "A minha expulsão... já foi decidida... E a Seia-chan... é tudo minha culpa..."
34190-31 = "[s] \"Eu vou te ajudar.\""
34190-32 = "......!!"
34190-33 = "[s3] \"As coisas que a Mika está passando, a sua situação, e as coisas que desejava...\"\n[s4] \"Porque eu sei que tipo de garota você é, Mika.\""
34190-34 = "Ahaha... Do que você está falando, Sensei?"
34190-35 = "Ahaha... Do que você está falando, Sensei?"
34190-36 = "Você sabe que tipo de garota eu sou...?#n――O que você sabe sobre mim?"
34190-37 = "Eu sou... uma 'Bruxa'."
34190-38 = "Você não tá se confundindo com outra pessoa?#nSensei, você está olhando direito pra mim? Olhe para este estado――para os pecados que cometi."
34190-39 = "[ns] \"Sim――A Mika é uma garota má.\""
34190-41 = "[ns5] \"Enganou os outros, e mentiu para si mesma.\"\n[ns6] \"Machucou as pessoas, e atormentou a si mesma.\""
34190-44 = "[ns7] \"Mesmo tendo feito todas essas coisas,\"\n[ns8] \"Ela chora porque não consegue aceitar as consequências――É esse o tipo de garota que você é.\""
34190-47 = "[ns9] \"Mas, você também carrega uma gentileza ao ponto de tentar estender a mão para uma reconciliação,\"\n[ns10] \"E ao mesmo tempo, é uma criança instável que se autossabota por ter medo de ser odiada.\""
34190-50 = "[ns11] \"Você não é uma bruxa, Mika.\"\n[ns12] \"Você é apenas uma aluna problema que não escuta o que os outros dizem.\""
34190-53 = "[ns] \"É por isso que――eu quero sentar e conversar com você direitinho.\""
34190-54 = "......"
34190-55 = "Por que..."
34190-56 = "Você podia simplesmente ter ido embora sem olhar pra trás...#nPor que você está me torturando assim...?"
34190-57 = "Até mesmo... agora no final..."
34190-58 = "Por que você está me fazendo acreditar que ainda tenho uma chance...?"
34190-59 = "[s] \"Não se preocupe, você ainda tem.\""
34190-60 = "......?"
34190-61 = "[s] \"Porque se você não tiver uma chance, a gente cria uma para você.\""
34190-62 = "......I-Isso é loucura."
34190-63 = "[ns] \"Se essa não der certo, a gente cria outra oportunidade.\""
34190-65 = "[ns] \"Mesmo que você falhe, a gente tenta de novo, quantas vezes for preciso.\""
34190-67 = "[ns] \"Contanto que você continue caminhando, chances podem ser criadas inúmeras vezes.\""
34190-69 = "[ns13] \"Mika, Saori...\"\n[ns14] \"Uma ou duas falhas não são o suficiente para fechar o seu caminho de uma vez por todas.\""
34190-72 = "[ns] \"――Porque o futuro que aguarda vocês logo ali na frente,\""
34190-74 = "[ns] \"Está cheio de possibilidades infinitas.\""
34190-75 = "......"
34190-76 = "......"
34190-77 = "[ns15] \"Se dizem que vocês não têm chance, eu criarei quantas vezes forem necessárias.\"\n[ns16] \"――Nenhum aluno deveria ter de desistir de seu futuro.\"\n[ns17] \"Deixem esse tipo de coisa para nós adultos.\""
34190-81 = "Chega de falar baboseiras!"
34190-85 = "Como ousa falar tantas idiotices na minha Basílica."
34190-86 = "[s] \"Beatrice...!\""
34190-87 = "Isso tirou a minha paciência. O espetáculo termina aqui."
34190-88 = "――Você realmente achou que eu não sabia onde vocês estavam?#nNão, eu só estava observando em silêncio."
34190-89 = "Vamos dar um fim nesse entretenimento fútil.#nAgora, mostrarei a vocês todo o meu poder."
34190-90 = "――Vamos iniciar o ritual."
34190-92 = "A-Atsuko...!!"
34190-93 = "M-Mas como... Nós ainda tínhamos tempo..."
34190-94 = "O-O sol ainda nem nasceu..."
34190-96 = "O que faz você pensar isso?"
34190-97 = "Acha mesmo que eu ia esperar até o sol nascer?#nNão, a brincadeira acabou. O halo do Sangue Real será destruído muito em breve."
34190-98 = "E então――Através daquele fragmento místico, eu ascenderei a uma existência de alto escalão."
34190-99 = "P-Para com isso!! ...Princesa!! Atsuko!!"
34190-100 = "......"
34190-104 = "Agora, é hora de fechar as cortinas."
34190-114 = "Vamos, Santa da Sociedade Justina, Barbara."
34190-115 = "Cale a boca desse Sensei que não fala nada além de idiotices!!"