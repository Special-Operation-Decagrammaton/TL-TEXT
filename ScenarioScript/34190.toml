[translation]
34190-1 = "Episódio 19;Possibilidades Infinitas"
34190-3 = "Sensei…… o senhor não tinha ido salvar a Hime……?"
34190-4 = "[s] \"Claro que vou. Junto com a Saori.\""
34190-5 = "……!!"
34190-10 = "Desculpa, Líder…… eu tentei convencer, mas não consegui deter."
34190-11 = "Líder…… que bom que você tá bem…… quer dizer, não tá bem, né?#nE-enfim, que bom……."
34190-13 = "Misaki…… Hiyori……."
34190-14 = "[ns] \"Você lutou com a Saori, né, Mika.\""
34190-17 = "S-Sensei…… é que……."
34190-18 = "[s] \"Me desculpa, Mika.\""
34190-19 = "S-Sensei……!?"
34190-20 = "[s1] \"Eu é que devia ter explicado tudo direitinho, e não expliquei.\"\n[s2] \"Devia ter te encarado de frente e conversado direito…….\""
34190-21 = "P-por que o Sensei tá se desculpando comigo……?"
34190-22 = "P-por que o Sensei tá se desculpando comigo……?"
34190-23 = "O Sensei não fez nada de errado…… a errada sou eu, né!?#nE, mesmo assim, por quê……."
34190-24 = "[s] \"A vida de uma aluna estava em jogo; por isso eu estou ajudando a Saori.\""
34190-25 = "……."
34190-26 = "[s] \"Por isso――quando a gente salvar a Atsuko, vamos voltar juntos pra Trinity.\""
34190-27 = "……!!"
34190-28 = "P-por quê……."
34190-29 = "……Fazer isso não muda nada……."
34190-30 = "A minha expulsão já tá decidida…… e a Seia também, por minha culpa……."
34190-31 = "[s] \"Eu vou te ajudar.\""
34190-32 = "……!!"
34190-33 = "[s3] \"O que você enfrenta, a sua situação, o que você desejava…….\"\n[s4] \"Porque eu sei que tipo de menina a Mika é.\""
34190-34 = "Ahaha…… do que o Sensei tá falando?"
34190-35 = "Ahaha…… do que o Sensei tá falando?"
34190-36 = "Sabe que tipo de menina eu sou……?#n――O que, de mim, você sabe?"
34190-37 = "Eu sou…… uma \"bruxa\"."
34190-38 = "Você não tá entendendo errado?#nSensei, você tá me olhando direito? Esta figura――os pecados que eu cometi."
34190-39 = "[ns] \"Pois é――a Mika é uma menina má.\""
34190-41 = "[ns5] \"Engana os outros, mente pra si mesma.\"\n[ns6] \"Fere os outros, machuca a si mesma.\""
34190-44 = "[ns7] \"E, mesmo fazendo tudo isso,\"\n[ns8] \"não consegue aceitar as consequências e acaba chorando――é esse tipo de menina.\""
34190-47 = "[ns9] \"Mas também carrega a gentileza de tentar estender a mão da reconciliação,\"\n[ns10] \"e é uma criança instável, que se machuca por medo de ser odiada.\""
34190-50 = "[ns11] \"A Mika não é uma bruxa.\"\n[ns12] \"A Mika é só uma aluna rebelde que não escuta o que dizem.\""
34190-53 = "[ns] \"Por isso――quero que você me conte tudo, direitinho.\""
34190-54 = "……."
34190-55 = "Por quê……"
34190-56 = "Era só ter ido embora, sem olhar pra trás……#npor que você me atormenta assim……?"
34190-57 = "Desse jeito…… até o fim……."
34190-58 = "me fazendo acreditar que ainda existe uma chance pra mim……?"
34190-59 = "[s] \"Fica tranquila; existe, sim.\""
34190-60 = "……?"
34190-61 = "[s] \"Porque chance, quando não há, é só criar.\""
34190-62 = "……I-isso não faz o menor sentido."
34190-63 = "[ns] \"E, se essa não der certo, é só criar a próxima.\""
34190-65 = "[ns] \"Mesmo falhando, quantas vezes for preciso.\""
34190-67 = "[ns] \"Enquanto o caminho continuar, dá pra gerar quantas chances forem.\""
34190-69 = "[ns13] \"Mika, Saori……\"\n[ns14] \"não existe isso de o caminho se fechar com um ou dois tropeços.\""
34190-72 = "[ns] \"――Porque, no futuro que segue adiante,\""
34190-74 = "[ns] \"existem possibilidades infinitas.\""
34190-75 = "……."
34190-76 = "……."
34190-77 = "[ns15] \"Se não houver chance, eu crio quantas forem precisas.\"\n[ns16] \"――Um aluno desistir do futuro é algo que não pode existir.\"\n[ns17] \"Esse tipo de coisa, deixem com os adultos.\""
34190-81 = "Chega dessa tolice!"
34190-85 = "Como ousa dizer esses disparates na minha Basílica."
34190-86 = "[s] \"Beatrice……!\""
34190-87 = "Perdi a graça. O espetáculo termina aqui."
34190-88 = "――Acham que eu não sabia a posição de vocês?#nNão; eu apenas observava."
34190-89 = "Vamos encerrar esta distração sem graça.#nAgora, com todas as minhas forças, eu enfrento vocês."
34190-90 = "――Que comece o ritual."
34190-92 = "A-Atsuko……!!"
34190-93 = "N-não pode…… ainda há tempo……"
34190-94 = "O-o sol ainda nem nasceu……."
34190-96 = "O que vocês entenderam errado?"
34190-97 = "Que eu esperaria o sol nascer?#nNão; a brincadeira acabou. A aureola do sangue real será destruída em breve."
34190-98 = "E――através desse fragmento de mistério, eu me tornarei uma existência superior."
34190-99 = "P-para!! ……Hime!! Atsuko!!"
34190-100 = "……."
34190-104 = "Então, baixemos as cortinas."
34190-114 = "Vinde, santa de Justina, Bárbara."
34190-115 = "Calai a boca deste Sensei que só diz tolices!!"
