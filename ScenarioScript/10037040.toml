[translation]
10037040-1 = "Episódio 4: Passeando pelo mundo, contemplando o rio"
10037040-3 = "Hum. Como esperado da culinária da Associação Genbu!"
10037040-4 = "……É o que eu gostaria de dizer, mas."
10037040-11 = "Sim, é o Quan Jia Fu!#nUm prato feito com pepino-do-mar seco, abalone e turbante cozidos junto com vegetais!"
10037040-16 = "Não é comida demais, por acaso!?"
10037040-17 = "[s1] \"Ahaha... provavelmente...\"\n[s2] \"Acho que nem metade foi servida ainda...?\""
10037040-20 = "Eu não consigo comer tudo isso!?"
10037040-21 = "……Claro, o sabor é delicioso e eu até queria comer mais!"
10037040-26 = "Vamos, vamos, não se acanhe e coma mais, Secretária-Geral Cherino!"
10037040-27 = "Eu sou Akeshiro Rumi.#nSou a presidente da Associação Genbu — e a chef de cozinha daqui."
10037040-28 = "Ué? A presidente que atende os clientes!?"
10037040-29 = "Claro. Já que convidados tão importantes vieram de tão longe, eu não poderia ficar apenas na cozinha, não é?"
10037040-33 = "Hum? A presidente de Shanhaijing não é... a Líder Kisaki?"
10037040-34 = "Ah... deve ser uma questão de como chamamos."
10037040-35 = "Tecnicamente, meu cargo oficial é 'Presidente da Associação Comercial', mas todos me chamam de presidente."
10037040-36 = "A presidente do Genryumon, o conselho estudantil de Shanhaijing, é a Kisaki — não, a Líder Kisaki. Como todos a chamam de 'Líder', basicamente não tem como confundir."
10037040-37 = "— Pelo menos, dentro de Shanhaijing."
10037040-39 = "Entendo... Compreendido. Hum? Espere um pouco."
10037040-40 = "(Pensando bem, eles também chamaram a Secretária-Geral de Presidente Cherino. Será que...)"
10037040-41 = "(Ah, não me diga... será que a Presidente Cherino acumula os cargos de Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, Representante do Clube de Esportes, Chefe do Comitê de Limpeza, Presidente do Comitê Disciplinar... e tudo mais!?)"
10037040-42 = "Bem, o próximo prato é de pato...#nEu fiquei um pouco em dúvida na hora de escolher o menu."
10037040-43 = "Só de métodos de preparo para pato, existem dezenas...#nSe eu fosse citar os dois mais famosos..."
10037040-44 = "Um é assado até ficar com a cor de caramelo, e o outro é salgado e cozido no vapor com especiarias."
10037040-45 = "Pensei em qual deles seria mais apreciado, mas —"
10037040-49 = "Bem, achei melhor servir os dois! Aqui está, desculpe a demora!"
10037040-50 = "Hmph, preparar uma quantidade que não dá para terminar.#nIsso sim é a verdadeira 'hospitalidade' ao estilo de Shanhaijing!"
10037040-51 = "[s] \"Eu já imaginava que isso aconteceria...\""
10037040-52 = "Ahaha, Sensei, coma bastante também.#nSe um cliente que vem à Associação Genbu não sair satisfeito, seria uma vergonha para a associação!"
10037040-58 = "Camarada... me ajude..."
10037040-59 = "[s] \"Cherino.\""
10037040-63 = "H-hum?"
10037040-64 = "[s] \"É hora de mostrar a dignidade da Secretária-Geral!\""
10037040-65 = "……!"
10037040-66 = "C-certo... então não tenho escolha."
10037040-70 = "Muito bem! Pode vir, Associação Genbu!#nEu não vou me render por causa disso!"
10037040-71 = "Oh, isso é ótimo! Então, vamos com tudo, Secretária-Geral!"
10037040-73 = "(...Depois disso, Cherino tomou um remédio para o estômago enquanto chorava)"
10037040-86 = "……."
10037040-87 = "Aquela pessoa é de Red Winter...?"
10037040-88 = "Ah, parece que sim."
10037040-89 = "Hum..."
10037040-91 = "Bem-vindos ao Departamento de Apoio Educacional de Shanhaijing, o 'Jardim das Ameixeiras'.#nSecretária-Geral Cherino, Chefe de Gabinete Tomoe, Comissária Marina."
10037040-92 = "O Jardim das Ameixeiras é uma instalação construída para a educação de estudantes jovens."
10037040-93 = "A orientação das crianças é feita por estudantes que obtiveram notas excelentes em Shanhaijing, selecionadas como instrutoras para assumir esse papel."
10037040-94 = "Então, essas crianças continuam estudando em Shanhaijing até chegarem ao ensino médio?"
10037040-95 = "Sim. Claro, também há casos em que elas se transferem no meio do caminho."
10037040-99 = "Entendo... Espere... Ei! Não puxe!"
10037040-104 = "Uau! Por que você está usando um bigode? Que estranho!"
10037040-105 = "O que é isso? Um bigode? Ué... caiu..."
10037040-110 = "O-o bigode...! Tomoe!"
10037040-111 = "Por favor, acalme-se, Cherino... digo, Secretária-Geral. Aqui está esse bigode reserva..."
10037040-112 = "D-desse jeito... as crianças vão acabar tirando meu bigode de novo...! Preciso de uma solução definitiva para isso!"
10037040-117 = "Pessoal! Essa pessoa é um convidado muito importante que veio de longe! Comportem-se!"
10037040-118 = "Kokona-chan está falando coisas difíceis de novo..."
10037040-122 = "Ah! Devolve o bigode, Kokona-chan!"
10037040-123 = "Não é Kokona-chan, é Instrutora Kokona!"
10037040-128 = "Pessoal?"
10037040-132 = "Nada disso, entenderam?"
10037040-136 = "Hii!? D-desculpe, Instrutora Shun!"
10037040-137 = "Uuu... nós vamos obedecer..."
10037040-138 = "Muito bem... aqui, vou devolver isso."
10037040-139 = "Como esperado, a orientação da Instrutora Shun é sempre admirável."
10037040-144 = "Hum, você disse Instrutora Kokona?"
10037040-145 = "Sim! Eu sou a Instrutora Kokona."
10037040-146 = "No Jardim das Ameixeiras... crianças cuidam de outras crianças...?"
10037040-150 = "E-eu não sou uma criança! Já sou uma dama respeitável e uma instrutora de verdade...!"
10037040-152 = "Fufu, a Kokona-chan tem idade para estar no ensino fundamental, mas..."
10037040-153 = "Suas habilidades foram reconhecidas, ela pulou séries para entrar no ensino médio avançado e se tornou instrutora. Literalmente, é minha irmãzinha de quem tanto me orgulho."
10037040-155 = "I-irmã Shun...? J-já chega, estou ficando com vergonha, pare com isso..."
10037040-156 = "[s] \"É isso mesmo! A Instrutora Kokona-chan é o orgulho dos alunos do Jardim das Ameixeiras!\""
10037040-157 = "Uuu, até você, Sensei! E o que é esse 'Instrutora Kokona-chan'!"
10037040-164 = "Ué...? Uma aluna de Red Winter acabou de sair do Jardim das Ameixeiras."
10037040-165 = "Hã? Isso é seguro? O Jardim das Ameixeiras é um lugar importante em Shanhaijing..."
10037040-166 = "Pois é. Nem a Genryumon consegue interferir no Jardim das Ameixeiras."
10037040-167 = "O que será que a Líder do Portão está... pensando..."
10037040-170 = "Oh! Este é o lugar onde fizeram a ópera chinesa outro dia!"
10037040-171 = "O Parque Byakko é um dos pontos turísticos mais famosos de Shanhaijing."
10037040-172 = "Não é exagero dizer que quase todos os eventos acontecem aqui."
10037040-174 = "De fato, é bem espaçoso..."
10037040-179 = "...Mas a nossa 'Praça da Revolução do Bigode Vermelho' em Red Winter é maior!"
10037040-180 = "...O quê?"
10037040-181 = "Você pretende menosprezar o tradicional Parque Byakko de Shanhaijing só por causa do tamanho!?"
10037040-182 = "Não, não é essa a intenção. Ficou claro para mim neste intercâmbio que Shanhaijing valoriza muito a tradição."
10037040-183 = "Eu só estava reafirmando o espírito de luta e a resiliência inabalável de nós, de Red Winter, que vivemos sob o frio rigoroso e as planícies nevadas sem fim!"
10037040-184 = "...Red Winter é tão grande assim?"
10037040-185 = "Sim... se você se descuidar um pouco, acaba se perdendo, e se tiver azar, pode até encontrar um urso..."
10037040-186 = "Um urso? Shanhaijing também tem pandas, mas..."
10037040-187 = "Pandas são fofos, então tudo bem!"
10037040-188 = "Ué? Espere, pandas também são um tipo de urso... será que ursos também são fofos...?"
10037040-189 = "Ugh! Você está tentando me confundir, Diretora Executiva Mina!"
10037040-190 = "Hã? Não, eu não disse nada..."
10037040-191 = "[s3] \"Ahaha... acho que a Marina\"\n[s4] \"está elogiando Shanhaijing do jeito dela.\""
10037040-194 = "S-Sensei!?"
10037040-195 = "Era isso então... Agradeço, Comissária Marina."
10037040-196 = "A-ah... é isso mesmo! Shanhaijing também não é nada mal! Haha!"
10037040-197 = "Hmph, fico feliz que tenha entendido. Fufufu..."
10037040-203 = "...Aquelas duas não se dão bem até que surpreendentemente?"
10037040-204 = "Pois é, Cherino... digo, Secretária-Geral."
10037040-205 = "[s] \"Hum... não diria que é que elas se dão bem,\""
10037040-206 = "Hum?"
10037040-207 = "[s] \"Acho que nos damos bem... em vários sentidos.\""
10037040-208 = "Significa que nos entendemos, não é? Isso não é algo bom?"
10037040-209 = "Dizer que nos damos bem em um bom sentido...? #nCamarada... você está com uma expressão complicada, não está...?"
10037040-211 = "Eu entendo de certa forma... o que o Sensei está sentindo..."
10037040-212 = "Sim. Como você disse, é bom nos darmos bem."
10037040-218 = "A Red Winter veio até aqui também."
10037040-219 = "Até a Chefe Executiva Mina... espere, então onde está a Líder da Seita?"
10037040-220 = "A Líder da Seita ficou na Genryumon, então não tem problema, não é?"
10037040-221 = "Não... por que a Chefe Executiva Mina estaria perto de estranhos...?"
10037040-222 = "Bem... tecnicamente, eles são convidados, não são?"
10037040-223 = "...Além disso, eles até apresentaram uma ópera de Pequim grandiosa no Parque Byakko."
10037040-227 = "――O que você quer dizer com isso?"
10037040-228 = "Será que eles entendem o quão calorosamente os convidados da Red Winter estão sendo recebidos?"
10037040-229 = "Primeiro foi o Sensei do Schale, agora é uma escola externa, é isso..."
10037040-230 = "Podemos simplesmente deixar isso como está?"
10037040-231 = "Foi uma decisão da Líder da Seita, então..."
10037040-232 = "Você também não tem suas próprias preocupações sobre isso?"
10037040-234 = "...Bem, todos estão um pouco inquietos, eu suponho."
10037040-238 = "Ah..."
