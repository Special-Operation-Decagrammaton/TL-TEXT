[translation]
10037040-1 = "第4話;世を遊覧し、川を眺むる"
10037040-3 = "うむ。流石は玄武商会の料理だな！"
10037040-4 = "……と、言いたいところだが。"
10037040-11 = "はい、[ruby=ぜんかふく]全家福[/ruby]ですね！#n干したナマコに、アワビ、サザエを野菜と一緒に煮込んだ料理です！"
10037040-16 = "さすがにこれは量が多くないか！？"
10037040-17 = "[s1] \"あはは……多分だけど……\"\n[s2] \"まだ半分も、出てきてないと思うよ……？\""
10037040-20 = "おいら、そんなに食べれないぞ！？"
10037040-21 = "……もちろん、味もおいしいし、もっと食べたいくらいだが！"
10037040-26 = "さぁさぁ、遠慮せずもっと食べてくださいね、チェリノ書記長！"
10037040-27 = "あたしは[ruby=あけしろ]朱城[/ruby]ルミ。#n玄武商会の会長で――ここの料理長です。"
10037040-28 = "あれ？会長が接客するんですか！？"
10037040-29 = "もちろん。遠くから大切なお客さんが来ているのに、あたしだけ厨房にいるわけにはいかないでしょ？"
10037040-33 = "ん？山海経の会長は……キサキ門主ではないのか？"
10037040-34 = "ああ……呼び方の問題かな。"
10037040-35 = "一応あたしの正式的な肩書きは「商会長」なんだけど、みんな会長って呼んでてね。"
10037040-36 = "山海経の生徒会である、玄龍門の会長、キサキ――じゃなくて、キサキ門主のことは、みんな「門主様」って呼んでるから、基本的に間違えることはないよ。"
10037040-37 = "――少なくとも、山海経の中ではね。"
10037040-39 = "そうか……理解した。ん？待てよ。"
10037040-40 = "（そういえば、書記長のことも、チェリノ会長と呼んでいたような。それって……）"
10037040-41 = "（はっ、まさか……チェリノ会長が、環境美化部部長、書記長、運動部代表、掃除部部長、風紀委員長、給食部長……などを全て兼任しているから……！？）"
10037040-42 = "さて、次の料理はアヒルの料理なんですけど……#nちょっと、メニュー選びに悩んだんですよね。"
10037040-43 = "アヒルの調理法だけでも数十種類はありますし……#nその中で有名な方法を二つ挙げるなら……"
10037040-44 = "カラメル色に焼き上げるものと、塩漬けにして香辛料と一緒に蒸すもの、ですね。"
10037040-45 = "どっちのほうが、より喜ばれるか考えたのですが――"
10037040-49 = "まあ、両方食べられたほうがいいかなって！はい、おまちどおさま！"
10037040-50 = "フッ、食べ切れないほどの量を用意する。#nこれぞまさに、山海経流の「おもてなし」だな！"
10037040-51 = "[s] \"何となく予想していたけど……。\""
10037040-52 = "あははっ、先生もいっぱい食べてよね。#n玄武商会に来たお客さんがお腹いっぱいになれないなんて、逆に商会の恥だからさ！"
10037040-58 = "カムラッド……助けて……"
10037040-59 = "[s] \"チェリノ。\""
10037040-63 = "う、うん？"
10037040-64 = "[s] \"書記長の威厳を見せる時だよ！\""
10037040-65 = "……！"
10037040-66 = "そ、そうか……ならば仕方ないな。"
10037040-70 = "いいぞ！かかってこい、玄武商会！#nおいらはこの程度で屈しないんだから！"
10037040-71 = "お、いいですね！じゃあ、思いっきりいきますよ、書記長！"
10037040-73 = "（……その後、チェリノは泣きながら胃薬をのんでいた）"
10037040-86 = "……。"
10037040-87 = "あの者が、レッドウィンターの……？"
10037040-88 = "ああ、そうらしい。"
10037040-89 = "ふぅん……。"
10037040-91 = "山海経訓育支援部、「梅花園」へようこそ。#nチェリノ書記長、トモエ秘書室長、マリナ委員長。"
10037040-92 = "梅花園は、幼い生徒の訓育をすべく建てられた施設です。"
10037040-93 = "園児たちの指導は、山海経で優秀な成績を修めた生徒が教官として選抜され、役割を担っているんです。"
10037040-94 = "じゃあ、この子たちは梅花園から高校生になるまで、ずっと山海経で学ぶのか？"
10037040-95 = "はい。もちろん途中で転校する場合もありますよ。"
10037040-99 = "そうか……ちょっ……こら！引っ張るな！"
10037040-104 = "わ～い！なんでおひげつけてるの？ふしぎ！"
10037040-105 = "これなーに？おひげぇ？あれ……とれちゃった……。"
10037040-110 = "ひ、髭が……！トモエ！"
10037040-111 = "落ち着いてください、チェリノちゃ……いえ書記長。#nこの予備の髭を……。"
10037040-112 = "こ、このままでは……また子供たちに髭を取られてしまうだけだ……！#nなにか根本的な解決法を……！"
10037040-117 = "みんな！この方は遠方からいらした大事なお客様なんだよ！大人しくして！"
10037040-118 = "ココナちゃん、まーたむずかしいこと言ってる……。"
10037040-122 = "あ！おヒゲ返してよ、ココナちゃん！"
10037040-123 = "ココナちゃんじゃなくて、ココナ教官っ！"
10037040-128 = "みなさん？"
10037040-132 = "めっ、ですよ？"
10037040-136 = "ひ、ひぃ！？ご、ごめんなさい、シュン教官！"
10037040-137 = "うぅぅ……言うこときくからぁ……。"
10037040-138 = "まったくもう……はい、こちらはお返ししますね。"
10037040-139 = "やはり、シュン教官の指導はいつ見ても素晴らしいな。"
10037040-144 = "ふむ、ココナ教官といったか？"
10037040-145 = "はい！私がココナ教官です。"
10037040-146 = "梅花園では……子供が子供の面倒をみるのか……？"
10037040-150 = "こ、子供じゃありません！私はもう立派なレディーで、一人の教官なんですよ……！"
10037040-152 = "ふふっ、ココナちゃんは本来なら小学校に通う年齢なのですが……"
10037040-153 = "能力を認められ、飛び級で高級中学校に入学し、教官にまでなったのですよ。#n文字通り、自慢の妹です。"
10037040-155 = "しゅ、シュン姉さん……？#nも、もう恥ずかしいから、やめてよ……。"
10037040-156 = "[s] \"そうだよ！ココナ教官ちゃんは、梅花園の自慢の生徒なんだから！\""
10037040-157 = "うぅぅ、先生まで！それにココナ教官ちゃんって何ですか！"
10037040-164 = "あれ……？今レッドウィンターの生徒が梅花園から出てきたよ。"
10037040-165 = "え？大丈夫なの、あれ。#n梅花園は山海経でも重要な場所なのに……。"
10037040-166 = "だよね。玄龍門ですら、梅花園には手出しできないくらいなのに。"
10037040-167 = "門主様は一体……何をお考えなんだろう……。"
10037040-170 = "おお！ここは先日、京劇をやってた場所だな！"
10037040-171 = "[ruby=びゃっこ]白虎[/ruby]公園は、山海経でも特に名物とされる公園だ。"
10037040-172 = "ほとんどの行事がここで行われていると言っても過言ではない。"
10037040-174 = "たしかに、結構な広さがあるな……"
10037040-179 = "……だが、我らレッドウィンターの「赤ひげ革命広場」の方が広いな！"
10037040-180 = "……なに？"
10037040-181 = "山海経の由緒正しい白虎公園を、広さだけで蔑むつもりか！？"
10037040-182 = "いや、そのつもりはない。#n山海経が伝統を大事にしているのは、今回の交流会でよく分かったからな。"
10037040-183 = "ただ、厳しい寒さと果てしない雪原の上にある、我らレッドウィンターの闘志と不屈の精神を再認識したまでだ！"
10037040-184 = "……レッドウィンターは、そんなに広いのか？"
10037040-185 = "ああ……少しでも油断すれば迷子になってしまうし、#n運が悪ければ熊と遭遇することもある……。"
10037040-186 = "熊？山海経にもパンダはいるが……。"
10037040-187 = "パンダは可愛いからいいんだ！"
10037040-188 = "あれ？待てよ、パンダも熊の一種ではあるし……熊も案外、可愛いのか……？"
10037040-189 = "うぅっ！私を混乱させるつもりだな、ミナ執行部長！"
10037040-190 = "え？いや、私は何も言っていないが……。"
10037040-191 = "[s3] \"あはは……マリナも自分なりに、\"\n[s4] \"山海経を褒めているんだと思うよ。\""
10037040-194 = "せ、先生！？"
10037040-195 = "そうだったのか……感謝する、マリナ委員長。"
10037040-196 = "あ、ああ……！そういうことだ。#n山海経も中々だな！ははっ！"
10037040-197 = "フッ、分かってくれたなら良い。#nふふふ……。"
10037040-203 = "……あの二人、案外仲が良いんじゃないか？"
10037040-204 = "そうですね、チェリノちゃ……いえ、書記長。"
10037040-205 = "[s] \"うーん……あれは仲が良いっていうより、\""
10037040-206 = "むむ？"
10037040-207 = "[s] \"気が合っているんだと思うよ……いろんな意味で。\""
10037040-208 = "お互い通じ合ってるってことだろ？いい意味じゃないのか？"
10037040-209 = "いい意味で合っている、だと？#nカムラッド……なんだか複雑な表情をしているな……？"
10037040-211 = "私には何となく分かります……先生のお気持ちが……。"
10037040-212 = "ええ。仰るとおり、仲が良くなるのは良いことです。"
10037040-218 = "こんなところにもレッドウィンターが来てるよ。"
10037040-219 = "ミナ執行部長まで……待てよ、そしたら門主様は？"
10037040-220 = "門主様は玄龍門に残っているんだし、問題ないんじゃない？"
10037040-221 = "いや……ミナ執行部長がどうして余所者のそばに……？"
10037040-222 = "まぁ……一応、客人だし？"
10037040-223 = "……その上、白虎公園で盛大な京劇まで披露したじゃないか。"
10037040-227 = "――何が言いたいんだ？"
10037040-228 = "レッドウィンターの客人は、どれだけ手厚く歓待されているのか、ちゃんと分かっているんだろうか？"
10037040-229 = "以前はシャーレの先生を、次は外部の学園を、か……。"
10037040-230 = "このまま放っておいていいのか？"
10037040-231 = "門主様がお決めになったことだし……。"
10037040-232 = "お前だって思う所があるんじゃないのか？"
10037040-234 = "……まぁ、みんな不安がってはいるけど。"
10037040-238 = "ああ……。"
