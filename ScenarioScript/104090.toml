[translation]
104090-1 = "Episódio 9; Epílogo (1)"
104090-6 = "Bom dia a todas as alunas de Kivotos! Aqui é a Shinon Kawaru, do Departamento de Jornalismo Kronos!"
104090-7 = "Hoje, estamos aqui no Distrito D.U. Shiratori, onde os trabalhos de reconstrução estão a todo vapor.#nAli atrás vocês podem ver um dos prédios em fase de restauração."
104090-8 = "Como o Distrito Shiratori foi palco de uma batalha ferrenha entre um robô gigante e um monstro, acabou sendo uma das áreas mais devastadas de toda Kivotos."
104090-9 = "Mas, olhem só! O lugar já está ganhando vida nova!#nParece que toda cidade grande precisa passar por essas revitalizações, não é mesmo!?"
104090-10 = "A chefe do Departamento Financeiro do Conselho Estudantil Geral, Aoi Oki, declarou que 'a prioridade agora é a reconstrução da cidade', aprovando os fundos emergenciais de apoio e autorizando a execução pelos administradores do Escritório Geral."
104090-11 = "Com a resolução de censura contra Rin Nanagami ainda paralisada, muitos elogiam a postura de priorizar a reconstrução da cidade em vez das picuinhas políticas, mas――"
104090-12 = "Os custos dos terrenos, as despesas de construção e para onde vai o lucro dessa revitalização ainda não foram esclarecidos... Será que isso tudo é mesmo para o bem dos cidadãos!?"
104090-13 = "Na próxima edição, vamos cavar mais fundo para descobrir a verdade――"
104090-14 = "Oi? Como assim 'pare de falar besteira'? Por acaso você é algum dos envolvidos――"
104090-18 = "～Por favor, aguardem um instante～"
104090-20 = "――Já se passou um bom tempo desde aquele incidente."
104090-21 = "Torres vermelhas surgindo por toda Kivotos, inimigos desconhecidos atacando... Apesar de ter sido um evento sem precedentes, parece que os cidadãos ainda não entenderam muito bem o que aconteceu."
104090-22 = "A maioria das pessoas comuns diz algo como: 'Acho que rolou alguma coisa grave, mas a Schale resolveu tudo no final, então tá de boa, né?' Mas――"
104090-23 = "Também tivemos reações como: 'Isso foi marketing da Schale?' ou 'Foi pegadinha do Conselho Estudantil Geral?'"
104090-24 = "De fato, mesmo no Distrito D.U., que sofreu os maiores danos no incidente, tivemos apenas alguns feridos leves e felizmente nenhuma vítima fatal."
104090-25 = "Alguns dizem que foi um milagre os danos terem sido tão pequenos perto da escala do incidente... mas parece que a ficha ainda não caiu para a maior parte da população."
104090-26 = "Como não recebemos pedidos de reconstrução ou apoio de outros distritos, é provável que as outras regiões estejam na mesma situação."
104090-27 = "Ah, há quem diga que a maior vítima de toda essa confusão foi o próprio 'Conselho Estudantil Geral'. Afinal de contas, o prédio deles e a 'Torre do Sanctum' foram completamente destruídos!"
104090-28 = "O desaparecimento da 'Torre do Sanctum', que controlava a administração de toda Kivotos..."
104090-29 = "Muitos de vocês, telespectadores, devem ter ficado apavorados achando que Kivotos ia acabar de vez!"
104090-30 = "Porém, depois que a 'Presidente do Conselho Estudantil Geral' sumiu, a Torre do Sanctum já não estava mais servindo pra muita coisa mesmo. Ou seja, a destruição dela não causou nenhum dano prático."
104090-31 = "O Conselho Estudantil Geral se limitou a dizer que foi um 'ataque causado por um fenômeno desconhecido' e não revelou nenhum detalhe sobre o ocorrido."
104090-32 = "E a 'Schale', que está sendo alvo de suspeitas de ter algum envolvimento com o caso..."
104090-33 = "Continua respondendo com um belo 'sem comentários' sobre os relatos de que 'o Sensei foi visto correndo pelado pelo campo'!"
104090-34 = "Alguns questionam: 'Se ele diz ser naturista e prega o retorno à natureza, por que estava segurando um aparelho eletrônico?'. Enquanto outros interpretam como: 'Isso é um tipo de performance artística para promover a convivência entre o homem e a natureza'――"
104090-35 = "……Como é? Disseminação de teorias da conspiração? Que nada, isso é um furo de――"
104090-39 = "～Por favor, aguardem um instante～"
104090-43 = "Ou seja, esse silêncio não seria só uma forma de despistar a atenção do público!?#nA 'Schale' precisa vir a público contar a verdade agora mesmo e――"
104090-47 = "～Por favor, aguardem um instante～"
104090-49 = "……O Conselho Estudantil Geral está seguindo com o projeto de reconstrução da Torre do Sanctum e deve apresentar a nova torre nos próximos dias."
104090-50 = "É um projeto gigantesco baseado na planta original da torre, mas devido à complexidade da obra, há rumores de que fecharam uma parceria com a empresa privada 'Kaiser Industries'."
104090-51 = "Em resposta a esses boatos, muita gente reclama que 'só as grandes construtoras saem ganhando', e com as taxas de juros e os preços das coisas subindo sem parar, a ansiedade da população só au――"
104090-58 = "……Tsc."
104090-59 = "……Aí está, Chefe do Departamento de Defesa."
104090-60 = "Se não fôssemos nós, vocês estariam passando por uma humilhação daquelas."
104090-61 = "Acho que o sentimento é mútuo, não?#nSe não fosse por mim, a Kaiser provavelmente estaria no meio de um pedido de falência uma hora dessas."
104090-62 = "……Então nosso acordo continua de pé, certo?"
104090-63 = "Dar as mãos de novo com alguém que pode me apunhalar pelas costas a qualquer momento, hein……"
104090-64 = "……Uma pessoa comum hesitaria em tomar essa decisão, claro."
104090-66 = "Mas é justamente realizar o que os comuns não conseguem que faz de alguém um 'super-humano'."
104090-67 = "……Oho?"
104090-68 = "Um super-humano se destaca desse tipo de pessoa medíocre――Espero continuar fazendo bons negócios com você, General."
104090-69 = "Hehehe……Impressionante. Não é à toa que o Presidente botou o olho em você."
104090-70 = "Um verdadeiro adulto sabe dar as mãos até para os inimigos de ontem em prol de um objetivo maior."
104090-71 = "Eu não sou idiota de deixar emoções idiotas estragarem os meus planos."
104090-72 = "Então, continuo contando com você. Chefe do Departamento de Defesa."
104090-74 = "……。"
104090-75 = "……。"
104090-79 = "Aris, cheguei～"
104090-80 = "Ué? O que você tá fazendo, Aris-chan?"
104090-81 = "Um modelo de montar?"
104090-85 = "Não, não é um modelo de montar……"
104090-90 = "O que é isso? Um robozinho……?"
104090-91 = "……Sim. Acho que, talvez... essa seja a 'Key'."
104090-92 = "Hein!? Essa é a Key……?"
104090-93 = "Mas ela... eu achei que ela tivesse sumido……"
104090-94 = "Sim... ela sumiu naquela hora... e desde então a Aris nunca mais viu ela."
104090-95 = "Mas naquela hora... no instante em que ela sumiu... mesmo que tenha sido só por um segundo, a Aris teve a sensação de ver um robô com esse formato."
104090-97 = "Por isso, a Aris quis montar isso... pra nunca se esquecer."
104090-98 = "Entendi……。"
104090-99 = "Aris-chan……。"
104090-100 = "A Key... acabou ajudando a gente no final, né...#nQuem sabe a gente não teria virado companheiras se tivesse dado tempo……。"
104090-101 = "……Sim. Se a gente se encontrar de novo um dia...#nA Aris com certeza vai pedir pra ela 'ser nossa companheira'."
104090-102 = "……。"
104090-108 = "Ué? Será um convite pra partida online?"
104090-112 = "……Hum? O que é isso?"
104090-113 = "O que foi, mana?"
104090-114 = "……Tem um save game que eu nunca vi na memória."
104090-115 = "Não foi você que criou sem querer, mana?"
104090-116 = "Ninguém cria um save game sem querer!#nE eu não conheço esse nome!"
104090-117 = "A ver……"
104090-123 = "Ué... isso é……"
104090-124 = "Tá tudo bem?"
104090-127 = "Kei.sav"
104090-129 = "Um save……'Kei'……?"
104090-130 = "É, é Key, não é? Isso se lê Key, né!?"
104090-131 = "……！！！"
104090-133 = "R-Rápido, vamos levar isso pra Himari-senpai dar uma olhada!"
104090-134 = "Sim！！"
104090-139 = "Quanto tempo, meninas do Departamento de Desenvolvimento de Jogos."
104090-140 = "Opa."
104090-142 = "U-Ué? O que você tá fazendo aqui!?"
104090-143 = "Da C&C……"
104090-144 = "A garota da Presidente Rio……"
104090-145 = "……Sim. Sou Toki Asuma. Paz e amor, paz e amor."
104090-149 = "Hein? Ela não fez um sinal de paz com as mãos!?"
104090-150 = "……！？"
104090-151 = "A Diretora inventou moda de novo com ela……"
104090-152 = "Não é 'inventar moda'. É se aproveitar das características da personagem para pegar o oponente com a guarda baixa――é uma espécie de tática de guerra, por assim dizer."
104090-153 = "……Se você tá de boa com isso, então tá, né."
104090-154 = "……Como a Presidente Rio ainda está sumida, eu estou muito ativamente à procura de emprego no momento."
104090-155 = "A Toki tá dando uma passada em vários lugares... Você ia lá pra sala da C&C agora, não era?"
104090-156 = "……Não, as senpais da C&C também devem estar ocupadas, não consegui ver elas desde então."
104090-157 = "Ah, entendi. Então quer dizer que você tá desempregada.#nSe quiser, não quer entrar pra nossa party?"
104090-159 = "Espera aí！？"
104090-160 = "A-Aris……"
104090-164 = "Agradeço o convite. Mas, eu tenho outra missão agora……"
104090-166 = "Se tivermos outra oportunidade, com certeza."
104090-172 = "Opa, não é a Aris?"
104090-173 = "Boa tarde, Himari-senpai."
104090-174 = "A Aris veio te incomodar porque tem uma coisa que você precisa ver!"
104090-175 = "Isso aqui……！"
104090-179 = "Um videogame portátil……？"
104090-181 = "……Humm. Entendi."
104090-182 = "E aí?"
104090-183 = "Parece ter alguma relação com a Key-chan……？"
104090-184 = "……。"
104090-185 = "Bem... eu não sou uma especialista nos 'Deuses Sem Nome', então não posso dar certeza, mas……"
104090-186 = "Se um dado como esse foi criado de forma natural... realmente, podemos chamar isso de 'fenômeno anômalo'."
104090-187 = "O problema é que, mesmo que seja a 'Key'... provar isso nesse estado vai ser bem difícil."
104090-188 = "E-Entendi……"
104090-189 = "Sim. O tamanho do arquivo é de uns 2 kilobytes, no máximo... Mesmo analisando bit a bit, tirar uma conclusão do que é isso... até pra mim, é complicado."
104090-190 = "A não ser que aquela medrosa especialista nesse assunto resolva voltar――"
104090-191 = "É isso, então... Ainda não dá pra saber de nada……。"
104090-193 = "A Aris queria muito que fosse a Key... se for... se for ela, a Aris……"
104090-194 = "Aris……。"
104090-195 = "Aris-chan……。"
104090-200 = "Nossa... e isso aí……？"
104090-201 = "Isso foi o que a Aris fez pensando na Key."
104090-202 = "Entendi... ficou muito bem feito."
104090-203 = "……。"
104090-204 = "Posso dar uma pequena modificada nesse robô?"
104090-205 = "Modificada……？"
104090-206 = "Digo, seria só adicionar a função de um pen drive USB nele... Com isso, provavelmente……。"
104090-207 = "Ah... colocar os dados da Key-chan aí dentro……？"
104090-208 = "Uau, genial!! No robô que a Aris fez pensando nela……"
104090-209 = "Se a gente colocar esses dados……！"
104090-210 = "……！！"
104090-211 = "Sim, sou uma garota super genial, linda e de saúde frágil, afinal. Não acho que isso vá causar nenhum fenômeno anômalo de verdade, mas……"
104090-212 = "Acho que serve mais para... guardar os sentimentos de alguém."
104090-214 = "……Sim!! A Aris não se importa!"
104090-215 = "Fufu... Deixa comigo, modificar coisas é a minha especialidade.#nAfinal, eu sou uma 'gênia'."
104090-216 = "Aliás, fui eu quem modifiquei a armadura da Toki. O gosto daquela mulher é um tanto peculiar, então――"
104090-220 = "Vejamos, me dê isso aqui... a memória que eu tinha comprado... ah, e vamos colocar um cordãozinho pra virar um chaveiro também."
104090-223 = "Pronto, terminei."
104090-224 = "……！！"
104090-225 = "Muito obrigada, Himari-senpai!"
104090-226 = "Que bom, Aris!"
104090-227 = "Uhum... que notícia boa, Aris-chan."
104090-228 = "V-Vou deixar pendurado pra não perder……！"
104090-230 = "Isso！"
104090-235 = "Próximo episódio; Epílogo (2)"