[translation]
104090-1 = "第9話;エピローグ（１）"
104090-6 = "キヴォトスの生徒の皆さん、おはようございます！クロノス報道部の[ruby=かわる]川流[/ruby]シノンです！"
104090-7 = "本日は、復旧作業が行なわれているD.U.シラトリ区に来ております。#nあちらに見えるのが、現在復旧作業中の建物です。"
104090-8 = "シラトリ区は巨大ロボットと怪獣の激戦地であったことから、キヴォトスでも特に甚大な被害を受けた地域となりました。"
104090-9 = "ですが、ご覧ください！既に活気あふれる姿に生まれ変わっています！#nやはり、都市には再開発がつき物なのでしょうか！？"
104090-10 = "連邦生徒会の財務室長、[ruby=おき]扇喜[/ruby]アオイ氏は「今は街の復旧が最優先」という言葉とともに緊急復興支援金を承認、および統括室の行政官による執行を許可したとのことです。"
104090-11 = "[ruby=なながみ]七神[/ruby]リン氏の問責決議が滞っているなか、政治面よりも街の復旧を優先する姿勢は高く評価できる、との声もありますが――"
104090-12 = "土地代に建設費、そして再開発による利益の行先は明示されておらず――果たしてこれは、本当に市民のためと言えるのでしょうか！？"
104090-13 = "次回は、こちらの真相を探るべく――"
104090-14 = "はい？デタラメを言うな？もしや関係者の方――"
104090-18 = "～しばらくお待ちください～"
104090-20 = "――あの事件から、かなりの月日が経ちました。"
104090-21 = "キヴォトス全域に赤色の塔が出現し、正体不明の敵が台頭……このような未曾有の事件があったにもかかわらず、事件を振り返る市民の皆さんの釈然としない様子がうかがえます。"
104090-22 = "多くの一般市民からは「大事件らしきものが起きたが、「シャーレ」の活躍で全て丸く収まったのだから良いのでは」という声が聞こえてきてはおりますが――"
104090-23 = "また、「シャーレの宣伝？」「連邦生徒会とのドッキリ企画？」などの反応もありますね。"
104090-24 = "実際に、今回の事件で最も大きな被害があったD.U.では、負傷者は少数に留まり、死者はでませんでした。"
104090-25 = "事件のスケールに対してこの被害で済んだのは奇跡と言える……との意見もありますが、ほとんどの市民にはイマイチ伝わっていない様子です。"
104090-26 = "他自治区からの復旧や支援要請も入っていないことから、おそらく他の地域も同じような状況と思われます。"
104090-27 = "あっ、今回の事件で一番の被害者は「連邦生徒会」との見方もありますね。なんせ連邦生徒会の建物や「サンクトゥムタワー」が破壊されたのですから！"
104090-28 = "キヴォトスの行政制御権を管理する「サンクトゥムタワー」の消滅……"
104090-29 = "このままキヴォトスは滅亡するのでは！？と、不安を感じた視聴者の方もいることでしょう。"
104090-30 = "ですが、サンクトゥムタワーは最終管理者であった「連邦生徒会長」の失踪後、既に役割を果たしていない状態でした。つまり、消滅したところで実害は無し。"
104090-31 = "連邦生徒会側は、この件を「正体不明の現象による襲撃事件」であるとのコメントを残し、事件の詳細は一切明らかにしていません。"
104090-32 = "そして、この事件と関連があると疑惑の目を向けられている「シャーレ」では、"
104090-33 = "「先生が全裸で野原を駆け回っている」との目撃情報に対し、「ノーコメント」を貫いています！"
104090-34 = "「自らをヌーディストと称し自然回帰を訴えるのなら、なぜ電子機器を持っていたのか」という意見や、「これは人間と自然の共生を主張する、一種のパフォーマンスだ」という解釈が――"
104090-35 = "……はい？陰謀論の拡散？いえ、これは立派な――"
104090-39 = "～しばらくお待ちください～"
104090-43 = "つまり、これは大衆の目を逃れるための沈黙ではありませんか！？#n「シャーレ」は今すぐ真実を述べるべきで――"
104090-47 = "～しばらくお待ちください～"
104090-49 = "……連邦生徒会は、サンクトゥムタワーの再建設プロジェクトを進めており、近日中に再建されたタワーを公開するとの事です。"
104090-50 = "既存のサンクトゥムタワーの設計図を基に行われる大規模プロジェクトですが、施工難易度の問題があり、民間企業の「カイザーインダストリー」と提携すると噂されています。"
104090-51 = "この噂に対し「大手建設企業ばかりが利益を得るのでは」との声があるなか、上がり続ける金利や物価に市民たちの不安はますます――"
104090-58 = "……ちっ。"
104090-59 = "……ということだ、防衛室長。"
104090-60 = "私たちがいなければ、さぞ屈辱的だった事だろう。"
104090-61 = "それはお互い様ではありませんか？#n私がいなければ、カイザーは今頃、破産申立の最中かと。"
104090-62 = "……協定は継続、で良いのだな？"
104090-63 = "寝首を掻くような人と再び手を、ねぇ……"
104090-64 = "……凡人なら、ためらう判断でしょうね。"
104090-66 = "ですが、凡人ができないことを成し遂げてこそ「超人」ですので。"
104090-67 = "……ほう？"
104090-68 = "超人とは、そんな凡庸な人間と一線を画すものです――引き続きよろしくお願いしますね、ジェネラル。"
104090-69 = "クックックッ……流石だ。プレジデントが見込んだだけのことはある。"
104090-70 = "真の大人は、大義のために昨日の敵とも手を取るもの。"
104090-71 = "私はつまらん感情に振り回され、計画を台無しにするバカじゃあない。"
104090-72 = "では、これからも頼むよ。防衛室長。"
104090-74 = "……。"
104090-75 = "……。"
104090-79 = "アリス、ただいま～"
104090-80 = "あれ？アリスちゃん、何してるの？"
104090-81 = "プラモデル？"
104090-85 = "いえ、プラモデルではなく……"
104090-90 = "何コレ？ロボット……？"
104090-91 = "……はい。多分、これは……「ケイ」なんだと思います。"
104090-92 = "えっ！？これが、ケイ……？"
104090-93 = "あの子は……たしか消えたって……"
104090-94 = "はい……あの時、消えました……そしてあれから一度も会っていません。"
104090-95 = "でもあの時……ケイが消えた瞬間……一瞬だけでしたが、こんな形のロボットを見た気がしました。"
104090-97 = "だから、それを忘れないように……作っておきたかったのです。"
104090-98 = "そっか……。"
104090-99 = "アリスちゃん……。"
104090-100 = "ケイ……って、結局わたしたちを手伝ってくれたよね……#nもしかしたら、仲間になれたかもしれないのに……。"
104090-101 = "……はい。もしも、次会えたら……#nその時は、アリスが絶対「仲間になって」と言いたいです。"
104090-102 = "……。"
104090-108 = "あれ？オンライン対戦の申し込みかな？"
104090-112 = "……ん？なんだろ？"
104090-113 = "どうしたのお姉ちゃん？"
104090-114 = "……メモリーに、見たことないセーブデータがある。"
104090-115 = "お姉ちゃんがうっかり作ったやつじゃなくて？"
104090-116 = "セーブデータをうっかり作るわけないよ！#nしかも見たことない題名だよ！"
104090-117 = "ええっと……"
104090-123 = "あれ……これ……"
104090-124 = "大丈夫？"
104090-127 = "Kei.sav"
104090-129 = "セーブデータ……「Kei」……？"
104090-130 = "け、ケイだよね？これケイって読むよね！？"
104090-131 = "……！！！"
104090-133 = "は、はやくヒマリ先輩の所に持っていってみよう！"
104090-134 = "はい！！"
104090-139 = "ゲーム開発部のみなさん、ご無沙汰しております。"
104090-140 = "やっほー。"
104090-142 = "あ、あれっ？どうしているの！？"
104090-143 = "C&Cの……"
104090-144 = "リオ会長の……"
104090-145 = "……はい。[ruby=あすま]飛鳥馬[/ruby]トキです。ピース、ピース。"
104090-149 = "えっ？なんかピースしてない！？"
104090-150 = "……！？"
104090-151 = "部長がまた変なこと教えたんだね……"
104090-152 = "変なことではありません。キャラクター性を逆手に取り、相手の隙を突く――いわば、一種の戦法です。"
104090-153 = "……本人がいいなら、いいんだけど。"
104090-154 = "……リオ会長はまだ失踪していますので、私は絶賛求職中というところです。"
104090-155 = "トキは今、あちこちに顔を出してて……次はC&Cの部室に行くんだっけ？"
104090-156 = "……いえ、C&Cの先輩方も忙しいのか、あれから会えていません。"
104090-157 = "そうでしたか、つまり今は無職なんですね。#nよければ私たちとパーティーを組みませんか？"
104090-159 = "ちょっ！？"
104090-160 = "あ、アリス……"
104090-164 = "お誘いありがとうございます。ですが、今は別の任務がありまして……"
104090-166 = "また今度、機会があれば是非。"
104090-172 = "あら、アリスではありませんか？"
104090-173 = "こんにちは、ヒマリ先輩。"
104090-174 = "見てほしいものがあってお邪魔しました！"
104090-175 = "これを……！"
104090-179 = "ゲーム機……？"
104090-181 = "……ふむ。なるほど。"
104090-182 = "どうかな？"
104090-183 = "ケイちゃんと、関係ありそうですか……？"
104090-184 = "……。"
104090-185 = "そうですね……私も「名もなき神」の専門家ではありませんので確信は持てませんが……"
104090-186 = "このようなデータが自然に作られたのだとすれば……たしかに、それは「特異現象」と呼べるでしょう。"
104090-187 = "ただ、これが「ケイ」だとして……それを証明するのは、この状態では難しいかと。"
104090-188 = "そ、そうなのですね……"
104090-189 = "はい。データ量はせいぜい2キロバイト……ビット単位まで分析してみたところで、これが何なのかは……私としても結論を出すことは難しいです。"
104090-190 = "その方面の専門家である、例の小心者が帰って来ない限り――"
104090-191 = "そう、なのですね……まだ、何も分からないのですね……。"
104090-193 = "これがケイだったら良いな、とアリスは思います……そしたら……そしたら、アリスは……"
104090-194 = "アリス……。"
104090-195 = "アリスちゃん……。"
104090-200 = "あら……それは……？"
104090-201 = "これは……アリスがケイの事を考えて作ったものです。"
104090-202 = "そうですか……よくできていますね。"
104090-203 = "……。"
104090-204 = "このロボット、少々改造してみてもよろしいでしょうか？"
104090-205 = "改造……ですか？"
104090-206 = "改造と言っても、USBメモリの機能を追加するだけですが……これなら、おそらく……。"
104090-207 = "あ……ここにケイちゃんのデータを……？"
104090-208 = "うわぁ、天才！！アリスがケイの事を考えて作ったロボットに……"
104090-209 = "このデータを入れたら……！"
104090-210 = "……！！"
104090-211 = "ええ、超天才病弱美少女ですから。これが原因で特異現象が起きたりはしないと思いますが……"
104090-212 = "そうですね……誰かの想いを、しまっておく……事、くらいでしょうか。"
104090-214 = "……はい！！それでも構いません！"
104090-215 = "ふふっ……改造は得意なのでお任せを。#nなんせ「天才」ですから。"
104090-216 = "ちなみにトキのスーツも私が改造したんですよ。あの女のセンスは微妙ですから――"
104090-220 = "ええっと、どれどれ……買っておいたメモリと……あと、ストラップにもできるようにしましょうか。"
104090-223 = "はい、できました。"
104090-224 = "……！！"
104090-225 = "ありがとうございます、ヒマリ先輩！"
104090-226 = "よかったね、アリス！"
104090-227 = "うん……アリスちゃん、よかったね。"
104090-228 = "な、無くさないように、つけておこう……！"
104090-230 = "はい！"
104090-235 = "次回;エピローグ（２）"
