[translation]
10040040-1 = "Episódio 4; Falando a verdade..."
10040040-2 = "（Continuando a nos mover sob as instruções de Kotama e Hare...）"
10040040-6 = "Sensei, pare um pouco."
10040040-7 = "Se virar à direita ali..."
10040040-8 = "……Espere."
10040040-13 = "Estou ouvindo alguma coisa."
10040040-17 = "[ns1] \"Vindo de lá...!\"\n[ns2] \"Tem alguém por perto...!\""
10040040-20 = "Distância de 40 metros, contato em 6 segundos."
10040040-21 = "Tem algum lugar para se esconder...!"
10040040-22 = "Talvez a cozinha ao lado sirva."
10040040-23 = "Vou destravar a porta...!"
10040040-31 = "[ns3] \"Obrigado, vocês duas!\"\n[ns4] Abre a porta rapidamente e entra."
10040040-40 = "Aiii!"
10040040-41 = "[ns5] \"Ai, ai...\"\n[ns6] \"Q-que cabeça dura é essa...\""
10040040-48 = "……Eh!?"
10040040-49 = "Por que o Sensei está aqui...!?"
10040040-50 = "Mas, que bom...!"
10040040-51 = "Fiquei assustada achando que eram as veteranas!"
10040040-52 = "[s7] \"Eu também levei um susto!\"\n[s8] \"Então você estava se escondendo aqui.\""
10040040-55 = "Bem, temos que despistar as veteranas, afinal."
10040040-56 = "Não dá para escapar daqui só correndo um pouquinho."
10040040-57 = "……Eh?"
10040040-58 = "……Ah. Está curioso sobre isso?#nÉ o pijama que a veterana Yuuka preparou para mim."
10040040-59 = "[s9] \"Você está usando direitinho, hein.\"\n[s10] \"Como esperado, você é bem esperta.\""
10040040-62 = "……?"
10040040-63 = "Ora, é um gesto de boa vontade. Não tem por que recusar, não é?"
10040040-64 = "Algum problema com isso...?"
10040040-65 = "Ni-haha, é isso aí!"
10040040-66 = "Mas o pior ainda está por vir.#nMesmo que tenhamos despistado elas por enquanto, ainda tem muito mais pela frente..."
10040040-67 = "Ainda tem mais alguma coisa?#n...Ah, é verdade, é a primeira vez do Sensei tentando escapar daqui."
10040040-68 = "É realmente muito difícil!#nComeçando pelas câmeras de segurança, travas eletrônicas, drones de patrulha,#ne até dispositivos de fechamento automático... não tem fim!"
10040040-69 = "……Eh?"
10040040-70 = "Como eu sei tanto sobre isso?#nBem, eu sou da Seminar, afinal..."
10040040-74 = "Além disso, tenho orgulho de ter lidado com sistemas de segurança mais do que qualquer um nesta escola. He-he-he."
10040040-75 = "[s11] \"Não acho que seja algo para se orgulhar...\"\n[s12] \"Mas talvez essa experiência seja útil agora.\""
10040040-78 = "De qualquer forma, Sensei, você tem sorte! Afinal, você tem a Kurosaki Koyuki, uma veterana entre as veteranas e uma aliada confiável para novatos em fugas!"
10040040-79 = "Não importa o quanto este prédio pareça um labirinto,#neu já consegui escapar das veteranas dezenas de vezes――"
10040040-83 = "Passos...?"
10040040-84 = "Hii...!#nAbaixe-se!!"
10040040-85 = "Vão nos ver pela janela da porta!"
10040040-86 = "……Rápido, venha aqui!"
10040040-92 = "……Francamente, onde elas estão?"
10040040-93 = "Hehe. Eu até que gosto desse tipo de coisa."
10040040-94 = "Não é hora para dizer isso."
10040040-95 = "Se continuarmos assim, não vamos chegar a lugar nenhum. Vamos nos dividir em dois grupos.#nNoah, verifique por ali. Eu vou procurar na cozinha."
10040040-97 = "Ei, espere...! Por que aqui?"
10040040-99 = "A cozinha não estava trancada...?"
10040040-100 = "Esse nível de trava? A Koyuki destrava num piscar de olhos."
10040040-101 = "Hehe, é verdade."
10040040-104 = "[ns13] \"Como esperado da Yuuka. Ela é perspicaz...\"\n[ns14] \"Elas também estão acostumadas com isso.\""
10040040-107 = "Não é hora de ficar impressionado...!"
10040040-108 = "Certo, então deixo essa parte com você."
10040040-109 = "Fufu, pode deixar comigo."
10040040-114 = "Ufa... eu definitivamente vou encontrar."
10040040-121 = "Iiiih...!!"
10040040-122 = "[ns15] Fugir para um lugar onde não seja visto.\n[ns16] (Por enquanto, preciso mudar de lugar...!)"
10040040-129 = "..."
10040040-130 = "Pareceu que tinha alguém aqui... será que foi impressão minha?"
10040040-135 = "...!"
10040040-136 = "[ns17] (Droga, meu pé...!)\n[ns18] (Quem diria que teria utensílios de cozinha aqui...!)"
10040040-139 = "...Koyuki, é você!?"
10040040-140 = "Eu sabia que era aqui. #nSaia logo daí!"
10040040-145 = "Se não sair, não me responsabilizo pelo que acontecer...!"
10040040-146 = "[ns19] ...Pensar em uma desculpa.\n[ns20] (Será que é o fim para mim aqui...!)"
10040040-156 = "...?"
10040040-165 = "Ni-hahaha! #nYuuka-senpai! É por aqui, por aqui!!"
10040040-166 = "[ns] (...Koyuki!)"
10040040-168 = "...J-já está em um lugar desses!?"
10040040-169 = "Não vou deixar você escapar...!"
10040040-173 = "Ni-haha! Acha mesmo que é tão fácil me pegar?!"
10040040-174 = "É por aqui~~!"
10040040-183 = "Ei! Espere aí!!"
10040040-192 = "[ns21] \"...Obrigado, Koyuki.\"\n[ns22] \"...Não vou esquecer esse favor.\""
10040040-197 = "...Um sacrifício nobre, não é?"
10040040-198 = "Se conseguirmos escapar em segurança, talvez devêssemos criar um site em homenagem a ela."
10040040-199 = "Isso é exagero demais."
10040040-200 = "I-isso mesmo... haa, haa."
10040040-201 = "Isso aqui é moleza, e... ni-haha."
10040040-206 = "[ns23] \"Koyuki!?\"\n[ns24] \"Você não foi pega...!\""
10040040-209 = "Ni-haha... isso não é nada."
10040040-210 = "Eu não disse? #nQuando o assunto é fuga, eu sou uma veterana...! Ni-haha...!"
10040040-211 = "Haa, haa... finalmente, estou me acalmando... ufa."
10040040-212 = "Mas, encontrar um reforço assim, eu realmente tenho sorte!"
10040040-213 = "Isso é porque minhas \"boas ações diárias\", como o Sensei diz, valeram a pena, né?"
10040040-214 = "Acho que não é bem assim..."
10040040-215 = "É verdade. Não foi coincidência, mas sim inevitável. #nComo escolhemos a rota mais adequada para a fuga..."
10040040-216 = "Encontrar a Koyuki foi um desdobramento natural."
10040040-218 = "Não importa os detalhes, somos todos aliados! #nSomos todos membros da Aliança de Fuga! Ni-hahahaha!"
10040040-220 = "...Você parece um pouco com a Maki."
10040040-221 = "Concordo. #nFalando na Maki, ela deve estar chegando."
10040040-223 = "...Por que você chamou a Maki?"
10040040-224 = "É bom ter alguém por perto para qualquer eventualidade."
10040040-225 = "A segurança aqui é rígida, então, dependendo da situação, #npensei em pedir para ela quebrar a porta ou a janela do primeiro andar para fugirmos."
10040040-226 = "[s25] \"V-você pensou em tudo isso...?\"\n[s26] \"Mas não pode quebrar nada.\""
10040040-230 = "Não precisa se preocupar com isso, não é?"
10040040-231 = "O Seminar é rico, então quebrar um pouco as instalações..."
10040040-236 = "...Entendo, então é isso."
10040040-237 = "Eu tinha ouvido falar pela Yuuka, mas é mais do que eu imaginava."
10040040-238 = "Disseram que eu pareço com a Maki... vou ter que pedir desculpas a ela depois."
10040040-240 = "Eu disse algo estranho!?!?"
10040040-241 = "Sobre isso, a Maki..."
10040040-242 = "……Ah, Sensei?#nDisse alguma coisa?"
10040040-243 = "Você acha que a situação está ficando cada vez mais grave?"
10040040-244 = "Então, você está pensando em parar de fugir e ir pedir desculpas honestamente...?"
10040040-245 = "E-e-e-e-e!?#nO que você está dizendo!? Vai me trair aqui mesmo!?"
10040040-246 = "De jeito nenhum! O Sensei vai escapar comigo!#nSe não, vai sobrar tudo para mim, não vai!?"
10040040-247 = "Que declaração problemática de se dizer tão casualmente..."
10040040-248 = "[ns27] \"Eu vou explicar tudo sobre a Koyuki também.\"\n[ns28] \"Se pedirmos desculpas honestamente, as duas vão entender.\""
10040040-251 = "I-isso é..."
10040040-252 = "……Mas, Sensei."
10040040-253 = "O que exatamente você pretende dizer \"honestamente\"?"
10040040-254 = "Por acaso..."
10040040-258 = "“Sem fazer o que um adulto deveria fazer,#ninvadiu a sala de detenção no meio da noite”"
10040040-259 = "“Tentou passar a noite em claro brincando com as alunas, foi quase pego e fugiu”"
10040040-260 = "“Depois de ficar espiando uma aluna de pijama”"
10040040-261 = "“Falhou na fuga e se entregou”"
10040040-262 = "……."
10040040-263 = "……É isso que você vai explicar?"
10040040-269 = "[ns29] \"……Onde é a saída?\"\n[ns30] \"Vamos escapar de qualquer jeito!\""
10040040-272 = "Ni-hahaha! É assim que se fala!"
10040040-284 = "Que barulho é esse...!?"
10040040-285 = "Drones de segurança...! Eles mobilizaram até coisas que nem costumam usar!"
10040040-287 = "Parece que eles estão bem bravos..."
10040040-288 = "A provocação da Koyuki deve ter surtido efeito."
10040040-290 = "Não temos tempo para isso! Precisamos ir para o primeiro andar logo!"
10040040-292 = "Verdade.#nEu adoraria hackear todos os drones para ajudar o Sensei, mas..."
10040040-293 = "Precisamos encontrar uma rota segura rapidamente, então vou me concentrar em controlar as câmeras de segurança."
10040040-294 = "Quanto aos drones..."
10040040-296 = "Ni-ha-ha-ha-ha!#nDeixe isso com a Kurosaki Koyuki!"
10040040-297 = "Se eu tiver o comando do Sensei, vou destruir todos—"
10040040-298 = "……Eh?"
10040040-299 = "Não posso destruir...?"
10040040-300 = "Nós estamos tentando escapar, não tem outro jeito, tem...?"
10040040-301 = "[s31] \"Tanto os drones quanto as janelas são ativos do Seminar.\"\n[s32] \"Vamos apenas neutralizá-los.\""
10040040-304 = "Dá para fazer isso...?"
10040040-305 = "Sim. Se neutralizarmos e desligarmos manualmente, deve dar certo."
10040040-306 = "Nós também vamos dar suporte no que for possível."
10040040-307 = "É uma chance de enfraquecer a segurança do Seminar, então é um pouco decepcionante, mas..."
10040040-308 = "Pois é. Eu queria destruir tudo..."
10040040-313 = "……Koyuki, você não pertence ao Seminar?"
10040040-314 = "Mas agora estamos agindo com o mesmo objetivo, então..."
10040040-316 = "Não importa! Vamos logo!"
10040040-317 = "Poder da Koyuki, CARREGANDO!"
