[translation]
10040040-1 = "第4話;本音を言うと……"
10040040-2 = "（コタマとハレの指示で移動を続けていると……）"
10040040-6 = "先生、ちょっとストップ。"
10040040-7 = "そこを右に曲がると……。"
10040040-8 = "……待ってください。"
10040040-13 = "何か聞こえます。"
10040040-17 = "[ns1] \"向こうから……！\"\n[ns2] \"人の気配が……！\""
10040040-20 = "距離40ｍ、6秒後に接触します。"
10040040-21 = "どこか隠れる場所は……！"
10040040-22 = "隣の調理室ならいけるかも。"
10040040-23 = "ロック解除するね……！"
10040040-31 = "[ns3] \"ありがとう、二人とも！\"\n[ns4] 素早くドアを開けて入る。"
10040040-40 = "うぎゃああぁっ！"
10040040-41 = "[ns5] \"いたた……。\"\n[ns6] \"こ、この石頭は……。\""
10040040-48 = "……えっ！？"
10040040-49 = "なんでここに先生が……！？"
10040040-50 = "でも、良かったぁ～……！"
10040040-51 = "先輩かと思ってびっくりしちゃいましたよ！"
10040040-52 = "[s7] \"私もビックリしたよ！\"\n[s8] \"こんなところに隠れてたんだね。\""
10040040-55 = "とりあえず先輩たちを[ruby=ま]撒[/ruby]かなきゃいけませんからね。"
10040040-56 = "ちょっと逃げたくらいじゃ脱出できないんですよ、ここからは。"
10040040-57 = "……え？"
10040040-58 = "……ああ。これ、気になります？#nユウカ先輩が用意してくれたパジャマです。"
10040040-59 = "[s9] \"ちゃんと着てるんだね。\"\n[s10] \"さすが、ちゃっかりしてるなぁ。\""
10040040-62 = "……？"
10040040-63 = "だって、せっかくの好意ですから。無下にする必要なんてなくないですか？"
10040040-64 = "何か問題でも……？"
10040040-65 = "にはははは、そうでしょう！"
10040040-66 = "それより、大変なのはこれからですよ。#nいったん[ruby=ま]撒[/ruby]けたとはいえ、まだまだこの先にも……。"
10040040-67 = "まだ何かあるの、ですか？#n……あぁ、先生は初めてですもんね、ここから脱出するの。"
10040040-68 = "ほんと、大変なんですから！#n監視カメラに始まり、電子ロックに警備ドローン、#n果ては自動閉鎖装置まで……次から次へとキリがないんですよ！"
10040040-69 = "……え？"
10040040-70 = "どうしてそんなに詳しいのかって？#n私も一応、セミナーですし……。"
10040040-74 = "それに、この学園の誰よりもセキュリティシステムと向き合ってきた#nという自負がありますから。ふっふっふっ。"
10040040-75 = "[s11] \"得意気に言うことじゃないような……。\"\n[s12] \"でも今ならその経験が役立つかもね。\""
10040040-78 = "とにかく、先生はツイてますよ！なにせ脱出ルーキーの心強い味方、#nこの[ruby=くろさき]黒崎[/ruby]コユキというベテラン中のベテランが一緒なんですから！"
10040040-79 = "いくらこの建物が迷路のようになっていても、#n私はもう何十回も先輩たちから逃げ切ってるんですから――"
10040040-83 = "足音……？"
10040040-84 = "ひ、ひぃっ……！#n伏せてください！！"
10040040-85 = "ドアの窓からバレちゃいます！"
10040040-86 = "……早く、こっちに！"
10040040-92 = "……まったく、どこにいるのよ。"
10040040-93 = "ふふっ。こういうの、私は好きですけどね。"
10040040-94 = "そんなこと言ってる場合じゃないでしょ。"
10040040-95 = "このままじゃ[ruby=らち]埒[/ruby]が明かないし、[ruby=ふたて]二手[/ruby]に分かれましょう。#nノアはあっちをお願い。私は調理室を探してみるわ。"
10040040-97 = "ちょ、まっ……！なんでここに？"
10040040-99 = "調理室なら施錠してませんでしたっけ……。"
10040040-100 = "この程度のロック、コユキならあっというまに解除しちゃうもの。"
10040040-101 = "ふふっ、それもそうですね。"
10040040-104 = "[ns13] \"さすがユウカ。鋭いなあ……。\"\n[ns14] \"向こうも慣れてるね。\""
10040040-107 = "感心してる場合じゃないですよ……！"
10040040-108 = "じゃあ、そっちは頼むわね。"
10040040-109 = "ふふっ、お任せあれ。"
10040040-114 = "ふぅ……ぜったい見つけてやるんだから。"
10040040-121 = "ひぃっ……！！"
10040040-122 = "[ns15] 目につかないであろうところへ避難する。\n[ns16] （とりあえず場所を変えないと……！）"
10040040-129 = "……。"
10040040-130 = "誰かいたような……気のせいかしら？"
10040040-135 = "……！"
10040040-136 = "[ns17] （しまった、足が……！）\n[ns18] （こんなところに調理器具があるなんて……！）"
10040040-139 = "……コユキね！？"
10040040-140 = "やっぱり、ここだと思ったのよ。#n早く出てきなさい！"
10040040-145 = "出てこないなら、どうなっても知らないわよ……！"
10040040-146 = "[ns19] ……言い訳を考える。\n[ns20] （ここで終わりなのか……！）"
10040040-156 = "……？"
10040040-165 = "にはははは！#nユウカ先輩！こっちですよこっち！！"
10040040-166 = "[ns] （……コユキ！）"
10040040-168 = "……も、もうあんなところに！？"
10040040-169 = "逃がさないわよ……！"
10040040-173 = "にはははっ！そう簡単に捕まるもんですか！！"
10040040-174 = "こっちですよ～～！"
10040040-183 = "こら！待ちなさ～い！！"
10040040-192 = "[ns21] \"……ありがとう、コユキ。\"\n[ns22] \"……この恩は忘れないよ。\""
10040040-197 = "……尊い犠牲、ですね。"
10040040-198 = "無事脱出できたら、彼女を弔うWebサイトでも作りましょうか。"
10040040-199 = "そんな大げさな。"
10040040-200 = "そ、そうですよ……はぁ、はぁ。"
10040040-201 = "この程度、へっちゃら、ですし……にはは。"
10040040-206 = "[ns23] \"コユキ！？\"\n[ns24] \"捕まらなかったの……！？\""
10040040-209 = "にはは……なんの、これしき。"
10040040-210 = "言ったじゃ、ないですか。#n脱出に関してなら、私は、ベテランだって……！にはは……！"
10040040-211 = "はぁ、はぁ……ようやく、落ち着いてきました……ふぅ。"
10040040-212 = "それより助っ人に出会えるなんて、やっぱりツイてます！"
10040040-213 = "これも先生の言う「日頃の行い」が良かったからですよね？"
10040040-214 = "ちょっと違うような……。"
10040040-215 = "そうですね。偶然ではなく必然ですから。#n私たちは脱出に適したルートを選んでいたので……。"
10040040-216 = "コユキさんと鉢合わせたのは、自然な成り行きです。"
10040040-218 = "細かいことはいいんです、みんな仲間ってことなんですから！#n私たちはみんな、 脱 出同盟の一員なんですよ！にはははは！"
10040040-220 = "……なんか、マキみたいだね。"
10040040-221 = "同感です。#nマキと言えば、そろそろ着く頃ですね。"
10040040-223 = "……何でマキを呼んだの、ですか？"
10040040-224 = "万が一に備えて、いたほうがいいからね。"
10040040-225 = "ここはセキュリティが固いから、状況によっては#n一階のドアとか窓を壊して脱出してもらおうと思って。"
10040040-226 = "[s25] \"そ、そこまで考えてたの……？\"\n[s26] \"でも壊すのはダメだよ。\""
10040040-230 = "そんなの気にしなくていいんじゃ？"
10040040-231 = "セミナーはお金持ちですし、ちょっと施設を壊すくらいなら……。"
10040040-236 = "……なるほど、これが。"
10040040-237 = "ユウカさんから聞いていましたが、思った以上ですね。"
10040040-238 = "マキみたいって言ってたの……後で本人に謝らないと。"
10040040-240 = "私、なにか変なこと言いました！？！？"
10040040-241 = "こっちの話だけど、マキはさ……。"
10040040-242 = "……って、先生？#n何か言った？"
10040040-243 = "どんどん[ruby=おおごと]大事[/ruby]になってる気がする？"
10040040-244 = "だから逃げるのはやめて素直に謝りに行こうかな、って……？"
10040040-245 = "え、えええええ！？#nなに言ってるんですか！？ここで裏切るんですか！？"
10040040-246 = "ダメです、絶対！先生は私と一緒に脱出するんです！#nでないと全部私のせいになっちゃうじゃないですか！？"
10040040-247 = "さらりと問題発言を……。"
10040040-248 = "[ns27] \"コユキのこともうまく言っておくから。\"\n[ns28] \"素直に謝れば、二人もわかってくれるはず。\""
10040040-251 = "そ、そんな……！"
10040040-252 = "……でも、先生。"
10040040-253 = "いったい何を「素直に」話すつもりなんです？"
10040040-254 = "もしかして――"
10040040-258 = "「大人としてやるべきこともせず、#n夜な夜な反省部屋に潜り込んで」"
10040040-259 = "「生徒と徹夜で遊ぼうとしていたのが、見つかりかけて逃げ出し」"
10040040-260 = "「パジャマ姿の生徒を散々覗き見したうえで」"
10040040-261 = "「脱出に失敗して、自首した」"
10040040-262 = "……。"
10040040-263 = "……と、説明するんですか？"
10040040-269 = "[ns29] \"……出口はどこ？\"\n[ns30] \"何としても脱出しよう！\""
10040040-272 = "にはははは！やっぱりそう来なくっちゃ！"
10040040-284 = "この音は……！？"
10040040-285 = "警備ドローン……！普段使ってないものまで動員してきましたか！"
10040040-287 = "相当怒っているみたいだね……。"
10040040-288 = "コユキさんの挑発が効いてしまったんでしょうね。"
10040040-290 = "こうしてる場合じゃなさそうです！早く一階に向かわないと！"
10040040-292 = "そうだね。#nドローンを全部ハッキングして先生を助けたいとこだけど……。"
10040040-293 = "私たちは安全なルートを迅速に割り出す必要があるので。#n監視カメラの制御に専念します。"
10040040-294 = "ドローンは……。"
10040040-296 = "に・は・は・は・は！#nここは黒崎コユキにお任せください！"
10040040-297 = "先生の指揮さえあれば、全部壊せ――"
10040040-298 = "……え？"
10040040-299 = "壊しちゃダメ……？"
10040040-300 = "脱出するんですし、仕方なくないですか……？"
10040040-301 = "[s31] \"ドローンも窓も、セミナーの資産だからね。\"\n[s32] \"制圧するだけにしよう。\""
10040040-304 = "そんなこと、できるんです……？"
10040040-305 = "うん。制圧してから手動で電源をオフにすれば、いける。"
10040040-306 = "私たちも、できる範囲でサポートしてみるね。"
10040040-307 = "セミナーのセキュリティを弱体化するチャンスではあるので、少々残念ですが……。"
10040040-308 = "本当ですよ。全部壊したかったのにぃ……。"
10040040-313 = "……コユキさんは、セミナー所属でしたよね？"
10040040-314 = "でも今は同じ目的で動いてるから……。"
10040040-316 = "なんでもいいです！ほら、行きますよ！"
10040040-317 = "コユキパワー、チャーーージ！"
