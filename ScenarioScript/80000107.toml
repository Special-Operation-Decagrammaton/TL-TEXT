[translation]
80000107-1 = "O processo e o resultado"
80000107-2 = "O que importa é como você apresenta!!!"
80000107-3 = "[s] \"Por que isso de repente!?\""
80000107-4 = "É sobre isso, Sensei."
80000107-5 = "Mesmo que o resultado já seja óbvio..."
80000107-6 = "Se você caprichar no processo, não dá para criar um diferencial?"
80000107-7 = "[s] \"Hoje você também está falando de um jeito que eu não entendo nada!\""
80000107-8 = "Bem, como dizem, ver para crer..."
80000107-9 = "Então, agora, vou mostrar uma performance para você, Sensei!"
80000107-13 = "（Enquanto dizia isso, Meru tirou algo...）"
80000107-14 = "（Eram várias placas brancas que tinham um cheiro doce...!）"
80000107-15 = "[ns] \"Isso é...?\""
80000107-17 = "Hehe..."
80000107-18 = "Embora pareça papel de desenho..."
80000107-19 = "Na verdade, é chocolate branco!"
80000107-20 = "Muito bem. O papel está pronto, só falta a caneta..."
80000107-21 = "E é aqui que entra esta caneta de chocolate amargo!"
80000107-22 = "[s] \"Vou desenhar no chocolate usando chocolate!\""
80000107-23 = "Exatamente, Sensei."
80000107-24 = "Você não achou que eu não sabia que dia é hoje, achou?"
80000107-25 = "...Esse é um clichê bem batido nesse meio... e eu me preparei muito bem."
80000107-26 = "[s] \"Com certeza, você tem razão...\""
80000107-27 = "Sendo assim! Vou começar uma live de desenho com chocolate, então preste muita atenção!"
80000107-28 = "Uma ilustração autografada pela doujinshi Meru... b-bem, ainda não tem tanto valor assim..."
80000107-29 = "Mas um dia, com certeza, eu vou ficar famosa!"
80000107-35 = "（Dizendo isso, Meru começou a desenhar no chocolate）"
80000107-40 = "[ns1] \"Oh, incrível...\"\n[ns2] \"Terminou num piscar de olhos... esse é o seu autorretrato, Meru?\""
80000107-45 = "..."
80000107-46 = "Não, não é assim!"
80000107-47 = "[s] \"O-o que houve? Achei que tinha ficado muito bom?\""
80000107-48 = "Ainda... ainda não está bom! Quer dizer, o formato da sobrancelha está totalmente errado!"
80000107-49 = "Droga... o problema de desenhar com chocolate é que não dá para corrigir muito bem."
80000107-50 = "Mas Himeki Meru não desiste tão fácil!"
80000107-51 = "Além disso, eu me preveni e preparei um monte de papel de chocolate!"
80000107-53 = "（Dizendo isso, Meru começou a desenhar no chocolate novamente）"
80000107-55 = "..."
80000107-56 = "A linha está torta!"
80000107-58 = "（Dizendo isso, Meru começou a desenhar no chocolate novamente...）"
80000107-60 = "..."
80000107-61 = "A linha não está alinhada!"
80000107-63 = "（Dizendo isso, Meru novamente...）"
80000107-65 = "A linha está sem graça!"
80000107-70 = "..."
80000107-71 = "[s3] \"Ei, Meru...?\"\n[s4] \"Parece que você usou todo o papel de chocolate...\""
80000107-74 = "Não pode ser... desenhei tanto e não consegui terminar um desenho decente..."
80000107-75 = "Esse é o meu limite? Mesmo que a sensação do digital para o analógico seja diferente..."
80000107-76 = "Snif... snif..."
80000107-80 = "（Aproximando-se silenciosamente do desenho que Meru fez）"
80000107-81 = "（Peguei o que mais gostei dentre eles）"
80000107-87 = "...!? O-o que você está fazendo, Sensei! Isso é um fracasso!"
80000107-88 = "[s] \"Na minha opinião, é um desenho muito bom, sabe?\""
80000107-89 = "Fico feliz que pense assim, mas... não serve! Com esse nível de qualidade...!"
80000107-90 = "[s] \"O que importa é o processo... a forma como você apresenta, não é?\""
80000107-91 = "……！"
80000107-92 = "Ugh... essa doeu. Não acredito que você usou esse argumento contra mim..."
80000107-93 = "……。"
80000107-94 = "Ei...!"
80000107-99 = "(A Mel pegou o desenho que ela fez para mim!)"
80000107-100 = "[ns] \"O-o que você pretende fazer, Mel!?\""
80000107-102 = "Como assim o que eu pretendo? Se é para dar ao Sensei, eu mesma tenho que entregar!"
80000107-103 = "Hoje é aquele dia, não é? ...Valentine."
80000107-104 = "Bem, deixando de lado o significado por trás deste chocolate..."
80000107-105 = "O que importa é que eu entregue o chocolate diretamente ao Sensei, esse é o processo!"
80000107-106 = "[s] \"É assim que ele vai ficar mais feliz, não é?\""
80000107-107 = "Cof... é, né?"
80000107-108 = "Então, mesmo que eu não esteja satisfeita com o resultado..."
80000107-114 = "...Pronto, aceite. Já que estamos aqui, quero que você aproveite o sabor."
80000107-115 = "Hm? Por onde você deve começar a comer o rosto?"
80000107-116 = "Ora, que pergunta..."
80000107-117 = "...Espera, não."
80000107-118 = "……。"
80000107-119 = "Isso não é um problema gravíssimo!?"
80000107-121 = "(Assim, começou uma longa discussão sobre por onde se deve começar a comer o chocolate em formato de autorretrato da Mel.)"
