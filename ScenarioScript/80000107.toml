[translation]
80000107-1 = "過程と結果と"
80000107-2 = "大事なのは魅せ方！！！"
80000107-3 = "[s] \"急にどうしたの！？\""
80000107-4 = "こういうことだよ、先生。"
80000107-5 = "たとえ結果が分かりきっていたとしても……"
80000107-6 = "その過程を工夫すれば、差別化もできるんじゃないかな？"
80000107-7 = "[s] \"今日も話が急でまったく分かりません！\""
80000107-8 = "まぁ、百聞は一見にしかずって言うくらいだし……"
80000107-9 = "それじゃあ今から、先生にパフォーマンスを見てもらおう！"
80000107-13 = "（そう言いながらメルが取り出したのは……）"
80000107-14 = "（なんだか甘い匂いがする大量の白い板だった……！）"
80000107-15 = "[ns] \"これは……！？\""
80000107-17 = "ふっふっふ……"
80000107-18 = "これは画用紙のように見えて……"
80000107-19 = "実はホワイトチョコレートなんだ！"
80000107-20 = "よし、よし。これで紙は準備できたし、残るはペンだけど……"
80000107-21 = "ここで、このダークチョコレートペンの出番！"
80000107-22 = "[s] \"チョコレートの上に、チョコレートで絵を描くんだ！\""
80000107-23 = "そうだよ、先生。"
80000107-24 = "まさか、今日が何の日か私が知らないとでも思ってたんじゃないよね？"
80000107-25 = "……こっちの界隈では散々使い古されてるネタだし……準備だって入念にしているよ。"
80000107-26 = "[s] \"たしかに、そうだよね……\""
80000107-27 = "というわけで！ここでチョコレートライブドローイングを始めるから、しっかり見てて！"
80000107-28 = "同人作家メルリーの直筆イラスト……ま、まぁ、まだそんな価値はつかないけど……"
80000107-29 = "いつかきっと、必ず有名になってみせるから！"
80000107-35 = "（そう言いながら、メルはチョコレートに絵を描き始めた）"
80000107-40 = "[ns1] \"おぉ、すごいね……\"\n[ns2] \"あっという間に完成……これ、メルの自画像だよね？\""
80000107-45 = "……。"
80000107-46 = "違う、こうじゃない！"
80000107-47 = "[s] \"ど、どうしたの？よく描けてると思ったよ？"
80000107-48 = "まだ……まだ足りない！というか眉毛の形が全然違う！"
80000107-49 = "くっ……チョコレートで描くと、あんまり修正できないのが問題なんだよね。"
80000107-50 = "でも[ruby=ひめき]姫木[/ruby]メルは、そう簡単に諦めない！"
80000107-51 = "それに、こんなこともあろうかと思って、チョコレート紙はいっぱい準備してきたんだから！"
80000107-53 = "（そう言いながら、メルは再びチョコレートに絵を描き始めた）"
80000107-55 = "……。"
80000107-56 = "線が歪んでる！"
80000107-58 = "（そう言いながら、メルは再びチョコレートに絵を……）"
80000107-60 = "……。"
80000107-61 = "線が整ってない！"
80000107-63 = "（そう言いながら、メルは再び……）"
80000107-65 = "線がつまらない！"
80000107-70 = "……。"
80000107-71 = "[s3] \"えっと、メル……？\"\n[s4] \"チョコレート紙、全部使っちゃったみたいだけど……？\""
80000107-74 = "なんてことだ……こんなに大量に描いてるのに、まともな絵が一つも完成しなかったなんて……"
80000107-75 = "これが私の限界？いくらデジタルとアナログは、感覚が違うにしても……"
80000107-76 = "うっ……ううっ……"
80000107-80 = "（静かにメルの描いた絵に近づき）"
80000107-81 = "（その中から一番気に入ったものを手に取った）"
80000107-87 = "……！？な、何してるの、先生！それは失敗作だってば！"
80000107-88 = "[s] \"私からしたら、本当にいい絵だよ？\""
80000107-89 = "そう思ってくれるのは嬉しいけど……やっぱりダメ！その程度の出来じゃ……！"
80000107-90 = "[s] \"大事なのは、過程……魅せ方なんでしょ？\""
80000107-91 = "……！"
80000107-92 = "うっ……これはやられた。その話を持ってくるなんて……"
80000107-93 = "……。"
80000107-94 = "えいっ……！"
80000107-99 = "（メルに描いてもらった絵を奪われてしまった！）"
80000107-100 = "[ns] \"ど、どうするつもりなの、メル！？\""
80000107-102 = "どうするって、先生にあげるんだったら、私から手渡さないと！"
80000107-103 = "今日は、アレでしょ？……バレンタイン。"
80000107-104 = "……まぁ、このチョコレートに込めた意味は置いといて……"
80000107-105 = "とにかく大事なのは！私が先生に直接チョコレートを渡すという過程！"
80000107-106 = "[s] \"その方が嬉しいからね！\""
80000107-107 = "ごほっ……で、でしょ？"
80000107-108 = "じゃあ、この出来に満足はしてないけど……"
80000107-114 = "……はい、受け取って。せっかくだし、味わってほしいかな。"
80000107-115 = "ん？顔のどこから食べたらいいのかって？"
80000107-116 = "なんだ、そんなこと……"
80000107-117 = "……って、いや。"
80000107-118 = "……。"
80000107-119 = "それは重大な問題じゃない！？"
80000107-121 = "（こうして、メルの自画像チョコレートをどこから食べるべきか、長時間にわたる議論が始まった）"
