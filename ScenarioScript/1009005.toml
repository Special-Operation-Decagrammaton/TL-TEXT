[translation]
1009005-1 = "お祭りを邪魔する子は許しません！"
1009005-2 = "（ウミカから連絡をもらって、百夜堂にやってきた……）"
1009005-7 = "[ns] \"こんにちは～。\""
1009005-8 = "ん？誰か来たのか？"
1009005-9 = "気にする必要はないっすよ！#n今日はあたし達も……お客様っすから！"
1009005-14 = "ひゅぅぅー！"
1009005-17 = "いやっほ～ぅ！いいぞ！走れぇ！"
1009005-21 = "[ns] \"な、なにごと！？\""
1009005-22 = "ええ……！？先生！こんな時に来られるなんて……！"
1009005-23 = "い、いえ……私が連絡したからですよね……！#nたしかに先生にはお会いしたかったのですが……！"
1009005-29 = "ああ、もう！魑魅一座！本当に怒りますよ！？"
1009005-33 = "何言ってんだ、百夜堂！あたし達はお客様だぞ？"
1009005-34 = "そうそう、お会計も前払いしたはずっす！"
1009005-35 = "それはそうですが……。#nうぅ～、お客様には笑顔で接するべきなのに。"
1009005-36 = "でも、あんなに暴れ回られてしまっては……！"
1009005-37 = "このままでは……百夜堂の名に傷が……！"
1009005-38 = "[s1] \"暴れるお客さんに遠慮する必要はないよ。\"\n[s2] \"百夜堂には他のお客さんも来てるんだし。\""
1009005-44 = "えっと、つまり……礼儀がなってないお客様には……#n相応の「おもてなし」をするのも接客の一環ということでしょうか……？"
1009005-45 = "そうしなければ、他のお客様にも迷惑になるから……？"
1009005-49 = "たしかに……先生の仰るとおりです。#nそれなら……！"
1009005-50 = "魑魅一座！今から百夜堂の誇りと伝統……。#nなによりも、来てくださる他のお客様のためにも！"
1009005-54 = "私たちの真心がこもった「おもてなし」をお見せいたします！"
1009005-56 = "え？な、何をする気だ……？"
1009005-57 = "なんだか不穏な気配がするっす……？"
1009005-62 = "お客様、お席にご案内いたします！！"
1009005-68 = "え、ええ？はい……！"
1009005-69 = "ちょ……！自分で座るから！"
1009005-84 = "湯呑に緑茶、ウーロン茶。取り皿と紙ナプキン！#nすべてご用意しております！他に必要なものはございませんかっ！？"
1009005-89 = "すっげぇ速さ！なのに、すこしもブレないだと……？"
1009005-90 = "ふ、ふんっ！おしぼりがないっすよ！"
1009005-96 = "そう仰るだろうと、こちらにご用意しました！"
1009005-97 = "こ、これは多すぎじゃないか！？"
1009005-98 = "え、あの、その、2つあれば十分っすよ……？"
1009005-99 = "汚した場所を自ら綺麗にしたいというお心遣い……。#n感服いたしました！必要なだけお使いください、お客様！"
1009005-100 = "ただし、百夜堂の外に持ち出すのはご遠慮ください！"
1009005-101 = "他に必要なものはございませんか？"
1009005-105 = "うっ……な、ないよ。"
1009005-107 = "それでは、ご注文を承りますね！私たち百夜堂のメニューは――"
1009005-111 = "（ウミカは百夜堂にあるすべてのメニューを丁寧に説明した……）"
1009005-112 = "（魑魅一座、いや、お客さんはイメージが追いつかないようだった……）"
1009005-114 = "う、うぅ。もう何がなんだかちっともわからねぇ。頭がくらくらする……。"
1009005-115 = "こんなんじゃ、注文できないっすよ……。"
1009005-116 = "承知いたしました。まだご不明な点がおありなんですね？#nそれでは、最初からご説明いたします――"
1009005-120 = "い、いや！大丈夫だ！何とか注文してみせるから……。"
1009005-121 = "あたし達が悪かったよ。……許してほしいっす。"
1009005-127 = "[ns] \"ふたりとも、すこしは反省した？\""
1009005-128 = "はい……。"
1009005-129 = "あたし達、ここでお祭りが開かれるって聞いてきたっすよ。#nそれで、つい浮かれて……。"
1009005-134 = "[ns] \"うん？百夜堂でお祭りが？\""
1009005-135 = "その、3日前からお祭りの資材がこの店に運ばれてたんだ。"
1009005-136 = "それに、商会や資材担当、露店のスポンサーにイベントの運営まで……。"
1009005-137 = "みんな、百夜堂に集まってるって……。"
1009005-138 = "あなたたち、どこでその情報を！？"
1009005-139 = "あたし達は魑魅一座だぞ。#n百鬼夜行で開かれるお祭りは知り尽くしてるはずなんだ……。"
1009005-140 = "しばらく、このあたりでお祭りなんてないはずっす。#nなのに百夜堂で何かお祭りの準備をしていたから……。"
1009005-141 = "そ、それはっ！勘違いですよ！魑魅一座！"
1009005-142 = "いいや、あたし達はお祭りの気配を勘違いしたりしない！#n魑魅一座は周りから問題児だと言われてるけど！"
1009005-143 = "そうっす！百鬼夜行のお祭りにはいつでも本気なのが、魑魅一座っす！"
1009005-147 = "う、ううぅぅ～……！"
1009005-150 = "それ以上、言わないでください……！"
1009005-152 = "違うったら違うんですっ！"
1009005-154 = "あ、あれ……？#nあたし達、何か言っちゃいけないことを言ったりしたか？"
1009005-155 = "もしかして、怒らせたっすか……！？"
1009005-156 = "……も、もう行こうか？"
1009005-157 = "そ、そうっすね！食べ物も美味しかったし！もう十分遊んだし！"
1009005-164 = "うぅぅ～……。"
1009005-168 = "ごめんなさい、先生。こんな姿をお見せしてしまって……。"
1009005-169 = "[s3] \"魑魅一座もお祭りを楽しみにしてたんだね。\"\n[s4] \"……すこし可哀想だったかも。\""
1009005-172 = "あそこまで言う必要はなかった、ですよね……？"
1009005-173 = "たしかに、そうなんですけど……。"
1009005-178 = "でもでも、ダメなんです！"
1009005-179 = "このお祭りだけは……誰にも邪魔はさせませんっ！"
1009005-180 = "[ns5] \"本当にお祭りの予定があるの？\"\n[ns6] \"しばらくお祭りはないはずって言ってたけど……\""
1009005-183 = "あ……！そ、それはですね……。"
1009005-184 = "えっと、ちょっと、私も思い違いをしていました！"
1009005-188 = "お祭りについては忘れてください！"
1009005-189 = "[ns] \"でも、魑魅一座が……。\""
1009005-190 = "なんでもないんですってば！#nそれより先生！何か食べたいものはありませんか！？"
1009005-191 = "今日は特別に……私がごちそうしますので！#n気になるものがあれば、なんでも仰ってくださいね！"
1009005-192 = "[ns] \"お祭りのことが気になっちゃって……。\""
1009005-193 = "お、お祭りの話は、もう聞きたくありませんっ！"
1009005-194 = "[s] \"ウミカがそんなことを言うなんて！\""
1009005-195 = "き、今日の私が変なのは自分でもよくわかってますけど……うぅ～っ！"
1009005-199 = "（その後、何度かウミカに「お祭り」の話題を振ってみたものの……）"
1009005-200 = "（慌てて話題を逸らすばかりだった……）"
