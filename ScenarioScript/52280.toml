[translation]
52280-1 = "Episódio 28; Juntos, Esperando pelo Florescimento"
52280-2 = "Quarto dentro do hospital"
52280-5 = "Sim, sim~ pode entrar."
52280-9 = "Ah, Sensei [USERNAME]?"
52280-10 = "Por que você está aqui......?"
52280-11 = "[s1] \"Soube que você foi hospitalizada, então vim te visitar.\"\n[s2] \"Como você está se sentindo?\""
52280-14 = "Nyaha...... peço perdão por causar preocupação desnecessária."
52280-15 = "Como pode ver, estou com saúde plena. #n Meus ferimentos estão quase todos curados."
52280-16 = "É só que a Kaho foi teimosa e insistiu: 'Mesmo que sejam ferimentos leves, se foram causados pela Hyakumonogatari, é necessário repouso absoluto!'......"
52280-17 = "Fui internada para tratamento e exames. Por favor, fique tranquilo, não são ferimentos graves."
52280-18 = "[s] \"Fico aliviado em saber disso.\""
52280-19 = "Bem, para ser sincera...... me sinto um pouco culpada por ser a única internada."
52280-20 = "Enquanto a Hyakkaryouran, que enfrentou uma luta mortal, e todos os outros já retornaram ao cotidiano...... ser a única a ficar aqui descansando, entende......?"
52280-21 = "Bem, já que é uma oportunidade rara de me dizerem para 'tirar folga do trabalho', acho que quero passar o tempo relaxando...... fufu."
52280-22 = "[s] \"Para alguém que quer relaxar, há uma pilha de documentos ao lado da cama......\""
52280-26 = "Ah, bem, isso é......"
52280-27 = "Claro que eu também quero ser preguiçosa por muito, muito, muito tempo! #n Só que...... rumores tendem a inchar com o tempo, e se você os ignora, é muito comum que a situação saia do controle."
52280-28 = "Depois de um incidente tão grande, as pessoas que adoram boatos começam a me bombardear com perguntas."
52280-29 = "Por isso estou verificando os documentos de maior prioridade――"
52280-30 = "E! U! M! Definitivamente! Não estou fazendo isso porque gosto de trabalhar! Eu juro!"
52280-31 = "[s3] \"E, entendi......\"\n[s4] \"Fico feliz em ver que você voltou ao seu estado normal.\""
52280-34 = "Como é uma boa oportunidade, vou informar sobre o caso de maior prioridade......"
52280-35 = "......O 'Festival Waraku' terminou em sucesso e com segurança!"
52280-39 = "[ns] \"......Esse era o mais importante?\""
52280-40 = "Claro que sim. Não é sempre que você tem a chance de ver a fofa, fofa apresentação da Chise-nyan ao vivo, sabia?"
52280-41 = "E parece que a nova música apresentada desta vez está sendo um sucesso nas redes sociais."
52280-42 = "A Kaho até veio me dizer com um olhar sério que, aproveitando a chance, deveria fazer a estreia oficial dela como ídolo......!"
52280-43 = "Ela ficou sozinha segurando a cabeça e dizendo: 'Se a Chise-chan ficar muito ocupada, o tempo que podemos passar juntas vai diminuir......!'"
52280-44 = "[s] \"Falando nisso, quero te perguntar sobre o festival......\""
52280-45 = "Sim, por favor."
52280-46 = "[s5] \"Logo após o início do Festival Waraku, o poder do Hitotsume enfraqueceu, não foi?\"\n[s6] \"Então, isso significa que os festivais de Hyakkiyako eram, na verdade, rituais para afastar a Hyakumonogatari?\""
52280-52 = "De jeito nenhum~"
52280-53 = "Isso foi apenas um blefe para abalar a Azami-san. #n No fim das contas, um festival é apenas um festival."
52280-54 = "Dizem que, antigamente, as origens dos festivais eram rituais para afastar calamidades e orar aos céus por felicidade...... mas hoje em dia, quase ninguém se lembra ou tem consciência disso."
52280-55 = "......Mas, se o festival, que foi tão difícil de preparar, fosse cancelado, haveria pessoas tristes, não é?"
52280-56 = "Doce para quem está triste, castigo para quem está fazendo birra."
52280-57 = "Antes do princípio do Yin e Yang, é um princípio simples da vida."
52280-58 = "[s7] \"Não acredito que aquilo era mentira......\"\n[s8] \"Foi bom que o Clube das Flores, Pássaros, Vento e Lua acreditou.\""
52280-64 = "Ah, sim, lembrei de algo sobre o Clube das Flores, Pássaros, Vento e Lua: é sobre o caso da Azami Habu, da Filial Ebisu......"
52280-65 = "Como a Filial Ebisu era uma existência da qual eu só sabia através de cartas, desta vez enviei alunos para investigar a situação real......"
52280-66 = "......O Comitê de Autonomia da Filial Ebisu estava vazio há décadas."
52280-67 = "Claro, não há moradores que se lembrem da Azami-san―― #n e nunca houve ninguém que recebesse os documentos oficiais que enviamos até hoje......"
52280-68 = "[s] \"Ou seja......\""
52280-69 = "......Sim."
52280-73 = "De agora em diante, seremos responsáveis também pela administração do Distrito Autônomo de Ebisu......"
52280-77 = "[ns] \"Você está preocupada com isso!?\""
52280-78 = "Claro! Surgiu um buraco no trabalho que estava sendo feito por conta própria, entende?"
52280-79 = "Acho imperdoável enganar tantos alunos e obter lucros, mas...... #n para não chamar atenção, eles devem ter feito o trabalho corretamente......"
52280-80 = "Haa...... mais trabalho administrativo acumulado...... dias de paz ficando mais distantes......"
52280-81 = "[s] \"Você não conseguiu rastrear mais os passos do Clube das Flores, Pássaros, Vento e Lua?\""
52280-82 = "Sim. Como da última vez, após o encerramento do incidente, eles desapareceram como fumaça."
52280-83 = "A presidente Kokuriko, a Azami-san...... e até a Shuro-san, que deveria estar conosco."
52280-84 = "Naquela hora, o rosto da Shuro-san quando ela percebeu o que tinha feito...... #n eu queria ter tirado uma foto...... que pena."
52280-85 = "[s] \"Você é malvada......\""
52280-86 = "Nyahaha...... parece que a conta no 'Vamos Escrever Novels!' ainda está ativa, talvez ela poste de novo se estiver com vontade?"
52280-87 = "Ah, e não é mentira que eu lia o romance da Shuro-san! #n É um bom passatempo, então estou ansiosa por uma nova obra."
52280-88 = "......Bem, o desenvolvimento é uma bagunça, mas."
52280-89 = "[s] \"Você está sendo crítica desta vez?\""
52280-90 = "Nyaha...... autores são pessoas sensíveis que têm o coração partido só de tropeçar um pouco na porta."
52280-91 = "É por isso que, se você elogiá-los bem, talvez a próxima história seja brilhante e emocionante...... quem sabe?"
52280-92 = "[s] \"Verdade, espero que a próxima história seja pacífica.\""
52280-97 = "[ns] \"E quanto à Ayame......?\""
52280-98 = "Ah, a presidente Ayame."
52280-102 = "Por que não pergunta aos amigos dela em vez de a mim?"
52280-104 = "Rua do Local do Festival, Hyakkiyako"
52280-106 = "(As ruas de Hyakkiyako recuperaram sua agitação de sempre)"
52280-107 = "(Cidadãos aproveitando o festival, estudantes preparando o evento......)"
52280-108 = "(Como se o que aconteceu outro dia fosse apenas um sonho)"
52280-115 = "Ah, Mestre!"
52280-119 = "Sensei, que bom que você está bem!"
52280-120 = "Não conseguimos entrar em contato desde o fim do festival e ficamos preocupadas!"
52280-121 = "[s9] \"Desculpe, eu fui chamado em vários lugares depois daquilo......\"\n[s10] \"Demorei para entrar em contato porque estava organizando as coisas.\""
52280-124 = "Não, não! Izuna ficou aliviada em saber que o Mestre está bem!"
52280-125 = "Para onde o Sensei estava indo? #n A sala do Clube Yin-Yang fica naquela direção......"
52280-126 = "[s11] \"Eu estava indo para a sala do Comitê da Hyakkaryouran.\"\n[s12] \"Estava preocupado com Ayame e Nagusa.\""
52280-129 = "Ayame...... você quer dizer aquela presidente da Hyakkaryouran, certo?"
52280-130 = "Ouvi dizer que após o incidente, ela retornaria oficialmente para a Hyakkaryouran......"
52280-135 = "O Clube Yin-Yang e a Hyakkaryouran anunciaram formalmente que 'a presidente Ayame que apareceu naquela hora foi uma criação do Clube das Flores, Pássaros, Vento e Lua'."
52280-136 = "Eu também...... não quero pensar que foi obra da presidente Ayame."
52280-137 = "O comportamento da presidente Ayame naquela época parecia tão autêntico......"
52280-138 = "O Sensei sabe de algo?"
52280-139 = "[s] \"Isso é......\""
52280-141 = "N, não tem como ser a verdadeira!"
52280-142 = "......Izuna?"
52280-143 = "Eu também já fui enganada por adultos malvados e tentei atrapalhar um festival...... mas foi porque eu não tinha amigos para conversar sinceramente sobre isso."
52280-144 = "Se ela tivesse amigos por perto para dizer 'isso está errado', ela teria sido alertada antes de se desviar do caminho."
52280-145 = "Ouvi dizer que Ayame-dono é uma velha amiga de Nagusa-dono."
52280-146 = "Enquanto Nagusa-dono estiver ao lado dela...... #n é impossível que Ayame-dono faça algo ruim!"
52280-147 = "E, exatamente! Ouvi dizer que a presidente Ayame tem um senso de justiça e é gentil com todos."
52280-148 = "Com certeza é apenas uma impressão errada."
52280-150 = "Entendi...... então talvez tenha sido apenas uma impressão."
52280-151 = "[s] \"Sim...... com certeza foi.\""
52280-155 = "[ns13] \"Falando nisso, parece que algo estranho aconteceu com o Pesquisa Ninjutsu também,\"\n[ns14] \"está tudo bem agora?\""
52280-158 = "Ah, é verdade! Sensei, ouça só!"
52280-159 = "Quando os monstros nos atacaram no palco do Festival Waraku, de repente senti um poder incrível surgir!"
52280-160 = "Será que aquilo também foi algum tipo de feitiçaria!?"
52280-161 = "E, exatamente! Foi como se estivéssemos usando ninjutsu de verdade, conseguimos correr em uma velocidade incrível!"
52280-162 = "Naquela hora, talvez até tivéssemos conseguido correr sobre portas de papel úmidas."
52280-163 = "Sobre portas de papel úmidas――"
52280-164 = "É aquela cena famosa de 'O Grupo dos 77 Ninjas Solitários'! #n Izuna sempre quis tentar fazer isso pelo menos uma vez!"
52280-168 = "[ns] \"Michiru...... você está triste por ter perdido aquele poder?\""
52280-169 = "Não?"
52280-170 = "Ah...... mas se eu pudesse usar aquele poder, talvez pudesse fazer uma nova edição no canal da Michiru-cchi."
52280-171 = "Mas mesmo que tenhamos tido um poder misterioso como aquele, #n não acho que isso faria todos notarem o charme dos ninjas."
52280-172 = "O valor de um ninja não vem de poderes ou técnicas poderosas. Vem dos laços."
52280-173 = "'Em vez de ter um poder único e incomparável, prefiro ser uma ninja comum cercada de muitos amigos!' dizia......"
52280-177 = "Foi isso que disseram em 'O Grupo dos 77 Ninjas Solitários'!"
52280-178 = "Izuna também concorda!"
52280-179 = "E, eu também......!"
52280-181 = "[ns] \"Concordo, eu também.\""
52280-183 = "[ns15] \"Que tal assistirmos ao filme todos juntos da próxima vez?\"\n[ns16] \"Comprei alto-falantes incríveis para a sala audiovisual da Schale!\""
52280-186 = "Ooooh! Pode ser até agora!"
52280-187 = "M, mas, chefe. Temos a missão de limpeza do Festival Waraku, então......!"
52280-188 = "Ah, é verdade...... então fica para a próxima!"
52280-189 = "Na próxima, iremos incomodá-lo, Mestre!"
52280-190 = "C, cuidado...... Sensei!"
52280-194 = "Em frente à sala do comitê da Hyakkaryouran / Campo de treinamento"
52280-198 = "Espere, Renge. Isso aí é uma hortênsia."
52280-199 = "Camélias são flores de inverno, se plantarmos hortênsias de verão no mesmo canteiro, perderá a harmonia......"
52280-200 = "Eu sei disso. Mas se plantarmos lado a lado, poderemos ver flores o ano todo, o que é uma vantagem."
52280-201 = "......Dito isso, desça daí e venha ajudar!"
52280-202 = "Não. Alguém precisa supervisionar. Você não consegue ver como as árvores crescem se estiver dentro da floresta, consegue?"
52280-203 = "......É só porque você não quer sujar as mãos."
52280-207 = "Não é nada disso......"
52280-208 = "Então vamos trocar de lugar! Isso é injusto――"
52280-215 = "Ora, ora, Sensei!"
52280-216 = "......Bem-vindo, Sensei."
52280-218 = "[ns17] \"Todos estão bem?\"\n[ns18] \"Será que atrapalhei vocês......?\""
52280-221 = "Tudo bem. Não é trabalho do comitê."
52280-222 = "Estamos plantando flores com as senpais!"
52280-223 = "[s] \"Flores?\""
52280-224 = "Sim. Parece que depois do Festival Waraku, teremos um festival para apreciar muitas flores."
52280-225 = "Como nos deram as sementes que sobraram do preparo――"
52280-226 = "Sugeri que plantássemos em frente ao campo de treinamento e cuidássemos juntos!"
52280-227 = "Ver as flores brotando a cada estação será um prazer a partir de agora no campo de treinamento!"
52280-228 = "Bom, durante o treino eu nem tenho tempo de olhar em volta......"
52280-232 = "Yukari, pode pegar a terra lá em cima para mim?"
52280-233 = "É pesada, então cuidado."
52280-234 = "Sim!"
52280-238 = "[ns] \"O seu braço já está bem?\""
52280-239 = "Sim, voltou ao normal. #n Meu braço direito...... e a Ayame também."
52280-240 = "Tudo o que deixamos para trás naquele dia no campo de neve."
52280-241 = "Mas a Ayame...... ela continua dormindo desde aquele dia."
52280-242 = "Não parece haver nada de errado com o corpo dela, mas...... ela não tenta acordar."
52280-243 = "[s] \"Será que é um efeito colateral por ter caído no Crepúsculo?\""
52280-244 = "Segundo os médicos, parece ser por razões psicológicas."
52280-245 = "Dizem que o corpo dela se recusa a acordar."
52280-246 = "Eu pretendia dar um sermão nela pelo tanto que ela nos preocupou...... mas ela só dorme desde aquele dia."
52280-247 = "Pensei em acordá-la à força, mas a Nagusa-senpai me impediu."
52280-248 = "Não é como se alguém estivesse fazendo ela dormir."
52280-249 = "Não sei o que a Ayame está pensando, ou com que tipo de sonho ela está sonhando."
52280-250 = "......Mas posso ficar ao lado dela esperando."
52280-255 = "Senpai, que tipo de semente é esta?"
52280-256 = "Isso é...... uma cerejeira."
52280-257 = "Como cresce muito, é melhor deixar uma distância das outras sementes."
52280-258 = "Oh, então uma nova cerejeira vai florescer no campo de treinamento? Estou ansiosa!"
52280-259 = "Mas demora bastante para florescer, não demora?"
52280-260 = "Mesmo que plantemos agora, quando será que......"
52280-264 = "......Está tudo bem."
52280-265 = "Mesmo que nós não possamos ver, alguém em um futuro distante verá as flores."
52280-268 = "As senpais do passado...... com certeza pensavam o mesmo."
52280-277 = "Algum dia, cem flores florescerão aqui também."
52280-278 = "Até esse dia, estarei esperando."
52280-283 = "Até o dia em que você acordar――"

