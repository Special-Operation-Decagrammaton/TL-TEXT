[translation]
52280-1 = "Episódio 28; Esperando juntos pelo desabrochar"
52280-2 = "Ala hospitalar"
52280-5 = "Sim, sim~ pode entrar."
52280-9 = "Ora, Sensei [USERNAME]?"
52280-10 = "Por que está aqui...?"
52280-11 = "[s1] \"Ouvi dizer que você foi internada, então vim te visitar.\"\n[s2] \"Como você está se sentindo?\""
52280-14 = "Nya-ha... peço perdão por ter causado preocupação desnecessária."
52280-15 = "Como pode ver, estou saudável como sempre. #nOs ferimentos já estão quase todos curados."
52280-16 = "É só que, a Kaho é tão teimosa... ela insistiu: \"Mesmo que sejam ferimentos leves, se foram causados pelos Cem Contos, você precisa de repouso absoluto!\""
52280-17 = "Fui internada para tratamento e exames. Realmente não é nada grave, então não se preocupe."
52280-18 = "[s] \"Fico mais aliviado em saber disso.\""
52280-19 = "Bem, para ser sincera... sinto-me um pouco culpada por ser a única internada."
52280-20 = "O pessoal da Hyakkiyako que enfrentou a batalha mortal e todos os outros já voltaram à rotina... e eu sou a única aqui relaxando, sabe...?"
52280-21 = "Bem, já que é uma oportunidade rara de me mandarem \"tirar folga do trabalho\", por que não aproveitar? #nQuero passar o tempo com calma... fufu."
52280-22 = "[s] \"Para quem quer relaxar, tem uma pilha de documentos ao lado da cama...\""
52280-26 = "Ah, bem, isso é..."
52280-27 = "Claro que eu adoraria ficar aqui preguiçando o tempo todo! #nMas... é comum que boatos cresçam com o tempo e, se deixados de lado, tornem-se situações incontroláveis."
52280-28 = "Depois de um incidente tão grande, as pessoas que adoram fofocas não param de me bombardear com perguntas."
52280-29 = "Por isso, estou revisando os documentos de maior prioridade, mas..."
52280-30 = "Eu! Não! Estou fazendo isso porque gosto de trabalhar! De jeito nenhum!"
52280-31 = "[s3] \"Tá, tá, entendi...\"\n[s4] \"Fico feliz em ver que você voltou ao seu eu de sempre.\""
52280-34 = "Já que é uma boa oportunidade, vou te dar um relatório sobre o assunto mais importante..."
52280-35 = "...O \"Festival Waraku\" foi um grande sucesso e encerrou-se sem problemas!"
52280-39 = "[ns] \"...Era esse o assunto mais importante?\""
52280-40 = "Com certeza. Não é sempre que se tem a chance de ver a apresentação fofa da Chise-nyan ao vivo, não é?"
52280-41 = "Além disso, dizem que a nova música apresentada desta vez está bombando nas redes sociais."
52280-42 = "A Kaho até disse com uma expressão séria que essa seria uma boa chance para ela estrear oficialmente como idol...! #nQuem diria."
52280-43 = "Embora ela tenha ficado segurando a cabeça sozinha, dizendo: \"Se a Chise-chan ficar ocupada, o tempo que passamos juntas vai diminuir...!\""
52280-44 = "[s] \"Falando nisso, queria te perguntar uma coisa sobre o festival...\""
52280-45 = "Sim, pode perguntar."
52280-46 = "[s5] \"Logo que o Festival Waraku começou, o poder do Hitotsume enfraqueceu, não foi?\"\n[s6] \"Então o festival de Hyakkiyako era mesmo um ritual para afastar os Cem Contos?\""
52280-52 = "Quem sabe~?"
52280-53 = "Foi só uma desculpa para deixar a Azami agitada. #nNo fim das contas, um festival é apenas um festival."
52280-54 = "Dizem que, antigamente, a origem dos festivais era afastar calamidades e rezar aos céus por felicidade... mas hoje em dia, ninguém mais se lembra disso ou leva isso em consideração."
52280-55 = "...Mas, se o festival fosse cancelado, muitas pessoas ficariam tristes, não é?"
52280-56 = "Doces para as crianças tristes, e castigos para as crianças birrentas."
52280-57 = "Antes de ser uma questão de Yin e Yang, é uma lógica simples da vida."
52280-58 = "[s7] \"Não acredito que aquilo era mentira...\"\n[s8] \"Ainda bem que o Clube Kachou Fuugetsu acreditou.\""
52280-64 = "Ah, sim. Falando no Clube Kachou Fuugetsu, lembrei-me do caso da Azami Habu, da filial de Ebisu..."
52280-65 = "Como a filial de Ebisu era algo que eu só conhecia por cartas, enviei alunos para investigar a situação real..."
52280-66 = "...O comitê autônomo da filial de Ebisu estava vazio há décadas."
52280-67 = "Não apenas os moradores que se lembravam da Azami... #ncomo ninguém nunca recebeu os documentos oficiais que enviamos até hoje..."
52280-68 = "[s] \"Isso significa que...\""
52280-69 = "...Sim."
52280-73 = "A partir de agora, a administração do distrito autônomo de Ebisu também ficará sob nossa responsabilidade..."
52280-77 = "[ns] \"É com isso que você está preocupada!?\""
52280-78 = "Claro! O trabalho que estava sendo feito sozinho agora tem um buraco, entende?"
52280-79 = "Parece que o Clube Kachou Fuugetsu usou o nome do comitê autônomo para esconder sua verdadeira identidade."
52280-80 = "É imperdoável que tenham enganado tantos alunos para obter lucro, mas... #npara não chamarem atenção, eles devem ter feito o trabalho corretamente..."
52280-81 = "Ah... mais trabalho administrativo... meus dias de paz estão ficando cada vez mais distantes..."
52280-82 = "[s] \"Não conseguiram rastrear mais os passos do Clube de Kacho Fugetsu?\""
52280-83 = "Sim. Assim como da última vez, após o incidente terminar, eles desapareceram como fumaça."
52280-84 = "A Presidente Kokuriko, a Azami... e até a Shuro, que deveria estar conosco."
52280-85 = "O rosto da Shuro quando percebeu o que tinha feito naquele momento...#nEu queria ter tirado uma foto, mas... que pena."
52280-86 = "[s] \"Você é tão maldosa...\""
52280-87 = "Nya-ha... A conta do \"Vamos escrever um romance!\" parece ainda estar ativa, então talvez ela publique algo de novo se estiver com vontade, não acha?"
52280-88 = "Ah, não é mentira que eu lia os romances da Shuro, viu?#nÉ um bom passatempo, então estou ansiosa pelo próximo trabalho."
52280-89 = "...Bem, o desenvolvimento é uma bagunça, claro."
52280-90 = "[s] \"Hoje você está com uma avaliação bem ácida, hein?\""
52280-91 = "Nya-ha... Afinal, escritores são pessoas sensíveis que perdem o ânimo só de tropeçar na porta."
52280-92 = "É por isso que, se soubermos como acalmá-los, talvez o próximo trabalho seja uma história alegre e emocionante... quem sabe?"
52280-93 = "[s] \"É verdade, espero que a próxima história seja pacífica.\""
52280-97 = "[ns] \"E a Ayame desde então...?\""
52280-98 = "Ah, a Presidente Ayame?"
52280-102 = "Por que não pergunta aos amigos dela em vez de a mim?"
52280-104 = "Hyakkiyako - Rua do Local do Festival"
52280-106 = "(As ruas de Hyakkiyako recuperaram sua agitação habitual)"
52280-107 = "(Cidadãos aproveitando o festival, estudantes preparando as festividades...)"
52280-108 = "(Como se o incidente de dias atrás tivesse sido apenas um sonho)"
52280-115 = "Ah, Mestre!"
52280-119 = "Sensei, que bom que está bem!"
52280-120 = "Não conseguimos contato depois que o festival acabou e estávamos preocupados!"
52280-121 = "[s9] \"Desculpe, fui chamado em vários lugares depois disso...\"\n[s10] \"Demorei para entrar em contato porque estava organizando algumas coisas.\""
52280-124 = "Não, não! Saber que o Mestre está bem já é o suficiente para a Izuna ficar tranquila!"
52280-125 = "Para onde o Sensei estava indo?#nA sala do Clube Yin-Yang é por ali, mas..."
52280-126 = "[s11] \"Estava indo para a sala do comitê da Hyakka Ryoran.\"\n[s12] \"Estou preocupado com a situação da Ayame e da Nagusa.\""
52280-129 = "Ayame... a presidente da Hyakka Ryoran, certo?"
52280-130 = "Ouvi dizer que, após o fim do incidente, ela retornaria oficialmente para a Hyakka Ryoran..."
52280-135 = "O Clube Yin-Yang e a Hyakka Ryoran anunciaram oficialmente que \"a Presidente Ayame que apareceu naquela época foi uma criação do Clube de Kacho Fugetsu\"."
52280-136 = "Eu também... não quero acreditar que foi obra da Presidente Ayame."
52280-137 = "Mas o comportamento da Presidente Ayame naquela hora parecia tão real..."
52280-138 = "Sensei, você sabe de algo?"
52280-139 = "[s] \"Isso é...\""
52280-141 = "N-não pode ser a verdadeira!"
52280-142 = "...Izuna?"
52280-143 = "A Izuna também já foi enganada por adultos maldosos e tentou atrapalhar o festival... mas isso foi porque eu não tinha amigos com quem pudesse conversar abertamente."
52280-144 = "Se houvesse amigos por perto para me repreender e dizer \"isso está errado\"... eles teriam me avisado antes que eu me desviasse do caminho."
52280-145 = "Ouvi dizer que a Ayame é uma velha amiga da Nagusa."
52280-146 = "Enquanto a Nagusa estiver ao lado dela...#na Ayame não faria nada de ruim!"
52280-147 = "I-isso mesmo! Ouvi dizer que a Presidente Ayame tem um forte senso de justiça e é gentil com todos."
52280-148 = "Com certeza foi só impressão nossa."
52280-150 = "Entendo... então deve ter sido só impressão mesmo."
52280-151 = "[s] \"Sim... com certeza foi.\""
52280-155 = "[ns13] \"Falando nisso, parece que coisas estranhas aconteceram com o Clube de Pesquisa Ninjutsu também,\"\n[ns14] \"está tudo bem agora?\""
52280-158 = "Ah, é verdade! Sensei, escuta só!"
52280-159 = "Quando os monstros atacaram no palco do Festival Waraku, de repente um poder incrível surgiu em mim!"
52280-160 = "Será que aquilo também foi algum tipo de feitiçaria!?"
52280-161 = "I-isso mesmo! Foi como se estivéssemos usando ninjutsu de verdade, conseguimos correr em uma velocidade incrível!"
52280-162 = "Naquela hora, talvez até desse para correr sobre portas de papel molhadas."
52280-163 = "Correr sobre portas de papel molhadas—"
52280-164 = "Aquela é a cena clássica de 'Os 77 Ninjas Solitários Errantes', não é!? #nEu, Izuna, também sempre quis tentar fazer isso!"
52280-168 = "[ns] \"Michiru... você está triste por ter perdido aquele poder?\""
52280-169 = "Eu? Não?"
52280-170 = "Ah... mas, se eu usasse aquele poder, talvez pudesse ter criado novos efeitos para o Canal da Michiru-chi."
52280-171 = "Mas, só porque existia um poder tão misterioso assim, não acho que #ntodos iriam notar o charme dos ninjas."
52280-172 = "O valor de um ninja não vem de poderes ou técnicas poderosas. Ele nasce dos laços."
52280-173 = "\"Em vez de ter um poder único, prefiro ser uma ninja comum cercada por muitos amigos!\"... foi o que disseram..."
52280-177 = "Disseram isso em 'Os 77 Ninjas Solitários Errantes'!"
52280-178 = "Eu, Izuna, também penso assim!"
52280-179 = "E-eu também...!"
52280-181 = "[ns] \"Pois é, eu também.\""
52280-183 = "[ns15] \"Que tal assistirmos a esse filme juntos qualquer dia?\"\n[ns16] \"Comprei um sistema de som incrível para a sala audiovisual do Schale!\""
52280-186 = "Opa! Pode ser até agora mesmo!"
52280-187 = "M-mas, Chefe. Nós temos a missão de limpeza do Festival Waraku, então...!"
52280-188 = "Ah, é verdade... então fica para a próxima!"
52280-189 = "Irei incomodá-lo na próxima vez, meu mestre!"
52280-190 = "C-cuidado no caminho... Sensei!"
52280-194 = "Em frente à sala do comitê Hyakkiyako - Campo de Treinamento"
52280-198 = "Espere, Renge. Isso é uma hortênsia, não é?"
52280-199 = "Camélias são flores de inverno, se plantarmos hortênsias de verão no mesmo canteiro, a harmonia visual vai..."
52280-200 = "Eu sei disso. Mas pensei que seria vantajoso ver flores o ano todo se plantássemos lado a lado."
52280-201 = "...Quer saber, desce logo daí e vem ajudar!"
52280-202 = "Não. Alguém precisa supervisionar. Você não consegue ver como as árvores crescem se estiver dentro da floresta, certo?"
52280-203 = "...Você só não quer sujar as mãos, né."
52280-207 = "Não é nada disso..."
52280-208 = "Então troca de lugar comigo! Isso é injusto—"
52280-215 = "Ora, ora, Sensei!"
52280-216 = "...Bem-vindo, Sensei."
52280-218 = "[ns17] \"Como estão todos?\"\n[ns18] \"Será que eu atrapalhei alguma coisa...?\""
52280-221 = "Está tudo bem. Não é um trabalho do comitê."
52280-222 = "Estamos plantando flores com as veteranas!"
52280-223 = "[s] \"Flores?\""
52280-224 = "Sim. Parece que, depois do Festival Waraku, vão fazer um festival para apreciar muitas flores."
52280-225 = "Conseguimos as sementes que sobraram da preparação, então—"
52280-226 = "Eu sugeri que plantássemos em frente ao campo de treinamento para cuidarmos juntos!"
52280-227 = "Ver as flores brotando a cada estação será um novo prazer aqui no campo de treinamento!"
52280-228 = "Bem, durante o treino a gente nem tem tempo de olhar em volta..."
52280-232 = "Yukari, pode pegar a terra que está lá em cima?"
52280-233 = "É pesada, então tome cuidado."
52280-234 = "Sim!"
52280-238 = "[ns] \"Seu braço já está bem?\""
52280-239 = "Sim, voltou ao normal. #nO braço direito... e a Ayame também."
52280-240 = "Tudo o que deixamos para trás naquele campo de neve, tudo mesmo."
52280-241 = "Mas a Ayame... ela continua dormindo desde aquele dia."
52280-242 = "Não parece haver nada de errado com o corpo dela, mas... ela não tenta acordar."
52280-243 = "[s] \"Será que é algum tipo de sequela por ter caído no crepúsculo?\""
52280-244 = "Segundo o médico, parece ser algo mais psicológico."
52280-245 = "Dizem que o corpo dela está se recusando a despertar."
52280-246 = "Eu pretendia dar uma bronca nela por ter me preocupado tanto... mas ela só vive dormindo desde aquele dia."
52280-247 = "Pensei em acordá-la na marra, mas a veterana Nagusa me impediu."
52280-248 = "Não é como se alguém estivesse te fazendo dormir, sabe."
52280-249 = "Não sei o que Ayame está pensando, nem que tipo de sonho ela está tendo."
52280-250 = "……Mas, posso ficar aqui ao seu lado esperando."
52280-255 = "Senpai, que tipo de semente é esta?"
52280-256 = "Esta é…… uma de cerejeira."
52280-257 = "Ela cresce bastante, então é melhor deixá-la longe das outras sementes."
52280-258 = "Ora, então uma nova cerejeira florescerá no campo de treinamento? Estou ansiosa!"
52280-259 = "Mas vai demorar um bom tempo até florescer, não vai?"
52280-260 = "Mesmo que a gente plante agora, quem sabe quando será……"
52280-264 = "……Está tudo bem."
52280-265 = "Mesmo que nós não possamos ver, alguém num futuro distante verá as flores."
52280-268 = "Os senpais do passado também…… com certeza pensavam assim."
52280-277 = "Um dia, cem flores desabrocharão aqui também."
52280-278 = "Até esse dia chegar, estarei esperando."
52280-283 = "Até o dia em que você acordar――"
