[translation]
52280-1 = "第28話;ともに芽吹きを待ち侘びて"
52280-2 = "病院内の病棟"
52280-5 = "はいはい～どうぞ。"
52280-9 = "あら、[USERNAME]先生？"
52280-10 = "なぜこちらに……？"
52280-11 = "[s1] \"入院したって聞いたから、お見舞いにね。\"\n[s2] \"具合はどう？\""
52280-14 = "にゃは……余計な心配をかけたようで、面目ありませんねぇ。"
52280-15 = "ご覧の通り、健康そのものですよ。#n怪我もほとんど治っております。"
52280-16 = "ただ、「軽傷であっても、百物語から受けた傷ならば絶対安静です！」と、カホったら頑固で……。"
52280-17 = "治療と検査のために入院したのです。本当に大きな怪我ではありませんので、ご安心を。"
52280-18 = "[s] \"それならいいんだけど。\""
52280-19 = "まあ、正直なところ……私だけ入院しているのは、少々申し訳ないといいますか。"
52280-20 = "死闘に臨んだ百花繚乱や、他のみなさんはすでに日常に戻ったというのに……私だけがのんびりしているのは、ねぇ……？"
52280-21 = "まあ、せっかくの「仕事を休め」と言われる貴重な機会ですし？#nのんびり過ごしたいものです……ふふっ。"
52280-22 = "[s] \"それにしては、ベッドの横に山積みの書類が……。\""
52280-26 = "ええっと、これはですね……。"
52280-27 = "もちろん、私もずっとずうっとずう～っと怠けていたいんですよ？#nただ……噂は、時と共に肥大化し、放っておけば手がつけられない事態になっている、というのもよくある話でして。"
52280-28 = "これだけ大きな事件の後ですから、噂好きの方々が質問攻めにしてくるわけです。"
52280-29 = "というわけで、優先度の高い書類から確認しているのですが――"
52280-30 = "絶！対！に！仕事が好きでこうしているわけでは！ないですから！"
52280-31 = "[s3] \"わ、わかったよ……。\"\n[s4] \"いつものニヤに戻ったみたいでよかった。\""
52280-34 = "ちょうどいい機会ですので、最重要案件についてご報告しますと……。"
52280-35 = "……「和楽まつり」は大盛況のうちに、無事幕を閉じました！"
52280-39 = "[ns] \"……最重要だったんだ。\""
52280-40 = "もちろんですとも。チセにゃんの可愛い可愛い公演を直で見られる機会なんて、そうはありませんよ？"
52280-41 = "しかも、今回発表した新曲が、SNSで話題になっているんだとか。"
52280-42 = "カホなんかは、これを機に正式にアイドルデビューも……！#nなあんて、真剣な表情で言ってきたものです。"
52280-43 = "「チセちゃんが忙しくなると、そばに居られる時間が減ってしまいます……！」と、一人で頭を抱えてましたけど。"
52280-44 = "[s] \"そういえば、お祭りのことで聞きたいんだけど……。\""
52280-45 = "ええ、どうぞ。"
52280-46 = "[s5] \"和楽まつりが始まってすぐ、ヒトツメの力が弱まったよね？\"\n[s6] \"やっぱり百鬼夜行の祭りは百物語を追い払う[ruby=・]祭[/ruby][ruby=・]儀[/ruby]だったってこと？\""
52280-52 = "まさか～？"
52280-53 = "アザミさんを動揺させるための出まかせですよ。#n所詮、お祭りはお祭りです。"
52280-54 = "遠い昔、お祭りの起源は災いを祓い、幸せを天に祈願する祭事だったと伝えられてはおりますが……今となっては、これを覚えている方も、意識している方もおりません。"
52280-55 = "……でも、せっかくのお祭りが中止になっては、悲しむ方々がいるでしょう？"
52280-56 = "悲しむ子には飴を、駄々っ子にはお仕置きを。"
52280-57 = "陰陽の理以前に、シンプルな人生の理ですよ。"
52280-58 = "[s7] \"まさかあれが嘘だったとは……。\"\n[s8] \"花鳥風月部が信じこんでよかった。\""
52280-64 = "ああ、そうそう。花鳥風月部と聞いて思い出したのですが、エビス分校の[ruby=はぶ]土生[/ruby]アザミさんの件です……。"
52280-65 = "エビス分校は私も便りでしか知らない存在だったので、今回生徒を派遣して実態を調査してみたところ……。"
52280-66 = "……エビス分校の自治委員会は、数十年も前からもぬけの殻でした。"
52280-67 = "アザミさんを覚えている住民はもちろん――#n今までこちらが送った公文書を受け取った方もおらず……。"
52280-68 = "[s] \"つまりそれって……。\""
52280-69 = "……はい。"
52280-73 = "これからはエビス自治区の行政も、私たちが担当することに……。"
52280-77 = "[ns] \"そっちの心配！？\""
52280-78 = "もちろんです！今まで勝手に回っていた仕事に、穴ができたんですよ？"
52280-79 = "どうやら花鳥風月部は、自治委員会の名を借りて素性を隠していたようですね。"
52280-80 = "何人もの生徒を騙し、利益を得ていたのは許しがたい行為ですが……。#n悪目立ちしないよう、仕事自体はちゃんとやってくれていたはず……。 "
52280-81 = "はぁん……増える事務作業……遠のく安らかな日々……。"
52280-82 = "[s] \"それ以上、花鳥風月部の足跡は辿れなかったの？\""
52280-83 = "はい。前回同様、事件が終息した後はまるで煙のように姿を消してしまいました。"
52280-84 = "コクリコ部長も、アザミさんも……私たちと一緒にいたはずのシュロさんまで。"
52280-85 = "あの時、自分のしたことに気がついたシュロさんの顔……。#n写真に撮っておきたかったのですが……残念です。"
52280-86 = "[s] \"もう意地悪なんだから……。\""
52280-87 = "にゃはは……「小説、書こうよ！」のアカウントはまだ残っているようですし、気が向いたらまた掲載するのではないでしょうか？"
52280-88 = "あ、シュロさんの小説を読んでいたのは、嘘じゃないですよ？#nいい暇つぶしになるから、新作も楽しみです。"
52280-89 = "……まぁ、展開はめちゃくちゃなわけですが。"
52280-90 = "[s] \"今回は辛口な評価だね？\""
52280-91 = "にゃは……なにせ作家というのは、戸口でちょっと躓いただけでも心が折れる、繊細な方々。"
52280-92 = "だからこそ、うまくなだめれば、次回作は明るく痛快な物語になる……なんてことも？"
52280-93 = "[s] \"そうだね、次の話はどうか平和でありますように。\""
52280-97 = "[ns] \"あれからアヤメは……？\""
52280-98 = "ああ、アヤメ委員長ですか。"
52280-102 = "私より、友人のみなさんに聞いてみてはどうです？"
52280-104 = "百鬼夜行・お祭り会場通り"
52280-106 = "（百鬼夜行の街中は、いつもの賑やかさを取り戻していた）"
52280-107 = "（お祭りを楽しむ市民、お祭りを準備している生徒たち……）"
52280-108 = "（まるで、先日の一件が夢物語だったかのように）"
52280-115 = "あっ、主殿！"
52280-119 = "先生殿、無事でよかった！"
52280-120 = "お祭りが終わってから連絡が取れず、心配しておりました！"
52280-121 = "[s9] \"ごめんね、その後あちこちに呼ばれてて……。\"\n[s10] \"いろいろ整理してたら連絡が遅くなっちゃった。\""
52280-124 = "いえいえ！こうして主殿がご無事であることがわかり、イズナは安心できましたから！"
52280-125 = "先生殿はどこに向かってたの？#n陰陽部の部室はあっちだけど……。"
52280-126 = "[s11] \"百花繚乱の委員会室に向かってたところ。\"\n[s12] \"アヤメとナグサの様子が気になってね。\""
52280-129 = "アヤメ……百花繚乱の、あの委員長の方ですよね？"
52280-130 = "事件が終わって、百花繚乱に正式に復帰すると聞いたのですが……。"
52280-135 = "陰陽部と百花繚乱は、「あの時姿を現したアヤメ委員長は、花鳥風月部が作り出したもの」だと、正式に発表したよ。"
52280-136 = "私も……アヤメ委員長の仕業だと思いたくないけど。"
52280-137 = "あの時のアヤメ委員長の振る舞いは、真に迫ってたような……。"
52280-138 = "先生殿は、何か知ってる？"
52280-139 = "[s] \"それは……。\""
52280-141 = "ほ、本物なはずありません！"
52280-142 = "……イズナ？"
52280-143 = "イズナも、悪い大人に騙されてお祭りを邪魔しようとしたことがありますが……それは、向き合って話し合える仲間がいなかったからです。"
52280-144 = "ちゃんと「間違ってるよ」って叱ってくれる友達がそばにいれば……道を踏み外す前に、教えてくれたはずです。"
52280-145 = "アヤメ殿は、ナグサ殿の古い友達と聞きました。"
52280-146 = "ナグサ殿がそばにいる限り……#nアヤメ殿が悪いことをするはずありません！"
52280-147 = "そ、そうです！アヤメ委員長は正義感があって、誰にでも優しいお方だと聞きますし。"
52280-148 = "きっと気のせいです。"
52280-150 = "そっか……じゃあ、気のせいだったのかな。"
52280-151 = "[s] \"うん……きっとそうだよ。\""
52280-155 = "[ns13] \"そういえば、忍術研究部にも不思議なことが起きたらしいけど、\"\n[ns14] \"今はもう大丈夫なの？\""
52280-158 = "あっ、そうそう！先生殿聞いてよ！"
52280-159 = "和楽まつりの舞台で怪物たちが襲ってきた時、突然すっごい力が湧いてきてさ！"
52280-160 = "あれもなんかの妖術だったのかな！？"
52280-161 = "そ、そうです！本当に忍術を使っているみたいに、すごい速さで走れました！"
52280-162 = "あのときなら、濡れた障子の上も走れたかもね。"
52280-163 = "濡れた障子の上――"
52280-164 = "『彷徨う孤独な忍者77人組』のあの名シーンですね！？#nイズナも一度はやってみたいと思っていました！"
52280-168 = "[ns] \"ミチルは……その力を失って、悲しい？\""
52280-169 = "いや？"
52280-170 = "あ……でも、あの力を使えば、ミチルっちチャンネルで新しい演出ができたかな。"
52280-171 = "でも、そんな得体の知れない力があったからって、#nみんなが忍者の魅力に気づくとは思えないね。"
52280-172 = "忍者の価値は、強力な力でも術でもない。絆から生まれるんだよ。"
52280-173 = "「唯一無二の力を持つよりも、たくさんの友に囲まれた普通の忍者になる！」って……。"
52280-177 = "『彷徨う孤独な忍者77人組』でそう言ってた！"
52280-178 = "イズナもそう思います！"
52280-179 = "わ、私もです……！"
52280-181 = "[ns] \"そうだね、私も。\""
52280-183 = "[ns15] \"今度、みんなでその映画を観よっか？\"\n[ns16] \"シャーレの視聴覚室にすごいスピーカーを買ったからさ！\""
52280-186 = "おーっ！今からでもいいね！"
52280-187 = "で、でも部長。私たちには和楽まつりのお片付け任務がありますので……！"
52280-188 = "あっ、そうだった……じゃあまた今度！"
52280-189 = "今度お邪魔させていただきます、主殿！"
52280-190 = "お、お気をつけて……先生！"
52280-194 = "百花繚乱の委員会室前・稽古場"
52280-198 = "待ってレンゲ。それ、アジサイでしょ。"
52280-199 = "椿は冬の花なのに、同じ花壇に夏のアジサイを植えたら、統一感が……。"
52280-200 = "それくらいアタシも知ってるよ。でも、並べて植えたら年中花を見れて得かなって。"
52280-201 = "……っていうか、降りてきて手伝えよ！"
52280-202 = "ダメ。一人は監督してないと。森の中から木の生え方は見えないでしょ？"
52280-203 = "……手を汚したくないだけだろ。"
52280-207 = "そんなわけ……。"
52280-208 = "じゃあ交代しろよ！こんなの不公平――"
52280-215 = "あらあら、先生！"
52280-216 = "……いらっしゃい、先生。"
52280-218 = "[ns17] \"みんな元気？\"\n[ns18] \"もしかして邪魔しちゃったかな……？\""
52280-221 = "大丈夫。委員会の仕事じゃないから。"
52280-222 = "先輩方とお花を植えているところですの！"
52280-223 = "[s] \"お花？\""
52280-224 = "そう。和楽まつりの次は、たくさんの花を愛でる祭りをやるらしくてね。"
52280-225 = "その準備で余った種を譲ってもらったから――"
52280-226 = "稽古場の前に植えて、みんなでお世話をしましょう！と、ご提案したのです！"
52280-227 = "季節ごとに芽吹くお花たちを見るのが、これから稽古場での楽しみになりますわ！"
52280-228 = "まあ、稽古中は周りを見る余裕ないけどな……。"
52280-232 = "ユカリ、上にある土を取ってもらえる？"
52280-233 = "重いから気をつけてね。"
52280-234 = "はいっ！"
52280-238 = "[ns] \"もう腕は大丈夫？\""
52280-239 = "うん、元に戻ったよ。#n右腕も……アヤメも。"
52280-240 = "あの日雪原に置いてきたものは、全部ね。"
52280-241 = "でもアヤメは……あの日からずっと眠ってる。"
52280-242 = "体に異常はなさそうだけど……目を覚まそうとしない。"
52280-243 = "[s] \"黄昏に落ちた後遺症みたいなものなのかな。\""
52280-244 = "医者が言うには、精神的な理由が大きいみたい。"
52280-245 = "体が目覚めることを拒んでいるんだって。"
52280-246 = "心配かけた分説教してやるつもりだったのに……あの日から寝てばっかりでさ。"
52280-247 = "叩き起こそうかと思ったけど、ナグサ先輩に止められたんだ。"
52280-248 = "誰かに眠らされてるわけじゃないからね。"
52280-249 = "アヤメが何を思っているのか、何の夢を見ているのかは分からない。"
52280-250 = "……でも、そばで待つことはできる。"
52280-255 = "先輩、こちらは何の種でしょう？"
52280-256 = "これは……桜だね。"
52280-257 = "大きく育つから、他の種とは距離をあけた方がいいよ。"
52280-258 = "あら、それでは稽古場に新しい桜が咲くんですの？楽しみですわ！"
52280-259 = "でも、花が咲くまで結構かかるだろ？"
52280-260 = "今植えても、いつになるやら……。"
52280-264 = "……大丈夫。"
52280-265 = "たとえ私たちは見られなくても、遠い未来で誰かが花を見る。"
52280-268 = "過去の先輩たちも……きっとそう思ってたんだよ。"
52280-277 = "いつかここにも、百の花が咲き乱れる。"
52280-278 = "その日まで、待ってるよ。"
52280-283 = "いつか、目を覚ます君を――"
