[translation]
1011805-1 = "意外な場所"
1011805-3 = "（いつも通り、地下鉄に向かっていると）"
1011805-6 = "[ns] \"ん？\""
1011805-8 = "あれ？先生じゃん。"
1011805-9 = "パヒャッ！奇遇だね。"
1011805-10 = "[ns1] \"こんにちは、ノゾミ。\"\n[ns2] \"何してるの？\""
1011805-13 = "ん？そりゃ地下鉄に乗るんだよ。"
1011805-14 = "先生も？"
1011805-15 = "なら一緒にいこーよ。"
1011805-17 = "ラッキー！座れた～。"
1011805-18 = "ほら、隣どーぞ、先生。"
1011805-26 = "[ns3] \"地下鉄で会うなんてビックリした。\"\n[ns4] \"よく乗るの？\""
1011805-29 = "地下鉄は地下鉄で好きなんだよ。"
1011805-30 = "列車と似てるとこもあるし。"
1011805-31 = "[s] \"確かにそうだね。\""
1011805-32 = "人がたくさん乗れて、ちゃんと時間通り動くし……。"
1011805-33 = "そんなに揺れないのもいいよね。"
1011805-34 = "小さくまとまった列車って感じ？パヒャヒャッ！"
1011805-35 = "ときどき止まるのが、玉にキズかな。"
1011805-36 = "やっぱ一番は、パワフルな列車じゃない？"
1011805-37 = "[s5] \"私も列車が通ってない土地では、\"\n[s6] \"地下鉄やバスを使うかな。\""
1011805-40 = "ふ～ん。"
1011805-41 = "[ruby=まちなか]街中[/ruby]とかはそうだよね。"
1011805-42 = "いつか地下鉄も運転してみたいなぁ。"
1011805-43 = "[s] \"船とかは動かさないの？\""
1011805-44 = "船、酔うらしいじゃん？"
1011805-45 = "あんま興味ないかな！"
1011805-46 = "「大きさによっては酔わないよ」？……先生は乗ったことあるんだ。"
1011805-47 = "パヒャヒャッ！私もいつか船に乗る日がくるのかな？"
1011805-48 = "それとも……海上列車とか？"
1011805-49 = "[s7] \"海を列車が疾走するの！？\"\n[s8] \"そんなことができたらカッコイイだろうな～\""
1011805-52 = "陸の次は海っしょ。パヒャヒャッ！"
1011805-54 = "（ノゾミとの話で盛り上がりすぎて……）"
1011805-58 = "（乗り過ごしてしまった……！）"
