[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 24/06.]
2001615-1 = "A Senhorita das Lembranças"
2001615-4 = "（......Antes que eu percebesse, acabei trazendo um café até a Sociedade Pandemônio）"
2001615-8 = "（Tem um barulho vindo da direção da garagem）"
2001615-14 = "（Ao entrar... vi uma montanha de coisas amontoadas do lado de fora do \"Espaço de Descanso\"）"
2001615-15 = "[ns] \"Iroha?\""
2001615-16 = "Ué? Sensei?"
2001615-21 = "......Você veio mesmo."
2001615-22 = "Esse café... por acaso é pra mim?"
2001615-23 = "Ainda bem. O meu nível de cafeína já estava quase no zero."
2001615-24 = "[s1] \"Tá fazendo faxina?\"\n[s2] \"Que dedicada.\""
2001615-27 = "Dedicada, é..."
2001615-28 = "Se eu deixar isso acumular, vai virar um inferno depois... então só estou me adiantando."
2001615-29 = "[s3] \"Não dá no mesmo...?\"\n[s4] \"Eu ainda acho que você é bem dedicada, Iroha.\""
2001615-32 = "......Eu discordo."
2001615-33 = "Bom, não tenho motivos para piorar a minha imagem de propósito..."
2001615-41 = "Ufa... Se for com você, Sensei, talvez eu não me importe de dividir o espaço."
2001615-42 = "[s7] \"Pode deixar qualquer coisa comigo!\"\n[s8] \"Afinal, a Iroha sempre me salva!\""
2001615-45 = "......Haaah."
2001615-46 = "Falando de um jeito tão ingênuo assim, alguém com más intenções vai acabar se aproveitando de você."
2001615-47 = "Bem, no caso, eu mesma."
2001615-48 = "Então... vamos começar pelos móveis."
2001615-50 = "（Ficamos arrumando o espaço de descanso da Iroha juntos por um tempo）"
2001615-55 = "（E então...）"
2001615-57 = "Bom trabalho."
2001615-58 = "Graças ao Sensei, terminamos antes do sol se pôr."
2001615-59 = "[s9] \"Até que tinha bastante coisa, né...\"\n[s10] \"Você ia mesmo tentar fazer tudo isso sozinha?\""
2001615-62 = "É, pois é... Como a maioria das coisas no espaço de descanso são objetos pessoais meus..."
2001615-63 = "Eu também... não pretendia pedir a ajuda de ninguém."
2001615-64 = "Como o Sensei já entrou aqui antes, e não há problema em você ver as minhas coisas...\nNesse sentido, você acabou sendo a pessoa perfeita para o trabalho."
2001615-65 = "......Várias coisas são só várias coisas."