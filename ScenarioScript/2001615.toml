[translation]
2001615-1 = "追憶するフロイライン"
2001615-4 = "（……気がつけば、コーヒーを持って万魔殿まで来てしまっていた）"
2001615-8 = "（何やら車庫の方が騒がしい）"
2001615-14 = "（中に入ると……「休憩スペース」の外で、荷物が山積みになっていた）"
2001615-15 = "[ns] \"イロハ？\""
2001615-16 = "あれ？先生？"
2001615-21 = "……本当に来てくださったんですね。"
2001615-22 = "そのコーヒー……もしかして私の分ですか？"
2001615-23 = "助かります。そろそろカフェインが切れそうだったので。"
2001615-24 = "[s1] \"掃除してるの？\"\n[s2] \"えらいね。\""
2001615-27 = "えらい、ですか……。"
2001615-28 = "放っておくと地獄を見るので……今やっているだけです。"
2001615-29 = "[s3] \"同じことじゃない……？\"\n[s4] \"やっぱりイロハはえらいよ。\""
2001615-32 = "……私はそう思いませんけど。"
2001615-33 = "まあ、わざわざ印象を悪くする理由もありませんし……そういうことにしておきます。"
2001615-34 = "……今日は本当にコーヒーを渡しに来られただけなんですか？"
2001615-35 = "[s5] \"そういうわけじゃないよ。\"\n[s6] \"何か手伝えるかなと思って。\""
2001615-38 = "……ああ、なるほど。"
2001615-39 = "あのメッセージを、救難信号だと受け取られたんですね。"
2001615-40 = "でも……大丈夫なんですか？"
2001615-41 = "そんなことを言ったら、お言葉に甘えちゃいますよ？"
2001615-42 = "[s7] \"何でも任せてよ！\"\n[s8] \"イロハにはいつも助けてもらってるからね！\""
2001615-45 = "……はぁ。"
2001615-46 = "そんなことを言っていると、悪い人に利用されちゃいますよ。"
2001615-47 = "まあ、私のことですけど。"
2001615-48 = "では……まずは家具から、ですね。"
2001615-50 = "（しばらくイロハの休憩スペースを一緒に片付けた）"
2001615-55 = "（そして……）"
2001615-57 = "お疲れさまでした。"
2001615-58 = "先生のおかげで日が沈む前に終わりましたね。"
2001615-59 = "[s9] \"結構量があったね……。\"\n[s10] \"これ、一人でやるつもりだったの？\""
2001615-62 = "ええ、まあ……。休憩スペースには私物が多いので。"
2001615-63 = "誰かに手伝ってもらうつもりも……なかったですね。"
2001615-64 = "先生は以前にもここに入っていますし、色々見せても問題ありませんから……#nそういう意味では適任だったんです。"
2001615-65 = "……色々は色々です。"
2001615-66 = "ふふ、なら……。"
2001615-67 = "どこまで見せても大丈夫なのか……。"
2001615-68 = "今、確かめてみます？"
2001615-69 = "[s11] \"あ、えっと、大丈夫！\"\n[s12] \"そういえばさっき本を見つけたよ！\""
2001615-72 = "……分かりやすい話題逸らしですね。"
2001615-73 = "あれ、その本……？"
2001615-74 = "ああ、どうりで見つからないわけです。#n棚から抜けていたんですね、ありがとうございます。"
2001615-75 = "[ns] 特別な本なの？"
2001615-78 = "まあ……そう、なりますね。"
2001615-79 = "……先生は、ご自身の趣味のきっかけって覚えていますか？"
2001615-80 = "私は覚えています。最初にその本を読んだとき――"
2001615-81 = "「本の中の世界ってこんなに広いんだ」と驚いて。#nそこから、似た傾向の物語を追いかけているうちに、そのまま抜けられなくなったというか……。"
2001615-86 = "えいっ。"
2001615-87 = "[ns13] 大切な本じゃなかったの！？\n[ns14] そんな雑に扱っていいの！？"
2001615-90 = "へ？いえ、全然大事じゃないですよ。"
2001615-91 = "私が本にのめり込んだのはかなり前のことですし。"
2001615-92 = "そんな古い本が残っているわけないじゃないですか。これは買い直したものです。"
2001615-93 = "思い出の品でも初版でも限定版でもなく……。#n処分しても心が痛まない類いのものですよ。"
2001615-94 = "[s15] \"でも好きな本なんでしょ？\"\n[s16] \"ブックカバーとかつけなよ？\""
2001615-97 = "いやです。面倒なので。"
2001615-103 = "まあ、思い出があるわけじゃないとは言いましたけど……。"
2001615-104 = "この本を見るたびに、今日の会話くらいは思い出すかもしれませんね。ふふ。"
