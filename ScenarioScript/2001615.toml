[translation]
2001615-1 = "The Reminiscing Fräulein"
2001615-4 = "(...Before I knew it, I had ended up at the Pandemonium Society with coffee in hand.)"
2001615-8 = "(The garage area seems quite noisy.)"
2001615-14 = "(When I went inside... there was a mountain of luggage piled up outside the 'break room'.)"
2001615-15 = "[ns] \"Iroha?\""
2001615-16 = "Oh? Sensei?"
2001615-21 = "...You really came."
2001615-22 = "That coffee... is that for me, by any chance?"
2001615-23 = "That's a lifesaver. I was just about to run out of caffeine."
2001615-24 = "[s1] \"Are you cleaning?\"\n[s2] \"That's impressive.\""
2001615-27 = "Impressive, you say..."
2001615-28 = "If I leave it alone, it'll turn into a nightmare... so I'm just doing it now."
2001615-29 = "[s3] \"Isn't that the same thing?\"\n[s4] \"Iroha really is impressive after all.\""
2001615-32 = "...I don't think so."
2001615-33 = "Well, there's no reason to go out of my way to ruin my image... so I'll just take that as a compliment."
2001615-34 = "...Did you really just come here today to deliver coffee?"
2001615-35 = "[s5] \"That's not the only reason.\"\n[s6] \"I thought I might be able to help with something.\""
2001615-38 = "...Ah, I see."
2001615-39 = "You took that message as a distress signal, didn't you?"
2001615-40 = "But... are you sure about that?"
2001615-41 = "If you say things like that, I might just take you up on your offer."
2001615-42 = "[s7] \"Leave it all to me!\"\n[s8] \"You've always helped me out, Iroha!\""
2001615-45 = "...*Sigh*."
2001615-46 = "If you keep saying things like that, you're going to get taken advantage of by bad people."
2001615-47 = "Well, I suppose I'm one of them."
2001615-48 = "Then... let's start with the furniture."
2001615-50 = "(I spent a while helping Iroha tidy up her break room.)"
2001615-55 = "(And then...)"
2001615-57 = "Good work today."
2001615-58 = "Thanks to you, Sensei, we finished before the sun went down."
2001615-59 = "[s9] \"There was quite a lot of stuff...\"\n[s10] \"Were you planning on doing this all by yourself?\""
2001615-62 = "Yes, well... I have a lot of personal belongings in the break room."
2001615-63 = "I wasn't really planning on having anyone help me, either."
2001615-64 = "You've been in here before, Sensei, and it's no problem for me to show you around...#nIn that sense, you were the perfect person for the job."
2001615-65 = "...'Around' is a broad term."
2001615-66 = "Hehe, in that case..."
2001615-67 = "I wonder how much I can show you..."
2001615-68 = "Want to find out right now?"
2001615-69 = "[s11] \"Oh, um, I'm good!\"\n[s12] \"By the way, I found a book earlier!\""
2001615-72 = "...That's a very transparent attempt to change the subject."
2001615-73 = "Oh, that book...?"
2001615-74 = "Ah, no wonder I couldn't find it. #nIt had slipped off the shelf. Thank you."
2001615-75 = "[ns] Is it a special book?"
2001615-78 = "Well... I suppose you could say that."
2001615-79 = "...Sensei, do you remember what sparked your own hobbies?"
2001615-80 = "I remember mine. When I first read that book—"
2001615-81 = "I was amazed at how vast the world inside a book could be. #nFrom there, as I kept chasing stories with similar themes, I just sort of... never found my way out."
2001615-86 = "Hup."
2001615-87 = "[ns13] Wasn't that an important book!?\n[ns14] Is it really okay to treat it so roughly!?"
2001615-90 = "Huh? No, it's not important at all."
2001615-91 = "It's been a long time since I first got hooked on books."
2001615-92 = "There's no way such an old book would still be around. I bought this one again recently."
2001615-93 = "It's not a memento, a first edition, or a limited edition... #nIt's the kind of thing I wouldn't feel bad about getting rid of."
2001615-94 = "[s15] \"But you like this book, right?\"\n[s16] \"Why don't you put a book cover on it?\""
2001615-97 = "No thanks. It's too much trouble."
2001615-103 = "Well, I did say it doesn't hold any memories, but..."
2001615-104 = "Every time I see this book, I might just remember our conversation today. Hehe."