[translation]
51190-1 = "Episódio 19; A Contadora de Histórias de Fantasmas do Clube das Flores, Pássaros, Vento e Lua (1)"
51190-4 = "Chamas ardentes―― montanhas de escombros."
51190-5 = "Espíritos malignos―― caminhando pela cidade."
51190-7 = "Junto com o som que anuncia o início do festival――"
51190-12 = "――Nós visitaremos vocês."
51190-18 = "――Certo... finalmente começou, não é."
51190-19 = "Vamos, mostrem para mim."
51190-21 = "A 'História de Fantasmas'―― tecida por vocês――"
51190-37 = "[ns] \"Nós o atacamos tanto... mas ele não tem nem um arranhão...\""
51190-40 = "O que é aquilo...! #n Os ataques não surtem efeito nenhum!"
51190-42 = "Uwaaahn! Tem alguma coisa estranha!? #n Por mais que eu atire, parece que não acerta nada!"
51190-43 = "Parece que passa direto, não é~"
51190-44 = "Sim... é como se estivéssemos lutando contra uma miragem..."
51190-46 = "......É inútil."
51190-47 = "[s] \"......Nagusa?\""
51190-50 = "Ataques comuns não funcionam naquilo."
51190-51 = "Eh, por que não!?"
51190-52 = "......Porque aquilo... é a 'Genryou Hyakumonogatari'."
51190-53 = "Uma 'História de Fantasmas' criada pelas mãos do Clube das Flores, Pássaros, Vento e Lua a partir do livro misterioso 'Inou Mononokeroku'."
51190-54 = "Por isso balas comuns são inúteis naquilo."
51190-55 = "Dizendo uma coisa dessas do nada, você quer que a gente simplesmente acredite...?"
51190-56 = "Bem... as balas não funcionam mesmo, então acho que só nos resta acreditar...!"
51190-58 = "Ehm... se o que a Nagusa-san disse é verdade... quer dizer que não há como derrotá-lo?"
51190-59 = "Nenhum ataque funciona, isso é personagem roubado! Injusto!!"
51190-64 = "Não quer dizer... que não exista um modo de derrotá-lo."
51190-65 = "[s] \"Qual é esse método?\""
51190-66 = "Apenas quem foi reconhecido pela Grande Profeta Kuzunoha... #n pode derrotar uma 'História de Fantasmas' que nasceu de um livro misterioso――"
51190-67 = "Ou seja, a presidente da Hyakkaryouran, aquela que possui o 'Emblema'."
51190-68 = "[s] (Eu já ouvi uma história parecida... em algum lugar...)"
51190-70 = "Herdada do Grande Profeta Kuzunoha, algo que apenas as presidentes de cada geração podem possuir..."
51190-71 = "É 'uma arma capaz de capturar fantasmas'!"
51190-73 = "O Emblema 'Hyakuren'―― sem ele, a Genryou Hyakumonogatari não receberá um único arranhão."
51190-74 = "Então não podemos fazer nada...?"
51190-75 = "......Sim. Nada."
51190-76 = "......Como a Nagusa-senpai sabe disso?"
51190-77 = "Eu... no campo de neve..."
51190-78 = "......Não, deixa pra lá."
51190-79 = "Temos que fugir rápido... se continuarmos assim, vai ser tarde demais."
51190-80 = "Antes que chegue a esse ponto... antes que tudo termine como daquela vez, rápido――"
51190-85 = "Mesmo assim, eu não aceito as coisas como estão!"
51190-90 = "Renge-chan?"
51190-95 = "Você tá dizendo pra gente ficar só assistindo dessa vez também... como daquela vez."
51190-96 = "É claro que eu não posso fazer isso!"
51190-97 = "Nunca mais..."
51190-98 = "Eu não quero mais não poder fazer nada quando estão pedindo ajuda... #n Eu me recuso a aceitar que 'esse é o nosso limite' e desistir!"
51190-99 = "[s] \"Renge...\""
51190-100 = "Nagusa-senpai, você disse, né. Que aquele que tiver o emblema pode derrotá-lo."
51190-101 = "Então você consegue, não consegue? #n Você é a presidente interina da Hyakkaryouran, não é!?"
51190-107 = "N-Não... eu não posso... #n Meu braço direito já não..."
51190-108 = "Eu... não posso."
51190-113 = "Eu não posso. Eu não tenho mais o 'Emblema', e deixei com a Kikyou..."
51190-114 = "Não... mesmo se eu o tivesse comigo..."
51190-115 = "Eu não conseguiria."
51190-116 = "Por... quê..."
51190-121 = "Porque eu... não sou a Ayame."
51190-126 = "Ahahahahah!"
51190-127 = "Você sabe muito bem das coisas, não é mesmo?"
51190-131 = "......Quem é?"
51190-138 = "Ihi, ihihihi...! Correto, correto, ce~rta resposta! #n A Nagusa-chan tem toda razão! "
51190-139 = "Aquele 'Kurokage' da Genryou Hyakumonogatari é uma História de Fantasmas nascida do livro misterioso 'Inou Mononokeroku'. #n Vocês não conseguirão fazer um único arranhãozinho nele, sabiam?"
51190-140 = "......A não ser que seja a 'Ayame', que herdou o emblema da Grande Profeta, não é?"
51190-146 = "Não é mesmo~? Sou alguém que você conhece mui~to bem, não sou? #n Não é, Nagusa-chan?"
51190-147 = "Por... por que você está aqui..."
51190-148 = "Yabuki... Shuro."
51190-149 = "[s] \"Aquele que é do Clube das Flores, Pássaros, Vento e Lua...\""
51190-150 = "Ora, ora, ora~ Que alegria! Tanto a Nagusa-chan quanto o Sensei da Schale... se lembraram de mim? Estou emocionada~!"
51190-151 = "E, deixe-me também agradecer, Sensei. #n Por ter ficado com a gente até aqui..."
51190-152 = "E por ter ouvido direiti~nho a minha história."
51190-153 = "E aí, e aí, o que achou?"
51190-154 = "Gostou da 'História de Fantasmas' que eu preparei para vocês?"
51190-159 = "......Não me diga que esse tumulto...!"
51190-160 = "É obra sua?"
51190-161 = "Eh, sério!? #n Aquela pessoa...!?"
51190-162 = "[ns] \"A pessoa responsável... por invocar o monstro.\""
51190-164 = "Ahaha! Essa hostilidade tão fresca que até sinto pinicar a pele, a desconfiança ―――― e a raiva."
51190-165 = "Eu gostei muito, mui~to mesmo! #n Sim, demais... já gostei mui~to! "
51190-167 = "Responda a minha pergunta!"
51190-169 = "Sim, si~m. Se essa é a sua pergunta, vou respondê-la."
51190-170 = "Eu gostaria de me apresentar, mais uma vez."
51190-171 = "Eu sou a Shuro―― "
51190-172 = "Como já deve ter adivinhado, eu sou quem invocou a Genryou Hyakumonogatari para cá――"
51190-173 = "――A contadora de histórias de fantasmas do Clube das Flores, Pássaros, Vento e Lua... Yabuki Shuro. Muito prazer."
51190-174 = "[s] \"'Contadora de Histórias de Fantasmas'...?\""
51190-175 = "Aha... Ahaha. #n Essa cara de novo~?"
51190-176 = "A sua cara de idiota de quem não consegue entender as palavras e não sabe o que está acontecendo."
51190-177 = "Ahaha! A sua hostilidade, mesmo sem entender nada, é admirável..."
51190-178 = "Que bom, que bom! #n Gosto muito dessa sua cara... não consigo resistir."
51190-179 = "......Mas a que eu mais gosto é... Aha! #n É a sua, Nagusa-chan."
51190-185 = "Não nos vemos desde o campo de neve, né? #n Faz quanto tempo mesmo? ...Ihi."
51190-186 = "Fiquei me perguntando para onde você tinha fugido... mas nunca imaginei que seria a Hyakkiyako."
51190-187 = "Bem, eu acho que você não tem mais para onde ir com essa aparência tão lamentável, né?"
51190-188 = "Mas, mesmo assim―― não acha que está sendo muito sem-vergonha? "
51190-189 = "Você não queria voltar para a Hyakkaryouran, queria? #n Você queria muito fugir daquele lugar... mesmo que mal conseguisse aguentar."
51190-190 = "Você é realmente... sem-vergonha."
51190-191 = "Do que você... está falando."
51190-192 = "Uéé~? #n Não me diga que, não me diga que, você não sabia?"
51190-193 = "Nagusa-chan, ainda mantinha segredo delas?"
51190-198 = "Ainda está contando 'mentiras'?"
51190-200 = "........."
51190-202 = "Ahahaha!!"
51190-203 = "Nagusa-chan, você ainda está fingindo ser a presidente interina carregando o título de 'Hyakkaryouran', não é? Escondendo quem você realmente é..."
51190-204 = "Eu sei de tudo, do quanto você é atrevida e sem-vergonha, Nagusa-chan..."
51190-205 = "O pessoal daqui, não sabia de nada?"
51190-207 = "Pa-ra com isso..."
51190-209 = "Não sei quem é você..."
51190-210 = "Mas já chega de zombar da Hyakkaryouran."
51190-212 = "Que cruuuuuel! Eu não estou zombando... né, Nagusa-chan?"
51190-213 = "Que tal eu contar a elas no seu lugar? Eu não me importo, sabe? "
51190-214 = "Pela tímida Nagusa-chan... #n Contar a verdade que ela não conseguiu dizer até hoje, é moleza pra mim."
51190-215 = "Para..."
51190-216 = "Eu não queeeero~ #n Porque foram elas que perguntaram."
51190-217 = "É preciso responder à~s perguntas, certo? Quem não consegue fazer isso, não pode se tornar uma pessoa respeitável, sabia? Eu amo responder perguntas."
51190-218 = "Então... eu vou contar pra elas."
51190-222 = "A Nagusa-chan dizia isso desde aquela época:"
51190-224 = "'Eu não posso ser a presidente da Hyakkaryouran'"
51190-228 = "'Porque eu não sou a Ayame', 'Eu não sou a Ayame, então não tenho esse direito'"
51190-229 = "Ayame, Ayame, Ayame...! #n Sempre usando a Ayame como desculpa."
51190-230 = "Já chega...!"
51190-231 = "Ahahahah."
51190-232 = "Você realmente――"
51190-237 = "[log][ff4444]<Mentira>[-][/log]"
51190-240 = "[log][ff4444]<Você nem estava pensando nisso de verdade>[-][/log]"
51190-246 = "A verdade não é essa, não é?"
51190-247 = "Você falou várias palavras bonitas... mas são todas mentira, não são?"
51190-248 = "Você não pode dizer isso pra elas porque tem vergonha, não é?"
51190-249 = "Afinal... você tem medo de contar a verdade!"
51190-250 = "[s] \"Medo...?\""
51190-251 = "Isso mesmo. A Nagusa-chan tem medo que todo mundo saiba."
51190-252 = "Então eu vou mostrar com o meu 'livro misterioso'..."
51190-253 = "Os verdadeiros e horríveis sentimentos da Nagusa-chan."
51190-258 = "......!"
51190-273 = "Ei, você ouviu? A Presidente Ayame desapareceu."
51190-274 = "(Todos dizem)"
51190-275 = "O que vai acontecer com a Hyakkaryouran daqui pra frente? A posição de presidente vai ficar vazia, não é?"
51190-281 = "(Todos falam)"
51190-282 = "Mesmo sem a Ayame-senpai, a incrível e amiga de infância dela, Nagusa-senpai, ainda está conosco!"
51190-284 = "Então ficaremos bem!"
51190-288 = "(Vozes cheias de expectativa ecoam)"
51190-295 = "<É mentira>"
51190-296 = "(Estes eram os meus verdadeiros sentimentos que eu não conseguia dizer)"
51190-299 = "......Eu não consigo."
51190-304 = "(Esta arma que me foi deixada é pesada demais)"
51190-305 = "Porque... eu sou..."
51190-309 = "[ruby=Porque não sou a Ayame.]Se as coisas continuarem assim, elas vão descobrir quem eu realmente sou.[/ruby] "
51190-310 = "[ruby=Porque eu não posso substituir a Ayame.]Eu só estava fingindo ser a vice-presidente da Hyakkaryouran.[/ruby] "
51190-311 = "[ruby=Apenas a Ayame possui os requisitos para ser a presidente da Hyakkaryouran.]Eu não tinha talento nem habilidade, apenas ficava ao lado da Ayame...[/ruby]"
51190-314 = "Não tenho nenhum talento."
51190-315 = "Sou desinteressante e feia."
51190-316 = "Eu, que só me contentava em ficar ao lado da Ayame e não conseguia fazer nada―― "
51190-318 = "――Serei desmascarada por todas."
51190-319 = "Eu, que só estava lá por acaso――"
51190-321 = "Eu, que me escondi atrás da sombra da Ayame e fugi."
51190-322 = "Todas vão apontar o dedo para mim e se decepcionar."
51190-325 = "――Tenho medo."
51190-326 = "Tenho medo de descobrirem a verdade."
51190-327 = "Antes que descubram a verdade――"
51190-329 = "[log]――Tenho que fugir.[/log]"
51190-333 = "Eh, eu vi uma coisa esquisita passando agorinha mesmo...!!"
51190-334 = "Você viu, não viu."
51190-335 = "O que era aquilo...?"
51190-336 = "[s] \"Uma cena... do passado...?\""
51190-338 = "Isso... é da Nagusa-senpai...?"
51190-344 = "E aí, e aí? Como se sente?"
51190-345 = "Qual a sensação de ter visto os verdadeiros sentimentos da senpai que você admirava... por favor, me conte o que achou!"
51190-346 = "Isso..."
51190-350 = "Aí no canto, você mesma."
51190-351 = "Me diga, o que achou de ver os verdadeiros sentimentos da senpai que você acusou tanto!"
51190-357 = "[ns] \"Kikyou...!\""
51190-358 = "Fiquei curiosa com o tumulto e vim dar uma olhada. "
51190-359 = "Eu só... pretendia fazer isso."
51190-360 = "......Mas agora."
51190-361 = "......!"
51190-362 = "Aqueles eram... os verdadeiros sentimentos da Nagusa-senpai?"
51190-363 = "Kikyou, eu..."
51190-365 = "Ahaha! Sim, isso mesmo!"
51190-366 = "Aquele era o verdadeiro eu da Nagusa-chan. A verdadeira face da senpai que tooodas da Hyakkaryouran admiravam."
51190-367 = "Francamente... ela sempre deu desculpas como 'Tem que ser a Ayame~' ou 'Não consigo ser eu mesma sem a Ayame~'."
51190-368 = "Mas era tudo, tuuuuudo mentira!"
51190-369 = "O verdadeiro eu dela é essa idiota que achava que só precisava agir para ser digna de estar ao lado da amiga de infância. E que não ligava a mínima para os outros."
51190-370 = "Por isso a Nagusa-chan... está tentando fugir de vocês. #n Porque ela não quer que vocês se decepcionem com ela!"
51190-372 = "Foi por isso... que você se afastou de nós."
51190-373 = "Nagusa-senpai..."
51190-378 = "Kikyou, Renge... vocês estão enganadas...!"
51190-379 = "No começo, eu não pretendia... eu só...!"
51190-381 = "Ora, ora? Ainda vai dar desculpas?"
51190-382 = "Você sempre foi esse tipo de pessoa, não é?"
51190-383 = "Só tinha medo que descobrissem como você era feia."
51190-384 = "Você jogou tudo pro alto porque achou que era melhor fugir do que apontarem o dedo pra você... e ainda não quer admitir?"
51190-385 = "Sinceramente... a Nagusa-chan é..."
51190-386 = "Repugnante."
51190-388 = "E... eu...!"
51190-389 = "Eu, sou... eu só... queria que todos...!"
51190-391 = "Senpai..."
51190-392 = "Goryou Nagusa... você..."
51190-396 = "Vocês estão engana..."
51190-397 = "Enganadas... a Ayame é..."
51190-398 = "Eu só queria que a Ayame...!"
51190-400 = "Aha, Ahahah!"
51190-401 = "Ah~ ah... Acabou tudo em pedaços, não é?"
51190-402 = "Aha... que tuuuudo quebre de uma vez."
51190-403 = "Isso, xinguem-se, ataquem-se e briguem..."
51190-404 = "Machuquem umas às outras com palavras... escondam seus verdadeiros sentimentos com mentiras..."
51190-405 = "Joguem a verdade no lixo de qualquer jeito #n ――Vamos transformar a ficção e a realidade em uma 'História de Fantasmas'?"
51190-406 = "Se fizermos isso... "
51190-407 = "Vocês finalmente...!"
51190-408 = "Estarão na minha verdadeira 'Elegância'――"
51190-412 = "[ns] \"Tsubaki!\""
51190-413 = "Sim, deixe comigo. Sensei."
51190-420 = "Próximo Episódio; A Contadora de Histórias de Fantasmas do Clube das Flores, Pássaros, Vento e Lua (2)"
