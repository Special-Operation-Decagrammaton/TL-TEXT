[translation]
51190-1 = "第19話;花鳥風月部の怪談家（１）"
51190-4 = "燃え盛る炎――瓦礫の山。"
51190-5 = "街を闊歩する――魑魅魍魎。"
51190-7 = "祭りの始まりを告げる音と共に――"
51190-12 = "――そなたらを訪ねよう。"
51190-18 = "――そう……ようやっと始まったのかい。"
51190-19 = "さあ、我に見せて御覧。"
51190-21 = "[ruby=ぬし]主[/ruby]らが紡ぐ――「[ruby=かいだん]百物語[/ruby]」を――"
51190-37 = "[ns] \"あれだけ攻撃したのに……傷一つないなんて……。\""
51190-40 = "なんだあいつ……！#n全然手ごたえ無いじゃん！"
51190-42 = "うわぁあん！なんかヘンだよ！？#n撃っても撃っても全然当たってる感じがしないよぉ！"
51190-43 = "すり抜けてく感じ、だね～"
51190-44 = "はい……まるで蜃気楼でも相手しているような……"
51190-46 = "……無駄だよ。"
51190-47 = "[s] \"……ナグサ？\""
51190-50 = "アレに普通の攻撃は通らない。"
51190-51 = "えっ、何でだよ！？"
51190-52 = "……あれは…[ruby=げんりょうひゃくものがたり]…「幻魎百物語」だ[/ruby]から。"
51190-53 = "怪書「[ruby=いのうもののけろく]稲生物怪録[/ruby]」から花鳥風月部の手によって生みだされた――「怪談」。"
51190-54 = "だから、アレに普通の銃弾は無意味。"
51190-55 = "そんな話急に言われて、はいそうですかって信じろってか……？"
51190-56 = "いやまぁ……実際銃弾通らないし、信じるしかないんだろうけどさ……！"
51190-58 = "その……ナグサさんの言う通りなら……倒す方法は無い、ということでしょうか？"
51190-59 = "何も通じないとかそんなのチートキャラじゃん！ずるい！！"
51190-64 = "倒す方法が……無いわけでは、ない。"
51190-65 = "[s] \"その方法って？\""
51190-66 = "怪書から生まれた「怪談」を倒せるのは……#n大預言者クズノハから認められたもの――"
51190-67 = "つまり、百花繚乱の委員長であり、「証」を手にしている人だけ。"
51190-68 = "[s] （同じような話を……どこかで……）"
51190-70 = "大預言者クズノハから引き継いだ、代々の委員長だけが手にすることのできる……"
51190-71 = "「幽霊を捕らえる事ができる銃」ですの！"
51190-73 = "証・[ruby=びゃくれん]「百蓮」[/ruby]――それが無ければ、幻魎百物語には傷一つつけられない。"
51190-74 = "じゃあ、私たちは何もできないの……？"
51190-75 = "……ええ。何もできない。"
51190-76 = "……どうしてナグサ先輩はそれを知ってるんだ？"
51190-77 = "私は……大雪原で……"
51190-78 = "……いや、何でもない。"
51190-79 = "早く逃げよう……このままじゃ、手遅れになってしまう。"
51190-80 = "そうなる前に……あの時と同じになってしまう前に、早く――"
51190-85 = "だとしても、このままじゃ嫌だよ！"
51190-90 = "レンゲちゃん？"
51190-95 = "あの時みたいに……今回も、指を咥えて見てろって言うのかよ。"
51190-96 = "そんなの、できるわけないだろ！"
51190-97 = "二度と……"
51190-98 = "助けを求められているのに何もできないのは嫌なんだ……#nこれが「アタシたちの限界なんだ」って、諦めたくなんかない！"
51190-99 = "[s] \"レンゲ……。\""
51190-100 = "ナグサ先輩、言ってたよな。証を持つ者ならアレを倒せるって。"
51190-101 = "じゃあ、ナグサ先輩ならできるんじゃないのか？#n先輩は、百花繚乱の委員長代理だろ！？"
51190-107 = "ちが、う……わたしは……#n私の、右腕はもう……"
51190-108 = "私は……できない。"
51190-113 = "できないの。私にもう「証」はなくて、キキョウに……"
51190-114 = "いや……たとえそれを持っていたとしても……"
51190-115 = "私には、できないよ。"
51190-116 = "なん、でだよ……。"
51190-121 = "私は……アヤメじゃないから。"
51190-126 = "アハハハハハッ！"
51190-127 = "よぉく分かってますねぇ？"
51190-131 = "……誰？"
51190-138 = "イヒッ、イヒヒヒッ……！正解正解大せいか～い！#nナグサちゃんの言う通り！ "
51190-139 = "アレ―[ruby=げんりょうひゃくものがたり]―幻魎百物語の「[/ruby]クロカゲ」は、怪書「稲生物怪録」から生まれた怪談。#n手前らは、クロカゲにかすり傷一つつけられませんよぉ？"
51190-140 = "……大預言者から証を引き継いだ「アヤメ」でもない限り、ね？"
51190-146 = "そうですよねぇ～？手前も、よ～く知ってる人なのでしょう？#nね、ナグサちゃん？"
51190-147 = "なんで……どうして、あなたがここに……っ。 "
51190-148 = "[ruby=やぶき]箭吹[/ruby]……シュロ。"
51190-149 = "[s] \"花鳥風月部の……\""
51190-150 = "あらあらあら～嬉しい！ナグサちゃんも、シャーレの先生も……手前のこと覚えてくださったんですね？感激ですぅ～！"
51190-151 = "そしてそして、お礼を言わせてくださいな、先生。#nここまでご一緒してくださったこと……"
51190-152 = "そして、手前の話をきち～んと、聞いてくださったこと。"
51190-153 = "はてさて、はてさて、いかがでしたぁ？"
51190-154 = "手前らのために用意した「怪談」……お気に召しましたぁ？"
51190-159 = "……まさか、この騒動は……！"
51190-160 = "あんたの仕業なのか？"
51190-161 = "えっ、本当！？#nあの人が……！？"
51190-162 = "[ns] \"怪物を呼び寄せた、張本人……。\""
51190-164 = "アハハッ！肌がピリピリするくらい新鮮な敵意、警戒心――――怒り。"
51190-165 = "手前、とてもとて～も気に入りました！#nええ、もう……すっごく！ "
51190-167 = "こっちの質問に答えろ！"
51190-169 = "はいはぁい。それが手前らの質問でしたら、お答えしましょう。"
51190-170 = "改めてぇ、ご挨拶申し上げます。"
51190-171 = "手前はシュロ―― "
51190-172 = "ご明察の通り、ここ[ruby=げんりょうひゃくものがたり]に幻魎百物語を[/ruby]呼び出した――"
51190-173 = "――花鳥風月部の怪談家……[ruby=やぶき]箭吹[/ruby]シュロと申しますぅ。以後、お見知りおきを。"
51190-174 = "[s] \"「怪談家」……？\""
51190-175 = "あは……アハハッ。#nまたその顔ですぅ～？"
51190-176 = "言葉を理解できず、訳が分からないといったマヌケ顔。"
51190-177 = "アハハッ！わからないのに敵意だけはご立派なことで……"
51190-178 = "いいですね、いいですねぇ！#nすごく好きですよぉ、そのお顔……堪りません。"
51190-179 = "……特に手前の好みなのはぁ……アハッ！#nあなたですよぉ、ナグサちゃん。"
51190-185 = "大雪原以来ですねぇ？#nいつぶりの再会でしょう？……イヒッ。"
51190-186 = "どこに逃げたのかと思えば……まさか百鬼夜行だったなんて。"
51190-187 = "まあ、惨めな姿になってしまった手前の帰る場所なんて、ここしかないんでしょうけどぉ？"
51190-188 = "にしてもぉ――図々しすぎやしません？ "
51190-189 = "百花繚乱に帰ってきたくなんてなかったのでしょう？#nそこから逃げたくて逃げたくて……たまらなかったくせに。"
51190-190 = "本当にもう……恥知らずなんですからぁ。"
51190-191 = "何言ってんだ……お前。"
51190-192 = "あれれぇ～？#nもしかしてもしかして、知らなかったんです？"
51190-193 = "ナグサちゃん、まだ手前らに秘密にしてたんですかぁ？"
51190-198 = "まだ「嘘」ついてるんだ？"
51190-200 = "…………っ。"
51190-202 = "アハハハッ！！"
51190-203 = "ナグサちゃんったら、未だに「百花繚乱」の肩書を背負って、委員長代理の顔をしてるんでしょ？本当の自分を隠して……"
51190-204 = "手前はナグサちゃんが図々しくて恥知らずなこと、全部知ってるのにぃ……"
51190-205 = "ここのみんなは、誰も知らなかったんだぁ？"
51190-207 = "やめ、て……。"
51190-209 = "あんたが誰かは知らないけど……"
51190-210 = "百花繚乱を馬鹿にするのも大概にしろよ。"
51190-212 = "ひどぉい！馬鹿になんてしてないのに……ねぇ、ナグサちゃん？"
51190-213 = "手前が代わりに伝えましょか？別に構いませんよぉ？ "
51190-214 = "恥ずかしがり屋さんのナグサちゃんのためにぃ……#n今まで口にできなかった真実を、手前らに伝えて差し上げるくらい、朝飯前ですしぃ？"
51190-215 = "やめて……。"
51190-216 = "嫌ですよぉ～#nだって、手前さんが聞いてきたんじゃないですかぁ。"
51190-217 = "質問にはちゃ～んと答えなきゃ、ねぇ？それが出来ないと立派な人になれないんですよぉ？手前、質問に答えるの好きなんですぅ。"
51190-218 = "だからぁ……教えてあげますよ。"
51190-222 = "ナグサちゃんは、前からこう言っていたんです。"
51190-224 = "「私は百花繚乱の委員長になれない」"
51190-228 = "「私はアヤメじゃないから」「アヤメではない私にそんな資格はない」"
51190-229 = "アヤメ、アヤメ、アヤメ……！#nアヤメの名前で言い訳ば～っかり。"
51190-230 = "もう、やめて……！"
51190-231 = "アハハハッ。"
51190-232 = "本当にもう――"
51190-237 = "[log][ff4444]＜ウソ＞[-][/log]"
51190-240 = "[log][ff4444]＜そんな風に考えたことなんてないくせに＞[-][/log]"
51190-246 = "本当は、そういう理由じゃないんでしょ？"
51190-247 = "それっぽい言葉を並べ立ててるけどぉ……全部ウソじゃなぁい？"
51190-248 = "恥ずかしいから手前らに言えないんでしょ？"
51190-249 = "だって……本当のことを言うのは怖いもの！"
51190-250 = "[s] \"怖い……？\""
51190-251 = "そう。みんなに知られるのが怖いんですよぉ、ナグサちゃんは。"
51190-252 = "だからナグサちゃんの、その醜い本心……"
51190-253 = "手前の「怪書」で、見せてあげますよぉ。"
51190-258 = "……！"
51190-273 = "ねえ、聞いた？アヤメ委員長が姿を消したって。"
51190-274 = "（みんなが言う）"
51190-275 = "これから百花繚乱はどうなるの？委員長の座が空席になるんだよね？"
51190-281 = "（みんなが話す）"
51190-282 = "アヤメ先輩がいなくても、同じように優秀で幼馴染のナグサ先輩が残ってくれたから！"
51190-284 = "だから大丈夫！"
51190-288 = "（期待に満ちた声がこだまする）"
51190-295 = "＜違う＞"
51190-296 = "（これは、口にできなかった本当の気持ち）"
51190-299 = "……私には、できないよ。"
51190-304 = "（残された私に、こ[ruby=あかし]の銃は[/ruby]重すぎる）"
51190-305 = "だって……私は……"
51190-309 = "[ruby=アヤメじゃないから。]このままじゃ、本当の私を知られてしまう。[/ruby] "
51190-310 = "[ruby=私はアヤメの代わりになれないから。]私は百花繚乱の副委員長を演じてきただけ。[/ruby] "
51190-311 = "[ruby=百花繚乱の委員長としての資格があるのは、アヤメだけだから。]才能も実力もないのに、ただアヤメの傍にいただけの……[/ruby]"
51190-314 = "何の取り柄もない私。"
51190-315 = "つまらなくて、醜い私。"
51190-316 = "ただアヤメの傍にいることに満足していた、何もできない私が―― "
51190-318 = "――みんなにバレてしまう。"
51190-319 = "たまたま、そこに居合わせただけの――"
51190-321 = "アヤメの影に隠れて逃げた私を。"
51190-322 = "みんな、そんな私を指差して落胆するわ。"
51190-325 = "――怖い。"
51190-326 = "本当のことを知られるのが、怖い。"
51190-327 = "真実を知られる前に――"
51190-329 = "[log]――逃げなければ。[/log]"
51190-333 = "えっ、なんか今！変なのがビュンッて……！！"
51190-334 = "見えた、ね。"
51190-335 = "あれは一体……？"
51190-336 = "[s] \"過去の……光景……？\""
51190-338 = "これ……ナグサ先輩の……？"
51190-344 = "どうですどうです？どんな気持ちですぅ？"
51190-345 = "憧れの先輩の本心を覗いた今の心境は……ぜひ感想を聞かせてくださいなぁ？"
51190-346 = "そう……"
51190-350 = "そこの角にいる、手前ですよ手前。"
51190-351 = "自分が責め立てた先輩の本心を覗いた、手前の感想を教えてくださいなぁ！"
51190-357 = "[ns] \"キキョウ……！\""
51190-358 = "何の騒ぎか気になって、来てみただけ。 "
51190-359 = "それだけ……のつもりだったんだけど。"
51190-360 = "……今の。"
51190-361 = "……！"
51190-362 = "あれが……ナグサ先輩の本心？"
51190-363 = "キキョウ、私は……"
51190-365 = "アハハッ！そうですよぉそうですよぉ！"
51190-366 = "今のがナグサちゃんの本音。百花繚乱のみ～んなが憧れた先輩の――本当の姿。"
51190-367 = "まったく……アヤメじゃないと～とかぁ、アヤメじゃない自分では無理～とか言い訳ば～っかりしてたけど。"
51190-368 = "本当はぜぇんぶ、ウソ！"
51190-369 = "幼馴染に釣り合う姿を演じていれば十分。#n幼馴染以外はどうだっていいと思ってたおバカさんが本当の姿なんですよぉ。"
51190-370 = "だから、ナグサちゃんは……あなた達から逃げようとしてるんです。#n失望されたくないから！"
51190-372 = "そんな、理由で……私たちから離れたんだ。"
51190-373 = "ナグサ先輩……。"
51190-378 = "キキョウ、レンゲ……違う……！"
51190-379 = "最初は、そんなつもりじゃ……私は、ただ……！"
51190-381 = "あらあらぁ？まだ言い訳するつもりなんだぁ？"
51190-382 = "手前さんは元からそんな人間だったでしょう？"
51190-383 = "醜い自分を知られるのが怖かっただけ。"
51190-384 = "後ろ指さされるくらいなら、逃げてしまえばいいって全部放り出したのに……まだ認められないんですぅ？"
51190-385 = "ほんと……ナグサちゃんって……"
51190-386 = "気持ち悪いですねぇ。"
51190-388 = "わ……私は……！"
51190-389 = "わたし、は……ただ……みんなに……！"
51190-391 = "先輩はさ……"
51190-392 = "[ruby=ごりょう]御稜[/ruby]ナグサ……あんた……。"
51190-396 = "ちが……"
51190-397 = "違う……アヤメは……"
51190-398 = "私はただ、アヤメを……！"
51190-400 = "あは、アハハッ！"
51190-401 = "あ～あ……バラバラになっちゃいましたねぇ？"
51190-402 = "アハッ……全部ぜ～んぶ、壊れてしまえばいい。"
51190-403 = "そうやって、お互いを罵り攻撃し、いがみ合って……"
51190-404 = "言葉で相手を傷つけてぇ……ウソで本音を隠して……"
51190-405 = "真実なんてぐちゃぐちゃに捨てて#n――虚実を「怪談」にしてしまいましょうよぉ？"
51190-406 = "そうすれば…… "
51190-407 = "ようやく手前らは……！"
51190-408 = "手前の[ruby=えが]描[/ruby]く、真の「風流」に――"
51190-412 = "[ns] \"ツバキ！\""
51190-413 = "うん、任せて。先生。"
51190-420 = "次回;花鳥風月部の怪談家（２）"
