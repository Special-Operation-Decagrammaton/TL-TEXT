[translation]
51190-1 = "Episódio 19; O Contador de Histórias do Clube Kacho Fugetsu (1)"
51190-4 = "Chamas ardentes — uma montanha de escombros."
51190-5 = "Caminhando pela cidade — espectros e aparições."
51190-7 = "Junto com o som que anuncia o início do festival —"
51190-12 = "— irei visitar vocês."
51190-18 = "— Então... finalmente começou, não é?"
51190-19 = "Vamos, mostrem-me."
51190-21 = "As \"Cem Histórias\" que vocês tecem —"
51190-37 = "[ns] \"Mesmo atacando tanto... não ter nem um arranhão...\""
51190-40 = "O que é aquilo...!#nNão sinto impacto nenhum!"
51190-42 = "Ahhh! Tem algo errado!?#nNão importa o quanto eu atire, não sinto que estou acertando nada!"
51190-43 = "Parece que está atravessando, né~"
51190-44 = "Sim... é como se estivéssemos enfrentando uma miragem..."
51190-46 = "— É inútil."
51190-47 = "[s] \"...Nagusa?\""
51190-50 = "Ataques comuns não funcionam contra aquilo."
51190-51 = "Hã, por que não!?"
51190-52 = "— Porque aquilo é... o \"Hyakumonogatari dos Espectros Fantasmagóricos\"."
51190-53 = "Uma \"História de Fantasmas\" criada pelo Clube Kacho Fugetsu a partir do livro proibido \"Ino Mononoke Roku\"."
51190-54 = "Por isso, balas comuns não significam nada para aquilo."
51190-55 = "Você me diz isso do nada e espera que eu acredite só porque sim...?"
51190-56 = "Bem, na verdade... as balas não passam, então acho que não tenho escolha a não ser acreditar...!"
51190-58 = "Então... se o que a Nagusa-san diz é verdade... significa que não há como derrotá-lo?"
51190-59 = "Não funcionar nada contra ele é trapaça! Que injusto!!"
51190-64 = "Não é que... não exista um jeito de derrotá-lo."
51190-65 = "[s] \"E que jeito seria esse?\""
51190-66 = "A única coisa que pode derrotar uma \"História de Fantasmas\" nascida de um livro proibido é...#nAlguém reconhecido pela Grande Profeta Kuzunoha —"
51190-67 = "Ou seja, apenas a presidente do Hyakka Ryoran que possui a \"Prova\"."
51190-68 = "[s] (Já ouvi uma história parecida... em algum lugar...)"
51190-70 = "Algo que apenas as presidentes sucessivas, que herdaram o cargo da Grande Profeta Kuzunoha, podem empunhar..."
51190-71 = "É a \"arma capaz de capturar fantasmas\"!"
51190-73 = "A prova, \"Byakuren\" — sem ela, não é possível causar nem um arranhão no Hyakumonogatari dos Espectros Fantasmagóricos."
51190-74 = "Então, nós não podemos fazer nada...?"
51190-75 = "...Sim. Não podemos fazer nada."
51190-76 = "...Por que a Nagusa-senpai sabe disso?"
51190-77 = "Eu... na grande planície nevada..."
51190-78 = "...Não, não é nada."
51190-79 = "Vamos fugir logo... se continuarmos assim, será tarde demais."
51190-80 = "Antes que isso aconteça... antes que se torne como daquela vez, rápido —"
51190-85 = "Mesmo assim, eu não quero que termine desse jeito!"
51190-90 = "Renge-chan?"
51190-95 = "Você está dizendo para eu ficar de braços cruzados assistindo, como daquela vez?"
51190-96 = "Não tem como eu fazer isso!"
51190-97 = "Nunca mais..."
51190-98 = "Eu odeio não poder fazer nada quando pedem ajuda...#nEu não quero desistir e dizer que \"esse é o nosso limite\"!"
51190-99 = "[s] \"Renge...\""
51190-100 = "Nagusa-senpai, você disse que quem tem a prova pode derrotá-lo."
51190-101 = "Então, a Nagusa-senpai não consegue fazer isso?#nA senpai é a presidente interina do Hyakka Ryoran, não é!?"
51190-107 = "Não, não é... eu...#nO meu braço direito já está..."
51190-108 = "Eu... não consigo."
51190-113 = "Não posso. Eu não tenho mais a 'Prova', e para a Kikyou..."
51190-114 = "Não... mesmo que eu a tivesse..."
51190-115 = "Eu não consigo fazer isso."
51190-116 = "Por que... por que não...?"
51190-121 = "Porque eu... não sou a Ayame."
51190-126 = "Ahahahahahaha!"
51190-127 = "Você entende muito bem, não é?"
51190-131 = "......Quem é você?"
51190-138 = "Ihi, ihihihi...! Resposta certa, certíssima! Como a Nagusa-chan disse!"
51190-139 = "Ora, o 'Kurokage' do Conto das Cem Sombras Fantasmagóricas é uma história de fantasmas nascida do livro bizarro 'Inou Mononokiroku'.#nVocês não conseguiriam nem arranhar o Kurokage, sabia?"
51190-140 = "......A menos que você seja a 'Ayame', que herdou a Prova do Grande Profeta, não é?"
51190-146 = "Não é mesmo? Você também conhece muito bem essa pessoa, não é?#nNé, Nagusa-chan?"
51190-147 = "Por que... por que você está aqui...!"
51190-148 = "Yabuki... Shuro."
51190-149 = "[s] \"Do Clube Kachou Fuugetsu...\""
51190-150 = "Ora, ora, ora~ que alegria! A Nagusa-chan e o Sensei do Schale... vocês se lembraram de mim? Estou emocionada!"
51190-151 = "E, e, deixe-me agradecer, Sensei.#nPor ter nos acompanhado até aqui..."
51190-152 = "E por ter ouvido a minha história... direitinho."
51190-153 = "Então, então, o que acharam?"
51190-154 = "A 'história de fantasmas' que preparei para vocês... foi do agrado de vocês?"
51190-159 = "......Não me diga que toda essa confusão foi...!"
51190-160 = "Foi obra sua?"
51190-161 = "Eh, sério!?#nAquela pessoa...!?"
51190-162 = "[ns] \"A responsável por invocar os monstros...\""
51190-164 = "Ahaha! Essa hostilidade, cautela... e raiva, tão frescas que chegam a arrepiar a pele."
51190-165 = "Eu gostei muito, muito mesmo!#nSim, eu adorei... demais!"
51190-167 = "Responda à nossa pergunta!"
51190-169 = "Sim, sim. Se essa é a pergunta de vocês, eu responderei."
51190-170 = "Permitam-me apresentar-me novamente."
51190-171 = "Eu sou Shuro――"
51190-172 = "Como vocês bem deduziram, fui eu quem invocou o Conto das Cem Sombras Fantasmagóricas aqui――"
51190-173 = "――Sou uma contadora de histórias de fantasmas do Clube Kachou Fuugetsu... chamo-me Yabuki Shuro. Prazer em conhecê-los."
51190-174 = "[s] \"'Contadora de histórias de fantasmas'...?"
51190-175 = "Aha... ahaha.#nCom essa cara de novo~?"
51190-176 = "Essa cara de tonta, como se não entendesse as palavras e não soubesse o que está acontecendo."
51190-177 = "Ahaha! É impressionante como vocês têm tanta hostilidade, mesmo sem entender nada..."
51190-178 = "É ótimo, é ótimo!#nEu gosto muito, muito mesmo dessa sua cara... é irresistível."
51190-179 = "......E o que eu mais gosto é... Aha!#nÉ você, Nagusa-chan."
51190-185 = "Desde a Grande Planície Nevada, não é?#nQuanto tempo faz desde o nosso último encontro?......Ihi."
51190-186 = "Eu me perguntava para onde você tinha fugido... quem diria que seria para Hyakkiyako."
51190-187 = "Bem, suponho que, no seu estado deplorável, este era o único lugar para onde você poderia voltar, não é?"
51190-188 = "Mas ainda assim―― não acha que está sendo cara de pau demais?"
51190-189 = "Você não queria voltar para a Hyakka Ryouran, queria?#nSendo que você queria fugir de lá mais do que tudo..."
51190-190 = "Sério mesmo... você não tem vergonha na cara."
51190-191 = "Do que você está falando... sua..."
51190-192 = "Uéé~?#nSerá que, por acaso, vocês não sabiam?"
51190-193 = "Nagusa-chan, você ainda estava escondendo isso deles?"
51190-198 = "Você ainda está contando 'mentiras'?"
51190-200 = "............!"
51190-202 = "Ahahahaha!!"
51190-203 = "A Nagusa ainda continua carregando o título de 'Hyakka Ryoran' e fingindo ser a vice-presidente, não é? Escondendo quem ela realmente é..."
51190-204 = "E pensar que eu sei muito bem o quão descarada e sem vergonha a Nagusa é..."
51190-205 = "Ninguém aqui sabia disso, não é?"
51190-207 = "Pa-pare..."
51190-209 = "Não sei quem você pensa que é, mas..."
51190-210 = "É melhor parar de zombar da Hyakka Ryoran."
51190-212 = "Que horror! Eu não estou zombando de ninguém... né, Nagusa?"
51190-213 = "Quer que eu conte no seu lugar? Não me importo nem um pouco!"
51190-214 = "Para a tímida da Nagusa...#ncontar a todos vocês a verdade que ela nunca conseguiu dizer é moleza, sabe?"
51190-215 = "Pare com isso..."
51190-216 = "Não quero!#nAlém do mais, foi você quem perguntou, não foi?"
51190-217 = "Você tem que responder às perguntas direitinho, sabe? Se não conseguir fazer isso, nunca será uma pessoa exemplar! Eu adoro responder perguntas."
51190-218 = "Então... eu vou te contar."
51190-222 = "A Nagusa dizia isso desde muito tempo atrás."
51190-224 = "“Eu não posso ser a presidente da Hyakka Ryoran”"
51190-228 = "“Porque eu não sou a Ayame”, “Eu não tenho qualificações para isso, já que não sou a Ayame”"
51190-229 = "Ayame, Ayame, Ayame...!#nSó sabe dar desculpas usando o nome da Ayame."
51190-230 = "Chega, pare com isso...!"
51190-231 = "Ahahahaha."
51190-232 = "Sério, chega de..."
51190-237 = "[log][ff4444]＜Mentira＞[-][/log]"
51190-240 = "[log][ff4444]＜Mesmo que você nunca tenha pensado dessa forma＞[-][/log]"
51190-246 = "Na verdade, não é por esse motivo, né?"
51190-247 = "Você está enfileirando palavras bonitas, mas... não é tudo mentira?"
51190-248 = "Você não conta para eles porque tem vergonha, não é?"
51190-249 = "Porque... dizer a verdade é assustador!"
51190-250 = "[s] \"Assustador...?\""
51190-251 = "Isso mesmo. Você tem medo que todos descubram, Nagusa."
51190-252 = "Por isso, esse seu coração feio..."
51190-253 = "Eu vou mostrar a todos com o meu 'Livro Estranho'."
51190-258 = "……!"
51190-273 = "Ei, você ouviu? Dizem que a presidente Ayame desapareceu."
51190-274 = "(Todos dizem)"
51190-275 = "O que vai acontecer com a Hyakka Ryoran agora? O cargo de presidente vai ficar vago, né?"
51190-281 = "(Todos conversam)"
51190-282 = "Mesmo sem a veterana Ayame, a Nagusa, que é tão talentosa e amiga de infância dela, ficou conosco!"
51190-284 = "Então está tudo bem!"
51190-288 = "(Vozes cheias de expectativa ecoam)"
51190-295 = "＜Não é verdade＞"
51190-296 = "(Este é o sentimento verdadeiro que eu não conseguia colocar em palavras)"
51190-299 = "……Eu não consigo fazer isso."
51190-304 = "(Para mim, que fui deixada para trás, esta arma é pesada demais)"
51190-305 = "Porque... eu..."
51190-309 = "Se continuar assim, vão descobrir quem eu realmente sou."
51190-310 = "Eu só estive fingindo ser a vice-presidente da Hyakka Ryoran."
51190-311 = "Sem talento ou habilidade, eu era apenas alguém que ficava ao lado da Ayame..."
51190-314 = "Eu, que não tenho nenhum valor."
51190-315 = "Eu, que sou entediante e feia."
51190-316 = "Eu, que não consigo fazer nada além de me satisfazer por estar ao lado da Ayame—"
51190-318 = "—Todos vão descobrir."
51190-319 = "Apenas alguém que estava lá por acaso..."
51190-321 = "Eu, que me escondi na sombra de Ayame e fugi."
51190-322 = "Todos apontam para mim e se decepcionam."
51190-325 = "— Estou com medo."
51190-326 = "Tenho medo que descubram a verdade."
51190-327 = "Antes que descubram a verdade..."
51190-329 = "[log]— Eu preciso fugir.[/log]"
51190-333 = "Ei, algo passou voando agora há pouco...!!"
51190-334 = "Você viu, né?"
51190-335 = "O que era aquilo...?"
51190-336 = "[s] \"Uma... cena do passado...?\""
51190-338 = "Isso é... da Nagusa-senpai...?"
51190-344 = "Como é, como é? Como você está se sentindo?"
51190-345 = "Qual é a sua impressão agora que deu uma espiada no coração da senpai que você tanto admira... por favor, me conte o que achou?"
51190-346 = "Então..."
51190-350 = "Estou falando com você aí no canto."
51190-351 = "Me diga o que você achou depois de ver o verdadeiro coração da senpai que você tanto criticou!"
51190-357 = "[ns] \"Kikyou...!\""
51190-358 = "Eu só vim porque fiquei curiosa com a confusão."
51190-359 = "Era só isso... era o que eu pretendia."
51190-360 = "— Isso de agora."
51190-361 = "...!"
51190-362 = "Aquele era... o verdadeiro coração da Nagusa-senpai?"
51190-363 = "Kikyou, eu..."
51190-365 = "Ahaha! É isso mesmo, é isso mesmo!"
51190-366 = "O que você viu agora é o verdadeiro sentimento da Nagusa-chan. A verdadeira face da senpai que todas da Hyakkiyako admiravam."
51190-367 = "Ela vivia dando desculpas, dizendo que 'não era como a Ayame' ou que 'não conseguiria sem a Ayame'."
51190-368 = "Mas, na verdade, era tudo mentira!"
51190-369 = "Ela só queria fingir que estava à altura da amiga de infância. A verdadeira face dela é a de uma tola que não se importava com mais ninguém além da amiga."
51190-370 = "É por isso que a Nagusa-chan... está tentando fugir de vocês. #nPorque ela não quer decepcioná-las!"
51190-372 = "Foi por esse motivo... que ela se afastou de nós."
51190-373 = "Nagusa-senpai..."
51190-378 = "Kikyou, Renge... não é isso...!"
51190-379 = "No começo, eu não tinha essa intenção... eu só...!"
51190-381 = "Ora, ora? Ainda pretende dar desculpas?"
51190-382 = "Você sempre foi esse tipo de pessoa, não foi?"
51190-383 = "Você só estava com medo de que descobrissem o quão desprezível você é."
51190-384 = "Você jogou tudo para o alto, pensando que era melhor fugir do que ser apontada pelos outros... e ainda não consegue admitir?"
51190-385 = "Sério... a Nagusa-chan é..."
51190-386 = "Tão nojenta."
51190-388 = "Eu... eu...!"
51190-389 = "Eu só... queria que todos...!"
51190-391 = "Senpai, você..."
51190-392 = "Goryou Nagusa... você..."
51190-396 = "Não..."
51190-397 = "Não é... Ayame, eu..."
51190-398 = "Eu só queria, Ayame...!"
51190-400 = "Ah, ahaha!"
51190-401 = "Ah... tudo se despedaçou, não é?"
51190-402 = "Ah... que tudo... que tudo se destrua de uma vez."
51190-403 = "É assim que vocês fazem, xingando e atacando uns aos outros, vivendo em conflito..."
51190-404 = "Ferindo o próximo com palavras... escondendo seus verdadeiros sentimentos com mentiras..."
51190-405 = "Jogando a verdade no lixo, toda bagunçada... #n— que tal transformarmos a realidade e a ficção em uma \"história de fantasma\"?"
51190-406 = "Se fizermos isso..."
51190-407 = "Finalmente vocês vão...!"
51190-408 = "Alcançar a verdadeira \"elegância\" que vocês tanto idealizam—"
51190-412 = "[ns] \"Tsubaki!\""
51190-413 = "Certo, pode deixar comigo, Sensei."
51190-420 = "Próximo episódio: O Contador de Histórias do Clube Kacho Fugetsu (2)"
