[translation]
2004706-1 = "作戦参謀の奇策"
2004706-2 = "（約束の時間ちょうどに到着した）"
2004706-7 = "待ってたよ、先生。"
2004706-8 = "[s] \"用事は片付いた？\""
2004706-9 = "問題ないよ。#nだから、心置きなく楽しめる。"
2004706-10 = "え？今日のやりたいことは何か、って？"
2004706-11 = "すぐに分かるよ。"
2004706-12 = "まず……今日は、胸の深さまで入ってみようと思うの。"
2004706-13 = "だから手伝ってくれる？"
2004706-14 = "[s1] \"ハーネスいる？\"\n[s2] \"あやとりの糸持ってくる？\""
2004706-17 = "何だって構わないから。"
2004706-18 = "[s] \"構わないの！？\""
2004706-19 = "あんたのそういうのは今に始まったことでもないし。"
2004706-20 = "いちいち騒ぐのもバカらしいな、って。"
2004706-21 = "じゃあ、ほら。"
2004706-25 = "手、出して。"
2004706-29 = "ふぅぅ……。"
2004706-30 = "[s3] \"大丈夫だよ。\"\n[s4] \"ちゃんと隣に居るからね。\""
2004706-36 = "……うん。よろしく。"
2004706-40 = "（その後、キキョウと一緒に海の中ではしゃいだ）"
2004706-42 = "ありがとう、先生。"
2004706-43 = "これからは一人でも海に入れると思う。"
2004706-44 = "手を離さないでいてくれたお陰かな。"
2004706-45 = "[s] \"どういたしまして。\""
2004706-46 = "そろそろ疲れてない？#nいったん休憩しようか。"
2004706-47 = "[s] \"私はまだ大丈夫だよ？\""
2004706-48 = "私はクタクタなのに。"
2004706-49 = "あんたはまだピンピンしてるわけ？"
2004706-50 = "[s5] \"あ！急に疲れが……！\"\n[s6] \"な、なんだか力が抜けてくるような……！\""
2004706-53 = "……そうよね？"
2004706-54 = "あんたも疲れたみたいだし、特別に用意した休憩所に案内してあげる。"
2004706-55 = "[s] \"もしかして、さっき言ってた「やること」って……。\""
2004706-56 = "ふふ、それは見てのお楽しみ。"
2004706-60 = "こっち。ついてきて。"
2004706-66 = "[ns] \"おぉ、これは……！\""
2004706-67 = "乗り方わかる？#nそう、そうやって、横になって。"
2004706-70 = "[wa:450]― [log=키쿄 수영복]どう？[wa:1240]なかなかじゃない？[/log]"
2004706-72 = "― [log=키쿄 수영복]今日のために作ったの。[/log]"
2004706-75 = "[wa:420]― [log=키쿄 수영복]ほら、[wa:1050]存分に楽しんで。[/log]"
2004706-78 = "[ns7] \"これいいね！\"\n[ns8] \"すごくいい感じだよ！\""
2004706-81 = "[wa:1200]― [log=키쿄 수영복]実は……[wa:1580]全部、[wa:970]初めてなんだ。[/log]"
2004706-84 = "[wa:500]― [log=키쿄 수영복]何かを作っているとき、[wa:1970]誰かの顔が[wa:1360]ずっと浮かぶのも。[/log]"
2004706-86 = "― [log=키쿄 수영복]無防備な姿を、[wa:1850]誰かに見せるのも。[/log]"
2004706-89 = "[wa:940]― [log=키쿄 수영복]別に……[wa:1350]誰とまでは言わないけど。[/log]"
2004706-92 = "[wa:860]― [log=키쿄 수영복]……これからも[wa:1380]私のそばにいて。[/log]"
2004706-94 = "― [log=키쿄 수영복]あんたの隣は、[wa:1790]私が守るから。[/log]"
2004706-97 = "[wa:730]― [log=키쿄 수영복]……この同盟は、[wa:1730]永遠だからね。[/log]"
2004706-100 = "（ハンモックに揺られながらのおしゃべりは、とめどなく続いた）"
