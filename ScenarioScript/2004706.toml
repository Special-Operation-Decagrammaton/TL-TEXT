[translation]
2004706-1 = "O estratagema da estrategista"
2004706-2 = "（Cheguei exatamente no horário combinado）"
2004706-7 = "Estava te esperando, Sensei."
2004706-8 = "[s] \"Terminou seus afazeres?\""
2004706-9 = "Sem problemas. #nPor isso, posso aproveitar sem preocupações."
2004706-10 = "Hã? O que eu quero fazer hoje, você pergunta?"
2004706-11 = "Você vai descobrir logo."
2004706-12 = "Primeiro... hoje, eu pretendo entrar na água até a altura do peito."
2004706-13 = "Então, pode me ajudar?"
2004706-14 = "[s1] \"Precisa de um colete?\"\n[s2] \"Quer que eu traga barbante para brincar de cama de gato?\""
2004706-17 = "Qualquer um dos dois serve."
2004706-18 = "[s] \"Qualquer um serve!?\""
2004706-19 = "Esse seu jeito não é de hoje."
2004706-20 = "Ficar fazendo alarde por isso é uma bobagem."
2004706-21 = "Então, vamos lá."
2004706-25 = "Dê-me a mão."
2004706-29 = "Ufa..."
2004706-30 = "[s3] \"Está tudo bem.\"\n[s4] \"Estarei bem aqui ao seu lado.\""
2004706-36 = "...Sim. Conto com você."
2004706-40 = "（Depois disso, brinquei no mar junto com a Kikyou）"
2004706-42 = "Obrigada, Sensei."
2004706-43 = "Acho que agora consigo entrar no mar sozinha."
2004706-44 = "Talvez seja graças ao fato de você não ter soltado minha mão."
2004706-45 = "[s] \"De nada.\""
2004706-46 = "Não está cansado? #nVamos fazer uma pausa?"
2004706-47 = "[s] \"Eu ainda estou bem, sabia?\""
2004706-48 = "E eu que estou exausta."
2004706-49 = "Você ainda está cheio de energia?"
2004706-50 = "[s5] \"Ah! De repente, o cansaço bateu...!\"\n[s6] \"E-estou sentindo minhas forças indo embora...!\""
2004706-53 = "...É mesmo, é?"
2004706-54 = "Já que você também parece cansado, vou te levar a um lugar de descanso que preparei especialmente."
2004706-55 = "[s] \"Será que o que você disse antes sobre 'o que fazer' era...\""
2004706-56 = "Fufu, é uma surpresa."
2004706-60 = "Por aqui. Me siga."
2004706-66 = "[ns] \"Uau, isso é...!\""
2004706-67 = "Sabe como subir? #nIsso, deite-se desse jeito."
2004706-70 = "[wa:450]― [log=키쿄 수영복]O que achou?[wa:1240] Não é nada mal, né?[/log]"
2004706-72 = "― [log=키쿄 수영복]Eu fiz isso especialmente para hoje.[/log]"
2004706-75 = "[wa:420]― [log=키쿄 수영복]Vamos,[wa:1050] aproveite à vontade.[/log]"
2004706-78 = "[ns7] \"Isso é ótimo!\"\n[ns8] \"Está muito bom!\""
2004706-81 = "[wa:1200]― [log=키쿄 수영복]Na verdade...[wa:1580] tudo isso,[wa:970] é a primeira vez para mim.[/log]"
2004706-84 = "[wa:500]― [log=키쿄 수영복]Enquanto eu fazia algo,[wa:1970] o rosto de alguém[wa:1360] não saía da minha mente.[/log]"
2004706-86 = "― [log=키쿄 수영복]E mostrar minha forma vulnerável,[wa:1850] para alguém.[/log]"
2004706-89 = "[wa:940]― [log=키쿄 수영복]Não que eu vá dizer...[wa:1350] quem é essa pessoa.[/log]"
2004706-92 = "[wa:860]― [log=키쿄 수영복]...Continue[wa:1380] ao meu lado daqui em diante.[/log]"
2004706-94 = "― [log=키쿄 수영복]Pois eu protegerei,[wa:1790] o seu lado.[/log]"
2004706-97 = "[wa:730]― [log=키쿄 수영복]...Essa aliança,[wa:1730] é eterna.[/log]"
2004706-100 = "（A conversa enquanto balançávamos na rede continuou sem parar）"
