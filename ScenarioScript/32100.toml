[translation]
32100-1 = "Episódio 10;2º Exame Especial de Aptidão (1)"
32100-2 = "Bom trabalho hoje também!"
32100-3 = "Amanhã é, enfim, o 2º Exame Especial de Aptidão!"
32100-4 = "Nessa semana de acampamento, a gente com certeza adquiriu o poder suficiente pra passar direitinho!"
32100-5 = "Sim."
32100-6 = "Sim♡"
32100-7 = "Isso mesmo!"
32100-8 = "[s] \"Sim, vocês se esforçaram de verdade.\""
32100-13 = "Agora é só passar direitinho na prova…… e se formar do Clube de Aulas de Reforço de cabeça erguida."
32100-14 = "Vamos provar direitinho que o estudo até agora não foi em vão!"
32100-15 = "E que, no fim, a gente possa se despedir todo mundo com um sorriso……!"
32100-19 = "……Ah, sei. Se passar, aí é a despedida……."
32100-20 = "P-peraí, Azusa!? Por que você fica sentimental assim de repente!?"
32100-21 = "Sei♡ Incluindo o acampamento, no fim das contas foi bem divertido mesmo, né?"
32100-22 = "……Sim. Não, mas, ainda assim, se há encontro, há despedida. Tudo é algo vão."
32100-23 = "……Não acho que precisa pensar até esse ponto. Incluindo você, Azusa, ninguém vai pra algum lugar longe só porque a prova acabou, né?"
32100-24 = "Mesmo que o Clube de Aulas de Reforço se dissolva, todo mundo continua na mesma academia. Quando quiser se ver, dá pra se ver logo, a qualquer hora."
32100-25 = "É-é isso! Eu tô sempre na sala do Comitê de Realização da Justiça! Q-quando tiver um tempo livre, é só aparecer……?"
32100-26 = "……Sim."
32100-30 = "É que, o sentimento é o mesmo, mas, por ora, passar na prova é a prioridade, digamos; sei lá, de repente virou tipo o final de um dorama de juventude……."
32100-31 = "E-enfim. Hoje, vamos descansar cedo e nos preparar pra prova de amanhã."
32100-32 = "Aliás, o local da prova de amanhã é o mesmo de antes?"
32100-33 = "Ah, é mesmo, eu ainda não vi o aviso."
32100-34 = "Deixa ver, o mural de Trinity……."
32100-35 = "……?"
32100-36 = "……Hã. Hãã!?"
32100-37 = "Hifumi? Aconteceu alguma coisa?"
32100-38 = "Hã, mentira!? É mentira, né!?"
32100-39 = "Deixa ver…… \"Aviso sobre alterações no 2º Exame Especial de Aptidão do Clube de Aulas de Reforço\"……?"
32100-40 = "\"A matéria da prova foi ampliada em cerca de três vezes em relação à anterior\"……?"
32100-41 = "Hãã!? Que é isso!?"
32100-42 = "\"Além disso, a nota de corte foi elevada de 60 para 90 pontos\"……?"
32100-43 = "E-eu mesma ainda nunca passei dos 90……."
32100-44 = "M-mas o que é isso……."
32100-45 = "Parece que foi publicado de repente ontem…… às vésperas da prova, uma coisa dessas……."
32100-46 = "[s] \"Isto é…….\""
32100-50 = "……."
32100-51 = "……Sei. Parece que a Nagisa, por algum meio, ficou sabendo do resultado do nosso simulado."
32100-52 = "Que jeito descarado…… quer, de todo jeito, nos expulsar, é."
32100-53 = "……Expulsar?"
32100-54 = "Hã, e-expulsar!? Peraí, como assim!?"
32100-55 = "[s] （……De um jeito ou de outro, já tá na hora de compartilhar, talvez）"
32100-56 = "Eu já pretendia contar essa história logo, mas…… antes disso, tem outras partes que também foram alteradas."
32100-57 = "Ah, o local e o horário da prova também mudaram…… o local da prova é \"Distrito autônomo de Gehenna, Área 15, Rua 77, 1º andar de um prédio abandonado\"……."
32100-58 = "……Gehenna?"
32100-59 = "V-vamos fazer a prova em Gehenna!?"
32100-60 = "P-por quê!? Por que fazer uma prova de Trinity em Gehenna!?"
32100-61 = "Se a gente não for, conta como não comparecimento e reprovação, né……."
32100-62 = "I-isso também, mas essa história de expulsão de agora, como assim!? É a primeira vez que eu ouço!"
32100-63 = "……."
32100-64 = "[s] Explica desde o começo."
32100-67 = "Reprovar três vezes na prova é expulsão……!?"
32100-68 = "……Sei."
32100-69 = "M-me desculpem por esconder…… eu nunca imaginei que ia dar nisso……."
32100-70 = "E-e agora, o que a gente faz……!? Se eu for expulsa, não consigo voltar pro Comitê de Realização da Justiça……!"
32100-71 = "Isso é……."
32100-72 = "……Compreendi a situação; enfim, vamos partir."
32100-73 = "Hã, hãã!?"
32100-74 = "O horário da prova diz \"às 3 da madrugada\". Se a gente não partir agora, não chega a tempo."
32100-75 = "Ah, de fato……!?"
32100-76 = "Seja pra se assustar, se irritar ou se desesperar…… isso não fica tarde depois de fazer a prova."
32100-77 = "Reclamar da quantidade de obstáculos não muda a situação. O importante é, mesmo assim, lutar até o fim."
32100-79 = "Auu……."
32100-80 = "U-uu……."
32100-81 = "……Pois é. É como a Azusa diz. Agora, só nos resta agir."
32100-82 = "De todo jeito, ufu…… parece divertido. Ir fazer prova em Gehenna é uma experiência inédita♡"
32100-83 = "Ai, francamente, não entendo nada de nada! E-enfim, é pra ir, né!?"
32100-85 = "Vamos partir logo; cada uma, não esqueçam o equipamento."
32100-86 = "Equipamento!? Armas de fogo!?"
32100-87 = "Pois é. O distrito autônomo de Gehenna já é uma terra sem lei de saída, e, agora, como é antes da assinatura do tratado, o Comitê Disciplinar provavelmente não está dando conta de tudo……."
32100-88 = "A-auu…… p-por que uma coisa dessas……."
32100-94 = "Vamos, Sensei."
32100-95 = "[s] \"Sim. Então, assim que estiver tudo pronto, partimos.\""
32100-98 = "Gehenna - Favela"
32100-99 = "Daqui em diante já é o distrito autônomo de Gehenna……."
32100-100 = "Hmm? Sei lá, umas caras que a gente não conhece?"
32100-101 = "Ignorar é frieza, hein; com tanta pressa, aonde é que vocês vão?"
32100-102 = "Uau, um clima clássico, tipo \"terra sem lei é isto\", né."
32100-103 = "É-é que, a gente tá a caminho de fazer uma prova……."
32100-104 = "……Hã? Prova? Você tá bem da cabeça?"
32100-105 = "B-bom, é o que dá pra esperar, né……."
32100-106 = "Bom, seja qual for o motivo, pra andar por esta região é preciso a nossa permissão!"
32100-107 = "Hm? Olhando bem, esse uniforme…… não é de Trinity?"
32100-108 = "……É sério. Uhu, umas mocinhas ricas num lugar desses. Ué, então, se a gente sequestrar essas aí, ganha um resgate gordo?"
32100-109 = "Ooh, boa ideia!"
32100-110 = "É-é, de novo esse tipo de situação……."
32100-111 = "……Perda de tempo."
32100-117 = "Só resta romper à força."
