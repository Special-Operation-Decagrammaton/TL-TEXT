[translation]
32100-1 = "Episódio 10; 2º Exame Acadêmico Especial (1)"
32100-2 = "Bom trabalho a todos hoje!"
32100-3 = "Amanhã é finalmente o dia do 2º Exame Acadêmico Especial!"
32100-4 = "Com este acampamento de uma semana, devemos ter adquirido habilidade suficiente para passar!"
32100-5 = "Sim."
32100-6 = "Sim♡"
32100-7 = "Com certeza!"
32100-8 = "[s] \"Sim, vocês realmente se esforçaram.\""
32100-13 = "Agora só precisamos passar no exame... e nos formarmos dignamente no Clube de Estudos Suplementares."
32100-14 = "Vamos provar de uma vez por todas que nossos estudos não foram em vão!"
32100-15 = "E, no final, para que possamos nos despedir com um sorriso no rosto...!"
32100-19 = "...Entendo. Se passarmos, então é o fim, não é..."
32100-20 = "Ei, ei, Azusa!? Por que você ficou tão melancólica de repente!?"
32100-21 = "Entendi♡ Mesmo com o acampamento e tudo mais, no fim das contas, foi muito divertido, não foi?"
32100-22 = "...Ah. Não, é que, mesmo assim, todo encontro tem uma despedida. Tudo é efêmero."
32100-23 = "...Acho que não precisa pensar tanto assim. Mesmo que o exame acabe, não é como se todas fossem para algum lugar longe, certo?"
32100-24 = "Mesmo que o Clube de Estudos Suplementares seja dissolvido, todas continuaremos na mesma escola. Se quisermos nos ver, podemos nos encontrar a qualquer momento."
32100-25 = "O-olha! Eu sempre estou na sala do Comitê de Justiça, então se... se você estiver livre, pode aparecer, sabe...?"
32100-26 = "...Sim."
32100-30 = "Bem, eu sinto o mesmo, mas primeiro precisamos focar em passar no exame. É que, de repente, parece que estamos no final de um drama adolescente..."
32100-31 = "De qualquer forma, vamos descansar cedo hoje para nos prepararmos para o exame de amanhã."
32100-32 = "Falando nisso, o local do exame de amanhã é o mesmo de antes?"
32100-33 = "Ah, agora que você mencionou, ainda não vi o aviso."
32100-34 = "Deixe-me ver, no mural de avisos da Trinity..."
32100-35 = "...?"
32100-36 = "...Eh. Eehhh!?"
32100-37 = "Hifumi-chan? Aconteceu alguma coisa?"
32100-38 = "Eh, mentira!? É mentira, né!?"
32100-39 = "Bem... \"Aviso sobre alterações no 2º Exame Acadêmico Especial do Clube de Estudos Suplementares\"...?"
32100-40 = "\"O conteúdo do exame foi expandido para cerca de três vezes a extensão original\"...?"
32100-41 = "Hã!? O que é isso!?"
32100-42 = "\"Além disso, a nota de corte foi aumentada de 60 para 90 pontos\"...?"
32100-43 = "M-mesmo eu, nunca tirei mais de 90 pontos..."
32100-44 = "O-o que significa isso..."
32100-45 = "Parece que foi postado de repente ontem... logo antes do exame, fazer algo assim..."
32100-46 = "[s] \"Isso é...\""
32100-50 = "..."
32100-51 = "...Entendo. Parece que a Nagisa-san descobriu os resultados dos nossos simulados de alguma forma."
32100-52 = "Que tática descarada... Ela realmente quer nos expulsar a todo custo."
32100-53 = "...Expulsar?"
32100-54 = "Eh, e-expulsão!? O que você quer dizer com isso!?"
32100-55 = "[s] (...De qualquer forma, talvez seja melhor compartilhar isso logo.)"
32100-56 = "Eu pretendia contar sobre isso em breve, mas... antes disso, há outras partes que foram alteradas."
32100-57 = "Ah, o local e o horário do exame também mudaram... O local é \"Distrito de Gehenna, Área 15, Rua 77, 1º andar das ruínas\"..."
32100-58 = "...Gehenna?"
32100-59 = "V-vamos fazer o exame em Gehenna!?"
32100-60 = "P-por que!? Por que faríamos um exame da Trinity em Gehenna!?"
32100-61 = "Se não formos, seremos consideradas ausentes e reprovadas, certo..."
32100-62 = "I-isso também, mas o que foi aquilo sobre expulsão agora pouco!? É a primeira vez que ouço falar disso!"
32100-63 = "..."
32100-64 = "[s] Vou explicar desde o início."
32100-67 = "Se reprovar três vezes no exame, serei expulsa...!?"
32100-68 = "……Entendo."
32100-69 = "De-desculpe por ter escondido isso... Eu nunca imaginei que as coisas chegariam a esse ponto……."
32100-70 = "O-o que eu devo fazer……!? Se eu for expulsa, não poderei voltar para o Comitê de Justiça……!"
32100-71 = "Isso é……."
32100-72 = "……Entendi a situação. De qualquer forma, vamos partir."
32100-73 = "Eh, eeh!?"
32100-74 = "O horário do exame está marcado para as 3 da manhã. Se não partirmos agora, não chegaremos a tempo."
32100-75 = "Ah, é verdade……!?"
32100-76 = "Seja para se surpreender, ficar com raiva ou se desesperar…… não será tarde demais para fazer isso depois de realizar o exame."
32100-77 = "Reclamar da quantidade de obstáculos não vai mudar a situação. O importante é lutar até o fim, apesar de tudo."
32100-79 = "Auu……."
32100-80 = "U, uuu……."
32100-81 = "……É verdade. A Azusa tem razão. Agora, não temos escolha a não ser agir."
32100-82 = "Além disso, fufu... parece interessante. É minha primeira vez indo fazer um exame em Gehenna♡"
32100-83 = "Ah, meu Deus, não entendo nada disso! En-então vamos logo, é isso!?"
32100-85 = "Vamos partir imediatamente, não esqueçam seus equipamentos."
32100-86 = "Equipamentos!? Armas de fogo!?"
32100-87 = "Sim. O distrito de Gehenna já é uma zona sem lei por natureza, e agora, com o Comitê de Disciplina ocupado com a assinatura do tratado, eles provavelmente não conseguirão lidar com tudo……."
32100-88 = "A, auuu…… po-por que as coisas terminaram assim……."
32100-94 = "Vamos, Sensei."
32100-95 = "[s] \"Certo. Então, vamos partir assim que estiverem prontas.\""
32100-98 = "Gehenna - Distrito das Favelas"
32100-99 = "A partir daqui, já estamos no distrito de Gehenna……."
32100-100 = "Hmm? Que pessoal estranho é esse que eu nunca vi antes?"
32100-101 = "Ignorar a gente é muita frieza, hein? Para onde vocês estão indo com tanta pressa?"
32100-102 = "Uau, é um estilo bem clássico de \"zona sem lei\", não é?"
32100-103 = "E-estamos a caminho de um exame……."
32100-104 = "……Hã? Exame? Vocês estão bem da cabeça?"
32100-105 = "Bem, era de se esperar que dissessem isso……."
32100-106 = "Bom, não importa o motivo, para andar por aqui vocês precisam da nossa permissão!"
32100-107 = "Hmm? Olhando bem, esse uniforme…… não é de Trinity?"
32100-108 = "……É mesmo. Uau, garotas ricas da elite por aqui. Espera, isso significa que se a gente sequestrar vocês, vamos ganhar um bom resgate?"
32100-109 = "Oh, ótima ideia!"
32100-110 = "A-ah, lá vamos nós de novo……."
32100-111 = "……Perda de tempo."
32100-117 = "Só nos resta abrir caminho à força."
