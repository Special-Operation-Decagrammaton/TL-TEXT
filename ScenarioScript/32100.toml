[translation]
32100-1 = "Episódio 10: 2ª Prova Especial (1)"
32100-2 = "Bom trabalho hoje também！"
32100-3 = "Amanhã é finalmente a 2ª Prova Especial！"
32100-4 = "Com essa semana de acampamento, com certeza adquirimos o nível necessário pra passar todas juntas！"
32100-5 = "Sim."
32100-6 = "Sim♡"
32100-7 = "Isso mesmo！"
32100-8 = "[s] \"É, vocês se esforçaram pra caralho.\""
32100-13 = "Agora é só passar na prova… e sair do Clube de Reforço de cabeça erguida."
32100-14 = "Vamos provar que todo esse estudo não foi em vão！"
32100-15 = "E no final, vamos nos despedir sorrindo……！"
32100-19 = "……É. Se passarmos, é adeus……"
32100-20 = "Ei, ei, Azusa！？ Por que você tá ficando toda melancólica do nada！？"
32100-21 = "Ufufu♡ O acampamento foi bem divertido no final das contas, né？"
32100-22 = "……Sim. Mesmo assim, encontro sempre tem despedida. Tudo é vaidade."
32100-23 = "……Não precisa pensar tão pesado. Mesmo depois do Clube de Reforço acabar, vamos continuar na mesma escola. Se quiser ver alguém, é só chamar."
32100-24 = "Olha！ Eu tô sempre na sala do Comitê de Execução da Justiça！ Se tiver tempo livre, pode passar lá……？"
32100-25 = "……Sim."
32100-30 = "Eh, eu sinto a mesma coisa, mas o mais importante agora é passar na prova… de repente virou um drama de juventude no finalzinho……"
32100-31 = "E-enfim. Hoje vamos dormir cedo pra estar preparadas pra prova de amanhã."
32100-32 = "Aliás, o local da prova de amanhã é o mesmo de antes？"
32100-33 = "Ah, é verdade, ainda não olhei o aviso."
32100-34 = "Uhm, no mural de Trinity……"
32100-35 = "……？"
32100-36 = "……Eh. EHH！？"
32100-37 = "Hifumi-chan？ O que houve？"
32100-38 = "Eh, mentira！？ Tá de brincadeira, né！？"
32100-39 = "Uhm…… «Aviso de alterações na 2ª Prova Especial do Clube de Reforço»……？"
32100-40 = "«Expansão do conteúdo em aproximadamente três vezes»……？"
32100-41 = "Hã！？ Que porra é essa！？"
32100-42 = "«E a nota mínima subiu de 60 pra 90 pontos»……？"
32100-43 = "Nem eu cheguei a 90 ainda……"
32100-44 = "Q-que merda é essa……"
32100-45 = "Foi atualizado ontem à noite…… bem em cima da prova, uma mudança dessas……"
32100-46 = "[s] \"Isso é……\""
32100-50 = "……。"
32100-51 = "……Entendi. Parece que a Nagisa-san descobriu nossos resultados dos simulados por algum meio."
32100-52 = "Que método descarado…… ela realmente quer nos expulsar."
32100-53 = "……Expulsar？"
32100-54 = "Eh, e-expulsão！？ Espera, como assim！？ Primeira vez que ouço isso！"
32100-55 = "[s] （……De qualquer forma, já tá na hora de contar tudo）"
32100-56 = "Eu ia explicar isso em breve…… mas antes, tem mais mudanças."
32100-57 = "Ah, o local e horário também mudaram…… o local é «Gehenna, Área 15, Rua 77, 1º andar do prédio abandonado»……"
32100-58 = "……Gehenna？"
32100-59 = "V-vamos fazer a prova em Gehenna！？"
32100-60 = "P-por quê！？ Por que uma prova de Trinity vai ser em Gehenna！？"
32100-61 = "Se não formos, conta como ausência e reprovação automática……"
32100-62 = "I-isso também, mas expulsão！？ Como assim！？"
32100-63 = "……。"
32100-64 = "[s] Explica tudo desde o começo."
32100-67 = "Se reprovar três vezes, expulsão……！？"
32100-68 = "……Entendi."
32100-69 = "D-desculpa por esconder…… nunca imaginei que ia chegar nisso……"
32100-70 = "O-o que a gente faz……！？ Se for expulsa, não posso voltar pro Comitê de Execução da Justiça……！"
32100-71 = "Isso é……"
32100-72 = "……Entendi a situação. De qualquer forma, vamos partir."
32100-73 = "Eh, ehh！？"
32100-74 = "O horário da prova é «3h da madrugada». Se não sairmos agora, não vamos chegar."
32100-75 = "A-ah, verdade……！？"
32100-76 = "Seja pra se surpreender, ficar brava ou desesperar…… isso tudo pode ser feito depois da prova."
32100-77 = "Reclamar dos obstáculos não muda nada. O importante é continuar lutando até o fim."
32100-79 = "Auuu……"
32100-80 = "U-uuu……"
32100-81 = "……É, como a Azusa-chan disse. Agora só nos resta agir."
32100-82 = "Mas, ufufu…… que interessante. Fazer prova em Gehenna, primeira vez♡"
32100-83 = "Ah, que merda, não tô entendendo nada！ E-enfim, vamos né！？"
32100-85 = "Vamos partir logo, não esqueçam o equipamento."
32100-86 = "Equipamento！？ Armas de fogo！？"
32100-87 = "Sim. Gehenna é uma zona sem lei, e com o Tratado de Eden prestes a ser assinado, o Comitê Disciplinar deve estar sobrecarregado……"
32100-88 = "A-auuu…… p-por que tá virando isso……"
32100-94 = "Vamos, Sensei."
32100-95 = "[s] \"Sim. Preparados, partimos.\""
32100-98 = "Gehenna - Favela"
32100-99 = "A partir daqui já é território de Gehenna……"
32100-100 = "Hm？ Que caras estranhos são esses？"
32100-101 = "Ignorar é falta de educação, hein？ Tá com tanta pressa pra onde vai？"
32100-102 = "Uau, clássico «zona sem lei» né."
32100-103 = "Eh, ehm…… estamos indo fazer uma prova……"
32100-104 = "……Hã？ Prova？ Tá bem da cabeça？"
32100-105 = "B-bom, faz sentido reagir assim……"
32100-106 = "De qualquer forma, pra andar por aqui precisa da nossa permissão！"
32100-107 = "Hm？ Olhando melhor, esse uniforme…… é de Trinity, né？"
32100-108 = "……É mesmo. Huu, as princesinhas ricas por aqui. Ei, se a gente sequestrar elas, deve dar um bom resgate, né？"
32100-109 = "Ooh, boa ideia！"
32100-110 = "C-como sempre vira isso……"
32100-111 = "……Perda de tempo."
32110-117 = "Só resta forçar a passagem."