[translation]
2300105-1 = "Vamos às compras mais uma vez!"
2300105-2 = "Sinto muito pelo transtorno que causei daquela vez..."
2300105-3 = "[s] \"Tudo bem, foi por minha causa, não foi?\""
2300105-4 = "Fufu... Sensei, você sempre diz coisas assim, não é?"
2300105-5 = "Ah, bem, não é sobre isso agora... Com base no fracasso da última vez, quero preparar uma hospitalidade especial hoje."
2300105-6 = "Sensei, você poderia vir às compras comigo hoje também?"
2300105-8 = "3ª Avenida do Mercado"
2300105-10 = "[ns] \"O que vamos comprar hoje?\""
2300105-11 = "Desde aquela época, eu fiquei pensando, e finalmente percebi."
2300105-12 = "Que simplesmente fazer muita comida não é a única resposta."
2300105-13 = "Pensei que seria melhor preparar algo mais especial para o Sensei."
2300105-14 = "Hoje, pretendo comprar ingredientes especiais para isso."
2300105-15 = "[s] \"Ingredientes especiais?\""
2300105-16 = "Fufu, é uma surpresa."
2300105-19 = "[ns] \"Aqui é uma peixaria?\""
2300105-20 = "Bem-vindos! Hoje também chegaram muitos produtos frescos! Dêem uma olhada!"
2300105-21 = "Uau, a cavala está fresca e o carapau também está na época, não é?"
2300105-22 = "Sensei! Sensei! Olhe este ouriço-do-mar!"
2300105-23 = "Como está tão fresco, parece que daria para colocar direto no arroz e comer agora mesmo!"
2300105-24 = "[s] \"Fuuka, acalme-se.\""
2300105-25 = "Ah, d-desculpe."
2300105-26 = "Sempre que vejo ingredientes tão frescos, eu acabo..."
2300105-27 = "Só de imaginar em que tipo de prato esses ingredientes vão se transformar, meu coração dispara..."
2300105-28 = "Ahaha... Será que sou um pouco estranha?"
2300105-29 = "[s] \"Não, é a sua cara, Fuuka.\""
2300105-30 = "Ehehe..."
2300105-32 = "Ah, essa cavala-da-areia também parece deliciosa se for grelhada."
2300105-33 = "Opa, a moça ali tem um bom olho!"
2300105-34 = "Hahaha! Sendo uma recém-casada e com esse olhar clínico, suas habilidades na cozinha devem ser incríveis! Não é?"
2300105-35 = "Hã!? R-recém-casada!?"
2300105-36 = "[s1] \"Ela não é recém-casada, é minha aluna.\"\n[s2] \"Sim, a Fuuka é a melhor recém-casada do mundo.\""
2300105-37 = "Hahaha! Não se preocupe com detalhes!"
2300105-38 = "De qualquer forma, é bom ter alguém que cuide de você, não é?"
2300105-39 = "P-pare com essas brincadeiras! Sensei!"
2300105-40 = "Então, o que a moça veio comprar hoje?"
2300105-41 = "Ah, vocês têm enguia?"
2300105-42 = "Enguia? Com certeza!"
2300105-43 = "Se você procura a loja com a melhor enguia de Kivotos, é aqui!"
2300105-44 = "[s] \"Enguia, de repente...?\""
2300105-45 = "Dizem que pratos de enguia são ótimos para dar energia, não é?"
2300105-46 = "Como o Sensei trabalha à noite e passa todas as noites em claro, parece que você está exausto."
2300105-47 = "Então, pensei em preparar um prato de enguia para o Sensei!"
2300105-48 = "Achei que essa seria a melhor coisa que eu poderia fazer agora."
2300105-49 = "Que inveja, ter alguém que se dedica tanto a você!"
2300105-50 = "Ora, ora, não tem jeito! Hoje vou te dar a melhor enguia da minha loja!"
2300105-51 = "Muito obrigada!"
2300105-52 = "Ah, claro, mesmo sendo a enguia da melhor qualidade, vou pagar o preço justo, viu?"
2300105-53 = "Essa aí não dá pra enganar!"
2300105-54 = "[s] \"Espere, Fuuka. Sobre esse tal prato de energia...\""
2300105-55 = "Uau, com essa enguia, com certeza vai ficar um prato maravilhoso!"
2300105-56 = "Fufu, qual seria a melhor forma de preparar isso?"
2300105-57 = "Será que um Hitsumabushi tradicional? Ou talvez apenas grelhado com sal, também parece delicioso!"
2300105-58 = "Quem diria que a senhorita seria tão proativa assim, desse jeito você não vai conseguir descansar à noite! Hahaha!"
2300105-59 = "Isso não pode, quando é hora de descansar, temos que descansar de verdade!"
2300105-60 = "Saúde em primeiro lugar, saúde em segundo lugar. Sensei, entendeu?"
2300105-61 = "Oh! Ficar preocupada até com esse tipo de coisa, isso é um amor bem caloroso, hein!"
2300105-62 = "A-amor, você diz? I-isso é..."
2300105-64 = "(Sem conseguir me intrometer na conversa dos dois, acabei comprando muitas enguias e voltando para casa)"
