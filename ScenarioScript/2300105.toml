[translation]
2300105-1 = "もう一度買い出しに行きましょう！"
2300105-2 = "あの時はご迷惑をおかけしてしまって、すみませんでした……。"
2300105-3 = "[s] \"大丈夫、私のためだったんでしょ？\""
2300105-4 = "ふふふ……先生はいつもそうやって、仰ってくださるんですね。"
2300105-5 = "あ、えっと、今はそうじゃなくて……前回の失敗を元に、今日は特別なおもてなしをしたいと思います。"
2300105-6 = "先生、今日も一緒に買い出しに行っていただけますか？"
2300105-8 = "市場3番街"
2300105-10 = "[ns] \"今日は何を買うの？\""
2300105-11 = "あの時以来、私、ずっと考えていたのですが、やっと気が付きました。"
2300105-12 = "単に料理をたくさん作ることだけが、正解ではないということに。"
2300105-13 = "先生のためには、もっと特別な料理を作った方がいいんじゃないかな、って。"
2300105-14 = "今日はそのための特別な食材を買うつもりなんです。"
2300105-15 = "[s] \"特別な食材？\""
2300105-16 = "ふふふ、どんなものかはお楽しみです。"
2300105-19 = "[ns] \"ここは、魚屋？\""
2300105-20 = "いらっしゃい！今日も新鮮な商品がたくさん入荷してるよ！ぜひ見てって！"
2300105-21 = "わあ、サバも新鮮ですし、アジも今が旬ですもんね！"
2300105-22 = "先生！先生！このウニ、見てください！"
2300105-23 = "こんなに新鮮でしたら、このまますぐご飯に乗せて食べても良さそうです！"
2300105-24 = "[s] \"フウカ、落ち着いて。\""
2300105-25 = "あっ、す、すみません。"
2300105-26 = "こういう新鮮な食材を見てしまうとつい……。"
2300105-27 = "こんな食材たちが、後々どんな料理になるのか、想像するだけで胸がときめいて……。"
2300105-28 = "あはは……やっぱり、ちょっと変ですかね？"
2300105-29 = "[s] \"ううん、フウカらしいよ。\""
2300105-30 = "えへへ……。"
2300105-32 = "あっ、このホッケも、焼いたら美味しそうですね。"
2300105-33 = "おっ、そこのお嬢ちゃんお目が高い！"
2300105-34 = "がっはっはっ！新妻で、そんなに見る目もあって、となると料理の実力も相当ありそうだな！そうだろう？"
2300105-35 = "はぃっ！？に、新妻ですか！？"
2300105-36 = "[s1] \"新妻じゃなくて、私の生徒です。\"\n[s2] \"はい、フウカは世界最強の新妻です。\""
2300105-37 = "わっはっはっ！細かいことは気にするなよ！"
2300105-38 = "とにかく、気にかけてくれる人がいるのは良いことに違いねぇだろ？"
2300105-39 = "じょ、冗談はよしてください！先生！"
2300105-40 = "それで、お嬢ちゃんは今日何を買いに来たんだい？"
2300105-41 = "あ、ウナギってありますか？"
2300105-42 = "ウナギかい？もちろん！"
2300105-43 = "キヴォトス最高のウナギを扱ってる店といやぁ、うちの店よ！"
2300105-44 = "[s] \"急にウナギ……？\""
2300105-45 = "ウナギ料理って、よくスタミナ料理っていうじゃないですか。"
2300105-46 = "先生は夜のお仕事で、毎晩徹夜でお疲れのようですので。"
2300105-47 = "そんな先生のために、ウナギ料理を振舞おうかと！"
2300105-48 = "それが今の私にできる、最善のことかなと思いまして。"
2300105-49 = "そんなに尽くしてくれる人がいるたぁ、羨ましいねぇ！"
2300105-50 = "やれやれ、しょうがねえ！今日はうちの店で一番最高のウナギを出してやるよ！"
2300105-51 = "ありがとうございます！"
2300105-52 = "あ、もちろんいくら最高級のウナギだと言っても、あくまで適正価格で購入させていただきますよ？"
2300105-53 = "こいつぁ敵わねぇな！"
2300105-54 = "[s] \"待って、フウカ。その、スタミナ料理っていうのは……。\""
2300105-55 = "わあっ、このウナギならきっと素晴らしい料理になりそうです！"
2300105-56 = "ふふ、どうやって料理するのがいいですかね？"
2300105-57 = "やっぱり正統派のひつまぶし？ただ塩で焼くだけでも美味しそうです！"
2300105-58 = "お嬢ちゃんがこんなに積極的だとはな、そんなんじゃ夜は休めないんじゃないのかい！がっはっはっ！"
2300105-59 = "それはダメです、休む時はちゃんと休まないと！"
2300105-60 = "一に健康、二にも健康。先生、分かりましたか？"
2300105-61 = "ほお！そんなところまで気にしてくれるなんて、熱々の愛だなぁ！"
2300105-62 = "あ、愛だなんて。そ、そんな……。"
2300105-64 = "（どうしても二人の会話に突っ込めないまま、たくさんのウナギを買って帰った）"
