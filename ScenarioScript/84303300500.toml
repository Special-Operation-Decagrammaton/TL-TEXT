[translation]
84303300500-5 = "Eu tenho algo que gostaria de perguntar..."
84303300500-6 = "P-por que...?"
84303300500-7 = "Hm...?"
84303300500-8 = "(Ela parece estar agindo de um jeito estranho)"
84303300500-9 = "Até ontem estava tudo bem...!"
84303300500-10 = "Você está bem?"
84303300500-11 = "Hã? Ah, não, é que..."
84303300500-12 = "Me desculpe... me desculpe! Nós não criamos isso com essa intenção...!"
84303300500-13 = "Acalme-se. Eu não pretendo te culpar."
84303300500-14 = "Parece que há uma confusão lá fora..."
84303300500-19 = "Poderia me explicar a situação?"
84303300500-20 = "U-uma briga começou agora pouco."
84303300500-21 = "Eu não sei o motivo... mas parece que eles começaram a brigar logo depois de jogar o nosso jogo."
84303300500-22 = "...Entendo."
84303300500-23 = "É estranho, o jogo que criamos não era para ser assim... quer dizer, ele é, mas ainda assim...!"
84303300500-24 = "Como uma briga dessas pôde acontecer...!"
84303300500-25 = "Fique aqui e descanse."
84303300500-26 = "Eu vou lá dar uma olhada."
