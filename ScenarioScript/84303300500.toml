[translation]
84303300500-5 = "聞きたいことがあるのだが……。"
84303300500-6 = "ど、どうして……？"
84303300500-7 = "うん……？"
84303300500-8 = "（なんだか様子が変だ）"
84303300500-9 = "昨日までは大丈夫だったのに……！"
84303300500-10 = "君、大丈夫か？"
84303300500-11 = "えっ？あっ、いやっ……。"
84303300500-12 = "ごめんなさい……ごめんなさい！私たちはこんな……こんなつもりで作ったんじゃなくて……！"
84303300500-13 = "落ち着いてくれ。君を責めるつもりはない。"
84303300500-14 = "外が騒がしいようだが……。"
84303300500-19 = "状況を教えてもらえないだろうか。"
84303300500-20 = "い、いま喧嘩が起きてるんです。"
84303300500-21 = "理由は分からないんですが……私たちのゲームを遊んだ後、急に喧嘩を始めたみたいで。"
84303300500-22 = "……なるほど。"
84303300500-23 = "変なんです、私たちが作ったのはこんなゲームじゃ……いや、そうだけど、でも……！ "
84303300500-24 = "こんな喧嘩が起こるなんて……！"
84303300500-25 = "ここで休んでいるといい。"
84303300500-26 = "私が様子を見てこよう。"
