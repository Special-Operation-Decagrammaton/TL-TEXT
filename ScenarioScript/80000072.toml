[translation]
80000072-1 = "Coração gentil"
80000072-2 = "Catedral - Caminho secreto do perímetro"
80000072-3 = "（Visitei a catedral em um horário em que o trabalho parecia estar mais calmo）"
80000072-10 = "Hum, hum~, hum, hum, hum, hum~♪"
80000072-11 = "……Pronto, acho que é isso. #nÉ muito bom quando tudo fica limpo, não é?"
80000072-12 = "Falando nisso, antigamente, o Sensei aparecia exatamente nessas horas e—"
80000072-13 = "[s1] \"Bom trabalho, Hinata.\"\n[s2] \"Levei um susto quando você se virou de repente.\""
80000072-19 = "……Se, Sensei!?"
80000072-20 = "Que susto, eu não esperava que você realmente viesse...!!"
80000072-21 = "Po, por acaso você ouviu o que eu estava cantarolando sozinha...? #nAh, que vergonha...!"
80000072-22 = "……? É, você acha?"
80000072-23 = "Se eu parecia estar feliz, provavelmente é porque, ... "
80000072-24 = "Na, nada, não é nada. Mas, afinal, você veio por algum motivo...?"
80000072-25 = "……Valentine?"
80000072-26 = "Ah, é, verdade! #nComo o dia chegou tão rápido...!"
80000072-27 = "Des, desculpe! #nEu pretendia me preparar com antecedência, mas acabei me perdendo no trabalho da catedral...!"
80000072-28 = "[s3] \"Desculpe, eu não vim aqui para cobrar nada...\"\n[s4] \"A Hinata é sempre muito esforçada, você é incrível.\""
80000072-29 = "Ah, muito obrigada... #nEu queria ter te dado algum presente, já que você veio até aqui..."
80000072-30 = "Ah, muito obrigada... #nEu queria ter te dado algum presente, já que você veio até aqui..."
80000072-34 = "……Ah! Po, por favor, espere um pouco!!"
80000072-41 = "……Des, desculpe a demora! Sensei, aqui está...!"
80000072-46 = "[ns5] \"Um chocolate redondo...?\"\n[ns6] \"Que adorável, não é?\""
80000072-47 = "Si, sim. É o que eu costumo distribuir para as crianças que vêm à catedral..."
80000072-48 = "Si, sim. É o que eu costumo distribuir para as crianças que vêm à catedral..."
80000072-49 = "Ah, não se preocupe, eu tenho bastante. Sinto muito por ser algo improvisado, mas pensei que, pelo menos, poderia te dar isso, então escolhi os sabores que achei que você gostaria...!"
80000072-50 = "……? #nAh, sim, é verdade. Eu já experimentei todos os tipos. #nPrecisava saber para poder atender ao gosto das crianças."
80000072-51 = "Não é que eu coma muito, na verdade..."
80000072-52 = "[s] \"A Hinata é realmente muito gentil.\""
80000072-53 = "Na, não, que isso! #nIsso é o mínimo, sim...!"
80000072-54 = "A, a propósito, Sensei, tem algum sabor que você não goste? #nEu acabei escolhendo vários tipos..."
80000072-55 = "……Entendo."
80000072-56 = "Fico aliviada...!"
80000072-57 = "Que bom..."
80000072-61 = "……Fufu."
80000072-63 = "（Depois disso, dividi os chocolates com a Hinata e nós os saboreamos）"
