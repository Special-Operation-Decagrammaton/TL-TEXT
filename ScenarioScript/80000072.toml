[translation]
80000072-1 = "優しい心"
80000072-2 = "大聖堂・外郭秘密の道"
80000072-3 = "（仕事が落ち着いてそうな時間に合わせて聖堂を訪れた）"
80000072-10 = "ふんふん～、ふんふん～ふんふふん～～♪"
80000072-11 = "……うん、こんなところでしょうか。#nやっぱり綺麗になると、スッキリしますね。"
80000072-12 = "そういえば以前、こういうタイミングで先生が来て――"
80000072-13 = "[s1] \"お疲れ様、ヒナタ。\"\n[s2] \"急に振り向かれてびっくりしたよ。\""
80000072-19 = "……せ、先生！？"
80000072-20 = "ビックリしました、まさか本当にいらっしゃるとは……！！"
80000072-21 = "も、もしかして先ほどのひとり言や鼻歌って……#nうぅ、は、恥ずかしい……！"
80000072-22 = "……？　そ、そうですかね？"
80000072-23 = "もし楽しそうに見えたとしたら、それはおそらく、……。"
80000072-24 = "い、いえ、何でもありません。ところで、今日は何かご用が……？"
80000072-25 = "……バレンタイン？"
80000072-26 = "はっ、そ、そうでした！#nいつの間に当日になって……！"
80000072-27 = "す、すみません！#n前もって準備しようと思ってたのに、聖堂の作業に夢中になって……！"
80000072-28 = "[s3] \"ご、ごめん、せがみに来たわけじゃなくて……。\"\n[s4] \"ヒナタは本当に、いつも頑張ってて偉いね。\""
80000072-29 = "あ、ありがとうございます……。#nせっかくなので、何かプレゼントをしたかったのですが……。"
80000072-30 = "あ、ありがとうございます……。#nせっかくなので、何かプレゼントをしたかったのですが……。"
80000072-34 = "……あっ！しょ、少々お待ちください！！"
80000072-41 = "……お、お待たせしました！先生、こちらを……！"
80000072-46 = "[ns5] \"丸いチョコ……？\"\n[ns6] \"何だか可愛らしいね？\""
80000072-47 = "は、はい。いつも、聖堂に来られる子どもたちに配っているものなのですが……。"
80000072-48 = "は、はい。いつも、聖堂に来られる子どもたちに配っているものなのですが……。"
80000072-49 = "あ、数は沢山ありますので、ご安心ください。ありあわせの物で申し訳ないのですが、せめてこれくらいはと思い、先生の好きそうな味を選んでみました……！"
80000072-50 = "……？#nあ、そ、そうですね。一応全種類食べたことはあります。#n子どもたちの好みに合わせるためにも、知っておく必要があったので。"
80000072-51 = "あまりその、普段から沢山食べるわけではないのですが……。"
80000072-52 = "[s] \"ヒナタは本当に優しいんだね。\""
80000072-53 = "い、いえ、そんなことは！#nこれくらいは、はい……！"
80000072-54 = "そ、そういえば、先生は苦手な味とか無いでしょうか？#n何種類か選んできてしまいましたが……。"
80000072-55 = "……そ、そうですか。"
80000072-56 = "安心しました……！"
80000072-57 = "良かった……。"
80000072-61 = "……ふふっ。"
80000072-63 = "（その後ヒナタと一緒に、チョコを分け合って美味しく頂いた）"
