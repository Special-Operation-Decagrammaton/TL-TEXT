[translation]
201010-1 = "Эпизод 1;Выходной главного администратора (1)"
201010-5 = "Давненько не виделись, Сенсей."
201010-6 = "...Хотя погодите, мы ведь только вчера встречались в Шале, верно?"
201010-7 = "[s1] «Сколько лет, сколько зим! Аои-тян!»\n[s2] «Я с нетерпением ждал, когда вы выйдете на связь, Аои»."
201010-13 = "...Ваше поведение не перестаёт меня удивлять, Сенсей. #nВас совсем не волнует, что подумают окружающие?"
201010-14 = Впрочем, неважно. #nЯ связалась с вами сегодня не в качестве сотрудника Генерального Студенческого Совета —"
201010-15 = "Да... можете считать это моей личной просьбой."
201010-16 = "Не могли бы вы уделить мне немного времени в эти выходные?"
201010-17 = "[s] «Это... приглашение на свидание?»"
201010-18 = "...."
201010-19 = "...."
201010-20 = ".........."
201010-21 = "...Я попрошу кого-нибудь другого."
201010-22 = "[s3] «П-погодите секунду!»\n[s4] «Дайте мне хотя бы выслушать вас!»"
201010-25 = "...Второго шанса не будет."
201010-26 = "Речь пойдёт о Рин-семпай... вернее, об администраторе Рин."
201010-27 = "Похоже, она слишком сильно себя изнуряет."
201010-28 = "Я уже какое-то время замечала тревожные звоночки, но... в последнее время всё стало совсем плохо."
201010-29 = "Она совершает ошибки, которых обычно никогда бы не допустила, у неё начались проблемы с кожей, она буквально валится с ног..."
201010-30 = "Ради слаженной работы Студенческого Совета я не могу просто закрыть на это глаза."
201010-31 = "[s] «У неё увеличился объём работы?»"
201010-32 = "Нет, если на то пошло, он скорее даже уменьшился."
201010-33 = "К тому же благодаря администратору Рин наше финансовое положение восстановилось примерно на 70% от своего пика."
201010-34 = "...Но ей, похоже, этого мало."
201010-35 = "С самого момента переворота она наотрез отказывается от отдыха. #nПолагаю, она чувствует, что обязана стать такой же, как Президент Генерального Студенческого Совета."
201010-36 = "Она работает без продыху уже несколько недель... #nИ не слушает, даже когда другие члены Совета просят её остановиться."
201010-37 = "Именно поэтому я обращаюсь к вам, Сенсей [USERNAME] —"
201010-38 = "Мне плевать, какие методы вы будете использовать. #nПросто сделайте так, чтобы в эти выходные она даже не думала о работе."
201010-41 = "Генеральный Студенческий Совет — Кабинет главного администратора"
201010-42 = "[ns5] «Ура! Мы проведём этот выходной вместе!»\n[ns6] «Рин-тян, Рин-тян! У тебя выходной!»"
201010-43 = "Выходной... говорите?"
201010-44 = "И кто вообще такая «Рин-тян»?"
201010-45 = "И кстати, вы сказали... выходной?"
201010-46 = "Мне он без надобности. #nЯ достаточно сплю и нормально питаюсь."
201010-47 = "Я внимательно слежу за своим здоровьем, чтобы это не мешало моим обязанностям. #nТак что причин для беспокойства нет."
201010-51 = "Похоже, вы единственная, кто так думает."
201010-52 = "В со вчерашних документах была мешанина из полуширинных и полноширинных символов."
201010-53 = "Вы разве не истощены? #nВ обычных обстоятельствах вы бы никогда не допустили ничего подобного, верно?"
201010-54 = "[s] «...Это правда такая большая проблема?»"
201010-55 = "Да, разумеется."
201010-56 = "Мы не можем допускать исключений. #nТакова уж природа официальных документов."
201010-57 = "...Прошу прощения. Мне следовало проверить их перед отправкой."
201010-58 = "Чтобы подобного больше не повторилось, я буду более бдительной —"
201010-59 = "Нет, то, что сейчас нужно администратору — это отдых."
201010-60 = "Вы работаете почти месяц без единого перерыва, не так ли? #nВполне естественно, что ваша концентрация падает."
201010-61 = "Я продлю срок сдачи финансового отчёта за этот триместр до следующей недели, так что, пожалуйста, отдохните в эти выходные."
201010-62 = "...Как я уже говорила, отдых не требуется."
201010-63 = "Благодаря всеобщим усилиям инфраструктура в основном восстановлена. #nОднако недоверие общественности к Генеральному Студенческому Совету до сих пор не искоренено."
201010-64 = "В такой обстановке, если я проявлю хоть малейшую слабость, найдутся те, кто попытается этим воспользоваться."
201010-65 = "[s] «Но разве Рин должна тащить всю работу на себе?»"
201010-66 = "...Президент Генерального Студенческого Совета поступила бы именно так."
201010-67 = "Прежде чем быть администратором, я являюсь заместителем, наделённым полномочиями Президента Генерального Студенческого Совета. #nЯ несу ответственность за всё, что происходит в её отсутствие."
201010-68 = "Однако... я обычный человек. #nЧтобы преодолеть разрыв между мной и Президентом Генерального Студенческого Совета, у меня нет иного выбора, кроме как постоянно трудиться."
201010-69 = "Семпай..."
201010-70 = "К тому же у меня уже есть планы на эти выходные. #nУ меня назначена встреча с ключевыми членами Чаепития в районе Тринити —"
201010-71 = "П-пожалуйста, оставьте это дело мне!"
201010-75 = "Аюму...?"
201010-80 = "Ну... эта встреча ведь касается того, как поступить с ученицей Геенны, задержанной на территории Тринити, верно?"
201010-81 = "Глава Дисциплинарного комитета Геенны как раз поручила мне разобраться с этим вопросом."
201010-82 = "Я и так планировала посетить Тринити по делам комнаты примирения. #nПредоставьте это мне, и, пожалуйста, наслаждайтесь своим выходным, семпай!"
201010-83 = "Раз уж так, то мне и правда незачем ехать в Тринити, но..."
201010-84 = "Есть и другие задачи, требующие внимания. #nЛогистика в порту Канесаки отстаёт от графика, возникли проблемы с транспортировкой —"
201010-86 = "Это из-за схода поезда с рельсов три дня назад, да? #nЯ уже скорректировала расписание поездов и всё уладила, так что можете об этом не беспокоиться."
201010-87 = "В эти выходные как раз выходит ограниченная серия картофельных чипсов, так что... #nЯ не хочу работать в свой выходной."
201010-91 = "Девочки..."
201010-92 = "...Похоже, у меня просто нет иного выбора, кроме как сделать перерыв."
201010-93 = "Хорошо. Я посвящу эти выходные отдыху."
201010-94 = "Но... вы и в прошлый раз так говорили, а сами потом сидели за бумагами в общежитии, не так ли?"
201010-95 = "Вам действительно нужно отдохнуть как следует."
201010-97 = "[ns] «Вот поэтому в эти выходные мы и идём на свидание, Рин-тян!»"
201010-98 = "Кто это тут идёт на свида—"
201010-102 = "...Прошу прощения. Кто такая «Рин-тян»? И при чём здесь свидание?"
201010-103 = "Вам совсем не стыдно говорить подобные вещи с такой лёгкостью?"
201010-104 = "Или вы со всеми студентами ведёте себя одинаково...?"
201010-105 = "[s7] «От студента к студенту бывает по-разному, но...»\n[s8] «Я просто хочу, чтобы ты смогла расслабиться, Рин»."
201010-111 = "...*Вздох*."
201010-112 = "Хорошо. В таком случае я проведу эти выходные с вами, Сенсей."
201010-113 = "Мне в любом случае было любопытно, как именно вы проводите свои свободные дни."
201010-114 = "[s] «Э, а почему...?»"
201010-115 = "Ходят слухи, что вы целыми днями ищете мелочь под торговыми автоматами или загораете прямо посреди дороги. #nВ этом есть хоть доля правды?"
201010-116 = "Вы вообще понимаете, о чём я говорю?"
201010-117 = "[s9] «Н-ну...»\n[s10] «В конце концов, это всего лишь слухи...»"
201010-120 = "Вот как... Надеюсь, что так оно и есть."
201010-121 = "Тогда встретимся перед зданием Генерального Студенческого Совета в субботу утром."
201010-126 = "И последнее —"
201010-127 = "Имейте в виду, это вовсе не свидание."
201010-129 = "Следующий эпизод;Выходной главного администратора (2)"