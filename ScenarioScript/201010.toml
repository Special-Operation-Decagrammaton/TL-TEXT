[translation]
201010-1 = "Episódio 1; O Dia de Folga da Administradora-Chefe (1)"
201010-5 = "Quanto tempo, Sensei."
201010-6 = "……Não, espere, nós nos vimos ontem no Schale, não foi?"
201010-7 = "[s1] \"Quanto tempo! Aoi-chan!\"\n[s2] \"Estava esperando ansiosamente pelo seu contato, Aoi-sama.\""
201010-13 = "……A atitude do Sensei sempre me surpreende. #nSerá que você não se importa com os olhares ao redor?"
201010-14 = "Bem, não importa. #nNão entrei em contato hoje como representante do Conselho Estudantil Federal, mas sim――"
201010-15 = "Pois é…… pode considerar isso um pedido pessoal."
201010-16 = "Você poderia me dar um pouco do seu tempo neste fim de semana?"
201010-17 = "[s] \"Por acaso…… é um convite para um encontro?\""
201010-18 = "……."
201010-19 = "……."
201010-20 = "………………."
201010-21 = "……Vou pedir para outra pessoa."
201010-22 = "[s3] \"Ei, espere um pouco!\"\n[s4] \"Pelo menos me deixe ouvir o que você tem a dizer!\""
201010-25 = "……Não haverá uma próxima vez."
201010-26 = "É sobre a Rin-senpai…… ou melhor, a Administradora Rin."
201010-27 = "Parece que ela está se sobrecarregando demais."
201010-28 = "Já dava para notar os sinais há algum tempo, mas…… ultimamente está especialmente grave."
201010-29 = "Ela está cometendo erros que nunca cometeria normalmente, a pele dela está péssima, ela está um caco……."
201010-30 = "Para o bom funcionamento do Conselho Estudantil, não posso simplesmente ignorar o estado dela."
201010-31 = "[s] \"A carga de trabalho aumentou?\""
201010-32 = "Não, na verdade até diminuiu."
201010-33 = "Além disso, graças à Administradora Rin, a situação financeira voltou a cerca de 70% do que era no auge."
201010-34 = "……Mas parece que ela não ficou satisfeita com isso."
201010-35 = "Desde o golpe de estado, ela não consegue descansar. #nProvavelmente, ela sente que precisa se tornar alguém como a Presidente do Conselho Estudantil Federal."
201010-36 = "Ela está trabalhando sem parar há semanas…… #ne nem mesmo os outros oficiais conseguem convencê-la."
201010-37 = "Por isso, peço a você, Sensei [USERNAME]――"
201010-38 = "Não me importa o método que você use. #nFaça com que a senpai não trabalhe neste fim de semana."
201010-41 = "Gabinete da Administradora-Chefe do Conselho Estudantil Federal"
201010-42 = "[ns5] \"Conseguimos! Vamos tirar uma folga juntos!\"\n[ns6] \"Rin-chan, Rin-chan! É dia de folga!\""
201010-43 = "Folga…… você disse?"
201010-44 = "Quem é \"Rin-chan\"?"
201010-45 = "Aliás, você disse…… folga?"
201010-46 = "Eu não preciso disso. #nEstou dormindo e me alimentando o suficiente."
201010-47 = "Tomo o máximo cuidado com a minha saúde para não prejudicar o trabalho. #nNão há motivo para preocupação."
201010-51 = "Você é a única que pensa assim."
201010-52 = "Nos documentos de ontem, havia uma mistura de caracteres de largura total e meia largura."
201010-53 = "Não seria cansaço? #nVocê normalmente nunca cometeria um erro desses, não é?"
201010-54 = "[s] \"……Isso é algo tão importante assim?\""
201010-55 = "Sim, claro que é."
201010-56 = "Não se pode abrir exceções. #nÉ assim que funcionam os documentos oficiais."
201010-57 = "……Peço desculpas. Deveria ter verificado antes de enviar."
201010-58 = "Para evitar que isso aconteça novamente, serei mais rigorosa daqui em diante――"
201010-59 = "Não, o que a Administradora precisa agora é de descanso."
201010-60 = "Você está trabalhando sem parar há quase um mês, não está? #nÉ natural que sua concentração caia."
201010-61 = "Vou adiar o prazo do relatório financeiro deste período para a próxima semana, então descanse bastante neste fim de semana."
201010-62 = "……Como eu disse anteriormente, não preciso de descanso."
201010-63 = "Graças aos esforços de todos, as instalações foram quase totalmente restauradas. #nNo entanto, a desconfiança dos cidadãos em relação ao Conselho Estudantil Federal ainda não foi totalmente superada."
201010-64 = "Nesse cenário, se mostrarmos qualquer brecha, certamente aparecerão pessoas querendo tirar proveito disso."
201010-65 = "[s] \"Mas, a Rin não precisa carregar todo o trabalho sozinha, precisa?\""
201010-66 = "……Se fosse a Presidente do Conselho Estudantil Federal, ela teria feito assim."
201010-67 = "Antes de ser uma administradora, sou uma substituta com poderes delegados pela Presidente do Conselho Estudantil Federal. #nToda a responsabilidade pelo que aconteceu durante a ausência dela recai sobre mim."
201010-68 = "Mas…… eu sou uma pessoa comum. Para preencher o abismo entre mim e a Presidente do Conselho Estudantil Federal, não tenho escolha a não ser me esforçar constantemente."
201010-69 = "Senpai……."
201010-70 = "Além disso, tenho um compromisso para este fim de semana. #nTenho uma reunião com os membros principais do Chá das Cinco no Distrito Autônomo de Trinity——"
201010-71 = "E-esse assunto, por favor, deixe comigo!"
201010-75 = "Ayumu……?"
201010-80 = "Bem…… essa reunião é sobre como lidar com a custódia dos estudantes de Gehenna que foram presos dentro do Distrito Autônomo de Trinity, certo?"
201010-81 = "Recebi uma delegação da Presidente do Comitê Disciplinar de Gehenna a respeito disso."
201010-82 = "E, de qualquer forma, eu já planejava visitar Trinity por causa do trabalho na Sala de Mediação. #nDeixe comigo e aproveite seu dia de folga, Senpai!"
201010-83 = "Se for esse o caso, não haverá necessidade de visitar Trinity, mas……."
201010-84 = "Há outras coisas que precisam ser feitas. #nA logística do Porto de Kanezaki está estagnada e há problemas com o transporte——"
201010-86 = "Isso é por causa do acidente de descarrilamento de três dias atrás, né? #nEu já ajustei os horários dos trens e resolvi, então não precisa se preocupar."
201010-87 = "É que vai sair uma batata frita de edição limitada no fim de semana~ #ne eu não quero trabalhar no meu dia de folga."
201010-91 = "Pessoal……."
201010-92 = "……Parece que não tenho como não descansar agora."
201010-93 = "Entendido. Vamos dedicar este fim de semana ao descanso."
201010-94 = "Mas…… você disse isso da última vez e acabou fazendo trabalho administrativo no dormitório, não foi?"
201010-95 = "Você precisa descansar de verdade."
201010-97 = "[ns] \"Por isso, este fim de semana vamos sair num encontro, Rin-chan!\""
201010-98 = "Quem disse que é um encontro——"
201010-102 = "……Com licença. Quem é Rin-chan? E o que é isso de encontro?"
201010-103 = "Você não tem vergonha de dizer algo tão levianamente?"
201010-104 = "Ou será que você trata as outras alunas da mesma forma……?"
201010-105 = "[s7] \"Depende da aluna, mas…….\"\n[s8] \"É que eu quero que a Rin relaxe um pouco.\""
201010-111 = "……Haa."
201010-112 = "Entendido. Então, vamos passar este fim de semana juntos, Sensei."
201010-113 = "Eu também queria verificar como o Sensei passa seus dias de folga."
201010-114 = "[s] \"Eh, por que……?\""
201010-115 = "Dizem que você fica vasculhando debaixo das máquinas de venda automática. Ou tomando sol no meio da rua…… #nSão esses os rumores."
201010-116 = "Você não tem nada a dizer sobre isso?"
201010-117 = "[s9] \"B-bem…….\"\n[s10] \"São apenas rumores, sabe…….\""
201010-120 = "É mesmo…… espero que seja isso."
201010-121 = "Então, por favor, nos encontraremos na frente do prédio do Conselho Estudantil Federal na manhã de sábado."
201010-126 = "E, por último——"
201010-127 = "Não é um encontro, está bem?"
201010-129 = "Próximo episódio: O Dia de Folga da Administradora Chefe (2)"
