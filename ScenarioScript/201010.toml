[translation]#[Texto Final. - Filipe 12/07.]
201010-1 = "Episódio 1; A Folga da Administradora-Chefe (1)"
201010-5 = "Quanto tempo, Sensei."
201010-6 = "……Não, esquece. A gente se viu ontem mesmo lá na Schale."
201010-7 = "[s1] \"Eu senti muito a sua falta, Aoizinha!\"\n[s2] \"Sabia que eu aguardava ansiosamente uma ligação sua, senhorita Aoi?\""
201010-13 = "……Sua atitude nunca deixa de me surpreender, Sensei.#nNão liga mesmo pros olhares ao redor?"
201010-14 = "Enfim, deixa pra lá.#nA ligação de hoje não é em nome do Conselho Estudantil Geral――"
201010-15 = "Pois é…… Pode encarar isso como um pedido pessoal, digamos."
201010-16 = "Será que você teria um tempinho livre neste fim de semana?"
201010-17 = "[s] \"Peraí…… isso é um convite pra um encontro?\""
201010-18 = "……"
201010-19 = "……"
201010-20 = "………………"
201010-21 = "……Vou procurar outra pessoa."
201010-22 = "[s3] \"E-Espera, não me descarta assim!\"\n[s4] \"Deixa eu pelo menos ouvir a suaproposta indecente primeiro!\""
201010-25 = "……Não vai ter uma próxima."
201010-26 = "É sobre a veterana Rin…… quer dizer sobre a Administradora Rin."
201010-27 = "Parece que ela tem se sobrecarregado demais."
201010-28 = "Os sinais já vinham aparecendo faz tempo……#nmas ultimamente tá bem pior."
201010-29 = "Os erros que ela nunca cometeria só aumentam,#ne a pele, coitada, tá ficando um caco……"
201010-30 = "Pelo bem do funcionamento do Conselho#nnão posso deixar ela nesse estado."
201010-31 = "[s] \"O trabalho aumentou?\""
201010-32 = "Não, na real até diminuiu."
201010-33 = "E graças à Administradora Rin, as finanças#njá voltaram a uns 70% do nosso auge."
201010-34 = "……Mas, pelo visto, isso não foi o bastante pra ela."
201010-35 = "Desde o golpe, ela mal tira descanso.#nAposto que acha que precisa ser igual#nà Presidente do Conselho Estudantil Geral."
201010-36 = "Já faz semanas que ela trabalha sem parar……#nE não escuta nenhuma das outras membras."
201010-37 = "Por isso esse pedido, Sensei [USERNAME]――"
201010-38 = "Não me importa que meios você vai usar.#nNeste fim de semana, não deixe a veterana trabalhar de jeito nenhum."
201010-41 = "Conselho Estudantil Geral - Gabinete da Administradora-Chefe"
201010-42 = "[ns5] \"Aêê! Folga pra nós dois!\"\n[ns6] \"Rinzinha, Rinzinha! Adivinha? É folga!\""
201010-43 = "Folga…… você disse?"
201010-44 = "Quem aqui é \"Rinzinha\"?"
201010-45 = "Enfim…… você disse \"folga\"?"
201010-46 = "Não necessito de folga.#nDurmo e me alimento o suficiente."
201010-47 = "Tomo o máximo de cuidado com a saúde para não comprometer o trabalho.#nNão há motivo para preocupação."
201010-51 = "Só você acha isso."
201010-52 = "No documento de ontem, você misturou caracteres de meia largura e largura total."
201010-53 = "Não seria cansaço?#nNormalmente, você jamais cometeria um erro desses, não é?"
201010-54 = "[s] \"……Isso é tão grave assim?\""
201010-55 = "Sim, claro."
201010-56 = "Não se pode abrir exceções.#nÉ isso que define um documento oficial."
201010-57 = "……Sinto muito. Eu deveria ter revisado antes de entregar."
201010-58 = "Para evitar reincidências, de agora em diante vou redobrar a atenção e――"
201010-59 = "Não. O que a Administradora precisa agora é de descanso."
201010-60 = "Você já trabalha há quase um mês sem folga, não é?#nÉ natural que a concentração caia."
201010-61 = "Vou estender o prazo do relatório financeiro do trimestre pra semana que vem.#nDescanse bem neste fim de semana."
201010-62 = "……Como eu disse, descanso é desnecessário."
201010-63 = "Graças ao esforço de todos, as instalações estão quase todas restauradas.#nPorém, a desconfiança dos cidadãos no Conselho Estudantil Geral ainda persiste."
201010-64 = "Se mostrarmos a menor brecha nesse cenário, surgirá quem queira se aproveitar dela."
201010-65 = "[s] \"Mas você não precisa assumir tudo sozinha, Rin.\""
201010-66 = "……É o que a Presidente do Conselho Estudantil Geral teria feito."
201010-67 = "Antes de Administradora, sou a substituta a quem a Presidente delegou a autoridade.#nTudo o que ocorre na ausência dela é responsabilidade minha."
201010-68 = "Mas…… eu sou comum. Para me aproximar da Presidente do Conselho Estudantil Geral#nsó me resta o esforço constante."
201010-69 = "Veterana……"
201010-70 = "Além disso, já tenho um compromisso.#nUma reunião no distrito autônomo de Trinity#ncom as principais integrantes do Tea Party――"
201010-71 = "E-Essa pode deixar comigo!"
201010-75 = "Ayumu……?"
201010-80 = "Er…… essa reunião é sobre o destino das alunas de Gehenna#n detidas no distrito autônomo de Trinity, não é?"
201010-81 = "Recebi plenos poderes da presidente#ndo Comitê de Disciplina de Gehenna para o caso."
201010-82 = "A-Além do mais, eu já ia visitar Trinity a trabalho pelo Departamento de Mediação.#nDeixe comigo e aproveite a folga, veterana!"
201010-83 = "Nesse caso, não haverá mais necessidade de eu ir a Trinity, porém……"
201010-84 = "Ainda há outras pendências.#nA logística do porto de Kanezaki está travada, e o transporte――"
201010-86 = "Aquilo é por causa do descarrilamento de três dias atrás, né?#nEu ajustei a grade dos trens e resolvi, então relaxa."
201010-87 = "É que sai um salgadinho de edição limitada no fim de semana~#nNão tô a fim de trabalhar na folga."
201010-91 = "Pessoal……"
201010-92 = "……Agora não tenho mais como recusar o descanso, não é?"
201010-93 = "Entendido. Dedicarei este fim de semana ao repouso."
201010-94 = "Mas…… da última vez você disse isso e foi fazer papelada no dormitório, não foi?"
201010-95 = "Precisamos que você descanse de verdade."
201010-97 = "[ns] \"Por isso neste fim de semana tem encontro, Rinzinha!\""
201010-98 = "Quem falou em encon――"
201010-102 = "……Perdão. Quem aqui é Rinzinha?#nE que história é essa de encontro?"
201010-103 = "Não tem vergonha de dizer essas coisas com tanta leviandade?"
201010-104 = "Ou será que trata as outras alunas do mesmo jeito……?"
201010-105 = "[s7] \"Depende da aluna……\"\n[s8] \"É que eu quero que você relaxe um pouco, Rin.\""
201010-111 = "……Haah."
201010-112 = "Está bem. Então passarei este fim de semana com você, Sensei."
201010-113 = "Até porque eu queria mesmo verificar uns boatos#nde como você costuma passar as suas folgas."
201010-114 = "[s] \"Ué, por quê……?\""
201010-115 = "Que você vasculha embaixo de máquinas de venda atrás de moedas.#nQue toma sol deitado de barriga pra cima literalmente no meio da rua……#nAndam circulando uns boatos assim."
201010-116 = "Nada disso soa familiar?"
201010-117 = "[s9] \"S-Sei lá……\"\n[s10] \"Boato é só boato, né……\""
201010-120 = "Entendo…… Tomara que seja só isso mesmo."
201010-121 = "Então nos vemos sábado de manhã#nem frente ao prédio do Conselho Estudantil Geral."
201010-126 = "Ah, e por último――"
201010-127 = "Não é um encontro, ouviu bem?"
201010-129 = "Próximo Episódio;A Folga da Administradora-Chefe (2)"