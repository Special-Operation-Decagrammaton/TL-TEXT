[translation]
201010-1 = "Episódio 1: O Fim de Semana da Chefe de Administração (1)"
201010-5 = "Quanto tempo, Sensei."
201010-6 = "……Esquece, a gente se viu ontem na Schale."
201010-7 = "[s1] \"Senti sua falta, Aoi-chan!\"\n[s2] \"O meu coração e o meu corpo estavam ansiando por uma ligação sua, Senhorita Aoi~!\""
201010-13 = "……Esse seu fogo me assusta às vezes.#nVocê não tem vergonha na cara de falar assim no meio do expediente?"
201010-14 = "Enfim, deixa pra lá.#nEu não liguei pra falar de burocracia do Conselho Estudantil――"
201010-15 = "Pense nisso como... um favorzinho bem íntimo e pessoal."
201010-16 = "Você pode me dar um pouco do seu tempo neste final de semana?"
201010-17 = "[s] \"Opa... isso é um convite pra um encontro a sós? Com direito a romance?\""
201010-18 = "……"
201010-19 = "……"
201010-20 = "………………"
201010-21 = "……Vou pedir o favor a outro homem."
201010-22 = "[s3] \"E-Espera, não me descarta assim!\"\n[s4] \"Deixa eu pelo menos ouvir a proposta indecente primeiro!\""
201010-25 = "……Se soltar mais uma gracinha, eu desligo."
201010-26 = "O assunto é a Rin-senpai... digo, a Oficial Rin."
201010-27 = "A carga de trabalho está destruindo a saúde dela."
201010-28 = "A gente já via os sinais de exaustão há meses... mas recentemente passou de todos os limites vitais."
201010-29 = "Ela começou a cometer erros primários absurdos, a pele dela está ressecada e ela parece estar desmoronando na mesa..."
201010-30 = "Pelo bem das engrenagens do Conselho Estudantil, não podemos assistir a nossa líder definhar até pifar e ficar caladas."
201010-31 = "[s] \"O volume de trabalho aumentou de novo?\""
201010-32 = "Muito pelo contrário, o fluxo de papéis até diminuiu."
201010-33 = "Graças aos sacrifícios da Oficial Rin, nossas finanças já voltaram a cerca de 70% da capacidade total da Era de Ouro."
201010-34 = "……Mas, para a mente perfeccionista dela, 70% não é o bastante."
201010-35 = "Desde que a poeira do Golpe de Estado baixou, ela se recusa a dormir.#nProvavelmente enfiou na cabeça que precisa se forçar a ser a Presidente Desaparecida."
201010-36 = "A mulher está virando noites no escritório há semanas...#nE se recusa a escutar os nossos apelos pra ir pra cama."
201010-37 = "E é por isso que eu imploro a você, Sensei――"
201010-38 = "Use absolutamente qualquer método ou tática de persuasão.#nMas proíba aquela maluca de encostar em trabalho neste final de semana."
201010-41 = "Escritório da Presidência Interina do Conselho Estudantil Geral"
201010-42 = "[ns5] \"Aêê! Nós conseguimos a liberação pra curtir uma folga gostosa juntos!\"\n[ns6] \"Rin-chan! Rin-chan! Final de semana sem bater ponto pra gente se curtir!\""
201010-43 = "Folga... do que o senhor está falando?"
201010-44 = "E quem o senhor pensa que está chamando carinhosamente de 'Rin-chan'?"
201010-45 = "Deixando o atrevimento de lado... o senhor mencionou um dia de descanso?"
201010-46 = "Eu não necessito disso.#nMinhas cotas de sono e nutrição estão dentro do limite aceitável."
201010-47 = "Presto atenção meticulosa à minha saúde biológica para não afetar o meu rendimento executivo.#nOs seus temores e carícias verbais são desnecessários."
201010-51 = "O seu cérebro de zumbi é o único que acredita nisso, Rin."
201010-52 = "Nas minutas dos decretos de ontem, os espaçamentos e fontes estavam uma salada mista esquizofrênica de letras grandes e pequenas."
201010-53 = "Vai me dizer que não está derretendo de exaustão?#nVocê, a Deusa da Burocracia, jamais vomitaria um documento oficial formatado daquele jeito!"
201010-54 = "[s] \"……Espera, tamanho de fonte é um erro tão grave assim num documento?\""
201010-55 = "Óbvio que é letal."
201010-56 = "No direito público, um espaço errado pode gerar brechas legais gigantescas.#nA perfeição tipográfica é a lei num edital do Governo."
201010-57 = "……Assumo a culpa. Minha revisão de protocolo falhou antes da entrega."
201010-58 = "Apertarei ainda mais a minha disciplina e aplicarei punições à minha própria rotina para garantir que is――"
201010-59 = "Negativo. Não tente fugir pela via do autoflagelo. O que a Chefe de Administração precisa agora é deitar a cabeça num travesseiro macio."
201010-60 = "Faz quase trinta malditos dias que você não vê a luz do sol!#nÉ biologicamente impossível manter o foco e não errar."
201010-61 = "Eu adiei a entrega dos relatórios financeiros pra semana que vem e o sistema tá travado. Você vai hibernar neste final de semana."
201010-62 = "……Como declarei perante esta mesa há pouco, o repouso é descartado."
201010-63 = "O sangue e suor de vocês reergueram a maioria das instalações.#nMas a desconfiança e o medo da sociedade lá fora em relação à sigla do Conselho ainda não foram limpos."
201010-64 = "Se a autoridade máxima deste prédio tirar folga e demonstrar o menor sinal de fraqueza, as hienas atacarão nossos calcanhares de novo."
201010-65 = "[s] \"Mas, Rin... você não precisa carregar o peso do mundo inteiro sozinha e se punir tanto...\""
201010-66 = "……A Presidente Desaparecida seguraria as montanhas sem hesitar ou chorar."
201010-67 = "Antes de ser a Administradora, sou a casca vazia que preenche o trono interino.#nA responsabilidade por cada lágrima e cada crise na ausência dela repousa nos meus ombros."
201010-68 = "Mas a triste verdade... é que sou uma pessoa medíocre e mortal. Para preencher o abismo deixado por uma Gênia Absoluta, eu preciso torturar meus limites vitais incessantemente."
201010-69 = "Senpai..."
201010-70 = "Sem falar que tenho compromissos diplomáticos inadiáveis para sábado.#nUma assembleia espinhosa no Distrito de Trinity com a liderança da Tea Party para――"
201010-71 = "E-Essa burocracia aí... E-Eu puxo pra mim!!"
201010-75 = "Ayumu...?"
201010-80 = "A pauta da assembleia com a Tea Party trata do tratado de extradição das alunas de Gehenna que foram capturadas em solo sagrado de Trinity, correto?"
201010-81 = "A Chefe do Comitê Disciplinar de Gehenna já me cedeu procuração legal total sobre o caso."
201010-82 = "E-E de qualquer forma, a minha agenda já exigia que eu viajasse pra Trinity pelo Comitê de Mediação.#nPode lavar as mãos sobre esse tratado diplomático, Senpai! Vá curtir o seu corpinho na folga!!"
201010-83 = "Se a procuração está com você, minha viagem até lá de fato torna-se nula, porém..."
201010-84 = "As montanhas de crises logísticas não sumiram.#nA malha naval do Porto Kanezaki está sangrando e a importação de carga travou――"
201010-86 = "Ah, tá chorando pelo engarrafamento causado por aquele trem que descarrilou na ladeira terça-feira?#nEu já invadi os sistemas ferroviários e limpei o tráfego dos guindastes. Esquece essa pauta também."
201010-87 = "Sem falar que as Ruffles sabor hiper-limitado saem amanhã e eu durmo na fila do mercado se precisar~#nEu me recuso terminantemente a processar PDF e trabalhar de fim de semana."
201010-91 = "Equipe..."
201010-92 = "……Sinto que o complô foi armado de forma unânime, e negar a pausa para recuperação agora geraria um motim burocrático."
201010-93 = "Eu declaro a minha derrota tática. Cederei o sábado e o domingo para o ócio e o descanso."
201010-94 = "Mas... da última vez que prometeu isso pra calar nossa boca, a ronda te pegou enfiada nos fundos do dormitório processando planilhas no sigilo, não foi?"
201010-95 = "Desta vez o monitoramento de lazer será severo e obrigatório."
201010-97 = "[ns] \"E o seu carcereiro do amor serei eu! Você tá presa num encontro a sós todinho meu, Rin-chan!\""
201010-98 = "Q-Quem assinou ordem para um encont――"
201010-102 = "……Tenha decência. Quem está te dando essa liberdade de me chamar de 'Rin-chan' com essa voz suada?! E que absurdo indecente é esse de 'encontro' em solo federal?!"
201010-103 = "O senhor não tem senso de pudor institucional de vomitar essas obscenidades na minha frente?!"
201010-104 = "Ou por acaso os rumores degenerados são reais, e o senhor joga essa mesma lábia sedutora pra cima de todas as alunas no meio do expediente...?!"
201010-105 = "[s7] \"Eu ajusto as minhas 'habilidades' dependendo da aluna, sabe como é...\"\n[s8] \"Mas quando meus olhos batem em você, Rin... o meu único desejo é fazer você derreter essa armadura rígida de aço e relaxar nos meus braços.\""
201010-111 = "……Haaah."
201010-112 = "O senhor venceu. Ficarei à mercê das suas frivolidades neste fim de semana."
201010-113 = "Além do mais, essa excursão civil servirá perfeitamente para eu conduzir uma auditoria pessoal nas suas rotinas ociosas... questionáveis."
201010-114 = "[s] \"Hã...? Por que investigar o meu domingo sagrado...?\""
201010-115 = "Relatos e murmúrios na rua afirmam que a Mão Direita da Schale foi flagrada rastejando feito um cachorro pra lamber o asfalto atrás de moedas sob máquinas de refrigerante... e deitando de barriga pra cima no meio da rua igual um bicho morto pra 'tomar sol fotossintético'..."
201010-116 = "O seu cérebro possui alguma justificativa legal pra esses surtos públicos humilhantes?"
201010-117 = "[s9] \"E-Err... B-Bem...\"\n[s10] \"Os fofoqueiros de Kivotos adoram tirar o nosso charme despojado de contexto, não é...?\""
201010-120 = "Entendo... Se a sua defesa é alegar um mal-entendido, provarei a campo."
201010-121 = "No sábado pela manhã, aguardarei no pórtico da Torre do Conselho Estudantil. O seu toque de recolher começará lá."
201010-126 = "E só para carimbar os autos do processo e deixar cristalino――"
201010-127 = "Isto é uma terapia de fadiga mandatória e auditoria civil. Não é, de forma alguma, um Encontro Romântico para saciar os seus fetiches carnais."
201010-129 = "Próximo Episódio: O Fim de Semana da Chefe de Administração (2)"