[translation]
201010-1 = "Episode 1;The Chief Administrative Officer's Day Off (1)"
201010-5 = "It's been a while, Sensei."
201010-6 = "...No, wait, we just met at Schale yesterday, didn't we?"
201010-7 = "[s1] \"Long time no see! Aoi-chan!\"\n[s2] \"I have been eagerly awaiting your contact, Aoi-sama.\""
201010-13 = "...Your attitude never ceases to surprise me, Sensei. #nAre you not concerned about the eyes of those around us?"
201010-14 = "Well, never mind. #nI didn't contact you today in my capacity as a member of the General Student Council—"
201010-15 = "Yes... you can consider this a private request."
201010-16 = "Could you spare some time this weekend?"
201010-17 = "[s] \"Is this... a date invitation?\""
201010-18 = "...."
201010-19 = "...."
201010-20 = ".........."
201010-21 = "...I'll ask someone else."
201010-22 = "[s3] \"W-wait a second!\"\n[s4] \"At least let me hear you out!\""
201010-25 = "...There won't be a next time."
201010-26 = "It's about Rin-senpai... or rather, Administrative Officer Rin."
201010-27 = "It seems like she's pushing herself too hard."
201010-28 = "I've seen the signs for a while now, but... it's been especially bad lately."
201010-29 = "She's making mistakes she would never normally make, her skin is breaking out, she's just falling apart..."
201010-30 = "For the sake of the smooth operation of the Student Council, I can't just leave her in that state."
201010-31 = "[s] \"Is her workload increasing?\""
201010-32 = "No, it's actually decreased, if anything."
201010-33 = "Besides, thanks to Administrative Officer Rin, our financial situation has recovered to about 70% of its peak."
201010-34 = "...But it seems that wasn't enough for her."
201010-35 = "Ever since the coup, she refuses to take a break. #nI suppose she feels she must become like the General Student President."
201010-36 = "She's been working non-stop for weeks now... #nShe won't listen even when the other officers tell her to stop."
201010-37 = "That is why I am asking you, [USERNAME] Sensei—"
201010-38 = "I don't care what means you use. #nJust make sure she doesn't do any work this weekend."
201010-41 = "General Student Council - Chief Administrative Officer's Office"
201010-42 = "[ns5] \"You did it! We're taking a break together!\"\n[ns6] \"Rin-chan, Rin-chan! It's a day off!\""
201010-43 = "A day off... you say?"
201010-44 = "And who is 'Rin-chan'?"
201010-45 = "By the way, did you say... a day off?"
201010-46 = "I have no need for one. #nI am getting enough sleep and food."
201010-47 = "I am paying close attention to my health so as not to hinder my duties. #nThere is nothing to be concerned about."
201010-51 = "You're the only one who thinks that."
201010-52 = "The documents from yesterday had a mix of half-width and full-width characters."
201010-53 = "Aren't you just exhausted? #nYou would never do something like that under normal circumstances, would you?"
201010-54 = "[s] \"...Is that really such a big deal?\""
201010-55 = "Yes, of course it is."
201010-56 = "We cannot allow exceptions. #nThat is the nature of official documents."
201010-57 = "...I apologize. I should have checked them before submission."
201010-58 = "To prevent this from happening again, I will be more vigilant—"
201010-59 = "No, what the Administrative Officer needs right now is rest."
201010-60 = "You've been working for nearly a month without a break, haven't you? #nIt's only natural that your concentration is slipping."
201010-61 = "I'll extend the deadline for this term's financial report until next week, so please get some rest this weekend."
201010-62 = "...As I said before, rest is unnecessary."
201010-63 = "Thanks to everyone's efforts, the facilities have mostly been restored. #nHowever, the public's distrust of the General Student Council has yet to be wiped away."
201010-64 = "In such a climate, if I show even the slightest opening, there will be those who try to exploit it."
201010-65 = "[s] \"But, doesn't Rin have to carry all the work herself?\""
201010-66 = "...The General Student President would have done so."
201010-67 = "Before I am an Administrative Officer, I am a proxy delegated with authority by the General Student President. #nI am responsible for everything that has happened in her absence."
201010-68 = "However... I am an ordinary person. #nTo bridge the gap with the General Student President, I have no choice but to strive constantly."
201010-69 = "Senpai..."
201010-70 = "Besides, I have a prior engagement this weekend. #nI have a meeting with the key members of the Tea Party in the Trinity District—"
201010-71 = "P-please leave that matter to me!"
201010-75 = "Ayumu...?"
201010-80 = "Well... this meeting is about how to handle the Gehenna student arrested within the Trinity District, right?"
201010-81 = "I have been delegated to handle this matter by the Gehenna Prefect Team leader."
201010-82 = "I was originally planning to visit Trinity for mediation room business anyway. #nLeave it to me, and please enjoy your day off, Senpai!"
201010-83 = "If that is the case, there would be no need for me to visit Trinity, but..."
201010-84 = "There are other things that must be done. #nLogistics at Kanesaki Port are lagging, and there is a problem with transport—"
201010-86 = "That's because of the derailment three days ago, right? #nI already adjusted the train schedule and fixed it, so you don't need to worry about it."
201010-87 = "Limited edition potato chips are coming out this weekend, so... #nI don't want to work on my day off."
201010-91 = "Everyone..."
201010-92 = "...It seems I have no choice but to take a break now."
201010-93 = "Understood. I will dedicate this weekend to rest."
201010-94 = "But... you said that last time, and then you did office work in the dorms, didn't you?"
201010-95 = "You really need to get some proper rest."
201010-97 = "[ns] \"That's why we're going on a date this weekend, Rin-chan!\""
201010-98 = "Who is going on a date—"
201010-102 = "...Excuse me. Who is 'Rin-chan'? And what is this about a date?"
201010-103 = "Are you not embarrassed to say such things so lightly?"
201010-104 = "Or do you treat all the other students the same way...?"
201010-105 = "[s7] \"It varies from student to student, but...\"\n[s8] \"I just want you to be able to relax, Rin.\""
201010-111 = "...*Sigh*."
201010-112 = "Understood. Then, I shall spend this weekend with you, Sensei."
201010-113 = "I have been curious about how you spend your days off, anyway."
201010-114 = "[s] \"Eh, why...?\""
201010-115 = "Rumor has it that you spend your time digging under vending machines or sunbathing in the middle of the road. #nIs there any truth to that?"
201010-116 = "Do you have any idea what I'm talking about?"
201010-117 = "[s9] \"W-well...\"\n[s10] \"They're just rumors, after all...\""
201010-120 = "Is that so... I hope that is the case."
201010-121 = "Then, let's meet in front of the General Student Council building on Saturday morning."
201010-126 = "And one last thing—"
201010-127 = "It is not a date, mind you."
201010-129 = "Next Episode;The Chief Administrative Officer's Day Off (2)"