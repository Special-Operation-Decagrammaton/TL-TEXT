[translation]
102140-1 = "第14話;「トリニティ」自治区防衛（２）"
102140-2 = "こちらは、おおかた片付きましたね……"
102140-3 = "いや、まだ何かが――"
102140-5 = "セイアさん……？"
102140-6 = "避難できていない市民が居る……あれはおそらく、遺跡地帯の辺りだろうか。"
102140-7 = "マシロ、遺跡地帯を確認してください。何か異変はありますか？"
102140-8 = "はい、先輩。今確認します―― "
102140-12 = "――！！遺跡の聖堂付近で、避難できていない市民と生徒を確認しました！"
102140-13 = "そ、んな……！？"
102140-28 = "あ、あれ……？#nですが、中にいるのは……"
102140-36 = "うう……！"
102140-57 = "はぁ、はぁ……"
102140-62 = "も、もう少しでハスミ先輩と正義実現委員会が助けに来るから……#nあとちょっと……我慢……"
102140-64 = "コハルが一人で……！？#nどうして……！？"
102140-65 = "コハルちゃんが閉じ込められてるの……？#n一体どこに！？"
102140-66 = "コハルは避難誘導に投入されたはずですが……#nどこですれ違ってしまったのでしょう……いえ、私がそちらに向かいます！"
102140-68 = "はい、先輩！私も今から向かいます！！#nで、ですが、敵の数が多すぎます……"
102140-69 = "至急、支援兵を遺跡に送ってください！"
102140-93 = "あ、あうう……"
102140-97 = "こ、こっち来ないで……！！"
102140-106 = "う、うぅ……"
102140-113 = "はいはーい！ちょ～っと失礼するね。"
102140-116 = "へっ、か、壁が……？"
102140-122 = "あれは……裏切り者のミカ！？"
102140-123 = "魔女がどうしてここに……！？"
102140-126 = "コハルちゃんがここに居るって聞いて、ダッシュで来ちゃった☆"
102140-127 = "あ、えっと……そ、その……ティーパーティーの……"
102140-131 = "コハルちゃん大丈夫？怪我は無い？#n――いや、怪我してるね。"
102140-132 = "……あ……こ、これはちょっとした擦り傷で……"
102140-133 = "……そっか。"
102140-144 = "あなた達が、やったんだ……本当さぁ……もう……"
102140-148 = "……私の大切な[ruby=・   ・   ・]お友達[/ruby]に、一体何してるの？"
