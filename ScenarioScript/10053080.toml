10053080-9 = "...... Você está falando sério? \r\n"
10053080-14 = "Não é realmente um fantasma. ......? "
10053080-15 = "Vou lhe contar mais sobre isso em detalhes, com fotos. Antes de tudo, quero que você dê uma olhada nisto. \fr00000000000000}"
10053080-20 = "............. \r\n\r\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n"
