[translation]
10053080-1 = "第8話;宇宙人グレイ"
10053080-3 = "みんな、待たせたね。鑑定の結果が出たよ。"
10053080-4 = "……あれ、コノカ君は？\r\n"
10053080-5 = "幽霊だって言いながら部屋に引きこもってる。\r\n"
10053080-6 = "それなら連れてきてくれるかい？結論から言うと――あれは幽霊じゃない。"
10053080-7 = "コノカ、聞いたでしょ！？早く降りてきなさいよ！！\r\n"
10053080-8 = "あまり責めないであげてほしい。#nコノカ君は繊細なんだから、我々が守ってあげなければ。"
10053080-9 = "……本気で言ってる？\r\n"
10053080-14 = "本当に幽霊じゃない……？\r\n\r\n\r\n\r\n\r\n"
10053080-15 = "詳しい話は写真を見ながら説明するよ。まずはこれを見てほしい。\r\n\r\n\r\n"
10053080-20 = "…………。\r\n\r\n\r\n\r\n\r\n"
10053080-21 = "…………。\r\n\r\n\r\n"
10053080-22 = "……何も写ってないけど？\r\n\r\n\r\n\r\n"
10053080-27 = "そう、吾輩も最初はそう思った。"
10053080-28 = "だが、この隅。草むらのところを拡大すると――\r\n"
10053080-29 = "白っぽい影……？"
10053080-33 = "これはコノカ君が窓を開けた直後に撮れたものだ。#nピントが合っていないせいで形は崩れているが、吾輩は確信している。"
10053080-34 = "この残像こそ、事件の黒幕にして、我々を監視していた未知の存在……#nXの正体に違いないと！\r\n\r\n"
10053080-35 = "そして……まだ推測の域を出ないが、その正体は高い確率で――"
10053080-37 = "「グレイ」だ！\r\n\r\n"
10053080-43 = "いや、どっちかって言うとホワイトじゃない？\r\n\r\n\r\n\r\n"
10053080-44 = "グレイってのは宇宙人の一種のこと。色の話じゃないの。\r\n\r\n"
10053080-45 = "で、あれがグレイってどういうこと？\r\n"
10053080-50 = "疑問はもっともだ。突拍子もないと思うだろう。だが最後まで聞いてほしい。\r\n"
10053080-51 = "まず、我々が寝ている間に誰かが窓の外から覗いていた。#nこれは、宇宙人による誘拐の典型的な前兆現象のひとつなんだ。"
10053080-52 = "多くの被害者が、監視されている気がしたと証言する。だが実際の姿は捉えられない。#n……今回の状況、まさに一致していると思わないかね？\r\n"
10053080-53 = "いや、それはただの被害妄想なんじゃ……。\r\n"
10053080-54 = "だが我々は実際に目撃した。#n先生を含めて3人も同時に被害妄想を起こすだなんてあり得ない。"
10053080-55 = "……そうなの？"
10053080-56 = "[s1] \"本当に宇宙人かは分からないけど……。\"\r\n[s2] \"誰かがいたのは確かだね。\""
10053080-59 = "でもさ、集団ヒステリーって例もあるし。\r\n"
10053080-60 = "だからこそ、この写真が証拠になる。これは否定できない物的証拠だ。#n光の反射やノイズで片づけるには、あまりに形がはっきりし過ぎている。\r\n"
10053080-61 = "そして吾輩は、もう1つの仮説にたどり着いた。"
10053080-62 = "宇宙人には無音で超高速移動する技術がある。#n実際、多くのUFO目撃談に共通して語られる特徴だ。\r\n"
10053080-63 = "それって……宇宙人が私たちを監視してて、窓を開けた瞬間、超スピードで逃げたってこと？"
10053080-64 = "音がしなかったのも、その宇宙の技術があったから？"
10053080-65 = "現時点では、それ以外の説明がつかない。\r\n\r\n"
10053080-67 = "いや、つくでしょ！？飛躍してるにも程があるって！\r\n"
10053080-68 = "そもそもツチノコは宇宙人の偵察ドローンだって言ってたよね？#n監視するならそれ使えばいいじゃん。まずは世界観の設定から統一してよ！！\r\n\r\n\r\n"
10053080-73 = "じゃあ幽霊じゃないってこと？はぁ～ホッとした～\r\n"
10053080-77 = "ほんと、幽霊さえ出なきゃ何でもいいんだ……。\r\n"
10053080-78 = "でもよく考えてくれ。#n我々がここに来てから起きた出来事は、説明の難しい超常現象ばかりだった。"
10053080-79 = "それぞれに別の理由があると考えるよりも、ひとつの大きな原因があると考える方が合理的じゃないかね？"
10053080-80 = "言いたいことは分かるけど……。\r\n"
10053080-84 = "いや、それでも信じない！この目で宇宙人を見るまでは絶対に信じないから！\r\n"
10053080-85 = "先生もそうでしょ！？先生は私の味方だよね！？"
10053080-86 = "[ns3] \"とりあえず、この近くに誰かいるなら。\"\r\n[ns4] \"まずはヴァルキューレに通報すべきだろうね。\""
10053080-90 = "たしかに、それはそうね。相手が誰であれ危険なのは間違いないし。\r\n"
10053080-91 = "待て、それは危険だ。下手に通報すれば、連邦生徒会が証拠隠滅を図るかもしれない。#nこれまでに報告されていたはずのUFOの証拠みたいに。"
10053080-92 = "陰謀論まで乗っけないで！もういいよ、私が電話するから。"
10053080-96 = "…………。"
10053080-101 = "あれ……繋がらない……。コンセントちゃんと刺さってる？"
10053080-102 = "問題ないけど？"
10053080-103 = "じゃあなんで……？"
10053080-109 = "まさか……！？\r\n\r\n"
10053080-116 = "……やはり。吾輩の想定した最悪のシナリオ通りだ。"
10053080-121 = "所長、手に持ってるそれは？"
10053080-122 = "電話線だよ。"
10053080-123 = "いや、正確には――「切断された」電話線だ。"
10053080-124 = "……は？\r\n"
10053080-125 = "電話線が切られたということは、いよいよ最終段階――つまり！"
10053080-135 = "もう遅かったか……！\r\n"
10053080-140 = "え、ちょっと！？さっきまで普通に渡れたじゃない！\r\n\r\n"
10053080-141 = "なんで橋が切れてるの！？\r\n\r\n"
10053080-145 = "みんな落ち着いて聞いてくれ。"
10053080-146 = "吾輩の推測では、この橋は誰かが意図的に壊した。"
10053080-147 = "それは電話線を切った犯人、我々を監視していた何者かと同一、もしくはその仲間だろう。\r\n"
10053080-148 = "目的は明白。我々を孤立させるためだ。"
10053080-149 = "なんで？誰が何のために！？\r\n"
10053080-150 = "……我々が、ツチノコを探しているからだろう。"
10053080-151 = "ツチノコが宇宙人の偵察ドローンなのであれば、その正体を暴こうとしている我々「調査班X」こそ宇宙人にとって最大の脅威！"
10053080-152 = "もしかすると我々は史上もっともツチノコの核心に迫っているのかもしれない……！\r\n"
10053080-153 = "その設定で押し通すのやめようよ……。\r\n"
10053080-155 = "な、なに今の光！？"
10053080-156 = "UFOだ！UFOが現れたんだ！"
10053080-157 = "う、嘘でしょ……本当に宇宙人……？"
10053080-160 = "……いや、あれどっかで見覚えあるな。\r\n"
10053080-161 = "ああ、照明弾だ。\r\n"
10053080-162 = "うん？\r\n"
10053080-165 = "公安局の副局長がオカルト好きって噂は本当だったんだな！\r\n\r\n"
10053080-166 = "行くぞ！見せてやれ、うちらの本気を！\r\n"
10053080-171 = "なにこれ、どういう状況？\r\n\r\n"
10053080-172 = "彼女たちは……宇宙人には見えないね。\r\n\r\n"
10053080-173 = "当たり前でしょ！どうするの！？\r\n"
10053080-178 = "……ふーん、なるほど。やっと話が分かりやすくなってきたな。\r\n"
10053080-182 = "お前らぁ！一人残らず逮捕だ！！！！"
