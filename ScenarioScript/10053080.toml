10053080-33 = "Esta foto foi tirada logo após o Sr. Konoka abrir a janela. A #nA forma está fora de foco, mas tenho certeza disso."
10053080-34 = "Essa imagem residual deve ser a identidade da entidade desconhecida ......#nX, o cérebro por trás do incidente e aquele que está nos observando! \r\n\r\n"
10053080-35 = "E ...... ainda é uma questão de conjectura, mas há uma grande probabilidade de que sua verdadeira identidade seja..."
10053080-37 = "'Cinza'! \r\n\r\n"
10053080-43 = "Não, está mais para branco, não é? "
10053080-44 = "O cinza é um tipo de alienígena. Não se trata de cor. \r\n\r\n"
10053080-45 = "E o que você quer dizer com cinza? \r\n"
10053080-50 = "A pergunta é plausível. Ela parecerá estranha. Mas me ouça. \r}n"
10053080-51 = "Primeiro, enquanto estávamos dormindo, alguém estava espiando pela janela. #nEsse é um dos fenômenos precursores típicos de abduções alienígenas."
10053080-52 = "Muitas vítimas testemunham que sentiram que estavam sendo observadas. Mas o número real nunca é registrado. #Não acha que essa situação, desta vez, está exatamente de acordo com a situação? \r11}"
10053080-53 = "Não, isso é apenas paranoia. ...... \r}n"
10053080-54 = "Mas nós realmente testemunhamos isso. É impossível que três pessoas, incluindo o Dr. #n, sejam paranóicas ao mesmo tempo."
10053080-55 = "...... É isso mesmo?"
10053080-56 = "[s1] \"Não sei se são realmente alienígenas, mas ....... \"\r\n[s2] \"Tenho certeza de que havia alguém lá. \""
10053080-59 = "Mas, você sabe, há exemplos de histeria em massa. \r}n"
10053080-60 = "É por isso que essa fotografia é uma evidência. Essa é uma evidência física inegável. A forma é nítida demais para ser apagada por #n reflexos de luz ou ruído. \r}n"
10053080-61 = "E cheguei a outra hipótese."
10053080-62 = "Os alienígenas têm a tecnologia para viajar silenciosamente e em velocidades muito altas. #De fato, essa é uma característica comum mencionada em muitos avistamentos de OVNIs. \r}n"
10053080-63 = "Isso significa que ...... alienígenas estavam nos observando e, no momento em que abrimos a janela, eles fugiram em supervelocidade?"
10053080-64 = "O fato de não haver som se deve à tecnologia daquele universo?"
10053080-65 = "No momento, nenhuma outra explicação é possível. \r\n\r\n"
10053080-67 = "Não, está ligado, não está! Ele disse que é um salto muito grande! \fr\n"
10053080-68 = "Em primeiro lugar, você disse que o Aardvark era um drone de reconhecimento alienígena. Se você quer fazer #n-vigilância, por que não usa isso? Antes de tudo, você precisa unificar o cenário mundial! "
10053080-73 = "Então você está dizendo que não é um fantasma? Estou tão aliviada."
10053080-77 = "Realmente, vale tudo, desde que não seja assombrado. ...... \r\n"
10053080-78 = "Mas pense nisso. #nTudo o que aconteceu desde que chegamos aqui foi paranormal, o que é difícil de explicar."
10053080-79 = "Não é mais razoável presumir que há uma causa principal, em vez de cada uma ter um motivo separado?"
10053080-80 = "Entendo o que você quer dizer. ...... \r\n"
10053080-84 = "Não, eu ainda não acredito! Porque nunca acreditarei em alienígenas até que eu os veja com meus próprios olhos! \r\n"
10053080-85 = "Você também é um sensei! O sensei está do meu lado, não está?"
10053080-86 = "[ns3]\"Por enquanto, se houver alguém por aqui. \"\r\n[ns4]\"Provavelmente deveríamos chamar a Valkyrie primeiro. "
10053080-90 = "Sim, isso é verdade. Quem quer que sejam, eles são definitivamente perigosos. \r}n"
10053080-91 = "Espere, isso é perigoso. Se você relatar mal, o Corpo de Cadetes Federais pode tentar destruir as evidências. #nComo as evidências de OVNIs que deveriam ter sido relatadas até agora."
10053080-92 = "Nem entrem na teoria da conspiração! Já chega, vou ligar para eles."
10053080-96 = "............."
