10053080-150 = "...... provavelmente porque estamos procurando por aardvarks."
10053080-151 = "Se o Aardvark é um drone de reconhecimento alienígena, então nós, da Equipe de Investigação X, que estamos tentando descobrir sua verdadeira identidade, somos a maior ameaça para os alienígenas!"
10053080-152 = "Talvez estejamos mais próximos do coração do aardvark do que em qualquer outro momento da história. ...... \r\n"
10053080-153 = "Não vamos prosseguir com essa configuração. ...... \r}n"
10053080-155 = "O que, o que era aquela luz!"
