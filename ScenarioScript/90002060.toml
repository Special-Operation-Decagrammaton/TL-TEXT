[translation]
90002060-1 = "Episódio 6: Malkuth"
90002060-9 = "Sensei! Os Labor e as tropas de Decagrammaton estão indo na sua direção!"
90002060-10 = "[s] \"Nós também já percebemos! Eimi, quero ouvir sua opinião.\""
90002060-11 = "Estabeleçam uma linha de defesa. Vou voltar o mais rápido que puder."
90002060-16 = "……Ah, esquece o que eu disse. Encontrei um destacamento inimigo. Provavelmente batedores. #nVou acabar com eles e já volto."
90002060-17 = "[s] \"Não se machuque, entendeu...?\""
90002060-18 = "Está preocupado comigo? Que fofo."
90002060-19 = "Não tem jeito. Eu também vou para o campo de batalha para que o Sensei possa se preocupar comigo."
90002060-20 = "……Não, Toki, você não tem que proteger o Sensei? O que faremos se algo acontecer com ele?"
90002060-21 = "É verdade. Nesse caso, escolherei a opção que me permite ficar mais tempo ao lado do Sensei."
90002060-22 = "O que a Alice e as outras devem fazer……?"
90002060-23 = "……Vamos confiar na Eimi. Acho que o melhor a fazer é continuarmos com a ocupação deste local."
90002060-24 = "Eu também acho que essa é a opção mais racional."
90002060-25 = "Felizmente, a construção do sistema já está quase concluída."
90002060-26 = "……Hm?"
90002060-27 = "[s] \"Kei?\""
90002060-28 = "Nós…… estávamos analisando esta área, não estávamos?"
90002060-29 = "Algum problema?"
90002060-30 = "Não muito longe daqui, parece haver uma estrutura…… algum tipo de instalação."
90002060-34 = "Uma estrutura, você diz?"
90002060-35 = "Que tipo de instalação seria?"
90002060-36 = "Alguma ruína abandonada há muito tempo?"
90002060-37 = "Você esqueceu que o Continente de Aço foi criado há pouco tempo?"
90002060-38 = "Seja lá o que for, o fato de ser uma \"estrutura\" é o que importa. #nTalvez possamos usá-la como base de defesa."
90002060-39 = "É mais seguro do que ficar aqui, onde estamos expostos. Vamos investigar."
90002060-46 = "……."
90002060-47 = "……."
90002060-48 = "O-onde estamos……?"
90002060-49 = "Alice…… sabe. #nLugares como este costumam esconder itens raros……!"
90002060-53 = "[ns] \"Parece ser algum tipo de…… laboratório de pesquisa.\""
90002060-54 = "……Concordo plenamente."
90002060-55 = "Por enquanto, vou enviar as coordenadas daqui para a Eimi."
90002060-60 = "……O que é aquilo?"
90002060-64 = "Isso…… não se parece com elas?"
90002060-65 = "E em tanta quantidade……"
90002060-66 = "É como olhar para espécimes…… Ugh, que sensação ruim……"
90002060-67 = "Neste tubo de vidro…… tem algo escrito."
90002060-72 = "\"DEFECTED\"……? #nSe for traduzir literalmente, significa \"defeituoso\"."
90002060-73 = "……."
90002060-74 = "Acho que não."
90002060-75 = "Como assim?"
90002060-76 = "Provavelmente――"
90002060-77 = "\"Com defeito\" seria mais preciso."
90002060-78 = "Com defeito……?"
90002060-89 = "Acabei de começar a análise, mas já descobri algumas coisas."
90002060-90 = "Primeiro, não há problemas com o funcionamento. #nSe transplantarmos algum tipo de circuito de consciência, elas estarão prontas para agir imediatamente."
90002060-91 = "Então, apesar de terem recebido o \"selo\" de defeituosas, o estado delas é bom."
90002060-92 = "Porém, o problema é a segurança dos corpos."
90002060-93 = "Pelo que a Kei verificou…… elas estão protegidas por um tipo de bloqueio."
90002060-94 = "É um incômodo, mas não é uma tecnologia desconhecida para mim."
90002060-95 = "Se tivermos tempo, acho que conseguiremos romper..."
90002060-100 = "Opa, estão todos bem?#nVim como me pediram, mas que lugar é este?"
90002060-101 = "Eimi! Que bom que está bem! Bem, este lugar é..."
90002060-106 = "...O que será isso?"
90002060-107 = "Alice!?"
90002060-108 = "Alice-chan!?"
90002060-109 = "Pelo que parece, estamos investigando isso, não é?"
90002060-110 = "Montei uma linha de defesa com os AMAS do lado de fora da instalação."
90002060-111 = "Sim, eu confirmei. Derrotei as unidades de reconhecimento inimigas, então acho que estaremos seguros por um tempo."
90002060-116 = "[ns] \"O quê!?\""
90002060-122 = "Lá fora! A linha de defesa dos AMAS foi... destruída!?"
90002060-123 = "Por que...? Eu deveria ter derrotado os inimigos próximos..."
90002060-124 = "Em vez de pensar, vamos verificar logo!"
90002060-129 = "A-aaaaahhh!?"
90002060-130 = "Irmã, você está bem?"
90002060-131 = "P-Sensei, ali...!"
90002060-133 = "[ns] \"Hã...?\""
90002060-134 = "Aquilo é...?"
90002060-141 = "(Um indivíduo que vejo pela primeira vez. Mas aquelas características são, sem dúvida, do Decagrammaton... Será possível?)"
90002060-142 = "...Malkuth?"
90002060-143 = "Malkuth!?"
90002060-146 = "Como esperado, você é quem mais sabe sobre nós."
90002060-147 = "Aquela que persegue as estrelas — Rio."
90002060-148 = "!?"
90002060-149 = "Himari."
90002060-150 = "Eimi, Toki."
90002060-151 = "A Chave dos Deuses Sem Nome."
90002060-152 = "...Digo, meu nome é..."
90002060-153 = "Não se pode mudar o que já nasceu definido. Não concorda?"
90002060-154 = "...!!!"
90002060-155 = "E, Sensei."
90002060-162 = "[ns] \"Você é a Malkuth?\""
90002060-163 = "Nessas horas... devemos dizer 'é um prazer conhecê-lo', não é?"
90002060-167 = "Olá a todos.#nRecebam as saudações de Ain, Soph e Oul."
90002060-168 = "Eu sou uma vontade criada sob o estandarte.#nO peregrino do reino que alcançou o fim do mundo."
90002060-169 = "É assim que me chamo."
90002060-173 = "Então... boa noite."
90002060-174 = "Sensei—!"
90002060-180 = "Aaaaaaaahhh!!"
90002060-184 = "[ns] \"Toki!\""
90002060-185 = "A Toki no estado Abi-Eshuh, com um único golpe...!?"
90002060-186 = "(Isso é um absurdo. Com esse poder de fogo, não somos nem páreo para ela...)"
90002060-190 = "...Sensei? O que você está...!?"
90002060-191 = "[ns] Correr para a frente."
90002060-195 = "[ns] Proteger as alunas."
90002060-196 = "Sensei! O que você está fazendo!"
90002060-197 = "...Fico aliviado em ver que você é exatamente como eu pensava."
90002060-198 = "Em troca de se sacrificar, você pede que não toquemos nas alunas, é isso?"
90002060-199 = "[s] \"...!\""
90002060-200 = "Não se preocupe. Não há necessidade disso."
90002060-201 = "……Você está confuso. Sim, eu entendo."
90002060-202 = "Mas, deixarei uma coisa bem clara."
90002060-203 = "Nós não temos a intenção de tirar a vida de ninguém."
90002060-204 = "Asumuma Toki também, apenas apliquei um impacto moderado, o suficiente para não causar um ferimento fatal."
90002060-211 = "Pro... fessor..."
90002060-213 = "Afaste-se, por favor... Eu vou... proteger você..."
90002060-217 = "Não importa o que aconteça, eu prometi à Eimi... e a mim mesma... que protegeria o sensei...!"
90002060-221 = "I-Irmã! O tempo já está...! P-por favor, apresse-se...!"
90002060-222 = "……"
90002060-223 = "Quando tudo terminar e o momento da transição chegar, vocês também entenderão."
90002060-224 = "Que nós estamos tentando remover todos os pecados e sofrimentos de vocês."
90002060-225 = "[s] \"E como pretendem fazer isso?\""
90002060-226 = "Se você tocar em um local sujo de fuligem, você se sujará."
90002060-227 = "Sendo assim, basta não se aproximar das cinzas."
90002060-228 = "[s] \"Isso não é um pouco diferente?\""
90002060-229 = "Nós não estamos buscando o consentimento de vocês."
90002060-230 = "Pois eu vim a este lugar apenas para declarar."
90002060-231 = "Irmã! É ótimo espalhar o evangelho, mas agora priorize o objetivo principal!"
90002060-232 = "――O momento chegou."
90002060-233 = "Ficarei feliz em acompanhar o fim da peregrinação de vocês."
90002060-240 = "Ah... ugh...!"
90002060-244 = "Toki?"
90002060-245 = "Toki!"
90002060-247 = "(Um clarão ofuscante bloqueou minha visão)"
90002060-248 = "(Reflexivamente, fechei os olhos)"
90002060-252 = "Sensei! Está tudo bem! Nós estamos aqui!"
90002060-254 = "[ns] \"Arona? Plana?\""
90002060-255 = "Dificuldades. Saída insuficiente. O fluxo de energia está agindo de forma desfavorável. #nMas não podemos recuar."
90002060-256 = "Sem economizar esforços! O sensei e todos os alunos, todos são preciosos!"
90002060-257 = "Afirmativo. Se não fizermos o nosso melhor, não poderemos encarar vocês."
90002060-259 = "Ugh...! Uuuugh...!"
90002060-260 = "……Ugh."
90002060-261 = "Por favor... só mais um pouco...!"
90002060-265 = "Energia restante... insufi... ciente."
90002060-270 = "Plana-chan!? P-por favor, aguente firme! Ugh, mesmo que seja só eu...!"
90002060-274 = "Uaaaaaaah!!"
90002060-278 = "……"
90002060-279 = "Ué...? A saída de Malkuth enfraqueceu de repente! #nMas, por que...?"
90002060-280 = "!!!"
90002060-281 = "Sensei! É a Kei!"
90002060-286 = "[ns] \"Kei! Afaste-se!\""
90002060-287 = "Mesmo nessa situação, você continua assim. Sério, você é um adulto que não cansa nunca."
90002060-288 = "……Bem, é por isso que posso deixar a Alice sob seus cuidados."
90002060-289 = "[s] \"O que você pretende fazer...?\""
90002060-290 = "Não se preocupe. Este lugar está repleto do poder dos deuses sem nome."
90002060-291 = "E, neste local, a pessoa que melhor sabe manipular esse poder sou eu."
90002060-292 = "……Embora pareça ter sido arranjado arbitrariamente, a sensação é diferente do habitual."
90002060-293 = "De qualquer forma, aquele autoproclamado profeta chamado Malkuth também deve estar confuso."
90002060-295 = "Surpreendente. Esta variável não estava prevista."
90002060-296 = "Irmã... isso é..."
90002060-297 = "O tempo acabou... é..."
90002060-298 = "Ah, mas ainda consigo ganhar mais alguns segundos!#nMais do que isso, infelizmente, é impossível..."
90002060-299 = "Entendido. Vou lutar sem pegar leve."
90002060-304 = "O quê? A potência ainda pode aumentar... Você é um monstro!?"
90002060-305 = "P-Sensei!? Eu estou bem!#nCom a Alice aqui, não tem como eu cair!"
90002060-306 = "Recebendo a energia... e reajustando..."
90002060-307 = "Uaaaaaaah!!!"
90002060-312 = "Droga...!!"
90002060-314 = "Não... brinque comigo...!"
90002060-315 = "Depois de usar esse poder..."
90002060-316 = "Quem você pensa que eu sou!!"
90002060-320 = "I-Irmã...!"
90002060-321 = "Já cheguei no meu limite! Volte logo!"
90002060-322 = "Irmã! Não se force! O resultado não importa nem um pouco!!"
90002060-323 = "..."
90002060-324 = "Entendido. Ein, Soph, Owl."
90002060-332 = "Malkuth está... recuando...?"
90002060-333 = "O Sensei está bem!?"
90002060-334 = "Sensei!"
90002060-335 = "Você está bem, Sensei!? Toki, Kei, Himari-senpai e Rio-senpai também...!"
90002060-336 = "K-Kei-chan...?"
90002060-337 = "Kei!?"
90002060-345 = "Kei? Acorde, Kei!#nEu não quero isso... Por favor, não deixe a Alice sozinha!"
90002060-347 = "KEI!!!!"
90002060-349 = "Próximo episódio: Kei"
