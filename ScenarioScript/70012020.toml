[translation]
70012020-1 = "ON AIR: Gehenna (2)"
70012020-2 = "Kishishi! Como esperado da Iroha!"
70012020-3 = "Essa é uma escolha de pessoal perfeita, não é?"
70012020-4 = "Eu diria que não fui eu quem escolheu, mas sim que elas vieram até mim..."
70012020-5 = "Erika Hatami e Kirara Yozakura. #nCom certeza farão uma transmissão digna do Pandemonium!!"
70012020-6 = "Senpai, você é boa em lembrar nomes, não é..."
70012020-7 = "De qualquer forma, decidi deixar com as duas. Por favor, não reclame depois."
70012020-8 = "Se for delegar a alguém, confie. Se confiar, não se arrependa—"
70012020-9 = "Essa é a determinação que um líder deve ter! Prossiga com tranquilidade!"
70012020-10 = "Sim, sim... então tá."
70012020-12 = "Sendo assim. Quando anunciei vocês duas como as próximas personalidades—"
70012020-13 = "Houve uma repercussão considerável."
70012020-14 = "Sério!? Uau! Que legal!"
70012020-15 = "Vocês duas são celebridades na escola. Isso também ajuda a gente."
70012020-16 = "Isso é um pouco de pressão... Tem algum manual de condução ou algo assim?"
70012020-17 = "O básico. Embora, na verdade, não precise ser nada muito rígido. #nComo as transmissões de sempre... mas espere, você já ouviu as transmissões da escola?"
70012020-18 = "Eh... como era mesmo...? Acho que não consigo lembrar muito bem."
70012020-19 = "A Ibuki-chan estava falando, né? E acho que ela cantou alguma coisa."
70012020-20 = "Ué, também tem que cantar?"
70012020-21 = "Não, não precisa fazer isso... bem, é uma transmissão normal. Tipo um rádio."
70012020-22 = "Ah, falando nisso. Parece que chegaram muitas cartas para o quadro de relatos. #nMas não precisa ler todas."
70012020-23 = "Não dá para fazer isso. #nJá que enviaram especialmente querendo que eu ouça o que elas têm a dizer."
70012020-24 = "Elas devem estar ansiosas esperando para ver quando serão lidas. Não podemos decepcioná-las, né?"
70012020-25 = "Bem... entendo. Deixo isso com vocês."
70012020-26 = "Sério? Tem certeza mesmo?"
70012020-27 = "Sim. Confio em vocês duas."
70012020-28 = "Afinal, vocês não são do tipo que faria algo estranho..."
70012020-29 = "Nossa, sentir que o Pandemonium confia na gente dá até uma pressão."
70012020-30 = "Não é nada tão exagerado assim."
70012020-31 = "Mesmo que aconteça algum problema... no final, eu dou um jeito."
70012020-32 = "Ahaha! Vou me esforçar pela Iroha-chan que confiou na gente!"
70012020-33 = "Agradeço o sentimento, mas... #nfoi um pedido de última hora, então tentem não se pressionar muito."
70012020-38 = "Já está na hora."
70012020-39 = "Então, conto com vocês."
70012020-43 = "Deixa com a gente!"
70012020-44 = "Ufa... acho que comecei a ficar nervosa."
70012020-45 = "Tá tudo bem, tá tudo bem! Tem a explicação dos quadros aqui. Vai dar tudo certo."
70012020-46 = "É verdade. Então, vamos nessa?"
70012020-52 = "Cof, cof! Olá a todos! Estamos transmitindo aqui da sala de rádio!"
70012020-53 = "Assumindo a condução surpresa do 'ON AIR: Gehenna' de hoje, aqui é Kirara Yozakura e—"
70012020-54 = "Erika Hatami."
70012020-55 = "Podemos não ser perfeitas, mas contamos com o apoio de vocês."
70012020-58 = "Ué? A transmissão de hoje... está diferente do habitual?"
70012020-59 = "Será que mudaram os responsáveis?"
70012020-60 = "É a Kirara-chan que está fazendo...?"
70012020-62 = "Então, vamos para o primeiro quadro! Hora da propaganda dos clubes!"
70012020-63 = "Parece que chegaram muitas cartas hoje também."
70012020-64 = "Então, vamos para a primeira carta! Oh, que colorida e fofa!"
70012020-65 = "Que quantidade enorme de texto... dá para sentir o carinho."
70012020-66 = "Muito bem, vamos ver que tipo de clube é esse."
70012020-67 = "「Esta carta começou em Trinity e tem trazido felicidade a quem a recebe. #nMas, se você não enviar esta carta para 7 pessoas dentro de uma semana, a infelicidade cairá sobre você imediatamente...」"
70012020-68 = "……Hã?"
70012020-69 = "Nossa…… que nostálgico, esse tipo de coisa. Ainda existe hoje em dia."
70012020-70 = "Pelo visto, não é uma propaganda de clube! Vamos para a próxima mensagem!"
70012020-73 = "Ei, você ouviu isso!? Eu não quero que a infelicidade caia sobre mim, não!"
70012020-74 = "Eu nem tenho 7 pessoas para enviar…… o que eu faço……."
70012020-76 = "Certo, próxima! Espero que desta vez seja uma propaganda de clube de verdade!"
70012020-77 = "Então, Erika, por favor!"
70012020-78 = "Cof, cof…… então vamos lá."
70012020-79 = "「O Clube de Filosofia da Fronteira Escolar está esperando por você. #nQue tal ficar conosco na fronteira entre o interior e o exterior e apreciar essa ambiguidade? #nNa linha divisória entre ir à escola e matar aula―― com certeza você vai se viciar!」"
70012020-80 = "Ah, essa! São aquelas pessoas que ficam sempre sentadas perto do portão da escola!"
70012020-81 = "Ah, aquilo? Eu achava que era brincadeira de estátua. Era um clube?"
70012020-82 = "Bem…… parece que quem quiser entrar no clube deve ir ao portão oeste toda terça ou quinta-feira. #nEntão, contamos com o apoio de vocês ao \"Clube de Filosofia da Fronteira Escolar\"!"
70012020-89 = "（Está indo mais suave do que eu imaginava. Foi uma boa escolha pedir para essas duas）"
70012020-93 = "A transmissão de hoje não está legal?"
70012020-94 = "Verdade. Geralmente só toca o hino do Pandemonium."
70012020-95 = "Se for sempre assim, talvez eu até comece a gostar……?"
70012020-99 = "（A reação não parece ruim）"
70012020-100 = "（……Embora a veterana Makoto possa não gostar）"
70012020-102 = "Certo, vamos para o próximo quadro."
70012020-103 = "Pessoal, o momento que vocês tanto esperavam! É hora do \"Brilha Brilha☆ Reúnam-se! Episódios dos Ouvintes\"!"
70012020-104 = "O nome era esse mesmo…… bom, tanto faz."
70012020-105 = "Recebemos muitas mensagens, mas por questões de tempo, não conseguiremos ler todas. #nPedimos desculpas a quem não teve a mensagem lida."
70012020-106 = "Então, aqui vai a primeira mensagem."
70012020-110 = "「Estou no segundo ano. Gosto de comer tranquilamente sozinha na hora do almoço, mas tenho uma amiga que sempre me convida.」"
70012020-111 = "「Sinto-me mal e não consigo recusar, mesmo querendo. Não é que eu não goste da minha amiga. #nO que devo fazer?」"
70012020-112 = "Ah, esse tipo de pessoa não é bem comum?"
70012020-113 = "Realmente é um dilema. Se deve valorizar seu próprio tempo ou priorizar a amiga."
70012020-114 = "Eu sei responder isso com confiança!"
70012020-115 = "Oh? É mesmo?"
70012020-116 = "Sim!!"
70012020-117 = "Crie coragem e fale honestamente. #nDiga que, na verdade, você também gosta de comer sozinha."
70012020-118 = "Talvez você não dê o primeiro passo por medo de ficar um clima estranho com sua amiga. #nMas acho que se vocês conversarem com sinceridade, podem se tornar ainda mais próximas."
70012020-122 = "Uau……."
70012020-123 = "Se você falar com o coração, ela certamente vai entender. Afinal, vocês são amigas! #nEntão não fique tão preocupada!"
70012020-124 = "Fufu, é verdade. #nUma relação onde se pode respeitar os gostos e a personalidade uma da outra. É isso que significa ser amiga, não é?"
70012020-128 = "Então, Kirara-chan, vamos para a próxima."
70012020-129 = "Sim. Esta também é uma mensagem anônima. Parece ser de uma aluna do primeiro ano."
70012020-131 = "「A infelicidade sempre me persegue. Eu caio com frequência, deixo cair doces e salgadinhos, explosões acontecem quando tento comer em algum lugar, perco tíquetes de refeição e as máquinas de venda automática engolem meu dinheiro. Qual é o meu problema?」"
70012020-133 = "Nossa…… dá até vontade de chorar só de ouvir."
70012020-134 = "Mesmo assim, você continua tentando fazer as coisas? Que incrível."
70012020-135 = "Hum, se você tem tanta infelicidade assim, #nnão será que uma grande felicidade virá depois? #nDizem que a felicidade sempre encontra um equilíbrio em algum lugar."
70012020-136 = "Ou então, você poderia tentar fazer vlogs ou transmissões."
70012020-137 = "Ser sempre atingida pela infelicidade…… acho que isso seria um ótimo conteúdo para gravar."
70012020-138 = "Ou seja, transformar uma crise em oportunidade! #nTipo, transformar a infelicidade do dia a dia em um ponto forte!"
70012020-139 = "Isso mesmo. E quando não acontece nada de ruim, isso já é uma felicidade por si só."
70012020-140 = "Boa sorte! Nós também estamos torcendo por você!"
70012020-141 = "Certo, então vamos para a próxima mensagem――"
70012020-149 = "Ugh!? Que som horrível!"
70012020-150 = "Hum…… acho que é um problema no equipamento."
70012020-155 = "Ué, o que foi!?"
70012020-157 = "……！！"
70012020-159 = "O que eu faço? Paramos por aqui?"
70012020-160 = "Hmm, se for só interferência no cabo……."
70012020-166 = "Vou fazer assim, e então……."
70012020-172 = "Pronto."
70012020-173 = "Incrível! Erika-chan, como você fez isso?"
70012020-174 = "Isso acontece às vezes quando os cabos ficam emaranhados. #nAlém disso, muitos equipamentos da sala de transmissão são bem antigos."
70012020-175 = "Então não fiz nada de especial. Só desenrolei os cabos."
70012020-176 = "Oh~ como esperado. Você entende bastante dessas coisas, hein!"
70012020-177 = "Não é nada demais, sério."
70012020-181 = "Ah, ah. Pedimos desculpas pelo transtorno causado por problemas técnicos. #nComo já foi restaurado, vamos continuar com a transmissão."
70012020-182 = "Sim! Então, vamos para o próximo pedido!"
70012020-188 = "(Achei ter ouvido uma voz misturada ao ruído, mas……)"
70012020-189 = "(Bem, deve ter sido impressão minha)"
70012020-191 = "Justo quando achei que estava indo bem, tivemos problemas técnicos……."
70012020-192 = "Makoto-senpai. Se vamos continuar com a transmissão, não seria melhor trocar o equipamento?"
70012020-193 = "……."
70012020-194 = "Senpai? Está me ouvindo?"
70012020-195 = "Hm? Ah."
70012020-196 = "Kishishi. De fato, não é nada mal que a transmissão escolar chame a atenção."
70012020-197 = "A leitura que demonstra a minha dignidade chegará a ainda mais pessoas!"
70012020-198 = "Iroha! Apresente propostas ativamente para revitalizar a transmissão escolar!"
70012020-199 = "Ah... eu sabia que você diria isso."
70012020-201 = "Bem, já está na hora de encerrar por aqui……."
70012020-202 = "Ué?"
70012020-203 = "Uau, chegou um pedido de música!"
70012020-204 = "Ah, essa música. É perfeita para o encerramento."
70012020-205 = "――Sen!"
70012020-206 = "O que houve?"
70012020-207 = "Não temos... essa música tão recente!"
70012020-208 = "Hã? Não dá para conectar o celular?"
70012020-209 = "Não temos esse tipo de equipamento aqui... o que podemos tocar agora é só o hino do Pandemonium……."
70012020-210 = "Isso não tem nada a ver com o pedido!?"
70012020-211 = "Nesse caso, não tem jeito. Infelizmente, a música pedida――"
70012020-215 = "Erika-chan!"
70012020-216 = "Sim?"
70012020-217 = "Canta você, Erika-chan! Tem até um violão ali."
70012020-218 = "Hã? Eu?"
70012020-219 = "Isso! Você canta super bem, Erika-chan! #nE você não cantou essa música no karaokê outro dia?"
70012020-220 = "Não, não é como se eu cantasse tão bem... é só que eu sei cantar, sabe……."
70012020-221 = "Além disso, karaokê é bem diferente de uma transmissão escolar……."
70012020-222 = "Ahaha, não tem problema! Já que tem alguém para cantar e alguém para ouvir!"
70012020-223 = "Acho que a pessoa que pediu a música também vai ficar feliz, não acha?"
70012020-224 = "Hmm... não acho que eles queriam ouvir a minha voz, mas……."
70012020-228 = "……Bem, não é como se eu não pudesse fazer."
70012020-229 = "Eba! Erika-chan vai cantar ao vivo~!!"
70012020-230 = "Ufa……."
70012020-236 = "Então, por favor, ouçam. O título é――"
70012020-237 = "～～～♪"
70012020-245 = "～～～♪"
70012020-250 = "（Assim, a transmissão escolar do Clube Brilhante terminou com sucesso）"
70012020-252 = "Vocês duas, bom trabalho. ...De verdade."
70012020-253 = "Ahaha, foi super divertido! Talvez eu até leve jeito para transmissões!"
70012020-254 = "É verdade. Foi bem refrescante. #nMe pergunto qual foi a reação de quem estava ouvindo."
70012020-255 = "Ah, foi muito boa. De verdade."
70012020-256 = "Sério!? Então, com isso, a Iroha-chan ficou um pouco mais aliviada?"
70012020-257 = "Isso é... bem... é que estou em apuros justamente porque a reação foi boa demais..."
70012020-258 = "Hã? A esse ponto?"
70012020-259 = "Existe problema em ter uma reação boa?"
70012020-261 = "Bem... digamos que tem gente que dá trabalho, independentemente da reação. #nE, como esperado, parece que ela não está de bom humor..."
70012020-263 = "Dito isso, pessoalmente, gostaria de continuar deixando as transmissões com vocês duas."
70012020-264 = "..."
70012020-265 = "Vocês também devem ter suas atividades de clube, então não vou forçar nada."
70012020-266 = "Caramba! Que demais!"
70012020-267 = "Concordo. É um elogio que nem sei se merecemos."
70012020-268 = "Mas, originalmente, não tinha uma aluna responsável por isso?"
70012020-269 = "Sim. Ela saiu por motivos pessoais, mas..."
70012020-270 = "Não sabemos se ela vai voltar, né?"
70012020-271 = "Não sei se é certo a gente tomar o lugar dela. #nEsse tipo de experiência... a gente acaba carregando por muito tempo."
70012020-272 = "Por isso, agradecemos o convite, mas..."
70012020-273 = "Vamos ficar apenas como substitutas! #n...É isso, né?"
70012020-274 = "Fufu... sim. Como esperado da Kirara-chan."
70012020-279 = "Entendo, compreendo seus sentimentos. Vocês são gentis."
70012020-280 = "Não sei se aquela aluna voltará, mas vou avisá-la."
70012020-281 = "Ah, e outra coisa. #nComo agradecimento singelo pelo esforço de vocês..."
70012020-282 = "Eu planejava dar um autógrafo da Makoto-senpai, mas vamos deixar isso de lado por enquanto—"
70012020-283 = "Hã, um agradecimento?"
70012020-284 = "Erika-chan... o que você acha?"
70012020-285 = "Hmm... acho que pensamos da mesma forma, não é?"
70012020-286 = "Ahaha, é verdade, né? Então..."
70012020-290 = "Vamos aceitar apenas o seu carinho como agradecimento! #nNós já estamos satisfeitas por ter tido essa experiência brilhante!"
70012020-291 = "Sim. Foi divertido. Se pudemos ajudar, já é o suficiente."
70012020-292 = "...Entendo."
70012020-293 = "Ah, então, então... que tal o MomoTalk da Iroha-chan? Acho que ficaríamos mais felizes com isso!"
70012020-294 = "..."
70012020-295 = "Fufu, sim. Tudo bem. #nNa verdade, eu mesma estava prestes a sugerir isso."
70012020-296 = "Kyaa! Iroha-chan, que fofa!!"
70012020-297 = "Podemos nos falar de vez em quando? Ah, se você não tiver planos depois disso—"
70012020-299 = "Dias brilhantes, para sempre."
70012020-303 = "NO AR: Gehenna"
