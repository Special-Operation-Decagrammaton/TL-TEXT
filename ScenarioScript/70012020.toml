[translation]
70012020-1 = "ON AIR: Gehenna (2)"
70012020-2 = "Hehehe! As expected of Iroha!"
70012020-3 = "That’s a perfect choice for the job, isn't it!"
70012020-4 = "I wouldn't say I chose them, so much as they just... showed up."
70012020-5 = "Erika Hatami and Kirara Yozakura. #nI'm sure they'll make the broadcast worthy of the Pandemonium Society!!"
70012020-6 = "Senpai, you're usually good at remembering names..."
70012020-7 = "Anyway, I've decided to leave it to them. Please don't complain about it later."
70012020-8 = "If you employ someone, trust them. If you trust them, have no regrets—"
70012020-9 = "That is the ambition a leader should have! Proceed with confidence!"
70012020-10 = "Yes, yes... well then."
70012020-12 = "So, that's that. When I announced you two as the next personalities—"
70012020-13 = "There was quite a response."
70012020-14 = "Really!? Wow! I'm so happy!"
70012020-15 = "You two are celebrities on campus, after all. It's a big help to us."
70012020-16 = "That's a bit of pressure... Is there a manual for how to run this?"
70012020-17 = "Just the basics. Though, you can really just wing it. #nLike the usual broadcasts—wait, have you ever actually listened to the school broadcast?"
70012020-18 = "Uh... what was it like again...? I can't really remember."
70012020-19 = "Ibuki-chan was talking, right? And I think she was singing something."
70012020-20 = "Wait, we have to sing too?"
70012020-21 = "No, that's not necessary... It's just a normal broadcast. Like a radio show."
70012020-22 = "Oh, come to think of it, it seems a lot of letters have arrived for the 'Personal Stories' segment. #nBut you don't have to read all of them."
70012020-23 = "We can't just do that. #nThey went out of their way to send them because they want me to hear their stories."
70012020-24 = "They're probably looking forward to hearing if theirs gets read. We can't let them down, right?"
70012020-25 = "Well... I suppose so. I'll leave that part to you."
70012020-26 = "Really? You're sure it's okay?"
70012020-27 = "Yes. I trust you two to handle it."
70012020-28 = "I don't think you're the type to do anything strange..."
70012020-29 = "Whoa, feeling like the Pandemonium Society actually trusts us is kind of high pressure."
70012020-30 = "It's not that big of a deal."
70012020-31 = "Even if there's trouble... I'll find a way to fix it in the end."
70012020-32 = "Ahaha! I'll do my best for Iroha-chan, since she trusts us!"
70012020-33 = "I appreciate the sentiment, but... #nIt was a sudden request, so please don't feel too pressured."
70012020-38 = "It's about time."
70012020-39 = "Well then, I'm counting on you."
70012020-43 = "Leave it to us!"
70012020-44 = "Phew... I think I'm starting to get nervous."
70012020-45 = "It's fine, it's fine! We've got the segment descriptions right here. It'll all work out."
70012020-46 = "You're right. Shall we get started?"
70012020-52 = "Ahem! Hello everyone! We're broadcasting live from the broadcast room!"
70012020-53 = "I'm Kirara Yozakura, and I'll be hosting today's 'ON AIR: Gehenna' as a surprise guest, along with—"
70012020-54 = "Erika Hatami."
70012020-55 = "We might be a bit inexperienced, but we hope you'll enjoy the show."
70012020-58 = "Huh? Today's broadcast... is it different from usual?"
70012020-59 = "Did they change the hosts?"
70012020-60 = "Is that Kirara-chan...?"
70012020-62 = "Alright, first segment! Club Promotion Tiiime!"
70012020-63 = "It looks like we've received a lot of letters today, too."
70012020-64 = "Let's start with the first one! Oh, it's so colorful and cute!"
70012020-65 = "That's a lot of text... I can really feel their passion."
70012020-66 = "Now then, what kind of club could this be?"
70012020-67 = "'This letter started in Trinity and has brought happiness to everyone who received it. #nHowever, if you do not send this letter to 7 people within one week, misfortune will immediately befall you...'"
70012020-68 = "...Huh?"
70012020-69 = "Whoa... that's nostalgic. People still do this?"
70012020-70 = "It seems this isn't a club promotion! Let's move on to the next letter!"
70012020-73 = "Hey, I heard that part!? I don't want misfortune to befall me!?"
70012020-74 = "I don't even have 7 people to send this to... what do I do...?"
70012020-76 = "Okay, next! Hopefully this one is an actual club promotion!"
70012020-77 = "Erika-san, if you would!"
70012020-78 = "Ahem... alright."
70012020-79 = "'The Academy Boundary Philosophy Club is waiting for you. #nWhy not stand with us on the boundary between inside and outside and savor the ambiguity? #nOn the border between attending class and skipping—you're sure to get hooked!'"
70012020-80 = "Oh, I know them! They're the people always sitting by the school gate!"
70012020-81 = "Ah, I thought they were just playing gargoyle. That was a club?"
70012020-82 = "Uh... it says if you want to join, just go to the West Gate on Tuesdays or Thursdays. #nSo, please support the 'Academy Boundary Philosophy Club'!"
70012020-89 = "(They're doing better than I imagined. Choosing these two was the right call.)"
70012020-93 = "Doesn't today's broadcast feel kind of nice?"
70012020-94 = "Yeah. Usually it's just hymns to the Pandemonium Society."
70012020-95 = "If it's always like this, I might actually look forward to it...?"
70012020-99 = "(The reaction doesn't seem bad, either.)"
70012020-100 = "(...Though Makoto-senpai might not like it.)"
70012020-102 = "Alright, next segment."
70012020-103 = "Everyone's been waiting for this! It's time for 'Sparkle☆Gather! Listener Episodes'!"
70012020-104 = "Was that the name...? Well, whatever."
70012020-105 = "We've received so many letters, but due to time constraints, we can't read them all. #nSorry to those we couldn't get to."
70012020-106 = "Now, here's the first letter."
70012020-110 = "'I'm a second-year student. I like to eat lunch by myself in peace, but there's a friend who always invites me.'"
70012020-111 = "'I feel bad, so I can't say no even though I want to. It's not that I dislike my friend. #nWhat should I do?'"
70012020-112 = "Ah, I bet there are a lot of people like this, right?"
70012020-113 = "It's a tough dilemma. Should you value your own time, or prioritize your friend?"
70012020-114 = "I can answer this with confidence!"
70012020-115 = "Oh? You can?"
70012020-116 = "Yes!!"
70012020-117 = "Gather your courage and try being honest. #nTell them that you actually like eating alone sometimes."
70012020-118 = "You might be afraid of things getting awkward, but if you talk about your true feelings, I think you'll become even better friends."
70012020-122 = "Oh..."
70012020-123 = "If you speak from the heart, they'll surely understand. Because you're friends! #nSo don't worry too much!"
70012020-124 = "Fufu, that's right. #nA relationship where you can respect each other's preferences and personalities. That's what friendship is, isn't it?"
70012020-128 = "Alright Kirara-chan, let's move on."
70012020-129 = "Sure thing. This one is also anonymous. From a first-year student."
70012020-131 = "'Misfortune always follows me. I trip often, I drop my snacks, explosions happen whenever I try to eat at a shop, I lose my meal tickets, and vending machines swallow my money. What is my problem?'"
70012020-133 = "Whoa... just hearing that makes me want to cry."
70012020-134 = "Does that mean you're always trying new things despite that? That's amazing."
70012020-135 = "Hmm, if you have that much misfortune, #nmaybe some huge happiness is coming your way later? #nThey say happiness balances out in the end, right?"
70012020-136 = "Or, maybe you could try vlogging or streaming."
70012020-137 = "Always being hit by misfortune... I think that's perfect content for a video."
70012020-138 = "So, turning a crisis into an opportunity! #nMaking your daily misfortune your selling point!"
70012020-139 = "Exactly. And when nothing unfortunate happens, that's a happy moment in itself."
70012020-140 = "Good luck! We're rooting for you!"
70012020-141 = "Alright, on to the next letter—"
70012020-149 = "Ugh!? That's a nasty sound!"
70012020-150 = "Hmm... maybe a technical issue."
70012020-155 = "Whoa, what was that!?"
70012020-157 = "...!!"
70012020-159 = "What should we do? Should we stop here?"
70012020-160 = "Hmm, if it's just a cable interference..."
70012020-166 = "Do this, and then that..."
70012020-172 = "Done."
70012020-173 = "Wow! Erika-chan, how did you do that?"
70012020-174 = "This happens sometimes when cables get tangled. #nPlus, a lot of the equipment in this room is pretty old."
70012020-175 = "So I didn't do anything special. I just untangled the cables."
70012020-176 = "Oh~ as expected. You're really knowledgeable about this stuff!"
70012020-177 = "It's nothing, really."
70012020-181 = "Testing, testing. Sorry for the inconvenience caused by the technical trouble. #nWe've restored the connection, so we'll continue the broadcast."
70012020-182 = "Yes! Let's move on to the next letter~!"
70012020-188 = "(I feel like I heard a voice mixed in with the noise...)"
70012020-189 = "(Well, probably just my imagination.)"
70012020-191 = "I thought it was going well, then a technical issue..."
70012020-192 = "Makoto-senpai. If we're going to keep doing these broadcasts, shouldn't we replace the equipment?"
70012020-193 = "..."
70012020-194 = "Senpai? Are you listening?"
70012020-195 = "Hm? Oh."
70012020-196 = "Hehehe. It's not bad that the school broadcast is getting attention."
70012020-197 = "My majestic reading will reach even more people!"
70012020-198 = "Iroha! Proactively submit proposals to revitalize the school broadcast!"
70012020-199 = "Sigh... I thought you'd say that."
70012020-201 = "Well, it's about time to wrap this up..."
70012020-202 = "Huh?"
70012020-203 = "Wow, we got a song request!"
70012020-204 = "Oh, that song. It's perfect for an ending."
70012020-205 = "—wait!"
70012020-206 = "What's wrong?"
70012020-207 = "We don't have such a new song!"
70012020-208 = "Eh? Can't we just plug in a smartphone?"
70012020-209 = "We don't have that kind of equipment here... all we can play right now is the Pandemonium Society hymn..."
70012020-210 = "That's completely different from the request!?"
70012020-211 = "Well, it can't be helped. Unfortunately, the requested song—"
70012020-215 = "Erika-chan!"
70012020-216 = "Yeah?"
70012020-217 = "Erika-chan, you sing it! There's a guitar right there, too."
70012020-218 = "Eh? Me?"
70012020-219 = "Yeah! Erika-chan, you're a great singer! #nAnd didn't you sing this at karaoke before?"
70012020-220 = "No, I wouldn't say I'm great... I can just sing it, I guess..."
70012020-221 = "Besides, karaoke and a school broadcast are totally different..."
70012020-222 = "Ahaha, it's fine! There's a singer, and there are listeners!"
70012020-223 = "I'm sure the person who requested it will be happy, too."
70012020-224 = "Hmm... I don't think they were specifically asking to hear me sing, but..."
70012020-228 = "...Well, I suppose I can do it."
70012020-229 = "Yay! Erika-chan's live singing~!!"
70012020-230 = "Phew..."
70012020-236 = "Well then, please listen. The title is—"
70012020-237 = "~~~♪"
70012020-245 = "~~~♪"
70012020-250 = "(And so, the Kirakira Club's school broadcast ended in success.)"
70012020-252 = "Great work, both of you. ...Truly."
70012020-253 = "Ahaha, that was so much fun! Maybe we're actually cut out for broadcasting!"
70012020-254 = "Yeah. It was pretty refreshing. #nI wonder what kind of reaction the listeners had."
70012020-255 = "Oh, it was good. Very good."
70012020-256 = "Really!? Then does that mean Iroha-chan can relax a little now?"
70012020-257 = "That is... well... it's more like I'm troubled because the reaction was too good..."
70012020-258 = "Eh? That much?"
70012020-259 = "Is it a problem to have a good reaction?"
70012020-261 = "Well... regardless of the reaction, there are people who are a handful. #nAnd as expected, they seem to be in a bad mood..."
70012020-263 = "That said, personally, I would like to leave the broadcasts to you two in the future."
70012020-264 = "..."
70012020-265 = "I'm sure you have your own club activities, so I won't force you."
70012020-266 = "Whoa! So happy!"
70012020-267 = "Yeah. I'm honored you'd say that."
70012020-268 = "But, there was a student who was in charge before, right?"
70012020-269 = "Yes. She quit for personal reasons, but..."
70012020-270 = "We don't know if she'll come back."
70012020-271 = "I don't know if it's right for us to take her spot. #nThat kind of experience... it's hard to let go of."
70012020-272 = "So, I'm happy for the offer, but..."
70012020-273 = "We'll just be the substitutes! #n...That's how it is, right?"
70012020-274 = "Fufu... yes. As expected of Kirara-chan."
70012020-279 = "Yes, I understand your feelings. You're very kind."
70012020-280 = "I don't know if that student will return, but I'll let her know."
70012020-281 = "Oh, and also. #nI wanted to give you two a small token of appreciation for your hard work."
70012020-282 = "I was planning to give you Makoto-senpai's autograph, but let's put that aside for now—"
70012020-283 = "Eh, a gift?"
70012020-284 = "Erika-chan... what do you think?"
70012020-285 = "Hmm... I think we're on the same page, right?"
70012020-286 = "Ahaha, you're right! Then..."
70012020-290 = "We'll just take the thought as the gift! #nWe're satisfied just having had such a sparkling experience!"
70012020-291 = "Yeah. It was fun. If that was helpful, that's enough for us."
70012020-292 = "...I see."
70012020-293 = "Oh, then, maybe Iroha-chan's MomoTalk? That would make us happier!"
70012020-294 = "..."
70012020-295 = "Fufu, yes. That's fine. #nActually, I was just about to suggest that myself."
70012020-296 = "Kyaa~! Iroha-chan, you're so cute!!"
70012020-297 = "Can we contact you sometimes? Oh, if you don't have plans after this—"
70012020-299 = "Sparkling days, forever."
70012020-303 = "ON AIR: Gehenna"