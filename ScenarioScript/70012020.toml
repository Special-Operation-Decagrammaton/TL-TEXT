[translation]#[Texto Final. - Filipe 08/07.]
70012020-1 = "ON AIR: Gehenna (2)"
70012020-2 = "Kishishi! Como sempre, Iroha!"
70012020-3 = "Escolha perfeita!"
70012020-4 = "Não foi bem eu que escolhi, elas que vieram……"
70012020-5 = "Erika Hatami e Kirara Yozakura.#nElas vão fazer um programa digno do Pande-mônio!"
70012020-6 = "Senpai, você é bom em decorar nomes……"
70012020-7 = "Enfim, vamos deixar com elas. Depois não reclamem."
70012020-8 = "Ao liderar, deve-se confiar. E ao confiar, não se deve arrepender――"
70012020-9 = "É a mentalidade de um líder! Vão em frente!"
70012020-10 = "Tá, tá…… então."
70012020-12 = "Bem, anunciei vocês como as novas apresentadoras, e……"
70012020-13 = "tivemos uma ótima repercussão."
70012020-14 = "Sério!? Uau, que bom!"
70012020-15 = "Vocês são famosas na escola. Isso ajuda."
70012020-16 = "Que pressão…… tem um manual de apresentação?"
70012020-17 = "O mínimo. Mas pode ser improvisado.#nComo no programa normal―― ué, vocês já ouviram o programa?"
70012020-18 = "Hã…… como era? Não me lembro."
70012020-19 = "A Ibuki-chan falava. E acho que cantava."
70012020-20 = "Hã, também canta?"
70012020-21 = "Não, não precisa…… é um programa normal, tipo rádio."
70012020-22 = "Ah, sim. Temos muitas cartas para o quadro de histórias.#nMas não precisam ler todas."
70012020-23 = "Tem que ler.#nElas mandaram porque querem ser ouvidas."
70012020-24 = "Elas devem estar ansiosas para saber quando serão lidas. Não podemos decepcionar."
70012020-25 = "Bem…… sim. Deixo com vocês."
70012020-26 = "Sério? Pode mesmo?"
70012020-27 = "Sim. Confio em vocês."
70012020-28 = "E vocês não parecem que vão aprontar……"
70012020-29 = "Uau, ser confiada pelo Pande-mônio é pressão."
70012020-30 = "Não é tão grave."
70012020-31 = "Se der problema…… dou um jeito."
70012020-32 = "Hahaha! Vamos fazer o melhor pela Iroha-chan que confiou em nós!"
70012020-33 = "Agradeço o sentimento, mas……#nfoi de última hora, então não se pressionem."
70012020-38 = "Está quase."
70012020-39 = "Então, conto com vocês."
70012020-43 = "Deixe conosco!"
70012020-44 = "Ufa…… estou nervosa."
70012020-45 = "Relaxa, relaxa! Temos o roteiro. Vai dar certo."
70012020-46 = "É. Então, vamos."
70012020-52 = "Cof cof! Olá, pessoal! Estamos ao vivo do estúdio!"
70012020-53 = "Hoje, apresentando o 'ON AIR: Gehenna' de surpresa, Kirara Yozakura e――"
70012020-54 = "Erika Hatami."
70012020-55 = "Podemos errar, mas contamos com a compreensão de vocês."
70012020-58 = "Ué? O programa de hoje…… é diferente?"
70012020-59 = "Mudou o apresentador?"
70012020-60 = "A Kirara está apresentando……?"
70012020-62 = "Primeiro quadro! Hora da divulgação dos clubes!"
70012020-63 = "Recebemos muitas cartas hoje."
70012020-64 = "Vamos ler a primeira! Oh, colorida e fofa!"
70012020-65 = "É muita escrita…… dá para ver a dedicação."
70012020-66 = "Que clube será?"
70012020-67 = "Esta carta começou em Trinity e trouxe felicidade a quem a recebeu.#nMas se não enviar para 7 pessoas em uma semana, a infelicidade virá……"
70012020-68 = "……Hã?"
70012020-69 = "Uau…… que nostálgico. Ainda existe."
70012020-70 = "Não parece divulgação de clube! Vamos para a próxima!"
70012020-73 = "Ei, eu ouvi! Não quero infelicidade!"
70012020-74 = "Não tenho 7 pessoas para enviar…… e agora……"
70012020-76 = "Próximo! Que seja divulgação de clube!"
70012020-77 = "Erika-san, por favor."
70012020-78 = "Cof cof…… então."
70012020-79 = "'O Clube de Filosofia de Fronteiras espera por você.#nQue tal contemplar a fronteira entre dentro e fora, e saborear sua ambiguidade conosco?#nNa linha entre ir à aula e matar aula – você vai viciar!'"
70012020-80 = "Ah, esse! É o pessoal que fica perto do portão!"
70012020-81 = "Ah, achei que era brincadeira de gárgula. Era um clube?"
70012020-82 = "Interessados podem ir ao portão oeste toda terça ou quinta.#nEntão, 'Clube de Filosofia de Fronteiras', obrigado!"
70012020-89 = "(Mais tranquilo do que eu esperava. Foi uma boa escolha.)"
70012020-93 = "O programa de hoje está bom, não?"
70012020-94 = "É. Normalmente é só hino do Pande-mônio."
70012020-95 = "Se fosse sempre assim, seria legal……?"
70012020-99 = "(A recepção também parece boa)"
70012020-100 = "(……Makoto-senpai pode não gostar)"
70012020-102 = "Próximo quadro."
70012020-103 = "Aguardado por todos! 'Brilho☆Histórias dos Ouvintes!'"
70012020-104 = "Era esse o nome?…… Tanto faz."
70012020-105 = "Recebemos muitas cartas, mas não dá para ler todas.#nDesculpa a quem ficar de fora."
70012020-106 = "Primeira carta."
70012020-110 = "'Sou do segundo ano. Gosto de almoçar sozinha, mas uma amiga sempre me convida.'"
70012020-111 = "'Não quero magoá-la, mas também não consigo recusar. Não a odeio.#nO que devo fazer?'"
70012020-112 = "Ah, esse tipo de caso é comum."
70012020-113 = "É, é complicado. Priorizar o próprio tempo ou a amizade."
70012020-114 = "Tenho certeza da resposta!"
70012020-115 = "Oh? Qual é?"
70012020-116 = "Sim!!"
70012020-117 = "Tenha coragem e fale a verdade: você também gosta de comer sozinha."
70012020-118 = "Pode ser difícil dar o primeiro passo, mas se conversarem de verdade, a amizade vai se fortalecer."
70012020-122 = "Oh……"
70012020-123 = "Se falar com sinceridade, ela vai entender. São amigas!#nEntão não fique ansiosa!"
70012020-124 = "Fufu, é verdade.#nUma relação onde se respeitam os gostos e personalidades. Isso é amizade."
70012020-128 = "Kirara, próximo."
70012020-129 = "Tá. Esta também é anônima. Parece ser do primeiro ano."
70012020-131 = "'Sou sempre azarada. Tropeço, derrubo doces, quando como algo explode, perco o ticket, a máquina engole meu dinheiro. O que há de errado comigo?'"
70012020-133 = "Nossa…… só de ouvir já dá pena."
70012020-134 = "Mesmo assim, você continua tentando? Que incrível."
70012020-135 = "Hmm, com tanto azar assim,#n……talvez uma grande felicidade esteja a caminho.#nAs coisas se equilibram."
70012020-136 = "Ou então, poderia fazer vlogs ou lives."
70012020-137 = "Ser sempre atingida pelo azar…… é um ótimo conteúdo."
70012020-138 = "Ou seja, transformar crise em oportunidade!#nTransformar o azar em ponto forte!"
70012020-139 = "Isso. E quando não acontece nada, também é sorte."
70012020-140 = "Vai firme! Estamos torcendo!"
70012020-141 = "Próxima carta――"
70012020-149 = "Ah! Som ruim!"
70012020-150 = "Hmm…… problema técnico."
70012020-155 = "O quê!?"
70012020-157 = "……!!"
70012020-159 = "O que fazemos? Paramos?"
70012020-160 = "Hmm, se for só cabo……"
70012020-166 = "Assim……"
70012020-172 = "Pronto."
70012020-173 = "Uau! Erika-chan, como fez?"
70012020-174 = "Cabo emaranhado dá isso.#nE o estúdio tem equipamentos antigos."
70012020-175 = "Não fiz nada especial. Só desembaracei."
70012020-176 = "Ah, sabia! Você entende disso!"
70012020-177 = "Isso é o mínimo."
70012020-181 = "Teste, teste. Desculpem pelo problema técnico.#nJá voltamos ao ar."
70012020-182 = "Próxima carta!"
70012020-188 = "(Achei que ouvi uma voz no ruído……)"
70012020-189 = "(Mas deve ser impressão)"
70012020-191 = "Tava indo bem e deu problema técnico……"
70012020-192 = "Makoto-senpai, se continuarmos, seria bom trocar o equipamento."
70012020-193 = "……"
70012020-194 = "Senpai? Está ouvindo?"
70012020-195 = "Hã? Sim."
70012020-196 = "Kishishi. De fato, chamar atenção para o programa não é ruim."
70012020-197 = "Minha leitura de prestígio chegará a mais pessoas!"
70012020-198 = "Iroha! Apresente propostas para ativar o programa!"
70012020-199 = "Haa…… sabia que ia dizer isso."
70012020-201 = "Então, vamos encerrando……"
70012020-202 = "Ué?"
70012020-203 = "Uau, recebemos um pedido de música!"
70012020-204 = "Essa música é perfeita para o encerramento."
70012020-205 = "――Sensei!"
70012020-206 = "O que foi?"
70012020-207 = "Não temos essa música!"
70012020-208 = "Hã? Não dá para conectar o celular?"
70012020-209 = "Não temos esse equipamento…… só dá para tocar o hino do Pande-mônio……"
70012020-210 = "Não tem nada a ver com o pedido!"
70012020-211 = "Não tem jeito. O pedido infelizmente――"
70012020-215 = "Erika-chan!"
70012020-216 = "Hã?"
70012020-217 = "Você canta! Tem um violão ali."
70012020-218 = "Hã? Eu?"
70012020-219 = "Sim! Você canta muito bem!#nE essa música você cantou no karaokê, não foi?"
70012020-220 = "Não, não sou tão boa…… só sei cantar um pouco……"
70012020-221 = "E karaokê e programa ao vivo são diferentes……"
70012020-222 = "Hahaha, tudo bem! Tem quem cante e quem ouça!"
70012020-223 = "Quem pediu a música também vai gostar!"
70012020-224 = "Hmm…… mas não é minha música que ela queria ouvir……"
70012020-228 = "……Bom, não é impossível."
70012020-229 = "Uhuul! Erika-chan ao vivo!"
70012020-230 = "Ufa……"
70012020-236 = "Então, com vocês, o título é――"
70012020-237 = "~~~♪"
70012020-245 = "~~~♪"
70012020-250 = "(Assim, o programa do Clube Brilhante terminou com sucesso)"
70012020-252 = "Bom trabalho, vocês duas.…… de verdade."
70012020-253 = "Hahaha, foi muito divertido! Talvez eu tenha jeito!"
70012020-254 = "É, foi bem legal.#nQueria saber a reação de quem ouviu."
70012020-255 = "Ah, foi ótimo. Muito."
70012020-256 = "Sério? Então a Iroha-chan se sentiu mais aliviada?"
70012020-257 = "Isso…… é que…… a boa repercussão até me preocupa……"
70012020-258 = "Hã? Tanto assim?"
70012020-259 = "Reação boa pode ser problema?"
70012020-261 = "Bem…… há quem se preocupe independente da reação.#nE parece que a senpai está de mau humor……"
70012020-263 = "Mas pessoalmente, gostaria de continuar contando com vocês."
70012020-264 = "……"
70012020-265 = "Sei que vocês têm seus clubes, então não vou forçar."
70012020-266 = "Nossa! Que bom!"
70012020-267 = "É, fico até sem palavras."
70012020-268 = "Mas a apresentadora anterior ainda existe."
70012020-269 = "Sim. Pediu demissão por motivos pessoais……"
70012020-270 = "Não sei se ela vai voltar."
70012020-271 = "Não quero tomar o lugar dela.#nEssas coisas…… costumam marcar."
70012020-272 = "Então, agradeço o convite, mas……"
70012020-273 = "A gente é só substituta!#n……certo?"
70012020-274 = "Fufu…… é. Como sempre, Kirara."
70012020-279 = "Sim, entendi. Vocês são gentis."
70012020-280 = "Não sei se ela vai voltar, mas vou avisar."
70012020-281 = "Ah, e também.#nQueria agradecer vocês pelo esforço."
70012020-282 = "Iria dar um autógrafo da Makoto-senpai, mas vou deixar de lado――"
70012020-283 = "Hã, agradecimento?"
70012020-284 = "Erika-chan…… o que acha?"
70012020-285 = "Hmm…… acho que pensamos igual."
70012020-286 = "Hahaha, né? Então……"
70012020-290 = "Só o gesto já basta!#nJá ficamos felizes com a experiência!"
70012020-291 = "É, foi divertido. E ainda ajudamos."
70012020-292 = "……Entendo."
70012020-293 = "Ah, mas o MomoTalk da Iroha-chan seria melhor."
70012020-294 = "……"
70012020-295 = "Fufu, claro.#nNa verdade, eu ia sugerir isso."
70012020-296 = "Ah! Iroha-chan, que fofa!"
70012020-297 = "Posso te chamar de vez em quando? Se não tiver planos depois――"
70012020-299 = "Os dias brilhantes duram para sempre."
70012020-303 = "ON AIR: Gehenna"