[translation]
10048005-1 = "プロローグ;見慣れぬ天井"
10048005-5 = "とある知らない部屋"
10048005-7 = "（見たことない天井だ）"
10048005-8 = "（ここはどこだろう……）"
10048005-15 = "（構造的に、どこかの学園の寮……？）"
10048005-19 = "（体は……拘束されていない）"
10048005-20 = "（これはソファだろうか、布団まで掛けられている）"
10048005-21 = "（連れてきた側も、どうやら敵意はなさそうだ）"
10048005-26 = "（でも、まだ頭痛がする）"
10048005-27 = "（どうしてこんなことになっているんだろう？）"
10048005-32 = "き、気がつきましたか？"
10048005-36 = "[ns] \"えっと、どちら様で……。\""
10048005-37 = "へっ？私ですか？"
10048005-38 = "あ、ええっと……そう、ですね。#n知りませんよね。"
10048005-39 = "私の名前は[ruby=さくらい]桜井[/ruby]ミヨ。#nワイルドハント芸術学院で、文学を専攻しています。"
10048005-40 = "16歳……2年生です。"
10048005-41 = "8月24日生まれで……身長は155cm……。"
10048005-42 = "趣味はタイプライター収集……。"
10048005-43 = "スリーサイズは……。"
10048005-44 = "……。"
10048005-45 = "ええと……本当に、こんなことまで知りたいんですか？"
10048005-46 = "[s1] \"そ、そこまでは聞いてないよ！\"\n[s2] \"……ちょっとは気になるけど。\""
10048005-47 = "そ、そうですか……。"
10048005-48 = "と、というか、いま重要なのはそこじゃないですよね！#n気になるんですか？どうなんですか！？"
10048005-49 = "気にはなるんですね……！？"
10048005-50 = "やっぱり、噂通りの変な方……。"
10048005-51 = "[ns] \"ところで、ここは……？\""
10048005-53 = "と、特殊交易部の部室です。"
10048005-54 = "[s] \"特殊交易部……？\""
10048005-55 = "はい。ワイルドハントの校則に違反している組織です。 "
10048005-56 = "[s] \"いったい何をする部活なの……？\""
10048005-60 = "……「密輸」です。"
10048005-61 = "[s] \"み、密輸！？\""
10048005-62 = "はい。そして、あなたは……シャーレの先生、ですよね？"
10048005-63 = "[s] \"うん、そうだけど……。\""
10048005-64 = "初対面でこんなことをお願いするのは申し訳ないのですが……。"
10048005-65 = "どうか……私の悩みを、聞いていただけませんか？"
10048005-66 = "[s] \"うん、なんでも言って。\""
10048005-70 = "……や、やっぱり、噂通りの方、ですね。"
10048005-71 = "……そ、その。"
10048005-72 = "実は、私……。"
10048005-73 = "特殊交易部を、廃部にしたいんです。"
10048005-74 = "[s] \"廃部……？\""
10048005-75 = "……もう、こんなことはやめたくて。"
10048005-76 = "……何度も何度も校則を破るのが、本当に苦しいんです。"
10048005-77 = "こんなことを言うと困らせてしまうのは分かっていますが……#nどうか、お願いします。"
10048005-78 = "[s3] \"そっか……分かった。\"\n[s4] \"まずは、特殊交易部の部長に会ってもいいかな。\""
10048005-81 = "あっ……えっと、それでしたら私にお伝えいただければと。"
10048005-82 = "[s5] \"部長と直接話してみたいんだ。\"\n[s6] \"何をする部活なのか、ちゃんと知りたいし。\""
10048005-85 = "あ……。"
10048005-89 = "えっと……その……私、なんです。#n特殊交易部の……部長。"
10048005-94 = "[ns] \"……ええっ！？\""
