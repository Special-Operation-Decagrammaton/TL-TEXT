[translation]
10048005-1 = "Prólogo; Um teto desconhecido"
10048005-5 = "Um quarto desconhecido"
10048005-7 = "（Um teto que nunca vi antes）"
10048005-8 = "（Onde será que estou...）"
10048005-15 = "（Pela estrutura, parece um dormitório de alguma escola...?）"
10048005-19 = "（Meu corpo... não está amarrado）"
10048005-20 = "（Será que isso é um sofá? Até me cobriram com um cobertor）"
10048005-21 = "（Quem me trouxe aqui, aparentemente, não tem intenções hostis）"
10048005-26 = "（Mas ainda sinto uma dor de cabeça）"
10048005-27 = "（Por que será que as coisas chegaram a esse ponto?）"
10048005-32 = "V-você acordou?"
10048005-36 = "[ns] \"Er, quem seria você...?\""
10048005-37 = "Hã? Eu?"
10048005-38 = "Ah, bem... é... verdade. #nVocê não me conhece, né."
10048005-39 = "Meu nome é Sakurai Miyo. #nEstudo literatura na Academia de Artes Wildhunt."
10048005-40 = "Tenho 16 anos... estou no segundo ano."
10048005-41 = "Nasci em 24 de agosto... e tenho 155cm de altura..."
10048005-42 = "Meu hobby é colecionar máquinas de escrever..."
10048005-43 = "Minhas medidas são..."
10048005-44 = "..."
10048005-45 = "Er... você realmente quer saber até esse tipo de coisa?"
10048005-46 = "[s1] \"E-eu não perguntei até esse ponto!\"\n[s2] \"...Até que estou um pouco curioso.\""
10048005-47 = "E-entendo..."
10048005-48 = "Q-quer dizer, não é isso que é importante agora! #nVocê está curioso? Como assim!?"
10048005-49 = "Então você está curioso...!?"
10048005-50 = "Como esperado, você é uma pessoa estranha, exatamente como dizem os rumores..."
10048005-51 = "[ns] \"A propósito, onde estamos...?\""
10048005-53 = "N-nós estamos na sala do Departamento de Comércio Especial."
10048005-54 = "[s] \"Departamento de Comércio Especial...?\""
10048005-55 = "Sim. É uma organização que viola o regulamento escolar de Wildhunt."
10048005-56 = "[s] \"O que exatamente vocês fazem nesse clube...?\""
10048005-60 = "...\"Contrabando\"."
10048005-61 = "[s] \"C-contrabando!?\""
10048005-62 = "Sim. E você é... o Sensei do Schale, certo?"
10048005-63 = "[s] \"Sim, sou eu...\""
10048005-64 = "Sinto muito por pedir isso logo no nosso primeiro encontro, mas..."
10048005-65 = "Por favor... você poderia ouvir o meu problema?"
10048005-66 = "[s] \"Sim, pode falar qualquer coisa.\""
10048005-70 = "...V-você é realmente a pessoa que dizem os rumores, né."
10048005-71 = "...E-então."
10048005-72 = "Na verdade, eu..."
10048005-73 = "Eu quero que o Departamento de Comércio Especial seja fechado."
10048005-74 = "[s] \"Fechado...?\""
10048005-75 = "...Eu não quero mais fazer esse tipo de coisa."
10048005-76 = "...É muito doloroso ter que quebrar as regras da escola repetidamente."
10048005-77 = "Eu sei que te colocar no meio disso é um incômodo, mas... #npor favor, eu te imploro."
10048005-78 = "[s3] \"Entendi... compreendo.\"\n[s4] \"Primeiro, posso conhecer o chefe do Departamento de Comércio Especial?\""
10048005-81 = "Ah... er, se for isso, você pode me contar que eu repasso."
10048005-82 = "[s5] \"Eu quero falar diretamente com o chefe.\"\n[s6] \"Quero entender direito o que esse clube faz.\""
10048005-85 = "Ah..."
10048005-89 = "Bem... é... sou eu. A... chefe do Departamento de Comércio Especial."
10048005-94 = "[ns] \"...Hã!?\""
