[translation]
61010-1 = "Episódio 1; Nosso lugar"
61010-4 = "Haa... haa...#n snif... haa..."
61010-11 = "Haa, haa... uuu..."
61010-16 = "Kuh...!#n Cof, cof! Geho, geho...!"
61010-21 = "...Acho que vou descansar um pouco antes de seguir."
61010-22 = "Fuu... haa...#n haa..."
61010-30 = "...Aha."
61010-31 = "Eu achei que, se estivesse lá fora, as coisas dariam certo."
61010-32 = "...É isso."
61010-33 = "Achei que, ao sair, algo certamente mudaria."
61010-35 = "Se aquelas garotas..."
61010-36 = "Se é o caminho que o esquadrão escolheu... certamente."
61010-37 = "Eu pensei que também conseguiria seguir em frente."
61010-39 = "...Chuva."
61010-40 = "(Está frio...)"
61010-41 = "(A ponta dos meus dedos...)"
61010-42 = "Não... eu preciso ir.#n Ainda não..."
61010-53 = "Hã? Salário? Do que você está falando?"
61010-54 = "Não entendo bem o que quer dizer.#n Não me lembro de ter assinado nenhum contrato desse tipo."
61010-56 = "Arius? Nunca ouvi falar."
61010-57 = "Isso significa que você não tem registro escolar, certo?#n Hehe... parece que vou poder fazer o que quiser com você."
61010-59 = "Vá fazer isso."
61010-60 = "...Não consegue? Haa... que decepção.#n Você não foi treinada justamente para esse tipo de coisa?"
61010-61 = "Como eu sei disso?#n O submundo tem sua própria rede de informações."
61010-62 = "...Hã? Não quer fazer esse tipo de coisa?#n Não quer se envolver com trabalhos do submundo nunca mais?"
61010-63 = "Haha, não me faça rir.#n Você acha mesmo que está em posição de escolher trabalho?"
61010-64 = "O que adianta fugir da única coisa que você sabe fazer?"
61010-65 = "...Sumam daqui. Se não pretendem aceitar o trabalho, é perda de tempo."
61010-67 = "...Tudo não passou de arrogância."
61010-68 = "Mesmo sabendo que não daria certo."
61010-69 = "Mesmo sabendo que o mundo não funciona de forma tão simples."
61010-70 = "Mesmo sabendo que as coisas... nunca saem como planejado..."
61010-71 = "Tudo bem ser arrogante e se enganar...#n mas o preço sempre acaba sendo cobrado."
61010-73 = "[log=마이아 언노운]Não existe um paraíso para onde se possa fugir.[/log]"
61010-75 = "[log=마이아 언노운]Eu deveria saber disso.[/log]"
61010-77 = "[log=마이아 언노운]Ainda assim... eu queria sonhar.[/log]"
61010-80 = "[log=마이아 언노운]Que existe esperança... eu também queria acreditar nisso.[/log]"
61010-82 = "[log=마이아 언노운][ff4444]Mas... talvez isso, por si só, já fosse um sonho.[/log]"
61010-85 = "Ah..."
61010-86 = "Mesmo assim, eu consegui voltar."
61010-87 = "Não é como se algo tivesse mudado, mas meu coração se acalma..."
61010-88 = "— Escola Filial de Arius."
61010-90 = "O lugar onde cresci—"
61010-91 = "O lugar onde suportei tudo—"
61010-92 = "O lugar onde eu... recebi ensinamentos."
61010-93 = "A nossa... escola."
61010-100 = "...Você voltou."
61010-106 = "...Eh?"
61010-107 = "Primeiro, descanse um pouco.#n Conversaremos depois disso."
61010-108 = "Senpai..."
61010-109 = "Subaru-senpai...!"
61010-110 = "Sim, sou eu. Sou a Kakehashi Subaru."
61010-111 = "Já está tudo bem, Tachiki Maia-san. #nFique tranquila."
61010-112 = "Mesmo que o mundo a rejeite... #neu e Arius não a abandonaremos."
61010-113 = "Sim... ah, sim...!"
61010-115 = "[log=스바루]Bem-vinda de volta.[/log]"
61010-117 = "[log=스바루][ff4444]Ao nosso... Arius.[-][/log]"
61010-121 = "Próximo episódio: O Dever do Estudante"
