[translation]
61010-1 = "第1話;私たちの居場所"
61010-4 = "はぁ……はぁ……#nっく……はぁ……。"
61010-11 = "はあっ、はあっ……うぅっ……。"
61010-16 = "くっ……！#nゴホッ、ゴホッ！ゲホッ、ゲホッ……！"
61010-21 = "……少し、休んでから行こうかな。"
61010-22 = "ふぅ……はぁ……#nはぁ……。"
61010-30 = "……あは。"
61010-31 = "外なら、なんとかなると思ってたのに。"
61010-32 = "……そう。"
61010-33 = "外に出たら、きっと何かが変わると思ってた。"
61010-35 = "あの子たちが――"
61010-36 = "スクワッドが選んだ道なら――きっと。"
61010-37 = "私でも、歩いていけると思ったんだ。"
61010-39 = "……雨。"
61010-40 = "（寒い……）"
61010-41 = "（指先の感覚が……）"
61010-42 = "ダメ……行かなきゃ。#nまだ……。"
61010-53 = "ん？給料？何の話だ？"
61010-54 = "言っている意味がよく分からないな。#nそんな契約書を交わした覚えはないぞ。"
61010-56 = "アリウスだぁ？聞いたこともねぇな？"
61010-57 = "ってことはつまり、学籍がないも同然ってことだよな？#nへへ……こりゃ好き勝手できそうだな。"
61010-59 = "これをやってこい。"
61010-60 = "……できない？はぁ……期待外れだな。#nその手の訓練を積んできたんじゃないのか？"
61010-61 = "どうして知ってるのかって？#n裏には裏の情報網があるってだけだよ。"
61010-62 = "……はぁ？そういうことはしたくない？#n二度と裏の仕事には関わりたくない？"
61010-63 = "ははっ、笑わせるなよ。#n仕事を選べる立場だとでも思ってるのか？"
61010-64 = "唯一できることから逃げてどうする。"
61010-65 = "……失せろ。仕事を受ける気がないなら、時間の無駄だ。"
61010-67 = "……全部、思い上がりだった。"
61010-68 = "うまくいくわけなんてないのに。"
61010-69 = "世の中、そんなに簡単にいくわけなんてないのに。"
61010-70 = "思い通りになんて……なるはずないのに……。"
61010-71 = "思い上がって勘違いしてもいい……#nでも、代償は伴ってくるもの。"
61010-73 = "[log=마이아 언노운]逃げた先に楽園なんてない。[/log]"
61010-75 = "[log=마이아 언노운]そんなこと、分かってたはずなのに。[/log]"
61010-77 = "[log=마이아 언노운]それでも……夢を見たかった。[/log]"
61010-80 = "[log=마이아 언노운]希望はあるんだ、って……私も、信じてみたかった。[/log]"
61010-82 = "[log=마이아 언노운][ff4444]でも……もしかしたら、それ自体が夢だったのかもしれない。[-][/log]"
61010-85 = "ああ……。"
61010-86 = "それでも、帰ってこれた。"
61010-87 = "何かが変わったわけじゃないけど、気持ちは落ち着く……。"
61010-88 = "――アリウス分校。"
61010-90 = "私が育った場所――"
61010-91 = "私が耐えてきた場所――"
61010-92 = "私が――教えを受けた場所。"
61010-93 = "私たちの――学園。"
61010-100 = "……戻ったのですね。"
61010-106 = "……え？"
61010-107 = "まずはゆっくり休んでください。#n話はその後で。"
61010-108 = "せん、ぱい……。"
61010-109 = "スバル先輩……！"
61010-110 = "はい、私です[ruby=かけはし]。梯ス[/ruby]バルですよ。"
61010-111 = "もう大丈夫です、[ruby=たちぎ]立木[/ruby]マイアさん。#n安心してください。"
61010-112 = "たとえ世界があなたを拒んでも……#n私とアリウスは、あなたを見捨てません。"
61010-113 = "はい……っ、はい……！"
61010-115 = "[log=스바루]おかえりなさい。[/log]"
61010-117 = "[log=스바루][ff4444]私たちの――アリウスへ。[-][/log]"
61010-121 = "次回;生徒の本分"
