[translation]
61010-1 = "Episódio 1; O Nosso Lugar"
61010-4 = "Haa... haa...#nUgh... haa..."
61010-11 = "Arf, arf... ugh..."
61010-16 = "Ugh...!#nCof, cof! Cof, cof...!"
61010-21 = "...Acho que vou dar uma descansada antes de seguir."
61010-22 = "Ufa... haa...#nhaa..."
61010-30 = "...Haha."
61010-31 = "Eu achei que lá fora eu ia conseguir me virar."
61010-32 = "...É."
61010-33 = "Achei que se eu caísse no mundo, as coisas iriam mudar."
61010-35 = "Aquelas garotas—"
61010-36 = "O caminho que o Esquadrão escolheu—com certeza."
61010-37 = "Achei que até eu conseguiria trilhar esse caminho."
61010-39 = "...Chuva."
61010-40 = "(Que frio...)"
61010-41 = "(Meus dedos tão dormentes...)"
61010-42 = "Não... eu tenho que continuar.#nAinda não..."
61010-53 = "Hã? Pagamento? Que papo é esse?"
61010-54 = "Não tô entendendo nada.#nNão lembro da gente ter assinado contrato nenhum."
61010-56 = "Arius? Nunca nem ouvi falar."
61010-57 = "Então quer dizer que é como se você nem tivesse registro escolar, né?#nHehe... acho que vou poder fazer a festa com você."
61010-59 = "Vai lá e resolve essa parada pra mim."
61010-60 = "...Não consegue? Ah... que decepção.#nVocê não foi treinada pra esse tipo de parada?"
61010-61 = "Como eu sei disso?#nO submundo tem a própria rede de contatos, só isso."
61010-62 = "...Hã? Cê não quer fazer esse tipo de coisa?#nNão quer mais se meter com trampo sujo?"
61010-63 = "Haha, não me faz rir.#nVocê acha mesmo que tá com moral pra escolher trampo?"
61010-64 = "Vai fugir da única coisa que cê sabe fazer?"
61010-65 = "...Vaza. Se não vai aceitar o trampo, tá só me fazendo perder tempo."
61010-67 = "...Fui inocente demais."
61010-68 = "Era óbvio que não ia dar certo."
61010-69 = "O mundo não é fácil desse jeito."
61010-70 = "As coisas nunca saem... do jeito que a gente quer..."
61010-71 = "Até dá pra sonhar alto e se iludir...#nMas a conta sempre chega."
61010-73 = "[log=마이아 언노운]Não existe paraíso para onde se foge.[/log]"
61010-75 = "[log=마이아 언노운]Eu já devia saber disso.[/log]"
61010-77 = "[log=마이아 언노운]Mesmo assim... eu queria poder sonhar.[/log]"
61010-80 = "[log=마이아 언노운]Eu queria tentar acreditar... que ainda existia alguma esperança.[/log]"
61010-82 = "[log=마이아 언노운][ff4444]Mas... talvez isso por si só já fosse uma ilusão.[-][/log]"
61010-85 = "Ahh..."
61010-86 = "Pelo menos... eu consegui voltar."
61010-87 = "Não que algo tenha mudado, mas só de estar aqui já me acalma..."
61010-88 = "— Escola Filial de Arius."
61010-90 = "O lugar onde eu cresci—"
61010-91 = "O lugar onde eu aguentei tanta coisa—"
61010-92 = "O lugar—onde aprendi minhas lições."
61010-93 = "A nossa—escola."
61010-100 = "...Você voltou."
61010-106 = "...Hã?"
61010-107 = "Primeiro, vá descansar um pouco.#nDeixe para conversarmos depois."
61010-108 = "Sen... pai..."
61010-109 = "Subaru-senpai...!"
61010-110 = "Sim, sou eu. Subaru Kakehashi."
61010-111 = "Tudo vai ficar bem agora, Maia Tachigi.#nPode ficar tranquila."
61010-112 = "Mesmo que o mundo vire as costas pra você...#nEu e Arius nunca vamos te abandonar."
61010-113 = "Sim... sim...!"
61010-115 = "[log=스바루]Bem-vinda de volta.[/log]"
61010-117 = "[log=스바루][ff4444]Para a nossa—Arius.[-][/log]"
61010-121 = "Próximo Episódio; O Dever de um Aluno"