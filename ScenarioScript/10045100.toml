[translation]
10045100-1 = "第10話;決勝の果て"
10045100-2 = "第1試合から手に汗握る名勝負が生まれましたね！"
10045100-6 = "次はどんな勝負になるのでしょうか！？最終戦第2試合！#nイズナ選手対チセ選手の試合を開始しますっ！"
10045100-7 = "チセちゃん！頑張ってください！"
10045100-8 = "うおお！イズナ～！「忍術研究部」の力、見せつけてやるんだよ！"
10045100-9 = "私たちの、分まで、頑張ってください……イズナちゃん！"
10045100-11 = "観客席から試合を見るのは初めてだけど――"
10045100-12 = "みんな、こうやって応援してたんだね。"
10045100-13 = "凄い熱量だよね。"
10045100-15 = "これぞまさに夏のふぇすてぃばるですの！"
10045100-16 = "さて……レンゲ先輩と決勝で対戦するのはどちらになるのか――"
10045100-17 = "身共、楽しみですの！"
10045100-19 = "[ns] \"いざ尋常に～勝負！\""
10045100-21 = "参ります！イズナ流忍法、高速移動の術！"
10045100-25 = "速いね～"
10045100-26 = "でも……負けないよ～"
10045100-33 = "意外や意外！これは手数……スピードの勝負になってきました！"
10045100-34 = "チセ殿、これほど俊敏な動きができるとは……！#n御見それしました！"
10045100-35 = "[ns] \"あれは……！カルタとムシクイーンで鍛えられた圧倒的なスピード！\""
10045100-36 = "百鬼夜行のアイドルにできないことなんてないのか……！？"
10045100-37 = "そろそろ、終わらせるね～"
10045100-38 = "俳句を、詠んであげる。"
10045100-39 = "なんとっ……！？"
10045100-40 = "イズナ流忍法！空蝉の術……！"
10045100-45 = "逃げられた。"
10045100-46 = "チセ殿……いい眼をお持ちのようで……。#n思わず目力に気圧されてしまいました！"
10045100-47 = "ですが、イズナも負けません！#n応援してくれる皆さんのためにも……！"
10045100-49 = "私と一緒だね～"
10045100-50 = "うーん……。"
10045100-52 = "ど#nっ#nち#nか#nが"
10045100-54 = "倒#nれ#nる#nま#nで#nや#nる"
10045100-56 = "勝#n負#nか#nな"
10045100-59 = "[log=치세 수영복]どっちかが[/log]"
10045100-60 = "[log=치세 수영복]倒れるまでやる[/log]"
10045100-61 = "[log=치세 수영복]勝負かな[/log]"
10045100-62 = "いざ……！"
10045100-63 = "……！"
10045100-66 = "実力はほぼ互角。お互いに決定打がないまま、戦いは長期戦にもつれ込んだ。"
10045100-67 = "もはや、勝敗を分けるものは……精神力のみ。"
10045100-68 = "そして試合は終盤へと差し掛かる……。"
10045100-70 = "はぁ、はぁ……。"
10045100-71 = "ふぅ……。"
10045100-72 = "そろそろ、二人とも限界だね。"
10045100-73 = "次の一撃で勝負が決まるはず……。"
10045100-74 = "どちらが勝つのか、まだまだ分かりませんの！"
10045100-76 = "チセちゃん！頑張って……！"
10045100-78 = "忍者とはどんな窮地でも――！"
10045100-79 = "決して、諦めない……もの！"
10045100-87 = "そこに立っているのは――！"
10045100-91 = "はぁ、はぁ……。"
10045100-92 = "[ns] \"[ruby=くだ]久田[/ruby]イズナ……！\""
10045100-95 = "チセ……殿。いい勝負、でした……！"
10045100-99 = "負けちゃった。"
10045100-100 = "……ここで一句。"
10045100-101 = "戦って"
10045100-102 = "負けても悔いなし"
10045100-103 = "青春だ"
10045100-105 = "よし、これで決勝の相手が決まったな。"
10045100-106 = "レンゲ殿ー！次の試合で……お会いしましょう！"
10045100-107 = "[ns] \"ついにファイナリストが出揃ったね！\""
10045100-108 = "それでは少し休憩を挟んだ後、待望の決勝戦を開始します！"
10045100-109 = "皆さん、しばらくお待ちください！"
10045100-111 = "こちらですか。あなた様が優勝者を審査する会場は。"
10045100-112 = "まずは情報収集から始めましょうか。"
10045100-114 = "しばらくして……。"
10045100-117 = "大変長らくお待たせいたしました！#n百夜水上祭の決勝戦！その準備がすべて整いましたっ！"
10045100-118 = "決勝に進んだお二人、まずは意気込みをお願いします！"
10045100-119 = "あ、えっと、イズナは……。"
10045100-120 = "素晴らしい方々と楽しい試合をさせていただき、本当に光栄でした！#n決勝戦もこの気持ちを忘れずに全力で挑みます！"
10045100-121 = "みなさんも最後まで応援よろしくお願いします！ニンニン！"
10045100-123 = "頑張れー！イズナー！"
10045100-124 = "い、いけぇぇ……。"
10045100-126 = "次はアタシの番だな。"
10045100-127 = "アタシは……一人の力だけじゃここまで来られなかった。#n仲間がいて、友達の応援があったからこそ、ここまで来れたんだ。"
10045100-128 = "だから見ててくれよ！みんなの分までアタシが勝ってみせるから！"
10045100-129 = "負けたら許さないから。"
10045100-130 = "レンゲならきっとやれるよ。"
10045100-131 = "先輩！ぱ～ふぇくとな勝利を見せてください！"
10045100-133 = "お二方とも、ありがとうございます！#nそれではいよいよ、試合開始です……！"
10045100-134 = "さあ、お互い向き合って……！"
10045100-140 = "[ns] \"いざ尋常に……勝負！！\""
10045100-148 = "（まぁ、そう簡単にはいかないよな）"
10045100-149 = "（この一瞬でも分かります。#nレンゲ殿……凄まじい相手です！）"
10045100-150 = "（だけど……）"
10045100-151 = "（でも……）"
10045100-152 = "（ここで退くわけにはいかない！）#n（ここで負けるわけにはいきません！）"
10045100-159 = "先生、ここで優勝者を予想していただけますか～？"
10045100-160 = "[s] \"正直……分からないね。どちらが勝ってもおかしくないし。\""
10045100-161 = "あの先生でも！最後の一瞬まで分からない！#nだからこそ手に汗握る！ここからは瞬き厳禁ですよ！"
10045100-162 = "（頑張ってよかったなぁ……百夜水上祭、大成功の予感……！）"
10045100-163 = "（これで私たちお祭り運営委員会の名前が、百鬼夜行の歴史におっきく刻まれることは間違いな――）"
10045100-164 = "うふふ、お待ちください。"
10045100-165 = "……うん？えっ！？あ、あなたは……！？"
10045100-166 = "ここまで静かに見守っておりましたが……そろそろ我慢の限界です。"
10045100-167 = "覇を競い、先生が審査される大会……。"
10045100-168 = "やはり、私も参加しなければ――"
10045100-172 = "災厄の狐が動き出した！よし、私たちも行くぞ！"
10045100-173 = "全部ぶっ壊せえええ！！！"
10045100-185 = "これは、一体……？"
10045100-186 = "あああっ、手間暇かけて準備した競技場が……！"
10045100-187 = "な、なんて酷いことを！"
10045100-189 = "くっくっく……止められるもんなら止めてみろ！#nこっちには「災厄の狐」がついているんだからな！"
10045100-193 = "さぁ、やるぞ！今日からここは私たちのシマだ！"
10045100-194 = "……誰が競技場を壊していいと言いました？"
10045100-195 = "……うん？"
10045100-196 = "先生の御前で強者たちを倒し、私こそが百鬼夜行随一であると、お褒めの言葉をいただくつもりでしたのに。"
10045100-197 = "それを邪魔するだなんて、どういう了見ですか？"
10045100-198 = "えっ？いや、その……一緒に強者を倒しに来たんだろ？"
10045100-200 = "私は規則にのっとって、競技に挑みたかっただけです。"
10045100-201 = "それを、このような……。"
10045100-202 = "あ、あれ？"
10045100-203 = "……みんな、行くよ。"
10045100-204 = "先生、指揮をお願い。"
10045100-205 = "[s] \"うん！任せて！\""
