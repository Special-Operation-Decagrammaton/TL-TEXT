[translation]
10045100-1 = "Episódio 10: O Fim da Final"
10045100-2 = "Desde a primeira partida, tivemos confrontos memoráveis que nos deixaram na ponta da cadeira!"
10045100-6 = "Qual será o próximo confronto!? Segunda partida da final!#nComeçando a luta entre Izuna e Chise!"
10045100-7 = "Chise-chan! Boa sorte!"
10045100-8 = "Uooo! Izuna~! Mostre a todos o poder do \"Clube de Pesquisa Ninjutsu\"!"
10045100-9 = "Por favor, dê o seu melhor... por nós também, Izuna-chan!"
10045100-11 = "É a primeira vez que assisto a uma partida da arquibancada, mas..."
10045100-12 = "Então é assim que todo mundo torce."
10045100-13 = "Que energia incrível."
10045100-15 = "Isso sim é um verdadeiro festival de verão!"
10045100-16 = "Bem... quem será que vai enfrentar a Renge-senpai na final?"
10045100-17 = "Eu estou muito ansiosa!"
10045100-19 = "[ns] \"Prepare-se para o combate!\""
10045100-21 = "Lá vou eu! Arte Ninja estilo Izuna: Técnica de Movimentação em Alta Velocidade!"
10045100-25 = "Que rápida~"
10045100-26 = "Mas... eu não vou perder~"
10045100-33 = "Inesperado! Isso virou uma disputa de agilidade... de velocidade!"
10045100-34 = "Senhorita Chise, pensar que você era capaz de movimentos tão ágeis...!#nEstou impressionada!"
10045100-35 = "[ns] \"Aquilo é...! A velocidade avassaladora treinada com cartas e Mushiqueen!\""
10045100-36 = "Existe algo que a idol de Hyakkiyako não consiga fazer...!?"
10045100-37 = "Está na hora de terminar isso~"
10045100-38 = "Vou recitar um haiku para você."
10045100-39 = "O quê...!?"
10045100-40 = "Arte Ninja estilo Izuna! Técnica da Cigarra...!"
10045100-45 = "Ela escapou."
10045100-46 = "Senhorita Chise... você tem um olhar muito intenso...#nFiquei até intimidada pela força do seu olhar!"
10045100-47 = "Mas a Izuna não vai perder!#nPelo bem de todos que estão torcendo por mim...!"
10045100-49 = "Você é igual a mim~"
10045100-50 = "Hmm..."
10045100-52 = "Até#nque#numa#nde#nnós#ndois"
10045100-54 = "cai#na#por#nex#naus#ntão"
10045100-56 = "de#nci#ndir"
10045100-59 = "[log=치세 수영복]Até que um de nós[/log]"
10045100-60 = "[log=치세 수영복]cair por exaustão[/log]"
10045100-61 = "[log=치세 수영복]decidir[/log]"
10045100-62 = "Lá vamos nós...!"
10045100-63 = "……!"
10045100-66 = "As habilidades são praticamente equivalentes. Sem um golpe decisivo de ambos os lados, a luta se arrastou para um confronto de longa duração."
10045100-67 = "Agora, o que definirá a vitória é... apenas a força de vontade."
10045100-68 = "E a partida entra em sua fase final..."
10045100-70 = "Haa, haa..."
10045100-71 = "Fuu..."
10045100-72 = "Já está na hora, ambas estão no limite."
10045100-73 = "O próximo golpe deve decidir o vencedor..."
10045100-74 = "Quem vencerá? Ainda não dá para saber!"
10045100-76 = "Chise-chan! Boa sorte...!"
10045100-78 = "Um ninja, não importa a situação de aperto...!"
10045100-79 = "Nunca, jamais desiste!"
10045100-87 = "Quem está de pé ali é...!"
10045100-91 = "Haa, haa..."
10045100-92 = "[ns] \"Kuda Izuna……！\""
10045100-95 = "Chise…… dona. Foi uma ótima luta……！"
10045100-99 = "Eu perdi."
10045100-100 = "……Aqui vai um haiku."
10045100-101 = "Lutei com garra"
10045100-102 = "Mesmo perdendo, sem arrependimentos"
10045100-103 = "Isso é a juventude"
10045100-105 = "Muito bem, os finalistas foram decididos."
10045100-106 = "Renge-dono! Vamos nos encontrar... na próxima partida!"
10045100-107 = "[ns] \"Finalmente os finalistas foram definidos!\""
10045100-108 = "Então, após uma breve pausa, daremos início à tão esperada final!"
10045100-109 = "Todos, por favor, aguardem um momento!"
10045100-111 = "É aqui, então. O local onde você julgará o vencedor."
10045100-112 = "Vamos começar coletando algumas informações."
10045100-114 = "Algum tempo depois……."
10045100-117 = "Muito obrigado por esperarem!#nA final do Festival Aquático de Hyakkiyakou! Tudo está pronto!"
10045100-118 = "As duas finalistas, por favor, digam algumas palavras antes de começar!"
10045100-119 = "Ah, bem, a Izuna..."
10045100-120 = "Foi uma honra poder lutar contra pessoas tão incríveis!#nNa final, não esquecerei esse sentimento e darei o meu melhor!"
10045100-121 = "Conto com a torcida de todos até o fim! Nin-nin!"
10045100-123 = "Boa sorte! Izuna!"
10045100-124 = "V-vai lá..."
10045100-126 = "Agora é a minha vez."
10045100-127 = "Eu... não teria chegado aqui sozinha. Cheguei até aqui porque tive meus companheiros e o apoio dos meus amigos."
10045100-128 = "Então, fiquem de olho! Vou vencer por todos vocês!"
10045100-129 = "Não vou te perdoar se perder."
10045100-130 = "A Renge com certeza vai conseguir."
10045100-131 = "Senpai! Por favor, nos mostre uma vitória perfeita!"
10045100-133 = "Agradeço a ambas!#nEntão, finalmente, a partida vai começar……!"
10045100-134 = "Vamos, fiquem de frente uma para a outra……!"
10045100-140 = "[ns] \"Preparem-se…… Lutar!!\""
10045100-148 = "(Bem, não vai ser tão fácil assim, né)"
10045100-149 = "(Consigo sentir até neste instante.#nRenge-dono…… que oponente formidável!)"
10045100-150 = "(Mas……)"
10045100-151 = "(Mas……)"
10045100-152 = "(Não posso recuar agora!)#n(Não posso perder aqui!)"
10045100-159 = "Sensei, você poderia prever quem será o vencedor?"
10045100-160 = "[s] \"Sinceramente…… não sei. Qualquer uma pode vencer.\""
10045100-161 = "Até o Sensei! Não dá para saber até o último segundo!#nÉ por isso que é tão emocionante! Não pisquem!"
10045100-162 = "(Que bom que me esforcei…… sinto que o Festival Aquático de Hyakkiyakou será um sucesso absoluto……!)"
10045100-163 = "(Com isso, o nome do nosso Comitê Organizador do Festival ficará gravado na história de Hyakkiyakou, sem dúvida――)"
10045100-164 = "Ufufu, espere um pouco."
10045100-165 = "……Hm? O quê!? Ah, você é……!?"
10045100-166 = "Eu estava observando silenciosamente até agora…… mas minha paciência chegou ao limite."
10045100-167 = "Um torneio onde se disputa a supremacia e o Sensei é o juiz……"
10045100-168 = "Como esperado, eu também preciso participar――"
10045100-172 = "A raposa do desastre começou a se mover! Certo, vamos lá também!"
10045100-173 = "Destruam tudo!!!"
10045100-185 = "O que é isso……?"
10045100-186 = "Ahhh, a arena que preparamos com tanto esforço……!"
10045100-187 = "M-mas que coisa horrível!"
10045100-189 = "Hehehe... tente me impedir se for capaz!#nAfinal, eu tenho a \"Raposa da Calamidade\" do meu lado!"
10045100-193 = "Muito bem, vamos lá! A partir de hoje, este lugar é nosso território!"
10045100-194 = "……Quem disse que vocês tinham permissão para destruir a arena?"
10045100-195 = "……Hm?"
10045100-196 = "Eu pretendia derrotar os mais fortes diante do Sensei e receber seus elogios por ser a melhor de Hyakkiyako."
10045100-197 = "Que tipo de atitude é essa, atrapalhando meus planos?"
10045100-198 = "Hã? Não, espera... a gente não veio aqui justamente para derrotar os fortes?"
10045100-200 = "Eu só queria desafiar a competição seguindo as regras."
10045100-201 = "E você fez isso com tudo..."
10045100-202 = "A-ah, é mesmo?"
10045100-203 = "……Pessoal, vamos lá."
10045100-204 = "Sensei, por favor, assuma o comando."
10045100-205 = "[s] \"Certo! Deixe comigo!\""
