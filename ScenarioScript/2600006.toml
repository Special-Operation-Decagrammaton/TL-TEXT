[translation]
2600006-1 = "Inesperado"
2600006-4 = "Ah, Sensei. Obrigado por vir."
2600006-5 = "Desculpe, eu não esperava que você pudesse vir tão rápido,"
2600006-6 = "então não estava muito preparada... mas agradeço a ajuda."
2600006-7 = "Ah, bem, os documentos estão em outra sala."
2600006-8 = "Um lugar reservado para isso, por assim dizer."
2600006-12 = "Sim, é por aqui."
2600006-24 = "(A sala estava limpa no geral, mas havia muitas coisas espalhadas por ela)"
2600006-25 = "(Mais do que bagunçada, era uma sala que transmitia uma sensação de vida cotidiana)"
2600006-29 = "Desculpe, pensando bem, convidar o Sensei para um lugar que... não está muito bem limpo..."
2600006-30 = "Quer que eu pegue apenas os documentos e nos mudemos para outro lugar...?"
2600006-31 = "[s1] \"Não se preocupe, o Schale às vezes é bem pior.\"\n[s2] \"Isso aqui, por acaso, é um item pessoal da Chinatsu...?\""
2600006-32 = "Fufu, é mesmo...? Obrigada. Então, vamos ficar por aqui."
2600006-33 = "Ah, sim. É verdade."
2600006-34 = "Não há muitos membros do comitê que façam esse tipo de coisa comigo..."
2600006-35 = "Então, naturalmente, acabei usando este lugar sozinha com frequência."
2600006-36 = "Venho aqui para processar o trabalho ou quando preciso passar a noite."
2600006-40 = "Esta cama dobrável serve para isso."
2600006-41 = "……Parece com o Schale?"
2600006-42 = "Fufu, é verdade. Talvez seja um lugar bem parecido, de fato."
2600006-43 = "Bem, então... os documentos são estes."
2600006-50 = "(BUM!!!)"
2600006-54 = "[ns3] \"……Você pretendia fazer tudo isso sozinha?\"\n[ns4] \"……De quantos anos são esses documentos?\""
2600006-55 = "Bem... sim, é isso mesmo."
2600006-56 = "É a quantidade de sempre, mas...?"
2600006-57 = "Não."
2600006-58 = "São apenas os documentos da semana passada, mas...?"
2600006-59 = "O processamento de aprovação já foi feito pela presidente, então só falta classificar tudo isso."
2600006-60 = "Bem, como você deve ter notado, é um trabalho tedioso... desculpe, poderia me ajudar?"
2600006-61 = "[s5] \"Claro, pode deixar comigo.\"\n[s6] \"Esse tipo de coisa é minha especialidade.\""
2600006-62 = "……Muito obrigada."
2600006-63 = "……Muito obrigada."
2600006-64 = "Na verdade, lá no fundo... eu já imaginava que o Sensei diria isso."
2600006-65 = "Talvez seja um pouco indelicado da minha parte pensar assim..."
2600006-66 = "Quando fiquei pensando no que fazer, o Sensei me veio à mente."
2600006-67 = "……Ehem. Desculpe, mudei de assunto. Então, conto com você, Sensei."
2600006-69 = "(Como a quantidade era enorme, entrei no modo de concentração total)"
2600006-70 = "(Embora fosse apenas classificar com base nas regras, mesmo com nós dois, levou mais de meio dia...)"
2600006-75 = "……Acho que terminamos por aqui."
2600006-76 = "Ufa, nem percebi que já anoiteceu..."
2600006-77 = "Ah, não,"
2600006-78 = "de jeito nenhum."
2600006-79 = "Na verdade, se não fosse pelo Sensei, não teríamos terminado nem a essa hora."
2600006-80 = "……?"
2600006-81 = "Ah, você está falando desta sala...? Ah, muito obrigada."
2600006-82 = "O pôster...? Bem, sim. É um item pessoal meu, por assim dizer..."
2600006-83 = "Digo, por acaso é estranho...?"
2600006-84 = "Ah, é mesmo...? Fico feliz em ouvir isso."
2600006-85 = "Fico contente que tenha dito isso."
2600006-86 = "Como mencionei antes, esta sala tem muitos itens pessoais, então, na prática, é..."
2600006-87 = "Meu quarto, ou melhor, por assim dizer..."
2600006-91 = "……"
2600006-92 = "[s] \"……？\""
2600006-93 = "……"
2600006-94 = "(A uma hora dessas...)"
2600006-95 = "(Praticamente no \"meu quarto\"...)"
2600006-96 = "(Sozinha com o Sensei...?)"
2600006-97 = "[s] \"O que houve...?\""
2600006-98 = "Ah, bem, é que..."
2600006-99 = "……!"
2600006-102 = "[wa:500]— Ah, [wa:950]eu não tinha me dado conta, [wa:750]mas..."
2600006-105 = "— Esta situação é, [wa:1250]bem,"
2600006-107 = "[wa:100]— Como posso dizer, [wa:700]não é muito boa..."
2600006-110 = "[wa:1450]— Ei, [wa:1000]Sensei...?"
2600006-112 = "[wa:50]— Bem, [wa:1250]se você não disser nada, [wa:2050]então..."
2600006-115 = "— Se esse silêncio [wa:500]continuar,"
2600006-117 = "[wa:100]— Vai acabar ficando estranho..."
2600006-120 = "[wa:350]— Não, [wa:600]não é [wa:550]que eu esteja apressando as coisas...!"
2600006-122 = "— Bem, [wa:1350]o que eu deveria dizer..."
2600006-125 = "— Nessas horas, [wa:1150]o que eu deveria fazer..."
2600006-128 = "[ns] \"Chinatsu, você está bem? Seu rosto está vermelho, será que você está passando mal de cansaço...?\""
2600006-129 = "[wa:250]— ...Ufa."
2600006-131 = "— Não... [wa:1400]estou bem, [wa:1500]sim."
2600006-134 = "— Fufu. [wa:1100]Sério, [wa:1300]isso é tão embaraçoso..."
2600006-136 = "— O que será que é [wa:1400]isso?"
2600006-139 = "[wa:1500]— Só de estar [wa:700]com o Sensei,"
2600006-141 = "[wa:50]— Por algum motivo, [wa:500]eu não consigo agir normalmente..."
2600006-144 = "— Sério, [wa:1400]que situação complicada..."
2600006-146 = "— Em vários sentidos..."
2600006-149 = "……Desculpe, Sensei."
2600006-150 = "É que, eu tirei conclusões precipitadas e acabei pensando em coisas estranhas..."
2600006-151 = "Eu nunca estive em uma situação como esta antes..."
2600006-152 = "……Você está bem?"
2600006-153 = "……Sim,"
2600006-154 = "Obrigada."
2600006-158 = "……"
2600006-159 = "[s] \"Chinatsu?\""
2600006-163 = "Ah, não, não é nada. Estou bem..."
2600006-164 = "É que eu acabei me precipitando sozinha..."
2600006-165 = "Sim."
2600006-167 = "No fim das contas, só eu... né?"
