[translation]
2600006-1 = "思いがけない"
2600006-4 = "あ、先生。お越しいただきありがとうございます。"
2600006-5 = "すみません、まさかこんなすぐに来ていただけるとは思っておらず、"
2600006-6 = "あまり準備もできていなかったのですが……助かります。"
2600006-7 = "あ、えっと、書類はまた別の部屋にありまして。"
2600006-8 = "それ用の場所、といいますか。"
2600006-12 = "はい、こちらです。"
2600006-24 = "（その部屋は全体的に綺麗だったけれど、物もそれなりにたくさん置かれている）"
2600006-25 = "（散らかってると言うよりは、何となく生活感が感じられる部屋だった）"
2600006-29 = "すみません、よく考えるとこんな……あまり掃除の行き届いていない場所に先生をお呼びしてしまうことに……。"
2600006-30 = "書類だけ持って、他の場所に移りましょうか……？"
2600006-31 = "[s1] \"気にしないで、シャーレは時々もっとすごいから。\"\n[s2] \"これもしかして、チナツの私物……？\""
2600006-32 = "ふふっ、そうですか……ありがとうございます。では、ここで。"
2600006-33 = "あ、はい。そうですね。"
2600006-34 = "こういうことを一緒にしてくれる委員も、あまりいないので……。"
2600006-35 = "自然と、私がひとりでここを使うことが多くなってますね。"
2600006-36 = "仕事を処理するためにここに来たり、泊りがけの時に使ったりもします。"
2600006-40 = "この折り畳みのベッドは、そのための物ですね。"
2600006-41 = "……シャーレに似てる？"
2600006-42 = "ふふっ、そうですね。確かに同じような場所なのかもしれません。"
2600006-43 = "では、えっと……書類はこれです。"
2600006-50 = "（ドンッッ！！！）"
2600006-54 = "[ns3] \"……これ全部、一人でやる予定だったの？\"\n[ns4] \"……これ、何年分の書類？\""
2600006-55 = "えっと……はい、そうですね。"
2600006-56 = "結構、いつも通りの量ですが……？"
2600006-57 = "いえ。"
2600006-58 = "先週の、一週間分の書類ですが……？"
2600006-59 = "決裁処理はもう既に委員長がやってくださったので、後はこれらを分類するだけです。"
2600006-60 = "まあお察しの通り面倒ではあるのですが……すみません、お願いできますか？"
2600006-61 = "[s5] \"ううん、任せて。\"\n[s6] \"こういうのも私の専門分野だから。\""
2600006-62 = "……ありがとうございます。"
2600006-63 = "……ありがとうございます。"
2600006-64 = "実は、心の中では……先生ならそう言ってくださるだろうなと、思ってはいました。"
2600006-65 = "何だかそれも、少し失礼な話なのかもしれませんが……。"
2600006-66 = "どうしようかと思った時に、ふと先生のことを思い浮かべてしまって。"
2600006-67 = "……こほん。すみません、話が逸れました。では、よろしくお願いしますね。先生。"
2600006-69 = "（量が量だったので、気合を入れて集中モードに入った）"
2600006-70 = "（ただルールに基づいて分類するだけだったのに、二人がかりでも半日以上経ってしまい……）"
2600006-75 = "……これで、終わりですかね。"
2600006-76 = "ふぅ、いつの間に夜に……。"
2600006-77 = "あ、いえ、"
2600006-78 = "とんでもありません。"
2600006-79 = "むしろ先生がいなかったら、こんな時間では済みませんでしたから。"
2600006-80 = "……？"
2600006-81 = "え、あ、この部屋のことですか……？あ、ありがとうございます。"
2600006-82 = "ポスター……？えっと、はい。それは私の、いわゆる私物、ですが……。"
2600006-83 = "その、もしかして変、ですか……？"
2600006-84 = "あ、そうですか……それは良かったです。"
2600006-85 = "そう言っていただけるのは、嬉しいですね。"
2600006-86 = "先ほどもお話にありましたが、結構この部屋は私物が多くて、実質的にはその……"
2600006-87 = "私の部屋、といいますか……"
2600006-91 = "……。"
2600006-92 = "[s] \"……？\""
2600006-93 = "……。"
2600006-94 = "（こんな遅い時間に、）"
2600006-95 = "（実質的に「私の部屋」で……）"
2600006-96 = "（先生と、ふたりっきり……？）"
2600006-97 = "[s] \"どうしたの……？\""
2600006-98 = "あ、えと、その……。"
2600006-99 = "……っ！"
2600006-102 = "[wa:500]― あ、[wa:950]あまり[wa:750]意識してませんでしたが……。"
2600006-105 = "― この状況は[wa:1250]その、"
2600006-107 = "[wa:100]― あまり[wa:700]良くないと言いますか……"
2600006-110 = "[wa:1450]― あの、[wa:1000]先生……？"
2600006-112 = "[wa:50]― えっと、[wa:1250]何か言っていただけないと、[wa:2050]その……。"
2600006-115 = "― あまり[wa:500]沈黙が続くと、"
2600006-117 = "[wa:100]― かえって変な感じに……。"
2600006-120 = "[wa:350]― いえ、[wa:600]その[wa:550]催促とかではないのですが……！"
2600006-122 = "― えっと、[wa:1350]何と言えば良いのでしょうか……。"
2600006-125 = "― こういう時は、[wa:1150]どうしたら……。"
2600006-128 = "[ns] \"チナツ、大丈夫？顔赤いけど、もしかして疲れで体調が……？\""
2600006-129 = "[wa:250]― ……ふぅ。"
2600006-131 = "― いえ……[wa:1400]大丈夫です、[wa:1500]はい。"
2600006-134 = "― ふふっ。[wa:1100]本当に、[wa:1300]困ってしまいます……"
2600006-136 = "― 何なんでしょうね、[wa:1400]これは。"
2600006-139 = "[wa:1500]― 先生と一緒に[wa:700]いるというだけで、"
2600006-141 = "[wa:50]― 何故か[wa:500]いつも通りではいられなくて……。"
2600006-144 = "― 本当に、[wa:1400]困りましたね……"
2600006-146 = "― 色々と……。"
2600006-149 = "……すみません、先生。"
2600006-150 = "その、勝手に早とちりといいますか、変なことを色々と……。"
2600006-151 = "あ、あまりこういう状況には、なったことが無く……。"
2600006-152 = "……大丈夫、ですか？"
2600006-153 = "……はい、"
2600006-154 = "ありがとうございます。"
2600006-158 = "……。"
2600006-159 = "[s] \"チナツ？\""
2600006-163 = "あ、いえ、何でもありません。大丈夫です……。"
2600006-164 = "その、私が勝手に先走ってしまっただけですので……"
2600006-165 = "はい。"
2600006-167 = "やっぱり、私だけ……ですよね。"
