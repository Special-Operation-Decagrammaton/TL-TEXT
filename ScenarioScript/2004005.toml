[translation]
2004005-1 = "京極サツキは聞いている"
2004005-2 = "（サツキからの連絡後、しばらくして……）"
2004005-7 = "こんにちは、先生。"
2004005-8 = "[s] \"なんだかご機嫌だね、サツキ……。\""
2004005-9 = "うふふっ。そりゃあもう、ね？"
2004005-10 = "何を隠そう、偉大なる「NKウルトラ計画」に進捗があったのよ。"
2004005-11 = "だから、その記念すべき1人目の被験者を先生に決めたわ。"
2004005-15 = "ん？先生の意志？もちろんそんなものは関係ないわよ。"
2004005-16 = "[ruby=パンデモニウム・ソサエティー]万魔殿の予[/ruby]備協力者にとって、絶対に喜ばしいことだもの。"
2004005-17 = "人って、だいたい「一番目の」ことを記憶するでしょう？"
2004005-18 = "強化された「NKウルトラ計画」の最初の実験体になる機会はそうないわ。#n光栄に思いなさい？"
2004005-19 = "[s] \"今、実験体って言わなかった……？\""
2004005-20 = "細かいことを気にしないの。#nそういえば、この間気づいたのよ。"
2004005-21 = "先生には脅しも拷問も効かない……"
2004005-22 = "なら、残された方法は一つ。そう、実験よ！"
2004005-23 = "さあ、心機一転！より強化されたNKウルトラ計画を体験して頂戴！"
2004005-27 = "（またサツキに促されるまま椅子に座ってしまった……）"
2004005-29 = "今から様々な催眠術を試していくわ。"
2004005-30 = "さあ、先生はどこまで耐えられるかしら？うふふっ。"
2004005-31 = "まずは一つ目……"
2004005-36 = "こっちよ。私の指先を見て集中して。"
2004005-37 = "ぐるぐる……ぐるぐる……"
2004005-41 = "[ns] \"これは……\""
2004005-43 = "[ns] \"トンボを捕まえる時の方法……？\""
2004005-44 = "集中しなさい、集中！#n被験者にも頑張ってもらわないと催眠効果が得られないのよ！"
2004005-45 = "[s] \"それ、なんかおかしくない！？\""
2004005-46 = "そーれそれ……ぐ～るぐる……ぐ～るぐる……。"
2004005-48 = "（サツキは指を回し続けたが、少しクラクラするだけで催眠効果はなかった……）"
2004005-50 = "フンッ、やっぱりこれじゃダメみたいね。"
2004005-51 = "でもこれはまだ序の口よ。時間もたっぷりあるし……"
2004005-52 = "次に移ろうかしら。先生、集中して。"
2004005-53 = "はい、このスマホの画面を見て頂戴。"
2004005-54 = "[s] \"これは……\""
2004005-55 = "うふふっ。分かっちゃったかしら？#nこれは情報部の技術の集大成「ぐるぐるアプリ」よ。"
2004005-60 = "視線を逸らさない！真ん中の回る画面に集中！！"
2004005-61 = "これを見たあなたは、どんどん抜け出せなくなぁ～る。"
2004005-62 = "私の言葉に服従するようになぁ～る。なんでも聞くようになぁ～る～"
2004005-65 = "……。"
2004005-66 = "これなら完璧かしら？"
2004005-67 = "先生、立ち上がってバク宙を200回よ。"
2004005-68 = "[s] \"できるかっ！\""
2004005-69 = "フンッ……今回もダメみたいね。"
2004005-70 = "このアプリならみんなへろへろだと思ったのに……"
2004005-71 = "さすが先生ね。この常人を超越する精神力。"
2004005-72 = "でも私の覚悟と手腕だってすごいんだから！覚悟しておきなさい？"
2004005-74 = "（その後もサツキの催眠術は続いた……）"
2004005-75 = "（もちろん、どれも効果はなかった）"
2004005-77 = "……。"
2004005-78 = "ふぅ……いくら先生とはいえ、ここまで「NKウルトラ計画」に耐えるなんて。"
2004005-79 = "[s] \"サツキ、そろそろ時間も遅いし今日はもう……\""
2004005-80 = "いいえ！諦めないわ！"
2004005-81 = "こうなったからには初心に帰るまでよ。"
2004005-82 = "[s] \"私はもう無理かも！？\""
2004005-83 = "弱音を言っても無駄よ！今までもちゃんと耐えられていたじゃない？"
2004005-87 = "（正面にいるサツキが肩に手を乗せてきた）"
2004005-88 = "これで最後よ。これでも効果がないのなら、今日は勘弁してあげるわ。"
2004005-89 = "気持ちを込めれば、前とは違う効果が絶対あるはず。"
2004005-90 = "さあ、こっち見て頂戴。"
2004005-95 = "私の言葉に絶対服従するようになぁ～る……命令に従うようになぁ～る……。"
2004005-103 = "ねえ……ところで……。"
2004005-104 = "コイン、どっちから振ってたかしら……。"
2004005-105 = "左……？右……？"
2004005-106 = "[s] \"右……？\""
2004005-107 = "……それって逆じゃない！？"
2004005-108 = "えっ、そんな……！？#n私、自分に催眠をかけて――"
2004005-109 = "[s] \"サツキ……！？\""
2004005-112 = "[wa:670]― [log=사츠키]うう……[wa:1370]なによ、[wa:810]これ……？[/log]"
2004005-115 = "[wa:850]― [log=사츠키]へ、[wa:410]変だわ……[wa:2030]先生の[wa:920]命令に、[wa:1000]従わないと[wa:710]いけない[wa:480]気持ちに……[/log]"
2004005-118 = "[ns] \"私は風紀委員会と仲良くします、って言ってみて？\""
2004005-120 = "[wa:520]― [log=사츠키]え、[wa:370]えっ……[wa:1830]はい……[/log]"
2004005-122 = "[wa:200]― [log=사츠키]……[wa:650]私は、[wa:1280]風紀[wa:830]委員会と……[wa:2060]仲良く、[wa:1570]します。[/log]"
2004005-125 = "[wa:200]― [log=사츠키]……[wa:650]でも[wa:1060]マコトちゃんなら[wa:720]まだしも、[/log]"
2004005-127 = "[wa:270]― [log=사츠키]私は別に[wa:910]仲が悪いわけじゃないのよ。[/log]"
2004005-130 = "[ns] \"じゃあ「もう先生に意地悪しません」って約束して！\""
2004005-132 = "[wa:570]― [log=사츠키]う、[wa:560]うん？[/log]"
2004005-135 = "[wa:780]― [log=사츠키]くっ……[wa:1800]私は……[wa:1710]先生に……[wa:2090]意地悪……[wa:1640]しませ、[wa:1550]ん……[/log]"
2004005-138 = "[wa:570]― [log=사츠키]ひ、[wa:750]卑怯よ！[/log]"
2004005-140 = "[wa:850]― [log=사츠키]大人の[wa:490]くせに、[wa:620]催眠で[wa:620]私に[wa:410]好き勝手して！[/log]"
2004005-143 = "[ns] \"誤解を招く発言はやめて……\""
2004005-145 = "[ns] \"そもそも私にしていたことでしょ！？\""
2004005-147 = "[wa:570]― [log=사츠키]ふん、[wa:1290]この私に[wa:700]催眠を[wa:710]かけるだなんて……[/log]"
2004005-149 = "[wa:760]― [log=사츠키]油断ならないわね、[wa:1660]先生。[/log]"
2004005-152 = "[wa:900]― [log=사츠키]どう？[wa:1250]私の[wa:430]NKウルトラ計画に[wa:1340]参加する気はない？[/log]"
2004005-155 = "[ns] \"いや……もう終わりにしない？\""
2004005-157 = "[wa:570]― [log=사츠키]は、[wa:830]はい……[wa:1800]ご命令なら……[/log]"
2004005-160 = "うっ……こんな……。"
2004005-161 = "本気の催眠だったから、長引きそう……うぇ……。"
2004005-162 = "先生がどんな命令をしても抵抗できないじゃない……。"
2004005-166 = "[ns] \"ところでサツキは何でそんなに人を操りたいの？\""
2004005-167 = "え……？"
2004005-168 = "それは……"
2004005-169 = "世界平和のため、よ。"
2004005-170 = "[s1] \"思ったより壮大だった！？\"\n[s2] \"もう少し詳しく聞かせてくれない？\""
2004005-173 = "世界が平和になったら……痛いこともなくなるもの。"
2004005-174 = "そう……私は……"
2004005-175 = "痛いのがイヤ！大嫌いなの！！"
2004005-176 = "白い服が汚れるよりも、広告をスキップできないことよりも！"
2004005-177 = "銃に撃たれたり、手榴弾の破片で怪我するのがイヤなのよ！"
2004005-178 = "[s] \"私も同じだけど……それって世界平和と関係が……？\""
2004005-181 = "人を操る事ができたら、そういうことも起きないでしょう？"
2004005-182 = "銃を撃てないようにしたり、むやみに手榴弾を投げないようにしたり……。"
2004005-183 = "イブキやマコトちゃんにも痛い思いをさせずに済むわ。"
2004005-184 = "ふふっ……そういう思いから「NKウルトラ計画」は始まったのよ。"
2004005-185 = "みんなを好きに操って、このキヴォトスを痛みのない世界にすること！！"
2004005-186 = "それが私の――京極サツキの究極目標よ！"
2004005-187 = "[s] \"やり方はちょっと変だけど……たしかにすごい目標だね！\""
2004005-188 = "……私の究極の目標を教えたのは先生だけよ。"
2004005-189 = "誰にも話すつもりはなかったのだけど。"
2004005-190 = "ふぅ……次は私をどう辱めるつもりかしら？次の命令は？"
2004005-191 = "覚悟はできてるわ、さあ言ってみなさい！"
2004005-192 = "[s] \"じゃあ、帰ってゆっくり休んでね。\""
2004005-193 = "くっ……やっぱりそうだと思って……"
2004005-197 = "え……？"
2004005-198 = "情報部の秘密を探るとか、マッサージをしてとか、コンビニに買い物に行ってきて、とかじゃなくて……？"
2004005-199 = "せっかく私を操れるのよ……？#nこのまま本当に帰って休んでいいの？"
2004005-200 = "今もこうやって、体が勝手に動いて帰ろうとしているのよ？"
2004005-201 = "[s] \"うん。お疲れさまサツキ。気をつけてね。\""
2004005-202 = "……。"
2004005-203 = "さすが先生ね。ふふっ……絶好のチャンスなのに一切惑わされない……"
2004005-207 = "この器……さすがは万魔殿の……"
2004005-211 = "（サツキは何かを言い続けていたけど、オフィスを出ていってしまったので最後までよく聞き取れなかった）"
