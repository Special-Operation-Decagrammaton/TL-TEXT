[translation]
2004005-1 = "Satsuki Kyogoku está ouvindo"
2004005-2 = "（Algum tempo depois do contato de Satsuki……）"
2004005-7 = "Olá, Sensei."
2004005-8 = "[s] \"Você parece estar de bom humor, Satsuki……\""
2004005-9 = "Ufufu. E como não estaria?"
2004005-10 = "Para sua informação, o grande \"Projeto NK Ultra\" teve avanços."
2004005-11 = "Por isso, decidi que você será o primeiro sujeito de teste memorável."
2004005-15 = "Hm? A vontade do Sensei? É claro que isso não importa."
2004005-16 = "Para um colaborador reserva da Pandemonium Society, isso é algo absolutamente glorioso."
2004005-17 = "As pessoas geralmente se lembram do \"primeiro\", não é?"
2004005-18 = "Não é sempre que se tem a chance de ser a primeira cobaia do aprimorado \"Projeto NK Ultra\".#nSinta-se honrado, está bem?"
2004005-19 = "[s] \"Você não acabou de dizer cobaia……?\""
2004005-20 = "Não se preocupe com detalhes.#nFalando nisso, percebi uma coisa outro dia."
2004005-21 = "Ameaças e tortura não funcionam no Sensei……"
2004005-22 = "Então, só resta um método. Isso mesmo, experimentos!"
2004005-23 = "Vamos lá, vida nova! Experimente o aprimorado Projeto NK Ultra!"
2004005-27 = "（Mais uma vez, acabei sentando na cadeira conforme Satsuki me pedia……）"
2004005-29 = "Vou começar a testar vários tipos de hipnose agora."
2004005-30 = "Vamos ver, até onde o Sensei consegue resistir? Ufufu."
2004005-31 = "Primeiro, o número um……"
2004005-36 = "Aqui. Olhe para a ponta do meu dedo e concentre-se."
2004005-37 = "Gira, gira…… gira, gira……"
2004005-41 = "[ns] \"Isso é……\""
2004005-43 = "[ns] \"Um método para capturar libélulas……?\""
2004005-44 = "Concentre-se, concentre-se!#nO sujeito de teste também precisa se esforçar para que o efeito hipnótico funcione!"
2004005-45 = "[s] \"Isso não está meio estranho!?\""
2004005-46 = "Isso, isso…… giiira, giiira…… giiira, giiira……."
2004005-48 = "（Satsuki continuou girando o dedo, mas eu só fiquei um pouco tonto e não houve efeito hipnótico……）"
2004005-50 = "Hmph, parece que isso não funciona mesmo."
2004005-51 = "Mas isso é só o começo. Temos bastante tempo……"
2004005-52 = "Acho que vou passar para o próximo. Sensei, concentre-se."
2004005-53 = "Certo, olhe para a tela deste smartphone."
2004005-54 = "[s] \"Isso é……\""
2004005-55 = "Ufufu. Já percebeu?#nEste é o ápice da tecnologia do Departamento de Informações, o \"App Gira-Gira\"."
2004005-60 = "Não desvie o olhar! Concentre-se na tela giratória no centro!!"
2004005-61 = "Ao olhar para isso, você ficará cada vez mais preso."
2004005-62 = "Você começará a obedecer às minhas palavras. Você fará tudo o que eu mandar~"
2004005-65 = "……."
2004005-66 = "Será que agora está perfeito?"
2004005-67 = "Sensei, levante-se e dê 200 mortais para trás."
2004005-68 = "[s] \"Como eu faria isso!?\""
2004005-69 = "Hmph…… parece que desta vez também não funcionou."
2004005-70 = "Eu achei que com este aplicativo todo mundo ficaria mole……"
2004005-71 = "Como esperado do Sensei. Essa força mental que transcende as pessoas comuns."
2004005-72 = "Mas a minha determinação e habilidade também são incríveis! Esteja preparado, entendeu?"
2004005-74 = "（Depois disso, a hipnose de Satsuki continuou……）"
2004005-75 = "（Claro, nenhuma delas teve efeito）"
2004005-77 = "……."
2004005-78 = "Ufa…… mesmo sendo o Sensei, resistir tanto ao \"Projeto NK Ultra\" assim."
2004005-79 = "[s] \"Satsuki, já está ficando tarde, hoje por hoje……\""
2004005-80 = "Não! Eu não vou desistir!"
2004005-81 = "Já que chegamos a esse ponto, vou voltar ao básico."
2004005-82 = "[s] \"Talvez eu não consiga mais!?\""
2004005-83 = "Não adianta reclamar! Você não aguentou bem até agora?"
2004005-87 = "（Satsuki, que está à minha frente, coloca a mão no meu ombro）"
2004005-88 = "Esta é a última vez. Se isso não funcionar, vou te deixar em paz por hoje."
2004005-89 = "Se eu colocar sentimento nisso, com certeza terá um efeito diferente de antes."
2004005-90 = "Vamos, olhe para mim."
2004005-95 = "Você vai obedecer cegamente às minhas palavras... você vai seguir minhas ordens..."
2004005-103 = "Ei... a propósito..."
2004005-104 = "A moeda, de qual lado eu estava balançando mesmo..."
2004005-105 = "Esquerda...? Direita...?"
2004005-106 = "[s] \"Direita...?\""
2004005-107 = "...Isso não está ao contrário!?"
2004005-108 = "Ah, não pode ser...!? #nEu mesma me hipnotizei――"
2004005-109 = "[s] \"Satsuki...!?\""
2004005-112 = "[wa:670]― [log=사츠키]Ugh... [wa:1370]o que é [wa:810]isso...?[/log]"
2004005-115 = "[wa:850]― [log=사츠키]E, [wa:410]estranho... [wa:2030]sinto que [wa:920]tenho que [wa:1000]obedecer às [wa:710]ordens do [wa:480]Sensei...[/log]"
2004005-118 = "[ns] \"Tente dizer: 'Eu vou me dar bem com o Comitê Disciplinar'.\""
2004005-120 = "[wa:520]― [log=사츠키]E, [wa:370]eh... [wa:1830]sim...[/log]"
2004005-122 = "[wa:200]― [log=사츠키]... [wa:650]Eu vou... [wa:1280]me dar bem [wa:830]com o Comitê [wa:2060]Disciplinar.[/log]"
2004005-125 = "[wa:200]― [log=사츠키]... [wa:650]Mas [wa:1060]a Makoto-chan [wa:720]ainda vai, mas...[/log]"
2004005-127 = "[wa:270]― [log=사츠키]Eu não tenho [wa:910]uma relação ruim com eles, sabe.[/log]"
2004005-130 = "[ns] \"Então prometa: 'Não vou mais ser má com o Sensei'!\""
2004005-132 = "[wa:570]― [log=사츠키]U, [wa:560]uh?[/log]"
2004005-135 = "[wa:780]― [log=사츠키]Droga... [wa:1800]Eu... [wa:1710]não vou... [wa:2090]mais ser... [wa:1640]má com o [wa:1550]Sensei...[/log]"
2004005-138 = "[wa:570]― [log=사츠키]I, [wa:750]isso é covardia![/log]"
2004005-140 = "[wa:850]― [log=사츠키]Você é um [wa:490]adulto, [wa:620]e está usando [wa:620]hipnose para [wa:410]fazer o que quer comigo![/log]"
2004005-143 = "[ns] \"Pare de dizer coisas que geram mal-entendidos...\""
2004005-145 = "[ns] \"Foi você quem começou fazendo isso comigo, não foi!?\""
2004005-147 = "[wa:570]― [log=사츠키]Humph, [wa:1290]me hipnotizar [wa:700]justo a mim...[/log]"
2004005-149 = "[wa:760]― [log=사츠키]Você é imprevisível, [wa:1660]Sensei.[/log]"
2004005-152 = "[wa:900]― [log=사츠키]E então? [wa:1250]Não quer [wa:430]participar do meu [wa:1340]Projeto NK Ultra?[/log]"
2004005-155 = "[ns] \"Não... podemos parar por aqui?\""
2004005-157 = "[wa:570]― [log=사츠키]Si, [wa:830]sim... [wa:1800]se é uma ordem...[/log]"
2004005-160 = "Ugh... isso é..."
2004005-161 = "Como foi uma hipnose de verdade, parece que vai durar bastante... ué..."
2004005-162 = "Eu não consigo resistir a qualquer ordem que o Sensei me der..."
2004005-166 = "[ns] \"A propósito, por que a Satsuki quer tanto controlar as pessoas?\""
2004005-167 = "Eh...?"
2004005-168 = "Isso é..."
2004005-169 = "Pela paz mundial."
2004005-170 = "[s1] \"É mais grandioso do que eu pensava!?\"\n[s2] \"Pode me contar com mais detalhes?\""
2004005-173 = "Se o mundo estiver em paz... não haverá mais dor."
2004005-174 = "É isso... eu..."
2004005-175 = "Eu odeio dor! Eu detesto!"
2004005-176 = "Mais do que sujar minhas roupas brancas, mais do que não poder pular anúncios!"
2004005-177 = "Eu odeio ser baleada ou me ferir com estilhaços de granada!"
2004005-178 = "[s] \"Eu também, mas... isso tem relação com a paz mundial...?\""
2004005-181 = "Se eu puder controlar as pessoas, essas coisas não aconteceriam, certo?"
2004005-182 = "Impedir que disparem armas, evitar que joguem granadas sem pensar..."
2004005-183 = "Assim, não precisarei ver a Ibuki ou a Makoto se machucarem."
2004005-184 = "Hehe... foi com esse pensamento que o \"Projeto NK Ultra\" começou."
2004005-185 = "Manipular todos como eu quiser e transformar este Kivotos em um mundo sem dor!!"
2004005-186 = "Esse é o meu objetivo supremo — o de Kyogoku Satsuki!"
2004005-187 = "[s] \"O método é um pouco estranho, mas... com certeza é um objetivo incrível!\""
2004005-188 = "...Você foi o único a quem contei meu objetivo supremo, Sensei."
2004005-189 = "Eu não pretendia contar para ninguém."
2004005-190 = "Ufa... como pretende me humilhar agora? Qual é a próxima ordem?"
2004005-191 = "Estou preparada, pode dizer!"
2004005-192 = "[s] \"Então, vá para casa e descanse um pouco.\""
2004005-193 = "Droga... eu sabia que seria assim..."
2004005-197 = "Hã...?"
2004005-198 = "Não era para investigar os segredos do Departamento de Informações, ou fazer uma massagem, ou ir à loja de conveniência comprar algo...?"
2004005-199 = "Você tem a chance de me manipular como quiser... #nPosso realmente ir embora e descansar assim?"
2004005-200 = "Mesmo agora, meu corpo está se movendo sozinho para ir embora, sabia?"
2004005-201 = "[s] \"Sim. Bom trabalho, Satsuki. Tome cuidado.\""
2004005-202 = "..."
2004005-203 = "Como esperado do Sensei. Hehe... uma chance perfeita e você não se deixou levar nem um pouco..."
2004005-207 = "Este receptáculo... como esperado da Pandemonium..."
2004005-211 = "(Satsuki continuou dizendo algo, mas como ela saiu do escritório, não consegui ouvir o final claramente.)"
