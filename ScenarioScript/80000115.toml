[translation]
80000115-1 = "Uma doçura que não enjoa"
80000115-3 = "Se~n~!"
80000115-4 = "Se~!"
80000115-5 = "n!"
80000115-9 = "Dia 14, você poderia vir a Trinity?"
80000115-10 = "Tenho algo para te entregar, Sensei."
80000115-11 = "Ah, ainda é segredo o que eu vou te dar!"
80000115-12 = "Tudo bem, né? Sim!"
80000115-13 = "[ns] \"Dia 14... Sim, estou ansioso por isso.\""
80000115-16 = "A-ah, sim? A-ansioso?"
80000115-17 = "N-não sei do que você está falando~ ah, ahaha..."
80000115-18 = "Não crie muitas expectativas, tá...?#nNão quero que você se decepcione..."
80000115-20 = "[ns] \"Então, eu irei quando a aula da Mika terminar.\""
80000115-23 = "Ele disse que está ansioso... O-o que eu faço...!"
80000115-24 = "Ugh. E-eu preciso me esforçar...!"
80000115-29 = "Portão Principal da Academia Trinity"
80000115-33 = "(O horário combinado chegou, mas não vejo a Mika)"
80000115-37 = "[ns] Vou tentar entrar em contato com a Mika."
80000115-42 = "...Quem será a essa hora... espera, ah!? S-Sensei!?"
80000115-43 = "Ué, que horas são agora... nossa, já é a hora combinada!"
80000115-44 = "Desculpa, Sensei! Espere só mais um pouquinho! Bem, a 160°C por... 7 minutos?#nSim, Sensei! Em 10 minutos eu chego aí!"
80000115-45 = "Nesse meio tempo, vou me trocar... Ué, por que!?#nTem um cheiro de queimado..."
80000115-53 = "[ns] \"............E-está tudo bem?\""
80000115-57 = "[ns] ...Acho que sei onde a Mika está, vou até lá."
80000115-62 = "Sala de Economia Doméstica nº 7"
80000115-64 = "Cof, cof...#nUuu, não pode derreter chocolate no forno... Eu não sabia."
80000115-65 = "...Sim?"
80000115-66 = "[s] \"Olá, Mika.\""
80000115-67 = "S-Sensei!?"
80000115-68 = "[s] \"Fiquei preocupado com você e vim te buscar.\""
80000115-69 = "V-você ficou preocupado...#nMas, como você sabia que eu estava aqui... espera, uau! E-ei, um pouco!"
80000115-70 = "Pare! Não chegue mais perto!"
80000115-71 = "[s] \"...Hã?\""
80000115-72 = "Eu tive aula de educação física agora pouco, então estou suada...#ne ainda estou com o uniforme de ginástica..."
80000115-73 = "Além disso, hum... acho que estou com creme ou chocolate no rosto..."
80000115-74 = "[s] \"Não precisa se preocupar com isso, sabe?\""
80000115-75 = "S-Sensei pode não se importar, mas..."
80000115-76 = "Eu me importo! Sensei, não pode deixar uma garota em apuros!"
80000115-77 = "[s] \"D-desculpe...\""
80000115-78 = "Espere um pouquinho na sala ao lado, já vou."
80000115-80 = "(Como a Mika pediu, decidi esperar na sala ao lado)"
80000115-92 = "Sensei, desculpe a demora."
80000115-93 = "Desculpe por não ter cumprido o horário. Uma aluna que ficou responsável por organizar o depósito de educação física não estava se sentindo bem, então a substituí..."
80000115-94 = "Eu te avisei para esperar, mas você apareceu de repente... levei um susto."
80000115-95 = "Mas... já que estamos aqui, eu queria ter preparado tudo direitinho."
80000115-96 = "[s] \"É sobre isso que você está escondendo atrás das costas?\""
80000115-97 = "...Sim, é..."
80000115-98 = "Eu fiz para te dar, Sensei."
80000115-99 = "...Tcharam~☆"
80000115-105 = "Era para ser uma surpresa... ahaha, você descobriu fácil, né."
80000115-106 = "Agora só posso usar o forno da sala de economia doméstica, e não consegui ingredientes muito bons, mas..."
80000115-107 = "Mesmo assim, eu queria muito te dar algo feito por mim."
80000115-108 = "É a primeira vez que faço algo assim, e acabei queimando um pouco a cobertura de chocolate... então não tenho muita confiança no sabor..."
80000115-115 = "...Você aceitaria?"
80000115-116 = "[s1] \"Obrigado. Fico feliz em receber um bolo feito pela Mika.\" \n[s2] \"Sim, foi uma surpresa e tanto. Obrigado, Mika.\""
80000115-123 = "S-sim..."
80000115-124 = "[s] \"Mas você não estava cansada de rocamboles?\""
80000115-125 = "Ahaha, é verdade, mas..."
80000115-126 = "Como comi vários, acabei me tornando uma especialista em rocamboles. #nSobre a textura, as diferenças de sabor..."
80000115-127 = "Como é a minha primeira vez fazendo doces, achei melhor não me arriscar muito. #nPor isso escolhi algo que eu conheço bem."
80000115-128 = "[s] \"Então é por isso que é um rocambole.\""
80000115-133 = "Ei, ei, mudando de assunto, Sensei... como você sabia onde eu estava?"
80000115-134 = "Eu acho que comentei algo sobre a temperatura, mas existem dezenas de salas de economia doméstica com fornos..."
80000115-135 = "Você não deveria ter como saber exatamente em qual delas eu estava..."
80000115-136 = "[s] \"Eu sei de toda a sua agenda, Mika.\""
80000115-137 = "E-ehhh?"
80000115-138 = "[s3] \"É a sala de economia doméstica que você sempre usa nas aulas...\" \n[s4] \"E como sua aula anterior foi educação física, imaginei que estaria em uma perto da quadra.\""
80000115-141 = "Entendi... sendo você, Sensei, eu nem deveria ficar surpresa..."
80000115-142 = "Minha agenda inteira, você sabe de tudo..."
80000115-146 = "...Hehehe. O quê? Será que é porque eu sou uma aluna problemática e você não pode me perder de vista?"
80000115-147 = "...Mas, mesmo assim, acho que fico um pouco feliz."
80000115-148 = "[s5] \"Eu sei muito bem o quanto você está se esforçando, Mika.\" \n[s6] \"Eu sei do seu esforço, Mika. Estou torcendo por você.\""
80000115-154 = "...Sim!"
