[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2001402-1 = "O Vento Norte e o Sol" 
2001402-2 = "Schale - Escritório" 
2001402-3 = "（A tarde de um dia extremamente quente e úmido.）" 
2001402-4 = "Haa, que calor..." 
2001402-5 = "Sinto que está ficando cada vez mais quente\na cada dia que passa..." 
2001402-6 = "Mas enfim, já cheguei na Schale,\nagora vou poder relaxar um pouco num ambiente fresquinho..." 
2001402-7 = "Peraí, ué? Não tá fresco...?" 
2001402-8 = "[s] \"Me desculpe, o ar condicionado está quebrado agora...\"" 
2001402-9 = "Tch, justo num dia como hoje..." 
2001402-10 = "Vim até aqui toda suada achando que ia me refrescar,\ne acabei quebrando a cara..." 
2001402-11 = "......Fazer o quê, vou apenas cumprir o meu\ndever de ajudante de turno." 
2001402-12 = "[s] \"Deve estar muito calor assim, por que não tira o seu capacete?\"" 
2001402-13 = "......Hã? O que você tá dizendo?" 
2001402-14 = "Na estrutura do corpo humano, a cabeça é o ponto mais vital.\nTirar o capacete tático que a protege\né uma atitude inaceitável durante uma operação!" 
2001402-15 = "Você tem noção de quantos soldados já foram alvejados por snipers no exato momento em que disseram: 'Vou tirar só um pouquinho porque tá calor' no meio do combate?" 
2001402-16 = "Mesmo que não haja balas voando por aí,\no trabalho na Schale ainda é, estritamente falando,\nparte de uma operação." 
2001402-17 = "Imagina deixar a cabeça exposta no meio da missão.\nSe alunas de outras escolas virem isso, como acha que a imagem da Academia Especial SRT vai ficar?" 
2001402-18 = "[s] \"Mas as outras meninas também não estão usando, sabia?\"" 
2001402-19 = "O que as outras fazem ou deixam de fazer não me interessa." 
2001402-20 = "De qualquer forma!\nEu não vou tirar o meu capacete tático não importa o que aconteça!" 
2001402-21 = "[s] \"'Não importa o que aconteça'?\"" 
2001402-22 = "Sim, exatamente." 
2001402-23 = "Não importa o que aconteça, é 'absolutamente' não!" 
2001402-25 = "（Decidi iniciar secretamente a 'Operação Fazer a Saki Tirar o Capacete', também para o próprio bem dela, já que o calor estava insuportável.）" 
2001402-28 = "[ns] \"Saki, tem um bicho no seu capacete――\"" 
2001402-29 = "Hm?" 
2001402-33 = "Tch, deixei escapar." 
2001402-34 = "[s] \"......Você acabou de tentar pegar ele com a mão?\"" 
2001402-35 = "E tem algum problema nisso?" 
2001402-36 = "......Acho que eu ia gritar feito uma criança\nsó porque pousou um bicho na minha cabeça?" 
2001402-37 = "Não me importo com o tipo de inseto que seja.\nA operadora de vanguarda, que abre caminho na linha de frente do campo de batalha, não pode entrar em pânico por uma bobagem dessas." 
2001402-38 = "Se ele já foi embora, tudo bem,\nvamos voltar ao trabalho..." 
2001402-41 = "[ns] \"Eu ouvi dizer recentemente que plantar bananeira faz bem pra saúde.\"" 
2001402-42 = "Hmm." 
2001402-46 = "Deixe-me ver...\nA durabilidade dos mosquetões e dos pinos de fixação guardados na Schale é de..." 
2001402-47 = "[ns] \"......Ei, quer tentar plantar uma bananeira?\"" 
2001402-48 = "Hã? E por que eu..." 
2001402-49 = "......" 
2001402-50 = "Eu já tinha ouvido boatos de que\no Sensei tinha uns 'hobbies esquisitos', mas..." 
2001402-51 = "Fazer uma aluna que tá usando saia\nplantar bananeira já é passar de todos os limites." 
2001402-52 = "[s] \"N-Não, não era isso que eu queria fazer, me desculpe...\"" 
2001402-53 = "Bem, eu já tenho uma vaga ideia de qual era a sua outra intenção, mas..." 
2001402-54 = "Se você tem tempo livre pra ficar falando bobagens,\nfoca logo no trabalho." 
2001402-56 = "（......Eu não queria ter que apelar para isso, mas decidi recorrer ao último recurso.）" 
2001402-58 = "[ns] Me aproximo de fininho e estico a mão para o capacete da Saki." 
2001402-62 = "......Ei, o que você tá fazendo." 
2001402-63 = "Mirando na minha cabeça a partir de um ponto cego..." 
2001402-64 = "Você queria ver como eu reagiria\na um ataque surpresa, por acaso?" 
2001402-65 = "Foi mal, mas deixa isso pra depois.\nEu tô muito ocupada agora." 
2001402-66 = "[s] \"Me desculpe...\"" 
2001402-68 = "（No final das contas, eu não consegui\ntirar o capacete da Saki...）" 
2001402-71 = "Haa, finalmente terminamos por hoje." 
2001402-72 = "[s] \"Bom trabalho, muito obrigado...\"" 
2001402-73 = "Aaah, bom trabalho pra você também, Sensei." 
2001402-74 = "......Por que você tá aí todo jogado e exausto?\nÉ porque o ar condicionado tá quebrado?" 
2001402-75 = "Bem, é verdade que quando a gente relaxa a guarda,\no calor bate forte mesmo..." 
2001402-80 = "[ns] \"......Eh.\"" 
2001402-81 = "Hm? Algum problema?" 
2001402-82 = "[s] \"Eu achei que você não fosse tirar o capacete durante a operação não importa o que acontecesse...\"" 
2001402-83 = "Ah, sobre isso? Claro que não." 
2001402-84 = "Mas a operação já acabou, não é?" 
2001402-85 = "......Tem algum problema?" 
2001402-86 = "[s1] \"B-Bem, fico feliz que você não desmaiou de calor nem nada do tipo...\"\n[s2] \"Então a 'Operação' de antes foi toda em vão...\"" 
2001402-87 = "......Mas que cara esquisito." 
2001402-88 = "......Mas que cara esquisito." 
2001402-90 = "（......Encarando o Sensei deprimido com um olhar muito confuso e desconfiado, Saki voltou para o seu acampamento.）" 