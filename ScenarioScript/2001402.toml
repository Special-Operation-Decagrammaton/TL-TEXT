[translation]
2001402-1 = "北風と太陽"
2001402-2 = "シャーレ・オフィス"
2001402-3 = "（とある蒸し暑い日の午後）"
2001402-4 = "はあ、暑い……。"
2001402-5 = "なんだか最近、日に日に暑くなってる気がするな……。"
2001402-6 = "まあシャーレに着いたことだし、ようやく涼しい空間で一息……"
2001402-7 = "って、あれ？涼しくない……？"
2001402-8 = "[s] \"ごめん、今エアコンが故障してて……。\""
2001402-9 = "くっ、こんな日に限って……。"
2001402-10 = "汗だくでここまで来たのに、当てが外れた……。"
2001402-11 = "……仕方ない、とにかく当番の仕事をするか。"
2001402-12 = "[s] \"そのままだと暑いだろうし、鉄帽脱いだら？\""
2001402-13 = "……は？何を言ってるんだ？"
2001402-14 = "人体構造において、頭は一番の急所。それを守る鉄帽を脱ぐなんて、作戦中の行動としてありえない！"
2001402-15 = "作戦中に「暑いから少しくらい」と言って、鉄帽を脱いだその瞬間に狙撃された兵士がどれだけいると思ってる？"
2001402-16 = "銃弾が飛び交っていないだけで、シャーレの仕事も厳然たる作戦の一環。"
2001402-17 = "作戦中に頭を丸出しにしてみろ。それを他校の生徒に見られでもしたら、SRT特殊学園のイメージはどうなる？"
2001402-18 = "[s] \"でも、他の生徒たちも被ってないよ？\""
2001402-19 = "それはそれ、他人のことは関係ない。"
2001402-20 = "とにかく！私は何があっても鉄帽を脱がないからな！"
2001402-21 = "[s] \"「何があっても」？\""
2001402-22 = "ああ、そうだとも。"
2001402-23 = "何があっても、「絶対に」だ！"
2001402-25 = "（この暑さということもあり早めに脱いでもらうためにも、「サキに鉄帽を取ってもらおう作戦」を密かに開始した）"
2001402-28 = "[ns] \"サキ、鉄帽の上に虫が――\""
2001402-29 = "ん？"
2001402-33 = "ちっ、捕まえそびれたか。"
2001402-34 = "[s] \"……今、手で捕まえようとした？\""
2001402-35 = "それに何か問題でも？"
2001402-36 = "……頭に虫がいたくらいで、子どもみたいに騒ぐと思ったか？"
2001402-37 = "どんな虫だろうと関係ない。戦場において先陣を切り開いていくポイントマンが、そんなことで狼狽えてたまるか。"
2001402-38 = "いなくなったらならもう良い、とにかく作業を……"
2001402-41 = "[ns] \"この間聞いたんだけど、逆立ちって健康に良いらしいよ。\""
2001402-42 = "ふうん。"
2001402-46 = "えっと……シャーレに保管中のカラビナと、ペグの耐久年数を……"
2001402-47 = "[ns] \"……ねえ、逆立ちしてみない？\""
2001402-48 = "は？どうして私が……"
2001402-49 = "……。"
2001402-50 = "先生に「変な趣味」があるとは聞いてたが……"
2001402-51 = "スカートを履いてる生徒に逆立ちさせるのは、流石にどうかと思うぞ。"
2001402-52 = "[s] \"や、そうじゃなくて、ってそれはごめん……。\""
2001402-53 = "まあそれ以外の意図も何となく分かるけど……。"
2001402-54 = "くだらないことを言ってる暇があるなら、仕事に集中しろ。"
2001402-56 = "（……あまりやりたくはなかったが、最後の手段を取ることにした）"
2001402-58 = "[ns] こっそりと近づいて、サキの鉄帽に手を伸ばす。"
2001402-62 = "……おい、何をしてる。"
2001402-63 = "死角から頭を狙うだなんて……。"
2001402-64 = "奇襲された時の対応でも見てみたかったのか？"
2001402-65 = "悪いんだけど後にしてくれ、今忙しいから。"
2001402-66 = "[s] \"ごめんなさい……。\""
2001402-68 = "（結局、サキの鉄帽を取ることはできなかった……）"
2001402-71 = "はあ、ようやく片付いたな。"
2001402-72 = "[s] \"お疲れ様、ありがとう……。\""
2001402-73 = "ああ、先生の方こそお疲れ。"
2001402-74 = "……何でそんなぐったりしてるんだ。エアコンが壊れてるからか？"
2001402-75 = "まあ確かに気を抜くと、やっぱり暑いな……。"
2001402-80 = "[ns] \"……え。\""
2001402-81 = "ん？どうかしたのか？"
2001402-82 = "[s] \"作戦中は絶対に鉄帽を脱がないって……\""
2001402-83 = "ああ、それはそうだ。"
2001402-84 = "その作戦は今終わっただろ？"
2001402-85 = "……何か問題でも？"
2001402-86 = "[s1] \"まあ、暑くて倒れたりしなくて良かったよ……。\"\n[s2] \"今までの作戦は一体……。\""
2001402-87 = "……変なやつ。"
2001402-88 = "……変なやつ。"
2001402-90 = "（……落ち込む先生に訝しげな視線を向けながら、サキは自分のキャンプへと戻っていった）"
