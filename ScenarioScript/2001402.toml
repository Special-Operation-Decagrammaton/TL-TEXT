[translation]
2001402-1 = "O Vento do Norte e o Sol"
2001402-2 = "Escritório do Schale"
2001402-3 = "（Uma tarde abafada）"
2001402-4 = "Ah, que calor..."
2001402-5 = "Sinto que tem ficado mais quente a cada dia..."
2001402-6 = "Bem, já que cheguei ao Schale, finalmente vou poder descansar um pouco num lugar fresco..."
2001402-7 = "Espera, o quê? Não está fresco...?"
2001402-8 = "[s] \"Desculpe, o ar-condicionado quebrou agora pouco...\""
2001402-9 = "Droga, logo num dia desses..."
2001402-10 = "Vim até aqui toda suada e agora isso..."
2001402-11 = "...Não tem jeito, vou começar o trabalho de plantão de qualquer forma."
2001402-12 = "[s] \"Deve estar quente assim, por que não tira o capacete?\""
2001402-13 = "...Hã? O que você está dizendo?"
2001402-14 = "Na estrutura do corpo humano, a cabeça é o ponto mais vital. Tirar o capacete que a protege é algo impensável durante uma operação!"
2001402-15 = "Você tem ideia de quantos soldados foram atingidos por um tiro no momento em que tiraram o capacete durante uma operação, só porque acharam que 'estava um pouco quente'?"
2001402-16 = "Mesmo que não haja balas voando por aí, o trabalho no Schale também é parte integrante de uma operação rigorosa."
2001402-17 = "Tente ficar com a cabeça exposta durante uma operação. Se algum aluno de outra escola vir isso, o que vão pensar da imagem da SRT?"
2001402-18 = "[s] \"Mas as outras alunas também não estão usando, não é?\""
2001402-19 = "Isso é uma coisa, o que os outros fazem não me interessa."
2001402-20 = "De qualquer forma! Eu não vou tirar meu capacete, aconteça o que acontecer!"
2001402-21 = "[s] \"'Aconteça o que acontecer'?\""
2001402-22 = "Ah, é isso mesmo."
2001402-23 = "Aconteça o que acontecer, 'absolutamente'!"
2001402-25 = "（Como estava muito quente e eu queria que ela tirasse logo, iniciei secretamente a 'Operação Fazer a Saki Tirar o Capacete'）"
2001402-28 = "[ns] \"Saki, tem um inseto no seu capacete――\""
2001402-29 = "Hm?"
2001402-33 = "Tsc, perdi a chance de pegar."
2001402-34 = "[s] \"...Você tentou pegar com a mão agora pouco?\""
2001402-35 = "E tem algum problema com isso?"
2001402-36 = "...Achou que eu ia fazer escândalo como uma criança só porque tinha um inseto na minha cabeça?"
2001402-37 = "Não importa que tipo de inseto seja. Um ponto de vanguarda que abre caminho no campo de batalha não pode se deixar abalar por algo assim."
2001402-38 = "Já que ele foi embora, tudo bem. Vou continuar com o trabalho..."
2001402-41 = "[ns] \"Ouvi dizer esses dias que ficar de ponta-cabeça faz bem para a saúde.\""
2001402-42 = "Hum."
2001402-46 = "Bem... a vida útil dos mosquetões e estacas guardados no Schale é de..."
2001402-47 = "[ns] \"...Ei, por que não tenta ficar de ponta-cabeça?\""
2001402-48 = "Hã? Por que eu faria..."
2001402-49 = "..."
2001402-50 = "Já ouvi dizer que o Sensei tem uns 'hobbies estranhos'..."
2001402-51 = "Mas pedir para uma aluna que está de saia ficar de ponta-cabeça é demais, não acha?"
2001402-52 = "[s] \"Não, não é isso, quer dizer, desculpe...\""
2001402-53 = "Bem, eu meio que entendo as outras intenções também, mas..."
2001402-54 = "Se tem tempo para dizer bobagens, concentre-se no trabalho."
2001402-56 = "（...Eu não queria muito fazer isso, mas decidi recorrer ao último recurso）"
2001402-58 = "[ns] Aproximo-me silenciosamente e estendo a mão para o capacete da Saki."
2001402-62 = "...Ei, o que você está fazendo?"
2001402-63 = "Mirar na minha cabeça a partir de um ponto cego..."
2001402-64 = "Queria ver como eu reagiria a um ataque surpresa?"
2001402-65 = "Desculpe, mas deixe para depois, estou ocupada agora."
2001402-66 = "[s] \"Me desculpe...\""
2001402-68 = "(No fim das contas, não consegui tirar o capacete da Saki...)"
2001402-71 = "Ah, finalmente terminamos."
2001402-72 = "[s] \"Bom trabalho, obrigado...\""
2001402-73 = "Ah, bom trabalho para você também, Sensei."
2001402-74 = "...Por que você está tão acabado? É por causa do ar-condicionado quebrado?"
2001402-75 = "Bem, é verdade que se eu relaxar, o calor aperta mesmo..."
2001402-80 = "[ns] \"...Eh.\""
2001402-81 = "Hm? Aconteceu alguma coisa?"
2001402-82 = "[s] \"Você disse que nunca tiraria o capacete durante a operação...\""
2001402-83 = "Ah, isso é verdade."
2001402-84 = "Mas a operação acabou agora, não acabou?"
2001402-85 = "...Algum problema com isso?"
2001402-86 = "[s1] \"Bem, fico feliz que você não tenha desmaiado de calor...\"\n[s2] \"O que foram todas aquelas operações até agora...\""
2001402-87 = "...Que estranho."
2001402-88 = "...Que estranho."
2001402-90 = "(...Lançando um olhar desconfiado para o Sensei, que parecia desanimado, Saki voltou para o seu acampamento.)"
