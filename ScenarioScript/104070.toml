[translation]
104070-1 = "Episódio 7; Mesma Situação, Mesma Escolha"
104070-3 = "S-Sensei..."
104070-4 = "A sequência de evacuação que era pra você..."
104070-5 = "Você deu... pra Shiroko-san...?"
104070-6 = "……E-Então, e você, Sensei...?"
104070-7 = "Com o seu corpo... caindo dessa altura..."
104070-8 = "N-Não faz isso, Sensei――――!!!!!!"
104070-10 = "「Sequência de Evacuação」: 0 restantes"
104070-22 = "……Será que eu cometi um erro?"
104070-23 = "Será que o desejo do Sensei... era outro?"
104070-24 = "Impossível de compreender... Então por que... o Sensei usou a Arca pra vir até aqui?"
104070-25 = "Isso é..."
104070-29 = "Será que..."
104070-47 = "……Você estava confiando nisso, Sensei?"
104070-48 = "De que o 'você' que chegou a esse fim não conseguiu realizar,"
104070-49 = "O 'você' que evitou esse fim conseguiria...?"
104070-50 = "Se fosse você..."
104070-52 = "Que na mesma situação, faria a mesma escolha...?"
104070-55 = "……Não. Eu não posso desistir assim."
104070-56 = "Eu vou salvar o Sensei."
104070-57 = "Eu, a Arona, o sistema operacional da 'Arca de Shittim', vou te salvar, Sensei!!"
104070-58 = "Até hoje eu fiz vários milagres pra te proteger. Só isso... eu tenho que dar conta de algo assim com o meu poder...!!"
104070-59 = "Com o meu poder...!!!"
104070-84 = "Cof...!!"
104070-90 = "Cof, cof... gh...!!"
104070-92 = "Consegui te proteger da explosão de algum jeito, mas..."
104070-93 = "N-Não dá... a velocidade da queda não tá diminuindo..."
104070-94 = "Por quê...? S-Será que o meu poder não é o suficiente...?"
104070-95 = "Cof...!!"
104070-96 = "S-Será que é impossível...?"
104070-97 = "Será que eu usei poder demais...?"
104070-98 = "Por causa do dano que eu levei na Utnapishtim e dos cálculos da Arca...?"
104070-99 = "Não!! A Super Arona não ia perder pra isso...!!"
104070-100 = "N-Não dá!!"
104070-101 = "Nessa altitude, não tem como o Sensei sobreviver.#nRápido... tenho que dar um jeito logo..."
104070-102 = "Sensei..."
104070-105 = "[ns1] \"……Tá tudo bem agora, Arona.\"\n[ns2] \"Por favor, estenda a mão pra ela no meu lugar.\""
104070-108 = "S-Sensei!?"
104070-109 = "[ns3] \"Obrigado por tudo até agora, Arona, me desculpa.\"\n[ns4] \"Acho que a gente se despede aqui... se cuida.\""
104070-112 = "E-Espera um pouco, como assim se despede...!?#n……S-Sensei?"
104070-115 = "Sensei――――!!!!!"
104070-122 = "（……O 'Trono de Naram-Sin' entrou em colapso.）"
104070-123 = "（Em breve, eu também vou...）"
104070-128 = "……!?"
104070-133 = "……Onde estou."
104070-134 = "……Ainda bem! Consegui transferir os dados do SO da Arca de Shittim pra cá."
104070-135 = "Você me trouxe pra cá...? Mas por quê...?"
104070-136 = "Impossível de compreender. Por que você me salvou?#n……Eu deveria ser a sua inimiga."
104070-140 = "……Compreendido."
104070-141 = "Como sempre fez até hoje... o Sensei salvou a Shiroko..."
104070-142 = "O Sensei... me considerou uma aluna que precisava ser salva."
104070-146 = "……Pergunta.#nOnde está... o Sensei?"
104070-147 = "O Sensei..."
104070-148 = "……Compreendido. Analisando a situação... Situação confirmada."
104070-149 = "Entendi. O Sensei agora está..."
104070-150 = "Sim... O Sensei tentou ajudar, mas..."
104070-154 = "……。"
104070-155 = "Sniff... snif..."
104070-156 = "Faltou poder da minha parte... e não consegui achar... um outro jeito...!"
104070-157 = "Uuu... gh...!!"
104070-161 = "……Confirmando a situação. Pesquisando métodos."
104070-165 = "「Arca de Shittim」 A.R.O.N.A, prosseguindo com a proteção do Sensei, iniciando intervenção forçada."
104070-166 = "H-Hã...?#nO que você disse...?"
104070-173 = "O-O que é isso...?"
104070-174 = "……Eu vou te emprestar minha força. Arona."
104070-180 = "――Existe um jeito."
104070-181 = "Agora, vamos juntar os nossos poderes e criar um milagre."
104070-182 = "Um milagre...?"
104070-183 = "Desse jeito, a gente vai conseguir levar o Sensei de volta pro chão são e salvo."
104070-184 = "Arona, a sua mão."
104070-185 = "M-Minha mão...?"
104070-186 = "Sim. ……Você confia em mim?"
104070-189 = "……Sim. O Sensei confiou em você, então eu também vou confiar."
104070-192 = "……Muito obrigada."
104070-193 = "Vamos começar. O seu e o meu... o nosso milagre."