[translation]
104070-1 = "第7話;同じ状況、同じ選択"
104070-3 = "せ、先生……"
104070-4 = "自分用の、シーケンスを……"
104070-5 = "シロコさん、に……？"
104070-6 = "……そ、それじゃ先生は……"
104070-7 = "先生の身体では……この高度からは……"
104070-8 = "だ、ダメです先生――――！！！！！！"
104070-10 = "「脱出シーケンス」：残り0回"
104070-22 = "……私は、間違っていたのでしょうか。"
104070-23 = "先生の願いは……違っていたのでしょうか。"
104070-24 = "理解、不可能……ならば何故……先生は箱舟を通じてここに来たのですか。"
104070-25 = "それは……"
104070-29 = "もしかすると……"
104070-47 = "……先生は、信じていたのですか？"
104070-48 = "この結末に至った[ruby=・]自[/ruby][ruby=・]身[/ruby]がやり遂げられなかったことを、"
104070-49 = "この結末を避けた[ruby=・]自[/ruby][ruby=・]身[/ruby]なら、やり遂げられると……？"
104070-50 = "[ruby=じぶん]先生[/ruby]なら……"
104070-52 = "同じ状況で、同じ選択を取る……と？"
104070-55 = "……いいえ。このまま諦める事はできません。"
104070-56 = "先生を助けます。"
104070-57 = "「シッテムの箱」のOSであるアロナが、先生を助けます！！"
104070-58 = "今まで何度も奇跡を起こして、先生を守ってきました。これくらい……これくらい、私の力で、なんとか……！！"
104070-59 = "私の力で……！！！"
104070-84 = "ゲホッ……！！"
104070-90 = "ゲホ、ゲホッ……っ……！！"
104070-92 = "なんとか爆発からは守れましたが……"
104070-93 = "だ、ダメ……墜落スピードが、変わりません……。"
104070-94 = "どうして……？わ、私の力が足りない……？"
104070-95 = "ゲホッ……！！"
104070-96 = "む、無理なの……？"
104070-97 = "力を、使い過ぎた……？"
104070-98 = "ウトナピシュティムで受けたダメージと、箱舟の演算で……？"
104070-99 = "いいえ！！それくらいではスーパーアロナは……！！"
104070-100 = "だ……ダメ！！"
104070-101 = "ここは先生が生存できる高度じゃありません。#nはやく……はやくなんとかしないと……"
104070-102 = "先生……。"
104070-105 = "[ns1] \"……もう大丈夫だよ、アロナ。\"\n[ns2] \"私の代わりに、あの子に手を差し伸べてあげて。\""
104070-108 = "せ、先生！？"
104070-109 = "[ns3] \"今までありがとうアロナ、ごめんね。\"\n[ns4] \"これでお別れかな……元気でね。\""
104070-112 = "ま、待ってください、お別れだなんてそんな……！？#n……せ、先生？"
104070-115 = "先生――！！！！！"
104070-122 = "（……「ナラム・シンの玉座」が崩壊しました。）"
104070-123 = "（私も、そう遠からず……）"
104070-128 = "……！？"
104070-133 = "……ここは。"
104070-134 = "……よかったです！シッテムの箱のOSデータをここに転送できました。"
104070-135 = "私を、ここに……？どうして……？"
104070-136 = "理解不可能。何故私を助けたのですか？#n……私は、あなたの敵であるはず。"
104070-140 = "……理解。"
104070-141 = "今までそうだったように……先生は、シロコを助けた……"
104070-142 = "先生は……私のことも、助けるべき生徒と考えたのですね。"
104070-146 = "……質問。#n先生は……どこに？"
104070-147 = "先生は……。"
104070-148 = "……理解。状況分析……状況を確認。"
104070-149 = "なるほど。先生は今……"
104070-150 = "はい……先生は、助けようとしましたが……"
104070-154 = "……。"
104070-155 = "ぐすっ……っ……"
104070-156 = "私じゃ、力不足で……別の方法も……探せなくて……！"
104070-157 = "ううっ……っ……！！"
104070-161 = "……状況を確認。方法、リサーチ。"
104070-165 = "「シッテムの箱」A.R.O.N.A、これより先生の保護に移行、強制干渉を始めます。"
104070-166 = "え、え……？#n今なんと……？"
104070-173 = "こ、これは……？"
104070-174 = "……私が力になります。アロナ。"
104070-180 = "――方法は、あります。"
104070-181 = "今からあなたと私の力をあわせ、奇跡を起こします。"
104070-182 = "奇跡、を……？"
104070-183 = "そうすれば、先生を無事地上に送り届けることができるでしょう。"
104070-184 = "アロナ、手を。"
104070-185 = "て、手、ですか……？"
104070-186 = "はい。……私を信じてくれますか？"
104070-189 = "……はい。先生があなたを信じましたから。私も、信じます。"
104070-192 = "……ありがとうございます。"
104070-193 = "はじめましょう。 あなたと私……私たちの、奇跡を。"
