[translation]
1601705-1 = "I hate being alone "
1601705-4 = "（アオバとモモトークを終えた直後……）"
1601705-10 = "は、はぁっ……はぁっ！せ、先生……っ……！"
1601705-11 = "[s1] \"アオバ、めちゃくちゃ早かったね！？\"\n[s2] \"大丈夫！？ こ、これでも飲んで！\""
1601705-14 = "は、はひゅぅっ……！あ、ありがとうございます……！"
1601705-18 = "……ふうっ。"
1601705-19 = "で、ではコーヒーポットはどちらに……？"
1601705-20 = "[s3] \"これなんだけど……\"\n[s4] \"少し前から動かなくなっちゃって。\""
1601705-23 = "で、では……診ていきますけど！"
1601705-27 = "外から見えるところは……大丈夫そうですね……。"
1601705-28 = "な、なら……。"
1601705-35 = "[ns5] \"ア、アオバ！？\"\n[ns6] \"た、叩いて大丈夫……？\""
1601705-38 = "ご、ご安心ください……！"
1601705-39 = "叩けば大丈夫ですけど……！"
1601705-40 = "[s] \"う、うん！\""
1601705-41 = "（やや不安を抱きつつ、アオバの修理を見守ることにした）"
1601705-51 = "……まだ動きませんね。"
1601705-52 = "（か、角が少し凹んでいる……）"
1601705-53 = "こ、こうなったら……いよいよプランBの分解を……！"
1601705-57 = "（アオバ、コーヒーマシンの修理は初めてって言っていたけど……）"
1601705-58 = "（ここは信じよう……！）"
1601705-66 = "……へへ。これで完璧に組み直せたはずですけど……！"
1601705-67 = "では、電源を……。"
1601705-76 = "[ns] \"す、すごい振動……！！\""
1601705-77 = "こ、こんな派手にコーヒーを淹れるんですね……！"
1601705-78 = "[s] \"違うはず……！\""
1601705-79 = "す、すみません……直せたと思ったのに……。"
1601705-80 = "……あ、諦めるわけにはいきません！"
1601705-90 = "よ、よし……今度こそ……！"
1601705-99 = "[ns7] \"す、すごい水圧だ……！！\"\n[ns8] \"テーブルが……斬れた！？\""
1601705-104 = "あそこの部品じゃなかった……なら……ここを……っ！"
1601705-113 = "（それから試行錯誤を重ねて……）"
1601705-117 = "お、お待たせしました。"
1601705-118 = "今度こそ動くはず……です。"
1601705-119 = "[s] \"電源を入れてみよう！\""
1601705-129 = "[ns9] \"う、動いた……！\"\n[ns10] \"すごいよ、アオバ！\""
1601705-134 = "や、やったぁ……！"
1601705-135 = "で、できました！#nちょっと……時間はかかっちゃいましたが……。"
1601705-136 = "へへっ……や、やっと……少しだけ恩返しできました……。"
1601705-140 = "それでは……私はこれで……。"
1601705-141 = "な、何度も失敗してしまってすみません……。"
1601705-145 = "[ns] \"アオバ、ちょっと待って。\""
1601705-149 = "な、なんでしょう？"
1601705-150 = "まだ修理するものが……？"
1601705-155 = "[ns11] \"直してくれたお礼に、夕飯でもご馳走しようと思って。\"\n[ns12] \"一緒に食べよう？\""
1601705-160 = "あ……う、うぅ……。"
1601705-161 = "ひっく……。"
1601705-162 = "うわあぁぁぁぁぁん！！"
1601705-163 = "[s] \"ご、ごめん！何か余計な事言ったかな……？\""
1601705-164 = "ひっく……い、いえ、そんなことは……。"
1601705-165 = "……ゆ、夕食に誘われるなんて……久しぶりで……。"
1601705-166 = "いつもは仕事が終わると……一人でコンビニのご飯を食べていたんですけど……。"
1601705-167 = "だから……び、びっくりしちゃって……。"
1601705-171 = "[ns] \"今日は特別なディナーにしよう！\""
1601705-175 = "う、うわぁぁぁ……！"
1601705-184 = "（アオバと一緒に、素敵なレストランで美味しい夕飯を食べた）"
1601705-187 = "（なんだか、いつもより美味しく感じた気がする）"
