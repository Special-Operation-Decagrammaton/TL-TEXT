[translation]
1601705-1 = "I hate being alone "
1601705-4 = "（Logo após terminar o MomoTalk com Aoba...）"
1601705-10 = "Ha, haaa... haaa! Se, Sensei...!"
1601705-11 = "[s1] \"Aoba, você foi muito rápida!?\"\n[s2] \"Você está bem!? Beba um pouco disso!\""
1601705-14 = "Ha, hihuu...! A-ah, muito obrigada...!"
1601705-18 = "...Ufa."
1601705-19 = "E, então, onde está a cafeteira...?"
1601705-20 = "[s3] \"É esta aqui...\"\n[s4] \"Ela parou de funcionar faz um tempo.\""
1601705-23 = "E, então... vou dar uma olhada!"
1601705-27 = "As partes visíveis por fora... parecem estar bem..."
1601705-28 = "E, então..."
1601705-35 = "[ns5] \"A-Aoba!?\"\n[ns6] \"D-dá para consertar batendo nela...?\""
1601705-38 = "P-por favor, fique tranquilo...!"
1601705-39 = "Dá para consertar batendo, sim...!"
1601705-40 = "[s] \"C-certo!\""
1601705-41 = "（Decidi observar o conserto da Aoba, embora um pouco preocupado）"
1601705-51 = "...Ainda não funciona."
1601705-52 = "（O canto está um pouco amassado...）"
1601705-53 = "S-se chegamos a esse ponto... é hora de partir para o plano B: desmontar...!"
1601705-57 = "（Aoba disse que era a primeira vez que consertava uma máquina de café, mas...）"
1601705-58 = "（Vou confiar nela...!）"
1601705-66 = "...Hehe. Acho que consegui remontar perfeitamente agora...!"
1601705-67 = "Então, vou ligar..."
1601705-76 = "[ns] \"Q-que vibração forte...!!\""
1601705-77 = "E-ela faz o café de um jeito tão extravagante...!"
1601705-78 = "[s] \"Acho que não deveria ser assim...!\""
1601705-79 = "D-desculpe... achei que tinha consertado..."
1601705-80 = "...Ah, não posso desistir!"
1601705-90 = "B-bem... desta vez vai dar certo...!"
1601705-99 = "[ns7] \"Q-que pressão de água incrível...!!\"\n[ns8] \"A mesa... foi cortada!?\""
1601705-104 = "Não era aquela peça... então... aqui...!"
1601705-113 = "（Depois de muitas tentativas e erros...）"
1601705-117 = "D-desculpe a demora."
1601705-118 = "Desta vez deve funcionar... eu acho."
1601705-119 = "[s] \"Vamos ligar!\""
1601705-129 = "[ns9] \"F-funcionou...!\"\n[ns10] \"Incrível, Aoba!\""
1601705-134 = "C-consegui...!"
1601705-135 = "E-eu consegui!#nDemorou um pouco... mas..."
1601705-136 = "Hehe... f-finalmente... consegui retribuir um pouquinho..."
1601705-140 = "Bem, então... vou indo..."
1601705-141 = "D-desculpe por ter falhado tantas vezes..."
1601705-145 = "[ns] \"Aoba, espere um pouco.\""
1601705-149 = "O-o que foi?"
1601705-150 = "Tem mais alguma coisa para consertar...?"
1601705-155 = "[ns11] \"Queria te convidar para jantar, como agradecimento por ter consertado.\"\n[ns12] \"Vamos comer juntos?\""
1601705-160 = "Ah... u-uu..."
1601705-161 = "Soluço..."
1601705-162 = "Waaaaaaah!!"
1601705-163 = "[s] \"D-desculpe! Será que eu disse algo errado...?\""
1601705-164 = "Soluço... n-não, não é isso..."
1601705-165 = "……Se, ser convidada para jantar…… faz tanto tempo que……."
1601705-166 = "Normalmente, quando termino o trabalho…… eu acabo comendo algo da loja de conveniência sozinha……."
1601705-167 = "Por isso…… e-eu fiquei surpresa……."
1601705-171 = "[ns] \"Hoje vamos ter um jantar especial!\""
1601705-175 = "U-uau……!"
1601705-184 = "(Comi um jantar delicioso em um restaurante maravilhoso junto com a Aoba)"
1601705-187 = "(Por algum motivo, sinto que estava mais saboroso do que o de costume)"
