[translation]
901010600130-8 = "Com licença."
901010600130-9 = "Sei que está trabalhando... que tal uma bebida energética gelada?"
901010600130-13 = "Olha só, não é a entregadora do outro dia?"
901010600130-14 = "Obrigado mais uma vez! Vou aceitar!"
901010600130-15 = "Fufu, não esquece de dar like no \"FOX EATS\"!"
901010600130-16 = "Aliás, o pescador ali me contou uma coisa..."
901010600130-17 = "Um marinheiro novato chamado Miya... desapareceu..."
901010600130-18 = "Ah... aquele velho, com essa história de novo."
901010600130-19 = "Não se preocupe. É comum em trabalho de pesca."
901010600130-20 = "É tão comum assim?"
901010600130-21 = "Bem... tem uns que fogem porque o trabalho é pesado..."
901010600130-22 = "O Miyaguchi não é fraco como aquele velho diz. Ele reclamava sim, mas trabalhava direitinho."
901010600130-23 = "Eu acho... que ele fugiu por causa de dívida."
901010600130-27 = "Dívida?"
901010600130-28 = "É. Tem pescador que entra nessa vida para pagar dívida."
901010600130-29 = "O trabalho é duro, mas compensa."
901010600130-30 = "Mas Miyaguchi se meteu com jogatina, ao que parece. A dívida, ao invés de diminuir, só aumentou."
901010600130-31 = "No final, acabou recorrendo a agiotas da Família Carpaccio..."
901010600130-33 = "Família Carpaccio?"
901010600130-34 = "É. Já viu aqueles caras de terno escuro no portão principal? Eles mesmos."
901010600130-39 = "É uma família tradicional conhecida por aqui. Normalmente fazem a segurança do porto."
901010600130-40 = "Às vezes, emprestam dinheiro para quem está apertado... mas os juros são altíssimos."
901010600130-41 = "O Miyaguchi, viciado em jogatina, não ia conseguir pagar. Certamente fugiu antes da dívida aumentar."
901010600130-42 = "Então foi isso..."
901010600130-43 = "É. Você não se meta com jogatina, viu."
901010600130-44 = "E muito menos com agiota."
901010600130-45 = "Sim, vou lembrar disso."