[translation]#[Texto Final. - Filipe 05/07.]
901010600130-8 = "Com licença."
901010600130-9 = "Desculpa atrapalhar o trabalho.#nQuer um energético gelado?"
901010600130-13 = "Ah, você não é a menina das entregas de outro dia?"
901010600130-14 = "Vou aceitar de novo hoje, obrigado!"
901010600130-15 = "Fufu, não esquece de dar um 'like' no 'FOX EATS'!"
901010600130-16 = "A propósito, eu ouvi daquele pescador ali……"
901010600130-17 = "Que o novato…… Miyaguchi desapareceu……"
901010600130-18 = "Haa…… aquele velho, falando essa história de novo……"
901010600130-19 = "Não liga não. Na vida de barco isso é comum."
901010600130-20 = "É tão comum assim?"
901010600130-21 = "Bom…… tem uns que fogem porque o serviço é pesado……"
901010600130-22 = "Mas o Miyaguchi não era mole não, como o velho dizia.#nReclamava pra caramba, mas trabalhava direito."
901010600130-23 = "Eu acho…… que ele fugiu por causa de dívida."
901010600130-27 = "Dívida?"
901010600130-28 = "É. Tem pescador que entra no barco pra pagar dívida."
901010600130-29 = "O trabalho é pesado, mas o pagamento é bom."
901010600130-30 = "Só que o Miyaguchi se meteu com jogo, dizem.#nEm vez de diminuir, a dívida só aumentou……"
901010600130-31 = "No fim, parece que ele pegou dinheiro com agiota controlado pela 'Família Carpaccio' também……"
901010600130-33 = "Família Carpaccio?"
901010600130-34 = "É. Você já viu aqueles caras de terno escuro fazendo revista no portão principal, né? São eles."
901010600130-39 = "É uma família antiga bem conhecida por aqui.#nGeralmente fazem a segurança do porto de Kanezaki."
901010600130-40 = "Dizem que às vezes emprestam dinheiro pra quem tá apertado……#nmas os juros da Família Carpaccio são altíssimos."
901010600130-41 = "O Miyaguchi, viciado em jogo, não ia conseguir pagar, né?#nAntes da dívida aumentar, deve ter dado o fora."
901010600130-42 = "Então tinha essa história toda……"
901010600130-43 = "É. Não se meta com jogo, viu?"
901010600130-44 = "Muito menos com agiota."
901010600130-45 = "Pode deixar, vou ficar esperta."