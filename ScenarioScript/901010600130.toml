[translation]
901010600130-8 = "Excuse me."
901010600130-9 = "Sorry to interrupt your work. #nWould you like a cold energy drink?"
901010600130-13 = "Oh, are you the delivery kid from the other day?"
901010600130-14 = "Thanks for your help again today! I'll gladly take it!"
901010600130-15 = "Hehe. Please leave a 'like' for FOX EATS!"
901010600130-16 = "By the way, I heard something from the fisherman over there..."
901010600130-17 = "About Miya... the new crew member who went missing..."
901010600130-18 = "Sigh... that old man is talking about that again..."
901010600130-19 = "Don't worry about it. It happens all the time in this line of work."
901010600130-20 = "It happens that often?"
901010600130-21 = "I suppose so... some people just can't handle the work and run off..."
901010600130-22 = "But Miyaguchi wasn't a quitter like the old man says. #nHe complained a lot, but he was serious about his work."
901010600130-23 = "If you ask me... I think he ran away because of his debts."
901010600130-27 = "Debts, you say?"
901010600130-28 = "Yeah. Some fishermen take to the sea just to pay off what they owe."
901010600130-29 = "The work is brutal, but the pay is good."
901010600130-30 = "But it seems Miyaguchi got into gambling. Instead of paying off his debts, they just kept piling up..."
901010600130-31 = "In the end, he even borrowed from the loan sharks run by the Carpaccio Family..."
901010600130-33 = "The Carpaccio Family?"
901010600130-34 = "Yeah. You've seen those guys in black suits checking people at the main port gate, right? That's them."
901010600130-39 = "They're a pretty well-known old-school family around here. #nThey usually handle security at Kanezaki Port."
901010600130-40 = "They occasionally lend money to people in need... #nbut the interest rates of the Carpaccio Family are absurdly high."
901010600130-41 = "There's no way Miyaguchi could have paid that back after getting hooked on gambling. #nHe must have skipped town before the debt got even worse."
901010600130-42 = "I see... so that's what happened."
901010600130-43 = "Yeah. You shouldn't get involved in gambling, kid."
901010600130-44 = "And definitely stay away from loan sharks, too."
901010600130-45 = "Yes, I'll keep that in mind."