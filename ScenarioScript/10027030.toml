[translation]
10027030-1 = "Episódio 3: Publicação, reimpressão e distribuição"
10027030-7 = "Aquela Takane... só diz coisas que não fazem sentido."
10027030-8 = "Ah! Não entendi nada do que ela disse!"
10027030-9 = "[s] \"Mas veja, ela nos deu uma pista, não deu?\""
10027030-10 = "……Hmm. É verdade. Mas, ainda assim, foi um pouco... como posso dizer, vago demais."
10027030-11 = "[s] \"O que será que a Takane sabe sobre 'Luna'?\""
10027030-12 = "Quem sabe... Mas acho que a sugestão de visitar o Departamento de Publicações está correta, de certa forma."
10027030-13 = "O Departamento de Publicações reúne materiais sobre todos os livros publicados pela Red Winter. Bem, é natural, já que são eles que publicam tudo."
10027030-14 = "É irritante ter que fazer o que ela disse, mas... acho que vale a pena dar uma passada lá."
10027030-15 = "Os materiais sobre 'Luna' provavelmente devem estar lá também..."
10027030-23 = "[ns] \"……Então aqui é o Departamento de Publicações...?\""
10027030-24 = "Isso mesmo. Quase todos os livros vendidos na Academia Red Winter são feitos aqui."
10027030-25 = "[s] \"Impressionante.\""
10027030-26 = "Ahaha... não é exatamente um lugar para se impressionar..."
10027030-27 = "Bem... nós também imprimimos algumas coisas que não são nada comuns..."
10027030-28 = "……Como eles também me ajudam a imprimir o boletim da 'Frente de Libertação do Conhecimento', não quero falar mal deles, mas..."
10027030-33 = "Mesmo falando baixo assim, eu consigo ouvir tudo, sabia?"
10027030-39 = "A-apareceu..."
10027030-40 = "Sim, sim, a responsável pelo nada comum Departamento de Publicações chegou. Não sei que ventos a trouxeram aqui, mas fico feliz em vê-la, Mer. Ou devo chamá-la de Sensei Merly, seu nome de usuário?"
10027030-41 = "……Pode me chamar de Mer, Yakumo."
10027030-42 = "[s] \"A Yakumo é a chefe do Departamento de Publicações?\""
10027030-43 = "Sim. Eu sou a chefe, Yakumo Aramaki. Prazer em conhecê-lo. Nosso departamento é especialista em publicações, cuidando de tudo: impressão, encadernação, embalagem, gestão, vendas e até expansão de negócios... tudo o que envolve livros."
10027030-44 = "Aliás... também sou responsável pela edição do 'Red Bear'. Mufufu."
10027030-48 = "[ns1] \"Faz muita coisa, impressionante... Isso é o 'Red Bear'?\"\n[ns2] \"Acho que já vi isso antes. É aquele que a Cherino publica... né?\""
10027030-51 = "Sim, exatamente."
10027030-52 = "(Nesse momento, algo parecido com um papel caiu, esvoaçando na borda da visão)"
10027030-56 = "[ns3] \"Isso é... um panfleto...?\"\n[ns4] \"'Denunciamos o tirano barbudo que joga fora a tampa do iogurte sem lamber!'... ?\""
10027030-60 = "Nossa... eles ainda imprimem esse tipo de coisa..."
10027030-66 = "[ns5] \"A revista de propaganda da Cherino e panfletos denunciando a Cherino...\"\n[ns6] \"Tudo bem imprimir os dois ao mesmo tempo!?\""
10027030-70 = "Tem algum problema nisso? Se atendermos às necessidades dos clientes e as vendas dobrarem, não é o melhor cenário?"
10027030-71 = "Por exemplo, se publicarmos um especial elogiando a Presidente Cherino e um mangá satírico sobre ela na mesma edição do 'Red Bear', o público de ambos os lados aumenta."
10027030-72 = "Só temos a ganhar, então por que limitar a apenas um lado? Mufufufu."
10027030-73 = "[s] \"Faz sentido, mas... é um jeito bem peculiar de pensar.\""
10027030-74 = "Agradeço o elogio. E então... como devo chamar esta pessoa?"
10027030-75 = "[s] \"Desculpe a demora na apresentação. Sou o Sensei [USERNAME], do Schale.\""
10027030-76 = "Você!? ...Ufa, quase perdi meu sorriso de negócios como chefe do departamento."
10027030-77 = "Então, formalmente... bem-vindo ao Departamento de Publicações. Já ouvi falar muito do Sensei... ouvi tantos rumores diferentes que cheguei a pensar que era uma alucinação coletiva."
10027030-78 = "Ah... a propósito, gostaria de publicar uma biografia do Sensei na próxima edição do 'Red Bear'... o que acha?"
10027030-79 = "[s] \"Recuso educadamente.\""
10027030-80 = "Não diga isso... seria um ótimo projeto para o Sensei também, sabe? Vamos, pelo menos ouça a proposta..."
10027030-81 = "Em vez de se juntar à 'Frente de Libertação do Conhecimento', que não cumpre prazos e tem um público muito nichado, seria muito melhor trabalhar conosco, que temos um suporte sólido da Secretaria..."
10027030-83 = "……Não era para ser um segredo que a Secretaria dá suporte a vocês?"
10027030-85 = "Ops... acabei falando demais. Por favor, finja que não ouviu..."
10027030-86 = "[s] \"Desculpe interromper... viemos aqui porque temos algo para perguntar ao Departamento de Publicações.\""
10027030-87 = "Opa... isso é uma negociação, então? Devo entender que, se eu atender ao pedido do Sensei, o Sensei atenderá ao meu?"
10027030-88 = "Ora, veja só, nos entendemos bem. Sensei, você é uma pessoa difícil, hein? Devia ter dito isso logo de cara."
10027030-89 = "Não é nada disso... Você não deveria aprender a ouvir as pessoas direito?"
10027030-90 = "Ah, não é?"
10027030-91 = "Claro que não!"
10027030-92 = "Não perguntei para a Mer. Estou falando com o Sensei agora."
10027030-93 = "[s] \"Tudo bem. Se responderem às nossas perguntas, colaboraremos com o Departamento de Publicações.\""
10027030-94 = "Ei, Sensei!? Você não tem ideia do que eles podem pedir, né!? #nEles podem até arrancar o nosso couro!"
10027030-95 = "Não... Mel, o que exatamente você... O Departamento de Publicações não lida com couro, sabe?"
10027030-96 = "Isso foi uma metáfora, ou algo assim..."
10027030-98 = "Que pessoa estranha..."
10027030-99 = "[s] \"...Hm?\""
10027030-100 = "..."
10027030-101 = "...?"
10027030-107 = "[ns] \"Então, indo ao ponto principal.\""
10027030-108 = "\"Luna\", é?"
10027030-109 = "Sim. Sabe de alguma coisa?"
10027030-110 = "Já ouvi falar em algum lugar... ou talvez não... #nÉ como se um gato que eu criava antigamente do outro lado do rio estivesse acenando para mim..."
10027030-111 = "Essa última parte não está meio estranha...?"
10027030-112 = "Ah... lembrei. #nCom certeza existia um mangá com esse nome."
10027030-113 = "[s] \"Sério?\""
10027030-114 = "Dito isso, foi publicado há muito tempo, então... hum."
10027030-115 = "Ah... estou começando a me lembrar aos poucos. #nA propósito, por que vieram ao Departamento de Publicações? Deveriam procurar em um sebo."
10027030-116 = "[s] \"A Takane disse que encontraríamos uma pista aqui...\""
10027030-117 = "Ah... entendo... então era isso... Aquela Takane..."
10027030-118 = "Hum hum, entendo. Hum..."
10027030-119 = "[s] \"Então, consegue descobrir algo?\""
10027030-120 = "Bem... uma pista, é... certamente existe algo que se encaixa nisso. #nSe for algo que traga boas notícias para o Sensei e para a Mel..."
10027030-121 = "Oh, como esperado! Que tipo de coisa?"
10027030-122 = "Primeiro de tudo, eu também não sei muito sobre o volume final de \"Luna\"."
10027030-123 = "Não façam essa cara de decepção... é aqui que entra o ponto principal."
10027030-124 = "Não faça suspense e conta logo..."
10027030-125 = "\"Luna\" é um gênero que sobreviveu discretamente por muito tempo... #ne parece que o pessoal do círculo de \"Luna\" ainda faz encontros presenciais de forma irregular."
10027030-126 = "Parece que eles ainda estão \"ativos\" regularmente por lá, sabe?"
10027030-127 = "\"Luna\" ainda sobrevive como um gênero...?"
10027030-128 = "[s7] \"Quer dizer que, mesmo depois de concluído, os fãs continuam se reunindo?\"\n[s8] \"Isso é algo comum em Red Winter?\""
10027030-131 = "Não... não é algo comum..."
10027030-132 = "É comum que obras sejam mencionadas ou lembradas com carinho mesmo depois de terminadas, mas..."
10027030-133 = "Ter pessoas que continuam ativas no gênero por tanto tempo após o fim... #ne ainda restar um círculo com escala suficiente para realizar encontros presenciais..."
10027030-134 = "Normalmente, isso não acontece muito... Bem, imagino que existam pessoas em qualquer gênero, mas... #num círculo tão ativo assim é raro..."
10027030-135 = "Bem, deve ser porque foi uma obra popular o suficiente para manter a paixão dos fãs viva."
10027030-136 = "No entanto..."
10027030-137 = "[s9] \"Sobre quando e onde esse encontro vai acontecer...\"\n[s10] \"Você também não deve saber, Yakumo...\""
10027030-140 = "Não, eu sei, sim."
10027030-141 = "Você sabe mesmo!! #nE outra, não era para você dizer \"até aí eu não sei\" como de costume!?"
10027030-142 = "Isso é outra história. Temos alguns contatos..."
10027030-143 = "Afinal, somos o Departamento de Publicações, não é?"
10027030-144 = "Você não disse agorinha que não lembrava muito bem!?"
10027030-145 = "Não, não... eu só disse que não conseguia lembrar imediatamente. #n— Sobre a data e o local do encontro..."
10027030-146 = "Onde está acontecendo?"
10027030-147 = "Mufufufu... antes disso, gostaria de definir o preço por essa informação."
10027030-148 = "[s] \"Entendo... informação não é de graça, temos que definir isso mesmo.\""
10027030-149 = "Exatamente. Fico feliz que sejamos práticos."
10027030-150 = "O que você pretende pedir ao Sensei?"
10027030-151 = "Hm? Não, eu preciso de algo da Mel."
10027030-152 = "Hã? De mim!?"
10027030-153 = "Não é nada demais. #nMais tarde, eu gostaria de pedir que você escreva um \"manuscrito\"..."
10027030-154 = "Hã! Um manuscrito!? Nem pensar! #nVocê nunca me fez um pedido decente na vida!"
10027030-155 = "Ora, ora... Então você não quer as informações sobre a \"Luna\"? Entendo... #nEntão a determinação da Mel não passa disso, afinal. Que decepção."
10027030-156 = "Ugh...!"
10027030-161 = "(Droga... é para pedir desculpas à Momiji... se for por isso...)"
10027030-167 = "Tá, eu entendi... eu faço, satisfeito!?"
10027030-168 = "[s] \"Mel, você está bem? Não está se forçando demais?\""
10027030-169 = "É pela Momiji... eu dou conta de fazer isso...!"
10027030-170 = "Mufufu... Que espírito de camaradagem maravilhoso, professora Mel."
10027030-171 = "[s] \"Mel...\""
10027030-172 = "Mas não vou desenhar nada estranho, ouviu! #nSó vou desenhar se for algo que eu mesma consiga fazer e que me convença de verdade!"
10027030-173 = "Mufufu... Não se preocupe com isso. #nO manuscrito solicitado será, sem dúvida, uma obra que a própria autora Mel ama de paixão."
10027030-174 = "Muito bem! Então, assine este contrato, concordando que, caso o acordo não seja cumprido, o tablet e a caneta da Mel servirão como garantia."
10027030-175 = "Sua bruxa! Demônio!"
10027030-176 = "Por natureza, editores são como demônios para os criadores. #nVamos, assine logo."
10027030-189 = "[ns] \"Eu não preciso fazer nada...?\""
10027030-190 = "Ah, sobre isso... deixe-me falar com você novamente em outra ocasião. #nSerá muito mais interessante assim. Mufufu."
10027030-191 = "[s] \"P-por favor, pegue leve comigo...\""
10027030-192 = "Mufufufu..."
