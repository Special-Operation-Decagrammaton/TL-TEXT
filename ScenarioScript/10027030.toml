[translation]
10027030-1 = "第3話;出版と重版、そして流通"
10027030-7 = "タカネのやつ……わけ分かんないことばっか言って。"
10027030-8 = "も～！全然意味わかんない！"
10027030-9 = "[s] \"でもほら、手がかりはくれたじゃない？\""
10027030-10 = "……うーん。そうね。#nそれにしては、なんかちょっと……要領を得ないというか。"
10027030-11 = "[s] \"タカネは……『ルナ』について何を知っているんだろうね？\""
10027030-12 = "さあ……でも、出版部を訪ねてみろというのはある意味では正しいと思う。"
10027030-13 = "出版部には、レッドウィンターから出版された全ての本に関する資料が集まってるの。#nまぁ、自分たちが出版してるんだから当たり前よね。"
10027030-14 = "あいつの言う通りにするのは癪だけど……足を運ぶ価値はあると思う。"
10027030-15 = "『ルナ』の資料も、きっとそこにあるはずだから……"
10027030-23 = "[ns] \"……ここが出版部……？\""
10027030-24 = "そう。レッドウィンター連邦学園で売られている本のほとんどはここで作られてるよ。"
10027030-25 = "[s] \"すごいね。\""
10027030-26 = "あはは……感心するような場所では……"
10027030-27 = "まぁ……ちょっと色々と[ruby=・    ・    ・    ・    ・    ・]普通じゃない[/ruby]ものも印刷してるからさ……"
10027030-28 = "……「知識解放戦線」の会誌を印刷する時にもお世話になってるから、あんまり悪くは言いたくないんだけど……"
10027030-33 = "そんな小声で言っても、全部聞こえてますけどねぇ？"
10027030-39 = "ゲ、現れた……"
10027030-40 = "はいはぁい、普通じゃない出版部の責任者参上でございます。#nどんな風の吹き回しでここに来たのかは知りませんが、お会いできて嬉しいですよ、メル。#nそれとも……ハンドルネームのメルリー先生、と呼んで差し上げましょうか？"
10027030-41 = "……メルでいいよ、ヤクモ。"
10027030-42 = "[s] \"ヤクモが出版部の部長？\""
10027030-43 = "ええ。私が部長の[ruby=あらまき]荒槇[/ruby]ヤクモです。以後お見知りおきを。#n我が出版部は、印刷・製本・包装・管理・営業から事業拡大まで……本に関する事であれば何でも取り扱っている、出版のエキスパートでございます。"
10027030-44 = "ちなみに……「レッドベア」の編集も担当しておりますよ。ムフフ。"
10027030-48 = "[ns1] \"色々やっててすごいね……これが「レッドベア」？\"\n[ns2] \"見たことある気がする。チェリノが出してるやつ……だよね？\""
10027030-51 = "ええ、そうです。"
10027030-52 = "（その時、紙のようなものが視界の端をひらひらしながら落ちていった）"
10027030-56 = "[ns3] \"これは……チラシ……？\"\n[ns4] \"「ヨーグルトのふたを舐めずに捨てる、ひげ暴君を糾弾する！」……？\""
10027030-60 = "うわぁ……まだこんなのも印刷してるんだ……"
10027030-66 = "[ns5] \"チェリノのプロパガンダ雑誌とチェリノを糾弾するチラシを……\"\n[ns6] \"同時に印刷して大丈夫なの！？\""
10027030-70 = "何かおかしいところでもありますかねぇ？#n顧客のニーズに応えて売上が2倍になるのなら、それに越したことはないでしょう？"
10027030-71 = "例えば、「レッドベア」の中でチェリノ会長称賛特集とチェリノ会長風刺漫画を同時に掲載すれば、それぞれの読者層が広がるわけですよ。"
10027030-72 = "得しかないのに、どうして片方だけに絞る必要が？ムフフフフ。"
10027030-73 = "[s] \"それはそうだけど……ちょっと奇抜な考え方だね。\""
10027030-74 = "お褒めの言葉をありがとうございます。#nそれで……こちらの方は何とお呼びすれば？"
10027030-75 = "[s] \"自己紹介が遅れました。シャーレの[USERNAME]先生です。\""
10027030-76 = "あなたが！？#n……危ない危ない。出版部部長としての営業スマイルが乱れるところでした。"
10027030-77 = "それでは改めて……出版部へようこそ。#n先生のお噂はかねがね……あまりにも様々な噂を聞くものだから、集団幻覚なのではないかとさえ思っておりましたよ。"
10027030-78 = "ああ……時に、次号の「レッドベア」特集で先生の伝記を掲載したいのですが……いかがでしょう？"
10027030-79 = "[s] \"謹んでお断りします。\""
10027030-80 = "そんな事言わないでくださいよぉ……これは先生にとっても良い企画になるんですよ？#nまずは話だけでも……"
10027030-81 = "納期を守らず、ネタがマニアックすぎてファン層も薄い「知識解放戦線」と手を組むよりは、よほど[ruby=事務局]バック[/ruby]がしっかりしている我々と組んだ方が――"
10027030-83 = "……一応、事務局がバックについてるのって極秘事項じゃないの？"
10027030-85 = "あちゃ～私としたことがついつい口が滑ってしまいました。#n聞かなかった事にしてくださると――"
10027030-86 = "[s] \"話の途中でごめん……私たちは、出版部に聞きたいことがあって来たんだ。\""
10027030-87 = "おっと……これは取引ですねぇ？私が先生のお願いを聞く代わりに、先生も私の頼みを聞いてくださるというものだと考えても？"
10027030-88 = "なぁんだ、話が合うじゃないですかぁ。もう……先生もお人が悪い。#nそれならそうと先に言ってくださいよぉ。"
10027030-89 = "そういうのじゃないんだけど……#nそろそろちゃんと話を聞く癖つけたら？"
10027030-90 = "あら、違うんですか？"
10027030-91 = "当たり前でしょうが！"
10027030-92 = "メルには聞いておりませんが。#n私は今、先生とお話をしているんです。"
10027030-93 = "[s] \"いいよ。私たちの質問に答えてくれるなら、出版部に協力する。\""
10027030-94 = "ちょっと先生！？なに要求されるかわかったんもんじゃないよ！？#n生皮剥がれちゃうかもしれないんだよ！？"
10027030-95 = "いや……メルは一体何を……？出版部では皮なんて扱ってませんよぉ？"
10027030-96 = "それは、比喩というか……なんというか……"
10027030-98 = "おかしな人ですねぇ……"
10027030-99 = "[s] \"……ん？\""
10027030-100 = "……。"
10027030-101 = "……？"
10027030-107 = "[ns] \"それで、本題なんだけど。\""
10027030-108 = "『ルナ』ですか……"
10027030-109 = "うん。何か知ってる？"
10027030-110 = "どこかで聞いたような……聞いてないような……#n川の向こうで昔飼ってた猫が手を振っているような……"
10027030-111 = "なんか最後の違くない……？"
10027030-112 = "ああ……思い出しました。#nたしかに、そんな名前の漫画がありましたねぇ。"
10027030-113 = "[s] \"本当？\""
10027030-114 = "とはいえ、かなり昔に出版されたものですので……うーん。"
10027030-115 = "あ～～……少しずつ思い出してきましたよぉ。#nところで、どうして[ruby=ここ]出版部[/ruby]に？古本屋で探せば良いでしょうに。"
10027030-116 = "[s] \"タカネに、ここで手がかりが見つかるって言われて……。\""
10027030-117 = "ああ……なるほど……そういうことでしたか……タカネったら……。"
10027030-118 = "ふむふむ、なるほど。う～む……"
10027030-119 = "[s] \"それで、何か分かりそう？\""
10027030-120 = "そうですねぇ。手がかり、か……たしかにそれらしきものはあります。#n先生とメルにとっては朗報になるようなものなら……"
10027030-121 = "お、さすが！どういうのなの？"
10027030-122 = "まず始めに、『ルナ』の最終巻に関しては私もよく知りません。"
10027030-123 = "そんなガッカリした顔しないでくださいよぉ……ここからが本題です。"
10027030-124 = "もったいぶってないで早く教えてよね……"
10027030-125 = "『ルナ』は、昔から細々と生き延びているジャンルでして……#nルナ界隈の人たちは、今でも不定期にオフ会を開いているそうなんです。"
10027030-126 = "そこで定期的に「活動」しているらしいですよぉ？"
10027030-127 = "『ルナ』が未だにジャンルとして生き延びている……？"
10027030-128 = "[s7] \"完結した後も、ファン同士で集まって活動してるってこと？\"\n[s8] \"レッドウィンターでは割と普通な事だったりする？\""
10027030-131 = "いや……普通のことではないよ……"
10027030-132 = "作品が完結した後もたまに話題に上がったり、懐かしまれるのはよくある話だけど……"
10027030-133 = "完結した後もずっとジャンルとして活動を続ける人がいて……#nたまにオフ会が開かれる規模の界隈が残ってるっていうのは……"
10027030-134 = "普通は、あんまりないかも……いや、どのジャンルだって人はいるだろうけど……#nここまで活動が盛んな界隈は珍しい……"
10027030-135 = "まぁ、それだけファンの熱量が続くほどの人気作だったって事なんでしょうねぇ。"
10027030-136 = "しかし……"
10027030-137 = "[s9] \"そのオフ会がいつ、どこで開かれるかとかは……\"\n[s10] \"流石のヤクモも知らないよね……。\""
10027030-140 = "いえ、知ってますよぉ？"
10027030-141 = "知ってるんかい！！#nというか、ここは「流石にそこまでは……」ってなるのがお約束じゃないの！？"
10027030-142 = "そこはそれ。ちょ～っとしたルートがありまして……"
10027030-143 = "我々は出版部ですからねぇ？"
10027030-144 = "さっきはあんまり覚えてないって言ってなかった！？"
10027030-145 = "いやいや……すぐ思い出せないって言っただけですよぉ。#n――オフ会の日時と場所についてなのですが……"
10027030-146 = "どこでやってるの？"
10027030-147 = "ムフフフ……その前に、この辺りで情報の対価を決めたいところですねぇ。"
10027030-148 = "[s] \"そうだね……情報は無料じゃないんだし、ちゃんと決めないとね。\""
10027030-149 = "そういうことです。話が早くて助かります。"
10027030-150 = "先生に一体なにを要求するつもりなのよ。"
10027030-151 = "いえ？用があるのはメルの方です。"
10027030-152 = "え？私！？"
10027030-153 = "大したことではありませんよぉ。#n後日、「原稿」の執筆をお願いしたく……"
10027030-154 = "えっ！原稿！？嫌だけど！？#nあんたにまともな依頼された事ないもん！"
10027030-155 = "あれぇ～？『ルナ』の情報、いらないんですかぁ？そうですかぁ……#nメルの本気は所詮、その程度だったんですねぇ。残念ですぅ。"
10027030-156 = "うっ……！"
10027030-161 = "（くっ……モミジに謝るためだ……そのためなら……）"
10027030-167 = "わ、分かった……やればいいんでしょう！？"
10027030-168 = "[s] \"メル、大丈夫なの？無理してない？\""
10027030-169 = "モミジのためだもん……これくらいはやってやるわよ……！"
10027030-170 = "ムフフ……素晴らしい同志愛ですねぇ、メルリー先生。"
10027030-171 = "[s] \"メル……。\""
10027030-172 = "でも、変なものだったら描かないからね！#n「私に描けるもので、心から納得したもの」じゃなきゃ描かないよ！"
10027030-173 = "ムフフ……それならご心配なく。#n依頼原稿は間違いなく「作家メル自身も愛してやまない」作品になりますから。"
10027030-174 = "いいでしょう！それでは、約束がきちんと履行されなかった場合、メルのタブレットとペンを担保に入れるという事でこの契約書にサインしてください。"
10027030-175 = "鬼！悪魔！"
10027030-176 = "元来、編集者なんてクリエイターにとっては悪魔のようなものですから。#nさあ、早く。"
10027030-189 = "[ns] \"私は何もしなくて大丈夫なの……？\""
10027030-190 = "ああ、それはですねぇ……後日改めてお話させてください。#nその方が面白そうですから。ムフフ。"
10027030-191 = "[s] \"お、お手柔らかにお願いします……。\""
10027030-192 = "ムフフフフ……"
