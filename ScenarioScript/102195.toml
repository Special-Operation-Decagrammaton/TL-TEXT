[translation]
102195-4 = "Hahahaha! Isso também foi esclarecido com segurança!"

102195-5 = "Pois bem, pessoal! Eu adoraria encontrar você novamente se tiver uma chance!"

102195-6 = "Os trilhos que continuam girando acabarão por levar a um futuro de justiça!"

102195-7 = "Esquadrão de sushi da correia transportadora Mugen Kaitenger! Saída!"

102195-12 = "……."

102195-13 = "Quem diabos eram eles?"

102195-15 = "Aqui, o processamento está completo. Diretor Himari."

102195-16 = "Toki...?"

102195-17 = "...Ah, é cedo. É excelente. #nEntão, especificarei as seguintes coordenadas, então você poderia, por favor, ir para lá?"

102195-18 = "Meu Deus, mamãe."

102195-19 = "...Toki, você está bem? Você não está exagerando?"

102195-20 = "Obrigado pela sua preocupação, Amy. estou bem. #nAinda tenho alguma energia "armada" sobrando."

102195-22 = "Toki, a habilidade de "[ruby=Abi-Eshuh]Abi-Eshuh[/ruby]"... Mesmo assumindo que seja parcialmente um reflexo da tecnologia do "Deus Sem Nome", só foi possível por causa da cidade-fortaleza "Eridu"."

102195-23 = "Como usamos uma cidade inteira para controlar uma tecnologia com muitas áreas desconhecidas, conseguimos trazer à tona um desempenho destrutivo – ou melhor, um desempenho que poderia ser chamado de mau gosto."

102195-24 = "O plano do Rio de usá-lo para lutar contra a "princesa sem nome dos deuses" pode não ter sido nem um pouco imprudente..."

102195-25 = "Porém, agora que “Eridu” foi desmantelado, não podemos esperar que os seus “braços” tenham o mesmo desempenho de antes."

102195-26 = "Acho que deveria ser considerado um traje comum por enquanto... certo?"

102195-27 = "...Sim, senhora."

102195-28 = "...Não, não é um terno comum. Já que eu, um hacker supergênio, fiz as mudanças... Embora não seja no nível de crime, dá para sentir o sopro da genialidade... Posso dizer que é uma obra-prima maravilhosa."

102195-29 = "sim. Obrigado, Diretor Himari."

102195-32 = "...Toki, posso ajudar você também?"

102195-33 = "Está tudo bem, Amy. Estou acostumado a lutar sozinho."

102195-38 = "Entraremos em contato novamente assim que chegarmos ao nosso destino. Bem, então."

102195-42 = "É meio solitário."

102195-43 = "Originalmente Toki era C&C. #nTalvez ele quisesse lutar ao lado do agente."

102195-44 = "Não deveríamos lutar juntos?"

102195-45 = "Bem... talvez você esteja preocupado por não ter esse tipo de qualificação."

102195-46 = "Hmm... Mas Toki estava apenas cumprindo ordens."

102195-47 = "Sim. O culpado é a irmã mais velha."

102195-48 = "...No entanto, acho que não posso dizer com certeza que não é minha culpa."

102195-49 = "Entendo... isso é difícil."

102195-50 = "……Sim. São pessoas desajeitadas. #nToki e Rio também."

102195-55 = "Próxima vez: Defesa final “Placa de Petri”"

