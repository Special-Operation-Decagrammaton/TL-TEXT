[translation]
102195-4 = "Ha ha ha ha ha! Parece que por aqui também deu tudo certo!"
102195-5 = "Então, pessoal! Espero que nos encontremos de novo em outra ocasião!"
102195-6 = "Os trilhos que continuam girando um dia vão levar... ao futuro da justiça!"
102195-7 = "Esquadrão Infinito do Sushi Giratório・Kaitenger! Retirada!"
102195-12 = "……"
102195-13 = "Quem eram aquelas garotas, afinal...?"
102195-15 = "Processamento concluído por aqui, Himari."
102195-16 = "Toki...?"
102195-17 = "Nossa, terminou rápido. Muito eficiente da sua parte. Então, vou enviar as próximas coordenadas. Pode seguir para lá?"
102195-18 = "Yes, ma'am."
102195-19 = "…Toki, você tá bem? Não tá se forçando demais?"
102195-20 = "Obrigada pela preocupação, Eimi. Estou bem. Ainda resta energia suficiente no meu 'equipamento'."
102195-22 = "Toki, mesmo assumindo que as capacidades do 'Abi-Eshuh' utilizem parte da tecnologia do 'Deus Sem Nome'... aquilo só foi possível por causa da Cidade-Fortaleza 'Eridu'."
102195-23 = "Foi justamente porque uma cidade inteira foi usada para controlar essa tecnologia desconhecida que aquele poder destrutivo — ou melhor, aquele desempenho de extremo mau gosto — pôde ser alcançado."
102195-24 = "Talvez por isso o plano da Rio de enfrentar a 'Princesa dos Deuses Sem Nome' não fosse tão absurdo quanto parecia..."
102195-25 = "Mas agora que 'Eridu' foi desmontada, não dá mais pra esperar que esse 'equipamento' tenha o mesmo desempenho de antes."
102195-26 = "Considere isso apenas um traje comum agora... entendeu?"
102195-27 = "……Yes, ma'am."
102195-28 = "…Não, pensando bem, chamar de traje comum é injusto. Afinal, uma super hacker genial como eu fez melhorias nele. Talvez não seja apelão a esse ponto... mas ainda dá pra sentir o sopro da genialidade. Uma verdadeira obra-prima."
102195-29 = "Sim. Muito obrigada, Himari."
102195-32 = "…Toki, quer que eu vá ajudar também?"
102195-33 = "Está tudo bem, Eimi. Já estou acostumada a lutar sozinha."
102195-38 = "Entrarei em contato novamente assim que chegar ao ponto designado. Até mais."
102195-42 = "Isso dá uma sensação meio triste..."
102195-43 = "A Toki originalmente faz parte da C&C. Talvez ela quisesse lutar ao lado dos Agentes."
102195-44 = "Então por que ela simplesmente não luta junto com eles?"
102195-45 = "Pois é... talvez ela ache que não tem esse direito."
102195-46 = "Hmm... mas a Toki só tava obedecendo ordens, né?"
102195-47 = "Sim. A verdadeira responsável foi a Big Sister."
102195-48 = "…Mesmo assim, acho que ela não consegue simplesmente fingir que não teve culpa nenhuma."
102195-49 = "Entendi... isso é complicado."
102195-50 = "……É. São pessoas bem desajeitadas emocionalmente. Tanto a Toki... quanto a Rio."
102195-55 = "Próximo capítulo;Batalha Final de Defesa「SCHALE」"
