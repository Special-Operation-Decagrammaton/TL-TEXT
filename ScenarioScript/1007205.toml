[translation]
1007205-1 = "O que se esconde nas planícies de maré"

1007205-2 = "(Recebi uma mensagem de Saki e fui para a planície de maré no lado oeste da vila.)"

1007205-7 = "Ah, professor. Isso foi rápido..."

1007205-12 = "...Então, por que você veio com roupas casuais?"

1007205-13 = "[s] \"Há algum problema...?\""

1007205-14 = "Eu disse para você ir para as planícies das marés. Mas não acredito que você veio vestido assim..."

1007205-15 = "...Mesmo que a lama não caia depois você não vai saber, né?"

1007205-16 = "[s1] \"De qualquer forma, calcei minhas botas.\"\n[s2] \"Estou observando Saki pegá-lo.\""

1007205-19 = "Talvez você esteja subestimando as planícies de maré?"

1007205-20 = "É tão perigoso que todos os anos ocorrem acidentes por ficar preso na lama."

1007205-21 = "Depois que ambas as pernas estão presas, é quase impossível escapar sozinho."

1007205-22 = "A maré sobe gradualmente e torna-se perigosa quando atinge a maré alta."

1007205-23 = "Portanto, mesmo que suas roupas fiquem sujas, é seguro mover-se com um centro de gravidade mais baixo."

1007205-24 = "Há moradores da vila por perto hoje, então tenho certeza que eles poderão ajudar em caso de emergência..."

1007205-25 = "[s] \"Ok, terei cuidado.\""

1007205-26 = "ah. Eu não me importo se ficar sujo, então deixe comigo para tirá-lo."

1007205-30 = "...Então vamos começar."

1007205-35 = "Professor, olhe! É Mategai!"

1007205-36 = "Quando coloquei a mão no buraco, peguei facilmente!"

1007205-37 = "Foi tão fácil... qual foi o problema antes?"

1007205-39 = "Huh? Tem um buraco aqui também..."

1007205-40 = "vamos ver......"

1007205-44 = "Não é um goby desta vez?"

1007205-45 = "Parece interessante, mas fica delicioso quando comido na panela quente."

1007205-46 = "Hehe. Cada vez que coloco a mão num buraco, consigo pegar mariscos e peixes. #nÉ como abrir um baú de tesouro."

1007205-47 = "[s] \"Saki é habilidoso.\""

1007205-48 = "Claro. Os membros da SRT devem se adaptar a qualquer ambiente."

1007205-49 = "Como homem de ponta do pelotão COELHO, não há nada melhor do que um inimigo escondido na lama!"

1007205-53 = "Ah, tem um buraco aqui também."

1007205-54 = "Eu me pergunto o que vai sair desta vez..."

1007205-61 = "Eu peguei!"

1007205-67 = "sim……?"

1007205-68 = "...O que é isso?"

1007205-73 = "Peguei algo que parecia um pepino do mar vermelho, macio e nojento..."

1007205-74 = "Ei, professor... você sabe o que é isso?"

1007205-75 = "[s] \"Desculpe, eu também não sei...\""

1007205-82 = "Ah, não é Yumushi?"

1007205-83 = "Hum, Yumushi...?"

1007205-84 = "As pessoas na cidade podem nunca ter visto isso."

1007205-89 = "Muitas vezes, Yumushi pode ser capturado em planícies de maré. É frequentemente usado como isca de pesca para caça grossa, mas também pode ser consumido como sashimi ou em conserva em vinagre."

1007205-90 = "Não é uma forma estranha? No entanto, a doçura e a riqueza sutis são viciantes. #nÉ um ingrediente popular entre os gourmets."

1007205-91 = "Haha, vocês estão com sorte!"

1007205-98 = "……professor."

1007205-99 = "Você poderia me ajudar por um momento?"

1007205-100 = "[s] \"P-por que...?\""

1007205-101 = "Essa coisa chamada Yumushi... ela se move na minha mão e cospe água de peixe..."

1007205-102 = "Quero me desapegar o mais rápido possível..."

1007205-103 = "[s] \"E se eu deixar ir...?\""

1007205-104 = "Seu professor também não ouviu o que eu disse antes? #nParece ser um ingrediente popular entre os gourmets!"

1007205-105 = "É nojento, mas desistir dos ingredientes que você trabalhou tanto para conseguir..."

1007205-106 = "É possível?"

1007205-110 = "Então... eu gostaria que a professora cuidasse desse cara..."

1007205-111 = "[s] Fuja."

1007205-116 = "Ei, espere!"

1007205-121 = "(...Depois disso, Saki correu em minha direção, jogando lama em mim, e fui pego e forçado a segurar Yumushi.)"

1007205-122 = "(Yumushi comido como sashimi estava surpreendentemente delicioso)"

