[translation]
1007205-1 = "干潟に潜むもの"
1007205-2 = "（サキから連絡をもらい、村の西側にある干潟へ向かった）"
1007205-7 = "お、先生。早かったな……"
1007205-12 = "……って、どうして普段着で来たんだ？"
1007205-13 = "[s] \"何か問題でもあるの……？\""
1007205-14 = "干潟に入るって言っただろう。なのに、そんな格好で来るなんて……"
1007205-15 = "……後で泥が落ちなくても知らないぞ？"
1007205-16 = "[s1] \"とりあえず、長靴は履いてきたから。\"\n[s2] \"サキが獲るところを見守ってるよ。\""
1007205-19 = "もしかして、干潟を甘く見てないか？"
1007205-20 = "ぬかるみに足を取られて、毎年事故が発生するほど危険なんだぞ。"
1007205-21 = "両足がハマってしまうと、自力で脱出するのは不可能に近い。"
1007205-22 = "徐々に潮高が上がって、満潮になったら危険だからな。"
1007205-23 = "だから服が汚れるとしても、重心を落として移動するのが安全だ。"
1007205-24 = "今日は周りに村の住民もいるし、いざという時は助けてもらえると思うけど……"
1007205-25 = "[s] \"分かった、気をつけるね。\""
1007205-26 = "ああ。私は汚れても構わないから、取るのは任せてくれ。"
1007205-30 = "……それじゃ、始めるぞ。"
1007205-35 = "先生、見てくれ！マテガイだ！"
1007205-36 = "穴に手を入れてみたら、簡単に獲れたぞ！"
1007205-37 = "こんなにあっさりと……この前の苦労は何だったんだ。"
1007205-39 = "あれ？ここにも穴が……"
1007205-40 = "どれどれ……"
1007205-44 = "今度はハゼじゃないか！"
1007205-45 = "面白い見た目をしてるが、鍋にして食べると美味しいんだよなぁ。"
1007205-46 = "ふふっ。穴に手を入れるたび、貝や魚が獲れるなんてな。#n宝箱でも開けてる気分だ。"
1007205-47 = "[s] \"サキは器用だね。\""
1007205-48 = "無論だ。SRTの隊員は、いかなる環境にも適応しないといけないからな。"
1007205-49 = "RABBIT小隊のポイントマンたるもの、泥の中に潜[ruby=ターゲット]む標的の[/ruby]索敵くらい、なんてことはない！"
1007205-53 = "あ、ここにも穴が。"
1007205-54 = "今度は何が出るかな……"
1007205-61 = "獲れたぞ！"
1007205-67 = "ん……？"
1007205-68 = "……なんだ、これは？"
1007205-73 = "ツルツルして気持ち悪い形をした、赤いナマコみたいなものが獲れたんだが……"
1007205-74 = "せ、先生……これが何か知ってるか？"
1007205-75 = "[s] \"ごめん、私も知らないかな……。\""
1007205-82 = "おお、ユムシじゃないか。"
1007205-83 = "ゆ、ユムシ……？"
1007205-84 = "都会の人は、見たことないかもしれんな。"
1007205-89 = "ユムシは干潟だとよく獲れるんだ。大物狙いの釣り餌として使われる事が多いが、刺し身や酢漬けにして食べる事もできる。"
1007205-90 = "奇妙な形だろう？でも、ほのかな甘味とコクがクセになる。#n美食家からも人気の食材だよ。"
1007205-91 = "ははっ、君たちは運がいいね！"
1007205-98 = "……先生。"
1007205-99 = "ちょっと……手を出してくれないか。"
1007205-100 = "[s] \"ど、どうして……？\""
1007205-101 = "このユムシとかいう奴……手の中でクネクネ動くし、生臭い水を吐き出すから……"
1007205-102 = "一刻も早く離したい……。"
1007205-103 = "[s] \"離したら……？\""
1007205-104 = "さっきの話、先生も聞いてただろう？#n美食家に人気の食材らしいぞ！"
1007205-105 = "気持ち悪いけど、せっかく手に入れた食材を手放すなんてこと……"
1007205-106 = "できるものか！"
1007205-110 = "だから、その……先生にコイツを預かってもらいたいんだが……"
1007205-111 = "[s] 逃げる。"
1007205-116 = "おいっ、待て！"
1007205-121 = "（……その後、泥を飛ばしながら走ってきたサキに捕まって、無理やりユムシを持たされた）"
1007205-122 = "（刺身にして食べたユムシは、意外と美味しかった）"
