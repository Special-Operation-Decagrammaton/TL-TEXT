[translation]
10036140-1 = "スクワッドがゲームを楽しむ方法（２）"
10036140-3 = "おぉ！#n初級クリアおめでとうございます！"
10036140-4 = "ふっ。"
10036140-5 = "あの程度、訓練にすらならない。"
10036140-9 = "みんな、次も行けるか？"
10036140-15 = "問題ないよ。"
10036140-16 = "みんなでゲームするの、楽しいね。"
10036140-17 = "え、えへへ……「BiBi」の最新号に一歩近づきました……！"
10036140-18 = "もしかすると、本当に景品を手に入れられるかもしれません……！"
10036140-19 = "たまたまかもしれないけど。"
10036140-20 = "あ、あぁ……やっぱり私たちには……。"
10036140-21 = "いや、その……冗談だよ。"
10036140-27 = "ミサキが……。"
10036140-28 = "冗談を……？"
10036140-29 = "み、ミサキさんのユーモアセンスって……。"
10036140-30 = "う、うるさい！#nまだ次のゲームがあるんでしょ、早く。"
10036140-31 = "それでは準備ができたようなので、中級を開始します！"
