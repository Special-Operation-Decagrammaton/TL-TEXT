[translation]
2300005-1 = "アイリの悩み"
2300005-2 = "トリニティ・校庭"
2300005-3 = "先生！おはようございます！"
2300005-4 = "お元気でしたか、体調は大丈夫ですか？"
2300005-5 = "[s] \"うん、おかげさまで。アイリの方は？\""
2300005-6 = "いつも通り元気です！今日は先生にも会えましたし。"
2300005-7 = "お時間は大丈夫ですか？"
2300005-8 = "以前お話した通り、ちょっと相談がしたくって……。"
2300005-9 = "えっと、内容なのですが……。"
2300005-10 = "その……。"
2300005-11 = "私、友達に意見や考えを言うときに、どうしても誤魔化してしまうと言いますか……。"
2300005-12 = "ちゃんと思ったことを言えずに、うやむやのまま終わらせてしまうことが多い気がしてるんです。"
2300005-13 = "これはきっと私の性格のせいだと思っていて……。"
2300005-14 = "私がいつも消極的な性格だから、こういうことになっちゃうんじゃないかなって……。"
2300005-15 = "このままで良いんでしょうか？これから先、たとえば……。"
2300005-16 = "何に対してもこうやって消極的だと、いつか友達をイライラさせちゃったりするんじゃないかなって思って、心配で……。"
2300005-17 = "[s] \"……。\""
2300005-18 = "……先生？"
2300005-19 = "[s1] 真剣な話だったので、真剣に答えることにする。\n[s2] 先生として、真剣に答えることにする。"
2300005-20 = "……その、先生？"
2300005-21 = "……その、先生？"
2300005-22 = "なんだか雰囲気が……。"
2300005-23 = "わ、私、正座した方が良いでしょうか？"
2300005-24 = "[s3] \"例えばだけど、好きなスイーツの話をしてる時、\"\n[s4] \"アイリの目はいつも輝いてたと思う。\""
2300005-25 = "……そ、そうでしたか？"
2300005-26 = "……そ、そうでしたか？"
2300005-27 = "[s5] \"スイーツの説明をしてくれる時のアイリは、\"\n[s6] \"すごく積極的だったと思うな。\""
2300005-28 = "あ……。"
2300005-29 = "あ……。"
2300005-30 = "……た、確かにそうかもしれません。"
2300005-31 = "……先生が何を仰っているのか、分かった気がします。"
2300005-32 = "友達に、どこのカフェのスイーツが美味しいかを教える時とか。"
2300005-33 = "アイスクリームのお店で、どの味が良いかを話している時とか。"
2300005-34 = "新作のスイーツを、友達に紹介する時とか……。"
2300005-35 = "確かに……そういう時の私は……。"
2300005-36 = "……。"
2300005-37 = "積極的、だったかもしれません。"
2300005-38 = "このままで、良いんでしょうか？"
2300005-39 = "[s7] \"私はそう思うよ。\"\n[s8] 親指をぐっと立てる。"
2300005-40 = "先生……。"
2300005-41 = "先生……。"
2300005-42 = "……はい、そうですね。自分ではあまり自覚していませんでしたが……。"
2300005-43 = "……えへへ。はい、そうかもしれません。"
2300005-44 = "先生に相談してよかったです。"
2300005-45 = "……。"
2300005-46 = "あの、先生。"
2300005-47 = "ちょっとこのご相談とは別に、ずっと考えていたことがあるのですが。"
2300005-48 = "もし、よろしければ。"
2300005-49 = "……聞いてくれますか？"
2300005-51 = "（その後、アイリとトリニティの校庭のベンチに座り、ふたりで話し合った）"
