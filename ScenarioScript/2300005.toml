[translation]
2300005-1 = "O dilema da Airi"
2300005-2 = "Trinity - Pátio da Escola"
2300005-3 = "Sensei! Bom dia!"
2300005-4 = "Como você tem passado? Está se sentindo bem?"
2300005-5 = "[s] \"Estou bem, obrigado por perguntar. E você, Airi?\""
2300005-6 = "Estou bem como sempre! E hoje ainda consegui encontrar o sensei."
2300005-7 = "Você tem um tempinho?"
2300005-8 = "Como eu havia mencionado antes, eu queria pedir um conselho..."
2300005-9 = "Bem, sobre o assunto..."
2300005-10 = "É que..."
2300005-11 = "Sabe, quando preciso dar minha opinião ou expressar meus pensamentos para minhas amigas, eu acabo sempre dando um jeito de me esquivar..."
2300005-12 = "Sinto que, na maioria das vezes, não consigo dizer o que realmente penso e acabo deixando as coisas ficarem confusas."
2300005-13 = "Acho que isso é por causa da minha personalidade..."
2300005-14 = "Como eu sou sempre tão passiva, acabo deixando as coisas chegarem a esse ponto..."
2300005-15 = "Será que está tudo bem continuar assim? Daqui para frente, por exemplo..."
2300005-16 = "Se eu continuar sendo tão passiva com tudo, fico preocupada que, um dia, eu acabe irritando minhas amigas..."
2300005-17 = "[s] \"…….\""
2300005-18 = "……Sensei?"
2300005-19 = "[s1] Como é um assunto sério, decido responder com seriedade.\n[s2] Como sensei, decido responder com seriedade."
2300005-20 = "……Isso, sensei?"
2300005-21 = "……Isso, sensei?"
2300005-22 = "O clima ficou meio..."
2300005-23 = "D-devo me sentar de forma formal?"
2300005-24 = "[s3] \"Por exemplo, quando você fala sobre seus doces favoritos,\"\n[s4] \"seus olhos sempre brilham, Airi.\""
2300005-25 = "……S-sério?"
2300005-26 = "……S-sério?"
2300005-27 = "[s5] \"Acho que a Airi é muito ativa\"\n[s6] \"quando está explicando sobre doces.\""
2300005-28 = "Ah……"
2300005-29 = "Ah……"
2300005-30 = "……É, talvez você tenha razão."
2300005-31 = "……Acho que entendi o que o sensei quer dizer."
2300005-32 = "Como quando ensino para minhas amigas qual café tem o doce mais gostoso."
2300005-33 = "Ou quando estamos na sorveteria e discutimos qual sabor é o melhor."
2300005-34 = "Ou quando apresento um doce novo para elas..."
2300005-35 = "É verdade... nessas horas, eu..."
2300005-36 = "……"
2300005-37 = "Talvez eu tenha sido ativa, sim."
2300005-38 = "Será que está tudo bem continuar assim?"
2300005-39 = "[s7] \"Eu acho que sim.\"\n[s8] Faço um sinal de positivo com o polegar."
2300005-40 = "Sensei……"
2300005-41 = "Sensei……"
2300005-42 = "……Sim, é verdade. Eu mesma não tinha muita consciência disso, mas..."
2300005-43 = "……Hehe. Sim, talvez seja verdade."
2300005-44 = "Fico feliz por ter pedido um conselho ao sensei."
2300005-45 = "……"
2300005-46 = "Diga, sensei."
2300005-47 = "Além desse assunto, tem algo em que venho pensando há muito tempo."
2300005-48 = "Se não for pedir muito..."
2300005-49 = "……Você poderia me ouvir?"
2300005-51 = "(Depois disso, sentei-me com a Airi em um banco no pátio de Trinity e conversamos.)"
