[translation]
1003106-1 = "新年の運試し"
1003106-2 = "ふふっ。新年といったらおみくじ、おみくじといったら新年よね、先生。"
1003106-3 = "[s] \"確かにそうかも？\""
1003106-4 = "新年になると誰もが、今年一年良い運勢であるようにって願うでしょう？"
1003106-5 = "もちろん当たり前のことだけれど、たとえおみくじでどんな結果が出たとしても……"
1003106-6 = "それで本当に、一年の運勢が全て決まってしまうとは思ってないわ。"
1003106-7 = "でも社長として、そして一つの組織のリーダーとして、このイベントを通じて今年一年の運勢をそれとなく確認してみるのも、風情があることだと思うの。"
1003106-8 = "ある種、お正月の風物詩ってところね。"
1003106-9 = "[s] \"なるほど……？"
1003106-10 = "とっ、とにかく！ほら、早く一緒に引きに行きましょう！"
1003106-11 = "もしかしたら、おみくじで一等が出るかもしれないじゃない？"
1003106-12 = "うん、私なら十分あり得るわね♪"
1003106-13 = "[s] \"おみくじって、「一等」とかそういうシステムだったっけ……？\""
1003106-17 = "あっ、あったわ。"
1003106-18 = "この箱を振って出てきた棒に書かれてる数字を確認して、その数字が書いてある引き出しを開けて、その中にある紙に書かれた運勢を見る……なるほど。"
1003106-19 = "それで、1回で100円なのね。"
1003106-20 = "じゃあ先に、私がやってみるわ。"
1003106-27 = "あ、出たわ。番号は、45番……"
1003106-29 = "引き出しは……ここね。"
1003106-33 = "運勢は……。"
1003106-34 = "「小凶」……？"
1003106-35 = "「商売は山あり谷あり」、「売り買いは待つのが吉」、「同僚との不和あり」……ですって……。"
1003106-36 = "[s] \"あんまり良くなさそう……？\""
1003106-37 = "ええ、そうね……まあ、別に信じてないのだけど。"
1003106-38 = "結局こういうのはあれよ……バーナム効果っていうものでしょう？"
1003106-39 = "それっぽい言葉を並べておいて、無意識のうちに自分が当てはまってると思わせてるだけのこと……。"
1003106-40 = "[s] \"運勢も確認したし、結びに行こっか？\""
1003106-44 = "[ns] \"……アル？\""
1003106-45 = "……やっぱりダメよ、先生。このまま諦めたらなんだか負けた気がするでしょう？"
1003106-46 = "あともう一回だけやるわ。100円くらい大したことないもの。"
1003106-53 = "今度は87番……。"
1003106-57 = "運勢の内容は……。"
1003106-61 = "「凶」……？"
1003106-62 = "「念入りな準備は未だ実を結ばず、時を待て」、「争いあり、身体に気を付けよ」、「事業、叶わない」。"
1003106-66 = "[ns] \"アルちゃーん……？\""
1003106-67 = "ふふっ……"
1003106-68 = "ふふふふふっ……いいわ。その挑戦、受けてあげましょう。"
1003106-69 = "舐められたものね。ここまで悪口を言われておいて、私が諦めるとでも思って！？"
1003106-70 = "[s] \"これは勝負じゃないよアル！？\""
1003106-71 = "いいえ、先生！これは勝負よ！これはおみくじと、私の勝負！"
1003106-72 = "まったく……私の便利屋が潰れるなんて告げてくれちゃって、一泡吹かせてやるわ！"
1003106-79 = "次！48番！"
1003106-80 = "内容は……"
1003106-82 = "「半凶」！？"
1003106-83 = "「事業、今はよくない」！？"
1003106-84 = "もうっ、次！"
1003106-91 = "……「末凶」！"
1003106-100 = "「大凶」！？！？"
1003106-105 = "……！"
1003106-110 = "……？"
1003106-115 = "……っ！！"
1003106-117 = "はあ……はあ……。"
1003106-118 = "[s1] \"ここまで全部「凶」関連って、逆にすごい……。\"\n[s2] \"凶の種類がこんなにあるなんて知らなかった。\""
1003106-119 = "くっ！わ、私はまだ諦めてないわ……！"
1003106-120 = "くっ！わ、私はまだ諦めてないわ……！"
1003106-121 = "こ、これが、私の最後の100円……！"
1003106-128 = "番号、1番……！"
1003106-132 = "内容は……！"
1003106-137 = "…………「凶ではないものの限りなく凶に近い凶」？"
1003106-138 = "な、何よこれ、ふざけてるの！？っていうか、一つくらい凶じゃなくてもいいじゃない！"
1003106-139 = "ご利益があるって噂は何だったのよ！？全部「凶」に近いのしか出ないわけ！？も、もちろん、全然信じてないのだけれど……！"
1003106-140 = "[s] \"じゃあ、私も。\""
1003106-149 = "[ns] \"あ、大吉だ。\""
1003106-150 = "何ですって！？"
1003106-151 = "ちょっ、ちょっと見せて先生！どんな内容だったの！？"
1003106-155 = "「素敵な出会あり。すぐ近くにいる人を大切にするのが吉」"
1003106-156 = "すぐ近くにいる、人……？"
1003106-157 = "[s] \"そう書いてあるね。\""
1003106-161 = "ふふ、ふふふっ。"
1003106-162 = "なるほど！"
1003106-163 = "へぇ、そうなのね！"
1003106-164 = "これは確かにご利益あるわね……！うん、納得したわ！"
1003106-165 = "[s] \"納得……？\""
1003106-166 = "な、何よ！終わりよければ全て良しって言うでしょう。最後に良い結果が出たんだから良いじゃない！"
1003106-170 = "さあ、先生。この引いたおみくじ、全部結びに行きましょう！"
1003106-171 = "……これ、こんなにたくさん結べるかしら……？"
1003106-172 = "[s] \"手伝うよ。\""
1003106-173 = "え、ええ。ありがとう。"
1003106-174 = "そばにいる人を大事にしなさい……って、おみくじに書いてあったことだし。"
1003106-175 = "ふふふっ、じゃあその通りに……。"
1003106-181 = "今年も一年、よろしくね。先生♪"
