[translation]
1003106-1 = "Teste de sorte de Ano Novo"
1003106-2 = "Hehe. Ano Novo significa omikuji, e omikuji significa Ano Novo, não é, Sensei?"
1003106-3 = "[s] \"Talvez seja verdade?\""
1003106-4 = "Quando chega o Ano Novo, todos desejam ter um ano de boa sorte, não é?"
1003106-5 = "Claro, isso é óbvio, mas não importa qual seja o resultado do omikuji..."
1003106-6 = "Eu não acho que isso realmente decida toda a sorte do ano."
1003106-7 = "Mas, como presidente e líder de uma organização, acho que verificar a sorte do ano através deste evento tem o seu charme."
1003106-8 = "É um tipo de tradição de Ano Novo, por assim dizer."
1003106-9 = "[s] \"Entendo...?\""
1003106-10 = "De-de qualquer forma! Vamos, vamos logo tirar um!"
1003106-11 = "Quem sabe, talvez a gente tire o primeiro lugar no omikuji, não é?"
1003106-12 = "Sim, vindo de mim, é bem possível♪"
1003106-13 = "[s] \"O omikuji tem um sistema de 'primeiro lugar'...?\""
1003106-17 = "Ah, tem sim."
1003106-18 = "Você sacode a caixa, verifica o número no palito que sair, abre a gaveta correspondente e lê a sorte escrita no papel... entendi."
1003106-19 = "E custa 100 ienes por vez."
1003106-20 = "Então, eu vou primeiro."
1003106-27 = "Ah, saiu. O número é 45..."
1003106-29 = "A gaveta é... aqui."
1003106-33 = "A sorte é..."
1003106-34 = "“Pequena Má Sorte”...?"
1003106-35 = "“Negócios têm altos e baixos”, “Para comprar e vender, o melhor é esperar”, “Desavenças com colegas”... diz aqui..."
1003106-36 = "[s] \"Não parece muito bom...?\""
1003106-37 = "É, pois é... bem, eu não acredito nisso de qualquer forma."
1003106-38 = "No fim das contas, isso é... o efeito Barnum, não é?"
1003106-39 = "Eles apenas alinham palavras vagas e fazem você pensar inconscientemente que se aplicam a você..."
1003106-40 = "[s] \"Já vimos a sorte, vamos amarrar o papel?\""
1003106-44 = "[ns] \"...Aru?\""
1003106-45 = "...Não, não dá, Sensei. Se eu desistir agora, sinto que perdi, não acha?"
1003106-46 = "Vou tentar só mais uma vez. 100 ienes não é nada demais."
1003106-53 = "Desta vez foi o número 87..."
1003106-57 = "O conteúdo da sorte é..."
1003106-61 = "“Má Sorte”...?"
1003106-62 = "“Preparativos minuciosos ainda não deram frutos, espere o momento certo”, “Haverá conflitos, cuide da saúde”, “Negócios, não se realizarão”."
1003106-66 = "[ns] \"Aru-chan...?\""
1003106-67 = "Hehe..."
1003106-68 = "Hehehehe... tudo bem. Eu aceito esse desafio."
1003106-69 = "Estão me subestimando. Depois de falarem tão mal de mim, você acha que eu vou desistir!?"
1003106-70 = "[s] \"Isso não é uma competição, Aru!?\""
1003106-71 = "Não, Sensei! Isso é uma competição! É uma disputa entre o omikuji e eu!"
1003106-72 = "Francamente... dizer que minha Loja de Conveniências vai falir, eu vou mostrar para eles!"
1003106-79 = "Próximo! Número 48!"
1003106-80 = "O conteúdo é..."
1003106-82 = "“Meia Má Sorte”!?"
1003106-83 = "“Negócios, não estão bons agora”!?"
1003106-84 = "Ah, chega, próximo!"
1003106-91 = "...“Má Sorte Final”!"
1003106-100 = "“Grande Má Sorte”!?!?"
1003106-105 = "...!"
1003106-110 = "...?"
1003106-115 = "...! !"

1003106-117 = "haaa…… haaa……."
1003106-118 = "[s1] \"Tudo isso ser relacionado a 'Má Sorte', é impressionante, na verdade…….\"\n[s2] \"Eu nem sabia que existiam tantos tipos de má sorte.\""
1003106-119 = "Droga! E-eu ainda não desisti……!"
1003106-120 = "Droga! E-eu ainda não desisti……!"
1003106-121 = "E-esta é a minha última moeda de 100 ienes……!"
1003106-128 = "Número, 1……!"
1003106-132 = "O conteúdo é……!"
1003106-137 = "…………'Não é má sorte, mas é uma má sorte que chega perto de ser má sorte'?"
1003106-138 = "Q-que diabos é isso, está brincando comigo!? E outra, não poderia ter pelo menos um que não fosse má sorte!?"
1003106-139 = "O que aconteceu com os boatos de que isso trazia sorte!? Por que só sai coisa perto de 'má sorte'!? B-bem, é claro que eu não acredito em nada disso, mas……!"
1003106-140 = "[s] \"Então, eu também vou tentar.\""
1003106-149 = "[ns] \"Ah, tirei Grande Sorte.\""
1003106-150 = "O que você disse!?"
1003106-151 = "E-ei, me mostra, Sensei! O que está escrito aí!?"
1003106-155 = "'Um encontro maravilhoso está por vir. Valorizar a pessoa que está logo ao seu lado é um bom presságio.'"
1003106-156 = "A pessoa... que está logo ao meu lado?"
1003106-157 = "[s] \"É o que está escrito aqui.\""
1003106-161 = "Fufu, fufufu."
1003106-162 = "Entendi!"
1003106-163 = "Hee, é assim, é!?"
1003106-164 = "Isso realmente traz sorte, não é……! Sim, agora eu entendi!"
1003106-165 = "[s] \"Entendeu……?\""
1003106-166 = "Q-que foi!? Dizem que tudo termina bem quando acaba bem, não é? Já que o último resultado foi bom, então está tudo bem!"
1003106-170 = "Vamos lá, Sensei. Vamos amarrar todos esses omikuji que tiramos!"
1003106-171 = "……Será que vamos conseguir amarrar essa quantidade toda……?"
1003106-172 = "[s] \"Eu ajudo você.\""
1003106-173 = "S-sim. Obrigada."
1003106-174 = "Valorizar a pessoa que está ao seu lado…… foi o que estava escrito no omikuji, afinal."
1003106-175 = "Fufufu, então vamos fazer exatamente isso……."
1003106-181 = "Conto com você para este ano também, Sensei♪"
