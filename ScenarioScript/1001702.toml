[translation]
1001702-1 = "Cerimônia de Entrega de Medalhas"
1001702-2 = "Academia Federal Red Winter - Gabinete da Presidente"
1001702-3 = "Hmm... não consigo pensar em um nome bom o suficiente."
1001702-4 = "Algo mais honroso, nobre e, ainda assim, digno de mim..."
1001702-6 = "Oh, você chegou, camarada! Eu estava te esperando!"
1001702-7 = "Na verdade, chamei você porque tenho um assunto importante onde preciso da sua sabedoria, camarada."
1001702-8 = "Como você deve saber, camarada, nos últimos meses eu tenho me esforçado dia e noite pelo desenvolvimento da Academia Federal Red Winter."
1001702-9 = "Para o controle de qualidade das instalações da cantina, passei o dia todo provando pudins, e antes de... inspecionar a escola, tirei uma soneca para conservar minhas energias, e também... bem, o que mais..."
1001702-10 = "Enfim! Fiz muitas coisas incríveis e estou muito cansada. É natural que eu receba uma recompensa por isso!"
1001702-11 = "Então, fiquei pensando e pensando sobre que tipo de prêmio dar a mim mesma... e finalmente decidi conceder a medalha mais honrosa da Academia Federal Red Winter."
1001702-12 = "Diferente do pudim, a medalha não acaba quando você a come, e ela é registrada no momento em que é concedida..."
1001702-13 = "Ficará na história da Academia Federal Red Winter para sempre — é a recompensa perfeita para mim, que trabalhei tanto e me esforcei por tanto tempo!"
1001702-14 = "Mas há um problema nisso, que é..."
1001702-15 = "Eu já recebi todas as medalhas que existem na Academia Federal Red Winter, então não sobrou nenhuma para eu ganhar!"
1001702-16 = "Bem, como eu sou a presidente do conselho estudantil, eu poderia simplesmente criar uma nova medalha."
1001702-17 = "O problema é que não consigo pensar em um bom nome para essa nova medalha..."
1001702-18 = "É aí que você entra, camarada. Você não teria um bom nome que seja honroso, nobre, elegante e que faça com que minhas conquistas sejam lembradas pelas gerações futuras?"
1001702-19 = "Pense em algo que soe bem para colocar antes do nome da medalha!"
1001702-20 = "[s1] \"Hiper.\"\n[s2] \"Ultra.\"\n[s3] \"Mega.\""
1001702-22 = "Ohhh, que legal!! Se combinarmos palavras assim, com certeza nascerá uma medalha com um nome incrível!"
1001702-24 = "Ohhh, que legal!! Se combinarmos palavras assim, com certeza nascerá uma medalha com um nome incrível!"
1001702-26 = "Ohhh, que legal!! Se combinarmos palavras assim, com certeza nascerá uma medalha com um nome incrível!"
1001702-27 = "Além disso, tem mais alguma coisa!?"
1001702-28 = "Hm? Se eu colocar a palavra \"Super\" antes, dá uma impressão de golpe especial e força?"
1001702-29 = "Certo, essa também está aprovada!"
1001702-30 = "Hum, hum. Entendo, isso também..."
1001702-33 = "Certo, decidi!"
1001702-34 = "O nome da nova medalha, a mais honrosa de toda a Red Winter, será \"Medalha de Honra ao Esforço Valente Super Hiper Ultra Mega\"!"
1001702-35 = "Com um nome desses, todos os alunos ficarão impressionados só de ouvir, não é? Fufufu..."
1001702-36 = "Hm? Você está perguntando se não há uma recompensa para você, camarada, que pensou nisso comigo?"
1001702-37 = "É verdade... mas como a \"Medalha de Honra ao Esforço Valente Super Hiper Ultra Mega\" se tornou a medalha mais honrosa da Academia Federal Red Winter, não posso concedê-la levianamente..."
1001702-38 = "Não tem jeito."
1001702-39 = "Para você, camarada, vou conceder a \"Medalha de Honra ao Esforço Valente Hiper Ultra Mega\", que, embora inferior à maior honraria, é a que vem logo em seguida."
1001702-40 = "Sinta-se honrado, camarada!"
1001702-42 = "Depois disso, passei um tempo divertido com Cherino, pensando no design da medalha."
