[translation]
1600206-1 = "Eu estava totalmente preparada, mas..."
1600206-2 = "（Depois disso, cheguei à área de descanso do Millennium, mas, curiosamente, quase não havia ninguém lá）"
1600206-3 = "（Apenas Kotori estava sentada sozinha no centro, esperando com os olhos brilhando de entusiasmo）"
1600206-4 = "Fufu, fufufufu... Ah!? Você chegou, Sensei! Como pode ver, eu, Kotori, estou esperando aqui desde uma hora atrás!!"
1600206-5 = "Eh? Por que não há mais ninguém aqui... você pergunta?"
1600206-6 = "Bem, até pouco tempo atrás havia algumas pessoas, mas..."
1600206-7 = "Até agora, elas me fizeram algumas perguntas e eu as respondi, mas, sem que eu percebesse... talvez todos estejam ocupados."
1600206-8 = "[s1] \"...Entendo.\"\n[s2] \"Então é isso...\""
1600206-9 = "Ah, mas deixando isso de lado..."
1600206-10 = "Ah, mas deixando isso de lado..."
1600206-11 = "Hoje, primeiro, preciso ouvir as perguntas do Sensei!"
1600206-12 = "Nossa, faz um tempo que não recebo perguntas do Sensei, estou muito feliz!"
1600206-13 = "Afinal, você é o conselheiro dos alunos, o consultor do Schale e um adulto... Sensei!"
1600206-14 = "Poder receber perguntas suas assim, formalmente!"
1600206-15 = "Ah, estou tão emocionada...! Mesmo que fosse um sonho, eu estaria aqui para este momento...!"
1600206-19 = "...Opa."
1600206-20 = "Ehem... P-perdão... Eu me empolguei um pouco demais."
1600206-21 = "Bem, você disse que tinha uma pergunta, certo?"
1600206-22 = "O Sensei sempre me ajuda, e já que você veio pedir minha ajuda, é agora que vou mostrar que posso ser útil!"
1600206-23 = "Eu estudei muitas coisas recentemente justamente para momentos como este, e agora posso até falar sobre a origem do universo!"
1600206-24 = "Sendo assim, vamos lá, Sensei! Estou pronta, pode mandar sua pergunta!"
1600206-25 = "O que você quer saber, Sensei?"
1600206-26 = "Vamos, não seja tímido! Pode perguntar!"
1600206-27 = "[s3] \"Quais são os hobbies da Kotori?\"\n[s4] \"Kotori, tem algo de que você gosta?\""
1600206-28 = "Entendo!"
1600206-29 = "Entendo!"
1600206-30 = "Ou seja,"
1600206-31 = "Você quer saber sobre mim!"
1600206-32 = "Se é assim —"
1600206-36 = "..."
1600206-37 = "...?"
1600206-38 = "...Eh?"
1600206-41 = "[wa:300]― [log=코토리]Eh...[wa:1100]Ehhh!?[/log]"
1600206-43 = "― [log=코토리]Po, [wa:500]por que tão de repente, [wa:1800]eh, [wa:600]i, [wa:700]isso é...!?[/log]"
1600206-46 = "― [log=코토리]Desculpe,[/log]"
1600206-48 = "― [log=코토리]Por precaução, [wa:700]poderia repetir [wa:800]mais uma vez...?[/log]"
1600206-51 = "[ns5] \"Eu queria saber mais sobre a Kotori.\"\n[ns6] \"Eu percebi que nunca ouvi você falar sobre si mesma.\""
1600206-52 = "[wa:200]― [log=코토리]Eh, [wa:400]ah, u... [wa:1500]i, [wa:600]foi isso...[/log]"
1600206-53 = "[wa:200]― [log=코토리]Eh, [wa:400]ah, u... [wa:1500]i, [wa:600]foi isso...[/log]"
1600206-55 = "[wa:100]― [log=코토리]Eh, [wa:500]bem, [wa:1100]como posso dizer...[/log]"
1600206-58 = "[wa:200]― [log=코토리]A, [wa:500]aliás, [wa:1200]por que de repente [wa:1100]isso...?[/log]"
1600206-60 = "― [log=코토리]Algum tipo de, [wa:1200]motivo ou...[/log]"
1600206-63 = "[wa:500]― [log=코토리]Na, [wa:300]bem, [wa:600]não precisa ter um motivo [wa:600]específico, mas![/log]"
1600206-65 = "[wa:200]― [log=코토리]Cla, [wa:300]claro que, sendo sobre mim, [wa:1700]eu sei, mas...!?[/log]"
1600206-68 = "[wa:100]― [log=코토리]Eh, [wa:300]be, [wa:600]bem, [wa:900]é, [wa:400]sobre mim, certo!?[/log]"
1600206-71 = "[wa:100]― [log=코토리]Eu, normalmente, [wa:2300]por exemplo, absorvo [wa:900]vários conhecimentos,[/log]"
1600206-73 = "[wa:100]― [log=코토리]penso no Sensei, [wa:1300]e então, bem...![/log]"
1600206-76 = "[wa:600]― [log=코토리]...? [wa:1800]Ué, [wa:1700]o que eu [wa:2400]acabei de [wa:1300]dizer...?[/log]"
1600206-78 = "― [log=코토리]Absorver vários [wa:1700]conhecimentos, [wa:2200]e sobre o Sensei, [wa:2700]eu...[/log]"
1600206-81 = "[wa:600]― [log=코토리]Ah, [wa:1300]ahaha...[/log]"
1600206-83 = "― [log=코토리]Não[wa:400] aquilo foi só... ah! [wa:1500]Ugh, [wa:1500]auuu...![/log]"
1600206-86 = "Au au au..."
1600206-87 = "[s7] \"Ei, Kotori...?\"\n[s8] \"V-você está bem...?\""
1600206-88 = "Ei, e-estou bem, mas..."
1600206-89 = "Ei, e-estou bem, mas..."
1600206-90 = "......c-,"
1600206-91 = "[s] \"C?\""
1600206-92 = "C..."
1600206-93 = "[s] \"...?\""
1600206-94 = "......o resto fica para a próxima, por favorrrrr!!"
1600206-99 = "[ns] \"...?\""
1600206-101 = "（...Depois disso, Kotori saiu do quarto em uma velocidade incrível e não voltou mais.）"
1600206-102 = "（Em vez disso, recebi uma mensagem no MomoTalk que ela costuma enviar quando pergunto algo: \"Assim que eu organizar as informações, enviarei um relatório por e-mail\".）"
1600206-103 = "（No entanto, de forma incomum, na parte de \"tempo estimado de conclusão\", estava escrito \"desconhecido\".）"
