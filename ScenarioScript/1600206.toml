[translation]
1600206-1 = "準備は万全だったのに"
1600206-2 = "（その後ミレニアムの休憩スペースに到着したのだけど、そこには珍しく、ほとんど誰もいなかった）"
1600206-3 = "（コトリだけがポツンと中央に座って、キラキラと目を輝かせながら待ってくれていた）"
1600206-4 = "ふふっ、ふふふふっ……はっ！？いらっしゃいましたか、先生！コトリ、この通り一時間前からこうしてお待ちしておりました！！"
1600206-5 = "え？どうして他に誰もいないのか……ですか？"
1600206-6 = "えっと、少し前までは何名かいらっしゃったのですが……。"
1600206-7 = "先ほどまでは幾つか質問してくださって、それに答えていたのですけれど、いつの間に……皆さん、忙しいのかもしれませんね。"
1600206-8 = "[s1] \"……そうだね。\"\n[s2] \"そういうことか……。\""
1600206-9 = "あ、それよりも……"
1600206-10 = "あ、それよりも……"
1600206-11 = "今日はまず、先生からの質問を聞かねばですね！"
1600206-12 = "いやー、先生からご質問を頂けるなんて、ちょっと久しぶりで嬉しいです！"
1600206-13 = "何せあの、生徒たちの相談役であり、シャーレの顧問であり、大人である先生に……！"
1600206-14 = "こうして、あらたまって質問をしていただけるなんて！"
1600206-15 = "ああ、私、感激です……！たとえ夢でも、この時のために私は……！"
1600206-19 = "……おっと。"
1600206-20 = "おほんっ……し、失礼しました……ちょっと浮かれ過ぎましたね。"
1600206-21 = "えっと、たしか質問があるんでしたよね？"
1600206-22 = "いつも先生には助けてもらってばかりですし、せっかく頼ってくれたのですから、こういう時こそ先生のお役に立ってみせます！"
1600206-23 = "こんなこともあろうかと最近は特に色んな勉強をしていましたし、今なら宇宙の根源についても語ることができますよ！"
1600206-24 = "というわけで、さあ先生！私は準備万端ですので、ご質問をどうぞ！"
1600206-25 = "先生は、何が知りたいのでしょうか！"
1600206-26 = "さあ、遠慮なさらず！どうぞっ！"
1600206-27 = "[s3] \"コトリの趣味って何？\"\n[s4] \"コトリって何か、好きなものとかある？\""
1600206-28 = "なるほど！"
1600206-29 = "なるほど！"
1600206-30 = "つまり、"
1600206-31 = "私のことについて聞きたいということですね！"
1600206-32 = "そういうことでしたら――"
1600206-36 = "……。"
1600206-37 = "……？"
1600206-38 = "……え？"
1600206-41 = "[wa:300]― [log=코토리]え……[wa:1100]えぇぇっ！？[/log]"
1600206-43 = "― [log=코토리]ど、[wa:500]どうしてそんな急に、[wa:1800]え、[wa:600]そ、[wa:700]それは……っ！？[/log]"
1600206-46 = "― [log=코토리]すみません、[/log]"
1600206-48 = "― [log=코토리]念のため、[wa:700]もう一度[wa:800]聞いても……？[/log]"
1600206-51 = "[ns5] \"コトリのことについて知りたいなって。\"\n[ns6] \"コトリから自分の話を聞いたこと、あんまり無かったなって。\""
1600206-52 = "[wa:200]― [log=코토리]え、[wa:400]あ、う……[wa:1500]そ、[wa:600]そうでしたか……[/log]"
1600206-53 = "[wa:200]― [log=코토리]え、[wa:400]あ、う……[wa:1500]そ、[wa:600]そうでしたか……[/log]"
1600206-55 = "[wa:100]― [log=코토리]え、[wa:500]えっと、[wa:1100]それは何と言いますか………。[/log]"
1600206-58 = "[wa:200]― [log=코토리]ち、[wa:500]ちなみに[wa:1200]なぜ急に[wa:1100]そのようなことを……？[/log]"
1600206-60 = "― [log=코토리]何かその、[wa:1200]理由ですとか……。[/log]"
1600206-63 = "[wa:500]― [log=코토리]や、[wa:300]えっと、[wa:600]特に無くても[wa:600]大丈夫なのですが！[/log]"
1600206-65 = "[wa:200]― [log=코토리]も、[wa:300]もちろん自分のことですから、[wa:1700]知ってますし……！？[/log]"
1600206-68 = "[wa:100]― [log=코토리]え、[wa:300]えっ[wa:600]と、[wa:900]わ、[wa:400]私のことですよね！？[/log]"
1600206-71 = "[wa:100]― [log=코토리]私は普段その、[wa:2300]例えば色んな知識を[wa:900]吸収したり、[/log]"
1600206-73 = "[wa:100]― [log=코토리]先生のことを考えたり、[wa:1300]それからえっと……！[/log]"
1600206-76 = "[wa:600]― [log=코토리]……？[wa:1800]あれ、[wa:1700]今私、[wa:2400]何て[wa:1300]言いました……？[/log]"
1600206-78 = "― [log=코토리]色んな知識を[wa:1700]吸収したり、[wa:2200]先生のこと、[wa:2700]を……。[/log]"
1600206-81 = "[wa:600]― [log=코토리]あ、[wa:1300]あはは……。[/log]"
1600206-83 = "― [log=코토리]いや[wa:400]今のはその……っ！[wa:1500]うぅ、[wa:1500]あぅぅ……！[/log]"
1600206-86 = "あうあうあう……。"
1600206-87 = "[s7] \"えっと、コトリ……？\"\n[s8] \"だ、大丈夫……？\""
1600206-88 = "えと、だ、大丈夫ですが……"
1600206-89 = "えと、だ、大丈夫ですが……"
1600206-90 = "……つ、"
1600206-91 = "[s] \"つ？\""
1600206-92 = "つ……"
1600206-93 = "[s] \"……？\""
1600206-94 = "……続きはまた今度でお願いしますぅぅぅぅぅ！！"
1600206-99 = "[ns] \"……？\""
1600206-101 = "（……その後、すごい勢いで部屋から出て行ったコトリは、戻ってこなかった）"
1600206-102 = "（その代わり、モモトークで「情報の整理ができたらメールで報告します」という、コトリに何かを聞いた時によく送られてくる連絡が来た）"
1600206-103 = "（ただ珍しく、補足の「予想完了時間」の部分には「不明」と書かれていた）"
