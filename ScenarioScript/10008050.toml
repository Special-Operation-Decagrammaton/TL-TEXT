[translation]
10008050-1 = "Episódio 5; A entrada do Comitê de Disciplina"
10008050-3 = "P-para onde a gente deve ir!?"
10008050-4 = "Considerando a rota de fuga que usamos até agora, provavelmente..."
10008050-9 = "Suspeitos avistados!"
10008050-10 = "Hã, suspeitos? Quer dizer, os Kaitengers!?"
10008050-11 = "Onde, onde, onde eles estão!?"
10008050-13 = "Formação A, estabeleçam o cerco!"
10008050-24 = "Isso é, por acaso..."
10008050-25 = "Ei, espere aí!"
10008050-26 = "Suspeitos, será que são...!?"
10008050-31 = "Finalmente peguei vocês, seus encrenqueiros! Não vou deixar que escapem de novo—"
10008050-32 = "[s] \"Ah, é a Iori.\""
10008050-33 = "Quer dizer, Sensei...? Bem, feliz ano novo..."
10008050-34 = "Por que o Sensei está aqui? E ainda por cima com esses encrenqueiros..."
10008050-35 = "Q-quem você chamou de encrenqueiros!?"
10008050-36 = "Quem mais seria além de vocês, pessoal da Problem Solvers!"
10008050-37 = "[s] \"Feliz ano novo. Iori, por que você está aqui?\""
10008050-38 = "Bem, eu estou aqui, é claro..."
10008050-39 = "Estar com tanta gente assim no meio da madrugada..."
10008050-40 = "Ah."
10008050-41 = "Será que o Comitê de Disciplina estava todo à toa e decidiu se reunir para passar o tempo?"
10008050-42 = "Claro que não!"
10008050-43 = "Estamos trabalhando logo no início do ano!"
10008050-44 = "[s] \"É por causa do trabalho do Comitê de Disciplina?\""
10008050-45 = "Sim. Por causa daquela transmissão ao vivo do \"Daikichi-dono\" de agora pouco, a área está um caos..."
10008050-46 = "Um monte de gente apareceu querendo roubar a caixa de ofertas, e está tudo uma bagunça por toda parte."
10008050-47 = "Começando por esses aqui, os encrenqueiros da nossa escola estão todos causando problemas, e a Ako-chan disse para eu não voltar até resolver a situação..."
10008050-48 = "O que é isso, logo no início do ano!"
10008050-49 = "...E tudo isso é culpa de vocês!"
10008050-50 = "Não é não!"
10008050-51 = "Nós não somos a causa de tudo, e na verdade, nós também somos vítimas...!"
10008050-52 = "É isso mesmo! Não temos tempo para isso agora!"
10008050-53 = "...Vítimas?"
10008050-54 = "Vocês também estão atrás da caixa de ofertas, que audácia..."
10008050-55 = "I-isso é, bem, temos nossos motivos...!"
10008050-56 = "Então vocês estão atrás dela mesmo! Seus encrenqueiros!"
10008050-58 = "Pelo bem da disciplina, vou derrotar vocês aqui e agora! E também pelo bem das minhas férias de ano novo!"
10008050-60 = "Eu já disse que temos motivos, ah, droga!"
10008050-61 = "[s] \"Pessoal, vamos nos acalmar um pouco...\""
10008050-63 = "Ahaha! Tudo bem, tudo bem, vamos nessa!"
10008050-64 = "Preparação para o combate concluída."
10008050-65 = "Ah, Aru-sama! Deixe comigo!"
10008050-70 = "Eu disse para esperar aí!"
