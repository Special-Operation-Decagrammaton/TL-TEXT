[translation]
10008050-1 = "第5話;風紀委員会参戦"
10008050-3 = "ど、どっちに行けば良いの！？"
10008050-4 = "今までの逃走ルートを考えると、多分――"
10008050-9 = "不審者を発見しました！"
10008050-10 = "えっ、不審者？って、つまりカイテンジャー！？"
10008050-11 = "どこどこ、どこにいるの！？"
10008050-13 = "フォーメーションA、包囲網を構築せよ！"
10008050-24 = "これって、もしかして……。"
10008050-25 = "ちょっ、待ちなさい！"
10008050-26 = "不審者ってまさか……！？"
10008050-31 = "ようやく捉えたぞ、この問題児どもめ！もうこれ以上は逃がさな――"
10008050-32 = "[s] \"あ、イオリだ。\""
10008050-33 = "って、先生……？えっと、あけましておめでとう……。"
10008050-34 = "先生がどうしてここに？それに、そこの問題児どもと一緒で……。"
10008050-35 = "だ、誰が問題児よ！？"
10008050-36 = "お前たち以外に誰がいるんだ、便利屋！"
10008050-37 = "[s] \"あけましておめでとう。イオリの方こそ、どうしてここに？\""
10008050-38 = "そりゃ、私はもちろん……"
10008050-39 = "こんな深夜に大勢でいるってことは、"
10008050-40 = "あはっ。"
10008050-41 = "もしかして風紀委員みんな暇してたから、仲良く集まってるとか？"
10008050-42 = "そんな訳あるかっ！"
10008050-43 = "新年早々こっちは働いてるんだ！"
10008050-44 = "[s] \"やっぱり風紀委員会の仕事で？\""
10008050-45 = "うん。さっきの「大吉殿」の生放送の件で、今この辺りがすごいことになってて……。"
10008050-46 = "賽銭箱狙いのやつが大量発生して、もうあちこちめちゃくちゃだよ。"
10008050-47 = "こいつらを始めとして、うちの学園の問題児共がどいつもこいつも暴れてるし、アコちゃんは事態を収拾するまで帰ってくるなって言うし……。"
10008050-48 = "何なんだもう、新年早々！"
10008050-49 = "……それもこれも、全部お前たちのせいだ！"
10008050-50 = "違うわよ！？"
10008050-51 = "元凶は私たちじゃないし、そもそも私たちだって被害者みたいなもので……！"
10008050-52 = "そうよ！今はこんなことしてる場合じゃないの！"
10008050-53 = "……被害者？"
10008050-54 = "お前たちも賽銭箱を狙ってるくせに、何を図々しいことを……。"
10008050-55 = "そっ、それはその、事情があって……！"
10008050-56 = "やっぱり狙ってるんじゃないか！この問題児め！"
10008050-58 = "風紀のために、この場でお前たちを撃退する！あと私の正月休みのために！"
10008050-60 = "だから事情が、ってああもうっ！"
10008050-61 = "[s] \"その、みんな一旦落ち着いて……\""
10008050-63 = "あははっ！良いよ良いよ、やろっか！"
10008050-64 = "戦闘準備OK。"
10008050-65 = "あ、アル様！私にお任せください！"
10008050-70 = "だから待ちなさいよぉっ！"
