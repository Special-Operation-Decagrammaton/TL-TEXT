[translation]
1002803-1 = "Ecologia dos coelhos"
1002803-2 = "（Com várias tarefas acumuladas, cheguei ao meu limite...）"
1002803-3 = "（Decidi visitar a margem do rio ali perto para relaxar um pouco.）"
1002803-6 = "Ué? Mestre?"
1002803-7 = "[s1] \"...Ué?\"\n[s2] \"Essa voz é...\""
1002803-13 = "Opa, Mestre! Que coincidência encontrar você por aqui!"
1002803-14 = "Quer observar a ecologia dos coelhos comigo, Asuna?"
1002803-15 = "[s] \"Asuna, por que você está vestida assim...?\""
1002803-16 = "Hmm?"
1002803-17 = "Vestida assim...? Bem, é claro que eu tinha que usar isso, né?"
1002803-18 = "Porque hoje eu vim aqui para verificar a ecologia dos coelhos!"
1002803-19 = "Para entender os coelhos, pensei que primeiro deveria me tornar um! Não é uma ótima ideia?"
1002803-20 = "Olha, tem muita grama aqui! É o lugar perfeito para um coelho!"
1002803-21 = "...Hmm?"
1002803-22 = "Estão me encarando muito...? Ah, é verdade. E daí?"
1002803-23 = "Se você visse um coelho lá fora, você também olharia, não olharia? É normal!"
1002803-24 = "Não é isso que você quis dizer...?"
1002803-25 = "Sério?"
1002803-29 = "Hmm..."
1002803-30 = "Ah, será que..."
1002803-31 = "O Mestre também quer ser um coelho?"
1002803-32 = "[s3] \"???\"\n[s4] \"Desculpe, acho que não estou conseguindo acompanhar o seu raciocínio, Asuna.\""
1002803-33 = "Se for isso, eu posso procurar uma roupa igual para o seu tamanho, Mestre!"
1002803-34 = "Se for isso, eu posso procurar uma roupa igual para o seu tamanho, Mestre!"
1002803-35 = "...Ué, não quer? É mesmo?"
1002803-36 = "Que desperdício..."
1002803-37 = "Por que está tão apressado? Mestre estranho, tenho certeza que combinaria com você!"
1002803-38 = "Mas então, o que o Mestre vai fazer?"
1002803-39 = "...Ah."
1002803-40 = "O Mestre é o Mestre, então hoje, em vez de ser o Mestre da empregada, você pode ser o Mestre do coelho!"
1002803-41 = "Isso, acho que é uma boa!"
1002803-42 = "Sendo assim..."
1002803-48 = "Mestre, aqui! Faça carinho na coelha Asuna!"
1002803-49 = "[s5] \"Em público, isso é um pouco...\"\n[s6] \"Desculpe, seu pensamento é tão rápido que não estou conseguindo acompanhar...\""
1002803-50 = "Não tem problema, anda logo!"
1002803-51 = "Não tem problema, anda logo!"
1002803-52 = "Vamos, faça carinho, faça carinho!"
1002803-56 = "Poxa, por que não faz carinho em mim? Você está olhando para o outro lado, tinha algo interessante ali?"
1002803-57 = "Não pode deixar um coelho se sentir sozinho! Se eles ficarem sozinhos, eles ficam fraquinhos!"
1002803-58 = "Então o Mestre precisa me mimar para que eu não me sinta sozinha!"
1002803-62 = "Hmph..."
1002803-63 = "...Já que é assim, não tem jeito! Se o Mestre não vai fazer carinho..."
1002803-64 = "Eu mesma vou me esfregar em você!"
1002803-69 = "Ah, o Mestre fugiu em uma velocidade que eu nunca vi antes!?"
1002803-70 = "Espera, espera! Mestre~!!"
1002803-75 = "Não vou deixar você escapar~~!!"
