[translation]
80000038-1 = "ロシアンルーレット・チョコレート！"
80000038-2 = "（ムツキに呼ばれて、久しぶりに便利屋68のオフィスを訪れた）"
80000038-8 = "がおーーーーっ！"
80000038-14 = "[ns] \"ムツキ！？\""
80000038-16 = "きゃはははっ！びっくりした、先生？"
80000038-17 = "私の前で隙を見せたらダメなんだよ～？"
80000038-18 = "そんなことしたら、ムツキちゃんに食べられちゃうんだから！"
80000038-19 = "くふふっ、これからは～ちゃんと気を付けないとだよ？"
80000038-20 = "[s1] \"そうだね……。\"\n[s2] \"ところで、今日は……？\""
80000038-21 = "うん、先生を今日呼んだのは～"
80000038-22 = "うん、先生を今日呼んだのは～"
80000038-23 = "じゃーん！ゲームをしようと思って！"
80000038-29 = "[ns3] \"これ、シリンダーの形……？\"\n[ns4] \"ロシアンルーレット……の、チョコ？\""
80000038-30 = "うんっ、この間色々検索してたら、面白そうだなって思って！！"
80000038-31 = "うんっ、この間色々検索してたら、面白そうだなって思って！！"
80000038-32 = "まさにロシアンルーレットチョコ！"
80000038-33 = "ちょうど今日はバレンタインデーだし？せっかくだから先生とこれで遊びたいなーって！"
80000038-34 = "すっごく楽しみにしてたの！"
80000038-35 = "一緒に遊んでくれるよね、ね？"
80000038-36 = "[s5] \"それはもちろん遊びたい気持ちもあるのだけど……。\"\n[s6] \"ロシアンルーレット、ちょっと怖いね……。\""
80000038-37 = "あはっ、そこまで怖がらなくても大丈夫だよ～。"
80000038-38 = "あはっ、そこまで怖がらなくても大丈夫だよ～。"
80000038-43 = "ルールは簡単。ここにある6個のチョコレートの中にはものすごく辛いチョコがあるの。"
80000038-44 = "[s] \"えーっと、6個中2個が当たりって箱に書いてあるね。\""
80000038-45 = "うん。それで先生と私がチョコを半分こして、"
80000038-46 = "辛いのを食べたら負け！"
80000038-47 = "どう？面白そうでしょ？"
80000038-48 = "[s] \"バレンタインデーなのに、なぜこんな怖い思いを……。\""
80000038-49 = "先生は大人なんだから、逃げたりしないよね？"
80000038-50 = "[s] \"そ、それは……。\""
80000038-51 = "もちろんこれまでのムツキちゃんの勝率を考えたら、先生が怖がるのも無理はないけどー。"
80000038-52 = "んー、まあ遊んでくれないなら仕方ないな～。"
80000038-53 = "それじゃあ今日だけは勘弁してあげる。運が良かったね、先生？"
80000038-54 = "[s] \"に、逃げるとはまだ言ってない……！\""
80000038-55 = "くふふっ！やっぱり先生はそうじゃないと！"
80000038-60 = "はいっ、じゃあ先生が先に3つ選んで良いよ。"
80000038-61 = "私が持ってきたんだし、私じゃなくて先生が先に選ぶ方がフェアでしょ？"
80000038-62 = "[s] \"なるほど、確かに。じゃあ……。\""
80000038-64 = "（チョコレートを3つ選んだ）"
80000038-66 = "くふふっ、じゃあ一気に3ついっちゃう？"
80000038-67 = "さーて、どっちが勝つかな～？"
80000038-69 = "さん、にー、"
80000038-70 = "いちっ！"
80000038-75 = "[ns] \"………っ！？！？\""
80000038-79 = "[ns7] \"げほっ、げほっ……！！\"\n[ns8] \"これ、3つ全部辛いんだけど！？\""
80000038-80 = "ぷっ……くふふっ……。"
80000038-81 = "ぷっ……くふふっ……。"
80000038-82 = "あはははっ！！私の勝ちーー！くふふっ♪"
80000038-83 = "それはそうだよね、だって～。"
80000038-84 = "予め3箱分買って、全部開けてから「辛いやつだけ」を6つ入れておいたんだもん！"
80000038-85 = "だから実際のところこのゲームは、最初にチョコを食べちゃった人が負けなの！あははっ！"
80000038-86 = "[s] \"騙された……っ！\""
80000038-87 = "え～？でも私は「ここにある6個のチョコレート」としか言ってないよ？"
80000038-88 = "この中に2個しか辛いのが無いとは言ってないし。"
80000038-89 = "先生が「箱にそう書いてあるね」って言ったから、「うん」って言っただけだもん。"
80000038-90 = "[s] \"た、確かに……！？\""
80000038-91 = "あははっ、また私の勝ちだね！"
80000038-92 = "うーん、ここまで来ると自分の才能が怖い……くふふっ！"
80000038-93 = "[s] \"……。\""
80000038-94 = "あれ、先生どうかした？"
80000038-95 = "えっと、もしかしてすごく辛かった？多分、そんなに辛くないはず……"
80000038-96 = "[s] \"まだ、まだゲームは終わってない！\""
80000038-97 = "……先生？あの、目が結構マジなんだけど……？"
80000038-98 = "[s9] \"はい、ムツキの分のチョコ。\"\n[s10] \"どっちかが辛いのを引いたら終りってルールは無いはず……？\""
80000038-99 = "え、ま、まあその、それは……。"
80000038-100 = "え、ま、まあその、それは……。"
80000038-105 = "きゃ～！先生に食べられちゃうーーっ！"
80000038-106 = "先生に無理やり～！！"
80000038-107 = "[s] \"ムツキ！？ストップ、それは誤解される！？\""
80000038-108 = "くふふっ、隙ありっ！"
80000038-112 = "やっぱり慌ててる先生の顔、好きだな～！"
80000038-113 = "うん、今日も楽しかった！じゃあねー、くふふっ！"
80000038-114 = "あ、余った二箱分のチョコレートもここに置いておくね。私からのプレゼント！"
80000038-115 = "また遊ぼうね、先生！"
80000038-119 = "[ns] \"完全に負けた……。\""
80000038-121 = "（ムツキが置いていったチョコは、意外と辛い方もすごく美味しかった）"
