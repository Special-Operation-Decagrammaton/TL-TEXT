[translation]
80000038-1 = "Chocolate de Roleta Russa!"
80000038-2 = "（Chamado pela Mutsuki, visito o escritório da Problem Solver 68 depois de muito tempo）"
80000038-8 = "Raaaaawr!"
80000038-14 = "[ns] \"Mutsuki!?\""
80000038-16 = "Kya-ha-ha! Te assustei, Sensei?"
80000038-17 = "Você não pode baixar a guarda na minha frente, sabia?"
80000038-18 = "Se fizer isso, a Mutsuki vai acabar te devorando!"
80000038-19 = "Kufu-fu, de agora em diante... você precisa tomar mais cuidado, tá?"
80000038-20 = "[s1] \"É verdade...\"\n[s2] \"Mas, afinal, por que hoje...?\""
80000038-21 = "Hum, eu chamei o Sensei hoje porque..."
80000038-22 = "Hum, eu chamei o Sensei hoje porque..."
80000038-23 = "Tcharam! Eu queria jogar um jogo!"
80000038-29 = "[ns3] \"Isso tem formato de tambor de revólver...?\"\n[ns4] \"Chocolate de... roleta russa?\""
80000038-30 = "Isso! Eu andei pesquisando umas coisas esses dias e achei que seria divertido!!"
80000038-31 = "Isso! Eu andei pesquisando umas coisas esses dias e achei que seria divertido!!"
80000038-32 = "É literalmente um chocolate de roleta russa!"
80000038-33 = "Como hoje é Dia dos Namorados, pensei que seria uma ótima oportunidade para brincar com você, Sensei!"
80000038-34 = "Eu estava super ansiosa por isso!"
80000038-35 = "Você vai brincar comigo, né? Vai?"
80000038-36 = "[s5] \"Eu até gostaria de brincar, mas...\"\n[s6] \"Roleta russa parece um pouco perigoso...\""
80000038-37 = "Ahaha, não precisa ficar com tanto medo assim."
80000038-38 = "Ahaha, não precisa ficar com tanto medo assim."
80000038-43 = "As regras são simples. Entre estes 6 chocolates, alguns são extremamente apimentados."
80000038-44 = "[s] \"Hmm, está escrito na caixa que 2 dos 6 são os 'premiados'.\""
80000038-45 = "Isso. Então, o Sensei e eu vamos dividir os chocolates,"
80000038-46 = "e quem comer o apimentado perde!"
80000038-47 = "E aí? Parece divertido, não parece?"
80000038-48 = "[s] \"É Dia dos Namorados, por que tenho que passar por esse sufoco...?\""
80000038-49 = "O Sensei é um adulto, não vai fugir, né?"
80000038-50 = "[s] \"I-isso é...\""
80000038-51 = "Claro, considerando meu histórico de vitórias, não culpo o Sensei por estar com medo."
80000038-52 = "Hum, bem, se não quiser brincar, não tem problema."
80000038-53 = "Vou deixar passar só por hoje. Você teve sorte, Sensei!"
80000038-54 = "[s] \"E-eu não disse que ia fugir...!\""
80000038-55 = "Kufu-fu! É assim que se fala, Sensei!"
80000038-60 = "Certo, então o Sensei pode escolher os 3 primeiros."
80000038-61 = "Já que fui eu quem trouxe, é mais justo que você escolha primeiro, não acha?"
80000038-62 = "[s] \"Faz sentido. Então...\""
80000038-64 = "（Escolhi 3 chocolates）"
80000038-66 = "Kufu-fu, vai comer os três de uma vez?"
80000038-67 = "Vamos ver, quem será que vai ganhar?"
80000038-69 = "Três, dois,"
80000038-70 = "um!"
80000038-75 = "[ns] \".........!?\""
80000038-79 = "[ns7] \"Cof, cof...!!\"\n[ns8] \"Por que os três estão apimentados!?\""
80000038-80 = "Pfft... kufu-fu..."
80000038-81 = "Pfft... kufu-fu..."
80000038-82 = "Ahahaha!! Eu ganhei! Kufu-fu♪"
80000038-83 = "Bom, é claro que ganhei, porque..."
80000038-84 = "Eu comprei três caixas, abri todas e coloquei só os 'apimentados' nos seis lugares!"
80000038-85 = "Então, na verdade, esse jogo funciona assim: quem comer o chocolate primeiro, perde! Ahahaha!"
80000038-86 = "[s] \"Fui enganado...!\""
80000038-87 = "Hã? Mas eu só disse que eram \"os 6 chocolates que estão aqui\", não disse?"
80000038-88 = "Eu não disse que só tinha dois apimentados aqui no meio."
80000038-89 = "Você que disse \"está escrito na caixa\", e eu só respondi \"sim\"."
80000038-90 = "[s] \"É, pensando bem...!?\""
80000038-91 = "Ahahaha, ganhei de novo!"
80000038-92 = "Hum, chegando a esse ponto, até eu fico com medo do meu próprio talento... Kufufu!"
80000038-93 = "[s] \"......\""
80000038-94 = "Ué, Sensei, o que foi?"
80000038-95 = "Ah, será que estava muito apimentado? Provavelmente não deveria estar tão forte assim..."
80000038-96 = "[s] \"Ainda não, o jogo ainda não acabou!\""
80000038-97 = "...Sensei? Ei, seu olhar está bem sério, sabia...?"
80000038-98 = "[s9] \"Aqui, o chocolate da Mutsuki.\"\n[s10] \"Não existe nenhuma regra dizendo que o jogo acaba se um de nós pegar o apimentado, certo...?\""
80000038-99 = "Ei, b-bem, isso é..."
80000038-100 = "Ei, b-bem, isso é..."
80000038-105 = "Kyaa! O Sensei vai me fazer comerーー!"
80000038-106 = "O Sensei está me forçandoーー!!"
80000038-107 = "[s] \"Mutsuki!? Para, isso vai ser mal interpretado!\""
80000038-108 = "Kufufu, abriu a guarda!"
80000038-112 = "Eu realmente adoro ver a cara do Sensei quando ele entra em pânico!"
80000038-113 = "Sim, hoje foi divertido também! Até mais, kufufu!"
80000038-114 = "Ah, vou deixar as outras duas caixas de chocolate aqui também. É um presente meu!"
80000038-115 = "Vamos brincar de novo, Sensei!"
80000038-119 = "[ns] \"Perdi completamente...\""
80000038-121 = "(O chocolate que a Mutsuki deixou, surpreendentemente, até o apimentado era muito gostoso.)"
