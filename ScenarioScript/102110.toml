[translation]
102110-1 = "Episódio 11;Defesa do Distrito de Gehenna"
102110-2 = "Agora é a nossa vez.#nPessoal, estão preparados?"
102110-11 = "Sim. Podemos partir a qualquer momento."
102110-12 = "Aliás, Aко-chan, onde está a presidente?"
102110-13 = "A presidente Hina está participando da operação de captura dos Sanctums como representante do Comitê Disciplinar."
102110-14 = "Representante do Comitê Disciplinar…?#nMas por quê? Todo mundo tá aqui, não tá?"
102110-15 = "É exatamente por ficarem dependendo da presidente pra tudo que chamam o Comitê Disciplinar de um bando improvisado! Dizem até que sem ela nós não somos ameaça nenhuma!"
102110-17 = "E-eh? Bom… eu só queria saber onde a presidente estava…"
102110-18 = "É por causa desse tipo de dependência que a presidente vive cansada!#nDessa vez vamos provar que não somos só um grupo montado às pressas. Entendeu, Iori!?"
102110-19 = "A-aham…"
102110-20 = "(…Embora essa imagem provavelmente exista mais pela força absurda da presidente do que pela nossa fraqueza.)"
102110-21 = "Aff… aliás, numa situação dessas, o que será que a presidente Makoto do Pandemonium Society está fazendo…?"
102110-29 = "Ufufu… pessoal do Comitê Disciplinar, obrigada pelo esforço de terem vindo até aqui."
102110-30 = "V-você é… a conselheira Satsuki do Pandemonium Society?"
102110-31 = "Você…"
102110-32 = "Calma, calma, se controlem."
102110-33 = "Se forem começar briga numa hora dessas, quem vai sofrer são vocês mesmas, não?"
102110-35 = "……Tch."
102110-36 = "O que exatamente o Pandemonium Society esteve fazendo até agora?#nE onde está a presidente Makoto?"
102110-37 = "A Makoto-chan tá cuidando de um assunto suuuper importante.#nMas relaxa, não precisa se preocupar."
102110-38 = "…Vocês estão tramando alguma coisa de novo?#nQue tipo de esquema é dessa vez—!?"
102110-39 = "Ai, dá um tempo vai. O que vocês pensam que somos?#nSabe qual é a coisa mais importante pro Pandemonium Society?"
102110-40 = "Vagabundagem…?"
102110-41 = "Aff… os \"eleitores\".#nNós passamos todo esse tempo ajudando os alunos de Gehenna, sabia?"
102110-42 = "Que absurdo é esse—"
102110-44 = "Administradora, isso é verdade."
102110-45 = "Chefe Sena…?"
102110-47 = "A conselheira Satsuki e o pessoal do Pandemonium Society ajudaram a guiar os civis até os abrigos.#nGraças a isso, o processo de evacuação ficou mais rápido."
102110-48 = "Embora os métodos deles fossem… um tanto peculiares."
102110-50 = "Kirara-chan, você viu aquilo mais cedo?"
102110-51 = "O negócio da moeda pendurada no barbante, né?#nFoi a primeira vez que vi algo assim~! Era hipnose, não era?"
102110-52 = "Isso isso! E não funcionou absolutamente nada. Foi hilário."
102110-53 = "Ahaha! Parecia divertido, então eu fui junto~"
102110-55 = "…Hipnose? Que tipo de ocultismo é esse agora…"
102110-56 = "Meu Plano NK Ultra não é ocultismo, é ciência!#nAff, leigos realmente são complicados."
102110-57 = "Bom, imagino que vocês não consigam entender ainda, ahah…!#nMas quando isso estiver completo――"
102110-58 = "Chega de conversa fiada."
102110-62 = "Então… o Pandemonium Society veio até aqui――#nIsso significa que vão cooperar conosco?"
102110-63 = "Ahah! Claro que não. Só passamos aqui pra dar uma forcinha moral."
102110-72 = "Você está ficando cada vez mais forte~#nE cada vez mais disposta a jurar lealdade ao Pandemonium Society~"
102110-76 = "Vai…!"
102110-85 = "…Hmph. Parece que não funcionou."
102110-86 = "Aff…"
102110-90 = "Vamos iniciar a defesa do distrito de Gehenna."