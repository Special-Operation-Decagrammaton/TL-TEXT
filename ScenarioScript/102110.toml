[translation]
102110-1 = "Episódio 11; Defesa da região autônoma “Gehenna”"
102110-2 = "É a nossa vez. #nVocês estão prontos?"
102110-11 = "sim. Você pode ir a qualquer hora."
102110-12 = "A propósito, Ako-chan, onde está o presidente?"
102110-13 = "A Presidente Hina está participando da Conquista do Santuário como representante do Comitê Disciplinar."
102110-14 = "Representante do comitê de moral pública...? #nPor quê? Estão todos aqui?"
102110-15 = "Porque confiamos tanto no presidente, as pessoas dizem que o comitê disciplinar é apenas um bando de gente e que sem o presidente não somos o inimigo!"
102110-17 = "Hein, hein? Hum... eu só queria saber onde estava o presidente..."
102110-18 = "É assim que eu mimo você! O presidente está me incomodando! #nDesta vez, vamos provar que não somos apenas um bando de gente. Entendido, Iori!"
102110-19 = "Uh, hum..."
102110-20 = "(...Tenho certeza de que essa imagem não é criada pela nossa fraqueza, mas pela força do presidente do comitê.)"
102110-21 = "Suspiro...A propósito, o que diabos o Presidente Makoto do Banma-dono está fazendo nesta situação...?"

102110-29 = "Hehehe... A todos do Comitê Disciplinar, obrigado por todo seu trabalho duro."
102110-30 = "Oh, você é... Conselheiro Satsuki do Tenma-den?"
102110-31 = "você……"
102110-32 = "Tudo bem, você pode se acalmar, por favor?"
102110-33 = "Lutar em um momento como esse só vai te trazer problemas, certo?"
102110-35 = "......"
102110-36 = "O que Tenmaden tem feito até agora? #nE onde está o presidente Makoto?"
102110-37 = "Makoto-chan tem algo importante para fazer. #nBem, por favor, não se preocupe com isso."
102110-38 = "...Vocês estão planejando algo de novo? #nQue tipo de plano você terá desta vez――!"
102110-39 = "Por favor, realmente me dê um tempo. o que você acha que somos? #nVocê sabe o que é mais importante para o Tenmaden?"
102110-40 = "Comida ociosaEntão...?"
102110-41 = "Suspiro... \"eleitor\". #nTemos trabalhado muito pelos alunos da Gehenna até agora, não é?"

102110-42 = "De que bobagem você está falando?"
102110-44 = "Oficial administrativo, isso é um fato."
102110-45 = "Chefe Sena...?"
102110-47 = "O conselheiro Satsuki e membros de Manma-dono guiaram os cidadãos ao centro de evacuação. #nGraças a isso, o tempo necessário para orientação de evacuação foi reduzido."
102110-48 = "O método era um pouco estranho, mas..."
102110-50 = "Kirara-chan, você viu isso antes?"
102110-51 = "Aquele com a moeda pendurada no barbante, certo? #nEssa foi realmente a primeira vez que vi! Chama-se hipnose, certo?"
102110-52 = "oh sim! Isso não fazia nenhum sentido. Muito engraçado."
102110-53 = "Ahaha! Parecia interessante, então eu te segui."
102110-55 = "...Hipnose? Que tipo de oculto é desta vez..."
102110-56 = "Meu plano NK Ultra é ciência, não ocultismo! #nHa, é por isso que os amadores estão em apuros."
102110-57 = "Bem, eu não acho que vocês possam entender isso agora, mas...! #nMas quando isso for concluído――"
102110-58 = "Muita conversa fiada."
102110-62 = "Então...o Tenma-dono veio aqui...#nIsso significa que ele está cooperando conosco?"
102110-63 = "Ah! Isso não pode ser verdade. Eu estava passando e vim torcer."
102110-72 = "Você sente que está ficando cada vez mais forte e quer jurar lealdade aos Dez Mil Demônios."
102110-76 = "Olhar...!"
102110-85 = "...Hmph, não parece ter nenhum efeito."
102110-86 = "Suspirar..."
102110-90 = "Comece a defesa da Região Autônoma da Gehenna."
