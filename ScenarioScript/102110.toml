[translation]
102110-1 = "第11話;「ゲヘナ」自治区防衛"
102110-2 = "私たちの番ですね。#n皆さん、準備はできましたか？"
102110-11 = "はい。いつでも行けます。"
102110-12 = "ところでアコちゃん、委員長はどこに？"
102110-13 = "ヒナ委員長は、風紀委員会の代表としてサンクトゥム攻略戦に参加中です。"
102110-14 = "風紀委員会の代表……？#nなんで？みんなはここにいるのに？"
102110-15 = "そうやって委員長にばかり頼るから、風紀委員が寄せ集め集団だの、委員長がいなければ敵じゃないだの言われるんですよ！"
102110-17 = "え、えっ？その……私は委員長がどこにいるか知りたかっただけで……"
102110-18 = "そうやって甘えるから！委員長が面倒くさがるんです！#n今度こそ、寄せ集めの集団ではないということを証明しますよ。分かりましたね、イオリ！"
102110-19 = "う、うーん……"
102110-20 = "（……そのイメージはきっと、私たちが弱いのではなく、委員長の強さによって作られているのでしょうけど）"
102110-21 = "はぁ……ところで、こんな状[ruby=パンデモニウム・ソサエティー]況なのに万魔殿のマコト[/ruby]議長は一体何をしているのでしょうか……？"
102110-29 = "うふふ……風紀委員会の皆さん、わざわざご苦労さま。"
102110-30 = "あ、あなたは……万魔殿のサツキ議員？"
102110-31 = "お前……"
102110-32 = "まあまあ、落ち着いて頂戴？"
102110-33 = "こんな時に争ったって、あなた達が困るだけでしょう？"
102110-35 = "……っ。"
102110-36 = "万魔殿は今まで何をされていたのでしょうか。#nそして、マコト議長はどちらに？"
102110-37 = "マコトちゃんは、ちょ～っと大事な用事があってね。#nま、気にしないで頂戴。"
102110-38 = "……あなた達、また何か企んでいるんですか？#n今度はどんな画策を――！"
102110-39 = "ホント勘弁してよねぇ。私たちを何だと思ってるの？#n万魔殿にとって一番大切なものが何か、分かる？"
102110-40 = "[ruby=むいとしょく]無為徒食[/ruby]では……？"
102110-41 = "はぁ……「[ruby=・   ・   ・]有権者[/ruby]」よ。#n私たちは今の今まで、ゲヘナ生のために頑張っていたのよ？"
102110-42 = "なにを戯言を――"
102110-44 = "行政官、これは事実です。"
102110-45 = "セナ部長……？"
102110-47 = "サツキ議員と万魔殿の方々が、市民を避難所に誘導してくれました。#nおかげで避難誘導の時間短縮に繋がっています。"
102110-48 = "やり方はやや珍妙ではありましたが――"
102110-50 = "キララちゃん、さっきの見た？"
102110-51 = "糸にコインをぶら下げてたやつだよね？#nあれマジで初めて見た～！催眠術ってやつでしょ？"
102110-52 = "そうそう！アレ全然意味なかったよね。超ウケる。"
102110-53 = "あははっ！面白そうだったからついてきちゃったけどね～"
102110-55 = "……催眠？今度は何のオカルトですか……"
102110-56 = "私のNKウルトラ計画は、オカルトではなく科学よ！#nはぁ、これだから素人は困るのよ。"
102110-57 = "ま、今のあなた達には理解できないでしょうけどね、アハッ……！#nでもこれが完成した暁には――"
102110-58 = "雑談は結構。"
102110-62 = "それで……万魔殿がこちらに来たのは――#n私たちに協力してくださるということでしょうか？"
102110-63 = "アハッ！そんなわけないでしょ。通りすがりに応援しに来ただけよ。"
102110-72 = "あなたは段々強くなった気分になぁ～る#n万魔殿に忠誠を誓いたくなぁ～る。"
102110-76 = "ほら……っ！"
102110-85 = "……フンッ、効果は無いようね。"
102110-86 = "はぁ……"
102110-90 = "ゲヘナ自治区の防衛戦を始めます。"
