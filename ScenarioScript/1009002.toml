[translation]
1009002-1 = "Os festivais são maravilhosos! Muito, muito!"

1009002-3 = "Ah, Senseia! Aqui está!"

1009002-7 = "Ehehe. Bem-vindo ao local do festival!"

1009002-8 = "Siga-me, por favor! Nós iremos orientar você!"

1009002-9 = "[ns] \"Como esperado...o festival de Hyakki Yagyo é animado.\""

1009002-10 = "Não, não! Este é apenas o começo!"

1009002-11 = "Comparado com festivais de grande escala como ``'', ``Wuzu Eigamura Attraction Festival'' e ``''..."

1009002-16 = "Se você comparar...qualquer festival vai parecer pequeno...certo? #n, mas...! Há tantas coisas boas neste festival...!"

1009002-17 = "sim! Isso mesmo...! Em primeiro lugar...#nMinha atitude de tentar diferenciar festivais como esse estava errada!"

1009002-18 = "Cada festival tem seu próprio valor único. #nPorque as pessoas que vieram curtir o festival estão cheias de paixão!"

1009002-22 = "Ehehe. Como esperado, o Sensei é incrível! #nSe eu estivesse prestes a cometer um erro, você me avisaria imediatamente...!"

1009002-25 = "[ns] \"Eu não disse nada ainda...?\""

1009002-27 = "Vamos, vamos! Siga-me, por favor! Este é o festival! #nComo vocês podem ver, estão consagrando um mikoshi carregando uma boneca!"

1009002-28 = "Aparentemente eles usaram muitas bonecas de princesa no passado..."

1009002-29 = "Hoje em dia a festa não está mais vinculada aos costumes do passado, e o mikoshi é enfeitado com todos os tipos de bonecos, fazendo parecer que está desfilando pela cidade!"

1009002-33 = "É só... talvez seja por isso...? Ultimamente, os chamados subornos têm sido dados a #n empresas e organizadores para que seus bonecos sejam colocados no mikoshi..."

1009002-34 = "Durante os preparativos, surgiram várias questões complicadas em relação ao contrato do mikoshi..."

1009002-35 = "[s] \"Há muitas coisas acontecendo nos bastidores.\""

1009002-36 = "sim……. Mas, mas! Algumas coisas nunca mudam! #nDurante muito tempo, o centro do mikoshi era o local onde era colocada uma lanterna em forma de princesa."

1009002-40 = "E... por favor, venha aqui! As comidas representativas deste festival são maçãs doces em forma de lótus e gelo picado coberto com calda de morango e cereja!"

1009002-44 = "um! Por favor, dê uma olhada! O desfile mikoshi começou! #nTodo mundo está dançando alegremente ao som da música!"

1009002-48 = "A propósito, Sensei, você tem ingresso? Você pode trocar até 4 itens de #nanything na barraca usando o cupom incluso no ingresso! As máscaras, os ventiladores e até a comida!"

1009002-62 = "Ufa...estou muito cansado... #nSensei...Você gostou?"

1009002-63 = "[s] \"Umika parece estar se divertindo, então eu também estou me divertindo.\""

1009002-64 = "Eu sou...?"

1009002-65 = "Ehehe... é meio constrangedor quando a Senseia fala isso..."

1009002-68 = "...Mas está certo."

1009002-69 = "Eu adoro festivais."

1009002-70 = "O festival é para todos aqui, certo?"

1009002-71 = "Enquanto participam do festival... todos se esquecem de suas vidas cotidianas... #nVocê pode desfrutar de um mundo de sonho..."

1009002-72 = "Preparar-se para isso dá muito trabalho, mas quando penso em criar um mundo de sonho que todos possam desfrutar, fico sempre tão entusiasmado que não consigo ficar parado!"

1009002-73 = "foto? ...É um pouco parecido com um parque temático? E-É mesmo?"

1009002-74 = "Não sei muito sobre parques temáticos...mas claro #n, como você disse, pode haver algumas semelhanças!"

1009002-75 = "Acima de tudo, o diferencial é que o festival está mais... bem, vivo!"

1009002-76 = "[s] \"O festival está vivo...?\""

1009002-77 = "Bem... por exemplo..."

1009002-82 = "Confira o local do festival de hoje! Todos eles acontecem uma vez na vida...#nVocê nunca pode curtir o mesmo festival duas vezes."

1009002-83 = "Até a boneca do mikoshi está diferente da do ano passado!"

1009002-84 = "---Porque a Câmara de Comércio me disse que não posso usar a mesma boneca do ano passado..."

1009002-85 = "Além disso, o momento de preparação para o festival também é especial! Talvez seja só eu, mas... estou sempre animado e me preparando para o próximo festival!"

1009002-86 = "Portanto, festivais e parques temáticos são completamente diferentes! #nTemos o mesmo em comum: mostrar um mundo de sonho a quem o visita..."

1009002-87 = "[s1] \"Sim, é verdade.\"\n[s2] \"Afinal, os festivais são especiais para Umika.\""

1009002-90 = "um……! Eu-me desculpe. #nMe emocionei sozinho e acabei falando demais..."

1009002-91 = "foto……? Não é bom ver um visual tão novo? #nUgh...estou começando a me sentir ainda mais envergonhado..."

1009002-92 = "Erm... sim! #nVocê prefere parques temáticos ou festivais?"

1009002-93 = "[s] \"Se possível, gostaria de aproveitar os dois...\""

1009002-94 = "Vocês dois querem se divertir? Sua expressão parece meio sombria?"

1009002-95 = "Huh... Já faz um tempo que não posso ir a um festival, já que tem sido difícil encontrar tempo devido ao meu trabalho na placa de Petri...?"

1009002-96 = "Eu-me desculpe. Sensei! #nEu a levei para sair enquanto estava ocupado..."

1009002-97 = "[s] \"Está tudo bem, não se preocupe.\""

1009002-98 = "Este é o primeiro festival que participo há muito tempo...e não tenho muito tempo..."

1009002-102 = "...Ah! Eu descobri algo bom!"

1009002-103 = "[ns] \"O que há de errado? Umika.\""

1009002-104 = "lar! Não é nada. apenas……."

1009002-105 = "Ehehe. Acabei de ter uma boa ideia..."

1009002-106 = "foto……? Gostaria de ouvir quais ideias você tem? #nIsso é... um segredo! Ainda não, certo?"

1009002-107 = "Mais do que isso, senhor! #n Já que você veio até o festival, deixe-me mostrar um pouco mais!"

1009002-108 = "Contaremos tudo sobre a diversão do festival! #nAfinal, sou especialista em festivais de Hyakki Yagyo! ... Ainda estou me chamando assim."

1009002-112 = "(Andei pelo local com Umika e gostei muito do festival...)"

