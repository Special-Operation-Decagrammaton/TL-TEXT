[translation]
1009002-1 = "お祭りって素敵です！とっても、とーっても！"
1009002-3 = "あ、先生！こちらです～！"
1009002-7 = "えへへ。お祭り会場にようこそ！"
1009002-8 = "こちらへどうぞ！ご案内します！"
1009002-9 = "[ns] \"さすが……百鬼夜行のお祭りは賑やかだね。\""
1009002-10 = "いえいえ！これはまだ序の口です！"
1009002-11 = "「[ruby=ももよのはるのおうかさい]百夜ノ春ノ桜花祭[/ruby]」や「渦巻映画村のアトラクション祭」、「[ruby=ひゃっきやこうとうろうさい]百鬼夜行燈籠祭[/ruby]」のような規模の大きなお祭りに比べたら――"
1009002-16 = "く、比べたら……どんなお祭りも小さく見えてしまいます……よね？#nで、でも……！このお祭りにだっていいところがたくさん……！"
1009002-17 = "そう！そうなんです……！そもそも……#nこんなふうにお祭りに優劣をつけようとする私の姿勢が間違っていました！"
1009002-18 = "どんなお祭りにも、そのお祭りにしかない価値がありますよね。#nだって、そのお祭りを楽しみに来た人たちの熱がこめられていますから！"
1009002-22 = "えへへ。やっぱり、先生はさすがです！#n私が間違いそうになったら、すぐ気づかせてくれて……！"
1009002-25 = "[ns] \"私、まだ何も言ってないよ……？\""
1009002-27 = "さあ、さあ！こちらへどうぞ！今回のお祭りはですね！#nご覧の通り、人形を乗せたお神輿を祀っているんです！"
1009002-28 = "昔はお姫様の人形をたくさん使ったそうですが――"
1009002-29 = "今は昔の風習にとらわれず、いろいろな種類の人形でお神輿を華やかにして、#n街中をねり歩くようなお祭りになっているんです！"
1009002-33 = "ただ……そのせいでしょうか……？最近は自分の人形をお神輿に乗せるために#n商会や主催者に、いわゆる賄賂が渡されることもありまして……。"
1009002-34 = "準備の間は、お神輿に関する契約周りでいろいろと複雑な問題も#n発生したりしましたが……。"
1009002-35 = "[s] \"いろいろと裏の事情もあるんだね。\""
1009002-36 = "はい……。で、でも！変わらないこともあるんですよ！#n昔からお神輿の真ん中は、お姫様の形の提灯が置かれる場所と決まっていますし――"
1009002-40 = "それに……こっちに来てください！このお祭りを代表する食べ物は、#n蓮の形のリンゴ飴やイチゴとサクランボのシロップをかけたかき氷なんです！"
1009002-44 = "あ！見てください！お神輿のパレードが始まりましたよ！#nみなさん、音楽に合わせて楽しそうに踊っています！"
1009002-48 = "そういえば先生、入場券はお持ちですか？その入場券にあるクーポンで、#nなんでも4つまで屋台で交換できるんですよ！お面も、団扇も、食べ物まで！"
1009002-62 = "ふあぁ～……さすがに疲れましたね……。#n先生……楽しんでいただけましたか？"
1009002-63 = "[s] \"ウミカが楽しそうだから、私まで楽しくなったよ。\""
1009002-64 = "私が……ですか？"
1009002-65 = "えへへ……先生から言われると、なんだかすこし恥ずかしいですね……。"
1009002-68 = "……でも、そうですね。"
1009002-69 = "私は、お祭りが大好きです。"
1009002-70 = "お祭りは……ここにいるみんなのためのものでしょう？"
1009002-71 = "お祭りに来ている間だけは……誰もが日常を忘れて……。#n夢のような世界を楽しめるんです……。"
1009002-72 = "そのための準備は大変ですけど、みんなが楽しむ夢の世界を作っているんだと思うと#nいつもわくわくして、居ても立ってもいられなくなってしまうんです！"
1009002-73 = "え？……テーマパークとすこし似てる？そ、そうですか？"
1009002-74 = "テーマパークには、あまり詳しくありませんが……#nも、もちろん、仰るとおり、似ている部分もあるかもしれません！"
1009002-75 = "何より、違うのは……お祭りは、もっと……そう、生きていますから！"
1009002-76 = "[s] \"お祭りは、生きている……？\""
1009002-77 = "えっと……たとえばですね……。"
1009002-82 = "今日のお祭り会場を見てください！全部一度きりのもので……#n同じお祭りは二度と楽しめないんです。"
1009002-83 = "お神輿の人形ひとつとっても、去年とは違うものですし！"
1009002-84 = "――商会から去年と同じ人形ではダメだと言われているからですが……。"
1009002-85 = "それに、お祭りを準備する時間というのも特別なんです！私だけかもしれませんけど……。いつも次のお祭りにわくわくしながら、準備しているんですよ！"
1009002-86 = "ですから、お祭りとテーマパークはやっぱりぜんぜん違います！#n訪れた人に、夢のような世界を見せるという点では共通していますけど――"
1009002-87 = "[s1] \"たしかに、そうだね。\"\n[s2] \"やっぱりウミカにとってお祭りは特別なんだね。\""
1009002-90 = "あ……！す、すみません。#nひとりで興奮して、しゃべりすぎてしまいました……。"
1009002-91 = "え……？そういう姿も新鮮でよかった、ですか？#nううぅ～……なんだか、よけいに恥ずかしくなってきました……。"
1009002-92 = "えっと……そう！#n先生はテーマパークとお祭り、どちらがお好きですか？"
1009002-93 = "[s] \"できれば、両方楽しみたいけど……。\""
1009002-94 = "両方「楽しみたい」……ですか？なんだか表情がお暗いですね？"
1009002-95 = "え……シャーレの仕事でまとまった時間を取るのが難しいから、お祭りも久しぶりに来れたくらい……？"
1009002-96 = "す、すみません。先生！#nお忙しい中連れ出してしまって……"
1009002-97 = "[s] \"大丈夫だよ、気にしないで。\""
1009002-98 = "久しぶりに参加されたお祭りがこれで……なかなか時間がとれない、となると……"
1009002-102 = "……あっ！いいことを思いつきました！"
1009002-103 = "[ns] \"どうしたの？ウミカ。\""
1009002-104 = "いえ！なんでもないんです。ただ……。"
1009002-105 = "えへへ。すこし、いいアイディアが浮かびまして……。"
1009002-106 = "え……？どんなアイディアか聞きたい、ですか？#nそれは……秘密です！今はまだ、ですね。"
1009002-107 = "それより、先生！#nせっかくお祭りに来たんですから、もうすこしご案内させてください！"
1009002-108 = "お祭りの楽しさを余すところなく先生にお伝えします！#nこれでも百鬼夜行いちのお祭り専門家ですから！……今はまだ自称ですけど。"
1009002-112 = "（ウミカと会場を歩き回り、お祭りを存分に楽しんだ……）"
