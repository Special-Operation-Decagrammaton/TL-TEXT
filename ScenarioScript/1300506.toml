[translation]
1300506-1 = "雨の降る日の路地裏"
1300506-2 = "シャーレ・建物前"
1300506-4 = "仕事を終えて建物の外に出たら、土砂降りの雨が降っていた。"
1300506-5 = "[s] \"さっきまで晴れてたのに……。\""
1300506-11 = "……ん？先生？#nどうかした？"
1300506-12 = "え？うっかり傘を忘れてきたって？"
1300506-13 = "朝、メッセージ送ったのに、それでも忘れるって……。"
1300506-16 = "はい、これ。傘。"
1300506-17 = "なんで傘をいくつも持ち歩いてるのかって？"
1300506-18 = "周りにそそっかしい人が多いからね。#n予備を持っておくと便利だから。"
1300506-19 = "ほんと、すごく手のかかる人たちだから……。"
1300506-20 = "学園は反対方面なのにどこに行くのか、って？"
1300506-21 = "……同じような、雨の日は放っておけないのがいるから。"
1300506-22 = "大したことじゃないから。気にしなくていい。"
1300506-23 = "[s1] カヨコに気を使わせる人が他にもいるなんて、\n[s2] 気になるからついて行くと言う。"
1300506-24 = "え？……一緒に来る？"
1300506-25 = "え？……一緒に来る？"
1300506-26 = "いや、まあ、ダメってわけじゃ……。"
1300506-27 = "大したことじゃないし……。"
1300506-28 = "雨も降ってるし、この先結構汚い場所だから、ここで待ってた方が良いと思うけど。"
1300506-29 = "……はあ。まあ、止めたところで聞いてくれないんだろうね。"
1300506-30 = "……好きにして。"
1300506-34 = "[ns] カヨコについて行く。"
1300506-39 = "[ns3] \"これ、猫の……？\"\n[ns4] \"放っておけないの、ってこの……。\""
1300506-42 = "[wa:500]― ここまで付いてこなくてもよかったのに、先生。"
1300506-45 = "[wa:2000]― 今は、いないのかな……。"
1300506-48 = "[ns5] \"お出かけ中かな。\"\n[ns6] \"少し待ってみる？\""
1300506-51 = "[wa:3700]― 雨が降ってたから、[wa:1200]見に来ただけ。"
1300506-53 = "― ……多分、大丈夫。[wa:2500]一人でも平気な子だから。"
1300506-56 = "[wa:2000]― 縛られることも、[wa:1500]傷つけられることもないのはいいけど……。"
1300506-59 = "― でも、[wa:1500]一人は寂しいから……。"
1300506-62 = "[ns7] \"…………。\"\n[ns8] \"カヨコは優しいね。\""
1300506-65 = "[wa:6000]― ……放っておけなかった。[wa:2500]ただ、それだけ。"
1300506-67 = "― 別に深い意味はないから。[wa:2500]先生、[wa:1500]分かった？"
1300506-71 = "……いつの間に雨が止んだね。"
1300506-72 = "ん？傘返すって？"
1300506-73 = "いや、またいきなり夕立が降るかもしれないし……#n明日でいいよ。"
1300506-74 = "それに、貸しておけば、また明日会えるでしょ？"
1300506-75 = "さっきはあんなこと言ったけど……今は縛られるのも、そんなに嫌いじゃないから。"
1300506-76 = "じゃあまた明日、先生。"
