[translation]
1300506-1 = "Beco em um dia chuvoso"
1300506-2 = "Schale - Em frente ao prédio"
1300506-4 = "Quando terminei o trabalho e saí do prédio, estava chovendo torrencialmente."
1300506-5 = "[s] \"Até agora pouco estava ensolarado...\""
1300506-11 = "……Hm? Sensei?#nAconteceu alguma coisa?"
1300506-12 = "Hã? Esqueceu o guarda-chuva por descuido?"
1300506-13 = "Eu te mandei uma mensagem de manhã, e mesmo assim você esqueceu……."
1300506-16 = "Aqui, pegue. Um guarda-chuva."
1300506-17 = "Por que eu ando com vários guarda-chuvas, você pergunta?"
1300506-18 = "Porque tem muita gente descuidada ao meu redor.#nÉ útil ter um reserva."
1300506-19 = "Sério, são pessoas que dão muito trabalho……."
1300506-20 = "Para onde eu vou, já que a escola é na direção oposta, você pergunta?"
1300506-21 = "……Tem alguém que eu não consigo deixar sozinha em dias de chuva também."
1300506-22 = "Não é nada demais. Não precisa se preocupar."
1300506-23 = "[s1] Dizer que está curioso porque há outra pessoa\n[s2] que faz Kayoko se preocupar, e que vai segui-la."
1300506-24 = "Hã?…… Vai vir junto?"
1300506-25 = "Hã?…… Vai vir junto?"
1300506-26 = "Não, bem, não é como se eu pudesse dizer não……."
1300506-27 = "Não é nada demais, então……."
1300506-28 = "Está chovendo e o lugar para onde vou é bem sujo, então acho melhor você esperar aqui."
1300506-29 = "……Haa. Bem, não é como se você fosse me ouvir se eu pedisse para parar."
1300506-30 = "……Faça o que quiser."
1300506-34 = "[ns] Seguir Kayoko."
1300506-39 = "[ns3] \"Isso é... de um gato?\"\n[ns4] \"Então é por isso que você não consegue deixar sozinha...\""
1300506-42 = "[wa:500]― Você não precisava ter vindo até aqui, Sensei."
1300506-45 = "[wa:2000]― Acho que ela não está aqui agora……."
1300506-48 = "[ns5] \"Será que ela saiu?\"\n[ns6] \"Quer esperar um pouco?\""
1300506-51 = "[wa:3700]― Como estava chovendo, [wa:1200] eu só vim ver como ela estava."
1300506-53 = "― ……Provavelmente, está tudo bem. [wa:2500] Ela é uma criança que consegue se virar sozinha."
1300506-56 = "[wa:2000]― É bom que ela não seja presa a nada, [wa:1500] nem machucada, mas……."
1300506-59 = "― Mas, [wa:1500] ficar sozinha é solitário……."
1300506-62 = "[ns7] \"………….\"\n[ns8] \"Kayoko é gentil, né?\""
1300506-65 = "[wa:6000]― ……Eu não consegui deixar passar. [wa:2500] Só isso."
1300506-67 = "― Não tem nenhum significado profundo. [wa:2500] Sensei, [wa:1500] entendeu?"
1300506-71 = "……A chuva parou quando a gente nem percebeu."
1300506-72 = "Hm? Vai devolver o guarda-chuva?"
1300506-73 = "Não, pode começar a chover de novo de repente……#nPode ficar para amanhã."
1300506-74 = "Além disso, se eu te emprestar, a gente pode se ver amanhã de novo, né?"
1300506-75 = "Eu disse aquilo mais cedo, mas…… agora, não desgosto tanto de ser presa a algo."
1300506-76 = "Então até amanhã, Sensei."
