[translation]
1501-1 = "Trouble & Trackers（１）"
1501-2 = "ヴェリタス・休憩室"
1501-3 = "はぁー……。"
1501-4 = "マキ、どうかした？そんな魂まで一緒に出そうなため息して。"
1501-5 = "……今日、ミレニアムの全生徒たちを対象に身体測定があったでしょ？"
1501-6 = "ハレ先輩は今回どうだった？体重、ちゃんと結果出てた？"
1501-7 = "「ちゃんと」ってどういうこと？体重計に異常でもあった？"
1501-8 = "そうじゃなくて！体重が予想以上だったの！"
1501-9 = "今日の身体測定に備えて、先週からおやつも食べないようにしたし、夕方のランニングも欠かさなかった！"
1501-10 = "でもあんなに苦労したのに、体重がちっとも減ってなくって……。"
1501-12 = "データは嘘を付きませんから。"
1501-13 = "インプット以上のアウトプットがなければ、データの総量は減りません。人の体重もまた同じ仕組みです。"
1501-14 = "マキは一昨日も徹夜作業を言い訳に、炭酸とポテチを大量に摂取していたはず。"
1501-15 = "ううっ……！"
1501-16 = "そういうコタマ先輩はどうなの？去年に比べて痩せた？"
1501-17 = "……わ、私は何とも思ってませんから。"
1501-18 = "絶えず変化し続ける現実の数値に執着するなんて愚かなこと。真の自我は、仮想世界の中にこそ存在するものです。"
1501-19 = "なーんだ。その表情じゃあ、先輩も望ましくない数値だったみたいだね。"
1501-20 = "ううっ、それにしてもそもそも……！学校は何で生徒の体重なんか記録するの？プライバシーの侵害だよ！"
1501-21 = "そんなに気にすることない。どうせ人の体重なんて、一時的な記録でしょ？"
1501-22 = "そこまで気に入らないなら、頑張って運動して、次回に良い記録を出せば良いだけだよ。"
1501-23 = "ダメ、そういうわけにはいかない！#n今回のこの体重を記録に残しちゃったら、あたしがこの時期にちょっとだけ太ってたっていう事実が、ミレニアムの歴史に永遠に残るでしょ！"
1501-24 = "そしてこの記録はいつまでも語り継がれて、これからのあたしの人生における汚点としていつまでも足枷になっちゃう……。"
1501-25 = "他人の体重データをそこまで気にする人がいるかはわからないけど……。"
1501-26 = "もう記録された体重を変えることはできないでしょ。何か方法でもあるの？"
1501-27 = "ふふふ。あたしたちが何者なのか忘れちゃったの、ハレ先輩？"
1501-28 = "真理の守護者であり、知識を探求する正義のハッカー集団の部活「ヴェリタス」！"
1501-29 = "あたしたちのハッキング能力なら、ミレニアムの学籍データを修正することぐらい朝飯前だよ！"
1501-31 = "……私、「たち」？"
1501-32 = "……「私たち」、ですか？"
1501-33 = "何で意外そうな顔してるの？#n先輩たちも身体測定の記録、直したいでしょ？"
1501-34 = "学籍データを閲覧した時にナイスバディな記録が書かれてたら、[USERNAME]先生もきっと先輩たちのスタイルにクラっときちゃうに違いないのに……。"
1501-35 = "……あ、あまり乗り気ではないですが、後輩の頼みですし仕方ありません。#n今回だけはマキをサポートします。"
1501-36 = "決して、先生に良いところを見せたくてするわけではありません！"
1501-37 = "私は身体測定の記録とかどうでもいいんだけど……。"
1501-38 = "ハレ先輩そういえばこの前、新しいハッキング用のドローンを開発したって言ってなかった？"
1501-39 = "そのドローンの性能と、ミレニアムのセキュリティシステム……どっちが強いか、試したくない？"
1501-40 = "……確かに、そのドローンを開発してから特に依頼もなくて、実戦データが足りないのは事実だね。"
1501-41 = "……一回だけなら、ハッキングに使ってみても良いかも。"
1501-42 = "やった！じゃあ二人とも、あたしの計画に賛成ってことで良いよね？途中で抜けるとか無しだから！"
1501-46 = "さあ、真理の守護と、知識の自由のために！"
1501-47 = "いえ、身体測定の記録を偽造するために。"
1501-48 = "ハッキング用ドローンの安定性テストのために……。"
1501-50 = "ヴェリタス――作戦開始！"
