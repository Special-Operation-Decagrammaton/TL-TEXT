[translation]
1501-1 = "Problemas & Rastreadores (1)"
1501-2 = "Veritas - Sala de Descanso"
1501-3 = "Ahhh..."
1501-4 = "Maki, aconteceu alguma coisa? Você soltou um suspiro que parece que até sua alma saiu junto."
1501-5 = "...Hoje teve o exame físico para todos os alunos do Millennium, né?"
1501-6 = "Hare-senpai, como foi o seu? O peso apareceu certinho no resultado?"
1501-7 = "Como assim \"certinho\"? Teve algum problema com a balança?"
1501-8 = "Não é isso! O peso deu mais do que eu esperava!"
1501-9 = "Para me preparar para o exame de hoje, parei de comer lanches desde a semana passada e não faltei em nenhuma corrida à noite!"
1501-10 = "Mas, mesmo com todo esse esforço, o peso não diminuiu nada..."
1501-12 = "Os dados não mentem."
1501-13 = "Se não houver um output maior que o input, a quantidade total de dados não diminui. O peso de uma pessoa funciona da mesma forma."
1501-14 = "Maki, você deveria ter consumido uma grande quantidade de refrigerante e batata frita anteontem, usando o trabalho noturno como desculpa."
1501-15 = "Ugh...!"
1501-16 = "E você, Kotama-senpai? Emagreceu em comparação ao ano passado?"
1501-17 = "...E-eu não penso nada sobre isso."
1501-18 = "Ficar obcecada com valores da realidade que mudam constantemente é uma tolice. O verdadeiro eu existe apenas dentro do mundo virtual."
1501-19 = "Ah, entendi. Com essa expressão, parece que o seu valor também não foi o desejado, senpai."
1501-20 = "Ugh, mas falando nisso...! Por que a escola registra o peso dos alunos? Isso é uma invasão de privacidade!"
1501-21 = "Não precisa se preocupar tanto. De qualquer forma, o peso de alguém é apenas um registro temporário, não é?"
1501-22 = "Se você não gosta tanto assim, é só se esforçar nos exercícios e conseguir um resultado melhor na próxima vez."
1501-23 = "Não, não pode ser assim! #nSe esse peso ficar registrado, o fato de que eu estava um pouquinho acima do peso nessa época vai ficar na história do Millennium para sempre!"
1501-24 = "E esse registro vai ser passado adiante, tornando-se uma mancha na minha vida que vai ser um peso para sempre..."
1501-25 = "Não sei se tem alguém que se importe tanto com os dados de peso dos outros, mas..."
1501-26 = "Não tem como mudar o peso que já foi registrado, né? Existe algum jeito?"
1501-27 = "Fufufu. Esqueceu quem nós somos, Hare-senpai?"
1501-28 = "Somos o clube \"Veritas\", os guardiões da verdade e o grupo de hackers da justiça que busca o conhecimento!"
1501-29 = "Com a nossa habilidade de hacking, corrigir os dados acadêmicos do Millennium é moleza!"
1501-31 = "...Eu, \"nós\"?"
1501-32 = "...\"Nós\", você diz?"
1501-33 = "Por que estão com essa cara de surpresa? #nVocês também não querem corrigir o registro do exame físico, senpais?"
1501-34 = "Se o [USERNAME]-sensei vir um registro de um corpo escultural ao acessar os dados acadêmicos, ele certamente vai ficar impressionado com o estilo de vocês..."
1501-35 = "...E-eu não estou muito animada, mas é um pedido de uma veterana, então não tem jeito. #nSó desta vez, vou ajudar a Maki."
1501-36 = "Não é porque eu queira causar uma boa impressão para o Sensei, de jeito nenhum!"
1501-37 = "Eu não me importo nem um pouco com o registro do exame físico, mas..."
1501-38 = "Hare-senpai, falando nisso, você não disse que desenvolveu um novo drone para hacking outro dia?"
1501-39 = "Não quer testar o desempenho desse drone contra o sistema de segurança do Millennium... para ver qual é mais forte?"
1501-40 = "...É verdade, desde que desenvolvi aquele drone, não tive nenhum pedido e faltam dados de uso real."
1501-41 = "...Talvez valha a pena usá-lo para um hack, só desta vez."
1501-42 = "Isso! Então, as duas concordam com o meu plano, certo? Nada de desistir no meio do caminho!"
1501-46 = "Vamos, pela guarda da verdade e pela liberdade do conhecimento!"
1501-47 = "Não, para falsificar o registro do exame físico."
1501-48 = "Para o teste de estabilidade do drone de hacking..."
1501-50 = "Veritas — Operação iniciada!"
