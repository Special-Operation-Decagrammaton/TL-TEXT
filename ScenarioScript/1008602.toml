[translation]
1008602-1 = "ヒナとドレス（１）"
1008602-2 = "こんにちは、先生。お邪魔するね。"
1008602-3 = "[s1] \"いらっしゃい、ヒナ！何か飲む？\"\n[s2] \"コーヒー？それとも紅茶？烏龍茶とコーラもあるよ！\""
1008602-6 = "じゃあ、コーヒーでお願い。"
1008602-7 = "[s] \"よし、任せて！\""
1008602-11 = "シャーレのオフィス、か……"
1008602-12 = "……ここに来るのも、久しぶりな気がする。"
1008602-13 = "[s] \"たしかに、ヒナが来てくれるなんて夢のようだよ……\""
1008602-14 = "も、もう……大げさなんだから、先生は。"
1008602-18 = "……ん？#n……それ、全部カップ麺よね？"
1008602-19 = "服も脱ぎっぱなしだし……食器もそのまま……"
1008602-20 = "先生、おもちゃまで……"
1008602-21 = "[s] \"えっと、それは……\""
1008602-22 = "……先生。"
1008602-23 = "[s3] \"最近シャーレの仕事が忙しくって……ね？\"\n[s4] \"後で片付けようと思ってたんだ、本当に……！\""
1008602-26 = "ううん、先生を責めようとしてるわけじゃない。"
1008602-27 = "仕事が忙しくて、身の回りがおろそかになるのは私も覚えがあるから。"
1008602-28 = "私は気にしないけど……"
1008602-29 = "でも、シャーレにはいろんな生徒が出入りしてるから、他の子は気にするんじゃないかな、と思って。"
1008602-30 = "[s] \"うっ、ヒナの言う通りだよ……\""
1008602-31 = "だから、その……先生さえ良ければ……#nたまに私がシャーレに来て、片付けを手伝おうか……？"
1008602-32 = "こう見えても、掃除は得意だし……"
1008602-33 = "も、もちろん、先生が嫌じゃなければ……"
1008602-34 = "[s5] \"うーん、ヒナも風紀委員会の仕事で忙しいよね。\"\n[s6] \"さすがに、そこまで迷惑はかけられないよ。\""
1008602-37 = "……………………あ、うん。"
1008602-38 = "…………。"
1008602-42 = "先生がそう言うなら、分かった。"
1008602-43 = "[s] \"えっと……ヒナ？何か気に障るようなこと言ったかな……？\""
1008602-44 = "気に障るだなんて、そんなわけないでしょう？"
1008602-45 = "……それで、本題なのだけど。"
1008602-46 = "[s] \"は、はいっ……！\""
1008602-47 = "こほん……"
1008602-48 = "……実は相談の内容なんだけど。"
1008602-49 = "[ruby=パンデモニウム・ソサエティー]万魔殿の要[/ruby]求で社交パーティーを開くことになったの。"
1008602-50 = "[s] \"ゲヘナでは、そんなパーティーまで開かれるんだ。\""
1008602-51 = "ゲヘナの主要人物やキヴォトスの財政会で偉い人たちが参加するみたい。"
1008602-52 = "面倒なだけだし、意味なんて無いのに。"
1008602-53 = "……それでもゲヘナが主催である以上、風紀委員長として顔は出さなきゃいけないから。"
1008602-54 = "仕方なく、私も参加するの。"
1008602-55 = "……本当に面倒だわ。"
1008602-59 = "……はぁ、どうしてこうなったのかしら。"
1008602-60 = "[s] （心から面倒なのが伝わってくる……）"
1008602-61 = "それで、その……自分で言うのも恥ずかしいのだけど……"
1008602-62 = "こういう場は慣れてないから……"
1008602-63 = "早く準備をしなければいけないのに、何から手を付ければ良いのか分からなくて。"
1008602-64 = "先生なら手伝ってくれると思って……今日は相談に来たの。"
1008602-65 = "風紀委員なのに、いつも先生に頼ってばかりじゃ良くないとは思ってる。"
1008602-66 = "けど……"
1008602-67 = "[s] \"ううん、むしろ頼ってくれて嬉しいよ。\""
1008602-68 = "え、本当……？"
1008602-69 = "[s] \"もちろんだよ。パーティーに出席するなら、まずは……\""
1008602-71 = "[ns] \"ヒナ、ドレスは持ってる？\""
1008602-72 = "ドレス……？"
1008602-73 = "[s7] \"TPOに適した格好は大事だからね。\"\n[s8] \"あまりにも当然のことかもしれないけど……\""
1008602-76 = "ううん、先生の言う通りよ。"
1008602-77 = "たしかに……言われてみれば当然ね。"
1008602-78 = "パーティーなのだから、いつもの制服で参加したら浮くでしょうし。"
1008602-79 = "ドレスの準備をしないと。"
1008602-80 = "ドレス以外にも……アクセサリーや靴も一緒に用意して……"
1008602-81 = "ありがとう、先生。#nおかげで、何から準備すればいいのか分かった。"
1008602-82 = "[s] \"役に立てたなら嬉しいよ。\""
1008602-84 = "[ns] \"それじゃあ、一緒にドレスを買いに……\""
1008602-85 = "ん？いや、ドレスなら買わなくても大丈夫。"
1008602-87 = "[ns] \"……ここは？\""
1008602-88 = "私が普段使ってる倉庫よ。"
1008602-89 = "あまり使わない物は、ここで保管してるの。"
1008602-90 = "前に着たドレスも、たぶんこの辺りにあるはず。"
1008602-91 = "[s] \"うーん、デジャヴのような……\""
1008602-92 = "どこにあるのかな……ちょっと待ってて。"
1008602-96 = "えっと、この辺の箱に入れた記憶が……"
1008602-97 = "……ん？"
1008602-101 = "[ns] \"見つかった？\""
1008602-105 = "………………あ。"
1008602-106 = "[s] \"…………バレエ衣装のような？\""
1008602-107 = "違うの！先生！それは……！"
1008602-113 = "……ふぅ。そうだ、ドレスを探しに来たのよね。"
1008602-114 = "[s] \"ヒナ、そのバレエ衣装は……\""
1008602-115 = "じゃあ、ドレスを探しましょう？"
1008602-116 = "[s] \"は、はいっ。\""
1008602-120 = "うーん、こっちにも無さそう。一体どこに……"
1008602-124 = "今度こそ……"
1008602-125 = "あっ。"
1008602-129 = "[ns] \"見つかったの？\""
1008602-132 = "[ns] \"体操着だね……\""
1008602-133 = "ここにあったのね。どこで無くしたのかと思っていたわ。"
1008602-134 = "[s] \"……………………。\""
1008602-142 = "先生……！？今、何をしようとしたの！？"
1008602-143 = "[s] \"な、何も！？\""
1008602-144 = "か、顔を近づけようと……"
1008602-145 = "……いや、何でもないわ。"
1008602-146 = "私の気にし過ぎだったかも。"
1008602-147 = "[s9] \"すみませんでした！！！\"\n[s10] \"……気のせいじゃないかな。\""
1008602-148 = "な、なっ！？"
1008602-149 = "……はぁ。まったく、油断できないんだから。"
1008602-150 = "う、うん……そうね。"
1008602-151 = "ふう……と、とりあえずドレスを探さないと。"
1008602-152 = "それじゃあ、次はあっちの方を……"
1008602-154 = "（その後も倉庫を探し続けると、ようやくドレスが見つかった）"
1008602-156 = "見つけたわ、先生。"
1008602-157 = "前に私が着ていたドレスよ。"
1008602-162 = "見つかって良かった。#nこれで無駄にお金を使う必要は無さそうね。"
1008602-163 = "[s] \"うーん、ヒナ。これはどう見ても……\""
1008602-164 = "ここで少しだけ待ってて、着替えてくるから。"
1008602-165 = "似合うかどうか、先生に見てほしい。"
1008602-166 = "[s] \"それは構わないんだけど、たぶん……\""
1008602-167 = "すぐに戻るわ。"
1008602-171 = "えっと、こうして……"
1008602-172 = "……あれ？"
1008602-173 = "入らな……んっ。"
1008602-177 = "……あ。"
1008602-178 = "[s] \"ヒナ！大丈夫！？何か変な音が聞こえたけど……！\""
1008602-179 = "だ、大丈夫！何でもない……！"
1008602-180 = "ちょっと……無理やり着ようとしたら破れただけ！"
1008602-181 = "[s] \"それって大問題じゃない！？すぐ行……\""
1008602-182 = "と、とりあえず先生……今こっちに来ないで！"
1008602-183 = "本当に、ダメだから……！"
1008602-184 = "[s] \"……はい。\""
1008602-188 = "……はあ。結局、ダメになっちゃったわね。"
1008602-189 = "今回も大丈夫だと思ったのだけど。"
1008602-190 = "……少しは私も、成長してたのかな。"
1008602-191 = "[s] \"……このドレス、最後に着たのはいつ頃なの？\""
1008602-192 = "ん……？たぶん、小学校のクリスマスパーティーで着たのが最後だから……"
1008602-193 = "……小学校2年生の頃かな？"
1008602-194 = "[s] \"いくら何でも無理じゃない！？\""
1008602-195 = "そ、そう……？"
1008602-196 = "成長するのも、困りものね……"
1008602-197 = "せっかく見つけたのに……"
1008602-198 = "[s] \"ヒナ、一緒にドレスを買いに行こうか。\""
1008602-199 = "……先生と、ドレスを？"
1008602-200 = "うーん、やっぱり、その方が良さそうかしら。#n一人で準備するのは難しそうだし……"
1008602-201 = "せっかくそのために先生が来てくれたんだから。"
1008602-202 = "……先生。また迷惑をかけるかもしれないけど、お願いしてもいい？"
1008602-203 = "[s] \"もちろん！任せて！\""
1008602-204 = "……うん、ありがとう。"
1008602-205 = "じゃあ、約束ね。"
