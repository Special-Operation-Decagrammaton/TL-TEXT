[translation]
1008602-1 = "Hina e vestido (1)"

1008602-2 = "Olá, senhor. Eu vou incomodar você."

1008602-3 = "[s1] \"Bem-vinda, Hina! Quer beber alguma coisa?\"\n[s2] \"Café? Ou chá? Também temos chá oolong e cola!\""

1008602-6 = "Bem, eu gostaria de um café, por favor."

1008602-7 = "[s] \"Ok, deixe comigo!\""

1008602-11 = "Escritório da placa de Petri, hein..."

1008602-12 = "...Parece que já faz um tempo que não venho aqui."

1008602-13 = "[s] \"Certamente, seria como um sonho para Hina vir...\""

1008602-14 = "Bem... você está exagerando, senhor."

1008602-18 = "……sim? #n... esses são todos cup noodles, certo?"

1008602-19 = "Minhas roupas ainda foram tiradas... e a louça ainda está lá..."

1008602-20 = "Professora, até brinquedos..."

1008602-21 = "[s] \"Hum, isso é...\""

1008602-22 = "……professor."

1008602-23 = "[s3] \"Tenho estado ocupado com o trabalho da placa de Petri ultimamente... certo?\"\n[s4] \"Eu estava pensando em limpar isso mais tarde, sério...!\""

1008602-26 = "Não, não estou tentando culpar o professor."

1008602-27 = "Lembro-me de estar tão ocupado com o trabalho que tenho tendência a negligenciar o que me rodeia."

1008602-28 = "Eu não me importo embora..."

1008602-29 = "Contudo, como muitos alunos entram e saem da placa de Petri, pensei que as outras crianças poderiam estar preocupadas."

1008602-30 = "[s] \"Uh, Hina está certa...\""

1008602-31 = "Então... se você concorda, professor...#nVocê gostaria que eu fosse até a placa de Petri de vez em quando e ajudasse a limpá-la...?"

1008602-32 = "Mesmo que pareça assim, sou bom em limpar..."

1008602-33 = "Bem, claro, se o professor não gostar..."

1008602-34 = "[s5] \"Hmm, Hina também está ocupada com o trabalho do comitê disciplinar.\"\n[s6] \"Como esperado, não posso causar tantos problemas.\""

1008602-37 = "……………… Ah, sim."

1008602-38 = "…………."

1008602-42 = "Se o professor diz isso, eu entendo."

1008602-43 = "[s] \"Hum...Hina? Eu disse algo que pode te incomodar...?\""

1008602-44 = "Não tem como isso te incomodar, certo?"

1008602-45 = "...Então, esse é o assunto principal."

1008602-46 = "[s] \"Sim...!\""

1008602-47 = "Querida..."

1008602-48 = "...Na verdade, esse é o conteúdo da consulta."

1008602-49 = "Decidi fazer uma festa social na minha cidade natal."

1008602-50 = "[s] \"Eles até fazem festas como essa na Gehenna.\""

1008602-51 = "Parece que estarão participando as principais figuras da Gehenna e os grandes nomes da reunião financeira de Kivotos."

1008602-52 = "É apenas um incômodo e não faz sentido fazer isso."

1008602-53 = "...Ainda assim, como a Gehenna é a anfitriã, tenho que mostrar minha cara como chefe do comitê de moral pública."

1008602-54 = "Não tenho escolha a não ser participar."

1008602-55 = "...É realmente problemático."

1008602-59 = "...Hmm, eu me pergunto como isso aconteceu."

1008602-60 = "[s] (Posso sentir o quão problemático é do fundo do meu coração...)"

1008602-61 = "Então... tenho vergonha até de dizer isso sozinho..."

1008602-62 = "Não estou acostumada com esse tipo de lugar..."

1008602-63 = "Preciso me preparar rapidamente, mas não sei por onde começar."

1008602-64 = "Achei que a professora poderia me ajudar... então vim pedir um conselho hoje."

1008602-65 = "Embora eu seja membro do comitê disciplinar, acho que não é uma boa ideia contar sempre com os professores."

1008602-66 = "Mas..."

1008602-67 = "[s] \"Bem, estou realmente feliz que você tenha pedido isso.\""

1008602-68 = "Oh sério...?"

1008602-69 = "[s] \"Claro. Se você for participar de uma festa, primeiro...\""

1008602-71 = "[ns] \"Hina, você tem um vestido?\""

1008602-72 = "vestir……?"

1008602-73 = "[s7] \"É importante se vestir adequadamente para o TPO.\"\n[s8] \"Isso pode ser um pouco óbvio, mas...\""

1008602-76 = "Bem, o professor está certo."

1008602-77 = "Certamente... faz sentido se você me perguntar."

1008602-78 = "Como é uma festa, seria divertido comparecer com seu uniforme habitual."

1008602-79 = "Tenho que preparar o vestido."

1008602-80 = "Além do vestido... também preparei acessórios e sapatos..."

1008602-81 = "Obrigado, senhor. #nGraças a você, agora sei o que devo preparar."

1008602-82 = "[s] \"Eu ficaria feliz se pudesse ajudar.\""

1008602-84 = "[ns] \"Então vamos comprar um vestido juntas...\""

1008602-85 = "sim? Não, você não precisa comprar um vestido."

1008602-87 = "[ns] \"...Onde é isso?\""

1008602-88 = "Este é o armazém que costumo usar."

1008602-89 = "Guardo aqui coisas que não uso com frequência."

1008602-90 = "O vestido que usei antes provavelmente também está por aqui."

1008602-91 = "[s] \"Hmm, é como um déjà vu...\""

1008602-92 = "Eu me pergunto onde está... espere um minuto."

1008602-96 = "Bem, lembro-me de colocá-lo em uma caixa por aqui..."

1008602-97 = "……sim?"

1008602-101 = "[ns] \"Encontrou?\""

1008602-105 = "………………um."

1008602-106 = "[s] \"…………Como uma fantasia de balé?\""

1008602-107 = "Não! professor! isso é……!"

1008602-113 = "... Ufa. Sim, vim aqui à procura de um vestido."

1008602-114 = "[s] \"Hina, essa fantasia de balé é...\""

1008602-115 = "Então vamos procurar um vestido, certo?"

1008602-116 = "[s] \"Sim, sim.\""

1008602-120 = "Hmm, acho que também não está aqui. Onde diabos..."

1008602-124 = "Desta vez..."

1008602-125 = "Ah."

1008602-129 = "[ns] \"Você encontrou?\""

1008602-132 = "[ns] \"São roupas de ginástica...\""

1008602-133 = "Foi aqui. Fiquei me perguntando onde o perdi."

1008602-134 = "[s] \"…………………….\""

1008602-142 = "professor……! ? O que você estava tentando fazer agora? ?"

1008602-143 = "[s] \"N-nada!?\""

1008602-144 = "Ou tentando aproximar meu rosto..."

1008602-145 = "...Não, não é nada."

1008602-146 = "Talvez eu estivesse me preocupando demais."

1008602-147 = "[s9] \"Sinto muito!!!\"\n[s10] \"...Talvez seja apenas minha imaginação.\""

1008602-148 = "O que, o que! ?"

1008602-149 = "... Haa. Não posso baixar a guarda de jeito nenhum."

1008602-150 = "Uh, sim... isso mesmo."

1008602-151 = "Ufa... tenho que procurar um vestido agora."

1008602-152 = "Pois bem, da próxima vez..."

1008602-154 = "(Depois disso, continuei procurando no armazém e finalmente encontrei o vestido.)"

1008602-156 = "Eu encontrei, senhor."

1008602-157 = "É o vestido que usei antes."

1008602-162 = "Estou feliz por ter encontrado. #nNão há necessidade de desperdiçar dinheiro com isso."

1008602-163 = "[s] \"Hmm, Hina. Não importa como você olhe para isso...\""

1008602-164 = "Espere aqui um pouco e eu vou trocar de roupa."

1008602-165 = "Quero que o professor veja se me convém."

1008602-166 = "[s] \"Eu não me importo com isso, mas talvez...\""

1008602-167 = "Já volto."

1008602-171 = "Bem, assim..."

1008602-172 = "...Huh?"

1008602-173 = "Não posso entrar... hmm."

1008602-177 = "……um."

1008602-178 = "[s] \"Hina! Você está bem!? Eu ouvi alguns barulhos estranhos...!\""

1008602-179 = "Não, está tudo bem! Não é nada...!"

1008602-180 = "Ei... tentei me forçar a usá-lo, mas simplesmente rasgou!"

1008602-181 = "[s] \"Isso não é um grande problema!? Vá imediatamente...\""

1008602-182 = "E por enquanto, sensei... não venha aqui agora!"

1008602-183 = "Porque realmente não é bom...!"

1008602-184 = "[s] \"...Sim.\""

1008602-188 = "...Suspirar. No final, não deu certo."

1008602-189 = "Achei que desta vez também ficaria tudo bem."

1008602-190 = "...Talvez eu também tenha crescido um pouco."

1008602-191 = "[s] \"...Quando foi a última vez que você usou esse vestido?\""

1008602-192 = "sim……? Provavelmente porque a última vez que o usei foi na festa de Natal da minha escola primária..."

1008602-193 = "...Talvez quando eu estava no segundo ano do ensino fundamental?"

1008602-194 = "[s] \"Tudo é impossível!?\""

1008602-195 = "Oh sério...?"

1008602-196 = "Crescer também é um problema..."

1008602-197 = "Mesmo que eu tenha encontrado..."

1008602-198 = "[s] \"Hina, vamos comprar vestidos juntos.\""

1008602-199 = "...Um vestido com uma professora?"

1008602-200 = "Hmm, acho que é melhor, afinal. #nParece difícil preparar sozinho..."

1008602-201 = "Foi por isso que o professor veio."

1008602-202 = "……professor. Posso causar problemas novamente, mas posso te pedir um favor?"

1008602-203 = "[s] \"Claro! Deixe comigo!\""

1008602-204 = "...Sim, obrigado."

1008602-205 = "Pois bem, prometa-me."

