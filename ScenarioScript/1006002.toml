[translation]
1006002-1 = "ゴリゴリ君の残骸"
1006002-2 = "（焦っていたメグの様子が心配になって、急いで言われた場所へ向かうと……）"
1006002-6 = "（閑散とした路地で、困ったようにしゃがみ込んでいるメグの姿があった）"
1006002-10 = "……あ。"
1006002-11 = "せんせ～～！！"
1006002-12 = "[s1] \"待たせてごめんね、メグ。\"\n[s2] \"すごく焦ってたけど、大丈夫？\""
1006002-13 = "うぅ……実は今、すっごく困ったことになっちゃって……。"
1006002-14 = "うぅ……実は今、すっごく困ったことになっちゃって……。"
1006002-15 = "このままじゃ破産しちゃうよ～！#nただでさえ寂しい私のフトコロが……。"
1006002-16 = "……ん、"
1006002-17 = "どういうことかって？"
1006002-24 = "それがね……。"
1006002-28 = "[ns3] \"アイスクリーム……？\"\n[ns4] \"「ゴリゴリ君」？\""
1006002-29 = "うん。#nそれでね、こっちが……。"
1006002-30 = "うん。#nそれでね、こっちが……。"
1006002-34 = "[ns5] \"……これは？\"\n[ns6] \"……もしかして、これもゴリゴリ君？\""
1006002-37 = "そう！"
1006002-38 = "正確には……ゴリゴリ君「だった」ものだよ！"
1006002-39 = "さっきから失敗しちゃってばっかなんだ。#nゴリゴリ君を食べるのがこんなに大変だなんて、今まで知らなかったよ……。"
1006002-40 = "ほんとに手強いんだよ？ゴリゴリ君って見た目以上に繊細でさ！"
1006002-41 = "カン！ってやったら、すぐにジュワ～！って溶けちゃうの！"
1006002-42 = "……うん？#nカンとかジュワ～じゃ伝わらない？"
1006002-43 = "うーん、"
1006002-48 = "どう説明したらいいんだろ……。"
1006002-49 = "え？ひとつひとつ起きたことを順番に……？"
1006002-53 = "分かった！"
1006002-56 = "んっとね～！#nそれじゃあ最初にゴリゴリ君を買ったところから！"
1006002-57 = "そこのコンビニで買ったんだけど、"
1006002-58 = "カチンコチンで全然食べられなくって……"
1006002-59 = "すっごく硬くてさ～！これじゃ食べられないって思って！"
1006002-60 = "どうすればいいんだろうって考えたの。"
1006002-61 = "それでね、気づいたんだ！溶かしちゃえばいいんじゃんって！#n私ってバカだけど、氷が熱で溶けることくらいは知ってるからね！"
1006002-62 = "それでね……。"
1006002-66 = "[ns7] \"……ちょっと待って。つまり……。\"\n[ns8] \"あそこで溶けてるのって全部……。\""
1006002-69 = "そ！やっぱ先生は頭いいね～。"
1006002-70 = "説明しなくても分かっちゃうんだ！"
1006002-74 = "この「メグマパワー！」を使ったの！"
1006002-75 = "[s9] \"いやいやいやいや！！\"\n[s10] \"待って待って！！\""
1006002-78 = "……うん？先生？#nそんな慌てて、どうしたの？"
1006002-79 = "え？やめといたほうがいいの？#nなんで？"
1006002-80 = "また同じ結果になっちゃう……？"
1006002-85 = "……なるほど！言われてみたらそうだね！#nだから何回やっても失敗しちゃってたんだ！"
1006002-86 = "さっすが先生！"
1006002-87 = "頼りになるねえ～！"
1006002-88 = "うーん……でも、ゴリゴリ君は硬いまんまじゃ食べられないよ。#n振り出しに戻っちゃったね……。"
1006002-89 = "なんかいい方法ないかなぁ……。"
1006002-93 = "あ、そうだ！色々知ってる先生なら、なにかいいアイデア出せない？#n教えて教えてっ！"
1006002-94 = "お願い～！このままじゃ、ゴリゴリ君が食べられないよう！"
1006002-95 = "……えっ？"
1006002-96 = "このゴリゴリ君はいつ買ったのかって？"
1006002-97 = "んーと、先生に連絡した頃だったはず……。"
1006002-98 = "[s] \"それならもう大丈夫だと思うよ。\""
1006002-99 = "……どういうこと？"
1006002-100 = "いいから食べてみなって？"
1006002-101 = "でも……硬くて歯が痛くなっちゃうよ？"
1006002-105 = "……ん、分かった！"
1006002-106 = "私より賢い先生がそこまでいうなら、"
1006002-107 = "信じるよ！"
1006002-111 = "それじゃ……。"
1006002-112 = "いっくよ～～～！"
1006002-119 = "……あれっ！？"
1006002-125 = "わっ、普通に食べられちゃったよ！？"
1006002-126 = "ん～、おいしっ！#nでもちべた～い！"
1006002-127 = "どういうこと……？"
1006002-128 = "先生にはゴリゴリ君を食べられるようにする力があるの！？"
1006002-129 = "[s11] \"時間が溶かしてくれたんだよ。\"\n[s12] \"忍耐力が試されてたんだよ。\""
1006002-132 = "おぉ……！"
1006002-136 = "……よく分かんないや！"
1006002-137 = "けど、なんかすっごく頭が良さそうなことを言ってるのは分かったよ！"
1006002-138 = "やっぱ先生って賢いんだね！"
1006002-139 = "うーん、おいし～！#n先生のおかげで、ゴリゴリ君が食べられたよ～！"
1006002-140 = "だからぁ……はいっ！"
1006002-144 = "……ささ！先生も一口どう？"
1006002-148 = "[ns13] \"あれ、私にくれるの？\"\n[ns14] \"もらってもいいの……？\""
1006002-151 = "当ったり前じゃん！"
1006002-152 = "先生がいなかったら、このゴリゴリ君もあそこで溶けちゃったゴリゴリ君「だったもの」になってたと思うし！"
1006002-153 = "とにかく、先生が来てくれたおかげでこうして食べられてるんだからさ。"
1006002-157 = "それにここまで走ってきてくれたんだし、疲れてるでしょ？#n遠慮しないで食べちゃってよ！ほらほら、あ～ん♪"
1006002-163 = "あははっ！どう～？"
1006002-164 = "おいしいよね、ゴリゴリ君！"
1006002-168 = "……そうだ。#nせっかくだし、もう一個買って半分こしよっか？"
1006002-170 = "（その後、ゴリゴリ君を買うために2人でコンビニに入った）"
1006002-171 = "（しかし、メグが買いすぎたせいで、売り切れてしまっていたのだった……）"
1006002-172 = "うわ～ん！ゴリゴリくうううん～！！！"
