[translation]
1006002-1 = "O que restou do Sr. Gorigori."
1006002-2 = "(Eu estava preocupado com o estado de impaciência da Meg e me apressei para o lugar que me disseram para ir. ......)"
1006002-6 = "(Em um beco deserto, Meg foi vista agachada como se estivesse em apuros)."
1006002-10 = "...... Ah."
1006002-11 = "Sensei~!"
1006002-12 = "[Desculpe tê-la feito esperar, Meg. \"\n[s2] \"Você estava com muita pressa, está bem? \"\n[s2]]\"\"\n1006002-13 = \"Ugh. ...... Na verdade, estou com muitos problemas agora. ......\"\n1006002-14 = \"Ugh. ...... Na verdade, estou com muitos problemas agora. ......\"\n1006002-15 = \"Vou à falência se não fizer isso! #nMeu futbol solitário, mesmo de graça. ......\"\n1006002-16 = \"......,\"\n1006002-17 = \"O que isso significa?\"\n1006002-24 = \"Isso é tudo. .......\"\n1006002-28 = \"[ns3] \"Sorvete......? \"\n[ns4] \"Gorigori-kun\"? \""

1006002-29 = "Sim. #n E assim, este é o ......."
1006002-30 = "Sim. #n E assim, este é o ......."
1006002-34 = "[ns5] \"...... este aqui? \"\n[ns6] \"...... Talvez este também seja o Sr. Gorigori? \"\n[ns6] \""
1006002-37 = "Certo!"
1006002-38 = "É exatamente o que ...... Gorigori-kun \"era\"!"

1006002-39 = "Cometi tantos erros antes. Eu não sabia que era tão difícil comer #nGorigokun até agora. ......"
1006002-40 = "Ele é realmente duro, sabia? Gorigori, você é muito mais sensível do que parece!"
1006002-41 = "Kung! E então ele imediatamente se derrete em um chiado! Ele derrete imediatamente!"
1006002-42 = "...... Sim? Você não consegue distinguir por #n-can ou juwa~?"
1006002-43 = "Hmmm,"
1006002-48 = "Como posso explicar isso? ......."
1006002-49 = "O quê? O que aconteceu, um a um, na ordem: ......?"
1006002-53 = "Entendido!"
1006002-56 = "Hmmm~! #nEntão, vamos começar com o primeiro lugar onde comprei o Gorigokun!"
1006002-57 = "Comprei na loja de conveniência de lá,"
1006002-58 = "Não consegui comê-lo de jeito nenhum porque estava muito grudento. ......"
1006002-59 = "Foi tão difícil! Eu pensava: 'Não posso comer isso!"
1006002-60 = "Pensei: \"O que vou fazer?\"\n1006002-61 = \"Então me dei conta! Eu deveria simplesmente derretê-lo! #Sei que sou um idiota, mas pelo menos sei que o gelo derrete com o calor!\"\n1006002-62 = \"Então. .......\"\n1006002-66 = \"[ns7] \"...... Espere um pouco. Quero dizer ....... \"\n[ns8] \"Todo aquele derretimento ali é ....... \"\"\n1006002-69 = \"Então! Eu sabia que seu sensei era inteligente!\"\n1006002-70 = \"Não preciso explicar para eles, eles entendem!\"\n1006002-74 = \"Esse \"Poder da Meghma!\" usado!\"\n1006002-75 = \"[s9] \"Não, não, não! \"\n[s10] \"Espere, espere, espere! \"\"\n1006002-78 = \"...... Sim? Senhor? #nO que há de errado com você, com tanta pressa?\"\n1006002-79 = \"O quê? Não devo fazer isso? #n Por que não?\"\n1006002-80 = \"Teremos o mesmo resultado novamente ......?\"\n1006002-85 = \"...... Estou vendo! Agora que você mencionou isso, sim! É #n, então eu falhei, não importa quantas vezes eu tenha tentado!\"\n1006002-86 = \"Como esperado de um sensei!\"\n1006002-87 = \"Você é tão confiável!\"\n1006002-88 = \"Hmmm ...... mas você não pode comer Gori-Gori-Kun com tanta força quanto pode. #nNós voltamos à estaca zero. ......\"\n1006002-89 = \"Gostaria de saber se existe uma maneira melhor. ......\"\n1006002-93 = \"Ah, sim! Se você é um sensei que sabe tanto, pode dar algumas boas ideias? #Diga-me, diga-me!\"\n1006002-94 = \"Por favor~! Se eu não fizer isso, o Sr. Gorigori não conseguirá comer você!\"\n1006002-95 = \"...... eh?\"\n1006002-96 = \"Quando foi que esse gorila o comprou, você pergunta?\"\n1006002-97 = \"Hmm, deve ter sido na época em que entrei em contato com o sensei. ......\"\n1006002-98 = \"[Então, acho que estamos prontos para ir. \"\"\n1006002-99 = \"...... O que significa?\"\n1006002-100 = \"Apenas experimente?\"\n1006002-101 = \"Mas o ...... é tão duro que vai machucar seus dentes, sabe?\"\n1006002-105 = \"...... Não, entendi!\"\n1006002-106 = \"Se ao menos um sensei mais inteligente do que eu dissesse isso,\"\n1006002-107 = \"Acredite!\"\n1006002-111 = \"Em seguida, acesse .......\"\n1006002-112 = \"Estou indo!\"\n1006002-119 = \"...... Huh!\"\n1006002-125 = \"Uau, fui comido normalmente!\"\n1006002-126 = \"Mmmm, gostoso! Quero comê-lo com #n!\"\n1006002-127 = \"O que você quer dizer com ......?\"\n1006002-128 = \"Seu sensei tem o poder de fazer você comer o Sr. Gorigori!\"\n1006002-129 = \"[s11] \"O tempo me derreteu. \"\n[s12] \"Ele testou minha paciência. \"\n1006002-132 = \"Oh ......!\"\n1006002-136 = \"...... Eu realmente não entendo isso!\"\n1006002-137 = \"Mas pude ver que você estava dizendo algo muito inteligente!\"\n1006002-138 = \"Eu sabia que os Senseies eram inteligentes!\"\n1006002-139 = \"Mmmm, gostoso~! Graças ao sensei #n, eu pude comer você, Gorigori-kun!\"\n1006002-140 = \"Por isso, ......!\"\n1006002-144 = \"...... Whisper! Gostaria de comer alguma coisa, sensei?\"\n1006002-148 = \"[ns13] \"Você pode me dar isso? \"\n[ns14] \"Você pode me dar isso ......? \"\"\n[ns14] \"Posso ficar com ele?\""

1006002-151 = "Você tem razão, é óbvio!"
1006002-152 = "E se não fosse pelo sensei, acho que esse gorila teria sido o gorila \"que foi\" derretido lá embaixo!"

1006002-153 = "De qualquer forma, estou comendo assim graças à visita do médico."
1006002-157 = "Além disso, você correu o caminho todo até aqui, deve estar cansado. #nNão tenha medo de comer! Aqui, aqui, aqui, aqui, aqui, aqui..."
1006002-163 = "Ha-ha-ha! Como~?"
1006002-164 = "É delicioso, não é, Sr. Gorigori?"
1006002-168 = "...... Sim. #Já que estamos aqui, por que não compramos outro e dividimos a metade?"
1006002-170 = "(Mais tarde, eles entraram juntos em uma loja de conveniência para comprar Gorigori-kun)"
1006002-171 = "(Mas Meg havia comprado muitos e eles estavam esgotados. ......)"
1006002-172 = "Uuuuuuuhhh! Gorigokunun~!"
