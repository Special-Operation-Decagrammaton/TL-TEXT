[translation]
1600008-1 = "Por engano"
1600008-2 = "（……Por algum motivo, o local de geolocalização que Haruka me enviou era um lugar bem remoto）"
1600008-3 = "[s] \"……Será que é aqui mesmo?\""
1600008-4 = "（Um lugar onde nunca estive, nos arredores de Gehenna, onde praticamente não se vê uma alma viva）"
1600008-5 = "（O caminho até aqui foi complicado e não há sinal de nenhum encrenqueiro por perto）"
1600008-6 = "（Acho que o local indicado é este mesmo, mas não consigo encontrar a Haruka……）"
1600008-7 = "[ns1] （Tentar procurar pelos arredores）\n[ns2] （Esperar mais um pouco aqui）"
1600008-11 = "（……? Ouvi algum barulho agora há pouco……?）"
1600008-12 = "[ns] （Seguir na direção de onde veio o som）"
1600008-15 = "（Era um prédio bem antigo）"
1600008-16 = "（Dá para ouvir algum tipo de som vindo de dentro）"
1600008-19 = "（……）"
1600008-20 = "[ns] （Seguir na direção de onde vem o som）"
1600008-23 = "（Cheguei a uma certa porta. O som vem de trás dela）"
1600008-24 = "（Ao espiar discretamente por uma fresta da porta, a pessoa que fazia o barulho parecia não ter notado minha presença, talvez por causa do som da chuva）"
1600008-25 = "[ns] （Abrir a porta e entrar）"
1600008-27 = "（……）"
1600008-31 = "― ……Hii!?"
1600008-35 = "[wa:150]― Ah, [wa:750]eh? [wa:1000]eh……!?"
1600008-37 = "― Po, [wa:500]por que, [wa:1650]eh!?"
1600008-40 = "[wa:200]― Po, [wa:750]por que……!? [wa:1350]Por que o Sensei,"
1600008-42 = "― Es, [wa:800]está [wa:750]aqui……!?"
1600008-45 = "― Eu, [wa:700]eu [wa:1400]cometi outro [wa:700]erro terrível……!?"
1600008-47 = "― Ah, [wa:850]se, [wa:950]será que [wa:1350]eu passei o local errado……!?"
1600008-50 = "[wa:200]― Ah, [wa:600]eh, [wa:800]bem,"
1600008-52 = "― Aqui é, tipo…… [wa:1600]como posso dizer……."
1600008-55 = "― É, [wa:1550]onde eu cultivo ervas daninhas e……"
1600008-57 = "― Esse tipo de coisa, [wa:1200]é onde eu cultivo, [wa:1700]entende……."
1600008-60 = "[wa:850]― Des, [wa:650]desculpe, Sensei,"
1600008-62 = "― Por causa de outro erro meu…… [wa:1900]uma pessoa tão importante, [wa:1700]em um lugar como este……."
1600008-65 = "― Eh, [wa:700]ah…… [wa:700]eu, [wa:650]será que eu acabei de,"
1600008-67 = "― Di, [wa:450]dizer alguma, [wa:800]coisa terrível……!?"
1600008-70 = "[wa:350]― (Shi, [wa:550]quero morrer, quero morrer, quero morrer, quero morrer"
1600008-72 = "― Quero morrer, quero morrer, quero morrer, [wa:1500]tenho que morrer……!)"
1600008-75 = "Bem…… des, desculpe, me acalmei um pouco…… aqui é, sabe……."
1600008-76 = "É, não tem nada aqui, mas, bem……"
1600008-77 = "Er, ervas daninhas…… não sei se você se lembra, mas são aquelas que tentei te dar antes…… é onde eu as cultivo……."
1600008-78 = "[s3] \"Então é o jardim particular da Haruka.\"\n[s4] \"Então é um jardim botânico exclusivo da Haruka.\""
1600008-79 = "Eh, ah, não, não! Não é nada tão importante assim……! Bem, é que……!"
1600008-80 = "Eh, ah, não, não! Não é nada tão importante assim……! Bem, é que……!"
1600008-81 = "Aaah! Não, não toque nisso……! Não, não é que não possa, é que, essa planta é carnívora, então ela pode te morder……!"
1600008-82 = "Não, não, eu que peço desculpas…… se quiser, eu posso ser mordida no seu lugar……! Eh, ah, você quer que eu pare? Si, sim……."
1600008-83 = "[s5] \"Todas elas são muito impressionantes.\"\n[s6] \"Você é incrível por cuidar delas tão bem, Haruka.\""
1600008-84 = "Eh, eh, bem……?"
1600008-85 = "Eh, eh, bem……?"
1600008-86 = "……."
1600008-87 = "Se, será que…… eu, agora, fui, elogiada pelo Sensei……?"
1600008-88 = "É, é uma honra imensa……! ……? Eh, bem……?"
1600008-89 = "……Al, alguém mais veio aqui……? Não!"
1600008-90 = "Eu nunca convidei ninguém! Um lugar tão úmido, nojento e escuro……!"
1600008-91 = "Me chamar para um lugar como este..."
1600008-92 = "Não é algo que eu contaria a ninguém... e mesmo que contasse, acho que ninguém se interessaria..."
1600008-93 = "[s7] \"Então, é o nosso lugar secreto, meu e da Haruka.\"\n[s8] \"Fiquei muito feliz por poder vir a este 'lugar secreto' tão maravilhoso.\""
1600008-94 = "……？"
1600008-95 = "……？"
1600008-96 = "E-er... b-bem, se você chama de lugar secreto, então... talvez seja mesmo...?"
1600008-97 = "M-mas! S-secreto...! E ainda por cima, um segredo só entre o Sensei e eu... será que... será que eu mereço um luxo desses...?"
1600008-98 = "O-obrigada...! ...Eh? V-você quer vir de novo...?"
1600008-99 = "I-isso é claro...! N-naturalmente, se o Sensei quiser...! E-então... er... é um lugar secreto só entre o Sensei e eu, afinal..."
1600008-100 = "S-se quiser vir, é só me avisar que estarei de prontidão 24 horas por dia...! N-não, mesmo que não me avise, e-estarei esperando para sempre!"
1600008-101 = "Digo, se não se importar com um lugar como este... cheio de ervas daninhas e parecido com um depósito de lixo..."
1600008-102 = "N-não, não é nada! S-se o Sensei me encontrar e disser que sou uma flor, até o musgo que cresce na beira da calçada pode se tornar uma flor!"
1600008-103 = "……。"
1600008-108 = "……É-é verdade... é realmente... assim..."
