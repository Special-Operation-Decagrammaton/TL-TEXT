[translation]
1600008-1 = "間違えて"
1600008-2 = "（……なぜかハルカに貰った位置情報の場所は、かなり辺鄙な場所だった）"
1600008-3 = "[s] \"……ここ、合ってるのかな？\""
1600008-4 = "（初めて来る場所で、人影も全くと言って良いほど無いゲヘナ郊外の外れ）"
1600008-5 = "（ここまで来る道も複雑で、ならず者の気配も無い場所）"
1600008-6 = "（教えられた場所はここで合ってるのだと思うけど、ハルカの姿も見当たらない……）"
1600008-7 = "[ns1] （周辺を探してみる）\n[ns2] （もう少しここで待ってみる）"
1600008-11 = "（……？何か今、物音が……？）"
1600008-12 = "[ns] （音がした方へと向かってみる）"
1600008-15 = "（そこは、かなり古びた建物だった）"
1600008-16 = "（中から、何かの音が聞こえる）"
1600008-19 = "（……）"
1600008-20 = "[ns] （音がする方へと向かってみる）"
1600008-23 = "（とある扉へとたどり着いた。音はこの向こうから聞こえてくる）"
1600008-24 = "（扉の隙間からそっと中を覗いてみると、その音を出していた当事者は雨音のせいか、こちらには全く気づいてない様子だった）"
1600008-25 = "[ns] （扉を開けて、中に入る）"
1600008-27 = "（……）"
1600008-31 = "― ……ひぃっ！？"
1600008-35 = "[wa:150]― あ、[wa:750]えっ？[wa:1000]えっ……！？"
1600008-37 = "― な、[wa:500]なななんで、[wa:1650]えっ！？"
1600008-40 = "[wa:200]― ど、[wa:750]どうして……！？[wa:1350]どうして先生が、"
1600008-42 = "― こ、[wa:800]ここに[wa:750]いらっしゃるのですか……！？"
1600008-45 = "― わ、[wa:700]私[wa:1400]また何か[wa:700]とんでもないミスを……！？"
1600008-47 = "― あ、[wa:850]も、[wa:950]もしかして[wa:1350]伝える場所を間違えて……！？"
1600008-50 = "[wa:200]― あ、[wa:600]え、[wa:800]えっとですね、"
1600008-52 = "― ここはその……[wa:1600]何と言いますか……。"
1600008-55 = "― その、[wa:1550]私が雑草とか……"
1600008-57 = "― そういうのを[wa:1200]育てている場所、[wa:1700]でして……。"
1600008-60 = "[wa:850]― す、[wa:650]すみません先生、"
1600008-62 = "― また私のミスで……[wa:1900]大切な方を、[wa:1700]こんなところに……。"
1600008-65 = "― え、[wa:700]あ……[wa:700]わ、[wa:650]私もしかして今、"
1600008-67 = "― な、[wa:450]ななな何か、[wa:800]凄いことを口に……っ！？"
1600008-70 = "[wa:350]― （しっ、[wa:550]死にたい死にたい死にたい死にたい"
1600008-72 = "― 死にたい死にたい死にたい[wa:1500]死なないと……！）"
1600008-75 = "えっと……す、すみません、少し落ち着きました……ここはその、ですね……。"
1600008-76 = "その、何も無い場所なのですが、えっと……"
1600008-77 = "ざ、雑草……お、覚えていらっしゃるか分かりませんが、前にもお渡ししようとした雑草、などを……わ、私が育てている場所、でして……。"
1600008-78 = "[s3] \"ハルカの個人庭園なんだね。\"\n[s4] \"ハルカ専用の植物園なんだね。\""
1600008-79 = "え、あ、いえいえ！その、そんなに大したものではなく……！えっと、そのっ……！"
1600008-80 = "え、あ、いえいえ！その、そんなに大したものではなく……！えっと、そのっ……！"
1600008-81 = "ああっ！そ、それは触っちゃダメです……！い、いえ、ダメと言いますかその、その子は食虫植物なので、噛まれてしまいますので……！"
1600008-82 = "い、いえ、こちらこそすみません……よ、よろしければ私が代わりに噛まれますので……！え、あ、やめてほしい、ですか？は、はい……。"
1600008-83 = "[s5] \"どれもすごい立派だね。\"\n[s6] \"こんなに綺麗に育ててるなんて、ハルカはすごいね。\""
1600008-84 = "え、えっと……？"
1600008-85 = "え、えっと……？"
1600008-86 = "……。"
1600008-87 = "も、もしかしてその……い、今、私、せ、先生に、褒められましたか……？"
1600008-88 = "も、勿体ないお言葉です……！……？えっと……？"
1600008-89 = "……ほ、他にもここに来た人、ですか……？い、いえ！"
1600008-90 = "だ、誰もお呼びしたことはありません！こ、こんな湿っぽくて、気持ち悪くて、薄暗くて……！"
1600008-91 = "こんなところに……お呼びするだなんて……。"
1600008-92 = "誰に教えるものでもありませんし……もし教えたとしても、だ、誰も興味は、持たないと、思いますし……。"
1600008-93 = "[s7] \"じゃあ、ハルカと私だけの秘密の場所だね。\"\n[s8] \"こんなに素敵な「秘密の場所」に来られて、嬉しかったよ。\""
1600008-94 = "……？"
1600008-95 = "……？"
1600008-96 = "え、と……た、確かに、秘密の場所といえば、そ、そうかもしれませんね……？"
1600008-97 = "で、ですが！ひ、秘密だなんて……！それも、せ、先生と私だけ、の秘密……そんな、そんな贅沢なこと、良いのでしょうか……？"
1600008-98 = "あ、ありがとうございます……！……え？ま、また来たい、ですか……？"
1600008-99 = "そ、それはもちろん……！と、当然、先生がよろしければ……！そ、その……えっと……せ、先生と私だけの秘密の場所、ですし……。"
1600008-100 = "い、いらっしゃるときはいつでも言っていただければ、24時間待機していますから……！い、いえ、言ってくださらなかったとしても、い、一生待機しています！"
1600008-101 = "その、こんな、私と、私みたいな雑草しかない……こんなゴミ置き場のようなところでよろしければ、ですが……。"
1600008-102 = "い、いえ、何でもありません！せ、先生が見つけてくだされば、先生に花だと言っていただければ、歩道の隅に生えてる苔も花になれますからっ！"
1600008-103 = "……。"
1600008-108 = "……ほ、本当に……本当に、そう、なんです……。"
