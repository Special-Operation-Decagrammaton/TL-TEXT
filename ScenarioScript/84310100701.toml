[translation]
84310100701-6 = "……本当に知りたいのね？「未完走」の理由を。"
84310100701-7 = "いや、どちらかと言えば、2%に入る目安が気になってね。"
84310100701-8 = "ネルをイメージしてもらったら早いかしら。"
84310100701-10 = "いや、ギリギリじゃないか？作戦のために動き回るのと、トレーニングの耐久力は別物だろ。"
84310100701-11 = "貴女の負けず嫌いを発揮すれば完走できると思うのだけれど？"
84310100701-12 = "それは……。"
84310100701-13 = "そう……かもな。"
84310100701-14 = "（おおよそ理解できた）"
