[translation]
2000903-1 = "プリンよりも柔らかく"
2000903-2 = "遅いじゃないか、カムラッド！"
2000903-3 = "[s] \"ごめん、少し遅れちゃった。\""
2000903-4 = "少しだと？5分も遅れてるじゃないか！5分もあればどれだけの仕事ができたことか！"
2000903-5 = "5分もあれば、温泉卵をもう100個は作れたはずだ！"
2000903-6 = "[s] \"さすがにその速さじゃできないと思うけど……。\""
2000903-7 = "そ、そうなのか？"
2000903-8 = "ふむ、まあとにかくおいらを待たせるなんて、本来ならトイレ掃除10年の刑に処されても当然だが……"
2000903-9 = "今日は一緒に温泉卵を作らなきゃいけないからな、特別に許そう。光栄に思え、カムラッド！"
2000903-10 = "ところで温泉卵はどうやって作るんだ？以前、給食部でプリンを作るところを見た時はかなり複雑そうだったが。"
2000903-11 = "[s] \"温泉に卵を入れて、待つだけで大丈夫。\""
2000903-12 = "何っ！？そんな簡単な方法で、プリンのような珍味が作れるのか？"
2000903-13 = "カムラッド……まさかおいらのことを世間知らずのチビだとでも思って、騙そうとしてないか？"
2000903-14 = "……まあカムラッドがおいらを騙して得するわけでもないし、そんなことはないか。"
2000903-15 = "では早速、温泉卵を作ってみるとしよう！"
2000903-21 = "[ns] \"それ、もしかして全部卵……？\""
2000903-22 = "ふふっ。手軽にプリンのようなものが作れるというのであれば、ケチるわけにいかまい。"
2000903-23 = "実は給食部に、保管中の卵を全部持ってくるように指示しておいたんだ！"
2000903-24 = "これだけたくさん作っておけば、一日中温泉卵が食べられるに違いない！"
2000903-25 = "ん？そんなにたくさん食べると飽きる……？"
2000903-26 = "何を言ってるんだカムラッド。プリンのように柔らかくて美味しいものであれば、まさか飽きるはず無いだろう。"
2000903-27 = "一日どころか、一週間は食べ続けられるはず！"
2000903-28 = "ふふ……この無数の卵が全てプリンに変わると思うと、今からワクワクするな。"
2000903-29 = "そろそろ我慢の限界だ！カムラッド、早く温泉卵を茹でよう！"
2000903-30 = "割れないように注意しつつ、ここにある卵を全部温泉の中に入れるのだ！"
2000903-39 = "カムラッド、そろそろ良いか？温泉卵になったか？"
2000903-40 = "[s] \"まだ5分も経ってないよ。\""
2000903-41 = "そうか、気持ち的にはもう30分は過ぎたような気がするが……。"
2000903-42 = "仕方ない、もう少しだけ我慢してやろう。"
2000903-46 = "カムラッド、まだか？"
2000903-47 = "[s] \"今8分くらい。\""
2000903-48 = "ま、まだ10分も経ってないのか？"
2000903-49 = "カムラッド、まさかその時計壊れてるんじゃ？"
2000903-50 = "こんなに待ったのに、8分しか経ってないなんて……。"
2000903-53 = "[ns] \"そろそろ良いかな。\""
2000903-54 = "おお、待ちわびたぞ！"
2000903-60 = "[ns] チェリノに温泉卵を渡す。"
2000903-61 = "ふふっ……この程よく火が通った卵から感じられる温もり、悪くないな。"
2000903-62 = "これだけ時間をかけて作ったのだから、まるで最高級のプリンのような味がするに違いない。"
2000903-63 = "それでは、早速……。"
2000903-69 = "……おい、カムラッド。"
2000903-70 = "これはまるで、何と言うか……若干茹で足りない卵じゃないのか？"
2000903-71 = "[s] \"温泉卵だからね。\""
2000903-72 = "確かに食感は柔らかめのプリンに似ているが……この味、微かな硫黄の香り、全然プリンとは違う。"
2000903-73 = "ううっ……おいらを騙したな、カムラッド！"
2000903-74 = "カムラッドの言葉を信じて茹でてしまった、この大量の卵はどうするのだ！"
2000903-75 = "[s1] \"さっき1週間は食べ続けられるって……。\"\n[s2] \"チェリノが楽しそうだったから……。\""
2000903-76 = "それはプリンの味だった場合の話だ！"
2000903-77 = "そ、そうだとしても、間違いに気づいていたなら何故その場で止めない！？"
2000903-78 = "誤った情報を伝えて、レッドウィンターの給食に莫大な被害を及ぼすなんて……いくらカムラッドだとしても、ただではおけん！"
2000903-79 = "サボタージュの対価として、最高級のプリンを要求する！"
2000903-80 = "[s] \"そっかぁ……。\""
2000903-82 = "その後大量に残った温泉卵を処理するのに、だいぶ苦労をした。"
