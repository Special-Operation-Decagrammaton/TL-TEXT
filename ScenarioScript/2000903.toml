[translation]
2000903-1 = "Mais macio que pudim"
2000903-2 = "Está atrasado, camarada!"
2000903-3 = "[s] \"Desculpe, me atrasei um pouco.\""
2000903-4 = "Um pouco? Você está atrasado 5 minutos! Em 5 minutos, quanta coisa eu não poderia ter feito!"
2000903-5 = "Em 5 minutos, eu já teria feito 100 ovos termais!"
2000903-6 = "[s] \"Acho que não dá para fazer nessa velocidade toda...\""
2000903-7 = "É, é mesmo?"
2000903-8 = "Hum, bem, de qualquer forma, fazer-me esperar é algo que normalmente resultaria em uma sentença de 10 anos limpando banheiros, mas..."
2000903-9 = "Como temos que fazer ovos termais juntos hoje, vou abrir uma exceção. Sinta-se honrado, camarada!"
2000903-10 = "Aliás, como se faz um ovo termal? Quando vi o pessoal da cantina fazendo pudim antes, parecia bem complicado."
2000903-11 = "[s] \"É só colocar os ovos na fonte termal e esperar.\""
2000903-12 = "O quê!? Com um método tão simples, dá para fazer uma iguaria como pudim?"
2000903-13 = "Camarada... não está tentando me enganar só porque acha que sou uma baixinha ingênua, está?"
2000903-14 = "...Bem, o camarada não ganha nada me enganando, então acho que não."
2000903-15 = "Então, vamos começar a fazer os ovos termais agora mesmo!"
2000903-21 = "[ns] \"Isso, por acaso, são todos ovos...?\""
2000903-22 = "Fufu. Se dá para fazer algo parecido com pudim tão facilmente, não posso economizar."
2000903-23 = "Na verdade, eu ordenei que a cantina trouxesse todos os ovos que estavam em estoque!"
2000903-24 = "Tendo feito tantos, com certeza poderei comer ovos termais o dia todo!"
2000903-25 = "Hm? Comer tanto assim não vai enjoar...?"
2000903-26 = "O que está dizendo, camarada? Se é algo macio e delicioso como pudim, não tem como enjoar."
2000903-27 = "Não só um dia, eu conseguiria comer por uma semana inteira!"
2000903-28 = "Fufu... só de pensar que esses inúmeros ovos vão virar pudim, já fico empolgada."
2000903-29 = "Já estou no meu limite! Camarada, vamos logo cozinhar esses ovos!"
2000903-30 = "Tome cuidado para não quebrá-los e coloque todos esses ovos na fonte termal!"
2000903-39 = "Camarada, já está bom? Já viraram ovos termais?"
2000903-40 = "[s] \"Ainda não passaram nem 5 minutos.\""
2000903-41 = "Entendo, mas sinto como se já tivessem se passado 30 minutos..."
2000903-42 = "Não tem jeito, vou ter que aguentar só mais um pouco."
2000903-46 = "Camarada, ainda não?"
2000903-47 = "[s] \"Agora deu uns 8 minutos.\""
2000903-48 = "A-ainda não passaram nem 10 minutos?"
2000903-49 = "Camarada, esse seu relógio não está quebrado, não?"
2000903-50 = "Esperei tanto tempo e só se passaram 8 minutos..."
2000903-53 = "[ns] \"Acho que agora está bom.\""
2000903-54 = "Oh, finalmente!"
2000903-60 = "[ns] Entrega o ovo termal para Cherino."
2000903-61 = "Fufu... esse calor que emana do ovo cozido no ponto certo, não é nada mal."
2000903-62 = "Como levei tanto tempo para fazer, com certeza deve ter o gosto do melhor pudim do mundo."
2000903-63 = "Então, vamos lá..."
2000903-69 = "...Ei, camarada."
2000903-70 = "Isso aqui é, como posso dizer... um ovo que não foi cozido o suficiente, não é?"
2000903-71 = "[s] \"É um ovo termal, afinal.\""
2000903-72 = "A textura até lembra um pudim mais macio, mas... esse gosto, esse leve cheiro de enxofre, não tem nada a ver com pudim."
2000903-73 = "Ugh... você me enganou, camarada!"
2000903-74 = "O que eu vou fazer com essa montanha de ovos que cozinhei acreditando nas suas palavras!"
2000903-75 = "[s1] \"Você disse que conseguiria comer por uma semana...\"\n[s2] \"É que a Cherino parecia tão feliz...\""
2000903-76 = "Isso era se tivesse gosto de pudim!"
2000903-77 = "M-mesmo assim, se você sabia que estava errado, por que não me impediu na hora!?"
2000903-78 = "Passar informações erradas e causar um prejuízo enorme para a cantina de Red Winter... mesmo sendo você, camarada, não vou deixar passar em branco!"
2000903-79 = "Como pagamento pela sabotagem, exijo o pudim da mais alta qualidade!"
2000903-80 = "[s] \"Entendi...\""
2000903-82 = "Depois disso, tive bastante trabalho para lidar com a enorme quantidade de ovos termais que sobraram."
