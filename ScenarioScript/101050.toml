[translation]
101050-1 = "Episódio 5; Rachaduras no Cotidiano (3)"
101050-4 = "Tá tudo pronto. Moe, mande a ver."
101050-5 = "Tem certeza mesmo? Você não vai se arrepender disso? Haa, haa..."
101050-6 = "Já chegamos até aqui, não tem como a gente fugir mais."
101050-7 = "Vamos lá, dê o seu pior até você se dar por feliz!"
101050-8 = "Ok... Sendo assim, não se incomodaria com..."
101050-10 = "ATIRAR!"
101050-15 = "Uau...! Aquele ninho imenso de vespas em que nós mal piscamos já não existe mais..."
101050-16 = "Agradeço demais a você por isso! Quando nós demos uma olhada numa das nossas barracas de armazenamento com um ninho de vespas desse tamanho, a gente nem sabia o que pensar de verdade..."
101050-17 = "De forma alguma, é como nossa responsabilidade como esquadrão SRT de garantir a eliminação de ameaças contra os civis."
101050-18 = "Isso aí. Se alguém for lá, se atrever a mexer com aquilo, iria dar numa desgraça das brabas."
101050-19 = "E como elas carregam uma neurotoxina bem potente...#nTeria sido muito perigoso para as pessoas irem ali lidar com isso para queimá-las o mais rápido possível e de modo contínuo."
101050-21 = "Ué, já terminou? Sério?"
101050-22 = "Como vocês disseram que a área da toca das vespas era grande, eu jurei a mim mesmo que o fogo devia durar uma hora... que chato."
101050-23 = "C-Como assim! Um ninho de vespa que precisa ser queimado pra lá de uma hor-a... é melhor a gente nem imaginar como ia ficar!"
101050-25 = "Nas épocas normais nós devíamos chamar os profissionais que pudessem lidar com os ninhos ou o corpo de bombeiros, mas..."
101050-26 = "Como o terreno e a infraestrutura da cidade Coelhinho da Páscoa vai acabar não sobrando quase nada e vai ser realocada para outro lugar... a gente meio que tem que lidar as coisas em nossas mãos e sozinhos."
101050-27 = "Ainda por cima, tem tanta dor de cabeça pra se lidar que eu juro para mim mesma... Nós realmente pensamos que essa devia ser nossa chance pra sair dessa confusão toda..."
101050-31 = "......Se por acaso tiverem problemas, sinta-se à vontade de passar no parque de novo."
101050-32 = "Como alguém membro da Forças Especiais SRT, estarei bem contente em oferecer a nossa ajuda a os cidadãos a hora que quiserem."
101050-33 = "Bom... a sua ajuda nos é algo em que possamos contar bem."
101050-34 = "Minhas desculpas, eu não sei como vou pagar pela dívida do que vocês fizeram com a gente."
101050-38 = "Isso não é incômodo para nós. Nós apenas agimos da melhor forma e fizemos o que era de se esperar de nós――"
101050-42 = "Aqui. Por favor, leve as nossas asinhas de frango com vocês como bônus."
101050-44 = "Para ser bem honesta, nós já não temos tantos clientes como tínhamos... Mas nós podemos garantir a qualidade e do sabor como já pudemos e as vendas indo bem, sem problemas."
101050-48 = "Um monte de asas de frango refrigerado em pedaços... sem contar ainda com as cebolinhas..."
101050-49 = "Eles não passaram de sua data de validade ainda... Isso não soa mal..."
101050-50 = "E você tá nos dando isso tudo de... g-graça...?"
101050-51 = "Ah, ué? Algum problema no pacote...?"
101050-52 = "Eu me recuso a achar o contrário caso não gostem de asas de f-rango――"
101050-53 = "\"MUITO OBRIGADA!!\""
101050-55 = "Parque Coelhinho da Páscoa"
101050-57 = "Maravilhoso...!"
101050-58 = "É... dessa vez eu sinto que deu um gostinho melhor. Como dá gosto comer comida assada num fogo."
101050-59 = "Fufu... Quando o papo vem a acampar fogueiras pra assar, deixa que eu garanto isso!"
101050-60 = "Hum, acho que o calor da chama pode estar um pouco fraca pra mim.#nVai aí mais madeira pro aquecimento?"
101050-65 = "O gosto do frango e de se imaginar o cheirinho de cebolinhas que saem da carne são inebriantes e divinos de tão bem preparados!"
101050-66 = "Com a parte de forinha crocante bem cozinhada... além da maravilha de macio no paladar... Ahh, isso é de deixar água na boca!"
101050-67 = "Ufa... Não sei a quanto tempo a gente já não comia esse tipo de comida tão boa..."
101050-68 = "B-Bom, ultimamente... tem os que a carne salgada dentro da latinha com o tempo acabou virando um alimento a mais e tanto pra as refeições..."
101050-69 = "Se a gente não for de guardar as comidas por falta de uma geladeira pra colocar, seria melhor que a gente cozinhasse a carne nós mesmos ao vivo e agora!"
101050-73 = "......Como as coisas estão meio que normais e o clima tá pacato e tals."
101050-74 = "Sim, quando a gente olha pra fogueira sentados num banco à noite, sinto até que isso aqui já virou um acampamento pros mais assíduos."
101050-75 = "Fufu... E a brincadeira não parou por aí pra poder acabar."
101050-76 = "Nos tempos recentes o Conselho Estudantil Geral e Valkyrie ficaram muito mais num clima relaxante e tranquilo de lidar..."
101050-77 = "A gente já não se falava tanto com o Sensei da Schale também."
101050-78 = "Mesmo quando o Sensei liga a gente só desliga e encerra o papo assim que possível."
101050-79 = "A-Ah... E mesmo ele não aparecendo a gente poderia nos ajudar bem nos problemas que tem por aqui e lá!"
101050-80 = "C-Com tudo isso acontecendo... as conversas que já não temos mais há tempos... devem não ter sumido do nosso caminho pra sempre..."
101050-84 = "......Eu só acho que é uma paz e tudo vai bem para as estudantes da gente não ter problemas com a paz e que tudo acabe assim, de Kivotos inteira."
101050-85 = "Talvez esse deva ser um tipo de resposta pra nós mesmos mas... é inegável, mesmo assim..."
101050-86 = "É..."
101050-91 = "Ah, por acaso. Onde foram parar aquele refrigerante enlatado que as pessoas trouxeram no outro dia?"
101050-92 = "A falta de geladeiras faz eu o ter colocado debaixo de uma fonte com as latinhas abertas pro momento de dar uma bebida com bastante calor.#nMas agora ele já tá um refrescante como não tinha antes!"
101050-93 = "Oh, é aquele em que trouxemos da loja da Sora depois que tiramos as badernistas do caminho de volta?"
101050-94 = "É. Tem anos que não comia ou bebia que nem se deve, e é como nos dizem... \"Se tiver oportunidade não é pra deixar de aproveitar a chance\"..."
101050-95 = "E é bem o por isso disso que devíamos comemorar de vez em quando com um bom drinque de hoje!#nNão é de sempre que comemos bem uma asa de frango, né?"
101050-96 = "Se é pra hoje as comilanças e tudo que tiver pro jantar que pudermos achar, a festa tem que valer a pena!#nCerto, vamos arrumar esses cogumelos que eu preparei só e por uma boa razão para agora e é pra a nossa comida ir dar em algo mais divertido e bom e legal de comer!"
101050-97 = "......Sim.#nAcho melhor irmos lá preparar e buscar pra o que a gente precisar."
101050-102 = "E-Eu também tô com fome e quero ir junto...!"
101050-108 = "Câmara da Defesa do Conselho Estudantil Geral - Gabinete"
101050-111 = "Para quem quiser ligar numa rede que foi criada tão a custo por aqui..."
101050-112 = "...... "
101050-116 = "......Adiante."
101050-117 = "......"
101050-118 = "......Sim, entendi."
101050-122 = "......Enfim as cortinas para isso e nós mesmas vão começar do fim ao novo."
101050-125 = "Gematria, Sala de Conferências"
101050-129 = "――As 'Cores' estão vindo pra cá...?"
101050-131 = "Sim. E quando chegarem, tanto a 'Schale', como os 'Deuses Sem Nome' e a 'Arca' vão virar pó.#nO que me dizem? Creio que não haja forma mais infalível que essa."
101050-132 = "Se isso acontecer, é bem provável que as 'Cores' também dizimem esta própria Kivotos."
101050-133 = "......A Madame planeja reduzir as nossas tão importantes investigações a nada?"
101050-134 = "Sim. A investigação de vocês não tem a menor importância para mim.#nPorque finalmente percebi o que eu realmente estava procurando."
101050-135 = "......"
101050-137 = "Apesar de ter sido uma fração, quando entrei em contato com as 'Cores' durante o ritual...#nEu compreendi o que eu realmente almejo."
101050-138 = "O que deve ser feito... não são explorações ou experimentos inúteis.#nSim... para me tornar uma entidade suprema――"
101050-139 = "Eu preciso possuir os poderes da destruição e criação do mundo...#nAssim, me tornarei o ser absoluto que 'Destrói' e 'Cria'. Esse é o único jeito..."
101050-140 = "Ininterpretável, ininteligível, incomunicável――Uma luz agourenta que apenas chega.#nUm conceito incompreensível com o qual não se pode se comunicar, e que não possui propósitos... Ah, sim――Foi por causa disso,"
101050-141 = "Que achei o jeito para eliminar o Sensei [USERNAME]..."
101050-142 = "Que visão deplorável.#nPerdeu a razão, Beatrice."
101050-143 = "......Entendi, Madame. Você foi completamente consumida pelo próprio ódio.#n......Lamentável."
101050-144 = "Nós, da Gematria, somos pesquisadores, peregrinos... A loucura é o maior inimigo que devemos combater... Beatrice, você perdeu a qualificação para continuar na Gematria."
101050-146 = "Cuidado com o que falam... Sabem que o poder das 'Cores' reside em mim, não sabem?"
101050-147 = "Esse poder de loucura que vocês tanto temem, está――"
101050-148 = "Parece que sim.#nGolconda, acompanhe-a até a saída."
101050-149 = "Com prazer.#n――Foi muito divertido enquanto durou, Madame."
101050-154 = "......!?"
101050-157 = "......Ugh, gwaaaaa――!?"
101050-158 = "Humm, parece ser muito mais eficiente que a bomba destruidora de halos."
101050-159 = "Sim, o misticismo é chamado de 'Mistério' justamente por não ser analisável, mas...#nEla é uma existência bastante simples de entender."
101050-160 = "Aaaaahhhhhhhh!!! "
101050-161 = "Achou mesmo que nós não teríamos nenhum meio para combater as 'Cores'?#n......Eu já estava preparado desde que me contou sobre o seu contato com as 'Cores'."
101050-162 = "É isso aí!!"
101050-163 = "Por termos visões de mundo tão diferentes, sempre tivemos nossos atritos.#nMas devo admitir o meu respeito à sua ambição desenfreada, Beatrice."
101050-164 = "――――――!!"
101050-174 = "......"
101050-175 = "Que lástima. Será que ela não percebeu que um mero figurante clamando se equiparar a Deus não teria outro fim? Ahh, se ela ao menos tivesse um mínimo de apreço pela poesia... "
101050-176 = "Até estava curioso para ver em qual monstro ela se transformaria após ser consumida pela loucura...#nMas do jeito que as coisas iam, ela só se tornaria um mal ainda maior."
101050-177 = "Mais uma cadeira vazia.#nVamos discutir sobre o próximo integrante depois."
101050-180 = "E o nosso próximo assunto é――"
101050-181 = "......"
101050-182 = "......"
101050-184 = "Próximo Episódio; Presságio"