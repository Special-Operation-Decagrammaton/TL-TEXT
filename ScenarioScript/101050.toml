[translation]
101050-1 = "第5話;日常の亀裂（３）"
101050-4 = "準備は終わった。頼んだぞ、モエ。"
101050-5 = "いいんだよね？本当にやっちゃっていいんだよね？はぁ、はぁ……"
101050-6 = "ここまで来たんだ、逃げるという選択肢は無い。"
101050-7 = "さあ、思う存分やるがいい！"
101050-8 = "じゃあ遠慮なく……"
101050-10 = "ファイヤーーー！"
101050-15 = "うわ……！巨大スズメバチの巣が、あっという間に焼き尽くされた……。"
101050-16 = "ありがとうございます！倉庫でハチの巣を見つけた時、本当にどうしようかと……。"
101050-17 = "いえ、市民を脅かす危険の排除もSRTの責務ですから。"
101050-18 = "ああ。スズメバチの巣を下手に民間人が触ったら、怪我をするかもしれない。"
101050-19 = "スズメバチは神経毒を持ってるからな。#n万全の準備をして、一気に燃やしてしまうのが得策だ。"
101050-21 = "なになに、もう終わり？"
101050-22 = "巨大スズメバチの巣があるって聞いたから、1時間くらいは燃やせると思ったのに……残念。"
101050-23 = "い、1時間以上燃やせるハチの巣なんて……考えたくないぃ……。"
101050-25 = "以前は業者を呼んだり、消防署にお願いしていましたが……"
101050-26 = "子ウサギタウンの再開発が決まってからは、役所やインフラも全部無くなってしまって……なので、ある程度は自分たちで解決するしかないんです。"
101050-27 = "ですが、やはり困る事が多くて……我々も潮時かなと……"
101050-31 = "……また困ったことがあった時は、公園にいらしてください。"
101050-32 = "SRTの隊員として、市民のためでしたらいつでも協力いたします。"
101050-33 = "それは……頼もしいですね。"
101050-34 = "すみません、助けていただいたのにお礼をすっかり忘れてました。"
101050-38 = "いえ、私たちは当然のことをしたまでです――"
101050-42 = "どうぞ。うちの店の焼き鳥パックです。"
101050-44 = "今はあまりお客さんも来なくなってしまいましたが……少し前までそこそこお客さんが来ていたので、味の保証はいたします。"
101050-48 = "チルドの焼き鳥パック……それも新鮮なネギが入った……"
101050-49 = "賞味期限も切れてなければ、状態も良い……"
101050-50 = "私たちにこれを……無料で……？"
101050-51 = "あ、あれ？何か問題でもありましたか……？"
101050-52 = "焼き鳥が苦手でしたら――"
101050-53 = "「「ありがとうございます！！」」"
101050-55 = "子ウサギ公園"
101050-57 = "美味しい……！"
101050-58 = "うむ……今回のはうまく焼けたな。しっかり炭火の味がする。"
101050-59 = "ふふっ、火の扱いは私の専門だからね！"
101050-60 = "うーん、ちょっと火が弱いかな。#n薪を足そっか？"
101050-65 = "新鮮なネギの香りと鶏肉の脂が、本当によく合いますね。"
101050-66 = "特にこのカリカリに焼けた皮……ジューシーで最高！"
101050-67 = "ふぅ……こんな新鮮なご飯は、いつぶりだろうか……。"
101050-68 = "さ、最近は……塩漬け肉の缶詰ばっかりだったから……"
101050-69 = "どうせ冷蔵庫も無いし、貰ったお肉全部焼いちゃおっか！"
101050-73 = "……平和ですね。"
101050-74 = "ああ。この焚き火を眺めてると、まるでキャンプにでも来たみたいだ。"
101050-75 = "ふふっ……そう思うと、なんだか楽しい。"
101050-76 = "最近はヴァルキューレも連邦生徒会も静かですし……"
101050-77 = "シャーレの先生からも、連絡がありませんね。"
101050-78 = "ま、連絡してきても出る気ないけどね。"
101050-79 = "ま、まぁ……私たちは先生なんかいなくてもやっていけるからな！"
101050-80 = "で、でも、たまには連絡ほしいかも……。"
101050-84 = "……キヴォトスの生徒にとって、何も無いのはいいことだと思います。"
101050-85 = "それはそうだが、やはり私たちには……"
101050-86 = "うん……"
101050-91 = "あ、そうだ。前にもらったサイダー、飲む？"
101050-92 = "冷蔵庫が無いから噴水に入れておいたんだけど……#n今ならすっごく冷えてると思うし！"
101050-93 = "それって、前に不良を追い払った時にソラからもらったヤツか？"
101050-94 = "久々の炭酸飲料だから「大事な日に飲む」と言ってた記憶があるんだが……"
101050-95 = "だから、今日こそ飲むべきでしょ！#nこんな美味しい焼き鳥を食べられる日、そうそうないよ？"
101050-96 = "今日は宴だよ！#nよーし！こうなったら、取っておいたキノコも焼いちゃえー！"
101050-97 = "……そうだな。#nでは早速持ってくるとしよう。"
101050-102 = "わ、私も行く……！"
101050-108 = "防衛室・オフィス"
101050-111 = "こっちの通信が鳴るとは……"
101050-112 = "……。 "
101050-116 = "……どうぞ。"
101050-117 = "……。"
101050-118 = "……そうですか、分かりました。"
101050-122 = "……いよいよ、始まるのですね。"
101050-125 = "ゲマトリア・会議室"
101050-129 = "――「色彩」がこちらに向かっている……？"
101050-131 = "ええ。そうしたら「シャーレ」も、「名もなき神」も、「箱舟」も全て消え失せる。#nいかがでしょうか？これが最も確実な方法かと。"
101050-132 = "その場合、「色彩」はこのキヴォトスをも消し去るだろうな。"
101050-133 = "……マダムは、わたくし達の探求を台無しにするおつもりで？"
101050-134 = "ええ、探究など、どうなっても構いません。#n私が本当に求めていたものは、別のものだということに気がついたのです。"
101050-135 = "……。"
101050-137 = "一部ではありましたが、儀式を通じて「色彩」と接触した際に、#n私が本当に求めているものを悟ったのです。"
101050-138 = "為すべきこと……それは、くだらない実験や探求ではない。#nそう……偉大なる存在になるためには――"
101050-139 = "世界の滅亡と、創成の権限を所有しなくては……#nそう、「破壊」し、「創造」する絶対者になるのです。これこそが唯一の方策……"
101050-140 = "解釈されず、理解されず、疎通されず――ただ到来するだけの不吉な光。#n目的も疎通もできない不可解な観念……ああ、そう――それこそが、"
101050-141 = "あの、[USERNAME]先生を消し去る方法……"
101050-142 = "何という体たらく。#n理性を失ったか、ベアトリーチェ。"
101050-143 = "……そうですか、マダム。あなたは自分の憎悪に飲み込まれてしまったのですね。#n……とても残念です。"
101050-144 = "ゲマトリアは探求者であり、求道者……狂気こそ、我々が打破すべき宿敵なのですが……ベアトリーチェ、あなたはゲマトリアの資格を失いました。"
101050-146 = "口を慎みなさい……私には、「色彩」の力が宿っているのですよ？"
101050-147 = "あなた方があれほど恐れていた、狂気の力が――"
101050-148 = "そのようですね。#nゴルコンダ、彼女を送り届けてください。"
101050-149 = "はい。#n――楽しい時間でしたよ、マダム。"
101050-154 = "……！？"
101050-157 = "……くっ、ぐあぁぁああ――！？"
101050-158 = "ふむ、ヘイロー破壊の爆弾より確実なようですね。"
101050-159 = "ええ、神秘は解析ができないからこそ「神秘」ですが、#n彼女は分かりやすい存在ですので。"
101050-160 = "ああぁぁぁああああっ！！！ "
101050-161 = "我々に「色彩」への対抗手段が無いと思っていたのですか？#n……あなたが「色彩」と接触したと聞いた時から準備しておりましたよ。"
101050-162 = "そういうこったぁ！！"
101050-163 = "貴下とは異なる世界観を持っているがゆえに、何かと衝突が多かったな。#nだが、貴下の野望には敬意を表そう、ベアトリーチェ。"
101050-164 = "――――――！！"
101050-174 = "……。"
101050-175 = "残念です。神たらんと声を上げるエキストラは、いずれこうなる運命にあることを知らなかったのでしょうか？嗚呼、彼女に詩歌への造詣があったのなら…… "
101050-176 = "狂気に染まった彼女が、果たしてどのような怪物へと変貌を遂げるのか――#n気になってはいたが……このままではさらなる厄災に転じていただろう。"
101050-177 = "また席が空いてしまいましたね。#n次の人員については、後ほど議論するといたしましょう。"
101050-180 = "それでは次の議題を――"
101050-181 = "……。"
101050-182 = "……。"
101050-184 = "次回;前兆"
