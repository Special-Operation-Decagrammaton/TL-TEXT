[translation]
10048110-1 = "Epílogo; Apenas uma palavra"
10048110-2 = "Café de Doces"
10048110-5 = "Hmmmm!"
10048110-6 = "Que delícia!"
10048110-7 = "Ahhh..."
10048110-8 = "[s] \"Fufu. É bem melhor comer aqui na loja, não é?\""
10048110-9 = "Sim. Com certeza é ainda mais gostoso do que aquele de antes!"
10048110-10 = "Tem um sabor muito profundo...!"
10048110-11 = "Deveria ser doce, mas não é enjoativo."
10048110-12 = "Chefe. Não acha que é injusto que só nós possamos saborear isso?"
10048110-13 = "Que tal deixar as pobres alunas de Wild Hunt#nexperimentarem esse sabor também?"
10048110-14 = "Por favor, poderia considerar este plano comercial!?"
10048110-15 = "...Até nessas horas você fala de clube!?"
10048110-16 = "[s] \"Como esperado da chefe de vendas...\""
10048110-17 = "Ei, Miyo-chan. É sempre tão fácil entrar e sair quando se está com o Sensei?"
10048110-18 = "Sim. Como o Sensei garante nossa identidade, a equipe de monitoramento do dormitório não pode fazer nada."
10048110-19 = "É por isso que também posso ir ao plantão do Schale."
10048110-20 = "Por isso... S-Sensei, muito obrigada."
10048110-21 = "Mesmo depois de ter passado por tanta coisa por nossa causa...#nainda nos convidou para algo tão gostoso..."
10048110-22 = "[s1] \"Deve ter sido difícil, e quando estamos cansados, precisamos de açúcar!\"\n[s2] \"Doces resolvem qualquer problema!\""
10048110-25 = "“Difícil”... é."
10048110-26 = "Depois de tudo o que fizemos, a receita desta vez foi zero... ai, ai."
10048110-27 = "Não, foi negativo. Temos os custos de mão de obra e das armadilhas."
10048110-28 = "Droga..."
10048110-29 = "Mas foi divertido, não foi?#nA negociação final entre a Miyo-chan e a ladra foi muito legal!"
10048110-30 = "L-legal... não, que isso..."
10048110-31 = "Mas, bem, foi um pouco surpreendente."
10048110-32 = "Ouvir da boca da Miyo que iríamos enganar o cliente."
10048110-33 = "Foram eles que tentaram nos enganar primeiro."
10048110-34 = "Nesse caso, temos que dar o troco, né?"
10048110-35 = "Uau."
10048110-36 = "Olho por olho, dente por dente, não é?"
10048110-37 = "Sabe, Miyo, acho que você tem talento para isso."
10048110-38 = "C-cala a boca...!"
10048110-40 = "Mas Miyo-chan, como você sabia que todos iriam para o lado do original?"
10048110-41 = "Graças à Ric-chan."
10048110-42 = "Hm? Eu?"
10048110-43 = "Lembra o que você disse quando viu a falsificação de “Quem admira o roxo e o azul” pela primeira vez?"
10048110-44 = "Hmm...?"
10048110-46 = "Ah."
10048110-47 = "Que bonito."
10048110-49 = "A Ric-chan olhou para aquilo e disse “que bonito”."
10048110-50 = "A gente costuma dizer “que bonito” quando vê acessórios ou enfeites, né?"
10048110-51 = "Mas não é algo que se diz ao ver uma pintura grandiosa."
10048110-52 = "...Ou seja, Ric-chan, você não percebeu inconscientemente que aquilo era falso?"
10048110-53 = "...!"
10048110-54 = "Será!?"
10048110-55 = "Por isso, pensei que talvez todos os outros...#npudessem distinguir o original do falso inconscientemente."
10048110-56 = "Além disso, se colocássemos o falso ao lado do original..."
10048110-57 = "Achei que eles notariam a diferença com mais facilidade."
10048110-58 = "É como comer uma comida ruim junto com uma comida gostosa."
10048110-59 = "Por isso eu sugeri expor as duas ao mesmo tempo."
10048110-60 = "Chegar a esse ponto por causa de um comentário casual..."
10048110-61 = "Realmente, só sendo um esquisito para ser escritor mesmo."
10048110-62 = "Por que você chegou a essa conclusão!?"
10048110-63 = "Bem, de qualquer forma, pelo menos não terminou em um resultado ruim..."
10048110-64 = "Depois de tanto esforço, acabei trabalhando de graça..."
10048110-65 = "Ugh... Minha Cutie Berry 87..."
10048110-66 = "Se eu tivesse recebido a recompensa, ela estaria na minha mesa agora..."
10048110-67 = "Ah, quanto a isso, não se preocupe."
10048110-68 = "Ainda estava à venda."
10048110-69 = "...Bem, não parece que vai vender tão cedo."
10048110-70 = "Hã!?"
10048110-71 = "Pode parar de insultar minha Cutie Berry?"
10048110-72 = "É que as pessoas ainda não perceberam o verdadeiro charme da máquina de escrever!"
10048110-73 = "Um dia... no dia em que todos entenderem aquela beleza!"
10048110-74 = "Eles vão se arrepender amargamente de não terem comprado!"
10048110-78 = "[ns] \"...Sinto que já ouvi uma história parecida antes.\""
10048110-79 = "Eu também sinto que já ouvi!"
10048110-80 = "Então, Fuyu, traga logo o próximo pedido."
10048110-81 = "Desta vez, custe o que custar, eu vou conseguir a Cutie Berry 87...!"
10048110-82 = "E então, dissolver o Departamento de Comércio Especial..."
10048110-83 = "Ei, a Ricchan vai ouvir."
10048110-84 = "Hm? Do que vocês estão falando?"
10048110-86 = "(E assim, o cotidiano do Departamento de Comércio Especial continua)"
10048110-87 = "Arte para quem? ~A pintura falsa e o paradeiro da estética~"
