[translation]
10048110-1 = "エピローグ;たったひと言"
10048110-2 = "スイーツカフェ"
10048110-5 = "んん～～っ！"
10048110-6 = "おいひ～～！"
10048110-7 = "はぁぁん……。"
10048110-8 = "[s] \"ふふっ。やっぱりお店で食べる方がいいでしょ？\""
10048110-9 = "はい。たしかにあの時のものより、さらにおいしいです！"
10048110-10 = "とても深い味がしますね……！"
10048110-11 = "甘いはずなのに、くどくなくて。"
10048110-12 = "部長。これを私たちだけが味わうのはあんまりだと思いませんか？"
10048110-13 = "不憫なワイルドハント生たちにも！#nこの味を体験させてあげるのはいかがでしょう？"
10048110-14 = "ぜひ、こちらの貿易プランをご一考いただけませんか！？"
10048110-15 = "……こういう時まで部活の話！？"
10048110-16 = "[s] \"さすが、営業室長……。\""
10048110-17 = "ねえミヨちゃん。先生と一緒だと、こんなに自由に出入りできるものなの？"
10048110-18 = "うん。先生が身元の保証をしてくれてるから、寮監隊も手出しできない。"
10048110-19 = "だからシャーレ当番にも行けるんですよ。"
10048110-20 = "なので……せ、先生、ありがとうございます。 "
10048110-21 = "私たちのせいで大変な思いをされたのに……#nこんなおいしいものまで、ご馳走してくださって……。"
10048110-22 = "[s1] \"大変だったろうし、疲れた時は糖分が必要だよね！\"\n[s2] \"甘いものはなんでも解決してくれるんだ！\""
10048110-25 = "「大変」……ねぇ。"
10048110-26 = "あれだけやったのに、今回の収入はゼロ……とほほ。"
10048110-27 = "いや、マイナスだよ。私たちの人件費と罠の費用がありますから。"
10048110-28 = "くっ……。"
10048110-29 = "でも面白かったよー？#n最後のミヨちゃんと怪盗ちゃんとの取引、カッコよかったし！"
10048110-30 = "か、かっこいいなんて……そん、な……。"
10048110-31 = "まあでも、ちょっとビックリしたよね。"
10048110-32 = "ミヨの口から、依頼人を騙す、なんて言葉が出るなんて。"
10048110-33 = "先に騙したのはあっちですから。"
10048110-34 = "それならやり返さないと、ね。"
10048110-35 = "ひゅーっ。"
10048110-36 = "目には目を、ってことですね！"
10048110-37 = "やっぱさ、ミヨは素質あると思うよ。"
10048110-38 = "う、うるさい……！"
10048110-40 = "でもミヨちゃん。どうしてみんなが本物の方に行くって分かったの？"
10048110-41 = "リッちゃんのおかげです。"
10048110-42 = "ん？ボク？"
10048110-43 = "『誰が紫、青を愛でるのか』の贋作を初めて見た時、なんて言ったか覚えていますか？"
10048110-44 = "ん～……？"
10048110-46 = "おー。"
10048110-47 = "綺麗だね。"
10048110-49 = "リッちゃんはあれを見て「綺麗」と言った。"
10048110-50 = "綺麗って、アクセサリーとか装飾品を見た時によく言うよね。"
10048110-51 = "でも、壮大な絵を見た時に出るものじゃないかなって。"
10048110-52 = "……つまりリッちゃんは、無意識にあれがニセモノって気づいたんじゃないですか？"
10048110-53 = "……！"
10048110-54 = "そうなのかな！？"
10048110-55 = "だから、もしかしたら他のみんなも……。#n無意識に本物と偽物を見分けられるんじゃないかなって思ったんです。"
10048110-56 = "それに加えて、偽物を本物と一緒に並べたら……。"
10048110-57 = "もっと簡単に違いに気がつくんじゃないかって。"
10048110-58 = "おいしくない料理を、おいしい料理と一緒に食べるみたいに。"
10048110-59 = "だから2つを同時に展示しようって提案したんです。"
10048110-60 = "何気ないひと言からそこまで……。"
10048110-61 = "やっぱ、物書きって変態じゃないとできないんだなぁ。"
10048110-62 = "なんでそうなるの！？"
10048110-63 = "まあ、とにかく悪い結果にならずに済んだけど……。"
10048110-64 = "苦労した割に、ただ働きになっちゃった……。"
10048110-65 = "うぅぅっ……私のキューティーベリー87……。"
10048110-66 = "報酬さえもらえてれば、今ごろ机の上に……。"
10048110-67 = "ああ、それなら大丈夫だよ。"
10048110-68 = "あれ、まだ売ってたから。"
10048110-69 = "……まあ、売れなさそうだし。"
10048110-70 = "はぁ！？"
10048110-71 = "私のキューティーベリーを侮辱しないでくれます？"
10048110-72 = "まだみんな、タイプライターの真の魅力に気づいてないだけですから！"
10048110-73 = "いつか……いつかみんなが、あの美しさを理解する日には！"
10048110-74 = "あれを買わなかったこと、絶対後悔するんですからっ！"
10048110-78 = "[ns] \"……なんか、似たような話を聞いたような。\""
10048110-79 = "ボクも聞いた気がする！"
10048110-80 = "だからフユ、はやく次の依頼を持ってきてください。"
10048110-81 = "今度こそ、なんとしてもキューティーベリー87を……！"
10048110-82 = "そうしたら特殊交易部を解体……。"
10048110-83 = "こら、リッちゃんに聞こえるよ。"
10048110-84 = "ん？なんの話ー？"
10048110-86 = "（そうして今日も、特殊交易部の日常は続いていく）"
10048110-87 = "誰が為の芸術 ～偽飾の絵画と美学の行方～"
