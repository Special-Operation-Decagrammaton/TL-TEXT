[translation]
52115-1 = "Episódio 11; O Caminho para o Outro Lado"
52115-2 = "Distrito Norte - Campo de Neve"
52115-4 = "――É sério mesmo que você sabe onde eles estão?"
52115-5 = "Sim. Eu não expliquei antes?"
52115-9 = "Sim. Eu não expliquei antes?"
52115-11 = "Não, não explicou."
52115-12 = "V, você saiu correndo tão de repente que foi difícil te acompanhar......"
52115-17 = "Desculpem, desculpem! Ouvi dizer que espíritos malignos e o Crepúsculo ficam mais fortes na escuridão......"
52115-18 = "Fiquei ansiosa para chegarmos antes do anoitecer."
52115-19 = "O esconderijo do Clube das Flores, Pássaros, Vento e Lua fica aqui perto?"
52115-20 = "A Shuro-san não disse nada sobre isso, mas......"
52115-21 = "Olhando para aquela Genryou Tsukumogami, eu percebi."
52115-26 = "Olhem, vejam o cabo. Tem uma marca gravada, não tem?"
52115-27 = "Quando um Tsukumogami apareceu perto da cidade e causou um tumulto, eu gravei marcas diferentes em vários objetos velhos e os coloquei nas entradas da cidade."
52115-28 = "Se um Tsukumogami nasce do livro misterioso do Clube das Flores, Pássaros, Vento e Lua, ao verificar a marca do objeto original, podemos saber onde eles estiveram."
52115-30 = "Entendo, que estratégia engenhosa......"
52115-32 = "Pensar em um plano desses em vez de apenas ser atacada...... como esperado da presidente da Hyakkaryouran!"
52115-33 = "Então, estamos indo na direção em que você deixou aquele guarda-chuva?"
52115-35 = "Sim, eu deixei esse guarda-chuva com a marca na entrada norte da cidade."
52115-36 = "O lado norte é um campo de neve que se estende até onde a vista alcança, não parece haver nenhum esconderijo aqui, mas......"
52115-37 = "Os moradores da cidade dizem que, caminhando por cerca de meio dia, existe uma casa antiga."
52115-38 = "Do outro lado do campo de neve...... deve ser a 'Mansão Higantei'."
52115-43 = "......Só pelo nome, já sinto uma atmosfera sinistra."
52115-44 = "Dizem que foi a mansão de uma família nobre que governava toda esta região. #n Ela foi abandonada nas últimas décadas e tornou-se uma ruína."
52115-45 = "Mas, justamente por ser um lugar assim......"
52115-46 = "Talvez seja um bom esconderijo."
52115-47 = "Talvez a Hyakumonogatari que foi vista por aqui também esteja lá......"
52115-48 = "[s1] \"Será que podemos ir sem nenhum preparo?\"\n[s2] \"E se houver uma armadilha......\""
52115-54 = "Está tudo bem! O que é para ser feito, deve ser feito imediatamente, certo?"
52115-55 = "E eu não aguento mais ser enganada!"
52115-56 = "Além disso, mestre, desta vez temos a poderosa presidente Ayame conosco!"
52115-57 = "Sim! Vamos escrever mais uma página da lendária e invencível Hyakkaryouran aqui!"
52115-58 = "No entanto, a Hyakumonogatari não deve ser algo tão simples de derrotar......"
52115-62 = "É verdade. Vocês duas não esqueceram, né? Armas normais não funcionam contra a Hyakumonogatari."
52115-63 = "Apenas alguém que recebeu a qualificação da Grande Profeta Kuzunoha-sama pode derrotar a 'História de Fantasma' nascida do livro misterioso."
52115-64 = "Não querendo desmerecer, mas mesmo a presidente Ayame não conseguiria lutar sem a Hyakuren."
52115-65 = "S, será? Mais do que eu, a Ayame......"
52115-66 = "Para começar...... como vocês acharam que a presidente poderia derrotar a Hyakumonogatari sem nós?"
52115-68 = "É verdade......"
52115-69 = "Mesmo que eu não pudesse enfrentar a 'História de Fantasma', pensei que poderia dar um jeito em quem controla o livro misterioso."
52115-70 = "'Dar um jeito'......? Uma presidente da Hyakkaryouran desafia uma luta sem nenhum plano?"
52115-71 = "Mas, como dizem, 'quem não arrisca não petisca', né?"
52115-72 = "Além disso...... eu confiava na Nagusa."
52115-77 = "......Em mim?"
52115-78 = "Ao ver a Nagusa manejando a Hyakuren, eu percebi."
52115-79 = "Que esta é a sucessora reconhecida pela Grande Profeta Kuzunoha-sama."
52115-80 = "Sem dúvida, era uma postura digna da presidente do Comitê de Mediação de Conflitos Hyakkaryouran."
52115-81 = "I, isso... comparada a você, Ayame, eu sou apenas......"
52115-82 = "Não se menospreze, Nagusa."
52115-87 = "Não gosto de ver uma amiga agindo assim."
52115-92 = "Eu sei que você se esforçou muito, sabe? Você até me superou e agora é reconhecida por todos, é realmente incrível......"
52115-93 = "Eu sabia que a Nagusa floresceria um dia, então estou muito feliz."
52115-94 = "Infelizmente, eu não fui reconhecida por Kuzunoha-sama. #n Mas a Nagusa...... você tem algo que eu não tenho."
52115-95 = "Além disso, fizemos uma promessa, certo? #n Que eu estaria sempre ao seu lado."
52115-96 = "Então...... por favor, empreste-me sua força na minha última missão como presidente."
52115-103 = "Sim. Obrigada, Ayame......"
52115-105 = "Uau! Isso é que é juventude......!"
52115-106 = "......Certo! Nós também não podemos ficar para trás! Vamos mandar esse Clube das Flores, Pássaros, Vento e Lua pelos ares!"
52115-107 = "Nos mangás de esportes que eu leio, também tem desenvolvimentos emocionantes como esse!"
52115-108 = "Eu entendo o sentimento da Renge-senpai de ficar empolgada com a 'juventude'!"
52115-110 = "Haha...... parece que tudo se resolveu de um jeito bom."
52115-111 = "......Bem, se a Nagusa-senpai está de acordo, não vou tentar impedi-la."
52115-112 = "......E por que essa criança veio também?"
52115-118 = "Eu não vim porque queria! Você que me trouxe à força!"
52115-119 = "É perigoso deixar uma criança sem supervisão...... quem sabe o que ela pode fazer."
52115-120 = "E seria um problema se ela invocasse outra Hyakumonogatari com um livro misterioso enquanto não estamos olhando."
52115-122 = "Isso não é problema. O livro misterioso 'Inou Mononokeroku' que a baixinha tinha quebrou antes, né......"
52115-126 = "......Espere um pouco? Então por que tinha um Tsukumogami ontem?"
52115-130 = "......P, será que existem vários livros misteriosos!?"
52115-132 = "......É uma possibilidade. Se houvesse apenas um, eles não confiariam a uma criança assim, né?"
52115-133 = "Hã!? A Kokuriko-sama disse que eu sou uma boa menina!"
52115-137 = "Renge, Yukari. Segurem essa criança."
52115-147 = "Q, o que você pretende fazer!?"
52115-149 = "Revista corporal. Seria um problema se ela estivesse escondendo outro livro misterioso."
52115-150 = "Vou cuidar das pernas dela."
52115-158 = "Me, me soltem! Vocês vão se arrepender de fazer isso com――"
52115-164 = "......Ihi!? Fufu... kya-ha! Kya-hahahah! Pa, pare......!"
52115-165 = "Não está aqui... então deve ser aqui......?"
52115-166 = "P, pare......! #n E, eu realmente não vou te perdoar...... ihihihi!"
52115-173 = "Kikyou-senpai! Achei um livro aqui!"
52115-174 = "Muito bem, Yukari."
52115-179 = "I, isso não! Sério, não pode ver isso......!!!"
52115-180 = "Heh~? Se você diz tanto, deve ser algo muito importante."
52115-181 = "Nagusa-senpai, vamos ver logo!"
52115-183 = "Sim, bem......"
52115-193 = "Título"
52115-194 = "A Contadora de Histórias Mais Forte"
52115-198 = "Autora"
52115-199 = "Kutsuki Shura"
52115-203 = "Nem balas nem bombas,"
52115-205 = "são páreo para esse corpo de aço."
52115-207 = "Os rumores da Contadora de Histórias Mais Forte ecoam por Hyakkiyako."
52115-211 = "Ela, com seus olhos gelados,"
52115-213 = "se mistura hoje também na escuridão da noite,"
52115-215 = "seduzindo o coração das pessoas."
52115-219 = "Aqueles que se opõem pagam o preço com sangue."
52115-221 = "Com apenas um movimento de seus dedos, seus monstros subordinados,"
52115-223 = "atacam os tolos e infelizes que irritaram a Contadora de Histórias."
52115-227 = "Especialmente a arrogante Hyakkaryouran, ela não terá piedade."
52115-229 = "Eles voltarão para casa chorando."
52115-233 = "Essa é a Contadora de Histórias"
52115-234 = "definitiva que todos temem."
52115-238 = "Ah......"
52115-239 = "......Certo."
52115-240 = "Ara......"
52115-241 = "[s] \"Ehm...... Kutsuki Shura......-san?\""
52115-247 = "......Olha, Yukari, não pare."
52115-252 = "Você acabou de fingir que não viu, não foi!?"
52115-253 = "Será que... é um romance que você escreveu?"
52115-254 = "Tem um monte de leituras estranhas em furigana, né."
52115-255 = "U, uuuuuuu......!"
52115-256 = "V, vocês estão zombando de mim! Vasculhando as coisas dos outros e fazendo leitura pública de um manuscrito precioso!?"
52115-257 = "Se alguém plagiar essa obra-prima e ela fizer sucesso――"
52115-258 = "Vocês vão se responsabilizar!?"
52115-259 = "[s] \"Perdão......\""
52115-260 = "......I, isso não vai acontecer!"
52115-261 = "Não existe ninguém que consiga escrever sobre esse tema... certo!?"
52115-265 = "......Oh? Parece que você sabe. #n Sim, não importa o quão bom seja o tema, o que importa é a habilidade de escrita――"
52115-269 = "O que acharam do meu talento literário?"
52115-270 = "Tão emocionados que nem conseguem falar?"
52115-271 = "Eu, Kutsuki Shura, que escrevi 'A Contadora de Histórias Mais Forte'...... #n até eu mesma temo o meu talento."
52115-276 = "Ehm...... sobre isso...... eu......"
52115-277 = "......Vamos nos apressar. Se não chegarmos na 'Mansão Higantei' antes do anoitecer."
52115-278 = "C, certo! Comentários, deixaremos para depois......!"
52115-280 = "No fim, nenhum outro livro misterioso...... perda de tempo."
52115-281 = "B, bem...... pelo menos não é uma história que ataca as pessoas por conta própria."
52115-282 = "[s] \"O importante é ler muito e continuar escrevendo muito......!\""
52115-288 = "Uu...... uuuuuuuu......"
52115-289 = "Na~gu~saaaaaaaaah!!!"
52115-291 = "Próximo Episódio; A Miko da Família Kadenokouji"

