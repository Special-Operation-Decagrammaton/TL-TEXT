[translation]
52115-1 = "Episódio 11: O Caminho para o Além"
52115-2 = "Distrito Norte - Campos de Neve"
52115-4 = "――Sério mesmo que você descobriu onde eles estão?"
52115-5 = "Sim. Eu não tinha explicado ainda?"
52115-9 = "Sim. Eu não tinha explicado ainda?"
52115-11 = "Não explicou, não."
52115-12 = "V-você saiu correndo de repente, então foi difícil acompanhar..."
52115-17 = "Desculpe, desculpe! Ouvi dizer que os monstros e o crepúsculo ganham força na escuridão..."
52115-18 = "Fiquei ansiosa para resolver isso antes que o sol se pusesse."
52115-19 = "O quartel-general do Clube Kacho Fugetsu fica tão perto assim?"
52115-20 = "A Shuro não mencionou nada sobre isso, mas..."
52115-21 = "Eu notei ao olhar para aquilo ali."
52115-26 = "Olha, veja o cabo. Tem uma marca gravada, não tem?"
52115-27 = "Da última vez que um Tsukumogami apareceu perto da cidade e causou confusão, eu gravei marcas diferentes em vários objetos antigos e os deixei nas entradas da cidade."
52115-28 = "Se os Tsukumogami nascem dos livros estranhos do Clube Kacho Fugetsu, ao verificar a marca do objeto original, podemos saber por onde o clube passou."
52115-30 = "Entendo, que truque inteligente..."
52115-32 = "Não apenas aguentar os ataques, mas bolar uma estratégia dessas... Como esperado da presidente do Hyakkiyako Ryoran!"
52115-33 = "Então, vocês estão indo na direção onde aquele guarda-chuva foi deixado?"
52115-35 = "Isso, o guarda-chuva com essa marca foi deixado na entrada norte da cidade."
52115-36 = "O lado norte é um campo de neve a perder de vista, como você pode ver, e não parece haver nenhum esconderijo..."
52115-37 = "Os moradores disseram que há uma casa antiga a cerca de meio dia de caminhada daqui."
52115-38 = "Além dos campos de neve... você se refere a [wa:52115-38]."
52115-43 = "……Só pelo nome, já sinto uma energia ruim."
52115-44 = "Dizem que era a residência de uma família nobre que governava toda esta região. #nEstá abandonada e em ruínas há décadas."
52115-45 = "Mas, justamente por ser um lugar assim..."
52115-46 = "Talvez seja um bom esconderijo."
52115-47 = "Pode ser que os Hyakki Yagyo vistos por perto também estejam lá..."
52115-48 = "[s1] \"Será que é seguro ir sem preparação?\"\n[s2] \"E se houver alguma armadilha...\""
52115-54 = "Está tudo bem! O que tem que ser feito, deve ser feito agora, não é?"
52115-55 = "Já chega de deixá-los escapar!"
52115-56 = "Além disso, mestre, desta vez temos a poderosa presidente Ayame conosco!"
52115-57 = "Sim! Vamos escrever mais um capítulo da lenda invencível do Hyakkiyako Ryoran aqui!"
52115-58 = "No entanto, os Hyakki Yagyo não são algo que se resolva facilmente..."
52115-62 = "É verdade. Vocês duas não esqueceram, né? Armas comuns não funcionam contra os Hyakki Yagyo."
52115-63 = "Apenas aqueles que receberam a qualificação da Grande Profetisa Kuzunoha podem derrotar as \"Histórias de Fantasmas\" nascidas dos livros estranhos."
52115-64 = "Não querendo ser indelicada, mas nem mesmo a presidente Ayame conseguiria lutar sem a Hyakuren."
52115-65 = "S-será? Comparada a mim, a Ayame é..."
52115-66 = "Para começo de conversa... como você pensou que conseguiria derrotar os Hyakki Yagyo sem nós, presidente?"
52115-68 = "Pois é..."
52115-69 = "Mesmo que eu não consiga enfrentar as \"Histórias de Fantasmas\", pensei que daria um jeito na pessoa que controla os livros estranhos."
52115-70 = "\"Dar um jeito\"...? A presidente do Hyakkiyako Ryoran vai desafiar uma luta sem um plano?"
52115-71 = "Mas, como dizem, \"quem não arrisca, não petisca\", não é?"
52115-72 = "Além disso... eu confiava na Nagusa."
52115-77 = "……Em mim?"
52115-78 = "Ao ver a Nagusa dominando a Hyakuren, eu percebi."
52115-79 = "Que ela era a sucessora reconhecida pela Grande Profetisa Kuzunoha."
52115-80 = "Sem dúvida, ela tinha a postura digna de uma presidente do Comitê de Mediação de Conflitos Hyakkiyako Ryoran."
52115-81 = "N-não é para tanto... comparada à Ayame, eu sou..."
52115-82 = "Não se menospreze, Nagusa."
52115-87 = "Não quero ver uma amiga agindo assim."
52115-92 = "Eu sei que você se esforçou muito, sabia? Ver que agora você me superou e conquistou o reconhecimento de todos... é realmente incrível."
52115-93 = "Eu sempre soube que você, Nagusa, iria florescer um dia, por isso estou tão feliz."
52115-94 = "É uma pena, mas eu não consegui o reconhecimento da Srta. Kuzunoha. #nMas você, Nagusa... tem algo que eu não tenho."
52115-95 = "Além disso, nós fizemos uma promessa, não fizemos? #nQue eu estaria sempre ao seu lado, Nagusa."
52115-96 = "Por isso... quero que me empreste sua força para a minha última missão como presidente do comitê."
52115-103 = "Sim. Obrigada, Ayame..."
52115-105 = "Uau! Isso sim é juventude...!"
52115-106 = "...Muito bem! Nós também não podemos ficar para trás! Vamos aproveitar esse embalo e acabar com o Clube Hanachoufugetsu!"
52115-107 = "Até nos mangás de esportes que eu li, existiam momentos tão intensos quanto este!"
52115-108 = "Eu entendo perfeitamente o sentimento da veterana Renge ao se empolgar com a 'juventude'!"
52115-110 = "Haha... de alguma forma, as coisas acabaram se encaixando muito bem."
52115-111 = "...Bem, se a veterana Nagusa está de acordo, não vou tentar impedi-la."
52115-112 = "...Mas, por que essa criança veio também?"
52115-118 = "Eu não vim porque quis! Vocês que me trouxeram à força!"
52115-119 = "É perigoso deixar uma criança sozinha... nunca se sabe o que ela pode aprontar."
52115-120 = "Não podemos correr o risco de ela invocar outra 'Hyakki Yagyou' com um livro amaldiçoado enquanto não estamos olhando."
52115-122 = "Acho que isso não é problema. O livro amaldiçoado que a pirralha tinha foi destruído antes..."
52115-126 = "...Espere um pouco. Então por que ainda havia um Tsukumogami ontem?"
52115-130 = "...N-não me diga que existem vários desses livros amaldiçoados!?"
52115-132 = "...É uma possibilidade. Se houvesse apenas um, não confiariam a uma criança como ela, certo?"
52115-133 = "Hã!? A Srta. Kokuriko diz que eu sou uma boa menina!"
52115-137 = "Renge, Yukari. Segurem ela."
52115-147 = "O-o que vocês pretendem fazer!?"
52115-149 = "Revista corporal. Seria um problema se você estivesse escondendo outros livros amaldiçoados."
52115-150 = "Então eu cuido das pernas."
52115-158 = "M-me soltem! V-vocês não vão sair impunes por fazerem isso—"
52115-164 = "...Ihi!? Fufu... Kya-ha! Kya-hahaha! P-pare com isso...!"
52115-165 = "Não está aqui... então, será que está aqui...?"
52115-166 = "P-pare com isso...! #nEu, eu realmente, kya-ha... não vou perdoar vocês... ihihihi!"
52115-173 = "Veterana Kikyou! Achei um livro do tamanho de um bolso aqui!"
52115-174 = "Muito bem, Yukari."
52115-179 = "I-isso não! Sério, não pode...!!!"
52115-180 = "Ora, ora? Se você está insistindo tanto, deve ser algo importante."
52115-181 = "Veterana Nagusa, vamos dar uma olhada logo!"
52115-183 = "Sim, vejamos..."
52115-193 = "[log]Título[/log]"
52115-194 = "[log]O Maior Contador de Histórias de Terror[/log]"
52115-198 = "[log]Autor[/log]"
52115-199 = "[log]Kuchiki Shura[/log]"
52115-203 = "[log]Nem as balas nem as bombas que chovem,[/log]"
52115-205 = "[log]são páreo para sua vontade de aço.[/log]"
52115-207 = "[log]O boato mais forte ecoa por Hyakki Yagyou.[/log]"
52115-211 = "[log]Ela, com olhos como [wa:####],[/log]"
52115-213 = "[log]se mistura à escuridão hoje também,[/log]"
52115-215 = "[log]confundindo os corações das pessoas.[/log]"
52115-219 = "[log]Aqueles que se opõem pagarão o preço.[/log]"
52115-221 = "[log]Com um aceno de seus dedos, seus subordinados,[/log]"
52115-223 = "[log]atacam os tolos que a irritaram.[/log]"
52115-227 = "[log]Especialmente os insolentes, ela não perdoa.[/log]"
52115-229 = "[log]Eles voltam para casa chorando.[/log]"
52115-233 = "[log]それが、誰もが[/log]"
52115-234 = "[log]怖がる究極[/log]"
52115-238 = "Ah... entendi."
52115-239 = "……Sim."
52115-240 = "Ora, ora..."
52115-241 = "[s] \"Err... Srta. Kuchiki Shura?\""
52115-247 = "……Vamos, Yukari, não pare de trabalhar."
52115-252 = "Você acabou de fingir que não viu, não foi!?"
52115-253 = "Por acaso... esse é um romance que você mesma escreveu?"
52115-254 = "Tem um monte de furigana estranho aqui."
52115-255 = "U-u-u-u-u...!"
52115-256 = "S-seus idiotas! Como ousam revirar as coisas dos outros e ler em voz alta!?"
52115-257 = "Se alguém plagiar essa obra-prima e ela fizer sucesso..."
52115-258 = "Vocês vão assumir a responsabilidade por isso, é!?"
52115-259 = "[s] \"Peço perdão...\""
52115-260 = "……I-isso não vai acontecer!"
52115-261 = "Não tem muita gente que conseguiria escrever sobre esse tema... né!?"
52115-265 = "……Oh? Parece que você entende. #nSim, não importa o quão bom seja o tema, o que realmente importa é—"
52115-269 = "O que acharam depois de terem tido contato com o meu talento literário?"
52115-270 = "Estão tão emocionados que nem conseguem falar, não é?"
52115-271 = "Eu, Kuchiki Shura, que escrevi a \"maior história de terror de todas\"... #nAté eu me assusto com o meu próprio talento."
52115-276 = "Err... bem... eu..."
52115-277 = "……Vamos nos apressar. Precisamos chegar na \"Mansão Higan\" antes do anoitecer."
52115-278 = "I-isso mesmo! Deixaremos os comentários para depois...!"
52115-280 = "No fim, não tinha mais nenhum livro de terror... Foi perda de tempo."
52115-281 = "B-bem... pelo menos... foi bom que não fosse uma história que ataca as pessoas por conta própria."
52115-282 = "[s] \"O importante é ler muito e continuar escrevendo muito...!\""
52115-288 = "Uuu... uuuuuu..."
52115-289 = "NA-GU-SAAAAAAA!!!"
52115-291 = "Próximo episódio: A Miko da Família Kadenokouji"
