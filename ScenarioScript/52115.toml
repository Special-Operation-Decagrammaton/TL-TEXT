[translation]
52115-1 = "第11話;彼岸へと至る道"
52115-2 = "北部自治区・雪原"
52115-4 = "――奴らの居場所がわかったって、ほんとか？"
52115-5 = "うん。説明してなかったっけ？"
52115-9 = "うん。説明してなかったっけ？"
52115-11 = "されてないよ。"
52115-12 = "と、突然飛び出されたので、ついていくのが大変でしたわ……。"
52115-17 = "ごめんごめん！魑魅魍魎や黄昏は闇の中で力を増すって聞くから……。"
52115-18 = "日が暮れる前にって、つい焦っちゃった。"
52115-19 = "花鳥風月部の本拠地が、こんな近場にあるの？"
52115-20 = "シュロさんは何もおっしゃっていませんでしたが……。"
52115-21 = "そこの[ruby=げんりょうつくもがみ]幻魎付喪神[/ruby]を見ていて、気づいたんだ。"
52115-26 = "ほら、持ち手を見て。印が入ってるでしょ？"
52115-27 = "以前、町の近くに付喪神が現れて騒ぎになったとき、私はそこら中の古びた物に別々の印を刻んで、町の出入口に置いたの。"
52115-28 = "付喪神が花鳥風月部の怪書によって生まれるのなら、その元となったものの印を確認すれば、花鳥風月部がどこを訪れたかわかる。"
52115-30 = "なるほど、そんな手が……。"
52115-32 = "やられっぱなしでなく、そんな奇策を思いついていたなんて……さすが、百花繚乱の委員長ですわ！"
52115-33 = "じゃあ、その傘を置いた方向に向かってるの？"
52115-35 = "そう、この紋様を刻んだ傘は、町の北側の出入り口に置いてたんだ。"
52115-36 = "北側はこの通り見渡す限りの雪原で、隠れ家はなさそうなんだけど……。"
52115-37 = "街の人いわく、半日くらい歩いた場所に、古民家があるんだって。"
52115-38 = "雪原の向こう……「[ruby=ひがんてい]彼岸邸[/ruby]」のことですね。"
52115-43 = "……なんか、名前だけでいや～な雰囲気だな。"
52115-44 = "かつて、ここ一帯を治めていた名家の邸宅だったとか。#nここ数十年の間放置され、廃墟となっていますね。"
52115-45 = "でも、そんな場所だからこそ……。"
52115-46 = "隠れ家には向いてるかもね。"
52115-47 = "もしかすると、近くで目撃された百物語もそこに……。"
52115-48 = "[s1] \"準備もなしに行って大丈夫かな？\"\n[s2] \"なにか罠があったら……。\""
52115-54 = "大丈夫！思い立ったが吉日、だろ？"
52115-55 = "もう逃げられるのはごめんだし！"
52115-56 = "それにさ、師匠。今回は最強のアヤメ委員長もついてるんだ！"
52115-57 = "ええ！無敵の百花繚乱伝説のいちぺーじを、ここに刻みますの！"
52115-58 = "しかし、百物語は一筋縄ではいかないはず……。"
52115-62 = "そうだよ。二人とも忘れてないよね？百物語に普通の銃は通じない。"
52115-63 = "怪書から生まれた「怪談」を倒せるのは、大預言者クズノハ様から資格を与えられた者だけ。"
52115-64 = "こう言ってはなんだけど、いくらアヤメ委員長でも百蓮がなければ戦えない。"
52115-65 = "そ、そうかな？私なんかより、アヤメの方が――"
52115-66 = "そもそも……私たち抜きで、委員長はどうやって百物語を倒せると思ったの？"
52115-68 = "そうだねぇ……。"
52115-69 = "「怪談」には太刀打ちできなくても、怪書を操る子の方はなんとかなるかなって。"
52115-70 = "「なんとか」……？百花繚乱の委員長が、策もなしに戦いを挑むの？"
52115-71 = "でもさ、「身を捨ててこそ浮かぶ瀬もあれ」って言うでしょ？"
52115-72 = "それに……私はナグサを信じてたから。"
52115-77 = "……私を？"
52115-78 = "百蓮を使いこなすナグサを見て、気がついたの。"
52115-79 = "これが、大預言者クズノハに認められた継承者なんだなって。"
52115-80 = "間違いなく、百花繚乱紛争調停委員会の委員長にふさわしい姿だった。"
52115-81 = "そ、そんな……アヤメに比べたら、私なんて……。"
52115-82 = "自分を卑下しないでよ、ナグサ。"
52115-87 = "友達のそんな姿見たくないよ。"
52115-92 = "ずっと頑張ってたのだって、知ってるよ？今では私を追い越して、みんなに認められてるなんて、本当に凄い……。"
52115-93 = "ナグサはいつか絶対に花開くんだって思ってたから、嬉しいんだ。"
52115-94 = "残念だけど、私はクズノハ様に認めてもらえなかった。#nでもナグサは……私にはない何かを持ってるんだよ。"
52115-95 = "それに、約束したでしょ？#nナグサのそばに、ずっといるって。"
52115-96 = "だから……私の委員長としての最後の任務に、力を貸して欲しいんだ。"
52115-103 = "うん。ありがとう、アヤメ……。"
52115-105 = "くーっ！これぞ青春だ……！"
52115-106 = "……よーし！アタシらも負けてらんないな！この勢いで花鳥風月部をぶっ飛ばそう！"
52115-107 = "身共が読んだすぽーつ漫画でも、こんな熱い展開がありましたわ！"
52115-108 = "レンゲ先輩が「青春」に心躍らせるお気持ち、わかりますの！"
52115-110 = "はは……なんだか、いい感じにまとまっちゃいましたね。"
52115-111 = "……まあ、ナグサ先輩がいいなら無理には止めないよ。"
52115-112 = "……で、なんでこの子も来たの？"
52115-118 = "来たくて来たんじゃないですぅ！勝手に連れてきたくせにっ！"
52115-119 = "子どもから目を離しちゃ危ないからね……何しでかすかもわからないし。"
52115-120 = "私たちがいない隙に、また怪書で百物語を呼び出されても困るから。"
52115-122 = "そりゃ大丈夫だろ。おチビの持ってた怪書「[ruby=いのうもののけろく]稲生物怪録[/ruby]」は前にぶっ壊れたし……。"
52115-126 = "……待てよ？じゃあなんで、昨日も付喪神がいたんだ？"
52115-130 = "……も、もしや、怪書は何冊もあるんですの！？"
52115-132 = "……あり得る話だね。一冊しかないなら、こんな子に任せないでしょ？"
52115-133 = "はぁっ！？コクリコ様は手前をいい子だって言ってますぅ！"
52115-137 = "レンゲ、ユカリ。この子を抑えてて。"
52115-147 = "なっ、何するつもりですかぁ！？"
52115-149 = "身体検査。他の怪書を隠し持ってたら大変だからね。"
52115-150 = "じゃあ足側は私がやるね。"
52115-158 = "は、離せぇ！[ruby=てめぇ]手前[/ruby]ら、こんなことしてただで済むと――"
52115-164 = "……いひっ！？ふふっ……きゃはっ！きゃはははっ！や、やめぇっ……！"
52115-165 = "ここにはないか……じゃあ、こっち……？"
52115-166 = "や、やめてぇ……！#nほ、本当に、きゃはっ……許さないっ………いひひひっ！"
52115-173 = "キキョウ先輩！ここに文庫サイズの本が！"
52115-174 = "でかしたよ、ユカリ。"
52115-179 = "そ、それはっ！ほんとにダメですぅ……！！！"
52115-180 = "へぇ～？そこまで言うんなら、大事な物なんだな。"
52115-181 = "ナグサ先輩、早く見てみよう！"
52115-183 = "うん、ええっと……。"
52115-193 = "[log]題[/log]"
52115-194 = "[log]最強の怪談家[/log]"
52115-198 = "[log]作[/log]"
52115-199 = "[log]朽木修羅[/log]"
52115-203 = "[log]降り注ぐ銃弾も爆弾も、[/log]"
52115-205 = "[log]その鋼鉄のような[ruby=ぼでぃ]肉体[/ruby]の前には無力。[/log]"
52115-207 = "[log]最強[ruby=すとおりいてらあ]の怪談家の[/ruby]噂が、百鬼夜行に轟く。[/log]"
52115-211 = "[log][ruby=こおり]冰[/ruby]のような眼を持つ彼女は、[/log]"
52115-213 = "[log]今日も漆黒[ruby=だあくねす]の夜闇に[/ruby]紛れ、[/log]"
52115-215 = "[log]人々の心を惑わせる。[/log]"
52115-219 = "[log]逆らう者は、その代償[ruby=いのち]を血で[/ruby]払うだろお。[/log]"
52115-221 = "[log]その指の一振りで、配下[ruby=もんすたあ]の怪異た[/ruby]ちが、[/log]"
52115-223 = "[log][ruby=すとおりいてらあ]怪談家[/ruby]を怒らせた、哀れで[ruby=おばか]愚鈍[/ruby]な奴らに飛びかかる。[/log]"
52115-227 = "[log]特に、生意気な[ruby=やつら]百花繚乱[/ruby]には容赦しない。[/log]"
52115-229 = "[log]連中は、泣きながら帰っていくんだ。[/log]"
52115-233 = "[log]それが、誰もが[/log]"
52115-234 = "[log]怖がる究極[ruby=すとおりいてらあ]の怪談家。[/ruby][/log]"
52115-238 = "あー……。"
52115-239 = "……はい。"
52115-240 = "あらぁ……。"
52115-241 = "[s] \"えーっと……朽木修羅……さん？\""
52115-247 = "……ほらユカリ、手を止めないで。"
52115-252 = "今、見て見ぬふりしましたよねぇ！？"
52115-253 = "もしかして……自分で書いた小説、なの？"
52115-254 = "なんか、変なルビが多いな。"
52115-255 = "う、ううううぅぅ……！"
52115-256 = "ば、バカにしてっ！勝手に人の荷物を漁って[ruby=ぎょっこう]、玉稿を[/ruby]公開朗読ぅ！？"
52115-257 = "この傑作をもし誰かがパクッて、それが当たりでもしたら――"
52115-258 = "手前たちは責任取れるんですかぁっ！？"
52115-259 = "[s] \"失礼しました……。\""
52115-260 = "……そ、それは大丈夫だ！"
52115-261 = "この題材で書ける人は、あんまりいない……だろ！？"
52115-265 = "……おや？わかってるようですねぇ。#nそう、いくら題材が良くても、肝心なの[ruby=ひつりょく]は筆力―[/ruby]―"
52115-269 = "手前の文才に触れてみて、皆さん如何でしたかぁ？"
52115-270 = "感動のあまり、声も出ないようですねぇ？"
52115-271 = "「最強の怪談家」を書き上げた手前こと朽木修羅……。#n我ながら才能が恐ろしいですよぉ。"
52115-276 = "あの……その……身共は……。"
52115-277 = "……急ごう。日が暮れる前には「彼岸邸」に着いてないと。"
52115-278 = "そ、そうですわ！感想はの、後ほど……！"
52115-280 = "結局、他の怪書はなしか……。時間の無駄だったね。"
52115-281 = "ま、まあ……なんだ……勝手に人を襲ったりしない物語でよかったよ。"
52115-282 = "[s] \"いっぱい読んで、いっぱい書き続けるのが大事だね……！\""
52115-288 = "うぅ……ううううぅっ……。"
52115-289 = "ナ～グ～サああぁぁぁぁぁぁっ！！！"
52115-291 = "次回;勘解由小路家の巫女"
