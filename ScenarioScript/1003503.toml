[translation]
1003503-1 = "A criança desaparecida é"
1003503-8 = "Interior da Biblioteca Antiga"
1003503-9 = "[ns1] \"……Ui!\"\n[ns2] \"Que situação é essa!?\""
1003503-10 = "P-Professor!?"
1003503-11 = "P-Professor!?"
1003503-12 = "P-por favor, acalme-se! V-você está todo suado……!"
1003503-13 = "V-você por acaso veio correndo do Schale……?"
1003503-14 = "[s3] \"Não se preocupe comigo.\"\n[s4] \"Você é quem está com o rosto pálido, Ui. Está tudo bem?\""
1003503-15 = "Bem, i-isso é……"
1003503-16 = "Bem, i-isso é……"
1003503-17 = "Uuu……"
1003503-18 = "É que, veja bem……"
1003503-19 = "[s] \"Sim.\""
1003503-20 = "……"
1003503-21 = "[s] \"……?\""
1003503-22 = "U-uuh……"
1003503-23 = "Uaaaaaaa……!"
1003503-24 = "[s] \"Ui!?\""
1003503-26 = "(Enquanto consolava Ui, que começou a chorar, decidi ouvir o que ela tinha a dizer primeiro)"
1003503-28 = "P-por isso……"
1003503-29 = "Bem, n-não é exatamente o que você está pensando, Professor……"
1003503-30 = "É que um livro… um que eu sempre via por aqui, sumiu……"
1003503-31 = "Como ele deveria estar aqui dentro, eu só… p-pensei que poderíamos procurá-lo juntos……"
1003503-32 = "D-desculpe, demorei para perceber……"
1003503-33 = "Depois eu percebi que… b-bem, acabei causando um mal-entendido……"
1003503-34 = "Desculpe, eu não consegui me explicar direito……"
1003503-35 = "P-por causa do meu jeito de falar, acabei te preocupando……"
1003503-36 = "…………"
1003503-37 = "[s5] \"Não, não se preocupe.\"\n[s6] \"Não é algo pelo qual você precise se desculpar, Ui.\""
1003503-38 = "Professor……"
1003503-39 = "Professor……"
1003503-40 = "……?"
1003503-41 = "É surpreendente que eu tenha perdido um livro……?"
1003503-42 = "Ah, não, na verdade, não é que eu tenha perdido… é que, quando as outras integrantes vieram limpar, bem……"
1003503-43 = "[s7] \"Elas limpam para você…\"\n[s8] (Será que ela não é boa com limpeza……)"
1003503-44 = "E-eu acabei dormindo durante esse tempo……"
1003503-45 = "E-eu acabei dormindo durante esse tempo……"
1003503-46 = "Percebi só depois, e quando perguntei, elas disseram que não sabiam de nada……"
1003503-47 = "Como pode ver, aqui tem, bem……"
1003503-48 = "[s9] \"É uma quantidade incrível de livros, né……\"\n[s10] \"Isso vai dar um trabalhão……\""
1003503-49 = "E-então, eu pensei em pedir ajuda, mas……"
1003503-50 = "E-então, eu pensei em pedir ajuda, mas……"
1003503-51 = "Como fui muito indireta ao explicar, bem……"
1003503-52 = "D-desculpe……"
1003503-53 = "……?"
1003503-54 = "Você vai… me ajudar a procurar……?"
1003503-55 = "Mesmo depois de eu ter causado todo esse transtorno……"
1003503-56 = "Por causa do meu… jeito de falar……"
1003503-57 = "Isso não é verdade……?"
1003503-58 = "P-por que……"
1003503-59 = "[s11] \"Porque é verdade que ela é uma 'criança importante' para a Ui.\"\n[s12] \"Não tem nada de errado no jeito que você falou.\""
1003503-60 = "Sensei……."
1003503-61 = "Sensei……."
1003503-64 = "D-dizer mais lamúrias do que isso pode acabar sendo um incômodo para você……."
1003503-65 = "Então, vou aceitar sua gentileza……."
1003503-66 = "Ah, muito obrigada, Sensei. Por dizer isso……."
1003503-67 = "A 'aparência daquela criança', você diz?"
1003503-68 = "Bem……"
1003503-69 = "'Aquela criança'……."
1003503-70 = "……."
1003503-71 = "……Ah, não, desculpe. É que, b-bem, a história parece ser longa, então deixaremos para depois…… Por enquanto, vamos procurar."
1003503-72 = "Bem, quanto às características……."
1003503-73 = "(Ouvi da Ui sobre a aparência e o nome, e começamos a procurar por 'aquela criança' juntos)"
1003503-75 = "(Embora a quantidade de livros fosse maior do que eu imaginava, conseguimos encontrá-la quando o sol já estava se pondo)"
