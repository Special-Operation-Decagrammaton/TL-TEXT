[translation]
1003503-1 = "行方不明の子は"
1003503-8 = "古書館内部"
1003503-9 = "[ns1] \"……ウイ！\"\n[ns2] \"どういう状況！？\""
1003503-10 = "せ、先生！？"
1003503-11 = "せ、先生！？"
1003503-12 = "ま、まず落ち着いてください！そ、そんな汗だくで……！"
1003503-13 = "ま、まさかシャーレから走ってきたのですか……？"
1003503-14 = "[s3] \"私のことは良いから。\"\n[s4] \"ウイの方こそ顔色悪いよ、大丈夫？\""
1003503-15 = "えっと、そ、その……。"
1003503-16 = "えっと、そ、その……。"
1003503-17 = "うぅ……。"
1003503-18 = "それが、ですね……"
1003503-19 = "[s] \"うん。\""
1003503-20 = "……"
1003503-21 = "[s] \"……？\""
1003503-22 = "う、うっ……"
1003503-23 = "うあああぁぁぁぁっ……！"
1003503-24 = "[s] \"ウイ！？\""
1003503-26 = "（泣いてしまったウイを宥めつつ、まずは話を聞くことにした）"
1003503-28 = "で、ですので……。"
1003503-29 = "その、お、おそらく先生が思い描いているようなこと、ではなく……。"
1003503-30 = "いつもよく見かけていた子……本が、1冊見当たらなくって……。"
1003503-31 = "ただこの中にはあるはずなので、一緒に探せればと、お、思っただけで……。"
1003503-32 = "す、すみません、気が付くのが遅くなって……。"
1003503-33 = "後からその、ご、誤解をさせてしまったなと気が付き……。"
1003503-34 = "すみません、上手く伝えることができなくって……。"
1003503-35 = "わ、私の言い方のせいで、ご心配をおかけしてしまいました……。"
1003503-36 = "…………。"
1003503-37 = "[s5] \"ううん、気にしないで。\"\n[s6] \"ウイが謝るようなことじゃないよ。\""
1003503-38 = "先生……。"
1003503-39 = "先生……。"
1003503-40 = "……？"
1003503-41 = "私が本を失くすのが意外、ですか……？"
1003503-42 = "あ、いえ、実は失くしたと言いますか……ほ、他の部員が掃除をしてくれた時に、その……。"
1003503-43 = "[s7] \"代わりに掃除してくれるんだ……。\"\n[s8] （掃除、苦手なのかな……）"
1003503-44 = "わ、私がその間、眠ってしまい……。"
1003503-45 = "わ、私がその間、眠ってしまい……。"
1003503-46 = "後から気づいたのですが、聞いても分からないとのことで……。"
1003503-47 = "見ての通りここには、その……。"
1003503-48 = "[s9] \"すごい本の数だもんね……。\"\n[s10] \"これは骨が折れる……。\""
1003503-49 = "その、それでお願いをしようと思ったのですが……。"
1003503-50 = "その、それでお願いをしようと思ったのですが……。"
1003503-51 = "伝え方が迂遠だったせいで、その……。"
1003503-52 = "す、すみません……。"
1003503-53 = "……？"
1003503-54 = "一緒に、探してくれるんですか……？"
1003503-55 = "こんな、ご迷惑をおかけしてしまったのに……。"
1003503-56 = "私の、言い方のせいで……。"
1003503-57 = "そんなこと、ない……？"
1003503-58 = "ど、どうして……"
1003503-59 = "[s11] \"ウイにとって「大事な子」なのは本当だろうから。\"\n[s12] \"言い方が悪いなんてことは無いよ。\""
1003503-60 = "先生……。"
1003503-61 = "先生……。"
1003503-64 = "こ、これ以上泣き言を口にする方が、かえってご迷惑かもしれませんね……。"
1003503-65 = "では、お言葉に甘えて……。"
1003503-66 = "あ、ありがとうございます、先生。そう仰って、くださって……。"
1003503-67 = "「その子の見た目」、ですか？"
1003503-68 = "えっと……"
1003503-69 = "「その子」……。"
1003503-70 = "……。"
1003503-71 = "……あ、いえ、すみません。その、は、話が長くなりそうなので、これはまた後で……とりあえず探しましょうか。"
1003503-72 = "えっと、特徴としましては……。"
1003503-73 = "（ウイから見た目のことや名前を聞いて、一緒に「その子」を探し始めた）"
1003503-75 = "（想像以上の蔵書量だったものの、日が暮れた頃に何とか見つけ出すことができた）"
