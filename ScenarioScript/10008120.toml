[translation]
10008120-1 = "第12話;カイテンジャー、最後の決戦！"
10008120-2 = "か、カイテンジャー！？どうしてここでまた！？"
10008120-3 = "まさか賽銭箱の中身、とっくに横取りしてたってこと！？"
10008120-5 = "はっはっはっ！"
10008120-6 = "その通り、既に我々が頂いた！"
10008120-7 = "[s] \"……それ、何に使うつもり？\""
10008120-8 = "や、やっぱり正義のヒーローとして、義賊的な活動を……？"
10008120-9 = "ははっ、何を言っている！"
10008120-10 = "え、じゃあ……？"
10008120-11 = "我々が賽銭箱を盗んだ理由は、ただ一つ！"
10008120-12 = "我々の行く手を阻む悪党たちの攻撃によって、無残にも壊れてしまった「KAITEN FX Mk.0」……"
10008120-13 = "その「後継機」を、作るためさ！"
10008120-15 = "その名も「KAITEN FX Mk.1」！"
10008120-21 = "悪党たちの攻撃によって……？"
10008120-22 = "後継機……？"
10008120-23 = "[s1] \"あー、確かに壊したような……？\"\n[s2] \"そんなこと、あったかな……？\""
10008120-26 = "ははははっ！まあお前たちが何と言おうと、すでに賽銭箱の中身を使って新しい機体は製作済み！"
10008120-27 = "さあ、全ては無限の回転……"
10008120-28 = "すなわち、ロマンのために！"
10008120-29 = "け、結局私利私欲のためってことじゃないの！"
10008120-30 = "私利私欲ではない！私たちが描いたロマンだ！"
10008120-31 = "[s] \"それを「私利私欲」って言うんだと思うけど……。\""
10008120-36 = "つ、つまりは結局、賽銭箱の中身はもう全部使われたってこと、よね……？"
10008120-37 = "アルちゃん？"
10008120-38 = "私たちの……便利屋68の願いが……。"
10008120-39 = "それぞれ趣味を我慢したり、工事現場で肉体労働をしたりして稼いだ大切なお金が……！"
10008120-41 = "あんなやつらのために！？"
10008120-42 = "許さない、"
10008120-43 = "絶対に許さないわよ……！"
10008120-45 = "ははっ、その意気や良し。"
10008120-46 = "受けて立とうではないか！かかってこい！"
