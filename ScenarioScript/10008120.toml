[translation]
10008120-1 = "Episódio 12; Kaitenger, a batalha final!"
10008120-2 = "K-Kaitenger!? Por que vocês estão aqui de novo!?"
10008120-3 = "Não me diga que vocês já tinham roubado o conteúdo da caixa de ofertas há muito tempo!?"
10008120-5 = "Hahahaha!"
10008120-6 = "Exatamente, nós já pegamos tudo!"
10008120-7 = "[s] \"...Para que vocês pretendem usar isso?\""
10008120-8 = "V-vocês pretendem usar como heróis da justiça, em atividades de ladrões benevolentes...?"
10008120-9 = "Hah, do que você está falando!"
10008120-10 = "Eh, então...?"
10008120-11 = "A razão pela qual roubamos a caixa de ofertas é apenas uma!"
10008120-12 = "O \"KAITEN FX Mk.0\", que foi destruído miseravelmente pelos ataques dos vilões que bloqueavam nosso caminho..."
10008120-13 = "É para construir o seu \"sucessor\"!"
10008120-15 = "Seu nome é \"KAITEN FX Mk.1\"!"
10008120-21 = "Pelos ataques dos vilões...?"
10008120-22 = "Um sucessor...?"
10008120-23 = "[s1] \"Ah, é verdade, acho que destruímos mesmo...\"\n[s2] \"Será que isso aconteceu mesmo...?\""
10008120-26 = "Hahahaha! Bem, não importa o que vocês digam, já usamos o conteúdo da caixa de ofertas para construir a nova máquina!"
10008120-27 = "Vamos, tudo é pela rotação infinita..."
10008120-28 = "Ou seja, pelo romance!"
10008120-29 = "I-isso não significa que é apenas para ganho pessoal no final das contas!?"
10008120-30 = "Não é ganho pessoal! É o romance que nós idealizamos!"
10008120-31 = "[s] \"Acho que isso é exatamente o que chamam de 'ganho pessoal'...\""
10008120-36 = "E-então, no fim das contas, o conteúdo da caixa de ofertas já foi todo usado, não é...?"
10008120-37 = "Aru-chan?"
10008120-38 = "Os desejos da nossa... Problem Solver 68..."
10008120-39 = "O dinheiro precioso que ganhamos sacrificando nossos hobbies e fazendo trabalho braçal em canteiros de obras...!"
10008120-41 = "Para aqueles caras!?"
10008120-42 = "Eu não vou perdoar,"
10008120-43 = "Eu nunca vou perdoar vocês...!"
10008120-45 = "Hah, esse é o espírito."
10008120-46 = "Não vamos recuar! Venham para cima!"
