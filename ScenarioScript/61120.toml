[translation]
61120-1 = "Episódio 12; Estudo de Campo (2)"
61120-3 = "Senpai, por aqui! Naquela árvore..."
61120-8 = "Buááá... o gatinho! Buááá!"
61120-9 = "Miau..."
61120-14 = "Na árvore... um gatinho?"
61120-15 = "Entendo. Subiu, mas agora não consegue descer, não é?"
61120-16 = "Fufu. É a primeira vez que me deparo com uma situação dessas."
61120-17 = "O que devemos fazer...?#nTentei ajudar, mas não deu muito certo..."
61120-18 = "...Existe um método."
61120-19 = "Vamos resolver isso ao estilo Arius."
61120-20 = "Por favor, deem um passo para trás."
61120-24 = "MIAAAAU!?"
61120-25 = "Aaaaaah!?"
61120-29 = "Ei, o que aquela garota está fazendo!?"
61120-30 = "Ela atirou na direção do gatinho!"
61120-34 = "SHAAAAA!!!"
61120-37 = "Ah... ele se assustou e pulou da árvore!"
61120-42 = "Peguei. Agora está tudo bem."
61120-45 = "Pronto, o gatinho está aqui..."
61120-46 = "Soluço..."
61120-47 = "BUÁÁÁÁÁÁÁ!!!"
61120-48 = "Hã, quê...?"
61120-49 = "Ei, o que você tem na cabeça!?"
61120-50 = "Como você pretendia se responsabilizar se algo tivesse acontecido com o gatinho!?"
61120-51 = "I-isso é..."
61120-52 = "Criaturas assustadas não costumam se mover facilmente."
61120-53 = "Por isso, causar um medo maior é a forma de forçá-las a se mover..."
61120-54 = "Que tipo de educação é essa... de qual escola você é, afinal!?"
61120-56 = "Hm? Agora que você falou, aquele emblema... não pode ser...?"
61120-57 = "Não há dúvidas, é Arius...!"
61120-58 = "Arius? Ah, aquela que causou confusão durante o Tratado de Eden?"
61120-59 = "Por que uma encrenqueira dessas estaria em um lugar como este...?"
61120-64 = "É por isso que gente mal-educada..."
61120-65 = "Não, se for falar disso, o problema não seria a educação de Kivotos como um todo?"
61120-66 = "Dizem que é uma cidade acadêmica, mas a educação básica é negligenciada..."
61120-67 = "Mas as outras escolas não causam incidentes graves, não é?"
61120-68 = "Para começo de conversa, se estivessem em uma escola decente, não causariam aquele tipo de incidente..."
61120-69 = "É verdade. Existem muitos crimes menores, mas aquele incidente, feito com malícia...#né uma história completamente diferente..."
61120-73 = "Vamos, venha aqui...!"
61120-74 = "Não chegue perto daquelas pessoas."
61120-75 = "Por quê...?"
61120-76 = "Você é uma boa menina, então escute a sua irmã mais velha. Entendeu?"
61120-77 = "Entendi..."
61120-83 = "U-uu..."
61120-84 = "AAAAAAAH...!"
61120-85 = "Maia!?"
61120-89 = "Hm? Salário? Do que você está falando?"
61120-91 = "Isso significa que é como se não tivessem registro escolar, certo?#nHehe... parece que vou poder fazer o que quiser."
61120-93 = "...Sumam daqui. Se não pretendem aceitar o trabalho, é perda de tempo."
61120-95 = "[log]Ao sair――[/log]"
61120-97 = "[log]Eu achava que algo iria mudar.[/log]"
61120-101 = "[log]Não existe um paraíso para onde possamos fugir.[/log]"
61120-104 = "[log]Mesmo assim... eu queria ter sonhado.[/log]"
61120-107 = "[log]Que existe esperança... eu também queria ter acreditado nisso.[/log]"
61120-110 = "Por favor, recomponha-se!"
61120-114 = "Sen... pai?"
61120-115 = "Isso me traz algumas lembranças."
61120-116 = "Sinto que naquele dia também foi assim."
61120-117 = "Senpai..."
61120-118 = "Vamos nos levantar por enquanto."
61120-119 = "Se ficarmos sentados aqui desse jeito..."
61120-120 = "..."
61120-121 = "Vamos acabar chamando atenção demais."
61120-122 = "Senpai, eu..."
61120-123 = "Sim, eu entendo."
61120-124 = "Está tudo bem. Tenho certeza de que tudo vai dar certo."
61120-125 = "..."
61120-126 = "Isso não está certo. Preciso refletir. Quase acabei tendo um sonho passageiro também."
61120-127 = "Eu deveria ser a pessoa que mantém a compostura."
61120-129 = "[log]Eu espero que possamos nos tornar isso.[/log]"
61120-135 = "Ora, ora... o professor do Schale realmente não deve ser subestimado."
61120-136 = "O professor... aconteceu alguma coisa com ele?"
61120-137 = "Não, não é nada."
61120-138 = "O professor não tem culpa —"
61120-139 = "Ah, mas, em certo sentido, acho que ele é um bom adulto."
61120-140 = "Mas nem todos os adultos são assim... e o mundo não funciona dessa maneira."
61120-141 = "Senpai...?#nAconteceu alguma coisa...?"
61120-142 = "Não aconteceu nada."
61120-143 = "O gatinho desceu em segurança e voltou para o seu dono."
61120-144 = "Isso não é o suficiente?"
61120-145 = "Ah, é... verdade, né...?"
61120-146 = "Vamos voltar também."
61120-147 = "Antes que se forme uma multidão ainda maior."
61120-150 = "Hora do chá, hora do chá♪"
61120-151 = "Antigamente era só água quente... mas agora é diferente, né..."
61120-152 = "Tudo graças à Subaru-senpai."
61120-153 = "Mas beber em um lugar como este também parece um pouco diferente."
61120-154 = "Beber enquanto observamos as pessoas passando apressadas..."
61120-155 = "É um sentimento de luxo, não é!"
61120-160 = "Ufa..."
61120-161 = "[s]\"Tudo bem? Você está com uma aparência um pouco pálida.\"[/s]"
61120-162 = "Ah...!? Não, não, não é nada."
61120-163 = "[s]\"É mesmo? Mas...\"[/s]"
61120-164 = "Olá, professor. Quem diria que nos encontraríamos em um lugar como este."
61120-166 = "Hoje você trouxe bastante gente com você, não é?"
61120-172 = "Olá, professor! E olá para todos vocês que ainda não conheço!"
61120-174 = "U-uêêê!?"
61120-175 = "A-ah... o-olá...?"
61120-180 = "[ns]\"Olá. As duas estão estudando direitinho?\"[/ns]"
61120-181 = "Com certeza!"
61120-182 = "Nem os estudos, nem a manutenção da segurança da cidade podem ser negligenciados!"
61120-183 = "Ué? Eu já disse isso antes...?"
61120-184 = "Sim, você disse."
61120-185 = "Ah, é mesmo! Que bom~!"
61120-186 = "(Não entendo bem o que é que é bom, mas...)"
61120-187 = "Mas, mudando de assunto, e vocês...?"
61120-189 = "N-nós somos..."
61120-190 = "Bem, é que..."
61120-194 = "...Nós também somos alunas do Sensei."
61120-196 = "Isso não vale para nós também...?"
61120-197 = "..."
61120-198 = "Vocês são do esquadrão de Arius... não são?"
61120-200 = "!!!"
61120-201 = "..."
61120-203 = "Arius... o que é isso...?"
61120-205 = "Ah, lembrei! Acho que já ouvi falar disso antes!"
61120-206 = "Hahaha, falando nisso, naquela época também, a ás do esquadrão de vigilância e ídolo de todos, Uzawa Reisa, estava..."
61120-207 = "Sim. Isso também aconteceu."
61120-208 = "Sensei. Eu expliquei para a Reisa apenas o essencial e com o máximo de cautela possível... será que está tudo bem?"
61120-209 = "[s]\"Obrigado. Você me ajudou muito.\""
61120-210 = "Fico feliz em ajudar."
61120-217 = "(Então era assim que Trinity via aquele incidente e o pessoal de Arius...)"
61120-218 = "(...As pessoas sempre interpretam as coisas da maneira que lhes convém... Mesmo assim.)"
61120-219 = "(Hehe...)"
61120-224 = "De qualquer forma, fico aliviada em ver que vocês parecem estar se divertindo."
61120-225 = "Hã? Se somos alunas, isso não é o esperado, Suzumi-san?"
61120-227 = "..."
61120-229 = "Ué...? Eu disse algo estranho? Se disse, me desculpe!"
61120-230 = "Não, está tudo bem. Do ponto de vista de vocês, isso deve ser apenas \"o nosso problema\"."
61120-231 = "..."
61120-232 = "A propósito, você mencionou um esquadrão de vigilância... vocês fazem essas \"patrulhas\" sem receber nenhuma recompensa?"
61120-233 = "Exatamente! É o que chamamos de \"justiça que alcança onde ninguém mais chega\"!"
61120-234 = "R-Reisa-san...?"
61120-235 = "Isso é impressionante."
61120-236 = "Embora pareça que vocês estão um pouco à toa."
61120-237 = "Sim! Para ser sincera, não entendo muito bem essa história de Trinity ou Arius!"
61120-238 = "Nós só fazemos isso porque queremos fazer!"
61120-239 = "..."
61120-240 = "Por isso... aqui também, eu quero ajudar vocês por conta própria!"
61120-241 = "Sim...? Como assim?"
61120-242 = "C-como você pretende fazer isso...?"
61120-243 = "Deste jeito!"
61120-245 = "Olhem só isso também! Naquela época, as delinquentes tinham armado uma armadilha na estrada para cobrar pedágio..."
61120-246 = "Essa é a foto de quando eu fiz elas caírem de cabeça na própria armadilha!"
61120-250 = "Nossa... Então é assim que as pessoas ficam quando são enterradas de cabeça para baixo..."
61120-251 = "Que engraçado! Ahahaha!"
61120-252 = "E então... essa foto aqui é..."
61120-257 = "...Fico aliviada em ver que vocês se deram bem rapidamente."
61120-258 = "A Reisa-san é um pouco energética demais, mas..."
61120-259 = "Talvez isso tenha acabado sendo uma ajuda aqui."
61120-260 = "……。"
61120-261 = "……。"
61120-262 = "Oh...?"
61120-263 = "Será que eu disse algo indelicado...?"
61120-268 = "Ugh..."
61120-269 = "[s1]\"Não se preocupe, está tudo bem.\"\n[s2]\"Nem todo mundo consegue abrir o coração de imediato, sabe?\""
61120-272 = "Pode ser, mas..."
61120-273 = "Ainda assim... meu coração dói."
61120-279 = "Vocês duas, estão bem...?"
61120-280 = "Senpai... nós..."
61120-281 = "É que, de alguma forma..."
61120-282 = "……。"
61120-284 = "Olá! Eu sou Uzawa Reisa!#nVocê é a... Subaru-san, certo?"
61120-286 = "……。"
61120-290 = "Sim. Peço desculpas pela demora em me apresentar."
61120-291 = "Diga-me, por acaso... nós dissemos algo indelicado...?"
61120-292 = "Não, de jeito nenhum."
61120-293 = "...Na verdade, espero que eu mesma não tenha sido indelicada."
61120-294 = "Claro que não! Estou muito feliz em conhecê-la!"
61120-295 = "……。"
61120-296 = "Só de ouvir isso, sinto um peso a menos."
61120-297 = "É como se eu tivesse ouvido uma resposta que diz que, se continuarmos vivendo, tudo acabará bem..."
61120-298 = "Eu também penso assim! Afinal, o amor e a paz existem neste mundo!"
61120-299 = "……。"
61120-300 = "Posso perguntar uma coisinha? Assumindo que o amor e a paz existam..."
61120-301 = "Mas, e se tudo der errado, o que devemos fazer?"
61120-302 = "...Sim?"
61120-306 = "[ns]\"……。\""
61120-308 = "Por que estou perguntando isso de repente?#n...Apenas por acaso, eu acho."
61120-309 = "Não precisa de um motivo especial para puxar assunto, certo?"
61120-313 = "[ns3]\"Suzumi, você poderia falar um pouco?\"\n[ns4]\"Como alguém do Comitê de Vigilância, claro.\""
61120-316 = "Eu...? Hum..."
61120-317 = "Entendido, Sensei. Farei o meu melhor."
61120-318 = "Subaru-san. Nós também não vivemos com a certeza de que tudo sempre dará certo."
61120-319 = "Naturalmente, as coisas dão errado com mais frequência do que dão certo. De certa forma, acho que isso é inevitável."
61120-320 = "Mas, ainda assim, nós acreditamos."
61120-321 = "Porque vivemos com esses ideais em nossos corações."
61120-322 = "...Ideais, é?"
61120-323 = "Sim."
61120-324 = "Claro, não espero que esses ideais se realizem aqui e agora."
61120-325 = "Mas, se pudermos chegar um passo mais perto... acho que isso já é o suficiente."
61120-326 = "Se avançarmos pouco a pouco, a possibilidade de que todos alcancem esse lugar... deve aumentar, mesmo que seja só um pouquinho."
61120-327 = "Por isso, a justiça é a própria recompensa. Não sinto que precise de retribuições ou prêmios... ainda não."
61120-328 = "Isso mesmo! É exatamente isso! Como esperado da Suzumi-san!"
61120-329 = "Fufu. Entendo. Foi muito esclarecedor."
61120-333 = "(Francamente... o otimismo é algo bom. Normalmente...)"
61120-334 = "(Isso, é claro, se ignorarmos o fato de que ele só cresce em ambientes que permitem pensar assim.)"
61120-340 = "Diga, Senpai...?"
61120-341 = "Sim?"
61120-342 = "Ah... entendi."
61120-343 = "Sensei. Vou me ausentar por um momento."
61120-344 = "Vou conversar um pouco apenas com elas."
61120-345 = "[s]\"Hm? Ah, sim. Entendido...\""
61120-353 = "O que houve?"
61120-354 = "……Mesmo que eu não pergunte, já consigo imaginar mais ou menos."
61120-355 = "Deve ter sido insuportável, não é?"
61120-356 = "……Sim."
61120-357 = "Talvez isso seja uma consequência da \"aula\"..."
61120-358 = "Aula? O que quer dizer com isso?"
61120-359 = "As que conseguiram se dar bem com aquelas duas são as que tinham interesse na aula."
61120-360 = "Mas nós..."
61120-361 = "Eu consigo entender racionalmente, mas, ainda assim..."
61120-362 = "Ao ouvir aquele tipo de conversa... sinto uma raiva incontrolável..."
61120-363 = "……Tudo isso deve ser porque somos crianças más, não é?"
61120-364 = "Não. De forma alguma."
61120-368 = "Sentir isso é uma reação natural. Pelo menos, é o que eu penso."
61120-369 = "Afinal, vivemos em um mundo que elas sequer conseguem imaginar."
61120-370 = "Senpai...!"
61120-371 = "É fácil acreditar que tudo vai dar certo."
61120-372 = "Acreditar que não existe pecado no mundo — e que, mesmo o que está distorcido agora, um dia se endireitará."
61120-373 = "……Será que as coisas se resolvem tão facilmente assim?"
61120-374 = "Sabe de uma coisa? Dizem que os ricos de hoje em dia são bondosos."
61120-375 = "Dizem que têm bom caráter, são calmos e atenciosos."
61120-376 = "O motivo é simples e claro — é porque eles têm tudo e não lhes falta absolutamente nada."
61120-377 = "O mundo que eles veem deve ser, certamente, pacífico e belo."
61120-379 = "Ugh..."
61120-380 = "Nós..."
61120-382 = "Sim. Mas em algum lugar do mundo, as coisas não são nada assim."
61120-383 = "E, claro, é pedir demais esperar que elas se preocupem tanto com isso."
61120-384 = "Elas podem sentir compaixão ou pena. #nMas, no fundo, isso não passa de satisfação pessoal."
61120-385 = "……E se o inferno já estiver manifestado aqui?"
61120-386 = "Será que elas vão desviar o olhar e tentar fugir desse inferno? #nOu será que vão tentar lutar contra ele?"
61120-387 = "E então..."
61120-388 = "Por quanto tempo mais elas continuarão desviando o olhar do fato de que... #nelas mesmas são as responsáveis por criar a história desse inferno?"
61120-389 = "Se, Senpai!? V-você está bem...!?"
61120-390 = "Agora há pouco... seu rosto...!?"
61120-392 = "Hã? O que tem o meu rosto?"
61120-397 = "N-não... não é nada..."
61120-399 = "……?"
61120-400 = "Entendido. Então, vamos voltar agora."
61120-401 = "——Para a nossa Arius."
61120-418 = "[ns]\"Pessoal! A excursão foi divertida?\""
61120-419 = "Sim!"
61120-420 = "……Sim."
61120-425 = "Bem-vindos de volta, Sensei, pessoal."
61120-426 = "Justo agora, um incidente acabou de acontecer..."
61120-430 = "[ns]\"Incidente...??\""
61120-433 = "B-bem... Sensei. É que..."
61120-437 = "Com orgulho e convicção no peito!"
61120-438 = "Onde for preciso socorro, lá estaremos!"
61120-440 = "……？"
61120-441 = "[s]\"！？！？\""
61120-444 = "Olá, Sensei. E também..."
61120-445 = "todos vocês que estão aí."
61120-446 = "[s]\"Mine！？\""
61120-447 = "O-olá, Sensei. Ahahaha..."
61120-448 = "Sensei! Nós viemos!!"
61120-449 = "[s]\"Serina e até a Hanae！？\""
61120-453 = "[ns]\"Como... vocês descobriram que estávamos aqui！？\""
61120-456 = "Sentimos que haveria necessidade de primeiros socorros, então...#nA Ordem de Primeiros Socorros chegou!"
61120-458 = "Capítulo do Oratório dos Tempos Passados;To be Continued in Chapter 2"
