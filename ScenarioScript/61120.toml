[translation]
61120-1 = "Episódio 12; Excursão Escolar (2)"
61120-3 = "Senpai, por aqui! Naquela árvore..."
61120-8 = "Buááá, o gatinho! Uaaaaa~!"
61120-9 = "Miau..."
61120-14 = "Em cima da árvore... um gatinho?"
61120-15 = "Entendi. Ele conseguiu subir, mas não tá conseguindo descer."
61120-16 = "Hehe. É a primeira vez que me deparo com uma situação dessas também."
61120-17 = "O que a gente faz...? #nEu tentei ajudar, mas não deu muito certo..."
61120-18 = "...Tem um jeito."
61120-19 = "Vamos resolver isso no estilo Arius."
61120-20 = "Dá um passinho pra trás, por favor."
61120-24 = "MIAUUUU!?"
61120-25 = "Waaaaaah!?!?!"
61120-29 = "O-O que aquela garota tá fazendo!?"
61120-30 = "Ela atirou na direção do gatinho!"
61120-34 = "SHIAAAAAA!!!"
61120-37 = "Ah... com o susto, o gatinho pulou lá de cima!"
61120-42 = "Peguei. Tá tudo bem agora."
61120-45 = "Olha só, o gatinho tá aqui..."
61120-46 = "Hic..."
61120-47 = "Uwaaaaaaah!!!"
61120-48 = "H-Hã...?"
61120-49 = "Qual é o seu problema!? Tá maluca!?"
61120-50 = "Se acontecesse alguma coisa com o gatinho, como você ia assumir a bronca!?"
61120-51 = "I-Isso é..."
61120-52 = "Um animal assustado dificilmente vai querer se mover."
61120-53 = "Por isso, é mais eficaz causar um medo ainda maior para forçá-lo a se mexer..."
61120-54 = "Que tipo de educação é essa... de que escola você é, hein!?"
61120-56 = "Hã? Falando nisso, aquele brasão... não me diga que...?"
61120-57 = "Não tem erro, é da Arius...!"
61120-58 = "Arius? Ah, aquele pessoal que causou a maior confusão durante o Tratado do Éden?"
61120-59 = "O que um bando de delinquentes tá fazendo num lugar desses...?"
61120-64 = "Isso que dá ser mal-educada..."
61120-65 = "Pior que, parando pra pensar, o problema não tá na educação de Kivotos como um todo?"
61120-66 = "Chamam de cidade acadêmica, mas a educação de verdade é deixada de lado..."
61120-67 = "Mas as outras escolas não causaram incidentes tão graves assim, né?"
61120-68 = "Pra começo de conversa, se estivessem numa escola decente, não teriam feito aquela bagunça..."
61120-69 = "Verdade. Tem muito crime menor rolando por aí, mas aquele ataque foi pura maldade... #nÉ um nível totalmente diferente..."
61120-73 = "Vem, vem pra cá...!"
61120-74 = "Não chega perto daquelas pessoas."
61120-75 = "Por que...?"
61120-76 = "Seja uma boa menina e escuta a sua irmã. Entendeu?"
61120-77 = "Entendi..."
61120-83 = "U-Ugh..."
61120-84 = "Aaaaaaaah...!"
61120-85 = "Maia!?"
61120-89 = "Hã? Salário? Do que você tá falando?"
61120-91 = "Então é como se você nem existisse no sistema, né? #nHehe... isso significa que a gente pode fazer o que quiser."
61120-93 = "...Cai fora. Se não tá afim de pegar o trampo, é perda de tempo."
61120-95 = "[log]Quando eu saísse--[/log]"
61120-97 = "[log]Achei que alguma coisa fosse mudar.[/log]"
61120-101 = "[log]Não existe paraíso pra quem foge.[/log]"
61120-104 = "[log]Mesmo assim... eu queria sonhar.[/log]"
61120-107 = "[log]Achei que existia esperança... eu também queria tentar acreditar.[/log]"
61120-110 = "Aguenta firme!"
61120-114 = "Sen... pai?"
61120-115 = "Isso meio que traz umas lembranças, né."
61120-116 = "Acho que naquele dia também foi mais ou menos assim."
61120-117 = "Senpai..."
61120-118 = "Vamos levantar por enquanto."
61120-119 = "Se a gente ficar sentada aqui..."
61120-120 = "..."
61120-121 = "Vamos acabar chamando ainda mais atenção."
61120-122 = "Senpai, eu..."
61120-123 = "Sim, eu sei."
61120-124 = "Tá tudo bem. Tenho certeza que no fim vai dar tudo certo."
61120-125 = "..."
61120-126 = "Que vacilo. Preciso me ligar. Quase me deixei levar por um sonho bobo."
61120-127 = "Eu preciso manter os pés no chão."
61120-129 = "[log]Eu torço pra que dê tudo certo.[/log]"
61120-135 = "Fala sério... o Sensei da Schale não tá pra brincadeira mesmo."
61120-136 = "Aconteceu alguma coisa... com o Sensei?"
61120-137 = "Não, não é nada."
61120-138 = "O Sensei não tem culpa de nada—"
61120-139 = "Ah, mas acho que, de certa forma, ele é um bom adulto."
61120-140 = "Mas nem todo adulto é assim... o mundo não funciona desse jeito."
61120-141 = "Senpai...? #nAconteceu alguma coisa...?"
61120-142 = "Não aconteceu nada não."
61120-143 = "O gatinho desceu em segurança e voltou pro dono."
61120-144 = "Isso não é o suficiente?"
61120-145 = "É... acho que sim...?"
61120-146 = "Bora voltar também."
61120-147 = "Antes que junte mais gente."
61120-150 = "Hora do chá, hora do chá~♪"
61120-151 = "Antes era só água quente... agora o bagulho é de outro nível..."
61120-152 = "Tudo graças a Subaru-senpai."
61120-153 = "Mas beber num lugar assim dá uma sensação diferente, né."
61120-154 = "Ficar tomando chá enquanto olha o pessoal passando na correria..."
61120-155 = "Pura ostentação!"
61120-160 = "Phew..."
61120-161 = "[s]\"Tudo bem? Você tá meio pálida.\""
61120-162 = "Hã...!? Ah, não, tô de boa."
61120-163 = "[s]\"Certeza? Mas--\""
61120-164 = "Boa tarde, Sensei. Quem diria que a gente ia se esbarrar por aqui."
61120-166 = "Pelo visto trouxe uma turma grande hoje."
61120-172 = "Boa tarde, Sensei! E boa tarde pra vocês que eu ainda não sei o nome!"
61120-174 = "U-Uééé!?"
61120-175 = "Hã... b-boa tarde...?"
61120-180 = "[ns]\"Boa tarde. Vocês duas tão mandando bem nos estudos também?\""
61120-181 = "Com certeza!"
61120-182 = "Não dá pra descuidar nem dos estudos e nem de manter a paz na cidade!"
61120-183 = "Ué? Eu já tinha falado isso antes...?"
61120-184 = "Sim, você já disse isso."
61120-185 = "Ah é! Que bom então~!"
61120-186 = "(Não entendi o que tem de bom, mas ok...)"
61120-187 = "Mudando de assunto, e vocês...?"
61120-189 = "A-A gente..."
61120-190 = "Ah, bem..."
61120-194 = "...Nós também somos alunas do Sensei."
61120-196 = "Mas nós também somos...?"
61120-197 = "..."
61120-198 = "Vocês são da Arius... certo?"
61120-200 = "!!!"
61120-201 = "..."
61120-203 = "Arius... o que é isso?"
61120-205 = "Ah, lembrei! Já ouvi falar nisso!"
61120-206 = "Hehehe, falando nisso, naquela vez a ás dos justiceiros e ídolo de todos, Uzawa Reisa--"
61120-207 = "Sim. Isso também aconteceu."
61120-208 = "Sensei. Eu passei só os pontos principais pra Reisa da forma mais cuidadosa possível... tudo bem por você?"
61120-209 = "[s]\"Valeu. Salvou muito.\""
61120-210 = "Que bom."
61120-217 = "(Sobre a Arius e aquele incidente... então é assim que a Trinity enxerga a situação...)"
61120-218 = "(...No fim, as pessoas interpretam as coisas do jeito que convém... Mesmo assim)"
61120-219 = "(Hehe...)"
61120-224 = "De qualquer forma, fico aliviada em ver que vocês estão se divertindo."
61120-225 = "Hã? Mas isso não é o básico de qualquer estudante, Suzumi-san!?"
61120-227 = "..."
61120-229 = "Ué...? Falei alguma besteira? Se falei, foi mal!"
61120-230 = "Não. Tudo bem. Do ponto de vista de vocês, acho que isso é 'um problema nosso'."
61120-231 = "..."
61120-232 = "A propósito, você mencionou um esquadrão de vigilantes... Vocês ficam fazendo 'patrulha' assim sem ganhar nada em troca?"
61120-233 = "Exatamente! É o que chamamos de 'alcançar a justiça onde os outros não chegam'!"
61120-234 = "R-Reisa-san...?"
61120-235 = "Que incrível."
61120-236 = "Mas parece que vocês têm bastante tempo livre, né."
61120-237 = "Pois é! Trinity, Arius, na moral, não manjo muito!"
61120-238 = "A gente só faz o que dá vontade de fazer, simples assim!"
61120-239 = "..."
61120-240 = "Então... aqui eu também faço questão de ajudar vocês, querendo ou não!"
61120-241 = "Oi...?"
61120-242 = "C-Como assim...?"
61120-243 = "Desse jeito ó!"
61120-245 = "Olha só isso! Uma vez umas delinquentes montaram uma armadilha pra cobrar pedágio na rua..."
61120-246 = "Aí eu tirei essa foto delas caindo de cabeça na própria armadilha!"
61120-250 = "Caramba... então é assim que a pessoa fica quando é enterrada de cabeça pra baixo..."
61120-251 = "Mó engraçado! Ahahahaha!"
61120-252 = "E tem mais... essa foto aqui ó--"
61120-257 = "...Fico tranquilo que elas se deram bem logo de cara."
61120-258 = "A Reisa-san tem uma energia que transborda, né..."
61120-259 = "E acho que isso ajudou muito nesse clima."
61120-260 = "..."
61120-261 = "..."
61120-262 = "Ué...?"
61120-263 = "Será que eu falei alguma coisa que ofendeu..."
61120-268 = "Ugh..."
61120-269 = "[s1]\"Esquenta a cabeça não.\"\n[s2]\"Nem todo mundo consegue se abrir tão rápido assim.\""
61120-272 = "Pode até ser..."
61120-273 = "Mas mesmo assim... dá um aperto no coração."
61120-279 = "Tá tudo bem com vocês duas...?"
61120-280 = "Senpai... a gente..."
61120-281 = "De alguma forma, a gente simplesmente..."
61120-282 = "..."
61120-284 = "Oiê! Meu nome é Uzawa Reisa! #nE você se chama... Subaru-san, né?"
61120-286 = "..."
61120-290 = "Isso. Desculpa a demora pra me apresentar."
61120-291 = "Aí, por acaso a gente... falou alguma besteira..."
61120-292 = "Não, imagina, de jeito nenhum."
61120-293 = "...Eu é que espero não ter sido mal-educada."
61120-294 = "Que isso! Fiquei mega feliz de conhecer vocês!"
61120-295 = "..."
61120-296 = "Só de ouvir isso, já dá um alívio."
61120-297 = "Deu a sensação de ouvir uma resposta que faz a gente achar que tudo vai dar certo nessa vida."
61120-298 = "Eu também acho! Afinal, tem amor e paz espalhados pelo mundo!"
61120-299 = "..."
61120-300 = "Posso fazer só uma perguntinha? Digamos que exista mesmo amor e paz por aí..."
61120-301 = "Mas, se absolutamente tudo der errado, o que a gente deveria fazer?"
61120-302 = "...Hã?"
61120-306 = "[ns]\"...\""
61120-308 = "Deve estar se perguntando de onde eu tirei isso, né? #n...Deu vontade de perguntar do nada."
61120-309 = "A gente não precisa de um motivo especial pra puxar assunto, precisa?"
61120-313 = "[ns3]\"Suzumi, pode falar um pouco com ela?\"\n[ns4]\"Como representante da Patrulha Escolar.\""
61120-316 = "Eu...? Hmmm..."
61120-317 = "Deixa comigo, Sensei. Vou dar o meu melhor."
61120-318 = "Subaru-san. A gente também não vive com a certeza absoluta de que tudo vai dar certo o tempo todo."
61120-319 = "É claro que as coisas dão mais errado do que certo na maioria das vezes. E isso, de certa forma, é inevitável."
61120-320 = "Mas, mesmo assim, a gente acredita."
61120-321 = "Porque é com esse ideal no peito que a gente segue em frente."
61120-322 = "...Ideal, é?"
61120-323 = "Sim."
61120-324 = "Claro que não acho que esse ideal vai se tornar realidade num passe de mágica agora."
61120-325 = "Mas, se a gente conseguir chegar um passinho mais perto dele... pra mim, já é o bastante."
61120-326 = "Porque se avançarmos aos poucos, a chance de um dia todos alcançarem esse lugar... fica pelo menos um pouquinho maior."
61120-327 = "É por isso que a justiça já é a própria recompensa. Não acho que precisamos de retorno ou pagamento... pelo menos não agora."
61120-328 = "Isso aí! É exatamente isso! Falou bonito, Suzumi-san!"
61120-329 = "Hehe. Entendi. Deu pra ter uma boa ideia."
61120-333 = "(Fala sério... ser otimista deve ser muito bom. O normal é...)"
61120-334 = "(Isso tirando o fato de que só dá pra pensar assim se você cresceu num ambiente que te permite isso, né)"
61120-340 = "Licença, Senpai...?"
61120-341 = "Oi?"
61120-342 = "Ah... saquei."
61120-343 = "Sensei. Vou dar uma licencinha."
61120-344 = "Vou bater um papo a sós com as meninas."
61120-345 = "[s]\"Hã? A-Ah, beleza...\""
61120-353 = "O que foi?"
61120-354 = "...Nem preciso perguntar pra saber, na verdade."
61120-355 = "Deve ter sido difícil de engolir, né."
61120-356 = "...Foi."
61120-357 = "Acho que isso é culpa daquela 'aula'..."
61120-358 = "Da aula? Como assim?"
61120-359 = "As garotas que se deram bem com aquelas duas são as mesmas que tavam prestando atenção na aula."
61120-360 = "Mas a gente..."
61120-361 = "Na teoria a gente até entende, mas o sentimento..."
61120-362 = "Ouvir esse tipo de papo... me dá uma raiva que eu não sei nem explicar..."
61120-363 = "...Tudo isso deve ser porque a gente é ruim, né."
61120-364 = "Claro que não. Não tem nada a ver."
61120-368 = "É normal sentir isso. Pelo menos é o que eu acho."
61120-369 = "Afinal, a gente viveu num mundo que elas não conseguem nem imaginar."
61120-370 = "Senpai...!"
61120-371 = "Acreditar que tudo vai dar certo é fácil."
61120-372 = "Acreditar que não existe pecado no mundo—e que as coisas tortas de agora vão se endireitar no futuro também."
61120-373 = "...Mas será que as coisas se resolvem tão fácil assim?"
61120-374 = "Sabia de uma coisa? Dizem que as pessoas ricas de hoje em dia são boas."
61120-375 = "Que têm uma personalidade ótima, são calmas e empáticas."
61120-376 = "E o motivo é bem simples—porque elas têm tudo e não falta nada pra elas."
61120-377 = "O mundo que elas veem deve ser pacífico e lindo pra caramba, né."
61120-379 = "Ugh..."
61120-380 = "Nós..."
61120-382 = "É. Mas, em algum lugar do mundo, as coisas não são bem assim."
61120-383 = "E, claro, é pedir demais que elas tenham essa noção toda."
61120-384 = "Elas podem até sentir pena e se compadecer. #nMas, no fim das contas, isso também não passa de massagem no próprio ego."
61120-385 = "...E se o inferno já estiver na porta delas?"
61120-386 = "Será que elas vão desviar o olhar e tentar fugir desse inferno? #nOu será que vão ter coragem de lutar contra ele?"
61120-387 = "E mais—"
61120-388 = "Até quando elas vão fechar os olhos pro fato de que... #nforam elas mesmas que construíram a história desse inferno?"
61120-389 = "S-Senpai!? T-Tá tudo bem com você...!?"
61120-390 = "Seu rosto agora a pouco... !?"
61120-392 = "Hã? O que tem o meu rosto?"
61120-397 = "N-Nada... não é nada..."
61120-399 = "...?"
61120-400 = "Tranquilo. Acho que tá na hora da gente voltar."
61120-401 = "--Pra nossa Arius."
61120-418 = "[ns]\"E aí, galera! Curtiram a excursão?\""
61120-419 = "Sim!"
61120-420 = "...Sim."
61120-425 = "Bem-vindos de volta, Sensei e meninas."
61120-426 = "Vocês chegaram bem na hora, acabou de rolar um BO aqui..."
61120-430 = "[ns]\"Um BO...??\""
61120-433 = "E-Então... Sensei. É que..."
61120-437 = "Com orgulho e convicção gravados no peito!"
61120-438 = "Levaremos socorro onde for necessário!"
61120-440 = "...?"
61120-441 = "[s]\"!?!?\""
61120-444 = "Olá, Sensei. E--"
61120-445 = "Olá a todos os presentes."
61120-446 = "[s]\"Mine!?\""
61120-447 = "O-Olá, Sensei. Ahahaha..."
61120-448 = "Sensei! A gente veio!!"
61120-449 = "[s]\"A Serina e a Hanae também!?\""
61120-453 = "[ns]\"Mas como... como vocês sabiam que a gente tava aqui!?\""
61120-456 = "Sentimos no ar que alguém precisava de resgate--#nEntão, as Cavaleiras do Socorro chegaram com tudo!"
61120-458 = "Oratório do Tempo Perdido; Continua no Capítulo 2"
