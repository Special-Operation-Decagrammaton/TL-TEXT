[translation]
61120-1 = "第12話;校外学習（２）"
61120-3 = "先輩、こちらです！あの木に……。"
61120-8 = "うええ〜ん、猫ちゃんが！うわああん〜！"
61120-9 = "ミィ～……。"
61120-14 = "木の上に……子猫？"
61120-15 = "なるほど。登ったはいいものの、降りられなくなってしまったんですね。"
61120-16 = "ふふ。こんな状況に遭遇するのは、私も初めてですよ。"
61120-17 = "どうしましょう……？#n助けたくて頑張ったんですけど、上手くいかなくて……。"
61120-18 = "……一つ、方法があります。"
61120-19 = "ここはアリウス式で解決しましょう。"
61120-20 = "少し、下がっていてください。"
61120-24 = "ニャアアアッ！？"
61120-25 = "うわあああっ！？！？"
61120-29 = "あ、あの子、何してるの！？"
61120-30 = "子猫に向かって銃を撃ったぞ！"
61120-34 = "シャアアアッ！！！"
61120-37 = "あ……興奮して、子猫が飛び降りました！"
61120-42 = "捕まえました。もう大丈夫ですよ。"
61120-45 = "ほら、子猫はここに……。"
61120-46 = "ひっく……。"
61120-47 = "うええええええ～ん！！！"
61120-48 = "え、ええっ……？"
61120-49 = "ちょっと、何考えてるの！？"
61120-50 = "猫ちゃんに何かあったら、どう責任取るつもりだったの！？"
61120-51 = "そ、それは……。"
61120-52 = "怯えてしまった生き物は、なかなか動こうとしないものなんです。"
61120-53 = "だからもっと大きな恐怖を与えて、強制的に動かす方が……。"
61120-54 = "そんな教育……あなた、どこの学園の生徒なのかしら！？"
61120-56 = "ん？そういえば、あの校章……まさか……？"
61120-57 = "間違いない、アリウスだ……！"
61120-58 = "アリウス？ああ、エデン条約のときに騒ぎを起こしたんだっけ？"
61120-59 = "そんな問題児が、なんでこんなところに……？ "
61120-64 = "これだから育ちの悪い子は……。"
61120-65 = "いや、それを言うならキヴォトス全体の教育に問題があるんじゃないのか？"
61120-66 = "学園都市とか言ってるけど、肝心の教育はおざなりだし……。"
61120-67 = "でも他の学園は大きな事件を起こしてなくない？"
61120-68 = "そもそもまともな学園にいたら、あんな事件起こすはずないし……。"
61120-69 = "それもそうだ。軽犯罪は多いけど、悪意を持って起こしたあの事件は#n根本の話が違うよな……。"
61120-73 = "ほら、こっち来て……！"
61120-74 = "あの人たちに近づいたらダメよ。"
61120-75 = "どうして……？"
61120-76 = "いい子だから、お姉ちゃんの言うことを聞いて。わかった？"
61120-77 = "わかった……。"
61120-83 = "う、うう……。"
61120-84 = "あああああああああっ……！"
61120-85 = "マイア！？"
61120-89 = "ん？給料？何の話だ？"
61120-91 = "ってことはつまり、学籍がないも同然ってことだよな？#nへへ……こりゃ好き勝手できそうだな。"
61120-93 = "……失せろ。仕事を受ける気がないなら、時間の無駄だ。"
61120-95 = "[log]外に出たら――[/log]"
61120-97 = "[log]きっと何かが変わると思ってた。[/log]"
61120-101 = "[log]逃げた先に楽園なんてない。[/log]"
61120-104 = "[log]それでも……夢を見たかった。[/log]"
61120-107 = "[log]希望はあるんだ、って……私も、信じてみたかった。[/log]"
61120-110 = "しっかりしてください！"
61120-114 = "せん……ぱい？"
61120-115 = "なんだか、思い出しますね。"
61120-116 = "あの日も、こんな感じだった気がします。"
61120-117 = "先輩……。"
61120-118 = "とりあえず立ちましょう。"
61120-119 = "いつまでもこんな風に座り込んでたら……。"
61120-120 = "……。"
61120-121 = "余計に目立ってしまいますから。"
61120-122 = "先輩、私は……。"
61120-123 = "ええ、分かっています。"
61120-124 = "大丈夫ですよ。きっと、すべてうまくいきます。"
61120-125 = "……。"
61120-126 = "いけませんね。反省しないと。私まで短い夢を見てしまうところでした。"
61120-127 = "私がしっかりしてなければといけないのに。"
61120-129 = "[log]なれたらいいな、と思ってるよ。[/log]"
61120-135 = "まったく……シャーレの先生、やはり侮れませんね。"
61120-136 = "先生が……どうかしたんですか？"
61120-137 = "いえ、何でもありません。"
61120-138 = "先生は悪くない――"
61120-139 = "ああでも、ある意味では良い大人だと思います。"
61120-140 = "でも、そういう大人ばかりじゃない……世界だって、そういう風にはできてない。"
61120-141 = "先輩……？#n何か、あったんですか……？"
61120-142 = "何もありませんよ。"
61120-143 = "子猫は無事に降りて、飼い主の元に戻りました。"
61120-144 = "それで十分じゃないですか。"
61120-145 = "そ、そう……ですね……？"
61120-146 = "私たちも戻りましょう。"
61120-147 = "これ以上、人だかりができる前に。"
61120-150 = "ティータイムだ、ティータイム♪"
61120-151 = "昔はただのお湯だったのに……今はもう違うんだよね……。"
61120-152 = "全部、スバル先輩のおかげだよ。"
61120-153 = "でも、こういう場所で飲むのも、なんだか違う感じだね。"
61120-154 = "忙しそうに歩いていくのを眺めながら飲むのって……。"
61120-155 = "贅沢な気分だね！"
61120-160 = "ふぅ……。"
61120-161 = "[s]\"大丈夫？ちょっと顔色悪いよ？\""
61120-162 = "えっ……！？あ、いえ、なんでもないです。"
61120-163 = "[s]\"そう？でも――\""
61120-164 = "こんにちは、先生。まさかこんなところでお会いするとは。"
61120-166 = "今日は大勢連れていらっしゃるのですね。"
61120-172 = "こんにちは、先生！それから、まだ名前を知らない皆さんも！"
61120-174 = "う、うえぇぇ！？"
61120-175 = "あ、あのっ……こ、こんにちは……？"
61120-180 = "[ns]\"こんにちは。2人とも、ちゃんと勉強もやってるのかな？\""
61120-181 = "もちろんです！"
61120-182 = "勉強も、街の治安維持も、どちらも疎かにはできません！"
61120-183 = "あれっ？前にも同じこと言いましたっけ……？"
61120-184 = "はい、言っていましたよ。"
61120-185 = "そうでしたか！よかったです～！"
61120-186 = "（何が良いのかはよく分かりませんが……）"
61120-187 = "それより、皆さんは……？"
61120-189 = "わ、私たちは……。"
61120-190 = "えっと、その……。"
61120-194 = "……私たちも、先生の生徒です。"
61120-196 = "それは私たちも同じでは……？"
61120-197 = "……。"
61120-198 = "アリウスの方々……ですね？"
61120-200 = "！！！"
61120-201 = "……。"
61120-203 = "アリウス、って……？"
61120-205 = "あっ、思い出しました！たしかに聞いたことある気がします！"
61120-206 = "ふふふっ、そういえばあのときも、自警団のエースにしてみんなのアイドル、宇沢レイサが――"
61120-207 = "はい。そんなこともありましたね。"
61120-208 = "先生。レイサさんには、できるだけ慎重に、要点だけお伝えしましたが……それで大丈夫でしょうか。"
61120-209 = "[s]\"ありがとう。助かったよ。\""
61120-210 = "なによりです。"
61120-217 = "（例の事件とアリウスについて……トリニティではそんな風に見ていたんですね……）"
61120-218 = "（……人は誰しも、自分に都合のいいように解釈するもの……。そうだとしても）"
61120-219 = "（ふふ……）"
61120-224 = "ともあれ、楽しそうなご様子で安心しました。"
61120-225 = "え？生徒ならこれくらい当然じゃないですか、スズミさん！"
61120-227 = "……。"
61120-229 = "あれ……？何か変なこと言いました？もしそうだったら、ごめんなさい！"
61120-230 = "いえ。大丈夫です。あなたたちの視点では、これは「私たちの問題」なんでしょうから。"
61120-231 = "……。"
61120-232 = "ところで、自警団とおっしゃいましたが……報酬もないのに、こうして「巡回」されてるんですか？"
61120-233 = "そうです！いわゆる、「手の届かないところにある正義」というものです！"
61120-234 = "レ、レイサさん……？"
61120-235 = "すごいですね。"
61120-236 = "少し、暇そうにも見えますけど。"
61120-237 = "はい！トリニティとかアリウスとか、正直よく分かりません！"
61120-238 = "ただ、私たちはこうしたいから、してるだけなんです！"
61120-239 = "……。"
61120-240 = "だから……ここでもやっぱり、勝手に皆さんをお助けしたいんです！"
61120-241 = "はい……？"
61120-242 = "ど、どうやって……？"
61120-243 = "こうやってです！"
61120-245 = "これも見てください！あの時スケバンの方々が道に罠を仕掛けて通行料を巻き上げようとしていて……。"
61120-246 = "私がそのスケバンたちを罠に頭から突っ込ませた写真です！"
61120-250 = "うわぁ……。人って逆さに埋められたら、こんな風になるんだ……。"
61120-251 = "面白い！あははは！"
61120-252 = "それでですね……この写真はですね――"
61120-257 = "……すぐに仲良くなったようで、安心しました。"
61120-258 = "レイサさんは少し元気すぎるところがありますが……。"
61120-259 = "それがむしろ、ここでは助けになったのかもしれませんね。"
61120-260 = "……。"
61120-261 = "……。"
61120-262 = "おや……？"
61120-263 = "もしや、何か失礼なことを……。"
61120-268 = "うっ……。"
61120-269 = "[s1]\"気にしないで大丈夫だよ。\"\n[s2]\"みんながすぐに心を開けるわけじゃないからね。\""
61120-272 = "そうかもしれませんが……。"
61120-273 = "やはり……心は痛みます。"
61120-279 = "お2人とも、大丈夫ですか……？"
61120-280 = "先輩……私たちは……。"
61120-281 = "なんだか、どうしても……。"
61120-282 = "……。"
61120-284 = "こんにちは！私は宇沢レイサです！#nあなたはたしか……スバルさんでしたよね？"
61120-286 = "……。"
61120-290 = "ええ。ご挨拶が遅れてすみません。"
61120-291 = "あの、もしかして……私たち、何か失礼なことを……。"
61120-292 = "いえ、とんでもない。"
61120-293 = "……むしろ、こちらこそ無礼を働いてないといいのですが。"
61120-294 = "そんなことありません！お会いできて、とっても嬉しいですよ！"
61120-295 = "……。"
61120-296 = "その言葉だけでも、気持ちが軽くなりますね。"
61120-297 = "生きていれば、何もかもうまくいくかのような……そんな返事を聞けたような気がします。"
61120-298 = "私もそう思います！この世には愛も平和もありますから！"
61120-299 = "……。"
61120-300 = "ちょっとだけ、聞いてもいいですか？愛も平和もあるのは確かだとして……。"
61120-301 = "でも、もしそのすべてがうまくいかなかったら、どうすればいいんでしょうか？"
61120-302 = "……はい？"
61120-306 = "[ns]\"……。\""
61120-308 = "急にどうしてこんな話をするのかって？#n……ただなんとなく、ですかね。"
61120-309 = "話を振るのに、特別な理由なんて必要ないでしょう？"
61120-313 = "[ns3]\"スズミ、ちょっと話してくれる？\"\n[ns4]\"自警団の立場として、だよ。\""
61120-316 = "私が……ですか？ふむ……。"
61120-317 = "承知しました、先生。精一杯やってみます。"
61120-318 = "スバルさん。私たちだって、いつも何でもうまくいくと確信して生きているわけじゃありません。"
61120-319 = "当然、何かがうまくいくより、うまくいかないことの方が多いでしょう。それはある意味、仕方のないことだと思います。"
61120-320 = "ですが、それでも信じるんです。"
61120-321 = "私たちは、そういう理想を胸に生きていますから。"
61120-322 = "……理想、ですか。"
61120-323 = "はい。"
61120-324 = "もちろん今すぐここで、その理想が叶うなんて思っていません。"
61120-325 = "でも、そこに一歩でも近づけるなら……それだけで十分だと、思っています。"
61120-326 = "少しずつ進んでいけば、いつかみんながその場所に届く可能性が……ほんのわずかでも高くなるはずですから。"
61120-327 = "だから正義は、それ自体が報いなんです。見返りや報酬なんて……今は、まだ必要ないと思っています。"
61120-328 = "そうです！そういうことですよ！さすがスズミさん！"
61120-329 = "ふふっ。なるほど。とても参考になりました。"
61120-333 = "（まったく……楽観主義というのは、いいことですね。普通は……）"
61120-334 = "（それは、そう思える環境でしか育たないという事実を除けば、ですけど）"
61120-340 = "あの、先輩……？"
61120-341 = "はい？"
61120-342 = "あぁ……分かりました。"
61120-343 = "先生。少し外します。"
61120-344 = "私とこの子たちだけで、ちょっと話してきますね。"
61120-345 = "[s]\"ん？う、うん。わかった……。\""
61120-353 = "どうしたんですか？"
61120-354 = "……なんて聞かなくても、だいたい察しはつきますけど。"
61120-355 = "さぞ耐え難かったでしょうね。"
61120-356 = "……はい。"
61120-357 = "これは、「授業」の影響なのかもしれません……。"
61120-358 = "授業？どういう意味ですか？"
61120-359 = "あの2人と仲良くなれたのは、授業に興味を持っていた子たちなんです。"
61120-360 = "でも私たちは……。"
61120-361 = "頭では理解できるんですが、どうしても……。"
61120-362 = "ああいう話を聞いていると……無性に腹が立ってしまって……。"
61120-363 = "……全部、私たちが悪い子だから、なんでしょうね。"
61120-364 = "いいえ。そんなことはありません。"
61120-368 = "それらを抱くのは当然の感情です。少なくとも、私はそう思います。"
61120-369 = "彼女たちが想像もできない世界を、私たちは生きてきたのだから。"
61120-370 = "先輩……！"
61120-371 = "すべてうまくいく、と信じるのは簡単です。"
61120-372 = "この世には罪などなく――今は歪んでいるものも、いつか真っ直ぐになると信じることも。"
61120-373 = "……そう簡単にうまくいくものでしょうか？"
61120-374 = "知ってますか？最近の金持ちは、善良なんだそうです。"
61120-375 = "性格も良くて、穏やかで、思いやりがあるのだとか。"
61120-376 = "理由は単純明快――すべてを得、欠けるものなど何一つないからなんです。"
61120-377 = "その目に映る世界は、さぞかし平和で美しいのでしょうね。"
61120-379 = "うっ………。"
61120-380 = "私たちは……。"
61120-382 = "ええ。でも世界のどこかでは、決してそうじゃない。"
61120-383 = "そしてもちろん、彼女たちにそこまで気を配れと言うのは無理な話です。"
61120-384 = "同情して、哀れだと思うことはできるでしょう。#nけれど、それも突き詰めれば自己満足です。"
61120-385 = "……もし、すでに地獄が現れているとしたら。"
61120-386 = "彼女たちは、その地獄から目を逸らして逃げようとするのでしょうか？#nそれとも、地獄と戦おうとするのでしょうか。"
61120-387 = "そして――"
61120-388 = "自分たちこそが、その地獄の歴史を作った当事者だという事実から――#nいつまで目を逸らし続けるのでしょうね？"
61120-389 = "せ、先輩！？だ、大丈夫ですか……！？"
61120-390 = "今……顔が……！?"
61120-392 = "え？私の顔が、どうかしました？"
61120-397 = "い、いえ……なんでも、ありません……。"
61120-399 = "……？"
61120-400 = "分かりました。それでは、そろそろ帰りましょうか。"
61120-401 = "――私たちの、アリウスへ。"
61120-418 = "[ns]\"みんな！校外学習は楽しかったかな？\""
61120-419 = "はい！"
61120-420 = "……はい。"
61120-425 = "お帰りなさい、先生、みんな。"
61120-426 = "ちょうど今、事件が起きたところで……。"
61120-430 = "[ns]\"事件……？？\""
61120-433 = "そ、その……先生。それが……。"
61120-437 = "誇りと信念を胸に刻み！"
61120-438 = "救護が必要な場に救護を！"
61120-440 = "……？"
61120-441 = "[s]\"！？！？\""
61120-444 = "こんにちは、先生。そして――"
61120-445 = "そこにいらっしゃる皆さん。"
61120-446 = "[s]\"ミネ！？\""
61120-447 = "こ、こんにちは、先生。あははは……。"
61120-448 = "先生！来ちゃいました！！"
61120-449 = "[s]\"セリナにハナエまで！？\""
61120-453 = "[ns]\"どうして……ここがわかったの！？\""
61120-456 = "救護が必要な予感を察知しましたので――#n救護騎士団一同、参りました！"
61120-458 = "過ぎ去りし刻のオラトリオ編;To be Continued in Chapter 2"
