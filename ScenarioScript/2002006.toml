[translation]
2002006-1 = "O ponto e vírgula delicado da hacker genial"
2002006-2 = "（Hoje, em vez do esconderijo de sempre, fui guiado ao local onde Himari trabalha na Veritas.）"
2002006-8 = "Estava à sua espera, Sensei.#nFufu... você chegou em segurança."
2002006-9 = "[s] \"Eu te dei uma bronca, lembra... mas hoje não é no esconderijo?\""
2002006-10 = "A-ah, sobre aquilo... sim, estou arrependida.#nHoje, embora eu tenha algumas tarefas para terminar..."
2002006-11 = "O assunto principal é exatamente o que enviei na mensagem."
2002006-12 = "Finalmente consegui."
2002006-13 = "[s] \"É sobre aquele tesouro que você mencionou antes?\""
2002006-14 = "Fufu, exatamente. É um tesouro."
2002006-15 = "E é um item lendário que todos nós, hackers, desejamos ter."
2002006-16 = "Consegue imaginar que tipo de tesouro é?"
2002006-17 = "Fufu,"
2002006-18 = "Não se surpreenda quando vir..."
2002006-24 = "É isto aqui!"
2002006-28 = "[ns] \"Youkai MAX?\""
2002006-29 = "Ora, não é um Youkai MAX comum, sabia?"
2002006-30 = "Surpreendentemente, esta edição especial limitada é considerada um item de altíssima qualidade, 100 vezes mais saborosa que os Youkai MAX comuns das prateleiras."
2002006-31 = "[s] \"E-entendo...\""
2002006-36 = "...Sua reação foi mais fraca do que eu esperava."
2002006-37 = "Mesmo sendo um item tão incrível que esta edição limitada chega a ser um artigo de colecionador..."
2002006-38 = "Os membros da Veritas ficaram fazendo um alvoroço, dizendo: \"Eu adoraria beber isso pelo menos uma vez\"."
2002006-39 = "[s] \"Ah, será que na verdade é para os membros?\""
2002006-40 = "Fufu. De vez em quando, preciso mostrar a eles minha postura como presidente e demonstrar minha autoridade."
2002006-41 = "Dentre eles, guardei este sabor \"Mix de Frutas da Paixão Ardente\" especialmente para saborear com você, Sensei."
2002006-42 = "[s] \"Depois de ouvir isso, estou começando a ficar empolgado.\""
2002006-43 = "Então, vamos verificar o quão incrível é esse sabor.#nSe bebermos isso, qualquer trabalho hoje renderá muito."
2002006-44 = "Ah, é verdade, não posso esquecer.#nOs membros me ensinaram uma forma de beber o Youkai MAX ainda mais gostoso."
2002006-45 = "[s] \"Que método é esse?\""
2002006-46 = "Fufu... é assim."
2002006-53 = "[ns] \"Hi-Himari!? O que você está fazendo sacudindo tanto assim!?\""
2002006-54 = "Espere, por favor!"
2002006-60 = "Dessa forma, com toda a força, ao sacudir a lata... ah."
2002006-61 = "O poder do Youkai MAX lá dentro, se intensifica...!"
2002006-67 = "Em vez de beber direto... ufa."
2002006-73 = "Fica 5 vezes mais gostoso, segundo os membros...!"
2002006-74 = "[s] \"Você não foi enganada por eles!?\""
2002006-75 = "Ngh!"
2002006-84 = "[ns] \"Ah, eu sabia...\""
2002006-86 = "O-ora..."
2002006-87 = "Não, e-eu já esperava por isso."
2002006-88 = "Afinal, é uma bebida gaseificada."
2002006-89 = "Acreditar que ficaria mais gostoso e aceitar o risco para tentar..."
2002006-90 = "Ou se contentar com a situação atual e aceitar o seu eu fraco..."
2002006-91 = "...Era um problema muito difícil. É como a nossa vida, não é?"
2002006-92 = "[s1] \"Acho que não é um problema tão profundo assim!\"\n[s2] \"Use esta toalha.\""
2002006-93 = "Ah... obrigada."
2002006-97 = "Ah... obrigada."
2002006-102 = "Eu mesma consigo limpar a parte de cima até certo ponto, mas..."
2002006-103 = "A parte de baixo, minhas mãos não alcançam..."
2002006-104 = "...O que faremos?"
2002006-105 = "[s] \"Deve estar grudento, quer que eu lave?\""
2002006-109 = "Hã, ééé!?#nO Sensei vai me lavar?"
2002006-110 = "Isso é, bem..."
2002006-111 = "[s] \"Desculpe, não precisa se sentir obrigada――\""
2002006-115 = "Não, e-está tudo bem."
2002006-116 = "Então você quer tanto tocar nos pés desta super gênio beldade!#nEu, e-eu não me importo!"
2002006-117 = "……Susspiro."
2002006-121 = "……Poderia fazer isso por mim, por favor?"
2002006-127 = "[ns] \"Então... vou tocar.\""
2002006-128 = "S-sim. Pode limpar o quanto quiser!"
2002006-131 = "[wa:100]— Fufu, [wa:900]o que acha?"
2002006-134 = "— A chance de lavar os pés"
2002006-136 = "— da maior beldade do Millennium..."
2002006-139 = "— é algo que [wa:300]dificilmente..."
2002006-141 = "— algo que não deveria ser possível..."
2002006-144 = "[wa:500]— Hã...?"
2002006-146 = "— Mais do que eu pensava... [wa:1720]é um sentimento estranho..."
2002006-149 = "[wa:750]— Bizarro... [wa:1350]é, [wa:1300]vergonhoso, eu diria..."
2002006-151 = "— P-por [wa:1300]que...?"
2002006-154 = "— U-uma emoção [wa:200]difícil de [wa:600]colocar em palavras...!"
2002006-157 = "[wa:650]— Só que, [wa:950]o Sensei está"
2002006-159 = "— apenas lavando meus pés [wa:1000]com cuidado..."
2002006-162 = "— Por que...?"
2002006-165 = "[ns] \"Eu só estou usando sabonete, viu!?\""
2002006-166 = "[wa:250]— Fu, [wa:500]fufu."
2002006-169 = "— Sim, [wa:950]claro que estou preparada para isso,"
2002006-171 = "— não se preocupe."
2002006-174 = "— Pode continuar, [wa:900]até ficar satisfeito...!"
2002006-176 = "[wa:150]— ...Eu estou [wa:1000]preparada... [wa:1900]deveria, [wa:1500]estar."
2002006-179 = "[ns] \"Entendido, então vou continuar.\""
2002006-180 = "[wa:100]— S-sim, [wa:1300]sim..."
2002006-182 = "— E-então... [wa:1420]por favor, [wa:2000]continue..."
2002006-186 = "[ns] \"Pronto, está limpo.\""
2002006-187 = "S-sim..."
2002006-188 = "……U-uu……"
2002006-189 = "[s] \"O que houve? Ainda está grudento?\""
2002006-193 = "N-não. É que, apenas..."
2002006-194 = "……Nem mesmo uma super gênio beldade como eu poderia prever isso.#nQue... ter o corpo tocado por outra pessoa... seria tão vergonhoso."
2002006-195 = "Sinceramente... passar tempo com o Sensei me faz aprender tantas coisas imprevisíveis, estou impressionada."
2002006-196 = "[s] \"Hum... não entendi nada do que você disse...\""
2002006-197 = "Fufu, não se preocupe com isso."
2002006-198 = "Isso é apenas..."
2002006-199 = "……uma pequena descoberta minha♪"
2002006-201 = "(Depois disso, os dois beberam Youkai MAX enquanto ajudavam Himari com seu trabalho)"
