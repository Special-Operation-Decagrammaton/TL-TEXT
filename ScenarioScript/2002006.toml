[translation]
2002006-1 = "天才ハッカーの繊細なセミコロン"
2002006-2 = "（今日はいつもの隠れ家ではなく、ヒマリがヴェリタスの仕事をしている場所に案内された）"
2002006-8 = "お待ちしておりました、先生。#nふふっ……無事に到着されましたね。"
2002006-9 = "[s] \"お説教したからね……それより今日は隠れ家じゃないんだ。\""
2002006-10 = "そ、その節は……ええ、反省しております。#n今日はですね、片付けたい業務もあるのですが……。"
2002006-11 = "本題はメッセージで送った通りです。"
2002006-12 = "ようやく入手したのです。"
2002006-13 = "[s] \"さっき言ってたお宝のこと？\""
2002006-14 = "ふふっ、そうです。お宝ですよ。"
2002006-15 = "それも私たちハッカーがこぞって欲しがる幻の一品。"
2002006-16 = "一体どんなお宝か想像できましたか？"
2002006-17 = "ふふっ、"
2002006-18 = "見て驚かないでくださいね……"
2002006-24 = "こちらです！"
2002006-28 = "[ns] \"妖怪MAX？\""
2002006-29 = "あら、ただの妖怪MAXではありませんよ？"
2002006-30 = "なんと、このスペシャル限定版は、店頭に並んでいる妖怪MAXより100倍美味しいと評判の最高級品なのです。"
2002006-31 = "[s] \"そ、そうなんだ……。\""
2002006-36 = "……思ったより反応が薄いのですね。"
2002006-37 = "この限定版にはプレミアがつくほどものすごい代物だというのに……。"
2002006-38 = "ヴェリタスの部員たちも「一度でいいから飲んでみたい」と、どれだけ騒いでいたことか。"
2002006-39 = "[s] \"あ、もしかして本当は部員たちのために？\""
2002006-40 = "ふふっ。たまにはあの子たちに部長としての姿を見せて、私の威厳を示さなくては。"
2002006-41 = "なかでも、この「胸アツ・情熱のフルーツミックス味」は、ぜひ先生と一緒に味わいたいと思い、残しておいたのです。"
2002006-42 = "[s] \"そこまで言われると、楽しみになってきたよ。\""
2002006-43 = "では、どれだけすごい味なのか、確認してみるとしましょう。#nこれさえ飲めば、今日一日どんな作業も捗るはず。"
2002006-44 = "おっと、そうでした、忘れてはいけませんね。#n部員たちから妖怪MAXをさらに美味しく飲む方法を教えてもらったのです。"
2002006-45 = "[s] \"どんな方法なの？\""
2002006-46 = "ふふっ……こうするのです。"
2002006-53 = "[ns] \"ヒ、ヒマリ！？そんなに振ってどうするの！？\""
2002006-54 = "お待ち、くださいっ！"
2002006-60 = "こうやって、全力で、缶を振ると……はぁ。"
2002006-61 = "内部で、妖怪MAXパワーが、強まって……っ。"
2002006-67 = "そのまま、飲むよりも……ふぅ。"
2002006-73 = "5倍は美味しくなると、部員の皆さまが……っ！"
2002006-74 = "[s] \"それ、騙されてるんじゃ！？\""
2002006-75 = "んっ！"
2002006-84 = "[ns] \"ああ、やっぱり……。\""
2002006-86 = "あ、あら……。"
2002006-87 = "いえ、こ、これくらい予想しておりました。"
2002006-88 = "炭酸飲料ですからね。"
2002006-89 = "美味しくなると信じて、リスクを承知で挑戦するか……。"
2002006-90 = "それとも現状に甘んじて、弱い自分を受け入れるのか……。"
2002006-91 = "……とても難しい問題でした。まるで私たちの人生のようですね。"
2002006-92 = "[s1] \"そんな深刻な問題ではないと思う！\"\n[s2] \"タオル、これ使ってね。\""
2002006-93 = "あ……ありがとうございます。"
2002006-97 = "あ……ありがとうございます。"
2002006-102 = "上は自分でもある程度は拭けますが……。"
2002006-103 = "下のほうは手が……。"
2002006-104 = "……どうしましょう。"
2002006-105 = "[s] \"ベタベタするだろうし、洗おうか？\""
2002006-109 = "えっ、えぇ！？#n先生が洗ってくださるのですか？"
2002006-110 = "それは、その……。"
2002006-111 = "[s] \"ごめんね、無理にとは――\""
2002006-115 = "いえ、だ、大丈夫です。"
2002006-116 = "そんなにこの超天才美少女の足に触れたいのですね！#n私は、か、構いませんよ！"
2002006-117 = "……すぅ、はぁ。"
2002006-121 = "……お願いしても、よろしいですか？"
2002006-127 = "[ns] \"それじゃあ……触るね。\""
2002006-128 = "え、ええ。好きなだけ綺麗にしていただいて構いません！"
2002006-131 = "[wa:100]― ふふっ、[wa:900]どうでしょう？"
2002006-134 = "― ミレニアム最高の美少女の足を"
2002006-136 = "― 洗う機会なんて……。"
2002006-139 = "― なかなか[wa:300]お目にかかれ……"
2002006-141 = "― かかれないはずの……。"
2002006-144 = "[wa:500]― っ……？"
2002006-146 = "― 思ったより……[wa:1720]なんだか変な……"
2002006-149 = "[wa:750]― 奇妙な……[wa:1350]は、[wa:1300]恥ずかしいというか……"
2002006-151 = "― ど、[wa:1300]どうして……？"
2002006-154 = "― げ、[wa:200]言語化が[wa:600]難しい感情が……！"
2002006-157 = "[wa:650]― ただ、[wa:950]先生が私の足を"
2002006-159 = "― 丁寧に洗ってくださっている[wa:1000]だけだというのに……"
2002006-162 = "― どうして……？"
2002006-165 = "[ns] \"石鹸で洗ってるだけだからね！？\""
2002006-166 = "[wa:250]― ふ、[wa:500]ふふっ。"
2002006-169 = "― ええ、[wa:950]もちろん覚悟はできておりますので、"
2002006-171 = "― お気になさらず。"
2002006-174 = "― どうぞ、[wa:900]心ゆくまで……！"
2002006-176 = "[wa:150]― ……覚悟は、[wa:1000]できている……[wa:1900]はず、[wa:1500]ですので。"
2002006-179 = "[ns] \"分かった、じゃあ続けるね。\""
2002006-180 = "[wa:100]― え、[wa:1300]ええ……"
2002006-182 = "― で、[wa:1420]では……[wa:2000]よろしくお願いします……。"
2002006-186 = "[ns] \"きれいになったよ。\""
2002006-187 = "は、はい……。"
2002006-188 = "……う、うぅ…………。"
2002006-189 = "[s] \"どうしたの？まだベタベタする？\""
2002006-193 = "い、いえ。その、ただ……。"
2002006-194 = "……私のような超天才美少女にも予想できませんでした。#nその……他人に身体を触れられる事が……こんなにも恥ずかしいとは。"
2002006-195 = "本当に……先生と過ごしていると、予想もできないようなことをたくさん学べるので、感激しております。"
2002006-196 = "[s] \"あの……何を言っているのかさっぱり……。\""
2002006-197 = "ふふっ、お気になさることはありません。"
2002006-198 = "これは私だけの……"
2002006-199 = "……ほんの些細な気づきですので♪"
2002006-201 = "（その後、二人で妖怪MAXを飲みながら、ヒマリの仕事を手伝った）"
