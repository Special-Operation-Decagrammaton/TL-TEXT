[translation]
2002602-1 = "建築はどのように作られていくのか"
2002602-5 = "D.U.郊外・バス停"
2002602-6 = " (外回りの仕事が深夜までかかり、始発で帰ることになった)"
2002602-12 = "（……早朝にもかかわらず、バス停には大勢の生徒がいる)"
2002602-16 = "[ns]（今日はイベントでもあるのかな……？）"
2002602-17 = "いや～何日ぶりの仕事だろ？#n今月は諦めてたのに。"
2002602-18 = "前々から楽しみにしてた新作のグッズを買っちゃったから、仕事が入って助かったよ。"
2002602-19 = "今回の仕事は、あんまり大変じゃないといいな～#n1日中セメント運びする現場は、もうコリゴリ。"
2002602-20 = "ホント、それ。#n配管工事だったら楽できるんだけど……。"
2002602-25 = "[ns] 静かにバスを待つ。"
2002602-32 = "足場5人、鉄骨10人だ！"
2002602-37 = "私！私がやる！"
2002602-38 = "私も！私もやりたい！"
2002602-40 = "よし、早く乗れ！#n作業開始まで時間がない！"
2002602-52 = "[ns] \"わっ……\""
2002602-53 = "おいっ！そこに突っ立ってたら乗れないだろう！？"
2002602-54 = "もし間に合わなかったら、責任を取れるのか！？"
2002602-55 = "[s1] \"そうじゃなくて、私は……\"\n[s2] \"ここでバスを……\""
2002602-68 = "全員乗ったか？ よし、出発だ！"
2002602-69 = "[ns] \"ま、待って……！\""
2002602-71 = "（……人波に流され、気づけばワゴン車に乗っていた)"
2002602-74 = "おはよう、キヴォトスの労働者諸君！"
2002602-75 = "あたしは本日の現場監督を務める、レッドウィンター連邦学園の[ruby=やすもり]安守[/ruby]ミノリだ！"
2002602-76 = "久しぶりの仕事、全力で我々の労働力を証明しよう！"
2002602-77 = "無論、現場の安全性と給与の受け取りは労働者の正当な権利！少しでも疑問があれば、すぐ現場事務所まで報告するように！"
2002602-78 = "おおーっ！！"
2002602-79 = "それじゃあ……安全、第一！"
2002602-80 = "よしっ！"
2002602-81 = "つまずき転倒！足元注意！指差し確認、ヨシ！"
2002602-82 = "よしっ！よしっ！よしっ！"
2002602-83 = "よし！今日も一日、安全第一で頑張ろう！！"
2002602-84 = "[ns] \"……すごく張り切ってるね。\""
2002602-85 = "……ん？"
2002602-86 = "[USERNAME]先生じゃないか。#nどうして作業現場に……！？"
2002602-87 = "[s3] \"それが……\"\n[s4] 経緯を説明する。"
2002602-91 = "ああ、人波に揉まれて送迎車に……"
2002602-92 = "それは申し訳ない。#nあのバス停は、工務部の集合場所だったんだ。"
2002602-93 = "しかし、参ったな……今は先生を送り返せる車がない。#n最寄り駅はかなり遠いし……"
2002602-94 = "[ns] \"大丈夫、 気にしないで。 \""
2002602-96 = "[ns] \"みんなが普段どんな風に働いてるか気になってたから。 \""
2002602-97 = "……そうか？#nなら、せっかくの機会だし、現場を見学するのはどうだ？"
2002602-98 = "時間を奪ってしまったお詫びに、#n作業が終わったら行きつけの店で特大カツ丼を奢ろう。"
2002602-99 = "あそこのカツは肉厚で、疲れた身体に染みる濃いめの味噌汁が最高なんだ。"
2002602-100 = "やはり労働の後は、丼モノでお腹を満たすに限るな！"
2002602-101 = "あ、そうだ。見学の前に、これを必ず着用してくれ。"
2002602-108 = "[ns] \"……これは？\""
2002602-109 = "ヘルメットとハーネスだ。#n現場では「一に安全、二に安全」！"
2002602-110 = "キヴォトスの生徒はいくら丈夫といえど、工事現場には銃器以上に危険な装備もあるから徹底している。"
2002602-111 = "それと不用意に危険な場所には近づかないこと。#nそして常に足元には気を配ること、分かったか？"
2002602-112 = "[s] \"肝に銘じるね。\""
2002602-113 = "よし！"
2002602-114 = "それでは……今日も充実な一日にしよう！"
2002602-118 = "溶接班！ここの手すりを溶接したら上げてくれ！"
2002602-124 = "左官班！モルタル3袋をこっちに！合板の下地を仕上げろ！"
2002602-125 = "[s5] \"すごいスピード……。\"\n[s6] \"あっという間に1フロア完成……。\""
2002602-128 = "……そうか？#n今日はみんな本調子じゃないのか、いつもより遅い気がするぞ。"
2002602-129 = "[s] \"このペースだと1週間でビルが建ちそうだね。\""
2002602-130 = "そう言ってもらえるのはありがたいが、#n発注元からは完工が遅い、とよく小言が飛んでくる。"
2002602-131 = "多少、納期が先延ばしになろうと、#n完成度で並ぶ者はいないと自負しているのだが……"
2002602-132 = "みんな、よくやってくれているのに、どうして遅れてしまうのだろう……。"
2002602-133 = "[s7] \"こんなに速いのに……。\"\n[s8] \"大変だね……。\""
2002602-141 = "ご苦労、ミノリ部長。#nこうして直接挨拶するのは初めてだな？"
2002602-142 = "私が今回の工事を依頼したマグマ建設の社長だ。#nはっはっは、会えて嬉しいぞ。"
2002602-143 = "ああ、あなたが今回の発注者か。#n依頼、感謝する。"
2002602-144 = "お礼を言いたいのは私の方だ。#n無茶な納期だが、引き受けてもらって助かったよ。"
2002602-145 = "……ところで、どうしてこちらに？#n施工はスケジュール通り、問題なく進んでいるぞ。"
2002602-146 = "現場の安全は、あたしが責任を持って守る。安心していい。"
2002602-147 = "あー、そうじゃないんだ。"
2002602-148 = "実は……工務部にひとつ、お願いがあってだな。"
2002602-149 = "お願い？"
2002602-150 = "それが、別の現場と請求時期が重なってしまって……#n手持ちのキャッシュが足りないんだ……"
2002602-151 = "つまり、給与を即日支払う話になっていたが、来月でも大丈夫かの相談を……"
2002602-155 = "もちろん、その代わり料金は上乗せしよう。#nだからすまないが――"
2002602-157 = "全員、作業中止！"
2002602-164 = "給与なきところに労働なし！"
2002602-165 = "労働とは、人が生存するために行われる闘争だ！#n全ての労働には、相応の対価が支払わなければならない！"
2002602-166 = "そんな尊い行為を侮辱するとは……"
2002602-167 = "労働の価値が分からない者の仕事など、受ける気はない！"
2002602-168 = "ま、待ってくれ！支払わないとは言ってないだろう？#nただ、来月まで待ってほしくてだな……"
2002602-169 = "何たる詭弁を！#n我々は合意のもと、労働を提供する契約を結んでいる！"
2002602-170 = "契約書に示されていない労働は、1秒たりとも提供できない！"
2002602-171 = "そうだそうだ！"
2002602-172 = "チッ……面倒なガキどもが。"
2002602-173 = "分かった、分かった！今日はもう帰ってくれ。"
2002602-174 = "明日は日当を用意する……それで作業を再開してくれるな？"
2002602-175 = "お金を用意できるのなら、我々も労働を約束しよう。"
2002602-176 = "……待て、今日作業した分の給与はどうなるんだ？"
2002602-177 = "はぁ、聞いてなかったのか？#nだから今は手持ちがだな……"
2002602-178 = "ったく、あぁもういい！明日からやってくれれば、それで構わん！"
2002602-179 = "なるほど……そうやって労働者を不当に扱った利益で富を築いたのだな。#nこのブルジョワめ……！"
2002602-180 = "労働の価値を軽んじるとは、それ相応の覚悟があるということだな！"
2002602-181 = "爆破班！ありったけのダイナマイトを用意しろ！"
2002602-182 = "ダ、ダイナマイト……？#nお、おおお、お前たちっ、何をする気だ？"
2002602-183 = "まさか、仕事を放棄するのか……？"
2002602-184 = "放棄したわけじゃない。ただ、無償の労働は行わないだけだ。"
2002602-185 = "給与を受け取れない以上……全て爆破する！"
2002602-186 = "まっ、待て！壊したところで、明日また建て直すことになるだろう！"
2002602-187 = "ここまで出来上がっているのに壊すなんて、もったいないとは思わないのかっ！？"
2002602-188 = "おっ、お前らは自分が作った建築物に誇りがないのか！？"
2002602-189 = "誇りを盾にするのは、資本家の常套手段だな。"
2002602-195 = "……最後に、もう一度だけ聞こう。#n我々の給与は持ってきたか？"
2002602-196 = "何度も言わせるな！#n明日には持ってくるから――"
2002602-202 = "ならば……爆発だ！"
2002602-208 = "あああぁっ……!"
2002602-211 = "ふっ……これでまた1人、労働の価値を理解する者が増えたはずだ。#nお腹も空いたことだし……"
2002602-212 = "よし！今日は全員に特大カツ丼を奢ろう！#nお腹を満たして、気分よく帰ろうじゃないか！"
2002602-215 = "おおっ！流石は部長！"
2002602-216 = "部長、一生ついていきます！"
2002602-218 = "しかし……どうして我々工務部は、これだけ優秀な部員がいて納期に遅れるのだろうか。不思議なものだ。"
2002602-223 = "（その疑問に対する答えは明らかだったが、余計な言葉は慎むことにした……）"
2002602-225 = "（……その後、ミノリ行きつけのカツ丼屋で、工務部のみんなと熱々のカツ丼を食べてから、シャーレに戻った）"
