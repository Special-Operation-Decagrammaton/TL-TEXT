[translation]
2002602-1 = "Como as construções são feitas"
2002602-5 = "Subúrbios de D.U. - Ponto de ônibus"
2002602-6 = " (O trabalho externo durou até tarde da noite e acabei voltando no primeiro ônibus da manhã)"
2002602-12 = "（……Apesar de ser de manhã cedo, há muitos estudantes no ponto de ônibus)"
2002602-16 = "[ns]（Será que tem algum evento hoje...?）"
2002602-17 = "Nossa, faz quantos dias que não trabalho?#nEu já tinha desistido deste mês."
2002602-18 = "Comprei uns produtos novos que eu queria há tempos, então esse trabalho veio na hora certa."
2002602-19 = "Espero que o trabalho de hoje não seja muito pesado.#nJá estou farta de canteiros de obras onde preciso carregar cimento o dia todo."
2002602-20 = "Pois é. Se fosse instalação de encanamento, seria bem mais tranquilo..."
2002602-25 = "[ns] Espero o ônibus em silêncio."
2002602-32 = "Cinco pessoas para os andaimes, dez para a estrutura de aço!"
2002602-37 = "Eu! Eu vou!"
2002602-38 = "Eu também! Eu também quero fazer!"
2002602-40 = "Certo, subam logo!#nNão temos tempo até o início do trabalho!"
2002602-52 = "[ns] \"Ei...\""
2002602-53 = "Ei! Se ficar parado aí, não vai conseguir subir!?"
2002602-54 = "Se não chegarmos a tempo, você vai se responsabilizar!?"
2002602-55 = "[s1] \"Não é isso, eu só...\"\n[s2] \"Eu estava esperando o ônibus aqui...\""
2002602-68 = "Todos subiram? Certo, vamos partir!"
2002602-69 = "[ns] \"E-espera...!\""
2002602-71 = "（……Fui levado pela multidão e, quando percebi, já estava dentro da van)"
2002602-74 = "Bom dia, trabalhadores de Kivotos!"
2002602-75 = "Eu sou Minori Yasumori, da Academia Red Winter, e serei a supervisora do canteiro de obras hoje!"
2002602-76 = "Depois de tanto tempo sem trabalho, vamos provar nossa força de trabalho com tudo!"
2002602-77 = "Claro, a segurança no local e o recebimento do salário são direitos legítimos dos trabalhadores! Se tiverem qualquer dúvida, relatem imediatamente ao escritório da obra!"
2002602-78 = "Oooooh!!"
2002602-79 = "Então... Segurança em primeiro lugar!"
2002602-80 = "Certo!"
2002602-81 = "Cuidado com tropeços e quedas! Atenção onde pisa! Verificação visual, ok!"
2002602-82 = "Ok! Ok! Ok!"
2002602-83 = "Certo! Vamos nos esforçar hoje com segurança em primeiro lugar!!"
2002602-84 = "[ns] \"……Vocês estão bem animados.\""
2002602-85 = "……Hm?"
2002602-86 = "Professor [USERNAME]?#nO que faz em um canteiro de obras...!?"
2002602-87 = "[s3] \"É que...\"\n[s4] Explicar a situação."
2002602-91 = "Ah, entendi, você foi levado pela multidão até o veículo de transporte..."
2002602-92 = "Sinto muito por isso.#nAquele ponto de ônibus era o local de encontro do Departamento de Obras."
2002602-93 = "Mas que situação... Não temos nenhum carro para levar o professor de volta agora.#nE a estação mais próxima é bem longe..."
2002602-94 = "[ns] \"Tudo bem, não se preocupe.\""
2002602-96 = "[ns] \"Eu estava curioso para ver como vocês trabalham no dia a dia.\""
2002602-97 = "……É mesmo?#nEntão, já que estamos aqui, que tal visitar o canteiro de obras?"
2002602-98 = "Como pedido de desculpas por ter tomado seu tempo,#nquando o trabalho terminar, vou te pagar um katsudon gigante no meu restaurante favorito."
2002602-99 = "A carne lá é bem grossa e a sopa de missô encorpada é perfeita para revigorar o corpo cansado."
2002602-100 = "Não há nada melhor do que um bom prato de arroz com cobertura para repor as energias após o trabalho!"
2002602-101 = "Ah, é verdade. Antes da visita, vista isto obrigatoriamente."
2002602-108 = "[ns] \"……O que é isso?\""
2002602-109 = "Um capacete e um cinto de segurança.#nNo canteiro de obras, a regra é: segurança em primeiro e segundo lugar!"
2002602-110 = "Por mais resistentes que os estudantes de Kivotos sejam, existem equipamentos em canteiros de obras que são mais perigosos que armas de fogo, então somos rigorosos."
2002602-111 = "E não se aproxime de áreas perigosas sem necessidade.#nAlém disso, preste sempre atenção onde pisa, entendeu?"
2002602-112 = "[s] \"Vou levar isso a sério.\""
2002602-113 = "Certo!"
2002602-114 = "Muito bem... vamos fazer de hoje um dia produtivo!"
2002602-118 = "Equipe de soldagem! Assim que terminarem de soldar esse corrimão, levantem-no!"
2002602-124 = "Equipe de alvenaria! Tragam 3 sacos de argamassa para cá! Finalizem a base de compensado!"
2002602-125 = "[s5] \"Que velocidade incrível...\"\n[s6] \"Completaram um andar num piscar de olhos...\""
2002602-128 = "......É mesmo? #nAcho que o pessoal não está no seu melhor hoje, sinto que estamos mais lentos que o normal."
2002602-129 = "[s] \"Nesse ritmo, parece que o prédio vai ficar pronto em uma semana.\""
2002602-130 = "Agradeço por dizer isso, mas #no contratante vive reclamando que a conclusão da obra está atrasada."
2002602-131 = "Mesmo que o prazo de entrega seja adiado um pouco, #nme orgulho de dizer que ninguém supera a nossa qualidade de acabamento..."
2002602-132 = "Eles trabalham tão bem, por que será que estamos atrasados...?"
2002602-133 = "[s7] \"Mesmo sendo tão rápidos...\"\n[s8] \"Que situação difícil...\""
2002602-141 = "Bom trabalho, Chefe Minori. #nÉ a primeira vez que nos cumprimentamos pessoalmente, não é?"
2002602-142 = "Eu sou o presidente da Magma Construções, quem solicitou esta obra. #nHahaha, é um prazer conhecê-la."
2002602-143 = "Ah, então você é o contratante. #nObrigada pela solicitação."
2002602-144 = "Eu é que deveria agradecer. #nO prazo era absurdo, mas agradeço por terem aceitado."
2002602-145 = "......A propósito, por que veio aqui? #nA construção está seguindo o cronograma sem problemas."
2002602-146 = "Eu garanto a segurança do canteiro de obras. Pode ficar tranquilo."
2002602-147 = "Ah, não é sobre isso."
2002602-148 = "Na verdade... eu tenho um pedido para o Departamento de Obras."
2002602-149 = "Um pedido?"
2002602-150 = "É que as datas de pagamento de outra obra coincidiram com esta... #ne estou sem dinheiro em caixa no momento..."
2002602-151 = "Em suma, tínhamos combinado o pagamento do salário no mesmo dia, mas queria saber se podemos adiar para o mês que vem..."
2002602-155 = "Claro, em troca, aumentarei o valor do pagamento. #nPor isso, me desculpe, mas..."
2002602-157 = "Todos, parem o trabalho!"
2002602-164 = "Sem salário, não há trabalho!"
2002602-165 = "O trabalho é uma luta que o ser humano trava para sobreviver! #nTodo trabalho deve ser recompensado com a devida contrapartida!"
2002602-166 = "Insultar um ato tão nobre como este..."
2002602-167 = "Não tenho intenção de aceitar o trabalho de quem não valoriza o esforço laboral!"
2002602-168 = "Es-espere! Eu não disse que não ia pagar, disse? #nSó queria que esperassem até o mês que vem..."
2002602-169 = "Que sofisma! #nNós firmamos um contrato para fornecer mão de obra mediante um acordo!"
2002602-170 = "Não fornecerei nem um segundo de trabalho que não esteja estipulado no contrato!"
2002602-171 = "Isso mesmo!"
2002602-172 = "Tsc... que pirralhos problemáticos."
2002602-173 = "Entendido, entendido! Podem ir para casa por hoje."
2002602-174 = "Amanhã trarei o pagamento diário... com isso, vocês retomam o trabalho, certo?"
2002602-175 = "Se puder garantir o dinheiro, nós garantiremos o trabalho."
2002602-176 = "......Espere, e o salário pelo trabalho de hoje, como fica?"
2002602-177 = "Hã, você não ouviu? #nEu disse que estou sem dinheiro agora..."
2002602-178 = "Ah, quer saber, chega! Se voltarem a trabalhar amanhã, por mim tudo bem!"
2002602-179 = "Entendo... então foi assim que você acumulou riqueza, tratando os trabalhadores de forma injusta. #nSeu burguês...!"
2002602-180 = "Se você menospreza o valor do trabalho, então deve estar preparado para as consequências!"
2002602-181 = "Equipe de demolição! Preparem toda a dinamite que tiverem!"
2002602-182 = "Di-dinamite...? #nO-o-o que vocês pensam que estão fazendo?"
2002602-183 = "Vocês vão mesmo abandonar o trabalho...?"
2002602-184 = "Não estamos abandonando. Só não realizamos trabalho não remunerado."
2002602-185 = "Já que não vamos receber... vamos explodir tudo!"
2002602-186 = "Es-espere! Se destruírem tudo, terão que reconstruir amanhã, não é?!"
2002602-187 = "Já está quase pronto, não acha um desperdício destruir tudo agora!?"
2002602-188 = "Vo-vocês não têm orgulho das construções que fazem!?"
2002602-189 = "Usar o orgulho como escudo é o truque habitual dos capitalistas."
2002602-195 = "……Por último, vou perguntar só mais uma vez.#nVocê trouxe o nosso pagamento?"
2002602-196 = "Não me faça repetir várias vezes!#nEu trarei amanhã, então――"
2002602-202 = "Então…… que exploda!"
2002602-208 = "Aaaaah……!"
2002602-211 = "Hmph…… com isso, mais uma pessoa aprendeu o valor do trabalho.#nE como estou com fome……"
2002602-212 = "Certo! Hoje vou pagar um katsudon extra grande para todos!#nVamos encher a barriga e voltar para casa de bom humor!"
2002602-215 = "Oh! Como esperado da nossa chefe!"
2002602-216 = "Chefe, eu te seguirei pelo resto da vida!"
2002602-218 = "Mas…… por que será que nós do Departamento de Obras, com membros tão talentosos, sempre atrasamos o prazo de entrega? É um mistério."
2002602-223 = "（A resposta para essa dúvida era óbvia, mas decidi guardar minhas palavras para mim mesmo……）"
2002602-225 = "（……Depois disso, comi um katsudon bem quente com o pessoal do Departamento de Obras no restaurante favorito da Minori, e então voltei para o Schale）"
