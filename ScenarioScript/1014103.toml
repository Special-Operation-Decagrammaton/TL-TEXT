[translation]
1014103-1 = "予想外のプレゼント"
1014103-2 = "シャーレ・オフィス"
1014103-4 = "お、お邪魔します、先生。"
1014103-5 = "い、[ruby=いぐさ]伊草[/ruby]ハルカ、当番に来ました……。"
1014103-6 = "[s1] \"いらっしゃい、ハルカ。\"\n[s2] \"ちょうどコーヒーを淹れてるところだけど、飲む？\""
1014103-9 = "せ、先生が淹れたコーヒー！？そ、そんな貴重なものを……！"
1014103-10 = "あ、そういえば私も持ってきたものがあるんです！"
1014103-11 = "その……先生への献上品です……。"
1014103-12 = "[s] \"献上！？\""
1014103-13 = "はい。ど、どうか受け取ってください！"
1014103-19 = "（ハルカが渡してきたのは普通サイズの紙箱だった）"
1014103-21 = "その……この前、先生が気に入っていたようでしたので……。"
1014103-22 = "箱に入れて、持ってきました……。"
1014103-23 = "[s] \"いったいなんの話だろう……？\""
1014103-25 = "（見当もつかなかったので、ひとまず箱を開けてみた）"
1014103-27 = "（中には……）"
1014103-31 = "[ns] \"……ドレス？\""
1014103-33 = "（……ハルカが着ていたドレスが綺麗に畳まれていた）"
1014103-34 = "はい。その、博覧会場でお会いしたとき……。"
1014103-35 = "ど、ドレスが綺麗だとおっしゃってくださったので……。"
1014103-36 = "も、持ってきました！"
1014103-37 = "き、きっと先生にも似合うと思います……！"
1014103-38 = "[s] \"私に！？\""
1014103-39 = "はい！す、好きなだけ着ていいですから！"
1014103-40 = "[s] \"着る！？\""
1014103-41 = "し、心配しなくて大丈夫です！"
1014103-42 = "私の体臭が残らないよう、ドライクリーニングやアイロンがけ……できることは全部やりました！"
1014103-43 = "あれ？もしかしてこれ、マナー違反でしたか……？"
1014103-44 = "この場合は、新しいものを買うのが正しいとか……！"
1014103-45 = "でも、これと同じドレスはどこにもなくて……。"
1014103-46 = "買ったお店にすらなかったので……。"
1014103-47 = "私のを持ってきたんですが……。"
1014103-48 = "す、すみません！ブラックマーケットを隅から隅まで探してでも新しいドレスを……！"
1014103-49 = "[s3] \"いやいやいや！\"\n[s4] \"ドレスが綺麗という意味で言ったわけじゃないよ。\""
1014103-52 = "えっ……？"
1014103-53 = "そ、そうなんですか……？"
1014103-54 = "でも、そのような感じのことを聞いたような気がするんですが……。"
1014103-55 = "ま、まさか……私の幻聴……！？"
1014103-56 = "[s] \"ううん、綺麗だと言ったのは事実だよ。\""
1014103-60 = "[ns] \"ドレスを着たハルカがね。\""
1014103-61 = "……。"
1014103-62 = "え、えええ！？"
1014103-63 = "そ、そ、そんな……。"
1014103-64 = "わ、私が……綺麗……。"
1014103-71 = "昔聞いたことがあります。こうすれば夢から目覚めるって……。"
1014103-75 = "[ns] \"す、ストップ！\""
1014103-78 = "（ひとまずハルカを落ち着かせたあと……）"
1014103-79 = "（ドレスが入っている箱をハルカに渡した）"
1014103-82 = "[ns] \"信じられないなら、あっちの部屋でドレスに着替えてみたら？\""
1014103-83 = "え？い、今ですか……？"
1014103-84 = "改めてとなると、すごく緊張しますけど……。"
1014103-85 = "せ、先生がそう仰るなら……はい。"
1014103-93 = "（しばらくして）"
1014103-101 = "き、着替えてきました……。"
1014103-102 = "あっ、姿見……。"
1014103-103 = "[s] \"どう？\""
1014103-104 = "ど、どうって言われましても……。"
1014103-105 = "その……。"
1014103-106 = "うう……！"
1014103-107 = "うぁぁ……！"
1014103-112 = "（ハルカは頬を赤くしたままオフィスを去ってしまった……）"
