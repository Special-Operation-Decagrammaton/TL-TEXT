[translation]#[Não revisado] - Filipe 09/06/26
1014103-1 = "Presente inesperado"
1014103-2 = "Schale · Escritório"
1014103-4 = "C-com licença, Sensei."
1014103-5 = "I- [ruby=いぐさ]Igusa[/ruby] Haruka, vim para o plantão..."
1014103-6 = "[s1] \"Bem-vinda, Haruka.\"\n[s2] \"Estou fazendo café, quer um pouco?\""
1014103-9 = "C-café feito pelo Sensei!? Uma coisa tão preciosa...!"
1014103-10 = "Ah, eu também trouxe uma coisa!"
1014103-11 = "É... uma oferenda para o senhor..."
1014103-12 = "[s] \"Oferenda!?\""
1014103-13 = "Sim. Por favor, aceite!"
1014103-19 = "(Haruka entregou uma caixa de papel de tamanho comum)"
1014103-21 = "É que... outro dia, o senhor pareceu gostar..."
1014103-22 = "Então eu embrulhei e trouxe..."
1014103-23 = "[s] \"Do que você está falando?\""
1014103-25 = "(Sem fazer ideia, resolveu abrir a caixa)"
1014103-27 = "(Dentro dela...) "
1014103-31 = "[ns] \"... Um vestido?\""
1014103-33 = "(... Estava o vestido que Haruka usava, bem dobrado)"
1014103-34 = "Sim. Quando nos encontramos na feira..."
1014103-35 = "O senhor disse que meu vestido era lindo..."
1014103-36 = "Então eu trouxe!"
1014103-37 = "C-com certeza vai ficar bem no senhor!"
1014103-38 = "[s] \"Em mim!?\""
1014103-39 = "Sim! Pode usar à vontade!"
1014103-40 = "[s] \"Usar!?\""
1014103-41 = "Pode ficar tranquilo!"
1014103-42 = "Para não deixar o meu cheiro, mandei lavar a seco, passei... fiz tudo o que pude!"
1014103-43 = "Ora? Foi falta de educação, talvez? O correto seria comprar um novo..."
1014103-44 = "Mas não encontro esse mesmo vestido em lugar nenhum..."
1014103-45 = "Nem na loja onde comprei..."
1014103-46 = "Por isso trouxe o meu..."
1014103-47 = "D-desculpa! Vou procurar no Mercado Negro de cabo a rabo e comprar um novo..."
1014103-48 = "[s3] \"Não, não, não!\"\n[s4] \"Eu não disse que o vestido era lindo.\""
1014103-52 = "Hã...?"
1014103-53 = "É... mesmo?"
1014103-54 = "Mas tive a impressão de que o senhor disse algo do tipo..."
1014103-55 = "S-será que foi alucinação...?"
1014103-56 = "[s] \"Não, eu disse que estava lindo sim.\""
1014103-60 = "[ns] \"Você, Haruka, vestindo o vestido.\""
1014103-61 = "..."
1014103-62 = "Q-quê!?"
1014103-63 = "E-eu... linda..."
1014103-71 = "Ouvi dizer que se fizer isso, a gente acorda do sonho..."
1014103-75 = "[ns] \"P-pare!\""
1014103-78 = "(Depois de acalmar Haruka...)"
1014103-79 = "(Devolveu a caixa com o vestido para ela)"
1014103-82 = "[ns] \"Se não acredita, vai na outra sala e veste ele de novo.\""
1014103-83 = "Hã? A-agora?"
1014103-84 = "Dá um nervoso danado..."
1014103-85 = "Se o senhor está dizendo... sim."
1014103-93 = "(Um tempo depois)"
1014103-101 = "M-me troquei..."
1014103-102 = "Ah, o espelho..."
1014103-103 = "[s] \"E então?\""
1014103-104 = "O que quer que eu diga..."
1014103-105 = "Bem..."
1014103-106 = "Uuh...!"
1014103-107 = "Uaaah...!"
1014103-112 = "(Haruka, com o rosto vermelho, saiu correndo do escritório...)"