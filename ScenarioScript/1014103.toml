[translation]
1014103-1 = "An Unexpected Gift"
1014103-2 = "Schale Office"
1014103-4 = "E-excuse me, Sensei."
1014103-5 = "I, Haruka Igusa, have arrived for my shift..."
1014103-6 = "[s1] \"Welcome, Haruka.\"\n[s2] \"I was just about to brew some coffee. Would you like some?\""
1014103-9 = "C-coffee brewed by Sensei!? S-such a precious thing...!"
1014103-10 = "Oh, come to think of it, I brought something too!"
1014103-11 = "It's... an offering for you, Sensei..."
1014103-12 = "[s] \"An offering!?\""
1014103-13 = "Yes. P-please, take it!"
1014103-19 = "(Haruka handed over a standard-sized paper box.)"
1014103-21 = "Um... you seemed to like it the other day, so..."
1014103-22 = "I put it in a box and brought it here..."
1014103-23 = "[s] \"What on earth could she be talking about...?\""
1014103-25 = "(I had no idea, so I decided to open the box.)"
1014103-27 = "(Inside was...)"
1014103-31 = "[ns] \"...A dress?\""
1014103-33 = "(...The dress Haruka had been wearing was neatly folded inside.)"
1014103-34 = "Yes. Um, when we met at the exhibition..."
1014103-35 = "You said the dress was beautiful, so..."
1014103-36 = "I b-brought it!"
1014103-37 = "I-I'm sure it would look good on you too...!"
1014103-38 = "[s] \"On me!?\""
1014103-39 = "Yes! Y-you can wear it as much as you want!"
1014103-40 = "[s] \"Wear it!?\""
1014103-41 = "D-don't worry, it's fine!"
1014103-42 = "I made sure there was no trace of my scent left—I dry-cleaned it, ironed it... I did everything I could!"
1014103-43 = "Huh? Wait, was this a breach of etiquette...?"
1014103-44 = "Is it supposed to be that I should have bought a new one instead...!?"
1014103-45 = "But I couldn't find this same dress anywhere..."
1014103-46 = "It wasn't even at the store where I bought it..."
1014103-47 = "So I brought mine..."
1014103-48 = "I-I'm so sorry! I'll search every corner of the black market to find you a new one...!"
1014103-49 = "[s3] \"No, no, no!\"\n[s4] \"That's not what I meant when I said the dress was beautiful.\""
1014103-52 = "Huh...?"
1014103-53 = "I-is that so...?"
1014103-54 = "But I could have sworn I heard you say something like that..."
1014103-55 = "C-could it be... was I just hearing things...!?"
1014103-56 = "[s] \"No, it's true that I said it was beautiful.\""
1014103-60 = "[ns] \"I meant you wearing the dress, Haruka.\""
1014103-61 = "..."
1014103-62 = "W-whaaaaat!?"
1014103-63 = "T-t-that's..."
1014103-64 = "M-me... beautiful..."
1014103-71 = "I heard once that this is how you wake up from a dream..."
1014103-75 = "[ns] \"S-stop!\""
1014103-78 = "(After calming Haruka down for a moment...)"
1014103-79 = "(I handed the box containing the dress back to her.)"
1014103-82 = "[ns] \"If you don't believe me, why don't you go change into it in the other room?\""
1014103-83 = "Huh? N-now...?"
1014103-84 = "It makes me really nervous to do it again, but..."
1014103-85 = "I-if that's what you want, Sensei... okay."
1014103-93 = "(A while later)"
1014103-101 = "I-I've changed..."
1014103-102 = "Oh, a full-length mirror..."
1014103-103 = "[s] \"How is it?\""
1014103-104 = "H-how is it, you ask..."
1014103-105 = "Um..."
1014103-106 = "Uuu...!"
1014103-107 = "Waaaaah...!"
1014103-112 = "(Haruka left the office with her cheeks still bright red...)"