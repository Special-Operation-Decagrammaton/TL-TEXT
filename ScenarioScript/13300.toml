[translation]
13300-1 = "第30話;手帳の存在"
13300-3 = "もう、何やってるんですか！"
13300-5 = "ほ、ホシノちゃん、ごめんね。#n私のせいで……。"
13300-6 = "ごめんじゃありません！#nなんで毎回毎回騙されるんですか！？"
13300-7 = "そ、それは……。"
13300-8 = "こんな体たらくで「夢と希望に満ちたアビドス」なんて、よく言えたものですね……。#nはぁ、もう一人で勝手にやってください！"
13300-9 = "ほ、ホシノちゃん……？"
13300-11 = "もう付き合ってられません！#n生徒会は終わりです！"
13300-15 = "先輩なんて知りません！"
13300-20 = "……。"
13300-22 = "違うんです、先輩。#nあれは、本心じゃなくて……。"
13300-23 = "勢いで、ちょっと強く言ってしまっただけなんです。"
13300-24 = "すぐ戻るつもりだったのに……。"
13300-25 = "まさか……あれが最後になるとは、思わなくって。"
13300-28 = "ユメ先輩、戻りましたよ。"
13300-29 = "次は気をつければ良いですから。"
13300-30 = "それより……。"
13300-37 = "……ユメ先輩？"
13300-38 = "どこ行ってるんだろう、帰ってきてると思ったのに。"
13300-43 = "こんなメモ、あったかな……？"
13300-47 = "「いつもありがとう、ホシノちゃん！！お元気でね！」……？"
13300-50 = "……ユメ先輩？"
13300-52 = "ユメ先輩……。"
13300-54 = "ユメ先輩！"
13300-56 = "ユメ先輩！？"
13300-68 = "ごめんね、ホシノちゃん#n電波がうまく@#$%"
13300-69 = "砂漠にいたら@#&%砂嵐に遭って&#@"
13300-72 = "ホシノちゃん……ごめんね"
13300-73 = "またコンパスを忘れちゃった"
13300-74 = "メモも残したけど、ここでも送るね#n#n私の手帳は、あそこにあるから"
13300-75 = "ホシノちゃんもよく知っている@$^$%@#$#n目立つ場所に置いたから、すぐわかると思う"
13300-78 = "ホシノちゃん、私は"
13300-80 = "ユメ先輩……。"
13300-81 = "どうして砂漠に行ったんですか……？"
13300-82 = "……「用事」ってなんですか？#n私がいない間に何があったんですか……？"
13300-83 = "……手帳はどこにあるんですか？"
13300-84 = "手帳には……何が書かれているんですか？"
13300-85 = "……私は……手帳を見れないんですか……？"
13300-86 = "もう付き合ってられません！#n生徒会は終わりです！"
13300-88 = "私のせいですよね？"
13300-89 = "あの言葉が先輩を傷つけた……先輩を追いやった……。"
13300-90 = "「ホシノちゃん、私は」 。"
13300-91 = "あのメッセージの続きはなんだったんですか？"
13300-92 = "私には……分からなくて……。"
13300-93 = "……ユメ先輩。"
13300-96 = "どうして、どうして私は……。"
13300-103 = "……。"
13300-104 = "あれ……。"
13300-105 = "……風紀委員長ちゃんは！？"
13300-110 = "たしか、一緒に落ちたはず……。 "
13300-111 = "まあ、今は他人の心配をしてる場合じゃないか。"
13300-114 = "……大オアシス駅から、そう離れてないはず。"
13300-115 = "ユメ先輩と一緒に来たから、覚えてる。"
13300-116 = "もう少し進めば、かつてのオアシスがあって……。"
13300-117 = "そこに、列車砲があるはず。"
13300-118 = "早く、破壊するんだ。"
13300-119 = "じゃないと……。"
13300-120 = "私は――"
13300-133 = "そろそろオアシスが……。"
13300-138 = "そこまでよ、小鳥遊ホシノ。"
13300-139 = "……！？"
13300-150 = "……ぐっ。"
13300-151 = "ごほっ、ごほっ……！"
13300-156 = "ゆ、ユメ先輩……。"
13300-160 = "……。 "
13300-161 = "[ruby=くちなし]梔子[/ruby]ユメ……アビドスの生徒会長ね。"
13300-163 = "次回;唯一の真実（１）"
