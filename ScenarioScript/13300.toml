[translation]
13300-1 = "Episódio 30; A existência do caderno"
13300-3 = "Meu Deus, o que você está fazendo?!"
13300-5 = "Ho, Hoshino-chan, me desculpa. #nÉ tudo culpa minha..."
13300-6 = "Não me peça desculpas! #nPor que você é enganada toda santa vez?!"
13300-7 = "I-Isso é porque..."
13300-8 = "Com esse tipo de comportamento, como você pode dizer que Abydos é um lugar cheio de sonhos e esperanças? #nAh, faça o que quiser sozinha!"
13300-9 = "Ho, Hoshino-chan...?"
13300-11 = "Eu não aguento mais! #nO conselho estudantil acabou!"
13300-15 = "Eu não quero mais saber da senpai!"
13300-20 = "..."
13300-22 = "Não é isso, senpai. #nAquilo não foi o que eu realmente quis dizer..."
13300-23 = "Eu só falei daquele jeito por impulso, acabei sendo um pouco dura demais."
13300-24 = "Eu pretendia voltar logo..."
13300-25 = "Eu nunca imaginei que... aquilo seria a última vez."
13300-28 = "Yume-senpai, voltei."
13300-29 = "Da próxima vez é só ter mais cuidado."
13300-30 = "Mas antes disso..."
13300-37 = "...Yume-senpai?"
13300-38 = "Onde ela foi? Achei que ela já tivesse voltado."
13300-43 = "Será que esse bilhete já estava aqui...?"
13300-47 = "“Muito obrigada por tudo, Hoshino-chan!! Fique bem!”...?"
13300-50 = "...Yume-senpai?"
13300-52 = "Yume-senpai..."
13300-54 = "Yume-senpai!"
13300-56 = "Yume-senpai!?"
13300-68 = "Desculpa, Hoshino-chan #no sinal está meio @#$%"
13300-69 = "Quando eu estava no deserto, @#&% peguei uma tempestade de areia &#@"
13300-72 = "Hoshino-chan... me desculpa"
13300-73 = "Eu esqueci a bússola de novo"
13300-74 = "Eu deixei um bilhete, mas vou mandar por aqui também #n#nMeu caderno está ali"
13300-75 = "Você conhece bem o lugar @$^$%@#$ #nColoquei em um lugar visível, então acho que você vai achar fácil"
13300-78 = "Hoshino-chan, eu..."
13300-80 = "Yume-senpai..."
13300-81 = "Por que você foi para o deserto...?"
13300-82 = "...O que era esse \"assunto\"? #nO que aconteceu enquanto eu não estava por perto...?"
13300-83 = "...Onde está o caderno?"
13300-84 = "O que está escrito... no caderno?"
13300-85 = "...Eu não posso... ver o caderno...?"
13300-86 = "Eu não aguento mais! #nO conselho estudantil acabou!"
13300-88 = "A culpa é minha, não é?"
13300-89 = "Aquelas palavras feriram a senpai... e a afastaram..."
13300-90 = "“Hoshino-chan, eu...”"
13300-91 = "O que vinha depois daquela mensagem?"
13300-92 = "Eu... não consigo entender..."
13300-93 = "...Yume-senpai."
13300-96 = "Por que, por que eu..."
13300-103 = "..."
13300-104 = "Ué..."
13300-105 = "...Cadê a presidente do Comitê Disciplinar!?"
13300-110 = "Eu tenho certeza que caímos juntas..."
13300-111 = "Bem, acho que agora não é hora de me preocupar com os outros."
13300-114 = "……Não deve estar muito longe da Grande Estação do Oásis."
13300-115 = "Eu vim aqui com a Senpai Yume, então eu me lembro."
13300-116 = "Se avançarmos um pouco mais, haverá o antigo oásis e……."
13300-117 = "O canhão ferroviário deve estar lá."
13300-118 = "Precisamos destruí-lo logo."
13300-119 = "Senão……."
13300-120 = "Eu vou……"
13300-133 = "O oásis já deve estar……."
13300-138 = "Até aqui, Takanashi Hoshino."
13300-139 = "……!?"
13300-150 = "……Ugh."
13300-151 = "Cof, cof……!"
13300-156 = "Yu, Yume-senpai……."
13300-160 = "……."
13300-161 = "Kuchinashi Yume…… a presidente do conselho estudantil de Abydos, não é?"
