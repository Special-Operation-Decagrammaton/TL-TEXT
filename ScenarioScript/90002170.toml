[translation]
90002170-1 = "Episódio 17: A resposta humana"
90002170-3 = "[ns] \"Isso não é uma resposta.\""
90002170-4 = "……O que quer dizer com isso?"
90002170-5 = "[s] \"Pode ser uma resposta humana, mas não é uma resposta divina.\""
90002170-9 = "[ns] \"Isso não é uma auto-prova.\""
90002170-10 = "……!"
90002170-11 = "[ns] \"Não há necessidade de eliminar nossa tristeza.\""
90002170-13 = "[ns1] \"O passado é passado.\"\n[ns2] \"Não existe forma de reverter o que já aconteceu.\""
90002170-16 = "Mas, de agora em diante, será diferente. Eu vou corrigir isso."
90002170-17 = "[s] \"Você não pode fazer isso.\""
90002170-18 = "Por que pensa assim?"
90002170-19 = "[s3] \"Porque tudo isso sou eu.\"\n[s4] \"Não existe forma de entender os outros sem isso.\""
90002170-22 = "……!"
90002170-23 = "[ns5] \"E acima de tudo, se eu fugisse desse jeito.\"\n[ns6] \"Como eu poderia encarar meus alunos?\""
90002170-28 = "……!"
90002170-29 = "Entendo…… É isso, então……"
90002170-30 = "……."
90002170-31 = "……Hehe."
90002170-32 = "É invejável, não é?"
90002170-33 = "Sim……? O que exatamente?"
90002170-34 = "O, o fato de o sensei de vocês ser alguém assim. Hehe."
90002170-35 = "……Fufu, deixe-me corrigir um pouco."
90002170-36 = "O quê?"
90002170-41 = "o sensei."
90002170-42 = "Sim, de agora em diante."
90002170-43 = "……!"
90002170-45 = "……Ainda se prendendo a ser um aluno a esta altura? Que tolice."
90002170-46 = "[s] \"Talvez seja.\""
90002170-47 = "Pensei que, sendo você, faria uma escolha um pouco melhor."
90002170-48 = "[s] \"Porque, desde o início, eu sou apenas um humano comum.\""
90002170-49 = "Ninguém vai te culpar. Aqui estamos apenas eu e você, apenas nós dois."
90002170-50 = "Mesmo que você desvie o olhar do seu próprio coração, não haverá ninguém para te condenar."
90002170-54 = "[ns] \"Talvez exista esse ponto de vista.\""
90002170-56 = "……O Sensei é um companheiro da Alice."
90002170-58 = "Se é natural que o Sensei ajude os alunos, não é natural que os alunos queiram ser a força do Sensei?"
90002170-60 = "Vamos confiar na Momoi e na Midori."
90002170-62 = "Por isso, tenho certeza de que, enquanto continuarmos a transitar entre esses limites, falhando e nos reerguendo repetidamente……"
90002170-63 = "Acredito que, um dia, encontraremos o caminho."
90002170-77 = "[ns] \"Mesmo assim, não pode ser.\""
90002170-79 = "[ns7] \"Se o Sensei deixar de ser o 'Sensei'.\"\n[ns8] \"Os alunos não conseguirão mais ser 'alunos'.\""
90002170-82 = "Mesmo que não haja ninguém para testemunhar?"
90002170-85 = "[ns9] \"……É verdade.\"\n[ns10] \"Porque o 'eu' está observando a si mesmo.\""
90002170-90 = "……."
90002170-91 = "Entendo."
90002170-92 = "Como alguém que se tornará um deus, respeitarei sua escolha."
90002170-93 = "No entanto, isso não significa que eu a aceite."
90002170-94 = "Volte para seus alunos. Por sua própria vontade, para o seu antigo mundo."
90002170-98 = "[ns] \"……?\""
90002170-99 = "Não importa o que você use."
90002170-100 = "O Shittim Chest, o cartão de adulto, ou o poder que seus alunos possuem."
90002170-101 = "Mas... se você e seus alunos realmente se opuserem a mim —"
90002170-102 = "estejam cientes de que o que os aguarda é a extinção."
90002170-103 = "Estas são as minhas palavras. O mesmo vale para todos vocês que estão aí."
90002170-104 = "Quem tem ouvidos, ouça. Esta é a minha fúria e o meu aviso."
90002170-111 = "Eita!? Sabia que a gente tava aqui...!?"
90002170-112 = "I-isso não importa... Ei, olhem!"
90002170-113 = "Pessoal! O Sensei está descendo!"
90002170-116 = "(Enquanto o corpo flutuava no ar, ele foi lentamente colocado no chão)"
90002170-117 = "(Dependendo do ponto de vista, pode parecer um poder divino, uma misericórdia ou uma bênção...)"
90002170-118 = "(Mas o que nos aguarda logo à frente não é nada disso)"
90002170-122 = "Sensei!"
90002170-123 = "Sensei, você está bem?"
90002170-124 = "[s] \"Eu estou bem! Mas agora...\""
90002170-129 = "Ah..."
90002170-130 = "Bem..."
90002170-131 = "O-olá... nos encontramos de novo..."
90002170-132 = "Sensei [USERNAME]."
90002170-133 = "[s] \"...Sim. Estão todos bem?\""
90002170-134 = "S-sim..."
90002170-135 = "Não acha que este não é o momento para esse tipo de conversa?"
90002170-136 = "[s] \"Você tem razão. Primeiro, precisamos falar sobre isso.\""
90002170-138 = "(Expliquei a situação para todos, focando nos pontos principais)"
90002170-140 = "...Entendo."
90002170-141 = "Compreendido. Usando as palavras da Momoi —"
90002170-142 = "chegou a hora de finalmente enfrentar o Rei Demônio, o chefão final."
90002170-147 = "I-iiih... se fosse um jogo, talvez desse para dar um jeito..."
90002170-148 = "Chegamos até aqui, não tem mais como voltar atrás, né?"
90002170-149 = "Está tudo bem, Sensei. Nós já sabemos de algumas coisas."
90002170-150 = "Como a gente sabia? Bem, é que..."
90002170-151 = "E-espera! Não é melhor não falar sobre isso...?"
90002170-152 = "Por que?"
90002170-156 = "Porque isso é o que os humanos chamam de \"escuta clandestina\", né?"
90002170-157 = "E o que tem isso? #nTem até veterana que grampeia o escritório do Schale, sabia?"
90002170-163 = "...Vocês, estão mesmo bem?"
90002170-165 = "O-o que devemos fazer...?"
90002170-166 = "[s] \"Vocês podem ficar descansando.\""
90002170-167 = "M-mas..."
90002170-168 = "Não se preocupem. A posição de vocês é um pouco ambígua, afinal."
90002170-169 = "Se quiserem nos emprestar sua força, deixaremos para uma próxima oportunidade."
90002170-173 = "...Ah, desculpe. Esqueçam o que eu disse."
90002170-174 = "S-sim...?"
90002170-175 = "Por favor, escondam-se em algum lugar."
90002170-176 = "Eh...?"
90002170-178 = "Alguém importante está chegando."
90002170-186 = "A-aaaaah...!"
90002170-190 = "Vamos, rápido."
90002170-191 = "T-tá bom, já entendi...!"
90002170-196 = "Sensei, a Alice está pronta."
90002170-197 = "Está tudo bem. Não precisa se desculpar."
90002170-198 = "Talvez a Alice... tenha definido seu nome justamente para este momento, para este instante."
90002170-202 = "Por favor, Sensei! Se é para fazer, vamos fazer com energia!"
90002170-204 = "Sensei! Nós também faremos o nosso melhor!"
90002170-205 = "Shittim Chest, otimização de processo concluída. #n—— Sensei, aguardo suas instruções."
90002170-208 = "[ns] \"Certo, vamos tentar!\""
90002170-218 = "Sim!!!"
90002170-220 = "Próximo episódio: Uma história para você"
