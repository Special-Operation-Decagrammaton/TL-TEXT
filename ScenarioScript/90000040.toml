[translation]
90000040-1 = "第5話;「データ収集（４）ビナー」"
90000040-5 = "……お待たせしました。これがビナーの動きを予測したアルゴリズムです。"
90000040-6 = "過去にビナーが出没した座標データから出現パターンを分析、最も遭遇率が高い区域が特定できます。"
90000040-7 = "お疲れ様。ここに行けばビナーに会えるの？"
90000040-8 = "はい、90%以上の確率で遭遇できるかと。"
90000040-9 = "ですが、向こうがこのことに気がついたら、行動パターンを変更してくるという可能性は大いにあります。なので基本的に、チャンスは一度きりです。"
90000040-10 = "ビナーからのデータ収集、よろしくお願いしますね。"
90000040-11 = "あとはエイミと先生にお任せします。"
90000040-12 = "オッケー。"
90000040-13 = "[s] \"よし、行こうか。\""
