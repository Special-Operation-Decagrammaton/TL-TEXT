[translation]
2602-1 = "大人のオモチャ（２）"
2602-2 = "山海経・お茶屋さん「桃源郷」"
2602-3 = "ふふっ。こんなに仕事が早く終わって余裕ができるなんて、久しぶりですね。"
2602-4 = "今日は一日、こうしてお茶を飲みながらのんびり過ごして……"
2602-5 = "……あの人だよね？「例のアレ」を買った梅花園の教官……。"
2602-6 = "優しくて良い人そうだなって思ってたのに……人は見かけによらないね。"
2602-7 = "それより、その……玄武商会は頼んだら、やっぱりそういうのも融通してくれるんだ……？"
2602-8 = "みたいだね、流石はかの有名な玄武商会……。"
2602-9 = "……？なんだか、視線が……？"
2602-10 = "なんでしょう。この頃こうして外にいると、他の生徒たちからの視線が……？"
2602-11 = "誰からも恨みを買うようなことはしていないはずですが……。"
2602-12 = "[s] \"おはよう、シュン。\""
2602-13 = "あら、先生。お疲れ様です、何だかお久しぶりですね。"
2602-14 = "先生も、お茶を頂きに？"
2602-15 = "[s] \"うん、シュンも休憩中？\""
2602-16 = "はい。久しぶりに仕事が早く終わったので、少しゆっくりしようかと。"
2602-17 = "その割には浮かない表情……ですか？"
2602-18 = "ふふっ……流石は先生、鋭いですね。"
2602-19 = "実は、悩みごと……と言いますか、ちょっと気にかかってることがありまして。"
2602-20 = "[s1] \"それ、私が聞いても良いかな？\"\n[s2] \"先生として、生徒のためにできることがあれば喜んで。\""
2602-21 = "……ありがとうございます、先生。"
2602-22 = "……ありがとうございます、先生。"
2602-27 = "実は……何だか最近、変な視線を感じる気がする、と言いますか。"
2602-28 = "いつも仲良くしてくださった方に、どうしてか少し距離を取られてしまったり……こうして座っているだけでも、通りすがりの方々がこちらを見て何か話されているような気がしまして……。"
2602-29 = "このところの自分の行いを振り返ってみたのですが、特に思い当たることも無く……。"
2602-30 = "[s3] \"えっと……。\"\n[s4] \"それは、多分……。\""
2602-31 = "先生、何かご存知なんですか？"
2602-32 = "先生、何かご存知なんですか？"
2602-33 = "教えてください！私に何か悪いところがありましたら、直しますので……！"
2602-34 = "[s] 最近噂になっているシュンの話を、本人に伝えてみる。"
2602-37 = "わっ、私が「大人のオモチャ」を買った！？"
2602-38 = "[s] \"声が大きい……！\""
2602-39 = "ああっ、すみません……つ、つい、興奮してしまって……。"
2602-40 = "それより何故そんな、い、いやらしい噂が……！？私、大人のオモチャどころか、そういった類のものは一度も買ったこと……！"
2602-41 = "[s] 「玄武商会で買った物」について聞いてみる。"
2602-42 = "……？あら、先生がどうしてその件を……？"
2602-43 = "えっ、それが「大人のオモチャ」だという噂が……？"
2602-44 = "ううっ、そういうことでしたか……！確かに秘密にしてとは伝えましたが、こんなことになるだなんて……！"
2602-45 = "ち、違うんです先生！"
2602-46 = "あれはただの、ただの……"
2602-47 = "……ただの、お肌に使うマッサージローラーです。"
2602-48 = "[s] \"マッサージローラー？\""
2602-49 = "はい……何だか最近、お肌が荒れてきてしまって。なので、玄武商会に「お肌に効く」と噂のマッサージローラーを注文したのですが……"
2602-50 = "梅花園の教官が美容を気にしているなんて、あまり良くは思われないかなと思いまして、秘密にしていただこうかと……。"
2602-51 = "それだけでしたのに、まさか、まさかそんな、淫らな噂になってしまうなんて……うぅ……。"
2602-52 = "……仕方ありません。私が秘密にしたのが発端ですし、少しずつ誤解を解いていくしか……。"
2602-53 = "……ところで先生。その「大人のオモチャ」という話は、そもそも誰に聞いたのですか？"
2602-54 = "いくら何でもここまでの速さで広がるのは流石におかしいですし……もしかして、誰かが今も積極的に話を広めている可能性が……！"
2602-55 = "先生！知っていることを、全部話してください！"
2602-57 = "（シュンの勢いに圧されてしまい、実際のところは分からないけど……といくつか前置きをしつつ、ココナと会った時のことを話した）"
2602-60 = "ねーねーココナちゃん。シュンおねえちゃんが「恐ろしい大人のオモチャ」を持ってるってほんとー？"
2602-61 = "だからココナちゃんじゃなくて、ココナ教官！"
2602-62 = "……で、これは秘密なんだけど。シュン姉さんが玄武商会で「大人のオモチャ」を買ったのは本当。"
2602-63 = "子どもはもう見るだけで失神しちゃうような、それはもう恐ろしい形のグロテスクなオモチャが――"
2602-68 = "……ココナちゃん？"
2602-69 = "今されていたお話、詳しく聞かせていただいてもよろしいですか？"
2602-70 = "うぁぅっ！？"
2602-71 = "しゅ、シュン姉さん！？きょ、今日はもうお休みじゃ……！？"
2602-72 = "はい。ですがどうやら可愛い妹が、私のことであらぬ噂を広めているかもしれない、と知りまして……。"
2602-73 = "え、嘘！？それじゃあ、あの中に入っていたのは「大人のオモチャ」じゃなかったの……！？"
2602-74 = "そんなことあるわけないでしょう！？"
2602-75 = "ああもう、いっそあの時に中身を確認してもらっておけば、こんなことには……。"
2602-76 = "それはさておき。梅花園の教官ともあろう者が、他人の秘密を守れずに言いふらすだなんて……子どもたちがそんな様子を見て育ったらどうなるかくらい、ココナちゃんも分かりますよね？"
2602-77 = "そんなココナちゃんには……"
2602-79 = "お姉さんとして、特別な「教育」をしないといけませんね……？"
2602-81 = "うわぁぁぁん！それはいやぁっ！？許してぇぇぇぇっ！！！"
2602-83 = "とりあえず、噂の大本を止めることには成功したものの……"
2602-84 = "シュンが「とんでもない大人のオモチャ」を持っているという誤解は、山海経の生徒たちの間でしばらく残り続けた……。"
2602-85 = "大人のオモチャ"
