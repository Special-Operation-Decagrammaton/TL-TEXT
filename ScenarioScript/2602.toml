[translation]
2602-1 = "Brinquedo de adulto (2)"
2602-2 = "Shanhaijing - Casa de Chá \"Taoyuanxiang\""
2602-3 = "Fufu. É raro conseguir terminar o trabalho tão cedo e ter um tempo livre assim."
2602-4 = "Hoje vou passar o dia todo aqui, tomando chá e relaxando..."
2602-5 = "...É aquela pessoa, né? A instrutora do Plum Blossom Garden que comprou \"aquela coisa\"..."
2602-6 = "Eu achava que ela era uma pessoa gentil e boa... As aparências enganam mesmo."
2602-7 = "Mas, falando nisso... se a gente pedir, a Associação Genbu realmente faz esse tipo de favor...?"
2602-8 = "Parece que sim. Como esperado da famosa Associação Genbu..."
2602-9 = "...? Por que sinto que estão me olhando...?"
2602-10 = "O que será? Ultoriamente, quando estou aqui fora, sinto os olhares das outras alunas..."
2602-11 = "Eu não deveria ter feito nada que gerasse ressentimento em ninguém..."
2602-12 = "[s] \"Bom dia, Shun.\""
2602-13 = "Ah, Sensei. Bom trabalho. Faz tempo que não nos vemos, não é?"
2602-14 = "O Sensei também veio tomar um chá?"
2602-15 = "[s] \"Sim, você também está no seu intervalo, Shun?\""
2602-16 = "Sim. Como terminei o trabalho cedo pela primeira vez em muito tempo, pensei em descansar um pouco."
2602-17 = "Mas, apesar disso, você parece preocupada...?"
2602-18 = "Fufu... Como esperado do Sensei, você é perspicaz."
2602-19 = "Na verdade, eu tenho uma preocupação... ou melhor, algo que está me incomodando um pouco."
2602-20 = "[s1] \"Eu poderia ouvir sobre isso?\"\n[s2] \"Como Sensei, ficarei feliz em ajudar no que puder.\""
2602-21 = "...Muito obrigada, Sensei."
2602-22 = "...Muito obrigada, Sensei."
2602-27 = "Na verdade... sinto que ultimamente estou sendo alvo de olhares estranhos."
2602-28 = "Pessoas com quem eu sempre me dava bem estão mantendo distância por algum motivo... e mesmo só de estar sentada aqui, sinto que as pessoas que passam ficam olhando e cochichando sobre mim..."
2602-29 = "Refleti sobre minhas ações recentes, mas não consigo pensar em nada específico..."
2602-30 = "[s3] \"Bem...\"\n[s4] \"Isso é, provavelmente...\""
2602-31 = "Sensei, você sabe de alguma coisa?"
2602-32 = "Sensei, você sabe de alguma coisa?"
2602-33 = "Por favor, me conte! Se eu fiz algo de errado, eu vou corrigir...!"
2602-34 = "[s] Contar para a Shun o boato que está circulando sobre ela."
2602-37 = "O quê?! Eu comprei um \"brinquedo de adulto\"?!"
2602-38 = "[s] \"Fale mais baixo...!\""
2602-39 = "Ah, me desculpe... é que, eu acabei me exaltando..."
2602-40 = "Mas por que um boato tão... tão indecente assim...?! Eu nunca comprei nada desse tipo, muito menos um brinquedo de adulto...!"
2602-41 = "[s] Perguntar sobre o \"item que ela comprou na Associação Genbu\"."
2602-42 = "...? Ah, como o Sensei sabe sobre isso...?"
2602-43 = "Espera, existe um boato de que aquilo é um \"brinquedo de adulto\"...?"
2602-44 = "Uuuuh, então era isso...! Eu realmente pedi para manterem segredo, mas não imaginava que chegaria a esse ponto...!"
2602-45 = "N-não é nada disso, Sensei!"
2602-46 = "Aquilo é apenas, apenas..."
2602-47 = "...É apenas um rolo de massagem para a pele."
2602-48 = "[s] \"Um rolo de massagem?\""
2602-49 = "Sim... é que ultimamente minha pele tem ficado irritada. Então, encomendei na Associação Genbu um rolo de massagem que dizem ser bom para a pele..."
2602-50 = "Pensei que talvez não fosse bem visto uma instrutora do Plum Blossom Garden se preocupar tanto com beleza, então pedi que mantivessem segredo..."
2602-51 = "Era só isso, mas quem diria que se tornaria um boato tão obsceno... uuu..."
2602-52 = "...Não tem jeito. Como eu mesma comecei pedindo segredo, só me resta desfazer esse mal-entendido aos poucos..."
2602-53 = "...A propósito, Sensei. De quem você ouviu essa história de \"brinquedo de adulto\"?"
2602-54 = "Não é normal que algo se espalhe tão rápido... será que tem alguém espalhando isso ativamente agora mesmo...!"
2602-55 = "Sensei! Por favor, me conte tudo o que você sabe!"
2602-57 = "(Pressionado pela intensidade da Shun, expliquei sobre o encontro com a Kokona, deixando claro que não tinha certeza absoluta dos fatos.)"
2602-60 = "Ei, ei, Kokona-chan. É verdade que a Shun-onee-chan tem um 'brinquedo de adulto assustador'?"
2602-61 = "Já disse que não é Kokona-chan, é Instrutora Kokona!"
2602-62 = "……Bem, isso é um segredo, mas. É verdade que a Shun-nee comprou um 'brinquedo de adulto' na Associação Genbu."
2602-63 = "Era um brinquedo com um formato tão grotesco e assustador que, só de olhar, uma criança desmaiaria na hora――"
2602-68 = "……Kokona-chan?"
2602-69 = "Poderia me contar com mais detalhes sobre o que você estava dizendo agora há pouco?"
2602-70 = "Uaaah!?"
2602-71 = "Shu, Shun-nee!? Ho, hoje não era seu dia de folga……!?"
2602-72 = "Sim. Mas, ao saber que minha querida irmãzinha talvez estivesse espalhando rumores infundados sobre mim……"
2602-73 = "Eh, mentira!? Então, aquilo que estava lá dentro não era um 'brinquedo de adulto'……!?"
2602-74 = "É claro que não seria algo assim, não é!?"
2602-75 = "Ah, céus. Se eu tivesse deixado você verificar o conteúdo naquela hora, nada disso teria acontecido……"
2602-76 = "Deixando isso de lado. Uma instrutora da Academia Plum Blossom que não consegue guardar o segredo de outra pessoa e sai espalhando por aí…… Kokona-chan, você sabe o que acontece se as crianças crescerem vendo esse tipo de comportamento, não sabe?"
2602-77 = "Para uma Kokona-chan assim……"
2602-79 = "Como sua irmã mais velha, terei que lhe dar uma 'educação' especial, não é……?"
2602-81 = "Uwaaaaaan! Isso não, por favor! Me perdoa, me perdoa!!!"
2602-83 = "De qualquer forma, embora eu tenha conseguido parar a fonte dos rumores……"
2602-84 = "O mal-entendido de que Shun possui um 'brinquedo de adulto absurdo' continuou circulando entre as alunas de Shanhaijing por um bom tempo……"
2602-85 = "Brinquedo de adulto"
