[translation]
10028080-1 = "エピローグ;護送車両"
10028080-3 = "風紀委員会・特殊護送車両の内部"
10028080-7 = "指名手配犯が到着した！鎖をつけろ！"
10028080-15 = "さっさと入れ！悪足掻きはするなよ。"
10028080-20 = "……よし、止まれ！#nゲヘナに着くまでおとなしくしてろ。いいな！"
10028080-21 = "鎖、足枷の固定完了！"
10028080-26 = "他の奴らは全員もう一つのトラックか？#nギャング団の奴ら、結構いたよな？"
10028080-27 = "この車両には1名しか乗ってないが……本当に合ってるのか？"
10028080-28 = "まあ、トラックなら何台もあるからな。#nそれにこいつは……ちょっと特別だ。"
10028080-29 = "イオリ先輩が「要注意人物だから特に注意しろ」と言ってたんだ。"
10028080-30 = "要注意人物ね……噂には聞いてたけど、そんな風には見えないな。"
10028080-31 = "そう言ってると痛い目に合うぞ。護送チームのほとんどが保健室行きになった挙句、列車をひっくり返した怪物だ。どう見てもヤバい奴だろ。"
10028080-32 = "たしかに……他の先輩とか追跡チームからも散々話は聞いたし。"
10028080-33 = "けど、それも今日で終わり。#n風紀委員会の本部……絶対に脱出不可能な部屋に入るんだし。"
10028080-34 = "…………。"
10028080-35 = "……にしてもコイツ、本当に一言も喋らないな。ちょっと気味が悪くないか？"
10028080-36 = "放っとけ、私たちは自分の仕事をやればいい。#nもう夜だ、日が昇るまでには終わらすぞ。"
10028080-37 = "ドアを閉めろ！出発用意！#n――全員、中に移動して座れ！！"
10028080-38 = "あとは持ち場で待機！到着するまで、現状を維持しろ！！"
10028080-44 = "……出発する！"
10028080-50 = "…………。"
10028080-51 = "…………♪"
10028080-56 = "……なあ、知ってるか？"
