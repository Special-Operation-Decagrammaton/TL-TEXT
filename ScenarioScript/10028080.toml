[translation]
10028080-1 = "Epílogo; Veículo de escolta"
10028080-3 = "Interior do veículo de escolta especial do Comitê de Disciplina"
10028080-7 = "O criminoso procurado chegou! Coloquem as correntes!"
10028080-15 = "Entra logo! Não tente resistir."
10028080-20 = "……Muito bem, parem!#nFique quieto até chegarmos em Gehenna. Entendido!"
10028080-21 = "Correntes e algemas fixadas!"
10028080-26 = "Os outros estão no outro caminhão?#nHavia muitos membros da gangue, não é?"
10028080-27 = "Só tem uma pessoa neste veículo... tem certeza de que está certo?"
10028080-28 = "Bem, temos vários caminhões.#nAlém disso, essa pessoa aqui... é um pouco especial."
10028080-29 = "A Iori-senpai disse: 'É um indivíduo de alta periculosidade, tomem cuidado redobrado'."
10028080-30 = "Indivíduo de alta periculosidade, é... Já ouvi rumores, mas não parece ser o caso."
10028080-31 = "Se continuar dizendo isso, vai acabar se dando mal. É um monstro que mandou quase toda a equipe de escolta para a enfermaria e ainda virou um trem de cabeça para baixo. Não importa como você olhe, é alguém perigoso."
10028080-32 = "É verdade... Ouvi muitas histórias de outros veteranos e da equipe de rastreamento também."
10028080-33 = "Mas isso acaba hoje.#nVamos levá-la para o quartel-general do Comitê de Disciplina... para uma sala de onde é impossível escapar."
10028080-34 = "…………."
10028080-35 = "……Mesmo assim, essa pessoa não diz uma palavra sequer. Não é um pouco sinistro?"
10028080-36 = "Deixa pra lá, só precisamos fazer o nosso trabalho.#nJá é noite, vamos terminar isso antes do amanhecer."
10028080-37 = "Fechem a porta! Preparem-se para partir!#n――Todos, entrem e sentem-se!!"
10028080-38 = "O resto, aguarde em seus postos! Mantenham a situação sob controle até chegarmos!!"
10028080-44 = "……Partindo!"
10028080-50 = "…………."
10028080-51 = "…………♪"
10028080-56 = "……Ei, você sabia?"
