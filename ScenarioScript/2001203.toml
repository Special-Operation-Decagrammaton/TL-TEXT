[translation]
2001203-1 = "緊急事態"
2001203-5 = "ゲヘナ広場"
2001203-7 = "（眩暈を何とか誤魔化しつつ、ゲヘナに到着して）"
2001203-8 = "（到着するや否や、セナの姿を発見した）"
2001203-9 = "……おはようございます、先生。お待ちしておりました。"
2001203-11 = "[s] \"……あれ？\""
2001203-13 = "[ns1] \"セナ？\"\n[ns2] \"待っててくれたの？\""
2001203-14 = "はい、先生の状態を正確に確認せねばと思いまして。"
2001203-15 = "はい、先生の状態を正確に確認せねばと思いまして。"
2001203-16 = "基本的に救急医学部は外科なので、死体……"
2001203-17 = "……いえ、負傷者の対応が主なのですが。"
2001203-18 = "先生がお仕事の途中で倒れたら、その瞬間に「負傷者」になってしまいますので。"
2001203-19 = "……どうやらこうして見ただけでも、思ったより深刻なようですね。"
2001203-20 = "そんな状態でお仕事というのは推奨できませんが……日程の延期をしては？"
2001203-24 = "……今日必ず行わなければならないこと、と。"
2001203-25 = "分かりました。まあ先生の方でも、色々お考えがあるのでしょう。"
2001203-26 = "それでは代わりではありませんが、私が今日一日同行します。"
2001203-27 = "……？"
2001203-28 = "ああ、まあ確かに秘書のようにも見えるかもしれませんが……。"
2001203-29 = "あくまで負傷者の発生に備えるだけですので。"
2001203-30 = "まあ秘書だと思っていただいたところで、何か不都合があるわけでもありませんが。"
2001203-31 = "今日はメディカルチェック以外にも、基本的にありとあらゆることをサポートしますので。"
2001203-32 = "……はい？"
2001203-33 = "嬉しい……ですか？"
2001203-34 = "……。"
2001203-35 = "[s3] \"えっと……セナ？\"\n[s4] （何か失言をした気配が……）"
2001203-36 = "……先生。"
2001203-37 = "……先生。"
2001203-38 = "先生は今既に、負傷者にカテゴライズされてもおかしくありません。"
2001203-39 = "本来ならば先生の意志を無視した上で、今すぐ強制的に輸送したいところなのです。"
2001203-40 = "今回は先生のご判断を尊重しますが、これは例外的なことであり、冗談を言っている場合ではないということをご了承ください。"
2001203-41 = "[s5] \"すみません……。\"\n[s6] \"肝に銘じます……。\""
2001203-42 = "……。"
2001203-43 = "……。"
2001203-44 = "では、まずどこに行かれるのですか？"
2001203-45 = "ご予定を教えていただければ、効率の良い回り方を考えますので。"
2001203-47 = "（予定を伝えると、セナはすぐに手を引いて歩き出した）"
2001203-48 = "（体調周りのサポートだけでなく、実際に資料の整理や仲介、データの調査など何から何まですぐそばで手伝ってくれた）"
2001203-49 = "（そのおかげで一日かかると読んでいた予定が、半日で終わってしまった）"
2001203-51 = "……お疲れ様でした。幸い、大きな問題は発生しなくて何よりです。"
2001203-52 = "いつ倒れてしまうかと思っておりましたが……"
2001203-53 = "見た目よりタフと言いますか、精神力の問題でしょうか。"
2001203-54 = "[s7] \"ありがとう、セナのおかげだよ。\"\n[s8] \"一人だったら危なかったかも……。\""
2001203-55 = "……いえ、私はほんの少し隣で手伝っただけです。"
2001203-56 = "……いえ、私はほんの少し隣で手伝っただけです。"
2001203-57 = "それにあくまでお仕事が終わっただけ、まだ先生の状態は回復していません。"
2001203-58 = "早くお帰りになって休まれた方が……。"
2001203-61 = "……？"
2001203-62 = "……先生、大丈夫ですか？"
2001203-63 = "[s9] \"ごめん、ちょっとめまいが……。\"\n[s10] \"やることが終わって、緊張が解けたのかも。\""
2001203-68 = "……はあ。"
2001203-69 = "やはりそうでしたか……。"
2001203-70 = "先ほど言いかけましたが、お帰りになるまでは油断できません。"
2001203-71 = "シャーレまでご一緒します。そこまでが本日の私の役目ですから。"
2001203-72 = "もしも途中で倒れてしまうことがあれば……"
2001203-77 = "……その時は、強制的に救急医学部の患者として運びますので。ご了承ください。"
2001203-78 = "意味は分かりますね？"
2001203-79 = "[s11] \"はい……。\"\n[s12] （死体扱い……！）"
2001203-84 = "……。"
2001203-89 = "では、行きましょうか。"
2001203-94 = "（その後なんとかセナのおかげで意識を保ちながら、シャーレにまで無事戻ってきた）"
2001203-95 = "（到着した途端ほぼ倒れるように横になったのだが、目を覚ますと毛布がかけられており、額にはタオルが乗せられていた）"
