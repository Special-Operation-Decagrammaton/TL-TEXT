[translation]
2001203-1 = "Emergência"
2001203-5 = "Praça de Gehenna"
2001203-7 = "（Tentando disfarçar a tontura de alguma forma, cheguei em Gehenna）"
2001203-8 = "（Assim que cheguei, avistei Sena）"
2001203-9 = "……Bom dia, Sensei. Estava à sua espera."
2001203-11 = "[s] \"……Ué?\""
2001203-13 = "[ns1] \"Sena?\"\n[ns2] \"Você estava me esperando?\""
2001203-14 = "Sim, achei que precisava verificar o estado do Sensei com precisão."
2001203-15 = "Sim, achei que precisava verificar o estado do Sensei com precisão."
2001203-16 = "Basicamente, o Departamento de Medicina de Emergência lida com cirurgias, então cadáveres..."
2001203-17 = "……Não, quero dizer, lidamos principalmente com feridos."
2001203-18 = "Se o Sensei desmaiar no meio do trabalho, você se tornará um \"ferido\" naquele instante."
2001203-19 = "……Pelo visto, só de olhar assim, a situação parece mais grave do que eu pensava."
2001203-20 = "Não posso recomendar que continue trabalhando nesse estado, mas... que tal adiar a agenda?"
2001203-24 = "……Coisas que precisam ser feitas hoje, entendo."
2001203-25 = "Entendido. Bem, imagino que o Sensei tenha seus próprios motivos."
2001203-26 = "Sendo assim, não que seja um substituto, mas eu acompanharei você o dia todo hoje."
2001203-27 = "……?"
2001203-28 = "Ah, bem, talvez pareça que estou agindo como uma secretária, mas..."
2001203-29 = "É apenas para estar preparada caso surja algum ferido."
2001203-30 = "Bom, não há problema algum se quiser me considerar uma secretária."
2001203-31 = "Hoje, além dos exames médicos, darei suporte em absolutamente tudo o que for necessário."
2001203-32 = "……Sim?"
2001203-33 = "Fico feliz... é isso?"
2001203-34 = "……."
2001203-35 = "[s3] \"Err... Sena?\"\n[s4] （Sinto que falei algo errado...）"
2001203-36 = "……Sensei."
2001203-37 = "……Sensei."
2001203-38 = "O Sensei já pode ser classificado como um ferido neste momento."
2001203-39 = "Em circunstâncias normais, eu ignoraria a vontade do Sensei e o levaria para o hospital à força agora mesmo."
2001203-40 = "Desta vez, respeitarei o julgamento do Sensei, mas saiba que isso é uma exceção e não é hora para brincadeiras."
2001203-41 = "[s5] \"Desculpe...\"\n[s6] \"Vou levar isso a sério...\""
2001203-42 = "……."
2001203-43 = "……."
2001203-44 = "Então, para onde vamos primeiro?"
2001203-45 = "Se me disser sua agenda, pensarei na rota mais eficiente."
2001203-47 = "（Ao contar a agenda, Sena imediatamente pegou minha mão e começou a andar）"
2001203-48 = "（Além de cuidar da minha saúde, ela me ajudou com tudo, desde organizar documentos e fazer mediações até pesquisar dados, estando sempre ao meu lado）"
2001203-49 = "（Graças a isso, o que eu previa levar o dia todo foi concluído em apenas meio dia）"
2001203-51 = "……Bom trabalho. Felizmente, nada de grave aconteceu, o que é um alívio."
2001203-52 = "Eu estava preocupada com a possibilidade de você desmaiar a qualquer momento..."
2001203-53 = "Você é mais resistente do que parece, ou será uma questão de força de vontade?"
2001203-54 = "[s7] \"Obrigado, foi graças à Sena.\"\n[s8] \"Se estivesse sozinho, teria sido perigoso...\""
2001203-55 = "……Não, eu apenas ajudei um pouco ao seu lado."
2001203-56 = "……Não, eu apenas ajudei um pouco ao seu lado."
2001203-57 = "Além disso, o trabalho apenas terminou, mas o estado do Sensei ainda não se recuperou."
2001203-58 = "Seria melhor se você fosse para casa descansar logo..."
2001203-61 = "……?"
2001203-62 = "……Sensei, você está bem?"
2001203-63 = "[s9] \"Desculpe, tive uma leve tontura...\"\n[s10] \"Talvez tenha sido o relaxamento após terminar as tarefas.\""
2001203-68 = "……Haa."
2001203-69 = "Eu sabia que seria assim……."
2001203-70 = "Como eu disse antes, não podemos baixar a guarda até que você chegue em casa."
2001203-71 = "Vou te acompanhar até o Schale. Esse é o meu dever de hoje, afinal."
2001203-72 = "Caso você desmaie no caminho……"
2001203-77 = "……Nesse caso, eu te levarei à força como um paciente do Departamento de Medicina de Emergência. Esteja ciente disso."
2001203-78 = "Entende o que isso significa, não é?"
2001203-79 = "[s11] \"Sim…….\"\n[s12] (Tratado como um cadáver……!)"
2001203-84 = "……."
2001203-89 = "Então, vamos nessa."
2001203-94 = "(Depois disso, graças à Sena, consegui manter a consciência e retornar ao Schale em segurança)"
2001203-95 = "(Assim que cheguei, desabei na cama, mas ao acordar, percebi que estava coberto por um cobertor e havia uma toalha sobre a minha testa)"
