[translation]
1000803-1 = "ネルへのお見舞い"
1000803-2 = "ネルの部屋"
1000803-3 = "……。"
1000803-4 = "へっ……"
1000803-5 = "へっくしゅーーーーん！！！"
1000803-6 = "はあ、くそ。"
1000803-7 = "風邪なんて……小学生の時以来だな。"
1000803-8 = "へっくしゅーーーーん！！！"
1000803-9 = "うぁっ！痛ってぇ！"
1000803-10 = "参った、これ以上欠席すると、もう出席日数ギリギリなんだけどな。"
1000803-11 = "（ピンポ～ン）"
1000803-12 = "あぁん……？"
1000803-13 = "体調悪い時に……誰だよ。"
1000803-14 = "（ピンポ～ン）"
1000803-15 = "失せろ！！"
1000803-16 = "新聞とか訪問販売ならさっさと帰れ！"
1000803-18 = "（ピンポ～ン、ピンポ～ン）"
1000803-19 = "……へぇ。"
1000803-20 = "……なかなか根性のある奴じゃねぇか。"
1000803-26 = "（ピンポ～ン、ピンポンピンポンピンポンピンポンピンポンピンポンピンポンピンポンピンポンピンポ～ン！！）"
1000803-27 = "……いいぜ、そこまでやる気なら……。"
1000803-28 = "そこで待ってろ！すぐに終わらせてやる！"
1000803-30 = "（ガチャっ）"
1000803-32 = "どんな面構えか見せてもらおうじゃ……はぁ！？"
1000803-33 = "[s] \"おはよう。\""
1000803-34 = "せ、先生！ど、どうしてここに！？"
1000803-35 = "は？あたしが風邪を引いたってメッセージを送った！？"
1000803-36 = "アカネに送るつもりだったのを、間違えて先生に送ったのか？くそっ！"
1000803-37 = "なんつーミスを……風邪のせいだ。"
1000803-38 = "……。"
1000803-41 = "（はあ、先生にこんな姿を見せちまうことになるとは）"
1000803-42 = "（昨日、着替えもせずに寝ちまったから、パジャマ姿じゃなくてまだよかったけど……）"
1000803-45 = "と、とにかくお見舞いに来てくれたみたいだし……仕方ねぇか。"
1000803-46 = "……入れよ。"
1000803-48 = "はぁ。"
1000803-49 = "分かってると思うけど……。"
1000803-50 = "いつか似たようなことを言ったことがあるから……端的に言うぞ。"
1000803-51 = "先生、あたしが風邪を引いて弱ってたことをどこかで誰かに……"
1000803-52 = "[s] \"うん、言わないよ。\""
1000803-53 = "……そ、そうだよな。ああ、よく分かってるじゃねぇか。"
1000803-54 = "その、なにせ……。"
1000803-55 = "[s] \"こういう可愛いところもあるって噂になると困るもんね。\""
1000803-56 = "……。"
1000803-57 = "ち、違う！！ち、近いけどちょっと違う！違ぇから！！"
1000803-58 = "あ、あたしはあくまでミレニアムのエージェントのリーダーとしてだな……。"
1000803-59 = "えっと……だ、だから……。"
1000803-60 = "[s1] \"真面目にゴミ掃除してたことも秘密にしてるよ。\"\n[s2] \"缶を飛ばして遊んでたことも秘密にしてるよ。\""
1000803-61 = "……。"
1000803-62 = "……。"
1000803-63 = "な、なんかムカつく！"
1000803-64 = "なんだ、なんか説明できないけどムカつく！ぐああー！"
1000803-65 = "[s] 持ってきた袋を渡す。"
1000803-67 = "……ん？なんだ、これ？"
1000803-69 = "（ガサガサ）"
1000803-70 = "薬と、おかゆ……。"
1000803-71 = "……へえ。そ、そうだったな。先生、見舞いに来てくれたんだったな。"
1000803-72 = "風邪とか、しばらく引いてなかったから、家に薬もなかったんだ。"
1000803-73 = "ありがたく貰う。"
1000803-74 = "これ飲んでちょっと休んだらすぐ学校に行……"
1000803-75 = "ん？"
1000803-76 = "これ、イチゴ味の子供用風邪薬じゃねぇか！！！"
1000803-77 = "[s] \"さくらんぼ味の方がよかった？\""
1000803-78 = "そうじゃなくてだな……！！"
1000803-79 = "うっ、身体が……ふう、ふう……落ち着け。"
1000803-80 = "子供用でも……どうせ効果は同じだ。"
1000803-83 = "（ごっくん）"
1000803-84 = "うえ……まずっ！"
1000803-85 = "……ちょっと横になるわ。"
1000803-86 = "おかゆは後で食べるから、冷蔵庫に入れといてくれ。"
1000803-87 = "……あと、さ……。"
1000803-88 = "（……病人だし、これぐらいの甘えは許されるよな）"
1000803-91 = "……ね、眠るまで……そばにいてくれるか？"
1000803-93 = "（ネルの声が段々小さくなる）"
1000803-94 = "……何度も言うけど、誰にも、言うなよ。"
1000803-95 = "わかっ……。"
1000803-96 = "た、か……"
1000803-97 = "（Zzz……）"
1000803-98 = "……"
1000803-100 = "（眠りにつくのを見届けてから帰った）"
