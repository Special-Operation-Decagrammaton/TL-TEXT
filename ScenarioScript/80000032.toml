[translation]
80000032-1 = "Uma garota sentimental e emotiva"
80000032-2 = "Ora, ora, você veio... ♡"
80000032-3 = "Obrigada por tirar um tempo da sua agenda tão ocupada para vir aqui."
80000032-4 = "[s] \"É claro, afinal é um pedido da Hanako.\""
80000032-5 = "Ora, isso significa que... se for um pedido meu, você fará qualquer coisa por mim?"
80000032-6 = "[s1] \"'Qualquer coisa' talvez seja um pouco difícil, mas...\"\n[s2] \"Dentro do que estiver ao meu alcance...\""
80000032-7 = "Entendo, entendo... Então, em outras palavras, você quer dizer que \"se eu pedir, você fará o possível para atender\", certo?"
80000032-8 = "Entendo, entendo... Então, em outras palavras, você quer dizer que \"se eu pedir, você fará o possível para atender\", certo?"
80000032-12 = "Estou feliz. Então, permitam-me fazer o pedido novamente... ♡"
80000032-17 = "Ora, por que você está recuando?"
80000032-21 = "É um pedido meu..."
80000032-22 = "...Você poderia aceitar o meu presente?"
80000032-24 = "[s] \"Esta caixa... será que foi feita à mão?\""
80000032-25 = "Eu fiz pela primeira vez, pensando em você, Sensei..."
80000032-26 = "[s] \"Entendo. Obrigado, Hanako.\""
80000032-27 = "..."
80000032-28 = "De alguma forma, sinto-me um pouco envergonhada..."
80000032-29 = "[s] \"A Hanako está... tímida.\""
80000032-30 = "Ora, que ofensa. Você acha que eu não tenho um lado tímido? Por mais que não pareça, sou uma garota sensível."
80000032-31 = "[s] \"Sinto muito... você tem razão...\""
80000032-32 = "Fufu... Bem, eu vou indo. Ah, não abra agora, abra depois, quando eu não estiver por perto. Eu ficaria envergonhada."
80000032-33 = "Bem..."
80000032-34 = "Até mais..."
80000032-38 = "(Com o rosto corado, Hanako foi embora apressada.)"
80000032-39 = "[ns] \"Será que já posso abrir...\""
80000032-41 = "[ns] Abrir a caixa."
80000032-44 = "[ns] \"...\""
80000032-46 = "[ns] \"Ainda há tantas coisas que não entendo...\""
