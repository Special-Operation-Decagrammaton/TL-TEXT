[translation]
80000032-1 = "多情多感な女の子"
80000032-2 = "あらあら、いらっしゃいましたか……♡"
80000032-3 = "わざわざお忙しい中、お時間を作っていただいてありがとうございます。"
80000032-4 = "[s] \"それはもちろん、ハナコからのお願いだから。\""
80000032-5 = "あら、それはつまり……私のお願いでしたら、何でも聞いてくださるということですか？"
80000032-6 = "[s1] \"「何でも」はちょっと難しいかもだけど……。\"\n[s2] \"私にできる範囲で……。\""
80000032-7 = "なるほどなるほど……ではつまり、「お願いしたら、できる限り聞いてくださる」ということですね？"
80000032-8 = "なるほどなるほど……ではつまり、「お願いしたら、できる限り聞いてくださる」ということですね？"
80000032-12 = "嬉しいです、ではあらためてお願いを……♡"
80000032-17 = "あら、どうして後ずさりするのですか？"
80000032-21 = "私からのお願いです……"
80000032-22 = "……私のプレゼント、受け取っていただけますか？"
80000032-24 = "[s] \"この箱……もしかして手作り？\""
80000032-25 = "先生のことを思いながら、初めて作ってみました……。"
80000032-26 = "[s] \"そっか。ありがとね、ハナコ。\""
80000032-27 = "……。"
80000032-28 = "何だか、少し照れてしまいますね……。"
80000032-29 = "[s] \"ハナコが、恥じらってる……。\""
80000032-30 = "あら、心外ですね？私だって恥じらう心くらい持ってるんですよ？こう見えて、繊細な女の子ですから。"
80000032-31 = "[s] \"何だかすごくごめん……それはそうだね……。\""
80000032-32 = "ふふっ……では、私はこれで。あ、中身は今ではなく、後で私がいない時に開けてくださいね。恥ずかしいので。"
80000032-33 = "えっと……。"
80000032-34 = "では、また……。"
80000032-38 = "（顔を赤らめたハナコは、逃げるように去っていった。）"
80000032-39 = "[ns] \"そろそろ開けても良いかな……。\""
80000032-41 = "[ns] 箱を開けてみる。"
80000032-44 = "[ns] \"……。\""
80000032-46 = "[ns] \"私にはまだ、分からないことだらけだ……。\""
