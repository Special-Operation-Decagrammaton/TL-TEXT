[translation]
103150-1 = "Episódio 15; Batalha pela Ocupação da Arca de Atrahasis "
103150-2 = "Confirmamos a eliminação dos inimigos! A defesa foi um sucesso!!"
103150-3 = "Valeu pelo esforço, Sensei~"
103150-4 = "Não parece ter mais nenhuma movimentação estranha por enquanto――"
103150-10 = "Q-Q-Que isso!!?#nU-Uma explosão!!?"
103150-11 = "E-Explosão...? O-Onde foi que isso aconteceu...!?"
103150-21 = "！！"
103150-22 = "A-Ah... C-Como ela entrou aqui...!?"
103150-26 = "[ns] \"Shiroko...!?\""
103150-27 = "Entendi... É. #nNo fim, você veio até aqui."
103150-31 = "Eu avisei você, por que você veio...?"
103150-32 = "……Aqui só existe o fim da vida."
103150-33 = "Shiroko-senpai!!!"
103150-43 = "――Para!!"
103150-44 = "Shiroko-chan...!?"
103150-45 = "É-É você, Shiroko-senpai...!?"
103150-54 = "Não faz isso!#nS-Shiroko-chan...!"
103150-57 = "Espera, Shiroko-chan――!!"
103150-66 = "U-Uma granada...!?"
103150-75 = "[ns] \"Hoshino!!\""
103150-78 = "Cof, cof..."
103150-79 = "Tá bem, Sensei?"
103150-80 = "[s] \"Tô sim.\""
103150-81 = "Cof, cof... E a Shiroko-senpai?"
103150-82 = "Ela sumiu..."
103150-83 = "Então era verdade... A Shiroko-chan tava mesmo aqui."
103150-84 = "Mas... por que desse jeito..."
103150-86 = "……。"
103150-90 = "Haa... Com essa agora, a situação piorou ainda mais."
103150-91 = "Departamento de Engenharia, na escuta?#nPoderiam dar uma olhada na situação da nave?"
103150-93 = "Ufa... fico feliz que ninguém tenha se machucado."
103150-94 = "Tô checando a situação da nave agora, mas..."
103150-95 = "Tá bem detonada."
103150-96 = "Parece que a colisão com a Arca causou um monte de problemas em várias partes.#nE essa explosão agora... parece que só piorou as coisas."
103150-97 = "Vou começar o diagnóstico do sistema e a análise de danos agora!#nMas não se preocupem tanto."
103150-98 = "Mesmo que não dê pra consertar de vez, pelo menos o reboot a gente deve conseguir fazer."
103150-99 = "Pois é. Se a gente não consertar isso, vocês não vão conseguir voltar pro chão.#nVamos dar o nosso máximo aqui também."
103150-100 = "Só que, como vai demorar se a gente fizer tudo sozinha, queria pedir uma mãozinha de vocês..."
103150-102 = "Tem alguém aí livre?"
103150-104 = "……Eu vou. Me fala o que precisa."
103150-105 = "Opa, entendido! Valeu!"
103150-106 = "Certo. Então contamos com vocês."
103150-110 = "……Himari."
103150-111 = "Essa movimentação espacial da Shiroko agora há pouco――provavelmente usou o poder de processamento dessa Arca."
103150-112 = "Sim... é bem possível."
103150-113 = "Essa \"Arca de Atrahasis\" é um dispositivo de processamento que calcula dimensões... ela deve estar usando isso pra se mover no espaço."
103150-114 = "Ela parece――bem acostumada a usar os poderes da Arca, né."
103150-115 = "……O que quer dizer com isso?"
103150-116 = "Ou seja, se a gente conseguir garantir o poder de processamento da Arca... provavelmente a gente conseguiria criar uma sequência de salto espacial física equivalente à dela."
103150-117 = "Sequência de... salto espacial?"
103150-118 = "Eu me considero a pessoa que mais entende de tecnologia dos Deuses Sem Nome em toda Kivotos.#nAté já consegui realizar uma premonição do futuro, mesmo que tenha sido só em partes."
103150-119 = "Provavelmente só vai dar pra usar uma vez, mas――se a sequência de salto espacial ficar pronta, a gente vai conseguir mover todo mundo da nave de volta pro chão."
103150-120 = "Hmm... entendi."
103150-121 = "Ou seja... Rio, você tá achando que o Departamento de Engenharia não vai conseguir terminar o conserto, né?"
103150-122 = "Não é que eu não confie no Departamento de Engenharia――"
103150-123 = "Pois é... você é a \"Big Sister\", afinal."
103150-124 = "Como você entende de tudo, acaba desconfiando de tudo também――"
103150-126 = "Igual a um rei que recebeu um oráculo..."
103150-127 = "……？"
103150-128 = "A sua ansiedade e a sua obsessão... boa parte desses sentimentos só trouxeram problemas."
103150-129 = "Foi porque você não conseguiu confiar nos seus colegas e se afogou nesse pensamento autocentrado de que só você estava certa――"
103150-130 = "É verdade... não vou negar. Eu sou esse tipo de pessoa, Himari."
103150-131 = "Isso é o que me define. E acho que não vai mudar daqui pra frente――não me importo se me desprezarem."
103150-132 = "Mas essa nave――está carregando a vida de você, do Sensei e de todo mundo aqui."
103150-133 = "Sendo assim, temos que nos preparar caso o plano falhe, certo?#nMesmo que a chance seja mínima, temos que ter uma carta na manga..."
103150-134 = "É justamente por causa dessa situação que eu――"
103150-135 = "Eu não desprezo você. Eu só não gosto de você――"
103150-136 = "Essa diferença é bem grande, viu?"
103150-140 = "……Obrigada por se preocupar, Rio."
103150-141 = "Como é que é――"
103150-142 = "O pessoal do Departamento de Engenharia também vai te agradecer."
103150-143 = "Porque ter alguém tão capaz cuidando dos erros deles é uma grande ajuda."
103150-144 = "……。"
103150-145 = "Sobreviver sem a \"Nave Principal de Utnapishtim\"...#nSe existir um jeito de fazer isso, é um grande alívio."
103150-146 = "Por isso――conto com você, Rio."
103150-147 = "Tá bom, eu cuido disso. Me dê um tempinho.#nEnquanto vocês cuidam da batalha de ocupação, eu vou verificando."
103150-148 = "Sendo assim――"
103150-152 = "……。"
103150-155 = "A invasão à \"Arca de Atrahasis\" foi um sucesso, mas..."
103150-156 = "Estamos no território do inimigo agora.#nEles podem atacar a qualquer instante."
103150-157 = "Aquele ataque de antes pode continuar acontecendo――"
103150-158 = "Ou seja, temos que cuidar da defesa da nave também."
103150-162 = "Enquanto o Departamento de Engenharia faz os reparos,"
103150-170 = "O Departamento de Desenvolvimento de Jogos, o Comitê de Medidas de Precaução e a Sociedade de Pesquisa Gourmet ficarão responsáveis por proteger a nave dos ataques."
103150-172 = "E agora, gostaria de pedir que a equipe de operadoras e a Schale cuidem da próxima operação."
103150-173 = "Próxima operação..."
103150-174 = "Agora o negócio vai ficar sério..."
103150-175 = "Sim. A partir de agora, nós vamos"
103150-181 = "ocupar e tomar o controle da \"Arca de Atrahasis\"."