[translation]
103150-1 = "Episódio 15; Batalha de Ocupação da Arca de Atla Hasith"

103150-2 = "Confirme a repulsão do inimigo! Defendido com sucesso! !"

103150-3 = "Bom trabalho, professor!"

103150-4 = "Fora isso, não parece haver nenhum movimento estranho..."

103150-10 = "Nanana, o que! ! ? #nb, explosão! ! ?"

103150-11 = "É uma explosão...? Onde diabos...! ?"

103150-21 = "! !"

103150-22 = "Ah, ah... E-antes que eu percebesse, eu estava lá dentro...! ?"

103150-26 = "[ns] \"Shiroko...!?\""

103150-27 = "Entendo... sim. #nNo final, chegamos até aqui."

103150-31 = "Mesmo que eu tenha avisado você, por que...?"

103150-32 = "...Há apenas o fim da vida aqui."

103150-33 = "Shiroko-senpai! ! !"

103150-43 = "--parar! !"

103150-44 = "Shiroko-chan...! ?"

103150-45 = "Shiroko-senpai, certo? ?"

103150-54 = "Não! #n, Shiroko-chan...!"

103150-57 = "Espere, Shiroko-chan! !"

103150-66 = "S-Granada...! ?"

103150-75 = "[ns] \"Hoshino!!\""

103150-78 = "Geô, Geô..."

103150-79 = "Professor, você está bem?"

103150-80 = "[s] \"Sim.""

103150-81 = "Gehogeho... E quanto a Shiroko-senpai?"

103150-82 = "Ele se foi..."

103150-83 = "Afinal... Shiroko-chan estava aqui."

103150-84 = "Mas... por que isso é...?"

103150-86 = "……."

103150-90 = "Suspiro... agora as coisas pioraram ainda mais."

103150-91 = "Departamento de engenharia, você pode me ouvir? #nVocê pode dar uma olhada nas condições do navio?"

103150-93 = "Ufa... todos parecem estar ilesos, o que é a melhor parte."

103150-94 = "No momento estou verificando o status do navio de guerra..."

103150-95 = "Está bem esfarrapado."

103150-96 = "Parece que a colisão com a Arca causou alguns problemas. #nAlém disso, a explosão agora há pouco... parece que causou ainda mais danos."

103150-97 = "Iniciaremos agora o trabalho de diagnóstico do sistema e análise de danos! #n, mas não se preocupe muito."

103150-98 = "Mesmo que seja impossível corrigi-lo fundamentalmente, você poderá fazer algo para reiniciá-lo."

103150-99 = "Concordo. Se não restaurarmos isso, você não poderá retornar à Terra. #nFaremos o nosso melhor também."

103150-100 = "No entanto, levaria muito tempo se fizéssemos isso sozinhos, então gostaria de pedir sua ajuda..."

103150-102 = "Alguém está livre?"

103150-104 = "...Eu farei isso. Me avise se precisar de alguma coisa."

103150-105 = "Ah, eu entendo! obrigado!"

103150-106 = "sim. Muito obrigado."

103150-110 = "... Himari."

103150-111 = "O atual movimento espacial de Shiroko – provavelmente usando o poder de computação da arca."

103150-112 = "Sim... isso é possível."

103150-113 = "Esta "Arca de Atlas Hasith" é um dispositivo de cálculo que calcula dimensões... provavelmente pode ser usado para se mover pelo espaço."

103150-114 = "Ela parece estar bastante acostumada a usar as habilidades da Arca."

103150-115 = "O que você quer dizer...?"

103150-116 = "Em outras palavras, se pudermos garantir o poder computacional da Arca... provavelmente seremos capazes de criar uma sequência física de salto no espaço equivalente a essa."

103150-117 = "Salto espacial, sequência...?"

103150-118 = "Achei que sabia mais sobre a tecnologia do Deus Sem Nome do que Kivotos. #nAté realizei algumas previsões do futuro."

103150-119 = "Você provavelmente só poderá usá-lo uma vez, mas assim que a sequência do salto espacial for concluída, você poderá mover todos na nave para o solo."

103150-120 = "Hmm... entendo."

103150-121 = "Então...Rio, você não acha que o departamento de engenharia vai conseguir concluir os reparos?"

103150-122 = "Não é porque não confio no departamento de engenharia."

103150-123 = "Bem... você é uma "irmã mais velha"."

103150-124 = "Porque ele conhece tudo, tem dúvidas sobre tudo."

103150-126 = "Como um rei que recebeu um oráculo..."

103150-127 = "...?"

103150-128 = "Sua ansiedade e obsessão... a maioria dessas emoções levaram a vários problemas."

103150-129 = "Porque ele não podia confiar em seus amigos e estava se afogando em pensar que estava certo..."

103150-130 = "Sim... não vou negar. Eu sou esse tipo de pessoa, Himari."

103150-131 = "Essas são as coisas que me tornam quem eu sou. Não acho que nada vai mudar de agora em diante - não me importo se você me desprezar."

103150-132 = "Mas esta nave carrega a vida de você, do seu professor e de todos aqui."

103150-133 = "Então você tem que estar preparado para quando seus planos falharem, certo? #nMesmo que a probabilidade seja que isso nunca aconteça, você deve tomar medidas para que isso aconteça..."

103150-134 = "Por causa dessa situação, eu..."

103150-135 = "Não vou desrespeitar você. Eu simplesmente odeio você--"

103150-136 = "Essa diferença é muito grande?"

103150-140 = "...Obrigado pela sua preocupação, Rio."

103150-141 = "E agora..."

103150-142 = "Todos no departamento de engenharia também ficarão gratos a você."

103150-143 = "Existe uma presença poderosa que nos preparará para nossos fracassos."

103150-144 = "……."

103150-145 = "Se houver uma maneira de sobreviver daqui sem o “navio principal de Utnapishtim”, seria um grande incentivo."

103150-146 = "ですから――よろしくお願いしますね、リオ。"

103150-147 = "Sim, eu entendo. Por favor, me dê um momento. #nVou dar uma olhada enquanto vocês prosseguem com a batalha de ocupação."

103150-148 = "Bem, então――"

103150-152 = "……."

103150-155 = "Consegui entrar com sucesso na "Arca de Atlas Hasith", mas..."

103150-156 = "Estamos agora na fortaleza do inimigo. #nUm ataque pode começar a qualquer momento."

103150-157 = "Ataques como o anterior podem continuar..."

103150-158 = "Isso significa que você também deve cuidar da defesa do seu navio ao mesmo tempo."

103150-162 = "Enquanto o departamento de engenharia realiza trabalhos de restauração,"

103150-170 = "Gostaria que o departamento de desenvolvimento de jogos, o comitê da força-tarefa e o grupo de pesquisa gourmet assumissem o papel de proteger o navio contra ataques."

103150-172 = "Então, gostaria que os operadores e as placas de Petri executassem a seguinte estratégia."

103150-173 = "Próxima estratégia..."

103150-174 = "Eu me pergunto se a coisa real começa aqui..."

103150-175 = "sim. A partir disso, nós"

103150-181 = "Capture e capture a Arca de Atlas Hasith."

