[translation]
103150-1 = "第15話;アトラ・ハシースの箱舟占領戦 "
103150-2 = "敵の撃退を確認！無事、防衛に成功しました！！ "
103150-3 = "先生、おつかれさん～"
103150-4 = "他は特に変な動きもなさそうだし――"
103150-10 = "ななな、なに！！？#nば、爆発！！？"
103150-11 = "ば、爆発、ですか……？い、一体どこで……！？"
103150-21 = "！！"
103150-22 = "あ、ああっ……い、いつの間に中へ……！？"
103150-26 = "[ns] \"シロコ……！？\""
103150-27 = "そっか……うん。#n結局、ここまで来たんだ。"
103150-31 = "警告したのに、どうして……？ "
103150-32 = "……ここには、命の終わりしかないのに。"
103150-33 = "シロコ先輩！！！"
103150-43 = "――止まれ！！"
103150-44 = "シロコ、ちゃん……！？ "
103150-45 = "し、シロコ先輩、なのよね……！？ "
103150-54 = "ダメです！#nし、シロコちゃん……！"
103150-57 = "待って、シロコちゃん――！！"
103150-66 = "しゅ、手榴弾……！？"
103150-75 = "[ns] \"ホシノ！！\""
103150-78 = "げほっ、げほっ……"
103150-79 = "先生、大丈夫？"
103150-80 = "[s] \"うん。\""
103150-81 = "ゲホゲホ……シロコ先輩は？ "
103150-82 = "いなくなりました…… "
103150-83 = "やっぱり……シロコちゃんは、ここにいたんだね。"
103150-84 = "でも……どうして、こんな……。"
103150-86 = "……。"
103150-90 = "はぁ……今ので、事態がさらに悪化したわね。"
103150-91 = "エンジニア部、聞こえる？#n船の状態を見てもらえるかしら？"
103150-93 = "ふぅ……みんな、怪我がないようで何より。"
103150-94 = "戦艦の状態は今確認しているけど……"
103150-95 = "結構ボロボロ。 "
103150-96 = "箱舟との衝突でかなり様々なところに問題が生じてしまったようだね。#nそれと、今の爆発も……更に追い打ちをかけてしまったみたいだ。"
103150-97 = "今からシステムの診断とダメージ分析作業に入ります！#nですが、あまり心配しないでください。"
103150-98 = "根本的に直すことは不可能だとしても、再起動くらいはなんとかできるはずですから。"
103150-99 = "そうだね。これを復旧しないと、君たちが地上に戻れない。#n私たちも全力で頑張ってみるよ。"
103150-100 = "ただ、私たちだけでは時間が掛かってしまうから、そちらの手も借りたいのだけど……"
103150-102 = "誰か、手が空いている人はいるかい？"
103150-104 = "……私がやるよ。必要なことがあれば言って。"
103150-105 = "おおっ、分かりました！ありがとうございます！ "
103150-106 = "はい。それでは、よろしくお願いします。 "
103150-110 = "……ヒマリ。 "
103150-111 = "今のシロコの空間移動――おそらく、この箱舟の演算能力を利用したものよ。"
103150-112 = "ええ……あり得る話ですね。"
103150-113 = "この「アトラ・ハシースの箱舟」は、次元を計算する演算装置……これを利用して、空間を移動できるのでしょう。"
103150-114 = "彼女は――ずいぶんと、箱舟の能力を利用することに慣れているようね。"
103150-115 = "……と、言いますと？"
103150-116 = "つまり、箱舟の演算能力を確保できれば……おそらくあれと同等の、物理的な空間跳躍シーケンスを作れるはずよ。"
103150-117 = "空間跳躍、シーケンス……？"
103150-118 = "私は「名もなき神」の技術について、キヴォトスいち詳しいつもりなのだけれど。#n未来の予知も、一部とはいえ実現させたことがあるわ。"
103150-119 = "おそらく一度しか使えないでしょうけれど――空間跳躍シーケンスが完成すれば、艦内の全員を地上に移動させる事ができるはずよ。"
103150-120 = "ふむ……なるほど。 "
103150-121 = "つまり……リオ、あなたはエンジニア部が修理を完遂できないと考えているのですね？"
103150-122 = "エンジニア部を信用できないから、という話ではないわ――"
103150-123 = "そうですね……あなたは、「ビッグシスター」ですもの。"
103150-124 = "全てに精通しているが故に、全てのことに疑念を抱く――"
103150-126 = "まるで神託を受けた王のように……"
103150-127 = "……？"
103150-128 = "あなたの不安や執念……その感情の大半は、様々な問題を招きました。"
103150-129 = "仲間を信頼できず、自分こそが正しいという独善的な思考に溺れていたから――"
103150-130 = "そうね……否定はしないわ。私はそういう人間よ、ヒマリ。 "
103150-131 = "それらは、私を形作っているモノ。これからもきっと、変わる事はないと思うわ――軽蔑されたとしても構わない。"
103150-132 = "でも、この船は――貴女や先生、そしてここにいる全員の命を乗せた存在なのよ。"
103150-133 = "であれば、計画が失敗した時に備えなくてはならないでしょう？#n絶対に起こり得ない確率だとしても、打てる策は講じておくべきよ……"
103150-134 = "こんな状況だからこそ、私は――"
103150-135 = "軽蔑などしませんよ。私はあなたが嫌いなだけです――"
103150-136 = "この差は、結構大きいんですよ？"
103150-140 = "……心配してくださり、ありがとうございます、リオ。"
103150-141 = "今、なんて――"
103150-142 = "エンジニア部のみなさんもあなたに感謝する事でしょう。"
103150-143 = "自分たちの失敗に備えてくれる、力強い存在がいてくれるのですから。"
103150-144 = "……。"
103150-145 = "「ウトナピシュティムの本船」無しにここから生還する……#nそんな方法があるのであれば、それは大きな励みになります。"
103150-146 = "ですから――よろしくお願いしますね、リオ。"
103150-147 = "ええ、分かったわ。少し時間をちょうだい。#n貴女たちが占領戦を進めている間に、確認しておくから。"
103150-148 = "それでは――"
103150-152 = "……。"
103150-155 = "「アトラ・ハシースの箱舟」への進入はなんとか成功しましたが…… "
103150-156 = "今の私たちは、敵の本拠地にいる状況です。#nいつ攻撃が始まってもおかしくありません。"
103150-157 = "先ほどのような襲撃が続くかもしれません――"
103150-158 = "つまり、船の防衛にも同時に気を配る必要があります。"
103150-162 = "エンジニア部が復旧作業をしている間、"
103150-170 = "ゲーム開発部や対策委員会、美食研究会の方々には、襲撃から船を守る役割を担っていただきたいです。"
103150-172 = "そして、オペレーターやシャーレには、次の作戦をお願いします。"
103150-173 = "次の作戦……。"
103150-174 = "ここからが本番かぁ……。"
103150-175 = "はい。これより、私たちは"
103150-181 = "「アトラ・ハシースの箱舟」を占領し奪取します。"
