[translation]
10005065-5 = "Hah, hah, hah, haah, haah..."
10005065-6 = "Ugh, não aguento mais..."
10005065-7 = "O que é aquilo? Isso é trapaça, não é? Por que me acham tão rápido?"
10005065-8 = "Eu até subornei os guardas no caminho para servirem de escudo, mas não adiantou de nada...!"
10005065-10 = "Eles foram inúteis! Não ganhei nem um segundo sequer!?"
10005065-11 = "Além disso, todos os corredores por onde passo estão explodindo. Sinto que estou sendo atraída para uma armadilha...!"
10005065-12 = "Vocês acabaram de chegar aqui, não foi!? Como conseguem ser tão eficientes...!?"
10005065-16 = "Ei, para onde você foi?!"
10005065-17 = "Não adianta se esconder, vou queimar tudo! Hahahahahaha!!"
