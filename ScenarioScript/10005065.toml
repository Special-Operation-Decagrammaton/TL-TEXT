10005065-112 = "Sinto que perdi toda a minha energia..."
10005065-117 = "...Essa é a conclusão do ocorrido."
10005065-118 = "Bem, se tiver alguma pergunta, estou à disposição..."
10005065-119 = "..."
10005065-120 = "Pergunta, é... Parece que causaram um grande alvoroço, não é...?"
10005065-121 = "S-sim. Mas não se preocupe. Como mencionei antes, parece que não se tornará um \"problema entre escolas\"."
10005065-122 = "Embora tenhamos tido alguns gastos..."
10005065-123 = "Bem, digamos que cumprimos com o nosso dever da melhor forma possível..."
10005065-127 = "Suu, haa..."
10005065-128 = "Fuuu... suuuu, haaaaaa..."
10005065-129 = "[s1] \"Desculpe, Yuuka...\"\n[s2] \"Não consegui ser eficiente.\""
10005065-130 = "Fuu, fuu... b-bem, considerando que o Sensei estava acompanhando e esse foi o resultado,"
10005065-131 = "Fuu, fuu... b-bem, considerando que o Sensei estava acompanhando e esse foi o resultado,"
10005065-132 = "não pretendo dizer mais nada sobre isso... haa."
10005065-133 = "...? Sobre a punição da Coelho Branco?"
10005065-134 = "...Bem, acho que não tem problema contar ao Sensei."
10005065-135 = "Ela foi encarcerada. A menos que haja uma circunstância muito específica, ela não sairá de lá tão cedo."
10005065-136 = "Para acrescentar, a situação torna quase impossível que ela escape novamente."
10005065-137 = "Ela está em uma sala de vidro em formato de cubo de 10 metros, e não há nenhum tipo de dispositivo eletrônico lá dentro."
10005065-138 = "Optamos por não usar tecnologia digital; a segurança é feita com documentos em papel e pessoal humano, e a entrada de itens como smartphones é proibida na área."
10005065-139 = "Como equipamentos digitais são praticamente inúteis para ela... por outro lado, assim ela não conseguirá fazer nada."
10005065-140 = "...Falando nisso, já está quase na hora da refeição. Acho que vou levar para ela."
10005065-141 = "...O Sensei é gentil, então vou adiantar uma coisa: não há necessidade de sentir pena dela."
10005065-142 = "É algo inevitável, e considerando os danos que ela causou ao Millennium até agora, ou os danos que poderia ter causado, isso ainda é ser bem gentil."
10005065-143 = "Haa..."
10005065-144 = "Por que eu sempre acabo mostrando esse meu lado na frente do Sensei..."
10005065-145 = "...Não que eu precise me justificar, mas por favor, me dê um pouco do seu tempo novamente em breve."
10005065-146 = "Bem, por hoje é só. Bom trabalho, nos vemos na próxima."
10005065-151 = "..."
10005065-152 = "Com certeza, devem estar acontecendo muitas coisas no Seminário também..."
10005065-153 = "Então, por enquanto..."
10005065-159 = "Apesar de tudo, conseguimos concluir a missão."
10005065-161 = "Sim, bom trabalho."
10005065-162 = "Obrigada também, Sensei. Você controlou a líder o tempo todo e nos ajudou bastante."
10005065-163 = "...Hã?"
10005065-164 = "Quem estava sendo controlada por quem?"
10005065-166 = "Fufu. Mais uma vez, muito obrigada, Sensei."
10005065-167 = "Embora fosse uma missão, graças a você, foi até um pouco divertido."
10005065-168 = "Ah, talvez eu tenha causado problemas ao Sensei, mas..."
10005065-169 = "[s3] \"Não, eu também me diverti um pouco. Bom trabalho.\"\n[s4] \"Se houver algo que eu possa fazer, me chame de novo.\""
10005065-170 = "……Entendo."
10005065-171 = "……Entendo."
10005065-172 = "Fico feliz em ouvir isso, obrigada."
10005065-173 = "Bem, já que o assunto foi resolvido……."
10005065-177 = "……Ah?"
10005065-178 = "Falando nisso…… o que aconteceu com nossos uniformes de empregada?"
10005065-179 = "……Hã?"
10005065-180 = "Falando nisso……"
10005065-181 = "Bem, só por perguntar, a Asuna-senpai também……."
10005065-182 = "？？？"
10005065-183 = "Sendo assim, será que……."
10005065-189 = "Hã!? Naquele navio!? Vamos ter que ir de novo!?"
10005065-191 = "Ah, então da próxima vez vamos só para nos divertir!"
10005065-192 = "T-tá tudo bem! Dessa vez não precisamos nos infiltrar e……."
10005065-193 = "Afinal, a Asuna-senpai tem um ingresso VIP, não tem?"
10005065-194 = "Se usarmos isso, podemos até……."
10005065-195 = "……Eh?"
10005065-196 = "O ingresso? Aquele papel que me deram no navio? Por acaso aquilo era importante?"
10005065-197 = "……."
10005065-198 = "Não quero nem acreditar, mas será que a senpai……?"
10005065-199 = "Sim! Eu joguei fora!!"
10005065-200 = "……Entendi."
10005065-201 = "Ufa…… aquele ingresso que quase todo mundo lá estava desesperado para conseguir, pagando fortunas, e você jogou fora tão facilmente……."
10005065-202 = "Bem, é a Asuna-senpai, afinal……."
10005065-203 = "Bem, isso significa que voltamos à estaca zero, não é……?"
10005065-204 = "Os uniformes de empregada estão no armário do Golden Fleece, não parece que nenhuma das escolas iria buscá-los para nós, e não temos como entrar lá de forma legítima, por isso nos infiltramos……."
10005065-205 = "Mas não podemos simplesmente abandonar aqueles uniformes."
10005065-206 = "Concordo. Sendo assim……."
