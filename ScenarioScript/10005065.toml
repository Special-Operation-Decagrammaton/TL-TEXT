10005065-44 = "Ah, achei a Koyuki! Iupii, espere por nós!"
10005065-45 = "Não tem mais para onde fugir, desista."
10005065-46 = "Fufu, é isso mesmo. Vamos, renda-se, por favor?"
10005065-48 = "Ugh, elas continuam vindo..."
10005065-49 = "...Mas parece que vocês entenderam errado. Eu não estou encurralada, as veteranas é que perderam!"
10005065-50 = "Deveriam ter me capturado logo sem dizer nada, agora é tarde demais para se arrependerem!"
10005065-51 = "Que peeeena para vocês!! Ni-hahahaha!"
