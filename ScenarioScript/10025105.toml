[translation]
10025105-2 = "RABBIT1, Aft limpo."
10025105-3 = "RABBIT2, Bow limpo."
10025105-4 = "R-RABBIT4... Ponte limpa."
10025105-5 = "Neutralizamos todas as forças inimigas a bordo, eliminação de elementos de risco concluída."
10025105-6 = "Com isso, encerramos a operação. Bom trabalho a todos!"
10025105-11 = "Ei. Espera aí, e a minha vez?"
10025105-12 = "Você se atrasou, RABBIT3."
10025105-13 = "Já terminamos. Da nossa perspectiva, nem deu para aquecer."
10025105-14 = "Eu que deveria dizer isso! #nDisseram que era uma operação a bordo, então eu até trouxe mísseis antinavio..."
10025105-20 = "Ei, RABBIT2... esse míssil, não dá para disparar só uma vez?"
10025105-21 = "Eu afundo isso com um só tiro, vai..."
10025105-22 = "Do que você está falando, sua idiota! Nós ainda estamos no navio!"
10025105-28 = "...SRT, Academia Especial, foi o que disse?"
10025105-29 = "Ah, sim... é..."
10025105-30 = "...Peço mil desculpas."
10025105-31 = "Embora tenha sido para fins de investigação, acabamos enganando vocês e..."
10025105-32 = "Não, levante a cabeça. Não é como se eu quisesse um pedido de desculpas."
10025105-33 = "Mesmo sendo um problema da nossa vila... ter que pedir ajuda a estranhos é uma vergonha."
10025105-37 = "Não... este não é um problema apenas da vila de Yotoura."
10025105-38 = "...O que quer dizer com isso?"
10025105-39 = "Esta vila também é parte de Kivotos. #nEm outras palavras, o problema que ocorreu aqui também é um problema de Kivotos."
10025105-40 = "Portanto, quando qualquer problema surgir em Kivotos, #npor favor, entrem em contato com a nossa Academia Especial SRT."
10025105-41 = "Nós sempre estaremos aqui para ajudar."
10025105-42 = "SRT, Academia Especial, é..."
10025105-43 = "...Obrigado. Jamais esquecerei este favor."
10025105-44 = "...Sim!"
10025105-50 = "Ah, é verdade, sobre o tratamento deste suspeito aqui..."
10025105-51 = "Poderiam deixar conosco?"
10025105-52 = "Afinal, o incidente ocorreu sob nossa jurisdição."
10025105-53 = "É uma oportunidade e tanto... não sei se é correto dizer assim, #nmas isso também conta como experiência para nós."
10025105-55 = "...Entendo. Então, deixo o resto com vocês."
10025105-57 = "Ah... e-ei. Espera um pouco!"
10025105-64 = "...Kumagai, leve-o."
10025105-65 = "Mostre a ele o estilo Yotoura."
10025105-67 = "Ei, espera... o que é esse estilo Yotoura... ei!"
10025105-69 = "Isso é..."
10025105-70 = "Não há necessidade de explicar... você descobrirá em breve."
10025105-72 = "P-pelo menos me diga o que vão fazer comigo...!"
10025105-78 = "Finalmente entendeu? Isso é o medo."
10025105-80 = "Sofra e tema a situação de não saber o que lhe será feito."
10025105-85 = "Dizem que, desde os tempos antigos, o medo... nasce da ignorância."
