[translation]
10025105-2 = "RABBIT1、[ruby=アフト]Aft[/ruby]クリア。"
10025105-3 = "RABBIT2、[ruby=バウ]Bow[/ruby]クリア。"
10025105-4 = "ら、RABBIT4……[ruby=ブリッジ]Bridge[/ruby]クリア。"
10025105-5 = "船内の全敵勢力を無力化、危険要素の排除完了。"
10025105-6 = "これにて作戦を終了します。皆さん、お疲れ様でした！"
10025105-11 = "えっ。ちょっと、私の出番は？"
10025105-12 = "遅かったな、RABBIT3。"
10025105-13 = "もう終わったぞ。こっちからしたら、物足りないくらいだ。"
10025105-14 = "それを言いたいのはこっちだよ！#n船上作戦って言うから、対艦ミサイルを用意してきたのにさぁー……"
10025105-20 = "ね、RABBIT2……このミサイル、1回だけ撃っちゃダメ？"
10025105-21 = "1回で沈めるからさ……？"
10025105-22 = "なに言ってんだバカ！まだ私たちも[ruby=ここ]船[/ruby]にいるんだからな！？"
10025105-28 = "……SRT特殊学園、と言ったか？"
10025105-29 = "あ、はい……その……"
10025105-30 = "……申し訳ありません。"
10025105-31 = "調査のためとはいえ、結果的に皆さんを騙してしまう事になり――"
10025105-32 = "いや、頭を上げてくれ。謝ってほしいわけではないんじゃ。"
10025105-33 = "村の問題だというのに……[ruby=よそさま]他所様[/ruby]の手を借りてしまって面目ない。"
10025105-37 = "いえ……これは[ruby=やとうら]夜戸浦[/ruby]村だけの問題ではありません。"
10025105-38 = "……と言うと？"
10025105-39 = "この村もキヴォトスの一部ですから。#n言い換えれば、ここで起きた問題はキヴォトスの問題でもあるという事。"
10025105-40 = "ですから、[ruby=ここ]キヴォトス[/ruby]で何か問題が発生したときは、#n私たちSRT特殊学園に連絡してください。"
10025105-41 = "いつだって、私たちが力になります。"
10025105-42 = "SRT、特殊学園か……"
10025105-43 = "……ありがとう。この恩、忘れぬよ。"
10025105-44 = "……はい！"
10025105-50 = "そうでした、こちらの容疑者の扱いですが――"
10025105-51 = "こちらに任せていただけませんか？"
10025105-52 = "私たちの管轄で起きた事件ですし。"
10025105-53 = "せっかくのチャンス……と言って良いものか分かりませんが、#nこれも実績につながりますから。"
10025105-55 = "……そうですね。では、後はよろしくお願いします。"
10025105-57 = "あっ……お、おい。ちょっと待ってくれよ！"
10025105-64 = "……[ruby=くまがい]熊谷[/ruby]、連れていけ。"
10025105-65 = "夜戸浦流のやり方を見せてやるといい。"
10025105-67 = "ちょ、待てよ……夜戸浦流って何だよ……おい！"
10025105-69 = "それは――"
10025105-70 = "教えてやる必要はない……じきに分かることじゃからな。"
10025105-72 = "せ、せめて何をされるのかくらい教えてくれても……！"
10025105-78 = "やっと分かったか？それが恐怖じゃ。"
10025105-80 = "何をされるか分からない状況に怯え、苦しむが良い。"
10025105-85 = "古来より恐怖とは……無知から生ずるものと言われておるからな。"
