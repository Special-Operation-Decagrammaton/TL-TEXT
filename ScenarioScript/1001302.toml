[translation]
1001302-1 = "O importante é a distância!"
1001302-2 = "Academia Trinity - Distrito Periférico"
1001302-3 = "……."
1001302-7 = "(Encontrei Tsurugi vagando com movimentos que parecem os de um monstro.)"
1001302-8 = "(Já que houve aquele incidente com a mensagem errada antes, decido falar com ela.)"
1001302-9 = "[s1] Cumprimentar.\n[s2] Acenar."
1001302-10 = "……？"
1001302-11 = "……？"
1001302-12 = "！！？"
1001302-13 = "……."
1001302-14 = "G-gyaaaaaaaahhhhhhh!?"
1001302-16 = "(Vuuuuum!)"
1001302-17 = "(Tsurugi fugiu em uma velocidade incrível.)"
1001302-18 = "[s3] ...É engraçado, vou atrás dela.\n[s4] ...Estou preocupado, vou atrás dela."
1001302-23 = "Haa... haa..."
1001302-24 = "[s5] Finalmente alcancei.\n[s6] \"Por que você está fugindo!?\""
1001302-25 = "！！？"
1001302-26 = "！！？"
1001302-27 = "Gya, kyaaaaaaahhh!?"
1001302-29 = "(Vuuuuum!)"
1001302-30 = "(Tsurugi fugiu de novo em uma velocidade incrível.)"
1001302-35 = "[ns] \"Espere!\""
1001302-39 = "[ns] \"Eu disse para esperar!\""
1001302-41 = "(BUUUUUUUUM!!)"
1001302-42 = "Desculpeeeeeeeee!!"
1001302-43 = "[s7] \"Ei, espere um pouco! O trem...!\"\n[s8] \"Tsurugi, olhe para frente!!\""
1001302-44 = "！？！？"
1001302-45 = "！？！？"
1001302-46 = "(BAM!!)"
1001302-47 = "Kieeeeeeeh!?"
1001302-48 = "(Tsurugi foi atingida pelo trem e voou uns 10 metros.)"
1001302-49 = "[s9] \"…………！？！！？\"\n[s10] \"Tsurugi!?\""
1001302-54 = "(Levanta-se)"
1001302-55 = "……."
1001302-56 = "D-desculpe, Sensei..."
1001302-57 = "[s11] Parece que ela está bem...\n[s12] \"Tsurugi, você é resistente, hein...\""
1001302-58 = "A-aquela mensagem... eu não sabia o que ou como enviar..."
1001302-59 = "A-aquela mensagem... eu não sabia o que ou como enviar..."
1001302-60 = "Fiquei... pensando por umas 5 horas..."
1001302-62 = "(Desmaia)"
1001302-63 = "[s13] \"5 horas!?\"\n[s14] \"Tsurugi!?\""
1001302-68 = "(5 horas antes de Tsurugi enviar a mensagem para o Sensei)"
1001302-69 = "…………."
1001302-71 = "(Folheia)"
1001302-72 = "(Artigo especial! 7 métodos para ter sucesso em um romance com um adulto!)"
1001302-73 = "(O parceiro é um adulto! Use mensagens provocativas para despertar o interesse!)"
1001302-74 = "(É importante não ser tratada como criança!)"
1001302-75 = "(Mantenha distância do parceiro! Fuja quando ele se aproximar, e aproxime-se quando ele se afastar. Manter uma certa distância é o segredo!)"
1001302-76 = "……."
1001302-77 = "(Não entendo... o que seria uma mensagem provocativa...!?)"
1001302-78 = "（Será que devo fazer como se estivesse enfrentando um inimigo……）"
1001302-79 = "Kehehehe, kihihahahaha!"
1001302-80 = "……。"
1001302-81 = "（……Não, não pode ser isso）"
1001302-82 = "（O que, o que eu deveria fazer……？）"
1001302-83 = "（Para me aproximar do Sensei……）"
1001302-85 = "（Tec-tec）Há, mui, to, tem, po, que, não, nos, fa, la, mos. A, in, fe, liz, Kensaki, Tsurugi……."
1001302-86 = "Não!! Isso não soa nada provocativo!!"
1001302-87 = "Mais uma vez……."
1001302-89 = "（5 horas depois）"
1001302-90 = "Kieeeeeee! Eu não sei o que escreverrrrrr!!"
1001302-91 = "Kieeeeeee! Kihaaaaaa!"
1001302-92 = "Aaaaaaaah! Kyaaaaaoaaa……."
1001302-93 = "（Bip）"
1001302-94 = "（Reconhecimento de voz concluído, mensagem enviada）"
1001302-95 = "Gyaaaa……."
1001302-96 = "……。"
1001302-97 = "Kyaaaaaaaaaaa!?!?"
1001302-99 = "……。"
1001302-100 = "[s] \"Então era isso.\""
1001302-101 = "De, desculpeeeee! Sinto muito por ter causado problemas!!"
1001302-102 = "[s] \"Está tudo bem.\""
1001302-103 = "……Es, está, tudo bem?"
1001302-104 = "Mas eu acabei enviando uma mensagem sem sentido……."
1001302-105 = "（Tsurugi está inquieta）"
1001302-106 = "[s15] Peço para ela se acalmar e faço carinho em sua cabeça.\n[s16] Faço carinho em sua cabeça para acalmá-la."
1001302-111 = "（Su）"
1001302-112 = "……Ué?"
1001302-114 = "（Acariciando, acariciando）"
1001302-115 = "[s] Digo que está tudo bem e que ela pode entrar em contato quando quiser."
1001302-116 = "……。"
1001302-117 = "（Kaaaa……！）"
1001302-118 = "Si…… sim……."
1001302-119 = "En, entendi……."
1001302-120 = "[s] \"Mas, olhe bem ao redor antes de atravessar a passagem de nível, viu.\""
1001302-121 = "Eu, eu guardarei, no coração……."
1001302-122 = "[s] \"Não quero que a Tsurugi-chan se machuque, entendeu?\""
1001302-123 = "……Ah, u…… sim."
1001302-124 = "（Com o rosto completamente vermelho, Tsurugi se despede docilmente）"
1001302-127 = "（Claro, eu mesmo fui pedir desculpas ao funcionário da estação que foi incomodado）"
