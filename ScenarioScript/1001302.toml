[translation]
1001302-1 = "大事なのは距離感！"
1001302-2 = "トリニティ総合学園・外郭地区"
1001302-3 = "……。"
1001302-7 = "（まるでモンスターのような動きで徘徊しているツルギを発見した）"
1001302-8 = "（ちょうど以前の間違いのチャットの件もあったし、声をかけてみることにする）"
1001302-9 = "[s1] 挨拶をする。\n[s2] 手を振る。"
1001302-10 = "……？"
1001302-11 = "……？"
1001302-12 = "！！？"
1001302-13 = "……。"
1001302-14 = "ぎ、ぎゃあああああああああーーーーーーー！？"
1001302-16 = "（ひゅーーーーーん！）"
1001302-17 = "（ツルギがものすごいスピードで逃げてしまった）"
1001302-18 = "[s3] ……面白いから追いかける。\n[s4] ……心配だから追いかける。"
1001302-23 = "はあ……はあ……。"
1001302-24 = "[s5] やっと追いついた。\n[s6] \"なんで逃げるの！？\""
1001302-25 = "！！？"
1001302-26 = "！！？"
1001302-27 = "ぎゃっ、きゃああははぁぁーーー！？！"
1001302-29 = "（ひゅーーーーん！）"
1001302-30 = "（ツルギがまたものすごいスピードで逃げてしまった）"
1001302-35 = "[ns] \"待ってー！\""
1001302-39 = "[ns] \"待ってってばー！\""
1001302-41 = "（プオオオオオオン！！）"
1001302-42 = "ごめんなさいいいいいいいいーー！！"
1001302-43 = "[s7] \"ちょ、ちょっと待って！電車が……！\"\n[s8] \"ツルギ、前見て！！\""
1001302-44 = "！？！？"
1001302-45 = "！？！？"
1001302-46 = "（ドゴッッッッ！！）"
1001302-47 = "きえええええぇぇぇーーっ！？！？"
1001302-48 = "（ツルギが電車に引かれて、10メートルぐらい吹っ飛んでいった）"
1001302-49 = "[s9] \"…………！？！！？\"\n[s10] \"ツルギ！？\""
1001302-54 = "（すくっ）"
1001302-55 = "……。"
1001302-56 = "す、すみません、先生……。"
1001302-57 = "[s11] 何ともなさそう……。\n[s12] \"ツルギは丈夫なんだね……。\""
1001302-58 = "あ、あのメッセージは……何をどう送ればいいか、分からなくて……。"
1001302-59 = "あ、あのメッセージは……何をどう送ればいいか、分からなくて……。"
1001302-60 = "5時間ぐらい……悩んで……。"
1001302-62 = "（バタッ）"
1001302-63 = "[s13] \"5時間も！？\"\n[s14] \"ツルギ！？\""
1001302-68 = "（ツルギが先生にメッセージを送る、5時間前）"
1001302-69 = "…………。"
1001302-71 = "（ぺらっ）"
1001302-72 = "（特集記事！大人との恋愛で成功する7つの方法！）"
1001302-73 = "（相手は大人！挑発的なメッセージで興味を持たせて！）"
1001302-74 = "（子供扱いされないようにすることが重要！）"
1001302-75 = "（相手との距離を保つこと！近寄ってきたら逃げて、離れたら近寄る。一定の距離感を維持するのがポイント！）"
1001302-76 = "……。"
1001302-77 = "（分からない……挑発的なメッセージ、って……！？）"
1001302-78 = "（敵に向かってやるようにすればいいのかな……）"
1001302-79 = "けけけけ、きひゃひゃひゃひゃひゃ！"
1001302-80 = "……。"
1001302-81 = "（……そんなわけない）"
1001302-82 = "（なに、どうすればいいの……？）"
1001302-83 = "（先生と仲良くなるためには……）"
1001302-85 = "（ポチポチ）ご、無、沙、汰、し、て、お、り、ま、す。不、肖、剣、先、ツ、ル、ギ……。"
1001302-86 = "違う！！全然挑発的じゃない！！"
1001302-87 = "もう一回……。"
1001302-89 = "（5時間後）"
1001302-90 = "きええええぇぇぇええっ！なんて書けばいいか分からないいいいいぃぃぃ！！"
1001302-91 = "きえええええええぇぇぇっ！きひゃあああぁぁっ！"
1001302-92 = "あああああぁーーっ！きゃあああおおぁ……。"
1001302-93 = "（ピピッ）"
1001302-94 = "（音声認識完了、送信されました）"
1001302-95 = "ぎぇあぁ……。"
1001302-96 = "……。"
1001302-97 = "きゃああああああぁぁぁっ！？！？"
1001302-99 = "……。"
1001302-100 = "[s] \"そういうことだったんだね。\""
1001302-101 = "す、すみませんんんんんんん！ご迷惑を、ご迷惑をおかけしました！！"
1001302-102 = "[s] \"大丈夫だよ。\""
1001302-103 = "……だ、大丈夫、ですか？"
1001302-104 = "でも意味不明のメッセージを送っちゃって……。"
1001302-105 = "（ツルギがソワソワしている）"
1001302-106 = "[s15] 落ち着いて、と頭を撫でてあげる。\n[s16] 頭を撫でて落ち着かせる。"
1001302-111 = "（スッ）"
1001302-112 = "……うぇ？"
1001302-114 = "（なでなでなで）"
1001302-115 = "[s] 大丈夫だから、いつでも気楽に連絡してと伝える。"
1001302-116 = "……。"
1001302-117 = "（カァーッ……！）"
1001302-118 = "は……はい……。"
1001302-119 = "わ、分かり、ました……。"
1001302-120 = "[s] \"でも、踏切は周りをよく見てから渡ってね。\""
1001302-121 = "き、肝に、銘じます……。"
1001302-122 = "[s] \"ツルギちゃんが怪我したらいけないから、分かった？\""
1001302-123 = "……あ、う……はい。"
1001302-124 = "（顔を真っ赤にして、大人しく挨拶をするツルギだった）"
1001302-127 = "（もちろん、迷惑をかけた駅員さんには私の方から土下座して謝罪した）"
