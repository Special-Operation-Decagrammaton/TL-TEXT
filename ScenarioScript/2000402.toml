[translation]
2000402-1 = "Fofura é justiça"
2000402-2 = "Loja perto de Trinity - Seção de trajes de banho"
2000402-3 = "Este traje de banho aqui é fofo, mas tem muitos babados e parece um pouco difícil de se mover... E sinto que é fofo demais também..."
2000402-6 = "Este aqui é um pouco revelador demais, para mim é um pouco..."
2000402-7 = "Hmm, qual seria o traje de banho adequado para o Comitê de Justiça...?"
2000402-8 = "Bem-vinda, gostaria de experimentar algum?"
2000402-9 = "Ah, não, eu ainda estou um pouco indecisa..."
2000402-10 = "Entendo. Bem, se for a senhorita... que tal este traje de banho fofo com babados?"
2000402-11 = "Este é o modelo mais popular entre as estudantes do ensino médio ultimamente!"
2000402-12 = "É, de fato o traje de banho é fofo, mas... é fofo demais, sinto que não combina comigo..."
2000402-13 = "Não diga isso! A senhorita é muito fofa e, acima de tudo, não existe nenhuma garota no mundo que não combine com um traje de banho fofo!"
2000402-14 = "Além disso..."
2000402-16 = "Trajes de banho fofos são a \"justiça\"!"
2000402-17 = "...Ju-justiça!?"
2000402-18 = "Sim, um \"traje de banho fofo\" tem o poder mágico de atrair muitos olhares apenas por existir."
2000402-19 = "Se uma garota que já é cheia de charme veste um \"traje de banho fofo\"... como não chamar esse charme irresistível de \"justiça\"?!"
2000402-23 = "(O-o que...)"
2000402-24 = "(O que é isso... Eu achava que já sabia muito bem sobre a \"justiça\", mas será que \"trajes de banho fofos\" também são justiça...!?)"
2000402-25 = "(...Mas por que usar um traje de banho fofo seria \"justiça\"? Não deveria haver nada sobre trajes de banho fofos no regulamento escolar...)"
2000402-26 = "(............)"
2000402-27 = "(...Não entendo. Trajes de banho fofos são justiça...?)"
2000402-28 = "(Preciso perguntar para alguém que entenda bem de \"justiça\"...)"
2000402-31 = "[ns] \"Mashiro, desculpe a demora... Por que essa cara de preocupada?\""
2000402-32 = "Ah, Sensei. Bem, na verdade..."
2000402-33 = "Como eu disse, eu estava dando uma olhada antes para ver se encontrava um traje de banho digno do nome do Comitê de Justiça..."
2000402-34 = "Eu não esperava descobrir minha própria ignorância sobre a \"justiça\" aqui..."
2000402-35 = "[s] \"...O que você quer dizer?\""
2000402-38 = "Mashiro me explicou o que aconteceu agora pouco."
2000402-40 = "Então, fiquei pensando sobre \"trajes de banho fofos\" por um tempo, mas não encontrei uma resposta..."
2000402-41 = "Eu estava pensando que, de fato, meu aprendizado sobre a \"justiça\" ainda não era suficiente."
2000402-42 = "Sensei, você entende o que significa dizer que \"trajes de banho fofos são justiça\"?"
2000402-43 = "[s] Explico, começando com um \"é apenas um palpite\"."
2000402-44 = "A palavra \"justiça\" às vezes é usada como uma expressão para dizer que algo é \"maravilhoso\" ou que \"por causa disso, tudo é perdoado\"...?"
2000402-45 = "Ou seja... \"usar um traje de banho fofo\" em si não tem muita relação com o nosso \"Comitê de Justiça\", é isso?"
2000402-46 = "Fico aliviada. Pensei que talvez o Comitê de Justiça tivesse que passar a atuar sempre usando trajes de banho fofos..."
2000402-47 = "[s] \"A Mashiro é muito direta quando se trata de justiça, não é...\""
2000402-48 = "...?"
2000402-49 = "De qualquer forma, fico feliz que não seja algo diferente da \"justiça\" que eu conheço."
2000402-50 = "Então, vou devolver este traje de banho ao lugar de onde tirei—"
2000402-53 = "[ns] \"Espere um pouco!\""
2000402-54 = "Ah, o-o que houve?"
2000402-55 = "Não que este traje de banho seja ruim, mas se possível, eu queria algo mais adequado para o \"Comitê de Justiça\"..."
2000402-56 = "[s1] \"Acho que esse traje de banho combina muito com você, Mashiro.\"\n[s2] \"Se a Mashiro usar esse traje de banho fofo, acho que isso é justiça.\""
2000402-57 = "Ah, m-mesmo com tantos babados e sendo um traje de banho tão fofo...?"
2000402-58 = "Hã? O quê?"
2000402-59 = "Hmm..."
2000402-60 = "Parece difícil de se mover em uma emergência, e os babados decorativos parecem que vão atrapalhar o treinamento..."
2000402-61 = "Mas, se o Sensei diz que \"este é bom\"... então, tudo bem."
2000402-62 = "Então, vou escolher este traje de banho."
2000402-64 = "...Vou mostrar a justiça encarnada neste traje de banho fofo!"
2000402-66 = "Depois disso, voltei para a escola junto com a Mashiro, que tinha acabado de comprar um traje de banho fofo."
