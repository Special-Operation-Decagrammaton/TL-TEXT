[translation]
10016150-1 = "後日談その5;救護騎士団＆救急医学部"
10016150-6 = "……最後に、バイタルをチェックします。"
10016150-13 = "……はい。体温正常、脈拍と血圧も正常値に戻ってますね。"
10016150-14 = "熱中症で運ばれてきたときは、体温が高く心配しましたが……"
10016150-15 = "水分補給と休息でなんとかなって良かったです。"
10016150-16 = "あ、ありがとうございます……おかげでもう元気になりました！"
10016150-17 = "いえ、油断は禁物です！"
10016150-18 = "合同医療本部はまもなく撤収する予定でして、ここでの対応は難しいですが……"
10016150-19 = "トリニティに戻られても体調が優れないようでしたら、ぜひ救護騎士団にお越しください！"
10016150-20 = "正義を守るのも、健康あってこそですので。"
10016150-21 = "は、はいっ……お気遣いありがとうございます！"
10016150-25 = "ところで、あの……そちらの方は……"
10016150-31 = "お呼びでしょうか？"
10016150-32 = "あっ、いえ。そういうわけではなくて……"
10016150-33 = "ゲヘナ生に見えますが、トリニティの私がお世話になっても大丈夫でしょうか……？"
10016150-34 = "ああ、それでしたら――"
10016150-39 = "お気になさらず。"
10016150-40 = "救急医学部は、患者の状態や身元を問いません。#n引き受けたその瞬間から、例外なく私たちの管轄です。"
10016150-41 = "もちろん、様々な障害が伴う場合もありますが、死体……#nいえ、患者がいるならどこへでも駆けつける、それが私たち救急医学部ですので。"
10016150-43 = "学園同士の関係性は、治療の二の次です。"
10016150-44 = "……なるほど、そうなんですね。"
10016150-45 = "晄輪大祭は学園の垣根を超え、みんなで切磋琢磨し公平に競い合う祭典ですから。"
10016150-46 = "私も皆さんに元気な姿で帰っていただけるよう、最善を尽くします。"
10016150-48 = "それに、あなたを見つけてここまで搬送してきたのは、こちらのセナさんなんですよ！"
10016150-49 = "そ、そうだったのですね……！"
10016150-50 = "なのに私は、何も知らずに失礼なことを……すみませんでした。"
10016150-51 = "いえ、気に病む必要はありません。"
10016150-52 = "患者を選んでいたら、上質な死体……#nいえ、負傷者に思う存分触れる機会が減ってしまいますし。"
10016150-53 = "（死体……？）"
10016150-54 = "と、とにかく、助けていただきありがとうございました！"
10016150-59 = "本日はお疲れ様でした！"
10016150-60 = "救急医学部の皆さんのおかげです。#n普段より多くの患者さんを診ることができました。"
10016150-61 = "いえ、救護騎士団の皆さんが尽力してくれたおかげです。"
10016150-62 = "どれだけ忙しかろうと、常に笑顔を絶やさず患者に接する皆さんの姿には、私も深い感銘を受けました。"
10016150-63 = "医学や治療に関しては、一定の見識があると自負していたのですが……#nまだまだ学ぶことは多いですね。"
10016150-68 = "どうかされましたか？"
10016150-69 = "……やはり、救護騎士団の皆さんにはお詫びをさせてください。"
10016150-70 = "実は、以前「救護騎士団」の噂を耳にして、少し構えていました。"
10016150-71 = "噂……？"
10016150-72 = "ああ、もしかして……救護騎士団はゲヘナの患者を受け入れない、とか――"
10016150-73 = "いえ、そうではなく……"
10016150-79 = "救護騎士団の団長が現れると、むしろ負傷者が増える、という噂です。"
10016150-80 = "「団長が壊して騎士団が治す」のだと……"
10016150-81 = "これほど優しい部員を率いている団長が、そんなはずありませんね。"
10016150-82 = "……。"
10016150-83 = "救護騎士団には、睡眠障害の患者にバットを振り回したり、お茶にトリカブトを混ぜて症状を悪化させた方がいるとも聞きましたが……"
10016150-84 = "あ、あはは……噂というものは、よく誇張されて伝わるものですから。"
10016150-85 = "そうですね。今日一日、皆さんと時間を共にして実感しました。#nやはり、噂は噂に過ぎません。"
10016150-86 = "……そういえば、こんな噂もありました。"
10016150-87 = "何でしょう……？"
10016150-88 = "救護騎士団には、いつでもどこにでも現れる幽霊のような看護師の方がいらっしゃる、と。"
10016150-89 = "噂によれば、その看護師は患者がナースコールを押す前に現れては、一瞬で措置を終え次の患者の下に駆けつけているそうです。"
10016150-90 = "セリナさんは、その有能な看護師の正体をご存じでしょうか。"
10016150-92 = "セ、セナさん……！#nたしか後夜祭で、大きなキャンプファイヤーが行われるそうなんですよ！"
10016150-93 = "よ、よろしければ、一緒に見に行きませんか？"
10016150-94 = "キャンプファイヤーですか。私はあまり……"
10016150-95 = "……そうですね。火を扱うわけですし、死体……いえ、負傷者が出るかもしれませんね。"
10016150-96 = "で、でしたら、さっそく準備をしましょう！#nこうしている間にも、患者さんが待っているはずです！"
10016150-103 = "……噂については、また今度お話できればと。"
