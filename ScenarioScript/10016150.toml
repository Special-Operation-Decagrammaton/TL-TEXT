[translation]
10016150-1 = "Epílogo parte 5; Esquadrão de Socorro e Departamento de Medicina de Emergência"
10016150-6 = "……Por último, vou verificar seus sinais vitais."
10016150-13 = "……Sim. Temperatura normal, pulso e pressão arterial também voltaram aos valores normais."
10016150-14 = "Quando você foi trazida por causa da insolação, fiquei preocupada com a temperatura alta, mas……"
10016150-15 = "Fico feliz que a hidratação e o descanso tenham resolvido."
10016150-16 = "Ah, muito obrigada…… Graças a vocês, já estou me sentindo bem!"
10016150-17 = "Não, não baixe a guarda!"
10016150-18 = "O quartel-general médico conjunto está prestes a ser desativado, então será difícil continuar o atendimento aqui, mas……"
10016150-19 = "Se não estiver se sentindo bem ao retornar para Trinity, por favor, venha ao Esquadrão de Socorro!"
10016150-20 = "Afinal, para proteger a justiça, é preciso ter saúde."
10016150-21 = "S-sim…… muito obrigada pela preocupação!"
10016150-25 = "A propósito, hum…… aquela pessoa ali……"
10016150-31 = "Chamou?"
10016150-32 = "Ah, não. Não é isso……"
10016150-33 = "Ela parece ser uma aluna de Gehenna, será que tudo bem eu, sendo de Trinity, receber cuidados dela……?"
10016150-34 = "Ah, sobre isso——"
10016150-39 = "Não se preocupe."
10016150-40 = "O Departamento de Medicina de Emergência não questiona o estado ou a origem do paciente. #nDesde o momento em que aceitamos, sem exceção, eles estão sob nossa jurisdição."
10016150-41 = "Claro, pode haver vários obstáculos, mas se houver um cadáver…… #nquer dizer, um paciente, nós iremos a qualquer lugar. É assim que o Departamento de Medicina de Emergência funciona."
10016150-43 = "O relacionamento entre as escolas vem depois do tratamento."
10016150-44 = "……Entendo, é assim mesmo."
10016150-45 = "O Festival de Halo é um evento onde todos superam as barreiras escolares para competir de forma justa e aprender uns com os outros."
10016150-46 = "Eu também farei o meu melhor para que todos possam voltar para casa saudáveis."
10016150-48 = "Além disso, foi a Sena quem encontrou você e a trouxe até aqui!"
10016150-49 = "E-era você……!"
10016150-50 = "E eu, sem saber de nada, fui tão indelicada…… sinto muito."
10016150-51 = "Não, não precisa se preocupar com isso."
10016150-52 = "Se eu fosse escolher pacientes, perderia a chance de lidar com cadáveres de alta qualidade…… #nquer dizer, com feridos."
10016150-53 = "(Cadáveres……?)"
10016150-54 = "D-de qualquer forma, muito obrigada por me salvar!"
10016150-59 = "Obrigada pelo trabalho de hoje!"
10016150-60 = "Graças ao pessoal do Departamento de Medicina de Emergência. #nPudemos atender mais pacientes do que o habitual."
10016150-61 = "Não, foi graças aos esforços do Esquadrão de Socorro."
10016150-62 = "Fiquei profundamente impressionada ao ver como vocês, não importa o quão ocupadas estivessem, sempre atendiam os pacientes com um sorriso."
10016150-63 = "Eu me orgulhava de ter um certo conhecimento em medicina e tratamento, mas…… #nainda tenho muito o que aprender."
10016150-68 = "Aconteceu alguma coisa?"
10016150-69 = "……Na verdade, gostaria de me desculpar com o Esquadrão de Socorro."
10016150-70 = "Na verdade, eu tinha ouvido rumores sobre o \"Esquadrão de Socorro\" e estava um pouco receosa."
10016150-71 = "Rumores……?"
10016150-72 = "Ah, será que…… o boato de que o Esquadrão de Socorro não aceita pacientes de Gehenna, ou algo assim——"
10016150-73 = "Não, não é isso……"
10016150-79 = "O boato é que, quando a líder do Esquadrão de Socorro aparece, o número de feridos aumenta."
10016150-80 = "Dizem que \"a líder destrói e o esquadrão cura\"……"
10016150-81 = "Uma líder que comanda membros tão gentis não faria algo assim, não é?"
10016150-82 = "……."
10016150-83 = "Também ouvi dizer que no Esquadrão de Socorro há quem balance um bastão para pacientes com distúrbios do sono, ou que misturam acônito no chá para piorar os sintomas……"
10016150-84 = "A-ahahaha…… Rumores costumam ser bem exagerados quando são espalhados."
10016150-85 = "É verdade. Passei o dia de hoje com vocês e percebi. #nNo fim das contas, rumores são apenas rumores."
10016150-86 = "……Falando nisso, havia outro boato."
10016150-87 = "O que seria……?"
10016150-88 = "Dizem que na Unidade de Socorro existe uma enfermeira que aparece em qualquer lugar e a qualquer momento, como um fantasma."
10016150-89 = "Segundo os rumores, essa enfermeira aparece antes mesmo do paciente apertar o botão de chamada, termina o atendimento em um instante e corre para o próximo paciente."
10016150-90 = "Serina, você sabe quem é essa enfermeira tão competente?"
10016150-92 = "Se, Sena...!#nOuvi dizer que vai ter uma grande fogueira no festival noturno!"
10016150-93 = "Se, se não se importar, gostaria de ir ver comigo?"
10016150-94 = "Uma fogueira, é? Eu não sou muito de..."
10016150-95 = "......Bem, pensando bem. Como envolve fogo, talvez surjam cadáveres... digo, feridos."
10016150-96 = "En, então, vamos nos preparar imediatamente!#nEnquanto estamos aqui, deve haver pacientes esperando!"
10016150-103 = "......Sobre os rumores, espero que possamos conversar em outra oportunidade."
