[translation]
10032045-9 = "Haa... haa..."
10032045-10 = "Q-que diabos está acontecendo aqui...!?"
10032045-11 = "Eu ouvi dizer que havia gente atrás de mim, mas..."
10032045-12 = "Eu não esperava que todos aqui fossem meus inimigos...!"
10032045-13 = "Meus guarda-costas se dispersaram e..."
10032045-18 = "Ei! Onde está o meu \"trunfo\" agora? É uma emergência! Traga-o logo aqui!!"
10032045-19 = "Eu? Estou perto do camarim dos artistas agora! Certo, vamos nos encontrar lá!"
10032045-23 = "Droga, preciso chegar ao camarim...! Mas, se eu chegar lá, o resto estará..."
10032045-24 = "O meu \"trunfo\" vai..."
10032045-28 = "Droga, eles já me seguiram até aqui...!!"
10032045-33 = "Mas o camarim já está logo ali...!"
10032045-37 = "Eu estava esperando. Parece que chegou a minha vez."
10032045-38 = "...E-essa voz!"
10032045-42 = "Explicações depois, entre logo."
10032045-55 = "...P-para onde ele foi!?"
10032045-56 = "P-para o camarim dos artistas! Há sinais de luta por toda parte...!"
10032045-57 = "Será que eles estão lutando lá dentro? Ou será que já acabou?"
10032045-58 = "...De qualquer forma, é certo que ele entrou na sala. #nEspero que ele ainda não tenha fugido."
10032045-62 = "[ns] \"...O que foi? Kayoko.\""
10032045-63 = "Nada, só estou curiosa."
10032045-64 = "Por que ele entraria de propósito em uma sala sem saída..."
10032045-65 = "[s1] \"Acho que é o pior lugar para fugir...\"\n[s2] \"Será que ele entrou sem pensar por estar em pânico...?\""
10032045-68 = "...Não sei. Mas não acho que ele cometeria um erro tão básico."
10032045-69 = "Ouvi dizer que ele é alguém que \"planeja várias estratégias\"..."
10032045-73 = "Espere. Então, existe a possibilidade de haver uma armadilha naquela sala..."
10032045-78 = "Por favor, torne-se a presa da Aru-sama, logo!!!"
10032045-85 = "H-Haruka! Espere um pouco!"
10032045-86 = "É perigoso entrar sozinha...!"
10032045-105 = "...H-Haruka!?"
10032045-107 = "[ns3] \"A Haruka voou...!\"\n[ns4] \"V-você está bem, Haruka!?\""
10032045-110 = "...Isso se tornou um problema."
10032045-111 = "Eu ouvi dizer que havia muitos atrás do cliente desta vez, mas..."
10032045-112 = "Eu não esperava que vocês aparecessem... Problem Solver 68."
10032045-115 = "[ns5] \"...!?\"\n[ns6] \"E-essa voz é...!\""
10032045-119 = "Q-quem é...!?"
10032045-120 = "Provavelmente o \"trunfo\" de quem o Arancino falou."
10032045-121 = "Mas essa voz, parece que já ouvi em algum lugar..."
10032045-126 = "[ns] \"............Eh.\""
10032045-132 = "............"
10032045-134 = "...Saori Joumae?"
