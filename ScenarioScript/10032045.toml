[translation]
10032045-9 = "はぁ……はぁ……"
10032045-10 = "こ、これは一体どういうことだ……！？"
10032045-11 = "私を狙う連中が居るとは聞いていたが……"
10032045-12 = "まさか、この場の全員がそうだとは思わんかったぞ……！"
10032045-13 = "護衛も散り散りになってしまったし……"
10032045-18 = "おい！「切り札」は今どこにいる？緊急事態だ！早く連れてこい！！"
10032045-19 = "私か？今、出演者控え室の近くだ！ああ、そこで合流しよう！"
10032045-23 = "チッ、控え室まで行かなくては……！だが、そこまで行けば後は……！"
10032045-24 = "私の「切り札」が……！"
10032045-28 = "クソッ、もうここまで追ってきたか……！！"
10032045-33 = "だが、もう控え室は目と鼻の……！"
10032045-37 = "待っていたぞ。どうやら私の出番のようだな。"
10032045-38 = "……こ、この声は！"
10032045-42 = "説明は後だ、ひとまず中へ。"
10032045-55 = "……ど、どこに行ったのよ！？"
10032045-56 = "し、出演者の控え室の方です！あちこちに戦いの跡が……！"
10032045-57 = "中でも戦ってるのかな？それとも、もう終わったとか？"
10032045-58 = "……どちらにせよ部屋の中に入ったのは確かね。#nまだ逃げてないといいんだけど。"
10032045-62 = "[ns] \"……どうしたの？カヨコ。\""
10032045-63 = "ううん、ちょっと気になって。"
10032045-64 = "どうしてわざわざ、自分から逃げ場のない部屋に入ったのか……"
10032045-65 = "[s1] \"逃げ場としては最悪だと思うけど……\"\n[s2] \"慌てて考えなしに入ったとか……？\""
10032045-68 = "……それは分からない。でも、そんな初歩的なミスをするとは思えないね。"
10032045-69 = "「何重にも策を弄する人物」だと聞いてるし……"
10032045-73 = "待って。じゃあ、あの部屋の中には罠が仕掛けられている可能性も……"
10032045-78 = "大人しくアル様の餌食になってくださいいいいぃぃ！！"
10032045-85 = "は、ハルカ！ちょっと待ちなさい！"
10032045-86 = "一人で入ったら危ないわよ……！"
10032045-105 = "……は、ハルカ！？"
10032045-107 = "[ns3] \"ハルカが飛んだ……！？\"\n[ns4] \"だ、大丈夫？ハルカ！？\""
10032045-110 = "……これは厄介なことになったな。"
10032045-111 = "今回の依頼人を狙う者は多いと聞いていたが……"
10032045-112 = "まさか、お前たちまで現れるとは……便利屋68。"
10032045-115 = "[ns5] \"……！？\"\n[ns6] \"こ、この声は……！\""
10032045-119 = "だ、誰……！？"
10032045-120 = "たぶん、アランチーノが言ってた「切り札」ね。"
10032045-121 = "でも、この声どこかで聞き覚えがあるような……"
10032045-126 = "[ns] \"…………え。\""
10032045-132 = "…………。"
10032045-134 = "…[ruby=じょうまえ]…錠前サ[/ruby]オリ？"
