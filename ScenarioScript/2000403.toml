[translation]
2000403-1 = "海辺の[ruby=スナイパー]狙撃手[/ruby]"
2000403-3 = "マシロからのメッセージを受け取ってすぐに約束の海辺に来たのだけれど、マシロの姿が見当たらない。"
2000403-4 = "[s] \"あれ、マシロ……？\""
2000403-5 = "あ、先生。お待ちしておりました。"
2000403-6 = "[s1] \"マシロ？どこにいるの？\"\n[s2] \"声は聞こえるのに、姿が見えない……。\""
2000403-7 = "えっと、目の前と言いますか……"
2000403-8 = "えっと、目の前と言いますか……"
2000403-9 = "先生のすぐ足元に。"
2000403-10 = "[s] \"足元……？\""
2000403-13 = "ふふ、なるほど。こんなに至近距離でも気が付かれないとは……。"
2000403-14 = "良い感じですね、これは買った甲斐があるというものです。"
2000403-15 = "[s3] \"全然気がつかなかった……。\"\n[s4] \"なんで気づけなかったんだろう……？\""
2000403-16 = "ずっとここにいましたよ。"
2000403-17 = "ずっとここにいましたよ。"
2000403-18 = "ただ、このギリースーツを身に付けていましたので。"
2000403-19 = "[s] \"ギリースーツって、なんだっけ……？\""
2000403-20 = "簡単に言うと、主に狙撃手が使う迷彩服ですね。"
2000403-21 = "風景に溶け込むように作られているので、相手に自身の存在を気づかれないようにするカモフラージュ効果があります。"
2000403-22 = "今回買ったこれは砂地用のものなので、アビドスなどでしたらまだしも、トリニティでは中々試すことのできる場所が無く……。"
2000403-23 = "ちょうど今回の夏季訓練は海辺とのことだったので、持ってきてみました。"
2000403-24 = "[s] \"なるほど。それ、着てると熱そうだね……。\""
2000403-25 = "それは仕方ありません、狙撃手にとって一番大事な心得は「待つ」ことですから。"
2000403-26 = "このような猛暑の中、砂地での待ち伏せがどれだけ過酷なものなのか……それを体験することができました。まあ、特にそういう予定があるわけでも無いのですが。"
2000403-27 = "[s] \"……マシロ、ここでどれぐらい待っていたの？\""
2000403-28 = "三時間ほど経った段階で先生にご連絡しましたので……およそ四時間ほどでしょうか？"
2000403-29 = "普段の訓練に比べたら、それほど長い時間ではありません。"
2000403-34 = "えっと、先生……？どうかしましたか？今の私、その……"
2000403-38 = "[ns5] \"マシロの身体、すっごい熱くなってるよ！？\"\n[ns6] \"早く涼しい所に……！\""
2000403-39 = "だ、大丈夫です。それに、まだ訓練は終わっていませんので。"
2000403-40 = "だ、大丈夫です。それに、まだ訓練は終わっていませんので。"
2000403-41 = "訓練としては、少なくともあと一時間は……。"
2000403-42 = "……あれ、先生？何だか景色が歪んで――"
2000403-46 = "[ns] \"マシロっ！\""
2000403-48 = "すぐにマシロを抱えて、近くの医務室へと駆け込んだ。"
2000403-50 = "無為ヶ浜救急センター・医務室"
2000403-52 = "ん……。"
2000403-53 = "あれ、ここは……？"
2000403-54 = "もしかして私……？"
2000403-55 = "[s] \"多分、熱中症かな。\""
2000403-56 = "……そうでしたか。自身のコンディションも管理しきれず、先生にご迷惑をおかけしてしまうなんて……申し訳ありません。"
2000403-57 = "やはり、猛暑とは難敵ですね……。"
2000403-58 = "もう少し長く耐えられるよう、戻ったらさらに訓練を……。"
2000403-59 = "[s] \"訓練は一旦中止。\""
2000403-60 = "で、ですが、前もって訓練で慣れておかないと、いざという時に実戦で困ってしまいます。"
2000403-61 = "少しは慣れたので、きっと次は大丈夫だと思いますし……。"
2000403-62 = "ご心配いただいてありがとうございます、今度は耐えられますので――"
2000403-63 = "[s] \"ダメ。\""
2000403-64 = "ですが……。"
2000403-65 = "[s] \"倒れたら、正義を貫けなくなっちゃうでしょ？\""
2000403-66 = "……なるほど。確かに、それはそうかもしれません。"
2000403-67 = "体調が悪い時に相手が現れてしまったら、きちんと対処ができない……そう考えると、自身の身体を守ることもまた「正義」だと考えることができそうです。"
2000403-68 = "スナイパーなのに、少し近視眼的な考え方になっていたかもしれませんね……。"
2000403-69 = "さすがは先生ですね、ありがとうございます。"
2000403-70 = "[s] \"ゆっくり休めたら、ちょっとずつ水泳とかから始めよう。\""
2000403-71 = "はい！では、今日は頑張って休憩します！"
2000403-72 = "[s] \"休憩は頑張らないで良いと思うよ……？\""
2000403-75 = "その後、しっかり回復したマシロを連れて、宿泊施設へと戻った。"
