[translation]
2000403-1 = "Atiradora à beira-mar"
2000403-3 = "Recebi a mensagem da Mashiro e vim imediatamente ao litoral conforme combinado, mas não consigo vê-la em lugar nenhum."
2000403-4 = "[s] \"Ué, Mashiro...?\""
2000403-5 = "Ah, Sensei. Estava esperando por você."
2000403-6 = "[s1] \"Mashiro? Onde você está?\"\n[s2] \"Consigo ouvir sua voz, mas não consigo te ver...\""
2000403-7 = "Bem, digamos que estou bem na sua frente..."
2000403-8 = "Bem, digamos que estou bem na sua frente..."
2000403-9 = "Bem aos seus pés, Sensei."
2000403-10 = "[s] \"Aos meus pés...?\""
2000403-13 = "Fufu, entendo. Então nem mesmo a essa distância você conseguiu me notar..."
2000403-14 = "É uma sensação ótima, valeu a pena ter comprado isso."
2000403-15 = "[s3] \"Eu não notei nada mesmo...\"\n[s4] \"Como foi que eu não percebi...?\""
2000403-16 = "Eu estive aqui o tempo todo."
2000403-17 = "Eu estive aqui o tempo todo."
2000403-18 = "É que eu estava usando este traje de camuflagem."
2000403-19 = "[s] \"Traje de camuflagem, o que é isso mesmo...?\""
2000403-20 = "Simplificando, é uma roupa de camuflagem usada principalmente por atiradores."
2000403-21 = "Como é feita para se misturar à paisagem, ela tem um efeito de camuflagem que impede que o alvo perceba a sua presença."
2000403-22 = "O que comprei desta vez é para terrenos arenosos, então, embora funcionasse em lugares como Abydos, não havia muitos lugares em Trinity onde eu pudesse testar..."
2000403-23 = "Como o treinamento de verão desta vez seria na praia, resolvi trazer."
2000403-24 = "[s] \"Entendi. Mas deve estar muito quente usando isso...\""
2000403-25 = "Isso não pode ser evitado, já que o ensinamento mais importante para um atirador é \"esperar\"."
2000403-26 = "Pude experimentar o quão rigorosa é uma emboscada em terreno arenoso sob um calor tão intenso. Bem, não que eu tenha planos específicos para isso."
2000403-27 = "[s] \"...Mashiro, há quanto tempo você está esperando aqui?\""
2000403-28 = "Entrei em contato com você depois de três horas, então... deve fazer umas quatro horas, talvez?"
2000403-29 = "Comparado ao meu treinamento habitual, não é um tempo tão longo assim."
2000403-34 = "Hum, Sensei...? Aconteceu alguma coisa? Eu agora, esse..."
2000403-38 = "[ns5] \"O corpo da Mashiro está super quente!\"\n[ns6] \"Temos que levá-la para um lugar fresco, rápido...!\""
2000403-39 = "E-estou bem. Além disso, o treinamento ainda não acabou."
2000403-40 = "E-estou bem. Além disso, o treinamento ainda não acabou."
2000403-41 = "Para o treinamento, preciso de pelo menos mais uma hora..."
2000403-42 = "...Ué, Sensei? Por que a paisagem está distorcendo—"
2000403-46 = "[ns] \"Mashiro!\""
2000403-48 = "Peguei Mashiro imediatamente e corri para a enfermaria mais próxima."
2000403-50 = "Centro de Primeiros Socorros de Muigahama - Enfermaria"
2000403-52 = "Hmm..."
2000403-53 = "Ué, onde estou...?"
2000403-54 = "Será que eu...?"
2000403-55 = "[s] \"Provavelmente foi insolação.\""
2000403-56 = "...Entendo. Não conseguir nem gerenciar minha própria condição e acabar causando problemas ao Sensei... sinto muito."
2000403-57 = "Realmente, o calor intenso é um inimigo difícil..."
2000403-58 = "Para conseguir aguentar por mais tempo, quando eu voltar, vou treinar ainda mais..."
2000403-59 = "[s] \"O treinamento está cancelado por enquanto.\""
2000403-60 = "M-mas, se eu não me acostumar com o treinamento antecipadamente, terei problemas em uma situação real."
2000403-61 = "Já me acostumei um pouco, então tenho certeza de que da próxima vez ficarei bem..."
2000403-62 = "Obrigada por se preocupar, da próxima vez eu aguento—"
2000403-63 = "[s] \"Não.\""
2000403-64 = "Mas..."
2000403-65 = "[s] \"Se você desmaiar, não conseguirá manter a justiça, certo?\""
2000403-66 = "...Entendo. De fato, talvez você tenha razão."
2000403-67 = "Se o inimigo aparecer quando não estou me sentindo bem, não conseguirei lidar com a situação adequadamente... Pensando bem, cuidar do próprio corpo também pode ser considerado uma forma de \"justiça\"."
2000403-68 = "Mesmo sendo uma sniper, talvez eu estivesse com uma visão um pouco míope sobre isso..."
2000403-69 = "Como esperado do Sensei, muito obrigada."
2000403-70 = "[s] \"Quando você estiver descansada, podemos começar aos poucos com algo como natação.\""
2000403-71 = "Sim! Então, hoje vou me esforçar para descansar!"
2000403-72 = "[s] \"Acho que você não precisa se esforçar para descansar...?\""
2000403-75 = "Depois disso, levei Mashiro, que já estava totalmente recuperada, de volta para a acomodação."
