[translation]
10005055-4 = "Ni-hahaha! Nossa, quem diria que eu viveria para ver um dia desses!!"
10005055-5 = "Olhar de cima para a lendária C&C sendo capturada... que dia glorioso!"
10005055-6 = "Ah, a liberdade é maravilhosa! Como dizem, a melhor das trinta e seis estratégias é fugir!"
10005055-7 = "[s1] \"Estão todas reunidas.\"\n[s2] \"Só falta a Asuna...\""
10005055-8 = "Ah, falando nisso..."
10005055-9 = "Ah, falando nisso..."
10005055-10 = "Onde será que a Asuna-senpai se meteu, como sempre?"
10005055-11 = "Bem, é certo que ela está dentro deste navio, e considerando o número de guardas, é só questão de tempo até ser capturada, com certeza!"
10005055-12 = "Ni-hahaha! Esperem só mais um pouco, vou deixar todas vocês juntinhas!"
10005055-13 = "Depois disso, o que faremos? Talvez eu peça para nos deixarem em alguma ilha deserta."
10005055-14 = "Então é isso! Talvez nunca mais nos vejamos, mas que seja!"
10005055-18 = "Opa, esse timing... será que é!?"
10005055-19 = "Pelo fluxo da situação, não tem erro! Bom trabalho para vocês!"
10005055-20 = "Asuna-senpai, quanto tempo!!"
10005055-29 = "Ah, é a Koyuki!"
10005055-30 = "Você estava aqui?"
10005055-32 = "Ni-hahaha! Olá, senpai!"
10005055-33 = "E pessoal da segurança, bom trabalho!"
10005055-39 = "Vamos, entrem logo! Já que estão todas juntas!"
10005055-40 = "Não adianta resistir! Afinal, aqui não é Millennium, se fizerem algo assim, vai ser um problemão—"
10005055-45 = "……Senhoras."
10005055-46 = "……?"
10005055-47 = "……Senhoras? Não está falando comigo?"
10005055-48 = "……Não é com você."
10005055-49 = "É com aquelas ali."
10005055-50 = "……Peço mil desculpas, estão liberadas."
10005055-54 = "……Hã?"
10005055-56 = "……Hein?"
10005055-57 = "O que é isso……?"
10005055-58 = "……Liberadas? Por quê?"
10005055-60 = "Por ordem da senhorita Asuna."
10005055-61 = "……Senhorita?"
10005055-62 = "Seguindo as instruções da senhorita Asuna, uma VIP com classificação S, estamos liberando todas vocês."
10005055-63 = "Houve uma conversa lá em cima... pedimos desculpas, mas teremos que cobrar o valor dos danos causados pelo combate de agora pouco... mas, uma vez quitado isso, tudo o que aconteceu até aqui será esquecido."
10005055-64 = "Embora a situação fosse diferente até agora pouco, pedimos sinceras desculpas. Fiquem à vontade..."
10005055-71 = "Parece que é isso!"
10005055-72 = "Eu estava prestes a ser capturada, mas quando olhei para a tela do jogo, todo mundo parou de repente?"
10005055-73 = "Parece que fizeram várias ligações, e depois me disseram \"estamos às suas ordens\", então pensei: por que não aproveitar?"
10005055-74 = "Então é isso, temos que pagar uma graninha, mas estamos livres!! E tudo volta ao normal!"
10005055-75 = "[s3] \"Disseram que o rank 'S' é algo extremamente raro...\"\n[s4] \"Típico da Asuna.\""
10005055-79 = "……Haha."
10005055-80 = "Entendi, entendi……"
10005055-81 = "Ou seja, contanto que a gente pague o que deve, podemos fazer o que quisermos depois."
10005055-82 = "Não vai virar um problema entre escolas... é isso, né?"
10005055-83 = "Hah."
10005055-84 = "……Nada mal."
10005055-85 = "Ei, Coelho Branco... por que não foge logo? Vou te dar uns 10 segundos de vantagem."
10005055-87 = "……Aha."
10005055-88 = "Tente se esforçar um pouco, tá?"
10005055-89 = "……Se acabar rápido demais, não vai ter graça nenhuma!!"
