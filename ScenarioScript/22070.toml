[translation]
22070-1 = "第7話;不思議な機械（２）"
22070-13 = "ゲホッゲホッ………"
22070-14 = "い、一体何が起きてるの！？"
22070-15 = "突然眠っていたロボットが起動……。"
22070-17 = "そして爆発が……あれは、明確な攻撃です。"
22070-18 = "攻撃命令を出してたのは……"
22070-29 = "……有機体の生存反応を確認。"
22070-30 = "失敗を確認しました。"
22070-31 = "[s] \"アリス……！\""
22070-32 = "あ、アリスちゃん！？"
22070-33 = "……プロトコルを再実行します。武装のリロード開始。"
22070-39 = "また……レールガンの充電を始めました！"
22070-43 = "[ns] \"……早く止めないと！\""
22070-45 = "[ns] \"みんな、アリスをお願い……！\""
22070-47 = "アリスちゃん！！ごめん！！！"
22070-59 = "妨害を確認、充電失敗。"
22070-60 = "よし！止まった！"
22070-61 = "……妨害要素を排除します。"
22070-62 = "……え？"
22070-70 = "マキ！危ない！"
22070-76 = "……！！"
22070-82 = "マキ！！"
22070-87 = "プロトコルを再実行します。武装のリロード開始。"
22070-93 = "あ、ああ……"
22070-94 = "い、一体なに……アリスちゃん！ねえ、アリスちゃん！"
22070-96 = "[ns] \"くっ！アリス……！\""
22070-103 = "[ns] （一体……どうすれば……！）"
22070-104 = "発――"
22070-106 = "おい、チビ。#nそこまでだ。"
22070-113 = "………！！"
22070-119 = "大人しく寝てろ。"
22070-126 = "こいつら、ここにもいやがったのか……。"
22070-127 = "はぁ……片付けるか。"
22070-128 = "おい、行くぞ。"
22070-130 = "はーい！部長！"
22070-132 = "支援する。"
22070-134 = "ええ、後方はお任せください。"
22070-146 = "これで終わり！"
22070-147 = "作戦終了。"
22070-148 = "お疲れ様でした。"
22070-150 = "……これでいいか？先生。"
22070-151 = "[s] \"ネル、みんな！ありがとう！\""
22070-152 = "んで、何があったんだ？"
22070-153 = "すげぇ音がしたから来てみたら、部室がボロボロじゃねぇか。"
22070-154 = "それに、チビのあの姿は一体……。"
22070-155 = "[s] \"ごめん、ちょっと待ってね……みんな大丈夫！？\""
22070-157 = "うっ……な、なんとか……"
22070-158 = "うえぇぇ……内臓飛び出ちゃうかと思ったぁああ……。"
22070-159 = "軽口が言えるのだから、とりあえず無事ですね。"
22070-160 = "[s] \"それなら良かった……。\""
22070-166 = "先生……！先生！"
22070-167 = "あ、ああ、モ、モモイ………"
22070-168 = "[s] \"ミドリ、ユズ……どうしたの……？\""
22070-169 = "お姉ちゃんが……お姉ちゃんが……！"
22070-171 = "……。"
22070-173 = "次回;崩れた日常"
