[translation]
2003206-1 = "冷水浴"
2003206-2 = "（氷海で特殊作戦の遂行中……）"
2003206-3 = "（ふとエイミのモモトークを思い出した）"
2003206-6 = "（そうして、教えてもらった場所へ向かうと……）"
2003206-7 = "あ、先生、来てくれたんだ。"
2003206-8 = "（エイミは氷に穴を開けて、水に浸かっていた）"
2003206-11 = "[ns] \"寒くないの？\""
2003206-12 = "[wa:300]― [log=에이미 수영복]うん？[/log]"
2003206-14 = "― [log=에이미 수영복]寒くないよ。[wa:1500]大丈夫。[/log]"
2003206-17 = "[wa:1200]― [log=에이미 수영복]逆に、[/log]"
2003206-19 = "― [log=에이미 수영복]いまが涼しくて[wa:1000]ちょうどいいくらい。[/log]"
2003206-22 = "[wa:1400]― [log=에이미 수영복]いい気分……[/log]"
2003206-24 = "― [log=에이미 수영복]先生も入る？[/log]"
2003206-27 = "[ns] \"遠慮しておくよ……\""
2003206-28 = "[wa:500]― [log=에이미 수영복]ふーん。[wa:1500]いいけど。[/log]"
2003206-31 = "[wa:900]― [log=에이미 수영복]もうちょっとしたら[wa:800]出るから、[/log]"
2003206-33 = "― [log=에이미 수영복]少しだけ待っててね。[wa:1700]先生。[/log]"
2003206-36 = "はぁ……最高だった。"
2003206-37 = "でも、ちょっと物足りないかも……#n帰ったら家でも冷水浴できるような設備を作ってみる。"
2003206-38 = "そうすれば、毎日パラダイス……"
2003206-39 = "[s] \"毎日水風呂に浸かってたら風邪引くよ？\""
2003206-40 = "大丈夫、寒くても風邪引いたことは無いから。"
2003206-41 = "これくらい、全然平気……"
2003206-42 = "はっ……"
2003206-43 = "くしゅんっ！"
2003206-44 = "あれっ？"
2003206-48 = "[ns] \"エイミが風邪を引いた！！！\""
2003206-49 = "いや……これはただのくしゃみ。"
2003206-50 = "[s] \"どうしよう！？エイミが風邪を引いちゃった！\""
2003206-51 = "だから、くしゃみをしただけ……！"
2003206-52 = "[s] \"いくらエイミでも、この寒さはダメだったんだ……！\""
2003206-53 = "違うよ。むしろ、これくらいがちょうどいいから。"
2003206-55 = "（互いに一歩も引かず、言い合いを続けながらベースキャンプに戻った）"
2003206-59 = "（熱いものが苦手なエイミも、この日は熱いお茶を飲み干した）"
