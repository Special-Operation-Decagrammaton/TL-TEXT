[translation]
2003206-1 = "Banho de água gelada"
2003206-2 = "（Durante a execução de uma operação especial no mar de gelo……）"
2003206-3 = "（De repente, lembrei-me do Momotalk da Eimi）"
2003206-6 = "（Então, quando fui até o local que ela me indicou……）"
2003206-7 = "Ah, Sensei, você veio."
2003206-8 = "（Eimi abriu um buraco no gelo e estava submersa na água）"
2003206-11 = "[ns] \"Não está com frio?\""
2003206-12 = "[wa:300]― [log=에이미 수영복]Hm?[/log]"
2003206-14 = "― [log=에이미 수영복]Não estou com frio.[wa:1500] Estou bem.[/log]"
2003206-17 = "[wa:1200]― [log=에이미 수영복]Pelo contrário,[/log]"
2003206-19 = "― [log=에이미 수영복]Agora está refrescante e[wa:1000] na medida certa.[/log]"
2003206-22 = "[wa:1400]― [log=에이미 수영복]Que sensação boa……[/log]"
2003206-24 = "― [log=에이미 수영복]Você quer entrar também, Sensei?[/log]"
2003206-27 = "[ns] \"Vou recusar……\""
2003206-28 = "[wa:500]― [log=에이미 수영복]Hmm.[wa:1500] Tudo bem então.[/log]"
2003206-31 = "[wa:900]― [log=에이미 수영복]Vou sair daqui a pouco,[wa:800][/log]"
2003206-33 = "― [log=에이미 수영복]Espere um pouquinho, tá?[wa:1700] Sensei.[/log]"
2003206-36 = "Ah... foi incrível."
2003206-37 = "Mas, talvez tenha faltado um pouco...#nQuando eu voltar, vou tentar criar um equipamento para tomar banho de água gelada em casa."
2003206-38 = "Se eu fizer isso, será um paraíso todos os dias……"
2003206-39 = "[s] \"Você vai acabar pegando um resfriado se ficar mergulhando em água gelada todo dia, sabia?\""
2003206-40 = "Está tudo bem, nunca peguei um resfriado, mesmo com frio."
2003206-41 = "Isso aqui não é nada, estou totalmente bem……"
2003206-42 = "Ah……"
2003206-43 = "Atchim!"
2003206-44 = "Ué?"
2003206-48 = "[ns] \"A Eimi pegou um resfriado!!!\""
2003206-49 = "Não…… isso foi só um espirro."
2003206-50 = "[s] \"O que eu faço!? A Eimi pegou um resfriado!\""
2003206-51 = "Eu disse que foi só um espirro……!"
2003206-52 = "[s] \"Mesmo sendo a Eimi, esse frio foi demais……!\""
2003206-53 = "Não é isso. Na verdade, essa temperatura é perfeita."
2003206-55 = "（Voltamos para o acampamento base enquanto discutíamos, sem que nenhum dos dois cedesse）"
2003206-59 = "（Mesmo a Eimi, que não gosta de coisas quentes, tomou um chá quente até o fim naquele dia）"
