[translation]
1013706-1 = "バディ"
1013706-2 = "（バスに乗って、コノカと会うべく田舎の方へやってきた）"
1013706-4 = "先生、こっちっす～！"
1013706-5 = "ご足労いただき感謝っす。#nどうしてもバディが必要で……。"
1013706-6 = "なのにヴァルキューレで定期訓練があって、一緒に来てくれる子がいなかったんすよ。"
1013706-7 = "[s] \"何をすればいいの？\""
1013706-8 = "聞き込み捜査っす！"
1013706-9 = "逃走中の容疑者がいるんすけど、ここへ向かうバスに乗ったらしくて。"
1013706-10 = "余所者だから目立つでしょうし、聞き込みすれば一発だと思うっす！"
1013706-11 = "午後には雨降るらしいんで、さっさと終わらせて帰るっすよ！"
1013706-12 = "しゅつど～！"
1013706-25 = "はぁ……。"
1013706-26 = "誰も見てないって……どういうことっすか？"
1013706-27 = "これ以上は聞き込みしても微妙っすよね……。"
1013706-28 = "もしかして、山に逃げてたり……？#n木の根をかき分けてでも探して見せるっす！"
1013706-29 = "[s] \"山の動物が可哀想だからやめて！\""
1013706-30 = "もちろんちゃーんと元通りにはするっすよ。#nというかただの例えっすし……。"
1013706-31 = "時間も遅いし、急いで決着つけないと――"
1013706-36 = "はぇ？"
1013706-37 = "うぎゃーっ！冷たっ！！"
1013706-38 = "あっちで雨宿りできそうっす！#nああ、もーっ！！"
1013706-41 = "（コノカと一緒に急いで雨をしのげる場所へ向かった）"
1013706-42 = "（再三の失敗に肩を落としてたコノカは、唐突に上着を脱ぎ始めた）"
1013706-45 = "[wa:2172]― [log=코노카]あーあ、[wa:1075]びしょ濡れ……。[/log]"
1013706-47 = "― [log=코노카]うぅ……[wa:570]さっむ。[/log]"
1013706-50 = "[wa:1586]― [log=코노카]降り[wa:162]始めちゃいましたね。[/log]"
1013706-52 = "― [log=코노카]夜までは止まないらしいのに……[wa:2261]はぁ……。[/log]"
1013706-55 = "― [log=코노카]まぁ、[wa:994]頭を冷やすには[wa:1173]ちょうどよかったっすかね。[/log]"
1013706-58 = "[ns] \"大丈夫？落ち着いた？\""
1013706-59 = "[wa:517]― [log=코노카]はぇ？[wa:973]ああ、[wa:860]うーん。[/log]"
1013706-61 = "― [log=코노카]悔しくないって[wa:487]言ったら[wa:995]嘘になるっすよ。[/log]"
1013706-64 = "― [log=코노카]いろいろ[wa:273]無駄骨になるわ、[wa:1480]濡れ鼠になるわ……。[/log]"
1013706-67 = "[wa:556]― [log=코노카]でも、[wa:816]占いの[wa:481]通りっす。[/log]"
1013706-69 = "― [log=코노카]バディが[wa:217]隣にいたから、[wa:1039]良い1日に[wa:425]なりました。[/log]"
1013706-72 = "― [log=코노카]……先生の[wa:1002]おかげっすよ。[/log]"
1013706-75 = "[wa:870]― [log=코노카]だから、[wa:934]どちらかというと――[/log]"
1013706-77 = "― [log=코노카]幸せです。[/log]"
1013706-80 = "― [log=코노카]……あっ、[wa:376]いや、[wa:607]その！[/log]"
1013706-82 = "― [log=코노카]こうやって[wa:337]雨宿りもできて、[wa:1249]ラッキーで[wa:490]幸せだ[wa:430]なっ[wa:315]て意味で！[/log]"
1013706-85 = "― [log=코노카]そ、[wa:456]それだけ……[wa:806]っすから……。[/log]"
1013706-88 = "……。"
1013706-89 = "あー……ええと、幸せっていうのは。#nその、最悪は免れたから、で……。"
1013706-90 = "特に深い意味は――"
1013706-95 = "おっと、先客がいたな。"
1013706-96 = "アツアツの中わりぃな。急に降ってきたもんだからさぁ。"
1013706-97 = "……？"
1013706-98 = "なんだ、お前も追われてんのか？#nうちらとご同類っぽい感じするけど。"
1013706-99 = "あ、そうだ。この近くでサツ見なかったか？"
1013706-103 = "マジか……。"
1013706-105 = "[ns] \"ヴァルキューレなら、ここに……。\""
1013706-107 = "えっ……。"
1013706-108 = "あ～！急に滝行がしたくなってきたなぁ！#nそれじゃお先に！！"
1013706-112 = "待てぇー！！！"
1013706-116 = "おとり捜査とか卑怯だろ！！"
1013706-117 = "はい、罪状二倍ィ！"
1013706-118 = "なんでー！？"
1013706-119 = "アツアツ妨害罪ってことで！"
1013706-121 = "（雨の中、不良に向かって駆け出したコノカはあっという間に容疑者を逮捕した）"
1013706-122 = "（帰り道、コノカはバスに揺られながら窓の外を眺めていた）"
