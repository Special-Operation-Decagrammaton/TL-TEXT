[translation]
2004102-1 = "Hábitos alimentares racionais"
2004102-2 = "（Segui a rota designada pela Rio e fui até o local de encontro.）"
2004102-3 = "（Mesmo que tenha sido por segurança, acabei dando uma volta enorme...）"
2004102-7 = "Te fiz esperar?"
2004102-8 = "……Não, deveria estar dentro da previsão. #nJá que especifiquei uma rota racional, é natural."
2004102-9 = "[s] \"Tenho uma coisa para te perguntar...\""
2004102-10 = "……Sobre minhas refeições diárias?"
2004102-11 = "Baseado na racionalidade, opto por marmitas com desconto e alimentos congelados."
2004102-12 = "No supermercado próximo, chegam a custar metade do preço. #nO sabor também é impecável."
2004102-13 = "Especialmente a marmita de Tatsuta-age e a tigela de Karaage, são sublimes."
2004102-14 = "Hoje está fechado, então isso é um caso à parte..."
2004102-15 = "Normalmente, uma batalha feroz acontece por elas. #nMas, dado aquele nível de perfeição, é compreensível."
2004102-16 = "Além disso, alimentos congelados têm um prazo de validade longo e podem ser estocados em grandes quantidades."
2004102-17 = "É, de fato, uma escolha racional."
2004102-18 = "[s1] \"Você vai acabar com a saúde comendo assim...\"\n[s2] \"Acho que pedir delivery seria mais equilibrado nutricionalmente...\""
2004102-21 = "Delivery está fora de questão."
2004102-22 = "Considerando o risco de rastrearem minha base ou do entregador memorizar meu rosto, é irracional."
2004102-23 = "……E além disso, se você escreve uma avaliação no delivery, ganha descontos ou brindes, não é?"
2004102-24 = "Não aproveitar os benefícios existentes é extremamente irracional."
2004102-25 = "Porém, deixar um registro aumenta a probabilidade de ser detectada."
2004102-26 = "……Por isso, eliminei essa opção desde o início."
2004102-27 = "Nunca pensei que cairia em um dilema como este."
2004102-28 = "É, de fato, uma escolha racional."
2004102-29 = "[s] \"Você vai acabar precisando de um hospital...\""
2004102-30 = "Marmitas e congelados têm muitos fritos e alto teor de gordura...?"
2004102-31 = "Entendo que a ingestão de vitaminas e fibras alimentares é necessária."
2004102-32 = "Mas, o primeiro pode ser compensado com suplementos."
2004102-33 = "Quanto ao resto..."
2004102-34 = "……Não é algo que chegue a ser um problema."
2004102-35 = "[s] \"É um problema sim...\""
2004102-36 = "A faixa de influência das fibras alimentares não é tão grande assim. #nOs nutrientes essenciais já são supridos pelos suplementos..."
2004102-37 = "……Não, para ser sincera, eu não sou boa em cozinhar."
2004102-38 = "Se eu inventasse um Avant-Garde-kun equipado com funções culinárias, isso resolveria, você diz...?"
2004102-39 = "Isso é..."
2004102-40 = "[s] \"……Hm?\""
2004102-44 = "……É difícil."
2004102-48 = "[ns3] \"Tudo bem!\"\n[ns4] \"Vamos juntos àquele supermercado!\""
2004102-51 = "A taxa de desconto lá é baixa. #nÉ uma escolha irracional."
2004102-52 = "[s] \"Hoje eu pago!\""
2004102-53 = "E-entendido..."
2004102-55 = "（Segurei a mão da Rio e fomos em direção ao supermercado）"
2004102-58 = "……Sensei, o que é esse vegetal? #nTem uma estrutura fractal... a dimensão de Hausdorff seria 2.7?"
2004102-59 = "Chama-se couve-flor? #nQue forma estranha... é fascinante que tenha gosto de batata quando cozida."
2004102-64 = "Cenoura, cebola e tomate... até aqui, eu entendo."
2004102-65 = "……E-espere um pouco. #nNão estamos comprando carne demais?"
2004102-67 = "（Como não entendo muito de culinária, recorri à ajuda da internet...）"
2004102-68 = "（E assim, compramos os ingredientes para a refeição.）"
2004102-70 = "……"
2004102-71 = "Entendo, você está focando em proteínas e vitaminas. #nAssim, é possível reduzir a proporção de carboidratos."
2004102-72 = "E agora, o que faremos a seguir?"
2004102-73 = "[s] \"Vou preparar uma refeição para você no Schale.\""
2004102-74 = "Eu nunca ouvi dizer que você fosse bom na cozinha..."
2004102-75 = "...Entendo, você vai copiar uma receita que pesquisou na internet."
2004102-76 = "Sinceramente, acho que é melhor do que cozinhar baseando-se em intuição irracional."
2004102-77 = "...Mas, será que vai dar certo mesmo?"
2004102-78 = "[s] \"Sendo preocupado pela minha aluna...\""
2004102-80 = "(Depois de dar outra volta, voltamos para o Schale)"
2004102-84 = "[ns] \"Rio, descanse um pouco, eu vou preparar.\""
2004102-85 = "Ah, sim."
2004102-94 = "Ensopado, hein."
2004102-95 = "Será que até eu conseguiria fazer isso...?#nSerá...?"
2004102-96 = "...Obrigada."
2004102-97 = "Vou começar a comer."
2004102-102 = "(Comi o ensopado em silêncio)"
2004102-104 = "De alguma forma..."
2004102-105 = "[ns] \"A, alguma coisa...?\""
2004102-106 = "Não está ruim, mas..."
2004102-107 = "Também não é nada especial."
2004102-108 = "[s] \"Pois é...\""
2004102-109 = "...Mas."
2004102-110 = "Por que será?"
2004102-117 = "É um sabor que... aquece o coração."
