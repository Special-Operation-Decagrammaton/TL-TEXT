[translation]
2004102-1 = "合理的な食生活"
2004102-2 = "（リオに指定されたルートを通り、待ち合わせ場所に向かった）"
2004102-3 = "（安全のためとはいえ、すごい遠回りをした……）"
2004102-7 = "待たせたかしら？"
2004102-8 = "……いえ、予測通りのはず。#n合理的なルートを指定したのだから、当然ね。"
2004102-9 = "[s] \"ひとつ、聞きたいんだけど……。\""
2004102-10 = "……普段の食事？"
2004102-11 = "合理に基づいて、割引弁当と冷凍食品にしているわ。"
2004102-12 = "近くのスーパーでは、最大半額になるの。#n味も申し分ない。"
2004102-13 = "特に竜田揚げ弁当と唐揚げ丼は絶品ね。"
2004102-14 = "今日は休業だから別として……。"
2004102-15 = "普段は激しい争奪戦が繰り広げられているわ。#nあの完成度なら仕方がないことだけれど。"
2004102-16 = "そして、冷凍食品は賞味期限が長いうえに、大量に保管できるもの。"
2004102-17 = "まさに、合理的な選択ね。"
2004102-18 = "[s1] \"そんな食生活してたら体を壊すよ……。\"\n[s2] \"出前のほうが栄養バランス取れてそう……。\""
2004102-21 = "出前は論外よ。"
2004102-22 = "拠点を追跡されたり、配達員に顔を覚えられるリスクを考えたら、非合理的だわ。"
2004102-23 = "……それに出前はレビューを書き込むと、割引やおまけがつくでしょう？"
2004102-24 = "特典が存在するのに利用しないのは、極めて非合理的。"
2004102-25 = "けれど、ログを残すと探知される可能性が高まってしまう。"
2004102-26 = "……なので、最初から選択肢から外してるのよ。"
2004102-27 = "私がこんなジレンマに陥るとは、考えもしなかったわ。"
2004102-28 = "まさに、合理的な選択ね。"
2004102-29 = "[s] \"病院のお世話になっちゃうよ……。\""
2004102-30 = "お弁当や冷凍食品は、揚げ物が多くて脂質が高い……？"
2004102-31 = "ビタミンや食物繊維の摂取が必要なのは理解しているわ。"
2004102-32 = "けれど、前者はサプリで補える。"
2004102-33 = "他は……。"
2004102-34 = "……問題になるほどじゃないわ。"
2004102-35 = "[s] \"問題あるよ……。\""
2004102-36 = "食物繊維が影響する範疇はそこまで大きくないわ。#nサプリで必須栄養素は補えているもの……。"
2004102-37 = "……いえ、正直に言うと料理が苦手なの。"
2004102-38 = "料理機能を搭載したアバンギャルド君を発明すれば解決できる、と……？"
2004102-39 = "それは……。"
2004102-40 = "[s] \"……ん？\""
2004102-44 = "……難しいわ。"
2004102-48 = "[ns3] \"大丈夫！\"\n[ns4] \"一緒にあそこのスーパーに行こう！\""
2004102-51 = "そっちは割引率が低いわ。#n非合理的な選択よ。"
2004102-52 = "[s] \"今日は私が出すから！\""
2004102-53 = "わ、分かったわ……。"
2004102-55 = "（リオの手を握ってスーパーに向かった）"
2004102-58 = "……先生、その野菜は？#nフラクタル構造ね……ハウスドルフ次元は2.7かしら？"
2004102-59 = "カリフラワーと言うの？#n奇怪な形ね……茹でるとジャガイモの味になるだなんて、不思議だわ。"
2004102-64 = "ニンジン、玉ねぎ、それからトマト……これくらいなら、私でも分かるわ。"
2004102-65 = "……ま、待ってちょうだい。#nお肉、買いすぎではなくて？"
2004102-67 = "（料理に詳しいわけじゃないため、インターネットの力を借りつつ……）"
2004102-68 = "（こうして、ご飯の食材を買っていった）"
2004102-70 = "……。"
2004102-71 = "なるほど、タンパク質とビタミンを中心にしているのね。#nこれなら、炭水化物が占める割合を抑えられるわ。"
2004102-72 = "それで、この後はどうするのかしら？"
2004102-73 = "[s] \"シャーレで、ご飯を作ってあげるよ。\""
2004102-74 = "貴方が料理上手だなんて、聞いたことないのだけれど……。"
2004102-75 = "……そう、インターネットで調べたレシピをコピーするのね。"
2004102-76 = "たしかに、非合理的な感覚で料理をするよりは良いと思うわ。"
2004102-77 = "……でも、本当に大丈夫かしら？"
2004102-78 = "[s] \"生徒に心配されてる……。\""
2004102-80 = "（またもや遠回りをして、シャーレに戻った）"
2004102-84 = "[ns] \"リオは休んでて、私が作るから。\""
2004102-85 = "え、ええ。"
2004102-94 = "シチューね。"
2004102-95 = "これなら私でも作れるんじゃないか……？#nそう、かしら……。"
2004102-96 = "……ありがとう。"
2004102-97 = "さっそく頂くわ。"
2004102-102 = "（無言でシチューを食べ進めた）"
2004102-104 = "なんだか……。"
2004102-105 = "[ns] \"な、何か……？\""
2004102-106 = "不味くはないのだけれど――"
2004102-107 = "特段、美味しくもないわね。"
2004102-108 = "[s] \"そうだよね……。\""
2004102-109 = "……でも。"
2004102-110 = "どうしてかしら。"
2004102-117 = "胸が温かくなる……そんな味だったわ。"
