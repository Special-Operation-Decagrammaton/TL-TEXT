[translation]
1008502-1 = "trabalhador nômade"

1008502-2 = "Subúrbios do Milênio/Parque Florestal"

1008502-3 = "(Depois de ser contactado por Halle, visitei um parque florestal perto do Millennium)"

1008502-10 = "Ah, professora. Por aqui."

1008502-11 = "Então, vamos trabalhar olhando a bela paisagem de hoje."

1008502-12 = "Preciso fazer alguns preparativos, então aguarde um momento."

1008502-13 = "Acabará em breve."

1008502-14 = "[s] \"Preparação...?\""

1008502-15 = "Sim. Você precisa se preparar para trabalhar em um computador?"

1008502-16 = "Não sei se existe linha gratuita, então use um roteador móvel..."

1008502-17 = "Uma fonte de energia portátil que pode carregar rapidamente..."

1008502-18 = "Há também uma caixa térmica para manter as bebidas energéticas geladas."

1008502-19 = "[s] \"Você trouxe muitas coisas.\""

1008502-20 = "Isso mesmo. Programar requer pensamento lógico...#nPara se concentrar, você precisa criar um ambiente."

1008502-21 = "Não seria um desperdício se você tivesse uma ideia, mas não conseguisse concretizá-la por causa do meio ambiente?"

1008502-22 = "...Nem é preciso mencionar Enadori."

1008502-23 = "Na verdade eu estava planejando trazer monitor e teclado, mas...#nComo esperado, não pude trazer mais nada..."

1008502-27 = "[ns] (Este é um trabalho nômade...)"

1008502-31 = "Ufa... sentir o vento clareia minha cabeça."

1008502-32 = "Afinal, foi bom sair."

1008502-36 = "...Bem, então vamos começar."

1008502-44 = "(depois de um tempo......)"

1008502-49 = "...Hum."

1008502-50 = "É duro..."

1008502-51 = "[s] \"O que há de errado?\""

1008502-52 = "Posso trabalhar, mas..."

1008502-53 = "Estou usando roupas grossas, então minhas roupas atrapalham..."

1008502-54 = "Mas não posso tirar com esse tempo frio...#nUgh, não era isso que eu esperava."

1008502-55 = "Além disso, esta cadeira de acampamento... minhas costas doem depois de ficar sentado por muito tempo..."

1008502-56 = "[s1] \"Você gostaria de fazer alguns alongamentos leves?\"\n[s2] \"Já que estamos lá fora, por que você não faz uma pausa?\""

1008502-59 = "...Ok, só um pouco."

1008502-63 = "Hmm... o tempo está bom hoje e a paisagem é muito bonita."

1008502-64 = "Mas enquanto estou trabalhando, estou constantemente olhando para o monitor...#nNão importa o quão bonito seja o cenário, isso não significa que eu vim para fora..."

1008502-66 = "(Depois de mexer um pouco o corpo, Hare voltou ao trabalho...)"

1008502-71 = "...Finalmente acabou."

1008502-72 = "Eu terminei por hoje."

1008502-73 = "[s] \"Obrigado pelo seu trabalho duro!\""

1008502-74 = "Obrigado, professor, por passar seu dia especial de folga comigo."

1008502-75 = "Embora fosse um ambiente desconhecido... acho que fui mais eficiente do que o normal porque consegui me concentrar na tarefa em questão."

1008502-76 = "Valeu a pena o esforço para trazer o equipamento."

1008502-77 = "Depois disso, se você sobrescrever os dados na nuvem..."

1008502-83 = "...Huh?"

1008502-89 = "<Erro de conexão do servidor. Verifique o ambiente de rede>"

1008502-90 = "Ugh... por que há um erro..."

1008502-95 = "<Erro de conexão do servidor. Verifique o ambiente de rede>"

1008502-99 = "<Conexão do servidor>"

1008502-106 = "<---Sincronização concluída>"

1008502-107 = "Ótimo... pensei que a linha estava desligada."

1008502-111 = "...Eh?"

1008502-112 = "O que é isso...? #nO código em que eu estava trabalhando agora há pouco..."

1008502-116 = "Sem chance..."

1008502-123 = "[ns] \"O que aconteceu?\""

1008502-124 = "... Foi revertido."

1008502-125 = "サーバーがデータを作業前のバージョンに上書きしちゃったみたい……"
1008502-126 = "Meio dia de trabalho... desperdiçado em um instante..."

1008502-127 = "[s] \"Você não tem mais nenhum backup?\""

1008502-128 = "...Não."

1008502-129 = "O computador que costumo usar tem sistema de backup automático, mas hoje estava editando dados direto na nuvem..."

1008502-130 = "Parece que não tem outro jeito senão recomeçar do começo..."

1008502-131 = "...Se fosse na sala do clube, isso não teria acontecido."

1008502-135 = "Nunca mais trabalhe fora!"

1008502-137 = "(Depois, ele encorajou Hare, que estava deprimida, e a levou para a sala do clube.)"

