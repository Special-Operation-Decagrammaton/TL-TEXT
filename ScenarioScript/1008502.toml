[translation]
1008502-1 = "ノマドワーカー"
1008502-2 = "ミレニアム近郊・森林公園"
1008502-3 = "（ハレから連絡をもらい、ミレニアム近郊の森林公園を訪れた）"
1008502-10 = "あ、先生。こっち。"
1008502-11 = "じゃあ、今日はきれいな景色を眺めながら作業をしようか。"
1008502-12 = "ちょっと準備が必要だから……ちょっと待ってて。"
1008502-13 = "もうすぐ終わるから。"
1008502-14 = "[s] \"準備……？\""
1008502-15 = "うん。パソコンで作業するには準備が必要でしょ？"
1008502-16 = "フリーの回線があるのか分からないから、モバイルルーターとか……"
1008502-17 = "高速充電が可能なポータブル電源とか……"
1008502-18 = "それと、エナジードリンクを冷やしておくクーラーボックスも。"
1008502-19 = "[s] \"結構色々持ってきたんだね。\""
1008502-20 = "そりゃあね。プログラミングは論理的な思考が必要とされるし……#n集中するためには環境を整える必要があるの。"
1008502-21 = "せっかくアイデアが浮かんだのに、環境のせいで形にできなかったら、もったいないでしょ？"
1008502-22 = "……エナドリは言うまでもないよね。"
1008502-23 = "本当はモニターとキーボードも持ってくる予定だったけど……#nさすがにこれ以上は持ってこれなくて……"
1008502-27 = "[ns] （これがノマドワーク……）"
1008502-31 = "ふぅ……風を感じると頭がすっきりする。"
1008502-32 = "やっぱり、外に出てきて良かった。"
1008502-36 = "……それじゃ、始めようか。"
1008502-44 = "（しばらくして……）"
1008502-49 = "……うーん。"
1008502-50 = "キツい……"
1008502-51 = "[s] \"どうしたの？\""
1008502-52 = "作業はできるんだけど……"
1008502-53 = "厚着をしてるから、服が邪魔で……"
1008502-54 = "でも、この寒さで脱ぐわけにもいかないし……#nうぅ、思っていたのと違う。"
1008502-55 = "それに、このキャンプ用の椅子……ずっと座ってたら腰が痛くなってきて……"
1008502-56 = "[s1] \"軽くストレッチでもする？\"\n[s2] \"せっかく外に居るんだし、息抜きにどうかな。\""
1008502-59 = "……じゃあ、少しだけ。"
1008502-63 = "んーっ……今日は天気も良くて、本当にいい景色だね。"
1008502-64 = "けど、作業中はモニターをずっと見てるわけで……#nいくら景色が良くても、これじゃあ外に出てきた意味が……"
1008502-66 = "（少し身体を動かしてから、再びハレは作業に戻った……）"
1008502-71 = "……ようやく終わった。"
1008502-72 = "今日の分は完了したよ。"
1008502-73 = "[s] \"お疲れ様！\""
1008502-74 = "こちらこそ、せっかくの休日に付き合ってくれてありがとう、先生。"
1008502-75 = "慣れない環境だったけど……#n目の前の作業に集中できたから、いつもより効率は良かったと思う。"
1008502-76 = "わざわざ機材を持ち込んだ甲斐があったよ。"
1008502-77 = "後はクラウドにデータを上書きすれば……"
1008502-83 = "……あれ？"
1008502-89 = "〈サーバー接続エラー。ネットワーク環境を確認してください＞"
1008502-90 = "うぅ……どうしてエラーが……"
1008502-95 = "〈サーバー接続エラー。ネットワーク環境を確認してください＞"
1008502-99 = "〈サーバー接続エ――＞"
1008502-106 = "〈――同期が完了しました＞"
1008502-107 = "よかった……回線が落ちたかと思ったよ。"
1008502-111 = "……えっ？"
1008502-112 = "なに、これ……？#nさっきまで作業してたコードが……"
1008502-116 = "まさか……"
1008502-123 = "[ns] \"何が起こったの？\""
1008502-124 = "……ロールバックされた。"
1008502-125 = "サーバーがデータを作業前のバージョンに上書きしちゃったみたい……"
1008502-126 = "半日分の作業が……一瞬で水の泡に……"
1008502-127 = "[s] \"バックアップは残ってないの？\""
1008502-128 = "……無い。"
1008502-129 = "普段使ってるパソコンには自動バックアップシステムがあるけど、今日はクラウドのデータを直接編集してたから……"
1008502-130 = "最初からやり直すしか、方法は無いみたい……"
1008502-131 = "……部室だったら、こんな事にはならなかったのに。"
1008502-135 = "もう絶対に外で作業しない！"
1008502-137 = "（その後、落ち込んだハレを励ましながら部室まで送り届けた）"
