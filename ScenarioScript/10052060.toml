[translation]
10052060-1 = "Ketel: A Majestosa Corona Mais Radiante Do Universo"
10052060-2 = "Entrou no área de Ketel."
10052060-3 = "Não sabemos o significado, mas os números da Sefira são 1."
10052060-4 = "Oh... Muito bom, Tó! Alice não sabia disso!"
10052060-5 = "Leu apenas as informações do prenúncio. Carioca, tão bonito quanto."
10052060-6 = "Tokio é muito organizado!"
10052060-7 = "Obrigado. Eu vou massageá-lo."
10052060-8 = "Sim! "
10052060-15 = "Ketel pode ser chamado de o primeiro profeta, mas... "
10052060-16 = "Nós encontramos Ketel muito tempo depois. "
10052060-17 = "Você se lembra? Do local de inundação do deserto."
10052060-18 = "[s] 'Sim. Fui brincar de fantoches.'"
10052060-19 = "Ah, nós estávamos naquela parte. "
10052060-20 = "[s] 'Raramente estava lá também.'"
10052060-21 = "#n Eu também sei sobre isso. #nEu queria ver o Grande Mapa direto, como um criança."
10052060-22 = "Eu também ouvi uma história semelhante."
10052060-23 = "... Eles dois, por acaso, foram vítimas de um rumor tão grande quanto esse?"
10052060-24 = "É Mimí."
10052060-25 = "Isso mesmo... #n Mimí, às vezes não consegue entender as coisas de forma intuitiva."
10052060-26 = "Eu disse apenas o que vi.?"
10052060-27 = "Eimi!?"
10052060-28 = "(本当だったのね……)"
10052060-29 = "Está tudo bem, Hiramizu-sensei! #n Alice também se sente assim antes de lançar o novo jogo. Então, espero que vocês possam resolver isso."
10052060-30 = "S... Só assim? #n Ah, não, eu não estava com tanta excitação aquela vez?"
10052060-31 = "Verificar o 'fenômeno' de Degauramaton, um dos 'símbolos', pode levar a uma solução rápida para os problemas. Espero que isso possa acontecer."
"10052060-32": "Finalmente, achava que tinha acabado, mas agora há outras possibilidades abertas...",
"10052060-33": "Acho que chegamos a esse ponto. Isso é verdade.",
"10052060-34": "Embora eu não pudesse prever isso, deixei de preparar para isso, e foi uma grande injustiça para mim.",
"10052060-35": "O Hiramizu, sem saber que eu tinha a capacidade de fazer previsões...?",
"10052060-36": "#n Of course. While this is true, one of the reasons I study Occultism..."
10052060-37 = "O estado de que não há uma resposta segura para essa área."
10052060-38 = "Então, por que você se sente obrigado a assumir o risco e tomar responsabilidade por isso?"
10052060-39 = "……!"
10052060-40 = "(Você me disse bem, Toki)"
10052060-41 = "Você me disse muito bem, Toki."
10052060-46 = "Aquele... perdão, eu estava falando..."
10052060-47 = "Você vai cair novamente!?"
10052060-48 = "Entendo. Isso é a mais razoável."
10052060-49 = "Sim. É o método estratégico mais eficaz."
10052060-50 = "No nível de terra, atravessar as fuzileiras do Kettel será difícil."
10052060-51 = "Não há preocupação com a segurança durante o descer."
10052060-52 = "E, já que vocês têm experiência em operações de descer antes, não tem problema. "
10052060-53 = "Mas, eu sou um novo membro e ainda estou aprendendo...!"
10052060-54 = "É raro ver Yuzu se manifestando dessa maneira. #n Isso é prova de que ela está realmente preocupada."
10052060-55 = "Mas, os pods usados para descer são refletindo as opiniões dos membros da equipe de desenvolvimento gamemente positivamente."
10052060-56 = "Eu nunca imaginaria que isso aconteceria!"
10052060-57 = "Todos, o momento de descesse. Preparados?"
10052060-58 = "Haaaaa!?"
10052060-59 = "Yuzo, está tudo bem?"
10052060-60 = "Ah, realmente...!"
10052060-61 = "Desculpe, mas você precisa descer no pod."
10052060-62 = "Pod de descida preparado para lançamento. "
10052060-69 = "Então vamos começar. "
10052060-70 = "Primeiro, deixe-me tomar conta disso. "
10052060-72 = "Ministero de Hidrometeorologia e Desenvolvimento Rural, Ministro Momoi. Não me siga."
10052060-73 = "¡Hiiiiiiiii!!!"
10052060-75 = "Despeço-me agora!"
10052060-77 = "Ou... eu preciso de um botão para isso, né?"
10052060-78 = "Anjii-chan... por favor, seja cuidadosa."
10052060-79 = "Eu sou séria!"
"10052060-86": "「きゃぁぁぁああああぁぁぁ――！！！」",
"10052060-87": "(鬼気迫る悲鳴ね……)"
