[translation]
10010110-1 = "Episódio 11; It Serves You Right (1)"
10010110-2 = "U-uuh..."
10010110-3 = "Me desculpem, Sensei, Ui-san."
10010110-4 = "Vocês se esforçaram tanto para me ajudar, e pensar que tudo terminaria assim..."
10010110-5 = "[s1] \"Antecipar o horário do evento...\"\n[s2] \"Por que isso aconteceu de repente?\""
10010110-6 = "O-o que eu faço agora..."
10010110-7 = "O-o que eu faço agora..."
10010110-8 = "Esta cerimônia está cheia de coisas estranhas. Mudanças de planos repentinas..."
10010110-9 = "E-eu nem terminei de restaurar o livro ainda..."
10010110-10 = "Acho que recebi o aviso agora porque, originalmente, eu não deveria participar... Os outros convidados devem ter sido avisados há muito tempo."
10010110-11 = "Além disso... mesmo que a restauração estivesse pronta, já é..."
10010110-20 = "...Se a cerimônia começa em uma hora, os convidados de honra já devem estar sentados no local."
10010110-31 = "Assim que todos os participantes chegarem, o local será fechado e a segurança será reforçada ao redor."
10010110-32 = "Mesmo que o livro estivesse aqui agora, levaria tempo para levá-lo até lá..."
10010110-43 = "E mesmo que eu conseguisse chegar, seria a mesma coisa."
10010110-47 = "Ouvi dizer que a segurança do local ficará a cargo do Comitê de Justiça."
10010110-62 = "É época de patrulhas regulares, então, mesmo que não sejam todos..."
10010110-63 = "Uma irmã comum como eu, tentando trocar o livro secretamente lá... isso é impossível..."
10010110-65 = "Uuh, me perdoe, Sakurako-sama... Desse jeito, na frente de todos..."
10010110-66 = "[s3] \"O Kama Sutra...\"\n[s4] \"T-tem que haver outro jeito...\""
10010110-69 = "Ugh, uuh...!"
10010110-70 = "Me desculpe, eu... por minha causa..."
10010110-71 = "Causei um transtorno terrível não só para a Sakurako-sama, mas para todos..."
10010110-72 = "Tudo isso é culpa minha..."
10010110-73 = "Hinata-san..."
10010110-74 = "..."
10010110-78 = "[ns5] \"...Hinata?\"\n[ns6] \"Será que...\""
10010110-79 = "D-de qualquer forma, preciso evitar o pior cenário..."
10010110-80 = "D-de qualquer forma, preciso evitar o pior cenário..."
10010110-81 = "Se eu for ao local, algo deve ser possível. Vou dar um jeito de passar pela segurança... entrar e impedir a Sakurako-sama..."
10010110-82 = "Pelo menos para dizer a verdade, com minhas próprias palavras..."
10010110-84 = "...Sensei. Muito obrigada por todo o dia de hoje."
10010110-86 = "Embora tenha terminado assim... fiquei muito feliz por ter tido a sua ajuda, Sensei."
10010110-88 = "É verdade que estou cansada, mas também foi divertido."
10010110-90 = "...Muito obrigada mesmo."
10010110-91 = "Ui-san, obrigada também. A restauração daquele livro..."
10010110-92 = "...Não."
10010110-97 = "...Obrigada por ter feito o 'tratamento daquela criança'."
10010110-98 = "...Eh."
10010110-99 = "Se não se importar, por favor, termine. Independentemente da cerimônia, ela continua sendo uma criança preciosa."
10010110-100 = "...Ei."
10010110-101 = "E-espere um pouco, Hinata-san. O que você acabou de..."
10010110-102 = "Desculpe, preciso me apressar."
10010110-103 = "Com licença, vou indo na frente."
10010110-104 = "[s7] \"Hinata, espere.\"\n[s8] \"Eu também tenho responsabilidade, então vamos juntos...\""
10010110-105 = "...Não."
10010110-106 = "...Não."
10010110-107 = "O Sensei me ajudou, mas a responsabilidade ainda é minha."
10010110-108 = "Por favor, deixe-me resolver isso sozinha no final."
10010110-109 = "Eu imploro."
10010110-114 = "[ns] \"……。\""
