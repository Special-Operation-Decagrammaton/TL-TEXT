[translation]
10010110-1 = "第11話;イット・サーヴズ・ユー・ライト（１）"
10010110-2 = "う、うぅ……。"
10010110-3 = "ごめんなさい、先生、ウイさん。"
10010110-4 = "せっかく手伝っていただいたのに、まさかこんなことになるなんて……。"
10010110-5 = "[s1] \"開催時間の前倒しだなんて……。\"\n[s2] \"どうして急にこんなことに……。\""
10010110-6 = "な、何なんですかもう……。"
10010110-7 = "な、何なんですかもう……。"
10010110-8 = "今回の式典、何もかもおかしいこと尽くしです。急な予定の変更だなんて……。"
10010110-9 = "ま、まだ本の復元も、終わっていないのに……。"
10010110-10 = "今このタイミングで連絡が来たのは、私は本来参加しない立場だからかと……他の出席される方には、とっくに連絡が行ってるはずです。"
10010110-11 = "それに……復元が間に合っていたとしても、もう……。"
10010110-20 = "……1時間後には式典が始まるなら、今頃もう会場には来賓の方々が着席されているはずです。"
10010110-31 = "出席者の方が全員揃えば会場は閉鎖され、周辺を警備が固めてしまいます。"
10010110-32 = "もし今ここに本があったとしても、今から現地に運ぶには時間がかかりますし……。"
10010110-43 = "到達できたとしても同じ、です。"
10010110-47 = "会場の警備は、正義実現委員会のみなさんが担当するとお聞きしました。"
10010110-62 = "定期巡回の時期ですから、全員ではないにせよ……。"
10010110-63 = "私みたいな普通のシスターが、そこでこっそり本を入れ替えるなんて……そんなことは……。"
10010110-65 = "うぅ、ごめんなさいサクラコ様……このままでは、みなさんの前で……。"
10010110-66 = "[s3] \"カーマスートラを……。\"\n[s4] \"ど、どうにか、他の手段を……。\""
10010110-69 = "うっ、うぅ……！"
10010110-70 = "ごめんなさい、私が……私のせいで……。"
10010110-71 = "サクラコ様はもちろん、みなさまにとんでもないご迷惑を……。"
10010110-72 = "全ては、私が……。"
10010110-73 = "ヒナタさん……。"
10010110-74 = "……。"
10010110-78 = "[ns5] \"……ヒナタ？\"\n[ns6] \"もしかして……。\""
10010110-79 = "と、とにかく最悪の事態は避けないといけません……。"
10010110-80 = "と、とにかく最悪の事態は避けないといけません……。"
10010110-81 = "会場へ行けば、なにかはできるはずです。警備をどうにかすり抜けて……中に入ってサクラコ様を止めて……。"
10010110-82 = "せめて本当のことを、私の口から……。"
10010110-84 = "……先生。今日一日、本当にありがとうございました。"
10010110-86 = "こんな結果になってしまいましたが……先生に助けていただいて、すごく嬉しかったです。"
10010110-88 = "疲れたのは本当ですが、同時に楽しくもありました。"
10010110-90 = "……本当に、ありがとうございました。"
10010110-91 = "ウイさんも、ありがとうございます。その本の復元――"
10010110-92 = "……いえ。"
10010110-97 = "……「その子の治療」を、してくださって。"
10010110-98 = "……え。"
10010110-99 = "よろしければ、最後までお願いいたします。式典に関係なく、大切な子に変わりはないので。"
10010110-100 = "……あの。"
10010110-101 = "ちょっ、ちょっと待ってくださいヒナタさん。今、何と……"
10010110-102 = "すみません、急ぎますね。"
10010110-103 = "お先に、失礼します。"
10010110-104 = "[s7] \"ヒナタ、待って。\"\n[s8] \"私にも責任はあるから、一緒に……。\""
10010110-105 = "……いえ。"
10010110-106 = "……いえ。"
10010110-107 = "先生は手伝ってくださいましたが、これはやはり私の責任です。"
10010110-108 = "最後はどうか、私にやらせてください。"
10010110-109 = "お願いします。"
10010110-114 = "[ns] \"……。\""
