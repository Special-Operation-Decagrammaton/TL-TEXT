[translation]
1011203-1 = "data do comissário"

1011203-6 = "(Quando terminei o trabalho no Millennium, era quase hora do almoço.)"

1011203-10 = "[ns] \"Meu estômago está...\""

1011203-12 = "[ns] \"...Diminuiu.\""

1011203-16 = "(O que devo comer...)"

1011203-23 = "[ns] \"Vamos até a loja agora.""

1011203-24 = "(Quando você chegar perto...)"

1011203-28 = "[ns] \"Isso é...\""

1011203-38 = "[ns1] \"Olá, Asuna.\"\n[ns2] \"Você decidiu o que comer?\""

1011203-43 = "Ah, professora!"

1011203-44 = "Yahoo!"

1011203-45 = "Foi tão estranho encontrar a professora na loja!"

1011203-46 = "[s] \"Isso é verdade.\""

1011203-47 = "Então, ainda estou pensando no almoço."

1011203-52 = "Isso é pão de melão..."

1011203-56 = "Ou talvez eu devesse experimentar este pão de yakisoba."

1011203-57 = "Não consigo escolher porque os dois parecem deliciosos!"

1011203-58 = "[s] \"Que tal comer os dois?\""

1011203-62 = "Ah, entendo!"

1011203-63 = "Como esperado de você, professor!"

1011203-64 = "Estou preocupado se poderei comer os dois... mas acho que vai ficar tudo bem."

1011203-68 = "Vamos comer juntos, professores!"

1011203-69 = "[s] \"Sim, claro.\""

1011203-71 = "(Comprei pão com Asuna e saí.)"

1011203-76 = "Obrigado, professor, por pagar por mim."

1011203-77 = "[s3] \"Às vezes.\"\n[s4] \"Eu sempre faço o meu melhor.\""

1011203-80 = "Hum, eu entendo! #nEntão, comprarei na próxima!"

1011203-84 = "Ah, vamos comer naquele banco! #nEu uso com frequência."

1011203-93 = "E esse banco?"

1011203-94 = "[s5] \"O sol é bom.\"\n[s6] \"Quase quero manter isso em segredo de todos.""

1011203-97 = "Certo? #nÀs vezes estou apenas sonhando acordado aqui."

1011203-101 = "Ah, isso mesmo."

1011203-104 = "O pão de melão e o pão de yakisoba que minha professora comprou para mim!"

1011203-108 = "Hmm, estou tendo problemas para decidir qual comer primeiro."

1011203-109 = "[s7] \"Pão de melão!\"\n[s8] \"Pão de yakisoba!\""

1011203-112 = "Hehe, eu vou!"

1011203-113 = "Se você tiver um professor, suas preocupações serão resolvidas rapidamente!"

1011203-114 = "Espero poder continuar sendo seu professor para sempre."

1011203-115 = "[s] \"Acho que seria divertido decidir por si mesmo.""

1011203-116 = "Hum..."

1011203-120 = "Talvez sim?"

1011203-121 = "Então, vamos nos revezar comendo cada mordida! #nÉ isso aí!"

1011203-125 = "Eu aceito!"

1011203-131 = "Ahaha, é uma delícia!"

1011203-132 = "É porque estou com o professor?"

1011203-134 = "(No final, Asuna rapidamente ficou cheia...)"

1011203-138 = "(Eu mesmo comi o resto porque foi um desperdício.)"

