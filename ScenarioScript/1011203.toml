[translation]
1011203-1 = "売店デート"
1011203-6 = "（ミレニアムの仕事を終えると、ちょうどお昼の時間だった）"
1011203-10 = "[ns] \"腹が……。\""
1011203-12 = "[ns] \"……減った。\""
1011203-16 = "（何を食べようかな……）"
1011203-23 = "[ns] \"とりあえず売店に行こう。\""
1011203-24 = "（近くまで来ると……）"
1011203-28 = "[ns] \"あれは……。\""
1011203-38 = "[ns1] \"こんにちは、アスナ。\"\n[ns2] \"何を食べるか決めた？\""
1011203-43 = "あ、先生！"
1011203-44 = "やっほー！"
1011203-45 = "先生と売店で会うなんて、何だか不思議な感じ！"
1011203-46 = "[s] \"本当だね。\""
1011203-47 = "それで、お昼まだ悩んでるんだ。"
1011203-52 = "こっちのメロンパンか……。"
1011203-56 = "それとも、こっちの焼きそばパンにしよっかな～って。"
1011203-57 = "両方美味しそうだから選べないよー！"
1011203-58 = "[s] \"二つとも食べるのはどう？\""
1011203-62 = "あ、そっか！"
1011203-63 = "さすがだね、先生！"
1011203-64 = "二つも食べ切れるか心配だけど……たぶん大丈夫大丈夫。"
1011203-68 = "先生も一緒に食べよ！"
1011203-69 = "[s] \"うん、もちろんだよ。\""
1011203-71 = "（アスナと一緒にパンを買い、外に出た）"
1011203-76 = "私の分まで払ってもらっちゃって、ありがとう先生。"
1011203-77 = "[s3] \"たまにはね。\"\n[s4] \"いつも頑張ってるからね。\""
1011203-80 = "うーん、分かった！#nじゃあ、次は私が奢るね！"
1011203-84 = "あ、そこのベンチで食べよ！#nよく使ってるんだ～。"
1011203-93 = "ここのベンチ、どうかな？"
1011203-94 = "[s5] \"日差しが気持ち良いね。\"\n[s6] \"みんなには内緒にしたいくらいだよ。\""
1011203-97 = "でしょ～？#nたまにここでぼーっとしてるんだ。"
1011203-101 = "あ、そうだ。"
1011203-104 = "先生が買ってくれたメロンパンと焼きそばパン！"
1011203-108 = "うーん、どっちから食べるか悩んじゃう。"
1011203-109 = "[s7] \"メロンパン！\"\n[s8] \"焼きそばパン！\""
1011203-112 = "えへへ、そうする！"
1011203-113 = "先生がいると、悩みなんてすぐ解決しちゃうね！"
1011203-114 = "これからも、ずっと先生といられたら良いな～。"
1011203-115 = "[s] \"自分で決めるのも楽しいと思うよ。\""
1011203-116 = "うーん……。"
1011203-120 = "そうかも？"
1011203-121 = "じゃあ、一口ずつ交互に食べよっ！#nそれで決まりね！"
1011203-125 = "いただきまーす！"
1011203-131 = "あははっ、美味しいね！"
1011203-132 = "先生と一緒だからかな？"
1011203-134 = "（結局、アスナはすぐお腹いっぱいになってしまったが……）"
1011203-138 = "（もったいないため、残りは全部自分で食べた）"
