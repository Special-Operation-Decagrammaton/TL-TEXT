[translation]
1000603-1 = "校庭での休憩"
1000603-2 = "ゲヘナ学園・校庭"
1000603-3 = "ゲヘナ学園の校庭で昼寝をしようとしたところで、イオリと遭遇した。"
1000603-4 = "………。"
1000603-5 = "こんなところに横になって何をしてるんだ、先生は……。"
1000603-6 = "[s] \"休んでた。\""
1000603-7 = "休憩なら、休憩室やシャーレの執務室で休めばいいのに。"
1000603-8 = "こんな固くて凸凹した石の床で横になっても、痛いだけだと思うけど。"
1000603-9 = "[s] \"固い石が腰を刺激して、意外と気持ちいいんだよね。\""
1000603-10 = "痛いのが気持ちいいって……。"
1000603-11 = "先生……前から思ったけど、もしかして痛いのが好きなのか？"
1000603-12 = "前に靴で踏まれた時もそうだったし、わざと痛いことを楽しんでるような気が……。"
1000603-13 = "……なんか、気持ち悪い。"
1000603-14 = "[s] \"イオリも一度横になってみたらどう？\""
1000603-15 = "嫌だ。頭がおかしい人だと思われる。"
1000603-16 = "一度横になってみると考えが変わる？"
1000603-17 = "やってないのに判断するのは良くないって？"
1000603-18 = "うーん、確かにそれはそうだけど……。"
1000603-19 = "でもお昼から校庭で横になって昼寝をするなんて、変。"
1000603-20 = "まあ、そこまで言うなら一回ぐらい……。"
1000603-27 = "[s] \"どう？冷たい石が気持ちいいでしょ？\""
1000603-28 = "……固くて痛い……。"
1000603-29 = "やっぱり先生は痛いのを楽しむヘンタイだったんだ……。"
1000603-30 = "気持ち悪い……。"
1000603-32 = "イオリの誤解がさらに深まった……。"
