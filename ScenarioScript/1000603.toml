[translation]
1000603-1 = "Descanso no pátio"
1000603-2 = "Academia Gehenna - Pátio"
1000603-3 = "Enquanto tentava tirar uma soneca no pátio da Academia Gehenna, encontrei a Iori."
1000603-4 = "………。"
1000603-5 = "O que o Sensei está fazendo deitado em um lugar desses…?"
1000603-6 = "[s] \"Estava descansando.\""
1000603-7 = "Se quer descansar, deveria ir para a sala de descanso ou para o seu escritório no Schale."
1000603-8 = "Acho que deitar nesse chão de pedra duro e irregular só vai te deixar com dor."
1000603-9 = "[s] \"A pedra dura estimula a lombar, é surpreendentemente bom.\""
1000603-10 = "Dizer que sentir dor é bom…."
1000603-11 = "Sensei… eu já pensava isso antes, mas será que você gosta de sentir dor?"
1000603-12 = "Foi assim quando você foi pisado pelo meu sapato antes, e tenho a sensação de que você gosta de se machucar de propósito…."
1000603-13 = "……Que nojo."
1000603-14 = "[s] \"Por que você não tenta deitar aqui também, Iori?\""
1000603-15 = "Nem pensar. Vão achar que sou uma maluca."
1000603-16 = "Se você deitar uma vez, vai mudar de ideia?"
1000603-17 = "Diz que não é bom julgar sem tentar?"
1000603-18 = "Hmm, é verdade que você tem um ponto, mas…."
1000603-19 = "Ainda assim, deitar no pátio no meio do dia para tirar uma soneca é estranho."
1000603-20 = "Bem, se você insiste tanto, só uma vez…."
1000603-27 = "[s] \"Como é? A pedra fria é boa, não é?\""
1000603-28 = "……É duro e dói…."
1000603-29 = "Eu sabia, o Sensei é mesmo um pervertido que gosta de sentir dor…."
1000603-30 = "Que nojo…."
1000603-32 = "O mal-entendido da Iori se aprofundou ainda mais…."
