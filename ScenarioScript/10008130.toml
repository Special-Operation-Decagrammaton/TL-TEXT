[translation]
10008130-1 = "第13話;新年に願いを"
10008130-2 = "（新年早々の大騒ぎは、少しずつ落ち着いていき……）"
10008130-6 = "新年一発目の大事件、大吉殿の真実！"
10008130-7 = "そして黒亀組とは何だったのか！"
10008130-8 = "それについて尋ねるため、こうして元旦から精力的に活動しているゲヘナの風紀委員の方に声をかけてみました！"
10008130-12 = "今回の事件について、ご存じのことを教えていただけませんでしょうか！"
10008130-13 = "……え、インタビュー？"
10008130-14 = "いや、私はもう一刻も早く帰って寝たいんだけど……。"
10008130-16 = "（クロノス報道部によって、黒亀組の犯罪の真相はすぐに白日の下へと晒された）"
10008130-17 = "（ゲヘナの風紀委員たちの活躍もあって、黒亀組ボスや構成員は大方捕まり、ほとんど壊滅状態になったらしい）"
10008130-18 = "（そうして、おおよそのことは解決されたのだが……）"
10008130-22 = "いやいやいや、納得いかないんだけど！？"
10008130-23 = "まさか賽銭箱の件が嘘だったとか！それで納得できるかっての！"
10008130-24 = "せっかく新しいヘルメットを買おうと思ったのに！私の淡い夢を返して！"
10008130-28 = "……これ、巫女さんのアルバイトと関係無いと思うんだけど。"
10008130-29 = "[s] \"ごめん、頑張ろう……。\""
10008130-33 = "ああもう、仕方ないわねっ！"
