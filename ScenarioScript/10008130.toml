[translation]
10008130-1 = "Episódio 13: Desejos de Ano Novo"
10008130-2 = "(A confusão logo no início do ano novo começou a se acalmar aos poucos...)"
10008130-6 = "O primeiro grande incidente do ano novo, a verdade sobre o Grande Sortudo!"
10008130-7 = "E o que afinal era o Grupo Kurokame!"
10008130-8 = "Para perguntar sobre isso, abordamos uma integrante do Comitê Disciplinar de Gehenna que está trabalhando arduamente desde o dia de Ano Novo!"
10008130-12 = "Poderia nos contar o que sabe sobre o incidente de hoje?"
10008130-13 = "……Eh, uma entrevista?"
10008130-14 = "Não, eu só quero voltar para casa e dormir o quanto antes..."
10008130-16 = "(Graças ao Departamento de Imprensa de Chronos, a verdade sobre os crimes do Grupo Kurokame foi rapidamente trazida à luz.)"
10008130-17 = "(Com a ajuda das integrantes do Comitê Disciplinar de Gehenna, o chefe e os membros do Grupo Kurokame foram capturados, deixando a organização praticamente destruída.)"
10008130-18 = "(E assim, a maior parte do problema foi resolvida, mas...)"
10008130-22 = "Não, não, não, eu não aceito isso!?"
10008130-23 = "Como assim a história da caixa de oferendas era mentira! Você acha que eu vou aceitar isso?!"
10008130-24 = "Eu estava tão animada para comprar um capacete novo! Devolva o meu sonho!"
10008130-28 = "……Acho que isso não tem nada a ver com o trabalho de meio período como sacerdotisa."
10008130-29 = "[s] \"Desculpe, vamos nos esforçar...\""
10008130-33 = "Ah, chega, não tem jeito mesmo!"
