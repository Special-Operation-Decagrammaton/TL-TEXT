[translation]
10035100-1 = "Episódio 10; Salva-vidas, missão cumprida!"
10035100-3 = "Ué? Sensei? Por que você está aqui?"
10035100-4 = "[s1] \"Chihiro, por que você está aqui?\"\n[s2] \"Não parece que você veio para se divertir, né?\""
10035100-7 = "O Clube de Engenharia causou uma confusão de novo."
10035100-12 = "Ei, Sensei. Que coincidência encontrar você em um lugar como este."
10035100-13 = "Eu gostaria que fosse em uma situação mais tranquila, mas..."
10035100-15 = "Esse uniforme... vocês são do Millennium?"
10035100-16 = "E sobre essa \"confusão\" que você mencionou agora pouco...?"
10035100-17 = "Bem, eu já consigo imaginar o que é."
10035100-23 = "Sou Kanna Ogata, chefe do Departamento de Segurança Pública da Academia Valkyrie."
10035100-24 = "Este jacaré mecânico pertence à Millennium Science School, correto?"
10035100-26 = "Ah... sim, é isso mesmo."
10035100-27 = "Utaha, explique para eles."
10035100-28 = "Sim. Infelizmente, não posso negar os fatos."
10035100-29 = "Este jacaré realmente nasceu do nosso Clube de Engenharia."
10035100-36 = "P-por que vocês criaram uma coisa dessas!?"
10035100-37 = "Por causa disso, muitos cidadãos foram colocados em perigo!"
10035100-39 = "Realmente, não tenho palavras para me defender."
10035100-40 = "Mas, como eu disse antes, o Clube de Engenharia não \"criou\" isso. Ele simplesmente \"nasceu\"."
10035100-41 = "Não dá na mesma?"
10035100-43 = "Não!"
10035100-49 = "Este jacaré mecânico foi originalmente feito para lazer aquático. Mas, por descuido, acabamos incluindo um algoritmo usado para trabalhos de demolição."
10035100-50 = "Então foi por isso que ele estava mirando nas instalações em vez das pessoas..."
10035100-55 = "Não, espere um pouco! Por que um robô de lazer teria capacidade de ataque!?"
10035100-56 = "Não pode me enganar!"
10035100-57 = "Lança-chamas e lançamento de mísseis. Essas funções não são necessárias para um robô de lazer, certo!?"
10035100-62 = "Não tem jeito... é uma questão de romance, entende?"
10035100-67 = "Como é?"
10035100-68 = "De qualquer forma, quando detectamos a anomalia, já era tarde demais..."
10035100-69 = "Tentamos rastreá-lo às pressas, mas não conseguimos encontrá-lo."
10035100-70 = "Felizmente, o registro de atividades dele é enviado para o servidor. Com a ajuda da Chihiro, conseguimos chegar até aqui."
10035100-71 = "No entanto... quem diria que ele estaria causando problemas em um parque aquático."
10035100-72 = "O Clube de Engenharia assumirá total responsabilidade pelos danos causados, então não se preocupe."
10035100-73 = "Sinto muito mesmo..."
10035100-75 = "Viu só?"
10035100-76 = "Não fomos nós os culpados, né!?"
10035100-77 = "Quando for suspeitar de alguém, investigue direito antes!"
10035100-78 = "É por isso que a sua reputação..."
10035100-79 = "Ai, chega! De qualquer forma! Já que a responsável por criar isso está aqui, não podemos resolver aquele mistério de agora pouco?"
10035100-80 = "Mistério...? Ah, é verdade!"
10035100-82 = "Hm? Do que você está falando?"
10035100-83 = "Quando você cruzou o olhar com a chefe Kanna, o jacaré parou por um instante."
10035100-84 = "Pode não ser nada demais, mas fiquei curiosa."
10035100-85 = "Uma parada de emergência, hein..."
10035100-86 = "Interessante. Vamos analisar."
10035100-96 = "Desbloqueando a segurança..."
10035100-100 = "Pronto, consegui."
10035100-101 = "Sim, como esperado da Chi-chan."
10035100-105 = "Certo, este é o registro de atividades mais recente do jacaré. Todos os dados até o momento em que ele quebrou estão aqui."
10035100-106 = "A parada de emergência que vocês mencionaram... é aqui."
10035100-110 = "Código de erro: 4885――#nComportamento de esquiva contra predadores devido ao algoritmo de imitação de instinto biológico."
10035100-111 = "Eh... o que você disse?"
10035100-112 = "Explica de um jeito mais fácil de entender!"
10035100-113 = "……Em resumo."
10035100-117 = "Significa que o crocodilo reconheceu o oponente que enfrentou como um predador superior a ele mesmo."
10035100-118 = "Por isso, parece que ocorreu uma anomalia na lógica de comportamento. Mas..."
10035100-119 = "……Isso é mesmo uma reação ao ver uma \"pessoa\"?"
10035100-125 = "[ns] \"……。\""
10035100-126 = "I-isso é possível!?"
10035100-128 = "O algoritmo de comportamento do meca-crocodilo foi baseado em crocodilos reais, afinal."
10035100-129 = "Se o alvo for alguém que até mesmo crocodilos na natureza reconheceriam como um superpredador, #nnão é estranho que algo assim aconteça……."
10035100-130 = "Não, não, a Chefe é uma pessoa."
10035100-131 = "Quer dizer que, só por ter uma cara assustadora, ela deixou o crocodilo com medo?"
10035100-137 = "……Fufu."
10035100-138 = "Chefe Kanna?"
10035100-139 = "Fufufufu……."
10035100-140 = "Ah, entendi perfeitamente."
10035100-141 = "Chefe…… você está bem?"
10035100-142 = "Não precisa se preocupar, Kirino. #nEu sei melhor do que ninguém que minha aparência causa intimidação."
10035100-143 = "Desta vez foi útil em uma situação especial, mas vou evitar isso no futuro."
10035100-144 = "Não posso assustar os cidadãos. Haa……."
10035100-150 = "Não faça essa cara. Cada pessoa tem seu papel."
10035100-151 = "Para mim, a sala de interrogatório combina mais do que um parque aquático."
10035100-152 = "Isso foi cientificamente comprovado. Sinto-me aliviada."
10035100-153 = "……."
10035100-154 = "Cão raivoso, a pessoa com a expressão sombria aqui é você, não é?"
10035100-155 = "Fique quieta."
10035100-156 = "Bem, vamos nos preparar para retirar."
10035100-157 = "Eu vou limpar os destroços do meca-crocodilo quebrado. #nKirino e Fubuki, ajudem os visitantes――"
10035100-162 = "A-ah, com licença……!"
10035100-167 = "Ué?"
10035100-168 = "Hm? Não é aquela criança que a Chefe salvou agora há pouco? O que houve?"
10035100-172 = "Moça salva-vidas……."
10035100-175 = "Sim……?"
10035100-176 = "Está falando de mim?"
10035100-177 = "(Acena com a cabeça)"
10035100-178 = "O que houve? Por acaso você caiu e se machucou por minha causa?"
10035100-179 = "(Nega com a cabeça)"
10035100-180 = "Então o que é?"
10035100-181 = "É que……."
10035100-186 = "O-obrigada por me salvar!"
10035100-190 = "A-aquele crocodilo era tão assustador……."
10035100-191 = "M-minhas pernas nem conseguiam se mexer……."
10035100-192 = "Mas você me salvou! #nEntão…… é, obrigada! Moça!"
10035100-196 = "Ah."
10035100-201 = "Fico feliz que você esteja bem."
10035100-202 = "Meu trabalho é proteger os cidadãos, afinal."
10035100-211 = "Sensei? O que você está fazendo agora……?"
10035100-212 = "[s3] \"Eu queria provar para a Kanna.\"\n[s4] \"Eu registrei o sorriso da Kanna.\""
10035100-215 = "O que isso significa……?"
10035100-216 = "[s] \"Ei, olhe bem.\""
10035100-217 = "Bem..."
10035100-222 = "[ns] \"E então? Ficou uma boa foto, não ficou?\""
10035100-224 = "[ns5] \"Kanna, você tem talento para ser salva-vidas.\"\n[ns6] \"Kanna, você tem talento para o Departamento de Segurança Pública.\""
10035100-229 = "……Hehe."
10035100-230 = "Sensei, você está dizendo essas coisas de novo."
10035100-231 = "Como eu disse antes, não sirvo para lidar com os cidadãos."
10035100-232 = "Hoje também, só cometi erros."
10035100-233 = "Mas..."
10035100-234 = "Se for possível..."
10035100-235 = "A missão de salva-vidas, eu gostaria de... continuar por mais um pouco."
10035100-236 = "Passei a pensar assim."
