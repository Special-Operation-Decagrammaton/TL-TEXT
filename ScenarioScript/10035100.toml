[translation]
10035100-1 = "第10話;ライフセーバー、任務完了！"
10035100-3 = "あれ？先生？どうしてここに？"
10035100-4 = "[s1] \"チヒロこそ、どうしたの？\"\n[s2] \"遊びに来た感じじゃなさそうだけど？\""
10035100-7 = "またエンジニア部が騒ぎを起こしてさ。"
10035100-12 = "やあ、先生。こんなところで会うなんて、奇遇だね。"
10035100-13 = "もっと穏やかな状況だったら、良かったんだが……。"
10035100-15 = "その制服……ミレニアムの方々ですか？"
10035100-16 = "それに、さっき言っていた「騒ぎ」とは……？"
10035100-17 = "まぁ、大体想像つくけどね。"
10035100-23 = "ヴァルキューレ警察学校の公安局長、[ruby=おがた]尾刃[/ruby]カンナだ。"
10035100-24 = "このメカワニは、ミレニアムサイエンススクールのもので間違いないか？"
10035100-26 = "はぁ……うん、そうだよ。"
10035100-27 = "ウタハ、あんたが説明して。"
10035100-28 = "ああ。残念だが、事実を否定することはできない。"
10035100-29 = "このワニは確かに、私たちエンジニア部から生まれたものだ。"
10035100-36 = "ど、どうしてこんな物を作ったんです！？"
10035100-37 = "これのせいで、たくさんの市民が危険にさらされたんですよ！"
10035100-39 = "本当に返す言葉もない。"
10035100-40 = "だが、さっきも言った通り、これはエンジニア部が「作った」わけじゃない。#n「生まれた」ものなんだ。"
10035100-41 = "どっちも同じじゃん？"
10035100-43 = "違う！"
10035100-49 = "このメカワニは元々、海洋レジャー用に制作していたものだった。#nそれなのに、うっかり解体工事に使うアルゴリズムが入ってしまってね。"
10035100-50 = "だから、人ではなく施設を狙って破壊していたんですね……。"
10035100-55 = "いえ、待ってください！#nどうしてレジャー用途のロボットに攻撃性能が備わっているんですか！？"
10035100-56 = "本官の目は誤魔化せませんよ！"
10035100-57 = "火炎放射に、ミサイル発射。#nレジャーロボットにそんな機能は不要でしょう！？"
10035100-62 = "仕方ないさ……ロマンだからね。"
10035100-67 = "はい？"
10035100-68 = "とにかく、私たちが異常を検知した時には、すでに手遅れだったわけだ……。"
10035100-69 = "急いで行方を探したけれど、見つからなくてね。"
10035100-70 = "幸いなことに、この子の行動ログはすべてサーバに送信されている。#nそこでチヒロの助力を得て、ここまでたどり着くことができたというわけさ。"
10035100-71 = "しかし……、まさかウォーターパークで暴れていたとはね。"
10035100-72 = "今回の損害については、すべてエンジニア部が責任を負うから安心して。"
10035100-73 = "本当にすまなかった……。"
10035100-75 = "ほら、見なさいよ！"
10035100-76 = "犯人はうちらじゃないでしょ！？"
10035100-77 = "人を疑う時は、ちゃんと調べてからにしなさい！"
10035100-78 = "だから、日頃の行いが……"
10035100-79 = "もう！とにかく！#nこれを作った張本人も来てることだし、さっきの謎も解けるんじゃない？"
10035100-80 = "謎……？あ、確かにそうですね！"
10035100-82 = "うん？なんのことだい？"
10035100-83 = "カンナ局長と目が合った時、ワニの動きが一瞬止まったんだよね。"
10035100-84 = "大したことじゃないかもしれないけど、ちょっと気になってさー。"
10035100-85 = "異常停止か……。"
10035100-86 = "興味深い話だ。解析してみよう。"
10035100-96 = "セキュリティを解除して……"
10035100-100 = "はい、できたよ。"
10035100-101 = "うん、さすがチーちゃん。"
10035100-105 = "よし、これがワニの最新の行動ログだ。#n壊れる直前までの、すべてのデータが記録されている。"
10035100-106 = "君たちの言っていたワニの異常停止は……ここか。"
10035100-110 = "エラーコード：4885――#n生物本能模倣アルゴリズムによる捕食者への回避行動。"
10035100-111 = "え……なんて言ったの？"
10035100-112 = "もっと分かりやすく説明してよ！"
10035100-113 = "……つまり。"
10035100-117 = "ワニが対峙した相手を、自分より上位の捕食者だと認識したってことだね。"
10035100-118 = "だから、行動ロジックに異常が発生したみたい。でも……。"
10035100-119 = "……これって、本当に「人」を見た反応？"
10035100-125 = "[ns] \"……。\""
10035100-126 = "そ、そんなことがあり得るんですか！？"
10035100-128 = "メカワニの行動アルゴリズムは、動物のワニを参考にしたからね。"
10035100-129 = "自然界のワニからも上位捕食者と認識されるような対象なら、#nこのようなことが起きてもおかしくはない……。"
10035100-130 = "いやいや、局長は人じゃん。"
10035100-131 = "つまりさ、顔が怖いだけで、ワニをビビらせたってこと？"
10035100-137 = "……ふふ。"
10035100-138 = "カンナ局長？"
10035100-139 = "ふふふふっ……。"
10035100-140 = "ああ、よくわかった。"
10035100-141 = "局長……大丈夫ですか？"
10035100-142 = "気遣いは不要だ、キリノ。#n私の外見が威圧感を与えてしまうことは、私が一番よくわかっている。"
10035100-143 = "今回は特殊な状況下で役に立ったが、次は控えよう。"
10035100-144 = "市民を怖がらせてはいけないからな。はあ……。"
10035100-150 = "そんな顔をするな。人にはそれぞれ役割がある。"
10035100-151 = "私にはウォーターパークより、取調室の方が合っている。"
10035100-152 = "それが科学的にも証明されたんだ。すっきりしたよ。"
10035100-153 = "……。"
10035100-154 = "狂犬、表情が暗いのはあんたの方でしょ。"
10035100-155 = "静かにしていろ。"
10035100-156 = "さて、撤収の準備をしよう。"
10035100-157 = "私は壊れたメカワニの残骸を片付ける。#nキリノとフブキは利用客のサポートを――"
10035100-162 = "あ、あの……！"
10035100-167 = "あれ？"
10035100-168 = "ん？さっき局長に助けられた子供じゃん？どしたの？"
10035100-172 = "ライフセーバーのお姉ちゃん……。"
10035100-175 = "うん……？"
10035100-176 = "それは、私のことか？"
10035100-177 = "（こくこく）"
10035100-178 = "どうした？まさか、私のせいで転んで怪我でもしたか？"
10035100-179 = "（ふるふる）"
10035100-180 = "それならなんだ？"
10035100-181 = "その……。"
10035100-186 = "た、助けてくれて、ありがとう！"
10035100-190 = "さ、さっきはワニさんが、怖くて……。"
10035100-191 = "あ、足も動かなくなっちゃって……。"
10035100-192 = "でも、お姉ちゃんが助けてくれたから！#nだから……その、ありがとう！お姉ちゃん！"
10035100-196 = "ああ。"
10035100-201 = "キミが無事で良かった。"
10035100-202 = "私の仕事は、市民を守ることだからな。"
10035100-211 = "先生？今、何を……？"
10035100-212 = "[s3] \"カンナに証明しようと思って。\"\n[s4] \"カンナの笑顔を記録したよ。\""
10035100-215 = "どういう意味です……？"
10035100-216 = "[s] \"ほら、よく見て。\""
10035100-217 = "えっと……。"
10035100-222 = "[ns] \"どう？よく撮れてるでしょ？\""
10035100-224 = "[ns5] \"カンナにはライフセーバーの素質があるよ。\"\n[ns6] \"カンナにも生活安全局の素質があるよ。\""
10035100-229 = "……ふふ。"
10035100-230 = "先生、またそんなことを仰るのですね。"
10035100-231 = "さっきも言いましたが、私に市民対応は向いていません。"
10035100-232 = "今日も至らないことばかりでした。"
10035100-233 = "ですが……。"
10035100-234 = "もし、できるのであれば……。"
10035100-235 = "ライフセーバーの任務、もう少し……続けてみたいです。"
10035100-236 = "そう、思えるようになりました。"
