[translation]
1012505-1 = "\tCarga de mana"
1012505-6 = "Bom dia, mestre."
1012505-7 = "Bem, já faz um tempo que não saio da academia assim."
1012505-8 = "Uau... isso é divertido~"
1012505-9 = "[s] \"Está tudo bem...?\""
1012505-10 = "Não há necessidade de se preocupar."
1012505-11 = "Mesmo com isso, estou muito animado atualmente."
1012505-12 = "No entanto, quando fecho os olhos... o trabalho que criei na sala de exames... #nA aparição de um monstro maligno  vem à mente..."
1012505-16 = "Aaah! Lembrei-me de novo! Esta é a hora de usar a magia do esquecimento...!"
1012505-23 = "[ns] \"Ok, eu entendo, então pare de me bater na cabeça com livros!\"\"\n1012505-26 = \"Ufa….\"\n1012505-27 = \"Afinal, deveríamos usar outra magia para quebrar essa situação.\"\n1012505-28 = \"Mestre, como posso restaurar essa mana esgotada...?\"\n1012505-29 = \"[s] \"Eu conheço magia de recuperação que cura almas famintas.\"\"\n1012505-30 = \"Oh, isso parece tão atraente.\"\n1012505-31 = \"Eu adoraria experimentar!\"\n1012505-39 = \"Ei, que lugar é esse...?\"\n1012505-40 = \"[s1] \"Esta é a loja de ramen que eu sempre venho.\"\n[s2] \"É perto do meu escritório e o sabor é perfeito!\""

1012505-43 = "Um lugar que o mestre visita frequentemente..."
1012505-44 = "……Eu vejo. #nVocê pode dizer apenas pelo resíduo de mana fazendo cócegas na ponta do seu nariz."
1012505-45 = "Tenho certeza que você pode curar sua alma faminta aqui."
1012505-46 = "Além disso, eu não estava apenas com fome, mas também com fome...#nAh, tem um lugar vazio ali."
1012505-53 = "Hum... você tem alguma recomendação para o mestre?"
1012505-54 = "[s] \"Eu me pergunto se é tonkotsu.\""
1012505-55 = "Hmm... Mana é extraída ao longo do tempo de ossos que possuem poder mágico oculto."
1012505-56 = "Pode-se realmente dizer que é o copo  perfeito para acalmar uma alma faminta."
1012505-57 = "Agora siga as orientações do mestre... vamos fazer tonkotsu ramen!"
1012505-59 = "(Enchi minha alma faminta com Eli)"
1012505-69 = "Suspiro… posso sentir todo o meu corpo sendo preenchido com mana."
1012505-70 = "[s3] \"Depois de recuperar seu poder mágico, vamos dar uma olhada na biblioteca a seguir.\"\n[s4] \"Tenho certeza de que há muitos livros de ocultismo com os quais Eli ficaria feliz.\""
1012505-73 = "Ah, é uma biblioteca?"
1012505-74 = "Coisas relacionadas ao ocultismo também são boas, mas estou curioso sobre os livros que são proibidos na minha escola."
1012505-75 = "Se eu ler aquele livro proibido, minha magia evoluirá ainda mais. Nyufufu."
1012505-76 = "[s] \"Uau, que tipo de livro é o livro proibido de Wild Hunt?\""
1012505-77 = "Por exemplo, ``Introdução ao trabalho com cordas que você também pode fazer.''"
1012505-78 = "Ao aprender várias maneiras de dar nós, você terá mais maneiras de escapar dos inspetores do dormitório em caso de emergência."
1012505-79 = "[s] \"De jeito nenhum, é por isso que foi banido...?\""
1012505-80 = "lar. Pelo que ouvi, parece haver outro motivo..."
1012505-81 = "De alguma forma, um artista performático se amarrou e andou pela cidade usando o livro como referência."
1012505-82 = "Aparentemente foi “um método de vinculação que viola a ordem pública e a moral”, mas não conheço os detalhes."
1012505-83 = "Você sabe o que é um mestre?"
1012505-84 = "[s] \"Eu não entendo...\""
1012505-85 = "Bem, se você realmente ler o livro, você entenderá."
1012505-86 = "Nyufufufu, a diversão aumentou."
1012505-88 = "(Depois, Eli e eu visitamos a biblioteca e lemos vários livros.)"
1012505-97 = "(Ele continuou a visitar vários lugares e recuperar a mana esgotada de Eri.)"
1012505-120 = "Huh... eu joguei muito hoje."
1012505-121 = "Muito obrigado. Foi muito divertido."
1012505-122 = "[s] \"Eu também me diverti graças ao Eli.\""
1012505-123 = "Momentos como este... quero algo para comemorar."
1012505-124 = "Mestre, se não se importa, gostaria de tirar uma foto comigo?"
1012505-125 = "[s] \"Gosto!\""
1012505-130 = "Nyufufu, então vou tirar a foto. Olhe aqui--"
1012505-131 = "Eu-Nino-san!"
1012505-136 = "Agora então...."
1012505-137 = "Ah, eu consegui uma boa chance!"
1012505-138 = "……."
1012505-139 = "Mais uma vez, a fotografia é uma coisa muito útil."
1012505-140 = "Com o toque de um botão, você pode capturar todo o cenário à sua frente."
1012505-141 = "Mas é por isso...ouço dizer que muitos pintores se desesperaram com o aparecimento deste formidável inimigo chamado #nphotography."
1012505-142 = "Se você quiser capturar o que está bem na sua frente, uma foto leva apenas alguns instantes. Mesmo sendo #n, às vezes pode receber mais elogios do que a imagem que você tanto trabalhou para desenhar."
1012505-143 = "Mas os pintores não desistiram."
1012505-144 = "O ``cenário mental'' e os ``sentimentos'' que somente cada artista podia ver foram capturados em #n tela."
1012505-145 = "Tenho certeza de que as pessoas na época pensavam que a força das pinturas #n era que elas representavam o “invisível”."
1012505-146 = "Pude tocar o coração desses pintores através do meu trabalho...#nEu também queria pintar coisas que não podem ser vistas."
1012505-147 = "[s] \"Esse sentimento não mudou, certo?\""
1012505-148 = "Claro! #nEu amo pintar tanto quanto amo o ocultismo!"
1012505-149 = "Por favor, continue assistindo! #nTenho certeza de que um dia me tornarei um pintor famoso - #nVou garantir que minhas pinturas sejam exibidas nas casas de todos!"
1012505-150 = "[s5] \"Quero decorá-lo agora mesmo.\"\n[s6] \"Posso fazer uma reserva?\"\"\n1012505-153 = \"O que, agora? ?\"\n1012505-154 = \"Bem, isso é um pouco difícil... mas por favor espere! #nCom certeza vou te dar uma foto maravilhosa algum dia!\"\n1012505-155 = \"...Sim, não consigo ficar parado em um lugar como este.\"\n1012505-156 = \"Obrigado, Mestre. Graças a você, consegui lembrar minhas intenções originais.\"\n1012505-157 = \"Farei o meu melhor! Também para o mestre que acredita em mim!\"\n1012505-158 = \"[s] \"Sim! Estou torcendo por você!\""

1012505-159 = "Ehehe…."
1012505-160 = "É muito estranho."
1012505-161 = "Eu estava me sentindo deprimido até conhecer o Mestre hoje, mas agora me sinto com muito mais energia..."
1012505-162 = "Afinal, você é um mestre... você não domina a magia Kotodama?"
1012505-164 = "(Conversei muito sobre meus sonhos com Eli, cuja expressão se iluminou completamente.)"
1012505-165 = "(Depois disso, eu a levei para a academia antes do fim da noite.)"
