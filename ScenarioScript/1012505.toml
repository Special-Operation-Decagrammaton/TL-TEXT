[translation]
1012505-1 = "\tマナチャージ"
1012505-6 = "ごきげんよう、マスター。"
1012505-7 = "いやはや、こうして学院の外に出るのも久しぶりですね。"
1012505-8 = "わぁ……楽し～なぁ～"
1012505-9 = "[s] \"だ、大丈夫……？\""
1012505-10 = "ご心配には及びません。"
1012505-11 = "これでも、最近の私にしては結構テンションが高いんですよ？"
1012505-12 = "ですが目を閉じると……試験会場で私が生み出してしまった課題作品……#nもとい邪悪[ruby=クリーチャー]な魔物の[/ruby]姿が浮かんで……。"
1012505-16 = "あぁぁっ！また思い出してしまいました！ こういうときこそ忘却魔法を……！"
1012505-23 = "[ns] \"わ、わかったから、本で頭を叩くのはやめよう！\""
1012505-26 = "ふぅぅぅ……。"
1012505-27 = "やはり、別の魔法でこの状況を打破すべきですね。"
1012505-28 = "マスター、どうすればこの枯渇したマナを回復できるのでしょう……？"
1012505-29 = "[s] \"空腹の魂を癒やす、回復魔法なら知ってるよ。\""
1012505-30 = "おお、なんとも魅力的な響きですね。"
1012505-31 = "ぜひ試してみたいです！"
1012505-39 = "ほお、ここは……？"
1012505-40 = "[s1] \"いつも来てるラーメン屋だよ。\"\n[s2] \"オフィスから近くて、味もバッチリ！\""
1012505-43 = "マスターがよく訪れる場所……。"
1012505-44 = "……なるほど。#n鼻先をくすぐるマナの[ruby=ざんし]残滓[/ruby]だけでわかります。"
1012505-45 = "ここなら確実に、飢えた魂を癒やせそうですね。"
1012505-46 = "それに、魂だけでなくお腹も空いていましたので……#nおっ、あちらの席が空いていますね。"
1012505-53 = "えっと……マスターのオススメはありますか？"
1012505-54 = "[s] \"とんこつかな。\""
1012505-55 = "ふむ……魔力を秘めた骨から、時間を掛けてマナを抽出したものですね。"
1012505-56 = "まさに、飢えた魂を癒やすのにふさわしい[ruby=まほう]一杯[/ruby]と言えるでしょう。"
1012505-57 = "では、マスターの導きに従い……とんこつラーメンにします！"
1012505-59 = "（エリと一緒に空腹の魂を満たしていった）"
1012505-69 = "はぁ……全身にマナが満ちていくのを感じます。"
1012505-70 = "[s3] \"魔力が回復したなら、次は図書館でも回ってみようか。\"\n[s4] \"エリの喜びそうなオカルト本がたくさんあるんじゃないかな。\""
1012505-73 = "おおっ、図書館ですか。"
1012505-74 = "オカルト関連もいいですが、うちの学院で禁書指定されている本が気になります。"
1012505-75 = "その禁書を読めば、私の魔法もさらに進化することでしょう。にゅふふ。"
1012505-76 = "[s] \"ワ、ワイルドハントの禁書って……どんな本なの？\""
1012505-77 = "例えば、「あなたにもできるロープワーク入門」です。"
1012505-78 = "多様な結び方を学ぶことで、#nいざというときに寮監隊の追跡を逃れる[ruby=すべ]術[/ruby]が増えますからね。"
1012505-79 = "[s] \"まさか、そんなことで禁書に……？\""
1012505-80 = "いえ。聞いたところによると、別の理由みたいで……。"
1012505-81 = "なんでも、#nあるパフォーマンスアーティストがその本を参考に自分を縛り、街を歩いたとか。"
1012505-82 = "「公序良俗に反する縛り方」……だったそうですが、詳細はよくわかりません。"
1012505-83 = "マスターは何かご存知だったりしますか？"
1012505-84 = "[s] \"ちょっとわからないかな……。\""
1012505-85 = "まあ、実際に本を読めばわかるはずです。"
1012505-86 = "にゅふふふ、楽しみが増えましたね。"
1012505-88 = "（その後、エリと一緒に図書館を訪れ、さまざまな本を読みあさった）"
1012505-97 = "（そのまま色々な場所を巡り、エリの枯渇したマナを回復していった）"
1012505-120 = "ふぁぁ……今日はたっぷり遊びましたね。"
1012505-121 = "本当にありがとうございました。とっても楽しかったです。"
1012505-122 = "[s] \"私もエリのおかげで楽しかったよ。\""
1012505-123 = "こういう瞬間は……何か記念になるものが欲しくなります。"
1012505-124 = "マスター、よければご一緒に写真でも撮りませんか？"
1012505-125 = "[s] \"いいね！\""
1012505-130 = "にゅふふ、それでは私が撮りますね。こちらを見て――"
1012505-131 = "いち、にの、さんっ！"
1012505-136 = "さてさて……。"
1012505-137 = "おおっ、よく撮れました！"
1012505-138 = "……。"
1012505-139 = "あらためて、写真とはすごく便利なものですよね。"
1012505-140 = "ボタンひとつで、目の前の景色をそっくりそのまま切り取れるんですから。"
1012505-141 = "でも、だからこそ……#n写真という強敵の登場に、多くの画家たちが絶望したとも聞きます。"
1012505-142 = "目の前のものを映すなら、写真は一瞬。#nなのに、苦労して描いた絵よりも評価が集まることだってありますから。"
1012505-143 = "でも、画家たちは諦めなかった。"
1012505-144 = "それぞれの画家だけに見えている「心の風景」や「感覚」を、#nキャンバスに写し出していったんです。"
1012505-145 = "きっと、当時の方々は「見えないもの」を描き出すことこそが、#n絵の強みだと考えたのでしょう。"
1012505-146 = "そんな画家達の心に作品を通して触れ……#n私も、見えないものを描きたいと思ったんです。"
1012505-147 = "[s] \"その気持ちは、今も変わってないんだよね？\""
1012505-148 = "もちろんですとも！#n私、オカルトと同じくらい絵も好きですから！"
1012505-149 = "見ていてくださいね！#nいつかきっと高名な画家になって――#n私の絵がみんなの家に飾られるようにしてみせます！"
1012505-150 = "[s5] \"私は今すぐにでも飾りたいけど。\"\n[s6] \"予約って、できる？\""
1012505-153 = "えっ、今すぐですか！？"
1012505-154 = "そ、それはちょっと難しいですけど……待っててください！#nいつか絶対、素敵な絵をプレゼントします！"
1012505-155 = "……うん、こんなところで立ち止まっていられませんよね。"
1012505-156 = "ありがとうございます、マスター。おかげで初心を思い出せました。"
1012505-157 = "がんばります！私を信じてくれるマスターのためにも！"
1012505-158 = "[s] \"うん！応援してるよ！\""
1012505-159 = "えへへ……。"
1012505-160 = "本当に、不思議です。"
1012505-161 = "今日、マスターに会うまではずっと気持ちが沈んでいたのに、#n今はこんなに元気が湧いて――"
1012505-162 = "やっぱりマスター……言霊魔法を会得されていませんか？"
1012505-164 = "（表情がすっかり明るくなったエリと、夢の話をたくさんした）"
1012505-165 = "（その後、夜が更ける前に彼女を学院まで送り届けた）"
