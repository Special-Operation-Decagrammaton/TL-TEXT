[translation]
1004602-1 = "イズナと一緒にスイカ割り！"
1004602-5 = "（そうしてイズナに呼ばれ、熱い日差しが降り注ぐ夏の海辺へと向かった）"
1004602-10 = "あっ、主殿主殿！こっちです！こっち！"
1004602-11 = "[s] \"イズナ、お待たせ。\""
1004602-12 = "いえ、とんでもありません！"
1004602-13 = "[s1] \"それじゃあ、今日は何をしよっか？\"\n[s2] \"海に適応した忍びになる修行……だっけ？\""
1004602-16 = "はい！せっかくの夏、そして海ですから！"
1004602-17 = "イズナとしても、今しかできない活動をしたいなと！"
1004602-18 = "[s] \"夏といえばやっぱり……水泳とか？\""
1004602-19 = "（！！）"
1004602-20 = "[s] \"今日も暑いし、海に入ればきっと気持ち良……\""
1004602-24 = "[ns] \"イズナ？\""
1004602-25 = "そ、その、主殿……。"
1004602-26 = "も、もちろんそれも良いのですが……！"
1004602-27 = "忍びの者として、ここは……！"
1004602-28 = "やはり、夏の海でしかできない、特殊な修行……！"
1004602-29 = "それをするというのは、いかがでしょう！！"
1004602-30 = "[s] \"特殊な修行……？\""
1004602-31 = "はい、道具もきちんと準備いたしました！"
1004602-36 = "[ns] \"スイカと……木刀？もしかしてこれって……\""
1004602-37 = "はい！夏と言えばやはりこの訓練……！"
1004602-38 = "そう、スイカ割りです！"
1004602-39 = "[s3] \"訓練、かな……？確かに夏らしくはあるけど……。\"\n[s4] \"……忍者と関係、あったっけ？\""
1004602-42 = "ふふふっ……！"
1004602-43 = "何を隠そう、今から行うのはもちろん普通の「スイカ割り」ではありません！"
1004602-44 = "かの名高い忍者たちの間でも密かに流行っているという……#n「忍者流特別版スイカ割り」です！"
1004602-45 = "[s] \"……ちなみにイズナ、それどこ情報？\""
1004602-46 = "部長が運営する「少女忍法帖ミチルっち」ですよ？"
1004602-47 = "[s] \"そんな気はしてた。\""
1004602-48 = "この「忍者流特別版スイカ割り」のルールは、いたって簡単！"
1004602-49 = "忠誠を誓った主殿のご命令とあらば、それをしっかりとこなすのが忍びというもの！"
1004602-50 = "なのでご命令に従い、イズナがスイカを割るというルールです！"
1004602-51 = "[s] \"今のところ、普通のスイカ割りに聞こえるけど……。\""
1004602-55 = "[ns] \"まあ、とにかくやってみよっか。\""
1004602-56 = "えへへっ、はい！"
1004602-60 = "ではこうして、"
1004602-65 = "まずはスイカをセットしまして……"
1004602-71 = "お待たせしました、準備完了です！"
1004602-77 = "では、目をつぶりますので……"
1004602-78 = "さあ主殿、イズナへお好きなようにご命令を！"
1004602-79 = "[s] \"じゃあ、まずは……\""
1004602-80 = "（ドキドキ……！）"
1004602-81 = "[s5] \"そのまま前に三歩。\"\n[s6] \"そのまま後ろに四歩。\""
1004602-82 = "はい！イズナ、参ります！"
1004602-86 = "はい！イズナ、参ります！"
1004602-90 = "[ns] \"イズナ！？ちょっと待って！？\""
1004602-98 = "けほっ、けほっ……イズナ、不覚を取りました……。"
1004602-99 = "[s] \"大丈夫？\""
1004602-100 = "はい！ご心配なく！"
1004602-101 = "主殿の声が聞こえるや否や、ついダッシュしてしまいましたが……。"
1004602-102 = "次はきっと大丈夫です！"
1004602-103 = "さあ、今度こそ成功させてみせますよ！主殿！"
1004602-104 = "[s] \"えっと、じゃあまず右に……\""
1004602-105 = "右！！！"
1004602-106 = "はあぁぁぁっ！！"
1004602-111 = "[ns] \"い、イズナ！？\""
1004602-115 = "けほ、けほっ……！またしてもやってしまいました"
1004602-119 = "……が！まだ諦めはしません！"
1004602-120 = "主殿！さあ、もう一度！"
1004602-121 = "[s] \"う、うん。じゃあ、左側に……\""
1004602-122 = "とぉっ！！！"
1004602-128 = "ま、まだです！"
1004602-132 = "行きます、イズナ流忍法！"
1004602-137 = "（そうして何度か繰り返してみたものの……）"
1004602-138 = "（砂埃が立ち上がるばかりで、）"
1004602-142 = "（スイカは相変わらず綺麗な形のままだった）"
1004602-144 = "うぅっ……まさか、スイカがこんなにも強敵だったとは……。"
1004602-145 = "イズナ、剣先ひとつ触れることができませんでした……。"
1004602-146 = "これが「忍者流特別版スイカ割り」……侮れません！"
1004602-147 = "[s7] \"多分問題はそこじゃないというか……。\"\n[s8] \"その前に、考えた方が良さそうな点が……。\""
1004602-150 = "そ、そうなのですか！？"
1004602-151 = "うぅ……ですが確かに、イズナからこの訓練を言い出したのに……。"
1004602-152 = "一度もまともにこなせず、ミスしてばかりで……。"
1004602-153 = "ですので、主殿がそう仰るのも"
1004602-154 = "無理はありません……。"
1004602-155 = "うっ、申し訳ありません主殿～！"
1004602-156 = "こんな暑い日に！イズナが至らぬせいで！主殿を失望させてしまい……！"
1004602-157 = "[s] \"せ、責めてるわけじゃないよ！大丈夫！\""
1004602-158 = "そ、そうなのですか……？"
1004602-159 = "[s9] \"うん。だからまずはその、言われてすぐ動くんじゃなくて。\"\n[s10] \"じっくり考えてから動いてみるのはどうかな？\""
1004602-165 = "なるほど……つまり、命令を受けてすぐ動いてしまうよりも……。"
1004602-166 = "忍びとして、しっかり綿密に作戦を理解して動くべし……そういうことですね！"
1004602-167 = "なるほど！そのお言葉、一生胸に刻もうと思います！"
1004602-168 = "……。"
1004602-169 = "……………。"
1004602-170 = "と思ったのですが、主殿……どうやらそれは難しそうです。"
1004602-171 = "[s] それはまた、どうして？"
1004602-172 = "その、イズナは主殿の声が聞こえると、すぐ身体が動いてしまうので……。"
1004602-173 = "ですが、スイカ割りはきっちり成功したいですし……。"
1004602-174 = "ですが、やはり主殿の声を聞いて動かないというのは……！"
1004602-175 = "うわぁん！どうしましょう主殿！？"
1004602-176 = "スイカ割りが、こんなに難しい訓練だったとは……イズナ、全く知りませんでした！"
1004602-177 = "それでも、"
1004602-178 = "イズナは諦めません……"
1004602-179 = "せっかくこうして、主殿と訓練ができるのですから！"
1004602-180 = "[s11] \"そ、そっか……。\"\n[s12] \"イズナ、良い子……！\""
1004602-187 = "（それ以上イズナに対して）"
1004602-188 = "（「やめよう」などと言うことはできず……）"
1004602-189 = "（結局……）"
1004602-190 = "[ns] \"……よし。じゃあ取り敢えず、成功するまで数をこなそう！\""
1004602-192 = "……！"
1004602-193 = "はい！イズナ、頑張ります！"
1004602-194 = "ニンニン！"
1004602-200 = "（その後、何度も暴走して飛び出すイズナと一日中スイカ割りをして）"
1004602-206 = "（どうにか訓練が終わった後、修行で疲れたイズナと一緒に美味しくスイカを食べたのだった）"
