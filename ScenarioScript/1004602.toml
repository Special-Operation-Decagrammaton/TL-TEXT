[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 22/06.]
1004602-1 = "Quebrando Melancias com a Izuna!"
1004602-5 = "(Fui chamado pela Izuna e caminhei em direção à praia, sob os raios intensos do sol de verão)"
1004602-10 = "Ah, Meu Mestre, Meu Mestre! Aqui! Estou aqui!"
1004602-11 = "[s] \"Desculpe a demora, Izuna.\""
1004602-12 = "Não, de forma alguma!"
1004602-13 = "[s1] \"Então, o que vamos fazer hoje?\"\n[s2] \"O treinamento para se tornar uma ninja adaptada ao mar... não era isso?\""
1004602-16 = "Sim! Já que finalmente é verão, e estamos na praia!"
1004602-17 = "A Izuna queria muito fazer atividades que só podemos fazer agora!"
1004602-18 = "[s] \"Quando o assunto é verão, a primeira coisa que vem à mente é... natação?\""
1004602-19 = "(!!)"
1004602-20 = "[s] \"Hoje também está bem quente, entrar no mar deve ser bem refrescante e...\""
1004602-24 = "[ns] \"Izuna?\""
1004602-25 = "A-Ahn, sobre isso, Meu Mestre..."
1004602-26 = "C-Claro que nadar também é ótimo, mas...!"
1004602-27 = "Como uma ninja, a situação pede que...!"
1004602-28 = "A gente faça um treinamento especial que só pode ser feito na praia no verão...!"
1004602-29 = "O que você acha de tentarmos isso!?"
1004602-30 = "[s] \"Treinamento... especial?\""
1004602-31 = "Sim, eu já preparei as ferramentas adequadamente!"
1004602-36 = "[ns] \"Uma melancia e... uma espada de madeira? Por acaso isso é...\""
1004602-37 = "Sim! Se o assunto é verão, este é o treinamento clássico...!"
1004602-38 = "Exatamente, é a quebra de melancia!"
1004602-39 = "[s3] \"Treinamento, é...? Com certeza tem muito a cara do verão, mas...\"\n[s4] \"...Tem alguma relação com ninjas?\""
1004602-42 = "Fufufu...!"
1004602-43 = "Para falar a verdade, o que faremos agora não é uma 'quebra de melancia' comum!"
1004602-44 = "É algo que dizem ser secretamente popular até entre os ninjas mais famosos...#nA 'Quebra de Melancia Edição Especial Ninja'!"
1004602-45 = "[s] \"...A propósito, de onde você tirou essa informação, Izuna?\""
1004602-46 = "Do canal 'Diário Ninja da Michiru-cchi', administrado pela Presidente, é claro!"
1004602-47 = "[s] \"Eu já devia ter imaginado.\""
1004602-48 = "As regras desta 'Quebra de Melancia Edição Especial Ninja' são muito simples!"
1004602-49 = "Se o Meu Mestre, a quem eu jurei lealdade, me der uma ordem, devo cumpri-la perfeitamente como uma ninja!"
1004602-50 = "A regra é a Izuna quebrar a melancia seguindo as suas instruções!"
1004602-51 = "[s] \"Até agora, parece exatamente a mesma coisa que a versão normal, mas...\""
1004602-55 = "[ns] \"Bom, vamos tentar fazer.\""
1004602-56 = "Ehehe, sim!"
1004602-60 = "Então, assim,"
1004602-65 = "Primeiro vamos colocar a melancia no lugar..."
1004602-71 = "Desculpe a demora, preparação concluída!"
1004602-77 = "Agora, vou fechar os meus olhos, então..."
1004602-78 = "Venha, Meu Mestre, pode me dar a ordem como quiser!"
1004602-79 = "[s] \"Bem, então primeiro...\""
1004602-80 = "(Doki-doki...!)"
1004602-81 = "[s5] \"Continue, três passos pra frente.\"\n[s6] \"Isso, agora dá quatro passos pra trás.\""
1004602-82 = "Entendido! Izuna, a caminho!"
1004602-86 = "Entendido! Izuna, a caminho!"
1004602-90 = "[ns] \"Izuna!? Espera um pouco!?\""
1004602-98 = "*Cof, cof...* A Izuna falhou..."
1004602-99 = "[s] \"Você está bem?\""
1004602-100 = "Sim! Não se preocupe!"
1004602-101 = "É que... quando eu ouço a voz do Meu Mestre, acabo correndo sem pensar..."
1004602-102 = "Mas da próxima vez vai dar tudo certo!"
1004602-103 = "Vamos, dessa vez eu vou ter sucesso! Meu Mestre!"
1004602-104 = "[s] \"E-Er, então agora vai para a direita...\""
1004602-105 = "DIREITA!!!"
1004602-106 = "Haaaaaaaah!!"
1004602-111 = "[ns] \"I-Izuna!?\""
1004602-115 = "*Cof, cof...*! Acabei fazendo de novo..."
1004602-119 = "...Mas! Eu ainda não vou desistir!"
1004602-120 = "Meu Mestre! Por favor, mais uma vez!"
1004602-121 = "[s] \"E-Er, certo. Então, vai para a esquerda...\""
1004602-122 = "Toh!!!"
1004602-128 = "A-Ainda não acabamos!"
1004602-132 = "Lá vai, Arte Ninja do Estilo Izuna!"
1004602-137 = "(E assim repetimos isso várias vezes, mas...)"
1004602-138 = "(A areia continuou voando pra todo lado,)"
1004602-142 = "(E a melancia continuou intocada, no mesmo formato de antes)"
1004602-144 = "Ugh... eu não imaginava que a melancia fosse um inimigo tão forte..."
1004602-145 = "A Izuna não conseguiu nem encostar a ponta da espada..."
1004602-146 = "A 'Quebra de Melancia Edição Especial Ninja'... não deve ser subestimada!"
1004602-147 = "[s7] \"Eu acho que o problema não é bem esse...\"\n[s8] \"Antes disso, acho que tem uma coisa que deveríamos repensar...\""
1004602-150 = "S-Sério!?"
1004602-151 = "Uugh... Mas eu que sugeri esse treinamento..."
1004602-152 = "E eu não consegui fazer direito nenhuma vez, só cometi erros..."
1004602-153 = "Portanto, é normal que o Meu Mestre diga isso..."
1004602-154 = "Não tem jeito..."
1004602-155 = "Ugh, me perdoe, Meu Mestre~!"
1004602-156 = "Num dia quente como esse! Por causa da minha ineficiência! Eu acabei decepcionando o Meu Mestre...!"
1004602-157 = "[s] \"E-Ei, eu não estou brigando com você! Está tudo bem!\""
1004602-158 = "É-É verdade...?"
1004602-159 = "[s9] \"Sim. Então, antes de mais nada... não faça movimentos bruscos assim que eu der uma ordem.\"\n[s10] \"Que tal você tentar pensar bem com calma antes de se mover?\""
1004602-165 = "Entendo... Então você quer dizer que, em vez de me mover logo após receber a ordem..."
1004602-166 = "Como uma ninja, eu devo compreender as intenções e a estratégia com cuidado... É isso, não é!"
1004602-167 = "Entendi! Eu vou gravar essas palavras para a vida toda!"
1004602-168 = "......"
1004602-169 = "............"
1004602-170 = "Eu tentei pensar assim, Meu Mestre... Mas acho que isso é impossível."
1004602-171 = "[s] Ué, e por que seria impossível?"
1004602-172 = "É que a Izuna... quando ouve a voz do Meu Mestre, o corpo acaba se movendo sozinho..."
1004602-173 = "Mas eu também quero muito quebrar a melancia e acertar o treinamento..."
1004602-174 = "No entanto, pedir para eu não agir quando ouço a sua voz é...!"
1004602-175 = "Waah! O que eu devo fazer, Meu Mestre!?"
1004602-176 = "Eu não fazia ideia de que quebrar uma melancia era um treinamento tão difícil... A Izuna não sabia de nada!"
1004602-177 = "Ainda assim,"
1004602-178 = "A Izuna não vai desistir..."
1004602-179 = "Afinal, eu tenho a chance de treinar junto com o Meu Mestre!"
1004602-180 = "[s11] \"E-Entendo...\"\n[s12] \"Izuna, você é uma boa garota...!\""
1004602-187 = "(Com a Izuna agindo assim,)"
1004602-188 = "(Eu não tinha como dizer 'vamos parar por aqui'...)"
1004602-189 = "(No fim das contas...)"
1004602-190 = "[ns] \"...Certo. Então vamos continuar repetindo até conseguirmos acertar!\""
1004602-192 = "...!"
1004602-193 = "Sim! A Izuna vai dar o seu melhor!"
1004602-194 = "Nin-nin!"
1004602-200 = "(Depois disso, passamos o dia inteiro quebrando melancia com a Izuna correndo e pulando para todos os lados)"
1004602-206 = "(Quando o treinamento finalmente terminou, comemos a melancia deliciosa juntos, enquanto a Izuna descansava do esforço)"