[translation]
1004602-1 = "Quebra de melancia com a Izuna!"
1004602-5 = "（Assim, fui chamado pela Izuna e segui em direção à praia sob o sol escaldante do verão.）"
1004602-10 = "Ah, Mestre! Mestre! É por aqui! Por aqui!"
1004602-11 = "[s] \"Izuna, desculpe a demora.\""
1004602-12 = "Não, de jeito nenhum!"
1004602-13 = "[s1] \"Então, o que vamos fazer hoje?\"\n[s2] \"Treinamento para se tornar uma ninja adaptada ao mar... é isso?\""
1004602-16 = "Sim! Já que estamos no verão e na praia!"
1004602-17 = "Eu, Izuna, quero aproveitar para fazer atividades que só podemos fazer agora!"
1004602-18 = "[s] \"Falando em verão, talvez... nadar?\""
1004602-19 = "（！！）"
1004602-20 = "[s] \"Está quente hoje também, entrar no mar seria bem refrescante...\""
1004602-24 = "[ns] \"Izuna?\""
1004602-25 = "E-eu, Mestre..."
1004602-26 = "C-claro que isso também é bom, mas...!"
1004602-27 = "Como uma ninja, neste momento...!"
1004602-28 = "Afinal, um treinamento especial que só pode ser feito na praia de verão...!"
1004602-29 = "O que acha de fazermos isso?!"
1004602-30 = "[s] \"Treinamento especial...?\""
1004602-31 = "Sim, eu preparei os equipamentos corretamente!"
1004602-36 = "[ns] \"Uma melancia e... uma espada de madeira? Por acaso isso é...\""
1004602-37 = "Sim! Falando em verão, este é o treinamento ideal...!"
1004602-38 = "Isso mesmo, quebra de melancia!"
1004602-39 = "[s3] \"Treinamento, será...? É bem a cara do verão, mas...\"\n[s4] \"...isso tem alguma relação com ninjas?\""
1004602-42 = "Fufufu...!"
1004602-43 = "Não é por nada, mas o que vamos fazer agora não é uma \"quebra de melancia\" comum!"
1004602-44 = "Dizem que é algo que está secretamente na moda entre os ninjas renomados... #nÉ a \"Quebra de Melancia Edição Especial Estilo Ninja\"!"
1004602-45 = "[s] \"...A propósito, Izuna, onde você viu isso?\""
1004602-46 = "No \"Diário Ninja da Michiru-chi\", administrado pela nossa chefe, é claro!"
1004602-47 = "[s] \"Eu imaginei.\""
1004602-48 = "As regras desta \"Quebra de Melancia Edição Especial Estilo Ninja\" são bem simples!"
1004602-49 = "Se o Mestre, a quem jurei lealdade, me der uma ordem, o dever de um ninja é cumpri-la com perfeição!"
1004602-50 = "Portanto, seguindo suas ordens, a regra é que eu, Izuna, quebre a melancia!"
1004602-51 = "[s] \"Até agora, parece uma quebra de melancia comum...\""
1004602-55 = "[ns] \"Bem, de qualquer forma, vamos tentar.\""
1004602-56 = "Ehehe, sim!"
1004602-60 = "Então, assim,"
1004602-65 = "Primeiro, posiciono a melancia..."
1004602-71 = "Desculpe a espera, preparação concluída!"
1004602-77 = "Então, vou fechar os olhos..."
1004602-78 = "Vamos, Mestre, dê suas ordens para a Izuna como desejar!"
1004602-79 = "[s] \"Então, primeiro...\""
1004602-80 = "（Tum-tum...！）"
1004602-81 = "[s5] \"Dê três passos à frente.\"\n[s6] \"Dê quatro passos para trás.\""
1004602-82 = "Sim! Izuna, indo!"
1004602-86 = "Sim! Izuna, indo!"
1004602-90 = "[ns] \"Izuna!? Espere um pouco!?\""
1004602-98 = "Cof, cof... Izuna foi descuidada..."
1004602-99 = "[s] \"Você está bem?\""
1004602-100 = "Sim! Não se preocupe!"
1004602-101 = "Assim que ouvi a voz do Mestre, acabei saindo correndo sem pensar..."
1004602-102 = "Da próxima vez, com certeza vai dar certo!"
1004602-103 = "Muito bem, desta vez eu vou conseguir! Mestre!"
1004602-104 = "[s] \"Bem, então primeiro, para a direita...\""
1004602-105 = "Direita!!!"
1004602-106 = "Haaaaa!!"
1004602-111 = "[ns] \"I-Izuna!?\""
1004602-115 = "Cof, cof...! Eu falhei de novo."
1004602-119 = "…Mas! Eu ainda não vou desistir!"
1004602-120 = "Mestre! Vamos, mais uma vez!"
1004602-121 = "[s] \"C-certo. Então, para o lado esquerdo...\""
1004602-122 = "Yaaah!!!"
1004602-128 = "A-ainda não!"
1004602-132 = "Lá vou eu, Ninjutsu estilo Izuna!"
1004602-137 = "(E assim, embora tenhamos tentado várias vezes...)"
1004602-138 = "(A única coisa que se levantava era a poeira,)"
1004602-142 = "(e a melancia continuava com o formato intacto.)"
1004602-144 = "Ugh... quem diria que uma melancia seria um inimigo tão formidável..."
1004602-145 = "Izuna não conseguiu nem tocar nela com a ponta da espada..."
1004602-146 = "Este \"Treino Especial de Quebrar Melancia Estilo Ninja\"... não pode ser subestimado!"
1004602-147 = "[s7] \"Acho que o problema não é esse...\"\n[s8] \"Antes disso, tem algo que seria bom considerar...\""
1004602-150 = "É-é mesmo!?"
1004602-151 = "Ugh... mas é verdade, fui eu quem sugeriu este treino..."
1004602-152 = "E não consegui fazer direito nenhuma vez, só cometendo erros..."
1004602-153 = "Por isso, o que o Mestre disse"
1004602-154 = "é compreensível..."
1004602-155 = "Ugh, me desculpe, Mestre!"
1004602-156 = "Em um dia tão quente como este! Por causa da minha incompetência! Acabei decepcionando o Mestre...!"
1004602-157 = "[s] \"E-eu não estou te culpando! Está tudo bem!\""
1004602-158 = "É-é mesmo...?"
1004602-159 = "[s9] \"Sim. Então, primeiro, em vez de se mover assim que eu falar...\"\n[s10] \"Que tal pensar com calma antes de agir?\""
1004602-165 = "Entendo... ou seja, em vez de agir imediatamente após receber a ordem..."
1004602-166 = "Como uma ninja, devo entender o plano minuciosamente antes de agir... é isso!"
1004602-167 = "Entendido! Guardarei essas palavras no meu coração para sempre!"
1004602-168 = "..."
1004602-169 = "……………"
1004602-170 = "Foi o que pensei, mas Mestre... parece que isso será difícil."
1004602-171 = "[s] Por que isso?"
1004602-172 = "É que, quando a Izuna ouve a voz do Mestre, meu corpo se move sozinho..."
1004602-173 = "Mas eu realmente quero ter sucesso em quebrar a melancia..."
1004602-174 = "Mas, ainda assim, não me mover ao ouvir a voz do Mestre é...!"
1004602-175 = "Waaah! O que eu faço, Mestre!?"
1004602-176 = "Eu não fazia ideia de que quebrar melancia era um treino tão difícil!"
1004602-177 = "Ainda assim,"
1004602-178 = "a Izuna não vai desistir..."
1004602-179 = "Já que é uma oportunidade de treinar com o Mestre!"
1004602-180 = "[s11] \"Entendi...\"\n[s12] \"Izuna, você é uma boa menina...!\""
1004602-187 = "(Não consegui dizer mais nada para a Izuna)"
1004602-188 = "(como \"vamos parar\"...)"
1004602-189 = "(No fim...)"
1004602-190 = "[ns] \"...Certo. Então, por enquanto, vamos continuar tentando até conseguir!\""
1004602-192 = "……！"
1004602-193 = "Sim! Izuna vai dar o seu melhor!"
1004602-194 = "Nin-nin!"
1004602-200 = "(Depois disso, passei o dia inteiro brincando de quebrar melancia com a Izuna, que saiu correndo descontrolada várias vezes)"
1004602-206 = "(Depois que o treinamento finalmente terminou, comi uma melancia deliciosa junto com a Izuna, que estava exausta do treino)"
