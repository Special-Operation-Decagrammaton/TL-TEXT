[translation]
2005203-1 = "Plano de Negócios"
2005203-2 = "Diga-me, Sensei."
2005203-3 = "[s] \"O que houve?\""
2005203-4 = "As palavras do Schale alcançam todo o Kivotos, não é?"
2005203-5 = "[s] \"Bem, elas são tratadas como oficiais, afinal.\""
2005203-6 = "Eu percebi uma coisa."
2005203-7 = "Não existem muitos influenciadores com um poder tão vasto quanto o seu."
2005203-8 = "[s] \"O jeito que você fala, Yakumo, me deixa preocupado...\""
2005203-9 = "Escute, Sensei."
2005203-10 = "Você não acha um desperdício não usar seu próprio alcance e influência?"
2005203-11 = "Mesmo que você não ache, eu acho, então é assim que as coisas são."
2005203-12 = "Por exemplo, que tal se o Schale liderasse uma campanha de \"Vamos ler livros\" para todo o Kivotos?"
2005203-13 = "[s] \"Isso é uma boa ideia!\""
2005203-14 = "E nela, incluiríamos os livros selecionados pelo Departamento de Publicações... Mufufufu."
2005203-15 = "[s] \"...Por favor, contenha-se, Yakumo-san.\""
2005203-16 = "Mas, quando se trata de livros, existe a possibilidade de sermos ofuscados pela biblioteca da Trinity..."
2005203-17 = "Não, na verdade, se pudermos aproveitar essa oportunidade para elevar a influência do Departamento de Publicações... uma vitória de virada não seria um sonho, seria?"
2005203-18 = "Um verdadeiro empresário transforma crises em oportunidades... Sendo assim...!"
2005203-22 = "...Sensei, você não poderia ser o patrocinador do Departamento de Publicações? #nComo um consultor, ou algo do tipo."
2005203-23 = "Se precisar de uma justificativa plausível... que tal algo como: pelo bem-estar das alunas que sofrem na escola de clima gélido?"
2005203-24 = "[s] \"Não.\""
2005203-25 = "Eeeh, por que não?"
2005203-26 = "[s] \"Você sabe o porquê, não sabe?\""
2005203-27 = "Tsc, esse maldito dever de neutralidade..."
2005203-28 = "...Então, que tal outra coisa..."
2005203-29 = "Schale... D.U. ..."
2005203-30 = "Uma zona de neutralidade política reconhecida por Kivotos..."
2005203-31 = "Ou seja, aqui, nenhuma escola pode reivindicar autonomia..."
2005203-32 = "Isso significa que... a fraqueza do poder de voz da Academia Federal Red Winter também poderia ser reforçada no Schale..."
2005203-33 = "...Além disso, a aluna da Academia Federal Red Winter que está aqui agora não é outra senão eu, Aramaki Yakumo...!"
2005203-37 = "Sensei."
2005203-38 = "Pelo bem dos ideais não oficiais da nossa Academia Federal Red Winter, \"Igualdade\" e \"Justiça\"..."
2005203-39 = "Para todas as escolas... não, pelo menos para as \"Três Grandes Escolas\" —"
2005203-40 = "Você não poderia intervir \"ativamente\" para que elas ajudem na produção de pudim da Red Winter?"
2005203-41 = "E eu gostaria que você mencionasse em letras miúdas que houve o apoio do Departamento de Publicações."
2005203-42 = "Com isso, a escassez crônica de pudim seria resolvida, pelo menos temporariamente, #ne externamente o nome da Red Winter seria elevado, e internamente —"
2005203-43 = "[s] \"Rejeitado!\""
2005203-47 = "Por que não?!"
2005203-48 = "...Puff... Entendido..."
2005203-49 = "...Espere? Será que eu estava obcecada demais com a Red Winter até agora...? Talvez a causa da derrota esteja nisso...?"
2005203-50 = "...Isso, usando plenamente a autoridade extrajudicial do Schale..."
2005203-51 = "...Não me olhe desse jeito. Desta vez, será um ganha-ganha onde todos saem lucrando."
2005203-52 = "Que tal isto? Acho que a sua autoridade extrajudicial costuma ser usada em situações de emergência."
2005203-53 = "Neste caso, poderíamos declarar que é pelo \"bem público\"..."
2005203-54 = "Por exemplo, vejamos..."
2005203-58 = "Deixando os detalhes para depois."
2005203-59 = "Que tal promover um projeto público impecável em nome do Schale?"
2005203-60 = "Se você apenas tornar público o fato de que houve uma colaboração com o nosso Departamento de Publicações —"
2005203-61 = "[s] \"Eu já disse que não.\""
2005203-62 = "Não precisa ser tão direto assim..."
2005203-63 = "[s] \"Ainda assim, você tem cada ideia.\""
2005203-64 = "Bem, criar planos de negócios é um dos meus passatempos, afinal."
2005203-65 = "Como posso dizer... o processo de expandir as possibilidades é divertido."
2005203-66 = "Seja uma ideia viável ou não..."
2005203-67 = "Além disso, eu diria que fui bem treinada."
2005203-68 = "Uma mesa de negociação é... um lugar onde você mobiliza todos os recursos possíveis! E se prepara expandindo tudo até o limite!"
2005203-69 = "E se o oponente for o Secretariado da Red Winter, mais ainda."
2005203-70 = "\"Se este projeto der certo, a distribuição de pudim deste mês pode dobrar\"#n... algo desse tipo."
2005203-71 = "[s] \"E isso já funcionou alguma vez?\""
2005203-75 = "Quase nunca, mas..."
2005203-77 = "(Depois disso, enquanto conversávamos sobre como, no fim das contas, o que importa é a confiança mútua...)"
2005203-78 = "(Admirando mais uma vez o quanto Yakumo é falante...)"
2005203-79 = "(Terminei o trabalho de uma forma até que divertida (?))"
