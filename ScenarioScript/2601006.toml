[translation]
2601006-1 = "Confirmando a presença"
2601006-2 = "Cidade dos Coelhinhos"
2601006-3 = "（Preocupado com o Momotalk da Miyu, fui apressado em direção ao acampamento do RABBIT Squad）"
2601006-4 = "（...Não demorou muito para encontrar a Miyu）"
2601006-6 = "Ah, Sensei..."
2601006-7 = "O-olá..."
2601006-10 = "Eu achei que você me encontraria logo, Sensei... mas você foi mais rápido do que o habitual..."
2601006-11 = "Será que... esse é o efeito do meu novo visual? Hehe..."
2601006-12 = "[s1] \"M-Mi... Miyu...?\"\n[s2] \"Que traje é esse...?\""
2601006-15 = "Bem..."
2601006-16 = "Eu li em uma revista de moda que deveria mudar meu estilo habitual, então..."
2601006-17 = "[s3] \"Isso é um traje, é...?\"\n[s4] \"Isso é um traje de banho, não é!?\""
2601006-20 = "Sim... é um traje de banho que comprei outro dia."
2601006-21 = "Quando estou na praia ou na piscina, tem muita gente por perto, então ninguém presta atenção em mim..."
2601006-22 = "Mas como quase ninguém anda de traje de banho na cidade, pensei que talvez até eu, que sou tão apagada, pudesse chamar a atenção..."
2601006-23 = "Trajes de banho são feitos para serem vistos na praia ou na piscina... #nNão é um traje vergonhoso, nem algo pelo qual eu seria presa..."
2601006-24 = "[s] \"Se uma garota estiver andando de traje de banho na cidade, todo mundo vai olhar, né!?\""
2601006-25 = "S-sério...?"
2601006-26 = "Mas, eu estou usando isso desde de manhã..."
2601006-27 = "E em vez de virem falar comigo, parece que estão me evitando..."
2601006-28 = "[s] \"Isso é, provavelmente...\""
2601006-42 = "...Porque é difícil chegar perto, é...?"
2601006-43 = "...Eu entendo se for por não ser notada, mas..."
2601006-44 = "Será que o problema sou eu...?"
2601006-45 = "[s] \"...Por enquanto, vamos colocar o uniforme?\""
2601006-46 = "Por que será...?"
2601006-47 = "Eu achei que esse era um método tão bom..."
2601006-48 = "Pedir para eu voltar a usar roupas que me deixam sem presença..."
2601006-50 = "Ei, aquilo não é... #nO Sensei do Schale não está fazendo uma aluna de traje de banho chorar?"
2601006-51 = "Eu estava achando estranho uma aluna de traje de banho estar no meio da cidade, mas... será que foi o Sensei do Schale!?"
2601006-52 = "Fazer uma garota tão tímida passar por esse tipo de vergonha..."
2601006-53 = "Pelo visto, os boatos de que o Schale é um lugar terrível são verdadeiros..."
2601006-54 = "[ns] \"Por favor, eu te imploro...!?\""
2601006-56 = "（Depois disso, avisei a Miyu para não andar pela cidade de traje de banho, e ela entendeu...）"
2601006-57 = "（Mas boatos estranhos sobre o Schale se espalharam, e foi difícil desfazer o mal-entendido das pessoas que ouviram aquilo）"
