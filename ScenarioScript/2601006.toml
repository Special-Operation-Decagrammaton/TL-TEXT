[translation]
2601006-1 = "存在感の確認"
2601006-2 = "子ウサギタウン"
2601006-3 = "（ミユのモモトークが気になり、RABBIT小隊のキャンプ方面に慌てて向かった）"
2601006-4 = "（……ミユの姿を見つけるのに、そう時間はかからなかった）"
2601006-6 = "あ、先生……。"
2601006-7 = "こ、こんにちは……。"
2601006-10 = "先生なら、すぐに見つけてくれると思いましたが……いつもより早かったですね……。"
2601006-11 = "もしかして……これが新しいコーディネートの効果なのかな……ふふっ……。"
2601006-12 = "[s1] \"み、ミミッ……ミユ……？\"\n[s2] \"その格好は一体……？\""
2601006-15 = "えっと……"
2601006-16 = "ファッション雑誌を見たら、普段のコーディネートを変えてみようと書いてあったので……"
2601006-17 = "[s3] \"こ、コーディネートかな……\"\n[s4] \"それって水着だよね！？\""
2601006-20 = "はい……先日購入した水着です。"
2601006-21 = "海やプールで水着姿になったところで、周りも一緒ですし、私が視線を集めることはありませんが……"
2601006-22 = "街なかで水着の人は早々いないので、影の薄い私でも注目を集められるのではないか、と思い……"
2601006-23 = "水着は海やプールでは周りに見られるわけですから……#n恥ずかしい格好でも、捕まるようなわけでもありませんし……"
2601006-24 = "[s] \"街で水着の子が歩いてたら、誰だって見るよ！？\""
2601006-25 = "そ、そうですか……？"
2601006-26 = "で、でも、朝から水着で過ごしてますが……"
2601006-27 = "話しかけられるどころか、むしろ避けられているような……"
2601006-28 = "[s] \"それは、たぶん……\""
2601006-42 = "……話しかけづらいから、ですか……？"
2601006-43 = "……気づかれないのなら分かりますが……"
2601006-44 = "もしかして、私自身に問題が……？"
2601006-45 = "[s] \"……とりあえず制服に着替えよう？\""
2601006-46 = "どうして、でしょうか……？"
2601006-47 = "せっかく良い方法だと思ったのですが……"
2601006-48 = "また、存在感のない格好に戻れだなんて……"
2601006-50 = "ちょっと、あれって……#nシャーレの先生が、水着姿の生徒を泣かしてない？"
2601006-51 = "どうして水着の生徒さんが、こんな街なかに居るのか不思議だったけど……まさかシャーレの先生が！？"
2601006-52 = "あんな気弱そうな子に恥ずかしい真似をさせるなんて……"
2601006-53 = "やっぱり、噂通りシャーレは恐ろしい場所みたいだ……"
2601006-54 = "[ns] \"お願いだから、ねっ……！？\""
2601006-56 = "（その後、水着で街を出歩かないようミユに注意したら、納得してもらえたが……）"
2601006-57 = "（シャーレに関する変な噂は広まってしまい、それを聞いた人たちの誤解を解くのが大変だった）"
