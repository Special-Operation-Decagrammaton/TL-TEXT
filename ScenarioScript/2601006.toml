[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
2601006-1 = "Confirmação de Presença" 
2601006-2 = "Cidade dos Coelhinhos" 
2601006-3 = "（Preocupado com o MomoTalk da Miyu, fui correndo em direção ao acampamento do Esquadrão RABBIT.）" 
2601006-4 = "（……Não demorou muito até eu avistar a Miyu.）" 
2601006-6 = "Ah, Sensei……" 
2601006-7 = "O-Olá……" 
2601006-10 = "Eu sabia que o Sensei me acharia num piscar de olhos…… mas você foi ainda mais rápido dessa vez……" 
2601006-11 = "Será que…… este é o efeito do meu novo look da moda…… fufu……" 
2601006-12 = "[s1] \"M-Mimi…… Miyu……?\"\n[s2] \"Que roupa é essa……?\"" 
2601006-15 = "Ahm……" 
2601006-16 = "Eu li numa revista de moda que deveríamos tentar mudar a nossa coordenação de roupas de vez em quando, e……" 
2601006-17 = "[s3] \"C-Coordenação, você diz……\"\n[s4] \"Isso aí é um traje de banho, não é!?\"" 
2601006-20 = "Sim…… é o traje de banho que eu comprei no outro dia." 
2601006-21 = "Quando eu fui à praia e à piscina com ele, todo mundo estava vestindo a mesma coisa, então eu não consegui chamar a atenção de ninguém, mas……" 
2601006-22 = "Como quase ninguém usa traje de banho no meio da cidade, achei que até alguém como eu conseguiria atrair alguns olhares se vestisse isso aqui, e……" 
2601006-23 = "As pessoas já me veem de traje de banho na praia ou na piscina de qualquer forma……\nEntão não é como se fosse uma roupa vergonhosa ou que me faria ser presa……" 
2601006-24 = "[s] \"Se uma garota estiver andando de traje de banho no meio da rua, qualquer um vai olhar!?\"" 
2601006-25 = "É-É mesmo……?" 
2601006-26 = "M-Mas eu passei a manhã toda andando de traje de banho e……" 
2601006-27 = "Ninguém veio falar comigo. Na verdade, sinto que estão me evitando……" 
2601006-28 = "[s] \"Isso provavelmente é porque……\"" 
2601006-42 = "……É porque eu pareço ser uma pessoa difícil de conversar……?" 
2601006-43 = "……Se fosse porque eles simplesmente não me notaram, eu entenderia, mas……" 
2601006-44 = "Por acaso, tem alguma coisa de errado comigo……?" 
2601006-45 = "[s] \"……Vamos só vestir o seu uniforme primeiro, que tal?\"" 
2601006-46 = "Mas por quê……?" 
2601006-47 = "E eu que achava que esta era uma ideia tão boa……" 
2601006-48 = "Você está dizendo para eu voltar a vestir roupas que apagam a minha presença……" 
2601006-50 = "Ei, olha lá……\nO Sensei da Schale não está fazendo uma aluna de traje de banho chorar no meio da rua?" 
2601006-51 = "Eu tava tentando entender por que tinha uma garota de traje de banho no centro da cidade…… Mas o Sensei da Schale estava por trás disso!?" 
2601006-52 = "Obrigar uma garota tão tímida a fazer algo tão constrangedor em público……" 
2601006-53 = "Os boatos eram reais. A Schale é um lugar muito perigoso e aterrorizante……" 
2601006-54 = "[ns] \"Eu imploro, por favor, só veste a roupa logo……!?\"" 
2601006-56 = "（Depois disso, alertei a Miyu severamente para não andar de traje de banho pela cidade, e felizmente ela compreendeu, mas……）" 
2601006-57 = "（Boatos muito estranhos sobre a Schale se espalharam, e deu um trabalho imenso para desfazer o mal-entendido das pessoas que os ouviram.）" 