[translation]
62100-1 = "Episódio 10; Ninho"
62100-3 = "Por favor, Saori-senpai! Vá embora, eu imploro!"
62100-4 = "Recebemos ordens de proteger este lugar! Não podemos deixar ninguém entrar!"
62100-6 = "Eu sei muito bem que vocês não me veem com bons olhos."
62100-7 = "Mas nada vai mudar se continuarmos apenas em conflito...!"
62100-8 = "Nós só viemos aqui para conversar com o Subaru!"
62100-9 = "Além disso, a entrada neste local não deveria estar estritamente proibida?"
62100-11 = "B-bem, mesmo que você diga isso...!"
62100-12 = "O que a gente faz...?"
62100-13 = "Mas o Subaru-senpai disse... para proteger este lugar."
62100-14 = "Ué...? Mas ele não disse para montar uma posição defensiva...?"
62100-15 = "Ele disse para não deixar ninguém entrar, então dá no mesmo!"
62100-16 = "Por favor, deem meia-volta! #nSe não, não teremos escolha a não ser atirar—"
62100-21 = "Q-quem está aí!?"
62100-22 = "Ah, desculpe... #nEu ouvi a palavra 'atirar', então acabei reagindo..."
62100-27 = "...Fomos baleados."
62100-28 = "É, fomos baleados."
62100-29 = "Eu meio que já esperava por isso..."
62100-31 = "V-vocês estão bem!? Não são inimigos demais...?"
62100-32 = "Não precisa se preocupar."
62100-33 = "...O quê? Por que tanta confiança!?"
62100-35 = "Mesmo que você diga isso..."
62100-36 = "Acho que é mais rápido mostrar do que explicar."
62100-37 = "Sendo assim, Sensei. Conto com você."
62100-38 = "[s] \"Por que as coisas sempre acabam assim...?\""
62100-39 = "Isso é..."
62100-41 = "Talvez seja porque esse é o estilo Arius."
