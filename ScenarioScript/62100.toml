[translation]
62100-1 = "Episódio 10; O Ninho"
62100-3 = "Por favor, veterana Saori! Vá embora, eu te imploro!"
62100-4 = "Nós recebemos ordens para proteger este lugar! Não podemos deixar ninguém entrar!"
62100-6 = "Eu sei muito bem que vocês não nos veem com bons olhos."
62100-7 = "Mas ficar apenas batendo de frente não vai mudar nada...!"
62100-8 = "Nós só viemos aqui para conversar com a Subaru!"
62100-9 = "Para começo de conversa, a entrada neste lugar não deveria ser estritamente proibida?"
62100-11 = "M-Mesmo que você diga isso...!"
62100-12 = "O que a gente faz...?"
62100-13 = "Mas a veterana Subaru disse... para proteger este lugar."
62100-14 = "Ué...? Mas ela não tinha dito para montarmos uma base...?"
62100-15 = "Ela disse para não deixar ninguém entrar ou sair, então dá no mesmo!"
62100-16 = "É melhor vocês darem meia-volta! #nDo contrário, não teremos escolha a não ser atirar――"
62100-21 = "Q-Quem está aí?!"
62100-22 = "Ah, desculpa... #nÉ que eu ouvi a palavra 'atirar' e acabei reagindo sem querer..."
62100-27 = "...Eles atiraram na gente."
62100-28 = "É, atiraram."
62100-29 = "Eu meio que já estava prevendo isso, mas..."
62100-31 = "V-Vocês estão bem?! Não tem oponentes demais ali...?"
62100-32 = "Não precisa se preocupar."
62100-33 = "...C-Como vocês conseguem ter tanta confiança?!"
62100-35 = "Mesmo que você me pergunte isso..."
62100-36 = "Acho que vai ser mais rápido se a gente te mostrar."
62100-37 = "Então, Sensei. Contamos com você."
62100-38 = "[s] \"Por que sempre tem que terminar desse jeito...?\""
62100-39 = "Isso é..."
62100-41 = "Porque esse é o estilo de Arius, eu acho."