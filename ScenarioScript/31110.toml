[translation]
31110-1 = "Episódio 11;Faxina Geral!"
31110-2 = "Então, primeiro, vamos começar arrancando o mato ao redor do prédio!"
31110-3 = "Hoje o sol tá forte, então cuidado com a insolação, viu."
31110-8 = "Sii~m♪"
31110-9 = "Arrancar mato…… b-bom, tanto faz……."
31110-10 = "Sei. De fato, remover, ao redor do quartel-general, os pontos onde o inimigo poderia se esconder é bem razoável."
31110-15 = "É que…… e-enfim, primeiro a gente arruma a volta do prédio, e depois cada uma limpa um lugar; nessa ordem, por favor!"
31110-16 = "Bom, vamos começar!"
31110-20 = "Arrancaram todo o mato ao redor do alojamento e recolheram as tranqueiras que estavam largadas."
31110-22 = "Área residencial - Corredor"
31110-23 = "Aqui, primeiro varrer a poeira com a vassoura e, depois, o esfregão parece bom."
31110-24 = "É um lugar onde a poeira se acumula fácil, então talvez não termine de primeira, mas……."
31110-25 = "Tranquilo, sem problema."
31110-26 = "Azusa, quando terminar este corredor, será que dá pra você cuidar da parte dos chuveiros e do banheiro?"
31110-27 = "Sim, entendido. Deixa comigo."
31110-30 = "Varrendo e esfregando várias vezes……"
31110-31 = "e começando a limpar, em ordem, também os outros lugares."
31110-33 = "Alojamento de Acampamento - Saguão"
31110-34 = "Cof, cof……! Que é isso, quanta poeira……."
31110-35 = "Pois é, deve ser porque tem muito móvel…… é que, então, aqui também vamos varrer a poeira――"
31110-36 = "N-não precisa, eu sei como faz! No Comitê de Realização da Justiça eu faço isso o tempo todo!"
31110-37 = "Bota a máscara, sacode a poeira e depois passa o pano úmido, né! Não me subestima!"
31110-38 = "N-não era minha intenção te subestimar……? Então, aqui deixo com você, Koharu!"
31110-41 = "A poeira do saguão logo foi varrida, e os móveis também ficaram limpinhos."
31110-43 = "É que, aqui é……."
31110-44 = "Hifumi, aqui deixa comigo."
31110-45 = "É um lugar que a gente vai usar bastante daqui pra frente, então tem que limpar direitinho, né."
31110-46 = "Se eu lavar e pendurar as roupas de cama agora, de tarde já devem estar secas……."
31110-47 = "Tinha colchão em outros quartos também, então troco os que parecem velhos…… e depois faço a ventilação……."
31110-48 = "Nossa, você entende do assunto! Então, conto com você, Hanako."
31110-49 = "Ufufu, sim♡"
31110-53 = "Alojamento de Acampamento - Sala de aula"
31110-56 = "Alojamento de Acampamento - Ginásio"
31110-59 = "Alojamento de Acampamento - Cozinha simples e refeitório"
31110-62 = "[ns] \"É mais ou menos isto……?\""
31110-63 = "Não tá bom? Deu uma boa melhorada, tenho a impressão. É, dá uma sensação boa."
31110-64 = "……Sim, nada mau."
31110-65 = "Pois é, bom trabalho!"
31110-69 = "Ah, ainda falta só um lugar, viu?"
31110-70 = "Ué, faltava……?"
31110-71 = "Sim, a piscina ao ar livre♡"
31110-72 = "P-piscina……? Ah, é mesmo, agora há pouco……"
31110-75 = "Isto é……."
31110-76 = "É bem grande; por onde começar…… aliás, no reforço não tinha a matéria de natação, tinha?"
31110-77 = "Se não tem a ver com a prova, dá pra deixar assim mesmo, né. Precisa limpar?"
31110-81 = "Que nada; pensa bem, Koharu."
31110-82 = "Uma piscina cheia de água que brilha reluzente, um acampamento divertido, alunas se esbaldando……"
31110-87 = "……Não começa a bater aquela empolgação?"
31110-88 = "……!? Hã, quê!? Não entendi, você tá falando alguma coisa avançada que eu não entendo!?"
31110-89 = "Mas, de fato, olhando esta piscina largada assim…… bate uma tristeza, né."
31110-90 = "Com esse tamanho, deve ter havido uma época em que era usada. Originalmente, talvez fosse um lugar onde ressoavam vozes animadas."
31110-91 = "E, ainda assim, acaba mudando desse jeito. \"Vanitas vanitatum\"…… essa é a verdade deste mundo."
31110-95 = "É que……?"
31110-96 = "É uma expressão antiga, \"tudo é vão\"…… de fato, talvez seja assim."
31110-97 = "……."
31110-98 = "……Azusa, Hifumi, Koharu!"
31110-103 = "Vamos brincar agora!"
31110-104 = "H-hãã!?"
31110-105 = "Vamos limpar agora, encher a piscina de água e todo mundo pular dentro!"
31110-106 = "A partir de amanhã a gente vai ter que estudar sem parar, então talvez hoje seja a última chance."
31110-107 = "Enquanto dá, a gente tem que brincar bastante aqui! Porque, a partir de certo ponto, a gente pode acabar cansada com outras coisas……!"
31110-108 = "Vamos, vamos, troquem logo pra uma roupa que pode molhar! Vamos começar a limpeza da piscina!"
31110-109 = "……Sim. Mesmo que tudo seja vão, isso não é motivo pra não dar o melhor hoje."
31110-110 = "Tranquilo, trouxe maiô também. Espera."
31110-115 = "A-Azusa!? Que rápido……!?"
31110-116 = "Vamos, Hifumi! Koharu, rápido, o maiô…… não, qualquer coisa serve, uma roupa que pode molhar!"
31110-117 = "[s] \"O olhar da Hanako tá dando um medo……\""
31110-118 = "Hmm, mas, de fato, deixar só este lugar sem limpar dá uma sensação ruim…… eu também vou trocar de roupa!"
31110-119 = "H-hãã!? Isso não tem nada a ver com o reforço…… uu, por quê……."
31110-120 = "Ufu, Koharu♡"
31110-127 = "T-tá bom! Já entendi!! Não chega perto em silêncio!"
31110-129 = "……."
31110-130 = "……."
31110-131 = "……."
31110-135 = "Muito bem, com isto, agora tanto faz se a gente ficar toda encharcada♡"
31110-136 = "Sim, sem problema."
31110-137 = "B-bom, por via das dúvidas……."
31110-138 = "Então, vamos todo mundo começar a limpar?"
31110-142 = "Peraí, peraí, peraí!!"
31110-143 = "Koharu? Aconteceu alguma coisa?"
31110-144 = "Você, na faxina, de maiô, e agora de uniforme, por quê!? Você é boba de verdade!? \"Roupa que pode molhar\" foi você mesma que falou, né!?"
31110-145 = "Isto é \"uma roupa que pode molhar\", viu?"
31110-146 = "Já não entendo mais nada do que você fala! O uniforme pode molhar!?"
31110-147 = "Koharu, isto talvez seja uma questão da estética de cada uma, mas……"
31110-148 = "Hã, estética……?"
31110-149 = "Maiô e uniforme: qual dos dois você acha que fica \"com um ar melhor\" quando molha?"
31110-150 = "H-hãã!? Que \"ar melhor\" o quê!? Que papo é esse!?"
31110-151 = "Ufu, bom, metade é brincadeira. Ó, na verdade eu tô com ele por baixo. Um biquíni que eu comprei com a minha mesada♡"
31110-152 = "Hã, quê……?"
31110-153 = "Agora há pouco a Koharu me disse que \"tá proibido usar maiô\", e de fato, na escola, o maiô escolar é o certo…… mas, hoje, será que dá pra me perdoar com este aqui?"
31110-154 = "O maiô escolar tá na lavagem agora, e, se este não puder, eu, por baixo, não tenho nada……"
31110-155 = "P-por que você joga a decisão pra mim……! F-faz o que quiser, oras……!?"
31110-157 = "Ufufu, então tá combinado♪"
31110-158 = "Reforçando, vamos começar a faxina!"
31110-171 = "Olhem, um arco-íris! Um arco-íris!"
31110-172 = "Hiá!? P-peraí, Hanako, tá gelada!"
31110-173 = "Ufu, parece ser água puxada do lago de Trinity, então dá pra abrir a boca e beber assim mesmo, viu?"
31110-174 = "P-por que isso foi acontecer……."
31110-175 = "Este bloco aqui foi concluído. Prossigo prontamente para aí."
31110-177 = "E, depois de todo mundo terminar a limpeza, começaram a encher a piscina, mas……."
31110-178 = "levou mais tempo do que se imaginava, e, quando a água encheu a piscina, o dia já havia anoitecido."
31110-180 = "Próximo Episódio;A Noite do Primeiro Dia de Acampamento"
