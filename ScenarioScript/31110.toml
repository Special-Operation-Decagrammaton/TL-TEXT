[translation]
31110-1 = "Episódio 11: Grande Limpeza!"
31110-2 = "Então, vamos começar tirando as ervas daninhas ao redor do prédio!"
31110-3 = "Hoje o sol tá bem forte, então tomem cuidado com insolação, tá?"
31110-8 = "Oookay♪"
31110-9 = "Tirar mato… b-bom, não é nada demais…"
31110-10 = "Entendi. Faz sentido limpar os pontos onde inimigos poderiam se esconder ao redor da base."
31110-15 = "Então… primeiro vamos limpar a parte de fora do prédio, depois cada um pega uma área pra limpar por dentro, combinado?"
31110-16 = "Vamos começar!"
31110-20 = "Depois de tirar todas as ervas daninhas ao redor do prédio e recolher o lixo acumulado."
31110-22 = "Corredor da Área Residencial"
31110-23 = "Aqui primeiro varrer a poeira com a vassoura e depois passar o pano molhado deve ser bom."
31110-24 = "É um lugar que acumula bastante poeira, então pode ser que não dê pra terminar de uma vez…"
31110-25 = "Tranquilo, sem problema."
31110-26 = "Azusa-chan, depois que terminar esse corredor, pode cuidar da área dos chuveiros e banheiros?"
31110-27 = "Sim, entendi. Deixa comigo."
31110-30 = "Depois de varrer e passar pano várias vezes…"
31110-31 = "Os outros lugares também foram sendo limpos um por um."
31110-33 = "Lobby do Anexo"
31110-34 = "Cof, cof……！ Que poeira absurda…"
31110-35 = "Realmente, deve ser por causa de tanta mobília… então, vamos varrer a poeira primeiro——"
31110-36 = "Eu já sei como fazer！ Faço isso o tempo todo no Comitê de Execução da Justiça！"
31110-37 = "Coloca máscara, tira a poeira e depois passa pano molhado, né！? Não me subestima！"
31110-38 = "N-não foi pra te subestimar… então, esse lugar fica por sua conta, Koharu-chan！"
31110-41 = "A poeira do lobby foi sumindo rapidinho, e os móveis também foram ficando brilhantes."
31110-43 = "Aqui é…"
31110-44 = "Hifumi-chan, deixa esse lugar comigo."
31110-45 = "Como vamos passar um tempo aqui, melhor deixar tudo bem limpo."
31110-46 = "Os lençóis e cobertores, se lavar agora e estender, devem secar até a tarde…"
31110-47 = "Tinha colchões nos outros quartos também, então vou trocar os mais velhos… e depois ventilar…"
31110-48 = "Nossa, você é super detalhista！ Então fica por sua conta, Hanako-chan."
31110-49 = "Ufufu, pode deixar♡"
31110-53 = "Sala de Aula do Anexo"
31110-56 = "Ginásio do Anexo"
31110-59 = "Cozinha/Refeitório Simples do Anexo"
31110-62 = "[ns] \"Acho que é isso…？\""
31110-63 = "Tá bom, né? Ficou bem mais limpo. Sim, tá agradável."
31110-64 = "……Sim, não tá ruim."
31110-65 = "Realmente, bom trabalho todo mundo！"
31110-69 = "Ah, ainda tem um lugar faltando."
31110-70 = "Ah, é mesmo…？"
31110-71 = "Sim, a piscina ao ar livre♡"
31110-72 = "P-piscina……？ Ah, é verdade, eu vi mais cedo…"
31110-75 = "Isso aqui…"
31110-76 = "É bem grande… por onde começar… aliás, a prova não tem natação, né?"
31110-77 = "Se não tem relação com a prova, pode deixar assim. Precisa limpar mesmo?"
31110-81 = "Não, não, pensa bem, Koharu-chan."
31110-82 = "Uma piscina brilhando com água cristalina, um acampamento divertido, alunas se divertindo… não fica animada?"
31110-87 = "……！？ Eh, o quê！？ Não tô entendendo, você tá falando alguma coisa complicada！？"
31110-88 = "Mas realmente, ver uma piscina abandonada assim… dá uma sensação de tristeza, né."
31110-89 = "Era um tamanho bom, provavelmente era usada bastante antigamente. Devia ser um lugar cheio de vozes alegres."
31110-90 = "Mesmo assim, acabou ficando assim. «Vanitas vanitatum»…… essa é a verdade desse mundo."
31110-95 = "Eh……？"
31110-96 = "É uma frase antiga. [ruby=vanitas vanitatum]「Tudo é vaidade」[/ruby]…… realmente, deve ser isso."
31110-97 = "……。"
31110-98 = "……Azusa-chan, Hifumi-chan, Koharu-chan！"
31110-103 = "Vamos brincar agora！"
31110-104 = "Eh, ehh！？"
31110-105 = "Vamos limpar a piscina, encher de água e pular dentro！"
31110-106 = "Amanhã vamos ter que estudar sério o dia todo, então hoje pode ser a última chance de nos divertir."
31110-107 = "Se não brincarmos agora, depois vamos ficar cansadas com outras coisas……！"
31110-108 = "Vamos, troquem pra roupas que possam molhar e vamos começar a limpar a piscina！"
31110-109 = "……Sim. Mesmo que tudo seja vaidade, isso não é motivo pra não dar o melhor hoje."
31110-110 = "Sem problema, eu trouxe biquíni. Esperem aí."
31110-115 = "E-eh, Azusa-chan！？ Tão rápido……！？"
31110-116 = "Vamos, Hifumi-chan também！ Koharu-chan também, troca pra qualquer roupa que possa molhar！"
31110-117 = "[s] \"Os olhos da Hanako tão meio assustadores……\""
31110-118 = "Humm, mas realmente deixar só essa parte suja é estranho… eu também vou trocar！"
31110-119 = "Eh, ehh！？ Isso não tem nada a ver com o reforço de estudos…… uuu, por quê……"
31110-120 = "Ufufu, Koharu-chan♡"
31110-127 = "T-tá bom！ Tá bom！！ Não chega perto em silêncio！"
31110-129 = "……。"
31110-130 = "……。"
31110-131 = "……。"
31110-135 = "Pronto, agora pode se molhar à vontade♡"
31110-136 = "Sim, sem problema."
31110-137 = "B-bom, por enquanto…"
31110-138 = "Então, vamos começar a limpeza todo mundo junto？"
31110-142 = "Espera espera espera！！"
31110-143 = "Koharu-chan？ Aconteceu alguma coisa？"
31110-144 = "Por que você veio de biquíni pra limpar a piscina e agora tá de uniforme！？ Tá maluca mesmo！？ Você mesma disse «roupa que possa molhar»！？"
31110-145 = "Essa é a «roupa que pode molhar»."
31110-146 = "Não tô entendendo mais nada que você fala！ Uniforme pode molhar assim！？"
31110-147 = "Koharu-chan, isso pode ser uma questão de estética de cada um, mas…"
31110-148 = "Eh, estética……？"
31110-149 = "Biquíni ou uniforme, qual você acha que fica mais «gostoso» quando molhado？"
31110-150 = "Hã！？ O que é «gostoso» nisso！？ Do que você tá falando！？"
31110-151 = "Ufufu, metade é brincadeira. Olha, na verdade eu tô usando por baixo. Um biquíni que comprei com minha mesada♡"
31110-152 = "Eh, eh……？"
31110-153 = "Como a Koharu-chan proibiu o biquíni, e o regulamento da escola pede o maiô escolar, mas… hoje você me deixa usar esse？"
31110-154 = "O maiô escolar tá lavando agora, se esse também não pode, então eu não vou ter nada por baixo…"
31110-155 = "P-por que você tá me pedindo pra decidir……！？ F-faz o que quiser……！？"
31110-157 = "Ufufu, então tá decidido♪"
31110-158 = "Então, vamos começar a limpeza de novo！"
31110-171 = "Olha, um arco-íris！ Arco-íris！"
31110-172 = "Hyaa！？ Ei, Hanako-chan, tá frio demais！"
31110-173 = "Fufu, a água vem do lago de Trinity, então dá pra beber abrindo a boca, tá bom？"
31110-174 = "C-como a gente acabou fazendo isso……"
31110-175 = "Esse bloco tá completo. Vou pro próximo rapidinho."
31110-177 = "Depois que todo mundo terminou a limpeza e encheu a piscina de água… já tinha anoitecido."
31110-178 = "A imaginação era maior que o tempo, e quando a piscina encheu, o sol já tinha se posto."
31110-180 = "Próximo; Primeira Noite do Acampamento"