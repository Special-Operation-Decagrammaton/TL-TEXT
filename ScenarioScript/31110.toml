[translation]
31110-1 = "Episódio 11; Faxina Geral!"
31110-2 = "Então, primeiro, vamos começar arrancando o mato ao redor do prédio!"
31110-3 = "O sol está forte hoje, então tomem cuidado com a insolação."
31110-8 = "Certo♪"
31110-9 = "Arrancar... mato... b-bem, tanto faz..."
31110-10 = "Entendo. De fato, remover pontos onde inimigos poderiam se esconder ao redor da base é uma decisão lógica."
31110-15 = "Bem... d-de qualquer forma, depois que terminarmos ao redor do prédio, por favor, sigam a ordem de limpar um local de cada vez!"
31110-16 = "Vamos começar!"
31110-20 = "Arrancamos o mato ao redor do alojamento e recolhemos as tralhas que estavam abandonadas."
31110-22 = "Área Residencial - Corredor"
31110-23 = "Aqui, o melhor é varrer a poeira com uma vassoura e depois passar um esfregão."
31110-24 = "É um lugar onde a poeira acumula fácil, então talvez não baste fazer apenas uma vez..."
31110-25 = "Tudo bem, sem problemas."
31110-26 = "Azusa-chan, depois que terminar este corredor, poderia cuidar da área do chuveiro e do banheiro?"
31110-27 = "Sim, entendido. Pode deixar comigo."
31110-30 = "Varremos e passamos pano várias vezes..."
31110-31 = "Começamos a limpar os outros lugares, um por um."
31110-33 = "Alojamento - Lobby"
31110-34 = "Cof, cof...! O que é isso, quanta poeira..."
31110-35 = "Pois é, talvez seja porque tem muitos móveis... bem, então vamos varrer a poeira aqui também—"
31110-36 = "E-eu sei como fazer! Eu faço isso o tempo todo no Comitê de Justiça!"
31110-37 = "É só colocar uma máscara, tirar a poeira e depois passar um pano úmido, né! Não me subestime!"
31110-38 = "E-eu não tive a intenção de te subestimar...? Então, Koharu-chan, deixo este lugar com você!"
31110-41 = "A poeira do lobby foi varrida rapidamente e os móveis ficaram limpos."
31110-43 = "Bem, aqui é..."
31110-44 = "Hifumi-chan, deixe isso comigo."
31110-45 = "Este é um lugar onde vamos passar muito tempo, então precisamos deixá-lo bem limpo, não é?"
31110-46 = "Se lavarmos e estendermos a roupa de cama agora, deve secar à tarde..."
31110-47 = "Vi que tinham colchões nos outros quartos também, então vou trocar os que parecem velhos... e depois ventilar..."
31110-48 = "Nossa, você entende muito disso! Então, por favor, Hanako-chan."
31110-49 = "Ufufu, sim♡"
31110-53 = "Alojamento - Sala de Aula"
31110-56 = "Alojamento - Ginásio"
31110-59 = "Alojamento - Cozinha Compacta e Refeitório"
31110-62 = "[ns] \"Será que é isso...?\""
31110-63 = "Não está bom? Sinto que ficou bem limpo. Sim, é uma sensação boa."
31110-64 = "……Sim, não está ruim."
31110-65 = "Pois é, bom trabalho a todos!"
31110-69 = "Ah, ainda falta um lugar, sabia?"
31110-70 = "Ué, faltava...?"
31110-71 = "Sim, a piscina externa♡"
31110-72 = "P-piscina...? Ah, falando nisso, agora pouco..."
31110-75 = "Isso é..."
31110-76 = "É bem grande, por onde devemos começar... aliás, não deveria ter natação nas aulas de reforço, certo?"
31110-77 = "Se não cai na prova, não tem problema deixar assim, né? Precisa mesmo limpar?"
31110-81 = "Não, não, pense bem, Koharu-chan."
31110-82 = "Uma piscina cheia de água brilhante, um acampamento divertido, alunas brincando por toda parte..."
31110-87 = "……Não parece divertido?"
31110-88 = "……!? O quê, o quê!? Não entendi, estão falando de algo avançado que eu não sei!?"
31110-89 = "Mas, de fato, ao ver a piscina abandonada assim... dá uma sensação de tristeza, não é?"
31110-90 = "Era deste tamanho, então certamente houve uma época em que foi usado. Talvez este lugar tenha sido, originalmente, um local onde vozes alegres ecoavam."
31110-91 = "Ainda assim, tudo acaba mudando assim. \"Vanitas vanitatum\"... essa é a verdade deste mundo."
31110-95 = "Hã...?"
31110-96 = "É uma expressão antiga, \"tudo é vaidade\"... certamente, pode ser que seja assim mesmo."
31110-97 = "……."
31110-98 = "……Azusa-chan, Hifumi-chan, Koharu-chan!"
31110-103 = "Vamos brincar agora!"
31110-104 = "E-ehhh!?"
31110-105 = "Vamos limpar tudo agora, encher a piscina de água e pular lá dentro juntas!"
31110-106 = "A partir de amanhã teremos que nos esforçar nos estudos, então hoje pode ser nossa última chance, não é?"
31110-107 = "Temos que aproveitar para nos divertir aqui enquanto podemos! Depois, talvez fiquemos cansadas com outras coisas..."
31110-108 = "Vamos, vamos, troquem logo para roupas que possam molhar! Vamos começar a limpar a piscina!"
31110-109 = "……Sim. Mesmo que tudo seja vaidade, isso não é motivo para não darmos o nosso melhor hoje."
31110-110 = "Sem problemas, eu trouxe meu traje de banho. Me espere."
31110-115 = "A-Azusa-chan!? Que rápida...!?"
31110-116 = "Vamos, Hifumi-chan também! E Koharu-chan, vista logo seu traje de banho... ou melhor, qualquer roupa que possa molhar!"
31110-117 = "[s] \"O olhar da Hanako está meio assustador...\""
31110-118 = "Hmm, mas é verdade que deixar só essa parte sem limpar é um pouco incômodo... Eu também vou me trocar!"
31110-119 = "E-ehhh!? Isso não tem nada a ver com as aulas de reforço... Ugh, por que..."
31110-120 = "Fufu, Koharu-chan♡"
31110-127 = "Tá, eu entendi! Eu já entendi!! Não chegue perto sem dizer nada!"
31110-129 = "……."
31110-130 = "……."
31110-131 = "……."
31110-135 = "Pronto, agora não importa se ficarmos encharcadas, certo?♡"
31110-136 = "Sim, sem problemas."
31110-137 = "B-bem, mais ou menos..."
31110-138 = "Então, vamos começar a limpeza juntas?"
31110-142 = "Espere, espere, espere!!"
31110-143 = "Koharu-chan? Aconteceu alguma coisa?"
31110-144 = "Você disse para usar traje de banho para limpar, então por que está de uniforme agora!? Você é idiota!? Não foi você mesma que disse \"roupas que possam molhar\"!?"
31110-145 = "Este é o meu \"traje que pode molhar\"."
31110-146 = "Eu não entendo o que você está dizendo! Tudo bem molhar o uniforme!?"
31110-147 = "Koharu-chan, isso pode ser uma questão de estética pessoal, mas..."
31110-148 = "Hã, estética...?"
31110-149 = "Entre um traje de banho e um uniforme, qual você acha que fica com um \"visual melhor\" quando está molhado?"
31110-150 = "Hã, o quê!? O que é \"visual melhor\"!? Do que você está falando!?"
31110-151 = "Fufu, é só uma brincadeira. Veja, na verdade eu estou usando por baixo. Um biquíni que comprei com minha mesada♡"
31110-152 = "E-eh...?"
31110-153 = "Você me disse anteriormente que o uso de trajes de banho era proibido, e embora o traje escolar seja o padrão na escola... não poderia me perdoar com isso hoje?"
31110-154 = "O traje escolar está lavando, e se isso não servir, eu não estaria usando nada por baixo..."
31110-155 = "P-por que você está deixando a decisão para mim...! B-bem, faça o que quiser...!?"
31110-157 = "Ufufu, então está decidido♪"
31110-158 = "Vamos começar a limpeza de verdade agora!"
31110-171 = "Olhem, um arco-íris! Um arco-íris!"
31110-172 = "Hya!? Espere, Hanako-chan, está gelado!"
31110-173 = "Fufu, parece que a água vem do lago de Trinity, então pode abrir a boca e beber se quiser."
31110-174 = "P-por que as coisas chegaram a esse ponto..."
31110-175 = "Terminei este bloco. Vou seguir rapidamente para o próximo."
31110-177 = "Depois que todas terminaram a limpeza, começaram a encher a piscina, mas..."
31110-178 = "Levou mais tempo do que eu imaginava, e quando a piscina finalmente encheu, o sol já tinha se posto."
31110-180 = "Próximo episódio: A primeira noite do acampamento"
