[translation]
1004303-1 = "ただ約束を守りたくて"
1004303-2 = "（花火大会の準備をするべく、海にやってきた）"
1004303-7 = "いやぁ、お陰様で大変助かりましたよ[USERNAME]先生。"
1004303-8 = "[s] \"いえ、これくらいのことでしたら全然。\""
1004303-9 = "またまたぁ、ご謙遜なさらずに。"
1004303-14 = "失礼いたします。[USERNAME]先生にお会いしたいというお客様が……。"
1004303-18 = "[ns] \"私に来客……？まさか……。\""
1004303-25 = "[ns] \"やっぱり……ワカモ……！\""
1004303-29 = "うふふっ……そんな熱烈に歓迎していただけるなんて……このワカモ、感涙に咽び泣いてしまいそうです♡"
1004303-30 = "[s] \"仕事が終わった後に会おうって……。\""
1004303-32 = "ええ……"
1004303-33 = "あなた様はそう「約束」してくださりました。"
1004303-34 = "ですので、このワカモ……モモトークの後からずっとお待ちしておりました。"
1004303-35 = "ええ……一日千秋の思いでお待ちして……そうして、お仕事が終わったタイミングを見計らってお迎えに上がったのです♡うふふっ。"
1004303-36 = "[s] \"うん！そうだと思ったけどさぁ！\""
1004303-37 = "もしかして……私、あなた様にご迷惑をおかけしてしまいましたか……？"
1004303-38 = "お迎えに上がることが、あなた様のご迷惑になってしまうのであれば……その……。"
1004303-39 = "[s] \"そんなことはないよ……でも、まだ仕事が……。\""
1004303-48 = "そういうご事情でしたら大丈夫です。もうほとんど終わっておりますし。"
1004303-49 = "あとはうちの商会にお任せください！先生、お疲れ様でした！"
1004303-50 = "[s] \"それではお言葉に甘えて……じゃあ、一緒に行こうか？\""
1004303-55 = "うふふっ。ええ、もちろんです！"
1004303-61 = "[ns1] \"一緒に出たのはいいものの……。\"\n[ns2] \"これから一体何をすれば……。\""
1004303-67 = "うふふっ、お任せください。計画なら入念に立ててまいりました。"
1004303-68 = "今日という日を、あなた様にとって完璧な一日にするための「約束」。"
1004303-69 = "名づけて……"
1004303-70 = "「ワカモの完璧サマーデートプラン」を！"
1004303-71 = "……時に先生、夏の海で最も欠かせないものは何だと思いますか？"
1004303-72 = "[s3] \"うーん……なかなか一つに決められないなぁ。\"\n[s4] \"密かに持ち出した、学園の備品用戦車とか……？\""
1004303-73 = "うふふ、ご安心ください。このワカモが様々なプランをご用意して参りましたので。"
1004303-74 = "えっ？備品？戦車……？"
1004303-75 = "ええと、申し訳ございません……あなた様の仰ることがよく理解できず……。"
1004303-76 = "それではまず、お腹を満たす事に致しましょう。"
1004303-77 = "ふふっ……この間果たせなかった「約束」を今度こそ成し遂げましょうね。"
1004303-78 = "[s] \"……？\""
1004303-84 = "いらっしゃいませ！お客様二名様、入りまーす！"
1004303-85 = "[s] \"ここは……海の家？\""
1004303-86 = "ええ、そうです。"
1004303-87 = "この間、あなた様が「かき氷を食べたい」と仰ってくださったのに、結局果たせなかったと思いまして……。"
1004303-88 = "[s] \"うん……気にかけてくれてたんだね。\""
1004303-91 = "うふふっ……ここではカップル専用のフルーツ……えぇと……フルーツなんとかのかき氷が人気らしく。"
1004303-92 = "ええ……このワカモ、あなた様と寄り添って、このかき氷を食べさせあえたらな、と。"
1004303-93 = "ふふっ。そういうプランを組んでまいりました。いかがでしょう？"
1004303-97 = "お待ちどうさまです！こちら「フルーツシロップと果肉たっぷりの夏を制する最強王者降臨かき氷！」です！"
1004303-98 = "[s] \"呪文みたいな名前だ……！\""
1004303-100 = "さあ、あなた様……おそばに失礼いたしますね。"
1004303-106 = "そう、口をゆっくり開けて……はい♡私のすくった愛情たっぷりのかき氷を……どうぞ召し上がれ♡"
1004303-107 = "[s] \"あーん……ぱくっ\""
1004303-112 = "[ns] \"うん、おいしいね。\""
1004303-113 = "あ、ああ……そ、そんなに迷わず一口で……私の愛を……。"
1004303-114 = "このワカモ……火照ってしまいそうです……。"
1004303-115 = "[s] \"次はワカモの番だよ。\""
1004303-116 = "え？私の番……？で、ですが。"
1004303-120 = "[ns] \"はい、あーん。\""
1004303-124 = "あ、あなた様手ずからの「あーん」だなんて……"
1004303-125 = "あああ、わ、私は、こ、このワカモは……。"
1004303-126 = "うう……で、では失礼して……。"
1004303-132 = "[ns] \"あっ！ワカモごめん。ちょっと待ってね……\""
1004303-135 = "お忙しいところ急に申し訳ございません！"
1004303-136 = "花火大会関連でトラブルが……！"
1004303-140 = "[ns] \"ごめんワカモ、ちょっと火急の用が……。\""
1004303-141 = "ええ、"
1004303-142 = "大丈夫です。"
1004303-143 = "あなた様はいつも多事多忙の身。このワカモ、弁えておりますので……。"
1004303-144 = "いってらっしゃいませ……ここで、お待ちしておりますね。"
1004303-145 = "[s] \"ごめんね！すぐ戻るから！\""
1004303-151 = "（そうして仕事を片付ける間に、かき氷はすべて溶けてしまった）"
1004303-154 = "[ns] \"本当にごめん……！また新しく注文し直そうか……。\""
1004303-155 = "とんでもないです！あなた様が謝ることではございません……！"
1004303-156 = "私のプランはまだ始まったばかりですから！"
1004303-160 = "さあ、次へ参りましょう！"
1004303-161 = "[s] \"うん……ごめんね。\""
1004303-164 = "次のプランは他でもなく……。"
1004303-165 = "この間、あなた様とできなかった水遊びを楽しもうと思いまして……。"
1004303-166 = "[s] \"たしかに海なら色んな水遊びが楽しめるね。何をしようか？\""
1004303-167 = "ええ……ですが、私がやってみたいのはただの水遊びではなく……その……。"
1004303-168 = "[s] \"……？\""
1004303-169 = "恋人同士、浜辺で行えるユニークな独特の「遊び」があると小耳に挟みまして。"
1004303-170 = "私、それをずっとやってみたいと思っていたのです……。"
1004303-171 = "[s] \"へぇ、それはどんな遊びなの？\""
1004303-172 = "今や世間では絶滅してしまい、探すのが極めて難しくなってしまったという伝説的なイベント……。"
1004303-176 = "「アハハ、ワタシを捕まえてごらん～」です……！"
1004303-177 = "[s] \"かなりベタな……！\""
1004303-178 = "おかしいでしょうか……少し、その、お恥ずかしいかもしれませんが。"
1004303-179 = "愛を分かち合う恋人同士なら、海でこういった遊びをすると伺いまして……。"
1004303-180 = "[s] \"いや……全然おかしい事ではないんだけど……。\""
1004303-181 = "それでは……恥を忍んで、始めてみましょうか。"
1004303-182 = "さあ……身も心もすべて準備が整いました。"
1004303-183 = "あとはあなた様の……。"
1004303-187 = "[ns] \"……ん？\""
1004303-188 = "どうか……[ruby=・   ・   ・]私から[/ruby]、全力で逃げていただけますか？"
1004303-189 = "あなた様を手に入れるためでしたら、このワカモ……"
1004303-190 = "世界の果てまでだって追いかけてみせますとも！うふふっ……！"
1004303-191 = "[s] \"ま、待って！ワカモと私が想像してるイベントが違うんじゃない！？\""
1004303-192 = "絶対に、逃しません……"
1004303-198 = "あ・な・た・様♡"
1004303-203 = "[ns] \"ご、ごめんワカモ！電話が！ちょっと待ってね！"
1004303-204 = "あっ……。"
1004303-208 = "お忙しいところすみません、[USERNAME]先生！アレが準備過程から漏れてしまっておりまして！"
1004303-209 = "申し訳ございませんが至急……。"
1004303-213 = "[ns] \"ごめん、ワカモ……！急用が……！\""
1004303-214 = "あっ……ええ……。"
1004303-215 = "私、お待ちしておりますので……どうぞお気をつけて……。"
1004303-217 = "（その後も、ワカモが用意してくれたサマーデートプランを実行しようとする度に、シャーレの仕事で席を外すことを余儀なくされ……）"
1004303-220 = "あ、先生……。"
1004303-226 = "あの、あなた様と一緒に……。"
1004303-232 = "ええと……。"
1004303-234 = "（そうして怒濤のように押し寄せてくる仕事を処理していたら、いつのまにかすっかり日が暮れてしまっていた）"
1004303-237 = "[ns] \"ごめんワカモ……本当にごめん！\""
1004303-238 = "うふふっ。私は大丈夫ですよ、先生。"
1004303-239 = "あなた様がご多忙を極めていることは、このワカモよく存じ上げておりますから。"
1004303-240 = "今から、私が用意した「ワカモの完璧サマーデートプラン」に沿って……。"
1004303-244 = "最後は、あなた様と一緒に夕暮れの海を見つめながら――"
1004303-250 = "[ns5] \"ごめん、また花火大会関連の連絡みたい。\"\n[ns6] \"この埋め合わせはまた……。\""
1004303-251 = "うふふっ、ええ、大丈夫です。"
1004303-252 = "うふふっ、ええ、大丈夫です。"
1004303-253 = "お気をつけていってらっしゃいませ。"
1004303-254 = "[s] \"ごめん！\""
1004303-258 = "……花火大会。"
1004303-259 = "私とあなた様の時間を……何度も、何度も……。"
1004303-260 = "よくも、よくも……よくも……！"
1004303-261 = "……花火大会ごときが、私たちの邪魔をするなんて……。"
1004303-265 = "ああ……それなら……。"
1004303-266 = "うふふふ……約束を守るために……。"
1004303-267 = "ええ……簡単な、事でしたね。"
1004303-269 = "いやあ～[USERNAME]先生。大変お手数をおかけしました。"
1004303-270 = "お陰様でお祭りの準備は完璧に終わりましたわい。"
1004303-271 = "[s7] \"それなら良かったのですが……\"\n[s8] （ワカモが待ってる……早く帰らないと……）"
1004303-276 = "（その時、一件のモモトークが届いた）"
1004303-280 = "ふふふ。あなた様を煩わせる全ての心配事は、このワカモが処理致しますので。どうかご安心なさってくださいね。"
1004303-281 = "[s] \"ワカモ？処理って一体……。\""
1004303-282 = "（ワカモから送られてきた文章に首を傾げたその瞬間）"
1004303-286 = "た、た、大変です！花火が保管されている倉庫に爆弾を持った不審者が！"
1004303-287 = "……な、なんだと！？"
1004303-288 = "[s] \"まさか！？\""
1004303-293 = "花火積込倉庫"
1004303-298 = "うふふっ。初めから、こうすれば良かったのです……。"
1004303-299 = "私と先生の邪魔をするものは全部ここにあるのですから。"
1004303-300 = "これを全て破壊してしまえば……！"
1004303-301 = "そんな危険な事はやめてください……！"
1004303-302 = "……ふん。また邪魔者ですか。"
1004303-303 = "何と言われようと、私はもう決心を……。"
1004303-304 = "[s] \"ワカモ……！\""
1004303-308 = "あなた様……?"
1004303-309 = "[s] \"ワカモ、一体何をしようとしてるの！？\""
1004303-310 = "うふふっ、ええ……あなた様に「約束」をしたので。今日という日を、特別なものにして差し上げる、と。"
1004303-311 = "ですから、私たちを邪魔し続けるこの障害物……。"
1004303-312 = "ええ……花火自体を、吹き飛ばします！"
1004303-313 = "そうすれば、あなた様も私との時間を邪魔されることなく、自由に今日という一日を過ごしていただける……！"
1004303-314 = "[s] \"ちょっと待って、怪我してない？大丈夫？\""
1004303-318 = "い、いえ……怪我は、ありませんが……"
1004303-319 = "そ、その……。"
1004303-320 = "[s] \"よかった……大丈夫そうだね。\""
1004303-324 = "[ns] \"じゃあ、安心してねワカモ。今から始めるよ。\""
1004303-325 = "えっ……？"
1004303-326 = "え、ええと……先生……？始めるって、一体、何を？"
1004303-330 = "[ns] \"花火倉庫を爆破しようとするなんて、一体どうして？\""
1004303-334 = "（思ったよりずっと大きな声で、ワカモに向かって言ってしまった）"
1004303-335 = "……ビクッ！"
1004303-336 = "そ、その……今日一日、私とあなた様の時間を邪魔したのは……全部、この、花火、だから……。"
1004303-337 = "そのことに気がついたら居ても立っても居られず……これさえ始末すれば……。"
1004303-338 = "ええ……！あなた様も、私と一緒に穏やかに今日という日を過ごせると思って……！"
1004303-339 = "[s] \"そんな事をしたら、怪我人が出るかもしれないでしょう！？\""
1004303-340 = "で、ですが……私は……。"
1004303-341 = "[s] \"もしも、ワカモが怪我をしたらどうするつもりだったの？\""
1004303-343 = "[ns] \"それでもワカモは私の……私たちのためって言えるの！？\""
1004303-345 = "[ns] \"私に心配なんてしないでって言えるの？\""
1004303-347 = "[ns] \"逆の立場だったとして、ワカモは納得できる！？\""
1004303-348 = "あ、私……私は……。"
1004303-349 = "[s] \"そうなってしまったら、私は絶対にワカモを許せなかったと思うよ。\""
1004303-353 = "許せ、ない……？あなた様が、私を？"
1004303-354 = "あ、ダメ。ダメです……そんなの、ダメ……。"
1004303-355 = "も、も、申し訳、ございませんんん……。"
1004303-356 = "か、勝手に……爆破しようとして、すみませんでした……許せないなんて、言わないでください……。"
1004303-357 = "わ、私はあなた様に嫌われてしまったら……。"
1004303-358 = "私が生きていく意味が……この心の、想いの行き場が……無くなってしまう。ダメ。それだけは、どうか……すみません、すみません……"
1004303-359 = "すみま……ううぅ……。"
1004303-360 = "[s] \"……とりあえず帰ろう。\""
1004303-362 = "（幸い、事件が起こる前に確保したワカモを連れて、宿に戻ることができた）"
