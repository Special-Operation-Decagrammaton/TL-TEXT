[translation]
1004303-1 = "Só queria cumprir a promessa"
1004303-2 = "（Chegamos à praia para preparar o festival de fogos de artifício）"
1004303-7 = "Ora, graças a você, fomos de grande ajuda, Professor [USERNAME]."
1004303-8 = "[s] \"Não, não foi nada demais.\""
1004303-9 = "Lá vem você, não seja tão modesto."
1004303-14 = "Com licença. Há um cliente que deseja ver o Professor [USERNAME]..."
1004303-18 = "[ns] \"Uma visita para mim...? Não pode ser...\""
1004303-25 = "[ns] \"Eu sabia... Wakamo...!\""
1004303-29 = "Ufufu... Ser recebida com tanto entusiasmo... Eu, Wakamo, quase sinto vontade de chorar de emoção♡"
1004303-30 = "[s] \"Você disse que nos encontraríamos depois que o trabalho terminasse...\""
1004303-32 = "Sim..."
1004303-33 = "Você me fez essa \"promessa\"."
1004303-34 = "Por isso, eu, Wakamo... estive esperando desde aquela mensagem no MomoTalk."
1004303-35 = "Sim... esperei ansiosamente por cada segundo... e então, calculei o momento em que seu trabalho terminaria para vir buscá-lo♡ Ufufu."
1004303-36 = "[s] \"Sim! Eu imaginei que fosse isso!\""
1004303-37 = "Por acaso... eu causei algum transtorno a você...?"
1004303-38 = "Se vir buscá-lo for um incômodo para você... então... bem..."
1004303-39 = "[s] \"Não é isso... mas o trabalho ainda...\""
1004303-48 = "Se for esse o caso, não se preocupe. Já terminamos quase tudo."
1004303-49 = "Deixe o resto com a nossa associação comercial! Professor, bom trabalho!"
1004303-50 = "[s] \"Então, aceitarei a gentileza... Vamos juntos, então?\""
1004303-55 = "Ufufu. Sim, claro!"
1004303-61 = "[ns1] \"É bom que tenhamos saído juntos...\"\n[ns2] \"Mas o que faremos agora...?\""
1004303-67 = "Ufufu, deixe comigo. Preparei um plano meticuloso."
1004303-68 = "Uma \"promessa\" para tornar o dia de hoje perfeito para você."
1004303-69 = "Chamado de..."
1004303-70 = "O \"Plano de Encontro de Verão Perfeito da Wakamo\"!"
1004303-71 = "...Diga-me, Professor, o que você acha que é indispensável em uma praia de verão?"
1004303-72 = "[s3] \"Hmm... é difícil escolher uma coisa só.\"\n[s4] \"Talvez um tanque de guerra da escola que eu trouxe escondido...?\""
1004303-73 = "Ufufu, não se preocupe. Eu, Wakamo, preparei vários planos."
1004303-74 = "Hã? Equipamento? Tanque...?"
1004303-75 = "Bem, peço desculpas... não entendi muito bem o que você quis dizer..."
1004303-76 = "Então, primeiro, vamos encher a barriga."
1004303-77 = "Fufu... vamos finalmente cumprir a \"promessa\" que não conseguimos realizar daquela vez."
1004303-78 = "[s] \"...?\""
1004303-84 = "Bem-vindos! Dois clientes, entrando!"
1004303-85 = "[s] \"Isto é... uma barraca de praia?\""
1004303-86 = "Sim, exatamente."
1004303-87 = "Lembrei-me de que você disse que queria \"comer raspadinha\", mas acabamos não conseguindo..."
1004303-88 = "[s] \"Sim... você se lembrou disso.\""
1004303-91 = "Ufufu... parece que a raspadinha de frutas... bem... a raspadinha de frutas especial para casais é muito popular aqui."
1004303-92 = "Sim... eu, Wakamo, gostaria de ficar bem perto de você e trocarmos colheradas dessa raspadinha."
1004303-93 = "Fufu. Preparei esse plano. O que acha?"
1004303-97 = "Aqui está! Esta é a \"Raspadinha Suprema que Domina o Verão, com Xarope de Frutas e Muita Polpa!\""
1004303-98 = "[s] \"Parece um feitiço...!\""
1004303-100 = "Vamos, meu querido... com licença, vou me aproximar."
1004303-106 = "Isso, abra a boca devagar... aqui está♡ Por favor, prove a raspadinha cheia de amor que eu preparei para você♡"
1004303-107 = "[s] \"Aaa... nham\""
1004303-112 = "[ns] \"Hum, está delicioso.\""
1004303-113 = "Ah, ah... v-você comeu tudo de uma vez sem hesitar... meu amor..."
1004303-114 = "Essa Wakamo... sinto que vou acabar ficando corada..."
1004303-115 = "[s] \"Agora é a vez da Wakamo.\""
1004303-116 = "Eh? Minha vez...? M-mas..."
1004303-120 = "[ns] \"Certo, diga 'ah'.\""
1004303-124 = "Ah, um 'ah' vindo diretamente de você..."
1004303-125 = "Aaaah, e-eu, esta Wakamo está..."
1004303-126 = "Uuu... e-então, com sua licença..."
1004303-132 = "[ns] \"Ah! Desculpe, Wakamo. Espere um pouco...\""
1004303-135 = "Peço perdão por interromper enquanto está ocupado!"
1004303-136 = "Houve um problema relacionado ao festival de fogos de artifício...!"
1004303-140 = "[ns] \"Desculpe, Wakamo, surgiu uma emergência...\""
1004303-141 = "Sim,"
1004303-142 = "está tudo bem."
1004303-143 = "Você é sempre uma pessoa muito ocupada. Esta Wakamo entende perfeitamente..."
1004303-144 = "Vá com cuidado... estarei esperando aqui."
1004303-145 = "[s] \"Desculpe! Já volto!\""
1004303-151 = "(Enquanto você resolvia o trabalho, a raspadinha derreteu completamente)"
1004303-154 = "[ns] \"Sinto muito mesmo...! Quer que eu peça outra?\""
1004303-155 = "De jeito nenhum! Não é algo pelo qual você deva se desculpar...!"
1004303-156 = "Meu plano está apenas começando!"
1004303-160 = "Vamos, vamos para o próximo!"
1004303-161 = "[s] \"Certo... desculpe.\""
1004303-164 = "O próximo plano não é nada menos que..."
1004303-165 = "Pensei em aproveitar as brincadeiras na água que não conseguimos fazer da última vez..."
1004303-166 = "[s] \"Com certeza, na praia dá para aproveitar várias brincadeiras na água. O que vamos fazer?\""
1004303-167 = "Sim... mas o que eu quero tentar não é uma brincadeira comum... é, bem..."
1004303-168 = "[s] \"...?\""
1004303-169 = "Ouvi dizer que existe uma 'brincadeira' única e peculiar que casais fazem na praia."
1004303-170 = "Eu sempre quis tentar fazer isso..."
1004303-171 = "[s] \"Oh, e que tipo de brincadeira é essa?\""
1004303-172 = "Um evento lendário que se tornou extinto no mundo moderno e que é extremamente difícil de encontrar..."
1004303-176 = "É o 'Ahaha, tente me pegar~'!"
1004303-177 = "[s] \"Isso é bem clichê...!\""
1004303-178 = "É estranho...? Talvez seja um pouco, bem, vergonhoso."
1004303-179 = "Ouvi dizer que casais que compartilham seu amor fazem esse tipo de brincadeira na praia..."
1004303-180 = "[s] \"Não... não é nada estranho, mas...\""
1004303-181 = "Então... superando a vergonha, vamos começar?"
1004303-182 = "Vamos... corpo e alma, estou totalmente preparada."
1004303-183 = "Agora só falta você..."
1004303-187 = "[ns] \"...Hm?\""
1004303-188 = "Por favor... tente fugir de mim com todas as suas forças?"
1004303-189 = "Se for para capturar você, esta Wakamo..."
1004303-190 = "Irá persegui-lo até os confins do mundo! Ufufu...!"
1004303-191 = "[s] \"E-espere! Acho que o evento que a Wakamo está imaginando é diferente do meu!\""
1004303-192 = "Eu nunca vou deixar você escapar..."
1004303-198 = "V-o-c-ê♡"
1004303-203 = "[ns] \"D-desculpe, Wakamo! É um telefonema! Espere um pouco!\""
1004303-204 = "Ah..."
1004303-208 = "Desculpe incomodá-lo enquanto está ocupado, Professor [USERNAME]! Aquilo acabou escapando do processo de preparação!"
1004303-209 = "Peço desculpas, mas é urgente..."
1004303-213 = "[ns] \"Desculpe, Wakamo...! Tenho um compromisso urgente...!\""
1004303-214 = "Ah... entendo..."
1004303-215 = "Eu estarei esperando, então... por favor, tome cuidado..."
1004303-217 = "(Depois disso, toda vez que tentávamos seguir o plano de encontro de verão que Wakamo preparou, eu era forçado a me ausentar por causa de trabalhos do Schale...)"
1004303-220 = "Ah, Sensei..."
1004303-226 = "Bem, eu gostaria de estar com você..."
1004303-232 = "Hum..."
1004303-234 = "(Enquanto eu processava o trabalho que chegava como uma enxurrada, o sol já tinha se posto completamente sem que eu percebesse)"
1004303-237 = "[ns] \"Desculpe, Wakamo... sinto muito mesmo!\""
1004303-238 = "Ufufu. Eu estou bem, Sensei."
1004303-239 = "Eu sei muito bem que você está extremamente ocupado, Sensei."
1004303-240 = "Agora, seguindo o \"Plano de Encontro de Verão Perfeito da Wakamo\" que eu preparei..."
1004303-244 = "No final, enquanto olhamos para o mar ao pôr do sol juntos—"
1004303-250 = "[ns5] \"Desculpe, parece que é outro contato sobre o festival de fogos de artifício.\"\n[ns6] \"Vou compensar isso depois...\""
1004303-251 = "Ufufu, sim, está tudo bem."
1004303-252 = "Ufufu, sim, está tudo bem."
1004303-253 = "Vá com cuidado."
1004303-254 = "[s] \"Desculpe!\""
1004303-258 = "...Festival de fogos de artifício."
1004303-259 = "O tempo que eu deveria passar com você... repetidas vezes, repetidas vezes..."
1004303-260 = "Como ousam, como ousam... como ousam...!"
1004303-261 = "...Que um simples festival de fogos de artifício atrapalhe a nós dois..."
1004303-265 = "Ah... sendo assim..."
1004303-266 = "Ufufufu... para cumprir a promessa..."
1004303-267 = "Sim... era algo simples, não era?"
1004303-269 = "Ora, ora, Sensei [USERNAME]. Sinto muito pelo incômodo."
1004303-270 = "Graças a você, os preparativos para o festival terminaram perfeitamente."
1004303-271 = "[s7] \"Fico feliz em ouvir isso...\"\n[s8] (Wakamo está me esperando... preciso voltar logo...)"
1004303-276 = "(Nesse momento, uma MomoTalk chegou)"
1004303-280 = "Fufufu. Eu cuidarei de todas as preocupações que te incomodam, Sensei. Por favor, fique tranquilo."
1004303-281 = "[s] \"Wakamo? O que você quer dizer com 'cuidar'...?\""
1004303-282 = "(No momento em que inclinei a cabeça lendo a mensagem enviada por Wakamo)"
1004303-286 = "P-p-problema! Há um suspeito com uma bomba no armazém onde os fogos de artifício estão guardados!"
1004303-287 = "...O-o quê!?"
1004303-288 = "[s] \"Não pode ser!?\""
1004303-293 = "Armazém de Carga de Fogos de Artifício"
1004303-298 = "Ufufu. Eu deveria ter feito isso desde o início..."
1004303-299 = "Já que tudo o que atrapalha a mim e ao Sensei está aqui."
1004303-300 = "Se eu destruir tudo isso...!"
1004303-301 = "Por favor, pare com algo tão perigoso...!"
1004303-302 = "...Hum. Outro estorvo."
1004303-303 = "Não importa o que digam, eu já tomei minha decisão..."
1004303-304 = "[s] \"Wakamo...!\""
1004303-308 = "Sensei...?"
1004303-309 = "[s] \"Wakamo, o que exatamente você está tentando fazer!?\""
1004303-310 = "Ufufu, sim... porque eu fiz uma \"promessa\" a você. Que eu tornaria o dia de hoje especial."
1004303-311 = "Por isso, esse obstáculo que continua nos atrapalhando..."
1004303-312 = "Sim... eu vou explodir os próprios fogos de artifício!"
1004303-313 = "Assim, você não terá seu tempo comigo interrompido e poderá passar o dia de hoje livremente...!"
1004303-314 = "[s] \"Espere um pouco, você não se machucou? Está bem?\""
1004303-318 = "N-não... eu não me machuquei, mas..."
1004303-319 = "E-então..."
1004303-320 = "[s] \"Que bom... parece que você está bem.\""
1004303-324 = "[ns] \"Então, fique tranquila, Wakamo. Vamos começar agora.\""
1004303-325 = "Hã...?"
1004303-326 = "E-ei... Sensei...? Começar o quê, exatamente?"
1004303-330 = "[ns] \"Por que você tentaria explodir o depósito de fogos de artifício?\""
1004303-334 = "(Eu acabei falando com a Wakamo em um tom muito mais alto do que pretendia)"
1004303-335 = "……Ah!"
1004303-336 = "B-bem... é que... o dia de hoje, o tempo que eu passei com você... foi tudo atrapalhado por causa desses... fogos de artifício..."
1004303-337 = "Quando percebi isso, não consegui ficar parada... pensei que se eu me livrasse disso..."
1004303-338 = "Sim...! Pensei que, se fizesse isso, você e eu poderíamos passar o resto do dia em paz...!"
1004303-339 = "[s] \"Se você fizesse algo assim, alguém poderia acabar se ferindo, não acha!?\""
1004303-340 = "M-mas... eu..."
1004303-341 = "[s] \"E se a Wakamo tivesse se machucado, o que você pretendia fazer?\""
1004303-343 = "[ns] \"Mesmo assim, você ainda diria que fez isso por mim... por nós!?\""
1004303-345 = "[ns] \"Você consegue me dizer para não me preocupar?\""
1004303-347 = "[ns] \"Se estivéssemos em posições trocadas, você aceitaria isso!?\""
1004303-348 = "Ah, eu... eu..."
1004303-349 = "[s] \"Se algo assim acontecesse, eu acho que nunca conseguiria te perdoar, Wakamo.\""
1004303-353 = "Não... perdoar...? Você, me perdoar?"
1004303-354 = "Ah, não. Não... isso não, por favor..."
1004303-355 = "M-m-me desculpe, eu sinto muito mesmo..."
1004303-356 = "E-eu agi por conta própria... sinto muito por tentar explodir tudo... por favor, não diga que não pode me perdoar..."
1004303-357 = "S-se você me odiar..."
1004303-358 = "O sentido da minha vida... o lugar para onde esses sentimentos no meu coração iriam... tudo desapareceria. Não. Por favor, só isso não... me desculpe, me desculpe..."
1004303-359 = "Desculp... uuu..."
1004303-360 = "[s] \"...Vamos voltar por enquanto.\""
1004303-362 = "(Felizmente, consegui levar a Wakamo de volta para a pousada depois de contê-la antes que o incidente ocorresse)"
