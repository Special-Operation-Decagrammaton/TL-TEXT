[translation]
10014055-8 = "U-ugh...!?"
10014055-15 = "Haa, haa... que susto."
10014055-16 = "S-Sensei? Você está bem? #nAlgum ferimento..."
10014055-17 = "[s1] \"Eu não tenho problema nenhum.\"\n[s2] \"Não se preocupe, estou bem.\""
10014055-18 = "E-entendo. Que bom..."
10014055-19 = "E-entendo. Que bom..."
10014055-20 = "Ao que parece, o boato de que Kyoyama Kazusa está reconstruindo uma nova organização está se espalhando."
10014055-21 = "Para as delinquentes desta área, isso não é pouca coisa... então elas virão com tudo para tentar impedi-la antes que a organização cresça."
10014055-22 = "Por minha causa... a situação ficou complicada."
10014055-23 = "[s3] \"Não é culpa sua, Reisa.\"\n[s4] \"Não é culpa de ninguém.\""
10014055-24 = "Ahaha... obrigada, Sensei."
10014055-25 = "Ahaha... obrigada, Sensei."
10014055-26 = "Mas fui eu quem fez as coisas tomarem essa proporção. #nEsse fato não muda."
10014055-27 = "Essa é uma responsabilidade que eu devo carregar."
10014055-28 = "Além disso, a própria Kyoyama Kazusa... não é mais esse tipo de pessoa agora."
10014055-29 = "Então, não posso causar mais problemas para ela..."
10014055-33 = "...por causa de um passado que ela quer esquecer!"
10014055-34 = "[s5] \"...\"\n[s6] \"Reisa, isso é...\""
10014055-35 = "Certo. Conseguimos repelir o ataque por enquanto, mas isso é só o começo."
10014055-36 = "Certo. Conseguimos repelir o ataque por enquanto, mas isso é só o começo."
10014055-37 = "Tenho certeza de que muitas outras delinquentes virão sem parar!"
10014055-38 = "Mas lutar contra delinquentes é o destino de um comitê disciplinar!! #nPara mim, isso é rotina!!"
10014055-39 = "Vou resolver isso aqui, como parte do comitê disciplinar!! #nAfinal, preciso proteger a \"comum\" Kyoyama Kazusa!!"
10014055-40 = "Por isso, Sensei, primeiro pegue isto..."
10014055-45 = "[ns7] \"Isso é...\"\n[ns8] \"...Você quer que eu entregue?\""
10014055-46 = "Significa que, de agora em diante, não enviarei mais desafios. #nNão apenas de boca, isso será mais confortável para a Kyoyama Kazusa também."
10014055-47 = "Significa que, de agora em diante, não enviarei mais desafios. #nNão apenas de boca, isso será mais confortável para a Kyoyama Kazusa também."
10014055-48 = "...Sensei, eu entendi. #nO motivo de você ter vindo até aqui pessoalmente."
10014055-49 = "O Sensei é uma pessoa gentil. Graças a isso, me sinto muito mais leve. #nMuito obrigada mesmo."
10014055-50 = "Por isso, isso é apenas um desabafo que estou contando só para você. #nNão precisa contar para ela."
10014055-51 = "...Foi por pouco tempo, mas fiquei feliz em vê-la depois de tanto tempo. #nNa verdade, eu achava que nunca mais a veria."
10014055-52 = "Por isso, acabei me empolgando um pouco. #nSe foi um incômodo... sinto muito mesmo."
10014055-53 = "Ainda assim..."
10014055-54 = "...Pois é."
10014055-58 = "...É um pouco triste que, para alguém, isso tenha se tornado uma lembrança que se quer esquecer."
10014055-62 = "[ns] \"Reisa, espere...\""
10014055-64 = "...Opa!"
10014055-65 = "Mais clientes chegaram! #nSerá que chamaram reforços?"
10014055-66 = "Não posso causar mais problemas para o Sensei, então vou me retirar por aqui."
10014055-67 = "Se tivermos uma oportunidade, quem sabe um dia..."
10014055-68 = "Espero que chegue o dia em que possamos nos encontrar novamente, longe da Kyoyama Kazusa!"
10014055-69 = "...Até mais!!"
