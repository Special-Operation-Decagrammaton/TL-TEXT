[translation]
10014055-8 = "う、ううっ……！？"
10014055-15 = "はぁ、はぁ……びっくりしました。"
10014055-16 = "せ、先生？大丈夫ですか？#nお怪我は……"
10014055-17 = "[s1] \"私は全然問題ないよ。\"\n[s2] \"心配しないで、大丈夫だよ。\""
10014055-18 = "そ、そうですか。良かったです……。"
10014055-19 = "そ、そうですか。良かったです……。"
10014055-20 = "どうやら、[ruby=きょうやま]杏山[/ruby]カズサが新しい組織を再建するという噂が広まっているみたいですね。"
10014055-21 = "この一帯にいるスケバンにとっては、ただ事ではないでしょうから……何が何でも、組織が大きくなる前に止めようとかかってくる事でしょう。"
10014055-22 = "私のせいで……状況が複雑になってしまいました。"
10014055-23 = "[s3] \"レイサのせいじゃないよ。\"\n[s4] \"誰のせいでもないよ。\""
10014055-24 = "あはは……ありがとうございます、先生。"
10014055-25 = "あはは……ありがとうございます、先生。"
10014055-26 = "ですが、事を大きくしてしまったのは私ですから。#nその事実は変わりません。"
10014055-27 = "これは、私が負うべき責任です。"
10014055-28 = "それに、杏山カズサ本人は……今はそんな人ではありませんし。"
10014055-29 = "なら、これ以上迷惑をかけるわけにはいかないじゃないですか……"
10014055-33 = "……忘れたい過去のことなんかで！"
10014055-34 = "[s5] \"……\"\n[s6] \"レイサ、それは……\""
10014055-35 = "よし。とりあえず撃退しましたが、これはまだ序の口でしょう。"
10014055-36 = "よし。とりあえず撃退しましたが、これはまだ序の口でしょう。"
10014055-37 = "きっと、後から数多くのスケバンが絶えず押し寄せて来ると思います！"
10014055-38 = "ですが、スケバンと戦うのは自警団の宿命！！#n私にとっては日常茶飯事です！！"
10014055-39 = "これは自警団である私のところで終わらせます！！#n「平凡な」杏山カズサを守らないといけませんからね！！"
10014055-40 = "ですから先生、まずはこれを……"
10014055-45 = "[ns7] \"これは……\"\n[ns8] \"……伝えてほしいってこと？\""
10014055-46 = "今後、私から挑戦状を投げることはないという意味です。#n口だけではなく、こちらの方が杏山カズサも気楽でしょう。"
10014055-47 = "今後、私から挑戦状を投げることはないという意味です。#n口だけではなく、こちらの方が杏山カズサも気楽でしょう。"
10014055-48 = "……先生、私分かりました。#n先生がわざわざ私のところに来てくださった理由が。"
10014055-49 = "先生は優しい方ですね。おかげで、だいぶ楽になりました。#n本当にありがとうございます。"
10014055-50 = "だから、これは先生にだけ言う愚痴のようなものです。#n本人に伝えなくても大丈夫です。"
10014055-51 = "……短い間でしたが、久しぶりに彼女に会えて嬉しかったんです。#n実は、もう二度と会えないと思ってたんです。"
10014055-52 = "それで、つい浮かれてしまったみたいです。#n迷惑だったなら……本当にごめんなさい。"
10014055-53 = "それでも……"
10014055-54 = "……やっぱり。"
10014055-58 = "……誰かにとって、忘れたい思い出になってしまったのは、ほんの少し残念です。"
10014055-62 = "[ns] \"レイサ、ちょっと……\""
10014055-64 = "……おっと！"
10014055-65 = "またお客様が押し寄せて来ましたね！#n増援を呼んだのでしょうか？"
10014055-66 = "これ以上先生にご迷惑をかけられませんので、この辺で失礼します。"
10014055-67 = "いつか機会があれば、また……"
10014055-68 = "杏山カズサのいないところで、またお会いできる日が来ますように！"
10014055-69 = "……では！！"
