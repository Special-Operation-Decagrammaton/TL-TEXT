[translation]
10003030-1 = "Episódio 3; Tudo pela Hina"
10003030-2 = "Sala de Operações para o Acampamento de Verão"
10003030-3 = "（Conseguimos conter a confusão na praia e voltamos juntos para a sala de operações）"
10003030-4 = "Pelo menos resolvemos isso por enquanto, mas..."
10003030-5 = "Tanto as Sukebans quanto o Grupo do Capacete parecem ser apenas a vanguarda."
10003030-6 = "[s] \"Vanguarda?\""
10003030-7 = "Sim, ou seja, o que vimos antes foi apenas uma escaramuça. Na guerra total que acontecerá daqui a 4 horas, parece que eles vão reunir um número incomparavelmente maior..."
10003030-8 = "Acho que eles estavam tentando plantar minas e armadilhas para ganhar vantagem no campo de batalha quando o conflito real começasse."
10003030-9 = "E como ambos tiveram a mesma ideia, acabaram se encontrando... é isso."
10003030-10 = "Francamente, como esperado, não terminou em paz..."
10003030-11 = "E outra, Ako-chan, a história é completamente diferente! Você disse que era um lugar tranquilo!"
10003030-12 = "Não adianta reclamar com a oficial administrativa que não está aqui agora. De qualquer forma, isso ainda é um distrito autônomo de Gehenna, então teremos que lidar com isso de um jeito ou de outro."
10003030-13 = "Mas, como a escala parece ser bem grande, não seria melhor informar a Presidente...?"
10003030-14 = "[s] \"Mas, se fizermos isso, o plano que fizemos com tanto esforço para a Hina...\""
10003030-15 = "Bem, é verdade, mas..."
10003030-16 = "Se aquela escala for apenas a vanguarda, estamos em maus lençóis. E a Ako-chan também parece estar com dificuldades..."
10003030-17 = "[s] \"E olha que a Iori até vestiu um traje de banho!\""
10003030-18 = "Isso não tem nada a ver agora, tem!?"
10003030-19 = "Já que chegamos a esse ponto, não há escolha. Então, vou entrar em contato com a Presidente—"
10003030-23 = "Espere!!!"
10003030-24 = "Ako-chan!?"
10003030-25 = "Oficial Administrativa Ako...?"
10003030-26 = "Justo no pior momento possível, o Pandemonium Society se intrometeu, mas..."
10003030-27 = "Eu não sou do tipo que desiste aqui. Conseguimos trazer a Presidente até a praia, então não vou deixar que um obstáculo desses estrague nossa chance!!"
10003030-28 = "Pedi ao departamento de inteligência que investigasse as Sukebans e o Grupo do Capacete reunidos na costa. Já compilei tudo, então vou enviar os dados relacionados."
10003030-29 = "Oficial, você está trabalhando mais rápido que o normal..."
10003030-30 = "Primeiro, sobre as Sukebans, elas se autodenominam o grupo \"Hachamecha\" e parece que chegaram àquela área da costa recentemente."
10003030-31 = "Ao que parece, após vários problemas em outra região costeira há cerca de um mês, elas perderam a disputa por território e acabaram indo parar lá."
10003030-32 = "E o outro grupo é o \"Grupo do Capacete Encharcado\". Eles são um grupo de encrenqueiros da praia que já tinham uma base na favela perto do hotel há muito tempo."
10003030-33 = "Já mapeamos a escala de poder, o nível de equipamento e o número de integrantes de ambos."
10003030-34 = "Dito isso, vou direto à conclusão."
10003030-35 = "[s] \"Gulp...\""
10003030-36 = "A operação continua. Não vamos informar a Presidente, resolveremos tudo sozinhos!"
10003030-37 = "Isso é realmente seguro...?"
10003030-38 = "（Acho que isso só é possível se fizermos algo extremamente imprudente...）"
10003030-39 = "Se seguirmos o cronograma, a Presidente Hina só sairá para o treinamento de caminhada daqui a 4 horas."
10003030-40 = "E a guerra total também está prevista para daqui a 4 horas. Em vez de nos prepararmos focando nisso, vamos derrotar o grupo Sukeban \"Hachamecha\" e o \"Grupo do Capacete Encharcado\" antes disso!"
10003030-41 = "Ou seja, vamos derrotá-los um por um antes que a guerra total comece."
10003030-42 = "Exatamente!"
10003030-43 = "Bem, certamente temos mais chances de ganhar assim, mas... será que nós sozinhos daremos conta?"
10003030-44 = "Não é uma questão de \"daremos conta\", nós vamos fazer dar certo! Se não, Kivotos vai acabar!"
10003030-45 = "Você está exagerando... mas tudo bem, vamos tentar."
10003030-46 = "Então, Iori, cuide das Sukebans. Chinatsu, cuide do Grupo do Capacete na favela."
10003030-47 = "Dividam os membros do Comitê Disciplinar que estão esperando no hotel para lidar com cada um."
10003030-48 = "E enquanto isso, Sensei, faça companhia à Presidente."
10003030-49 = "[s] \"Certo, entendido.\""
10003030-50 = "Em suma, nosso objetivo não muda! Por enquanto, não deixem a Presidente sair do quarto!"
10003030-51 = "Para isso, ela não pode descobrir sobre essa confusão de jeito nenhum. Se ela desconfiar, com certeza vai querer trabalhar de novo!"
10003030-53 = "Vamos lá, em frente! Tudo pelas férias de verão da Presidente Hina!"
10003030-54 = "Tá, tá bom..."
10003030-55 = "Ufa... vamos nessa."
10003030-56 = "[ns] \"Não se esforcem demais, vocês duas...\""
10003030-60 = "[ns] \"Cheguei...\""
10003030-61 = "Ah, Sensei, bem-vindo de volta. Você saiu com tanta pressa, está se sentindo bem?"
10003030-62 = "[s] (Pensando bem, esse era o cenário mesmo)"
10003030-63 = "Ainda assim, o lado de fora ficou barulhento de novo... O treinamento tático está usando tantas armas de fogo assim?"
10003030-64 = "[s] \"Acho que eles estão bem empolgados.\""
10003030-65 = "Entendo, isso é bom. Graças a isso, consegui descansar um pouco pela primeira vez em muito tempo, mas..."
10003030-66 = "Mesmo assim, ficar apenas olhando pela janela..."
10003030-67 = "Bem, agora que você está aqui, Sensei, está tudo bem..."
10003030-68 = "É uma sensação estranha estar na praia depois de tanto tempo e ficar presa no quarto."
10003030-69 = "[s] \"Hina, você não costuma vir à praia?\""
10003030-70 = "Pois é... não é que eu evitasse, é só que o trabalho do comitê é sempre muito corrido... nunca tive muita relação com lugares de resort como este."
10003030-71 = "Já vim para treinamentos ou inspeções de campo, mas sempre como parte do trabalho..."
10003030-72 = "Observar o mar com calma assim..."
10003030-73 = "É. Pensando bem, talvez seja a primeira vez."
10003030-76 = "Diga, Sensei..."
10003030-77 = "[s] \"O que foi?\""
10003030-78 = "Sensei... você gosta do mar?"
10003030-79 = "[s1] \"Sim, eu gosto.\"\n[s2] \"Não desgosto, mas às vezes sinto um pouco de medo.\"\n[s3] \"Nunca parei para pensar se gosto ou não...\""
10003030-80 = "Entendo..."
10003030-81 = "Então, entendo..."
10003030-82 = "Entendo..."
10003030-83 = "...É igual a mim."
10003030-84 = "Entendo..."
10003030-85 = "Bem, eu também nunca tive um apego especial pelo mar até agora..."
10003030-86 = "...Ficar aqui parada não vai mudar nada."
10003030-87 = "Já que viemos até aqui..."
10003030-88 = "...Ei, Sensei. Não conte para a Ako, mas..."
10003030-93 = "...Que tal a gente escapar um pouquinho e ir até a praia?"
10003030-94 = "[s] \"Ir à praia...\""
10003030-95 = "Em suma, nosso objetivo não muda! Agora, não deixem a presidente sair do quarto!"
10003030-96 = "Tudo pelas férias de verão da presidente Hina!"
10003030-98 = "[ns4](A Ako disse aquilo, mas o objetivo é que a Hina descanse)\n[ns5](O confinamento não é o objetivo real. Por isso...)"
10003030-99 = "...Sensei?"
10003030-100 = "...Sensei?"
10003030-101 = "[s] \"Pode esperar só um pouquinho?\""
10003030-102 = "Ah, sim."
10003030-106 = "Alô, Sensei? Aconteceu alguma coisa? Estou ocupada lidando com os delinquentes aqui agora--"
10003030-107 = "Hã? A presidente quer ir à praia, então vocês vão agora!?"
10003030-108 = "O quê!? Espera, então... ah, droga! Tudo bem, eu dou um jeito aqui! Deixa comigo!"
10003030-111 = "[ns] \"Beleza, vamos à praia! Hina!\""
10003030-113 = "...Sim."
10003030-118 = "Uau..."
10003030-119 = "A sensação dessa areia é tão estranha..."
10003030-120 = "Ah, as pegadas..."
10003030-123 = "As ondas vêm, e depois recuam..."
10003030-124 = "Fufu... é algo tão natural, mas me sinto de um jeito estranho."
10003030-125 = "[s6](A Hina está sorrindo...!)\n[s7](Só por isso, já valeu a pena ter vindo!)"
10003030-126 = "É uma sensação estranha... mesmo vindo à praia, faz tanto tempo que não venho."
10003030-127 = "Que sensação estranha... Já faz tanto tempo desde a última vez que vim à praia."
10003030-128 = "E pensar que, de todas as formas, seria com você, Sensei..."
10003030-129 = "Digo, Sensei—"
10003030-132 = "……Hm?"
10003030-133 = "[s] \"Desculpe, espere um pouco...!\""
10003030-137 = "Aqui é a oficial administrativa Ako! Todos, respondam!"
10003030-138 = "[s] \"Hã?\""
10003030-139 = "O que está acontecendo nessa situação!? Estou desesperada tentando lidar com as delinquentes aqui!"
10003030-140 = "A situação mudou. Recebi um relatório da Chinatsu de que o Grupo do Capacete está se movendo para a praia mais rápido do que o previsto!"
10003030-141 = "Sinto muito, tentei contê-los de alguma forma, mas... a velocidade de avanço deles é maior do que o esperado e nossa linha de defesa foi rompida antes que pudéssemos nos reagrupar...!"
10003030-142 = "Não há como evitar nessa situação. Ah, droga, de onde diabos eles tiraram um tanque pesado...!?"
10003030-143 = "Não temos escolha, vamos alterar o plano! Iori, continue contendo o grupo de delinquentes para que não avancem! Se tiver folga, envie reforços para a Chinatsu!"
10003030-144 = "Quanto ao Grupo do Capacete, enviarei todas as forças restantes do Comitê Disciplinar! Priorizem o combate contra eles por enquanto!"
10003030-145 = "E Sensei!"
10003030-146 = "[s] \"S-sim!?\""
10003030-147 = "Ouvi dizer que você está na praia! Mas essa área vai se tornar uma zona de perigo em breve!"
10003030-148 = "Volte para o hotel imediatamente para que a Presidente não seja envolvida nisso!"
10003030-150 = "Sensei, o que houve...?"
10003030-151 = "[s] \"O-o hotel entrou em contato de repente, vamos voltar logo!\""
10003030-154 = "Ei, espere um pouco, Sensei, eu ainda não terminei de falar—"
