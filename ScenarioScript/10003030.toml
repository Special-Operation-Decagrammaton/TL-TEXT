[translation]
10003030-1 = "第3話;All for Hina"
10003030-2 = "夏季合宿用オペレーションルーム"
10003030-3 = "（どうにか海辺での騒ぎを収集し、一緒にオペレーションルームへと戻ってきた）"
10003030-4 = "とりあえず片付いたけれど……。"
10003030-5 = "スケバンの方もヘルメット団の方も、どうやらまだただの先遣隊みたいだね。"
10003030-6 = "[s] \"先遣隊？\""
10003030-7 = "はい、つまり先ほどのはただの前哨戦のようです。4時間後の本格的な全面戦争では、あれとは比べ物にならない数が集まるみたいでして……。"
10003030-8 = "本格的に衝突した時に少しでも戦況を有利にするために、地雷とか罠を仕掛けようとしてたんだと思う。"
10003030-9 = "お互いに同じこと考えて、鉢合わせ……ってところかな。"
10003030-10 = "全く、やはり平和には済みませんでしたね……。"
10003030-11 = "っていうかアコちゃん、全然話が違うじゃん！閑静な場所って言ってたのに！"
10003030-12 = "今いない行政官に文句を言っても仕方ありません。ここも一応ゲヘナの自治区ですし、とにかく対処せざるを得ないでしょう。"
10003030-13 = "ただ、かなり規模が大きくなりそうですし、これは委員長に報告した方が良いのでは……？"
10003030-14 = "[s] \"でも、それだとせっかくのヒナのための計画が……。\""
10003030-15 = "まあ、それはそうだけどさ……。"
10003030-16 = "あの規模が前哨戦だとすると、普通にマズい。アコちゃんも手間取ってるみたいだし……。"
10003030-17 = "[s] \"せっかくイオリが、水着まで着てくれたのに！\""
10003030-18 = "今それは関係ないだろ！？"
10003030-19 = "こうなっては仕方ありません。では委員長に連絡を――"
10003030-23 = "待ってください！！！"
10003030-24 = "アコちゃん！？"
10003030-25 = "アコ行政官……？"
10003030-26 = "よりにもよって最悪のタイミング[ruby=パンデモニウム・ソサエティー]で、万魔殿の横[/ruby]やりが入りましたが……。"
10003030-27 = "ここで諦める私ではありません。こうして委員長を海までお連れすることができたのに、たかがこれしきの障害でチャンスを逃してなるものですか！！"
10003030-28 = "海岸に集まっているスケバンとヘルメット団については、情報部に調査をしてもらいました。すでにまとめてありますので、関連資料をデータで送ります。"
10003030-29 = "行政官、いつも以上に仕事が速いですね……。"
10003030-30 = "まずはスケバンの方ですが、自称スケバン集団「破茶滅茶」と名乗るグループでして、そこの海岸区域には最近になってやって来たようです。"
10003030-31 = "どうやら一ヵ月ほど前に別の海岸地区で色々とあった結果、勢力争いに敗北してしまい、そこへ流れ着いたという経緯のようですね。"
10003030-32 = "そしてもう片方は、「びしょびしょヘルメット団」。以前からずっとホテル近くのスラム街に拠点を構えていた、海辺の問題児集団です。"
10003030-33 = "すでにどちらも、勢力の規模と装備のレベル、数などは全て把握済みです。"
10003030-34 = "その上で、結論から申し上げましょう。"
10003030-35 = "[s] \"ごくり……。\""
10003030-36 = "作戦は続行。委員長には報告せず、私たちだけで解決します！"
10003030-37 = "それ、本当に大丈夫か……？"
10003030-38 = "（多分、相当無茶すれば、のお話だと思いますが……）"
10003030-39 = "スケジュール通りに動いてくだされば、ヒナ委員長が外に出るのは4時間後の歩行訓練から。"
10003030-40 = "そして全面戦争が予定されているのもまた4時間後。そこに焦点を合わせて準備するのではなく、その前にスケバン集団「破茶滅茶」ならびに「びしょびしょヘルメット団」を撃破します！"
10003030-41 = "つまり、全面戦争が始まる前に各個撃破してしまおう、と。"
10003030-42 = "その通りです！"
10003030-43 = "まあ、確かにその方がまだ勝率はあると思うけど……私たちだけで本当に大丈夫？"
10003030-44 = "大丈夫？ではありません、大丈夫にするのです！そうしないと、キヴォトスが滅ぶんですよ！？"
10003030-45 = "だから大げさだって……まあ頑張ってみるけどさ。"
10003030-46 = "では、イオリはスケバンの方をお願いしますね。チナツはスラム街のヘルメット団の方を。"
10003030-47 = "それぞれ、ホテルで待機中の風紀委員たちを二つに分けて対応してください。"
10003030-48 = "そしてその間、先生は委員長のお相手を。"
10003030-49 = "[s] \"うん、了解。\""
10003030-50 = "つまり、私たちの目指すことは変わりません！まず今は委員長を部屋から出さないように！"
10003030-51 = "そのためにも、絶対にこの騒動を気づかせてはなりません。勘付いてしまったら、委員長はまたきっと働かれてしまうはずです！"
10003030-53 = "さあ、出動です！全ては、ヒナ委員長の夏休みのために！"
10003030-54 = "分かった分かった……。"
10003030-55 = "ふぅ……行きましょうか。"
10003030-56 = "[ns] \"どっちも無理しないでね……。\""
10003030-60 = "[ns] \"ただいまー……。\""
10003030-61 = "ああ、先生おかえり。ずいぶん慌てて出ていったけど、体調は大丈夫？"
10003030-62 = "[s] （そういえばそういう設定だった）"
10003030-63 = "それにしても、また外が騒がしくなってきたけれど……戦術訓練、そんなにたくさん銃火器を使ってるの？"
10003030-64 = "[s] \"多分やる気満々なんだと思う。\""
10003030-65 = "そう、それは良いことね。おかげでこうやって、久しぶりに休めてはいるけれど……。"
10003030-66 = "それでもやっぱり、こうして窓の外を眺めるだけだなんて……。"
10003030-67 = "まあ、今は先生がいるから良いのだけど……。"
10003030-68 = "久しぶりに海に来たのに、何だかずっと部屋にいるのも変な感じ。"
10003030-69 = "[s] \"ヒナはあんまり、海に来たことはないの？\""
10003030-70 = "そうね……まあ避けていたわけではないのだけど、ただ普段の委員会の仕事が忙しくて……こういうリゾート地みたいなところにはずっと縁が無かった。"
10003030-71 = "訓練とか、現場視察とかで来たことはあるけれど、あくまで仕事の一環で……。"
10003030-72 = "こうやって海をじっくり眺めるのも……"
10003030-73 = "うん。思えば、初めてのことかもしれない。"
10003030-76 = "その、先生……"
10003030-77 = "[s] \"どうしたの？\""
10003030-78 = "先生は……海、好き？"
10003030-79 = "[s1] \"うん、好きだよ。\"\n[s2] \"嫌いではないけど、ちょっと怖いって思ったりもするかな。\"\n[s3] \"好きとか嫌いとか、あんまり考えたことなかったかも……。\""
10003030-80 = "……そう。"
10003030-81 = "だったら、うん……。"
10003030-82 = "そう……。"
10003030-83 = "……私と一緒ね。"
10003030-84 = "そう……。"
10003030-85 = "まあ私も今まで、特段海に思い入れがあったわけではないのだけど……。"
10003030-86 = "……ここでこうしてても、何も変わらない。"
10003030-87 = "せっかくここまで来たんだから……。"
10003030-88 = "……ね、先生。アコには悪いけど、内緒で。"
10003030-93 = "……ちょっとだけ抜け出して、ふたりで海に行かない？"
10003030-94 = "[s] \"海に……。\""
10003030-95 = "つまり、私たちの目指すことは変わりません！今は委員長を部屋から出さないように！"
10003030-96 = "全ては、ヒナ委員長の夏休みのために！"
10003030-98 = "[ns4]（アコはああ言ってたけど、目的はヒナがゆっくりすること）\n[ns5]（監禁が本来の目的じゃない。だから……）"
10003030-99 = "……先生？"
10003030-100 = "……先生？"
10003030-101 = "[s] \"ちょっとだけ待っててくれる？\""
10003030-102 = "あ、うん。"
10003030-106 = "もしもし、先生？何かあった？こっちは今スケバンの相手で――"
10003030-107 = "はぁ？委員長が海に行きたがってるから今から行く！？"
10003030-108 = "ええ！？ちょっ、それじゃ……ああもうっ、とりあえず分かった！こっちは何とかするから！任せて！"
10003030-111 = "[ns] \"よし、海に行こう！ヒナ！\""
10003030-113 = "……うんっ。"
10003030-118 = "わぁ……。"
10003030-119 = "この砂浜の感触、不思議な感じ……。"
10003030-120 = "あ、足跡が……。"
10003030-123 = "波が押し寄せてきて、引いて……。"
10003030-124 = "ふふっ……当たり前のことなのに、何だか不思議な気分。"
10003030-125 = "[s6]（ヒナが笑ってる……！）\n[s7]（もう既にここに来て良かった……！）"
10003030-126 = "変な感じ……海に来るだけでも、本当に久しぶりなのに。"
10003030-127 = "変な感じ……海に来るだけでも、本当に久しぶりなのに。"
10003030-128 = "それがまさかこうして、先生と一緒だなんて……。"
10003030-129 = "その、先生――"
10003030-132 = "……ん？"
10003030-133 = "[s] \"ごめん、ちょっと待ってて……！\""
10003030-137 = "こちら行政官の[ruby=あまう]天雨[/ruby]アコです！全員応答してください！"
10003030-138 = "[s] \"え？\""
10003030-139 = "この状況で何！？こっちは今スケバンの対応で必死なんだけど！？"
10003030-140 = "状況が変わりました。チナツからの報告で、予定より早くヘルメット団が海辺へと移動しているようです！"
10003030-141 = "すみません、何とか食い止めようとしたのですが……思ったより進撃のスピードが速く、立て直す前に防衛線が突破されました……！"
10003030-142 = "あの状況では仕方ありません。ああもう、重戦車なんて一体どこから……！？"
10003030-143 = "やむを得ません、計画を少し変更します！イオリはそのままスケバン集団が進軍してしまわないように、食い止めてください！もし余裕があればチナツの方に兵力を！"
10003030-144 = "ヘルメット団の方には、風紀委員会の残存兵力を全て向かわせます！一旦ヘルメット団側の対応を最優先で！"
10003030-145 = "それから先生！"
10003030-146 = "[s] \"は、はいっ！？\""
10003030-147 = "海に出ているのは聞きました！しかしその辺りはすぐ危険地帯になります！"
10003030-148 = "委員長が巻き込まれないように、早くホテルに戻ってください！"
10003030-150 = "先生、どうしたの……？"
10003030-151 = "[s] \"ほ、ホテルから急に連絡があって、一旦戻ろっか！\""
10003030-154 = "え、ちょっと待って先生、まだ私の話は終わってな――"
