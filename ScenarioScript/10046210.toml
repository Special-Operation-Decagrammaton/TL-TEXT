[translation]
10046210-3 = "……Eu sabia."
10046210-4 = "Eu achei que estava estranhamente silencioso ultimamente. Então era por isso."
10046210-5 = "……A presidente do Comitê Disciplinar de Gehenna!?"
10046210-6 = "Ah, sinto muito por ter causado preocupação."
10046210-7 = "Assim que eu terminar o que vim fazer, irei embora imediatamente."
10046210-8 = "Ah, não... é que..."
10046210-9 = "Por que você está vestida assim...?"
10046210-10 = "Estamos na praia. Eu só escolhi roupas que não tem problema se molharem."
10046210-11 = "Ah... entendi."
10046210-12 = "E então, sobre esse assunto que você veio tratar...?"
10046210-13 = "Não parece que você veio aqui para se divertir..."
10046210-14 = "……É verdade. Antes que surjam mal-entendidos estranhos, vou me explicar adequadamente."
10046210-15 = "Primeiro, peço desculpas por entrar sem aviso prévio. #nPor favor, aceite isso como um pedido de desculpas formal do Comitê Disciplinar."
10046210-16 = "Hã!? Não, não, por favor, levante a cabeça!"
10046210-17 = "Como presidente do Comitê Disciplinar de Gehenna, eu deveria ter considerado o impacto disso."
10046210-18 = "No entanto, esta visita é estritamente como Hina Sorasaki, a pessoa física."
10046210-19 = "……."
10046210-20 = "Dito isso, o Comitê de Justiça não vai ficar convencido só com isso, não é?"
10046210-21 = "Pois é..."
10046210-22 = "O assunto é o controle de alunos problemáticos. #nParece que eles já causaram alguns tumultos."
10046210-23 = "Bem, sim..."
10046210-24 = "Mas se o Comitê Disciplinar entrar em uma propriedade privada do Chá das Cinco, as coisas ficam complicadas. Mesmo que esteja aberto ao público."
10046210-25 = "Dito isso, não posso ignorar os tumultos causados pelos alunos de Gehenna. #nNão quero que as coisas piorem mais do que já estão."
10046210-26 = "Então foi por isso que você veio sozinha...?"
10046210-27 = "Sim, se eu mantiver a postura de pessoa física, posso reduzir um pouco os riscos políticos."
10046210-28 = "……Bem, é uma medida desesperada, mas..."
10046210-29 = "Por isso, tenho uma proposta."
10046210-30 = "Se não se importar, poderia incluir uma voluntária externa na patrulha?"
10046210-31 = "A presidente do Comitê Disciplinar!?"
10046210-32 = "Não. Apenas Hina Sorasaki."
10046210-33 = "Ah, é verdade. #nBem, Hina-san... se você puder nos ajudar, seria de grande ajuda!"
10046210-34 = "Obrigada. Então, está decidido."
10046210-35 = "Não sei como dizer... mas sinto que agora não perderemos para ninguém."
10046210-36 = "Não é bem assim. #nO Comitê de Justiça tem veteranas admiráveis, não tem?"
10046210-37 = "Não é como se eu fosse especialmente superior a elas."
10046210-38 = "Então, vamos nessa."
10046210-43 = "……Aquela é a presidente do Comitê Disciplinar de Gehenna."
10046210-44 = "Dá para entender um pouco por que certas pessoas têm tanto medo dela..."
10046210-45 = "……Ué? #nMas então, por que o comportamento dos alunos problemáticos não melhora de jeito nenhum...?"
10046210-46 = "……."
10046210-47 = "Melhor não pensar muito nisso."
