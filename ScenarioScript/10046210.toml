[translation]
10046210-3 = "……やっぱり。"
10046210-4 = "最近、妙に静かだと思ったら。これが理由だったのね。"
10046210-5 = "……ゲヘナの風紀委員長！？"
10046210-6 = "ああ、気をつかわせてしまったかしら。"
10046210-7 = "用事が終わればすぐに帰るから。"
10046210-8 = "あ、いや……その……。"
10046210-9 = "どうして、その格好を……？"
10046210-10 = "海だもの。濡れてもいい服装を選んだだけよ。"
10046210-11 = "あー……なるほどっすね。"
10046210-12 = "それで、用事っていうのは……？"
10046210-13 = "遊びに来た……わけじゃなさそうっすけど。"
10046210-14 = "……そうね。変な誤解を招く前に、きちんと釈明させてもらうわ。"
10046210-15 = "まず、事前通達もせず立ち入ってごめんなさい。#nこれは風紀委員会からの正式な謝罪として受け取ってちょうだい。"
10046210-16 = "えっ！？いやいや、顔を上げてください！"
10046210-17 = "ゲヘナの風紀委員長として、その影響力を考慮すべきだったわ。"
10046210-18 = "ただし今回の訪問は、あくまで[ruby=そらさき]空崎[/ruby]ヒナ個人によるもの。"
10046210-19 = "……。"
10046210-20 = "と言ったところで、正義実現委員会としては納得できないわよね。"
10046210-21 = "そうっすね……。"
10046210-22 = "用事というのは、問題児の取り締まり。#nすでにいくつかの騒ぎを起こしているようだし。"
10046210-23 = "まあ、はい……。"
10046210-24 = "でも、風紀委員会がティーパーティーの私有地に立ち入っては、話がややこしくなる。一般公開されているとはいえね。"
10046210-25 = "それはそれとして、ゲヘナ生が起こす騒ぎを放置もできない。#nこれ以上、事を荒立てたくはないの。"
10046210-26 = "だから、一人で来たんすか……？"
10046210-27 = "ええ、個人というスタンスをとれば、いくらか政治的リスクを抑えられるから。"
10046210-28 = "……まあ、苦肉の策だけど。"
10046210-29 = "そこで、一つ提案があるの。"
10046210-30 = "よかったら、[ruby=・]外[/ruby][ruby=・]部[/ruby][ruby=・]の[/ruby][ruby=・]ボ[/ruby][ruby=・]ラ[/ruby][ruby=・]ン[/ruby][ruby=・]テ[/ruby][ruby=・]ィ[/ruby][ruby=・]ア[/ruby]を一人、#nパトロールに加えてもらえないかしら？"
10046210-31 = "風紀委員長をですか！？"
10046210-32 = "違うわ。ただの空崎ヒナよ。"
10046210-33 = "あ、そうでした。#nその、ヒナさん……が手伝ってくださるなら、大助かりっす！"
10046210-34 = "ありがとう。じゃあ、決まりね。"
10046210-35 = "なんというか……今なら誰にも負けない気がするっす。"
10046210-36 = "別にそうでもないわ。#n正義実現委員会には、立派な先輩たちがいるでしょう？"
10046210-37 = "特別私の方が秀でているわけでもないもの。"
10046210-38 = "では、行きましょう。"
10046210-43 = "……あれが、ゲヘナの風紀委員長。"
10046210-44 = "誰かさんがやたらと怖がるのも、少しは分かるというか……。"
10046210-45 = "……あれ？#nなのに、問題児たちの素行が一向に改善されないのは……。"
10046210-46 = "……。"
10046210-47 = "深く考えるのはやめよう。"
