[translation]
1006203-1 = "vida escolar normal"

1006203-2 = "campus da escola do milênio"

1006203-3 = "(Visitei o Millennium para conhecer Toki)"

1006203-7 = "Estávamos esperando por você, senhor."

1006203-8 = "Obrigado por reservar um tempo de sua agenda lotada."

1006203-9 = "[s] \"Então, qual é o problema?\""

1006203-10 = "É isso..."

1006203-11 = "Em primeiro lugar, por favor, dê uma olhada nesta carta."

1006203-12 = "Recebi da minha escola, mas não tenho certeza se meu entendimento está correto..."

1006203-13 = "Tenho certeza que o professor sabe muito, então gostaria de receber alguns conselhos..."

1006203-14 = "(Recebi uma carta de Toki)"

1006203-16 = "[ns1] \"Porque não frequentei dias suficientes\"\n[ns2] \"Diz que se eu continuar assim, vou repetir o ano...\""

1006203-19 = "Entendo, isso corresponde ao meu entendimento. Em outras palavras……."

1006203-20 = "Você pode deixar isso em paz."

1006203-21 = "Bem, não parece haver nenhum problema, então estarei ajudando o professor hoje também."

1006203-26 = "[ns3] \"Não, não, estamos em apuros!?\"\n[ns4] \"Não concordamos com isso!?\""

1006203-29 = "Se você tiver que repetir uma nota uma vez, não importa se você repetir duas ou três vezes."

1006203-30 = "Na verdade, se você repetir de ano, poderá ajudar seu professor não apenas no próximo ano ou no ano seguinte, mas também depois dele."

1006203-31 = "O período de nossas atividades como C&C também será estendido, então espero que possamos fazer coisas boas."

1006203-32 = "[s5] \"É completamente diferente, não é!?\"\n[s6] \"O que você estava fazendo até agora!?\""

1006203-35 = "Até agora, o comparecimento era tratado como uma exceção especial."

1006203-36 = "Contudo, agora que as circunstâncias mudaram, parece que é necessária uma frequência regular."

1006203-43 = "Por favor, espere, senhor. #nTive uma ideia..."

1006203-44 = "Não seria melhor se a escola reconhecesse o cuidado do professor como uma exceção especial?"

1006203-49 = "Você não acha que é uma boa ideia? #nQue tal a transferência do professor para o Millennium?"

1006203-50 = "[s7] \"Isso pode causar muitos problemas...\"\n[s8] \"Espere um minuto. O resto da carta é...\""

1006203-53 = "é assim mesmo……."

1006203-54 = "A carta diz que de agora em diante, se você não negligenciar seus deveres de estudante e passar seu tempo como um dos estudantes..."

1006203-55 = "Foi escrito que, à luz da situação actual, medidas de alívio podem ser consideradas."

1006203-56 = "[s] \"Em outras palavras, você precisa de uma ``vida escolar normal''\"."

1006203-57 = "普通の学園生活……？"
1006203-58 = "O que aconteceu com você ficando tão animado?"

1006203-59 = "[s9] \"Você se sente ansioso?\"\n[s10] \"Você se sente desconfortável?\""

1006203-62 = "……."

1006203-63 = "Não posso dizer que não estou preocupado porque não sei muito sobre isso."

1006203-64 = "O que devo fazer...?"

1006203-65 = "[s] \"Eu vou te ajudar.\""

1006203-66 = "O que, professor?"

1006203-67 = "Professor, por favor, não me afaste tão de repente...! ?"

1006203-72 = "(Assim, a “vida escolar normal” de Toki começou.)"

1006203-73 = "(Decidi pedir a ela que fizesse uma aula primeiro e depois a observasse em silêncio.)"

1006203-75 = "sala de aula"

1006203-76 = "Bem, isso é tudo para a aula online de hoje."

1006203-77 = "Obrigado a todos por ouvirem até o final."

1006203-78 = "Toki-san, parece que já faz um tempo que você não participa, então gostaria de verificar sua compreensão, então você poderia me ajudar a resolver esse problema?"

1006203-82 = "……."

1006203-83 = "Resolver o problema, ou seja, basta resolvê-lo..."

1006203-84 = "Ao se deparar com um problema complexo..."

1006203-85 = "Os agentes também são obrigados a avançar de frente com força!"

1006203-87 = "O-o que! ? A tela...!"

1006203-88 = "Por favor, pare! Não use ferramentas C&C durante a aula!"

1006203-89 = "Além disso, existe uma ferramenta de hacking #n que pode remover o firewall do Millennium num instante...!"

1006203-90 = "Se você não parar imediatamente, não poderá participar! !"

1006203-91 = "! ?"

1006203-92 = "Professor, o que devo fazer numa situação como esta?"

1006203-93 = "[s] \"Apenas resolva o problema honestamente...\""

1006203-94 = "Se as pessoas fossem tão honestas, não haveria conflito no mundo. #nÉ muito lamentável, mas..."

1006203-95 = "[s] \"Faça algo sobre isso! Para participação!\""

1006203-96 = "...Não pode mais ser ajudado. Vamos tentar lidar com o problema com calma."

1006203-105 = "É o Toki, certo? Eu queria falar com você há um tempo. #nVocê gostaria de ir a um café, se quiser?"

1006203-106 = "! ?"

1006203-107 = "Bem, professora..."

1006203-108 = "[s] \"Vá. Aproveite seu tempo.\""

1006203-109 = "Mas...."

1006203-110 = "[s] \"Passar um tempo no café depois da escola com os amigos é a melhor parte da vida escolar!\""

1006203-111 = "E-É mesmo...?"

1006203-112 = "Se sim, traga seu professor com você..."

1006203-113 = "[s] \"É importante se divertir com seus alunos.\""

1006203-114 = "一緒ではダメなのですか……？"
1006203-115 = "professor? professor! ?"

1006203-117 = "(Ele parecia um cachorrinho abandonado, mas engoliu as lágrimas e se despediu dele.)"

1006203-118 = "(depois de um tempo......)"

1006203-120 = "Bum! !"

1006203-121 = "[ns] \"Explosão B!?\""

1006203-122 = "Kyaaaaaaaaaaaa! ?"

1006203-126 = "O que... o que é essa empregada...?"

1006203-127 = "Seria um desperdício jogar fora bolos que estão prestes a não serem vendidos. Só pensei em comê-lo se fosse #n..."

1006203-135 = "Esse tipo de comportamento é chamado de comer e beber sem pagar."

1006203-136 = "É isso! Você acha que os rumores sobre não se aproximar das empregadas do Millennium vão te assustar? ?"

1006203-137 = "……."

1006203-138 = "Entendo, isso é vida escolar normal?"

1006203-139 = "Eu vi isso em um livro na sala do clube C&C."

1006203-140 = "É dever dos alunos derrotar todas as crianças problemáticas que arranjam brigas e governam a #n escola!"

1006203-141 = "Huh? Você acha que pode fazer isso, está brincando comigo?"

1006203-142 = "[ns] \"Você não entende mal o dever dos alunos!?\""

1006203-143 = "Agora que está assim, vou fazer isso a sério."

1006203-144 = "Posso não conseguir dar o meu melhor, mas vou mostrar-lhe a minha força."

1006203-145 = "Transição de traje motorizado [Abi Eshuf]"

1006203-147 = "(Mesmo depois disso, consegui impedir que Toki perdesse o controle.)"

1006203-150 = "Professor, você está bem?"

1006203-151 = "[s] \"Minha expectativa de vida pode ter sido encurtada em alguns anos...\""

1006203-152 = "……."

1006203-153 = "...Desculpe."

1006203-154 = "Eu te causei problemas de novo..."

1006203-155 = "Mesmo que eu devesse ajudar o professor, só estou causando problemas..."

1006203-156 = "Não tenho qualificação para ser assistente..."

1006203-157 = "[s11] \"Isso não é verdade. Se vocês estudarem juntos, vocês ficarão bem.\"\n[s12] \"Vamos nos recompor e tentar de novo!\""

1006203-160 = "……sim."

1006203-161 = "Se o professor disser isso..."

1006203-162 = "De qualquer forma, senhor."

1006203-167 = "A vida escolar normal é uma coisa muito difícil."

1006203-169 = "(Quando encontro os olhos de Toki, que expressa seus sentimentos sinceros com uma expressão fria...)"

1006203-170 = "(Eu só consegui acenar um pouco)"

