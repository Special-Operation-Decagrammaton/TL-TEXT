[translation]
1006203-1 = "普通の学園生活"
1006203-2 = "ミレニアムスクールキャンパス"
1006203-3 = "（トキに会うために、ミレニアムを訪れた）"
1006203-7 = "お待ちしておりました、先生。"
1006203-8 = "お忙しい中、ご足労くださりありがとうございます。"
1006203-9 = "[s] \"それで、困ったことって？\""
1006203-10 = "それがですね……。"
1006203-11 = "まずは、この手紙をご覧ください。"
1006203-12 = "学校から届いたのですが、私の認識が正しいのか確信が持てず……。"
1006203-13 = "先生なら詳しいかと思い、アドバイスをいただきたく……"
1006203-14 = "（トキから手紙を受け取った）"
1006203-16 = "[ns1] \"出席日数が足りないから、\"\n[ns2] \"このままだと留年しちゃうって、書いてあるね……。\""
1006203-19 = "なるほど、私の認識と一致しています。つまり……。"
1006203-20 = "放っておいても構いませんね。"
1006203-21 = "では、特に問題もないようですし、今日も先生を補佐いたします。"
1006203-26 = "[ns3] \"いやいや、大変なことになってるよ！？\"\n[ns4] \"そこの認識までは一致してないよ！？\""
1006203-29 = "留年なら一度していますし、二度、三度留年したところで一向に構いません。"
1006203-30 = "むしろ、留年すれば来年、再来年だけでなく、その先も先生を補佐できます。"
1006203-31 = "C&Cとして活動する期間も延びますから、いいこと尽くめですね。"
1006203-32 = "[s5] \"全然違うからね！？\"\n[s6] \"今まではどうしてたの！？\""
1006203-35 = "これまでは特例として、出席扱いになっていました。"
1006203-36 = "ですが、今は事情が変わったこともあり、通常通りの出席が求められているようです。"
1006203-43 = "待ってください、先生。#n閃いたのですが……。"
1006203-44 = "先生のお世話を、学校側で特例として認めてもらえば良いのでは……？"
1006203-49 = "良いアイデアだと思いませんか？#nせっかくですから、先生がミレニアムに転勤するというのはどうでしょう？"
1006203-50 = "[s7] \"それは色々と困るかな……。\"\n[s8] \"ちょっと待ってね。手紙の続きは……。\""
1006203-53 = "そうですか……。"
1006203-54 = "手紙には、これからは学生の本分をおろそかにせず、生徒の一人として過ごすのであれば……。"
1006203-55 = "これまでの状況を鑑みて、救済措置を考慮しても良いと書かれてありました。"
1006203-56 = "[s] \"つまり「普通の学園生活」が必要ってことなんだね。\""
1006203-57 = "普通の学園生活……？"
1006203-58 = "そんなに意気込んで、どうされたのですか？"
1006203-59 = "[s9] \"不安だったりする？\"\n[s10] \"あんまり気が乗らないかな？\""
1006203-62 = "……。"
1006203-63 = "よく知らないものですから、不安がないとは言えませんね。"
1006203-64 = "私はどうしたら良いのでしょうか……。"
1006203-65 = "[s] \"私が手伝ってあげるよ。\""
1006203-66 = "せ、先生？"
1006203-67 = "先生、そんな急に引っ張らないでください……！？"
1006203-72 = "（こうして、トキの「普通の学園生活」が始まった）"
1006203-73 = "（まずは授業を受けてもらって、そっと見守ることにした）"
1006203-75 = "教室"
1006203-76 = "それでは、本日のオンライン授業はここまでとします。"
1006203-77 = "皆さん、最後までご清聴いただきありがとうございました。"
1006203-78 = "[ruby=あすま]飛鳥馬[/ruby]トキさん、久しぶりに参加されたようですから、理解度を確かめたいのでこちらの問題を解いてもらえませんか？"
1006203-82 = "……。"
1006203-83 = "問題を解く、つまり解決すれば良いということですね……。"
1006203-84 = "もし複雑な問題が立ちふさがった時には……。"
1006203-85 = "力技で正面突破することも、エージェントには求められます！"
1006203-87 = "な、何を！？画面が……！"
1006203-88 = "おやめください！授業中にC&Cの道具を使ってはいけません！"
1006203-89 = "しかも、ミレニアムのファイアウォールを一瞬で解除してしまうほどの#nハッキングツールなんて……！"
1006203-90 = "すぐに停止しなければ、出席は認められませんよ！！"
1006203-91 = "！？"
1006203-92 = "先生、こういった時はどうしたら？"
1006203-93 = "[s] \"素直に問題を解けば良いんじゃ……。\""
1006203-94 = "そう素直な人ばかりなら、世の中に争いなんて生まれないでしょう。#n非常に残念なことですが……。"
1006203-95 = "[s] \"そこをなんとか！出席のために！\""
1006203-96 = "……もう、仕方ないですね。大人しく問題に取り組むとしましょうか。"
1006203-105 = "トキさんですよね？前から話してみたかったんです。#n良かったらカフェに行きませんか？"
1006203-106 = "！？"
1006203-107 = "せ、先生……。"
1006203-108 = "[s] \"行ってらっしゃい。ゆっくり楽しんでおいで。\""
1006203-109 = "ですが……。"
1006203-110 = "[s] \"友人と放課後にカフェで過ごすなんて、学園生活の醍醐味だよ！\""
1006203-111 = "そ、そうなんですか……？"
1006203-112 = "でしたら、先生もご一緒に……。"
1006203-113 = "[s] \"生徒同士で楽しむ時間も大切だからね。\""
1006203-114 = "一緒ではダメなのですか……？"
1006203-115 = "先生？先生！？"
1006203-117 = "（捨てられた子犬のような目をしていたが、涙を飲んで見送った）"
1006203-118 = "（しばらくして……）"
1006203-120 = "ドカァァン！！"
1006203-121 = "[ns] \"ば、爆発！？\""
1006203-122 = "きゃぁぁぁっ！？"
1006203-126 = "な……何なんだよ、このメイド……。"
1006203-127 = "売れ残りそうなケーキを捨てるのも、もったいないだろうからなあ。#nだったら食べてやろうと思っただけなのによ……。"
1006203-135 = "そういった行為を無銭飲食と言うのです。"
1006203-136 = "んだと！ミレニアムのメイドには近寄るなって噂にビビると思ってんのか！？"
1006203-137 = "……。"
1006203-138 = "なるほど、これが普通の学園生活ですか。"
1006203-139 = "C&Cの部室にあった本で見たことがあります。"
1006203-140 = "喧嘩を売ってくる問題児を全員倒し、#n学園を支配することこそ生徒の本分であると！"
1006203-141 = "はあ？やれると思ってんのか、ふざけやがって！"
1006203-142 = "[ns] \"生徒の本分を勘違いしてない！？\""
1006203-143 = "こうなった以上、本気で参ります。"
1006203-144 = "全力とはいきませんが、ここは一つ、私の力をお見せしましょう。"
1006203-145 = "パワードスーツ【アビ・エシュフ】移行ーー"
1006203-147 = "（その後も暴走しようとするトキを何とか抑えた）"
1006203-150 = "先生、大丈夫ですか？"
1006203-151 = "[s] \"寿命が何年か縮まったかも……。\""
1006203-152 = "……。"
1006203-153 = "……申し訳ございません。 "
1006203-154 = "またご迷惑をかけてしまいましたね……。"
1006203-155 = "先生を補佐する身だというのに、ご迷惑をかけてばかりで……。"
1006203-156 = "私には、補佐をする資格がありません……。"
1006203-157 = "[s11] \"そんなことないよ。一緒に勉強していけば大丈夫。\"\n[s12] \"もう一度、気を取り直して挑戦してみよう！\""
1006203-160 = "……はい。"
1006203-161 = "先生が、そう仰るのでしたら……。"
1006203-162 = "それにしても、先生。"
1006203-167 = "普通の学園生活とは、こうも難しいものなのですね。"
1006203-169 = "（クールな表情で切実な思いを吐露するトキと目が合うと……）"
1006203-170 = "（小さく頷くことしかできなかった）"
