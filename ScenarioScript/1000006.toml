[translation]
1000006-1 = "Proposta de contratação como consultor de gestão externo"
1000006-2 = "Problem Solver 68 - Escritório"
1000006-3 = "Ah, Sensei, você veio."
1000006-4 = "[s] \"Aru, qual é o assunto importante?\""
1000006-5 = "Primeiro, não é nada demais. É que estive pensando em um novo plano de negócios recentemente."
1000006-6 = "Não há dúvidas de que sou uma presidente maravilhosa, mas entendo muito bem o que me falta de uma perspectiva objetiva."
1000006-7 = "É impossível para um único indivíduo ser perfeito em tudo."
1000006-8 = "O que quero dizer é que, como negócio, é necessário considerar seriamente buscar ajuda externa caso algo esteja faltando."
1000006-9 = "[s] \"O que você quer dizer com isso?\""
1000006-10 = "Acho que o que mais falta a mim, como presidente que lidera uma organização, é experiência."
1000006-11 = "E... eu julguei que você, Sensei, possui a experiência que me falta."
1000006-12 = "Sensei, você é, bem... um adulto, certo?"
1000006-13 = "Digo, no sentido de que você tem muitas experiências que eu ainda não tenho, então, um adulto, ou melhor..."
1000006-14 = "B-bem, é claro que eu vou alcançar esse nível de experiência rapidamente também...!! M-mas agora..."
1000006-15 = "Então, é, bem..."
1000006-18 = "Serei direta: quero contratar você como consultor de gestão da nossa empresa."
1000006-19 = "[s] \"Consultor de gestão? Mas isso...\""
1000006-20 = "Ah, é claro que não espero uma resposta imediata."
1000006-21 = "Fufufu, nós temos muito tempo pela frente."
1000006-22 = "Esperarei o tempo que for necessário até que você tenha uma resposta clara em seu coração, Sensei."
1000006-23 = "Não importa o que digam, eu sou a melhor líder de Gehenna."
1000006-26 = "（Hehehe, consegui mostrar meu charme maduro, né? Agora, para o golpe final...）"
1000006-27 = "（Trim, trim, trim!）"
1000006-28 = "Ah, espere um pouco."
1000006-29 = "Parece ser uma ligação de trabalho, vamos conversar de novo depois que eu resolver isso."
1000006-30 = "（Timing perfeito. Se eu mostrar ao Sensei como trabalho de forma elegante, missão cumprida!）"
1000006-33 = "― Sim, [wa:800] aqui é Aru Rikuhachima, [wa:1500] da Problem Solver 68."
1000006-37 = "[wa:1000]― (Hehe, [wa:1000] não fique aí babando [wa:2000] enquanto me vê trabalhar, viu?)"
1000006-39 = "― (Espera, [wa:500] não é um número errado!? [wa:1500] Nós não somos uma loja de sushi!)"
1000006-42 = "[wa:1000]― Hmm. [wa:800] Que complicado. [wa:1500] Nossa agenda está bem apertada agora."
1000006-44 = "― (Entrega? [wa:1000] É óbvio que não fazemos isso!)"
1000006-47 = "[wa:500]― Sim, [wa:1000] sim, [wa:1000] sim. [wa:500] Entendo."
1000006-49 = "― (Perceba logo que ligou errado e desligue, [wa:2200] que conversa longa...)"
1000006-52 = "[wa:500]― Hmm. [wa:1000] Essa é uma questão difícil. [wa:2000] No balanço financeiro deste período... [wa:1500] devido às taxas de juros recentes..."
1000006-54 = "― (Eu não estou perguntando o preço do sushi!)"
1000006-57 = "[wa:2500]― Ah, [wa:500] sim. [wa:500] Entendido. [wa:1300] Compreendo."
1000006-59 = "― (Eu não quero saber das suas preferências de sushi... [wa:2500] Quem é [wa:1000] essa pessoa?)"
1000006-62 = "[wa:300]― Hã? [wa:900] Se não é um número errado?"
1000006-65 = "― O- [wa:600] o que você está dizendo? [wa:900] Estou trabalhando de verdade!"
1000006-68 = "V-viu só...?"
1000006-69 = "E então, Sensei? O que achou do meu visual de trabalho super estiloso? Não se apaixone, hein, seria um problema para mim."
1000006-70 = "Ah, e aliás, não chegue perto de mim sem necessidade."
1000006-71 = "Seria um desastre se você acabasse se queimando com toda essa minha paixão, não acha?"
1000006-72 = "[s1] \"Digo, aquilo de agora pouco não era um telefonema de trabalho, era?\"\n[s2] \"Sushi é uma delícia, né?\""
1000006-73 = "O-o quê, por que está dizendo isso do nada, Sensei!"
1000006-74 = "O-o quê, por que está dizendo isso do nada, Sensei!"
1000006-75 = "Esqueça essas bobagens por agora!"
1000006-76 = "De qualquer forma, guarde bem a minha proposta."
1000006-77 = "Estou esperando pelo dia em que você se tornará o consultor administrativo da nossa empresa. Hehe!"
1000006-79 = "(C-consegui disfarçar bem, né? Consegui, né? Vai dar tudo certo, né?)"
