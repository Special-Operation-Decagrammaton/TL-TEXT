[translation]
10013070-1 = "第7話;最後の戦いを前に"
10013070-2 = "（次の目的地へ向かう前、しばらく時間が空いた頃）"
10013070-6 = "[s1] \"そういえば、シズコはニャン天丸と契約しなかったね。\"\n[s2] \"黒亀組の兵力があれば、仕事もスムーズになったかも。\""
10013070-9 = "えっ？仕事って「リゾート狩り」のことですか？"
10013070-10 = "まあ、それはそうかもしれませんけど……。"
10013070-11 = "でも、契約はしません！"
10013070-12 = "[s] \"どうして？\""
10013070-13 = "だって……そんなの当然じゃないですか。#nニャン天丸のしたことは詐欺や迷惑行為に過ぎなかったんですから。"
10013070-14 = "歪んだ商売で、みんなの楽しい一時を台無しにするようなことは！#n絶対に許せません！"
10013070-15 = "ですから、あんな奴と契約するくらいなら、諦めた方がまだマシといいますか……"
10013070-19 = "と、とにかく！そういうことです！はい！"
10013070-20 = "[s] \"うん、とてもシズコらしいね。\""
10013070-21 = "うっ！ま、またそのようなことを……"
10013070-22 = "もうっ……！"
10013070-23 = "ふぅ……ひとまず、「リゾート狩り」については大詰めと見て良いと思います。"
10013070-24 = "ですから終盤に向けて、一度アビドスの生徒たちと作戦会議をしましょう！"
10013070-26 = "なるほどね～……カイザーPMCか。"
10013070-27 = "やっぱり、私たちの見立ては正しかったみたいね。"
10013070-28 = "[s] \"どういうこと？\""
10013070-29 = "それが……私たちも後から知ったのですが……"
10013070-31 = "どうやら、ヘルメット団はカイザーPMCと繋がっているみたいなんです。"
10013070-32 = "[s] \"ラブが率いてるヘルメット団が……。\""
10013070-33 = "ニャン天丸もヘルメット団もカイザーPMCの支援を受けていたってことは……"
10013070-34 = "つまり、私たちに「リゾート使用権」を売り飛ばしたオクトパスバンクは、#n最初から裏で「リゾート狩り」を唆すつもりだったってこと！？"
10013070-35 = "本当に何なの！？あいつら！"
10013070-37 = "うへぇ～。本当に綺麗に全部カイザーに繋がるねぇ。"
10013070-38 = "ん。でも、そのおかげでやるべきことがハッキリした。"
10013070-39 = "はい！私たちもこれからヘルメット団がいる所に向かおうと思います！"
10013070-40 = "[s] \"それじゃあ、次はアビドスと百鬼夜行の合同作戦になるね。\""
10013070-41 = "実は、ちょうどこっちもヘルメット団を攻略するための作戦を立ててたんだよね。"
10013070-42 = "[s] \"作戦？\""
10013070-43 = "あの、ホシノ先輩……その作戦、本当に大丈夫なんですか？"
10013070-44 = "私はアリだと思う。ホシノ先輩の作戦だし。"
10013070-46 = "何より、面白そうですからね～。"
10013070-47 = "その作戦って、一体……"
10013070-48 = "ふっふっふ～……まだ秘密だよ。#nほら、敵を欺くならまずは味方からって言うじゃん？"
10013070-49 = "[s] \"まあ、ホシノがそう判断するなら異論はないけど。\""
10013070-50 = "おぉ～、信じてくれるの？おじさん、ちょっと嬉しいかも。"
10013070-51 = "私は少し心配ですけど……"
10013070-52 = "いやいや！何度考えてもおかしいわよその作戦！もう一回考え直した方が……！"
10013070-53 = "それじゃ～、お互い最後までがんばろ～。"
10013070-57 = "[ns] \"なんだか、大がかりな準備をしてるみたいだね。\""
10013070-58 = "そうみたいですね……。#nさて、終わりも見えてきたことですし、"
10013070-59 = "さっさと解決しちゃいましょう！"
