[translation]
10013070-1 = "Episódio 7; Antes da batalha final"
10013070-2 = "（Antes de seguir para o próximo destino, enquanto tínhamos um tempo livre）"
10013070-6 = "[s1] \"Falando nisso, Shizuko, você não fez um contrato com Nyantenmaru, né?\"\n[s2] \"Se tivéssemos o poder militar do Grupo Kurokame, talvez o trabalho tivesse sido mais tranquilo.\""
10013070-9 = "Hã? Trabalho? Você está falando da \"Caça ao Resort\"?"
10013070-10 = "Bem, talvez seja isso, mas..."
10013070-11 = "Mas eu não vou fazer um contrato!"
10013070-12 = "[s] \"Por que não?\""
10013070-13 = "Porque... isso é óbvio, não é?#nO que o Nyantenmaru fez não passou de fraude e comportamento incômodo."
10013070-14 = "Arruinar o momento de diversão de todos com negócios distorcidos!#nEu nunca vou perdoar isso!"
10013070-15 = "Por isso, prefiro desistir a ter que fazer um contrato com alguém assim..."
10013070-19 = "E-Enfim! É isso! Sim!"
10013070-20 = "[s] \"Entendi, é bem a sua cara, Shizuko.\""
10013070-21 = "Ugh! D-de novo dizendo essas coisas..."
10013070-22 = "Ah, chega...!"
10013070-23 = "Ufa... por enquanto, acho que podemos considerar que a \"Caça ao Resort\" está chegando ao fim."
10013070-24 = "Então, para a fase final, vamos fazer uma reunião de estratégia com as alunas de Abydos!"
10013070-26 = "Entendo... Kaiser PMC, é."
10013070-27 = "Pelo visto, nossa suspeita estava correta."
10013070-28 = "[s] \"O que você quer dizer?\""
10013070-29 = "É que... nós também descobrimos isso depois..."
10013070-31 = "Ao que parece, o Grupo dos Capacetes está conectado à Kaiser PMC."
10013070-32 = "[s] \"O Grupo dos Capacetes liderado pela Love...\""
10013070-33 = "Se tanto o Nyantenmaru quanto o Grupo dos Capacetes recebiam apoio da Kaiser PMC..."
10013070-34 = "Isso significa que o Octopus Bank, que nos vendeu o \"Direito de Uso do Resort\",#njá pretendia incitar a \"Caça ao Resort\" desde o início!?"
10013070-35 = "O que eles têm na cabeça!? Aqueles idiotas!"
10013070-37 = "Uhee~. Tudo se conecta perfeitamente à Kaiser, hein."
10013070-38 = "Hmm. Mas, graças a isso, o que precisamos fazer ficou claro."
10013070-39 = "Sim! Nós também vamos seguir para onde o Grupo dos Capacetes está agora!"
10013070-40 = "[s] \"Então, a próxima será uma operação conjunta entre Abydos e Hyakkiyako.\""
10013070-41 = "Na verdade, a gente já estava montando uma estratégia para lidar com o Grupo dos Capacetes."
10013070-42 = "[s] \"Estratégia?\""
10013070-43 = "Ei, Hoshino-senpai... essa estratégia, é realmente segura?"
10013070-44 = "Eu acho que é uma boa. É a estratégia da Hoshino-senpai, afinal."
10013070-46 = "E acima de tudo, parece divertido~."
10013070-47 = "Que estratégia é essa, afinal..."
10013070-48 = "Fufufu~... ainda é segredo.#nSabe como é, para enganar o inimigo, primeiro você precisa enganar seus aliados, não é?"
10013070-49 = "[s] \"Bem, se a Hoshino decidiu assim, não tenho objeções.\""
10013070-50 = "Oh~, você confia em mim? O tio aqui até que ficou feliz."
10013070-51 = "Eu ainda estou um pouco preocupada..."
10013070-52 = "Não, não! Não importa o quanto eu pense, essa estratégia é estranha! É melhor repensar!"
10013070-53 = "Então, vamos dar o nosso melhor até o fim."
10013070-57 = "[ns] \"Parece que eles estão fazendo preparativos em grande escala.\""
10013070-58 = "Parece que sim...#nBem, já que o fim está próximo,"
10013070-59 = "vamos resolver isso logo de uma vez!"
