[translation]
2002505-1 = "冷たい風と、暖かい心"
2002505-2 = "（気温が下がり、風も痺れるほど冷たくなった）"
2002505-3 = "（……ふとハルカと彼女の育てている植物が心配になり、時間を作って訪ねてみた）"
2002505-5 = "（建物の中は、外より随分と暖かかった）"
2002505-9 = "（……相変わらず外の風は冷たそうだったけれど）"
2002505-13 = "[ns1] \"ハルカ～？来たよ～？\"\n[ns2] \"おーい？\""
2002505-14 = "ひ、ひぃっ！？せ、せせせせ先生……！？"
2002505-15 = "ひ、ひぃっ！？せ、せせせせ先生……！？"
2002505-16 = "い、今……今行きます……！！"
2002505-24 = "せ、先生……！？どうしてこんな寒い中……。"
2002505-25 = "あ、えっと、来てはいけないという話ではなくて……！#nただ、その……。"
2002505-26 = "[s3] \"ハルカと植物が心配になったんだ。\"\n[s4] \"大丈夫？寒くない？\""
2002505-27 = "……え？"
2002505-28 = "……え？"
2002505-29 = "え、ええっ！？ど、どうして先生が私たちなんかの心配を……！？ "
2002505-30 = "あ、も、もちろん私たちは大丈夫です。何の問題もありません！#nむしろこれくらいが、私たちに似合っているといいますか……！！"
2002505-34 = "……その、仰る通り風が冷たいのは事実ですけれど……。"
2002505-35 = "この子たちは……こういう環境に耐えられる子たちですから……。"
2002505-36 = "日差しと水さえあれば……よほどのことがない限り枯れません……。"
2002505-37 = "……雑草、ですから……。"
2002505-38 = "[s5] \"それでも世話をしに来たんだね。\"\n[s6] \"ハルカは優しいね。\""
2002505-39 = "そ、そんなことは……！"
2002505-40 = "そ、そんなことは……！"
2002505-41 = "あ、いえ、これは口答えとかではなく……！"
2002505-42 = "た、確かにこの雑草たちは、自分たちだけで生きていけますが……。"
2002505-43 = "それでも誰かが面倒を見てくれるのは……きっと嬉しいはずですから……。"
2002505-44 = "だから、こうしてお世話をしているんです……。#nただ……それだけで……。"
2002505-45 = "……先生？"
2002505-46 = "……えっ？い、いえ！そういうわけにはいきません！#n先生が汚れてしまったら、私も雑草もどうしていいか……！！"
2002505-47 = "そ、それにお世話はもう終わったんです……！#n片付けまで、全部……！ "
2002505-48 = "……え？"
2002505-49 = "行こう、って……どちらに、ですか……？"
2002505-50 = "あ、いえ、何でもありません！#n私なんかがそんなことを聞くなんて……！"
2002505-51 = "つ、ついていきます、どこまでも……！#n凍てつく極寒の地だとしても！！"
2002505-62 = "せ、先生……？ここは……？"
2002505-63 = "[s7] \"温かいスープでも飲もうかなって。\"\n[s8] \"ハルカと一緒に飲みたいなと思って。\""
2002505-64 = "え、え……どうして急に……！？"
2002505-65 = "え、え……どうして急に……！？"
2002505-66 = "わ、私なんかにこんな……これ以上、一体どうやってお礼をすれば……？"
2002505-67 = "い、命まで捧げているのに、こんなものをいただいてしまったら……今世……"
2002505-68 = "いえ、来世まで捧げても足りません……！"
2002505-69 = "[s9] \"気にしないで。ハルカに喜んでほしいだけだから。\"\n[s10] \"誰かが面倒を見てくれるのは嬉しいはずだから。\""
2002505-70 = "……ぁ……。"
2002505-71 = "……ぁ……。"
2002505-72 = "そ……それは……その……。"
2002505-73 = "う……うぅ……。"
2002505-74 = "ううううぅ……っ！？！？！？"
2002505-75 = "[s11] \"落ち着いて、ハルカ？\"\n[s12] \"ほら、一緒に温まろう？\""
2002505-76 = "……！！"
2002505-77 = "……！！"
2002505-78 = "は……はい……。"
2002505-79 = "……はい！！落ち着きました！！"
2002505-80 = "で、では……。"
2002505-84 = "……い……。"
2002505-85 = "……いただきます！！"
2002505-87 = "（その後、ハルカに温かいものをいっぱい食べさせてから、シャーレに戻った）"
