[translation]
2002505-1 = "Vento frio e um coração aquecido"
2002505-2 = "（A temperatura caiu e o vento ficou frio a ponto de causar dormência）"
2002505-3 = "（……De repente, fiquei preocupado com a Haruka e as plantas que ela cultiva, então arranjei um tempo para visitá-la）"
2002505-5 = "（Dentro do prédio, estava bem mais quente do que lá fora）"
2002505-9 = "（……Embora o vento lá fora ainda parecesse gelado, como sempre）"
2002505-13 = "[ns1] \"Haruka? Cheguei!\"\n[ns2] \"Ei?\""
2002505-14 = "H-Hiiiii!? P-P-P-Professor...!?"
2002505-15 = "H-Hiiiii!? P-P-P-Professor...!?"
2002505-16 = "J-Já vou... Já estou indo...!!"
2002505-24 = "P-Professor...!? Por que veio em um frio desses..."
2002505-25 = "A-Ah, não é que eu esteja dizendo que o senhor não deveria vir...!#nÉ só que, bem..."
2002505-26 = "[s3] \"Fiquei preocupado com você e as plantas.\"\n[s4] \"Está tudo bem? Não está com frio?\""
2002505-27 = "……Eh?"
2002505-28 = "……Eh?"
2002505-29 = "E-Ehhh!? P-Por que o professor estaria preocupado com alguém como nós...!?"
2002505-30 = "A-Ah, c-claro que estamos bem. Não há problema algum!#nNa verdade, esse clima combina até com a gente, por assim dizer...!!"
2002505-34 = "……Bem, é verdade que o vento está frio, como o senhor disse..."
2002505-35 = "Mas essas plantas... elas são capazes de suportar esse tipo de ambiente..."
2002505-36 = "Desde que tenham luz solar e água... elas não vão murchar, a menos que algo muito grave aconteça..."
2002505-37 = "……Afinal, são apenas ervas daninhas..."
2002505-38 = "[s5] \"Mesmo assim, você veio cuidar delas.\"\n[s6] \"A Haruka é muito gentil.\""
2002505-39 = "N-Não é nada disso...!"
2002505-40 = "N-Não é nada disso...!"
2002505-41 = "A-Ah, não, não estou tentando retrucar...!"
2002505-42 = "É v-verdade que essas ervas daninhas conseguem sobreviver sozinhas, mas..."
2002505-43 = "Ainda assim, ter alguém cuidando delas... com certeza deve deixá-las felizes..."
2002505-44 = "Por isso, estou cuidando delas assim...#nApenas... por isso..."
2002505-45 = "……Professor?"
2002505-46 = "……Eh? N-Não! Não posso deixar!#nSe o senhor se sujar, eu não saberia o que fazer, nem eu nem as ervas daninhas...!!"
2002505-47 = "E-E além disso, já terminei de cuidar delas...!#nAté a limpeza, tudo...!"
2002505-48 = "……Eh?"
2002505-49 = "Ir... para onde, exatamente...?"
2002505-50 = "A-Ah, não, não é nada!#nComo alguém como eu poderia perguntar algo assim...!"
2002505-51 = "E-Eu vou com o senhor, para onde for...!#nMesmo que seja para um lugar congelante e inóspito!!"
2002505-62 = "P-Professor...? Onde estamos...?"
2002505-63 = "[s7] \"Pensei em tomarmos uma sopa quente.\"\n[s8] \"Queria tomar com você, Haruka.\""
2002505-64 = "E-Eh... por que de repente...!?"
2002505-65 = "E-Eh... por que de repente...!?"
2002505-66 = "P-Para alguém como eu... como poderei retribuir um gesto desses...?"
2002505-67 = "J-Já dediquei minha vida ao senhor, se eu receber algo assim... nesta vida..."
2002505-68 = "Não, nem mesmo dedicando a próxima vida seria o suficiente...!"
2002505-69 = "[s9] \"Não se preocupe. Só quero ver você feliz, Haruka.\"\n[s10] \"Deve ser bom ter alguém cuidando de você.\""
2002505-70 = "……Ah……"
2002505-71 = "……Ah……"
2002505-72 = "I-Isso é... bem..."
2002505-73 = "U-Uuu..."
2002505-74 = "Uuuuuuu...!!??"
2002505-75 = "[s11] \"Calma, Haruka?\"\n[s12] \"Vamos, vamos nos aquecer juntos?\""
2002505-76 = "……!!"
2002505-77 = "……!!"
2002505-78 = "S-sim..."
2002505-79 = "...Sim!! Já me acalmei!!"
2002505-80 = "E-então..."
2002505-84 = "...I..."
2002505-85 = "...Vou comer!!"
2002505-87 = "(Depois disso, fiz a Haruka comer bastante comida quente antes de voltarmos para o Schale)"
