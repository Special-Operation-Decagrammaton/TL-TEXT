[translation]
1300005-1 = "Tempo caminhando juntos"
1300005-2 = "Arredores de Millennium - Distrito 1 do Mercado Negro"
1300005-3 = "Espere! Você aí, seu vilão!"
1300005-4 = "（Pá-pá-pá!）"
1300005-11 = "Droga... eles escaparam."
1300005-12 = "Será que a informação vazou? Eles reagiram rápido demais."
1300005-13 = "Embora eu tenha impedido a transação, ainda não consegui recuperar os documentos. Será que eles fugiram para cá..."
1300005-14 = "...Oh?"
1300005-15 = "Ora, ora!? Mestre, o que faz aqui...?"
1300005-16 = "Sim? Ouviu uma explosão e... entendo, é isso. Sim, eu não tenho 100 milhões por cento de relação com isso."
1300005-17 = "Eh? Por que eu estou aqui, você pergunta? Bem, é que eu acabei de terminar uma missão..."
1300005-18 = "Não, digo, terminei minhas atividades do clube e estava voltando para casa."
1300005-19 = "Fufu, que coincidência."
1300005-20 = "Mas, diga-me, Mestre, como vai?"
1300005-21 = "Uma estudante recatada não deixa o orvalho da noite tocar a ponta de seus sapatos. A segurança em Kivotos ultimamente não é tão boa quanto antigamente."
1300005-24 = "Poderia me levar até Millennium?"
1300005-26 = "Arredores de Millennium - Centro"
1300005-27 = "Mestre, Mestre."
1300005-28 = "Eh? Você não quer que eu te chame de Mestre na frente dos outros?"
1300005-29 = "Entendo, realmente, pode ser que os olhares ao redor sejam um incômodo. Então, como devo chamá-lo?"
1300005-30 = "[s1] \"Me chame de Onii-chan.\"\n[s2] \"Me chame de Onee-chan.\"\n[s3] \"Me chame de Sensei.\" "
1300005-31 = "Hum, isso é um pouco... complicado."
1300005-32 = "Hum, isso é um pouco... complicado."
1300005-33 = "Hum, isso é um pouco... complicado."
1300005-34 = "Como eu disse, mesmo que seja uma ordem do Mestre, eu não posso mudar a forma como me refiro à pessoa a quem sirvo."
1300005-35 = "Afinal, eu sou uma empregada."
1300005-36 = "[s] \"Falando nisso, Akane, por que você entrou para o Maid Club?\""
1300005-37 = "Eh...?"
1300005-38 = "Ah, é verdade que o Maid Club é um pouco peculiar comparado aos outros clubes."
1300005-39 = "Tem estudantes como a Karin, que vieram aprender sobre \"tarefas domésticas\" para se tornarem boas esposas e mães..."
1300005-40 = "E tem pessoas como a Asuna-senpai, que só veio porque queria \"ficar perto da Neru-senpai\"..."
1300005-41 = "Eu não tive esse tipo de mal-entendido ou objetivo."
1300005-42 = "Eu não entrei no Maid Club para me tornar uma empregada..."
1300005-43 = "Eu escolhi a C&C porque eu já era uma empregada."
1300005-44 = "Ah, Mestre. Que tipo de serviço posso prestar hoje para que o senhor fique feliz?"
1300005-45 = "Desde que nasci, só penso em coisas assim."
1300005-46 = "Oh? As pessoas ao redor começaram a ficar agitadas...?"
1300005-47 = "Entendo, se isso incomoda o Mestre, eu posso fazer uma limpeza..."
1300005-49 = "Fufu, não se assuste."
1300005-50 = "É só uma... brin... ca... deira."
1300005-52 = "Na verdade, hoje... eu falhei na minha missão."
1300005-53 = "Mas, embora eu não tenha alcançado o objetivo, encontrar o Mestre..."
1300005-54 = "Faz com que até essa falha pareça uma sorte."
1300005-55 = "Mesmo tendo falhado na missão..."
1300005-56 = "Por que será que não consigo parar de sorrir?"
1300005-57 = "Será porque o Mestre está ao meu lado?"
1300005-58 = "Obrigada. O Mestre sempre me faz sentir feliz..."
1300005-59 = "Por isso, eu também gostaria de fazer o Mestre feliz..."
1300005-62 = "（Pá!）"
1300005-63 = "Ei! Preste atenção! Esses seus olhos são só enfeite?!"
1300005-64 = "Ah, me desculpe, eu..."
1300005-65 = "Hm?"
1300005-66 = "……?"
1300005-67 = "Ué?"
1300005-68 = "……Aaah!?"
1300005-69 = "Ma-ma-maid!? A C&C ainda estava nos perseguindo!?"
1300005-71 = "Aaah! Espere!"
1300005-72 = "Como esperado, tenho muita sorte quando estou com o Mestre!"
1300005-73 = "Mestre! Aquela pessoa é a culpada que recebeu ordens de uma empresa exploradora para roubar as informações pessoais das alunas do Millennium!"
1300005-74 = "Vamos persegui-la!"
1300005-76 = "(No fim das contas, Akane teve sucesso em sua missão)"
