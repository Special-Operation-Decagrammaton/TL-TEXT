[translation]
1300005-1 = "共に歩む時間"
1300005-2 = "ミレニアム近郊・ブラックマーケット第1地区"
1300005-3 = "待ちなさい！そこの悪党の方！"
1300005-4 = "（バタバタバタッ！）"
1300005-11 = "くっ……逃しましたか。"
1300005-12 = "情報が漏れたのでしょうか……対応が早いですね。"
1300005-13 = "取引は防いだものの、まだ書類を確保できていません。もしかしてこちらに逃げ……"
1300005-14 = "……あら？"
1300005-15 = "あらあら！？ご主人様、どうしてここに……？"
1300005-16 = "はい？爆発音を聞いて……なるほど、そうなんですね。はい、私は1億パーセント無関係です。"
1300005-17 = "え？では何で私がここにいるのか、ですか？ですからえっと、ちょうど今任務を終え……"
1300005-18 = "いえ、部活動を終えて、帰ろうとしていたところでした。"
1300005-19 = "ふふっ、偶然ですね。"
1300005-20 = "それより、いかがですかご主人様。"
1300005-21 = "貞淑な女子生徒は、夜露を靴の先に付けないものです。最近のキヴォトスの治安も、昔とは違って良くないですし。"
1300005-24 = "私のこと、ミレニアムまで送ってくれませんか？"
1300005-26 = "ミレニアム近郊・繁華街"
1300005-27 = "ご主人様、ご主人様。"
1300005-28 = "え？人の前ではご主人様と呼ばないで欲しい、ですか？"
1300005-29 = "なるほど、確かに周囲からの視線が気になるかもしれませんね。それでは、何とお呼び致しましょう？"
1300005-30 = "[s1] \"お兄ちゃんって呼んで。\"\n[s2] \"お姉ちゃんって呼んで。\"\n[s3] \"先生って呼んで。\" "
1300005-31 = "うーん、それはちょっと……困りますね。"
1300005-32 = "うーん、それはちょっと……困りますね。"
1300005-33 = "うーん、それはちょっと……困りますね。"
1300005-34 = "やはり、いくらご主人様の命令だとしても、私は、私が仕える方への呼称を変えることはできません。"
1300005-35 = "私は、メイドですので。"
1300005-36 = "[s] \"そういえばアカネは、どうしてメイド部に入ったの？\""
1300005-37 = "え……？"
1300005-38 = "ああ、確かにメイド部は他の部に比べて、少し独特ではありますね。"
1300005-39 = "カリンのように「家事」について学んで良妻賢母になろう、と訪ねてきた生徒もいますし……。"
1300005-40 = "アスナ先輩のように、ただ「ネル先輩と一緒にいるため」に訪ねてきた人もいますけど……。"
1300005-41 = "私はそういった誤解や、目的のようなものはありませんでした。"
1300005-42 = "私は、メイド部に入ってメイドになったのではなく……。"
1300005-43 = "私がメイドだったから、C&Cを選んだのです。"
1300005-44 = "ああ、ご主人様。今日はどのようなご奉仕で、ご主人様に喜んでいただけるのでしょうか。"
1300005-45 = "私は生まれた時から、そのような事ばかりを考えていましたから。"
1300005-46 = "あら？周りの人たちがざわつき始めましたね……？"
1300005-47 = "そうですね、もしご主人様が気になるようでしたら私がお掃除を……。"
1300005-49 = "ふふっ、驚かないでください。"
1300005-50 = "じょ・う・だ・ん、ですよ。"
1300005-52 = "実は、今日……任務に失敗してしまったのです。"
1300005-53 = "ですが、目標は達成できませんでしたが、ご主人様にお会いできて……。"
1300005-54 = "その失敗さえ、幸運のように思えてきますね。"
1300005-55 = "任務に、失敗したのに……。"
1300005-56 = "どうしてでしょう、笑みがこぼれてしまいます。"
1300005-57 = "ご主人様が、そばにいるからでしょうか？"
1300005-58 = "ありがとうございます。ご主人様は、私を幸せにしてくださります……。"
1300005-59 = "ですから私も、ご主人様を幸せにさせていただきた……"
1300005-62 = "（ガッ）"
1300005-63 = "おい！気を付けろ！その目は飾りか！"
1300005-64 = "あらっ、ごめんなさい、私……"
1300005-65 = "うん？"
1300005-66 = "……？"
1300005-67 = "あれ？"
1300005-68 = "……ああっ！？"
1300005-69 = "め、め、メイド！？C&C、まだ追いかけてきてたのか！？"
1300005-71 = "ああっ！待ちなさい！"
1300005-72 = "やはり、間違いなく幸運です、ご主人様と一緒にいると！"
1300005-73 = "ご主人様！あの人が、ブラック企業から指図を受けて、ミレニアムの生徒たちの個人情報を盗んだ犯人です！"
1300005-74 = "追いかけましょう！"
1300005-76 = "（結局、アカネは任務に成功した）"
