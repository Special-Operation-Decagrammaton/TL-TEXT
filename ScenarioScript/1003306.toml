[translation]
1003306-1 = "変わらない心"
1003306-2 = "（何とか仕事を終わらせて、すぐにワカモのところへ向かおうとしたものの……）"
1003306-3 = "（ひと段落着いたのは、予定していた時間から6時間も過ぎた頃だった）"
1003306-7 = "（いつの間にか、かなり遅くなってしまった）"
1003306-8 = "（ワカモのことを心配しつつ、急いで約束の場所へと向かう）"
1003306-14 = "[ns] （あっ、ワカモ……！）"
1003306-16 = "初対面の私の前で、そんなに堂々とお腹を見せるとは……。"
1003306-17 = "その警戒心の無さがどんな末路を迎えるのか……直接その身に教えて差し上げましょう！"
1003306-18 = "[s] \"ワカモさん！？\""
1003306-26 = "えいっ！えいっ！いかがですか！ここ、こっちです？ここが良いんです？"
1003306-30 = "ふふっ、残念でしたね……"
1003306-31 = "そこが良いと言われても、次は首の下を掻いて差し上げます！"
1003306-32 = "さあ、鳴きなさい！私の攻撃を前に為す術なく、ごろごろにゃーにゃーと泣き叫ぶのです！"
1003306-33 = "[s] \"えっと、ワカモさん……？\""
1003306-34 = "……え。"
1003306-38 = "せ、先生……！？"
1003306-39 = "いえその、これはちょっとした悪戯と言いますか……！"
1003306-40 = "私その、特に変なことや危ないことは……！？"
1003306-41 = "[s] \"ううん、分かってる。良いと思うよ。\""
1003306-42 = "そ、そう、ですか……。"
1003306-43 = "私がこんなに、動物を可愛がると思っていませんでしたか……？"
1003306-44 = "……逆に私はこのような動物でしたら、いくらでも可愛がって差し上げたいほどです。"
1003306-45 = "この子らは言葉を話すこともなく、その口で他人を傷つけることもありませんし……。"
1003306-46 = "いくら可愛がっても天狗になったり、裏切ったりもしない……"
1003306-47 = "ただ自身に寄せられた挙動に対して純粋に、ありのままに応えることしかできない可哀想なところが、何とも切なくて。"
1003306-48 = "こんなに切ない子たちを、可愛がらないわけがないでしょう？"
1003306-49 = "ふふふっ……。"
1003306-50 = "[s1] \"そ、そっか……。\"\n[s2] \"それよりごめん……！本当に遅くなった……！\""
1003306-51 = "……先生？"
1003306-52 = "……先生？"
1003306-53 = "どうされましたか？そんなに申し訳なさそうなお顔で……。"
1003306-54 = "[s3] \"すぐ終わらせるって言ったのに、こんな遅くなっちゃって……。\"\n[s4] \"ワカモとの約束を裏切る感じになっちゃって……。\""
1003306-55 = "裏切る……？"
1003306-56 = "裏切る……？"
1003306-57 = "あっ、もしかして先ほど私が言ったことのせいで……？"
1003306-58 = "い、いえ！そのような意味ではございません！そんなことを仰らないでください……！"
1003306-59 = "このワカモ、あなた様が私のことを裏切るだなんてそのようなこと、考えたこともございません！"
1003306-67 = "[ns] \"わ、ワカモ……！？\""
1003306-70 = "そんなことを考えさせてしまっただなんて……申し訳ありません。"
1003306-71 = "悲しみで胸が締め付けられるようです……そのようなことは、誓って……。"
1003306-72 = "たったの6時間ほど遅れたところで、それが何になりましょう？"
1003306-73 = "あなた様と約束を交わしたその瞬間から、私はもうあなた様のことばかり考えて、頭の中はずっと……！"
1003306-74 = "[s] \"ちょ、ちょっとワカモ……一旦離れよう……。\""
1003306-75 = "あぁ、あなた様がこんなにも近く……どうか、私の頬を撫でてくださいませんか？もしくは、あなた様の頬を撫でてもよろしいですか？"
1003306-76 = "最後にはこうして会えるのですから……どれだけ待とうとも、そのようなことは些事でしかございません。あなた様のことを考えていられるのですから、苦しくも寂しくもございません。"
1003306-77 = "あなた様がそのようにご自分を責めることのみが、ただただ悲しいことです。"
1003306-78 = "そんなことはないのだと、この想いをあなた様にしっかりお伝えするにはどうしたら良いのでしょうか……。"
1003306-79 = "[s] \"一回離れてもらえると、色々と話が進みやすいかもしれない……。\""
1003306-80 = "……これくらいで、分かっていただけましたか？"
1003306-81 = "はい、それでしたら何よりです♡"
1003306-82 = "[s5] \"申し訳ない気持ちはありつつも、それはありがたいんだけど……。\"\n[s6] \"もし本当に約束を破って、結局来なかったら……とか思わなかった？\""
1003306-83 = "……約束を、破る？"
1003306-84 = "……約束を、破る？"
1003306-85 = "どうしてそのようなことを心配なさるのでしょう……？あなた様が私と約束をされたのですから、そのようなことは起こるはずがございません。"
1003306-86 = "たとえ、あなた様を待つ時間がどれだけ積み重なったとしても……。"
1003306-87 = "他の誰とも違って、裏切ったり嘘をついたりせず、真摯に私の信頼に応えてくださる……どんな時も私の手を取ってくださる、あなた様なら……"
1003306-88 = "たとえ6日、6週間、6か月が過ぎたとしても、必ずやこうして会いに来てくださるはずですから。"
1003306-89 = "であれば、どうしてそのようなことを心配する必要がございましょうか？ふふっ、変なお方ですね♡"
1003306-90 = "[s] \"……。\""
1003306-91 = "そういうものなのです。"
1003306-92 = "あぁ、そうは言いつつもこのワカモ、本日は少しだけ悲しくなってしまいました。"
1003306-93 = "私があなた様に対し、そのようなことを考えたのではと……そんな誤解がわずかでも生じてしまうだなんて。決してそのようなことは無いと、どのように証明すれば良いのでしょうか？"
1003306-94 = "[s] \"証明はしなくても大丈夫だけど……。\""
1003306-95 = "……あぁ、"
1003306-96 = "良いアイデアが浮かびました。"
1003306-97 = "今夜二人っきりで、煌々と浮かぶ月の下……"
1003306-98 = "何度も何度も、何千何万回と、私の心は揺らぎませんと……夜を明かすまで耳元で囁くというのはいかがでしょう？"
1003306-99 = "あぁ、想像しただけで何だか胸の奥から喜びがあふれて……"
1003306-100 = "[s] \"で、できれば別の方法で……\""
1003306-101 = "別の方法、ですか……？"
1003306-102 = "……つまり別の方法でしたら何でもよろしい、と♡"
1003306-103 = "それはそれは、これまた嬉しすぎて困ってしまいますね……。"
1003306-104 = "ですがむやみに過激なことをして、先生のことを驚かせてしまっては良くありません。"
1003306-110 = "少々考えておくとして……その貴重な機会は、また後日まで大事に取っておきますね。"
1003306-111 = "[s] \"内容は分からないけど、優しめにお願いします……。\""
1003306-112 = "うふふっ……怯える姿すらも可愛いらしいですね。"
1003306-113 = "はい、それはもう。楽しみは、取っておいた方が美味しいですからね。ふふっ……♡"
1003306-115 = "（その後、だいぶ遅くなったが、無事にワカモの買い物に付き合えた）"
