[translation]
1003306-1 = "Um coração que não muda"
1003306-2 = "（Tentei terminar o trabalho de qualquer jeito para ir logo encontrar a Wakamo, mas...）"
1003306-3 = "（Quando finalmente consegui uma folga, já tinham se passado 6 horas do horário planejado）"
1003306-7 = "（Sem perceber, ficou muito tarde）"
1003306-8 = "（Preocupado com a Wakamo, sigo apressado para o local do encontro）"
1003306-14 = "[ns] （Ah, Wakamo...!）"
1003306-16 = "Exibir a barriga tão descaradamente na frente de alguém que acabou de conhecer..."
1003306-17 = "Vou te ensinar pessoalmente que tipo de fim essa falta de cautela pode trazer!"
1003306-18 = "[s] \"Wakamo!?\""
1003306-26 = "Ei! Ei! O que acha? É aqui, é por aqui? É aqui que você gosta?"
1003306-30 = "Fufu, que pena..."
1003306-31 = "Mesmo que diga que é aí que você gosta, agora vou coçar embaixo do seu pescoço!"
1003306-32 = "Vamos, mia! Diante do meu ataque, você não terá como escapar e vai choramingar e miar sem parar!"
1003306-33 = "[s] \"Err, Wakamo...?\""
1003306-34 = "...Eh."
1003306-38 = "Se-Sensei...!?"
1003306-39 = "Não, veja bem, isso é apenas uma pequena brincadeira, por assim dizer...!"
1003306-40 = "Eu, eu não estava fazendo nada estranho ou perigoso...!?"
1003306-41 = "[s] \"Não, eu entendo. Acho que é bom.\""
1003306-42 = "S-sério...?"
1003306-43 = "Você não imaginava que eu fosse tão carinhosa com animais...?"
1003306-44 = "...Pelo contrário, se forem animais como estes, eu adoraria enchê-los de carinho."
1003306-45 = "Essas criaturas não falam e não usam palavras para ferir os outros..."
1003306-46 = "Não importa o quanto você os mime, eles não ficam arrogantes nem te traem..."
1003306-47 = "É tão triste e comovente que eles só consigam responder de forma pura e natural aos gestos que recebem."
1003306-48 = "Como eu não poderia amar criaturas tão comoventes?"
1003306-49 = "Fufufu..."
1003306-50 = "[s1] \"E-entendi...\"\n[s2] \"Mas, antes de tudo, me desculpe...! Eu me atrasei muito...!\""
1003306-51 = "...Sensei?"
1003306-52 = "...Sensei?"
1003306-53 = "O que houve? Com essa cara de quem está tão arrependido..."
1003306-54 = "[s3] \"Eu disse que terminaria logo, mas acabei me atrasando tanto...\"\n[s4] \"Sinto como se tivesse traído a promessa que fiz a você, Wakamo...\""
1003306-55 = "Trair...?"
1003306-56 = "Trair...?"
1003306-57 = "Ah, será que foi por causa do que eu disse agora pouco...?"
1003306-58 = "N-não! Não é nesse sentido! Por favor, não diga uma coisa dessas...!"
1003306-59 = "Eu, Wakamo, jamais pensei que você fosse capaz de me trair!"
1003306-67 = "[ns] \"Wa-Wakamo...!?\""
1003306-70 = "Sinto muito por ter feito você pensar em algo assim..."
1003306-71 = "Meu peito aperta de tristeza... Juro que isso nunca aconteceria..."
1003306-72 = "O que são apenas 6 horas de atraso?"
1003306-73 = "Desde o momento em que fizemos a promessa, eu só consegui pensar em você, minha mente esteve o tempo todo..."
1003306-74 = "[s] \"Ei, Wakamo... vamos nos afastar um pouco...\""
1003306-75 = "Ah, você está tão perto... Por favor, poderia acariciar meu rosto? Ou, se preferir, posso acariciar o seu?"
1003306-76 = "Já que podemos nos encontrar assim no final... não importa quanto tempo eu espere, isso é apenas um detalhe. Como estou pensando em você, não sinto dor nem solidão."
1003306-77 = "A única coisa que me entristece é ver você se culpar desse jeito."
1003306-78 = "Como posso fazer para que você entenda que isso não é verdade e que meus sentimentos são sinceros...?"
1003306-79 = "[s] \"Se você se afastar um pouco, talvez a gente consiga conversar melhor...\""
1003306-80 = "...Conseguiu entender o que eu sinto com isso?"
1003306-81 = "Sim, se é assim, fico muito feliz♡"
1003306-82 = "[s5] \"Sinto muito, e embora eu seja grata por isso...\"\n[s6] \"Você não pensou... 'e se eu realmente quebrasse a promessa e não viesse no final?'\""
1003306-83 = "……Quebrar... a promessa?"
1003306-84 = "……Quebrar... a promessa?"
1003306-85 = "Por que você se preocuparia com algo assim...? Já que foi você quem me fez a promessa, tal coisa jamais aconteceria."
1003306-86 = "Mesmo que o tempo esperando por você se acumule infinitamente..."
1003306-87 = "Diferente de qualquer outra pessoa, você não me trairia nem mentiria, respondendo à minha confiança com sinceridade... Se é você, que sempre segura minha mão, não importa a situação..."
1003306-88 = "Mesmo que seis dias, seis semanas ou seis meses se passem, eu sei que você certamente virá me encontrar assim."
1003306-89 = "Sendo assim, por que haveria necessidade de se preocupar com algo do tipo? Fufu, você é uma pessoa estranha, sabia? ♡"
1003306-90 = "[s] \"…….\""
1003306-91 = "É assim que as coisas são."
1003306-92 = "Ah, embora eu diga isso, hoje eu, Wakamo, me senti um pouquinho triste."
1003306-93 = "Pensar que você poderia ter imaginado tal coisa de mim... que um mal-entendido desses pudesse surgir, ainda que minimamente. Como posso provar que isso jamais aconteceria?"
1003306-94 = "[s] \"Não precisa provar nada, mas...\""
1003306-95 = "……Ah,"
1003306-96 = "Tive uma ótima ideia."
1003306-97 = "Hoje à noite, a sós, sob o brilho da lua..."
1003306-98 = "Que tal se eu sussurrar no seu ouvido até o amanhecer, milhares e milhares de vezes, que meu coração nunca vacilará?"
1003306-99 = "Ah, só de imaginar, a alegria transborda do fundo do meu peito..."
1003306-100 = "[s] \"S-se possível, prefiro outro método...\""
1003306-101 = "Outro método, você diz...?"
1003306-102 = "……Ou seja, se for outro método, qualquer um serve, não é? ♡"
1003306-103 = "Isso é... fico tão feliz que nem sei o que dizer..."
1003306-104 = "Mas não seria bom fazer algo excessivamente radical e acabar assustando o Sensei."
1003306-110 = "Vou pensar um pouco a respeito... e guardarei essa oportunidade preciosa para um outro dia."
1003306-111 = "[s] \"Não sei o que você está planejando, mas por favor, pegue leve...\""
1003306-112 = "Ufufu... até mesmo esse seu jeito assustado é adorável."
1003306-113 = "Sim, com certeza. Afinal, as coisas ficam mais saborosas quando guardamos para depois. Fufu... ♡"
1003306-115 = "(Depois disso, embora tenha ficado bem tarde, consegui acompanhar Wakamo nas compras sem problemas.)"
