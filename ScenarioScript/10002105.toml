[translation]
10002105-1 = "Episódio 10; Quebra de Melancia (2)"
10002105-3 = "Ugh, que frustrante..."
10002105-4 = "M-mesmo que eu tenha perdido..."
10002105-5 = "Brincar com comida é algo inaceitável..."
10002105-6 = "Lembrem-se disso... quando chegarem a uma encruzilhada no futuro, vocês..."
10002105-12 = "Haa, haa..."
10002105-13 = "..."
10002105-14 = "P-por que estamos lutando com tanta força assim...?"
10002105-15 = "Deveríamos ter vencido sem dúvidas, mas não sinto que ganhamos nada..."
10002105-16 = "Acho que, pelo menos, o sentimento dela em relação à comida era muito mais forte que o nosso."
10002105-17 = "Não, não é sobre isso que estou falando..."
10002105-19 = "(Depois disso, voltamos para a casa de praia junto com a Izumi, que acordou atraída pelo cheiro da melancia, e recuperamos o máximo que pudemos da melancia usada na brincadeira para comê-la.)"
