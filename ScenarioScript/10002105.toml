[translation]
10002105-1 = "第10話;スイカ割り（２）"
10002105-3 = "うぅ、悔しい……。"
10002105-4 = "た、たとえ私が負けたとしても……。"
10002105-5 = "食べ物で遊ぶことは、許されない……。"
10002105-6 = "覚えておいて……いつか岐路に立った時、あなたたちは……。"
10002105-12 = "はぁ、はぁ……。"
10002105-13 = "……。"
10002105-14 = "な、なんで私たち、こんなに全力で戦っているのでしょうか……。"
10002105-15 = "間違いなく勝ったはずなのに、勝った感じがしませんね……。"
10002105-16 = "この方の食べ物に対する気持ちだけは、私たちよりもずっと強かったと思います。"
10002105-17 = "いえ、そういうお話ではなく……。"
10002105-19 = "（その後、スイカの匂いに釣られて起きたイズミと一緒に海の家へと戻り、スイカ割りに使ったスイカもできるだけ回収して美味しく頂いた）"
