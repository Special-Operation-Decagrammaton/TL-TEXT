[translation]
1005503-1 = "しれっと"
1005503-8 = "（……遭難してしまった）"
1005503-14 = "（……！？）"
1005503-26 = "[ns1] \"ま、まさか……！\"\n[ns2] \"熊！？\""
1005503-30 = "……え？"
1005503-36 = "熊、どこかにいたの？"
1005503-40 = "久しぶりだね、先生。"
1005503-41 = "こんなところでどうしたの？こっちは本校舎でもないし、旧校舎とも違う方面だけど。"
1005503-42 = "[s3] \"シグレで良かった……。\"\n[s4] \"安心した……。\""
1005503-45 = "どうしたの、大丈夫？"
1005503-46 = "え、熊だと思った？"
1005503-47 = "あー……ま、実際この辺では出るからねぇ。"
1005503-48 = "というかあらためてだけど、こんなところで何してたの？"
1005503-51 = "……道に迷った？もうさまよい始めて四時間？"
1005503-55 = "うわ、手足が氷みたいに……。"
1005503-56 = "だからレッドウィンターに来る時は、私を呼んでって言ったのに。"
1005503-57 = "ここは広すぎて、場合によっては事務局の人たちにだって探せないくらいなんだから。"
1005503-58 = "……まあ、大変なことになる前に会えて良かった。"
1005503-59 = "……私？"
1005503-60 = "うん、よく通るところだから大丈夫。"
1005503-61 = "木の実を探したり、狩りをするのに良い場所でね。"
1005503-62 = "だから帰り道もまあ分かるんだけど……。"
1005503-63 = "結構距離もあるし、その状態で雪道を歩くのは厳しそうだね。"
1005503-64 = "そのまま動き続けると、凍傷になるかもしれない。"
1005503-65 = "[s] \"大丈夫、まだ頑張れるよ。\""
1005503-66 = "無茶言わないで。いくら先生とはいえ、私の方が雪原の怖さは分かってる。"
1005503-67 = "ほら、体が震えてるし……。"
1005503-68 = "とりあえず、このままじゃダメ。どうにかして対応を……。"
1005503-69 = "……ん？解決方法？"
1005503-70 = "まあ、幾つかはあるけど。"
1005503-74 = "……ふふっ。"
1005503-78 = "やっぱり一番確実なのは、身体が熱くなる液体を――"
1005503-79 = "[s5] \"それは絶対にダメ！\"\n[s6] \"で、できれば他の方法を……\""
1005503-80 = "うーん、良い手だと思うんだけど……"
1005503-81 = "うーん、良い手だと思うんだけど……"
1005503-82 = "じゃあ、他には……"
1005503-91 = "ハグ、とか？"
1005503-92 = "これなら基本的には安全。体温を分け合うだけ。"
1005503-93 = "状況が状況だし、先生が良いなら服も――"
1005503-94 = "[s7] \"ストップ！！！\"\n[s8] どうにか他の方法を尋ねる。"
1005503-97 = "まったく、生真面目なんだから。"
1005503-98 = "まあ、そう言うと思ってたけど。"
1005503-99 = "……ん？からかってるのかって？"
1005503-100 = "ん～どうだろうねぇ？"
1005503-101 = "でも、どうにかしないといけないのは本当でしょ？#nそれに、ちゃんと事前に忠告もしておいたのに……"
1005503-102 = "ガイドなしだと危険だから、来る時には呼んでねって言ったよね。"
1005503-103 = "先生の身に何かあったら、心配する生徒がたくさんいるんだよ。"
1005503-104 = "[s9] \"それはごめん……。\"\n[s10] \"次からはちゃんと連絡するね。\""
1005503-107 = "うん、それなら良し。"
1005503-108 = "でも、今度またこういう危ないことをしたら……"
1005503-109 = "その時は、強制的に二つともやってもらうからね？"
1005503-113 = "[ns] \"すぐに連絡します……。\""
1005503-114 = "それじゃ、意地悪はこの辺にして……"
1005503-118 = "……はい、おんぶするから私の背中に乗って、先生。"
1005503-119 = "え、重い？#nあはは、なにそれ。"
1005503-120 = "私、普段から鹿も熊も持ち歩いてるんだよ？"
1005503-121 = "先生ひとりくらい、大したことじゃないって。心配しないで。"
1005503-122 = "それじゃ……"
1005503-123 = "行こっか。"
1005503-125 = "（シグレにおんぶされたまま、街中まで運んでもらった）"
1005503-126 = "（到着する頃には体も温まり、シャーレまで無事戻ることができた）"
