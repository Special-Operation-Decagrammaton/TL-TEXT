[translation]
400-1 = "コンビニ「エンジェル24」へようこそ！"
400-2 = "エンジェル24"
400-3 = "い、いらっしゃいませ、「エンジェル24」です！"
400-4 = "え、大人のひと……？#nも、もしかして、噂の「先生」ですか？"
400-5 = "（こ、この人があの、女子生徒たちが頻繁に出入りしてると噂される怪しい建物の「先生」……！）"
400-6 = "（万が一この人に嫌われたら私、もしかして大変なことに……！？）"
400-7 = "わ、私はソラです。#n今日からこのコンビニ「エンジェル24」で、アルバイトをしています。#nよろしくお願いします！"
400-8 = "他の生徒たちより少し幼く見える……？"
400-9 = "あ、私、中学生ですので。そのせいかもしれません。"
400-10 = "中学生を雇ってくれるところはあまり無いのですが、ちょっとお金が必要な事情がありまして……。"
400-11 = "雇ってもらえたのは良いのですがこのコンビニ、以前に襲撃されたり、戦車に突っ込まれたりしたことがあると聞いたので、初日からちょっと不安です……。"
400-12 = "それに先生以外、このお店に来る人もほとんどいないみたいですし……。"
400-13 = "（自分で言ってて不安になってきた……このお店、大丈夫なのかな……）"
400-16 = "も、もちろんお買い物はいつでも大歓迎ですよ！#nめ、めんどくさいなんてこと決して思ってませんから！"
400-17 = "「エンジェル24」は文字通り24時間ずっと開いてますので、必要な物がある時はいつでも来てください！"
