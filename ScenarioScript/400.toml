[translation]
400-1 = "Bem-vindo à loja de conveniência Angel 24!"
400-2 = "Angel 24"
400-3 = "B-bem-vindo à Angel 24!"
400-4 = "V-você... você é um adulto?...#nSerá que você é o famoso 'Sensei'?"
400-5 = "（E-esse é o tal 'Sensei' do prédio suspeito que dizem que as alunas frequentam tanto...！）"
400-6 = "（Se por acaso ele não gostar de mim, será que eu vou ter problemas graves...！？）"
400-7 = "E-eu sou a Sora.#nA partir de hoje, estou trabalhando de meio período nesta loja de conveniência, a Angel 24.#nPrazer em conhecê-lo Sensei!"
400-8 = "Você parece um pouco mais jovem que as outras alunas...?"
400-9 = "Ah, é que eu ainda estou no ensino fundamental... Talvez seja por isso..."
400-10 = "Não existem muitos lugares que contratam estudantes do ensino fundamental, mas eu tenho algumas razões pelas quais preciso de dinheiro..."
400-11 = "Fico feliz por terem me contratado, mas ouvi dizer que esta loja já foi atacada e até invadida por um tanque antes, então estou um pouco nervosa desde o primeiro dia..."
400-12 = "Além disso, parece que quase ninguém vem a esta loja, exceto você, Sensei..."
400-13 = "（Falar isso me deixou preocupada... Será que esta loja está bem mesmo?...）"
400-16 = "C-claro, compras são sempre bem-vindas!#nE-eu nunca achei que fosse um incômodo!"
400-17 = "A Angel 24 fica aberta 24 horas por dia, como o nome diz, então venha sempre que precisar de alguma coisa!"
