[translation]
10043005-1 = "プロローグ;伝統と歴史"
10043005-7 = "さあやってまいりました「コーギー・ブレーブス」対「アビシニアン・レイダース」！#nミレニアムでの親善試合です！"
10043005-8 = "ものすごい熱気です！ミレニアムスタジアムは満員御礼！"
10043005-16 = "まもなくプレイボール！さあ、みなさま盛大な拍手をーっ！"
10043005-22 = "[ns] \"すごく注目されてる試合なんだね！\""
10043005-23 = "ええ！シラトリシリーズですから。"
10043005-24 = "企業試合ですが、人気のチームなのでファンの熱量がすごいんです！"
10043005-25 = "コーギー電子の実業団「コーギー・ブレーブス」と――"
10043005-26 = "[ruby=かねさきこう]鐘崎港[/ruby]を拠点とする商会の実業団「アビシニアン・レイダース」。"
10043005-27 = "もともと、二社の親交を深めることが目的の親善試合だったのですが……"
10043005-28 = "両チーム共に社会人選手をスカウトするようになってから、どんどん試合が本格化していき……"
10043005-29 = "今では、シラトリ区を代表する試合の一つとなりました！"
10043005-30 = "ちなみに私は、「コーギー・ブレーブス」のファンです！#nなんとなく、共感できることが多くて……。"
10043005-34 = "頑張れブレーブスー！今日こそ勝って！"
10043005-39 = "球場での観戦というのも、新鮮ですね。"
10043005-40 = "……皆さんの野球への情熱を、トレーニングへと向けられたら――"
10043005-41 = "スミレ先輩……いくらなんでもこんなところでトレーニングは……。"
10043005-42 = "何を言っているんですか。何をするにも体力は必要ですよ。"
10043005-43 = "選手のみなさんも、勝利を手にするために日夜努力を続けているでしょうし。"
10043005-47 = "そ、そう……ですね……。"
10043005-48 = "[s] \"レイ、どうかしたの？\""
10043005-52 = "あっ、いえっ……。"
10043005-53 = "なんか……変な風に聞こえました？"
10043005-54 = "うーん……。"
10043005-58 = "……。"
10043005-59 = "先生は、ブレーブスの歴代結果はご存知ですか……？"
10043005-60 = "まぁ、ファン以外には知られていないとは思うんですが……。"
10043005-67 = "コーギー・ブレーブス……ふむ、これは……。"
10043005-69 = "スミレ先輩、検索してます！？"
10043005-70 = "[s] \"どんな結果だったの？\""
10043005-71 = "189戦、189敗……と。"
10043005-72 = "[s] \"ぜ、全敗……！？\""
10043005-73 = "ほ、ほら！"
10043005-74 = "出場することが大事って言いますか……！"
10043005-75 = "いや、勝ってほしいんですけど……。"
10043005-76 = "でも……いつも負けちゃうんです。"
10043005-77 = "「今度こそ勝てる！」みたいな時も僅差で負けちゃってて……。"
10043005-78 = "ついたあだ名が、「勝ちきれナインの負けコーギー」……。"
10043005-79 = "善戦するも、結局勝てたことはないのですね……。"
10043005-83 = "ぐ、ぐうっ……！#n事実ですが……。"
10043005-84 = "で、でも！このチームはいままで全敗でも、次こそは！と思わせる魅力があるんです！"
10043005-85 = "今度こそ勝てるーっ！"
10043005-89 = "いけーっ！ブレーブスー！"
10043005-93 = "[ns] \"……野球は奥が深いなぁ。\""
10043005-94 = "先生もそう感じてくれますか！"
10043005-95 = "そう……野球にはこの世のすべてが詰まっていますからね！"
10043005-96 = "なるほど。トレーニング種目も全て網羅して……。"
10043005-100 = "そ、それはどうでしょう……！"
10043005-101 = "[s] \"私も、ブレーブスを応援してみようかな。\""
10043005-105 = "おっ？先生もコーギーファンになりますか！？"
10043005-106 = "せっかくですし、私も応援します。"
10043005-111 = "はーい！「写真タイム」ですよー！#nそれではスクリーンに映ったお三方！ご準備はよろしいですか～？"
10043005-115 = "「写真タイム」……？"
10043005-116 = "あ、えっとですね……。"
10043005-117 = "これは試合の合間にやるコーナーで、スクリーンに映されたグループ――"
10043005-118 = "あ、今だと私たちですね。#nカメラに向かってポーズを取りましょう！"
10043005-122 = "さあ、お願いします！"
10043005-123 = "なるほど……このような文化があるのですね。"
10043005-124 = "ふふっ。では、トレーナー……遠慮なく。"
10043005-129 = "じゃあ、私も……"
10043005-130 = "ちょ、ちょっと、近いかな……えへへっ。"
10043005-144 = "ありがとうございました！"
10043005-150 = "おっと、レイダースの先制！さっそく安打が出ました！"
10043005-153 = "今映っていたのは……"
10043005-154 = "シャーレの先生……？"
10043005-155 = "こ、これもなにかの導きだ……！"
10043005-160 = "お、おい、あの3人をここへ呼んでくれ！"
10043005-162 = "#video;10043"
