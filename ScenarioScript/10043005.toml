[translation]
10043005-1 = "Prólogo; Tradição e História"
10043005-7 = "Chegou o momento! \"Corgi Braves\" contra \"Abyssinian Raiders\"!#nÉ o jogo amistoso aqui no Millennium!"
10043005-8 = "Que energia incrível! O Estádio Millennium está lotado!"
10043005-16 = "O jogo vai começar em instantes! Vamos lá, pessoal, uma salva de palmas!"
10043005-22 = "[ns] \"É uma partida que chama muita atenção, né?\""
10043005-23 = "Sim! É a série Shiratori, afinal."
10043005-24 = "Embora seja um jogo corporativo, são times populares, então a paixão dos fãs é enorme!"
10043005-25 = "O time da empresa Corgi Electronics, \"Corgi Braves\", e..."
10043005-26 = "O time da associação comercial sediada em Kanesakiko, \"Abyssinian Raiders\"."
10043005-27 = "Originalmente, o objetivo do amistoso era estreitar os laços entre as duas empresas, mas..."
10043005-28 = "Desde que ambos os times começaram a contratar atletas profissionais, o jogo foi ficando cada vez mais sério..."
10043005-29 = "E agora, tornou-se uma das partidas mais representativas do distrito de Shiratori!"
10043005-30 = "Aliás, eu sou fã dos \"Corgi Braves\"!#nNão sei explicar, mas me identifico muito com eles..."
10043005-34 = "Força, Braves! Ganhem hoje!"
10043005-39 = "Assistir a um jogo no estádio é uma experiência nova."
10043005-40 = "...Se todos pudessem canalizar essa paixão pelo beisebol para o treinamento..."
10043005-41 = "Sumire-senpai... não dá para treinar num lugar desses..."
10043005-42 = "O que está dizendo? É preciso ter vigor físico para qualquer coisa."
10043005-43 = "Os atletas também devem estar se esforçando dia e noite para alcançar a vitória."
10043005-47 = "É, é verdade..."
10043005-48 = "[s] \"Rei, aconteceu alguma coisa?\""
10043005-52 = "Ah, não..."
10043005-53 = "Pareceu... estranho o que eu disse?"
10043005-54 = "Hmm..."
10043005-58 = "..."
10043005-59 = "Sensei, você conhece o histórico dos Braves...?"
10043005-60 = "Bem, acho que ninguém além dos fãs sabe disso..."
10043005-67 = "Corgi Braves... hum, vejamos..."
10043005-69 = "Sumire-senpai, você está pesquisando!?"
10043005-70 = "[s] \"Qual foi o resultado?\""
10043005-71 = "189 jogos, 189 derrotas..."
10043005-72 = "[s] \"To-todas as partidas...!?\""
10043005-73 = "Ei, ei!"
10043005-74 = "Dizem que o importante é competir...!"
10043005-75 = "Não, eu quero que eles ganhem, mas..."
10043005-76 = "Eles sempre perdem."
10043005-77 = "Mesmo quando parece que \"dessa vez vai\", eles perdem por uma diferença mínima..."
10043005-78 = "O apelido que ganharam foi \"Os Corgis perdedores que não sabem vencer\"..."
10043005-79 = "Então, apesar de lutarem bem, nunca conseguiram uma vitória..."
10043005-83 = "G-grrr...!#nÉ um fato, mas..."
10043005-84 = "Mas! Mesmo com todas essas derrotas, esse time tem um charme que faz a gente pensar que a próxima será a vez deles!"
10043005-85 = "Dessa vez eles ganham!"
10043005-89 = "Vai, Braves!"
10043005-93 = "[ns] \"...O beisebol é profundo, não é?\""
10043005-94 = "Você também sente isso, Sensei!"
10043005-95 = "Sim... o beisebol contém tudo o que existe neste mundo!"
10043005-96 = "Entendo. Abrange até mesmo todas as modalidades de treinamento..."
10043005-100 = "B-bem, sobre isso..."
10043005-101 = "[s] \"Acho que vou torcer pelos Braves também.\""
10043005-105 = "Oh? Você também vai virar fã dos Corgis, Sensei!?"
10043005-106 = "Já que estamos aqui, eu também vou torcer."
10043005-111 = "Certo! É hora do \"momento da foto\"!#nEntão, vocês três que estão no telão! Estão prontos?"
10043005-115 = "\"Momento da foto\"...?"
10043005-116 = "Ah, bem, é que..."
10043005-117 = "É um quadro que fazemos durante o intervalo da partida, onde o grupo que aparece no telão..."
10043005-118 = "Ah, no caso, nós agora. #nVamos fazer uma pose para a câmera!"
10043005-122 = "Vamos lá, por favor!"
10043005-123 = "Entendo... Então existe esse tipo de cultura por aqui."
10043005-124 = "Hehe. Então, Sensei... sem cerimônias."
10043005-129 = "Então, eu também..."
10043005-130 = "Ei, espera, não está um pouco perto demais...? Ehehe."
10043005-144 = "Muito obrigada!"
10043005-150 = "Opa, ponto inicial dos Raiders! Já conseguiram uma rebatida!"
10043005-153 = "Quem apareceu agora há pouco foi..."
10043005-154 = "O Sensei do Schale...?"
10043005-155 = "I-isso também deve ser algum tipo de destino...!"
10043005-160 = "Ei, ei, chamem aquelas três pessoas para cá!"
10043005-162 = "#video;10043"
