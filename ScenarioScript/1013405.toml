[translation]
1013405-1 = "que há uma diferença"

1013405-2 = "(Eu estava preocupado com a condição de Alice e decidi procurá-la.)"

1013405-11 = "advertência. Ocorreu um problema inesperado."

1013405-12 = "[ruby=てんどう]天童[/ruby]アリスは直ちに訓練を中断し、輸送船に戻ってください。"

1013405-13 = "(Um anúncio sobre Alice foi ouvido no navio)"

1013405-15 = "Ah, professora."

1013405-16 = "[s1] \"Você está bem?\"\n[s2] \"Você não está ferido!?\""

1013405-19 = "Alice está bem."

1013405-20 = "O problema não surgiu com Alice, mas com a armadura do herói...Abi Yeshuf."

1013405-21 = "Mas... Alice realmente não entende que tipo de problema aconteceu."

1013405-22 = "Mas ouvi o motivo."

1013405-23 = "Aparentemente, isso ocorreu porque as mudanças foram grandes demais para Abi Yeshuv. #nEle disse que eram necessários ajustes para estabilizá-lo."

1013405-27 = "Sinto-me mal por Abi Yeshuf."

1013405-28 = "[s3] \"Pobre de mim?\"\n[s4] \"O que... isso significa?\""

1013405-31 = "Bem... Alice também sabe disso."

1013405-32 = "Abi Yeshuf é uma “arma” feita para a batalha."

1013405-33 = "Não há tristeza ou alegria aí."

1013405-34 = "Alice, ouvi de todos."

1013405-35 = "Dizia-se que Abi Yeshuf era muito forte."

1013405-36 = "Era incrivelmente grande e não havia chance de vencer... era uma armadura de classe trapaceira."

1013405-37 = "Mas então, continuei lutando e desmoronando repetidas vezes..."

1013405-38 = "Agora é pequeno o suficiente para caber perfeitamente em Alice."

1013405-39 = "...Disseram-me que esta poderia ser a última vez."

1013405-40 = "Da próxima vez que quebrar... você não conseguirá consertá-lo."

1013405-41 = "Ainda assim, Abi Yeshuv continua modificado para a próxima batalha."

1013405-42 = "É meu destino apenas lutar até o fim..."

1013405-43 = "Quanto a Alice...acho que esse tipo de coisa é demais para Alice..."

1013405-44 = "Gostaria de trazer Abi Eshuf para a sala do departamento de desenvolvimento de jogos. #nQuero mostrar para todos do departamento de engenharia."

1013405-45 = "Quero que vamos a mais lugares juntos e conheçamos mais pessoas. #n Então--"

1013405-46 = "Espero que todos amem Abi Eshuf também. Como uma espada de luz."

1013405-50 = "...Por favor me diga, professor."

1013405-51 = "Qual é a diferença entre Abi Yeshuf e a Espada de Luz?"

1013405-52 = "Mesmo que ambos tenham sido criados como "armas"..."

1013405-53 = "Apenas seguindo o destino que foi decidido desde o início――"

1013405-54 = "Não está correto. Alice... foi isso que aprendi."

1013405-55 = "Cabe a você decidir."

1013405-56 = "Mas Abi Yeshuf..."

1013405-57 = "Então Alice...Alice..."

1013405-62 = "professor……?"

1013405-65 = "[ns] Abraço Alice."

1013405-68 = "[ns5] \"Não se esqueça desse sentimento.\"\n[ns6] \"Se você fizer isso, tenho certeza que Abi Yeshuv ficará feliz.\""

1013405-71 = "...Isso é estranho."

1013405-72 = "Sempre me sentia feliz quando minha professora me abraçava."

1013405-73 = "Por alguma razão, estou chorando agora."

1013405-74 = "Alice realmente não entende por que isso está acontecendo."

1013405-75 = "[s7] \"Está tudo bem. Alice ainda tem tempo.\"\n[s8] \"Um dia você vai entender.""

1013405-78 = "...A professora é estranha."

1013405-79 = "Alice não tem ideia do que a professora está tentando transmitir."

1013405-80 = "Mas quando meu professor diz isso, sinto que isso definitivamente acontecerá algum dia."

1013405-81 = "Então... afinal a professora é estranha."

1013405-83 = "(continua abraçando Alice por um tempo)"

1013405-84 = "(Depois que Abi Yeshuf foi reparado, Alice voltou a treinar.)"

