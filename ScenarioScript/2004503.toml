[translation]
2004503-1 = "O Código do Guia de Elite"
2004503-2 = "（Você participou de um passeio de ônibus guiado pela Pina）"
2004503-3 = "（O roteiro consistia em visitar os pontos turísticos de Hyakkiyako em sequência）"
2004503-5 = "Muito bem, todos, por favor, subam a bordo!"
2004503-6 = "Sensei, por favor, venha também!"
2004503-7 = "[s1] \"Pina, você já pegou o jeito de ser guia, hein.\"\n[s2] \"Parece difícil liderar tanta gente de uma vez.\""
2004503-10 = "Não se preocupe! Manter as pessoas organizadas também faz parte do caminho do Ninkyo!"
2004503-11 = "Estamos um pouco atrasados, mas ainda dá tempo!"
2004503-12 = "Vamos nessa!"
2004503-18 = "Este é o nosso último ponto de hoje! Todos, por favor, cuidado onde pisam!"
2004503-27 = "Um... dois..."
2004503-29 = "Onze... doze..."
2004503-30 = "……"
2004503-31 = "……"
2004503-35 = "O quê!?"
2004503-36 = "[s3] \"O que houve?\"\n[s4] \"C-calma!\""
2004503-39 = "I-isso é...!!"
2004503-40 = "É uma emergência! Chefe... digo, Sensei!"
2004503-41 = "Está faltando uma pessoa...!"
2004503-42 = "[s] \"V-você não se enganou na contagem, né...?\""
2004503-43 = "Sim, eu contei direitinho!"
2004503-44 = "Além disso, como parte do código de guia, eu me lembro do rosto de todos os clientes!"
2004503-45 = "E-eu tenho certeza de que alguém acabou ficando para trás...!"
2004503-46 = "[s5] \"Primeiro, vamos nos acalmar...!\"\n[s6] \"Por enquanto, vamos voltar ao local anterior.\""
2004503-49 = "S-sim!"
2004503-53 = "（No caminho, Pina não conseguia esconder sua ansiedade e estava inquieta）"
2004503-55 = "Precisamos encontrar logo...!"
2004503-56 = "Como vou me desculpar por essa falha... eu, Pina, não tenho nem cara para aparecer!"
2004503-61 = "Com licença, guia?"
2004503-62 = "A-ahhh!!"
2004503-66 = "[ns] \"U-uau!?\""
2004503-67 = "C-calma... o que houve?"
2004503-68 = "B-bem, é que... hum..."
2004503-69 = "Ah! ...Eu fui a primeira a chegar?"
2004503-70 = "N-não é isso... é que..."
2004503-71 = "[s7] （Pina está em pânico total... preciso fazer alguma coisa!）\n[s8] \"Na verdade, pensei em mudar para um passeio de táxi!\""
2004503-77 = "Passeio... de táxi?"
2004503-78 = "……"
2004503-79 = "[s9] \"Estamos providenciando um táxi especial até o destino.\"\n[s10] \"Que tal aproveitar a paisagem até lá com mais conforto?\""
2004503-82 = "!!"
2004503-83 = "……!"
2004503-84 = "Sinto muito... o ônibus já partiu..."
2004503-85 = "Os outros já estão a caminho do próximo destino..."
2004503-86 = "Tudo isso é culpa da minha incompetência! ...Vou levar você ao ponto de táxi agora mesmo!"
2004503-91 = "……"
2004503-94 = "……Ugh."
2004503-95 = "……"
2004503-96 = "Ah, era só isso?"
2004503-97 = "É que eu acabei me distraindo escolhendo lembrancinhas..."
2004503-98 = "Quando voltei, vi que não tinha ninguém aqui."
2004503-99 = "！！"
2004503-100 = "A culpa do atraso foi minha, então obrigada por se dar ao trabalho!"
2004503-101 = "Então, guia, conto com você."
2004503-102 = "Entendido! Pode deixar comigo, irmãzona!"
2004503-103 = "Ah... irmãzona...?"
2004503-107 = "Chegamos bem na hora marcada!"
2004503-111 = "Pessoal, voltei!"
2004503-112 = "Onde você estava?"
2004503-113 = "Hehe, só fui... conferir outro percurso!"
2004503-117 = "Missão... cumprida..."
2004503-123 = "[ns] \"Feena, você está bem!?\""
2004503-125 = "（Depois disso, o tour terminou em segurança）"
2004503-126 = "（Tendo recuperado sua energia, Feena se despediu de todos os participantes sem que ninguém faltasse）"
