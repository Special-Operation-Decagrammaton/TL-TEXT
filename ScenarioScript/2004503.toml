[translation]
2004503-1 = "エリートガイドの掟"
2004503-2 = "（フィーナが担当するバスツアーに参加した）"
2004503-3 = "（百鬼夜行の名所を順繰りに巡るコースだった）"
2004503-5 = "それでは皆さま、ご乗車クダサイ！"
2004503-6 = "センセイもどうぞ！"
2004503-7 = "[s1] \"フィーナ、すっかりガイドが板についてきたね。\"\n[s2] \"一度に大勢を引率するのは大変そう。\""
2004503-10 = "心配ご無用！人々をまとめ上げるのもまた、任侠道デス！！"
2004503-11 = "予定より押してるケド、まだギリギリ間に合いマス！"
2004503-12 = "レッツゴーデス！"
2004503-18 = "こちらが本日最後のスポットデース！皆サン、お足元には気を付けてクダサイ！"
2004503-27 = "一人……二人……。"
2004503-29 = "十一人……十二人……。"
2004503-30 = "……。"
2004503-31 = "……。"
2004503-35 = "What！？"
2004503-36 = "[s3] \"どうしたの？\"\n[s4] \"お、落ち着いて！\""
2004503-39 = "た、た……！！"
2004503-40 = "大変デス！お頭……いえセンセイ！ "
2004503-41 = "お客様が……一人足りマセン……！"
2004503-42 = "[s] \"か、数え間違いではないんだよね……？\""
2004503-43 = "ええ、しっかり数えマシタ！"
2004503-44 = "それにガイドの掟として、お客様の顔は全て覚えていマス！"
2004503-45 = "き、きっと乗り遅れてしまったんデス……！"
2004503-46 = "[s5] \"まずは落ち着こう……！\"\n[s6] \"とりあえず、さっきの場所に戻ってみようか。\""
2004503-49 = "ハ、ハイ！"
2004503-53 = "（道中、フィーナは焦りを隠しきれずそわそわしていた）"
2004503-55 = "急いで探さないとデス……！"
2004503-56 = "この落とし前、どうつければいいのか……不肖フィーナ、面目次第もありマセン！"
2004503-61 = "あのー、ガイドさん？"
2004503-62 = "キ、キャーッ！！"
2004503-66 = "[ns] \"う、うわあっ！？\""
2004503-67 = "び、びっくりした……どうしたの？"
2004503-68 = "そ、それがですね……エット……。"
2004503-69 = "あっ！……私一番乗りだった？"
2004503-70 = "そ、そうではなく……その……！"
2004503-71 = "[s7] （フィーナが完全にパニック状態だ……なんとかしないと！）\n[s8] \"実は、タクシーツアーに切り替えるのはどうかと思いまして！\""
2004503-77 = "タクシー……ツアー？"
2004503-78 = "……。"
2004503-79 = "[s9] \"目的地まで、特別にタクシーを手配しています。\"\n[s10] \"ゆったりと、目的地までの風景を楽しみませんか？\""
2004503-82 = "！！"
2004503-83 = "……！"
2004503-84 = "すみマセン……既に、バスが出発していマシテ……。"
2004503-85 = "他の皆様は、既に次の目的地へ向かっているんデス……。"
2004503-86 = "すべてワタシの不手際デス！……今すぐタクシー乗り場にご案内しマス！"
2004503-91 = "……。"
2004503-94 = "……ううっ。"
2004503-95 = "……。"
2004503-96 = "あっ、なーんだ。そういうこと？"
2004503-97 = "ついお土産選びに夢中になっちゃっててさ……。"
2004503-98 = "戻ったら誰もいないなーって思ってたんだ。"
2004503-99 = "！！"
2004503-100 = "遅刻したのは私のせいなのに、わざわざありがとう！"
2004503-101 = "それじゃガイドさん、よろしくね。"
2004503-102 = "了解デス！お任せクダサイ、姐さん！"
2004503-103 = "あ……姐さん……？"
2004503-107 = "集合時間ピッタリデス！"
2004503-111 = "みんな～、ただいま！"
2004503-112 = "あんた、どこ行ってたの？"
2004503-113 = "ふふっ、ちょっと……別のコースをね！"
2004503-117 = "任務……完遂デス……。"
2004503-123 = "[ns] \"フィーナ、大丈夫！？\""
2004503-125 = "（その後、ツアーは無事終了した）"
2004503-126 = "（再び元気を取り戻したフィーナは、誰一人欠けることなく参加者全員を見送った）"
