1013005-13 = "Ah, é um trabalho de meio período..."

1013005-14 = "Não, isso não é verdade! Não é o que o professor pensa...! #nComo resultado da discussão de todos――"

1013005-15 = "Aproveitei a oportunidade para vivenciar o “atendimento ao cliente” e aprender diversas formas de lidar com os clientes."

