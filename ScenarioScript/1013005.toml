1013005-68 = "[s] \"Huh...isso é o que significa ser um adulto.\""

1013005-69 = "...Vou aprender muito. Muito."

1013005-71 = "(Então tive uma conversa inocente com Subaru)"

1013005-72 = "(Coisas na vida cotidiana, na escola e na interação com os juniores...)"

1013005-73 = "(Cada um é realmente trivial, mas é por isso que é uma história importante)"

1013005-75 = "professor."

