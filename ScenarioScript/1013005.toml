1013005-40 = "[ns] \"Uau...é mais sério do que eu esperava.\""

1013005-41 = "O que você acha? professor. É revigorante ver todo mundo assim, não é?"

1013005-42 = "No começo fiquei preocupado, mas quando vi o uniforme fiquei mais otimista..."

1013005-43 = "``É fofo'' e ``Eu quero usá-lo.''"

1013005-44 = "……."

1013005-45 = "Mesmo sendo um veterano, não percebi como meus juniores estavam se sentindo... me senti patético."

1013005-46 = "[s5] \"Isso não é verdade, eu simplesmente não sabia.\"\n[s6] \"Se você percebeu, você ficará bem.\""

1013005-49 = "...Isso mesmo."

