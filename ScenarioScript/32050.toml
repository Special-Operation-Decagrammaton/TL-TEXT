[translation]
32050-1 = "Episódio 5: Grande Bagunça à Meia-Noite (1)"
32050-2 = "Ufufu……♡"
32050-3 = "Ahaha…… a-gente realmente veio, né."
32050-4 = "O que acham？ Já não tá super divertido？ Essa sensação deliciosa de fazer algo proibido, misturada com a segurança de estar todo mundo junto……！"
32050-5 = "Entendi, então a cidade à noite é assim…… tem mais movimento do que eu imaginava."
32050-6 = "Isso mesmo, tem várias lojas abertas 24 horas."
32050-7 = "Aquilo é uma doceria？ Tem lugar aberto a essa hora…… ah, tem uma cafeteria também."
32050-8 = "Um pouco mais pra frente tem uma loja de produtos dos Momo Friends. Do outro lado tem uma lojinha escondida só com itens limitados……"
32050-9 = "Fufu, como esperado da Hifumi-chan, você manja mesmo."
32050-10 = "A-ahaha……"
32050-14 = "Uuu…… no final eu vim, mas se a Hasumi-senpai nos vir aqui, ela vai ficar puta da vida……"
32050-15 = "Ara, é assim？ Ouvi dizer que a Hasumi-san é bem gentil com as kouhais……？"
32050-16 = "C-claro que é gentil！ Ela é perfeita em estudos e combate, tem classe…… é uma senpai incrível！"
32050-17 = "M-mas quando ela fica brava… é realmente assustadora……"
32050-18 = "[s] \"Realmente, ouvi dizer que quando a Hasumi fica séria é terrível……\""
32050-19 = "S-sim…… teve uma vez que eu vi……"
32050-21 = "Sala do Comitê de Execução da Justiça"
32050-26 = "……。"
32050-27 = "……。"
32050-28 = "H-Hasumi-senpai, por favor se acalme――"
32050-32 = "Eu NUNCA, NUNCA vou perdoar！！ Pandemônio！！ Gehenna！！ Por que, POR QUE eles chegam a esse ponto……！！"
32050-33 = "Hii……！"
32050-35 = "Ara…… que intenso. O que aconteceu……？"
32050-36 = "Foi na reunião sobre o Tratado de Eden com a cúpula de Gehenna……"
32050-38 = "Haa… haa……"
32050-39 = "……Escutem bem. Eu declaro aqui e agora."
32050-40 = "De agora em diante eu…… eu……っ！"
32050-41 = "Vou fazer dieta de verdade！！"
32050-43 = "……！？"
32050-44 = "……っ！？"
32050-45 = "D-dieta……？"
32050-47 = "Sim, dieta！"
32050-48 = "Se vocês me virem comendo mais de duas vezes por dia ou beliscando doces, me apontem e me deem bronca na hora！"
32050-49 = "Ouvi dizer que sozinha é difícil, então é melhor declarar pra todo mundo！ Preciso da ajuda de vocês！"
32050-50 = "H-Hasumi-senpai…… o que aconteceu na reunião com Gehenna……？"
32050-51 = "……。"
32050-52 = "Não posso perdoar……！ Como eles ousam……！"
32050-55 = "……Entendi, então você é a «arma estratégica de Trinity», a Tsurugi Kenzen."
32050-56 = "……Eh？ Ah, não, eu sou――"
32050-57 = "Entendi, você é ainda mais fora do padrão do que eu imaginava. Desagradável de tão grande."
32050-58 = "Kiki！ Mas essa estratégia não funciona contra a Makoto-sama！ Tentar nos impressionar logo de cara é ingênuo demais！"
32050-59 = "……Hã？"
32050-60 = "Iroha, traga a Satsuki！ Vou mostrar que não perdemos pra Trinity！！"
32050-62 = "Makoto-senpai, essa não é a presidente Tsurugi, é a vice Hasumi-san. Estava nos documentos."
32050-63 = "E se for sobre tamanho de peito, mesmo com a Satsuki-senpai acho que não ganhamos."
32050-67 = "Q-quê！？ Não é a Tsurugi！？ Entendi, é uma substituta… que ousadia, usar truques sujos nesse ponto……！"
32050-68 = "Ha！ Então essa reunião toda é falsa！？ Nos chamaram só pra nos intimidar com altura e peito……！"
32050-69 = "Não, já disse que é a Hasumi-san desde o começo. Vocês estão me ouvindo？ Não, né？"
32050-70 = "Tsc, mostrando esse peito enorme desagradável……！ Tá querendo briga com a Makoto-sama do Pandemônio！！"
32050-71 = "Por favor se acalme, e para de falar de peito. Tá ficando vergonhoso pro Pandemônio."
32050-72 = "Iroha, prepara aquilo！ Não vou perder pra essa peituda！"
32050-77 = "Peituda…………？"
32050-81 = "Não sei o que é «aquilo», mas entendi que a reunião deu errado. Vamos vazar."
32050-82 = "……Hm？"
32050-86 = "Aaaahhhhhhhhhh！！"
32050-94 = "……。"
32050-95 = "……。"
32050-96 = "[s] \"…………。\""
32050-97 = "Depois disso a reunião deu errado…… e desde então a Hasumi-senpai quase não come, tô preocupada……"
32050-98 = "Então aconteceu isso…… faz sentido ficar brava com Gehenna…… não tem como não ficar……"
32050-99 = "[s] \"Será que a Hasumi tá bem……\""
32050-100 = "Mas a Hasumi-senpai é forte em vários sentidos, então tá tudo bem！"
32050-101 = "Desde então ela tá se esforçando pra cumprir a promessa……！"
32050-105 = "Ah, tem outra doceria aqui."
32050-106 = "Falando de comida me deu fome. Vamos comer alguma coisa aqui？"
32050-107 = "Ah, o sundae especial daqui é delicioso！ Não sabia que ficava aberto 24 horas."
32050-108 = "Sundae, né…… sim, não é má ideia. Vamos."
32050-114 = "Eh, ehh……！？"
32050-115 = "Uuu…… n-ninguém tá olhando, né……？"
32050-122 = "Bem-vindos."
32050-123 = "Ahaha…… uma doceria à meia-noite… tô nervosa, mas também super animada."
32050-124 = "Realmente."
32050-125 = "5 pessoas？ Podem fazer o pedido."
32050-126 = "Uhm…… ah, ainda tem o sundae especial？"
32050-127 = "Ah, desculpe…… o último sundae especial acabou de ser vendido pra outro cliente……"
32050-128 = "Ah, que pena……"
32050-129 = "Chegamos tarde… não imaginei que até essa hora teria fila. Impressionante."
32050-130 = "……Ara？"
32050-131 = "S-Sensei……？"
32050-132 = "[s] \"Hasumi……！？\""
32050-133 = "H-Hasumi-senpai！？"
32050-134 = "Ara, não é o sundae especial？ Tem vários aí……"
32050-136 = "（Hasumi estava comendo três sundaes com cara de felicidade.）"
32050-138 = "Sensei, e as meninas do Clube de Reforço……"
32050-139 = "A-aaaaah……！"
32050-140 = "Hasumi-san, que coincidência♡ Ara, três sundaes à meia-noite…… não estava de dieta？"
32050-141 = "I-isso é…… bom……"
32050-142 = "Sim, entendo o coração. Foi dominada pelos desejos noturnos e acabou aqui, né？"
32050-143 = "Eh……！？ N-não, isso……"
32050-144 = "Depois de se entregar à luxúria e fazer uma bagunça, quando recuperar a razão já vai ser tarde demais……"
32050-145 = "[s] \"De noite a fome aperta mesmo.\""
32050-146 = "S-Sensei…… coof. Falando nisso, vocês do Clube de Reforço não deveriam estar proibidos de sair durante o acampamento……？"
32050-150 = "……Vamos fingir que não vimos nada, né."
32050-151 = "H-Hasumi-senpai……"
32050-152 = "Koharu, tá estudando direito？"
32050-153 = "Ah, e-eh, isso, aquilo……"
32050-154 = "[s] \"A Koharu tá melhorando bastante nas notas.\""
32050-156 = "S-sim, isso mesmo……！ A Koharu-chan tá se esforçando tanto que vai passar tranquilamente……！"
32050-158 = "Entendi."
32050-159 = "Uuu…… e-eh……"
32050-160 = "Isso é ótimo. Como eu disse antes, se a Koharu se esforçar consegue."
32050-161 = "Como eu disse naquela hora……"
32050-163 = "Tô torcendo por você, Koharu. Estuda bastante."
32050-164 = "Não esquece o objetivo real. Não é só sobre estudar."
32050-165 = "……Sim. Vou me esforçar ao máximo."
32050-175 = "……Ehehe. Não quero decepcionar a Hasumi-senpai."
32050-176 = "Sim. Continuo torcendo. Mal posso esperar pra você voltar pro Comitê e cumprirmos missões juntas de novo."
32050-177 = "Sim, vou me esforçar……！"
32050-178 = "[s] \"Que conversa boa……\""
32050-179 = "（Vvvvv……）"
32050-180 = "……？ Uma ligação a essa hora……？"
32050-181 = "Sim…… Ichika？ O que houve？"
32050-182 = "Hasumi-senpai, surgiu um problema. Onde você está？"
32050-183 = "Problema……？ Me conta os detalhes."
32050-184 = "Parece que alunos suspeitos de Gehenna invadiram o território de Trinity e estão atacando instalações aleatoriamente com tiros."
32050-185 = "Ataque…… o Comitê Disciplinar de Gehenna！？ Ou o Pandemônio finalmente mostrou as garras……！？"
32050-186 = "Ah, não, na verdade……"
32050-187 = "Seja quem for, com certeza é pra atrapalhar o Tratado de Eden……！ Quantos pelotões？ Qual instalação eles estão atacando！？"
32050-188 = "Calma, senpai. Não é o Comitê Disciplinar, e são poucos. Só confirmamos 4 pessoas."
32050-189 = "Não é o Comitê Disciplinar…… só 4……？"
32050-190 = "Sim. E o lugar atacado é…… parece que é o aquário."
32050-191 = "O aquário……？ Por que justo lá……？"
32050-192 = "Sei lá. Mas parece que eles roubaram o peixe raro em exposição, o «Atum Dourado», e fugiram."
32050-193 = "«Atum Dourado»……？"
32050-194 = "É um peixe caríssimo, provavelmente vão vender. Ah, mais informações chegando."
32050-195 = "Ehh…… parece que são do grupo terrorista de Gehenna, a «Sociedade Gourmet»."
32050-198 = "A líder é a presidente Haruna Kurodate, uma figura bem perigosa de Gehenna. E aí, senpai, o que fazemos？"
32050-200 = "Eeeeeee！！ Por que vocês vieram até aqui！？ Estamos no meio de Trinity！？"
32050-201 = "Não tem jeito, quando ouvi falar do «Atum Dourado» não consegui ficar quieta★"
32050-202 = "Fufu. Usar esse lendário atum só como atração turística… isso é uma falta de respeito com a gastronomia."
32050-203 = "A gastronomia deve ser solitária, mas ao mesmo tempo universal……"
32050-204 = "Transformar algo tão nobre em mera ferramenta de lucro… o «Atum Dourado» certamente não deseja isso."
32050-205 = "Nós apenas respondemos ao chamado！ Não é, Fuuka-san？"
32050-206 = "Nnn！？ Nnnnー！！ Nnnnnnn！？"
32050-207 = "Vejam só. A ministra de Alimentação de Gehenna concordando com lágrimas nos olhos！"
32050-208 = "Com a mordaça não dá pra entender o que ela tá falando, mas★"
32050-209 = "Uwaah, o atum ainda tá pulando！ Ele me deu um tapa com a barbatana！？"
32050-210 = "Izumi, segura ele direito！ Esse peixe é caríssimo！"
32050-211 = "Aliás, quando vamos comer？ Tô levando tapa de barbatana, sendo perseguida por gente de uniforme preto, e tô ficando com fome！"
32050-212 = "Uniforme preto… isso é o Comitê de Execução da Justiça！？ Tão perigosos quanto nosso Comitê Disciplinar！ O que fazemos, Haruna, vamos conseguir fugir！？"
32050-213 = "Fufu…… se vamos conseguir fugir ou não não é o problema."
32050-214 = "O importante é se vamos comer ou não！"
32050-215 = "Ou seja, [ruby=eat or die]「comer ou morrer」！ Só essas duas opções！ Esse é o caminho solitário que nós, gastrônomos, devemos seguir！"
32050-216 = "No final das contas, é isso★"
32050-220 = "Para de falar alto e luta pra gente conseguir fugir！！"
32050-221 = "Vamos romper o cerco e bater em retirada！ Precisamos fazer a Fuuka-san preparar um sashimi fresquinho o mais rápido possível！！"
32050-222 = "Nnnnnnーーーー！！！？"
32050-224 = "Próximo; Grande Bagunça à Meia-Noite (2)"