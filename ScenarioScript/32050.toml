[translation]
32050-1 = "Episódio 5; Tumulto da Meia-Noite (1)"
32050-2 = "Ufufu...♡"
32050-3 = "Ahaha... n-nós realmente viemos."
32050-4 = "O que acha? Já não está sendo divertido? Essa sensação de proibição por estarmos fazendo algo proibido, e ao mesmo tempo, a tranquilidade de estarmos todos juntos... essas duas coisas combinadas...!"
32050-5 = "Entendo, então é assim que a cidade fica de madrugada... É mais movimentada do que eu pensava."
32050-6 = "Pois é, tem muitas lojas que ficam abertas 24 horas."
32050-7 = "Aquela é uma loja de doces? Tem lugares que ficam abertos 24 horas... Ah, tem uma cafeteria aberta também."
32050-8 = "Se formos um pouco mais adiante, tem uma loja de produtos da Momo Friends. E bem em frente, tem uma loja escondida que vende apenas produtos exclusivos..."
32050-9 = "Fufu, como esperado da Hifumi-chan, você entende muito bem."
32050-10 = "A-ahahaha..."
32050-14 = "Uuu... Acabei vindo mesmo, mas se por acaso a Hasumi-senpai vir a gente aqui, acho que ela vai ficar muito brava..."
32050-15 = "Ora, é mesmo? Ouvi dizer que a Hasumi-san é muito gentil com as alunas mais novas..."
32050-16 = "C-claro que ela é gentil! Além disso, ela é talentosa tanto nos estudos quanto nas artes marciais... e é uma pessoa muito elegante e incrível!"
32050-17 = "M-mas, quando ela fica brava, é realmente assustador..."
32050-18 = "[s] \"Falando nisso, disseram que quando a Hasumi fica brava de verdade, é algo terrível...\""
32050-19 = "S-sim... aconteceu uma vez, e eu estava lá também..."
32050-21 = "Comitê de Justiça - Sala de Aula"
32050-26 = "..."
32050-27 = "..."
32050-28 = "H-Hasumi-senpai, por favor, acalme-se—"
32050-32 = "Eu nunca, eu nunca vou perdoar!! Pandemonium!! Gehenna!! Como, como eles puderam chegar a esse ponto...!!"
32050-33 = "Hii...!"
32050-35 = "Ora... isso parece intenso. O que exatamente aconteceu...?"
32050-36 = "Foi durante a reunião com a liderança de Gehenna sobre o Tratado de Eden..."
32050-38 = "Haa, haa..."
32050-39 = "...Por favor, ouçam, ouçam com atenção. Eu declaro aqui agora."
32050-40 = "De agora em diante, eu... eu...!"
32050-41 = "Vou começar uma dieta de verdade!!"
32050-43 = "...!?"
32050-44 = "...!?"
32050-45 = "U-uma dieta...?"
32050-47 = "Sim, uma dieta!"
32050-48 = "Se me virem comendo mais de duas vezes ao dia ou beliscando lanches, por favor, me apontem isso na hora e me deem uma bronca!"
32050-49 = "Ouvi dizer que é difícil conseguir isso sozinho, então é melhor declarar publicamente! Preciso da ajuda de vocês!"
32050-50 = "H-Hasumi-senpai... o que exatamente aconteceu na reunião com Gehenna...?"
32050-51 = "..."
32050-52 = "Eu não posso perdoar...! Como eles puderam fazer algo assim...!"
32050-55 = "...Entendo, então você é a Tsurugi Kenzaki, chamada de \"arma estratégica da Trinity\"."
32050-56 = "...Eh? Ah, não, eu sou a—"
32050-57 = "Entendo, você é ainda mais fora dos padrões do que eu imaginava. A ponto de ser irritante."
32050-58 = "Kiki! Mas essa estratégia não vai funcionar comigo, Makoto-sama! Tentar nos vencer com um impacto logo de cara é muita ingenuidade!"
32050-59 = "...Sim?"
32050-60 = "Iroha, traga a Satsuki! Vamos mostrar a eles que não perdemos para o pessoal da Trinity!!"
32050-62 = "Makoto-senpai, esta pessoa não é a presidente Tsurugi, mas sim a vice-presidente Hasumi. Acho que isso estava nos documentos."
32050-63 = "Além disso, se você está falando do tamanho do busto, acho que nem a Satsuki-senpai ganharia dela."
32050-67 = "O-o quê!? Não é a Tsurugi!? Entendo, uma substituta... Que audácia, usar truques baratos a essa altura do campeonato...!"
32050-68 = "Ha! Então essa reunião é uma farsa, afinal!? Nos chamaram aqui só para tentar nos intimidar com a altura e o busto dela...!"
32050-69 = "Não, eu disse que ela é a Hasumi-san desde o início. Você está me ouvindo? Acho que não, né?"
32050-70 = "Droga, exibir um busto tão grande a ponto de ser irritante...! Você está querendo brigar com o Makoto-sama do Pandemonium?!"
32050-71 = "Por favor, acalme-se, e pare de falar sobre o busto. Já está ficando vergonhoso para o Pandemonium."
32050-72 = "Iroha, se as coisas chegaram a esse ponto, prepare aquilo! Não vou deixar essa mulher grandalhona vencer a gente assim!"
32050-77 = "Mulher grandalhona...?"
32050-81 = "Não faço ideia do que você quer dizer com \"aquilo\", mas pelo menos ficou claro que essa reunião foi por água abaixo. Vamos fugir logo."
32050-82 = "……Hm?"
32050-86 = "Ah…… Aaaaaaaahhhhhhh!!"
32050-94 = "……."
32050-95 = "……."
32050-96 = "[s] \"…………。\""
32050-97 = "E então, a reunião em si fracassou... e desde aquele dia, a Hasumi-senpai quase não come nada, então estou preocupada..."
32050-98 = "Então foi isso que aconteceu... Entendo por que está brava com o pessoal de Gehenna, não é para menos..."
32050-99 = "[s] \"Será que a Hasumi está bem...\""
32050-100 = "Mas a Hasumi-senpai é forte em vários sentidos, então ela vai ficar bem!"
32050-101 = "Desde então, ela tem se esforçado para cumprir a promessa que fez a si mesma...!"
32050-105 = "Ah, tem uma doceria aqui também."
32050-106 = "Já que estávamos falando de comida, fiquei com fome. Que tal comermos algo aqui?"
32050-107 = "Ah, o parfait limitado daqui é incrivelmente delicioso! Não sabia que ficavam abertos 24 horas."
32050-108 = "Parfait, é...? Sim, não é uma má ideia. Vamos."
32050-114 = "E-eh...!?"
32050-115 = "Ugh... N-ninguém está olhando, né...?"
32050-122 = "Sejam bem-vindos."
32050-123 = "Ahaha, uma doceria no meio da madrugada... Estou um pouco nervosa, mas também muito empolgada."
32050-124 = "Com certeza."
32050-125 = "Serão cinco pessoas? Podem fazer o pedido."
32050-126 = "Bem... ah, ainda tem o parfait limitado?"
32050-127 = "Ah, sinto muito... O último parfait limitado foi comprado agora há pouco por outra cliente..."
32050-128 = "Ah, entendo..."
32050-129 = "Chegamos um passo atrasados... Não dá para subestimar a concorrência, mesmo a essa hora."
32050-130 = "……Oh?"
32050-131 = "Se-Sensei...?"
32050-132 = "[s] \"Hasumi...!?\""
32050-133 = "Ha-Hasumi-senpai!?"
32050-134 = "Ora, seria esse o parfait limitado? E tem vários..."
32050-136 = "(Hasumi estava sentada com três parfaits à sua frente, comendo-os com uma cara deliciosa.)"
32050-138 = "Sensei, e pessoal do Clube de Estudos Suplementares..."
32050-139 = "A-aaaaahhh...!"
32050-140 = "Hasumi-san, que coincidência♡ Ora, três parfaits no meio da madrugada... Se não me engano, você não estava de dieta?"
32050-141 = "I-isso é, bem, é que..."
32050-142 = "Sim, entendo perfeitamente o seu sentimento. Você foi guiada pelos desejos malignos que surgiram no meio da noite e acabou vindo parar aqui, não foi?"
32050-143 = "Eh...!? N-não, é que..."
32050-144 = "E depois de deixar tudo uma bagunça por causa desses desejos, quando a razão finalmente voltou, já era tarde demais para consertar o estrago..."
32050-145 = "[s] \"A gente sempre sente fome de madrugada, né?\""
32050-146 = "Se-Sensei... *cof*. Bem, é um pouco hipócrita da minha parte dizer isso, mas o pessoal do Clube de Estudos Suplementares não deveria estar proibido de sair durante o acampamento...?"
32050-150 = "……Vamos fingir que não vimos nada, um para o outro."
32050-151 = "Ha-Hasumi-senpai..."
32050-152 = "Koharu, você tem se esforçado nos estudos?"
32050-153 = "Ah, bem, isso, é que..."
32050-154 = "[s] \"A Koharu tem melhorado muito as notas ultimamente.\" "
32050-156 = "S-sim, é verdade...! A Koharu-chan tem se esforçado tanto que, se continuar assim, vai passar com certeza...!"
32050-158 = "Entendo, é mesmo?"
32050-159 = "Ugh... bem, é que..."
32050-160 = "Isso é o melhor que poderia acontecer. Eu não disse? A Koharu consegue fazer se ela se esforçar."
32050-161 = "Como eu disse naquela época também..."
32050-163 = "Estou torcendo por você, Koharu. Por favor, dê o seu melhor nos estudos."
32050-164 = "Não se esqueça do seu objetivo principal; não estou falando apenas sobre os estudos que estão diante de você agora."
32050-165 = "Mas, isso é... para mim, é impossível..."
32050-166 = "Melhorar as notas tão rápido assim... É verdade que quero ficar com a senpai, mas isso é algo difícil demais para mim..."
32050-167 = "Isso não serve!"
32050-171 = "Desculpe, eu acabei gritando de repente... Mas Koharu, para que possamos continuar juntas daqui para frente, você precisa se esforçar agora."
32050-172 = "Além disso, o Sensei também vai ajudar com certeza. É por causa desse Sensei que você deve se esforçar nos estudos agora, Koharu."
32050-173 = "...Sim. Eu vou me esforçar ao máximo."
32050-175 = "...Hehehe. É que eu não quero decepcionar as expectativas da Hasumi-senpai."
32050-176 = "Sim. Continuarei torcendo por você, Koharu. Estou ansiosa pelo dia em que você voltará logo para o Comitê de Justiça para cumprirmos missões juntas."
32050-177 = "Sim, vou me esforçar...!"
32050-178 = "[s] \"Que conversa bonita...\""
32050-179 = "(Vzzzz...)"
32050-180 = "...? Uma mensagem a esta hora...?"
32050-181 = "Sim... Ichika? Aconteceu alguma coisa?"
32050-182 = "Hasumi-senpai, surgiu um pequeno problema. Onde você está agora?"
32050-183 = "Um problema...? Pode me contar os detalhes?"
32050-184 = "Parece que há informações de que alunas, presumivelmente de Gehenna, invadiram os arredores da academia sem permissão e estão atacando instalações da Trinity enquanto disparam armas indiscriminadamente."
32050-185 = "Ataque... O Comitê Disciplinar de Gehenna!? Ou será que o Pandemônio finalmente mostrou sua verdadeira face...!?"
32050-186 = "Ah, não, é que..."
32050-187 = "Seja quem for, certamente deve ser uma tentativa de atrapalhar o Tratado de Eden...! Qual é o tamanho da unidade? Onde é, onde fica essa instalação!?"
32050-188 = "Por favor, mantenha a calma, senpai. Primeiro, não é o Comitê Disciplinar de Gehenna, e o poder de fogo é bem pequeno; só confirmamos 4 alunas."
32050-189 = "Não é o Comitê Disciplinar... e são apenas 4...?"
32050-190 = "Sim. E o local atacado foi... o aquário, parece."
32050-191 = "O, o aquário...? Por que em um lugar como aquele...?"
32050-192 = "Não sei. Eu também não entendi direito, mas parece que elas roubaram o raro \"Atum Dourado\" que estava em exibição e estão fugindo."
32050-193 = "\"Atum Dourado\"...?"
32050-194 = "Parece ser um peixe caríssimo, provavelmente vão tentar vender em algum lugar... Ah, recebi mais algumas informações."
32050-195 = "Bem... parece que as responsáveis são o grupo terrorista de Gehenna, o \"Clube de Pesquisa Gastronômica\"."
32050-198 = "A mentora é a presidente Haruna Kurodate, aquela que já é considerada uma pessoa de alto risco mesmo dentro de Gehenna. E então, o que faremos, senpai?"
32050-200 = "Nãããão!! Por que viemos parar em um lugar desses!? É bem no meio da Trinity!?"
32050-201 = "Não tem como evitar, não podemos ficar paradas assistindo depois de ouvir sobre esse \"Atum Dourado\"★"
32050-202 = "Fufu. Tratar aquele atum lendário apenas como um objeto de exibição... Isso é uma falta de etiqueta com a gastronomia."
32050-203 = "A gastronomia deve ser sublime, mas ao mesmo tempo universal..."
32050-204 = "O \"Atum Dourado\" certamente não desejaria terminar apenas como uma ferramenta para ganhar dinheiro como uma atração."
32050-205 = "Nós apenas ressoamos com esse desejo! Não é, Fuuka-san?"
32050-206 = "Nnnn!? Nnnnngh! Nnnnnnnn!?"
32050-207 = "Vejam só. A concordância da chefe do Clube de Refeições de Gehenna, que chega a soluçar de emoção!"
32050-208 = "Embora, por causa da mordaça, não dê para entender nada do que ela diz★"
32050-209 = "Uau, o atum ainda está se debatendo! Ele está me dando tapas com a barbatana!?"
32050-210 = "Izumi, segure-o direito! Ele é caríssimo!"
32050-211 = "Aliás, quando vamos poder comer isso? O atum está me batendo, estamos sendo perseguidas por garotas de uniforme de marinheiro preto, e eu já estou com fome!"
32050-212 = "Garotas de uniforme de marinheiro preto, isso não é o Comitê de Justiça!? Elas são tão perigosas quanto o Comitê Disciplinar daqui! O que vamos fazer, Haruna, vamos conseguir escapar!?"
32050-213 = "Fufu... Se vamos conseguir escapar ou não, isso não é um problema importante."
32050-214 = "O que importa é se podemos comer ou não!"
32050-215 = "Ou seja, \"comer ou morrer\"! Apenas essas duas opções! Esse é o caminho sublime que nós, gastrônomos, devemos seguir!"
32050-216 = "No fim das contas, é isso★"
32050-220 = "Não fiquem falando tão alto, lutem logo e fujam rápido!!"
32050-221 = "Muito bem, vamos romper o cerco e recuar! Precisamos fazer com que a Fuuka-san prepare um sashimi de atum fresco o mais rápido possível!!"
32050-222 = "Hmmmmmmm---!!!"
32050-224 = "Próximo episódio: O Grande Tumulto da Meia-Noite (2)"
