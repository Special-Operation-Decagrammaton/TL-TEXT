[translation]
32050-1 = "Episódio 5;A Grande Confusão da Meia-Noite (1)"
32050-2 = "Ufufu……♡"
32050-3 = "Ahaha…… a-a gente veio mesmo, né."
32050-4 = "E aí? Já não tá divertido? Essa sensação de transgressão de estar fazendo algo proibido, e, ao mesmo tempo, aquela segurança de estar fazendo todo mundo junto; as duas se combinando……!"
32050-5 = "Sei, então a rua de madrugada é assim…… tem mais movimento do que eu imaginava."
32050-6 = "Pois é, tem bastante loja aberta 24 horas também."
32050-7 = "Aquilo é uma doceria? Tem lugar aberto 24 horas…… ah, o café também tá aberto."
32050-8 = "Andando mais um pouco daqui, tem também uma loja de produtos da MomoFriends. E, em frente a ela, tem uma lojinha escondida que só vende produtos de edição limitada……."
32050-9 = "Ufu, como esperado da Hifumi, você entende do assunto."
32050-10 = "A-ahahaha……."
32050-14 = "Uu…… no fim eu acabei entrando na onda, mas, se por acaso a veterana Hasumi me visse num lugar desses, ia dar uma bronca daquelas……."
32050-15 = "Ora, é mesmo? Eu ouvi dizer que a Hasumi é gentil com as calouras……?"
32050-16 = "C-claro que ela é gentil! E ainda por cima é excelência nos estudos e nas artes, talentosa e bonita……? E, com classe, uma veterana incrível!"
32050-17 = "M-mas, quando ela fica brava, é assustadora de verdade……."
32050-18 = "[s] \"Aliás, ouvi que quando a Hasumi fica brava pra valer é impressionante……\""
32050-19 = "S-sim…… teve uma vez, e eu tava lá na hora……."
32050-21 = "Comitê de Realização da Justiça - Sala de aula"
32050-26 = "……."
32050-27 = "……."
32050-28 = "V-veterana Hasumi, se acalme――"
32050-32 = "Jamais, jamais vou perdoar!! Pandemonium!! Gehenna!! Por que, por que a esse ponto……!!"
32050-33 = "Hi……!"
32050-35 = "Ora…… isso tá intenso. O que será que……?"
32050-36 = "Foi quando ela fez uma reunião com a cúpula de Gehenna sobre o Tratado do Éden……."
32050-38 = "Haa, haa……."
32050-39 = "……Escutem, escutem bem. Eu declaro, aqui e agora."
32050-40 = "De agora em diante, eu…… eu……!"
32050-41 = "Dessa vez eu vou fazer dieta!!"
32050-43 = "……!?"
32050-44 = "……!?"
32050-45 = "D-dieta……?"
32050-47 = "Sim, dieta!"
32050-48 = "De agora em diante, se me flagrarem comendo mais de duas vezes ao dia ou pondo um lanche na boca, apontem na hora e me deem bronca, por favor!"
32050-49 = "Ouvi dizer que esse tipo de coisa é difícil só com a própria força, então é melhor declarar! Preciso da ajuda de vocês!"
32050-50 = "V-veterana Hasumi…… na reunião com Gehenna, o que foi que aconteceu……?"
32050-51 = "……."
32050-52 = "Imperdoável……! Como, como puderam……!"
32050-55 = "……Sei, você é a tal Tsurugi Kensaki, chamada de \"arma estratégica de Trinity\"."
32050-56 = "……Hã? Ah, não, eu sou――"
32050-57 = "Sei, você é mais fora do padrão do que eu imaginava. A ponto de ser desagradável."
32050-58 = "Kiki! Mas uma estratégia dessas não funciona com esta grandiosa Makoto! Achar que ganha da gente com o impacto do primeiro encontro é ingenuidade!"
32050-59 = "……Hã?"
32050-60 = "Iroha, traz a Satsuki! Vou mostrar que a gente não tá perdendo pro pessoal de Trinity!!"
32050-62 = "Veterana Makoto, esta pessoa não é a presidente Tsurugi; é a vice-presidente Hasumi. Acho que estava na papelada de antemão também."
32050-63 = "E, se agora vocês estão falando de tamanho de peito, acho que, mesmo se a veterana Satsuki viesse, provavelmente não ganharia."
32050-67 = "M-mas o quê!? Não é a Tsurugi!? Sei, uma substituta…… tão me subestimando, a esta altura recorrer a truquezinhos……!"
32050-68 = "Ha! Ou seja, essa reunião, no fundo, é uma farsa!? Nos convocar e, com a estatura e o impacto do peito, tentar cortar o nosso ímpeto logo de cara……!"
32050-69 = "Não, já falei que desde o início é a Hasumi. Você tá me ouvindo? Não tá, né?"
32050-70 = "Gh, ostentando esse peito desagradavelmente grande……! Tá querendo comprar briga com esta grandiosa Makoto, do Pandemonium!!"
32050-71 = "Se acalme, por favor, e já pare de falar de peito. Já tá virando vergonha pra gente, como Pandemonium."
32050-72 = "Iroha, se é assim, prepara aquilo! Não vou aceitar perder pra essa mulher enorme!"
32050-77 = "Mulher enorme…………?"
32050-81 = "Você fala \"aquilo\", mas eu não faço a menor ideia do que é; enfim, entendi bem que esta reunião foi por água abaixo. Vamos fugir logo."
32050-82 = "……Hm?"
32050-86 = "Ah…… aaaaaaaaah!!"
32050-94 = "……."
32050-95 = "……."
32050-96 = "[s] \"…………\""
32050-97 = "E aí, essa reunião em si foi por água abaixo…… e, desde então, a veterana Hasumi quase não come, então fico preocupada……."
32050-98 = "Então foi isso que aconteceu…… dá pra entender que ela fique brava com o pessoal de Gehenna, não é sem razão……."
32050-99 = "[s] \"Hasumi, será que ela tá bem……\""
32050-100 = "Mas a veterana Hasumi é forte em vários sentidos, então tá tudo bem!"
32050-101 = "Desde então, ela vem cumprindo a promessa que fez consigo mesma e se esforçando……!"
32050-105 = "Ah, aqui também tem uma doceria."
32050-106 = "Sei lá, de tanto falar de comida bateu uma fome; vamos comer alguma coisa aqui?"
32050-107 = "Ah, o parfait de edição limitada daqui é uma delícia! Eu não sabia que ficava aberto 24 horas."
32050-108 = "Parfait, é…… sim, nada mau. Vamos."
32050-114 = "H-hã……!?"
32050-115 = "Uu…… n-ninguém tá vendo, né……?"
32050-122 = "Sejam bem-vindas."
32050-123 = "Ahaha, uma doceria em plena madrugada…… dá um friozinho, mas, sei lá, dá uma empolgação enorme, né."
32050-124 = "De fato."
32050-125 = "São 5 pessoas? Podem fazer o pedido."
32050-126 = "É que…… ah, o parfait de edição limitada ainda tem?"
32050-127 = "Ah, me desculpe…… o parfait de edição limitada, justamente agora há pouco, outra cliente comprou três, e foram os últimos……."
32050-128 = "Ah, era isso……."
32050-129 = "Chegamos um passo tarde…… ser cobiçado até esta hora, não dá pra subestimar."
32050-130 = "……Ora?"
32050-131 = "S-Sensei……?"
32050-132 = "[s] \"Hasumi……!?\""
32050-133 = "V-veterana Hasumi!?"
32050-134 = "Ora, aquilo é o parfait de edição limitada? Quanta coisa……."
32050-136 = "(Diante de três parfaits, lá estava a Hasumi, comendo com cara de satisfação.)"
32050-138 = "Sensei, e o pessoal do Clube de Aulas de Reforço……."
32050-139 = "A-aaaah……!"
32050-140 = "Hasumi, que coincidência♡ Ora, três parfaits em plena madrugada…… se não me engano, ouvi que você estava de dieta?"
32050-141 = "I-isto é, é que……."
32050-142 = "Sim, imagino como você se sente. Levada pelo maligno desejo que a atacou de madrugada, você acabou vindo parar até aqui, não foi?"
32050-143 = "Hã……!? N-não, é que……."
32050-144 = "E, depois de se descontrolar por completo, entregue ao desejo, quando recobrou a razão, já estava perturbada a ponto de não haver mais volta……."
32050-145 = "[s] \"De madrugada bate uma fome mesmo, né.\""
32050-146 = "S-Sensei…… cof. É que, parece que eu tô jogando a culpa pra longe de mim, mas o pessoal do Clube de Aulas de Reforço, no fundo, não estava proibido de sair durante o acampamento……?"
32050-150 = "……Aqui, vamos, de ambas as partes, fingir que não vimos nada?"
32050-151 = "V-veterana Hasumi……."
32050-152 = "Koharu, está se esforçando nos estudos?"
32050-153 = "Ah, é que, isso, é……."
32050-154 = "[s] \"A Koharu, ultimamente, melhorou muito as notas.\""
32050-156 = "S-sim, isso mesmo……! A Koharu, nesse ritmo, tá se esforçando a ponto de conseguir passar tranquilamente……!"
32050-158 = "Sei, então era isso."
32050-159 = "Uu…… é que, deixa ver……."
32050-160 = "Isso é ótimo. Eu não disse? Que a Koharu, quando se esforça, consegue."
32050-161 = "Como eu disse naquela hora……"
32050-163 = "Tô torcendo por você, Koharu. Capriche nos estudos."
32050-164 = "Não se esqueça do objetivo original; não é só do estudo bem na sua frente que eu estou falando."
32050-165 = "Mas, isso…… pra mim, é totalmente impossível……."
32050-166 = "Melhorar as notas assim tão rápido…… a vontade de ficar com a veterana é de verdade, mas pra mim é uma coisa difícil demais……."
32050-167 = "Assim não pode!"
32050-171 = "Me desculpe, dei um grito de repente…… mas, Koharu, pra gente continuar sempre junto daqui pra frente, você precisa se esforçar agora."
32050-172 = "E o Sensei também, sem falta, vai te ajudar. Por esse Sensei também, se esforçar nos estudos é o que a Koharu deve fazer agora."
32050-173 = "……Sim. Eu vou me esforçar ao máximo."
32050-175 = "……Ehehe. É que eu não quero trair a expectativa da veterana Hasumi."
32050-176 = "Sim. Continuo torcendo por você, Koharu. Espero ansiosa o dia em que você volte logo pro Comitê de Realização da Justiça e a gente possa cumprir missões juntas."
32050-177 = "Sim, vou me esforçar……!"
32050-178 = "[s] \"Que história bonita……\""
32050-179 = "(Vvvv……)"
32050-180 = "……? A esta hora, uma ligação……?"
32050-181 = "Sim…… Ichika? Aconteceu alguma coisa?"
32050-182 = "Veterana Hasumi, surgiu um probleminha. Onde você está agora?"
32050-183 = "Problema……? Pode me contar em detalhe?"
32050-184 = "Pelo visto, uns alunos supostamente de Gehenna invadiram sem autorização os arredores da academia e, ainda por cima, atirando indiscriminadamente, estão atacando as instalações de Trinity; é a informação."
32050-185 = "Ataque…… é o Comitê Disciplinar de Gehenna!? Ou o Pandemonium enfim mostrou a sua verdadeira face……!?"
32050-186 = "Ah, não, é que……"
32050-187 = "Seja lá quem for, com certeza a intenção é atrapalhar o Tratado do Éden……! Qual o porte, quantas companhias? O local, onde é essa instalação!?"
32050-188 = "Se acalme, veterana. Por ora, não é o Comitê Disciplinar de Gehenna, e a força é bem pequena; só 4 pessoas confirmadas."
32050-189 = "Não é o Comitê Disciplinar…… 4 pessoas……?"
32050-190 = "Sim. E o que foi atacado foi…… pelo visto, o aquário."
32050-191 = "O-o aquário……? Por que logo um lugar desses……?"
32050-192 = "Sei lá. Eu também não entendi bem, mas parece que roubaram a espécie rara \"Atum Dourado\" que estava em exposição e fugiram."
32050-193 = "\"Atum Dourado\"……?"
32050-194 = "Parece que é um peixe caríssimo; provavelmente pra vender em algum lugar…… ah, chegaram mais algumas informações."
32050-195 = "Deixa ver…… pelo visto, a identidade é o grupo terrorista de Gehenna, o \"Clube de Pesquisa Gastronômica\"."
32050-198 = "A mentora é a presidente Haruna Kurodate, aquela tida como pessoa de alto cuidado até dentro de Gehenna. E aí, o que a gente faz, veterana?"
32050-200 = "Neeee!! Por que a gente veio parar até aqui!? É bem no meio de Trinity!?"
32050-201 = "Não tem jeito; ouvir falar daquele \"Atum Dourado\" e ficar olhando de braços cruzados não dá★"
32050-202 = "Ufu. Tratar aquele atum lendário como mero objeto de exposição…… uma coisa dessas é não ter respeito nenhum pela alta gastronomia."
32050-203 = "A alta gastronomia, ainda que solitária, deve ser universal……"
32050-204 = "Terminar como mera atração pra ganhar dinheiro é algo que nem este senhor \"Atum Dourado\" desejaria."
32050-205 = "A gente só entrou em ressonância com essa voz dele! Não é, Fuuka?"
32050-206 = "Nnh!? Nnnh! Nnnnnnh!?"
32050-207 = "Vejam. A concordância da presidente do Clube de Merenda de Gehenna, a ponto de chorar de emoção!"
32050-208 = "Por causa da mordaça, não dá pra entender nada do que ela diz★"
32050-209 = "Uwa, o atum ainda tá se debatendo! Tô levando tapa da nadadeira dele!?"
32050-210 = "Izumi, segura ele direito! Ele é caríssimo!"
32050-211 = "Aliás, quando é que dá pra comer isto? Levo tapa do atum, sou perseguida por umas meninas de uniforme marinheiro preto, e já tô com fome!"
32050-212 = "Uniforme marinheiro preto, isso é o Comitê de Realização da Justiça!? É tão perigoso quanto o nosso Comitê Disciplinar! O que a gente faz, Haruna, dá pra escapar!?"
32050-213 = "Ufu…… se dá pra escapar ou não, isso não é grande problema."
32050-214 = "O importante é: dá pra comer, ou não!"
32050-215 = "Ou seja, \"comer ou morrer\"! Só essas duas opções! É justamente esse o caminho solitário que nós, gourmets, devemos trilhar!"
32050-216 = "No fim, é isso★"
32050-220 = "Não fica falando tão pomposamente; luta na medida e foge logo!!"
32050-221 = "Vamos, romper o cerco e recuar! O quanto antes, a Fuuka precisa nos preparar um sashimi de atum fresco!!"
32050-222 = "Nnnnh――!!!?"
32050-224 = "Próximo Episódio;A Grande Confusão da Meia-Noite (2)"
