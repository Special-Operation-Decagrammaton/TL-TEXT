[translation]
10016005-1 = "Prólogo; A Cerimônia de Abertura em Chamas"
10016005-2 = "Sala de Transmissão do Estádio"
10016005-3 = "Olá a todos que assistem ao Canal Kronos!"
10016005-4 = "Estamos transmitindo diretamente da cabine de imprensa do 'Estádio Atlético', o local sagrado do Festival Esportivo de Kivotos!"
10016005-5 = "Apesar de ser bem cedo, o Estádio Atlético já está lotado de estudantes."
10016005-6 = "O motivo... bem, vocês já sabem, não é?"
10016005-7 = "Isso mesmo! Hoje finalmente começa o Grande Festival Esportivo de Kivotos — também conhecido como 'Festival Kourin'!"
10016005-8 = "O Festival Kourin, realizado a cada dois anos, é um dos maiores eventos de Kivotos, onde várias escolas, incluindo Gehenna, Trinity e Millennium, se reúnem para competir!"
10016005-9 = "Além disso, como desta vez o evento está sendo organizado pela Millennium Science School, há várias atrações, como novas invenções. Com certeza será ainda mais emocionante do que nos anos anteriores!"
10016005-10 = "Sei que muitos espectadores não puderam comparecer pessoalmente e estão assistindo de seus distritos ou dormitórios, mas..."
10016005-11 = "Não tem problema se você não pôde vir ao local!"
10016005-12 = "Nós, do Canal Kronos, estamos transmitindo o Festival Kourin deste ano com exclusividade, em alta definição e com um som impactante!"
10016005-13 = "Bem, para quem quiser ver a enorme variedade de competições do Festival Kourin, não se esqueça de se inscrever no canal, curtir o vídeo e ativar as notificações na descrição do Canal Kronos —"
10016005-18 = "Opa, parece que o comitê executivo está irritado..."
10016005-19 = "Peço desculpas."
10016005-20 = "Então, acompanhados pelos gritos entusiasmados das estudantes..."
10016005-21 = "Festival Kourin,"
10016005-22 = "Começou!"
10016005-30 = "Nossa, como tivemos vários incidentes graves desde o início do ano, ouvi rumores de que o Festival Kourin poderia ser adiado... mas fico feliz que tenha ocorrido sem problemas."
10016005-31 = "Será que isso é graças à excelente capacidade técnica da Millennium?"
10016005-32 = "Sim. O Festival Kourin deste ano é tão grandioso que está sendo chamado de 'Exposição Millennium', com a tecnologia de ponta da Millennium Science School sendo usada sem restrições."
10016005-33 = "Graças a isso, conseguiram preparar construções enormes e robôs de orientação em um período de tempo limitado, mas..."
10016005-34 = "...segundo rumores, houve um problema dentro da Millennium que colocou a realização do evento em risco."
10016005-35 = "O fato de algumas modalidades terem sido ajustadas na véspera da cerimônia de abertura... dizem que é a prova disso."
10016005-36 = "Que tipo de problema será que aconteceu?"
10016005-37 = "Infelizmente, diante da rigorosa segurança da Millennium, não conseguimos chegar à verdade..."
10016005-38 = "Mas nós, do Departamento de Notícias da Kronos, testemunhamos um fato chocante durante a cobertura."
10016005-39 = "O ajuste repentino nas modalidades esportivas, a pessoa que propôs isso não foi ninguém menos que..."
10016005-40 = "Não foi ninguém menos que...?"
10016005-41 = "O Sensei do Schale!"
10016005-42 = "O Sensei do Schale?"
10016005-43 = "O Sensei do Schale, que está envolvido em todos os tipos de incidentes, quem diria que ele também estava envolvido na preparação do Festival Kourin..."
10016005-44 = "Que suspeito... digo, que pessoa inesperada!"
10016005-45 = "Pois é! Sinto cheiro de um furo de reportagem..."
10016005-50 = "Opa, recebi outro rádio do comitê executivo..."
10016005-51 = "Ah! Agora, o juramento dos atletas que encerra a cerimônia de abertura vai começar! As duas representantes dos atletas subiram ao palco!"
10016005-52 = "As representantes deste ano são... a atleta Ayane Okusora, da Escola Secundária Abydos, e a atleta Hanako Urawa, da Academia Trinity!"
10016005-53 = "Pessoal, continuem atentos ao palco!"
10016005-56 = "Ugh... é a primeira vez que fico na frente de tanta gente, estou um pouco nervosa..."
10016005-57 = "Pratiquei várias vezes, mas se eu gaguejar..."
10016005-58 = "Não precisa ficar tão nervosa, Ayane-san."
10016005-59 = "Embora sejamos representantes, é apenas uma questão de expressar sua determinação na frente de todos."
10016005-60 = "Não se preocupe com o olhar dos outros, apenas seja honesta com seus sentimentos."
10016005-61 = "Fufu, se você imaginar que as pessoas que está vendo são pepinos ou cenouras, talvez se sinta um pouco mais relaxada, não acha?"
10016005-65 = "Hanako-san, você é incrível. Mesmo diante de tanta gente, você está tão calma... sinto a elegância de Trinity."
10016005-66 = "Ahaha... eu também preciso aprender com você."
10016005-67 = "Ora, fico honrada em ouvir isso."
10016005-69 = "(Ufa... sem pressa, mantenha a calma...)"
10016005-70 = "Em nome de todos os atletas, eu faço o juramento!"
10016005-71 = "Em nome de todos os atletas, eu faço o juramento~."
10016005-72 = "Nós, como participantes do Festival Esportivo Kourin..."
10016005-73 = "Nós, como participantes do Festival Esportivo Kourin..."
10016005-74 = "Juramos, com retidão e seguindo o espírito esportivo..."
10016005-75 = "Juramos, pelos nossos 'desejos mais sinceros'..."
10016005-76 = "Que nos dedicaremos de corpo e alma a cada uma das competições..."
10016005-77 = "Que nos dedicaremos ao 'diálogo corporal'..."
10016005-81 = "Espere um pouco, Hanako-san. #nO que foi que você acabou de dizer...?"
10016005-82 = "Ufufu, eu não disse há pouco? #nQue não devemos nos importar com o olhar dos outros e sermos honestos com nossos próprios sentimentos."
10016005-83 = "O Festival Esportivo Kourin é um lugar de fraternidade, onde alunas de várias escolas deixam suas armas de lado e aprofundam seus laços ao colidirem seus corpos nus..."
10016005-84 = "Isso significa que..."
10016005-85 = "É o mesmo que ■■, não é?"
10016005-89 = "O-o que você quer dizer com isso..."
10016005-90 = "E-espere um pouco, Hanako-san! #nO microfone! O microfone está ligado!"
10016005-91 = "Não se preocupe. #nAfinal, o que temos aqui são apenas pepinos e cenouras."
10016005-92 = "Eu pensava nisso há muito tempo. #nColidir corpos nus umas contra as outras... que festival lascivo é o Festival Esportivo Kourin... ufufu."
10016005-93 = "Espera... o que ela está dizendo!?"
10016005-94 = "Mas, acho que é uma ótima oportunidade. #nÉ fácil deixar de entender os sentimentos umas das outras por causa de afiliações ou preconceitos, mas... o corpo é honesto."
10016005-95 = "Ver todas as alunas de Kivotos reunidas para fazer ■■■■ juntas é, sem dúvida, o caminho para uma Kivotos pacífica —"
10016005-96 = "Tirem ela do palco agora mesmo!"
10016005-97 = "O que Trinity está pensando ao colocar uma aluna dessas como representante—"
10016005-98 = "Ufufu... ■■, é ■■! Vamos todas ■■!"
10016005-99 = "Com intensidade, desejando mais uma à outra! #n■■! ■■! ■■—!"
10016005-105 = "Bem... isso foi um erro de transmissão, não foi?"
10016005-106 = "A representante de Trinity falar algo tão impróprio para o ar, diante de todo o público..."
10016005-108 = "É um furo de reportagem!"
10016005-109 = "Sala de gravação, vocês filmaram tudo, certo? #nPreparem uma edição extra imediatamente..."
10016005-114 = "...Hã? Espere um pouco. #nComo assim não é para exibir as imagens de agora?"
10016005-115 = "Nós fizemos um acordo de que a Chronos School teria exclusividade na transmissão de todas as imagens gravadas no Festival Esportivo Kourin, não foi?"
10016005-116 = "Se vocês quebrarem o acordo, nós temos nossos meios! Se o conteúdo de certo doujinshi que obtivemos da Região Autônoma de Red Winter for verdade—"
10016005-117 = "Ah! Não diga isso aqui, senpai!"
10016005-121 = "Não, não, peço desculpas pelo transtorno! #nContinuaremos com a transmissão exclusiva do Festival Esportivo Kourin aqui no Canal Chronos!"
10016005-125 = "Pessoal, não mudem de canal!"
10016005-127 = "#video;10016"
