[translation]
10016005-1 = "プロローグ;燃え上がる開会式"
10016005-2 = "スタジアム放送室"
10016005-3 = "クロノスチャンネルをご覧の皆さん、こんにちは！"
10016005-4 = "この放送はキヴォトス陸上大会の聖地「アスレチックスタジアム」の中継席からお送りしています！"
10016005-5 = "早朝にもかかわらず、ここアスレチックスタジアムはたくさんの生徒で溢れています。"
10016005-6 = "その理由は……言わずとも、皆さんご存知ですよね？"
10016005-7 = "そう！いよいよ本日、キヴォトス大運動会――#nその名も「[ruby=こうりんたいさい]晄輪大祭[/ruby]」が開催されるからです！"
10016005-8 = "2年毎に開かれる晄輪大祭は、ゲヘナやトリニティ、ミレニアムをはじめとする様々な学園が一堂に会して競い合う、キヴォトス有数の大型イベント！"
10016005-9 = "さらに今回はミレニアムサイエンススクールの主管でお送りしているため、#n新しい発明品など様々な見どころが用意されています。#nきっと例年以上の盛り上がりを見せてくれることでしょう！"
10016005-10 = "視聴者の中には、都合が合わず各自治区や寮からこの放送をご覧になっている方もいらっしゃると思いますが……"
10016005-11 = "もし会場に足を運べなかったとしても問題ありません！"
10016005-12 = "私たちクロノスチャンネルが、今年の晄輪大祭も高解像度な映像と迫力のサウンドで独占中継しております！"
10016005-13 = "さあ、晄輪大祭で行われる多種多様な競技をご覧になりたい方は、#nぜひクロノスチャンネルの概要欄からチャンネル登録と高評価、そして通知のオンを――"
10016005-18 = "おっと、実行委員会がお怒りのようで……"
10016005-19 = "失礼いたしました。"
10016005-20 = "それではこれより生徒の熱い歓声と共に――"
10016005-21 = "晄輪大祭、"
10016005-22 = "開幕です！"
10016005-30 = "いや～今年は年始めから凶悪な事件が相次いで発生していましたから、#n晄輪大祭が延期するという噂も耳にしましたが……無事に開催されて良かったですね。"
10016005-31 = "これもミレニアムの優秀な技術力のおかげでしょうか？"
10016005-32 = "ええ。今年の晄輪大祭は「ミレニアム博覧会」とも言われるほどで、#nミレニアムサイエンススクールの最先端技術が惜しみなく使われております。"
10016005-33 = "そのおかげで、このような大型建造物や案内ロボットを限られた準備期間で用意できたとのことですが……"
10016005-34 = "……噂によると、ミレニアム内で開催が危ぶまれるような問題が発生したのだとか。"
10016005-35 = "開会式を翌日に控えたにも関わらず、一部の競技種目が調整されたのも……#nそれを裏付ける証拠だと言われていますね。"
10016005-36 = "一体どんな問題が起こったのでしょうか？"
10016005-37 = "残念ながらミレニアムの厳重なセキュリティを前に、#nその真相へと至ることはできませんでしたが……"
10016005-38 = "私たちクロノス報道部は、取材途中に衝撃的な事実を目撃しました。"
10016005-39 = "突然の競技種目の調整、それを提案した人物とは他でもない……"
10016005-40 = "他でもない……？"
10016005-41 = "シャーレの先生だというのです！"
10016005-42 = "シャーレの先生、ですか？"
10016005-43 = "あらゆる事件に関与しているというシャーレの先生が、#nまさか晄輪大祭の準備にも関わっていたとは……"
10016005-44 = "怪しさ満て――いえ、まさかの人物でしたね！"
10016005-45 = "そうなんです！何だかスクープの香りが……。"
10016005-50 = "おっと、また実行委員会から無線が……。"
10016005-51 = "あっ！ただ今より、開会式の最後を締めくくる選手宣誓が行われます！#n選手代表のお二人が壇上に登りました！"
10016005-52 = "今年の選手代表は……アビドス高等学校の「[ruby=おくそら]奥空[/ruby]アヤネ」選手と#nトリニティ総合学園の「[ruby=うらわ]浦和[/ruby]ハナコ」選手ですね。"
10016005-53 = "皆さん、このまま壇上にご注目ください！"
10016005-56 = "うぅ……こんな大勢の前に立つのは初めてなので、少し緊張しますね……。"
10016005-57 = "何度も練習はしましたが、噛んでしまったらと思うと……。"
10016005-58 = "そんなに緊張する必要はありませんよ、奥空さん。"
10016005-59 = "選手代表とはいえ、皆さんの前で自分の決意を表明するだけのこと。"
10016005-60 = "他人の視線など気にせず、自分の気持ちに素直になれば良いのです。"
10016005-61 = "ふふっ、目に映る相手をキュウリやニンジンだと思えば、少しは気持ちも楽になるのではないでしょうか？"
10016005-65 = "ハナコさんはすごいですね。#n大勢の前でも堂々としていて……トリニティの気品を感じます。"
10016005-66 = "あはは……私も見習わないと。"
10016005-67 = "あら、そう言っていただけて光栄です。"
10016005-69 = "（ふう……焦らず、落ち着いて……）"
10016005-70 = "選手一同を代表して、宣誓します！"
10016005-71 = "選手一同を代表して、宣誓します～。"
10016005-72 = "私たちは晄輪大祭に参加する者として……"
10016005-73 = "私たちは晄輪大祭に参加する者として……"
10016005-74 = "正々堂々、スポーツの精神に則って……"
10016005-75 = "「ありのままの欲望」に誓って……"
10016005-76 = "ひとつひとつの競技に全力で取り組むことを……"
10016005-77 = "「身体の対話」に取り組むことを……"
10016005-81 = "ちょっと待ってください、ハナコさん。#n今おっしゃったのは一体……？"
10016005-82 = "うふふっ、先ほど申し上げたでしょう？#n他人の視線など気にせず、自分の気持ちに素直になれば良い、と。"
10016005-83 = "晄輪大祭は、様々な学園の生徒が武器を置き、お互いの素肌をぶつけ合って親交を深める友愛の場……。"
10016005-84 = "それはつまり……"
10016005-85 = "■■と同じでしょう？"
10016005-89 = "そ、それはどういう……"
10016005-90 = "ちょ、ちょっと待ってくださいハナコさん！#nマイク！マイクがオンになっていますよ！"
10016005-91 = "お気になさらず。#nここにいるのはキュウリやニンジンなのですから。"
10016005-92 = "前々から思っていたのです。#nお互いの素肌をぶつけ合うだなんて……晄輪大祭はなんと淫らなお祭りなんだろうって……うふふっ。"
10016005-93 = "ちょっと……彼女は何を言っているの！？"
10016005-94 = "ですが、私はとても良い機会だと思っています。#n所属やちょっとした先入観で、お互いの気持ちは容易く理解できなくなってしまいますが……身体は正直なものですから。"
10016005-95 = "キヴォトスの全生徒が集まって仲良く■■■■をする姿は、まさに泰平なるキヴォトスを目指しく様であり――"
10016005-96 = "今すぐあいつを壇上から下ろせ！"
10016005-97 = "トリニティは一体何のつもりであんな生徒を代表に――"
10016005-98 = "うふふっ……■■、■■です！みんなで■■いたしましょう！"
10016005-99 = "激しく、もっとお互いを求めて！#n■■を！■■を！■■を――！"
10016005-105 = "ええっと……放送事故、でしたね？"
10016005-106 = "トリニティの代表が、公衆の面前であんな電波に乗せられないような事をまくし立てるなんて……"
10016005-108 = "スクープですね！"
10016005-109 = "録音室、ちゃんと撮影してありますよね？#nすぐに号外記事の作成を……"
10016005-114 = "……えっ？ちょっと待ってください。#n先ほどの映像は流すなって、どういうことですか？"
10016005-115 = "晄輪大祭で撮影した全ての映像は、私たちクロノススクールが独占中継するという約束を交わしましたよね？"
10016005-116 = "約束を反故にするのであれば、こちらにも手段がありますよ！#nレッドウィンター連邦学園自治区から入手した某同人誌の内容が事実だと――"
10016005-117 = "わっ！それをここで言うのはマズいですよ、先輩！"
10016005-121 = "いやいや、お騒がせしました！#n引き続きクロノスチャンネルでは晄輪大祭の様子を独占中継でお送りします！"
10016005-125 = "皆さん、チャンネルはそのままですよ！"
10016005-127 = "#video;10016"
