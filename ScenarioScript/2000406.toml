[translation]
2000406-1 = "Atiradores e fumaça gostam de lugares altos"
2000406-2 = "Praia de Muigahama"
2000406-3 = "Fui até a praia levando sorvete para a Mashiro, que estava se esforçando como voluntária."
2000406-4 = "[s] \"Ué, me disseram que ela estava por aqui, mas não está de novo...?\""
2000406-5 = "Ah, Sensei. Estou aqui."
2000406-6 = "[s1] \"...?\"\n[s2] \"...Não me diga que você está de traje ghillie de novo?\""
2000406-7 = "Ah, não. Bem..."
2000406-8 = "Ah, não. Bem..."
2000406-9 = "Por aqui, é por aqui."
2000406-10 = "Lá em cima."
2000406-11 = "[s] \"Lá em cima...?\""
2000406-15 = "Desculpe por fazer você vir até aqui, aconteceu alguma coisa?"
2000406-16 = "Ah, trouxe sorvete...?"
2000406-17 = "Muito obrigada, Sensei. Eu estava justamente querendo algo gelado."
2000406-18 = "[s] \"Ah, então você estava subida nisso...\""
2000406-19 = "Sim, é uma torre de observação, como as que vemos em praias e piscinas... Acho que é assim que chamam. É onde os salva-vidas costumam ficar sentados."
2000406-20 = "Dá para ver toda a praia daqui de cima."
2000406-21 = "[s] \"A Mashiro realmente gosta de lugares altos, né?\""
2000406-22 = "N-não é exatamente porque eu gosto de lugares altos..."
2000406-23 = "Achei que esta seria a melhor forma de monitorar tudo o que acontece na praia."
2000406-24 = "Lugares altos têm menos pontos cegos, afinal."
2000406-25 = "Além disso, o vento é relativamente fresco aqui, então o risco de insolação é menor, mesmo ficando parada por muito tempo."
2000406-26 = "...E também, a vista daqui é muito bonita."
2000406-27 = "Ah, Sensei. Já que está aqui, por que não sobe na torre?"
2000406-28 = "Talvez o sorvete fique ainda mais gostoso se comermos apreciando a vista."
2000406-29 = "[s] \"Não é um pouco apertado para nós dois?\""
2000406-30 = "Se sentarmos bem próximos, com certeza vai dar certo."
2000406-31 = "Ah... será que eu estou com cheiro de suor agora...?"
2000406-32 = "[s] \"Não, está tudo bem, de verdade.\""
2000406-33 = "E-então..."
2000406-37 = "A escada é um pouco escorregadia, então tome cuidado. Vou subir primeiro, observe bem."
2000406-39 = "Depois disso, fiquei na torre de observação com a Mashiro, observando a praia até o sol se pôr."
