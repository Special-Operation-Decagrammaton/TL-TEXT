[translation]
2000406-1 = "狙撃手と煙は高いところが好き"
2000406-2 = "無為ヶ浜"
2000406-3 = "ボランティアを頑張っているマシロのために、アイスクリームを持って海辺へと向かった。"
2000406-4 = "[s] \"あれ、ここにいるって聞いたんだけど、またいない……？\""
2000406-5 = "あ、先生。こちらです。"
2000406-6 = "[s1] \"……？\"\n[s2] \"……もしかしてまたギリースーツで？\""
2000406-7 = "あ、いえ。えっと……。"
2000406-8 = "あ、いえ。えっと……。"
2000406-9 = "こっちです、こっち。"
2000406-10 = "上の方に。"
2000406-11 = "[s] \"上……？\""
2000406-15 = "わざわざ来ていただいてすみません、どうかされましたか？"
2000406-16 = "え、アイスクリームを……？"
2000406-17 = "ありがとうございます、先生。ちょうど冷たいものが欲しくなってきたところでした。"
2000406-18 = "[s] \"ああ、これに乗ってたんだね……。\""
2000406-19 = "はい、海やプールによくある「監視台」……と言うのでしょうか。ライフセーバーの方がよく座られている物ですね。"
2000406-20 = "この上からだと、海水浴場全体を一目で見下ろせるので。"
2000406-21 = "[s] \"マシロは本当に、高いところが好きなんだね。\""
2000406-22 = "た、高いところが好きだから、と言いますか……。"
2000406-23 = "浜辺全体で何が起きているかを把握するために、これが最善だなと思いまして。"
2000406-24 = "高いところでは死角も少ないですし。"
2000406-25 = "それから風も比較的涼しいので、こうして長時間ジッとしていても熱中症になる危険性も低いです。"
2000406-26 = "……それに、ここから見る景色は美しい、ということもありますね。"
2000406-27 = "そうだ、先生。せっかくですし、監視台に登ってみませんか？"
2000406-28 = "綺麗な景色を見ながらアイスクリームを食べると、より美味しく感じられるかもしれません。"
2000406-29 = "[s] \"二人で座るには、ちょっと狭くない？\""
2000406-30 = "密着して座れば、きっと大丈夫です。"
2000406-31 = "あっ……もしかして今の私、汗くさいでしょうか……？"
2000406-32 = "[s] \"ううん、全然大丈夫だよ。\""
2000406-33 = "で、では……。"
2000406-37 = "はしごが少し滑りやすいので、気を付けてくださいね。私が先に登りますので、よく見ていてください。"
2000406-39 = "その後、監視台の上で、日が暮れるまでマシロと一緒に海岸を眺めていた。"
