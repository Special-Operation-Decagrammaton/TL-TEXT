[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003806-1 = "SRT, Iniciando Descida!" 
1003806-4 = "É uma missão que possui um certo grau de perigo, mas……\nVocê tem certeza de que está tudo bem, Sensei?" 
1003806-5 = "Eh? Você está preocupado de invadirmos\num prédio completamente errado de novo……?" 
1003806-6 = "B-Bem, naquela época a informação não tinha sido\ndevidamente verificada e filtrada, mas……" 
1003806-7 = "Além disso, era um fato que você\ntinha livros suspeitos no quarto, Sensei……" 
1003806-8 = "……Você está realmente pronto?" 
1003806-9 = "[s] \"Estarei seguro desde que\nesteja com você, Miyako.\"" 
1003806-10 = "Junto comigo……" 
1003806-11 = "Tem razão.\nTenho certeza de que ficará tudo bem." 
1003806-12 = "Certo, devemos nos mover?" 
1003806-15 = "[wa:400]― Que lindo……" 
1003806-18 = "― A visão noturna é tão deslumbrante," 
1003806-20 = "― Que eu quase me esqueci\n[wa:1000]do nosso objetivo." 
1003806-23 = "[wa:200]― Fufu," 
1003806-25 = "― Abaixar a guarda [wa:900]no meio de uma missão\n[wa:1000]é inaceitável, mas……" 
1003806-28 = "[wa:300]― ……Ahm," 
1003806-30 = "― ……Isso é bem repentino, [wa:1300]mas, Sensei……" 
1003806-33 = "― Sabe…… [wa:2800]Muito obrigada por estar\nsempre ao nosso lado." 
1003806-35 = "― Muito obrigada mesmo." 
1003806-38 = "― Se você não [wa:500]estivesse conosco……" 
1003806-41 = "― Tanto eu quanto [wa:800]o Esquadrão RABBIT," 
1003806-43 = "― Jamais teríamos crescido [wa:1300]tanto até aqui." 
1003806-46 = "― Portanto, da próxima vez, [wa:1700]se você estiver livre, [wa:1000]poderíamos――" 
1003806-49 = "[wa:400]― ……? [wa:1300]Recebendo transmissão……" 
1003806-51 = "― Entendido, [wa:1300]um local a 500 metros daqui……" 
1003806-54 = "― Sim. [wa:1200]'Iniciem as preparações\npara invasão [wa:1450]imediatamente'." 
1003806-56 = "― Sensei, [wa:700]por favor vista a sua cadeirinha [wa:600]e arnês de rapel." 
1003806-59 = "[wa:300]― Eh? [wa:1100]Você não sabe\ncomo usar…… [wa:1600]?" 
1003806-61 = "― A-Ah, [wa:900]compreendo……" 
1003806-64 = "[wa:400]― ……Tudo bem. [wa:1700]Nesse caso, [wa:1000]aguarde aqui." 
1003806-66 = "― Eu terminarei tudo [wa:650]e voltarei num instante." 
1003806-69 = "― Para que assim, [wa:500]eu possa admirar esta vista noturna," 
1003806-71 = "― Com calma [wa:600]ao seu lado." 
1003806-74 = "（Miyako utilizou o seu equipamento de rapel\ncom maestria e desceu em direção ao alvo.）" 
1003806-78 = "（Um tempo depois, retornei à Schale junto da Miyako,\nque havia concluído a missão com sucesso e retornado em segurança.）" 