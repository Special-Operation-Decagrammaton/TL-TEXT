[translation]
1003806-1 = "SRT、降下します！"
1003806-4 = "やや危険の可能性もある任務なんですが……先生、本当に大丈夫ですか？"
1003806-5 = "え？また前回みたいに全然違う建物を襲撃するんじゃないか心配……？"
1003806-6 = "あ、あの時は情報が精査されていなかったこともありましたし……。"
1003806-7 = "それに、先生が怪しげな本を持っていたことは事実でしたし……。"
1003806-8 = "……本当に大丈夫ですか？"
1003806-9 = "[s] \"ミヤコと一緒なら大丈夫。\""
1003806-10 = "一緒なら……。"
1003806-11 = "確かにそうですね。大丈夫です、きっと。"
1003806-12 = "さて、では移動しましょうか？"
1003806-15 = "[wa:400]― 綺麗……。"
1003806-18 = "― 夜景があまりに美しくて、"
1003806-20 = "― 危うく目的を[wa:1000]忘れるところでした。"
1003806-23 = "[wa:200]― ふふっ、"
1003806-25 = "― 作戦中に[wa:900]油断なんて[wa:1000]ダメなのですけど……。"
1003806-28 = "[wa:300]― ……えっと"
1003806-30 = "― ……急なのですが、[wa:1300]先生……。"
1003806-33 = "― その……[wa:2800]いつも一緒にいてくださって、"
1003806-35 = "― ありがとうございます。"
1003806-38 = "― 先生が[wa:500]いらっしゃらなかったら……"
1003806-41 = "― 私も、[wa:800]RABBIT小隊も、"
1003806-43 = "― ここまで成長できなかったと[wa:1300]思います。"
1003806-46 = "― なので今度、[wa:1700]よろしければ、[wa:1000]その――"
1003806-49 = "[wa:400]― ……？[wa:1300]連絡が……"
1003806-51 = "― なるほど、[wa:1300]ここから500ｍの地点に……"
1003806-54 = "― はい。[wa:1200]すぐに突入の準備を、[wa:1450]とのことです。"
1003806-56 = "― 先生、[wa:700]ラペルリングと[wa:600]ハーネスを装着してください。"
1003806-59 = "[wa:300]― え？[wa:1100]使い方がわからない……[wa:1600]ですか？"
1003806-61 = "― そ、[wa:900]そうでしたか……。"
1003806-64 = "[wa:400]― ……大丈夫です。[wa:1700]では、[wa:1000]ここで待っててください。"
1003806-66 = "― すぐに終えて[wa:650]戻ってきます。"
1003806-69 = "― それでまた[wa:500]先生と、"
1003806-71 = "― ゆっくり[wa:600]この夜景が見たいので。"
1003806-74 = "（ミヤコはカッコよくラペルリングを使って、下の方へと降りて行った。）"
1003806-78 = "（しばらくした後、任務を無事に終えて帰ってきたミヤコと一緒に、シャーレに戻った）"
