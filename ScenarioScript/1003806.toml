[translation]
1003806-1 = "SRT, iniciando descida!"
1003806-4 = "É uma missão que pode ser um pouco perigosa, mas... Sensei, você tem certeza de que está tudo bem?"
1003806-5 = "Hã? Está preocupado que eu ataque o prédio errado de novo, como da última vez...?"
1003806-6 = "Ah, naquela ocasião, as informações não tinham sido verificadas corretamente..."
1003806-7 = "Além disso, é um fato que o Sensei estava carregando um livro suspeito..."
1003806-8 = "...Você tem certeza de que está tudo bem?"
1003806-9 = "[s] \"Se eu estiver com a Miyako, vai dar tudo certo.\""
1003806-10 = "Se estivermos juntos..."
1003806-11 = "É verdade. Vai dar tudo certo, com certeza."
1003806-12 = "Bem, então, vamos nos mover?"
1003806-15 = "[wa:400]— Que lindo..."
1003806-18 = "— A vista noturna é tão bela que,"
1003806-20 = "— quase [wa:1000] esqueci do nosso objetivo."
1003806-23 = "[wa:200]— Fufu,"
1003806-25 = "— não deveríamos nos [wa:900] distrair durante a [wa:1000] missão, mas..."
1003806-28 = "[wa:300]— ...Bem,"
1003806-30 = "— ...É repentino, mas, [wa:1300] Sensei..."
1003806-33 = "— Sabe... [wa:2800] obrigado por estar sempre ao meu lado."
1003806-35 = "— Muito obrigada."
1003806-38 = "— Se o Sensei não [wa:500] estivesse aqui..."
1003806-41 = "— Eu, e o [wa:800] RABBIT Squad,"
1003806-43 = "— não teríamos crescido tanto, [wa:1300] eu acho."
1003806-46 = "— Por isso, da próxima vez, [wa:1700] se não se importar, [wa:1000] aquele..."
1003806-49 = "[wa:400]— ...? [wa:1300] Recebi uma mensagem..."
1003806-51 = "— Entendo, [wa:1300] a 500 metros daqui..."
1003806-54 = "— Sim. [wa:1200] Preparar para a invasão [wa:1450] imediatamente, foi o que disseram."
1003806-56 = "— Sensei, [wa:700] por favor, coloque o anel de rapel e o [wa:600] arnês."
1003806-59 = "[wa:300]— Hã? [wa:1100] Você não sabe [wa:1600] como usar...?"
1003806-61 = "— O- [wa:900] entendo..."
1003806-64 = "[wa:400]— ...Tudo bem. [wa:1700] Então, [wa:1000] espere aqui."
1003806-66 = "— Vou terminar logo e [wa:650] voltar."
1003806-69 = "— Assim, poderei ver esta vista noturna [wa:500] com o Sensei,"
1003806-71 = "— com calma, [wa:600] mais uma vez."
1003806-74 = "(Miyako usou o anel de rapel com destreza e desceu para a parte inferior.)"
1003806-78 = "(Depois de um tempo, voltei para o Schale junto com a Miyako, que terminou a missão em segurança.)"
