[translation]
10009005-3 = "ぐはぁっ！"
10009005-4 = "のああぁぁっ！？"
10009005-10 = "どうやらまだ、緊急事態にはなっていないようですね。"
10009005-11 = "この死体……"
10009005-12 = "ではなく、負傷者たちはこのまま、病院に搬送するとしましょう。"
10009005-13 = "た、助けていただきありがとうございます！"
10009005-14 = "いえ、私はあくまで救急医学部としての仕事をしただけでですので。感謝されるようなことでは……"
10009005-15 = "[s] \"……セナ？\""
10009005-16 = "……ああ、"
10009005-17 = "こんにちは[USERNAME]先生。"
10009005-18 = "こんなところでお会いするなんて奇遇ですね。"
10009005-19 = "先生は……シャーレとしてのパトロール、ですか？"
10009005-20 = "……私の方？"
10009005-21 = "私は先ほど、この周辺で死体……"
10009005-22 = "いえ、負傷者が出かねないようないざこざがあったと通報を受けて、ちょうど収めてきたところです。"
10009005-23 = "元々救急医学部の活動の一環として、この周辺でのパトロールをしていまして。"
10009005-24 = "[s] \"救急医学部がパトロールもするんだね？\""
10009005-25 = "はい、何せバレンタインデーは大切な日。それぞれが胸に秘めた大事な思いを形にする特別な日ですから。"
10009005-26 = "きちんと守らねばなりません。時には勢い余って、私に出番が来ることもあるでしょう。"
10009005-27 = "[s] \"なるほど。バレンタインについてはセナもそう思うんだね。\""
10009005-28 = "はい。素晴らしいものであると同時に、今日のような日には警戒が必要です。"
10009005-29 = "先ほどの件もそうですが、チョコレートを巡って襲撃が起こることも少なくありませんし。"
10009005-30 = "その他にも、チョコレートの売り上げをめぐって業者同士の争いが起きたり、想いが溢れて巨大な勢力同士が抗争を繰り広げたりすることもあり得ます。"
10009005-31 = "いつどこで、どんな事件が起きて大量の死た……ではなく、負傷者が発生するか分かりません。"
10009005-32 = "何せバレンタインデーですからね。一時も気を緩めることはできません。"
10009005-36 = "救急医学部の部長として稼ぎ時……"
10009005-37 = "いえ、事態が重くなる前に防がねばと。"
10009005-38 = "[s] \"そんなことになるんだ……。\""
10009005-39 = "油断は禁物です、"
10009005-40 = "本当にいつ何が起きるか――"
10009005-44 = "[ns] \"……？\""
10009005-46 = "な、何が起きたんですか！？"
10009005-47 = "建物が、急に崩れて……！"
10009005-48 = "あっ、ニュース速報！"
10009005-50 = "速報です、D.U.の第3商店街周辺の皆様にお知らせいたします！"
10009005-51 = "「災厄の狐」が出現しました！第3商店街付近にいらっしゃる方は、直ちに避難を！"
10009005-52 = "[s] \"……「災厄の狐」？\""
10009005-59 = "……。"
10009005-61 = "例の指名手配犯、「災厄の狐」を確認！"
10009005-62 = "逃してたまるか……大人しく投降しろ、[ruby=こさか]狐坂[/ruby]ワカモ！"
10009005-68 = "あらあら、五月蠅い羽虫ですねぇ……。"
10009005-69 = "……私の前を、塞がないでもらえます？"
10009005-79 = "ぐあぁっ！？"
10009005-80 = "ぐふっ……！"
10009005-86 = "ふふふっ……♡これしきの武力で私を止めようだなんて、甘く見られたものです。"
10009005-87 = "さぁ、待っていてくださいね……。"
10009005-95 = "……！"
10009005-100 = "……危険要素を確認、大量の負傷者が発生する恐れ有り。救急医学部の部長として、即座に対応します。"
10009005-101 = "これ以上、患者を増やさせはしません。"
10009005-102 = "……ヴァルキューレの生徒ではないようですね？"
10009005-103 = "ああ、困りましたね……どうしてこんなにも邪魔者が多いのでしょうか……。私はただ――"
10009005-104 = "[s] \"ちょっと待った……！\""
10009005-109 = "隙ありぃ！"
10009005-111 = "……！"
10009005-112 = "キリノ、今！"
10009005-114 = "はっ、ははははい！"
10009005-118 = "さ、災厄の狐さん！覚悟！"
10009005-125 = "先生、"
10009005-126 = "今がチャンス！一気に――"
10009005-128 = "（バタン）"
10009005-129 = "[s] \"……あれ？\""
10009005-134 = "……え。た、"
10009005-138 = "倒しちゃいました？"
10009005-139 = "……マジで？"
10009005-144 = "制圧完了、"
10009005-145 = "皆さんお疲れ様でした。"
10009005-146 = "え、えっ……？"
10009005-148 = "やるじゃんキリノ、あの「災厄の狐」だよ！？まじで行けるとは思ってなかった！"
10009005-149 = "そ、そうですね……？"
10009005-150 = "私もまさか当たるとは……え、本当に当たったんですか？どうして？"
10009005-151 = "自分で撃ったのに「どうして」って……。"
10009005-152 = "まあ何はともあれ、"
10009005-153 = "あの「七囚人」のひとりだよ？"
10009005-154 = "これは自慢できるねぇ。"
10009005-155 = "た、確かに……？"
10009005-156 = "[s1] \"えっと、ワカモが「災厄の狐」って呼ばれてるの……？\"\n[s2] \"あと、「七囚人」って……？\""
10009005-157 = "ああ、先生はワカモと会ったことあるんだったね？"
10009005-158 = "ああ、先生はワカモと会ったことあるんだったね？"
10009005-159 = "あっ、そういえば私も以前ヴァルキューレの資料で見ました！"
10009005-160 = "かつてワカモが矯正局を脱獄した時、その混乱を収拾した立役者が正に[USERNAME]先生だったと！"
10009005-161 = "[s3] \"そんなこともあったね……。\"\n[s4] \"あったなぁ……何だか記憶が一回だけじゃない気がするけど……。\""
10009005-162 = "まあとにかく、"
10009005-163 = "まあとにかく、"
10009005-164 = "「災厄の狐」っていうのはその「狐坂ワカモ」の通称だよ。あだ名って言っても良いけど。"
10009005-165 = "あいつが現れるたびに、その場は爆炎で焦土と化してしまう……確か、そんな感じの由来から付いた名前。"
10009005-166 = "そして、「七囚人」というのは……"
10009005-167 = "先生もご存知のように、かつて連邦生徒会長が失踪した直後、連邦生徒会の機能が一時的に麻痺していました。そのタイミングでワカモと一緒に矯正局を脱獄した生徒たちのことを、そう呼んでいるのです。"
10009005-168 = "[s] \"つまり、七人も……。\""
10009005-169 = "そうそう。"
10009005-170 = "だからこのキヴォトスには、あのワカモと同じレベルの犯罪者がまだまだ潜んでるってわけ。"
10009005-171 = "それで「七囚人」って呼んでるの。いやー参った参った、怖い話だね！"
10009005-175 = "[ns] \"そう、だね……？\""
10009005-176 = "え、何そのリアクション？"
10009005-177 = "それは先生も急にこんな話を聞かされて、戸惑っているんでしょう。"
10009005-178 = "まあとにかく、その七囚人の中でもひときわ暴れてたのが、さっき暴れてたあの「災厄の狐」のワカモ。"
10009005-179 = "脱獄して以来ずっと姿を隠してて、何をしてるのかと思ってたけど……"
10009005-180 = "まさかこんなところで捕まえられるなんてね。"
10009005-181 = "これ、上手く行ったら賞与とか貰えるんじゃん？"
10009005-182 = "フブキはそのことばかりですね……。"
10009005-183 = "えー、良いじゃん賞与。"
10009005-184 = "もう言葉からして良い響き。まあそんな話はさておき、先生もそこのゲヘナの人も、手伝ってくれてありがと！"
10009005-185 = "本当に賞与が出たら、今度美味しいもの奢るから！"
10009005-186 = "いえ、救急医学部の部長として、やるべきことをやっただけですので。"
10009005-187 = "まあまあ、そんな固いこと言わないでさ～。"
10009005-188 = "[s] \"……なんだかワカモ、様子が変じゃなかった？\""
10009005-189 = "そうでしたか……？"
10009005-190 = "……確かに私たちと会った瞬間、かなり慌てていた様子でした。"
10009005-191 = "そもそもの目的が何だったのかも分かりませんが……何か予想外のトラブルでもあったのでしょうか？"
10009005-192 = "[s] \"うーん……。\""
10009005-193 = "まあ、今さら考えたってしょうがないでしょ。"
10009005-194 = "あんな問題児の理屈なんか、常識に当てはめたところで分かんないよ多分。"
10009005-195 = "それにもう逮捕したんだし。めでたしめでたし、でしょ？"
10009005-196 = "[s] \"……。\""
10009005-202 = "D.U.にいる全ヴァルキューレ生徒に伝える、現時刻をもって逃走中だった指名手配犯「災厄の狐」を逮捕することに成功した！"
10009005-203 = "これより矯正局へと移送するため、ヴァルキューレ警察学校の生徒たちは総員東地区の……"
10009005-204 = "フブキ、呼び出しです！行きましょう！"
10009005-205 = "え～、私たちが捕まえたのにまだ働くの……？しかも矯正局まで行くとか、めんどくさ……。"
10009005-206 = "そんなことを言ってる場合ではありませんよ！せっかくなんですから、最後まできちんとやりましょう！"
10009005-207 = "まぁ、命令無視して始末書も嫌だし……功績と帳消しって言うのも困るし……しょうがない。"
10009005-211 = "行くかー……じゃ、先生。"
10009005-212 = "悪いけどパトロール業務はよろしく。"
10009005-213 = "行ってまいります！"
10009005-218 = "では騒動も落ち着いたようですし、私たちでパトロールを続けましょうか。"
10009005-219 = "[s5] \"うん……あ、一緒にしてくれるの？\"\n[s6] \"災厄の狐、ワカモ……うーん……。\""
10009005-223 = "（色々と違和感を感じながらも、セナと一緒にあらためてバレンタインデーのパトロールを始めることにした）"
