[translation]
10009005-3 = "Guhaa!"
10009005-4 = "Noaaaaa!?"
10009005-10 = "Parece que ainda não chegamos a uma situação de emergência."
10009005-11 = "Este cadáver..."
10009005-12 = "Quer dizer, vamos levar os feridos para o hospital agora mesmo."
10009005-13 = "O-obrigada por nos salvar!"
10009005-14 = "Não há de quê, eu apenas fiz o meu trabalho como parte do Departamento de Medicina de Emergência. Não é algo que mereça agradecimentos..."
10009005-15 = "[s] \"...Sena?\""
10009005-16 = "...Ah,"
10009005-17 = "Olá, Sensei [USERNAME]."
10009005-18 = "Que coincidência encontrar você em um lugar como este."
10009005-19 = "Sensei... está em patrulha pelo Schale?"
10009005-20 = "...Quanto a mim?"
10009005-21 = "Eu recebi um relato de que houve uma confusão aqui perto onde um cadáver..."
10009005-22 = "Digo, onde feridos poderiam surgir, e acabei de resolver a situação."
10009005-23 = "Como parte das atividades do Departamento de Medicina de Emergência, eu estava fazendo uma patrulha por aqui."
10009005-24 = "[s] \"O Departamento de Medicina de Emergência também faz patrulhas?\""
10009005-25 = "Sim, afinal, o Dia dos Namorados é um dia importante. É um dia especial onde cada um transforma em realidade os sentimentos preciosos que guarda no coração."
10009005-26 = "Precisamos proteger isso adequadamente. Às vezes, as coisas saem do controle e eu preciso entrar em ação."
10009005-27 = "[s] \"Entendo. Então a Sena também pensa assim sobre o Dia dos Namorados.\""
10009005-28 = "Sim. É algo maravilhoso, mas em dias como hoje, é preciso estar em alerta."
10009005-29 = "Como no caso de agora há pouco, não é raro que ataques ocorram por causa de chocolates."
10009005-30 = "Além disso, podem ocorrer disputas entre comerciantes pelas vendas de chocolate, ou até mesmo conflitos entre grandes facções devido ao excesso de sentimentos."
10009005-31 = "Não sabemos quando ou onde um incidente pode ocorrer e gerar uma grande quantidade de cadáveres... digo, de feridos."
10009005-32 = "Afinal, é o Dia dos Namorados. Não podemos baixar a guarda nem por um segundo."
10009005-36 = "Como chefe do Departamento de Medicina de Emergência, é a hora de lucrar..."
10009005-37 = "Digo, precisamos prevenir antes que a situação piore."
10009005-38 = "[s] \"As coisas chegam a esse ponto...\""
10009005-39 = "Não se pode baixar a guarda,"
10009005-40 = "Realmente, nunca se sabe o que pode acontecer..."
10009005-44 = "[ns] \"...?\""
10009005-46 = "O-o que aconteceu!?"
10009005-47 = "O prédio, de repente, desabou...!"
10009005-48 = "Ah, plantão de notícias!"
10009005-50 = "Plantão urgente, atenção a todos na área do 3º Distrito Comercial de D.U.!"
10009005-51 = "A \"Raposa da Calamidade\" apareceu! Quem estiver perto do 3º Distrito Comercial, evacue imediatamente!"
10009005-52 = "[s] \"...\"Raposa da Calamidade\"?\""
10009005-59 = "..."
10009005-61 = "Identificamos a criminosa procurada, a \"Raposa da Calamidade\"!"
10009005-62 = "Não vou deixar você escapar... Renda-se pacificamente, Wakamo Kosaka!"
10009005-68 = "Ora, ora, que insetos barulhentos..."
10009005-69 = "...Poderiam parar de bloquear o meu caminho?"
10009005-79 = "Guaa!?"
10009005-80 = "Gufu...!"
10009005-86 = "Fufufu...♡ Tentar me parar com esse nível de força... vocês me subestimaram."
10009005-87 = "Agora, por favor, espere por mim..."
10009005-95 = "...!"
10009005-100 = "...Fator de risco confirmado, há risco de um grande número de feridos. Como chefe do Departamento de Medicina de Emergência, agirei imediatamente."
10009005-101 = "Não deixarei que o número de pacientes aumente mais do que isso."
10009005-102 = "...Parece que ela não é uma aluna da Valkyrie, não é?"
10009005-103 = "Ah, que incômodo... Por que existem tantos estorvos por aqui...? Eu só queria..."
10009005-104 = "[s] \"Espere um pouco...!\""
10009005-109 = "Abertura encontrada!"
10009005-111 = "……!"
10009005-112 = "Kirino, agora!"
10009005-114 = "H-h-h-hai!"
10009005-118 = "S-sua Raposa da Calamidade! Prepare-se!"
10009005-125 = "Sensei,"
10009005-126 = "Agora é a chance! De uma vez só—"
10009005-128 = "(Baque)"
10009005-129 = "[s] \"...Ué?\""
10009005-134 = "...Eh. V-você,"
10009005-138 = "Conseguiu derrotá-la?"
10009005-139 = "...Sério mesmo?"
10009005-144 = "Neutralização concluída."
10009005-145 = "Bom trabalho a todos."
10009005-146 = "E-eh...?"
10009005-148 = "Mandou bem, Kirino! É a própria \"Raposa da Calamidade\"! Eu nem achei que a gente ia conseguir!"
10009005-149 = "E-eu acho que sim...?"
10009005-150 = "Eu também não esperava acertar... Eh, eu realmente acertei? Como?"
10009005-151 = "Você pergunta \"como\" depois de ter atirado..."
10009005-152 = "Bem, de qualquer forma,"
10009005-153 = "Ela é uma das \"Sete Prisioneiras\", sabia?"
10009005-154 = "Isso é algo para se gabar, hein."
10009005-155 = "V-verdade...?"
10009005-156 = "[s1] \"Espera, a Wakamo é chamada de \"Raposa da Calamidade\"...?\"\n[s2] \"E o que são as \"Sete Prisioneiras\"...?\""
10009005-157 = "Ah, é verdade, o Sensei já encontrou a Wakamo antes, né?"
10009005-158 = "Ah, é verdade, o Sensei já encontrou a Wakamo antes, né?"
10009005-159 = "Ah, falando nisso, eu vi isso nos arquivos da Valkyrie antes!"
10009005-160 = "Dizem que quando a Wakamo escapou da Penitenciária, a pessoa que resolveu a confusão foi justamente o Sensei [USERNAME]!"
10009005-161 = "[s3] \"Aconteceu algo assim mesmo...\"\n[s4] \"Aconteceu... embora eu sinta que não foi só uma vez...\""
10009005-162 = "Bem, de qualquer forma,"
10009005-163 = "Bem, de qualquer forma,"
10009005-164 = "\"Raposa da Calamidade\" é o apelido da Kozeki Wakamo. Pode chamar de alcunha também."
10009005-165 = "Sempre que ela aparece, o local vira terra arrasada por causa das explosões... Se não me engano, o nome veio disso."
10009005-166 = "E sobre as \"Sete Prisioneiras\"..."
10009005-167 = "Como o Sensei deve saber, logo após o desaparecimento da Presidente do Conselho Estudantil Federal, o conselho ficou temporariamente paralisado. As alunas que aproveitaram esse momento para escapar da Penitenciária junto com a Wakamo são chamadas assim."
10009005-168 = "[s] \"Ou seja, são sete pessoas...\""
10009005-169 = "Isso mesmo."
10009005-170 = "Então, ainda existem criminosas do mesmo nível da Wakamo escondidas por Kivotos."
10009005-171 = "Por isso chamamos de \"Sete Prisioneiras\". Nossa, que medo, não é?"
10009005-175 = "[ns] \"É, pois é...\""
10009005-176 = "Eh, que reação é essa?"
10009005-177 = "É que o Sensei deve estar confuso por ter ouvido tudo isso de repente."
10009005-178 = "Bem, de qualquer forma, entre as Sete Prisioneiras, a que mais causava problemas era a Wakamo, a \"Raposa da Calamidade\" que estava agindo agora pouco."
10009005-179 = "Desde que fugiu, ela ficou escondida, e eu me perguntava o que ela estava fazendo..."
10009005-180 = "Quem diria que a capturaríamos em um lugar como este."
10009005-181 = "Se tudo der certo, será que ganhamos um bônus?"
10009005-182 = "Fubuki, você só pensa nisso..."
10009005-183 = "Ah, qual é, bônus é bom."
10009005-184 = "Só de ouvir a palavra já soa bem. Mas deixando isso de lado, obrigado por ajudar, Sensei, e você também, pessoal da Gehenna!"
10009005-185 = "Se eu realmente receber um bônus, da próxima vez eu pago algo gostoso para vocês!"
10009005-186 = "Não precisa, como chefe do Departamento de Medicina de Emergência, eu apenas fiz o que deveria ser feito."
10009005-187 = "Ah, qual é, não precisa ser tão formal assim~."
10009005-188 = "[s] \"...A Wakamo não estava agindo de um jeito estranho?\""
10009005-189 = "Foi mesmo...?"
10009005-190 = "...De fato, no momento em que ela nos viu, parecia estar bastante agitada."
10009005-191 = "Não faço ideia de qual era o objetivo dela, mas... será que houve algum problema inesperado?"
10009005-192 = "[s] \"Hmm...\""
10009005-193 = "Bem, não adianta ficar pensando nisso agora."
10009005-194 = "A lógica de uma encrenqueira daquelas provavelmente não faz sentido nenhum se tentarmos aplicar o bom senso."
10009005-195 = "Além disso, já a prendemos. Final feliz, não é?"
10009005-196 = "[s] \"...\""
10009005-202 = "Atenção a todos os alunos da Valkyrie em D.U., informo que, neste momento, conseguimos prender a fugitiva procurada, a \"Raposa da Calamidade\"!"
10009005-203 = "Para realizar a transferência para o Departamento Correcional, todos os alunos da Academia de Polícia Valkyrie devem se dirigir ao distrito leste..."
10009005-204 = "Fubuki, nos chamaram! Vamos!"
10009005-205 = "Ah, não... nós que prendemos ela, ainda temos que trabalhar...? E ter que ir até o Departamento Correcional é tão trabalhoso..."
10009005-206 = "Não é hora de dizer essas coisas! Já que chegamos até aqui, vamos terminar o serviço corretamente!"
10009005-207 = "Bem, não quero ignorar ordens e ter que escrever um relatório de desculpas... e não quero que isso anule o meu mérito... não tem jeito."
10009005-211 = "Vamos lá então... Bem, Sensei."
10009005-212 = "Desculpe, mas cuide do patrulhamento por nós."
10009005-213 = "Já estamos indo!"
10009005-218 = "Bem, parece que a confusão se acalmou, então vamos continuar com o patrulhamento?"
10009005-219 = "[s5] \"Sim... ah, você vai comigo?\"\n[s6] \"A Raposa da Calamidade, Wakamo... hmm...\""
10009005-223 = "(Embora sentindo que algo estava estranho, decidi recomeçar o patrulhamento do Dia dos Namorados junto com a Sena)"
