[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1003906-1 = "RABBIT 4, Relaxando" 
1003906-2 = "Parque dos Coelhinhos - Calçadão Próximo" 
1003906-3 = "（A Miyu estava agachada no chão, escolhendo alguma coisa.）" 
1003906-4 = "Esta aqui não..." 
1003906-5 = "E essa daqui..." 
1003906-6 = "[s] \"O que você está fazendo, Miyu?\"" 
1003906-10 = "S-S-S-Sensei!?" 
1003906-11 = "Q-Quando foi que você... !?" 
1003906-12 = "Eu... tenho certeza que não ouvi os seus passos..." 
1003906-13 = "S-Será que, de tanto andar comigo, a sua presença também acabou se apagando, Sensei...?" 
1003906-14 = "[s] \"Desculpe te assustar. Você estava tão concentrada que tentei não fazer barulho.\"" 
1003906-15 = "E-Entendi..." 
1003906-16 = "Eu fiquei preocupada pensando no que faria se isso tivesse acontecido por minha causa." 
1003906-17 = "E se a presença do Sensei também ficasse tão apagada que as outras pessoas não conseguissem mais te notar..." 
1003906-18 = "Até as portas automáticas parariam de abrir e não conseguiríamos mais entrar na Schale..." 
1003906-19 = "[s] \"Bem, pensando por esse lado...?\"" 
1003906-23 = "[ns] \"Mas então, o que estava fazendo?\"" 
1003906-24 = "A-Ah, é que..." 
1003906-25 = "Eu estava... procurando pedrinhas." 
1003906-26 = "É-É porque... esse é o meu hobby..." 
1003906-27 = "[s] \"Entendi. E você achou alguma pedra com um formato legal?\"" 
1003906-28 = "A-Ah, não. Não é que eu esteja procurando pedras com formatos especiais..." 
1003906-29 = "Geralmente eu busco por pedrinhas bem apagadas, daquelas que não chamam a atenção de ninguém..." 
1003906-30 = "Pedrinhas que as pessoas pisam sem nem perceber... são essas que eu procuro." 
1003906-31 = "Ao vê-las nesse estado, sinto que..." 
1003906-32 = "É como se elas não fossem muito diferentes de mim, sabe?" 
1003906-33 = "É por isso que eu procuro... por elas." 
1003906-34 = "[s] \"......Entendo. Acho que consigo entender o sentimento.\"" 
1003906-35 = "S-Sério...?" 
1003906-36 = "Isso me deixa, bem... bastante feliz." 
1003906-37 = "Se não se importar, o que acha de me ajudar também, Sensei?" 
1003906-38 = "Por essa região costuma ter bastantes pedrinhas não pontiagudas..." 
1003906-39 = "[s] \"Mas é claro!\"" 
1003906-42 = "（De repente uma pedra perto dos meus pés chamou a minha atenção, então decidi mostrá-la à Miyu.）" 
1003906-43 = "Isso é..." 
1003906-44 = "......Sensei, isso é um pedaço quebrado de tijolo." 
1003906-45 = "Ele... já cumpriu sua função na vida, eu diria..." 
1003906-46 = "[s] \"A-Ah, entendi... e esse aqui?\"" 
1003906-47 = "Essa pedra... tem a superfície bem bonita e lisa." 
1003906-48 = "Com certeza chamaria a atenção de alguém que nem tem interesse por pedras..." 
1003906-49 = "[s] \"E este aqui...?\"" 
1003906-50 = "Isso aí é um tipo de rocha vulcânica que você quase nunca acha... Bem rara, até..." 
1003906-51 = "Sensei, por que você só pega pedras especiais desde agorinha...?" 
1003906-52 = "Até entendo que as pedras mais singulares acabam chamando a atenção, mas, por favor, foque nas comuns..." 
1003906-53 = "P-Por favor, tente procurar com mais seriedade...!" 
1003906-54 = "[s] \"D-Darei o meu melhor...\"" 
1003906-56 = "（Depois disso, eu e a Miyu procuramos pedrinhas com muito afinco juntos até o anoitecer.）" 