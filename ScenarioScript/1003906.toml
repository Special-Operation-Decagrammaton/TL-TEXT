[translation]
1003906-1 = "RABBIT4、息抜きします"
1003906-2 = "子ウサギ公園・付近の遊歩道"
1003906-3 = "（ミユが地面にうずくまったまま何かを選んでいる）"
1003906-4 = "これは、違う……"
1003906-5 = "これも……"
1003906-6 = "[s] \"ミユ、何してるの？\""
1003906-10 = "せ、せせ、先生！？"
1003906-11 = "いっ、いつの間に……！？"
1003906-12 = "足音、聞こえなかった気が……"
1003906-13 = "ま、まさか私に付き合ってくださっている内に、先生の影も薄く……？"
1003906-14 = "[s] \"驚かせてごめん。夢中になってたから、静かにしようと思って。\""
1003906-15 = "そ、そうでしたか……。"
1003906-16 = "もし私のせいで本当にそうなっていたら、どうしようかと……。"
1003906-17 = "もし先生まで、他の人に見つからないほど影が薄くなってしまったら……。"
1003906-18 = "自動ドアが開かなくなって、どちらもシャーレに入れなく……"
1003906-19 = "[s] \"まあ、確かに……？\""
1003906-23 = "[ns] \"ところで、何してたの？\""
1003906-24 = "え、えっと……"
1003906-25 = "小石を、拾ってました……。"
1003906-26 = "その……これが、趣味でして……。"
1003906-27 = "[s] \"そうなんだ、珍しい形の石とかあった？\""
1003906-28 = "あ、いえ。その、特別な形の石を探していたりするわけでは、なくて……。"
1003906-29 = "あまり目に留まらないような、誰にも気に留められないような石と言いますか……"
1003906-30 = "足元で蹴られたことに、気づかないような……そういう石を……。"
1003906-31 = "そういう姿を見つけると、何だか……"
1003906-32 = "他人事に思えないと、言いますか。"
1003906-33 = "それを、見つけたくって……。"
1003906-34 = "[s] \"……そっか。何となくその気持ちは分かるかも。\""
1003906-35 = "そ、そうなんですか……？"
1003906-36 = "それは、何だか……嬉しい、です。"
1003906-37 = "よろしければ、その……先生も、どうですか？"
1003906-38 = "この辺りは、角ばってないタイプの石がそれなりにあって……"
1003906-39 = "[s] \"うん、喜んで。\""
1003906-42 = "（ふと足元の石が目に入ったので、ミユに見せてみた）"
1003906-43 = "これは……"
1003906-44 = "……先生、これはレンガの破片です。"
1003906-45 = "これはすでに、役割を終えた後と言いますか……。"
1003906-46 = "[s] \"な、なるほど……じゃあこれは？\""
1003906-47 = "これは……表面がキレイですね。"
1003906-48 = "きっと石に興味がない人でも、目に留まるでしょう……"
1003906-49 = "[s] \"こっちは……？\""
1003906-50 = "これは、あまり見かけない種類の火山岩ですね……珍しい……。"
1003906-51 = "先生は、どうしてさっきから特別な石ばかり……？"
1003906-52 = "物珍しい石が目に付くのは分かりますが、そうではない石も……。"
1003906-53 = "も、もっと真剣に探してください……！"
1003906-54 = "[s] \"が、頑張ります……。\""
1003906-56 = "（その後、日が暮れるまでミユと一緒に、一生懸命小石を探した）"
