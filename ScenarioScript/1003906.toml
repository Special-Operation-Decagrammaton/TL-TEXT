[translation]
1003906-1 = "RABBIT4, hora de relaxar."
1003906-2 = "Parque dos Coelhinhos, calçada próxima."
1003906-3 = "（Miyu está agachada no chão, escolhendo algo）"
1003906-4 = "Não, esse não é..."
1003906-5 = "Esse também não..."
1003906-6 = "[s] \"Miyu, o que você está fazendo?\""
1003906-10 = "Se, se, se, Sensei!?"
1003906-11 = "De, desde quando você está aí...!?"
1003906-12 = "Eu não ouvi nenhum passo..."
1003906-13 = "Será que, enquanto você me acompanhava, a sua presença também ficou tão apagada quanto a minha...?"
1003906-14 = "[s] \"Desculpe te assustar. Como você estava concentrada, tentei ficar em silêncio.\""
1003906-15 = "Ah, entendo..."
1003906-16 = "Fiquei preocupada pensando se isso tinha acontecido por minha causa..."
1003906-17 = "Se até o Sensei ficasse tão apagado a ponto de ninguém mais te notar..."
1003906-18 = "As portas automáticas não abririam e nenhum de nós conseguiria entrar no Schale..."
1003906-19 = "[s] \"Bem, pensando bem... talvez?\""
1003906-23 = "[ns] \"Mas enfim, o que você estava fazendo?\""
1003906-24 = "Ah, bem..."
1003906-25 = "Eu estava pegando pedrinhas..."
1003906-26 = "É que... esse é o meu hobby..."
1003906-27 = "[s] \"Entendi. Encontrou alguma pedra com formato diferente?\""
1003906-28 = "Ah, não. Não é que eu esteja procurando pedras com formatos especiais..."
1003906-29 = "É mais como... pedras que não chamam a atenção, que ninguém nota..."
1003906-30 = "Aquelas que as pessoas chutam sem nem perceber... esse tipo de pedra..."
1003906-31 = "Quando encontro algo assim, de alguma forma..."
1003906-32 = "Sinto que não consigo ignorar, sabe?"
1003906-33 = "Eu queria encontrar uma dessas..."
1003906-34 = "[s] \"...Entendi. Acho que consigo entender esse sentimento.\""
1003906-35 = "Sé, sério...?"
1003906-36 = "Isso é... fico feliz."
1003906-37 = "Se não se importar, bem... Sensei, gostaria de tentar também?"
1003906-38 = "Por aqui tem várias pedras que não são pontiagudas..."
1003906-39 = "[s] \"Claro, adoraria.\""
1003906-42 = "（Vi uma pedra no chão e decidi mostrá-la para a Miyu）"
1003906-43 = "Isso é..."
1003906-44 = "...Sensei, isso é um pedaço de tijolo."
1003906-45 = "É como se ele já tivesse cumprido o seu papel..."
1003906-46 = "[s] \"Ah, entendo... E essa aqui?\""
1003906-47 = "Essa... a superfície é bem bonita."
1003906-48 = "Com certeza, até quem não se interessa por pedras notaria essa..."
1003906-49 = "[s] \"E esta aqui...?\""
1003906-50 = "Esse é um tipo de rocha vulcânica que não se vê muito... Que raro..."
1003906-51 = "Sensei, por que você só está pegando pedras especiais desde agora...?"
1003906-52 = "Eu entendo que pedras raras chamam a atenção, mas as outras também..."
1003906-53 = "Po, por favor, procure com mais seriedade...!"
1003906-54 = "[s] \"Eu, eu vou me esforçar...\""
1003906-56 = "（Depois disso, passei o resto do dia procurando pedrinhas com a Miyu até o anoitecer）"
