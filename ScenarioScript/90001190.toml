[translation]
90001190-1 = "第19話;鋼鉄大陸"
90001190-4 = "おやおや。どこで何をしているのかと思ったら、そこにいたんですか。"
90001190-5 = "[s] \"……！\""
90001190-9 = "アリス、こっちへ……。"
90001190-10 = "どうしたのですか、ケイ？"
90001190-11 = "なんだか姿を見せないほうが良い気がしまして。"
90001190-16 = "こ、こん、にちは！そして気をつけて、ください！#nわ、私たちはこれから―― "
90001190-17 = "と、とっても怖いことを、します！"
90001190-18 = "はぁ……私はこの通信の必要性を疑っていますが……まぁいいでしょう。"
90001190-19 = "そう、私たちは……。"
90001190-24 = "あんたたちに！宣戦布告をしにきたの！"
90001190-27 = "宣戦？"
90001190-28 = "布告？"
90001190-30 = "……ついにネツァクを完成させたのですね。"
90001190-35 = "ち、違いますよ！？#nネ、ネツァクちゃんはずっと前に完成していました！"
90001190-36 = "そう！私たちはネツァクが「鋼鉄大陸」になるまで、見つからないように守っていただけ！"
90001190-37 = "ああ、これがどれほど素晴らしい偉業なのか、理解できていないのでしょうが。"
90001190-38 = "はぁ……もはや落胆を通り越して同情してしまうくらいです。#nなんてもったいない。"
90001190-40 = "鋼鉄大陸……？"
90001190-41 = "へえ。[ruby=つかつき]調月[/ruby]リオでも、ここまでは把握できてなかったのかな？#nまあ、それも当然だけど。"
90001190-42 = "さすがアイン！誰も想像すらできなかったことを平然とやってのけるなんて！"
90001190-43 = "え、えへへっ。ありがとう、ソフ。これからも頑張ります……！"
90001190-44 = "鋼鉄大陸とは！"
90001190-45 = "ね、ネツァクちゃんの進化した姿そのもので……。"
90001190-46 = "「禁じられた力」を使って、触れた物質を変換し、領域を広げる金属の大陸……！"
90001190-47 = "[s] \"拡大する金属の大陸……？\""
90001190-48 = "ふふっ、理解力の足りないあなたたちのために、分かりやすく説明してあげましょう。"
90001190-49 = "鋼鉄大陸を構成しているのは、「名もなき神々の力」です。"
90001190-50 = "そ、その力は……触れた物質の構成を、根本的に変えてしまう……。"
90001190-51 = "ここで問題！では、その力で作られた構造体が、周囲の物質に接触したらどうなると思う？"
90001190-53 = "まさか……！"
90001190-54 = "触れたものを自分と同じ成分に……！？"
90001190-56 = "ご明察。鋼鉄大陸に触れたものは全て大陸の一部となっていく――"
90001190-57 = "そう、まさに無敵の大陸なんだから！"
90001190-58 = "お気をつけて。何の準備もせずに足を踏み入れてしまえば……。"
90001190-59 = "一瞬で……ネツァクの一部になってしまいますよ？"
90001190-60 = "我にお手伝いできることはありませんか？"
90001190-61 = "お、お姉様！？いえ、大丈夫です！お姉様は気にしなくても大丈夫です！私たちが全部やりますから！"
90001190-62 = "そうだ！あれがどこまで増大するのか、気になりませんか？#n一緒に観察しましょう！"
90001190-63 = "鋼鉄大陸……ネツァクちゃんの限界は、私たちにもよく分かってないので……！"
90001190-64 = "どこまで大きくなるんだろうね。楽しみだなぁ。"
90001190-65 = "私たちのネツァクは文字通り無限に周囲を喰らい尽くしていくんだから！"
90001190-66 = "ゆくゆくは――キヴォトス全土をも飲み込むことでしょう！"
90001190-67 = "ふふっ、すごいですよね？驚いて言葉も出ませんよねぇ！？"
90001190-68 = "[s] \"……質問しても良いかな。\""
90001190-69 = "ん？特別に答えてあげるよ。"
90001190-70 = "[s1] \"キヴォトスを鋼鉄大陸にする目的は？\"\n[s2] \"消えたデカグラマトンの復活でも企んでいるの？\""
90001190-73 = "あの方の名を軽々しく呼ぶな！#nそれはあんたが口にしてはいけない神聖な十文字の名前なんだよ！"
90001190-74 = "……本当にすごいですね、シャーレの先生。いろいろな意味で。"
90001190-75 = "そ、そのうちに、誰もあの方の事を話せなくなる世界が来るでしょう。"
90001190-76 = "そう！#n「信じない」を「信じたくない」に変えるんだから！"
90001190-77 = "その時になって後悔しても遅いんですけどね？#nキヴォトスは、私たちの計算通りであれば……。"
90001190-78 = "――あと三日で、鋼鉄大陸に変わるのだから。"
90001190-85 = "[ns] \"三日……？\""
90001190-87 = "普段であれば、ただの誇大妄想だと放って置くのですが……。"
90001190-88 = "デカグラマトンのエンジニアが言うのであれば、聞き流すわけにはいきません。"
90001190-89 = "でも、具体的にどうするの？#n鋼鉄大陸に近づいたら一部になっちゃうんだよね？"
90001190-90 = "それに、元に戻すのは不可能だとも言っていましたね。"
90001190-95 = "おそらく、あなた達は大丈夫です。#n鋼鉄大陸になるのは、無機物だけでしょうから。"
90001190-96 = "[s] \"ケイ！\""
90001190-97 = "どこに行っていたのですか？"
90001190-98 = "……あれに見つかったら色々と面倒なことになりそうだったので。"
90001190-99 = "話だけは隠れて聞いていましたが……。"
90001190-100 = "本当に、馬鹿げた話ですね。"
90001190-101 = "……どういう意味ですか？"
90001190-102 = "あれは名もなき神の力の劣化版に過ぎません。#n対処法はあります。"
90001190-103 = "いやぁ～、強敵が味方になると頼もしいね！"
90001190-104 = "その言い方だと、補正がかかりそうで嫌ですね……。"
90001190-105 = "そういうの、ケイちゃんも知ってるんだね……嬉しい。"
90001190-106 = "あ……いえ！違います！忘れてください！"
90001190-108 = "「名もなき神」の力の中で代表的なのは、物質の再構築です。"
90001190-109 = "そうね、プロトコルATRAHASISも同じだったわ。"
90001190-110 = "はい。「名もなき神」の力は、波動と粒子の関係を根本から変化させることができます。"
90001190-111 = "私はそれをデータの「収集」と「変形」だと解釈したけれど……。"
90001190-112 = "根本的な部分は同じです。#n粒子はエネルギーと同義であり、情報値が存在します。"
90001190-113 = "なので、あの鋼鉄大陸――7番目の預言者、ネツァクは無機物の情報値を変換しているだけで、大したことはしていません。"
90001190-114 = "プロトコルATRAHASISに比べれば、児戯のようなものです。#nただ……。"
90001190-115 = "[s] \"ただ……？\""
90001190-116 = "ここまで大規模な物質の再構築を起こしているという点は、無視できませんが。"
90001190-117 = "それに、対抗手段もないし。"
90001190-118 = "……そうですね。"
90001190-121 = "どうすれば良いのでしょうか？"
90001190-122 = "「鋼鉄大陸に変換されるのは無機物だけ」という仮説が正しくとも、問題は残ります。"
90001190-123 = "そうね。AMASとケイは、鋼鉄大陸に近づけないわ。"
90001190-124 = "「アビ・エシュフ」も使えないかと。"
90001190-127 = "こういう場合って、服や武器も使えなくなるんじゃないですか……？"
90001190-128 = "えっ！？#nじゃあ、私たち近づいたら裸になっちゃう？"
90001190-129 = "お、お姉ちゃん……！？"
90001190-131 = "裸になったら何か問題あるの？"
90001190-132 = "そう思っているのはあなたくらいですからね……？"
90001190-134 = "わ、わわわわわ、わたしは無理です……！"
90001190-141 = "私のパーフェクトメイドボディをお見せするチャンスですね。#n今から楽しみです。ちらっ。"
90001190-145 = "[ns] \"わ、私！？\""
90001190-146 = "……先生以外の方に見られるのは困りますね。#nこれは由々しき事態です。"
90001190-147 = "と、トキ……？"
90001190-148 = "この極寒の地で清楚系病弱美少女の身体を晒すなんて、たしかに問題ですが……。"
90001190-149 = "それ以前に根本的な問題を忘れてはいませんか？"
90001190-150 = "そもそも私たちは「多次元バリア」を突破しなければなりません。"
90001190-151 = "ありがとう、ヒマリ。その通りよ。"
90001190-153 = "ゲームなら、裏技や突破アイテムが用意されていますが……。"
90001190-154 = "（裏技……）"
90001190-155 = "！"
90001190-159 = "あの……バックドアみたいなものが、あったりしませんか？"
90001190-160 = "バックドアとは、通常ハッキングの際に――"
90001190-161 = "この場合だと、物理的なバックドアになるんですけど……。"
90001190-163 = "詳しく教えてもらえるかしら？"
90001190-166 = "そ、その、えっと、あの子たち、資源を大量に集めているって言ってたんですよね……？それなら……！"
90001190-167 = "……！"
90001190-168 = "なるほど……たしかに採掘された資源は、ネツァクと同じ座標に運ばれていたわ。"
90001190-169 = "鉄道と施設を作って資源を加工してたよね？"
90001190-170 = "それを守るために、眷属を配置していました。"
90001190-172 = "ネツァクが全ての無機物を鋼鉄大陸に変換できるのなら、資源を集める必要なんてない……。"
90001190-173 = "そうね。周囲を飲み込んで大きくなるのを待てば良いだけだわ。"
90001190-174 = "つまり、この表現が適切か分かりませんが……。"
90001190-175 = "ネツァクを進化させるために――資源が必要だったのでしょう。"
90001190-176 = "工場で加工された資源がネツァクに使われていると仮定すると……"
90001190-177 = "――どこかに物質変換の影響を受けないバックドアがあるはず。"
90001190-179 = "わぁ！さすがユズです！UZQueenは最強です！"
90001190-181 = "資源の搬入ルートを調べれば良いのですね。"
90001190-182 = "つまり、ネツァクがいる場所へのショートカットを探そうって話だよね？"
90001190-183 = "そうです、「賢いモモイ」。"
90001190-184 = "へへっ。私が本気を出したら、これくらいお茶の子さいさいだよ！"
90001190-185 = "……「賢い残念なモモイ」に訂正します。"
90001190-189 = "えっ、称号システムなの！？"
90001190-192 = "次の目標は決まりました。"
90001190-193 = "まずは資源の搬入ルートを探るために、凍原地帯の調査をしましょう。"
90001190-194 = "部長、今からでも支援要請したら？"
90001190-197 = "……一度は考えたけれど、今からでは時間が足りないわ。"
90001190-198 = "あの子たちの言葉を信じるのであれば、キヴォトスが鋼鉄大陸に変わるまであと三日。"
90001190-199 = "機密保持を考慮した人選となると……今から最速で行ったとしても……。"
90001190-200 = "私たちがここに来るだけでも、三日くらいかかってるもんね。"
90001190-201 = "ええ。時間が足りないのよ。"
90001190-203 = "今すぐにでも対応可能な特殊部隊が必要って話だよね。"
90001190-204 = "いつも通り、厳しい条件。"
90001190-206 = "リオ先輩、それならアリスたちは……。"
90001190-207 = "そうね、貴女の言葉で言うのなら……。"
90001190-208 = "私たちで――世界を守るわよ。"
90001190-209 = "もちろん、リオ先輩も一緒ですよね？"
90001190-215 = "（こういう時はどう答えれば……？）"
90001190-216 = "（……）"
90001190-221 = "……ええ、その通りよ。"
90001190-225 = "パンパカパーン！#nリオ先輩がアリスの正式な仲間になりました！"
90001190-226 = "（良かった、間違っていなかったようね）"
90001190-231 = "どう思う、部長？"
90001190-232 = "まあ、70点ってところですね。リオにしては上出来かと。"
90001190-237 = "[ns3] \"じゃあ、出発しよう！\"\n[ns4] \"おやつは忘れずに持った？\""
90001190-240 = "私たちは、ピクニックに行くわけじゃ……。"
90001190-241 = "あら、別に良いと思いますよ？#n過度に緊張しては、能力を発揮できませんから。"
90001190-242 = "これは冗談ではなく……極論、遠足気分だって構いません。"
90001190-243 = "ヒマリ部長の意見に賛成です。#nどうせ戦闘が始まれば、気を引き締めざるを得ませんから。"
90001190-244 = "そ、そういうものかしら……？"
90001190-245 = "ええ。ピクニック気分で世界を守る勇者がいても良いのです。"
90001190-247 = "そうだよ！世界を救った勇者だって、最初は部屋の掃除をしたり庭の雑草を抜くところから始まったんだから！"
90001190-248 = "……できれば部屋の掃除は真面目にやってほしいけど。"
90001190-249 = "な、なんでぇ！？#n私、今週はちゃんとゴミ捨ててきたよ！？"
90001190-250 = "お皿は流しに放置してたし、掃除機もかけてないし。"
90001190-251 = "うっ。"
90001190-253 = "大丈夫です、モモイ！#n掃除機はアリスがかけておきましたので！"
90001190-254 = "そうやって、いつも甘やかすんだから……。"
90001190-255 = "あ、アリスが悪いのですか……？"
90001190-257 = "アリス以外、全員悪いです。"
90001190-258 = "わ、わたしも……？"
90001190-259 = "……ユズは大目に見ます。"
90001190-260 = "あ、ありがとう、ケイちゃん……えへへ。"
90001190-261 = "ケイちゃんと呼ばれる回数が増えていませんか……？"
90001190-262 = "[s] \"ケイちゃんは、ケイちゃんだから！\""
90001190-263 = "先生は黙っててください！"
90001190-267 = "私の輸送船を使うと良いわ。#nそこまで大きくないかもしれないけど……。"
90001190-268 = "十分大きいと思うけど……？"
90001190-269 = "この大きさでは、運べる物資の量が少ないのよ。"
90001190-270 = "皆さん、迅速に出発しましょう。"
90001190-274 = "車椅子は私が運ぶよ。"
90001190-275 = "あら、では私は先生におんぶしてもらうとしましょうか。"
90001190-276 = "もちろん、清楚で可憐な私をお姫様抱っこしたいと言うのなら、#n私は一向に構いませんが。"
90001190-278 = "……先生？#n女性を待たせてはいけませんよ。"
90001190-280 = "……。"
90001190-281 = "トキ、ヒマリを運んであげて。"
90001190-282 = "……。"
90001190-283 = "はい、リオ様。"
90001190-289 = "あ、あなたたちにはお願いしていませんよ！？"
90001190-290 = "こういう時は、助け合っていくものです。"
90001190-291 = "私の経験上、トキがまともなことを言う時は何か裏が――"
90001190-299 = "ひぃっ、せ、先生……！"
90001190-300 = "[ns] \"……みんな、出発しようか。\""
90001190-302 = "う、うん……じゃあゲーム開発部も出動！"
90001190-303 = "はい！"
90001190-308 = "次回;兆候"
