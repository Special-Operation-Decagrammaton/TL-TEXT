[translation]
90001190-1 = "Episódio 19; Continente de Aço"
90001190-4 = "Ora, ora. Eu me perguntava onde e o que você estava fazendo, mas então você estava aí."
90001190-5 = "[s] \"……！\""
90001190-9 = "Alice, venha para cá……."
90001190-10 = "O que houve, Kei?"
90001190-11 = "Sinto que é melhor não nos mostrarmos."
90001190-16 = "O-olá! E, por favor, tomem cuidado!#nN-nós vamos agora――"
90001190-17 = "F-fazer algo muito assustador!"
90001190-18 = "Haa... Eu duvido da necessidade desta comunicação, mas... bem, tudo bem."
90001190-19 = "Isso mesmo, nós vamos……."
90001190-24 = "Viemos declarar guerra a vocês!"
90001190-27 = "Declarar?"
90001190-28 = "Guerra?"
90001190-30 = "……Finalmente terminaram o Netzach, não é?"
90001190-35 = "N-não é isso!?#nO Netzach já estava completo há muito tempo!"
90001190-36 = "Isso! Nós apenas o protegemos para que ninguém o encontrasse até que o Netzach se tornasse o \"Continente de Aço\"!"
90001190-37 = "Ah, imagino que vocês não consigam entender o quão grandioso é esse feito."
90001190-38 = "Haa... Já passei da decepção e agora sinto até pena.#nQue desperdício."
90001190-40 = "Continente de Aço……?"
90001190-41 = "Heeh. Será que nem mesmo Rio Tsukatsuki conseguiu prever isso?#nBem, isso é natural, suponho."
90001190-42 = "Como esperado da Ein! Fazer algo que ninguém sequer imaginou com tanta naturalidade!"
90001190-43 = "E-ehehe. Obrigada, Soph. Continuarei me esforçando……!"
90001190-44 = "O Continente de Aço é!"
90001190-45 = "A forma evoluída do Netzach……."
90001190-46 = "Um continente de metal que usa o \"Poder Proibido\" para converter a matéria que toca e expandir seu território……!"
90001190-47 = "[s] \"Um continente de metal em expansão……?\""
90001190-48 = "Fufu, para vocês que têm pouca capacidade de compreensão, vou explicar de forma simples."
90001190-49 = "O que compõe o Continente de Aço é o \"Poder dos Deuses Sem Nome\"."
90001190-50 = "E-esse poder…… muda fundamentalmente a composição da matéria que toca……."
90001190-51 = "Aqui vai uma pergunta! O que vocês acham que acontece quando uma estrutura feita com esse poder entra em contato com a matéria ao redor?"
90001190-53 = "Não pode ser……!"
90001190-54 = "Transforma o que toca na mesma substância que ele……!?"
90001190-56 = "Exatamente. Tudo o que toca o Continente de Aço se torna parte dele――"
90001190-57 = "Isso mesmo, é um continente literalmente invencível!"
90001190-58 = "Tomem cuidado. Se entrarem nele sem qualquer preparação……."
90001190-59 = "Em um instante…… vocês se tornarão parte do Netzach, sabe?"
90001190-60 = "Há algo em que eu possa ajudar?"
90001190-61 = "I-irmã!? Não, está tudo bem! Não precisa se preocupar, irmã! Nós cuidaremos de tudo!"
90001190-62 = "Isso mesmo! Não estão curiosos para saber até onde ele vai crescer?#nVamos observar juntos!"
90001190-63 = "O Continente de Aço…… nem nós sabemos qual é o limite do Netzach……!"
90001190-64 = "Até onde será que ele vai crescer? Estou ansiosa."
90001190-65 = "Nosso Netzach vai devorar tudo ao redor literalmente ao infinito!"
90001190-66 = "No fim―― ele engolirá todo o Kivotos!"
90001190-67 = "Fufu, é incrível, não é? Estão tão surpresos que nem conseguem falar, né!?"
90001190-68 = "[s] \"……Posso fazer uma pergunta?\""
90001190-69 = "Hm? Vou responder especialmente para você."
90001190-70 = "[s1] \"Qual é o objetivo de transformar Kivotos no Continente de Aço?\"\n[s2] \"Vocês estão planejando a ressurreição do Decagrammaton desaparecido?\""
90001190-73 = "Não ouse pronunciar o nome d'Ele levianamente!#nEsse é o nome sagrado dos dez caracteres que você não tem permissão para dizer!"
90001190-74 = "……Você é realmente impressionante, Sensei do Schale. Em vários sentidos."
90001190-75 = "E-em breve, chegará um mundo onde ninguém mais poderá falar sobre Ele."
90001190-76 = "Isso! #nPorque estamos mudando o \"não acreditar\" para \"não querer acreditar\"!"
90001190-77 = "Mas será tarde demais para se arrepender quando chegar a hora, não é? #nSe Kivotos estiver seguindo nossos cálculos..."
90001190-78 = "――Daqui a três dias, ela se transformará no Continente de Aço."
90001190-85 = "[ns] \"Três dias...?\""
90001190-87 = "Em circunstâncias normais, eu ignoraria isso como um simples delírio de grandeza, mas..."
90001190-88 = "Se é o engenheiro do Decagrammaton quem diz, não posso simplesmente ignorar."
90001190-89 = "Mas, o que vamos fazer exatamente? #nSe nos aproximarmos do Continente de Aço, não vamos virar parte dele?"
90001190-90 = "Além disso, você disse que é impossível reverter o processo, não é?"
90001190-95 = "Provavelmente, vocês ficarão bem. #nAfinal, apenas materiais inorgânicos se tornarão parte do Continente de Aço."
90001190-96 = "[s] \"Kei!\""
90001190-97 = "Onde você estava?"
90001190-98 = "...Porque seria problemático se eu fosse encontrada por aquilo."
90001190-99 = "Eu estava ouvindo a conversa escondida, mas..."
90001190-100 = "Realmente, é uma história absurda."
90001190-101 = "...O que você quer dizer com isso?"
90001190-102 = "Aquilo é apenas uma versão degradada do poder do Deus Sem Nome. #nExiste uma forma de lidar com isso."
90001190-103 = "Nossa, é reconfortante ter um inimigo poderoso como aliado!"
90001190-104 = "Dito dessa forma, parece que vou acabar sendo alvo de alguma correção, o que é desagradável..."
90001190-105 = "Então a Kei-chan também sabe sobre essas coisas... Fico feliz."
90001190-106 = "Ah... não! Está errado! Esqueça isso!"
90001190-108 = "O aspecto mais representativo do poder do \"Deus Sem Nome\" é a reconstrução da matéria."
90001190-109 = "É verdade, o protocolo ATRAHASIS era a mesma coisa."
90001190-110 = "Sim. O poder do \"Deus Sem Nome\" pode alterar a relação entre ondas e partículas desde a sua base."
90001190-111 = "Eu interpretei isso como \"coleta\" e \"transformação\" de dados, mas..."
90001190-112 = "A parte fundamental é a mesma. #nPartículas são sinônimas de energia e possuem valores de informação."
90001190-113 = "Portanto, aquele Continente de Aço — o 7º Profeta, Netzach — está apenas convertendo os valores de informação da matéria inorgânica, não está fazendo nada de especial."
90001190-114 = "Comparado ao protocolo ATRAHASIS, é como uma brincadeira de criança. #nNo entanto..."
90001190-115 = "[s] \"No entanto...?\""
90001190-116 = "O fato de estar causando uma reconstrução de matéria em uma escala tão grande não pode ser ignorado."
90001190-117 = "Além disso, não temos meios de contra-atacar."
90001190-118 = "...É verdade."
90001190-121 = "O que devemos fazer?"
90001190-122 = "Mesmo que a hipótese de que \"apenas materiais inorgânicos serão convertidos no Continente de Aço\" esteja correta, o problema persiste."
90001190-123 = "Exato. AMAS e Kei não podem se aproximar do Continente de Aço."
90001190-124 = "E não poderemos usar o \"Abi-Eshuh\" também."
90001190-127 = "Nesse caso, nossas roupas e armas também não vão parar de funcionar...?"
90001190-128 = "Hã!? #nEntão, se nos aproximarmos, vamos ficar peladas?"
90001190-129 = "I-irmã...!?"
90001190-131 = "Tem algum problema em ficar pelada?"
90001190-132 = "Você é a única que pensa assim, sabia...?"
90001190-134 = "E-e-e-eu não consigo...! Isso é impossível...!"
90001190-141 = "É uma chance de mostrar meu corpo de empregada perfeita. #nEstou ansiosa por isso. *Olhadinha*."
90001190-145 = "[ns] \"E-eu!?\""
90001190-146 = "...Seria um problema se outras pessoas além do Sensei vissem. #nIsso é uma situação grave."
90001190-147 = "T-Toki...?"
90001190-148 = "Expor o corpo de uma garota frágil e delicada neste lugar congelante é certamente um problema, mas..."
90001190-149 = "Vocês não estão esquecendo de um problema fundamental antes disso?"
90001190-150 = "Antes de tudo, precisamos romper a \"barreira multidimensional\"."
90001190-151 = "Obrigada, Himari. É exatamente isso."
90001190-153 = "Se fosse um jogo, teríamos truques ou itens de avanço preparados, mas..."
90001190-154 = "(Truque secreto...)"
90001190-155 = "!"
90001190-159 = "Aquele... não existe algo como uma porta dos fundos?"
90001190-160 = "Porta dos fundos, no contexto de hacking, geralmente é..."
90001190-161 = "Neste caso, seria uma porta dos fundos física, mas..."
90001190-163 = "Poderia me explicar melhor?"
90001190-166 = "E-então, bem, elas disseram que estavam coletando recursos em massa, não disseram...? Se for assim...!"
90001190-167 = "...!"
90001190-168 = "Entendo... De fato, os recursos minerados estavam sendo transportados para as mesmas coordenadas que Netzach."
90001190-169 = "Elas construíram ferrovias e instalações para processar os recursos, certo?"
90001190-170 = "E para proteger isso, elas posicionaram subordinados."
90001190-172 = "Se Netzach consegue converter toda matéria inorgânica no Continente de Aço, não haveria necessidade de coletar recursos..."
90001190-173 = "Exato. Bastaria apenas esperar que ele consumisse os arredores e crescesse."
90001190-174 = "Ou seja, não sei se esta é a expressão correta..."
90001190-175 = "Para evoluir Netzach... elas provavelmente precisavam de recursos."
90001190-176 = "Assumindo que os recursos processados na fábrica estão sendo usados em Netzach..."
90001190-177 = "--deve haver uma porta dos fundos em algum lugar que não seja afetada pela conversão de matéria."
90001190-179 = "Uau! Como esperado da Yuzu! A UZQueen é a melhor!"
90001190-181 = "Então basta investigar a rota de transporte de recursos."
90001190-182 = "Em outras palavras, estamos falando de encontrar um atalho para onde Netzach está, certo?"
90001190-183 = "Exatamente, 'Momoi inteligente'."
90001190-184 = "Hehe. Quando eu levo as coisas a sério, isso é moleza!"
90001190-185 = "...Vou corrigir para 'Momoi inteligente e decepcionante'."
90001190-189 = "Ei, isso é um sistema de títulos!?"
90001190-192 = "O próximo objetivo foi definido."
90001190-193 = "Primeiro, vamos investigar a zona de tundra para descobrir a rota de transporte de recursos."
90001190-194 = "Presidente, por que não pede reforços agora mesmo?"
90001190-197 = "...Eu cheguei a pensar nisso, mas não temos tempo suficiente agora."
90001190-198 = "Se acreditarmos no que elas disseram, faltam apenas três dias para Kivotos se transformar no Continente de Aço."
90001190-199 = "Considerando a necessidade de manter o sigilo na seleção de pessoal... mesmo que partíssemos agora na velocidade máxima..."
90001190-200 = "Só para chegarmos aqui, levamos uns três dias, né."
90001190-201 = "Sim. Não temos tempo."
90001190-203 = "Então estamos falando de precisar de uma unidade especial capaz de agir imediatamente."
90001190-204 = "Como sempre, condições rigorosas."
90001190-206 = "Rio-senpai, nesse caso, Alice e as outras..."
90001190-207 = "Entendo, usando as suas palavras..."
90001190-208 = "Nós vamos... proteger o mundo."
90001190-209 = "Claro, a Rio-senpai também vem, né?"
90001190-215 = "(Como eu deveria responder nessas horas...?)"
90001190-216 = "(...)"
90001190-221 = "...Sim, é isso mesmo."
90001190-225 = "Tan-tan-tan!#nRio-senpai tornou-se uma aliada oficial da Alice!"
90001190-226 = "(Que bom, parece que não estava errada.)"
90001190-231 = "O que acha, Presidente?"
90001190-232 = "Bem, eu daria uma nota 70. Para a Rio, foi um bom desempenho."
90001190-237 = "[ns3] \"Então, vamos partir!\"\n[ns4] \"Não esqueceu de levar o lanche?\""
90001190-240 = "Nós não estamos indo para um piquenique..."
90001190-241 = "Ora, acho que não tem problema.#nFicar tensa demais impede que você demonstre suas habilidades."
90001190-242 = "Isso não é uma piada... no limite, não me importo se estiverem com espírito de excursão."
90001190-243 = "Concordo com a opinião da Presidente Himari.#nDe qualquer forma, assim que a batalha começar, não teremos escolha a não ser nos concentrar."
90001190-244 = "É, será que é assim mesmo...?"
90001190-245 = "Sim. Não há problema em ter um herói que protege o mundo com um espírito de piquenique."
90001190-247 = "É isso aí! Até os heróis que salvaram o mundo começaram limpando o quarto ou arrancando ervas daninhas do jardim!"
90001190-248 = "...Se possível, eu gostaria que você limpasse o quarto de verdade."
90001190-249 = "P-por que isso agora!? #nEu levei o lixo para fora esta semana, sabia!?"
90001190-250 = "Você deixou os pratos na pia e nem passou o aspirador."
90001190-251 = "Ugh."
90001190-253 = "Está tudo bem, Momoi! #nA Alice já passou o aspirador!"
90001190-254 = "Você sempre a mima desse jeito..."
90001190-255 = "A-a Alice fez algo de errado...?"
90001190-257 = "Todos, exceto a Alice, estão errados."
90001190-258 = "E-eu também...?"
90001190-259 = "...Vou abrir uma exceção para a Yuzu."
90001190-260 = "O-obrigada, Kei-chan... hehe."
90001190-261 = "Não acha que o número de vezes que me chamam de Kei-chan está aumentando...?"
90001190-262 = "[s] \"A Kei-chan é a Kei-chan, oras!\""
90001190-263 = "Professor, fique quieto!"
90001190-267 = "Podem usar minha nave de transporte. #nTalvez não seja tão grande assim, mas..."
90001190-268 = "Acho que é grande o suficiente, não...?"
90001190-269 = "Com esse tamanho, a quantidade de suprimentos que podemos carregar é pequena."
90001190-270 = "Pessoal, vamos partir rapidamente."
90001190-274 = "Eu levo a cadeira de rodas."
90001190-275 = "Ora, então acho que vou pedir para o Professor me carregar nas costas."
90001190-276 = "Claro, se você quiser me carregar no estilo noiva, sendo eu uma pessoa tão pura e adorável, #neu não me importaria nem um pouco."
90001190-278 = "...Professor? #nNão se deve fazer uma dama esperar."
90001190-280 = "..."
90001190-281 = "Toki, leve a Himari."
90001190-282 = "..."
90001190-283 = "Sim, Rio-sama."
90001190-289 = "E-eu não pedi a ajuda de vocês duas!"
90001190-290 = "Nessas horas, devemos ajudar uns aos outros."
90001190-291 = "Pela minha experiência, quando a Toki diz algo sensato, tem alguma coisa por trás..."
90001190-299 = "Iiiih, p-professor...!"
90001190-300 = "[ns] \"...Pessoal, vamos partir.\""
90001190-302 = "S-sim... então o Departamento de Desenvolvimento de Jogos vai sair também!"
90001190-303 = "Sim!"
90001190-308 = "Próximo episódio: Sinais"
