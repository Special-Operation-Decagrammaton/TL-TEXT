[translation]
10028010-1 = "Episódio 1; 3h10, rumo a Gehenna"
10028010-50 = "――Por favor."
10028010-57 = "Com licença, Hasumi-senpai. Me chamou?"
10028010-58 = "Sim, Ichika. Estávamos esperando por você."
10028010-59 = "Peço desculpas por chamá-la tão cedo pela manhã.#nConseguiu dormir bem?"
10028010-60 = "Sim, dormi bastante, então estou bem! Hehe."
10028010-61 = "……Me chamar a essa hora significa que aconteceu alguma coisa, né?"
10028010-62 = "Não chega a ser um incidente, mas…… é, pode-se dizer que sim."
10028010-63 = "Conversei com a Tsurugi também, e concluímos que você é a pessoa ideal para isso, Ichika."
10028010-64 = "Hã? Conversou com a Tsurugi-senpai……?#nEu sou a \"pessoa ideal\"……?"
10028010-65 = "O que exatamente aconteceu……"
10028010-66 = "Ah, não quero te pressionar.#nNão é algo perigoso nem difícil."
10028010-67 = "……Eu gostaria que você levasse uma mala para o Tea Party ainda hoje."
10028010-68 = "Além disso, como a mala está em um local afastado do Distrito Autônomo de Trinity……"
10028010-69 = "Pensei em deixar com você, Ichika, que se dá bem com alunos de outros distritos."
10028010-70 = "Seria muito mais tranquilo do que se eu ou a Tsurugi fôssemos."
10028010-71 = "Ah, entendi, é isso então.#nBasicamente, é tipo uma tarefa, né?"
10028010-72 = "Sim…… é uma tarefa, mas a mala contém uma relíquia importante."
10028010-73 = "É algo valioso não apenas para o Tea Party, mas para toda Trinity."
10028010-75 = "Isso mesmo―― é um pedido da Nagisa-sama, do Tea Party."
10028010-76 = "Ou seja――"
10028010-83 = "Pode-se dizer que é uma relíquia importante o suficiente para \"influenciar a posição política do Tea Party\"."
10028010-88 = "Entendi…… desculpe por ter chamado de tarefa."
10028010-89 = "……E tem mais."
10028010-90 = "Mais um ponto……"
10028010-91 = "Algo tão importante quanto a tal mala――"
10028010-95 = "Depois de recuperar a mala, o Sensei estará no mesmo trem que você."
10028010-96 = "Então…… poderia dar suporte ao Sensei?"
10028010-97 = "O Sensei nos acompanhou no trabalho de escavação da relíquia."
10028010-98 = "É um desejo pessoal meu, mas……#nqueria que ele pudesse descansar um pouco, pelo menos durante a viagem de trem."
10028010-102 = "……Hm?"
10028010-103 = "O Sensei está com a mala?"
10028010-104 = "Sim. Claro, isso não é uma ordem. A instrução do Comitê de Justiça é apenas entregar a mala."
10028010-105 = "Se isso for atrapalhar a recuperação da mala, não precisa se preocupar."
10028010-111 = "O que me diz? Pode aceitar……?"
10028010-112 = "……Hmm."
10028010-113 = "Por enquanto, entendi a missão."
10028010-114 = "……Sensei…… Sensei, é……"
10028010-115 = "Mala, trem…… Sensei……"
10028010-116 = "……Hehe."
10028010-117 = "Tudo bem. Vou ter companhia para conversar no caminho de volta, e eu queria mesmo conversar direito com o Sensei faz tempo."
10028010-118 = "Bem, não é nada demais."
10028010-119 = "É só ir buscar a mala."
10028010-125 = "Pode deixar comigo!"
10028010-127 = "――Foi isso que aconteceu hoje de manhã."
10028010-128 = "E…… pronto."
10028010-185 = "Ufa……"
10028010-186 = "Essa é a última bagagem! Fazia tempo que eu não suava tanto."
10028010-187 = "Bom trabalho para você também, Sensei.#nEm nome do Comitê de Justiça…… não, em nome de Trinity, agradeço pelo seu esforço."
10028010-188 = "Normalmente, não sou de falar em nome de ninguém, mas hoje a situação é diferente!"
10028010-189 = "Tenho que mostrar serviço, né! Hehe."
10028010-190 = "[s1] \"Ichika, bom trabalho também.\"\n[s2] \"Foi uma longa viagem até aqui, deve ter sido cansativo, não é?\""
10028010-193 = "Quem teve mais trabalho foi o Sensei e o pessoal da equipe de escavação!"
10028010-194 = "Eu só ajudei um pouco com a limpeza!"
10028010-195 = "Ainda assim, é estranho...#nO conjunto de chá usado na primeira reunião do Chá das Cinco..."
10028010-196 = "Isso não é um tesouro escolar super importante?#nÉ surpreendente que tenha sido encontrado só agora."
10028010-197 = "E ainda por cima, num lugar tão longe do Distrito Autônomo de Trinity."
10028010-198 = "……Eh?"
10028010-199 = "Você sabia que era uma xícara de chá importante, mas não sabia o motivo...?"
10028010-200 = "Nossa... pedir um serviço tão importante e nem explicar o porquê..."
10028010-201 = "Bem, não é uma informação confidencial nem nada... é sobre aquilo, sabe?"
10028010-202 = "……Sobre a \"legitimidade\"."
10028010-203 = "Como você sabe, por causa de várias coisas que aconteceram recentemente...#nO pessoal do Chá das Cinco está tendo problemas para conversar de igual para igual com o Esquadrão de Socorro ou a Irmandade."
10028010-204 = "Acho que descobrir essa relíquia nessa situação é um grande trunfo.#nAssim, podemos afirmar que \"somos uma existência de linhagem nobre\" e \"os fundadores de Trinity\"."
10028010-205 = "Por isso o Chá das Cinco deve ter pensado em pedir a ajuda do Sensei na escavação."
10028010-206 = "E eu fui enviada para cá justamente para dar suporte ao Sensei."
10028010-207 = "……Ou seja!"
10028010-208 = "Hoje, o dia todo... eu vou atender a qualquer pedido do Sensei!"
10028010-209 = "Entendido? É uma oportunidade rara, viu?#nSe tiver algum pedido, pode falar o que quiser."
10028010-210 = "Eu estou aqui pelo Sensei, afinal!!"
10028010-211 = "[s3] \"Ichika, você é muito confiável, obrigado.\"\n[s4] \"Conto com você, prazer em trabalhar juntos.\""
10028010-214 = "Fico feliz em ouvir isso do Sensei.#nFoi bom ter vindo, hehe."
10028010-215 = "Eu queria ter a chance de trabalhar com você pelo menos uma vez..."
10028010-216 = "A Tsurugi-senpai, a Hasumi-senpai... e até a Mashiro, vivem falando do Sensei."
10028010-217 = "……Ah. Só ouvi coisas boas, então não precisa se preocupar."
10028010-218 = "Coisas como \"ele é uma boa pessoa\" ou \"é alguém com quem me sinto calma ao lado\", esse tipo de coisa."
10028010-219 = "Então, ter interesse no Sensei é um caminho natural, por assim dizer..."
10028010-220 = "Na verdade, por causa das minhas funções, quase não tive oportunidade de te encontrar..."
10028010-221 = "……Hm?"
10028010-222 = "Posso entrar em contato a qualquer momento...?"
10028010-223 = "……Fufu, isso é muito bom."
10028010-224 = "Mas, não quero incomodar muito, sabe?"
10028010-225 = "Mesmo que o Sensei não se importe, o olhar dos outros é diferente."
10028010-226 = "……É que eu não quero ser uma \"criança que dá trabalho\"."
10028010-227 = "Mas, se houver oportunidades como esta..."
10028010-228 = "Eu adoraria conversar um pouco sobre assuntos pessoais também."
10028010-232 = "……Haha, acabei falando besteira, né."
10028010-233 = "Bom, vamos terminar de guardar o resto da bagagem?"
10028010-238 = "Bem, os equipamentos já estão quase todos prontos..."
10028010-239 = "……Hm?"
10028010-240 = "Ah, o conjunto de chá? Aquele que estava na mala branca, né?"
10028010-241 = "Isso está sob controle! Antes de começar a guardar, eu verifiquei por precaução."
10028010-242 = "Está guardado direitinho no vagão de carga.#nDepois que terminarmos a limpeza, é só pegar o trem."
10028010-247 = "……Hm?"
10028010-251 = "Como assim, no vagão..."
10028010-252 = "A gente não ia voltar de trem?"
10028010-253 = "……Hm?"
10028010-254 = "O trem das 3 horas...?"
10028010-255 = "O trem das 6:10...?"
10028010-260 = "Agora são 3 horas, né...?"
10028010-261 = "Ué, será que..."
10028010-262 = "Se o horário estiver correto, já é hora da partida..."
10028010-266 = "Então, aquela mala é...?"
10028010-267 = "...Ah, não é hora de ficar pensando nisso agora. #nPreciso correr para pegar."
10028010-272 = "Atenção, por favor."
10028010-273 = "O trem expresso com destino a Gehenna partirá em breve."
10028010-274 = "Pedimos aos passageiros que se acomodem em seus assentos."
10028010-275 = "Repetindo. O trem expresso com destino a Gehenna partirá em breve—"
10028010-280 = "Hã...?"
10028010-282 = "Destino a Gehenna...?"
