[translation]
10028010-1 = "第1話;3時10分、ゲヘナ行き"
10028010-50 = "――どうぞ。"
10028010-57 = "失礼します、ハスミ先輩。お呼びっすか？"
10028010-58 = "はい、イチカ。お待ちしておりました。"
10028010-59 = "朝早くに呼び出してしまって申し訳ありません。#nよく眠れましたか？"
10028010-60 = "はい、睡眠はたっぷり取ってるんで大丈夫っすよ！へへっ。"
10028010-61 = "……こんな時間に呼び出すってことは、何かあったんすよね？"
10028010-62 = "事件とまではいきませんが……そうですね。"
10028010-63 = "ツルギとも話してみましたが、やはりこの件はイチカが適任だと思いまして。"
10028010-64 = "へっ？ツルギ先輩との話し合い……？#n私が「適任」……？"
10028010-65 = "いったい何があったんすか……"
10028010-66 = "ああ、プレッシャーをかけるつもりはありません。#n危険でも難しい内容でもありません。"
10028010-67 = "……カバンを今日中にティーパーティーに持って行ってほしいのです。"
10028010-68 = "また、カバンはトリニティ自治区から離れた場所にあるため……"
10028010-69 = "他の自治区の生徒とも仲の良い、イチカに任せようかと。"
10028010-70 = "私やツルギが行くよりは、そちらの方がつつがなく事が運ぶでしょう。"
10028010-71 = "あーなるほど、そういうことなんすね。#n要は、[ruby=・   ・   ・]お使い[/ruby]みたいな感じっすよね？"
10028010-72 = "そうですね……お使いではありますが、カバンには重要な遺物が入っています。"
10028010-73 = "ティーパーティーだけでなく、トリニティ全体にとって大切なものなのです。"
10028010-75 = "そう――これはティーパーティーのナギサ様からの依頼。"
10028010-76 = "つまり――"
10028010-83 = "「ティーパーティーの政治的立場に影響を与える」レベルの重要な遺物と言えるでしょう。"
10028010-88 = "なるほど……おつかいって言ってすみませんでした。"
10028010-89 = "……それと。"
10028010-90 = "もう一点……"
10028010-91 = "例のカバンと同じくらい重要な事が――"
10028010-95 = "カバンの回収を終えたら、先生が同じ列車に乗る手はずとなっています。"
10028010-96 = "そこで……先生のサポートをお願いできますでしょうか？"
10028010-97 = "先生は遺物の発掘作業に、同行してくださったのです。"
10028010-98 = "私個人の希望ではありますが……#nせめて、列車移動の間だけでも、ゆっくりしていただきたいと思いまして。"
10028010-102 = "……ん？"
10028010-103 = "先生がカバン持ってるんすか？"
10028010-104 = "そうです。もちろん、これは指示ではありません。#n正義実現委員会からの指示は、カバンを届けることだけ。"
10028010-105 = "カバンの回収に影響が出るようであれば、気にしないでいただいて結構です。"
10028010-111 = "どうでしょう。受けていただけますでしょうか……？"
10028010-112 = "……んー。"
10028010-113 = "とりあえず、任務について了解っす。"
10028010-114 = "……先生……先生、か……"
10028010-115 = "カバン、列車……先生……"
10028010-116 = "……へへっ。"
10028010-117 = "いいっすよ。帰り道に話し相手ができるってことですし、前から先生とはちゃんと話してみたかったんで。"
10028010-118 = "まっ、なんてことないっす。"
10028010-119 = "カバンを取りに行くだけですし。"
10028010-125 = "任せてください！"
10028010-127 = "――というのが、今朝のやり取りっす。"
10028010-128 = "よいっ……しょっと。"
10028010-185 = "ふぅ……"
10028010-186 = "これで最後の荷物っすね！久々にいい汗かいたっす。"
10028010-187 = "先生もお疲れ様でした。#n正義実現委員を……いや、トリニティを代表してお礼を申し上げるっす。"
10028010-188 = "いつもなら代表なんて縁遠い言葉っすけど、今日は状況が違うので！"
10028010-189 = "いいとこ見せないとっすよね！へへっ。"
10028010-190 = "[s1] \"イチカもお疲れ様。\"\n[s2] \"ここまで遠かったし、移動も大変だったでしょ。\""
10028010-193 = "一番大変だったのは、先生と発掘チームの皆さんっすよ！"
10028010-194 = "私は後片付けをちょっと手伝っただけっすから！"
10028010-195 = "にしても不思議っすね……#nティーパーティーの一番最初の会合で使われたティーセット……"
10028010-196 = "これって超重要な[ruby=こうほう]校宝[/ruby]じゃないすか。#nよく今になって見つかったっすね。"
10028010-197 = "それも、トリニティ自治区からこんなに離れた場所で。"
10028010-198 = "……え？"
10028010-199 = "大事なティーカップというのは知ってたけど、その理由までは知らなかったんすか……？"
10028010-200 = "まったく……こんな大事な依頼をお願いしておきながら、説明もしてなかったんすか……"
10028010-201 = "ま、別に機密情報でもないし……アレっすよ、アレ。"
10028010-202 = "……「正統性」ですね。"
10028010-203 = "ご存じの通り、最近いろんなことがあった関係で……#nティーパーティーの方々が、救護騎士団とかシスターフッドと対等に話せず頭を悩ませているんだとか。"
10028010-204 = "そんな状況でこの遺物を発見したのは大きいと思います。#n「我々は由緒正しい存在」「トリニティの祖」だとアピールできるので。"
10028010-205 = "だからティーパーティーも、先生に発掘作業を手伝ってもらおうと思ったんじゃないんすかね。"
10028010-206 = "私がここに送られたのも、先生をサポートするためっすから。"
10028010-207 = "……つまり！"
10028010-208 = "今日は1日……私が先生のお願いを何でも聞くっすよ！"
10028010-209 = "いいっすか、超レアっすからね？#n頼み事があるなら何でも言ってください。"
10028010-210 = "私は、先生のためにここにいるっすから！！"
10028010-211 = "[s3] \"イチカは頼もしいね、ありがとう。\"\n[s4] \"お世話になるよ、よろしくね。\""
10028010-214 = "先生からそう言われると嬉しいっすね。#n来て良かったです、へへっ。"
10028010-215 = "一度、ご一緒してみたくて……"
10028010-216 = "ツルギ先輩とかハスミ先輩……それにマシロも、よく先生の話をしてるから。"
10028010-217 = "……あっ。いい話しか聞いてないんで、心配はいらないっすよ。"
10028010-218 = "「良い人だ」とか「一緒にいると落ち着く人だ」とか、まぁそんなとこっすね。"
10028010-219 = "だから、先生に興味が湧くのは、自然な流れというか……"
10028010-220 = "実際、私は担当業務的にお会いする機会はほとんどなかったすけど……"
10028010-221 = "……ん？"
10028010-222 = "いつでも連絡して大丈夫……？"
10028010-223 = "……ふふ、それは嬉しいっすね。"
10028010-224 = "でも、あんまりお手間をかけたくはないというか。"
10028010-225 = "先生は気にされないとしても、やはり周囲の目は違いますから。"
10028010-226 = "……「手のかかる子」にはなりたくない、という話っす。"
10028010-227 = "ただ、今回みたいな機会があるのなら……"
10028010-228 = "ちょっとだけ、プライベートな話もできたらなと。"
10028010-232 = "……はは、変なこと言っちゃったっすね。"
10028010-233 = "それじゃ、残りの荷物も片付けますか。"
10028010-238 = "えーと、装備はだいたい終わりで……"
10028010-239 = "……ん？"
10028010-240 = "ああ、ティーセットっすか。あの白いカバンに入ってたアレっすね。"
10028010-241 = "それなら大丈夫っす！片付け始める前に、念のため確認しておいたんで。"
10028010-242 = "貨物車両にちゃんとあったっすよ。#n後は片付けが終わったら、列車に乗るだけっすね。"
10028010-247 = "……ん？"
10028010-251 = "何で車両にって……"
10028010-252 = "列車に乗って帰るんじゃなかったんすか？"
10028010-253 = "……ん？"
10028010-254 = "3時間後の列車……？"
10028010-255 = "6時10分の列車すか……？"
10028010-260 = "今、3時っすね……？"
10028010-261 = "あれ、もしかして……"
10028010-262 = "時刻表が合ってるなら、もう出発時間……"
10028010-266 = "じゃあ、あのカバンは……？"
10028010-267 = "……っと、今はこんなことを考えてる場合じゃないっすね。#n急いで取りに行かないと。"
10028010-272 = "ご案内いたします。"
10028010-273 = "まもなく「特急・ゲヘナ行き」の列車が発車いたします。"
10028010-274 = "ご利用のお客様は、ご着席いただきますようお願い申し上げます。"
10028010-275 = "繰り返します。まもなく「特急・ゲヘナ行き」の列車が――"
10028010-280 = "えっ……と。"
10028010-282 = "「ゲヘナ行き」……？"
