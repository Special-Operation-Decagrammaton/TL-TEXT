[translation]
10013090-1 = "第9話;そして訪れた夏の終わり"
10013090-5 = "ノノミ、行きま～す☆"
10013090-9 = "いたたたたっ！こいつら、やっぱめちゃくちゃ強くない！？"
10013090-10 = "いや～、これくらい大したことないよ。"
10013090-11 = "よし、このまま押し切れば……！"
10013090-12 = "あれ？シズコ殿！主殿は、いずこに……？"
10013090-13 = "えっ……？"
10013090-19 = "何故……どうしてこうなった！私がアビドスの連中など招くわけがないだろう！"
10013090-20 = "ようやくここまで来たというのに……奴ら、またしても私の邪魔をするか！"
10013090-21 = "[s] \"あなたも運が悪いね。\""
10013090-22 = "だが先の一件で何も学ばなかったわけではないぞ！"
10013090-23 = "生徒たちが見せる凄まじい団結力――#nそれは全て、貴様がいるから成り立つものだ！"
10013090-24 = "なら、貴様さえ取り除いてしまえば、まだこちらにも分があるというもの！"
10013090-25 = "[s] \"だから誘拐した、と。\""
10013090-26 = "はっ！この状況でも余裕でいられるとは……笑わせてくれる。"
10013090-27 = "だが、それもここまでだ。今から奴らの前で、貴様を盾として使ってやろう！"
10013090-28 = "いまさら悔やんでも手遅れだぞ！"
10013090-29 = "[s] \"……あいにく、以前も似たようなことがあってね。\""
10013090-30 = "……？"
10013090-31 = "[s1] \"まさか今、その時のことを思い出すなんて。\"\n[s2] \"タイミングが良いのやら悪いのやら……。\""
10013090-34 = "何を訳の分からんことを……。"
10013090-42 = "い、今のは！？"
10013090-43 = "アビドスの連中は、ヘルメット団の相手で手一杯のはずだろう！？"
10013090-51 = "ボ、ボス！大変です！が、外郭から正体不明の敵が接近してます！"
10013090-52 = "パターン……レッドです！"
10013090-53 = "パターンレッドだと……？#nそんなわけ――"
10013090-61 = "うふ……"
10013090-66 = "うふふふ……"
10013090-70 = "うふふふふふ！！！！"
10013090-72 = "なっ！増援だと！？"
10013090-74 = "[ns] \"こんにちは、ワカモ。来てくれてありがとう。\""
10013090-75 = "はい！ちょうど近くにおりましたので、馳せ参じました！"
10013090-76 = "先日は、私の誤解のせいでお恥ずかしいところを見せてしまいましたが……"
10013090-77 = "今回はあなた様から直接！呼び出してくださった次第。"
10013090-78 = "故にこのワカモ、悪党に捕らえられているあなた様を今すぐ助けて差し上げます！"
10013090-79 = "う、撃てぇ！！"
10013090-83 = "ふふふっ、無駄です……ええ、無駄ですとも！"
10013090-87 = "いかなる存在だろうと、このワカモの先生への愛を止められません！"
10013090-99 = "ちくしょう！"
10013090-103 = "[ns] \"あ、逃げた。\""
10013090-107 = "くそっ！こうなったら撤退だ！今すぐヘリを出せ！"
10013090-108 = "は、はい！"
10013090-113 = "アビドスにシャーレ、そして百夜堂……！"
10013090-114 = "今回は大人しく引き下がってやる。#nだが、次に会った時は……！"
10013090-120 = "私の愛する先生を傷つけようとした愚か者を、"
10013090-121 = "このまま見逃すとでも？"
10013090-125 = "えっ……？"
10013090-136 = "（こうしてカイザー理事（？）との騒動は幕を下ろした）"
10013090-141 = "[ns] \"ありがとう、ワカモ。迷惑をかけちゃったね。\""
10013090-142 = "い、いえ！誤解だったとはいえ、先日の件をここで償えたのはむしろ幸いだったと言いますか……"
10013090-143 = "ええと、その……"
10013090-149 = "ワカモは……あなた様のお役に、立てましたか……？"
10013090-150 = "[s] \"もちろん。むしろ命の恩人と言っても過言じゃないよ。\""
10013090-151 = "わ、私が……！あなた様の、恩人……！？"
10013090-152 = "あ、ああ、ああああっ！#n私……私は、あなた様に取り返しのつかない失態を犯してしまったのに、それでも変わらずそのようなお優しい言葉をかけてくださるなんて……！"
10013090-153 = "[s] \"えぇっと、よければ一緒に戻――\""
10013090-154 = "この歓喜、抑えられそうにありません！"
10013090-155 = "ですのでワカモは、その……帰らせていただきますー！"
10013090-159 = "[ns] \"あ、うん。気をつけてね……。\""
10013090-164 = "（ワカモを見送り、現場に戻ると、既に状況は大体片付いていたようだった）"
10013090-165 = "あっ！主殿！"
10013090-166 = "急にお姿が見えなくなったので心配しておりました！"
10013090-167 = "先生……おトイレ、行ってたの？"
10013090-168 = "[s] \"ううん。ちょっと用事があってね。\""
10013090-169 = "先生、カイザー理事は！？#nあっ、いや今は営業職員だっけ？とにかく、あいつは！？"
10013090-170 = "[s] \"報いを受けたよ。\""
10013090-171 = "なるほど……えっ？また現れるかもしれないし、もう現れないかもしれない？"
10013090-172 = "何それ？シュレーディンガーのなんとかってやつ？"
10013090-173 = "[s] \"ところで状況は？\""
10013090-174 = "ヘルメット団の大半は倒した。でも……"
10013090-175 = "みんな元気よく逃げちゃったんですよね～。"
10013090-176 = "[s] \"逃げた？\""
10013090-181 = "数はこっちの方が上なのに劣勢って何よ！？"
10013090-182 = "新入りの力、恐るべし……！"
10013090-183 = "あっ、でもよく考えてみれば、うちが見抜いて選んだわけだし……"
10013090-184 = "うん！やっぱうちって人を見る目があるわ！"
10013090-185 = "さすがヘルメット団の幹部！[ruby=こまかぜ]河駒風[/ruby]ラブだわ！"
10013090-186 = "そのせいでこっちは大変な目に遭ってるんですけど！？隊長！"
10013090-187 = "ええいっ！こうなったら……全員、てったーい！"
10013090-188 = "覚えてなさいよ、あんたたち！確かに今回はうちらの負けだけど……#nでも、これは小さな敗北！広く見たら――"
10013090-189 = "広く見ても負けは負けだよ！"
10013090-190 = "ぐはっ！？"
10013090-196 = "[ns] \"……そういう感じだったんだね。\""
10013090-197 = "あっ、先生！"
10013090-198 = "[s] \"シズコ、そっちは大丈夫？\""
10013090-199 = "はい！怪我人もいませんし、"
10013090-200 = "アビドスの皆さんのおかげで無事解決できました！"
10013090-204 = "百夜堂の……いえ、私たちの勝利です！"
10013090-205 = "[s] \"うん、みんなで力を合わせた結果だね。\""
10013090-206 = "やりましたね、シズコちゃん！"
10013090-207 = "これで、やっと「ロスト・パラダイス・リゾート」全体を運営できるようになりましたよ！"
10013090-208 = "そうね……色んなことがあったけど……#nでも、ここからは安心して百夜堂の、百夜堂だけの商売が始められるわ！"
10013090-214 = "あれ？"
10013090-215 = "どこからか、騒がしい音が聞こえてきますね……？"
10013090-222 = "よーし、現場に到着。う～ん！夏の匂いがするし、気に入ったよ！"
10013090-223 = "モモカ、私たちは遊びではなく、仕事で来たのです。#n連邦生徒会の一員らしく行動してください。"
10013090-224 = "え～先輩、かたくな～い？"
10013090-225 = "[s] \"リンに、モモカ？どうしてここに？\""
10013090-226 = "先生こそ、どうしてこちらに？"
10013090-227 = "……いえ、これほどの騒ぎが起きたのであれば、むしろシャーレの介入があっても不思議ではありませんね。"
10013090-228 = "ちょ、ちょっと！どうして連邦生徒会が来てるの！？#nそれに、これほどの騒ぎって！？"
10013090-230 = "うへぇ～、なんだか嫌な予感しかしないな～。"
10013090-231 = "私たちの方でも、ここ「ロスト・パラダイス・リゾート」にて所有権を巡り一連の騒動があったことを確認しております。"
10013090-232 = "ちょうどネットでも騒がれてたんだよね。誰が負けて、誰が勝った～って。"
10013090-233 = "ですが、ここは本来私たち「連邦生徒会」が所有している土地です。"
10013090-234 = "そこで偽の権利書を使った騒動が起きていたため、こうして足を運んだ次第です。"
10013090-235 = "簡単に言うと、自分たちの持ち物を取り戻しに来たって感じかな？"
10013090-236 = "[s] \"ということは、つまり……。\""
10013090-238 = "…………えっ？"
10013090-239 = "もちろん、横やりに等しい発言であることは重々承知しておりますし、手続きの都合もあります。そのため、すぐに立ち退きを要請することはありません。"
10013090-243 = "そうですね、あと３日以内に出て行っていただけると助かります。"
10013090-245 = "あらあら……"
10013090-246 = "……それじゃあ、私たちが今までやってきたことって……全部……"
10013090-247 = "無駄だったってことぉぉお！？"
10013090-248 = "[s] \"権利書自体が偽物だったなんて……。\""
10013090-250 = "うへ～。いかにもカイザーコーポレーションがやりそうなことだねぇ。"
10013090-251 = "いや、ホシノ先輩……そんな言葉で片付けていい問題じゃないでしょ。"
10013090-252 = "こんなの全然納得できない！むしろ、ひどくない！？"
10013090-254 = "無論、私たちも大変申し訳ないと思っています。#nですが、やむを得ないことなので……"
10013090-258 = "[ns] \"シズコ……。\""
10013090-259 = "シズコちゃん……"
10013090-260 = "シズコ殿……"
10013090-262 = "社長……"
10013090-263 = "タヌキさん……"
10013090-264 = "かわいいお嬢ちゃん……"
10013090-266 = "……いやいや！後半になるにつれて反応しにくい呼び方に変わってるし……！"
10013090-267 = "はぁ……わかった。わかったわよ！"
10013090-268 = "[s] \"大丈夫？\""
10013090-269 = "ええ！私、こう見えて切り替えるのは早いですから！"
10013090-270 = "その代わり！条件があるわ！"
10013090-271 = "条件……ですか？"
10013090-272 = "退去する前に！"
10013090-273 = "百夜堂で宴会を開かせてもらいます！"
10013090-274 = "せっかくみんなで頑張ったんだし、それくらいはしてもいいでしょ？"
10013090-275 = "おっ、いいね～。"
10013090-276 = "モモカ！？"
10013090-277 = "[s] \"私からもお願い、リン。\""
10013090-278 = "せ、先生まで……。"
10013090-289 = "はぁ……わかりました。それくらいなら……。"
10013090-295 = "よし！それじゃ、早速みんなで取りかかりましょ！"
10013090-297 = "おー！"
10013090-310 = "さあ！始めるわよ！"
10013090-311 = "みんなの祝勝会を！"
10013090-315 = "さぁさぁ、たくさん食べて！いっぱい用意したから！"
10013090-318 = "おお、これはイズナ好みの味！とってもおいしいです！"
10013090-319 = "あっ、主殿も一口いかがですか？"
10013090-322 = "ふふふっ。みんな、楽しそうですね。"
10013090-329 = "………ひゅうひゅう、風？"
10013090-334 = "はぁ～～……今回は本ッッッ当に大変だったー。"
10013090-336 = "でも、久しぶりにいい運動になった。"
10013090-337 = "あはは。シロコちゃんは運動好きですもんね～。"
10013090-339 = "それにしても、シズコさんの手腕には正直驚きました。#nこの宴会の用意もそうですし、イベント事に関してはさすがプロと言いますか。"
10013090-340 = "だね～。もし機会があれば、アビドス砂祭りをやる時はぜひアドバイスを求めたいくらいだよ。"
10013090-341 = "！……そうね。"
10013090-342 = "はい！砂祭りがまた開かれることになった時はぜひ！"
10013090-344 = "ふふっ、また今回みたいに協力できたら楽しそうですね☆ねえ、シロコちゃん？"
10013090-345 = "……ん。"
10013090-350 = "あ、これおいしい。"
10013090-351 = "たしかに……"
10013090-353 = "これが、百鬼夜行の味ですか。"
10013090-358 = "[ns] \"……という事があったんだ。\""
10013090-360 = "ふむ、なるほどなるほど。#nでは、結局私が間違ってて、シズコさんが正しかったってことですか。"
10013090-361 = "いやぁ～、陰陽部の部長としてお恥ずかしい限りです。"
10013090-362 = "[s] \"けど、そのせいでシズコが投資したお金は全部なくなっちゃったけどね……\""
10013090-363 = "ああ、それならご心配なく。"
10013090-364 = "その基金については、資産凍結の申請をしておいたといいますか。"
10013090-365 = "まあ、それなりの防止策は事前にしておきました。#nカイザーコーポレーションも隙が多かったですし、意外と簡単でしたよ。"
10013090-366 = "ですので、時間はかかるでしょうけど、ちゃんと手元に戻ると思いますよ。"
10013090-367 = "[s] \"ニヤ、本当はシズコのこと心配してたでしょ？\""
10013090-369 = "にゃはは～。さて、どうでしょう？"
10013090-371 = "[ns] \"ニヤが私を呼んでくれなかったら――\""
10013090-375 = "[ns] \"詐欺のことを知ったシズコは、一人で背負い込んでたと思うよ。\""
10013090-377 = "私が動いていたと思う根拠はそこにある、と？"
10013090-378 = "さあ～、どうなんでしょうね～。"
10013090-379 = "ですが今回の件で間違いなく言えるのは、私はシズコさんと対立している立場だったってことくらいです。"
10013090-380 = "下手な憶測はお互いに無意味な期待感を植え付けることになりかねません。"
10013090-381 = "ですから、ここはそういうことにしておきましょう。にゃはは～。"
10013090-382 = "[s] \"うん。なら、そういうことで。\""
10013090-387 = "[ns] \"でも、誰か一人くらいは分かってあげなくちゃ。\""
10013090-388 = "（そして最後に……）"
10013090-396 = "[ns] \"ここにいたんだね、シズコ。\""
10013090-397 = "あ、先生……"
10013090-403 = "宴会で忙しなく動いてたせいか、ちょっと疲れちゃって……普段はこんなことないのに不思議ですね。"
10013090-404 = "……そうなっちゃうくらい、色んな事が続いたからなんでしょうか。"
10013090-405 = "[s] \"本当にお疲れ様。\""
10013090-406 = "はぁ～～～！すっごく疲れましたぁ～！"
10013090-407 = "ですから！もっと慰めてください！褒めてください！おかわりです！おかわり！"
10013090-408 = "[s] \"うん。シズコじゃなければ、ここまでやり遂げられなかったと思う。\""
10013090-409 = "……自分で頼んでおいてあれですけど、いざ言葉にされると恥ずかしいですね。"
10013090-410 = "けど、まあ……全部解決したことですし、結果オーライということで！"
10013090-411 = "[s] \"でも、このまま終わるのは少し惜しいと思ってるんじゃない？\""
10013090-412 = "えっ？何をおっしゃってるんですか、先生。"
10013090-413 = "[s] \"えっ？\""
10013090-414 = "別に、何も惜しいことはありませんよ？"
10013090-416 = "たしかに、ドタバタして転んで、自分のミスを振り返るのは……"
10013090-417 = "それなりに辛いですけど……。"
10013090-418 = "ですが、あの陰陽部の部長の前でそれを認めるのは、何だか負けた気がして……#nそれで意地を張ってたってのもあります……"
10013090-420 = "でも、この選択が間違っていなかったというのは、みんなと――"
10013090-421 = "先生のおかげで実感できました。"
10013090-423 = "それに、この夏、たっぷり味わった……"
10013090-424 = "甘くてほろ苦いけど、でもすっごく幸せな味の素敵な思い出を手に入れたので……"
10013090-425 = "私としては惜しいことなんて一つもない……"
10013090-427 = "むしろ、大成功と言ってもいいくらいなんです。"
10013090-428 = "[s] \"それを聞いて安心したよ。\""
10013090-432 = "[ns] \"私も同じ気持ちだったから。\""
10013090-433 = "えへへっ！はい！"
10013090-434 = "ですから、この話はこれにて終了。大切なのはこれから先！ってことで――"
10013090-440 = "今後も私たち百鬼夜行お祭り運営委員会を――"
10013090-441 = "そして委員長であるこの私、[ruby=かわわ]河和[/ruby]シズコのことをよろしくお願いしますね？"
10013090-442 = "先生♪"
10013090-443 = "出張！百夜堂海の家FC計画"
