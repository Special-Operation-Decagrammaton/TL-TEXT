[translation]
10013090-1 = "Episódio 9; E então, o fim do verão chegou"
10013090-5 = "Nonomi, indo nessa☆"
10013090-9 = "Ai, ai, ai! Esses caras, eles não são incrivelmente fortes!?"
10013090-10 = "Não se preocupe, isso não é nada demais."
10013090-11 = "Certo, se continuarmos pressionando assim...!"
10013090-12 = "Ué? Srta. Shizuko! Onde está o Mestre...?"
10013090-13 = "Hã...?"
10013090-19 = "Por que... por que as coisas terminaram assim! Eu jamais convidaria o pessoal de Abydos!"
10013090-20 = "E pensar que cheguei tão longe... eles estão atrapalhando meus planos de novo!"
10013090-21 = "[s] \"Você também não tem sorte, né.\""
10013090-22 = "Mas não é como se eu não tivesse aprendido nada com o incidente anterior!"
10013090-23 = "A incrível união que as alunas demonstram――#nIsso só é possível porque você está lá!"
10013090-24 = "Então, se eu me livrar de você, ainda terei uma chance!"
10013090-25 = "[s] \"Então foi por isso que me sequestrou.\""
10013090-26 = "Ha! Conseguir manter a calma mesmo nessa situação... você me faz rir."
10013090-27 = "Mas isso acaba aqui. Agora, vou usar você como escudo na frente deles!"
10013090-28 = "É tarde demais para se arrepender agora!"
10013090-29 = "[s] \"...Infelizmente, algo parecido já aconteceu antes.\""
10013090-30 = "...?"
10013090-31 = "[s1] \"Quem diria que eu me lembraria daquela vez agora.\"\n[s2] \"Não sei se o timing é bom ou ruim...\""
10013090-34 = "Que tipo de bobagem você está dizendo..."
10013090-42 = "O, o que foi isso!?"
10013090-43 = "O pessoal de Abydos deveria estar ocupado demais lidando com a Gangue dos Capacetes, não deveria!?"
10013090-51 = "Ch, Chefe! É uma emergência! Tem um inimigo não identificado se aproximando pelo perímetro externo!"
10013090-52 = "Padrão... Vermelho!"
10013090-53 = "Padrão Vermelho...?#nNão pode ser――"
10013090-61 = "Ufu..."
10013090-66 = "Ufufufu..."
10013090-70 = "Ufufufufufu!!!!"
10013090-72 = "O quê! Reforços!?"
10013090-74 = "[ns] \"Olá, Wakamo. Obrigado por vir.\""
10013090-75 = "Sim! Eu estava por perto, então vim correndo!"
10013090-76 = "No outro dia, passei vergonha por causa de um mal-entendido meu, mas..."
10013090-77 = "Desta vez, você mesmo me chamou diretamente!"
10013090-78 = "Portanto, eu, Wakamo, vou salvá-lo imediatamente das garras desses vilões!"
10013090-79 = "A, atirem!!"
10013090-83 = "Fufufu, é inútil... sim, é totalmente inútil!"
10013090-87 = "Não importa quem seja, ninguém pode impedir o amor desta Wakamo pelo Sensei!"
10013090-99 = "Droga!"
10013090-103 = "[ns] \"Ah, fugiram.\""
10013090-107 = "Droga! Se é assim, vamos recuar! Preparem o helicóptero agora!"
10013090-108 = "S, sim!"
10013090-113 = "Abydos, Schale e até a Hyakkiyako...!"
10013090-114 = "Vou recuar por hoje. #nMas, na próxima vez que nos encontrarmos...!"
10013090-120 = "Você acha mesmo que eu deixaria passar,"
10013090-121 = "alguém que tentou ferir o meu amado Sensei?"
10013090-125 = "Hã...?"
10013090-136 = "(Assim, a confusão com o Diretor(?) da Kaiser chegou ao fim)"
10013090-141 = "[ns] \"Obrigado, Wakamo. Sinto muito pelo incômodo.\""
10013090-142 = "N, não! Embora tenha sido um mal-entendido, poder compensar o que aconteceu outro dia aqui foi, na verdade, uma sorte..."
10013090-143 = "Bem, é que..."
10013090-149 = "Wakamo... conseguiu ser útil para você...?"
10013090-150 = "[s] \"Claro. Não seria exagero dizer que você salvou a minha vida.\""
10013090-151 = "E-eu...! Eu sou a salvadora... de você...?"
10013090-152 = "Ah, ah, aaaaah! #nEu... eu cometi um erro imperdoável contra você, e mesmo assim, você ainda me diz palavras tão gentis...!"
10013090-153 = "[s] \"Bem, se quiser, podemos voltar juntos--\""
10013090-154 = "Essa alegria, eu não consigo conter!"
10013090-155 = "Por isso, Wakamo vai... bem... eu já vou indo!"
10013090-159 = "[ns] \"Ah, certo. Tome cuidado...\""
10013090-164 = "(Ao me despedir de Wakamo e retornar ao local, a situação parecia estar praticamente resolvida.)"
10013090-165 = "Ah! Mestre!"
10013090-166 = "Fiquei preocupada porque você sumiu de repente!"
10013090-167 = "Sensei... você foi ao banheiro?"
10013090-168 = "[s] \"Não. Eu só tive que resolver um assunto.\""
10013090-169 = "Sensei, e o diretor da Kaiser!? #nAh, não, era funcionário de vendas, né? Enfim, e aquele cara!?"
10013090-170 = "[s] \"Ele recebeu o que merecia.\""
10013090-171 = "Entendo... Espera, o quê? Pode aparecer de novo ou talvez não apareça mais?"
10013090-172 = "O que é isso? Algum tipo de coisa do gato de Schrödinger?"
10013090-173 = "[s] \"Mas e a situação?\""
10013090-174 = "Derrubamos a maior parte do Grupo Capacete. Mas..."
10013090-175 = "Eles fugiram bem animados, sabe~."
10013090-176 = "[s] \"Fugiram?\""
10013090-181 = "Como podemos estar em desvantagem se estamos em maior número!?"
10013090-182 = "O poder do novato é assustador...!"
10013090-183 = "Ah, mas pensando bem, fomos nós que percebemos o talento e escolhemos..."
10013090-184 = "Sim! Eu sabia que tenho bom olho para as pessoas!"
10013090-185 = "Como esperado de uma executiva do Grupo Capacete! Eu amo a Komakaze!"
10013090-186 = "Por causa disso, nós estamos passando por maus bocados aqui!? Capitã!"
10013090-187 = "Grrr! Já que é assim... todo mundo, recuar!"
10013090-188 = "Me aguardem, vocês! É verdade que perdemos desta vez, mas... #nIsso é apenas uma pequena derrota! Em uma visão geral--"
10013090-189 = "Mesmo na visão geral, derrota é derrota!"
10013090-190 = "Guh!?"
10013090-196 = "[ns] \"...Então foi assim que aconteceu.\""
10013090-197 = "Ah, Sensei!"
10013090-198 = "[s] \"Shizuko, está tudo bem por aí?\""
10013090-199 = "Sim! Não há feridos e,"
10013090-200 = "graças ao pessoal de Abydos, conseguimos resolver tudo sem problemas!"
10013090-204 = "É a vitória da Hyakkiyako... não, a nossa vitória!"
10013090-205 = "[s] \"Sim, é o resultado de todos unindo forças.\""
10013090-206 = "Conseguimos, Shizuko-chan!"
10013090-207 = "Com isso, finalmente poderemos operar todo o \"Lost Paradise Resort\"!"
10013090-208 = "É verdade... aconteceram tantas coisas... #nMas, a partir de agora, podemos começar os negócios da Hyakkiyako, apenas da Hyakkiyako, com tranquilidade!"
10013090-214 = "Ué?"
10013090-215 = "Estou ouvindo um barulho vindo de algum lugar...?"
10013090-222 = "Muito bem, chegamos ao local. Hmm! Tem cheiro de verão, gostei!"
10013090-223 = "Momoka, não viemos aqui para brincar, viemos a trabalho. #nPor favor, aja como um membro do Conselho Estudantil Geral."
10013090-224 = "Ah, senpai, que chata~"
10013090-225 = "[s] \"Rin, Momoka? Por que estão aqui?\""
10013090-226 = "Sensei, por que você está aqui?"
10013090-227 = "...Bem, se houve uma confusão desse tamanho, não seria estranho que o Schale interviesse."
10013090-228 = "Ei, espera aí! Por que o Conselho Estudantil Geral está aqui!?#nAlém disso, por que toda essa confusão!?"
10013090-230 = "Uhee~, eu só sinto que isso vai dar muito errado."
10013090-231 = "Nós também confirmamos que houve uma série de distúrbios aqui no \"Lost Paradise Resort\" envolvendo a disputa pela propriedade."
10013090-232 = "Estava rolando até na internet, né? Sobre quem perdeu e quem ganhou."
10013090-233 = "No entanto, este terreno pertence originalmente a nós, do \"Conselho Estudantil Geral\"."
10013090-234 = "Como houve uma confusão envolvendo escrituras falsas, viemos pessoalmente verificar a situação."
10013090-235 = "Em resumo, vocês vieram recuperar o que é de vocês, é isso?"
10013090-236 = "[s] \"Isso significa que, na verdade...\""
10013090-238 = "............Hã?"
10013090-239 = "Claro, estou plenamente ciente de que esta é uma intervenção indesejada e que existem trâmites burocráticos. Por isso, não exigiremos que saiam imediatamente."
10013090-243 = "Pois bem, seria de grande ajuda se pudessem desocupar o local dentro de três dias."
10013090-245 = "Ora, ora..."
10013090-246 = "...Então, tudo o que fizemos até agora foi... tudo..."
10013090-247 = "Foi tudo em vãooooo!?"
10013090-248 = "[s] \"A própria escritura ser falsa...\""
10013090-250 = "Uhee~. É bem a cara da Kaiser Corporation fazer algo assim."
10013090-251 = "Não, Hoshino-senpai... esse não é um problema que se resolve com essas palavras."
10013090-252 = "Eu não consigo aceitar isso de jeito nenhum! Na verdade, não é horrível!?"
10013090-254 = "Obviamente, nós também lamentamos muito. #nMas, é uma medida inevitável..."
10013090-258 = "[ns] \"Shizuko...\""
10013090-259 = "Shizuko-chan..."
10013090-260 = "Shizuko-dono..."
10013090-262 = "Presidente..."
10013090-263 = "Tanuki-san..."
10013090-264 = "Garotinha fofa..."
10013090-266 = "...Não, não! Os apelidos foram ficando cada vez mais difíceis de responder...!"
10013090-267 = "Ah... entendi. Eu entendi!"
10013090-268 = "[s] \"Você está bem?\""
10013090-269 = "Sim! Pode não parecer, mas eu consigo virar a página rápido!"
10013090-270 = "Mas em troca! Eu tenho uma condição!"
10013090-271 = "Uma condição...?"
10013090-272 = "Antes de irmos embora!"
10013090-273 = "Vamos fazer um banquete aqui na Hyakkiyako!"
10013090-274 = "Já que nos esforçamos tanto, acho que merecemos pelo menos isso, não é?"
10013090-275 = "Oh, gostei da ideia."
10013090-276 = "Momoka!?"
10013090-277 = "[s] \"Eu também peço, Rin.\""
10013090-278 = "Até você, Sensei..."
10013090-289 = "Ah... entendi. Se for só isso..."
10013090-295 = "Ótimo! Então, vamos começar logo!"
10013090-297 = "Ooo!"
10013090-310 = "Vamos lá! Começando agora!"
10013090-311 = "A festa da vitória de todos!"
10013090-315 = "Vamos, vamos, comam bastante! Preparei muita coisa!"
10013090-318 = "Oh, este é o sabor que a Izuna gosta! Está muito delicioso!"
10013090-319 = "Ah, Mestre, gostaria de um pedaço também?"
10013090-322 = "Fufufu. Todos parecem estar se divertindo."
10013090-329 = ".........Uau, que brisa?"
10013090-334 = "Ahhh... desta vez foi realmente, realmente difícil."
10013090-336 = "Mas, foi um bom exercício depois de tanto tempo."
10013090-337 = "Ahaha. A Shiroko adora se exercitar, né?"
10013090-339 = "Ainda assim, confesso que fiquei surpresa com a competência da Shizuko. #nTanto com os preparativos deste banquete quanto com a organização de eventos, ela é uma verdadeira profissional."
10013090-340 = "Pois é. Se tivermos uma oportunidade, adoraria pedir conselhos a ela quando formos realizar o Festival da Areia de Abydos."
10013090-341 = "!... Entendo."
10013090-342 = "Sim! Quando o Festival da Areia for realizado novamente, por favor, contem comigo!"
10013090-344 = "Fufu, seria divertido se pudéssemos colaborar de novo como fizemos desta vez, né? O que acha, Shiroko?"
10013090-345 = "...Hum."
10013090-350 = "Ah, isso é delicioso."
10013090-351 = "Realmente..."
10013090-353 = "Então este é o sabor de Hyakkiyako."
10013090-358 = "[ns] \"...Foi isso o que aconteceu.\""
10013090-360 = "Hum, entendo, entendo. #nEntão, no fim das contas, eu estava errada e a Shizuko estava certa?"
10013090-361 = "Nossa, como chefe do Departamento Yin-Yang, sinto-me envergonhada."
10013090-362 = "[s] \"Mas, por causa disso, todo o dinheiro que a Shizuko investiu acabou sumindo...\""
10013090-363 = "Ah, quanto a isso, não se preocupe."
10013090-364 = "Sobre aquele fundo, eu já havia solicitado o congelamento dos ativos."
10013090-365 = "Bem, tomei as medidas preventivas necessárias com antecedência. #nA Kaiser Corporation também deixou muitas brechas, foi surpreendentemente fácil."
10013090-366 = "Portanto, embora leve algum tempo, acredito que o dinheiro voltará para as mãos dela."
10013090-367 = "[s] \"Niya, na verdade você estava preocupada com a Shizuko, não estava?\""
10013090-369 = "Nyahaha~. Bem, quem sabe?"
10013090-371 = "[ns] \"Se a Niya não tivesse me chamado--\""
10013090-375 = "[ns] \"Acho que a Shizuko teria carregado o peso da fraude sozinha ao descobrir.\""
10013090-377 = "Então é nisso que você se baseia para dizer que eu agi?"
10013090-378 = "Ora, quem sabe, não é?"
10013090-379 = "Mas, sobre este caso, a única coisa que posso dizer com certeza é que eu estava em uma posição oposta à da Shizuko."
10013090-380 = "Especulações infundadas só servem para criar expectativas desnecessárias para ambos os lados."
10013090-381 = "Portanto, vamos deixar por isso mesmo. Nyahaha~."
10013090-382 = "[s] \"Entendi. Então, que seja assim.\""
10013090-387 = "[ns] \"Mas alguém precisa entender o lado dela.\""
10013090-388 = "(E, finalmente...)"
10013090-396 = "[ns] \"Você estava aqui, Shizuko.\""
10013090-397 = "Ah, Sensei..."
10013090-403 = "Talvez por ter me movimentado tanto no banquete, acabei ficando um pouco cansada... É estranho, já que isso não costuma acontecer."
10013090-404 = "...Será que é porque tantas coisas aconteceram uma atrás da outra?"
10013090-405 = "[s] \"Você se esforçou muito, parabéns.\""
10013090-406 = "Ahhhh! Estou exausta!"
10013090-407 = "Por isso! Me console mais! Me elogie! Quero mais! Quero mais!"
10013090-408 = "[s] \"Sim. Acho que se não fosse pela Shizuko, não teríamos conseguido realizar tudo isso.\""
10013090-409 = "...Eu mesma pedi, mas ouvir isso diretamente me deixa envergonhada."
10013090-410 = "Mas, bem... tudo foi resolvido, então o que importa é que deu tudo certo no final!"
10013090-411 = "[s] \"Mas você não sente que é uma pena que tudo termine assim?\""
10013090-412 = "Hã? O que quer dizer com isso, Sensei?"
10013090-413 = "[s] \"Hã?\""
10013090-414 = "Não tem nada de lamentável, sabia?"
10013090-416 = "É verdade que tropeçar na correria e ter que encarar meus próprios erros..."
10013090-417 = "É algo bem doloroso..."
10013090-418 = "Mas admitir isso na frente daquela chefe do Departamento Yin-Yang me faria sentir como se tivesse perdido... #nPor isso eu insisti tanto..."
10013090-420 = "Mas pude perceber que essa escolha não foi errada graças a todos e..."
10013090-421 = "Graças a você, Sensei."
10013090-423 = "Além disso, este verão, que aproveitei ao máximo..."
10013090-424 = "Consegui uma lembrança maravilhosa, com um sabor doce e amargo, mas extremamente feliz, então..."
10013090-425 = "Para mim, não há nada do que me arrepender..."
10013090-427 = "Na verdade, eu diria até que foi um grande sucesso."
10013090-428 = "[s] \"Fico aliviado em ouvir isso.\""
10013090-432 = "[ns] \"Eu sentia o mesmo.\""
10013090-433 = "Hehehe! Sim!"
10013090-434 = "Portanto, vamos encerrar esse assunto por aqui. O que importa é daqui para frente! Então..."
10013090-440 = "Continue contando conosco, o Comitê de Operações do Festival de Hyakkiyako..."
10013090-441 = "E também comigo, a presidente do comitê, Shizuko Kawa, conto com você, hein?"
10013090-442 = "Sensei♪"
10013090-443 = "Expedição! Projeto da Franquia da Casa de Praia Momoyodou"
