[translation]
1000820-1 = "スカジャンの理由"
1000820-2 = "（ネルと待ち合わせをしたミレニアムキャンパスの広場に到着した）"
1000820-7 = "（広場の片隅にあるベンチで、ネルの姿を見つけた）"
1000820-12 = "[ns] \"……？\""
1000820-14 = "えっと、普通に通って良いのかな……。"
1000820-15 = "絶対にやめたほうがいいって！遠回りしよ！"
1000820-16 = "C&Cの部長さんって、いつ見ても怖そうだよね……。"
1000820-17 = "スカジャンが目印になって、遠目からでも分かるのが救いかも……。"
1000820-18 = "確かに……もはや目印みたいな……。"
1000820-19 = "ほら、早くあっち行こ！"
1000820-24 = "[ns] \"……。\""
1000820-26 = "[ns1] ネルに近づく。\n[ns2] 手を振ってネルを呼ぶ。"
1000820-29 = "……？"
1000820-30 = "あぁ、先生か。思ってたよりも早いじゃねぇか。"
1000820-35 = "あ？さっきからいた？来てるならさっさと声かけろよ。"
1000820-36 = "……用事？いや別に、特にねぇけど。"
1000820-37 = "まさか、理由がなかったら呼ぶなとは言わねぇだろ？#nあたしと先生の仲じゃねぇか！"
1000820-38 = "……は？"
1000820-39 = "……スカジャン？あたしのこれ？"
1000820-40 = "これがどうかしたか？"
1000820-41 = "まさか……"
1000820-42 = "先生も興味あんのか！？だったら一着やろうか？#nあ、もしお気に入りを探してぇなら店を紹介してやるぞ！"
1000820-43 = "まあ、そう簡単にいいモンが手に入るとは限らねーけどよ。#nもし先生が欲しいって言うんなら、あたしがなんとか……"
1000820-44 = "……あぁ？"
1000820-45 = "そうじゃない、って？じゃあどうしてスカジャンの話なんか振ったんだよ。"
1000820-46 = "あたしが着てる理由……？"
1000820-47 = "スカジャンを？"
1000820-48 = "……。"
1000820-49 = "[s3] \"……ネル？\"\n[s4] \"えっと、言いたくなければ無理には……\""
1000820-52 = "……！"
1000820-53 = "な、なんでもねぇよ。"
1000820-54 = "気にするな、本当に何でもねぇから。"
1000820-55 = "……あたしの格好に文句をつけるのかって、反射的に構えちまってよ。#n先生はそんなワケねぇのにな。"
1000820-56 = "スカジャンの話になると、どいつも否定的な反応ばかりだからよ。"
1000820-57 = "だからつい、悪いな。"
1000820-58 = "ま、その話はいいだろ。"
1000820-59 = "にしても、スカジャンを着てる理由、か……。"
1000820-60 = "どうしていきなり？"
1000820-61 = "[s5] \"何となく、事情があるのかなって。\"\n[s6] \"すごい気にいってそうだから。\""
1000820-64 = "……ふぅん。"
1000820-65 = "でも、どう答えたもんかな……。"
1000820-66 = "あたしが「理由なんてねぇよ」とか言ったら、どうせ先生は変に心配すんだろうし……。"
1000820-67 = "別にそれが悪いとは言わねぇけどよ。"
1000820-68 = "……いや、やっぱりなんて説明したもんかな。"
1000820-69 = "ん？"
1000820-70 = "難しく考えないで、そのままの理由が知りたい……？"
1000820-71 = "……いや、本当に大した理由じゃねぇんだよ。むしろあまりにも単純な理由だから、これで先生が納得してくれんのかなって思ってよ。"
1000820-72 = "まあ、正直に答えるしかねぇか……。"
1000820-73 = "私がスカジャンを着る理由はな……"
1000820-74 = " ……最高にイカしてるからだ！"
1000820-79 = "……どうだ？"
1000820-80 = "はははっ！なんだ、その顔！"
1000820-81 = "[s7] \"な、なるほど……。\"\n[s8] \"一周回って予想外。\""
1000820-84 = "ま、そんな反応だろうと思ったぜ。"
1000820-85 = "むしろそれ以外に反応のしようもねぇだろうけどよ。"
1000820-87 = "ま、色々想像されがちだけどな。たとえば背が低いイメージを拭うためとか。"
1000820-88 = "他人の威圧のためだとか、変なやつに絡まれないようにだとか……。"
1000820-89 = "ま、想像するのは勝手だから、好き勝手に言わせてんだけどよ。"
1000820-90 = "誰かから受け継いだんじゃねぇかとか、そういうのも聞いたことあるが……。"
1000820-92 = "……ま、本当に大した理由なんて無くてな。ただ気に入ってんだよ、見た瞬間これだ！って思ってな。"
1000820-93 = "悪かったな、つまんない答えで。"
1000820-94 = "……どうした？"
1000820-95 = "このことを知ってるやつ？#nいるわけねぇだろ。そもそもこんな真剣に聞かれたこと自体、先生が初めてだぜ。"
1000820-96 = "あたしがスカジャンを着てるのなんて、みんな当たり前だと思ってるんじゃねぇか。"
1000820-97 = "……やっぱつまんなかったろ。もっと面白い理由だったら良かったんだけどな。"
1000820-98 = "[s9] \"そんなことないよ。ネルのことをまた知れたし。\"\n[s10] \"そういう理由だからこそ、良いんじゃないかな。\""
1000820-104 = "……へえ。"
1000820-105 = "ったく、相変わらずだな先生は。"
1000820-106 = "そういうのが良いだなんて、変わってるよ。"
1000820-107 = "[s11] \"ネルの気持ちが知りたかったから。\"\n[s12] \"服くらい、他人を気にせず好きに着るものだからね。\"\n[s13] \"それに私もそれ、最高にイカしてると思う！\""
1000820-114 = "……はっ。"
1000820-115 = "くくっ……。"
1000820-116 = "ま、それでこそ先生だ。"
1000820-126 = "そういうところ、嫌いじゃねぇぜ。"
