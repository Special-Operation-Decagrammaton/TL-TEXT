[translation]
1000820-1 = "O motivo da jaqueta"
1000820-2 = "（Cheguei à praça do campus da Millennium onde combinei de encontrar a Neru）"
1000820-7 = "（Encontrei a Neru em um banco em um canto da praça）"
1000820-12 = "[ns] \"……？\""
1000820-14 = "Ei, será que podemos passar por ali normalmente...?"
1000820-15 = "É melhor nem tentar! Vamos dar a volta!"
1000820-16 = "A chefe da C&C parece assustadora toda vez que a vejo..."
1000820-17 = "Pelo menos a jaqueta serve de referência, dá para ver de longe, o que é um alívio..."
1000820-18 = "Verdade... já virou quase um marco..."
1000820-19 = "Vamos, vamos logo para lá!"
1000820-24 = "[ns] \"……。\""
1000820-26 = "[ns1] Aproximar-se de Neru.\n[ns2] Acenar para chamar a atenção de Neru."
1000820-29 = "……？"
1000820-30 = "Ah, é você, Sensei. Chegou mais cedo do que eu esperava."
1000820-35 = "Hã? Você estava aí faz tempo? Se já tinha chegado, por que não me chamou logo?"
1000820-36 = "……Algum assunto? Não, nada em especial."
1000820-37 = "Não vai me dizer que eu não posso te chamar se não tiver um motivo, né?#nAfinal, somos próximos, não somos?"
1000820-38 = "……Hã?"
1000820-39 = "……A jaqueta? Esta aqui?"
1000820-40 = "O que tem ela?"
1000820-41 = "Não me diga que..."
1000820-42 = "Você também tem interesse nela!? Quer que eu te arranje uma?#nAh, se quiser procurar uma que goste, eu te indico uma loja!"
1000820-43 = "Bem, não é sempre que se encontra algo bom tão facilmente, mas...#nSe você realmente quer uma, Sensei, eu dou um jeito..."
1000820-44 = "……Hã?"
1000820-45 = "Não é isso? Então por que você tocou no assunto da jaqueta?"
1000820-46 = "O motivo de eu usá-la...?"
1000820-47 = "A jaqueta?"
1000820-48 = "……。"
1000820-49 = "[s3] \"……Neru?\"\n[s4] \"Bem, se não quiser falar, não precisa...\""
1000820-52 = "……！"
1000820-53 = "N-não é nada."
1000820-54 = "Não se preocupe, é sério, não é nada demais."
1000820-55 = "É que eu acabei ficando na defensiva, achando que você ia reclamar do meu visual.#nMesmo sabendo que você não faria isso, Sensei."
1000820-56 = "Sempre que o assunto é essa jaqueta, todo mundo só reage de forma negativa."
1000820-57 = "Por isso eu acabei reagindo assim, foi mal."
1000820-58 = "Bom, esquece isso."
1000820-59 = "Mas, o motivo de eu usar essa jaqueta, hein..."
1000820-60 = "Por que a pergunta de repente?"
1000820-61 = "[s5] \"Senti que talvez houvesse algum motivo por trás.\"\n[s6] \"Parece que você gosta muito dela.\""
1000820-64 = "……Hum."
1000820-65 = "Mas como eu deveria responder isso..."
1000820-66 = "Se eu disser que \"não tem motivo nenhum\", você vai acabar ficando preocupado à toa, Sensei..."
1000820-67 = "Não que isso seja ruim, mas..."
1000820-68 = "……Não, como eu deveria explicar isso?"
1000820-69 = "Hã?"
1000820-70 = "Não quer que eu complique e quer saber o motivo real...?"
1000820-71 = "……Não, é que realmente não tem um motivo grandioso. É um motivo tão simples que achei que você não fosse ficar satisfeito com a resposta."
1000820-72 = "Bem, acho que só me resta responder com sinceridade..."
1000820-73 = "O motivo de eu usar essa jaqueta é..."
1000820-74 = " ...Porque ela é simplesmente incrível!"
1000820-79 = "……E aí?"
1000820-80 = "Hahaha! Qual é, que cara é essa!"
1000820-81 = "[s7] \"E-entendo...\"\n[s8] \"Isso foi totalmente inesperado.\""
1000820-84 = "Bem, eu já imaginava que você reagiria assim."
1000820-85 = "Na verdade, nem teria como reagir de outro jeito, né?"
1000820-87 = "Bom, as pessoas costumam imaginar várias coisas. Por exemplo, que é para disfarçar que sou baixa."
1000820-88 = "Ou que é para intimidar os outros, ou para evitar que gente estranha venha me incomodar..."
1000820-89 = "Bem, elas que imaginem o que quiserem, deixo falarem o que bem entenderem."
1000820-90 = "Já ouvi dizerem até que eu herdei isso de alguém..."
1000820-92 = "……Bem, a verdade é que não tem um motivo importante. Eu só gosto, quando vi pela primeira vez, pensei: é essa!"
1000820-93 = "Foi mal pela resposta sem graça."
1000820-94 = "……O que foi?"
1000820-95 = "Alguém que sabe disso? #nNem tem como. Aliás, você é a primeira pessoa que me pergunta isso tão seriamente, Sensei."
1000820-96 = "Acho que todo mundo só acha natural que eu use essa jaqueta."
1000820-97 = "……Viu só, foi sem graça, né? Teria sido melhor se fosse um motivo mais interessante."
1000820-98 = "[s9] \"Não é não. Fico feliz em conhecer mais sobre a Neru.\"\n[s10] \"Acho que é justamente por esse motivo que é legal.\""
1000820-104 = "……Hmph."
1000820-105 = "Caramba, você continua o mesmo de sempre, Sensei."
1000820-106 = "Achar isso legal... você é bem estranho."
1000820-107 = "[s11] \"É que eu queria saber o que a Neru pensa.\"\n[s12] \"Afinal, a gente deve usar o que gosta sem se importar com os outros.\"\n[s13] \"E além disso, eu também acho que ela é incrível!\""
1000820-114 = "……Ha."
1000820-115 = "Hehe..."
1000820-116 = "Bem, é por isso que você é o Sensei."
1000820-126 = "Não desgosto desse seu jeito, não."
