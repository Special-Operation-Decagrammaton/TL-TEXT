[translation]
1001708-1 = "悪夢"
1001708-2 = "うひ……プリンが一つ、プリンが二つ……"
1001708-3 = "はうっ！？"
1001708-7 = "レッドウィンター連邦学園・会長執務室"
1001708-8 = "あ、あぅ……勤務時間中なのに寝ちゃってた……。"
1001708-9 = "このところ激務が続いて、疲労がたまっていたのか……お昼寝の時間をもっと増やした方が良さそうだな。"
1001708-10 = "んっ……えっと、どれくらい寝てたのか……"
1001708-13 = "……午後の、5時？お、おやつの時間がとっくに過ぎてるじゃないか！"
1001708-14 = "いくら寝てたからと言って、おいらを差し置いておやつタイムだなんて許されない！"
1001708-15 = "親衛隊！親衛隊はどこだ！"
1001708-18 = "なんだなんだ、誰だこの事務局でうるさくしてるのは？"
1001708-19 = "なにっ！？このチェリノ様に対して「うるさい」だと！？無礼者め、口を慎め！"
1001708-20 = "お前を一か月間、トイレ掃除の刑にしてもいいんだぞ！？"
1001708-21 = "……誰だお前、なんでこんなチビがここに？"
1001708-22 = "ち、チビ！？！？"
1001708-23 = "お前まさか、おいらが誰だか知らないのか！？新入りか！？"
1001708-24 = "おいらはレッドウィンター連邦学園の生徒会長であり、書記長兼、環境美化部部長兼、清掃部部長のチェリノ様だぞ！？"
1001708-25 = "はあ？あんたみたいなチビっ子が、レッドウィンター連邦学園の生徒会長なわけないだろ？"
1001708-26 = "何を言っているんだ！見ろ、あの壁にかかったおいらの立派な肖像画……"
1001708-30 = "な、無い！？"
1001708-31 = "おいらの肖像画はどこに！？"
1001708-33 = "廊下にあった銅像も……"
1001708-36 = "おいらを称えるありとあらゆるものが……全部無くなってる！？"
1001708-38 = "どういうことだ、寝てる間にまた革命でも起きたのか！？"
1001708-39 = "…………。"
1001708-41 = "あっ、カムラッド！ちょうど良いところに！"
1001708-42 = "お、お前は忘れてないよな？レッドウィンター連邦学園の生徒会長であり書記長の、おいらのことを忘れてないよな？"
1001708-43 = "…………。"
1001708-44 = "ど、どうしてそんな目をするんだ！お前がおいらのことを忘れるはずないだろう！？"
1001708-45 = "思い出せ！……頼む、お願い、思い出して……！"
1001708-46 = "…………。"
1001708-48 = "お願いだから……思い出してよ……。"
1001708-50 = "[s] \"……チェリノ？大丈夫？\""
1001708-51 = "……はっ！"
1001708-52 = "あ、あれ……？"
1001708-53 = "[s] \"寝言がすごかったけど、大丈夫？\""
1001708-54 = "ゆ、夢だったのか……良かった……。"
1001708-55 = "全く、ひどい夢だった……親衛隊はもちろん、カムラッドまでおいらのことを忘れてしまうなんて……。"
1001708-56 = "本当に、怖かった……。"
1001708-57 = "[s] \"夢で良かったね。\""
1001708-58 = "うん……いや、全然良くない！"
1001708-59 = "他のやつらはまだしも、カムラッド！お前がおいらのことを忘れるなんて！"
1001708-60 = "[s] \"それは夢の中での話でしょ？\""
1001708-61 = "たとえ夢の中だとしても、カムラッドはカムラッドだ！"
1001708-62 = "お詫びとして、最高級のプリンを要求する！"
1001708-63 = "[s] \"何という理不尽……。\""
1001708-65 = "……そうやって拗ねてしまって、同時に少しだけ本気で悲しそうな顔をしたチェリノを慰めるのに、それなりの時間がかかった。"
