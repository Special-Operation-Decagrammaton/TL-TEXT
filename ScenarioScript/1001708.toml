[translation]
1001708-1 = "Pesadelo"
1001708-2 = "Uhi... um pudim, dois pudins..."
1001708-3 = "Hau!?"
1001708-7 = "Academia Federal Red Winter - Gabinete da Presidente"
1001708-8 = "A-ai... acabei dormindo durante o horário de trabalho..."
1001708-9 = "Ultimamente o trabalho tem sido intenso, será que o cansaço acumulou? Acho que seria bom aumentar o tempo da minha soneca."
1001708-10 = "Nnh... bem, quanto tempo eu dormi..."
1001708-13 = "...Cinco da tarde? O-o horário do lanche já passou faz tempo!"
1001708-14 = "Não importa se eu estava dormindo, não vou permitir que façam o lanche sem mim!"
1001708-15 = "Guarda de Elite! Onde está a Guarda de Elite?!"
1001708-18 = "O que é isso, quem está fazendo barulho aqui na secretaria?"
1001708-19 = "O quê!? Chamou a mim, Cherino, de 'barulhenta'!? Insolente, meça suas palavras!"
1001708-20 = "Eu poderia te condenar a um mês limpando banheiros, sabia!?"
1001708-21 = "...Quem é você, e por que essa nanica está aqui?"
1001708-22 = "Na-nanica!?!?"
1001708-23 = "Você por acaso não sabe quem eu sou!? É novato!?"
1001708-24 = "Eu sou a Presidente do Conselho Estudantil da Academia Federal Red Winter, Secretária-Geral, Chefe do Departamento de Embelezamento Ambiental e Chefe do Departamento de Limpeza, Cherino!"
1001708-25 = "Hã? Uma pirralha como você não pode ser a presidente da Academia Federal Red Winter, né?"
1001708-26 = "O que você está dizendo! Olhe, aquele meu retrato magnífico pendurado na parede..."
1001708-30 = "N-não está aqui!?"
1001708-31 = "Onde está o meu retrato!?"
1001708-33 = "A estátua que ficava no corredor também..."
1001708-36 = "Todas as coisas que me homenageiam... desapareceram completamente!?"
1001708-38 = "O que está acontecendo? Será que teve outra revolução enquanto eu dormia!?"
1001708-39 = "............"
1001708-41 = "Ah, Camarada! Que bom que você apareceu!"
1001708-42 = "V-você não esqueceu, né? Você não esqueceu de mim, a Presidente do Conselho Estudantil e Secretária-Geral da Academia Federal Red Winter, esqueceu?"
1001708-43 = "............"
1001708-44 = "Po-por que você me olha assim! Você não poderia ter me esquecido, né!?"
1001708-45 = "Lembre-se! ...Por favor, eu te peço, lembre-se...!"
1001708-46 = "............"
1001708-48 = "Por favor... lembre-se de mim..."
1001708-50 = "[s] \"...Cherino? Você está bem?\""
1001708-51 = "...Ah!"
1001708-52 = "O-o que foi...?"
1001708-53 = "[s] \"Você estava falando muito enquanto dormia, está tudo bem?\""
1001708-54 = "Fo-foi um sonho... que bom..."
1001708-55 = "Nossa, que sonho horrível... Não só a Guarda de Elite, mas até o Camarada me esquecer..."
1001708-56 = "Foi realmente assustador..."
1001708-57 = "[s] \"Que bom que foi só um sonho.\""
1001708-58 = "Sim... não, não foi nada bom!"
1001708-59 = "Os outros até que vai, mas Camarada! Você me esquecer!"
1001708-60 = "[s] \"Mas isso foi só no sonho, não foi?\""
1001708-61 = "Mesmo que tenha sido em um sonho, Camarada é Camarada!"
1001708-62 = "Como pedido de desculpas, exijo o pudim mais caro que tiver!"
1001708-63 = "[s] \"Que falta de lógica...\""
1001708-65 = "...Levou um bom tempo para consolar a Cherino, que ficou emburrada e, ao mesmo tempo, com uma expressão genuinamente triste."
