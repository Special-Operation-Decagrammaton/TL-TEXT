[translation]#[Texto Final. - Filipe 08/07.]
70000010-1 = "Encontro Suspeito (1)"
70000010-4 = "Ki…… Kiki!#nFinalmente chegamos."
70000010-5 = "Tem várias coisas que me preocupam, mas…… tudo bem, deixar pra lá."
70000010-6 = "Por que estamos aqui?"
70000010-7 = "O quê, você não sabe?#nEsta é a famosa Academia Federal Red Winter,\nque possui um vasto território e um grande número de alunas."
70000010-8 = "Não, eu sei onde estamos."
70000010-9 = "De repente um intercâmbio com Red Winter……#nMakoto-senpai, não me diga que você está planejando mais uma das suas confusões?"
70000010-11 = "Kikiki……"
70000010-12 = "Calma, Iroha. Logo você vai entender."
70000010-13 = "Tudo isso é apenas uma parte do plano brilhante que esta Makoto-sama elaborou……"
70000010-15 = "(Lá vem mais encrenca…… ainda bem que não trouxe a Ibuki)"
70000010-16 = "……Haa. Se tem um plano, pelo menos me explique direito."
70000010-17 = "Assim eu já vou pensando na hora certa de fugir."
70000010-18 = "Kikiki…… não se preocupe, Iroha.#nNão vai ser igual da última vez."
70000010-19 = "(Isso só me deixa mais preocupada……)"
70000010-27 = "Pessoal do Pandemônio, desculpem a demora.#nSou Tomoe, secretária-chefe do gabinete de Red Winter."
70000010-28 = "Vou acompanhá-los até a Cherino."
70000010-34 = "Esperaram, hein! Parlamentares de Gehenna!"
70000010-36 = "(Bigode postiço……?)"
70000010-37 = "……"
70000010-47 = "……Aquele bigode é falso?"
70000010-48 = "(Senpai…… você demorou pra perceber)"
70000010-49 = "Aquela ali é a nossa presidente do conselho estudantil de Red Winter, além de chefe do Departamento de Embelezamento Ambiental, secretária-geral, representante dos clubes esportivos, chefe da limpeza, presidente do Comitê de Disciplina, chefe da cantina, vencedora do MVP do ano, MVP da semana e MVP do dia – a Cherino-sama."
70000010-50 = "Isso mesmo! Ou seja, sou uma pessoa importante!"
70000010-52 = "Essas palavras…… me soam familiares, Makoto-senpai?"
70000010-53 = "Kikiki!!"
70000010-54 = "Não ligue, Iroha. Agora que chegamos até aqui, meu plano já é praticamente um sucesso!"
70000010-55 = "Kihyahyahya!"
70000010-64 = "Aff, o que é dessa vez……"
70000010-65 = "Não entendeu?"
70000010-66 = "Esta Makoto-sama estava em contato com a presidente do Comitê de Segurança de Red Winter, que está prestes a iniciar uma revolução!"
70000010-67 = "E hoje―― o plano será executado!"
70000010-68 = "Hã!?"
70000010-69 = "Kikikiki! Ou seja, isso é um golpe de estado usando a discórdia interna de Red Winter!"
70000010-78 = "Ora, um golpe de estado?"
70000010-79 = "É tarde demais pra perceber!#nVocês caíram direto na armadilha desta Makoto-sama e da presidente do Comitê de Segurança!"
70000010-80 = "Haa…… isso já aconteceu antes, né……"
70000010-81 = "Vamos, presidente do Comitê de Segurança!#nConforme o plano, vamos derrubar aquele baixinho ali e dividir o poder de Red Winter!"
70000010-85 = "……Ei, por que não aparece……?#nNa hora marcada, era pra……"
70000010-87 = "Tomoe. Onde está a Marina agora?"
70000010-88 = "Ela tentou um golpe na semana passada, então agora está no prédio antigo."
70000010-90 = "!?"
70000010-91 = "Ora…… entendo. Tentou outro golpe sem se cansar, foi?#nNada mal. Sua determinação, pelo menos, eu reconheço."
70000010-92 = "M-mentiras, fomos descobertos!?"
70000010-93 = "Não, provavelmente o tal 'plano' que a Makoto mencionou……#n……é o golpe da semana passada, não é……?"
70000010-94 = "Aguarde um momento.#nVou confirmar."
70000010-100 = "Presidente Marina, quanto tempo."
70000010-101 = "Acabou de chegar uma delegação do Pandemônio de Gehenna……#nParece que querem falar com você. Sabe de alguma coisa?"
70000010-102 = "Comigo……?"
70000010-103 = "Ah, é mesmo…… o golpe!#nEsqueci de avisar Gehenna!"
70000010-104 = "Secretária Tomoe, desculpa, mas pode avisar que o plano foi cancelado?#nTô ocupada limpando o chão agora……"
70000010-105 = "Entendido. Continue com a limpeza."
70000010-109 = "……Foi o que ela disse."
70000010-114 = "……"
70000010-115 = "……"
70000010-117 = "Que pena, presidente. Você errou a data, não foi?#nOu talvez a Marina tenha dito algo sobre isso……"
70000010-125 = "C-como…… o plano desta Makoto-sama……!"
70000010-129 = "Haa……#nBom, já esperava por isso."
70000010-131 = "Hmm, então leve os parlamentares do Pandemônio até o salão."
70000010-136 = "Sim!"
70000010-138 = "?"
70000010-139 = "Por aqui, por favor."
70000010-141 = "Olha, não quero me intrometer, mas……#n……é um salão, e não uma cela ou prisão? Vamos mesmo continuar com o intercâmbio?"
70000010-142 = "Do que você tá falando?#nGolpe de estado é pão-nosso de todo dia."
70000010-143 = "A Marina, que tentou um golpe escondido, foi punida……#nMas não é por causa disso que vamos perder uma oportunidade tão importante de intercâmbio com Gehenna!"
70000010-145 = "P-pão-nosso de todo dia……!?"
70000010-146 = "Tomoe, quantos golpes tivemos este mês?"
70000010-147 = "Três tentativas fracassadas e duas bem-sucedidas."
70000010-148 = "Ah, é mesmo.#nNo golpe da outra vez, ela montou num urso cinza, atravessou montanhas nevadas e mares gelados, e voltou pra academia numa grande aventura!"
70000010-149 = "Quando encontrou o urso na montanha, a Cherino-chan gritou com uma voz mais fofa do que o normal."
70000010-153 = "Cala a boca, secretária!"
70000010-154 = "Cof cof……#nEnfim, é isso, presidente."
70000010-155 = "Uma presidente como eu não se prende a essas besteiras!"
70000010-157 = "B-besteiras……!?"
70000010-158 = "O que estão fazendo!#nVão logo pro salão.#nSou uma pessoa ocupada!"
70000010-159 = "Ah, sim…… entendi……"
70000010-165 = "(Ora, ora……)"
70000010-166 = "(Makoto-senpai…… foi completamente dominada pela energia daquela presidente)"