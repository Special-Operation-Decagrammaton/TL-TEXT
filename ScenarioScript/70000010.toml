[translation]
70000010-1 = "Encontro suspeito (1)"
70000010-4 = "Qui... quiqui. #nFinalmente chegamos."
70000010-5 = "Tenho várias preocupações, mas suponho que tudo bem..."
70000010-6 = "Por que estamos aqui?"
70000010-7 = "O quê, você não sabe? #nEsta é a famosa Academia Federal de Red Winter, que ostenta uma vasta região autônoma e um grande número de alunas."
70000010-8 = "Não, eu sei onde estamos."
70000010-9 = "Mas um encontro com Red Winter, de repente... #nMakoto-senpai, não quero nem pensar, mas você não está tramando algo estranho de novo, está?"
70000010-11 = "Quiqui..."
70000010-12 = "Não se apresse tanto, Iroha. Você logo saberá."
70000010-13 = "Tudo isso é apenas uma parte do maravilhoso plano traçado por mim, Makoto..."
70000010-15 = "(Lá vem mais uma confusão... ainda bem que não trouxe a Ibuki comigo.)"
70000010-16 = "...Ah. Se há um plano, por favor, explique-o direito."
70000010-17 = "Eu preciso pensar em uma rota de fuga com antecedência."
70000010-18 = "Quiqui... não se preocupe, Iroha. #nNão será como da última vez."
70000010-19 = "(Isso me deixa ainda mais preocupada...)"
70000010-27 = "Pessoal do Pandemonium Society, peço desculpas pela espera. #nMeu nome é Tomoe, chefe da secretaria da administração de Red Winter."
70000010-28 = "Vou guiá-las até a Secretária-Geral Cherino."
70000010-34 = "Esperaram por mim! Parlamentares de Gehenna!"
70000010-36 = "(Um bigode falso...?)"
70000010-37 = "..."
70000010-47 = "...Aquele bigode é falso?"
70000010-48 = "(Senpai... você demorou para notar.)"
70000010-49 = "Aquela pessoa é a presidente do conselho estudantil da nossa Academia Federal de Red Winter, chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, representante do Departamento de Esportes, chefe do Departamento de Limpeza, presidente do Comitê Disciplinar, chefe do Departamento de Merenda, MVP deste ano, MVP desta semana e MVP de hoje: a ilustre Cherino."
70000010-50 = "Isso mesmo! Ou seja, alguém muito importante!"
70000010-52 = "De alguma forma... esse discurso me parece familiar, Makoto-senpai?"
70000010-53 = "Quiqui!!"
70000010-54 = "Não ligue para isso, Iroha. Chegando aqui, meu plano já é um sucesso!"
70000010-55 = "Quihihihihi!"
70000010-64 = "Meu Deus, o que é agora..."
70000010-65 = "Não entende?"
70000010-66 = "Eu, Makoto, tenho mantido contato com a chefe do Comitê de Segurança de Red Winter, que está tentando iniciar uma revolução!"
70000010-67 = "E hoje, o dia chegou — o plano será executado!"
70000010-68 = "O quê!?"
70000010-69 = "Quiquiquiqui! Ou seja, isso é um golpe de estado usando a guerra civil de Red Winter!"
70000010-78 = "Ora, um golpe de estado?"
70000010-79 = "Tarde demais para perceber! #nVocês caíram direitinho na armadilha minha e da chefe do Comitê de Segurança!"
70000010-80 = "Ah, parece que já passamos por isso antes..."
70000010-81 = "Vamos, chefe do Comitê de Segurança! Avance! #nComo planejado, vamos derrotar aquela baixinha e dividir o poder de Red Winter!"
70000010-85 = "...Ei, por que você não aparece...? #nO momento da execução era, se não me engano..."
70000010-87 = "Tomoe. Onde está Marina agora?"
70000010-88 = "Como ela deu um golpe de estado na semana passada, ela está no prédio antigo da escola."
70000010-90 = "!?"
70000010-91 = "Ho... entendo. Ela deu um golpe de estado de novo, sem aprender a lição? #nNada mal. Vou valorizar essa determinação."
70000010-92 = "N-não me diga que a conspiração foi descoberta!?"
70000010-93 = "Não, talvez o 'plano' a que a presidente Makoto se refere #nseja o golpe de estado da semana passada...?"
70000010-94 = "Espere um momento, por favor. #nVou confirmar."
70000010-100 = "Chefe Marina, quanto tempo."
70000010-101 = "O pessoal do Pandemonium Society de Gehenna acabou de chegar... #nParece que estão procurando pela senhora. Sabe de algo?"
70000010-102 = "Por mim...?"
70000010-103 = "Ah, é verdade... o golpe de estado! #nEsqueci de avisar Gehenna!"
70000010-104 = "Chefe de Gabinete Tomoe, peço desculpas, mas poderia avisar que o plano fracassou em meu lugar?#nEstou ocupada limpando o chão agora..."
70000010-105 = "Entendido. Continue com o bom trabalho na limpeza."
70000010-109 = "...Foi o que ela disse."
70000010-114 = "..."
70000010-115 = "..."
70000010-117 = "Que pena, Presidente. Será que você não errou a data?#nEmbora eu sinta que a Marina tenha dito algo sobre isso..."
70000010-125 = "N-não pode ser... O plano desta Makoto-sama..."
70000010-129 = "Haa...#nBem, eu já imaginava que isso aconteceria."
70000010-131 = "Hum, então guie os membros do Pandemonium até o local do evento."
70000010-136 = "Sim!"
70000010-138 = "?"
70000010-139 = "Vamos, por aqui, por favor."
70000010-141 = "Bem, não é meu lugar dizer isso, mas...#nNão é para uma prisão ou cela, é para o local do evento? Vamos mesmo prosseguir com a reunião de intercâmbio?"
70000010-142 = "Do que você está falando?#nGolpes de estado não são algo comum no dia a dia?"
70000010-143 = "A Marina tentou fazer um golpe escondida e foi expurgada, mas...#nNão vou deixar uma oportunidade tão importante quanto a reunião de intercâmbio com Gehenna escapar por causa disso!"
70000010-145 = "C-comum no dia a dia...!?"
70000010-146 = "Tomoe, quantas vezes houve um golpe de estado este mês?"
70000010-147 = "Três tentativas frustradas e dois que foram bem-sucedidos."
70000010-148 = "Ah, lembrei. Naquele último golpe, tivemos que montar em um urso cinzento, atravessar montanhas nevadas e mares de gelo, e viver uma grande aventura para retornar à academia!"
70000010-149 = "Quando encontramos o urso na montanha nevada, a Cherino-chan soltou um grito mais fofo do que o habitual, não foi?"
70000010-153 = "Ei, cale a boca, Chefe de Gabinete!"
70000010-154 = "Cof, cof...#nDe qualquer forma, é por isso, Presidente."
70000010-155 = "Uma presidente do meu calibre não se preocupa com ninharias como essas!"
70000010-157 = "Ni-ninharias...!?"
70000010-158 = "O que está fazendo!#nVamos logo para o local do evento.#nEu sou uma pessoa ocupada!"
70000010-159 = "Ah, sim... Entendido..."
70000010-165 = "(Ora, ora...)"
70000010-166 = "(A veterana Makoto... está completamente acuada pela energia daquela presidente.)"
