[translation]#[Texto Final. - Filipe 05/07.]
90100060-1 = "Episódio 6: Verdades e Mentiras"
90100060-2 = "QG do Esquadrão FOX"
90100060-6 = "Voltamos~"
90100060-7 = "Devolvi os equipamentos da operação\npros seus devidos lugares."
90100060-8 = "Esquadrão FOX, de volta à base."
90100060-9 = "[s1] \"Bom trabalho, pessoal!\"\n[s2] \"Foi puxado ficar nesse calor o tempo todo, né?\""
90100060-12 = "Sem problemas. Obrigada por nos acompanhar,\nSensei."
90100060-13 = "Com a operação encerrada e todas de volta,\nvamos organizar os dados e――"
90100060-14 = "P-Peraí um momento!"
90100060-15 = "Eu sei que é luxo, mas…… não dá pra\nencaixar uma pausa antes?"
90100060-16 = "Eu queria pelo menos um banho……"
90100060-17 = "[s] \"Ah, sobre isso……\""
90100060-18 = "Se forem usar a sala de descanso,\nmelhor esperar um pouco."
90100060-19 = "A aluna de plantão ainda não foi embora."
90100060-20 = "Tá, evitamos a sala de descanso; mas o\nchuveiro lá de fora não tem problema, né?"
90100060-21 = "Não…… lá também é arriscado. De vez em\nquando entra aluna."
90100060-22 = "Outro dia, depois do treino noturno, quase\ndei de cara com a capitã Tsukiyuki\nno chuveiro."
90100060-23 = "Quê? Por quê?!"
90100060-24 = "Não sei o motivo…… mas, se eu não tivesse\ndado meia-volta na hora,#nteriam descoberto que estamos\nno subsolo da Schale."
90100060-25 = "Sensei, que história é essa?#nPor que uma menina do Esquadrão RABBIT\nusa o chuveiro daqui?"
90100060-26 = "Não me diga que…… descobriu o ponto fraco\ndela e aplica o Castigo――"
90100060-27 = "[s3] \"N-Não, nada disso!\"\n[s4] \"I-Isso é……!\""
90100060-30 = "O acampamento do Esquadrão RABBIT, o Parque\ndos Coelhinhos, tem infraestrutura precária.#nO Sensei deve emprestar as instalações\npor bondade."
90100060-31 = "S-Será……?"
90100060-32 = "Higiene afeta diretamente o poder de combate\ndo esquadrão. Como capitã,\né uma decisão racional."
90100060-33 = "Vocês devem estar se preocupando à toa."
90100060-34 = "A Miyako não é de ceder a ameaça\nou tentação.#nVocê sabe disso, Kurumi."
90100060-35 = "É…… verdade. Viajei demais."
90100060-36 = "Foi mal, Sensei. Esquece o que eu disse."
90100060-37 = "Mas, tipo…… o que você andou imaginando\npra soltar a palavra \"Castigo\"?"
90100060-38 = "……Cala a boca."
90100060-39 = "Digna ponta de lança do Esquadrão FOX.#nSempre prevendo todas as\n\"possibilidades\"――"
90100060-40 = "Cala a boca, já falei!"
90100060-42 = "Bem. Vamos organizar o caso com os dados\ncoletados e as entrevistas."
90100060-43 = "Primeiro: até agora, foram 10 as vítimas\nencontradas perto da estação Shirounagi."
90100060-44 = "As idades variam; quase todas seguem\ninconscientes, com convulsões\nsemelhantes às epilépticas."
90100060-46 = "As vítimas foram encontradas em dias de sol\nforte, sem uma nuvem no céu.#nSempre entre 10h e 15h. Ou seja, nas horas\nmais quentes do dia."
90100060-47 = "Por isso a suspeita inicial foi insolação ou\ndesidratação; mas temperatura e exames\ndas vítimas estavam normais."
90100060-48 = "E há o ponto em comum: pouco antes, a\nmaioria avistou o \"espantalho branco\"."
90100060-50 = "No fim, que raio é esse espantalho branco?\nTem a ver com a aparência do culpado?"
90100060-51 = "E ninguém além das vítimas ter visto\no espantalho também incomoda, né……"
90100060-52 = "Pra começar, eu duvido até que seja obra\nde uma pessoa específica.#nDerrubar alguém sem deixar ferimento?\nE tanta gente assim?"
90100060-53 = "Sim. Não dá pra limitar o culpado\naos cidadãos."
90100060-54 = "A Presidente do Conselho disse que pode ser\numa lenda urbana―― um fenômeno anômalo\ncausado por um Lore, mas……"
90100060-58 = "Ela falou sério……? Então o inimigo\né assombração? Fantasma?"
90100060-59 = "Monstro desconhecido, vá lá; mas lutar\ncontra ilusão invisível não rola."
90100060-60 = "Já ouvi história de fantasma dando susto,\nmas causando dano físico? Nunca."
90100060-64 = "[ns5] \"Hmm……\"\n[ns6] \"Cravar que não existe é meio difícil……\""
90100060-67 = "Ué…… Sensei, que cara é essa?"
90100060-68 = "Não me diga que você já LUTOU\ncom fantasma?!"
90100060-69 = "Urgh, sério isso……?"
90100060-70 = "Calma, gente. Ainda não confirmamos que\na causa é um Lore."
90100060-71 = "E nós somos a força especial acionada\nprimeiro pela segurança de Kivotos.#nSeja lá o que for, não dá pra recuar."
90100060-72 = "Além do que, se não resolvermos,\né volta pra Agência Correcional."
90100060-73 = "Mas a gente é força especial, não\nsacerdotisa nem exorcista……"
90100060-78 = "Mesmo num fenômeno incompreensível:\nse há resultado, há causa."
90100060-82 = "Lembram do \"pânico dos fantasmas\"\ndo verão passado?"
90100060-83 = "Teve, né. Aquele caso do fantasma falso\nfeito com holograma?#nUma imobiliária querendo derrubar\no preço dos terrenos."
90100060-84 = "Bala e bomba não funcionavam no fantasma;\nmas a imobiliária por trás do golpe\nera bem real."
90100060-85 = "Se não dá pra resolver o resultado,\nache a causa e esmague."
90100060-86 = "Ou seja…… vamos sair prendendo todo mundo\nque espalha o boato?"
90100060-87 = "Deixa de ser boba. Isso não é\nnem um pouco realista."
90100060-88 = "……E, mesmo que fosse possível,\neu não recorreria a esse método."
90100060-89 = "[s] \"Alguma ideia melhor?\""
90100060-90 = "Primeiro, precisamos entender as condições\nde aparição do \"espantalho branco\"."
90100060-91 = "Ainda não dá pra cravar que ele é a causa,\nmas a relação com o caso é certa."
90100060-92 = "Refazendo o caminho dos locais das vítimas,\npodemos achar pistas novas.#nE a chance de nós mesmas vermos o\n\"espantalho\" não é zero."
90100060-93 = "Resumindo: seguimos com a investigação\nde campo por enquanto."
90100060-94 = "Amanhã vamos tentar um pouco mais longe."
90100060-95 = "Como dizem nos romances policiais:#ninferir sem dados suficientes é como\nassar tijolo sem argila."
90100060-100 = "Se a gente continuar sem pista,\nquem vira tijolo somos nós……"
90100060-102 = "Próximo Episódio: O Vulto que Corre na Rodovia"
