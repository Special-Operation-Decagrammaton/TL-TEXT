[translation]
90100060-1 = "Episódio 6: Verdades e Mentiras"
90100060-2 = "Quartel General do Esquadrão FOX (QG) - Porões da Schale"
90100060-6 = "Chefaaaamos~!"
90100060-7 = "Os hardwares de inteligência e varredura já estão socados nos armários de volta."
90100060-8 = "Relatório de campo: Esquadrão FOX de volta ao ninho em segurança."
90100060-9 = "[s1] \"Um brinde à sobrevivência da patrulha!\"\n[s2] \"O sol derreteu e pingou o couro de vocês na farda hoje, né? Sobrou asfalto quente e muito suor pra contar história.\""
90100060-12 = "O desgaste foi marginal, Comandante. Grata pelo suporte tático."
90100060-13 = "O perímetro foi batido e a tropa retornou intocada.#nEngatilhemos o despejo e as triagens de dados imediatamente――"
90100060-14 = "P-PAUSA TÁTICA!"
90100060-15 = "O meu cérebro clama por pódio e frescor! Eu sei que o relógio não perdoa a preguiça, mas um intervalo cívico antes dos relatórios, vai?"
90100060-16 = "A camada de suor tá empedrando a roupa íntima e as pernas... Eu sangro por um chuveiro..."
90100060-17 = "[s] \"Opa, o encanamento dos chuveiros de cima é meio... complicado...\""
90100060-18 = "O sinal tá amarelo pra banho nas instalações de descanso ainda."
90100060-19 = "O pelotão de voluntárias civis que bateu ponto no andar de cima hoje ainda não encerrou o turno de trabalho."
90100060-20 = "E se a gente desviar dos corredores do alojamento interno do Sensei e roubar a mangueira das cabines de descontaminação do lado de fora, a barra tá limpa?"
90100060-21 = "Os radares não confiam nisso. A área externa recebe migrações aleatórias de estudantes safadas o tempo inteiro."
90100060-22 = "Os batimentos quase pifaram dias atrás: pulei das trincheiras do treino noturno pra esfriar o corpo nu no banho do alojamento, e a minha cara e a da Capitã Tsukiyuki bateram de frente e quase se esbarraram molhadas no corredor!"
90100060-23 = "O QUE?! COMO ELA FOI PARAR LÁ?!"
90100060-24 = "Os relatórios falham em justificar o porquê... mas o recuo ninja imediato pro escuro foi a única coisa que cimentou o sigilo de que somos fantasmas debaixo do teto da Schale."
90100060-25 = "Despeje os podres, Sensei! Qual o crime e a putaria em andamento?#nPor que as cadetes da Força RABBIT usam as banheiras e toalhas do seu alojamento militar de madrugada?!"
90100060-26 = "O rádio da calçada sussurra a verdade então... o senhor usa escândalos como algema pra chantagear e moer 'Castigo Sádico Corporal e Abuso' nas pobrezitas nas ban--"
90100060-27 = "[s3] \"A-ABORTA A DIFAMAÇÃO CRIMINAL!! NEGAÇÃO ABSOLUTA!!\"\n[s4] \"O-O BANHO DELAS TEM LOGÍSTICA TRISTE E PURA, EU JURO--!!\""
90100060-30 = "O acampamento sem-teto do Esquadrão RABBIT apodrece nas praças do Parque Kousagi sob precariedade hidráulica e elétrica severa.#nO Sensei apenas outorga compaixão e cede os canos do alojamento e as saboneteiras da agência pro banho das praças militares por empatia de pai."
90100060-31 = "A-Ah... a tese do chuveiro humanitário suado procede...?"
90100060-32 = "A degradação bacteriológica mutila o foco letal das baionetas no front.#nA decisão da Comandante Tsukiyuki de mendigar higiene em bases aliadas demonstra raciocínio frio e cirúrgico."
90100060-33 = "A paranoia pervertida de vocês embaçou o foco e vocês morderam teorias de sadomasoquismo atoa."
90100060-34 = "O ego de aço da Miyako-chan jamais venderia o pudor pra torturadores em troco de chantagem ou banho.#nVocê lambeu bota na mesma academia, não lambeu, Kurumi-chan?"
90100060-35 = "É... Você alvejou o alvo. A histeria cegou meu rádio."
90100060-36 = "Recuo total, Sensei. Deleto a heresia pervertida das atas da reunião."
90100060-37 = "A questão central paira no ar: qual arquivo doentio o cérebro processava pra explodir a palavra 'Castigos Sádicos Corporais' em voz alta no banho?!"
90100060-38 = "……Foda-se, bico fechado."
90100060-39 = "O currículo da Batedora Tática Primária da FOX clama louvores.#nMastigar e forjar cada 'Hipótese Apocalíptica de Fetiche' podre possível e imaginar a fú--"
90100060-40 = "EU MANDEI FECHAR O BICO, DESGRAÇADA!!"
90100060-42 = "Atenção no quadro negro. Varredura cívica posta na mesa; desenharemos a anatomia mortuária e os esqueletos dos assassinatos a partir dos nossos laudos atuais."
90100060-43 = "Pauta 1: A estatística fúnebre atual nos arredores da Estação Shirounagi computa um teto exato de dez corpos orgânicos recolhidos."
90100060-44 = "A demografia cruza idades heterogêneas e a maioria das carcaças definha em estado vegetativo ininterrupto nos leitos, além de espasmos letais espelhando ataques epilépticos na maca."
90100060-46 = "O clima cívico das coletas coincide invariavelmente em dias de dominação solar pura sem escudos de nuvens, entre as métricas horárias de 1000 a 1500.#nEm tese bélica, o inferno climático do pico do meio-dia."
90100060-47 = "Isso forçou a tese laboratorial preguiçosa e barata da polícia de diagnosticar insolação e exaustão hídrica, mas as assinaturas sanguíneas e termostatos orgânicos das vítimas cospem laudos absolutamente limpos e nulos pra essas deficiências."
90100060-48 = "O fio de prata que costura a nuca dos defuntos é inegável: uma caçada aterrorizante e obsessiva nas vielas contra o vulto apelidado de 'Espantalho Alvo', momentos antes da poça de sangue e desmaio final."
90100060-50 = "E qual é o maldito RG civil e militar dessa aberração de 'Espantalho'? O design dele bate com patentes criminosas da área?"
90100060-51 = "O buraco tenebroso dessa conta é esse: por que as câmeras e o asfalto ignoram a existência do Espantalho, e só os defuntos que afundam nas macas são abençoados em enxergar ele...?"
90100060-52 = "A matemática clama a minha incredulidade de que as impressões digitais sangrentas dessa matança pertençam a um CPF e serial killer ordinário.#nDesligar sistemas nervosos e arrancar a alma das veias das vítimas sem ferir a pele e osso num grão sequer? Em massacre de manada? O poder letal pra isso beira o absurdo."
90100060-53 = "A tese se sustenta.#nO teto criminal de civis humanos e paramilitares não absorve o escopo do massacre."
90100060-54 = "A retórica da Presidente Geral do Conselho cravava o dedo e acusava que a poça de sangue em D.U. tinha a assinatura das Lendas Urbanas... o fantasma místico nascido das fofocas, apelidado de 'Lore'."
90100060-58 = "Corta pra realidade, isso é insano... O alvo da baioneta paramilitar vai ser folclore barato e maldição de filme de terror?"
90100060-59 = "Bater escudo com aliens e demônios palpáveis entra na constituição militar, agora forçar fuzilamento balístico contra espantalho mágico de fumaça invisível... foge das leis da física militar."
90100060-60 = "O catálogo mundial atesta lendas de poltergeists derrubando pratos ou assoprando nucas no banho, não ceifando cordas vocais, nocauteando pelotões no asfalto e estilhaçando neurônios a sangue frio."
90100060-64 = "[ns5] \"As leis da física nem sempre dão as cartas, garotas...\"\n[ns6] \"Cravar absolutos de que demônios mágicos não puxam gatilho neste mundo... é estatisticamente burro.\""
90100060-67 = "Pausa o motor... Sensei, de onde surgiu esse olhar sombrio e charmoso de veterano caçador de tumbas?!"
90100060-68 = "P-Por Deus... As fichas de combate do seu passado atestam fogo cruzado com poltergeists e demônios na vida real?!"
90100060-69 = "K-Kyah... I-Isso não rola no asfalto, r-rola...?"
90100060-70 = "Respirem oxigênio, a fumaça de pânico no rádio tá cega.#nA autópsia das mortes tá na maca e o diagnóstico cravando a 'Lore' fantasmagórica não possui assinatura ou bater de martelo oficial dos peritos ainda."
90100060-71 = "Ademais, nós carregamos a placa intocável e paramilitar de [ruby=SRT]Forças Especiais[/ruby] forjadas pra exterminar cânceres da cidade.#nAs fardas não recuarão quer a aberração use colete a prova de balas ou foice invisível do além."
90100060-72 = "O ultimato burocrático dita o óbvio: faliu a caçada, as barras de aço da solitária da Correcional nos engolem amanhã de manhã."
90100060-73 = "A burocracia grita na mente que a pauta do BOPE é bala quente militar e infiltração de cartel tático, e não carregar cruz benta, arruda e sal grosso como bando de exorcistas de anime..."
90100060-78 = "Por mais anômalas e alienígenas as equações dessa catástrofe se demonstrem na régua da razão, o laudo empírico final acusa a mesma regra de aço: as poças de mortos no asfalto não caem atoa.#nSe a colheita rendeu carnificina (Efeito), a praga (Causa) tem endereço orgânico."
90100060-82 = "A fita mental de vocês desenterra os surtos paranormais urbanos de fantasmas com as gangues do verão retrasado, não?"
90100060-83 = "Estatísticas confirmadas. Os radares reportaram exércitos de fantasmas, quando na real um maquinário letal e engrenagens de projetores holográficos piratas vomitavam pixels luminosos assombrados nas praças, confere?#nOs urubus agiotas da Imobiliária corromperam os terrenos na base do grito barato."
90100060-84 = "A teoria é limpa. Chumbo grosso não mata feixe de luz ou rasga ecos.#nMas o canalha covarde lucrando atrás do rádio que forjou o holograma e envenenou as telas... possuía carne e ossos no mundo mortal e pagou com sangue perante o Tribunal."
90100060-85 = "Se afundarmos a bala no resultado cego e fútil da ponta, fracassaremos e choraremos.#nA meta tática é caçar, decepar a nuca da raiz, isolar a praga primária (Causa) que espalha e lucra com a mentira de rua e estilhaçar a cabeça dela."
90100060-86 = "O rito tático de execução de campo disso... é atirar algemas e engaiolar todos os fofoqueiros sujos das calçadas do país numa penitenciária coletiva pra limpar o HD do asfalto, Capitã?"
90100060-87 = "A sua insanidade militar me estressa.#nSequestrar as vozes de um quarto do país por delação? Físicamente absurdo."
90100060-88 = "……E, por mais que as grades cimentassem o caos e suprimissem o pânico a força, não é a filosofia de limpeza cirúrgica de guerra e salvação militar que assina meus ideais pra SRT."
90100060-89 = "[s] \"O conselho abre as portas pra votos de tática armada pra amanhã.\""
90100060-90 = "A fumaça e o epicentro dessa maldição e letargia coletiva ferve no tal do 'Espantalho Alvo'. A bússola tática manda mapear, destrinchar e escravizar a anatomia de aparição dele."
90100060-91 = "Se a entidade assombrosa de palha fétida porta o título cego de assassina serial da praça, as urnas não fecharam.#nContudo, a veia e o atrito letal dele com o sangue esparramado na avenida no meio-dia são irrefutáveis e cimentados."
90100060-92 = "Se as botas trilharem no asfalto quente refazendo os vetores sangrentos e escavando as sepulturas no campo onde as presas esturricaram e pararam de bater coração... O scanner extrairá novos fios de chumbo dessa sujeira.#nA matemática não fecha que nós topemos e atiremos nos peitos desse tal 'Espantalho Alvo' cara a cara na calçada se espremer o beco."
90100060-93 = "A papelada chancelou: o roteiro tático para o amanhã impõe gastar sola e invadir as vias abertas no campo cego de novo."
90100060-94 = "As baterias pra amanhã focarão numa invasão periférica maior e rastrear mais quadras, copiado."
90100060-95 = "O rito de Sherlock manda na ciência de caça mortuária, não manda?#n'Forçar laudos e deduções cegos sem a matéria prima e os esqueletos na mesa, é a mesma patifaria insana que queimar barro pra fabricar tijolo de argila sem dispor da argila na massa'."
90100060-100 = "Se as nossas garras e miras escavarem lixo nas calçadas pra achar pistas amanhã e a peneira sair oca e vazia de ossos... As nossas patentes apodrecem de fracasso e viramos argila na cova de correções, sem escusas..."
90100060-102 = "Próximo Episódio: Sombras Correndo na Rodovia"