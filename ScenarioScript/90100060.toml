[translation]#[Texto Final. - Filipe 13/07.]
90100060-1 = "Episódio 6; Verdades e Mentiras" 
90100060-2 = "QG do Esquadrão FOX"
90100060-6 = "Voltamos~"
90100060-7 = "Devolvi os equipamentos da operação pros seus devidos lugares."
90100060-8 = "Esquadrão FOX, de volta à base."
90100060-9 = "[s1] \"Bom trabalho, pessoal!\"\n[s2] \"Foi puxado ficar nesse calor o tempo todo, né?\""
90100060-12 = "Sem problemas. Obrigada por nos acompanhar,#nSensei."
90100060-13 = "Com a operação encerrada e todas de volta, vamos organizar os dados e――"
90100060-14 = "P-Peraí um momento!"
90100060-15 = "Eu sei que é luxo, mas……#nnão dá pra encaixar uma pausa antes?"
90100060-16 = "Eu queria pelo menos um banho……"
90100060-17 = "[s] \"Ah, sobre isso……\""
90100060-18 = "Se forem usar a sala de descanso, melhor esperar um pouco."
90100060-19 = "A aluna de plantão ainda não foi embora."
90100060-20 = "Tá, evitamos a sala de descanso;#nmas o chuveiro lá de fora não tem problema, né?"
90100060-21 = "Não…… lá também é arriscado.#nDe vez em quando entra aluna."
90100060-22 = "Outro dia, depois do treino noturno,#nquase dei de cara com a capitã Tsukiyuki no chuveiro."
90100060-23 = "Quê? Por quê?!"
90100060-24 = "Não sei o motivo…… mas, se eu não tivesse dado meia-volta na hora,#nteriam descoberto que estamos no subsolo da Schale."
90100060-25 = "Sensei, que história é essa?#nPor que uma menina do Esquadrão RABBIT usa o chuveiro daqui?"
90100060-26 = "Não me diga que……#ndescobriu o ponto fraco dela e aplica o Castigo――"
90100060-27 = "[s3] \"N-Não, nada disso!\"\n[s4] \"I-Isso é……!\""
90100060-30 = "O acampamento do Esquadrão RABBIT, o Parque dos Coelhinhos, tem infraestrutura precária.#nO Sensei deve emprestar as instalações por bondade."
90100060-31 = "S-Será……?"
90100060-32 = "Higiene afeta diretamente o poder de combate do esquadrão.#nComo capitã, é uma decisão racional."
90100060-33 = "Vocês devem estar se preocupando à toa."
90100060-34 = "A Miyako não é de ceder a ameaça ou tentação.#nVocê sabe disso, Kurumi."
90100060-35 = "É…… verdade. Viajei demais."
90100060-36 = "Foi mal, Sensei. Esquece o que eu disse."
90100060-37 = "Mas, tipo……#no que você andou imaginando pra soltar a palavra \"Castigo\"?"
90100060-38 = "……Cala a boca."
90100060-39 = "Digna ponta de lança do Esquadrão FOX.#nSempre prevendo todas as \"possibilidades\"――"
90100060-40 = "Cala a boca, já falei!"
90100060-42 = "Bem. Vamos organizar o caso com os dados coletados e as entrevistas."
90100060-43 = "Primeiro: até agora, foram 10 as vítimas encontradas perto da estação Shirounagi."
90100060-44 = "As idades variam; quase todas seguem inconscientes, com convulsões semelhantes às epilépticas."
90100060-46 = "As vítimas foram encontradas em dias de sol forte, sem uma nuvem no céu.#nSempre entre 10h e 15h. Ou seja, nas horas mais quentes do dia."
90100060-47 = "Por isso a suspeita inicial foi insolação ou desidratação;#nmas temperatura e exames das vítimas estavam normais."
90100060-48 = "E há o ponto em comum: pouco antes, a maioria avistou o \"espantalho branco\"."
90100060-50 = "No fim, que raio é esse espantalho branco?#nTem a ver com a aparência do culpado?"
90100060-51 = "E ninguém além das vítimas ter visto o espantalho também incomoda, né……"
90100060-52 = "Pra começar, eu duvido até que seja obra de uma pessoa específica.#nDerrubar alguém sem deixar ferimento?#nE tanta gente assim?"
90100060-53 = "Sim. Não dá pra limitar o culpado aos cidadãos."
90100060-54 = "A Presidente do Conselho disse que pode ser uma lenda urbana――#num fenômeno anômalo causado por um Lore, mas……"
90100060-58 = "Ela falou sério……?#nEntão o inimigo é assombração? Fantasma?"
90100060-59 = "Monstro desconhecido, vá lá; mas lutar contra ilusão invisível não rola."
90100060-60 = "Já ouvi história de fantasma dando susto, mas causando dano físico? Nunca."
90100060-64 = "[ns5] \"Hmm……\"\n[ns6] \"Cravar que não existe é meio difícil……\""
90100060-67 = "Ué…… Sensei, que cara é essa?"
90100060-68 = "Não me diga que você já LUTOU com fantasma?!"
90100060-69 = "Urgh, sério isso……?"
90100060-70 = "Calma, gente. Ainda não confirmamos que a causa é um Lore."
90100060-71 = "E nós somos a força especial acionada primeiro pela segurança de Kivotos.#nSeja lá o que for, não dá pra recuar."
90100060-72 = "Além do que, se não resolvermos, é volta pra Agência Correcional."
90100060-73 = "Mas a gente é força especial, não sacerdotisa nem exorcista……"
90100060-78 = "Mesmo num fenômeno incompreensível: se há resultado, há causa."
90100060-82 = "Lembram do \"pânico dos fantasmas\" do verão passado?"
90100060-83 = "Teve, né. Aquele caso do fantasma falso feito com holograma?#nUma imobiliária querendo derrubar o preço dos terrenos."
90100060-84 = "Bala e bomba não funcionavam no fantasma;#nmas a imobiliária por trás do golpe era bem real."
90100060-85 = "Se não dá pra resolver o resultado, ache a causa e esmague."
90100060-86 = "Ou seja…… vamos sair prendendo todo mundo que espalha o boato?"
90100060-87 = "Deixa de ser boba. Isso não é nem um pouco realista."
90100060-88 = "……E, mesmo que fosse possível, eu não recorreria a esse método."
90100060-89 = "[s] \"Alguma ideia melhor?\""
90100060-90 = "Primeiro, precisamos entender as condições de aparição do \"espantalho branco\"."
90100060-91 = "Ainda não dá pra cravar que ele é a causa, mas a relação com o caso é certa."
90100060-92 = "Refazendo o caminho dos locais das vítimas, podemos achar pistas novas.#nE a chance de nós mesmas vermos o \"espantalho\" não é zero."
90100060-93 = "Resumindo: seguimos com a investigação de campo por enquanto."
90100060-94 = "Amanhã vamos tentar um pouco mais longe."
90100060-95 = "Como dizem nos romances policiais:#ninferir sem dados suficientes é como assar tijolo sem argila."
90100060-100 = "Se a gente continuar sem pista, quem vira tijolo somos nós……"
90100060-102 = "Próximo Episódio;O Vulto que Corre na Rodovia"