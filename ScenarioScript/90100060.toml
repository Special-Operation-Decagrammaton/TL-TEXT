[translation]
90100060-1 = "Episódio 6: Verdades e Mentiras"
90100060-2 = "QG do Esquadrão FOX"
90100060-6 = "Chegamos!"
90100060-7 = "Já devolvi os equipamentos que usamos na operação para o lugar de origem."
90100060-8 = "Esquadrão FOX, de volta à base."
90100060-9 = "[s1] \"Pessoal, bom trabalho!\"\n[s2] \"Deve ter sido difícil ficar tanto tempo sob esse calor, não é?\""
90100060-12 = "Sem problemas. Obrigado por nos acompanhar, Sensei."
90100060-13 = "Como a operação terminou e todos retornaram, vou organizar os dados agora..."
90100060-14 = "Ei, espera um pouco!"
90100060-15 = "Eu sei que é pedir demais, mas será que não podemos fazer uma pausa antes disso?"
90100060-16 = "Eu queria pelo menos tomar um banho..."
90100060-17 = "[s] \"Ah, sobre isso...\""
90100060-18 = "Se for usar a sala de descanso, talvez seja melhor esperar um pouco."
90100060-19 = "As alunas que estão de plantão ainda não foram embora."
90100060-20 = "Se evitarmos a sala de descanso, o chuveiro lá de fora não serve?"
90100060-21 = "Não... lá também não é seguro. As alunas entram e saem de vez em quando."
90100060-22 = "Da última vez, fui ao chuveiro depois do treino noturno e quase dei de cara com a líder do esquadrão."
90100060-23 = "Hã, por quê!?"
90100060-24 = "Não sei o motivo... mas se eu não tivesse voltado na hora, acho que teriam descoberto que estamos no subsolo do Schale."
90100060-25 = "Sensei, o que isso significa? Por que as garotas do Esquadrão RABBIT estão usando o chuveiro?"
90100060-26 = "Será que... você está usando fraquezas delas para dar um 'castigo'..."
90100060-27 = "[s3] \"N-não, nada disso!\"\n[s4] \"I-isso é...!\""
90100060-30 = "O Parque dos Coelhinhos, onde o Esquadrão RABBIT está acampado, carece de infraestrutura. O Sensei provavelmente está apenas sendo gentil ao emprestar as instalações."
90100060-31 = "É, é isso mesmo...?"
90100060-32 = "Questões de higiene afetam diretamente o poder de combate de um esquadrão. Como líder, é uma decisão racional."
90100060-33 = "Talvez você esteja se preocupando demais."
90100060-34 = "A Miyako não é do tipo que se deixa levar por ameaças ou tentações. A Kurumi também sabe disso, não sabe?"
90100060-35 = "É... tem razão. Acho que pensei demais."
90100060-36 = "Desculpe, Sensei. Esqueça o que eu disse."
90100060-37 = "Mas, o que você estava imaginando para soltar uma palavra como 'castigo'?"
90100060-38 = "...Cala a boca."
90100060-39 = "Como esperado da ponta de lança do Esquadrão FOX. Sempre prevendo todas as 'possibilidades'..."
90100060-40 = "Eu disse para calar a boca!"
90100060-42 = "Bem, vamos organizar o caso com base nos dados coletados e nos resultados das entrevistas."
90100060-43 = "Primeiro, o número total de vítimas encontradas na área da Estação Shirounagi é de 10 pessoas."
90100060-44 = "As idades variam, e a maioria ainda não recuperou a consciência, apresentando sintomas de convulsão semelhantes à epilepsia."
90100060-46 = "As vítimas foram encontradas principalmente em dias de sol forte e sem nuvens. O horário das descobertas foi entre 10:00 e 15:00. Ou seja, no período mais quente do dia."
90100060-47 = "Por isso, inicialmente suspeitou-se de insolação ou desidratação, mas não foram encontradas anormalidades na temperatura corporal ou nos componentes sanguíneos das vítimas."
90100060-48 = "Um ponto em comum é que muitas das vítimas relataram ter visto um 'espantalho branco' pouco antes do incidente."
90100060-50 = "No fim das contas, o que é esse espantalho branco? Tem relação com as características do culpado?"
90100060-51 = "Também é estranho que ninguém além das vítimas tenha visto esse espantalho..."
90100060-52 = "Para começar, eu nem acho que isso seja obra de uma pessoa específica. Você acha mesmo que alguém conseguiria desmaiar tantas pessoas sem causar ferimentos físicos?"
90100060-53 = "Sim. Não podemos limitar o suspeito a um cidadão comum."
90100060-54 = "A Presidente do Conselho Estudantil Federal disse que isso pode ser uma lenda urbana — ou seja, um fenômeno peculiar causado por um 'lore'..."
90100060-58 = "Você está falando sério...? Então o inimigo é um fantasma ou uma história de terror?"
90100060-59 = "Já é difícil lutar contra um monstro desconhecido, agora lutar contra um fantasma invisível é impossível."
90100060-60 = "Até existem histórias de fantasmas que assustam as pessoas, mas nunca ouvi falar de um que causasse danos físicos."
90100060-64 = "[ns5] \"Hmm...\"\n[ns6] \"É difícil afirmar com certeza que não existe nada...\""
90100060-67 = "Hã... Sensei, por que você está com essa cara?"
90100060-68 = "Não me diga que você já lutou contra um fantasma!?"
90100060-69 = "Ué, sério mesmo...?"
90100060-70 = "Pessoal, calma. Ainda não está confirmado que a causa do incidente é a Roa."
90100060-71 = "Além disso, nós somos enviadas rapidamente para garantir a segurança de Kivotos.#nNão podemos recuar, não importa quem seja o oponente."
90100060-72 = "Para começo de conversa, se não resolvermos isso, voltaremos direto para o Departamento Correcional."
90100060-73 = "Mas nós somos uma unidade de forças especiais, não sacerdotisas..."
90100060-78 = "Mesmo que seja um fenômeno inexplicável que foge à nossa compreensão, se existe um resultado, também existe uma causa."
90100060-82 = "Vocês se lembram daquele 'incidente fantasma' do verão passado?"
90100060-83 = "Lembro. Aquele caso em que criaram fantasmas falsos com projetores de holograma, né?#nSe não me engano, era uma imobiliária tentando baixar o preço dos terrenos."
90100060-84 = "Balas e bombas não funcionavam contra os fantasmas, mas a imobiliária por trás da farsa era uma entidade real."
90100060-85 = "Se não podemos resolver o resultado do problema, basta encontrar a causa e eliminá-la."
90100060-86 = "Então quer dizer... que vamos prender todo mundo que estiver espalhando esses boatos?"
90100060-87 = "Não fala besteira. Isso não é nada realista."
90100060-88 = "...Mesmo que fosse possível, não é um método que eu gostaria de usar."
90100060-89 = "[s] \"Alguma ideia melhor?\""
90100060-90 = "Primeiro, devemos entender as condições de aparição do 'espantalho branco' que as vítimas dizem ter visto."
90100060-91 = "Ainda não podemos afirmar que o 'espantalho branco' é a causa, mas é certo que ele tem relação com o incidente."
90100060-92 = "Se refazermos o caminho pelos locais onde as vítimas foram encontradas, talvez encontremos novas pistas.#nE a chance de nós mesmas avistarmos o 'espantalho branco' não é zero."
90100060-93 = "Ou seja, por enquanto vamos continuar com as investigações externas."
90100060-94 = "Amanhã vamos tentar procurar um pouco mais longe."
90100060-95 = "Tem naqueles romances de mistério, não tem?#nFazer deduções sem dados suficientes é como tentar assar tijolos sem argila."
90100060-100 = "Se a gente não conseguir nenhuma pista logo, quem vai virar tijolo somos nós..."
90100060-102 = "Próximo episódio: A silhueta que corre na rodovia"
