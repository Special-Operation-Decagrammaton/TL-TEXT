[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100060-1 = "Episódio 6: Verdades e Mentiras"
90100060-2 = "Quartel-General do Esquadrão FOX (subsolo da Schale)"
90100060-6 = "Chegamos~!"
90100060-7 = "Equipamentos guardados."
90100060-8 = "Esquadrão FOX de volta com segurança."
90100060-9 = "[s1] \"Um brinde à sobrevivência!\"\n[s2] \"O sol torrou o couro de vocês hoje, hein?\""
90100060-12 = "Danos mínimos, comandante. Obrigada pelo suporte."
90100060-13 = "Perímetro limpo. Vamos começar a triagem dos dados――"
90100060-14 = "PAUSA TÁTICA!"
90100060-15 = "Preciso de ar fresco! Sei que temos trabalho, mas um intervalo antes do relatório, vai?"
90100060-16 = "O suor já está empedrando a roupa... preciso de um banho..."
90100060-17 = "[s] \"Opa, o encanamento dos chuveiros lá de cima está meio... complicado...\""
90100060-18 = "Ainda não dá para usar os banheiros do andar de cima."
90100060-19 = "As voluntárias que estão trabalhando hoje ainda não foram embora."
90100060-20 = "E se a gente usar a mangueira externa sem passar pelos corredores?"
90100060-21 = "Arriscado. Muita gente circula lá fora."
90100060-22 = "Outro dia, quase trombei com a capitã Tsukiyuki quando saí do chuveiro à noite, pelada!"
90100060-23 = "O QUÊ?! COMO ELA FOI PARAR LÁ?!"
90100060-24 = "Não sei, mas consegui escapar a tempo. Ainda bem que somos invisíveis."
90100060-25 = "Sensei, me conta a verdade! O que está acontecendo?#nPor que o Esquadrão RABBIT está usando a sua banheira de madrugada?!"
90100060-26 = "Então a fofoca é verdade... o senhor as chantageia com \"castigos sádicos\"――"
90100060-27 = "[s3] \"C-CALÚNIA! NEGAÇÃO TOTAL!\"\n[s4] \"O BANHO DELAS É POR NECESSIDADE BÁSICA, EU JURO--!!\""
90100060-30 = "O acampamento do RABBIT no Parque Kousagi não tem infraestrutura.#nO Sensei apenas cede o espaço por bondade."
90100060-31 = "A-Ah... então é humanitário...?"
90100060-32 = "Problemas de higiene afetam o desempenho no campo. A decisão é correta."
90100060-33 = "A paranóia de vocês fez perder o foco."
90100060-34 = "A Miyako-chan jamais se venderia por chantagem. Você estudou com ela, Kurumi-chan, não estudou?"
90100060-35 = "É... você tem razão. Foi histeria minha."
90100060-36 = "Desculpe, Sensei. Vou deletar essas heresias da ata."
90100060-37 = "Mas uma pergunta: o que passou na sua cabeça para falar \"castigos sádicos corporais\" em voz alta?"
90100060-38 = "……Cala a boca."
90100060-39 = "A treinadora tática do Esquadrão FOX é muito competente.#nEla levanta todas as \"hipóteses apocalípticas\" possíveis, incluindo――"
90100060-40 = "EU MANDEI CALAR A BOCA, PORRA!"
90100060-42 = "Agora, vamos analisar os dados."
90100060-43 = "Pauta 1: Foram recolhidos exatamente 10 corpos na região da Estação Shirounagi."
90100060-44 = "Idades variadas. A maioria ainda em coma vegetativo, com convulsões."
90100060-46 = "Os incidentes ocorrem em dias de muito sol, entre 10h e 15h.#nOu seja, no pico do calor."
90100060-47 = "Por isso, a polícia suspeitou de insolação. Mas os sinais vitais e o sangue das vítimas não apontam para isso."
90100060-48 = "Há um fio condutor: todas perseguiam um suposto \"espantalho alvo\" antes de desmaiar."
90100060-50 = "E qual é a identidade desse tal \"espantalho\"? Tem ligação com crimes comuns?"
90100060-51 = "O mistério é: por que só as vítimas veem o espantalho?"
90100060-52 = "Pra mim, é impossível que seja um serial killer comum.#nParalisar o sistema nervoso sem danos físicos? Em massa? O poder disso seria absurdo."
90100060-53 = "Concordo. Não é algo de criminoso comum."
90100060-54 = "A Presidente sugeriu que pode ser uma \"Lore\" – uma lenda urbana materializada."
90100060-58 = "Isso é loucura... Vamos atirar em lendas de terror agora?"
90100060-59 = "Enfrentar aliens e demônios ainda vai. Mas atirar em espantalho mágico invisível é fora da nossa alçada."
90100060-60 = "Lendas de poltergeist são coisas de derrubar pratos, não de paralisar tropas."
90100060-64 = "[ns5] \"Nem sempre a física explica tudo, garotas...\"\n[ns6] \"Dizer com certeza que demônios não existem neste mundo... é estatisticamente burro.\""
90100060-67 = "Perai... Sensei, de onde veio esse olhar de quem já viu de tudo?"
90100060-68 = "M-Meu Deus... O senhor já enfrentou poltergeist ou demônio de verdade?!"
90100060-69 = "K-Kyaa... isso é coisa real?!"
90100060-70 = "Calma. Ainda não confirmaram que é uma Lore."
90100060-71 = "Além disso, somos a SRT, feitas para exterminar ameaças.#nVamos lutar seja contra colete à prova de balas ou foice invisível."
90100060-72 = "E se falharmos, amanhã voltamos para a solitária."
90100060-73 = "Mas o nosso treinamento é para guerra, não para ser exorcista de anime..."
90100060-78 = "Por mais estranho que pareça, a regra básica é: efeito tem causa.#nMortos não caem do nada."
90100060-82 = "Lembram da \"assombração\" de verão retrasado?"
90100060-83 = "Sim, aquela dos hologramas. Uma imobiliária queria desvalorizar o terreno."
90100060-84 = "Exato. Não adiantava atirar no holograma. Mas quem o projetava era de carne e osso e foi punido."
90100060-85 = "Se focarmos só no efeito, falharemos.#nTemos que achar a causa raiz do problema."
90100060-86 = "Então vamos prender todos os fofoqueiros da cidade para limpar o asfalto, capitã?"
90100060-87 = "Isso é loucura. Impraticável."
90100060-88 = "……E mesmo que fosse possível, não é esse o método da SRT."
90100060-89 = "[s] \"Têm alguma sugestão?\""
90100060-90 = "A chave está no \"Espantalho Alvo\". Temos que mapear como ele aparece."
90100060-91 = "Ainda não sabemos se ele é o assassino, mas certamente está ligado aos incidentes."
90100060-92 = "Se refizermos os passos das vítimas, talvez encontremos novas pistas.#nQuem sabe a gente mesma o encontre."
90100060-93 = "Então amanhã vamos continuar a investigação de campo."
90100060-94 = "Vamos expandir o perímetro, copiado."
90100060-95 = "Como dizem em investigação:#n\"Forçar conclusões sem evidências é construir tijolos sem barro\"."
90100060-100 = "Se amanhã a gente não achar nada... vamos virar argila na prisão..."
90100060-102 = "Próximo Episódio: Sombras na Rodovia"