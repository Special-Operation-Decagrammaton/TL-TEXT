[translation]
90100060-1 = "Episode 6;Truth and Lies"
90100060-2 = "FOX Platoon HQ"
90100060-6 = "We're back."
90100060-7 = "I've returned all the equipment used in the operation to its original place."
90100060-8 = "FOX Platoon, reporting back."
90100060-9 = "[s1] \"Good work, everyone!\"\n[s2] \"It must have been tough out there in the heat, right?\""
90100060-12 = "No problem at all. Thank you for accompanying us, Sensei."
90100060-13 = "Since the operation is complete and everyone has returned, I'll go ahead and organize the data—"
90100060-14 = "W-wait a second!"
90100060-15 = "I know it sounds like a luxury, but could we take a break before that?"
90100060-16 = "I'd at least like to take a shower..."
90100060-17 = "[s] \"Ah, about that...\""
90100060-18 = "If you're planning to use the break room, you might want to wait a bit."
90100060-19 = "The student on duty hasn't left yet."
90100060-20 = "If we avoid the break room, wouldn't the outdoor shower be fine?"
90100060-21 = "No... I wouldn't let my guard down there either. Students come and go there sometimes."
90100060-22 = "The other day, after a night training session, I almost ran into the RABBIT Platoon leader at the shower room."
90100060-23 = "Wait, why!?"
90100060-24 = "I don't know the reason... but if I hadn't turned back immediately, I think our presence in the Schale basement would have been exposed."
90100060-25 = "Sensei, what does that mean? Why is a student from RABBIT Platoon using the shower room?"
90100060-26 = "Could it be... that you're holding something over them to punish them—"
90100060-27 = "[s3] \"N-no, that's not it!\"\n[s4] \"T-that's...!\""
90100060-30 = "The Rabbit Park, where RABBIT Platoon is stationed, lacks proper infrastructure. Sensei is likely just lending them the facilities out of kindness."
90100060-31 = "O-oh, is that so...?"
90100060-32 = "Hygiene is directly linked to a platoon's combat effectiveness. It's a rational decision for a platoon leader to make."
90100060-33 = "Perhaps you're worrying a bit too much."
90100060-34 = "Miyako isn't the type to give in to threats or temptations. You know that too, Kurumi, right?"
90100060-35 = "That's... true. I guess I was overthinking it."
90100060-36 = "Sorry, Sensei. Forget what I just said."
90100060-37 = "But seriously, what kind of imagination leads to the word 'punishment'?"
90100060-38 = "...Shut up."
90100060-39 = "As expected of FOX Platoon's point man. Always anticipating every 'possibility'—"
90100060-40 = "I said shut up!"
90100060-42 = "Now, let's organize the case based on the collected data and the results of our inquiries."
90100060-43 = "First, there have been a total of 10 victims discovered around Shirounagi Station so far."
90100060-44 = "Their ages vary, and most have yet to regain consciousness, exhibiting seizure-like symptoms similar to epilepsy."
90100060-46 = "The victims were discovered on clear, sunny days. The discovery times were between 10:00 and 15:00. In other words, during the hottest part of the day."
90100060-47 = "Because of this, heatstroke or dehydration were initially suspected, but no abnormalities were found in the victims' body temperatures or blood chemistry."
90100060-48 = "A common thread is that many of the victims reported seeing a 'white scarecrow' just before the incident."
90100060-50 = "So, what is that white scarecrow anyway? Does it have anything to do with the culprit's characteristics?"
90100060-51 = "It's also strange that no one other than the victims saw the scarecrow..."
90100060-52 = "Honestly, I'm not even sure if this is the work of a specific individual. Do you think it's possible to knock someone out without leaving any physical trauma? And to do it to so many people?"
90100060-53 = "Indeed. We cannot limit the suspects to civilians."
90100060-54 = "The General Student Council President mentioned that this might be an urban legend—a peculiar phenomenon caused by a lore."
90100060-58 = "Are you serious...? So we're dealing with ghost stories or spirits?"
90100060-59 = "Fighting an unknown monster is one thing, but fighting an invisible phantom is impossible."
90100060-60 = "I've heard stories of ghosts scaring people, but never of them causing physical harm."
90100060-64 = "[ns5] \"Hmm...\"\n[ns6] \"It might be hard to say for sure that it's impossible...\""
90100060-67 = "Wait... Sensei, why are you making that face?"
90100060-68 = "Don't tell me you've actually fought a ghost before!?"
90100060-69 = "Whoa, seriously...?"
90100060-70 = "Everyone, calm down. It hasn't been confirmed that the cause of the incident is a lore."
90100060-71 = "Besides, we are a Special Forces unit deployed for the safety of Kivotos. No matter what the opponent is, we cannot back down."
90100060-72 = "Besides, if we can't solve this, we'll be sent right back to the Correctional Bureau."
90100060-73 = "But we're a Special Forces unit, not shrine maidens or exorcists..."
90100060-78 = "Even if it's an inexplicable phenomenon beyond our understanding, if there is a result, there must be a cause."
90100060-82 = "Do you remember the 'ghost incident' from last summer?"
90100060-83 = "I remember. The one where they used hologram devices to create fake ghosts? A real estate agent was trying to lower property values, right?"
90100060-84 = "Guns and bombs didn't work on the ghosts, but the real estate agent who orchestrated the incident was a real, physical entity."
90100060-85 = "If you can't solve the result—the problem—then you just need to find the cause and crush it."
90100060-86 = "So... you're saying we should arrest everyone spreading these rumors?"
90100060-87 = "Don't be ridiculous. That's not realistic."
90100060-88 = "...Even if it were possible, I wouldn't want to use that method."
90100060-89 = "[s] \"Any better ideas?\""
90100060-90 = "First, we should determine the conditions under which the 'white scarecrow' appears."
90100060-91 = "We can't conclude yet if the 'white scarecrow' is the cause, but it's certainly related to the incidents."
90100060-92 = "Retracing the locations where the victims were found might lead to new clues. There's also a non-zero chance that we might be able to see the 'white scarecrow' ourselves."
90100060-93 = "So, we're continuing the outdoor investigation for the time being."
90100060-94 = "Let's try checking a bit further out tomorrow."
90100060-95 = "It's like in detective novels, isn't it? Reasoning without sufficient data is like trying to bake bricks without clay."
90100060-100 = "If we don't find any clues soon, we're going to be the ones turning into bricks..."
90100060-102 = "Next Episode;A Shadow Running on the Highway"