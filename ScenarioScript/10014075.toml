[translation]
10014075-2 = "はぁ、はぁ……"
10014075-3 = "も、もう……この辺でいいんじゃないの……"
10014075-9 = "この辺りなら大丈夫かな……？#nトリニティ自治区まで来たし……"
10014075-10 = "っていうか、逃げる必要があったの？#nほぼ勝ったようなものだったじゃん……？"
10014075-11 = "いや、あれ以上の時間稼ぎは本当に危ない。#nそろそろヴァルキューレのサツが来る頃だったから……"
10014075-12 = "あの場に残ってたら、今頃みんな捕まってただろうね。"
10014075-13 = "そ、そうなんだ……。"
10014075-17 = "……ところで「サツ」って何？"
10014075-21 = "……あ。"
10014075-22 = "[s1] \"専門用語が……\"\n[s2] \"たぶん、ヴァルキューレ警察学校のことだよ。\""
10014075-23 = "ああ……警察学校の生徒の事か……。#nつか、よく先生もそんなの知ってるね。"
10014075-24 = "ああ……警察学校の生徒の事か……。#nつか、よく先生もそんなの知ってるね。"
10014075-29 = "そして、キャスパリーグの復活を阻止しようとした彼女らは……#n逆に一掃されてしまったのであった。"
10014075-30 = "ああ……世界は魔獣の復活を防ぐ事ができず、再び闇の時代へ――"
10014075-37 = "やめてよ！！！"
10014075-39 = "もう！！"
10014075-41 = "やめて"
10014075-43 = "って！！"
10014075-45 = "言った"
10014075-47 = "でしょ！"
10014075-49 = "サイアク！！"
10014075-51 = "あ、ああ～！！あああ～～～！！これ、が……"
10014075-53 = "あはは……"
10014075-54 = "……くくっ。"
10014075-55 = "[s3] \"楽しそうだね、ヨシミ。\"\n[s4] \"ここ最近で一番の笑顔だよ。\""
10014075-56 = "……うん、もちろん。"
10014075-57 = "……うん、もちろん。"
10014075-58 = "今最高に楽しいから……このままでいさせて。"
10014075-60 = "……ところで、こいつはどうするの？"
10014075-61 = "こいつ……？#nあー……"
10014075-67 = "そういえば……壁を壊した時からもう気絶していましたね……"
10014075-68 = "うーん。戦うどころか、私たちの顔も見てないだろうね。"
10014075-69 = "でも幸い、特に怪我したりは……なさそうです！"
10014075-74 = "……そう。じゃ、気にしなくていいよ。#nまあ、適当にこの辺のベンチに寝かせておけばいいから。"
10014075-81 = "え、ええ！？！？#nカ、カズサちゃん！？"
10014075-82 = "いやちょっと……いくらなんでも、気絶した人をそのままベンチに放置は……"
10014075-84 = "……いや待って、私を信じて。#nこいつ本当に大丈夫だから。"
10014075-85 = "知ってて言ってる……こういうの何回も見てきてるし。#nってか、そもそもこいつ、ベンチで寝るの好きだし。"
10014075-86 = "なるほど……悪縁から育まれた信頼関係か。"
10014075-88 = "……ロマンだね。"
10014075-89 = "[s5] \"……うん、確かに。\"\n[s6] \"今回はナツの話が正しいかもね。\""
10014075-90 = "もう、うるさいよ！！#n何がロマンよ……"
10014075-91 = "もう、うるさいよ！！#n何がロマンよ……"
10014075-95 = "……うーん。"
10014075-99 = "……何してんの？"
10014075-100 = "カズサちゃん、それ……挑戦状？#nレイサちゃんに返すの？"
10014075-101 = "まぁ……私が持っててもしょうがないから、持ち主に返す。#nそれだけ。"
10014075-103 = "なるほど。ツンデレってことか。"
10014075-104 = "やめろって言ったよね。"
10014075-105 = "はぁ、ホント疲れた……どうしてこんな事に……"
10014075-110 = "いーい腹時計を持ってらっしゃるわねぇ？"
10014075-111 = "みんな一晩中頑張ったからね……"
10014075-112 = "うむ。糖分補給が必要だな。"
10014075-113 = "[s7] \"じゃあ、何か食べに行こうか。\"\n[s8] \"今日は先生の奢りだよ。\""
10014075-120 = "……やったー！！"
