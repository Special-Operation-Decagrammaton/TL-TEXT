[translation]
10052190-3 = "...Por que?"
10052190-4 = "Por que você continua resistindo em vão?"
10052190-5 = "Quanto mais você luta, mais sua dor só aumentará."
10052190-9 = "[ns] \"Huh...?\""
10052190-10 = "Bem, os arredores... O Continente de Aço...?"
10052190-11 = "Não entrar em pânico!"
10052190-12 = "Isto é como um “reino virtual” criado pela expansão energética do Dekagramaton!"

10052190-13 = "Enquanto o derrotarmos, tudo voltará ao normal!"
10052190-14 = "Em outras palavras, pode-se dizer que o interior desta “área” é um espaço construído para o Decagrammaton."
10052190-15 = "Sim, isso mesmo... como você sabia?"
10052190-16 = "Você viu isso em um mangá ou jogo?"
10052190-17 = "Isso mesmo. Sou a empregada e agente perfeita."
10052190-18 = "Por favor, fale sério de agora em diante! ?"
10052190-25 = "...Ei, sensei!"
10052190-26 = "[s] \"O que há de errado?\""
10052190-27 = "A comunicação com o navio de transporte foi perdida!"
10052190-28 = "sim! ?"
10052190-29 = "Dispositivo de supressão absoluta \"Atzilt Belt\" - ativado."

10052190-34 = "Uma estrutura mecânica flutuando no ar...?"
10052190-36 = "[ns] \"O que é isso...?\""
10052190-39 = "Não invocarei essa vida."
10052190-40 = "Apesar de você se ajoelhar e mostrar sua cara feia, eu prometo isso."
10052190-41 = "O poder das oito Sephira foi reunido através do corpo da chave."
10052190-42 = "A partir daí, a “transformação” que se limitava às substâncias inorgânicas será estendida a todos os elementos."
10052190-43 = "Sob o comando de Atzilut, você se torna parte do Continente de Aço."
10052190-44 = "Você receberá um novo corpo e alma e renascerá como meu apóstolo."
