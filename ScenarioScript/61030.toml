[translation]
61030-1 = "Episódio 3; Dias como um sonho"
61030-6 = "Por favor, entrem."
61030-7 = "E-este é... o nosso quarto..."
61030-9 = "[ns1]\"Com licença.\"\n[ns2]\"Então... qual é o motivo da visita?\""
61030-12 = "Ah, é verdade...! Eu tinha esquecido completamente...!"
61030-13 = "Hã? O-o que foi...? Ah...!"
61030-14 = "Se-se-se-sensei! Eu sinto muito, sinto muito mesmo, mas..."
61030-15 = "Poderia esperar do lado de fora do quarto por apenas 5 minutos... por favor!?"
61030-16 = "Eu sei que é falta de educação pedir isso depois de ter convidado você...!"
61030-17 = "P-por favor! Só 5 minutos, é o suficiente!"
61030-19 = "(Segui as duas e decidi esperar no corredor)"
61030-20 = "(Depois de um tempo...)"
61030-24 = "Já pode entrar... N-não, espere! Por favor, entre!"
61030-31 = "[ns]\"Hã...!?\""
61030-32 = "Ah, recomeçando... Olá, Sensei."
61030-33 = "Desculpe! Por ter te assustado... Mas não foi por mal... Nós... bem..."
61030-34 = "Se formos usar o termo que o pessoal da Trinity usa —#nnós somos estudantes transferidas de Arius!"
61030-36 = "[ns]\"Ah...!\""
61030-44 = "...Naquele dia, a Madame desapareceu de Arius."
61030-45 = "Até aí, tudo bem. Mas nós, que fomos deixadas para trás... ficamos todas ansiosas, sem saber o que aconteceria conosco ou como viveríamos daqui para frente."
61030-46 = "Em meio a isso, um dia, de repente... uma garota que não conhecíamos veio falar conosco."
61030-49 = "...Parece que aqui é seguro."
61030-53 = "Hã...!? Esse uniforme...!"
61030-54 = "Tr-Trinity!?"
61030-58 = "Shiii. Desculpe, eu te assustei, não foi?"
61030-59 = "Como você disse, eu vim da Trinity. Embora, originalmente, eu devesse estar usando o uniforme do \"Chá das Cinco\"."
61030-61 = "Chá das Cinco...?"
61030-62 = "O que é isso?"
61030-64 = "..."
61030-65 = "É como se fosse um grupo para apreciar chá."
61030-67 = "Hã!? Podemos nos transferir para a Trinity!?"
61030-68 = "Mas nós, bem... a Trinity e nós..."
61030-70 = "Sim, eu entendo o que você quer dizer."
61030-71 = "Por isso, não pretendo forçar nada, nem colocar pressão. É apenas... uma \"proposta\"."
61030-72 = "Começar uma nova vida na Trinity. Espero que entenda que esse caminho existe."
61030-73 = "Claro, mesmo que escolham outro caminho... nós respeitaremos essa decisão."
61030-74 = "Ma-mas, mesmo que nos diga isso de repente..."
61030-75 = "Fiquem tranquilas. Não precisam responder com pressa. É justamente por isso que quero que pensem com calma."
61030-76 = "Pois uma parte da Trinity... não, do Chá das Cinco... está pronta para dar as boas-vindas a vocês."
61030-77 = "...Pode ser difícil fazer isso publicamente, no entanto."
61030-78 = "A-ah... se pudermos nos transferir para a Trinity... e algumas pessoas nos derem as boas-vindas..."
61030-79 = "Será que as outras pessoas vão nos aceitar...?"
61030-80 = "Sim, esse é o ponto mais preocupante para nós. Afinal, existem muitas facções e clubes na Trinity..."
61030-81 = "Por isso, caso escolham a transferência — nos documentos, vocês serão tratadas como \"estudantes transferidas do interior\"."
61030-82 = "...Esse é o máximo de apoio que podemos oferecer no momento."
61030-87 = "..."
61030-88 = "..."
61030-90 = "Repito, não precisam se apressar, podem pensar com calma."
61030-94 = "E, quando tiverem decidido... entrem em contato através deste número."
61030-97 = "..."
61030-98 = "……。"
61030-100 = "……Nós refletimos muito."
61030-101 = "Sério… pensamos e conversamos muito sobre isso."
61030-102 = "Estávamos ansiosas. #nSobre nossa posição, o mundo fora de Arius, sobre a Trinity…"
61030-106 = "O que nos fez decidir foi… o sentimento de que talvez pudesse ser melhor do que é agora."
61030-115 = "[ns]\"Então foi isso que aconteceu…\""
61030-116 = "Sim… "
61030-117 = "Ultimamente… além de nós, mais garotas têm vindo para a Trinity."
61030-118 = "A maioria está no primeiro ou segundo ano, mas…"
61030-120 = "[ns3]\"Além de vocês…\"\n[ns4]\"…Realmente, deve ter sido muito difícil.\""
61030-123 = "Não, não foi difícil. #nMas… ainda parece que estou vivendo um sonho…"
61030-124 = "Antes… ter um futon era um luxo grande demais, a gente já se sentia feliz só de conseguir um cobertor velho."
61030-125 = "Camas são realmente maravilhosas. Ehehe…"
61030-126 = "Ah, bem, existiam \"coisas parecidas com camas\" em Arius, mas… #ndiziam que depender dessas coisas nos tornava fracas…"
61030-131 = "[ns]\"…Me desculpem.\""
61030-134 = "(Abaixou a cabeça e pediu desculpas às duas)"
61030-135 = "Eeeeeh!? P-p-por que o Sensei está pedindo desculpas!?"
61030-136 = "I-isso mesmo! Graças ao Sensei, nós…"
61030-137 = "[s]\"Mesmo assim, eu não cuidei de vocês como deveria.\""
61030-138 = "M-mas! Se disser algo assim, nós…"
61030-139 = "A-além disso! Não foi por isso que queríamos conversar com o Sensei…!"
61030-141 = "(Lembrou-se de que tinha vindo aqui para ouvir o que as duas tinham a dizer)"
61030-143 = "Bem… sobre o que queríamos conversar é…"
61030-144 = "É que… bem… pode parecer tarde demais para perguntar…"
61030-145 = "O que é um exame abrangente?"
61030-146 = "[s]\"…Hein?\""
61030-147 = "Para começar, não entendemos muito bem o que é um \"exame\"…"
61030-148 = "Tudo aqui é tão diferente de quando estávamos em Arius…"
61030-149 = "Mas achei que seria estranho perguntar para as outras garotas ao redor."
61030-150 = "Parecia que todas as alunas da Trinity já sabiam disso naturalmente…"
61030-151 = "Mas pensei que, se fosse o Sensei…"
61030-152 = "Isso mesmo! O Sensei é… bem, o Sensei!"
61030-154 = "[ns]\"…Entendo.\""
61030-156 = "[ns]\"Falando nisso, pode parecer tarde, mas… é a primeira vez que nos encontramos pessoalmente, não é?\""
61030-157 = "I-isso mesmo… embora eu ache que isso seja natural."
61030-158 = "É verdade. Porque nós somos… de Arius, afinal…"
61030-159 = "Não diga isso desse jeito… mas, bem…"
61030-160 = "E-entendido. Pelo menos na frente do Sensei —"
61030-166 = "…!?"
61030-167 = "Hii—!"
61030-169 = "(Estendeu a mão para fazer um carinho na cabeça. Mas —)"
61030-170 = "(As duas se assustaram e, por reflexo, deram alguns passos para trás)"
61030-177 = "D-d-d-desculpe, Sensei. #nIsso é, bem!"
61030-178 = "N-não é isso…! Não é que tenhamos medo do Sensei…!"
61030-179 = "[s]\"Sim. Está tudo bem.\""
61030-180 = "M-mas…"
61030-181 = "……"
61030-183 = "[ns]\"Está tudo bem.\""
61030-185 = "[ns]\"…Agora está tudo bem.\""
61030-189 = "(Como pequenos animais assustados, as duas se aproximaram lentamente)"
61030-190 = "Auu..."
61030-191 = "Ugh... *sniff*..."
61030-193 = "(Desta vez, estendo a mão lentamente. Senti que o porte físico das duas era... um pouco menor do que o das alunas comuns.)"
61030-194 = "(Esperei até que elas se acalmassem e, aos poucos, expliquei o que era um exame e por que ele era importante.)"
61030-196 = "Entendo... É um pouco desperdício tentar avaliar alguém com apenas um exame, mas..."
61030-197 = "Mas é para confirmar se a gente realmente lembra do que estudou, né."
61030-198 = "Pensando bem... talvez também houvesse \"exames\" em Arius!"
61030-199 = "Como julgar a quantidade de munição restante apenas pelo peso do carregador, ou como lidar com combate corpo a corpo..."
61030-203 = "Ou como destruir um halo de forma eficiente... Era só esse tipo de coisa."
61030-204 = "Es-espera aí...!"
61030-205 = "Hã...? Ah!"
61030-206 = "Des-desculpa! Falei uma besteira..."
61030-207 = "Hã? Se eu estou bem agora...?#nBem, é que..."
61030-208 = "Sabe... eu estava vivendo uma \"vida escolar\" normal! Hehe...#nÉ meio estranho falar isso vindo de nós."
61030-209 = "É divertido... sim, é...#nMas, de alguma forma, era estranho..."
61030-210 = "Não precisava fazer vigília à noite, podia comer várias vezes ao dia.#nNinguém gritava com a gente, nem nos jogavam na solitária..."
61030-211 = "Talvez seja por isso. Mais do que calor, é um pouco... sufocante, talvez."
61030-212 = "...Porque em Arius, fazia frio."
61030-214 = "[ns]\"Você está se dando bem com as garotas de Trinity?\""
61030-215 = "Ah, sim. Com certeza.#nComo dizem que somos alunas transferidas de uma escola do interior, e não de Arius."
61030-216 = "Todas são muito gentis... e, por outro lado, fico preocupada se não estou dando trabalho demais para elas.#nÉ um pouco inquietante, sabe."
61030-217 = "Ah, é verdade! Às vezes, a gente vai ao \"café\" com todo mundo."
61030-218 = "Elas pedem coisas tão caras sem nem hesitar...#nÉ difícil não ficar surpresa."
61030-219 = "E eu não consigo decorar os nomes dos cafés e bolos de jeito nenhum...#nMas é tudo muito gostoso. Hehe..."
61030-220 = "Sabe... como tenho gastos com chá e outras coisas, também estou trabalhando de meio período..."
61030-221 = "Isso também é divertido!#nÉ como se fosse um aprendizado sobre a sociedade."
61030-222 = "Quando chega perto do dia do pagamento, sinto a carteira leve...#nMas, por outro lado, sinto que estou realmente ganhando meu próprio dinheiro..."
61030-223 = "[s]\"Mesmo quando a gente vira adulto, a carteira fica leve antes do pagamento e dá uma tristeza...\""
61030-224 = "Se-senhor também!?#nEu achava que o senhor era... alguém muito mais incrível..."
61030-225 = "Alguém mais rico, com mais folga..."
61030-226 = "Se o senhor diz que, no fundo, todo mundo é parecido...#nDe alguma forma, só de ouvir isso, me sinto aliviada..."
61030-227 = "Sim... fico feliz..."
61030-228 = "..."
61030-229 = "..."
61030-230 = "Ei, Sensei..."
61030-231 = "Talvez o senhor já tenha percebido..."
61030-232 = "Nem todas de Arius vieram para Trinity..."
61030-233 = "[s]\"...Eu imaginava que fosse assim.\""
61030-234 = "Não sei se vou conseguir explicar direito..."
61030-235 = "Houve quem escolheu ficar em Arius."
61030-236 = "Cada uma teve seus motivos..."
61030-237 = "Mas, no fim das contas, elas não conseguiram aceitar Trinity ou este mundo.#nAcho que esse sentimento pesou mais."
61030-238 = "...Desde que comecei a viver aqui, às vezes eu penso."
61030-245 = "Só pelo fato de termos crescido em lugares diferentes por acaso—"
61030-246 = "De um lado, pessoas que lutam para conseguir comer uma vez ao dia..."
61030-247 = "Do outro, pessoas que aproveitam doces caros no café como se fosse algo natural."
61030-248 = "Originalmente... não deveria haver quase diferença nenhuma entre as duas escolas."
61030-255 = "O que todas que ficaram em Arius estão fazendo agora... nós também não sabemos bem."
61030-256 = "Dá para imaginar, mas... é só imaginação..."
61030-257 = "Mas ouvi alguns rumores."
61030-258 = "Cortaram o contato com o mundo exterior e, até agora, em algum lugar... continuam resistindo."
61030-260 = "Como cada um tem seu jeito de pensar, eu sei na minha cabeça que... deveríamos respeitar o máximo possível."
61030-261 = "Mas, não consigo evitar... fico preocupada com todos que ficaram para trás..."
61030-262 = "Quase todas as noites, eu sonho com a época em que estávamos em Arius."
61030-263 = "Eu acordo assustada... #nàs vezes, acontece de acordarmos ao mesmo tempo."
61030-264 = "Como são muitas vezes... eu comecei a anotar quem pulou da cama primeiro ou quem gritou mais alto. Hehe..."
61030-265 = "Até agora, eu estou ganhando."
61030-266 = "Hoje foi quase no mesmo horário!"
61030-267 = "Quase? Teve um minuto de diferença, não teve?!"
61030-272 = "Isso pode soar estranho, mas..."
61030-273 = "Sobre o que o Sensei disse agora pouco... sobre a explicação da prova, eu fiquei pensando."
61030-274 = "Eu queria que todos que ficaram em Arius também pudessem fazer a prova..."
61030-276 = "Ah, você estava pensando nisso?"
61030-277 = "A-ainda é estranho, né...?"
61030-278 = "Não. Eu estava pensando a mesma coisa, então fiquei um pouco surpresa..."
61030-279 = "[ns]\"Posso perguntar por que você pensou assim?\""
61030-281 = "Bem, é que, como posso dizer..."
61030-282 = "Acordar de manhã, ter aulas, brincar com os amigos, dormir em uma cama quentinha... #ne de vez em quando ter uma prova... esse tipo de coisa..."
61030-283 = "Eu acho isso maravilhoso. É o dever de um estudante, por assim dizer."
61030-284 = "Ouço as alunas de Trinity dizendo que odeiam estudar ou que é um incômodo."
61030-285 = "Mas nós não odiamos estudar. #nEmbora eu ache difícil acompanhar o ritmo, é verdade."
61030-286 = "Foi aqui que aprendi. #nQue o dever de um estudante é — estudar."
61030-288 = "[ns]\"……!\""
61030-295 = "Se-se-se... Sensei!?"
61030-296 = "Se-Sensei!?!"
61030-297 = "(Sem conseguir se conter, bagunçou o cabelo das duas)"
61030-299 = "[ns]\"Ah, desculpe! Foi sem querer...\""
61030-301 = "E-está tudo bem! Sério, e-estou bem!"
61030-302 = "Se-se o Sensei não se importar, só mais um pouquinho... #npode ser... assim...?"
61030-303 = "……"
61030-304 = "……"
61030-305 = "A mão do Sensei... é quentinha..."
61030-306 = "É realmente... muito quentinha. Hehe..."
61030-308 = "[ns5]\"Ou seja, você quer que todos de Arius também --\"\n[ns6]\"possam ter uma vida escolar, certo?\"\n[ns7]\"Incluindo as 'provas'!\""
61030-312 = "Sim, exatamente! #nAh, mas..."
61030-313 = "Pode ser que estejamos pensando demais, mas... tem algo que me preocupa..."
61030-314 = "Bem, é que..."
61030-315 = "Ouvi dizer que não é Trinity quem cria as questões... #nmas essa prova não é a \"Prova Geral de Trinity\"?"
61030-316 = "[s]\"Ah...\""
61030-317 = "Todos não perdoam Trinity e escolheram ficar em Arius."
61030-318 = "Por isso, não sei se eles aceitariam fazer uma prova que leva o nome de \"Trinity\"..."
61030-319 = "Além disso... eles nunca tiveram um \"estudo\" de verdade. #nProvavelmente, nem agora..."
61030-320 = "Talvez eles estejam tendo aulas direitinho dentro da filial, não é?"
61030-321 = "Impossível... #nSe eles conseguissem fazer isso, há muito tempo..."
61030-322 = "É verdade... Ah, e dizem que se tentarmos chegar perto da filial de Arius, somos expulsas na hora..."
61030-323 = "[s]\"Não precisam se preocupar com isso.\""
61030-324 = "Hã? É verdade? #nExiste... algum jeito...?"
61030-325 = "Entendi. O Sensei é... um adulto, afinal...! #nCom certeza deve ter um jeito que nós não conseguimos imaginar...!"
61030-326 = "[s]\"Sim. Dar um jeito nas coisas é o 'papel de um adulto'.\""
61030-327 = "U-uau, ainda não entendi muito bem, mas..."
61030-328 = "De alguma forma, eu sinto que quero acreditar. Ehehe..."
61030-329 = "Realmente, foi a decisão certa consultar o Sensei..."
61030-333 = "Ah, hum, então... Sensei! #nÉ que... eu tenho mais um pedido..."
61030-335 = "[log=아리우스 학생 A 마스크OFF]Você poderia... cuidar do pessoal do esquadrão também?[/log]"
61030-339 = "[ns]\"...!\""
61030-345 = "Próximo episódio: Aprendizado para quem?"
