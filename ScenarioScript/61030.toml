[translation]
61030-1 = "第3話;夢のような日々"
61030-6 = "どうぞ、上がってください。"
61030-7 = "こ、ここが……私たちの、部屋でして……。"
61030-9 = "[ns1]\"お邪魔します。\"\n[ns2]\"それで……何の用かな。\""
61030-12 = "あっ、そうだった……！うっかりしてた……！"
61030-13 = "えっ？な、なにが……？あっ……！"
61030-14 = "せ、せせせ、先生っ！本当に、本当に申し訳ないんですけど……。"
61030-15 = "5分だけ、部屋の外で待っててもらえたり……しませんかっ！？"
61030-16 = "お呼びしておいて、こんなお願いをするのは#n失礼だって分かってるんですけど……！"
61030-17 = "お、お願いしますっ！5分だけでいいんです！"
61030-19 = "（2人に従って、廊下で待つことにした）"
61030-20 = "（しばらくして……）"
61030-24 = "もう入っても大丈夫です……。#nい、いえ！どうぞお入りくださいっ！"
61030-31 = "[ns]\"え……！？\""
61030-32 = "あ、改めまして……こんにちは、先生。"
61030-33 = "すみません！びっくりさせてしまって……。#nでも、そんなつもりじゃなくて……！わ、私たち……えっと……。"
61030-34 = "トリニティの皆さんの言い方を借りるなら――#n私たちはアリウスからの編入生です！"
61030-36 = "[ns]\"あ……！\""
61030-44 = "……あの日、マダムはアリウスからいなくなりました。"
61030-45 = "そこまではよかったんです。#nでも、残された私たちは……この先どうなるのか、どうやって生きていけばいいのか、って。みんな不安でした。"
61030-46 = "そんな中、ある日突然……知らない子が声をかけてきたんです。"
61030-49 = "……ここなら、大丈夫そうですね。"
61030-53 = "えっ……！？その制服……！"
61030-54 = "ト、トリニティ！？"
61030-58 = "しーっ。#nごめんなさい、驚かせてしまいましたね。"
61030-59 = "おっしゃる通り、私はトリニティから来ました。#n本来はこれではなく……「ティーパーティー」の制服を着ているのですが。"
61030-61 = "ティーパーティー……？"
61030-62 = "それって……何ですか？"
61030-64 = "……。"
61030-65 = "紅茶を嗜む集まり……のようなものです。"
61030-67 = "えっ！？トリニティに編入できるんですか！？"
61030-68 = "でも私たちは、その……トリニティとは……。"
61030-70 = "ええ、おっしゃりたいことは分かります。"
61030-71 = "ですから、強要するつもりも、プレッシャーをかけるつもりもありません。#nあくまで……ただの「提案」です。"
61030-72 = "トリニティで新たな生活を始める。#nその道があるのだと、ご理解いただければ。"
61030-73 = "もちろん、他の道を選んだとしても……私たちはその選択を尊重します。"
61030-74 = "で、でも、急にこんな話をされても……。"
61030-75 = "ご安心ください。返答は急ぎません。#nだからこそ、時間をかけてゆっくり考えていただきたいのです。"
61030-76 = "トリニティ……いえ、ティーパーティー……の一部、には皆さんを歓迎する用意がありますから。"
61030-77 = "…[ruby=おおやけ]…公に[/ruby]は、難しいかもしれませんが。"
61030-78 = "あ、あの……私たちがトリニティに編入できて……#n一部の人がそれを歓迎してくれるとして……。"
61030-79 = "他の方々は、果たして認めてくれるのでしょうか……？"
61030-80 = "ええ、そこが私たちにとって一番悩ましいところです。#nトリニティには……本当にたくさんの派閥や部活が存在しますので。"
61030-81 = "そのため、もし編入を選ばれた場合――#n書類上は「田舎からの転校生」として、処理されることになります。"
61030-82 = "……それが、今の私たちにできる最大限の支援です。"
61030-87 = "……。"
61030-88 = "……。"
61030-90 = "重ねてになりますが、焦らず、ゆっくり考えていただいて構いません。"
61030-94 = "そして、思い定まったその時は……この番号にご連絡ください。"
61030-97 = "……。"
61030-98 = "……。"
61030-100 = "……私たちは悩みました。"
61030-101 = "本当に……たくさん悩んで話し合いました。"
61030-102 = "不安だったんです。#n私たちの立場、アリウスの外の世界、トリニティのこと……。"
61030-106 = "決定打になったのは……今よりはマシになるかもしれない、という気持ちでした。"
61030-115 = "[ns]\"そんなことがあったんだね……。\""
61030-116 = "はい……。 "
61030-117 = "最近……私たち以外にも、トリニティに来る子が増えてきたんです。"
61030-118 = "ほとんどが1年生か2年生ですけど……。"
61030-120 = "[ns3]\"君たち以外にも……。\"\n[ns4]\"……本当に、大変だったね。\""
61030-123 = "いえ、大変なんてことは。#nでも……まだ夢の中にいるような感じで……。"
61030-124 = "前は……布団なんて贅沢すぎて、古い毛布が手に入るだけで幸せだったのに。"
61030-125 = "ベッドって、本当に素晴らしいですね。えへへ……。"
61030-126 = "あっ、一応「ベッドのようなもの」はアリウスにもあったんですが……#nそういうものを頼ると弱くなるって……。"
61030-131 = "[ns]\"……ごめんね。\""
61030-134 = "（頭を下げて、2人に謝った）"
61030-135 = "ええええっ！？な、ななな、なんで先生が謝るんですかっ！？"
61030-136 = "そ、そうです！先生のおかげで、私たちは……。"
61030-137 = "[s]\"それでも、君たちのことを気にかけてこなかった。\""
61030-138 = "で、でも！そんなこと言われたら、私たちは……。"
61030-139 = "そ、それに！先生に相談したかったのは、そういうことじゃなくて……！"
61030-141 = "（2人の話を聞くために、ここに来ていたことを思い出した）"
61030-143 = "えっと……相談というのはですね……。"
61030-144 = "その……えっと……今更なんですが……。"
61030-145 = "[ruby=・   ・   ・   ・   ・   ・   ・]そうごうしけん[/ruby]……ってなんですか？"
61030-146 = "[s]\"……え？\""
61030-147 = "そもそも、「しけん」というものが何なのか、よく分からなくて……。"
61030-148 = "アリウスにいたときとは、何もかもが違うので……。"
61030-149 = "でも、周囲の子に聞くのはちょっと変な気がしてしまって。"
61030-150 = "トリニティの生徒は、みんな知ってて当たり前のようでしたし……。"
61030-151 = "でも、先生なら……と思って。"
61030-152 = "そうです！先生はその……先生、ですから！"
61030-154 = "[ns]\"……なるほどね。\""
61030-156 = "[ns]\"そういえば、今更だけど……こうして顔を合わせるのは初めてだよね？\""
61030-157 = "そ、そうですね……それも、当然のことだとは思いますが。"
61030-158 = "そうですよ。だって私たちは……アリウス出身、ですから……。"
61030-159 = "そんな風には言わないで……って、それは、でも……。"
61030-160 = "わ、分かりました。少なくとも、先生の前では――"
61030-166 = "……っ！？"
61030-167 = "ひっ――！"
61030-169 = "（頭を撫でようと手を伸ばした。けれど――）"
61030-170 = "（2人は怯えて、反射的に数歩後ずさりした）"
61030-177 = "す、すすすす、すみません先生。#nこれは、その！"
61030-178 = "ち、違うんです……！先生を怖がってるわけじゃなくて……！"
61030-179 = "[s]\"うん。大丈夫だよ。\""
61030-180 = "で、でも……。"
61030-181 = "……。"
61030-183 = "[ns]\"大丈夫。\""
61030-185 = "[ns]\"……もう全部、大丈夫だから。\""
61030-189 = "（まるで、怯えた小動物のように、2人はそろそろと近づいてきた）"
61030-190 = "あうぅ……。"
61030-191 = "うっ……ぐすっ……。"
61030-193 = "（今度はゆっくりと手を伸ばす。2人の体格は、普通の生徒よりも……少しだけ小さい気がした）"
61030-194 = "（2人が落ち着くまで待ってから、試験とは何か、それがなぜ大切なのかを、少しずつ説明した）"
61030-196 = "そう、なんですね……。1回の試験だけで評価しようとするのって、ちょっともったいない気もするけど……。"
61030-197 = "でも、勉強したことをちゃんと覚えてるか確認するためなんですね。"
61030-198 = "……そう考えると、アリウスにも「試験」はあったのかもしれません！"
61030-199 = "弾倉の重さだけで残弾数を判断したり、接近戦の対応法とか……。"
61030-203 = "ヘイローを効率よく壊すには、とか……そんなのばっかりでしたけど。"
61030-204 = "ちょっ、ちょっと……！"
61030-205 = "え……？あっ！"
61030-206 = "ご、ごめんなさい！変な話しちゃって……！"
61030-207 = "え？今はどうしているのか……ですか？#nそれは、えっと……。"
61030-208 = "その……普通の「学園生活」をしてました！えへへ……。#n私たちがそう言うと、なんか、変な感じですけど。"
61030-209 = "楽しい……のはそうなんですけど……#nなんだか、不思議でした……。"
61030-210 = "夜に見張りをしなくてもいいし、一日に何回もご飯を食べられるし。#n怒鳴られたり、独房に入れられたりもなくて……。"
61030-211 = "だから、でしょうか。温かいというより、ちょっと……暑いかもしれません。"
61030-212 = "……アリウスは、寒かったので。"
61030-214 = "[ns]\"トリニティの子とは仲良くできてる？\""
61030-215 = "あ、はい。もちろん。#nアリウスではなく、田舎の学園から来た転校生ということになってるので。"
61030-216 = "皆さん、すごく優しくて……逆に気を使わせちゃってる気もして。#nちょっと落ち着かないんですけどね。"
61030-217 = "そうそう！たまに、みんなと一緒に「カフェ」に行ったりするんです。"
61030-218 = "あんなに高いものを迷いなく注文するので……#n驚かないようにするの、大変なんですよ。"
61030-219 = "あと、コーヒーとかケーキの名前、全然覚えられなくて……#nでも、すっごくおいしいです。えへへ……。"
61030-220 = "その……お茶代とか、いろいろ出費があるのでアルバイトもしてて……。"
61030-221 = "それも楽しいんです！#n色々社会勉強になるといいますか。"
61030-222 = "給料日前になると、お財布が軽く感じたりするんですが……#nそれが、逆にちゃんと自分でお金を稼いでいる実感があったりもして……。"
61030-223 = "[s]\"大人になっても、給料日前はお財布が軽くて悲しくなるんだよね……。\""
61030-224 = "せ、先生もなんですか！？#n先生ってもっと……もっとこう、すごい人だと思ってたのに……。"
61030-225 = "もっとお金持ちで、余裕があるというか……。"
61030-226 = "意外とみんな蓋を開ければ似たようなもの……と、先生が言うのなら……#nなんだか、それだけで救われる気がします……。"
61030-227 = "はい……なんか、嬉しいです……。"
61030-228 = "……。"
61030-229 = "……。"
61030-230 = "あの、先生……。"
61030-231 = "もうお気づきかもしれませんが……。"
61030-232 = "アリウスの全員が、トリニティに来たわけじゃないんです……。"
61030-233 = "[s]\"……やっぱり、そうなんだね。\""
61030-234 = "うまく伝えられるか、分からないのですが……。"
61030-235 = "アリウスに残ることを選んだ子もいました。"
61030-236 = "理由はそれぞれでしたけど……。"
61030-237 = "でも結局は、トリニティやこの世界が受け入れられない。#nその気持ちが大きかったんだと思います。"
61030-238 = "……ここで過ごすようになってから、たまに考えるんです。"
61030-245 = "たまたま、育ってきた場所が違うというだけで――"
61030-246 = "片方は、一日に一回ご飯を食べるだけでも精一杯で……。"
61030-247 = "もう片方は、カフェで高いお菓子を当たり前のように楽しんでる。"
61030-248 = "本来なら……2つの学園の差なんて、ほとんどなかったはずなのに。"
61030-255 = "アリウスに残ったみんなが、今どうしてるのかは……私たちにもよく分かりません。"
61030-256 = "想像はできますけど……それは、想像でしかないですし……。"
61030-257 = "でも、噂で聞いたことがあるんです。"
61030-258 = "外部との接触を断って、今もどこかで……抵抗を続けてるって。"
61030-260 = "考え方は人それぞれだから、できるだけ尊重すべきだと……#n頭では分かってます。"
61030-261 = "でも、どうしても……残ったみんなのことが心配で……。"
61030-262 = "毎晩のように、夢で見るんです。アリウスにいた頃のことを。"
61030-263 = "うなされて目を覚ますんですけど……#n時々、それが同時になることもあるくらいで。"
61030-264 = "あまりに数が多いので……どっちが多く飛び起きたか、声が大きかったか。記録をつけてるんです。えへへ……。"
61030-265 = "今のとこ、私の勝ちだよね。"
61030-266 = "今日はほとんど同じ時間だったよ！"
61030-267 = "ほとんどって、1分差ついてたでしょ！"
61030-272 = "これは、変に聞こえるかもしれませんが……。"
61030-273 = "さっきの先生の話……試験の説明を聞いて、思ったんです。"
61030-274 = "アリウスに残ったみんなにも、試験を受けられるようにしてあげたいなって……。"
61030-276 = "えっ、そんなこと考えてたの？"
61030-277 = "や、やっぱり変かな……？"
61030-278 = "ううん。私も同じこと思ってたから、ちょっとびっくりして……。"
61030-279 = "[ns]\"どうしてそう思ったのか、聞いてもいいかな。\""
61030-281 = "えっと、その、なんというか……。"
61030-282 = "朝起きて、授業を受けて、友達と遊んで、温かいベッドで眠って……#nそれでたまに試験もあって……そういうのが……。"
61030-283 = "なんだか、素敵だと思って。生徒の本分、というか。"
61030-284 = "勉強が嫌とか、面倒くさいとか。トリニティの子がよく言ってるのを聞きます。"
61030-285 = "でも、私たちは勉強が嫌いなわけじゃないんです。#n追いつくのが大変だなとは思いますけどね。"
61030-286 = "ここで教わったんです。#n生徒の本分は――勉強だって。"
61030-288 = "[ns]\"……！\""
61030-295 = "せ、せせせ……先生っっっ！？"
61030-296 = "せ、先生！？！？"
61030-297 = "（たまらず、2人の頭をわしゃわしゃとなでた）  "
61030-299 = "[ns]\"あっ、ごめん！つい……。\""
61030-301 = "だ、大丈夫ですっ！本当に、へ、平気ですから！"
61030-302 = "せ、先生さえよければ、もう少しだけ……#nこのままでも……いい、ですか……？"
61030-303 = "……。"
61030-304 = "……。"
61030-305 = "先生の手……あったかいです……。"
61030-306 = "ほんとに、あったかい……です。えへへ……。"
61030-308 = "[ns5]\"つまり、アリウスのみんなにも――\"\n[ns6]\"学園生活を送れるようにしてあげたいってことだよね？\"\n[ns7]\"「試験」も含めて！\""
61030-312 = "はいっ、その通りです！#nあ、でも……。"
61030-313 = "私たちの考えすぎかもしれませんが……気になることがあって……。"
61030-314 = "その、えっと……。"
61030-315 = "問題を作るのはトリニティじゃないと聞きました……#nでも、今回の試験って、「トリニティ総合試験」ですよね？"
61030-316 = "[s]\"あ……。\""
61030-317 = "みんな、トリニティが許せなくて、アリウスに残る選択をしているんです。"
61030-318 = "だから、果たして「トリニティ」ってついた試験を受けてくれるかな……って。"
61030-319 = "それに……まともに「勉強」をしたこともないはずです。#nたぶん、今も……。"
61030-320 = "分校の中で、ちゃんと授業を受けてるかもしれないよ……？"
61030-321 = "無理だよ、それは……。#nそれができてたら、とっくに……。"
61030-322 = "そうだよね……。あっ、そもそも、アリウス分校に近づこうとすると、すぐ追い払われちゃうらしいし……。"
61030-323 = "[s]\"そういうのは、心配しなくて大丈夫だよ。\""
61030-324 = "えっ？本当ですか？#n何か……方法があるんですか……？"
61030-325 = "そっか。先生は……大人ですもんね……！#nきっと、私たちでは思いつかない方法が……！"
61030-326 = "[s]\"うん。なんとかするのが「大人の役目」だからね。\""
61030-327 = "う、うーん、まだよく分かんないけど……。"
61030-328 = "なんだか、信じたくなっちゃいます。えへへ……。"
61030-329 = "やっぱり先生に相談して、正解でした……。"
61030-333 = "あっ、あのっ、じゃあ……先生！#nその……もう1つだけお願いがあって……。"
61030-335 = "[log=아리우스 학생 A 마스크OFF]スクワッドの皆さんのことも……お願い、できますか？[/log]"
61030-339 = "[ns]\"……！\""
61030-345 = "次回;誰がための学び"
