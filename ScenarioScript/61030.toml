[translation]
61030-1 = "Episódio 3; Dias de Sonho"
61030-6 = "Pode entrar, fique à vontade."
61030-7 = "E-Esse aqui é... o nosso quarto..."
61030-9 = "[ns1]\"Com licença.\"\n[ns2]\"Então... o que vocês queriam falar comigo?\""
61030-12 = "Ah, é verdade...! Eu acabei esquecendo...!"
61030-13 = "Hã? E-Esquecendo de quê...? Ah...!"
61030-14 = "S-S-S-Sensei! Sinto muito mesmo, mesmo, mas..."
61030-15 = "Você poderia... esperar 5 minutinhos lá fora, por favor!?"
61030-16 = "Eu sei que é muita falta de educação pedir isso depois de ter te chamado aqui, mas...!"
61030-17 = "P-Por favor! São só 5 minutinhos!"
61030-19 = "（Seguindo o pedido das duas, decidi esperar no corredor.）"
61030-20 = "（Um tempo depois...）"
61030-24 = "Já pode entrar...#nQ-Quer dizer! Pode entrar, por favor!"
61030-31 = "[ns]\"Hã...!?\""
61030-32 = "A-Ahem... Olá, Sensei."
61030-33 = "Desculpe! Não queríamos te assustar...#nMas não foi de propósito...! N-Nós, hã..."
61030-34 = "Pegando a forma do pessoal de Trinity de dizer—#nNós somos alunas transferidas de Arius!"
61030-36 = "[ns]\"Ah...!\""
61030-44 = "...Naquele dia, a Madame sumiu de Arius."
61030-45 = "Até aí, tudo bem.#nMas nós que ficamos para trás... não sabíamos o que ia ser da gente, nem como íamos sobreviver. Todo mundo tava com medo."
61030-46 = "No meio de tudo isso, um dia, de repente... uma garota que a gente não conhecia veio falar com a gente."
61030-49 = "...Acho que aqui é seguro."
61030-53 = "Hã...!? Esse uniforme...!"
61030-54 = "T-Trinity!?"
61030-58 = "Shh.#nDesculpe, sei que assustei vocês."
61030-59 = "Como disseram, eu venho de Trinity.#nNormalmente, eu estaria vestindo o uniforme do \"Tea Party\", e não este."
61030-61 = "Tea Party...?"
61030-62 = "O que é isso...?"
61030-64 = "..."
61030-65 = "É como se fosse... um grupo que aprecia chá preto."
61030-67 = "Hã!? A gente pode se transferir para Trinity!?"
61030-68 = "Mas nós, tipo... com Trinity, nós..."
61030-70 = "Sim, eu entendo o que querem dizer."
61030-71 = "Por isso, não tenho a intenção de forçá-las nem de pressioná-las.#nIsto é apenas... uma \"proposta\"."
61030-72 = "Gostaria apenas que soubessem que existe a opção de começar uma nova vida em Trinity."
61030-73 = "Claro, mesmo se escolherem outro caminho... nós respeitaremos a decisão de vocês."
61030-74 = "M-Mas... jogar isso assim, de repente..."
61030-75 = "Fiquem tranquilas. Não precisam responder agora.#nJustamente por isso, peço que pensem com bastante calma."
61030-76 = "Porque Trinity... ou melhor, uma parte do Tea Party... está pronta para receber todas vocês."
61030-77 = "...Embora fazer isso publicamente seja complicado."
61030-78 = "E-Err... digamos que a gente se transfira para Trinity...#ne que uma parte das pessoas receba a gente bem..."
61030-79 = "Será que as outras pessoas realmente nos aceitariam...?"
61030-80 = "Sim, esse é justamente o nosso maior obstáculo.#nTrinity possui... um sem-número de facções e clubes."
61030-81 = "Por essa razão, caso escolham se transferir—#nNos registros, vocês constarão como \"alunas transferidas do interior\"."
61030-82 = "...Esse é o limite de apoio que podemos oferecer no momento."
61030-87 = "..."
61030-88 = "..."
61030-90 = "Repito, não tenham pressa. Podem pensar o quanto precisarem."
61030-94 = "E quando tomarem uma decisão... entrem em contato por este número."
61030-97 = "..."
61030-98 = "..."
61030-100 = "...Nós ficamos cheias de dúvidas."
61030-101 = "A gente quebrou muito a cabeça... e conversou bastante."
61030-102 = "A gente tava com medo.#nDa nossa situação, do mundo fora de Arius, de Trinity..."
61030-106 = "O que fez a gente decidir... foi achar que qualquer coisa seria melhor do que a nossa situação daquele momento."
61030-115 = "[ns]\"Então foi isso que aconteceu...\""
61030-116 = "Sim..."
61030-117 = "Ultimamente... tem chegado mais garotas em Trinity além de nós."
61030-118 = "A maioria é do primeiro ou segundo ano, mas..."
61030-120 = "[ns3]\"Além de vocês...\"\n[ns4]\"...Poxa, as coisas foram difíceis pra vocês.\""
61030-123 = "Não, não foi tão difícil assim.#nMas... a gente sente como se ainda estivesse num sonho..."
61030-124 = "Antigamente... só de conseguir um cobertor velho já era uma alegria imensa. Um futon era um luxo que nem dava pra imaginar."
61030-125 = "E uma cama é uma coisa maravilhosa mesmo. Ehehe..."
61030-126 = "Ah, quer dizer, a gente até tinha umas \"coisas parecidas com camas\" em Arius, mas...#ndiziam que depender desse tipo de coisa deixava a gente fraca..."
61030-131 = "[ns]\"...Me desculpe.\""
61030-134 = "（Curvei a cabeça e pedi desculpas às duas.）"
61030-135 = "Eeeeeh!? P-P-P-Por que o Sensei tá pedindo desculpas!?"
61030-136 = "I-Isso aí! Foi graças ao Sensei que a gente..."
61030-137 = "[s]\"Mas mesmo assim, eu acabei não prestando atenção em vocês.\""
61030-138 = "M-Mas! Se você falar assim, a gente vai ficar..."
61030-139 = "A-Além disso! A gente te chamou aqui pra falar de outra coisa...!"
61030-141 = "（Me lembrei que estava lá para escutar o que as duas queriam falar.）"
61030-143 = "Então... sobre o que a gente queria conversar..."
61030-144 = "Hã... bom... já é meio tarde para perguntar isso, mas..."
61030-145 = "O que é um... *Exame Geral*...?"
61030-146 = "[s]\"...Hã?\""
61030-147 = "Na verdade, a gente não entende direito o que é esse tal de \"exame\"..."
61030-148 = "É que aqui as coisas são totalmente diferentes de como eram em Arius..."
61030-149 = "Mas parecia estranho perguntar isso para o pessoal daqui."
61030-150 = "Parecia que todas as alunas de Trinity já sabiam disso, como se fosse algo normal..."
61030-151 = "Mas aí a gente pensou... no Sensei."
61030-152 = "É! Afinal, o Sensei... é um professor!"
61030-154 = "[ns]\"...Entendi.\""
61030-156 = "[ns]\"Por falar nisso, e desculpem por isso, mas... é a primeira vez que nos vemos pessoalmente, não é?\""
61030-157 = "I-Isso é verdade... mas achamos que isso é natural."
61030-158 = "É. Afinal, nós... somos de Arius..."
61030-159 = "Não fale assim... mas, quer dizer..."
61030-160 = "C-Certo. Pelo menos, na frente do Sensei—"
61030-166 = "...!?"
61030-167 = "Eek—!"
61030-169 = "（Levantei a mão para acariciar a cabeça delas. Porém—）"
61030-170 = "（As duas recuaram alguns passos instintivamente, amedrontadas.）"
61030-177 = "D-D-D-D-Desculpe, Sensei.#nIsso é que, hã!"
61030-178 = "N-Não é isso...! A gente não tem medo de você, Sensei...!"
61030-179 = "[s]\"Tudo bem. Eu sei.\""
61030-180 = "M-Mas..."
61030-181 = "..."
61030-183 = "[ns]\"Está tudo bem.\""
61030-185 = "[ns]\"...Agora, vai ficar tudo bem.\""
61030-189 = "（Como animaizinhos assustados, as duas foram se aproximando lentamente.）"
61030-190 = "Auuh..."
61030-191 = "Ugh... *soluço*..."
61030-193 = "（Desta vez, estendi a mão devagar. As duas me pareceram... um pouco menores do que as alunas normais.）"
61030-194 = "（Esperei as duas se acalmarem e, então, expliquei pouco a pouco o que era um exame e por que ele era importante.）"
61030-196 = "Entendi, então é isso... Parece meio injusto ser avaliada por causa de um único exame..."
61030-197 = "Mas é pra testar se a gente lembra direitinho das coisas que estudamos, não é."
61030-198 = "...Pensando por esse lado, acho que também tinha \"exames\" lá em Arius!"
61030-199 = "Tipo adivinhar quantas balas sobravam só pelo peso do carregador, ou testar formas de lutar num combate corpo a corpo..."
61030-203 = "Como quebrar um halo do jeito mais eficiente, e coisas assim... Era só isso que caía."
61030-204 = "E-Ei, pera aí...!"
61030-205 = "Hã...? Ah!"
61030-206 = "D-Desculpe! Eu comecei a falar umas coisas esquisitas...!"
61030-207 = "Hã? Como estão as coisas hoje em dia... você pergunta?#nBom... é que..."
61030-208 = "Hã... a gente tava levando uma \"vida escolar\" normal! Ehehe...#nÉ até meio estranho a gente falar isso."
61030-209 = "É legal... isso é verdade, mas...#né meio surreal também..."
61030-210 = "A gente não precisa ficar de guarda à noite, e podemos comer várias vezes no dia.#nNinguém grita com a gente, nem joga a gente na solitária..."
61030-211 = "Acho que é por isso. Tá mais para quente... do que reconfortante."
61030-212 = "...Porque lá em Arius, era tão frio."
61030-214 = "[ns]\"E vocês estão se dando bem com as alunas de Trinity?\""
61030-215 = "Ah, sim. Com certeza.#nElas acham que a gente é transferida de uma escola do interior, e não de Arius."
61030-216 = "Todo mundo é muito gentil com a gente... até parece que deixamos elas preocupadas.#nMas a gente ainda fica um pouco tensa."
61030-217 = "Ah, é! Às vezes a gente vai na \"cafeteria\" com elas."
61030-218 = "Elas pedem umas coisas super caras sem nem pensar duas vezes...#nÉ bem difícil não transparecer o choque que a gente leva."
61030-219 = "Sem contar que a gente não consegue decorar o nome dos cafés e bolos de jeito nenhum...#nMas é tudo muito gostoso. Ehehe..."
61030-220 = "Hã... a gente também arranjou um trabalho de meio período pra bancar os chás e os nossos gastos..."
61030-221 = "E é bem divertido!#nComo posso dizer... é um aprendizado pra vida."
61030-222 = "A carteira fica meio vazia nos dias antes do pagamento...#nmas isso também é bom, porque a gente sente de verdade que tá ganhando o próprio dinheiro..."
61030-223 = "[s]\"Até quando a gente vira adulto, a carteira ainda fica triste e vazia antes do dia do pagamento...\""
61030-224 = "S-Sério, Sensei!?#nEu achava que você era... que era tipo, super importante e incrível..."
61030-225 = "Que era super rico, e que levava uma vida cheia de luxo..."
61030-226 = "Ver que no fim das contas tá todo mundo no mesmo barco... ouvir você dizer isso...#nde algum jeito, faz a gente se sentir mais aliviada..."
61030-227 = "Sim... me deixa até feliz..."
61030-228 = "..."
61030-229 = "..."
61030-230 = "Hã, Sensei..."
61030-231 = "Você já deve ter percebido, mas..."
61030-232 = "Nem todo mundo de Arius veio pra Trinity..."
61030-233 = "[s]\"...Imaginava que fosse isso mesmo.\""
61030-234 = "Não sei se consigo explicar isso direito..."
61030-235 = "Algumas meninas escolheram ficar em Arius."
61030-236 = "Cada uma teve o seu motivo..."
61030-237 = "Mas no fundo, acho que foi por não conseguirem aceitar Trinity ou esse mundo lá fora.#nAcho que isso pesou bastante na decisão delas."
61030-238 = "...Desde que vim pra cá, às vezes eu fico pensando."
61030-245 = "Só por termos crescido em lugares diferentes—"
61030-246 = "De um lado, você se mata só para conseguir comer pelo menos uma vez por dia..."
61030-247 = "E do outro, você pode ir numa cafeteria e comer doces caros sem nem dar muita bola pra isso."
61030-248 = "Se for parar pra pensar... não deveria haver diferença nenhuma entre as duas escolas."
61030-255 = "Não sabemos direito como tá a situação de quem decidiu ficar em Arius..."
61030-256 = "A gente tenta imaginar... mas isso fica só na imaginação..."
61030-257 = "Mas a gente ouviu uns boatos por aí."
61030-258 = "Que elas cortaram totalmente o contato com o mundo de fora, e continuam resistindo... em algum lugar."
61030-260 = "Todo mundo pensa de um jeito diferente, então a gente tem que tentar respeitar...#nIsso eu entendo muito bem."
61030-261 = "Mas, mesmo assim... a gente ainda se preocupa demais com quem ficou..."
61030-262 = "Todo dia de noite, eu sonho com a época em que a gente estava em Arius."
61030-263 = "A gente tem pesadelos e acorda no susto...#ne, de vez em quando, nós duas acordamos no mesmo instante."
61030-264 = "Acontece tantas vezes... que a gente começou a registrar quantas vezes cada uma pula da cama, e quem grita mais alto. Ehehe..."
61030-265 = "E por enquanto, eu tô ganhando."
61030-266 = "Hoje nós duas acordamos quase na mesma hora!"
61030-267 = "Quase não conta, você acordou um minuto depois!"
61030-272 = "Isso pode soar um pouco estranho, mas..."
61030-273 = "Aquilo que o Sensei falou agora pouco... sobre as provas, me fez pensar numa coisa."
61030-274 = "Eu queria dar um jeito de quem ficou lá em Arius fazer o exame também..."
61030-276 = "Hã, você tava pensando nisso?"
61030-277 = "A-Acho que foi uma ideia meio bizarra, não foi...?"
61030-278 = "Não. Eu também tava pensando nisso, então fiquei meio surpresa..."
61030-279 = "[ns]\"Posso saber o que levou vocês a pensarem nisso?\""
61030-281 = "Bom, hã, como eu posso explicar..."
61030-282 = "Acordar de manhã, ir pras aulas, brincar com os amigos, dormir numa cama quentinha...#ne de vez em quando ter provas... Tudo isso..."
61030-283 = "...é uma coisa tão linda. É realmente o dever de uma aluna."
61030-284 = "A gente sempre ouve as meninas de Trinity falarem que detestam estudar, ou que é um saco e tal."
61030-285 = "Mas a gente não odeia estudar.#nSó é um pouco difícil de acompanhar a matéria."
61030-286 = "A gente aprendeu isso aqui.#nQue o dever de um aluno—é estudar."
61030-288 = "[ns]\"...!\""
61030-295 = "S-S-S... Sensei...!?"
61030-296 = "S-Sensei!?!?!?"
61030-297 = "（Sem conseguir me segurar, baguncei o cabelo das duas num cafuné.）  "
61030-299 = "[ns]\"Ah, foi mal! Eu não resisti...\""
61030-301 = "T-Tudo bem! S-Sério, eu não me importo!"
61030-302 = "S-Se não for incômodo pro Sensei, você podia fazer isso...#nsó mais um pouquinho... por favor...?"
61030-303 = "..."
61030-304 = "..."
61030-305 = "As mãos do Sensei... são tão quentinhas..."
61030-306 = "São muito quentinhas... mesmo. Ehehe..."
61030-308 = "[ns5]\"Então, vocês querem que as outras meninas de Arius—\"\n[ns6]\"Também tenham a chance de viver uma vida escolar de verdade?\"\n[ns7]\"Incluindo os 'exames'!\""
61030-312 = "Sim, exatamente isso!#nAh, mas..."
61030-313 = "A gente pode estar pensando demais, mas... tem uma coisa que tá incomodando a gente..."
61030-314 = "Hã, é que..."
61030-315 = "Ouvimos dizer que não é Trinity que vai elaborar a prova...#nMas essa prova é o \"Exame Geral de Trinity\", não é?"
61030-316 = "[s]\"Ah...\""
61030-317 = "Elas escolheram ficar em Arius porque não conseguem perdoar Trinity."
61030-318 = "Então a gente tava na dúvida... se elas fariam de boa um exame que leva o nome de \"Trinity\"..."
61030-319 = "Sem contar que... elas nunca \"estudaram\" de verdade lá em Arius.#nE acho que elas continuam sem estudar nada..."
61030-320 = "Quem sabe elas tão tendo aulas de verdade lá na escola...?"
61030-321 = "Impossível...#nSe elas pudessem fazer isso, a essa altura elas já estariam..."
61030-322 = "É verdade... Ah, e fora que parece que ninguém nem consegue chegar perto de Arius sem ser enxotado..."
61030-323 = "[s]\"Não precisa se preocupar com isso.\""
61030-324 = "Hã? Sério?#nExiste algum jeito... de fazer isso...?"
61030-325 = "Ah, entendi. Afinal... o Sensei é um adulto, não é...?!#nVocê deve ter algum plano que a gente nunca conseguiria imaginar...!"
61030-326 = "[s]\"Sim. Dar um jeito nas coisas é o 'dever de um adulto', afinal.\""
61030-327 = "É-É... Eu ainda não entendi muito bem..."
61030-328 = "Mas dá uma vontade de acreditar no que você diz. Ehehe..."
61030-329 = "Chamar o Sensei pra conversar foi mesmo a melhor coisa a se fazer..."
61030-333 = "A-Ah... e aí... Sensei!#nHã... a gente tem mais um pedido..."
61030-335 = "[log=아리우스 학생 A 마스크OFF]Podemos... pedir que ajude também o Esquadrão...?[/log]"
61030-339 = "[ns]\"...!\""
61030-345 = "Próximo Episódio; O Aprendizado de Quem"