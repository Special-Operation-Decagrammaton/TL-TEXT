[translation]
1201-1 = "Limpeza e limpeza"

1201-2 = "Dentro do Campus Millennium"

1201-3 = "(Um camião com o logótipo C&C estava estacionado no interior do campus Millennium)"

1201-11 = "Hmph~♪ Hehe...♬"

1201-12 = "Agora, próximo..."

1201-13 = "……."

1201-18 = "Ufufu ♪ Vamos mantê-lo limpo e bonito ♬"

1201-19 = "...Bom."

1201-20 = "Ah... não posso acreditar."

1201-21 = "...Líder, já faz um tempo, gostaria que você me ajudasse."

1201-22 = "Rusena. Ao contrário de vocês, não acho esse tipo de coisa divertido nem nada."

1201-23 = "Oh, qual é a graça de fazer algo assim?"

1201-24 = "Você está falando sobre essa coisa de limpeza?"

1201-25 = "Bem, é claro. É bom ser bonito. Não é isso que um líder é?"

1201-26 = "Eu não entendo..."

1201-27 = "Suspiro... por que eu faria algo assim..."

1201-28 = "Ei, olha, esse é o C&C, certo? Por que você está limpando...?"

1201-29 = "...?"

1201-30 = "Sim, o que há de errado nisso? C&C significa o chamado “clube de empregadas domésticas”, certo? Não é normal que o clube de empregada esteja limpando?"

1201-31 = "Não, porque tudo isso é apenas uma aparição temporária, certo? Eu queria saber por que eles se preocuparam em limpá-lo. Eu me pergunto se isso também é uma missão."

1201-32 = "……."

1201-33 = "...Aparência temporária? O que você está falando?"

1201-35 = "Veja, superficialmente eles fazem vários trabalhos voluntários como parte do clube de empregadas domésticas, mas na realidade, C&C é uma força especial que realiza missões que lhes foram dadas por grandes pessoas..."

1201-37 = "Ah, o que está acontecendo! Não há necessidade de exibi-lo!"

1201-38 = "Ei! ?"

1201-42 = "Oh meu Deus..."

1201-43 = "Líder, eu não pedi especificamente para você limpar no sentido de subornar as pessoas."

1201-44 = "Ultimamente, parece que a imagem do clube de empregadas foi gradualmente desgastada..."

1201-45 = "É tão bom..."

1201-49 = "Ei, ei, olhe isso! Ótima poeira! Não é grande! ? Eu encontrei, então vou limpar, ok? ?"

1201-50 = "O que você está fazendo subindo no corrimão? ?"

1201-51 = "Saia rapidamente! Se alguém me visse assim, começaria a fazer comentários estranhos e irritantes..."

1201-52 = "Como vai o trabalho de vocês, pessoal da C&C?"

1201-53 = "...!"

1201-54 = "...!"

1201-55 = "Olhe para essa pessoa problemática que parece que vai me incomodar..."

1201-60 = "Por alguma razão, já sinto que não sou bem-vindo... Fiz algo errado?"

1201-61 = "Bem, isso não é verdade. Você é sempre bem-vindo, ei gerente?"

1201-62 = "Não há razão para isso..."

1201-63 = "É isso que estou dizendo."

1201-64 = "Ah, ahaha…."

1201-65 = "Ufa... mas por outro lado, já que é oficialmente um clube de empregadas domésticas, por que não fazer isso e limpá-lo completamente?"

1201-66 = "Por que você tem que me contar sobre limpeza? Você está tentando arranjar uma briga?"

1201-67 = "Não, só estou preocupado. Por que você está tentando entrar em uma briga tão cedo?"

1201-68 = "Os estudantes que estiveram por aqui há pouco estavam dizendo abertamente de passagem que o clube de empregadas estava agindo nos bastidores, fingindo estar limpando. Está tudo bem como C&C?"

1201-69 = "Afinal, você não veio aqui para brigar...? Se você vai me incomodar, por favor, vá para casa..."

1201-70 = "Sinto muito, mas isso não vai acontecer."

1201-74 = "……これ、何だか分かる？"

1201-75 = "recibo……?"

1201-76 = "sim. O custo de consertar o prédio da escola que vocês destruíram na operação recente..."

1201-77 = "isso é……."

1201-78 = "Você entende? Você não precisa ser bom com números para entender que esse número é uma quantia enorme, certo?"

1201-79 = "Nossa... tenho certeza que eles faziam isso de uma forma bem chamativa naquela época..."

1201-80 = "Porém, se bem me lembro, o seminário vai custear nossas atividades, certo? Por que trazê-lo para nós?"

1201-81 = "Sim, está certo."

1201-87 = "...Mas como tesoureiro de seminário. Você não acha que é normal apenas reclamar de uma coisa? Ei?"

1201-88 = "……."

1201-89 = "……."

1201-90 = "……."

1201-94 = "Isso é tudo... foi tudo que eu disse antes da missão...!"

1201-95 = "Eu te disse, certo? Há muitos instrumentos de precisão e maquinários caros neste local de operação, então eu disse para vocês não fazerem movimentos muito chamativos! ?"

1201-99 = "Como resultado de “não faça movimentos muito chamativos”, ele explodiu um prédio inteiro... ele realmente me ouviu! ?"

1201-100 = "Bem, pensei em fazer com que parecesse melhor..."

1201-101 = "Eu não quero o elemento do clube de empregadas em um lugar assim! !"

1201-102 = "Por favor, pense um pouco sobre as consequências... o dinheiro também não é infinito..."

1201-103 = "Me desculpe, farei melhor da próxima vez..."

1201-104 = "... Haa."

1201-105 = "...Bem, foi tudo o que eu disse até agora, mas contanto que você me trate bem, tudo bem."

1201-106 = "Afinal, tenho certeza que conto com vocês."

1201-107 = "Não por causa disso, mas... sim. Por enquanto, vamos para outro local."

1201-108 = "...... pasta de feijão?"

1201-109 = "O que você quer dizer...?"

1201-110 = "Isso significa o próximo pedido...?"

1201-111 = "sim. Conteúdo é conteúdo, então não posso falar sobre isso aqui."

1201-112 = "Primeiro de tudo, deixe-me dizer isso..."

1201-113 = "Desta vez, de forma limpa, mas silenciosa ao mesmo tempo. Tente não perturbar muito a cena. Entendi?"

1201-115 = "Ok, ok, deixe-me contar uma história."

1201-116 = "Eu me pergunto se eu realmente entendo..."

1201-117 = "Bem, tudo bem, por favor, faça novamente desta vez."

1201-120 = "(Depois, a missão C&C terminou e o relatório de negócios e os documentos de cobrança foram entregues no seminário...)"

1201-121 = "Qual é esse valor! ? Afinal, você não estava ouvindo nada! ?"

1201-122 = "Limpeza e limpeza"

