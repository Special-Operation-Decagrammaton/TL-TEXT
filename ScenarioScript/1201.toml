[translation]
1201-1 = "Cleaning&Clearing"
1201-2 = "ミレニアム・キャンパス内部"
1201-3 = "（C&Cのロゴが入ったトラックが、ミレニアムのキャンパスの中に停められていた）"
1201-11 = "ふんふん～♪ふふっ……♬"
1201-12 = "さて、次は……。"
1201-13 = "……。"
1201-18 = "うふふっ♪綺麗綺麗にしましょうね～♬"
1201-19 = "……良し。"
1201-20 = "あー……信じらんねぇくらいだりぃ。"
1201-21 = "……リーダー、手持無沙汰なら手伝ってほしい。"
1201-22 = "るせぇな。お前たちと違ってあたしはこんなん、楽しくも何ともねぇんだっての。"
1201-23 = "ああもう、こんなことして何が楽しいんだよ……。"
1201-24 = "こんなことって……このお掃除のこと、ですか？"
1201-25 = "それはまあ、もちろん。綺麗になるのは嬉しいことだ。リーダーはそうじゃないのか？"
1201-26 = "分っかんねぇー……。"
1201-27 = "はあ……どうしてあたしがこんなことを……。"
1201-28 = "ねえ見て、あれC&Cだよね？何で掃除を……？"
1201-29 = "……？"
1201-30 = "そうね、それがどうかしたの？C&Cってことは、つまりいわゆる「メイド部」でしょ？メイド部が掃除してるのって、別に普通のことじゃない？"
1201-31 = "いや、だってあれ全部仮の姿なんでしょ？どうしてわざわざ本当に掃除してるのかなって思って。あれも任務なのかな。"
1201-32 = "……。"
1201-33 = "……仮の姿？何の話？"
1201-35 = "ほら、表向きはメイド部として色々と奉仕活動をしてるけど、その実C&Cはすごく偉い人たちから受けたミッションをこなす特殊部隊だって話で……。"
1201-37 = "あぁもう何だ何だ！見せもんじゃねぇんだぞごるぁ！"
1201-38 = "ひぃっ！？"
1201-42 = "あらあら……。"
1201-43 = "リーダー、別に人払い的な意味で掃除をしてほしいと言ったわけじゃない。"
1201-44 = "何だか最近、もはやメイド部としてのイメージも徐々に損なわれているような……。"
1201-45 = "るせぇな、ったく……。"
1201-49 = "ねぇねぇこれ見て！すごいホコリ！大きくない！？私が見つけたんだから私が掃除するよ、良いよね！？"
1201-50 = "てめぇは手すりの上に登って何をしてんだ！？"
1201-51 = "早く降りろ！そんなところ誰かに見られたら、また変な小言とか言われ――"
1201-52 = "C&Cの皆さん、お仕事の調子はどう？"
1201-53 = "……！"
1201-54 = "……！"
1201-55 = "ほら見ろ、まさに小言を言いそうなめんどくせぇのが……。"
1201-60 = "何だか、すでに全く歓迎されてない雰囲気だけど……私、何か悪いことでもした？"
1201-61 = "そ、そんなことありませんよ。いつだって大歓迎です、ねぇ部長？"
1201-62 = "んな訳ねぇだろ……。"
1201-63 = "って言ってるけど。"
1201-64 = "あ、あはは……。"
1201-65 = "ふぅ……話は変わるけど、仮にも表向きはメイド部なんだから、やるならやるでしっかり掃除したらどうなの？"
1201-66 = "なんでてめぇに掃除のことを口出されなきゃならねぇんだよ、喧嘩売ってんのか？"
1201-67 = "そうじゃなくて、単に心配なのよ。なんでそうすぐに喧嘩に持ち込もうとするの？"
1201-68 = "さっきまでこの辺にいた生徒たちが、メイド部が掃除のふりして暗躍をどうのこうの……って、往来で堂々と言ってたわよ。C&Cとして、このままで大丈夫？"
1201-69 = "やっぱりてめぇ、喧嘩を売りに来てねぇか……？お小言なら帰ってくれ……。"
1201-70 = "悪いけど、そうはいかないわね。"
1201-74 = "……これ、何だか分かる？"
1201-75 = "領収書……？"
1201-76 = "そう。あなたたちがこの間の作戦で破壊した、校舎の修繕費用の……ね。"
1201-77 = "これは……。"
1201-78 = "分かる？この桁数、数字に強くなくてもすごい金額だって分かるわよね？"
1201-79 = "あらあら……確かにあの時は、なかなか派手にやりましたからね……。"
1201-80 = "ですが、確か私たちの活動費用はセミナーが支給してくれるんですよね？どうしてそれを私たちのところに？"
1201-81 = "そうね、その通りよ。"
1201-87 = "……でも、セミナーの会計として。文句の一つくらい言っても良いと思わない？ねぇ？"
1201-88 = "……。"
1201-89 = "……。"
1201-90 = "……。"
1201-94 = "あれだけ……任務前にあれだけ言ったのに……！"
1201-95 = "私言ったわよね？今回の作戦場所には精密機器とか高い機械類が多いから、くれぐれも派手すぎる動きはしないでって、私言ったわよね！？"
1201-99 = "「派手過ぎる動きはしないで」の結果、建物を丸ごと吹っ飛ばすとか……本当に私の話聞いてた！？"
1201-100 = "まあ、その……綺麗にしようかなと思いまして……。"
1201-101 = "そんなところにメイド部要素は求めてない！！"
1201-102 = "お願いだから、事後処理のことも少しは考えて……お金も無限じゃないんだから……。"
1201-103 = "すみません、次回から善処しますので……。"
1201-104 = "……はぁ。"
1201-105 = "……まあ、ここまで言っておいて何だけど、善処してくれるならそれで良いわ。"
1201-106 = "何せ、あなたたちを頼りにしてるのは確かだから。"
1201-107 = "だからってわけではないけど……そうね。とりあえず、一度場所を移しましょうか。"
1201-108 = "……あん？"
1201-109 = "どういうことだ……？"
1201-110 = "次の依頼……ということですか？"
1201-111 = "そう。内容が内容だから、こんなところで話すわけにはいかなくてね。"
1201-112 = "とりあえず、先に言っておくこととしては……。"
1201-113 = "今度こそ、綺麗に、でも同時に静かに。あんまり現場を荒らさないように。分かった？"
1201-115 = "わーったわーった、良いから話を聞かせな。"
1201-116 = "本当に分かってるのかしら……。"
1201-117 = "まあ良いわ、今回もお願いね。"
1201-120 = "（そしてC&Cの任務は終わり、セミナーに業務報告書と請求書類が届いたのだが……）"
1201-121 = "何よこの金額！？やっぱり全っっっ然、話を聞いてないじゃないのよぉ！？"
1201-122 = "Cleaning&Clearing"
