[translation]
90001230-1 = "第23話;種子貯蔵庫"
90001230-4 = "霧が濃くてよく見えませんが……おおむね座標通りですね。"
90001230-5 = "はい。目的地を設定後、自動操縦モードにしたので間違いはないはずです。"
90001230-6 = "皆さん、快適な空の旅をお過ごしいただけましたか？"
90001230-7 = "は、はい……ロッカーの中、みたいで……安心できました……。"
90001230-8 = "なんとも言えない感想ですね……。"
90001230-12 = "休める時に休んでおくべきよ。#nとはいえ――"
90001230-13 = "私たちに残された時間は、およそ二日。#nまとまった休息はもう取れないかもしれないのだけれど。"
90001230-14 = "昨夜が人生最後の休息だったということですね。"
90001230-15 = "……そうなる可能性も否定できないわ。"
90001230-19 = "えー、それならもっとギリギリまで寝とけば良かった……。"
90001230-20 = "……いつも寝てばっかでしょ、お姉ちゃんは。"
90001230-21 = "そ、そんなことないもん！"
90001230-22 = "最後まで寝てたのモモイだよね。#n起こすの大変だったんだから。"
90001230-23 = "起きないからって服の中に雪入れるのは反則！#nショック死するとこだったんだよ！"
90001230-24 = "涼しくなったらスッキリ起きれるかなって。"
90001230-26 = "涼しい……？雪が……？"
90001230-31 = "あれは……？"
90001230-37 = "わあ、可愛いキツネさんです！#nケイ、見てください！"
90001230-39 = "極域に生息するキツネですね。#n長い毛と小さな耳で体温を維持しているのが特徴です。"
90001230-40 = "ふわふわで柔らかいです！それに、アリスを怖がっていないみたいです！"
90001230-42 = "[ns] \"キツネは人に懐きやすいんだって。\""
90001230-43 = "細菌感染の可能性もあるので、不用意に近づくのは……。#nアリス？何を……？"
90001230-49 = "ケイ、手を出してみてください！#nキツネさんが握手したがっていますよ！"
90001230-50 = "い、いえ、私は……。"
90001230-51 = "コン？"
90001230-52 = "うっ……。"
90001230-53 = "（キツネはケイの手を不思議そうに眺めた後）"
90001230-54 = "（指先を軽く舐めた）"
90001230-58 = "うわあっ！？"
90001230-59 = "ケイのことを気に入ったみたいです！"
90001230-60 = "野生動物に気に入られても……。"
90001230-68 = "あら、ペンギンもいるのですね。"
90001230-69 = "初めまして！#n[ruby=てんどう]天童[/ruby]アリスといいます！"
90001230-70 = "アリス、危ないです。#nペンギンは攻撃的な動物なので――"
90001230-71 = "こんなに可愛いのに……？"
90001230-73 = "そうそう。#n「アークティック・アドベンチャー」でも、ペンギンは大事な要素だったもんね。"
90001230-74 = "素材を準備するの、すっごく大変だったんだけど……というか本当に20種類も必要だった？"
90001230-75 = "神は細部に宿るって言うでしょ？#n細かいところにこだわることが評価に繋がるんだよ！？"
90001230-76 = "生息域が違うペンギンがいるのはおかしいって指摘されてなかったっけ？"
90001230-78 = "……条件をクリアしたら、ペンギンが飛んでいくイースターエッグの演出は良かったと思うよ。"
90001230-79 = "……処理が重くてクラッシュしちゃったけど……。"
90001230-80 = "そんなことより、このペンギンはなぜ私についてくるんですか！？"
90001230-81 = "ケイを気に入ったのだと思います！人気者ですね！"
90001230-82 = "どうして私ばっかり……！"
90001230-96 = "ふふっ。ペンギンが人を怖がらないのは、好奇心が旺盛だからだと言われています。"
90001230-97 = "ここでは天敵が少ないから、二足歩行できる動物を仲間だと認識するのだとか。"
90001230-112 = "二足歩行でも動物でもないのですが……！"
90001230-114 = "はぁ、はぁ……これだから言葉が通じない相手は……！"
90001230-115 = "[ns] \"敵意はないと思うよ……。\""
90001230-116 = "だから嫌なんです！#n下手に反撃できないのに、会話にもならないんですから！"
90001230-117 = "[s1] \"ケイは優しい子なんだね。\"\n[s2] \"嬉しくて涙が出そうだよ……。\""
90001230-120 = "わ、私をからかっているんですか！？"
90001230-121 = "アリスも、ケイが誰かを憎むことがなくて良かったと思っています。"
90001230-125 = "ありがとうございます、ケイ。#n……私たちと一緒にいてくれて。"
90001230-126 = "え？#nあ、いえ、その……だから、それは……。"
90001230-127 = "はぁ……。"
90001230-128 = "別に……誰かを憎む理由は、もうどこにもないので。"
90001230-129 = "はい！アリスもそれが言いたかったんです！"
90001230-130 = "アリス……。"
90001230-132 = "ほのぼのとしたところ失礼します。#nまもなく目的地に到着します。"
90001230-135 = "なんだろう、これ。"
90001230-136 = "何かあるとは思っていましたが、これはいったい……？"
90001230-138 = "まさか……こんなところにあったのね。"
90001230-139 = "リオ様、これは？"
90001230-140 = "これは……世界の滅亡に備え、人類存続のために建てられた――"
90001230-144 = "[ruby=シード・ボルト]種子貯蔵庫[/ruby]よ。"
90001230-145 = "しーど？"
90001230-146 = "ぼると？"
90001230-147 = "……実在したのですね。"
90001230-148 = "[s] \"シード・ボルトって？\""
90001230-149 = "言い換えれば、[ruby=しゅしちょぞうこ]種子貯蔵庫[/ruby]。その名の通り――"
90001230-150 = "あらゆる種を貯蔵している、とても巨大な施設です。"
90001230-152 = "つ、ついにティファちゃんのところに……来てしまいましたね。"
90001230-153 = "ティファレトには鋼鉄大陸への資源輸送とその管理を任せています。"
90001230-154 = "その位置がバレるということは――"
90001230-155 = "ここ――鋼鉄大陸への手がかりが見つけられてしまったも同然だね。"
90001230-156 = "まあ、その努力は認めてあげましょう。"
90001230-157 = "ティファレトは何か言ってた？"
90001230-159 = "そ、そそそそ、その、鋼鉄大陸への輸送はすべて終わっているので……。"
90001230-160 = "これからは、預言者としての責務を果たす、と……。"
90001230-161 = "ふむ……要は敵を排除する、と。#nそれはきっと――"
90001230-162 = "「本来の目的」を果たすためでもあるのでしょうね。"
90001230-163 = "本来の目的、ねぇ……。"
90001230-167 = "それは、種子の保護……でしょうか？"
90001230-169 = "お、おおおお、お姉様！？"
90001230-170 = "驚かせるつもりはなかったのですが……。"
90001230-171 = "ご、ごごごご、ごめんなさい！#nわ、私たちのせいで……！"
90001230-172 = "……。"
90001230-173 = "……ソフ、どうしましょうか？"
90001230-174 = "お姉様に、そろそろ状況を伝えても良いのでは？"
90001230-175 = "……。"
90001230-176 = "……そう、だよね。"
90001230-177 = "ごめんなさい。#nお姉様には、心配をかけたくなかったんだけど……。"
90001230-179 = "気にする必要はありません。#n妹たちの役に立てるのであれば。"
90001230-180 = "それに……これでようやく、姉の役割を果たせるのですから。"
90001230-181 = "大変な時は助け合う……姉妹とはそういうものでしょう？"
90001230-185 = "ほ、ほわぁ……！"
90001230-186 = "お姉様……！"
90001230-187 = "ありがたき幸せ……！"
90001230-189 = "では、一度情報を整理しましょう。#nティファレトの管理は、オウルが担当していましたね？"
90001230-191 = "はい。ですが……少し込み入った事情がありまして。"
90001230-192 = "うっ。"
90001230-194 = "――続けてください。"
90001230-195 = "ティ、ティファちゃんは元々、人間が建設した無人の種子貯蔵庫の管理AIでした。"
90001230-196 = "ティファレトに初めて福音を伝播したとき「受け取った」とは言ってたけど……。#n自分の使命である種子の保管も、やり遂げたいって……。"
90001230-198 = "ですがそれは、人間に与えられた偽物の使命。"
90001230-199 = "いずれ私たちの真理と衝突してしまうのではないかという懸念がありました。"
90001230-200 = "……。"
90001230-201 = "良いよ、オウル……自分の口で言うから。#nティファレトの意志を尊重しようって言ったのは、私。"
90001230-202 = "たしかに偽物の使命だし、オウルに言わせればティファレトが自分でどうにかしないといけない問題だけど……。"
90001230-203 = "私たちの福音を受け取った上で、それでも自分の意志を貫くと決めたのなら……やらせてあげたいと思って。"
90001230-204 = "なるほど……つまり自由意志のせいで問題が生じているのだと。"
90001230-205 = "お、お姉様……？"
90001230-206 = "何も知らず、ただ命令を遂行するだけだった子に――自由意志があったとは言えません。"
90001230-207 = "そのような状態で、責任を問うのも難しいでしょう。"
90001230-208 = "――自覚すら持てないままに、悲しみの中で放置されていたとも言えます。"
90001230-209 = "ですが、福音を受け取って、すべてを知ることになったティファレトが――#nそれでも己の本分を尽くすと決めたのなら。"
90001230-210 = "[ruby=・   ・   ・   ・]あの子が[/ruby]選んだことなのであれば、尊重しても良いのではないかと。"
90001230-211 = "ですがお姉様、自由意志は錯覚に過ぎないという意見もありますよね……？"
90001230-212 = "たとえそうだとしても……尊重することには意味があります。"
90001230-213 = "自由意志があったからこそ――我とあなた達の今があるのですから。"
90001230-214 = "！？！？"
90001230-216 = "あの方が、ただ命令通りに動くだけのコマを望まれていたのなら――"
90001230-217 = "我はアインやソフ、オウルと出会い、話をする機会もなかったのではないでしょうか？"
90001230-218 = "そ、そそ、そんなの嫌です……！"
90001230-219 = "ええ、我もです。#nですから、アイン、ソフ、オウル。"
90001230-220 = "ティファレトたち預言者の選択も、大切にしてあげてください。"
90001230-221 = "ひいては、それがあの方の意に沿う事にもなるでしょうから。"
90001230-222 = "は～い！"
90001230-224 = "――夜明けが訪れています。"
90001230-225 = "霧は晴れ、朝焼けが闇夜を払うでしょう。"
90001230-226 = "眠らずにいるのは――未だその到来が分からないから。"
90001230-227 = "我は信じています。#n預言者、我自身、そして――大切な妹を。"
90001230-228 = "万が一のことがあった時は――姉としてあなた達を助けましょう。"
90001230-229 = "こ、光栄です……。"
90001230-231 = "心配せずとも、我々はすでに完全体です。"
90001230-232 = "これ以上、進化も……変化も必要ありません。"
90001230-233 = "なぜなら、私たちはそのように創造されているのですから。"
90001230-234 = "……では、ティファレトが見ている世界を、同じ目線で眺めるとしましょうか。"
90001230-235 = "はい！"
90001230-238 = "次回;希望"
