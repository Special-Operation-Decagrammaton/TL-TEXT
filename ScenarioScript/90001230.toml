[translation]
90001230-1 = "Episódio 23; Depósito de Sementes"
90001230-4 = "A neblina está muito densa e não consigo ver nada... mas estamos praticamente nas coordenadas certas."
90001230-5 = "Sim. Defini o destino e ativei o modo de piloto automático, então não deve haver erro."
90001230-6 = "Pessoal, tiveram uma viagem aérea confortável?"
90001230-7 = "S-sim... parecia que estávamos dentro de um armário... foi reconfortante..."
90001230-8 = "Essa é uma impressão difícil de descrever..."
90001230-12 = "Você deve descansar quando puder. #nDito isso—"
90001230-13 = "Nos resta cerca de dois dias. #nTalvez não consigamos mais tirar um descanso prolongado."
90001230-14 = "Então, a noite passada foi o último descanso das nossas vidas."
90001230-15 = "...Não posso negar que essa é uma possibilidade."
90001230-19 = "Ah, se fosse assim, eu deveria ter dormido até o último segundo..."
90001230-20 = "...Você só vive dormindo, irmã mais velha."
90001230-21 = "I-isso não é verdade!"
90001230-22 = "A Momoi foi a última a acordar, né? #nFoi um trabalhão te levantar."
90001230-23 = "Colocar neve dentro da roupa só porque eu não acordava é contra as regras! #nEu quase morri de susto!"
90001230-24 = "Pensei que você acordaria rapidinho se sentisse um friozinho."
90001230-26 = "Frio...? Neve...?"
90001230-31 = "O que é aquilo...?"
90001230-37 = "Uau, que raposa fofa! #nKei, olhe só!"
90001230-39 = "É uma raposa que habita regiões polares. #nSua característica é manter a temperatura corporal com pelos longos e orelhas pequenas."
90001230-40 = "É tão fofinha e macia! E parece que não está com medo da Alice!"
90001230-42 = "[ns] \"Dizem que raposas são fáceis de se aproximar das pessoas.\""
90001230-43 = "Existe o risco de infecção bacteriana, então não é bom se aproximar sem cuidado... #nAlice? O que você está...?"
90001230-49 = "Kei, tente estender a mão! #nA raposinha quer apertar a sua mão!"
90001230-50 = "N-não, eu..."
90001230-51 = "Kon?"
90001230-52 = "Ugh..."
90001230-53 = "(A raposa olhou para a mão de Kei com curiosidade)"
90001230-54 = "(Lambeu a ponta dos dedos dela levemente)"
90001230-58 = "Aaaah!?"
90001230-59 = "Parece que ela gostou da Kei!"
90001230-60 = "Mesmo que um animal selvagem goste de mim..."
90001230-68 = "Ah, também tem pinguins aqui."
90001230-69 = "Muito prazer! #nMeu nome é Alice Tendou!"
90001230-70 = "Alice, é perigoso. #nPinguins são animais agressivos, então—"
90001230-71 = "Mas eles são tão fofinhos..."
90001230-73 = "Pois é. #nEm \"Arctic Adventure\", os pinguins também eram um elemento importante, né."
90001230-74 = "Foi um trabalhão preparar os materiais... quer dizer, precisava mesmo de 20 tipos diferentes?"
90001230-75 = "Dizem que Deus está nos detalhes, não é? #nFocar nos detalhes é o que garante uma boa avaliação!"
90001230-76 = "Não apontaram que era estranho ter pinguins de habitats diferentes?"
90001230-78 = "...Achei que a cena secreta dos pinguins voando ao completar as condições foi boa."
90001230-79 = "...Embora o processamento tenha ficado pesado e o jogo tenha travado..."
90001230-80 = "Mais importante, por que esse pinguim está me seguindo!?"
90001230-81 = "Acho que ele gostou da Kei! Você é popular!"
90001230-82 = "Por que só comigo...!"
90001230-96 = "Fufu. Dizem que os pinguins não temem os humanos porque são muito curiosos."
90001230-97 = "Como há poucos predadores aqui, eles acabam reconhecendo qualquer animal que anda sobre duas pernas como um companheiro."
90001230-112 = "Mas eu não sou um animal e nem ando sobre duas pernas...!"
90001230-114 = "Ah, ai... é por isso que não dá para lidar com quem não entende a nossa língua...!"
90001230-115 = "[ns] \"Acho que ele não tem hostilidade...\""
90001230-116 = "É por isso que eu odeio isso!#nNão dá para contra-atacar direito e nem sequer dá para conversar!"
90001230-117 = "[s1] \"A Kei é uma menina gentil, não é?\"\n[s2] \"Estou tão feliz que sinto que vou chorar...\""
90001230-120 = "V-você está zombando de mim!?"
90001230-121 = "A Alice também acha bom que a Kei não odeie ninguém."
90001230-125 = "Obrigada, Kei.#n...Por estar conosco."
90001230-126 = "Eh?#nAh, não, isso... é que, bem..."
90001230-127 = "Haa..."
90001230-128 = "Não é nada... já não existe mais nenhum motivo para odiar ninguém."
90001230-129 = "Sim! A Alice também queria dizer isso!"
90001230-130 = "Alice..."
90001230-132 = "Desculpe interromper o momento de paz.#nChegaremos ao destino em breve."
90001230-135 = "O que será isso?"
90001230-136 = "Eu imaginava que houvesse algo aqui, mas o que é exatamente...?"
90001230-138 = "Não pode ser... então estava em um lugar como este."
90001230-139 = "Senhorita Rio, o que é isto?"
90001230-140 = "Isto é... construído para a sobrevivência da humanidade em preparação para o fim do mundo—"
90001230-144 = "Um Cofre de Sementes."
90001230-145 = "Cofre?"
90001230-146 = "De sementes?"
90001230-147 = "...Então ele realmente existia."
90001230-148 = "[s] \"O que é um Cofre de Sementes?\""
90001230-149 = "Em outras palavras, um depósito para preservar sementes. Como o nome sugere—"
90001230-150 = "É uma instalação gigantesca que armazena todos os tipos de sementes."
90001230-152 = "N-nós finalmente chegamos... onde a Tiphareth está."
90001230-153 = "Confiei à Tiphareth o transporte e a gestão de recursos para o Continente de Aço."
90001230-154 = "Se a localização dela foi descoberta, isso significa que—"
90001230-155 = "É o mesmo que dizer que encontraram a pista para este lugar, o Continente de Aço."
90001230-156 = "Bem, vamos reconhecer o esforço deles."
90001230-157 = "A Tiphareth disse alguma coisa?"
90001230-159 = "E-e-e-e-esse, o transporte para o Continente de Aço já foi todo concluído, então..."
90001230-160 = "De agora em diante, ela cumprirá seu dever como profetisa, disse ela..."
90001230-161 = "Hum... em suma, ela vai eliminar os inimigos.#nIsso certamente é—"
90001230-162 = "Para cumprir o seu \"propósito original\", suponho."
90001230-163 = "Propósito original, é..."
90001230-167 = "Seria isso... a proteção das sementes?"
90001230-169 = "O-o-o-o-irmã mais velha!?"
90001230-170 = "Não era minha intenção assustá-las..."
90001230-171 = "D-d-d-desculpe!#nN-nós, por nossa causa...!"
90001230-172 = "..."
90001230-173 = "...Soph, o que devemos fazer?"
90001230-174 = "Não seria a hora de contar a situação para a irmã mais velha?"
90001230-175 = "..."
90001230-176 = "...É verdade, né."
90001230-177 = "Desculpe.#nNão queríamos preocupar a irmã mais velha, mas..."
90001230-179 = "Não precisam se preocupar.#nSe eu puder ser útil para minhas irmãs mais novas."
90001230-180 = "Além disso... finalmente poderei cumprir meu papel como irmã mais velha."
90001230-181 = "Ajudar umas às outras nos momentos difíceis... não é assim que irmãs devem ser?"
90001230-185 = "U-uau...!"
90001230-186 = "Irmã mais velha...!"
90001230-187 = "Que felicidade imensa...!"
90001230-189 = "Então, vamos organizar as informações. A gestão de Tiphereth estava sob a responsabilidade de Owl, correto?"
90001230-191 = "Sim. Mas... há algumas circunstâncias um tanto complicadas."
90001230-192 = "Ah."
90001230-194 = "— Por favor, continue."
90001230-195 = "Ti, Tiphereth era originalmente uma IA de gestão de um banco de sementes não tripulado construído por humanos."
90001230-196 = "Embora ela tenha dito que "recebeu" o evangelho quando o transmitimos a Tiphereth pela primeira vez... ela também disse que queria cumprir sua missão de preservar as sementes..."
90001230-198 = "Mas essa é uma missão falsa dada pelos humanos."
90001230-199 = "Havia o receio de que, eventualmente, isso entrasse em conflito com a nossa verdade."
90001230-200 = "..."
90001230-201 = "Tudo bem, Owl... Eu mesma direi. Fui eu quem disse para respeitarmos a vontade de Tiphereth."
90001230-202 = "Certamente é uma missão falsa e, na opinião de Owl, é um problema que Tiphereth deveria resolver sozinha, mas..."
90001230-203 = "Se, após receber nosso evangelho, ela decidiu seguir sua própria vontade... eu quis permitir que ela o fizesse."
90001230-204 = "Entendo... Então, o problema surgiu por causa do livre-arbítrio."
90001230-205 = "I, Irmã...?"
90001230-206 = "Não se pode dizer que uma criança que não sabia de nada e apenas executava ordens possuía livre-arbítrio."
90001230-207 = "Nesse estado, seria difícil responsabilizá-la."
90001230-208 = "— Pode-se dizer que ela foi deixada de lado na tristeza, sem sequer ter consciência disso."
90001230-209 = "Mas, se Tiphereth, que recebeu o evangelho e passou a saber de tudo, decidiu cumprir seu dever mesmo assim—"
90001230-210 = "Se foi algo que ela escolheu, então talvez seja correto respeitar."
90001230-211 = "Mas Irmã, há opiniões de que o livre-arbítrio não passa de uma ilusão, não é...?"
90001230-212 = "Mesmo que seja esse o caso... respeitar tem um significado."
90001230-213 = "Pois foi justamente por existir o livre-arbítrio que eu e vocês estamos aqui agora."
90001230-214 = "!?!?"
90001230-216 = "Se Aquele que nos criou desejasse apenas peças que se movessem conforme as ordens—"
90001230-217 = "Eu não teria tido a oportunidade de conhecer e conversar com Ain, Soph e Owl, não é?"
90001230-218 = "I, is, isso... eu não quero isso...!"
90001230-219 = "Sim, eu também não. Portanto, Ain, Soph, Owl."
90001230-220 = "Por favor, valorizem também as escolhas dos profetas, como Tiphereth."
90001230-221 = "No fim das contas, isso também estará de acordo com a vontade d'Ele."
90001230-222 = "Certo!"
90001230-224 = "— O amanhecer está chegando."
90001230-225 = "A névoa se dissipará e o brilho da manhã afastará a escuridão da noite."
90001230-226 = "Não dormir é... porque ainda não sei quando isso chegará."
90001230-227 = "Eu acredito. No profeta, em mim mesma e... em minhas preciosas irmãs."
90001230-228 = "Se algo acontecer, como irmã, eu ajudarei vocês."
90001230-229 = "É, é uma honra..."
90001230-231 = "Não precisam se preocupar, nós já somos seres completos."
90001230-232 = "Não há necessidade de mais evolução... nem de mudança."
90001230-233 = "Pois fomos criadas dessa maneira."
90001230-234 = "...Então, vamos observar o mundo que Tiphereth vê, sob a mesma perspectiva?"
90001230-235 = "Sim!"
90001230-238 = "Próximo episódio: Esperança"
