[translation]
42185-3 = "M-mas o que é isso! De onde eles surgiram e para onde desapareceram!?"
42185-4 = "Eu deveria conhecer o mapa da estação perfeitamente, mas... será que existe uma passagem secreta que só eles conhecem!?"
42185-10 = "Com certeza!"
42185-11 = "Desde quando..."
42185-21 = "Estações antigas passam por muitas reformas, então existem várias passagens e espaços que não estão no mapa!"
42185-22 = "Lugares assim tendem a ser propícios para crimes, então as alunas do Departamento de Segurança Pública conhecem bem...#nQuem diria que isso seria útil em um lugar como este!"
42185-26 = "Ah, Fubuki! Tem inimigos... digo, passageiros delinquentes indo para o segundo andar!"
42185-28 = "Uh-huh, estou vendo~"
42185-29 = "Eles pretendem atravessar a escada rolante? Que perigoso~"
42185-34 = "Droga! Vou mostrar para eles!"
42185-36 = "Ah, espera um pouco.#nEssa escada rolante é muito velha, sabe."
42185-40 = "Às vezes ela para de emergência."
42185-48 = "A-ahhh!?"
42185-53 = "Por isso, para sua segurança, fique parado na escada rolante.#nÉ o básico de um cidadão civilizado."
42185-59 = "Esses bando de amadores do Departamento de Segurança Pública... como ousam nos provocar desse jeito..."
42185-60 = "Eu não vou perdoar vocês!"
42185-61 = "Ah, cuidado—"
42185-75 = "Esquecer o 'Shokakuko' (Felicidade de Possuir o Lugar)... até que os elites da Kaiser Corporation ainda têm muito o que aprender!"
42185-76 = "Mesmo que continuem com o desprezo e a perseguição contra nós... mesmo que todos os membros fujam e eu seja o único que sobrar... a luta do 'Shokakuko' continuará."
42185-77 = "Até o dia em que todos em Kivotos percebam a alegria de não trabalhar e não possuir nada — a alegria da não-posse!"
42185-79 = "Buscar um estilo de vida onde você não precisa trabalhar, que ideia fascinante."
42185-80 = "Oh, você tem interesse em um estilo de vida de não-posse?#nNós sempre damos as boas-vindas a novos discípulos!"
42185-81 = "...No entanto, para entrar no 'Shokakuko', você precisa deixar um pouco de seus pertences para trás para provar sua não-posse."
42185-82 = "(Hmm, sinto que o clima está ficando estranho...)"
42185-86 = "...Limpo. A plataforma de subida também foi liberada."
42185-87 = "Pessoal do Departamento de Segurança Pública, muito obrigada.#nGraças a vocês, consegui chegar à plataforma sem me ferir."
42185-88 = "Não há de quê! Eu apenas tomei medidas contra os passageiros delinquentes que estavam causando problemas na estação."
42185-89 = "Na verdade, agradeço pela sua cooperação com o nosso trabalho!"
42185-90 = "...Hoje, a habilidade de CQB que a Kirino demonstrou foi bastante impressionante."
42185-91 = "C-CQB...?#nNão me lembro de ter aprendido isso..."
42185-92 = "Identificar rapidamente a rota em uma situação onde as saídas estão bloqueadas e realizar um ataque surpresa antes que o criminoso reaja é o básico do CQB."
42185-93 = "Eu pensava nisso há algum tempo, mas acho que a capacidade de resposta da Kirino é superior a qualquer um da SRT."
42185-94 = "A história de que o Departamento de Segurança Pública chega ao local mais rápido que qualquer um quando um crime ocorre não era mentira."
42185-96 = "É-é mesmo...?"
42185-97 = "Eu só queria terminar a patrulha logo para comer algo gostoso..."
42185-101 = "..."
42185-102 = "...Bem, mas!#nComo membro do Departamento de Segurança Pública, eu tenho o meu orgulho!"
42185-104 = "Sim. Como moradora do parque, sempre sou bem cuidada por vocês."
42185-105 = "Então... conto com vocês daqui para frente."
42185-107 = "Sim!"
42185-109 = "Próximo episódio: Abyss"
