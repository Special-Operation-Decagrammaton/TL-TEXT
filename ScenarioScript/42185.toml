[translation]#[Texto revisado, mas pode haver alterações como Censura.] Em aguardo de revisão de formatação de texto. - Filipe 11/06.
42185-3 = "M-Mas que droga é essa?! De onde essas pragas tão brotando e sumindo?!"
42185-4 = "A gente tem a planta arquitetônica da estação inteira decorada... Será que tem passagens falsas que só essas guardinhas conhecem?!"
42185-10 = "Mas é claro que sim!"
42185-11 = "Quando foi que ela――"
42185-21 = "Estações velhas como essa sofreram dezenas de puxadinhos e reformas ao longo dos anos! Tá cheio de dutos e espaços mortos que nem existem nos mapas oficiais!"
42185-22 = "E como esses cantos escuros são os berços perfeitos pra vagabundo se esconder e cometer crime... o Bureau de Segurança Cidadã tem cada milímetro decorado na cabeça!#nQuem diria que patrulhar beco sujo ia salvar nossas vidas numa guerra tática?!"
42185-26 = "Ah, Fubuki! Inimigos... digo, passageiros infratores a caminho do segundo andar!"
42185-28 = "Uhum, uhum, tô vendo eles subindo~"
42185-29 = "Eles tão achando que vão subir correndo e atirando pela escada rolante? Que perigo~"
42185-34 = "Suas malditas! Vocês vão engolir chumbo!!"
42185-36 = "Ah, um segundinho de pausa. Essa escada rolante é meio jurássica, sabe?"
42185-40 = "De vez em qua~ndo ela dá uma travada brutal de emergência do nada."
42185-48 = "W-Waaahhh?!"
42185-53 = "É por isso que a regra manda ficar paradinho segurando no corrimão. É o básico da educação civilizada no transporte público, moço."
42185-59 = "Seu bando de lixo da Segurança Cidadã... fazendo a gente de palhaço com essas armadilhas ridículas..."
42185-60 = "EU VOU MATAR VOCÊS!!"
42185-61 = "Ah, cuidad――"
42185-75 = "Vocês ousaram esquecer do Movimento FeliSem?! O 'treinamento de elite' da Kaiser falhou miseravelmente em vocês!"
42185-76 = "Não importa o quanto vocês cospam na gente e nos torturem... Mesmo que todos os meus irmãos de rua fujam de medo e só sobre eu de pé... A Guerra da FeliSem continua!"
42185-77 = "Nós vamos lutar até o dia em que toda Kivotos largar a carteira de trabalho, jogar as posses no lixo e descobrir o êxtase absoluto de Não Possuir Nada!!"
42185-79 = "Caramba... o lema de 'Nunca Mais Trabalhar na Vida' me parece uma filosofia incrivelmente sedutora~"
42185-80 = "Oh, a policial sente o chamado do Vazio Material?! Nós aceitamos novos monges mendigos de braços abertos a qualquer hora!"
42185-81 = "……O único detalhe é que, pra entrar na 'FeliSem' e provar o seu desapego, a senhorita precisa nos transferir um *pouquinho* dos seus bens materiais e do seu salário antes, hehe."
42185-82 = "（Huuuum... O cheirinho de golpe de pirâmide bateu forte agora...）"
42185-86 = "……Setor limpo. A rota para a plataforma superior está segura."
42185-87 = "Esquadrão da Segurança Cidadã, meu sincero agradecimento.#nGraças à cobertura de vocês, nós atravessamos o saguão sem perder sangue."
42185-88 = "Que isso, imagina! A gente só fez o nosso trabalho de multar arruaceiros que tavam causando tumulto na estação, hehe!"
42185-89 = "Nós é que agradecemos por deixarem a gente brincar de tiro ao alvo!"
42185-90 = "……As suas manobras de CQB e infiltração hoje foram extremamente letais e impressionantes, Kirino."
42185-91 = "C-CQB...? Mas eu nem lembro de ter tido nota boa em combate de curta distância na academia..."
42185-92 = "Em um ambiente fechado com múltiplas emboscadas, você mapeou as rotas alternativas instantaneamente e flanqueou o inimigo antes dele ter tempo de mirar. Isso é a essência pura do CQB."
42185-93 = "Eu sempre suspeitei disso, mas a sua leitura de ambiente e tempo de reação superam muitos operadores forjados nas trincheiras da SRT."
42185-94 = "Os boatos de que a Segurança Cidadã brota na cena do crime antes mesmo da bala cair no chão não eram folclore."
42185-96 = "N-Nossa, é mesmo...?"
42185-97 = "Mas a verdade é que eu só decoro as rotas pra terminar a patrulha mais rápido e ir comer uns doces na rua de trás..."
42185-101 = "……"
42185-102 = "……M-MAS, independente dos meus motivos gulosos! Como cadete orgulhosa do Bureau de Segurança Cidadã, eu dou a minha vida pra manter as ruas seguras!"
42185-104 = "Eu sei disso. Como uma 'ex-moradora de rua' do parque da sua jurisdição, serei eternamente grata pela sua patrulha."
42185-105 = "Então... a gente assume a linha de frente daqui para a escuridão."
42185-107 = "Boa caçada, Miyako!!"
42185-109 = "Próximo Episódio: O Abismo"