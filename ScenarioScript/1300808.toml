[translation]
1300808-1 = "思いがけない幸運"
1300808-2 = "（夜中まで予定されていた夜の市場のバイトが、思ってたより早く終わった）"
1300808-4 = "いやー、ラッキーだったわ。ね？先生？"
1300808-5 = "徹夜の覚悟してたのに、思ってたより好況で、材料切れで営業終了。"
1300808-6 = "バイト代は約束の通り全部もらった上に、こんなに早く終わるなんて！"
1300808-7 = "たまにはこんな日もあるのね、先生？"
1300808-8 = "[s] \"うん、良かったね。\""
1300808-9 = "へえ、こっちの街は結構賑やかね。アビドスにはない物も色々あるみたいだし……。"
1300808-10 = "あれ見て、たこ焼き！イカ焼きもある！"
1300808-11 = "あそこには面白い仮面も売ってるみたいよ？"
1300808-12 = "[s] \"ちょっと回ってみる？\""
1300808-13 = "う、うん？"
1300808-14 = "ま、回る？二人で？"
1300808-15 = "……。"
1300808-16 = "[s] \"あ、それとも疲れてるし、真っすぐ帰る？\""
1300808-17 = "だ、誰も行かないとは言ってないでしょ！？"
1300808-18 = "せ、せっかく早く終わったし！このまま帰るのももったいないし……。"
1300808-19 = "た、たまには休憩も大事だしね？"
1300808-20 = "じゃあ、まずは……。"
1300808-23 = "（セリカが腕を組んできた）"
1300808-24 = "……。"
1300808-25 = "……な、なに？……嫌なの？"
1300808-26 = "[s1] \"えっと……。\"\n[s2] \"その……。\""
1300808-27 = "ああもう、いいから何も言わないで！"
1300808-28 = "ああもう、いいから何も言わないで！"
1300808-29 = "……へへ。"
1300808-30 = "さ～て♪あっちから見て回ろっか！"
1300808-32 = "（セリカと一緒にイカ焼きと醬油味のトウモロコシ、じゃがバター、たこ焼きを食べて、屋台のあっちこっちを見回って）"
1300808-33 = "（夜中になる頃にようやく家に帰った）"
