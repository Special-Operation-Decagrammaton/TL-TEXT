[translation]
1300808-1 = "Uma sorte inesperada"
1300808-2 = "（O trabalho de meio período no mercado noturno, que estava previsto para ir até a madrugada, terminou mais cedo do que eu pensava）"
1300808-4 = "Nossa, que sorte, né? Sensei?"
1300808-5 = "Eu estava preparada para virar a noite, mas o movimento foi tão bom que os ingredientes acabaram e fechamos mais cedo."
1300808-6 = "Recebi o pagamento completo como combinado e ainda por cima terminamos tão cedo!"
1300808-7 = "Às vezes acontecem dias assim, não é, Sensei?"
1300808-8 = "[s] \"Sim, que bom para você.\""
1300808-9 = "Ei, esta parte da cidade é bem movimentada. Parece que tem várias coisas que não tem em Abydos..."
1300808-10 = "Olha aquilo, takoyaki! E tem lula grelhada também!"
1300808-11 = "Parece que estão vendendo umas máscaras interessantes ali também, viu?"
1300808-12 = "[s] \"Quer dar uma volta?\""
1300808-13 = "H-hein?"
1300808-14 = "D-dar uma volta? Nós dois?"
1300808-15 = "……."
1300808-16 = "[s] \"Ah, ou se você estiver cansada, quer ir direto para casa?\""
1300808-17 = "E-eu não disse que não queria ir, sabia!?"
1300808-18 = "J-já que terminamos cedo mesmo! Seria um desperdício ir embora agora..."
1300808-19 = "E, bem, descansar um pouco de vez em quando é importante, né?"
1300808-20 = "Então, primeiro..."
1300808-23 = "（Serika entrelaçou o braço no seu）"
1300808-24 = "……."
1300808-25 = "……Q-que foi? ……Você não quer?"
1300808-26 = "[s1] \"Bem...\"\n[s2] \"É que...\""
1300808-27 = "Ah, chega, não precisa dizer nada!"
1300808-28 = "Ah, chega, não precisa dizer nada!"
1300808-29 = "……Hehe."
1300808-30 = "Muito bem♪ Vamos começar olhando por ali!"
1300808-32 = "（Comi lula grelhada, milho com molho de soja, batata com manteiga e takoyaki com a Serika, enquanto passeávamos pelas barracas）"
1300808-33 = "（Voltamos para casa finalmente quando já era madrugada）"
