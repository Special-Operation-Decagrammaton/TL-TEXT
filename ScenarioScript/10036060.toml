[translation]
10036060-1 = "Episódio 6: O Atacante das Sombras"
10036060-2 = "（Sem que as três soubessem, visitei Saori novamente）"
10036060-7 = "Sensei, precisa de algo?"
10036060-8 = "[s] \"Não, o palco do DJ está indo bem?\""
10036060-9 = "Sim, claro. #nAcabei de terminar a limpeza ao redor do palco."
10036060-10 = "No entanto, está um pouco barulhento..."
10036060-15 = "N-não se afaste de mim nem um passo! #nNão consigo parar de pensar em quando seremos atacados..."
10036060-16 = "Estamos seguros aqui, por favor, acalme-se."
10036060-17 = "Também aumentamos o número de guardas."
10036060-18 = "Ah, estou preocupado..."
10036060-25 = "Acabei de reforçar a escolta do DJ B.o.B."
10036060-26 = "Por causa disso, o pessoal que patrulha fora do local diminuiu."
10036060-27 = "Desse jeito..."
10036060-28 = "[s] \"Algo está te incomodando?\""
10036060-29 = "...Parte da segurança ficará vulnerável."
10036060-30 = "[s] \"Quer que a gente faça a ronda?\""
10036060-31 = "Ah, isso seria de grande ajuda."
10036060-32 = "Vamos logo."
10036060-35 = "Agora só falta esperar o sinal."
10036060-36 = "Ei! Como estão as coisas no local?"
10036060-37 = "...Exatamente como o Sensei previu."
10036060-38 = "Com o DJ aumentando a escolta, a segurança fora do local ficou vulnerável."
10036060-39 = "Haha."
10036060-40 = "Quem diria que aconteceria exatamente assim."
10036060-44 = "É o Sensei."
10036060-45 = "Deve ser a confirmação final."
10036060-51 = "Pessoal, sou eu."
10036060-52 = "Estão prontos?"
10036060-54 = "Sim, tudo pronto!"
10036060-55 = "Aliás, como você conseguiu a informação de que aquele barbudo ia aumentar a escolta? #n"
10036060-57 = "O DJ B.o.B é conhecido no submundo."
10036060-58 = "Ao investigar um pouco, o perfil dele ficou claro."
10036060-59 = "Covarde e preocupado demais. #nHá uma grande chance de ele ficar histérico se algo acontecer com ele."
10036060-60 = "A partir disso, foi fácil imaginar que ele aumentaria a escolta após o primeiro ataque. #n"
10036060-61 = "Foi assim que criamos um ponto fraco na segurança."
10036060-62 = "Não foi nada difícil. Isso é como a abertura de um jogo."
10036060-63 = "O resto depende de vocês."
10036060-64 = "Rompam a segurança enfraquecida e ataquem o local."
10036060-65 = "Fazendo isso, a vingança contra o Grupo Capacete será realizada."
10036060-66 = "Falei demais. #nEntão, pessoal, desejo-lhes boa sorte."
10036060-73 = "O primeiro ataque foi por causa disso..."
10036060-74 = "De jeito nenhum, deve ter sido coincidência."
10036060-75 = "Mais importante, agora finalmente podemos vingar nossa chefe!"
10036060-76 = "Mal posso esperar para vê-la livre novamente...!"
10036060-77 = "Idiota, por que está chorando?"
10036060-78 = "A operação vai começar logo!"
10036060-80 = "O que está acontecendo...?"
10036060-81 = "Se o que ouvi for verdade, o local está em perigo...!"
10036060-82 = "Não tenho obrigação de proteger o festival do Grupo Capacete, mas #nlá agora..."
10036060-86 = "..."
10036060-87 = "Sensei, isso é um pedido egoísta meu, mas..."
10036060-88 = "[s] \"Você quer proteger o tempo divertido de todos, não quer?\""
10036060-89 = "Ah, me empreste sua força!"
10036060-91 = "Aqui é a Equipe A, prontos para avançar a qualquer momento."
10036060-92 = "Equipe B, sem anormalidades."
10036060-93 = "Equipe C, preparação concluída."
10036060-95 = "Muito bem, perfeito."
10036060-96 = "Finalmente chegou a hora da vingança!"
10036060-97 = "Bando do Capacete, vou mostrar a vocês o que é bom...!"
10036060-98 = "Vamos lá, destruam o local do evento!"
10036060-99 = "...Estão me ouvindo?"
10036060-100 = "Aqui é a... Equipe C... o pessoal... está estranho..."
10036060-101 = "O áudio está cortando? #nEi, o que aconteceu!?"
10036060-102 = "..."
10036060-103 = "(Ruído estático)"
10036060-104 = "O que está acontecendo...?"
10036060-105 = "...!?"
10036060-106 = "Agora mesmo, uma sombra estranha..."
10036060-107 = "(Ruído estático)"
10036060-108 = "Droga, a conexão...!"
10036060-109 = "Equipe B! Respondam!"
10036060-110 = "Ali! Atirem!"
10036060-111 = "Eles estão vindo!"
10036060-112 = "..."
10036060-113 = "(Ruído estático)"
10036060-114 = "Pessoal...?"
10036060-115 = "O que significa isso...?"
10036060-116 = "O que está acontecendo..."
10036060-121 = "Aaaah! #nS-se está aí, apareça!"
10036060-122 = "Se acalma, deve ser só o vento!"
10036060-123 = "E-ei! Não vá sozinho!"
10036060-129 = "!?"
10036060-130 = "R-respondam!"
10036060-131 = "N-não fiquem em silêncio, digam alguma coisa, por favor!"
10036060-138 = "Eh...?"
10036060-148 = "...Muito bem."
10036060-149 = "Não tinham um plano para quando os aliados fossem derrotados...? Que amadores."
10036060-150 = "Tudo isso foi graças ao comando do Sensei."
10036060-151 = "Meus agradecimentos."
10036060-152 = "[s1] \"Não, Saori, você que fez um bom trabalho.\" \n[s2] \"Com isso, o local do evento está protegido.\""
10036060-155 = "Mas, por que as Sukeban estão mirando no local do festival...?"
10036060-156 = "Seja qual for o motivo, não pretendo deixar que façam o que quiserem."
10036060-157 = "...Já está nesse horário?"
10036060-158 = "Preciso voltar para o palco logo!"
10036060-159 = "Sensei, desculpe, mas..."
10036060-160 = "[s] \"Sim, vá em frente.\""
10036060-161 = "...Nos veremos novamente."
10036060-166 = "[ns3] \"Depois de impedir o sequestro do DJ...\" \n[ns4] \"Agora um ataque ao local do evento...\""
10036060-172 = "[ns] \"O que, afinal, está...\""
10036060-175 = "[ns] \"Está aproveitando o festival?\""
10036060-176 = "Sensei, bem-vindo de volta."
10036060-177 = "Acabei de dar uma volta pela área de jogos."
10036060-178 = "O resultado foi um tanto decepcionante, porém."
10036060-179 = "Sensei... acabou para mim..."
10036060-180 = "Todos os sorteios foram um fracasso... e o tiro ao alvo também não deu em nada..."
10036060-181 = "Eu sabia que não havia esperança... #nA felicidade é algo que desmorona em um instante, como um castelo de areia, não é..."
10036060-182 = "[s] \"Vai ficar tudo bem, anime-se!\""
10036060-183 = "Mas..."
10036060-184 = "[s] \"Ainda falta o palco do DJ!\""
10036060-186 = "……É verdade."
10036060-187 = "O palco onde a Sacchan está se esforçando vai começar agora."
10036060-188 = "Vamos antes que comece."
