[translation]
10036060-1 = "第6話;暗闇からの襲撃者"
10036060-2 = "（三人には内緒で、再びサオリのもとを訪れた）"
10036060-7 = "先生、何か用か？"
10036060-8 = "[s] \"ううん、DJステージは順調？\""
10036060-9 = "ああ、もちろんだ。#nちょうどステージ周辺の片付けも終えた。"
10036060-10 = "しかし、少々騒がしくてな……。"
10036060-15 = "わ、私から一歩も離れるなよ！#nいつ襲われるか気が気じゃないんだ……。"
10036060-16 = "ここは安全ですから、落ち着いてください。"
10036060-17 = "護衛の数も増やしましたから。"
10036060-18 = "ああ、心配だ……。"
10036060-25 = "DJ B.o.Bの護衛を増員したところだ。"
10036060-26 = "そのせいで、会場の外をパトロールする人員が減っている。"
10036060-27 = "これでは……。"
10036060-28 = "[s] \"何か気になってるの？\""
10036060-29 = "……一部の警備が手薄になってしまう。"
10036060-30 = "[s] \"私たちで見回りをしようか。\""
10036060-31 = "ああ、助かる。"
10036060-32 = "さっそく向かおう。"
10036060-35 = "あとは合図を待つだけだな。"
10036060-36 = "おい！現場はどうなってる？"
10036060-37 = "……教授の予想通りだ。"
10036060-38 = "DJが護衛を増やしたことで、会場の外は警備が手薄になってる。"
10036060-39 = "ははっ。"
10036060-40 = "まさか、本当にこうなるとはな。"
10036060-44 = "教授だ。"
10036060-45 = "最終確認かもしれないな。"
10036060-51 = "皆さん、私です。"
10036060-52 = "準備はよろしいですか？"
10036060-54 = "ああ、バッチリだ！"
10036060-55 = "ところで、あの髭ヅラが護衛を増やすって情報は、#nどうやって手に入れたんだ？"
10036060-57 = "DJ B.o.Bは、裏世界で名が知れています。"
10036060-58 = "そこで少し調べたところ、人物像が浮かんできたのです。"
10036060-59 = "臆病な心配性。#n自分の身に何か起きそうになると、ヒステリックになる可能性が高い、と。"
10036060-60 = "そこから、一度目の襲撃を受けてから護衛を増やすであろうことは、#n容易に想像できました。"
10036060-61 = "こうして、警備が手薄になる場所を作ったのです。"
10036060-62 = "何の造作もありませんよ。これはゲームのオープニングのようなもの。"
10036060-63 = "あとは、皆さん次第です。"
10036060-64 = "手薄になった警備を突破し、会場を襲撃。"
10036060-65 = "そうしていけば、ヘルメット団への復讐も叶うでしょう。"
10036060-66 = "少々話が長くなりましたね。#nでは皆さん、健闘を祈っていますよ。"
10036060-73 = "最初の襲撃は、このためだったのか……。"
10036060-74 = "まさか、どうせ偶然だろ。"
10036060-75 = "それより、これでようやく姐様の仇が打てる！"
10036060-76 = "早くシャバの空気を吸わせてやりてぇな……！"
10036060-77 = "バカ、なに泣いてんだよ。"
10036060-78 = "もうすぐ作戦開始だぞ！"
10036060-80 = "どうなっている……？"
10036060-81 = "今の話が本当なら、会場が危ない……！"
10036060-82 = "ヘルメット団のお祭りを守る義理はないが、#nあそこでは今……。"
10036060-86 = "……。"
10036060-87 = "先生、これは私のワガママなんだが……。"
10036060-88 = "[s] \"みんなの楽しい時間を守ってあげたいんだよね？\""
10036060-89 = "ああ、力を貸してくれ！"
10036060-91 = "こちらチームA、いつでも行ける。"
10036060-92 = "チームB、異常なし。"
10036060-93 = "チームC、準備完了だ。"
10036060-95 = "よし、完璧だ。"
10036060-96 = "ついに復讐の時が来た！"
10036060-97 = "ヘルメット団め、目に物を見せてやる……！"
10036060-98 = "行くぞ、会場をメチャクチャにしてやれ！"
10036060-99 = "……聞こえてるか？"
10036060-100 = "こち……ムC……様……が変……だ。"
10036060-101 = "音が途切れてるぞ？#nおい、何かあったのか！？"
10036060-102 = "……。"
10036060-103 = "（ブツッ）"
10036060-104 = "どうなってんだ……？"
10036060-105 = "……！？"
10036060-106 = "今、変な影が――"
10036060-107 = "（ブツッ）"
10036060-108 = "クソッ、回線が……！"
10036060-109 = "チームB！応答しろ！"
10036060-110 = "あっちだ！撃て！"
10036060-111 = "来るぞっ！"
10036060-112 = "……。"
10036060-113 = "（ブツッ）"
10036060-114 = "みんな……？"
10036060-115 = "どういうことだ……？"
10036060-116 = "何が起きて――"
10036060-121 = "ひいっ！#nい、いるなら出てこい！"
10036060-122 = "落ち着けって、ただの風に決まってる！"
10036060-123 = "お、おい！一人で行くな！"
10036060-129 = "！？"
10036060-130 = "は、反応しろ！"
10036060-131 = "だ、黙ってないで何か言ってくれ、頼む！"
10036060-138 = "え……？"
10036060-148 = "……よし。"
10036060-149 = "仲間がやられた時の対策を立てていなかったのか……甘いな。"
10036060-150 = "これも全部、先生の指揮のおかげだ。"
10036060-151 = "礼を言おう。"
10036060-152 = "[s1] \"ううん、サオリこそお疲れ様。\"\n[s2] \"これで会場は守られたね。\""
10036060-155 = "しかし、なぜスケバンはお祭り会場を狙っているのか……。"
10036060-156 = "理由はどうあれ、好き勝手させるつもりはない。"
10036060-157 = "……もうこんな時間か。"
10036060-158 = "早くステージに戻らなくては！"
10036060-159 = "先生、悪いが……。"
10036060-160 = "[s] \"うん、いってらっしゃい。\""
10036060-161 = "……また会おう。"
10036060-166 = "[ns3] \"DJの拉致を阻止したかと思えば……。\"\n[ns4] \"今度は会場の襲撃……。\""
10036060-172 = "[ns] \"いったい、何が……。\""
10036060-175 = "[ns] \"お祭り、楽しんでる？\""
10036060-176 = "先生、おかえり。"
10036060-177 = "今、ゲームコーナーを回ってきたところ。"
10036060-178 = "結果は微妙だったけど。"
10036060-179 = "先生……もう終わりです……。"
10036060-180 = "クジは全部ハズレでしたし……射的も全然ダメでした……。"
10036060-181 = "やっぱり希望なんてありません……#n幸せなんて、砂のお城みたいに一瞬で崩れるものなんですよね……。"
10036060-182 = "[s] \"大丈夫だよ、元気出して！\""
10036060-183 = "ですが……。"
10036060-184 = "[s] \"まだDJステージが残ってるよ！\""
10036060-186 = "……そうだ。"
10036060-187 = "サッちゃんが頑張ってるステージは、これからだった。"
10036060-188 = "始まる前に行こう。"
