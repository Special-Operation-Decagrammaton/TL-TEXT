[translation]
2003105-1 = "Calorosamente"
2003105-2 = "（Curioso sobre o bar de leite com frutas que Shigure mencionou, você visita a fonte termal onde ela trabalha）"
2003105-8 = "Ah, Sensei. Seja bem-vindo."
2003105-9 = "Eu estava justamente pensando em começar o expediente do bar agora."
2003105-10 = "Os clientes que entraram logo que a fonte termal abriu devem estar saindo em breve."
2003105-11 = "[s] \"O que exatamente você faz nesse bar de leite com frutas?\""
2003105-12 = "Como eu disse no Momotalk, Sensei."
2003105-13 = "Quando um cliente faz um pedido, eu pergunto a preferência dele e, #nna hora, misturo os ingredientes para criar o melhor leite com frutas."
2003105-14 = "É um método um pouco trabalhoso, então #nno começo o pessoal daqui parecia confuso, mas..."
2003105-15 = "Eu disse que não precisava de salário se me deixassem fazer do meu jeito, #ne eles me deram permissão por alguns dias."
2003105-16 = "Eu posso testar várias receitas novas e os clientes bebem o melhor leite com frutas. #nNão é uma vantagem para ambos?"
2003105-17 = "[s1] \"Se a Shigure está se divertindo, então tudo bem...\"\n[s2] \"Estou preocupado se você não vai colocar ingredientes estranhos...\""
2003105-20 = "Fufu. Se está tão preocupado, fique aí e observe enquanto eu trabalho."
2003105-21 = "Bem... #nO leite já está preparado, e o copo de mistura e a colher bailarina também, então..."
2003105-26 = "Muito bem, então... o expediente começou."
2003105-33 = "Ufa... que banho bom."
2003105-34 = "Mas acho que fiquei tempo demais, estou um pouco com sede..."
2003105-35 = "Com licença, tem leite com frutas?"
2003105-36 = "Sim, tem. Que sabor você quer?"
2003105-37 = "Q-que sabor? Perguntado assim de repente, eu não sei dizer..."
2003105-38 = "Bem... algo que não seja muito doce, por favor."
2003105-39 = "Não muito doce, entendi..."
2003105-49 = "Aqui está. Com pouco açúcar, um leite de frutas vermelhas triplo feito com três tipos de bagas."
2003105-50 = "Misturei lingonberry e cranberry, depois #nadicionei framboesa para dar textura. Experimente."
2003105-51 = "Então..."
2003105-57 = "Ah, o dulçor está perfeito! #nA acidez das frutas combina com a suavidade do leite, não está forte demais..."
2003105-58 = "E acima de tudo, é a primeira vez que tomo um leite com frutas tão sofisticado!"
2003105-59 = "Fufu, fico feliz que tenha gostado."
2003105-67 = "Com licença, eu sempre fico com dor de barriga quando tomo leite..."
2003105-68 = "Tem algo que eu possa beber...?"
2003105-69 = "Claro. Espere um pouco."
2003105-80 = "Aqui está, um leite de soja tropical feito com leite de soja em vez de leite comum."
2003105-81 = "Usei frutas tropicais para dar um toque refrescante."
2003105-87 = "É verdade, não estou sentindo dor nenhuma... #nDesse jeito, eu poderia beber o quanto quisesse!"
2003105-88 = "Muito obrigada! #nParece um sonho poder fazer algo tão típico depois do banho...!"
2003105-89 = "Fufu, de nada. Mas não é bom exagerar, então #nhoje se contente apenas com este copo, está bem?"
2003105-97 = "Ah... talvez por causa do trabalho cansativo, #nmesmo tendo entrado na fonte termal, sinto que não descansei nada..."
2003105-98 = "Tem alguma bebida que ajude a tirar o cansaço?"
2003105-99 = "Hmm, se você está cansado..."
2003105-106 = "Aqui, um sabor Youkai MAX Fruit."
2003105-110 = "[ns] \"Isso já não é mais leite com frutas, é...?\""
2003105-111 = "Um barman de verdade precisa ser capaz de servir #nqualquer bebida que o cliente desejar."
2003105-112 = "Se você quer recuperar as energias rápido, um energético é melhor que leite com frutas, não é?"
2003105-118 = "Veio algo diferente do que eu esperava, mas... #nme sinto um pouco mais disposto depois de beber."
2003105-119 = "Era exatamente o que eu precisava agora. Obrigado pela consideração."
2003105-120 = "Fufu, de nada."
2003105-122 = "（O bar de leite com frutas da Shigure foi um grande sucesso, #ne muitos clientes visitaram a sala de descanso para pedir leite com frutas.）"
2003105-123 = "（Enquanto observava tudo, muito tempo se passou sem que eu percebesse...）"
2003105-126 = "[ns] \"Ah, o que eu faço...\""
2003105-128 = "Hm, aconteceu alguma coisa?"
2003105-129 = "……Ah, perdeu o último trem de volta para Schale, é?"
2003105-130 = "Mas não é um problema tão grande, né? Afinal, aqui é uma fonte termal."
2003105-131 = "Temos muitos quartos de hóspedes, é só passar a noite e voltar amanhã—"
2003105-135 = "Bem... sinto muito, mas todos os quartos estão ocupados hoje."
2003105-136 = "Os clientes que beberam o leite com frutas da Shigure hoje pediram para estender a estadia porque querem beber mais amanhã..."
2003105-137 = "……Puxa vida, parece que me esforcei demais."
2003105-141 = "O que vai fazer, Sensei? Parece que não tem nenhum quarto disponível."
2003105-142 = "Mas, em um dia frio como hoje, não posso deixar o Sensei dormir lá fora..."
2003105-147 = "Ah. Então, quer dormir no meu alojamento?"
2003105-148 = "[s] \"No da Shigure...?\""
2003105-149 = "Sim. Os funcionários que trabalham aqui recebem um alojamento para a equipe."
2003105-150 = "É um pouco apertado, mas acho melhor do que dormir lá fora."
2003105-151 = "[s3] \"Não parece haver outra opção...\".\n[s4] \"Então, vou aceitar o convite por apenas uma noite.\""
2003105-154 = "Fufu, entendi. Então vou arrumar as coisas aqui rapidinho e te guiar até o quarto."
2003105-157 = "O que achou? É um quarto surpreendentemente aconchegante, não é?"
2003105-158 = "Já estendi o futon. Pode dormir aí."
2003105-161 = "[ns5] \"Ei... Shigure?\"\n[ns6] \"Parece que só tem um futon...\""
2003105-164 = "Hm? Pois é. Originalmente é um quarto para uma pessoa só."
2003105-165 = "Mas acho que se nos esforçarmos, cabemos os dois..."
2003105-168 = "Então, não precisa ser tímido, viu?"
2003105-173 = "[wa:650]― [log=시구레 온천ND]Sim, [wa:230]Sensei.[/log]"
2003105-174 = "[wa:1100]― [log=시구레 온천ND]Está [wa:610]frio fora do futon, não está?[/log]"
2003105-177 = "― [log=시구레 온천ND]Não seja teimoso e [wa:1000]venha para cá.[/log]"
2003105-180 = "[wa:800]― [log=시구레 온천ND]O futon está [wa:480]bem fofinho e [wa:1380]quentinho, sabe?[/log]"
2003105-183 = "― [log=시구레 온천ND]Acho que você [wa:540]vai pegar no sono rapidinho aqui.[/log]"
2003105-186 = "[wa:1000]― [log=시구레 온천ND]Se, [wa:900]só o futon [wa:700]não for o suficiente para o frio...[/log][wa:150] "
2003105-189 = "― [log=시구레 온천ND]Eu posso servir de [wa:960]bolsa de água quente.[/log]"
2003105-192 = "[wa:550]― [log=시구레 온천ND]Hã? [wa:1100]A bolsa de água quente [wa:660]que estava aqui...?[/log]"
2003105-195 = "― [log=시구레 온천ND]Bem... [wa:260]é que... [wa:1530]eu bebi [wa:1620]o conteúdo.[/log]"
2003105-198 = "[wa:780]― [log=시구레 온천ND]É que, [wa:1060]dentro do futon...[/log]"
2003105-199 = "[wa:1720]― [log=시구레 온천ND]A temperatura estava perfeita [wa:1160]para aquecer o Mors...[/log]"
2003105-202 = "― [log=시구레 온천ND]Enquanto eu trabalhava agora pouco,[/log]"
2003105-203 = "[wa:1800]― [log=시구레 온천ND]eu troquei o conteúdo da bolsa [wa:970]por Mors especial.[/log]"
2003105-206 = "[wa:480]― [log=시구레 온천ND]Mas... [wa:560]não tem jeito, né?[/log][wa:50] "
2003105-209 = "― [log=시구레 온천ND]Já que as coisas ficaram assim,[/log]"
2003105-210 = "[wa:1220]― [log=시구레 온천ND]não tem outra forma [wa:2020]de se aquecer...[/log]"
2003105-213 = "― [log=시구레 온천ND]Por isso, esta noite,[/log]"
2003105-214 = "[wa:1300]― [log=시구레 온천ND]Sensei, seja você [wa:620]a minha [wa:630]bolsa de água quente.[/log]"
2003105-219 = "[ns] Beber o Mors da bolsa de água quente."
2003105-222 = "……Ué? O que houve de repente, Sensei?"
2003105-223 = "Por acaso está com sede?"
2003105-224 = "[s7] \"...Este Mors parece estar fermentado.\"\n[s8] \"Tem um cheiro bem forte e ácido.\""
2003105-227 = "Hã? Não deveria estar."
2003105-228 = "Eu não coloquei fermento nem açúcar nesse Mors."
2003105-229 = "Além disso, só faz um dia que eu preparei. Como poderia fermentar assim...?"
2003105-230 = "[s9] \"Mas meu rosto está ficando estranhamente quente.\"\n[s10] \"Não tem erro! Está fermentado!\""
2003105-236 = "[ns11] \"Meu corpo também está esquentando, então acho que não preciso do futon.\"\n[ns12] \"Por isso, pode usar sozinha, Shigure!\""
2003105-239 = "……Hmm, entendi."
2003105-240 = "Bem, tudo bem. Não posso forçar o Sensei a entrar no futon se você está sentindo calor."
2003105-241 = "Mas se sentir frio, pode voltar a qualquer momento, viu? Vou deixar o espaço livre."
2003105-243 = "（Depois disso, passei a noite encolhida sobre o tatame）"
2003105-244 = "（Felizmente nada aconteceu, mas talvez por ter dormido em um lugar frio, #nacabei pegando um resfriado leve depois...）"
