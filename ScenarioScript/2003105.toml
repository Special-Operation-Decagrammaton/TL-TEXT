[translation]
2003105-1 = "温かく"
2003105-2 = "（シグレが言っていたフルーツ牛乳バーが気になって、彼女が働いている温泉を訪れた）"
2003105-8 = "あ、先生。いらっしゃい。"
2003105-9 = "今、ちょうどバーの営業を始めようと思ってたところだよ。"
2003105-10 = "温泉の営業が始まった直後に入ったお客さんが、そろそろ出てくるはずだから。"
2003105-11 = "[s] \"フルーツ牛乳バーって、具体的に何をするの？\""
2003105-12 = "モモトークで言った通りだよ、先生。"
2003105-13 = "お客さんから注文が来たら好みを聞いて、#nその場で材料をブレンドして最高のフルーツ牛乳を作るの。"
2003105-14 = "少し面倒な方法だから、#n最初はこの施設の人も戸惑ってたみたいだったけど……。"
2003105-15 = "「好きにさせてもらえるなら給料はいらない」って伝えたら、#n数日だけ許可してくれたんだ。"
2003105-16 = "私は新しいレシピをたくさん試せるし、お客さんは最高のフルーツ牛乳が飲める。#nお互いにとってプラスじゃない？ "
2003105-17 = "[s1] \"シグレが楽しいならいいんだけど……。\"\n[s2] \"変な材料を入れないか不安だなぁ……。\""
2003105-20 = "ふふっ。そんなに不安なら、そこで私の働く姿を見守ってて。"
2003105-21 = "えーっと……#n牛乳の準備は終わったし、ミキシンググラスとマドラーも用意したから……。"
2003105-26 = "よし、それじゃ……営業開始だね。"
2003105-33 = "ふぅ……いいお湯だった。"
2003105-34 = "けど長い時間入ってたからか、少し喉が渇いたな……。"
2003105-35 = "すみません、フルーツ牛乳ありますか？"
2003105-36 = "うん、あるよ。どんな味にする？"
2003105-37 = "ど、どんな味か？急にそう言われると悩みますけど……。"
2003105-38 = "そうですね……甘すぎない感じでお願いします。"
2003105-39 = "甘すぎない、か……わかった。"
2003105-49 = "はい。甘さ控えめ、三種のベリーで作ったトリプルベリー牛乳だよ。"
2003105-50 = "リンゴンベリーとクランベリーをブレンドした後、#nラズベリーを加えて食感を足したんだ。飲んでみて。"
2003105-51 = "では……。"
2003105-57 = "あっ、ちょうどいい甘さです！#nベリーの酸味も牛乳のまろやかさと相まって、そんなに強くないし……。"
2003105-58 = "なにより、こんなに高級感のあるフルーツ牛乳は初めてです！"
2003105-59 = "ふふっ、気に入ってくれてよかった。"
2003105-67 = "あの、私は牛乳を飲むといつもお腹が痛くなるんですけど……。"
2003105-68 = "私でも飲めるものはありますか……？"
2003105-69 = "もちろん。ちょっと待ってね。"
2003105-80 = "はい、牛乳の代わりに豆乳で作ったトロピカル豆乳だよ。"
2003105-81 = "トロピカルフルーツを使って、さっぱりとした味に仕上げてみたんだ。"
2003105-87 = "本当だ、お腹が全然痛くならない……#nこれならいくらでも飲めそうです！"
2003105-88 = "ありがとうございます！#nこんなお風呂上がりらしいことができる日が来るなんて、夢みたい……！"
2003105-89 = "ふふっ、どういたしまして。けど飲み過ぎるのもよくないから、#n今日はこの一杯だけで我慢してね。"
2003105-97 = "はぁ……仕事が忙しかったせいか、#n温泉に浸かったのに全然疲れが取れてない気がする……。"
2003105-98 = "何か疲れが取れる飲み物はない？"
2003105-99 = "うーん、疲れてるなら……。"
2003105-106 = "はい、妖怪MAXフルーツ味だよ。"
2003105-110 = "[ns] \"それ、もはやフルーツ牛乳ではないんじゃ……？\""
2003105-111 = "一人前のバーテンダーなら、お客さんに合わせて#nどんな飲み物でも提供できないといけないから。"
2003105-112 = "すぐに疲れをとりたいなら、フルーツ牛乳よりはエナジードリンクだよね。"
2003105-118 = "思ってたのとは違うものがでてきたけど……#n飲んだら少し元気が出てきたかも。"
2003105-119 = "今の私に一番必要なものだった。気遣ってくれてありがとう。"
2003105-120 = "ふふっ、どういたしまして。"
2003105-122 = "（シグレのフルーツ牛乳バーは大好評で、#n多くのお客さんがフルーツ牛乳を注文しに休憩室を訪れた）"
2003105-123 = "（その様子をずっと見守っていたら、いつの間にか随分時間が経っていた……）"
2003105-126 = "[ns] \"あっ、どうしよう……。\""
2003105-128 = "ん、何かあった？"
2003105-129 = "……ああ、シャーレに戻る終電を逃しちゃったんだ？"
2003105-130 = "でも、そんなに困ることはないでしょ？だってここは温泉だよ。"
2003105-131 = "客室はたくさんあるし、一泊して明日帰れば――"
2003105-135 = "その……悪いけど、今日は部屋が全部埋まってるんだ。"
2003105-136 = "今日、シグレさんのフルーツ牛乳を飲んだお客様たちが、#n明日も飲みたいからと宿泊を延長されてね……。"
2003105-137 = "……やれやれ、本気を出しすぎちゃったみたい。"
2003105-141 = "どうする、先生？泊まれる部屋、ないみたいだけど。"
2003105-142 = "でも、今日みたいな寒い日に#n先生を外で寝かせるわけにもいかないし……。"
2003105-147 = "あ。じゃあ私の宿舎に泊まっていく？"
2003105-148 = "[s] \"シグレの……？\""
2003105-149 = "うん。ここで働く従業員には、職員用の宿舎が提供されてるんだよ。"
2003105-150 = "少し狭いけど、外で寝るよりはマシだと思う。"
2003105-151 = "[s3] \"他に方法はなさそうだし……。\"\n[s4] \"じゃあ、一晩だけお邪魔しようかな。\""
2003105-154 = "ふふっ、わかった。#nならすぐにここを片付けて、部屋に案内してあげる。"
2003105-157 = "どう？意外と居心地のよさそうな部屋でしょ？"
2003105-158 = "お布団は敷いておいたから。そこで寝ればいいよ。"
2003105-161 = "[ns5] \"あの……シグレさん？\"\n[ns6] \"なんだか布団が一枚しかないような……。\""
2003105-164 = "ん？#nそりゃそうだよ。もともと一人用の部屋だから。"
2003105-165 = "でも、頑張れば二人で入れると思うし……。"
2003105-168 = "だから、遠慮しなくていいよ？"
2003105-173 = "[wa:650]― [log=시구레 온천ND]はい、[wa:230]先生。[/log]"
2003105-174 = "[wa:1100]― [log=시구레 온천ND]お布団の外は[wa:610]寒いでしょ？[/log]"
2003105-177 = "― [log=시구레 온천ND]意地張らないで[wa:1000]こっちにおいでよ。[/log]"
2003105-180 = "[wa:800]― [log=시구레 온천ND]お布団も[wa:480]ふかふかだし、[wa:1380]温まってるよ？[/log]"
2003105-183 = "― [log=시구레 온천ND]こっちなら[wa:540]すぐ寝付けると思う。[/log]"
2003105-186 = "[wa:1000]― [log=시구레 온천ND]もし、[wa:900]お布団だけじゃ[wa:700]寒いなら……[/log][wa:150] "
2003105-189 = "― [log=시구레 온천ND]私が湯たんぽの[wa:960]代わりになるよ。[/log]"
2003105-192 = "[wa:550]― [log=시구레 온천ND]え？[wa:1100]元々あった[wa:660]湯たんぽ……？[/log]"
2003105-195 = "― [log=시구레 온천ND]えっ[wa:260]とね……[wa:1530]中身、[wa:1620]飲んじゃった。[/log]"
2003105-198 = "[wa:780]― [log=시구레 온천ND]その、[wa:1060]お布団の中がさ……[/log]"
2003105-199 = "[wa:1720]― [log=시구레 온천ND]モルスを温めるのに[wa:1160]ちょうどいい温度で……[/log]"
2003105-202 = "― [log=시구레 온천ND]さっき仕事してる時に、[/log]"
2003105-203 = "[wa:1800]― [log=시구레 온천ND]湯たんぽの中身を[wa:970]特製モルスに[wa:630]入れ替えたの。[/log]"
2003105-206 = "[wa:480]― [log=시구레 온천ND]でも……[wa:560]しょうがないよね？[/log][wa:50] "
2003105-209 = "― [log=시구레 온천ND]こうなっちゃった以上、[/log]"
2003105-210 = "[wa:1220]― [log=시구레 온천ND]体を温める方法は[wa:2020]他にないし……[/log]"
2003105-213 = "― [log=시구레 온천ND]だから今夜は、[/log]"
2003105-214 = "[wa:1300]― [log=시구레 온천ND]先生が[wa:620]湯たんぽの[wa:630]代わりになってよ。[/log]"
2003105-219 = "[ns] 湯たんぽの中のモルスを飲む。"
2003105-222 = "……あれ？急にどうしたの、先生？"
2003105-223 = "もしかして、喉が渇いたとか？"
2003105-224 = "[s7] \"……このモルス、発酵してるみたい。\"\n[s8] \"やけにツンとした匂いがする。\""
2003105-227 = "え？そんなはずないよ。"
2003105-228 = "このモルスには酵母も砂糖も入れてないのに。"
2003105-229 = "それにまだ、漬けてから1日しか経ってないんだよ。#nなのに発酵するなんて……。"
2003105-230 = "[s9] \"でも、妙に顔がぽかぽかするし。\"\n[s10] \"間違いない！発酵している！\""
2003105-236 = "[ns11] \"身体も熱くなってきたから、布団はいらなさそう。\"\n[ns12] \"だからシグレが一人で使って！\""
2003105-239 = "……ふぅん、そういうことか。"
2003105-240 = "まあ、わかったよ。#n暑がってる先生を、無理やりお布団に入れるわけにもいかないし。"
2003105-241 = "でも、寒くなったらいつでも帰ってきていいからね？#nスペースは空けておくから。"
2003105-243 = "（その後、畳の上で身体を丸めて夜を明かした）"
2003105-244 = "（幸い何事も起こらなかったが、寒い場所で寝たせいか、#nその後軽い風邪をひいてしまった……）"
