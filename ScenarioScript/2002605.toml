[translation]
2002605-1 = "Um andaime para apenas dois"
2002605-2 = "Academia Red Winter, em frente ao escritório do Departamento de Obras"
2002605-8 = "Ué... por que o Sensei do Schale está aqui?"
2002605-9 = "Aconteceu alguma coisa?"
2002605-10 = "O trabalho de hoje foi cancelado por causa da onda de frio, sabia?"
2002605-11 = "[ns] \"Sim, a Minori me contou.\""
2002605-13 = "[ns1] \"Mas, já que é assim...\"\n[ns2] \"Pensei em trazer um lanche para o pessoal que está de folga.\""
2002605-19 = "Uau! É o chocolate exclusivo da loja central da \"Angel 24\"!"
2002605-20 = "E pudim de creme rico também!#nA consistência é bem diferente daquele que a secretaria fornece...!"
2002605-21 = "Aceito com gratidão, Sensei!"
2002605-22 = "[ns] \"Tem bastante, então comam juntos e em harmonia.\""
2002605-24 = "[ns] \"A propósito, onde está a Minori?\""
2002605-25 = "A chefe?#nNos dias em que o trabalho é cancelado..."
2002605-26 = "...ela sempre vai verificar como estão as coisas no canteiro de obras.#nDiz que fica preocupada com as ferramentas e materiais deixados lá."
2002605-27 = "Essa é uma parte da chefe que eu realmente respeito."
2002605-28 = "Mas, será que ela foi hoje...?#nSaí um pouco lá fora agora há pouco e estava tão frio que minhas mãos quase congelaram."
2002605-29 = "Concordo. Com esse frio, nem a chefe aguentaria.#nProvavelmente ela deve estar na biblioteca, não?"
2002605-30 = "[s] \"Entendi, obrigado. Já vou indo.\""
2002605-31 = "Ué, já vai embora?"
2002605-32 = "Ah, nós é que agradecemos pelo lanche!#nDa próxima vez, venha visitar o canteiro de obras também!"
2002605-33 = "Tome cuidado para não se perder no caminho!"
2002605-37 = "[ns] Deixo o escritório do Departamento de Obras e sigo em direção ao canteiro."
2002605-41 = "[ns3] \"Minori, você está aí?\"\n[ns4] \"Minori-n♪\""
2002605-46 = "Quem é que está me chamando de Minori-n?"
2002605-51 = "……Hmm?#nSensei [USERNAME], por que você está aqui...?"
2002605-52 = "Eu deveria ter avisado pelo MomoTalk que o trabalho de hoje foi cancelado...?"
2002605-53 = "[s5] \"Ouvi das outras integrantes que você poderia estar no canteiro...\"\n[s6] \"Trouxe um lanche para você.\""
2002605-56 = "Trazer um lanche... eu só estou fazendo o meu trabalho conforme o contrato."
2002605-57 = "Pensando bem... nem da Red Winter, nem dos clientes externos, eu nunca recebi um lanche antes."
2002605-58 = "Realmente, o único que se preocupa com nós, trabalhadores, é o Sensei."
2002605-59 = "[s] \"O que você estava fazendo no canteiro, Minori?\""
2002605-60 = "Eu?#nAproveitei a caminhada para verificar a segurança do local."
2002605-61 = "Como o trabalho foi cancelado devido à onda de frio repentina, vim ver como estavam as ferramentas e as coberturas dos materiais. Seria um problema se o vento os levasse, então é melhor organizar tudo agora."
2002605-62 = "Assim que terminar a ronda, pretendo descansar um pouco hoje, algo que não faço há tempos."
2002605-63 = "Ah, é verdade. Tem uma vista que eu quero te mostrar."
2002605-67 = "Venha comigo."
2002605-72 = "[wa:200]― [log=미노리]Hehe, [wa:1600]como está [wa:300]frio hoje, [wa:1200]dá para ver [wa:400]bem longe.[/log]"
2002605-74 = "[wa:900]― [log=미노리]Vamos, [wa:800]Sensei, [wa:500]não fique parado aí, [wa:1200]suba aqui.[/log]"
2002605-77 = "[ns] \"Aqui, é seguro subir nós dois...?\""
2002605-78 = "[wa:500]― [log=미노리]Não precisa [wa:600]se preocupar.[/log]"
2002605-80 = "[wa:700]― [log=미노리]Foi construído [wa:300]de forma tão [wa:400]robusta, [wa:1500]que nem um elefante [wa:400]conseguiria derrubar.[/log]"
2002605-83 = "[wa:1400]― [log=미노리]……Falando nisso, [wa:500]este andaime,[/log]"
2002605-85 = "[wa:1000]― [log=미노리]sinto que ele [wa:1100]se parece um pouco [wa:500]com o nosso Departamento de Obras.[/log]"
2002605-88 = "[wa:400]― [log=미노리]É um material [wa:500]essencial e [wa:400]importante [wa:400]para a construção,[/log]"
2002605-91 = "[wa:300]― [log=미노리]mas quando o [wa:300]trabalho termina,[/log]"
2002605-92 = "[wa:1400]― [log=미노리]ele desaparece [wa:400]como se nunca [wa:500]tivesse existido desde o início――[/log]"
2002605-95 = "[wa:1500]― [log=미노리]Talvez seja por isso.[/log]"
2002605-98 = "[wa:200]― [log=미노리]De toda a paisagem [wa:200]do canteiro,[/log]"
2002605-99 = "[wa:1900]― [log=미노리]esta vista que vejo [wa:500]lá do alto do andaime, [wa:2100]é a que eu mais gosto.[/log]"
2002605-102 = "[wa:500]― [log=미노리]Um passo além [wa:400]da borda [wa:1200]do edifício,[/log]"
2002605-103 = "[wa:3000]― [log=미노리]Um ponto de vista que mostra os vestígios de alguém que, [wa:200] do lado de fora desta parede externa, [wa:2100] suou a camisa com muito esforço, [wa:2800] para construir tudo isso.[/log]"
2002605-106 = "[wa:1300]― [log=미노리]……Esta vista, que não é possível [wa:1100] sentir [wa:1000] em um prédio já concluído,[/log]"
2002605-108 = "[wa:1200]― [log=미노리]Eu queria, [wa:1500] compartilhar com o Sensei.[/log]"
2002605-111 = "Hehe... E então, Sensei?#nO que achou da vista lá de cima do andaime?"
2002605-112 = "[s7] \"Era linda, mas...\"\n[s8] \"Era tão alto que nem consegui aproveitar a vista.\""
2002605-115 = "Não deveria ser tão alto assim, mas..."
2002605-116 = "……Ah, não, eu já ouvi falar disso antes.#nDizem que as pessoas sentem mais medo a cerca de 11 metros de altura, onde a noção de altura é mais real, do que em um arranha-céu."
2002605-117 = "Já sei!#nNesse caso, é só subir até uma altura onde não dê para sentir medo!!"
2002605-118 = "Certo! Decidido isso, vamos logo para o terraço, Sensei!!"
2002605-119 = "Lá do terraço, você vai conseguir aproveitar a vista com calma sem sentir medo!"
2002605-121 = "(Depois disso, tive bastante trabalho para impedir que Minori me levasse para um andaime ainda mais alto)"
