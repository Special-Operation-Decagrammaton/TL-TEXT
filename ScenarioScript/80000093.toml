[translation]
80000093-1 = "終わらないもの"
80000093-3 = "うう、もしこの書類が間に合わなかったら……"
80000093-4 = "きっとリン先輩……じゃなかった、行政官にすっごく怒られて……。"
80000093-6 = "これが終わったら、次は……"
80000093-7 = "あれ……スケジュール表は……？"
80000093-8 = "うぅっ……身体が二つあれば良いのに……。"
80000093-9 = "[s1] \"その気持ちはすごくわかる……。\"\n[s2] \"身体が二つあっても、休んでくれるかは怪しいけど……。\""
80000093-10 = "あ、せっ、先生……！"
80000093-11 = "あ、せっ、先生……！"
80000093-12 = "すみません……せっかくお越しいただいたのに、こんな状況で……。"
80000093-13 = "[s] \"ううん、無理しないで。ゆっくりで大丈夫だから。\""
80000093-14 = "ありがとうございます……。"
80000093-15 = "ですが、先生をお待たせしてゆっくり、というのも……。"
80000093-16 = "[s] \"じゃあ、そんなにゆっくりじゃない程度にゆっくりで。\""
80000093-17 = "え、えっ……？"
80000093-18 = "それは一体、どうすれば……？"
80000093-19 = "……先生もそのご様子ですと、お疲れみたいですね？"
80000093-20 = "何だか危なさそうですし、先生の方こそゆっくりなさった方が良さそうですが……。"
80000093-21 = "[s] \"大丈夫大丈夫、お互い様ってことで……。\""
80000093-23 = "ふぅ……そろそろ一段落つきそうです……。"
80000093-24 = "大変ですが、結局は誰かがやらねばなりませんし……。"
80000093-25 = "他の連邦生徒会の方々も、きっとお忙しいはず。"
80000093-26 = "弱音を吐いている場合ではありませんね……！"
80000093-27 = "[s] （暇そうに明太子味のポテチを貪る誰かさんが向こうに見えたが、見なかったことにした）"
80000093-29 = "[ns] \"はい、コーヒーでもどう？\""
80000093-30 = "えっ、あ、淹れてくださったんですか？"
80000093-31 = "あ、ありがとうございます。それでは、せっかくですし……"
80000093-32 = "……！"
80000093-33 = "味の調整が、ピッタリ……ど、どうして……！？"
80000093-34 = "[s3] \"いつもコーヒーを淹れてるところ、よく見てたから。\"\n[s4] \"似たような立場だからかな、何となくね。\""
80000093-35 = "う、ううぅ……"
80000093-36 = "う、ううぅ……"
80000093-37 = "ありがとうございます、先生……こんな、優しくしていただき……"
80000093-38 = "[s] \"そ、そこまで喜んでもらえるとは……落ち着いたらもう少し頑張ろうか。\""
80000093-39 = "ううううぅ……それを聞いたらまた、別の意味でちょっと悲しくなってきました……。"
80000093-41 = "[ns] \"お疲れ様。そういえば今日は、何の用件で？\""
80000093-42 = "あ、そうでした！えっとですね、その……"
80000093-43 = "あの、一先ずおやつでもいかがでしょうか……！？さ、先ほどのコーヒーのお礼も兼ねて……"
80000093-48 = "……？あ、たしかにあまり見ない商品かもしれません。"
80000093-49 = "薄切りにして乾燥させたグレープフルーツに、チョコレートをコーティングしたお菓子です。"
80000093-50 = "カフェインとテオブロミン、ビタミンまで摂取できて疲労が軽減され――"
80000093-51 = "る、らしいのですが……。"
80000093-52 = "[s5] \"ま、まあまあ……。\"\n[s6] \"か、簡単には疲れ、取れないよね。効いてるんだろうけど。\""
80000093-53 = "そうなんですよね……うぅ……。"
80000093-54 = "そうなんですよね……うぅ……。"
80000093-55 = "せっかくのバレンタインなのに、何だかすみません……。"
80000093-56 = "[s] \"そういえば今日、バレンタインだったね。\""
80000093-57 = "業務に追われ、お買い物に出かける時間も取れず……。"
80000093-58 = "手元にあったチョコレートが、これくらいしかなく……。"
80000093-59 = "やっぱり要らない、ですかね……？"
80000093-60 = "[s] \"そんなことないよ、ありがとう。すごく美味しい。\""
80000093-61 = "ほ、本当ですか……！？"
80000093-62 = "[s] \"うん、甘酸っぱくて良い感じ。疲れも取れそう。\""
80000093-63 = "そ、それは良かったです……！"
80000093-64 = "先生のそばにいると、何だか疲れを忘れてしまいそうです……えへへ。"
80000093-66 = "（その後もアユムと一緒にチョコレートを摘まみつつ、様々な苦労話を聞いたのだった）"
