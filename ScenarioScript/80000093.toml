[translation]
80000093-1 = "Algo que não termina"
80000093-3 = "Ai, ai, se esses documentos não ficarem prontos a tempo..."
80000093-4 = "Com certeza a Rin-senpai... não, a Administradora vai ficar muito brava comigo..."
80000093-6 = "Quando eu terminar isso, o próximo é..."
80000093-7 = "Ué... onde está a tabela de horários...?"
80000093-8 = "Ugh... quem dera eu tivesse dois corpos..."
80000093-9 = "[s1] \"Eu entendo perfeitamente esse sentimento...\"\n[s2] \"Mesmo que tivesse dois corpos, duvido que você fosse descansar...\""
80000093-10 = "Ah, se, Sensei...!"
80000093-11 = "Ah, se, Sensei...!"
80000093-12 = "Desculpe... mesmo você tendo se dado ao trabalho de vir, nesta situação..."
80000093-13 = "[s] \"Não, não se force. Pode ir com calma, está tudo bem.\""
80000093-14 = "Muito obrigada..."
80000093-15 = "Mas, fazer você esperar enquanto vou com calma, isso é..."
80000093-16 = "[s] \"Então, vá com calma, mas não tão devagar assim.\""
80000093-17 = "Hã, quê...?"
80000093-18 = "Como exatamente eu deveria fazer isso...?"
80000093-19 = "...Sensei, pelo seu estado, parece que você também está cansado, não é?"
80000093-20 = "Parece perigoso, e acho que é você quem deveria descansar um pouco, Sensei..."
80000093-21 = "[s] \"Tudo bem, tudo bem, estamos quites...\""
80000093-23 = "Ufa... parece que finalmente vou conseguir uma pausa..."
80000093-24 = "É difícil, mas no fim das contas, alguém tem que fazer isso..."
80000093-25 = "As outras pessoas do Conselho Estudantil Geral também devem estar muito ocupadas."
80000093-26 = "Não é hora de reclamar...!"
80000093-27 = "[s] (Vi alguém ali longe devorando salgadinhos sabor mentaiko como se não tivesse nada para fazer, mas decidi ignorar)"
80000093-29 = "[ns] \"Aqui, que tal um café?\""
80000093-30 = "Hã, ah, você preparou para mim?"
80000093-31 = "Ah, muito obrigada. Já que você fez isso..."
80000093-32 = "...!"
80000093-33 = "O ajuste do sabor está perfeito... c-como você conseguiu...!?"
80000093-34 = "[s3] \"É que eu sempre te observava preparando café.\"\n[s4] \"Talvez seja porque estamos em situações parecidas, não sei explicar.\""
80000093-35 = "U-ugh..."
80000093-36 = "U-ugh..."
80000093-37 = "Muito obrigada, Sensei... por ser tão gentil comigo..."
80000093-38 = "[s] \"N-não esperava que fosse ficar tão feliz... Vamos nos esforçar um pouco mais quando as coisas acalmarem?\""
80000093-39 = "Uuuuu... ao ouvir isso, acabei ficando um pouco triste por outro motivo..."
80000093-41 = "[ns] \"Bom trabalho. Aliás, por que você veio hoje?\""
80000093-42 = "Ah, é verdade! Bem, é que..."
80000093-43 = "Ei, por enquanto, que tal um lanche...? É para agradecer pelo café de agora a pouco..."
80000093-48 = "...? Ah, é verdade, talvez seja um produto difícil de encontrar."
80000093-49 = "É um doce feito de fatias de toranja desidratadas cobertas com chocolate."
80000093-50 = "Dizem que ajuda a reduzir a fadiga, já que contém cafeína, teobromina e até vitaminas..."
80000093-51 = "Ou pelo menos, é o que dizem..."
80000093-52 = "[s5] \"B-bem...\"\n[s6] \"O cansaço não passa tão fácil assim, né? Mesmo que ajude um pouco.\""
80000093-53 = "É verdade... ugh..."
80000093-54 = "É verdade... ugh..."
80000093-55 = "Mesmo sendo Dia dos Namorados, sinto muito por isso..."
80000093-56 = "[s] \"Falando nisso, hoje é Dia dos Namorados, né?\""
80000093-57 = "Como estou atolada de trabalho, não tive tempo nem de sair para comprar nada..."
80000093-58 = "O único chocolate que eu tinha à mão era este..."
80000093-59 = "Você não quer, né...?"
80000093-60 = "[s] \"Não é verdade, obrigado. Está muito gostoso.\""
80000093-61 = "V-verdade mesmo...!?"
80000093-62 = "[s] \"Sim, esse sabor agridoce é muito bom. Acho que vai até tirar meu cansaço.\""
80000093-63 = "Q-que bom ouvir isso...!"
80000093-64 = "Quando estou perto do Sensei, sinto que até esqueço do meu cansaço... hehe."
80000093-66 = "（Depois disso, continuei beliscando os chocolates com a Ayumu enquanto ouvia várias histórias sobre as dificuldades dela）"
