[translation]
2600005-1 = "疲れた時には"
2600005-2 = "（……）"
2600005-5 = "[ns] \"……？\""
2600005-6 = "本当に、この人は……。"
2600005-7 = "[s1] \"ここは……？\"\n[s2] \"……あれ、チナツ？\""
2600005-8 = "先生……？"
2600005-9 = "先生……？"
2600005-10 = "意識はしっかりしてますか？ここは保健室です、私がここまで先生をお連れいたしました。"
2600005-11 = "……どうしてここにいるのか、ですか？"
2600005-12 = "それは私の台詞です、どうしてこんなことになったのですか？"
2600005-13 = "先生にメッセージを送って、お伺いした時はもう……。"
2600005-14 = "頭に大きなたんこぶができていて、意識もない様子で……。"
2600005-15 = "何があったのですか、先生？誰かに襲撃でもされましたか？"
2600005-16 = "意識を失う直前、何か覚えていることはありますか？"
2600005-17 = "[s3] \"……ただの過労だよ、大丈夫。\"\n[s4] \"全然記憶無いかも……仕事してたら急に……。\""
2600005-18 = "……。"
2600005-19 = "……。"
2600005-20 = "……ふう。"
2600005-21 = "そうですか……過労による気絶だったんですね。"
2600005-22 = "頭のたんこぶは、机から倒れる際に床にぶつけたということでしょうか。"
2600005-23 = "他には大きな怪我もなさそうですので、少し休んだら大丈夫かと思います。"
2600005-24 = "……はい？まだ仕事が終わってない？"
2600005-25 = "何でこんな時に仕事の話を……。"
2600005-26 = "……。"
2600005-27 = "ダメです、先生。"
2600005-28 = "申し訳ありませんが、それは承服できかねます。"
2600005-29 = "もし先生が無理して行かれるようなら、私が全力で引き留めます。"
2600005-30 = "前にもお伝えしましたが私は救護担当ですので、こういった件において見逃すわけにはいきません。"
2600005-31 = "……。"
2600005-32 = "それから、その、あまり言いたくはなかったのですが……。"
2600005-33 = "私だって怒ったりするんですよ、先生。"
2600005-34 = "[s] \"……チナツ？\""
2600005-35 = "勝手なことをしてしまって恐縮ですが、先生が目を覚ますまでの間にメディカルチェックをしました。"
2600005-36 = "……生きてるのが不思議なくらいの、疲労の溜まり方です。"
2600005-37 = "いくら先生としての責務が大事だとしても、それが私たち生徒のためだとしても、"
2600005-38 = "先生が倒れてしまったら、全部終わりなんですよ。"
2600005-39 = "そんな風に自分の身体に鞭打って、私は……。"
2600005-40 = "……。"
2600005-41 = "……すみません。先生相手にこんな、小言みたいなことを……。"
2600005-42 = "……。"
2600005-43 = "……次からは、仕事が多い時は私のことを呼んでください。"
2600005-44 = "私は先生と同じように、大事なことを決めたりすることはできませんが……。"
2600005-45 = "単純な事務処理や、整理くらいでしたらお手伝いできますから。"
2600005-46 = "最近はずっと先生に手伝っていただいてばかりでしたし、少しくらいは、その……。"
2600005-47 = "お返しできるチャンスくらい、くれたって……。"
2600005-48 = "……。"
2600005-49 = "先生……？"
2600005-50 = "[s5] \"支えて、支えてもらって、まるで夫婦みたいだね。\"\n[s6] \"じゃあ、私たち二人の約束。\""
2600005-51 = "え、あ……いえ、そういうことでも、まあ……。"
2600005-52 = "え、あ……いえ、そういうことでも、まあ……。"
2600005-53 = "……。"
2600005-54 = "先生、こんな時に茶化さないでください……。"
2600005-55 = "[s] \"ごめん……。\""
2600005-56 = "……ふう。"
2600005-57 = "いえ、もう先生がそういう方だとは分かってますから。"
2600005-58 = "……。"
2600005-59 = "正直、こんなことを言ってしまって、面倒な子だと思われてしまわないか心配でしたが……。"
2600005-60 = "ありがとうございます。これからはその、もっと……何と言いますか……。"
2600005-61 = "……もう少し、先生に気軽に連絡が出来そうです。"
2600005-63 = "もう私たちは、お互いに支え合う関係ですから。"
2600005-65 = "（帰っていくチナツの表情は、穏やかなものだった）"
