[translation]
2600005-1 = "Quando estiver cansado"
2600005-2 = "（……）"
2600005-5 = "[ns] \"……？\""
2600005-6 = "Sério, essa pessoa..."
2600005-7 = "[s1] \"Onde estou……？\"\n[s2] \"……Ué, Chinatsu？\""
2600005-8 = "Sensei……？"
2600005-9 = "Sensei……？"
2600005-10 = "Sua consciência está clara? Você está na enfermaria. Fui eu quem trouxe você até aqui, Sensei."
2600005-11 = "……Por que você está aqui, pergunta?"
2600005-12 = "Essa é a minha pergunta. Como foi que você chegou a esse estado?"
2600005-13 = "Quando te mandei uma mensagem e fui verificar, você já estava assim……."
2600005-14 = "Com um galo enorme na cabeça e sem consciência……."
2600005-15 = "O que aconteceu, Sensei? Alguém te atacou?"
2600005-16 = "Você se lembra de algo antes de desmaiar?"
2600005-17 = "[s3] \"……Foi só excesso de trabalho, estou bem.\"\n[s4] \"Não me lembro de nada…… estava trabalhando e de repente…….\""
2600005-18 = "……。"
2600005-19 = "……。"
2600005-20 = "……Ufa."
2600005-21 = "Entendo…… então foi um desmaio por excesso de trabalho."
2600005-22 = "O galo na cabeça deve ter sido por bater no chão ao cair da mesa, então."
2600005-23 = "Como não parece haver outros ferimentos graves, acho que ficará bem se descansar um pouco."
2600005-24 = "……Sim? O trabalho ainda não terminou?"
2600005-25 = "Por que você está falando de trabalho em um momento desses……."
2600005-26 = "……。"
2600005-27 = "Não, Sensei."
2600005-28 = "Sinto muito, mas não posso aceitar isso."
2600005-29 = "Se você insistir em ir, eu farei o possível para te impedir."
2600005-30 = "Como mencionei antes, sou responsável pelos primeiros socorros, então não posso ignorar uma situação dessas."
2600005-31 = "……。"
2600005-32 = "E também, bem, eu não queria dizer isso, mas……."
2600005-33 = "Eu também sei ficar brava, Sensei."
2600005-34 = "[s] \"……Chinatsu？\""
2600005-35 = "Peço desculpas por ter feito isso sem permissão, mas realizei um check-up médico enquanto você estava inconsciente."
2600005-36 = "……O nível de exaustão acumulada é tão alto que é um milagre você ainda estar de pé."
2600005-37 = "Não importa o quanto suas responsabilidades como Sensei sejam importantes, ou que sejam por nós, alunas,"
2600005-38 = "se você desmaiar, tudo acaba."
2600005-39 = "Ver você se forçando desse jeito, eu……."
2600005-40 = "……。"
2600005-41 = "……Desculpe. Ficar te dando sermão assim……."
2600005-42 = "……。"
2600005-43 = "……Da próxima vez que tiver muito trabalho, por favor, me chame."
2600005-44 = "Eu não consigo tomar decisões importantes como você, mas……."
2600005-45 = "Posso ajudar com tarefas administrativas simples ou organização."
2600005-46 = "Ultimamente você tem me ajudado tanto, então, pelo menos um pouco, bem……."
2600005-47 = "Poderia me dar a chance de retribuir……."
2600005-48 = "……。"
2600005-49 = "Sensei……?"
2600005-50 = "[s5] \"Apoiando um ao outro, parece até um casal.\"\n[s6] \"Então, é uma promessa entre nós dois.\""
2600005-51 = "Ah, não…… bem, não é exatamente isso, mas……."
2600005-52 = "Ah, não…… bem, não é exatamente isso, mas……."
2600005-53 = "……。"
2600005-54 = "Sensei, por favor, não brinque com isso agora……."
2600005-55 = "[s] \"Desculpe…….\""
2600005-56 = "……Ufa."
2600005-57 = "Não, tudo bem. Eu já sei que o Sensei é desse jeito."
2600005-58 = "……。"
2600005-59 = "Para ser sincera, eu estava preocupada se você me acharia uma garota problemática por dizer essas coisas, mas……."
2600005-60 = "Obrigada. De agora em diante, eu vou, como posso dizer……."
2600005-61 = "……Acho que poderei entrar em contato com o Sensei com mais naturalidade."
2600005-63 = "Afinal, agora nós somos pessoas que apoiam uma à outra."
2600005-65 = "（A expressão de Chinatsu enquanto ela ia embora era serena）"
