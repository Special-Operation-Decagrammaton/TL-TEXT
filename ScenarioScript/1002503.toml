[translation]
1002503-1 = "小さいのはやっぱりダメです！"
1002503-2 = "（急いで梅花園へとやってきた）"
1002503-5 = "山海経・梅花園"
1002503-7 = "[ns] \"シュン、どこ！？\""
1002503-8 = "あ、来ていただいてありがとうございます、先生……！"
1002503-13 = "[ns] \"あれ、どこに……？\""
1002503-14 = "あ、上です。天井の方、収納棚の上に……。"
1002503-20 = "（まるで木の上から降りられなくなった小動物のように、シュンは収納棚の上でプルプル震えていた）"
1002503-21 = "[s] \"何をどうしたらそんなところに……？\""
1002503-22 = "えっと、子どもたちが帰ってくる前に、おもちゃの整理をしようとして……。"
1002503-23 = "上の方に手が届かなかったので登ってみたのですが、いざ登ってみるとあまりにも高くて、下りられなくなってしまい……。"
1002503-24 = "先生お願いします、下ろしてください……！"
1002503-25 = "[s] シュンを収納棚の上から下ろす。"
1002503-30 = "うぅ、いつもならすぐ手が届く位置だからと、油断していました……。"
1002503-31 = "やっぱりこの小さい身体は良くないですね。"
1002503-32 = "あ、下ろしていただけたのは助かったのですが……そういえばまだ上に、片づけていないおもちゃが……。"
1002503-33 = "[s] \"私が代わりに整理しようか？\""
1002503-34 = "それはありがたいのですが、おもちゃの分類が結構複雑でして……学年ごとに種類が違ったりするんですよね……。"
1002503-35 = "それを先生にお伝えするのもちょっと大変ですし……私の手が届けばそれで解決するのですが……。"
1002503-37 = "……！良いことを思いつきました！"
1002503-38 = "先生、私を肩車してください！"
1002503-39 = "先生の上に乗れれば、簡単に手が届くはずです。"
1002503-40 = "さあ先生、お願いします……！"
1002503-41 = "[s] シュンのことを肩車する。"
1002503-46 = "わあっ、高いです～！元の身体の時より、目線がさらに高いです！"
1002503-47 = "この高さでしたら余裕で届きますね。"
1002503-49 = "あっ……！せ、先生……その、落ちると危ないですから、しっかり足を掴んでおいていただけますと……。"
1002503-51 = "その後シュンは楽しくなったのか、肩車の必要がない場所の整理整頓まで、肩車状態のままでやることになった。"
1002503-53 = "これで終わりです！"
1002503-54 = "手伝ってくれてありがとうございました、先生！"
1002503-55 = "すみません、ほぼ半日近く肩車をしていただいちゃいましたが……えっと、重くなかったですか……？"
1002503-56 = "[s] \"うん、大丈夫。いつもより軽かったし。\""
1002503-57 = "それは良かっ――"
1002503-59 = "……先生？今のはどういう意味ですか？つまり、元の身体の私は重い……と？"
1002503-60 = "[s1] \"えっと、ごめん、そういう意味じゃなくて……！\"\n[s2] \"…………。\""
1002503-61 = "誤魔化してもダメです！"
1002503-62 = "先生！？なんで否定してくれないのですか！？"
1002503-63 = "もう、私だって怒るんですよ！"
1002503-64 = "いくら先生でも、慰めてくれないならもう口をきいてあげません！"
1002503-69 = "……ですから、さあ。「たかいたかい」してください。"
1002503-70 = "[s] \"え……？\""
1002503-71 = "あの両脇で抱えて高く持ち上げていただく、「たかいたかい」です。"
1002503-72 = "先生もいつか子どもたちにやってくださってましたが、いつも梅花園の子たちが拗ねてしまった時に私もしているんです。さあ、今は先生が私のことを慰める番ですので、どうぞ！"
1002503-73 = "……まさか、できないなんてことは言いませんよね？"
1002503-74 = "[s3] シュンの両脇に手を入れて、高く持ち上げる。\n[s4] \"た、たかいたか～い……！\""
1002503-87 = "わぁっ……！ふふっ、実際にやってみると思ったより楽しいです……！"
1002503-88 = "子どもたちがこれで機嫌を直してくれるのも、何だか分かる気がします。"
1002503-89 = "あれ、どうして下ろしちゃうんですか？"
1002503-90 = "まだ私の機嫌は直ってません！"
1002503-95 = "今日は私の機嫌が直るまで、まだまだ付き合ってもらいますからね♡"
1002503-97 = "しばらくシュンに「たかいたかい」をしたり、色々な遊びをして楽しい時間を過ごした。"
