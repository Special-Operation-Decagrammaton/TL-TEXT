[translation]
1002503-1 = "Ser pequena realmente não é bom!"
1002503-2 = "（Cheguei apressado ao Jardim das Ameixeiras）"
1002503-5 = "Shanhaijing - Jardim das Ameixeiras"
1002503-7 = "[ns] \"Shun, onde você está!?\""
1002503-8 = "Ah, obrigada por vir, Sensei...!"
1002503-13 = "[ns] \"Ué, onde ela foi...?\""
1002503-14 = "Ah, estou aqui em cima. No teto, em cima da prateleira..."
1002503-20 = "（Como um pequeno animal que não consegue descer de uma árvore, Shun tremia em cima da prateleira）"
1002503-21 = "[s] \"O que você fez para parar aí em cima...?\""
1002503-22 = "Bem, eu estava tentando organizar os brinquedos antes das crianças voltarem..."
1002503-23 = "Eu não alcançava a parte de cima, então tentei subir, mas quando cheguei lá, vi que era alto demais e não consegui descer..."
1002503-24 = "Sensei, por favor, me ajude a descer...!"
1002503-25 = "[s] Ajuda Shun a descer da prateleira."
1002503-30 = "Ugh, eu estava confiante porque geralmente alcanço tudo facilmente, acabei me descuidando..."
1002503-31 = "Realmente, esse corpo pequeno não é nada bom."
1002503-32 = "Ah, obrigada por me ajudar a descer, mas... agora que lembrei, ainda tem brinquedos lá em cima que não organizei..."
1002503-33 = "[s] \"Quer que eu organize para você?\""
1002503-34 = "Eu agradeceria, mas a classificação dos brinquedos é bem complexa... os tipos mudam dependendo da série escolar..."
1002503-35 = "Explicar tudo isso para o Sensei seria trabalhoso... se eu apenas alcançasse, tudo estaria resolvido..."
1002503-37 = "...! Tive uma ideia!"
1002503-38 = "Sensei, me coloque nos seus ombros!"
1002503-39 = "Se eu subir em você, com certeza vou alcançar facilmente."
1002503-40 = "Vamos, Sensei, por favor...!"
1002503-41 = "[s] Coloca Shun nos ombros."
1002503-46 = "Uau, que alto! A visão é ainda mais alta do que quando estou no meu corpo original!"
1002503-47 = "Nesta altura, consigo alcançar tudo com folga."
1002503-49 = "Ah...! S-Sensei... bem, é perigoso cair, então, por favor, segure bem as minhas pernas..."
1002503-51 = "Depois disso, Shun pareceu se divertir tanto que acabou organizando até as coisas que não precisavam de ajuda, ainda montada nos ombros do Sensei."
1002503-53 = "Pronto, terminamos!"
1002503-54 = "Obrigada por me ajudar, Sensei!"
1002503-55 = "Desculpe, você ficou quase meio dia me carregando nos ombros... bem, eu não estava pesada...?"
1002503-56 = "[s] \"Não, está tudo bem. Você estava mais leve que o normal.\""
1002503-57 = "Que bom, então—"
1002503-59 = "...Sensei? O que você quis dizer com isso? Ou seja, o meu corpo original é pesado... é isso?"
1002503-60 = "[s1] \"Bem, desculpe, não foi isso que eu quis dizer...!\"\n[s2] \"………….\""
1002503-61 = "Não adianta tentar disfarçar!"
1002503-62 = "Sensei!? Por que você não nega!?"
1002503-63 = "Poxa, eu também fico brava, sabia!"
1002503-64 = "Mesmo sendo você, Sensei, se não for me consolar, não vou mais falar com você!"
1002503-69 = "...Por isso, vamos lá. Me coloque para cima."
1002503-70 = "[s] \"Hã...?\""
1002503-71 = "Aquilo de me segurar pelas axilas e me levantar bem alto."
1002503-72 = "Você já fez isso com as crianças antes, e eu também faço isso com as crianças do Jardim das Ameixeiras quando elas ficam emburradas. Vamos, agora é a sua vez de me consolar, pode começar!"
1002503-73 = "...Você não vai me dizer que não consegue, vai?"
1002503-74 = "[s3] Segura Shun pelas axilas e a levanta bem alto.\n[s4] \"V-vai lá, lá no alto...!\""
1002503-87 = "Uau...! Fufu, é mais divertido do que eu pensava quando se faz na prática...!"
1002503-88 = "Agora entendo por que as crianças ficam de bom humor com isso."
1002503-89 = "Ué, por que você está me descendo?"
1002503-90 = "Eu ainda não estou de bom humor!"
1002503-95 = "Hoje você vai ter que me acompanhar até que eu fique de bom humor, entendeu? ♡"
1002503-97 = "Passei um tempo agradável brincando com a Shun, fazendo-a voar alto e nos divertindo com várias outras brincadeiras."
