[translation]
1002520-1 = "O que muda, o que permanece"
1002520-2 = "Olá! Obrigada por vir, mesmo estando tão ocupado. #nNão estou te atrapalhando, estou?"
1002520-3 = "[s] \"Não! Eu não estou ocupado de jeito nenhum!\""
1002520-4 = "Fico feliz em ouvir isso..."
1002520-5 = "É que eu sinto que você sempre tenta ser atencioso, mesmo quando está atarefado..."
1002520-6 = "[s] \"Se for para encontrar a Shun, eu sempre arranjo tempo, então não se preocupe.\""
1002520-7 = "Mesmo que você diga isso para me tranquilizar..."
1002520-8 = "De qualquer forma, faz tempo que não tenho um dia com tanto tempo livre assim."
1002520-9 = "O clima está bom, a brisa está agradável..."
1002520-10 = "É maravilhoso poder passar o tempo apenas relaxando, não é?"
1002520-11 = "[s] \"Eu também fico feliz em poder estar com a Shun.\""
1002520-12 = "Ah, meu Deus! De repente assim!"
1002520-13 = "Acho que você precisa ter consciência do que está dizendo, Sensei!"
1002520-14 = "[s] \"Sim, senhora! Instrutora Shun.\""
1002520-15 = "Ugh, você está me provocando de novo..."
1002520-16 = "[s] \"Aliás, esse grampo de cabelo que a Shun está usando...\""
1002520-17 = "Ah, este aqui?"
1002520-18 = "Na verdade, este é o meu grampo favorito."
1002520-19 = "Ele tem um laço e é tão fofo."
1002520-20 = "...Eu gosto de usar maria-chiquinha."
1002520-21 = "O jeito que elas balançam suavemente quando corro ou pulo é um dos pontos que eu mais gosto."
1002520-22 = "Na verdade... até o grampo que uso na minha forma habitual,"
1002520-23 = "eu procurei um que fosse parecido com este."
1002520-24 = "[s1] \"Se você gosta tanto assim desse grampo...\"\n[s2] \"Por que não o usa também na sua forma habitual?\""
1002520-25 = "Hmm... mas... o tamanho não combina."
1002520-26 = "Hmm... mas... o tamanho não combina."
1002520-27 = "E usar laços com maria-chiquinha é um pouco vergonhoso..."
1002520-28 = "Não seria melhor deixar as lembranças da infância como elas são?"
1002520-29 = "[s] \"Mas, independentemente da idade, o que a gente gosta não permanece o mesmo?\""
1002520-30 = "Bem..."
1002520-31 = "..."
1002520-32 = "Então, Sensei, você acha que existem coisas que não mudam?"
1002520-33 = "[s3] \"Acho que sim.\"\n[s4] \"Se existem coisas que mudam, acho que também existem coisas que não mudam.\""
1002520-34 = "Ahaha. O que é isso?"
1002520-35 = "Ahaha. O que é isso?"
1002520-36 = "Mas é verdade... coisas que não mudam, coisas que amamos..."
1002520-37 = "Hehe. Fiquei feliz de repente."
1002520-38 = "Sinto um pouco de vergonha, e um frio na barriga..."
1002520-39 = "[s] \"Está tudo bem? Quer que eu pegue um remédio para alergia?\""
1002520-40 = "..."
1002520-41 = "Essa custou pontos, Sensei!"
1002520-42 = "[s] \"Fui repreendido...\""
1002520-43 = "Ora, não adianta fazer biquinho agora! Não vou deixar passar dessa vez!"
1002520-50 = "Ah? O que você está fazendo?"
1002520-51 = "Hã? Você vai me levantar no alto porque eu estava emburrada? B-bem, se é por isso, tudo bem!"
1002520-52 = "[s] \"Levanta, levanta~ levanta, levanta~\""
1002520-53 = "Ah, faz cócegas! #nE-ei, me coloque no chão logo! Eu agradeço a intenção, mas..."
1002520-55 = "Hmm... entendi."
1002520-56 = "Vamos deixar por isso mesmo."
1002520-57 = "Embora, para começo de conversa, eu nem estivesse emburrada..."
1002520-58 = "Em troca..."
1002520-59 = "[s] \"Em troca?\""
1002520-60 = "Mais tarde..."
1002520-65 = "Mesmo que a minha versão mais velha use maria-chiquinhas, não pode zombar de mim, entendeu?"
1002520-66 = "Combinado?"
