[translation]
1011206-1 = "探し物は"
1011206-2 = "（急に連絡が途絶え心配になり、心当たりがある公園に向かった）"
1011206-6 = "[ns] （もう大分暗いけど、まだいるかな……）"
1011206-11 = "（あれは……）"
1011206-12 = "[ns] \"アスナ、何してるの？\""
1011206-21 = "あ、せんせ～！"
1011206-22 = "どうしてここにいるって分かったの？"
1011206-23 = "[s] \"返事がなかったから、探しに来たんだ。\""
1011206-27 = "[ns] \"前みたいなことになってたら大変だから。\""
1011206-28 = "それなら大丈夫だよ！"
1011206-29 = "ほら、ちゃんと無事だし！"
1011206-30 = "[s] \"安心したよ。\""
1011206-31 = "退屈だと、力が抜けちゃうんだと思う。"
1011206-32 = "あと、大好きな人に会えなかったりした時とか？"
1011206-33 = "充電式みたいだね、あははっ！"
1011206-34 = "[s] \"最近は大丈夫なの？\""
1011206-35 = "うん、毎日楽しいからね！"
1011206-36 = "先生にもよく会うから、だからすごく元気だよ！"
1011206-37 = "[s1] \"アスナが元気で良かったよ。\"\n[s2] \"それで、今は何をしてるの？\""
1011206-41 = "あ、そうだ！"
1011206-42 = "実はスマホを落としちゃって！"
1011206-43 = "[s] \"全然大丈夫じゃなかったね！？\""
1011206-44 = "ほかのことに気を取られてたら、落としちゃってたみたい。"
1011206-45 = "だから返事ができなかったの。#nごめんね、先生。"
1011206-46 = "[s] \"一緒に探そうか。\""
1011206-50 = "えへへっ、ありがとう！"
1011206-51 = "この辺りで落としたはずなんだけど、#n全然見つからなくってさ～。"
1011206-52 = "[s3] \"来た道を戻りながら探してみよう。\"\n[s4] \"アスナのスマホに電話をかけてみるよ。\""
1011206-55 = "マナーモードにしてるけど、振動で分かるはず！"
1011206-57 = "（アスナのスマホに電話をかけ続けながら、辺りを一緒に探した）"
1011206-60 = "（しばらくして……）"
1011206-66 = "[ns] \"今のは……？\""
1011206-67 = "先生も聞こえた？#n近くにあるみたい！"
1011206-72 = "あっちだよ！"
1011206-78 = "先生、見つけたよ！"
1011206-82 = "あははっ、さっき座ってたベンチに置き忘れてたみたい。"
1011206-83 = "最初に探しておけば良かったね！"
1011206-84 = "[s5] \"こういう時もあるよ。\"\n[s6] \"見つかって良かったね、アスナ。\""
1011206-87 = "うん！#n先生のおかげだよ！"
1011206-88 = "ありがとう、先生。#nいつもアスナのこと助けてくれて！"
1011206-93 = "あっ、見て！"
1011206-94 = "[s7] \"着信履歴がすごい……。\"\n[s8] \"ずっとかけてたからね……\""
1011206-97 = "あははっ、14件も！#nC&Cのみんなからも、こんなに来たことないのに～！"
1011206-98 = "ちょっと、嬉しいかも。"
1011206-106 = "先生に求められてるみたい、えへへ。"
1011206-107 = "私のこと、大切な存在だと思ってくれてるのかな？"
1011206-108 = "[s] \"ま、間違ってはないけど……。\""
1011206-109 = "キュンキュンしちゃった！"
1011206-110 = "これ、スクショしとこ～！#nアスナの宝物！"
1011206-112 = "（ご機嫌なアスナと一緒に、家へ帰った……）"
