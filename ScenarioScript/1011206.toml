[translation]
1011206-1 = "O que você está procurando?"
1011206-2 = "(De repente perdi contato e fiquei preocupado, então fui para um parque que conhecia)"
1011206-6 = "[ns] (Já está bastante escuro, mas me pergunto se eles ainda estão lá...)"
1011206-11 = "(Isso é...)"
1011206-12 = "[ns] \"Asuna, o que você está fazendo?\""
1011206-21 = "Ah, sensei!"
1011206-22 = "Como você soube que estava aqui?"
1011206-23 = "[s] \"Não recebi resposta, então vim procurar você.\"\"\n1011206-27 = \"[ns] \"Se acontecer como antes, será difícil.\"\"\n1011206-28 = \"Então está tudo bem!\"\n1011206-29 = \"Olha, você está seguro!\"\n1011206-30 = \"[s] \"Sinto-me aliviado.\""

1011206-31 = "Acho que quando você está entediado, você perde energia."
1011206-32 = "Além disso, e quando você não consegue encontrar alguém que ama?"
1011206-33 = "Parece que é recarregável, haha!"
1011206-34 = "[s] \"Você está bem ultimamente?\"\"\n1011206-35 = \"Sim, é divertido todos os dias!\"\n1011206-36 = \"Encontro meu sensei com frequência, por isso sou tão enérgico!\"\n1011206-37 = \"[s1] \"Estou feliz que Asuna esteja bem.\"\n[s2] \"Então, o que você está fazendo agora?\"\"\n1011206-41 = \"Ah, isso mesmo!\"\n1011206-42 = \"Na verdade, deixei cair meu smartphone!\"\n1011206-43 = \"[s] \"Você não estava nada bem, estava!?\"\"\n1011206-44 = \"Acho que deixei cair quando estava distraído com outras coisas.\"\n1011206-45 = \"Por isso não consegui responder. #nDesculpe, sensei.\"\n1011206-46 = \"[s] \"Vamos procurar juntos.\""

1011206-50 = "Hehehe, obrigado!"
1011206-51 = "Devo ter deixado cair por aqui, mas não consigo encontrá-lo."
1011206-52 = "[s3] \"Vamos voltar por onde viemos e procurar por ele.\"\n[s4] \"Vou tentar ligar para o smartphone da Asuna.\""
1011206-55 = "Estou no modo silencioso, mas você deve perceber pela vibração!"
1011206-57 = "(Enquanto continuavam a ligar para o smartphone de Asuna, eles procuraram juntos pela área.)"
1011206-60 = "(depois de um tempo......)"
1011206-66 = "[ns] \"E agora...?\""
1011206-67 = "Você também ouviu isso, sensei? #nParece que está por perto!"
1011206-72 = "Está ali!"
1011206-78 = "Sensei, encontrei!"
1011206-82 = "Hahaha, acho que deixei no banco em que estava sentado mais cedo."
1011206-83 = "Eu deveria ter procurado primeiro!"
1011206-84 = "[s5] \"Há momentos como este.\"\n[s6] \"Estou feliz que você tenha encontrado, Asuna.\""
1011206-87 = "Sim! Obrigado ao #n sensei!"
1011206-88 = "Obrigado, senhor. #nSempre ajudando Asuna!"
1011206-93 = "Ah, olhe!"
1011206-94 = "[s7] \"Meu histórico de chamadas recebidas é incrível...\"\n[s8] \"Continuei ligando...\""
1011206-97 = "Haha, 14 itens! Nunca recebi tantas mensagens de #nC&C!"
1011206-98 = "Talvez eu fique um pouco feliz."
1011206-106 = "Parece que a professora está pedindo isso, hehe."
1011206-107 = "Você acha que sou uma pessoa importante?"
1011206-108 = "[s] \"Bem, não está errado, mas...\""
1011206-109 = "Eu estava tão animado!"
1011206-110 = "Esta é uma captura de tela! #n O tesouro de Asuna!"
1011206-112 = "(Voltei para casa com Asuna que estava de bom humor...)"
