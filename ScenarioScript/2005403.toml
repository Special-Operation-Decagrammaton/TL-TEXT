[translation]
2005403-1 = "Regras e conceitos"
2005403-4 = "Um cochilo... conseguiu descansar um pouco?"
2005403-5 = "[s] \"Um pouco. Obrigado por me acordar...\""
2005403-6 = "Não há de quê. #nAfinal, agora eu sou..."
2005403-7 = "a hacker super gênio, frágil e bela, e também a assistente pessoal do Sensei."
2005403-8 = "Então, vamos nos esforçar nas tarefas da tarde."
2005403-10 = "(Terminei as tarefas junto com a Himari)"
2005403-15 = "[ns] \"Uaaah...\""
2005403-16 = "Que bocejo grande."
2005403-17 = "Mais do que sono, parece um pouco de preguiça, não é? #n...Fufu, entendo."
2005403-18 = "Que tal fazermos uma pausa juntos? #nEstava pensando em ir fazer a manutenção da minha cadeira de rodas agora."
2005403-19 = "[s] \"Cadeira de rodas? Você não está usando uma agora?\""
2005403-20 = "Não, não é esta."
2005403-21 = "É a de uso externo. O Sensei deveria saber disso."
2005403-22 = "Aquela que consegue lidar com qualquer situação, inclusive combate."
2005403-23 = "[s] \"Aquilo é uma moto...\""
2005403-24 = "Ca-dei-ra de ro-das, entendeu?"
2005403-25 = "[ns] \"Entendi...\""
2005403-31 = "(Himari faz a manutenção da moto... quer dizer, da cadeira de rodas, com destreza e alegria)"
2005403-32 = "(...Eu ainda acho que não é uma cadeira de rodas. Engoli essas palavras)"
2005403-37 = "Potência do dispositivo de levitação, ok. Acelerador e freio... sem problemas. #nVerificando a carga do escudo de energia auxiliar..."
2005403-38 = "Fufu. Minha cadeira de rodas está perfeita hoje também."
2005403-39 = "[s] \"O que é uma cadeira de rodas, afinal...\""
2005403-40 = "Ora, para alguém como o Sensei, não saber disso..."
2005403-41 = "Não tem jeito. Deixe que eu lhe explique."
2005403-42 = "Uma cadeira de rodas é um \"dispositivo de auxílio à locomoção\" para que uma pessoa possa se mover enquanto permanece sentada."
2005403-43 = "Existem vários tipos, mas a minha, tanto a de uso interno quanto a de uso externo, são modelos elétricos."
2005403-44 = "[s] \"É... mesmo...?\""
2005403-45 = "Parece que você ainda não está convencido."
2005403-46 = "Então, Sensei, tente pensar desta forma: #nSe ela se move por propulsão, auxilia na locomoção e aumenta a conveniência da vida..."
2005403-47 = "Se esses são os elementos que compõem uma \"cadeira de rodas\", #nnão seria correto dizer que esta também é, sem dúvida, uma \"cadeira de rodas para uso externo\"?"
2005403-48 = "De certa forma, não é exagero dizer que esta cadeira de rodas para uso externo é um dos pontos culminantes."
2005403-49 = "Eu sempre quis criar uma \"cadeira de rodas para uso externo\" como esta. #nDesde a época em que minhas pernas ainda tinham força."
2005403-50 = "Naquela época, sempre havia problemas de tempo e orçamento, é claro."
2005403-51 = "Mas agora, as coisas são diferentes."
2005403-52 = "Oh? Você está me elogiando? #nFico muito feliz que você veja minha atitude positiva com bons olhos, mas..."
2005403-53 = "Fufu... isso já é passado, Sensei. Quem você pensa que eu sou?"
2005403-54 = "É um fato conhecido que sou elegante como uma orquídea. #nNo entanto... escondo dentro de mim uma vontade que não perde nem para as ervas daninhas."
2005403-55 = "Não desisto facilmente e não perco a esperança. #nEssa é a Himari Akeboshi."
2005403-56 = "Além disso, pense bem, Sensei. #nMesmo chamando de \"dispositivo de auxílio à locomoção\", #nnão é mais conveniente ter vários tipos preparados de acordo com o objetivo?"
2005403-57 = "[ns] \"Bem... existem muitas ferramentas que têm vários tipos, né.\""
2005403-62 = "Fufu, exatamente."
2005403-63 = "Sim? A diferença entre uma \"cadeira de rodas para uso externo\" e uma moto?"
2005403-67 = "Hum... eu não pretendia fazer uma proposta dessas..."
2005403-68 = "Mas já que estamos aqui, seria bom que o Sensei entendesse de uma vez por todas."
2005403-69 = "Desde as especificações básicas, minha \"cadeira de rodas\" é algo completamente diferente de uma moto."
2005403-70 = "Vou lhe mostrar... a sua essência."
2005403-71 = "[s] (Sinto que isso vai dar ruim)"
2005403-72 = "Sendo assim, Sensei?"
2005403-73 = "Poderia me dar um pouco do seu tempo hoje à noite?"
