[translation]
10045030-1 = "Episódio 3; Segunda rodada: Jet boat descontrolado"
10045030-3 = "Já está na hora de melhorar esse humor."
10045030-4 = "Quer comer alguma coisa para mudar de ares?"
10045030-5 = "……Agora não."
10045030-6 = "Vou deixar o espetinho para depois."
10045030-7 = "……Eu não disse que ia te dar um espetinho."
10045030-12 = "Mastiga, mastiga."
10045030-14 = "Não é muito convincente falar isso enquanto come……."
10045030-15 = "……No fim das contas, me dá um também."
10045030-16 = "Preciso recuperar pelo menos um pouco das minhas energias."
10045030-17 = "（Como será que eu aguento em cima do barco……）"
10045030-18 = "Sim, aqui está."
10045030-19 = "Este espetinho está divino!"
10045030-20 = "Que tal darmos uma olhada no barco?#nDá para comer o espetinho enquanto caminhamos."
10045030-25 = "Será que é aquele?"
10045030-29 = "É a primeira vez que subo em um barco tão radical!"
10045030-30 = "[ns1] \"Parabéns por passar da primeira rodada.\"\n[ns2] \"Será que as outras também estão dando uma olhada?\""
10045030-33 = "Esse barco…… é realmente seguro?"
10045030-34 = "Se cairmos na água, vão nos resgatar imediatamente, né?"
10045030-35 = "[s3] \"Sim. Os salva-vidas estão de prontidão,\"\n[s4] \"então pode ficar tranquila, estamos preparados para qualquer emergência.\""
10045030-38 = "……Espero que sim."
10045030-39 = "（Mesmo que eu não saiba nadar, acho que dá para disfarçar……）"
10045030-41 = "O que foi? Está com medo de cair?"
10045030-42 = "C-claro que não."
10045030-43 = "O papel de um estrategista é estar preparado para todas as situações.#nVocê não esqueceu disso, esqueceu?"
10045030-44 = "Além disso, o pessoal que tentou nos atrapalhar na última partida ainda está por aí."
10045030-45 = "Podem tentar armar algo de novo."
10045030-46 = "[s5] \"Quem sabe?\"\n[s6] \"Eles não devem estar ocupados demais com os próprios problemas?\""
10045030-49 = "……Então você quer dizer que é difícil não cair, para começo de conversa."
10045030-50 = "Nesse caso, que tal isto?"
10045030-51 = "Vamos cruzar os braços e segurar firme na barra de segurança! Assim estaremos seguras!"
10045030-52 = "Oh, parece divertido! Por que não?"
10045030-53 = "Ficar colada assim de roupa de banho…….#nMas, parece que não temos outra escolha."
10045030-55 = "Eu sento na ponta esquerda e Renge na ponta direita."
10045030-56 = "O que acham de Yukari e Kikyou sentarem no meio?"
10045030-58 = "É uma estratégia que só funciona porque a Nagusa-senpai pode usar os dois braços!"
10045030-59 = "Você não disse que ainda não estava 100%?"
10045030-60 = "Para isso, já estou bem."
10045030-61 = "Fufu, vou mostrar a vocês…… o verdadeiro poder que dorme nas sombras do crepúsculo."
10045030-62 = "Para com isso, você me deixa genuinamente preocupada……."
10045030-64 = "De qualquer forma, agora estamos prontas! Vamos passar da segunda rodada juntas!"
10045030-66 = "Algum tempo depois……."
10045030-69 = "Certo! Parece que tudo está pronto para a segunda rodada!"
10045030-74 = "Como anunciado, a modalidade de hoje é o Jet boat descontrolado!"
10045030-75 = "30 competidores serão divididos em 2 jet boats, e mergulhos e drifts infinitos serão repetidos até que restem apenas 10 pessoas!"
10045030-76 = "A pilotagem vai ficando cada vez mais agressiva…… selvagem, então tomem cuidado para não serem arremessadas, nyan-nyan!"
10045030-80 = "[ns] \"Competidores, embarquem!\""
10045030-82 = "Lembram do plano? Cruzar os braços e segurar firme na barra de segurança."
10045030-83 = "Sim! Com certeza!"
10045030-89 = "Estão prontas?"
10045030-90 = "Segunda rodada, lancha desgovernada……!"
10045030-91 = "[ns] \"Começar――!!\""
10045030-96 = "Uau!? Que rápido!?"
10045030-100 = "Aaaaaaaaaaaaaaaahhh!!"
10045030-101 = "Fiquem o mais coladas possível! Se não nos segurarmos umas nas outras……!"
10045030-105 = "Que absurdo é esse……!!"
10045030-106 = "Kikyou! Segure-se no meu corpo com mais força……!"
10045030-107 = "Obri……gada!"
10045030-108 = "A, as costas da Renge…… são surpreendentemente macias."
10045030-109 = "Não são as minhas costas, sabia!?"
10045030-110 = "Ah…… desculpe."
10045030-111 = "Não peça desculpas!"
10045030-118 = "Kyaaaaaaann!!"
10045030-119 = "Kya……! #nYu……Yukari, isso é a minha cauda……!"
10045030-120 = "P, peço perdão! #nMas, se eu soltar, vou acabar caindo――"
10045030-121 = "M, mas, aí é……!"
10045030-122 = "Sinto muitooooo……!!"
10045030-123 = "T, tudo bem…… eu vou aguentar de algum jeito…… aah……!"
10045030-127 = "Vamos unir nossas forças……!"
10045030-128 = "Eu não queria que fosse desse jeito……!"
10045030-129 = "Isso é a juventude!"
10045030-131 = "Gritos estão surgindo um atrás do outro……!"
10045030-132 = "Quem foi que pensou nessa prova maluca―― blub blub blub."
10045030-133 = "Gyaaaaaaah!!"
10045030-138 = "Levantando respingos de água, os participantes estão sendo eliminados um após o outro!"
10045030-139 = "Por favor, continuem acompanhando até o fim, nyan-nyan!"
