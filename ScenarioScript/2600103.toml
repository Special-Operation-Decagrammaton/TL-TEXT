[translation]
2600103-1 = "メリーさんの電波"
2600103-2 = "シャーレ・居住区"
2600103-4 = "シャーレで夜遅くまで仕事をしてから、少し休憩をするため簡易ベッドに横になった。"
2600103-5 = "ウトウトしていると、どこからか変な音が聞こえてきた。"
2600103-6 = "ふふ、うふふ……。"
2600103-7 = "私……今、……にいる……。"
2600103-8 = "[s] \"……声？どこから？\""
2600103-9 = "もうすぐあなたのところに行くね……。#nふたつ……！"
2600103-10 = "[s] \"この声、まさか……？\""
2600103-11 = "あとひとつ……！"
2600103-12 = "[s] \"！？！？\""
2600103-15 = "一晩中聞こえてくる正体不明の笑い声のせいで、まったく眠れなかった……。"
2600103-17 = "シャーレ・執務室"
2600103-18 = "昨夜シャーレの居住区で、メリーさんみたいな変な声が聞こえたんですか？"
2600103-19 = "それは興味深いですね……。実は私、以前からお化けのラップ音や悲鳴を録音するのが夢だったんです。"
2600103-20 = "今夜、私もシャーレの居住区に泊まっても良いでしょうか？その声について、私が調査してみます。"
2600103-21 = "[s] \"コタマはメリーさんが怖くないの？\""
2600103-22 = "怖くはありません。この世の大抵の現象は科学で説明できます。逆に、今は説明できない現象というのはつまり、研究する価値があるものということですので、むしろ嬉しいぐらいです。"
2600103-23 = "[s] \"……そういえばコタマも、ミレニアムの生徒だったね。\""
2600103-24 = "もちろんです。私も、真理を探究する「ヴェリタス」の一員ですので。"
2600103-25 = "まずは音がした時にすぐに録音できるように、前もってシャーレの居住区に機器を設置しておかないとですね。"
2600103-26 = "それでは、私はヴェリタスの部室に行って、録音機材を取ってきますので。"
2600103-28 = "コタマは機材を取りに、一度ミレニアムに帰った。"
2600103-30 = "シャーレ・居住区"
2600103-31 = "ここが、先生が普段生活されている場所……。"
2600103-32 = "何度も盗聴器を設置しようとしては失敗したシャーレに、こんな形で設置できるだなんて……。"
2600103-33 = "もちろん冗談です、気にしないでください。"
2600103-34 = "[s] \"いやいや、気になるって……。\""
2600103-35 = "では、変な音が聞こえてこないか、耳を澄ませて待つとしましょうか。"
2600103-37 = "しばらくした後……。"
2600103-38 = "ふふ、うふふ……。"
2600103-39 = "私……今、……にいる……。"
2600103-40 = "[s] \"出たぁ！？\""
2600103-41 = "この声、もしかして……？"
2600103-42 = "先生、執務室にあるラジオをつけていただけますか？"
2600103-43 = "私の予想通りならこれはたぶん……。"
2600103-46 = "うふふ！みんな待った？#n私、DJメリー！今クロノスの、ラジオスタジオにいるよ！"
2600103-47 = "今日もお便りを送ってくれた人のところに、私が直接プレゼントを届けに行くね！"
2600103-48 = "今日のお便りは……ふたつ！"
2600103-49 = "[s] この声って……？"
2600103-50 = "この時間帯に流れている、深夜のラジオ放送ですね。"
2600103-51 = "接続されてないスピーカー機器に無線ラジオの周波数信号が混線すると、時折雑音のようにそのラジオの音声が出力されることがあります。"
2600103-52 = "恐らく昨夜先生が聞いたメリーさんの声も、このラジオ放送だったのでしょう。"
2600103-53 = "[s] \"お化けじゃなくて良かった……。\""
2600103-54 = "……私は少しがっかりです。今度こそ本物の心霊現象の音が録音できるのではと楽しみにしてたのですが。"
2600103-56 = "……せっかくですし、10円玉でこっくりさんでも呼んでみましょうか。"
2600103-57 = "[s] \"それも怖いからやめて！\""
2600103-59 = "その後、降霊術を試そうとするコタマを必死に止めた。"
