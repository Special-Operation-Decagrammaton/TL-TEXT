[translation]
2600103-1 = "As ondas de rádio da Mary"
2600103-2 = "Schale - Área Residencial"
2600103-4 = "Depois de trabalhar até tarde no Schale, deitei-me na cama de solteiro para descansar um pouco."
2600103-5 = "Enquanto cochilava, ouvi um som estranho vindo de algum lugar."
2600103-6 = "Hehe, uhehe..."
2600103-7 = "Eu... agora... estou em..."
2600103-8 = "[s] \"...Uma voz? De onde vem?\""
2600103-9 = "Estou indo te ver em breve...#nDois...!"
2600103-10 = "[s] \"Essa voz, não pode ser...?\""
2600103-11 = "Falta só mais um...!"
2600103-12 = "[s] \"！？！？\""
2600103-15 = "Por causa da risada misteriosa que ouvi a noite toda, não consegui dormir nada..."
2600103-17 = "Schale - Escritório"
2600103-18 = "Você ouviu uma voz estranha, parecida com a da Mary, na área residencial do Schale ontem à noite?"
2600103-19 = "Isso é fascinante... Na verdade, meu sonho sempre foi gravar sons de batidas ou gritos de fantasmas."
2600103-20 = "Posso passar a noite na área residencial do Schale hoje? Vou investigar essa voz."
2600103-21 = "[s] \"Kotama, você não tem medo da Mary?\""
2600103-22 = "Não tenho medo. A maioria dos fenômenos deste mundo pode ser explicada pela ciência. Pelo contrário, fenômenos que ainda não podem ser explicados são dignos de estudo, então, na verdade, fico feliz."
2600103-23 = "[s] \"...Agora que você mencionou, Kotama também é uma aluna do Millennium, né.\""
2600103-24 = "Com certeza. Afinal, sou um membro do Veritas, que busca a verdade."
2600103-25 = "Primeiro, preciso instalar os equipamentos na área residencial do Schale com antecedência para que possamos gravar assim que o som surgir."
2600103-26 = "Sendo assim, vou até a sala do Veritas buscar o equipamento de gravação."
2600103-28 = "Kotama voltou ao Millennium para buscar o equipamento."
2600103-30 = "Schale - Área Residencial"
2600103-31 = "Então este é o lugar onde o Sensei vive habitualmente..."
2600103-32 = "Depois de tantas tentativas fracassadas de instalar escutas no Schale, conseguir instalar desta forma..."
2600103-33 = "É claro que é brincadeira, não leve a mal."
2600103-34 = "[s] \"Não, não, isso é preocupante...\""
2600103-35 = "Bem, vamos aguardar em silêncio para ver se ouvimos algum som estranho."
2600103-37 = "Depois de um tempo..."
2600103-38 = "Hehe, uhehe..."
2600103-39 = "Eu... agora... estou em..."
2600103-40 = "[s] \"Apareceu!?\""
2600103-41 = "Essa voz, será que..."
2600103-42 = "Sensei, poderia ligar o rádio no escritório?"
2600103-43 = "Se minha previsão estiver correta, isso é provavelmente..."
2600103-46 = "Uhehe! Esperaram por mim?#nEu sou a DJ Mary! Estou aqui no estúdio de rádio da Chronos!"
2600103-47 = "Hoje também vou entregar presentes pessoalmente para quem enviou cartas!"
2600103-48 = "As cartas de hoje são... duas!"
2600103-49 = "[s] Essa voz é...?"
2600103-50 = "É uma transmissão de rádio da madrugada."
2600103-51 = "Quando o sinal de frequência de rádio interfere em alto-falantes que não estão conectados, às vezes o áudio do rádio sai como se fosse um ruído."
2600103-52 = "Provavelmente, a voz da Mary que o Sensei ouviu ontem à noite também era dessa transmissão."
2600103-53 = "[s] \"Que bom que não era um fantasma...\""
2600103-54 = "...Estou um pouco desapontada. Estava ansiosa para gravar um fenômeno paranormal de verdade desta vez."
2600103-56 = "...Já que estamos aqui, que tal tentarmos chamar o Kokkuri-san com uma moeda de 10 ienes?"
2600103-57 = "[s] \"Isso também é assustador, pare com isso!\""
2600103-59 = "Depois disso, impedi desesperadamente a Kotama de tentar realizar uma sessão espírita."
