[translation]
103030-1 = "Episódio 3; Método"
103030-2 = "Uma altitude de 75.000 metros... Poxa, que situação complicada."
103030-3 = "Aliás, como que uma coisa consegue se manter lá em cima..."
103030-4 = "E do jeito que estamos agora, não temos como fazer um ataque a essa altitude."
103030-8 = "Presidente, tem alguma ideia boa?"
103030-9 = "Isso já meio que foge da minha área, sabe...#nNós somos hackers, e não engenheiras."
103030-10 = "Além do mais, mesmo que a gente tentasse analisar a estrutura, ela tá coberta por uma película misteriosa, não dá nem pra ver como tão as coisas lá dentro."
103030-14 = "Tem razão... Em momentos assim, que tal a gente dar uma olhada na herança da Big Sister?"
103030-16 = "A herança... da Presidente? "
103030-17 = "Uhum. Entre as \"medidas preventivas\" que ela preparou pra impedir o fim do mundo...#ntinha algumas feitas para ameaças vindas do céu."
103030-18 = "Chi-chan, eu quero usar uma arma que achei em Eridu, você poderia cuidar da invasão do sistema? Eu cuido dos preparativos por aqui."
103030-19 = "……Aquele míssil, né? Eu não boto muita fé nele, mas..."
103030-20 = "Entendido.#nTalvez dê pra fazer alguma coisa com ele. "
103030-21 = "Vou avisar as outras garotas do clube."
103030-23 = "E também vamos precisar da ajuda do Departamento de Engenharia."
103030-25 = "Entendido. Vou agilizando os preparativos por aqui também."
103030-26 = "Muito obrigada.#nPor enquanto, vamos tentar tudo o que estiver ao nosso alcance."
103030-28 = "Tsc... Chega lá...!!"
103030-31 = "Faltam 2.000 metros..."
103030-34 = "1.000 metros... 500 metros... "
103030-38 = "Alvo atingiu as coordenadas designadas!#nE aí? Acertou!?"
103030-40 = "Sala do Departamento de Engenharia"
103030-42 = "……Não, ele passou reto. "
103030-43 = "Aah, de novo!?"
103030-44 = "Distância do alvo: 1.000 metros... 1.500 metros..."
103030-45 = "Ele tá se afastando cada vez mais. "
103030-46 = "Haa... Essa era a nossa última carta na manga, mas...#nÉ como se a gente estivesse lutando contra um fantasma."
103030-48 = "……。"
103030-49 = "Até as medidas que a Presidente deixou não adiantaram?"
103030-50 = "Uhum... Parece que intervenções físicas não funcionam naquilo."
103030-51 = "E eu jurava que o desempenho daquele míssil de cruzeiro superava até o nível de tecnologia da Millennium...#nE mesmo assim não deu em nada..."
103030-52 = "Aliás, onde foi que a Presidente conseguiu um negócio daqueles? "
103030-54 = "Haa... Fazer mais que isso não vai adiantar nada. "
103030-55 = "Se eles não são afetados fisicamente, nós do Departamento de Engenharia não temos como fazer nada."
103030-56 = "……Acho que a gente também não. Aquele foi o nosso último trunfo que achamos em Eridu..."
103030-57 = "Himari, você tem mais alguma ideia?"
103030-59 = "Não... Pelo menos por enquanto."
103030-60 = "Haa..."
103030-61 = "……Sério, ela continua com a cara da Big Sister até o fim, hein."
103030-62 = "Ela nunca foi de grande ajuda até agora, e pensar que a herança dela seria a mesma coisa."
103030-63 = "Err... não poderiam parar de falar da Presidente como se ela tivesse morrido!? "
103030-64 = "Mas ela fez por merecer.#nO fato de ela não ter dado as caras sequer uma vez numa situação como essa comprova isso."
103030-65 = "Bom... a Presidente até que fez bastante coisa, mas..."
103030-66 = "De qualquer forma, precisamos pensar no nosso próximo passo."
103030-68 = "Será que não tem... nenhum outro jeito?"
103030-69 = "Haa..."
103030-70 = "Tamo num beco sem saída."
103030-77 = "Enquanto dava uma olhada nos dados do Sanctum que a Millennium analisou, eu percebi uma coisa――"
103030-82 = "Talvez eu tenha entendido... o fenômeno que está acontecendo naquela estrutura."
103030-87 = "Hmm... Pode nos dar mais detalhes?"
103030-100 = "Ao unir as informações das sacerdotisas da Sisterhood, da bibliotecária da Biblioteca Antiga... e da Tea Party... e prosseguirmos com a interpretação,#nnós chegamos a uma hipótese."
103030-101 = "Mas é apenas uma hipótese, algo que ainda não foi comprovado na prática.#nMesmo assim, tudo bem para vocês?"
103030-102 = "Não tem problema.#nDe qualquer forma, como não podemos fazer intervenções físicas, nós não temos como comprovar nada."
103030-103 = "Indo direto ao ponto: a segunda Torre Sanctum que surgiu e a estrutura no céu de Kivotos..."
103030-107 = "……Parecem estar em um estado de \"coexistência de estados\"."
103030-112 = "Entendo..."
103030-113 = "Ué?#nIsso aí é tipo aquela parada de mecânica quântica...?"
103030-115 = "Não, eu apenas usei a teoria mais próxima para facilitar a compreensão daquele fenômeno."
103030-116 = "Mantenham isso em mente enquanto escutam."
103030-117 = "Aquilo é uma interpretação de muitos mundos――ou melhor, talvez devesse dizer \"interpretação multidimensional\". É bem provável que seja uma existência probabilística baseada nessa teoria."
103030-118 = "Interpretação multidimensional, quer dizer..."
103030-119 = "Err... A interpretação de muitos mundos é a hipótese de que o universo se ramifica em inúmeros caminhos, dependendo do número de possibilidades, não é...?"
103030-120 = "Ah, mas e a interpretação multidimensional, é diferente...?"
103030-121 = "――Por exemplo, se você jogar uma moeda, a chance de dar cara é de 50%.#nE neste mundo, teremos apenas um único resultado."
103030-122 = "Porém, existe a possibilidade de que o mundo onde o resultado foi o oposto também exista, embora a gente não consiga observá-lo. Essa teoria defende que todos esses \"mundos de possibilidades\" existem de verdade..."
103030-124 = "Ahaha! Tipo aqueles mundos paralelos que a gente vê direto em filmes de ficção científica?"
103030-125 = "Toda vez que joga uma moeda o mundo se ramifica, tipo isso? (*Croc*)"
103030-126 = "Bom, pelo menos a teoria em si é baseada na ciência."
103030-128 = "E aquele espaço――#né uma mistura de todas essas possibilidades sem que elas tenham se ramificado."
103030-129 = " ……Um espaço caótico onde a existência e não-existência de dimensões infinitas se misturaram."
103030-130 = "É exatamente por isso que é impossível fazer intervenções físicas partindo de um mundo onde a existência já foi definida."
103030-131 = "A gente consegue observar, mas não tem como intervir..."
103030-132 = "Será que não tem jeito mesmo..."
103030-135 = "A minha hipótese――é de que apenas a película ao redor da estrutura está nesse estado."
103030-136 = "Pois se a estrutura interna em si estivesse instável, a transmissão de energia para cada Sanctum também não seria possível."
103030-137 = "……Ou seja, aquilo ali é uma barreira."
103030-138 = "Eles expandem essa multidimensão invencível de \"coexistência de estados\" como uma barreira para se protegerem de todas as leis da física."
103030-140 = "Faz sentido... Se for isso mesmo, aí as coisas se encaixam."
103030-141 = "Uhum. E se conseguirmos destruir essa barreira..."
103030-142 = "Provavelmente também conseguiremos atacar a estrutura em si."
103030-144 = "Até entendi a teoria, mas como diabos a gente faz isso...?"
103030-145 = "Se essa teoria estiver correta, há uma maneira."
103030-146 = "Basta entrarmos no mesmo estado que aquela barreira."
103030-147 = "Mesmo estado...?"
103030-148 = "Entendo... Se considerarmos a \"coexistência de estados\" que está rolando naquele espaço multidimensional como um tipo de valor de vibração――"
103030-149 = "Um objeto com o mesmo padrão de vibração que o alvo não seria afetado por ele..."
103030-150 = "Uhum. Estando no mesmo estado, poderemos existir mutuamente no \"mesmo espaço\", independente da coexistência de probabilidades ou estados dentro da multidimensão."
103030-151 = "Tipo um... cancelamento de ruído? "
103030-152 = "É... Acho que dá pra dizer que é um estado que chega quase nisso aí."
103030-154 = "Ao analisar essa multidimensão, se a gente também entrar em um estado semelhante...#nPoderemos neutralizar a barreira..."
103030-155 = "Mas, como a gente vai..."
103030-156 = "Se fôssemos colocar isso em prática de verdade, teríamos que calcular a \"interpretação multidimensional\"."
103030-157 = "Isso é sequer possível?"
103030-158 = "Err..."
103030-160 = "……Nas nossas condições atuais, não."
103030-161 = "Calcular a interpretação multidimensional é impossível, a não ser que a gente use um computador quântico."
103030-162 = "Quer dizer que a gente não pode fazer nada então?"
103030-163 = "Aquele troço tá tentando fazer o \"Sanctum Falso\" aparecer de novo,#ne a gente só vai ficar aqui de braços cruzados olhando...?"
103030-169 = "……。"
103030-170 = "Mesmo se nós destruirmos o novo Sanctum que aparecer..."
103030-171 = "Enquanto não lidarmos com a raiz do problema, o Sanctum continuará aparecendo de novo e de novo."
103030-173 = "Não pode ser..."
103030-174 = "E-Então, não importa o quanto a gente lute―― "
103030-176 = "Eles conseguirão criar a Torre Sanctum quantas vezes quiserem... é isso?"
103030-177 = "Q-Que absurdo!"
103030-178 = "Aonde foi parar a primeira lei da termodinâmica!?"
103030-179 = "Haa... Já que o inimigo é \"multidimensional\", tudo é possível, né."
103030-181 = "……。"
103030-182 = "O que diabos a gente faz agora?#nNão adianta nada a gente descobrir o jeito, se não consegue resolver o problema..."
103030-183 = "……。 "
103030-184 = "……Ué, peraí? "
103030-185 = "Cadê o Sensei?"
103030-189 = "H-Hã...?#nEle tava bem aí agora há pouco..."
103030-196 = "……Há um método, sim."
103030-197 = "[s] \"...Black Suit.\""
103030-198 = "Se usar aquilo, você talvez consiga chegar até o Guia do Chroma."
103030-199 = "[s] \"...E o que eu tenho que fazer?\""
103030-200 = "Fufufu..."
103030-201 = "Bom... que tipo de \"preço\" você está disposto a me pagar? Sensei."
103030-202 = "Ah... Entendo――"
103030-203 = "O simples fato de vir me procurar desta forma agora,#njá indica que está preparado para pagar qualquer preço――é o que me parece."
103030-204 = "Sua postura de não hesitar em cooperar com a \"Gematria\" se for necessário... "
103030-205 = "[s] \"............\""
103030-206 = "Kukuku... Então, o que devo pedir em troca...#nQue tal... que você se junte à \"Gematria\"?"
103030-207 = "Kukukuku... É brincadeira."
103030-208 = "A Gematria já se dissolveu, afinal.#nPor isso, abrirei uma exceção e lhe contarei."
103030-214 = "……Mas antes, um aviso."
103030-215 = "No momento em que usar isso, o seu corpo――#nSofrerá danos irreversíveis, Sensei [USERNAME]."
103030-216 = "Jamais poderá voltar ao seu estado anterior.#n――Isso pode até mesmo levá-lo à morte. "
103030-217 = "――Mesmo assim, você quer prosseguir?"
103030-219 = "[ns] \"――Eu não me importo.\""
103030-221 = "Mesmo que esse fim seja mais claro que a luz do dia?"
103030-222 = "……。"
103030-223 = "……Compreendo. Vou lhe ensinar."
103030-229 = "Esse \"método\"――"
103030-231 = "――Está em Abydos."
103030-233 = "Próximo episódio; Aquilo Que Se Encontra Em Abydos (1)"