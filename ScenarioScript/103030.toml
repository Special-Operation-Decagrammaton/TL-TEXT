[translation]
103030-1 = "第3話;方法"
103030-2 = "高度75,000メートルとは……なかなかどうして、難しい話ですね。"
103030-3 = "逆に、どうやってそこに存在しているんだか……"
103030-4 = "それに、今の私たちでは、あの高度への攻撃は不可能だよ。"
103030-8 = "部長、何か良い考えでもある？"
103030-9 = "既に私の管轄外と申しますか……#n私たちはハッカーであって、エンジニアではありませんので。"
103030-10 = "それに、構造を解析しようにも、謎の膜で覆われてしまっていて、内部の状況を確認することもできません。"
103030-14 = "そうですね……こういう時こそ、ビッグシスターの遺産に頼ってみましょうか。"
103030-16 = "会長の……遺産？ "
103030-17 = "ええ。あの人が世界の終焉を防ぐために用意した「対策」の中には……#n空からの脅威を想定したものもありますので。"
103030-18 = "チーちゃん、エリドゥで見つけた武器を使いたいので、ハッキングをお願いしても？準備は私の方でしますので。"
103030-19 = "……例のミサイルだよね？あんまり気は乗らないけど、"
103030-20 = "了解。#nあれならいけるかもね。 "
103030-21 = "他の部員にも伝えとく。"
103030-23 = "あと、エンジニア部の協力も必要かな。"
103030-25 = "了解。こちらの方も準備を進めておくよ。"
103030-26 = "ありがとうございます。#n一旦、できることは全て試してみましょう。"
103030-28 = "くっ……届け……！！"
103030-31 = "あと2,000m……"
103030-34 = "1,000m……500m…… "
103030-38 = "ターゲット、指定座標に到達しました！#nどうでしょう？命中しましたか！？"
103030-40 = "エンジニア部室"
103030-42 = "……いや、通り過ぎてしまった。 "
103030-43 = "ああっ、また！？"
103030-44 = "ターゲットとの距離、1,000m……1,500m……"
103030-45 = "どんどん遠ざかってる。 "
103030-46 = "はぁ……これが最後の手段だったのだけど……#nまるで、幻影を相手にしているみたいだね。"
103030-48 = "……。"
103030-49 = "会長が残した手段もダメだったの？"
103030-50 = "ええ……アレに対しては、物理的な干渉ができないみたいですね。"
103030-51 = "あの巡航ミサイル、ミレニアムの技術力を上回る性能に見えたのに……#nこれでもダメだなんて……"
103030-52 = "というか、会長はどこであんなものを手に入れたのよ。 "
103030-54 = "はぁ……これ以上は無意味かな。 "
103030-55 = "物理的な影響を受けないのだとすれば、私たちエンジニア部にはどうすることもできないよ。"
103030-56 = "……こっちもかな。あれはエリドゥで見つけた最後の切り札だったし……"
103030-57 = "ヒマリ、他に手はある？"
103030-59 = "いえ……今のところは。"
103030-60 = "はぁ……"
103030-61 = "……本当に、最後までビッグシスターらしいといいますか。"
103030-62 = "彼女が今まで役に立ったことはほとんどありませんでしたが、遺産までもだなんて。"
103030-63 = "その……会長の事、いなくなった人扱いするのやめませんか！？ "
103030-64 = "彼女はそれだけの事をしたのですよ。#n事実、このような事態なのに姿一つ現さないのですから。"
103030-65 = "まぁ……たしかに、会長も色々しましたけど……"
103030-66 = "ともあれ、次の手を考えなければなりませんね。"
103030-68 = "他に……なにか方法はないのでしょうか。"
103030-69 = "はぁ……"
103030-70 = "こりゃ八方塞がりだねぇ。"
103030-77 = "ミレニアムが分析してくださった、サンクトゥムのデータを見ていたのですが――"
103030-82 = "あの構造体に起きている現象が何なのか――分かったかもしれません。"
103030-87 = "ふむ……詳しく伺えますか？"
103030-100 = "シスターフッドの司祭と古書館の司書――そしてティーパーティー……#nそれぞれの情報を持ち寄って解釈を進めたところ、一つの仮説に行き当たりました。"
103030-101 = "ですが、あくまで仮説であり、実際に検証したものではありません。#nそれでも、よろしいでしょうか？"
103030-102 = "構いません。#nどのみち物理的な干渉ができない以上、検証はできませんから。"
103030-103 = "結論から申し上げますと、2度目に出現したサンクトゥムタワーと、キヴォトス上空の構造体は……"
103030-107 = "……一種の「状態の共存」が起きているようです。"
103030-112 = "なるほど……。"
103030-113 = "えっ？#nこれって、量子力学の話って事……？"
103030-115 = "いえ、あの現象を理解しやすくするために、一番近い理論で例えただけです。"
103030-116 = "それを念頭に置いて、お聞きください。"
103030-117 = "あれは多世界解釈――いえ、「[ruby=・   ・   ・]多次元[/ruby]解釈」と表現するのが正しいでしょうか。その理論に基づいた、確率的な存在である可能性が高いです。"
103030-118 = "多次元解釈ということは――"
103030-119 = "えっと……多世界解釈は可能性の数だけ、宇宙が分岐するという仮説ですよね……？"
103030-120 = "あっ、でも多次元解釈だと違うのでしょうか……"
103030-121 = "――つまり、コインを投げて表が出る確率は50%。#nそして、この世界には結果が1つだけ現れる。"
103030-122 = "けれど、観測できないだけで、逆の結果が出た世界が存在する可能性もある。そういった「可能性の世界」が全て実在すると解釈する理論……"
103030-124 = "あははっ！SFとかでよく見る並行世界ってヤツ？"
103030-125 = "コインを投げるたびに世界が分岐する的な？（パリッ）"
103030-126 = "一応、理論自体は科学に基づいたものだけどね。"
103030-128 = "そして、あの空間は――#nそれら全ての可能性が分岐しないまま混ざり合っているのです。"
103030-129 = " ……無限に広がる多次元の実在と非実在が、混ざり合ってしまった混沌とした空間。"
103030-130 = "だからこそ、存在が確定した世界からの物理的な介入ができないのでしょう。"
103030-131 = "観測はできるけど、干渉はできない……"
103030-132 = "なにか方法はないのかしら……"
103030-135 = "おそらく――周囲の膜だけが、その状態なのだと予測しています。"
103030-136 = "内部の構造体そのものの状態が不安定なのであれば、各サンクトゥムへのエネルギー伝達もできないはずですので。"
103030-137 = "……つまり、あれはバリアなのですね。"
103030-138 = "「状態の共存」という無敵の多次元をバリアのように展開し、あらゆる物理法則から守っているのだと。"
103030-140 = "なるほど……それでしたら、たしかに辻褄が合います。"
103030-141 = "はい。そして、あのバリアを破壊できれば……"
103030-142 = "おそらく、本体への攻撃も可能になるでしょう。"
103030-144 = "理屈は分かったけど、一体どうやって……？"
103030-145 = "その理論が正しいのであれば、方策はあります。"
103030-146 = "こちらも、あのバリアと[ruby=・   ・   ・   ・]同じ状態[/ruby]になれば良いのです。"
103030-147 = "同じ状態……？"
103030-148 = "なるほど……あの多次元空間で繰り広げられている「状態の共存」を、一種の振動値と捉えるのなら――"
103030-149 = "対象の振動パターンと同じパターンを持つ物体であれば、その影響を受けない、と……"
103030-150 = "はい。同じ状態であれば、多次元内部の確率や状態の共存とは関係なく、互いが「同じ空間」に存在する事になります。"
103030-151 = "それって……ノイズキャンセリング？ "
103030-152 = "そうですね……限りなくそれに近い状態といえるでしょう。"
103030-154 = "あの多次元を分析し、こちらも同様の状態になれば……#nバリアを無力化できる……"
103030-155 = "ですが、どのように……"
103030-156 = "それを本当に実行するのなら、私たちが「多次元解釈」を計算できないとだよね。"
103030-157 = "そんなこと、できるの？"
103030-158 = "えっと……"
103030-160 = "……現状では不可能です。"
103030-161 = "多次元解釈の計算は、量子コンピュータでも使わない限りできません。"
103030-162 = "つまり、今の私たちじゃ何も出来ないって事？"
103030-163 = "アレが、また「虚妄のサンクトゥム」を出現させようとしているのに、#n私たちはただ見てることしかできないの……？"
103030-169 = "……。"
103030-170 = "再び出現したサンクトゥムを破壊したとしても……"
103030-171 = "元凶をどうにかしない限り、同じようにサンクトゥムが出現するでしょう。"
103030-173 = "そんな……"
103030-174 = "そ、それじゃあ、いくら私たちが戦ったところで―― "
103030-176 = "何度もサンクトゥムタワーを作り出せる……ということですよね？"
103030-177 = "なっ……そんなのあり得ないわよ！"
103030-178 = "熱力学第一法則はどこにいったのよ！？"
103030-179 = "はぁ……相手が「多次元」なら、何でもアリって事なんだね。"
103030-181 = "……。"
103030-182 = "い、一体、どうすればいいのさ？#n方法が分かったって、解決できないなら意味ないじゃん……"
103030-183 = "……。 "
103030-184 = "……ってか、あれ？ "
103030-185 = "先生は？"
103030-189 = "あ、あれ……？#n先程までそこにいらっしゃったのですが……"
103030-196 = "……方法なら、ありますよ。"
103030-197 = "[s] \"……黒服。\""
103030-198 = "アレであれば、[ruby=プレナパテス]色彩の嚮導者[/ruby]に到達できるかもしれません。"
103030-199 = "[s] \"……どうすればいい？\""
103030-200 = "フフフ……"
103030-201 = "そうですね……あなたは私にどのような「代償」を支払ってくれますか？先生。"
103030-202 = "嗚呼……なるほど――"
103030-203 = "今こうして、私に尋ねる行為そのものが、#nどんな代償であれ差し出す覚悟がある――という事なのですね。"
103030-204 = "必要とあらば「ゲマトリア」との協力も厭わない、というその姿勢…… "
103030-205 = "[s] \"…………。\""
103030-206 = "クックックッ……では、私は何を要求いたしましょう……#nそうですね、「ゲマトリア」への加入――なんていかがでしょう？"
103030-207 = "クックックックッ……冗談です。"
103030-208 = "既にゲマトリアは解散しましたので。#n今回は特別に教えて差し上げますよ。"
103030-214 = "……その前に、一つ警告を。"
103030-215 = "[USERNAME]先生の肉体は、これを使用した瞬間――#n取り返しのつかない被害に遭うでしょう。"
103030-216 = "二度と、以前の状態に戻る事はできません。#n――死に至る事さえ、有り得るのです。 "
103030-217 = "――それでも、よろしいのですか？"
103030-219 = "[ns] \"――構わないよ。\""
103030-221 = "その結末が、火を見るよりも明らかだとしても？"
103030-222 = "……。"
103030-223 = "……分かりました、お教えしましょう。"
103030-229 = "その「方法」は――"
103030-231 = "――[ruby=・   ・   ・   ・]アビドス[/ruby]に在ります。"
103030-233 = "次回;アビドスに在るもの（１）"
