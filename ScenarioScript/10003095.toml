[translation]
10003095-1 = "第9話;風紀委員会vs問題児集団（２）"
10003095-2 = "重戦車を、ひとりで！？"
10003095-3 = "ああもう、撤退だ！誰だよ留守って言ったのは！くそっ、騙された！"
10003095-4 = "温泉が！海洋深層水温泉がーーー！！"
10003095-11 = "ええぇぇぇぇっ！？これじゃトウモロコシが、全部ポップコーンになっちゃう！！"
10003095-12 = "あら、風紀委員長のお出ましですか★これはもう無理ですね。"
10003095-13 = "そうですわね、では今回の研究はここまで。"
10003095-14 = "それでは撤収しましょう～、きゃー！"
10003095-15 = "なんでちょっと楽しそうなの！？とにかく早く逃げて！！"
10003095-19 = "……相変わらず、圧倒的だな。"
10003095-20 = "流石ですね……。"
10003095-21 = "スケバン集団「破茶滅茶」、そして「びしょびしょヘルメット団」の制圧完了！"
10003095-22 = "数名は逃走しましたが、追跡はできているのですぐに全員捕まるはずです。"
10003095-23 = "事態の鎮圧お疲れ様でした、[ruby=そらさき]空崎[/ruby]委員長！"
10003095-24 = "……ふぅ。"
10003095-25 = "……。"
10003095-26 = "……。"
10003095-31 = "じゃあ、ホテルに戻ろう。"
10003095-32 = "あ、それから……。"
10003095-33 = "戻ったらすぐに、反省会を行う。全員参加するように。"
10003095-34 = "はぁ……。"
10003095-35 = "はい……。"
10003095-36 = "特にアコ、覚悟しておきなさい。"
10003095-37 = "うっ……はい……。"
