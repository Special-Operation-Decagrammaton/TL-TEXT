[translation]
1008003-1 = "頭脳労働専門"
1008003-2 = "（近くのグラウンド[ruby=しょくほう]で食蜂と[/ruby]待ち合わせをした）"
1008003-7 = "見当たらないと思ったら、こっちにいたのねぇ。"
1008003-8 = "それで？なんで私を呼び出したのかしらぁ？"
1008003-9 = "……ん？"
1008003-10 = "外の空気に当たれば気分転換になると思った？"
1008003-11 = "そう簡単に解決するとは思わないけどぉ……"
1008003-12 = "ま、先生が言うのなら試してみましょうか。"
1008003-13 = "……えぇ？"
1008003-14 = "ジョギング？"
1008003-15 = "んん……どうかしら。#nあんまり必要力を感じないというかぁ……"
1008003-16 = "良い考えとは思えないんですけどぉ……"
1008003-17 = "スマートな私には似合わないしぃ？"
1008003-21 = "せ、先生！？まだお話は途中だゾ！？"
1008003-22 = "[s1] \"きっと気が晴れるよ！\"\n[s2] \"大丈夫、軽くジョギングするだけだから！\""
1008003-28 = "ちょ、ちょっと先生、引っ張らないでよぉ！！"
1008003-29 = "まっ、待ちなさ――"
1008003-34 = "（そしてグラウンド一周目……）"
1008003-40 = "[ns] \"…………？\""
1008003-42 = "[ns3] \"……食蜂？\"\n[ns4] \"あれ、どこに……？\""
1008003-52 = "だ、からっ……はぁ……待って……ぜぇ……はぁ……"
1008003-53 = "ぜぇ……はっ……はぁ……！"
1008003-54 = "……ふう……ぅ……"
1008003-55 = "もう……ダメ……"
1008003-61 = "[ns5] \"……食蜂！？\"\n[ns6] \"大丈夫！？食蜂！食蜂！！\""
1008003-67 = "（ふらふらの食蜂を連れて、急いで近くの病院に向かった）"
1008003-69 = "…………。"
1008003-70 = "んん……あらぁ……？"
1008003-71 = "寝ちゃってたのねぇ……"
1008003-75 = "……先生？"
1008003-76 = "ずっと待っててくれたのかしら？#n……なによ、そんなに暗い顔してぇ。"
1008003-77 = "……？"
1008003-78 = "ごめん、って……？#n……ああ、さっきの？"
1008003-79 = "謝られるとは思ってなかったわぁ。#nあんまり気にしないでちょうだい。"
1008003-80 = "ふふ、思い通りにいかないからって、すぐ機嫌を損ねるような女だと思ったかしら？"
1008003-81 = "……というか、倒れた時のこと……よく覚えてないんだけどぉ。"
1008003-82 = "医者には診てもらったのよねぇ？#n検査結果はどうだったの？"
1008003-83 = "異常力でも見つかったかしらぁ？"
1008003-84 = "……ちょっと。"
1008003-85 = "なんで目を逸らすのよ？早く聞かせてちょうだい。"
1008003-86 = "もしかして、こっちに来たせいで……"
1008003-87 = "[s7] \"いや、なんというか……。\"\n[s8] \"病気ではないんだけど……\""
1008003-93 = "……？"
1008003-94 = "病気じゃないなら、良かったじゃない。"
1008003-95 = "医者が怒ってた……？"
1008003-96 = "――もしかして。"
1008003-97 = "日頃の運動不足をどうこう言われたのかしらぁ？"
1008003-101 = "……コホン。"
1008003-102 = "ま、まぁ……仕方ないでしょう。"
1008003-103 = "私は頭脳労働専門だしぃ……？"
1008003-104 = "…………。"
1008003-105 = "……先生？"
1008003-106 = "……別に、頭を覗いたわけじゃないけどぉ、先生が何を考えてるかくらい分かるわぁ。"
1008003-107 = "そんなに見つめられても……"
1008003-109 = "……やらないわよぉ？"
