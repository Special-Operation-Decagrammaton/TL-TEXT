[translation]
2300405-1 = "O animaroide perfeito"
2300405-2 = "Schale - Escritório"
2300405-3 = "Sensei, cheguei."
2300405-4 = "……Ah, é verdade. Você disse que estaria fora hoje por causa de uma viagem de negócios."
2300405-5 = "Então estou sozinha hoje."
2300405-7 = "Au, au au!"
2300405-8 = "Opa, por que tem um cachorro No Schale……?"
2300405-9 = "Ah, entendi. Esse deve ser o cachorro robô que o Sensei mencionou. Já chegou, então."
2300405-10 = "Hah, hah, hah, hah……."
2300405-11 = "Isso aqui foi feito de forma bem detalhada."
2300405-13 = "O Sensei disse para não mexer, mas só dar uma olhadinha não deve fazer mal……."
2300405-16 = "Tento abraçá-lo."
2300405-17 = "Incrível. É macio e quentinho……."
2300405-18 = "Diferente da pele artificial feita de uretano ou gelatina, ele tem até um cheiro de animal, parece pelo de verdade."
2300405-19 = "E esse calor…… será que tem um sistema de aquecimento embutido?"
2300405-20 = "Vou examinar um pouco mais."
2300405-22 = "Levanto o cachorro e coloco seu rosto de frente para o meu."
2300405-23 = "Hah, hah, hah, hah……."
2300405-24 = "O nariz e a boca estão úmidos. Dizem que isso é sinal de saúde em cães reais, mas……."
2300405-25 = "Essa umidade deveria causar um impacto negativo na estrutura interna de um robô. Como será que resolveram isso? Algum tipo de tratamento impermeabilizante avançado……?"
2300405-26 = "Os olhos também…… estão acompanhando o movimento do meu rosto perfeitamente."
2300405-27 = "Parece que está equipado com um rastreamento de movimento de ponta e uma inteligência artificial muito robusta para permitir isso."
2300405-29 = "O cachorro se debate para tentar escapar dos braços da Utaha."
2300405-30 = "Au, au……."
2300405-31 = "Ei, não se mexa. Assim não consigo verificar o sistema de propulsão."
2300405-32 = "Esse movimento suave…… quantos eixos de propulsão será que cabem nessas patinhas……."
2300405-33 = "Até o movimento dos dedos das patas foi reproduzido, e além de preciso, não faz barulho nenhum."
2300405-34 = "Isso é incrível…… #nNão seria exagero chamar de o animaroide mais avançado de todos."
2300405-35 = "E o pior, está muito acima do nível tecnológico do nosso Clube de Engenharia……."
2300405-36 = "Desde quando um animaroide tão avançado assim existe…… essa tecnologia, quantos passos à nossa frente eles estão……."
2300405-39 = "……Ah, Sensei. Bem-vindo de volta."
2300405-40 = "[s] \"Aconteceu algo de especial enquanto eu estava fora?\""
2300405-41 = "Se é que posso dizer, eu senti meus limites novamente……."
2300405-42 = "[s] \"O que aconteceu!?\""
2300405-43 = "Olhando para esse robô que você pediu, ou melhor, esse animaroide de ponta…… eu pensei que talvez estivesse confiando demais na minha própria tecnologia."
2300405-44 = "Talvez eu deva renunciar ao título de Meister do Millennium e começar a estudar tecnologia do zero……."
2300405-45 = "[s1] \"Um animaroide de ponta……?\"\n[s2] \"O que você quer dizer com isso……?\""
2300405-46 = "Você também viu, não viu, Sensei? Esse animaroide feito com tanta precisão."
2300405-47 = "Você também viu, não viu, Sensei? Esse animaroide feito com tanta precisão."
2300405-48 = "Não dá para distinguir de um cachorro de verdade. Criar um animaroide assim é uma tarefa hercúlea, mesmo com a tecnologia do Millennium."
2300405-49 = "Au, au au!"
2300405-50 = "[s] \"De onde veio esse cachorro?\""
2300405-51 = "……Hm? Não é o cachorro robô que você pediu? #nIsso significa que……."
2300405-53 = "Não acredito, era um cachorro de verdade que se perdeu e entrou No Schale……."
2300405-54 = "Como eu estava com a história do Sensei na cabeça, fui completamente enganada pelo meu preconceito."
2300405-55 = "[s] \"Não acha que é normal não perceber que é real, sendo tão realista assim?\""
2300405-56 = "Você diz isso, Sensei, mas o desenvolvimento recente dos animaroides é impressionante."
2300405-57 = "Embora a reprodução do toque e da temperatura corporal seja difícil, já estamos conseguindo criar movimentos de articulação próximos aos de um cachorro real com a tecnologia atual."
2300405-58 = "Mesmo que ainda seja difícil agora, daqui a 10 anos, não será impossível criar um animaroide que não possa ser distinguido de um cachorro real……."
2300405-60 = "Depois disso, ouvi a Utaha falar por quase uma hora sobre a tecnologia dos animaroides de ponta."
