[translation]
33180-1 = "Episódio 18; Sem Hesitar"
33180-2 = "......"
33180-3 = "[s] Olha para Hasumi."
33180-4 = "......Sensei."
33180-5 = "O que diabos... está acontecendo aqui..."
33180-6 = "[s] \"Ainda bem, Hasumi...\""
33180-7 = "......Sim. Foi por pouco, mas..."
33180-8 = "E a Tsurugi, e as outras..."
33180-12 = "......"
33180-13 = "[s] Olha para Tsurugi."
33180-14 = "......?"
33180-17 = "Gyaaaaah!?"
33180-18 = "S-S-S-Sensei!? O-O que faz aqui...!?"
33180-19 = "Ah, Tsurugi-san! Ei, já consegue se mover!? Como esperado da Presidente do Comitê de Realização da Justiça!"
33180-22 = "......Fico feliz que esteja bem, Sensei."
33180-23 = "[s] \"Tudo graças à Sena.\""
33180-24 = "Não precisa. Foi a minha primeira vez tratando um adulto, mas que bom que deu tudo certo."
33180-25 = "Sensei..."
33180-26 = "Chinatsu, você ainda não pode se mover. Deite-se, ordens da sua senpai."
33180-27 = "Eu faço parte do Comitê Disciplinar agora..."
33180-28 = "Você pode voltar para o Departamento de Medicina de Emergência agora mesmo, sabia? Você pode tocar no cadáveres de alta qua... digo, nos feridos o quanto quiser."
33180-29 = "Não, eu não... eu agradeço, mas dispenso a oferta."
33180-34 = "Sensei..."
33180-35 = "Akko-chan, não se mexa ainda, guh...!"
33180-36 = "[s] \"Deixando os ferimentos de lado, que bom que você e a Iori estão bem...\""
33180-37 = "A Presidente desapareceu..."
33180-38 = "Ela não está no clube e não consigo contatá-la..."
33180-39 = "Sensei, a Presidente..."
33180-40 = "[s] \"Sim, deixe comigo.\""
33180-41 = "......Sim. Por favor, cuide dela."
33180-45 = "Sensei..."
33180-46 = "[s] \"Hifumi...\""
33180-47 = "Sensei, a Azusa-chan..."
33180-48 = "......"
33180-49 = "......"
33180-50 = "A Azusa-chan está lutando sozinha... ela ainda está lutando sozinha..."
33180-51 = "[s] \"...Sim.\""
33180-52 = "Ela disse que pertencemos a mundos diferentes... e então, eu não entendi mais nada..."
33180-53 = "Uma coisa tão terrível aconteceu... o que uma aluna normal como eu poderia fazer..."
33180-54 = "Como eu posso... afinal, eu..."
33180-55 = "......"
33180-56 = "Mesmo assim, não podemos abandoná-la, né!?"
33180-57 = "Koharu-chan..."
33180-58 = "A que mundo a gente pertence não importa! E-Eu sei bem...! Que ficar sozinha e ser deixada pra trás é muito triste! Por isso, não posso deixar a Azusa sozinha...!"
33180-59 = "......Sim. Estar sozinho é algo muito solitário."
33180-60 = "[s] \"Até agora, foi a Hifumi quem nos guiou.\""
33180-61 = "......?"
33180-62 = "[s1] \"O esforço de todos foi importante, é claro, mas a Hifumi se esforçou tanto até aqui.\"\n[s2] \"Mesmo sendo uma garota normal, você nunca desistiu dos nossos objetivos.\""
33180-63 = "Eu me esforcei, sim. Mas nos bastidores, você lidou com um monte de coisas chatas e fez de tudo como líder do clube... eu sei muito bem que foi graças a você que eu consegui me esforçar."
33180-64 = "Eu me esforcei, sim. Mas nos bastidores, você lidou com um monte de coisas chatas e fez de tudo como líder do clube... eu sei muito bem que foi graças a você que eu consegui me esforçar."
33180-65 = "Isso mesmo. Se a Hifumi-chan não tivesse continuado sem desistir, eu não estaria aqui agora."
33180-66 = "Koharu-chan, Hanako-chan..."
33180-67 = "[s3] \"Por isso, vai ficar tudo bem. E quando você não souber o que fazer, eu estou aqui também.\"\n[s4] \"Mesmo que não consigamos agora. Vamos pensar, conversar e resolver juntos.\""
33180-68 = "......"
33180-69 = "......"
33180-70 = "......Sim, muito obrigada."
33180-71 = "Eu também aprendi a lição. Não vou desistir, não vou ficar de braços cruzados para sempre."
33180-72 = "Vou fazer o que estiver ao meu alcance...!"
33180-73 = "......Vou ajudar a Azusa-chan."
33180-74 = "[s5] \"...Essa é a Hifumi que conhecemos.\"\n[s6] \"Eu vou ajudar a Hifumi, assim como ela tem me ajudado.\""
33180-77 = "Então, vamos todas juntas."
33180-78 = "S-Sim! Temos que ajudar nossa amiga...!"
33180-79 = "Desta vez, quando eu encontrar a Azusa-chan..."
33180-83 = "......Temos que falar o que precisa ser dito, né?"
33180-84 = "......Sim."
33180-85 = "Eu preciso dizer a ela com clareza."
33180-86 = "Dizer que não podemos estar no mesmo mundo, eu..."
33180-87 = "Hifumi...?"
33180-91 = "[ns] \"Mesmo entre amigos, se você não falar, eles não vão entender.\""
33180-92 = "......Sim! Desta vez, eu direi a ela claramente...!"
33180-93 = "É isso aí. Eu também vou estar bem ao seu lado."
33180-94 = "Err... de qualquer jeito, a gente vai, né? Então anda, vamos rápido!"
33180-97 = "Reunindo todas, conversando... e então nos conectando e nos entendendo."
33180-98 = "Aos poucos, as alunas da Trinity e de Gehenna..."
33180-99 = "Agora, a Sociedade dos Santos Justina, movida pelo ódio de Arius, avança em direção a Trinity e Gehenna."
33180-100 = "Procurando ajuda e ajudando umas às outras..."
33180-101 = "Assim, aos poucos, elas tentam se aproximar umas das outras."
33180-106 = "Enquanto isso, a Azusa, que tenta enfrentar sozinha o Esquadrão Arius..."
33180-107 = "O Tabernáculo."
33180-108 = "Esse lugar, agora em ruínas, que carregava o nome do paraíso."
33180-109 = "Azusa, Esquadrão Arius. E o Sensei também segue para lá..."
33180-111 = "......"
33180-112 = "......"
33180-113 = "Azusa..."
33180-117 = "......"
33180-118 = "Como pôde, como pôde fazer isso com a Princesa...! Eu nunca vou perdoar você...!"
33180-119 = "Eu vou parar a Saori. Mesmo que isso custe a minha vida."
33180-120 = "Acha que consegue fazer isso!!"
33180-122 = "Acha mesmo que pode suportar a nossa raiva, o nosso ódio e o nosso ressentimento!!"
33180-123 = "......Eu vou me tornar uma assassina."
33180-131 = "Azusaaah!!"
33180-132 = "......Mesmo que eu nunca mais possa voltar para aquele mundo."
33180-134 = "Próximo Episódio; Nossa História"