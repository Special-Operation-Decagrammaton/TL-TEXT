[translation]
33180-1 = "Episódio 18;Sem Hesitar"
33180-2 = "……."
33180-3 = "[s] Olha na direção da Hasumi."
33180-4 = "……Sensei."
33180-5 = "Aqui…… o que foi que……."
33180-6 = "[s] \"Hasumi, que bom…….\""
33180-7 = "……Sim. Foi por pouco, mas……."
33180-8 = "A Tsurugi, e as outras……."
33180-12 = "……."
33180-13 = "[s] Olha na direção da Tsurugi."
33180-14 = "……?"
33180-17 = "Gyaaaah!?"
33180-18 = "S-se-se-Sensei!? P-por que o senhor aqui……!?"
33180-19 = "Ah, Tsurugi! Peraí, você já consegue se mexer!? Como esperado da presidente do Comitê de Realização da Justiça!"
33180-22 = "……Que bom que o senhor está bem, Sensei."
33180-23 = "[s] \"Foi graças à Sena.\""
33180-24 = "Imagina. Foi meu primeiro tratamento num adulto, mas que bom que deu certo."
33180-25 = "Sensei……."
33180-26 = "Chinatsu, ainda não pode se mexer. Fica deitada; é ordem de veterana."
33180-27 = "Eu, agora, pertenço ao Comitê Disciplinar, mas……."
33180-28 = "Você pode voltar pro Departamento de Medicina de Emergência agora mesmo, viu? Dá pra tocar à vontade em cadáv…… quer dizer, em feridos de qualidade."
33180-29 = "Não, eu…… vou recusar respeitosamente."
33180-34 = "Sensei……."
33180-35 = "Ako, você ainda não pode se mexer, gh……!"
33180-36 = "[s] \"Ako, Iori, apesar dos ferimentos, que bom que vocês estão bem…….\""
33180-37 = "A presidente sumiu……."
33180-38 = "Não está na sala do comitê, e não conseguimos contato……."
33180-39 = "Sensei, a presidente……."
33180-40 = "[s] \"Sim, deixa comigo.\""
33180-41 = "……Sim. Contamos com o senhor."
33180-45 = "Sensei……."
33180-46 = "[s] \"Hifumi…….\""
33180-47 = "Sensei, a Azusa……."
33180-48 = "……."
33180-49 = "……."
33180-50 = "A Azusa está lutando sozinha…… ainda, sozinha, esse tempo todo……."
33180-51 = "[s] \"……Sim.\""
33180-52 = "\"Os nossos lugares são diferentes\", ela disse…… e eu fiquei sem entender nada……."
33180-53 = "Virou uma coisa tão grande…… e o que alguém comum como eu pode fazer……."
33180-54 = "Como é que eu, a Azusa…… porque eu……."
33180-55 = "……."
33180-56 = "Mesmo assim, não dá pra deixar ela sozinha, dá!?"
33180-57 = "Koharu……."
33180-58 = "Posição não interessa! E-eu sei……! Ficar sozinha, ser deixada pra trás; eu sei que isso é muito triste! Por isso, eu não posso deixar a Azusa sozinha……!"
33180-59 = "……Sim. Porque isso é solitário demais, né."
33180-60 = "[s] \"Até aqui, foi a Hifumi que puxou todo mundo.\""
33180-61 = "……?"
33180-62 = "[s1] \"O esforço de todas conta, claro; mas foi porque a Hifumi se dedicou até aqui.\"\n[s2] \"Porque, mesmo sendo comum, você não desistiu daquilo que vocês buscavam.\""
33180-63 = "Eu me esforcei. Mas eu sei direitinho que, por trás disso, foi você que carregou um monte de coisa chata, que fez de tudo como presidente…… e que foi graças a isso que eu consegui me esforçar."
33180-64 = "Eu me esforcei. Mas eu sei direitinho que, por trás disso, foi você que carregou um monte de coisa chata, que fez de tudo como presidente…… e que foi graças a isso que eu consegui me esforçar."
33180-65 = "Isso mesmo. Foi porque a Hifumi não desistiu que eu também posso estar aqui agora."
33180-66 = "Koharu, Hanako……."
33180-67 = "[s3] \"Por isso, tá tudo bem. Quando não souber o que fazer, eu também tô aqui.\"\n[s4] \"Mesmo que agora não dê. Vamos nos angustiar juntos, conversar, e resolver.\""
33180-68 = "……."
33180-69 = "……."
33180-70 = "……Sim, muito obrigada."
33180-71 = "Eu também aprendi direitinho. Não vou desistir, não vou me angustiar pra sempre."
33180-72 = "Eu vou fazer o que eu posso……!"
33180-73 = "……Vou salvar a Azusa."
33180-74 = "[s5] \"……A Hifumi sempre foi assim, né.\"\n[s6] \"Eu também vou te ajudar, do mesmo jeito.\""
33180-77 = "Então, vamos todos?"
33180-78 = "S-sim! Temos que salvar a nossa amiga……!"
33180-79 = "Encontrar a Azusa e, dessa vez sim……"
33180-83 = "……o que se quer dizer, tem que ser dito, né?"
33180-84 = "……Sim."
33180-85 = "Tenho que dizer direitinho."
33180-86 = "Essa história de não poder estar no mesmo mundo, eu……."
33180-87 = "Hifumi……?"
33180-91 = "[ns] \"Mesmo entre amigos, se não disser, não chega.\""
33180-92 = "……Sim! Dessa vez, eu vou dizer com todas as letras……!"
33180-93 = "Pois é. Eu também vou estar bem do lado."
33180-94 = "É que…… e-enfim, a gente vai, né? Então anda, rápido!"
33180-97 = "Reunir todos, conversar…… e, assim, conectar-se e compreender."
33180-98 = "Os alunos de Trinity e Gehenna, aos poucos……"
33180-99 = "Agora que o Conselho dos Santos de Justina, carregado do ódio de Arius, avança sobre Trinity e Gehenna."
33180-100 = "Pedindo ajuda a alguém, e uns aos outros……"
33180-101 = "e, assim, pouco a pouco, tentando se aproximar."
33180-106 = "Enquanto isso, a Azusa, tentando deter sozinha o Squad de Arius……"
33180-107 = "A catedral antiga."
33180-108 = "Rumo àquele lugar que, hasteando o nome do paraíso, hoje virou ruína."
33180-109 = "A Azusa, o Squad de Arius. E o Sensei, também, segue pra lá……"
33180-111 = "……."
33180-112 = "……."
33180-113 = "Azusa……."
33180-117 = "……."
33180-118 = "Como ousou, como ousou fazer aquilo com a Hime……! Jamais vou perdoar……!"
33180-119 = "Eu vou deter a Saori. Nem que seja levando-a comigo."
33180-120 = "E você acha que consegue!!"
33180-122 = "A nossa raiva, o nosso ódio, o nosso rancor! Acha mesmo que aguenta!!"
33180-123 = "……Eu vou virar uma assassina."
33180-131 = "Azusaa!!"
33180-132 = "……Mesmo que, com isso, eu nunca mais possa voltar àquele mundo."
33180-134 = "Próximo Episódio;A Nossa História"
