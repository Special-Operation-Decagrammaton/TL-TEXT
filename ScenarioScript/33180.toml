[translation]
33180-1 = "Episódio 18; Sem hesitar"
33180-2 = "……."
33180-3 = "[s] Olho na direção de Hasumi."
33180-4 = "……Sensei."
33180-5 = "O que é que... aconteceu aqui?"
33180-6 = "[s] \"Hasumi, que bom...\""
33180-7 = "……Sim. Foi por pouco, mas..."
33180-8 = "Tsurugi, e as outras..."
33180-12 = "……."
33180-13 = "[s] Olho na direção de Tsurugi."
33180-14 = "……?"
33180-17 = "Gyaaaaaa!?"
33180-18 = "Se, se, se, Sensei!? Po, por que você está aqui...!?"
33180-19 = "Ah, Tsurugi-san! Espere, você já consegue se mover!? Como esperado da presidente do Comitê de Justiça!"
33180-22 = "……Fico feliz que esteja a salvo, Sensei."
33180-23 = "[s] \"Foi graças à Sena.\""
33180-24 = "Não foi nada. Foi a primeira vez que tratei um adulto, mas fico feliz que tenha dado tudo certo."
33180-25 = "Sensei……."
33180-26 = "Chinatsu, não se mova ainda. Fique deitada, é uma ordem da sua superior."
33180-27 = "Eu pertenço ao Comitê Disciplinar agora, mas..."
33180-28 = "Você pode voltar para o Departamento de Medicina de Emergência a qualquer momento, sabe? Poderá tocar em cadáveres de qualidade... digo, em feridos, o quanto quiser."
33180-29 = "Não, eu não... agradeço, mas vou recusar educadamente."
33180-34 = "Sensei……."
33180-35 = "Ako-chan, não se mova ainda, guh...!"
33180-36 = "[s] \"Ako, Iori, fico feliz que estejam bem, apesar dos ferimentos...\""
33180-37 = "A presidente desapareceu..."
33180-38 = "Ela não está na sala do clube e não conseguimos contato..."
33180-39 = "Sensei, por favor, encontre a presidente..."
33180-40 = "[s] \"Sim, pode deixar comigo.\""
33180-41 = "……Sim. Conto com você."
33180-45 = "Sensei……."
33180-46 = "[s] \"Hifumi...\""
33180-47 = "Sensei, a Azusa-chan..."
33180-48 = "……."
33180-49 = "……."
33180-50 = "A Azusa-chan está lutando sozinha... ela ainda está lá, sozinha, todo esse tempo..."
33180-51 = "[s] \"……Sim.\""
33180-52 = "Ela disse que nossos lugares eram diferentes... e por causa disso, eu não entendi nada..."
33180-53 = "Tudo isso aconteceu... e agora, o que uma estudante comum como eu pode fazer..."
33180-54 = "Como eu posso ajudar a Azusa-chan... afinal, eu sou apenas..."
33180-55 = "……."
33180-56 = "Mesmo assim, não podemos simplesmente ignorar, certo!?"
33180-57 = "Koharu-chan……."
33180-58 = "Não importa qual é a nossa posição! E-eu sei...! Como é triste ficar sozinha ou ser deixada para trás! Por isso, não posso deixar a Azusa sozinha...!"
33180-59 = "……Sim. Esse tipo de coisa é muito solitário, não é?"
33180-60 = "[s] \"Até aqui, foi a Hifumi quem nos guiou.\""
33180-61 = "……?"
33180-62 = "[s1] \"Não só pelo esforço de todos, mas porque a Hifumi se esforçou muito até aqui.\"\n[s2] \"Mesmo sendo comum, você não desistiu do que almejava.\""
33180-63 = "Eu me esforcei. Mas, por trás disso, eu sei muito bem que você cuidou de muitas coisas problemáticas e fez tudo o que pôde como representante... e foi graças a isso que eu consegui me esforçar."
33180-64 = "Eu me esforcei. Mas, por trás disso, eu sei muito bem que você cuidou de muitas coisas problemáticas e fez tudo o que pôde como representante... e foi graças a isso que eu consegui me esforçar."
33180-65 = "É verdade. Foi porque a Hifumi-chan não desistiu de mim que eu pude estar aqui agora."
33180-66 = "Koharu-chan, Hanako-chan..."
33180-67 = "[s3] \"Por isso, está tudo bem. Quando você não souber o que fazer, eu estarei aqui.\"\n[s4] \"Mesmo que não consiga agora, vamos sofrer, conversar e resolver isso juntas.\""
33180-68 = "……"
33180-69 = "……"
33180-70 = "……Sim, muito obrigada."
33180-71 = "Eu também aprendi muito. Não vou desistir, e não vou ficar sofrendo para sempre."
33180-72 = "Eu vou fazer o que estiver ao meu alcance...!"
33180-73 = "……Vou ajudar a Azusa-chan."
33180-74 = "[s5] \"……A Hifumi sempre foi assim, não é?\"\n[s6] \"Eu também vou ajudar a Hifumi da mesma forma.\""
33180-77 = "Então, vamos todos juntos?"
33180-78 = "S-sim! Precisamos salvar nossa amiga...!"
33180-79 = "Vou encontrar a Azusa-chan e, desta vez..."
33180-83 = "……Precisamos dizer o que sentimos, não é?"
33180-84 = "……Sim."
33180-85 = "Tenho que dizer claramente."
33180-86 = "Dizer que não podemos estar no mesmo mundo, eu..."
33180-87 = "Hifumi...?"
33180-91 = "[ns] \"Mesmo sendo amigas, se não falarmos, não saberemos o que a outra sente.\""
33180-92 = "……Sim! Desta vez, vou dizer claramente...!"
33180-93 = "É verdade. Eu também estarei bem ao seu lado."
33180-94 = "Bem... e-enfim, vamos logo, não vamos? Então, vamos, depressa!"
33180-97 = "Reunir a todos, conversar... e então, conectar-se e compreender."
33180-98 = "As alunas de Trinity e Gehenna, gradualmente..."
33180-99 = "Agora que a Associação de Santas Justina, carregada com o ódio de Arius, está avançando sobre Trinity e Gehenna."
33180-100 = "Pedindo ajuda a alguém, buscando um ao outro..."
33180-101 = "E assim, pouco a pouco, tentando se aproximar."
33180-106 = "Em meio a isso, Azusa, que tenta deter o Esquadrão de Arius sozinha..."
33180-107 = "A Antiga Catedral."
33180-108 = "Para aquele lugar que, embora carregue o nome de paraíso, agora não passa de uma ruína."
33180-109 = "Azusa, o Esquadrão de Arius. E o Sensei também, todos seguem para lá..."
33180-111 = "……"
33180-112 = "……"
33180-113 = "Azusa..."
33180-117 = "……"
33180-118 = "Como ousa, como ousa fazer isso com a Princesa...! Eu nunca vou te perdoar...!"
33180-119 = "Eu vou deter a Saori. Mesmo que tenhamos que nos destruir mutuamente."
33180-120 = "Você acha mesmo que consegue fazer isso?!"
33180-122 = "Você acha que consegue suportar nossa raiva, nosso ódio e nosso ressentimento?!"
33180-123 = "……Eu vou me tornar uma assassina."
33180-131 = "Azusa!!"
33180-132 = "……Mesmo que eu não possa mais voltar para aquele mundo."
33180-134 = "Próximo episódio: Nossa História"
