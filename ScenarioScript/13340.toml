[translation]
13340-1 = "Episódio 34; Pedido de desculpas"
13340-3 = "……Sensei."
13340-4 = "[ns] \"……？\""
13340-5 = "Hiiin…… d-desculpe."
13340-6 = "Se eu não me preparar logo, a Hoshino-chan vai acabar ficando brava……."
13340-11 = "Yume-senpai, Sensei [USERNAME], venham logo!#nVamos caçar tesouros no oásis, não vamos!"
13340-12 = "Vou esperar vocês no portão da escola!"
13340-13 = "Se não vierem logo, vou sozinha, hein!?"
13340-17 = "Fufu…… parece tão divertido."
13340-18 = "Sinto que a Hoshino-chan mudou desde que o Sensei chegou.#nAh, claro, num bom sentido!"
13340-19 = "[s] \"……。\""
13340-20 = "……Sensei?"
13340-21 = "[s] \"Yume……。\""
13340-22 = "Por que está com uma cara tão triste? O que houve?"
13340-23 = "Teve algum pesadelo, talvez……?"
13340-24 = "[s] \"Desculpe, Yume.\""
13340-25 = "……？"
13340-26 = "[s] \"Desculpe…… eu sou um adulto, mas mesmo assim.\""
13340-27 = "……。"
13340-28 = "[ns] \"Se eu pudesse, eu…….\""
13340-30 = "[ns] \"Eu…….\""
13340-32 = "Sensei."
13340-33 = "Não sei o que aconteceu, mas……."
13340-34 = "Com certeza, a culpa não é sua, Sensei."
13340-35 = "Por isso, acho que não precisa se desculpar."
13340-36 = "[ns1] \"Eu não consigo voltar no tempo.\"\n[ns2] \"Não consigo fazer com que a morte nunca tenha acontecido.\""
13340-39 = "[ns] \"……Esse tipo de poder não existe.\""
13340-41 = "[ns] \"Porque eu sou apenas um humano comum.\""
13340-44 = "[ns3] \"Se houver uma criança sofrendo na minha frente…….\"\n[ns4] \"Estender a mão é o máximo que posso fazer.\""
13340-47 = "……Sensei."
13340-48 = "Acho que, por enquanto, isso já é o suficiente."
13340-49 = "Pequenos passos acumulados podem se tornar um grande milagre algum dia!"
13340-50 = "Ah, talvez eu leve uma bronca por falar de milagres tão facilmente……."
13340-51 = "Eu acredito…… não, eu quero acreditar."
13340-55 = "[ns] \"Não vou esquecer essas suas palavras, Yume.\""
13340-56 = "Hau, não foi com uma intenção tão profunda assim……."
13340-60 = "……Sensei, você vai ajudar uma criança que está sofrendo agora?"
13340-61 = "[s] \"Eu quero salvar as crianças que eu puder alcançar.\""
13340-62 = "Espero que consiga salvá-las!"
13340-63 = "[s] \"Eu vou conseguir salvá-las.\""
13340-73 = "[ns] \"É um prazer conhecer você, ou algo assim.\""
13340-74 = "Você é o Sensei [USERNAME]!?"
13340-75 = "P-por que você está aqui……!"
13340-76 = "[s] \"Finalmente nos encontramos, Habitante do Subsolo.\""
13340-77 = "O que você pretende fazer!?"
13340-78 = "O jogo deveria ter acabado com a minha vitória!#nO que um perdedor veio fazer aqui agora!?"
13340-79 = "[s] \"……Não.\""
13340-80 = "O quê!?"
13340-81 = "[s] \"Ainda não acabou.\""
13340-90 = "Coordenadas confirmadas.#nUsando o poder da \"Cor\" manifestada, iniciarei a sequência de transferência forçada."
13340-94 = "[ns] \"Shiroko! Pare a Shiroko――!\""
13340-101 = "……！"
13340-102 = "Você não deve mexer com algo assim."
13340-103 = "Po, por que você está aqui……!?"
13340-113 = "Sunaookami Shiroko, você é forte."
13340-114 = "Porque eu sou eu."
13340-115 = "Hmm…… por isso está tudo bem."
13340-119 = "[ns] \"Shiroko!\""
13340-120 = "Hmm."
13340-124 = "Você precisa de ajuda, não é?"
13340-125 = "Hoshi―― "
13340-127 = "――Se deixarmos a Hoshino-senpai sozinha, o mundo caminhará para a ruína."
13340-128 = "Si, sim……."
13340-129 = "Eu sei.#nAquilo começou em Abydos."
13340-137 = "Ela desviou……!?"
13340-141 = "……Eu não, sei."
13340-142 = "Para outras pessoas, esse sofrimento……."
13340-143 = "Não."
13340-144 = "Eu também sei muito bem."
13340-147 = "Vamos lutar, Hoshino-senpai."
13340-148 = "Você consegue vencer? "
13340-149 = "Hmm, eu sei como lutar."
13340-158 = "Porque já lutamos antes. Eu não vou perder."
13340-160 = "Próximo episódio: Terror VS Terror"
