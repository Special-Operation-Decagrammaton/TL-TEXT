[translation]
10015070-1 = "Episódio 7: O Grande Festival Esportivo para Todos"
10015070-7 = "Aqui é o Clube de Engenharia. #nConcluímos a remoção da bateria e das peças centrais do robô de torcida que parou."
10015070-8 = "Também soltamos todos os fios presos nas lagartas; depois de consertar um pouco o programa e os equipamentos, ele deve ficar utilizável novamente."
10015070-9 = "Aqui é o Veritas. Prendemos todos os responsáveis pelo incidente, mas..."
10015070-10 = "Parece que, por causa do \"Treinamento Especial\" do \"Clube de Treinamento\", as pernas de todo mundo ficaram bambas..."
10015070-11 = "...Se possível, gostaríamos que o Sensei viesse nos ajudar mais tarde."
10015070-15 = "[ns] \"O que aconteceu...?\""
10015070-16 = "Felizmente, não houve feridos graves e a situação se acalmou."
10015070-17 = "Embora parte dos equipamentos para o Grande Festival Esportivo tenha sido danificada..."
10015070-23 = "...Primeiro, vamos ouvir o que elas têm a dizer."
10015070-25 = "Droga, que frustração... pensar que falhamos..."
10015070-27 = "Mas nós, da \"Associação Anti-Festival\", não vamos desistir por causa disso!"
10015070-29 = "Isso mesmo! Mesmo depois que o Grande Festival Esportivo começar, vamos continuar atrapalhando!"
10015070-30 = "...O que vocês ganham fazendo isso?"
10015070-31 = "É verdade. Continuar com isso só vai trazer sofrimento para vocês!"
10015070-33 = "Como o festival está chegando, eu não queria usar métodos agressivos, mas..."
10015070-34 = "Se vocês insistirem em continuar ameaçando a segurança do Millennium, #nexiste a opção de mantê-las sob custódia enquanto o \"Festival Kourin\" estiver acontecendo..."
10015070-41 = "[ns] \"Espere um pouco, Chihiro.\""
10015070-43 = "...Você é o Sensei do Schale?"
10015070-44 = "O que foi... pretende dar um sermão?"
10015070-45 = "[s] \"Por que vocês são contra o Grande Festival Esportivo?\""
10015070-46 = "Ora, é óbvio..."
10015070-47 = "Porque esportes não são divertidos!"
10015070-49 = "Esportes... não são divertidos?"
10015070-50 = "É chocante ouvir que não é divertido se exercitar e suar de forma refrescante..."
10015070-52 = "Isso é fácil de dizer para alunas que são boas em esportes como vocês!"
10015070-53 = "Para alunas como nós, que não somos, a aula de educação física é como uma tortura!"
10015070-54 = "Fazer exercícios de qualquer jeito e virar motivo de piada..."
10015070-55 = "Nas partidas, se você comete o menor erro, todos te olham com desprezo..."
10015070-56 = "No fim, alunas com pouca coordenação motora como nós só ficam sob o sol, observando os outros chutarem a bola."
10015070-57 = "Se for para suar inutilmente, é muito mais proveitoso fazer outra coisa."
10015070-59 = "...De fato, as aulas de educação física costumam ser feitas em equipe, não é?"
10015070-60 = "Além disso, somos incentivadas a levar a sério para não nos machucarmos brincando... #nTalvez eu também tenha muitas lembranças ruins das aulas de educação física..."
10015070-62 = "Mesmo assim, atrapalhar os outros é um problema diferente."
10015070-63 = "Vocês sabem que este Grande Festival Esportivo é um evento realizado com o esforço de muitas pessoas, não sabem?"
10015070-64 = "Claro, eu sei que estamos sendo agressivas, mas..."
10015070-68 = "...Logo agora, o Festival Kourin sendo realizado no Millennium."
10015070-69 = "[s] \"O problema é o Grande Festival Esportivo ser no Millennium?\""
10015070-70 = "A Millennium Science School é uma escola com muitas alunas da área de exatas, então..."
10015070-71 = "Quase ninguém nos olhava estranho por não gostarmos de educação física, e nunca fomos excluídas por não sermos boas em esportes."
10015070-72 = "Mas se, com este Grande Festival Esportivo, mais alunas do Millennium se apaixonarem por esportes..."
10015070-73 = "Alunas com menos aptidão física como nós seremos marginalizadas #ne intimidadas só por não sermos boas em esportes."
10015070-74 = "Como na época do ensino fundamental, onde a maioria das alunas gostava de esportes..."
10015070-76 = "...Talvez tenha havido um mal-entendido."
10015070-77 = "O valor do esporte não está apenas em competir por vitórias ou derrotas."
10015070-78 = "Como cada pessoa cresceu em um ambiente diferente, é natural que as condições físicas sejam diferentes."
10015070-79 = "Na verdade, discriminar e intimidar os outros por essas diferenças físicas #né algo que vai contra o espírito esportivo!"
10015070-80 = "Mesmo assim, isso não significa que não haverá um ranking, certo?"
10015070-84 = "Com a nossa resistência física, é óbvio que ficaremos para trás no revezamento ou cairemos de forma ridícula na frente da bola..."
10015070-88 = "Você acha que alguém quer mostrar para tantas alunas, incluindo as de outras escolas, que ficou em último lugar?"
10015070-89 = "Não quero ser motivo de chacota por mais tempo..."
10015070-91 = "Isso é verdade, mas..."
10015070-96 = "[ns] \"Noah, será que ainda dá tempo de ajustar parte do programa da competição?\""
10015070-97 = "Não é impossível, mas..."
10015070-98 = "Que tipo de ajuste, exatamente?"
10015070-99 = "[s] \"Por exemplo...\""
10015070-105 = "……Entendo. Você quer adicionar variáveis, como obstáculos que não podem ser superados apenas com força física ou quebra-cabeças lógicos, no meio do revezamento?"
10015070-106 = "Sim, acho que não é uma má proposta."
10015070-107 = "Assim, alunos com menor capacidade física também poderão buscar uma virada e... #ncomo o resultado será imprevisível até o fim, o público também ficará satisfeito."
10015070-108 = "……Além disso, se pudermos mostrar as novas tecnologias do Millennium, não há motivo para ser contra."
10015070-114 = "Então, farei os ajustes no programa... pedirei os robôs necessários para os obstáculos com urgência e solicitarei a aprovação do comitê executivo quanto às mudanças."
10015070-120 = "A inscrição dos atletas será ajustada para que possa ser alterada de forma flexível, de acordo com a condição física e as preferências dos alunos no dia..."
10015070-121 = "E para que nenhum aluno sofra com atividades como esta após o fim da Grande Competição Esportiva, #nestabelecerei um departamento de consulta para que as opiniões possam ser enviadas a qualquer momento."
10015070-125 = "……O que acha dessa abordagem?"
10015070-126 = "B-bem, se você fizer isso, nós não temos do que reclamar, mas..."
10015070-127 = "Mas a cerimônia de abertura da Grande Competição Esportiva é amanhã, não é?"
10015070-128 = "Dá tempo de preparar tudo até lá?"
10015070-129 = "……Eu farei dar tempo."
10015070-130 = "Como mencionei antes, a \"Grande Competição Esportiva\" é um festival de todos, que todos os alunos de Kivotos criam enquanto se divertem juntos."
10015070-131 = "Por isso, se há alunos que se opõem ao festival, #nnão posso dizer que estou cumprindo adequadamente minha \"missão como secretária\"."
10015070-132 = "Além disso, aliviar o sofrimento dos alunos é..."
10015070-133 = "Um dever natural do \"Grêmio Estudantil\"."
10015070-154 = "……Vou ajudar com os preparativos da Grande Competição Esportiva a partir de agora."
10015070-155 = "Não, deixe-me ajudar!"
10015070-156 = "Se eu puder compensar, mesmo que um pouco, por ter atrapalhado até agora..."
10015070-157 = "Trabalho pesado ou qualquer outra coisa, eu vou me esforçar!"
10015070-159 = "Não seria melhor deixar o trabalho pesado para os robôs?"
10015070-160 = "Isso é especialidade do Clube de Engenharia! #nDeixe o conserto dos robôs quebrados com a gente!"
10015070-162 = "Para nós, não temos mais obrigação de ajudar, mas..."
10015070-163 = "Já que nossas alunas parecem estar interessadas em esportes, #nacho que vou colaborar um pouco mais."
10015070-164 = "Tomei energético demais e acabei perdendo o sono, de qualquer forma..."
10015070-165 = "Se for para criar macros ou algo do tipo, ajudarei no que for preciso."
10015070-166 = "Fufu, se vamos criar novos obstáculos, tem muita coisa para pintar, né?"
10015070-167 = "É a chance perfeita para explodir nossa alma artística!"
10015070-169 = "Então, é melhor trocarmos de roupa para algo mais confortável para consertar as coisas—"
10015070-170 = "Não, não precisa. #nNesta Grande Competição Esportiva, nosso papel já está definido como líderes de torcida."
10015070-172 = "Deixem os consertos com a Rai-chan e os robôs de suporte, #ne vamos dedicar todo o tempo restante para treinar a torcida!"
10015070-174 = "É isso mesmo! #nA maioria dos robôs do Millennium possui uma função de autorreparo integrada."
10015070-175 = "Se restaurarmos o programa de autorreparo danificado e ensinarmos o algoritmo de reparo aos robôs de suporte, a maioria das falhas será resolvida automaticamente!"
10015070-176 = "M-mas... não seria mais eficiente se deixássemos a torcida para os robôs e nós mesmos cuidássemos dos reparos...?"
10015070-177 = "Você é ingênua, Hibiki. #nA torcida é um luxo que não pode ser calculado pela eficiência, sabe?"
10015070-178 = "O valor de uma torcida feita diretamente por mãos humanas é insubstituível!"
10015070-179 = "M-mas esse traje também ficou malfeito por causa da pressa... #ne nós nem treinamos direito..."
10015070-180 = "Podemos começar a treinar agora."
10015070-181 = "E o que importa não é o traje nem a habilidade. #nÉ o quanto você torce de coração pelo outro."
10015070-182 = "É isso mesmo! Além disso, como eu disse antes, eu adorei esse traje de líder de torcida que a Hibiki fez!"
10015070-183 = "Vamos lá, então, vamos começar o treino de torcida juntas!"
10015070-184 = "Ugh... se eu soubesse que terminaria assim, #nnem teria feito esse traje de líder de torcida desde o início..."
10015070-192 = "Noah, onde isso será usado?"
10015070-193 = "Ah, é um terminal de modelo antigo."
10015070-194 = "Por favor, separe apenas as unidades de processamento e conecte-as à IA central que gerencia os equipamentos."
10015070-195 = "Não temos tempo suficiente para consertar ou encomendar novos núcleos de processamento... então, pretendo usar núcleos antigos para processamento paralelo e auxiliar nos cálculos. #nPor favor, faça os ajustes nos comandos."
10015070-196 = "Distribuir a carga já que o poder de processamento é insuficiente, acho que é uma decisão sensata."
10015070-198 = "V-vamos lá! Ganhe, ganhe...!"
10015070-199 = "Hibiki, seu corpo ainda está rígido! #nRelaxe mais e tenha confiança!"
10015070-200 = "Levante os braços mais alto! E grite acompanhando os movimentos!"
10015070-201 = "Sim, sim. Sinto que ficou muito melhor do que antes."
10015070-202 = "Com isso, não teremos problemas na competição de torcida de amanhã!"
10015070-204 = "……Senpai. #nFalando nisso, houve um alarme de intrusão estranho na ala leste, prédio dois, agora há pouco."
10015070-205 = "Hã? Mas as alunas do 'Conselho de Reflexão da Luz' não estão todas aqui?"
10015070-206 = "Então, o que poderia ser...?"
10015070-207 = "……Por precaução, ative o sistema de segurança e relate os movimentos. #nMe avise se houver algum problema."
10015070-216 = "Ora, Sensei. O senhor ainda está aqui?"
10015070-220 = "Já está tarde, deveria ir descansar..."
10015070-221 = "Se precisar, posso levá-lo ao dormitório usado pelo comitê executivo."
10015070-222 = "[s1] \"Obrigado, mas estou bem.\" \n[s2] \"As alunas estão se esforçando a noite toda, sinto-me inútil por não poder ajudar...\""
10015070-225 = "Não diga isso. #nO Sensei já tem sido de grande ajuda."
10015070-226 = "Amanhã temos uma agenda cheia, então por favor, vá descansar primeiro."
10015070-238 = "……É a primeira vez que passo a noite com todas vocês em um ambiente tão amigável."
10015070-239 = "Parece que não ficaremos entediados esta noite."
10015070-240 = "Além disso, parece que muitos convidados não convidados estão chegando..."
10015070-241 = "[s] \"Mas...\""
10015070-242 = "Se ainda estiver preocupado... #npoderia cuidar da Yuuka-chan enquanto ela dorme?"
10015070-243 = "O ar fica frio à noite, então estou um pouco preocupada que a Yuuka-chan pegue um resfriado."
10015070-244 = "E quando voltar, se ainda tiver tempo, então..."
10015070-250 = "Por favor, prepare um café bem forte para que todos acordem de uma vez."
