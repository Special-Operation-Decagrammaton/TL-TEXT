[translation]
10015070-1 = "第7話;みんなのための大運動会"
10015070-7 = "こちらエンジニア部。#n停車した応援ロボットの、バッテリーとコア部品の除去を完了。"
10015070-8 = "カタピラに挟まれたワイヤーも全部外したし、プログラムや装備を少し直したらまた使えるはずだよ。"
10015070-9 = "こちらヴェリタス。今回の事件の犯人を全員逮捕しましたが……"
10015070-10 = "「トレーニング部」の「特別トレーニング」で、みなさん足の力が抜けてしまったようで……"
10015070-11 = "……可能なら先生にも、後で助けにきていただきたく。"
10015070-15 = "[ns] \"何が起きてたの……？\""
10015070-16 = "なんとか大きな怪我人もなく、事件が落ち着いてよかったです。"
10015070-17 = "大運動会用の機材が、一部損傷はしたものの……"
10015070-23 = "……まずは、彼女たちの話を聞いてみましょうか。"
10015070-25 = "くっ、悔しい……失敗するなんて……"
10015070-27 = "でも、私たち「晄・反・会」はこんな事で諦めないわよ！"
10015070-29 = "そうだ！大運動会が開かれた後だって、何度も邪魔してやるんだから！"
10015070-30 = "……こんなことして、何の得があるの？"
10015070-31 = "そうだよ。こんな事続けたって苦しいだけだよ！"
10015070-33 = "お祭りを控えているから、荒っぽい手段は使いたくなかったけど……"
10015070-34 = "どうしてもミレニアムのセキュリティを脅かし続ける気なら、#n「[ruby=こうりんたいさい]晄輪大祭[/ruby]」が開かれている間はおとなしくしてもらう、っていう手も……"
10015070-41 = "[ns] \"ちょっと待って、チヒロ。\""
10015070-43 = "……あなたはシャーレの先生？"
10015070-44 = "なによ……説教でもするつもり？"
10015070-45 = "[s] \"君たちは、どうして大運動会に反対しているの？\""
10015070-46 = "そりゃあ当然……"
10015070-47 = "運動なんか楽しくないから！"
10015070-49 = "運動が……楽しくないんですか？"
10015070-50 = "身体を動かして爽やかに汗をかく事が楽しくないなんて……衝撃です。"
10015070-52 = "あんた達みたいに運動ができる生徒ならそうでしょ！"
10015070-53 = "私たちみたいにそうじゃない生徒にとって、体育の時間は拷問と同じなのよ！"
10015070-54 = "中途半端な体操をして、笑いものになったり……"
10015070-55 = "試合なんか、ちょっとでもミスすると周りから冷たい視線を向けられるし……"
10015070-56 = "結局、私たちみたいに運動神経が鈍い生徒は、日差しの下で他人がボールを蹴るのを見守るだけ。"
10015070-57 = "そんな無意味に汗をかくくらいなら、他の事をした方が有意義ってものよ。"
10015070-59 = "……たしかに、体育の授業はチームを組んでやることが多いですからね。"
10015070-60 = "それに、ふざけて怪我をしないようにって、真剣にやるよう促されるし……。#n私も体育の授業はよくない記憶が多いかも……"
10015070-62 = "だからといって、他人の邪魔するのは別の問題だよ。"
10015070-63 = "この大運動会が、たくさんの人の努力で実現したお祭りだって事くらい、#n君たちも知ってるでしょう？"
10015070-64 = "もちろん強引だとは分かってるけど……"
10015070-68 = "……よりによって、ミレニアムで晄輪大祭が開かれるなんて。"
10015070-69 = "[s] \"ミレニアムで大運動会が開かれるのが問題なの？\""
10015070-70 = "ミレニアムサイエンススクールは、元々理系の生徒が多い学園だから……"
10015070-71 = "体育が嫌いだからといって変な目で見る生徒もほとんどいなかったし、運動ができないからといって仲間はずれにされることもなかったの。"
10015070-72 = "なのに、今回の大運動会で、ミレニアムでもスポーツの魅力にハマった生徒が増えてしまったら……"
10015070-73 = "私たちのように運動能力が劣る生徒は疎外され、#n運動ができないという理由でいじめられるわ。"
10015070-74 = "運動好きの生徒が多かった、中学の頃みたいにね……"
10015070-76 = "……何か誤解があったかもしれませんね。"
10015070-77 = "スポーツの価値は、単に勝敗を競うだけではありません。"
10015070-78 = "人によって育った環境が違うので、身体的条件が違うのは当然のこと。"
10015070-79 = "むしろその身体的違いで他人を差別していじめるのは、#nスポーツ精神に反することです！"
10015070-80 = "だからといって、順位がつかないわけじゃないでしょう？"
10015070-84 = "私たちの体力では、リレーで距離を離されたり、#nボールを前に滑稽な格好で転ぶのが目に見えてるのに……"
10015070-88 = "他校を含めた沢山の生徒たちの前で、最下位になる姿を見せたがる人がいると思う？"
10015070-89 = "これ以上笑いものにされるのは嫌……"
10015070-91 = "それは、そうですが……"
10015070-96 = "[ns] \"ノア、今からでも競技プログラムの一部を調整できるかな？\""
10015070-97 = "不可能ではありませんが……"
10015070-98 = "一体、どのような調整を？"
10015070-99 = "[s] \"例えば……。\""
10015070-105 = "……なるほど。リレーの途中に、体力だけでは克服できない障害物やロジックパズルのような変数を追加するのですね？"
10015070-106 = "うん、悪くない提案だと思う。"
10015070-107 = "そうすれば、身体能力が低い生徒も逆転を狙えるだろうし……#n勝敗の行方も最後まで読めないから、観客も満足できるね。"
10015070-108 = "……それに加えて、ミレニアムの新技術も見せられるなら反対する理由がない。"
10015070-114 = "それではプログラムに調整を行い……障害物に必要なロボットを急いで発注し、変更された内容に関しては実行委員会側に了解を要請します。"
10015070-120 = "選手のエントリーは、生徒たちの当日のコンディションや好みに応じて流動的に変えられるよう調整し……"
10015070-121 = "大運動会が終わった後も、こういった活動で苦しむ生徒が出ないよう、#n相談部署を設置し、常時意見を届けられるようにします。"
10015070-125 = "……こういった形は、いかがでしょうか？"
10015070-126 = "そ、そうしてくれるなら、私たちも不満はないけど……"
10015070-127 = "でも、大運動会の開会式は明日でしょ？"
10015070-128 = "今から準備して間に合うの？"
10015070-129 = "……間に合わせてみせます。"
10015070-130 = "先ほど申し上げたように「大運動会」はキヴォトスの全生徒が一緒に楽しみながら作っていく、みんなのお祭り。"
10015070-131 = "だからこそ、お祭りに反対する生徒がいるのであれば、#nきちんと「書記としての任務」を遂行できているとは言えません。"
10015070-132 = "それに加えて生徒たちのために、苦しみを解消することは……"
10015070-133 = "[ruby=セミナー]「生徒会」[/ruby]の当然の責務ですから。"
10015070-154 = "……今からでも、大運動会の準備を手伝うよ。"
10015070-155 = "いや、手伝わせて！"
10015070-156 = "これまで邪魔してきたことを、少しでも挽回できるなら……"
10015070-157 = "力仕事でも何でも、頑張るから！"
10015070-159 = "力仕事はロボットに任せたほうがいいんじゃないかな？"
10015070-160 = "エンジニア部の十八番ですから！#n壊れたロボットの修理は私たちに任せてください！"
10015070-162 = "私たちとしては、これ以上手伝う義理は無いだろうけど……"
10015070-163 = "せっかくうちの子たちも運動に興味を示しているみたいだし、#nもう少しだけ、協力させてもらおうかな。"
10015070-164 = "エナジードリンクを飲みすぎて、眠れなかったところだし……"
10015070-165 = "マクロ作成などでしたら、いくらでもお手伝いします。"
10015070-166 = "ふふっ、新しい障害物を作るなら、塗装するものがいっぱいあるよね？"
10015070-167 = "芸術魂を爆発させる絶好のチャンスだね！"
10015070-169 = "それじゃあ私たちは一旦、修理するのに楽な服に着替えた方が――"
10015070-170 = "いや、その必要はないよ。#n今回の大運動会で、私たちの役割はすでに応援団に決まっているからね。"
10015070-172 = "修理は雷ちゃんと支援ロボットに任せて、#n残った時間は全力で応援練習に取り組むよ！"
10015070-174 = "そうですね！#nほとんどのミレニアム製ロボットには、自家修復機能が搭載されていますから。"
10015070-175 = "損傷した自家修復プログラムを復旧し、サポートロボットに修理アルゴリズムを学習させれば、ほとんどの故障は自動で処理してくれるはずです！"
10015070-176 = "で、でも……応援はロボットに任せて、私たちが修理に直接取り掛かった方が効率的なんじゃ……？"
10015070-177 = "甘いね、ヒビキ。#n応援は、効率では計算できない贅沢品だよ？"
10015070-178 = "人の手で直接伝える応援の価値は、何物にも代えがたい！"
10015070-179 = "で、でもこの格好も急いで作ったせいで粗いし……#n私たちは練習もまともにできてないのに……"
10015070-180 = "練習は今からやればいいのさ。"
10015070-181 = "そして、重要なのは格好でも実力でもない。#n相手をどれだけ心から応援するかだよ。"
10015070-182 = "そうですよ！それに、先ほども言いましたが、私はヒビキが作ってくれたこのチアリーダー服、かなりお気に入りです！"
10015070-183 = "さあ、それでは一緒に応援練習を始めましょう！"
10015070-184 = "うぅ……こうなるとわかっていたら、#n最初からチアリーダーの衣装なんか作らなかったのに……"
10015070-192 = "ノア、これはどこに使うのですか？"
10015070-193 = "あ、旧型の端末ですね。"
10015070-194 = "いずれも演算装置だけを分離して、装備を管理する中央AIに連結させてください。"
10015070-195 = "演算コアを修理したり新しく注文するには時間が足りなくて……旧型コアで並列処理して、演算を補助しようと思います。#nコマンドの調整はお願いいたしますね。"
10015070-196 = "演算力が足りない分は分散、適切な判断だと思います。"
10015070-198 = "が、がんばれ！勝て勝て……！"
10015070-199 = "ヒビキ、まだ体が固いです！#nもっと緊張をほぐして、自信を持って！"
10015070-200 = "もっと腕を高く上げて！動きに合わせて叫ぶのです！"
10015070-201 = "うんうん。さっきよりずっと良くなった気がするよ。"
10015070-202 = "これなら明日の応援合戦も問題ない！"
10015070-204 = "……先輩。#nそういえば、さっき西館第二棟の方に変な侵入警報があったけど。"
10015070-205 = "え？「晄・反・会」の生徒たちは、ここに居るのに？"
10015070-206 = "じゃあ、それって一体……？"
10015070-207 = "……取り急ぎ、セキュリティ警備システムを稼動させて、動向を報告して。#n問題が起きたら言ってね。"
10015070-216 = "あら、先生。まだここにいらっしゃったのですか？"
10015070-220 = "夜も遅いですから、そろそろお休みにならないと……"
10015070-221 = "必要でしたら、実行委員が使う宿直室にご案内しますよ。"
10015070-222 = "[s1] \"ありがとう、でも大丈夫だよ。”\n[s2] \"生徒たちが一晩中頑張ってるのに、力になれないのが不甲斐なくて……。\""
10015070-225 = "そんな事ないですよ。#n先生はすでに十分、力になってくださっています。"
10015070-226 = "明日の日程もありますから、先に帰って休んでください。"
10015070-238 = "……こんな風に、和気藹々とした雰囲気の中で皆さんと夜を明かすのは初めてです。"
10015070-239 = "今夜は退屈しなさそうですね。"
10015070-240 = "それに、招待していないお客様が大勢お越しになっているみたいですから……"
10015070-241 = "[s] \"でも……。\""
10015070-242 = "それでも気になるのでしたら……#n寝ているユウカちゃんのお世話をしていただけませんか？"
10015070-243 = "夜は空気が冷えますから、ユウカちゃんが風邪でも引かないか少し心配です。"
10015070-244 = "そして帰って来た後、もし時間が余っていましたら、その時は……"
10015070-250 = "皆さんの目が一発で覚めるような、濃いコーヒーをお願いいたします。"
