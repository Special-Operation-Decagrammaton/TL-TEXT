[translation]
1014003-1 = "raposa sábia"

1014003-2 = "Placa de Petri/escritório"

1014003-3 = "(Enquanto eu estava limpando a placa de Petri, trabalhei com Kurumi...)"

1014003-11 = "Hmm... acho que isso é metade da batalha?"

1014003-12 = "...Está meio quente, provavelmente porque o sol está forte."

1014003-13 = "[s1] \"Vamos fazer uma pausa?\"\n[s2] \"Quer um pouco de suco?\""

1014003-16 = "Bom!"

1014003-20 = "[ns] \"...Onde você colocou isso?\""

1014003-21 = "O que está errado?"

1014003-22 = "[s3] \"Eu queria abrir a tampa da garrafa de suco...\"\n[s4] \"Não consegui encontrar o abridor de garrafas.""

1014003-25 = "Ah, então deixe comigo."

1014003-29 = "Você pode abrir isso com uma colher."

1014003-35 = "[ns] \"Uau! Como você fez isso?\""

1014003-36 = "Isso é um exagero."

1014003-37 = "Um abridor de garrafas abre usando o princípio de uma alavanca, certo? #nVocê pode usar qualquer coisa, desde que consiga encaixá-la na lacuna."

1014003-38 = "Quando estávamos treinando, não tínhamos abridor de garrafas, então muitas vezes abríamos garrafas assim."

1014003-39 = "[s5] \"Eu ouvi isso de outros membros, mas...\"\n[s6] \"Kurumi é muito flexível!\""

1014003-42 = "Tenho sentimentos confusos sobre ser elogiado por ser flexível apenas abrindo a tampa..."

1014003-43 = "Bem, como responsável pela SRT, acho que ele é perspicaz."

1014003-44 = "O trabalho do apontador é ficar na frente de todos os outros e enfrentar ataques surpresa e obstáculos inimigos."

1014003-45 = "Não acho que haja muitos momentos em que posso usar essa habilidade especial... mas se for para consertar ou desbloquear, por favor me avise a qualquer momento."

1014003-46 = "[s] \"Sério?\""

1014003-50 = "[ns7] \"Acabei de perder a chave de uma fechadura...\"\n[ns8] \"Você pode abrir isso?\""

1014003-53 = "Isso é bom. Mostre-me."

1014003-55 = "Esta... não é uma fechadura de pino. Posso abrir isso por 10 segundos."

1014003-56 = "Dobre um pouco a ponta do grampo e ajuste a altura do cilindro..."

1014003-60 = "Sim, acabou."

1014003-61 = "[s9] \"Isso é incrível...!\"\n[s10] \"Isso é o que você fez quando chegou à placa de Petri antes...?\""

1014003-63 = "um pouco! Vou falar sobre isso agora! ?"

1014003-64 = "Ah, estou me arrependendo daquela vez..."

1014003-65 = "Enfim, agora você já sabe, certo? #nMinha habilidade――"

1014003-66 = "[s] \"じゃあ、これも開けられる？\""

1014003-67 = "Ah, sim...?"

1014003-68 = "...Isso é uma fechadura eletrônica, certo?"

1014003-69 = "Preciso neutralizar a fechadura, mas já decidi onde adicionar o curto-circuito..."

1014003-73 = "Sim, está aberto."

1014003-76 = "Fones de ouvido com fio? O que posso fazer para me envolver tanto?"

1014003-77 = "Suspiro... Basta colocar um fio no meio e virar para o outro lado."

1014003-81 = "Olha... assim."

1014003-82 = "[s11] \"Uau, incrível!\"\n[s12] \"Então o que é isso?\""

1014003-85 = "isso é……."

1014003-86 = "Não é um “círculo de sabedoria”!"

1014003-87 = "você está brincando comigo"

1014003-88 = "[s13] \"Mas seu trabalho é enfrentar qualquer obstáculo...\"\n[s14] \"...Talvez você não seja bom no Círculo da Sabedoria?\""

1014003-91 = "Bem, isso não é verdade! me empreste!"

1014003-95 = "...O que é isso? Que tipo de estrutura?"

1014003-96 = "…………."

1014003-97 = "Além disso, espere um pouco mais! Vou resolver isso imediatamente!"

1014003-102 = "(Depois disso, passamos uma tarde divertida observando Kurumi lutando para resolver o círculo da sabedoria.)"

