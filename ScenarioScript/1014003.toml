[translation]
1014003-1 = "知恵のあるキツネ"
1014003-2 = "シャーレ・執務室"
1014003-3 = "（クルミと一緒に、シャーレの仕事を片付けていると……）"
1014003-11 = "うーん……これで半分は終わりかしら？"
1014003-12 = "……日差しが強いからか、なんか熱いわね。"
1014003-13 = "[s1] \"ちょっと一休みしようか？\"\n[s2] \"ジュースでも飲む？\""
1014003-16 = "いいわね！"
1014003-20 = "[ns] \"……あれ、どこに置いてたっけ？\""
1014003-21 = "どうかしたの？"
1014003-22 = "[s3] \"瓶ジュースのフタを開けようと思ったのに……。\"\n[s4] \"栓抜きが見つからなくて。\""
1014003-25 = "あら、それなら私に任せて。"
1014003-29 = "この程度、スプーンで開けれるわよ。"
1014003-35 = "[ns] \"すごい！どうやったの？\""
1014003-36 = "大袈裟ね。"
1014003-37 = "栓抜きは、てこの原理で開けてるでしょう？#n隙間に挟める長いものがあれば、なんでも代用できるわよ。"
1014003-38 = "訓練の時って、栓抜きを用意できないからよくこうやって開けてたのよ。"
1014003-39 = "[s5] \"他の隊員から聞いてはいたけど――\"\n[s6] \"クルミは本当に臨機応変だね！\""
1014003-42 = "フタを開けただけで臨機応変って褒められるのは、ちょっと複雑な気分だけど……。"
1014003-43 = "まあ、SRTのポイントマンとして、機転が利く方だとは思うわ。"
1014003-44 = "ポイントマンは誰より先頭に立って、敵の奇襲や障害物に立ち向かうのが仕事だもの。"
1014003-45 = "この特技を発揮できるタイミングは少ないと思うけど……修理や解錠くらいならいつでも言ってちょうだい。"
1014003-46 = "[s] \"ほんと？\""
1014003-50 = "[ns7] \"ちょうど鍵を失くしちゃった錠があるんだけど……。\"\n[ns8] \"これ、開けられる？\""
1014003-53 = "いいわよ。見せてみなさい。"
1014003-55 = "これは……ピンタンブラー錠じゃない。これなら10秒で開けられるわ。"
1014003-56 = "ヘアピンの先をちょっと曲げて、シリンダーの高さを合わせて……っと。"
1014003-60 = "はい、終わり。"
1014003-61 = "[s9] \"すごいね……！\"\n[s10] \"前にシャーレに来た時もこうやってたの……？\""
1014003-63 = "ちょっと！いまその話するつもり！？"
1014003-64 = "あ、あのときのことは……反省しているわよ……。"
1014003-65 = "とにかく、これで分かったでしょう？#n私の能力――"
1014003-66 = "[s] \"じゃあ、これも開けられる？\""
1014003-67 = "え、ええ……？"
1014003-68 = "……これは、電子錠でしょ？"
1014003-69 = "デッドボルトを無力化する必要があるけど、ショートを加える位置は決まっているから……。"
1014003-73 = "はい、開いたわよ。"
1014003-76 = "有線イヤホン？何すればこんなに絡むのよ？"
1014003-77 = "はぁ……間にワイヤーを入れて、反対側に回せばいいわ。"
1014003-81 = "ほら……こうやって。"
1014003-82 = "[s11] \"すごい、すごい！\"\n[s12] \"じゃあ、これは？\""
1014003-85 = "これは……。"
1014003-86 = "「知恵の輪」じゃない！"
1014003-87 = "私をからかってるの？"
1014003-88 = "[s13] \"でも、どんな障害にだって立ち向かうのが仕事だって……。\"\n[s14] \"……もしかして知恵の輪は苦手？\""
1014003-91 = "そ、そんなわけないじゃない！貸して！"
1014003-95 = "……な、なにこれ。どういう構造？"
1014003-96 = "…………。"
1014003-97 = "も、もうちょっと待って！すぐ解くから！"
1014003-102 = "（その後、知恵の輪を解こうと奮闘するクルミを見守りながら、楽しい午後を過ごした）"
