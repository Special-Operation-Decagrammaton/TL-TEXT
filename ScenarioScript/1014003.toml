[translation]
1014003-1 = "A Wise Fox"
1014003-2 = "Schale - Office"
1014003-3 = "(While finishing up Schale's work together with Kurumi...)"
1014003-11 = "Hmm... Is this about half of it done?"
1014003-12 = "...Maybe it's because the sunlight is strong, but it's kind of hot."
1014003-13 = "[s1] \"Shall we take a short break?\"\n[s2] \"Want to drink some juice?\""
1014003-16 = "Sounds good!"
1014003-20 = "[ns] \"...Huh, where did I put it?\""
1014003-21 = "Is something wrong?"
1014003-22 = "[s3] \"I wanted to open the bottle of juice, but...\"\n[s4] \"I can't find the bottle opener.\""
1014003-25 = "Oh, leave that to me then."
1014003-29 = "I can easily open this with a spoon."
1014003-35 = "[ns] \"Amazing! How did you do that?\""
1014003-36 = "You're exaggerating."
1014003-37 = "Bottle openers work on the principle of leverage, right?#nAs long as you have something long that can be wedged into the gap, anything #n can be used as a substitute."
1014003-38 = "During training, we often opened them like this because we didn't have bottle #nopeners."
1014003-39 = "[s5] \"I heard this from the other platoon members, but--\"\n[s6] \"You're really helpful, Kurumi!\""
1014003-42 = "Being praised for being helpful just for opening a lid gives me somewhat #nmixed feelings…"
1014003-43 = "Well, as SRT's pointman, I think I'm on the quick-witted side."
1014003-44 = "It's a pointman's job to stand at the very front and face enemy ambushes and #nobstacles after all."
1014003-45 = "I don't think there are many opportunities to show off this special skill... but if it's #njust repairs or unlocking something, just let me know anytime."
1014003-46 = "[s] \"Really?\""
1014003-50 = "[ns7] \"I actually have a lock that I lost the key to...\"\n[ns8] \"Can you open this?\""
1014003-53 = "Sure. Let me see it."
1014003-55 = "This is... a pin tumbler lock. I can open this in 10 seconds."
1014003-56 = "Just bend the tip of the hairpin a little, adjust it to the height of the cylinder... and #nthere."
1014003-60 = "There, done."
1014003-61 = "[s9] \"That's amazing...!\"\n[s10] \"Is this what you did when you came to Schale before...?\""
1014003-63 = "Wait a minute! Are you seriously bringing that up now!?"
1014003-64 = "I-I'm reflecting on... what happened back then..."
1014003-65 = "Anyway, now you understand, right?#nMy abilities--"
1014003-66 = "[s] \"Then, can you open this too?\""
1014003-67 = "E-Eh...?"
1014003-68 = "...This is an electronic lock, right?"
1014003-69 = "I need to disable the deadbolt, but the position to short it is fixed, so..."
1014003-73 = "There, it's open."
1014003-76 = "Wired earphones? What do you have to do to get them this tangled?"
1014003-77 = "Sigh... You just need to put a wire in between and turn it to the other side."
1014003-81 = "See... like this."
1014003-82 = "[s11] \"Amazing, amazing!\"\n[s12] \"Then, what about this?\""
1014003-85 = "This is..."
1014003-86 = "A 'Tanglement puzzle' isn't it!"
1014003-87 = "Are you making fun of me?"
1014003-88 = "[s13] \"But, you said your job is to face any kind of obstacle...\"\n[s14] \"...Could it be that you're bad at solving puzzles?\""
1014003-91 = "N-No way! Hand it over!"
1014003-95 = "...Wh-What is this? What kind of structure is this?"
1014003-96 = "......"
1014003-97 = "J-Just wait a little longer! I'll solve it soon!"
1014003-102 = "(After that, I spent a fun afternoon watching Kurumi struggle to solve the puzzle.)"