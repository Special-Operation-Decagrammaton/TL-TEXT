[translation]
1014003-1 = "The Wise Fox"
1014003-2 = "Schale - Office"
1014003-3 = "(I'm finishing up some work at Schale with Kurumi when...)"
1014003-11 = "Hmm... I wonder if this is halfway done?"
1014003-12 = "...Maybe it's because the sun is so bright, but it's getting kind of hot in here."
1014003-13 = "[s1] \"Should we take a quick break?\"\n[s2] \"Want something to drink?\""
1014003-16 = "That sounds good!"
1014003-20 = "[ns] \"...Wait, where did I put it?\""
1014003-21 = "Is something wrong?"
1014003-22 = "[s3] \"I was going to open this bottled juice...\"\n[s4] \"But I can't find the bottle opener.\""
1014003-25 = "Oh, leave that to me."
1014003-29 = "I can open this with a spoon, no problem."
1014003-35 = "[ns] \"Wow! How did you do that?\""
1014003-36 = "You're overreacting."
1014003-37 = "Bottle openers work on the principle of leverage, right?#nAs long as you have something long enough to wedge into the gap, you can use anything as a substitute."
1014003-38 = "We couldn't always carry bottle openers during training, so I often opened them like this."
1014003-39 = "[s5] \"I'd heard it from the other squad members, but--\"\n[s6] \"Kurumi, you really are resourceful!\""
1014003-42 = "It's a bit of a complicated feeling to be praised for being 'resourceful' just for opening a bottle cap..."
1014003-43 = "Well, as an SRT point man, I suppose I am pretty quick on my feet."
1014003-44 = "A point man's job is to stand at the very front and face enemy ambushes and obstacles head-on, after all."
1014003-45 = "I don't think there are many times I get to show off this particular skill, but... if you ever need something repaired or a lock picked, just let me know."
1014003-46 = "[s] \"Really?\""
1014003-50 = "[ns7] \"I actually have a lock here that I lost the key to...\"\n[ns8] \"Can you open this?\""
1014003-53 = "Sure. Let me see it."
1014003-55 = "This is... a pin tumbler lock, huh? I can open this in ten seconds."
1014003-56 = "Just bend the tip of a hairpin a little, align the cylinder height... and there."
1014003-60 = "There, all done."
1014003-61 = "[s9] \"That's amazing...!\"\n[s10] \"Did you do this back when you first came to Schale, too...?\""
1014003-63 = "Hey! Are you really bringing that up now!?"
1014003-64 = "I-I've already reflected on what happened back then..."
1014003-65 = "Anyway, you see now, don't you?#nMy capabilities—"
1014003-66 = "[s] \"Then, can you open this too?\""
1014003-67 = "E-eh...?"
1014003-68 = "...This is an electronic lock, isn't it?"
1014003-69 = "I'll need to neutralize the deadbolt, but since the contact points for a short are already determined..."
1014003-73 = "There, it's open."
1014003-76 = "Wired earphones? How do you even get them this tangled?"
1014003-77 = "Haa... just thread the wire through and loop it around the other side."
1014003-81 = "See... just like this."
1014003-82 = "[s11] \"Amazing, amazing!\"\n[s12] \"Then, how about this?\""
1014003-85 = "This is..."
1014003-86 = "Isn't this a metal puzzle?"
1014003-87 = "Are you teasing me?"
1014003-88 = "[s13] \"But you said your job is to face any obstacle...\"\n[s14] \"...Are you perhaps bad at metal puzzles?\""
1014003-91 = "T-that's not true at all! Give it here!"
1014003-95 = "...W-what is this? What kind of structure is this?"
1014003-96 = "............"
1014003-97 = "J-just wait a little longer! I'll solve it in a second!"
1014003-102 = "(Afterward, I spent a pleasant afternoon watching Kurumi struggle to solve the metal puzzle.)"