[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1014003-1 = "Uma Raposa Sábia" 
1014003-2 = "Schale - Escritório" 
1014003-3 = "（Enquanto eu terminava o trabalho da\nSchale com a Kurumi...）" 
1014003-11 = "Hmm...\nAcho que terminamos metade?" 
1014003-12 = "……Talvez por causa do sol forte,\nestá meio quente, não acha?" 
1014003-13 = "[s1] \"Quer fazer uma pausa?\"\n[s2] \"Quer tomar um suco?\"" 
1014003-16 = "Parece uma boa ideia!" 
1014003-20 = "[ns] \"……Ué, onde foi que eu deixei?\"" 
1014003-21 = "Aconteceu alguma coisa?" 
1014003-22 = "[s3] \"Eu queria abrir essa garrafa de suco, mas……\"\n[s4] \"Não consigo achar o abridor.\"" 
1014003-25 = "Ora, deixe isso comigo." 
1014003-29 = "Algo simples assim,\neu consigo abrir até com uma colher." 
1014003-35 = "[ns] \"Incrível!\nComo você fez isso?\"" 
1014003-36 = "Que exagero." 
1014003-37 = "Abridores de garrafa usam\no princípio da alavanca, não é?\nSe tiver qualquer coisa longa para encaixar na fresta,\nserve como substituto." 
1014003-38 = "Durante o treinamento, a gente não tinha abridores,\nentão abríamos assim o tempo todo." 
1014003-39 = "[s5] \"Eu já tinha ouvido as outras falarem, mas――\"\n[s6] \"Você é realmente engenhosa, Kurumi!\"" 
1014003-42 = "Ser elogiada como 'engenhosa' só por abrir uma garrafa\nme deixa com sentimentos um pouco mistos, mas……" 
1014003-43 = "Bem, como Pointman da SRT,\neu diria que sou bem ágil e flexível." 
1014003-44 = "Afinal, o trabalho de um Pointman é ficar na linha de frente\ne lidar com ataques surpresas e obstáculos antes de todos." 
1014003-45 = "Acho que não teremos muitas oportunidades de exibir essa habilidade, mas……\nSe precisar de ajuda com consertos ou para destrancar algo,\né só falar." 
1014003-46 = "[s] \"Sério?\"" 
1014003-50 = "[ns7] \"Tem um cadeado aqui que eu acabei perdendo a chave……\"\n[ns8] \"Você consegue abrir isso?\"" 
1014003-53 = "Claro.\nDeixe-me ver." 
1014003-55 = "Isso é…… um cadeado de pinos simples.\nEu abro isso em 10 segundos." 
1014003-56 = "É só dobrar um pouco a ponta de um grampo de cabelo,\nalinhar a altura do cilindro…… e pronto." 
1014003-60 = "Prontinho,\naberto." 
1014003-61 = "[s9] \"Que incrível……！\"\n[s10] \"Foi assim que você entrou na Schale da última vez……?\"" 
1014003-63 = "Ei!\nVocê vai mesmo jogar isso na minha cara agora?!" 
1014003-64 = "S-Sobre aquilo……\nEu já estou refletindo sobre as minhas ações, ok……" 
1014003-65 = "Enfim, agora você entendeu, não é?\nAs minhas habilidades――" 
1014003-66 = "[s] \"Então,\nvocê consegue abrir isso também?\"" 
1014003-67 = "E-Eh……？" 
1014003-68 = "……Isso é uma fechadura eletrônica, não é?" 
1014003-69 = "Eu vou precisar neutralizar o trinco, mas as posições\nonde dar um curto-circuito são padronizadas, então……" 
1014003-73 = "Aqui,\nabriu." 
1014003-76 = "Fones de ouvido com fio?\nO que você fez para embaraçar tanto assim?" 
1014003-77 = "Haa…… É só passar o fio por dentro\ne girar para o lado oposto." 
1014003-81 = "Vê……\nÉ assim que se faz." 
1014003-82 = "[s11] \"Incrível, incrível!\"\n[s12] \"E isso aqui?\"" 
1014003-85 = "Isso é……" 
1014003-86 = "Isso é um\nquebra-cabeça de metal!" 
1014003-87 = "Você está tirando\numa com a minha cara?" 
1014003-88 = "[s13] \"Mas você disse que o seu trabalho era lidar com qualquer obstáculo……\"\n[s14] \"……Por acaso quebra-cabeças não são o seu forte?\"" 
1014003-91 = "C-Claro que não é isso!\nMe dá isso aqui!" 
1014003-95 = "……M-Mas o que é isso.\nQue estrutura é essa?" 
1014003-96 = "…………" 
1014003-97 = "E-Espera só um pouco!\nEu já vou resolver!" 
1014003-102 = "（Depois disso, passei uma tarde divertida observando\na Kurumi lutando para resolver o quebra-cabeça.）" 