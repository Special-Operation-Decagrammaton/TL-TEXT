[translation]
10036110-1 = "Epílogo"
10036110-3 = "Ufa."
10036110-4 = "Fica bem vazio depois que desmontam o palco, não é?"
10036110-13 = "[ns] \"Bom dia, Saori.\""
10036110-15 = "Pessoal..."
10036110-16 = "A Sa-chan está passeando?"
10036110-17 = "Ah, sim... Eu estava refletindo sobre o dia de ontem."
10036110-18 = "Ainda não consigo acreditar que estive naquele palco."
10036110-19 = "...Espero que não tenha sido estranho."
10036110-20 = "[s1] \"Foi muito divertido!\"\n[s2] \"Fiquei até com dor muscular de tanto que me empolguei!\""
10036110-26 = "É, pois é... Foi exatamente como vimos na revista!"
10036110-27 = "Bem, não foi ruim."
10036110-28 = "Eu também me diverti. #nA Sa-chan tem esse tipo de talento, né."
10036110-30 = "Talento não é bem a palavra... Já que estamos aqui, vamos caminhar um pouco?"
10036110-36 = "Está tão silencioso... Parece até mentira que ontem estava tão agitado."
10036110-37 = "As instalações do festival foram removidas, dá uma certa tristeza."
10036110-38 = "É, verdade..."
10036110-42 = "..."
10036110-49 = "O som das ondas, a luz do sol ofuscante..."
10036110-50 = "Então é assim que é a praia quando não tem ninguém."
10036110-51 = "Valer a pena ter acordado cedo."
10036110-52 = "E então, líder, resolveu o que estava te preocupando?"
10036110-53 = "Do, do que você está falando?"
10036110-54 = "...Ah."
10036110-55 = "Quando você está preocupada com algo, costuma passear assim, não é?"
10036110-56 = "Eu sei disso muito bem."
10036110-57 = "E, entendo..."
10036110-58 = "Fufu. A Sa-chan ficando nervosa é tão fofa."
10036110-63 = "...Você ainda pretende continuar sua jornada?"
10036110-64 = "Em busca de si mesma?"
10036110-66 = "...Sim."
10036110-67 = "Mas... talvez seja um pouco diferente de antes."
10036110-68 = "Antes, eu me sentia como se estivesse correndo na escuridão..."
10036110-69 = "Mas sinto que vi um pequeno raio de luz."
10036110-70 = "Por isso, acho que vou continuar viajando por mais um tempo."
10036110-71 = "Sinto muito por todos vocês..."
10036110-75 = "Não precisa pedir desculpas agora."
10036110-76 = "Nós estamos torcendo por você, Sa-chan. #nNão se preocupe com a gente."
10036110-77 = "P, pelo menos mande notícias de vez em quando..."
10036110-83 = "...Obrigada, pessoal."
10036110-84 = "E você também, Sensei."
10036110-85 = "[s3] \"Eu também estou torcendo por você.\"\n[s4] \"Se precisar de algo, é só me chamar.\""
10036110-88 = "Obrigada..."
10036110-89 = "...Acho que é aqui que nos despedimos."
10036110-91 = "...Sim, podem ir na frente. #nDesta vez, eu que vou me despedir."
10036110-93 = "Tome cuidado, irmã Saori..."
10036110-99 = "...Só não se machuque."
10036110-105 = "Até mais, Sa-chan."
10036110-114 = "..."
10036110-115 = "[s] \"Saori, anime-se.\""
10036110-116 = "Aquelas crianças já foram?"
10036110-117 = "[s] \"...Hm?\""
10036110-118 = "Eu escondi isso na frente de todos, mas..."
10036110-119 = "...Na verdade, eu não recebi o pagamento pelo trabalho."
10036110-120 = "[s] \"Eh...?\""
10036110-121 = "A Gangue do Capacete... eles realmente não podem ser subestimados. #nNão é à toa que expandiram sua influência por Kivotos até este ponto."
10036110-122 = "O Sensei disse uma vez: #nSe você continuar trabalhando, acabará se envolvendo em vários problemas."
10036110-123 = "Eu costumava fechar os olhos para problemas triviais, mas..."
10036110-124 = "O não pagamento do salário é algo que não posso perdoar!"
10036110-125 = "Por isso, tenho um pedido a lhe fazer..."
10036110-126 = "[s] \"Pode deixar comigo, Saori!\""
10036110-127 = "Agradeço, Sensei."
10036110-132 = "Então, vamos iniciar a perseguição à Gangue do Capacete!"
10036110-134 = "(O verão de Saori ainda está longe de acabar!)"
10036110-135 = "Sheside outside"
