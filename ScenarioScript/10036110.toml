[translation]
10036110-1 = "エピローグ"
10036110-3 = "ふぅ。"
10036110-4 = "ステージが撤去されると、ずいぶん寂しくなったな。"
10036110-13 = "[ns] \"おはよう、サオリ。\""
10036110-15 = "みんな……。"
10036110-16 = "サッちゃんは散歩中？"
10036110-17 = "あ、ああ……昨日のことを振り返っていたところだ。"
10036110-18 = "ステージに立っていたことが、いまだに信じられなくてな。"
10036110-19 = "……おかしくなかったのなら良いんだが。"
10036110-20 = "[s1] \"すごく楽しかったよ！\"\n[s2] \"はしゃぎすぎて筋肉痛になったくらい！\""
10036110-26 = "そ、そうですよ……雑誌で見た通りのイベントでした！"
10036110-27 = "まぁ、悪くなかったよ。"
10036110-28 = "私も楽しかった。#nサッちゃんには、あんな才能があったんだね。"
10036110-30 = "さ、才能というわけでは……せっかくだ、少し歩こうか。"
10036110-36 = "静かだね……昨日の盛り上がりが嘘みたい。"
10036110-37 = "お祭りの施設も撤去されて、少し寂しいね。"
10036110-38 = "そう、ですね……。"
10036110-42 = "……。"
10036110-49 = "波の音に、眩しい陽射し……。"
10036110-50 = "誰もいない海って、こんな感じだったんだ。"
10036110-51 = "早起きした甲斐があったね。"
10036110-52 = "それでリーダー、悩みは解決した？"
10036110-53 = "な、何のことだ？"
10036110-54 = "……はぁ。"
10036110-55 = "何かに悩んでる時は、よくこうやって散歩してたでしょ。"
10036110-56 = "それくらい、知ってるから。"
10036110-57 = "そ、そうか……。"
10036110-58 = "ふふっ。慌ててるサッちゃんも、可愛いね。"
10036110-63 = "……まだ旅を続けるつもり？"
10036110-64 = "自分探し、ですか？"
10036110-66 = "……そうだ。"
10036110-67 = "でも……今までとは少し、違うかもしれない。"
10036110-68 = "前は暗闇の中を走っているような気分だったが……。"
10036110-69 = "ほんの僅かに光が見えた気がする。"
10036110-70 = "だから、もうしばらく旅を続けてみようと思う。"
10036110-71 = "みんなには、申し訳ないと思っている……。"
10036110-75 = "今さら謝る必要なんてないでしょ。"
10036110-76 = "サッちゃんのこと、応援してるから。#n私たちのことは心配しないで。"
10036110-77 = "た、たまには連絡してくださいね……。"
10036110-83 = "……ありがとう、みんな。"
10036110-84 = "それと、先生も。"
10036110-85 = "[s3] \"私も応援してるよ。\"\n[s4] \"何かあったら、いつでも呼んで。\""
10036110-88 = "ありがとう……。"
10036110-89 = "……ここでお別れ、かな。"
10036110-91 = "……あぁ、先に行ってくれ。#n今度は私が見送ろう。"
10036110-93 = "気をつけてくださいね、サオリ姉さん……。"
10036110-99 = "……怪我だけはしないで。"
10036110-105 = "またね、サッちゃん。"
10036110-114 = "……。"
10036110-115 = "[s] \"サオリ、元気出して。\""
10036110-116 = "あの子たちは、もう行ったか？"
10036110-117 = "[s] \"……ん？\""
10036110-118 = "みんなの前では伏せていたが……。"
10036110-119 = "……実は、バイト代をもらっていないんだ。"
10036110-120 = "[s] \"え……？\""
10036110-121 = "ヘルメット団……やはり侮れないな。#nここまでキヴォトスで勢力を伸ばしただけはある。"
10036110-122 = "以前、先生は言っていた。#n仕事を続けていれば、色々なトラブルに巻き込まれる、と。"
10036110-123 = "些細な問題であれば目をつぶってやっていたが……。"
10036110-124 = "給料の未払いだけは、許してはならない！"
10036110-125 = "そこで頼みがあるんだが……。"
10036110-126 = "[s] \"任せて、サオリ！\""
10036110-127 = "感謝する、先生。"
10036110-132 = "では、ヘルメット団の追撃を開始する！"
10036110-134 = "（サオリの夏は、まだまだ続く！）"
10036110-135 = "Sheside outside"
