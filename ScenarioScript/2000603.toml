[translation]
2000603-1 = "O dia de folga da gênia"
2000603-2 = "Fiquei preocupado com a mensagem da Saya, então a segui em segredo."
2000603-4 = "Shanhaijing - Associação Xuanwu"
2000603-5 = "Ugh, por que ninguém acredita em mim!?"
2000603-6 = "Eu disse várias vezes que é um cheesecake normal, sem nenhum tipo de produto químico...!"
2000603-7 = "...Mas não tem problema! Se eu levar o Nezuke, com certeza não haverá problemas!"
2000603-8 = "N-Nezuke?"
2000603-9 = "Chu...?"
2000603-10 = "Muito bem, então vamos nessa!"
2000603-14 = "[ns] Seguir a Saya."
2000603-16 = "Associação Xuanwu - Confeitaria"
2000603-18 = "Bem-vindo, cliente. Para quantas pessoas?"
2000603-19 = "Apenas para mim!"
2000603-20 = "Porque eu sou uma gênia solitária... não, espere,"
2000603-22 = "Hoje eu sou uma gourmet solitária!"
2000603-25 = "Ah, é mesmo...? Bem, vou levá-lo até a sua mesa."
2000603-27 = "O que deseja pedir?"
2000603-28 = "Este \"Cheesecake de Gorgonzola Especial para Casais\"!"
2000603-29 = "Bem... sinto muito, cliente. Esse item é exclusivo para casais, então não é possível pedir sendo apenas uma pessoa..."
2000603-30 = "O quê? Você acha que eu não vou conseguir terminar e vou deixar sobrar?"
2000603-31 = "Não se preocupe. Pode não parecer, mas sou uma comilona que nunca deixou sobrar nada em nenhum prato."
2000603-32 = "Já cheguei a comer uma caixa inteira de queijo sozinha!"
2000603-33 = "Não, não é isso... é que as regras são essas, sinto muito."
2000603-34 = "Tsc, que estabelecimento rígido..."
2000603-35 = "Mas eu não sou descuidada. Prevendo que isso pudesse acontecer, eu trouxe um companheiro!"
2000603-36 = "Saia logo, Nezuke!"
2000603-37 = "Chu-chu."
2000603-38 = "Este é o Nezuke, meu parceiro de experimentos!"
2000603-39 = "Agora que não estou sozinha, posso pedir esse prato, certo?"
2000603-40 = "Bem, hum, não sei se podemos considerar um animal de estimação como um acompanhante..."
2000603-41 = "O Nezuke não é um animal de estimação, ele é da minha família!"
2000603-42 = "[s1] \"Ah, desculpe...\"\n[s2] \"Eu estou acompanhando ela.\""
2000603-43 = "Ah, peço perdão."
2000603-44 = "Ah, peço perdão."
2000603-45 = "P-por que o Sensei está aqui...?"
2000603-46 = "[s] \"Um daquele bolo que você mencionou, por favor.\""
2000603-47 = "Sim, compreendido. Por favor, aguarde um momento."
2000603-49 = "Que susto... O Sensei também veio por acaso?"
2000603-50 = "[s] \"Fiquei preocupado com a Saya e acabei te seguindo.\""
2000603-52 = "Preocupado com o quê... você diz por causa daquela MomoTalk?"
2000603-53 = "Hum, eu teria dado um jeito sozinha mesmo..."
2000603-54 = "Mas foi uma ajuda, graças a você consegui fazer o pedido."
2000603-55 = "Os funcionários daqui são muito sérios, estava difícil convencê-los."
2000603-56 = "[s3] \"Se tivesse pedido para o pessoal do Clube de Pesquisa de Alquimia, eles não teriam vindo com você?\"\n[s4] \"Saya, para fazer amigos, primeiro você precisa...\""
2000603-57 = "Eu pedi, sim! E duas vezes!"
2000603-58 = "Q-que falta de educação! Eu também tenho amigos, sabia!?"
2000603-59 = "Mas não sei por que, toda vez que convido alguém para comer, todos dizem que \"surgiu um compromisso urgente\" e fogem..."
2000603-60 = "Mesmo sendo eu, não é como se eu estivesse comendo pratos misturados com remédios estranhos todos os dias."
2000603-61 = "Por que será que desconfiam tanto de mim?"
2000603-62 = "[s] \"Talvez seja por causa das suas atitudes diárias...\""
2000603-63 = "I-Isso não é verdade, é!?"
2000603-64 = "Para começar, eu nunca forcei ninguém a tomar remédio nenhum na vida!"
2000603-65 = "B-bem, para fins experimentais, eu já menti algumas vezes para fazer alguém tomar um remédio, mas..."
2000603-66 = "D-de qualquer forma! Mesmo que ninguém queira passar o feriado comigo, eu estou perfeitamente bem!"
2000603-67 = "O Nezuke está sempre comigo, afinal..."
2000603-68 = "Dizem que o feriado de um gênio é, por natureza, solitário. U-hahahaha!"
2000603-69 = "[s] \"Será que é melhor eu ir embora?\""
2000603-70 = "E-espere! Mas fique aqui até o bolo chegar!!"
2000603-73 = "Desculpe a demora. Aqui está o seu pedido: o \"Bolo de Queijo Azul Especial para Casais\"."
2000603-74 = "Chegou!"
2000603-75 = "Fu-fufufu. Um bolo que usa um queijo azul inteiro assim, só se encontra aqui..."
2000603-76 = "Eu queria experimentar isso há muito tempo."
2000603-81 = "Hmm~♪ É realmente delicioso~♪"
2000603-82 = "[s] \"Sei lá, tanto a cor quanto o cheiro, é que...\""
2000603-84 = "Isso não está estragado, de jeito nenhum! O verdadeiro valor deste queijo maturado só pode ser compreendido provando-o!!"
2000603-85 = "Vamos, confie em mim e dê uma mordida."
2000603-88 = "[s5] \"...Ah, é gostoso.\"\n[s6] \"O sabor é intenso, é bom.\""
2000603-89 = "Viu só? Um queijo verdadeiramente maturado não se aprecia com os olhos, mas com a língua."
2000603-90 = "Viu só? Um queijo verdadeiramente maturado não se aprecia com os olhos, mas com a língua."
2000603-91 = "Eu sabia que o Sensei entenderia esse sabor."
2000603-92 = "Hehe. Eu já comi algo parecido antes, mas talvez seja porque não estou sozinha hoje, este cheesecake parece ainda mais saboroso♪"
2000603-93 = "[s] \"Você não disse agorinha que estava tudo bem ficar sozinha?\""
2000603-94 = "Guh, isso é verdade, mas...!"
2000603-95 = "Bem... de vez em quando, com alguém além do Nezuke, é... sim..."
2000603-96 = "Passar o feriado com alguém não é nada mal."
2000603-98 = "Depois de terminar o cheesecake, passei o resto do feriado me divertindo com Saya."
