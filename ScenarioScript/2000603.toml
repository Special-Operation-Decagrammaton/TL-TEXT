[translation]
2000603-1 = "天才の休日"
2000603-2 = "サヤのメッセージが気になって、こっそり後をつけてみた。"
2000603-4 = "山海経・玄武商会"
2000603-5 = "ううっ、どうしてみんな信じてくれないのだ！？"
2000603-6 = "薬品とか入ってない、普通のチーズケーキだと何度も言っているのに……！"
2000603-7 = "……でも大丈夫！ネズ助を連れて行けば、きっと問題ないのだ！"
2000603-8 = "な、ネズ助？"
2000603-9 = "チュウ……？"
2000603-10 = "よし、では行くとしよう！"
2000603-14 = "[ns] サヤの後を追いかける。"
2000603-16 = "玄武商会・ケーキ屋さん"
2000603-18 = "いらっしゃいませ、お客様。何名様でしょうか？"
2000603-19 = "ぼく様だけだ！"
2000603-20 = "なぜならぼく様は孤独な天才……いや、"
2000603-22 = "今日は孤独な美食家だからな！"
2000603-25 = "さ、左様ですか……えっと、お席の方にご案内いたしますね。"
2000603-27 = "ご注文はいかがなさいますか？"
2000603-28 = "この「カップル専用特大ブルーチーズケーキ」で！"
2000603-29 = "えっと……申し訳ございません、お客様。そのメニューはカップル専用のメニューでして、おひとりではご注文ができず……。"
2000603-30 = "なに、ぼく様が食べきれず残しそう、ということか？"
2000603-31 = "心配するな。こう見えてぼく様は、どんな料理でも残したことがないくらいの大食いなのだ。"
2000603-32 = "チーズを一箱、丸ごと食べきったこともあるぞ！"
2000603-33 = "いえ、そうではないのですが……そういうルールになっておりまして、申し訳ございません。"
2000603-34 = "ちっ、固いお店なのだ……。"
2000603-35 = "だが抜かりはない。こんなこともあろうかと、今回は仲間がいるのだ！"
2000603-36 = "さあ出ておいで、ネズ助！"
2000603-37 = "チュウチュウ。"
2000603-38 = "ぼく様の実験パートナーである、ネズ助だ！"
2000603-39 = "これでぼく様だけじゃないから、このメニューを注文できるな？"
2000603-40 = "えっと、その、ペットをお連れ様と考えて良いものなのか……。"
2000603-41 = "ネズ助はペットではなく、ぼく様の家族なのだ！"
2000603-42 = "[s1] \"えっと、すみません……。\"\n[s2] \"この子の連れです。\""
2000603-43 = "あら、失礼いたしました。"
2000603-44 = "あら、失礼いたしました。"
2000603-45 = "ど、どうして先生がここに……？"
2000603-46 = "[s] \"先ほど言っていたケーキを一つ、お願いします。\""
2000603-47 = "はい、かしこまりました。少々お待ちくださいね。"
2000603-49 = "ビックリしたのだ……先生も偶然来てたのだ？"
2000603-50 = "[s] \"サヤが心配で、ついてきちゃった。\""
2000603-52 = "何を心配……って、あのモモトークか？"
2000603-53 = "むぅ、ぼく様だけでも何とかなったのに……。"
2000603-54 = "でも助かったのだ、おかげで注文ができた。"
2000603-55 = "ここの店員は真面目だから、渋られて困ってたのだ。"
2000603-56 = "[s3] \"錬丹術研究会の子たちに頼めば、一緒に来てくれたんじゃ？\"\n[s4] \"サヤ、まず友達を作るにはね……。\""
2000603-57 = "ちゃんと頼んだのだ！それも二回も！"
2000603-58 = "し、失礼な！ぼく様にだって友達くらいいるぞ！？"
2000603-59 = "でもどうしてか、ぼく様が食事に誘うとみんな「急な用事ができた」とか言って逃げてしまうのだ……。"
2000603-60 = "いくらぼく様だからって、毎日変な薬が混ざった料理を食べてるわけじゃないのに。"
2000603-61 = "どうしてこんなに疑われてるのだ？"
2000603-62 = "[s] \"多分、日ごろの行いのせいかなって……。\""
2000603-63 = "そ、そんなことは無いだろう！？"
2000603-64 = "そもそもぼく様は、誰かに強引に薬を飲ませたことなんて一度も無いぞ！？"
2000603-65 = "ま、まあ実験のために、嘘をついて薬を渡したことは何度かあるけど……。"
2000603-66 = "と、とにかく！誰も休日に付き合ってくれなくても、ぼく様は全然平気なのだ！"
2000603-67 = "ネズ助はいつも一緒にいてくれるし……。"
2000603-68 = "天才の休日は本来、孤独なものらしいからな。うーはっはっはっは！"
2000603-69 = "[s] \"もしかして私、帰った方が良い？\""
2000603-70 = "ま、待って！でも今はケーキが来るまではここにいて！！"
2000603-73 = "お待たせいたしました。ご注文の「カップル専用特大ブルーチーズケーキ」です。"
2000603-74 = "来たのだ！"
2000603-75 = "ふーっふっふっふ。ここまでブルーチーズを丸ごと使ったケーキは、ここでしか味わえない……"
2000603-76 = "前からずっと食べてみたかったのだ。"
2000603-81 = "ん～♪やっぱり美味しいのだ～♪"
2000603-82 = "[s] \"何だか色といい匂いといい、その……。\""
2000603-84 = "別にこれは腐ってるわけじゃないのだ！この熟成されたチーズの真価は、食べてみないと分からない！！"
2000603-85 = "ほら、ぼく様を信じて一口食べてみるのだ。"
2000603-88 = "[s5] \"……あ、美味しい。\"\n[s6] \"味が濃くて良い感じ。\""
2000603-89 = "だろう？真に熟成されたチーズは目ではなく、舌で味わうものなのだ。"
2000603-90 = "だろう？真に熟成されたチーズは目ではなく、舌で味わうものなのだ。"
2000603-91 = "先生ならきっと、この味が分かると思ってたのだ。"
2000603-92 = "ふふっ。前にも似たようなのは食べたけど、今日はひとりじゃないからか、今回のチーズケーキの方がもっと美味しく感じるのだ♪"
2000603-93 = "[s] \"さっきはひとりでも大丈夫って言ってなかった？\""
2000603-94 = "ぐっ、それはそうだけど……！"
2000603-95 = "まあ……たまには、ネズ助以外とも、うん……。"
2000603-96 = "誰かと一緒の休日も、悪くないのだ。"
2000603-98 = "そのチーズケーキを食べ終わった後も、サヤと一緒に楽しい休日を過ごした。"
