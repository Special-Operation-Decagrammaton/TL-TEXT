[translation]
1003202-1 = "先生のためにプレゼント"
1003202-5 = "シャーレの休憩室"
1003202-7 = "[ns] \"や、やっと終わった……。\""
1003202-8 = "（溜まりに溜まっていたシャーレの仕事をどうにか正常化させて、ふらつきながら休憩室を訪れた）"
1003202-9 = "[s] \"少しだけ……。\""
1003202-18 = "[ns] \"……もしかして、もう朝？\""
1003202-19 = "せーんせー、おっはよーっ！"
1003202-26 = "[ns] \"うわぁっ！？\""
1003202-29 = "もうとっくに朝だよー？"
1003202-30 = "いつまでお寝坊さんしてるつもり？"
1003202-31 = "[s] \"む、ムツキ……？\""
1003202-32 = "可愛い生徒から先生への、モーニングコールだよっ！"
1003202-33 = "先生、もしかしてほとんど徹夜？また？何だかいつも以上にちょっと可愛い顔してるよ、あはっ♪"
1003202-34 = "[s1] \"そ、そう……？\"\n[s2] \"ところでムツキ、その格好……。\""
1003202-35 = "あ、これ？うん、せっかくの新年だからねー。"
1003202-36 = "あ、これ？うん、せっかくの新年だからねー。"
1003202-37 = "あっ、先生大丈夫？もしかして仕事のし過ぎで、新年だってこと分からなくなってたりする？"
1003202-38 = "ほんと大変だねー、かわいそ～！"
1003202-39 = "でも問題無いよ、私に任せて！"
1003202-40 = "今日はそんな可哀想な先生のために、私が特別にプレゼントを用意してあげたから！"
1003202-45 = "[ns] \"それって、もしかして……？\""
1003202-46 = "うん、見ての通り！私が今日のために特別に用意した「ムツキちゃん特製のおせち」だよん！"
1003202-47 = "[s3] \"ムツキ特製の……！？\"\n[s4] \"ムツキが、私のために……？\""
1003202-48 = "うんっ。先生のために朝早くから気持ちを込めて、ね。"
1003202-49 = "うんっ。先生のために朝早くから気持ちを込めて、ね。"
1003202-50 = "ほらほら、感激して泣くなら今がベストタイミングだよ？"
1003202-51 = "くふふっ♪まだ泣かないんだったらほら、早く開けて開けて！"
1003202-52 = "[s5] \"じゃあ……。\"\n[s6] \"ありがたく……！\""
1003202-53 = "くふっ……♪"
1003202-54 = "くふっ……♪"
1003202-59 = "[ns] \"あの、ムツキさん……？これっておせちじゃなくて……\""
1003202-62 = "くくっ、あははははっ！残念～！！"
1003202-63 = "実は私が用意したのは「おせち」じゃなくて、「ムツキちゃん特製ビックリ時限爆弾」でした～！"
1003202-64 = "仕事三昧でまだ目もパッチリしてない先生のために、目を覚ましてもらおうと思って！新年早々、初ミッションだよ！"
1003202-65 = "[s] \"待って待って待って！？\""
1003202-66 = "さあ、ここで問題！時限爆弾を止められそうな線が2本！切るべきなのはどちらでしょう？"
1003202-67 = "まるで初日の出みたいに真っ赤に塗られた、赤い方？"
1003202-68 = "それとも今この瞬間、徹夜明けで青ざめた先生の顔色みたいな青い方？"
1003202-69 = "果たして答えは～……！？"
1003202-70 = "[s7] \"確率は2分の1……！\"\n[s8] \"前者はともかく、後者の例えはどうなの！？そんな顔色悪い！？\""
1003202-78 = "くふふっ、あと残り時間は20秒くらいかな～？"
1003202-79 = "ほらほら先生、もう時間が無いよ？"
1003202-80 = "[s] \"……っ！\""
1003202-84 = "[ns9] 赤い線を切る。\n[ns10] 青い線を切る。"
1003202-87 = "（悩んだ末、切る方を決めたその瞬間――）"
1003202-91 = "ぶっぶー！残念、タイムオーバー！"
1003202-92 = "（もくもくもく……）"
1003202-93 = "[s] \"……え？\""
1003202-94 = "くふっ、くふふっ……！"
1003202-95 = "あははっ！！今の先生の表情、最っ高！あははははっ！"
1003202-96 = "もう正に「意味が分からない」って顔に書いてある！くふっ、ご馳走様～！"
1003202-101 = "じゃーん！見て先生、これ実はタイマーだったの！"
1003202-102 = "[s] \"タイマー……？\""
1003202-103 = "うんっ！時間になったらその瞬間に発熱して、一瞬で中の食べ物を温めてくれるっていう「即席発熱タイマー」！この間ブラックマーケットで買ってきたの！"
1003202-104 = "最近出たオモチャで、結構人気だとかそうじゃないとか！ねっ、面白いでしょ？"
1003202-105 = "あっ、そうそう。だから中に食べ物を入れて使うんだけど、その下に……"
1003202-109 = "先生が楽しみにしていた「おせち」も、ちゃーんと入ってるよ！"
1003202-110 = "ま、中身は近くのお店で、てきとーに買ったやつだけど。"
1003202-111 = "[s] \"む、ムツキ……。\""
1003202-112 = "良いね良いね、先生のその表情！朝早く起きて準備した甲斐があったな～！"
1003202-113 = "じゃあ新年のプレゼントも渡せたことだし、今日はそろそろ帰るね。"
1003202-114 = "くふふっ！じゃあまた遊ぼうね、先生！"
1003202-120 = "（その後、ムツキがくれたおせちを頂いた）"
1003202-121 = "（あまりにも美味しくて涙が出た……）"
