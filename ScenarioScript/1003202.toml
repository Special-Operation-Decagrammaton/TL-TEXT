[translation]
1003202-1 = "Um presente para o Sensei"
1003202-5 = "Sala de descanso do Schale"
1003202-7 = "[ns] \"Fi-finalmente acabou...\""
1003202-8 = "(Consegui normalizar o trabalho acumulado no Schale e fui até a sala de descanso, cambaleando.)"
1003202-9 = "[s] \"Só um pouquinho...\""
1003202-18 = "[ns] \"...Espera, já é de manhã?\""
1003202-19 = "Sensei, bom diaaa!"
1003202-26 = "[ns] \"Uwaaa!?\""
1003202-29 = "Já é de manhã faz tempo, sabia?"
1003202-30 = "Até quando você pretende ficar dormindo?"
1003202-31 = "[s] \"Mu, Mutsuki...?\""
1003202-32 = "É o seu despertador matinal, vindo de uma aluna adorável!"
1003202-33 = "Sensei, será que você passou a noite em claro de novo? De novo? Você está com uma cara ainda mais fofa que o normal, ahaha♪"
1003202-34 = "[s1] \"Sé-sério...?\"\n[s2] \"Mas Mutsuki, esse seu traje...\""
1003202-35 = "Ah, isso? Sim, é Ano Novo, afinal."
1003202-36 = "Ah, isso? Sim, é Ano Novo, afinal."
1003202-37 = "Ah, Sensei, você está bem? Será que de tanto trabalhar você esqueceu que é Ano Novo?"
1003202-38 = "É realmente difícil, coitadinho!"
1003202-39 = "Mas não tem problema, pode deixar comigo!"
1003202-40 = "Hoje, para esse Sensei tão coitadinho, eu preparei um presente especial!"
1003202-45 = "[ns] \"Isso seria, por acaso...?\""
1003202-46 = "Sim, como você pode ver! É o \"Osechi especial da Mutsuki-chan\" que eu preparei especialmente para hoje!"
1003202-47 = "[s3] \"Osechi especial da Mutsuki...!?\"\n[s4] \"A Mutsuki fez isso... para mim...?\""
1003202-48 = "Sim. Coloquei todo o meu carinho desde cedo para o Sensei."
1003202-49 = "Sim. Coloquei todo o meu carinho desde cedo para o Sensei."
1003202-50 = "Vamos, vamos, se for chorar de emoção, a hora é agora, viu?"
1003202-51 = "Kufufu♪ Se não vai chorar ainda, então vamos, abra logo!"
1003202-52 = "[s5] \"Então...\"\n[s6] \"Vou aceitar com gratidão...!\""
1003202-53 = "Kufu...♪"
1003202-54 = "Kufu...♪"
1003202-59 = "[ns] \"Ei, Mutsuki...? Isso não é um Osechi...\""
1003202-62 = "Kuku, ahahahaha! Que pena~!!"
1003202-63 = "Na verdade, o que eu preparei não foi um \"Osechi\", mas sim uma \"Bomba-relógio surpresa especial da Mutsuki-chan\"!"
1003202-64 = "Como você passou a noite trabalhando e ainda está com cara de sono, pensei em te acordar! É a sua primeira missão logo no início do ano!"
1003202-65 = "[s] \"Espera, espera, espera!?\""
1003202-66 = "Agora, aqui vai uma pergunta! Tem dois fios que podem desarmar a bomba! Qual deles você deve cortar?"
1003202-67 = "O vermelho, pintado de um vermelho tão vivo quanto o primeiro nascer do sol do ano?"
1003202-68 = "Ou o azul, que combina com a cor do seu rosto agora, pálido de quem passou a noite em claro?"
1003202-69 = "Qual será a resposta...!?"
1003202-70 = "[s7] \"A chance é de 50%...!\"\n[s8] \"Tudo bem o primeiro, mas o que foi essa comparação com o segundo!? Eu estou com uma cara tão ruim assim!?\""
1003202-78 = "Kufufu, acho que restam uns 20 segundos, hein?"
1003202-79 = "Vamos, Sensei, o tempo está acabando!"
1003202-80 = "[s] \"...!!\""
1003202-84 = "[ns9] Cortar o fio vermelho.\n[ns10] Cortar o fio azul."
1003202-87 = "(Depois de hesitar, no momento em que decidi qual cortar――)"
1003202-91 = "Errado! Que pena, o tempo acabou!"
1003202-92 = "(Puff, puff, puff...)"
1003202-93 = "[s] \"...Eh?\""
1003202-94 = "Kufu, kufufu...!"
1003202-95 = "Ahaha!! A sua cara agora foi a melhor! Ahahahaha!"
1003202-96 = "Está escrito na sua cara que você não está entendendo nada! Hehe, bom proveito!"
1003202-101 = "Tcharam! Olha só, Sensei, na verdade isso era um timer!"
1003202-102 = "[s] \"Um timer...?\""
1003202-103 = "Isso! Quando o tempo acaba, ele esquenta na hora e aquece a comida lá dentro num instante. É um \"Timer de Aquecimento Instantâneo\"! Comprei no mercado negro outro dia!"
1003202-104 = "É um brinquedo que lançaram recentemente, dizem que está bem popular! Viu só, não é interessante?"
1003202-105 = "Ah, é verdade. Então, a gente usa colocando comida dentro, mas embaixo dela..."
1003202-109 = "O \"Osechi\" que você estava esperando também está aqui dentro!"
1003202-110 = "Bom, o conteúdo eu comprei de qualquer jeito numa loja ali perto."
1003202-111 = "[s] \"Mu, Mutsuki...\""
1003202-112 = "Isso, isso, adorei essa sua expressão, Sensei! Valeu a pena ter acordado cedo para preparar tudo!"
1003202-113 = "Bom, já que entreguei o presente de Ano Novo, vou indo embora."
1003202-114 = "Hehehe! Então vamos brincar de novo, Sensei!"
1003202-120 = "(Depois disso, comi o Osechi que a Mutsuki me deu)"
1003202-121 = "(Estava tão delicioso que até chorei...)"
