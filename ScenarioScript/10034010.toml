[translation]
10034010-1 = "第1話;バンドしよっ！！"
10034010-2 = "ちょっ！なんでもう食べてんの！？"
10034010-4 = "[ns1] \"えっ、私に出してくれたんじゃないの……？\"\n[ns2] \"ちゃんと聞いてから食べれば良かったよね、ごめん。\""
10034010-5 = "いや、それはそうなんだけど……！"
10034010-6 = "ま、まあ、説明してなかった私も悪いけどさ……。"
10034010-10 = "……ちなみに、さっき食べたやつの見た目とか味って覚えてる？"
10034010-11 = "一瞬で食べたから忘れちゃったぁ……？"
10034010-12 = "……じゃあ、また用意しないといけないってこと！？"
10034010-13 = "まあ落ち着きなって。"
10034010-14 = "先生だって悪気は無かったんだし、仕方ないじゃん。"
10034010-15 = "いや、それは分かってるけど……っ！"
10034010-16 = "あああもうっ！！！"
10034010-17 = "なんでこういう時だけ早いわけ！？#nちょっとは我慢しなさいよ！"
10034010-18 = "……そういえば理由、説明してなかったわね。"
10034010-19 = "ああもう、めんどくさい……。"
10034010-20 = "簡単に言うと……先生に採点してほしかったの。"
10034010-21 = "スイーツのレビュー、ってところかな？"
10034010-22 = "[s3] \"なるほど……？\"\n[s4] \"それは良いんだけど、私が？\""
10034010-25 = "うん、客観的な意見が欲しくてね。"
10034010-26 = "そう……来たる「スイーツカフェ」のために！"
10034010-27 = "[s] \"……スイーツカフェ？\""
10034010-28 = "トリニティの部活が、お互いの技量を競い合う熾烈なる宴……。"
10034010-29 = "「トリニティ[ruby=カーニバル]謝肉祭[/ruby]」で、出店することになってね。"
10034010-30 = "……まぁ、表現が仰々しいのはさておき。"
10034010-31 = "もうすぐ、学園祭の季節だからさ。"
10034010-32 = "そこで、放課後スイーツ部として何をしようかなって思ってたんだけど……。"
10034010-33 = "[s5] \"なるほど、そこで出すメニューを考えてたと。\"\n[s6] \"楽しそうだね。\""
10034010-37 = "そうそう、結構アリだと思わない？"
10034010-38 = "……え、決め方のルール？"
10034010-39 = "別に、うちの部活はそういうの無いし……。"
10034010-40 = "まぁ、部長も明確には決めてないからね。#nその場のノリ、みたいな？"
10034010-41 = "……ん？"
10034010-42 = "いや、そりゃ”創った”子はいるけどね？"
10034010-46 = "……ふふっ、気になる？"
10034010-47 = "さーて、どうしよっかな～？"
10034010-48 = "へぇ、面白そうな話になってるじゃん。"
10034010-49 = "じゃ、せっかくだしクイズにしよっか。"
10034010-50 = "先生は、誰だと思う？"
10034010-51 = "放課後スイーツ部を作った最初の一人、それは――"
10034010-57 = "[ns7] \"……ヨシミ？\"\n[ns8] \"……ナツ？\"\n[ns9] \"……カズサ？\""
10034010-58 = "やっぱりそう見える？#nたしかに、アイディアマンと言えば私だしね。"
10034010-59 = "実際意見はよく出してくれるもんね。#n逆に言うと、うるさいけど。"
10034010-60 = "うるさくないわよ！#nナツの方がよっぽどうるさいでしょ！？"
10034010-61 = "急に流れ弾が……。"
10034010-62 = "まぁ、それは一理あるかも。"
10034010-63 = "裏切るのか……！？"
10034010-69 = "いやいや、そんなわけないでしょ。"
10034010-70 = "ないない。"
10034010-71 = "まったく、これだからツンデレは。"
10034010-72 = "私ツンデレじゃなくない！？#nムカつくなぁっ！"
10034010-73 = "私もピキッた。#nカズサ、やるんだったら私も手を貸すよ？"
10034010-76 = "あはっ、あははははっ！#nいやいや、うちはスケバンじゃないから！"
10034010-77 = "……ねぇ、それ喧嘩売ってる？"
10034010-79 = "しかし我々は放課後スイーツ団！"
10034010-88 = "盾を構えてる時点で、あんたやる気だよねぇ！？"
10034010-89 = "私たちは暴力には屈しなーい！"
10034010-91 = "とりあえずこの話は置いといて！"
10034010-92 = "アイリが来るまでにスイーツの候補を絞るって話でしょ！#nさっきから何も進んでないじゃん！"
10034010-93 = "こんなとこアイリに見られたら……"
10034010-100 = "バンドしよっ！！！"
10034010-101 = "ほら、アイリも怒ってるじゃ……"
10034010-105 = "……え？"
10034010-107 = "みんな聞いて！"
10034010-108 = "私、思いついたの！"
10034010-109 = "……バンドをしよう！"
10034010-111 = "……バンド？"
10034010-117 = "[ns10] \"……いきなり、だね？\"\n[ns11] \"アイリ、何かあったの？\""
10034010-120 = "あれ、先生！？"
10034010-121 = "来てくれてたんですね！#nそうです、バンドです！"
10034010-122 = "いやアイリ、私たちも聞いてないんだけど……"
10034010-123 = "その……バンドって何！？"
10034010-129 = "ナツ、今の見た！？"
10034010-130 = "カズサがアイリにツッコむとか……"
10034010-131 = "珍しい光景だねぇ。"
10034010-133 = "だってせっかくの学園祭だし、みんなで変わったことしたくない？"
10034010-134 = "だから、バンドをやろう！"
10034010-135 = "それに……ただスイーツを提供するだけじゃ、物足りないかなって。"
10034010-137 = "え、えぇ……？"
10034010-138 = "お～アイリらしからぬ発言。"
10034010-139 = "分からなくはないけど、スイーツ部がそれで良いのかな……？"
10034010-141 = "と、とにかく、こうしてる場合じゃないよ！"
10034010-142 = "学園祭まで残り二週間しかないから！"
10034010-143 = "知ってるわよ！？#nだからこそ無理に決まってるでしょ！"
10034010-144 = "で、でも、やる前から諦めるのは良くないと思わない……？"
10034010-147 = "せ、正論だけどさぁ……？"
10034010-148 = "一度スイッチが入ったら、人は止まらないものだからね。"
10034010-149 = "これは、またどうしたものかな……。"
10034010-151 = "あ、あれ……？"
10034010-152 = "もしかして、微妙だった……？"
10034010-153 = "微妙って言うか、うーん……。"
10034010-154 = "まずは落ち着いて、一から話してくれる？"
10034010-160 = "[ns12] \"アイリは、どうしてバンドがしたいの？\"\n[ns13] \"何かきっかけがあったら、それを聞かせてもらえる？\""
10034010-163 = "は、はい……！"
10034010-164 = "そ、それは……。"
10034010-165 = "えっと、その……。"
10034010-169 = "な、なんとなく、そう思っただけで……。"
10034010-170 = "[s] ……。"
10034010-174 = "[ns] ……？"
10034010-175 = "……へ？"
10034010-180 = "いやいやいや！"
10034010-181 = "アイリ、いきなりどうしたの！？"
10034010-182 = "「なんとなく」なんて、ナツじゃあるまいし！"
10034010-183 = "どうしてそこで私の名前が……？"
10034010-184 = "バンドって何！？#n私たちは放課後スイーツ部でしょ！"
10034010-185 = "スイーツ部なんだから、せめてスイーツに関係が無いと！"
10034010-187 = "よ、ヨシミちゃん……。"
10034010-188 = "……まぁ、時に真実はつらいものだからねぇ。"
10034010-189 = "ナツちゃん……。"
10034010-190 = "……ちょ、ちょっと時間くれる？"
10034010-191 = "カズサちゃんまで……。"
10034010-195 = "[ns14] \"まだみんな飲み込めてないみたいだね。\"\n[ns15] \"アイリ、ひとまず落ち着こう。\""
10034010-198 = "……先生。"
10034010-202 = "じ、じゃあ……。"
10034010-203 = "…………。"
10034010-204 = "スイーツと関係してれば、良いんだよね？"
10034010-206 = "……え？"
10034010-207 = "まぁ、それは確かに……。"
10034010-208 = "ふむ……？"
10034010-210 = "見て、これ！#nその、偶然ここにあったんだけど……！"
10034010-211 = "「偶然」って、今明らかにアイリが取り出したじゃないの……。"
10034010-217 = "……これは？"
10034010-218 = "「学園祭オープニングライブ」の募集ポスター？#n別に、スイーツとは何の関係も――"
10034010-219 = "……いや。"
10034010-220 = "ここ、「賞品」の部分。"
10034010-221 = "賞品が何なのよ……。"
10034010-225 = "……え。"
10034010-227 = "……はっ？"
10034010-228 = "これはビックリ……！"
10034010-233 = "[ns16] \"……「フレデリカ・セムラ」？\"\n[ns17] \"有名なスイーツなの？\""
10034010-236 = "そうなんです、先生！#nこれは「フレデリカ・セムラ」と言って……"
10034010-237 = "……通称「セムラの女王」。"
10034010-238 = "とある女王が昔、あまりの美味しさから一気に14人分も食べて亡くなったという言い伝えが残っている、伝説のスイーツ。"
10034010-240 = "本物なの？#n何度かお店で見たけど、全部偽物だったじゃん。"
10034010-241 = "「トリニティ[ruby=カーニバル]謝肉祭[/ruby]」のようなティーパーティー主催のイベントで、#n偽物の商品が用意されるとは思えないねぇ。"
10034010-242 = "……じゃあ入選すれば、本物のセムラが食べられるってこと？"
10034010-243 = "確かに、それなら話は全然変わってくる……。"
10034010-244 = "そうとも、なにせ私たちは放課後スイーツ部……"
10034010-248 = "……スイーツのために生きる者たちの、集まりなのだから！"
10034010-250 = "……えへへ。"
10034010-251 = "みんな……。"
10034010-252 = "……どう、かな？"
10034010-253 = "……バンド、やってみない？"
10034010-260 = "[ns18] \"……あ、あれ？\"\n[ns19] \"みんな、いきなり真剣な顔に……！？\""
10034010-263 = "……先生。"
10034010-265 = "――やろう、バンド。"
