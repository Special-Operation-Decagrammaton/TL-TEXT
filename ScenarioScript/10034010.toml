[translation]
10034010-1 = "Episódio 1; Vamos formar uma banda!!"
10034010-2 = "Ei! Por que você já está comendo!?"
10034010-4 = "[ns1] \"Ué, não era para mim?\"\n[ns2] \"Deveria ter perguntado antes de comer, desculpa.\""
10034010-5 = "Não, eu sei, mas...!"
10034010-6 = "B-bem, a culpa também é minha por não ter explicado..."
10034010-10 = "…A propósito, você lembra da aparência ou do gosto do que acabou de comer?"
10034010-11 = "Você comeu tão rápido que esqueceu...?"
10034010-12 = "…Então isso significa que vou ter que preparar tudo de novo!?"
10034010-13 = "Calma, relaxa."
10034010-14 = "O Sensei não fez por mal, não tem como evitar."
10034010-15 = "Não, eu entendo isso, mas...!"
10034010-16 = "Ahhh, droga!!!"
10034010-17 = "Por que você é tão rápido só nessas horas!? #nTente se controlar um pouco!"
10034010-18 = "…Falando nisso, eu não expliquei o motivo, né."
10034010-19 = "Ai, que preguiça..."
10034010-20 = "Resumindo... eu queria que o Sensei desse uma nota."
10034010-21 = "Tipo uma avaliação de doces, sabe?"
10034010-22 = "[s3] \"Entendi...?\"\n[s4] \"Tudo bem, mas por que eu?\""
10034010-25 = "Sim, eu queria uma opinião imparcial."
10034010-26 = "É que... para o próximo \"Café de Doces\"!"
10034010-27 = "[s] \"…Café de Doces?\""
10034010-28 = "O banquete feroz onde os clubes da Trinity competem entre si..."
10034010-29 = "Vamos abrir uma barraca no \"Carnaval da Trinity\"."
10034010-30 = "…Bom, deixando de lado o nome exagerado."
10034010-31 = "Logo é a época do festival escolar, né."
10034010-32 = "Eu estava pensando no que o Clube de Doces Depois da Aula poderia fazer lá..."
10034010-33 = "[s5] \"Entendi, então você estava pensando no menu.\"\n[s6] \"Parece divertido.\""
10034010-37 = "Pois é, não acha que é uma boa ideia?"
10034010-38 = "…Ah, as regras de como decidimos?"
10034010-39 = "Nosso clube não tem nada disso..."
10034010-40 = "Bem, a presidente também não decidiu nada concreto. #nFoi mais no improviso, sabe?"
10034010-41 = "…Hm?"
10034010-42 = "Não, claro que teve quem \"criou\", mas..."
10034010-46 = "…Fufu, ficou curioso?"
10034010-47 = "Bom, o que eu faço agora~?"
10034010-48 = "Ei, parece que a conversa ficou interessante."
10034010-49 = "Já que estamos aqui, vamos fazer um quiz."
10034010-50 = "Sensei, quem você acha que foi?"
10034010-51 = "A primeira pessoa que fundou o Clube de Doces Depois da Aula, foi..."
10034010-57 = "[ns7] \"…Yoshimi?\"\n[ns8] \"…Natsu?\"\n[ns9] \"…Kazusa?\""
10034010-58 = "Você acha mesmo? #nÉ verdade que, se falar de alguém cheia de ideias, sou eu."
10034010-59 = "Na verdade, ela sempre dá opiniões. #nPor outro lado, é bem barulhenta."
10034010-60 = "Eu não sou barulhenta! #nA Natsu é muito mais, não é!?"
10034010-61 = "Do nada, uma bala perdida..."
10034010-62 = "Bem, talvez tenha um fundo de verdade."
10034010-63 = "Você vai me trair assim...!?"
10034010-69 = "Não, não, claro que não."
10034010-70 = "Nem ferrando."
10034010-71 = "Nossa, é por isso que ela é uma tsundere."
10034010-72 = "Eu não sou tsundere!? #nQue raiva!"
10034010-73 = "Eu também fiquei irritada. #n Kazusa, se você vai fazer isso, quer que eu te ajude?"
10034010-76 = "Ah, ahahahaha! #n Não, não, nós não somos delinquentes!"
10034010-77 = "……Ei, você está querendo briga?"
10034010-79 = "Mas nós somos o Clube de Doces do Depois da Aula!"
10034010-88 = "Você já está segurando um escudo, então você está pronta para lutar, não está!?"
10034010-89 = "Nós não nos curvaremos à violência!"
10034010-91 = "Deixem esse assunto de lado por enquanto!"
10034010-92 = "A questão é decidir quais doces vamos servir antes que a Airi chegue! #n Não saímos do lugar até agora!"
10034010-93 = "Se a Airi vir a gente assim……"
10034010-100 = "Vamos montar uma banda!!!"
10034010-101 = "Olha, a Airi também está brava……"
10034010-105 = "……Eh?"
10034010-107 = "Pessoal, escutem!"
10034010-108 = "Eu tive uma ideia!"
10034010-109 = "……Vamos montar uma banda!"
10034010-111 = "……Uma banda?"
10034010-117 = "[ns10] \"……Foi do nada, né?\"\n[ns11] \"Airi, aconteceu alguma coisa?\""
10034010-120 = "Ué, Sensei!?"
10034010-121 = "Você veio! #n Isso mesmo, uma banda!"
10034010-122 = "Não, Airi, nós nem estávamos sabendo disso……"
10034010-123 = "Tipo…… o que é uma banda!?"
10034010-129 = "Natsu, você viu isso!?"
10034010-130 = "A Kazusa dando uma patada na Airi……"
10034010-131 = "Uma cena rara, hein."
10034010-133 = "É que, já que é o festival escolar, não querem fazer algo diferente com todo mundo?"
10034010-134 = "Por isso, vamos montar uma banda!"
10034010-135 = "Além disso…… acho que só servir doces não é o suficiente."
10034010-137 = "E-eh……?"
10034010-138 = "Oh, uma declaração bem diferente da Airi."
10034010-139 = "Eu entendo o sentimento, mas será que é uma boa para o Clube de Doces……?"
10034010-141 = "De-de qualquer forma, não temos tempo para isso!"
10034010-142 = "Só faltam duas semanas para o festival escolar!"
10034010-143 = "Eu sei disso!? #n É exatamente por isso que é impossível!"
10034010-144 = "Ma-mas, você não acha que não é bom desistir antes mesmo de tentar……?"
10034010-147 = "É-é um argumento válido, mas……"
10034010-148 = "Quando alguém decide algo, não tem como parar."
10034010-149 = "Isso é um problema, como vamos resolver……"
10034010-151 = "A-ah……?"
10034010-152 = "Será que a ideia foi ruim……?"
10034010-153 = "Não diria ruim, é que, hum……"
10034010-154 = "Primeiro, vamos nos acalmar, pode explicar desde o começo?"
10034010-160 = "[ns12] \"Airi, por que você quer montar uma banda?\"\n[ns13] \"Se teve algum motivo, pode nos contar?\""
10034010-163 = "S-sim……!"
10034010-164 = "I-isso é……"
10034010-165 = "Bem, é que……"
10034010-169 = "S-só me deu vontade, do nada……"
10034010-170 = "[s] ……"
10034010-174 = "[ns] ……?"
10034010-175 = "……Hã?"
10034010-180 = "Não, não, não!"
10034010-181 = "Airi, o que deu em você de repente!?"
10034010-182 = "Dizer que é 'só porque sim', nem parece a Natsu!"
10034010-183 = "Por que meu nome entrou no meio disso...?"
10034010-184 = "Que história é essa de banda!? #nNós somos o Clube de Doces depois da aula!"
10034010-185 = "Já que somos o Clube de Doces, pelo menos tem que ter relação com doces!"
10034010-187 = "Yo, Yoshimi-chan..."
10034010-188 = "...Bem, às vezes a verdade é dolorosa, não é?"
10034010-189 = "Natsu-chan..."
10034010-190 = "...Po, pode me dar um tempo?"
10034010-191 = "Até a Kazusa-chan..."
10034010-195 = "[ns14] \"Parece que ninguém ainda conseguiu assimilar isso.\"\n[ns15] \"Airi, vamos nos acalmar por um instante.\""
10034010-198 = "...Sensei."
10034010-202 = "En, então..."
10034010-203 = "............"
10034010-204 = "Se tiver relação com doces, então está tudo bem, certo?"
10034010-206 = "...Eh?"
10034010-207 = "Bem, isso é verdade..."
10034010-208 = "Hmm...?"
10034010-210 = "Olhem, isto! #nBem, eu encontrei por acaso aqui, mas...!"
10034010-211 = "Dizer que foi 'por acaso', sendo que ficou óbvio que foi você quem tirou daí agora pouco..."
10034010-217 = "...Isto é?"
10034010-218 = "Um cartaz de inscrição para o 'Show de Abertura do Festival Escolar'? #nIsso não tem nada a ver com doces..."
10034010-219 = "...Não."
10034010-220 = "Aqui, na parte do 'Prêmio'."
10034010-221 = "O que tem o prêmio..."
10034010-225 = "...Eh."
10034010-227 = "...Hã?"
10034010-228 = "Isso é surpreendente...!"
10034010-233 = "[ns16] \"... 'Frederica Semla'?\"\n[ns17] \"É um doce famoso?\""
10034010-236 = "É sim, Sensei! #nIsso se chama 'Frederica Semla' e..."
10034010-237 = "...Conhecido como a 'Rainha dos Semlas'."
10034010-238 = "Diz a lenda que uma certa rainha, antigamente, comeu 14 porções de uma vez só de tão delicioso que era e acabou falecendo. É um doce lendário."
10034010-240 = "É de verdade? #nEu já vi algumas vezes nas lojas, mas eram todas falsas."
10034010-241 = "Em um evento organizado por uma festa do chá como o 'Carnaval da Trinity', não acho que ofereceriam um prêmio falso."
10034010-242 = "...Então, se ganharmos, poderemos comer o Semla de verdade?"
10034010-243 = "De fato, se for assim, a história muda completamente..."
10034010-244 = "Exatamente, afinal, nós somos o Clube de Doces depois da aula..."
10034010-248 = "...Um grupo de pessoas que vivem pelos doces!"
10034010-250 = "...Ehehe."
10034010-251 = "Pessoal..."
10034010-252 = "...O que acham?"
10034010-253 = "...Vamos tentar montar uma banda?"
10034010-260 = "[ns18] \"... A-ah?\"\n[ns19] \"Pessoal, por que ficaram sérias de repente...!?\""
10034010-263 = "...Sensei."
10034010-265 = "— Vamos fazer isso, vamos montar a banda."
