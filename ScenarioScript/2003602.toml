[translation]
2003602-1 = "最高の休暇"
2003602-2 = "（セリカに呼ばれ、リゾートにやって来た）"
2003602-3 = "お待たせ、先生！#nよし、それじゃさっそく……。"
2003602-4 = "……うっ。"
2003602-9 = "その、先生……悪いんだけど、手伝ってくれないかな？"
2003602-10 = "ちょっと一人じゃ持ちきれなくて……。"
2003602-11 = "[s1] \"もちろんだよ、手伝うね。\"\n[s2] \"こんなに何を持ってきたの？\""
2003602-14 = "大したものじゃないんだけどね。"
2003602-15 = "最高の休暇を送るためには必要かなって。#n食べ物や飲み物に、カメラ、サバイバルナイフ……"
2003602-16 = "あとはレジャーシートとかゴーグルとか……"
2003602-17 = "……冷静になってみたらすごい量ね。"
2003602-18 = "全部持っていく必要はなさそう、って？"
2003602-19 = "なに言ってるのよ！#n最高の休暇を送るためには、これでも足りないくらいなんだから！"
2003602-20 = "……違うって、何が？"
2003602-21 = "[s3] \"最高の休暇と完璧な休暇は違うよ。\"\n[s4] \"それで疲れちゃったら、本末転倒じゃないかな？\""
2003602-24 = "確かに言われてみれば……"
2003602-28 = "って、今日は自分なりにちゃんと考えてきたの！"
2003602-29 = "いったん私に任せて、先生！"
2003602-30 = "……え？"
2003602-31 = "こんなにあっけなく引かれると、調子狂うわね……。"
2003602-32 = "べ、別に先生と言い合いがしたいわけじゃないけど！"
2003602-33 = "ま、まあ先生も同意してくれたってことで。"
2003602-37 = "さ、行くわよ！#n「最高の休暇」を過ごしに！"
2003602-39 = "（こうしてセリカと最高の休暇を過ごすために、色々な場所を散策した）"
2003602-45 = "[ns5] \"……どう？\"\n[ns6] \"良い場所だね。\""
2003602-49 = "ん～……確かに良い場所だけど……。"
2003602-50 = "なんというか、ありきたりのような……。"
2003602-51 = "最高の休暇を過ごすには、ちょっと物足りないかも。"
2003602-55 = "[ns7] \"ここはどう？\"\n[ns8] \"少し雰囲気は違うと思うけど、どうかな？\""
2003602-58 = "うーん……。"
2003602-59 = "これ！って感じがしないのよね。#n海だからかな……？"
2003602-63 = "[ns9] \"ここも良い場所じゃない？\"\n[ns10] \"海から離れてみたけど、今度はどう？\""
2003602-66 = "ううん……。"
2003602-67 = "確かに全部良い場所なんだけど……#n何が気になってるんだろ。"
2003602-68 = "これじゃ、先生をただ連れ回してるだけだし……。"
2003602-72 = "……うぅ、どうしよう。"
2003602-74 = "（……結局、セリカが気に入る場所は見つからず、リゾートに戻ってきた）"
2003602-81 = "…………。"
2003602-82 = "えっと……その、先生。"
2003602-86 = "……ごめん。"
2003602-87 = "荷物を持たせた挙げ句、#n歩き回らせるだけになっちゃった。"
2003602-88 = "やっぱり、難しいわね。"
2003602-89 = "最高の休暇を過ごすのも……。"
2003602-90 = "……えっ？"
2003602-91 = "最高の休暇だった……？"
2003602-92 = "今日は一日中、#n私のせいで先生を当てもなく付き合わせちゃったのに……"
2003602-93 = "[s11] \"最高の休暇と完璧な休暇は違うからね。\"\n[s12] \"休暇だからって、無理に何かする必要はないよ。\""
2003602-96 = "……はぁ。#nまた慰められちゃったわね。"
2003602-97 = "……え？#n慰めてくれたわけじゃないの？"
2003602-98 = "本気で言ってるって……。"
2003602-99 = "[s13] \"おかげで楽しく過ごせたからね。\"\n[s14] \"こうやって、ゆっくりセリカと話せてるし。\""
2003602-102 = "……う～ん。"
2003602-103 = "先生がそう言うなら、良かったのかな……？"
2003602-104 = "確かに、海にも森にも行ったし、洞窟にも……。"
2003602-105 = "二人でお昼も食べて……。"
2003602-106 = "……そっか。"
2003602-107 = "うん……。"
2003602-108 = "……ふふっ。"
2003602-109 = "……私も、楽しかったわ。"
2003602-113 = "それじゃ、そろそろ帰りましょ！"
2003602-114 = "最高の休暇は帰るまで続くんだから！"
2003602-115 = "それと、今日だけで終わりだと思わないでよね？"
2003602-116 = "まだ満足してないし、明日も付き合ってもらうわ！"
2003602-117 = "約束よ？"
2003602-118 = "じ、じゃあ……またね！"
2003602-123 = "（すごい慌てようのセリカは、荷物を忘れていった……）"
