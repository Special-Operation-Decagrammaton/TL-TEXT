[translation]
2003602-1 = "As melhores férias"
2003602-2 = "（Chamado por Serika, você chegou ao resort）"
2003602-3 = "Demorou, Sensei!#nMuito bem, então vamos começar logo..."
2003602-4 = "......Ugh."
2003602-9 = "Ei, Sensei... desculpe, mas você poderia me ajudar?"
2003602-10 = "Eu não consigo carregar tudo isso sozinha..."
2003602-11 = "[s1] \"Claro, eu ajudo.\"\n[s2] \"O que você trouxe tanta coisa assim?\""
2003602-14 = "Não é nada demais, sabe."
2003602-15 = "Achei que fosse necessário para passar as melhores férias.#nComida, bebida, câmera, faca de sobrevivência..."
2003602-16 = "E também uma esteira de praia, óculos de proteção..."
2003602-17 = "......Parando para pensar, é uma quantidade absurda."
2003602-18 = "Você está dizendo que não parece necessário levar tudo?"
2003602-19 = "O que você está dizendo!#nPara passar as melhores férias, isso ainda é pouco!"
2003602-20 = "......Não é isso, o que foi?"
2003602-21 = "[s3] \"As melhores férias e as férias perfeitas são coisas diferentes.\"\n[s4] \"Se você ficar cansada com tudo isso, não vai acabar perdendo o sentido?\""
2003602-24 = "Pensando bem, é verdade..."
2003602-28 = "Mas hoje eu pensei direitinho no que fazer!"
2003602-29 = "Deixe comigo por enquanto, Sensei!"
2003602-30 = "......Hã?"
2003602-31 = "Ficar sem palavras tão rápido assim me deixa confusa..."
2003602-32 = "N-não que eu queira ficar discutindo com você, Sensei!"
2003602-33 = "B-bom, então vamos considerar que o Sensei concordou."
2003602-37 = "Vamos lá!#nPara passar as \"melhores férias\"!"
2003602-39 = "（Assim, você passeou por vários lugares com Serika para passar as melhores férias）"
2003602-45 = "[ns5] \"......O que achou?\"\n[ns6] \"É um bom lugar, né?\""
2003602-49 = "Hmm... é um bom lugar, com certeza, mas..."
2003602-50 = "Como posso dizer, parece meio comum..."
2003602-51 = "Para passar as melhores férias, talvez falte um pouco de algo."
2003602-55 = "[ns7] \"E aqui?\"\n[ns8] \"A atmosfera é um pouco diferente, o que acha?\""
2003602-58 = "Hmm..."
2003602-59 = "Não sinto que é \"isso\".#nSerá porque é na praia...?"
2003602-63 = "[ns9] \"Aqui também não é um bom lugar?\"\n[ns10] \"Saímos da praia, e agora, o que acha?\""
2003602-66 = "Não..."
2003602-67 = "Com certeza todos são bons lugares, mas...#no que será que estou pensando?"
2003602-68 = "Desse jeito, eu só estou te arrastando para todo lado, Sensei..."
2003602-72 = "......Ugh, o que eu faço?"
2003602-74 = "（......No fim, não encontramos um lugar que agradasse a Serika e voltamos ao resort）"
2003602-81 = "............"
2003602-82 = "Bem... é, Sensei."
2003602-86 = "......Desculpe."
2003602-87 = "Além de te fazer carregar a bagagem,#nte fiz andar para lá e para cá."
2003602-88 = "Realmente, é difícil, né."
2003602-89 = "Passar as melhores férias..."
2003602-90 = "......Hã?"
2003602-91 = "Foram as melhores férias...?"
2003602-92 = "Hoje o dia todo,#npor minha causa, você ficou me acompanhando sem rumo..."
2003602-93 = "[s11] \"As melhores férias e as férias perfeitas são coisas diferentes, afinal.\"\n[s12] \"Só porque são férias, não significa que você precise forçar algo.\""
2003602-96 = "......Ah.#nVocê me consolou de novo."
2003602-97 = "......Hã?#nVocê não estava tentando me consolar?"
2003602-98 = "Você está falando sério..."
2003602-99 = "[s13] \"Graças a isso, pude me divertir bastante.\"\n[s14] \"E agora, posso conversar com calma com a Serika.\""
2003602-102 = "……Hmm."
2003602-103 = "Se o Sensei diz isso, então acho que foi bom……?"
2003602-104 = "É verdade, fomos à praia, à floresta e até à caverna……"
2003602-105 = "Almoçamos juntos também……"
2003602-106 = "……Entendi."
2003602-107 = "Sim……"
2003602-108 = "……Hehe."
2003602-109 = "……Eu também me diverti."
2003602-113 = "Bem, então, vamos voltar logo!"
2003602-114 = "As férias perfeitas continuam até chegarmos em casa!"
2003602-115 = "E não pense que isso acaba só por hoje, viu?"
2003602-116 = "Eu ainda não estou satisfeita, então você vai ter que me acompanhar amanhã também!"
2003602-117 = "É uma promessa, entendeu?"
2003602-118 = "B-bem, então…… até mais!"
2003602-123 = "（Serika saiu tão apressada que acabou esquecendo a bagagem……）"
