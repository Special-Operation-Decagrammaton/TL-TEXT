84303400100-11 = "ええ。感情の制御は得意なの。"
84303400100-24 = "さて……。"
84303400100-25 = "……リオ？"
84303400100-26 = "……ふぅ。"
84303400100-27 = "ふぅ……はぁ……。"
84303400100-28 = "リオ、大丈夫かい？"
84303400100-29 = "ええ……おそらく。"
84303400100-30 = "操作は危険ね。解析を始めるわ。"
