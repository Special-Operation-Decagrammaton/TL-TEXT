[translation]
1300306-1 = "Causa do estresse"
1300306-2 = "Arredores de Trinity - Área Comercial"
1300306-3 = "Bom dia, Sensei."
1300306-4 = "Que coincidência nos encontrarmos de novo."
1300306-5 = "[s] \"Hasumi...? Aconteceu alguma coisa?\""
1300306-6 = "Eh? Não, não aconteceu nada em especial... Por que a pergunta?"
1300306-7 = "...É porque eu parecia estar brava?"
1300306-8 = "Ah... peço desculpas. Talvez seja porque tenho restringido os doces ultimamente..."
1300306-9 = "O estresse está..."
1300306-10 = "Além disso, ultimamente têm acontecido muitas coisas estressantes no Comitê de Justiça..."
1300306-11 = "Ultimamente, até dores de cabeça..."
1300306-12 = "..."
1300306-13 = "...Mas estou bem."
1300306-14 = "[s] \"Não parece nada bem.\""
1300306-15 = "S-sério...?"
1300306-16 = "Se eu acabei te preocupando... então essa dieta não tem sentido nenhum..."
1300306-17 = "[s] \"Você não precisa se forçar a fazer dieta, precisa?\""
1300306-18 = "Eh? V-você acha?"
1300306-19 = "Mas... eu..."
1300306-20 = "É vergonhoso admitir, mas ultimamente, quando vejo outras garotas usando o mesmo uniforme que eu, acabo perdendo a confiança..."
1300306-21 = "O que eu deveria fazer..."
1300306-22 = "...Sensei, você acha mesmo que eu não deveria fazer dieta?"
1300306-23 = "[s1] \"A Hasumi do jeito que é já está ótima.\"\n[s2] \"Você já é maravilhosa do jeito que é.\""
1300306-24 = "..."
1300306-25 = "..."
1300306-26 = "Entendo."
1300306-27 = "...É mesmo, né."
1300306-28 = "...Fufu. Sinto que minha dor de cabeça desapareceu."
1300306-29 = "Vamos lá, tem uma padaria deliciosa aqui perto..."
1300306-32 = "Já que você me deu essa garantia, hoje você vai ter que assumir a responsabilidade e vir comigo."
1300306-34 = "(Depois disso, fomos juntos à padaria e comemos muitos pães)"
