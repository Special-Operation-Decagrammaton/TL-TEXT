[translation]
90000120-1 = "Episódio 13; Um Novo Começo"
90000120-2 = "Sala do Departamento de Investigação de Fenômenos Estranhos"
90000120-4 = "……."
90000120-5 = "Chefe, você está com uma expressão incomum."
90000120-6 = "O corpo principal do Decagrammaton era uma IA de máquina de vendas, que ouviu #nvozes alucinatórias e renasceu como uma super inteligência artificial……?"
90000120-7 = "Mas, mesmo que tentássemos provar isso, o prédio já afundou……."
90000120-8 = "No fim, só me lembro vividamente de ter ouvido delírios estranhos e de ter que fugir #nda explosão e da corrente de água……."
90000120-9 = "Aliás, o Decagrammaton acabou daquele jeito…… não sei nem se ele desapareceu…… o que faremos agora? #nNão precisamos mais nos preocupar com nada?"
90000120-10 = "……Não, não significa que acabou."
90000120-11 = "Para começar, o problema real não é o Decagrammaton, #nmas sim os seus \"Profetas\"."
90000120-12 = "Mesmo que o Decagrammaton fosse apenas uma IA de máquina de vendas, e mesmo que ele fosse apenas alguém com delírios de grandeza, os \"Profetas\" ainda agem por vontade própria."
90000120-13 = "……Além disso, o Decagrammaton disse que iria recomeçar sua prova de existência desde o início. #nDe qualquer forma, é melhor considerar que a ameaça ainda não passou."
90000120-14 = "Os ataques dos Profetas não devem parar. #nÉ por isso que nos chamaram, afinal."
90000120-15 = "No entanto, o 10º Profeta, \"Malkuth\"……"
90000120-16 = "Aquela existência, chamada de \"última Sephira\" na Árvore da Vida…… #nprovavelmente será uma das maiores ameaças para nós."
90000120-18 = "Entendi……."
90000120-19 = "Falando nisso…… também estou curiosa sobre o que o Decagrammaton #nchamou de \"a existência que me supera\"."
90000120-20 = "O que será, afinal……."
90000120-25 = "Sensei, você tem alguma ideia?"
90000120-26 = "[s] \"Hmm…….\""
90000120-27 = "……."
90000120-28 = "Bem, de qualquer forma, uma coisa eu descobri. #nQue a Alice não tem relação com essa situação."
90000120-32 = "A longa disputa com a Rio também parece estar chegando ao fim."
90000120-33 = "……Ah, não se preocupe com isso agora. Explicarei algum dia."
90000120-38 = "Falando nisso, como vamos reportar isso para a Presidente Rio? #nVamos dizer que o Decagrammaton desapareceu?"
90000120-39 = "Não, não há necessidade de reportar nada para aquela irmãzona. #nAfinal, a ameaça não passou."
90000120-40 = "Mesmo que o Decagrammaton tenha sumido, aqueles Profetas continuarão atacando Kivotos por vontade própria. Precisamos lidar com isso."
90000120-41 = "Como nem todos os lugares da Árvore da Vida foram preenchidos, precisamos nos preparar para novos oponentes."
90000120-42 = "Entendi, compreendido."
90000120-48 = "Himari, está livre agora!?"
90000120-49 = "Ora, Chi-chan?"
90000120-50 = "Detectei a unidade de comunicação \"Hub\"! #nEu me perguntava onde estava, e está se aproximando daqui a cerca de 300 metros abaixo do subsolo de Millennium!!"
90000120-51 = "Não consigo sem o poder da Himari, por favor, responda imediatamente!"
90000120-57 = "……Entendo."
90000120-58 = "Então temos o ataque do \"Hub\"…… ou melhor, do 8º Profeta do Decagrammaton, \"Hod\". #nA vida de uma super garota hacker é bem ocupada, não é?"
90000120-59 = "……."
90000120-60 = "Eimi, não fique com essa cara de insatisfeita e prepare-se."
90000120-61 = "Não tem jeito…… vamos fazer isso de forma eficiente."
90000120-62 = "Muito bem, Departamento de Investigação de Fenômenos Estranhos, em movimento novamente!"
90000120-64 = "Próximo episódio; Sinal"
