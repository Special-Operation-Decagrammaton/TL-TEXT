[translation]
90000120-1 = "第13話;新しいスタート"
90000120-2 = "特異現象捜査部・部室"
90000120-4 = "……。"
90000120-5 = "部長、珍しい表情してるね。"
90000120-6 = "デカグラマトンの本体が自販機のAIで、#n幻聴を聞いて自ら超人工知能へと生まれ変わった……？"
90000120-7 = "しかしそれを証明しようにも、もう建物は沈んでしまいましたし……。"
90000120-8 = "結局は変な妄想を聞かされた上に、#n爆発と水流から逃げ出すことになったという記憶だけがやたら鮮明です……。"
90000120-9 = "ところで、デカグラマトンがあんなことになって……消えたのかどうかも分からないけど……これからはどうするの？#nもう何も心配する必要はない？"
90000120-10 = "……いえ、終わったわけではありません。"
90000120-11 = "そもそも実際問題として脅威なのはデカグラマトンではなく、#nその「預言者」たちの方です。"
90000120-12 = "デカグラマトンが本当にただの自販機のAIだったとして、そしてあれがただの誇大妄想癖の者だったとして、それでも「預言者」たちは自らの意志で動いています。"
90000120-13 = "……それにデカグラマトンは、最初から存在証明をやり直すと言っていました。#nどちらにせよ、脅威はまだ去っていないと考えた方が良いでしょう。"
90000120-14 = "預言者たちの襲来は止まないはずです。#nだからこそ、私たちを呼び寄せたのでしょうし。"
90000120-15 = "しかし、10番目の預言者「マルクト」……"
90000120-16 = "生命の樹でも「最後のセフィラ」と呼ばれるあの存在……#nおそらくは私たちにとって、最大級の脅威になりそうですね。"
90000120-18 = "そっか……。"
90000120-19 = "そういえば……デカグラマトンが#n「私を圧倒する存在」と呼んでいたものについても、気になりますね。"
90000120-20 = "それは、一体……。"
90000120-25 = "先生、何か心当たりはありませんか？"
90000120-26 = "[s] \"うーん……。\""
90000120-27 = "……。"
90000120-28 = "まあとにかく、一つ分かったことがあります。#nアリスはこの事態と無関係だ、ということが。"
90000120-32 = "リオとの長かった論争も、一つ終止符が打たれそうですね。"
90000120-33 = "……あぁ、今のはお気になさらず。いつか説明しますので。"
90000120-38 = "そういえばこの件って、リオ会長には何て報告するの？#nデカグラマトンは消えましたって言っておく？"
90000120-39 = "いえ、特にあのビッグシスターに報告する必要はありません。#n何せ脅威は去っていない訳ですし。"
90000120-40 = "仮にデカグラマトンがいなくなっても、あの預言者たちは自らの意志でこのキヴォトスを襲撃し続けるでしょう。それに対応しなくてはなりません。"
90000120-41 = "生命の樹もまだ全てが埋まっていない以上、新たな相手にも備えなければ。"
90000120-42 = "そっか、了解。"
90000120-48 = "ヒマリ、今良い！？"
90000120-49 = "あら、チーちゃん？"
90000120-50 = "通信ユニット「[ruby=hub]ハブ[/ruby]」を観測した！#n何処にいたかと思ったら、ミレニアムの地下300m付近からこっちに接近中！！"
90000120-51 = "ヒマリの力が無いとキツイ、すぐに対応お願い！"
90000120-57 = "……なるほど。"
90000120-58 = "ここで「[ruby=hub]ハブ[/ruby]」……もとい、デカグラマトンの8番目の預言者「ホド」の襲撃ですか。#n超絶美少女ハッカーの日々は忙しいですねぇ。"
90000120-59 = "……。"
90000120-60 = "エイミ、そんなに不満そうな顔をしていないで準備をお願いします。"
90000120-61 = "仕方ないな……効率的にやろう。"
90000120-62 = "さあそれでは特異現象捜査部、あらためて出動です！"
90000120-64 = "次回;信号"
