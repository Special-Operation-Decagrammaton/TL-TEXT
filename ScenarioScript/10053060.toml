[translation]
10053060-1 = "Episódio 6; Cabine telefônica onde ecoam vozes de ressentimento"

10053060-2 = "(no dia seguinte)"

10053060-7 = "Nunca vou encontrá-lo com esse método! \r\n\r\n\r\n\r\n"

10053060-12 = "O que aconteceu de repente? \r\n"

10053060-17 = "Não é nada “repentino”! ? Estou revirando pedras há duas horas! ? \n"

10053060-18 = "Porém...as cobras têm o hábito de preferir locais úmidos e não expostos à luz solar..."

10053060-19 = "Ou melhor, o que é exatamente Tsuchinoko? #nNão existe outra característica além da cobra gorda? \r\n"

10053060-20 = "Hmm... essa é uma pergunta difícil. Em primeiro lugar, “cobra gorda” não é preciso. \r\n"

10053060-21 = "É chamado assim porque é fácil de entender, mas na verdade é uma silhueta em forma de diamante."

10053060-22 = "Isso mesmo? O que mais?"

10053060-23 = "Embora existam diferenças entre os relatos de testemunhas oculares, diz-se que quando ameaça, emite um som como “Shah!”."

10053060-24 = "Isso não é um gato?"

10053060-25 = "E o mais incrível é a sua capacidade de saltar! Aparentemente ele pode voar quase 1 metro no local! \r\n"

10053060-26 = "É por isso que é um gato! !"

10053060-27 = "Se você me perguntar... em outras palavras, Tsuchinoko era um gato! ?"

10053060-28 = "Então, o que devo fazer se concordar? \r\n"

10053060-29 = "Há mais alguma informação que possa me ajudar a encontrá-lo?"

10053060-30 = "Hmm... não é informação, mas existe um caminho."

10053060-31 = "Isso é decidir o nome da nossa equipe."

10053060-32 = "...? \r\n"

10053060-33 = "O que você quer dizer?"

10053060-38 = "Como sabemos, o nome define a essência. #nPor exemplo, a partir do momento em que nos autodenominamos \"Equipe de Investigação\", nosso propósito passa a ser investigação, e #nnós inconscientemente nos tornamos leais a esse propósito. \r\n\r\n"

10053060-39 = "E a investigação mostra que esta vontade clara realinha o fluxo do universo para que convirja para o resultado que desejamos – ou mais precisamente, para o resultado que desejamos. \r\n\r\n"

10053060-40 = "Pare de mudar repentinamente desse tipo de teoria da coragem para uma ciência absurda e oculta! \r\n\r\n"

10053060-45 = "Ah, eu concordo. Fico mais animado quando tenho um nome um pouco legal. \r\n"

10053060-46 = "O que você acha, professor?"

10053060-47 = "[s1] \"Eu também acho.\"\r\n[s2] \"Sim, por exemplo...\""

10053060-53 = "[ns] \"Estou pesquisando o ocultismo, então vou chamar isso de okake!!\""

10053060-55 = "Pare com isso! Por que isso está acontecendo? ? \r\n\r\n\r\n"

10053060-60 = "Achei que era uma ideia muito boa na minha opinião. \r\n"

10053060-61 = "Se você não gosta, que tal permanecer fiel ao seu propósito original... \"Equipe de Pesquisa Tsuchinoko\"? \r\n"

10053060-62 = "Hmm... eu me pergunto se há algo mais assim que realmente atinge o alvo. \r\n\r\n\r\n\r\n"

10053060-67 = "O que? Por que você está olhando para mim...? \r\n\r\n\r\n\r\n"

10053060-68 = "Não, se Rena for contra Okaken, ela precisa bolar um plano alternativo. \r\n\r\n\r\n\r\n"

10053060-69 = "Não seria apenas chamada de “Equipe de Pesquisa Tsuchinoko”? \r\n\r\n\r\n\r\n\r\n"

10053060-70 = "[s3] \"Para o melhor estilista de Kivotos...\"\r\n[s4] \"O senso artístico de Lena está à mostra!\""

10053060-73 = "Não, não, isso... não tem nada a ver com moda――\r\n\r\n\r\n\r\n\r\n"

10053060-74 = "Ugh... \r\n\r\n\r\n\r\n\r\n"

10053060-75 = "Parece que você está ciente de que não está completamente relacionado... \r\n\r\n"

10053060-76 = "Huh, como esperado de um estudante do Wild Hunt! \r\n\r\n\r\n\r\n\r\n"

10053060-77 = "...X. \r\n\r\n\r\n\r\n\r\n\r\n"

10053060-78 = "sim? \r\n\r\n\r\n\r\n\r\n"

10053060-79 = "“Equipe de Investigação X”… o que você acha? \r\n\r\n\r\n\r\n\r\n\r\n"

10053060-80 = "……. \r\n\r\n"

10053060-81 = "……. \r\n\r\n\r\n\r\n"

10053060-82 = "Ah, não! Esqueça isso agora! \r\n\r\n\r\n\r\n\r\n"

10053060-83 = "Não, é muito legal, Equipe de Investigação X! ! \r\n\r\n\r\n\r\n\r\n\r\n"

10053060-84 = "Parece que ele é agente de uma organização secreta. \r\n\r\n\r\n"

10053060-85 = "Mesmo quando pedi aos meus amigos que inventassem um nome, tudo o que eles conseguiram foi \"esperança\" ou \"luz\" ou algo parecido. #nComo esperado, a academia de artes é diferente~\r\n\r\n\r\n\r\n"

10053060-86 = "Oh sério? Nada mal...? \r\n\r\n\r\n\r\n\r\n"

10053060-87 = "Uh, hein! Claro, certo? Quem você acha que inventou isso? \r\n\r\n\r\n\r\n\r\n"

10053060-88 = "Assim que decidi o nome, senti que minha busca por Tsuchinoko ficaria muito mais fácil! \r\n\r\n\r\n"

10053060-90 = "Ok, “Equipe de Investigação X”! Em busca de Tsuchinoko, vamos nos animar novamente e iniciar a investigação! \r\n"

10053060-97 = "Então se você fizer assim, você nunca vai encontrar! ! \r\n\r\n"

10053060-102 = "Sim? Existe algum problema? \r\n"

10053060-103 = "Existem apenas problemas! Afinal, nada mudou! ! \r\n"

10053060-104 = "Tenho revirado tanto as pedras que aprendi muito sobre os tipos de insetos que vivem atrás delas! ? \r\n"

10053060-105 = "Ah, não precisa se preocupar com isso. #nPorque a ``Lei da Atração'' já afirma que o fluxo de energia no universo é direcionado para nós. \r\n"

10053060-106 = "No entanto, tenha cuidado. Não use palavras negativas. Se possível, use o tempo perfeito em vez de um desejo. #nEm vez de dizer ``Quero encontrar Tsuchinoko'', diga ``Encontrei Tsuchinoko''."

10053060-108 = "Isso é oculto! ! Ciência incrível! ! \r\n\r\n\r\n"

10053060-110 = "sim? A propósito, que horas são agora? \r\n"

10053060-114 = "……um. \r\n"

10053060-115 = "o que aconteceu? Já é hora do ônibus? \r\n"

10053060-116 = "Não, isso... \r\n\r\n"

10053060-118 = "...O ônibus já foi embora, não é? \r\n"

10053060-124 = "Bem, está tudo bem se você chamar um táxi. \r\n"

10053060-133 = "Uau, sério? Este lugar está fora de alcance."

10053060-134 = "Ainda havia lugares em Kivotos isolados da civilização. \r\n"

10053060-135 = "O meu também não é bom. Não há sinal algum. \r\n"

10053060-136 = "Não seria melhor voltar agora?"

10053060-137 = "...Ah, isso mesmo."

10053060-138 = "Acho que havia um telefone público agora há pouco. \r\n"

10053060-139 = "Ah, agora que penso nisso, eu também vi."

10053060-140 = "Então vamos chamar um táxi! Vamos correr! \r\n\r\n"

10053060-144 = "Espere! Já está escurecendo. Andando sozinho nas montanhas ――\r\n"

10053060-145 = "...Você foi? \r\n"

10053060-147 = "[ns5] \"Eu vou atrás de vocês.\"\r\n[ns6] \"Vocês dois esperem aqui.\""

10053060-154 = "Não se mova para lá. Quem é você...? \r\n"

10053060-155 = "...Huh? Você é professor? \r\n\r\n"

10053060-156 = "Com licença, eu sabia que alguém estava me seguindo e pensei que era definitivamente \"aquele fugitivo da prisão\". \r\n\r\n"

10053060-157 = "Qual é o problema? Estou feliz que você esperou. \r\n"

10053060-158 = "……foto? ansiedade? #nVocê está preocupado comigo? \r\n\r\n"

10053060-164 = "Não, nunca fui tão bem tratado nem na Secretaria de Segurança Pública.\r\n\r\n"

10053060-165 = "Na verdade, se eu tiver um trabalho perigoso, eles são os primeiros a me apoiar, #nAhaha!"

10053060-166 = "É por isso que estou tão feliz. Mas estou bem sozinho, certo? #nComo você pode ver, basta fazer uma ligação de um telefone público indefinido. \r\n"

10053060-167 = "Vou chamar um táxi para você, então espere um pouco!"

10053060-172 = "……um"

10053060-173 = "Sensei, uh... me desculpe, mas você tem algumas moedas? \r\n"

10053060-174 = "[s7] \"De onde eu disse...\"\r\n[s8] \"Você estava certo em me seguir.\""

10053060-179 = "Ah, o professor vai entrar também? \r\n"

10053060-182 = "Não é pequeno? Devo sair? #n...Ah, você está bem? \r\n"

10053060-183 = "Bem, vamos desligar rapidamente. \r\n"

10053060-188 = "...Ah, olá? É uma empresa de táxi? \r\n\r\n"

10053060-189 = "Liguei para pedir carona. A localização é ――\r\n"

10053060-190 = "Ah, espere um minuto. \r\n"

10053060-191 = "Eu me pergunto se devo explicar isso...? É o Monte Shirakawa... \r\n\r\n"

10053060-192 = "Ah, vai quebrar! professor! moeda! rapidamente! \r\n\r\n"

10053060-196 = "Então, hum, onde é isso? \r\n\r\n"

10053060-197 = "...Isso mesmo, se você pudesse ir até o ponto de ônibus de Shirakawayama. Sim, bem em frente ao ponto de ônibus. \r\n\r\n"

10053060-198 = "Existem 4 pessoas. Ah, se for pequeno o professor vai ficar apertado, né? \r\n"

10053060-199 = "Não, se você colocar o professor no banco do passageiro e três pessoas atrás ――\r\n"

10053060-200 = "Ah, parece que vai quebrar de novo! É por isso que existem telefones públicos! \r\n\r\n"

10053060-204 = "Ah, sim, está tudo bem, mesmo que seja pequeno. \r\n"

10053060-205 = "Estou esperando por você, então quero que você venha imediatamente. \r\n"

10053060-206 = "Sim~Obrigado pelo seu trabalho duro~\r\n"

10053060-210 = "Tudo bem! Isso resolve! Tudo que você precisa fazer é esperar no ponto de ônibus ――\r\n\r\n\r\n"

10053060-215 = "Huh? Não abre? \r\n"

10053060-220 = "Sem chance. Professor, por favor, afaste-se por um momento! \r\n\r\n"

10053060-228 = "professor? que……. \r\n"

10053060-229 = "Você ainda tem algumas moedas sobrando? Sinto que deveria pedir ajuda... \r\n\r\n"

10053060-230 = "[ns9] \"Acabou...\"\n[ns10] \"É o último.\""

10053060-234 = "Na verdade, quando não estou twittando, isso se sobrepõe. \r\n\r\n"

10053060-235 = "Desculpe por envolver o professor... \r\n\r\n"

10053060-236 = "[s11] \"Não é culpa da Konoka, certo?\"\n[s12] \"É que a porta é velha e mal construída.\""

10053060-239 = "Não, é porque tenho azar que estou convidando ao desastre. \r\n"

10053060-240 = "É por isso que quando estou triste, gosto de ficar sozinho. #nIsso não vai se espalhar para as pessoas ao seu redor? \r\n"

10053060-241 = "[s13] \"Você realmente acredita em coisas assim.\"\n[s14] \"Fortuna, superstições, etc.\""

10053060-244 = "Você acredita nisso? Ou é verdade? \r\n"

10053060-245 = "Você sabe, não é todo dia que você fica trancado em uma cabine telefônica, certo? \r\n"

10053060-246 = "O fato de ter acontecido neste momento é a prova de que minha sorte está completamente ruim."

10053060-247 = "...Bem, tenho certeza que os dois eventualmente perceberão e virão ajudar. #n Até os táxis virão eventualmente."

10053060-251 = "...É muito pequeno aqui, não é? \r\n"

10053060-252 = "[s15] \"Entendo...\"\n[s16] \"Parece que está ficando quente...\""

10053060-255 = "Ah, a professora também sente? \r\n"

10053060-256 = "É porque há duas pessoas lá dentro...? \r\n\r\n"

10053060-260 = "Ah... não, me desculpe, mas acho que estava certo. \r\n\r\n"

10053060-261 = "Que diabos é essa situação...? \r\n\r\n\r\n"

10053060-266 = "O telefone público está tocando...? \r\n"

10053060-267 = "foto? Os telefones públicos às vezes fazem chamadas? \r\n"

10053060-268 = "[s17] \"Acho que é tecnicamente possível, mas...\"\r\n[s18] \"Acho que normalmente não soa...?\"\r\n"

10053060-271 = "O que você faz com isso? \r\n\r\n"

10053060-275 = "Acho que é melhor sair, afinal? \r\n"

10053060-281 = "……olá? \r\n"

10053060-286 = "(O som de chamas ardentes e gritos de partir o coração podem ser ouvidos do outro lado da linha)"

10053060-287 = "Você também... vai morrer queimado lá... \r\n\r\n"

10053060-291 = "Se, se, se...professor! ? \r\n\r\n"

10053060-292 = "Agora... eu ouvi! ? Isso é uma coisa perigosa! ? \r\n\r\n"

10053060-293 = "[s19] \"Ei, vamos nos acalmar por enquanto.\"\n[s20] \"Talvez seja algum barulho ou um trote!\""

10053060-296 = "Isso não pode ser verdade! ? \r\n\r\n"

10053060-297 = "Quem identificaria um trote para um telefone público em um lugar como este? \r\n"

10053060-298 = "E você disse \"Vou queimar até morrer\", certo? #nSinto que está ficando cada vez mais quente... \r\n"

10053060-299 = "Não, não é minha imaginação! ! O chão está muito quente! ! \r\n\r\n"

10053060-300 = "[s21] \"Certamente...!\"\n[s22] \"Mas por enquanto, vamos nos acalmar e esperar pelo resgate...!\""

10053060-304 = "(Cerca de 10 minutos se passaram, mas nenhuma ajuda veio...)"

10053060-307 = "Suspiro…suspiro…."

10053060-308 = "Professor, você está bem? Já faz algum tempo que estou suando de maneira incomum... \r\n"

10053060-309 = "[s23] \"Até Konoka...\"\n[s24] \"Talvez já esteja na hora... de atingir seu limite...\""

10053060-312 = "……."

10053060-313 = "Não pode ser ajudado. \r\n\r\n"

10053060-314 = "Professor, por favor, chegue um pouco mais perto."

10053060-318 = "Não, não é hora de se preocupar com contato físico...#nSim, tudo bem."

10053060-319 = "Bem, então vamos--"

10053060-323 = "Quebre! ! ! ! \r\n"

10053060-333 = "Ah, tão refrescante! ! Eu gostaria de ter feito isso desde o início! \r\n\r\n"

10053060-334 = "Professor, você está ferido?"

10053060-335 = "[ns25] \"Sim, obrigado. Obrigado.\"\r\n[ns26] \"Nunca pensei que você fosse construir uma cabine telefônica...\""

10053060-338 = "Isto é como o café da manhã! \r\n"

10053060-340 = "(Zaza…)\r\n"

10053060-341 = "Não... isso... é uma violação... \r\n"

10053060-350 = "Nossa, falei de novo! ! Deve estar possuído por alguma coisa! ? \r\n"

10053060-351 = "Vamos agora! rapidamente! ! \r\n\r\n"

10053060-353 = "(No final das contas, eu não sabia quem estava do outro lado da linha até o final...)"

