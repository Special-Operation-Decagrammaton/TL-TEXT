[translation]
10053060-1 = "第6話;怨嗟の声が響く電話ボックス"
10053060-2 = "（翌日）"
10053060-7 = "こんな方法じゃ一生見つかるわけないってば！\r\n\r\n\r\n\r\n"
10053060-12 = "急になんだよ？\r\n"
10053060-17 = "全然「急に」じゃないからね！？もう2時間も石ひっくり返してるけど！？"
10053060-18 = "だが……ヘビは習性として日の当たらない湿った場所を好むもので……。"
10053060-19 = "ていうか、そもそもツチノコって何なの？#n太ってるヘビ以外に特徴ないわけ？\r\n"
10053060-20 = "ふむ……鋭い質問だね。まず、「太ったヘビ」という表現は正確じゃないんだ。\r\n"
10053060-21 = "分かりやすいからそう呼ばれているだけで、#n実際は菱形に近いシルエットなのだそうだよ。"
10053060-22 = "そうなんだ？他には？"
10053060-23 = "目撃談によって差はあるが、威嚇する時に「シャーッ！」と声を上げるとも言われている。"
10053060-24 = "それって猫じゃないの？"
10053060-25 = "そして何よりすごいのが跳躍力！その場で1メートル近く飛べるそうだ！\r\n"
10053060-26 = "だから猫じゃん！！"
10053060-27 = "言われてみれば……つまり、ツチノコは猫だったのか！？"
10053060-28 = "それで納得してどうするのよ。\r\n"
10053060-29 = "もっと何か、見つけるのに役立つ情報はないの？"
10053060-30 = "うーん……情報ではないが、方法なら1つある。"
10053060-31 = "それは――我々のチーム名を決めることだ。"
10053060-32 = "……？\r\n"
10053060-33 = "どういうこと？"
10053060-38 = "知っての通り、名前は本質を規定する。#n例えば我々が「調査隊」を名乗った瞬間から、我々の目的は調査となり、#n無意識的にもその目的に忠実になっていくんだ。\r\n\r\n"
10053060-39 = "そして、その明確な意志が宇宙の流れを再調整して、我々の望む――正確には、望んでいた結果へと収束していく、という研究結果もある。\r\n\r\n"
10053060-40 = "それっぽい根性論から、急にオカルトじみたトンデモ科学に舵切るのやめて！\r\n\r\n"
10053060-45 = "あー、あたしは賛成。ちょっとイケてる名前があったほうがテンション上がるし。\r\n"
10053060-46 = "先生はどう思います？"
10053060-47 = "[s1] \"私もいいと思う。\"\r\n[s2] \"そうだね、たとえば……。\""
10053060-53 = "[ns] \"オカルトを研究するんだから、略してオカけ――！！\""
10053060-55 = "やめてよ！なんでそうなるの！？\r\n\r\n\r\n"
10053060-60 = "吾輩的には結構良い案だと思ったのだが。\r\n"
10053060-61 = "お気に召さないのであれば、本来の目的に忠実に……「ツチノコ調査隊」はどうかな？\r\n"
10053060-62 = "う～ん……もっとこう、バチッとキマるやつないっすかね。\r\n\r\n\r\n\r\n"
10053060-67 = "な、なに？なんでこっち見るの……？\r\n\r\n\r\n\r\n"
10053060-68 = "いや、レナが「オカ研」に反対するんだったら、代案を出してもらわないと。\r\n\r\n\r\n\r\n"
10053060-69 = "普通に「ツチノコ調査隊」でいいんじゃない？\r\n\r\n\r\n\r\n\r\n"
10053060-70 = "[s3] \"キヴォトス随一のファッションデザイナーにしては……。\"\r\n[s4] \"レナの芸術的なセンスの見せどころだよ！\""
10053060-73 = "い、いや、これって……ファッションとは関係ない――\r\n\r\n\r\n\r\n\r\n"
10053060-74 = "ぐぅ……。\r\n\r\n\r\n\r\n\r\n"
10053060-75 = "まったく無関係でもないと、自覚はあるようだね……。\r\n\r\n"
10053060-76 = "ひゅ～っ、さすがワイルドハントの生徒さん！\r\n\r\n\r\n\r\n\r\n"
10053060-77 = "……X。\r\n\r\n\r\n\r\n\r\n\r\n"
10053060-78 = "ん？\r\n\r\n\r\n\r\n\r\n"
10053060-79 = "「調査班X」……どう？\r\n\r\n\r\n\r\n\r\n\r\n"
10053060-80 = "……。\r\n\r\n"
10053060-81 = "……。\r\n\r\n\r\n\r\n"
10053060-82 = "あっ、やっぱナシ！今の忘れて！\r\n\r\n\r\n\r\n\r\n"
10053060-83 = "いや、めちゃめちゃカッコいいじゃん、調査班X！！\r\n\r\n\r\n\r\n\r\n\r\n"
10053060-84 = "何だか……秘密組織のエージェントのようだ。\r\n\r\n\r\n"
10053060-85 = "うちの連中にネーミングを募集しても「希望」とか「光」とかそんなベタなのしか出てこないのに。#nさすが芸術学院は違うな～\r\n\r\n\r\n\r\n"
10053060-86 = "そ、そう？悪くない……？\r\n\r\n\r\n\r\n\r\n"
10053060-87 = "ふ、ふん！当然でしょ。誰が考えたと思ってるの？\r\n\r\n\r\n\r\n\r\n"
10053060-88 = "名前が決まると、ツチノコ探しも一気に捗りそうな気がしてきたよ！\r\n\r\n\r\n"
10053060-90 = "よし「調査班X」！ツチノコを求めて、もう一度気合い入れて調査開始だ！\r\n"
10053060-97 = "だからこんなやり方じゃ一生見つからないってば！！\r\n\r\n"
10053060-102 = "うん？何か問題でも？\r\n"
10053060-103 = "問題しかないでしょ！結局、何も変わってないじゃない！！\r\n"
10053060-104 = "石をひっくり返しすぎて、石の裏にいる虫の種類に詳しくなってきたんだけど！？\r\n"
10053060-105 = "ああ、その辺は心配いらない。#nすでに「引き寄せの法則」で、宇宙の気の流れはこちら側に向いているからな。\r\n"
10053060-106 = "ただし要注意だ。否定的な言葉は使わないこと。できれば願望ではなく完了形で。#n「ツチノコを見つけたい」ではなく、「ツチノコを見つけた」とね。"
10053060-108 = "それオカルト！！トンデモ科学！！\r\n\r\n\r\n"
10053060-110 = "ん？そういえば今、何時だろ？\r\n"
10053060-114 = "……あ。\r\n"
10053060-115 = "どうしたの？もうバスの時間？\r\n"
10053060-116 = "いや、その……。\r\n\r\n"
10053060-118 = "……もう行っちゃったんだよね、バス。\r\n"
10053060-124 = "ま、タクシー呼べば大丈夫でしょ。\r\n"
10053060-133 = "うわ、マジか。圏外っすねここ。"
10053060-134 = "キヴォトスにも、文明から切り離された場所が残ってたんすね。\r\n"
10053060-135 = "私のもダメ。完全に電波届いてないね。\r\n"
10053060-136 = "今からでも歩いて戻った方がよくない？"
10053060-137 = "……あ、そうだ。"
10053060-138 = "さっき公衆電話があった気がする。\r\n"
10053060-139 = "ああ、そういえば吾輩も見かけたよ。"
10053060-140 = "じゃあそれでタクシーを呼ぼう！ひとっ走り行ってきまーす！\r\n\r\n"
10053060-144 = "待て！もう日が暮れかけているんだ。山の中を一人で歩くのは――\r\n"
10053060-145 = "……行ってしまったか。\r\n"
10053060-147 = "[ns5] \"私が追いかけるよ。\"\r\n[ns6] \"2人はここで待ってて。\""
10053060-154 = "そこ、動くな。何者だ……？\r\n"
10053060-155 = "……あれ？先生っすか？\r\n\r\n"
10053060-156 = "すみません、誰かがついて来てるのは分かってたんで、#nてっきり「あの脱獄犯」かと思って。\r\n\r\n"
10053060-157 = "にしてもどうしたんすか？待っててくれてよかったんすけど。\r\n"
10053060-158 = "……え？心配？#nあたしを心配してくれたんすか？\r\n\r\n"
10053060-164 = "いや～公安局でもここまで大事にされたことないっすよ?\r\n\r\n"
10053060-165 = "むしろ危ない仕事があったら真っ先にあたしの背中押してくる連中っすからね、#nあははっ！"
10053060-166 = "だから、嬉しいっす。でも、あたし1人で平気っすよ？#nこの通り、何の変哲もない公衆電話で電話をかけるだけですし。\r\n"
10053060-167 = "ちゃちゃっとタクシー呼んじゃうんで、ちょっとだけ待っててほしいっす！"
10053060-172 = "……あ"
10053060-173 = "先生、その……悪いんすけど、小銭あったりします？\r\n"
10053060-174 = "[s7] \"言ったそばから……。\"\r\n[s8] \"ついてきて正解だったね。\""
10053060-179 = "あ、先生も入ってくるんすか？\r\n"
10053060-182 = "狭くないっすか？あたし外に出ます？#n……あ、大丈夫っすか。\r\n"
10053060-183 = "じゃ、さっさと掛けちゃいましょう。\r\n"
10053060-188 = "……あ、もしもし？タクシー会社っすか？\r\n\r\n"
10053060-189 = "配車をお願いしたくて電話したんすけど。場所は――\r\n"
10053060-190 = "あれ、ちょっと待ってください。\r\n"
10053060-191 = "ここ……なんて説明すりゃいいんすかね？白川山なんすけど……。\r\n\r\n"
10053060-192 = "あっ、切れちゃう！先生！小銭！早く！\r\n\r\n"
10053060-196 = "で、えーっと、ここどこだっけ。\r\n\r\n"
10053060-197 = "……そうそう、白川山のバス停まで来てもらえれば。はい、停留所の前っす。\r\n\r\n"
10053060-198 = "4人です。あ、小型だと先生が窮屈っすかね？\r\n"
10053060-199 = "いや、助手席に先生で、後ろに3人で詰めれば――\r\n"
10053060-200 = "あ、また切れそう！これだから公衆電話は！\r\n\r\n"
10053060-204 = "あ、はい、小型でも大丈夫っす。\r\n"
10053060-205 = "待ってるんで、すぐ来て欲しいっす。\r\n"
10053060-206 = "はい～お疲れ様っす～\r\n"
10053060-210 = "よしっ！これで解決！あとはバス停で待ってれば――\r\n\r\n\r\n"
10053060-215 = "あれ？開かないっすか？\r\n"
10053060-220 = "しゃあない。先生、ちょっと下がっててください！\r\n\r\n"
10053060-228 = "先生？あの……。\r\n"
10053060-229 = "小銭、まだ余ってたりしないっすか……？助けを呼んだほうがいい気が……。\r\n\r\n"
10053060-230 = "[ns9] \"もうなくて……。\"\n[ns10] \"さっきのが最後だよ。\""
10053060-234 = "ほんと、ツイてないときって重なるんすよね。\r\n\r\n"
10053060-235 = "すみません、先生まで巻き込んじゃって……。\r\n\r\n"
10053060-236 = "[s11] \"コノカのせいってわけじゃないでしょ？\"\n[s12] \"ドアが古くなって建付けが悪いだけだよ。\""
10053060-239 = "いえ、あたしの運気が悪いから災いを呼び寄せてるんすよ。\r\n"
10053060-240 = "だからツキが落ちてるときは、1人でいたいんすよね。#n周りにまで飛び火するじゃないっすか。\r\n"
10053060-241 = "[s13] \"そういうの、本気で信じてるんだね。\"\n[s14] \"運勢とか、迷信とか。\""
10053060-244 = "信じてるっていうか、実際そうじゃないっすか？\r\n"
10053060-245 = "ほら、電話ボックスに閉じ込められるなんて、そうそうあることじゃないっすよ？\r\n"
10053060-246 = "それがこのタイミングで起きるってことは、完全にあたしの運気が悪くなってる証拠っす。"
10053060-247 = "……まぁでも、そのうち2人も気づいて助けに来てくれるでしょうし。#nタクシーだっていずれ。"
10053060-251 = "……しっかし狭いっすね、ここ。\r\n"
10053060-252 = "[s15] \"だね……。\"\n[s16] \"なんか暑くなってきた気も……。\""
10053060-255 = "あ、やっぱり先生も感じます？\r\n"
10053060-256 = "2人で入ってるせいっすかね……？\r\n\r\n"
10053060-260 = "あっ……いえ、すみません、ちょっと当たっちゃいましたよね。\r\n\r\n"
10053060-261 = "なんなんだよ、この状況……。\r\n\r\n\r\n"
10053060-266 = "公衆電話が鳴ってる……？\r\n"
10053060-267 = "え？公衆電話って、かかってくることもあるんすか？\r\n"
10053060-268 = "[s17] \"技術的には可能だと思うけど……。\"\r\n[s18] \"普通は鳴らないんじゃないかな……？\"\r\n"
10053060-271 = "これ、どうします？\r\n\r\n"
10053060-275 = "やっぱ出たほうがいいっすかね？\r\n"
10053060-281 = "……もしもし？\r\n"
10053060-286 = "（受話器の向こうから、燃え盛る炎の音と悲痛な悲鳴が聞こえてくる）"
10053060-287 = "お前たちも……そこで焼け死ぬんだ……。\r\n\r\n"
10053060-291 = "せ、せ、せ……先生！？\r\n\r\n"
10053060-292 = "今の……聞こえました！？これ、ヤバいやつっすよね！？\r\n\r\n"
10053060-293 = "[s19] \"い、いったん落ち着こう。\"\n[s20] \"ノイズとか、イタズラ電話かも！\""
10053060-296 = "そんなわけなくないっすか！？\r\n\r\n"
10053060-297 = "誰がこんな場所の公衆電話にピンポイントでイタズラ電話かけてくるんすか！\r\n"
10053060-298 = "それに「焼け死ぬ」って言ってましたよね？#nなんかどんどん暑くなってきてる気がするんすけど……。\r\n"
10053060-299 = "いや、気のせいじゃないっす！！床、マジで熱いですって！！\r\n\r\n"
10053060-300 = "[s21] \"たしかに……！\"\n[s22] \"でも今は落ち着いて、救助を待とう……！\""
10053060-304 = "（10分ほど経ったが、助けは来なかった……）"
10053060-307 = "はぁ……はぁ……。"
10053060-308 = "先生、大丈夫っすか？さっきから尋常じゃない汗ですけど……。\r\n"
10053060-309 = "[s23] \"コノカだって……。\"\n[s24] \"そろそろ……限界かも……。\""
10053060-312 = "……。"
10053060-313 = "仕方ないっすね。\r\n\r\n"
10053060-314 = "先生、もう少しこっちに寄ってください。"
10053060-318 = "いや、体が触れるとか気にしてる場合じゃないんで……#nはい、そのくらいで大丈夫っす。"
10053060-319 = "じゃ、いきますよ――"
10053060-323 = "ぶち破る！！！！\r\n"
10053060-333 = "あぁ～スッキリ！！最初からこうしてりゃよかったっすね！\r\n\r\n"
10053060-334 = "先生、怪我とかしてないっすか？"
10053060-335 = "[ns25] \"うん、おかげ様で。ありがとう。\"\r\n[ns26] \"まさか電話ボックスを投げ飛ばすとは……。\""
10053060-338 = "これくらい朝飯前っすよ！\r\n"
10053060-340 = "（ザザー……）\r\n"
10053060-341 = "いや……それは……反則……。\r\n"
10053060-350 = "うわっ、またしゃべった！！なにか憑いてるんじゃないっすか！？\r\n"
10053060-351 = "もう行きましょ！早く！！\r\n\r\n"
10053060-353 = "（結局、電話の向こうの正体は最後まで分からずじまいだった……）"
