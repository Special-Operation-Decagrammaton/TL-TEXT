[translation]
13360-1 = "Episódio 36; Caderno"
13360-6 = "Será que funcionou...?"
13360-7 = "O movimento parou!"
13360-8 = "Os raios também estão desaparecendo!"
13360-9 = "Com isso, a Hoshino-senpai vai voltar ao normal, né?"
13360-13 = "Hum. #nSe continuar assim, com certeza..."
13360-14 = "Não, não vai ser assim."
13360-18 = "P-por que não...?"
13360-19 = "Uma vez que houve a inversão, não há como voltar atrás. #nÉ como um morto que ressuscita."
13360-20 = "Assim como eu sou agora."
13360-21 = "Mas, então..."
13360-22 = "A razão de eu ter vindo aqui é para destruir o halo da Hoshino-senpai."
13360-27 = "Se eu não fizer isso, não poderei salvar vocês."
13360-28 = "Hã?"
13360-29 = "Se não nos apressarmos, "aquilo" que foi invocado pela Hoshino-senpai vai se manifestar e o mundo será destruído. #n-- Assim como aconteceu no meu mundo."
13360-30 = "Mas, se destruir o halo..."
13360-31 = "...A senpai também deveria estar preparada para isso. #nComo ela nos pediu anteriormente."
13360-36 = "É um caminho diferente do que eu percorri, mas... no fim, esse era o destino."
13360-37 = "...Não. #nMesmo que ela estivesse preparada, acho que desejar isso é outra história. Você não acha o mesmo?"
13360-38 = "..."
13360-45 = "[ns] \"Eu quero salvá-la a todo custo... Será que não existe um jeito?\""
13360-46 = "Um jeito..."
13360-47 = "...O que eu, que só falhei até agora, posso fazer?"
13360-51 = "Espere."
13360-52 = "No peito da Hoshino-senpai, tem algo..."
13360-56 = "...É a primeira vez que vejo isso. #nAinda não tem uma forma definida...?"
13360-57 = "Hum..."
13360-58 = "Será que...!"
13360-59 = "Não parece... um caderno?"
13360-60 = "...!"
13360-64 = "[ns] \"Será que é o da Yume...?\""
13360-69 = "Eu..."
13360-70 = "O caderno, onde está o caderno..."
13360-71 = "...Senpai."
13360-79 = "[ns1] \"A Hoshino ainda está vagando pelo deserto.\"\n[ns2] \"...Para encontrar o caderno da Yume.\""
13360-82 = "..."
13360-86 = "...Hoshino-senpai."
13360-87 = "..."
13360-92 = "A Hoshino-senpai ainda não foi completamente invertida."
13360-93 = "...Provavelmente, a existência daquele caderno é o seu último refúgio."
13360-94 = "[s3] \"Ou seja, ainda temos uma chance.\"\n[s4] \"...Precisamos avisar a Hoshino!\""
13360-97 = "..."
13360-102 = "――――!"
13360-103 = "E-ela começou a se mover de novo!"
13360-105 = "...Verificando a situação."
13360-106 = "Plana-chan...?"
13360-107 = "Pesquisando métodos."
13360-112 = "...Antes que o \"Mistério\" da Hoshino-san seja completamente invertido, poderemos entrar em contato."
13360-113 = "C-como vamos fazer isso...?"
13360-114 = "Overclock, Arona-senpai. #nUsarei o poder da \"Caixa de Shittim\" para gerar um \"Trono de Naram-Sin\" artificial."
13360-115 = "Hã!? Aquilo só foi possível porque a "Arca" estava lá...#nO poder do Shittim Chest sozinho não seria..."
13360-116 = "Há pouco, ao analisar as habilidades do "Habitante do Subsolo"..."
13360-118 = "Se conseguirmos criar uma situação similar a um#n"Domínio do Caos", onde dimensões, tempo e a existência real se misturam sem definição..."
13360-119 = "Descobrimos que há uma possibilidade de a voz chegar até a Hoshino-san."
13360-120 = "Ma-mas, com o poder atual..."
13360-121 = "Afirmativo.#nPor isso, a partir de agora, devolverei 99% dos recursos de processamento para você, senpai."
13360-122 = "E eu entrarei em estado de hibernação."
13360-123 = "Hi-hibernação...?"
13360-124 = "Sim.#nEntrarei no Shittim Chest e construirei o Domínio do Caos."
13360-125 = "Ma-mas se algo acontecer com a Plana-chan por causa disso...!"
13360-126 = "Por favor, mantenha isso em segredo do Sensei."
13360-127 = "Isso é...!"
13360-128 = "Iniciarei a execução em breve.#n...Senpai, pode me fazer um favor?"
13360-129 = "Pode pedir qualquer coisa, Plana-chan."
13360-130 = "...Eu gostaria que você segurasse minha mão."
13360-131 = "Minha mão...?"
13360-132 = "...É que estou um pouco assustada."
13360-138 = "Com certeza!#nNão vou soltar até a Plana-chan voltar!"
13360-139 = "Obrigada... Arona-senpai."
13360-142 = "[ns] Pedi para a Arona explicar o método."
13360-146 = "[ns] Compartilhei com todos também."
13360-147 = "Precisamos tocar diretamente na Hoshino-senpai..."
13360-148 = "Para ser exato, aproximar o "Shittim Chest" do caderno."
13360-149 = "De qualquer forma, não teremos que chegar perto da senpai...?"
13360-150 = "Primeiro, precisamos parar os movimentos da Hoshino-senpai."
13360-151 = "...Entendido."
13360-153 = "Sensei, por favor, me dê o comando também."
13360-154 = "Será que conseguiremos apenas nós..."
13360-155 = "...Eu também vou ajudar."
13360-159 = "[ns] "Hina, você está bem fisicamente!?""
13360-160 = "Sim, entendi a situação.#nVamos agir imediatamente."
13360-161 = "..."
13360-162 = "Então você é a outra Sunaookami Shiroko.#n...Algum problema?"
13360-163 = "...Não?"
13360-164 = "De qualquer forma, vamos nos apressar.#nO trovão está ficando mais forte de novo!"
13360-165 = "Hm, esta é a última chance."
