[translation]
1004505-1 = "その中を見ることはできずとも"
1004505-3 = "（外に出ると、太陽が水平線に沈んでいくところだった）"
1004505-9 = "（砂浜に座ってぼんやりと水平線を見つめるホシノの後ろ姿が見える）"
1004505-14 = "あれ、先生……？"
1004505-15 = "どうしたの。何かあった？"
1004505-16 = "[s1] \"なんとなく来てみた。\"\n[s2] \"ホシノに会いに来たよ。\""
1004505-17 = "うへ……そうなんだ。"
1004505-18 = "うへ……そうなんだ。"
1004505-22 = "……一応言っておくけど、何か悩んでるとかじゃないよ。"
1004505-23 = "また先生に心配かけちゃったら悪いからさ。念のため、ね。"
1004505-24 = "今日は本当に、ただ海を眺めてただけ。"
1004505-25 = "[s3] \"そっか。\"\n[s4] \"そうかなって思った。\""
1004505-26 = "うへ……それじゃあ、おじさんが海を見ながら何を考えてたか、分かる？"
1004505-27 = "うへ……それじゃあ、おじさんが海を見ながら何を考えてたか、分かる？"
1004505-28 = "[s5] \"言葉通り「海」を見てたのかなって。\"\n[s6] \"アビドスには「海」がないから、見てたのかなって。\""
1004505-29 = "……さすが先生だね。その通りだよ。"
1004505-30 = "……さすが先生だね。その通りだよ。"
1004505-31 = "アビドスには「海」がないからね。"
1004505-32 = "どこまでも広がる砂漠は飽きるくらい見てきたんだけどさ……。"
1004505-33 = "どこまでも広がる水って……不思議だね。"
1004505-34 = "あれだけの水があるから、たくさんの生き物がいるんだなって……魚も、アワビも……鯨も……。"
1004505-35 = "水族館と違って、中までは見えないのはちょっと残念だけど……"
1004505-36 = "でも、「あの中にみんないる」って、思えるのも悪くないね。"
1004505-37 = "……うん、悪くない。"
1004505-38 = "[s7] \"そういえば、リゾートに潜水艇があったような……\"\n[s8] \"水の中を見なくていいの？\""
1004505-39 = "うへ、先生ならそう言うと思ったよ。"
1004505-40 = "うへ、先生ならそう言うと思ったよ。"
1004505-41 = "でも大丈夫。この場所がちょうどいいんだよ。"
1004505-42 = "海の中に入っちゃうと、逆に水面を眺めることができないでしょ？"
1004505-43 = "水面を眺めてるのも好きだからさ～"
1004505-44 = "両方を一度に見るのは無理だし……"
1004505-49 = "……ん？"
1004505-53 = "なんだろ……？"
1004505-57 = "……わっ。"
1004505-58 = "[s9] \"ボラが跳ねてる。\"\n[s10] \"こんなところにボラがいるんだね。\""
1004505-63 = "……あれ、魚？魚だよね！？"
1004505-64 = "今、水の上を跳ねてた？跳ねる魚なんて初めて見た……！"
1004505-68 = "わ、また跳ねた！先生ほらあそこ！"
1004505-69 = "あっちも！すっごい跳ねるじゃん……！なんだこれ！？"
1004505-74 = "……えへへ。"
1004505-75 = "……ちょっとはしゃぎすぎちゃったかな。"
1004505-76 = "先生、さっきのは見なかったことにしてもらえない？おじさん、ちょっと恥ずかしくなってきちゃったよ。"
1004505-80 = "……ほんと、よく跳ねるねぇ。"
1004505-81 = "[s11] \"ちょうどボラの群れが通るところなのかな。\"\n[s12] \"ずっと座ってた甲斐があったね。\""
1004505-82 = "……そうだね。"
1004505-83 = "……そうだね。"
1004505-84 = "うへ……水面も、水中の魚も見ることができたね。"
1004505-85 = "……時が来れば、そういうこともあるんだね。"
1004505-86 = "……うん。"
1004505-93 = "……こういうのも、悪くないね。"
