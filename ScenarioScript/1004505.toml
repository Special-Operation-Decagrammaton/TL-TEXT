[translation]
1004505-1 = "Mesmo que não possamos ver o que há dentro"
1004505-3 = "（Ao sair, o sol estava se pondo no horizonte）"
1004505-9 = "（Posso ver as costas de Hoshino sentada na areia, olhando fixamente para o horizonte）"
1004505-14 = "Ué, Sensei...?"
1004505-15 = "O que houve? Aconteceu alguma coisa?"
1004505-16 = "[s1] \"Só vim dar uma volta.\" \n[s2] \"Vim te encontrar, Hoshino.\""
1004505-17 = "Uhe... entendi."
1004505-18 = "Uhe... entendi."
1004505-22 = "……Só para deixar claro, não é como se eu estivesse preocupada com algo."
1004505-23 = "Não quero te preocupar de novo, Sensei. Só por precaução, sabe?"
1004505-24 = "Hoje eu só estava olhando para o mar, de verdade."
1004505-25 = "[s3] \"Entendo.\" \n[s4] \"Imaginei que fosse isso.\""
1004505-26 = "Uhe... então, você sabe o que o tio aqui estava pensando enquanto olhava para o mar?"
1004505-27 = "Uhe... então, você sabe o que o tio aqui estava pensando enquanto olhava para o mar?"
1004505-28 = "[s5] \"Achei que você estava apenas olhando para o 'mar' como disse.\" \n[s6] \"Como não tem 'mar' em Abydos, imaginei que estivesse olhando por isso.\""
1004505-29 = "……Como esperado do Sensei. É exatamente isso."
1004505-30 = "……Como esperado do Sensei. É exatamente isso."
1004505-31 = "Porque não tem 'mar' em Abydos, né."
1004505-32 = "Eu já vi o deserto se estendendo até onde a vista alcança tantas vezes que até cansei..."
1004505-33 = "Mas essa água que se estende sem fim... é algo misterioso, não é?"
1004505-34 = "Pensar que, por ter tanta água assim, existem tantas criaturas vivas... peixes, abalones... baleias..."
1004505-35 = "Diferente de um aquário, é uma pena não conseguir ver o que tem lá dentro, mas..."
1004505-36 = "Mas pensar que 'todos eles estão lá dentro' não é nada mal."
1004505-37 = "……É, não é nada mal."
1004505-38 = "[s7] \"Falando nisso, acho que tem um submarino no resort...\" \n[s8] \"Você não quer ver o que tem dentro da água?\""
1004505-39 = "Uhe, eu sabia que você diria isso, Sensei."
1004505-40 = "Uhe, eu sabia que você diria isso, Sensei."
1004505-41 = "Mas está tudo bem. Este lugar aqui é perfeito."
1004505-42 = "Se eu entrar no mar, não vou conseguir olhar para a superfície da água, né?"
1004505-43 = "Eu gosto de ficar olhando para a superfície da água~"
1004505-44 = "É impossível ver as duas coisas ao mesmo tempo..."
1004505-49 = "……Hm?"
1004505-53 = "O que será...?"
1004505-57 = "……Uau."
1004505-58 = "[s9] \"Uma tainha está saltando.\" \n[s10] \"Olha só, tem tainhas aqui.\""
1004505-63 = "……Ué, um peixe? É um peixe, né!?"
1004505-64 = "Ele acabou de saltar da água? É a primeira vez que vejo um peixe saltando...!"
1004505-68 = "Uau, saltou de novo! Sensei, olha ali!"
1004505-69 = "Ali também! Eles saltam muito...! O que é isso!?"
1004505-74 = "……Ehehe."
1004505-75 = "……Acho que me empolguei demais."
1004505-76 = "Sensei, pode fingir que não viu isso? O tio aqui está começando a ficar com vergonha."
1004505-80 = "……Nossa, eles saltam bastante mesmo."
1004505-81 = "[s11] \"Deve ser porque um cardume de tainhas está passando por aqui.\" \n[s12] \"Valer a pena ter ficado sentado aqui todo esse tempo, né?\""
1004505-82 = "……É verdade."
1004505-83 = "……É verdade."
1004505-84 = "Uhe... conseguimos ver tanto a superfície quanto os peixes dentro da água."
1004505-85 = "……Quando chega a hora certa, essas coisas acontecem, né."
1004505-86 = "……É."
1004505-93 = "……Esse tipo de coisa também não é nada mal."
