[translation]
2600702-1 = "O significado de se divertir"
2600702-3 = "Ah, Sensei, aqui!"
2600702-4 = "Desculpe por fazer você vir até aqui..."
2600702-5 = "[s1] \"Tudo bem, não se preocupe.\"\n[s2] \"Onde estamos...?\""
2600702-6 = "Muito obrigada..."
2600702-7 = "...Bem, é aqui?"
2600702-8 = "É atrás do resort. Tem um pequeno depósito de suprimentos aqui..."
2600702-9 = "É atrás do resort. Tem um pequeno depósito de suprimentos aqui..."
2600702-10 = "No começo, eu estava procurando ferramentas para consertar o helicóptero e materiais de limpeza, mas acabei encontrando algumas coisas interessantes e, bem..."
2600702-11 = "Ver itens caros sendo deixados de lado sem uso me deixa inquieta... Ahaha..."
2600702-12 = "[s3] \"Você é muito séria, mesmo nas férias.\"\n[s4] \"...Ayane, você não muda nunca.\""
2600702-15 = "E-eu fui estranha de novo, não fui? Sinto muito..."
2600702-16 = "Mesmo pensando sobre isso agora, eu sei que é um pouco estranho... mas não consigo evitar."
2600702-17 = "Já que estamos nas férias... eu sei que deveria tentar esquecer as coisas de Abydos, pelo menos por um tempo..."
2600702-18 = "Hum... eu queria vir ao resort para me divertir, mas acabei vindo vasculhar um depósito..."
2600702-19 = "Pensando bem, é realmente estranho. Desse jeito, acho que não vou conseguir me divertir..."
2600702-20 = "...Hã?"
2600702-21 = "Parece que estou me divertindo o suficiente...? ...Eu?"
2600702-22 = "Eu passei o tempo todo enfiada no depósito... você acha mesmo? Ahaha..."
2600702-23 = "[s5] \"Fazer o que você gosta é o que significa 'se divertir'.\"\n[s6] \"É como se você estivesse fazendo uma 'caça ao tesouro' no depósito.\""
2600702-24 = "...!!"
2600702-25 = "...!!"
2600702-26 = "S-sério?"
2600702-27 = "Fico um pouco aliviada em ouvir você dizer isso, Sensei...!"
2600702-33 = "E-eu... na verdade, mesmo durante esse trabalho, eu não parava de pensar nisso."
2600702-34 = "Tipo... já que viemos ao resort, será que não deveria estar fazendo outras coisas..."
2600702-35 = "Como, já que viemos à praia, talvez devesse nadar. Ou, já que é um resort, deveria aproveitar todas as instalações..."
2600702-36 = "Já que são férias, eu deveria estar fazendo essas coisas,"
2600702-37 = "foi o que eu fiquei pensando o tempo todo..."
2600702-38 = "[s7] \"Sim. Eu imaginei que você estivesse pensando nisso.\"\n[s8] \"Está tudo bem. É por isso que eu vim até aqui.\""
2600702-39 = "...Ah."
2600702-40 = "...Ah."
2600702-41 = "Então você estava preocupado comigo desde aquela nossa conversa no MomoTalk."
2600702-42 = "Acabei fazendo você se preocupar comigo... Ahaha..."
2600702-43 = "...Hã?"
2600702-44 = "Você também veio aqui para... se divertir, Sensei?"
2600702-45 = "O que isso significa..."
2600702-46 = "...Que é mais divertido brincar com duas pessoas do que sozinho...?"
2600702-50 = "Sensei..."
2600702-51 = "Bem, eu realmente não sei como expressar... eu não sou muito boa com palavras..."
2600702-52 = "Isso..."
2600702-53 = "..."
2600702-54 = "...Muito obrigada. Fico feliz."
2600702-58 = "Certo! Já que estamos aqui, que tal fazermos uma caça ao tesouro no depósito juntos?"
2600702-59 = "Vamos competir para ver quem encontra o item mais útil!"
2600702-60 = "[s9] \"Aceito o desafio!\"\n[s10] \"O limite de tempo é de 5 minutos por rodada.\""
2600702-61 = "Fufu, não me subestime! Pode não parecer, mas eu sou a pessoa que mantém o Comitê de Contramedidas funcionando!"
2600702-62 = "Fufu, não me subestime! Pode não parecer, mas eu sou a pessoa que mantém o Comitê de Contramedidas funcionando!"
2600702-63 = "Então, preparar..."
2600702-67 = "...Já!!"
2600702-72 = "(Depois disso, procurei pelos arredores junto com a Ayane)"
2600702-73 = "(Assim que a competição começou, nós duas ficamos suadas procurando por várias coisas, mas...)"
2600702-74 = "(A maioria eram coisas grandes demais para caber no helicóptero...)"
