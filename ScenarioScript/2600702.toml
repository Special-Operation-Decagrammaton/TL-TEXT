[translation]
2600702-1 = "遊ぶという事"
2600702-3 = "あっ先生、ここです！"
2600702-4 = "すみません、来ていただいてしまって……。"
2600702-5 = "[s1] \"大丈夫、気にしないで。\"\n[s2] \"ここはどこ……？\""
2600702-6 = "ありがとうございます……。"
2600702-7 = "……えっと、ここですか？"
2600702-8 = "リゾートの裏です。小さな備品倉庫がありまして……"
2600702-9 = "リゾートの裏です。小さな備品倉庫がありまして……"
2600702-10 = "最初はヘリを整備する道具や掃除道具を探してたら、掘り出し物が見つかってしまって、つい……。"
2600702-11 = "高価なものが使われずに放っておかれてるのを見ると、つい気になっちゃって……あはは……。"
2600702-12 = "[s3] \"バカンスに来ても真面目だね。\"\n[s4] \"……アヤネは相変わらずだね。\""
2600702-15 = "や、やっぱりちょっと変でしたか？すみません……。"
2600702-16 = "改めて自分で考えてもちょっとおかしいとは思ったんですが……なかなか直らなくて。"
2600702-17 = "せっかくのバカンスですし……無理にでもアビドスの事は忘れた方がいいと、分かってはいるんです……。"
2600702-18 = "うーん……せっかくリゾートに来て遊ぼうと思ったのに、ここでも倉庫を漁ってしまうなんて……。"
2600702-19 = "改めて考えるとやっぱりちょっと変ですね。この調子では遊べなくなっちゃいそうです……。"
2600702-20 = "……えっ？"
2600702-21 = "十分遊んでるように見える……？……私が、ですか？"
2600702-22 = "ずっと倉庫に入り浸ってばかりですが……そう見えますか？あはは……。"
2600702-23 = "[s5]\" やりたいことをやるのが「遊ぶ」事だからね。\"\n[s6] \"倉庫で「宝探し」をしてた、みたいな感じじゃないかな。\""
2600702-24 = "……！！"
2600702-25 = "……！！"
2600702-26 = "そ、そうですか？"
2600702-27 = "先生にそう言っていただけて、ちょっとホッとしました……！"
2600702-33 = "わ、私……実はこの作業の最中でも、ずっと気になっていたんです。"
2600702-34 = "その……せっかくリゾートにきたのだから、他にやるべきことがあるんじゃないか、と……"
2600702-35 = "海に来たからには泳いだ方がいいかな、とか。リゾートなんだから施設をめいっぱい使わなきゃ、とか……。"
2600702-36 = "バカンスなんだからそういう事しないと、"
2600702-37 = "ってずっと思っていて……。"
2600702-38 = "[s7] \"うん。そう思ってるのかなって。\"\n[s8] \"大丈夫だよ。だから私もここに来たんだし。\""
2600702-39 = "……あっ。"
2600702-40 = "……あっ。"
2600702-41 = "やっぱり、モモトークの時からずっと気にかけてくださったんですね。"
2600702-42 = "先生に気を遣わせてしまったような……あはは……。"
2600702-43 = "……えっ？"
2600702-44 = "先生も遊びに来た……んですか？"
2600702-45 = "それは一体……。"
2600702-46 = "……一人で遊ぶより、二人で遊んだ方が楽しそう……？"
2600702-50 = "先生……。"
2600702-51 = "えっと、本当に何とお伝えしたらいいか……私、口下手で……。"
2600702-52 = "その……。"
2600702-53 = "……。"
2600702-54 = "……ありがとうございます。嬉しいです。"
2600702-58 = "よし！せっかくなので、今から一緒に倉庫で宝探しをしませんか？"
2600702-59 = "どちらがより使えそうな物を見つけられるか、競争です！"
2600702-60 = "[s9] \"その挑戦、受けてたとう！\"\n[s10] \"制限時間はラウンドごと5分だよ。\""
2600702-61 = "ふふ、甘く見ないでくださいね！こう見えて私だって、対策委員会をどうにか回してきたんですから！"
2600702-62 = "ふふ、甘く見ないでくださいね！こう見えて私だって、対策委員会をどうにか回してきたんですから！"
2600702-63 = "それでは、よ～い……"
2600702-67 = "……スタート！！"
2600702-72 = "（その後アヤネと一緒に周辺を探した）"
2600702-73 = "（いざ競争が始まると、二人とも汗だくでいろんな物を探し出したが……）"
2600702-74 = "（ほとんどがヘリに乗せられないくらい大きなものばかりだった……）"
