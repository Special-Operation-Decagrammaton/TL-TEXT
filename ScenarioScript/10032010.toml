[translation]
10032010-1 = "第1話;仕事の用で"
10032010-5 = "[ns1] \"人が多い……\"\n[ns2] （帰りたい……）"
10032010-8 = "あら、先生じゃない。"
10032010-13 = "まさか、こんな所で会えるなんて……少しビックリしたわ。"
10032010-14 = "……ふふ。でも、驚いたのはお互い様のようね。"
10032010-15 = "[s3] \"……アル？\"\n[s4] \"どうしてここに……\""
10032010-18 = "ふふっ、いかにも先生らしい反応ね。"
10032010-19 = "まあ、先生になら隠す必要も無いでしょう。"
10032010-20 = "……今日は仕事で来たのよ。"
10032010-21 = "依頼の内容は言えないけれど、少し特殊でね。"
10032010-22 = "依頼人の情報もターゲットの情報も、全て極秘扱い。"
10032010-23 = "いくら便利屋68の経営顧問であっても……"
10032010-27 = "べ、別に信頼してないわけじゃないわよ！？#nただ、今は言えないだけで……ほ、ほら！機密保持を結んでるから！"
10032010-28 = "それより、先生こそ何か用事があって来たのかしら？"
10032010-29 = "オペラに興味があるなんて知らなかったけれど……"
10032010-30 = "もしかして、先生も仕事で来たのね？"
10032010-31 = "……聞いてもいいかしら。"
10032010-32 = "[s5] \"私だけ教えないといけないんだ？\"\n[s6] \"さっきの質問に答えてくれたら私も言うよ。\""
10032010-35 = "……？"
10032010-36 = "……！！"
10032010-37 = "あ、いや。その、だからそれは……"
10032010-38 = "……じ、冗談？はぁ、ビックリしたじゃない。"
10032010-39 = "……資料の参考を集めに？"
10032010-40 = "今日上映される劇とオペラハウスに関する教材用BDを作るため……？"
10032010-41 = "どうして先生がそんなことを……"
10032010-42 = "[s7] \"これでも先生だからね……\"\n[s8] \"今回は連邦生徒会に頼まれたんだ。\""
10032010-43 = "あっ。そ、そうだったわね……"
10032010-44 = "何だか拍子抜けというか……"
10032010-45 = "でも良かったわ。それなら、私も安心できたから。"
10032010-46 = "依頼までまだ時間もあるし、せっかくだから……"
10032010-47 = "先生さえ良ければ、オペラハウスを案内しましょうか？"
10032010-48 = "べ、別に他意は無いわよ。#n依頼を完璧に遂行するためにも、事前に調査してあるの。"
10032010-49 = "任せてちょうだい。いつもお世話になってるし、これくらいお安い御用よ。"
10032010-54 = "……それとも、余計なお世話だったかしら？"
10032010-59 = "（……完璧だわ。とても自然な流れね）"
10032010-60 = "（私が先生を引き付けている間に、みんなは捕まえた奴をオペラハウスの外へ連行する）"
10032010-61 = "（依頼の内容がバレたら、先生に叱られるかもしれないし、それに……）"
10032010-62 = "（た、たまにはこういうのも、悪くないし……）"
10032010-67 = "[ns] \"デートのお誘いってことかな？\""
10032010-72 = "で、で、デート……？"
10032010-73 = "べ、別に、そういうわけじゃ……"
10032010-74 = "なくは……"
10032010-75 = "……ち、違うわ！"
10032010-76 = "か、勘違いしないでちょうだい！あくまでビジネスよ！#nうちの経営顧問たる先生をサポートして……"
10032010-77 = "[s9] \"嬉しいよ、アル。\"\n[s10] \"それじゃあ、よろしくね。\""
10032010-87 = "……ふふ、いいわ。"
10032010-88 = "でも、知ってるわよね？#n私みたいなハードボイルドに借りを作ることが、何を意味するのか。"
10032010-89 = "今日のお礼は、後でちゃんと返してもらうんだから。"
10032010-90 = "それじゃ、行きましょう先生。"
10032010-95 = "（すでに準備は終わってるし、ターゲットが現れるまでまだ時間はある。少し寄り道するくらい、別にいいわよね……うふふ）"
10032010-96 = "（だって、せっかく先生に会えたのよ？最近、お互い忙しかったから……）"
10032010-103 = "ふふふ……"
10032010-104 = "気になる所があれば、何でも言ってちょうだい。"
10032010-107 = "なるほど、舞台の裏側を見たいのね。"
10032010-108 = "演者や裏方でもない限り目にする機会は無いでしょうし、いい選択だわ。"
10032010-109 = "普通なら管理人に止められるところだけど……"
10032010-110 = "先生が一緒なら、装置の説明なんかもしてもらえるかもしれないわね。"
10032010-111 = "管理人に声をかけてみるわ。"
10032010-112 = "……うん？"
10032010-113 = "どうして管理人の顔を知っているのかって……？"
10032010-114 = "そ、それはもちろん、依頼の……"
10032010-118 = "こ、細かいことは気にしないでちょうだい。#n案内を受けられるんだから、それでいいじゃない！"
10032010-119 = "えっと……どこに居るのかしら？"
10032010-120 = "たぶん、この辺りに……"
10032010-126 = "居るはずだけど……"
10032010-133 = "……あれ？"
10032010-134 = "[s11] \"上から物音がするような……\"\n[s12] \"……何か揺れてない？\""
10032010-137 = "……振動？……上？"
10032010-146 = "せ、先生！！"
10032010-154 = "先生！だ、大丈夫？怪我は無い！？"
10032010-155 = "……はぁ、良かった。無事だったのね……"
10032010-156 = "……ふぅ、ビックリしたわ。"
10032010-157 = "（それより、天井が崩れてくるだなんて……よりによって、こんなタイミングで……）"
10032010-158 = "こうなると知っていたら、他の場所から案内したのに……"
10032010-159 = "うん？"
10032010-160 = "……知っていたらって？"
10032010-164 = "……あっ。ち、違うのよ！"
10032010-165 = "これは、その……！！"
10032010-166 = "き、奇襲ですか？そう簡単にくたばると思ったんですか！？"
10032010-167 = "消えてください消えてください消えてください消えてください消えてください！！"
10032010-168 = "アル様の計画を邪魔するなんて！大人しく消えてくださいぃぃぃぃぃ！！"
10032010-169 = "……あ。"
10032010-178 = "ま、待って、ハルカ……！社長が静かに始末するよう言ったでしょ……！"
10032010-180 = "くふふ……思ったより騒がしくなってるね。"
10032010-181 = "こんなの先生にバレたら、タダじゃ済まな――"
10032010-184 = "……あれ。"
10032010-189 = "え、ええっ……？"
10032010-190 = "せ、せせ……"
10032010-193 = "……先生？"
10032010-194 = "[s13] \"……やあ。\"\n[s14] \"派手な登場だね。\""
10032010-197 = "えっ、先生……？"
10032010-198 = "もしかして、今の全部聞かれちゃった……？"
10032010-202 = "あちゃー……"
10032010-203 = "ちょっとピンチかも。"
10032010-207 = "はぁ……だから静かにって言ったのに……"
10032010-208 = "……それで。"
10032010-209 = "結局バレちゃったけど、どうするの社長？"
10032010-210 = "……社長？"
10032010-213 = "……アルちゃん、ショックで固まっちゃったみたい。"
10032010-214 = "あ、アル様！ど、どうして……！"
10032010-215 = "どうしてって……"
10032010-217 = "おい、覚悟はできてるんだろうな！"
10032010-221 = "ボスをさらうだなんて、ナメてんのか！"
10032010-222 = "おい！人を集めろ！この間抜け共が白状するまで絞めんぞ！！"
10032010-235 = "ま、間抜け……！？今、アル様に向かってなんて言葉を……！！"
10032010-236 = "……うーん。"
10032010-237 = "ごめん、先生。ちょっと先に解決しないといけない問題があって。"
10032010-238 = "そうだね。もうバレちゃったんだし、しょうがないっか。"
10032010-239 = "怒るのは後にしてもらえないかな、先生？まずは……"
10032010-240 = "[s15] \"うん、事情は後で聞かせてもらうね。\"\n[s16] \"まずはこの場を何とかしようか。\""
10032010-243 = "くふふ、取引成立だね。"
10032010-244 = "ありがとう、先生。じゃあ……"
10032010-245 = "……早く終わらせようか。"
10032010-249 = "死んでくださいぃぃぃぃ！！！"
