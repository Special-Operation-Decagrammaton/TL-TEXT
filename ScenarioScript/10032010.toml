[translation]
10032010-1 = "Episódio 1; Por motivos de trabalho"
10032010-5 = "[ns1] \"Tem muita gente aqui...\"\n[ns2] (Quero ir embora...)"
10032010-8 = "Ora, não é o Sensei?"
10032010-13 = "Quem diria que eu te encontraria em um lugar desses... Fiquei um pouco surpresa."
10032010-14 = "...Hehe. Mas parece que estamos surpresos um com o outro."
10032010-15 = "[s3] \"...Aru?\"\n[s4] \"O que você está fazendo aqui...\""
10032010-18 = "Hehe, essa é uma reação bem típica sua, Sensei."
10032010-19 = "Bem, não há necessidade de esconder de você, Sensei."
10032010-20 = "...Vim aqui a trabalho hoje."
10032010-21 = "Não posso revelar o conteúdo do pedido, mas é um pouco especial."
10032010-22 = "As informações do cliente e do alvo são todas confidenciais."
10032010-23 = "Mesmo sendo você o consultor administrativo da Problem Solver 68..."
10032010-27 = "N-não é que eu não confie em você, tá bom!? #nÉ só que eu não posso falar agora... E, e olha! Eu assinei um termo de confidencialidade!"
10032010-28 = "Mas mudando de assunto, você veio aqui por algum motivo, Sensei?"
10032010-29 = "Eu não sabia que você se interessava por ópera..."
10032010-30 = "Será que você também veio a trabalho?"
10032010-31 = "...Posso perguntar?"
10032010-32 = "[s5] \"Por que só eu tenho que contar?\"\n[s6] \"Se você responder à minha pergunta, eu também conto.\""
10032010-35 = "...?"
10032010-36 = "...!!"
10032010-37 = "Ah, não. É que, por isso..."
10032010-38 = "...B-brincadeira? Ufa, que susto você me deu."
10032010-39 = "...Para coletar material de referência?"
10032010-40 = "Para criar um BD educacional sobre a peça que será exibida hoje e sobre a casa de ópera...?"
10032010-41 = "Por que o Sensei faria algo assim..."
10032010-42 = "[s7] \"Afinal, eu sou o Sensei...\"\n[s8] \"Desta vez, fui solicitado pelo Conselho Estudantil Geral.\""
10032010-43 = "Ah. É, verdade..."
10032010-44 = "Senti um certo anticlímax..."
10032010-45 = "Mas fico feliz. Assim, eu também pude ficar tranquila."
10032010-46 = "Ainda falta tempo para o pedido, então, já que estamos aqui..."
10032010-47 = "Se não se importar, Sensei, quer que eu te guie pela casa de ópera?"
10032010-48 = "N-não tenho segundas intenções, tá? #nPara realizar o pedido com perfeição, eu já fiz uma pesquisa prévia."
10032010-49 = "Pode deixar comigo. Você sempre cuida da gente, isso é o mínimo que posso fazer."
10032010-54 = "...Ou será que foi intromissão da minha parte?"
10032010-59 = "(...Perfeito. O fluxo está bem natural.)"
10032010-60 = "(Enquanto eu distraio o Sensei, o pessoal leva o alvo que capturamos para fora da casa de ópera.)"
10032010-61 = "(Se o conteúdo do pedido for descoberto, o Sensei pode me dar uma bronca, e além disso...)"
10032010-62 = "(A-às vezes, esse tipo de coisa não é tão ruim...)"
10032010-67 = "[ns] \"Isso seria um convite para um encontro?\""
10032010-72 = "E-e-encontro...?"
10032010-73 = "N-não é nada disso..."
10032010-74 = "Quer dizer, não é que..."
10032010-75 = "...N-não é!"
10032010-76 = "N-não entenda errado! É puramente profissional! #nPara apoiar o Sensei, que é o consultor administrativo da nossa empresa..."
10032010-77 = "[s9] \"Fico feliz, Aru.\"\n[s10] \"Então, conto com você.\""
10032010-87 = "...Hehe, tudo bem."
10032010-88 = "Mas você sabe, né? #nO que significa ficar em dívida com alguém \"hard-boiled\" como eu."

10032010-89 = "Você vai ter que me retribuir esse favor depois."
10032010-90 = "Então vamos, Sensei."
10032010-95 = "(A preparação já terminou e ainda falta tempo até o alvo aparecer. Um pequeno desvio não faz mal, né... Ufufu)"
10032010-96 = "(Afinal, não é todo dia que consigo encontrar o Sensei, né? Ultimamente, nós dois temos estado tão ocupados...)"
10032010-103 = "Fufufu..."
10032010-104 = "Se tiver algum lugar que queira ver, é só me dizer."
10032010-107 = "Entendo, você quer ver os bastidores do palco."
10032010-108 = "A menos que você seja um artista ou da equipe técnica, não teria chance de ver, então é uma ótima escolha."
10032010-109 = "Normalmente, o administrador nos impediria, mas..."
10032010-110 = "Se o Sensei estiver comigo, talvez ele até nos explique como os equipamentos funcionam."
10032010-111 = "Vou falar com o administrador."
10032010-112 = "...Hm?"
10032010-113 = "Como eu sei como é o rosto do administrador, você pergunta...?"
10032010-114 = "I-Isso é, claro, por causa do trabalho..."
10032010-118 = "N-Não se preocupe com detalhes. Já que vamos conseguir o tour, não é isso que importa?!"
10032010-119 = "Bem... onde será que ele está?"
10032010-120 = "Provavelmente por aqui..."
10032010-126 = "Deveria estar por aqui, mas..."
10032010-133 = "...Ué?"
10032010-134 = "[s11] \"Parece que tem um barulho vindo de cima...\"\n[s12] \"...Algo não está balançando?\""
10032010-137 = "...Vibração? ...Lá em cima?"
10032010-146 = "S-Sensei!!"
10032010-154 = "Sensei! V-você está bem? Não se machucou!?"
10032010-155 = "...Ah, que bom. Você está a salvo..."
10032010-156 = "...Ufa, que susto."
10032010-157 = "(Mais importante, o teto desabar... logo agora, de todas as horas...)"
10032010-158 = "Se eu soubesse que isso ia acontecer, teria te guiado por outro lugar..."
10032010-159 = "Hm?"
10032010-160 = "...Como assim, 'se soubesse'?"
10032010-164 = "...Ah. N-não é nada disso!"
10032010-165 = "Isso é, tipo, aquilo...!!"
10032010-166 = "U-um ataque surpresa? Vocês acharam mesmo que eu ia cair tão fácil assim!?"
10032010-167 = "Sumam, sumam, sumam, sumam, sumam!!"
10032010-168 = "Como ousam atrapalhar o plano da Aru-sama! Sumam daqui de uma vez!!"
10032010-169 = "...Ah."
10032010-178 = "E-espera, Haruka...! A presidente disse para resolvermos isso silenciosamente, lembra...!"
10032010-180 = "Kufufu... está ficando mais barulhento do que eu pensava."
10032010-181 = "Se o Sensei descobrir isso, não vai sobrar nada de nós—"
10032010-184 = "...Ué."
10032010-189 = "E-eh...?"
10032010-190 = "Se-Sensei..."
10032010-193 = "...Sensei?"
10032010-194 = "[s13] \"...Olá.\"\n[s14] \"Que entrada triunfal, hein?\""
10032010-197 = "Eh, Sensei...?"
10032010-198 = "Será que... você ouviu tudo o que a gente disse?"
10032010-202 = "Ai, ai..."
10032010-203 = "Acho que estamos em apuros."
10032010-207 = "Ah... eu disse para ficarem em silêncio..."
10032010-208 = "...E agora?"
10032010-209 = "No fim das contas, a gente foi descoberta. O que vamos fazer, presidente?"
10032010-210 = "...Presidente?"
10032010-213 = "...A Aru-chan parece que travou de choque."
10032010-214 = "A-Aru-sama! P-por que...!"
10032010-215 = "Como assim, por que..."
10032010-217 = "Ei, espero que esteja preparado!"
10032010-221 = "Sequestrar a nossa chefe? Tá achando que a gente é idiota?!"
10032010-222 = "Ei! Reúnam o pessoal! Vamos apertar esses idiotas até eles confessarem tudo!!"
10032010-235 = "I-Idiotas...!? Como ousa dizer isso para a Aru-sama...!!"
10032010-236 = "……Hmm."
10032010-237 = "Desculpe, Sensei. Tenho um problema que preciso resolver primeiro."
10032010-238 = "É verdade. Já que descobriram, não tem jeito."
10032010-239 = "Pode deixar para ficar bravo depois, Sensei? Primeiro..."
10032010-240 = "[s15] \"Certo, vou querer ouvir a explicação depois.\"\n[s16] \"Primeiro, vamos resolver a situação aqui.\""
10032010-243 = "Kufufu, negócio fechado então."
10032010-244 = "Obrigada, Sensei. Então..."
10032010-245 = "……Vamos acabar logo com isso."
10032010-249 = "Morraaaaaa!!!"
