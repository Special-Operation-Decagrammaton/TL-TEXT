[translation]
2004402-1 = "Trabalho de meio período no estádio"
2004402-2 = "（Combinei com a Sumire e vim ao estádio de atletismo）"
2004402-3 = "（Agora é um horário em que não está muito cheio）"
2004402-8 = "Estava à sua espera, Treinador!"
2004402-9 = "[s] \"Está trabalhando?\""
2004402-10 = "Sim. Peço desculpas por estar de uniforme."
2004402-11 = "Agora estou entregando bebidas para o pessoal nas arquibancadas."
2004402-12 = "Trabalhar com um visual diferente do habitual..."
2004402-13 = "Isso traz uma sensação de frescor."
2004402-14 = "É uma experiência bem diferente da academia de sempre, mas,"
2004402-15 = "estou aproveitando este momento."
2004402-16 = "Bem, Treinador, aceite um copo também."
2004402-23 = "（Recebi a bebida da Sumire e tomei um gole）"
2004402-31 = "[ns1] \"A propósito, sobre esse trabalho...\"\n[ns2] \"Como assim ele também serve como treino?\""
2004402-34 = "Você se lembrou disso? Como esperado do Treinador!"
2004402-38 = "Hm? Você não fez uma cara estranha agora há pouco...? Bem, deve ter sido impressão minha."
2004402-39 = "Explicando..."
2004402-40 = "Este dispensador de bebidas tem um peso considerável!"
2004402-41 = "[s] \"E-entendi!?\""
2004402-42 = "Bem... em suma, é necessário manter a forma correta ao se mover."
2004402-43 = "Isso é o básico do básico no treinamento."
2004402-44 = "Focar demais no peso faz com que a postura se perca..."
2004402-45 = "Esse é um fenômeno comum em treinos longos, e é o que acaba levando a lesões."
2004402-46 = "Por isso, Treinador, não se esqueça de manter a forma correta durante seus treinos também!"
2004402-47 = "E então..."
2004402-48 = "Trabalhar carregando este dispensador nas costas significa que..."
2004402-49 = "O trabalho de meio período acaba servindo como treinamento!"
2004402-50 = "[s] \"E-entendi!\""
2004402-51 = "Este que estou carregando agora, quando está cheio, pesa cerca de 20 a 25 kg."
2004402-52 = "É um peso perfeito para treinos de resistência de baixa carga e alta repetição!"
2004402-53 = "Além disso, quando recebo um pedido de um cliente, preciso dobrar os joelhos para servir a bebida, então..."
2004402-54 = "Acabo incorporando movimentos de agachamento completo naturalmente!"
2004402-55 = "Dizem que \"agachamento completo faz mal para os joelhos\", mas isso é um preconceito exagerado."
2004402-56 = "Como eu disse antes, se você mantiver a forma correta..."
2004402-57 = "É um exercício que permite treinar o corpo todo de forma equilibrada, evitando lesões."
2004402-58 = "Por isso, na verdade, eu recomendo o agachamento completo na academia."
2004402-59 = "Aquele momento em que seus músculos são testados entre \"desabar ou conseguir levantar mais uma vez\" é... simplesmente irresistível."
2004402-60 = "[s3] \"Eu entendo o que você quer dizer, mas...\"\n[s4] \"O objetivo principal ainda é o trabalho, né...?\""
2004402-63 = "...É verdade. Agora sou uma vendedora de bebidas."
2004402-64 = "Assim como no treino, o que importa é o sorriso e a consideração..."
2004402-65 = "Na academia, no momento em que esses dois faltam..."
2004402-66 = "No dia seguinte, os clientes param de vir!"
2004402-67 = "...E, para este trabalho, ser capaz de suportar o peso do dispensador é um requisito essencial."
2004402-68 = "Dizem que o salário por hora é muito alto e que ainda recebo bônus proporcionais às vendas...!"
2004402-69 = "Não acha que é perfeito para mim?"
2004402-70 = "Com licença, uma bebida, por favor!"
2004402-71 = "Com certeza! Só um momento, por favor. Com licença."
2004402-77 = "Ufa... Com menos gelo também é uma delícia!"
2004402-78 = "Quando estamos com sede, bebidas bem geladas são ótimas, mas..."
2004402-79 = "Elas podem deixar o sistema digestivo lento e atrapalhar a absorção de água. Por isso, recomendo esta opção."
2004402-80 = "Se precisar de mais alguma coisa, não hesite em me chamar. Bem, aproveite o seu tempo."
2004402-87 = "（Sumire corre pelo estádio como um peixe na água...）"
2004402-88 = "（Seu desempenho parece estar sendo muito bem recebido pelos espectadores.）"
2004402-90 = "Quer repetir? Com certeza!"
2004402-91 = "Obrigada, aqui está a sua bebida extra. ...Um atendimento com um sorriso?"
2004402-92 = "Sim, aqui está."
2004402-97 = "O que houve? Parecia estar com dificuldades."
2004402-98 = "Entendo, havia muitas pessoas pedindo e você ficou hesitante."
2004402-99 = "Não precisa se acanhar, pode me chamar!"
2004402-100 = "Eu nunca deixarei de ouvir um pedido!"
2004402-101 = "Sim, aqui está. Tome cuidado para não derramar."
2004402-103 = "Se o dispensador de bebidas é pesado, você pergunta?"
2004402-104 = "Não é problema nenhum. Na verdade, é até um pouco leve demais para mim."
2004402-105 = "Não, é verdade. Quer que eu faça um avanço para demonstrar?"
2004402-106 = "Diz que se sente mal por pedir sem ter feito um pedido? Então, que tal uma bebida?"
2004402-108 = "（Dessa forma, em um piscar de olhos, Sumire...）"
2004402-109 = "（...tornou-se a estrela do estádio!）"
2004402-111 = "Sumire! Podemos tirar uma foto juntos?"
2004402-112 = "Ah? Claro, não me importo, mas..."
2004402-113 = "Fico lisonjeada que tenha se lembrado do meu nome."
2004402-114 = "Sumire, podemos conversar um pouco depois do seu trabalho hoje?"
2004402-115 = "Sinto muito, fui instruída a evitar interações privadas com os clientes. Mas..."
2004402-116 = "Se precisar de conselhos sobre como cuidar do corpo, venha ao clube de treinamento de Millennium a qualquer momento!"
2004402-117 = "Sumire! Por favor, faça uma pose para a câmera!"
2004402-118 = "Uma pose... você quer dizer uma pose de fisiculturismo!"
2004402-119 = "Então, primeiro... Side Chest!"
2004402-123 = "Uooooh! Que definição incrível!"
2004402-127 = "A próxima é... Side Triceps!"
2004402-128 = "Sumire é incrível! A base dela é diferente, olha só essa base!"
2004402-132 = "Por último... Double Biceps!"
2004402-133 = "Sumire, você está com o físico impecável!"
2004402-135 = "（Já não dá para saber se todos vieram assistir à partida ou para ver a Sumire...!）"
2004402-136 = "（Naquele dia, Sumire tornou-se uma lenda do estádio...）"
