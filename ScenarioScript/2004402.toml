[translation]
2004402-1 = "スタジアムのアルバイト"
2004402-2 = "（スミレと予定を合わせて、アスレチックスタジアムに来た）"
2004402-3 = "（いまは、混雑してない時間帯だ）"
2004402-8 = "お待ちしておりました、トレーナー！"
2004402-9 = "[s] \"バイト中？\""
2004402-10 = "ええ。制服で失礼します。"
2004402-11 = "今は観客席の皆さんに、ドリンクをお届けしているんです。"
2004402-12 = "いつもとは違う格好で働く……。"
2004402-13 = "これはこれで、新鮮な感覚ですね。"
2004402-14 = "普段のジムとはまた異なる体験ですが、"
2004402-15 = "この時間を楽しんでいます。"
2004402-16 = "では、トレーナーも一杯どうぞ。"
2004402-23 = "（スミレからドリンクを受け取り、一口飲んだ）"
2004402-31 = "[ns1] \"ところで、そのアルバイトが……\"\n[ns2] \"トレーニングにもなるってどういうこと？\""
2004402-34 = "覚えてくれていたとは、さすがトレーナーです！"
2004402-38 = "うん？なんか変な顔をしませんでしたか……？まぁ気のせいとしましょう。"
2004402-39 = "説明しますと――"
2004402-40 = "このドリンクサーバー、そこそこの重さがありまして！"
2004402-41 = "[s] \"う、うん！？\""
2004402-42 = "えっと……つまり、正しいフォームでの動きが求められるんです。"
2004402-43 = "これはトレーニングの基本中の基本ですね。"
2004402-44 = "重量を意識するあまり、フォームが崩れていく――"
2004402-45 = "長時間のトレーニングでよく見られる現象ですが、それが怪我に繋がってしまうのです。"
2004402-46 = "なので、トレーナーも、トレーニングの際は正しいフォームを忘れないでくださいね！"
2004402-47 = "そして――"
2004402-48 = "このドリンクサーバーを背負って働くということは、つまり！"
2004402-49 = "アルバイトがトレーニングを兼ねるわけです！"
2004402-50 = "[s] \"な、なるほどね！\""
2004402-51 = "今背負っているこれが、容量満タンの状態で、およそ20～25kgでしょうか。"
2004402-52 = "これが、低負荷・高回数の持久力トレーニングにはちょうどいい重さでして！"
2004402-53 = "さらに、お客様から注文が入ったときは、膝を曲げてドリンクを注ぐので――"
2004402-54 = "自然とフルスクワットの動きを取り入れられるんです！"
2004402-55 = "「フルスクワットは膝に悪い」との声もありますが、それは偏見がすぎます。"
2004402-56 = "さきほども言ったように、正しいフォームを維持すれば──"
2004402-57 = "怪我を避けつつ、全身をバランス良く鍛えられるメニューです。"
2004402-58 = "なので、むしろ私はジムではフルスクワットを推奨していますね。"
2004402-59 = "「崩れ落ちるか、もう一度立ち上がれるか」を筋肉から問われる瞬間は……たまらないものがありますから。"
2004402-60 = "[s3] \"言ってることはわからないでもないけど……。\"\n[s4] \"あくまで、目的はアルバイトだよね……？\""
2004402-63 = "……そうでした。私は今、ドリンクの売り子です。"
2004402-64 = "トレーニングと同様、大切なのは、笑顔と思いやり……。"
2004402-65 = "ジムでもこの２つが欠けた瞬間……。"
2004402-66 = "次の日から、お客様が来なくなってしまいます！"
2004402-67 = "……そして、このアルバイトでは、ドリンクサーバーの重さに耐えられることが必須条件になっていまして。"
2004402-68 = "時給がとても高く、売上に比例して追加の手当てまで出るのだとか……！"
2004402-69 = "まさに、私に最適だと思いませんか？"
2004402-70 = "すみませーん、ドリンクお願いします〜！"
2004402-71 = "かしこまりました！ 少々お待ちください。それでは失礼します。"
2004402-77 = "ふぅ……氷の量控えめも、美味しいですね！"
2004402-78 = "喉が渇いたときは、冷え切った飲み物も美味しいですが……。"
2004402-79 = "胃腸の働きを鈍らせ、水分の吸収を妨げることもあります。だから、こちらをおすすめしているんですよ。"
2004402-80 = "また何かありましたら、気軽にお声がけください。では、ごゆっくり。"
2004402-87 = "（スミレはまるで水を得た魚のようにスタジアムを駆け巡り……）"
2004402-88 = "（その仕事ぶりは、観客からも好評なようだ）"
2004402-90 = "おかわりですか？どうぞ！"
2004402-91 = "ありがとうございます、追加のドリンクになります。……笑顔のサービス？"
2004402-92 = "はい、どうぞ。"
2004402-97 = "どうしましたか？お困りのようでしたので。"
2004402-98 = "なるほど、注文する人が多く、躊躇われていたんですね。"
2004402-99 = "遠慮せず、お声がけください！"
2004402-100 = "決して聞き逃しませんから！"
2004402-101 = "はい、どうぞ。こぼさないようお気を付けください。"
2004402-103 = "ドリンクサーバーが重くないか、ですか？"
2004402-104 = "まったく問題ありません。むしろ少し物足りないくらいです。"
2004402-105 = "いえ、本当ですよ。このままフォワードランジをしてみせましょうか？"
2004402-106 = "注文もしていないのに悪い、ですか。では一杯いかがでしょう？"
2004402-108 = "（こうして、スミレはまたたく間に……）"
2004402-109 = "（スタジアムのスターになっていた！）"
2004402-111 = "スミレさん！一緒に写真いいですか？"
2004402-112 = "えっ？もちろん構いませんが……。"
2004402-113 = "私の名前を覚えてくださっていたなんて、恐縮です。"
2004402-114 = "スミレさん、今日のアルバイト後に少しお話しできませんか？"
2004402-115 = "すみません、お客様とのプライベートな交流は控えるよう言われているんです。ですが――"
2004402-116 = "体作りのご相談があれば、いつでもミレニアムのトレーニング部に来てください！"
2004402-117 = "スミレさん！カメラに向かってポーズお願いします！"
2004402-118 = "ポーズ……ボディビルのポージングのことですね！"
2004402-119 = "では、まず……サイドチェスト！"
2004402-123 = "うおおお！キレキレだ！"
2004402-127 = "次は……サイドトライセップス！"
2004402-128 = "スミレさんかっこいい！土台が違う土台が！"
2004402-132 = "最後に……ダブルバイセップス！"
2004402-133 = "スミレさん、超仕上がってるよ！"
2004402-135 = "（もはや、みんな試合を見に来たのか、スミレを見に来たのか分からない……！）"
2004402-136 = "（その日、スミレはスタジアムの伝説となった……）"
