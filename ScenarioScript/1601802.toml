[translation]
1601802-1 = "A visita da capitã"
1601802-3 = "[ns1] \"Amooooor!!\"\n[ns2] \"Bem-vinda ao Schale!!!!\""
1601802-6 = "C-cala a boca! Por que você tem que gritar desse jeito?!"
1601802-7 = "[s3] \"A Love veio ao Schale...!\"\n[s4] \"Hoje é o dia comemorativo da Love!!\""
1601802-10 = "H-hã!? Q-que história é essa de dia comemorativo!!?"
1601802-11 = "E por que você está no saguão? #nTinha algum trabalho para fazer aqui?"
1601802-12 = "[s] \"Hm? Eu vim correndo do escritório.\""
1601802-13 = "Você é um cachorrinho, por acaso?!"
1601802-14 = "E se você tropeçar e se machucar, como é que fica?!"
1601802-15 = "Haa... é legal que você me receba bem, mas..."
1601802-16 = "Sensei, tipo... isso."
1601802-17 = "Você não se importa com o que os outros vão pensar?"
1601802-18 = "[s5] \"Eu estava com uma aparência estranha?\"\n[s6] \"Essa roupa é a minha favorita, mas...\""
1601802-21 = "N-não é isso!"
1601802-22 = "Sensei, você não deveria ser um exemplo para os alunos?"
1601802-23 = "Você tem contatos com o Conselho Estudantil e com a Valkyrie, não tem?"
1601802-24 = "Por isso..."
1601802-25 = "Eu estava perguntando se está tudo bem você ficar andando com uma delinquente como eu."
1601802-26 = "[s] \"E o que tem isso?\""
1601802-27 = "Não, é que..."
1601802-28 = "Haa... esquece, você não pensa em nada mesmo, né, Sensei."
1601802-29 = "[s] \"A Love é uma garota muito boa, sabe?\""
1601802-30 = "Hã!?"
1601802-31 = "[s7] \"Você usa palavras educadas quando entra em contato.\"\n[s8] \"Você se preocupa com os outros.\"\n[s9] \"E até se preocupa para que eu não tropece!\""
1601802-35 = "P-por que você está dizendo isso do nada!?"
1601802-36 = "Isso é o básico! O quanto você acha que eu sou uma pessoa ruim!?"
1601802-37 = "...Bem, se para você está tudo bem, então tudo bem."
1601802-38 = "Mas, ainda assim, ficar aqui por muito tempo é meio..."
1601802-39 = "Bom, até mais. E não corra nas escadas."
1601802-40 = "Obrigada pela recepção."
1601802-41 = "[ns10] (Levar Love ao Schale)\n[ns11] (Levar Love ao Schale)"
1601802-45 = "Q-que foi!?"
1601802-46 = "[s12] \"Vou mostrar o Schale...\"\n[s13] \"para a minha aluna que tanto me orgulha!\""
1601802-49 = "Schale!? A-agora!?"
1601802-50 = "[s] \"Quer que eu te carregue nas costas?\""
1601802-51 = "O que você está dizendo, seu idiota!"
1601802-52 = "Me mostra o lugar normalmente!"
1601802-54 = "(E assim, mostrei o Schale para a Love...)"
1601802-55 = "(Passamos um tempo divertido)"
