[translation]
1002002-1 = "何考えてるの？"
1002002-2 = "（コハルに呼ばれた場所は、図書館や教室ではなく、ショッピングモールだった）"
1002002-3 = "（「勉強のため」と言っていたはずだけど……？）"
1002002-4 = "……き、来たんだ。先生。"
1002002-5 = "時間通りに来るんだ、ふーん……？"
1002002-6 = "……ん？"
1002002-7 = "どうして勉強なのに、ショッピングモールに来たのか……って？"
1002002-8 = "そ、それは……！"
1002002-9 = "え？ついでに遊びに……？"
1002002-10 = "ち、違う！そうじゃなくて……。"
1002002-11 = "普通に、今回の結果もちょっとギリギリで……。"
1002002-12 = "せっかくなら先生に教えてもらった方が、分かりやすいって聞いたし……。"
1002002-13 = "せ、先生なんでしょ？補習授業くらい……"
1002002-14 = "……え、そういう話じゃない？"
1002002-15 = "場所……？"
1002002-16 = "教室か図書館がいいんじゃないのって……！？"
1002002-17 = "も、もっと人がいない静かな場所の方が……！！？"
1002002-18 = "……。"
1002002-20 = "さ、最っ低！何言ってるの！？ダメ、そんなの絶対にダメ！！"
1002002-21 = "そんなやらしい場所に、私がほいほい行くとでも思った！？"
1002002-22 = "[s1] \"……え？\"\n[s2] \"やらしい場所……？\""
1002002-23 = "や、やっぱり人が多い場所に呼んで正解だった！"
1002002-24 = "や、やっぱり人が多い場所に呼んで正解だった！"
1002002-25 = "他の子ならともかく、私には通じない！本でそういうの何度も読んだんだから！"
1002002-26 = "人のいない教室、机の上……それに、窓際とかでもあんなことやこんなことを……！"
1002002-27 = "と、図書館だってそう！奥の方だからとか言って、棚と棚の見えにくい隙間でそういう不健全な……！"
1002002-28 = "全部知ってる！私はそう簡単に引っかからないんだから！"
1002002-29 = "[s3] \"……？\"\n[s4] どういう本で読んだのか教えてほしいと言う。"
1002002-30 = "……。"
1002002-31 = "……。"
1002002-32 = "え、もしかして本当にその通りのことを……？"
1002002-33 = "[s5] \"……？？？\"\n[s6] \"見せられない本ってこと……？\""
1002002-34 = "そ、その、えっと……。"
1002002-35 = "そ、その、えっと……。"
1002002-36 = "……。"
1002002-37 = "……う、うるさい！！"
1002002-38 = "最低！変態！変態っ！！！"
1002002-40 = "（……）"
1002002-41 = "（コハルは背を向けて、どこかへ走り去ってしまった）"
1002002-42 = "[s] \"……？？？？\""
1002002-44 = "（……結局、どんな本を読んだのかは教えてくれなかった）"
