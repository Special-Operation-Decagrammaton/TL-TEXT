[translation]
1002002-1 = "O que você está pensando?"
1002002-2 = "（O lugar para onde Koharu me chamou não foi a biblioteca nem a sala de aula, mas sim um shopping center.）"
1002002-3 = "（Ela não tinha dito que era para \"estudar\"...?）"
1002002-4 = "……V-você veio, Sensei."
1002002-5 = "Veio na hora certa, hein...?"
1002002-6 = "……Hm?"
1002002-7 = "Por que viemos ao shopping se era para estudar... você pergunta?"
1002002-8 = "I-isso é...!"
1002002-9 = "Hã? Para aproveitar e passear...?"
1002002-10 = "N-não! Não é nada disso..."
1002002-11 = "É que, como sempre, meus resultados desta vez ficaram bem no limite..."
1002002-12 = "E ouvi dizer que é mais fácil entender quando o Sensei explica..."
1002002-13 = "V-você é o Sensei, não é? O mínimo que pode fazer é uma aula de reforço..."
1002002-14 = "……Hã, não é disso que estamos falando?"
1002002-15 = "O lugar...?"
1002002-16 = "Você está dizendo que uma sala de aula ou a biblioteca seriam melhores...!?"
1002002-17 = "Um lugar mais silencioso e sem ninguém seria...!!?"
1002002-18 = "……."
1002002-20 = "S-seu pervertido! O que você está dizendo!? Não, isso é absolutamente proibido!!"
1002002-21 = "Você achou mesmo que eu iria te seguir para um lugar indecente desses!?"
1002002-22 = "[s1] \"……Hã?\"\n[s2] \"Lugar indecente...?\""
1002002-23 = "A-ainda bem que eu te chamei em um lugar cheio de gente!"
1002002-24 = "A-ainda bem que eu te chamei em um lugar cheio de gente!"
1002002-25 = "Pode até funcionar com outras garotas, mas comigo não! Eu já li sobre esse tipo de coisa várias vezes nos meus livros!"
1002002-26 = "Sala de aula vazia, em cima da mesa... e até perto da janela, fazendo isso e aquilo...!"
1002002-27 = "E na biblioteca também! Dizendo que é no fundo, entre as estantes, em um vão escondido, fazendo coisas impuras assim...!"
1002002-28 = "Eu sei de tudo! Não vou cair na sua lábia tão facilmente!"
1002002-29 = "[s3] \"……?\"\n[s4] Perguntar que tipo de livro ela leu."
1002002-30 = "……."
1002002-31 = "……."
1002002-32 = "Hã, será que você realmente faz esse tipo de coisa...?"
1002002-33 = "[s5] \"……？？？\"\n[s6] \"É um livro que você não pode mostrar...?\""
1002002-34 = "I-isso, bem, é que..."
1002002-35 = "I-isso, bem, é que..."
1002002-36 = "……."
1002002-37 = "……C-cala a boca!!"
1002002-38 = "Seu pervertido! Tarado! Tarado!!!"
1002002-40 = "（……）"
1002002-41 = "（Koharu virou as costas e saiu correndo para algum lugar.）"
1002002-42 = "[s] \"……？？？？\""
1002002-44 = "（……No fim, ela não me contou que tipo de livro tinha lido.）"
