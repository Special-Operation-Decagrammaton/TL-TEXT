[translation]
10013005-1 = "Prólogo; O verão ainda não acabou"
10013005-9 = "Sensei, chegamos!"
10013005-10 = "[s1] \"Obrigado por me trazer, Ayane.\"\n[s2] \"Sinto muito, já que você também está ocupada.\""
10013005-13 = "Não há de quê! O senhor sempre cuida muito bem de nós, Sensei."
10013005-14 = "Além disso, eu prometi a todos... que levaria o Sensei em segurança até o Schale."
10013005-15 = "……Quer dizer, agora não é hora de conversa fiada. #nProfessor, pegue sua bagagem e vamos logo para o escritório――"
10013005-19 = "――Ué? Tem alguém na entrada……"
10013005-20 = "[s] \"Hã?\""
10013005-26 = "Ora, ora, Sensei. Por acaso você acabou de voltar das férias?"
10013005-27 = "E ainda por cima acompanhado de uma garota tão fofa?"
10013005-28 = "S-sim!? F-f-fofa…… você disse!?"
10013005-29 = "Nfufu, essa reação inocente. Me faz lembrar de quando conheci a Kaho pela primeira vez."
10013005-30 = "Sério, é adorável."
10013005-31 = "[s] \"N-Niya……?\""
10013005-32 = "Poxa, Niya. Você está deixando o Sensei e a aluna ao lado dele sem jeito. #nPor favor, não se esqueça do objetivo de hoje."
10013005-33 = "Nyahaha~, perdão, perdão. #nÉ que eu acabei me empolgando~."
10013005-34 = "[s] \"A Mimori também estar aqui…… é uma combinação um tanto incomum, não é?\""
10013005-35 = "Bem, chega de conversa fiada."
10013005-36 = "――Viemos até aqui porque temos algo para consultar formalmente como Hyakkiyako."
10013005-37 = "Nããão!! Sensei! É uma emergência!"
10013005-38 = "A presidente……! A presidente e a Umika estão……!!"
10013005-39 = "[s] \"Até a Phina!? O que aconteceu com a Shizuko?\""
10013005-40 = "É que… parece que a Shizuko-chan está em uma situação terrível……"
10013005-41 = "[s] \"Vou até a Hyakkiyado para falar com a Shizuko em detalhes……\""
10013005-42 = "Se for a Shizuko, ela não está na Hyakkiyado agora."
10013005-43 = "A presidente foi para o mar!"
10013005-44 = "[s] \"…………O mar?\""
10013005-45 = "Sim. Pelo que ouvi, a Shizuko agora está――"
10013005-46 = "No \"Lost Paradise Resort\"? Parece que ela está lá……"
10013005-47 = "[s] \"\"Lost Paradise Resort\"? Acho que já ouvi esse nome em algum lugar……\""
10013005-49 = "Sensei…… esse não é o resort onde estávamos até agora pouco?"
10013005-50 = "[s] \"……Hã?\""
10013005-55 = "Pessoal, já podem descer."
10013005-58 = "Chegamos."
10013005-59 = "Então este é o \"Lost Paradise Resort\"……"
10013005-60 = "Para ser exata, não é bem assim……"
10013005-61 = "[s] \"Mesmo com toda a correria em Abydos…… muito obrigado, Ayane.\""
10013005-62 = "Não há de quê! Eu também já estava pensando em voltar mesmo. #nSó não esperava que fosse voltar acompanhada do Sensei novamente……"
10013005-66 = "Parece que todos chegaram em segurança~♪"
10013005-67 = "[s] \"Sim, chegamos. ……Embora a Niya não tenha vindo.\""
10013005-68 = "Nyahaha~♪ Bem, eu entendo o desejo do Sensei de passar um tempo caloroso comigo."
10013005-69 = "Mas, como chefe do Departamento Yin-Yang, não posso simplesmente abandonar meu posto."
10013005-70 = "Como compensação, a Chise e a Mimori estão aí com você. #nPor favor, transmita o seu amor por mim a elas~."
10013005-71 = "[s] \"Tá bom, tá bom……\""
10013005-72 = "Ahaha……"
10013005-73 = "Isso, eu vou dar o meu melhor no lugar da chefe~."
10013005-75 = "Sensei, me desculpe! A Phina também queria ir junto para ajudar a presidente! Mas――"
10013005-76 = "A Phina tem a missão de proteger o território da Hyakkiyado……!"
10013005-77 = "[s] \"Está tudo bem. Deixe o resto com a gente.\""
10013005-78 = "Sim, Sensei―― digo, Chefe!"
10013005-79 = "A Shizuko deve estar na \"Casa de Praia\" ali."

10013005-80 = "[s] \"\"Casa de Praia\"... é?\""
10013005-89 = "[ns] \"Hã!?\""
10013005-90 = "Parece que algo aconteceu ali."
10013005-94 = "F-forte! Então esse é o poder do tal mentor que está planejando a caça ao resort!"
10013005-95 = "Não dá para subestimar... o Comitê de Operações do Festival de Hyakkiyako!"
10013005-97 = "Já chega! Eu não faço a menor ideia do que vocês estão falando!!"
10013005-98 = "Pois é! Chegam do nada e ficam atrapalhando a loja! O que vocês pensam que estão fazendo?!"
10013005-99 = "É a quinta vez só hoje! Quinta vez! #nA Izuna já está quase perdendo a paciência!"
10013005-101 = "Ainda fingindo demência nessa situação... como esperado do mentor."
10013005-103 = "Vou deixar passar por hoje! Mas não pense que isso acaba aqui!"
10013005-107 = "Por que será... mesmo tendo vencido, não me sinto nada aliviada!?"
10013005-108 = "[s] \"Shizuko?\""
10013005-110 = "Shizuko...!"
10013005-111 = "Olá, Tanuki-san."
10013005-116 = "Hã!? Sensei!? E a Mimori e a Chise também!?"
10013005-117 = "Ah, meu senhor!?"
10013005-118 = "O Sensei de Schale!?"
10013005-119 = "[s] \"Bem... o que aconteceu aqui?\""
10013005-120 = "É que, sabe... ué..."
10013005-121 = "Uaaaaaah!!! Sério mesmo! #nHoje o dia está num nível que a palavra \"difícil\" não consegue descrever!!"
10013005-123 = "Hyakkiyado, Filial do Resort Paraíso Perdido"
10013005-124 = "Quem diria que o meu senhor viria nos visitar!"
10013005-125 = "Será que veio ver a Izuna em ação? Nin-nin!"
10013005-126 = "[s] \"Eu tinha um assunto para tratar. Aliás, por que a Izuna está aqui?\""
10013005-127 = "A Izuna estava fazendo a escolta a pedido da Shizuko-dono!"
10013005-128 = "Com certeza a Shizuko-dono percebeu o potencial da Izuna, que um dia se tornará a ninja mais forte de Kivotos!"
10013005-129 = "Hã?"
10013005-130 = "Ninja é algo que chama atenção,"
10013005-131 = "então eu pedi ajuda pensando que seria bom para a publicidade, mas..."
10013005-132 = "Hã!? Então você não tinha percebido o verdadeiro valor da Izuna!?"
10013005-133 = "(desanimada)"
10013005-134 = "[s] \"A Izuna trabalhando também é uma gracinha.\""
10013005-135 = "V-você acha? Ehehe♪"
10013005-137 = "[s3] \"Falando nisso, ouvi da Niya e da Fina.\"\n[s4] \"Que a Shizuko e a Umika estavam com problemas.\""
10013005-141 = "De fato, problemas é o que não faltam. Na verdade..."
10013005-142 = "Hoje, sofremos 5 tentativas de obstrução comercial! 5 vezes em meio dia!"
10013005-143 = "[s] \"Que azar o de vocês...\""
10013005-144 = "Sim... assim que abrimos a loja hoje, clientes estranhos começaram a aparecer... #nFalando coisas sem sentido como \"Derrotar o detentor dos direitos!\" ou \"Caça ao resort\"..."
10013005-145 = "Será que era algum tipo de festival que eu não conheço?"
10013005-146 = "Não, não! Não tem como ser isso!"
10013005-147 = "[s] \"\"Detentor dos direitos\"... \"Caça ao resort\"...\""
10013005-149 = "Diga-me, Shizuko."
10013005-153 = "Desculpe a pergunta indiscreta, mas... vocês por acaso ganharam algum \"Direito de Uso do Resort\"?"
10013005-154 = "Hã? Não, nós..."
10013005-155 = "Fufufu... #nNa verdade, nós do Comitê de Operações do Festival compramos oficialmente o \"Direito de Uso do Resort\"!"
10013005-156 = "Embora tenha sido apenas como parte de um projeto."
10013005-157 = "[s] \"\"Compraram\"? Então vocês assinaram aquele contrato cheio de brechas?\""
10013005-158 = "Hã? Cheio de brechas? Como assim?"
10013005-159 = "[s] \"Hã?\""
10013005-160 = "Hmm?"
10013005-165 = "Bem... parece que não estamos falando da mesma coisa."
10013005-166 = "Ayane, você sabe de alguma coisa?"
10013005-167 = "Você disse que já veio aqui com o Sensei uma vez."
10013005-168 = "Sobre isso... eu também não sei como explicar essa situação..."
10013005-169 = "Hã? Sensei, você já veio aqui antes?"
10013005-170 = "[s] \"Bem... na verdade, está acontecendo uma 'caça ao resort' por todo este arquipélago.\""
10013005-171 = "Isso é o que aquelas delinquentes estavam falando agora pouco, né?"
10013005-172 = "Bem... aquele contrato tem falhas... #nTem outras pessoas alegando ter direitos também...? Por que...?"
10013005-173 = "(Decidi explicar para a Shizuko, que está confusa, o que está acontecendo aqui agora.)"
10013005-174 = "[s] \"Primeiro, vamos verificar o direito de uso que a Shizuko possui.\""
10013005-176 = "(O contratante deste contrato obtém o 'direito de uso' do 'Lost Paradise Resort'.)"
10013005-177 = "(O 'direito de uso' acima mencionado refere-se à autoridade sobre todas as terras, acessórios e instalações dentro do resort, #ne também a posse de todos os lucros e recursos obtidos por meio disso.)"
10013005-178 = "(O proprietário do contrato terá todos esses direitos garantidos.)"
10013005-179 = "...Bem, o conteúdo do contrato foi acordado corretamente, mas... #nOnde exatamente estão as falhas?"
10013005-180 = "[s] \"O problema é que esse contrato... várias pessoas, incluindo as delinquentes de biquíni, também possuem um.\""
10013005-181 = "(Contei que a Serika ganhou o 'direito de uso do resort' em um sorteio em Abydos, #ne que o Grupo do Capacete também tinha algo parecido.)"
10013005-182 = "(O contrato, que inicialmente parecia limitado apenas à ilha, na verdade inclui os direitos de todo o arquipélago do 'Lost Paradise Resort'.)"
10013005-183 = "Ou seja... se o que o Sensei diz estiver correto, no 'Lost Paradise Resort' #nhá outras pessoas além de nós que possuem o mesmo contrato e..."
10013005-184 = "Elas perceberam as falhas no contrato e estão fazendo essa 'caça ao resort' para reivindicar seus próprios interesses!?"
10013005-185 = "Não, isso não faz o menor sentido! #nQuer dizer, como o Sensei sabe de tudo isso..."
10013005-186 = "[s] \"Até agora pouco, eu estava envolvido nessa confusão com a Ayane e as outras...\""
10013005-190 = "[ns] (Pensando bem, a Shiroko e as outras ainda devem estar em algum lugar deste arquipélago...)"
10013005-197 = "Uau! Mais um ataque inimigo!?"
10013005-202 = "Quem é agora!? Essa já é a sexta vez!?"
10013005-208 = "Oii, todo mundo, se reúnam."
10013005-209 = "Vamos aparecer todos juntos, amigavelmente!☆"
10013005-210 = "[s] \"A-aquilo é...!!\""
10013005-212 = "Finalmente encontramos vocês! As responsáveis pela 'caça ao resort'!"
10013005-213 = "São vocês do Comitê de Operações de Festivais da Academia Hyakkiyako? #nVocês vão pagar pelo que fizeram ao nos enganar!"
10013005-214 = "Sim, isso é... um julgamento de justiça."
10013005-215 = "Fufu☆ É um julgamento de 'justiça'~."
10013005-217 = "Então, pessoal. Estão prontas?"
10013005-218 = "Sim, vamos nessa!!"
10013005-220 = "………………Hã?"
10013005-221 = "Eeeeeeh!? Espera, essas são as veteranas, não são!?"
10013005-227 = "[ns] \"...Meu Deus, não entendo mais nada...\""
10013005-233 = "Isso é..."
10013005-234 = "Que tipo de situação é essa, afinal de contas!?"
10013005-236 = "#video;10013"
