[translation]
10013005-1 = "プロローグ;夏はまだ終わらない"
10013005-9 = "先生、着きましたよ！"
10013005-10 = "[s1] \"送ってくれてありがとう、アヤネ。\"\n[s2] \"そっちも忙しいのに、ごめんね。\""
10013005-13 = "とんでもないです！先生にはいつもお世話になっていますから。"
10013005-14 = "それに、みんなと約束しましたし……先生を無事にシャーレまで送り届けるって。"
10013005-15 = "……って、今は無駄話をしている場合じゃありませんでした。#n先生、荷物を持ってすぐオフィスに――"
10013005-19 = "――あれ？入口に誰かいますね……"
10013005-20 = "[s] \"えっ？\""
10013005-26 = "あら～先生。ひょっとして、今休暇から帰ってきたところです？"
10013005-27 = "しかもこ～んなかわいい子と一緒に？"
10013005-28 = "は、はい！？か、か、かわいい……ですか！？"
10013005-29 = "んふふ、その初々しい反応。初めてカホと会った時を思い出すわぁ。"
10013005-30 = "ほんと、可愛らしい。"
10013005-31 = "[s] \"ニ、ニヤ……？\""
10013005-32 = "もう、ニヤさん。先生と隣の生徒さんが困ってるじゃないですか。#n今日の目的をどうかお忘れなく。"
10013005-33 = "にゃはは～、ごめんごめん。#nつい楽しくなってしまって～。"
10013005-34 = "[s] \"ミモリも一緒って……なんだか珍しい組み合わせだね。\""
10013005-35 = "まあ、雑談はこれくらいにして。"
10013005-36 = "――百鬼夜行として正式に相談したいことがあり、こちらに参った次第です。"
10013005-37 = "ノォォォォ！！センセイ！大変デース！"
10013005-38 = "委員長が……！委員長とウミカがぁぁぁあ！！"
10013005-39 = "[s] \"フィーナまで！？シズコに何かあったの？\""
10013005-40 = "それがですね…シズコちゃんがどうやら大変な事になっているらしく……"
10013005-41 = "[s] \"百夜堂に行ってシズコに詳しい話を……。\""
10013005-42 = "シズコさんなら、いま百夜堂にはいませんよ。"
10013005-43 = "委員長は海に行きマシタ！"
10013005-44 = "[s] \"…………海？\""
10013005-45 = "ええ。聞いた話ですが、シズコさんは今――"
10013005-46 = "「ロスト・パラダイス・リゾート」？だったかにいるらしく……"
10013005-47 = "[s] \"「ロスト・パラダイス・リゾート」？どこかで聞いたような……。\""
10013005-49 = "先生……そこって、さっきまで私たちがいたリゾートじゃないですか？"
10013005-50 = "[s] \"……えっ？\""
10013005-55 = "皆さん、もう降りて大丈夫ですよ。"
10013005-58 = "とうちゃ～く。"
10013005-59 = "ここが「ロスト・パラダイス・リゾート」ですか……。"
10013005-60 = "正確にはちょっと違うんですけどね……。"
10013005-61 = "[s] \"アビドスの件で大変なのに……本当にありがとう、アヤネ。\""
10013005-62 = "いえいえ！私もちょうど戻らなきゃと思っていたところでしたので。#nまたこうして先生と一緒に戻る事になるとは思いませんでしたが……。"
10013005-66 = "みなさん、無事に到着したみたいですね～♪"
10013005-67 = "[s] \"うん、到着したよ。……ニヤは来なかったけどね。\""
10013005-68 = "にゃはは～♪まあ、私とアツ～い時間を過ごしたいという先生のお気持ちはわからなくもないですが。"
10013005-69 = "陰陽部の部長である以上、おいそれと席を外すわけにはいきませんからねぇ。"
10013005-70 = "代わりと言ってはなんですが、チセとミモリさんが一緒なわけですし。#n私への愛はそのお二人に伝えてくださいな～。"
10013005-71 = "[s] \"はいはい……。\""
10013005-72 = "アハハ……"
10013005-73 = "うん、部長の代わりにがんばるね～。"
10013005-75 = "センセイ、すみマセン！フィーナも委員長を助けるためにご一緒したかったデス！でも――"
10013005-76 = "フィーナには、百夜堂のシマを守るという使命が……！"
10013005-77 = "[s] \"大丈夫だよ。こっちは私たちに任せて。\""
10013005-78 = "はい、センセ――いや、お頭！"
10013005-79 = "シズコさんは、多分そこの「海の家」にいるはずです。"
10013005-80 = "[s] \"「海の家」……か。\""
10013005-89 = "[ns] \"んん！？\""
10013005-90 = "あちらで何かあったみたいですね。"
10013005-94 = "つ、強い！これがリゾート狩りを企んでいるという、例の黒幕の力なんだな！"
10013005-95 = "侮れないな……！百鬼夜行のお祭り運営委員会！"
10013005-97 = "だーかーらー！あなた達が何を言ってるのか、さっぱり分かんないんですけど！！"
10013005-98 = "そうですよ！いきなりやってきてお店の邪魔して！何なんですか！"
10013005-99 = "今日だけで5回目ですよ！5回目！#nイズナも、そろそろ堪忍袋の緒が切れてしまいそうです！"
10013005-101 = "この状況でもとぼけるとはな……さすが黒幕だ。"
10013005-103 = "今回はこの辺で勘弁しておいてやる！だが、これで終わりだと思うなよ！"
10013005-107 = "なんでだろ……勝ったはずなのに、全然スッキリしないんですけど！？"
10013005-108 = "[s] \"シズコ？\""
10013005-110 = "シズコちゃん……！"
10013005-111 = "タヌキさんこんにちは～。"
10013005-116 = "えっ！？先生！？それにミモリとチセも！？"
10013005-117 = "あ、主殿！？"
10013005-118 = "シャーレの先生！？"
10013005-119 = "[s] \"えっと……何があったの？\""
10013005-120 = "それが、その……うぅ……"
10013005-121 = "うわあぁぁぁぁぁぁん！！！ぜん゛ぜぇ゛～！#nほんと、今日は「大変」って言葉じゃ片付かないレベルなんです～！！"
10013005-123 = "百夜堂 ロスト・パラダイス・リゾート支店"
10013005-124 = "まさか、主殿がお越しくださるなんて！"
10013005-125 = "もしかして、イズナの活躍を見に来てくれたんですか？ニンニン！"
10013005-126 = "[s] \"用事があってね。ところで、どうしてイズナがここに？\""
10013005-127 = "イズナはシズコ殿の依頼で護衛をしておりました！"
10013005-128 = "きっとシズコ殿は、将来キヴォトス最強の忍者となるイズナの可能性を見抜いたに違いありません！"
10013005-129 = "えっ？"
10013005-130 = "忍者って目新しいし、"
10013005-131 = "宣伝効果あるかな～と思ってお願いはしたけど……。"
10013005-132 = "へっ！？それじゃあ、イズナの真価を見抜いていたわけではないのですかー！？"
10013005-133 = "（しゅん）"
10013005-134 = "[s] \"バイトをしているイズナも可愛いよ。\""
10013005-135 = "そ、そうですか？えへへっ♪"
10013005-137 = "[s3] \"そういえば、ニヤとフィーナから聞いたよ。\"\n[s4] \"シズコとウミカが大変だって。\""
10013005-141 = "たしかに、大変と言えば大変ですね。実は――"
10013005-142 = "今日、営業妨害が5回！半日で5回もあったんです！"
10013005-143 = "[s] \"それは災難だったね……。\""
10013005-144 = "はい……今日、お店を開けるや否や変なお客様が続々とやってきて……。#n「権利者を倒す！」だの「リゾート狩り」だのとわけの分からない事を……"
10013005-145 = "ひょっとして、私が知らないお祭りとかだったんでしょうか？"
10013005-146 = "いやいや！そんなわけないでしょ！"
10013005-147 = "[s] \"「権利者」……「リゾート狩り」……。\""
10013005-149 = "あの、シズコさん。"
10013005-153 = "つかぬ事をお聞きしますが……「リゾート使用権」などが当たったりしましたか？"
10013005-154 = "え？いや、私たちは……"
10013005-155 = "フッフッフ……。#n実は、私たちお祭り運営委員会は「リゾート使用権」を正式に購入したのです！"
10013005-156 = "あくまで事業の一環として、だけどね。"
10013005-157 = "[s] \"「購入」ということは、あの穴だらけの契約書にサインを？\""
10013005-158 = "え？穴だらけって、どういうことですか？"
10013005-159 = "[s] \"ん？\""
10013005-160 = "んん？"
10013005-165 = "えっと……どうも話が噛み合ってないみたいですね。"
10013005-166 = "アヤネさんは何かご存知ですか？"
10013005-167 = "先生と一度こちらにいらしたと仰ってましたし。"
10013005-168 = "それが……私もこの状況をどう説明すればいいのか……。"
10013005-169 = "えっ？先生、ここに来たことあるんですか？"
10013005-170 = "[s] \"えっと……実は、この群島全体で「リゾート狩り」というのが起きてるんだ。\""
10013005-171 = "それって、さっきのスケバンたちが言っていたヤツですよね？"
10013005-172 = "えっと……あの契約書には不備があって……#n他にも権利を持っていると主張している人がいる……？どうして……？"
10013005-173 = "（混乱しているシズコに、現在ここで起きている事の説明をすることに）"
10013005-174 = "[s] \"まず、シズコが持っている使用権を確認しようか。\""
10013005-176 = "（本契約書の契約者は、「ロスト・パラダイス・リゾート」の「使用権限」を得る）"
10013005-177 = "（上記の「使用権限」とはリゾート内全ての土地、備品及び設備にする権限及び#n　それにより得た全ての収益と資源もまた所有できるものとして）"
10013005-178 = "（契約書の所有者はその全ての権利を保障されるものする）"
10013005-179 = "……えっと、契約内容はちゃんと合意したものですけど……#nどの辺に不備があるんですか？"
10013005-180 = "[s] \"問題はその契約書……水着スケバンを含めて複数人が持っているんだ。\""
10013005-181 = "（アビドスでセリカがくじに当選して「リゾート使用権」を手に入れたこと、#n　そしてヘルメット団も同じようなものを持っていたことを話した）"
10013005-182 = "（最初はまるで島だけに限られた使用権のように見えていた契約書が、実際にはこの#n「ロスト・パラダイス・リゾート」群島全体の権利を含めている契約書であること）"
10013005-183 = "つまり……先生の仰る通りであれば、「ロスト・パラダイス・リゾート」には#n私たち以外にも同じ契約書を持った方が集まっていて――"
10013005-184 = "契約書の不備に気付いて、お互いに自分の利権を主張するため「リゾート狩り」をしているという事ですね！？"
10013005-185 = "いや、それこそ意味がわからないですよ！#nっていうか、先生はどうしてそんなこと――"
10013005-186 = "[s] \"ついさっきまでアヤネ達とその騒動に巻き込まれていて……。\""
10013005-190 = "[ns]（そういえば、この群島のどこかにまだシロコたちが……）"
10013005-197 = "わわっ！また敵襲ですか！？"
10013005-202 = "今度は誰！？これで6回目よ！？"
10013005-208 = "は～い、しゅ～ご～う。"
10013005-209 = "みんなで仲良く！登場です☆"
10013005-210 = "[s] \"あ、あれは……！！\""
10013005-212 = "やっと見つけたわよ！「リゾート狩り」の元凶！"
10013005-213 = "百鬼夜行連合学院のお祭り運営委員会ってのはあんた達？#n私たちを騙したツケ、ここで払ってもらうんだから！"
10013005-214 = "そう、これは……正義の裁き。"
10013005-215 = "ふふ☆「正義」の裁きですよ～。"
10013005-217 = "それじゃあ、みんな。準備はいい～？"
10013005-218 = "ええ、行くわよ！！"
10013005-220 = "………………えっ？"
10013005-221 = "えええええっ！？あ、あれ、先輩たちですよね！？"
10013005-227 = "[ns] \"……もう、何がなんだか……。\""
10013005-233 = "これって……"
10013005-234 = "一体どういう状況なのよぉぉぉぉおお！？"
10013005-236 = "#video;10013"
