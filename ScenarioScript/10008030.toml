[translation]
10008030-1 = "第3話;ドタバタ追撃戦！"
10008030-7 = "待ちなさいよぉぉぉぉっ！！"
10008030-8 = "あはははっ！！待て待て～！"
10008030-9 = "ま、待ってくださいぃぃ……！"
10008030-11 = "はっはっはっ！誰もヒーローを止めることなどできない！"
10008030-16 = "はぁ、はぁ……何あれ、足はっや……。"
10008030-17 = "うーん、このままだと逃げられちゃいそうだけど……アルちゃん、どうする？"
10008030-18 = "あいつら、あんな変な格好して身体能力おかしいでしょう！？"
10008030-19 = "何なのよあいつら！そもそも、何の目的で賽銭箱を……！"
10008030-20 = "「カイテンジャー」って言ったら、キヴォトスでも結構有名なやつらだよ。"
10008030-21 = "「正義のために」って言いながら、あちこちで問題を起こしてるらしいし。"
10008030-22 = "わ、私も少しですが、聞いたことがあります……。"
10008030-23 = "走る速度はマッハ3、そしてキック力は5トンを上回るとか……。"
10008030-24 = "嘘でしょ！？"
10008030-25 = "ほ、本当かどうかは分かりませんが……それと、カイテンジャーにはどうやら、切り札があるとかで……。"
10008030-26 = "いざとなると、巨大ロボット「KAITEN FX」を呼び出すとか……。"
10008030-27 = "へ～。ちなみにハルカちゃん、それどこ情報？"
10008030-28 = "か、カイテンジャーのホームページに……。"
10008030-30 = "ホームページがあるの！？私たち便利屋68にもまだ無いのに！？"
10008030-31 = "あはははっ、何それ！結構本格的じゃん？っていうか少なくとも、私たちよりは本格的かも？"
10008030-32 = "あ、あんな変なやつらに、このまま負けてたまるもんですか！"
10008030-36 = "何よ、この忙しいタイミングで！"
10008030-45 = "そこのお前たち、どうやら我々と同じ獲物を狙っているようだな！"
10008030-46 = "そうはさせるか！"
10008030-48 = "なになに、どういうこと？"
10008030-49 = "あいつら……ヘルメット団？"
10008030-51 = "カイテンジャーが持って行ったあの賽銭箱は、我々の獲物だ！さっさと消えろ！"
10008030-52 = "早い者勝ちだからな、邪魔するなら痛い目見るぜ？"
10008030-53 = "カイテンジャーが華麗に奪ったものを、さらに我々が奪う！"
10008030-54 = "どうだ、この完璧なアイデア！"
10008030-59 = "……ふふっ、「飛んで火にいる夏の虫」とはこのことね。"
10008030-60 = "さっきから走らされてばっかりだし、ちょっと溜まってたのよ。気分転換にはぴったりね。"
10008030-61 = "ムツキ、カヨコ、ハルカ、それにセリカ。"
10008030-68 = "……やるわよ。"
10008030-72 = "ちょっと、私はあんたの部下じゃないんだけど！？"
10008030-73 = "ま、まあやるけどっ！"
