[translation]
10008030-1 = "Episódio 3; Perseguição agitada!"
10008030-7 = "Espere aííííííí!!"
10008030-8 = "Ahahaha!! Espere, espere~!"
10008030-9 = "E-espere, por favor......!"
10008030-11 = "Hahaha! Ninguém pode deter um herói!"
10008030-16 = "Haa, haa... O que é aquilo? Como eles correm rápido..."
10008030-17 = "Hmm, desse jeito eles vão acabar escapando... Aru-chan, o que vamos fazer?"
10008030-18 = "Eles estão com aquelas roupas estranhas e a capacidade física deles não faz sentido, né!?"
10008030-19 = "O que há com eles?! E, para começo de conversa, com que objetivo eles pegaram a caixa de ofertas...!"
10008030-20 = "Esses tais de 'Kaitenger' são bem famosos aqui em Kivotos."
10008030-21 = "Dizem que eles causam problemas por toda parte, alegando que é 'em nome da justiça'."
10008030-22 = "E-eu também ouvi falar um pouco sobre isso..."
10008030-23 = "Dizem que a velocidade de corrida deles é Mach 3 e que a força do chute supera 5 toneladas..."
10008030-24 = "Mentira, né!?"
10008030-25 = "N-não sei se é verdade, mas... além disso, parece que os Kaitenger têm um trunfo..."
10008030-26 = "Dizem que, em situações críticas, eles invocam um robô gigante chamado 'KAITEN FX'..."
10008030-27 = "Heh~. Aliás, Haruka-chan, onde você conseguiu essa informação?"
10008030-28 = "N-no site dos Kaitenger..."
10008030-30 = "Eles têm um site!? E nós da Problem Solver 68 ainda nem temos um!?"
10008030-31 = "Ahahaha, que coisa! É bem profissional, não é? Quer dizer, talvez seja até mais profissional que a gente?"
10008030-32 = "N-não vou deixar que uns caras estranhos como eles ganhem da gente!"
10008030-36 = "O que foi, logo agora que estamos ocupadas!"
10008030-45 = "Vocês aí, parece que estão atrás da mesma presa que nós!"
10008030-46 = "Não vamos deixar!"
10008030-48 = "O que, o que? Como assim?"
10008030-49 = "Eles são... o Grupo do Capacete?"
10008030-51 = "Aquela caixa de ofertas que os Kaitenger levaram é nossa presa! Sumam daqui!"
10008030-52 = "Quem chegar primeiro leva, então se atrapalharem, vão se arrepender!"
10008030-53 = "Nós vamos roubar o que os Kaitenger roubaram com tanta elegância!"
10008030-54 = "O que acham dessa ideia perfeita?"
10008030-59 = "......Fufu, isso é o que chamam de 'cair na própria armadilha'."
10008030-60 = "Já faz um tempo que só estamos correndo, então eu estava acumulando um pouco de estresse. É perfeito para mudar de ares."
10008030-61 = "Mutsuki, Kayoko, Haruka e Serika."
10008030-68 = "......Vamos nessa."
10008030-72 = "Ei, eu não sou sua subordinada, sabia!?"
10008030-73 = "M-mas eu vou fazer isso!"
