[translation]
12180-1 = "第18話;それでも手放さなかったもの（１）"
12180-3 = "みなさん、大丈夫ですか？"
12180-4 = "ん。"
12180-5 = "全っ然大丈夫！"
12180-6 = "先生に教えていただいた座標はもう目の前なので、もう少しの辛抱です……！"
12180-7 = "まだまだ行けますよ～！"
12180-14 = "……っ！"
12180-15 = "前方に敵を発見しました！！"
12180-16 = "距離は2km、もうすぐ接敵します！みなさん、対応の準備を……"
12180-19 = "（ドゴオォォォン！！）"
12180-20 = "！？"
12180-21 = "あれは……。"
12180-22 = "支援射撃？"
12180-23 = "……L118、トリニティの牽引式榴弾砲です！一体どうして……"
12180-27 = "あ、あぅ……わ、私です……。"
12180-28 = "あっ！ヒフ――"
12180-29 = "ち、違います！私はヒフミではなく、ファウストです！"
12180-30 = "……。"
12180-31 = "わあ、ファウストさん！お久しぶりです！ご自分で名前を言っちゃってましたが、そこはご愛嬌ということで☆"
12180-32 = "あ、あれ！？あぅぅ……！"
12180-33 = "その、このL118は、トリニティの牽引式榴弾砲ですが……"
12180-34 = "と、トリニティ総合学園とは一切関係ありません！射撃を担当している皆さんにも、そう伝えておきましたので……。"
12180-35 = "す、すみません、これくらいしかお役に立てず……。"
12180-36 = "ううん、すごく助かった。"
12180-37 = "はい！ありがとうございます、ファウストちゃん！"
12180-38 = "あはは……えっと、みなさん、が、頑張ってください！"
12180-41 = "火力支援の直後に突撃、定石通りだね。"
12180-42 = "はい！敵は砲撃により混乱状態です、今のうちに突破しましょう！"
