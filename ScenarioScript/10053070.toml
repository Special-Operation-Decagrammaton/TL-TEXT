[translation]
10053070-1 = "Episódio 7; A última história de fantasmas"

10053070-3 = "Ah, Konoka-kun, professor. \r\n"

10053070-4 = "Aconteceu alguma coisa? Se fosse um pouco mais tarde, eu teria ido procurar, mas..."

10053070-5 = "Espere um minuto! ? Por que nós dois estamos tão suados? ? O que realmente aconteceu? ? \r\n\r\n"

10053070-10 = "Ah, isso... eu realmente não quero falar sobre isso... É muito ameaçador... \r\n"

10053070-11 = "[ns1] \"Nada...\"\r\n[ns2] \"Muitas coisas...\""

10053070-16 = "Bem, algo aconteceu. \r\n"

10053070-18 = "(Expliquei a eles o que aconteceu na cabine telefônica)"

10053070-19 = "(No final, acabamos falando sobre o ônibus suspeito e a estátua de pedra que vimos no dia anterior.)"

10053070-22 = "Huh! ? Aquele ônibus era um fantasma! ? Por que você não me contou! \r\n\r\n"

10053070-23 = "Afinal, pude ver em seus olhos que você ficou assustado quando eu disse isso... \r\n"

10053070-24 = "É sal! Polvilhe sal! \r\n"

10053070-25 = "Ha! Suor também é sal... mas me pergunto se isso também é eficaz! ?"

10053070-27 = "[ns3] \"Zona cinzenta...eu acho...?\"\r\n[ns4] \"De qualquer forma, quando eu voltar, vou tomar um banho primeiro...\""

10053070-32 = "Se tudo o que acabei de ouvir for verdade, o que os dois vivenciaram deve ser um fenômeno poltergeist."

10053070-33 = "É geralmente conhecido como um fenômeno em que fantasmas movem coisas, mas mudanças não naturais e repentinas de temperatura também são um exemplo típico. \r\n"

10053070-37 = "No entanto, parece estranho. Tenho orgulho que esta área já exista há muito tempo, mas..."

10053070-38 = "Desde que cheguei aqui, experimentei muito mais fenômenos psíquicos do que o número total de fenômenos psíquicos que experimentei até agora. #nA frequência está anormalmente alta. \r\n"

10053070-42 = "Tsubasa também pensava assim."

10053070-43 = "Isso significa que alguém está trabalhando nos bastidores?"

10053070-44 = "foto? Não... eu estava simplesmente dizendo que há uma alta densidade de fenômenos paranormais por aqui."

10053070-45 = "Talvez as ruínas de uma civilização antiga estejam no subsolo aqui, ou talvez haja uma instalação experimental secreta de #n alienígenas. \r\n"

10053070-46 = "Você está dizendo isso seriamente, sim. \r\n"

10053070-50 = "...Esse não é o sétimo prisioneiro? \r\n"

10053070-51 = "Mesmo se você pensar nisso com bom senso, é estranho que coisas inexplicáveis ​​continuem acontecendo uma após a outra. #nNão é mais realista pensar que alguém está fazendo isso intencionalmente?"

10053070-52 = "Não há alguém entre esses sete que poderia fazer algo assim acontecer?"

10053070-57 = "Hmm, estou bem com qualquer coisa, desde que não seja um fantasma... \r\n"

10053070-58 = "Há uma pessoa que poderia ter planejado até aqui."

10053070-59 = "Esta é a mesma pessoa de quem você estava falando outro dia? \r\n"

10053070-60 = "...O problema é que esse é o caso."

10053070-61 = "Ugh...por alguma razão, Tsuchinoko está em um lugar como este... \r\n"

10053070-62 = "Ou é o contrário? Existe um Tsuchinoko em um lugar como este? ?"

10053070-68 = "Ah, o táxi está aqui!"

10053070-72 = "とりあえず山小屋に戻って、それから改めて考えを――\r\n"
10053070-76 = "...? \r\n"

10053070-79 = "...? ? ? ?"

10053070-81 = "Ei, cola! Você apenas tem que ser paciente! \r\n"

10053070-82 = "Não é de alguma forma uma mistura de várias coisas?"

10053070-83 = "Neste ponto, estou mais chocado do que assustado..."

10053070-84 = "Eles ameaçaram me dar uma multa mesmo eu não querendo andar! ! \r\n"

10053070-85 = "Se eu não gostar, disparo a arma e destruo! ! \r\n"

10053070-86 = "Se você pensar com bom senso, quem cavaria 8 metros e enterraria? ! \r\n"

10053070-89 = "Por alguma razão, ele parece extremamente irritado... \r\n\r\n"

10053070-90 = "O que você quer dizer com bom senso? \r\n\r\n\r\n"

10053070-91 = "Não importa o quanto Konoka seja, é melhor ter medo ――\r\n\r\n\r\n\r\n"

10053070-93 = "Uau! ? O que é aquilo! ? \r\n\r\n\r\n\r\n"

10053070-94 = "Ah, isso estava errado. Acabou. \r\n\r\n\r\n"

10053070-96 = "Toda aquela cabeça grisalha...! A culpa é dele...!"

10053070-97 = "Vou te mostrar o medo real agora! !"

10053070-99 = "Konoka-kun! perigoso! \r\n"

10053070-101 = "Uau! ! \r\n\r\n"

10053070-103 = "Não! Estou em pânico total! \r\n\r\n"

10053070-104 = "Se for uma história de fantasmas, torne-a tão assustadora quanto uma história de fantasmas! Não me bata fisicamente! ! \r\n\r\n\r\n\r\n"

10053070-106 = "A “última história de fantasmas” é se tornar uma história de fantasmas! !"

10053070-107 = "Mentiroso! ! Não é uma história de fantasmas nem nada! ? \r\n"

10053070-108 = "Ei... \r\n\r\n"

10053070-110 = "Estou com tanto medo que não consigo nem emitir nenhum som! É isso! !"

10053070-111 = "Ruim! Nesse ritmo, Konoka-kun será atropelado! Ei! \r\n\r\n"

10053070-112 = "professor! ! \r\n\r\n\r\n"

10053070-113 = "[ns5] \"Está tudo bem, deixe isso comigo!\"\r\n[ns6] \"Vocês dois pegam Konoka e fogem...!\""

10053070-119 = "…………. \r\n"

10053070-124 = "Kyaaaaaaaaaaaa! ! \r\n\r\n\r\n\r\n\r\n"

10053070-129 = "…………."

10053070-132 = "…………. \r\n"

10053070-136 = "Isso dói! ! \r\n\r\n\r\n"

10053070-137 = "O que já é? Isso é muito difícil! ! \r\n"

10053070-141 = "foto……? Agora... o que? \r\n\r\n\r\n\r\n"

10053070-142 = "O que aconteceu? \r\n\r\n\r\n"

10053070-143 = "[s7] \"Eu quebrei com meu punho...\"\r\n[s8] \"Foi um soco realmente maravilhoso.\""

10053070-146 = "Ah, espere... Por que até o fim...?"

10053070-147 = "Isso é possível..."

10053070-148 = "(Zaza…)"

10053070-149 = "Tsubasa? Ei, Tsubasa? \r\n\r\n\r\n"

10053070-155 = "Professor, esta criança está inconsciente! !"

10053070-157 = "Ah~ É o pior~ eu quero ir para casa~\r\n\r\n"

10053070-159 = "(...Assim, o incidente da história de fantasmas terminou sem que nada fosse resolvido...era para ser)"

10053070-163 = "(E naquela noite――)"

10053070-166 = "E pensar que eu iria desmaiar numa situação como essa... Como líder da equipe de investigação, tenho vergonha. \r\n"

10053070-167 = "Aliás, como você superou essa situação?"

10053070-173 = "Bem... bem... de alguma forma... \r\n\r\n\r\n\r\n"

10053070-174 = "Há coisas mais misteriosas que mágicas que acontecem...#nAh, não, não há mágica neste mundo... \r\n\r\n"

10053070-176 = "...? \r\n"

10053070-177 = "Não entendi, mas posso dizer que está resolvido?"

10053070-178 = "Resolvido...está resolvido... \r\n\r\n"

10053070-179 = "Para ser sincero, não tenho ideia do que aconteceu... mas e você, professor?"

10053070-180 = "[s9] \"Pelo menos, certamente não é uma situação normal.\"\r\n[s10] \"É um pouco perigoso ficar aqui por mais tempo.\""

10053070-183 = "Eu acho que sim."

10053070-184 = "Não, não, não, o que Tsuchinoko fará? ? \r\n"

10053070-185 = "Você ainda quer perseguir Tsuchinoko...? \r\n\r\n\r\n"

10053070-186 = "Meu infortúnio é originalmente atrair fantasmas! #nSe você não encontrar Tsuchinoko e exorcizar o espírito maligno, você não conseguirá resolver o problema!"

10053070-188 = "As opiniões foram divididas...."

10053070-189 = "Porém, já é tarde hoje. Seria difícil mudar para outro lugar agora."

10053070-190 = "Vamos descansar por enquanto e decidir o que fazer amanhã de manhã."

10053070-191 = "Eu concordo com essa ideia... mas pensando bem, por que Tsubasa está no comando? \r\n"

10053070-196 = "--por causa de."

10053070-201 = "professor."

10053070-202 = "[s11] \"Konoka?\"\r\n[s12] \"Não consegue dormir?\""

10053070-208 = "... Shhh."

10053070-209 = "Tem alguém do lado de fora da janela."

10053070-210 = "[s13] \"Huh?\"\r\n[s14] \"Desde quando?\""

10053070-213 = "Eu não sei sobre isso. Tanto eu quanto o diretor acabamos de perceber isso."

10053070-214 = "Para ser exato, percebi isso quando Konoka-kun acordou..."

10053070-215 = "Não sei quem é, mas se eles estão vigiando do lado de fora por tanto tempo, há uma grande possibilidade de que sejam os mentores por trás dessa comoção. \r\n"

10053070-221 = "Se meu palpite estiver correto, um dos sete prisioneiros ――\r\n"

10053070-222 = "Kyoko. \r\n"

10053070-227 = "Konoka-kun. Eu configurei a câmera que você pediu. Está pronto para filmar imediatamente."

10053070-228 = "Ok... então eu vou te matar quando eu contar até três."

10053070-229 = "Ichi――Nino――\r\n"

10053070-230 = "Vamos! ! \r\n\r\n"

10053070-239 = "Funyaa! ? O que, o que! ? \r\n"

10053070-245 = "Tenho certeza que estava lá... mas onde desapareceu? \r\n"

10053070-246 = "Você viu os dois, certo?"

10053070-247 = "ah. Era verdade que Konoka-kun estava lá até ele abrir a janela. Definitivamente posso dizer isso."

10053070-248 = "Desapareceu...? É como se nunca tivesse existido desde o início..."

10053070-249 = "Ah, isso mesmo. Diretor, você tem uma foto? \r\n"

10053070-250 = "Vou dar uma olhada agora, mas não espere muito."

10053070-251 = "Acho que ele disse que contou até três... \r\n\r\n"

10053070-257 = "um pouco! O que você está falando? O que todo mundo está fazendo?"

10053070-258 = "[s15] \"Parece que alguém estava lá fora.\"\r\n[s16] \"Acho que ele provavelmente é o cérebro por trás deste incidente.\""

10053070-261 = "Fora? Fora da janela...?"

10053070-262 = "...? \r\n"

10053070-263 = "E aí? Você ainda está meio adormecido?"

10053070-264 = "Não, isso não é estranho? \r\n"

10053070-269 = "Afinal, este é o segundo andar, certo?"

