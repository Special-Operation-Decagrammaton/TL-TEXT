[translation]
10053070-1 = "第7話;最後の怪談"
10053070-3 = "あっ、コノカ君、先生。\r\n"
10053070-4 = "何かあったの？もう少し遅かったら探しに行くところだったんだけど……。"
10053070-5 = "って、ちょっと！？2人してなんでそんな汗だくなの！？本当に何があったの！？\r\n\r\n"
10053070-10 = "あ～その～……本気で話したくない……不吉すぎて……。\r\n"
10053070-11 = "[ns1] \"何もなかったよ……。\"\r\n[ns2] \"色々とね……。\""
10053070-16 = "まぁ、何かあったんだね。\r\n"
10053070-18 = "（2人に電話ボックスで起こったことを説明した）"
10053070-19 = "（結局、前日に見た怪しいバスや石像のことまで話が及んだ）"
10053070-22 = "えっ！？あのバス、幽霊だったの！？なんで言ってくれなかったのさ！\r\n\r\n"
10053070-23 = "だって、言ったら怖がるの目に見えてたし……。\r\n"
10053070-24 = "塩だ！塩撒いとけ！\r\n"
10053070-25 = "はっ！汗も塩ですけど……これでも効果あるっすかね！？"
10053070-27 = "[ns3] \"グレーゾーン……かな……？\"\r\n[ns4] \"とりあえず、戻ったらまずシャワーを浴びよう……。\""
10053070-32 = "いま聞いた話が全部本当なら、2人が体験したのはポルターガイスト現象だろうね。"
10053070-33 = "一般的には幽霊が物を動かす現象として知られているけれど、#n不自然で急激な温度変化も代表例の1つだからね。\r\n"
10053070-37 = "だが、どうもおかしい。それなりにこの界隈は長いと自負しているが……。"
10053070-38 = "今まで体験してきた心霊現象の合計より、ここへ来てからのほうが圧倒的に多い。#n頻度が異常な程に高いんだ。\r\n"
10053070-42 = "ツバサもそう思ってたんだ。"
10053070-43 = "やっぱり、誰かが裏で仕組んでるってことかな？"
10053070-44 = "え？いや……吾輩は単に、この辺りは超常現象の密度が高いという話をしただけだ。"
10053070-45 = "もしかすると、ここの地下には古代文明の遺跡が眠っているか、#n宇宙人の極秘実験施設があるのかもしれない。\r\n"
10053070-46 = "それ本気で言って……るんだよね、うん。\r\n"
10053070-50 = "……七囚人なんじゃない？\r\n"
10053070-51 = "常識的に考えても、不可解なことが次々起こるなんて変だし。#n誰かが意図的にやってるって考えたほうがまだ現実的でしょ？"
10053070-52 = "その7人の中に、こういうことを起こせそうなやつとかいないの？"
10053070-57 = "う～ん、あたしは幽霊じゃなければ何でもいいんだけど……。\r\n"
10053070-58 = "1人、ここまでのことを仕込んでてもおかしくないやつがいる。"
10053070-59 = "この前言ってたのと同じ人？\r\n"
10053070-60 = "……困ったことにそうなんだよ。"
10053070-61 = "うぅ……なんでよりによって、こんな場所にツチノコがいるんだよ……。\r\n"
10053070-62 = "いや逆か？こんな場所だからツチノコがいるのか！？"
10053070-68 = "あ、タクシー来た！"
10053070-72 = "とりあえず山小屋に戻って、それから改めて考えを――\r\n"
10053070-76 = "……？\r\n"
10053070-79 = "……？？？？"
10053070-81 = "おいコラてめえらァ！もう辛抱ならねぇ！\r\n"
10053070-82 = "なんだか……色んなのが混ざっていないか？"
10053070-83 = "ここまで来ると、怖いっていうより呆れちゃうんだけど……。"
10053070-84 = "乗らねぇのに切符切るって脅かしやがって！！\r\n"
10053070-85 = "気に入らねぇとすぐ銃ぶっ放して壊すし！！\r\n"
10053070-86 = "常識的に考えて、8メートルも掘って埋める奴がどこにいるんだ！！\r\n"
10053070-89 = "なんだか、ものすごくご立腹のようだ……。\r\n\r\n"
10053070-90 = "どの口で常識とか言ってるの？\r\n\r\n\r\n"
10053070-91 = "いくらコノカでも、さすがに怖がるよりも――\r\n\r\n\r\n\r\n"
10053070-93 = "うわあああっ！？なんだよあれ！？\r\n\r\n\r\n\r\n"
10053070-94 = "あ、違った。終わった。\r\n\r\n\r\n"
10053070-96 = "全部あの灰色頭……！あいつのせいだ……！"
10053070-97 = "今から本物の恐怖を見せてやる！！"
10053070-99 = "コノカ君！危ない！\r\n"
10053070-101 = "うわぁぁぁぁぁ！！\r\n\r\n"
10053070-103 = "ダメ！完全にパニックになってる！\r\n\r\n"
10053070-104 = "怪談なら怪談らしく怖さで勝負しなさいよ！物理で殴るなー！！\r\n\r\n\r\n\r\n"
10053070-106 = "「最後の怪談」とは――自らが怪談になることだ！！"
10053070-107 = "嘘つけ！！怪談でも何でもないでしょ！？\r\n"
10053070-108 = "ヒッ……。\r\n\r\n"
10053070-110 = "怖すぎて声も出ねぇか！これで終わりだぁぁ！！"
10053070-111 = "マズい！このままではコノカ君が轢かれてしまう！ひいっ！\r\n\r\n"
10053070-112 = "先生！！\r\n\r\n\r\n"
10053070-113 = "[ns5] \"大丈夫、ここは私に任せて！\"\r\n[ns6] \"2人ともコノカを連れて逃げ……！\""
10053070-119 = "…………。\r\n"
10053070-124 = "きゃああああああああ！！\r\n\r\n\r\n\r\n\r\n"
10053070-129 = "…………。"
10053070-132 = "…………。\r\n"
10053070-136 = "痛ぁぁぁぁぁぁぁっ！！\r\n\r\n\r\n"
10053070-137 = "もうなんなんだよ！これ硬すぎでしょ！！\r\n"
10053070-141 = "え……？今の……何？\r\n\r\n\r\n\r\n"
10053070-142 = "何が起きたの？\r\n\r\n\r\n"
10053070-143 = "[s7] \"拳で粉砕した……。\"\r\n[s8] \"実に見事な正拳突きでした。\""
10053070-146 = "ま、待て……。どうして、最後まで……。"
10053070-147 = "こんなのありえ……。"
10053070-148 = "（ザザー……）"
10053070-149 = "ツバサ？ねぇ、ツバサ？\r\n\r\n\r\n"
10053070-155 = "先生、この子気絶してる！！"
10053070-157 = "あぁ～もう最悪だ～家に帰りたい～\r\n\r\n"
10053070-159 = "（……こうして、怪談事件は何ひとつ解明されないまま幕を閉じた……はずだった）"
10053070-163 = "（そしてその夜――）"
10053070-166 = "あのような状況で気絶するとは……。調査班のリーダーとして面目ない。\r\n"
10053070-167 = "それはそうと、あの場をどうやって切り抜けたんだ？"
10053070-173 = "えっと……まあ、その……どうにか……。\r\n\r\n\r\n\r\n"
10053070-174 = "魔法以上に不思議なことって起こるんだね……#nあ、いや、この世に魔法なんてないけど……。\r\n\r\n"
10053070-176 = "……？\r\n"
10053070-177 = "要領を得ないが、解決したということでいいのかな？"
10053070-178 = "解決……解決ねぇ……。\r\n\r\n"
10053070-179 = "正直何がどうなったのか、私は全然わかってないんだけど……先生はどう？"
10053070-180 = "[s9] \"少なくとも、普通の状況じゃないのは確かだね。\"\r\n[s10] \"これ以上ここにいるのは、ちょっと危ない気がする。\""
10053070-183 = "やっぱそうだよね。"
10053070-184 = "いやいやいや、ツチノコはどうするんすか！？\r\n"
10053070-185 = "まだツチノコを追いかける気なの……？\r\n\r\n\r\n"
10053070-186 = "元々あたしの厄が幽霊を呼び寄せてるんだから！#nツチノコ見つけて厄払いしないと解決できないって！"
10053070-188 = "意見が割れたな……。"
10053070-189 = "とはいえ今日はもう遅い。今から別の場所に移動するのは難しいだろう。"
10053070-190 = "ひとまずは休んで、明日の朝に今後のことを決めよう。"
10053070-191 = "その案には賛成だけど……そういえば、なんでツバサが仕切ってるのよ。\r\n"
10053070-196 = "――せい。"
10053070-201 = "先生。"
10053070-202 = "[s11] \"コノカ？\"\r\n[s12] \"眠れないの？\""
10053070-208 = "……しーっ。"
10053070-209 = "窓の外に、誰かいる。"
10053070-210 = "[s13] \"えっ？\"\r\n[s14] \"いつから？\""
10053070-213 = "それは分からないっす。あたしも所長も、さっき気づいたところで。"
10053070-214 = "正確には、コノカ君が起きたことで気づいたんだが……。"
10053070-215 = "誰かは知らないっすけど、こんな時間まで外から見張ってるってことは、#nこの騒動の黒幕である可能性が高いっすね。\r\n"
10053070-221 = "もしもあたしの推測通りなら、七囚人の一人――\r\n"
10053070-222 = "[ruby=みつい]密井[/ruby]キョウコっす。\r\n"
10053070-227 = "コノカ君。頼まれていたカメラはセットしておいたよ。すぐに撮影できる状態だ。"
10053070-228 = "よし……それじゃあ、3つ数えたら仕留めるから。"
10053070-229 = "いち――にの――\r\n"
10053070-230 = "いくぞぉぉぉおおお！！\r\n\r\n"
10053070-239 = "ふにゃぁっ！？なっ、なに！？\r\n"
10053070-245 = "確かにいたはずなのに……どこに消えたんだ？\r\n"
10053070-246 = "2人も見ましたよね？"
10053070-247 = "ああ。コノカ君が窓を開けるまでは確かにいた。それは断言できる。"
10053070-248 = "それが消えた……？まるで最初から存在しなかったみたいに……。"
10053070-249 = "あ、そうだ。所長、写真は？\r\n"
10053070-250 = "今から確認するが、あまり期待しないでほしい。"
10053070-251 = "3つ数えたらと言っていた気がするんだけどな……。\r\n\r\n"
10053070-257 = "ちょっと！何の話？みんな何してるの？"
10053070-258 = "[s15] \"誰かが外にいたみたい。\"\r\n[s16] \"たぶん今回の事件の黒幕だと思う。\""
10053070-261 = "外？窓の外に……？"
10053070-262 = "……？\r\n"
10053070-263 = "どうした？まだ寝ぼけてる？"
10053070-264 = "いや、おかしくない？\r\n"
10053070-269 = "だってここ、2階なんだよ？"
