[translation]
10001030-1 = "Episódio 3: A Verdadeira Face do Antigo Prédio Escolar, Classe Especial 227"
10001030-2 = "Academia Federal Red Winter - Montanhas Nevadas"
10001030-5 = "Ugh, já faz uma hora que estamos andando e..."
10001030-6 = "Não só não vimos o antigo prédio escolar, como não vimos nem um único edifício sequer!"
10001030-7 = "Quanto tempo mais vamos ter que andar até chegar lá?"
10001030-8 = "O terreno da Academia Federal Red Winter é um dos maiores de Kivotos... vai levar mais um tempo até chegarmos perto da periferia do campus."
10001030-9 = "Ugh... já chega, não aguento mais!"
10001030-10 = "Meus pés estão doendo tanto que não consigo dar mais um passo!"
10001030-11 = "Sendo assim, que tal descansarmos um pouco?"
10001030-13 = "...Não, não precisa disso. Eu tenho uma ideia melhor!"
10001030-17 = "Camarada, me carregue nas costas!"
10001030-18 = "[s1] Carregar Cherino nas costas.\n[s2] Fingir que não ouviu."
10001030-22 = "Não finja que não ouviu! Quer ser expurgada!?"
10001030-23 = "Mesmo que você não me carregue, eu vou me agarrar em você à força até que você me carregue!"
10001030-29 = "U-ugh... a visão é mais alta do que eu pensava, é assustador..."
10001030-30 = "Mas consigo ver muito mais longe do que antes, e sinto que o ar está mais puro!"
10001030-31 = "Então é este o mundo que Marina e Tomoe veem..."
10001030-33 = "Ora, que cena adorável!"
10001030-35 = "Parece um macaquinho pendurado em uma árvore, tão fofo... digo, transbordando dignidade!"
10001030-36 = "É-é mesmo? Hehe..."
10001030-37 = "Poderia tirar uma foto para comemorar?"
10001030-39 = "Pode tirar quantas quiser! Nesse estado, não preciso me preocupar em não caber na mesma tela!"
10001030-50 = "Olhe só, Cherino-chan. Graças ao fato de o Sensei estar te carregando nas costas, parece que você está bem alta na foto!"
10001030-51 = "Deixe-me ver..."
10001030-54 = "Oh, é verdade!"
10001030-55 = "Hehe, isso é ótimo. #nQuando voltarmos para a secretaria, vou continuar trabalhando sendo carregada nas costas assim o tempo todo."
10001030-56 = "Assim, não haverá mais estudantes que me ignorem só porque sou pequena... Hahaha!"
10001030-57 = "Acho uma ideia maravilhosa, Presidente Cherino."
10001030-58 = "Se a Presidente começar a dar ordens solenes enquanto é carregada por alguém... os estudantes certamente não conseguirão esconder o espanto."
10001030-59 = "Não é? Assim que voltarmos para a secretaria, vou ordenar que a Marina me carregue nas costas!"
10001030-60 = "Claro que, antes disso, terei que punir severamente a Marina pelo crime de ter iniciado um golpe de estado!"
10001030-61 = "Talvez eu a coloque para alimentar os coelhos no criadouro por um mês. #n...Não, coelhos são fofos, isso não seria um castigo! Preciso dar um castigo muito, muito mais terrível..."
10001030-64 = "[ns] \"Acho que estou ficando um pouco cansado...\""
10001030-65 = "Ora, Sensei? Você está se sentindo mal?"
10001030-66 = "Você não vai me dizer que a Presidente, que é mais leve que uma pena, está "pesada", vai?"
10001030-67 = "Além disso, um Sensei do Schale não abandonaria uma Presidente com o pé machucado, certo?"
10001030-68 = "[s] \"E-eu vou me esforçar...\""
10001030-70 = "Por que está aí parado, camarada? Enquanto fazemos isso, a Marina pode acabar nos alcançando!"
10001030-71 = "Mexa essas pernas logo, estamos indo para o prédio antigo!"
10001030-72 = "Vamos, em frente!"
10001030-74 = "Depois disso, caminhei por quase uma hora pela trilha da montanha carregando Cherino nas costas..."
10001030-76 = "Academia Federal Red Winter - Antigo Prédio Escolar"
10001030-78 = "Finalmente chegamos, Presidente."
10001030-79 = "O antigo prédio escolar... embora quase não seja mais usado hoje em dia, este é um lugar renomado onde as alunas da Academia Federal Red Winter costumavam se dedicar aos estudos e passar sua juventude."
10001030-80 = "Para um lugar renomado, só parece uma ruína velha e suja..."
10001030-81 = "O clima aqui é meio sombrio, parece até que um urso pode aparecer a qualquer momento."
10001030-82 = "Tomoe, você realmente pretende passar um tempo aqui?"
10001030-83 = "Claro, eventualmente teremos que voltar para a secretaria."
10001030-84 = "Mas, enquanto estivermos sendo perseguidas pela Presidente Marina, não podemos simplesmente voltar assim..."
10001030-85 = "No entanto, se a Presidente Cherino cooperar com todo o seu esforço, tenho certeza de que poderemos voltar logo!"
10001030-86 = "É, é mesmo?"
10001030-87 = "Como eu pensei, nada pode ser resolvido sem o meu poder!"
10001030-88 = "Muito bem, então faremos deste lugar nossa nova base e retomaremos a secretaria!"
10001030-90 = "Quem está aí! Quem decidiu isso por conta própria!"
10001030-91 = "!? Q-quem é você! Em um lugar tão remoto assim, n-não me diga que é um urso!?"
10001030-99 = "U-urso!? Tem um urso em algum lugar!?"
10001030-100 = "Acalme-se, Nodoka. A Presidente Cherino só está assustada e se confundiu."
10001030-102 = "Q-quem está assustada, você disse!?"
10001030-103 = "Mas, afinal, quem são vocês..."
10001030-104 = "Ufa, finalmente se lembrou de nós?"
10001030-106 = "……Quem é você?"
10001030-107 = "V-você realmente esqueceu de nós!? Não acredito!"
10001030-108 = "Nós aguentamos dias terríveis neste antigo prédio escolar em condições tão severas, acreditando e esperando que um dia a Presidente Cherino nos chamasse de volta para o novo prédio!"
10001030-109 = "Mesmo dizendo isso, eu realmente não consigo me lembrar..."
10001030-110 = "Chefe de Gabinete Tomoe, existia algum clube operando no antigo prédio escolar?"
10001030-111 = "Oficialmente não existe, mas o antigo prédio escolar tem o aspecto de uma instalação para que alunas que receberam suspensão na Academia Federal Red Winter possam viver temporariamente, chamada de 'Classe Especial 227'."
10001030-112 = "Uma instalação temporária? #nEntão por que elas não voltaram para o novo prédio e continuam aqui até hoje?"
10001030-113 = "Elas não podem voltar sem a permissão da Presidente, então imagino que estivessem esperando por essa ordem."
10001030-114 = "……Ah, lembrei! Aquela stalker pervertida que foi suspensa porque foi pega espiando as coisas do camarada com um telescópio dentro da escola, não é?"
10001030-115 = "Eu estava tão ocupada com os assuntos da secretaria que acabei esquecendo, mas realmente houve algo assim..."
10001030-116 = "Nos expulsar para estas terras gélidas do norte e dizer que 'esqueceu'!? #nIsso é irresponsável demais!"
10001030-117 = "Você tem ideia do quanto sofremos para sobreviver aqui?"
10001030-118 = "Não recebemos nem lanches, nem rações decentes para encher a barriga!"
10001030-119 = "E não temos nem aquecedores decentes para suportar este frio extremo."
10001030-120 = "À noite, insetos saem de dentro dos nossos cobertores!"
10001030-121 = "E às vezes, ursos famintos ficam vagando pelo prédio da escola, sabia?"
10001030-122 = "O-o quê? Ursos aparecem de verdade?"
10001030-123 = "T-Tomoe, esse antigo prédio escolar não serve. P-por que não procuramos outro lugar?"
10001030-124 = "Não pode, Cherino-chan. É justamente nessas horas que você deve mostrar uma atitude digna, como a líder da Academia Federal Red Winter."
10001030-125 = "Mas... ursos, que medo..."
10001030-126 = "Deixando isso de lado, se a Presidente Cherino veio pessoalmente até aqui, isso significa que já podemos sair do prédio antigo?"
10001030-127 = "Não, isso é..."
10001030-128 = "Infelizmente, no momento, não temos autoridade para revogar a medida tomada contra vocês."
10001030-129 = "Po-por que não!?"
10001030-130 = "A Presidente Cherino foi destituída do cargo de presidente do conselho estudantil por um golpe de estado e está fugindo no momento."
10001030-131 = "Isso é tudo culpa da Marina! Se ela não tivesse dado aquele golpe, eu não teria precisado escapar da secretaria e vir para um lugar imundo como este!"
10001030-133 = "Então... isso significa que a Presidente Cherino agora é só uma pirralha sem poder nenhum, né?"
10001030-134 = "...Perdi meu tempo ficando animada à toa."
10001030-135 = "Ugh! Quem você está chamando de pirralha!?"
10001030-136 = "Mesmo que eu tenha perdido temporariamente meu poder como presidente do conselho estudantil, eu ainda sou a Secretária-Geral da Academia Red Winter, chefe do Departamento de Embelezamento Ambiental, chefe do Departamento de Limpeza e... eu sou a grande Cherino, que ocupa diversos cargos importantes!"
10001030-137 = "Vocês não conseguem ver este bigode, o símbolo da minha autoridade!?"
10001030-139 = "Ninguém acha que esse bigode falso é um símbolo de autoridade!"
10001030-141 = "O-o quê...!?"
10001030-145 = "(Sussurrando) To-Tomoe. Como eles sabem que este bigode é falso?"
10001030-147 = "A Nodoka deve estar apenas chutando. Não precisa se preocupar com isso."
10001030-148 = "E-é mesmo! Não fale bobagens sem saber de nada, sua pirralha pervertida!"
10001030-149 = "Você é uma pervertida que sobe em lugares altos todo feriado para ficar espiando o Sensei com um telescópio e suspirando de excitação!"
10001030-150 = "Q-quem você está chamando de pirralha pervertida!?"
10001030-151 = "A própria Presidente Cherino, que passou o caminho todo até este prédio antigo sendo carregada nas costas pelo Sensei, não é!?"
10001030-152 = "Que inveja...!"
10001030-153 = "A Presidente Cherino é que é uma pirralha pervertida!"
10001030-154 = "A-aquilo não passou de um ato decorrente do laço entre mim e meu camarada! Quem pensa assim é que é um pirralho pervertido!"
10001030-155 = "Pelo menos eu não fico perseguindo ninguém!"
10001030-156 = "Perseguindo?! Aquilo é um comportamento perfeitamente natural de uma aluna que respeita o Sensei!"
10001030-157 = "Mesmo sendo uma tampinha menor que eu!"
10001030-158 = "Mesmo sendo uma tampinha mais nova que eu!"
10001030-159 = "[s] \"É uma briga de crianças do primário...\""
10001030-160 = "Ora, ora, vocês duas são bem próximas, não são? Fufufu."
10001030-161 = "Mas agora que a Presidente Marina ocupou a secretaria, não resolveremos nada se continuarmos brigando."
10001030-162 = "Se vocês da classe especial também querem sair do prédio antigo, por que não nos emprestam sua força?"
10001030-163 = "Mas unir forças com uma tampinha atrevida como essa..."
10001030-164 = "Recusado!"
10001030-165 = "Eu também! Não posso ser aliada de uma pirralha pervertida como essa!"
10001030-166 = "Parece que nenhuma das duas pretende mudar de ideia... Que problemático."
10001030-171 = "Se querem decidir de uma vez por todas quem é a tampinha, eu tenho o método perfeito."
10001030-172 = "Shigure?"
10001030-173 = "Dizem desde antigamente que um verdadeiro adulto não fica bêbado, não importa o quanto beba, não é?"
10001030-174 = "Então, vamos decidir quem é o verdadeiro adulto e quem é a tampinha em uma competição de bebida!"
10001030-175 = "Shigure, mesmo que estejamos no prédio antigo, alunas beberem álcool viola o regulamento da Academia Red Winter!"
10001030-176 = "Claro, não pretendo usar bebida de verdade."
10001030-177 = "No lugar, usaremos o compota especial que preparei para o "Ivan Kupala" desta vez."
10001030-178 = "Só que, como quase não há refrigeração no prédio antigo da escola, talvez esteja um pouco fermentado..."
10001030-179 = "Sinto que acabei de ouvir algo muito desagradável..."
10001030-180 = "Se está com medo, não precisa participar, Presidente Cherino."
10001030-181 = "Nesse caso, é claro, não poderá evitar a mancha de ser chamada de covarde."
10001030-182 = "Q-quem é covarde?! Eu bebo esse suco, não importa a quantidade!"
10001030-183 = "E-eu também! Não vou perder para a Presidente Cherino!"
10001030-184 = "Então está decidido. Finalmente, a compota que fiz no outono passado vai ter sua vez...!"
10001030-186 = "Shigure trouxe rapidamente algo que parecia uma bebida feita de frutas com um cheiro azedo."
10001030-193 = "Err... Shigure-chan. Isso realmente não é bebida alcoólica, né?"
10001030-194 = "A-ah, lembrei...! Essa é aquela que, da última vez, misturou vodka na compota da distribuição e acabou suspensa..."
10001030-195 = "Vamos, vamos, não temos tempo para conversa."
10001030-196 = "Já que estamos prontos,"
10001030-197 = "Preparar... Já!"
