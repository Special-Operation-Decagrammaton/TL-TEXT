[translation]
10001030-1 = "第3話;旧校舎の裏の姿、227号特別クラス"
10001030-2 = "レッドウィンター連邦学園・雪山"
10001030-5 = "うう、もう1時間は歩いたはずなのに……"
10001030-6 = "旧校舎はおろか、建物ひとつ見えてこないじゃないか！"
10001030-7 = "あとどれぐらい歩けば、旧校舎に着くんだ？"
10001030-8 = "レッドウィンター連邦学園の敷地は、キヴォトスの学園の中でもかなり広いですし……敷地の外郭近くまで歩いていくには、もう少しかかります。"
10001030-9 = "うう……もう無理なものは無理！"
10001030-10 = "足が痛くて一歩も歩けないっ！"
10001030-11 = "それでは、少し休むとしましょうか？"
10001030-13 = "……いや、その必要はない。おいらに良い手がある！"
10001030-17 = "カムラッド、おんぶだ！"
10001030-18 = "[s1] チェリノをおんぶする。\n[s2] 聞こえないふりをする。"
10001030-22 = "知らんぷりするな！粛清するぞ！？"
10001030-23 = "例えおんぶしてくれなくても、無理やりしがみついておんぶさせてやるからな！"
10001030-29 = "う、ううっ……お、思ってたより目線が高くて怖い……。"
10001030-30 = "だが、さっきよりもずっと遠くまで見えるし、空気もきれいな気がする！"
10001030-31 = "これが、マリナやトモエが見ている世界なのか……。"
10001030-33 = "あら、素敵な姿ですね！"
10001030-35 = "まるで木にぶら下がる猿のようで可愛……いえ、威厳で溢れています！"
10001030-36 = "そ、そうか？えへへ……。"
10001030-37 = "記念に、写真を撮ってもよろしいですか？"
10001030-39 = "いくらでも撮るが良い！この状態なら、同じ画面に収まらないなんて心配もないからな！"
10001030-50 = "見てください、チェリノちゃん。先生におんぶしてもらったおかげで、まるで背が高い感じに写ってますよ！"
10001030-51 = "どれどれ……"
10001030-54 = "おお、本当だ！"
10001030-55 = "ふふ、これは良いな。#n事務局に戻ってからも、ずっとこうやっておんぶしてもらったまま仕事をすることにしよう。"
10001030-56 = "そうすれば、おいらが小さいからって無視するような生徒たちもいなくなるに違いない……ははは！"
10001030-57 = "素敵なアイディアかと思います、チェリノ会長。"
10001030-58 = "会長が、誰かにおんぶしてもらったまま厳かに指示を出す……なんてことになったら、生徒たちもきっと驚きを隠せないでしょう。"
10001030-59 = "だろう？事務局に帰ったらすぐマリナにおんぶしてもらうように言おう！"
10001030-60 = "もちろんその前に、マリナはクーデターを起こした罪で厳しく粛清しなければならないがな！"
10001030-61 = "一か月間、ウサギの飼育場でエサやりでもやらせようか。#n……いや、ウサギは可愛いから罰にならない！もっと、もっと恐ろしい罰を与えねば……。"
10001030-64 = "[ns] \"ちょっと疲れてきたかも……。\""
10001030-65 = "あら、先生？どこか具合でも悪いのですか？"
10001030-66 = "まさか……羽よりも軽い会長を背にして、「重い」だなんてことは言いませんよね？"
10001030-67 = "それに、シャーレの先生ともあろう御方が、足を痛めた会長を放り出してしまうなんてこともしませんよね？"
10001030-68 = "[s] \"が、頑張るね……。\""
10001030-70 = "何をダラダラしているのだ、カムラッド。こうしてる間にも、マリナが追いついてくるかもしれないんだぞ！"
10001030-71 = "早く足を動かせ、旧校舎に向かうのだ！"
10001030-72 = "さあ、行くぞ！"
10001030-74 = "その後、1時間近くチェリノを背負ったまま山道を歩いた……。"
10001030-76 = "レッドウィンター連邦学園・旧校舎"
10001030-78 = "やっと到着しましたね、会長。"
10001030-79 = "旧校舎……今はもうほとんど使われていませんが、かつてはレッドウィンター連邦学園の生徒たちが勉学に励みながら青春を過ごした、名高い場所です。"
10001030-80 = "その割には、ボロくて汚いただの廃墟にしか見えないが……。"
10001030-81 = "なんだか雰囲気も暗いし、熊でも出てきそうだ。"
10001030-82 = "トモエ、本当にしばらくの間ここで過ごすつもりなのか？"
10001030-83 = "もちろん、いつかはまた事務局に戻らないといけません。"
10001030-84 = "しかし、こうしてマリナ委員長から追われている間は、おいそれと戻るわけにはいかないですし……。"
10001030-85 = "ですが、チェリノ会長が一生懸命協力してくだされば、きっとすぐに帰れると思います！"
10001030-86 = "そ、そうか？"
10001030-87 = "やっぱりおいらの力がなければ、何も解決できないということだな！"
10001030-88 = "よし、それではここをおいらたちの新たな拠点として、事務局を取り戻すとしよう！"
10001030-90 = "誰ですか！勝手にそんなことを決めているのは！"
10001030-91 = "っ！？そ、そっちこそ誰だ！こんな辺鄙な所に、ま、まさか熊か！？"
10001030-99 = "く、熊！？どこかに熊がいるんですか！？"
10001030-100 = "落ち着いて、ノドカ。ただ怯えたチェリノ会長が勘違いしただけ。"
10001030-102 = "だっ、誰が怯えているだと！？"
10001030-103 = "それよりお前たちは……。"
10001030-104 = "ふう、ようやく私たちのことを思い出しましたか？"
10001030-106 = "……誰だ？"
10001030-107 = "ほっ、本当に私たちのことを忘れたんですか！？信じられません！"
10001030-108 = "この過酷な環境の旧校舎で、大変な毎日に耐えながら、いつかまたチェリノ会長が新校舎に呼び戻してくれるはずと信じて待ってたのに！"
10001030-109 = "そうは言っても、本当に思い出せなくてな……。"
10001030-110 = "トモエ秘書室長、旧校舎で活動してる部活なんてあったのか？"
10001030-111 = "公的には存在しませんが旧校舎には、「227号特別クラス」という、レッドウィンター連邦学園内で停学処分を受けた生徒たちが、一時的に生活を送るための施設としての側面があります。"
10001030-112 = "一時的な施設？#nならどうして、こいつらは新校舎に戻らずに、ずっとここにいるんだ？"
10001030-113 = "会長の許可無しには戻れませんので、その命令が下るのをずっと待っていたのかと。"
10001030-114 = "……あ、思い出した！いつだったか、校内でこっそりカムラッドのあれやこれやを望遠鏡で覗き見しているのがバレて、停学になったあの変態ストーカーだな？"
10001030-115 = "事務局のことが色々と忙しすぎて忘れていたが、そんなこともあったな……。"
10001030-116 = "人を凍える北の地に追い出しておいて、「忘れていた」だなんて！#n無責任すぎます！"
10001030-117 = "私たちがここで生き残るために、どれだけ大変な思いをしていたのかご存知ですか？"
10001030-118 = "おやつはもちろん、お腹を満たせるほどの食事すらまともに配給されず！"
10001030-119 = "この極寒をしのげるまともな暖房器具も無いし。"
10001030-120 = "夜は布団から虫が出てきて！"
10001030-121 = "ある時は、飢えた熊が校舎の中を徘徊したりもするし？"
10001030-122 = "な、なに？本当に熊が出るのか？"
10001030-123 = "と、トモエ、やっぱりこの旧校舎はダメだ。ほ、他の場所を探さないか？"
10001030-124 = "ダメですよチェリノちゃん。こういう時こそレッドウィンター連邦学園の指導者らしく、威厳のある態度を見せないとです。"
10001030-125 = "でも……熊、怖い……。"
10001030-126 = "それはともかく、こうやってチェリノ会長が直接来てくださったということは、もう私たちは旧校舎から出られるってことですか？"
10001030-127 = "いや、それは……。"
10001030-128 = "残念ですが今の私たちには、みなさんの措置を取り消してあげられる権限がありません。"
10001030-129 = "ど、どうしてですか！？"
10001030-130 = "チェリノ会長は今、クーデターで生徒会長の座から失脚してしまい、逃げている途中なんです。"
10001030-131 = "これも全てマリナのせいだ！あいつがクーデターさえ起こさなければ、おいらが事務局から脱出してこんな汚い場所に来ることもなかったのに！"
10001030-133 = "なんだ……ということは、今のチェリノ会長は何の権力もないただのちびっ子ってことですよね？"
10001030-134 = "……ぬか喜びして損しました。"
10001030-135 = "ううっ！誰がちびっ子だ！"
10001030-136 = "いくら一時的に生徒会長としての権力を失ったとはいえ、おいらはレッドウィンター連邦学園の書記長であり、環境美化部部長であり、清掃部部長で……様々な職責を任されている偉大なチェリノ様なのだ！"
10001030-137 = "この権威の象徴である髭が見えないのか！"
10001030-139 = "そんな偽物の髭、誰も権威だと思ってませんよ！"
10001030-141 = "な、なに……っ！？"
10001030-145 = "（ひそひそ）ト、トモエ。この髭が偽物だということを、なぜこいつらが知っているのだ？"
10001030-147 = "ノドカちゃんはきっと、当てずっぽうで言っているだけでしょう。気にしなくて大丈夫ですよ。"
10001030-148 = "そ、そうか！何も知らないくせに勝手なことを口にするな、このエロガキめ！"
10001030-149 = "休日のたびに高い所に登って、望遠鏡で先生のことを覗きながらハアハア興奮する変態のくせに！"
10001030-150 = "だ、誰がエロガキですか！？"
10001030-151 = "そう言ってるチェリノ会長こそ、この旧校舎に来るまでの間、ずっと先生におんぶされてたじゃないですか！？"
10001030-152 = "羨ましい……！"
10001030-153 = "チェリノ会長の方が、もっとエロガキですよ！"
10001030-154 = "あ、あれはおいらとカムラッドの絆ゆえの行為に過ぎない！そう思うお前の方こそエロガキだ！"
10001030-155 = "少なくともおいらはストーキングなどしていない！"
10001030-156 = "ストーキングだなんて！あれは先生を尊敬するゆえの、生徒として至って自然な行いです！"
10001030-157 = "私より背も小さいチビのくせに！"
10001030-158 = "おいらより歳下のチビのくせに！"
10001030-159 = "[s] \"小学生の喧嘩だ……。\""
10001030-160 = "あらあら、お二人とも仲良しですね。ふふふ。"
10001030-161 = "しかしマリナ委員長が事務局を占拠した今、私たちまで喧嘩していては何も解決できません。"
10001030-162 = "特別クラスのみなさんも旧校舎から出たいのでしたら、私たちに力を貸してくれませんか？"
10001030-163 = "でも、こんな生意気なチビと手を組むなんて……"
10001030-164 = "お断りです！"
10001030-165 = "おいらもだ！こんなエロガキとは仲間になれない！"
10001030-166 = "お二人とも、意見を曲げる気は無さそうですね……困りました。"
10001030-171 = "どっちがチビなのか決着をつけたいのであれば、ちょうど良い方法があるよ。"
10001030-172 = "シグレちゃん？"
10001030-173 = "昔から、真の大人はお酒をどれだけ飲んでも酔わない……って言われてるでしょう？"
10001030-174 = "だから「飲み比べ勝負」でどっちが本当の大人なのか、そしてどっちがチビなのかを決めよう！"
10001030-175 = "シグレちゃん、いくらここが旧校舎だといっても、生徒がお酒を飲むのはレッドウィンター連邦学園の校則に反することですよ！"
10001030-176 = "もちろん、本当のお酒を飲むつもりはないよ。"
10001030-177 = "代わりに使うのは今回の「イワン・クパーラ」に向けて私が作った、特製カンポット。"
10001030-178 = "ただ旧校舎に冷蔵施設なんてものはほぼ無いから、ちょっと発酵してるかもしれないけど……。"
10001030-179 = "なんだか今、かなり嫌なことを聞いた気が……。"
10001030-180 = "怖いなら参加しなくてもいいよ、チェリノ会長。"
10001030-181 = "その場合はもちろん、弱虫って汚名は避けられないけど。"
10001030-182 = "だ、誰が弱虫だ！そんなジュースぐらい、いくらでも飲んでやる！"
10001030-183 = "わ、私も同じです！チェリノ会長に負けたりはしません！"
10001030-184 = "じゃあ決まり。ついに、去年の秋に作っておいたカンポットの出番が……！"
10001030-186 = "シグレがすぐに、酸っぱい匂いがする果実でできた飲み物らしきものを持ってきた。"
10001030-193 = "えっと……シグレちゃん。これ本当にお酒じゃないんだよね？"
10001030-194 = "おっ、思い出した……！こいつは以前、配給用カンポットにウォッカを混ぜて停学処分になった、あの……。"
10001030-195 = "さあさあ、おしゃべりしてる時間はないよ。"
10001030-196 = "それじゃあ準備もできたし、"
10001030-197 = "よーい……スタート！"
