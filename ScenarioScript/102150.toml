[translation]
102150-1 = "Episódio 15; 4º Santuário “Basílica nas Catacumbas”"

102150-8 = "Atualmente existe apenas um caminho para o Quarto Santuário. #nNão acho que será fácil concentrar o poder de fogo, mas... não tem outro jeito."

102150-10 = "Está tudo bem, confio no comando de Hanako-san."

102150-11 = "Sim. Hanako-san, sinta-se à vontade para nos dar ordens."

102150-12 = "Nossa... ♡ Marie-chan usa palavras assim sem qualquer malícia, então #n é ainda mais proibido."

102150-16 = "Porém... nesta situação, a defesa traseira é fraca..."

102150-17 = "Não temos escolha a não ser correr o risco e prosseguir..."

102150-19 = "Você poderia nos deixar ajudá-lo?"

102150-27 = "……você."

102150-28 = "後方の防衛を任せてほしい。"

102150-30 = "……."

102150-31 = "Você provavelmente não será capaz de confiar tanto em nós... mas ainda assim..."

102150-32 = "Claro, Saori-san. #nEu gostaria que o "esquadrão" protegesse a retaguarda."

102150-33 = "...!"

102150-35 = "Ah, é verdade? #nEstá tudo bem as pessoas acreditarem em mim tão facilmente...! ?"

102150-36 = "...Tenho certeza que você sabe quem somos, mas...o que você quer dizer com isso?"

102150-38 = "Vocês também estão ajudando porque receberam um pedido do "Professor da Placa de Petri", certo? #nNão posso recusar isso... e..."

102150-39 = "...Temos um amigo querido em comum."

102150-41 = "……."

102150-42 = "Isso é motivo suficiente para confiar em você."

102150-43 = "Entendo... eu entendo."

102150-44 = "……."

102150-45 = "Hehehe ♡"

102150-46 = "O que diabos..."

102150-47 = "Ah, sim! Tenho certeza que é difícil e doloroso, mas...#nFarei o meu melhor...Obrigado pelo seu apoio...!"

102150-52 = "Parece que todos estão prontos."

102150-53 = "...Bem, não consigo ver Sakurako-san, mas para onde?"

102150-54 = "desculpe pelo atraso."

102150-62 = "Bem, Sakurako-sama...? #nBem, como é isso...? ?"

102150-63 = "...Essa fantasia..."

102150-64 = "Bem...Sakurako-san! ?"

102150-66 = "Este é o traje formal da Associação Santos Justina, deixado pelo último presidente dos Santos..."

102150-67 = "……Sim. Esta é a minha resolução."

102150-68 = "Quebrar a cadeia de ódio que continuou até agora e criar uma nova..."

102150-69 = "--Sakurako-san."

102150-73 = "Isso é… “preparação”? ?"

102150-74 = "Aquela fantasia [ruby=・ ・ ・]sem vergonha[/ruby]! ?"

102150-75 = "Isso é verdade! É esta a vontade da Congregação, que a Irmandade assumiu? ?"

102150-76 = "Então... isso significa que todas as irmãs usarão essas fantasias de agora em diante? ?"

102150-78 = "Ah, isso mesmo... é mesmo? ?"

102150-79 = "Eu... eu... pareço assim..."

102150-80 = "Eh, hum, do que diabos você está falando...! ?"

102150-81 = "Um collant de perna alta que exige muita determinação para usar #n! ?"

102150-82 = "#nUm design de tecido irracional que vai fazer você se perguntar como ficam suas costas toda vez que você anda...! ?"

102150-83 = "Você está dizendo que isso é realmente... determinação de Sakurako-san? ?"

102150-84 = "Ah, sim...? #nIsso é..."

102150-85 = "Sakurako-san, por favor, seja honesto. Estou realmente preocupado com isso. Alguma roupa íntima dentro? Não - se você pensar bem, não pode existir fisicamente... entendo. entendido."

102150-86 = "Em outras palavras, Sakurako-san está aqui agora vestindo apenas aquele pano fino! !"

102150-87 = "Do que diabos você está falando? ?"

102150-88 = "……."

102150-89 = "Por favor, perdoe nossos pecados..."

102150-90 = "Pois é... mais uma vez percebi minha própria inadequação diante de uma grande vontade."

102150-91 = "...Eu realmente aprecio a determinação de Sakurako-san. #nEu também tenho que estar preparado para minha inadequação..."

102150-97 = "……."

102150-98 = "……."

102150-99 = "……."

102150-100 = "Agora tudo está pronto."

102150-101 = "Sim? Ju, você está pronto..."

102150-102 = "Agora vamos começar a conquistar o 4º Santuário! !"

102150-103 = "Oh, está tudo bem começar assim...?"

