[translation]
102150-1 = "Episódio 15;4º Sanctum \"Basílica das Catacumbas\""
102150-8 = "No momento, só existe uma rota até o 4º Sanctum.#nConcentrar todo o poder de fogo não vai ser fácil… mas não temos outra opção."
102150-10 = "Não se preocupe. Confiamos no comando da Hanako-san."
102150-11 = "Sim. Hanako-san, por favor, não hesite em nos dar ordens."
102150-12 = "Ara ara…♡ A Mary-chan usa esse tipo de frase sem maldade nenhuma,#ne é justamente isso que torna tudo pior."
102150-16 = "Mas… se fizermos isso, a defesa da retaguarda ficará vulnerável…"
102150-17 = "Vamos ter que avançar mesmo correndo riscos――"
102150-19 = "Será que vocês deixariam a gente ajudar?"
102150-27 = "…Você."
102150-28 = "Quero que deixem a defesa da retaguarda conosco."
102150-30 = "……"
102150-31 = "Imagino que não consigam confiar muito na gente… mas mesmo assim――"
102150-32 = "Claro, Saori-san.#nVou deixar a defesa da retaguarda nas mãos da \"Squad\"."
102150-33 = "……!"
102150-35 = "S-sério mesmo?#nVocês podem confiar tão facilmente assim na gente…!?"
102150-36 = "…Vocês sabem muito bem quem nós somos… então qual é a intenção disso?"
102150-38 = "Vocês também vieram ajudar após atenderem ao pedido do \"Sensei da Schale\", não é?#nE eu não tenho o direito de recusar isso… além do mais――"
102150-39 = "…Nós temos uma amiga importante em comum."
102150-41 = "……"
102150-42 = "Isso já é motivo suficiente pra confiar em vocês."
102150-43 = "Entendo… compreendi."
102150-44 = "……"
102150-45 = "Mas não pensem que vou pedir só defesa de vocês, então preparem-se. Ufufu♡"
102150-46 = "O que exatamente você quer dizer com isso…?"
102150-47 = "S-sim! Mesmo que vá ser difícil e doloroso…#nvamos dar o nosso melhor… contamos com vocês…!"
102150-52 = "Parece que todos já estão prontos."
102150-53 = "Ééé… mas eu não estou vendo a Sakurako-san…#nonde ela foi parar?"
102150-54 = "Desculpem pelo atraso."
102150-62 = "S-Sakurako-sama…?#nE-essa roupa é… o que exatamente…!?"
102150-63 = "E-essa vestimenta…"
102150-64 = "S-Sakurako-san!?"
102150-66 = "Esta é a vestimenta formal do Conselho Estudantil de Justina, deixada pela última presidente do conselho…"
102150-67 = "…Sim. Esta é a minha determinação."
102150-68 = "Romper a corrente de ódio que se arrasta até hoje e criar algo novo――"
102150-69 = "――Sakurako-san."
102150-73 = "ISSO é a sua \"determinação\"!?"
102150-74 = "Essa roupa… tão indecente assim!?"
102150-75 = "Essa é realmente a vontade do Conselho Estudantil que a Sisterhood herdou!?"
102150-76 = "Quer dizer então que… daqui pra frente… todas as irmãs vão precisar usar uma roupa dessas!?"
102150-78 = "É-é isso mesmo!?"
102150-79 = "E-eu… jamais conseguiria usar algo assim… auu…"
102150-80 = "E-espere, do que exatamente vocês estão falando!?"
102150-81 = "Um collant cavado no limite do aceitável,#nque exige uma determinação absurda só pra vestir!?"
102150-82 = "Um design com tão pouco tecido,#nque faria qualquer pessoa ficar preocupada com a visão por trás a cada passo!?"
102150-83 = "Você quer mesmo dizer que ISSO representa sua determinação, Sakurako-san!?"
102150-84 = "S-sim…?#nQ-quer dizer…"
102150-85 = "Sakurako-san, seja sincera. Eu estou realmente curiosa. Tem alguma roupa por baixo? Não, espera… pensando bem, fisicamente seria impossível… entendo. Agora compreendi."
102150-86 = "Ou seja, Sakurako-san está agora――#naqui diante de nós usando apenas aquele fino tecido!!"
102150-87 = "M-mas do que vocês estão falando!?"
102150-88 = "……"
102150-89 = "Perdoe-nos por nossos pecados…"
102150-90 = "Sim… diante de uma vontade tão grandiosa, mais uma vez percebi o quanto ainda sou imatura."
102150-91 = "…Recebi sua determinação, Sakurako-san.#nE eu também precisarei tomar uma decisão à altura da minha própria insuficiência…"
102150-97 = "……"
102150-98 = "……"
102150-99 = "……"
102150-100 = "Agora sim, todos os preparativos foram concluídos."
102150-101 = "H-hã? Q-quando você diz que os preparativos terminaram…"
102150-102 = "Então, a partir de agora, iniciaremos a captura do 4º Sanctum!!"
102150-103 = "T-tem certeza que podemos começar assim mesmo…?"