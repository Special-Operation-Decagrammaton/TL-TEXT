[translation]
34270-1 = "Episódio 27; Epílogo"
34270-7 = "E-Essa é a primeira vez que a gente vem por esse caminho..."
34270-8 = "Aonde será que ele vai dar...?"
34270-9 = "Só indo em frente para descobrir."
34270-10 = "Não importa aonde dê, este é o primeiro caminho que trilhamos por nós mesmas."
34270-11 = "É... verdade."
34270-15 = "...Ué."
34270-16 = "C-Cadê a Líder!?"
34270-17 = "Ué?"
34270-18 = "T-Tenho certeza de que a Líder tava logo atrás da gente... #nE-Ela sumiu!?"
34270-20 = "...Tsk."
34270-21 = "Misaki...?"
34270-22 = "A Líder foi pra outro canto..."
34270-23 = "C-Como assim, foi pra outro canto!?"
34270-24 = "Ela só me disse pra tomar conta de vocês... que egoísta."
34270-25 = "Líder... p-por que..."
34270-26 = "……"
34270-27 = "Não é justo, Saori. #nDeixar esse peso comigo..."
34270-28 = "É pesado demais pra mim..."
34270-29 = "...Vai ficar tudo bem, Misaki."
34270-30 = "Princesa..."
34270-35 = "A Saori só precisa de mais um tempinho."
34270-36 = "—Tempo para olhar para si mesma e se conhecer melhor."
34270-37 = "Tempo para encontrar as respostas para os seus próprios questionamentos..."
34270-38 = "A Líder... será que a Saori-neesan vai voltar?"
34270-39 = "Uhum... a Sa-chan vai voltar sim."
34270-40 = "Nós teremos que viver sozinhas de agora em diante...?"
34270-41 = "É... a gente não pode ficar dependendo da Sa-chan pra sempre."
34270-43 = "Não pode ser..."
34270-44 = "O que a gente vai fazer de agora em diante...?"
34270-45 = "A gente não tem mais lugar em Arius, em Trinity, e nem em Gehenna."
34270-46 = "...Acho que teremos que continuar vagando de cidade em cidade para fugirmos das perseguições."
34270-47 = "Esse é o tipo de futuro que nos aguarda... Princesa."
34270-48 = "É... mas, ainda assim, vamos ficar bem."
34270-49 = "……"
34270-50 = "Hime-chan..."
34270-51 = "Princesa... isso não vai ser fácil."
34270-52 = "Tá tudo bem, a gente vai dar um jeito."
34270-53 = "……"
34270-54 = "Reclamar por uma coisa dessas seria um desrespeito com as flores que desabrocham no concreto."
34270-55 = "A Azusa olhou para uma flor daquelas uma vez e disse:"
34270-60 = "Mesmo que pareça inútil... você não pode desistir de resistir."
34270-61 = "Se a Azusa consegue fazer isso, nós também conseguimos. #nAfinal, a nossa juventude pertence apenas a nós."
34270-62 = "E nós temos alguém zelando por nós... não temos?"
34270-68 = "...O Sensei, não é?"
34270-69 = "...Uhum."
34270-70 = "É verdade..."
34270-72 = "É, vamos nos esforçar juntas."
34270-76 = "……"
34270-86 = "...Heh. Nunca vi esse seu rosto antes. #nSe você veio parar aqui, deve ter seus próprios motivos."
34270-87 = "Desde que você tenha habilidade, não me importo. #nBem, que tipo de trabalho você procura? #nAlgo fácil? Difícil?"
34270-89 = "Um difícil... aliás, mesmo que pareça impossível, eu vou dar um jeito de resolver. #nMe passe uma missão que pague bem."
34270-94 = "(Eu sou uma criminosa—estou sendo procurada, e minha vida daqui em diante será de constantes lutas e dificuldades.)"
34270-95 = "(Mas... no fim dessa longa e árdua jornada...)"
34270-96 = "(Se de fato houver um futuro maravilhoso para nós, assim dizem...)"
34270-100 = "Uhum, sim... nós também vamos..."
34270-101 = "...No fim, teremos um final feliz."
34270-102 = "E você também, não é, Saori?"
34270-125 = "……"
34270-130 = "……"
34270-135 = "……"
34270-138 = "Sensei... Eu não vou mais ter aqueles sonhos premonitórios."
34270-139 = "Esse—foi o preço a se pagar para escapar daquele sonho."
34270-140 = "O que eu vi no meu último sonho... Eu preciso debater isso com você, Sensei..."
34270-147 = "No entanto... Será que podemos deixar isso para um momento um pouco mais distante?"
34270-148 = "No momento... eu quero apenas focar no nosso 'presente', aqui, reunidas desta forma."
34270-149 = "E nós... nós vamos..."
34270-150 = "Nós vamos unir forças—assim como sempre fizemos, nos esforçar e superar as provações."
34270-152 = "[ns] \"Bem, então, vamos dar início à audiência.\""
34270-169 = "Espere aí. Não foi isso o que nós combinamos."
34270-170 = "Como assim, do que você está falando?"
34270-171 = "O que é isso? #nNão tem nem metade do valor combinado!!"
34270-172 = "Foi você quem quebrou o nosso acordo primeiro."
34270-173 = "Como está bem claro no contrato, a taxa para alunas é de 1000 ienes por hora."
34270-174 = "Contudo, você omitiu o fato de que largou a escola, não foi? #nPor isso, a taxa cai para 500 ienes a hora."
34270-175 = "Espera... isso é..."
34270-176 = "E deduzindo os impostos, despesas variadas e refeições, nós chegamos a esse valor aí... Algum problema?"
34270-177 = "Ah... e parece que você até mesmo é uma foragida. #nSeria você quem estaria encrencada caso isso viesse à tona, não acha?"
34270-178 = "Portanto, deduzi mais 15% a título de taxa de confidencialidade."
34270-180 = "E-Espera... então quanto sobra de pagamento pra mim...?"
34270-186 = "0 ienes."
34270-187 = "Muito bem, a saída é logo ali."
34270-188 = "Gostaria de reclamar de algo? #nOu talvez devesse levar isso à escola de Polícia Valkyrie?"
34270-193 = "...Não, tudo bem."
34270-194 = "Vou considerar isso como um aprendizado."
34270-203 = "C-Com licença."
34270-204 = "Você é... a pessoa que fez o pedido aquele dia...!?"
34270-205 = "A-Ah, sim... é, er... #nE-Eu acabei esquecendo de uma coisa..."
34270-206 = "Acho que já resolvemos as pendências do pagamento, não?"
34270-207 = "A-Ah, sim... é-é, é sim. #nTem toda razão... e-então, por isso..."
34270-211 = "M-Me perdoem..."
34270-212 = "Perdoar o quê?"
34270-214 = "EU NÃO VOU PERDOAAAAR VOCÊÊS!!!!!!!!!"
34270-224 = "H-Hiiih!? S-Socorro!?"
34270-225 = "Dar calote no dinheiro da Aru-sama é algo que eu JAMAIS vou perdoar!!!"
34270-237 = "...Haa, haa."
34270-238 = "A-A Aru-sama tinha me dito para eu me apresentar direito... #ne-e acertar bem as contas... p-por isso..."
34270-239 = "C-Com isso eu... m-me apresentei direito, não é...?"
34270-240 = "……"
34270-241 = "A-Aaaah...!? #nE-Eu não sabia que tinha outra pessoa a-aqui!?"
34270-242 = "M-M-Me desculpem pela bagunça e pela falta de educação!!"
34270-243 = "...Não, tudo bem."
34270-244 = "E-Então, até a próxima... #nEu preciso ir armar algumas bombas agora..."
34270-248 = "Então esse... é o jeito de fazer negócios no submundo..."
34270-251 = "O-O QUEEEEEEÊ!?"
34270-253 = "M-Me desculpa... me desculpa... me desculpa... #nE-Eu não sabia que não era assim que a gente se apresentava... a-acabei causando problemas mais uma vez. V-Você quer que eu morra? Posso morrer agora?"
34270-254 = "...Haa."
34270-255 = "Ahahahaha! Muito bom!! #nA Haruka-chan foi lá e fez as saudações mesmo~"
34270-256 = "Tinha gente super assustadora por lá, mas o que ela vai fazer agora?"
34270-257 = "Acho que vai ficar barulhento de novo... haa."