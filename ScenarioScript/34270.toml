[translation]
34270-1 = "Episódio 27;Epílogo"
34270-7 = "E-este caminho é a primeira vez……."
34270-8 = "Aonde será que ele leva……."
34270-9 = "Por ora, vamos em frente."
34270-10 = "Seja onde for, é um caminho que, de agora em diante, nós trilhamos pela primeira vez."
34270-11 = "Sim…… é verdade."
34270-15 = "……Ué."
34270-16 = "C-cadê a Líder!?"
34270-17 = "Ué?"
34270-18 = "E-ela tava logo atrás, eu tenho certeza………#ns-sumiu!?"
34270-20 = "……Tch."
34270-21 = "Misaki……?"
34270-22 = "A Líder foi embora pra algum lugar……."
34270-23 = "C-como assim, foi embora!?"
34270-24 = "Deixou dito pra mim: \"cuida de todas\"…… que egoísta, né."
34270-25 = "Líder…… p-por quê……."
34270-26 = "……."
34270-27 = "Injusta, Saori.#nDeixar um grilhão desses pra trás……."
34270-28 = "Pra mim, é pesado demais……."
34270-29 = "……Tá tudo bem, Misaki."
34270-30 = "Hime……."
34270-35 = "A Saori só precisa de um pouquinho mais de tempo."
34270-36 = "――Tempo pra olhar pra trás e conhecer a si mesma."
34270-37 = "Tempo pra responder à própria questão……."
34270-38 = "A Líder…… a mana Saori vai voltar?"
34270-39 = "Sim…… a Sacchan volta."
34270-40 = "Daqui pra frente, a gente vai ter que…… viver só a gente?"
34270-41 = "Sim…… porque a gente não pode depender da Sacchan pra sempre, né."
34270-43 = "Isso não……"
34270-44 = "E a gente, o que faz agora……?"
34270-45 = "Nem no distrito de Arius, nem em Trinity, nem em Gehenna…… não há lugar pra gente."
34270-46 = "……Pra fugir da perseguição, acho que a gente vai ter que ficar pulando de cidade em cidade."
34270-47 = "O que espera a gente é um futuro desses…… Hime."
34270-48 = "Sim…… ainda assim, a gente vai ficar bem."
34270-49 = "……."
34270-50 = "Hime……."
34270-51 = "Hime…… não é uma coisa simples, viu."
34270-52 = "Não; vai dar tudo certo."
34270-53 = "……."
34270-54 = "Porque, se a gente chorar por uma coisa dessas, é desrespeito com a flor que desabrocha no concreto."
34270-55 = "A Azusa, naquela hora, olhando a flor, disse assim:"
34270-60 = "\"ainda que seja algo vão…… não se deve parar de resistir\"."
34270-61 = "Se a Azusa está conseguindo, não tem como a gente não conseguir.#nPorque a nossa juventude é só nossa."
34270-62 = "E tem gente olhando por nós, direitinho…… não tem?"
34270-68 = "……O Sensei, né."
34270-69 = "……Sim."
34270-70 = "Pois é……."
34270-72 = "Sim, vamos nos esforçar juntas."
34270-76 = "……."
34270-86 = "……Kuku. Um rosto que eu nunca vi.#nSe veio parar aqui, deve ter lá as suas razões."
34270-87 = "Havendo competência, o resto não importa.#nE então, que tipo de serviço deseja?#nAlgo simples? Algo difícil?"
34270-89 = "Do difícil…… não; por mais impossível que seja o pedido, eu o resolvo.#nMe dê a missão de pagamento mais alto."
34270-94 = "(Eu sou uma criminosa――sou uma foragida, e os dias à frente devem seguir duros e sofridos.)"
34270-95 = "(Mas, se ao fim dessa jornada de provações……)"
34270-96 = "(houver, também pra nós, um futuro maravilhoso……)"
34270-100 = "Sim, ele vem…… pra nós também……"
34270-101 = "……no fim, com certeza, a gente alcança o final feliz."
34270-102 = "Com a gente também é assim, né, Saori."
34270-125 = "……."
34270-130 = "……."
34270-135 = "……."
34270-138 = "Sensei…… eu, provavelmente, não verei mais sonhos premonitórios."
34270-139 = "Esse foi――o preço pra escapar daquele sonho."
34270-140 = "O que eu testemunhei no último sonho premonitório…… isso, eu preciso discutir com você……."
34270-147 = "Mas…… será que pode ficar pra um pouquinho mais adiante?"
34270-148 = "Porque, agora, eu só quero me concentrar no \"presente\" de nós, que estamos aqui reunidos."
34270-149 = "E…… nós vamos……"
34270-150 = "como sempre, unir forças――somar esforços e superar essa provação."
34270-152 = "[ns] \"Então, vamos começar a audiência?\""
34270-169 = "Espera; isso fere o combinado."
34270-170 = "Ora, do que está falando?"
34270-171 = "Que é isto?#nNão tem nem metade do valor previsto!!"
34270-172 = "Quem quebrou a promessa primeiro foi você."
34270-173 = "Como consta neste contrato, estudante recebe 1000 ienes por hora."
34270-174 = "Só que você escondeu que largou os estudos, não escondeu?#nLogo, 500 ienes por hora."
34270-175 = "Espera aí…… isso é……"
34270-176 = "Descontados impostos, taxas diversas e alimentação, chega-se a este valor…… algum problema?"
34270-177 = "Ah…… e, pelo visto, você está até na lista de procurados.#nSe esse fato vazar, quem se complica não é você?"
34270-178 = "Sendo assim, como taxa de silêncio, descontamos mais 15%."
34270-180 = "E-espera…… então o meu pagamento……."
34270-186 = "Zero ienes."
34270-187 = "Pronto; a saída é por ali."
34270-188 = "Algo a declarar?#nOu prefere reclamar na Academia de Polícia Valkyrie?"
34270-193 = "……Não; entendi."
34270-194 = "Vou considerar que ganhei uma lição."
34270-203 = "C-com licença."
34270-204 = "Você é…… a que fez um pedido outro dia……!?"
34270-205 = "Ah, sim…… é-é que…….#nMe distraí……."
34270-206 = "O acerto já foi feito, que eu saiba."
34270-207 = "S-sim…… é-é, é isso.#nExatamente…… p-por isso……."
34270-211 = "P-perdoa……"
34270-212 = "Perdoa?"
34270-214 = "Imperdoável!!!!!!!"
34270-224 = "H-hiih!? S-socorro!?"
34270-225 = "Dar o calote no dinheiro da senhorita Aru é absolutamente imperdoável!!!"
34270-237 = "……Haa, haa."
34270-238 = "A-a senhorita Aru mandou…… cumprimentar direitinho……#ne-e acertar bem as contas…… p-por isso……."
34270-239 = "A-assim, valeu como cumprimento…… né……?"
34270-240 = "……."
34270-241 = "A-aah……!?#nTinha mais gente aqui!?"
34270-242 = "P-perdão pela bagunça, m-mil desculpas!!"
34270-243 = "……Não; deixa pra lá."
34270-244 = "E-então, até a próxima……#neu preciso ir instalar umas bombas……."
34270-248 = "Então isto é…… o jeito do submundo……."
34270-251 = "C-comooo é que éee!?"
34270-253 = "M-me desculpa…… me desculpa…… me desculpa…….#n\"Cumprimentar\" não era isso…… e-eu causei problema de novo. S-será que eu devia sumir da face da Terra? Posso sumir?"
34270-254 = "……Haa."
34270-255 = "Ahahahaha! Hilário demais!!#nA Haruka cumprimentando de verdade."
34270-256 = "Ei, aquele povo parecia superperigoso; e agora, o que a gente faz?"
34270-257 = "Parece que vai ficar barulhento de novo…… haa."
