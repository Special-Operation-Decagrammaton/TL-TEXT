[translation]
34270-1 = "Episódio 27; Epílogo"
34270-7 = "E-este caminho é novo para mim..."
34270-8 = "Para onde será que ele leva...?"
34270-9 = "Vamos seguir em frente por enquanto."
34270-10 = "Não importa onde seja, este é um caminho que estamos trilhando pela primeira vez."
34270-11 = "Sim... é verdade."
34270-15 = "...Ué."
34270-16 = "O-onde está o Líder!?"
34270-17 = "Hein?"
34270-18 = "E-eu tenho certeza de que o Líder estava logo atrás de nós, mas...#nEle sumiu!?"
34270-20 = "...Tsc."
34270-21 = "Misaki...?"
34270-22 = "O Líder foi embora para algum lugar..."
34270-23 = "Como assim, foi embora para algum lugar!?"
34270-24 = "Ele me deixou encarregada de cuidar de todas vocês... que egoísta da parte dele."
34270-25 = "Líder... p-por que..."
34270-26 = "..."
34270-27 = "Você é tão injusta, Saori.#nNos deixar para trás como um peso morto assim..."
34270-28 = "Isso é pesado demais para mim..."
34270-29 = "...Está tudo bem, Misaki."
34270-30 = "Princesa..."
34270-35 = "A Saori só precisa de um pouco mais de tempo."
34270-36 = "—Tempo para olhar para si mesma e se conhecer."
34270-37 = "Tempo para responder às suas próprias questões..."
34270-38 = "O Líder... a Saori, ela vai voltar?"
34270-39 = "Sim... a Sa-chan vai voltar."
34270-40 = "Teremos que viver sozinhas daqui para frente...?"
34270-41 = "Sim... não podemos depender da Sa-chan para sempre, afinal."
34270-43 = "Não pode ser..."
34270-44 = "O que faremos agora...?"
34270-45 = "Não temos lugar para ficar no Distrito Autônomo de Arius, nem em Trinity, nem em Gehenna..."
34270-46 = "...Acho que vamos acabar vagando de cidade em cidade para fugir dos perseguidores."
34270-47 = "É esse o futuro que nos aguarda... Princesa."
34270-48 = "Sim... mas ainda assim, ficaremos bem."
34270-49 = "..."
34270-50 = "Princesa..."
34270-51 = "Princesa... isso não é algo simples."
34270-52 = "Não, está tudo bem."
34270-53 = "..."
34270-54 = "Se eu reclamar de algo assim, seria um desrespeito com a flor que desabrocha no concreto."
34270-55 = "Naquela época, Azusa olhou para a flor e disse isso."
34270-60 = "Que mesmo que seja algo fútil... não devemos parar de resistir."
34270-61 = "Se a Azusa conseguiu, não há motivo para nós não conseguirmos.#nNossa juventude pertence apenas a nós mesmas."
34270-62 = "E também tem alguém que cuida de nós... não é?"
34270-68 = "...O Sensei, não é?"
34270-69 = "...Sim."
34270-70 = "É verdade..."
34270-72 = "Sim, vamos nos esforçar juntas."
34270-76 = "..."
34270-86 = "...Heh. Rostos que nunca vi antes.#nSe chegaram até aqui, imagino que tenham seus próprios motivos."
34270-87 = "Se você tem habilidade, não me importa o resto. #nEntão, que tipo de pedido você deseja? #nAlgo simples? Ou algo difícil?"
34270-89 = "Algo difícil... não, na verdade, resolverei qualquer pedido, por mais impossível que seja. #nMe dê uma missão com uma recompensa alta."
34270-94 = "（Eu sou uma criminosa — estou sendo caçada, e daqui para frente, dias difíceis e dolorosos me aguardam）"
34270-95 = "（Mas, se ao final dessa jornada de sofrimento...）"
34270-96 = "（Se existe um futuro maravilhoso esperando por nós...）"
34270-100 = "Sim, ele virá... para nós também..."
34270-101 = "......No fim, certamente teremos um final feliz."
34270-102 = "Nós também teremos, não é, Saori?"
34270-125 = "......"
34270-130 = "......"
34270-135 = "......"
34270-138 = "Sensei... acho que não terei mais sonhos premonitórios."
34270-139 = "Esse foi... o preço a pagar para escapar daquele sonho."
34270-140 = "O que presenciei no último sonho... preciso discutir isso com você, Sensei......"
34270-147 = "Mas... tudo bem se deixarmos isso para um futuro um pouco mais distante?"
34270-148 = "Porque agora, eu só quero... focar no nosso \"presente\", aqui reunidos."
34270-149 = "E então... nós..."
34270-150 = "Uniremos nossas forças como sempre fizemos — e nos esforçaremos para superar esse desafio."
34270-152 = "[ns] \"Muito bem, vamos começar a audiência.\""
34270-169 = "Espere, o combinado não era esse."
34270-170 = "Ora, do que está falando?"
34270-171 = "O que é isso? #nNão tem nem metade do valor combinado aqui!!"
34270-172 = "Quem quebrou o acordo primeiro foi você."
34270-173 = "Como está escrito no nosso contrato, o salário por hora de uma estudante é de 1000 ienes."
34270-174 = "No entanto, você escondeu o fato de ter abandonado a escola, não foi? #nPor isso, o salário é de 500 ienes por hora."
34270-175 = "Espere um pouco... isso é..."
34270-176 = "Este é o valor após descontar impostos, taxas diversas e custos de alimentação... Algum problema?"
34270-177 = "Ah... e parece que você está até sendo procurada pela polícia. #nNão seria um problema para você se esse fato viesse a público?"
34270-178 = "Sendo assim, deduzirei mais 15% como taxa de silêncio."
34270-180 = "Es-espere... então o meu salário é..."
34270-186 = "0 ienes."
34270-187 = "Muito bem, a saída é por ali."
34270-188 = "Tem algo a dizer? #nOu pretende denunciar à Academia de Polícia Valkyrie?"
34270-193 = "......Não, entendi."
34270-194 = "Vamos considerar isso como uma lição aprendida."
34270-203 = "Co-com licença."
34270-204 = "Você é... aquela que fez o pedido outro dia...!?"
34270-205 = "Ah, sim... é, bem... #nEu acabei me descuidando..."
34270-206 = "O acerto de contas já deveria ter sido finalizado."
34270-207 = "Si-sim... é, é, isso mesmo. #nExatamente... po-por isso..."
34270-211 = "Pe-perdoe-me..."
34270-212 = "Perdoar?"
34270-214 = "Eu não perdoo!!!!!!!!!!!"
34270-224 = "I-iiih!? So-socorro!?"
34270-225 = "Tentar dar um calote no dinheiro da Aru-sama é algo que eu jamais perdoarei!!!"
34270-237 = "......Ha, ha."
34270-238 = "A-a Aru-sama disse para eu cumprimentar direito... #ne para calcular tudo certinho... po-por isso..."
34270-239 = "Is-isso conta como um cumprimento adequado, não conta...?"
34270-240 = "......"
34270-241 = "A-ahhh...!? #nEu não sabia que havia outras pessoas aqui!?"
34270-242 = "O-oh, me desculpe, peço mil perdões pelo incômodo!!"
34270-243 = "……Não, deixa pra lá."
34270-244 = "E-então, até a próxima……#nEu preciso ir plantar as bombas……."
34270-248 = "Então é assim que o submundo funciona……."
34270-251 = "O-o que você disseeeee!?"
34270-253 = "Me, me desculpe…… me desculpe…… me desculpe…….#nEu não sabia que não era assim que se fazia uma \"saudação\"…… eu causei problemas de novo. E-eu deveria morrer? Posso morrer?"
34270-254 = "……Haa."
34270-255 = "Ahahahaha! Que hilário!!#nA Haruka-chan está realmente cumprimentando eles."
34270-256 = "Eles pareciam ser um pessoal bem perigoso, o que você vai fazer agora?"
34270-257 = "Parece que vai ficar barulhento de novo…… haa."
