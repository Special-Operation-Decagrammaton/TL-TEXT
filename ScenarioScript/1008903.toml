[translation]
1008903-1 = "ちょっとは近づいたかしら"
1008903-2 = "（アルに呼び出されたのは、野心ある起業家やアウトローが集まる事業説明会だった）"
1008903-6 = "いらっしゃい、先生。待っていたわ。"
1008903-7 = "[s1] \"アル……？\"\n[s2] \"これって事業説明会だよね……？\""
1008903-10 = "ふふ、ちょうど目を付けていたプロジェクトの発表日でね。#n先生の言葉を思い出したのよ。"
1008903-11 = "着るべき時は、いずれ訪れるってね。"
1008903-12 = "こういった場に制服で来ると、学生扱いされるかもしれないじゃない？"
1008903-13 = "それならドレスで着飾って、私たち便利屋にとって最も信頼できる協力関係の先生を呼ぼうと思ったのよ。"
1008903-14 = "ふふっ……どうかしら？#nキマってるでしょう？"
1008903-18 = "キマってる、わよね……？"
1008903-19 = "[s3] \"その通りだよ、アル。\"\n[s4] \"まさに、こういう機会があると思ったんだ。\""
1008903-22 = "ふふ、ふふっ……いいわね。"
1008903-23 = "なら先生？#n今日は先生の「生徒」としてではなく、一人の「社長」として提案させてもらうわ。"
1008903-24 = "私と事業説明会に参加してもらえないかしら？#nもちろん、タダでとは言わない。"
1008903-25 = "うまく行ったら、相応の報酬を用意するわ。"
1008903-26 = "……ええ、よろしく頼むわね。"
1008903-30 = "それじゃあ、行きましょう。"
1008903-34 = "（その後、アルと一緒に様々なブースで事業の話を聞いて回った）"
1008903-37 = "（……しかし、そのどれもが支離滅裂な内容だった）"
1008903-41 = "なんでよ！！！！"
1008903-43 = "本当に、どうして！#nまともなプロジェクトが一つも無かったじゃない！"
1008903-45 = "開運キーホルダーにゲルマニウムのブレスレット！#nそれに、感情を読み取れる水って！！"
1008903-46 = "未だにそんなオカルトを信じて投資する人が居るとでも！？#nもしかして、舐められてるのかしら！？"
1008903-47 = "[s5] \"お、落ち着いて……\"\n[s6] \"まあ、こういうこともあるよ。\""
1008903-50 = "はぁ……疲れたわ。"
1008903-51 = "今日はせっかく社長らしい姿を見せられるチャンスだと思ったのに。"
1008903-52 = "これじゃあ信頼を築くどころか、むしろガッカリされちゃったじゃない……"
1008903-55 = "……ガッカリなんてしてないって？"
1008903-58 = "先生……。"
1008903-63 = "慰めてくれるのは嬉しいけど、今はいいの。#n自分の失敗くらい受け止められるわ。"
1008903-64 = "……今日の説明会に参加したのは、完全に失敗だった。#nわざわざ先生の時間をもらったのに、こうなってしまうなんてね。"
1008903-65 = "……気にしなくてもいいって？"
1008903-66 = "そう言ってもらえるのは本当に嬉しいのだけど……"
1008903-67 = "[s7] \"こういうのに慣れてからが本番だからね。\"\n[s8] \"失敗しても、次に繋げればいいんだよ。\""
1008903-70 = "次に、繋げる……ね。"
1008903-71 = "言いたいことは分かるけど……#nどうしても今は、先生が私を慰めるために言っているようにしか思えないのよね。"
1008903-72 = "……うん？"
1008903-73 = "……どこに行くの、先生？#nもう日が暮れる時間よ？"
1008903-74 = "いいところ……？"
1008903-78 = "え、ええ……まあ……先生がそこまで言うなら……"
1008903-79 = "[s9] \"アルなら喜んでくれると思うんだ。\"\n[s10] \"最後の予定は私に決めさせてもらえるかな。\""
1008903-82 = "……せっかくだし、案内してもらえるかしら？"
1008903-86 = "それで、どこに向かうのよ？"
1008903-92 = "……？？？"
1008903-93 = "ラーメン屋、よね……？"
1008903-94 = "本当に先生が連れてきたかったのは、ここで合ってるの……？"
1008903-95 = "[s11] \"うん、とりあえず座ろうか。\"\n[s12] 席に座り料理を注文する。"
1008903-98 = "せ、先生！？ "
1008903-106 = "私が喜ぶところって言うから、どんな場所かと思えばラーメン屋だなんて……"
1008903-107 = "も、もちろんラーメンは嫌いじゃないわよ……#nいや、むしろ好きではあるのだけど……"
1008903-108 = "想像とは少し違って驚いちゃったわ。#n何か理由があるのよね？"
1008903-109 = "これじゃ、いつも便利屋にラーメンを奢ってくれてるのと一緒じゃない？"
1008903-110 = "うーん、今日はいつもと違うって言われても……"
1008903-111 = "……何が違うのかしら？"
1008903-112 = "[s13] \"今日は仕事の愚痴を言う会だからね。\"\n[s14] \"仕事がうまく行かない日は、こういう場所に来るんだ。\""
1008903-115 = "……ん？"
1008903-116 = "それは一体どういう……"
1008903-120 = "……あっ。"
1008903-121 = "つまり、これは……"
1008903-122 = "先生みたいな、大人にとっての……"
1008903-126 = "[ns15] \"うん、そうだよ。\"\n[ns16] \"意外と大人も大したこと無いでしょ？\""
1008903-129 = "……ふっ。"
1008903-130 = "ふふ……"
1008903-131 = "ふふっ……先生にはいつも助けられてばかりだわ。"
1008903-132 = "そうね……"
1008903-133 = "……うん。"
1008903-135 = "思っていたよりも、普通なのね……ふふっ。"
1008903-138 = "[wa:550]― [log=아루 드레스]はぁ……[wa:1900]こんなことになるなんて、[wa:1440]思いもしなかったわ。[/log]"
1008903-139 = "[wa:2430]― [log=아루 드레스]でも……[wa:800]先生の言った通り、[wa:1750]こういうのも悪くはないわね。[/log]"
1008903-142 = "[wa:700]― [log=아루 드레스]正直、[wa:1200]不思議だったのよ……[/log]"
1008903-145 = "― [log=아루 드레스]ちゃんとした格好の大人が、[/log]"
1008903-146 = "[wa:1800]― [log=아루 드레스]どうしてこんな所で[wa:1000]わざわざご飯を食べるのか……。[/log]"
1008903-149 = "[wa:650]― [log=아루 드레스]でも……[wa:1550]今なら、[wa:700]少しわかる気がするわ。[/log]"
1008903-152 = "― [log=아루 드레스]それぞれ理由は違っても……[/log]"
1008903-153 = "[wa:3000]― [log=아루 드레스]きっと、[wa:1150]みんなこういう気持ちだったのかな、[wa:1550]って。[/log]"
1008903-156 = "[wa:450]― [log=아루 드레스]……先生も、[wa:1120]きっとそうなのよね。[/log]"
1008903-159 = "[wa:400]― [log=아루 드레스]ふふ……[wa:2400]私も少しは……[wa:2250]先生に近づけたのかしら？[/log]"
1008903-162 = "（その後、二人でラーメンを食べながら、溜まっていたアルの愚痴を聞いた）"
1008903-163 = "（内容のほとんどは、便利屋のみんなに対する感謝の言葉で、残りは事業を継続する厳しさについてだった）"
1008903-164 = "（アルの愚痴は深夜になっても止まず、部屋に送り届けるまで続いた……）"
