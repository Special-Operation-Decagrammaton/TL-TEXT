[translation]
1008903-1 = "Eu me pergunto se está um pouco mais perto"

1008903-2 = "(Al me chamou para uma sessão de briefing de negócios onde se reuniram empresários ambiciosos e bandidos.)"

1008903-6 = "Bem-vindo, professor. Eu estive esperando."

1008903-7 = "[s1] \"Al...?\"\n[s2] \"Esta é uma sessão de briefing de negócios, certo...?\""

1008903-10 = "Hehe, era a data de anúncio do projeto que eu estava de olho. #nLembrei-me das palavras do meu professor."

1008903-11 = "Chegará o momento em que você deverá usá-lo."

1008903-12 = "Se você vier uniformizado para um lugar como esse, poderá ser tratado como um estudante, certo?"

1008903-13 = "Então decidi me vestir bem e chamar meu parceiro mais confiável para nós, faz-tudo."

1008903-14 = "Hehe... o que você acha? #nPerfeito, certo?"

1008903-18 = "É perfeito, certo...?"

1008903-19 = "[s3] \"Você está certo, Al.\"\n[s4] \"Foi exatamente assim que pensei que seria uma oportunidade.\""

1008903-22 = "Hehe, hehe... Isso é bom."

1008903-23 = "Sensei então? #nHoje farei uma proposta não como “aluno” de professor, mas como “presidente”."

1008903-24 = "Seria possível você participar de uma sessão de briefing de negócios comigo? #nClaro, não direi que é grátis."

1008903-25 = "Se tudo correr bem, prepararei uma recompensa adequada."

1008903-26 = "...Sim, por favor me ajude."

1008903-30 = "Pois bem, vamos lá."

1008903-34 = "(Depois disso, Al e eu fomos a vários estandes para ouvir sobre o negócio.)"

1008903-37 = "(...No entanto, todos eles eram incoerentes)"

1008903-41 = "Por que! ! ! !"

1008903-43 = "Realmente, por quê! #nNão houve sequer um projeto decente!"

1008903-45 = "Pulseira de germânio como chaveiro de boa sorte! #nAlém disso, a água pode ler emoções! !"

1008903-46 = "Ainda tem gente que acredita no ocultismo e investe nisso! ? #nTalvez ele esteja sendo lambido! ?"

1008903-47 = "[s5] \"Ah, acalme-se...\"\n[s6] \"Bem, às vezes coisas assim acontecem.\""

1008903-50 = "Suspiro...estou cansado."

1008903-51 = "Achei que hoje era uma chance para mostrar meu verdadeiro eu como presidente."

1008903-52 = "Em vez de construir confiança, acabei me decepcionando..."

1008903-55 = "...Então você não está desapontado?"

1008903-58 = "professor……."

1008903-63 = "Estou feliz que você esteja me confortando, mas agora está tudo bem. #nPosso aceitar meus próprios fracassos."

1008903-64 = "...Participar da sessão de briefing de hoje foi um fracasso total. #nEu me esforcei para pedir o tempo do seu professor, e então as coisas ficaram assim."

1008903-65 = "...Você quer dizer que não preciso me preocupar com isso?"

1008903-66 = "Estou muito feliz em ouvir isso, mas..."

1008903-67 = "[s7] \"Depois que você se acostumar com coisas assim, é hora de trabalhar de verdade.\"\n[s8] \"Mesmo se você falhar, você pode tentar novamente.\""

1008903-70 = "A seguir, vamos nos conectar..."

1008903-71 = "Eu sei o que você está tentando dizer, mas...#nSinto que o professor está tentando me confortar agora."

1008903-72 = "……Sim?"

1008903-73 = "...Onde você vai, professor? #nJá é hora do sol se pôr?"

1008903-74 = "A parte boa...?"

1008903-78 = "Eh, sim... bem... se o professor fala isso..."

1008903-79 = "[s9] \"Acho que Al ficaria feliz.\"\n[s10] \"Talvez você possa me deixar decidir sobre os planos finais.\""

1008903-82 = "...Você poderia, por favor, me mostrar o local?"

1008903-86 = "Então, para onde vamos?"

1008903-92 = "...? ? ?"

1008903-93 = "Uma loja de ramen, certo...?"

1008903-94 = "Era isso que a professora queria mesmo trazer aqui?"

1008903-95 = "[s11] \"Sim, vamos sentar agora.\"\n[s12] Eu sento e peço comida."

1008903-98 = "Ei, professor! ?"

1008903-106 = "Eu disse que é um lugar que me faz feliz, então quando pensei que tipo de lugar era, descobri que era uma loja de ramen..."

1008903-107 = "Bem, é claro que não odeio ramen...#nNão, na verdade gosto dele..."

1008903-108 = "Fiquei surpreso ao ver que era um pouco diferente do que eu esperava. #nHá uma razão, certo?"

1008903-109 = "Não é a mesma coisa quando você sempre presenteia seu faz-tudo com ramen?"

1008903-110 = "Hmm, mesmo que você diga que hoje é diferente do normal..."

1008903-111 = "...Qual é a diferença?"

1008903-112 = "[s13] \"Hoje é uma reunião para reclamar do trabalho.\"\n[s14] \"Quando as coisas não vão bem no trabalho, este é o lugar que eu venho.\""

1008903-115 = "……sim?"

1008903-116 = "O que diabos é isso..."

1008903-120 = "...Ah."

1008903-121 = "Em outras palavras, isso é..."

1008903-122 = "Para adultos como professores..."

1008903-126 = "[ns15] \"Sim, isso mesmo.\"\n[ns16] \"Surpreendentemente, também não é grande coisa para os adultos, certo?\""

1008903-129 = "...Huh."

1008903-130 = "n / D……"

1008903-131 = "Hehe...meu professor sempre me ajuda."

1008903-132 = "Isso mesmo..."

1008903-133 = "……Sim."

1008903-135 = "É mais normal do que eu pensava...hehe."

1008903-138 = "[wa:550]― [log=아루 드레스]はぁ……[wa:1900]こんなことになるなんて、[wa:1440]思いもしなかったわ。[/log]"
1008903-139 = "[wa:2430]― [log=아루 드레스]でも……[wa:800]先生の言った通り、[wa:1750]こういうのも悪くはないわね。[/log]"
1008903-142 = "[wa:700]― [log=아루 드레스]正直、[wa:1200]不思議だったのよ……[/log]"
1008903-145 = "― [log=아루 드레스]Um adulto vestido adequadamente [/log]"

1008903-146 = "[wa:1800]― [log=아루 드레스]どうしてこんな所で[wa:1000]わざわざご飯を食べるのか……。[/log]"
1008903-149 = "[wa:650]― [log=아루 드레스]でも……[wa:1550]今なら、[wa:700]少しわかる気がするわ。[/log]"
1008903-152 = "― [log=아루 드레스]Mesmo que os motivos sejam diferentes...[/log]"

1008903-153 = "[wa:3000]― [log=아루 드레스]きっと、[wa:1150]みんなこういう気持ちだったのかな、[wa:1550]って。[/log]"
1008903-156 = "[wa:450]― [log=아루 드레스]……先生も、[wa:1120]きっとそうなのよね。[/log]"
1008903-159 = "[wa:400]― [log=아루 드레스]ふふ……[wa:2400]私も少しは……[wa:2250]先生に近づけたのかしら？[/log]"
1008903-162 = "(Depois, enquanto comiam ramen juntos, ouvi as reclamações de Al.)"

1008903-163 = "(A maior parte do conteúdo eram palavras de agradecimento a todos os trabalhadores manuais, e o resto era sobre a dificuldade de continuar o negócio.)"

1008903-164 = "(As reclamações de Al não pararam até tarde da noite e continuaram até que eu o mandei para o quarto...)"

