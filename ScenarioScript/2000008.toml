[translation]
2000008-1 = "雨が降る日のセンチメンタル"
2000008-2 = "ミレニアム校内・第42図書室"
2000008-5 = "あ、先生。"
2000008-6 = "先生も、本を探しに来たの？"
2000008-7 = "ん？私？"
2000008-8 = "ふふっ、どんな本を読んでるか、気になる？"
2000008-9 = "当ててみて？"
2000008-10 = "[s1] \"間違いなくBL。\"\n[s2] \"科学専門誌？\"\n[s3] \"詩集……？\""
2000008-11 = "ふふっ、全部外れ。"
2000008-12 = "ふふっ、全部外れ。"
2000008-13 = "ふふっ、全部外れ。"
2000008-14 = "じゃん、これだよ。"
2000008-15 = "[s] \"『少女のための心理学概論』？\""
2000008-16 = "みんな、意外、って反応するんだよね。"
2000008-17 = "でも……最近、先生と色々な物を作りながら……"
2000008-18 = "合理性と同じぐらい、誰かの気持ちへの配慮を大切にしなきゃいけないと思った。"
2000008-19 = "物理学と心理学は全然違ってて、"
2000008-20 = "慣れない、というのが正直なところ。"
2000008-21 = "水に石を投げた時、なぜ水面に波紋が起きるのかを考えるのが、物理。"
2000008-22 = "人に言葉を投げかけた時、なぜ心に波紋が起きるのかを考えるのが、心理。"
2000008-23 = "今日はそういう……今の私に足りない部分をもっと勉強したくて。"
2000008-24 = "そうすれば……先生にとって、もっと役立つ何かが作れるんじゃないかなって。"
2000008-26 = "ふふっ、褒めてくれてありがとう。"
2000008-27 = "ん？でも……"
2000008-28 = "先生は本を借りに来たんじゃないって？"
2000008-29 = "[s] \"急な雨だったから、傘を借りたくて。\""
2000008-30 = "なるほど、そうだったんだ。"
2000008-31 = "それならちょうどいいものがある。私が作った……"
2000008-32 = "[s] \"普通の傘で。\""
2000008-33 = "うーん、自爆機能が付いてるとかそういうのではないんだけど……。"
2000008-34 = "分かった。"
2000008-35 = "どんな注文にも答えるのが、ミレニアムのマイスターだから。"
2000008-36 = "じゃあこっち、この傘は……"
2000008-37 = "これまでの「傘」という概念の枠組み、パラダイムを完全に変えてしまうもの。"
2000008-38 = "[s] \"お願いだから普通の傘で……。\""
2000008-39 = "うーん、仕方ない。"
2000008-40 = "普通の傘……私のなら……。"
2000008-41 = "……。"
2000008-42 = "……ふふっ。"
2000008-43 = "一緒に入っていく？"
2000008-44 = "シャーレまでなら、私の通り道だから。"
2000008-45 = "あ、ちょっとだけ待ってて。#n本を借りてくる。"
2000008-51 = "さ、行こう、先生。"
2000008-54 = "……たまには普通の傘もいいね。"
