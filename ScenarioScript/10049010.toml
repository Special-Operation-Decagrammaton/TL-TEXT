[translation]
10049010-1 = "Episódio 1: A Qualificação do Grupo de Vigilância"
10049010-2 = "Jardim de Infância Anexo à Trinity - Antigo Prédio Escolar"
10049010-3 = "Você é igualzinho a gente, sabia?!"
10049010-5 = "Hã?"
10049010-6 = "Ei, idiota, para com isso! Vai acabar levando outra granada de luz!"
10049010-7 = "Não... eu não atacaria alguém que já foi neutralizado."
10049010-8 = "Mas, o que você disse agora há pouco?"
10049010-9 = "“Igualzinho a gente”...?"
10049010-10 = "Você é aquela, né?"
10049010-11 = "A tal do Grupo de Vigilância, a “Granada de Luz Ambulante da Trinity”."
10049010-16 = "...Também me chamam assim."
10049010-17 = "Você tem qualificação para fazer esse tipo de coisa?"
10049010-18 = "Como você não está de preto, não parece ser do Comitê de Justiça."
10049010-19 = "E esse tal de Grupo de Vigilância é só um nome que vocês mesmas inventaram, né?"
10049010-20 = "De fato, eu não pertenço ao Comitê de Justiça."
10049010-21 = "Mas, será que é preciso ter uma qualificação para proteger a ordem pública?"
10049010-22 = "É por isso que eu disse que você é igual a gente."
10049010-23 = "Se mete onde não é chamada e atrapalha os outros com violência. #nE o pior é que, diferente de nós, você ainda posa de justiceira."
10049010-24 = "Por que você faz esse papel de vigilante? Ninguém te reconhece, né?"
10049010-25 = "Será que... #nVocê não conseguiu entrar para o Comitê de Justiça mesmo querendo?"
10049010-26 = "!!"
10049010-27 = "Usar violência sem ter qualificação nenhuma... acho que isso é crime, sabia?"
10049010-28 = "Bom, tanto faz. Não vou pisar aqui nunca mais."
10049010-32 = "Hã? É...?"
10049010-36 = "..."
10049010-41 = "Ei, ei. Tudo bem falar aquilo...?"
10049010-42 = "Não precisa se preocupar."
10049010-43 = "Olha só, veja aquilo."
10049010-45 = "..."
10049010-47 = "Ela não consegue fazer mais nada."
10049010-48 = "Acertei em cheio. Parece que minhas palavras atingiram em cheio, né?"
10049010-49 = "V-vamos fugir enquanto é tempo!"
10049010-55 = "Ninguém me reconhece..."
10049010-56 = "Não consegui entrar para o Comitê de Justiça..."
10049010-57 = "Tudo o que fiz até agora é... crime..."
10049010-58 = "...É mesmo, é? #nAs minhas ações são..."
10049010-63 = "Antiga Biblioteca da Trinity"
10049010-64 = "Os livros novos ficam aqui..."
10049010-65 = "Os livros para doação a outras bibliotecas ficam aqui..."
10049010-70 = "Pronto! Com isso, a organização está terminada!"
10049010-71 = "Ah, já está nesse horário... preciso ir para casa logo."
10049010-75 = "...Ué? Tem vozes... vindo de trás do depósito...?"
10049010-79 = "Então, pode ser neste fim de semana, certo?"
10049010-80 = "Sim. A Capitã Love disse para ser nesse dia."
10049010-81 = "O local de encontro é... o “Parque de Diversões Borderland”, né?"
10049010-85 = "(O Grupo do Capacete? Por que eles estão em um lugar desses?)"
10049010-86 = "(Pensando bem... havia boatos de que usavam este lugar para reuniões secretas por ser pouco movimentado.)"
10049010-87 = "(Preciso sair daqui antes que me descubram...)"
10049010-89 = "Isso vai acabar destruindo o parque de diversões."
10049010-90 = "!"
10049010-94 = "Não posso deixar escapar. Não tem jeito."
10049010-95 = "Vai ter bastante gente ferida, né."
10049010-96 = "Bem, depende de como eles vão agir."
10049010-98 = "(Gente ferida? O que será que eles estão planejando...?) "
10049010-99 = "Mas será que só a gente é o suficiente?"
10049010-100 = "Disseram que virá apoio de outros lugares também. Se juntar tudo, acho que é o bastante."
10049010-101 = "Então está bem. #n... É melhor irmos. Seria ruim se alguém nos ouvisse."
10049010-103 = "(E-eles estão vindo para cá...!)"
10049010-104 = "(Preciso fugir logo...!)"
10049010-111 = "Haa... haa..."
10049010-112 = "Aquela conversa dos dois... será que é verdade?"
10049010-113 = "Neste fim de semana, no 'Parque de Diversões Borderland'... vai ter gente ferida..."
10049010-114 = "Eles disseram que era sob ordens da Capitã Love também..."
10049010-115 = "Não posso deixar isso passar, né. Primeiro, preciso denunciar..."
10049010-119 = "Hyaah!"
