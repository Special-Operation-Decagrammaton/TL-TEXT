10049010-124 = "Você não poderia pedir para o Comitê de Vigilância resolver?"
10049010-125 = "Hã? #n... Ah, sim."
10049010-126 = "Sendo assim—"
10049010-130 = "Por isso eu disse que você está com a gente."
