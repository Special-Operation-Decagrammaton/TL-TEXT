[translation]
1601005-1 = "マイスターの殺伐とした応援"
1601005-5 = "シャーレ・オフィス"
1601005-8 = "おかえり、先生。"
1601005-9 = "待ってたよ。"
1601005-10 = "[s1] \"……た、ただいま？\"\n[s2]\"その格好はどうしたの？\""
1601005-11 = "今日は先生を応援しにきたの。"
1601005-12 = "今日は先生を応援しにきたの。"
1601005-13 = "だから……前と同じように、その場に適した格好をしてるだけ。"
1601005-14 = "今日は先生を応援するんだから、この装いを着るのは当然。"
1601005-15 = "……どう？やる気、出てくる？"
1601005-19 = "[ns3] \"……よく分からない。\"\n[ns4] \"あんまり働きたいとは思えないかな……。\""
1601005-22 = "安心して、先生。#nこの発明品を使えば、すぐに働く意欲が湧くはず。"
1601005-23 = "この前はデスク作業の性質と特性を理解できてなかったから、応援するどころか先生の集中力を乱してしまったけど……。"
1601005-24 = "……今度は大丈夫。少なくとも気が散るような事はしないから。"
1601005-32 = "……じゃーん！#nこれが用意してきた究極の応援道具だよ。"
1601005-33 = "[s] \"……ワープロ？\""
1601005-34 = "うん。ほとんどの機能はワープロとそう変わらないよ。#n文書作成に特化したパソコン。"
1601005-35 = "……ただ、このワープロにはある特別な機能が追加されてるんだ。"
1601005-41 = "さ、先生。これ使って残りの仕事を進めてみて。"
1601005-42 = "締め切りが近ければ近いほど効果的だよ。"
1601005-43 = "[s] \"締め切り間近の報告書を作成してみようかな。\""
1601005-51 = "[ns] \"今のところ効果はあんまり感じられないけど……。\""
1601005-52 = "ふふっ。心配無用だよ。"
1601005-53 = "この道具の真価は、集中力が乱れた時に発揮されるから。"
1601005-54 = "……いつも通り仕事を続けてみて。"
1601005-57 = "（約10分後……)"
1601005-63 = "[ns] \"うーん、あんまり進まないな……。\""
1601005-67 = "『警告。1分以上新しい文章が入力されていません』"
1601005-68 = "『新たな文章の入力が行われなければ……2分後にデリートされます』"
1601005-69 = "[s] \"……デリート？\""
1601005-70 = "うん。さっき言った特別な機能のことだよ。"
1601005-71 = "一度ファイルを立ち上げてから、3分間入力せずに放置したら……。"
1601005-72 = "……自爆する設定なんだ。"
1601005-73 = "[s5] \"自爆！？\"\n[s6] \"どうしてそんな機能を？\""
1601005-74 = "締め切りが近いほど、いつも以上に集中できて、効率よく作業が進むっていうから。"
1601005-75 = "締め切りが近いほど、いつも以上に集中できて、効率よく作業が進むっていうから。"
1601005-76 = "同じ作業でも、人は環境次第で効率も変わってくるでしょ。"
1601005-77 = "この機器は作業者に、常に締め切りと同じ環境を提供してくれるんだ。"
1601005-78 = "せっかく書き進めた報告書のデータが消えてしまうという危機が迫っていたら、いくら仕事が嫌でも手を動かすしかないかなって。"
1601005-79 = "[s] \"あ、悪魔的発想……！\""
1601005-83 = "あ、先生。自爆実行までもう1分切ってるよ。"
1601005-87 = "[ns] \"と、とりあえず何か打てば……。\""
1601005-90 = "『警告。先ほど入力した文章は、現在作成中のデータとは関係ない文章と判断されました』"
1601005-91 = "『この文章は、文章を入力した時間とみなされません』"
1601005-92 = "[s] \"……どうして？\""
1601005-93 = "このワープロには、入力済みの文章をAIが読み取って、次に想定される文を判断してるんだ。"
1601005-94 = "ただ時間を更新するために入力された文字は、カウントされないよ。"
1601005-95 = "ほら、先生。 ここまでせっかく進めた報告書、消したくないよね。"
1601005-101 = "もう少しやる気を出して、キーボードに向き合おう。"
1601005-102 = "[s] \"……無理だって。\""
1601005-103 = "フレ～、フレ～、先生。"
1601005-105 = "（ヒビキの発明品のおかげで、とても早く報告書を完成できたのはいいが……）"
1601005-106 = "（悪用を防ぐために、自爆機能付きワープロは押収した）"
