[translation]
1601005-1 = "O apoio impiedoso do Meister"
1601005-5 = "Escritório do Schale"
1601005-8 = "Bem-vindo de volta, Sensei."
1601005-9 = "Eu estava te esperando."
1601005-10 = "[s1] \"...E-estou de volta?\"\n[s2]\"O que houve com esse seu traje?\""
1601005-11 = "Hoje eu vim para apoiar o Sensei."
1601005-12 = "Hoje eu vim para apoiar o Sensei."
1601005-13 = "Por isso... assim como antes, estou apenas vestindo algo adequado para a ocasião."
1601005-14 = "Já que hoje vou apoiar o Sensei, é natural que eu use este traje."
1601005-15 = "...E então? Sente sua motivação aumentar?"
1601005-19 = "[ns3] \"...Não sei bem.\"\n[ns4] \"Não sinto muita vontade de trabalhar...\""
1601005-22 = "Fique tranquilo, Sensei. #nSe usar esta invenção, sua vontade de trabalhar deve surgir imediatamente."
1601005-23 = "Da última vez, eu não entendia a natureza e as características do trabalho de escritório, então, em vez de apoiar, acabei atrapalhando sua concentração..."
1601005-24 = "...Desta vez vai dar certo. Pelo menos, não farei nada que te distraia."
1601005-32 = "...Tcharam! #nEsta é a ferramenta de apoio definitiva que eu preparei."
1601005-33 = "[s] \"...Um processador de textos?\""
1601005-34 = "Sim. A maioria das funções não é muito diferente de um processador de textos comum. #nÉ um computador especializado em criação de documentos."
1601005-35 = "...Só que, este processador de textos tem uma função especial adicional."
1601005-41 = "Vamos lá, Sensei. Use isto para adiantar o resto do seu trabalho."
1601005-42 = "Quanto mais perto do prazo final, mais eficaz ele é."
1601005-43 = "[s] \"Acho que vou tentar criar o relatório que está perto do prazo.\""
1601005-51 = "[ns] \"Por enquanto, não sinto muito efeito...\""
1601005-52 = "Fufu. Não se preocupe."
1601005-53 = "O verdadeiro valor desta ferramenta é revelado quando sua concentração é interrompida."
1601005-54 = "...Tente continuar trabalhando como sempre."
1601005-57 = "(Cerca de 10 minutos depois...)"
1601005-63 = "[ns] \"Hum, não estou progredindo muito...\""
1601005-67 = "『Aviso. Nenhum texto novo foi inserido por mais de 1 minuto』"
1601005-68 = "『Se nenhum novo texto for inserido... os dados serão deletados em 2 minutos』"
1601005-69 = "[s] \"...Deletados?\""
1601005-70 = "Sim. É sobre aquela função especial que mencionei."
1601005-71 = "Depois de abrir o arquivo, se você deixá-lo parado por 3 minutos sem digitar nada..."
1601005-72 = "...Ele está configurado para autodestruição."
1601005-73 = "[s5] \"Autodestruição!?\"\n[s6] \"Por que uma função dessas?\""
1601005-74 = "Dizem que quanto mais perto do prazo, mais você consegue se concentrar e trabalhar com eficiência."
1601005-75 = "Dizem que quanto mais perto do prazo, mais você consegue se concentrar e trabalhar com eficiência."
1601005-76 = "Mesmo no mesmo trabalho, a eficiência das pessoas muda dependendo do ambiente, não é?"
1601005-77 = "Este equipamento oferece ao usuário um ambiente constante de prazo final."
1601005-78 = "Se houver uma crise iminente de que os dados do relatório que você tanto se esforçou para escrever serão apagados, mesmo que você odeie trabalhar, não terá escolha a não ser mover as mãos."
1601005-79 = "[s] \"Q-que ideia diabólica...!\""
1601005-83 = "Ah, Sensei. Falta menos de 1 minuto para a autodestruição."
1601005-87 = "[ns] \"P-pelo menos se eu digitar qualquer coisa...\""
1601005-90 = "『Aviso. O texto inserido anteriormente foi considerado irrelevante para os dados em criação』"
1601005-91 = "『Este texto não será contabilizado como tempo de entrada de dados』"
1601005-92 = "[s] \"...Por quê?\""
1601005-93 = "Este processador de textos usa uma IA que lê o texto já inserido para prever a próxima frase."
1601005-94 = "Caracteres inseridos apenas para atualizar o tempo não serão contados."
1601005-95 = "Vamos, Sensei. Você não quer apagar o relatório que progrediu até aqui, quer?"
1601005-101 = "Tente se motivar um pouco mais e encare o teclado."
1601005-102 = "[s] \"...Não dá.\""
1601005-103 = "Rah, rah, Professor."
1601005-105 = "（Graças à invenção da Hibiki, consegui terminar o relatório bem rápido, mas...）"
1601005-106 = "（Para evitar o uso indevido, confisquei o processador de texto com função de autodestruição.）"
