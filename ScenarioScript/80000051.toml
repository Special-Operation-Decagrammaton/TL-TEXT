[translation]
80000051-1 = "Mais amargo, mais doce"
80000051-2 = "Academia Gehenna - 17º Refeitório Estudantil"
80000051-3 = "（Após receber uma mensagem de Haruna, fui até o refeitório）"
80000051-4 = "[s] \"Bem, o local de encontro deveria ser aqui...\""
80000051-5 = "Fufu, Sensei. Seja muito bem-vindo."
80000051-6 = "[s] \"Ah, Haru—\""
80000051-7 = "Haa!"
80000051-10 = "[ns] \"Nmu!?\""
80000051-14 = "（De repente, o amargor do matcha e a doçura do chocolate se espalharam por toda a minha boca）"
80000051-18 = "[ns] \"Nnn... engoli. Isso é chocolate de matcha?\""
80000051-19 = "Sim, acertou. Como esperado do Sensei, você tem um bom faro."
80000051-20 = "[s] \"Faro ou paladar...?\""
80000051-21 = "Era um chocolate de matcha de uma marca razoavelmente boa, o que achou?"
80000051-22 = "[s] \"Hum. Foi amargo, doce e delicioso.\""
80000051-23 = "Entendo... já vejo, isso foi útil como referência."
80000051-24 = "......O que estou fazendo, você pergunta?"
80000051-25 = "Fufu. Como o Sensei bem sabe, hoje é Dia dos Namorados... o dia de presentear pessoas queridas com doces."
80000051-26 = "O chocolate é o principal, mas ultimamente presentes como bolos, balas e macarons também têm se tornado comuns."
80000051-27 = "Aqui vai uma pergunta para o Sensei: qual você acha que é o ponto em comum entre esses doces?"
80000051-28 = "[s] \"Bem...\""
80000051-29 = "O tempo acabou."
80000051-30 = "[s] \"Tinha limite de tempo!? E foi rápido!!\""
80000051-31 = "Sensei, a gastronomia muitas vezes impõe limites de tempo, não é? Não é raro que o sabor dure apenas um instante."
80000051-32 = "Deixando as brincadeiras de lado, a resposta é \"doçura\"."
80000051-33 = "[s] \"Bem, são doces, afinal...?\""
80000051-34 = "Sim, de certa forma pode parecer óbvio. Mas eu pensei o seguinte: por que presenteamos com doces no Dia dos Namorados?"
80000051-35 = "Após pensar e pensar, eu percebi."
80000051-36 = "......Isso é uma metáfora."
80000051-37 = "[s] \"Metáfora...?\""
80000051-38 = "Esse sentimento de querer expressar gratidão a alguém importante..."
80000051-39 = "Em suma, não seria a afeição pela outra pessoa sendo expressa como \"doçura\"?"
80000051-40 = "[s] \"...Entendo?\""
80000051-41 = "Então, criei a seguinte hipótese. Se a afeição realmente se traduz em doçura, quanto mais gratidão colocarmos..."
80000051-42 = "O doce não ficaria ainda mais doce?!"
80000051-43 = "[s] \"Talvez... seja isso?\""
80000051-44 = "Sendo assim, preparei aqui os ingredientes para o chocolate de matcha."
80000051-45 = "Por que chocolate de matcha?"
80000051-46 = "Porque, é claro, é algo onde se pode sentir o amargor e a doçura simultaneamente. Será muito mais fácil de notar do que apenas comparar a doçura."
80000051-47 = "Chegou a hora da investigação."
80000051-48 = "Vamos lá, Sensei, vamos criar o chocolate mais doce do mundo juntos!"
80000051-49 = "[s] \"Isso significa que...\""
80000051-50 = "Aconteceu algo? Você vai colaborar comigo, não vai?"
80000051-51 = "[s] \"Bem, antes disso, se essa doçura seguir a sua hipótese...\""
80000051-52 = "Você vai colaborar, não vai?"
80000051-53 = "[s] \"...Sim.\""
80000051-54 = "Fufu, então vamos começar!"
80000051-55 = "（E assim, comecei a fazer o chocolate de matcha junto com a Haruna）"
80000051-58 = "Hum... falhei no controle do fogo. Quem diria que a tigela explodiria de repente..."
80000051-67 = "Fufu, é bem conhecido em Gehenna que \"existe um monstro vivendo na geladeira do refeitório estudantil\"..."
80000051-68 = "Mas não sou do tipo que desiste por causa de algo tão trivial quanto isso!"
80000051-76 = "Muito bem, vamos continuar!"
80000051-80 = "[ns] \"Será que vai dar tudo certo...?\""
80000051-83 = "(E assim, superando várias dificuldades, o chocolate de matcha finalmente ficou pronto)"
80000051-85 = "Fufu, finalmente está pronto... O chocolate de matcha artesanal definitivo, feito especialmente para o Sensei!"
80000051-86 = "Por favor, experimente. Gostaria que confirmasse se ele está ainda mais doce do que o anterior."
80000051-87 = "[s] \"Certo, vou experimentar.\""
80000051-92 = "Fufufu...!"
80000051-93 = "(Enquanto recebia o olhar cheio de expectativa da Haruna, não havia necessidade de esconder nada...)"
80000051-94 = "[s] \"Hum, está doce e delicioso. Muito mais do que o anterior.\""
80000051-95 = "Eu sabia! É um sucesso! Demos mais um passo em direção à gastronomia suprema...!"
80000051-96 = "[s] \"Claro, é porque tem o seu carinho nele, Haruna.\""
80000051-97 = "！？！！！？！？！？"
80000051-98 = "O, o meu carinho... B-bem, sim, certamente é verdade, mas...?"
80000051-99 = "É, não é...?"
80000051-100 = "[s] \"Haruna? Aconteceu alguma coisa?\""
80000051-101 = "……Entendo. Isso eu não esperava."
80000051-102 = "(Esse sentimento ao estar de frente para a pessoa que mais gosto, essa sensação avassaladora... E essa doçura que nasce novamente a partir desse comentário...)"
80000051-103 = "Fu, fufufu... Entendo, foi um ótimo aprendizado."
80000051-104 = "Bem, Sensei, vou me retirar agora."
80000051-105 = "Ah, por favor, coma todo o restante do chocolate também. Até mais...!"
80000051-109 = "[ns] \"Ei, Haruna!?\""
80000051-112 = "(Depois de ver a Haruna partir em disparada, experimentei o chocolate de matcha mais uma vez)"
80000051-114 = "(Era levemente amargo, mas, como esperado, incrivelmente doce)"
