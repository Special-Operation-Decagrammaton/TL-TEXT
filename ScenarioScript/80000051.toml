[translation]
80000051-1 = "より苦く、より甘く"
80000051-2 = "ゲヘナ学園・第17学生食堂"
80000051-3 = "（ハルナから連絡を受けて、学食へと訪れた）"
80000051-4 = "[s] \"えっと、待ち合わせ場所はここで合ってるはず……。\""
80000051-5 = "ふふっ、先生。ようこそお越しくださいました。"
80000051-6 = "[s] \"あ、ハル――\""
80000051-7 = "はぁっ！"
80000051-10 = "[ns] \"んむっ！？\""
80000051-14 = "（突然口の中いっぱいに、抹茶の苦みとチョコレートの甘味とが広がった）"
80000051-18 = "[ns] \"んん……ごくんっ。これ、抹茶チョコレート？\""
80000051-19 = "はい、正解ですわ。さすがは先生、勘が良いですね。"
80000051-20 = "[s] \"勘というか、舌……？\""
80000051-21 = "それなりに良いブランドの抹茶チョコレートだったのですが、いかがでしたか？"
80000051-22 = "[s] \"うん。苦くて甘くて美味しかった。\""
80000051-23 = "なるほど……そうですか、参考になりました。"
80000051-24 = "……何をしているのか、ですか？"
80000051-25 = "ふふっ。先生もご存じの通り、本日はバレンタインデー……大切な方へ、スイーツをプレゼントする日です。"
80000051-26 = "主流はチョコレートですが、最近はケーキやキャンディー、マカロンといったプレゼントも増えてきました。"
80000051-27 = "ここで先生に質問です、このスイーツたちの共通点は何だと思われますか？"
80000051-28 = "[s] \"えーっと……\""
80000051-29 = "時間切れです。"
80000051-30 = "[s] \"時間制限あり！？そして早い！！\""
80000051-31 = "先生、美食というのは往々にして時間制限があるものなのですよ？美味しいのはその一瞬、ということは珍しくもありません。"
80000051-32 = "という冗談はさておき、その答えは「甘味」です。"
80000051-33 = "[s] \"まあ、スイーツだもんね……？\""
80000051-34 = "はい、ある意味では当然かもしれません。しかし私はこう思ったのです。どうしてバレンタインデーには甘い物をプレゼントするのか、と。"
80000051-35 = "悩みに悩んだ末、私は気が付きました。"
80000051-36 = "……これは比喩だと。"
80000051-37 = "[s] \"比喩……？\""
80000051-38 = "大事な方に感謝を届けたいというこの気持ち……。"
80000051-39 = "つまりは、相手への想いが「甘味」として表現されているのではと！"
80000051-40 = "[s] \"……なるほど？\""
80000051-41 = "そこで、私はこんな仮説を思いつきました。もしその通り想いが甘さに繋がるのであれば、感謝の気持ちを込めれば込めるほど……"
80000051-42 = "そのスイーツはさらに甘くなるのでは、と！"
80000051-43 = "[s] \"そう、かも……？\""
80000051-44 = "というわけでこちらに、抹茶チョコレートの材料をご用意いたしました。"
80000051-45 = "どうして抹茶チョコレートなのか？"
80000051-46 = "それはもちろん、苦味と甘みが同時に感じられるものだからです。甘みだけを比べるよりも、きっと分かりやすいでしょう。"
80000051-47 = "今こそ究明の時です。"
80000051-48 = "さあ先生、共に究極に甘いチョコレートを作るとしましょう！"
80000051-49 = "[s] \"それはつまり……\""
80000051-50 = "どうかしましたか？もちろん協力してくださいますよね？"
80000051-51 = "[s] \"えっと、その前にその甘さって仮説通りなら……\""
80000051-52 = "協力、してくださいますよね？"
80000051-53 = "[s] \"……はい。\""
80000051-54 = "ふふっ、では始めましょう！"
80000051-55 = "（そうしてハルナと一緒に、抹茶チョコレートを作り始めた）"
80000051-58 = "ふむ……火の調節に失敗してしまいましたね。急にボウルが爆発するとは……"
80000051-67 = "ふふっ、ゲヘナにおいて「学生食堂の冷蔵庫には魔物が住んでいる」というのは有名なお話……"
80000051-68 = "しかし今さら、それしきのことで諦める私ではございません！"
80000051-76 = "さあ、続けましょう！"
80000051-80 = "[ns] \"色々と大丈夫かな……。\""
80000051-83 = "（そうして様々な苦難を乗り越え、ようやく抹茶チョコレートが完成した）"
80000051-85 = "ふふっ、遂に完成です……先生のために作った、究極の手作り抹茶チョコレート！"
80000051-86 = "ではご賞味ください。先ほどの抹茶チョコレートよりもさらに甘いかどうか、確認していただければと。"
80000051-87 = "[s] \"じゃあ、頂きます。\""
80000051-92 = "ふふふっ……！"
80000051-93 = "（期待に満ちたハルナの視線を受けつつも、何も繕う必要などないくらい……）"
80000051-94 = "[s] \"うん、甘くて美味しい。さっきのチョコよりもずっと。\""
80000051-95 = "やはりそうでしたか！成功です、究極の美食へ向けてさらに新たなもう一歩を踏み出しましたわ……！"
80000051-96 = "[s] \"もちろん、ハルナの気持ちがこもってるからね。\""
80000051-97 = "！？！！！？！？！？"
80000051-98 = "わ、私の気持ち……ま、まあ、ええ、確かにそれはそうなのですが……？"
80000051-99 = "そう、ですわね……？"
80000051-100 = "[s] \"ハルナ？どうかした？\""
80000051-101 = "……なるほど。これは予想していませんでした。"
80000051-102 = "（一等好きな御方と向き合っている時のこの気持ち、この突き上げるような感覚……そしてその感想から再び生まれる、この甘さは……）"
80000051-103 = "ふ、ふふふっ……なるほど、良い勉強になりましたわ。"
80000051-104 = "では先生、私はこれで失礼いたします。"
80000051-105 = "あ、残りのチョコレートもぜひ全部食べてくださいね。それでは……！"
80000051-109 = "[ns] \"ちょっ、ハルナ！？\""
80000051-112 = "（すごい勢いで去っていくハルナを見送ってから、もう一度抹茶チョコを味わった）"
80000051-114 = "（ほんのり苦いけれど、やっぱりものすごく甘かった）"
