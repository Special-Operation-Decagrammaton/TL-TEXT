[translation]
1600503-1 = "Como se divertir na praia"
1600503-2 = "Ah, S-Sensei. Eu estava esperando por você."
1600503-3 = "A-a propósito, por que veio aqui de repente...?"
1600503-4 = "[s1] \"Pensei em deixar a praia mais animada.\"\n[s2] \"Achei que se estivéssemos nos divertindo, todos viriam se juntar a nós.\""
1600503-5 = "E-eh, bem...!?"
1600503-6 = "E-eh, bem...!?"
1600503-7 = "……？"
1600503-8 = "Sensei... o que é tudo isso...?"
1600503-9 = "[s3] \"Eu trouxe tudo o que consegui!\"\n[s4] \"Bola de praia, boia, guarda-sol, frisbee e...\""
1600503-10 = "E-eh, t-tantas coisas assim..."
1600503-11 = "E-eh, t-tantas coisas assim..."
1600503-12 = "S-será que, se eu não estiver me enganando... isso é para mim...?"
1600503-13 = "N-não, não é um incômodo...! Como poderia ser...!?"
1600503-14 = "M-muito obrigada..."
1600503-15 = "……Bem, é que."
1600503-16 = "Não sei nem como agradecer..."
1600503-17 = "……Sim?"
1600503-18 = "Que se eu me divertir, isso é o que importa...?"
1600503-19 = "E-entendo. Se é assim... eu compreendo."
1600503-20 = "Eu, Tsurugi, darei o meu melhor...!"
1600503-21 = "Com toda a minha força! Vou me divertir ao máximo!!"
1600503-22 = "（……）"
1600503-23 = "（Pensei comigo mesma: \"O que significa se divertir?\", mas decidi não me preocupar com isso por enquanto.）"
1600503-25 = "（Por enquanto, abri o guarda-sol e enchi a boia e a bola de praia, e o clima começou a ficar bom.）"
1600503-26 = "（Mas...）"
1600503-28 = "E-estou pronta, Sensei. Pode ser a qualquer momento...!"
1600503-29 = "[s5] \"Então vamos lá, Tsurugi!\"\n[s6] Jogo a bola de praia levemente em direção à Tsurugi."
1600503-30 = "（Toque）"
1600503-31 = "（Toque）"
1600503-32 = "Ah, bem..."
1600503-33 = "……Kieeeeeaaaaah!!!"
1600503-34 = "[s] \"……？\""
1600503-35 = "（BOOOOOM！！！！）"
1600503-39 = "Ha, ha, ha, ha... ufa, hum."
1600503-40 = "S-Sensei... eu, eu fiz direito...?"
1600503-41 = "Ué... Sensei?"
1600503-42 = "……。"
1600503-43 = "V-você está bem!?"
1600503-44 = "[s7] \"Estou bem, foi por pouco.\"\n[s8] \"Tem um buraco no chão...\""
1600503-45 = "D-desculpe..."
1600503-46 = "D-desculpe..."
1600503-47 = "Sim? Mais uma vez... você disse? Tem certeza de que está tudo bem...?"
1600503-48 = "E-entendido. Então, mais uma vez...!"
1600503-49 = "（Toque）"
1600503-50 = "……Kihiyaaaaaaaah!!!"
1600503-52 = "（ZDOOOOOM！！！！）"
1600503-53 = "（……）"
1600503-54 = "（É melhor tentarmos outra brincadeira.）"
1600503-56 = "P-peço perdão..."
1600503-57 = "Sinto que, de alguma forma, tudo saiu errado... eu..."
1600503-58 = "O Sensei veio até aqui e eu só estou causando problemas..."
1600503-59 = "[s] Pega o frisbee."
1600503-62 = "Sensei, isso é...?"
1600503-63 = "Um frisbee...? Hum, isso é..."
1600503-64 = "O-o que exatamente eu devo fazer? Digo, como se brinca com isso...?"
1600503-65 = "É só pegar e trazer de volta...? Se for assim, acho que consigo fazer..."
1600503-66 = "Dessa forma, não parece que vou sobrecarregar o Sensei..."
1600503-67 = "E-então... por favor...!!"
1600503-68 = "[s] Lança o frisbee."
1600503-71 = "...Ah."
1600503-72 = "...Hyaaaaaaah!!"
1600503-76 = "...Se-Sensei! Eu peguei!"
1600503-77 = "E-está correto assim...?"
1600503-78 = "[s9] \"Eu acabei soltando sem querer e foi muito longe...\"\n[s10] \"Tsurugi, você é incrível...\""
1600503-79 = "É-é mesmo? E-eu fico feliz que esteja me elogiando..."
1600503-80 = "É-é mesmo? E-eu fico feliz que esteja me elogiando..."
1600503-81 = "Nn, t-talvez isso dê certo...!"
1600503-84 = "Se não se importar... pode jogar mais uma vez?"
1600503-85 = "[ns] Fiquei curioso para ver até onde ia, então vou jogar com toda a minha força."
1600503-89 = "(Depois disso, brinquei de frisbee com a Tsurugi por um tempo)"
1600503-90 = "(Eu jogava com toda a força, a Tsurugi pegava e trazia de volta até aqui... Senti que o jeito de brincar estava um pouco diferente, mas decidi não me importar)"
1600503-91 = "Haa, haa... haa..."
1600503-92 = "[s] \"Bom trabalho, Tsurugi. Quer descansar um pouco?\""
1600503-93 = "...Kihi, kihihi."
1600503-96 = "[wa:500]— Kihi, [wa:1370]kyahahahahaha!"
1600503-99 = "— Ah, [wa:1270]desculpe..."
1600503-101 = "— Muito obrigada, [wa:1960]Sensei."
1600503-104 = "[wa:500]— É a [wa:300]primeira vez que [wa:2450]brinco na praia assim. [wa:2400]É divertido, mas,"
1600503-107 = "— ao mesmo tempo, [wa:1400]exige mais [wa:1410]energia do que eu pensava..."
1600503-110 = "[wa:2900]— Estou um [wa:2330]pouco cansada."
1600503-113 = "[wa:150]— ...Falando nisso, Sensei. [wa:3000]Lembrei de algo de repente,"
1600503-115 = "— este traje de banho [wa:2050]tem ficado [wa:1500]um pouco [wa:1150]apertado..."
1600503-118 = "[wa:100]— Será que [wa:2000]o tamanho [wa:1080]não está correto...?"
1600503-121 = "— Ah, [wa:750]o que foi... [wa:1370]a- [wa:850]aconteceu alguma coisa!?"
1600503-123 = "— E-eu, [wa:720]eu [wa:1130]fiz [wa:1070]algo [wa:900]estranho [wa:900]de novo...!?"
