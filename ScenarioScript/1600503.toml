[translation]
1600503-1 = "夏の海での遊び方"
1600503-2 = "あ、せ、先生。お待ちしておりました。"
1600503-3 = "と、ところで急に、どうしましたか……？"
1600503-4 = "[s1] \"にぎやかな海にしようと思って。\"\n[s2] \"楽しそうにしてたら、みんな寄ってくるかなって。\""
1600503-5 = "え、えっと……！？"
1600503-6 = "え、えっと……！？"
1600503-7 = "……？"
1600503-8 = "先生……それは、どうしたのですか……？"
1600503-9 = "[s3] \"とりあえず全部持ってきた！\"\n[s4] \"ビーチボールと浮き輪とパラソルとフリスビーと……\""
1600503-10 = "え、こ、こんなたくさん……。"
1600503-11 = "え、こ、こんなたくさん……。"
1600503-12 = "も、もしかして、勘違いでなければ……私のために……？"
1600503-13 = "い、いえ、ご迷惑だなんて……！そんな……！？"
1600503-14 = "あ、ありがとう、ございます……。"
1600503-15 = "……えっと、その。"
1600503-16 = "何とお礼を言えば良いのか……。"
1600503-17 = "……はい？"
1600503-18 = "楽しく遊んでくれればそれが一番……？"
1600503-19 = "そ、そうでしたか。そういうことであれば……分かりました。"
1600503-20 = "不肖ツルギ、ベストを尽くし……！"
1600503-21 = "この上なく全力で！楽しく遊びます！！"
1600503-22 = "（……）"
1600503-23 = "（「遊ぶ」って何だっけって思ったけど、とりあえず気にしないことにした）"
1600503-25 = "（とりあえずパラソルを開いて、浮き輪とビーチボールを膨らませると、雰囲気が出てきた）"
1600503-26 = "（けど……）"
1600503-28 = "じゅ、準備できました、先生。いつでも大丈夫です……！"
1600503-29 = "[s5] \"じゃあ行くよ、ツルギ！\"\n[s6] ツルギに向かってビーチボールを軽く投げる。"
1600503-30 = "（トンッ）"
1600503-31 = "（トンッ）"
1600503-32 = "あ、えと……。"
1600503-33 = "……きえぇぇぇぁぁっ！！！"
1600503-34 = "[s] \"……？\""
1600503-35 = "（ドゴオォォォォォォン！！！！）"
1600503-39 = "はっ、はっ、はあ、はあ……ふぅ、んっ。"
1600503-40 = "せ、先生……私、ちゃんとできてましたか……？"
1600503-41 = "あれ……先生？"
1600503-42 = "……。"
1600503-43 = "だ、大丈夫ですか！？"
1600503-44 = "[s7] \"大丈夫、ギリギリだったけど。\"\n[s8] \"地面に穴が……。\""
1600503-45 = "す、すみません……。"
1600503-46 = "す、すみません……。"
1600503-47 = "はい？もう一回……ですか？本当に大丈夫ですか……？"
1600503-48 = "わ、分かりました。それではもう一度……！"
1600503-49 = "（トンッ）"
1600503-50 = "……きひゃああぁぁぁぁぁっ！！！"
1600503-52 = "（ズドオォォォォォォン！！！！）"
1600503-53 = "（……）"
1600503-54 = "（別の遊びにしよう）"
1600503-56 = "も、申し訳ありません……。"
1600503-57 = "なんだか、色々と違っていたような……私……。"
1600503-58 = "せっかく先生が来てくださったのに、迷惑を……。"
1600503-59 = "[s] フリスビーを取り出す。"
1600503-62 = "先生、それは……？"
1600503-63 = "フリスビー……？えっと、それは……。"
1600503-64 = "い、一体どうすれば良いのでしょう。その、遊び方といいますか……。"
1600503-65 = "ただキャッチして、戻してくれれば良い……？で、でしたら私にもできる気がしますが……。"
1600503-66 = "これなら先生にも、負担はかからなさそうですし……。"
1600503-67 = "そ、それでは……お願いします……！！"
1600503-68 = "[s] フリスビーを投げる。"
1600503-71 = "……っ。"
1600503-72 = "……ひゃっはぁぁぁぁぁっ！！"
1600503-76 = "……せ、先生！取ってきました！"
1600503-77 = "こっ、これで合ってますでしょうか……？"
1600503-78 = "[s9] \"今、すっぽ抜けてすんごい飛ばしちゃったんだけど……。\"\n[s10] \"ツルギはすごいね……。\""
1600503-79 = "そ、そうなんですか？ほ、褒めていただけるのは嬉しいです……。"
1600503-80 = "そ、そうなんですか？ほ、褒めていただけるのは嬉しいです……。"
1600503-81 = "んっ、こ、これなら大丈夫かもしれません……！"
1600503-84 = "よろしければ……もう一度、お願いできますか？"
1600503-85 = "[ns] どこまで行けるか気になったので、全力で遠くに投げてみよう。"
1600503-89 = "（その後、ツルギと一緒にしばらくフリスビーで遊んだ）"
1600503-90 = "（全力で投げて、ツルギがそれをキャッチして、わざわざこっちまで持ってきて……何だかちょっと違う遊び方な気がしたけど、気にしないことにした）"
1600503-91 = "はあっ、はあっ……はあっ……。"
1600503-92 = "[s] \"お疲れ様、ツルギ。ちょっと休む？\""
1600503-93 = "……きひっ、きひひっ。"
1600503-96 = "[wa:500]― きひっ、[wa:1370]きゃははははははっ！"
1600503-99 = "― あ、[wa:1270]すみません……"
1600503-101 = "― ありがとうございます、[wa:1960]先生。"
1600503-104 = "[wa:500]― こうして[wa:300]海で遊んだのは、[wa:2450]初めてでして。[wa:2400]楽しいですが、"
1600503-107 = "― 同時に[wa:1400]思ったより[wa:1410]体力が要るものなのですね……。"
1600503-110 = "[wa:2900]― ちょっとだけ、[wa:2330]疲れました。"
1600503-113 = "[wa:150]― ……そういえば先生。[wa:3000]ふと思い出したのですが、"
1600503-115 = "― この水着[wa:2050]ずっと、[wa:1500]少し[wa:1150]窮屈で…。"
1600503-118 = "[wa:100]― もしかして、[wa:2000]サイズが[wa:1080]合ってないのでしょうか……。"
1600503-121 = "― あ、[wa:750]あれ……[wa:1370]ど、[wa:850]どうかしましたか！？"
1600503-123 = "― わ、わ、[wa:720]私[wa:1130]また、[wa:1070]何か[wa:900]変なことを……！？"
