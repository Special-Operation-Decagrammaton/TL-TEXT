[translation]
80000125-1 = "Apresentação"
80000125-2 = "――O que você acha que é a essência do Dia dos Namorados?"
80000125-3 = "[s] \"O, o que será...\""
80000125-4 = "É um feriado, e――"
80000125-5 = "É o dia em que três mártires se tornaram santos, e――"
80000125-6 = "É o dia em que os pássaros encontram seus pares――"
80000125-7 = "Mas, nos tempos modernos, o significado foi alterado pelas empresas de confeitaria."
80000125-8 = "Ao estabelecerem que este é o dia de presentear pessoas próximas com chocolates――"
80000125-9 = "A demanda por chocolates disparou nesta época. Como resultado, isso levou ao aumento dos lucros das empresas."
80000125-10 = "Hoje em dia, tornou-se completamente o dia de dar chocolates... O Sensei também entende dessa forma, não é?"
80000125-11 = "[s] \"Como você costumava passar o dia, Rio?\""
80000125-12 = "Eu... achava que participar de um feriado criado por conveniências corporativas era inútil."
80000125-13 = "É irracional, afinal."
80000125-14 = "……Sim, até agora."
80000125-15 = "[s] \"E agora...?\""
80000125-16 = "……Isso também se conecta ao motivo pelo qual chamei o Sensei para este esconderijo."
80000125-17 = "……."
80000125-18 = "Ultimamente, sinto que até mesmo coisas que parecem irracionais――"
80000125-19 = "podem ter uma racionalidade oculta."
80000125-20 = "Tudo o que existe tem um motivo para ter nascido――"
80000125-21 = "E se eu deixei passar despercebido até agora... eu quero encontrar esse motivo."
80000125-22 = "Não posso negar que a influência do Sensei foi fundamental para eu chegar a essa conclusão."
80000125-23 = "[s] \"Entendo. Então foi por isso que você me...?\""
80000125-24 = "Você ainda não entendeu? O Sensei também tem responsabilidade neste assunto."
80000125-25 = "Ao analisar os dados dos chocolates presenteados neste Dia dos Namorados..."
80000125-26 = "……."
80000125-27 = "Foi a própria irracionalidade."
80000125-28 = "Não há consistência, e isso é esperado. Não consegui confirmar nenhum valor comum."
80000125-29 = "A facção do \"feito à mão com sentimentos é o supremo\"――"
80000125-30 = "A facção do \"chocolates caros de grandes empresas são os melhores\"――"
80000125-31 = "A facção do \"mesmo sendo barato, o que vale é a lembrança\"――"
80000125-32 = "――E a facção do \"cobrir a si mesmo com chocolate e se dar de presente\"."
80000125-33 = "[s] \"O último é um caso especial demais, não acha!?\""
80000125-34 = "V, você acha? #nEm suma――"
80000125-35 = "Entendi que este 14 de fevereiro é o dia em que cada um fica absorto por causa de um presente especial."
80000125-36 = "Por isso, eu também pensei em um chocolate que pudesse me convencer à minha maneira."
80000125-37 = "Primeiro, até mesmo produtos caros de prateleira têm compromissos inerentes à produção em massa."
80000125-38 = "Segundo, em nível individual, é impossível superar a engenharia de alimentos buscada pelas grandes empresas."
80000125-39 = "――Por isso, decidi fazer um chocolate artesanal, abordando-o sob a perspectiva da engenharia de alimentos."
80000125-40 = "O chocolate é uma mistura de massa de cacau, manteiga de cacau, laticínios, açúcar, etc...."
80000125-41 = "O que determina a qualidade é, especialmente, o \"cacau\", que possui a maior concentração."
80000125-42 = "Desta vez, preparei o raro cacau Criollo."
80000125-43 = "A receita detalhada foi obtida através de engenharia reversa de chocolates caros do mercado――"
80000125-44 = "E reproduzi todo o processo com o \"Avant-Garde-kun Type. Chocolatier\" que eu mesma projetei."
80000125-45 = "――Até aí, tudo bem. #nMas percebi que existe um elemento com impacto psicológico maior do que o sabor."
80000125-46 = "……É o formato do chocolate."
80000125-47 = "Então, continuei aprofundando meus pensamentos..."
80000125-48 = "Por que eu me tornei quem sou hoje?"
80000125-49 = "O que seria adequado para me representar... foi o que pensei."
80000125-50 = "E assim, este chocolate foi concluído."
80000125-55 = "[ns] \"Isto é... o emblema da Millennium?\""
80000125-56 = "Sim."
80000125-57 = "Se não fosse pela Millennium Science School, eu não seria quem sou hoje."
80000125-58 = "Eu tentei imaginar. Como seria se eu frequentasse outra escola..."
80000125-59 = "Gehenna, Trinity, Hyakkiyako, Red Winter, Shanhaijing, Highlander, Wild Hunt, Odyssey... existem tantas escolas e..."
80000125-60 = "Eu provavelmente teria me tornado uma pessoa influenciada pelo ambiente de cada uma delas."
80000125-61 = "Mas foi justamente por ter entrado na Millennium Science School que a Rio Tsukatsuki de hoje existe."
80000125-62 = "Ou seja, este chocolate... pode ser considerado como a própria representação de mim mesma."
80000125-63 = "Por isso, achei que este formato seria o ideal."
80000125-64 = "Analisei racionalmente cada possibilidade e cheguei a esta... resposta lógica."
80000125-65 = "..."
80000125-66 = "Isto é... o que seria isso...?"
80000125-67 = "[s] \"Hum...?\""
80000125-68 = "A produção do chocolate foi deixada a cargo do produto da engenharia, o #n\"Avant-Garde-kun Type. Chocolatier\"..."
80000125-69 = "Todo o processo deveria ter sido conduzido de forma racional..."
80000125-70 = "[s] \"...?\""
80000125-71 = "Sensei, responda-me. Se foi realmente fabricado de forma racional..."
80000125-72 = "Não deveria haver espaço para sentimentos, certo?"
80000125-73 = "[s] \"Bem... é verdade.\""
80000125-74 = "Pois é..."
80000125-75 = "Deveria ser assim, mas..."
80000125-76 = "Por alguma razão, sinto-me muito..."
80000125-77 = "-- \"envergonhada\"."
80000125-78 = "Não acha isso estranho?"
80000125-79 = "Apesar de ter eliminado completamente as emoções..."
80000125-80 = "Ainda assim, sentimentos acabaram surgindo."
80000125-81 = "Eu entenderia se fosse algo ocorrido em uma escala microscópica, que até mesmo especialistas deixariam passar despercebido."
80000125-82 = "Mas no processo de fabricação do chocolate, não deveria haver nenhum elemento que eu deixasse passar."
80000125-83 = "Será que houve alguma falha em algum lugar...?"
80000125-84 = "[s1] \"Não houve falha nenhuma.\"\n[s2] \"Fiquei feliz em sentir o carinho da Rio. Obrigado!\""
80000125-87 = "...!"
80000125-88 = "O que exatamente você fez!?"
80000125-89 = "Ao receber um agradecimento, sinto-me duas vezes mais... envergonhada...!"
80000125-90 = "O que você pretende com isso!? Sensei!"
80000125-91 = "[s3] \"C-calma...\"\n[s4] \"Vou dizer de novo. Obrigado, Rio.\""
80000125-94 = "...!"
80000125-95 = "..."
80000125-96 = "S-se você pensa assim..."
80000125-97 = "..."
80000125-98 = "...Eu fico feliz, Sensei."
