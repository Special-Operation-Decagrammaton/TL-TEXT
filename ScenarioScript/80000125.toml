[translation]
80000125-1 = "プレゼンテーション"
80000125-2 = "――バレンタインの本質とは「何」だと思う？"
80000125-3 = "[s] \"な、なんだろう……。\""
80000125-4 = "祝日であり――"
80000125-5 = "3人の殉教者が聖人となった日であり――"
80000125-6 = "鳥[ruby=つがい]が番を[/ruby]見つける日――"
80000125-7 = "でも、現代では製菓会社によって、その意味合いが変質しているわ。"
80000125-8 = "身近な者にチョコレートを贈る日と定めたことにより――"
80000125-9 = "この時期はチョコを求める者が急増した。結果、企業の増収に繋がっているわね。"
80000125-10 = "今ではすっかり、チョコレートを贈る日に……先生も、そう認識しているのでしょう？"
80000125-11 = "[s] \"リオはどう過ごしてたの？\""
80000125-12 = "私は……企業の都合から生まれた祝日に参加するなんて、無意味だと思っていたわ。"
80000125-13 = "非合理的ですもの。"
80000125-14 = "……そう、今まではね。"
80000125-15 = "[s] \"今はどうなの……？\""
80000125-16 = "……先生を[ruby=ここ]隠れ家[/ruby]に呼んだ理由にも繋がるわね。"
80000125-17 = "……。"
80000125-18 = "最近、一見非合理的なものにも――"
80000125-19 = "隠された合理性があるのではないかと感じているの。"
80000125-20 = "どんなものにも、産まれたことに理由があり――"
80000125-21 = "いままで見落としてきたとすれば……それを見つけたい。"
80000125-22 = "この結論に至るまでに、先生の影響があったことは否定できないわ。"
80000125-23 = "[s] \"なるほど。それで私を……？\""
80000125-24 = "もう分かったのではなくて？この件は先生にも責任があるのよ。"
80000125-25 = "今回、バレンタインに贈られるチョコのデータを分析してみたところ……。"
80000125-26 = "……。"
80000125-27 = "非合理的そのものだったわ。"
80000125-28 = "一貫性はなくて当たり前。共通する数値も確認できない。"
80000125-29 = "「想いを込めた手作りこそ至高」派――"
80000125-30 = "「大企業の高級チョコこそ嬉しい」派――"
80000125-31 = "「安物でも、思い出になればいい」派――"
80000125-32 = "――「自らをチョコでコーティングし、プレゼントする」派。"
80000125-33 = "[s] \"最後のは特殊すぎる事例だからね！？\""
80000125-34 = "そ、そうかしら？#nつまり――"
80000125-35 = "この2月14日は、それぞれが特別な贈り物のために、無我夢中になる日……と理解したわ。"
80000125-36 = "そこで、私も、私なりに納得できるチョコを考えてみたの。"
80000125-37 = "その一、高級既製品にも、結局は量産品ならではの妥協がある。"
80000125-38 = "その二、個人レベルでは、大企業が追求する食品工学に追いつくことはできない。"
80000125-39 = "――だから私は、食品工学の観点からアプローチをした、手作りチョコレートを作ると決めたわ。"
80000125-40 = "チョコレートは、カカオマスやカカオバター、乳製品、砂糖などをミックスしたもの……。"
80000125-41 = "その品質を左右するのは、特に含有量が多い「カカオ」よ。"
80000125-42 = "今回は、希少種のクリオロカカオを用意したわ。"
80000125-43 = "細かいレシピは、市販の高級チョコレートをリバースエンジニアリングし――"
80000125-44 = "私が直接設計した「アバンギャルド君 Type.ショコラティエ」で、全工程を再現。"
80000125-45 = "――そこまでは良かったわ。#nでも、味以上に心理的影響が大きい要素があると気付いたの。"
80000125-46 = "……チョコレートの形状よ。"
80000125-47 = "そこで、思考を重ねていったの……。"
80000125-48 = "私は、なぜ今の私になっていったのか。"
80000125-49 = "私を示すのに適したものは何か……とね。"
80000125-50 = "そうして、このチョコレートが完成した。"
80000125-55 = "[ns] \"これは……ミレニアムの校章？\""
80000125-56 = "そう。"
80000125-57 = "ミレニアムサイエンススクールがなければ、今の私はいなかった。"
80000125-58 = "想像してみたの。私が他の学園に通っている姿を……。"
80000125-59 = "ゲヘナやトリニティ、百鬼夜行、レッドウィンター、山海経、ハイランダー、ワイルドハント、オデュッセイアなど……学園はたくさんあり――"
80000125-60 = "それぞれの環境に影響を受けた私になっていたでしょうね。"
80000125-61 = "でも、ミレニアムサイエンススクールに入学したからこそ、今の[ruby=つかつき]調月[/ruby]リオがいるの。"
80000125-62 = "つまり、このチョコレートは……私そのものといってもいい。"
80000125-63 = "だから、この形が最適と考えたわ。"
80000125-64 = "一つ一つの可能性を合理的に考察し、導き出した……理性的な回答よ。"
80000125-65 = "……。"
80000125-66 = "これは……何かしら……？"
80000125-67 = "[s] \"うん……？\""
80000125-68 = "チョコレートの製造は、工学の産物である#n「アバンギャルド君 Type.ショコラティエ」に任せ……。"
80000125-69 = "全ての過程は合理的に進行した……はず……。"
80000125-70 = "[s] \"……？\""
80000125-71 = "先生、答えてちょうだい。本当に合理的に製造されたのなら……。"
80000125-72 = "そこに感情が入り込む余地など、ないわよね？"
80000125-73 = "[s] \"まあ……そうだね。\""
80000125-74 = "そうよね……。"
80000125-75 = "そのはずなのに……。"
80000125-76 = "何故か、とても――"
80000125-77 = "――「恥ずかしい」と感じているわ。"
80000125-78 = "おかしなことだとは思わなくて？"
80000125-79 = "感情を徹底的に排したというのに――"
80000125-80 = "それでも、感情が生まれてしまった。"
80000125-81 = "専門家でも見落とすような、ミクロな領域で起きた出来事ならば理解ができるのだけれど。"
80000125-82 = "でも、チョコレート製造の工程において、私が見落とす要素なんてないはず。"
80000125-83 = "もしかして、どこかに落ち度が……？"
80000125-84 = "[s1] \"そんなことないよ。\"\n[s2] \"リオの気持ちが伝わってきて嬉しかった。ありがとう！\""
80000125-87 = "……！"
80000125-88 = "一体何をしたというの！？"
80000125-89 = "お礼を言われたら、さっきの倍以上……恥ずかしく……っ！"
80000125-90 = "どういうつもり！？先生！"
80000125-91 = "[s3] \"お、落ち着いて……\"\n[s4] \"もう一度言うね。ありがとう、リオ。\""
80000125-94 = "……っ！"
80000125-95 = "……"
80000125-96 = "そ、そう思ってもらえたなら……"
80000125-97 = "……"
80000125-98 = "……嬉しいわ、先生。"
