[translation]
10026035-2 = "Ah, ah... ah..."
10026035-3 = "Meu Deus, o que foi aquilo, aquele pessoal...! Por que eles estavam aqui!?"
10026035-4 = "E além disso... por que eles estavam vestidos daquele jeito...!?"
10026035-5 = "Ugh... levei um susto tão grande que minhas pernas falharam..."
10026035-6 = "[s1] \"Koharu, você está bem?\"\n[s2] \"Não se machucou em lugar nenhum?\""
10026035-9 = "S-sim... por enquanto, estou bem..."
10026035-13 = "Aaaah!! N-não dá! Definitivamente não dá!"
10026035-14 = "[s3] \"Então... aqui.\"\n[s4] \"Segure-se firme.\""
10026035-20 = "...P-Sensei!?"
10026035-22 = "...No fim, não encontramos nada suspeito. Para que será que este lugar era usado...?"
10026035-23 = "...Aliás, eles estão demorando, não é? Aqueles dois. Será que se perderam no caminho..."
10026035-24 = "É um lugar bem amplo, afinal."
10026035-25 = "Não pode ser... quer que eu vá procurar?"
10026035-26 = "Não, é melhor não. Procurar às cegas é como tentar buscar lã e sair tosquiado. Se formos procurar, precisamos de algum plano antes..."
10026035-27 = "...Ah, eles chegaram."
10026035-37 = "[ns5] \"Finalmente conseguimos voltar...\"\n[ns6] \"Foi um susto e tanto, né?\""
10026035-40 = "Que bom, Sensei. Fico aliviada que tenham voltado em segurança."
10026035-41 = "Estávamos justamente discutindo se deveríamos ir atrás de vocês."
10026035-42 = "Eh? Nós não passamos por nada em especial, mas..."
10026035-43 = "...Isso é verdade?"
10026035-44 = "Uma cópia vestindo roupa de banho...?"
10026035-45 = "U-uma mimesis!?"
10026035-46 = "Ora, entendo..."
10026035-47 = "De fato, não é algo impossível. Afinal, estas são ruínas do Comitê de Estudantes."
10026035-48 = "P-por que ninguém está questionando a roupa de banho...?"
10026035-49 = "Fufu... se é roupa de banho ou não, é um detalhe irrelevante."
10026035-50 = "...Aliás."
10026035-51 = "Eu também tive uma surpresa inesperada...♡"
10026035-52 = "[s7] \"...Inesperada?\"\n[s8] \"Hanako e os outros também encontraram algo?\""
10026035-55 = "Sensei..."
10026035-56 = "Primeiro, vamos conversar depois que você colocar a pessoa que está nas suas costas no chão."
10026035-57 = "[s] \"…………？\""
10026035-59 = "[ns] \"…………。\""
10026035-60 = "...Koharu-chan♡"
10026035-61 = "Enquanto não estávamos por perto, vocês dois tiveram um momento bem caloroso, não foi?♡"
10026035-62 = "F-foi realmente incrível! Hanako, você não vai acreditar!"
10026035-63 = "...Espera, hein?"
10026035-64 = "O-o que você está dizendo!?"
10026035-65 = "Eu disse algo errado?"
10026035-66 = "Agarrada assim nas costas do Sensei...♡"
10026035-71 = "...?"
10026035-72 = "Bem... isso, é que..."
10026035-77 = "N-não! Não, não, não, não, não, não!!! É engano, acredite em mim!!! É sério, não é nada disso!"
10026035-78 = "I-isso foi só porque minhas pernas falharam...!"
10026035-79 = "...Ora♡"
10026035-80 = "Eu disse que não é! Não é!! Não é isso!!! Não é nada desse tipo!!!"
10026035-82 = "Eu disse que não é nada disso, droga!!!!!"
