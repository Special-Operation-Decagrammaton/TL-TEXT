[translation]
10026035-2 = "はあ、はあ……はあ……。"
10026035-3 = "もう、何なのよ、あいつら……！#nなんでここに居るの！？"
10026035-4 = "それに……どうしてあんな格好を……！？"
10026035-5 = "うぅっ……ビックリして腰が抜けちゃった……"
10026035-6 = "[s1] \"コハル、大丈夫？\"\n[s2] \"どこも怪我してない？\""
10026035-9 = "う、うん……とりあえず、何とか……"
10026035-13 = "ひいいぃっ！！む、無理！やっぱり無理っ！"
10026035-14 = "[s3] \"それじゃ……はい。\"\n[s4] \"しっかり掴まっててね。\""
10026035-20 = "……せ、先生！？"
10026035-22 = "……結局、不審な点は見つかりませんでしたね。#nこの場所は、何に使われていたのでしょう……？"
10026035-23 = "……ところで、遅いですね……あの二人。#nひょっとして、道に迷ったとか……"
10026035-24 = "かなりの広さでしたからね。"
10026035-25 = "そんな……私が探しに行ってみましょうか？"
10026035-26 = "いえ、それはやめておきましょう。闇雲に探しては、ミイラ取りがミイラになるようなものです。探しに行くとしても、何か事前に対策を……"
10026035-27 = "……あ、来ましたよ。"
10026035-37 = "[ns5] \"やっと戻ってこられた……。\"\n[ns6] \"本当にビックリしたね。\""
10026035-40 = "良かったです、先生。無事に戻ってきてくださって、一安心です。"
10026035-41 = "ちょうど、お二人を探しにいこうかと話し合っていたところでした。"
10026035-42 = "え？私たちは、特に何もありませんでしたが……"
10026035-43 = "……それは本当ですか？"
10026035-44 = "水着を着た[ruby=ミメシス]複製[/ruby]が……？"
10026035-45 = "み、ミメシスですか！？"
10026035-46 = "あら、なるほど……"
10026035-47 = "たしかに、あり得ない話ではありませんね。ここは聖徒会の遺跡ですし。"
10026035-48 = "ど、どうして誰も、水着にはツッコまないんですか……？"
10026035-49 = "ふふっ……水着かどうかなんて、些細な問題ですから。"
10026035-50 = "……ところで。"
10026035-51 = "私も予想外のことがあったのですが……♡"
10026035-52 = "[s7] \"……予想外？\"\n[s8] \"ハナコたちも何か見つけたの？\""
10026035-55 = "先生……"
10026035-56 = "まずは、おんぶしている人を降ろしてからお話をしましょう。"
10026035-57 = "[s] \"…………？\""
10026035-59 = "[ns] \"…………。\""
10026035-60 = "……コハルちゃん♡"
10026035-61 = "私たちが居ない間に、お二人ともそれはそれは熱い時間を過ごしてきたんですね♡"
10026035-62 = "ほ、本当にすごかったんだから！ハナコも絶対、驚くわよ！"
10026035-63 = "……って、ん？"
10026035-64 = "な、なに言ってんの！？"
10026035-65 = "何か間違っていましたか？"
10026035-66 = "先生の背中に、そんな風にぎゅうっと抱きついて……♡"
10026035-71 = "……？"
10026035-72 = "えっと……その、これは……"
10026035-77 = "い、いや！いやいやいやいやいやいや！！！違うから、信じて！！！#n本当に違うって、そうじゃないの！"
10026035-78 = "こっ、これは、ただ腰が抜けちゃって……！"
10026035-79 = "……あら♡"
10026035-80 = "違うってば！違うの！！違うから！！！#nそういうんじゃないから！！！"
10026035-82 = "本当に違うんだってばっ！！！！！"
