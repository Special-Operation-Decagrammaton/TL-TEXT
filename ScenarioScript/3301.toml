[translation]
3301-1 = "全力で振り抜いて（１）"
3301-3 = "〈――プレイボール！〉"
3301-5 = "みんな、集まって！"
3301-6 = "今回は練習試合だから、緊張しなくても大丈夫。"
3301-7 = "対戦相手はエンジニア部が作ってくれたロボットだし……#nデッドボールを当ててしまってブーイングされる心配も無いからね。"
3301-12 = "でも、エンジニア部のロボットってことは、別の危険があるんじゃ……？"
3301-13 = "あのピッチングロボット、前にエンジニア部の人がテストしたとき、あり得ない剛速球を何度も投げたって……"
3301-14 = "しかも、ボールを投げる前に挑発してくるんですよ！"
3301-15 = "たしかに前はそうだったかもしれないけど……"
3301-16 = "あれからセミナーが改善するよう言ったらしいから、今回は大丈夫なはず。"
3301-17 = "みんな、楽しんでいこう！"
3301-27 = "〈ストライクアウト！〉"
3301-30 = "うぅ……こんなの当たりっこないよ。"
3301-36 = "やっぱり、あんなに速かったら……"
3301-45 = "〈……4番、[ruby=のまさ]野正[/ruby]レイさん〉"
3301-46 = "あの子……新入部員のレイちゃんだよね？"
3301-47 = "らしいよ。なんと入部テストで打率0割8分を記録した期待の新人だって……"
3301-48 = "そんな好記録を！？"
3301-49 = "いやぁ～、先輩方にそうやって褒められたら照れちゃいますね。えへへ……"
3301-50 = "レイちゃん、前！！"
3301-54 = "〈ピッチャー、大きく振りかぶって――〉"
3301-55 = "来るっ……！"
3301-67 = "打った――！"
3301-68 = "あの剛速球を打ち返すなんて！？"
3301-69 = "もしかして、行ったんじゃない……！？"
3301-70 = "これでミレニアムも、ようやく今シーズン初のホームランを……"
3301-74 = "〈……アウト！〉"
3301-76 = "はぁ…………"
3301-77 = "〈スリーアウト、チェンジ！〉"
3301-80 = "……みんな、お疲れ！"
3301-82 = "お疲れ様でした！"
3301-83 = "レイちゃん、お疲れ！すごい活躍だったね！"
3301-84 = "いえ、先輩もお疲れ様でした！"
3301-85 = "本当に惜しかったね。#nあと少しでホームランだったのに……"
3301-86 = "だよね！音を聞いた瞬間、これは越えるって思ったくらい！"
3301-87 = "その、水を差すようで申し訳ないのですが……"
3301-88 = "ボールが当たった瞬間、これは届かないなって思ったんです。"
3301-89 = "……感覚で？"
3301-90 = "まだホームランを打った経験は無いので、感覚というのも少し違うかもしれませんが……"
3301-91 = "……芯を捉えた感触が無かったと言いますか……"
3301-92 = "そうだったんだ？"
3301-93 = "で、でも、次の試合もありますから。"
3301-94 = "……それで相談なんですが、ホームランを打つためには、何をすれば良いと思いますか？"
3301-99 = "……やっぱりバットをボールに当てる角度じゃないのかな？"
3301-100 = "飛んでいくボールは垂直方向に等加速度運動を、水平方向には等速直線運動をするわけで、45度方向のときに最も飛距離が伸びるから……"
3301-101 = "って、それは重力の影響だけを考えた真空下における方程式じゃん。"
3301-102 = "物体に作用する力を正確に計算するには、抗力と揚力……#nそれにモーメントも考慮する必要があるよ。"
3301-107 = "バットの材質も大事！#n軽くて反発力が高いほどいいに決まってる！"
3301-108 = "新素材開発部が新しく作ったバットの研究結果によると、既存の素材よりも飛距離が――"
3301-109 = "ここは効率的なバッティングフォームを――"
3301-116 = "やはり、ホームランを打つためには……"
3301-117 = "もっと筋肉をつける必要があるんじゃないかな、とも思ったんですが……"
3301-121 = "き、筋トレを……？"
3301-122 = "でも、運動は大変だし……"
3301-127 = "そもそも、ミレニアム野球部は道具の改良とデータを重視する理論派集団の集まりで……"
3301-128 = "……ホームランは打てなくても、安打で得点を稼げばいいんじゃないかな？"
3301-129 = "もちろん、チームで勝つなら安打の方が大切かもしれません……"
3301-134 = "でも、やっぱりホームランを打ちたいんです！"
3301-138 = "ごめんね、レイちゃん。ウチの野球部、トレーニングに詳しい人居ないんだ。"
3301-139 = "私も理論なら教えられるんだけど、トレーニングは苦手で……"
3301-140 = "そう、ですか……"
3301-141 = "代わりに、専門家の紹介ならできるよ。"
3301-142 = "……トレーニング部って聞いたことある？"
3301-143 = "トレーニング部、ですか……？"
3301-145 = "ミレニアム・ジム"
3301-148 = "……遅いですね、会員の皆さん。"
3301-149 = "これでは、昨日せっかく鍛えた筋肉が……"
3301-154 = "……やはり、昨日のトレーニングが[ruby=こた]堪[/ruby]えてしまったのでしょうか。"
3301-155 = "部員が増える気配もありませんし、会員の数も……"
3301-156 = "こうなったら直接、新入部員を探しに――"
3301-163 = "失礼します、トレーニング部はここですか？"
3301-164 = "そうですが……"
3301-165 = "あ、自分は野球部の野正レイって言います！"
3301-166 = "その、部長からトレーニングの方法が知りたかったら、ここに行くよう言われて……"
3301-167 = "そうでしたか、トレーニングに来たんですね。"
3301-168 = "はい。ここなら、ホームランを打つための筋肉が鍛えられると聞きました！"
3301-169 = "……筋肉！"
3301-170 = "自分だけじゃトレーニング方法が分からなくて……#nそれなら専門的な知識のある人に教わりたいと思ったんです。"
3301-171 = "次の大会まで仮入部したいんですが……いいでしょうか？"
3301-175 = "……すみません、急に来られても困りますよね。"
3301-176 = "来週、返事を聞かせてもらえれば――"
3301-178 = "すぐに始めましょう！"
3301-179 = "は、はい……？"
3301-181 = "トレーニングの成果は、向上心によって大きく変わります！"
3301-182 = "筋肉をつけたいと思ったのなら、1分1秒たりとも無駄にしてはなりません！"
3301-183 = "今！この瞬間にも！あなたの筋肉は少しずつ減っていますから！"
3301-188 = "さあ！早速スクワット10セットから始めましょう！"
3301-189 = "ま、待ってください、先輩！#nまだ自分、着替えてすらないんですが！"
3301-197 = "（……こうして、スミレによるレイの特別トレーニングは始まった）"
