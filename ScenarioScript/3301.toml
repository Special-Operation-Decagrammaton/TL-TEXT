[translation]
3301-1 = "Balançar com força total (1)"
3301-3 = "〈――Play ball!〉"
3301-5 = "Pessoal, venham aqui!"
3301-6 = "Como é apenas um jogo de treino, não precisam ficar nervosas."
3301-7 = "O adversário é um robô feito pelo Clube de Engenharia, então...#nNão precisam se preocupar em levar uma bolada e serem vaiadas."
3301-12 = "Mas, sendo um robô do Clube de Engenharia, não existe outro tipo de perigo...?"
3301-13 = "Dizem que aquele robô arremessador, quando foi testado pelo pessoal da engenharia, lançou bolas rápidas impossíveis várias vezes..."
3301-14 = "E além disso, ele provoca a gente antes de lançar a bola!"
3301-15 = "Bem, talvez tenha sido assim antes, mas..."
3301-16 = "Disseram que o Seminário pediu para eles melhorarem isso, então desta vez deve estar tudo bem."
3301-17 = "Vamos nos divertir, pessoal!"
3301-27 = "〈Strikeout!〉"
3301-30 = "Ugh... não tem como rebater isso."
3301-36 = "Como esperado, se for tão rápido assim..."
3301-45 = "〈...4ª rebatedora, Rei Nomasa〉"
3301-46 = "Aquela garota... é a Rei-chan, a nova integrante, né?"
3301-47 = "Parece que sim. Dizem que ela é a novata promissora que registrou 8% de aproveitamento no teste de admissão..."
3301-48 = "Um recorde tão bom assim!?"
3301-49 = "Ah, não precisa me elogiar tanto assim, senpai. Hehe..."
3301-50 = "Rei-chan, na frente!!"
3301-54 = "〈O arremessador se prepara para o lançamento――〉"
3301-55 = "Lá vem...!"
3301-67 = "Ela rebateu――!"
3301-68 = "Rebater aquela bola rápida desse jeito!?"
3301-69 = "Será que... será que foi um home run...!?"
3301-70 = "Com isso, Millennium finalmente consegue o primeiro home run da temporada..."
3301-74 = "〈...Out!〉"
3301-76 = "Haa............"
3301-77 = "〈Três outs, troca de lado!〉"
3301-80 = "...Bom trabalho, pessoal!"
3301-82 = "Bom trabalho!"
3301-83 = "Rei-chan, bom trabalho! Sua atuação foi incrível!"
3301-84 = "Não, senpai, bom trabalho para você também!"
3301-85 = "Foi realmente por pouco. #nFaltou tão pouco para ser um home run..."
3301-86 = "Pois é! No momento em que ouvi o som, achei que ia passar!"
3301-87 = "Bem, desculpe estragar o clima, mas..."
3301-88 = "No momento em que a bola bateu, eu senti que não ia chegar lá."
3301-89 = "...Por intuição?"
3301-90 = "Como ainda não fiz um home run, talvez não seja exatamente intuição..."
3301-91 = "...É que eu não senti que acertei em cheio..."
3301-92 = "Sério?"
3301-93 = "M-mas, ainda teremos outros jogos."
3301-94 = "...Por isso queria pedir um conselho, o que vocês acham que devo fazer para conseguir um home run?"
3301-99 = "...Não seria o ângulo do bastão ao acertar a bola?"
3301-100 = "A bola em voo segue um movimento uniformemente acelerado na vertical e um movimento retilíneo uniforme na horizontal, então a distância é maior em um ângulo de 45 graus, logo..."
3301-101 = "Ei, isso é uma equação no vácuo considerando apenas a gravidade."
3301-102 = "Para calcular com precisão as forças que atuam no objeto, precisamos considerar o arrasto, a sustentação... #ne também o momento."
3301-107 = "O material do bastão também é importante! #nQuanto mais leve e com maior poder de repulsão, melhor!"
3301-108 = "De acordo com os resultados de pesquisa do bastão feito pelo Departamento de Desenvolvimento de Novos Materiais, a distância em comparação aos materiais existentes é――"
3301-109 = "O que precisamos aqui é de uma postura de rebatida eficiente――"
3301-116 = "Afinal, para rebater um home run..."
3301-117 = "Eu pensei que talvez precisasse ganhar mais massa muscular, mas..."
3301-121 = "T-treino de força...?"
3301-122 = "Mas exercícios são tão cansativos..."
3301-127 = "Para começar, o clube de beisebol da Millennium é um grupo de teóricos que prioriza a melhoria de equipamentos e dados..."
3301-128 = "...Mesmo que eu não consiga rebater um home run, não seria melhor marcar pontos com rebatidas simples?"
3301-129 = "Claro, se o objetivo é vencer como time, talvez as rebatidas simples sejam mais importantes..."
3301-134 = "Mas, no fundo, eu ainda quero rebater um home run!"
3301-138 = "Desculpe, Rei-chan. No nosso clube de beisebol, não tem ninguém que entenda de treinamento."
3301-139 = "Eu até consigo ensinar a parte teórica, mas não sou boa com treinamentos..."
3301-140 = "Entendo, é mesmo..."
3301-141 = "Em compensação, posso te apresentar a uma especialista."
3301-142 = "...Já ouviu falar do Clube de Treinamento?"
3301-143 = "Clube de Treinamento, você diz...?"
3301-145 = "Ginásio da Millennium"
3301-148 = "...Vocês estão atrasados, membros."
3301-149 = "Desse jeito, os músculos que treinei ontem com tanto esforço..."
3301-154 = "...Será que o treino de ontem foi pesado demais?"
3301-155 = "Não há sinais de novos membros, e o número de associados também..."
3301-156 = "Se for assim, terei que ir pessoalmente procurar novos membros—"
3301-163 = "Com licença, aqui é o Clube de Treinamento?"
3301-164 = "Sim, é aqui, mas..."
3301-165 = "Ah, eu sou a Nozo Rei, do clube de beisebol!"
3301-166 = "É que a minha capitã disse que, se eu quisesse aprender métodos de treinamento, deveria vir aqui..."
3301-167 = "Entendo, então você veio para treinar."
3301-168 = "Sim! Ouvi dizer que aqui dá para fortalecer os músculos necessários para rebater um home run!"
3301-169 = "...Músculos!"
3301-170 = "Eu não sei como treinar sozinha...#nPor isso, pensei em aprender com alguém que tenha conhecimento especializado."
3301-171 = "Eu gostaria de entrar como membro temporário até o próximo torneio... seria possível?"
3301-175 = "...Desculpe, eu sei que é um pedido repentino e deve ser um incômodo."
3301-176 = "Se puder me dar uma resposta na semana que vem—"
3301-178 = "Vamos começar imediatamente!"
3301-179 = "H-hein...?"
3301-181 = "Os resultados do treinamento mudam drasticamente dependendo da sua ambição!"
3301-182 = "Se você quer ganhar músculos, não pode desperdiçar nem um segundo sequer!"
3301-183 = "Agora! Neste exato momento! Seus músculos estão diminuindo pouco a pouco!"
3301-188 = "Vamos! Comece imediatamente com 10 séries de agachamentos!"
3301-189 = "E-espere, senpai!#nEu nem troquei de roupa ainda!"
3301-197 = "(...Assim, o treinamento especial de Rei sob a supervisão de Sumire começou)"
