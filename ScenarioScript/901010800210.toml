[translation]
901010800210-11 = "FOX2, encontrou alguma coisa?"
901010800210-12 = "Tinha um manual de instruções que os membros leem antes de sair para patrulhar. Estou verificando o conteúdo."
901010800210-13 = "\"Mapa da área de patrulha\", \"itens principais de verificação\", \"rede de contato de emergência\"..."
901010800210-14 = "Parece um manual de operações comum, ou lista de verificação –"
901010800210-18 = "Ah, tem uma anotação à mão no final."
901010800210-23 = "\"Uma vez por semana, o plantonista deve dar uma volta no porto rolando um tambor à meia-noite\"...?"
901010800210-24 = "Que tipo de instrução é essa?"
901010800210-25 = "Não explica o motivo, nem o objetivo?"
901010800210-26 = "Não. Só a instrução."
901010800210-27 = "Uma instrução bem estranha. Parece aquelas coisas de \"não entre na sala 302\"."
901010800210-28 = "Por que não pode entrar na sala 302?"
901010800210-29 = "Sei lá. Se explicasse, não seria uma lenda, né?"
901010800210-31 = "Toda instrução na vida real tem uma \"intenção\"."
901010800210-32 = "A intenção dessa a gente discute depois."
901010800210-33 = "FOX2, continue investigando o interior do depósito."