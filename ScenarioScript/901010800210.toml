[translation]
901010800210-11 = "FOX2, did you find anything?"
901010800210-12 = "I found a guide manual that members read before going on patrol. Checking the contents now."
901010800210-13 = "It has a 'Patrol Area Map,' 'Key Inspection Points,' and an 'Emergency Contact List'..."
901010800210-14 = "It looks like a standard operational manual or checklist, but—"
901010800210-18 = "Oh, there's a handwritten note at the end of this manual."
901010800210-23 = "'Once a week, the person on night duty must roll a drum can around the harbor at midnight'…?"
901010800210-24 = "What kind of instruction is that?"
901010800210-25 = "Is there no reason or purpose written for why they have to do that?"
901010800210-26 = "Nope. No explanation. Just the instruction."
901010800210-27 = "That's a strange order. #nIt's like those ghost stories that say, 'No matter what happens, never enter Room 302.'"
901010800210-28 = "Why can't you enter Room 302?"
901010800210-29 = "I don't know. Well, if you could explain it, it wouldn't be a ghost story anymore, right?"
901010800210-31 = "Fictional or not, every real-world manual has an 'intent' behind it."
901010800210-32 = "Let's discuss the intent behind this later."
901010800210-33 = "FOX2, continue searching the inside of the warehouse."