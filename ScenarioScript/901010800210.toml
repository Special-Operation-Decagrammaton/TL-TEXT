[translation]#[Texto Final. - Filipe 05/07.]
901010800210-11 = "FOX2, achou alguma coisa?"
901010800210-12 = "Um manual de instruções que os membros leem antes da ronda. Estou verificando."
901010800210-13 = "Mapa da área de patrulha, pontos de verificação, rede de contato de emergência……"
901010800210-14 = "Parece só um manual de trabalho normal ou checklist, mas――"
901010800210-18 = "Ah, tem uma anotação à mão no final."
901010800210-23 = "'Uma vez por semana, o plantão noturno deve dar uma volta no porto rolando um tambor à meia-noite'……?"
901010800210-24 = "Que tipo de instrução é essa?"
901010800210-25 = "Não explica o porquê?"
901010800210-26 = "Não. Só a ordem."
901010800210-27 = "Que estranho.#nIgual aquelas histórias de terror: 'nunca entre na sala 302'."
901010800210-28 = "Por que não pode entrar na 302?"
901010800210-29 = "Sei lá. Se explicasse, não seria história de terror."
901010800210-31 = "Em histórias inventadas até vai, mas na vida real todo manual tem uma 'intenção'."
901010800210-32 = "Depois a gente discute o significado disso."
901010800210-33 = "FOX2, continue investigando o interior do armazém."