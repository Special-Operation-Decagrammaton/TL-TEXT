[translation]
2005005-1 = "Sozinha não dá!"
2005005-2 = "Schale - Portão Principal"
2005005-3 = "Uau! Que rápido!"
2005005-4 = "[s] \"Olá, Ritsu!\""
2005005-5 = "Mas Sensei, você não está ocupado?"
2005005-6 = "[s1] \"...Bem, os adultos...\"\n[s2] \"Não deixam passar a chance de fugir do trabalho.\""
2005005-9 = "Ah! Eu sei o que é isso!"
2005005-10 = "Hum, não se chama \"negligência profissional\"?"
2005005-11 = "[s] \"Ugh...!\""
2005005-12 = "Mas você vai sair comigo, né?"
2005005-13 = "Então, mesmo sendo um Sensei negligente, está tudo bem!"
2005005-14 = "Então, vamos nessa! Vou te guiar pelo meu \"território\"!"
2005005-19 = "(Guiado pela mão de Ritsu, fomos em direção à rua comercial)"
2005005-21 = "Rua Comercial de Roupas"
2005005-22 = "Chegamos!"
2005005-23 = "Desde roupas casuais até trajes de gala, tem de tudo aqui!"
2005005-24 = "[s] \"É uma cidade da moda, hein!\""
2005005-25 = "A loja naquela esquina vende aquelas roupas transparentes que você gosta, Sensei!"
2005005-26 = "[s3] \"Eu já disse que não gosto!\"\n[s4] \"Além disso, será que tem demanda para isso!?\""
2005005-29 = "Ahaha! Então vamos começar por aqui!"
2005005-30 = "Vamos procurar umas roupas com bom preço!"
2005005-38 = "(Assim, passei um tempo olhando as lojas de roupas com Ritsu)"
2005005-39 = "(De vez em quando, Ritsu me recomendava roupas com designs bem ousados, mas...)"
2005005-40 = "(No fim das contas, consegui encontrar roupas que caíram muito bem)"
2005005-42 = "Mercado Negro - Entrada"
2005005-43 = "Nossa, fiz ótimas compras!"
2005005-44 = "E você, Sensei?"
2005005-45 = "[s] \"Hum... Acho que uma revolução da moda aconteceu comigo também.\""
2005005-46 = "Hehe, fico feliz por ter te convidado!"
2005005-47 = "Ei, Sensei, pode me esperar aqui um pouquinho?"
2005005-48 = "[s] \"Por acaso, é uma 'importação'?\""
2005005-52 = "O Sensei entende tudo, hein~"
2005005-53 = "Já volto!"
2005005-58 = "[ns] (...Acho que vou dar uma volta enquanto espero)"
2005005-60 = "[ns] (Este beco aqui... tem uma atmosfera diferente...)"
2005005-62 = "Chegue mais! Cliente, está procurando alguma coisa?"
2005005-63 = "[s] \"Bem, estou procurando um casaco...\""
2005005-64 = "Timing perfeito!#nAcabou de chegar um lote novo!"
2005005-68 = "O que acha deste? Foi amor à primeira vista, né? Quer experimentar?#nPode ir, o provador é por aqui~"
2005005-69 = "[s] \"Bem... eu gostaria de dar mais uma olhada antes...\""
2005005-70 = "Não, não, olhar em outros lugares é perda de tempo!#nEste é o ideal! Somos amigos, não somos? Você confia em mim, né?"
2005005-71 = "[s] \"...Nós acabamos de nos conhecer.\""
2005005-72 = "Ah, experimenta logo!"
2005005-76 = "Uau! Eu sabia que meu olho não falha! Parece até feito sob medida!#nEssa roupa nasceu para você, cliente!"
2005005-77 = "[s] \"...Mas as mangas estão muito longas.\""
2005005-78 = "Sem preocupações! O alfaiate ali corta rapidinho!#nEspere só um pouco!"
2005005-79 = "[s] \"Não, eu ainda não decidi comprar...\""
2005005-80 = "Ei, ei, o que está dizendo agora? Já ouviu falar que encontros são únicos?#nSe deixar passar aqui, nunca mais vai encontrar outra igual!"
2005005-81 = "O que você está fazendo?"
2005005-85 = "Ah...! Ei, Chefe!?"
2005005-86 = "De novo com a venda forçada?"
2005005-87 = "I-isso está fora de cogitação! #nÉ que não temos as roupas que este cliente deseja, então eu estava explicando que o atenderemos na próxima vez!"
2005005-88 = "Ah, entendi! Então, Sensei vai levar isso aqui~"
2005005-89 = "Sim! Por favor, tome cuidado no caminho de volta!"
2005005-94 = "Este lado é um pouco perigoso, sabe~"
2005005-95 = "[s] \"Ritsu... é chamada de 'aneki' (irmã mais velha)...\""
2005005-96 = "Hehe."
2005005-97 = "Desculpe por ter te deixado sozinho, tá? #nDe agora em diante, eu vou ficar bem grudadinha em você!"
2005005-98 = "Assim você se sente mais seguro, né?"
