[translation]
1008905-1 = "二度あることは三度ある"
1008905-3 = "（約束の時間を過ぎても、アルは現れなかった）"
1008905-7 = "[ns1] \"トラブルにでも巻き込まれたのかな……\"\n[ns2] \"そろそろ連絡してみようかな……\""
1008905-11 = "い、いえ！あの、ちょっと……"
1008905-12 = "す、少しでいいの！少しだけ待ってちょうだい！#nど、どうして……？まさか、また……？"
1008905-14 = "[ns3] \"今の声は……\"\n[ns4] 声が聞こえてきた方に向かう。"
1008905-18 = "ううむ、参ったな。学生さんも大変なんだろうけど……"
1008905-19 = "ち、違うの！お金はちゃんとあるのよ！"
1008905-20 = "いやいや、そんな責めるつもりは無いから落ち着いておくれ。"
1008905-21 = "あんたにも事情があるんだろうけど……"
1008905-22 = "ただ、そのな……こんな高価な服だと直すのに手間もかかったわけでな。#nさすがにツケで、ってのはちょっと……"
1008905-23 = "何もあんたが逃げようとか疑ってるわけじゃないんだが、店の方針だからすまない。"
1008905-24 = "[s5] \"アル、どうかしたの？\"\n[s6] 事情を聞く。"
1008905-27 = "……え、先生？"
1008905-28 = "ん……？"
1008905-32 = "……先生！？ど、どど、どうしてここに……！"
1008905-33 = "ま、まだ約束の時間じゃ……！！"
1008905-34 = "……はっ。"
1008905-35 = "もうこんな時間……！？！？ "
1008905-40 = "[ns7] \"なるほど、カードが使えなくなってたんだ。\"\n[ns8] \"それで代金が支払えなかったんだね。\""
1008905-43 = "どうやら、また風紀委員会が私の口座を見つけて止めたみたい。#n今度こそ絶対にバレないルートで作ったはずなのに……"
1008905-44 = "はぁ……困ったわね。#n凍結を解除するのにも時間がかかりそうだわ。"
1008905-48 = "うう……"
1008905-49 = "まったくもう！#n今日はこんな姿を見せるつもりじゃなかったのに……！！"
1008905-50 = "……ん？ええ、現金も一応あるにはあるんだけど……"
1008905-51 = "ただ、その……今回のお直しは少し高額で……"
1008905-55 = "結構高価な服だったもんで、お直しの費用も当然それなりにかかってな……"
1008905-56 = "学生さんの手持ちじゃ足りないらしいんだ。"
1008905-57 = "……ん？"
1008905-58 = "どの服を直したのかって？#nああ、これだよ。"
1008905-63 = "[ns9] \"あれ、このドレス……\"\n[ns10] \"たしかに、これなら料金にも納得だね。\""
1008905-66 = "だが、そこが問題でな。#n少額ならツケでも構わないんだが、これは流石に……"
1008905-67 = "……え、なんだって？"
1008905-68 = "あんたが代わりに払うのか……？"
1008905-69 = "……先生！？"
1008905-70 = "もちろん構わないんだが……本当に大丈夫なのか？#nまあ、学生さんはすぐにこの服を受け取りたいみたいだったし……"
1008905-71 = "良かったじゃねえか！ハッハッハ！！"
1008905-76 = "（料金を代わりに支払ってドレスを受け取り、アルと一緒に商店街を後にした）"
1008905-82 = "……ありがとう、先生。また借りを作ってしまったわね。"
1008905-83 = "こ、これはその……なんというか……"
1008905-84 = "そ、そう！"
1008905-85 = "……投資！"
1008905-86 = "投資よ！便利屋に対する投資だと受け取っておくわ！"
1008905-87 = "……。"
1008905-91 = "あ、ありがとう……それと、ごめんなさい。#n迷惑をかけてばっかりで……"
1008905-92 = "……うん？"
1008905-93 = "気にしないで、と言ってもらえるのは嬉しいけど……"
1008905-94 = "こうもお世話になりっぱなしじゃ、そうもいられないわ。"
1008905-95 = "[s11] \"事業を続けるには、信用が大切だからね。\"\n[s12] \"それに私も、未来の自分によく任せてるから！\""
1008905-98 = "………！！"
1008905-99 = "ふ、ふふっ……なるほど、流石は先生ね。#n素晴らしいアドバイスだわ。"
1008905-100 = "それなら、さっきの言葉を改めてハッキリさせておきましょう。"
1008905-104 = "……先生からの信用、この[ruby=りくはちま]陸八魔[/ruby]アルは絶対に忘れないわ。"
1008905-105 = "私に手伝ってほしいことがあれば、いつでも連絡してちょうだい！"
1008905-106 = "ふふ、ふふふ……！"
1008905-111 = "……あ、そうだ。"
1008905-114 = "今日の代金なのだけど……"
1008905-115 = "いつ返せばいいかしら？"
1008905-119 = "（その後、何度も断ったのだが、アルは口座の凍結が解除されるとすぐにお金を振り込んできた）"
