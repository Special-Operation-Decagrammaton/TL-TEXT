[translation]
1000402-1 = "深夜の会議"
1000402-2 = "（深夜、ゲヘナ自治区の市内辺境地域。ヒナとの約束の場所に到着した）"
1000402-3 = "（夜中だからか、周囲には誰もいない）"
1000402-4 = "（やや物寂しい感じがする）"
1000402-5 = "[ns] （ヒナはどうして、こんな時間に約束したんだろう？）"
1000402-8 = "……先生。"
1000402-9 = "[s1] \"ヒナちゃん、こんばんは～。\"\n[s2] \"先に来てたんだ？\""
1000402-10 = "ちゃっ、ちゃん、って……。"
1000402-11 = "変な気分になるから、そういうのはやめて。"
1000402-13 = "（頷く）"
1000402-14 = "……こんな時間に呼び出してごめん。"
1000402-15 = "……その、私、ゲヘナでは結構有名人で、どこに行っても目立つし。"
1000402-16 = "一挙手一投足を観察されてる立場だから。"
1000402-17 = "もし先生と一緒にいるところを誰かに見られたりしたら、きっと迷惑をかけることになる……。"
1000402-18 = "……それで、こんな時間になった。"
1000402-19 = "[s] \"ヒナはアイドルみたいな存在なんだね。\""
1000402-20 = "ア、アイドル……？いや、そういうのとは違うと思うけど……。"
1000402-21 = "そもそも私はそんな、可愛くてキラキラするような存在とは程遠い。"
1000402-22 = "……。"
1000402-23 = "……まあ、個人的な時間がないとか、いつも周りを気にしなきゃいけないとか、そういう悪い部分では似てるかもしれない……。"
1000402-24 = "[s3] \"ヒナも可愛いよ。\"\n[s4] \"ヒナもキラキラしてるよ。\""
1000402-25 = "……そんなお世辞ばかり言ってるから、先生は評判が良くないの！"
1000402-26 = "……そんなお世辞ばかり言ってるから、先生は評判が良くないの！"
1000402-27 = "大人だからって特別扱いするつもりはないから、ちゃんとして！"
1000402-28 = "（怒られてしまった）"
1000402-29 = "[s5] \"でも本音なのに。\"\n[s6] \"本当だよ。\""
1000402-30 = "……え？"
1000402-31 = "……え？"
1000402-32 = "い、いや、この流れでそんなに真面目な顔されると……。"
1000402-33 = "……。"
1000402-34 = "べ、別に先生の話が嘘だって言いたかったわけではなくて……。"
1000402-35 = "私が可愛くないのは、誰よりも自分で分かってるから……。"
1000402-36 = "……いや、こんな話がしたくて先生を呼んだんじゃないの！"
1000402-37 = "本題、本題に入る！"
1000402-38 = "（先生と話してると、話がすぐ変な方向に行っちゃう）"
1000402-40 = "……えっと、私がわざわざ先生を呼び出したのは、"
1000402-41 = "今期のゲヘナの治安状況を共有して、次の四半期の共同捜査計画を立てるに当たって、助言をもらうため。"
1000402-42 = "[s] \"つまり、仕事だね。\""
1000402-43 = "そう、仕事。じゃなかったら、まさか個人的なことで、こんな深夜に先生を呼び出すと思う？"
1000402-44 = "[s] \"デートだと思ったのに。\""
1000402-46 = "……先生。"
1000402-47 = "[s] \"さあ、仕事しよう！仕事！\""
1000402-49 = "（ヒナが用意してきた書類を読んで、意見を交わした）"
1000402-51 = "なるほど、先生はそういう意見なんだ。参考になる。"
1000402-52 = "[s] \"そんなに役に立ててないかもしれないけど。\""
1000402-53 = "いや、私たちとは違う観点からの意見こそ、物事を客観視するための重要な要素だから。"
1000402-54 = "そういう意味で、先生の意見は私にとって有意義。"
1000402-55 = "それに、大人の考え方を聞いてみることってあまり無いから。"
1000402-56 = "[s] \"ヒナは私のこと、信頼してくれてるんだね。\""
1000402-58 = "あ、当たり前でしょう？……頼りない大人だけど。"
1000402-59 = "だから今後も、色々とお願いをすることになるかも。その時も遅い時間になるだろうけど。"
1000402-60 = "[s7] \"もちろん、任せて。\"\n[s8] \"いつでも呼んで。\""
1000402-61 = "ありがとう、先生。"
1000402-62 = "ありがとう、先生。"
1000402-63 = "くぁ……だいぶ遅い時間になっちゃった。そろそろ帰って休まないと。"
1000402-64 = "じゃあ、先生。また今度。"
1000402-66 = "（ヒナは軽く挨拶をした後、疲れた顔で帰っていった）"
