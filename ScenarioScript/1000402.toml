[translation]
1000402-1 = "Reunião na calada da noite"
1000402-2 = "（Tarde da noite, na periferia do distrito de Gehenna. Cheguei ao local combinado com Hina）"
1000402-3 = "（Talvez por ser madrugada, não há ninguém por perto）"
1000402-4 = "（Sinto uma atmosfera um tanto solitária）"
1000402-5 = "[ns] （Por que será que a Hina marcou esse horário?）"
1000402-8 = "……Sensei."
1000402-9 = "[s1] \"Boa noite, Hina-chan～.\"\n[s2] \"Você chegou primeiro?\""
1000402-10 = "Hina-chan...?"
1000402-11 = "Isso me deixa com uma sensação estranha, então pare com isso."
1000402-13 = "（Assinto）"
1000402-14 = "……Desculpe por te chamar a essa hora."
1000402-15 = "……É que, eu sou bem famosa em Gehenna, e acabo chamando atenção onde quer que eu vá."
1000402-16 = "Estou sempre sendo observada em cada passo que dou."
1000402-17 = "Se alguém visse você comigo, com certeza causaria problemas para você……."
1000402-18 = "……Por isso, acabamos nos encontrando a essa hora."
1000402-19 = "[s] \"Então a Hina é como uma idol, né?\""
1000402-20 = "I-Idol……? Não, acho que não é bem assim……."
1000402-21 = "Para começo de conversa, estou longe de ser alguém fofa e brilhante como elas."
1000402-22 = "……."
1000402-23 = "……Bem, talvez sejamos parecidos no lado ruim, como não ter tempo pessoal ou ter que estar sempre preocupada com o que os outros pensam……."
1000402-24 = "[s3] \"Você também é fofa, Hina.\"\n[s4] \"Você também brilha, Hina.\""
1000402-25 = "……É por ficar dizendo essas gentilezas que a sua reputação não é boa, Sensei!"
1000402-26 = "……É por ficar dizendo essas gentilezas que a sua reputação não é boa, Sensei!"
1000402-27 = "Não pretendo te tratar de forma especial só por ser um adulto, então comporte-se!"
1000402-28 = "（Fui repreendido）"
1000402-29 = "[s5] \"Mas é o que eu penso de verdade.\"\n[s6] \"É a verdade.\""
1000402-30 = "……Eh?"
1000402-31 = "……Eh?"
1000402-32 = "N-Não, é que com esse clima, você me olhar com tanta seriedade assim……."
1000402-33 = "……."
1000402-34 = "N-Não que eu esteja dizendo que o que você disse é mentira……."
1000402-35 = "Eu mesma sei melhor do que ninguém que não sou fofa……."
1000402-36 = "……Não, não foi para falar disso que eu te chamei!"
1000402-37 = "Vamos ao assunto principal, ao assunto principal!"
1000402-38 = "（Sempre que converso com o Sensei, o assunto acaba indo para um lado estranho）"
1000402-40 = "……Bem, eu chamei o Sensei aqui porque,"
1000402-41 = "queria compartilhar a situação atual da segurança em Gehenna e pedir seu conselho para planejar a investigação conjunta do próximo trimestre."
1000402-42 = "[s] \"Ou seja, é trabalho.\""
1000402-43 = "Isso, trabalho. Se não fosse, você acha mesmo que eu chamaria o Sensei no meio da madrugada por motivos pessoais?"
1000402-44 = "[s] \"Pensei que fosse um encontro.\""
1000402-46 = "……Sensei."
1000402-47 = "[s] \"Vamos trabalhar! Trabalho!\""
1000402-49 = "（Li os documentos que a Hina preparou e trocamos opiniões）"
1000402-51 = "Entendo, então essa é a sua opinião, Sensei. É muito útil."
1000402-52 = "[s] \"Talvez eu não tenha ajudado tanto assim.\""
1000402-53 = "Não, opiniões de um ponto de vista diferente do nosso são elementos cruciais para analisar as coisas de forma objetiva."
1000402-54 = "Nesse sentido, a sua opinião é muito valiosa para mim."
1000402-55 = "Além disso, não tenho muitas oportunidades de ouvir a perspectiva de um adulto."
1000402-56 = "[s] \"Então você confia em mim, Hina.\""
1000402-58 = "I-Isso é óbvio, não é?…… Mesmo que você seja um adulto pouco confiável."
1000402-59 = "Por isso, talvez eu continue pedindo sua ajuda com várias coisas daqui para frente. Provavelmente será em horários tardios também."
1000402-60 = "[s7] \"Claro, pode deixar comigo.\"\n[s8] \"Pode me chamar a qualquer hora.\""
1000402-61 = "Obrigada, Sensei."
1000402-62 = "Obrigada, Sensei."
1000402-63 = "Ah... já está bem tarde. Preciso ir para casa descansar logo."
1000402-64 = "Então, Sensei. Até a próxima."
1000402-66 = "(Hina fez uma saudação breve e foi embora com uma expressão cansada)"
