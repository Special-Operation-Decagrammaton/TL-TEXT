[translation]
1301-1 = "会長はいつも正しい（１）"
1301-2 = "レッドウィンター連邦学園・会長執務室"
1301-3 = "ふむ……。"
1301-5 = "何かお悩みですか、チェリノ会長？"
1301-6 = "……マリナ委員長。「ペロロ」、というキャラクターについて聞いたことはあるか？"
1301-7 = "ペロロ、でしょうか？"
1301-8 = "……聞き覚えはあります。何人かの生徒たちが、そんな名前の「変な鳥のぬいぐるみ」を持っていたような。"
1301-9 = "いくらキャラクターグッズとはいえ、ヨダレを垂らしながら羽ばたいている姿が異様だったので、全部押収しましたが……その「ペロロ」がどうかしましたか？"
1301-10 = "実は先週末、シャーレまで行かねばならない仕事があってな。その時にその「ペロロ」とやらの限定版のぬいぐるみが、オークションに出品されているところを見たのだ。"
1301-11 = "大きくてブサイクで、使い道もないぬいぐるみ……それにも関わらず、嘆かわしいほどにみなその「ペロロ」が欲しくてたまらない様子だったぞ。値段もかなりのところまで上がっていた。"
1301-12 = "ミレニアムやゲヘナの生徒たちはもちろん、トリニティのお嬢様たちまで、その鳥のぬいぐるみに夢中になっていたのだ。"
1301-13 = "ははっ！それは面白い光景ですね。やはり外部の生徒たちは、メディアの扇動に踊らされていると見える。"
1301-14 = "ご安心ください。我々レッドウィンター連邦学園はそんな「ぬいぐるみ」などに生徒たちが惑わされないよう、徹底的に情報を統制しています！"
1301-15 = "うむ。しかし賢明な指導者というものは、馬鹿からも教訓を得られるものだ。"
1301-16 = "賢明な書記長であるこの私は……その笑える光景の中から、レッドウィンター連邦学園がより躍進を遂げるための新しいアイデアを思いついたのだ！"
1301-17 = "な、なるほど。どうかそのアイデアをお聞かせください、チェリノ会長。"
1301-22 = "ふふふ、聞いて驚くなよ……あの「ペロロ」を、我々レッドウィンター連邦学園に編入させるのだ！"
1301-28 = "…………はい？"
1301-29 = "おいらの発言を聞き逃すなんて、耳が遠くなったのかマリナ委員長？"
1301-30 = "あの「ペロロ」を、我がレッドウィンター連邦学園の生徒として迎え入れようと言ったのだ。"
1301-31 = "見た目はヘンテコだが、キヴォトスの生徒たちに大人気なことは事実。"
1301-32 = "ならば、その「ペロロ」を我々の学園に編入させたら「ペロロと同じ学校に通いたい！」とキヴォトス中から転校届が殺到するのではないかと考えたのだ。"
1301-34 = "学園の権力は生徒の数に比例しやすい……「ペロロ」によって生徒が増えていけば、やがて我がレッドウィンター連邦学園はトリニティやゲヘナなんかが及ばないほどの超巨大学園になるだろう！"
1301-36 = "あの、お言葉ですがその……「ペロロ」は少数の愛好家たちにしか人気の無い、マニアック寄りのキャラ――"
1301-40 = "それはまた完璧な計画ですね、書記長！"
1301-41 = "と、トモエ秘書室長？"
1301-42 = "マスコットなどを活用した効果的な広報戦略、これもまたプロパガンダの基本！魅力的なキャラクターを学園に誘致すれば、物珍しさに生徒たちが集まるのは確かに自然なことです！"
1301-43 = "あの一瞬の視察から、こんな素晴らしい計画を立てられるだなんて……流石です、チェリノ会長！"
1301-44 = "そ、そうか？"
1301-45 = "ふふっ、もっと褒めてくれてもいいのだぞ。おいらは偉大な生徒会長であり、環境美化部部長であり、書記長であり、運動部代表などなど……様々な肩書を持つ、あのチェリノ様なのだからな！"
1301-46 = "おあつらえ向きなことに、「ペロロ」はレッドウィンターの雪原によく映える純白の羽毛を持っていますからね。我々の学園の制服を着せて「広報部長」などの役を任せれば、さぞかし活躍してくれることでしょう。"
1301-47 = "加えてもう一つ提案なのですが、もしよろしければペロロにも大きな白ひげを付けてあげるのはいかがでしょう？レッドウィンター連邦学園の威光を、今以上に各地へと轟かせてくれるはずです！"
1301-48 = "うむ、それも良いアイデアだな！採用だ！"
1301-49 = "あの……お言葉ですが「ペロロ」はキャラクターであって、生徒ではないのですが……。"
1301-52 = "マリナ委員長、先ほどから不満げな表情で何を呟いてるんだ？おいらに何か言いたいことでもあるのか？"
1301-53 = "それとも、まさかとは思うが……せっかくおいらが考えたこの偉大な計画に、不満でもあるのか？"
1301-54 = "そ、そんなことはありません！私も素晴らしい案だと思います！"
1301-55 = "そうだろうそうだろう？おいらが立てる計画に、隙などあるはずがないからな！"
1301-56 = "あとは、どうやってペロロを転校させてくるかだけだが……。"
1301-57 = "……そうだ。マリナ委員長！お前が責任を持って、ペロロをレッドウィンター連邦学園に編入させるように！"
1301-58 = "は、はい！？"
1301-59 = "何をそんなに驚くんだ？お前も納得済みなんだろう？それにおいらの偉大な計画に直接携われる、この上ない栄誉とチャンスなんだぞ。"
1301-60 = "そうだな……「ペロロ」をレッドウィンター連邦学園に編入させることができたら、お前に「特別黄金ひげ勲章」を授与しようじゃないか！それならやる気も出るだろう？"
1301-61 = "で、ですがその、ペロロは仮想のキャラクターですので……学生名簿に載せることは、その……。"
1301-62 = "む。何を言っているんだ、マリナ委員長！"
1301-63 = "おいらは見たぞ！歌って踊るペロロを、この目ではっきりと！それにも関わらず、「仮想のキャラクター」などと……。"
1301-64 = "それとも、レッドウィンター連邦学園の偉大なる生徒会長であり、環境美化部部長であり、えっと……その他にも色々やっているこのおいらが、見間違いをしたとでも！？"
1301-65 = "そ、それは……ですから……。"
1301-67 = "……レッドウィンター連邦学園の校則には、このように書かれています。"
1301-68 = "「レッドウィンター連邦学園校則第1条　チェリノ会長はいつも正しい」"
1301-69 = "「レッドウィンター連邦学園校則第2条　第1条に違反する発言をした生徒は、例外なく粛清対象となる」"
1301-70 = "まさか、マリナ委員長ほどの方が学園の校則を破るなんてことはないと思いますが……"
1301-72 = "そ、それは、その……。"
1301-75 = "（ま、マズい！このままでは本当に粛清されてしまう！）"
1301-76 = "（しかし、現実に存在しないペロロを生徒として連れてくることはできないし……一体どうすれば……）"
1301-77 = "（待てよ。仮想のペロロを現実に連れて来られないのなら……いっそのこと現実に、ペロロを存在させてしまえばいいのでは？）"
1301-78 = "（ふふっ……そうだ！それが良い！）"
1301-81 = "……お任せください、会長。仰せの通り、必ずやペロロをレッドウィンター連邦学園に連れて参ります！"
1301-82 = "うむ。流石はマリナ委員長。そう言ってくれるとおいらは信じていたぞ。"
1301-83 = "ふぁぁ……もうそろそろお昼寝の時間か……。"
1301-84 = "トモエ……おいら眠い……。"
1301-85 = "はい、すぐにお昼寝の準備をいたしますね。どうぞこちらへ。"
1301-90 = "ペロロをレッドウィンター連邦学園に編入させなければならないとは……。"
1301-91 = "簡単なことではないが、ここでしくじれば出世の道は途絶え、最悪の場合は粛清されてしまうこともありえる……しかし、こうなったらやるしかない。証明してみせるぞ……！"
1301-92 = "「チェリノ会長は、いつも正しい」のだと！"
