[translation]
1301-1 = "A Presidente está sempre certa (1)"
1301-2 = "Academia Federal Red Winter - Gabinete da Presidente"
1301-3 = "Hum..."
1301-5 = "Algum problema, Presidente Cherino?"
1301-6 = "...Marina, Presidente do Comitê. Você já ouviu falar de um personagem chamado 'Peroro'?"
1301-7 = "Peroro, seria?"
1301-8 = "...O nome me soa familiar. Acho que vi algumas alunas carregando um 'bichinho de pelúcia de pássaro estranho' com esse nome."
1301-9 = "Por mais que seja apenas um item de personagem, a aparência dele babando enquanto bate as asas era bizarra, então confisquei todos... mas o que tem esse 'Peroro'?"
1301-10 = "Na verdade, no fim de semana passado, tive que ir ao Schale por causa de um trabalho. Foi quando vi uma edição limitada desse tal de 'Peroro' sendo leiloada."
1301-11 = "Um bicho de pelúcia grande, feio e inútil... mesmo assim, era lamentável ver como todas estavam desesperadas para ter esse 'Peroro'. O preço subiu bastante."
1301-12 = "Não só as alunas de Millennium e Gehenna, mas até as senhoritas de Trinity estavam obcecadas por aquele pássaro de pelúcia."
1301-13 = "Haha! Que cena interessante. Pelo visto, as alunas de fora estão sendo manipuladas pela mídia."
1301-14 = "Fique tranquila. Nós, da Academia Federal Red Winter, controlamos as informações rigorosamente para que nossas alunas não sejam enganadas por tais 'brinquedos'!"
1301-15 = "Hum. Mas uma líder sábia sabe aprender até com os tolos."
1301-16 = "Eu, a sábia Secretária-Geral... tive uma nova ideia a partir daquela cena ridícula para que a Academia Federal Red Winter dê um salto ainda maior!"
1301-17 = "E-entendo. Por favor, compartilhe essa ideia conosco, Presidente Cherino."
1301-22 = "Fufufu, não se assuste ao ouvir... vamos transferir aquele 'Peroro' para a nossa Academia Federal Red Winter!"
1301-28 = "............Sim?"
1301-29 = "Você ficou surda, Marina, Presidente do Comitê, a ponto de não ouvir o que eu disse?"
1301-30 = "Eu disse que vamos receber aquele 'Peroro' como aluno da nossa Academia Federal Red Winter."
1301-31 = "A aparência dele é estranha, mas é um fato que ele é muito popular entre as alunas de Kivotos."
1301-32 = "Sendo assim, pensei que se transferíssemos o 'Peroro' para a nossa academia, pedidos de transferência de toda Kivotos inundariam a escola com o pensamento de 'quero estudar na mesma escola que o Peroro'!"
1301-34 = "O poder de uma academia é proporcional ao número de alunas... Se o número de alunas aumentar por causa do 'Peroro', em breve a nossa Academia Federal Red Winter se tornará uma super academia que nem Trinity ou Gehenna conseguirão alcançar!"
1301-36 = "Com todo o respeito, Presidente... o 'Peroro' é um personagem de nicho, popular apenas entre um pequeno grupo de entusiastas..."
1301-40 = "Esse é um plano perfeito, Secretária-Geral!"
1301-41 = "T-Tomoe, Chefe de Gabinete?"
1301-42 = "Uma estratégia de relações públicas eficaz utilizando mascotes, isso também é o básico da propaganda! Se atrairmos um personagem atraente para a academia, é natural que as alunas se reúnam por curiosidade!"
1301-43 = "Conseguir elaborar um plano tão maravilhoso a partir de uma simples inspeção... como esperado da Presidente Cherino!"
1301-44 = "É, é mesmo?"
1301-45 = "Fufu, pode me elogiar mais. Afinal, eu sou a grande Presidente do Conselho Estudantil, Chefe do Departamento de Embelezamento Ambiental, Secretária-Geral, representante dos clubes esportivos e muito mais... eu sou a Cherino!"
1301-46 = "E, para completar, o 'Peroro' tem penas brancas puras que combinam muito bem com os campos nevados de Red Winter. Se o vestirmos com o uniforme da nossa academia e o nomearmos como 'Chefe de Relações Públicas', ele certamente fará um ótimo trabalho."
1301-47 = "Além disso, tenho outra sugestão: se não se importar, que tal colocarmos um grande bigode branco no Peroro? Isso fará com que o prestígio da Academia Federal Red Winter ecoe por todos os lugares ainda mais do que agora!"
1301-48 = "Hum, essa também é uma ótima ideia! Aprovado!"
1301-49 = "Mas... com todo o respeito, o 'Peroro' é um personagem, não uma aluna..."
1301-52 = "Marina, Presidente do Comitê, por que você está resmungando com essa cara de insatisfeita? Tem algo a me dizer?"
1301-53 = "Ou será que... não me diga que você está insatisfeita com esse plano grandioso que eu mesma elaborei?"
1301-54 = "N-não, de jeito nenhum! Eu também acho que é uma ideia maravilhosa!"
1301-55 = "Não é? Os planos que eu faço não têm falhas!"
1301-56 = "Agora, só falta saber como transferir o Peroro..."
1301-57 = "...Já sei. Marina, Presidente do Comitê! Você será responsável por transferir o Peroro para a Academia Federal Red Winter!"
1301-58 = "S-sim!?"
1301-59 = "Por que está tão surpresa? Você não concordou? Além disso, é uma honra e uma oportunidade sem igual de participar diretamente do meu grande plano."
1301-60 = "Já sei... se você conseguir transferir o 'Peroro' para a Academia Federal Red Winter, vou te conceder a 'Medalha do Bigode Dourado Especial'! Isso vai te dar motivação, não vai?"
1301-61 = "M-mas, como eu disse, o Peroro é um personagem virtual, então... colocá-lo na lista de alunas é, bem..."
1301-62 = "Hum. O que você está dizendo, Marina, Presidente do Comitê!"
1301-63 = "Eu vi! Vi o Peroro cantando e dançando com meus próprios olhos! E mesmo assim, você vem com essa de 'personagem virtual'..."
1301-64 = "Ou será que você está sugerindo que eu, a grande Presidente do Conselho Estudantil da Academia Federal Red Winter, Chefe do Departamento de Embelezamento Ambiental e... bem, que faz tantas outras coisas, me enganei!?"
1301-65 = "I-isso é... por isso que..."
1301-67 = "...O regulamento da Academia Federal Red Winter diz o seguinte:"
1301-68 = "'Artigo 1º do Regulamento da Academia Federal Red Winter: A Presidente Cherino está sempre certa'"
1301-69 = "「Regra nº 2 do Regulamento da Academia Federal de Red Winter: Alunos que fizerem declarações que violem o artigo 1º estarão, sem exceção, sujeitos a um expurgo.」"
1301-70 = "Eu não imagino que alguém do seu nível, Presidente Marina, fosse quebrar o regulamento da academia, mas..."
1301-72 = "I-Isso é, bem..."
1301-75 = "（D-Droga! Se continuar assim, eu realmente vou ser expurgada!）"
1301-76 = "（Mas não tem como trazer o Peroro para ser um aluno, já que ele não existe na realidade... O que eu faço...）"
1301-77 = "（Espere um pouco. Se eu não posso trazer um Peroro virtual para a realidade... por que não simplesmente fazer o Peroro existir na realidade?）"
1301-78 = "（Hehe... Isso! É isso mesmo!）"
1301-81 = "......Deixe comigo, Presidente. Como ordenado, eu certamente trarei o Peroro para a Academia Federal de Red Winter!"
1301-82 = "Hum. Como esperado da Presidente Marina. Eu sabia que podia confiar em você."
1301-83 = "Yawn... Já está quase na hora da minha soneca..."
1301-84 = "Tomoe... estou com sono..."
1301-85 = "Sim, prepararei sua soneca imediatamente. Por favor, venha por aqui."
1301-90 = "Ter que matricular o Peroro na Academia Federal de Red Winter..."
1301-91 = "Não é uma tarefa fácil, mas se eu falhar aqui, meu caminho para a promoção chegará ao fim e, na pior das hipóteses, posso até ser expurgada... Mas, já que chegamos a esse ponto, não tenho escolha a não ser fazer. Vou provar isso...!"
1301-92 = "Que a \"Presidente Cherino está sempre certa\"!"
