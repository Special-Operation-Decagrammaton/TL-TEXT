[translation]
1300803-1 = "Trabalho noturno puxado"
1300803-2 = "（Serika não apareceu na hora combinada）"
1300803-5 = "Haa... haa..."
1300803-6 = "[s] \"Você se atrasou, o que é raro, Serika.\""
1300803-7 = "Isso é... haa, haa, não teve jeito... o turno na loja de lámen não acabava..."
1300803-8 = "[s] \"Não era você quem dizia que 'devemos chegar um pouco antes do horário combinado'?\""
1300803-9 = "……I-isso é claro que sim, mas...#nEi, cala a boca! Eu só me atrasei um pouquinho..."
1300803-10 = "Haa, fuu..."
1300803-11 = "……Já que estamos atrasados, vamos logo, Sensei!"
1300803-14 = "（Fiz um trabalho de segurança noturna em um prédio junto com a Serika）"
1300803-15 = "（Vigiar a entrada do prédio a noite toda foi um trabalho cansativo, mas um pouco entediante）"
1300803-17 = "Haa... que cansaço."
1300803-18 = "Até que é bom fazer esses bicos pesados de virar a noite na sexta-feira... mas o lado ruim é que fico sem folga, o que é uma pena."
1300803-19 = "Mas você está bem, Sensei? Por mim tudo bem, mas você não tinha nada para fazer no seu dia de folga?"
1300803-20 = "Ou será que você estava livre mesmo?"
1300803-21 = "[s1] \"Eu não sabia que era um trabalho de virar a noite.\"\n[s2] \"Eu não saio de casa nos dias de folga, então está tudo bem.\""
1300803-22 = "……Ah."
1300803-23 = "Eu não te avisei...?"
1300803-24 = "D-desculpa..."
1300803-25 = "Ahaha, você é do tipo que fica em casa na folga? Eu prefiro sair para vários lugares."
1300803-26 = "Haa... quero logo chegar em casa e tomar um banho."
1300803-27 = "Sensei, bom trabalho hoje também."
1300803-28 = "Então até mais, tchau tchau."
1300803-31 = "（Decidi doar o dinheiro que recebi para o Comitê de Contramedidas）"
