[translation]
1300803-1 = "ハードな夜通しバイト"
1300803-2 = "（約束の時間なのにセリカが現れない）"
1300803-5 = "はあ……はあ……。"
1300803-6 = "[s] \"珍しく遅かったね、セリカ。\""
1300803-7 = "これは……はあ、はあ、仕方な……ラーメン屋のバイトが終わらなくって……。"
1300803-8 = "[s] \"「約束の時間より少し早く来るもの」、じゃなかった？\""
1300803-9 = "……そ、それはもちろんそうだけど……#nって、う、うるさい！ちょっとしか遅れてないし……。"
1300803-10 = "はぁ、ふぅ……。"
1300803-11 = "……遅れてるんだから、早く行くわよ、先生！"
1300803-14 = "（セリカと一緒にビルの夜間警備のバイトをした）"
1300803-15 = "（一晩中ビルの入口を警備する、疲れるけどちょっと退屈な仕事だった）"
1300803-17 = "はあ……疲れた。"
1300803-18 = "金曜日にはこういうハードな徹夜バイトもいいんだけど……休日が無くなるっていう短所があるから、それはちょっと残念よね。"
1300803-19 = "でも大丈夫、先生？私はいいけど、先生は休日にやることがあるんじゃないの？"
1300803-20 = "それとも、やっぱり暇だから？"
1300803-21 = "[s1] \"徹夜のバイトだって知らなくて。\"\n[s2] \"休日は家から出ないから大丈夫。\""
1300803-22 = "……あれ。"
1300803-23 = "私、言わなかったっけ……。"
1300803-24 = "ご、ごめん……。"
1300803-25 = "あはは、休日は家にいるタイプ？私はあっちこっちに行く方が好きだけど。"
1300803-26 = "はあ……早く家に帰ってシャワー浴びたい。"
1300803-27 = "先生、今日もお疲れ様。"
1300803-28 = "じゃあまたね、バイバ～イ。"
1300803-31 = "（もらったお金は対策委員会に寄付することにした）"
