[translation]
10007105-1 = "第10話;変わらないもの"
10007105-2 = "うっ……くそっ、あの戦車さえなかったら……。"
10007105-3 = "ふふん、見たか。「粛清君1号」の威力を。"
10007105-4 = "粛清1号にはどんな障害物でも取り除く巨大なシャベルが、そしてそれ以外にもおいらに刃向かう生徒たちを追い払う、ありとあらゆる装備が備えられているのだ！"
10007105-5 = "工務部のやつらがどんな重機で襲ってこようとも、もう怖くない！"
10007105-6 = "くっ、なんて余計なものを……次は、あの戦車を真っ先に破壊しないと……。"
10007105-11 = "これで邪魔者はすべて消えたな。"
10007105-13 = "さあ、今度こそ温泉郷を撤去……。"
10007105-14 = "最後の、希望が……。"
10007105-15 = "うっ……うう……"
10007105-17 = "うあああぁぁぁぁん！"
10007105-19 = "ど、どうして急に泣くんだ？温泉郷の閉鎖はもう決定事項なんだから、いい加減諦めて……。"
10007105-20 = "……い、いくら泣いたって引き下がらないからな。これはレッドウィンター連邦学園全体のための決定で……"
10007105-21 = "そ、そうだろう、みんな？"
10007105-27 = "それはその、何というか……。"
10007105-28 = "え、っと……。"
10007105-30 = "ど、どうしてみんな視線を逸らすんだ！？"
10007105-31 = "まるでおいらが悪者みたいじゃないか！"
10007105-32 = "カムラッド！カムラッドから見ても、おいらが間違ってるのか！？"
10007105-33 = "[s1] \"今回は、チェリノがやり過ぎだよ。\"\n[s2] \"温泉郷の建物ぐらいは、残しても良いんじゃない？\""
10007105-34 = "か、カムラッドまで……！？"
10007105-35 = "か、カムラッドまで……！？"
10007105-36 = "……と、とにかく227号温泉郷は閉鎖！"
10007105-37 = "枯れる直前まで運営していたら、温泉開発部のやつらがいつまた訪れて、レッドウィンター連邦学園を危険に晒すのか分かったものではない！"
10007105-38 = "まあ、だからその……逆に言うと、建物ぐらいはそのまま残してやっても……。"
10007105-39 = "もう全部終わりです、元々終わりなんですっ！どちらにせよ温泉が枯れたら、私たちはもうお終いです……！"
10007105-40 = "稼いだお金はすぐに消えるでしょうし、結局私たちは旧校舎の時の貧困生活に後戻りです……。"
10007105-41 = "だからこのチャンスを逃したくなかったのに……あの頃には、戻りたくなかったのに……！"
10007105-42 = "結局、私たちにはもう何も残らない！！"
10007105-44 = "そんなことないよ、ノドカ。"
10007105-45 = "何を言ってるの、シグレちゃん……"
10007105-46 = "だってもう、全部無くなっちゃうのに……！"
10007105-47 = "私たち227号特別クラスが、こうして一緒にいるでしょ。"
10007105-48 = "……？"
10007105-52 = "……私はね。旧校舎の生活も、そんなに嫌じゃなかったよ。"
10007105-53 = "もちろん食事はいつも足りないし、ちゃんとした暖房器具もないし、たまに熊も出てくるけど……。"
10007105-54 = "ノドカと一緒にいられて、227号特別クラスで一緒にいられて、私はそれだけで色んな事が楽しかった。"
10007105-55 = "その場所がたとえ立派な温泉郷でも、寒々しい廃墟でも……一緒にいられるなら、私はどこでも構わない。"
10007105-56 = "それに温泉郷としての建物もできたし、あれ一つでも残してもらえるなら……状況は、少し良くなったんじゃないかな。"
10007105-57 = "私たちが一緒なら、きっと大丈夫。私はそう思うけど……ノドカはどう？"
10007105-58 = "シグレちゃん……。"
10007105-63 = "……待った。撤去を取り消すとはまだ言ってはないぞ。"
10007105-64 = "チェリノちゃん、空気を読んでください……！"
10007105-65 = "え、あ、うむ……。"
10007105-66 = "……仕方ないな。みんながそこまで言うなら、今回だけは特別に見逃してやろう。"
10007105-67 = "建物の撤去については保留！"
10007105-68 = "この温泉郷については基本的に「227号特別クラス」の生徒たちに一任し、他の建物として改修する方針とする！"
10007105-70 = "さすがはチェリノ会長、素晴らしいご判断です。"
10007105-71 = "ここまで寛大な処置を与えてくれるなんて……"
10007105-72 = "このマリナ、感激致しました！"
10007105-77 = "……改修？"
10007105-79 = "あれ……メグさん？"
10007105-80 = "まあ、温泉の問題を放って帰るわけにはいかないからね！でも温泉郷を自由に使っても良いとは言ったけど……"
10007105-81 = "違う用途への改修は、ちょっと許せないかな！それは温泉への冒涜だから！"
10007105-82 = "で、でも放っておいても、ここの温泉は枯れるんですよね……？"
10007105-83 = "温泉を蘇らせることができないのなら、他の用途の建物として改修した方が……。"
10007105-84 = "それを防ぐために、地下のマグマ地帯を爆発させようとしてたんだけどー……"
10007105-85 = "それもダメならもう、カスミ部長のプランBを実行するしかないね！"
10007105-86 = "[s] \"プランB……？\""
10007105-87 = "うん、「温泉が温泉でなくなるくらいなら、全部爆発させちゃえ」プラン！"
10007105-88 = "こんなこともあろうかと、実は基礎工事をする時に幾つか爆薬を埋めておいたんだ♪"
10007105-89 = "ば、爆薬！？"
10007105-90 = "つまり私たちは今、爆薬の上に……？"
10007105-91 = "うん、さすがはカスミ部長！多分こんな展開になると分かってて、埋めておくように言ってくれたんだねー。"
10007105-92 = "あは、やっぱり私と違って頭良い！"
10007105-93 = "世の中に、意味の無い温泉なんてない！意味の無い建物はあるけど！"
10007105-98 = "ということでプランB……"
10007105-99 = "[s] \"ま、待っ――\""
10007105-100 = "行っけぇー！！！"
10007105-107 = "ドカアアァァァァン！"
