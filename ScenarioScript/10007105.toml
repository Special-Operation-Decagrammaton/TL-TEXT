[translation]
10007105-1 = "Episódio 10; O que não muda"
10007105-2 = "Ugh... droga, se não fosse por aquele tanque..."
10007105-3 = "Hahaha, viram só? O poder do \"Expurgador nº 1\"."
10007105-4 = "O Expurgador nº 1 possui uma pá gigante capaz de remover qualquer obstáculo, além de todos os outros equipamentos para afastar os alunos que se opuserem a mim!"
10007105-5 = "Não importa que tipo de maquinário pesado o Departamento de Obras use para atacar, não tenho mais medo!"
10007105-6 = "Droga, que coisa desnecessária... Da próxima vez, preciso destruir aquele tanque primeiro..."
10007105-11 = "Com isso, todos os estorvos desapareceram."
10007105-13 = "Muito bem, agora sim, vamos remover o resort de águas termais..."
10007105-14 = "A última... esperança..."
10007105-15 = "Ugh... uuu..."
10007105-17 = "Waaaaaah!"
10007105-19 = "P-por que você está chorando de repente? O fechamento do resort já é uma decisão tomada, então desista logo..."
10007105-20 = "...N-não importa o quanto você chore, eu não vou voltar atrás. Esta é uma decisão para o bem de toda a Academia Federal Red Winter..."
10007105-21 = "N-não é, pessoal?"
10007105-27 = "Isso é, bem, como posso dizer..."
10007105-28 = "E-err..."
10007105-30 = "P-por que todos estão desviando o olhar!?"
10007105-31 = "Parece até que eu sou a vilã da história!"
10007105-32 = "Camarada! Até você, Camarada, acha que eu estou errada!?"
10007105-33 = "[s1] \"Desta vez, Cherino, você foi longe demais.\"\n[s2] \"Não poderíamos deixar pelo menos o prédio do resort de pé?\""
10007105-34 = "A-até você, Camarada...!?"
10007105-35 = "A-até você, Camarada...!?"
10007105-36 = "...D-de qualquer forma, o Resort de Águas Termais 227 está fechado!"
10007105-37 = "Se continuarem operando até a fonte secar, não dá para saber quando o Departamento de Desenvolvimento de Águas Termais vai aparecer de novo e colocar a Academia Federal Red Winter em perigo!"
10007105-38 = "Bem, por isso... dito de outra forma, se for só o prédio, talvez eu possa deixar ficar..."
10007105-39 = "Já acabou tudo, na verdade já tinha acabado desde o início! De qualquer forma, se a água secar, estamos perdidas...!"
10007105-40 = "O dinheiro que ganhamos vai desaparecer rapidamente e, no fim, voltaremos à vida de pobreza de quando estávamos no prédio antigo..."
10007105-41 = "É por isso que eu não queria perder essa chance... eu não queria voltar para aquela época...!"
10007105-42 = "No fim, não nos resta mais nada!!"
10007105-44 = "Não é verdade, Nodoka."
10007105-45 = "O que você está dizendo, Shigure-chan..."
10007105-46 = "Mas já, tudo vai desaparecer...!"
10007105-47 = "Nós, da Turma Especial 227, estamos juntas aqui, não estamos?"
10007105-48 = "...?"
10007105-52 = "...Sabe, eu não odiava tanto assim a vida no prédio antigo."
10007105-53 = "Claro, a comida sempre era pouca, não tínhamos aquecedores decentes e, às vezes, até apareciam ursos, mas..."
10007105-54 = "Poder estar com a Nodoka, poder estar com a Turma Especial 227, só por isso, muitas coisas eram divertidas para mim."
10007105-55 = "Não importa se o lugar é um resort luxuoso ou uma ruína fria... se pudermos estar juntas, para mim não faz diferença onde estejamos."
10007105-56 = "Além disso, o prédio do resort foi construído, e se pudermos manter pelo menos isso... acho que a situação melhorou um pouco, não acha?"
10007105-57 = "Se estivermos juntas, com certeza ficaremos bem. É o que eu penso... o que você acha, Nodoka?"
10007105-58 = "Shigure-chan..."
10007105-63 = "...Espere. Eu ainda não disse que cancelei a remoção."
10007105-64 = "Cherino-chan, por favor, leia o clima...!"
10007105-65 = "Ah, eh, hum..."
10007105-66 = "...Não tem jeito. Se todos insistem tanto, vou abrir uma exceção desta vez."
10007105-67 = "A remoção do prédio está suspensa!"
10007105-68 = "Este resort ficará sob responsabilidade dos alunos da \"Turma Especial 227\", e a política será reformá-lo para outros fins!"
10007105-70 = "Como esperado da Presidente Cherino, uma decisão maravilhosa."
10007105-71 = "Conceder uma medida tão generosa..."
10007105-72 = "Eu, Marina, estou comovida!"
10007105-77 = "……reforma?"
10007105-79 = "Ué…… Meg?"
10007105-80 = "Bem, eu não posso simplesmente ignorar os problemas da fonte termal e ir embora! Mas, embora eu tenha dito que vocês podiam usar o resort livremente……"
10007105-81 = "Eu não posso aceitar uma reforma para outros fins! Isso é um sacrilégio contra a fonte termal!"
10007105-82 = "Ma-mas, se deixarmos como está, a água da fonte vai secar, não vai……?"
10007105-83 = "Se não podemos reviver a fonte termal, seria melhor reformar o local para outro propósito……"
10007105-84 = "Para evitar isso, eu estava tentando explodir a zona de magma subterrânea, mas……"
10007105-85 = "Se isso também não der certo, não temos escolha a não ser executar o Plano B da Presidente Kasumi!"
10007105-86 = "[s] \"Plano B……?\""
10007105-87 = "Sim, o plano de \"se a fonte termal não pode ser uma fonte termal, então vamos explodir tudo\"!"
10007105-88 = "Como eu já previa que isso poderia acontecer, na verdade, eu enterrei alguns explosivos durante a construção da base♪"
10007105-89 = "Ex-explosivos!?"
10007105-90 = "Quer dizer que agora estamos em cima de explosivos……?"
10007105-91 = "Sim, como esperado da Presidente Kasumi! Ela provavelmente sabia que as coisas terminariam assim e me pediu para enterrá-los."
10007105-92 = "Ahaha, ela é realmente inteligente, diferente de mim!"
10007105-93 = "Não existe fonte termal sem sentido no mundo! Mas prédios sem sentido, existem!"
10007105-98 = "Sendo assim, Plano B……"
10007105-99 = "[s] \"Es-espera――\""
10007105-100 = "Vaiiiii!!!"
10007105-107 = "CABUUUUUM!"
