[translation]
90002250-1 = "Episódio 25: Epílogo (1)"
90002250-3 = "Ah, Sensei!"
90002250-4 = "Olá! Oi para você também, Aris e Toki!"
90002250-5 = "Olá!"
90002250-6 = "Olá!"
90002250-7 = "Oi, oi."
90002250-9 = "Falando nisso, aconteceu alguma coisa?#nNão conseguimos falar com você nos últimos dias..."
90002250-10 = "A escala do Schale anteontem era minha, sabia?#nVocê vai ter que compensar por me deixar esperando!"
90002250-11 = "[s] \"Desculpe, desculpe. Deixe-me compensar você na semana que vem.\""
90002250-12 = "Sério? É uma promessa, hein!"
90002250-20 = "Ué? Agora há pouco, algo..."
90002250-22 = "！？！？"
90002250-23 = "N-não! Não passou nada por aqui! Né, Toki!?"
90002250-24 = "S-sim. É... isso mesmo."
90002250-29 = "……？"
90002250-30 = "Será mesmo...?"
90002250-31 = "[s1] \"I-isso mesmo!\"\n[s2] \"E-eu não notei nada, não!?\""
90002250-34 = "Hmm? Não, mas..."
90002250-35 = "Sensei... você está escondendo alguma coisa?"
90002250-36 = "Suuuuspeito..."
90002250-38 = "Waaah! Toki, o que a gente faz!"
90002250-39 = "Se for preciso, podemos usar o Abi-Eshuh que consertamos para apagar a memória fisicamente...!"
90002250-40 = "I-isso eu acho que não pode!!"
90002250-42 = "Ah! É só olhar as imagens da câmera de segurança!#nVocê consegue, né?"
90002250-43 = "Moleza."
90002250-44 = "[s] \"Você consegue mesmo!?\""
90002250-45 = "Claro. Afinal, também somos alunas do Millennium.#n...E então? Apareceu alguma coisa?"
90002250-49 = "Não... nada em especial..."
90002250-50 = "Ah, poxa. Que sem graça."
90002250-51 = "[s] \"V-viu? Não tinha nada, né?\""
90002250-52 = "É verdade. Parece que nos enganamos."
90002250-53 = "Então, Sensei, vamos indo. Até mais, Aris e Toki!"
90002250-60 = "U-ufa, essa foi por pouco..."
90002250-61 = "Conseguimos nos safar. Rio-sama, Kei. Já podem sair."
90002250-67 = "Ufa..."
90002250-68 = "Eu me escondi junto por impulso, mas por que eu também..."
90002250-70 = "Acho que isso também conta como trabalho em equipe."
90002250-71 = "Lá vem você falando qualquer coisa de novo..."
90002250-78 = "……"
90002250-79 = "Rio?"
90002250-80 = "Finalmente chegamos até aqui..."
90002250-81 = "Está tudo bem, Rio-senpai.#nAris também vai criar coragem! Com certeza vai dar tudo—"
90002250-87 = "Ora, Sensei. Olá. Aris-chan e Toki também."
90002250-88 = "W-waaah!?"
90002250-94 = "[ns3] \"Você não disse que ia criar coragem!?\"\n[ns4] \"Não adianta se esconder atrás de mim de repente...!\""
90002250-97 = "Aconteceu alguma coisa? Estão agindo como se tivessem visto algo assustador."
90002250-102 = "Ah, não... desculpe... não é nada disso... é que..."
90002250-103 = "Fufu.#n...Toki, obrigada pelo relatório também.#nPosso entender que aquilo foi apenas uma versão resumida?"
90002250-107 = "S-sim... darei os detalhes mais tarde..."
90002250-108 = "[s] (Aquela Toki está com medo...!)"
90002250-109 = "Ambas fizeram um trabalho realmente excelente."
90002250-110 = "No entanto... há outras pessoas que gostariam de ouvir um pouco mais de explicações de vocês —"
90002250-114 = "Primeiro, Kei-chan. Prazer em conhecê-la. Sou a Noa. #nÉ a primeira vez que nos encontramos pessoalmente, não é?"
90002250-118 = "Ainda me chamando de Kei-chan aqui também...? Sou a Kei. #nÉ um prazer conhecê-la."
90002250-119 = "Sim, o prazer é todo meu. Conto com você daqui em diante."
90002250-120 = "E também —"
90002250-127 = "Ugh...!"
90002250-128 = "..."
90002250-129 = "..."
90002250-130 = "Faz muito tempo... Presidente Rio."
90002250-131 = "E-esperem um pouco. Eu consigo... explicar tudo direitinho."
90002250-132 = "Não precisa se apressar para explicar agora."
90002250-133 = "S-sério...?"
90002250-134 = "Sim. Tem outra pessoa que está querendo ouvir o que você tem a dizer."
90002250-135 = "Isso significa que..."
90002250-136 = "Sim. Ela esteve esperando por muito tempo."
90002250-140 = "A Yuuka-chan esteve esperando esse tempo todo."
90002250-141 = "!?!?"
90002250-142 = "Por favor, entrem."
90002250-148 = "E-entendido..."
90002250-149 = "...Sensei, de alguma forma, até eu estou começando a ficar com medo..."
90002250-150 = "[s] \"Eu também...\""
90002250-151 = "A propósito, Presidente?"
90002250-152 = "S-sim, o que foi...?"
90002250-153 = "A Yuuka-chan pode ficar brava às vezes, e às vezes ela faz birra."
90002250-154 = "Ainda assim, ela sempre acaba atendendo aos meus pedidos... ela é minha amiga gentil."
90002250-155 = "Se essa Yuuka-chan ficar realmente brava —"
90002250-156 = "Não haverá nada que eu possa fazer para ajudar."
90002250-157 = "!?!?!?!"
90002250-158 = "S-Sensei...!"
90002250-159 = "[s] \"Rio.\""
90002250-161 = "[ns] \"Às vezes, na vida... você precisa tomar coragem e encarar as consequências...!\""
90002250-162 = "...Entendi."
90002250-163 = "Se é isso que eu preciso carregar nas costas..."
90002250-172 = "Ora, Presidente. Parece que você passou por poucas e boas, não é?"
90002250-173 = "Devo começar dando as boas-vindas ao seu retorno à Millennium?"
90002250-174 = "Pelo que parece, você salvou Kivotos enquanto não estávamos olhando."
90002250-175 = "Isso é algo pelo qual devemos ser gratas, não é?"
90002250-176 = "Sim, reconheço o que deve ser reconhecido. Caso contrário, não conseguiríamos avançar para o próximo assunto, certo?"
90002250-180 = "Por favor... me escutem. Eu vou explicar tudo —"
90002250-181 = "Presidente?"
90002250-182 = "Dito desse jeito, parece que eu..."
90002250-183 = "Desde o caso do desvio de verbas que você vinha escondendo há tempos, até vários outros assuntos —"
90002250-184 = "Parece que você está tentando desesperadamente aguentar o tranco, não é?"
90002250-185 = "U-ugh...!"
90002250-186 = "...Então."
90002250-188 = "Nós temos muito o que conversar daqui para frente —"
90002250-189 = "Tudo bem para você?"
90002250-190 = "Hii...!"
90002250-197 = "U-uwaaan! A Alice está com medo!"
90002250-198 = "Isto é... o que dizem por aí..."
90002250-200 = "Sensei, o que devemos fazer...!"
90002250-201 = "[s] \"A-aguente firme...!\""
90002250-208 = "Fufu."
90002250-209 = "Fufufu."
90002250-215 = "Ri-Rio-senpai...?"
90002250-216 = "Você está bem? Não, nem preciso perguntar..."
90002250-225 = "[ns] \"Ué? Koyuki? Por que você está aqui...?\""
90002250-227 = "..."
90002250-228 = "Deve ter feito alguma besteira e levado uma bronca, imagino."
90002250-229 = "[s] \"Entendi...\""
90002250-231 = "[ns] \"Rio... você está... bem...?\""
90002250-236 = "..."
90002250-237 = "Estou bem, sim."
90002250-238 = "Sim... es...tou... bem."
90002250-239 = "Como o Sensei disse, eu já estava preparada para isso..."
90002250-240 = "Mas, pelo que parece, você sofreu bastante dano, não é...?"
90002250-241 = "..."
90002250-242 = "Uma coisa..."
90002250-243 = "Eu entendi claramente agora."
90002250-244 = "A verdade é que... às vezes..."
90002250-245 = "Ela ceifa o espírito das pessoas..."
90002250-250 = "[ns5] \"Rio!? Rio--!!\"\n[ns6] \"Rio... buá... Rio... snif...\""
90002250-255 = "É uma pena, mas..."
90002250-256 = "É um fato inegável que ela colheu o que plantou..."
90002250-257 = "Só nos resta observar, encarando isso como uma espécie de purificação."
90002250-263 = "Haa... francamente..."
90002250-264 = "[s7] \"O-oi, Yuuka...\"\n[s8] \"Faz tempo... né?\""
90002250-267 = "..."
90002250-268 = "Pois é. Alice, Toki."
90002250-269 = "...!"
90002250-270 = "O-olá."
90002250-271 = "Neru-senpai... não, desta vez é a Himari-senpai. #nDepois preciso ir falar com ela também."
90002250-272 = "...Sim."
90002250-273 = "E também..."
90002250-277 = "Você deve ser a Kei, certo?"
90002250-278 = "..."
90002250-279 = "Yu-Yuuka! A Kei está bem! Ela é segura!"
90002250-280 = "S-se houver algum problema... a-a Alice vai dar um jeito, com certeza!"
90002250-281 = "[s9] \"Isso mesmo! Eu também vou assumir a responsabilidade!\"\n[s10] \"Então, por favor, se acalme... vamos conversar com calma...?\""
90002250-287 = "Ficar tão desesperada assim só faz parecer mais suspeito..."
90002250-288 = "..."
90002250-289 = "Bem, se for assim, Sensei, vamos conversar no Schale depois."
90002250-290 = "...!"
90002250-291 = "E sobre a Alice e a Kei..."
90002250-292 = "Buááá..."
90002250-293 = "Não precisa ficar com tanto medo. Eu já sei da maior parte da história."
90002250-294 = "Sim...?"
90002250-295 = "Eh...?"
90002250-296 = "É-é verdade...? Mas, se for assim, então a Kei..."
90002250-297 = "É o mesmo que no seu caso."
90002250-298 = "Sim...?"
90002250-303 = "Precisamos prosseguir com os trâmites de transferência da Kei-chan."
90002250-305 = "……？"
90002250-307 = "……！"
90002250-308 = "Muito obrigada!"
90002250-309 = "Isso, isso. É muito bom ver você agradecendo de forma tão sincera."
90002250-313 = "Então, Sensei. Como prometido, vou precisar de um pouco do seu tempo."
90002250-314 = "[s] \"S-sim!\""
90002250-321 = "E outra coisa! Sempre foi assim, mas a Presidente Rio, sabe..."
90002250-322 = "Ela não se importa com os outros, agindo como se tudo estivesse bem desde que o resultado final fosse bom!"
90002250-324 = "Planejando compensar os danos no final para equilibrar as contas... quer dizer, ela não é a Koyuki!"
90002250-325 = "Claro que eu sei que ela não faz por mal, mas ainda assim!"
90002250-326 = "Além disso, ela é uma pessoa tímida, não teria como fazer algo assim."
90002250-327 = "[s11] \"O-olha! Yuuka! Coma um doce!\"\n[s12] \"E-eu também tenho um aqui que é zero calorias!\""
90002250-332 = "Aceito. Nhac, nhac..."
90002250-333 = "Ufa..."
90002250-334 = "[s13] (Após conversar por algumas horas...)\n[s14] (Consegui acalmar a Yuuka...)"
90002250-337 = "Ah... é uma situação complicada..."
90002250-338 = "Normalmente, teríamos que responsabilizar os cargos de gestão pelos danos causados, mas..."
90002250-339 = "O problema é que..."
90002250-340 = "Millennium não sofreu nenhum dano real, por assim dizer."
90002250-341 = "Mesmo neste caso, se formos falar de prejuízos reais para Millennium, foram insignificantes..."
90002250-342 = "[s15] \"Sendo assim...\"\n[s16] \"Demitir a Rio da presidência, talvez...?\""
90002250-347 = "Não? Não existe ninguém mais apto do que a Presidente Rio, sabia?"
90002250-348 = "Não precisa me olhar com essa cara de surpresa..."
90002250-349 = "Millennium é uma escola meritocrática, afinal. #nSe olharmos apenas para a competência, não há aluna que supere a Presidente Rio."
90002250-350 = "Além disso, não podemos criticar os resultados da presidente neste caso."
90002250-351 = "Embora eu só tenha compreendido o resumo até agora —"
90002250-352 = "Ela salvou o mundo, salvou Kivotos."
90002250-353 = "[s17] \"Obrigado por pensar assim.\"\n[s18] \"Mas tenho outra preocupação...\""
90002250-356 = "Sim? Se a Presidente Rio vai conseguir se sustentar, é isso...?"
90002250-357 = "O que quer dizer com..."
90002250-358 = "Ah... entendo..."
90002250-359 = "Não saberemos de nada se não tentarmos."
90002250-360 = "Afinal, ela tem você como supervisor, Sensei!"
90002250-361 = "[s] \"É verdade. Acho que a Rio também aprendeu muito.\""
90002250-363 = "[ns] \"Vai ficar tudo bem... provavelmente...\""
90002250-364 = "Sim, vamos começar acreditando nela. #n...Embora eu entenda o seu sentimento."
90002250-365 = "Quanto ao resto... sobre os trâmites de transferência da Kei-chan."
90002250-366 = "O progresso do processo está..."
90002250-367 = "..."
90002250-368 = "Existem partes ambíguas nas regras."
90002250-371 = "Afinal, é como se uma aluna tivesse aparecido do nada em Millennium."
90002250-372 = "...Não é uma expressão que eu goste muito, mas é uma aluna que apareceu como "mágica"."
90002250-373 = "Não há nada no regulamento de Millennium sobre como lidar com esse tipo de situação."
90002250-376 = "[ns] \"Normalmente ninguém espera por isso, né...\""
90002250-377 = "Sim. Por isso, tratamos como um caso especial e deixamos a decisão final para quem tem autoridade."
90002250-378 = "Foi uma sorte a Presidente Rio ter retornado."
90002250-379 = "Se ela não estivesse aqui... quem decidiria, como assumiria a responsabilidade, como observaríamos a situação, e por aí vai..."
90002250-380 = "Foi um curso de conferência de pelo menos 4 dias e 3 noites, não foi?"
90002250-381 = "Graças a isso, conseguimos evitar aquela situação."
90002250-382 = "[s] \"Eu já imagino o resultado, mas... o que a Rio disse?\""
90002250-383 = "……Ehem."
90002250-384 = "Seja qual for o aluno, aceitar aqueles que têm vontade de aprender é o princípio fundamental da fundação da Millennium."
90002250-388 = "A Kei também, sem exceção, é bem-vinda como aluna da Millennium Science School. #n...É isso."
90002250-389 = "[s] \"Não está decidindo isso rápido demais?!\""
90002250-390 = "Os procedimentos em si já foram feitos na época da Alice."
90002250-391 = "Mesmo que não esteja escrito explicitamente nas regras, é mais fácil quando já existe um precedente."
90002250-392 = "Além disso, você só fala dos outros... #nEu vim aqui por outros motivos também, sabia?"
90002250-393 = "[s] \"Como assim...?\""
90002250-394 = "……."
90002250-399 = "Você tem noção de quanto eu fiquei preocupada...?! Você tem noção?!"
90002250-400 = "Naquela época também! Quando finalmente consegui localizar onde você estava, era na zona de permafrost?!"
90002250-401 = "Você nem pensou em como eu me sentia, só respondeu que daria um jeito... e nem me explicou a situação..."
90002250-402 = "Eu entendo que não era uma situação comum. #nE além disso... graças ao Sensei, a crise do Continente de Aço foi resolvida."
90002250-403 = "Mas..."
90002250-405 = "Eu fiquei preocupada..."
90002250-406 = "[s] \"...Desculpe.\""
90002250-407 = "Não quero mais saber..."
90002250-408 = "[s] \"Não farei isso de novo.\""
90002250-409 = "Se algo parecido acontecer de novo, você vai repetir a mesma coisa, não vai...?"
90002250-410 = "[s19] \"Isso... eu não posso negar...\"\n[s20] \"Mas, vou me esforçar para não desaparecer sem dizer nada.\""
90002250-413 = "……Sério?"
90002250-414 = "[s] \"S-sim!\""
90002250-415 = "……Entendido."
90002250-418 = "Em troca, me conte tudo. O que aconteceu no Continente de Aço. #nSó assim... eu vou te perdoar."
90002250-419 = "……Sim? Ah, é verdade, eu já recebi o relatório, mas... era um relatório no \"estilo Millennium\"."
90002250-420 = "Aquele que omite o máximo de adjetivos possível... relata apenas os fatos... e registra apenas a causa e o efeito..."
90002250-421 = "A ideia de que palavras são recursos, e recursos devem ser consumidos de forma racional e eficiente..."
90002250-422 = "Era um relatório bem a cara da Millennium, sabe."
90002250-423 = "[s] \"Entendi. ...Mas vai ser longo, viu?\""
90002250-424 = "Fufu, pode levar o tempo que precisar."
90002250-428 = "[ns] \"Então... por onde eu começo?\""
90002250-430 = "(Yuuka riu, se emocionou, às vezes duvidou... e, em certos momentos, derramou lágrimas.)"
90002250-431 = "(Contei para Yuuka sobre todos os acontecimentos.)"
90002250-448 = "(O Continente de Aço, Decagrammaton, Ain, Soph, Aur.)"
90002250-449 = "(E sobre a Kei.)"
90002250-453 = "……Sensei."
90002250-454 = "[s] \"Sim?\""
90002250-455 = "Você está dormindo?"
90002250-456 = "[s] \"Estou um pouco com sono, mas... ainda não...\""
90002250-457 = "Entendo."
90002250-458 = "Por hoje, descanse um pouco."
90002250-459 = "……Não precisa se preocupar com nada."
90002250-466 = "A Kei-chan, não importa o que aconteça... não importa o método que eu tenha que usar."
90002250-467 = "Eu vou garantir que ela tenha um lugar na Millennium. Junto com a Alice."
90002250-468 = "Sensei, muito obrigado pelo seu trabalho duro. E também..."
90002250-472 = "Muito obrigada."
90002250-474 = "Próximo: Epílogo (2)"
