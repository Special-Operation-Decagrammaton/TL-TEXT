[translation]
80000010-1 = "Gourmet da Má Sorte"
80000010-2 = "Academia Hyakkiyako - Loja de Doces Japoneses"
80000010-5 = "É aqui a loja de doces que o Sensei mencionou? Aquela que abriu recentemente..."
80000010-6 = "Uau, realmente é uma loja que eu não conhecia..."
80000010-7 = "Quem diria que ficava aqui, e olha, os preços são bem mais acessíveis do que eu pensava! Encontrar um lugar desses, o Sensei é um gênio! Obrigada por me apresentar!"
80000010-8 = "Ah, e tem vários sabores exóticos aqui...!"
80000010-9 = "Este dango aqui é de mirtilo,"
80000010-10 = "e este aqui é de creme de confeiteiro?"
80000010-11 = "Bom, vamos entrar e provar! Se for bom, vou virar cliente fiel. Vejamos, qual eu escolho... hum, que dúvida..."
80000010-12 = "[s] \"Por que não experimenta todos de uma vez?\""
80000010-13 = "Isso é impossível! Minha carteira está bem apertada agora!"
80000010-14 = "Além disso, diferente da Akari, meu estômago tem limites, então preciso pensar bem no que pedir..."
80000010-15 = "Ah, eu queria logo ser uma adulta como o Sensei, com uma carteira e um estômago maiores."
80000010-16 = "[s] \"Nem todo adulto é assim, sabia?\""
80000010-17 = "É mesmo? Bem, de qualquer forma, preciso escolher com cuidado agora..."
80000010-18 = "Decidi! Vou começar pelo dango de chocolate, que dizem ser o carro-chefe."
80000010-19 = "Pensando na calda agridoce, talvez seja parecido com o mitarashi? Enfim, só provando para saber."
80000010-21 = "Por favor, me vê duas porções desse dango de chocolate!"
80000010-22 = "[s] \"Por que não pede outras coisas também?\""
80000010-23 = "Hã? Não é como se eu fosse comer as duas porções sozinha, sabia?"
80000010-24 = "Uma é para você, Sensei. Já que viemos juntos, vamos comer juntos."
80000010-25 = "Se não fosse pelo Sensei, eu nem saberia da existência desta loja, e quero agradecer por ter me guiado até aqui..."
80000010-26 = "Além disso, hoje é Dia dos Namorados..."
80000010-27 = "De qualquer forma, é por minha conta, então sinta-se honrado!"
80000010-32 = "(Aqui está o seu pedido de dango de chocolate.)"
80000010-33 = "Ah, finalmente chegou."
80000010-34 = "Então, vamos comer!"
80000010-42 = "Então esta é a loja de doces ultrajante que vende o tal dango de chocolate?"
80000010-43 = "Fazer uma heresia dessas com um dango... Enquanto o Grupo Mochimochi Helmet estiver aqui, não permitiremos!"
80000010-44 = "Isso mesmo! As únicas coisas que se deve colocar em um dango são kinako e molho de soja!"
80000010-45 = "Primeiro, vamos jogar fora todos os dangos daqui—"
80000010-47 = "Meu dango..."
80000010-48 = "Meu dango está no chão... e eu nem tinha dado a primeira mordida..."
80000010-49 = "Q-quem é você?"
80000010-50 = "Eu só... eu só queria aproveitar um dango com calma, por que isso sempre acontece..."
80000010-51 = "Por que sempre, sempre, sempre que eu tento comer um dango, alguém atrapalha...!"
80000010-52 = "V-você não está entendendo errado!? É a primeira vez que te vejo, não é!?"
80000010-53 = "Isso não importa agora...!"
80000010-54 = "É o acúmulo de todo o meu ressentimento de anosssssssss!!"
80000010-61 = "(Depois disso, os membros do Grupo Mochimochi Helmet foram todos presos por uma Junko furiosa.)"
80000010-62 = "(No entanto, devido à confusão, toda a comida foi destruída, e Junko acabou não conseguindo provar o dango...)"
