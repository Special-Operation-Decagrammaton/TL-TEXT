[translation]
80000010-1 = "不運な美食家"
80000010-2 = "百鬼夜行連合学院・和菓子屋さん"
80000010-5 = "ここが先生の言ってた和菓子屋さん？最近新しくできたっていう……。"
80000010-6 = "わ、確かに知らないお店だ……。"
80000010-7 = "こんなところにあったなんて、あ、それに思ったよりも手ごろな値段！こんなお店を見つけるなんて、先生お手柄！紹介してくれてありがと！"
80000010-8 = "あ、それに色々珍しい味がある……！"
80000010-9 = "こっちのお団子はブルーベリー味で、"
80000010-10 = "こっちはカスタードクリーム？"
80000010-11 = "さ、入って食べてみよ！美味しかったら通おっと。さーて、どれにしよっかなー……んー、悩む……。"
80000010-12 = "[s] \"いっそのこと全部食べてみる？\""
80000010-13 = "それは無理！結構今お財布がギリギリだから！"
80000010-14 = "それにアカリと違って私は食べられる量も限界があるから、どれを頼むかは慎重に考えないと……。"
80000010-15 = "ああー、私も早く先生みたいな大人になって、財布も胃も大きくなりたいなー。"
80000010-16 = "[s] \"大人だからってみんながそうではないけどね。\""
80000010-17 = "そうなの？まあでもとりあえず、今は慎重に選ばないとだから……"
80000010-18 = "決めた！まず頼むなら看板メニューって書いてあるチョコレート団子かな。"
80000010-19 = "甘さと苦さのあるソースって考えると、みたらしに近いのかも？とにかく、食べてみれば分かるよね。"
80000010-21 = "このチョコレート団子を二人前ください！"
80000010-22 = "[s] \"他のものも頼んだら？\""
80000010-23 = "ん？別に二人前を両方私が食べるんじゃないよ？"
80000010-24 = "片方は先生の分。せっかく一緒に来たんだから、一緒に食べようよ。"
80000010-25 = "先生に教えてもらわなかったらこのお店のことも知らなかったし、ここまで案内してくれたお礼もしたいし……。"
80000010-26 = "あと、今日はバレンタインデーだし……。"
80000010-27 = "とにかく私が特別に奢るから、ありがたく思ってよね！"
80000010-32 = "（ご注文のチョコレート団子です。）"
80000010-33 = "あっ、やっと来た。"
80000010-34 = "じゃあ、いっただっきまーす！"
80000010-42 = "ここが例のチョコレート団子を売ってる、けしからん和菓子屋か？"
80000010-43 = "お団子にあんな邪道な調理をするだなんて……我々もちもちヘルメット団の目が黒いうちは許さん！"
80000010-44 = "そうだ！お団子に振りかけていいのは、きな粉とお醬油だけだ！"
80000010-45 = "まずはここにあるお団子を全部捨ててしまっ――"
80000010-47 = "私の、お団子……"
80000010-48 = "私のお団子が地面に……まだ一口も食べてないのに……。"
80000010-49 = "あ、あんたは誰だ？"
80000010-50 = "私はただ……一緒にゆっくりお団子を楽しみたかっただけなのにどうして……。"
80000010-51 = "どうしていつも、いつも、いつも、私がお団子を食べようとすると邪魔を……！"
80000010-52 = "な、何かを誤解してないか！？あんたに会うのは初めてのはずだろ！？"
80000010-53 = "そんなことはどうだって良いの……！"
80000010-54 = "積もり積もった日頃の恨みぃいいいいいいいい！！"
80000010-61 = "（その後、もちもちヘルメット団の生徒らは、激怒したジュンコによってみんな逮捕された。）"
80000010-62 = "（しかし騒ぎの影響で食べ物がすべて燃えてしまったので、ジュンコは結局お団子を味わえなかった……。）"
