[translation]
12010-1 = "Episódio 1; Aliança Inesperada"
12010-5 = "Não consigo perdoar... não consigo perdoar... não consigo perdoar... não consigo perdoar..."
12010-7 = "Você não pode me perdoar?"
12010-8 = "[s] Meus olhos encontraram os de Haruka."
12010-9 = "……."
12010-16 = "[ns1] (Vamos desviar o olhar...)\n[ns2] Vou fingir que não vi."
12010-21 = "……."
12010-22 = "……."
12010-23 = "……."
12010-25 = "Ser um oficial administrativo significa que ele é o número 2 no comitê de moral pública."
12010-26 = "Oh, na verdade não é grande coisa. Ela é apenas uma secretária para auxiliar o presidente do comitê disciplinar..."
12010-27 = "Se esse for realmente o caso, não creio que o comitê disciplinar ficaria tão nervoso."
12010-28 = "Ei, quem está nervoso? ?"
12010-29 = "……."
12010-30 = "Bem, essa é uma ótima visão. Tenho certeza...Suna wolfShiroko-san, certo?"
12010-31 = "……."
12010-32 = "Ouvi dizer que apenas os membros do conselho estudantil permanecem em Abydos e parece que são todos vocês."
12010-33 = "Ouvi dizer que há cinco membros do conselho estudantil de Abydos, mas onde estará o outro?"
12010-34 = "Não estou aqui agora. E não somos um conselho estudantil, mas uma força-tarefa, administradora."
12010-35 = "Okusora... certo? Isso significa que não haverá membros do conselho estudantil? Eu gostaria de falar com o conselho estudantil."
12010-36 = "O conselho estudantil de Abydos foi dissolvido há muito tempo! Na verdade, somos os representantes do conselho estudantil, então se você tem algo a dizer, diga-nos!"
12010-37 = "Não acho que seja uma boa ideia dizer: “Vamos conversar?” enquanto você está cercado por pessoas com armas apontadas para você, não é?"
12010-38 = "Hehe, isso também é verdade...."
12010-39 = "com licença. Todos, por favor, baixem suas armas."
12010-40 = "(sss)"
12010-42 = "(sss...)"
12010-43 = "falta……."
12010-44 = "Ele realmente largou a arma...?"
12010-45 = "……."
12010-46 = "Gostaria de me desculpar pela minha estupidez anterior."
12010-47 = "Ei, eu fiz o que me mandaram fazer! ? Ako-chan! ?"
12010-48 = "A ordem incluía as palavras: \"Primeiro, atire indiscriminadamente?\""

12010-49 = "Não, não... apoio de fogo na medida necessária considerando a situação, seguido pela introdução de infantaria... conforme táticas básicas..."
12010-50 = "Sem falar que fica perto de outro distrito escolar autônomo, então é natural ter cuidado nessa área, certo?"
12010-51 = "(...?)"
12010-52 = "Minhas desculpas, membros da força-tarefa."
12010-53 = "Nós, o Comitê Disciplinar da Gehenna, viemos prender aqueles que violam as regras da nossa escola."
12010-54 = "Embora tenham ocorrido alguns incidentes indesejáveis, não se pode dizer que tenham sido ilegais, por isso espero que compreendam que foram inevitáveis."
12010-55 = "Você poderia cooperar com as atividades do Comitê Disciplinar?"
12010-56 = "Como eu disse anteriormente... não funciona assim!"
12010-57 = "Oh...?"
12010-58 = "Outra escola se envolve descaradamente em combate nas dependências de outra escola!"
12010-59 = "Do ponto de vista da autonomia, isto é uma violação clara!"
12010-61 = "Nós decidimos como o faz-tudo será tratado!"
12010-62 = "……."
12010-63 = "……."
12010-64 = "……."
12010-65 = "Nunca esperei que uma escola tão grande como a Gehenna cometesse um ato tão violento, mas não posso comprometer isso."
12010-67 = "……Eu vejo."
12010-68 = "Parece que essas pessoas têm a mesma ideia."
12010-69 = "Ufa, não acredito que não estou com medo mesmo diante desse exército..."
12010-70 = "A razão pela qual ela está tão confiante... é porque ela tem um adulto em quem pode confiar? ...Ei, [NOME DE USUÁRIO] Sensei?"
12010-71 = "[s] \"…….\""
12010-72 = "Sensei de placa de Petri. Você também tem a mesma opinião da força-tarefa?"
12010-73 = "[s3] \"Os faz-tudo podem ser crianças problemáticas, mas não são maus.\"\n[s4] \"Al pode ser um pouco estranho, mas ele não é mau.\"\n[s5] \"Ele pode ser um pouco estúpido, mas quanto mais estúpidas as crianças, mais fofas elas são.\""
12010-74 = "Não, não, não! Ele é definitivamente um cara mau! Eu fiz a loja de ramen explodir! ?"
12010-75 = "Não, não, não! Ele é definitivamente um cara mau! Eu fiz a loja de ramen explodir! ?"
12010-76 = "Não, não, não! Ele é definitivamente um cara mau! Eu fiz a loja de ramen explodir! ?"
12010-77 = "Talvez, mas... acho que ele fez explodir por engano e só estava tentando se exibir ao não dizer o que disse."
12010-78 = "Ha! ?"
12010-79 = "Se eles estivessem mirando em nós, não havia razão para explodi-los quando não havia ninguém por perto. Não faria sentido usar um método em tão grande escala nessa situação, que ficaria alarmado se fosse feito uma vez."
12010-80 = "...Sim, isso é verdade."
12010-81 = "Então você acidentalmente detonou a armadilha enquanto a preparava...? Como eles são estúpidos..."
12010-82 = "No entanto, é verdade que ele atacou Shibaseki Ramen como resultado. Não posso simplesmente entregá-lo assim."
12010-83 = "Bem, ainda não sabemos a identidade da pessoa por trás deles. Eu gostaria de ouvir sua história primeiro."
12010-84 = "É por isso que as negociações fracassaram! Comitê Disciplinar da Gehenna, pedimos que você saia! !"
12010-86 = "……."
12010-87 = "Isso é preocupante... hummm... não posso evitar se isso acontecer. Eu realmente queria acabar com isso pacificamente, mas..."
12010-90 = "...Parece que não temos escolha a não ser foder?"
12010-98 = "(Da-da-da-da-da-da-da! Da-da-da-da-da-da-da!)"
12010-99 = "Uau! ?"
12010-105 = "(Droga! Droga! Droga!)"
12010-106 = "Argh! ?"
12010-110 = "O-o que! ?"
12010-111 = "Eu não posso perdoar...!"
12010-112 = "Ha! ?"
12010-114 = "Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Eu não posso perdoar isso! Aaaaaaaaaaaaaaaaa! !"
12010-122 = "(Da-da-da-da-da-da-da-da-da-da-da-da-dan!!)"
12010-123 = "Argh! ? Eca...!"
12010-124 = "(bang)"
12010-126 = "Não minta, AmauAko."
12010-127 = "Oh?"
12010-128 = "Não é por acaso, esta era a situação que você almejava desde o início."
12010-129 = "Kayoko-san...."
12010-132 = "Haruka-chan Na~cadeira☆"
12010-133 = "Desculpe! Demorei para vir ajudar...!"
12010-134 = "A culpa é minha...! Todos os meus planos estão arruinados...! Posso morrer? Eu vou morrer! ! !"
12010-135 = "Sim, definitivamente é culpa da Haruka-chan, mas é tão engraçado que ela não precisa morrer, certo?"
12010-136 = "Ah, escapar do cerco...?"
12010-137 = "Antes que eu percebesse, eles estavam em um lugar como aquele..."
12010-138 = "...Eu farei isso."
12010-139 = "……."
12010-140 = "Desculpe, administrador. Agora que desviei meu olhar... vou cercar você mais uma vez..."
12010-141 = "Não, está tudo bem. Não é um grande problema. ...Eu gostaria de contar uma história mais interessante, Kayoko-san?"
12010-142 = "……."
12010-143 = "...No início, não consegui entender por que o Comitê Disciplinar apareceu aqui. Porque é que a comissão disciplinar nos persegue para outras regiões autónomas? Também está nos visando?"
12010-144 = "Este tipo de operação ineficiente não é a forma habitual do presidente da comissão disciplinar. Então, Ako, esta deve ser uma ação arbitrária de sua parte."
12010-145 = "……."
12010-146 = "Além disso, este número de tropas é grande demais para lidar conosco. Se eles estivessem esperando uma batalha com outro grupo, isso poderia ser explicado."
12010-147 = "Porém, este Abydos só tem 5 alunos, mesmo que reúnam todos os alunos... então só há uma conclusão."
12010-152 = "Ako, seu objetivo é uma placa de Petri. Desde o início vim para cá com o objetivo de ser professora."
12010-154 = "! ?"
12010-155 = "O que? ?"
12010-156 = "Você é sensei...? ?"
12010-157 = "[s] \"Eu?\""
12010-159 = "……."
12010-160 = "Hehe, entendo."
12010-161 = "...Ah, esqueci completamente que Kayoko era faz-tudo. Este não era o momento para apenas conversar casualmente..."
12010-162 = "Bem, isso não importa."
12010-168 = "(Zap, zap, zap, zap, zap, zap, zap, zap...)"
12010-170 = "! ?"
12010-173 = "(Zap, zap, zap, zap, zap, zap, zap, zap...)"
12010-174 = "Às 12 horas, depois às 6 horas... 3 horas, 9 horas... Mais tropas do Comitê Disciplinar estão se reunindo de todas as direções...!"
12010-175 = "……."
12010-179 = "(Zap, zap, zap, zap, zap, zap, zap, zap...)"
12010-180 = "……."
12010-181 = "...Aumento de pessoal."
12010-182 = "Não acredito que ainda os temos… e são tantos…!"
12010-183 = "Hmm... achei um pouco demais, mas como estamos lidando com uma placa de Petri, não deve ser problema ter tanto..."

12010-184 = "Bem, dizem que grande também é pequeno☆"
12010-185 = "Achei que o cerco tinha acabado, mas... era duplo..."
12010-186 = "Sim, está certo. De qualquer forma, como esperado de Kayoko-san. O que você disse anteriormente está correto. ...Não, acho que é metade da pontuação? É certo que também presumi o pior cenário possível: colidir com uma placa de Petri."
12010-187 = "No entanto, esta situação não foi criada intencionalmente. Eu gostaria que você acreditasse muito em mim... mas parece que vai ser difícil."
12010-189 = "Não pode ser ajudado. Deixe-me contar o que aconteceu... Tudo começou em um chá."
12010-190 = "Claro, você provavelmente já conhece o conselho estudantil da Trinity Academy, que tem uma rivalidade de longa data com a Gehenna Academy."
12010-191 = "O Tea Party tem um relatório sobre a placa de Petri... Uma história como essa chegou até mim do nosso departamento de inteligência."
12010-193 = "Quando eu voltar, reportarei esse fato ao Tea Party!"
12010-195 = "A princípio eu não tinha ideia do que era uma “placa de Petri”, mas se o Tea Party conhece essa informação, precisamos saber também."
12010-196 = "Então, verifiquei o relatório escrito por Chinatsu."
12010-197 = "(Não é tarde demais para verificar...?)"
12010-198 = "Uma organização não identificada deixada pelo presidente do Conselho Estudantil da Federação... uma atividade extralegal de clube dirigida por um sensei adulto."
12010-199 = "Não tem um cheiro suspeito, não importa o que você pense sobre isso?"
12010-200 = "A organização chamada placa de Petri parece ser um elemento muito perigoso e incerto. Não sabemos que impacto isto terá no futuro tratado com a Trinity."
12010-201 = "Portanto, pelo menos até que o tratado seja concluído com sucesso, gostaria de recebê-lo sob a proteção do nosso Comité Disciplinar."
12010-202 = "Ao mesmo tempo, os alunos delinquentes presentes também foram atendidos... e assim por diante."
12010-203 = "……."
12010-204 = "Hmm, talvez isso tornasse a situação mais fácil de entender."
12010-205 = "...Você pretende levar o sensei com você? Você achou que diríamos: \"Sim?\""

12010-206 = "……."
12010-208 = "...Hehe, acho que é assim que vai acabar, afinal. Pois bem, não há como evitar, certo? Ayane Okusora?"
12010-209 = "...?"
12010-210 = "O Comitê Disciplinar da Gehenna pode usar força militar, se necessário. Depois de tomarmos essa decisão, não iremos recuar de forma alguma."
12010-211 = "...! !"
12010-213 = "……."
12010-214 = "Presidente, se vai fugir, agora é a hora. Uma vez iniciada a batalha, não há como voltar atrás."
12010-215 = "Tenho certeza de que o comitê disciplinar planeja exterminar Abydos e nós ao mesmo tempo. Mas enquanto Abydos tiver a atenção deles, podemos romper um lugar onde a rede de cerco é tênue..."
12010-216 = "...Hehe."
12010-217 = "Hehe, hehehehe."
12010-218 = "……presidente?"
12010-219 = "...Ei, Kayoko, você ainda não conhece minha personalidade?"
12010-220 = "...?"
12010-221 = "Nessa situação, sendo tratado assim... você daria as costas e fugiria?"
12010-222 = "Não tem como nós, faz-tudo, fazermos algo assim, um canalha de terceira categoria! ! !"
12010-223 = "...Ah."
12010-226 = "Vou ter que dar uma chance àquele atrevido comitê disciplinar!"
12010-227 = "Sr."
12010-228 = "(Você não fugiu ontem...)"
12010-229 = "Hmm... Tudo bem, mas você quer lutar de frente com esse exército? Acho que mesmo se unirmos forças com Abydos, será no limite..."
12010-230 = "Em primeiro lugar, não creio que Abydos irá cooperar connosco..."
12010-231 = "Ok, faz-tudo! Eu vou atacar você! ! Este comitê disciplinar precisa ser desmontado! ! !"
12010-232 = "Torne-se um escudo de sensei."
12010-233 = "! ?"
12010-234 = "Vamos todos proteger o sensei, ok?"
12010-235 = "É muito cedo para falar..."
12010-237 = "Hehe...Ahahahahahaha!"
12010-238 = "Claro! Quem você pensa que eu sou? Não se preocupe!"
12010-239 = "Recompensarei a confiança com confiança! Esse é o nosso lema no Handyman 68!"
12010-241 = "sim! ! Também devemos muito ao sensei! Com certeza farei disso um sucesso...!"
12010-242 = "Além disso, vou aproveitar esta oportunidade para dizer isso! Não é como se eu tivesse explodido por engano! Porque está no alvo!"
12010-243 = "É uma espécie de guerra psicológica avançada que apenas um bandido implacável como eu pode executar...!"
12010-244 = "...Uau, um túmulo."
12010-246 = "Hmm... bem, essa era a situação que eu esperava..."
12010-247 = "Mesmo assim, eu não esperava que eles se dessem bem tão rapidamente..."
12010-248 = "...Bem, tudo bem então."
12010-249 = "O Comitê Disciplinar lança um ataque. Assuma o controle da força-tarefa e do faz-tudo e proteja o sensei com segurança."
12010-250 = "O sensei é de fora de Kivotos, então tome cuidado para não machucá-lo."
12010-251 = "Muito bem, você decidiu disparar a espingarda... Prepare-se! !"
12010-253 = "O inimigo está iniciando um cerco! Por favor, avance!"
12010-254 = "sensei! Por favor, comande a nós e ao Handyman 68!"
