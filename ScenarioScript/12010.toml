[translation]
12010-1 = "第1話;予期せぬ同盟"
12010-5 = "許せない……許せない……許せない……許せない……。"
12010-7 = "許せな――？"
12010-8 = "[s] ハルカと目が合ってしまった。"
12010-9 = "……。"
12010-16 = "[ns1] （目を逸らしておこう……）\n[ns2] 見なかったことにする。"
12010-21 = "……。"
12010-22 = "……。"
12010-23 = "……。"
12010-25 = "行政官ということは……風紀委員会のナンバー2……。"
12010-26 = "あら、実際はそんな大したものではありません。あくまで風紀委員長を補佐する秘書みたいなものでして……"
12010-27 = "本当にそうなら、そこの風紀委員たちがそんなに緊張するとは思えない。"
12010-28 = "だ、誰が緊張してるって！？"
12010-29 = "……。"
12010-30 = "なるほど、素晴らしい洞察力です。確か……[ruby=すなおおかみ]砂狼[/ruby]シロコさん、でしたか？"
12010-31 = "……。"
12010-32 = "アビドスに生徒会の面々だけが残ってると聞きましたが、みなさんのことのようですね。"
12010-33 = "アビドスの生徒会は五名と聞いていましたが、あと一人はどちらに？"
12010-34 = "今はおりません。そして私たちは生徒会ではなく対策委員会です、行政官。"
12010-35 = "[ruby=おくそら]奥空[/ruby]さん……でしたよね？それでは、生徒会の方はいらっしゃらないということでしょうか？私は、生徒会の方と話がしたいのですが。"
12010-36 = "アビドスの生徒会はずっと前に解散したの！事実上私たちが生徒会の代理みたいなものだから、言いたいことがあるなら私らに言いなさい！"
12010-37 = "こんなに包囲して銃を向けられたまま「お話をしましょうか～」なんていうのは、お話の態度としてはどうかと思いますけどね？"
12010-38 = "ふふ、それもそうですね……。"
12010-39 = "失礼しました。全員、武器を下ろしてください。"
12010-40 = "（スッ）"
12010-42 = "（スッ……）"
12010-43 = "あら……。"
12010-44 = "本当に武器を下ろした……？"
12010-45 = "……。"
12010-46 = "先ほどまでの愚行は、私の方から謝罪させていただきます。"
12010-47 = "なっ、私は命令通りにやったんだけど！？アコちゃん！？"
12010-48 = "命令に、「まずは無差別に発砲せよ」なんて言葉が含まれてましたか？"
12010-49 = "い、いや……状況を鑑みて必要な範囲で火力支援、その後に歩兵の投入……戦術の基本通りにって……。"
12010-50 = "ましてや他の学園自治区の付近なのだから、きちんとその辺りは注意するのが当然でしょう？"
12010-51 = "（……？）"
12010-52 = "失礼しました、対策委員会のみなさん。"
12010-53 = "私たちゲヘナの風紀委員会はあくまで、私たちの学園の校則違反をした方々を逮捕するために来ました。"
12010-54 = "あまり望ましくない出来事もありましたが、まだ違法行為とは言いきれないでしょうし……やむを得なかったということでご理解いただけますと幸いです。"
12010-55 = "風紀委員会としての活動に、ご協力をお願いできませんか？"
12010-56 = "先ほども言いましたが……そうはいきません！"
12010-57 = "あらっ……？"
12010-58 = "他の学校が別の学校の敷地内で、堂々と勝手に戦闘行為をするなんて！"
12010-59 = "自治権の観点からして、明確な違反です！"
12010-61 = "便利屋の処遇は、私たちが決めます！"
12010-62 = "……。"
12010-63 = "……。"
12010-64 = "……。"
12010-65 = "まさか、ゲヘナほどの大きな学園がこんな暴挙に出るとは思ってもみませんでしたが、ここは譲れません。"
12010-67 = "……なるほど。"
12010-68 = "そちらの方々も、同じ考えのようですね。"
12010-69 = "ふぅ、この兵力を前にしても怯まないだなんて……。"
12010-70 = "これだけ自信に満ちているのは……やはり、信頼できる大人の方がいるからでしょうか？……ねえ、[USERNAME]先生？"
12010-71 = "[s] \"……。\""
12010-72 = "シャーレの先生。あなたも、対策委員会と同じご意見ですか？"
12010-73 = "[s3] \"便利屋は困った子たちかもだけど、悪人じゃないから。\"\n[s4] \"アルはちょっと変な子だけど、悪人じゃないから。\"\n[s5] \"ちょっとバカかもだけど、バカな子ほど可愛いってね。\""
12010-74 = "いやいやいや！悪人に決まってるでしょ！ラーメン屋を爆発させたのよ！？"
12010-75 = "いやいやいや！悪人に決まってるでしょ！ラーメン屋を爆発させたのよ！？"
12010-76 = "いやいやいや！悪人に決まってるでしょ！ラーメン屋を爆発させたのよ！？"
12010-77 = "多分だけど……あれは、間違って爆破させちゃって、そのまま言い出せずに見栄を張ったんだと思う。"
12010-78 = "はあ！？"
12010-79 = "私たちを狙ってたのなら、誰もいないタイミングで爆破する理由がない。一度やったら警戒されるあんな大掛かりな手段を、あの状況で使う意味も無いはず。"
12010-80 = "……た、確かに、それはそうね。"
12010-81 = "罠を準備している最中に、間違えて爆破させたってこと……？どんだけバカなのよ、あいつらは……。"
12010-82 = "でも、結果的に柴関ラーメンを攻撃したのは事実。このまま大人しく引き渡すわけにはいかない。"
12010-83 = "そうですね、彼女たちの背後にいる方の正体もまだ分かっていませんし。先にお話を聞かせてもらいませんと。"
12010-84 = "そういうわけで、交渉は決裂です！ゲヘナの風紀委員会、あなた方に退去を要求します！！"
12010-86 = "……。"
12010-87 = "これは困りましたね……うーん……こうなったら仕方ありません。本当は穏便に済ませたかったのですが……。"
12010-90 = "……ヤるしかなさそうですね？"
12010-98 = "（ダダダダダダダッ！ダダダダダダダッ！）"
12010-99 = "うわあっ！？"
12010-105 = "（ダンッ！ダンッ！ダンッ！）"
12010-106 = "ぐあっ！？"
12010-110 = "な、なんだ！？"
12010-111 = "許せない……！"
12010-112 = "はっ！？"
12010-114 = "許せない！許せない！許せない！許せない！許せない！許せない！許せない！許せない！許せない！許せない！許せない！うああああああああああっ！！"
12010-122 = "（ダダダダダダダダダダダダンッッ！！）"
12010-123 = "ぐっ！？うぅ……っ！"
12010-124 = "（バタッ）"
12010-126 = "嘘をつかないで、[ruby=あまう]天雨[/ruby]アコ。"
12010-127 = "あらっ？"
12010-128 = "偶然なんかじゃないでしょ、最初からあんたが狙ってたのはこの状況だった。"
12010-129 = "カヨコさん……。"
12010-132 = "ハルカちゃんナ～イス☆"
12010-133 = "す、すみません！助けに来るのが遅くなりました……！"
12010-134 = "わ、私のせいで……！計画が全部、全部台無しに……！し、死んでもいいですか？死にますっっ！！！"
12010-135 = "うん、確かにハルカちゃんのせいだけど、まあ面白いから死ななくていいんじゃない？"
12010-136 = "あらっ、包囲網を抜けて……？"
12010-137 = "あいつら、いつの間にあんなところに……。"
12010-138 = "……やるね。"
12010-139 = "……。"
12010-140 = "申し訳ありません、行政官。視線を逸らされた隙に……今から、もう一度包囲を――"
12010-141 = "いえ、大丈夫です。大した問題でもありませんし。……それより、面白い話をしますね、カヨコさん？"
12010-142 = "……。"
12010-143 = "……最初はどうして風紀委員会がここに現れたのか、理解できなかった。風紀委員会が他の自治区まで追ってくる理由、それも私たちを狙って？"
12010-144 = "こんな非効率的な運用、風紀委員長のいつものやり方じゃない。だからアコ、これはあんたの独断的な行動に違いない。"
12010-145 = "……。"
12010-146 = "それに、私たちを相手するにしてはあまりにも多すぎるこの兵力。他の集団との戦闘を想定していたとすれば、説明がつく。"
12010-147 = "とはいえ、このアビドスは全校生徒集めても5人しかいない……なら結論は一つ。"
12010-152 = "アコ、あんたの目的はシャーレ。最初から、先生を狙ってここまで来たんだ。"
12010-154 = "！？"
12010-155 = "な、何ですって！？"
12010-156 = "先生を、ですか……！？"
12010-157 = "[s] \"私？\""
12010-159 = "……。"
12010-160 = "ふふっ、なるほど。"
12010-161 = "……ああ、便利屋にカヨコさんがいることをすっかり忘れてました。のんきに雑談なんてしている場合ではありませんでしたね……。"
12010-162 = "まあ、構いません。"
12010-168 = "（ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ……）"
12010-170 = "！？"
12010-173 = "（ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ……）"
12010-174 = "12時の方向、それから6時の方向……3時、9時……風紀委員会のさらなる兵力が四方から集結しています……！"
12010-175 = "……。"
12010-179 = "（ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ、ザッ……）"
12010-180 = "……。"
12010-181 = "……増員。"
12010-182 = "まだいただなんて……それに、こんなにも数が……！"
12010-183 = "うーん……少々やりすぎかとも思いましたが……シャーレを相手にするのですから、これくらいあっても困らないでしょうし……。"
12010-184 = "まあ、大は小を兼ねると言いますからね☆"
12010-185 = "包囲は抜けたと思ったけど……二重だったか……。"
12010-186 = "はい、そうです。それにしても、さすがカヨコさんですね。先ほどのお話は正解です。……いえ、得点としては半分くらいでしょうか？確かに私は、シャーレと衝突するという最悪のシチュエーションも想定していました。"
12010-187 = "しかし、この状況を意図的に作り出したわけではありません。それだけは信じていただきたいのですが……どうやら、難しそうですね。"
12010-189 = "仕方ありませんね。事の次第をお話ししましょう……きっかけは、ティーパーティーでした。"
12010-190 = "もちろんご存知ですよね、ゲヘナ学園と長きにわたって敵対関係にある、トリニティ総合学園の生徒会のことです。"
12010-191 = "そのティーパーティーが、シャーレに関する報告書を手にしている……と。そんな話が、うちの情報部から上がってきまして。"
12010-193 = "戻ったら、この事実をティーパーティーに報告します！"
12010-195 = "当初は私も「シャーレ」とは一体何なのか、全く知りませんでしたが……ティーパーティーが知っている情報となれば、私たちも知る必要があります。"
12010-196 = "それで、チナツさんが書いた報告書を確認しました。"
12010-197 = "（確認するのが遅くないです……？）"
12010-198 = "連邦生徒会長が残した正体不明の組織……大人の先生が担当している、超法規的な部活。"
12010-199 = "どう考えても怪しい匂いがしませんか？"
12010-200 = "シャーレという組織は、とても危険な不確定要素に見えます。これからのトリニティとの条約にも、どんな影響を及ぼすのか分かったものではありません。"
12010-201 = "ですからせめて条約が無事締結されるまでは、私たち風紀委員会の庇護下に先生をお迎えさせていただきたいのです。"
12010-202 = "ついでに、居合わせた不良生徒たちも処理した上で……といった形で。"
12010-203 = "……。"
12010-204 = "ん、むしろ状況が分かりやすくなって良いかも。"
12010-205 = "……先生を連れて行くって？私たちがそれで「はいそうですか」って言うとでも思った？"
12010-206 = "……。"
12010-208 = "……ふふ、やっぱりこういう展開になりますか。では仕方ありませんね、奥空アヤネさん？"
12010-209 = "……？"
12010-210 = "ゲヘナの風紀委員会は、必要でしたら戦力を行使することもあります。私たちは一度その判断をすれば、一切の遠慮をしません。"
12010-211 = "……！！"
12010-213 = "……。"
12010-214 = "社長、逃げるなら今しかないよ。戦闘が始まったら、もう後戻りはできない。"
12010-215 = "風紀委員会はきっと、アビドスと私たちを同時に殲滅するつもり。でもアビドスがあっちの気を引いてる間になら、包囲網が薄いところから突破……"
12010-216 = "……ふふっ。"
12010-217 = "ふふっ、ふふふふっ。"
12010-218 = "……社長？"
12010-219 = "……ねえカヨコ、あなたはもうとっくに私の性格、分かってるんじゃなくて？"
12010-220 = "……？"
12010-221 = "こんな状況で、こんな扱いをされておいて……背中を向けて逃げる？"
12010-222 = "そんな三流の悪党みたいなこと、私たち便利屋がするわけないじゃない！！！"
12010-223 = "……あはー。"
12010-226 = "あの生意気な風紀委員会に一発食らわせないと気が済まないわ！"
12010-227 = "アル様……っ。"
12010-228 = "（昨日、すぐに逃げなかったっけ……）"
12010-229 = "ふう……それは良いけど、あの兵力と真っ向から戦う気？アビドスと力を合わせてもギリギリだと思うけど……。"
12010-230 = "そもそもアビドスが私たちに協力してくれるとは思えないし……となると……"
12010-231 = "よっし、便利屋っ！挟み撃ちするわよ！！この風紀委員会、コテンパンにしてやらないと！！！"
12010-232 = "先生の盾になってもらう。"
12010-233 = "！？"
12010-234 = "先生をみんなで守ります、いいですね？"
12010-235 = "話が早いな…………。"
12010-237 = "ふふっ……あははははははっ！"
12010-238 = "当たり前よ！この私を誰だと思ってるの？心配は無用！"
12010-239 = "信頼には信頼で報いるわ！それが私たち、便利屋68のモットーだもの！"
12010-241 = "はい！！先生には私たちも色々とお世話になりましたので！絶対に成功させます……！"
12010-242 = "あとせっかくだから言っておくけど！間違えて爆破させたわけじゃないから！狙い通りだから！"
12010-243 = "私みたいな冷酷なアウトローでもないと実行できない、高度な心理戦っていうか……！"
12010-244 = "……うわぁ、墓穴。"
12010-246 = "うーん……まあ、これはこれで想定していた状況ではありましたが……。"
12010-247 = "それにしても、ここまで意気投合が早いとは……その点は想定外でした。"
12010-248 = "……まあいいでしょう、それでは。"
12010-249 = "風紀委員会、攻撃を開始します。対策委員会と便利屋を制圧して、先生を安全に確保してください。"
12010-250 = "先生はキヴォトスの外部の人なので、怪我をさせないように十分注意を。"
12010-251 = "よくもショットガンの乱射なんて決めてくれたな……覚悟しろ！！"
12010-253 = "敵、包囲を始めています！突破してください！"
12010-254 = "先生！私たちと便利屋68の指揮、お願いします！"
