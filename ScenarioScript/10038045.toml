[translation]
10038045-4 = "Relatório do portão principal: o número de invasores é 2. #nPor enquanto, não parece haver grandes problemas."
10038045-9 = "Entendo... Aqui também não há problemas. #nO Elixir da Imortalidade está pronto."
10038045-10 = "Isto é...!?"
10038045-11 = "Sim... finalmente consegui completá-lo."
10038045-12 = "Foi longo... realmente, levou um tempo absurdo."
10038045-13 = "Sobre isso... o meu..."
10038045-14 = "Hehe, entendo..."
10038045-15 = "Não precisa se preocupar, eu me lembro da promessa."
10038045-19 = "Fiz a sua parte também, então pode ficar tranquila."
10038045-21 = "Com isso... estamos um passo mais perto de nos tornarmos imortais...!"
10038045-22 = "Exatamente. #nTornar-se um imortal — esse é o objetivo da fundação do Clube de Pesquisa de Alquimia, afinal."
10038045-23 = "Bem, embora pareça que Saya também não tenha esquecido."
10038045-27 = "..."
10038045-28 = "Ah, falando nisso... estamos na época do Festival do Luar, não é?"
10038045-29 = "Sim. Normalmente, esta seria uma época ocupada com os preparativos para o festival, mas..."
10038045-30 = "Entendo, entendo. Os preparativos estão difíceis por causa do \"fenômeno de rejuvenescimento\". #nHehe, é uma sorte que as coisas tenham acontecido como eu esperava."
10038045-31 = "..."
10038045-32 = "É uma pena, agora que o Elixir da Imortalidade finalmente ficou pronto. #nNão acha?"
10038045-36 = "Em que sentido... você diz?"
10038045-37 = "O Festival do Luar tem uma lenda, não tem?"
10038045-38 = "A lenda de que um imortal que partiu para a lua retorna a esta terra, viaja pelo mundo inferior e, depois... parte em uma jornada."
10038045-39 = "Há outro significado escondido nisso. Você sabia?"
10038045-40 = "...Poderia me ensinar?"
10038045-41 = "É a tradição de que o imortal que retornou da lua causou tumulto e foi expulso do mundo inferior."
10038045-42 = "Não me diga que o imortal voltou para a lua porque..."
10038045-43 = "É exatamente isso. #nSe estivesse satisfeito com a vida na terra, não teria necessidade de voltar, não é?"
10038045-44 = "...A conversa se estendeu demais. #nBem, então... vamos ingerir o Elixir da Imortalidade."
10038045-49 = "Ah, não precisa se preocupar. #nEu beberei primeiro."
10038045-54 = "Então eu também..."
10038045-65 = "Ugh...!?"
10038045-71 = "Ufa... se o remédio for forte demais, torna-se veneno..."
10038045-77 = "Não conseguiu aguentar... que pena."
10038045-78 = "Hehe, hehehehe..."
10038045-82 = "Ah, eu sinto — essa sensação do sangue circulando por todo o corpo e a vitalidade transbordando."
10038045-83 = "Hehe, já está na hora de o convidado principal chegar. #nVamos lá, eu mesmo farei questão de recebê-lo calorosamente."
10038045-87 = "Eu estive esperando por muito tempo — Kisaki."
10038045-88 = "Por favor, não me decepcione muito, está bem?"
