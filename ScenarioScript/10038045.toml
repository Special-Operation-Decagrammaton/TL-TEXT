[translation]
10038045-4 = "正門からの報告です――襲撃の人数は2人。#n今のところ大きな問題はないようです。"
10038045-9 = "そうか……こちらも問題ない。#n――仙丹の完成だ。"
10038045-10 = "これが……！？"
10038045-11 = "ああ……ようやく完成させることができた。"
10038045-12 = "長かった……本当に、途方もない時間がかかったよ。"
10038045-13 = "その……私の……"
10038045-14 = "ククッ、なるほど……"
10038045-15 = "心配せずとも、約束は覚えている。"
10038045-19 = "君の分までちゃんと作ったから安心すると良い。"
10038045-21 = "これで……我々は神仙に一歩近づいたのですね……！"
10038045-22 = "その通り。#n神仙になること――それこそが錬丹術研究会の設立目標だからねぇ。"
10038045-23 = "まあ、一応サヤも忘れてはいないようだけど。"
10038045-27 = "……"
10038045-28 = "ああそういえば……いまは月影祭の時期かな？"
10038045-29 = "ええ。本来であれば祭りの準備で忙しい時期なのですが……"
10038045-30 = "そうか、そうか。「若返り現象」のせいで準備が難航しているんだね。#nククッ、思った通りになってくれて助かるよ。"
10038045-31 = "……"
10038045-32 = "せっかく仙丹ができたのに、残念だ。#nそう思わないかね？"
10038045-36 = "どういうところが……でしょうか？"
10038045-37 = "月影祭には、言い伝えがあるだろう？"
10038045-38 = "月に旅立った神仙がこの地に舞い戻り、下界を周遊した後に――旅に出るという伝説。"
10038045-39 = "そこには、別の意味も隠されていてね。知っているかい？"
10038045-40 = "……ご教示いただけますでしょうか。"
10038045-41 = "月から戻ってきた神仙は波乱を生み――下界から追い出されたという伝承さ。"
10038045-42 = "まさか、神仙が月に戻ったのは……。"
10038045-43 = "そういうことさ。#n地上での暮らしに満足していたのなら、戻る必要もないだろう？"
10038045-44 = "……話が長くなってしまったね。#nそれでは――仙丹を服用するとしようか。"
10038045-49 = "ああ、心配せずとも良い。#n私が先に飲もう。"
10038045-54 = "それでは私も……"
10038045-65 = "うっ……！？"
10038045-71 = "ふぅ……薬も度が過ぎれば、毒となる……"
10038045-77 = "耐えきれなかったか……残念だねぇ。"
10038045-78 = "ククッ、ククククッ……"
10038045-82 = "ああ、感じる――全身に血が巡っていき、活力みなぎってくるこの感覚。"
10038045-83 = "ククッ、そろそろ本命の客人が到着する頃かね。#nどれ、私自ら手厚くもてなしてやろうじゃないか。"
10038045-87 = "私はずっと待っていたのだよ――キサキ。"
10038045-88 = "お願いだから、私をあまりがっかりさせないでくれよ？"
