[translation]
10003070-1 = "Episódio 7; Como uma mariposa que voa para a chama"
10003070-2 = "Sala de Operações do Acampamento de Verão"
10003070-4 = "Ah, ah... estão me ouvindo? Equipes em espera, por favor, respondam."
10003070-5 = "“Equipe α, pronta.”"
10003070-6 = "“Equipe β, em posição e aguardando.”"
10003070-7 = "“Equipe γ, sem problemas.”"
10003070-8 = "Tudo verde, então. E o pessoal no local?"
10003070-10 = "Codinome S, cheguei ao local."
10003070-11 = "Codinome H, também cheguei ao local."
10003070-12 = "Certo, a comunicação está boa. Parece que não há problemas. Então, vamos revisar o resumo da operação."
10003070-13 = "Nosso treinamento do acampamento de verão do Comitê Disciplinar termina hoje às 16h. Depois disso, retornaremos imediatamente."
10003070-14 = "O cronograma de hoje que passamos para a Presidente é apenas a participação no treinamento de tiro geral à tarde."
10003070-15 = "No entanto, antes desse treinamento, a própria Presidente reservou um tempo e disse que queria nadar no mar."
10003070-16 = "Ou seja... a própria Presidente também decidiu aproveitar as férias!"
10003070-17 = "Portanto, nossa missão é simples: apoiar as férias de verão da Presidente Hina com tudo o que temos até o fim! As férias só acabam quando voltamos para a academia!"
10003070-19 = "Especificamente, para garantir a segurança, eliminaremos os elementos de risco na praia com antecedência. Depois disso, continuaremos eliminando qualquer elemento perturbador que se aproxime do mar, para que a Presidente possa aproveitar a praia sem preocupações!"
10003070-20 = "Isso é algo que o Comitê Disciplinar deveria estar fazendo...?"
10003070-21 = "Como quase não há ninguém por causa da confusão de ontem, acho que estamos no limite do aceitável..."
10003070-22 = "Sem conversas paralelas! E Sensei, grave bem isto: o papel mais importante desta vez é o seu!"
10003070-23 = "[s] \"Bem... farei o meu melhor...\""
10003070-24 = "Você vai ensinar a Presidente a nadar pessoalmente! Você realmente entende a gravidade dessa responsabilidade!?"
10003070-25 = "Por que o Sensei!? Por que eu não posso!? Eu queria abandonar o treinamento agora mesmo e guiar as mãos dela...!"
10003070-26 = "Bem, sendo honesta, esse é o meu sentimento, mas tudo isso é pela Presidente... Se é isso que ela deseja, farei o possível para apoiá-la."
10003070-29 = "Portanto, por favor, faça isso com toda a sua sinceridade e esforço! E já vou avisando: erros não serão tolerados, entendeu!?"
10003070-30 = "[s] \"E-entendido...\""
10003070-31 = "Ako-chan..."
10003070-32 = "Ainda assim, estou surpresa. A lendária Presidente não saber nadar direito... Eu tinha a imagem de que ela conseguia fazer qualquer coisa."
10003070-33 = "Ela deve ter estado ocupada demais o tempo todo para ter tempo de nadar."
10003070-34 = "Chega de conversa! Concentrem-se na missão!"
10003070-35 = "Ah, a Presidente acabou de terminar de se preparar para nadar e saiu do quarto! Todos, mantenham o foco!"
10003070-39 = "Nenhuma anormalidade na praia."
10003070-40 = "Tudo tranquilo na área ao redor também. Então, por favor, Sensei."
10003070-41 = "[s] \"Entendido!\""
10003070-42 = "Bem, deve ficar tudo bem. Não acho que mais problemas vão acontecer..."
10003070-43 = "Iori. Foi assim ontem também, é melhor não dizer coisas estranhas..."
10003070-44 = "Bem, é verdade que dizem que não há duas sem três. Mas, desta vez, certamente..."
10003070-47 = "Eh..."
10003070-48 = "...Ah."
10003070-49 = "...! Não pode ser, isso é...!? Não, por quê!?"
10003070-50 = "O que houve, Ako-chan!?"
10003070-51 = "...Administradora?"
10003070-53 = "Recebemos contato do Departamento de Informações!"
10003070-54 = "Na favela atrás do hotel, o grupo de delinquentes 'Pachamecha' e o 'Grupo do Capacete Molhado' estão se reunindo!"
10003070-55 = "A escala... estima-se que sejam mais de dois batalhões!"
10003070-56 = "Por que, por que esses dois grupos estão juntos!?"
10003070-57 = "...! Acabamos de receber uma comunicação deles, vou conectar!"
10003070-60 = "Por que estamos juntos... vocês devem estar muito surpresos agora, não é!"
10003070-61 = "Hahaha!! Decidimos formar uma aliança temporária!"
10003070-62 = "Afinal, recebemos uma informação muito oportuna."
10003070-63 = "Parece que aquela Presidente do Comitê Disciplinar não está por perto, não é!?"
10003070-64 = "Se é assim, então a conversa é outra. O Comitê Disciplinar de Gehenna sem a sua presidente não é algo tão assustador assim!"
10003070-65 = "Esperem só, seus bando de inúteis! Vou fazer vocês pagarem caro por terem atrapalhado a nossa luta!"
10003070-66 = "Bem, em resumo, isso é uma declaração de guerra. Ahahahaha! Vou fazer vocês se arrependerem de terem mexido com a gente!"
10003070-70 = "O quê...?! Como ousa, você, uma mera figurante!!!"
10003070-71 = "(Esse tom de voz... ela está falando bem sério, hein...)"
10003070-72 = "Sério mesmo...? Já foi difícil derrotá-las uma por uma, mas uma coalizão... isso não é um problema grave?"
10003070-73 = "Problema ou não, não me importa. Temos que impedi-las a todo custo!"
10003070-74 = "Mas, isso é algo que deveríamos reportar à presidente..."
10003070-75 = "Rejeitado!"
10003070-76 = "A presidente finalmente se deu ao trabalho de tirar férias, não podemos desistir agora!"
10003070-77 = "Então, talvez pedir reforços aos membros do Comitê que ficaram na escola..."
10003070-78 = "Não tem como fazer isso! Se algo der errado, a presidente vai descobrir!"
10003070-79 = "Temos que dar um jeito com as forças que temos aqui no acampamento!"
10003070-80 = "Não, mas, falando sério, isso é impossível, né..."
10003070-81 = "Mesmo que seja irracional ou impossível, nós vamos fazer!!!"
10003070-82 = "Felizmente, ainda temos tempo. Vamos bolar uma estratégia agora, por exemplo, antes que elas terminem de organizar a formação..."
10003070-83 = "Administradora, relatório! Tem um grupo armado, embora pequeno, se aproximando dos arredores do hotel!"
10003070-84 = "Hein!? Quem diabos são eles!"
10003070-85 = "O relatório ainda não está claro, mas dizem que eles estão carregando muitos sacos..."
10003070-86 = "Acabaram de relatar que o conteúdo dos sacos são 'algo cilíndrico com muitas saliências'!"
10003070-87 = "Será que são as famosas granadas de abacaxi modificadas!? Onde será que conseguiram algo tão perigoso...!?"
10003070-88 = "Ah, agora dá para ver claramente...! Aquilo é... milho!"
10003070-89 = "...Oi?"
10003070-91 = "É dia de festa!! Milho assado ou cozido, uma delícia~!"
10003070-92 = "Fufufu★ Finalmente está começando a parecer um festival."
10003070-93 = "Shoyu e manteiga são bons, mas quando se fala em milho, o negócio é geleia de morango!"
10003070-94 = "Parem de pensar só em comer e pensem em vender! E aliás, não passem geleia de morango no milho!!"
10003070-95 = "Fufufu, a empolgação está subindo, não é...!"
10003070-96 = "O sabor do milho em um festival é proporcional à animação do local... esta é a oportunidade perfeita para provar essa hipótese."
10003070-99 = "Vamos lá, por um verão mais barulhento! Um festival agitado! E pelo sabor supremo que nos aguarda!!"
10003070-100 = "Não entendi muito bem, mas sou totalmente a favor de fazer algo chamativo★"
10003070-102 = "..."
10003070-103 = "..."
10003070-104 = "Meu Deus, não faz sentido nenhum..."
10003070-105 = "Desculpe, mais um relatório! Dizem que outra facção está indo em direção à favela...!"
10003070-106 = "O que é isso agora!? Já não tinha gente demais por aqui!?"
10003070-107 = "A-aquele grupo é...! Vou colocar na tela!"
10003070-110 = "Oiiiii!"
10003070-111 = "Hoje também é um ótimo dia para desenvolver!"
10003070-112 = "O-o Departamento de Desenvolvimento de Fontes Termais!?"
10003070-113 = "A chefe disse que sente que tem um vulcão submarino por aqui."
10003070-114 = "Algo sobre águas termais profundas... bem, não entendo muito dos detalhes!"
10003070-115 = "De qualquer forma, estamos indo para aí!"
10003070-116 = "Queimar a floresta, remover os prédios e transformar toda essa área em uma fonte termal! Hora de desenvolver!!"
10003070-117 = "Ah, quando a fonte estiver pronta, eu dou ingressos grátis!"
10003070-118 = "Então é isso! Com licença~♪"
10003070-122 = "Cerca de 200 membros do Departamento de Desenvolvimento de Fontes Termais se reuniram! Além disso, tanques e maquinário pesado... tratores, escavadeiras...!"
10003070-123 = "As forças na favela estão aumentando! O grupo de delinquentes 'Pachamecha' e o 'Grupo do Capacete Molhado' que estavam espalhados, estão se reunindo aos poucos!"
10003070-124 = "Não só isso, autômatos, tanques e helicópteros também foram confirmados!"
10003070-125 = "Isso é...? Outros grupos de delinquentes de outras regiões também estão chegando! Eles estão estendendo lonas e entrando em modo de espectador total!!"
10003070-126 = "Ah! Eles começaram a lutar para ver quem consegue os melhores lugares!!"
10003070-127 = "O Clube de Pesquisa Gastronômica começou a montar uma barraca de milho bem no meio da avenida principal!"
10003070-128 = "O Departamento de Desenvolvimento de Fontes Termais começou a avançar com escavadeiras e tratores... e, por algum motivo, começaram a entrar em confronto com o Clube de Pesquisa Gastronômica!"
10003070-129 = "Os grupos de delinquentes 'Hachamecha' e a 'Gangue dos Capacetes Encharcados' estão vindo em nossa direção...!!"
10003070-139 = "……."
10003070-140 = "…………."
10003070-141 = "Administradora Ako, o que devemos fazer...!"
10003070-142 = "Administradora, nos dê ordens!"
10003070-143 = "……Ugh."
10003070-144 = "……Uh?"
10003070-145 = "Waaaaah!! Como você espera que eu resolva uma situação dessas!?"
10003070-146 = "Se eu foco em um, o outro causa problemas! O que devo fazer com todos eles vindo de uma vez!?"
10003070-147 = "A-Ako-chan, acalme-se um pouco..."
10003070-148 = "Como você quer que eu me acalme com isso!!"
10003070-149 = "De qualquer forma, precisamos de algum método..."
10003070-150 = "Método? Como você espera que eu resolva algo assim!?"
10003070-151 = "O que aconteceu com a 'praia mais tranquila de Gehenna'!? Não é o lugar mais agitado agora!?"
10003070-152 = "Entendo, é uma situação de tática de bigorna."
10003070-153 = "......Agora que você mencionou... é verdade! Como esperado da Presidente!"
10003070-154 = "Sendo assim, a estratégia para abrir caminho nesta situação não é o cerco, mas sim..."
10003070-155 = "O Clube de Pesquisa Gastronômica, a Gangue dos Capacetes, os delinquentes e o Departamento de Fontes Termais. Eles são muitos, mas não estão coordenados. A cadeia de comando entre a Gangue dos Capacetes e os delinquentes também não deve estar muito bem estabelecida."
10003070-156 = "Exatamente, esse é o ponto fraco deles. Primeiro, precisamos nos infiltrar nas brechas da rede de cerco... e, nesse caso, a tática a ser usada é a Blitzkrieg!"
10003070-157 = "Eles provavelmente virão em um cerco circular, mas não é difícil romper um ponto específico com uma guerra relâmpago. A partir daí, há várias formas de agir."
10003070-158 = "Entendo...! Como esperado da Presidente! Você encontrou a solução de imediato!"
10003070-159 = "Então, vamos executar o plano!"
10003070-160 = "Tudo pela..."
10003070-161 = "……."
10003070-162 = "……."
10003070-165 = "……."
10003070-168 = "As férias de verão da Presidente..."
10003070-169 = "……."
10003070-170 = "Eeeehhh!?"
10003070-173 = "[ns1] \"Hina!? Desde quando você está aí...!\"\n[ns2] (Eu esqueci que tínhamos marcado de nos encontrar na praia...!)"
10003070-174 = "……Phew."
10003070-175 = "……Phew."
10003070-176 = "……Ako?"
10003070-177 = "Ah, s-sim..."
10003070-178 = "Falaremos depois sobre como o treinamento acabou virando isso."
10003070-181 = "Todos, preparem-se para o combate."
10003070-182 = "Vamos."
10003070-183 = "En-entendido!"
10003070-184 = "Sim!"
