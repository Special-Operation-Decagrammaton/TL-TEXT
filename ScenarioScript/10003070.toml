[translation]
10003070-1 = "第7話;飛んで火に入る夏の虫"
10003070-2 = "夏季合宿用オペレーションルーム"
10003070-4 = "あー、あー……聞こえますか？待機中の各チーム、応答をお願いします。"
10003070-5 = "「チームα、準備できました」"
10003070-6 = "「チームβ、所定の位置で待機中です」"
10003070-7 = "「チームγ、問題ありません」"
10003070-8 = "オールグリーンですね、現場の方は？"
10003070-10 = "コードネームS、現場に到着。"
10003070-11 = "コードネームH、同じく現場に到着しました。"
10003070-12 = "はい、通信も良好ですね。問題無さそうです。ではあらためて、作戦概要の確認です。"
10003070-13 = "私たち風紀委員会の夏季合宿訓練は、今日の午後4時をもって終了。その後、速やかに帰還となります。"
10003070-14 = "委員長に元々お伝えしている今日のスケジュールは、午後の全体射撃訓練への参加のみ。"
10003070-15 = "ただしその訓練の前に、委員長が自ら時間を作って、海で泳ぎたいと仰いました。"
10003070-16 = "つまり……委員長ご自身もまた、休暇をお過ごしする気になってくださったということ！"
10003070-17 = "なので私たちの任務は簡単です、ヒナ委員長の夏休みを最後まで全力でサポートすること！学園に帰るまでが休暇です！"
10003070-19 = "具体的には万が一のために、事前に海辺の危険要素を排除。その後も引き続き、海に近づく不穏分子を片っ端から処理することで、委員長が何の気兼ねも無くこの海を楽しめるようにするのです！"
10003070-20 = "これ、風紀委員会がやっていいことなのか……？"
10003070-21 = "昨日の騒ぎでほとんど誰もいないので、ギリギリセーフでしょう……。"
10003070-22 = "無駄口を叩かない！それから先生、肝に銘じてください。今回一番大事な役割を担うのは、先生なのですから！"
10003070-23 = "[s] \"えっと……頑張ります……。\""
10003070-24 = "委員長に直接泳ぎ方を教えるのですよ！本当にその責務の重大さを分かっていますか！？"
10003070-25 = "どうして先生が！？なぜ私ではダメなのですか！？今すぐ訓練など放棄して、その手を導いて差し上げたい……！"
10003070-26 = "というのがまあ正直な気持ちなのですが、これも全ては委員長のため……委員長がそう望むのであれば、それを全力で支えるまで。"
10003070-29 = "ですのでどうか、誠心誠意全力で行ってください！それから言っておきますが、間違いなど、絶対にあってはなりませんからね！？"
10003070-30 = "[s] \"わ、分かった……。\""
10003070-31 = "アコちゃん……。"
10003070-32 = "にしても驚いた、あの天下の委員長があんまり泳げなかったなんて……何でもできるイメージだったし。"
10003070-33 = "泳ぐ時間なんて無いくらい、普段からずっと忙しかったのでしょう。"
10003070-34 = "お喋りはそこまでです！任務に集中してください！"
10003070-35 = "あっ、たった今委員長が水泳の支度を終えて、部屋から出ました！皆さん、気を引き締めてください！"
10003070-39 = "海辺は特に異常はなし。"
10003070-40 = "周辺一帯も問題ありません。それではお願いします、先生。"
10003070-41 = "[s] \"ラジャー！\""
10003070-42 = "ま、大丈夫でしょ。これ以上問題も起きっこないだろうし……。"
10003070-43 = "イオリ。昨日もそうでしたが、変なことは言わない方が……。"
10003070-44 = "まあ確かに、二度あることは三度あるっていうけど。流石にもう――"
10003070-47 = "え゛……。"
10003070-48 = "……はあ。"
10003070-49 = "……！まさか、これは……！？いえ、どうして！？"
10003070-50 = "どうしたの、アコちゃん！？"
10003070-51 = "……行政官？"
10003070-53 = "情報部から連絡です！"
10003070-54 = "ホテル裏手のスラム街に現在、スケバン集団「破茶滅茶」と「びしょびしょヘルメット団」が集結中！"
10003070-55 = "その規模……二個大隊以上と予想されます！"
10003070-56 = "どうして、どうしてあの二つの集団が一緒に！？"
10003070-57 = "……っ！向こうからちょうど通信が入りました、繋ぎます！"
10003070-60 = "私たちがどうして一緒にいるのか……今頃、さぞかし驚いてることだろう！"
10003070-61 = "ふははは！！あたしらは一時的に、同盟を結ぶことにした！"
10003070-62 = "なにせ、ちょうど良い情報が入ったからな。"
10003070-63 = "どうやら、あの風紀委員長が不在らしいじゃん！？"
10003070-64 = "そうと聞いたら話は別。委員長が不在のゲヘナ風紀委員会など、そこまで怖いものでもない！"
10003070-65 = "待ってろよ烏合の衆め！私たちの戦いを邪魔をしたけじめ、きっちりつけさせてくれる！"
10003070-66 = "ま、つまりは宣戦布告ってところだ。あははははっ！あたしらに手を出したこと、後悔させてやる！"
10003070-70 = "なっ……！この、たかがエキストラの分際でっ！！！"
10003070-71 = "（この口調、相当本気で怒ってますね……）"
10003070-72 = "マジか……各個撃破でもあんなに大変だったのに、連合って……これマズくないか？"
10003070-73 = "マズいも何も知ったことではありません、断固阻止です！"
10003070-74 = "その、これは流石に委員長に報告した方が……。"
10003070-75 = "却下します！"
10003070-76 = "せっかく委員長が休暇を取る気になってくださったのに、ここで諦めるわけにはいきません！"
10003070-77 = "じゃあ学園に残ってる風紀委員に支援要請とか……。"
10003070-78 = "できるわけがないでしょう！ひとつ間違えば委員長にバレてしまいます！"
10003070-79 = "合宿に来ている分の現存兵力で、何とかしなくてはなりません！"
10003070-80 = "いやでも、こればっかりはもう無理でしょ……。"
10003070-81 = "無茶でも無理でもやるんです！！！"
10003070-82 = "幸いにもまだ時間はあります。今のうちに作戦を練って、例えば向こうが完全に陣形を整える前に……"
10003070-83 = "行政官、ご報告です！ホテル周辺に少数ではありますが、武装した何者かが接近中！"
10003070-84 = "はい！？一体何者ですか！"
10003070-85 = "まだ報告がはっきりしないのですが、何やら袋をたくさん持っているとか……。"
10003070-86 = "今しがたその袋の中身について、「凹凸がたくさんある円筒形の何か」だと報告がありました！"
10003070-87 = "まさか、噂の改造型パイナップル手榴弾！？一体どこでそんな危険なものを……！？"
10003070-88 = "あっ、今ちょうどはっきり見えました……！あれは……トウモロコシです！"
10003070-89 = "……はい？"
10003070-91 = "お祭りだーー！！焼いても茹でても美味しいトウモロコシだよ～！"
10003070-92 = "フフフッ★ようやくお祭りらしくなってきましたね。"
10003070-93 = "醬油もバターも良いけど、やっぱりトウモロコシと言ったらイチゴジャムだよね！"
10003070-94 = "食べることばっか考えてないで、売ることを考えて！っていうかトウモロコシにイチゴジャムなんて塗らないでっ！！"
10003070-95 = "ふふふっ、テンションが上がってきましたわね……！"
10003070-96 = "お祭り騒ぎにおけるトウモロコシの味は、その場の盛り上がりに比例する……この仮説を証明できる絶好の機会ですわ。"
10003070-99 = "さあ、もっと騒がしい夏を！賑やかなお祭りを！そしてその先にある究極の味を！！"
10003070-100 = "ちょっとよく分かりませんが、まあ派手にやること自体は大賛成です★"
10003070-102 = "……。"
10003070-103 = "……。"
10003070-104 = "もう、意味が分かりません……。"
10003070-105 = "すみません、もう一件ご報告です！また別の勢力がスラム街に向かっているとのことで……！"
10003070-106 = "これ以上何なんですか！？ひとしきりもう出てきたでしょう！？"
10003070-107 = "あ、あの集団は……！画面に映します！"
10003070-110 = "はぁ～い！"
10003070-111 = "今日も今日とて開発日和だねー！"
10003070-112 = "お、温泉開発部！？"
10003070-113 = "なんか部長いわく、ちょうどその辺に海底火山がある気がするらしくってさあ。"
10003070-114 = "海洋深層水の温泉がどうとか……ま、細かいことはよく分かんないんだけど！"
10003070-115 = "取り合えず、そっちに向かうねー！"
10003070-116 = "森を燃やして、建物を撤去して、ここら一帯を全部温泉に！さあ開発の時間だよ！！"
10003070-117 = "あっ、温泉ができたらちゃんと無料チケットはあげるから！"
10003070-118 = "じゃ、そういうことで！お邪魔すんね～♪"
10003070-122 = "温泉開発部の部員、約200名が集結中！それに、戦車に加えて重機も……ブルドーザーに、ショベルカーまで……！"
10003070-123 = "スラム街の兵力が増加中！遠方にばらけていたスケバン集団「破茶滅茶」と「びしょびしょヘルメット団」の人員が、徐々に集まってきている模様！"
10003070-124 = "それだけではなく、オートマタ、戦車、ヘリも確認できました！"
10003070-125 = "これは……？他の地域から、別のスケバン集団たちもやってきています！えっと、何やらシートを広げて完全に観戦モード！！"
10003070-126 = "あっ！互いに良い席を取ろうと戦闘を始めました！！"
10003070-127 = "美食研究会、大通りのど真ん中に、トウモロコシの屋台を出し始めました！"
10003070-128 = "温泉開発部、ブルドーザーとショベルカーの進撃を始め……えっと、なぜか美食研究会と交戦を開始しました！"
10003070-129 = "スケバン集団「破茶滅茶」並びに「びしょびしょヘルメット団」が、こちらに向かってきています……！！"
10003070-139 = "……。"
10003070-140 = "…………。"
10003070-141 = "アコ行政官、どうしましょう……！"
10003070-142 = "行政官、ご指示を！"
10003070-143 = "……うっ"
10003070-144 = "……う？"
10003070-145 = "うわあぁぁんっ！！こんなの、こんなの私にどうしろって言うんですかぁっ！？"
10003070-146 = "あちらを立てればこちらが立たず！こんなに一斉に来られてどうしろと！？"
10003070-147 = "あ、アコちゃん、一旦落ち着いて……。"
10003070-148 = "これが落ち着いていられますか！！"
10003070-149 = "とにかく、何か方法を……。"
10003070-150 = "方法も何も、あんなのどう解決しろって言うんですか！？"
10003070-151 = "「ゲヘナで一番静かな海岸」とは何だったんですか！？今一番ホットな場所ではないですか！！"
10003070-152 = "なるほど、[ruby=かなとこ]鉄床[/ruby]戦術の状態ね。"
10003070-153 = "……い、言われてみれば……確かにそうですね！さすがは委員長です！"
10003070-154 = "となると、この状況を打開する戦略は、籠城ではなく……"
10003070-155 = "美食研究会、ヘルメット団、スケバン、それに温泉開発部。数は多いけど、連携が取れてるわけじゃない。ヘルメット団とスケバン集団間の指揮命令系統も、それほど確立されてはいないはず。"
10003070-156 = "そうですね、向こうの弱点はそこです。まずは包囲網の隙間に割り込む必要が……となると、取るべき戦術[ruby=ブリッツクリーク]は電撃戦！[/ruby]"
10003070-157 = "相手は円形包囲網でやってくるだろうけど、そのどこか一点を電撃戦で突き崩すのは難しくない。そこからはいくらでもやりようがある。"
10003070-158 = "なるほど……！さすがは委員長です！一発で解答が見つかりました！"
10003070-159 = "では作戦を実行します！"
10003070-160 = "全ては委員長の……"
10003070-161 = "……。"
10003070-162 = "……。"
10003070-165 = "……。"
10003070-168 = "委員長の、なつやすみ、の……"
10003070-169 = "……。"
10003070-170 = "ええぇぇぇっ！？"
10003070-173 = "[ns1] \"ヒナ！？いつの間に……！\"\n[ns2]（海辺で会う約束だったの、忘れてた……！）"
10003070-174 = "……ふぅ。"
10003070-175 = "……ふぅ。"
10003070-176 = "……アコ？"
10003070-177 = "あ、は、はい……。"
10003070-178 = "訓練がどうしてこんなことになってるのか、その話はまた後で。"
10003070-181 = "全員、戦闘準備。"
10003070-182 = "行こう。"
10003070-183 = "りょ、了解！"
10003070-184 = "はい！"
