[translation]
1007006-1 = "時が経てども"
1007006-2 = "山海経・梅花園"
1007006-4 = "わぁ、ミナお姉さんだ～！"
1007006-5 = "ミナお姉さん！おんぶして！"
1007006-6 = "ふっ……仕方ないな、順番だぞ。#n元気だったか、チビっ子たち。"
1007006-7 = "あ、ミナお姉さん、またチビっ子って言った。"
1007006-9 = "そんなこと言うと、遊んであげないよ？"
1007006-10 = "やっ、聞き間違いじゃないか！？#nお姉さんは何も言ってないぞ！"
1007006-11 = "さあ！プレゼントだ、プレゼント！#nちゃんと全員分あるから、順番に良い子で待っていてくれ。"
1007006-12 = "[s] \"ミナは子どもが好きなんだね。\""
1007006-13 = "……っ！？"
1007006-14 = "梅花園の子ども達は……その、あれだ。"
1007006-15 = "山海経の未来だからな！"
1007006-16 = "あ、それルミお姉さんがよく言ってる！"
1007006-18 = "ルミお姉さんは、いつも果物とおやつをたくさん持ってきてくれて……#n料理を作りながら、そう言ってるよ！"
1007006-19 = "玄武商会は、いつの間に子ども達を食べ物で釣っていたんだ……！？"
1007006-20 = "姑息な手を……こうしてはいられない！"
1007006-21 = "[s] \"純粋に子ども達を可愛がってるだけじゃない？\""
1007006-22 = "まさか玄武商会の味方をするというのか！？#n私と2人で梅花園に来たというのに。"
1007006-23 = "[s] \"私は生徒みんなの味方だよ……。\""
1007006-24 = "ふん……まあ良いだろう。"
1007006-25 = "良い子のみんな、今日のプレゼントはカッコいいやつだぞ？#n……新しい服と靴だからな！"
1007006-26 = "ねえ……これ、玄龍門の服みたいじゃない？"
1007006-27 = "この靴、黒い花飾りがすっごく大きいね。"
1007006-28 = "フッ、玄龍門が特別に用意したものだからな。"
1007006-29 = "食べたら無くなってしまうようなプレゼントとは違うだろう？"
1007006-30 = "う～ん……でも、なんか好みじゃないかも。"
1007006-32 = "ミナお姉さん、わたし可愛いお洋服が欲しい！"
1007006-33 = "何だと！？"
1007006-34 = "みんな、ちょっと集まってくれ。#n今からお姉さんが、と～っても大切なお話を聞かせてあげよう。"
1007006-40 = "まずはだな、この服は玄龍門最高の裁縫師が仕立てたもので――"
1007006-41 = "山海経の――玄龍門の伝統や価値、そして精神を込めて……"
1007006-42 = "ここを見てくれ。ほら、この通り！細部に至るまで丹精にだな！"
1007006-43 = "靴もそうだ！黒は玄龍門を代表する色だからな。#n毅然で公正に、そして豪胆な決断力を持つ玄龍門にこそ[ruby=ふさわ]相応[/ruby]しい――"
1007006-44 = "これは梅花園の全ての子ども達が正しく育ち、#n山海経の立派な一員になることを願ってだな……"
1007006-45 = "ミナお姉さん、話が終わったら起こして～"
1007006-46 = "えっと、黒いバラの花言葉には「恨み」ってあるらしいけど……#nミナお姉さん、わたしたちを恨んでるの……？"
1007006-47 = "そ、そうではなくてだな～～～！"
1007006-52 = "腰が……痛い。"
1007006-53 = "[s] \"子ども達と楽しそうに遊んでたね。\""
1007006-54 = "ああ、とても充実した時間だった。"
1007006-55 = "両側から腕を引っ張られたり、勢いよく抱きつかれたり……"
1007006-56 = "髪を引っ張られたり、耳元で叫ばれたり、言うこと聞かずに走り回るから目を離せなかったりするが……子どもとは、そういうものだ。"
1007006-57 = "[s] \"時々、手に負えないこともあるよね……。\""
1007006-58 = "人は誰しも、子どもだった時代があるだろう？"
1007006-59 = "だからこれは、借りを返しているようなものだ。#nそう思えば、なんてことはない。"
1007006-62 = "[ns] \"……。\""
1007006-63 = "な、なんだ先生、その鳩が豆鉄砲を食らったような表情は。"
1007006-64 = "……ん？なっ、ことわざくらい私だって知っている！"
1007006-65 = "先生の私に対する認識はどうなっているんだ……？"
1007006-66 = "……子ども達を見ていると、いつも思うことがある。"
1007006-67 = "あの子たちは、将来どんな生徒になるのだろうか。#nそして……その時、私は良い大人になっているのだろうか。"
1007006-68 = "先生は……って、そうだな。#n大人になれば、自然と解を得ているものだろう。"
1007006-69 = "[s1] \"そうとも限らないよ。\"\n[s2] \"ただ時間が経てば、大人になれるわけじゃないから。\""
1007006-72 = "そうなのか？先生は本当に色々なことを知っているな。"
1007006-73 = "いや、今に限った話ではないが。"
1007006-74 = "……これが、大人の余裕。"
1007006-75 = "[s] \"そう見えたなら良かったよ。\""
1007006-76 = "まるで本当は違うような言い草だな。"
1007006-77 = "[s] \"沈まないよう、毎日必死に[ruby=もが]藻掻[/ruby]いてるからね。\""
1007006-78 = "そこは白鳥のような余裕が欲しいものだな。"
1007006-79 = "ただ、そう過小に見る必要はないんじゃないか？#n……いや、そうか。"
1007006-84 = "「誰だって子供の心を持っている。どれだけ時間が経とうとも、どれだけ歳を重ねようとも――」"
1007006-88 = "[ns] \"「己と和解しなければならない理由は、それが唯一可能な事だから」。\""
1007006-89 = "「濡れた風が吹き始めたらもう遅い。受け入れるより他ないのだから」。"
1007006-91 = "（こうして、ミナと会話を楽しみながらシャーレに戻った）"
