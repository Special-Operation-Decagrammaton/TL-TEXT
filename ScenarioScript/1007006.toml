[translation]
1007006-1 = "mesmo com o passar do tempo"
1007006-2 = "Sutra Sankai, Jardim das Flores de Ameixa"
1007006-4 = "Uau, é a irmã da Mina!"
1007006-5 = "Irmã Mina! Me dê um cavalinho de pau!"
1007006-6 = "Phew. ...... Não o culpo, é a sua vez. #nComo vocês estão, pequeninos?"
1007006-7 = "Oh, irmã Mina, eu disse garotinho novamente."
1007006-9 = "Se você disser isso, não vou brincar com você, certo?"
1007006-10 = "Sim, acho que você ouviu errado! Sua irmã #n não disse nada!"
1007006-11 = "Vamos lá! Presentes, presentes! Há o suficiente para #n e para todos os outros, portanto, seja um bom menino."
1007006-12 = "[\"Mina gosta de crianças. \""
1007006-13 = "......!"
1007006-14 = "As crianças do Plum Blossom Garden são ...... isso, aquilo."
1007006-15 = "É o futuro do Sutra Sankai!"
1007006-16 = "Ah, isso é o que a irmã Lumi costuma dizer!"
1007006-18 = "A irmã Rumi sempre me traz muitas frutas e lanches ......#n ela diz enquanto cozinha!"
1007006-19 = "Quando foi que a Câmara de Comércio de Genkwu começou a pescar crianças para obter alimentos? ......!"
1007006-20 = "Não podemos nos dar ao luxo de jogar a mão da sogra ...... dessa maneira!"
1007006-21 = "[\"Você não ama genuinamente as crianças? \""
1007006-22 = "Você não quer dizer que está do lado do Genbu Shokai! #Mesmo que você e eu tenhamos vindo juntos para o Plum Blossom Garden."
1007006-23 = "[s]\"Estou do lado de todos os meus alunos. ....... \""
1007006-24 = "Hmm ...... Bem, isso é bom."
1007006-25 = "Crianças boazinhas, tenho um presente legal para vocês hoje, ok? #n...... são roupas e calçados novos!"
1007006-26 = "Ei, ......, isso não se parece com uma roupa de Genryumon?"
1007006-27 = "Esses sapatos têm uma guirlanda preta muito grande."
1007006-28 = "Huh, ele foi especialmente preparado por Xuan Longmen."
1007006-29 = "Não é a mesma coisa que um presente que desaparece quando você o come, não é?"
1007006-30 = "Hmmm... ...... mas não sei, talvez eu não goste."
1007006-32 = "Irmã Mina, quero roupas bonitas!"
1007006-33 = "O quê?"
1007006-34 = "Todos, juntem-se em volta por um momento. #Agora sua irmã vai lhes contar uma história muito, muito importante."
1007006-40 = "Antes de mais nada, essas roupas foram feitas sob medida pelas melhores costureiras de Xuanlongmen."
1007006-41 = "O Shan Hai Jing - com as tradições, os valores e o espírito dos homens de Xuan Long. ......"
1007006-42 = "Veja aqui. Veja, é disso que estou falando! Atenção meticulosa aos detalhes!"
1007006-43 = "Assim como os sapatos! O preto é a cor que representa os Xuan Longmen. #É apropriada para os Xuan Longmen, que são resolutos, justos e ousados em suas decisões..."
1007006-44 = "Esperamos que todas as crianças do Plum Blossom Garden cresçam corretamente e se tornem membros respeitáveis do #nShanhaiKeio. ......"
1007006-45 = "Irmã Mina, acorde-me quando terminar de falar comigo."
1007006-46 = "Bem, ouvi dizer que a linguagem das flores para as rosas negras é \"ressentimento\". ......#nIrmã Mina, você está ressentida conosco ......?"

1007006-47 = "Bem, não foi isso que eu quis dizer~~!"
1007006-52 = "Minhas costas estão doendo ......."
1007006-53 = "[\"Você parecia gostar de brincar com as crianças. \""
1007006-54 = "Sim, foi um período muito produtivo."
1007006-55 = "Braços puxados de ambos os lados ou abraçados vigorosamente ......"
1007006-56 = "Eles puxam seu cabelo, gritam em seu ouvido e você não consegue tirar os olhos deles porque eles não ouvem e correm. ...... É assim que as crianças são."
1007006-57 = "[s]\"Às vezes as coisas saem do controle. ...... \""
1007006-58 = "Todos nós temos momentos em que éramos crianças, não é mesmo?"
1007006-59 = "Portanto, isso é como pagar uma dívida. #n Se você pensar dessa forma, que alívio."
1007006-62 = "[ns] \"....... \""
1007006-63 = "Ei, que cara é essa, doutor, como a de um pombo que foi atingido por um atirador de ervilhas?"
1007006-64 = "...... Hmm? Nah, até eu conheço o provérbio!"
1007006-65 = "Qual é a percepção que o sensei tem de mim ......?"
1007006-66 = "......Quando olho para as crianças, sempre penso nelas."
1007006-67 = "Que tipo de alunos essas crianças se tornarão no futuro? #n E eu serei um bom adulto então? ......"
1007006-68 = "O sensei diz que ....... #nComo adulto, você naturalmente terá uma solução."
1007006-69 = "[s1] \"Não necessariamente. \"\n[s2] \"Só porque o tempo passou não faz de você um adulto. "
1007006-72 = "Sério? Seu sensei realmente sabe muitas coisas."
1007006-73 = "Não, não é só agora."
1007006-74 = "...... Essa é a versão para adultos."
1007006-75 = "[\"Fico feliz que você tenha visto dessa forma. \""
1007006-76 = "Você faz parecer que isso não é verdade."
1007006-77 = "[\"Estou me esforçando muito todos os dias coçando as algas para não afundar, sabe. \""
1007006-78 = "Eu gostaria de ver um quarto de cisne lá."
1007006-79 = "Mas você não precisa subestimá-lo tanto, não é mesmo? #n...... Não, não preciso."
1007006-84 = "Todos têm o coração de uma criança. Não importa quanto tempo passe, não importa a idade que tenhamos...'"
1007006-88 = "[ns] \"A razão pela qual você precisa se reconciliar consigo mesmo é porque essa é a única coisa possível a fazer. \""
1007006-89 = "'Quando o vento úmido começa a soprar, é tarde demais. Não temos escolha a não ser aceitá-lo'."
1007006-91 = "(Assim, de volta à placa de petri, conversando com Mina)"
