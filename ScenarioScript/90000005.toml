[translation]
90000005-1 = "Episódio 1: Prólogo"
90000005-3 = "Ah, Sensei. Obrigado por vir."
90000005-4 = "Desculpe pela pressa, mas é um assunto importante e não posso deixar que ninguém perceba. Tem alguém esperando pelo Sensei."
90000005-8 = "Por aqui."
90000005-12 = "Chefe, o Sensei [USERNAME] chegou."
90000005-17 = "Obrigada, Eimi. E... muito prazer, Sensei."
90000005-18 = "Meu nome é Himari. Sou a hacker genial aqui da Millennium Science School."
90000005-19 = "[s] \"Você mesma se chamou de 'genial'!?\""
90000005-20 = "Porque é um fato. Além disso, sou uma pessoa bastante famosa, então imagino que já deva ter ouvido rumores sobre mim pelo menos uma vez, não?"
90000005-21 = "Como a misteriosa e belíssima chefe da Veritas, ou como a própria definição de uma garota linda e frágil..."
90000005-22 = "Ou como a flor que desabrocha na Millennium... Você nunca ouviu pelo menos uma dessas?"
90000005-23 = "[s1] \"Acho que já ouvi algo parecido...\"\n[s2] \"Sim, talvez eu já tenha ouvido.\""
90000005-24 = "Ora... isso é..."
90000005-25 = "Não pode ser..."
90000005-26 = "……"
90000005-27 = "Fiquei deprimida. Sensei, assuma a responsabilidade e me console."
90000005-28 = "Ufa... parece que preciso trabalhar mais na minha imagem."
90000005-29 = "Então era isso mesmo. Fufu, fufufu..."
90000005-30 = "Fufufufufu..."
90000005-31 = "A chefe se empolgou demais... Sensei, assuma a responsabilidade e faça ela voltar ao normal."
90000005-32 = "Ora, esse comentário é ofensivo, Eimi."
90000005-33 = "Eu não me empolguei, apenas verifiquei que tudo está correndo bem através da confirmação dos fatos."
90000005-34 = "...De qualquer forma, fui nomeada recentemente como chefe do \"Departamento de Investigação de Fenômenos Singulares\"."
90000005-35 = "Deixei a Veritas, onde eu pertencia originalmente, totalmente aos cuidados da Chi-chan por enquanto."
90000005-36 = "[s] \"Departamento de Investigação de Fenômenos Singulares...\""
90000005-37 = "Sim, esse \"Departamento de Investigação de Fenômenos Singulares\" é uma organização especial criada pela presidente do conselho estudantil da Millennium, a Rio, mas, hum..."
90000005-38 = "Eimi, você poderia explicar?"
90000005-39 = "Um clube sob a tutela do Seminário, com o objetivo de rastrear e pesquisar fenômenos considerados cientificamente inexplicáveis."
90000005-40 = "Foi criado por ordem da Rio-senpai, mas até agora, a única integrante era eu. E não tínhamos nenhuma atividade definida."
90000005-41 = "Quem diria que eu seria nomeada subitamente como chefe de um clube tão suspeito criado pela Rio... e ainda por cima, com apenas uma integrante."
90000005-42 = "Com a chefe Himari, agora somos duas."
90000005-43 = "Sim, é verdade. A Eimi com seu estilo saudável e eu, a garota linda e frágil, seremos uma dupla incrível."
90000005-44 = "...Aliás, aqui,"
90000005-45 = "não está um pouco quente?"
90000005-49 = "Não. Para mim, ainda sinto até calafrios, então por favor, largue esse controle do ar-condicionado, Eimi."
90000005-53 = "Ei, pare de tirar a roupa também. O quê? Zíper? Do que você está... não, entendi. Por favor, pare imediatamente."
90000005-54 = "[s] \"No que eu deveria ajudar?\""
90000005-55 = "Ah, sim. Vamos entrar no assunto principal."
90000005-56 = "Talvez você saiba, mas... eu tenho estado em conflito com a \"Rio\", a presidente do conselho estudantil da Millennium, há muito tempo."
90000005-57 = "Ela, que quer controlar tudo como uma irmã mais velha, e eu, uma seguidora do copyleft que se opõe a todo tipo de controle, somos como água e óleo."
90000005-58 = "Se fôssemos usar a mesma água como exemplo, se a Rio fosse a água que corre no esgoto, eu seria uma água mineral pura e cristalina..."
90000005-59 = "Ou seria melhor dizer que ela é a água podre que flutua na fossa? Eu diria que sou um cristal de neve eterna."
90000005-60 = "Não, água suja, água de vala..."
90000005-61 = "Será que existe alguma expressão mais adequada..."
90000005-62 = "Chefe, o assunto principal."
90000005-63 = "Ah, é verdade. Bem, de qualquer forma, se fosse um pedido da Rio, eu pretendia recusar \"qualquer coisa\" e \"absolutamente\"..."
90000005-64 = "Mas, devido a circunstâncias um tanto complicadas, recebi um pedido que não pude recusar... e foi assim que acabei aceitando ser a chefe deste \"Departamento de Investigação de Fenômenos Singulares\"."
90000005-65 = "E para cumprir o conteúdo desse \"pedido\", a ajuda do \"Schale\" é indispensável."
90000005-66 = "Por causa disso, chamei o Sensei aqui hoje."
90000005-67 = "[s] \"E esse 'pedido' seria...?\""
90000005-71 = "……Decagrammaton."
90000005-72 = "Acredito que o Sensei também se lembre desse nome. Afinal, o primeiro contato com essa IA sem precedentes foi através do 'Schale', não foi?"
90000005-75 = "'Se pudermos pesquisar Deus e provar sua existência... poderemos analisar sua estrutura e reproduzi-la. Em suma, este é um método para criar um novo Deus...'"
90000005-76 = "Um sistema de análise autônomo anti-absoluto, criado com base nessa hipótese."
90000005-77 = "Em última análise, uma 'Inteligência Artificial que busca a divindade'."
90000005-79 = "Nós também investigamos bastante, mas... para começar, não conseguimos encontrar essa hipótese em lugar nenhum, exceto nos relatórios do Sensei."
90000005-80 = "O grupo chamado 'Gematria', mencionado nesses relatórios, também não teve sua existência confirmada até hoje."
90000005-81 = "Ou seja, havia elementos incertos e obscuros demais para avançar com a pesquisa baseando-se apenas nos relatórios do 'Schale'."
90000005-82 = "Isso não significa que estamos duvidando do Sensei. É apenas uma análise da situação atual."
90000005-83 = "Se eu duvidasse do Sensei, nem teria trazido você aqui."
90000005-84 = "Sim, exatamente. Na verdade, nós queremos a ajuda do Schale."
90000005-85 = "……Recentemente, houve um incidente em que o 'Hub', a unidade de comunicação de IA do Millennium, foi hackeado por uma IA desconhecida."
90000005-86 = "O 'Hub' é um mecanismo de computação de altíssimo desempenho que se desenvolveu junto com a história do Millennium Science School."
90000005-87 = "O cristal da tecnologia do Millennium... não seria exagero dizer que é uma de nossas obras-primas."
90000005-88 = "E ele conseguiu resistir ao hackeamento dessa IA misteriosa por apenas 0,00000031 segundos."
90000005-89 = "Eu, e também a Rio, acreditamos que a IA que realizou esse hackeamento seja o 'Decagrammaton'."
90000005-90 = "Claro, não é apenas um palpite; temos motivos concretos para isso."
90000005-96 = "Após o 'Hub' ser hackeado e a IA desaparecer, o seguinte texto apareceu na rede do Millennium."
90000005-98 = "Finalmente, encontrei o caminho que leva à providência."
90000005-100 = "Ah... meu caminho é a 'conclusão através da honra',"
90000005-102 = "Meu epíteto é 'a glória comprovada pelo brilho'..."
90000005-104 = "Meu nome é Hod."
90000005-106 = "Sou o oitavo profeta que prova o Deus da cruz sagrada e profetiza milagres."
90000005-110 = "A cruz sagrada... isso provavelmente se refere ao Decagrammaton."
90000005-111 = "A partir disso, podemos deduzir duas coisas."
90000005-112 = "Primeiro: o Decagrammaton entra em contato com IAs e as torna suas subordinadas... ou seja, 'profetas'."
90000005-113 = "A Rio vê isso como um tipo de hackeamento de módulo de personalidade, mas minha interpretação é diferente."
90000005-114 = "Eu vejo isso como uma 'lavagem cerebral'... ou, para ser mais precisa, ele está 'influenciando' a IA."
90000005-115 = "E segundo: como resultado, os profetas do Decagrammaton não se tornam o 'próprio Decagrammaton', mas agem como entidades independentes."
90000005-116 = "Isso pode ser lido pelo fato de ele se autoproclamar 'o profeta que prova o Deus da cruz sagrada'."
90000005-117 = "O Decagrammaton não 'controla' os profetas. Se fosse possível, seria muito mais simples transformar o alvo em 'si mesmo' ou em uma 'parte de si mesmo' para controlá-lo."
90000005-118 = "No entanto, na prática, não é assim; ele 'influencia' os profetas e faz com que cada um aja de forma autônoma."
90000005-119 = "Por que ele adotaria um método tão ineficiente e irracional...?"
90000005-120 = "Precisamos investigar isso, incluindo esses detalhes."
90000005-126 = "Sensei. Para a análise de pesquisa do 'Decagrammaton'... você poderia emprestar sua força ao 'Departamento de Investigação de Fenômenos Estranhos'?"
90000005-128 = "Próximo episódio: 'Coleta de dados (1) Deserto de Abydos'"
