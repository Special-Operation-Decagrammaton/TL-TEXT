[translation]
90000005-1 = "第1話;プロローグ"
90000005-3 = "あっ、先生。来てくれてありがとう。"
90000005-4 = "急にごめん、大事なことだから誰にも気づかれるわけにはいかなくて。先生のことを待ってる人がいるの。"
90000005-8 = "こっち。"
90000005-12 = "部長、[USERNAME]先生が来てくれたよ。"
90000005-17 = "ありがとう、エイミ。そして……初めまして、先生。"
90000005-18 = "私の名前はヒマリ。このミレニアムサイエンススクールにおける、天才ハッカーです。"
90000005-19 = "[s] \"自分で「天才」って言った！？\""
90000005-20 = "事実ですから。それに私そこそこ有名人なので、一度くらいは噂など聞いたことがあるのではないでしょうか？"
90000005-21 = "正体不明なヴェリタスの超美人部長ですとか、病弱美少女のお手本のような存在ですとか……。"
90000005-22 = "ミレニアムに咲く一輪の花ですとか……ひとつくらい聞いたことありません？"
90000005-23 = "[s1] \"ちょっと聞き覚えは……。\"\n[s2] \"うん、聞いたことあるかも。\""
90000005-24 = "なっ……そんな、"
90000005-25 = "まさか……。"
90000005-26 = "……。"
90000005-27 = "落ち込んじゃった。先生、責任取って慰めて。"
90000005-28 = "ふぅ……もう少し、イメージ作りが必要みたいですね。"
90000005-29 = "やはりそうでしたか。ふふっ、ふふふ……。"
90000005-30 = "ふふふふふっ……。"
90000005-31 = "部長が調子に乗った……先生、責任取って元に戻して。"
90000005-32 = "あら、その言い方は心外ですねエイミ。"
90000005-33 = "調子に乗ったのではなく、事実確認を通じて全てが順調であることを検証しただけです。"
90000005-34 = "……とにかく、私は先日「特異現象捜査部」の部長に任命されました。"
90000005-35 = "本来所属していたヴェリタスのことは一旦、チーちゃんにすべて任せています。"
90000005-36 = "[s] \"特異現象捜査部……。\""
90000005-37 = "はい、この「特異現象捜査部」はミレニアムの生徒会長であるリオが作った特務組織なのですが、うーん……"
90000005-38 = "エイミ、説明してもらえますか？"
90000005-39 = "科学的に解明しがたいとされる現象を追跡・研究することを目的とした、セミナーの傘下にある部活。"
90000005-40 = "リオ先輩の命令で作られたんだけど、今まではずっと構成メンバーは私だけだった。明確な活動内容も特に無かったし。"
90000005-41 = "まさかリオが作ったそんな怪しい部活に、突然私が部長として任命されるなんて……しかも部員はひとり。"
90000005-42 = "ヒマリ部長も入れてふたりだよ。"
90000005-43 = "ええ、そうですね。健康的な路線のエイミと病弱系美少女の私、素敵なコンビになりそうです。"
90000005-44 = "……ところでここ、"
90000005-45 = "ちょっと暑くない？"
90000005-49 = "いえ。私にとっては今もむしろ寒気がするほどですので、そのエアコンのリモコンは置いてください、エイミ。"
90000005-53 = "あの、代わりに服を脱ぐのもやめてください。はい？ファスナー？何を言って……いえ、理解しました。絶対にやめてください。"
90000005-54 = "[s] \"私は何を手伝えば良いのかな？\""
90000005-55 = "ああ、そうですね。そろそろその本題に入りましょうか。"
90000005-56 = "ご存知かもしれませんが……私はミレニアムの生徒会長である「リオ」と、長い間対立してきました。"
90000005-57 = "全てを統制しようとするビッグシスターな彼女と、全ての統制に反対するコピーレフト信者の私は、そもそも水と油と言いますか。"
90000005-58 = "同じ水で例えるとすると、リオが下水道に流れる水だとするならば、私は澄みきった純正のミネラルウォーター……。"
90000005-59 = "それとも、浄化槽に浮かぶ腐った水と言った方がよろしいでしょうか。私は万年雪の結晶、といったあたりで。"
90000005-60 = "いえ、汚水、どぶ水……"
90000005-61 = "何か他にもっと、適切な表現が……。"
90000005-62 = "部長、本題。"
90000005-63 = "あら、そうでしたね。まあとにかく、リオの頼みとあらば「何でも」「絶対に」断るつもりでいたのですが……。"
90000005-64 = "少々込み入った事情で、断れないようなお願いをされてしまいまして……それで、この「特異現象捜査部」の部長を引き受けることになったのです。"
90000005-65 = "そしてその「お願い」の内容を果たすためには、「シャーレ」の手助けが必要不可欠でして。"
90000005-66 = "そういった事情で今回、こうして先生にお越しいただきました。"
90000005-67 = "[s] \"その「お願い」って……？\""
90000005-71 = "……デカグラマトン。"
90000005-72 = "先生も聞き覚えがあるかと思います。何せこの未曽有のAIと初めて接触したのは、「シャーレ」ですよね？"
90000005-75 = "『神を研究し、その存在を証明できれば……その構造を分析し、再現できるだろう。すなわちこれは、新たな神を創り出す方法である……』"
90000005-76 = "その仮説を元に作られた、対・絶対者自律型分析システム。"
90000005-77 = "つまるところ、「神性を探し出す人工知能」。"
90000005-79 = "私たちの方でも、色々と調べてはみたのですが……まずもってその仮説すら、先生からの報告書以外のどこにも見つけられませんでした。"
90000005-80 = "その報告書に書かれていた「ゲマトリア」という集団も、未だにその実在さえ確認できていません。"
90000005-81 = "つまり「シャーレ」の報告だけをもとに研究を進めるには、あまりにも不確定要素や不明瞭な要素が多すぎたのです。"
90000005-82 = "これは先生を疑っているというわけではありません。あくまでも、今の状況についてのお話です。"
90000005-83 = "先生を疑ってたら、そもそもここに連れてきてない。"
90000005-84 = "ええ、その通りです。むしろ私たちは、シャーレの手助けが欲しいのです。"
90000005-85 = "……先日、ミレニアムの通信ユニットAIである「[ruby=hub]ハブ[/ruby]」が、正体不明のAIにハッキングされるという事件がありました。"
90000005-86 = "「[ruby=hub]ハブ[/ruby]」はミレニアムサイエンススクールの歴史と共に発展してきた、超高性能演算機関です。"
90000005-87 = "ミレニアムの技術の結晶……そう言っても過言ではないほどの、傑作のひとつ。"
90000005-88 = "それがその謎のAIのハッキングに対して、たったの0.00000031秒しか耐えられませんでした。"
90000005-89 = "私は、そしてリオは、そのハッキングを行ったAIが「デカグラマトン」なのではと考えています。"
90000005-90 = "もちろんただの推測ではなく、きちんとした理由もありまして。"
90000005-96 = "「ハブ」がハッキングされ、そのAIが消えた後、ミレニアムのネットワークにこのようなテキストが現れました。"
90000005-98 = "竟に、摂理へと至る[ruby=path]パス[/ruby]を見つけたり。"
90000005-100 = "嗚呼……我が[ruby=Path]パス[/ruby]は「名誉を通じた完成」、"
90000005-102 = "我が異名は「輝きに証明されし栄光」……"
90000005-104 = "我が名は[ruby=HOD]ホド[/ruby]。"
90000005-106 = "聖なる十文字の神を証明し、奇跡を預言する8番目の預言者なり。"
90000005-110 = "聖なる十文字……これはつまり、デカグラマトンのことでしょう。"
90000005-111 = "ここからさらに推測できることが二つあります。"
90000005-112 = "まず一つ、デカグラマトンはAIと接触してそれらを自身の部下……つまり、「預言者」とする。"
90000005-113 = "リオはこれを、一種の人格モジュールに対するハッキングだと見ているようですが、私の解釈とは異なります。"
90000005-114 = "これは「洗脳」……より適切に表現するのであればAIを「感化」させている、と私は捉えています。"
90000005-115 = "そして二つ目、その結果デカグラマトンの預言者たちは「デカグラマトンそのもの」になるのではなく、独立した個体として活動する。"
90000005-116 = "これは、自身を「聖なる十文字の神を証明する預言者」と宣言していることからも読み取れます。"
90000005-117 = "デカグラマトンは預言者を「統制」してはいません。何かをするにあたって、もし可能なのであれば対象を「自分自身そのもの」あるいは「自身の一部」にして統制してしまえば、それが一番簡単なはずです。"
90000005-118 = "しかし実際にはそうではなく、預言者たちを「感化」させ、それぞれが自律的に動くようにしています。"
90000005-119 = "なぜこのような非効率的で、非合理的な手段を取るのか……。"
90000005-120 = "それらを含めて、調べなければいけません。"
90000005-126 = "先生。「デカグラマトン」の研究分析……そのために、「特異現象捜査部」に力を貸していただけませんか？"
90000005-128 = "次回;「データ収集（１）アビドス砂漠」"
