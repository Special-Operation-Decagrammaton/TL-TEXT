[translation]
10000085-2 = "ぐあっ！"
10000085-3 = "こ、こんなの手に負えないっす！"
10000085-8 = "会長として、使える限りの資金をすべて使って動員した魑魅一座がこんなことに……！"
10000085-9 = "まだ、まだ足りないだと……？"
10000085-10 = "先生の指揮もあるし、今の私たちならいくらでもお相手できますよ！"
10000085-11 = "これがワタシたちの力！デス！"
10000085-13 = "[ns] \"私たちの勝ち、かな？\""
10000085-14 = "……ふふっ、参ったな。"
10000085-15 = "儂の数年を賭した計画が……たかが学生と、先生ごときのせいで失敗させられるだと？"
10000085-16 = "認められない……"
10000085-18 = "認めてなるものか！"
10000085-19 = "大人しく諦めてください、ニャン天丸会長。名残惜しかろうと、もう全て終わりです。"
10000085-20 = "ふふふ……まだだ、まだ終わっていない！"
10000085-21 = "儂の資金をすべて使ったんだぞ。その魑魅一座が本当に、これで全部だとでも思ったか？"
10000085-22 = "……まさか。"
10000085-23 = "まだまだいるということですか……！？"
10000085-24 = "その通り、会長の資金力を甘く見るな！"
10000085-25 = "さあ！まだこの街に残っている、すべての魑魅一座をここに集めよ！"
10000085-27 = "大量の魑魅一座……文字通り魑魅魍魎を、その目に焼き付けるがいい！！これで今度こそ――"
10000085-29 = "あー、その件なんだけど……。"
10000085-30 = "実は元々は来るはずだった子たちが、ほとんど「やっぱりパス」って……。"
10000085-31 = "「ここで働くより百夜ノ春ノ桜花祭を楽しみたい」って言って、みんな遊びに行っちゃったんで、もうこれ以上はほぼいないっす。"
10000085-35 = "……"
10000085-36 = "……"
10000085-37 = "……"
10000085-38 = "……"
10000085-39 = "……眠い。"
10000085-40 = "えっと、これって……。"
10000085-41 = "もうダメかもしんないっすね。"
10000085-42 = "……うん、よし！解散！"
10000085-44 = "あっ！？ここで逃げるのとかズルでしょ！？"
10000085-45 = "待て～。"
10000085-47 = "……。"
10000085-50 = "（シュババッ！）"
10000085-51 = "えっと、その、だな……諸君、全部水に流すというのは……どうだろう？"
10000085-52 = "んなことできるかあぁぁっっ！シズコ[ruby=マジギレ]本気の[/ruby]看板娘パーーンチ！"
