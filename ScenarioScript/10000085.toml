[translation]
10000085-2 = "Argh!"
10000085-3 = "I-isso é impossível de lidar!"
10000085-8 = "Como presidente, usei todos os fundos disponíveis para mobilizar a Trupe Chimichanga, e mesmo assim, isso aconteceu...!"
10000085-9 = "Ainda não... ainda não é o suficiente...?"
10000085-10 = "Com o comando do Sensei, agora podemos enfrentar qualquer um!"
10000085-11 = "Este é o nosso poder! Desu!"
10000085-13 = "[ns] \"Nossa vitória, eu diria?\""
10000085-14 = "……Hehe, que derrota."
10000085-15 = "Meu plano, no qual apostei anos da minha vida... arruinado por meras estudantes e um Sensei qualquer?"
10000085-16 = "Eu não aceito..."
10000085-18 = "Eu não vou aceitar isso!"
10000085-19 = "Por favor, desista pacificamente, Presidente Nyantenmaru. Por mais que seja difícil, tudo acabou."
10000085-20 = "Hahaha... ainda não, ainda não acabou!"
10000085-21 = "Eu usei todos os meus fundos, sabe. Você realmente achou que a Trupe Chimichanga terminava aqui?"
10000085-22 = "……Não pode ser."
10000085-23 = "Você quer dizer que ainda tem mais...!?"
10000085-24 = "Exatamente, não subestime o poder financeiro do presidente!"
10000085-25 = "Vamos! Reúnam todos os membros da Trupe Chimichanga que ainda restam nesta cidade!"
10000085-27 = "Contemplem com seus próprios olhos uma horda da Trupe Chimichanga... literalmente, demônios e espíritos!! Desta vez, com certeza—"
10000085-29 = "Ah, sobre isso..."
10000085-30 = "Na verdade, a maioria das garotas que deveriam vir acabou desistindo..."
10000085-31 = "Elas disseram que preferiam aproveitar o Festival das Flores de Primavera de Hyakkiyako em vez de trabalhar aqui, então foram todas se divertir. Não tem quase mais ninguém."
10000085-35 = "……"
10000085-36 = "……"
10000085-37 = "……"
10000085-38 = "……"
10000085-39 = "……Estou com sono."
10000085-40 = "Bem, isso é..."
10000085-41 = "Acho que não tem mais jeito."
10000085-42 = "……Certo, beleza! Dispensadas!"
10000085-44 = "Ah!? Fugir agora é trapaça, sabia!?"
10000085-45 = "Volta aqui!"
10000085-47 = "……."
10000085-50 = "（Vupt!）"
10000085-51 = "Bem, é que... pessoal, que tal se a gente esquecer tudo o que aconteceu?"
10000085-52 = "Como se eu fosse deixar isso passar! Receba o soco da atendente furiosa da Shizuko!"
