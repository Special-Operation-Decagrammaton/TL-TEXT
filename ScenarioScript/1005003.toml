[translation]
1005003-1 = "子どもではありません。レディーなんです！"
1005003-2 = "山海経訓育支援部・梅花園"
1005003-3 = "（山海経での仕事を終えて帰る途中、ココナに会った）"
1005003-4 = "あっ、こんにちは。先生！"
1005003-5 = "シャーレに帰るところですか？ちょうど私もそちらに行くところでした。"
1005003-6 = "シュン姉さんがシャーレの近くで用事があると聞きまして。"
1005003-7 = "お姉さんを迎えに行こうとしていたんです。"
1005003-8 = "……せっかくですし、先生にチャンスをあげましょう。"
1005003-9 = "それは……レディーである私をエスコートするチャンスです。えへん！"
1005003-10 = "[s1] \"ココナちゃんのエスコートか……確かに貴重なチャンスだね。\"\n[s2] \"私がココナちゃんのエスコートを？光栄だね。\""
1005003-11 = "だーかーらー！ココナちゃんじゃないんですってば！"
1005003-12 = "だーかーらー！ココナちゃんじゃないんですってば！"
1005003-13 = "うぅ……今は私たち二人しかいないから、我慢してあげてるんですからね？"
1005003-15 = "（その後もココナと楽しく話しながら、市内まで歩いていった）"
1005003-17 = "夜の街"
1005003-18 = "そういえば、先ほどコーヒーを買ってましたよね？"
1005003-19 = "大人はみんなコーヒーを飲んでいますが……美味しいんですか？"
1005003-20 = "[s3] \"……おいしくて飲むというより、生きるために飲むというか……\"\n[s4] \"大人の味ってやつだね、うん。\""
1005003-21 = "よく分からないけど……毎日のように何杯も飲んでいるのを見ると。"
1005003-22 = "よく分からないけど……毎日のように何杯も飲んでいるのを見ると。"
1005003-23 = "きっと……そこには抗えない魅力があるのでしょう。"
1005003-24 = "[s] \"ちょっとだけ飲んでみる？大人の味。\""
1005003-25 = "……もちろんです。私は立派なレディーですよ！"
1005003-26 = "先生が笑っていらっしゃるのが少し気にかかりますが……"
1005003-27 = "いいでしょう。コーヒーぐらい、私には何でもないですから！"
1005003-28 = "（ココナにコーヒーを渡した）"
1005003-29 = "これが……コーヒー……"
1005003-30 = "黒いですね……夜空よりもっと黒いような。"
1005003-31 = "それに熱いです。"
1005003-32 = "あちち、手がやけどしちゃいそうです……"
1005003-33 = "この匂いは何でしょう？何か、焦げたような香りが混ざっているような……"
1005003-34 = "本当にこれ、飲んで大丈夫なんですよね？"
1005003-35 = "[s5] \"無理に飲まなくてもいいんだよ。\"\n[s6] \"ココナちゃんにはまだ早かったかもしれないね。\""
1005003-36 = "な、何を！"
1005003-37 = "な、何を！"
1005003-38 = "私はだから、その、ただ……"
1005003-39 = "そう！香りを吟味していただけですよ！"
1005003-40 = "[s] \"焦げた匂いがするって言ってなかった？\""
1005003-41 = "焦げた匂いが混ざっていると言っても、この香りが嫌だとは言ってません。"
1005003-42 = "そもそもこれくらい飲めないのに……一人前の教官とは言えないじゃないですか。"
1005003-43 = "[s] \"教官とは関係ないと思うけど……\""
1005003-44 = "と、とにかく、私がそうだと言ったらそうなのです！"
1005003-45 = "少なくとも自分にとっては、ですね……"
1005003-46 = "そ、それでは飲みますね。"
1005003-47 = "3、2、1……！"
1005003-51 = "（ココナは一気にコーヒーを飲んだ）"
1005003-52 = "（そういう風に飲むものではないと止める間もなかった）"
1005003-53 = "はぁ……うう……"
1005003-54 = "[s] \"ココナちゃん大丈夫？\""
1005003-55 = "苦い……です……"
1005003-56 = "ふええん……何ですかこれは。#nきつくて、苦くて、まずくて……"
1005003-57 = "大人はなんでこんなものを飲むんですか？"
1005003-58 = "みんな辛いことを楽しんでるんですか？#n変態なんですか？"
1005003-59 = "大人の味って、変態の味だったんですか？！"
1005003-60 = "[s7] \"いや、そこまでは……\"\n[s8] \"ある意味合ってる気もするけど！？\""
1005003-61 = "ふぇん……わかりません。#n私はやっぱりアイスが好きです。"
1005003-62 = "ふぇん……わかりません。#n私はやっぱりアイスが好きです。"
1005003-63 = "でもアイスは大人も好きじゃないですか？"
1005003-64 = "それならアイスも大人の味と言えるのではないでしょうか？"
1005003-65 = "早くそうだと言ってください、先生。"
1005003-66 = "え？コーヒーもアイスクリームも楽しめるのが大人……？"
1005003-67 = "ふえん……そんなの知りません。#nわからないんですよ……"
1005003-69 = "（その後、泣きべそになったココナを宥めながらシャーレに戻った）"
