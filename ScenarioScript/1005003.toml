[translation]
1005003-1 = "Eu não sou uma criança. Eu sou uma dama!"
1005003-2 = "Departamento de Apoio Educacional de Shanhaijing - Jardim das Ameixeiras"
1005003-3 = "（No caminho de volta após terminar o trabalho em Shanhaijing, encontrei Kokona）"
1005003-4 = "Ah, olá. Sensei!"
1005003-5 = "Está voltando para o Schale? Eu estava indo exatamente para lá também."
1005003-6 = "Ouvi dizer que a Shun-nee-san tinha assuntos para tratar perto do Schale."
1005003-7 = "Eu estava indo buscá-la."
1005003-8 = "……Já que estamos aqui, vou te dar uma chance, Sensei."
1005003-9 = "É a chance de escoltar uma dama como eu. Ehem!"
1005003-10 = "[s1] \"Escoltar a Kokona-chan... É uma chance valiosa, com certeza.\"\n[s2] \"Eu escoltar a Kokona-chan? Que honra.\""
1005003-11 = "Eu já disse, não me chame de Kokona-chan!"
1005003-12 = "Eu já disse, não me chame de Kokona-chan!"
1005003-13 = "Ugh... Como só estamos nós dois agora, vou deixar passar, viu?"
1005003-15 = "（Depois disso, continuamos caminhando até a cidade enquanto conversávamos alegremente）"
1005003-17 = "Ruas à noite"
1005003-18 = "Falando nisso, você comprou um café agora pouco, não foi?"
1005003-19 = "Todos os adultos bebem café, mas... é gostoso?"
1005003-20 = "[s3] \"...Não é que eu beba porque é gostoso, é mais por uma questão de sobrevivência...\"\n[s4] \"É o que chamam de sabor de adulto, sabe?\""
1005003-21 = "Não entendo muito bem... mas vendo vocês beberem várias xícaras quase todo dia."
1005003-22 = "Não entendo muito bem... mas vendo vocês beberem várias xícaras quase todo dia."
1005003-23 = "Com certeza... deve haver um charme irresistível nisso."
1005003-24 = "[s] \"Quer provar um pouquinho? O sabor de adulto.\""
1005003-25 = "……Claro. Eu sou uma dama exemplar!"
1005003-26 = "O fato de você estar rindo me preocupa um pouco, mas..."
1005003-27 = "Tudo bem. Um café não é nada para mim!"
1005003-28 = "（Entreguei o café para Kokona）"
1005003-29 = "Isso é... café..."
1005003-30 = "É preto... parece ser mais escuro que o céu noturno."
1005003-31 = "E está quente."
1005003-32 = "Ai, ai, parece que vou queimar minha mão..."
1005003-33 = "Que cheiro é esse? Parece que tem um aroma de algo queimado misturado..."
1005003-34 = "Tem certeza de que é seguro beber isso?"
1005003-35 = "[s5] \"Não precisa se forçar a beber, sabe?\"\n[s6] \"Talvez ainda seja cedo demais para a Kokona-chan.\""
1005003-36 = "O-o que você disse!"
1005003-37 = "O-o que você disse!"
1005003-38 = "Eu só estava, bem, apenas..."
1005003-39 = "Isso! Eu só estava apreciando o aroma!"
1005003-40 = "[s] \"Você não disse que tinha cheiro de queimado?\""
1005003-41 = "Mesmo que tenha um cheiro de queimado, não quer dizer que eu não goste desse aroma."
1005003-42 = "Além disso, se eu não conseguir beber nem isso... não posso ser considerada uma instrutora de verdade, não é?"
1005003-43 = "[s] \"Acho que não tem relação com ser instrutora...\""
1005003-44 = "De qualquer forma, se eu disse que é assim, então é assim!"
1005003-45 = "Pelo menos para mim, é..."
1005003-46 = "B-bem, então eu vou beber."
1005003-47 = "3, 2, 1...!"
1005003-51 = "（Kokona bebeu o café de uma vez só）"
1005003-52 = "（Não tive tempo nem de impedi-la, dizendo que não se bebe daquele jeito）"
1005003-53 = "Haa... ugh..."
1005003-54 = "[s] \"Kokona-chan, você está bem?\""
1005003-55 = "É... amargo..."
1005003-56 = "Buááá... O que é isso?#nÉ forte, amargo e ruim..."
1005003-57 = "Por que os adultos bebem esse tipo de coisa?"
1005003-58 = "Todo mundo gosta de sofrer?#nVocês são pervertidos?"
1005003-59 = "Então o gosto de adulto é, na verdade, gosto de pervertido?!"
1005003-60 = "[s7] \"Não, não chega a tanto...\"\n[s8] \"De certa forma, sinto que você tem razão!?\""
1005003-61 = "Buááá... Não sei.#nEu ainda prefiro sorvete."
1005003-62 = "Buááá... Não sei.#nEu ainda prefiro sorvete."
1005003-63 = "Mas os adultos também não gostam de sorvete?"
1005003-64 = "Nesse caso, o sorvete também não poderia ser considerado um gosto de adulto?"
1005003-65 = "Diga logo que sim, Sensei."
1005003-66 = "Hã? Ser adulto é poder aproveitar tanto o café quanto o sorvete...?"
1005003-67 = "Buááá... Eu não sei disso.#nEu não entendo..."
1005003-69 = "(Depois disso, voltei para o Schale enquanto consolava Kokona, que estava prestes a chorar)"
