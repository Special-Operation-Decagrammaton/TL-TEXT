[translation]
1012606-1 = "Isso... não sou eu"
1012606-4 = "(Por enquanto, saí do escritório para o trabalho de hoje.)"
1012606-5 = "Miau... miau..."
1012606-6 = "Gaa! Gaa!"
1012606-7 = "[ns] \"...Gato preto e corvo?\""
1012606-13 = "[ns] \"...!?\""
1012606-14 = "Eu... ei... ei..."
1012606-15 = "[ns1] (...a aura mais que o normal!)\n[ns2] (Como me disseram, tenho que ignorar...!)"
1012606-21 = "Miau! Nyaoooo!"
1012606-25 = "……."
1012606-26 = "[ns] \"O que...!?\""
1012606-30 = "Gaa! Gaa!"
1012606-33 = "……."
1012606-34 = "[ns] \"Aqui também!?\""
1012606-38 = "……."
1012606-39 = "[ns] \"Por quê!?\""
1012606-41 = "(...Não importa onde eu vá, Kanoe está à minha vista)"
1012606-45 = "(Embora o trabalho tenha sido concluído conforme planejado...)"
1012606-60 = "(Kanoe sempre estava lá em todos os lugares que eu ia...)"
1012606-63 = "[ns] \"Haa, haa....\""
1012606-64 = "Ah, você está aqui, senhor. #nEu gostaria de saber sobre seus planos para hoje."
1012606-65 = "Estou sem fôlego, mas não preciso ter tanta pressa..."
1012606-66 = "[s] \"Isso é...\""
1012606-68 = "(Explique o que aconteceu até agora)"
1012606-70 = "Kanoe...? ItagakiVocê quer dizer Kanoe? #nA própria existência é oculta, né?"
1012606-71 = "[s] \"O que você quer dizer...?\""
1012606-72 = "Aquela criança não está sempre com gatos pretos e corvos?"
1012606-73 = "Ele parece estar dizendo que não a conhece...#nNão importa o que você pense sobre isso, é estranho, não é?"
1012606-74 = "(...Certamente, os gatos e corvos estavam ouvindo o que Kanoe tinha a dizer.)"
1012606-75 = "Minhas mãos estão frias e minha pele está pálida..."
1012606-76 = "Além do mais, ele tem um número incomum de vozes e há rumores de que não é possível dizer qual é a voz real."
1012606-78 = "(Kanoe me pregou uma peça várias vezes, então é difícil negar...)"
1012606-80 = "Talvez aquele garoto... talvez ele seja um fantasma."
1012606-81 = "Ele ainda está nos observando em algum lugar...!"
1012606-82 = "[ns] \"...!\""
1012606-89 = "(Fiquei surpreso e olhei em volta, mas não consegui encontrar Kanoe.)"
1012606-90 = "...Oh meu Deus. #nMesmo eu tendo dito isso, há muitas pessoas excêntricas na minha academia."
1012606-91 = "Pode ser apenas uma brincadeira, então, por favor, não leve isso muito a sério."
1012606-92 = "Também estamos respondendo adequadamente."
1012606-93 = "[s] \"Ah, isso mesmo? Haha...\""
1012606-95 = "(Terminei meu trabalho rapidamente e voltei para o escritório)"
1012606-96 = "(no dia seguinte……)"
1012606-99 = "(De Kanoé)"
1012606-100 = "(Se bem me lembro, entrarei em contato com você quando for seguro...)"
1012606-105 = "Professora...está tudo bem ontem...?"
1012606-106 = "Está tudo bem agora, então você pode continuar como sempre..."
1012606-107 = "[s3] \"O que foi aquilo ontem?\"\n[s4] \"Não importa onde eu fosse, Kanoe estava lá...\""
1012606-110 = "Em primeiro lugar, deixe-me pedir desculpas...."
1012606-111 = "Tudo o que aconteceu ontem foi minha culpa. Desculpe."
1012606-112 = "Era para ser um ritual perfeito, mas falhou..."
1012606-113 = "[s] \"Cerimônia de Gi...?\""
1012606-114 = "É um ritual para invocar espíritos malignos."
1012606-115 = "Mas eu falhei...#nEm troca disso, eu  invoquei um ser que se parecia comigo."
1012606-116 = "Como tínhamos a mesma personalidade... comecei imediatamente a procurar um sensei."
1012606-117 = "[s] \"Então, e Kanoe que eu assisti ontem...?\""
1012606-118 = "sim. Eles são todos demônios como eu."
1012606-119 = "Mas não se preocupe. Agora, eu a devolvi ao seu ``local de origem''..."
1012606-120 = "[s5] \"Era mesmo um espírito maligno?\"\n[s6] \"Não a própria Kanoe...?\""
1012606-123 = "Sim……. Ele queria observar de longe o sensei que estava ocupado com o trabalho."
1012606-124 = "Não é como se eu estivesse preocupado em usar a permissão que trabalhei tanto para sair de casa de uma forma significativa..."
1012606-125 = "[s] \"Definitivamente é a própria Kanoe!?\""
1012606-126 = "Vou deixar para você interpretar. #nEu expliquei corretamente que era uma compensação por falhar no ritual...?"
1012606-127 = "Ei, ei...."
1012606-132 = "(...Qual era a verdadeira identidade de Kanoe que vi ontem?)"

1012606-133 = "(No final, a verdade deste dia se dissolveu nas trevas...)"
1012606-134 = "Ei..."
1012606-135 = "Ihihihihi...!"
