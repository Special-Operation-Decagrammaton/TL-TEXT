[translation]
1001706-1 = "O Assassino das Planícies Nevadas"
1001706-2 = "Academia Federal Red Winter - Pátio"
1001706-3 = "Pá!"
1001706-4 = "Assim que cheguei à Academia Federal Red Winter após receber a mensagem de Cherino, uma bola de neve voou do nada e acertou em cheio a minha nuca."
1001706-5 = "Hahaha, você baixou a guarda, camarada!"
1001706-6 = "O mundo da guerra de bolas de neve é impiedoso! Se você andar pelas planícies nevadas tão distraído assim, vai acabar encharcado antes mesmo da neve parar de cair!"
1001706-7 = "Já que começou a nevar, é melhor considerar tudo ao redor como um campo de batalha, fu-hahaha!"
1001706-8 = "Dito isso, bem. O que vamos brincar agora?"
1001706-9 = "[s1] \"Vamos fazer uma guerra de bolas de neve.\"\n[s2] \"Vamos fazer um boneco de neve.\""
1001706-10 = "Hum, você quer me desafiar, eu, que possuo o apelido de \"Assassino das Planícies Nevadas\", em uma guerra de bolas de neve?"
1001706-11 = "Que escolha imprudente, camarada! Tudo bem. Mas antes, que tal aquecermos o corpo fazendo um boneco de neve?"
1001706-12 = "Boa ideia, camarada!"
1001706-13 = "Pois é, já que vamos fazer, que seja um boneco de neve que deixe todos na Academia Federal Red Winter admirados...!"
1001706-14 = "Muito bem, então vamos começar!"
1001706-18 = "[wa:50]― Vamos fazer um [wa:710]boneco de neve com bigode!"
1001706-20 = "― Vamos fazer o [wa:570]maior boneco de neve do [wa:1440]mundo, [wa:590]camarada!"
1001706-23 = "― ...Ai!?"
1001706-26 = "― Ué, [wa:930]você jogou?"
1001706-28 = "― Muito bem, [wa:830]eu aceito [wa:930]esse desafio, [wa:770]camarada!"
1001706-31 = "[wa:450]― Ahahahaha!"
1001706-34 = "― ...Hum, [wa:1050]ainda não está bom o suficiente!"
1001706-36 = "― Vamos fazer [wa:790]ainda [wa:460]maior!"
1001706-39 = "[wa:550]― A, [wa:870]atchim! [wa:2890]...Snif."
1001706-42 = "[wa:1180]― Ei, [wa:450]não se importe! [wa:760]Estou concentrada agora!"
1001706-45 = "[wa:1190]― Se estou com frio... [wa:820]o quê? [wa:810]Você é fraco, [wa:890]camarada!"
1001706-48 = "― Eu não sinto [wa:820]nada com isso!"
1001706-50 = "― Ainda temos [wa:940]mais 3 horas de brincadeira!"
1001706-53 = "[wa:700]― Tive uma [wa:470]boa ideia,"
1001706-55 = "― Camarada, faça um boneco de neve [wa:790]aí!"
1001706-58 = "― E o que eu fiz aqui,"
1001706-60 = "― Vamos colocar ao lado dele!"
1001706-63 = "― Hã? [wa:860]Por quê? [wa:1200]Não acha uma boa ideia?"
1001706-66 = "― ...[wa:200]Entre os dois,"
1001706-68 = "― Vamos fazer um [wa:1120]boneco de neve pequeno também..."
1001706-71 = "― Ah, [wa:480]c- [wa:340]claro,"
1001706-73 = "― Se estiver tudo bem para você, camarada!?"
1001706-76 = "Olhe, camarada!#nO meu boneco de neve está pronto!"
1001706-77 = "Até o ângulo do bigode está perfeito, esse nível de acabamento... estou satisfeita!"
1001706-78 = "Como está o seu boneco de neve, camarada? Deixe-me ver."
1001706-79 = "Vejamos..."
1001706-82 = "Uau!"
1001706-87 = "De novo jogando uma bola de neve do nada... pretende cometer um ato de rebeldia, camarada!"
1001706-88 = "O quê? O mundo da guerra de bolas de neve é impiedoso?"
1001706-89 = "Fufufu..."
1001706-91 = "É verdade. Aproveitar que eu baixei a guarda para começar uma guerra de bolas de neve, você é um estrategista e tanto!"
1001706-92 = "Desta vez eu não vou pegar leve, camarada!"
1001706-94 = "Depois disso, passei um tempo divertido brincando de guerra de bolas de neve com a Cherino."
