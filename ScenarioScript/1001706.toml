[translation]
1001706-1 = "雪原の暗殺者"
1001706-2 = "レッドウィンター連邦学園・グラウンド"
1001706-3 = "ドカッ！"
1001706-4 = "チェリノのメッセージを受け取って、レッドウィンター連邦学園に着いた途端。どこからか飛んできた雪玉が後頭部を直撃した。"
1001706-5 = "ははは、油断したな。カムラッド！"
1001706-6 = "雪合戦の世界は冷酷なもの！そんな油断した姿で雪原を歩いていたら、雪が止む頃には全身ずぶ濡れになってしまうぞ！"
1001706-7 = "雪が降った以上、この辺りはすべて戦場だと思った方がいい、ふははは！"
1001706-8 = "ということで、さて。これから何をして遊ぼうか？"
1001706-9 = "[s1] \"雪合戦しよっか。\"\n[s2] \"雪だるま作ろっか。\""
1001706-10 = "ふむ、「雪原の暗殺者」という異名を持つこのおいらを相手に、雪合戦で勝負をしようというのか？"
1001706-11 = "無謀な選択だな、カムラッド！良いだろう。ではその前にまず、雪だるまでも作りながら体を温めるとしようか。"
1001706-12 = "良い案だ、カムラッド！"
1001706-13 = "そうだな、どうせならレッドウィンター連邦学園の誰もが見惚れるような雪だるまを……！"
1001706-14 = "よし、では始めるとしよう！"
1001706-18 = "[wa:50]― 髭の付いた[wa:710]雪だるまを作ろう！"
1001706-20 = "― 世界で[wa:570]一番大きい雪だるまに[wa:1440]しようじゃないか、[wa:590]カムラッド！"
1001706-23 = "― ……いたっ！？"
1001706-26 = "― うっ、[wa:930]やったなー？"
1001706-28 = "― よーし、[wa:830]その挑戦、[wa:930]受けて立つぞ[wa:770]カムラッド！"
1001706-31 = "[wa:450]― あはははは！"
1001706-34 = "― ……うん、[wa:1050]まだ足りないな！"
1001706-36 = "― もっと[wa:790]もーっと[wa:460]大きくしよう！"
1001706-39 = "[wa:550]― は、[wa:870]はっくしょん！[wa:2890]……くすん。"
1001706-42 = "[wa:1180]― ええいっ、[wa:450]構うな！[wa:760]今は集中しているんだ！"
1001706-45 = "[wa:1190]― 寒くないか……[wa:820]って？[wa:810]ひ弱だな、[wa:890]カムラッド！"
1001706-48 = "― おいらはこれぐらい[wa:820]なんともない！"
1001706-50 = "― まだまだ、[wa:940]あと3時間は遊べるぞ！"
1001706-53 = "[wa:700]― 良いことを[wa:470]思いついたぞ、"
1001706-55 = "― カムラッドは[wa:790]そこに雪だるまを作れ！"
1001706-58 = "― こっちでおいらが作ったのを、"
1001706-60 = "― その横に添えよう！"
1001706-63 = "― ん？[wa:860]何でって？[wa:1200]良いと思わないか？"
1001706-66 = "― ……[wa:200]その二つの間に、"
1001706-68 = "― 小さい雪だるまも[wa:1120]作ろうか……"
1001706-71 = "― あっ、[wa:480]も、[wa:340]もちろん"
1001706-73 = "― それでカムラッドが良いならね！？"
1001706-76 = "見ろ、カムラッド！#nおいらの方の雪だるまが完成したぞ！"
1001706-77 = "髭の角度まで絶妙で、この完成度……おいらは満足だ！"
1001706-78 = "カムラッドの雪だるまの方はどうだ？見せてみろ。"
1001706-79 = "どれどれ……"
1001706-82 = "うわっ！"
1001706-87 = "また急に雪玉を……反逆のつもりか、カムラッド！"
1001706-88 = "なに？雪合戦の世界は冷酷なものだって？"
1001706-89 = "ふふふ……"
1001706-91 = "そうだったな。おいらが油断したスキを狙って雪合戦を仕掛けてくるとは、なかなかの策士！"
1001706-92 = "今度こそ手加減しないぞ、カムラッド！"
1001706-94 = "その後チェリノと一緒に雪合戦をしたりしながら、楽しい時間を過ごした。"
