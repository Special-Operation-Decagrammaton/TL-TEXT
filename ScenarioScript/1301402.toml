[translation]
1301402-1 = "Traje de banho e poder de defesa"
1301402-4 = "（Ao ouvir que Renge iria para a montanha usando traje de banho, corri apressadamente para lá）"
1301402-8 = "Oh, você foi rápida, mestre."
1301402-9 = "[s] \"Então era isso que você queria dizer com ir até a cachoeira.\""
1301402-10 = "É um lugar onde dá para aproveitar o traje de banho, né."
1301402-11 = "Além disso, eu tenho pelo menos um pouco de bom senso!"
1301402-12 = "[s] \"...Eu achei que você ia subir a montanha de traje de banho.\""
1301402-13 = "Bem..."
1301402-14 = "Bom... eu até fiz isso, na verdade."
1301402-15 = "[s] \"Você está brincando!?\""
1301402-16 = "Não, é que... eu estava usando por baixo do uniforme...!"
1301402-17 = "[s] \"A-ah, entendi!\""
1301402-29 = "E-e então? Estou um pouco envergonhada, mas... acho que isso também faz parte da juventude..."
1301402-30 = "Mestre... você também está de traje de banho por baixo da roupa?"
1301402-31 = "[s1] \"...Sim.\"\n[s2] \"Não estou usando, mas trouxe um por precaução!\""
1301402-32 = "Como esperado do meu mestre! Temos muito em comum!"
1301402-33 = "Hehe, bem, foi tudo muito repentino."
1301402-37 = "Então, vamos começar logo o treinamento de traje de banho."
1301402-38 = "O treinamento na cachoeira entre mestre e discípulo!"
1301402-44 = "（Fiquei debaixo da cachoeira com a Renge, ambas de traje de banho）"
1301402-48 = "Uau! Isso realmente desperta os sentidos! Como você está, mestre!?"
1301402-49 = "[s] \"U-uuaaa...! Está tão gelado que minha cabeça está latejando!!\""
1301402-50 = "Hehe, você está exagerando."
1301402-54 = "Falando nisso, você sente que seu poder de defesa aumentou com o traje de banho?"
1301402-55 = "Eu... sinto que está fazendo efeito."
1301402-56 = "Sinto que preciso me comportar de acordo com o traje, então fico mais focada..."
1301402-57 = "É como se o poder de defesa da minha mente aumentasse, em vez do corpo..."
1301402-58 = "E você, mestre?"
1301402-59 = "[s3] \"A força da cachoeira é incrível...!\"\n[s4] \"E-está quase saindo...!\""
1301402-62 = "É aí que entra a necessidade de defesa mental."
1301402-63 = "Se você não se mantiver focada, ele realmente vai sair."
1301402-64 = "[s] \"Isso é uma questão de foco!?\""
1301402-65 = "Olha, o meu traje de banho está bem, não está? Mestre, o seu..."
1301402-70 = "...!?"
1301402-71 = "[s5] \"Sinto um vento estranho passando...\n[s6] \"Meu traje de banho... sumiu!\""
1301402-77 = "O-o quê!? Vou encontrar agora mesmo!"
1301402-82 = "（Algum tempo depois...）"
1301402-86 = "Ah! Encontrei, mestre!"
1301402-87 = "[s7] \"Obrigado. Mas...\n[s8] \"N-não balance o traje de banho dos outros com esse sorriso...!\""
1301402-91 = "Estou de olhos fechados, então venha logo!"
1301402-92 = "Eu não estou vendo nada."
1301402-93 = "...Hehe, isso também parece coisa de juventude."
1301402-98 = "[ns] \"Por favor, olhe para o outro lado...!\""
1301402-102 = "Ah, desculpa! Hehe!"
1301402-104 = "（...Depois disso, continuei treinando debaixo da cachoeira com a Renge por um bom tempo）"
