[translation]
1301402-1 = "水着と防御力"
1301402-4 = "（レンゲが水着姿で山に行くと聞き、慌てて駆けつけた）"
1301402-8 = "お、早いね師匠。"
1301402-9 = "[s] \"滝壺に行くってことだったんだね。\""
1301402-10 = "水着を活かせる場所だからね。"
1301402-11 = "あと、アタシにも常識くらいはあるからな！"
1301402-12 = "[s] \"……てっきり、水着姿で登山するのかなって。"
1301402-13 = "ええっと……。"
1301402-14 = "まぁ……それもやったけど。"
1301402-15 = "[s] \"嘘でしょ！？\""
1301402-16 = "いや、制服の下に……着てただけだから……！"
1301402-17 = "[s] \"な、なるほど！\""
1301402-29 = "ど、どうかな？ちょっと恥ずかしいけど……これも青春かなって……。"
1301402-30 = "師匠も……服の下は水着か？"
1301402-31 = "[s1] \"……うん。\"\n[s2] \"着てないけど、一応持ってきたよ！\""
1301402-32 = "さすが、師匠！気が合うね！"
1301402-33 = "ふふ、まあ急だったからね。"
1301402-37 = "じゃあ、早速水着修練を始めよう。"
1301402-38 = "師弟での…[ruby=たきぎょう]…滝行だ[/ruby]！"
1301402-44 = "（レンゲと一緒に水着姿で滝の下に立った）"
1301402-48 = "くぅーっ！目が覚めるな！師匠はどうだ！？"
1301402-49 = "[s] \"う、うわあぁぁぁ……！冷たくて頭がキンキンする！！\""
1301402-50 = "ふふ、大げさだなあ。"
1301402-54 = "そういえば、水着で防御力が上がった感じする？"
1301402-55 = "アタシは……効果があるような気がしてる。"
1301402-56 = "水着に合った振る舞いをしなきゃって、気が引き締まるし……。"
1301402-57 = "体じゃなくて、心の防御力が上がる感じっていうか……。"
1301402-58 = "師匠は？"
1301402-59 = "[s3] \"滝の勢いが凄くて……！\"\n[s4] \"ぬ、脱げそう……！\""
1301402-62 = "そこに精神の防御力が求められるんだ。"
1301402-63 = "気合を入れ続けないと、ほんとに脱げちゃうからな。"
1301402-64 = "[s] \"それって気合の問題！？\""
1301402-65 = "ほら、アタシの水着は大丈夫だろ？師匠は……。"
1301402-70 = "……！？"
1301402-71 = "[s5] \"なんだかスースーするような……。\"\n[s6] \"水着が……ない！\""
1301402-77 = "な、なんだって！？すぐ見つけるよ！"
1301402-82 = "（しばらくして……）"
1301402-86 = "あっ！見つけたぞ師匠ー！"
1301402-87 = "[s7] \"ありがとう。でも……。\"\n[s8] \"そ、そんな笑顔で人の水着を振らないで……！\""
1301402-91 = "目つぶってるから、早く来てくれ！"
1301402-92 = "アタシは何も見てないから。"
1301402-93 = "……ふふ、これも青春っぽいな。"
1301402-98 = "[ns] \"あちらを向いていただけると……！\""
1301402-102 = "あ、ごめん！へへ！"
1301402-104 = "（……その後もずっとレンゲと一緒に滝の下で修練をした）"
