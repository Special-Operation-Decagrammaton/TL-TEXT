[translation]
1013902-1 = "Niko's Recommendation"
1013902-2 = "(A few minutes after receiving the mysterious Momotalk message—)"
1013902-6 = "(Suddenly, the office intercom rang.)"
1013902-8 = "Good evening, this is FOX EATS."
1013902-9 = "I've arrived to deliver your order!"
1013902-10 = "[s1] Open the door.\r\n[s2] Don't open the door."
1013902-14 = "It seems it's locked again..."
1013902-15 = "It can't be helped. I'll have to perform a door breach once more—"
1013902-16 = "[ns] \"I-I'll open it right away!!\""
1013902-21 = "Good evening, Sensei. This is FOX EATS."
1013902-22 = "You haven't had dinner yet, have you?"
1013902-23 = "You really must eat. It's bad for your health if you don't eat three meals a day."
1013902-24 = "[ns] \"I haven't eaten yet, but...\""
1013902-26 = "[ns3] \"How did you know?\"\n[ns4] \"Are you watching me from somewhere?\""
1013902-29 = "Hehe. I am a special forces operative. #nI have plenty of ways to gather information."
1013902-30 = "When I checked the Schale refrigerator this afternoon, there was almost no food left—"
1013902-31 = "And no one has come to Schale with food since noon."
1013902-32 = "Besides, your messenger has been online the whole time, so I figured you were working without taking a break."
1013902-33 = "[s] \"...I suppose you're right.\""
1013902-34 = "Sitting in the same spot working for so long isn't very good for you, either."
1013902-35 = "I'll prepare a meal for you right away, so please take a rest, Sensei."
1013902-36 = "[s] \"I think I'll take you up on that offer and take a breather...\""
1013902-38 = "[ns] \"By the way, what did you bring?\""
1013902-39 = "Hehe. I only brought the ingredients.\r\n"
1013902-40 = "Food is best when it's freshly made."
1013902-41 = "I bought a variety of things, so could you tell me what you'd like to eat, Sensei?"
1013902-42 = "I think I can make just about anything."
1013902-43 = "[s] \"I'd be happy with anything if you're the one making it, Niko...\""
1013902-47 = "[ns] \"Then... I'll leave it to your recommendation.\""
1013902-48 = "My... recommendation?\r\n"
1013902-49 = "If you ask me what I'm most confident in making... well, I suppose it would be the inari sushi I always make for everyone."
1013902-50 = "[s] \"That's fine. I'll leave it to you, Niko.\""
1013902-51 = "Understood. Please wait just a moment.\r\n"
1013902-55 = "...Making inari sushi like this reminds me of those days.\r\n"
1013902-56 = "[s] \"The first time we met?\""
1013902-57 = "Yes. Back then, you ate a lot of the inari sushi I made, too."
1013902-58 = "That was a mission to lower your guard, but..."
1013902-59 = "Even so—at the very least, I put my heart into making that inari sushi."
1013902-60 = "It's a dish the rest of the squad loves, too."
1013902-61 = "[s] \"How did you end up making inari sushi?\""
1013902-62 = "The reason, you ask? ...Well."
1013902-63 = "Not long after FOX Platoon was founded, I thought we needed bento boxes for when missions dragged on."
1013902-64 = "But I wasn't very good at cooking back then... and inari sushi was about all I could manage."
1013902-65 = "And even that... I wasn't very good at making..."
1013902-66 = "Still, everyone encouraged me by saying it was delicious... I was so happy that I kept making it."
1013902-67 = "Hehe, it's a funny story, isn't it? #nBack then, I didn't have any special attachment to inari sushi."
1013902-68 = "[s] \"I think I can understand that.\""
1013902-72 = "[ns5] \"Memories are a seasoning for food, after all.\"\r\n[ns6] \"That means your inari sushi is filled with all sorts of memories, Niko.\""
1013902-75 = "...I suppose so. To me, it's a special dish."
1013902-76 = "With that said, while we were chatting, the inari sushi is finished!\r\n\r\n"
1013902-77 = "[s7] \"Already?\"\r\n[s8] \"That was fast.\""
1013902-80 = "It's a simple dish where you just stuff rice into seasoned fried tofu."
1013902-81 = "It would take time if I had to fry the tofu from scratch, but otherwise, it's quick to make."
1013902-82 = "[s] \"Well then, let's dig in—\""
1013902-83 = "Please wait a moment, Sensei.\r\n"
1013902-84 = "Hehe. You said it earlier, didn't you? #nThat tonight's dinner would be my recommendation."
1013902-89 = "This is kitsune udon, which I made while simmering the fried tofu. #nPlease have this tonight.\r\n"
1013902-90 = "It's cold tonight, so I thought a warm bowl of udon would be gentler on your body.\r\n"
1013902-91 = "[s] \"I really appreciate the concern, but what about the inari sushi...?\""
1013902-92 = "Freshly made is good, but inari sushi actually tastes better after letting it sit for a while...\r\n"
1013902-93 = "...Sensei. You were planning on skipping breakfast tomorrow or just having instant food, weren't you?\r\n"
1013902-94 = "[ns] \"...Is that also the result of your information gathering?\""
1013902-95 = "No, just a hunch."
1013902-96 = "You're surprisingly easy to read, Sensei."
1013902-97 = "I'll put this inari sushi in the fridge, so please have it for breakfast tomorrow."
1013902-98 = "And... please don't push yourself too hard."
1013902-99 = "Goodnight, Sensei."
1013902-101 = "(Afterward, I ate the kitsune udon Niko made and spent a warm night for the first time in a while.)"