[translation]#[Texto Final, Mas eventualmente pode haver uma alteração. - Filipe 21/06.]
1013902-1 = "A Recomendação da Niko" 
1013902-2 = "（Alguns minutos após receber\numa mensagem misteriosa no MomoTalk――）" 
1013902-6 = "（De repente,\no interfone do escritório tocou.）" 
1013902-8 = "Boa noite,\naqui é o 'FOX EATS'." 
1013902-9 = "Viemos entregar\no seu pedido!" 
1013902-10 = "[s1] Abrir a porta.\r\n[s2] Não abrir a porta." 
1013902-14 = "Parece que a porta\nestá trancada novamente……" 
1013902-15 = "Não tem jeito.\nVou iniciar a invasão tática da porta mais uma――" 
1013902-16 = "[ns] \"J-Já estou abrindo!!\"" 
1013902-21 = "Boa noite, Sensei.\nAqui é o FOX EATS." 
1013902-22 = "Você ainda não\njantou hoje, não é?" 
1013902-23 = "Você precisa se alimentar direito.\nPular refeições faz muito mal para a sua saúde." 
1013902-24 = "[ns] \"Ainda não comi, mas……\"" 
1013902-26 = "[ns3] \"Como você sabia disso?\"\n[ns4] \"Por acaso estava me vigiando de algum lugar?\"" 
1013902-29 = "Fufu. Eu sou de uma força de operações especiais.\nTenho inúmeras formas de coletar informações." 
1013902-30 = "Quando verifiquei a geladeira da Schale hoje à tarde,\nquase não havia ingredientes sobrando――" 
1013902-31 = "E, desde a hora do almoço,\nninguém veio à Schale trazendo comida." 
1013902-32 = "Além disso, seu status no mensageiro estava online o tempo todo,\nentão deduzi que estava trabalhando sem pausas." 
1013902-33 = "[s] \"……Você me pegou.\"" 
1013902-34 = "Ficar sentado trabalhando no mesmo lugar por muito tempo\ntambém não é bom para você." 
1013902-35 = "Vou preparar a sua refeição num instante,\nentão, por favor, descanse um pouco, Sensei." 
1013902-36 = "[s] \"Acho que vou aceitar a sua gentileza\ne dar uma pausa……\"" 
1013902-38 = "[ns] \"A propósito,\no que você trouxe?\"" 
1013902-39 = "Fufu. Eu trouxe apenas os ingredientes.\r\n" 
1013902-40 = "Afinal, a comida fica muito melhor\nquando é feita na hora." 
1013902-41 = "Eu comprei várias coisas,\nentão poderia me dizer o que gostaria de comer?" 
1013902-42 = "Acredito que eu consiga cozinhar\npraticamente qualquer coisa." 
1013902-43 = "[s] \"Se for a Niko cozinhando,\neu vou ficar feliz com qualquer coisa, mas……\"" 
1013902-47 = "[ns] \"Então…… O que você recomenda?\"" 
1013902-48 = "O que eu…… recomendo?\r\n" 
1013902-49 = "Se me perguntar qual é o prato em que tenho mais confiança…… Deixe-me ver.\nAcho que seria o Inari Sushi que sempre faço para as meninas." 
1013902-50 = "[s] \"Tudo bem.\nVou deixar nas suas mãos, Niko.\"" 
1013902-51 = "Entendido.\nEntão, aguarde só um pouquinho.\r\n" 
1013902-55 = "……Preparar Inari Sushi assim\nme traz muitas lembranças daquela época.\r\n" 
1013902-56 = "[s] \"De quando nos conhecemos?\"" 
1013902-57 = "Sim. Eu me lembro de ter feito você\ncomer um monte de Inari Sushi naquele dia também." 
1013902-58 = "Aquilo foi uma tática para baixar a sua guarda, mas……" 
1013902-59 = "Ainda assim―― pelo menos o Inari Sushi\nfoi preparado com o meu mais puro e sincero carinho." 
1013902-60 = "E é o prato favorito\nde todo o meu esquadrão também." 
1013902-61 = "[s] \"Como foi que você começou\na fazer Inari Sushi?\"" 
1013902-62 = "O motivo……\nDeixe-me ver." 
1013902-63 = "Logo após a fundação do Esquadrão FOX,\npensei que precisaríamos de marmitas para operações longas." 
1013902-64 = "Mas na época eu não era muito boa na cozinha……\nFazer Inari Sushi era o meu limite." 
1013902-65 = "E mesmo assim――\nEu não era tão boa preparando eles……" 
1013902-66 = "Apesar disso, todas elas me encorajaram dizendo que estava delicioso……\nIsso me deixou tão feliz que continuei fazendo." 
1013902-67 = "Fufu, é uma história engraçada, não é?\nNaquela época, eu nem tinha um apego tão especial por Inari Sushi." 
1013902-68 = "[s] \"Acho que eu consigo entender o porquê.\"" 
1013902-72 = "[ns5] \"Afinal, as memórias também servem\ncomo um excelente tempero.\"\r\n[ns6] \"Isso significa que o seu Inari Sushi\nestá repleto de boas lembranças, Niko.\"" 
1013902-75 = "……Você tem razão.\nPara mim, é um prato incrivelmente especial." 
1013902-76 = "E, graças à nossa conversa,\no Inari Sushi já está pronto!\r\n\r\n" 
1013902-77 = "[s7] \"Já?\"\r\n[s8] \"Foi muito rápido.\"" 
1013902-80 = "É um prato bem simples, afinal.\nBasta rechear o tofu frito cozido com arroz." 
1013902-81 = "Levaria muito tempo se eu tivesse que fritar o tofu do zero,\nmas como não é o caso, dá para fazer num instante." 
1013902-82 = "[s] \"Sendo assim, Itadaki――\"" 
1013902-83 = "Espere só um minutinho, Sensei.\r\n" 
1013902-84 = "Fufu. Você mesmo disse agora há pouco, não disse?\nQue o jantar de hoje seria a minha recomendação." 
1013902-89 = "Aqui está o Kitsune Udon que fiz\naproveitando o momento em que cozinhava o tofu.\nEsta noite, quero que você saboreie isso.\r\n" 
1013902-90 = "A noite está fria, então um udon quentinho\nserá muito mais reconfortante para o seu corpo.\r\n" 
1013902-91 = "[s] \"Fico muito feliz com a sua consideração,\nmas e o Inari Sushi……？\"" 
1013902-92 = "Ele é bom feito na hora,\nmas o Inari Sushi fica ainda mais saboroso se descansar um pouco……\r\n" 
1013902-93 = "……Sensei.\nVocê estava planejando pular o café da manhã de amanhã\nou comer alguma comida pronta, não estava?\r\n" 
1013902-94 = "[ns] \"……Isso também foi\nfruto da sua coleta de informações?\"" 
1013902-95 = "Não, foi apenas intuição." 
1013902-96 = "Você é surpreendentemente fácil de ler, Sensei." 
1013902-97 = "Vou deixar este Inari Sushi na geladeira,\nentão, por favor, coma no café da manhã de amanhã." 
1013902-98 = "E também……\nPor favor, não se esforce demais, ok?" 
1013902-99 = "Muito bem, Sensei.\nBoa noite." 
1013902-101 = "（Depois disso, comi o Kitsune Udon preparado pela Niko\ne desfrutei de uma noite aconchegante que não sentia há tempos.）" 