[translation]
1013902-1 = "Niko's Recommendation"
1013902-2 = "(A few minutes after receiving the mysterious Momotalk...)"
1013902-6 = "(Suddenly, the office intercom rang.)"
1013902-8 = "Good evening, this is \"FOX EATS\"."
1013902-9 = "I've come to deliver your order!"
1013902-10 = "[s1] Open the door.\n[s2] Don't open the door."
1013902-14 = "It looks like it's locked again..."
1013902-15 = "It can't be helped. Once again, I'll initiate a door breach—"
1013902-16 = "[ns] \"I-I'll open it right away!!\""
1013902-21 = "Good evening, Sensei. This is FOX EATS."
1013902-22 = "You haven't eaten dinner yet, right?"
1013902-23 = "You need to eat properly. It's bad for your health if you don't eat three proper#nmeals a day."
1013902-24 = "[ns] \"I haven't eaten yet, but...\""
1013902-26 = "[ns3] \"How did you know?\"\n[ns4] \"Are you monitoring me from somewhere?\""
1013902-29 = "Hehe. I am an SRT Member, after all.#nI have countless methods for gathering intelligence."
1013902-30 = "When I checked SCHALE's refrigerator this afternoon, there were hardly any#ningredients left—"
1013902-31 = "And no one has come to SCHALE with food since noon."
1013902-32 = "Furthermore, your messenger has been online the whole time, so I figured#nyou've been working without taking a break."
1013902-33 = "[s] \"...You're right.\""
1013902-34 = "Sitting in the same spot and working continuously isn't very good for you either."
1013902-35 = "I'll prepare a meal right away, so please take a short rest, Sensei."
1013902-36 = "[s] \"I think I'll take you up on that and catch my breath...\""
1013902-38 = "[ns] \"By the way, what did you bring?\""
1013902-39 = "Hehe. I only brought the ingredients."
1013902-40 = "Food is best when it's freshly made."
1013902-41 = "I have many of them with me, so could you tell me#nwhat you would like to eat, Sensei?"
1013902-42 = "I can make pretty much everything."
1013902-43 = "[s] \"I'd be happy with anything, as long as you make it, Niko...\""
1013902-47 = "[ns] \"Then... I'll have Niko's [ruby=Omakase Course]recommendation[/ruby].\""
1013902-48 = "My... recommendation?"
1013902-49 = "If you ask me what dish I'm most confident in... let me see.#nPerhaps the inari sushi I always make for everyone."
1013902-50 = "[s] \"That's fine. I'll leave it to you, Niko.\""
1013902-51 = "Understood. Please wait a moment then."
1013902-55 = "...Making inari sushi like this kind of reminds me of those days."
1013902-56 = "[s] \"When we first met?\""
1013902-57 = "Yes. I was just thinking about how I had you eat a lot of inari sushi back then too."
1013902-58 = "That was a strategy to lower your guard, but..."
1013902-59 = "Even so—at the very least, I put my heart into making the inari sushi."
1013902-60 = "It's a dish everyone in the platoon loves, too."
1013902-61 = "[s] \"Why did you start making inari sushi?\""
1013902-62 = "The reason...? Well, let's see."
1013902-63 = "When the FOX Platoon was first formed, I thought we needed bento boxes for#nwhen operations ran long."
1013902-64 = "But I wasn't very good at cooking back then... making inari sushi was the best#nI could do."
1013902-65 = "Even that, I couldn't make it very well back then..."
1013902-66 = "But everyone encouraged me and gave me lots of compliments. Their words made#nme feel happy so I kept on making it."
1013902-67 = "Hehe, it's a funny story, isn't it.#nBack then, I didn't have any special attachment to inari sushi."
1013902-68 = "[s] \"I feel like I kind of understand.\""
1013902-72 = "[ns5] \"Because memories are another seasoning that adds to the flavor of food.\"\n[ns6] \"It means your inari sushi is steeped with all those different memories, Niko.\""
1013902-75 = "…For me, this dish is very special."
1013902-76 = "And with that, while we were chatting, the inari sushi is done!"
1013902-77 = "[s7] \"Already?\"\n[s8] \"That was fast.\""
1013902-80 = "It's a simple dish, just stuffing rice into simmered fried tofu pouches."
1013902-81 = "If tofu has to be deep-fried from start to end, making inari sushi will take quite#na while, otherwise it can be made quickly."
1013902-82 = "[s] \"Well then, thanks for the me—\""
1013902-83 = "Please wait a moment, Sensei."
1013902-84 = "Hehe. You said it earlier, right?#nThat tonight's dinner would be my recommendation."
1013902-89 = "Here are some kitsune udon I made while simmering the fried tofu.#nTonight, please have this instead."
1013902-90 = "It's cold tonight, so I thought warm udon would be gentler on your body."
1013902-91 = "[s] \"I'm really happy for the consideration, but what about the inari sushi...?\""
1013902-92 = "Having it fresh is also good, but inari sushi actually tastes better if you let it sit#nfor a while..."
1013902-93 = "...Sensei. You were going to either skip breakfast tomorrow or make do with#ninstant food anyway, weren't you?"
1013902-94 = "[ns] \"...Is that also the result of your information gathering?\""
1013902-95 = "No, just a hunch."
1013902-96 = "You are surprisingly easy to read, Sensei."
1013902-97 = "I will put this inari sushi in the refrigerator, so please eat it tomorrow morning."
1013902-98 = "Also... please don't push yourself too hard."
1013902-99 = "Well then, Sensei, good night."
1013902-101 = "(After that, I ate the kitsune udon Niko made for me, and spent a warm evening#nfor the first time in a while.)"