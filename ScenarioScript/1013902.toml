[translation]
1013902-1 = "ニコのおすすめ"
1013902-2 = "（謎のモモトークが届いてから、数分後――）"
1013902-6 = "（突然、オフィスのインターホンが鳴った）"
1013902-8 = "こんばんは、「FOX EATS」です。"
1013902-9 = "ご注文の商品をお届けにあがりました！"
1013902-10 = "[s1] ドアを開ける。\r\n[s2] ドアを開けない。"
1013902-14 = "また鍵がかかっているみたいですね……。"
1013902-15 = "仕方ありません。もう一度、ドアブリーチングを――"
1013902-16 = "[ns] \"す、すぐ開けるね！！\""
1013902-21 = "こんばんは、先生。FOX EATSです。"
1013902-22 = "まだお夕飯、食べていませんよね？"
1013902-23 = "ちゃんと食べないといけませんよ。ちゃんと三食食べないと身体に悪いです。"
1013902-24 = "[ns] \"まだ食べてないけど……。\""
1013902-26 = "[ns3] \"なんで分かったの？\"\n[ns4] \"どこかから監視してたり？\""
1013902-29 = "ふふっ。特殊部隊員ですから。#n情報収集手段はいくらでもあるんです。"
1013902-30 = "今日の午後、シャーレの冷蔵庫を確認した時に、食材はほとんど残っていませんでした――"
1013902-31 = "そして、お昼以降に食べ物を持ってシャーレに来た人もいません。"
1013902-32 = "それに、先生のメッセンジャーがずっとオンラインのままだったので、休憩も取らずにお仕事をされていたのだろうな、と思いまして。"
1013902-33 = "[s] \"……そうだね。\""
1013902-34 = "同じ場所に座りっぱなしで作業をされるのも、あまり良くはありません。"
1013902-35 = "すぐにお食事をご用意しますから、先生は少し休んでくださいね。"
1013902-36 = "[s] \"お言葉に甘えて、一息つこうかな……。\""
1013902-38 = "[ns] \"ところで、何を持ってきたの？\""
1013902-39 = "ふふ。持ってきたのは食材だけです。\r\n"
1013902-40 = "お料理はできたてが一番ですから。"
1013902-41 = "色々買ってきたので、先生が召し上がりたいものを教えていただけますか？"
1013902-42 = "大体のものなら作れると思います。"
1013902-43 = "[s] \"ニコが作ってくれるなら、なんでも嬉しいけど……。\""
1013902-47 = "[ns] \"じゃあ……ニコの[ruby=お任せコース]おすすめ[/ruby]で。\""
1013902-48 = "私の……おすすめ？\r\n"
1013902-49 = "一番自信がある料理と言われると……そうですね。#nみんなにいつも作ってあげているいなり寿司、でしょうか。"
1013902-50 = "[s] \"大丈夫。ニコに任せるよ。\""
1013902-51 = "かしこまりました。それではちょっと待っていてくださいね。\r\n"
1013902-55 = "……こうやっていなり寿司を作っていると、なんだかあの頃を思い出しますね。\r\n"
1013902-56 = "[s] \"ニコと初めて会った時のこと？\""
1013902-57 = "はい。あのときも、先生にたくさんいなり寿司を召し上がっていただいたな、と。"
1013902-58 = "あれは先生の警戒心を解くための作戦でしたが……。"
1013902-59 = "それでも――少なくとも、いなり寿司だけは、真心を込めて作っていました。"
1013902-60 = "小隊のみんなも大好きな料理ですし。"
1013902-61 = "[s] \"どうしていなり寿司を作るようになったの？\""
1013902-62 = "きっかけ、ですか……そうですね。"
1013902-63 = "FOX小隊が創設されて間もない頃、作戦が長引いた時用のお弁当が必要だと思ったんです。"
1013902-64 = "でも当時の私はお料理があまり得意ではなくて……作れるのもいなり寿司がせいぜいでした。"
1013902-65 = "それすらも――あんまり上手にできなくて……。"
1013902-66 = "それでも、みんなは美味しいって励ましてくれて……それが嬉しくて、作り続けるようになったんです。"
1013902-67 = "ふふ、変な話ですよね。#nその時の私は、特別いなり寿司に思い入れがあったわけじゃないのに。"
1013902-68 = "[s] \"なんとなく、分かる気がするよ。\""
1013902-72 = "[ns5] \"食べ物の味は、思い出もひとつの調味料だからね。\"\r\n[ns6] \"ニコのいなり寿司にはそれだけ色々な思い出が染み込んでるってことだよ。\""
1013902-75 = "……そうですね。私にとっては、特別な料理なんです。"
1013902-76 = "というわけで、おしゃべりしている間に、いなり寿司が完成しました！\r\n\r\n"
1013902-77 = "[s7] \"もう？\"\r\n[s8] \"早いね。\""
1013902-80 = "煮つけた油揚げにご飯を詰めるだけの、簡単なお料理ですから。"
1013902-81 = "一から油揚げを揚げるとなると時間がかかっちゃいますが、そうでないならすぐに作れるんです。"
1013902-82 = "[s] \"では、いただきま――\""
1013902-83 = "ちょっと待ってください、先生。\r\n"
1013902-84 = "ふふ。さっき仰っていましたよね？#n今日のお夕飯は、私のおすすめでって。"
1013902-89 = "こちら、油揚げを煮るついでに作った、きつねうどんです。#n今夜は、こちらを召し上がってください。\r\n"
1013902-90 = "今夜は寒いですから、温かいおうどんの方が身体に優しいかと。\r\n"
1013902-91 = "[s] \"気遣いはとても嬉しいけど、いなり寿司は……？\""
1013902-92 = "できたても良いんですが、いなり寿司は少し時間を置いた方が美味しくなるので……。\r\n"
1013902-93 = "……先生。どうせ明日の朝ごはんも、食べないかレトルトで済ませようとしていましたよね？\r\n"
1013902-94 = "[ns] \"……それも情報収集の結果？\""
1013902-95 = "いえ、勘です。"
1013902-96 = "先生って意外と分かりやすいですから。"
1013902-97 = "このいなり寿司は冷蔵庫に入れておきますから、明日の朝に召し上がってください。"
1013902-98 = "それと……あまり無理はなさらないでくださいね。"
1013902-99 = "それでは先生、おやすみなさい。"
1013902-101 = "（その後、ニコが作ってくれたきつねうどんを食べ、久しぶりに温かい夜を過ごした）"
