[translation]
2001905-1 = "Caso 3. Hora de estudar, não é?"
2001905-3 = "（Afastei-me temporariamente da pilha de trabalho e estava caminhando pela cidade）"
2001905-4 = "（No momento seguinte）"
2001905-8 = "Que coincidência, Mestre!"
2001905-12 = "[ns] \"Ah, Akane!?\""
2001905-13 = "Sim! Sou eu, a Akane, sua serva."
2001905-14 = "Eu estava esperando aqui o tempo todo para encontrar o Mestre por acaso."
2001905-15 = "[s] \"A-aqui... por acaso?\""
2001905-16 = "Sim, por acaso."
2001905-17 = "――Isso não pode ser chamado de coincidência, pode?"
2001905-18 = "Será...? Eu acredito que seja uma coincidência."
2001905-19 = "Como você sabia que eu passaria por esta avenida...?"
2001905-20 = "Isso é o nível da Millennium..."
2001905-21 = "……Não, é o destino."
2001905-22 = "Você quer dizer que a segurança do Mestre deveria estar protegida pelo Schale?"
2001905-23 = "Por isso, compilei as imagens de satélite da Veritas..."
2001905-27 = "Não, é que eu achei que existem coincidências maravilhosas."
2001905-33 = "Poder encontrar você assim também é como um milagre."
2001905-34 = "Que tipo de serviço deseja hoje, Mestre?"
2001905-35 = "[s] \"Por acaso, você veio até aqui vestida de coelhinha?\""
2001905-36 = "Há algo que lhe incomoda?"
2001905-37 = "Mesmo sendo uma coelhinha, não deixa de ser um traje para servir."
2001905-42 = "（Os olhares frios ao redor me atingem）"
2001905-50 = "（Puxei a mão da Akane apressadamente e nos refugiamos em um café próximo）"
2001905-57 = "Uau..."
2001905-58 = "[s] \"O que é este lugar...?\""
2001905-59 = "É um café de coelhinhas!#nEu não sabia que existiam cafés com esse conceito!"
2001905-60 = "Entendo. Sem saber das intenções profundas do Mestre, eu..."
2001905-61 = "――Um mal-entendido?#nPor favor, não seja modesto."
2001905-62 = "Fufu... Não precisa ficar tão envergonhado."
2001905-63 = "Eu sei muito bem que o Mestre é mais gentil do que qualquer outra pessoa."
2001905-67 = "Já decidiram o pedido? Mestre, senhorita."
2001905-68 = "Ora... Então aqui eu também me torno uma senhorita."
2001905-69 = "É interessante. Mesmo tendo um Mestre a quem sirvo."
2001905-70 = "Embora seja apenas enquanto estamos na loja, eu tenho um Mestre precioso..."
2001905-74 = "Mestre, o que houve?"
2001905-75 = "Parece cansado, então farei o pedido por você."
2001905-76 = "Primeiro..."
2001905-81 = "……Entendo. Então é assim que uma coelhinha deve se comportar..."
2001905-85 = "Mantendo uma postura elegante, sem fazer barulho com os pratos..."
2001905-86 = "Hum, hum."
2001905-90 = "Então não basta apenas vestir o traje de coelhinha."
2001905-91 = "Os gestos, a forma de se comportar e o serviço realizado em harmonia com o ambiente..."
2001905-92 = "É isso que chamam de uma verdadeira coelhinha!"
2001905-96 = "Foi muito instrutivo,"
2001905-97 = "Obrigada."
2001905-98 = "Quem diria que o Mestre tinha tanto conhecimento nesta área."
2001905-99 = "Continuarei me esforçando para alcançar o serviço perfeito."
2001905-105 = "Como esperado do meu Mestre!"
2001905-106 = "[s1] \"Ahaha...\"\n[s2] \"É um mal-entendido, Akane...\""
2001905-110 = "(A Akane continuou com o mal-entendido (?) até o fim...)"
