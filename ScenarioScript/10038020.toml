[translation]
10038020-1 = "第2話;噂"
10038020-7 = "あ、先生。こちらです。"
10038020-8 = "[s] \"レイジョが呼ぶなんて珍しいね。嬉しいよ。\""
10038020-9 = "そう言っていただけて、私も嬉しいです。"
10038020-10 = "さて……ここは桃源郷の最奥に位置する茶室でして――"
10038020-11 = "玄武商会内部で話し合いをする際によく利用する場所なんです。"
10038020-12 = "[s] \"だから、普段と雰囲気が違うんだね。\""
10038020-13 = "はい。そしてここは防音室なので、私たちの話が外に漏れることはありません。"
10038020-14 = "わざわざここに先生をお呼び立てしたのは……玄武商会の現状を内密に話すためです。"
10038020-15 = "既にご存知かとは思うのですが――玄武商会は現在、人の立ち入りを制限しています。"
10038020-16 = "会長が子供になってしまって……現在、玄龍門によって保護されています。"
10038020-17 = "そのため……現在の玄武商会の責任者は、一時的に私になりました。"
10038020-18 = "正直、私には荷が重いです。#n今だって胃が痛くて……昨日はあまり眠れなかったくらいです。"
10038020-19 = "不幸中の幸いと言えばいいのかは分からないのですが……現在玄武商会全体が営業を停止しておりますので、商会を運営する必要がありません。"
10038020-20 = "本当にそれが良い事かと問われると難しいところですが……。"
10038020-21 = "[s] \"それはマズいんじゃないの！？\""
10038020-22 = "はい……事態はかなり深刻です。#nまぁ、本当はそんなこともないんですが……ちょっとふざけてみました。"
10038020-23 = "とはいえ、先生にはルミ会長が動けない現状と、山海経に流れている噂をお伝えしなければと思い……。"
10038020-24 = "もちろん、先生が玄龍門に招かれて山海経にいるというのは承知しています。"
10038020-25 = "ですが、玄武商会の現状については、おそらく玄龍門からは伝えられないと思いますので。"
10038020-26 = "この後、玄龍門の幹部とのミーティングがありますよね？"
10038020-27 = "その前に、こちら側の現状と視点をお伝えしたほうが、先生の判断材料が増えると思った次第です。"
10038020-28 = "[s] \"ありがとう……今どうなってるのかは理解したよ。\""
10038020-29 = "山海経の内部事情に巻き込む形になってしまって申し訳ございません。こういう表現はあまり好きではありませんが……このご時世ですので。"
10038020-36 = "それと、巷ではとある生徒の噂が広まっておりまして……。"
10038020-37 = "[s] \"その生徒って……もしかして[ruby=しんたに]申谷[/ruby]カイ？\""
10038020-41 = "そう、ですが……。#nどうして先生がその名を……？"
10038020-44 = "（キサキとの会話を話した）"
10038020-47 = "そうだったのですね。#n門主様は……"
10038020-48 = "……"
10038020-49 = "はい。現在、主に3年生を中心に[ruby=しんたに]申谷[/ruby]カイの噂が広まっている状態です。"
10038020-50 = "3年生が中心になっているというのが厄介で……1年生や2年生は、全く知らないかただの都市伝説だと思っているみたいなので心配はないのですが。"
10038020-51 = "彼女の噂を皮切りに、不穏な噂が増えてきて――今、山海経は混乱の最中にあります。"
10038020-52 = "それこそ、以前の交流会をやり玉にあげた噂もありますし……。"
10038020-53 = "そうですね……具体的には――"
10038020-56 = "そういえば、京劇部のカグヤ部長はどうなったんだろ？"
10038020-57 = "表向きは自粛してるってことになってるけど……#n玄龍門に物申したから捕まってるっていう噂もあるよね。"
10038020-60 = "でもさ……[ruby=しんたに]申谷[/ruby]カイが本当に帰ってきたなら……"
10038020-61 = "門主様が何かしたかもしれないよね……"
10038020-64 = "退学させられて、七囚人とまで呼ばれるほどの生徒が――"
10038020-65 = "何事もなく、山海経に戻れるわけないし……"
10038020-67 = "え、でも……カイを退学させたのって門主様だったんでしょ？"
10038020-68 = "それも含めて何か裏があるんじゃない……？"
10038020-71 = "なんか雲行き怪しいよね。このままで大丈夫なのかな。"
10038020-76 = "玄龍門を信じていいの？門主様の考えてること分かんないんだけど……"
10038020-79 = "こんな風に、噂を聞いた生徒が不安を漏らしていて……"
10038020-80 = "3年生を中心に、玄龍門への不信感が募っている状態です。"
10038020-81 = "……もちろん、私たち玄武商会と玄龍門はあまり仲が良くありません。それは事実です。"
10038020-82 = "ですが、玄武商会の活動は、玄龍門が存在しているからこそ成立しているところがあるというのも事実。"
10038020-83 = "私だってそれは理解しています。ただ、重箱の隅をつつくようなやり方と――"
10038020-84 = "これは伝統に反しているだとか、山海経のプライドを捨てているだとか……#n逐一文句を口にしながら営業妨害をしてくるのが……本当に！"
10038020-88 = "申し訳ございません、話が逸れました。#nはぁ……やっぱり、月影祭が近づいているからこんなことになっているのでしょうか……"
10038020-89 = "[s] \"月影祭と何か関係あるの？\""
10038020-93 = "そうですね……まず、先生は月影祭についてどの程度ご存知ですか？"
10038020-95 = "なるほど……豊穣を祈願しその年の実りを祝う季節行事……#nそうですね。それが一般的な認識でしょう。"
10038020-96 = "……ですが、月影祭には少し違った側面もあります。"
10038020-97 = "月影祭の前後に、月に旅立った神仙が下界に下ってくるという伝説もありまして……"
10038020-98 = "[s] \"神仙？\""
10038020-102 = "普通の人が修行を重ねて悟りを開き……特別な存在になったものを神仙と呼びます。"
10038020-103 = "月影祭には、神仙を称えるという側面もあるのですよ。"
10038020-104 = "月に旅立った神仙がこの地に舞い戻り、下界を周遊した後、また旅に出るという伝説です。"
10038020-105 = "そして――神仙がやってくると、奇妙な出来事が起こると言われているのです。"
10038020-106 = "はい……今、山海経で起きている一連の現象は、月影祭と関係があるのではないか、と考える人が出てきたくらいです。"
10038020-110 = "私個人としては、ただの迷信だと思っていましたが……。"
10038020-111 = "ここまで立て続けに不可思議なことが起こると、そうなのではないかと少しだけ思ってしまいますね……"
10038020-113 = "（レイジョから噂を聞いた後、すぐに玄龍門へ向かった）"
10038020-120 = "（玄龍門での会議は混沌を極めていた）"
10038020-121 = "玄武商会への立ち入りを制限してもなお、若返り現象は広がり続けています……#n可及的速やかに対策が必要です！"
10038020-122 = "そもそも原因が判明しておりません！#n一体いつまで成果のあがらない調査を続ければよいのでしょうか。"
10038020-123 = "調査は難航するばかりか、終わりが見えず現場は疲弊しています。"
10038020-128 = "だが、少なくとも若返り現象が起こる生徒の急増は抑えられているだろう？#n無駄ではない。"
10038020-130 = "ですが……全生徒の状況を把握し、保護するのは物理的に不可能です。#n根本的な原因が判明していないのに、現象が収まるとは思えません！"
10038020-131 = "お願いします、門主様！#n月影祭の開催はどうか……！"
10038020-138 = "慎め！門主様の[ruby=ごぜん]御前[/ruby]だぞ！"
10038020-144 = "――構わぬよ。今は現場の話を聞く時じゃろうて。"
10038020-145 = "それに状況が状況じゃ。焦るのも無理はない。"
10038020-146 = "――続けるがよい。"
10038020-151 = "はっ！他にも、不吉な噂が広まり続けておりまして……"
10038020-152 = "ただの噂だけであれば問題ないのですが、一部の生徒の間では今の玄龍門を疑問視する声もあがっており……"
10038020-153 = "京劇部の自粛とカグヤの行方の件も相まって、玄龍門に疑念を抱く生徒が増えてきています。"
10038020-154 = "以前よりも業務がやりにくくなっています……ふとした瞬間に敵意や冷たい視線を向けられるといいますか……"
10038020-156 = "ふむ……それは問題じゃのう。#nして、此度の事態に関して、其方らの意見はどうじゃ？"
10038020-161 = "……"
10038020-162 = "……非常に、申し上げにくいのですが。"
10038020-164 = "良い、許す。"
10038020-170 = "今回の月影祭は山海経のみで行なうべきかと。"
10038020-175 = "それは……！"
10038020-176 = "ミナ執行部長……残念ながら、現在多くの生徒が今回の原因を他校生のせいにしています。"
10038020-182 = "……"
10038020-183 = "このような状況で例年通り月影祭を行えば、今度こそ玄龍門に対して反抗する生徒が出ることでしょう。"
10038020-184 = "も、もちろん例年通り開催し、今の山海経には問題などないとアピールすることもできるでしょう。ですが……"
10038020-185 = "……"
10038020-187 = "――既に存在する問題に蓋をすることはできぬ、ということじゃな。"
10038020-188 = "であれば、それを認め――策を講じる必要がある。"
10038020-189 = "門主様……！"
10038020-191 = "そ、それは……その……！"
10038020-196 = "妾の憶測が間違っておるかの？"
10038020-201 = "い、いえ。むしろ、ここまで丁寧に汲み取ってくださり感謝いたします。#nですが……"
10038020-203 = "――それだけでは足りぬということじゃな。あい分かった。"
10038020-207 = "……"
10038020-211 = "では――此度の月影祭は、山海経のみで行なう事とする。#nよって――外部の立ち入りの一切を禁じる。"
10038020-216 = "門主様！"
10038020-217 = "門主様……！"
10038020-219 = "また、玄武商会への立ち入り制限は現状のままとする。#nただし、保護された後、無事を確認できた生徒には通行の自由を許す。"
10038020-225 = "……"
10038020-226 = "空言に対しては毅然とした態度で接すれば良いが、万に一つということもある。"
10038020-227 = "そして、現時刻より――山海経全土の警備を強化せよ。"
10038020-228 = "以上を玄龍門の門主、[ruby=りゅうげ]竜華[/ruby]キサキの裁決とする。"
10038020-230 = "承知いたしました、門主様！"
10038020-231 = "直ちに公表いたします！"
10038020-236 = "本当に、これでよろしかったのですか……？"
10038020-237 = "うむ。今は現場の声を優先すべきじゃろうて。"
10038020-238 = "……"
10038020-239 = "どれ、視察に行くとするかの。#nミナ、支度を。"
10038020-243 = "……！？い、いけません門主様！#n現場が混乱いたします……！今はお控えを。"
10038020-244 = "――それは[ruby=このえ]近衛[/ruby]ミナとしてか、それとも執行部長としての意見か。どちらじゃ？"
10038020-245 = "……！"
10038020-252 = "――執行部長としての諌言です。"
10038020-253 = "我々の部下である構成員を……そして玄龍門を、信じていただきたく。"
10038020-257 = "……そうか。"
10038020-261 = "あい分かった。であれば、妾は私室に戻る。#n何かあったらすぐに知らせるのじゃぞ。"
10038020-262 = "はい、門主様。"
10038020-267 = "はああああ……"
10038020-268 = "[s] \"お疲れ、ミナ……。\""
10038020-269 = "ふっ……この程度は日常茶飯事だ。"
10038020-270 = "[s] \"こんな時でもいつも通りでいられるのはすごいことだよ。\""
10038020-274 = "え、えっ……？"
10038020-275 = "そ、そんな事を言われても別に嬉しくなどないぞ？"
10038020-276 = "あくまでも私は粛々と、ハードボイルドに任務を遂行するだけだからな。"
10038020-284 = "では私も部屋に戻るとしよう。#n断じて疲れているわけではないからな！"
10038020-285 = "ふっ、分かっていてくださったか。#nやはり先生は私の理解者だな。それでは、失礼する。"
10038020-290 = "伝え忘れていたが、先生も……一応、外部の人間になる。#nだから、その……"
10038020-291 = "ええと……"
10038020-292 = "……しばらくは、あまり目立たないようにすることだな。"
10038020-293 = "そうだな……誰かと長く通話をするだとか――"
10038020-294 = "門主様がお忍びで出ていったとしても、それについて行ったりするだとか……。"
10038020-295 = "[s1] \"そっか、今の山海経はかなり不安定だもんね。\"\n[s2] \"できるかぎり善処するけど、どうしようもない時はごめんね。\""
10038020-298 = "すまない……力及ばず面目ない。"
10038020-299 = "先生が善処してくださっても、どうにもならない時もある……それだけは理解していてくれ。"
10038020-300 = "わかっているからゆっくり休んで来い？い、言ったな！#n私は断じて疲れているから席を外すわけでは……！"
10038020-306 = "分かった……！分かったから押さないでくれ！"
10038020-311 = "（人がいなくなると急に部屋が静かに感じられる……）"
10038020-317 = "（端末を取り出したものの、今はどこかに連絡をとるのは控えるべきだろう）"
10038020-321 = "（そういえば……）"
10038020-323 = "現状、「若返る」以外の現象はまだ観察されておりません。また、例外的に訓育支援部、梅花園の園児は影響を受けないとのことです！以上です！"
10038020-326 = "だが、少なくとも若返り現象が起こる生徒の急増は抑えられているだろう？#n無駄ではない。"
10038020-330 = "[ns] \"これって……もしかして。\""
10038020-333 = "（ふと、一人生徒の顔が浮かぶ）"
10038020-337 = "（通話は避けるべきだろう。そっとモモトークを開いた）"
10038020-338 = "[ns] \"「お疲れ様、シュン。今何してるの？」と送る……。\""
10038020-345 = "「あら、先生？ご無沙汰しております」"
10038020-346 = "「先生からご連絡いただけるなんて……今日は良いことがあるかもしれませんね」"
10038020-347 = "「そういえば、いま山海経にいらっしゃってるのですよね？お時間があればぜひ梅花園にお立ち寄りください」"
10038020-348 = "[s] \"「行きたいのは山々なんだけど、ちょっと事情があってね……」\""
10038020-349 = "「事情、ですか……？」"
10038020-352 = "（シュンに今の状況と玄龍門で起きていることを説明した）"
10038020-355 = "「……」"
10038020-356 = "「そうだったのですね。そんなことが……」"
10038020-360 = "「ふふっ、私にいい案があります。少々お待ちいただけますか？」"
10038020-361 = "「先生がこうしてモモトークでご連絡くださって良かった」"
10038020-362 = "[s] \"「ん？どういう意味？」\""
10038020-366 = "「少々お待ち下さいね。すぐに分かりますから」"
10038020-371 = "？"
10038020-377 = "こんにちは、先生！"
10038020-382 = "[ns] \"シュ……シュエリン！\""
10038020-383 = "はい！先生のシュエリンです！"
10038020-384 = "ふふっ。玄龍門といえども、梅花園の園児を無碍に扱うことはできませんから。#nなので、私の方からお伺いしたんです。"
10038020-385 = "あ！私が梅花園の園児かどうかは、気にするところではありませんからね？"
10038020-386 = "どうしてシュエリンの姿なのかは……その……"
10038020-387 = "私も「若返り現象」の影響で……。"
10038020-388 = "あ、大丈夫です！ココナちゃんにはまだ見つかってませんし、他の園児にも気づかれていません。"
10038020-395 = "しかし、子供の身体は良いですね。#n肩こりもないですし、身体も軽くて……！"
10038020-399 = "あ、でもこんなことをしている場合じゃありません！#n門主様をお助けしないと。"
10038020-400 = "何をするつもりかは……ふふ、見てのお楽しみです。"
10038020-403 = "本当に……シュン教官なのか？"
10038020-404 = "はい。何度も確認した通り、私はシュンです。"
10038020-405 = "ああ……たしかに、シュン教官しか知り得ない事を知っておる。#nじゃが、それでもにわかには信じ難い。"
10038020-406 = "それに……其方、そのような性格じゃったか？"
10038020-410 = "えっ！？わ、私は元からこうですよ……？"
10038020-411 = "ふむ……まぁよい。そういうことにしておこう。#nこれで、シュン教官との秘密が、また一つ増えたことになるのじゃな。"
10038020-412 = "そうなりますね。ですが、あまり重く捉えないでください。"
10038020-413 = "そうじゃな。#nして、本題に移ろうか。"
10038020-417 = "其方の気持ちは嬉しいが、一体、どう助けるつもりなのじゃ？"
10038020-419 = "それはですね……"
10038020-426 = "[ns] \"これは……梅花園の制服？\""
10038020-427 = "はい！ただ、必須ではないので、園児が全員着ているわけではありませんが……"
10038020-428 = "これを着ていれば梅花園の園児に見えるかと！"
10038020-429 = "それを着て、どうするのじゃ？"
10038020-430 = "ふふ……"
10038020-435 = "こういう変装は「慣れている」のではありませんか、門主様？"
10038020-439 = "……ふむ。"
10038020-440 = "そうさな……梅花園の園児は、「若返り現象」の影響を受けないからのう。"
10038020-441 = "お忍びで抜け出す際も、変装すれば誰にも疑われぬということか。"
10038020-442 = "ふふ……私は何も申し上げていませんよ！"
10038020-443 = "其方も相変わらずじゃのう。#nやはり人を人たらしめるのは、本質か。"
10038020-455 = "ふむ、これでどうじゃろうか。"
10038020-456 = "わぁ！よくお似合いです！"
10038020-457 = "[s] \"えっと……これって……。\""
10038020-461 = "うん？どこか変なところでもあるのか？"
10038020-462 = "[s] \"違和感がなさすぎるのが問題というか……。\""
10038020-463 = "ふふ。そうか。#nしかし、まだじゃ。これでは到底完璧な変装とは言えぬ。"
10038020-464 = "そうさな……重要な部分がまだ足りぬ。"
10038020-465 = "……"
10038020-471 = "こんにちは、先生！私、キキって言います！#n私たち、これから山海経の観光をするんですよね？"
10038020-473 = "……！"
10038020-474 = "ええ、そうですよキキちゃん！今からガイドの先生と一緒に、梅花園を見に行くんです！"
10038020-475 = "わーい！"
10038020-476 = "わーい！"
10038020-481 = "[ns] 倒れる。"
10038020-486 = "あ、先生が倒れてしまいました……"
10038020-487 = "うむ……少しやり過ぎてしまったかの……"
10038020-492 = "でも、キキはキキですから！慣れてくださいね、先生！"
10038020-494 = "キキちゃんの言う通りです！先生、早く起きてください！#n子供たちは山海経の未来ですよね？"
10038020-496 = "（そうして、キキ（？）とシュエリンと共に……）"
10038020-497 = "（色々なことでギリギリの精神を保ちながら……）"
10038020-500 = "（楽しい山海経ツアー（？）が、幕を開けたのであった！）"
