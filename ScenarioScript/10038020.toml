[translation]
10038020-1 = "Episódio 2; Rumores"
10038020-7 = "Ah, Sensei. Por aqui."
10038020-8 = "[s] \"É raro a Reijo me chamar. Fico feliz.\""
10038020-9 = "Fico feliz que diga isso, eu também estou contente."
10038020-10 = "Bem... esta é uma sala de chá localizada no ponto mais profundo de Tougenkyou —"
10038020-11 = "É um lugar que costumamos usar quando precisamos discutir assuntos internos da Associação Genbu."
10038020-12 = "[s] \"Por isso a atmosfera é diferente do habitual, né.\""
10038020-13 = "Sim. E como esta é uma sala à prova de som, nossas conversas não vazarão para fora."
10038020-14 = "Chamei o Sensei aqui propositalmente para... falar em particular sobre a situação atual da Associação Genbu."
10038020-15 = "Imagino que já saiba, mas... a Associação Genbu está restringindo a entrada de pessoas no momento."
10038020-16 = "A presidente acabou se tornando uma criança... e atualmente está sob a proteção da Genryumon."
10038020-17 = "Por causa disso... eu me tornei temporariamente a responsável pela Associação Genbu."
10038020-18 = "Sinceramente, é um fardo pesado demais para mim. #nAté agora meu estômago dói... mal consegui dormir ontem."
10038020-19 = "Não sei se posso chamar isso de sorte em meio ao azar... mas como toda a Associação Genbu suspendeu suas operações, não há necessidade de administrar o comércio."
10038020-20 = "É difícil dizer se isso é realmente algo bom, no entanto..."
10038020-21 = "[s] \"Isso não é um problema grave!?\""
10038020-22 = "Sim... a situação é bastante séria. #nBem, na verdade não é tanto assim... só estava brincando um pouco."
10038020-23 = "Dito isso, senti que precisava informar o Sensei sobre a situação em que a Presidente Rumi não pode agir e sobre os rumores que circulam em Shanhaijing..."
10038020-24 = "Claro, estou ciente de que o Sensei foi convidado pela Genryumon e está em Shanhaijing."
10038020-25 = "Mas, sobre a situação atual da Associação Genbu, provavelmente a Genryumon não lhe contará."
10038020-26 = "Você tem uma reunião com os executivos da Genryumon logo mais, não tem?"
10038020-27 = "Pensei que, antes disso, transmitir a nossa situação e o nosso ponto de vista daria ao Sensei mais material para suas decisões."
10038020-28 = "[s] \"Obrigado... entendi como as coisas estão agora.\""
10038020-29 = "Peço desculpas por envolvê-lo nos assuntos internos de Shanhaijing. Não gosto muito de usar essa expressão, mas... é o que se espera nestes tempos."
10038020-36 = "Além disso, um rumor sobre uma certa aluna está se espalhando pelas ruas..."
10038020-37 = "[s] \"Essa aluna... seria por acaso Shintani Kai?\""
10038020-41 = "Sim, mas... #nComo o Sensei sabe esse nome...?"
10038020-44 = "（Contei sobre a conversa com Kisaki）"
10038020-47 = "Então foi isso. #nA Mestra da Porta..."
10038020-48 = "……"
10038020-49 = "Sim. Atualmente, o rumor sobre Shintani Kai está se espalhando principalmente entre as alunas do terceiro ano."
10038020-50 = "O fato de estar centrado no terceiro ano é o que complica... as alunas do primeiro e segundo ano não sabem de nada ou acham que é apenas uma lenda urbana, então não há com o que se preocupar."
10038020-51 = "Começando pelo rumor dela, outros boatos inquietantes têm surgido — agora, Shanhaijing está no meio do caos."
10038020-52 = "Existem até rumores que usam o encontro anterior como alvo de críticas..."
10038020-53 = "Bem... especificamente —"
10038020-56 = "Falando nisso, o que aconteceu com a Presidente Kaguya do Clube de Ópera de Pequim?"
10038020-57 = "Dizem oficialmente que ela está em autoexílio, mas... #ncorre o boato de que ela foi presa por questionar a Genryumon."
10038020-60 = "Mas sabe... se Shintani Kai realmente voltou..."
10038020-61 = "A Mestra da Porta pode ter feito alguma coisa, né..."
10038020-64 = "Uma aluna que foi expulsa e até chamada de Sete Prisioneiros..."
10038020-65 = "Não tem como ela voltar para Shanhaijing sem mais nem menos..."
10038020-67 = "Ué, mas... não foi a Mestra da Porta quem expulsou a Kai?"
10038020-68 = "Será que não tem algo por trás disso também...?"
10038020-71 = "O clima está estranho. Será que vai ficar tudo bem assim?"
10038020-76 = "Dá para confiar na Genryumon? Não entendo o que a Mestra da Porta está pensando..."
10038020-79 = "Desse jeito, as alunas que ouvem os rumores estão expressando sua ansiedade..."
10038020-80 = "A desconfiança em relação à Genryumon está crescendo, principalmente entre as do terceiro ano."
10038020-81 = "……Claro, nós da Associação Genbu e a Genryumon não nos damos muito bem. Isso é um fato."
10038020-82 = "Mas também é verdade que as atividades da Associação Genbu só existem porque a Genryumon está presente."
10038020-83 = "Eu entendo isso. Só que, esse jeito de procurar pelo em ovo e..."
10038020-84 = "Dizem que isso vai contra a tradição, que estamos jogando fora o orgulho de Shanhaijing...#nE ficam reclamando de tudo, atrapalhando o nosso trabalho... É realmente irritante!"
10038020-88 = "Peço perdão, acabei me desviando do assunto.#nHaa... Será que tudo isso está acontecendo porque o Festival do Luar está se aproximando?..."
10038020-89 = "[s] \"O Festival do Luar tem alguma relação com isso?\""
10038020-93 = "Bem... Primeiro, o quanto você sabe sobre o Festival do Luar, Sensei?"
10038020-95 = "Entendo... Um evento sazonal para rezar por uma boa colheita e celebrar os frutos do ano...#nSim, esse é o entendimento geral."
10038020-96 = "…Mas o Festival do Luar também tem um lado um pouco diferente."
10038020-97 = "Existe uma lenda de que, por volta do Festival do Luar, um imortal que partiu para a lua desce ao mundo terreno..."
10038020-98 = "[s] \"Imortal?\""
10038020-102 = "Chamamos de imortal aquele que, após muito treinamento e iluminação, tornou-se um ser especial."
10038020-103 = "O Festival do Luar também tem o aspecto de homenagear esses imortais."
10038020-104 = "Diz a lenda que o imortal que partiu para a lua retorna a estas terras, percorre o mundo terreno e, depois, parte em uma nova jornada."
10038020-105 = "E então — dizem que, quando o imortal chega, coisas estranhas começam a acontecer."
10038020-106 = "Sim... A série de fenômenos que está ocorrendo agora em Shanhaijing fez com que algumas pessoas começassem a pensar que pode haver uma relação com o Festival do Luar."
10038020-110 = "Pessoalmente, eu achava que não passava de superstição, mas..."
10038020-111 = "Com tantas coisas estranhas acontecendo uma atrás da outra, começo a pensar que talvez seja verdade..."
10038020-113 = "(Depois de ouvir os rumores de Reijo, fui imediatamente para o Portão do Dragão Negro.)"
10038020-120 = "(A reunião no Portão do Dragão Negro estava um caos absoluto.)"
10038020-121 = "Mesmo restringindo o acesso à Associação Comercial Genbu, o fenômeno de rejuvenescimento continua se espalhando...#nPrecisamos de medidas urgentes!"
10038020-122 = "Para começar, a causa ainda não foi identificada!#nAté quando continuaremos com essa investigação que não traz resultados?"
10038020-123 = "A investigação não só está difícil, como não vemos um fim, e o pessoal no local está exausto."
10038020-128 = "Mas, pelo menos, o aumento repentino de estudantes sofrendo com o rejuvenescimento foi contido, não foi?#nNão é um esforço inútil."
10038020-130 = "Mas... é fisicamente impossível monitorar e proteger todas as estudantes. #nNão acredito que o fenômeno vá parar sem que a causa fundamental seja descoberta!"
10038020-131 = "Por favor, Mestra do Portão!#nO que faremos com a realização do Festival do Luar...!"
10038020-138 = "Contenha-se! Você está diante da Mestra do Portão!"
10038020-144 = "— Não importa. Agora é o momento de ouvir o que o pessoal tem a dizer."
10038020-145 = "Além disso, a situação é delicada. É compreensível que estejam ansiosos."
10038020-146 = "— Pode continuar."
10038020-151 = "Sim! Além disso, rumores sinistros continuam se espalhando..."
10038020-152 = "Se fossem apenas boatos, não seria um problema, mas entre algumas estudantes, surgiram vozes questionando o atual Portão do Dragão Negro..."
10038020-153 = "Somado à suspensão do Clube de Ópera de Pequim e ao desaparecimento de Kaguya, o número de estudantes que duvidam do Portão do Dragão Negro está aumentando."
10038020-154 = "Está mais difícil trabalhar do que antes... Sinto que, a qualquer momento, posso ser alvo de hostilidade ou olhares frios..."
10038020-156 = "Hum... Isso é um problema. #nE quanto a vocês, qual é a sua opinião sobre a situação atual?"
10038020-161 = "..."
10038020-162 = "…É muito difícil dizer, mas..."
10038020-164 = "Pode falar, eu permito."
10038020-170 = "Acho que o Festival do Luar deste ano deveria ser realizado apenas por Shanhaijing."
10038020-175 = "Isso é...!"
10038020-176 = "Diretora Executiva Mina... Infelizmente, muitas estudantes estão culpando estudantes de outras escolas pelo que está acontecendo."
10038020-182 = "..."
10038020-183 = "Se realizarmos o Festival do Luar como de costume nesta situação, desta vez, com certeza haverá estudantes que se rebelarão contra o Portão do Dragão Negro."
10038020-184 = "C-claro, poderíamos realizar como sempre e tentar mostrar que não há problemas em Shanhaijing. Mas..."
10038020-185 = "..."
10038020-187 = "— Então, você quer dizer que não podemos simplesmente ignorar os problemas que já existem."
10038020-188 = "Se for esse o caso, precisamos reconhecê-los — e tomar medidas."
10038020-189 = "Mestra do Portão...!"
10038020-191 = "I-isso é... bem...!"
10038020-196 = "Minha suposição está errada?"
10038020-201 = "N-não. Pelo contrário, agradeço por ter compreendido tão bem. #nMas..."
10038020-203 = "— Então, isso significa que apenas isso não é o suficiente. Entendido."
10038020-207 = "..."
10038020-211 = "Então... o Festival do Luar desta vez será realizado apenas por Shanhaijing. Portanto, a entrada de qualquer pessoa de fora está estritamente proibida."
10038020-216 = "Mestra da Porta!"
10038020-217 = "Mestra da Porta...!"
10038020-219 = "Além disso, as restrições de acesso à Associação Comercial Genbu permanecem como estão. No entanto, estudantes que forem protegidas e tiverem sua segurança confirmada terão permissão para transitar livremente."
10038020-225 = "..."
10038020-226 = "Devemos lidar com boatos com uma atitude firme, mas sempre há uma chance em um milhão de algo acontecer."
10038020-227 = "E, a partir deste momento, reforcem a segurança em todo o território de Shanhaijing."
10038020-228 = "Esta é a decisão da Mestra da Porta da Genryumon, Kisaki Ryuge."
10038020-230 = "Entendido, Mestra da Porta!"
10038020-231 = "Anunciaremos imediatamente!"
10038020-236 = "Realmente, tem certeza de que isso é o melhor...?"
10038020-237 = "Sim. Agora, devemos priorizar as vozes de quem está no campo de batalha."
10038020-238 = "..."
10038020-239 = "Bem, vou fazer uma inspeção. Mina, prepare-se."
10038020-243 = "...!? Não, não pode, Mestra da Porta! O local ficará um caos...! Por favor, não vá agora."
10038020-244 = "Isso é uma opinião da Konoe Mina ou da Chefe do Departamento de Execução? Qual das duas?"
10038020-245 = "...!"
10038020-252 = "É uma advertência da Chefe do Departamento de Execução."
10038020-253 = "Gostaria que confiasse em nossos subordinados... e na Genryumon."
10038020-257 = "...Entendo."
10038020-261 = "Entendido. Sendo assim, voltarei para meus aposentos. Avise-me imediatamente se algo acontecer."
10038020-262 = "Sim, Mestra da Porta."
10038020-267 = "Haaaaa..."
10038020-268 = "[s] \"Bom trabalho, Mina...\""
10038020-269 = "Hmph... isso é algo que acontece todo dia."
10038020-270 = "[s] \"É incrível que você consiga agir normalmente mesmo em momentos assim.\""
10038020-274 = "E-eh...?"
10038020-275 = "Mesmo que me diga isso, não é como se eu estivesse feliz, sabe?"
10038020-276 = "Eu apenas cumpro meu dever de forma calma e durona, só isso."
10038020-284 = "Bem, vou voltar para o meu quarto também. Não é porque estou cansada, de jeito nenhum!"
10038020-285 = "Hmph, você entendeu, não é? Como esperado do Sensei, você me compreende. Com licença."
10038020-290 = "Esqueci de mencionar, mas o Sensei também... tecnicamente, é uma pessoa de fora. Então, sabe..."
10038020-291 = "Bem..."
10038020-292 = "...por enquanto, tente não chamar muita atenção."
10038020-293 = "Tipo... não fique conversando por muito tempo com alguém..."
10038020-294 = "Ou, se a Mestra da Porta sair escondida, não tente segui-la..."
10038020-295 = "[s1] \"Entendi, Shanhaijing está bem instável agora, né.\"\n[s2] \"Farei o meu melhor, mas me desculpe se não houver nada que eu possa fazer.\""
10038020-298 = "Sinto muito... não tenho poder suficiente, é uma vergonha."
10038020-299 = "Mesmo que o Sensei tente ajudar, haverá momentos em que não haverá nada a ser feito... Apenas entenda isso."
10038020-300 = "Eu sei, então vá descansar um pouco, certo? E-eu disse isso!"
10038020-306 = "Entendi...! Eu entendi, então não me empurre!"
10038020-311 = "(Quando as pessoas vão embora, o quarto parece subitamente silencioso...)"
10038020-317 = "(Embora eu tenha pegado meu terminal, provavelmente é melhor evitar entrar em contato com alguém agora.)"
10038020-321 = "(Falando nisso...)"
10038020-323 = "Atualmente, nenhum fenômeno além do \"rejuvenescimento\" foi observado. Além disso, como exceção, as crianças do Departamento de Apoio Educacional e do Jardim de Infância Baika não foram afetadas! É só isso!"
10038020-326 = "Mas, pelo menos, o aumento repentino de estudantes sofrendo o rejuvenescimento foi contido, não foi? Não foi em vão."
10038020-330 = "[ns] \"Isso é... será que.\""
10038020-333 = "(De repente, o rosto de uma estudante vem à mente.)"
10038020-337 = "(É melhor evitar chamadas. Abri o MomoTalk silenciosamente.)"
10038020-338 = "[ns] \"Enviei: 'Bom trabalho, Shun. O que está fazendo agora?'\""
10038020-345 = "「Ora, Sensei? Há quanto tempo.」"
10038020-346 = "「Fico surpresa em receber uma mensagem sua... Talvez hoje seja um dia de sorte.」"
10038020-347 = "「Falando nisso, você está em Shanhaijing agora, não é? Se tiver um tempo, por favor, passe no Jardim das Ameixeiras.」"
10038020-348 = "[s] \"「Eu adoraria ir, mas estou com um problema no momento...」\""
10038020-349 = "「Um problema, você diz...?」"
10038020-352 = "（Expliquei a Shun a situação atual e o que está acontecendo no Portão do Dragão Misterioso）"
10038020-355 = "「...」"
10038020-356 = "「Entendo. Então foi isso que aconteceu...」"
10038020-360 = "「Fufu, eu tenho um bom plano. Poderia esperar um pouco?」"
10038020-361 = "「Ainda bem que você entrou em contato pelo MomoTalk.」"
10038020-362 = "[s] \"「Hm? O que quer dizer com isso?」\""
10038020-366 = "「Espere só um instante. Você entenderá logo.」"
10038020-371 = "？"
10038020-377 = "Olá, Sensei!"
10038020-382 = "[ns] \"Shu... Shuerin!?\""
10038020-383 = "Sim! Sou eu, a Shuerin do Sensei!"
10038020-384 = "Fufu. Mesmo sendo o Portão do Dragão Misterioso, eles não podem tratar mal uma criança do Jardim das Ameixeiras.#nPor isso, eu mesma vim até aqui."
10038020-385 = "Ah! Não se preocupe se eu sou realmente uma criança do Jardim das Ameixeiras ou não, está bem?"
10038020-386 = "Sobre o porquê de eu estar na forma da Shuerin... bem..."
10038020-387 = "Eu também fui afetada pelo \"fenômeno de rejuvenescimento\"..."
10038020-388 = "Ah, não se preocupe! A Kokona-chan ainda não me encontrou, e as outras crianças também não notaram."
10038020-395 = "Mas, sabe, ter um corpo de criança é muito bom.#nNão sinto dores nos ombros e meu corpo está tão leve...!"
10038020-399 = "Ah, mas não é hora para isso!#nPrecisamos ajudar a Mestra do Portão."
10038020-400 = "O que eu pretendo fazer... fufu, é uma surpresa."
10038020-403 = "Você é... realmente a instrutora Shun?"
10038020-404 = "Sim. Como confirmei várias vezes, eu sou a Shun."
10038020-405 = "Ah... de fato, você sabe coisas que apenas a instrutora Shun saberia.#nMas, ainda assim, é difícil de acreditar."
10038020-406 = "Além disso... você sempre teve essa personalidade?"
10038020-410 = "Hã!? E-eu sempre fui assim...?"
10038020-411 = "Hum... bem, tudo bem. Vamos deixar assim.#nIsso significa que agora temos mais um segredo compartilhado com a instrutora Shun."
10038020-412 = "É verdade. Mas, por favor, não leve isso tão a sério."
10038020-413 = "Tem razão.#nAgora, vamos ao que interessa."
10038020-417 = "Agradeço a sua intenção, mas como exatamente você pretende ajudar?"
10038020-419 = "É o seguinte..."
10038020-426 = "[ns] \"Isso é... o uniforme do Jardim das Ameixeiras?\""
10038020-427 = "Sim! Mas não é obrigatório, então nem todas as crianças usam..."
10038020-428 = "Acho que se você vestir isso, parecerá uma criança do Jardim das Ameixeiras!"
10038020-429 = "E o que eu farei vestindo isso?"
10038020-430 = "Fufu..."
10038020-435 = "Você não está \"acostumada\" com esse tipo de disfarce, Mestra do Portão?"
10038020-439 = "......Hum."
10038020-440 = "É verdade... as crianças do Jardim das Ameixeiras não são afetadas pelo \"fenômeno de rejuvenescimento\"."
10038020-441 = "Então, se eu me disfarçar, ninguém suspeitará quando eu sair escondida."
10038020-442 = "Fufu... eu não disse nada!"
10038020-443 = "Você continua a mesma de sempre.#nRealmente, o que define uma pessoa é a sua essência."
10038020-455 = "Hum, o que acha disso?"
10038020-456 = "Uau! Ficou muito bem em você!"
10038020-457 = "[s] \"Bem... isso é...\""
10038020-461 = "Hm? Tem algo estranho?"
10038020-462 = "[s] \"O problema é que não parece nem um pouco estranho...\""
10038020-463 = "Fufu. Entendo. #nMas ainda não. Isso não pode ser chamado de um disfarce perfeito de jeito nenhum."
10038020-464 = "Vejamos... ainda falta a parte mais importante."
10038020-465 = "……"
10038020-471 = "Olá, Sensei! Meu nome é Kiki! #nNós vamos fazer um tour por Shanhaijing agora, não vamos?"
10038020-473 = "……！"
10038020-474 = "Sim, é isso mesmo, Kiki-chan! Vamos acompanhar o Sensei guia para visitar o Jardim das Flores de Ameixa agora!"
10038020-475 = "Eba!"
10038020-476 = "Eba!"
10038020-481 = "[ns] Desmaia."
10038020-486 = "Ah, o Sensei desmaiou..."
10038020-487 = "Hum... será que exagerei um pouco?..."
10038020-492 = "Mas a Kiki é a Kiki! Por favor, se acostume, Sensei!"
10038020-494 = "A Kiki-chan tem razão! Sensei, levante-se logo! #nAs crianças são o futuro de Shanhaijing, não são?"
10038020-496 = "(E assim, junto com Kiki (?) e Xuelin...)"
10038020-497 = "(Mantendo a sanidade no limite com várias coisas...)"
10038020-500 = "(O divertido tour por Shanhaijing (?) finalmente começou!)"
