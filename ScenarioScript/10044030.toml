[translation]
10044030-1 = "第3話;さらに消えた列車を追って"
10044030-2 = "貨物駅"
10044030-5 = "えー、勝手に発車したの？また？"
10044030-6 = "私たちにも理由が分からず……そもそも時刻表に載ってない列車ですし……。"
10044030-8 = "おいかけっこー。"
10044030-9 = "や、やっぱり期待するから失望する羽目になるんだ……。"
10044030-11 = "[ns] \"行き先は分かる？\""
10044030-13 = "し、調べてみます……！"
10044030-15 = "こんなことしてる場合じゃないんだけどなー。"
10044030-16 = "見つけたらーフルスロットルー。"
10044030-17 = "ま、「なるようになる」っていうし？"
10044030-24 = "見つけました！列車は今、上り線を走行中です！"
10044030-25 = "お、追いかける方法は――"
10044030-26 = "ここからだとバスしかないですね。"
10044030-27 = "うっ……バス……。"
10044030-29 = "追いつければ何でもいいし！#n上にバレる前に早く行こ！"
10044030-30 = "バビューン、しゅばばばばー。"
10044030-39 = "……。"
10044030-40 = "……。"
10044030-42 = "バス来ないんだけど！！"
10044030-43 = "歩いたほうが早いかもー？"
10044030-44 = "なんで時間通りに来ないわけ？#nこの時刻表は飾りなの！？"
10044030-46 = "……。"
10044030-47 = "[s1] \"アオバ、大丈夫？\"\n[s2] \"ちょっと顔色悪いけど。\""
10044030-50 = "あ、はい……。"
10044030-51 = "……。"
10044030-52 = "じ、実は私……乗り物酔いが、ひどくて……。"
10044030-56 = "ふらふらー、げろげろー？"
10044030-57 = "はい……特にバスとか車だと――"
10044030-58 = "そ、想像するだけで……おぇ……。"
10044030-63 = "あーあ、これだから車は。列車なら酔いにくいのにね。"
10044030-64 = "はぁ……ふぅ……。"
10044030-65 = "はい……だから、ハイランダーに、入学したんです……。"
10044030-67 = "[ns3] \"ちょっとだけ乗るのも大変そう？\"\n[ns4] \"酔い止め薬買ってこようか。\""
10044030-74 = "バス来ちゃったよ！"
10044030-75 = "せ、先生……私は……大丈夫、なので……。"
10044030-76 = "まだ我慢できるうちに……早く行きましょう……！"
10044030-77 = "[s] \"本当に無理そうだったら言ってね。\""
10044030-78 = "は、はい……。"
10044030-85 = "遅かったじゃん！5分も待たされたんだけど！？"
10044030-86 = "ワハハッ！すまんすまん。渋滞に捕まってな。"
10044030-87 = "暴走族が暴れてたんで遅くなっちまった！"
10044030-89 = "バスはぜいじゃくー。"
10044030-90 = "線路なら邪魔者いないのにね。"
10044030-91 = "バスにはバスの長所があるもんさ。"
10044030-92 = "にしても、ハイランダーの生徒さんもバスに乗ることあるんだな。"
10044030-93 = "[s5] \"急ぎの用事がありまして。\"\n[s6] \"運転よろしくお願いします。\""
10044030-96 = "ま、とにかく座った座った！発車しまーす！"
10044030-106 = "背中トントンしてあげるー。"
10044030-107 = "お、お構いなく……。"
10044030-109 = "ヒカリ108式、サウザンドハンマー。"
10044030-116 = "あっ、あう……や、やめてください……余計に酔いが……。"
10044030-117 = "うっぷ――"
10044030-119 = "パヒャヒャッ！ビニール袋いる？いつでも言って！"
10044030-120 = "[ns] \"アオバ、大丈夫？深呼吸しよう。\""
10044030-121 = "すー……はぁぁ……世界は……本当にしんどいことばかりですけど……。"
10044030-122 = "ん？ハイランダーのみんな、どうかしたのかい？"
10044030-123 = "アオバがゲロ吐きそうだって！！"
10044030-124 = "ち、違います！！いや、違わないですけど！！！"
10044030-125 = "は、恥ずかしいので、大きな声で言わないで――"
10044030-126 = "おえっ……！き、ぎもぢわるぃ……。"
10044030-128 = "すまないが、もうちょっとの辛抱だ。"
10044030-129 = "できるだけ頑張ってみるからさ！"
10044030-130 = "アクセル全開でーちょっぱやー？"
10044030-131 = "はっはっは、そりゃ無理だな。ダイヤは守らないと。"
10044030-132 = "列車といっしょー。"
10044030-133 = "でもバスってすぐ遅れるじゃん？#n停留所が多すぎるんじゃない？"
10044030-134 = "その分、小回りが利くのが利点だからね。"
10044030-135 = "君たちだって、必要だからバスを使ってくれてるんだろう？ハハッ！"
10044030-136 = "パヒャヒャッ、今日はそういうことにしといてあげる！"
10044030-142 = "おっと、また暴走族だ。"
10044030-143 = "こらぁ！危ないぞ！"
10044030-144 = "うるせぇ！ノロマなデカブツは引っ込んでろ！"
10044030-145 = "あいつら……ったくもう！"
10044030-146 = "総長がお呼びだ～！急げ！"
10044030-147 = "[ns] \"また渋滞か……。\""
10044030-148 = "やっぱバスダメじゃん！なんとかならないの？"
10044030-149 = "もーむりー。"
10044030-150 = "ってか、前に進むだけなのに、なんで渋滞とかするわけ？"
10044030-152 = "……。"
10044030-153 = "背中トントンするー？"
10044030-154 = "い、いらない、です……ふぅ、ふぅ……。"
10044030-157 = "渋滞って理解できないんだけどさ――"
10044030-158 = "ハイランダーの生徒として、どう思う？"
10044030-159 = "こ、この話今しないとダメ……ですか？"
10044030-160 = "[s] \"アオバ、大丈夫？\""
10044030-161 = "こ、この二人さえ大人しければ、なんとか……。"
10044030-162 = "う、運転手さんも気遣ってくれているみたいですし……。"
10044030-164 = "おい！ソレはうちらに任せる約束だっただろ！？"
10044030-166 = "ククッ。理由はあなた方が一番よく分かっているのでは？"
10044030-167 = "雑な配達で貴重品を破損させ……事故を起こしてヴァルキューレに追われ……。"
10044030-168 = "そっ、それは……。"
10044030-169 = "でも、スピードならうちらが一番じゃんか！"
10044030-170 = "だって道路のアウトローなんだぜ？"
10044030-171 = "ええ、ええ、もちろん存じておりますとも。"
10044030-172 = "しかし、適材適所というものでして。#n今回の依頼は何より安全性を重視しておりますので。"
10044030-173 = "ゆえに、より安全が保障される鉄道輸送を選んだだけのことです。ククッ……。"
10044030-174 = "くそっ……うちらが負けた……？#nそんなの認めねぇぞ。"
10044030-175 = "それを決めるのはあなた方ではありませんよ。#nともあれ、話は以上です。では――"
10044030-176 = "まっ、待て！話はまだ――"
10044030-180 = "ちくしょう切りやがった！！"
10044030-181 = "うちらがどれだけこの仕事のために準備したか分かってんのか！？"
10044030-187 = "ボス、大丈夫……？"
10044030-188 = "ボスじゃねぇ！総長！！"
10044030-189 = "ご、ごめん……！"
10044030-190 = "……で、何の用だ？"
10044030-191 = "し、指示された通り、全員集まってるけど、どうする？"
10044030-192 = "……。"
10044030-193 = "こうなったら、やるしかない。"
10044030-194 = "なにを……？"
10044030-199 = "奪われたチャンスは、自分たちの手で取り戻すんだ！"
10044030-201 = "おお……！なんかカッコいい！"
10044030-202 = "うちらの仕事を横取りしたやつめ……覚悟しろよ……！"
10044030-206 = "ハイランダーのみんな！ここで降りるんだよな？"
10044030-207 = "やっと着いた……。"
10044030-208 = "アワートレイン、どこかなー。"
10044030-210 = "[ns] \"アオバ、具合はどう？\""
10044030-212 = "ぎ、ギリギリでしたが、なんとか……うっぷ……。"
10044030-213 = "よく我慢した。偉いぞ！"
10044030-214 = "お、おかげさまで……ありがとうございます……。"
10044030-215 = "ハハッ！いつだってお客様第一だからな！"
10044030-216 = "バスだって悪かないだろ？"
10044030-217 = "は、はい……。"
10044030-218 = "そもそもバスに乗らなきゃ酔わなかったよね？"
10044030-219 = "列車は快適ー。"
10044030-220 = "よ、余計な事言わないで欲しいんですけど……。"
10044030-224 = "でもまあ、ちょっとだけ見直したかも？パヒャヒャッ！"
10044030-225 = "またくるねーじゃねー。"
10044030-226 = "ああ！"
10044030-228 = "[ns] \"ありがとうございました！\""
10044030-232 = "背中トントンーもう大丈夫ー？"
10044030-233 = "そ、それ、叩きたいだけですよね……？"
10044030-235 = "ちゃっちゃと列車を回収するよ！"
