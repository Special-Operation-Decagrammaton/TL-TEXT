[translation]
10044030-1 = "Episódio 3; Perseguindo o trem que desapareceu novamente"
10044030-2 = "Estação de Carga"
10044030-5 = "Ei, ele partiu sozinho? De novo?"
10044030-6 = "Nós também não sabemos o motivo... Além disso, é um trem que nem consta no horário..."
10044030-8 = "Hora da perseguição."
10044030-9 = "É, eu sabia que criar expectativas só levaria à decepção..."
10044030-11 = "[ns] \"Sabe para onde ele vai?\""
10044030-13 = "V-vou verificar...!"
10044030-15 = "Não que a gente tenha tempo para isso, mas enfim."
10044030-16 = "Se encontrar, é aceleração total."
10044030-17 = "Bem, dizem que \"o que tiver que ser, será\", né?"
10044030-24 = "Encontrei! O trem está circulando na linha ascendente agora!"
10044030-25 = "E-e como vamos persegui-lo?"
10044030-26 = "A partir daqui, só tem ônibus."
10044030-27 = "Ugh... ônibus..."
10044030-29 = "Qualquer coisa serve, desde que a gente alcance! #nVamos logo antes que o pessoal de cima descubra!"
10044030-30 = "Vrum, vrum, vrum."
10044030-39 = "..."
10044030-40 = "..."
10044030-42 = "O ônibus não chega nunca!!"
10044030-43 = "Será que é mais rápido ir a pé?"
10044030-44 = "Por que não chega no horário? #nEsse quadro de horários é só enfeite!?"
10044030-46 = "..."
10044030-47 = "[s1] \"Aoba, você está bem?\"\n[s2] \"Você está com uma cara meio pálida.\""
10044030-50 = "Ah, sim..."
10044030-51 = "..."
10044030-52 = "N-na verdade, eu... tenho muito enjoo de movimento..."
10044030-56 = "Tonta, querendo vomitar?"
10044030-57 = "Sim... especialmente em ônibus ou carros..."
10044030-58 = "S-só de imaginar... ugh..."
10044030-63 = "Ah, é por isso que odeio carros. Se fosse um trem, não seria tão ruim."
10044030-64 = "Haa... fuuu..."
10044030-65 = "Sim... é por isso que eu me matriculei na Highlander..."
10044030-67 = "[ns3] \"Parece difícil até para viagens curtas?\"\n[ns4] \"Quer que eu compre um remédio para enjoo?\""
10044030-74 = "O ônibus chegou!"
10044030-75 = "S-Sensei... eu... estou bem, então..."
10044030-76 = "Enquanto eu ainda aguento... vamos logo...!"
10044030-77 = "[s] \"Me avise se ficar impossível, viu?\""
10044030-78 = "S-sim..."
10044030-85 = "Demorou, hein! Fiquei esperando por 5 minutos!?"
10044030-86 = "Wahahaha! Foi mal, foi mal. Peguei um engarrafamento."
10044030-87 = "Teve uma gangue de motoqueiros causando, por isso atrasei!"
10044030-89 = "Ônibus é frágil."
10044030-90 = "Nos trilhos não tem ninguém para atrapalhar, né."
10044030-91 = "Ônibus têm suas próprias vantagens."
10044030-92 = "Mas, ainda assim, é raro ver alunas da Highlander andando de ônibus."
10044030-93 = "[s5] \"Estamos com pressa.\"\n[s6] \"Por favor, dirija com cuidado.\""
10044030-96 = "Bem, de qualquer forma, sentem-se! Vamos partir!"
10044030-106 = "Vou dar tapinhas nas suas costas."
10044030-107 = "N-não precisa se incomodar..."
10044030-109 = "Hikari estilo 108, Martelo Milenar."
10044030-116 = "Ah, au... p-por favor, pare... isso só está me deixando mais enjoada..."
10044030-117 = "Ugh—"
10044030-119 = "Pahyahya! Quer um saco plástico? É só pedir!"
10044030-120 = "[ns] \"Aoba, você está bem? Vamos respirar fundo.\""
10044030-121 = "Suuu... haaa... o mundo... é realmente cheio de coisas exaustivas..."
10044030-122 = "Hm? Pessoal da Highlander, aconteceu alguma coisa?"
10044030-123 = "A Aoba disse que vai vomitar!!"
10044030-124 = "N-não é isso!! Quer dizer, não é que não seja, mas!!!"
10044030-125 = "É-é vergonhoso, então não fale tão alto—"
10044030-126 = "Oeh...! E-estou me sentindo tão mal..."
10044030-128 = "Sinto muito, mas aguente só mais um pouco."
10044030-129 = "Vou tentar o meu melhor!"
10044030-130 = "Acelerador no máximo e ir bem rapidinho?"
10044030-131 = "Hahaha, isso é impossível. Preciso seguir o horário."
10044030-132 = "Igual ao trem."
10044030-133 = "Mas ônibus não atrasam sempre? #nNão tem paradas demais?"
10044030-134 = "A vantagem é que ele é mais flexível por causa disso."
10044030-135 = "Vocês também usam o ônibus porque precisam, não é? Haha!"
10044030-136 = "Pahyahya, hoje vou deixar passar!"
10044030-142 = "Opa, lá vem os motoqueiros de novo."
10044030-143 = "Ei! Isso é perigoso!"
10044030-144 = "Cala a boca! Saia da frente, seu trambolho lento!"
10044030-145 = "Esses caras... ah, fala sério!"
10044030-146 = "O chefe está chamando! Rápido!"
10044030-147 = "[ns] \"Outro engarrafamento...\""
10044030-148 = "Viu só, ônibus não presta! Não dá para fazer alguma coisa?"
10044030-149 = "Não dá mais."
10044030-150 = "E outra, por que tem engarrafamento se é só seguir em frente?"
10044030-152 = "..."
10044030-153 = "Quer que eu dê tapinhas nas suas costas?"
10044030-154 = "N-não precisa... fuu, fuu..."
10044030-157 = "Eu não consigo entender engarrafamentos—"
10044030-158 = "Como aluna da Highlander, o que você acha?"
10044030-159 = "P-precisamos mesmo falar disso agora...?"
10044030-160 = "[s] \"Aoba, você está bem?\""
10044030-161 = "S-se essas duas ficassem quietas, eu conseguiria..."
10044030-162 = "E o motorista também parece estar sendo atencioso..."
10044030-164 = "Ei! Tínhamos um acordo de que isso ficaria com a gente!?"
10044030-166 = "Hehe. O motivo não é algo que vocês mesmas conhecem melhor do que ninguém?"
10044030-167 = "Entregas descuidadas que danificaram itens valiosos... causaram acidentes e foram perseguidas pela Valkyrie..."
10044030-168 = "I-isso é..."
10044030-169 = "Mas quando se trata de velocidade, nós somos as melhores!"
10044030-170 = "Afinal, somos as fora da lei das estradas, né?"
10044030-171 = "Sim, sim, estou ciente disso, é claro."
10044030-172 = "No entanto, cada coisa no seu lugar. #nO pedido desta vez prioriza a segurança acima de tudo."
10044030-173 = "Por isso, apenas escolhi o transporte ferroviário, que garante mais segurança. Hehe..."
10044030-174 = "Droga... nós perdemos...? #nEu não aceito isso."
10044030-175 = "Não cabe a vocês decidirem isso. #nDe qualquer forma, a conversa termina aqui. Então—"
10044030-176 = "E-ei, espere! A conversa ainda não—"
10044030-180 = "Droga, eles desligaram na nossa cara!!"
10044030-181 = "Eles têm noção de quanto a gente se preparou para esse trabalho!?"
10044030-187 = "Chefe, você está bem...?"
10044030-188 = "Não me chame de chefe! É Presidente!!"
10044030-189 = "De-desculpa...!"
10044030-190 = "……E então, o que você quer?"
10044030-191 = "Co-como você instruiu, estamos todas reunidas, o que vamos fazer?"
10044030-192 = "……."
10044030-193 = "Já que chegamos a esse ponto, não temos escolha a não ser agir."
10044030-194 = "Agir como...?"
10044030-199 = "Vamos recuperar a oportunidade que roubaram da gente com as nossas próprias mãos!"
10044030-201 = "Oh……! Isso soou bem legal!"
10044030-202 = "Pessoal que roubou o nosso trabalho... preparem-se……!"
10044030-206 = "Pessoal da Highlander! É aqui que a gente desce, né?"
10044030-207 = "Finalmente chegamos……."
10044030-208 = "Onde será que está o nosso trem?"
10044030-210 = "[ns] \"Aoba, como você está se sentindo?\""
10044030-212 = "Fo-foi por pouco, mas consegui aguentar... bleh……."
10044030-213 = "Você aguentou firme. Muito bem!"
10044030-214 = "O-obrigada... graças a você……."
10044030-215 = "Haha! O cliente sempre vem em primeiro lugar, afinal!"
10044030-216 = "Ônibus não são tão ruins, né?"
10044030-217 = "Si-sim……."
10044030-218 = "Mas se a gente não tivesse pegado o ônibus, você não teria enjoado, né?"
10044030-219 = "O trem é bem mais confortável."
10044030-220 = "Eu preferiria que você não dissesse coisas desnecessárias……."
10044030-224 = "Mas, bem, talvez eu tenha mudado um pouco de ideia? Pahyaha!"
10044030-225 = "Até a próxima!"
10044030-226 = "Até!"
10044030-228 = "[ns] \"Muito obrigada!\""
10044030-232 = "Vou dar tapinhas nas suas costas, já está melhor?"
10044030-233 = "Vo-você só quer bater nas minhas costas, né……?"
10044030-235 = "Vamos logo recuperar o trem!"
