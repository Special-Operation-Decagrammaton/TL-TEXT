[translation]
1005405-1 = "Agradecimentos de Maria"

1005405-2 = "Parque privado atrás da igreja"

1005405-3 = "(Visitei a Catedral da Trindade porque tive tempo livre pela primeira vez em muito tempo)"

1005405-4 = "(Estava aberto ao público, então eu estava andando livremente e o parque atrás da catedral apareceu.)"

1005405-9 = "Suspiro…suspiro…."

1005405-16 = "Ha, ha, ha, ha...."

1005405-17 = "[ns1] \"...Talvez.\"\n[ns2] \"Talvez alguém esteja correndo.\""

1005405-20 = "...Ah, isso."

1005405-21 = "……professor?"

1005405-22 = "[ns3] \"Olá, Marie.\"\n[ns4] \"Essa voz é...\""

1005405-29 = "Por que você está aqui...#nVocê está trabalhando?"

1005405-30 = "...Ah, isso não é verdade."

1005405-31 = "Não, por favor, venha a qualquer hora, mesmo que não seja trabalho. #nA catedral é um lugar aberto a todos."

1005405-32 = "Além disso, a professora está me ajudando muito... e eu agradeço."

1005405-33 = "...O que está errado? #nEu não suporto ser encarado tão de perto..."

1005405-34 = "...Ah, você está vestido assim?"

1005405-35 = "Terminei minha rotina diária de orar e limpar, então hoje só estava fazendo alguns exercícios."

1005405-36 = "Não tenho certeza se é considerado exercício, pois corri perto da catedral e fiz alguns alongamentos simples."

1005405-37 = "Hehe. Na verdade, tenho me exercitado desde então."

1005405-38 = "Olhando para trás, foi graças ao meu professor que comecei a me exercitar com roupas de ginástica."

1005405-39 = "No início fiquei preocupado se deveria participar do grande dia esportivo, mas..."

1005405-40 = "Eu sou quem sou hoje por causa das palavras do meu professor naquela época. #nPude descobrir a alegria do exercício e até desenvolvi alguns hábitos maravilhosos."

1005405-41 = "Hehe... estou repetindo a mesma coisa... mas estou muito grato. #nObrigado, senhor."

1005405-42 = "Se eu tiver outra chance, com certeza gostaria de participar."

1005405-43 = "Naquela época, tenho certeza de que serei mais bem comportado do que sou agora..."

1005405-44 = "[s5] \"Estou feliz por ter ajudado você. Estou torcendo por você.\"\n[s6] \"Olhar para Marie me deixa muito feliz.\""

1005405-47 = "professor……."

1005405-48 = "Já que você se deu ao trabalho de visitar a catedral... por favor, espere um momento."

1005405-49 = "Vou vestir roupas de irmã imediatamente, então, por favor, deixe-me acompanhá-la nas tarefas do professor. #nSe for sobre Trinity, acho que posso ajudar."

1005405-50 = "Você está bem......? #n, mas..."

1005405-51 = "……foto?"

1005405-52 = "Você quer continuar se exercitando? #nO que o professor fará durante esse período?"

1005405-53 = "Cuide de mim...? #nNão é uma coisa ruim, mas... sinto que estou ocupando o precioso tempo do professor, então sinto muito..."

1005405-54 = "Não é mesmo...? #nO que isso significa?"

1005405-55 = "[s7] \"Porque me sinto curado quando olho para Marie.\"\n[s8] \"Porque momentos como este são importantes.\""

1005405-58 = "O que isso significa...?"

1005405-59 = "……Entendido. #nJá que o professor está dizendo isso, deve haver alguma razão profunda por trás disso."

1005405-60 = "Pois bem...."

1005405-61 = "Farei o meu melhor!"

1005405-67 = "（…………）"
1005405-68 = "(Eu observei Marie se alongar e correr enquanto estava sentada no banco)"

1005405-69 = "(O tempo passou rapidamente enquanto eu olhava para Marie com suas roupas de ginástica.)"

1005405-74 = "Estou de volta agora…!"

1005405-75 = "Estava tudo bem? #nDemorou um pouco, então talvez eu tenha ficado entediado..."

1005405-76 = "...De jeito nenhum?"

1005405-77 = "Além disso, se eu fizer isso, não serei repreendido por ninguém, então ficarei mais tranquilo...?"

1005405-78 = "O que você quer dizer...? #nQuem diabos iria repreender o professor...?"

1005405-79 = "……piada? Ah... quase ri. #nAinda sou imaturo, então peço desculpas pelas muitas deficiências."

1005405-80 = "No entanto, estou feliz que você tenha se divertido. #nFico feliz em pensar que consegui ajudar a professora também."

1005405-81 = "Se me ver fazer exercícios deixa meu professor à vontade, acho que podemos continuar nos divertindo no futuro!"

1005405-82 = "(Da próxima vez prepararei doces e bebidas para que a professora descanse mais devagar...)"

1005405-83 = "Estar neste parque me faz sentir muito relaxado."

1005405-84 = "Os professores também são bem-vindos."

1005405-85 = "...O horário de atendimento ao público está definido, por isso não sei dizer quando será aberto ao público."

1005405-86 = "[s9] \"Tudo bem. Então irei quando Marie estiver aí.\"\n[s10] \"Se você se cansar de se exercitar sozinho, é só me ligar.\""

1005405-89 = "...eu, vou convidar o professor..."

1005405-93 = "...Hehe."

1005405-94 = "...Sim, eu entendo. #nSe for esse o caso, convidarei você novamente em breve."

1005405-95 = "Pois bem... ouvi dizer que você continuará passando por aqui de vez em quando,"

1005405-99 = "... Vamos encerrar nosso exercício hoje?"

1005405-101 = "(Depois disso, esperei um pouco na catedral, conversei com Marie, que havia vestido roupas de irmã, e então me despedi com um sorriso e voltei para a placa de Petri.)"

1005405-102 = "(Talvez o exercício tenha sido uma mudança de ritmo revigorante, o sorriso de Marie parecia mais revigorante do que o normal.)"

