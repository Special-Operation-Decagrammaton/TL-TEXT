[translation]
1005405-1 = "マリーのお礼"
1005405-2 = "聖堂裏側の私有地公園"
1005405-3 = "（久々に空き時間ができたため、トリニティ大聖堂を訪れた）"
1005405-4 = "（一般公開日だったので自由に歩き回っていたところ、大聖堂裏の公園が見えてきた）"
1005405-9 = "はぁ……はぁ……。"
1005405-16 = "はぁ……はぁ、はぁ……。"
1005405-17 = "[ns1] \"……もしかして。\"\n[ns2] \"誰かジョギングでもしてるのかな。\""
1005405-20 = "……あ、あれ。"
1005405-21 = "……先生？"
1005405-22 = "[ns3] \"こんにちは、マリー。\"\n[ns4] \"この声は……。\""
1005405-29 = "どうしてこちらに……#nお仕事ですか？"
1005405-30 = "……あ、違うのですね。"
1005405-31 = "いえ、お仕事でなくてもいつでもいらしてください。#n大聖堂は誰にでも開かれている場所ですから。"
1005405-32 = "それに、先生はよく手伝ってくださってますし……大歓迎です。"
1005405-33 = "……どうかしましたか？#nそんなにジッと見つめられては……。"
1005405-34 = "……あっ、この格好ですか？"
1005405-35 = "今日は日課のお祈りやお掃除も終わりましたので、ちょうど運動をしていたところなんです。"
1005405-36 = "大聖堂の近くを走ったり、簡単なストレッチをする程度ですので、運動と言って良いものか分かりませんが……。"
1005405-37 = "ふふっ。実はあれから運動を続けているんです。"
1005405-38 = "思い返せば、私が体操着で運動するようになったのも、先生のおかげでしたね。"
1005405-39 = "初めは大運動会に参加しようかと悩んでいましたが……。"
1005405-40 = "あの時の先生のお言葉があるから、今の私がいます。#n運動の楽しみを知る事ができ、素敵な習慣まで身に付きました。"
1005405-41 = "ふふっ……同じことを繰り返してしまっていますが……本当に感謝しているんです。#nありがとうございます、先生。"
1005405-42 = "もしまた機会があれば、ぜひ参加したいと思っております。"
1005405-43 = "その時は、きっと今より身のこなしも……。"
1005405-44 = "[s5] \"力になれて良かった。応援してるね。\"\n[s6] \"マリーを見ていると、こっちまで嬉しくなるよ。\""
1005405-47 = "先生……。"
1005405-48 = "せっかく大聖堂まで足を運んでくださったので……少々お待ちください。"
1005405-49 = "すぐシスター服に着替えてきますので、先生のご用事にお供させてください。#nトリニティのことでしたら私もお役に立てると思いますから。"
1005405-50 = "大丈夫……？#nで、ですが……。"
1005405-51 = "……え？"
1005405-52 = "このまま運動を？#nその間、先生はどうされるんですか？"
1005405-53 = "私を見守って……？#nダメではありませんが……なんだか先生の貴重なお時間を奪っているようで申し訳が……。"
1005405-54 = "そうじゃ……ない？#nどういう意味でしょう。"
1005405-55 = "[s7] \"マリーを見ていると癒やされるから。\"\n[s8] \"こういう時間も大切だから。\""
1005405-58 = "それは……どういう意味でしょう……か？"
1005405-59 = "……分かりました。#n先生が仰るのですから、何か深い理由があるはずですよね。"
1005405-60 = "そ、それでは……。"
1005405-61 = "私、頑張りますね！"
1005405-67 = "（…………）"
1005405-68 = "（ベンチに座りながら、ストレッチやジョギングに励むマリーを見守った）"
1005405-69 = "（体操着姿が様になっているマリーを眺めていると、あっという間に時間が過ぎていった）"
1005405-74 = "ただいま戻りました……！"
1005405-75 = "だ、大丈夫でしたか？#n少々お時間かかりましたので……退屈したり……。"
1005405-76 = "……全然、ですか？"
1005405-77 = "それに、こうしていれば誰かに叱られることもなくて気楽……？"
1005405-78 = "ど、どういうことでしょう……。#n先生を叱るだなんて、一体どなたが……。"
1005405-79 = "……冗談？あっ……笑うところだったのですね。#nまだまだ未熟なので、至らない点が多く申し訳ありません。"
1005405-80 = "ですが、ゆっくりお過ごしいただけたようで何よりです。#n私でも先生のお役に立てたのかと思うと……嬉しいです。"
1005405-81 = "もし私の運動姿を見ていることで先生の気が安らぐなら、これからも楽しく継続できそうです！"
1005405-82 = "（今度は先生がもっとゆっくり休めるように、お菓子や飲み物を用意するのも……）"
1005405-83 = "この公園にいると、心がとても休まりますね。"
1005405-84 = "先生もお気軽にお越しくださいね。"
1005405-85 = "……その、一般開放の時間は決まっているので、いつでもとは言えないのですが……。"
1005405-86 = "[s9] \"分かった。それならマリーがいる時に来ようかな。\"\n[s10] \"一人で運動するのにも飽きたら声をかけてね。\""
1005405-89 = "……わ、私から先生をお誘い……。"
1005405-93 = "……ふふっ。"
1005405-94 = "……はい、分かりました。#nそういうことでしたら、また近々お誘いしますね。"
1005405-95 = "では……これからも時々寄ってくださるとのことなので、"
1005405-99 = "……今日はこれで運動を終わりにしましょうか。"
1005405-101 = "（その後、大聖堂でしばらく待ち、シスター服に着替えたマリーとお話してから、笑顔で見送られてシャーレに戻った）"
1005405-102 = "（運動が気分転換になったのか、マリーの笑顔はいつもより爽やかだった）"
