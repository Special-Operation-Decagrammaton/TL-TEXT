[translation]
10049050-1 = "Episódio 5; Perseguição! Gangue dos Capacetes!"
10049050-2 = "……。"
10049050-3 = "Haa…… haa……."
10049050-7 = "A partir do palco, na direção das 2 horas em relação à plateia, consegue ver?"
10049050-8 = "Localizei um trio que suspeitamos ser a Gangue dos Capacetes Jab-Jab, incluindo a Komakaze Love."
10049050-10 = "！！"
10049050-11 = "Por favor, confirme a identidade deles e se representam uma ameaça."
10049050-12 = "Eles estão se movendo enquanto puxam um carrinho de mão."
10049050-13 = "Na carga…… vejo baldes de pipoca e algo que parece ser uma granada……!"
10049050-15 = "[ns] \"Uma granada!?\""
10049050-16 = "A imagem está pouco clara daqui, não posso afirmar com certeza."
10049050-17 = "Aproxime-se e faça a verificação no local, por favor."
10049050-21 = "Capitã, é tudo isso?"
10049050-22 = "Claro que não. Se é para fazer, vamos fazer direito."
10049050-23 = "Como esperado da capitã! Vamos lucrar muito com isso!"
10049050-24 = "O próximo deveria ser por aqui, mas…… não está ficando cheio de repente?"
10049050-25 = "Verdade. #n…… Ei, não bloqueie o caminho!"
10049050-30 = "Ah……."
10049050-31 = "Hã……?"
10049050-32 = "Capitã? Aconteceu alguma coisa?"
10049050-33 = "Não, é que……."
10049050-34 = "Aquele ali, de roupa rosa, que está no palco."
10049050-35 = "Hã? Não é só um ator? É um show para crianças."
10049050-36 = "Acho que nunca nos vimos antes, mas……."
10049050-37 = "Dá para perceber daqui."
10049050-38 = "Aquela ali é forte."
10049050-45 = "Fujam!!"
10049050-49 = "O quê!?"
10049050-59 = "Confirmei a Komakaze Love! Além dela, mais dois membros da Gangue dos Capacetes!"
10049050-60 = "Eles fugiram em direção à área de Gehenna. Iniciando perseguição!"
10049050-64 = "Suzumi―― Thermite White! O show ainda……!"
10049050-66 = "Ela pulou do palco!?"
10049050-67 = "O que significa isso!?"
10049050-69 = "Thermite White!"
10049050-70 = "I-isso também faz parte da apresentação!?"
10049050-75 = "[ns] \"Vamos segui-la!\""
10049050-76 = "Sim!"
10049050-78 = "Suzumi-san! Apenas a confirmação já basta!"
10049050-79 = "Se entrarem na área de Gehenna, o Comitê de Justiça não poderá dar suporte!"
10049050-80 = "Eu sei, mas…… a situação exige urgência."
10049050-81 = "Vi uma grande quantidade de granadas…… ou algo parecido, na carga deles."
10049050-82 = "Não se preocupe com o suporte."
10049050-83 = "Eu darei um jeito."
10049050-84 = "A de rosa também está lá!"
10049050-88 = "Ofegante…… ofegante……!"
10049050-89 = "Capitã! Quem são aquelas pessoas!?"
10049050-90 = "Eu não sei! Mas se estão nos perseguindo, devem ser inimigas!"
10049050-91 = "Parecia que elas estavam fazendo um show no palco……."
10049050-92 = "Será que isso também faz parte da apresentação……?"
10049050-93 = "Quem faria algo tão perigoso em um show para crianças!?"
10049050-94 = "Por favor, parem."
10049050-100 = "Uau, desde quando!?"
10049050-101 = "Quer dizer que nos ultrapassaram!?"
10049050-103 = "A rota de fuga foi bloqueada pelo Termite Pink!#nRendam-se pacificamente aos Heavy Calibers!"
10049050-105 = "Heavy Calibers...?"
10049050-106 = "Não são aqueles brinquedos com que as crianças da cidade brincam?"
10049050-107 = "Vocês são... tipo, aquilo? Estão obcecados por alguma coisa—"
10049050-109 = "Somos entusiastas. Ou talvez... otakus?"
10049050-110 = "Mas, por que rosa? É roxo, não deveria ser 'Purple'?"
10049050-112 = "Explicar o motivo seria um spoiler, então recomendo que assistam à obra original!"
10049050-113 = "(Parece que eles não perceberam nossa verdadeira identidade. Isso ajuda, mas...)"
10049050-117 = "Ah! Parece que o teatro imersivo começou!"
10049050-118 = "O que é isso?"
10049050-119 = "É um show que sai do palco e usa vários lugares como cenário!"
10049050-120 = "Ah! Rosa e Branco! Estão aqui!"
10049050-121 = "Eles estão lutando contra os vilões!"
10049050-125 = "(Que problemático... o público está se reunindo cada vez mais...)"
10049050-126 = "(Com crianças por perto, não podemos usar granadas de luz.)"
10049050-127 = "(Por enquanto, só nos resta tentar resolver conversando...)"
10049050-128 = "Tenho algumas coisas para verificar, poderiam me acompanhar?"
10049050-129 = "[s] \"Podemos conversar um pouco?\""
10049050-131 = "Droga, o Sensei do Schale!?"
10049050-132 = "Então você quer mesmo nos atrapalhar?#nNesse caso—"
10049050-133 = "Pessoal! Estão prontos?"
10049050-135 = "Sim! Capitã!"
10049050-136 = "A qualquer momento!"
10049050-138 = "Então—"
10049050-139 = "Ataque, começar!"
