[translation]
1301403-1 = "水着と無人島"
1301403-2 = "（修練の当日、レンゲと海へ向かった）"
1301403-6 = "ここが[ruby=・]例[/ruby][ruby=・]の[/ruby][ruby=・]島[/ruby]か？"
1301403-7 = "ああ、邪魔は入らないだろう。"
1301403-13 = "それじゃ、迎えがほしくなったら連絡してくれ。"
1301403-20 = "[ns1] \"例の島って？\"\n[ns2] \"普通の島じゃなさそうだけど……。\""
1301403-25 = "あれ？言わなかったっけ？"
1301403-26 = "ここは無人島だよ！"
1301403-27 = "[s] \"な、なんだって！？\""
1301403-28 = "「無人島1日体験」ってやつでさ。この島の海岸を使っていいんだって。"
1301403-29 = "遠浅の海だし、危険な動物もいない。連絡さえすれば、いつでも出られるし――"
1301403-30 = "修練にはうってつけの環境だろ？"
1301403-31 = "[s3] \"……二人だけの海岸！\"\n[s4] \"まさに青春だね！\""
1301403-34 = "ふふっ、そうなんだよ。"
1301403-35 = "さ、修練を始めるか！"
1301403-44 = "[ns] \"また服の下に水着なんだね。\""
1301403-45 = "師匠は？"
1301403-46 = "[s] \"もちろん、着てるよ……！\""
1301403-54 = "よ～し！まずは――"
1301403-55 = "海で食料の確保だ！"
1301403-56 = "[s] \"……水遊びとかじゃなくて？\""
1301403-57 = "……いいか？ここは無人島なんだ。"
1301403-58 = "今回の修練は、この島でサバイバルすること！"
1301403-59 = "みんな、こういう青春を過ごしてるんだろ？"
1301403-60 = "[s] \"そ、そんな青春知らないかも……！\""
1301403-61 = "ふふっ。じゃ、師匠も今から青春だな！"
1301403-65 = "タモ網で魚を捕ろう！"
1301403-71 = "おっ！魚がそっち行ったよ！"
1301403-72 = "[s] \"私に任せて！うおぉ……！\""
1301403-80 = "ははっ、惜しい！"
1301403-81 = "手本見せるよ。アタシみたいにやってみて！"
1301403-94 = "[ns5] \"無理だよ！？\"\n[ns6] \"魚の雨を降らすなんて！\""
1301403-98 = "師匠だってできるさ。"
1301403-99 = "しっかり構えて……正確に振る！"
1301403-107 = "ほら、後ろで支えてるからさ、もう一回。"
1301403-113 = "落ち着いて……大丈夫だから。"
1301403-114 = "魚が目の前を通る、ちょうどいいとこで……。"
1301403-121 = "[ns] \"やった！\""
1301403-122 = "さすが、師匠！"
1301403-123 = "よし、もう一回！支えてるから……。"
1301403-124 = "支……え……？"
1301403-129 = "（待て待て。水着なのに……近すぎだろ！？）"
1301403-133 = "あ、あはは……。ここから先は師匠一人でやってみて！それが上達の近道だ！"
1301403-134 = "[s] \"だ、だよね！\""
1301403-135 = "う、うん！じゃ、今の感じで続けて！"
1301403-138 = "（……その後、互いの距離を意識しながら魚捕りの青春活動を続けた）"
1301403-145 = "あっという間だったな……。"
1301403-146 = "今日は本当に楽しかったよ。"
1301403-147 = "日差しの下で体を乾かした後は、二人で捕った魚をわけあって……。"
1301403-148 = "ほんとに無人島に流れ着いても、こんな感じなのかな？"
1301403-153 = "……。"
1301403-154 = "前、無人島に漂着した二人が結ばれるって小説を読んだんだけど……。"
1301403-155 = "アタシならどうするんだろうって、ずっと考えてたんだ。"
1301403-156 = "師匠もこんな想像したことあるか？"
1301403-157 = "[s7] \"うん、あるよ。\"\n[s8] \"そういう想像、楽しいよね。\""
1301403-160 = "……そうなんだ。"
1301403-161 = "も、もし無人島で過ごすとしたら、師匠はどんなパートナーと一緒にいたい？#n例えばその……サバイバル力が高いとか、いろいろあると思うんだけど。"
1301403-165 = "……。"
1301403-166 = "ふふ、無理に答えなくていいよ。"
1301403-167 = "こうやって、師匠と青春を楽しむだけで十分だし。"
1301403-168 = "……いつか教えてほしいけど。"
1301403-172 = "いや……なんでもない！"
1301403-173 = "あっ！もうすっかり暗くなっちゃったな。さっさと準備しよう！"
1301403-174 = "[s] \"キャンプのことだよね？\""
1301403-175 = "師匠とのキャンプ……確かに魅力的な青春活動だな。"
1301403-176 = "でも、今回の目標は「無人島でサバイバル」だ。"
1301403-177 = "脱出方法を考えるのも大切だろ？"
1301403-178 = "漁師さんを呼ぶのもいいけど……。"
1301403-179 = "……自力で脱出するまでが、無人島生活かなって。"
1301403-183 = "だから、いかだを作って脱出しようと思うんだ！"
1301403-184 = "木もたくさん生えてるし……作れそうだね！"
1301403-185 = "[s] \"な、何を作るって！？\""
1301403-186 = "もちろん、いかだだよ！今から取り掛かれば、明日中にはできるんじゃないかな？"
1301403-190 = "さあ！アタシらの青春と生存のために、頑張ろう！"
1301403-191 = "[s] \"お、おー……！\""
1301403-196 = "（……その後、レンゲと徹夜でいかだを作り、島から脱出した）"
