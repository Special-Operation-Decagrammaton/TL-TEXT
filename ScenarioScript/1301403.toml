[translation]
1301403-1 = "Roupa de banho e ilha deserta"
1301403-2 = "（No dia do treinamento, fui em direção ao mar com Renge）"
1301403-6 = "Então esta é a tal ilha?"
1301403-7 = "Sim, ninguém vai nos atrapalhar aqui."
1301403-13 = "Certo, se precisar de alguém para te buscar, é só entrar em contato."
1301403-20 = "[ns1] \"Que ilha é essa?\"\n[ns2] \"Não parece ser uma ilha comum...\""
1301403-25 = "Ué? Eu não te contei?"
1301403-26 = "Esta é uma ilha deserta!"
1301403-27 = "[s] \"O-o quê!?\""
1301403-28 = "É um programa de \"experiência de um dia em ilha deserta\". Disseram que podemos usar a praia desta ilha."
1301403-29 = "O mar é raso e não tem animais perigosos. Se a gente entrar em contato, podemos sair a qualquer momento, e..."
1301403-30 = "É o ambiente perfeito para um treinamento, não é?"
1301403-31 = "[s3] \"...Uma praia só para nós dois!\"\n[s4] \"Isso é pura juventude!\""
1301403-34 = "Fufu, é verdade."
1301403-35 = "Vamos, vamos começar o treinamento!"
1301403-44 = "[ns] \"Você está de roupa de banho por baixo das roupas de novo, né?\""
1301403-45 = "E você, mestre?"
1301403-46 = "[s] \"Claro que estou usando...!\""
1301403-54 = "Muito bem! Primeiro..."
1301403-55 = "Vamos garantir comida no mar!"
1301403-56 = "[s] \"...Não era para ser algo como brincar na água?\""
1301403-57 = "...Escuta, estamos em uma ilha deserta."
1301403-58 = "O treinamento de hoje é sobreviver nesta ilha!"
1301403-59 = "Todo mundo passa por esse tipo de juventude, não é?"
1301403-60 = "[s] \"E-eu acho que não conheço esse tipo de juventude...!\""
1301403-61 = "Fufu. Então, mestre, você vai começar a viver sua juventude agora!"
1301403-65 = "Vamos pegar peixes com a rede!"
1301403-71 = "Ah! O peixe foi para aquele lado!"
1301403-72 = "[s] \"Deixa comigo! Uooo...!\""
1301403-80 = "Haha, quase!"
1301403-81 = "Vou te mostrar como se faz. Tente fazer igual a mim!"
1301403-94 = "[ns5] \"É impossível!?\"\n[ns6] \"Fazer chover peixes assim!\""
1301403-98 = "Você também consegue, mestre."
1301403-99 = "Prepare-se bem... e balance a rede com precisão!"
1301403-107 = "Aqui, vou te dar apoio por trás, tente de novo."
1301403-113 = "Fique calma... vai dar tudo certo."
1301403-114 = "Quando o peixe passar bem na sua frente, no momento certo..."
1301403-121 = "[ns] \"Consegui!\""
1301403-122 = "Como esperado do mestre!"
1301403-123 = "Certo, mais uma vez! Estou te segurando, então..."
1301403-124 = "Segurando...?"
1301403-129 = "（Espere, espere. Mesmo estando de roupa de banho... não estamos perto demais!?）"
1301403-133 = "A-ahahaha... Daqui em diante, tente fazer sozinha, mestre! Esse é o caminho mais rápido para melhorar!"
1301403-134 = "[s] \"C-certo!\""
1301403-135 = "I-isso! Então, continue desse jeito!"
1301403-138 = "（...Depois disso, continuamos nossas atividades juvenis de pesca, mantendo a consciência da distância entre nós）"
1301403-145 = "Passou rápido demais..."
1301403-146 = "Hoje foi realmente divertido."
1301403-147 = "Depois de secar o corpo sob o sol, dividimos os peixes que pegamos juntos..."
1301403-148 = "Será que seria assim mesmo se tivéssemos naufragado em uma ilha deserta de verdade?"
1301403-153 = "……。"
1301403-154 = "Eu li um romance sobre duas pessoas que acabam juntas após naufragarem em uma ilha deserta, sabe..."
1301403-155 = "Fiquei pensando o tempo todo no que eu faria se fosse comigo."
1301403-156 = "Mestre, você já imaginou algo assim também?"
1301403-157 = "[s7] \"Sim, já imaginei.\"\n[s8] \"Esse tipo de imaginação é divertido, né?\""
1301403-160 = "……Entendo."
1301403-161 = "S-se você tivesse que passar um tempo em uma ilha deserta, que tipo de parceiro gostaria de ter com você? #nPor exemplo... alguém com ótimas habilidades de sobrevivência, ou várias outras coisas, imagino."
1301403-165 = "……。"
1301403-166 = "Hehe, não precisa se forçar a responder."
1301403-167 = "Só de aproveitar a juventude com você, Mestre, já é o suficiente."
1301403-168 = "……Embora eu queira que você me conte um dia."
1301403-172 = "Não... não é nada!"
1301403-173 = "Ah! Já ficou completamente escuro. Vamos nos preparar logo!"
1301403-174 = "[s] \"Você está falando do acampamento, né?\""
1301403-175 = "Acampar com o Mestre... certamente é uma atividade juvenil atraente."
1301403-176 = "Mas o objetivo desta vez é \"sobreviver em uma ilha deserta\"."
1301403-177 = "Pensar em um método de fuga também é importante, não é?"
1301403-178 = "Chamar um pescador seria bom, mas..."
1301403-179 = "……Acho que a vida na ilha deserta só termina quando conseguirmos escapar por conta própria."
1301403-183 = "Por isso, estou pensando em construir uma jangada para fugirmos!"
1301403-184 = "Tem muitas árvores por aqui... acho que dá para fazer!"
1301403-185 = "[s] \"Q-que tipo de coisa você vai construir!?\""
1301403-186 = "Uma jangada, é claro! Se começarmos agora, acho que conseguimos terminar até amanhã, não acha?"
1301403-190 = "Vamos lá! Pela nossa juventude e pela nossa sobrevivência, vamos dar o nosso melhor!"
1301403-191 = "[s] \"O-ok...!\""
1301403-196 = "（……Depois disso, passei a noite em claro com Renge construindo a jangada e conseguimos escapar da ilha）"
