[translation]
10032005-1 = "Prólogo"
10032005-5 = "[i]Blue Archive apresenta[/i]"
10032005-10 = "[i]Evento da Problem Solver 68[/i]"
10032005-17 = "Aru Rikuhachima"
10032005-18 = "Kayoko Onikata"
10032005-23 = "Mutsuki Asagi"
10032005-24 = "Haruka Igusa"
10032005-33 = "e……"
10032005-41 = "E-está... tudo bem assim...?"
10032005-42 = "Como você ordenou... eu os deixei inconscientes e amarrados..."
10032005-45 = "Nossa, Haruka-chan, você não tem piedade, hein!"
10032005-46 = "Hehe... obrigada. #nFico feliz em ser útil para todas..."
10032005-47 = "A-a propósito, o que devemos fazer com essas pessoas...?"
10032005-55 = "Deixá-los aqui... seria um problema, não seria? #nDevemos escondê-los em algum lugar?"
10032005-56 = "N-não! Se fizermos isso, será ainda pior quando descobrirem... #nÉ melhor descartá-los em alguma fábrica abandonada por perto..."
10032005-57 = "M-mas existe a chance de serem encontrados lá também... talvez seja melhor afundá-los no mar...!!"
10032005-63 = "Fufufu... acalme-se, Haruka. Não se esqueça do nosso objetivo."
10032005-64 = "Isso ainda é apenas a fase preliminar para garantir o alvo."
10032005-65 = "Nós vamos acabar com os seguranças que se infiltraram antes, certo?"
10032005-66 = "Sim. Mas não temos tempo a perder com peixes pequenos. #nEm breve..."
10032005-67 = "O alvo chegará."
10032005-68 = "...Finalmente recebemos um trabalho digno do nome da Problem Solver 68!"
10032005-69 = "Kufufu. Aru-chan, você não está animada demais para um trabalho grande depois de tanto tempo?"
10032005-70 = "N-não é isso! #nAlém disso, durante o trabalho, me chame de Presidente, Chefe Mutsuki!"
10032005-71 = "E isso é a prova de que nós, da Problem Solver 68, fomos reconhecidas... #nDe agora em diante, mais e mais pedidos virão até nós."
10032005-72 = "O alvo desta vez é o chefe da união de gangues, \"Don Arancino\", certo...?"
10032005-73 = "Ouvi dizer que ele é uma pessoa muito perigosa..."
10032005-74 = "Com certeza, comparado a \"procurar gatos\" ou \"seguir amigos\", #no clima é bem diferente, né?"
10032005-75 = "J-já chega desse assunto!"
10032005-76 = "Desta vez vamos completar o trabalho e mostrar ao mundo o nome da nossa agência durona...!"
10032005-81 = "...Presidente."
10032005-82 = "Hm? Kayoko, o que houve?"
10032005-83 = "Eu disse para evitar comunicações desnecessárias durante a infiltração..."
10032005-84 = "Ah, é que... tenho um relatório urgente."
10032005-85 = "Agora mesmo, nesta casa de ópera..."
10032005-86 = "O Sensei chegou."
10032005-93 = "É um imprevisto, e..."
10032005-94 = "Não seria melhor nos movermos por enquanto?"
10032005-95 = "…………."
10032005-96 = "…………Presidente?"
10032005-97 = "………………Eh."
10032005-100 = "…………Quem foi que chegou?"
10032005-101 = "#video;10032"
