[translation]
10032005-1 = "プロローグ"
10032005-5 = "[i]Blue Archive presents[/i]"
10032005-10 = "[i]Problem Solver 68 Event[/i]"
10032005-17 = "Aru Rikuhachima"
10032005-18 = "Kayoko Onikata"
10032005-23 = "Mutsuki Asagi"
10032005-24 = "Haruka Igusa"
10032005-33 = "and……"
10032005-41 = "こ、これで……いいんでしょうか……？"
10032005-42 = "仰っていた通り……気絶させて縛っておきました……"
10032005-45 = "いや～ハルカちゃん、容赦ないね～！"
10032005-46 = "へへっ……ありがとうございます。#nみんなの役に立てて、嬉しいです……"
10032005-47 = "と、ところで、この人たちはどう処理すれば……"
10032005-55 = "このまま放っておくのは……流石にマズいですよね？#nどこかに隠しておきましょうか？"
10032005-56 = "い、いや！それだと気づかれた時さらに面倒なことに……#n近くの廃工場にでも捨ててきたほうが……"
10032005-57 = "そ、それも見つかる可能性が……やっぱり、海に沈めた方が……！！"
10032005-63 = "ふふふ……落ち着きなさい、ハルカ。目的を忘れちゃダメよ。"
10032005-64 = "まだこれは、ターゲットを確保するための前段階。"
10032005-65 = "先に潜入してた護衛を始末するんだよね？"
10032005-66 = "ええ。でも、雑魚どもにかまけている時間なんて無いわ。#nもうじき……"
10032005-67 = "ターゲットが到着するもの。"
10032005-68 = "……ついに我々便利屋68の名に相応しい依頼が来たのよ！"
10032005-69 = "くふふ。久しぶりの大仕事で、アルちゃん浮かれすぎじゃない～？"
10032005-70 = "ち、違うわよ！#nそれに仕事中は社長でしょう、ムツキ室長！"
10032005-71 = "それと、これは私たち便利屋68が認められた証拠……#nこれからもどんどん依頼が舞い込んでくるわ。"
10032005-72 = "今回のターゲットは、ギャング連合のボス「ドン・アランチーノ」でしたよね……？"
10032005-73 = "すごく悪い人だと聞きましたけど……"
10032005-74 = "たしかに、いつもの「猫探し」とか「友達の尾行」とかと比べたら、#n雰囲気も違うしね～？"
10032005-75 = "そ、その話はもういいわよ！"
10032005-76 = "今度こそ依頼を成功させて、ハードボイルドな便利屋の名を世に知らしめるんだから……！"
10032005-81 = "……社長。"
10032005-82 = "ん？カヨコ、どうしたの？"
10032005-83 = "潜入中は、不必要な通信を避けるよう言ってお……"
10032005-84 = "ああ、それが……急ぎの報告があってね。"
10032005-85 = "今、このオペラハウスに……"
10032005-86 = "先生が来てるの。"
10032005-93 = "予想外の出来事だし……"
10032005-94 = "ひとまず移動した方がいいんじゃない？"
10032005-95 = "…………。"
10032005-96 = "…………社長？"
10032005-97 = "………………え。"
10032005-100 = "…………誰が、来たって？"
10032005-101 = "#video;10032"
