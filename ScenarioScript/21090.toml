[translation]
21090-1 = "Episódio 9; O interrogatório da Yuuka"
21090-2 = "Departamento de Desenvolvimento de Jogos do Millennium"
21090-3 = "……Alice-chan. Se você está aqui porque o Departamento de Desenvolvimento de Jogos te forçou, pisque o olho esquerdo."
21090-4 = "……？"
21090-5 = "Ei, que tipo de pergunta é essa logo de cara!? Eu ouvi mesmo você falando baixo! E aliás, eu não faria uma coisa dessas!!"
21090-10 = "Olha só, veja este cartão de estudante brilhante! É a prova inegável de que sou uma aluna do Millennium!"
21090-11 = "Hmm…… De fato, confirmei que a Alice-chan está registrada na lista de alunas, mas……"
21090-12 = "Eu não sou uma mulher que se deixa enganar tão facilmente."
21090-14 = "（*sobressalto*）"
21090-15 = "（D-descobriu!?）"
21090-17 = "Muito bem, então vamos retomar o interrogatório."
21090-18 = "Ela nem tenta mais esconder……"
21090-20 = "Alice-chan, como você veio parar no Departamento de Desenvolvimento de Jogos?"
21090-21 = "Quando me dei conta, já estava aqui, não……"
21090-22 = "Momoi, por que você está encarando a Alice-chan desse jeito? Pare com isso."
21090-23 = "Bem, eu queria jogar 'Castelo do Rei Demônio Drácula'…… e então, descobri a existência do Departamento de Desenvolvimento de Jogos……"
21090-24 = "Hmm…… Entendo."
21090-25 = "（Isso! Alice-chan, continue assim!）"
21090-26 = "Mas este não é um clube de jogos retrô, é um Departamento de Desenvolvimento de Jogos."
21090-27 = "Ou seja, você também vai participar da criação dos jogos, certo? Qual será a sua função?"
21090-28 = "Tanque e atacante de atributo luz……"
21090-29 = "Hã?"
21090-30 = "Não, quer dizer, bem, pro-pro-pro…… programadora!"
21090-31 = "……Como é? Programadora, não é?"
21090-32 = "Ah, sim. Isso mesmo. Sem dúvida, sou uma programadora perfeita."
21090-33 = "（Deu ruim……!?）"
21090-34 = "Programadora, hein…… ouvi dizer que é um papel muito difícil."
21090-35 = "Sim, i-isso mesmo. Pro-programar é difícil. Às vezes, por excesso de trabalho, até perco a consciência."
21090-36 = "O-o que você disse!?"
21090-37 = "Mas está tudo bem!"
21090-38 = "Não, não está nada bem…… descanse um pouco, por favor……"
21090-39 = "Se dormir na estalagem ou pagar uma quantia na catedral, posso reviver junto com meus companheiros!"
21090-40 = "Isso não faz o menor sentido!?"
21090-41 = "Não faz sentido……? Deveria ser senso comum…… será que você não conhece 'Mito dos Heróis' ou 'Lenda da Lança Sagrada'?"
21090-43 = "São jogos realmente lendários."
21090-44 = "……"
21090-46 = "Acabou, tudo acabou……"
21090-48 = "……"
21090-49 = "……Obrigada, entendi."
21090-50 = "Foi pouco tempo, mas Alice-chan, consegui entender o básico sobre você."
21090-52 = "（Já era!）"
21090-53 = "（O que eu faço……!?）"
21090-56 = "……!?"
21090-57 = "Embora você seja um pouco suspeita……"
21090-58 = "O fato de você amar jogos. E que você gosta de histórias sobre explorar novos mundos ou realizar algo junto com seus amigos, isso ficou bem claro……"
21090-60 = "Não há nada de estranho em você ser um membro do Departamento de Desenvolvimento de Jogos."
21090-62 = "Hã……?"
21090-63 = "Isso significa que!?"
21090-65 = "Como o número mínimo de membros foi atingido, o Departamento de Desenvolvimento de Jogos será reconhecido oficialmente…… aprovo a continuidade do clube."
21090-67 = "Eba!"
21090-68 = "Ainda bem!"
21090-69 = "E-então, a gente vai receber a verba do clube e pode continuar usando a sala, né!?"
21090-70 = "Sim, claro."
21090-71 = "Até o final deste semestre... pelo menos."
21090-72 = "Eba... hein?"
21090-73 = "P-p-por quê!?"
21090-74 = "Como assim! A gente já atingiu o número mínimo de membros!?"
21090-76 = "Ora, vocês não sabiam?"
21090-77 = "Agora, não basta apenas atingir o número mínimo de membros; vocês também precisam comprovar os resultados do clube."
21090-78 = "Claro, como é uma regra que mudou recentemente, existe um período de carência, mas..."
21090-79 = "Esse período vai até o final deste mês. Se não apresentarem resultados até lá, o clube de vocês será fechado, não importa se tiverem 4 ou 400 membros."
21090-80 = "Mentira, não pode ser!"
21090-81 = "Pode, sim! Eu expliquei isso claramente na reunião geral de presidentes de clubes outro dia."
21090-82 = "Embora a presidente de vocês, a Yuzu, não tenha comparecido."
21090-83 = "!?"
21090-84 = "Ou seja, a responsabilidade é de vocês."
21090-85 = "Grr... sua covarde!"
21090-86 = "Se me chamasse de 'demônio', eu até entenderia, mas o que há de 'covarde' em seguir as regras à risca...?"
21090-87 = "Para ser sincera, a identidade da Alice também é suspeita, e eu estava pensando em pedir que vocês desocupassem a sala hoje mesmo..."
21090-88 = "!?"
21090-89 = "...Deixando a identidade de lado, percebi que o sentimento puro de vocês por jogos é verdadeiro."
21090-90 = "Eu dei esse prazo porque espero que consigam resultados à altura desse sentimento."
21090-91 = "Momoi, você disse, não disse? Que iriam apresentar resultados surpreendentes no Millennium Prize."
21090-92 = "B-bem, eu disse, mas..."
21090-93 = "Agora que ganharam um novo membro, devem conseguir criar um jogo bem mais interessante do que antes, certo?"
21090-94 = "Então, estarei aguardando. Até mais."
21090-97 = "Ei, espera! Sua vigarista, burocrata, ahhhhh!"
21090-98 = "Ela foi embora..."
21090-100 = "Hum..."
21090-101 = "No fim das contas, o Clube de Desenvolvimento de Jogos continua em crise..."
21090-102 = "Mas isso é um golpe, não importa como se olhe! É uma conspiração!!"
21090-103 = "...Desculpem. Por minha culpa, por não ter participado da reunião de presidentes..."
21090-104 = "N-não é culpa sua, Yuzu-chan! Nesses casos, a gente tinha combinado que a minha irmã iria no seu lugar, não tinha?"
21090-105 = "...Não teve jeito."
21090-106 = "Porque, naquela hora, estava rolando uma campanha de taxa de drop dobrada..."
21090-107 = "Então a culpa é da minha irmã mesmo! Apaga esse jogo agora!"
21090-108 = "Uuu... de qualquer forma, só nos resta uma coisa a fazer."
21090-109 = "É verdade."
21090-110 = "Criar um jogo incrível que consiga ganhar o Millennium Prize."
21090-111 = "Isso significa que, no fim das contas, precisamos da G.Bible! Vamos ter que voltar àquelas ruínas!? Que horror!!"
21090-112 = "..."
21090-116 = "...Eu preciso assumir a responsabilidade."
21090-117 = "Hã, Yuzu-chan?"
21090-118 = "Se vamos voltar às ruínas para procurar a G.Bible... eu também vou."
21090-119 = "S-sério!?"
21090-120 = "Yuzu-chan, você não sai da escola há quase meio ano. Até as aulas você assiste pela internet..."
21090-121 = "...Originalmente, a culpa é minha... por isso. Além disso, esta sala... já não é mais só minha."
21090-122 = "...Eu quero proteger este lugar com vocês."
21090-123 = "Yuzu-chan..."
21090-126 = "Tan-tan-tan! Yuzu entrou para o grupo."
21090-127 = "……Sim, certo! Não tem outro jeito, vamos nessa!"
21090-128 = "Alice-chan, pegue suas armas e equipamentos também!"
21090-131 = "Item selecionado, equipando a \"Espada de Luz: Supernova\"."
21090-134 = "Certo, vamos lá! Desta vez, vamos conseguir a G.Bible!"
21090-135 = "……."
21090-136 = "……Sim!"
21090-137 = "Vamos todos proteger a nossa sala do clube!"
21090-139 = "Próximo episódio: De volta às ruínas"
