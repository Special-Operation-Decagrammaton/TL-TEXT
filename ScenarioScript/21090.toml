[translation]
21090-1 = "Episódio 9; As Perguntas da Yuuka"
21090-2 = "Millennium - Depto. de Desenvolvimento de Jogos"
21090-3 = "......Aris-chan. Se o Departamento de Desenvolvimento de Jogos te ameaçou e você foi forçada a estar aqui, pisque o olho esquerdo."
21090-4 = "......?"
21090-5 = "Ei, o que diabos é essa pergunta logo de cara!? A gente escutou mesmo você falando baixinho! E a gente não fez nada disso!!"
21090-10 = "Olha só pra isso, veja esta carteirinha de estudante brilhante! É a prova irrefutável de que ela é uma aluna da Millennium!"
21090-11 = "Hmmm... É verdade que eu já confirmei que a Aris-chan está registrada na lista de alunos, mas..."
21090-12 = "Eu não sou uma mulher que se deixa enganar tão facilmente."
21090-14 = "(Estremece)"
21090-15 = "(E-Ela descobriu!?)"
21090-17 = "Bem, então vamos retomar o interrogatório."
21090-18 = "Ela já nem tenta mais disfarçar..."
21090-20 = "Aris-chan, o que te levou a vir para o Departamento de Desenvolvimento de Jogos?"
21090-21 = "Não seria um 'Quando dei por mim, já estava aqui'..."
21090-22 = "Momoi, por que você está encarando a Aris-chan desse jeito? Pare com isso."
21090-23 = "Ehm, é que eu queria jogar 'Castelo do Rei Demônio Dracula'... e então eu fiquei sabendo da existência do Departamento de Desenvolvimento de Jogos..."
21090-24 = "Hmmm... é mesmo?"
21090-25 = "(Isso! Continua assim, Aris-chan!)"
21090-26 = "Mas aqui não é o Clube de Jogos Retrô, é o Departamento de Desenvolvimento de Jogos."
21090-27 = "Isso quer dizer que você também vai participar da criação de jogos, certo? O que você vai fazer?"
21090-28 = "Tank e Atacante do elemento Luz..."
21090-29 = "Eh?"
21090-30 = "Não, digo, ehm, p-p-p... Programavilhosa!"
21090-31 = "......Hã? Não seria, programadora?"
21090-32 = "Ah, sim. Isso, exatamente. Com certeza, eu sou uma programadora perfeita."
21090-33 = "(Lascou...!?)"
21090-34 = "Programadora, hein... Ouvi dizer que é uma função muito difícil."
21090-35 = "Sim, é, é isso aí. S-Ser programadora é muito difícil. Às vezes eu até perco a consciência por excesso de trabalho."
21090-36 = "O, o que disse!?"
21090-37 = "Mas tá tudo bem!"
21090-38 = "Não, não tá tudo bem não... Você tem que descansar direito..."
21090-39 = "Se eu dormir numa Pousada e acordar depois, ou se eu pagar dinheiro numa Catedral, eu posso reviver junto com os meus companheiros!"
21090-40 = "N-Não existe nada disso!"
21090-41 = "Não existe...? Isso devia ser senso comum... Por acaso, você não conhece 'Hero Myth' e 'A Lenda da Lança Sagrada'?"
21090-43 = "Esses são jogos divinos de verdade."
21090-44 = "......"
21090-46 = "Tudo acabou, tudo..."
21090-48 = "......"
21090-49 = "......Obrigada, entendi."
21090-50 = "Foi pouco tempo, Aris-chan. Mas já consegui entender você na maior parte."
21090-52 = "(Deu ruim!)"
21090-53 = "(O que a gente faz...!?)"
21090-56 = "......!?"
21090-57 = "Tem umas partes meio suspeitas, mas..."
21090-58 = "Você gosta de jogos. E deu pra ver muito bem que você gosta de explorar novos mundos e de histórias onde você realiza coisas junto com seus companheiros..."
21090-60 = "O fato de você fazer parte do Departamento de Desenvolvimento de Jogos não é nada estranho."
21090-62 = "Eh...?"
21090-63 = "Isso quer dizer que!?"
21090-65 = "Como atingiram o número mínimo de membros, reconheço o Departamento de Desenvolvimento de Jogos como um clube oficial novamente... Aprovo a continuidade do clube."
21090-67 = "Aeee!"
21090-68 = "Ainda bem!"
21090-69 = "E-Então a gente vai continuar recebendo o orçamento e poderemos continuar usando a sala do clube, né!?"
21090-70 = "Sim, claro que sim."
21090-71 = "Até o 'final deste semestre'... é claro."
21090-72 = "Ebaaa... Eh?"
21090-73 = "P-P-Por quê!?"
21090-74 = "Mas por que! A gente já atingiu o número mínimo de membros!?"
21090-76 = "Ora, não sabia?"
21090-77 = "Agora, não basta apenas ter o número mínimo de membros, vocês precisam provar os resultados de vocês como clube ao mesmo tempo."
21090-78 = "Claro, como foi um requisito que mudou de repente, há um período de carência..."
21090-79 = "Esse período vai até o final deste mês. Se não conseguirem apresentar resultados até o final deste mês, mesmo que tenham 4 ou 400 membros, o clube de vocês vai ser fechado."
21090-80 = "Mentira, isso não pode ser real!"
21090-81 = "É real sim! Isso foi devidamente explicado na última reunião geral dos presidentes de clubes."
21090-82 = "Mas a presidente de vocês, a Yuzu, não estava lá para ouvir, claro."
21090-83 = "!?"
21090-84 = "Em outras palavras, a responsabilidade é de vocês."
21090-85 = "Ugh... Sua covarde!"
21090-86 = "Até 'demônio' eu entenderia, mas o que tem de 'covarde' em seguir os procedimentos de acordo com as regras..."
21090-87 = "Sinceramente, a verdadeira identidade da Aris-chan é bem suspeita também, e se fosse por mim, eu teria exigido a desocupação da sala hoje mesmo..."
21090-88 = "!?"
21090-89 = "......Mas deixando a identidade dela de lado, acredito que os sentimentos puros de amar jogar jogos são genuínos."
21090-90 = "Eu dei esse período de carência porque espero que vocês consigam apresentar resultados condizentes com esses sentimentos."
21090-91 = "Momoi, você mesma disse, não é? Que mostraria resultados surpreendentes no Millennium Prize."
21090-92 = "I-Isso é verdade, mas..."
21090-93 = "Já que vocês ganharam um membro novo, vocês vão conseguir criar um jogo muito mais divertido do que os de antes, não é mesmo?"
21090-94 = "Então eu estarei no aguardo. Até mais~"
21090-97 = "Ei, espera aí! Trapaceira, burocrata de uma figa, ahhhhh!"
21090-98 = "Ela foi embora..."
21090-100 = "Hmmm..."
21090-101 = "No fim das contas, o Departamento de Desenvolvimento de Jogos ainda corre o risco de ser fechado... é isso."
21090-102 = "Mas isso só pode ser uma trapaça, de qualquer ângulo! É um complô!!"
21090-103 = "......Desculpem. É culpa minha por não ter conseguido ir à reunião de presidentes..."
21090-104 = "A c-culpa não é sua, Yuzu-chan! Nesses casos, a mana deveria ter ido no seu lugar, não é mesmo!?"
21090-105 = "......Não tinha o que fazer."
21090-106 = "É que bem nessa hora tava rolando uma campanha de taxa de drop de itens em dobro..."
21090-107 = "Então a culpa é toda sua mesmo, mana! Apaga esse jogo agora mesmo!"
21090-108 = "Uuuh... Enfim, agora só nos resta fazer uma coisa."
21090-109 = "Tem razão."
21090-110 = "Temos que criar um jogo incrível, o suficiente para ganharmos um prêmio no Millennium Prize."
21090-111 = "O que significa que, no fim das contas, vamos precisar da G.Bible! A gente vai ter que voltar pra aquelas Ruínas de novo!? Não querooo!!"
21090-112 = "......"
21090-116 = "......Tenho que, assumir a responsabilidade."
21090-117 = "Eh, Yuzu-chan?"
21090-118 = "Se forem procurar pela G.Bible de novo nas Ruínas... eu também, eu também vou junto."
21090-119 = "E-Eh!? Mentira!?"
21090-120 = "Mas você não sai do prédio da escola faz quase meio ano, Yuzu-chan. E você só assiste às aulas pela internet..."
21090-121 = "......Afinal, a culpa originalmente... é minha. Além disso, esta sala... já não é apenas minha."
21090-122 = "......Eu quero protegê-la, junto com vocês."
21090-123 = "Yuzu-chan..."
21090-126 = "Ta-da-da-daaan, Yuzu entrou para o grupo."
21090-127 = "......Sim, beleza! A gente não tem escolha, vamos lá!"
21090-128 = "Aris-chan, traga a sua arma e o seu equipamento também!"
21090-131 = "Item selecionado, 'Espada de Luz: Supernova' equipada."
21090-134 = "Beleza, vamos nessa! Para conseguir a G.Bible desta vez!"
21090-135 = "......"
21090-136 = "......Sim!"
21090-137 = "Vamos todos juntos proteger a sala do clube!"
21090-139 = "Próximo Episódio; Novamente às Ruínas"