[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
21090-1 = "Episódio 9: As Perguntas de Yuuka."
21090-2 = "Millennium · Clube de Desenvolvimento de Jogos"
21090-3 = "……Aris. Se você está aqui contra a vontade,\ncoagida pelo Clube de Desenvolvimento de Jogos,\npisca o olho esquerdo."
21090-4 = "……?"
21090-5 = "Ei, que pergunta é essa logo de cara!? Mesmo\nfalando baixinho dá pra ouvir, viu! E, aliás,\na gente não faria uma coisa dessas!!"
21090-10 = "Olha só pra esta carteirinha reluzente! Prova\nirrefutável de que ela é aluna da Millennium!"
21090-11 = "Hmm…… de fato, eu confirmei que a Aris está\nregistrada na lista de alunas também, mas……"
21090-12 = "Eu não sou mulher de me deixar enganar\nassim tão fácil."
21090-14 = "(Estremece)"
21090-15 = "(D-descobriu!?)"
21090-17 = "Bom, então vamos retomar o interrogatório."
21090-18 = "Você nem tá mais tentando disfarçar……"
21090-20 = "Aris, o que te levou a entrar\npro Clube de Desenvolvimento de Jogos?"
21090-21 = "Não é \"quando me dei conta, já estava aqui\",\ne sim……"
21090-22 = "Momoi, por que você tá encarando a Aris\ndesse jeito? Para com isso."
21090-23 = "Bom, é que eu queria jogar \"Castelo do Rei\nDemônio Drácula\"…… e aí fiquei sabendo da\nexistência do Clube de Desenvolvimento de Jogos……"
21090-24 = "Hmm…… ah, é?"
21090-25 = "(Boa! Aris, é isso aí!)"
21090-26 = "Mas aqui não é Clube de Jogos Retrô,\né Clube de Desenvolvimento de Jogos."
21090-27 = "Ou seja, você também participa da criação\ndos jogos, certo? Do que você cuida?"
21090-28 = "Tank e atacante de atributo Luz……"
21090-29 = "Hã?"
21090-30 = "Quer dizer, ãh, p-p-p…… programadoira!"
21090-31 = "……Hã? Programadora, você não quer dizer?"
21090-32 = "Ah, sim. É isso mesmo, exatamente. Sem dúvida\nalguma, eu sou uma programadora impecável."
21090-33 = "(Essa foi por pouco……!?)"
21090-34 = "Programadora, né…… Ouvi dizer que\né um papel bem difícil."
21090-35 = "Sim, i-isso mesmo. P-programar é puxado.\nÀs vezes, de tanto trabalhar, eu até\nperco a consciência."
21090-36 = "C-como é que é!?"
21090-37 = "Mas mesmo assim tá tudo bem!"
21090-38 = "Não, não tá nada bem…… descansa direito, vai……"
21090-39 = "É só dormir e acordar na estalagem, ou pagar\numa graninha na catedral, que eu ressuscito\njunto com os companheiros!"
21090-40 = "C-claro que não funciona assim!?"
21090-41 = "Não funciona……? Mas isso é o básico……\nnão me diga que você não conhece o \"Mito\ndos Heróis\" nem a \"Lenda da Lança Sagrada\"?"
21090-43 = "São \"jogos divinos\" de verdade."
21090-44 = "……"
21090-46 = "Acabou, tudo está……"
21090-48 = "……"
21090-49 = "……Obrigada, já entendi."
21090-50 = "Foi pouco tempo, Aris, mas, no geral,\nconsegui compreender quem você é."
21090-52 = "(Já era de vez!)"
21090-53 = "(E agora, o que a gente faz……!?)"
21090-56 = "……!?"
21090-57 = "Tem umas coisinhas meio suspeitas, mas……"
21090-58 = "que você gosta de jogo, e que gosta de aventurar\npor um mundo novo e de histórias em que se realiza\nalgo junto com os companheiros, isso\nficou mais do que claro……"
21090-60 = "Uma garota assim ser membra do Clube de\nDesenvolvimento de Jogos não tem nada de estranho."
21090-62 = "Hã……?"
21090-63 = "Quer dizer que……!?"
21090-65 = "Como o número exigido de membros foi cumprido,\nreconheço de novo o Clube de Desenvolvimento\nde Jogos como clube oficial…… aprovo\na sua continuidade como clube."
21090-67 = "Ebaaa!"
21090-68 = "Que aliviooo!"
21090-69 = "E-então a gente também ganha verba, e pode\ncontinuar usando a sala do clube, né!?"
21090-70 = "Sim, claro."
21090-71 = "Até o \"fim deste semestre\"…… viu."
21090-72 = "Eeebaa…… hã?"
21090-73 = "P-p-por quê!?"
21090-74 = "Como assim! A gente cumpriu o número\nde membros!?"
21090-76 = "Ora, vocês não sabiam?"
21090-77 = "Agora não basta só cumprir o número de membros:\nao mesmo tempo, é preciso provar um resultado\ncomo clube."
21090-78 = "Claro, como é um requisito que mudou de repente,\nhá um prazo de tolerância, mas……"
21090-79 = "Esse prazo vai até o fim deste mês. Se até lá\nvocês não apresentarem resultado, o clube de vocês,\ntendo 4 ou 400 membros, será dissolvido."
21090-80 = "Mentira, é impossível!"
21090-81 = "É possível, sim! Isso foi explicado direitinho\noutro dia, na reunião geral dos presidentes de clube."
21090-82 = "Só que a presidente de vocês, a Yuzu,\nnão estava lá."
21090-83 = "!?"
21090-84 = "Ou seja, a responsabilidade é de vocês."
21090-85 = "Kh…… sua desleal!"
21090-86 = "\"Megera\" até passa, mas o que é que seguir\nas regras à risca tem de \"desleal\"……"
21090-87 = "Sinceramente, a identidade da Aris é suspeita,\ne, na verdade, eu até pensei em pedir a saída\nde vocês hoje mesmo, mas……"
21090-88 = "!?"
21090-89 = "……Identidade à parte, esse sentimento puro\nde gostar de jogo, esse eu achei verdadeiro."
21090-90 = "Concedi o prazo porque espero que vocês\nconsigam, de fato, um resultado à altura\ndesse sentimento."
21090-91 = "Momoi, você disse, não disse? Que no Prêmio\nMillennium ia apresentar um resultado\nde cair o queixo."
21090-92 = "I-isso eu disse, mas……"
21090-93 = "Agora que entrou membra nova, vocês vão conseguir\nfazer um jogo de verdade divertido, mais do\nque antes, né?"
21090-94 = "Então, vou ficar no aguardo. Até mais~."
21090-97 = "Ei, peraí! Vigarista! Quadrada! Aaaaargh!"
21090-98 = "Ela foi embora……"
21090-100 = "Hmm……"
21090-101 = "No fim das contas, o Clube de Desenvolvimento\nde Jogos ainda tá em risco de dissolução……\né isso, né."
21090-102 = "Mas isso, por qualquer ângulo, é golpe!\nÉ conspiração!!"
21090-103 = "……Desculpem. Por minha causa, por eu não\nter ido à reunião dos presidentes……"
21090-104 = "N-não é culpa sua, Yuzu! Nesses casos, era a mana\nque devia ir no seu lugar, não era?"
21090-105 = "……Não teve jeito."
21090-106 = "É que naquela hora tava rolando a campanha\nde taxa de drop de item em dobro……"
21090-107 = "No fim das contas a culpa é sua, mana!\nApaga esse jogo agora mesmo!"
21090-108 = "Uuh…… enfim, agora só resta uma coisa a fazer."
21090-109 = "É isso."
21090-110 = "Criar um jogo incrível, capaz de ganhar\no prêmio no Prêmio Millennium."
21090-111 = "Quer dizer que, no fim, a gente precisa mesmo\nda G.Bible! Ir de novo pra aquelas Ruínas!?\nNãão!!"
21090-112 = "……"
21090-116 = "……Eu preciso assumir a responsabilidade."
21090-117 = "Hã, Yuzu?"
21090-118 = "Se for pra procurar a G.Bible e voltar\npras Ruínas…… eu também vou junto."
21090-119 = "H-hã!? Mentira!?"
21090-120 = "Yuzu, faz quase meio ano que você não põe o pé\npra fora do prédio da colégio. Até as aulas\nvocê só assiste pela internet……"
21090-121 = "……No início, a culpa foi minha…… por isso.\nE esta sala do clube…… já não é só minha."
21090-122 = "……Eu quero protegê-la, junto com vocês."
21090-123 = "Yuzu……"
21090-126 = "Tcharaaam, Yuzu entrou na party."
21090-127 = "……Sim, boa! Não tem outro jeito, bora!"
21090-128 = "Aris, pega a arma e o equipamento também!"
21090-131 = "Item selecionado: \"Espada de Luz: Supernova\"\nequipada."
21090-134 = "Beleza, bora! Dessa vez é pra valer,\npra colocar a mão na G.Bible!"
21090-135 = "……"
21090-136 = "……Sim!"
21090-137 = "Vamos todas juntas proteger a sala do clube!"
21090-139 = "Próximo episódio: De Novo, Rumo às Ruínas."