[translation]
2601303-1 = "逃げた先にあるもの"
2601303-2 = "（アツコに連絡をもらい、待ち合わせ場所に向かった）"
2601303-4 = "あっ、先生。"
2601303-8 = "[ns] \"いきなりどうしたの？\""
2601303-9 = "ふふ、先生の姿も収めておきたくて。"
2601303-10 = "……もしかして、今のは失礼だった？"
2601303-11 = "[s] \"ちょっと驚いただけだから、大丈夫だよ。\""
2601303-12 = "それなら、良かった。"
2601303-13 = "……「どうしても撮りたいもの」があるって、言ったよね。"
2601303-14 = "1つ目は、先生だったの。"
2601303-15 = "行こう、先生。#n次の場所に。"
2601303-17 = "あそこだよ。"
2601303-18 = "昨日、見つけたんだ。"
2601303-19 = "お花のフォトスポットなんだって。"
2601303-20 = "……昨日より少し、お花が元気ない。"
2601303-21 = "[s1] \"たしかに、言われてみれば……。\"\n[s2] \"でも、まだ充分きれいじゃない？\""
2601303-24 = "……うん、そうだね。"
2601303-25 = "先生、写真を撮ろう。#nそこの椅子に座って。"
2601303-26 = "[s] \"私なら、さっきも撮ってもらったよ？\""
2601303-27 = "じゃあ、とりあえずお花だけ……。"
2601303-28 = "……うん、良い感じ。"
2601303-32 = "横からも撮ってみようかな。"
2601303-38 = "先生、良い写真が撮れたよ。"
2601303-39 = "今度は――"
2601303-40 = "お前たち、何してるんだ？"
2601303-42 = "誰がここで撮影して良いって言った？"
2601303-43 = "……許可、必要な場所なの？"
2601303-44 = "当たり前だろ！#nここは私たちが作ったんだからな！"
2601303-45 = "[s] \"勝手に撮影しちゃって、すみません。\""
2601303-46 = "ふん、謝罪なんて要らない。"
2601303-47 = "それよりも、何枚撮ったんだ？#n正直に言え！"
2601303-48 = "……8枚、だけど。"
2601303-49 = "おいおいおい、ずいぶんと撮ってくれたな！#n1枚1万円だから、合計で8万円もらおうか。"
2601303-50 = "さっさと金を出せ。"
2601303-54 = "……そんなに、持ってない。"
2601303-55 = "[s3] \"いくら何でも、1枚1万円だなんて……！\"\n[s4] \"そんなの、無茶苦茶だよ！\""
2601303-58 = "ふん、知るか。"
2601303-59 = "私たちが作ったんだから、#n値段もこっちが決めて当然だろ！"
2601303-60 = "悪いのは、黙って撮影したお前たちじゃないのか？"
2601303-61 = "……許可をもらわずに、写真を撮ったことは、ごめんなさい。#nでも、そんな大金は持ってなくて……。"
2601303-62 = "良いから用意してこい！"
2601303-63 = "もし払えなかったら、どうなるか分かってんだろうな！"
2601303-64 = "ひどい……。"
2601303-68 = "……先生、手。"
2601303-69 = "[s5] \"えっ？\"\n[s6] \"急にどうしたの？\""
2601303-72 = "走ろう！"
2601303-78 = "はぁ……はぁ……。"
2601303-79 = "しばらく隠れていれば、諦めてくれると思うけど……。"
2601303-80 = "まだ追いかけてきてるかもしれない。#n先生、もう少し詰めて。"
2601303-81 = "[s] \"隠れるところがあって、助かったね。\""
2601303-82 = "うん。私も、海辺にちょうど良い茂みがあるとは思わなかった。"
2601303-83 = "……あれ。#nよく見れば、ただの草むらじゃない。"
2601303-84 = "……お花？"
2601303-88 = "これ、さっきのフォトスポットに飾られてたお花だ。"
2601303-89 = "[s] \"あそこよりも、たくさん咲いてるね。\""
2601303-90 = "うん、すごくきれい。"
2601303-91 = "どれも元気に咲いてる。"
2601303-92 = "先生。この花の名前、教えてほしい。"
2601303-93 = "……ハマナス？ありがとう、また勉強になった。"
2601303-94 = "[s] \"アツコ、撮ってあげるよ。\""
2601303-95 = "……私を？"
2601303-96 = "さっきと交代ってこと？"
2601303-97 = "……うん。#n先生になら、撮ってもらいたい。"
2601303-100 = "[wa:1400]― [log=아츠코 수영복]写真、[wa:1285]いっぱい撮ってきたけど……[/log]"
2601303-102 = "― [log=아츠코 수영복]こうして撮られるのは初めて。[/log]"
2601303-105 = "― [log=아츠코 수영복]こういうとき、[wa:1600]どうしたらいいか分からない……[/log]"
2601303-108 = "[wa:1230]― [log=아츠코 수영복]こう、[wa:1100]笑えばいいのかな？[/log]"
2601303-111 = "― [log=아츠코 수영복]もっとお花のほうに寄る……？[wa:2700]わかった。[/log]"
2601303-114 = "[wa:1670]― [log=아츠코 수영복]ハマナス……[wa:1450]いいにおい。[/log]"
2601303-117 = "[wa:1570]― [log=아츠코 수영복]偶然見つけた場所だけど……[wa:2400]先生のおかげで、[wa:1100]ここに来れた。[/log]"
2601303-120 = "[wa:800]― [log=아츠코 수영복]ありがとう先生。[wa:2150]素敵な思い出になったよ。[/log]"
2601303-123 = "カメラ、貸してくれる？"
2601303-124 = "……自分の写真を見るなんて、ちょっと恥ずかしいけど。"
2601303-131 = "おかしいな、こっちに逃げていったはずなのに……。"
2601303-132 = "チッ、一儲けできると思ったんだけどな。"
2601303-139 = "……帰ったみたい。"
2601303-140 = "次からは、ちゃんと確認してから撮らないとね。#nまたトラブルに巻き込まれたら困るし……。"
2601303-141 = "先生、助けてくれてありがとう。"
2601303-142 = "[s] \"よかったら、また一緒に出かけよう。\""
2601303-146 = "ふふ。#nじゃあ、お願いしようかな。"
2601303-147 = "先生のおかげで、良い写真も撮れたから。"
2601303-148 = "よろしくね、先生。"
