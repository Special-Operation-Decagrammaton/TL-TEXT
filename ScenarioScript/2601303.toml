[translation]
2601303-1 = "O que há além da fuga"
2601303-2 = "（Recebi uma mensagem da Atsuko e fui até o local de encontro）"
2601303-4 = "Ah, Sensei."
2601303-8 = "[ns] \"O que houve de repente?\""
2601303-9 = "Fufu, é que eu queria registrar a imagem do Sensei também."
2601303-10 = "……Por acaso, o que eu disse agora foi indelicado?"
2601303-11 = "[s] \"Só fiquei um pouco surpreso, está tudo bem.\""
2601303-12 = "Sendo assim, fico aliviada."
2601303-13 = "……Você disse que tinha \"algo que queria fotografar a todo custo\", não disse?"
2601303-14 = "A primeira coisa era o Sensei."
2601303-15 = "Vamos, Sensei. #nPara o próximo lugar."
2601303-17 = "É ali."
2601303-18 = "Eu encontrei ontem."
2601303-19 = "Dizem que é um ponto para tirar fotos de flores."
2601303-20 = "……As flores estão um pouco menos vivas do que ontem."
2601303-21 = "[s1] \"Agora que você mencionou, é verdade...\"\n[s2] \"Mas elas ainda não estão bonitas o suficiente?\""
2601303-24 = "……Sim, é verdade."
2601303-25 = "Sensei, vamos tirar uma foto. #nSente-se naquela cadeira."
2601303-26 = "[s] \"Mas você já não tirou uma minha agora pouco?\""
2601303-27 = "Então, por enquanto, apenas as flores..."
2601303-28 = "……Sim, ficou bom."
2601303-32 = "Vou tentar tirar de lado também."
2601303-38 = "Sensei, consegui tirar uma foto boa."
2601303-39 = "Agora, a próxima..."
2601303-40 = "Vocês aí, o que estão fazendo?"
2601303-42 = "Quem deu permissão para fotografarem aqui?"
2601303-43 = "……É um lugar que precisa de permissão?"
2601303-44 = "Claro que sim! #nFomos nós que fizemos isso aqui!"
2601303-45 = "[s] \"Sinto muito por termos fotografado sem permissão.\""
2601303-46 = "Humpf, não preciso de desculpas."
2601303-47 = "Mais importante, quantas fotos vocês tiraram? #nDigam a verdade!"
2601303-48 = "……Foram 8 fotos."
2601303-49 = "Ora, ora, tiraram bastante, hein! #nComo custa 10 mil ienes cada, vamos querer um total de 80 mil ienes."
2601303-50 = "Paguem logo."
2601303-54 = "……Eu não tenho tanto dinheiro assim."
2601303-55 = "[s3] \"De qualquer forma, 10 mil ienes por foto é...!\"\n[s4] \"Isso é um absurdo!\""
2601303-58 = "Humpf, não me interessa."
2601303-59 = "Como fomos nós que fizemos, #né natural que nós decidamos o preço!"
2601303-60 = "Não são vocês que estão errados por terem fotografado em silêncio?"
2601303-61 = "……Peço desculpas por ter tirado fotos sem pedir permissão. #nMas eu não tenho tanto dinheiro assim..."
2601303-62 = "Dê um jeito de arrumar!"
2601303-63 = "Se não puderem pagar, já sabem o que vai acontecer!"
2601303-64 = "Que horror..."
2601303-68 = "……Sensei, sua mão."
2601303-69 = "[s5] \"Hã?\"\n[s6] \"O que houve de repente?\""
2601303-72 = "Vamos correr!"
2601303-78 = "Haa... haa..."
2601303-79 = "Acho que se ficarmos escondidos por um tempo, eles vão desistir..."
2601303-80 = "Eles podem estar nos perseguindo ainda. #nSensei, chegue um pouco mais perto."
2601303-81 = "[s] \"Ainda bem que tinha um lugar para nos escondermos.\""
2601303-82 = "Sim. Eu também não esperava encontrar um arbusto tão bom à beira-mar."
2601303-83 = "……Ei. #nOlhando bem, não é apenas um matagal comum."
2601303-84 = "……Flores?"
2601303-88 = "Estas são as flores que estavam decorando aquele ponto de fotos de antes."
2601303-89 = "[s] \"Tem muito mais flores aqui do que lá, não é?\""
2601303-90 = "Sim, são muito bonitas."
2601303-91 = "Todas estão florescendo com vigor."
2601303-92 = "Sensei. Você poderia me dizer o nome desta flor?"
2601303-93 = "……Rosa-rugosa? Obrigado, aprendi algo novo hoje."
2601303-94 = "[s] \"Atsuko, vou tirar uma foto sua.\""
2601303-95 = "……Minha?"
2601303-96 = "Quer dizer que vamos trocar de lugar?"
2601303-97 = "……Sim. #nSe for você, Sensei, eu adoraria que tirasse uma foto minha."
2601303-100 = "[wa:1400]― [log=아츠코 수영복]Eu tirei muitas fotos, mas……[/log]"
2601303-102 = "― [log=아츠코 수영복]É a primeira vez que sou fotografada assim.[/log]"
2601303-105 = "― [log=아츠코 수영복]Nessas horas, [wa:1600]eu não sei bem o que fazer……[/log]"
2601303-108 = "[wa:1230]― [log=아츠코 수영복]Assim, [wa:1100]será que devo sorrir?[/log]"
2601303-111 = "― [log=아츠코 수영복]Devo chegar mais perto das flores……? [wa:2700]Entendi.[/log]"
2601303-114 = "[wa:1670]― [log=아츠코 수영복]Rosa-rugosa…… [wa:1450]que cheiro bom.[/log]"
2601303-117 = "[wa:1570]― [log=아츠코 수영복]Foi um lugar que encontramos por acaso, mas…… [wa:2400]graças a você, Sensei, [wa:1100]eu pude vir aqui.[/log]"
2601303-120 = "[wa:800]― [log=아츠코 수영복]Obrigada, Sensei. [wa:2150]Foi uma lembrança maravilhosa.[/log]"
2601303-123 = "Pode me emprestar a câmera?"
2601303-124 = "……É um pouco vergonhoso ver fotos de mim mesma, mas."
2601303-131 = "Que estranho, era para eles terem fugido por aqui……"
2601303-132 = "Droga, achei que daria para ganhar um bom dinheiro."
2601303-139 = "……Parece que foram embora."
2601303-140 = "Da próxima vez, precisamos verificar tudo antes de tirar fotos. #nNão seria bom nos envolvermos em problemas de novo……"
2601303-141 = "Sensei, obrigada por me ajudar."
2601303-142 = "[s] \"Se quiser, vamos sair juntos de novo.\""
2601303-146 = "Fufu. #nEntão, eu aceito o convite."
2601303-147 = "Graças a você, Sensei, consegui tirar fotos muito boas."
2601303-148 = "Conto com você, Sensei."
