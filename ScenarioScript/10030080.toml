[translation]
10030080-1 = "Epílogo; Fogo de Palha"
10030080-4 = "（Uma semana após o Ano Novo）"
10030080-6 = "Veritas - Sala de Descanso"
10030080-9 = "Ugh... guuuuh..."
10030080-14 = "Senpai Hare, força! Só mais um pouco!"
10030080-15 = "Mais um pouco... estamos quase batendo o novo recorde...!"
10030080-25 = "Ugh... consegui!"
10030080-26 = "Incrível, Senpai! Você adicionou 10kg a mais que o recorde anterior e já conseguiu?!"
10030080-27 = "Eu também sinto que evoluí, mas ainda não consigo alcançar a Hare-san."
10030080-28 = "Ficar ouvindo isso me deixa um pouco envergonhada..."
10030080-29 = "Mas... é que eu me esforcei bastante nos treinos nos últimos dias."
10030080-30 = "Acho que exercícios que usam \"força muscular\" são algo que consigo fazer até certo ponto."
10030080-32 = "Então, que tal focarmos em \"resistência\" agora...?"
10030080-38 = "...Cheguei."
10030080-42 = "Ah, Senpai! Bem-vinda de volta!"
10030080-44 = "Faz tempo, vice-presidente."
10030080-45 = "A gente não se via na sala do clube desde o dia de Ano Novo, né? O que você estava fazendo?"
10030080-47 = "Pois é. Fui convidada para festas de Ano Novo por empresas onde atuo como consultora de segurança, então fiquei indo de um lado para o outro."
10030080-48 = "As visitas de cortesia foram tão exaustivas que sinto que estou até rouca..."
10030080-49 = "Senpai, você não está se esforçando demais...?"
10030080-50 = "Se for por trabalho, sempre aparecem outros pedidos, mas a saúde, uma vez perdida, não é tão fácil de recuperar."
10030080-51 = "...Por que não descansa um pouco na semana que vem?"
10030080-52 = "É verdade... descanso é importante."
10030080-53 = "Mas não posso me dar ao luxo de parar com as atividades externas em um período tão importante. Obrigada pela preocupação."
10030080-54 = "Falando nisso, o que vocês andaram fazendo ultimamente?"
10030080-55 = "Ouvi daqui de fora da sala do clube, vocês não estavam falando sobre exercícios?"
10030080-56 = "Vocês que antes nem queriam sair da sala, agora falando de exercícios por conta própria... Fiquei feliz achando que era um resultado de ter levado vocês para acampar."
10030080-61 = "Ah, sobre isso..."
10030080-62 = "Pode-se dizer que é um plano de exercícios, de certa forma..."
10030080-69 = "Estávamos jogando o modo de treinamento do \"Fitness Simulator\"!"
10030080-75 = "...Hã?"
10030080-76 = "Ah, Senpai, você não conhece o \"Fitness Simulator\"? #nÉ um jogo que acabou de sair."
10030080-77 = "É um jogo onde você se torna um atleta e treina várias capacidades físicas! #nVirou assunto porque dá para vivenciar treinos reais de forma realista!"
10030080-78 = "Só que, na primeira rodada, os atributos do atleta que você treina têm um limite..."
10030080-79 = "Para conseguir um atleta com atributos altos, você precisa jogar várias vezes."
10030080-80 = "Então, essa \"força muscular\" ou \"resistência\" que vocês mencionaram não era na vida real..."
10030080-81 = "...Era sobre os personagens do jogo?"
10030080-82 = "Isso!"
10030080-83 = "Só por precaução..."
10030080-84 = "Vocês, quando foi a última vez que saíram da sala do clube?"
10030080-86 = "Ontem... ou será que foi anteontem?"
10030080-87 = "Faz mais tempo. Não saímos desde que voltamos no dia de Ano Novo."
10030080-88 = "Dizem que o modo de treinamento do \"Fitness Simulator\" leva mais de 3 dias para completar, então não tem jeito, né."
10030080-90 = "...E os planos para a semana que vem?"
10030080-92 = "Ah, na semana que vem lança o \"BOOM Eternal\", o reboot da série de jogos retrô \"BOOM\"."
10030080-94 = "A novidade mais quente de Kivotos! #nComo membros da Veritas que buscam a verdade, não podemos deixar de fazer uma análise!"
10030080-95 = "Falando nisso, vi que se postar um vídeo de gameplay de \"BOOM Eternal\" nas redes sociais, dá para concorrer a produtos limitados da \"Yokai MAX\"..."
10030080-96 = "É a chance perfeita para fazer um RTA de zeramento mais rápido após o lançamento."
10030080-97 = "O que acha, Senpai Chihiro? #nVamos virar a noite no dia do lançamento—"
10030080-106 = "Vocês duas..."
10030080-111 = "Parece que você precisa de mais uma bronca, não é!?"
10030080-117 = "Waaah! Me desculpaaa!!"
10030080-125 = "(Cyber) Marcha de Ano Novo"
