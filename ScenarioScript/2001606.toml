[translation]
2001606-1 = "微笑みのフロイライン"
2001606-2 = "（イロハからモモトークが届いたので、色々と準備をしておいた）"
2001606-3 = "[ns1] \"コーヒー、お菓子……これくらいかな。\"\n[ns2] \"まだ来ないみたいだし、とりあえず仕事を……。\""
2001606-14 = "[ns] \"ふぅ……そろそろかな？\""
2001606-15 = "（しかし幾つか仕事を片付けていくもののイロハは訪れず、正午を過ぎ……）"
2001606-16 = "（それでも、イロハはやってこない）"
2001606-19 = "（午後の3時を過ぎていた）"
2001606-20 = "（いつもなら、こんなに時間が空くことは無かったはず……）"
2001606-21 = "（何かあったのではないかと、心配が頭をよぎる）"
2001606-22 = "[s] \"……万魔殿、行ってみようかな。\""
2001606-26 = "（そうして訪れたゲヘナ学園の万魔殿、そこは何だか忙しそうな様子で……）"
2001606-27 = "戦車の移動を終えたら、次は銃火器を運びます、急いで。"
2001606-28 = "はいっ！"
2001606-29 = "次の訓練まで、問題が無いように保管しておいてください。勿体ないことはしないでくださいね。"
2001606-30 = "……振りじゃないですからね、本当にやめてくださいよ。"
2001606-31 = "はい、承知しました！！"
2001606-32 = "あとは……。"
2001606-33 = "まあ、一旦こんなところですかね。来週の訓練に向けて、各自頑張ってください。"
2001606-34 = "イエス、マム！"
2001606-35 = "あー、めんどくさい……。"
2001606-36 = "[s] \"イロハ？\""
2001606-37 = "……先生？"
2001606-38 = "先生が、どうしてここに……。"
2001606-39 = "[s] \"それは、その……。\""
2001606-40 = "（これまでの経緯をイロハに話した）"
2001606-41 = "……つまりあれですか。"
2001606-42 = "私が全然シャーレに来てくれないから、何かあったのではと心配になって……？"
2001606-43 = "……ふふっ。"
2001606-44 = "[s] \"？？？\""
2001606-45 = "ふっ、くっ。あははははっ！そんな理由で、ここまで……？"
2001606-46 = "いやいや先生、最初に話したことをお忘れですか？"
2001606-47 = "私、先生をおびき寄せることが目的だったんですよ？"
2001606-48 = "それなのに私が来ないからって、自分からのこのこやって来るのはどうなんですか？"
2001606-49 = "これが作戦だとは思わなかったんです？"
2001606-50 = "[s] \"そ、そういうこと……！？\""
2001606-51 = "いえ、言ってみただけです。そんなわけ無いじゃないですか。"
2001606-52 = "今日は本当にこの通り、忙しかっただけですよ。"
2001606-53 = "[s] \"イロハがあんなに真面目にやってるの、初めて見たかも。\""
2001606-54 = "失礼な……これくらいやりますよ、万魔殿の戦車長なんですから。"
2001606-55 = "まあ、褒められることは嫌いではありませんけどね？もっと褒めても良いんですよ？"
2001606-56 = "[s] \"うん、流石。というか邪魔してごめんね、すぐ帰るよ。\""
2001606-57 = "いえ、別に急いで帰る必要もありません。"
2001606-58 = "せっかく来たんですから、もう少しいたらどうですか？仕事もおよそ片付いたことですし。"
2001606-59 = "あー、まあ、あとは議長に結果報告が必要なのですが……。"
2001606-60 = "まあ「不測の事態で報告が遅れる」なんて、よくあることですから。ねぇ？"
2001606-66 = "[ns] \"イロハ……？\""
2001606-67 = "先生さえよければ、ご案内しますよ。先日お話した、「私だけの休憩スペース」に。"
2001606-68 = "どうです？興味、ありませんか？"
2001606-70 = "[ns] \"ここって……車庫？\""
2001606-71 = "はい、万魔殿の戦車を置いている場所ですね。まあ、今は私だけのスペースです。"
2001606-72 = "さあ、こちらへ。"
2001606-76 = "どうぞ、遠慮なく。"
2001606-79 = "[wa:100]― ふふっ、"
2001606-81 = "― 中々悪くない場所だと[wa:1300]思いませんか。"
2001606-84 = "[wa:600]― このふかふかな座布団、"
2001606-86 = "― 揃えられた[wa:1200]幾つものおやつ。"
2001606-89 = "― さらには[wa:1400]本やゲームまで[wa:800]たくさん。"
2001606-92 = "[wa:400]― 私だけの、[wa:1500]自慢の休憩スペースです。"
2001606-94 = "― どうですか？"
2001606-97 = "[ns3] \"良い感じの場所だ……。\"\n[ns4] \"なるほど、これは良い。\""
2001606-98 = "[wa:200]― ふふっ、[wa:1600]もっと感心して、"
2001606-99 = "[wa:200]― ふふっ、[wa:1600]もっと感心して、"
2001606-101 = "― 褒めてくれても[wa:550]良いんですよ？"
2001606-104 = "[wa:500]― さて、[wa:1500]今は共犯がいることですし、"
2001606-106 = "― 今日も今日とて[wa:800]サボるとしましょうか？"
2001606-109 = "― ねえ、[wa:800]先生？"
2001606-113 = "さて、まあ結果論ではあるものの……。"
2001606-114 = "また私の誘いに乗ってサボってしまいましたね、先生？"
2001606-115 = "[s] \"確かに……。\""
2001606-116 = "ふふ、ちゃんとお気をつけた方がいいですよ？"
2001606-117 = "先生が油断した隙に、本当に私が懐柔できてしまうかもしれませんので。"
2001606-118 = "[s] \"うん、適度に頑張ろうかな。\""
2001606-119 = "まあ、楽しみにしてますよ。せいぜい頑張ってください。"
2001606-121 = "（そう言いながら微笑むイロハと共に、イロハの休憩スペースでしばらく良い時間を過ごした）"
