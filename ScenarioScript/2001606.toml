[translation]
2001606-1 = "Fräulein do Sorriso"
2001606-2 = "（Como recebi uma MomoTalk da Iroha, preparei várias coisas）"
2001606-3 = "[ns1] \"Café, doces... acho que é só isso.\"\n[ns2] \"Parece que ela ainda não vem, então vou adiantar o trabalho por enquanto...\""
2001606-14 = "[ns] \"Ufa... será que já está na hora?\""
2001606-15 = "（No entanto, embora eu tenha terminado algumas tarefas, a Iroha não apareceu e passou do meio-dia...）"
2001606-16 = "（Mesmo assim, a Iroha não vem）"
2001606-19 = "（Já passava das três da tarde）"
2001606-20 = "（Normalmente, não costumava demorar tanto assim...）"
2001606-21 = "（A preocupação de que algo pudesse ter acontecido passou pela minha cabeça）"
2001606-22 = "[s] \"...Acho que vou dar uma passada no Pandemonium.\""
2001606-26 = "（Ao chegar no Pandemonium da Academia Gehenna, o lugar parecia estar bastante ocupado...）"
2001606-27 = "Assim que terminarem de mover o tanque, levem as armas de fogo em seguida. Rápido."
2001606-28 = "Sim, senhora!"
2001606-29 = "Por favor, guardem tudo para que não haja problemas até o próximo treinamento. Não desperdicem nada, entenderam?"
2001606-30 = "...Não é uma deixa, então, por favor, parem mesmo com isso."
2001606-31 = "Sim, entendido!!"
2001606-32 = "E o resto é..."
2001606-33 = "Bem, por enquanto é isso. Esforcem-se para o treinamento da semana que vem."
2001606-34 = "Sim, senhora!"
2001606-35 = "Ah, que trabalhoso..."
2001606-36 = "[s] \"Iroha?\""
2001606-37 = "...Sensei?"
2001606-38 = "Por que o sensei está aqui..."
2001606-39 = "[s] \"Bem, é que...\""
2001606-40 = "（Contei para a Iroha tudo o que aconteceu até agora）"
2001606-41 = "...Então é isso."
2001606-42 = "Como eu não fui ao Schale, você ficou preocupado achando que algo tinha acontecido...?"
2001606-43 = "...Fufu."
2001606-44 = "[s] \"???\""
2001606-45 = "Pfft, ahaha! Você veio até aqui por esse motivo...?"
2001606-46 = "Não, não, sensei, esqueceu do que eu disse no começo?"
2001606-47 = "Meu objetivo era atrair você, lembra?"
2001606-48 = "Mesmo assim, só porque eu não fui, você veio andando até aqui por conta própria?"
2001606-49 = "Não pensou que isso poderia ser parte do plano?"
2001606-50 = "[s] \"E-era isso...?\""
2001606-51 = "Não, eu só disse por dizer. Não é como se fosse verdade."
2001606-52 = "Hoje eu só estava realmente ocupada, como você pode ver."
2001606-53 = "[s] \"Talvez seja a primeira vez que vejo a Iroha trabalhando tão seriamente.\""
2001606-54 = "Que falta de educação... Eu faço isso sim, afinal, sou a comandante de tanques do Pandemonium."
2001606-55 = "Bem, eu não desgosto de ser elogiada, sabe? Pode me elogiar mais, se quiser."
2001606-56 = "[s] \"Sim, como esperado. Aliás, desculpe atrapalhar, já vou indo.\""
2001606-57 = "Não, não precisa ter pressa para ir embora."
2001606-58 = "Já que veio até aqui, por que não fica mais um pouco? O trabalho já está quase todo terminado."
2001606-59 = "Ah, bem, ainda preciso reportar os resultados para a presidente, mas..."
2001606-60 = "Bem, dizer que \"o relatório atrasou devido a circunstâncias imprevistas\" é algo comum, não é?"
2001606-66 = "[ns] \"Iroha...?\""
2001606-67 = "Se o sensei quiser, eu posso te mostrar. Aquele \"meu espaço de descanso particular\" que mencionei outro dia."
2001606-68 = "O que acha? Não tem interesse?"
2001606-70 = "[ns] \"Isso aqui é... uma garagem?\""
2001606-71 = "Sim, é onde guardamos os tanques do Pandemonium. Bem, agora é o meu espaço particular."
2001606-72 = "Venha, por aqui."
2001606-76 = "Por favor, não se acanhe."
2001606-79 = "[wa:100]— Fufu,"
2001606-81 = "— Não acha que este é um lugar [wa:1300]nada mal?"
2001606-84 = "[wa:600]— Estas almofadas fofinhas,"
2001606-86 = "— E todos estes lanches [wa:1200]preparados."
2001606-89 = "— E ainda por cima, [wa:1400]muitos livros e jogos [wa:800]também."
2001606-92 = "[wa:400]— Este é o meu [wa:1500]espaço de descanso favorito."
2001606-94 = "— O que achou?"
2001606-97 = "[ns3] \"É um lugar bem agradável...\"\n[ns4] \"Entendo, isso é muito bom.\""
2001606-98 = "[wa:200]— Fufu, [wa:1600]fique ainda mais impressionado,"
2001606-99 = "[wa:200]— Fufu, [wa:1600]fique ainda mais impressionado,"
2001606-101 = "— Pode me elogiar [wa:550]à vontade, sabe?"
2001606-104 = "[wa:500]— Bem, [wa:1500]já que agora tenho um cúmplice,"
2001606-106 = "— Que tal se a gente [wa:800]matar aula hoje também?"
2001606-109 = "— Ei, [wa:800]Sensei?"
2001606-113 = "Bem, embora seja uma questão de resultado..."
2001606-114 = "Você acabou aceitando meu convite para matar aula de novo, não foi, Sensei?"
2001606-115 = "[s] \"É verdade...\""
2001606-116 = "Fufu, é melhor você tomar cuidado, sabe?"
2001606-117 = "Pode ser que, num momento de descuido, eu acabe realmente te convencendo."
2001606-118 = "[s] \"Sim, acho que vou me esforçar na medida certa.\""
2001606-119 = "Bem, estarei esperando. Esforce-se o máximo que puder."
2001606-121 = "(Enquanto dizia isso com um sorriso, passei um bom tempo no espaço de descanso da Iroha junto com ela.)"
