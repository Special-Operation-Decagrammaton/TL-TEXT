[translation]
10002005-1 = "Prólogo; O mar de verão e as garotas"
10002005-6 = "Uau! É o mar, o mar!"
10002005-7 = "Finalmente chegamos! É o mar de verdade, Azusa-chan!"
10002005-8 = "……Sim, é o mar."
10002005-9 = "Ah, será que... sou só eu que estou animada...?"
10002005-10 = "Azusa-chan, é a sua primeira vez no mar, não é?"
10002005-11 = "O que achou,"
10002005-12 = "desse mar que se estende por todo o horizonte!"
10002005-13 = "[s1] \"É incrível, né? O mar! Me deixa super animada!\"\n[s2] \"Foi difícil chegar até aqui, não foi…….\""
10002005-14 = "……Sim, mesmo assim estou bem impressionada. Não é nada mal."
10002005-15 = "……Sim, mesmo assim estou bem impressionada. Não é nada mal."
10002005-16 = "Só que,"
10002005-17 = "por causa de vários problemas que tivemos para chegar aqui, ou melhor……."
10002005-18 = "……Ainda estamos no meio deles, na verdade."
10002005-19 = "……."
10002005-20 = "A-ah, é verdade, tinha isso……."
10002005-26 = "Kihehe... guhehehehehe!!"
10002005-27 = "……Ufa, finalmente chegamos."
10002005-28 = "Kehehehe!!"
10002005-30 = "Kihyahhahhahhahhaaaaa!!!"
10002005-35 = "……."
10002005-36 = "……."
10002005-37 = "Bem……."
10002005-38 = "N-nós, o que vamos fazer agora……?"
10002005-40 = "#video;10002"
10002005-43 = "O [wa:100] in[wa:100]ci[wa:100]den[wa:100]te [wa:100]ter[wa:100]mi[wa:100]na, [wa:500]e [wa:100]re[wa:100]co[wa:100]me[wa:100]ça"
10002005-49 = "Entrem aqui, é melhor não resistirem."
10002005-50 = "Kya!?"
10002005-51 = "……Ugh."
10002005-58 = "Bom trabalho, Hasumi-senpai."
10002005-59 = "Ufa, que situação complicada……."
10002005-60 = "Pelo que apuramos até agora, os danos incluem mais de 30 membros do Comitê de Justiça com ferimentos leves ou graves, a praça leste da escola parcialmente destruída, o 12º prédio totalmente destruído, e além disso——"
10002005-61 = "Obrigada. Por favor, me conte os detalhes dos danos mais tarde."
10002005-62 = "A propósito…… esses danos foram causados apenas por essas duas, correto? Não foi contra um grupo armado ou algo de grande porte?"
10002005-63 = "Elas usaram uma tática de guerra relâmpago, e até conseguirmos garantir a arma antitanque \"PIAT\", ficamos na defensiva o tempo todo……."
10002005-64 = "Com uma mobilidade rápida, e além disso, focando precisamente nos nossos granadeiros, levou tempo até conseguirmos pará-las."
10002005-65 = "Uma tática surpreendente."
10002005-66 = "Entendo…… ainda assim, pensar que elas roubaram descaradamente o tanque da escola. Vocês duas são mais ousadas do que eu imaginava."
10002005-67 = "N-não, isso……! N-nós não roubamos! Só pegamos emprestado por um momento, pensando em devolver depois……."
10002005-68 = "Acho que, no mundo real, chamamos isso de \"roubar\"……? Hifumi Ajitani, Azusa Shirasu."
10002005-69 = "……Humpf."
10002005-70 = "……As coisas que foram estabelecidas devem ser respeitadas. Seja uma regra ou qualquer outra coisa. ……Por enquanto, vou discutir o tratamento de vocês, então fiquem quietas e esperem."
10002005-76 = "A-au…… sinto que fomos terrivelmente mal interpretadas……."
10002005-77 = "Mas foi uma pena, Hifumi. Se tivéssemos notado a emboscada do último atirador, ainda poderíamos ter continuado."
10002005-78 = "A-Azusa-chan, não é isso……."
10002005-79 = "A-afinal, por que você atacou o Comitê de Justiça!? Não teria sido melhor se render pacificamente……."
10002005-80 = "Eu só revidei porque eles estavam nos perseguindo. Além disso, graças à Hifumi pilotando o tanque tão bem, conseguimos derrotar um bom número deles."
10002005-81 = "Especialmente aquele drift na curva após a aceleração brusca. Aquilo foi bom, não é qualquer um que consegue fazer."
10002005-82 = "Aquilo não foi pilotar, eu só toquei em tudo quanto é botão e acabou acontecendo…… a-auuu……."
10002005-83 = "O-o que vamos fazer!? Desse jeito, vamos acabar como simples criminosas que roubaram um tanque, correram pela escola e derrotaram vários membros do Comitê de Justiça……!"
10002005-84 = "Não há nada de errado."
10002005-85 = "N-não, está tudo errado...! Ugh, não era para ser assim..."
10002005-86 = "Auu..."
10002005-87 = "Bem, o que vai acontecer agora...? Será que vão arrancar nossas unhas? Hifumi, você treinou para resistir a torturas?"
10002005-88 = "Eu não fiz esse tipo de treinamento, e nem quero fazer... Além disso, acho que o pessoal do Comitê de Justiça não faz esse tipo de coisa... Provavelmente."
10002005-89 = "E a presidente do Comitê de Justiça? Não, aquilo é mais uma execução do que uma tortura..."
10002005-90 = "E-eu não sei muito sobre a Tsurugi-san... M-mas, fazer algo assim com alguém da mesma escola..."
10002005-91 = "Pelos boatos que ouvi, várias pessoas já 'acabaram mal' por causa dela."
10002005-92 = "A-auu... É verdade que eu também já ouvi esses boatos, mas..."
10002005-93 = "Nesse caso, só nos resta contar tudo honestamente e pedir perdão..."
10002005-95 = "..."
10002005-96 = "Então, resumindo..."
10002005-97 = "Você roubou um tanque porque queria mostrar o mar para a Azusa-san... É isso mesmo?"
10002005-98 = "Sim... Eu só pensei em pegar emprestado um equipamento da escola para irmos até lá... Eu nunca quis roubar de verdade..."
10002005-99 = "Sendo você, Hifumi-san, não acho que esteja mentindo, mas..."
10002005-100 = "Poderiam ter ido ao mar normalmente, por que tiveram que ir de tanque...?"
10002005-101 = "N-não, assim não teria graça!"
10002005-102 = "A Azusa-chan nunca viu o mar. Essa vai ser a primeira vez dela, entende!?"
10002005-103 = "S-sim... Mas por que um tanque por causa disso...?"
10002005-104 = "É férias de verão, afinal, e o cenário é perfeito. O sol escaldante, a areia fazendo cócegas nos pés, o mar brilhante... Sendo assim—"
10002005-105 = "Sendo assim...?"
10002005-109 = "Não tínhamos outra escolha a não ser ir de tanque, não é!?"
10002005-115 = "Entendi. Férias de verão, mar brilhante, areia cintilante. Uma viagem com amigas..."
10002005-116 = "E observar tudo isso de dentro de um tanque. Realmente, isso é indispensável. Tanques e mar combinam, pode-se dizer até que é romântico."
10002005-118 = "(Acena vigorosamente!)"
10002005-119 = "É-é mesmo...?"
10002005-120 = "É sério?"
10002005-121 = "Amizade, mar, romance, em suma—"
10002005-125 = "E-ei? O-o que é isso!? Um terremoto!?"
10002005-126 = "Não, provavelmente esse som é..."
10002005-131 = "JUVENTUUUUUUUDE!!!!"
10002005-132 = "(CRASHHHH!)"
10002005-133 = "(CLANG, CLANG!!)"
10002005-136 = "Kihehehehehe!!"
10002005-138 = "Hii!? E-ela atravessou a parede!?"
10002005-139 = "Tsurugi...?"
10002005-141 = "Ah, Tsurugi-senpai. Onde você estava até agora?"
10002005-142 = "Kiheaaaaaa!!!"
10002005-143 = "MAAAAAAARRRRRR!!"
10002005-144 = "VERÃO!! AMIZADE!! Kiheaaaaaaa!!"
10002005-145 = "...?"
10002005-146 = "Desculpe, me perdoe, por favor, me deixe ir! Dói arrancar unhas, então pare, por favor, acho que não vai ser divertido!!"
10002005-147 = "Tsurugi-senpai, você está especialmente animada hoje, não está...?"
10002005-150 = "...Entendo."
10002005-151 = "Será que isso é..."
10002005-152 = "Tsurugi."
10002005-153 = "Kukekeke...!"
10002005-154 = "...Hã?"
10002005-155 = "Venha aqui um pouco..."
10002005-156 = "Aaan...?"
10002005-161 = "Feeee……."
10002005-162 = "I-isso foi assustador……."
10002005-163 = "……Ainda não acabou. Não baixe a guarda, Hifumi. Podemos ser atacadas novamente a qualquer momento."
10002005-164 = "E-ehhh!? É sério, Mashiro-san!?"
10002005-165 = "Eu não saberia dizer com certeza se me perguntar…… mas, de fato, a Tsurugi-senpai tem parecido um pouco desanimada ultimamente."
10002005-166 = "Ela parece estar com bastante energia hoje, mas, de alguma forma, parece que ela não está no seu melhor……."
10002005-167 = "Pensando bem, talvez seja um pouco perigoso mesmo……."
10002005-168 = "A-auuu…… eu sabia……."
10002005-172 = "……Voltei."
10002005-173 = "Hiiie!? P-pelo menos me deixe escrever meu testamento……!"
10002005-174 = "……Do que você está falando?"
10002005-175 = "Eu expliquei a situação para a Tsurugi e a mandei para casa hoje, então não se preocupem."
10002005-176 = "Voltando ao assunto…… tenho um pedido para vocês duas."
10002005-177 = "Eh, sim!? P-para nós?"
10002005-180 = "……Entendi, uma delação premiada."
10002005-181 = "Em troca de não sermos punidas, querem que façamos algo perigoso."
10002005-182 = "Bem, eu não acho que seja tão perigoso assim, na verdade……."
10002005-183 = "Digamos que é um trabalho voluntário; algo que quero que façam no lugar da punição. Cobriremos todas as despesas e, claro, emprestaremos o tanque oficialmente."
10002005-184 = "V-voluntário……?"
10002005-185 = "Sim. Já que não conseguiram seguir as regras estabelecidas, agora quero que façam exatamente o que for determinado."
10002005-190 = "……E foi assim que acabamos aqui."
10002005-191 = "“Vão à praia com a Tsurugi e executem tudo o que está escrito nesta lista.”"
10002005-192 = "“Como prova, tirem fotos e apresentem o relatório.”……"
10002005-193 = "Até agora, eu ainda não entendo o que está acontecendo……."
10002005-194 = "De qualquer forma, nós duas não tínhamos confiança de que conseguiríamos dar conta sozinhas."
10002005-195 = "Por isso, pedimos a ajuda do Sensei……."
10002005-196 = "[s] \"Entendi, não entendi nada, mas entendi.\""
10002005-197 = "N-né……"
10002005-198 = "Mesmo assim, é muito reconfortante ter você aqui!"
10002005-202 = "……."
10002005-203 = "……Entendi, o papel aqui é de vigilância. Querem nos observar para garantir que não vamos fugir. O Comitê de Justiça é realmente rigoroso."
10002005-204 = "Não, não é bem assim……."
10002005-205 = "Não vou baixar a guarda. Mesmo que digam que é vigilância, não há garantias de que não vão atirar nas nossas costas."
10002005-206 = "(Ela está entendendo tudo completamente errado……)"
10002005-209 = "……Em resumo, isso seria uma \"férias de verão\"?"
10002005-210 = "Sim. Como sabem, a Tsurugi não tem conseguido descansar bem ultimamente."
10002005-211 = "(Então era isso……)"
10002005-212 = "Ela tem trabalhado sem parar ultimamente……"
10002005-213 = "Se continuar assim, as missões do Comitê de Justiça podem ser prejudicadas."
10002005-214 = "Então, já que temos essa oportunidade, quero que a Mashiro vá junto e aproveite para descansar um pouco."
10002005-215 = "Entendo, o descanso também faz parte da missão……"
10002005-216 = "Isso também é necessário pela justiça. Entendido. Farei o meu melhor, senpai."
10002005-219 = "S-se não conseguirmos completar essa missão com sucesso, será que ela vai arrancar minhas unhas…… auuu……."
10002005-220 = "Ou talvez, eles estejam esperando que a gente desapareça durante a operação."
10002005-221 = "[s] \"Pode me mostrar essa lista?\""
10002005-222 = "Ah, sim! Aqui está."
10002005-227 = "“Fazer um castelo de areia e um banho de areia”, “Aprender a nadar”, “Vôlei de praia”, “Fogos de artifício”, “Quebrar a melancia”, “Ir à casa de praia”……"
10002005-228 = "São 6 itens no total. Temos que fazer tudo isso com a Tsurugi-san e tirar fotos como prova."
10002005-229 = "[s3] \"……É uma missão bem pacífica, não é?\"\n[s4] \"……Tipo uma lista de coisas clássicas de verão?\""
10002005-230 = "……O Sensei continua sendo ingênuo como sempre."
10002005-231 = "……Como sempre, Sensei, você é ingênuo demais."
10002005-232 = "E se você escrevesse o objetivo claramente e essa lista fosse roubada por alguém? O que aconteceria?"
10002005-233 = "Códigos são a base de qualquer troca de informações. Mesmo que esteja escrito assim, deve haver alguma intenção oculta por trás. Afinal, estamos falando de ninguém menos que o Comitê de Justiça de Trinity..."
10002005-234 = "Se formos julgadas como 'inúteis' na primeira chance que nos deram, certamente não veremos o sol de amanhã. Não podemos baixar a guarda nem por um segundo."
10002005-235 = "A-Azusa-chan, você está dizendo coisas assustadoras de novo..."
10002005-236 = "M-mas, já que aceitamos, não temos escolha a não ser fazer, né..."
10002005-237 = "E conseguimos até o empréstimo oficial da Crusader-chan... hehe..."
10002005-238 = "Mar, trajes de banho, sol e um tanque!"
10002005-239 = "Isso é exatamente o que eu queria, as férias de verão perfeitas como eu imaginei!!"
10002005-240 = "……Se a Hifumi está feliz com isso, então está tudo bem."
10002005-241 = "Então, vamos parar com as suposições complicadas por enquanto!"
10002005-242 = "Primeiro, vamos seguir o que está escrito, um passo de cada vez..."
10002005-250 = "Kihihihihihihi!!!"
10002005-251 = "Mar! É o mar!! Kuwahahaha!!!"
10002005-252 = "O-o quê!? Assustador!?"
10002005-253 = "E então..."
10002005-254 = "U-um fantasma!? É um fantasma!! Fujam todos!!!"
10002005-257 = "Kyahahahahahahahaaaaa!!!"
10002005-260 = "……"
10002005-264 = "…………"
10002005-265 = "…………Sensei."
10002005-266 = "Sério, posso desistir agora...?"
10002005-267 = "[s5] \"V-vamos lá, Hifumi! Força!!\"\n[s6] Desvia o olhar silenciosamente."
10002005-268 = "Uwaaaaaaaan!! Me ajude, Sensei!!"
10002005-269 = "Uwaaaaaaaan!! Me ajude, Sensei!!"
10002005-274 = "……Sim."
10002005-275 = "Parece que serão férias de verão mais pacíficas do que o normal."
10002005-277 = "(Voltando no tempo, alguns dias atrás. Durante uma missão do Comitê de Justiça...)"
10002005-278 = "Kieeeeeeeeeee!!!"
10002005-279 = "Mesmo sendo verão!! Mesmo sendo o meu último verão!!"
10002005-280 = "Verão!! Amizade!! Juventude!! Mar!! Trajes de banhoooo!!"
10002005-281 = "Onde, onde é que está tudo isso!!"
10002005-285 = "(Dogaaaan!! Dogoooon!!)"
10002005-286 = "Minha juventude, não está em lugar nenhum!!"
10002005-287 = "(Dogoooooon!!! Zudoooooooon!!!!)"
10002005-288 = "Tsurugi-senpai, você está em ótima forma hoje."
10002005-289 = "……Para ser sincera, eu estava cansada de tantas missões, mas vendo isso, não posso reclamar."
10002005-290 = "Eu também preciso seguir o exemplo da senpai e me esforçar mais!"
10002005-291 = "(……)"
10002005-294 = "Aproveite bem as suas férias,"
10002005-295 = "divirta-se bastante."
