[translation]
10002005-1 = "プロローグ;夏の海と少女たち"
10002005-6 = "わーっ！海ですよ、海！"
10002005-7 = "ようやく着きました！本物の海ですよ、アズサちゃん！"
10002005-8 = "……うん、海だ。"
10002005-9 = "あ、あれ……はしゃいでるの私だけです……？"
10002005-10 = "アズサちゃん、海に来るの初めてなんですよね？"
10002005-11 = "どうですか、"
10002005-12 = "この視界いっぱいに広がる海！"
10002005-13 = "[s1] \"良いよね、海！テンション上がる！\"\n[s2] \"ここに来るまで大変だったね……。\""
10002005-14 = "……うん、これでも結構感激してる。なかなか悪くない。"
10002005-15 = "……うん、これでも結構感激してる。なかなか悪くない。"
10002005-16 = "ただ、"
10002005-17 = "ここに来るまでに色々問題があったせいで、というか……。"
10002005-18 = "……今も絶賛進行中というか。"
10002005-19 = "……。"
10002005-20 = "そ、そういえばそうでしたね……。"
10002005-26 = "きへへ……ぐへへへへへへ！！"
10002005-27 = "……ふう、ようやく着きましたね。"
10002005-28 = "けへへへへ！！"
10002005-30 = "きひゃひゃひゃひゃひゃーーーー！！！"
10002005-35 = "……。"
10002005-36 = "……。"
10002005-37 = "えっと……。"
10002005-38 = "わ、私たち、この後どうしましょう……？"
10002005-40 = "#video;10002"
10002005-43 = "事[wa:100]件[wa:100]が[wa:100]終[wa:100]わ[wa:100]り[wa:100]、[wa:500]ま[wa:100]た[wa:100]始[wa:100]ま[wa:100]る"
10002005-49 = "こちらに入ってください、抵抗はしない方が良いですよ。"
10002005-50 = "きゃっ！？"
10002005-51 = "……くっ。"
10002005-58 = "お疲れ様です、ハスミ先輩。"
10002005-59 = "ふう、困りましたね……。"
10002005-60 = "現在把握している限りですと、被害は正義実現委員会のメンバー30名余りが重軽傷、東の学園広場が半壊、第12校舎が全壊、それから――"
10002005-61 = "ありがとうございます、詳しい被害についてはまた後ほど聞かせてください。"
10002005-62 = "ちなみに……それらは、この二人による被害の規模で間違いないのですよね？武装集団や大型の何かと戦ったわけではなく？"
10002005-63 = "まる[ruby=ブリッツクリーク]で電撃戦の[/ruby]ように機動戦を仕掛けられてしまい、対戦車兵器「PIAT」を確保するまでの間、ずっと後手に回ることになり……。"
10002005-64 = "素早い機動力、それに加えてピンポイントに擲弾兵ばかり狙われてしまったこともあり、動きを止めるまで時間がかかってしまいました。"
10002005-65 = "驚くべき戦術です。"
10002005-66 = "そうでしたか……それにしても、まさか堂々と学園の戦車を盗み出すなんて。お二人とも、思っていた以上に大胆なところがあるのですね。"
10002005-67 = "い、いえっ、その……！ぬ、盗んだわけではありません！ちょっとだけ借りて、また戻しておこうかなって……。"
10002005-68 = "世間ではそれを「盗む」と呼ぶのだと思いますよ……？[ruby=あじたに]阿慈谷[/ruby]ヒフミさん、[ruby=しらす]白洲[/ruby]アズサさん。"
10002005-69 = "……ふん。"
10002005-70 = "……あらかじめ決められたものは、きちんと守らねばならないのですよ。それが規則であれ、何であれ。……取り合えずみなさんの処遇について話し合ってきますので、少し大人しく待っていてください。"
10002005-76 = "あ、あう……なんだかものすごく誤解されちゃった気が……。"
10002005-77 = "でも惜しかったよ、ヒフミ。最後の狙撃手の待ち伏せにさえ気づいていれば、まだまだ立ち回れたはず。"
10002005-78 = "あ、アズサちゃん、そうじゃなくて……。"
10002005-79 = "そ、そもそも、どうして正義実現委員を攻撃したんですか！？大人しく投降した方が良かったんじゃ……。"
10002005-80 = "追いかけてくるから反撃しただけ。それに、ヒフミが戦車を上手く操縦してくれたおかげでかなりの数を倒すことができた。"
10002005-81 = "特にあの、急加速後に見せたコーナーでのドリフト。あれは良かった、誰にでもできる動きじゃない。"
10002005-82 = "あれは操縦っていうより、てきとうにあちこち触ってたらああやって動いちゃっただけで……あ、あうぅ……。"
10002005-83 = "ど、どうしましょう！？このままだと戦車を盗んで、校内を疾走しながら正義実現委員会のメンバーを何人もやっつけた、ただの悪党になっちゃいますよ……！"
10002005-84 = "何も間違ってない。"
10002005-85 = "ま、間違ってますって……！うぅ、こんなはずじゃなかったのに……。"
10002005-86 = "あうぅ……。"
10002005-87 = "さて、これからどうなるのか……爪でもはがされるのかな。ヒフミ、拷問に耐える訓練はしてある？"
10002005-88 = "そんな訓練はしてませんし、したくもありません……それに、正義実現委員会の人は拷問とかしないと思います……多分。"
10002005-89 = "正義実現委員会の委員長も？いや、あれは拷問というより処刑か……。"
10002005-90 = "つ、ツルギさんのことは、よく分かりませんが……で、でも、同じ学園の人に対してそんなこと……。"
10002005-91 = "聞いた噂だと、もう何人も「ダメになった」って聞いたけど。"
10002005-92 = "あ、あうぅ……確かにその噂は、私も聞いたことありますけど……。"
10002005-93 = "こうなったら、全部正直に話して許してもらうしか……。"
10002005-95 = "……。"
10002005-96 = "つまり、まとめると……。"
10002005-97 = "アズサさんに海を見せたくて、戦車を盗んだ……ということで合ってますか？"
10002005-98 = "はい……ちょっと学園の備品をお借りして、行ってこようかなと……決して盗みたかったわけではないんです……。"
10002005-99 = "ヒフミさんのことですし、嘘をついてるとは思いませんが……。"
10002005-100 = "普通に海に行けば良かったものを、どうしてわざわざ戦車で……？"
10002005-101 = "そ、それではダメなんです！"
10002005-102 = "アズサちゃんは、海を見たことが無いんです。これが初めての海になるんですよ！？"
10002005-103 = "は、はい……ですが、それでどうして戦車を……？"
10002005-104 = "せっかくの夏休みですし、シチュエーションとしてはバッチリです。照りつける陽射し、足をくすぐる砂、きらめく海……そうとくれば――"
10002005-105 = "そうとくれば……？"
10002005-109 = "戦車に乗って行くしかないじゃないですか！？"
10002005-115 = "理解しました。夏休み、光る海、輝く砂浜。友達と行く旅行……"
10002005-116 = "そして、戦車から見渡すそれらの光景。確かにこれは外せませんね。海に戦車は付き物、ロマンとすら言えます。"
10002005-118 = "（こくこく！）"
10002005-119 = "そ、そうですか……？"
10002005-120 = "そうなの？"
10002005-121 = "友情、海、ロマン、要するに――"
10002005-125 = "え、えっ？な、何ですか！？地震！？"
10002005-126 = "いえ、おそらくこの音は……"
10002005-131 = "青春んんんーーーーーーー！！！！"
10002005-132 = "（ドガシャーーーーン！）"
10002005-133 = "（ガシャンッ、ガシャン！！）"
10002005-136 = "きへへへへへへっ！！"
10002005-138 = "ひっ！？か、壁を突き破ってきました！？"
10002005-139 = "ツルギ……？"
10002005-141 = "あ、ツルギ先輩。今までどこにいたんですか？"
10002005-142 = "きへああぁぁぁぁっ！！！"
10002005-143 = "海ぃぃぃぃぃぁぁあああぁぁっ！！"
10002005-144 = "夏ぅ！！友情ぉ！！きひゃああぁぁぁぁぁっ！！"
10002005-145 = "……？"
10002005-146 = "すみませんごめんなさい許してください！爪は痛いのでやめてください多分楽しくないと思いますっ！！"
10002005-147 = "ツルギ先輩、何だか今日は特にテンションが高いですね……？"
10002005-150 = "……なるほど。"
10002005-151 = "もしかしてこれは……。"
10002005-152 = "ツルギ。"
10002005-153 = "くけけけけ……！"
10002005-154 = "……へ？"
10002005-155 = "ちょっとこちらへ……。"
10002005-156 = "ああん……？"
10002005-161 = "ふぇぇ……。"
10002005-162 = "こ、怖かったです……。"
10002005-163 = "……まだ終わってない。気を緩めないで、ヒフミ。ここからまた強襲されて戦闘になるかもしれない。"
10002005-164 = "え、えぇっ！？そうなんですかマシロさん！？"
10002005-165 = "私に聞かれてもちょっと分かりませんが……ただ、確かにここ最近のツルギ先輩は、少し元気が無さそうな日が多かったです。"
10002005-166 = "今日のテンションは高そうですが、何となくキレが悪いと言いますか……。"
10002005-167 = "そう考えると確かに、ちょっと危ないかもしれませんね……。"
10002005-168 = "あ、あうぅ……やっぱり……。"
10002005-172 = "……ただいま戻りました。"
10002005-173 = "ひいっ！？せ、せめて遺言だけでも残させてください……！"
10002005-174 = "……何のお話ですか？"
10002005-175 = "ツルギには説明をして今日は帰ってもらいましたので、ご心配なく。"
10002005-176 = "話を戻しますが……お二人にお願いがあります。"
10002005-177 = "え、はい！？わ、私たちにですか？"
10002005-180 = "……なるほど、司法取引か。"
10002005-181 = "不問に付す代わりに、何か危ないことをさせようと。"
10002005-182 = "えっと、恐らくそんなに危なくはないかと思うのですが……。"
10002005-183 = "ボランティア活動と言いましょうか、処罰の代わりにやっていただきたいことがあります。諸経費はもちろん、戦車も正式にお貸ししますので。"
10002005-184 = "ぼ、ボランティアですか……？"
10002005-185 = "はい。決められたことを守れなかった代わりに、今度は決められた通りのことをしていただければと。"
10002005-190 = "……それで、まさかこうなるとは。"
10002005-191 = "「ツルギと一緒に海に行って、リストに書かれたことをその通りに実行してきてください」"
10002005-192 = "「証拠として、写真を撮って提出するように」……"
10002005-193 = "今でもまだ、何が何だか分からないのですが……。"
10002005-194 = "とにかく私たち二人では、ちょっと上手くやれる自信が無かったので。"
10002005-195 = "それで、先生にお願いを……。"
10002005-196 = "[s] \"なるほど、分からないけど分かった。\""
10002005-197 = "で、ですよね……"
10002005-198 = "それでも、来てくださって心強いです！"
10002005-202 = "……。"
10002005-203 = "……理解した、こっちは監視役だな。私たちが逃げないように見張るつもりか。流石に徹底してるな、正義実現委員会。"
10002005-204 = "いえ、別にそういうわけではないのですが……。"
10002005-205 = "油断はしない。監視と言いつつ、後ろから撃たれないとも限らないからな。"
10002005-206 = "（なんだかすごく誤解されてる……）"
10002005-209 = "……要するに、「夏季休暇」ということでしょうか？"
10002005-210 = "はい。ご存知の通り、ツルギもここ最近少し疲れが取れてないようですし。"
10002005-211 = "（そうだったんだ……）"
10002005-212 = "ここ最近ずっと働きづめでしたし……"
10002005-213 = "このままだと正義実現委員会としての任務に支障が出てしまうかもしれません。"
10002005-214 = "なのでせっかくの機会ですし、マシロも一緒に行って、ゆっくりしてきてもらえればと。"
10002005-215 = "なるほど、確かに休息も任務……"
10002005-216 = "これも正義のために必要なこと。承知しました。ベストを尽くしてきます、先輩。"
10002005-219 = "こ、このミッションを上手く達成できなかったら、やっぱり爪を……あうぅ……。"
10002005-220 = "或いは、[ruby=MIA]作戦行動中に行方不明[/ruby]になることを狙ってるのかもしれない。"
10002005-221 = "[s] \"そのリスト、ちょっと見せてくれる？\""
10002005-222 = "あ、はい！こちらです。"
10002005-227 = "「砂のお城と砂風呂作り」「泳ぎを習得する」「ビーチバレー」「花火」「スイカ割り」「海の家」……"
10002005-228 = "全部で6つですね。これらをツルギさんと一緒に行って、証拠写真を撮らなければいけません。"
10002005-229 = "[s3] \"……だいぶ平和なミッションというか。\"\n[s4] \"……夏の定番リスト、みたいな？\""
10002005-230 = "……相変わらず先生は素直すぎる。"
10002005-231 = "……相変わらず先生は素直すぎる。"
10002005-232 = "もし素直に目的を書いて、そのリストが誰かに奪われでもしたらどうなる？"
10002005-233 = "暗号はやり取りの基本。こういう書き方がされていても、裏には何か意図が隠されてるはず。なにせ相手は他でもない、あのトリニティ正義実現委員会……"
10002005-234 = "一度与えられたチャンスで「使い物にならない」と判断されたら、明日の陽射しはきっと拝めないはず。一瞬たりとも油断はできない。"
10002005-235 = "あ、アズサちゃん、そうやってまた怖いことを……。"
10002005-236 = "で、でも、受けた以上はやるしかないですよね……。"
10002005-237 = "こうしてクルセイダーちゃんまで正式に貸してもらいましたし……えへへ……。"
10002005-238 = "海、水着、陽射し、そして戦車！"
10002005-239 = "これこそ私が求めていた、イメージ通りの完璧な夏休みです！！"
10002005-240 = "……ヒフミがそれで良いなら、良かった。"
10002005-241 = "ですので、一旦難しい推測は止めにしましょう！"
10002005-242 = "まずは一つずつ、書かれた通りに進めてみて……"
10002005-250 = "きひゃひゃひゃひゃひゃ！！！"
10002005-251 = "海！海だぁ！！くははははは！！！"
10002005-252 = "な、なに！？怖いっ！？"
10002005-253 = "それで……"
10002005-254 = "お、お化け！？お化けよ！！みんな逃げて！！！"
10002005-257 = "きゃははははははははああぁぁぁぁｌ！！！"
10002005-260 = "……"
10002005-264 = "…………"
10002005-265 = "…………先生。"
10002005-266 = "やっぱり、諦めても良いですか……？"
10002005-267 = "[s5] \"が、頑張ってヒフミ！ファイト！！\"\n[s6] 静かに視線を逸らす。"
10002005-268 = "うわあああぁぁぁぁーん！！助けてくださいせんせぇー！！"
10002005-269 = "うわあああぁぁぁぁーん！！助けてくださいせんせぇー！！"
10002005-274 = "……うん。"
10002005-275 = "いつもより、平和な夏休みになりそうですね。"
10002005-277 = "（日付は遡り、数日前。正義実現委員会の任務中……）"
10002005-278 = "きえええぇぇぇぇぇぇっ！！！"
10002005-279 = "夏なのに！！最後の夏なのにいぃぃ！！"
10002005-280 = "夏！！友情ぉ！！青春！！海ぃ！！水着いぃぃぃーーー！！"
10002005-281 = "どこに、一体どこにぃぃぃぃぃっ！！"
10002005-285 = "（ドガアアァァン！！ドゴオォォォン！！）"
10002005-286 = "私の青春が、どこにもなぃぃぃーーー！！"
10002005-287 = "（ドゴオォォォォン！！！ズドオォォォォォォン！！！！）"
10002005-288 = "ツルギ先輩、今日は絶好調ですね。"
10002005-289 = "……正直、任務続きで疲れもあったのですが、こんな姿を目の前にして弱音は吐けません。"
10002005-290 = "私も先輩を見習って、もっと頑張らないと！"
10002005-291 = "（……）"
10002005-294 = "せっかくのお休み、"
10002005-295 = "楽しんできてくださいね。"
