[translation]
2005106-1 = "Muito bem, Reisa."
2005106-3 = "Sensei, aqui!"
2005106-4 = "[s] \"Bem-vinda, Reisa!\""
2005106-5 = "Hahaha... \"Uzawa Reisa\"..."
2005106-6 = "É verdade, houve uma época em que eu me apresentava assim..."
2005106-7 = "[s] \"Hã?\""
2005106-8 = "A atual eu é... \"Termite Pink\"! É isso!"
2005106-9 = "[s] \"Finalmente... você despertou!?\""
2005106-10 = "Wahahahaha!"
2005106-14 = "...Ugh."
2005106-15 = "Ficar presa na roupa duas vezes..."
2005106-16 = "Estou decepcionada comigo mesma..."
2005106-17 = "[s] \"Já que está assim, aproveite para ser uma garota mágica!\""
2005106-18 = "É verdade, fico feliz em poder usar roupas que gosto!"
2005106-19 = "Mas já está na hora da patrulha!"
2005106-20 = "Era para ser apenas um pequeno passatempo antes de sair..."
2005106-21 = "Quem diria que acabaria assim...!"
2005106-22 = "Preciso me trocar logo e ir para a patrulha..."
2005106-27 = "Ei, o que você pensa que está fazendo, hein?"
2005106-28 = "Ai, ai! Ah, acho que desloquei o ombro!"
2005106-29 = "I-isso não é verdade! Nós só esbarramos um pouco!"
2005106-30 = "Você me machuca e ainda vem com essa atitude!?"
2005106-31 = "Vou tirar o dinheiro do hospital da sua carteira, viu?"
2005106-32 = "P-por favor, pare com isso!"
2005106-37 = "Já chega!"
2005106-42 = "Hã? Que roupa é essa?"
2005106-43 = "Brincando de princesinha?"
2005106-49 = "Ou brincando de fadinha?"
2005106-55 = "Estou ocupado agora! Vá para outro lugar!"
2005106-61 = "Aaaah! M-meu ombro!!"
2005106-62 = "Acho que quebrou de verdade!!"
2005106-64 = "Peça desculpas agora mesmo!"
2005106-66 = "G-guuu... #n D-desculpe! Desculpe por tentar aplicar um golpe!"
2005106-67 = "Ah, bem... s-sim..."
2005106-69 = "Peça desculpas por mais duas coisas! #n Por ter me chamado de princesa e de fadinha!"
2005106-70 = "I-isso também!?"
2005106-72 = "Ah...! Meu Fuwasuke!"
2005106-73 = "Meu querido Fuwasuke está lá no topo da árvore...!"
2005106-74 = "Entendi!"
2005106-75 = "Desta vez é um gatinho que não consegue descer da árvore!"
2005106-76 = "Em ação!"
2005106-82 = "Heave-ho!"
2005106-83 = "Não era um gatinho, era um drone preso no galho."
2005106-84 = "Ah, Fuwasuke! Você deve ter ficado com medo...!"
2005106-85 = "Obrigada por salvar o Fuwasuke!"
2005106-86 = "???"
2005106-88 = "Alguém! Por favor, ajude!"
2005106-89 = "Já vou!"
2005106-91 = "Hoje os incidentes aconteceram um atrás do outro."
2005106-92 = "Não tive nem tempo de me trocar."
2005106-93 = "[s] \"Finalmente nos acalmamos, bom trabalho.\""
2005106-94 = "Hehe, eu sou o ás do Esquadrão de Vigilância, afinal!"
2005106-95 = "Bem, então, é hora de voltar para--"
2005106-100 = "Waaaah! Minha pipa!"
2005106-101 = "Ela vai cair no rio!"
2005106-102 = "Eu me esforcei tanto para fazer ela para o dever de casa de artes! Waaaah!"
2005106-103 = "!!"
2005106-104 = "Eu preciso proteger o fruto do esforço daquela criança!"
2005106-105 = "Lá vou eu!!!!!"
2005106-112 = "[wa:1950]― [log=레이사 매지컬]Salva![/log]"
2005106-115 = "― [log=레이사 매지컬]Hehe... [wa:1500]A paz da pipa [wa:928]foi preservada![/log]"
2005106-117 = "― [log=레이사 매지컬]Bem antes de cair na água! [wa:1930]Eu consegui pegá-la assim![/log]"
2005106-120 = "[ns] \"Reisa, você está bem?\""
2005106-122 = "[wa:540]― [log=레이사 매지컬]Se for pelo bem de todos, [wa:1280]o Esquadrão de Vigilância [wa:720]não hesita![/log]"
2005106-125 = "― [log=레이사 매지컬]Seja no fogo, [wa:1270]ou na água![/log]"
2005106-127 = "― [log=레이사 매지컬]Eu vou mergulhar [wa:760]em qualquer lugar! [wa:1690]Hehehe...![/log]"
2005106-130 = "[ns] \"Saia logo daí! Você vai pegar um resfriado!\""
2005106-131 = "[wa:570]― [log=레이사 매지컬]O traje de um herói é algo que--[/log]"
2005106-133 = "― [log=레이사 매지컬]brilha justamente [wa:650]quando se faz o trabalho [wa:1800]de um herói![/log]"
2005106-136 = "― [log=레이사 매지컬]Além disso, [wa:730]ele pode ir na máquina de lavar, [wa:1560]então está tudo bem![/log]"
2005106-139 = "[wa:1736]― [log=레이사 매지컬]Além do mais... [wa:1675]foi o Sensei [wa:400]quem me ensinou.[/log]"
2005106-141 = "― [log=레이사 매지컬]Que aquele que não hesita-- [wa:1780]é quem consegue proteger a todos, [wa:1530]disse você! [wa:1030]Ehehe![/log]"
2005106-144 = "[wa:380]― [log=레이사 매지컬]Hehe, [wa:790]eh, [wa:290]ehehe...[/log]"
2005106-146 = "― [log=레이사 매지컬]Atchim!![/log]"
2005106-149 = "― [log=레이사 매지컬]Uuuu...[/log]"
2005106-152 = "(Depois disso, levei a Reisa, que se esforçou muito, de volta ao Schale...)"
2005106-153 = "(Deixei ela tomar um banho e descansar bastante.)"
