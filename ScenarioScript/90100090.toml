[translation]
90100090-1 = "Episódio 9: Pistas"
90100090-3 = "Subsolo do Schale, Quartel-General do FOX Squad"
90100090-4 = "[ns1] \"Estão todas bem!?\"\n[ns2] \"Ouvi dizer que foram atacadas pela Roa... estão feridas?\""
90100090-8 = "Ngh...!?"
90100090-9 = "(Gole)"
90100090-10 = "……Peço desculpas."
90100090-11 = "O FOX Squad retornou há cerca de uma hora e meia."
90100090-12 = "[s3] \"Ah, vocês estavam comendo. Desculpem.\"\n[s4] \"Querem que eu volte mais tarde?\""
90100090-15 = "Não, não precisa. Peço perdão por ter sido vista em um momento tão inoportuno."
90100090-16 = "Ah, já que está aqui..."
90100090-17 = "Se não se importar, gostaria de se juntar a nós, Sensei?"
90100090-18 = "[s] \"Agradeço o convite, mas eu já jantei.\""
90100090-22 = "[ns] \"Isso é... um saquinho de tofu frito (aburaage)?\""
90100090-23 = "Sim. Foi a Niko quem fez. Ah, e o tofu foi trazido de fora, então não se preocupe. #nNão mexi em nada da despensa da sala de descanso."
90100090-24 = "Conhecemos o dono de uma fábrica de tofu durante uma operação. #nComo ele nos envia lotes de alta qualidade regularmente, acabamos fazendo isso de vez em quando."
90100090-25 = "Bem, deixando isso de lado, os pratos de tofu da Niko são realmente deliciosos."
90100090-26 = "Hmm... esse recheio é cogumelo? O sabor que sai de dentro do tofu é irresistível~"
90100090-27 = "Ei... estou notando isso faz um tempo, #nmas por que só o meu saquinho de tofu só tem feijão dentro?"
90100090-28 = "Isso é um castigo? Eu fiz alguma coisa de errado...?"
90100090-29 = "Coma sem reclamar."
90100090-30 = "Já ouviu o ditado 'Demônios para fora, sorte para dentro', não é?"
90100090-31 = "O feijão do Setsubun serve para afastar o mal, mas não é esse o sentido, né?"
90100090-32 = "Bom, o gosto não está ruim, pelo menos."
90100090-33 = "[s] \"O que aconteceu?\""
90100090-34 = "Explicar levará um pouco de tempo, mas..."
90100090-36 = "……Portanto, a entidade branca desconhecida que afetou a FOX4 pode ser considerada a mesma existência que o espantalho branco, conhecido como 'Kunekune'."
90100090-41 = "[ns] \"Como está se sentindo? Alguma coisa estranha?\""
90100090-42 = "Tô bem, tô bem. Fiz um exame médico logo que voltei e não deu nada."
90100090-43 = "Na verdade, minha cabeça dói mais por causa do soco da Kurumi. Acho que ganhei um galo..."
90100090-44 = "Que ingratidão a sua. #nVocê sabe o que teria acontecido se eu tivesse chegado alguns segundos mais tarde?"
90100090-45 = "Foi uma sorte enorme não termos acabado como as outras vítimas, mas..."
90100090-46 = "Só que, quando acordei, minha memória tinha sumido. #nNão consigo me lembrar da aparência do Kunekune nem da direção onde ficava aquele 'campo verde'..."
90100090-47 = "Felizmente, a câmera corporal da FOX3 registrou a conversa daquele momento."
90100090-52 = "Do outro lado da estrada. Dá para ver um campo sob um céu azul. #nNão consta no mapa... seria uma miragem?"
90100090-53 = "A grama está alta... tem um espantalho... e atrás dele, uma pessoa de roupas brancas rindo—"
90100090-55 = "……Ei, minha voz é realmente assim? Toda vez que ouço, me sinto estranha."
90100090-56 = "Sempre foi assim, não ligue para isso."
90100090-57 = "Ainda assim, é estranho. Não existe nenhum campo perto da estação Shirounagi."
90100090-58 = "Talvez tenha sido uma miragem. Quando o ar treme pelo calor, às vezes conseguimos ver lugares distantes."
90100090-59 = "Isso só acontece em lugares sem nada para bloquear a visão, como o Grande Deserto de Abydos."
90100090-60 = "O Ponto Romeu — Distrito Comercial 3 — é cheio de prédios que bloqueiam a visão, #nentão não tem como observar outro lugar, não importa o quanto a imagem esteja distorcida."
90100090-61 = "Uma miragem que mostra lugares que, teoricamente, não deveriam ser visíveis..."
90100090-62 = "De qualquer forma, ficou claro que o nosso oponente é 'aquilo'."
90100090-63 = "[s5] \"É perigoso continuar avançando às cegas.\"\n[s6] \"Deixe esse caso com o Schale—\""
90100090-66 = "Recuar quando a segurança não pode ser garantida é uma virtude das forças especiais."
90100090-67 = "Mas, diferente dos 'Coelhos', as 'Raposas' não são apenas cautelosas, são animais extremamente curiosos."
90100090-68 = "Recuar diante de uma nova pista... não é da minha natureza."
90100090-69 = "[s] \"……Uma nova pista?\""
90100090-70 = "Poderia dar uma olhada nisto?"
90100090-71 = "Este é o cartucho que foi ejetado quando a FOX4 puxou o gatilho ao ser engolida pela miragem."
90100090-72 = "Se isso existe, então as balas que foram disparadas também deveriam existir. #nMas não encontramos nenhum vestígio de impacto no solo."
90100090-73 = "Provavelmente, elas desapareceram junto com aquele Roa."
90100090-74 = "Uma bala de calibre .50 de um fuzil de precisão antimaterial possui uma energia física que não pode ser ignorada. #nPara o bem ou para o mal, o fato de ter interferido nisso significa..."
90100090-75 = "Que o alvo não é apenas uma ilusão, mas um \"alvo\" que pode ser capturado fisicamente."
90100090-79 = "Sensei. Antes de passarmos este alvo para outra unidade, #nserá que poderia nos permitir realizar um reconhecimento de força apenas mais uma vez, #npara reduzir danos futuros?"
90100090-83 = "[ns7] \"……Entendido. Esta será a última vez.\"\n[ns8] \"E, nesse caso, eu irei junto.\""
90100090-86 = "Agradeço pela permissão."
90100090-87 = "É um alívio saber que o oponente não é uma ilusão. #nSe ele tem forma, basta enchê-lo de explosivos que ele vai reagir de alguma forma, certo?"
90100090-88 = "Sinto que memórias desagradáveis de lidar com veteranos no passado estão voltando..."
90100090-91 = "Então, onde vamos fazer isso? No Ponto Romeu de novo?"
90100090-92 = "Se for para reproduzir a situação, o mesmo local seria o ideal, mas..."
90100090-93 = "Se estivermos considerando um combate real, acho que deveríamos fazer em outro lugar."
90100090-94 = "Por quê?"
90100090-95 = "Pense bem. Se começarmos a atirar a esmo em um lugar aberto contra um \"inimigo que ninguém mais vê\", #npodemos acabar sendo vistas de forma estranha pelos civis."
90100090-96 = "Além disso, a área comercial durante o dia é muito movimentada. Se não tivermos cuidado, corremos o risco de envolver civis em um tiroteio."
90100090-97 = "Concordo. #nDepois de lidar com o \"Kunekune\", ter um segundo round com as alunas da Valkyrie não seria nada bom, né?"
90100090-98 = "……Isso seria um problema."
90100090-99 = "[s9] \"Deixe a persuasão dos civis comigo.\"\n[s10] \"Eu assumirei a responsabilidade pela limpeza――\""
90100090-102 = "Não. Vamos mudar de local."
90100090-103 = "Mesmo em uma operação, os danos aos civis devem ser minimizados."
90100090-104 = "Se colocarmos civis em perigo durante a operação…… a responsabilidade será nossa."
90100090-105 = "Acima de tudo, ainda não fomos totalmente perdoadas."
90100090-106 = "Se o Sensei intervir, a posição da Presidente do Conselho Estudantil Federal ficará ainda mais complicada."
90100090-107 = "[s] \"……Entendido.\""
90100090-108 = "Selecionarei um local onde a miragem possa ser observada como condição principal."
90100090-109 = "Além disso, é desejável um lugar com pouco movimento e onde o fluxo de ar devido à diferença de temperatura seja extremo."
90100090-110 = "Entendido. Vou procurar por perto no mapa da operação."
90100090-111 = "E tem mais uma coisa que me preocupa……"
90100090-112 = "Será que uma \"operação normal\" é possível enquanto estivermos cientes do \"Kunekune\"?"
90100090-113 = "O que você quer dizer……?"
90100090-114 = "Na operação anterior, a comunicação com Otogi tornou-se impossível depois que ela viu o Kunekune, lembra?"
90100090-115 = "Não dá para continuar o combate se nem as ordens de retirada são compreendidas."
90100090-116 = "Então, que tal trabalharmos em duplas, onde uma observa e a outra puxa o gatilho?"
90100090-117 = "Isso também não serve. Não podemos montar uma operação baseada na premissa de sermos possuídas."
90100090-118 = "Em casos extremos, existe a possibilidade de todas as quatro ficarem incapacitadas."
90100090-119 = "E se usássemos óculos de proteção?"
90100090-120 = "Não sei. A Otogi, pelo menos, estava vendo a miragem através da mira, não estava?"
90100090-121 = "Acho que usar vidro ou espelhos não fará diferença."
90100090-122 = "Que complicado."
90100090-123 = "Nesse caso, será que não temos que chamar um especialista em fenômenos espirituais?"
90100090-129 = "Quer dizer, só precisamos observar a forma sem olhar diretamente para o alvo, certo?"
90100090-130 = "Então―― não seria mais fácil usar isto?"
90100090-131 = "…………."
90100090-133 = "……Sério, isso vai funcionar?"
90100090-135 = "Próximo episódio: Rumo à Escuridão"
