[translation]#[Texto revisado.] Em aguardo de revisão de formatação de texto. - Filipe 13/06.
90100090-1 = "Episódio 9: Pistas e Rastros"
90100090-3 = "Subsolo da Schale – Quartel-General da Esquadrão FOX"
90100090-4 = "[ns1] \"Meninas, estão bem?!\"\n[ns2] \"Ouvi dizer que foram atacadas... machucaram?\""
90100090-8 = "Hnngh...?!" 
90100090-9 = "（engole）"
90100090-10 = "……Perdão pela falta de etiqueta à mesa."
90100090-11 = "O Esquadrão FOX retornou há cerca de 1h30, comandante."
90100090-12 = "[s3] \"Ah, peguei vocês com a boca cheia. E que bocas cheias, hein.\"\n[s4] \"Querem que eu saia para não atrapalhar?\""
90100090-15 = "Não precisa. Sente-se."
90100090-16 = "Já que o Sensei veio nos visitar..."
90100090-17 = "Quer comer alguma coisa?"
90100090-18 = "[s] \"O convite é tentador, mas já jantei lá em cima.\""
90100090-22 = "[ns] \"Isso aí... são trouxinhas de abura-age com carne?\""
90100090-23 = "Isso. A Niko que fez. Fique tranquilo, compramos os ingredientes fora.#nNão mexemos na sua geladeira."
90100090-24 = "Conheci um fornecedor de abura-age numa missão. De vez em quando ele manda uma remessa.#nAí eu preparo umas trouxinhas."
90100090-25 = "Além da maracutaia, a comida da Niko é uma delícia."
90100090-26 = "Nnh~... O recheio tem cogumelos? O umami que sai dessa trouxinha é de tirar o fôlego!"
90100090-27 = "Ei... por que só a MINHA trouxinha está cheia de feijão? Cadê o recheio?"
90100090-28 = "Isso é algum tipo de punição? Eu fiz algo errado?"
90100090-29 = "Come e cala a boca."
90100090-30 = "No Setsubun, dizemos: [ruby=O demônio fica lá fora, a sorte fica aqui dentro.]\"Oni wa soto, fuku wa uchi\"[/ruby]."
90100090-31 = "Atirar feijão nos demônios é para expulsar o mal. Mas comer o feijão perde o sentido, né?"
90100090-32 = "É... o gosto é de paz, mas o conceito tático me condena."
90100090-33 = "[s] \"Mas então... o que aconteceu lá fora?\""
90100090-34 = "A história é longa, Sensei. Tenha paciência..."
90100090-36 = "……Resumindo: a entidade branca que afetou a FOX4 é idêntica ao \"Espantalho Branco\" – conhecido como \"Kunekune\"."
90100090-41 = "[ns] \"Otogi, algum problema neurológico? Tudo normal?\""
90100090-42 = "Tudo nos conformes. Passei por exames. Saúde de ferro."
90100090-43 = "Só estou com dor na cabeça por causa da coronhada da Kurumi. Vou pedir um seguro craniano."
90100090-44 = "Ingrata! Se eu demorasse mais um segundo, você estaria babando no hospital agora!"
90100090-45 = "Escapar de uma maca é sorte pura..."
90100090-46 = "Mas eu apaguei e, quando acordei, não lembrava de nada. Nem do tal \"campo verde\", nem da direção..."
90100090-47 = "Por sorte, a câmera da FOX3 gravou tudo. Vamos ver."
90100090-52 = "«Além do asfalto... um campo verde, com grama. Não está no mapa... miragem?»"
90100090-53 = "«No meio do mato... um espantalho. Uma pessoa branca rindo... se retorcendo...»"
90100090-55 = "……Fui eu que disse isso? Ouvir minha própria voz surta é estranho."
90100090-56 = "O seu tom irritante e infantil é esse mesmo."
90100090-57 = "Ignorando a voz dela, o relato é absurdo. Não há vegetação na região."
90100090-58 = "Deve ser miragem. O calor pode projetar imagens distantes."
90100090-59 = "Isso só acontece em desertos enormes, tipo o de Abydos."
90100090-60 = "O Ponto Romeo é cercado de prédios. É impossível projetar uma paisagem rural do nada."
90100090-61 = "Uma miragem que mostra um lugar que não existe nos mapas..."
90100090-62 = "Pois é. Estamos lidando com o \"sobrenatural\"."
90100090-63 = "[s5] \"Ir de peito aberto para um campo minado desses é pedir para morrer.\"\n[s6] \"Peço que se retirem. Eu assumo essa missão――\""
90100090-66 = "Recuar diante do impossível é uma virtude militar."
90100090-67 = "Mas as \"raposas\" têm curiosidade. Se tem uma pista, não podemos recuar."
90100090-68 = "Encontrar um rastro e fugir... mancharia nossa honra."
90100090-69 = "[s] \"……Que pista?\""
90100090-70 = "Esta prova material."
90100090-71 = "O estojo de bala que a FOX4 disparou quando enlouqueceu."
90100090-72 = "Isso prova que o projétil foi disparado. Mas no local, não há marcas de impacto."
90100090-73 = "A bala provavelmente se dissipou junto com a criatura."
90100090-74 = "Uma .50 antimateriais tem poder imenso.#nSe ela foi anulada, significa que――"
90100090-75 = "A criatura tem forma física. Não é apenas uma miragem."
90100090-79 = "Sensei. Antes de o senhor repassar esta missão para outros, permita-nos fazer um reconhecimento armado. Um último suspiro."
90100090-83 = "[ns7] \"……Aprovado. Mas esta será a última.\"\n[ns8] \"E eu vou junto. Ponto final.\""
90100090-86 = "Agradecemos."
90100090-87 = "Se tem forma física, podemos explodir. Munição é o que não falta."
90100090-88 = "Lembrar do passado me dá arrepios... mas vamos em frente."
90100090-91 = "Onde faremos isso? No mesmo lugar?"
90100090-92 = "Para reproduzir as condições, seria o ideal, mas..."
90100090-93 = "Se houver tiroteio, melhor ser em um local afastado do centro."
90100090-94 = "Por quê?"
90100090-95 = "Imagine: atirar num monstro invisível em pleno centro comercial. Vão pensar que somos malucas."
90100090-96 = "Além disso, há risco de ferir civis."
90100090-97 = "Apoiado. Vamos evitar um confronto com a Valkyrie depois."
90100090-98 = "……Isso seria complicado."
90100090-99 = "[s9] \"A parte diplomática fica comigo.\"\n[s10] \"Eu cubro a retaguarda de vocês――\""
90100090-102 = "Não. Vamos mudar de local."
90100090-103 = "O mínimo de dano colateral possível é o ideal."
90100090-104 = "Se um civil se ferir por nossa causa, a culpa é nossa."
90100090-105 = "E ainda não fomos totalmente perdoadas."
90100090-106 = "Se o senhor se envolver, a situação da Presidente ficará ainda mais delicada."
90100090-107 = "[s] \"……Entendido.\""
90100090-108 = "O novo local deve ter miragem e ser isolado."
90100090-109 = "Idealmente, com fluxo de ar extremo e poucas pessoas."
90100090-110 = "Combinado. Vou procurar no mapa."
90100090-111 = "Outra coisa: tenho uma preocupação técnica."
90100090-112 = "Se formos obrigadas a mirar e encarar o Kunekune para atirar... não corremos o risco de ficar loucas também?"
90100090-113 = "Explique melhor."
90100090-114 = "No incidente anterior, a FOX4 olhou para ele e enlouqueceu."
90100090-115 = "Se perdemos a comunicação (código NORDO) no meio do fogo, a operação falha."
90100090-116 = "E se fizermos duplas: um observa, o outro atira?"
90100090-117 = "Não. Sacrificar um membro propositalmente é imoral."
90100090-118 = "E se a loucura se espalhar para todo o esquadrão?"
90100090-119 = "Óculos de proteção não resolvem?"
90100090-120 = "A Otogi olhou pela luneta e deu no mesmo."
90100090-121 = "Só vidro não adianta."
90100090-122 = "Que chatice."
90100090-123 = "Então vamos ter que chamar um exorcista?"
90100090-129 = "A esperança é: se conseguirmos detectar a silhueta sem olhar diretamente..."
90100090-130 = "Com isso, talvez dê certo."
90100090-131 = "…………"
90100090-133 = "……Cê acha que isso vai funcionar?"
90100090-135 = "Próximo Episódio: Rumo à Escuridão"