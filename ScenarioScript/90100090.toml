[translation]
90100090-1 = "Episódio 9: Pistas e Pegadas"
90100090-3 = "Quartel General do Esquadrão FOX (QG) - Porões da Schale"
90100090-4 = "[ns1] \"Meninas, estão inteiras?!\"\n[ns2] \"O rádio apitou que a Lore atacou vocês... Ninguém se machucou, né?\""
90100090-8 = "Nngh...?!"
90100090-9 = "（Gulp）"
90100090-10 = "……Peço perdão pela falta de modos operacionais com as engrenagens da mastigação."
90100090-11 = "O Esquadrão FOX retornou e recuou da missão há aproximadamente uma hora e trinta minutos, Comandante."
90100090-12 = "[s3] \"Ah, peguei vocês de boca cheia. E que bocas cheias, ein.\"\n[s4] \"Desculpa atrapalhar, querem que eu volte pro quarto e dê uns minutinhos pra vocês terminarem de engolir... tudo?\""
90100090-15 = "Negativo. O vexame ético da marmita não embargará a pauta militar. Sente-se."
90100090-16 = "Ah, já que o Sensei desceu pra vistoriar e a fornalha ferve..."
90100090-17 = "Quer sentar e abrir a boca com a gente também, Sensei?"
90100090-18 = "[s] \"O convite carnal é muito tentador, mas eu já enchi a minha barriga com o jantar lá na superfície.\""
90100090-22 = "[ns] \"Isso no prato de vocês... São trouxinhas de Abura-age de soja frita com carne?\""
90100090-23 = "Afirmativo. Tática culinária artesanal sob os braços da Niko. Relaxa o protocolo ético de saque, as massas de Abura-age vieram contrabandeadas e suadas do mercado de fora.#nAs portas e lacres da geladeira do seu alojamento militar intocável de cima estão blindadas de nossas unhas, relaxe."
90100090-24 = "Uma rede de lobby de fornecedores industriais que cimentei numa operação da base costuma mandar lotes premium de Abura-age pra nós de cortesia.#nEntão eu preparo essas trouxinhas e rego na panela de vez em quando."
90100090-25 = "Contrabando e suborno à parte, a comida escorrendo caldo quente da Niko é um tesão na língua, papo reto."
90100090-26 = "Nnh~... Esse recheio maciço leva cogumelos frescos nas cordas? O oceano de umami que esguicha dessa crosta rasgando os dentes entorpece as pernas~!"
90100090-27 = "Abaixa o tom... O olho biológico capta atrito ético aqui:#nQual a desgraça estatística e probabilidade de SÓ O MEU lote de Abura-age amargar sendo entupido e recheado SÓ com ração de feijões cego e mais nada?!"
90100090-28 = "A corporação abriu motim moral de punição contra minha patente ou eu caí em pegadinha sádica russa na cozinha...?"
90100090-29 = "Devore e silencie a garganta rebelde."
90100090-30 = "A liturgia antiga de folclore do Setsubun dita o mantra: 'Os Demônios na sarjeta e a Paz e Sorte na soleira', ikke?"
90100090-31 = "Atirar feijão de Setsubun no demônio repele maldição letal militar, mas engolir o feijão amassado goela abaixo quebra a ideologia mitológica aí não quebra?!"
90100090-32 = "É... O sabor aceita a paz na língua, porém o conceito tático me amaldiçoa."
90100090-33 = "[s] \"Mas então... Voltando aos tiros quentes, como foi que a operação colapsou lá no asfalto?\""
90100090-34 = "O dossiê é extenso e ramifica a narrativa, Sensei. Engula a paciência e sente na escuta..."
90100090-36 = "……Amarrando o nó final na síntese: a entidade necrótica alva e cega que contaminou as retinas da recruta FOX4 exibe RG e DNA militar 100% idêntico às pautas populares do 'Espantalho Branco' cívico―― A alcunha profana folclórica do 'Kunekune'."
90100090-41 = "[ns] \"O motor neurológico apitou alguma sequela? O coração bate liso sem espasmos estranhos, Otogi?\""
90100090-42 = "Tudo nos trinques. A bateria médica de radiação pós-emboscada esquadrinhou os ossos no resgate no QG, e os laudos bateram anomalia zero e saúde verde."
90100090-43 = "Porém a pancadaria civil na nuca atirada de coronhada da doente da Kurumi estalou as cordas... As glândulas latejam pra caralho, vou pedir seguro de galo craniano."
90100090-44 = "Ingratidão de rato tem cura curta na sarjeta!#nSe o meu freio atrasasse três milésimos balísticos na paulada lá e você mergulhasse na neblina, cê ia estar rolando e babando poça nos sanatórios com as outras doentes epilépticas agora!"
90100090-45 = "Livrar o corpo da maca de hospital junto com as outras vitimas atesta sorte cármica e vitória pura..."
90100090-46 = "A engrenagem do sono fúnebre me cobriu, e quando os olhos estalaram abertos... Os HDs sofreram lavagem cerebral total.#nA estética letal da Assombração do Kunekune, e até as coordenadas cardeais de pra qual puta de horizonte fúnebre diabólico ficavam os tais 'Prados Verdes Céu Celeste'... os discos da memória zeraram e não puxam mais os arquivos."
90100090-47 = "Os deuses sorriem pros prevenidos. O colete blindado de transmissão da câmera da FOX3 engarrafou cada suspiro insano da gravação na fita bruta. Roda o HD."
90100090-52 = "« Além do concreto da pista... As cortinas pintam um horizonte com capim e tapetes verdes de fazenda debaixo do sol limpo e anil.#nOs radares cartográficos e o GPS estão vazios para isso... O que diabos ferveu a lente...?! Ilusão termal do calor? »"
90100090-53 = "« O matagal infesta, é denso... E no meio das folhas mortas... um Espantalho fúnebre.#nE-Ele... No horizonte rasgado... tem um vulto de lençol alvejado esgarçando um sorriso putrefato cego e demente... »"
90100090-55 = "……Minhas pregas e cordas vocais vomitaram essa poesia profana?! Ruminar a escuta da própria desgraça de loucura me suou azedo a espinha toda."
90100090-56 = "O timbre estridente infantil e o ego não falham, é a sua caçamba normal."
90100090-57 = "Ignorando os tímpanos dela, a geografia dita fraude insana na fita.#nRaízes rurais e mato puro florescendo nos abismos vizinhos da Estação metropolitana de Shirounagi? Negação ambiental e botânica absoluta."
90100090-58 = "Tudo atesta ilusões atômicas de Espelhamento Óptico na Fumaça de vapor da rua.#nA parede de mormaço na planície quente cria espelho atômico que projeta e vomita paisagens remotas de outros mares longínquos com reflexão na lente da nossa cara."
90100090-59 = "Besteira. Milagres de refração aérea de longa escala atômica necessitam de areias nuas, desertos apocalípticos mortos de fumaça imensos igual o Deserto Maldito de Abydos onde as barreiras não cegam os vapores reflexivos."
90100090-60 = "O quadrante da caça... o Ponto Tático Romeo no Distrito Comercial... o céu rasteja entupido de selva de aço e blindagens e muros verticais de prédios bloqueando os ares.#nNão importa que bruxaria desfaça a refração no calor urbano lá... é fisicamente incapaz que um buraco refletisse ou forjasse janelas longínquas mágicas rasgando quilômetros pro campo rural no meio dos vidros cegos."
90100090-61 = "Uma janela fumegante e ilusória no vapor cego projetando coordenadas atômicas rurais banidas e impossíveis nos mapas do mundo material da rua..."
90100090-62 = "As teses fecham num núcleo cru e letal. A parede de batalha cega não lida com malha assassina material, mas mergulhamos as armas atirando de cego na 'Aberração do Sobrenatural Paranormal'... Entendido."
90100090-63 = "[s5] \"Despencar baionetas nesse campo minado fantasma de peito aberto é rasgar a sentença de morte e pedir funeral.\"\n[s6] \"Exijo exfiltração total das fardas FOX. Despache os dados pra cúpula da Schale, eu engulo essa pauta pesada sozinho agora e assum――\""
90100090-66 = "O jargão dita: 'Se o chão e as paredes fedem a morticínio impossível na trincheira, recuar botas táticas pra poupar sangue é orgulho heroico pra paramilitares', a premissa acata o manual e é uma virtude honrada."
90100090-67 = "Todavia... As orelhas covardes e flexíveis de 'Coelhas' podem aderir fuga orgânica cega, porém os focinhos dentes de 'Raposas' não vivem de escudo... eles respiram predação sádica investigativa e curiosidade na toca mortal."
90100090-68 = "Topar escarrado e de frente com a migalha ensanguentada da Assombração na esquina, e então... recuar o fuzil da cara dela? A minha placa mancharia e o orgulho não perdoa."
90100090-69 = "[s] \"……Qual migalha e pista que vocês puxaram da fumaça do inferno?\""
90100090-70 = "Apoie a lente nesta matéria probatória militar."
90100090-71 = "O cálice profano... é a cápsula expelida engatilhada e perfurada pela coroa e fuzil da FOX4 na hora em que o HD afundou pro abismo místico da miragem termal e ela forçou o dedo cego no terror."
90100090-72 = "Se o bronze repousa na nossa mão... o chumbo massivo cimentado voou os ares num vetor. O escopo e as ruas escrutinaram a poça de asfalto em vão... e a calçada tá limpa, zero crateras e pedaços de impacto na balística da esquina."
90100090-73 = "A matemática clama: o chumbo perfurou o rasgo sobrenatural fantasmagórico e dissolveu pro Além-Túmulo junto da própria aberração mística Loresca no encalço."
90100090-74 = "Os canhões antimateriais perfuradores de Sniper de 50 Milímetros transbordam apocalipse sônico esmagador bruto insano e destrutivo.#nAcariciar e afundar essa artilharia densa contra o escudo dessa anomalia dita a prova de fogo――"
90100090-75 = "A besta do além fantasmagórica não porta apenas fumaça vazia abstrata e ecos ilusórios orgânicos fúteis.#nEla molda carcaça tangível e é ancorada a carne 'Balística e Física'. O alvo afoga se fuzilado com chumbo do mundo vivo."
90100090-79 = "Sensei. Antes que o senhor confisque o rádio e despache as coroas covardes dessa caçada pro esgoto de outras tropas paramilitares da Schale aliadas cegas no jogo.#nSuplico que as botas do FOX ganhem janela e passe blindado para executar uma Reconhecimento em Força paramilitar letal de fogo, como nosso tiro de canhão e respiro final antes da derrota."
90100090-83 = "[ns7] \"……Ata cravada, a autorização final foi assinada.\"\n[ns8] \"Adendo obrigatório do contrato: Eu acoplo farda nas sombras e afundo marcha com o esquadrão nessa trincheira mística. Negação inaceitável.\""
90100090-86 = "Bênção da autorização letal cravada... As correntes agradecem na calçada de joelhos."
90100090-87 = "Sangrar baioneta e afundar asfalto em batalha é doce brisa amena contra suar atrás de lendas urbanas.#nSe o monstro suga bala física... nós estocaremos granadas puras nas gargantas da lenda até arrombar as engrenagens místicas da anomalia no inferno cego."
90100090-88 = "As sombras da arrogância passada me assolam a espinha... Esse tesão de carnificina sádica nas tropas ecoa o batismo caótico quando fuzilamos e engolimos covardemente os civis inocentes na poça militar, o gosto é deprimente..."
90100090-91 = "A pauta e o mapa, a bússola bate qual fronteira na parede pra nós esmagarmos de novo amanhã?#nRepeteco no túmulo do Ponto Romeo?"
90100090-92 = "Espelhar cenários de necrotério exige as pranchetas cravarem repetição no cimento e esgoto nativos de onde as feridas abertas ocorreram, contudo..."
90100090-93 = "Se o banho de sangue é profético na mira e nós entornaremos tiroteio bruto de fogo paramilitar supressivo aberto, o teatro pede asfalto neutro despovoado das calçadas do centro."
90100090-94 = "As razões?"
90100090-95 = "Aperte as engrenagens atômicas da sociologia. Descarregar calibres de cinquenta cilindros massivos de supressão infernal berrante no meio das vitrines lotadas comerciais contra fantasmas brancos invisíveis que só o soldado na nóia insana esquizofrênica cega enxerga...#nO Tribunal Popular, os civis atirados a trauma cívico no almoço e a corregedoria policial nos chutarão a cara chamando a gente de maníacas terroristas fuzilando vento sujo em delírios psicóticos no asfalto quente e botarão cães policiais atrás de nós de novo."
90100090-96 = "Além da fobia criminal... a zona central entope turistas na fornalha vespertina. Se o recuo do monstro ou o tiro defletido comer poça cívica, o banho de sangue com civis espirra e suja inocentes alheios com facilidade cega."
90100090-97 = "As bênçãos do Sensei no rádio...#nA capitã prega o gospel de que, quando mastigarmos e fuzilarmos a lenda mística e o 'Kunekune' estourar nas cinzas... a festa pós-guerra de comemoração exigirá cruzar bala com viaturas, helicópteros federais da BOPE da Valkyrie no asfalto e esmagar polícia civil igual cachorro da corregedoria de novo, como na era de ouro?!"
90100090-98 = "……O apocalipse político não seria ameno, não."
90100090-99 = "[s9] \"Eu puxo a barreira diplomática com os civis pra mesa.\"\n[s10] \"A caneta absorve o pó do tiroteio, o silêncio fúnebre do asfalto pra encobrir as digitais de vocês está garantido na minha cost――\""
90100090-102 = "Recuo negado. A mudança paramilitar radial de endereço geográfico está fechada na marreta."
90100090-103 = "No teatro sádico do deserto de guerra armado... Derramar e espirrar o sangue cívico em bala desviada é o calcanhar da condenação militar suprema de crime e morte suja."
90100090-104 = "Abafo e carimbo as teses: Se nós varremos corpos e engaiolamos calçadas puras em tiroteios e o sangue do civil cai sob baioneta amiga... É fardo moral penal nosso para o caixão."
90100090-105 = "O cimento apodrece nossa anistia cívica criminal... Nós estamos afundando em dívidas atômicas e não limpamos a placa de crimes e sangue paramilitar do ano passado em perdão integral federal ainda."
90100090-106 = "Se o seu sangue manchar em desculpas falsas com a polícia pra estancar e abafar as nossas calçadas com tiroteios, o desgaste e fúria burocrática política nas costas da mesa presidencial do Conselho para encobrir fuzileiras piratas sujas espirra com fúria... A caneta suja do seu RG com a Presidente frita."
90100090-107 = "[s] \"……Compreendido. Acato a disciplina paramilitar e o RG intacto.\""
90100090-108 = "Na prancheta tática o pilar número um exige forjar terreno baldio onde a distorção térmica climática da miragem fantasmagórica se reproduza viva em poeira cega."
90100090-109 = "Por tabela cívica, o radar pede esgoto civil ou área cega de cimento isolado sem alma orgânica no diário, em áreas de flutuação extrema térmica insana na camada de ar da superfície para cozinhar vapor reflexivo..."
90100090-110 = "Bateu selo logístico. As lupas vão escavar no mapa tático esgotos próximos pra montar o ninho fúnebre amanhã."
90100090-111 = "Engatilha rádio aqui... As engrenagens cerebrais apitaram uma nóia técnica podre vital."
90100090-112 = "Se as correntes táticas obrigam nossa artilharia mirar letal, fitar com a pupila frontal e encarar o vapor da praga mística Kunekune pra dar tiro na fuça do bicho cego... a rotina de 'Operações Físicas Militares Padronizadas' das trincheiras esmaga e desliga de novo no chão morto."
90100090-113 = "O jargão não destrinchou... Manda e abre o HD da loucura?"
90100090-114 = "Puxa na fita as horas mortas atrás com a fumaça de otogi! A cadete cravou olho ocular vivo e focou a lenda... a mente capotou na loucura, as cordas vomitaram lixo de demência, e as conexões comunicativas lógicas orgânicas murcharam. Cega total!"
90100090-115 = "Se as engrenagens de rádio quebram no asfalto amaldiçoado e o soldado surta ignorando comando de recuo letal (Código NORDO: Interceptação nula fantasma na linha), a marcha de tiroteio não sobrevive na vala!"
90100090-116 = "Estratégia Sniper de esquadrão tático em pares não quebra a fumaça cega? Um soldado fecha olho, joga na cega pra balística, enquanto o companheiro abraça o holofote, atura a fofoca psiquiátrica de olhar a miragem térmica pra guiar o chumbo amigo do cego no radinho."
90100090-117 = "Guilhotina na tese. Cimentar plano tático militar baseado e afundado na roleta russa sádica e proposital de sacrifício suicida mental de que uma cadete 'absorva fúria atômica mística de enlouquecer o crânio até demente', fere e aniquila as morais."
90100090-118 = "O teto pior é epidemia de lenda fantasma. A cotação do demônio pode espirrar contaminação ocular e fritar a sanidade mística neural nas retinas cegas do batalhão Esquadrão FOX em uníssono de quatro cabeças. Todas de coma pro chão de uma só vez é probabilidade letal crua."
90100090-119 = "Filtro blindador de visão balística tática nas caras! Viseira e proteção ótica cega não segura?"
90100090-120 = "Balela militar material. A Otogi devorou as miras táticas isoladas com as blindagens da sniper atiradeira pra engolir o vapor no olho da óptica. A luneta não segurou os miolos, ela apodreceu a consciência isolada."
90100090-121 = "O escudo ótico sintético isolando radiação mística, as telas e escudos... se você olhar as costas da aberração fantasmagórica do vapor pra lente crua refratária de novo... a sua tela mental estica corda pro Além em sanatório do mesmo jeito. O material sintético é isopor perante isso."
90100090-122 = "Uma escória fantasmagórica mística imunda e chata nos encurrala então."
90100090-123 = "A tese e as escusas se esgotaram. O manual atesta a submissão humilhante final, roga pro esquadrão focar exorcismos divinos e ligar pra freira benzedeira mística abater fantasma por magia oculta amanhã de manhã?!"
90100090-129 = "Destrincha o núcleo cego da charada: a equação bélica clama puramente por observar o contorno, formato espacial ou localização do vulto inimigo sem as córneas descerem a visão letárgica direta nele pra gente rasgar ele com bala, isso fecha o quadrado letal?"
90100090-130 = "Se as correntes obedecem, e isso anula os espasmos suicidas na cabeça... Essa carcaça nojenta e tecnologia atômica não salva o dia de ouro fuzileiro?!"
90100090-131 = "…………"
90100090-133 = "……Bate no chumbo da ciência e jura. O apetrecho militar sujo cruza e purifica a desgraça mística inteira e isola os cérebros pra gente capotar o monstro?!"
90100090-135 = "Próximo Episódio: Rumo à Escuridão"