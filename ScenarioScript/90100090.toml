[translation]
90100090-1 = "Episode 9;Clue"
90100090-3 = "Schale Basement, FOX Platoon Operations HQ"
90100090-4 = "[ns1] \"Is everyone okay!?\"\n[ns2] \"I heard you were attacked by the Roar... are you safe?\""
90100090-8 = "Gulp...!?"
90100090-9 = "(Gulp)"
90100090-10 = "......My apologies."
90100090-11 = "FOX Platoon returned about an hour and 30 minutes ago."
90100090-12 = "[s3] \"Oh, you were in the middle of a meal.\"\n[s4] \"Sorry. Should I come back later...?\""
90100090-15 = "No. I apologize for letting you see me in such a disheveled state."
90100090-16 = "Oh, since you're already here..."
90100090-17 = "Would you like to join us, Sensei?"
90100090-18 = "[s] \"I appreciate the offer, but I've already had dinner.\""
90100090-22 = "[ns] \"Is that... a fried tofu pouch?\""
90100090-23 = "That's right. Niko made it. Oh, and I brought the fried tofu in from outside. #nRest assured, I didn't touch any of the ingredients in the breakroom fridge."
90100090-24 = "I met someone from a fried tofu factory during an operation a while back. #nThey send us high-quality tofu regularly, so we make this from time to time."
90100090-25 = "Well, even putting that aside, Niko's fried tofu dishes are honestly delicious."
90100090-26 = "Mmm... is this filling a mushroom? The umami coming out of the tofu pouch is just irresistible~"
90100090-27 = "Hey... I've been wondering about this for a while, but #nhow come mine only has beans in it?"
90100090-28 = "Is this a punishment game? Did I do something wrong...?"
90100090-29 = "Stop complaining and eat."
90100090-30 = "You know the saying, 'Demons out, fortune in,' right?"
90100090-31 = "Setsubun beans are for warding off evil, but that's not what this is about, is it?"
90100090-32 = "Well, it doesn't taste bad, at least."
90100090-33 = "[s] \"What happened?\""
90100090-34 = "It's a bit of a long story, but..."
90100090-36 = "...In short, the unidentified white entity that affected FOX4 can be determined to be the same existence as the white scarecrow—commonly known as the 'Kunekune'."
90100090-41 = "[ns] \"Are you feeling alright? Anything strange going on?\""
90100090-42 = "I'm fine, I'm fine. I did a physical exam right after we got back, and there's nothing abnormal."
90100090-43 = "If anything, my head hurts more from where Kurumi punched me. I think I've got a bump..."
90100090-44 = "Don't be so ungrateful. #nIf I'd been a few seconds later, who knows what would've happened to you?"
90100090-45 = "It's a small mercy that you didn't end up like the other victims, but..."
90100090-46 = "But when I woke up, my memory was completely gone. #nI can't remember the appearance of the Kunekune, or even the direction where the 'blue meadow' was..."
90100090-47 = "Fortunately, it seems the conversation from that time was recorded on FOX3's body camera."
90100090-52 = "Across the road. I can see a meadow under a blue sky. #nIt's not on the map... a mirage?"
90100090-53 = "The grass is overgrown... there's a scarecrow... and beyond that, a person in white clothes is laughing—"
90100090-55 = "...Hey, does my voice really sound like that? It gives me a weird feeling every time I hear it."
90100090-56 = "It's always sounded like that, so don't worry about it."
90100090-57 = "Still, it's strange. There's no meadow near Shirounagi Station."
90100090-58 = "Maybe it was a mirage. When heat haze rises, you can sometimes see distant places."
90100090-59 = "That only happens in places like the Abydos Desert where there's nothing to obstruct the view."
90100090-60 = "Point Romeo—the 3rd Business District—is blocked by buildings, so #neven if the image was distorted, there's no way you could observe a different location."
90100090-61 = "A heat haze that shows you a place that shouldn't be visible..."
90100090-62 = "Regardless, it's clear that our opponent is something 'beyond understanding'."
90100090-63 = "[s5] \"It's dangerous to keep charging in blindly.\"\n[s6] \"Let's leave this matter to Schale—\""
90100090-66 = "Retreating when safety cannot be guaranteed is a virtue of special forces, yes."
90100090-67 = "But, 'Rabbits' aside, 'Foxes' are animals that are not only cautious but also highly curious."
90100090-68 = "Retreating when a new clue is right in front of us... goes against my nature."
90100090-69 = "[s] \"...A new clue?\""
90100090-70 = "Please take a look at this."
90100090-71 = "This is a shell casing ejected when FOX4 pulled the trigger while swallowed by the heat haze."
90100090-72 = "If this exists, the bullet that was fired must exist as well. #nHowever, no bullet holes have been found on the ground at all."
90100090-73 = "It likely vanished along with that Roar."
90100090-74 = "A .50 caliber round from an anti-materiel rifle carries a physical energy that cannot be ignored. #nFor better or worse, the fact that it interacted with it means—"
90100090-75 = "It means the opponent is not just an illusion, but a 'target' that can be physically captured."
90100090-79 = "Sensei. Before we hand this target over to another unit, #nwould you allow us to conduct one more reconnaissance-in-force to reduce further casualties?"
90100090-83 = "[ns7] \"...Understood. This will be the last time.\"\n[ns8] \"And I'll be accompanying you.\""
90100090-86 = "Thank you for your permission."
90100090-87 = "It's a relief to know the opponent isn't just an illusion. #nIf it has a physical form, it should react to a good dose of explosives."
90100090-88 = "I feel like I'm about to recall some unpleasant memories of dealing with a junior..."
90100090-91 = "So, where are we doing this? Point Romeo again?"
90100090-92 = "The same location would be optimal if we want to replicate the situation, but..."
90100090-93 = "If we're anticipating combat, I think we should do it somewhere else."
90100090-94 = "Why?"
90100090-95 = "Think about it. If we start firing wildly at an 'enemy no one else can see' in an open area, #nwe might draw some strange looks from the citizens."
90100090-96 = "Besides, the commercial district is crowded during the day. There's a risk of getting civilians caught in a firefight."
90100090-97 = "Agreed. #nWe don't want a second round with the Valkyrie students after dealing with the Kunekune, right?"
90100090-98 = "...That would be problematic."
90100090-99 = "[s9] \"Leave the civilian persuasion to me.\"\n[s10] \"I'll take responsibility for the cleanup—\""
90100090-102 = "No. We will change the location."
90100090-103 = "Even in an operation, civilian casualties must be kept to a minimum."
90100090-104 = "If we put civilians in danger during an operation... that is our responsibility."
90100090-105 = "Above all, we haven't been fully pardoned yet."
90100090-106 = "If Sensei intervenes, it will only complicate the General Student Council President's position further."
90100090-107 = "[s] \"...Understood.\""
90100090-108 = "We will select a location where the heat haze can be observed as the primary condition."
90100090-109 = "On top of that, it should be a place with minimal foot traffic and extreme temperature-driven airflow."
90100090-110 = "Understood. I'll check the operation map for nearby locations."
90100090-111 = "Also, there's one more thing that's bothering me..."
90100090-112 = "Can a 'normal operation' even be carried out while we are aware of the 'Kunekune'?"
90100090-113 = "What do you mean...?"
90100090-114 = "In the previous operation, we couldn't communicate with Otogi after she saw the Kunekune, right?"
90100090-115 = "We can't continue combat in a state of communication breakdown where even retreat orders don't get through."
90100090-116 = "Then what about working in pairs, where one observes and the other pulls the trigger?"
90100090-117 = "That won't work either. We can't plan an operation based on the assumption of being possessed."
90100090-118 = "There's a possibility that all four of us could be incapacitated."
90100090-119 = "What about wearing protective goggles?"
90100090-120 = "I wonder. Otogi was looking at the heat haze through her scope, after all."
90100090-121 = "I don't think just putting glass or a mirror in between will make a difference."
90100090-122 = "This is troublesome."
90100090-123 = "At this rate, should we call in a spiritual medium?"
90100090-129 = "In other words, we just need to observe its form without looking at it directly, right?"
90100090-130 = "If so—wouldn't using this solve the problem?"
90100090-131 = "............"
90100090-133 = "...Are you sure this will work?"
90100090-135 = "Next Episode;Into the Darkness"