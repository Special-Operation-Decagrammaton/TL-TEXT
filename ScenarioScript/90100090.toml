[translation]#[Texto Final. - Filipe 13/07.]
90100090-1 = "Episódio 9; A Pista"
90100090-3 = "Subsolo da Schale - QG de operações do Esquadrão FOX"
90100090-4 = "[ns1] \"Gente, vocês estão bem?!\"\n[ns2] \"Soube que um Lore atacou vocês…… tudo certo?\""
90100090-8 = "Ngh……?!"
90100090-9 = "(Glup)"
90100090-10 = "……Perdão pela cena."
90100090-11 = "O Esquadrão FOX retornou há cerca de 1 hora e 30 minutos."
90100090-12 = "[s3] \"Ah, vocês estavam jantando.\"\n[s4] \"Foi mal. Volto depois……?\""
90100090-15 = "Não. Nós que pedimos desculpas……#npela indisciplina à mesa."
90100090-16 = "Ah, já que está aqui."
90100090-17 = "Não quer se juntar a nós, Sensei?"
90100090-18 = "[s] \"Adoraria, mas já jantei.\""
90100090-22 = "[ns] \"Isso é…… trouxinha de tofu frito?\""
90100090-23 = "É. A Niko que fez. Ah, o tofu frito veio de fora, viu?#nNão mexemos nos ingredientes da geladeira da sala de descanso, relaxa."
90100090-24 = "Conhecemos o pessoal de uma fábrica de tofu frito numa operação antiga.#nEles mandam tofu de qualidade de tempos em tempos, então às vezes eu cozinho."
90100090-25 = "E, papo reto, mesmo sem contar isso:#na comida de tofu frito da Niko é deliciosa demais."
90100090-26 = "Hmm~ o recheio é cogumelo? O caldinho que sai de dentro do tofu é bom demaais~"
90100090-27 = "Escuta…… já faz um tempo que eu tô encucada,#nmas por que SÓ a minha trouxinha veio cheia de feijão?"
90100090-28 = "Isso é castigo? Eu fiz alguma coisa……?"
90100090-29 = "Come e não reclama."
90100090-30 = "Como é que é mesmo? \"Demônios pra fora, sorte pra dentro\"~"
90100090-31 = "O feijão de Setsubun é pra espantar mau espírito, não é esse o sentido!"
90100090-32 = "Bom, o gosto até que tá bom."
90100090-33 = "[s] \"O que aconteceu lá?\""
90100090-34 = "A explicação é um pouco longa, mas……"
90100090-36 = "……Sendo assim, concluímos que o indivíduo branco não identificado que afetou a FOX4#né o mesmo ser que o espantalho branco――#nvulgo \"Kunekune\"."
90100090-41 = "[ns] \"E a saúde, tá em ordem? Nada de estranho?\""
90100090-42 = "De boa, de boa. Fiz até exame físico assim que voltei: nada de anormal."
90100090-43 = "Dói mais é a cabeça, da cascudada da Kurumi.#nAcho que criou galo……"
90100090-44 = "Olha a ingratidão.#nSe eu demorasse mais uns segundos,#nsabe-se lá o que teria acontecido com você."
90100090-45 = "Não ter acabado como as vítimas já foi sorte no azar……"
90100090-46 = "Mas ela acordou sem lembrar de nada.#nNem da forma do Kunekune, nem da direção do tal \"campo verde\"…… apagou tudo."
90100090-47 = "Felizmente, a bodycam da FOX3 gravou a conversa daquela hora."
90100090-52 = "Do outro lado da estrada. Um campo verde sob o céu azul.#nNão tá no mapa…… miragem?"
90100090-53 = "O mato tá alto…… tem um espantalho……#ne atrás dele, uma pessoa de branco sorrindo――"
90100090-55 = "……Ei, minha voz é assim mesmo? Toda vez que escuto, dá uma sensação esquisita."
90100090-56 = "Sempre foi assim, deixa de frescura."
90100090-57 = "Estranho mesmo. Não existe campo nenhum perto da estação Shirounagi."
90100090-58 = "Não seria uma fata morgana?#nQuando a miragem sobe, dá pra ver lugares distantes."
90100090-59 = "Isso só acontece em lugar sem obstáculo nenhum, tipo o Grande Deserto de Abydos."
90100090-60 = "No ponto Romeo―― o 3º Distrito Comercial,os prédios bloqueiam a visão.#nPor mais que a imagem se distorça, não tem como observar outro lugar."
90100090-61 = "Uma miragem que mostra um lugar que não deveria ser visível……"
90100090-62 = "De todo jeito, uma coisa ficou clara:#nnosso inimigo é \"um mistério além da compreensão\"."
90100090-63 = "[s5] \"Avançar às cegas daqui pra frente é perigoso.\"\n[s6] \"Deixem este caso com a Schale e――\""
90100090-66 = "Recuar quando não há segurança garantida também é virtude das forças especiais."
90100090-67 = "Mas, ao contrário do \"coelho\", a \"raposa\"não é só cautelosa: é cheia de curiosidade."
90100090-68 = "Recuar com uma pista nova diante do nariz……#nnossa natureza não permite."
90100090-69 = "[s] \"……Pista nova?\""
90100090-70 = "Veja isto, por favor."
90100090-71 = "Este é o estojo ejetado quando a FOX4 puxou o gatilho, tragada pela miragem."
90100090-72 = "Se ele existe, a bala disparada também deveria existir.#nMas não achamos nenhuma marca de impacto no chão."
90100090-73 = "Provavelmente, sumiu junto com o Lore."
90100090-74 = "Um calibre .50 de rifle antimaterial carrega uma energia física nada desprezível.#nPara o bem ou para o mal, se aquilo interferiu na bala――"
90100090-75 = "significa que não é mera ilusão, e sim um \"alvo\" que pode ser capturado fisicamente."
90100090-79 = "Sensei. Antes de repassarmos este alvo a outra unidade,#npermita-nos executar um último reconhecimento em força,#npara reduzir as próximas vítimas."
90100090-83 = "[ns7] \"……Está bem. Mas é a última.\"\n[ns8] \"E, dessa vez, eu vou junto.\""
90100090-86 = "Obrigada pela permissão."
90100090-87 = "Melhor do que lutar contra ilusão.#nSe tem forma, é só entupir de explosivo que alguma reação vai dar."
90100090-88 = "Isso tá me lembrando umas memórias ruins de quando enfrentamos as calouras……"
90100090-91 = "E aí, onde vai ser? Ponto Romeo de novo?"
90100090-92 = "Para reproduzir a situação, o mesmo local seria o ideal, porém……"
90100090-93 = "Se a ideia é combate, acho melhor outro lugar."
90100090-94 = "Por quê?"
90100090-95 = "Pensa comigo: atirar feito doida, em campo aberto, contra um \"inimigo que ninguém mais vê\"……#nos cidadãos vão olhar torto."
90100090-96 = "Fora que o distrito comercial lota de dia.#nQualquer vacilo, arrastamos civis pro tiroteio."
90100090-97 = "Apoiado~#nEncarar um segundo round com as alunas da Valkyrie depois de despachar o Kunekune……#nmelhor não, né?"
90100090-98 = "……Isso seria um problema."
90100090-99 = "[s9] \"Deixem que eu convenço os cidadãos.\"\n[s10] \"A limpeza depois fica por minha――\""
90100090-102 = "Não. Vamos mudar de local."
90100090-103 = "Mesmo em operação, o dano aos cidadãos deve ser mínimo."
90100090-104 = "Se expusermos civis ao perigo durante a operação…… a responsabilidade é nossa."
90100090-105 = "E, acima de tudo, ainda não fomos totalmente perdoadas."
90100090-106 = "Se o Sensei intervier, a posição da Presidente do Conselho complica ainda mais."
90100090-107 = "[s] \"……Entendido.\""
90100090-108 = "O critério número um do local: permitir observar a miragem."
90100090-109 = "De preferência com pouco movimento e correntes de ar#nextremas causadas pela diferença de temperatura."
90100090-110 = "Entendido. Vou procurar no mapa de operações."
90100090-111 = "Ah, mais uma coisa que me preocupa……"
90100090-112 = "Com a gente já sabendo do \"Kunekune\", uma \"operação normal\" ainda é possível?"
90100090-113 = "Como assim……?"
90100090-114 = "Na última operação, a Otogi viu o Kunekune e parou de conversar com a gente, lembra?"
90100090-115 = "Não dá pra seguir combate em estado de perda total de comunicação, sem nem ouvir ordem de recuo."
90100090-116 = "E se formos em duplas? Uma observa, a outra puxa o gatilho."
90100090-117 = "Também não. Não se monta operação pressupondo possessão."
90100090-118 = "Na pior das hipóteses, as quatro podem ficar incapacitadas de uma vez."
90100090-119 = "E se usarmos óculos de proteção?"
90100090-120 = "Será? A Otogi viu a miragem através da mira, tecnicamente."
90100090-121 = "Só pôr um vidro ou espelho no meio não deve adiantar."
90100090-122 = "Que coisa complicada."
90100090-123 = "Vai ver só resta chamar uma médium mesmo?"
90100090-129 = "Quer dizer que basta observar a forma da coisa sem olhar diretamente, né?"
90100090-130 = "Então―― se usarmos isto, resolvido, não?"
90100090-131 = "…………"
90100090-133 = "……Isso vai funcionar mesmo?"
90100090-135 = "Próximo Episódio;Rumo à Escuridão"