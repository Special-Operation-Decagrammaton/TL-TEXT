[translation]
3601-1 = "おかしなノスタルジー（１）"
3601-2 = "さて……。"
3601-3 = "会議を始めましょうか。"
3601-4 = "報告をお願いします。"
3601-5 = "それでは私から。昨日18時頃、カフェのある通りで銃撃戦がありました。"
3601-6 = "限定スイーツに乗っていたイチゴの取り合いから発展したとのことです。"
3601-10 = "イチゴ……？"
3601-11 = "イチゴで、ですか？"
3601-12 = "正義実現委員会のツルギ委員長が出動。滞りなく制圧しました。"
3601-13 = "それは……さぞや救護騎士団が忙しくなったことでしょう。"
3601-14 = "はい。多くの生徒が搬送されたため、対応は遅くまでかかったとのことです。"
3601-18 = "ふむ……それは、相当量の薬品や包帯が消費されたのでしょうね。"
3601-19 = "救護騎士団に「追加予算が必要な場合は申請書を提出するように」と#nお伝えください。"
3601-24 = "他にはありますか？"
3601-25 = "次はその……救護騎士団の事案でして……。"
3601-26 = "壁に立てかけられたチェーンソーを見た患者が、#nパニックを起こして治療室から脱走しようとする事件が発生。"
3601-27 = "現在、該当の治療室は使用不能となっています。"
3601-28 = "チェーンソー……？#nなぜそんな物が……。"
3601-29 = "……分かりました。#n後日、救護騎士団所有の医療機器について改めて調査をしてください。"
3601-34 = "他には何かありますか？"
3601-35 = "本日深夜1時頃、本館の屋上にて全裸の生徒が目撃されました。"
3601-36 = "目撃者は多くありませんが、すでに噂として広まっており……#n何かしらの対処が必要かと。"
3601-37 = "……。"
3601-38 = "ふふっ……。"
3601-39 = "裸の生徒、ですか……。"
3601-40 = "深夜に……屋上で。"
3601-41 = "なぜ、幽霊ではないのでしょうか？"
3601-42 = "……ナギサ様？"
3601-43 = "いっそ本当に幽霊ならば、どれほど良かったか……。"
3601-44 = "解決不可能な問題なら、対処も不要なのに……。"
3601-45 = "……ふふっ。"
3601-46 = "ふふふふふふふふっ……。"
3601-51 = "ナギサ様！？"
3601-52 = "ダメです！意識がありません！"
3601-54 = "救護騎士団を呼んでください！早く！"
3601-56 = "ナギちゃんが過労で倒れた！？"
3601-57 = "正確には、燃え尽き症候群と呼ばれるものだそうだ。"
3601-58 = "身体に大きな異常はない、とのことだったが……。"
3601-59 = "市販のペットボトル紅茶を飲ませたものの、これといった反応はなかった。"
3601-61 = "えっ、それマズい状態じゃない！？"
3601-62 = "それは救護騎士団も同意見のようだ。#nしばらく業務から離れ、メンタルケアや休息が必要、と診断された。"
3601-63 = "メンタルケア……。"
3601-64 = "限定スイーツとか持っていったら、元気になるかな？"
3601-65 = "……議事録を見た限り、その案は喜ばれなさそうだ。"
3601-66 = "何かを差し入れるよりも、ナギサから業務を引きはがし、しばらく職場から離れさせるほうが先決かもしれないね。"
3601-67 = "ここに居ては、休んだ心地もしないだろう。"
3601-68 = "どこか休めそうなところに私たちで連れて行ってあげる？"
3601-69 = "ああ、それが最善ではないかな。"
3601-70 = "う～ん……。"
3601-71 = "トリニティの外で……ナギちゃんが喜びそうな場所……。"
3601-72 = "そうだ！"
3601-74 = "心当たりでも？"
3601-75 = "[ruby=せんがいきょう]山海経[/ruby]に行こう！ "
3601-76 = "山海経……高級中学校にか？またどうして。"
3601-77 = "知る人ぞ知る紅茶専門店があるらしいの！"
3601-78 = "茶葉のブレンドをさせてもらえたり、#n試飲もできるんだって！"
3601-79 = "ナギちゃん紅茶好きだし、少しは元気になるんじゃないかな？"
3601-80 = "……珍しく理にかなった案じゃないか。"
3601-81 = "……ん？"
3601-82 = "セイアちゃんのなかでの私の評価って……。"
3601-83 = "なに、私も異存はないよ。"
3601-84 = "じゃあ決まりっ！"
3601-85 = "あとは移動手段だけど……。"
3601-86 = "ナギちゃんがあの状態だし、列車やバスってのもね……。"
3601-87 = "ティーパーティーの共用車庫にある車にする？"
3601-88 = "あれは手続きが面倒だ。#nそれに、付き添いが同乗する決まりだろう？"
3601-89 = "それでは結局、業務の延長線上に感じられてしまう。"
3601-90 = "えー、じゃあどうしたら……。"
3601-91 = "私がバイクを出そう。"
3601-92 = "サイドカーもついている。三人なら乗れるはずだ。"
3601-93 = "わあ！セイアちゃんの運転、久しぶりだね！ "
3601-94 = "分かった。見学の予約は私がやっておくよ。"
3601-95 = "ああ、よしなに。"
3601-96 = "それじゃ、ナギちゃんリフレッシュ大作戦――"
3601-98 = "スタートっ！"
