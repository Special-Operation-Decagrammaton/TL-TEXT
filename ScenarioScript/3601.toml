[translation]
3601-1 = "Nostalgia estranha (1)"
3601-2 = "Bem..."
3601-3 = "Vamos começar a reunião."
3601-4 = "Por favor, apresentem os relatórios."
3601-5 = "Começarei por mim. Ontem, por volta das 18h, houve um tiroteio na rua onde fica o café."
3601-6 = "Dizem que começou por causa de uma disputa por um doce de edição limitada que levava morango."
3601-10 = "Morango...?"
3601-11 = "Por causa de um morango?"
3601-12 = "A presidente Tsurugi, do Comitê de Justiça, entrou em ação. A situação foi contida sem problemas."
3601-13 = "Isso... certamente deve ter deixado o Esquadrão de Socorro bem ocupado."
3601-14 = "Sim. Como muitas alunas foram levadas para lá, o atendimento se estendeu até tarde."
3601-18 = "Hum... imagino que uma quantidade considerável de medicamentos e bandagens tenha sido consumida."
3601-19 = "Por favor, diga ao Esquadrão de Socorro para #n'enviar um formulário de solicitação caso precisem de orçamento adicional'."
3601-24 = "Há mais alguma coisa?"
3601-25 = "O próximo é, bem... um caso envolvendo o Esquadrão de Socorro..."
3601-26 = "Uma paciente viu uma motosserra encostada na parede, #nentrou em pânico e tentou fugir da sala de tratamento."
3601-27 = "Atualmente, a referida sala de tratamento está inutilizável."
3601-28 = "Motosserra...? #nPor que algo assim estaria lá..."
3601-29 = "...Entendido. #nPor favor, investigue novamente os equipamentos médicos de posse do Esquadrão de Socorro em uma data posterior."
3601-34 = "Há mais alguma coisa?"
3601-35 = "Hoje, por volta da 1h da manhã, uma aluna nua foi vista no telhado do prédio principal."
3601-36 = "Não houve muitas testemunhas, mas o boato já se espalhou... #ncreio que alguma medida seja necessária."
3601-37 = "..."
3601-38 = "Fufu..."
3601-39 = "Uma aluna nua, é..."
3601-40 = "No meio da noite... no telhado."
3601-41 = "Por que não pode ser um fantasma?"
3601-42 = "...Nagisa-sama?"
3601-43 = "Se fosse realmente um fantasma, teria sido muito melhor..."
3601-44 = "Se fosse um problema impossível de resolver, não precisaríamos lidar com ele..."
3601-45 = "...Fufu."
3601-46 = "Fufufufufufufu..."
3601-51 = "Nagisa-sama!?"
3601-52 = "Não pode ser! Ela perdeu a consciência!"
3601-54 = "Chamem o Esquadrão de Socorro! Rápido!"
3601-56 = "A Nagi-chan desmaiou de excesso de trabalho!?"
3601-57 = "Para ser exato, parece ser o que chamam de síndrome de burnout."
3601-58 = "Disseram que não há anormalidades físicas graves, mas..."
3601-59 = "Tentamos dar a ela um chá de garrafa comprado em loja, mas não houve reação alguma."
3601-61 = "Ei, isso não é um estado preocupante!?"
3601-62 = "O Esquadrão de Socorro concorda. #nFoi diagnosticado que ela precisa se afastar do trabalho por um tempo para cuidados mentais e descanso."
3601-63 = "Cuidados mentais..."
3601-64 = "Será que ela melhoraria se levássemos um doce de edição limitada?"
3601-65 = "...Pelo que vi na ata da reunião, essa ideia não parece que a deixaria feliz."
3601-66 = "Em vez de levar algo, talvez seja melhor tirar o trabalho das mãos da Nagisa e afastá-la do escritório por um tempo."
3601-67 = "Estando aqui, ela não sentirá que está descansando de verdade."
3601-68 = "Que tal a levarmos para algum lugar onde ela possa descansar?"
3601-69 = "Ah, essa não seria a melhor opção?"
3601-70 = "Hmm..."
3601-71 = "Fora de Trinity... um lugar que a Nagi-chan gostaria..."
3601-72 = "Isso!"
3601-74 = "Tem alguma ideia?"
3601-75 = "Vamos para Shanhaijing!"
3601-76 = "Shanhaijing... para a escola secundária de elite? Por que isso agora?"
3601-77 = "Dizem que tem uma loja de chás especializada que só os conhecedores frequentam!"
3601-78 = "Dá para misturar as folhas de chá e até fazer degustação!"
3601-79 = "A Nagi-chan gosta de chá, então talvez isso a anime um pouco, não acha?"
3601-80 = "...Essa é uma proposta surpreendentemente sensata."
3601-81 = "...Hm?"
3601-82 = "Qual é a minha reputação na cabeça da Seia-chan...?"
3601-83 = "Ora, eu também não tenho objeções."
3601-84 = "Então está decidido!"
3601-85 = "Só falta o meio de transporte..."
3601-86 = "A Nagi-chan está naquele estado, então trem ou ônibus não seria o ideal..."
3601-87 = "Que tal usarmos o carro da garagem compartilhada do Chá das Partes?"
3601-88 = "A burocracia para isso é um incômodo. Além disso, não é regra que um acompanhante deve ir junto?"
3601-89 = "No fim, acabaria parecendo apenas uma extensão do trabalho."
3601-90 = "Ah, então o que a gente faz..."
3601-91 = "Eu vou pegar a minha moto."
3601-92 = "Ela tem um sidecar. Deve caber nós três."
3601-93 = "Uau! Faz tempo que não ando com você dirigindo, Seia-chan!"
3601-94 = "Entendido. Eu farei a reserva para a visita."
3601-95 = "Ah, conto com você."
3601-96 = "Então, a Grande Operação de Revitalização da Nagi-chan—"
3601-98 = "Começar!"
