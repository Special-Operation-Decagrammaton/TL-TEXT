[translation]
51210-1 = "Episódio 21; Mesmo assim, para você"
51210-3 = "Haa!"
51210-15 = "Conseguimos derrotar os peixes pequenos, mas, ainda assim..."
51210-23 = "[ns] \"Nossos ataques não funcionam contra o Kurokage.\""
51210-24 = "Eles parecem estar se reagrupando, já que o outro lado também ficou quieto, mas..."
51210-25 = "Não sabemos quando eles vão atacar de novo~"
51210-26 = "Desse jeito, não dá para ir derrotar aquele cara de antes!"
51210-27 = "Uwaa! O que a gente faz agora~~!?"
51210-29 = "Se continuar assim, a Yukari vai..."
51210-30 = "Isso não pode acontecer, precisamos encontrar um jeito...!"
51210-31 = "Ei, Kikyou!?"
51210-32 = "…………."
51210-38 = "[ns] \"Nagusa.\""
51210-42 = "[ns1] \"Entendi que a Shuro está mirando na Yukari, e também--\"\n[ns2] \"que toda essa situação foi causada por uma estratégia.\""
51210-45 = "[ns] \"Você poderia me explicar o que significa criar os 'Cem Contos'?\""
51210-47 = "[ns] \"A Shuro... o que ela pretende fazer com a Yukari?\""
51210-48 = "Isso é..."
51210-49 = "Sem enrolação..."
51210-50 = "Não é mais importante salvar a Yukari agora!?"
51210-52 = "A Nagusa-senpai disse 'como daquela vez com a Ayame', não disse?"
51210-56 = "Kikyou...?"
51210-61 = "Renge, informação é importante. #nÉ frustrante, mas como ela disse, nós não sabemos de nada."
51210-62 = "O que é o certo, como devemos lidar com isso... nada."
51210-63 = "Sem informações, não podemos julgar."
51210-64 = "O Sensei está perguntando justamente isso, não é? #nA única pessoa aqui que tem as informações é a Nagusa-senpai."
51210-66 = "Eu... apenas eu..."
51210-67 = "Então nos conte. #nQual é o objetivo dela e... o que devemos fazer."
51210-68 = "A única que sabe disso é você, Nagusa-senpai."
51210-72 = "………………."
51210-73 = "……Entendi."
51210-74 = "Mesmo em uma situação dessas, nós..."
51210-75 = "O Clube Kachoufuugetsu..."
51210-80 = "Nagusa-senpai...?"
51210-86 = "Antigamente... antes mesmo de Hyakkiyako se tornar uma união, diziam que eles eram um grupo de monstros que causava estragos."
51210-87 = "É a elas que se refere--"
51210-88 = "[ns3] \"'Um clube cruel que não reconhece a forma atual da união de Hyakkiyako'\"\n[ns4] \"'Monstros que manipulam livros estranhos e enganam as pessoas'... era isso, não é?\""
51210-91 = "……Sim."
51210-92 = "Não sei o motivo nem o objetivo... mas os meios existem, com certeza."
51210-93 = "Eles usam um livro chamado 'Inou Mononoke Roku' para criar contos de terror chamados 'Cem Contos', para o seu próprio prazer... #npara a sua própria estética..."
51210-94 = "Na verdade, na grande planície nevada onde fui, Kokuriko, a presidente do Clube Kachoufuugetsu, fez com que a Ayame..."
51210-95 = "……se tornasse um dos 'Cem Contos' e a levou para além do 'Crepúsculo'."
51210-101 = "Eu só pude assistir a tudo aquilo... fui tão impotente..."
51210-103 = "A presidente Ayame, então..."
51210-104 = "……."
51210-106 = "Se as palavras da Shuro forem verdadeiras, acho que desta vez ela está mirando na Yukari."
51210-107 = "Se continuar assim, a Yukari também vai acabar como a Ayame..."
51210-108 = "Por que... você não nos contou nada?"
51210-109 = "Eu estava com medo... de dizer a verdade."
51210-116 = "……Nagusa-senpai."
51210-124 = "O quê, quem está aí!?"
51210-126 = "Ah, ah... vocês aí, conseguem me ver?"
51210-130 = "Ah, Sensei! Ali..."
51210-138 = "Ahahaha! Estão aproveitando o festival?"
51210-139 = "Estão aproveitando, não estão...?"
51210-140 = "Afinal, nós nos esforçamos ao máximo para preparar tudo isso para o entretenimento de vocês."
51210-144 = "Aquilo é o dirigível de transmissão do Departamento Yin-Yang..."
51210-145 = "Estão transmitindo até pela internet...!"
51210-146 = "O quê, c-como!? #nComo eles conseguiram fazer algo assim!"
51210-147 = "[s] \"Foi a Shizuko quem preparou isso para o festival...\""
51210-148 = "Mas por que fazer uma transmissão..."
51210-150 = "Ahahaha, não foi só isso que eu preparei."
51210-151 = "Eu tenho uma convidada que gostaria de apresentar a vocês, sabem?"
51210-155 = "Alguns de vocês devem conhecê-la... Aquela pessoa que todos esperavam ansiosamente neste festival, recriado após 20 anos!"
51210-164 = "[ns] \"Yukari...!\""
51210-165 = "Ahahaha! Estão conseguindo ver bem?"
51210-166 = "Bem, eu preparei tudo para isso, então... #né natural que consigam ver bem."
51210-167 = "Vou apresentar a protagonista desta história."
51210-169 = "............"
51210-171 = "Agora ela permanece em silêncio como uma bela adormecida, mas eu sei muito bem."
51210-172 = "Essa sacerdotisa... esconde em seu peito uma ferida maior do que qualquer outra coisa, não é?"
51210-175 = "A pessoa que ela admirava não olhou para ela..."
51210-178 = "E quando ela implorou para voltar ao que era antes, foi rejeitada, dizendo que era inútil."
51210-180 = "Quando ela clamou que queria voltar para casa, disseram que ela tinha outro lugar para onde voltar..."
51210-182 = "A sacerdotisa finalmente voltou para o seu próprio lugar... Sim, aqui!"
51210-184 = "No entanto, que pena... #nO lugar que ela pensava ser o único para onde podia voltar, só queria uma coisa dela..."
51210-185 = "Que ela limpasse o nome manchado de 20 anos atrás... Apenas isso."
51210-186 = "............"
51210-187 = "É isso mesmo. Ninguém, absolutamente ninguém, se importa com o que a sacerdotisa sente."
51210-188 = "Ah! Ah! Que pena... #nEm um festival onde todos deveriam estar sorrindo, ela está sozinha, mergulhada na tristeza."
51210-189 = "...Não é frustrante?"
51210-190 = "Se você vai sofrer carregando esse sentimento sozinha... #nNão seria melhor se todos nós carregássemos juntos?"
51210-194 = "Por isso, eu falarei por você. #nEu devolverei esse sentimento a todos vocês em seu lugar!"
51210-195 = "Muito bem, o que começa agora é o estilo do nosso Departamento Kacho Fugetsu..."
51210-196 = "Vamos queimar Hyakkiyako de forma bela, elegante e resplandecente!"
51210-197 = "Por favor, aguardem ansiosamente! Ahahahaha!"
51210-204 = "[ns] \"Yukari...!\""
51210-206 = "Ela disse que ia queimar Hyakkiyako."
51210-207 = "Se não a pararmos logo... a situação vai ficar ainda pior do que já está."
51210-208 = "T-temos que ir logo...!"
51210-213 = "[ns] \"O Kurokage começou a se mover...!\""
51210-214 = "Droga...!"
51210-215 = "O que a gente faz com algo que não sofre dano de ataques!"
51210-216 = "Aliás, mesmo que a gente desse um jeito nele... #nComo vamos derrotar aquela coisa se as armas não funcionam!?"
51210-217 = "...Existe um jeito."
51210-221 = "Kikyou, é verdade...!?"
51210-225 = "[ns] \"Isso é... da presidente do Comitê Hyakka Ryoran...?\""
51210-230 = "Sim. Nagusa-senpai... a 'Hyakuren' que você deixou para mim."
51210-231 = "Se as palavras de Shuro forem verdadeiras..."
51210-232 = "A única pessoa que pode derrotar Shuro... é aquela que possui o emblema. #nOu seja..."
51210-238 = "A única que pode salvar a Yukari... é você, Nagusa-senpai."
51210-239 = "Por isso, eu te peço, Senpai.#nPor favor, ajude a Yukari."
51210-240 = "E-eu entendo... certamente, se for a Nagusa-senpai, que possui as qualificações de presidente do comitê..."
51210-244 = "Eu... não..."
51210-249 = "Não... posso."
51210-251 = "Hã!? P-por que não!?"
51210-253 = "Shuro disse: 'aquela que possui as qualificações como presidente do comitê'...#nIsso se refere à Ayame, não a mim."
51210-254 = "Eu... não consigo."
51210-255 = "Como Shuro disse... desde o início, tudo não passou de uma desculpa."
51210-256 = "Eu tinha medo de que descobrissem quem eu realmente sou, então tentei fugir."
51210-257 = "Sem conseguir falar o que sentia, eu apenas me esforçava para ficar ao lado da Ayame...#nEu interpretei a garota chamada 'Nagusa' para conseguir ficar ao lado dela."
51210-258 = "Eu estava enganando a todos."
51210-259 = "Eu mesma... era um 'cosplay'."
51210-260 = "[s] \"Nagusa...\""
51210-263 = "Eu só queria estar ao lado da Ayame... queria ser alguém digna da Ayame."
51210-264 = "Uma farsa que apenas interpretou o papel de uma aluna exemplar."
51210-265 = "...Eu não conseguia dizer. Se eu contasse a todos que a Ayame se perdeu diante dos meus olhos e que eu voltei para cá... que eu voltei sozinha..."
51210-270 = "Eu certamente seria apontada e julgada por todos."
51210-272 = "Alguém como eu não tem qualificação alguma."
51210-273 = "Como alguém como eu... poderia salvar a Yukari—"
51210-279 = "Goryou, Nagusa...!!"
51210-284 = "Ah..."
51210-289 = "[ns] \"Kikyou, acalme-se...!\""
51210-304 = "Kikyou...?"
51210-305 = "Eu disse coisas terríveis para a Yukari."
51210-306 = "Disse que ela tinha um lugar para onde voltar.#nDisse que não precisávamos dessa brincadeira de Hyakkiyako."
51210-307 = "Eu nunca pensei nada disso... mas me enganei dizendo que era pelo bem da Yukari... e a afastei unilateralmente."
51210-309 = "Foi isso que... a deixou daquele jeito."
51210-310 = "Ki, Kikyou..."
51210-315 = "..."
51210-316 = "Eu ainda não consigo perdoar o fato de você ter nos abandonado e ido embora."
51210-317 = "Nem o fato de que, mesmo esperando por você todo esse tempo, você nunca voltou..."
51210-322 = "...Mas."
51210-323 = "Mas veja bem."
51210-325 = "Por minha causa..."
51210-326 = "Aquela garota, que eu magoei com minhas palavras egoístas..."
51210-327 = "A única pessoa que pode salvar a Yukari é você."
51210-328 = "Não sou eu, nem a Renge, e nem a presidente Ayame...#nÉ você."
51210-330 = "Por isso, eu te peço."
51210-331 = "Eu sei que é um pedido egoísta.#nSei que estou sendo cara de pau depois de tudo."
51210-332 = "Mesmo assim, eu te peço...!"
51210-333 = "Eu quero pedir desculpas a ela...!"
51210-334 = "Por favor... Nagusa-senpai."
51210-336 = "Por favor..."
51210-339 = "Nagusa-senpai!"
51210-343 = "Ah..."
51210-344 = "Eu também... eu também sinto o mesmo!"
51210-345 = "Eu sei que não tenho o direito de dizer isso, mas!"
51210-346 = "Eu estou com a Kikyou!"
51210-347 = "Eu também magoei a Yukari... por isso quero pedir desculpas."
51210-348 = "Quero encontrá-la mais uma vez e conversar direito."
51210-349 = "Eu sei que estou sendo egoísta. Querer pedir desculpas agora, depois de tudo o que aconteceu, é o auge da autossatisfação, mas..."
51210-350 = "……Mas."
51210-355 = "Como a Yukari disse, se pudéssemos voltar àquele momento... eu também...!"
51210-356 = "Por isso, eu te peço, Nagusa-senpai."
51210-362 = "…………Eu enganei a todos……"
51210-363 = "Eu menti……"
51210-369 = "[ns] \"Nagusa, eu também te peço.\""
51210-382 = "……Entendido."
51210-392 = "Eu vou tentar."
51210-404 = "[ns] \"Parece que não vai ser tão fácil passar por eles, afinal.\""
51210-405 = "Sensei, vocês vão na frente...!#nDeixem isso com a gente!"
51210-406 = "É verdade. Agora que sabemos o que fazer, está tudo bem~#nSó precisamos atrasá-los o máximo possível, certo?"
51210-407 = "Entendido. Se for para atrasá-los, pode deixar comigo!"
51210-408 = "Deixa com a gente, Sensei!"
51210-410 = "Nagusa-senpai, Sensei... por favor, cuidem da Yukari."
51210-412 = "[ns] \"Sim, vamos! Nagusa!\""
51210-419 = "……!"
51210-421 = "Próximo episódio: A cidade envolta em chamas"
