[translation]
51210-1 = "Episódio 21; Mesmo Assim, Para Você"
51210-3 = "Haaah!"
51210-15 = "Conseguimos derrotar os mais fracos de alguma forma, mas como imaginei..."
51210-23 = "[ns] \"Nossos ataques não funcionam no Kurokage, não é.\""
51210-24 = "Ele ficou quieto, talvez esteja tentando se recompor..."
51210-25 = "Mas não sabemos quando vai atacar de novo~"
51210-26 = "Desse jeito, não podemos ir atrás daquele cara de antes!"
51210-27 = "Uwaaahn! O que a gente faz~~!?"
51210-29 = "Se continuarmos assim, a Yukari vai..."
51210-30 = "Isso não pode acontecer, temos que encontrar um jeito...!"
51210-31 = "Ei, Kikyou!?"
51210-32 = "............"
51210-38 = "[ns] \"Nagusa.\""
51210-42 = "[ns1] \"Eu entendi que a Shuro está atrás da Yukari, e que...\"\n[ns2] \"Toda essa situação foi armada por ela.\""
51210-45 = "[ns] \"Você poderia me explicar o que significa criar uma 'Hyakumonogatari'?\""
51210-47 = "[ns] \"O que... a Shuro pretende fazer com a Yukari?\""
51210-48 = "Isso é..."
51210-49 = "Pare de enrolar e..."
51210-50 = "Não deveríamos salvar a Yukari primeiro!?"
51210-52 = "A Nagusa-senpai disse 'Como daquela vez com a Ayame', não é."
51210-56 = "Kikyou...?"
51210-61 = "Renge, a informação é essencial. #n É frustrante, mas como ela disse, não sabemos de nada."
51210-62 = "O que é o certo a se fazer, como devemos lidar com isso... não sabemos nada."
51210-63 = "Sem informações, não podemos tomar decisões."
51210-64 = "Por isso o Sensei está perguntando, não é? #n E agora, a única que tem as informações é você, Nagusa-senpai."
51210-66 = "Só... eu..."
51210-67 = "Então nos conte. #n O objetivo dela e... o que devemos fazer."
51210-68 = "A única pessoa que sabe disso é você, Nagusa-senpai."
51210-72 = ".................."
51210-73 = "......É verdade."
51210-74 = "Mesmo nesta situação, para nós――"
51210-75 = "O Clube das Flores, Pássaros, Vento e Lua é..."
51210-80 = "Nagusa-senpai...?"
51210-86 = "No passado... antes de a Hyakkiyako se tornar uma aliança, diziam que eles faziam o que queriam... um grupo de espíritos malignos."
51210-87 = "Elas são o――"
51210-88 = "[ns3] \"'O clube diabólico que não reconhece a forma atual da aliança da Hyakkiyako'\"\n[ns4] \"'O espírito maligno que manipula livros misteriosos e ilude as pessoas'...... era isso?\""
51210-91 = "......Sim."
51210-92 = "Não sabemos seus motivos ou objetivos... mas sabemos que os seus métodos existem."
51210-93 = "Elas usam um livro misterioso chamado 'Inou Mononokeroku' para criar uma história de fantasmas chamada 'Hyakumonogatari'... em prol da própria alegria... #n da sua elegância."
51210-94 = "Na verdade, no campo de neve para onde fui, a presidente do Clube das Flores, Pássaros, Vento e Lua, a Kokuriko... levou a Ayame..."
51210-95 = "......Transformou-a em uma 'Hyakumonogatari' e a levou para o outro lado do 'Crepúsculo'."
51210-101 = "E eu não pude fazer nada além de observar... fui completamente inútil..."
51210-103 = "Então foi isso que aconteceu com a Presidente Ayame..."
51210-104 = "......"
51210-106 = "Se o que a Shuro disse for verdade, acho que ela está atrás da Yukari desta vez."
51210-107 = "Se não fizermos nada, a Yukari vai acabar igual a Ayame..."
51210-108 = "Por que... você não nos disse nada?"
51210-109 = "Eu tinha medo... de contar a verdade."
51210-116 = "......Nagusa-senpai."
51210-124 = "Q-Quem tá aí!?"
51210-126 = "Ah, ah―― vocês conseguem me ver?"
51210-130 = "Ah, Sensei! Ali...!"
51210-138 = "Ahaha! Estão se divertindo no festival~?"
51210-139 = "Estão se divertindo muuuito, não é?"
51210-140 = "Afinal, nós preparamos tudo isso com todo o nosso esforço, especialmente para a diversão de vocês."
51210-144 = "Aquele é o dirigível de transmissão do Clube Yin-Yang..."
51210-145 = "Também está sendo transmitido ao vivo pela internet...!"
51210-146 = "Q-C-Como assim!? #n Ela consegue fazer até isso!"
51210-147 = "[s] \"Aquele que a Shizuko preparou para o festival...\""
51210-148 = "Mas, por que uma transmissão..."
51210-150 = "Ahaha, isso não é a única coisa que eu preparei, sabiam?"
51210-151 = "Há uma convidada que eu gostaria de apresentar a vocês, não é?"
51210-155 = "Como alguns de vocês já devem saber―― neste festival, recriado após 20 anos, apresentamos [ruby=aquela]a[/ruby] pessoa que tanto aguardavam!"
51210-164 = "[ns] \"Yukari...!\""
51210-165 = "Ahaha! Conseguem vê-la beeem?"
51210-166 = "Bem, eu me preparei só para isso, não é? #n Claro que dá pra ver bem."
51210-167 = "Apresento a vocês, a protagonista desta história."
51210-169 = "............"
51210-171 = "No momento, ela permanece tão quieta quanto uma princesa adormecida, mas eu sei muito bem."
51210-172 = "Que esta Miko... guarda no peito uma ferida maior do que qualquer pessoa ou qualquer outra coisa, não é?"
51210-175 = "A pessoa que ela tanto admirava não lhe deu atenção――"
51210-178 = "――E quando ela pediu para que as coisas voltassem ao que eram, foi rejeitada como se aquilo não fizesse sentido algum."
51210-180 = "E quando ela levantou a voz dizendo que queria voltar, negaram isso a ela, dizendo que ela tinha outro lugar para voltar――"
51210-182 = "A Miko finalmente voltou para o seu lugar... sim, para cá!"
51210-184 = "No entanto, no entanto, que pena... #n O que esperavam da Miko, no lugar que ela achava ser o seu único lar, era――"
51210-185 = "Apenas que ela lavasse a desonra de 20 anos atrás."
51210-186 = "............"
51210-187 = "Isso mesmo. Ninguém, absolutamente ninguém se importa com os sentimentos da Miko."
51210-188 = "Ah! Ah! Coitadinha... #n Estar sofrendo de tristeza sozinha em um festival onde todos deveriam estar sorrindo."
51210-189 = "......Isso não te frustra?"
51210-190 = "Em vez de sofrer sozinha com esses sentimentos... #n Não seria melhor compartilhá-los com todos?"
51210-194 = "Sendo assim, eu falarei no seu lugar. #n Devolverei esses sentimentos a vocês em nome dela!"
51210-195 = "Agora, o que está para começar é a elegância do nosso Clube das Flores, Pássaros, Vento e Lua――"
51210-196 = "De forma bela, sensual e resplandecente, queimaremos a Hyakkiyako até as cinzas!"
51210-197 = "Senhoras e senhores, por favor, aguardem com grande expectativa! Ahahah! "
51210-204 = "[ns] \"Yukari...!\""
51210-206 = "Ela disse que queimaria a Hyakkiyako até as cinzas."
51210-207 = "Temos que impedi-la rápido... senão a situação ficará ainda pior."
51210-208 = "T-Temos que ir rápido...!"
51210-213 = "[ns] \"O Kurokage, começou a se mover...!\""
51210-214 = "Droga...!"
51210-215 = "O que a gente faz com um cara que não recebe dano dos nossos ataques!"
51210-216 = "Afinal, mesmo que a gente dê um jeito nesse cara... #n Como vamos derrotar aquele bicho em que as armas não funcionam!?"
51210-217 = "......Se for sobre um método, existe um."
51210-221 = "Kikyou, é sério...!?"
51210-225 = "[ns] \"Isso é... a arma para a presidente da Hyakkaryouran...?\""
51210-230 = "Sim. A 'Hyakuren' que você... deixou comigo, Nagusa-senpai."
51210-231 = "Se o que a Shuro disse for verdade..."
51210-232 = "Há apenas uma pessoa que pode derrotar a Shuro... a pessoa que possui o emblema. #n Ou seja――"
51210-238 = "A única pessoa que pode salvar a Yukari... é você, Nagusa-senpai."
51210-239 = "Por favor, senpai. #n Quero que você salve a Yukari."
51210-240 = "É, tem razão... A Nagusa-senpai, que tem a qualificação para ser a presidente, com certeza..."
51210-244 = "Eu... não..."
51210-249 = "Posso."
51210-251 = "Hã!? P-Por que não!?"
51210-253 = "O que a Shuro disse, 'aquela que possui a qualificação para ser a presidente'... #n Ela estava se referindo à Ayame, não a mim."
51210-254 = "Eu... não consigo."
51210-255 = "Como a Shuro disse... foi tudo uma desculpa desde o começo."
51210-256 = "Eu tentei fugir porque tinha medo de que descobrissem como eu realmente sou."
51210-257 = "Sem conseguir falar a verdade, eu só tentava ficar ao lado da Ayame... #n Para conseguir estar ao seu lado, eu interpretava uma garota chamada 'Nagusa'."
51210-258 = "Eu estava enganando todo mundo."
51210-259 = "A minha própria existência... era só um 'cosplay'."
51210-260 = "[s] \"Nagusa...\""
51210-263 = "Eu só queria ficar ao lado da Ayame... e me tornar alguém digna de estar lá."
51210-264 = "Eu só estava interpretando uma aluna exemplar... uma farsa."
51210-265 = "......Eu não podia contar. Como eu poderia dizer para todo mundo que perdi a Ayame bem na minha frente, e que voltei para cá... sozinha..."
51210-270 = "Com certeza―― apontariam o dedo para mim."
51210-272 = "Alguém como eu, não tem nenhuma qualificação."
51210-273 = "Não tem como... alguém como eu salvar a Yukari――"
51210-279 = "Goryou, Nagusa...!!"
51210-284 = "Ah..."
51210-289 = "[ns] \"Kikyou, calma...!\""
51210-304 = "Kikyou...?"
51210-305 = "Eu disse coisas terríveis para a Yukari."
51210-306 = "Disse que ela tinha um lugar para voltar. #n E que não precisávamos de uma brincadeira de Hyakkaryouran."
51210-307 = "Mesmo que eu nunca tenha pensado nisso... Eu me enganei achando que era pelo bem da Yukari... e a afastei daquele jeito."
51210-309 = "E isso... a deixou naquele estado."
51210-310 = "K-Kikyou..."
51210-315 = "......"
51210-316 = "Eu ainda não te perdoei... por ter nos abandonado e saído."
51210-317 = "E por não ter voltado, mesmo a gente tendo esperado por você todo esse tempo..."
51210-322 = "......Mas."
51210-323 = "Mesmo assim."
51210-325 = "Por minha culpa..."
51210-326 = "A garota que eu machuquei com as minhas palavras egoístas..."
51210-327 = "A única pessoa que pode salvar a Yukari agora é você."
51210-328 = "Não sou eu nem a Renge, e nem a Presidente Ayame... #n É [ruby=·   ·   ·]você[/ruby]."
51210-330 = "Por favor."
51210-331 = "Eu sei que é um pedido egoísta. #n Que é pedir demais agora."
51210-332 = "Mesmo assim, por favor...!"
51210-333 = "Eu quero me desculpar com ela...!"
51210-334 = "Por favor... Nagusa-senpai."
51210-336 = "Eu imploro..."
51210-339 = "Nagusa-senpai!"
51210-343 = "Ah..."
51210-344 = "Eu também... eu sinto a mesma coisa!"
51210-345 = "Eu sei que não tenho o direito de dizer isso também!"
51210-346 = "Mas eu penso como a Kikyou!"
51210-347 = "Eu também machuquei a Yukari... e quero pedir desculpas."
51210-348 = "Quero encontrá-la de novo e conversar com ela direito."
51210-349 = "Sei que estou sendo egoísta. Querer me desculpar só agora, nessa situação, é o cúmulo da autossatisfação..."
51210-350 = "......Mas."
51210-355 = "Como a Yukari disse, se pudermos voltar àquela época... Eu também...!"
51210-356 = "Por favor, Nagusa-senpai."
51210-362 = "............Mas eu enganei todo mundo..."
51210-363 = "Eu contei, mentiras..."
51210-369 = "[ns] \"Nagusa, eu também te peço.\""
51210-382 = "......Entendido. "
51210-392 = "Eu vou tentar."
51210-404 = "[ns] \"Pelo visto, eles não vão nos deixar passar tão facilmente.\""
51210-405 = "Vão na frente, Sensei...! #n Deixem isso com a gente!"
51210-406 = "Isso mesmo. Agora que sabemos o que fazer, tá tudo bem~ #n Só precisamos ganhar o máximo de tempo possível, né?"
51210-407 = "Entendido. Se é para ganhar tempo, deixem conosco!"
51210-408 = "Deixa com a gente, Sensei!"
51210-410 = "Nagusa-senpai, Sensei... por favor, salvem a Yukari. "
51210-412 = "[ns] \"Sim, vamos! Nagusa!\""
51210-419 = "......!"
51210-421 = "Próximo Episódio; Cidade Envolta em Chamas"
