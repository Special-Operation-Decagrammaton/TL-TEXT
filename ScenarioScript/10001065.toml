[translation]
10001065-1 = "Episódio 6: A Segunda Vitória"
10001065-2 = "Academia Red Winter - Biblioteca"
10001065-3 = "Ugh, eu perdi..."
10001065-4 = "Para uma criança tão pequena que nem sabe o valor de 'A Rosa da Bastilha: Edição Limitada de 30º Aniversário'..."
10001065-5 = "É como dar pérolas aos porcos, ou pregar para um cavalo..."
10001065-6 = "Com a derrota de hoje, a floresta da civilização queimará e entrará em decadência..."
10001065-7 = "Dizer algo assim é cruel demais, não acha?! E quantas vezes eu tenho que dizer que não sou pequena?!"
10001065-11 = "Pronto, tome o livro de volta. Eu não preciso mais dele."
10001065-12 = "Eh? Mas até agora pouco, você disse que usaria este livro como travesseiro para tirar uma soneca a qualquer custo..."
10001065-13 = "Depois de lutar e fazer tanta bagunça com vocês, eu acordei. #nA soneca fica para depois, adiada."
10001065-14 = "Além disso, não entendo muito bem, mas parece ser algo importante para vocês... mudei de ideia."
10001065-15 = "Presidente Cherino..."
10001065-16 = "Dito isso, esse livro é tão importante assim?"
10001065-18 = "Com certeza, Presidente Cherino!"
10001065-19 = "Como mencionei antes, este livro é uma edição de colecionador publicada para comemorar o 30º aniversário de 'A Rosa da Bastilha'. Como foram impressas apenas 100 cópias, é famoso por ser extremamente difícil de conseguir, até mesmo entre os colecionadores!"
10001065-20 = "Especialmente o rascunho do conto especial incluído como anexo, que nunca foi revelado antes! É algo tão raro que qualquer fã de 'A Rosa da Bastilha' desejaria ter!"
10001065-22 = "Ah, claro, este rascunho é uma cópia; o original está em exibição na Grande Biblioteca de Trinity."
10001065-23 = "Ugh... entendi, entendi! #nEntão pare de chegar perto com esses olhos brilhando!"
10001065-24 = "Além disso, se algo tão valioso está na Grande Biblioteca de Trinity, por que não vão lá ver pessoalmente em vez de usar uma cópia?"
10001065-26 = "O acervo da Grande Biblioteca de Trinity não é aberto para estudantes de outras escolas."
10001065-28 = "Como estudantes da Academia Red Winter, só nos resta nos contentar com cópias..."
10001065-29 = "Fufufu, você não entende nada, Momiji!"
10001065-32 = "Não existe nada impossível para a Academia Red Winter liderada por mim!"
10001065-33 = "Se a biblioteca de Trinity não abre seu acervo para estudantes de outras escolas, então nós vamos ocupar Trinity e dominá-la!"
10001065-34 = "Se vocês, junto com os membros da 'Frente de Libertação do Conhecimento', jurarem lealdade a mim... não, a esta que vos fala, prometo que farei com que todos os livros proibidos que vocês nunca puderam ver sejam revelados!"
10001065-36 = "Is-isso é verdade?! Presidente Cherino?!"
10001065-37 = "Claro! Comigo no comando, não apenas Trinity, mas Gehenna, Millennium, Hyakkiyako e todas as outras escolas de Kivotos acabarão sob meu domínio!"
10001065-38 = "Embora, antes disso, a prioridade seja expulsar Marina, que está ocupando a secretaria, e recuperar meu poder..."
10001065-39 = "Seguiremos as ordens da Presidente! Não, por favor, nos deixe segui-la! Presidente Cherino!"
10001065-40 = "Cativar os membros da Frente de Libertação do Conhecimento com apenas uma frase... como esperado da Presidente! Tomoe está emocionada!"
10001065-41 = "Fufu, eu não disse? Diante do carisma de mim, a grande Cherino, ninguém consegue resistir!"
10001065-42 = "Então, por onde começamos? Vamos até a secretaria, arrastamos a Comissária Marina para fora e a jogamos no lago congelado atrás do prédio da escola?"
10001065-43 = "Ou talvez a condenamos a uma noite inteira de cócegas para que ela nunca mais pense em um golpe de estado?"
10001065-44 = "Es-espere! Mesmo eu não estou pensando em algo tão cruel!"
10001065-45 = "Não diga coisas tão assustadoras com tanta naturalidade...!"
