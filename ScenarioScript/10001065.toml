[translation]
10001065-1 = "第6話;二回目の勝利"
10001065-2 = "レッドウィンター連邦学園・図書館"
10001065-3 = "うう、負けてしまいました……。"
10001065-4 = "『バスティーユの薔薇～30周年限定エディション～』の価値も分からない、こんな小さい子に……。"
10001065-5 = "豚に真珠、馬の耳に念仏です……。"
10001065-6 = "今日の敗北を機に文明の森は燃え、退廃することになるでしょう……。"
10001065-7 = "そこまで言うのはひどすぎるだろう！？それにおいらは小さくないと、一体何度言えば！"
10001065-11 = "……ほら、この本は返そう。おいらはもう要らない。"
10001065-12 = "……え？ですがさっきまでは、何としてでもこの本を枕にしてお休みになるって……。"
10001065-13 = "お前たちと一生懸命戦って暴れてたら、目が覚めた。#n昼寝は保留だ、保留。"
10001065-14 = "それに、おいらにはよく分からないが、お前たちにとって大事な物のようだからな……気が変わった。"
10001065-15 = "チェリノ会長……。"
10001065-16 = "というかこの本、そんなに大事なものなのか？"
10001065-18 = "もちろんですよ、チェリノ会長！"
10001065-19 = "先ほどもお伝えしましたが、この本は『バスティーユの薔薇』が発売されてから30周年を記念して出版された愛蔵版で、100冊しか刷られなかったためにマニアたちの間でもなかなか手に入らないことで有名なんです！"
10001065-20 = "特に付録として付いている特別短編のネームは、今まで一度も公開されなかった希少なもので、『バスティーユの薔薇』のファンなら誰もが欲しがるぐらい貴重なものなんです！"
10001065-22 = "あ、もちろんこのネームはコピーで、原本はトリニティの大図書館に展示されていますが。"
10001065-23 = "ううっ……分かった分かった！#nだからそんなに目をキラキラさせてにじりよってくるな！"
10001065-24 = "それよりも、そんなに貴重なものがトリニティの大図書館にあるなら、こんなコピー本より直接行って見ればいいじゃないか？"
10001065-26 = "トリニティの大図書館の蔵書は、他の学校の生徒たちには閲覧できませんから。"
10001065-28 = "レッドウィンター連邦学園の生徒である私たちは、コピー本で満足するしか……。"
10001065-29 = "ふふふ、分かってないな、モミジ！"
10001065-32 = "おいらが率いるレッドウィンター連邦学園に、不可能なことなんて無いのだ！"
10001065-33 = "トリニティの図書館が他の学校の生徒たちに蔵書を開放しないなら、おいらたちがトリニティを占拠して、支配してしまえばいい！"
10001065-34 = "「知識解放戦線」の仲間たち共々、おいら……いや、この私に忠誠を誓うなら、今までお前たちが見られなかったすべての禁書を公開させると約束しよう！"
10001065-36 = "そ、それは本当ですか！？チェリノ会長！？"
10001065-37 = "もちろんだ！この手にかかればトリニティ総合学園はもちろん、ゲヘナ、ミレニアム、百鬼夜行など、いずれはキヴォトスのすべての学校が我が傘下となる！"
10001065-38 = "もちろんその前に、事務局を占拠しているマリナを追い出しておいらの権力を取り戻すことが先だが……。"
10001065-39 = "会長の命令に従います！いえ、従わせてください！チェリノ会長！"
10001065-40 = "たった一言で知識解放戦線の仲間たちを虜にするだなんて……さすが会長ですね！トモエ、感激しました！"
10001065-41 = "ふふ、言っただろう。この私、偉大なるチェリノ様のカリスマ性の前では、誰も抗うことなどできないと！"
10001065-42 = "それでは、何から始めましょうか？事務局に行ってマリナ委員長を引っ張り出し、校舎の裏にある氷の湖にでも沈めますか？"
10001065-43 = "それとも、二度とクーデターを……だなんて気すら起きないように、一晩中くすぐりの刑にしますか？"
10001065-44 = "ま、待て！いくらおいらでも、そこまで残酷なことは考えてない！"
10001065-45 = "平然とそんな怖いことを言うな……！"
