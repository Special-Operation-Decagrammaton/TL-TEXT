[translation]
10011095-8 = "い、イズナ、もうヘロヘロです……。"
10011095-9 = "戦車って、あんなに怖いもの、だったんですね……。"
10011095-10 = "うぇ、もう疲れたぁ……。"
10011095-15 = "先生……イブキのこと、どうか……。"
10011095-24 = "[ns] \"……ミチル、立てる？\""
10011095-25 = "う、うん。何とか……。"
10011095-26 = "[s] \"残ったのは、私たちだけかな。\""
10011095-27 = "……"
10011095-38 = "行こう、先生殿。約束を、果たすために……！"
10011095-45 = "到着だ！陰陽部の部長はどこだ……！？"
10011095-46 = "どこっすか！？"
10011095-51 = "にゃはは、お疲れ様～。"
10011095-52 = "なっ、映像投影！？"
10011095-53 = "さあ、公演も遂に大詰め。最後の最後に笑うのは、一体誰なのでしょう～？"
10011095-58 = "はぁ、はぁ……。"
10011095-59 = "ふう……。"
10011095-60 = "お姫様、返してもらうよ……！"
10011095-65 = "（とは言ってみた、ものの……）"
10011095-66 = "[s] \"頑張ろう、ミチル。\""
10011095-67 = "（……ってあれ、先生殿が妙案をくれるとかじゃない感じ！？）"
10011095-68 = "（うっ……つまり基本的に私ひとりで、）"
10011095-69 = "（魑魅一座を相手する……？）"
10011095-71 = "ええいっ、それ以上近づくな！"
10011095-76 = "この姫を、投げ落とされたくなかったらな……！"
10011095-80 = "おおっと、白熱してまいりました～！"
10011095-81 = "筋書き通りなんでしょうが、あの発言はＯＫなのでしょうか～？"
10011095-82 = "ああもう、筋書きだとか何だとか、うるさいぞ陰陽部……！"
10011095-84 = "（いやいやいや何もできないじゃん！？イブキちゃんを落とされるわけにはいかないし、私なんかじゃもう無理……！）"
10011095-85 = "（よく考えてみたらここまで来れたのだって、みんなのおかげで……私はただ勢いに任せて、ここまで来ただけ……）"
10011095-86 = "（こんな時に限って、何の役にも立たない……！）"
10011095-87 = "（あんなに大口叩いたのに！正式な部活にって言ったのに！ツクヨに、イズナに、あれだけ励ましてもらったのに……！）"
10011095-90 = "おおっと、どうやらあの挑戦者……何かを悩んでいるようですねぇ？"
10011095-92 = "（ああもう五月蠅いなぁ！？悩むに決まってるじゃん！こんな、一歩間違えたら全部終わりの状況で）"
10011095-93 = "（……足だって震えるし、心臓も破裂しそうだってば！）"
10011095-94 = "（こんなことになって……あんな、電気が消えるだけで怖がってたイブキちゃんも、きっと怖くて震えてるはず……）"
10011095-95 = "忍者の、おねえちゃん？"
10011095-96 = "あ、イブキ……！"
10011095-97 = "やっぱり忍者のおねえちゃんだ！イブキ、ちゃんとおとなしくしてたよ！"
10011095-98 = "って、全然泣いてない……？"
10011095-99 = "？？？"
10011095-100 = "え、いや、誘拐されたんだし、すごく怖かったんじゃないかなーって……"
10011095-101 = "全然そんなこと無いよ！だって――"
10011095-107 = "「何があっても絶対助けに行くって」、約束してくれたから！"
10011095-108 = "……！"
10011095-110 = "私たち、約束したじゃないですか……！「何があっても絶対助けに行く」って！"
10011095-115 = "……っ！"
10011095-118 = "と、止まれ！下手に動いたら、この子の安全は保障しないぞ！？"
10011095-119 = "う、嘘じゃないからな！？それ以上来たら、本当に……！"
10011095-125 = "あっ"
10011095-127 = "[ns] \"イブキ！危ない！\""
10011095-132 = "（間に合ええぇぇぇぇっ！！）"
10011095-133 = "（せぇ、のっ……！）"
10011095-135 = "ミチル流忍法っ！！"
10011095-138 = "捕まえたっ！！"
10011095-139 = "[s] \"ミチル、ナイス！待ってて、すぐに引き上げる！\""
10011095-140 = "あははっ！イブキ捕まっちゃったー！"
10011095-141 = "うん！もう大丈夫、あとは先生殿に引き上げてもらえれば……"
10011095-145 = "……え゛"
10011095-149 = "うぎゃあああっ！？お、落ちる落ちる落ちる！？"
10011095-150 = "イズナちゃん……！！"
10011095-151 = "はい、ツクヨ殿！"
10011095-163 = "ま、間に合いました……！"
10011095-164 = "主殿！お助けいたします！"
10011095-165 = "[s] \"みんな、ありがとう……。\""
10011095-167 = "し、死ぬかと思ったあぁぁぁぁ……！！"
10011095-168 = "あ、イブキ大丈夫！？"
10011095-169 = "うん！忍者のおねえちゃんたち、助けてくれてありがとう！"
10011095-170 = "……良かった。"
10011095-172 = "はい、約束、しましたから……忍者の鉄則、です！"
10011095-173 = "忍術研究部、大勝利ですね！ニンニン！"
10011095-175 = "これは、えっと……。"
10011095-176 = "全部終わりぽいっすね。"
10011095-177 = "くっ、まだだ！このまま失敗に終わるわけには……！"
10011095-179 = "……そこの方々。"
10011095-184 = "イブキを巻き込んだ罪は、重いですよ。"
10011095-186 = "ひいいっ！？"
