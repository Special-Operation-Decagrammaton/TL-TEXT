[translation]
10011095-8 = "I-Izuna, estou exausta..."
10011095-9 = "Eu não sabia que tanques eram coisas tão assustadoras..."
10011095-10 = "Ué, estou tão cansada..."
10011095-15 = "Sensei... por favor, cuide da Ibuki..."
10011095-24 = "[ns] \"...Michiru, você consegue ficar de pé?\""
10011095-25 = "S-sim. De algum jeito..."
10011095-26 = "[s] \"Parece que só restamos nós duas.\""
10011095-27 = "..."
10011095-38 = "Vamos, Mestre Sensei. Para cumprirmos nossa promessa...!"
10011095-45 = "Chegamos! Onde está o chefe do Departamento de Yin-Yang...!?"
10011095-46 = "Onde ele está!?"
10011095-51 = "Nyahaha, bom trabalho~."
10011095-52 = "O quê, uma projeção de vídeo!?"
10011095-53 = "Bem, a apresentação finalmente chegou ao clímax. Quem será que vai rir por último no final de tudo~?"
10011095-58 = "Haa, haa..."
10011095-59 = "Ufa..."
10011095-60 = "Devolva a princesa...!"
10011095-65 = "(Eu disse isso, mas...)"
10011095-66 = "[s] \"Vamos dar o nosso melhor, Michiru.\""
10011095-67 = "(...Espere, não é como se o Mestre Sensei fosse me dar um plano genial ou algo assim!?)"
10011095-68 = "(Ugh... isso significa que, basicamente, eu tenho que lidar com o Grupo Chimi sozinha...?)"
10011095-69 = "(...sozinha...?)"
10011095-71 = "Ei, não chegue mais perto!"
10011095-76 = "Se não quiser que eu jogue esta princesa lá embaixo...!"
10011095-80 = "Opa, as coisas estão ficando intensas~!"
10011095-81 = "Eu sei que está tudo no roteiro, mas será que esse tipo de fala é permitido~?"
10011095-82 = "Ah, chega! Roteiro ou o que quer que seja, cale a boca, Departamento de Yin-Yang...!"
10011095-84 = "(Não, não, não, eu não consigo fazer nada!? Não posso deixar que derrubem a Ibuki-chan, e eu sozinha não vou conseguir...!)"
10011095-85 = "(Pensando bem, eu só cheguei até aqui graças a todo mundo... Eu só vim até aqui levada pelo impulso...)"
10011095-86 = "(Justo em uma hora dessas, eu não sirvo para nada...!)"
10011095-87 = "(E olha que eu falei tanto! Disse que seríamos um clube oficial! Depois de tudo que a Tsukuyo e a Izuna fizeram para me encorajar...!)"
10011095-90 = "Opa, parece que a desafiante... está em dúvida sobre algo, não é?"
10011095-92 = "(Ah, cala a boca já! É claro que estou em dúvida! Em uma situação dessas, onde um passo em falso significa o fim de tudo)"
10011095-93 = "(...minhas pernas estão tremendo e meu coração parece que vai explodir!)"
10011095-94 = "(Com tudo isso acontecendo... a Ibuki-chan, que ficou com medo só porque as luzes apagaram, deve estar tremendo de medo também...)"
10011095-95 = "Irmã ninja?"
10011095-96 = "Ah, Ibuki...!"
10011095-97 = "É a irmã ninja mesmo! A Ibuki ficou quietinha, viu!"
10011095-98 = "Espera, você não está chorando nada...?"
10011095-99 = "???"
10011095-100 = "É que, bem, você foi sequestrada, achei que estivesse morrendo de medo..."
10011095-101 = "Não estou nem um pouco! Porque..."
10011095-107 = "Você prometeu que "não importa o que aconteça, eu vou te salvar"!"
10011095-108 = "...!"
10011095-110 = "Nós prometemos, não prometemos...! Que "não importa o que aconteça, vamos te salvar"!"
10011095-115 = "...!"
10011095-118 = "P-pare! Se fizer qualquer movimento brusco, não garanto a segurança desta criança!?"
10011095-119 = "E-eu não estou mentindo, viu!? Se chegar mais perto, eu juro que..."
10011095-125 = "Ah"
10011095-127 = "[ns] \"Ibuki! Cuidado!\""
10011095-132 = "(Dá tempo, dá tempo, dá tempooooo!!)"
10011095-133 = "(E... já...!)"
10011095-135 = "Arte Ninja estilo Michiru!!"
10011095-138 = "Te peguei!!"
10011095-139 = "[s] \"Michiru, muito bem! Espere aí, vou puxar vocês agora mesmo!\""
10011095-140 = "Ahaha! A Ibuki foi pega!"
10011095-141 = "Sim! Já está tudo bem, agora é só o Sensei nos puxar para cima..."
10011095-145 = "……Ehh?"
10011095-149 = "Ugyaaaaa!? V-vai cair, vai cair, vai cair!?"
10011095-150 = "Izuna-chan……!!"
10011095-151 = "Sim, Tsukuyo-dono!"
10011095-163 = "C-conseguimos a tempo……!"
10011095-164 = "Meu senhor! Vou te ajudar!"
10011095-165 = "[s] \"Obrigado a todos...\""
10011095-167 = "P-pensei que ia morrer aaaaa……!!"
10011095-168 = "Ah, Ibuki, você está bem!?"
10011095-169 = "Sim! Obrigada por me salvarem, irmãs ninjas!"
10011095-170 = "……Que bom."
10011095-172 = "Sim, nós prometemos... é a regra de ouro dos ninjas!"
10011095-173 = "O Clube de Pesquisa de Ninjutsu obteve uma grande vitória! Nin-nin!"
10011095-175 = "Isso é, bem……."
10011095-176 = "Parece que tudo acabou."
10011095-177 = "Droga, ainda não! Não posso deixar terminar em fracasso assim……!"
10011095-179 = "……Vocês aí."
10011095-184 = "O crime de envolver a Ibuki nisso é grave, sabia?"
10011095-186 = "Hiiiiii!?"
