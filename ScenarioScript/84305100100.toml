[translation]
84305100100-6 = "で？どうすりゃいいんだ？"
84305100100-7 = "というと……？"
84305100100-8 = "生体情報が無いと、侵入がややこしくなるんだろ？"
84305100100-9 = "その「ややこしいこと」は何なのかって聞いてんだ。"
84305100100-10 = "認証せずに入る方法は一つ。"
84305100100-11 = "それは一人では不可能よ。必ず二人以上必要になる。"
84305100100-12 = "なら、それはクリアだ。"
84305100100-13 = "あたしとセイアで行けばいい。"
84305100100-14 = "お前に比べりゃ、セイアの方が潜入に向いてるからな。"
84305100100-15 = "いつの間にか、随分と信頼するようになったのね。"
84305100100-16 = "ぺーぺーの新人よりは、一回でも経験のあるアマチュアのほうがいいだろ？"
84305100100-18 = "経験……？私は潜入など……。"
84305100100-19 = "初めて会った時のこと、もう忘れたのか？あれだって立派な「潜入」だろ？"
84305100100-20 = "ネル、それはあまりにもリスクが大きいわ。"
84305100100-21 = "彼女はミレニアムの生徒ではない。トリニティの、それもティーパーティーの一員よ。"
84305100100-22 = "彼女に何かあれば、学園規模で……。"
84305100100-23 = "あーもう。お前が一人で下手打って、それで捕まったらどうすんだ？"
84305100100-24 = "「もし何かあった時」なんて、責任を取れる状況じゃねぇだろ？"
84305100100-25 = "今やってるコレが、何も起こさないためのもんじゃなかったのかよ。 "
84305100100-26 = "違うか？"
84305100100-27 = "それは……。"
84305100100-29 = "……。"
84305100100-30 = "……分かったわ。"
84305100100-31 = "お？なんだ、素直じゃん。"
84305100100-32 = "前よりは話が通じるようになったもんだな。"
84305100100-33 = "……んでだ、セイア。"
84305100100-34 = "なにかな。"
84305100100-35 = "一緒に行くのはいいが、自分のことは自分でなんとかしてもらうからな。"
84305100100-36 = "あたしは「パートナー」が欲しいんだ。"
84305100100-37 = "ふっ……。"
84305100100-38 = "ふふっ。"
84305100100-39 = "ああ、任せてくれ。だが……困った時には連絡させてもらうよ。"
84305100100-40 = "君を信頼してな。"
84305100100-41 = "勝手にしろ。"
84305100100-43 = "話はまとまったかしら。"
84305100100-44 = "……計画を立てましょう。"
