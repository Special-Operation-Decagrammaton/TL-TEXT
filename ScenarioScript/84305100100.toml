[translation]
84305100100-6 = "E então? O que a gente faz?"
84305100100-7 = "Como assim...?"
84305100100-8 = "Sem as informações biométricas, a invasão fica complicada, não é?"
84305100100-9 = "Estou perguntando exatamente o que seria essa 'complicação'."
84305100100-10 = "Só existe um jeito de entrar sem autenticação."
84305100100-11 = "E isso é impossível de fazer sozinha. É necessário pelo menos duas pessoas."
84305100100-12 = "Então, esse problema está resolvido."
84305100100-13 = "Eu e a Seia vamos."
84305100100-14 = "Comparada a você, a Seia é mais adequada para uma infiltração."
84305100100-15 = "Você passou a confiar bastante nela sem eu perceber, hein?"
84305100100-16 = "É melhor ter uma amadora com alguma experiência do que uma novata qualquer, não é?"
84305100100-18 = "Experiência...? Eu nunca fiz uma infiltração..."
84305100100-19 = "Já esqueceu da primeira vez que nos conhecemos? Aquilo foi uma bela de uma 'infiltração', não foi?"
84305100100-20 = "Neru, isso é um risco grande demais."
84305100100-21 = "Ela não é uma aluna do Millennium. Ela é da Trinity, e ainda por cima, um membro do Chá das Cinco."
84305100100-22 = "Se algo acontecer com ela, o problema vai ser em escala escolar..."
84305100100-23 = "Ah, qual é. E se você for sozinha, fizer besteira e acabar sendo pega?"
84305100100-24 = "Não vai ter como assumir a responsabilidade se 'algo acontecer', vai?"
84305100100-25 = "O que estamos fazendo agora não era justamente para evitar que algo acontecesse?"
84305100100-26 = "Ou estou errada?"
84305100100-27 = "Isso é..."
84305100100-29 = "..."
84305100100-30 = "...Entendido."
84305100100-31 = "Oh? Que surpresa, você foi dócil."
84305100100-32 = "Você está bem mais fácil de lidar do que antes."
84305100100-33 = "...Então, Seia."
84305100100-34 = "Sim?"
84305100100-35 = "Tudo bem irmos juntas, mas saiba que você vai ter que se virar sozinha."
84305100100-36 = "Eu preciso de uma 'parceira'."
84305100100-37 = "Hum..."
84305100100-38 = "Hehe."
84305100100-39 = "Ah, pode deixar. Mas... se eu estiver em apuros, vou entrar em contato."
84305100100-40 = "Confio em você."
84305100100-41 = "Faça o que quiser."
84305100100-43 = "Parece que chegaram a um acordo."
84305100100-44 = "...Vamos planejar."
