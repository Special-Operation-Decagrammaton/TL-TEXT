[translation]
10009030-1 = "第3話;襲撃その三"
10009030-5 = "おい、災厄の狐。お昼だ。"
10009030-6 = "たらふく食っておけ。これを食べればきっと、何を企んでいるのか全部話したくなるだろうからな。"
10009030-7 = "なるほど、つまり私が白状するはずだと？"
10009030-8 = "ああ、これは我々ヴァルキューレ警察学校の中でも一級品。とんでもない効果を持った親子丼だからな！"
10009030-9 = "ふふっ……♡黙秘権をと言ったそばから、そのような物が出てくるとは……なかなか本気のようですね？"
10009030-10 = "どれほど強い自白剤が入ってるのか、逆に楽しみではありますが……"
10009030-11 = "いや、そんな物は無い。ただ純粋にものすっごく美味しいから、そうなるだろうってだけだ。"
10009030-12 = "……そうですか。"
10009030-15 = "（元気良くセナと一緒に、パトロールを再開していた頃……）"
10009030-21 = "先生、ワカモが……！"
10009030-22 = "[s] \"まさかとは思うけど……。\""
10009030-28 = "[ns] \"……またかー。\""
10009030-29 = "ふふふっ……♡さあ、私からは逃げられませんよ！"
