[translation]
10009030-1 = "Episódio 3; Ataque, Parte 3"
10009030-5 = "Ei, raposa do desastre. É hora do almoço."
10009030-6 = "Coma até se fartar. Depois de comer isso, tenho certeza de que vai querer contar tudo o que está planejando."
10009030-7 = "Entendo, então você acha que eu vou confessar?"
10009030-8 = "Sim, este é um prato de primeira classe aqui na Academia de Polícia Valkyrie. É um Oyakodon com um efeito incrível!"
10009030-9 = "Fufu...♡ Logo depois de eu mencionar meu direito ao silêncio, você me traz algo assim... Parece que você está falando sério, não é?"
10009030-10 = "Estou até curiosa para saber que tipo de soro da verdade potente tem aí dentro..."
10009030-11 = "Não, não tem nada disso. É só que é genuinamente delicioso, então achei que aconteceria naturalmente."
10009030-12 = "...É mesmo?"
10009030-15 = "(Na época em que eu estava patrulhando alegremente com a Sena...)"
10009030-21 = "Sensei, a Wakamo está...!"
10009030-22 = "[s] \"Não acredito que isso está acontecendo...\""
10009030-28 = "[ns] \"...De novo, não.\""
10009030-29 = "Fufufu...♡ Vamos lá, você não pode escapar de mim!"
