[translation]
1006102-1 = "uma pessoa que é facilmente mal compreendida"

1006102-5 = "(Eu estava curioso sobre o conteúdo do Momotalk, então visitei a catedral no meu tempo livre.)"

1006102-9 = "(Talvez porque seja um horário relativamente vazio, não há muitas pessoas por perto e Sakurako orando pode ser vista à distância.)"

1006102-10 = "……."

1006102-11 = "[s1] Espere alguém terminar de orar por perto. \n[s2] Orem juntos ao meu lado."

1006102-19 = "……"
1006102-24 = "...?"

1006102-29 = "...! ? #n-sensei, desde quando você veio aqui...!"

1006102-30 = "[s3] \"Desculpe por interromper você.\"\n[s4] \"Eu não queria te assustar...\""

1006102-31 = "……い、いえ大丈夫です。ちょうど祈りを終えたところです。"
1006102-32 = "……い、いえ大丈夫です。ちょうど祈りを終えたところです。"
1006102-33 = "O que aconteceu em vez disso?"

1006102-34 = "Durante este período, especialmente eventos..."

1006102-35 = "--foto?"

1006102-36 = "Porque eu liguei para você...?"

1006102-37 = "Hum, isso... eu realmente não me lembro..."

1006102-38 = "Momo conversa...?"

1006102-42 = "[ns5] \"Você disse que queria uma chance de conversar...\"\n[ns6] Vou te mostrar o Momo Talk."

1006102-46 = "Ah... entendo..."

1006102-50 = "isso é……"

1006102-51 = "O que você diz..."

1006102-52 = "Realmente não tinha nenhum significado profundo... era apenas uma saudação."

1006102-53 = "...É verdade."

1006102-54 = "... Haa."

1006102-55 = "Além disso, posso ter causado um mal-entendido... #nSinto muito, Sensei."

1006102-56 = "[s7] \"Está tudo bem, não se preocupe.\"\n[s8] \"O que você quer dizer com \"de novo\"...? \""

1006102-59 = "Na verdade, muitas vezes sou incompreendido por aqueles que me rodeiam..."

1006102-60 = "Acho que você poderia dizer que há momentos em que acho que tenho uma personalidade difícil..."

1006102-61 = "Afinal... estou em condições de administrar todas as Irmãs, então talvez me sinta um pouco distante dela."

1006102-62 = "Tenho tentado melhorar e receber conselhos, mas não funciona..."

1006102-63 = "Ah, claro, todo mundo tem bom coração, então eles tentam entender esse meu lado. #nEla estava disposta a me dar conselhos."

1006102-64 = "O Momotalk que enviei para você desta vez também incorporou conselhos de outras irmãs..."

1006102-65 = "Ouvi dizer que “colocar um sorriso antes e depois de uma mensagem torna mais fácil se sentir mais amigável”..."

1006102-66 = "[s9] \"Entendo...\"\n[s10] \"E eu pensei, \"Ufufu\"... \""

1006102-69 = "Estou um pouco...preocupado. #nNão me importo se for uma questão pessoal, mas sou Irmã da Catedral da Trindade."

1006102-70 = "Como uma irmã que ouve as preocupações das pessoas, não é muito desejável deixar a outra pessoa preocupada."

1006102-71 = "先生とお話をしたいとお伝えしたのも、実はこのことをご相談したかったのです。"
1006102-76 = "Desculpe, a história ficou longa. #nMais detalhes virão mais tarde..."

1006102-77 = "Pedimos desculpas pelo inconveniente. #nSe você não se importa, por favor, deixe-me acompanhá-lo."

1006102-81 = "Por favor, venha aqui."

1006102-87 = "Estacione em frente à Catedral da Trindade"

1006102-88 = "Então aqui estou eu..."

1006102-89 = "Embora tenha sido pouco tempo hoje, fiquei feliz em poder falar com você."

1006102-90 = "...Hehe."

1006102-91 = "Então, por favor, tome cuidado onde você pisa."

1006102-99 = "Ah, irmã Sakurako!"

1006102-100 = "como vai. O tempo está bom hoje, não está?"

1006102-102 = "Olá, irmãs."

1006102-103 = "Está um tempo bom, hehe..."

1006102-104 = "Espero que todos tenham um dia tranquilo hoje."

1006102-109 = "Estarei sempre cuidando de todos vocês nos bastidores..."

1006102-115 = "Tenha um bom dia. Hehehe."

1006102-119 = "Ei, ei...! Ah, sim...!"

1006102-120 = "Tenha um bom dia hoje também! #nUau, isso é tudo para nós!"

1006102-125 = "Ah, se você entrar em pânico assim, você vai se machucar..."

1006102-129 = "[ns11] \"Então eu ri...\"\n[ns12] \"Entendo...isso é...\""

1006102-132 = "...? #nO que aconteceu?"

1006102-133 = "Não é nada, certo?"

1006102-134 = "Isso seria bom, mas...."

1006102-135 = "Agora, por favor, me desculpe por isso."

1006102-140 = "(Depois de ver Sakurako sair com o véu tremulando ao vento, ela voltou para a placa de Petri)"

