[translation]
1006102-1 = "誤解されやすい人"
1006102-5 = "（モモトークの内容が気になったので、空き時間に大聖堂を訪れた）"
1006102-9 = "（比較的空いている時間帯だからか人影はなく、祈りを捧げるサクラコが遠くに見える）"
1006102-10 = "……。"
1006102-11 = "[s1] 近くで祈りを終えるのを待つ。\n[s2] 隣で一緒に祈りを捧げる。"
1006102-19 = "……"
1006102-24 = "……？"
1006102-29 = "……っ！？#n先生、いつからこちらに……！"
1006102-30 = "[s3] \"邪魔しちゃってごめんね。\"\n[s4] \"驚かせるつもりはなかったんだけど……\""
1006102-31 = "……い、いえ大丈夫です。ちょうど祈りを終えたところです。"
1006102-32 = "……い、いえ大丈夫です。ちょうど祈りを終えたところです。"
1006102-33 = "それより、どうかされましたか？"
1006102-34 = "この時間は、特に催し物などは――"
1006102-35 = "――え？"
1006102-36 = "私に呼ばれたから……？"
1006102-37 = "えっと、その……あまり心当たりが……"
1006102-38 = "モモトーク……？"
1006102-42 = "[ns5] \"お話する機会が欲しいと言ってたから……\"\n[ns6] モモトークを見せる。"
1006102-46 = "あっ……なるほど……"
1006102-50 = "これは……"
1006102-51 = "その、何と言いますか……"
1006102-52 = "本当に、深い意味はなくて……ただの挨拶のつもりだったのです。"
1006102-53 = "……本当なんです。"
1006102-54 = "……はぁ。"
1006102-55 = "また、誤解を招いてしまったかもしれません……#n申し訳ありません、先生。"
1006102-56 = "[s7] \"大丈夫、気にしないで。\"\n[s8] \"「また」って……？\""
1006102-59 = "その……実は、周囲の方に誤解されてしまう事が多くて……。"
1006102-60 = "その、私のことを気難しい性格だと思っている節があるといいますか……。"
1006102-61 = "やはり……シスター全体を管理する立場ですから、#n距離を感じてしまうのでしょうか。"
1006102-62 = "改善しようと、アドバイスも頂いたりもするのですが、うまくいかず……"
1006102-63 = "あ、もちろん、皆様心優しい方ばかりですので、私のこういった一面も理解しようとしてくださります。#n進んでアドバイスも下さるくらいに。"
1006102-64 = "今回先生にお送りしたモモトークも、他のシスターからいただいたアドバイスを取り入れてみたりもして……。"
1006102-65 = "「メッセージの前後に笑いを入れると親しみを感じやすい」と聞いたので……。"
1006102-66 = "[s9] \"なるほど……\"\n[s10] \"それで「うふふ」と……。\""
1006102-69 = "少し……心配なのです。#n個人の問題ならいいのですが、私はトリニティ大聖堂のシスターですので。"
1006102-70 = "人々の悩みを聞くシスターとして、#n相手に気を遣わせてしまうのはあまり望ましくありません。"
1006102-71 = "先生とお話をしたいとお伝えしたのも、実はこのことをご相談したかったのです。"
1006102-76 = "すみません、話が長くなってしまいましたね。#n詳しい内容はまた後日……"
1006102-77 = "ご心配をおかけして申し訳ありません。#nもしよろしければ、お見送りさせてください。"
1006102-81 = "どうぞこちらへ。"
1006102-87 = "トリニティ大聖堂前の公園"
1006102-88 = "では、私はこれにて……"
1006102-89 = "本日は、短い時間でしたがお話ができて嬉しかったです。"
1006102-90 = "……ふふっ。"
1006102-91 = "ではお足元にお気をつけて――"
1006102-99 = "あっ、シスターサクラコ様！"
1006102-100 = "ごきげんよう。今日もいい天気ですね。"
1006102-102 = "あら、シスターの皆様。"
1006102-103 = "いいお天気ですね、ふふっ……"
1006102-104 = "今日も皆様の一日が、平和でありますよう。"
1006102-109 = "いつも、皆様を陰ながら見守っておりますよ……。"
1006102-115 = "それでは、よい一日を。うふふっ。"
1006102-119 = "ひ、ヒッ……！は、はい……！"
1006102-120 = "今日も良い一日を……！#nわ、私たちはこれで――！"
1006102-125 = "あら、そんなに慌てると怪我をしてしまいます……。"
1006102-129 = "[ns11] \"そこで「笑う」と……\"\n[ns12] \"なるほど……これは……。\""
1006102-132 = "……？#nどうされました？"
1006102-133 = "なんでもない、ですか？"
1006102-134 = "それなら良いのですが……。"
1006102-135 = "では、これにて失礼致します。"
1006102-140 = "（ベールを風になびかせて去っていくサクラコを見届けて、シャーレに帰った）"
