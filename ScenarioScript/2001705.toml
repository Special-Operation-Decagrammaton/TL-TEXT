[translation]
2001705-1 = "Ainda assim, a garota quer saber"
2001705-2 = "（Como Hiyori estava muito deprimida, decidi presenteá-la com a edição mais recente da \"ron-ro\"）"
2001705-3 = "Sim, muito obrigado pela compra!"
2001705-5 = "[ns] Vou até as ruínas onde Hiyori está morando atualmente."
2001705-8 = "Um hotel fechado há muito tempo"
2001705-9 = "[ns1] （Deveria ser aqui, mas...）\n[ns2] （Não tem sinal de ninguém?）"
2001705-10 = "……Ugh."
2001705-11 = "……Ugh."
2001705-12 = "[s3]（Um gemido...?）\n[s4]（A voz da Hiyori!?）"
2001705-13 = "Ugh... ugh... dói..."
2001705-14 = "Ugh... ugh... dói..."
2001705-15 = "[s] Vou em direção ao subsolo de onde o som vem."
2001705-24 = "（Hiyori estava caída no canto do porão.）"
2001705-25 = "[ns] \"Hiyori, o que aconteceu!?\""
2001705-26 = "Se-Sensei...? Po-por que você..."
2001705-27 = "Já, já era para mim... minha barriga... ugh... ugh..."
2001705-28 = "[ns] \"Vamos para o hospital! Segure-se em mim!\""
2001705-30 = "（Levei Hiyori às pressas para o hospital mais próximo.）"
2001705-32 = "……Não é nada grave. Ela só teve uma indisposição estomacal. Por precaução, se ela ficar internada e descansar por uns dois ou três dias, ficará bem."
2001705-33 = "[s] \"Entendido... muito obrigado.\""
2001705-34 = "Além disso... parece que ela está com uma deficiência nutricional geral. Por favor, tente prestar mais atenção na alimentação dela."
2001705-35 = "[s] \"…….\""
2001705-37 = "Sensei……."
2001705-38 = "[s] \"Fique em repouso. Você precisa descansar um pouco mais.\""
2001705-39 = "Ugh... desculpe... acabei causando problemas para você de novo..."
2001705-40 = "Então a água da torneira daquelas ruínas realmente não era boa..."
2001705-41 = "Ainda bem que percebi antes... se eu tivesse levado para os outros, teria causado problemas para eles também..."
2001705-42 = "[s] \"Por que você estava bebendo a água das ruínas...?\""
2001705-43 = "Quando eu estava no Distrito Autônomo de Arius, eu bebia a água de lá do mesmo jeito... e nunca aconteceu nada..."
2001705-44 = "Parece que seu corpo ainda não se acostumou com a água de outras regiões..."
2001705-45 = "[s] \"Acho que o problema não é esse...?\""
2001705-46 = "Hehehe... é, deve ser um castigo por todas as coisas ruins que fiz..."
2001705-47 = "Mas..."
2001705-48 = "Todos devem estar preocupados..."
2001705-50 = "Preciso voltar logo..."
2001705-52 = "[s] \"Nada disso, fique deitada mais um pouco.\""
2001705-53 = "Mas..."
2001705-54 = "[s] \"Eu até comprei uma revista para você.\""
2001705-55 = "Re-revista!? Po-por acaso é a edição mais recente com o artigo especial desta vez!?"
2001705-56 = "Ce-ceder a uma isca tão doce assim..."
2001705-57 = "Já era... não tenho escolha a não ser obedecer a tudo o que o Sensei disser... entendi..."
2001705-62 = "Sensei... estou com medo. Por isso... hum... você poderia ficar aqui comigo?"
2001705-63 = "[s5] \"Sim. Vou ficar aqui, então descanse um pouco.\"\n[s6] \"Claro, vou ficar aqui com você o tempo todo.\""
2001705-64 = "Muito obrigada..."
2001705-65 = "Muito obrigada..."
2001705-67 = "（Decidi ficar ao lado de Hiyori durante toda a noite.）"
2001705-69 = "（Quando acordei, Hiyori não estava mais na cama.）"
2001705-70 = "[ns] \"Hiyori...?\""
2001705-72 = "[ns] \"Não me diga que, naquele estado...?\""
2001705-73 = "Waaaaaahhh!!"
2001705-74 = "Sensei... acabou! Está tudo completamente acabado!"
2001705-75 = "Olhe para esta revista! O umbigo das pessoas normais é assim! Mas o meu... o meu...!!"
2001705-78 = "[wa:1000]— Po, [wa:900]por favor, olhe, Sensei,"
2001705-80 = "— O meu [wa:800]aqui..."
2001705-83 = "[wa:700]— É, [wa:1100]no fim das contas, [wa:500]é estranho, não é?"
2001705-85 = "— É diferente de todo mundo, não é!?"
2001705-88 = "[wa:100]— Eu já [wa:600]achava que talvez,"
2001705-90 = "[wa:50]— fosse estranho [wa:700]há algum tempo, [wa:700]mas..."
2001705-93 = "[wa:200]— Então, [wa:1100]era verdade mesmo...!"
2001705-96 = "[wa:1300]— Se, [wa:1000]Sensei?"
2001705-98 = "[wa:150]— Por que você está [wa:1400] desviando o olhar...?"
2001705-101 = "[wa:250]— Não me diga..."
2001705-103 = "— É, [wa:800]tão estranho que você [wa:1200]nem consegue olhar direito!?"
2001705-106 = "[wa:2500]— É assim mesmo, então..."
2001705-108 = "— Talvez [wa:900]não haja mais sentido [wa:900]em viver."
2001705-111 = "— Por que a vida é, [wa:1500]tão..."
2001705-114 = "— Assim como o meu umbigo, que [wa:1400]ninguém consegue encarar,"
2001705-116 = "— Grotesca..."
2001705-119 = "[wa:1400]— Se, [wa:800]Sensei..."
2001705-121 = "— Pelo menos [wa:800]diga alguma coisa..."
2001705-124 = "[wa:450]— Diga que, mesmo com esse corpo, está tudo bem ou que [wa:1300]pode ser útil,"
2001705-126 = "— Você precisa [wa:600]me dizer algo..."
2001705-129 = "[ns] \"Acalme-se um pouco! Você vai pegar um resfriado, cubra a barriga!\""
2001705-131 = "Então era isso que significava \"conhecimento secreto que a escola nunca te ensina\"... Dizem que o umbigo de pessoas com um charme especial é assim..."
2001705-132 = "[s] \"...\""
2001705-133 = "Até o meu umbigo é estranho... Eu realmente estou acabada. Se fosse para chegar a esse ponto, era melhor eu não ter descoberto nada desde o início..."
2001705-134 = "[s] \"Hiyori...\""
2001705-135 = "Sim... o que foi, Sensei?"
2001705-136 = "[s] \"Vou confiscar a revista.\""
2001705-137 = "Hã!? Po, por quê? Por que isso!?"
2001705-138 = "Ah, não pode! Sensei, eu ainda não terminei de ler! Uaaaaaaah!"
