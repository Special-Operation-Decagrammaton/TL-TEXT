[translation]
2001705-1 = "少女はそれでも知っていたい"
2001705-2 = "（ヒヨリがだいぶ落ち込んでいたので、「ron-ro」の最新号をプレゼントすることにした）"
2001705-3 = "はい、お買い上げありがとうございます！"
2001705-5 = "[ns] ヒヨリが今過ごしている廃墟に行ってみる。"
2001705-8 = "ずっと前に閉鎖されたホテル"
2001705-9 = "[ns1] （ここだったはずだけど……）\n[ns2] （人の気配が無い？）"
2001705-10 = "……うぅ。"
2001705-11 = "……うぅ。"
2001705-12 = "[s3]（うめき声が……？）\n[s4]（ヒヨリの声！？）"
2001705-13 = "くう……う……痛い……。"
2001705-14 = "くう……う……痛い……。"
2001705-15 = "[s] 声が聞こえる地下に向かう。"
2001705-24 = "（地下室の隅にヒヨリが倒れていた。）"
2001705-25 = "[ns] \"ヒヨリ、どうしたの！？\""
2001705-26 = "せ、先生……？ど、どうして……。"
2001705-27 = "も、もうダメです……お腹が……うぅ……う……。"
2001705-28 = "[ns] \"病院に行くよ！つかまって！\""
2001705-30 = "（ヒヨリを抱えて近くの病院に駆け込んだ。）"
2001705-32 = "……大きな病気ではないですね。お腹を壊しただけです。念のため入院して2、3日ほど安静にすれば大丈夫でしょう。"
2001705-33 = "[s] \"はい……ありがとうございます。"
2001705-34 = "後はそうですね……全体的に栄養が足りてないように見えます。もっと食事に気を遣ってあげてください。"
2001705-35 = "[s] \"……。\""
2001705-37 = "先生……。"
2001705-38 = "[s] \"安静にしてて。もう少しゆっくり休まないと。\""
2001705-39 = "うぅ……ごめんなさい……またご迷惑をおかけしてしまいました……。"
2001705-40 = "やはりあの廃墟の水道水、ダメでしたか……。"
2001705-41 = "先に気づけて良かったです……そのまま持って行ってたら他の人にも迷惑をかけてしまったでしょうから……。"
2001705-42 = "[s] \"どうして廃墟の水を……。\""
2001705-43 = "以前アリウス自治区にいた時は、その辺の水を同じように飲んでて……その時は何ともなかったんです……"
2001705-44 = "違う地域の水に、まだ身体が慣れてないみたいですね……。"
2001705-45 = "[s] \"そういう問題じゃないと思うよ……？\""
2001705-46 = "えへへ……やっぱり、あれこれ悪い事した罰ですね、これは……。"
2001705-47 = "でも……"
2001705-48 = "みんな心配しているでしょうし……"
2001705-50 = "もう帰らないと……。"
2001705-52 = "[s] \"ダメ、もう少し横になってて。\""
2001705-53 = "でも……。"
2001705-54 = "[s] \"ヒヨリのために雑誌も買ってあるから。\""
2001705-55 = "ざ、雑誌ですか！？も、もしかして今回の特集記事が載っている最新号！？"
2001705-56 = "そ、そんな甘い餌で私を……。"
2001705-57 = "終わりです……もう、先生の言うことを全て聞くしかないですね……わかりました……。"
2001705-62 = "先生……私、不安です。だから……あの……そばにいてくれませんか？"
2001705-63 = "[s5] \"うん。そばにいるから、ゆっくりお休み。\"\n[s6] \"もちろん、ずっとそばにいるよ。\""
2001705-64 = "ありがとうございます……。"
2001705-65 = "ありがとうございます……。"
2001705-67 = "（ヒヨリのそばに一晩中付き添うことにした。）"
2001705-69 = "（目が覚めたとき、ベッドにヒヨリの姿はなかった。）"
2001705-70 = "[ns] \"ヒヨリ……？\""
2001705-72 = "[ns] \"まさかその体で……？\""
2001705-73 = "うわあああんー！！"
2001705-74 = "先生……終わりです！もう完全に終わりなんです！"
2001705-75 = "見てくださいこの雑誌！普通の人のおへそはこうなんですよ！なのに私は……私は……！！"
2001705-78 = "[wa:1000]― み、[wa:900]見てください先生、"
2001705-80 = "― 私の[wa:800]ここ……"
2001705-83 = "[wa:700]― や、[wa:1100]やっぱり[wa:500]変ですよね？"
2001705-85 = "― みんなと違うんですよね！？"
2001705-88 = "[wa:100]― もしかして[wa:600]変なのではと、"
2001705-90 = "[wa:50]― 前から[wa:700]思っては[wa:700]いましたが……"
2001705-93 = "[wa:200]― やっぱり、[wa:1100]そうだったんですね……！"
2001705-96 = "[wa:1300]― せ、[wa:1000]先生？"
2001705-98 = "[wa:150]― どうしてさっきから、[wa:1400]視線を……？"
2001705-101 = "[wa:250]― まさか……"
2001705-103 = "― ま、[wa:800]まともに見られないぐらい[wa:1200]変なんですか！？"
2001705-106 = "[wa:2500]― そうなんですね……"
2001705-108 = "― もう[wa:900]生きていく意味も[wa:900]無いかもしれません"
2001705-111 = "― どうして人生は、[wa:1500]こう……"
2001705-114 = "― まるで[wa:1400]直視できない私のここみたいに、"
2001705-116 = "― グロテスクで……。"
2001705-119 = "[wa:1400]― せ、[wa:800]先生……"
2001705-121 = "― せめて[wa:800]何か感想を……"
2001705-124 = "[wa:450]― こんな身体でも、良いとか[wa:1300]役立ちそうとか、"
2001705-126 = "― 何か[wa:600]言っていただけないと……。"
2001705-129 = "[ns] \"一旦落ち着いて！冷えちゃうからお腹を隠して！\""
2001705-131 = "「学校では絶対に教えてくれないマル秘知識」って、そういうことだったんですね……特別な魅力を持った人のおへそはこうなんだそうです……。"
2001705-132 = "[s] \"……。\""
2001705-133 = "私はおへそさえもおかしいんです……私は本当に終わりなんです。こんな事になるくらいなら、最初から何も知らなければよかった……。"
2001705-134 = "[s] \"ヒヨリ……。\""
2001705-135 = "はい……なんでしょうか、先生。"
2001705-136 = "[s] \"雑誌は没収ね。\""
2001705-137 = "え！？ど、どうして？なんでですか！？"
2001705-138 = "あ、ダメです！先生、まだ読み終わってないんですよ！うわぁぁぁぁぁぁぁん！"
