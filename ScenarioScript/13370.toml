[translation]
13370-1 = "Episódio 37; O que precisa ser dito"
13370-6 = "……Hoshino-senpai."
13370-11 = "O que será que a Yume-senpai tentou dizer no final?"
13370-12 = "O que será que estava escrito no caderno?"
13370-13 = "……Não haverá outra oportunidade de saber."
13370-14 = "Mesmo sabendo disso, não consigo desistir."
13370-15 = "Mas, esse sofrimento é……."
13370-16 = "Não, esse sofrimento é, na verdade……."
13370-17 = "O 'pecado' que me foi dado."
13370-18 = "Não é bem assim, senpai."
13370-19 = "Você não está arrependida por não ter encontrado o caderno, e sim……."
13370-20 = "Porque você não conseguiu expressar seus sentimentos para a presidente Yume……."
13370-21 = "É por isso que você ainda sofre, não é?"
13370-24 = "Se eu soubesse que aquele era o fim……."
13370-25 = "……Não. Independentemente disso, eu deveria ter expressado meus sentimentos desde sempre."
13370-26 = "Ninguém imagina que, de repente, não poderá mais ver a pessoa……."
13370-29 = "Aquilo foi um acidente, senpai."
13370-31 = "Mesmo assim, aceitar é outra história."
13370-32 = "Não é culpa sua, senpai."
13370-34 = "Minha mente entende…… mas meu coração não aceita."
13370-35 = "Eu estava errada."
13370-36 = "Se a Hoshino-senpai não estivesse lá……."
13370-37 = "Naquele dia, eu deveria ter morrido."
13370-38 = "……Mas, como a senpai me deu aquele cachecol."
13370-40 = "A Yume-senpai disse para eu fazer isso……."
13370-41 = "Hmm. Então, preciso agradecer à Yume-senpai também."
13370-43 = "……."
13370-47 = "Nós sofremos e morremos sem sentido. #nAcho que esse é o nosso destino."
13370-48 = "Porque, se a 'morte' tem algum significado――"
13370-49 = "Que significado existe no fato de a senpai ter morrido daquele jeito?"
13370-50 = "Hoshino-senpai……."
13370-52 = "A Yume-senpai se perdeu no deserto e exauriu suas forças."
13370-53 = "Sem água, sem bússola, sem comunicador. #nNaquele dia, o tempo estava tão ruim que não dava para ver uma estrela sequer."
13370-54 = "Se pelo menos o celular dela fosse mais moderno…… #nTalvez eu pudesse ter recebido as palavras da senpai…… #nTalvez pudéssemos tê-la encontrado mais cedo."
13370-55 = "Mas a senpai deixou para trocar de aparelho depois, dizendo que precisava pagar as dívidas……."
13370-56 = "Se eu…… tivesse conversado com ela de forma mais adequada……."
13370-57 = "Hoshino-senpai!"
13370-59 = "……."
13370-60 = "Talvez não seja o meu lugar #nme meter nos assuntos entre a Hoshino-senpai e a presidente Yume."
13370-61 = "Mas, se você continuar se torturando assim, a senpai……."
13370-63 = "……A torneira da escola."
13370-64 = "Foi você quem consertou, Ayane-chan, não foi?"
13370-65 = "Eh……?"
13370-67 = "Obrigada. #nNa verdade, eu pretendia dizer isso há muito mais tempo."
13370-68 = "……Hoshino-senpai."
13370-70 = "……."
13370-71 = "Ufa…… desculpe, não consigo colocar em palavras."
13370-72 = "……Volte logo, sua boba!"
13370-73 = "E aí, vamos comer lámen juntas de novo!"
13370-74 = "Se você voltar, eu vou virar idol junto com a Ayane-chan!"
13370-76 = "……Serika-chan."
13370-77 = "Como eu pensava, a Serika-chan é tão fofa~."
13370-78 = "Ei, ei, o que foi!?"
13370-80 = "…………."
13370-81 = "――Pronto, já chega."
13370-82 = "O passado deve permanecer como passado――deixe-o como está."
13370-84 = "Shiroko-chan...?"
13370-85 = "Valorize o futuro... um futuro onde cada vez mais alunas, como a Serika e a Ayane, não a conheçam."
13370-86 = "Não é algo ruim que as alunas que não a conheceram possam sorrir agora."
13370-87 = "Por isso..."
13370-88 = "Em vez de ficar presa à morte, vamos levar as memórias para o futuro."
13370-89 = "A senpai sabe melhor do que ninguém como a presidente do conselho estudantil era, não sabe?"
13370-90 = "Então, por favor, solte essa mão."
13370-97 = "……Obrigada."
13370-98 = "Eu não te conheço muito bem, mas... eu entendo."
13370-99 = "……Você não quer que eu repita os mesmos erros, não é?"
13370-100 = "A Shiroko-chan é tão gentil."
13370-101 = "……Além disso."
13370-102 = "――Você também não consegue deixar ir, consegue?"
13370-103 = "……!"
13370-107 = "……As armas que todos usavam."
13370-108 = "Você ainda as carrega, não é?"
13370-109 = "Eu..."
13370-111 = "Você consegue descartá-las?"
13370-112 = "Enquanto as memórias desaparecem aos poucos, você consegue abrir mão até das lembranças?"
13370-113 = "……."
13370-114 = "…………."
13370-115 = "Eu não sei."
13370-116 = "……Será que eu consigo?"
13370-117 = "Será que nós..."
13370-118 = "Conseguiremos escapar do 'pecado'... da 'tristeza'... do 'sofrimento'?"
13370-119 = "……Com certeza, acho que é tão difícil quanto trazer alguém que morreu de volta à vida."
13370-120 = "……."
13370-125 = "Está completo!"
13370-126 = "Finalmente, a 'Fúria de Set' se manifesta!"
13370-127 = "Ooooooh, fúria do trovão...!"
13370-128 = "Queime a terra até não sobrar nada――!!"
13370-132 = "Sensei, cuidado!"
13370-133 = "Uma reação de energia gigantesca...!"
13370-137 = "……."
13370-138 = "Eu..."
13370-139 = "……Não consigo."
13370-143 = "O que a senpai deixou para trás no fim."
13370-144 = "Eu preciso confirmar o que aquilo significa."
13370-148 = "Se não, eu..."
13370-156 = "Desvie, Sensei!"
13370-157 = "Eu não consigo bloquear esse ataque agora!"
13370-158 = "A-alunas, vocês também...!"
13370-159 = "Uwaaaaaaah!?"
13370-163 = "[ns] \"O que você acha que está escrito no caderno da Hoshino?\""
13370-164 = "Não sei. #nPor isso, para descobrir...—"
13370-165 = "[s] \"Sim. Porque ninguém sabe a resposta para isso.\""
13370-166 = "……."
13370-167 = "[s] \"Mesmo assim, você acredita, não é?\""
13370-168 = "……Que tipo de palavras a Senpai Yume teria deixado para trás?"
13370-169 = "[s] \"A pessoa que melhor a conhece é a Hoshino, certo?\""
13370-170 = "……."
13370-171 = "[ns1] \"Então, certamente...\"\n[ns2] \"As palavras em que a Hoshino acredita devem estar lá.\""
13370-174 = "[ns3] \"Os fatos podem ser incertos.\"\n[ns4] \"Mas a verdade está lá.\""
13370-177 = "[ns] \"Mesmo que não exista, isso não muda o fato de que é a verdade.\""
13370-179 = "[ns] \"Essa é a única escolha que podemos fazer.\""
13370-181 = "[ns5] \"Não podemos reverter a morte, nem o tempo...\"\n[ns6] \"Para nós, que somos comuns...\""
13370-184 = "[ns7] \"É o único... milagre.\"\n[ns8] É o único... milagre."
13370-192 = "……."
13370-193 = "Onde é... aqui?"
13370-194 = "……Hm?"
13370-199 = "……Um caderno?"
13370-200 = "Ah."
13370-201 = "Po-por que!"
13370-204 = "Po-por que! #n……Por que isso está aqui!?"
13370-208 = "Hoshino-chan, como você está?"
13370-217 = "Hehehe. Como será que a Hoshino-chan cresceu agora que está no terceiro ano?"
13370-222 = "Próximo episódio; Promessa"
