[translation]
13370-1 = "第37話;伝えなければならないこと"
13370-6 = "……ホシノ先輩。"
13370-11 = "ユメ先輩は、最後になんて言おうとしたんだろう。"
13370-12 = "手帳には、何が書いてあったんだろう。"
13370-13 = "……もう、二度と知る機会は訪れない。"
13370-14 = "分かっていても、諦められない。"
13370-15 = "けど、この苦しみは……。"
13370-16 = "ううん、この苦しみこそ……。"
13370-17 = "私に与えられた「罪」。"
13370-18 = "違いますよね、先輩。"
13370-19 = "手帳を見つけられなかったから後悔しているんじゃなくて……。"
13370-20 = "ユメ会長に気持ちを伝えられなかったから……。"
13370-21 = "だから、今も苦しんでいるんですよね？"
13370-24 = "アレが最後だと分かっていたら……。"
13370-25 = "……違う。そんなの関係なく、普段から気持ちを伝えておくべきだったんだ。"
13370-26 = "急に会えなくなるだなんて……誰も、思いもしませんから。"
13370-29 = "あれは事故だよ、先輩。"
13370-31 = "だとしても、受け入れられるかどうかは別。"
13370-32 = "先輩のせいじゃない。"
13370-34 = "頭では理解してる……けど、納得はできないんだ。"
13370-35 = "私が間違ってた。"
13370-36 = "ホシノ先輩がいなかったら……。"
13370-37 = "あの日、私は死んでいたはず。"
13370-38 = "……でも、先輩がマフラーをくれたから。"
13370-40 = "ユメ先輩が、そうしろって……。"
13370-41 = "ん。なら、ユメ先輩にもお礼を言わないと。"
13370-43 = "……。"
13370-47 = "私たちは、苦しんで、意味もなく死んでいく。#nそういう定めにあるんだろうね。"
13370-48 = "だって、「死」に意味があるというのなら――"
13370-49 = "先輩があんな風に死んだことに、一体どんな意味があるの？"
13370-50 = "ホシノ先輩……。"
13370-52 = "ユメ先輩は、砂漠で迷って力尽きた。"
13370-53 = "水も、コンパスも、通信機もない状態で。#nあの日は、星ひとつ見えないくらいの悪天候だった。"
13370-54 = "せめて、スマホが最新だったなら……。#nそうしたら、先輩の言葉を受け取れたかもしれないのに……。#nもっと早く、発見できたかもしれないのに。"
13370-55 = "でも、先輩は借金を返済するからって機種変更を後回しにして……。"
13370-56 = "私が……もっとちゃんと話をしていたら……。"
13370-57 = "ホシノ先輩！"
13370-59 = "……。"
13370-60 = "ホシノ先輩とユメ会長の事情に、#n私は口を挟むべきじゃないのかもしれません。"
13370-61 = "ですが、そうやって自分をずっと苦しめていたら、先輩が……。"
13370-63 = "……学校の水道。"
13370-64 = "直してくれたの、アヤネちゃんだよね。"
13370-65 = "え……？"
13370-67 = "ありがとう。#n本当は、もっと前に言おうと思ってたんだけどさ。"
13370-68 = "……ホシノ先輩。"
13370-70 = "……。"
13370-71 = "ふぅ……ごめん、うまく言葉にできないや。"
13370-72 = "……早く帰ってきてよ、先輩のバカ！"
13370-73 = "それで、また一緒にラーメン食べに行くわよ！"
13370-74 = "もし帰ってきてくれたら、アヤネちゃんと一緒にアイドルやるから！"
13370-76 = "……セリカちゃん。"
13370-77 = "やっぱり、セリカちゃんは可愛いね～。"
13370-78 = "ちょ、ちょっとぉ！？"
13370-80 = "…………。"
13370-81 = "――もう、十分。"
13370-82 = "過去は過去として――そのままでいい。"
13370-84 = "シロコ、ちゃん……？"
13370-85 = "これからを……セリカやアヤネのように彼女を知らない生徒が増えていく未来を、大切に。"
13370-86 = "彼女を知らない子たちも、今、笑顔でいられることは、悪いことじゃない。"
13370-87 = "だから……。"
13370-88 = "死に囚われるんじゃなくて、思い出を未来に連れていこう。"
13370-89 = "生徒会長がどんな人だったのかは、先輩が一番よく知っているんでしょう？"
13370-90 = "だから、その手を、離してあげて。"
13370-97 = "……ありがとう。"
13370-98 = "君のこと、よく知らないけど……分かるんだ。"
13370-99 = "……同じ過ちを繰り返してほしくないんだよね。"
13370-100 = "シロコちゃんは優しいから。"
13370-101 = "……それに。"
13370-102 = "――君も、手放せてないんでしょ？"
13370-103 = "……！"
13370-107 = "……みんなが使ってた武器を。"
13370-108 = "今も、まだ持ってるよね？"
13370-109 = "私は……。"
13370-111 = "それを捨てられる？"
13370-112 = "段々と記憶が薄れていくなか、[ruby=武器]思い出[/ruby]まで手放せる？"
13370-113 = "……。"
13370-114 = "…………。"
13370-115 = "分からない。"
13370-116 = "……できるのかな。"
13370-117 = "私たちは……。"
13370-118 = "「罪」から……「悲しみ」から、「苦しみ」から、抜け出せるのかな？"
13370-119 = "……きっと、死んだ人を生き返らせるのと同じくらい、難しいと思う。"
13370-120 = "……。"
13370-125 = "完成だ！"
13370-126 = "ついに「セトの[ruby=ふんぬ]憤怒[/ruby]」が顕現する！"
13370-127 = "オオオオオッ、雷撃の怒りよ……！"
13370-128 = "地上を燃やし尽くせ――！！"
13370-132 = "先生、気をつけてください！"
13370-133 = "巨大なエネルギー反応が……！"
13370-137 = "……。"
13370-138 = "私には……。"
13370-139 = "……できない。"
13370-143 = "先輩が最期に残したもの。"
13370-144 = "その意味が何なのか確認しないと。"
13370-148 = "でないと、私は……。"
13370-156 = "避けてください、先生！"
13370-157 = "あの攻撃は、今の私じゃ防げません！"
13370-158 = "せ、生徒の皆さんも……！"
13370-159 = "うわあああああっ！？"
13370-163 = "[ns] \"ホシノは手帳に何が書いてあると思う？\""
13370-164 = "分からない。#nだから、それを知るために――"
13370-165 = "[s] \"うん。それは誰にも分からないものだから。\""
13370-166 = "……。"
13370-167 = "[s] \"それでも、信じてるんだよね。\""
13370-168 = "……ユメ先輩は、どんな言葉を残したんだろう。"
13370-169 = "[s] \"彼女を一番知っているのは、ホシノなんでしょ？\""
13370-170 = "……。"
13370-171 = "[ns1] \"なら、そこにはきっと……。\"\n[ns2] \"ホシノの信じる言葉が残されていたはずだよ。\""
13370-174 = "[ns3] \"事実は分からないかもしれない。\"\n[ns4] \"でも真実はそこにある。\""
13370-177 = "[ns] \"存在しないとしても、それが真実であることは変わらないから。\""
13370-179 = "[ns] \"それが、私たちにできる唯一の選択。\""
13370-181 = "[ns5] \"死を、時間を巻き戻せない……。\"\n[ns6] \"平凡な私たちにとって……。\""
13370-184 = "[ns7] \"たったひとつの――奇跡だから。\"\n[ns8] たったひとつの――奇跡だから。"
13370-192 = "……。"
13370-193 = "ここは……。"
13370-194 = "……ん？"
13370-199 = "……手帳？"
13370-200 = "えっ。"
13370-201 = "ど、どうして！"
13370-204 = "ど、どうして！#n……どうして、こんなところに！？"
13370-208 = "ホシノちゃん、元気にしてる？"
13370-217 = "えへへっ。3年生になったホシノちゃんは、どんな風に成長してるんだろうね。"
13370-222 = "次回;約束"
