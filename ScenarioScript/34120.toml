[translation]
34120-1 = "Episódio 12;O Distrito Autônomo de Arius"
34120-6 = "E aí, a Atsuko…… por ordem \"dela\"…… pra Basílica do distrito autônomo de Arius……."
34120-7 = "É-é só isso que a gente sabe……."
34120-13 = "Hmm…… pra salvar a companheira, rumo ao distrito autônomo de Arius…… levando o Sensei?"
34120-14 = "Sei…… é."
34120-15 = "Sendo o Sensei, ele faria isso mesmo, né."
34120-16 = "……."
34120-17 = "Mas……."
34120-18 = "Ainda assim……."
34120-22 = "eu vou…… atrás.#nVou alcançar, e me vingar."
34120-23 = "Será que ele vai me desprezar…… ou se decepcionar…….#nLogo do Sensei eu não queria ser odiada……."
34120-24 = "……Mas, mesmo assim――eu não consigo me deter."
34120-25 = "Me desculpa…… é que……."
34120-26 = "eu jamais posso perdoar o Squad de Arius――mesmo que continuem me chamando de bruxa, eu preciso persegui-las até o fim do mundo e me vingar."
34120-30 = "……Por isso, Sensei, não me impeça, tá."
34120-39 = "……."
34120-40 = "……T-tudo certo! Podem subir!"
34120-41 = "[ns] Sobe."
34120-45 = "Aqui a vigilância deve ser fraca…… acertamos."
34120-46 = "P-pois é……."
34120-47 = "Ufa…… gh……."
34120-48 = "[s] \"Aqui é o distrito autônomo de Arius……?\""
34120-49 = "……Antigamente era; hoje é só um terreno abandonado."
34120-50 = "……."
34120-51 = "O distrito de verdade fica um pouco mais adiante.#nMas, como já sabem que a gente tá vindo, não deve ser tão fácil se aproximar."
34120-52 = "……Aqui era o campo de treinamento."
34120-53 = "[s] \"Campo de treinamento?\""
34120-54 = "Na origem era uma ruína, mas, depois que a guerra interna acabou, também passou a ser usado como campo de treinamento."
34120-55 = "[s] \"Guerra interna……?\""
34120-57 = "Faz uns 10 anos: a guerra em que o interior do distrito autônomo de Arius se dividiu em dois.#nQualquer aluna de Arius da nossa idade conhece."
34120-58 = "[s] Escuta com atenção as palavras da Misaki."
34120-59 = "……Não é uma história lá muito divertida."
34120-60 = "Não tem relação com a missão de agora…… e eu prefiro não contar por vontade própria."
34120-61 = "Eu……."
34120-62 = "Eu ainda me lembro――o lugar onde eu conheci a Azusa foi aqui, né?"
34120-63 = "……."
34120-67 = "Qual treinamento era mesmo…… tiro, ou fabricação de bombas…….#nUma menina que não obedeceu à \"ordem\" dos adultos apanhava muito……."
34120-68 = "[s] \"…….\""
34120-69 = "E, ao redor, todo mundo só olhava…….#nMas aquela menina se levantava de novo e de novo, encarando o adulto o tempo todo……."
34120-70 = "Se deixassem daquele jeito, a aureola dela parecia que ia ser destruída…… mas eu, de medo, não conseguia me mexer……."
34120-71 = "E, nessa hora, a mana Saori…… quer dizer, a Líder veio correndo e……."
34120-72 = "……Mergulhar nas lembranças fica pra depois. Agora, foco na missão."
34120-76 = "E aí…… o que a gente faz agora?"
34120-81 = "……."
34120-82 = "A gente trouxe um adulto, mas, só nós, lutar contra este distrito e contra \"ela\" é impossível. Como vamos salvar a Hime?"
34120-86 = "……Líder?"
34120-91 = "[ns] \"Saori?\""
34120-92 = "L-Líder!?"
34120-93 = "Uh…… gh……."
34120-96 = "……Que febre alta. Aguentar até chegar a este estado……."
34120-97 = "F-febre!?"
34120-98 = "……A Líder já tá há quase 4 dias sem descansar. Ferida, e ainda com falta de sono e exaustão…….#nSegurar na base da força de vontade também tinha limite."
34120-99 = "A-awa…… o-o que a gente faz?"
34120-103 = "[ns] Tira da bolsa um antitérmico de uso rotineiro."
34120-104 = "R-remédio……!?"
34120-105 = "……Você anda com isso."
34120-106 = "[s1] \"É que vende na conveniência.\"\n[s2] \"Tem remédio de estômago, petisco de gato, barrinha de chocolate também.\""
34120-107 = "Ah é…… adulto dá medo……."
34120-108 = "Ah é…… adulto dá medo……."
34120-109 = "Que bom…… obrigada."
34120-113 = "……Líder, bebe isto. Vai melhorar."
34120-119 = "Glup…… haa, ufa……."
34120-120 = "Líder……."
34120-121 = "[s] \"Vamos descansar um pouco aqui.\""
34120-122 = "……Pois é."
34120-123 = "Sim…… então, a vigília fica comigo……?"
34120-124 = "Vamos revezar. A Hiyori também precisa descansar."
34120-125 = "O Sensei também durma um pouco. A primeira vigília fica comigo."
34120-126 = "[s] \"Sim, obrigado.\""
34120-127 = "S-sim. Entendido……."
34120-134 = "(Decidiu-se sentar num canto qualquer e descansar……)"
34120-140 = "……Sensei, a minha voz está te alcançando……?"
34120-141 = "Se a minha voz está chegando…… por favor…… dê ouvidos……."
34120-142 = "Eu estou, agora, presa no mundo do intervalo, que não é sonho nem realidade…….#nAté quando poderei permanecer aqui, não sei ao certo."
34120-143 = "Não resta muito tempo…… preciso te contar a situação atual……."
34120-144 = "Eu…… cometi um erro……."
34120-146 = "Dentro do sonho, eu conheci a Gematria――a reunião deles……."
34120-155 = "A Beatrice, que domina o distrito autônomo de Arius, está prestes a realizar um ritual na Basílica……."
34120-167 = "E, ao fim desse ritual…… Kivotos há de chegar ao fim……."
34120-169 = "O que ela pretende fazer no ritual segue sem esclarecimento……."
34120-170 = "Mas supõe-se que ela esteja tentando atrair um \"algo\" que não existe em Kivotos……."
34120-173 = "Eu, dentro do sonho lúcido, fui atacada pela Beatrice#n――e acabei entrando em contato com a existência do outro lado do ritual……."
34120-174 = "Sim――por ter tocado \"Aquilo\", o meu recipiente começou a ruir……."
34120-176 = "……E, assim, eu feri a Mika."
34120-177 = "Tocando o fim de Kivotos, em pânico, eu acusei a Mika…… e, naquele estado, o corpo foi desmoronando……."
34120-181 = "Eu, sempre…… só firo aquela menina……."
34120-183 = "A Mika vai se culpar e tentar cometer um pecado irreversível……."
34120-187 = "E o ritual da Beatrice pode ser o estopim que conduz esta Kivotos ao fim."
34120-188 = "――E, nesse processo, a Atsuko, do Squad de Arius, há de ver a flor da sua vida se despedaçar."
34120-189 = "Eu, por estar presa neste intervalo que não é sonho nem realidade#n――só posso, Sensei, lançar a você palavras que nem sei se chegam."
34120-190 = "Ah, e, Sensei…… cuidado. Você está na mira da Beatrice."
34120-191 = "……."
34120-192 = "Resolver todos estes problemas é impossível."
34120-193 = "Você já se esforçou o suficiente por nós.#nPor isso, não tente carregar todos os problemas nas costas."
34120-194 = "Eu vou sair daqui e, com a ajuda da Nagisa e de todos, recuperar a Mika."
34120-195 = "Desta vez sim, eu quero me desculpar com ela."
34120-196 = "Por isso, Sensei……."
34120-197 = "Sensei…… se a minha voz está chegando…… por favor……."
34120-202 = "fuja――e, tanto quanto possível, afaste-se do distrito autônomo de Arius."
34120-209 = "Senão…… você…… vai……."
34120-211 = "………………………………………"
34120-213 = "Próximo Episódio;O Nosso Até Aqui"
