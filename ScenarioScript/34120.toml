[translation]
34120-1 = "Episódio 12; Distrito Autônomo de Arius"
34120-6 = "Então, a Atsuko foi... por ordem da \"aquela pessoa\"... para a basílica no Distrito Autônomo de Arius..."
34120-7 = "N-nós só sabemos isso..."
34120-13 = "Entendo... Para salvar sua companheira, você foi ao Distrito Autônomo de Arius... levando o Sensei?"
34120-14 = "Entendi... é isso."
34120-15 = "Se é o Sensei, com certeza ele faria isso."
34120-16 = "..."
34120-17 = "Mas..."
34120-18 = "Mesmo assim..."
34120-22 = "Eu... vou atrás deles. #nVou alcançá-los e me vingar."
34120-23 = "Será que ele vai me desprezar... ou talvez ficar decepcionado... #nEu não queria que ninguém, menos ainda o Sensei, me odiasse..."
34120-24 = "...Mas, mesmo assim — eu não consigo me deter."
34120-25 = "Desculpe... porque..."
34120-26 = "Eu nunca vou perdoar o Esquadrão Arius — mesmo que continuem me chamando de bruxa, eu preciso persegui-los até o fim do mundo e me vingar."
34120-30 = "...Por isso, Sensei, não tente me impedir."
34120-39 = "..."
34120-40 = "...T-tudo bem! Pode subir!"
34120-41 = "[ns] Subir."
34120-45 = "A segurança deve ser fraca por aqui... boa escolha."
34120-46 = "É, você tem razão..."
34120-47 = "Ufa... ah..."
34120-48 = "[s] \"Este é o Distrito Autônomo de Arius...?\""
34120-49 = "...Antigamente era, mas agora é apenas um local em ruínas."
34120-50 = "..."
34120-51 = "O distrito real fica um pouco mais adiante. #nMas, como já sabem que estamos vindo, acho que não será tão fácil nos aproximarmos."
34120-52 = "...Este lugar era um campo de treinamento."
34120-53 = "[s] \"Campo de treinamento?\""
34120-54 = "Originalmente eram ruínas, mas depois que a guerra civil terminou, foi usado como campo de treinamento."
34120-55 = "[s] \"Guerra civil...?\""
34120-57 = "Foi uma guerra que aconteceu há uns 10 anos, quando o Distrito Autônomo de Arius se dividiu em dois. #nTodos os estudantes de Arius da nossa idade sabem disso."
34120-58 = "[s] Ouvir o que Misaki tem a dizer."
34120-59 = "...Não é uma história muito divertida."
34120-60 = "Não tem relação com a missão atual... então não quero falar sobre isso."
34120-61 = "Eu..."
34120-62 = "Ainda me lembro — o lugar onde conheci a Azusa-chan pela primeira vez foi aqui, não foi?"
34120-63 = "..."
34120-67 = "Qual treinamento seria... tiro, fabricação de bombas... #nUma criança que não obedeceu às \"ordens\" dos adultos estava sendo espancada terrivelmente..."
34120-68 = "[s] \"...\""
34120-69 = "Todos ao redor apenas observavam... #nMas aquela criança se levantou várias vezes e continuou encarando os adultos..."
34120-70 = "Se eu tivesse deixado como estava, o halo daquela criança teria sido destruído... mas eu estava com medo e não consegui me mover..."
34120-71 = "Foi então que a Saori-nee... não, a líder, correu até lá..."
34120-72 = "...Deixe as lembranças para depois. Agora, foque na missão."
34120-76 = "E então... o que faremos agora?"
34120-81 = "..."
34120-82 = "Trouxemos um adulto, mas é impossível lutarmos contra este distrito e \"aquela pessoa\" sozinhos. Como vamos salvar a Princesa?"
34120-86 = "...Líder?"
34120-91 = "[ns] \"Saori?\""
34120-92 = "L-líder!?"
34120-93 = "Ugh... ah..."
34120-96 = "...Que febre alta. Aguentar até chegar a esse ponto..."
34120-97 = "E-está com febre!?"
34120-98 = "……O líder não descansa há quase 4 dias. Além de estar ferido, está com privação de sono e exausto…….#nAcho que o limite de aguentar apenas na força de vontade chegou."
34120-99 = "A-ah, céus…… o-o que devemos fazer?"
34120-103 = "[ns] Pega um antitérmico do kit de primeiros socorros."
34120-104 = "R-remédio……!?"
34120-105 = "……Eu carrego comigo."
34120-106 = "[s1] \"Vende na loja de conveniência, sabe.\"\n[s2] \"Tenho remédio para estômago, petiscos para gatos, barras de chocolate e tudo mais.\""
34120-107 = "É mesmo…… adultos são assustadores……."
34120-108 = "É mesmo…… adultos são assustadores……."
34120-109 = "Que bom…… obrigado."
34120-113 = "……Líder, tome isto. Vai se sentir melhor."
34120-119 = "Gulp…… haa, fuu……."
34120-120 = "Líder……."
34120-121 = "[s] \"Vamos descansar um pouco aqui.\""
34120-122 = "……É verdade."
34120-123 = "Sim…… então, eu ficarei de vigia……?"
34120-124 = "Vamos revezar. Hiyori também precisa descansar."
34120-125 = "Sensei também precisa dormir um pouco. Eu ficarei de vigia primeiro."
34120-126 = "[s] \"Sim, obrigado.\""
34120-127 = "S-sim. Entendido……."
34120-134 = "（Decidi sentar em um lugar qualquer para descansar……）"
34120-140 = "……Sensei, minha voz está chegando até você……?"
34120-141 = "Se minha voz está chegando…… por favor…… me escute……."
34120-142 = "Estou presa em um mundo entre o sonho e a realidade…….#nNão sei quanto tempo mais poderei ficar aqui."
34120-143 = "Não resta muito tempo…… preciso contar a situação atual para o Sensei……."
34120-144 = "Eu…… cometi um erro……."
34120-146 = "Em um sonho, eu tomei conhecimento da Gematria — da reunião deles……."
34120-155 = "Beatrice, que governa o Distrito Autônomo de Arius, está tentando realizar um ritual na Basílica……."
34120-167 = "No fim desse ritual…… Kivotos encontrará seu fim……."
34120-169 = "O que ela pretende fazer com o ritual ainda não foi descoberto……."
34120-170 = "Mas suspeita-se que ela esteja tentando invocar 'algo' que não existe em Kivotos……."
34120-173 = "Eu fui atacada por Beatrice em um sonho lúcido#n―― e acabei entrando em contato com uma existência do outro lado do ritual……."
34120-174 = "Sim―― por ter tocado naquilo, meu receptáculo começou a colapsar……."
34120-176 = "……E assim, eu machuquei a Mika."
34120-177 = "Ao entrar em contato com o fim de Kivotos, entrei em pânico, culpei a Mika…… e meu corpo começou a se desfazer……."
34120-181 = "Eu sempre…… só machuco aquela criança……."
34120-183 = "Mika vai se culpar e tentar cometer um pecado irreparável……."
34120-187 = "E o ritual de Beatrice pode ser o estopim que levará Kivotos ao fim."
34120-188 = "――No processo, Atsuko, do Esquadrão Arius, verá a flor da vida se dispersar."
34120-189 = "Como estou presa neste espaço entre o sonho e a realidade#n―― Sensei, só posso lhe dirigir palavras sem saber se chegarão até você."
34120-190 = "Ah, e Sensei…… tome cuidado. Você está sendo alvo de Beatrice."
34120-191 = "……."
34120-192 = "É impossível resolver todos esses problemas sozinho."
34120-193 = "O Sensei já se esforçou o suficiente por nós.#nPor isso, não tente carregar todos os problemas nas costas."
34120-194 = "Vou sair daqui e, com a ajuda de Nagisa e dos outros, trarei a Mika de volta."
34120-195 = "Desta vez, quero pedir perdão a ela."
34120-196 = "Por isso, Sensei……."
34120-197 = "Sensei…… se minha voz está chegando até você…… por favor……."
34120-202 = "Fuja―― e, na medida do possível, mantenha distância do Distrito Autônomo de Arius."
34120-209 = "Caso contrário…… Sensei…… você……."
34120-211 = "………………………………………"
34120-213 = "Próximo episódio: O nosso passado até aqui"
