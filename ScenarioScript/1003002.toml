[translation]
1003002-1 = "Workaholic"
1003002-2 = "Arredores de Gehenna - Estância Termal"
1003002-3 = "（Seguindo o conselho de Chinatsu, visitei as fontes termais nos arredores de Gehenna, que dizem ter propriedades restauradoras）"
1003002-7 = "Na última operação, a taxa de ferimentos foi tão alta que os kits de primeiros socorros acabaram muito mais rápido do que o esperado..."
1003002-8 = "Primeiro, preciso fazer um pedido adicional de umas 10 caixas de gaze e curativos..."
1003002-9 = "[s] \"Chinatsu...?\""
1003002-10 = "Ah... Sensei?"
1003002-11 = "Por que o Sensei está em um lugar como este...?"
1003002-12 = "Ah, será que você veio para as fontes termais, como conversamos outro dia?"
1003002-13 = "Entendo, foi isso então. Fico aliviada como responsável pela assistência médica ao saber que o Sensei pensou em descansar de verdade."
1003002-14 = "Você vai entrar agora, não vai? Nesse caso, recomendo o banho ao ar livre do anexo."
1003002-15 = "Dizem que o banho ao ar livre daqui contém vários minerais que ajudam a aliviar a fadiga."
1003002-16 = "Além disso, se você usar uma toalha molhada com essa água para massagear a área ao redor dos olhos, também pode aliviar o cansaço visual."
1003002-17 = "[s] \"Você também veio descansar, Chinatsu?\""
1003002-21 = "Bem, é... na verdade..."
1003002-22 = "Eu não tinha planos de vir originalmente, mas a Presidente Hina me deu um voucher de estadia daqui."
1003002-23 = "Como tenho feito muitas horas extras ultimamente, a Presidente foi gentil o suficiente para se preocupar comigo."
1003002-24 = "Tentei recusar ou passar para outros membros do Comitê Disciplinar, mas ninguém quis aceitar... então, por assim dizer, acabei cedendo à gentileza dela e decidi vir."
1003002-25 = "Porém, ao mesmo tempo, ainda tenho uma montanha de coisas para fazer..."
1003002-26 = "[s] \"Entendo, esses documentos são as 'coisas para fazer' então...\""
1003002-28 = "Sim. Sinto que não deveria estar descansando quando ainda resta tanto trabalho, e me sinto um pouco culpada por estar em um resort enquanto os outros não..."
1003002-29 = "Por isso, acabei trazendo os documentos que precisam ser processados com urgência..."
1003002-30 = "A lista de pedidos de suprimentos, a lista dos membros que se feriram e precisam de repouso, e várias outras coisas..."
1003002-31 = "Se eu não cuidar desses pequenos detalhes administrativos logo, alguém do Comitê Disciplinar terá problemas depois."
1003002-32 = "E, talvez por sorte, esta estância termal parece ser um espaço ideal para trabalhar."
1003002-33 = "Não está nem muito frio nem muito quente, a temperatura é confortável e não há encrenqueiros por perto para começar um tiroteio."
1003002-34 = "Talvez eu consiga me concentrar mais no trabalho aqui do que no prédio da escola."
1003002-35 = "[s1] \"Se possível, por que não se concentra em descansar agora?\"\n[s2] \"Por que não pede para esperarem um pouco com os documentos que podem ser adiados?\""
1003002-36 = "Ma-mas, os outros membros do Comitê Disciplinar certamente estão trabalhando agora, então eu apenas relaxar e aproveitar as férias..."
1003002-37 = "Ma-mas, os outros membros do Comitê Disciplinar certamente estão trabalhando agora, então eu apenas relaxar e aproveitar as férias..."
1003002-38 = "Além disso, não estou particularmente cansada agora, nem sinto dores no corpo..."
1003002-39 = "[s3] \"Se a Chinatsu não vai descansar, acho que eu também não vou.\"\n[s4] \"Descansar também é uma parte essencial da missão, não é?\""
1003002-44 = "Fufu, não esperava que você dissesse isso... Entendo. Depois de pregar tanto para o Sensei sobre a importância do descanso, não tenho credibilidade se eu mesma não fizer isso."
1003002-45 = "Então, vou esquecer o trabalho por um momento e descansar de verdade."
1003002-46 = "Mas não me sinto bem deixando o trabalho pela metade, então vou terminar apenas esses documentos aqui antes."
1003002-47 = "[s] \"Então eu vou te ajudar.\""
1003002-48 = "Is-isso, eu me sinto um pouco culpada..."
1003002-49 = "...Você também se sente assim?"
1003002-50 = "...Fufu, é verdade. O Sensei é esse tipo de pessoa, não é?"
1003002-51 = "Não posso recusar a gentileza do Sensei..."
1003002-57 = "Entendido. Então, conto com a sua ajuda desta vez, Sensei."
1003002-59 = "Depois disso, processei os documentos do Comitê Disciplinar desesperadamente junto com a Chinatsu."
1003002-60 = "Felizmente, os documentos foram concluídos antes do anoitecer, mas como já estava muito tarde, não conseguimos entrar no banho naquele dia..."
