[translation]
80000043-1 = "Record it again"
80000043-6 = "Ufa, ufa..."
80000043-7 = "[s] \"Sumire, só mais um pouco!\""
80000043-8 = "Sim, treinador!"
80000043-19 = "[ns] \"Chegada! Sumire, bom trabalho!\""
80000043-22 = "Ha, ha... sim, bom trabalho para você também."
80000043-23 = "[s] \"O tempo de hoje superou bastante o anterior!\""
80000043-24 = "S-sério...? Ué?"
80000043-25 = "Treinador, por acaso você lembra de todos os meus recordes...?"
80000043-26 = "[s1] \"Claro, afinal sou o Sensei.\"\n[s2] \"Eu lembro de todos os recordes que você estabeleceu, Sumire.\""
80000043-27 = "I-isso é incrível!"
80000043-28 = "I-isso é incrível!"
80000043-29 = "Isso é o Sensei, e também o treinador...!"
80000043-30 = "Fufu. Ao mesmo tempo que acho incrível, também me sinto muito feliz."
80000043-31 = "O treinador sempre me observa assim, checa meu desempenho e registra cada movimento meu..."
80000043-32 = "É incrível..."
80000043-33 = "[s3] \"Sinto que isso soou um pouco estranho...?\"\n[s4] \"Será que é a minha mente que está interpretando mal o jeito que você falou...!?\""
80000043-34 = "Sim? Eu disse algo de errado...?"
80000043-35 = "Sim? Eu disse algo de errado...?"
80000043-39 = "Ah, agora que me exercitei e me acalmei um pouco, comecei a sentir fome..."
80000043-40 = "[s] \"Então, que tal irmos comer alguma coisa depois disso?\""
80000043-41 = "Ah, e-esse é um convite muito gentil, mas...!"
80000043-42 = "Na verdade, é que..."
80000043-43 = "[s] \"...Sumire?\""
80000043-44 = "Como o treinador deve saber, a alimentação antes e depois do exercício é fundamental."
80000043-45 = "[s] \"Sim, é verdade.\""
80000043-46 = "E eu não ignoro que dia é hoje. Dia dos Namorados, o dia de presentear pessoas queridas com doces contendo monossacarídeos ou dissacarídeos."
80000043-47 = "Não é mesmo?"
80000043-48 = "[s] \"Não está errado, eu acho...?\""
80000043-49 = "Claro, o excesso de açúcar não faz bem. Mas não acho que devemos ser tão rígidos e seguir todas as regras, nem mesmo em um dia como este."
80000043-50 = "Por isso, digamos que..."
80000043-51 = "Treinador, pegue isto."
80000043-55 = "[ns] \"Isto é...?\""
80000043-56 = "São 100 produtos de uma empresa de alimentos esportivos que eu mesma testei e comparei."
80000043-57 = "Dentre eles, achei que este alimento em tubo com sabor de chocolate seria o melhor para o treinador."
80000043-58 = "Ouvi dizer que seus dias são tão ocupados que você mal consegue fazer as refeições... então pensei que daria para comer nos intervalos."
80000043-59 = "[s] \"Uau, obrigado!\""
80000043-60 = "Fico feliz que tenha gostado tanto... fufu."
80000043-61 = "Valer a pena o esforço de escolher, eu que agradeço. Então, treinador, coma isso e vamos retomar o exercício juntos!"
80000043-62 = "Dizem que um pacote desse produto sacia a fome e fornece uma quantidade considerável de calorias."
80000043-63 = "Depois que comer, vamos começar correndo uns 20km!"
80000043-64 = "[s5] \"Ei, espera!? Isso é novidade para mim!?\"\n[s6] \"20km!?\""
80000043-65 = "Eu vou junto com você! Vamos, treinador!"
80000043-66 = "Eu vou junto com você! Vamos, treinador!"
80000043-71 = "(E assim, acabei começando um treinamento especial (?) de Dia dos Namorados com a Sumire)"
