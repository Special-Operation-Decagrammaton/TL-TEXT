[translation]
80000043-1 = "Record it again"
80000043-6 = "ふぅ、ふぅ……。"
80000043-7 = "[s] \"スミレ、もう少し！\""
80000043-8 = "はい、トレーナー！"
80000043-19 = "[ns] \"ゴール！スミレ、お疲れ様！\""
80000043-22 = "はぁ、はぁ……はい、お疲れ様でした。"
80000043-23 = "[s] \"今日のタイム、前よりかなり更新できてるよ！\""
80000043-24 = "そ、そうでしたか……あれ？"
80000043-25 = "トレーナー、もしかして私の記録を全部覚えてるんですか……？"
80000043-26 = "[s1] \"もちろん、先生だからね。\"\n[s2] \"スミレの打ち立てた記録とか全部覚えてるよ。\""
80000043-27 = "す、すごいですね！"
80000043-28 = "す、すごいですね！"
80000043-29 = "これが先生、そしてトレーナー……！"
80000043-30 = "ふふっ。すごいと思うと同時に、何だかとても嬉しいです。"
80000043-31 = "トレーナーがいつもそうして私のことを見てくれて、チェックし、一挙手一投足を記録してくれる……。"
80000043-32 = "すごいですね……。"
80000043-33 = "[s3] \"なんか、やや語弊があるような……？\"\n[s4] \"言い方が気になるのは、私の心のせいかな……！？\""
80000043-34 = "はい？私、何か良くないことを言いましたか……？"
80000043-35 = "はい？私、何か良くないことを言いましたか……？"
80000043-39 = "あぁ、何だか身体を動かしてちょっと落ち着いたら、お腹が空いてきましたね……。"
80000043-40 = "[s] \"じゃあこの後、何かご飯でも食べに行く？\""
80000043-41 = "あっ、そ、それは大変ありがたいお誘いなのですが……！"
80000043-42 = "実はその……"
80000043-43 = "[s] \"……スミレ？\""
80000043-44 = "トレーナーもご存じかと思いますが、運動の前後における食事は大切です。"
80000043-45 = "[s] \"うん、そうだね。\""
80000043-46 = "そして今日が何の日なのか、私も知らないわけではありません。バレンタインデー、大切な方に単糖類ないしは二糖類のスイーツを贈るものです。"
80000043-47 = "そうですよね？"
80000043-48 = "[s] \"間違ってはいない、かな……？\""
80000043-49 = "もちろん糖の摂り過ぎは良くありません。しかしこのような日まで含めて常に堅苦しく、全てのルールを守るべきとは思いません。"
80000043-50 = "そこで、と言いましょうか……。"
80000043-51 = "トレーナー、これを。"
80000043-55 = "[ns] \"これは……？\""
80000043-56 = "運動向け食品会社の製品100個、それを私が実際に食べて比較を行いました。"
80000043-57 = "その中でも一番トレーナーのために良いのではと思ったのが、このチューブ型になっているチョコレート味の食品です。"
80000043-58 = "普段トレーナーは、食事もきちんと取れないほどお忙しい日々だと聞きましたので……これなら隙間時間にも食べられるのではと。"
80000043-59 = "[s] \"やった、ありがとう！\""
80000043-60 = "ここまで喜んでくださるとは……ふふっ。"
80000043-61 = "選んだ甲斐があるというものです、こちらこそありがとうございます。それではトレーナー、これを食べて一緒に運動を再開しましょう！"
80000043-62 = "この製品1パックで、相当なカロリーと共にお腹が満たされるそうなので。"
80000043-63 = "それ食べたらまず、軽く20km走るとしましょうか！"
80000043-64 = "[s5] \"え、待って！？色々初耳なんだけど！？\"\n[s6] \"20km！？\""
80000043-65 = "私も一緒に行きますから！さあ、トレーナー！"
80000043-66 = "私も一緒に行きますから！さあ、トレーナー！"
80000043-71 = "（そうしてスミレと一緒に、バレンタインデー記念特訓（？）を始めることになった）"
