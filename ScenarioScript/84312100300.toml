[translation]
84312100300-6 = "あっ！ティーパーティーさん！こっちこっち！"
84312100300-7 = "今日が最終日だけど……ミレニアムEXPOはどうだっただろうか。"
84312100300-9 = "とても一言では表せないのだが……そうだね……楽しかったよ。"
84312100300-10 = "そうか……？なら良かった。"
84312100300-11 = "あ。ついでに聞きたいんだけど……。"
84312100300-12 = "この付近の清掃をしてくれたのはあなたか？"
84312100300-16 = "……清掃？"
84312100300-18 = "そう！私たちがやろうとしてたんだけど、いつの間にか綺麗になってたの！"
84312100300-20 = "昨日の夕方ごろまではそのままだったから。誰かが夜のうちにやったはずなんだ。"
84312100300-21 = "真っ先に思いついたのが、リーダーとあなただったから。"
84312100300-22 = "なるほど。"
84312100300-23 = "だが、私ではないな。ネルがやった可能性は否定できないが。"
84312100300-24 = "いや、それはない。リーダーが一人で清掃なんてするわけないし。"
84312100300-26 = "みんなでやる時も、一番嫌そうだもんね～"
84312100300-27 = "そうか、なら誰が……？"
84312100300-31 = "（……リオ）"
84312100300-32 = "（あの時の「確認」とは、これか……？）"
84312100300-33 = "（なんとも君らしいというか……）"
84312100300-35 = "ん～、じゃあ仕事無くなっちゃったし、遊びに行こっか？"
84312100300-36 = "先輩……仕事は他にもある。"
84312100300-37 = "まだガイドとしての役目が終わっていないだろう？"
84312100300-38 = "えー面白くないよ～"
84312100300-39 = "仕事だからね……。"
84312100300-45 = "（私は外した方が良さそうだ）"
