[translation]
84312100300-6 = "Ah! Pessoal do Chá! Por aqui, por aqui!"
84312100300-7 = "Hoje é o último dia, mas... como será que foi a Millennium EXPO?"
84312100300-9 = "Não dá para descrever em uma palavra, mas... é, foi divertido."
84312100300-10 = "É mesmo...? Então fico feliz."
84312100300-11 = "Ah. Aproveitando, queria perguntar uma coisa..."
84312100300-12 = "Foi você quem limpou esta área?"
84312100300-16 = "...Limpeza?"
84312100300-18 = "Isso! Nós íamos fazer isso, mas quando vimos, já estava tudo limpo!"
84312100300-20 = "Até ontem à tarde estava do mesmo jeito. Alguém deve ter feito isso durante a noite."
84312100300-21 = "A primeira pessoa que me veio à mente foi você e a líder."
84312100300-22 = "Entendo."
84312100300-23 = "Mas não fui eu. Não posso descartar a possibilidade de ter sido a Neru, porém..."
84312100300-24 = "Não, isso é impossível. A líder nunca faria uma limpeza sozinha."
84312100300-26 = "Mesmo quando fazemos em grupo, ela é a que parece gostar menos, né~"
84312100300-27 = "Entendo, então quem será que foi...?"
84312100300-31 = "(...Rio)"
84312100300-32 = "(A \"confirmação\" daquela hora era sobre isso...?)"

84312100300-33 = "(É bem a sua cara, de certa forma...)"
84312100300-35 = "Hmm, já que o trabalho acabou, vamos nos divertir?"
84312100300-36 = "Senpai... ainda temos outros trabalhos."
84312100300-37 = "Seu papel como guia ainda não terminou, não é?"
84312100300-38 = "Ah, que sem graça~"
84312100300-39 = "É trabalho, afinal..."
84312100300-45 = "(É melhor eu me retirar)"
