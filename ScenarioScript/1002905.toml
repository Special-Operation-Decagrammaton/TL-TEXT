[translation]
1002905-1 = "3ª aula: \"Prática: Escavação\""
1002905-2 = "（Aquele era um centro comercial nos arredores de Trinity）"
1002905-3 = "（Como havia muitos prédios antigos e ficava bem afastado, muitas lojas pareciam ter encerrado as atividades）"
1002905-4 = "Ah, você veio, Sensei. Fico feliz."
1002905-9 = "Pensei que talvez você fosse se perder por ser um lugar assim, mas você conseguiu. Muito bem, muito bem."
1002905-10 = "Então, recomeçando, o evento de hoje é uma das \"coisas mais românticas do mundo\"..."
1002905-11 = "Eu pretendo fazer uma \"escavação\"!"
1002905-12 = "[s1] \"Escavação...?\"\n[s2] \"O que seria isso...?\""
1002905-13 = "Este é um grande evento histórico na minha vida, a de Yutori Natsu, que talvez nunca mais aconteça... e eu queria que você, Sensei, fosse testemunha disso."
1002905-14 = "Este é um grande evento histórico na minha vida, a de Yutori Natsu, que talvez nunca mais aconteça... e eu queria que você, Sensei, fosse testemunha disso."
1002905-15 = "...Hum? Quer que eu explique os detalhes?"
1002905-16 = "Sem pressa, sem pressa. Mesmo que a gente não corra, elas não vão fugir."
1002905-17 = "Elas protegem aquele lugar há muito tempo. Alguns minutos de diferença não farão muita diferença para elas, com certeza."
1002905-18 = "Fufufu, não existem muitos lugares aos quais a palavra \"tesouro\" combine tanto quanto esse..."
1002905-19 = "Afinal, aquele lugar é... a \"Loja de Doces Esquecida\"!!"
1002905-20 = "[s3] \"Loja de doces?\"\n[s4] \"Tipo uma loja que ninguém sabe onde fica...?\""
1002905-21 = "Exatamente! A \"Loja de Doces Esquecida\"... é uma lenda urbana passada entre as alunas de Trinity há muito tempo!"
1002905-22 = "Exatamente! A \"Loja de Doces Esquecida\"... é uma lenda urbana passada entre as alunas de Trinity há muito tempo!"
1002905-23 = "Na longa história desta escola, é o lugar lendário onde todos os docinhos que ficaram populares e depois caíram no esquecimento ao longo das eras estão reunidos!"
1002905-24 = "Porém, essa história acabou se perdendo com o tempo, e dizem — ou talvez não digam — que, como ninguém nunca a procurou, ela acabou se tornando uma espécie de museu por conta própria!"
1002905-30 = "E esse lugar fantástico, finalmente, eu, Yutori Natsu..."
1002905-31 = "Eu encontrei! Encontrei o lugar! Ou melhor, encontrei as pistas que levam até ele!"
1002905-32 = "...Então! Eu ia entrar e—"
1002905-36 = "............"
1002905-37 = "...eu ia tentar, mas fiquei com medo... é um lugar que parece uma ruína, sabe."
1002905-38 = "[s5] \"Então é por isso que você quer que eu vá junto?\"\n[s6] \"Entendi, finalmente compreendi.\""
1002905-39 = "Mais ou menos isso~. Em troca, você vai ver algo incrível, sabe?"
1002905-40 = "Mais ou menos isso~. Em troca, você vai ver algo incrível, sabe?"
1002905-44 = "Então, fica dentro daquele prédio ali. O que acha, Sensei? Olhando daqui, não parece um lugar de onde algo incrível poderia surgir?"
1002905-45 = "Com esse clima, é claro que nem os delinquentes usariam como esconderijo~."
1002905-46 = "Bem, graças a isso, vários docinhos veteranos de guerra devem estar dormindo lá, preservados direitinho."
1002905-47 = "Vamos lá, Sensei! Partida, em frente!!"
1002905-48 = "Let's go!!"
1002905-50 = "（O interior do prédio era, como Natsu disse, bastante antigo）"
1002905-51 = "（O interior do prédio usava estruturas e decorações que não são mais utilizadas ultimamente, o que também mostra que é um edifício antigo）"
1002905-56 = "...Foi bom entrar com coragem, mas ainda dá um pouco de medo."
1002905-57 = "Mas o objetivo já está bem na nossa frente. De acordo com a minha investigação, o destino está naquela esquina...!"
1002905-58 = "...Hum?"
1002905-59 = "Se for algo estranho quando chegarmos lá, ou se for diferente do que eu pensava...?"
1002905-60 = "...Haha."
1002905-61 = "Bem, essa possibilidade existe. Não encontrar nada depois de criar expectativa também faz parte do romance."
1002905-62 = "Bem, eu ficaria um pouco decepcionada. Me esforcei bastante para procurar."
1002905-63 = "Mas sabe, Sensei... não acha que o verdadeiro romance é justamente conseguir amar até mesmo essas decepções?"
1002905-64 = "Obrigada por se preocupar, eu estou preparada, então está tudo bem."
1002905-65 = "Preparada para a alegria, e preparada para a tristeza também."
1002905-69 = "Muito bem, então, recomeçando..."
1002905-71 = "Se os rumores forem verdadeiros, bem ali."
1002905-72 = "A \"Loja de Doces Esquecida\" está...!"
1002905-76 = "...!"
1002905-79 = "[wa:500]— Veja, veja, Sensei! [wa:1550]Incrível...!"
1002905-81 = "[wa:150]― Tanta coisa... [wa:500] assim!!"
1002905-84 = "[wa:800]― E além disso, [wa:1150] nunca vi [wa:850] nada disso antes!!"
1002905-86 = "[wa:250]― Só tem [wa:650] doces que eu nunca vi...!!"
1002905-89 = "[wa:400]― ...Ahaha. [wa:1500] Desculpa, desculpa,"
1002905-91 = "[wa:100]― É que de repente [wa:650] eu relaxei um pouco."
1002905-94 = "[wa:1100]― Obrigada, [wa:1300] Sensei."
1002905-96 = "― Por [wa:450] me acompanhar até aqui."
1002905-99 = "[wa:1000]― De verdade, [wa:1850] eu sou muito grata―."
1002905-101 = "― Estar aqui com você, [wa:450] Sensei, [wa:1500] me deixa feliz [wa:1050] e me diverte."
1002905-104 = "...? Data de validade?"
1002905-105 = "Ah, bem, isso é verdade. Eu já sabia disso de antemão, claro."
1002905-106 = "Mesmo assim, eu estou feliz."
1002905-107 = "Eu não vim aqui para procurar comida,"
1002905-108 = "eu vim para procurar história e romance!"
1002905-109 = "Nossa, que lugar incrível. Vou tirar várias fotos para mostrar para todo mundo."
1002905-115 = "Muito bem, agora é só enviar..."
1002905-117 = "Hmm..."
1002905-121 = "[ns7] \"...Natsu?\"\n[ns8] \"Não vai enviar?\""
1002905-122 = "...É."
1002905-123 = "...É."
1002905-124 = "Vou deixar quieto."
1002905-125 = "Se a informação vazar de algum lugar e descobrirem sobre este lugar, acho que o número de pessoas querendo vir aqui por curiosidade só vai aumentar."
1002905-126 = "E se isso acontecer, este lugar vai acabar mudando."
1002905-127 = "Mesmo que não seja por maldade, como tentar levar algo de lembrança... se muita gente passar por aqui, o ar, o chão, tudo isso vai acabar mudando."
1002905-128 = "Isso seria um pouco menos romântico. Eu quero que este lugar continue exatamente como está."
1002905-129 = "...Hmm? Bem, é verdade. Significa que eu não vou poder contar para ninguém."
1002905-130 = "No começo, eu realmente queria saber sobre este lugar,"
1002905-131 = "e queria contar para várias pessoas."
1002905-137 = "...Mas, depois de pensar um pouco sobre isso,"
1002905-138 = "é, assim está bom."
1002905-139 = "Ainda assim, o fato de que eu e o Sensei viemos aqui não muda."
1002905-140 = "E essa cena que estou vendo agora também é algo real."
1002905-146 = "Eu quero que este lugar continue sendo... um romance para sempre, assim como foi até agora."
