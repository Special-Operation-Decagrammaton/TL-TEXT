[translation]
1002905-1 = "3時間目「実習：発掘」"
1002905-2 = "（そこは、トリニティの外れにある商店街だった）"
1002905-3 = "（古い建物も多く、かなり外れのところにあるからか廃業したようなお店も多かった）"
1002905-4 = "おおー、来てくれたんだね先生。嬉しいよ。"
1002905-9 = "こんなところだからもしかして迷子になっちゃうかなって思ったけど、頑張ったねー。えらいえらい。"
1002905-10 = "ではあらためて、今日のイベントは「世界で最もロマンチックなこと」の一つ……"
1002905-11 = "「発掘」を、やろうと思う！"
1002905-12 = "[s1] \"発掘……？\"\n[s2] \"それって……？\""
1002905-13 = "これはこの私「[ruby=ゆとり]柚鳥[/ruby]ナツ」の人生において、もしかしたら二度と無いかもしれないこの歴史的な大イベント……そこに、先生に立ち会ってもらおうかなって。"
1002905-14 = "これはこの私「[ruby=ゆとり]柚鳥[/ruby]ナツ」の人生において、もしかしたら二度と無いかもしれないこの歴史的な大イベント……そこに、先生に立ち会ってもらおうかなって。"
1002905-15 = "……うん？詳しい内容の方を教えてほしい？"
1002905-16 = "焦らない焦らなーい。急がなくたって、あの子たちは逃げないよ。"
1002905-17 = "もうずいぶん長い間、あの場所を守ってるんだし。たかが数分の差は、あの子たちにとって大した違いじゃないよきっと。"
1002905-18 = "ふふふっ、あれほど「宝物」っていう言葉が似合う場所もなかなか無いね……。"
1002905-19 = "何せその場所は……「忘れ去られた駄菓子屋さん」！！"
1002905-20 = "[s3] \"駄菓子屋さん？\"\n[s4] \"場所が分からないお店……みたいな？\""
1002905-21 = "その通り！「忘れ去られた駄菓子屋さん」……それは、トリニティの生徒たちに古くから伝わる都市伝説！"
1002905-22 = "その通り！「忘れ去られた駄菓子屋さん」……それは、トリニティの生徒たちに古くから伝わる都市伝説！"
1002905-23 = "長い長いこの学校の歴史において、その変遷と共に流行っては廃れていく数々のお菓子ちゃんたちが、全てそこに集まっているという伝説の場所！"
1002905-24 = "しかしそのお話はいつの間にか風化してしまい、誰にも探されることなく、今や逆にそのまま丸ごと博物館のようになってしまった……と言われてたり言われてなかったり！"
1002905-30 = "そんな幻の場所を、ついに私「柚鳥ナツ」が！"
1002905-31 = "見つけたの、その場所を！正確にはその場所に至る手がかりを！"
1002905-32 = "……そこで！中に入――"
1002905-36 = "…………"
1002905-37 = "……ろうとしたんだけど、怖くて……なんか廃墟みたいなところだし。"
1002905-38 = "[s5] \"だから一緒に行ってほしい、ってこと？\"\n[s6] \"なるほど、ようやく理解できた。\""
1002905-39 = "まあまあそんな感じ～。その代わりすっごい良いものが見られるからさ、ね？"
1002905-40 = "まあまあそんな感じ～。その代わりすっごい良いものが見られるからさ、ね？"
1002905-44 = "それで、あそこの建物の中にあるの。どう、先生。ここから見てもなんかすごいものが出てきそうな場所じゃない？"
1002905-45 = "あんな雰囲気だと、そりゃあチンピラたちもアジトとしては使わないよね～。"
1002905-46 = "まあそのおかげで数々の歴戦のお菓子ちゃんたちが眠ったまま、ちゃんと保存されてるんだろうけど。"
1002905-47 = "さあ、行こっか先生！出発進行！！"
1002905-48 = "レッツゴー！！"
1002905-50 = "（その建物の中はナツが言っていた通り、かなり古びていた）"
1002905-51 = "（建物の中身は、最近はもう使われていないような構造や装飾が使われており、そこからも古い建物であるということが分かる）"
1002905-56 = "……勢いつけて入ったは良いものの、やっぱりちょっと怖いね。"
1002905-57 = "でも、ゴールはもう目の前。私の調査によると、目的はあそこの角に……！"
1002905-58 = "……ん？"
1002905-59 = "いざ行ってみたら変なのだったり、思ったのと違ったら、って……？"
1002905-60 = "……あは。"
1002905-61 = "まあまあ、その可能性もあるよね。いざ期待して行ってみたら何も無いなんてことも、ロマンには付き物だし。"
1002905-62 = "まあ、ちょっとガッカリはするかなぁ。結構頑張って探したし。"
1002905-63 = "でもね、先生……そういう失望もまとめて愛することができてこそ、本当のロマンだと思わない？"
1002905-64 = "心配してくれてありがとね、私は覚悟できてるから大丈夫ー。"
1002905-65 = "喜ぶ覚悟も、悲しむ覚悟も、ね。"
1002905-69 = "さてさて、ではあらためて……。"
1002905-71 = "噂が本当だったら、すぐそこに。"
1002905-72 = "「忘れ去られた駄菓子屋さん」が……！"
1002905-76 = "……っ！"
1002905-79 = "[wa:500]― 見て見て先生！[wa:1550]すごい……！"
1002905-81 = "[wa:150]― こんなに[wa:500]たくさん！！"
1002905-84 = "[wa:800]― それに、[wa:1150]どれもこれも[wa:850]見たことない！！"
1002905-86 = "[wa:250]― 初めて見た[wa:650]お菓子ばっかり……！！"
1002905-89 = "[wa:400]― ……あはっ。[wa:1500]ごめんごめん、"
1002905-91 = "[wa:100]― 何だか急に[wa:650]気が抜けちゃって。"
1002905-94 = "[wa:1100]― ありがとね、[wa:1300]先生。"
1002905-96 = "― こうして[wa:450]付き合ってくれて。"
1002905-99 = "[wa:1000]― ほんと、[wa:1850]感謝してるんだ―。"
1002905-101 = "― 先生と[wa:450]こうしていられて、[wa:1500]嬉しいし、[wa:1050]楽しいの。"
1002905-104 = "……？賞味期限？"
1002905-105 = "あは、まあそれはそうだねー。流石にそれは事前に分かってたよ。"
1002905-106 = "それでも嬉しいの。"
1002905-107 = "私は食べ物を探しに来たんじゃなくて、"
1002905-108 = "歴史とロマンを探しに来たんだから！"
1002905-109 = "いや～すっごい場所だなぁ。みんなに見せるために、写真たくさん撮っておこー。"
1002905-115 = "さて、じゃあ送信……"
1002905-117 = "んー……。"
1002905-121 = "[ns7] \"……ナツ？\"\n[ns8] \"送らないの？\""
1002905-122 = "……うん。"
1002905-123 = "……うん。"
1002905-124 = "やめとく。"
1002905-125 = "もしどこかから漏れちゃってこの場所のことがバレたら、きっと好奇心でここに来たがる人の数も増えちゃうと思うし。"
1002905-126 = "そうすると、この場所はまた変わっちゃうから。"
1002905-127 = "記念に持って帰ろうとしたり……そういう悪意じゃなくたって、たくさん行き来すれば空気とか床とか、そういうのも変わっていっちゃう。"
1002905-128 = "それはちょっとロマンが無いなって。この場所は、このままでいてほしい。"
1002905-129 = "……うん？まあ、そうだね。誰にも言えなくはなるけど。"
1002905-130 = "まあ最初は確かにこの場所を知って、"
1002905-131 = "色んな人に教えたかったんだけどね。"
1002905-137 = "……まあでも、ちょっと思うところがあって。"
1002905-138 = "うん、これで良いの。"
1002905-139 = "それでも、私と先生がここに来た事実は変わらない。"
1002905-140 = "今私が見てるこの光景も、確かなものだから。"
1002905-146 = "この場所は、今までもそうだったように……これからもずっと、ロマンであり続けてほしいの。"
