[translation]
13130-1 = "Episódio 13; Refém"
13130-9 = "……Cheguei."
13130-13 = "Bem-vinda de volta, veterana Shiroko."
13130-14 = "……Ah, feche a porta direito. O vento está entrando."
13130-15 = "De-desculpa."
13130-20 = "Bem-vinda de volta, veterana."
13130-21 = "Ah, é verdade. #nJá que está aí, pode acender a luz também?"
13130-23 = "T-tá bom."
13130-27 = "Nossa, Serika-chan. Se continuar tratando a veterana assim, #num dia desses o azar pode cair sobre você, sabia?"
13130-28 = "O quê?!"
13130-29 = "Vocês também estavam com preguiça e ninguém quis acender a luz!"
13130-34 = "……E então, como está o Sensei?"
13130-36 = "Não temos nenhuma informação detalhada……."
13130-37 = "Ele foi levado ao hospital, mas parece que a vida dele não corre perigo. #nPorém, disseram que ele ainda não acordou."
13130-39 = "Hum……."
13130-41 = "Considerando que ele se envolveu naquele acidente e não teve nem um arranhão, #njá é um milagre."
13130-42 = "Pelo menos isso é um alívio."
13130-44 = "……Mas, não poderemos contar com a ajuda do Sensei por enquanto."
13130-50 = "Precisamos encontrar um jeito de qualquer forma. #nPrimeiro, renovar o contrato, e depois o canhão ferroviário……."
13130-52 = "……E se pedíssemos a cooperação de outras escolas?"
13130-54 = "Sem o Sensei, acho que seria difícil."
13130-55 = "……Considerando a distância até o antigo prédio administrativo, precisamos sair logo."
13130-59 = "……."
13130-60 = "Haa…… não temos escolha, vamos ter que fazer isso."
13130-64 = "Aliás, onde está a Nonomi?"
13130-65 = "A veterana disse que tinha um assunto para tratar e saiu."
13130-66 = "……Quando será que ela volta?"
13130-68 = "Estou um pouco preocupada……."
13130-77 = "Mordomo…… como instruído, vim sem que ninguém soubesse."
13130-84 = "Parece que sim."
13130-90 = "Eu a segui desde a escola, não há dúvidas."
13130-91 = "……É você! #nOnde está o mordomo?!"
13130-96 = "……Estou aqui, senhorita."
13130-97 = "Mas, eu não esperava que a senhorita viesse até aqui."
13130-98 = "Isso é……."
13130-99 = "Por acaso, mudou de ideia?"
13130-100 = "Decidiu se matricular em Highlander e retornar para a Nephthys, não foi?"
13130-101 = "N-não é isso!"
13130-105 = "Então, por que se deu ao trabalho de vir até aqui……?"
13130-106 = "Mesmo que eu não me torne a presidente do conselho estudantil de Highlander……."
13130-107 = "Deve haver uma maneira de resolver o problema do canhão ferroviário. #n……Se for pela Nephthys."
13130-108 = "……."
13130-109 = "A Nephthys tem relações de cooperação tanto com o fundo privado quanto com Highlander, não tem?"
13130-110 = "Se concentrarmos o poder da empresa, com certeza……."
13130-116 = "O conselho estudantil de Abydos e o comitê de contramedidas são lugares insubstituíveis para mim."
13130-117 = "……Por favor, eu lhe peço."
13130-123 = "Esse é um pedido difícil."
13130-124 = "Querer obter o que deseja sem pagar nenhum preço."
13130-125 = "……!"
13130-126 = "Senhorita, o mundo não é tão gentil assim."
13130-127 = "Acha mesmo que conseguirá o que quer apenas sendo egoísta?#nPelo visto, não amadureceu nada desde o ensino fundamental."
13130-128 = "Quanto ao método, eu já lhe informei.#nO problema será resolvido se a senhorita se matricular na Highlander."
13130-129 = "I-Isso é..."
13130-130 = "Eu poderia forçar a sua matrícula, mas...#npreferiria que decidisse por vontade própria."
13130-131 = "Embora eu não vá dizer que não existam outras opções."
13130-132 = "Q-Que opções seriam essas!?"
13130-133 = "...Se quer que eu lhe conte, não tem nada a dizer?"
13130-134 = "...!!"
13130-135 = "Sabe quantas pessoas sofreram como resultado da sua rebeldia contra o Grupo Saint Nephthys e os danos que causou?#n"
13130-137 = "De que adianta fazer alguém da própria família baixar a cabeça?"
13130-138 = "Sr. Suou, não pedi a sua opinião.#nEste é um assunto da Nephthys."
13130-145 = "...Sim."
13130-146 = "...Peço perdão.#nNão apenas ao mordomo, mas também causei problemas a todos na Nephthys..."
13130-147 = "Sinto muito, de verdade..."
13130-148 = "...Isso já basta.#nEu também peço desculpas por ter usado um tom de voz desrespeitoso."
13130-149 = "Pois bem, vou lhe contar o nosso plano."
13130-155 = "Nós pensamos da seguinte forma:"
13130-156 = "Se o Comitê de Contramedidas soubesse da existência do canhão ferroviário, não o ignorariam."
13130-157 = "Eles tentariam de tudo para comparecer à assembleia e solicitar a renovação do contrato."
13130-158 = "...Mesmo que para isso precisassem da ajuda do 'Schale'."
13130-161 = "Nós também conhecemos o poder do Sensei."
13130-162 = "Afinal, nem mesmo a Kaiser PMC conseguiu vencê-lo, mesmo na ausência de Takanashi Hoshino."
13130-166 = "Por isso, pensamos que o fundo de investimento privado mobilizaria uma grande quantidade de soldados como contramedida."
13130-167 = "...Embora, provavelmente, o Sensei dê um jeito nisso."
13130-170 = "No entanto, isso também faz parte das nossas expectativas."
13130-172 = "...Hã!?"
13130-173 = "Se o 'Schale' e o 'fundo de investimento privado' colidirem de frente, ambos sofrerão danos inevitáveis."
13130-174 = "Nesse momento, a Nephthys entrará com suas forças militares#ne colherá os frutos da vitória."
13130-175 = "...Hã!?"
13130-176 = "E-Espere um pouco!#nA Nephthys e o fundo de investimento privado não são parceiros...!?"
13130-177 = "...Aparentemente, como a senhorita disse."
13130-178 = "...!"
13130-179 = "D-Desde quando planejavam isso!?"
13130-180 = "Desde o início.#nPara começo de conversa, aquilo era nossa propriedade."
13130-181 = "Assim que o recuperarmos, a ressurreição da Nephthys será acelerada."
13130-182 = "Na época, nos causou um prejuízo enorme, mas#nquem diria que, no fim das contas, se tornaria uma mina de ouro."
13130-186 = "Dito isso, não sei quando o Sensei voltará."
13130-187 = "Sem a ajuda do Schale, seria impossível para a senhorita chegar ao local do evento..."
13130-191 = "Eu estava preocupado que o plano pudesse dar errado, mas..."
13130-196 = "Que bom que você veio por conta própria."
13130-201 = "Você foi usada, senhorita."
13130-211 = "Ah...!?"
13130-215 = "(Mordomo...)"
13130-216 = "(Desde o começo, você pretendia fazer isso...)"
13130-222 = "Yume-senpai, por que..."
13130-223 = "Onde você está, senpai...#nPor favor... volte."
13130-224 = "Senpai, eu estava errada..."
13130-228 = "...Yume-senpai."
13130-230 = "(Ah...)"
13130-231 = "(Hoje também não consegui encontrá-la...)"
13130-232 = "(Até quando, afinal, continuarei vagando por aquele deserto...)"
13130-238 = "(Todo dia, dia após dia...)"
13130-239 = "(Por que chegar a esse ponto...)"
13130-240 = "(Se eu tivesse esquecido de tudo e ido embora daqui...)"
13130-244 = "(Se eu tivesse feito parecer que tudo não passou de um sonho...)"
13130-245 = "(Eu não teria que sofrer tanto assim...)"
13130-246 = "(Por que...)"
13130-252 = "(Isso é algo que eu também poderia dizer...)"
13130-253 = "(Se eu pudesse esquecer... se tudo não tivesse passado de um sonho, teria sido melhor)"
13130-257 = "(Naquele dia, eu...)"
13130-261 = "……Hoshino, senpai."
13130-266 = "Bom trabalho, Suou-san.#nPor favor, tome a carteira de estudante e o cartão da senhorita."
13130-267 = "……Era mentira quando disse que ela se tornaria a presidente do conselho estudantil da Highlander?"
13130-268 = "Naturalmente."
13130-269 = "A senhorita cumprirá um papel de refém, que é mais adequado do que o de presidente do conselho estudantil."
13130-270 = "Mesmo que seja, ela não é uma senhorita da Nephthys?"
13130-271 = "Sim. Mas esta é uma diretriz decidida pelo conselho administrativo.#nClaro, não temos a intenção de causar nenhum dano a ela."
13130-272 = "Então, vamos entrar em contato com o Comitê de Contramedidas e dizer para comparecerem à assembleia geral."
13130-273 = "E dizer que, se não comparecerem, a senhorita será transferida para a Highlander."
13130-275 = "……Podemos continuar com o contrato?"
13130-276 = "Pelo contrário."
13130-277 = "Faremos com que aleguem que o 'Conselho Estudantil de Abydos' não existia como uma organização estudantil real.#nAssim, o contrato em si será invalidado e os direitos da ferrovia passarão a ser da Nephthys."
13130-279 = "……Entendo."
13130-280 = "Embora o Sensei do Schale não esteja aqui,#nse dissermos que estamos cuidando da senhorita, eles provavelmente farão o que queremos."
13130-281 = "……Bem, não importa quem vença.#nQuem estiver de pé no final será a Nephthys."
13130-282 = "Então, não importa como as coisas aconteçam, o plano é que o trem blindado acabe nas mãos da Nephthys?"
13130-283 = "Sim, agora, por favor, leve a senhorita."
13130-284 = "Eu entrarei em contato com o Comitê de Contramedidas."
13130-294 = "Me desculpem, pessoal……."
13130-295 = "Cof, cof……."
13130-299 = "Desde o início, eu nunca deveria ter estado em Abydos."
13130-300 = "Não importa o quanto eu tente, eu sou alguém da Nephthys."
13130-301 = "Eu, que vim para Abydos por culpa, não tenho o direito de ficar."
13130-302 = "Por favor, esqueçam que eu existo."
13130-303 = "Não precisam fingir que a presidente do conselho estudantil... que o Conselho Estudantil de Abydos nunca existiu."
13130-304 = "Se for o Sensei, ele encontrará o trem blindado e o destruirá."
13130-313 = "……Foi o que ela disse."
13130-314 = "Os membros do Comitê de Contramedidas só precisam declarar na assembleia geral dos credores que#no Conselho Estudantil de Abydos era uma entidade não reconhecida."
13130-315 = "Assim, o contrato em si será invalidado."
13130-316 = "A senhorita disse aquilo agora há pouco, mas...#nno fundo, ela deve querer passar o tempo com vocês."
13130-320 = "……Não resta muito tempo até a assembleia geral."
13130-321 = "Espero que vocês façam uma escolha inteligente."
13130-326 = "……."
13130-329 = "……Nonomi-senpai."
13130-330 = "I-isso não pode ser……."
13130-331 = "Nonomi……."
13130-333 = "……."
13130-338 = "Se-senpai, onde você vai!?"
13130-339 = "……Para a assembleia geral."
13130-340 = "Você vai fazer o que aquele mordomo quer!?"
13130-341 = "Eu não quero perder mais ninguém que seja importante para mim."
13130-343 = "Ma-mas, nós sozinhas não vamos conseguir..."
13130-344 = "É verdade, Hoshino-senpai. #nVamos esperar pelo contato do Sensei."
13130-346 = "......Vocês fiquem aqui e esperem."
13130-351 = "Hã!?"
13130-353 = "Você vai sozinha!? #nNão tem como vencer contra aquele número de inimigos!"
13130-354 = "......Eu consigo vencer, se for eu."
13130-355 = "......Depois de salvar a Nonomi, você pretende derrotar o fundo de investimento privado e a Nephthys, não é?"
13130-356 = "......"
13130-357 = "Eh!?"
13130-358 = "Não precisam se preocupar com o que vier depois."
13130-359 = "O Comitê de Contramedidas não tem responsabilidade nenhuma nisso."
13130-360 = "O que você quer dizer com isso, senpai!"
13130-361 = "A única que deve arcar com a responsabilidade sou eu."
13130-362 = "Por isso, todas vocês fiquem aqui."
13130-364 = "......!!"
13130-365 = "......"
13130-366 = "Quem é esse \"todas\" que a Hoshino-senpai está falando?"
13130-371 = "Todas do Comitê de Contramedidas. #nA verdadeira organização do conselho estudantil, reconhecida pelo Schale."
13130-389 = "Shi-Shiroko-senpai!?"
13130-391 = "......Isso é perigoso, Shiroko-chan."
13130-396 = "Vamos resolver isso, senpai. #n......Venha comigo."
13130-402 = "Ei, Shiroko-senpai!"
13130-403 = "Re-resolver isso...!?"
13130-411 = "......Faz tempo que não temos um duelo assim."
13130-412 = "Esta velha aqui está ficando empolgada, apesar da idade."
13130-420 = "Es-esperem, por favor...! #nHoshino-senpai, Shiroko-senpai!?"
13130-421 = "Por que as coisas chegaram a esse ponto..."
13130-422 = "Se-Serika-chan..."
13130-423 = "Ah, quer saber! Não temos escolha a não ser ir atrás delas!"
13130-429 = "Próximo episódio: Comitê de Contramedidas"
