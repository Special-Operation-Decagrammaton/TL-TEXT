[translation]
70005010-1 = "Registro de um certo 18 de fevereiro"
70005010-3 = "[log]18 de fevereiro[/log]"
70005010-6 = "Sala do Comitê Disciplinar da Academia Gehenna"
70005010-7 = "Vocês já fizeram o pedido do bolo?"
70005010-8 = "O prazo para o pedido é hoje, sabia!?"
70005010-10 = "Ako-chan, é a quantas vezes que você pergunta isso?"
70005010-12 = "Fiquem tranquilas. Embora o orçamento esteja no limite, consegui fazer o pedido..."
70005010-14 = "...Sim?"
70005010-15 = "Orçamento no limite...? Por que isso?"
70005010-16 = "Para isso, cortei parte do orçamento de doces desde o mês passado."
70005010-18 = "Eu estava achando que tinha menos doces ultimamente..."
70005010-19 = "De qualquer forma, por que o orçamento está tão apertado?"
70005010-20 = "É que o Pandemonium Society, o Pandemonium..."
70005010-21 = "Aqueles guaxinins de novo? O que eles fizeram desta vez...?"
70005010-22 = "Eles colocaram a conta do presente no nome do Comitê Disciplinar..."
70005010-23 = "...O Pandemonium para a presidente do comitê!? A presidente Makoto bateu a cabeça ou algo assim!?"
70005010-24 = "Não... parece que ela tentou encomendar um dorayaki sem recheio de feijão doce."
70005010-25 = "Dorayaki sem recheio de feijão... onde ela foi arranjar uma coisa dessas..."
70005010-27 = "Dizem que ela pediu sob encomenda."
70005010-28 = "E olha que tem tantas outras coisas em que deveriam focar..."
70005010-29 = "Mas parece que entregaram um dorayaki normal. Acho que acharam que foi um erro no pedido ou algo do tipo."
70005010-30 = "Entendo... ah..."
70005010-31 = "Hm? Esperem. De qualquer forma, a conta ainda vai vir para nós, não é!?"
70005010-32 = "Sim..."
70005010-34 = "Por causa disso, o orçamento ficou super apertado..."
70005010-35 = "O pedido foi feito com sucesso, mas tivemos que escolher a transportadora de categoria mais baixa."
70005010-36 = "..."
70005010-37 = "Bem, se for só isso, tudo bem. Quanto mais barato o frete, melhor."
70005010-38 = "Como está a situação da entrega?"
70005010-39 = "Espere um pouco — aqui, o site de rastreamento."
70005010-40 = "Obrigada. Deixe-me ver... passou pelo centro de Nishikawa..."
70005010-41 = "Sim. Desse jeito, deve chegar a tempo."
70005010-42 = "Já estou ansiosa pelo dia de amanhã. Bom trabalho a todas."
70005010-43 = "E-ei, espera..."
70005010-44 = "Chinatsu, aconteceu alguma coisa?"
70005010-45 = "Não..."
70005010-50 = "(Sinto um pressentimento ruim...)"
70005010-51 = "(Será que estou pensando demais?... Sim, com certeza deve estar tudo bem.)"
70005010-52 = "(Por favor... que nada aconteça...)"
70005010-54 = "Genryumon - Sala VIP"
70005010-55 = "Vejam isto. O Genryumon encomendou o bolo de aniversário da nossa líder na famosa confeitaria."
70005010-56 = "Vocês, sem precisar recorrer à Associação Genbu... entenderam?"
70005010-57 = "Algo desse nível é moleza se usarmos o poder do Genryumon."
70005010-58 = "Ah, sim. Bem, acho que escolheram algo bom. Mas, sobre o bolo... não deveríamos ir buscar na loja?"
70005010-59 = "Contratei uma transportadora para garantir que chegue às nossas mãos com segurança. Claro, não houve descuido na seleção. Contratei a que é mais barata e entrega mais rápido."
70005010-60 = "...Isso é seguro?"
70005010-61 = "Hm? Foi uma das opções apresentadas pela confeitaria. Não deve haver problemas. Além disso, é barato e rápido. Não há do que reclamar, não é?"
70005010-62 = "Não sei se é uma boa ideia acreditar nisso cegamente..."
70005010-63 = "Eles só fazem propaganda porque têm confiança, não é?"
70005010-64 = "Ah... será que ela é ingênua ou... Por favor, me empreste esse panfleto."
70005010-72 = "……！？ Logo aqui, de todos os lugares!?"
70005010-73 = "A, algum problema com isso?"
70005010-75 = "……Já que é uma boa oportunidade, por favor, grave isto: #nEste fornecedor é, literalmente, o mais barato e rápido. ……Desde que nada aconteça."
70005010-76 = "Eu sabia! Parece que meu julgamento não falhou."
70005010-77 = "O ponto principal é o \"desde que nada aconteça\"."
70005010-78 = "……O que quer dizer com isso?"
70005010-82 = "Significa que há uma probabilidade considerável de se envolver em problemas de entrega."
70005010-83 = "Mesmo assim, não deve ser nada demais, certo?"
70005010-84 = "Não subestime a situação. #nO mais infame de todos é o \"Centro Nishikawa\"... também conhecido como o \"Labirinto Logístico\"."
70005010-85 = "O \"Centro Nishikawa\" é um dos maiores centros logísticos de Kivotos e, devido à sua escala imensa..."
70005010-86 = "Os problemas são constantes..."
70005010-87 = "P, problemas...?"
70005010-88 = "A lista é interminável, mas... #nAs encomendas se misturam e os destinos são trocados. É algo comum."
70005010-89 = "Absurdo! Como uma empresa dessas ainda não faliu!?"
70005010-90 = "Exatamente como você disse. Porque é \"a mais barata e rápida\". É só por isso."
70005010-91 = "……Embora, por trás disso, a \"precisão\" seja sacrificada."
70005010-92 = "……!"
70005010-93 = "G-Genryumon, reunir agora!!"
70005010-94 = "O que você pretende fazer? #nNão me diga que vai verificar cada uma das encomendas no centro, vai?"
70005010-98 = "Essa é uma ótima ideia!"
70005010-99 = "É justamente isso que eu estou dizendo para não fazer!"
