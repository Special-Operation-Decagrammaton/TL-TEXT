[translation]#[Texto Final. - Filipe 08/07.]
70005010-1 = "Registro de um Certo 18 de Fevereiro"
70005010-3 = "[log]18 de Fevereiro[/log]"
70005010-6 = "Sala do Comitê de Disciplina – Gehenna"
70005010-7 = "Você já encomendou o bolo?"
70005010-8 = "O prazo final é hoje, viu!?"
70005010-10 = "Ako-chan, essa é a quantas?"
70005010-12 = "Fiquem tranquilas. Mesmo no limite do orçamento, consegui fazer o pedido……"
70005010-14 = "……Hã?"
70005010-15 = "No limite do orçamento……? Como?"
70005010-16 = "Pra isso, cortei parte da verba de lanches desde o mês passado."
70005010-18 = "É por isso que os lanches tavam tão minguados……"
70005010-19 = "Mas por que o orçamento está tão apertado?"
70005010-20 = "É que o Pande-mônio……"
70005010-21 = "Aqueles tanukis de novo? O que foi dessa vez?"
70005010-22 = "Colocaram a conta dos presentes no nosso Comitê……"
70005010-23 = "……O Pande-mônio deu presente pra presidente? A Makoto bateu a cabeça?"
70005010-24 = "Não…… parece que tentaram encomendar dorayaki sem pasta de feijão."
70005010-25 = "Dorayaki sem pasta de feijão…… onde será que encontraram isso……"
70005010-27 = "Fizeram sob encomenda."
70005010-28 = "Deveriam se preocupar com outras coisas……"
70005010-29 = "Mas dizem que chegou um dorayaki normal. Acho que confundiram com erro de pedido."
70005010-30 = "É mesmo…… haa……"
70005010-31 = "Hã? Espera. De qualquer forma, a conta veio pra gente, né!?"
70005010-32 = "É……"
70005010-34 = "Por causa disso, o orçamento ficou no limite……"
70005010-35 = "O pedido deu certo, mas a transportadora é a mais barata possível."
70005010-36 = "……"
70005010-37 = "Bom, isso é aceitável. Frete mais barato é melhor."
70005010-38 = "Como está a entrega?"
70005010-39 = "Espera aí―― aqui, o rastreio."
70005010-40 = "Obrigada.#nVamos ver…… passou pelo centro Nishikawa……"
70005010-41 = "Sim. Parece que vai chegar a tempo."
70005010-42 = "Já estou ansiosa pra amanhã. Bom trabalho a todos."
70005010-43 = "Ah, é……"
70005010-44 = "Chinatsu, o que foi?"
70005010-45 = "Nada……"
70005010-50 = "(Estou com um mau pressentimento……)"
70005010-51 = "(Será que é exagero?…… Não, deve ficar tudo bem)"
70005010-52 = "(Por favor…… que nada aconteça……)"
70005010-54 = "Sala VIP – Portão do Dragão Negro"
70005010-55 = "Vejam só. O Portão do Dragão Negro encomendou o bolo de aniversário da nossa líder numa famosa confeitaria."
70005010-56 = "E vocês, sem depender da Câmara de Comércio Genbu……"
70005010-57 = "Isso é moleza com o poder do Portão do Dragão Negro."
70005010-58 = "Ah, sim. Acho que fizeram uma boa escolha.#nMas, sobre o bolo…… não precisam ir buscar?"
70005010-59 = "Contratei uma transportadora para entregar com segurança.#nClaro, na seleção não houve falhas. Escolhi a mais barata e mais rápida."
70005010-60 = "……Isso é seguro?"
70005010-61 = "Hã? É uma das opções da confeitaria. Dificilmente dá problema.#nE é barata e rápida. Não tem do que reclamar."
70005010-62 = "Acreditar cegamente nisso é perigoso……"
70005010-63 = "Se eles anunciam, é porque têm confiança, não?"
70005010-64 = "Haa…… será ingenuidade, ou…… Me empresta esse panfleto."
70005010-72 = "……!? Logo essa!?"
70005010-73 = "Tem algum problema?"
70005010-75 = "……Já que é uma boa oportunidade, guarde isso.#nEsta transportadora é literalmente a mais barata e rápida.…… enquanto nada der errado."
70005010-76 = "Sabia! Meu olho não falha!"
70005010-77 = "O importante é 'enquanto nada der errado'."
70005010-78 = "……O que você quer dizer?"
70005010-82 = "Que há uma grande chance de dar problema na entrega."
70005010-83 = "Mas não deve ser nada demais."
70005010-84 = "Não subestime.#nO infame 'Centro Nishikawa'…… também conhecido como 'Labirinto Logístico'."
70005010-85 = "O Centro Nishikawa é um dos maiores centros logísticos de Kivotos, tão grande que……"
70005010-86 = "os problemas nunca param……"
70005010-87 = "P-problemas……?"
70005010-88 = "É uma lista infinita……#nperder cargas, trocar destinos…… acontece direto."
70005010-89 = "Absurdo! Como uma empresa assim ainda existe?"
70005010-90 = "Exatamente como você disse: é a mais barata e rápida."
70005010-91 = "……o preço é a 'precisão'."
70005010-92 = "……!"
70005010-93 = "Ei! Portão do Dragão Negro, reunir!!"
70005010-94 = "O que vai fazer?#nNao me diga que vai verificar cada pacote no centro?"
70005010-98 = "Boa ideia!"
70005010-99 = "Por isso eu disse pra não fazer isso!"