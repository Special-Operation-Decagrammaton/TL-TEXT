[translation]#[Não revisado] - Filipe 09/06/26
2005902-1 = "Diabinha e a nobre vilã"
2005902-2 = "(Depois de um tempo, Mutsumi apareceu no Schale)"
2005902-4 = "Oii, professooor!"
2005902-5 = "[s] \"Nossa, você está super arrumada hoje!\""
2005902-6 = "Kufufu, obrigada. Na verdade, eu queria testar uma coisa com essa roupa."
2005902-7 = "Outro dia, recebi uma missão –"
2005902-8 = "E eu teria que interpretar uma garota rica, daquelas de família tradicional."
2005902-9 = "Uma megera... a tal de 'nobre vilã', sabe?"
2005902-10 = "[s] \"Q-que missão é essa?\""
2005902-11 = "Os detalhes são segredo comercial. Kufufu."
2005902-12 = "É por isso que eu preciso de alguém para treinar comigo."
2005902-13 = "Ei, Sensei... você vai me ajudar, né?"
2005902-14 = "[s] \"Pode deixar!\""
2005902-15 = "Kufufu, sabia que você diria isso!"
2005902-16 = "Então, vamos começar?"
2005902-17 = "..."
2005902-19 = "...!"
2005902-20 = "Ahah...!"
2005902-21 = "Ó-hohohoho!!"
2005902-23 = "(A expressão dela mudou...!)"
2005902-24 = "Você aí. Esta nobre está com sede. Traga uma bebida para mim agora mesmo."
2005902-25 = "Uma bebida digna da minha pessoa!"
2005902-26 = "[s] \"Q-que tal um chá...?\""
2005902-27 = "Ó-hohoho. Você entende das coisas."
2005902-28 = "Traga agora."
2005902-29 = "Rápido!"
2005902-30 = "[s] \"Uau! Parece mesmo uma nobre vilã!\""
2005902-31 = "O que está dizendo?"
2005902-32 = "Três segundos. Traga o chá imediatamente!"
2005902-33 = "[s] \"S-sim! Já volto...!\""
2005902-40 = "[ns] \"Aqui está!\""
2005902-41 = "Isso é..."
2005902-42 = "Chá preto oolong?"
2005902-43 = "Esta nobre não bebe chá de plebeu. Você está louco?"
2005902-44 = "[s] \"Mas só tinha oolong...\""
2005902-45 = "Ah, então parece que você precisa de uma lição."
2005902-46 = "Vamos, ajoelhe-se e seja a minha cadeira."
2005902-47 = "[s] \"Acho que uma cadeira normal é mais confortável...\""
2005902-48 = "Uma nobre como eu se sentaria em algo tão ordinário?"
2005902-49 = "Sem perguntas. Seja minha cadeira agora."
2005902-50 = "Sinta-se honrada. Essas oportunidades são raras, sabia?"
2005902-51 = "[s] \"S-sim, senhora!\""
2005902-53 = "(Ficou de quatro e serviu de cadeira para Mutsumi...)"
2005902-56 = "Ó-hohoho! Que vista agradável!"
2005902-57 = "O que acha? Como se sente sendo mandada por uma garota muito mais nova que você?"
2005902-58 = "A humilhação de ser pisada?"
2005902-59 = "[s] \"N-não é tão ruim assim...\""
2005902-60 = "Ora... não se importa?"
2005902-61 = "[s] \"Por você, Mutsumi, eu faria de tudo!\""
2005902-62 = "..."
2005902-63 = "Puf...!"
2005902-64 = "Ahahahaha!"
2005902-65 = "Poxa, Sensei... ahahahaha!... Você é tão engraçado, não aguento!"
2005902-70 = "[ns] \"Hã? Já acabou?\""
2005902-71 = "Kufufu. Você queria mais?"
2005902-72 = "Olha só, também tenho um chicote! E aí? Quer tentar um nível mais alto?"
2005902-73 = "Sensei... você gosta de palmadas no bumbum?"
2005902-74 = "[s] \"I-isso é...!\""
2005902-75 = "Ahaha! Brincadeira, brincadeira. Não iria tão longe."
2005902-76 = "Pronto, acabou!"
2005902-77 = "E então? A Mutsumi-chan parecia uma nobre vilã?"
2005902-78 = "[s] \"Sim. A ponto de eu fazer tudo que você mandava...\""
2005902-79 = "Ahaha! A sua cara de assustado foi muito engraçada!"
2005902-80 = "Ah, ri tanto que deu sede. Tem alguma coisa para beber?"
2005902-81 = "[s] \"Aceitaria um chá oolong, senhora?\""
2005902-82 = "Ah, você ainda está nessa?"
2005902-83 = "Kufufu, claro. Eu gosto de chá oolong."
2005902-86 = "Ah, que gostoso!"
2005902-87 = "(Depois, passou o tempo conversando sobre várias coisas com Mutsumi)"
2005902-88 = "(Por alguma razão, a risada de Mutsumi não saía da sua cabeça)"
2005902-92 = "Ó-hohohoho!"