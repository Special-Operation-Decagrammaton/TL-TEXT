[translation]
2005902-1 = "小悪魔と悪役令嬢"
2005902-2 = "（しばらくすると、ムツキがシャーレにやってきた）"
2005902-4 = "やっほ～、先生！"
2005902-5 = "[s] \"今日はすごくおしゃれだね！\""
2005902-6 = "くふふっありがと♪#n実は、この格好で確かめたいことがあってさ～"
2005902-7 = "この間、とある依頼を受けたんだけど――"
2005902-8 = "そこでお金持ちのお嬢様を演じることになっちゃったんだよね。"
2005902-9 = "性悪の……いわゆる「悪役令嬢」ってやつ？"
2005902-10 = "[s] \"ど、どんな依頼……！？\""
2005902-11 = "詳しいことは企業秘密ってことで♪くふふっ。"
2005902-12 = "そんなわけで、練習相手が必要なんだよね。"
2005902-13 = "ねえ先生……もちろん、付き合ってくれるよね？"
2005902-14 = "[s] \"いくらでも！\""
2005902-15 = "くふふっ、そう言ってくれると思った！"
2005902-16 = "じゃあ早速……はじめよっか？"
2005902-17 = "……。"
2005902-19 = "……！"
2005902-20 = "アハッ……！"
2005902-21 = "オーッホッホッホ！！"
2005902-23 = "（雰囲気が変わった……！）"
2005902-24 = "そこの貴方[ruby=わたくし]。私、[/ruby]喉が渇いたのだけど……#nすぐに飲み物を持ってきてちょうだい。"
2005902-25 = "こ[ruby=わたくし]の私に[/ruby]相応しい飲み物をね！"
2005902-26 = "[s] \"お、お茶はいかがでしょうか……？\""
2005902-27 = "オーッホッホ。分かってるじゃない。"
2005902-28 = "すぐに持ってきて。"
2005902-29 = "早く！"
2005902-30 = "[s] \"すごい！？本当に悪役令嬢みたいだね！\""
2005902-31 = "貴方、一体何を言っているの？"
2005902-32 = "3秒あげるわ。今すぐお茶を持ってきてちょうだい！"
2005902-33 = "[s] \"は、はい！ただいま……！\""
2005902-40 = "[ns] \"お持ちしました！\""
2005902-41 = "これは……。"
2005902-42 = "ウーロン茶じゃない！？"
2005902-43 = "[ruby=わたくし]私こ[/ruby]んな庶民のお茶……貴方、正気？"
2005902-44 = "[s] \"でも今はウーロン茶しかなくて……。\""
2005902-45 = "はあ、どうやらお仕置きが必要なようね。"
2005902-46 = "ほら、地面に跪いて[ruby=わたくし]、私の[/ruby]椅子になりなさい。"
2005902-47 = "[s] \"多分、普通の椅子の方が座り心地いいと思うけど……。\""
2005902-48 = "[ruby=わたくし]私の[/ruby]ような高貴な人間が、そんなものに座るとでも？"
2005902-49 = "口答えせず、早く椅子になりなさい。"
2005902-50 = "光栄に思うのね。こんな機会、滅多にないのよ？"
2005902-51 = "[s] \"い、イエス、マム！\""
2005902-53 = "（その場で四つん這いになり、ムツキの椅子になった……）"
2005902-56 = "オーッホッホ！いい眺めね！"
2005902-57 = "どうかしら？自分よりもずっと年下の女の子にいいようにされる気分は？"
2005902-58 = "あまつさえ、背中に乗られて屈辱を受ける気分は！"
2005902-59 = "[s] \"わ、悪くないかな？\""
2005902-60 = "あら……？イヤではないのかしら？"
2005902-61 = "[s] \"ムツキになら、いくらでも！\""
2005902-62 = "……。"
2005902-63 = "ぷっ……！"
2005902-64 = "あははははっ！"
2005902-65 = "もー先生ってば……あははははっ！……面白すぎてもう、無理！"
2005902-70 = "[ns] \"ん？もう終わり？\""
2005902-71 = "くふふっ。もしかして……もーっとやりたかった？"
2005902-72 = "じゃじゃーん、ムチもあるよ？どうする？#nハイレベルなのもやってみる？"
2005902-73 = "先生はぁ……お尻ぺんぺんとか、好き？"
2005902-74 = "[s] \"そ、それは……！\""
2005902-75 = "あははっ！じょーだんじょーだん。#n私もそこまでする気はないかな。"
2005902-76 = "はい、終わり！"
2005902-77 = "どう？ムツキちゃん、悪役令嬢っぽかった？"
2005902-78 = "[s] \"うん。思わず言うこと聞いちゃうくらい……。\""
2005902-79 = "あははっ！先生のビックリした顔、ちょー面白かった！"
2005902-80 = "あ～笑いすぎて喉渇いちゃった。#n何か飲み物ない？"
2005902-81 = "[s] \"ウーロン茶でも大丈夫でしょうか、お嬢様……？\""
2005902-82 = "あ、まだそれ続いてるの？"
2005902-83 = "くふふっ、もちろん。#nウーロン茶好きだからね。"
2005902-86 = "あ～美味し～！"
2005902-87 = "（その後、ムツキといろんなお話をして過ごした）"
2005902-88 = "（……なぜか、ムツキのあの笑い声が頭から離れなかった）"
2005902-92 = "オーッホッホッホ！"
