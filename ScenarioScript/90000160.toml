[translation]
90000160-1 = "Episódio 17: O Quinto Profeta"
90000160-3 = "……Impossível. Não sobrou nenhum vestígio."
90000160-4 = "Literalmente, desapareceu sem deixar rastros."
90000160-5 = "……."
90000160-6 = "[s] \"Quem diabos seriam eles?\""
90000160-7 = "……Engenheiras que herdaram a vontade de Decagrammaton, cientistas e colaboradoras dos profetas... Por enquanto, é a única coisa que podemos pensar."
90000160-8 = "Então, mesmo que Decagrammaton tenha morrido, sua vontade ainda vive."
90000160-9 = "Não sei por que nos chamaram, mas... talvez precisassem de nós para completar a existência que chamavam de \"Irmã Mais Velha\"..."
90000160-10 = "……O que será que elas estavam buscando……."
90000160-11 = "Seria o \"Abi-Eshuh\", que reflete a tecnologia dos Sacerdotes Sem Nome e dos Deuses Sem Nome……"
90000160-15 = "Ou talvez o \"Shittim Chest\", o artefato deixado pela Presidente do Conselho Estudantil……"
90000160-16 = "[s] \"…….\""
90000160-17 = "Ou talvez seja o meu terrível poder de \"Onisciência\", a genial, pura e frágil hacker, Akeboshi Himari……"
90000160-18 = "(Acho que não é isso)"
90000160-19 = "A propósito, a quem elas se referiam como \"Irmã Mais Velha\"?"
90000160-20 = "Pois é. Acho que precisamos analisar isso também……"
90000160-21 = "Chefe, você se lembra?"
90000160-22 = "Sim?"
90000160-23 = "As últimas palavras que Decagrammaton disse antes, na área de pesquisa em ruínas."
90000160-25 = "Eu posso ver……!"
90000160-26 = "O último profeta que guia todos os profetas, \"Malkuth\", começando a provar minha existência novamente……!!"
90000160-30 = "Malkuth……."
90000160-31 = "……."
90000160-32 = "……."
90000160-33 = "……A \"última Sephirah\" da Árvore da Vida…… era isso."
90000160-34 = "……Talvez uma nova ameaça, completamente diferente de tudo o que vimos, esteja chegando."
90000160-35 = "……O que devemos fazer?"
90000160-36 = "Vamos nos preparar."
90000160-37 = "Para a batalha contra as existências que herdaram a vontade de Decagrammaton... Ain, Soph, Aur. #nContra elas."
90000160-38 = "[s] \"…….\""
90000160-39 = "Provavelmente isso... começará em um futuro não muito distante."
90000160-40 = "Será uma longa batalha contra os 10 profetas registrados na Árvore da Vida."
90000160-42 = "Todos os profetas……"
90000160-43 = "Sim. Por isso, começarei a preparar as medidas necessárias a partir de agora."
90000160-44 = "……Primeiro, continuaremos coletando informações no mar de gelo. #nPrecisamos garantir o máximo de informações possível sobre o quinto profeta, Geburah."
90000160-45 = "Sim, concordo. Aqui é fresco e eu gosto. #nVamos relaxar como se estivéssemos de férias."
90000160-46 = "Não, não é bem assim, Eimi. Não dá para tirar férias em um lugar tão frio."
90000160-47 = "Acho que férias seriam boas. É justamente nessas horas que é importante manter a calma."
90000160-48 = "Viu, Toki também disse isso."
90000160-49 = "……Sensei?"
90000160-50 = "[s] \"Bem, não adianta ficar tenso, vamos levar com calma.\""
90000160-51 = "Ah... até você, Sensei."
90000160-52 = "……Entendido. Também vou reforçar minha proteção contra o frio. #nVamos aproveitar essas férias em um lugar congelante."
90000160-53 = "Isso aí, então vamos partir~"
