[translation]
90000160-1 = "第17話;5番目の預言者"
90000160-3 = "……無理。もうなんの痕跡も残ってない。"
90000160-4 = "文字通り、跡形もなく消えてしまったのですね。"
90000160-5 = "……。"
90000160-6 = "[s] \"一体、何者なんだろう？\""
90000160-7 = "……デカグラマトンの意志を受け継ぐエンジニアであり、科学者であり、預言者の協力者……。今はそう思うしかありません。"
90000160-8 = "デカグラマトンが死んでも、意志はまだ生きている、と。"
90000160-9 = "何故私たちを呼び寄せたのかは分かりませんが……「お姉様」と呼んでいた存在を完成させるのに私たちが必要だったのではないかと……。"
90000160-10 = "……一体、彼女たちは何を求めていたのでしょう……。"
90000160-11 = "無名の司祭と名もなき神々の技術が反映されている「アビ・エシュフ」なのか……"
90000160-15 = "それとも連邦生徒会長の残したオーパーツ、「シッテムの箱」か……"
90000160-16 = "[s] \"……。\""
90000160-17 = "もしくは、天才清楚系病弱美少女ハッカーである私、[ruby=あけぼし]明星[/ruby]ヒマリの恐るべき「全知」の力かもしれません……"
90000160-18 = "（それは違うと思うけど）"
90000160-19 = "ところで、彼女たちが言っていた「お姉様」とは、誰のことを指していたのでしょうか。"
90000160-20 = "そうですね。それを含めて分析が必要かと……"
90000160-21 = "部長、覚えてる？"
90000160-22 = "はい？"
90000160-23 = "以前、廃墟の研究地区でデカグラマトンが言った最期の言葉。"
90000160-25 = "私には見える……！"
90000160-26 = "すべての預言者を導く最後の預言者「マルクト」が、再び私の存在証明を始める姿が……！！"
90000160-30 = "マルクト……。"
90000160-31 = "……。"
90000160-32 = "……。"
90000160-33 = "……生命の樹の「最後のセフィラ」……でしたね。"
90000160-34 = "……これまでとは全く異なる、新たな脅威が訪れているのかもしれません。"
90000160-35 = "……私たちは何をすればいい？"
90000160-36 = "備えましょう。"
90000160-37 = "デカグラマトンの意志を受け継ぐ存在……アイン、ソフ、オウル。#n彼女たちとの戦いに。"
90000160-38 = "[s] \"……。\""
90000160-39 = "おそらくそれは……そう遠くない未来にはじまります。"
90000160-40 = "生命の樹に記録された10の預言者を敵とする、長い戦いとなることでしょう。"
90000160-42 = "預言者全員を……"
90000160-43 = "はい。ですので、今から万全を期して対策の準備にかかります。"
90000160-44 = "……まずは、引き続き氷海で情報収集を。#n5番目の預言者、ゲブラの情報をできる限り確保しなければなりません。"
90000160-45 = "うん、賛成。ここ、涼しくて気に入ってるんだ。#nバカンス気分でゆっくりしていこう。"
90000160-46 = "いえ、それは違いますよエイミ。こんな寒いところではバカンスになりません。"
90000160-47 = "バカンス、良いと思います。こういう時こそ、余裕を失わない姿勢が大切です。"
90000160-48 = "ほら、トキもこう言ってるし。"
90000160-49 = "……先生? "
90000160-50 = "[s] \"まあ、気を張っても仕方ないし、のんびりやっていこうか。\""
90000160-51 = "はあ……先生まで。"
90000160-52 = "……分かりました。私も防寒対策を強化します。#n酷寒地のバカンスを楽しむとしましょうか。"
90000160-53 = "うん、それじゃあ出発～"
