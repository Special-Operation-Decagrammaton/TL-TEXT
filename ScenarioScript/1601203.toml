[translation]
1601203-1 = "色んな料理が食べたい！"
1601203-2 = "先生遅い！"
1601203-6 = "もう、せっかく返そうって気持ちになったのに。"
1601203-7 = "[s] \"お返しに何をされるかと思うと、怖くて怖くて……。\""
1601203-8 = "な、なんで泣くのよ！怖いことじゃないってば！"
1601203-9 = "だから、「お返ししてやる」って言ったのはそういう意味じゃなくて……。"
1601203-10 = "ああもう、そろそろ泣くのやめなさいよ！？"
1601203-11 = "[s] \"正月の買い物に来たいんだったら、普通に誘ってくれても良かったのに。\""
1601203-12 = "えっと、まあだいたいそんな感じだけど……。"
1601203-13 = "ここはね、一味違う場所なのよ！"
1601203-14 = "[s] \"違うって、何が？\""
1601203-15 = "先生はお正月の料理って聞いたら、何を思い浮かべる？"
1601203-16 = "きっと年越しそばにおせち料理、お雑煮……そんなところよね。"
1601203-17 = "もちろんどれも美味しいわ。私も大好きだし。"
1601203-18 = "でも……それじゃあまりにも定番すぎる！私はこれでも美食研究会のメンバー！さらなる美食を探求しないと！"
1601203-19 = "ということで今年こそ、色んなお正月料理を本気で味わってみることにしたの！"
1601203-20 = "[s] \"そういえば、ここは……。\""
1601203-21 = "ふっふっふっ……やっと気づいたようね、この場所の特徴に！"
1601203-22 = "そう、ここは他じゃ味わえないような、一風変わったお正月料理を売ってるの！"
1601203-23 = "さ、先生！何から食べにいく？"
1601203-24 = "この前の「ルワゾー・ブッレ」のこともあるし、私が奢るわ！"
1601203-25 = "……よ、予算が許す範囲で、だけど。"
1601203-28 = "あっ……おじさん、この餃子みたいなのはなに？"
1601203-29 = "餃子は餃子さ！「チャオズ」って言うんだ！"
1601203-30 = "安全を祈る時は豆腐と白菜を、誰かの平穏を祈る時には豆を。"
1601203-31 = "長寿を祈る時には麺、昇進を祈る時には餅を入れて作るものなんだ！"
1601203-32 = "さあ、どれにする？"
1601203-33 = "え、えっと……？ど、どうしよう、先生？"
1601203-34 = "とりあえず美味しいものをたくさん食べるためには、安全が大事……？たしかに、それもそうね。"
1601203-35 = "じゃあ、豆腐と白菜のを2つ！"
1601203-37 = "あれっ、この香ばしい匂いは……？"
1601203-41 = "「ホッピン・ジョン」という食べものですよ。"
1601203-42 = "豆と豚肉、葉物野菜を炒めてから、それを煮出して作るんです。"
1601203-43 = "豆は「硬貨」を、葉物野菜の方は「紙幣」を意味します。"
1601203-44 = "これを食べて、お金持ちになれますようにと願うんですよ。"
1601203-45 = "本当にお金持ちになったら、美味しいものも好きなだけ食べれるわよね……？"
1601203-46 = "じゃあこれ、2人前で！"
1601203-48 = "この、何だかすごそうなパイは……？"
1601203-49 = "「ガレット・デ・ロワ」ってんだ。「王様の菓子」って意味でね。"
1601203-50 = "バターをたっぷり含んだサクサクの生地の中に、アーモンドクリームがぎっしり入っているよ。"
1601203-51 = "うわあ……！"
1601203-52 = "パイの中には「フェーヴ」っていう、小さな焼き物の人形が入っていてな。"
1601203-53 = "「フェーヴ」を見つけた人は、王様になれるらしい。"
1601203-54 = "王様になったら、何ができるの？"
1601203-55 = "とりあえずここなら、パイをもう1切れプレゼントだ。"
1601203-56 = "そしたら、とりあえず2切れちょうだい！"
1601203-58 = "美味しかったー！"
1601203-59 = "[s] \"たくさん食べたね。お腹は大丈夫？\""
1601203-60 = "うん！どれも美味しくて、個性的で……。"
1601203-61 = "それで……"
1601203-68 = "[ns] \"……ジュンコ？\""
1601203-69 = "っ……！"
1601203-70 = "う、動けない……息が……。"
1601203-71 = "[s] \"ど、どうした！？\""
1601203-72 = "先生、どうしよう……。"
1601203-73 = "た、食べ過ぎたかも……？"
1601203-75 = "（顔が青くなったジュンコに消化を促進する胃薬を買ってあげた……）"
1601203-77 = "あ、ありがとう先生……おかげで生き返った。"
1601203-78 = "ご、ごめんなさい……私のせいで、楽しい食事のはずが……。"
1601203-79 = "[s] \"良くなったみたいだし、ジュンコも楽しそうだったし、大満足だよ。\""
1601203-80 = "……ほんと？私のことを、気遣って言ってない？"
1601203-81 = "あ、ありがと……とにかく、これじゃ明日まで何も食べれそうにないわ。"
1601203-82 = "うーん、アカリみたいにもっとたくさん食べられたら良いのに……。"
1601203-84 = "（落ち込んだジュンコをなだめつつ、シャーレに戻った）"
