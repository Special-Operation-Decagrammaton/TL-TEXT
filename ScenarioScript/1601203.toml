[translation]
1601203-1 = "Eu quero comer vários tipos de pratos!"
1601203-2 = "Sensei, você está atrasado!"
1601203-6 = "Poxa, eu finalmente tinha criado coragem para retribuir."
1601203-7 = "[s] \"Fico com tanto medo de pensar no que você faria como retribuição...\""
1601203-8 = "P-por que você está chorando?! Eu disse que não era nada assustador!"
1601203-9 = "É por isso que, quando eu disse que ia 'retribuir', não foi nesse sentido..."
1601203-10 = "Ah, chega, pare de chorar agora mesmo!?"
1601203-11 = "[s] \"Se você queria vir fazer compras de Ano Novo, podia ter me convidado normalmente.\""
1601203-12 = "Bem, é, mais ou menos isso, mas..."
1601203-13 = "Este lugar aqui é diferente, sabe!"
1601203-14 = "[s] \"Diferente como?\""
1601203-15 = "Sensei, o que vem à sua mente quando pensa em comida de Ano Novo?"
1601203-16 = "Com certeza soba de véspera, osechi, ozoni... essas coisas, né?"
1601203-17 = "Claro que tudo isso é delicioso. Eu também adoro."
1601203-18 = "Mas... isso é muito comum! Eu sou um membro do Clube de Pesquisa Gastronômica! Preciso explorar sabores ainda mais refinados!"
1601203-19 = "Por isso, este ano, decidi provar de verdade vários pratos de Ano Novo!"
1601203-20 = "[s] \"Falando nisso, este lugar é...\""
1601203-21 = "Fufufu... finalmente percebeu a característica deste lugar, não é!"
1601203-22 = "Isso mesmo, aqui eles vendem pratos de Ano Novo incomuns que você não encontra em outros lugares!"
1601203-23 = "Vamos, Sensei! O que vamos comer primeiro?"
1601203-24 = "Por causa daquela história do 'L'Oiseau Bleu', eu pago!"
1601203-25 = "...D-desde que o orçamento permita, é claro."
1601203-28 = "Ah... tio, o que é isso que parece um guioza?"
1601203-29 = "Guioza é guioza! Chama-se 'Jiaozi'!"
1601203-30 = "Para pedir segurança, fazemos com tofu e acelga; para pedir pela paz de alguém, usamos feijão."
1601203-31 = "Para pedir longevidade, usamos macarrão; e para pedir por uma promoção, colocamos mochi!"
1601203-32 = "E então, qual você vai querer?"
1601203-33 = "E-e agora...? O que a gente faz, Sensei?"
1601203-34 = "Bem, para comer muitas coisas gostosas, a segurança é importante...? É, pensando bem, faz sentido."
1601203-35 = "Então, dois de tofu e acelga!"
1601203-37 = "Ué, que cheiro saboroso é esse...?"
1601203-41 = "É um prato chamado 'Hoppin' John'."
1601203-42 = "É feito refogando feijão, carne de porco e folhas verdes, e depois cozinhando tudo."
1601203-43 = "O feijão representa 'moedas', e as folhas verdes representam 'notas de dinheiro'."
1601203-44 = "Comemos isso desejando ficar ricos."
1601203-45 = "Se a gente realmente ficar rico, poderemos comer tudo o que quisermos, né...?"
1601203-46 = "Então, duas porções disso!"
1601203-48 = "E essa torta que parece incrível...?"
1601203-49 = "É uma 'Galette des Rois'. Significa 'Bolo do Rei'."
1601203-50 = "Dentro da massa crocante, cheia de manteiga, tem um recheio farto de creme de amêndoas."
1601203-51 = "Uau...!"
1601203-52 = "Dentro da torta, tem uma pequena figura de cerâmica chamada 'fève'."
1601203-53 = "Dizem que quem encontrar a 'fève' se torna o rei."
1601203-54 = "Se virar rei, o que a gente ganha?"
1601203-55 = "Por enquanto, aqui, você ganha mais uma fatia de torta."
1601203-56 = "Então, me dá duas fatias logo!"
1601203-58 = "Estava delicioso!"
1601203-59 = "[s] \"Você comeu bastante. Está se sentindo bem?\""
1601203-60 = "Sim! Tudo estava delicioso e único..."
1601203-61 = "E então..."
1601203-68 = "[ns] \"……Junko?\""
1601203-69 = "Ah……!"
1601203-70 = "Eu, eu não consigo me mexer…… falta ar……."
1601203-71 = "[s] \"O, o que aconteceu!?\""
1601203-72 = "Sensei, o que eu faço……."
1601203-73 = "Acho que, talvez, eu tenha comido demais……?"
1601203-75 = "（Comprei um remédio para o estômago para ajudar na digestão da Junko, que estava com o rosto pálido……）"
1601203-77 = "O, obrigada, Sensei…… graças a você, me sinto viva de novo."
1601203-78 = "De, desculpe…… por minha causa, o que deveria ter sido uma refeição divertida……."
1601203-79 = "[s] \"Parece que você melhorou, e a Junko parecia estar se divertindo, então estou muito satisfeito.\""
1601203-80 = "……Sério? Você não está dizendo isso só para ser gentil comigo, está?"
1601203-81 = "O, obrigada…… de qualquer forma, acho que não vou conseguir comer nada até amanhã."
1601203-82 = "Hmm, queria conseguir comer tanto quanto a Akari……."
1601203-84 = "（Enquanto consolava a Junko, que estava desanimada, voltamos para o Schale）"
