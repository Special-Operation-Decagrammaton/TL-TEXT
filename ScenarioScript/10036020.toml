[translation]
10036020-1 = "第2話;スクワッドの事情"
10036020-3 = "わがままを聞いてくれてありがとう。#n先生のおかげで、遠くまで来れた。"
10036020-4 = "こんな場所があったんだね。"
10036020-5 = "こうして人目につく場所を歩くのは、まだ慣れないかも。"
10036020-6 = "まるで、別世界に来たみたい。"
10036020-8 = "わ、私たち、こんな幸せで良いんでしょうか……？"
10036020-9 = "じ、実はこのビーチがヴァルキューレの罠だったりして……！"
10036020-10 = "お祭りは嘘で、本当は犯罪者を一掃するための計画だったり……！？"
10036020-11 = "終わりです！このままじゃ矯正局送りです！#n牢屋入りになってしまいます……！"
10036020-12 = "先生が買ってくれたアイスが、最後の晩餐に……！"
10036020-13 = "[s] \"お、落ち着いて、ヒヨリ。\""
10036020-17 = "ここでヘルメット団主催のお祭りが開かれるのは間違いないよ。"
10036020-18 = "正確には「ヘルメット団総連合会」って言うらしいけど……規模も大きいし、色々と手が込んでる。"
10036020-19 = "ヴァルキューレに、これほど大掛かりな罠を用意できるとは思えないかな。"
10036020-20 = "そ、そうなんですか？#nじゃあ、安心して良いんですね？"
10036020-21 = "……まぁ、とりあえずはね。"
10036020-23 = "先生が一緒にいてくれるなら、大丈夫。"
10036020-24 = "そうでしょ、先生？"
10036020-25 = "[s] \"もちろん。\""
10036020-26 = "ふふっ、頼もしいね。"
10036020-27 = "[s1] \"みんなでお祭り楽しもうね。\"\n[s2] \"アツコも、ヒヨリも、ミサキも。\""
10036020-30 = "いろんな写真を、いっぱい撮りたいな。"
10036020-31 = "え、えへへ、私は海の家で焼きそばと焼きトウモロコシを……#nあ、デザートにかき氷も食べたいです……。"
10036020-32 = "騒がしい場所はあんまり好きじゃないし、#nお祭りには興味ないけど……"
10036020-33 = "アツコとヒヨリがそうしたいなら、付き合うよ。"
10036020-34 = "海の家のほかにも、砂のお城大会、水鉄砲大会……#nあと、DJステージも準備されてるんだって。"
10036020-35 = "[s] \"興味ないと言いつつ、結構詳しいね……？\""
10036020-36 = "今は臨時のリーダーだから。ちょっと調べただけ。"
10036020-40 = "……なに笑ってるの、アツコまで。"
10036020-41 = "ふふっ、ミサキも楽しもうね。"
10036020-42 = "くっ……！"
10036020-43 = "[s3] \"じゃあ、軽く見て回ろうか？\"\n[s4] \"まずは会場を一周してみよう。\""
10036020-46 = "うん、行こう。"
10036020-47 = "えへへ、楽しみですね……。"
10036020-48 = "……はぁ。"
10036020-51 = "美味しそうな匂いがするね。"
10036020-52 = "先生、何か食べる？"
10036020-53 = "[s] \"うん、ミサキとヒヨリはどうする？\""
10036020-54 = "わ、私も食べます！#nえへへ、やっと美味しいご飯を……。"
10036020-55 = "……待って。"
10036020-59 = "どうしたの、ミサキ。"
10036020-60 = "……間違いない。"
10036020-61 = "あそこ、見て……！"
10036020-63 = "注文したトーストと目玉焼きだ。#nさっさと……いや、ごゆっくりどうぞ。"
10036020-64 = "おい、注文と違うじゃねーか。#n半熟っつったろーがよ！"
10036020-65 = "こんなん食べてられっかよ！"
10036020-66 = "す、すまない。すぐに新しい物を持ってくる！"
10036020-67 = "すいませーん。#n注文してから30分も経ってるんですけど、まだですか……？"
10036020-68 = "もう少し待ってくれ！"
10036020-69 = "これ、頼んだ覚えないんすけど……。"
10036020-70 = "す、すまない……！"
10036020-82 = "サッちゃんだ……。"
10036020-87 = "サオリ姉さんが、どうしてここに……？"
10036020-88 = "[s] \"サオリ……？\""
10036020-89 = "……。"
10036020-90 = "あんなところで何してんの……。"
10036020-91 = "サオ――"
10036020-97 = "――っ！？"
10036020-98 = "しっ、二人とも静かに。#nこっち来て。"
10036020-99 = "先生も。"
10036020-103 = "[ns5] \"どうしたの？\"\n[ns6] \"サオリに声かけないの？\""
10036020-107 = "……邪魔しちゃ、ダメだと思う。"
10036020-108 = "サッちゃんは今、自分探し中だから。"
10036020-110 = "振り回されてるようにしか見えないですけど……。"
10036020-111 = "……。"
10036020-113 = "サッちゃんなりに頑張ってるんだと思う。"
10036020-114 = "ああやって働くのも、きっと大事だから。"
10036020-115 = "今はサッちゃんの邪魔しないようにしよう。"
10036020-117 = "でも、挨拶くらいはしても良いんじゃないですか……？"
10036020-119 = "ううん。#nサッちゃんは優しいから、私たちがいるって知ったら色々と気を遣うと思う。"
10036020-120 = "だから、今は遠くから見守りたい。"
10036020-122 = "そ、そうですね……サオリ姉さん、すごく忙しそうですし……。"
10036020-123 = "……まぁ、気を遣わせたら悪いし。"
10036020-125 = "先生はどう思う？"
10036020-126 = "[s] \"たしかに、サオリは気を遣うかもしれないね。\""
10036020-127 = "ふふっ、秘密作戦みたい。"
10036020-128 = "せっかくだから、サッちゃんの働く姿、撮っておこうかな。"
10036020-130 = "リーダーにバレないようにするんじゃなかったの？"
10036020-132 = "大丈夫。#nこうやって、ズームすれば……。"
10036020-133 = "[s] \"見つからないかな……？\""
10036020-134 = "ふふ、良い写真が撮れそう。"
10036020-135 = "はい、チーズ。"
10036020-140 = "サッちゃんの仕事姿……ふふっ。"
10036020-141 = "み、見つかったら、サオリ姉さんに怒られるんじゃ……。"
10036020-142 = "その時はその時、だよ。"
10036020-143 = "ちゃんと撮れてるかな……？"
10036020-144 = "良かった、ちゃんと撮れてる。"
10036020-145 = "よく撮れてます……。"
10036020-146 = "古いけど、それなりに使えるんだね。"
10036020-148 = "うん。このカメラ、海に行くことが決まってから、#n頑張ってお金を貯めてブラックマーケットで買ったの。"
10036020-149 = "ちゃんと動いてくれて、良かった。"
10036020-150 = "ビーチの写真を残すなんて、私たちにはもったいない贅沢ですね……。"
10036020-151 = "じゃあ、そろそろ行こっか。"
10036020-152 = "あんまり長居したら、サッちゃんに見つかっちゃう。"
10036020-153 = "そうだね。"
10036020-154 = "は、はい……！"
10036020-159 = "……先生。"
10036020-160 = "[s] \"うん？\""
10036020-161 = "……サッちゃんの力になってあげたいんだ。"
10036020-162 = "せっかくなら、お祭りを楽しんでほしいから。"
10036020-163 = "いつも頑張って、苦労してるところを見てきたから……#n今日は私が、サッちゃんの夏を守りたいの。"
10036020-164 = "うん……サッちゃんはズッ友だから。"
10036020-165 = "[s] \"ず、ズッ友……？\""
10036020-166 = "うん、「ずっと友だち」って意味らしいよ。"
10036020-167 = "だから先生、助けてくれる？"
10036020-168 = "[s] \"もちろんだよ。\""
10036020-169 = "ありがとう……先生ならそう言ってくれると思ってた。"
10036020-170 = "行こう、ミサキたちが待ってる。"
10036020-172 = "（その後、アツコたちと一緒にお祭り会場を回っていると……）"
10036020-173 = "（途中で財布を落としてしまった）"
10036020-176 = "[ns] \"たしか、この辺で落としたような……。\""
10036020-186 = "[ns] \"どこだろう……。\""
10036020-188 = "探し物はコレか？"
10036020-189 = "[s] \"あっ。\""
10036020-191 = "これから届けにいこうと思っていたところだが――"
10036020-192 = "持ち主なら、ちょうど良か……なっ！"
10036020-196 = "[ns] \"さ、サオリ！？\""
10036020-197 = "[USERNAME]先生がどうしてここに！？"
10036020-198 = "[s] \"す、少し事情があってね。\""
10036020-199 = "もしかして、今日もパトロールか？"
10036020-200 = "相変わらず、先生は忙しそうだな。"
10036020-201 = "しかし……まさか会えるとは思わなかった。"
10036020-202 = "[s] \"そうだね、サオリも元気にしてた？\""
10036020-203 = "ああ、おかげさまでな。"
10036020-204 = "先生に教わった通り、最近は色々な仕事に挑戦している。"
10036020-205 = "「アウトロービーチ」に来たのも、その一環だ。"
10036020-206 = "ところで――"
10036020-210 = "……！"
10036020-211 = "先生、隠れるぞ！"
10036020-229 = "……こちらには気づかなかったようだな。"
10036020-230 = "急に引っ張って、すまなかった。"
10036020-231 = "[s7] （アツコたちも来ていると知ってしまった……）\n[s8] \"挨拶しなくて良いの……？\""
10036020-234 = "アツコ、ミサキ、ヒヨリ……久しぶりだな。"
10036020-235 = "本当は、会って話をしたかったが……"
10036020-236 = "……今の私に、そんな資格はない。"
10036020-237 = "[s] \"……。\""
10036020-238 = "先生は、「資格なんて必要ない」とでも言うだろう。"
10036020-239 = "だが……まだ心の準備ができていない。"
10036020-240 = "どんな顔で会えば良いのか……。"
10036020-241 = "きっと、アツコたちは迎え入れてくれるだろう。"
10036020-242 = "でも、それに甘えてはいけないと思っている。"
10036020-243 = "だから……今はまだ会えない。"
10036020-244 = "……もちろん、これは私の[ruby=わがまま]我儘[/ruby]だ。"
10036020-245 = "すまない、先生。"
10036020-246 = "[s] \"サオリ……。\""
10036020-247 = "……先生。#n厚かましいのは承知のうえで、ひとつ頼みがある。"
10036020-248 = "[s] \"頼み？\""
10036020-249 = "みんなは海を初めて見るはずだ。"
10036020-250 = "少なくとも、アリウスにいた頃に見る機会はなかったからな。"
10036020-251 = "だから、この時間を楽しんでもらいたい。"
10036020-252 = "海に砂浜、屋台、DJステージ……。"
10036020-253 = "きっと、どれも未知の体験だろう。"
10036020-254 = "先生、みんなが楽しい時間を過ごせるよう、手を貸してほしい。"
10036020-255 = "……頼れるのは、先生しかいないんだ。"
10036020-256 = "もちろん、できる限りのことは自分でもやる。"
10036020-257 = "みんなにお祭りを楽しんでもらえるのなら、何だって……。"
10036020-258 = "[s9] \"うん、分かった。\"\n[s10] \"任せて、サオリ。\""
10036020-261 = "ありがとう、先生。#nこの恩は絶対に忘れない。"
10036020-262 = "おーい、そろそろ作業を再開するぞ！"
10036020-263 = "すまない、行かなくては……。"
10036020-264 = "[s] \"うん、何かあったらいつでも連絡してね。\""
10036020-265 = "助かる。"
10036020-274 = "それと……先生も、ぜひお祭りを楽しんでいってくれ。"
