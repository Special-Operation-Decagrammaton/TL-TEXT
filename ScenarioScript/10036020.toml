[translation]
10036020-1 = "Episódio 2: As circunstâncias do esquadrão"
10036020-3 = "Obrigada por atender ao meu pedido egoísta.#nGraças ao Sensei, conseguimos vir de tão longe."
10036020-4 = "Eu não fazia ideia de que um lugar assim existia."
10036020-5 = "Ainda não estou acostumada a andar por lugares onde tantas pessoas podem me ver."
10036020-6 = "É como se tivéssemos vindo para outro mundo."
10036020-8 = "N-nós... será que podemos mesmo ser tão felizes assim...?"
10036020-9 = "N-na verdade, será que esta praia não é uma armadilha da Valkyrie...!"
10036020-10 = "O festival é mentira, e na verdade é um plano para eliminar criminosos...!?"
10036020-11 = "É o fim! Se continuar assim, seremos enviadas para o Departamento Correcional!#nVamos acabar na prisão...!"
10036020-12 = "O sorvete que o Sensei comprou vai acabar sendo minha última ceia...!"
10036020-13 = "[s] \"C-calma, Hiyori.\""
10036020-17 = "Não há dúvidas de que o festival organizado pelo Grupo Capacete vai acontecer aqui."
10036020-18 = "Para ser exata, parece que se chama \"Federação Geral do Grupo Capacete\"... a escala é grande e eles se esforçaram bastante."
10036020-19 = "Não acho que a Valkyrie seria capaz de preparar uma armadilha tão elaborada."
10036020-20 = "S-sério?#nEntão, posso ficar tranquila?"
10036020-21 = "……Bem, por enquanto, sim."
10036020-23 = "Se o Sensei estiver conosco, vai ficar tudo bem."
10036020-24 = "Não é, Sensei?"
10036020-25 = "[s] \"Com certeza.\""
10036020-26 = "Fufu, que reconfortante."
10036020-27 = "[s1] \"Vamos aproveitar o festival todos juntos.\"\n[s2] \"Atsuko, Hiyori e Misaki também.\""
10036020-30 = "Quero tirar muitas, muitas fotos."
10036020-31 = "E-hehe, eu quero comer yakisoba e milho assado na barraca da praia...#nAh, e de sobremesa, quero comer raspadinha também..."
10036020-32 = "Eu não gosto muito de lugares barulhentos e#nnão tenho interesse em festivais, mas..."
10036020-33 = "Se a Atsuko e a Hiyori querem ir, eu vou junto."
10036020-34 = "Além das barracas de praia, dizem que haverá um concurso de castelos de areia, uma batalha de pistolas d'água...#ne até um palco de DJ."
10036020-35 = "[s] \"Diz que não tem interesse, mas está bem informada, hein...?\""
10036020-36 = "Eu sou a líder temporária agora. Só dei uma pesquisada."
10036020-40 = "……Do que você está rindo, Atsuko?"
10036020-41 = "Fufu, vamos aproveitar também, Misaki."
10036020-42 = "Grr...!"
10036020-43 = "[s3] \"Então, vamos dar uma volta?\"\n[s4] \"Primeiro, vamos dar uma volta pelo local.\""
10036020-46 = "Sim, vamos."
10036020-47 = "Ehehe, estou ansiosa..."
10036020-48 = "……Haa."
10036020-51 = "Tem um cheiro delicioso."
10036020-52 = "Sensei, vai comer alguma coisa?"
10036020-53 = "[s] \"Sim, o que a Misaki e a Hiyori vão querer?\""
10036020-54 = "E-eu também vou comer!#nEhehe, finalmente uma comida gostosa..."
10036020-55 = "……Espere."
10036020-59 = "O que foi, Misaki?"
10036020-60 = "……Não tem erro."
10036020-61 = "Olhe ali...!"
10036020-63 = "Aqui está a torrada e o ovo frito que você pediu.#nComa logo... ou melhor, aproveite com calma."
10036020-64 = "Ei, isso não é o que eu pedi.#nEu disse que queria o ovo com gema mole!"
10036020-65 = "Como é que eu vou comer isso?!"
10036020-66 = "D-desculpe. Vou trazer um novo agora mesmo!"
10036020-67 = "Com licença.#nJá faz 30 minutos que eu fiz o pedido, ainda não está pronto...?"
10036020-68 = "Espere só mais um pouco!"
10036020-69 = "Eu não me lembro de ter pedido isso..."
10036020-70 = "D-desculpe...!"
10036020-82 = "É a Sa-chan..."
10036020-87 = "Por que a Saori-nee-san está aqui...?"
10036020-88 = "[s] \"Saori...?\""
10036020-89 = "..."
10036020-90 = "O que ela está fazendo num lugar desses..."
10036020-91 = "Saor—"
10036020-97 = "—!?"
10036020-98 = "Shii, fiquem quietas, vocês duas. #nVenham aqui."
10036020-99 = "Professor também."
10036020-103 = "[ns5] \"O que houve?\"\n[ns6] \"Não vai falar com a Saori?\""
10036020-107 = "...Acho que não devemos atrapalhar."
10036020-108 = "A Sa-chan está tentando se encontrar agora."
10036020-110 = "Mas só parece que ela está sendo levada de um lado para o outro..."
10036020-111 = "..."
10036020-113 = "Acho que a Sa-chan está dando o melhor dela do jeito dela."
10036020-114 = "Trabalhar daquele jeito também deve ser importante."
10036020-115 = "Vamos tentar não atrapalhar a Sa-chan agora."
10036020-117 = "Mas, não faria mal dar pelo menos um oi, não é...?"
10036020-119 = "Não. #nA Sa-chan é gentil, então se ela souber que estamos aqui, vai acabar se preocupando com a gente."
10036020-120 = "Por isso, agora eu quero apenas observar de longe."
10036020-122 = "É, tem razão... A Saori-nee-san parece muito ocupada..."
10036020-123 = "...Bem, seria ruim se ela tivesse que se preocupar com a gente."
10036020-125 = "O que você acha, Professor?"
10036020-126 = "[s] \"É verdade, a Saori pode acabar se preocupando mesmo.\""
10036020-127 = "Fufu, parece uma operação secreta."
10036020-128 = "Já que estamos aqui, acho que vou tirar uma foto da Sa-chan trabalhando."
10036020-130 = "Você não disse que era para não deixar a líder descobrir?"
10036020-132 = "Está tudo bem. #nSe eu der um zoom assim..."
10036020-133 = "[s] \"Será que ela não vai notar...?\""
10036020-134 = "Fufu, acho que vou conseguir uma boa foto."
10036020-135 = "Digam x."
10036020-140 = "A Sa-chan trabalhando... fufu."
10036020-141 = "S-se formos descobertas, a Saori-nee-san não vai ficar brava...?"
10036020-142 = "A gente resolve isso quando acontecer."
10036020-143 = "Será que a foto ficou boa...?"
10036020-144 = "Que bom, ficou boa."
10036020-145 = "Ficou muito boa..."
10036020-146 = "É antiga, mas ainda funciona bem, né."
10036020-148 = "Sim. Essa câmera, depois que decidimos ir para a praia, #neu economizei bastante dinheiro e comprei no mercado negro."
10036020-149 = "Fico feliz que ela ainda funcione."
10036020-150 = "Tirar fotos na praia é um luxo grande demais para nós..."
10036020-151 = "Bem, acho melhor irmos agora."
10036020-152 = "Se ficarmos muito tempo, a Sa-chan vai acabar nos vendo."
10036020-153 = "Concordo."
10036020-154 = "S-sim...!"
10036020-159 = "...Professor."
10036020-160 = "[s] \"Sim?\""
10036020-161 = "...Eu quero ser útil para a Sa-chan."
10036020-162 = "Já que estamos aqui, quero que ela aproveite o festival."
10036020-163 = "Sempre vi o quanto você se esforça e passa por dificuldades...#nHoje, sou eu quem quer proteger o verão da Sa-chan."
10036020-164 = "Sim... porque a Sa-chan é minha melhor amiga para sempre."
10036020-165 = "[s] \"Me-melhor amiga para sempre...?\""
10036020-166 = "Sim, parece que significa \"amigas para sempre\"."
10036020-167 = "Então, Sensei, pode me ajudar?"
10036020-168 = "[s] \"Com certeza.\""
10036020-169 = "Obrigada... eu sabia que o Sensei diria isso."
10036020-170 = "Vamos, a Misaki e as outras estão esperando."
10036020-172 = "（Depois disso, enquanto caminhava pelo festival com a Atsuko e as outras...）"
10036020-173 = "（Acabei deixando minha carteira cair no caminho）"
10036020-176 = "[ns] \"Tenho quase certeza de que deixei cair por aqui...\""
10036020-186 = "[ns] \"Onde será que está...?\""
10036020-188 = "Está procurando por isto?"
10036020-189 = "[s] \"Ah.\""
10036020-191 = "Eu estava justamente a caminho de entregar, mas..."
10036020-192 = "Se você é a dona, então que sorte... espera, você!"
10036020-196 = "[ns] \"Sa-Saori!?\""
10036020-197 = "Sensei [USERNAME], o que faz aqui!?"
10036020-198 = "[s] \"Be-bem, tenho meus motivos.\""
10036020-199 = "Por acaso, você está patrulhando hoje também?"
10036020-200 = "Como sempre, o Sensei parece estar ocupado."
10036020-201 = "Mas... eu não esperava te encontrar aqui."
10036020-202 = "[s] \"Pois é, você tem passado bem, Saori?\""
10036020-203 = "Sim, graças a você."
10036020-204 = "Como você me ensinou, tenho tentado vários tipos de trabalho ultimamente."
10036020-205 = "Vir à \"Outlaw Beach\" também faz parte disso."
10036020-206 = "Aliás..."
10036020-210 = "……！"
10036020-211 = "Sensei, abaixe-se!"
10036020-229 = "……Parece que não nos notaram."
10036020-230 = "Desculpe por ter te puxado de repente."
10036020-231 = "[s7] （Descobri que a Atsuko e as outras também vieram...）\n[s8] \"Não quer ir cumprimentá-las...?\""
10036020-234 = "Atsuko, Misaki, Hiyori... faz tempo."
10036020-235 = "Na verdade, eu queria encontrá-las e conversar, mas..."
10036020-236 = "……Eu não tenho esse direito agora."
10036020-237 = "[s] \"…….\""
10036020-238 = "O Sensei provavelmente diria que \"não preciso de direito nenhum\"."
10036020-239 = "Mas... meu coração ainda não está preparado."
10036020-240 = "Com que cara eu deveria aparecer diante delas...?"
10036020-241 = "Tenho certeza de que a Atsuko e as outras me receberiam bem."
10036020-242 = "Mas sinto que não devo me aproveitar disso."
10036020-243 = "Por isso... ainda não posso encontrá-las."
10036020-244 = "……Claro, isso é apenas um capricho meu."
10036020-245 = "Desculpe, Sensei."
10036020-246 = "[s] \"Saori...\""
10036020-247 = "……Sensei.#nSei que é pedir demais, mas tenho um favor a lhe pedir."
10036020-248 = "[s] \"Um favor?\""
10036020-249 = "Elas nunca viram o mar antes."
10036020-250 = "Pelo menos, não tivemos oportunidade de ver quando estávamos em Arius."
10036020-251 = "Por isso, quero que elas aproveitem este momento."
10036020-252 = "O mar, a areia da praia, as barracas, o palco de DJ……."
10036020-253 = "Com certeza, tudo isso será uma experiência inédita."
10036020-254 = "Sensei, preciso da sua ajuda para garantir que todos tenham um momento divertido."
10036020-255 = "……A única pessoa em quem posso confiar é você, Sensei."
10036020-256 = "Claro, farei tudo o que estiver ao meu alcance também."
10036020-257 = "Se for para todos aproveitarem o festival, farei qualquer coisa……."
10036020-258 = "[s9] \"Sim, eu entendi.\"\n[s10] \"Pode deixar comigo, Saori.\""
10036020-261 = "Obrigada, Sensei.#nJamais esquecerei este favor."
10036020-262 = "Ei, vamos retomar o trabalho logo!"
10036020-263 = "Desculpe, preciso ir……."
10036020-264 = "[s] \"Certo, se precisar de qualquer coisa, é só me chamar.\""
10036020-265 = "Isso ajuda muito."
10036020-274 = "E também…… Sensei, por favor, aproveite o festival você também."
