[translation]
10047040-1 = "第4話;声の主は……"
10047040-4 = "（しばらく走り続け、学院の中心部に着いた）"
10047040-5 = "[ns] \"ふぅ……結構走ったね……。\""
10047040-6 = "ええ。ここまで来れば大丈夫そうですね。"
10047040-7 = "にゅふふ。「忌むべき者」も、私たちを見失ったはず。"
10047040-8 = "んもー！その呼び方、先生が誤解するでしょ！？"
10047040-9 = "[ns1] \"そういえば……さっきのは何だったの？\"\n[ns2] \"どうして悪魔像が？\""
10047040-12 = "心霊現象……つまり、ポルターガイストだよ。"
10047040-13 = "イヒッ……気をつけて……#n悪魔像の[ruby=ぬし]主[/ruby]は……先生を覚えた。"
10047040-14 = "どこがポルターガイストなの！？#n音で展示台が揺れて、悪魔像が動いただけでしょ！"
10047040-15 = "[s] \"あっ、そういうこと？\""
10047040-16 = "ふふ……どう捉えるかはお任せします。"
10047040-20 = "もう、またそれっぽいこと言って！こんなの詐欺よ、詐欺！"
10047040-21 = "悪魔だの魔法だの、この世には存在しないんだから！"
10047040-22 = "[s] \"レナは本当にオカルトを信じてないんだね。\""
10047040-26 = "そうよ。なのにこんな先輩たちと一緒にいなきゃいけないなんて……#n可哀想だと思わない？"
10047040-27 = "私ってば、なんでこんなヘンテコ集団と……。"
10047040-28 = "[s] \"どんな風に出会ったの？\""
10047040-29 = "寮の部屋番号が404号室になっちゃっただけよ。#n本当にそれだけ。"
10047040-30 = "「評議会」は絶対だからね。#n私たちみたいな普通の生徒に選択肢なんてないの。"
10047040-34 = "あ、評議会っていうのは――"
10047040-36 = "正式名称は「芸術評議会」っていうんだけど。"
10047040-37 = "厳しい基準で作品の芸術的価値を評価・分類する組織で……。#n他校でいう生徒会みたいな感じ？"
10047040-38 = "検問所にいた「寮監隊」は評議会の指揮下にあるの。#nだから、圧倒的な権力を持ってるってわけ。"
10047040-40 = "で、そんな連中が寮の部屋割を決めてるわけ。#n「ルームメイトが嫌だから変えてください」なんて言えないの。"
10047040-41 = "だから、こんな状況で私ができることは一つ。"
10047040-42 = "ルームメイトを悪夢から覚まして、まともな生徒にすること！#n私の平穏な学院生活のためにもね！"
10047040-43 = "[s] \"なるほど、レナは面倒見がいいんだね！\""
10047040-47 = "なんでそうなるの！？"
10047040-48 = "今に見てなさい？#nオカルト漬けのみんなの目を覚ましてやるんだから！"
10047040-49 = "その勢い……いいねぇ……。"
10047040-50 = "レナちゃんみたいな子に布教するのが……無上の喜び……。"
10047040-51 = "ふん！いくら騙そうったって無駄！私には通用しないんだから。"
10047040-52 = "イヒッ……いいよぉ……その調子ぃ……。"
10047040-58 = "では、次の場所に行きましょうか。アルカナの導く先は……。"
10047040-63 = "おおっ……？"
10047040-68 = "あそこ、だね……。"
10047040-69 = "みんな、ついて来てぇ……イヒッ。"
10047040-71 = "ワイルドハントの芸術の街"
10047040-73 = "ここは、「芸術」のメインストリート……。"
10047040-74 = "ワイルドハントで、最も歴史ある彫刻が立ち並ぶ場所です……。"
10047040-75 = "「伝説」と呼ばれる……芸術家たちの作品群……。"
10047040-76 = "はいっ！#n特にあの噴水は、巨匠「レオパルド・ザ・ピンチ」の作品で、ワイルドハントと同じくらい歴史があるんです！"
10047040-77 = "[s] \"おお……私もなにかで見たことあるかも。\""
10047040-78 = "にゅふふふ。#nこのような伝説が息づく場所……もちろん、オカルトにまつわる話があるわけです！"
10047040-79 = "なくていいって……！"
10047040-83 = "[ns] \"ここにはどんな逸話があるの？\""
10047040-84 = "その昔、一部の芸術家は作品に命を吹き込もうと熱を上げ――#n「禁忌」を破ってしまいました。"
10047040-85 = "なんと……命ある者を、石像に埋め込んだのです……！"
10047040-86 = "そうして作られた石像が、今もこの通りのどこかに存在し……#n怨霊の囁き声が聞こえるのだとか。"
10047040-87 = "バカ言わないで！そもそも石像は大理石とかを削って作るの！#n後から何か入れられるわけないでしょ？"
10047040-88 = "では、誰かをセメントで固めて作ったのでしょうか？"
10047040-89 = "そいつのほうがバケモノでしょ！"
10047040-90 = "じゃあ、怨霊の囁き声というのは？"
10047040-91 = "試験で赤点取った誰かがベソかいてたとか……！"
10047040-92 = "イヒッ……なら確認してみようかぁ……。"
10047040-93 = "よくある怪談か……それとも――"
10047040-97 = "本当に、怨霊がいるのか。"
10047040-102 = "では、声が聞こえるのか……分かれて検証してみましょう。"
10047040-103 = "10分後にここで落ち合うということで……。"
10047040-104 = "はい！では行きましょう！"
10047040-111 = "ふん！こ、怖くなんてないし……！"
10047040-115 = "……あれ？先生、どうしたの？"
10047040-116 = "[s3] \"実は……ちょっと怖いかも。\"\n[s4] \"土地勘もないし。\""
10047040-119 = "もう、ビビりなんだから。"
10047040-120 = "じゃ、じゃあ……私についてきて。"
10047040-121 = "何があっても驚かないでよ？#nぜ～んぶ偽物だからね？"
10047040-122 = "[s] \"レナも私から離れないようにね。\""
10047040-123 = "こ、子供扱いしないでよね！？ほんとに怖くなんてないし！"
10047040-125 = "（そうして、レナと石像を見て回ることになった）"
10047040-132 = "ふん、風の音しかしないじゃん。なぁにが怨霊の声よ……。"
10047040-134 = "[log=???][ff4444]ダシテ……ココカ……ラ……。[-][/log]"
10047040-138 = "な、何っ！？先生、なんか言った？"
10047040-139 = "[s] \"ひ、ひいぃっ！私は何も！\""
10047040-140 = "で、でも、変な声が……！！"
10047040-141 = "[ns] \"な、何が起きてるの……！？\""
10047040-143 = "[log=???][ff4444]ノロッ……テヤル……[-][/log]"
10047040-144 = "[log=???][ff4444]コンナトコニ……トジコメテ……。[-][/log]"
10047040-147 = "ひ、ひぃ……っ！やだ……！"
10047040-148 = "か、カノエ先輩でしょ！？こんな悪戯するの、先輩しか……！"
10047040-158 = "……イヒッ、バレちゃったぁ。"
10047040-159 = "あーもう！やっぱり！！"
10047040-161 = "[log=???][ff4444]ダシテ……オネ……ガ……イ……。[-][/log]"
10047040-164 = "……ん？これは……私じゃないねぇ。"
10047040-166 = "ひぃっ！？"
10047040-167 = "だ、だって先輩の方から聞こえたよ……！？"
10047040-168 = "いや、私は何も……。"
10047040-170 = "[log=???][ff4444]ソウ……ソノコジャナイ……。[-][/log]"
10047040-173 = "だ、だれぇっ！？悪ふざけもほどほどにして！"
10047040-175 = "[log=???][ff4444]サァ……ダレデショウ？アッカンベ～……。[-][/log]"
10047040-178 = "シャーッ！バカにして……！！"
10047040-183 = "ここ？……いない！"
10047040-188 = "はっ、早く出て来なさいっ！！"
10047040-192 = "カァ！カァァ！"
10047040-193 = "か、カラス……？"
10047040-194 = "もしかしたら……あの子の声だったかも。"
10047040-195 = "カラスも、訓練次第で……しゃべれるからねぇ。"
10047040-196 = "私だってカラスの声くらいわかるし！"
10047040-198 = "（その後、しばらく探し回ったが声の正体は分からなかった）"
10047040-200 = "え？本当に怨霊の声を聞いたんですか……？"
10047040-201 = "ふふ、あっかんべえだなんて、可愛いお化けですね。"
10047040-202 = "誰かのイタズラだから！"
10047040-203 = "イヒッ……イヒヒッ……。"
10047040-204 = "[s] \"……カノエだったんだよね？\""
10047040-205 = "さぁ……？"
10047040-206 = "[s5] \"腹話術に、変幻自在の声……。\"\n[s6] \"なら、カノエの専攻は……。\""
10047040-209 = "それは、内緒……また、どこかでねぇ。"
10047040-210 = "イヒッ、イヒヒッ……！"
10047040-211 = "[s] \"そ、そっか……。\""
10047040-212 = "次の場所に行こう……#n見てもらいたいもの、たくさんあるから……。"
10047040-217 = "（みんなでワイルドハントのあちこちを見学した）"
10047040-219 = "ワイルドハントの教室"
10047040-222 = "ワイルドハントの庭"
10047040-225 = "ワイルドハントの芸術情報館"
10047040-228 = "ワイルドハントの大講堂"
10047040-231 = "（ほかにも学院のあちこちを見て回った）"
10047040-233 = "さて、先生。楽しんでいただけましたか？"
10047040-234 = "[s] \"うん！あっという間に終わっちゃったね！\""
10047040-235 = "にゅふふ、満足するのは早いですよ。#nいよいよ、ここからがクライマックスです！"
10047040-236 = "アルカナの導く、最終イベント――"
10047040-237 = "魔法陣を用いた、悪魔召喚の儀です！"
10047040-238 = "[s] \"悪魔って……本物の？\""
10047040-239 = "もちろん……。"
10047040-240 = "ニャーオ……ンニャーオォ！"
10047040-241 = "ガァッ！ガァァッ！"
10047040-242 = "この子たちも……そう言ってるよ。"
10047040-243 = "先輩の使い魔たちが言うなら、間違いないですね。"
10047040-244 = "これも[ruby=さだめ]運命[/ruby]。逆らうことはできません。"
10047040-246 = "イヒッ、イヒヒッ……。"
10047040-247 = "にゅふ……にゅふふふっ！"
10047040-248 = "私抜きでやって……お願いだから……。"
10047040-250 = "（楽しそうなオカ研のみんなを見ながら、#n次の悪戯に思いを馳せた）"
