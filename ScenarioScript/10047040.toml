[translation]
10047040-1 = "Episódio 4; A voz por trás de tudo..."
10047040-4 = "（Continuamos correndo por um tempo e chegamos ao centro da academia）"
10047040-5 = "[ns] \"Ufa... corremos bastante, hein...\""
10047040-6 = "Sim. Acho que estamos seguras agora que chegamos aqui."
10047040-7 = "Nyu-fufu. Aquele \"ser abominável\" deve ter nos perdido de vista."
10047040-8 = "Ah, para! Se você chamar assim, o Sensei vai acabar entendendo errado!"
10047040-9 = "[ns1] \"Falando nisso... o que foi aquilo agora pouco?\"\n[ns2] \"Por que uma estátua demoníaca estava lá?\""
10047040-12 = "Um fenômeno sobrenatural... ou seja, um poltergeist."
10047040-13 = "Ihi... cuidado... #nO dono da estátua demoníaca... se lembrou do Sensei."
10047040-14 = "Que poltergeist o quê! #nO som só fez o pedestal balançar e a estátua se mexeu, só isso!"
10047040-15 = "[s] \"Ah, é isso?\""
10047040-16 = "Fufu... deixo a interpretação a seu critério."
10047040-20 = "Ai, lá vem você com essas coisas de novo! Isso é um golpe, um golpe!"
10047040-21 = "Demônios, magia... nada disso existe neste mundo!"
10047040-22 = "[s] \"A Rena realmente não acredita em ocultismo, né.\""
10047040-26 = "Pois é. E ainda tenho que ficar junto com veteranas como vocês... #nNão acha que é de dar pena?"
10047040-27 = "Por que será que eu fui parar nesse grupo tão estranho..."
10047040-28 = "[s] \"Como vocês se conheceram?\""
10047040-29 = "Foi só porque o número do meu quarto no dormitório acabou sendo o 404. #nSério, só isso."
10047040-30 = "O \"Conselho\" é absoluto, sabe? #nAlunas comuns como nós não temos escolha."
10047040-34 = "Ah, o Conselho é..."
10047040-36 = "O nome oficial é \"Conselho Artístico\"."
10047040-37 = "É uma organização que avalia e classifica o valor artístico das obras com critérios rigorosos... #nÉ tipo o grêmio estudantil em outras escolas, sabe?"
10047040-38 = "A \"Equipe de Vigilância do Dormitório\" que estava no posto de controle está sob o comando do Conselho. #nPor isso eles têm um poder esmagador."
10047040-40 = "E esse pessoal é quem decide a divisão dos quartos. #nNão dá nem para dizer \"não gosto da minha colega de quarto, por favor, mude\"."
10047040-41 = "Por isso, só tem uma coisa que eu posso fazer nessa situação."
10047040-42 = "Acordar minhas colegas de quarto desse pesadelo e torná-las alunas normais! #nTudo pela minha vida acadêmica tranquila!"
10047040-43 = "[s] \"Entendi, a Rena é bem prestativa, né!\""
10047040-47 = "Por que você chegou a essa conclusão?!"
10047040-48 = "Espere só para ver! #nEu vou abrir os olhos de todo mundo que está viciado em ocultismo!"
10047040-49 = "Essa energia... é muito boa..."
10047040-50 = "Tentar converter uma garota como a Rena... é um prazer supremo..."
10047040-51 = "Hum! Pode tentar me enganar o quanto quiser, não vai funcionar comigo!"
10047040-52 = "Ihi... tudo bem... continue assim..."
10047040-58 = "Bem, vamos para o próximo lugar. O destino para onde os arcanos nos guiam é..."
10047040-63 = "Oh...?"
10047040-68 = "É ali, né..."
10047040-69 = "Pessoal, venham comigo... Ihi."
10047040-71 = "Cidade da Arte de Wildhunt"
10047040-73 = "Aqui é a rua principal da \"Arte\"..."
10047040-74 = "É o lugar onde ficam as esculturas com mais história em Wildhunt..."
10047040-75 = "Obras de artistas... chamadas de \"lendas\"..."
10047040-76 = "Sim! #nAquela fonte, em especial, é uma obra do mestre \"Leopardo the Pinch\", e tem tanta história quanto a própria Wildhunt!"
10047040-77 = "[s] \"Oh... acho que já vi isso em algum lugar.\""
10047040-78 = "Nyu-fufu. #nUm lugar onde lendas como essa ganham vida... é claro que existem histórias relacionadas ao ocultismo!"
10047040-79 = "Não precisava ter...!"
10047040-83 = "[ns] \"Que tipo de anedotas existem aqui?\""
10047040-84 = "Antigamente, alguns artistas ficaram obcecados em dar vida às suas obras e... #nquebraram um \"tabu\"."
10047040-85 = "Inacreditável... eles enterraram seres vivos dentro das estátuas de pedra...!"
10047040-86 = "Dizem que as estátuas feitas dessa forma ainda existem em algum lugar desta rua... #ne que é possível ouvir os sussurros de espíritos vingativos."
10047040-87 = "Não diga bobagens! Estátuas de pedra são feitas esculpindo mármore e coisas do tipo!#nNão tem como colocar algo dentro delas depois, tem?"
10047040-88 = "Então, será que alguém foi feito sendo coberto por cimento?"
10047040-89 = "Isso seria ainda mais monstruoso!"
10047040-90 = "Então, e quanto aos sussurros de um espírito vingativo?"
10047040-91 = "Talvez fosse alguém que tirou nota vermelha na prova e estava choramingando...!"
10047040-92 = "Ihi... então vamos verificar..."
10047040-93 = "Será uma lenda urbana comum... ou então—"
10047040-97 = "Se realmente existe um espírito vingativo."
10047040-102 = "Então, já que estamos ouvindo vozes... vamos nos separar para investigar."
10047040-103 = "Nos encontramos aqui daqui a 10 minutos..."
10047040-104 = "Certo! Então vamos nessa!"
10047040-111 = "Hum! E-eu não estou com medo, nem um pouco...!"
10047040-115 = "...Ué? Sensei, o que houve?"
10047040-116 = "[s3] \"Na verdade... estou um pouco assustado.\"\n[s4] \"E não conheço nada deste lugar.\""
10047040-119 = "Nossa, você é um medroso mesmo."
10047040-120 = "B-bem, então... fique perto de mim."
10047040-121 = "Não se assuste com nada, entendeu?#nÉ tudo falso, tá?"
10047040-122 = "[s] \"Rena, não se afaste de mim também.\""
10047040-123 = "N-não me trate como criança!? Eu realmente não estou com medo!"
10047040-125 = "(Assim, acabei andando por aí com a Rena para olhar as estátuas)"
10047040-132 = "Hum, só ouço o som do vento. Que história de voz de espírito vingativo o quê..."
10047040-134 = "[log=???][ff4444]ME TIRE... DAQUI...[-][/log]"
10047040-138 = "Q-que isso!? Sensei, você disse alguma coisa?"
10047040-139 = "[s] \"I-iiih! Eu não disse nada!\""
10047040-140 = "M-mas, teve uma voz estranha...!!"
10047040-141 = "[ns] \"O-o que está acontecendo...!?\""
10047040-143 = "[log=???][ff4444]VOU TE AMALDIÇOAR...[-][/log]"
10047040-144 = "[log=???][ff4444]ME TRANCARAM... NESTE LUGAR...[-][/log]"
10047040-147 = "I-iiih...! Não, chega...!"
10047040-148 = "É a veterana Kanoe, né!? Só ela faria uma brincadeira dessas...!"
10047040-158 = "...Ihi, fui descoberta."
10047040-159 = "Ah, pronto! Eu sabia!!"
10047040-161 = "[log=???][ff4444]ME TIRE... POR... FAVOR...[-][/log]"
10047040-164 = "...Hm? Isso... não sou eu."
10047040-166 = "Aaaah!?"
10047040-167 = "M-mas eu ouvi vindo da sua direção, veterana...!?"
10047040-168 = "Não, eu não fiz nada..."
10047040-170 = "[log=???][ff4444]ISSO... NÃO É ESSA CRIANÇA...[-][/log]"
10047040-173 = "Q-quem está aí!? Pare com essas brincadeiras de mau gosto!"
10047040-175 = "[log=???][ff4444]ORA... QUEM SERÁ? Bleh...[-][/log]"
10047040-178 = "Grrr! Está zombando de mim...!!"
10047040-183 = "Aqui? ...Não tem ninguém!"
10047040-188 = "Hah, apareça logo!!"
10047040-192 = "Caw! Cawww!"
10047040-193 = "U-um corvo...?"
10047040-194 = "Talvez... pudesse ser a voz daquele bicho."
10047040-195 = "Corvos também podem aprender a falar... se forem treinados."
10047040-196 = "Eu sei distinguir a voz de um corvo, sabia!"
10047040-198 = "(Depois disso, procuramos por um tempo, mas não descobrimos a origem da voz)"
10047040-200 = "Hã? Vocês realmente ouviram a voz de um espírito vingativo...?"
10047040-201 = "Fufu, fazer careta assim... que fantasma adorável."
10047040-202 = "Foi uma brincadeira de alguém!"
10047040-203 = "Ihi... ihihi..."
10047040-204 = "[s] \"...Era a Kanoe, não era?\""
10047040-205 = "Quem sabe...?"
10047040-206 = "[s5] \"Ventriloquismo e uma voz que muda conforme quer...\"\n[s6] \"Então, a especialidade da Kanoe é...\""
10047040-209 = "Isso é segredo... Até mais, em algum outro lugar."
10047040-210 = "Ihi, ihihi...!"
10047040-211 = "[s] \"E-entendi...\""
10047040-212 = "Vamos para o próximo lugar...#nTem muita coisa que eu quero que você veja..."
10047040-217 = "(Visitamos vários lugares de Wild Hunt com todo mundo)"
10047040-219 = "Sala de aula de Wild Hunt"
10047040-222 = "Jardim de Wild Hunt"
10047040-225 = "Centro de Informações Artísticas de Wild Hunt"
10047040-228 = "Grande Auditório de Wild Hunt"
10047040-231 = "(Também demos uma volta por vários outros lugares da academia)"
10047040-233 = "Bem, Sensei. Você se divertiu?"
10047040-234 = "[s] \"Sim! Passou rápido demais!\""
10047040-235 = "Nyufufu, não se satisfaça tão cedo.#nO clímax começa agora!"
10047040-236 = "O evento final, guiado pelos arcanos—"
10047040-237 = "É o ritual de invocação de demônios usando um círculo mágico!"
10047040-238 = "[s] \"Demônios... de verdade?\""
10047040-239 = "Com certeza..."
10047040-240 = "Miau... Nyaooo!"
10047040-241 = "Graaa! Graaa!"
10047040-242 = "Essas crianças também... estão dizendo isso."
10047040-243 = "Se os familiares da veterana dizem, então não há erro."
10047040-244 = "Isso também é o destino. Não há como resistir."
10047040-246 = "Ihi, ihihi..."
10047040-247 = "Nyu... nyufufufu!"
10047040-248 = "Façam isso sem mim... eu imploro..."
10047040-250 = "(Enquanto observava o pessoal do Clube de Ocultismo se divertindo,#ncomecei a pensar na próxima travessura.)"
