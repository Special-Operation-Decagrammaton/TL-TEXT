[translation]
10040080-1 = "Episódio 8; O mesmo dia, mesmo após a virada do ano"
10040080-3 = "……Que tal aqui?"
10040080-7 = "Ainda há tantas luzes acesas... mesmo sendo tão tarde."
10040080-8 = "Como muitos alunos estudam até tarde da noite, #nna Millennium isso é comum, mas..."
10040080-10 = "Hoje, especialmente, sinto que está tudo muito iluminado. #nSerá porque há muitas pessoas acordadas para a virada do ano?"
10040080-11 = "Mas é estranho. #nMesmo que o ano mude, o dia de amanhã não muda nada."
10040080-12 = "Ainda assim, muitas pessoas acompanham o fim do ano #ne celebram o início de um novo, não é?"
10040080-13 = "Talvez, no fundo, não haja um motivo específico."
10040080-14 = "Apenas o desejo de se divertir com pessoas queridas, comer algo juntos..."
10040080-15 = "A celebração da virada do ano não passa de um pretexto... #npor assim dizer, talvez seja apenas uma formalidade."
10040080-16 = "Será que é um sentimento muito simples que todos carregam que nos faz agir assim?"
10040080-17 = "Como o desejo de passar um tempo agradável..."
10040080-18 = "Ou o desejo de estar com alguém e guardar essa lembrança..."
10040080-19 = "Ou então—"
10040080-22 = "……O desejo de deixar uma marca em alguém, talvez."
10040080-23 = "Fufu, isso soa um pouco complicado, não é?"
10040080-24 = "Se eu continuar assim, esse sentimento que era simples vai acabar se tornando um emaranhado."
10040080-25 = "……Embora eu não tenha moral nenhuma para dizer isso."
10040080-26 = "Eu mesma vivo fazendo rodeios. Só hoje, inúmeras vezes."
10040080-27 = "[ns1] \"Você não gosta de ser complicada?\"\n[ns2] \"Parece que algo está te incomodando, não é?\""
10040080-30 = "……Hmm, é verdade."
10040080-31 = "Eu sei que, para construir bons relacionamentos com as pessoas, um pouco disso é necessário."
10040080-32 = "Além disso, mesmo em conversas cheias de rodeios, as pessoas conseguem perceber as verdadeiras intenções umas das outras."
10040080-33 = "Por isso, não pretendo falar mal disso como se fosse apenas uma fachada."
10040080-34 = "Por exemplo, a Yuuka-chan e a Koyuki-chan também #ntêm seus momentos de rodeios. #nMas é fácil entender o que elas estão pensando."
10040080-35 = "O mesmo vale para as outras garotas da Millennium."
10040080-36 = "Até a Presidente Rio, que à primeira vista parece a personificação da complexidade... dá para entender o que ela pensa."
10040080-37 = "……O que houve?"
10040080-38 = "Quer saber sobre mim, Noah?"
10040080-39 = "Fufu. Você vai mesmo perguntar isso?"
10040080-40 = "Bem..."
10040080-45 = "Eu—"
10040080-46 = "Como você sabe, eu tenho esse tipo de personalidade. #nFrequentemente dizem que, ao contrário do que sinto, sou difícil de entender."
10040080-47 = "……Não tem jeito. Até o que acabei de dizer foi complicado, não foi?"
10040080-48 = "Mas, com isso, acho que você entendeu bem, não é?"
10040080-51 = "[ns] \"Sim.\""
10040080-53 = "[ns3] \"Mas acho que você não precisa se preocupar tanto.\"\n[ns4] \"Mesmo que a Noah seja complicada...\"\n[ns5] \"Isso não muda o que você sente de verdade.\""
10040080-57 = "É... verdade."
10040080-58 = "Fufu."
10040080-59 = "……Agora sim, eu entendi perfeitamente."
10040080-60 = "É por isso mesmo. O motivo de todos quererem conversar com o Sensei."
10040080-61 = "Não precisamos falar de um jeito estranhamente complicado, #ne nos sentimos muito à vontade, não é?"
10040080-62 = "……Além disso, não precisamos nos forçar a ser sinceros."
10040080-66 = "Será que, talvez—"
10040080-67 = "O Sensei já percebeu tudo? #nO motivo pelo qual eu, que dizem ser difícil de entender, #nestou aqui com você até essa hora."
10040080-68 = "Você sabe disso e, ainda assim, continua me acompanhando... é isso, não é?"
10040080-69 = "No meio da madrugada, sob a luz da mesma noite, #ncompartilhando esse momento importante da virada do ano, o significado disso."
10040080-70 = "Se eu ficar aqui a sós com o Sensei deste jeito—"
10040080-71 = "Não há... nenhum problema, certo?"
10040080-72 = "Tem certeza de que está tudo bem?"
10040080-73 = "Talvez..."
10040080-74 = "Talvez eu esteja pensando em algo que não deveria?"
10040080-75 = "[s6] \"Isso não soa como aquela fachada que você mencionou antes?\"\n[s7] \"O que importa são os sentimentos verdadeiros, não é?\""
10040080-78 = "…………Fufu."
10040080-79 = "É por isso que dizem que sou difícil de entender.#nCom certeza, esse é o limite de Ushio Noa."
10040080-80 = "Mas o Sensei consegue entender os meus...#nverdadeiros sentimentos que não consigo colocar em palavras, não é?"
10040080-81 = "……Poderia dizer por mim, Sensei?"
10040080-85 = "[ns] \"Sim.\""
10040080-87 = "[ns8] \"Afinal, a Noa também é minha aluna.\"\n[ns9] \"Não precisa se preocupar com nada.\""
10040080-90 = "…………。"
10040080-91 = "……………………。"
10040080-92 = "……Ufa."
10040080-93 = "Obrigada, Sensei."
10040080-102 = "Eu sabia que você diria isso."
10040080-106 = "E então... Feliz Ano Novo, Sensei."
10040080-107 = "De agora em diante—"
10040080-111 = "Continue cuidando de nós, está bem?"
10040080-121 = "……Sensei."
10040080-126 = "O que aconteceu hoje é um segredo, viu? Fufu."
10040080-128 = "(Depois disso, organizei a sala de reflexão bagunçada junto com a Noa)"
10040080-129 = "(E depois de confirmar que a Noa tinha dormido, voltei para o Schale)"
10040080-131 = "(……Na tarde do dia seguinte)"
10040080-132 = "Se~nse~i~!!"
10040080-133 = "[s10] \"Espere, me deixe descansar...\"\n[s11] \"Não aguento mais...\""
10040080-136 = "O que está dizendo!?#nAinda tem tanta coisa acumulada, então não pode parar!"
10040080-137 = "Viemos todas te ajudar, então trate de se esforçar!"
10040080-138 = "É verdade~.#nFomos trazidas aqui sem nem ter tempo de trocar de roupa."
10040080-139 = "Não era esse o tipo de suporte que eu queria dar..."
10040080-141 = "…………。"
10040080-142 = "Se for aqui..."
10040080-143 = "Kotama, pare."
10040080-144 = "……!"
10040080-146 = "Ugh... ter que analisar senhas até aqui."
10040080-147 = "Será que não tenho liberdade nenhuma...?"
10040080-148 = "……Fufu.#nOntem você estava tão quieta, mas já está cheia de energia."
10040080-149 = "Q-quieta...?"
10040080-150 = "Mas a gente estava fazendo uma bagunça..."
10040080-151 = "Koyuki! Suas mãos pararam!"
10040080-152 = "Aaaah! Que azar o meu!"
10040080-153 = "Todas sabem, né?#nNão vamos deixar ninguém sair até o ajuste de fim de ano do Sensei terminar!"
10040080-154 = "Trabalhem rápido!!"
10040080-155 = "Sim~."
10040080-156 = "Sensei também!! Quem mais tem que se esforçar aqui é você, sabia!?"
10040080-157 = "[s12] \"Sim...\"\n[s13] \"Por minha causa... desculpem, pessoal.\""
10040080-164 = "……。"
10040080-165 = "……Fufu."
10040080-170 = "Realmente... começou um dia como qualquer outro, não é?"
10040080-171 = "Festa Secreta da Meia-Noite ~As mãos do demônio soam com o sino~"
