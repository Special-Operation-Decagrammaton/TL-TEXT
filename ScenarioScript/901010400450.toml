[translation]
901010400450-6 = "Come to think of it, I even ran into some tourists at the port..."
901010400450-7 = "It seems the townspeople actually believe in this ghost story."
901010400450-8 = "A lot of them are afraid of crab claws and shells, and some even think there are crabs out there that attack people..."
901010400450-9 = "I mean, really... is it even possible for such a ridiculous ghost story to spread like this?"
901010400450-10 = "What about the news? Or... I mean, you could just search online and see it's a lie, right?"
901010400450-11 = "People don't tend to show much interest in things that don't directly affect their own lives."
901010400450-12 = "What might be a serious problem for those involved is nothing more than a comedy to everyone else."
901010400450-13 = "Besides... sensational rumors are just so intriguing, aren't they?"
901010400450-14 = "Fact-checking is an afterthought. Once someone hits 'like' because it sounds interesting, it's no exaggeration to say that information has already spread."
901010400450-15 = "...I suppose you're right."
901010400450-20 = "In other words, the reason they believe in man-eating crabs is—"
901010400450-28 = "In other words, the reason they believe in man-eating crabs is—\n[as1] Because it actually happened.\n[as2] Someone used hypnosis to force them to believe it.\n[as3] Because the rumor spread."
901010400450-29 = "...Perhaps I didn't explain it well enough."
901010400450-30 = "Even after summarizing all the information we have, the possibility of crabs actually attacking people is low."
901010400450-40 = "There's no way that's true!?"
901010400450-41 = "No... she has a point. I remember hearing a rumor back in the day that Gehenna Academy was researching hypnosis machines."
901010400450-42 = "I think it was called... MK-Ultra something or other..."
901010400450-43 = "If those blueprints were leaked, it wouldn't be impossible."
901010400450-45 = "But there's no evidence that Gehenna is involved in this incident. Let's think about it again."
901010400450-53 = "Yes. The rumor is set at Kanezaki Port, but the people spreading it were ordinary citizens with no connection to the fishing industry."
901010400450-54 = "That's exactly why the crab in the ghost story could look different from the real thing and still spread without anyone questioning it."
901010400450-56 = "Everyone should try to be a bit more skeptical of the information they find online."
901010400450-57 = "There's a saying that goes something like this, right? #n'Don't believe the quotes attached to photos. - Kuzunoha'"
901010400450-58 = "That is the most suspicious thing I've ever heard."