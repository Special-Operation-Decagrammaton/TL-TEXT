[translation]
901010400450-6 = "Aliás, também conversei com uns turistas que vieram ao porto..."
901010400450-7 = "O pessoal da cidade parece acreditar no boato."
901010400450-8 = "Muitos também têm medo das pinças e da casca do caranguejo, e acham que existem caranguejos que atacam pessoas..."
901010400450-9 = "Como um boato tão sem noção desses pode se espalhar?"
901010400450-10 = "Basta pesquisar no Google para ver que é mentira."
901010400450-11 = "As pessoas não se interessam muito por coisas que não afetam diretamente suas vidas."
901010400450-12 = "O que é grave para uns, pode ser comédia para outros."
901010400450-13 = "E... boatos chamativos despertam curiosidade."
901010400450-14 = "A verificação dos fatos vem depois. Se parece interessante, você dá like, e a informação se espalha."
901010400450-15 = "... É mesmo."
901010400450-20 = "Então, o motivo de acreditarem em caranguejo que ataca pessoas é –"
901010400450-28 = "Então, o motivo de acreditarem em caranguejo que ataca pessoas é –\n[as1] Porque aconteceu de verdade.\n[as2] Alguém os hipnotizou.\n[as3] Por causa dos boatos."
901010400450-29 = "... Posso não ter me explicado bem."
901010400450-30 = "Mesmo com todas as informações, a possibilidade de um caranguejo atacar uma pessoa é baixa."
901010400450-40 = "Isso não é verdade!"
901010400450-41 = "Não... ele tem um ponto. Eu já ouvi falar que Gehenna pesquisava máquinas de hipnose."
901010400450-42 = "NK Ultra... alguma coisa assim."
901010400450-43 = "Se o projeto vazou, não é impossível."
901010400450-45 = "Mas não há evidências do envolvimento de Gehenna neste caso. Vamos pensar de novo."
901010400450-53 = "Sim. O boato se passa no Porto Kanezaki, mas quem o espalha são pessoas comuns, não ligadas à pesca."
901010400450-54 = "Por isso, mesmo que o caranguejo do boato seja diferente do real, ninguém questiona."
901010400450-56 = "Vocês também deviam desconfiar das informações que veem na internet."
901010400450-57 = "Tem um ditado: 'Não acredite em citações de fotos. – por Kuzunoha'"
901010400450-58 = "Essa foi a mais suspeita de todas."