[translation]#[Texto Final. - Filipe 05/07.]
901010400450-6 = "Falando nisso, também encontrei uns cidadãos que vieram visitar o porto……"
901010400450-7 = "Parece que o pessoal da cidade acredita na lenda."
901010400450-8 = "Muitos têm medo das pinças e da casca do caranguejo, e alguns acham que existe caranguejo que ataca gente……"
901010400450-9 = "Mas sério…… uma lenda tão furada assim se espalha de verdade?"
901010400450-10 = "É só ver as notícias…… ou pesquisar na internet, dá pra ver que é mentira na hora, não?"
901010400450-11 = "As pessoas não se interessam muito por assuntos que não afetam a vida delas diretamente."
901010400450-12 = "Mesmo que seja um problema sério pra quem está envolvido, pros outros não passa de uma piada."
901010400450-13 = "Além disso…… boato picante sempre atiça a curiosidade, né?"
901010400450-14 = "A verificação dos fatos fica em segundo plano. Se parece interessante e você dá um 'curtir', aquela informação já se espalhou, pode ter certeza."
901010400450-15 = "……É verdade."
901010400450-20 = "Ou seja, o motivo de acreditarem num caranguejo que ataca gente é――"
901010400450-28 = "Ou seja, o motivo de acreditarem num caranguejo que ataca gente é――\n[as1] Porque realmente aconteceu.\n[as2] Porque alguém hipnotizou todo mundo a acreditar.\n[as3] Porque o boato se espalhou."
901010400450-29 = "……Talvez eu não tenha explicado bem."
901010400450-30 = "Juntando todas as informações até agora, a chance de um caranguejo atacar alguém é bem baixa."
901010400450-40 = "Não tem como isso ser verdade!?"
901010400450-41 = "Não…… ela tem um ponto. Eu já ouvi falar que Gehenna pesquisava máquinas de hipnose."
901010400450-42 = "NK Ultra…… alguma coisa assim……"
901010400450-43 = "Se o projeto vazou, não é impossível."
901010400450-45 = "Mas não tem evidência de que Gehenna esteja envolvida nesse caso. Vamos pensar de novo."
901010400450-53 = "Certo. O boato tem como palco o porto de Kanezaki, mas quem o espalhou foram pessoas comuns sem ligação com a pesca."
901010400450-54 = "Por isso, mesmo que o caranguejo da lenda seja diferente do real, ele se espalhou sem ninguém questionar."
901010400450-56 = "Todo mundo devia desconfiar um pouco das informações que pega na internet."
901010400450-57 = "Até tem um ditado assim, né?#n'Não acredite em citações de foto. — Kuzunoha'"
901010400450-58 = "Essa é a frase mais suspeita que eu já ouvi."