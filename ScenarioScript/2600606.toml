[translation]
2600606-1 = "Chuva de meteoros e desejos"
2600606-2 = "Madrugada - Entrada do Schale"
2600606-3 = "Eu estava esperando por você, Sensei!"
2600606-4 = "Eu estava tão animada para hoje que mal consegui dormir... por pouco não perdi a hora."
2600606-5 = "Mas estou muito feliz que conseguimos ver a chuva de meteoros sem problemas."
2600606-6 = "Vamos, vamos subir logo para o terraço antes que fique muito tarde."
2600606-8 = "Madrugada - Terraço do prédio do Schale"
2600606-9 = "Ufa, parece que ainda não começou."
2600606-10 = "Você não está com frio, Sensei?"
2600606-11 = "As noites ultimamente estão bem geladas, é melhor se agasalhar bem."
2600606-12 = "Hehe, quer que eu prepare um chá?"
2600606-13 = "[s] \"Obrigado.\""
2600606-18 = "De alguma forma... ficar aqui sozinha com você no meio da noite me deixa um pouco envergonhada."
2600606-19 = "E o telescópio que eu trouxe com tanto esforço nem parece ser necessário para observar a chuva de meteoros..."
2600606-20 = "O-o que eu deveria dizer...?"
2600606-21 = "[s] \"Nodoka, olhe para o céu.\""
2600606-22 = "……Ah."
2600606-26 = "― Uau, [wa:500] uma estrela cadente! [wa:2100] Ah... [wa:550] ali também! [wa:1550] E ali!"
2600606-29 = "― O céu está cheio de estrelas cadentes! [wa:3500] Os meteoros [wa:800] estão caindo [wa:500] como chuva!"
2600606-31 = "― Ver uma cena tão linda assim ao vivo... [wa:3500] é realmente [wa:1250] como um sonho."
2600606-34 = "― Se eu tenho um desejo? [wa:4500] Não... [wa:1300] hoje, [wa:650] estou bem."
2600606-37 = "― Já que estou podendo ver um céu estrelado tão lindo [wa:2000] ao lado da pessoa que eu gosto,"
2600606-39 = "― se eu pedir mais alguma coisa, [wa:1450] sinto que [wa:820] as estrelas vão acabar me dando uma bronca..."
2600606-42 = "― Por hoje, [wa:950] isso já é [wa:800] o suficiente."
2600606-45 = "Mas por que será que surgiu essa história de que fazer um pedido para uma estrela cadente faz ele se realizar?"
2600606-46 = "É lindo, com certeza, mas deveria ser apenas um fenômeno astronômico sem relação nenhuma com os desejos das pessoas..."
2600606-47 = "O que você acha, Sensei?"
2600606-48 = "(Sem resposta. Parece que você adormeceu.)"
2600606-49 = "Ah, não pode dormir aqui!"
2600606-50 = "Poxa, Sensei~!"
2600606-52 = "Depois disso, fiquei observando o céu noturno com a Nodoka até a chuva de meteoros passar."
