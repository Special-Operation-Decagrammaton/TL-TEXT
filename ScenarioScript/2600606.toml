[translation]
2600606-1 = "流星群と願い事"
2600606-2 = "深夜・シャーレ入口"
2600606-3 = "待ってました、先生！"
2600606-4 = "今日が楽しみ過ぎて、あまり眠れなかったせいで……危うく寝坊するところでした。"
2600606-5 = "でもこうして無事に流星群が見られそうで、本当に良かったです。"
2600606-6 = "さあ、遅くなる前に早く屋上に行きましょう。"
2600606-8 = "深夜・シャーレ建物の屋上"
2600606-9 = "ふう、まだ始まってないみたいですね。"
2600606-10 = "寒くはないですか、先生？"
2600606-11 = "最近の夜は結構肌寒いので、しっかり着ておいた方が良いですよ。"
2600606-12 = "ふふ、お茶でも入れましょうか？"
2600606-13 = "[s] \"ありがとう。\""
2600606-18 = "なんだか……こうして夜中に二人っきりでいると、ちょっと照れますね。"
2600606-19 = "せっかく持ってきた天体望遠鏡も、流星群を観測する時は必要なさそうですし……。"
2600606-20 = "な、何を話せばいいんでしょうか……？"
2600606-21 = "[s] \"ノドカ、空を見て。\""
2600606-22 = "……あっ。"
2600606-26 = "― うわっ、[wa:500]流れ星です！[wa:2100]あっ……[wa:550]あそこにも！[wa:1550]そっちにも！"
2600606-29 = "― 空に流れ星がいっぱいです！[wa:3500]流星が[wa:800]本当に、[wa:500]雨のように降ってますね！"
2600606-31 = "― こんなに美しい光景を実際に見られるなんて……[wa:3500]本当に、[wa:1250]夢みたいです。"
2600606-34 = "― 願い事ですか？[wa:4500]いえ……[wa:1300]今日は、[wa:650]大丈夫です。"
2600606-37 = "― 好きな人と一緒に、[wa:2000]こんなに綺麗な星空を見ることができているのに、"
2600606-39 = "― これ以上願い事をしたら、[wa:1450]なんだか[wa:820]お星様に叱られてしまいそうで……。"
2600606-42 = "― 今日は[wa:950]これだけで、[wa:800]満足です。"
2600606-45 = "でも、どうして流れ星に願い事をすると叶う、なんてお話が生まれたんでしょうか？"
2600606-46 = "たしかに綺麗ですが、人の願い事とは関係のない、ただの天体現象のはずなのに……。"
2600606-47 = "先生はどう思われますか？"
2600606-48 = "（返事がない。寝てしまったようだ）"
2600606-49 = "ああっ、ここで寝ちゃダメですよ！"
2600606-50 = "も～、先生～！"
2600606-52 = "それから、流星群がやむまでノドカと一緒に夜空を見ていた。"
