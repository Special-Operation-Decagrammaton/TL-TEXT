[translation]
10021017-9 = "現在、「箱舟」の全エネルギーが一ヶ所に集中しています……！！"
10021017-10 = "あそこに先生が！エネルギーが集中している場所です！"
10021017-11 = "まずい……通信が不安定になってきてる。"
10021017-12 = "な、なんとかしてアレを止めるわよ！"
10021017-13 = "このままでは、自爆シーケンスが起動する前に……"
10021017-14 = "もう時間がないわ！#n今すぐシーケンスを起動しないと、すべてが台無しになってしまう！ヒマリ部長、いけますか？"
10021017-15 = "まだシーケンスの構築が完了しておりません。このように不安定な状態で起動してしまえば――"
10021017-16 = "――私たちが脱出する時間を確保できない可能性があります。"
10021017-17 = "美食研究会とゲーム開発部が管制室に到着しました！！#nアビドスは先生をサポートしつつ戦闘に加勢する予定です！！"
10021017-21 = "……。"
10021017-22 = "ど、どうする？押しちゃって大丈夫な感じ？"
10021017-23 = "リン先輩……。"
10021017-24 = "……リオ会長。"
10021017-28 = "ええ、聞こえているわ。"
10021017-29 = "確認ですが――「脱出シーケンス」とは具体的にどのような手法となるのですか？"
10021017-30 = "「脱出シーケンス」は――箱舟の内部にいる人物を、地上の座標に空間跳躍させるものよ。"
10021017-31 = "シミュレーターで試行しているので、仕組み自体は問題なく動くはずよ。#n人数分のシーケンスを確保してあるわ。"
10021017-32 = "……先生を含めて23名ですので、23回分ある認識で合っておりますか？"
10021017-33 = "ええ――「箱舟」の演算機能を利用しているから、内部にいるならどこからでも使えるはずよ。"
10021017-34 = "注意事項は？"
10021017-36 = "「箱舟」が大破してから使う場合、猶予はほとんどないと思ってちょうだい。#n爆発に巻き込まれる前に使うのが理想よ。"
10021017-37 = "つまり――残された時間はあまり無い、ということですね。"
10021017-41 = "……分かりました、すぐに実行するしかありませんね。"
10021017-42 = "これより、箱舟は自爆準備に入ります。#n艦内にいる全ての方に「脱出シーケンス」で脱出するようお伝え下さい！"
10021017-43 = "は、はい！！お伝えします！"
10021017-44 = "それでは、「アトラ・ハシースの箱舟」の「自爆シーケンス」を――#n――起動します！！"
10021017-46 = "「自爆シーケンス」起動します。"
10021017-53 = "うわぁぁああっ！！"
10021017-54 = "きゃぁっ！？"
10021017-55 = "くっ、まだ……次の波が来ますよ！"
10021017-56 = "ウトナピシュティムも爆発するわ！#n急いで「脱出シーケンス」を使用してちょうだい！！"
10021017-60 = "きゃぁっ！？"
10021017-64 = "……！！アコ！？"
10021017-65 = "瓦礫に、足が……！"
10021017-66 = "いま助けるから待ってて。"
10021017-67 = "カヨコさん……。"
10021017-68 = "ぐ……っ……！"
10021017-72 = "よし……急いで脱出して。"
10021017-76 = "……カヨコさん、ありがとうございます……#nではまた、地上で。"
10021017-79 = "「脱出シーケンス」：残り23回"
10021017-83 = "「脱出シーケンス」：残り22回"
10021017-86 = "アコは脱出完了……こんな感じなんだね。"
10021017-87 = "それじゃ、私も。#n――みんなも、急いで！！"
10021017-91 = "「脱出シーケンス」：残り21回"
10021017-93 = "二人は無事脱出完了したわね！#nさあ、続くわよ！"
10021017-97 = "わわっ！！ほら、急ぐよ！"
10021017-98 = "リン先輩、早く脱出を！！"
10021017-99 = "……私は最後で大丈夫です。#n皆さん、先に行ってください。"
10021017-100 = "リン先輩……？"
10021017-101 = "先生がまだ戦っています……プレナパテスが何をしてくるか分かりませんから。私はここに残って、最後まで先生をサポートします。"
10021017-102 = "も、もしかして変なこと考えてないよね！？"
10021017-103 = "縁起でもないことを言わないでくれませんか。#n先生と一緒に向かいますので、二人とも先に脱出してください。"
10021017-107 = "お、おっけ！じゃあ後で……！"
10021017-108 = "はい！！それでは、地上で……！！"
10021017-113 = "「脱出シーケンス」：残り20回"
10021017-117 = "「脱出シーケンス」：残り19回"
10021017-119 = "ヒマリさん、私たちも行きますよ！"
10021017-120 = "分かりました――ですが、その前にリンさん。"
10021017-124 = "アリスが生成した「箱舟」――#nいえ、「光の剣：アトラ・ハシースのスーパーノヴァ」を整備しておきました。"
10021017-125 = "ウトナピシュティムのエネルギーと連動していますので、あと1回は使えます。約15%の出力ではありますが、まだ何が起こるか分かりませんので。"
10021017-126 = "スーパーノ……その名前で決まったのですね。"
10021017-127 = "あら、素敵な名前だと思いませんか？"
10021017-128 = "……主砲、と呼んでおきます。"
10021017-129 = "……面白くありませんねぇ。"
10021017-134 = "ヒマリさん、そろそろ行かないと……それではリンさん、お気をつけて。"
10021017-135 = "……はい。ありがとうございます、ハナコさん、ヒマリさん。#nそして、リオ会長にも――感謝している、とお伝え下さい。"
10021017-139 = "「脱出シーケンス」：残り18回"
10021017-143 = "「脱出シーケンス」：残り17回"
10021017-145 = "はぁ……会長に言いたいことは山ほどあるけど……「脱出シーケンス」を作ってくれたことには感謝しなきゃね。#nそれじゃ、アヤネも――"
10021017-146 = "いえ……私も、リンさんと一緒に残ります。"
10021017-147 = "ああ……まだ、対策委員会のみなさんが戦っているものね。"
10021017-148 = "はい……それに、あのシロコ先輩、といいますか……#nあの人の事、なんだか放っておけなくて……。"
10021017-149 = "そっか、了解。#nそれじゃ、ゲーム開発部も一緒にいるはずだから、後は頼んだわよ！"
10021017-150 = "はい！お任せください！"
10021017-156 = "「脱出シーケンス」：残り16回"
10021017-159 = "……リンさん！それでは、私たちは――"
10021017-160 = "はい。一緒に先生をサポートしましょう！"
10021017-162 = "対策委員会、ゲーム開発部、美食研究会のみなさん……そして、先生。"
10021017-163 = "私の声が届いていますでしょうか？こちらはみなさん脱出しました！箱舟は、間もなく完全に崩壊します！！"
10021017-164 = "「脱出シーケンス」の準備はできていますので、急いで脱出をお願いします！こちらも続きますので！！"
10021017-165 = "そうなのですね……それではまず、フウカさんから行きましょうか。"
10021017-170 = "「脱出シーケンス」：残り15回"
10021017-175 = "箱舟が完全に破壊されてしまえば脱出できなくなります！急いで……！"
10021017-176 = "そろそろ、最後の爆発がきます……どうか、気をつけてください先生！！"
10021017-177 = "……今もなお、箱舟の全エネルギーがプレナパテスに集中しています。"
10021017-178 = "何をしようとしているのかは定かではありませんが、あのエネルギー量……下手すれば、箱舟が宇宙まで――"
10021017-179 = "あのままでは……！#nまずい、今すぐプレナパテスを止めないと！"
10021017-181 = "先生、最後の戦いを……お願いします！！"
