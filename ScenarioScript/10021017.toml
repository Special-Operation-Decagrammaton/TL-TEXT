[translation]
10021017-9 = "Neste momento, toda a energia da \"Arca\" está concentrada em um único ponto...!!"
10021017-10 = "O Sensei está lá! É onde a energia está concentrada!"
10021017-11 = "Droga... a comunicação está ficando instável."
10021017-12 = "T-temos que dar um jeito de parar aquilo!"
10021017-13 = "Se continuarmos assim, antes que a sequência de autodestruição seja ativada..."
10021017-14 = "Não temos mais tempo!#nSe não iniciarmos a sequência agora, tudo estará perdido! Diretora Himari, consegue fazer isso?"
10021017-15 = "A construção da sequência ainda não foi concluída. Se a iniciarmos em um estado tão instável assim—"
10021017-16 = "—existe a possibilidade de não conseguirmos garantir tempo suficiente para nossa fuga."
10021017-17 = "O Clube de Pesquisa Gastronômica e o Departamento de Desenvolvimento de Jogos chegaram à sala de controle!!#nAbydos planeja dar suporte ao Sensei enquanto se junta ao combate!!"
10021017-21 = "..."
10021017-22 = "E-e agora? É seguro apertar?"
10021017-23 = "Rin-senpai..."
10021017-24 = "...Presidente Rio."
10021017-28 = "Sim, estou ouvindo."
10021017-29 = "Só para confirmar—qual é o método específico dessa \"sequência de fuga\"?"
10021017-30 = "A \"sequência de fuga\" é... algo que teletransporta as pessoas dentro da Arca para coordenadas na superfície."
10021017-31 = "Como testamos no simulador, o mecanismo em si deve funcionar sem problemas.#nGaranti sequências suficientes para todos."
10021017-32 = "...Somos 23 pessoas, incluindo o Sensei, então entendo que temos 23 usos disponíveis, correto?"
10021017-33 = "Sim—como estamos usando a função de cálculo da \"Arca\", deve funcionar de qualquer lugar, desde que estejam dentro dela."
10021017-34 = "Alguma precaução?"
10021017-36 = "Se for usar depois que a \"Arca\" sofrer danos graves, considere que não haverá margem de erro.#nO ideal é usar antes de ser pego pela explosão."
10021017-37 = "Ou seja—não nos resta muito tempo, não é?"
10021017-41 = "...Entendido, não temos escolha a não ser executar imediatamente."
10021017-42 = "A partir de agora, a Arca entrará em preparação para autodestruição.#nPor favor, avisem a todos a bordo para escaparem usando a \"sequência de fuga\"!"
10021017-43 = "S-sim!! Vou avisar!"
10021017-44 = "Então, a \"sequência de autodestruição\" da \"Arca de Atra-Hasis\" será...#n—iniciada agora!!"
10021017-46 = "\"Sequência de autodestruição\" iniciada."
10021017-53 = "Aaaaaahhh!!"
10021017-54 = "Kyaa!?"
10021017-55 = "Droga, ainda não... a próxima onda está vindo!"
10021017-56 = "Utnapishtim também vai explodir!#nUsem a \"sequência de fuga\" rapidamente!!"
10021017-60 = "Kyaa!?"
10021017-64 = "...!! Ako!?"
10021017-65 = "Minha perna... está presa nos escombros...!"
10021017-66 = "Vou te ajudar agora, espere."
10021017-67 = "Kayoko-san..."
10021017-68 = "Guh...!"
10021017-72 = "Pronto... fuja rápido."
10021017-76 = "...Kayoko-san, obrigada...#nNos vemos na superfície."
10021017-79 = "\"Sequência de fuga\": 23 usos restantes"
10021017-83 = "\"Sequência de fuga\": 22 usos restantes"
10021017-86 = "A fuga da Ako foi concluída... então é assim que funciona."
10021017-87 = "Bem, agora é minha vez.#n—Pessoal, apressem-se!!"
10021017-91 = "\"Sequência de fuga\": 21 usos restantes"
10021017-93 = "As duas conseguiram escapar em segurança!#nVamos, continuem!"
10021017-97 = "Uwaa!! Vamos, apressem-se!"
10021017-98 = "Rin-senpai, fuja logo!!"
10021017-99 = "...Eu ficarei por último, não se preocupem.#nPor favor, vão na frente."
10021017-100 = "Rin-senpai...?"
10021017-101 = "O Sensei ainda está lutando... não sabemos o que Plana-Pates fará. Vou ficar aqui e dar suporte ao Sensei até o fim."
10021017-102 = "V-você não está pensando em nada estranho, está!?"
10021017-103 = "Por favor, não diga coisas agourentas. #nEu irei com o Sensei, então vocês duas escapem primeiro."
10021017-107 = "O-ok! Então, até mais...!"
10021017-108 = "Sim!! Então, nos vemos na superfície...!!"
10021017-113 = "「Sequência de Fuga」: Restam 20"
10021017-117 = "「Sequência de Fuga」: Restam 19"
10021017-119 = "Himari-san, nós também vamos!"
10021017-120 = "Entendido — mas antes disso, Rin-san."
10021017-124 = "Eu fiz a manutenção da 「Arca」 que a Alice gerou — #nnão, da 「Espada de Luz: Supernova de Atra-Hasis」."
10021017-125 = "Como ela está conectada à energia de Utnapishtim, pode ser usada mais uma vez. Embora esteja com cerca de 15% da potência, não sabemos o que pode acontecer ainda."
10021017-126 = "Supernova... Então esse foi o nome decidido."
10021017-127 = "Ora, você não acha um nome maravilhoso?"
10021017-128 = "...Vou chamá-la de canhão principal."
10021017-129 = "...Que sem graça."
10021017-134 = "Himari-san, precisamos ir logo... Então, Rin-san, tome cuidado."
10021017-135 = "...Sim. Obrigada, Hanako-san, Himari-san. #ne por favor, diga à Presidente Rio também — que eu sou grata."
10021017-139 = "「Sequência de Fuga」: Restam 18"
10021017-143 = "「Sequência de Fuga」: Restam 17"
10021017-145 = "Haa... Eu tenho um monte de coisas para dizer à Presidente, mas... tenho que agradecer por ela ter criado a 「Sequência de Fuga」. #nBem, então, Ayane também —"
10021017-146 = "Não... Eu também ficarei com a Rin-san."
10021017-147 = "Ah... É verdade, o pessoal do Comitê de Contramedidas ainda está lutando."
10021017-148 = "Sim... Além disso, aquela Shiroko-senpai, ou melhor... #nEu não consigo deixar aquela pessoa sozinha..."
10021017-149 = "Entendi, compreendido. #nEntão, o Clube de Desenvolvimento de Jogos também deve estar lá, conto com vocês!"
10021017-150 = "Sim! Pode deixar conosco!"
10021017-156 = "「Sequência de Fuga」: Restam 16"
10021017-159 = "...Rin-san! Então, nós vamos —"
10021017-160 = "Sim. Vamos apoiar o Sensei juntos!"
10021017-162 = "Pessoal do Comitê de Contramedidas, do Clube de Desenvolvimento de Jogos, do Clube de Pesquisa Gastronômica... e Sensei."
10021017-163 = "Minha voz está chegando até vocês? Todos aqui já escaparam! A Arca entrará em colapso total em breve!!"
10021017-164 = "A 「Sequência de Fuga」 está pronta, então por favor, escapem rapidamente! Nós também seguiremos logo atrás!!"
10021017-165 = "Entendo... Então, vamos começar com você, Fuuka-san."
10021017-170 = "「Sequência de Fuga」: Restam 15"
10021017-175 = "Se a Arca for completamente destruída, não será possível escapar! Depressa...!"
10021017-176 = "A última explosão virá em breve... Por favor, tome cuidado, Sensei!!"
10021017-177 = "...Mesmo agora, toda a energia da Arca está concentrada em Plana-pathes."
10021017-178 = "Não tenho certeza do que ele está tentando fazer, mas com aquela quantidade de energia... se algo der errado, a Arca pode chegar até o espaço —"
10021017-179 = "Desse jeito...! #nDroga, preciso parar Plana-pathes agora mesmo!"
10021017-181 = "Sensei, por favor... vença a batalha final!!"
