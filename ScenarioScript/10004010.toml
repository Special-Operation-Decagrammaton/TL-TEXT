[translation]
10004010-1 = "Episódio 1: A Melancolia da Instrutora Shun"
10004010-2 = "Shanhaijing, Departamento de Apoio Educacional 'Plum Blossom Garden'"
10004010-6 = "Ah, desta vez eu realmente me sinto exausta..."
10004010-7 = "Elas são como anjinhos na maior parte do tempo, mas quando começam a fazer bagunça, não ouvem nada do que eu digo e às vezes fico sem saber o que fazer..."
10004010-8 = "Às vezes, eu também queria ser assim, sem preocupações, e poder fazer birra..."
10004010-9 = "……Não, eu não posso simplesmente fugir."
10004010-10 = "Guiar essas crianças é o meu dever como instrutora de Shanhaijing! Não é hora de ficar reclamando!"
10004010-11 = "Além disso, ficar franzindo a testa o tempo todo não faz bem para a beleza, dizem por aí."
10004010-12 = "Bem... então, para mudar um pouco o clima, que tal eu me dar uma recompensa?"
10004010-13 = "Fufu, um sorvete de rum com passas da 'Haagen-Dazs'...!"
10004010-14 = "É um sabor difícil de encontrar em Shanhaijing, então eu estava guardando com muito carinho... mas acho que hoje posso comer e relaxar um pouco, não é?"
10004010-15 = "Então..."
10004010-18 = "Hã, ué? Eu deveria ter colocado no freezer..."
10004010-20 = "Ah, Shun, o que você está procurando?"
10004010-21 = "Ora, Kokona-chan."
10004010-22 = "O sorvete que eu guardei aqui sumiu... você por acaso não o viu?"
10004010-23 = "Ah, aquele? Estava delicioso, sabia?"
10004010-24 = "Eeeeeh!? V-você comeu!?"
10004010-25 = "Ai, ai... eu estava guardando com tanto cuidado para comer em um dia especial..."
10004010-26 = "M-mas na semana passada você não disse: 'Vou começar uma dieta, então não vou mais comer sorvetes ou doces'?"
10004010-27 = "Então, pensei que seria melhor eu comer para não te deixar sofrendo..."
10004010-28 = "Uuuuu..."
10004010-29 = "D-desculpa... hum, você quer um 'Gorigori-kun' sabor sopa de milho que eu comprei outro dia?"
10004010-30 = "Não, está tudo bem, obrigada... A culpa também é minha por não ter dito para 'não tocar nele'..."
10004010-31 = "Ah, aliás, Shun. Você pode cuidar do lanche da tarde do grupo Girassol no meu lugar?"
10004010-32 = "Por mim tudo bem, mas aconteceu algum imprevisto?"
10004010-33 = "Não, é que ouvi dizer que o lanche de hoje é 'bolo de cenoura'... e eu não gosto muito de cenoura..."
10004010-34 = "Kokona-chan... eu já disse antes, se você for seletiva com a comida, não vai se tornar uma instrutora exemplar..."
10004010-35 = "Uu, lá vem você com sermão de novo... Eu já sei disso sem você precisar dizer!"
10004010-36 = "De qualquer forma, eu compenso você depois! Por favor, faz isso por mim!"
10004010-40 = "E-espere, Kokona-chan!"
10004010-42 = "……Puxa."
10004010-43 = "Por que todos são tão egoístas..."
10004010-44 = "As crianças, a Kokona..."
10004010-46 = "Eu também queria, de vez em quando, agir de forma infantil e fazer o que bem entendesse!"
10004010-47 = "……Opa, não posso pensar assim. Mantenha a calma, mantenha a calma..."
10004010-48 = "O estresse é inimigo da beleza! Se eu ficar pensando nessas coisas, o antienvelhecimento não vai adiantar de nada."
10004010-49 = "Já não basta que, ultimamente, por causa do cansaço, minha pele esteja ficando ruim... preciso procurar algum tratamento de beleza novo."
10004010-50 = "Ah, falando nisso, outro dia... a Saya, do Clube de Pesquisa de Alquimia, mencionou algo sobre um 'elixir da imortalidade'..."
10004010-51 = "Mesmo que não seja a 'imortalidade' em si, talvez ela saiba de algum remédio que ajude no antienvelhecimento."
10004010-52 = "Ainda falta um tempo para o lanche da tarde... que tal eu dar uma passada no Clube de Pesquisa de Alquimia?"
10004010-54 = "Clube de Pesquisa de Alquimia - Laboratório da Saya"
10004010-55 = "Fu-fu-fu-fu-fu... muito bem, estou ansiosa para ver onde e que tipo de experimento farei hoje!"
10004010-57 = "Hum, com licença."
10004010-58 = "Hm? Não é a Shun, do Plum Blossom Garden? Bem-vinda ao meu laboratório!"
10004010-59 = "Ah, Saya-san. Você está usando uma roupa bem bonitinha hoje."
10004010-60 = "Vai sair para algum lugar depois daqui?"
10004010-61 = "Sim. Tenho um compromisso para encontrar o Sensei [USERNAME] na cidade hoje à tarde."
10004010-62 = "Ele disse que queria me consultar sobre alguns medicamentos de uso contínuo para deixar no Schale."
10004010-63 = "O quê, com o Sensei...!?"
10004010-64 = "É verdade, mas isso é algum problema?"
10004010-65 = "Não, não é bem isso, mas..."
10004010-66 = "（Quando perguntei sobre seus planos da última vez, você disse que estaria ocupada por um tempo... Então, o compromisso com a Saya-san já estava marcado...）"
10004010-67 = "（Claro, parece ser parte do trabalho do Schale, mas... sinto um aperto no peito...）"
10004010-68 = "Hmm? A propósito, por que você veio ao meu laboratório hoje? É sobre o Jardim das Ameixeiras?"
10004010-69 = "Ou será que... você veio pedir para eu mediar o conflito entre o Genryumon e a Associação Genbu!? Por mais que eu seja um gênio, não posso aceitar esse pedido!"
10004010-70 = "N-não, de jeito nenhum..."
10004010-71 = "Eu não me intrometeria naquela disputa sangrenta."
10004010-72 = "Bem, o motivo de eu ter vindo aqui hoje é que... eu queria perguntar sobre um remédio."
10004010-73 = "Remédio? Você está se sentindo mal?"
10004010-74 = "Não, meu corpo está bem, mas..."
10004010-75 = "Não sei se é pelo cansaço acumulado ou pelo estresse, mas minha pele está ficando irritada..."
10004010-76 = "Eu gostaria de saber se você poderia me indicar algum remédio bom para a pele."
10004010-77 = "Fu-fu-fu-fu! Entendo, é isso... Eu estava justamente terminando de criar um novo elixir secreto para momentos como este!"
10004010-78 = "O nome dele é..."
10004010-80 = "Exatamente, o \"Elixir da Juventude\"!"
10004010-82 = "Elixir da... juventude?"
10004010-87 = "Isso! Este remédio é uma nova criação minha; basta tomar um gole para que qualquer pessoa fique com a pele macia como a de um recém-nascido!"
10004010-88 = "Como ainda está em fase de testes, pode ter alguns efeitos colaterais leves... mas a eficácia é garantida! Provavelmente."
10004010-89 = "E então, vai experimentar?"
10004010-90 = "S-sim! Com certeza!"
10004010-91 = "Ótimo."
10004010-94 = "Então tome isso e me diga como se sente."
10004010-100 = "（Se eu realmente tomar este remédio, como uma criança pequena...）"
10004010-101 = "（Pensando bem, quando eu era criança, não me preocupava com a pele nem sentia tanto cansaço...）"
10004010-102 = "（...Talvez fosse melhor ter continuado criança. Com o passar do tempo, tantas coisas desagradáveis surgiram...）"
10004010-103 = "（Já que estou aqui, quem sabe voltar a ser uma criança pequena...）"
10004010-114 = "...Como está? Sente alguma mudança?"
10004010-115 = "Não sei bem, mas meu corpo está quente e sinto uma pontada de dor..."
10004010-116 = "Hm, isso é estranho. Não deveria haver nenhum componente nos ingredientes que aquecesse o corpo—"
10004010-117 = "Espera, o quê!?"
10004010-118 = "O-o que houve, Saya-san?"
10004010-119 = "Não, o que houve digo eu..."
10004010-120 = "Ué, Saya-san, desde quando você ficou tão grande...? Por que a minha linha de visão está..."
10004010-121 = "Não fui eu que cresci, é você que está encolhendo, Shun! Olhe no espelho!"
10004010-122 = "Espelho...?"
10004010-132 = "Aaaaah!? P-por que o meu corpo está encolhendo...!?"
10004010-133 = "E-eu também não sei! Isso foi totalmente inesperado!"
10004010-134 = "Eu previ que a pele ficaria macia e que o corpo poderia esticar como borracha, mas não que ele fosse diminuir de tamanho..."
10004010-135 = "Saya-san, pelo menos você deveria ter previsto isso antes de me dar esse remédio..."
10004010-136 = "N-não se preocupe! Como sou um gênio, posso criar um antídoto rapidamente!"
10004010-137 = "Espere um pouco! Vou ao depósito do clube buscar os ingredientes agora mesmo!"
10004010-142 = "Ufa, que situação inesperada... Eu andava pensando em \"voltar a ser criança\", mas não imaginei que isso realmente aconteceria..."
10004010-143 = "Mas, de fato, minha pele ficou bem lisa. E tem aquele cheirinho suave de criança..."
10004010-150 = "Ah, meus ombros não doem nem quando me movimento bastante, e meu corpo parece tão leve!"
10004010-151 = "Este corpo, até que não é nada mal..."
10004010-154 = "[ns] \"Olá.\""
10004010-155 = "P-Sensei!? O-o que faz aqui...!?"
10004010-156 = "E-essa aparência é porque..."
10004010-157 = "[s] \"Hum... você é uma criança do Jardim das Ameixeiras? Prazer em conhecê-la.\""
10004010-158 = "Eh?"
10004010-159 = "Ah, sim, prazer em conhecê-lo...?"
10004010-162 = "(Será que o Sensei não percebeu quem eu sou...?)"
10004010-163 = "(Bem, faz sentido, já que estou parecendo ainda mais nova que a Kokona...)"
10004010-164 = "(Tentar explicar só vai complicar as coisas, e parece que vou voltar ao normal logo... então, por enquanto...)"
10004010-167 = "E-e-então, eu sou a Shuerin, tenho 9 anos e cheguei recentemente ao Jardim das Ameixeiras!"
10004010-168 = "Eu estava passeando por Shanhaijing com a irmã Shun, mas acabei me perdendo..."
10004010-169 = "[s1] \"Entendo. Prazer em conhecê-la.\"\n[s2] \"A propósito, você viu uma garota chamada Saya? Tínhamos um compromisso...\""
10004010-170 = "Ah, a irmã Saya... bem, se não me engano, ouvi dizer que ela saiu para algum lugar."
10004010-171 = "Ah, a irmã Saya... bem, se não me engano, ouvi dizer que ela saiu para algum lugar."
10004010-172 = "[s3] \"Entendi. Então, enquanto ela não volta, quer que a gente procure a Shun juntos?\"\n[s4] \"Parece que vai demorar para a Saya voltar.\""
10004010-173 = "E-e-então, não precisa se incomodar tanto assim..."
10004010-174 = "E-e-então, não precisa se incomodar tanto assim..."
10004010-177 = "(S-sinto que acabei me intrometendo nos planos do Sensei com a Saya...)"
10004010-178 = "(E, mesmo que tenha sido por impulso, acabei mentindo para o Sensei...)"
10004010-179 = "(M-mas, pensando bem, essa situação toda é culpa da Saya, não é...?)"
10004010-180 = "(Afinal, se isso não tivesse acontecido, eu não teria precisado mentir para o Sensei... isso não seria legítima defesa!?)"
10004010-183 = "E-então, por favor... conto com você, Sensei!"
10004010-184 = "[s] \"Certo, pode deixar. Por onde vocês se separaram?\""
10004010-185 = "Isso é... ah, talvez perto da Associação Xuanwu?"
10004010-186 = "Ouvi dizer que uma loja de \"tanghulu\" deliciosa ia lançar um sabor novo, e eu queria ir... quer dizer, a irmã Shun também gosta, então talvez ela tenha ido para lá."
10004010-187 = "C-claro que a irmã Shun não é uma instrutora irresponsável que deixaria as crianças sozinhas para ir comer algo gostoso, mas...!"
10004010-188 = "[s] \"Err, por que a Shuerin está se desculpando por ela...?\""
10004010-189 = "É que, bem, pensei que a irmã Shun diria algo assim... ahaha..."
10004010-190 = "V-vamos, não se preocupe com os detalhes, vamos logo, Sensei!"
