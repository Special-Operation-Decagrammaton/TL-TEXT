[translation]
11170-2 = "第17話;立ち込める暗雲"
11170-3 = "便利屋・オフィス"
11170-5 = "おはよー。"
11170-6 = "（げっそり）おはよう……。"
11170-7 = "うわっ、ビックリした！アルちゃん、徹夜でもした？"
11170-8 = "ううん、ちゃんと寝たわ……。"
11170-9 = "社長、何か悩みでもあるの？"
11170-10 = "計画はしっかり立てたじゃん？#n人をこれまでの2倍雇って、地の利を生かせる戦場にアビドスを誘き出す。"
11170-11 = "ハルカは爆弾を設置しに、朝早く出かけた。#n計画では、爆弾を数十か所埋設したゾーンでアビドスを#nコテンパンにするって感じだよね。"
11170-13 = "（ガチャッ）"
11170-14 = "ただいま戻りました。"
11170-15 = "お帰り、ハルカ。お疲れ様。"
11170-16 = "主要ポイントに爆弾を埋めておきました。あとは、このボタンを押すだけで……。"
11170-17 = "よしよし、頑張ったねー。場所だけは忘れずに、しっかり覚えといて。"
11170-18 = "いつでも言ってください。私がこの手で、全部吹っ飛ばしてやりますから……この手で……。"
11170-19 = "はあ……。"
11170-20 = "なぁに死にそうな顔してんの？#nそれなら最初から、例のクライアントから手付金をもらって、それを資金に充てれば良かったじゃん。"
11170-21 = "……手付金はもらわない。それがうちの鉄則よ。"
11170-22 = "手付金をもらうと、クライアントの命令に従わざるを得なくなるから……って理由だったっけ？"
11170-23 = "その通り。華麗に仕事を終えてから依頼料を受け取る。#nこの順番が崩れたら、私たちが追求するビジョンは達成できないの。"
11170-24 = "ビジョン？そんなのあったっけ？"
11170-25 = "あるわよ！！法律と規律に縛られない、ハードボイルドなアウトロー！#nそれが便利屋68のビジョンでしょう！！"
11170-26 = "そうだっけ？ああ、思い出した、思い出した。"
11170-27 = "さっきカヨコが言ったように、クライアントの依頼も同じ。#nそれが私たちを縛り付ける足枷になることもあるわ。#n私たちが望まない行動を強いられるかもしれないのよ。"
11170-28 = "だから依頼料は、絶対に成功報酬として受け取るの。"
11170-29 = "……。"
11170-30 = "そこまでプレッシャーを感じてるなら、全部投げ捨ててゲヘナに帰るのも手だよ、社長。"
11170-31 = "はあ！？"
11170-32 = "ぷ、プレッシャーだなんて言ってないわよ！ただ……ちょっとだけ……。"
11170-33 = "うーん、今更帰るのは無理なんじゃ？風紀委員のやつらが黙っちゃいないよ？"
11170-34 = "風紀委員会……か。"
11170-36 = "確かに風紀委員会は、私たちを目の上のたんこぶみたいに思ってはいるけど……。#n今の私たちは、やつらから逃げてきたわけじゃない。"
11170-37 = "それと、そもそもうちの風紀委員会が時にキヴォトス最強とも言われてる理由は……。"
11170-40 = "風紀委員長、ヒナの存在があるから。"
11170-41 = "風紀委員会の戦力の大半は、ほとんど彼女が担っていると言っても過言じゃない。#n百人力って言葉を体現しているような人。"
11170-42 = "言い換えるなら、"
11170-46 = "ヒナ以外の風紀委員は、大したことないってこと。"
11170-47 = "計画さえきちんと練れば、十分勝算はある。"
11170-49 = "そうなの？カヨコっち、そこまで考えてたんだ？"
11170-50 = "いつか必ず相まみえることになるだろうから。ヒナ抜きの風紀委員会なら#n今アビドスにかけている労力を考えれば、難なく戦えるよ。"
11170-51 = "逆に言えば、アビドスはそれぐらい侮れない相手ってこと。#n生徒の数が少ないってことが最大の弱点だけどね。"
11170-52 = "え？そんなに強いかな……。"
11170-55 = "……。"
11170-56 = "……いえ、今更ゲヘナに戻るっていう選択肢はないわ。"
11170-57 = "かといって……はあ。"
11170-58 = "……一体何がひっかかってるの？"
11170-59 = "わかったわかった。つまらない話はこれぐらいにして、アルちゃん、#nご飯食べに行こうよ。#nお腹空いたし。"
11170-60 = "ラーメン屋にする？柴関？"
11170-61 = "また？"
11170-62 = "気にしない気にしない。バイトちゃんは午後から入るみたいだし。#n鉢合わせなきゃ問題ないじゃん？"
11170-63 = "まあ……美味しかったしね。とにかく、社長を元気づけないと……。"
11170-64 = "じゃあ決まりー。行こ行こ♪"
11170-66 = "対策委員会・教室"
11170-68 = "（教室に入ると、ホシノがノノミの膝枕で横になっていた）"
11170-69 = "おはよー、先生。"
11170-70 = "先生、おはようございます。今日は早いですね？"
11170-71 = "ん？リラックスしてるねって？うへ～ノノミちゃんの膝枕は柔らかくてサイコーなんだよー。#n私だけの特等席だもんねー。"
11170-72 = "先生もいかがです？はい、どうぞ～☆"
11170-73 = "ダメだよー。ここは私の場所なんだから、先生はあっちの座り心地悪そうな#n椅子にでも座ってねー。"
11170-74 = "私の膝は先輩専用じゃないですよう……。"
11170-77 = "（ぼそっ）今度、誰もいない時にしましょうね、先生。"
11170-79 = "よいしょっと。"
11170-80 = "ふあぁ～、みんな朝早くから元気だなあ。"
11170-81 = "のんびりできるのは久しぶりですから……今はみんな、#nやりたいことをやってるんでしょうね。"
11170-82 = "んー、シロコちゃんはきっとトレーニングでしょうし、#nアヤネちゃんは多分勉強しに図書館でしょうか……。"
11170-83 = "ノノミちゃんは学校の掃除と教室の整頓をしてくれたよねー。#nうへ～、みんな真面目だなー。"
11170-84 = "ん？私？うへ～、私は当然ここでダラダラしてただけだよー。"
11170-85 = "先輩も何か始めてみてはどうでしょう？アルバイトとか、筋トレとか。"
11170-86 = "無理無理ー、おじさんは年齢的に無理がきかない体になっちゃったもんでねー。"
11170-87 = "歳は私とほぼ変わらないですよ？"
11170-88 = "うへ～。とにかく先生も来たし、他のみんなもそろそろじゃない？#nそんじゃ、私ゃこの辺でドロン。"
11170-89 = "あら先輩、どちらへ？"
11170-90 = "うへ～今日おじさんはオフなんでね。#nてきとうにサボってるから、何かあったら連絡ちょーだい、ノノミちゃん。"
11170-92 = "ホシノ先輩……またお昼寝しに行くみたいですね。"
11170-93 = "うーん、まあいいんじゃないでしょうか。会議はアヤネちゃんがしっかり進めてくれますから。"
11170-94 = "あはは……それにしてもホシノ先輩も、以前に比べてだいぶ変わりました。"
11170-95 = "え？以前はどうだったかって？"
11170-96 = "今はいつも寝ぼけているような感じですが……#n初めて出会った頃のホシノ先輩は、常に何かに追われているようでした。"
11170-97 = "何に追われていたかというと……んと、ありとあらゆることに、と言いましょうか。"
11170-98 = "聞いた話ですが、以前とある先輩がいたそうで……。"
11170-99 = "アビドス最後の生徒会長だったらしいんですがとても頼りない人で、その人がここを去ってからはすべてをホシノ先輩が引き受けることになった、と……。"
11170-100 = "ホシノ先輩は当時1年生だったとか……#n詳しくは、私も知らないのですが。"
11170-101 = "でも今は、先生もいますし、他の学園の生徒たちとも交流できますし……。"
11170-102 = "以前だったら、他の学園と関わること自体嫌がっていたはずが……#nかなり丸くなりましたね。"
11170-103 = "うん、きっと先生のおかげですね☆"
11170-105 = "……。"
11170-108 = "……。"
11170-109 = "これはこれは。"
11170-111 = "お待ちしておりましたよ、暁のホル……#nいや、ホシノさんでしたね。これは失礼。"
11170-112 = "いやいや、キヴォトスにはまだ馴染めていなくて。#nこちらへどうぞ、ホシノさん。"
11170-113 = "……黒服の人、今度は何の用なのさ？"
11170-114 = "……ふふ、状況が変わりましてね。#n今回は再度、アビドス最高の神秘をお持ちのホシノさんにご提案をしようと思いまして。"
11170-115 = "提案？ふざけるな！！！それはもう……！！"
11170-116 = "まあまあ、落ち着いてください。"
11170-117 = "……！？"
11170-118 = "……お気に入りの映画の台詞がありましてね。今回はそれを引用してみましょう。"
11170-120 = "（トサッ）"
11170-123 = "あなたに、決して拒めないであろう提案をひとつ。"
11170-124 = "興味深い提案だと思いますので、どうかご清聴ください。"
11170-125 = "ククッ、クックックックッ……"
11170-127 = "次回;友だちなんかじゃないわよ！"
