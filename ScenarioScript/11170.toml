[translation]
11170-2 = "Episódio 17; Nuvens escuras se reúnem"
11170-3 = "Faz-tudo/Escritório"
11170-5 = "Bom dia."
11170-6 = "(suspiro) Bom dia..."
11170-7 = "Nossa, fiquei surpreso! Al-chan, você ficou acordado a noite toda?"
11170-8 = "Bem, eu dormi bem..."
11170-9 = "Presidente, você está preocupado com alguma coisa?"
11170-10 = "Você fez um bom plano, não é? Contrate o dobro de #n pessoas de antes e atraia Abydos para um campo de batalha onde você poderá aproveitar a vantagem geográfica."
11170-11 = "Haruka saiu de manhã cedo para instalar a bomba. O plano #n é arrasar Abydos numa zona com dezenas de bombas enterradas."
11170-13 = "(gacha)"
11170-14 = "Estou de volta agora."
11170-15 = "Bem vindo ao lar, Haruka. bom trabalho."
11170-16 = "Enterrei bombas em pontos-chave. Tudo que você precisa fazer é pressionar este botão..."
11170-17 = "Tudo bem, você fez o seu melhor. Apenas lembre-se da localização e lembre-se dela com cuidado."
11170-18 = "Por favor, me diga a qualquer hora. Vou explodir tudo com minhas mãos... com minhas mãos..."
11170-19 = "Suspirar..."
11170-20 = "Por que você parece que está prestes a morrer? #nNesse caso, teria sido melhor ter recebido um depósito do cliente desde o início e utilizado para financiar o projeto."
11170-21 = "...Não recebo nenhum depósito. Essa é a nossa regra de ouro."
11170-22 = "A razão foi que se você recebesse um depósito, seria forçado a seguir as ordens do cliente...?"
11170-23 = "isso mesmo. Depois de concluir o trabalho de maneira brilhante, você receberá a taxa de solicitação. #nSe esta ordem for perturbada, não seremos capazes de alcançar a visão que perseguimos."
11170-24 = "visão? Houve tal coisa?"
11170-25 = "Há! ! Um fora-da-lei obstinado que não está sujeito a leis e regulamentos! #nEssa seria a visão do Handyman 68! !"
11170-26 = "É assim mesmo? Ah, eu lembrei, eu lembrei."
11170-27 = "Como Kayoko disse anteriormente, as solicitações dos clientes são as mesmas. #nPode se tornar as algemas que nos prendem. #nPodemos ser forçados a fazer algo que não queremos."
11170-28 = "É por isso que recebo absolutamente a taxa de solicitação como uma taxa de sucesso."
11170-29 = "……."
11170-30 = "Se você está sentindo tanta pressão, você pode simplesmente jogar tudo fora e voltar para a Gehenna, chefe."
11170-31 = "Ha! ?"
11170-32 = "P-Eu não disse que era pressão! Só… só um pouco…."
11170-33 = "Hmm, acho que é impossível ir para casa agora. Os membros do comitê disciplinar não vão calar a boca, certo?"
11170-34 = "Comitê de disciplina... hein?"
11170-36 = "É verdade que o Comitê Disciplinar nos considera nada mais do que um incômodo, mas... #nNão estamos fugindo deles."
11170-37 = "Além disso, a razão pela qual nosso comitê disciplinar às vezes é considerado o mais forte em Kivotos é..."
11170-40 = "Presidente do Comitê Disciplinar, é por causa da presença de Hina."
11170-41 = "Não é exagero dizer que ela é responsável pela maior parte da força do comitê moral. #n Uma pessoa que incorpora a palavra força de 100 pessoas."
11170-42 = "Em outras palavras,"
11170-46 = "Os membros do comitê disciplinar além de Hina não são grande coisa."
11170-47 = "Se você planejar corretamente, terá boas chances de ganhar."
11170-49 = "É assim mesmo? Kayoko-cchi, você estava pensando tanto assim?"
11170-50 = "Tenho certeza que nos encontraremos algum dia. Se for um comitê disciplinar sem Hina, será fácil lutar contra #n, considerando a quantidade de esforço que Abydos está investindo nisso atualmente."
11170-51 = "Por outro lado, Abydos é um adversário formidável. #nO maior ponto fraco é o pequeno número de alunos."
11170-52 = "foto? Eu me pergunto se é tão forte assim..."
11170-55 = "……."
11170-56 = "...Não, não tenho a opção de voltar para a Gehenna agora."
11170-57 = "No entanto... suspiro."
11170-58 = "...O que diabos está acontecendo?"
11170-59 = "Eu entendo, eu entendo. Chega dessa conversa chata, Al-chan, vamos comer #n. #nEstou com fome."
11170-60 = "Devemos transformá-lo em uma loja de ramen? Shibaseki?"
11170-61 = "Também?"
11170-62 = "Eu não me importo, eu não me importo. Parece que meu trabalho de meio período começará à tarde. #nSe não combinar não tem problema, certo?"
11170-63 = "Bem... estava delicioso. Enfim, tenho que animar o presidente..."
11170-64 = "Então está decidido. Vamos, vamos ♪"
11170-66 = "Força Tarefa/Sala de Aula"
11170-68 = "(Quando entrei na sala de aula, Hoshino estava deitado no colo de Nonomi.)"
11170-69 = "Bom dia, sensei."
11170-70 = "Bom dia, sensei. Não é cedo hoje?"
11170-71 = "sim? Você está se sentindo relaxado? Uau, o travesseiro de colo da Nonomi-chan é tão macio e perfeito. #nÉ um assento especial só para mim."
11170-72 = "E você, sensei? Sim, por favor~☆"
11170-73 = "Sem chance. Esta é a minha casa, então, por favor, sente-se naquela cadeira desconfortável ali."
11170-74 = "Acho que meus joelhos não são apenas para idosos..."
11170-77 = "(Resmungando) Da próxima vez, vamos fazer isso quando não houver ninguém por perto, Sensei."
11170-79 = "Bom tiro."
11170-80 = "Nossa, todo mundo parece estar bem desde de manhã cedo."
11170-81 = "Já faz muito tempo que não consigo relaxar... Acho que todo mundo está fazendo o que quer agora."
11170-82 = "Hmm, Shiroko-chan provavelmente está treinando, e #nAyane-chan provavelmente está na biblioteca para estudar..."
11170-83 = "Nonomi-chan limpou a escola e manteve as salas de aula arrumadas. #nUau, todo mundo é tão sério."
11170-84 = "sim? EU? Uau, é claro que eu estava apenas descansando por aqui."
11170-85 = "Por que você não tenta começar algo também? Trabalho de meio período, treinamento muscular, etc."
11170-86 = "É impossível, o corpo do meu tio chegou a um ponto em que ele não consegue se esforçar muito devido à idade."
11170-87 = "Você tem quase a mesma idade que eu, não é?"
11170-88 = "Uau. Enfim, o sensei veio, e não é hora de todos os outros? #nNesse caso, serei apenas um drone por aqui."
11170-89 = "Ah, senpai, para onde você está indo?"
11170-90 = "Ei, tio está de folga hoje. #nTenho relaxado muito, então se precisar de alguma coisa, entre em contato comigo, Nonomi-chan."
11170-92 = "Hoshino-senpai... Parece que ele vai tirar outra soneca."
11170-93 = "Hmm, acho que está tudo bem. Ayane-chan liderará bem a reunião."
11170-94 = "Haha... de qualquer forma, Hoshino-senpai mudou muito em comparação com antes."
11170-95 = "foto? Como era antes?"
11170-96 = "Agora sinto que estou sempre meio adormecido...#nQuando conheci Hoshino-senpai, ele sempre parecia estar ocupado com alguma coisa."
11170-97 = "Quanto ao motivo pelo qual eu estava sendo perseguido... bem, acho que deveria dizer todo tipo de coisa."
11170-98 = "Ouvi dizer que havia um certo veterano..."
11170-99 = "Aparentemente, ele foi o último presidente do conselho estudantil de Abydos, mas era uma pessoa pouco confiável e, depois que ele saiu, Hoshino-senpai assumiu tudo..."
11170-100 = "Ouvi dizer que Hoshino-senpai era estudante do primeiro ano na época...#nTambém não sei os detalhes."
11170-101 = "Mas agora tenho um sensei e posso interagir com alunos de outras escolas..."
11170-102 = "Antes, eu teria odiado ter qualquer coisa a ver com outras escolas...#nAcho que me tornei bastante maduro."
11170-103 = "Sim, tenho certeza que é tudo graças ao sensei☆"
11170-105 = "……."
11170-108 = "……."
11170-109 = "Isto é isso."
11170-111 = "Eu estava esperando por você, Akatsuki no Horu...#nNão, era Hoshino-san. Isso é rude."
11170-112 = "Não, ainda não me acostumei com Kivotos. #nPor favor, venha por aqui, Sr. Hoshino."
11170-113 = "...A pessoa de preto, qual é o seu propósito desta vez?"
11170-114 = "...Hehe, a situação mudou. #nDesta vez, gostaria mais uma vez de fazer uma proposta ao Sr. Hoshino, que tem o melhor mistério de Abydos."
11170-115 = "sugestão? Não se engane! ! ! Isso já é...! !"
11170-116 = "Tudo bem, por favor, acalme-se."
11170-117 = "...! ?"
11170-118 = "...Tenho uma fala do meu filme favorito. Deixe-me citar desta vez."
11170-120 = "(Tosat)"
11170-123 = "Tenho uma proposta que você nunca recusará."
11170-124 = "Acho que esta é uma proposta interessante, por isso, ouça-a com atenção."
11170-125 = "Kukuku, kukukukukku..."
11170-127 = "Próxima vez; não somos amigos!"
