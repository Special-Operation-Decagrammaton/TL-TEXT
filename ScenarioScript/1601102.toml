[translation]
1601102-1 = "Um corpo que continua a crescer"
1601102-7 = "（O local que a Hasumi me deu era uma sala de aula vazia em Trinity）"
1601102-8 = "（Talvez por ser um horário tardio, não há vivalma por perto）"
1601102-12 = "Ah, eu estava esperando por você, Sensei. É por aqui."
1601102-13 = "Espere um pouco, por favor. #nPrimeiro, eu preciso... vestir... este uniforme de ginástica..."
1601102-18 = "[ns1] \"...Hasumi?\"\n[ns2] \"Que barulho é esse...?\""
1601102-21 = "Já... já vou terminar. #nSó mais um pouco, então...!"
1601102-31 = "[ns3] \"Ha, Hasumi...!?\"\n[ns4] \"O, o que aconteceu...?\""
1601102-35 = "Faz tempo que não uso esta roupa, mas... deve dar certo...!"
1601102-41 = "[wa:500]― Não... [wa:1400]Ugh... [wa:2550]Argh... [wa:2050]Haa...!"
1601102-44 = "[wa:1750]― Eu sabia que isso aconteceria, mas..."
1601102-46 = "― Realmente parece [wa:250]difícil."
1601102-49 = "― Sensei, [wa:1200]me desculpe..."
1601102-52 = "― Como pode ver,"
1601102-54 = "― Acabou ficando [wa:400]nesta situação..."
1601102-57 = "[wa:1350]― Mesmo que você já [wa:650]esteja ocupado..."
1601102-60 = "― Acabei te dando [wa:750]ainda mais trabalho,"
1601102-62 = "― Sinto muito."
1601102-65 = "[wa:1250]― Era uma roupa que eu usava [wa:450]frequentemente até o ano passado..."
1601102-67 = "― Por que... [wa:1250]em um ano, algo assim..."
1601102-70 = "[ns5] \"Até o ano passado estava tudo bem?\"\n[ns6] \"O que aconteceu em um ano...?\""
1601102-71 = "[wa:950]― N, [wa:750]não, [wa:1150]não há uma diferença tão grande..."
1601102-72 = "[wa:950]― N, [wa:750]não, [wa:1150]não há uma diferença tão grande..."
1601102-75 = "― Bem... [wa:1700]não muito,"
1601102-77 = "― O peso não deveria ter [wa:400]mudado... [wa:2100]mas"
1601102-80 = "― Ta, [wa:1300]talvez..."
1601102-84 = "Que estranho... embora eu tenha crescido, não esperava que isso acontecesse..."
1601102-85 = "Será que a roupa encolheu por causa da lavagem...? Hmm..."
1601102-89 = "[ns7] \"Acho que... não é isso, talvez.\"\n[ns8] \"O que exatamente... significa crescer?\""
1601102-92 = "N-não sei por que, mas acabei soando como se estivesse dando desculpas..."
1601102-93 = "De qualquer forma, vamos começar o trabalho que tínhamos planejado."
1601102-94 = "Bem... peço desculpas por ter que prosseguir com esta aparência..."
1601102-95 = "[s9] \"Se a Hasumi está bem com isso...\"\n[s10] \"Bem... e-eu estou bem. Não se preocupe.\""
1601102-98 = "Fufu..."
1601102-105 = "――Então, estes são os documentos."
1601102-109 = "...Sensei?"
1601102-113 = "[ns11] \"Ah, sim... estou olhando...\"\n[ns12] （Não sei para onde olhar...）"
1601102-116 = "...Me desculpe. #nRealmente, esse visual é constrangedor, não é..."
1601102-117 = "Como vice-presidente do Comitê de Justiça, que deveria dar o exemplo, não conseguir nem vestir o uniforme corretamente... é uma vergonha."
1601102-118 = "Será que devo comprar um novo...? Embora eu ache que já seja tarde demais para comprar agora..."
1601102-119 = "[s13] \"Será que chega a tempo do Grande Festival Esportivo se pedir agora...?\"\n[s14] \"Se não der tempo, não precisa se forçar a comprar, não é...?\""
1601102-122 = "Hmm, você tem razão..."
1601102-123 = "...Ah, peço desculpas por ter me desviado do assunto."
1601102-124 = "Vamos nos concentrar no trabalho."
1601102-128 = "Sobre este assunto..."
1601102-132 = "[ns] （...Não consigo me concentrar...）"
1601102-134 = "（Depois disso, discuti os documentos do Grande Festival Esportivo com a Hasumi... #n　Quando terminamos, acompanhei a Hasumi até o seu quarto）"
1601102-135 = "（Até o momento da despedida, o zíper do agasalho permaneceu exatamente como estava）"
