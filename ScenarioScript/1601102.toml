[translation]
1601102-1 = "成長し続ける身体"
1601102-7 = "（ハスミからもらった場所は、トリニティの空き教室だった）"
1601102-8 = "（遅い時間帯だからか、人影は全くない）"
1601102-12 = "あ、お待ちしておりました先生。こちらです。"
1601102-13 = "ちょっと待ってくださいね。#nまずはこの体操服を……着て、から……"
1601102-18 = "[ns1] \"……ハスミ？\"\n[ns2] \"何の音……？\""
1601102-21 = "す……すぐ終わります。#nあと少しなので……！"
1601102-31 = "[ns3] \"ハ、ハスミ……！？\"\n[ns4] \"ど、どうしたの……！？\""
1601102-35 = "久しぶりに着る服ですが……いけるはずです……！"
1601102-41 = "[wa:500]― ううん……[wa:1400]うぅっ……[wa:2550]くっ……[wa:2050]ふっ……！"
1601102-44 = "[wa:1750]― 分かってはいましたが……"
1601102-46 = "― やはり[wa:250]難しいようですね。"
1601102-49 = "― 先生、[wa:1200]すみません……"
1601102-52 = "― ご覧の通り、"
1601102-54 = "― このような状況と[wa:400]なってしまいまして……"
1601102-57 = "[wa:1350]― そうでなくても[wa:650]お忙しいのに……"
1601102-60 = "― 余計にお手間を[wa:750]おかけしてしまって、"
1601102-62 = "― 申し訳ございません。"
1601102-65 = "[wa:1250]― 去年までは[wa:450]よく着ていた服のはずなのに……"
1601102-67 = "― どうして……[wa:1250]一年の間にこのような……。"
1601102-70 = "[ns5] \"去年までは大丈夫だったの？\"\n[ns6] \"一年の間に何が……。\""
1601102-71 = "[wa:950]― い、[wa:750]いえ、[wa:1150]あまり大きな違いは……。"
1601102-72 = "[wa:950]― い、[wa:750]いえ、[wa:1150]あまり大きな違いは……。"
1601102-75 = "― その……[wa:1700]あまり、"
1601102-77 = "― 体重は[wa:400]変わってないはず……[wa:2100]なのですが"
1601102-80 = "― た、[wa:1300]たぶん……。"
1601102-84 = "おかしいですね……成長したとはいえ、こんな事になるなんて……。"
1601102-85 = "洗濯した事で服が縮んでしまったのでしょうか……うーん……。"
1601102-89 = "[ns7] \"それは……ないと思う、たぶん。\"\n[ns8] \"成長……とは、一体……\""
1601102-92 = "な、なんだか、言い訳みたいになってしまいましたが……。"
1601102-93 = "とにかく、お願いしていた作業を始めましょう。"
1601102-94 = "その……このような姿で進行する事になってしまって……申し訳ございません。"
1601102-95 = "[s9] \"ハスミが大丈夫なら……\"\n[s10] \"えっと……わ、私は大丈夫。気にしないで。\""
1601102-98 = "ふふ……。"
1601102-105 = "――それで、これが資料なのですが。"
1601102-109 = "……先生？"
1601102-113 = "[ns11] \"う、うん……見てるよ……。\"\n[ns12] （目のやり場がない……）"
1601102-116 = "……ごめんなさい。#nやはりこの格好、気になりますよね……。"
1601102-117 = "模範を示すべき正義実現委員会の副部長が、服もまともに着られないなんて……面目ありません。"
1601102-118 = "やはり新調すべきでしょうか……今買い直しても遅いとも思うのですが……。"
1601102-119 = "[s13] \"今から注文して大運動会に間に合うのかな……？\"\n[s14] \"間に合わないなら無理に買い直さなくても……？\""
1601102-122 = "うーん、やはりそうですよね……。"
1601102-123 = "……ああ、話が脱線して失礼しました。"
1601102-124 = "作業に集中しましょう。"
1601102-128 = "この件ですが……。"
1601102-132 = "[ns] （……集中できない……）"
1601102-134 = "（その後、ハスミと一緒に大運動会の資料に関して協議し……#n　作業が終わった後は、ハスミを部屋まで送り届けた）"
1601102-135 = "（別れる瞬間まで、ジャージのファスナーはずっとそのままだった）"
