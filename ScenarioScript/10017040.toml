[translation]
10017040-1 = "Episódio 4; Socorro Expresso"
10017040-6 = "Cidade de Kivotos"
10017040-7 = "Está tudo em paz, não é..."
10017040-8 = "Não houve problemas em particular, e já está ficando tarde..."
10017040-9 = "..."
10017040-10 = "Quando fica assim, acabo ficando com medo."
10017040-11 = "Será que existem pessoas que precisam de ajuda, mas que simplesmente não estão ao meu alcance... e seus gritos estão ecoando em algum lugar?"
10017040-12 = "Ufa... Mais uma vez, gravando o orgulho e a convicção em meu peito... 'Socorro onde o socorro é necessário'!"
10017040-14 = "Ah, Comandante!"
10017040-15 = "Bom trabalho, Comandante..."
10017040-17 = "Serina e Hanae, bom trabalho para vocês também."
10017040-18 = "Professor, obrigado também."
10017040-19 = "A propósito... vocês duas parecem bem desanimadas."
10017040-20 = "Aconteceu alguma coisa?"
10017040-22 = "É que, bem..."
10017040-23 = "Talvez o nosso socorro não tenha sido suficiente..."
10017040-24 = "[s] \"Bem, por onde eu começo a explicar...\""
10017040-26 = "'Socorro onde o socorro é necessário'... é um dos nossos lemas."
10017040-27 = "Poderiam me contar os detalhes?"
10017040-32 = "Nossa... é verdade mesmo?"
10017040-33 = "O Comitê de Justiça tomou o frango delas..."
10017040-34 = "E elas vieram até nós, do Esquadrão de Socorro, para desabafar...?"
10017040-35 = "[s1] \"Bem, foi mais ou menos isso...?\"\n[s2] \"Elas acabaram indo embora parecendo bem tristes...\""
10017040-39 = "Nós perguntamos se havia algo em que pudéssemos ajudar, mas..."
10017040-40 = "Talvez a ferida emocional fosse profunda demais, elas só pediram que nos lembrássemos disso..."
10017040-42 = "Entendo... consigo compreender esse sentimento. #nDe qualquer forma, o desejo de ser lembrado também."
10017040-43 = "Um grito que não chega a ninguém mesmo sendo proferido..."
10017040-44 = "...É porque eu demorei demais. #nSinto muito."
10017040-45 = "N-não, a culpa não é sua, Comandante...!"
10017040-46 = "Mas por que será que o pessoal do Comitê de Justiça faria algo assim?"
10017040-47 = "Bem, se não me engano, foi a presidente Tsurugi, a vice-presidente Hasumi, #ne também a Mashiro... foi isso, não foi?"
10017040-48 = "[s3] \"Será que houve algum motivo profundo...?\"\n[s4] \"Não acho que aquelas três fariam algo assim sem motivo algum...\""
10017040-51 = "V-verdade, não é...?"
10017040-52 = "Então, o que aquelas pessoas disseram antes..."
10017040-54 = "Serina, Hanae... e, embora vocês provavelmente já saibam muito bem, Professor também."
10017040-55 = "Só porque alguém se autoproclama defensor da justiça, #né perigoso acreditar cegamente que eles estão sempre certos."
10017040-56 = "O dano surge justamente quando se acredita piamente que se está certo, ou quando a justiça sai do controle."
10017040-57 = "Ainda assim, ou melhor, justamente por isso, o 'Socorro'... deve ser oferecido a qualquer momento, #npara qualquer pessoa!"
10017040-59 = "Sim!"
10017040-60 = "É verdade!"
10017040-61 = "[s] \"Sim, com certeza.\""
10017040-63 = "Pode parecer um assunto rigoroso, mas não é esse o ponto principal."
10017040-64 = "O importante é identificar, neste exato momento, onde o 'Socorro' é necessário."
10017040-65 = "E oferecer o 'Socorro' necessário a quem precisa!"
10017040-69 = "E agora, quem provavelmente mais precisa do nosso 'Socorro' é..."
10017040-70 = "O Comitê de Justiça!"
10017040-72 = "Hã!?"
10017040-73 = "I-isso é..."
10017040-74 = "[s] \"Bem, desculpe, perdi o fio da meada...\""
10017040-76 = "'Socorro' não se refere apenas a coisas materiais."
10017040-77 = "Pessoas amadas, ou colegas que compartilham dos mesmos ideais... quando elas se desviam do caminho."
10017040-78 = "Tentar corrigi-las e aconselhá-las também é uma forma de 'socorro'."
10017040-79 = "Ou seja, em qualquer situação, eliminar a causa do problema é o que podemos chamar de 'socorro' no verdadeiro sentido da palavra."
10017040-80 = "Serina, Hanae... e Sensei."
10017040-81 = "Eu vou agora... em direção ao Comitê de Justiça!"
10017040-83 = "!?"
10017040-84 = "Eh, ééé...!?"
10017040-85 = "[s5] \"E-espere um pouco!\"\n[s6] \"Explique melhor!\""
10017040-89 = "Naturalmente, é para descobrir a verdade sobre o que aconteceu desta vez."
10017040-90 = "E o que pretende fazer depois de descobrir a verdade...?"
10017040-91 = "Como eu disse antes, é para devolver a 'justiça' ao Comitê de Justiça."
10017040-92 = "Esse é o 'socorro' máximo que a Unidade de Socorro pode oferecer aos seus queridos 'companheiros'!"
10017040-93 = "Mas o pessoal do Comitê de Justiça está agora no café, no meio da festa de Natal, não é?"
10017040-94 = "......"
10017040-95 = "...Conveniente."
10017040-96 = "Não é hora de ignorarem seus próprios atos e se divertirem no Natal!"
10017040-97 = "O nome da justiça está sendo manchado!"
10017040-98 = "A-ah, Comandante?"
10017040-99 = "Por favor, escutem."
10017040-100 = "Deixarei as ações de vocês duas a critério próprio. Prestar 'socorro' aqui ou vir comigo para prestar 'socorro' lá. Não forçarei nenhuma das duas."
10017040-101 = "Seja qual for a escolha, é o caminho do socorro. Deixarei isso ao julgamento de vocês."
10017040-102 = "Bem, eu já vou indo."
10017040-103 = "Com orgulho e convicção no peito... 'Onde houver necessidade de socorro, lá estaremos'!"
10017040-109 = "[ns] \"E-então...\""
10017040-110 = "O-o que faremos, veterana? A Comandante já está tão longe...!"
10017040-111 = "[s] \"...Por enquanto, vamos atrás dela!\""
10017040-112 = "S-sim!"
