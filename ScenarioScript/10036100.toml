[translation]
10036100-1 = "第10話;Yo DJ Pump This Party"
10036100-2 = "ステージの修理はこれで終わり。"
10036100-3 = "DJの機材は無事みたい。"
10036100-4 = "か、観客席も準備完了です……！"
10036100-8 = "わざわざ手伝う必要は……。"
10036100-9 = "ううん、お祭りはみんなで楽しむものだからね。"
10036100-13 = "準備完了だ！"
10036100-14 = "チッ、逃げやがって……。"
10036100-15 = "ま、邪魔者は消えたことだし、#nこれで思いっきりDJステージを楽しめるぜ！"
10036100-16 = "えっと……そのことなんだけど。"
10036100-17 = "DJステージは……中止になった。"
10036100-22 = "え……？"
10036100-24 = "銃撃戦の途中で、DJ B.o.Bがどこかに行ったんだ。"
10036100-25 = "「許してくれえええ」って叫びながら……。"
10036100-26 = "今頃、どこにいるのかさっぱり分からなくてな。"
10036100-27 = "みんな、DJステージを楽しみにしてたのに……。"
10036100-28 = "……や、やっぱり終わりです！"
10036100-29 = "DJステージなんて贅沢、私たちに許されるわけないんですね！"
10036100-30 = "もう波の音でも聞きながら、砂浜を眺めるしか……。"
10036100-31 = "そのうちに気づいたら波に流されて、どこかの無人島へ……。"
10036100-32 = "「無人島で生き延びる術」の最新号を読んでいれば……！#nうわぁぁぁあああん！"
10036100-33 = "[s] \"落ち着いて、ヒヨリ。\""
10036100-38 = "……シャーレの先生？"
10036100-39 = "何か方法でもあるのか？"
10036100-40 = "[s] \"DJステージを中止する必要はないと思う。\""
10036100-41 = "まぁ、機材は揃ってるが……。"
10036100-42 = "肝心なDJの人が不在だろ？"
10036100-43 = "[s] \"それなら心配ないよ。\""
10036100-47 = "先生、どうしたんだ？"
10036100-48 = "[s] \"ここに、DJ B.o.Bの一番弟子がいるからね！\""
10036100-49 = "！？"
10036100-50 = "ま、まさか私にDJを……！？"
10036100-55 = "[ns1] 三人にサインを送る。\n[ns2] みんなの顔を見て頷く。"
10036100-58 = "……！"
10036100-59 = "サッちゃんのDJ、見てみたい。"
10036100-60 = "そ、そうです！#nせっかくのイベントなのに、中止だなんて悲しいじゃないですか……。"
10036100-61 = "……私も何か言ったほうが良いのかな。"
10036100-62 = "[s] \"ミサキもDJステージ、楽しみにしてたよね？\""
10036100-63 = "ちょっ……！"
10036100-64 = "はぁ……#nまぁ、お祭りのメインイベントだし、中止になったらもったいないでしょ。"
10036100-66 = "しかし……私にDJのステージ経験はない。"
10036100-67 = "みんなに楽しんでもらえるとは……。"
10036100-68 = "[s] \"大事なのは、楽しませたいっていう気持ちだよ。\""
10036100-69 = "……。"
10036100-70 = "なるほど……。"
10036100-71 = "楽しませたい気持ち、か。"
10036100-75 = "……まだ、よく分からない。"
10036100-76 = "[s] \"そっか……。\""
10036100-77 = "……ただ。"
10036100-78 = "私は……。"
10036100-79 = "あのステージの感覚を、もう一度感じたいんだ。"
10036100-80 = "やってみようと思う。"
10036100-81 = "いや、必ずやり遂げてみせる。"
10036100-83 = "リーダーがDJって、想像できないね。"
10036100-84 = "サオリ姉さんが音楽を……。"
10036100-85 = "途中で失敗したら、機材に銃を打ったりしないでしょうか……？"
10036100-86 = "ううん、きっと上手くいく。"
10036100-88 = "サッちゃんは、答えを見つけたみたいだから。"
10036100-92 = "さあさあ、大変お待たせいたしました！"
10036100-93 = "ここ「アウトロービーチ」は、再び盛り上がってきました！"
10036100-94 = "皆さん、準備は良いですか？"
10036100-95 = "それでは――ミュージック・スタート！"
10036100-98 = "#video;11009"
