[translation]
10036100-1 = "Episódio 10; Yo DJ Pump This Party"
10036100-2 = "O conserto do palco termina aqui."
10036100-3 = "Parece que o equipamento do DJ está intacto."
10036100-4 = "A-a área da plateia também está pronta...!"
10036100-8 = "Não precisava se dar ao trabalho de ajudar..."
10036100-9 = "Não, o festival é algo para todos aproveitarem juntos."
10036100-13 = "Preparação concluída!"
10036100-14 = "Tsc, eles fugiram..."
10036100-15 = "Bem, já que os estorvos sumiram, #nagora podemos curtir o palco do DJ ao máximo!"
10036100-16 = "Err... sobre isso."
10036100-17 = "O palco do DJ... foi cancelado."
10036100-22 = "Hã...?"
10036100-24 = "No meio do tiroteio, o DJ B.o.B foi para algum lugar."
10036100-25 = "Gritando \"Por favor, me perdoem\"..."
10036100-26 = "Não faço ideia de onde ele possa estar agora."
10036100-27 = "Todo mundo estava esperando tanto pelo palco do DJ..."
10036100-28 = "...É, acabou mesmo!"
10036100-29 = "Um luxo como um palco de DJ não é algo permitido para nós, né!"
10036100-30 = "Só nos resta ouvir o som das ondas e olhar para a areia da praia..."
10036100-31 = "E antes que eu perceba, serei levada pela maré para alguma ilha deserta..."
10036100-32 = "Se ao menos eu tivesse lido a última edição de \"Como Sobreviver em uma Ilha Deserta\"...! #nUaaaaaah!"
10036100-33 = "[s] \"Calma, Hiyori.\""
10036100-38 = "...Sensei do Schale?"
10036100-39 = "Você tem alguma solução?"
10036100-40 = "[s] \"Não acho que precisamos cancelar o palco do DJ.\""
10036100-41 = "Bem, o equipamento está todo aqui, mas..."
10036100-42 = "O DJ principal não está, né?"
10036100-43 = "[s] \"Sobre isso, não se preocupem.\""
10036100-47 = "Sensei, o que foi?"
10036100-48 = "[s] \"Porque a melhor discípula do DJ B.o.B está bem aqui!\""
10036100-49 = "!?"
10036100-50 = "N-não me diga que quer que eu seja a DJ...!?"
10036100-55 = "[ns1] Faz um sinal para os três.\n[ns2] Olha para todos e acena com a cabeça."
10036100-58 = "...!"
10036100-59 = "Eu quero ver a Sa-chan como DJ."
10036100-60 = "I-isso mesmo! #nÉ um evento tão especial, seria triste se fosse cancelado..."
10036100-61 = "...Será que eu deveria dizer algo também?"
10036100-62 = "[s] \"Misaki, você também estava ansiosa pelo palco do DJ, não estava?\""
10036100-63 = "Ei..."
10036100-64 = "Ah... #nbem, é o evento principal do festival, seria um desperdício se fosse cancelado."
10036100-66 = "No entanto... eu não tenho experiência como DJ."
10036100-67 = "Não sei se conseguiria fazer todos se divertirem..."
10036100-68 = "[s] \"O que importa é o desejo de querer divertir os outros.\""
10036100-69 = "..."
10036100-70 = "Entendo..."
10036100-71 = "O desejo de querer divertir, é?"
10036100-75 = "...Ainda não entendo muito bem."
10036100-76 = "[s] \"Entendo...\""
10036100-77 = "...Mas."
10036100-78 = "Eu..."
10036100-79 = "Eu quero sentir a sensação daquele palco mais uma vez."
10036100-80 = "Eu vou tentar."
10036100-81 = "Não, eu vou conseguir realizar isso, com certeza."
10036100-83 = "Não consigo imaginar a líder como DJ."
10036100-84 = "A Saori-nee-san fazendo música..."
10036100-85 = "Se ela falhar no meio do caminho, será que ela não vai atirar no equipamento...?"
10036100-86 = "Não, tenho certeza de que vai dar tudo certo."
10036100-88 = "Porque parece que a Sa-chan encontrou a resposta."
10036100-92 = "Muito bem, muito bem, peço desculpas pela longa espera!"
10036100-93 = "Aqui na 'Outlaw Beach', a animação voltou com tudo!"
10036100-94 = "Pessoal, estão prontos?"
10036100-95 = "Então... música, começar!"
10036100-98 = "#video;11009"
