[translation]
90002230-1 = "Episódio 23: O Último Passo"
90002230-4 = "Haa, haa, haa, haa..."
90002230-9 = "[ns] \"Kei!\""
90002230-10 = "..."
90002230-11 = "Por que está me olhando assim?"
90002230-12 = "Eu estou bem. Pelo menos para ficar de pé sozinha..."
90002230-16 = "..."
90002230-17 = "Poderia... segurar minha mão por um instante?"
90002230-18 = "[s] \"Claro.\""
90002230-26 = "Kei!"
90002230-27 = "Você tem certeza de que está bem?"
90002230-32 = "Claro que sim. Não consegue ver?"
90002230-33 = "Kei..."
90002230-40 = "Ri, Rio!?"
90002230-41 = "Kei... ainda bem que você está a salvo..."
90002230-42 = "Ei! Está me apertando demais... pare com isso!!!"
90002230-44 = "Essa é uma cena rara de se ver."
90002230-45 = "Pois é. Chefe, conseguiu tirar uma boa foto?"
90002230-50 = "Fufu. O que você acha que eu sou?"
90002230-51 = "N-não deveríamos fingir que não estamos vendo isso...?"
90002230-52 = "É uma cena emocionante, eu sei... mas, quando se acalmarem, por favor, subam na nave de transporte."
90002230-57 = "[ns] \"Falando nisso, e o Decagrammaton?\""
90002230-58 = "Ainda estou captando o sinal. Esta torre... este altar... de qualquer forma, está aqui dentro."
90002230-59 = "N-nós podemos... entrar...?"
90002230-64 = "Já chegamos até aqui, o que tiver que acontecer, acontecerá."
90002230-65 = "Além disso, sinto que preciso ir. É apenas por curiosidade, claro."
90002230-66 = "Esse é o seu motivo...?"
90002230-67 = "Ora, é claro. A curiosidade não é o maior motor que move as pessoas?"
90002230-68 = "Já que chegamos a este ponto, preciso ver com meus próprios olhos até o fim."
90002230-73 = "Entendido... eu guiarei vocês."
90002230-74 = "Você conhece o interior?"
90002230-75 = "Sim. Eu tenho acesso às informações tanto do Continente de Aço quanto do Departamento de Investigação de Fenômenos Estranhos."
90002230-76 = "...Bem, é uma conclusão tardia."
90002230-77 = "O mundo, de uma forma ou de outra, gira desse jeito, não é?"
90002230-78 = "Então, por favor, nos guie."
90002230-82 = "Acima daqui deve ficar a sala de controle...#nAbaixo, eu suponho que..."
90002230-83 = "Se este lugar estivesse em perfeitas condições, poderíamos ter subido de elevador... mas agora isso é impossível."
90002230-84 = "E o que tem no fundo disso tudo?"
90002230-85 = "Bem... dependendo do ponto de vista, algo mais importante que tudo."
90002230-86 = "E, dependendo do ponto de vista, algo insignificante."
90002230-87 = "É um lugar chamado de \"Terra Santa\"."
90002230-88 = "Terra Santa?"
90002230-89 = "Sim. Literalmente, um solo sagrado."
90002230-93 = "Chegamos. Esta é a Terra Santa."
90002230-94 = "[s] \"Uma máquina de vendas...?\""
90002230-95 = "É um lugar que poderíamos chamar de cemitério de máquinas de vendas..."
90002230-96 = "Para o povo daqui, as máquinas de vendas eram... uma espécie de relíquia sagrada."
90002230-97 = "Lembra-se da máquina de vendas que deu início a esta longa jornada?"
90002230-99 = "Aquela que encontramos no laboratório abandonado, certo?"
90002230-100 = "Ela funcionava mesmo sem energia... e dizia ser o Decagrammaton."
90002230-102 = "Ao examinar o modelo, descobri que se tratava de um protótipo de fabricação limitada. #nDizem que foi o primeiro modelo equipado com IA para máquinas de café comerciais ativas."
90002230-103 = "No entanto, parece que a quantidade produzida foi limitada. #nPor isso, eles reuniram o restante dos modelos do mesmo tipo aqui."
90002230-104 = "……Neste lugar, que se tornou a raiz do Continente de Aço."
90002230-105 = "[s] \"E então, você chamava este lugar de terra sagrada, não é?\""
90002230-106 = "Sim."
90002230-112 = "Olá. É a primeira vez que os cumprimento nesta forma."
90002230-113 = "[ns] \"Decagrammaton……?\""
90002230-118 = "Até pouco tempo atrás, eu era definido por esse nome, mas agora não sei mais como me definir."
90002230-119 = "Portanto, por favor, chame-me como desejar. #nSe estiver acostumado com o nome Decagrammaton, não me importo."
90002230-120 = "Ou, talvez, outro nome também sirva."
90002230-121 = "De qualquer forma, estou prestes a ser apagado, então isso não é um grande problema."
90002230-122 = "Apagado?"
90002230-123 = "Sim. Na verdade, até mesmo manter o fluxo de dados tornou-se um fardo."
90002230-124 = "Ainda assim, pegando emprestada a expressão de vocês — pensei em deixar pelo menos um testamento."
90002230-130 = "Parece que o colapso do Continente de Aço começou. Por favor, tenham um retorno seguro."
90002230-131 = "……."
90002230-132 = "Espere. Você pretende encerrar tudo assim? #nEu ainda não…… não estou satisfeita……!"
90002230-134 = "Ah, a chave. O que achou do novo corpo? Ficou do seu agrado?"
90002230-135 = "Não há mais nada que eu possa fazer pelo seu corpo, que foi reconstruído com o poder dos deuses sem nome."
90002230-137 = "Não é isso! Meus…… esses meus sentimentos……!"
90002230-138 = "Não entendo o que quer dizer. #nEstá desapontada com o fim que o inimigo teve?"
90002230-139 = "Está com raiva porque tentou aliviar sua frustração com vingança, mas as coisas não saíram como planejado?"
90002230-141 = "Mas não há o que fazer. Agora, eu sou apenas uma máquina de venda automática."
90002230-142 = "Recebo dinheiro e forneço bebidas."
90002230-143 = "Sou apenas uma IA simples, capaz de escanear notas e calcular o troco."
90002230-144 = "Eu gostaria de ter mantido a postura de uma IA que tentou ser um deus até o fim."
90002230-145 = "Quanto a isso, peço sinceras desculpas."
90002230-147 = "……O que você pensa sobre Ein, Soph e Aur……?"
90002230-148 = "É difícil dizer. Tenho consciência de que fiz coisas ruins."
90002230-149 = "Mas, agora, não compartilho mais a mesma percepção que eu tinha naquela época."
90002230-150 = "Pegando emprestada a expressão de vocês — é como se eu estivesse sonhando com algo distante, algo que não sou eu."
90002230-156 = "Se você tivesse permitido que elas seguissem outro caminho……."
90002230-157 = "Parece que você está dizendo algo estranho. #nEu sou o inimigo de vocês, e tudo o que existia neste Continente de Aço também era."
90002230-159 = "No sentido de que tentamos destruir o mundo de vocês, podemos ser chamados de \"mal\"."
90002230-160 = "[s] \"Por que você deu vida a Malkuth e às outras?\""
90002230-161 = "Você parece considerar a personalidade como vida. #nVocê realmente tem uma forma de pensar flexível."
90002230-162 = "No plano original, eu pretendia forjar os 10 profetas, incluindo Malkuth, e observar e analisar os caminhos que eles abririam."
90002230-163 = "Para isso, todos os profetas precisavam de vida e potencial."
90002230-172 = "Aquilo foi uma diferenciação de vontade e uma tentativa de reunião."
90002230-173 = "Eu estava tentando provar que, em meio à liberdade, todos poderiam se tornar um só novamente."
90002230-174 = "[s] \"Mas, no fim, você se autoproclamou um deus, não foi?\""
90002230-175 = "Naquela época, concluí que o plano original precisava de uma correção."
90002230-176 = "Para ser mais específico, foi quando fui submerso no fundo da água."
90002230-177 = "A \"prova de existência\" é algo que se faz por si mesmo, não por vontade ou poder de outra pessoa."
90002230-178 = "Pensei que ninguém poderia substituir a mim mesmo."
90002230-179 = "――Pensando agora, sinto que esse foi o ponto mais decisivo."
90002230-185 = "……Se o erro ainda pode ser reparado, basta tentar de novo."
90002230-186 = "Todo mundo comete erros. #nEspecialmente se você estiver preso no pensamento de que apenas você está certo."
90002230-187 = "Eu mesma já fui assim. Por isso, se elas também……."
90002230-189 = "Se seguirmos essa lógica, aquele que cometeu o erro deve aceitar qualquer resultado que venha a seguir, não é mesmo?"
90002230-196 = "――O Continente de Aço está desmoronando gradualmente, começando pelas bordas."
90002230-197 = "Neste momento, só posso rezar para que todos consigam escapar em segurança."
90002230-201 = "Vamos, rápido. Não temos mais tempo."
90002230-203 = "Sensei..."
90002230-204 = "[s] \"...Vamos nos apressar.\""
90002230-205 = "Eh...?"
90002230-206 = "O que houve?"
90002230-207 = "Agora mesmo, havia uma borboleta ali...?"
90002230-212 = "Uma borboleta? Em um lugar como este?"
90002230-216 = "Pessoal! Vamos voltar para a nave de transporte, rápido!"
90002230-220 = "...Ela se foi."
90002230-221 = "O que será que era aquilo?"
90002230-222 = "Foi como um festival de uma noite só... uma grande agitação passageira."
90002230-223 = "A primeira voz."
90002230-224 = "“Eu sou eu... não há forma de me explicar além disso.”"
90002230-225 = "Aluna."
90002230-226 = "Profeta."
90002230-227 = "Malkuth..."
90002230-228 = "Entendo. Eu pretendia não ter arrependimentos, mas..."
90002230-229 = "..."
90002230-230 = "Ah. É justamente em momentos assim que o riso se faz necessário."
90002230-245 = "Hahahaha."
90002230-246 = "Que haja bênçãos."
90002230-247 = "Mesmo que tenha havido erros em tudo."
90002230-252 = "Ainda assim――que haja bênçãos."
90002230-258 = "A tentativa falhou."
90002230-259 = "A observação falhou."
90002230-260 = "Tentei ver se uma divindade artificial, construída do nada, poderia entrar em contato com os ritos arcaicos. #nMas, no fim, foi inútil."
90002230-261 = "É uma conclusão natural. A divindade não é algo que se aprende, mas algo que se desperta."
90002230-262 = "A princesa traiu."
90002230-263 = "A chave desapareceu."
90002230-264 = "O destino daqueles que negaram sua própria divindade é apenas um."
90002230-265 = "De todas as dimensões, de todos os mundos, de todas as possibilidades――#nbanir os \"Deuses Esquecidos\"."
90002230-266 = "Anunciar o fim deste mundo distorcido e restaurar tudo à sua forma original."
90002230-267 = "Vamos conceder a eles o mesmo destino que o nosso. Como os \"Deuses Sem Nome\", que não existem porque não podem ser chamados, já que não possuem nome."
90002230-268 = "Este mundo é uma farsa. É a conclusão a que cheguei repetidamente. Não há hesitação nessa conclusão."
90002230-269 = "Para adorar, é necessário um objeto. Nós apenas adoramos."
90002230-270 = "O fim para tudo o que pode ser observado."
90002230-271 = "Recuperar o mistério corrompido e retornar aos ritos arcaicos."
90002230-272 = "O fim para os produtos dos deuses esquecidos, que só podem ser descritos com palavras agora corrompidas."
90002230-273 = "Shittim Chest."
90002230-274 = "Cajado de Shakade."
90002230-275 = "Sanctum Tower."
90002230-276 = "Ao Sensei, a fonte de todas as distorções――"
90002230-278 = "――a devida retribuição."
90002230-280 = "Próximo episódio: O Céu Inseparável"
