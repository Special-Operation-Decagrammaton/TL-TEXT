[translation]#[Texto Final , mas eventualmente pode haver alterações na formatação de texto. - Filipe 29/06.]
22250-1 = "Episódio 25: Colégio de Ciências Millennium."
22250-3 = "(E assim, com todo mundo unindo forças, Eridu……)"
22250-4 = "(a Millennium——#ne, por extensão, a crise que poderia ter se tornado uma ameaça a Kivotos, a gente conseguiu resolver. E viveram felizes para sempre.)"
22250-6 = "……A instalação de Eridu, eu assumo a responsabilidade de fechá-la."
22250-7 = "[s] \"Bom trabalho. Obrigado, Himari.\""
22250-8 = "……A ameaça daquela hora a gente conseguiu conter, mas#nainda não se resolveu nada, né."
22250-9 = "Como presidente do Departamento de Investigação de Fenômenos Anômalos, é algo que eu não posso ignorar……#nhaah…… às vezes eu me pego pensando \"por culpa de quem foi isso\"."
22250-10 = "Bom, digamos que…… eu faço isso por uma certa pessoa, vai?"
22250-11 = "Uma super-gênia, fragilzinha, linda e hacker vive ocupada, sabe…… francamente."
22250-12 = "[s] \"Ahaha, conto com você.\""
22250-14 = "Seminar · Sala de Trabalho"
22250-15 = "(E, quanto à Rio, a principal envolvida——)"
22250-25 = "Presidente Rio!? Que história é essa de repente!?#nLargar o cargo de presidente!"
22250-26 = "Peraí, presidente!? Afinal, cadê a presidente!?"
22250-27 = "……Ah."
22250-28 = "Yuuka, aqui tem uma mensagem da presidente."
22250-29 = "Hã? Mensagem!?#nDeixa ver……"
22250-34 = "\"Me desculpem\"……?"
22250-35 = "…………………"
22250-36 = "……Ah, isso não é coisa que se resolva com um pedido de desculpas!? Presideenteee!?!?"
22250-38 = "(Enquanto isso, no C&C……)"
22250-39 = "Em comemoração à alta da presidente~! Saúde!"
22250-40 = "Saúde."
22250-41 = "Sim, saúde~"
22250-46 = "……Afinal, que algazarra é essa?"
22250-47 = "Fufu.#nComo a presidente teve alta em segurança, a gente resolveu fazer uma festinha de comemoração."
22250-48 = "Por isso, hoje, o C&C todo se reuniu assim!"
22250-49 = "Não, isso eu entendo, mas…… por que é que o Sensei tá aqui?"
22250-50 = "[s1] \"Fui convidado. Neru, parabéns pela alta.\"\n[s2] \"Será que, comigo aqui, eu fico atrapalhando?\""
22250-51 = "A-ah…… obrigada……"
22250-52 = "Uh……! Não, não é bem isso, não……"
22250-53 = "Anda, anda, mestre, bebe também! Bebe!"
22250-54 = "A Veritas trouxe um monte de Youkai MAX, viu!"
22250-55 = "[s] \"……Ah, sei. Então isto aqui é Youkai MAX.\""
22250-56 = "Asuna, oferecendo desse jeito você acaba deixando o Sensei sem graça……"
22250-58 = "Fufu. Karin, só por hoje não tem problema, né?"
22250-59 = "Não é, Sensei?"
22250-60 = "[s] \"Por mim, tudo bem……\""
22250-61 = "Hmm, será que assim não deu pra animar?"
22250-62 = "Ah!"
22250-63 = "Já sei! Será que todo mundo de coelhinha era melhor?"
22250-64 = "Né? Mestre."
22250-65 = "De coelhinha…… isso, é meio constrangedor……"
22250-66 = "Não…… mas, se o Sensei quer ver…… até que dá pra……"
22250-67 = "[s] \"T-tá tudo bem! Senão vão me olhar de um jeito esquisito!\""
22250-68 = "Haah…… afinal, essa festa é em comemoração a quem……"
22250-69 = "Entendi…… então, até a festa de comemoração é de coelhinha."
22250-70 = "É esse o estilo C&C. Aprendi mais uma coisa."
22250-71 = "……Hã?"
22250-72 = "Ora."
22250-73 = "……!"
22250-74 = "Aha ♪"
22250-75 = "Desculpem a demora, veteranas."
22250-76 = "Oie~, Toki!"
22250-77 = "Q-quê…… não…… por que é que você…… tá aqui……!?"
22250-78 = "Como soube que era uma festa em que o C&C todo ia se reunir, resolvi aparecer."
22250-79 = "Você é exclusiva da presidente, não é!?"
22250-80 = "……Infelizmente, essa presidente acabou desaparecendo."
22250-81 = "Enquanto eu estava ali parada sem saber o que fazer…… me lembrei do C&C."
22250-82 = "Mesmo assim, onde já se viu alguém participar da festa de alta de quem ela mesma espancou!?"
22250-83 = "……Hã?"
22250-84 = "Que foi! Não faz essa cara, como se eu é que estivesse errada!"
22250-85 = "Ah! Presidente, que maldade! Com a Toki tendo feito o esforço de vir!"
22250-86 = "Que nada…… aquela ali, até outro dia, era nossa inimiga, ora!?"
22250-87 = "[s] \"Dizem que quanto mais briga, mais amizade……\""
22250-88 = "Pera! Até o Sensei vai defender ela!?"
22250-90 = "Ah, Toki. Já que você passou por aqui, que tal comer um doce?"
22250-91 = "Muito obrigada."
22250-92 = "Toma! Agora este!"
22250-94 = "……Hmm, o sabor do Youkai MAX tem suas profundezas."
22250-95 = "Hããã!?!?"
22250-96 = "…………"
22250-97 = "Haah…… bom, tanto faz."
22250-98 = "[s] \"Neru……?\""
22250-99 = "Bom, no fim, fazer o que mandam de cima é o que é o C&C, né."
22250-100 = "——E você, no fim, também só cumpriu o pedido da presidente."
22250-101 = "Veterana Neru, você é mais compreensiva do que eu imaginava."
22250-102 = "De quem você acha que é a culpa, hein!?"
22250-103 = "Mesmo assim…… você manda bem, hein.#nO seu jeito de lutar não tem desperdício."
22250-104 = "Sim, em pleno vigor, contra alguém do nível da veterana Neru, até que……"
22250-105 = "Anda, Toki. Experimenta este Youkai MAX também."
22250-107 = "Sim, pera, ……veterana Akane, isso, uh……"
22250-111 = "……Hãã? O que você disse?"
22250-112 = "[s] \"……A coisa promete ficar animada daqui pra frente, né.\""
22250-118 = "(Mesmo depois de um incidente daqueles, o tempo segue correndo, sem mudar——)"
22250-142 = "(E aqui também é a mesma coisa——)"
22250-144 = "[ns] \"……E foi por isso que me chamaram.\""
22250-145 = "Ah! Sensei! Bem-vindo!"
22250-146 = "A gente tava justamente fazendo um grupo de estudo!"
22250-147 = "[s] \"……Estudar o quê?\""
22250-148 = "Isso, é claro!"
22250-149 = "É o nosso próximo jogo,#no \"RPG de estratégia, coleção e criação em que você conquista o mundo enquanto faz amizade com os monstrinhos fofos do caminho\",#nestudo pra conseguir fazer ele!"
22250-150 = "[s] \"Não mudou do gênero que vocês falaram outro dia!?\""
22250-151 = "Ah, sobre isso, é que a ideia empacou um pouco……#nentão a gente virou a mesa……"
22250-152 = "e a mana disse que queria tentar um gênero novo……"
22250-153 = "[s] \"……De novo?\""
22250-154 = "Q-que maldade dizer \"de novo\"……!#nDesenvolver jogo é assim, viu!?"
22250-158 = "Buááá! Aris não consegue fazer amizade com este monstrinho fofo!"
22250-159 = "Ah! Aris! Primeiro tem que tirar a vida dele na batalha!"
22250-160 = "Aí fica mais fácil de capturar!"
22250-161 = "Mas o monstrinho não fez nada……#ne a Aris bate nele primeiro?"
22250-162 = "Hmm, agora que você falou, é verdade…… até que é meio estranho……?"
22250-163 = "Uuh, mas jogo é assim desde sempre, esse sistema……"
22250-164 = "Ei! Para de ficar com essa conversa esquisita! Vamos analisar direito!"
22250-166 = "É que, de-devagar, sem pressa, tá……"
22250-167 = "[s] \"Boa. Então, bora fazer junto.\""
22250-168 = "Sim! Sensei, aqui! Senta do lado da Aris!"
22250-169 = "Boa! Já que todo mundo se reuniu, bora começar uma batalha em equipe!"
22250-170 = "Haah…… francamente."
22250-171 = "Fufu, sim……"
22250-173 = "(Esbarrando em inúmeras barreiras,#n às vezes brigando, se ferindo e se frustrando——)"
22250-174 = "(ainda assim, a aventura do herói e dos seus companheiros segue daqui pra frente——)"
22250-175 = "(Sim, para todo o sempre——)"
22250-178 = "#video;11000"